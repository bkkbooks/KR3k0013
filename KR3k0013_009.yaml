body:
  text: 繼統一繼統一易曰大人以繼明炤于四方孟軻亦云君子創業垂統為可繼也仲尼刪詩定書斷自唐虞以下故軒轅之前無所論次然學者多稱少昊乃黃帝之子逮乎堯舜皆其裔也則知黃帝之澤及後世淵源深遠然自帝嚳已往五材迭勝事畢纂緒此固不論及夏后氏之興櫛風沐雨乘四載拯橫流鳥獸咸若烝民粒食功無間然子啟賢明用克永世商有祝網之仁誅暴之義元元欣戴亦惟舊矣雖太甲之顛仆典刑而流風善政浸于遺俗有賢臣援而正之終能篤紹基緒姬周之興瓜瓞成頌炎漢之慶大橫叶兆自爾明聖代興光昭前烈七世之廟固可以觀德者矣夏后啟禹之子禹東巡守至于會稽而終以天下授益禹崩三年之喪畢益讓帝禹之子啟而避居箕山之陽陽字一作陰避音壁禹子啟賢天下屬意焉禹雖授益益之佐禹日淺天下未洽故諸侯皆去益而朝啟曰吾君帝禹之子也於是啟遂即天子之位是為夏后帝太康啟子帝仲康太康弟帝相仲康子帝少康相子帝宁少康弟一云杼帝槐宁子帝芒槐子帝泄芒子帝不降泄子帝扃不降弟帝廑扃子帝孔甲不降子帝皋孔甲子帝發皋子帝履癸發子是為桀殷帝外丙湯之子湯太子太丁未立而卒乃立太丁之弟是為外丙帝仲壬外丙之弟帝太甲太丁之子成湯適長孫成湯既沒太甲元年史記稱湯沒太子太丁之子外丙即位三年立其弟仲壬與書差互伊尹作伊訓曰惟元祀十有二月乙丑伊尹祠于先王此湯終踰月太甲即位奠殯而告奉嗣王祗見厥祖居位主喪侯甸群后咸在在位次百官總已以聽於冢宰伊尹制百官以三公攝冢宰帝沃丁太甲子帝太康沃丁弟帝小甲太康子一云弟帝雍己小甲弟帝太戊雍己弟為殷中宗帝仲丁太戊子帝外壬仲丁弟帝河亶甲外壬弟帝祖乙河亶甲子帝祖辛祖乙子帝沃甲祖辛弟帝祖丁沃甲兄祖辛之子帝南庚祖丁弟沃甲之子帝陽甲祖丁子陽甲之時殷衰自仲丁以來廢適而更立諸弟子弟子或爭相代立比九世亂於是諸侯莫朝帝盤庚陽甲弟自河北五遷至河南治亳號曰殷行湯之政百姓繇寧殷道復興諸侯來朝帝小辛盤庚弟帝小乙小辛弟帝武丁小乙子為殷高宗帝祖庚武丁子帝祖甲祖庚弟帝廩辛祖甲子帝庚丁廩辛弟帝武乙庚丁子帝太丁武丁子帝乙太丁子帝受辛帝乙少子兄微子啟母賤不得嗣辛母正后遂為嗣辛立為帝天下謂之紂周成王武王太子太子代立是為成王王少周初定天下周公恐諸侯叛乃攝行政當國七年成王長周公反政北面就群臣之位群臣賦敬之周頌篇名以進戒嗣王康王成王太子成王顧命懼太子之不任乃命召公畢公率諸侯以相太子而立之成王既沒二公率諸侯以太子見於先王廟申告以文王武王之所以為王業之不易務在節儉毋多欲以篤信臨之作顧命太子立是為康王遂誥諸侯作康王之誥既受顧命群臣陳戒遂報誥之因事曰遂曰王出在應門之內出皋門立應門內之中庭南面太保率西方諸侯入應門左畢公率東方諸侯入應門右二公為二伯各率其所掌諸侯隨其方為位皆北面皆布乘黃朱賓稱奉圭兼幣曰一二臣衛敢執壤奠賓諸侯也舉奉圭兼幣之辭言一二見非一也為籓衛故曰臣衛來朝而遇國喪遂因見新王敢執壤地所出而奠贄也皆再拜稽首王義嗣德答拜諸侯拜送幣而首至地盡禮也康王以義繼先人明德答其拜受其幣太保暨芮伯咸進相揖皆再拜稽首冢宰與司徒皆共群臣諸侯竝進陳戒不言諸侯以內見外曰敢敬告天子皇天改大邦殷之命上天改大國殷之王命謂誅紂也惟周文武誕受羑若克恤西土言文武大受天命而順之能憂我西土之民本其所起惟新陟王畢協賞罰戡定厥功用敷遺後人休惟周家新升王位當盡協和天下賞罰能定其功以遺後人今王敬之哉敬天道務崇先人之美張皇六師無壞我高祖寡命言當張大六師之眾無壞我高祖寡有之教命王若曰庶邦侯甸男衛順其戒而告之不言群臣以外見內惟予一人釗報誥報其戒昔君文武丕平富不務咎言先君文武道大政化平美不務咎惡底至齊信用昭明于天下至行至中信之道因顯明于天下言聖德洽則亦有熊羆之士不二心之臣保乂王家言文武既聖則亦有勇猛如熊羆之士忠一不二心之臣共安治王家用端命於上帝皇天用訓厥道付畀四方君聖臣良受端直之命于上天天用順其道付與四方之國王天下乃命建侯樹屏在我後之人言文武乃施政令立諸侯樹以為藩屏傳王業在我後之人謂子孫今予一二伯父尚胥暨顧綏爾先公之臣服于先王天子稱同姓諸侯曰伯父言今我一二伯父庶幾相與顧念文武之道安汝先公之臣服于先王雖爾身在外乃心罔不在王室言雖汝身在外土為諸侯汝心嘗當忠篤無不在王室熊羆之士勵朝臣此督諸侯也用奉恤厥若無遺鞠子羞當各用心奉憂其所行順道無自荒怠遺我稚子之羞辱稚子康王自謂也群公皆既聽命相揖趨出已聽誥命趨出罷退諸侯歸國朝臣就次王釋冕反喪服脫去黼冕反服喪服居倚廬昭王康王子穆王昭王子昭王南巡守不返卒于江上乃立子蒲是謂穆王恭王穆王子懿王恭王子孝王恭王子夷王懿王太子孝王終諸侯立之厲王夷王子宣王厲王太子厲王即位三十年好利以榮夷公為卿士用事召穆公虎諫不聽國人相與畔襲厲王王出奔於彘太子靜匿召公之家國人圍之召公乃以其子代王太子召公周公二相行政十四年厲王死於彘太子靜長於召公家二相竝立之幽王宣王子平王幽王子幽王為犬戎所殺於是諸侯乃即申侯而共立故幽王太子宜臼是為平王以奉周祀桓王平王孫平王太子泄父蚤死立其子林是為桓王莊王桓王子釐王莊王子惠王釐王子襄王惠王子頃王襄王子班王頃王子定王班王弟簡王定王子靈王簡王子景王靈王子悼王景王子敬王景王子景王十八年后太子聖而早卒二十年景王愛子朝欲立之會崩子丐之黨與爭立國人立長子猛為王子朝攻殺猛為悼王晉人攻子朝而立丐是為敬王敬王猛母弟元王敬王子定王元王子一曰貞定王哀王定王子思王哀王弟哀王立三月思王弒哀王而自立考王思王弟思王立五月考王弒思王而自立威烈王考王子安王威烈王子烈王安王子顯王烈王弟慎靚王顯王子赧王慎靚王子漢惠帝高祖太子高祖十二年四月自太子即位文帝高祖中子惠帝娶魯元公主女為皇后帝無子取後宮美人子名之以為太子惠帝晏駕太子立為皇帝年幼呂后臨朝四年幽之永巷立長山王弘為皇帝八年太后喪諸呂謀為亂丞相陳平太尉周勃朱虛侯章既誅諸呂諸大臣相與陰謀以為少帝及三弟為王此皆非孝惠子復共誅之使人迎代王代王乃遣太后弟薄昭見勃勃等具言所以迎立王者昭還報曰信矣乃令宋昌驂乘乘車之法尊者居左御者居中又有一人處車中右以備傾側是以戎事則稱車右其餘則曰驂乘驂者三也蓋取諸三人為名義耳張武等六人乘詣長安至高陵止而使宋昌先之長安觀變昌至渭橋在長安北三里丞相已下皆迎昌還報代王乃進至渭橋群臣拜謁稱臣代王下拜太尉勃進曰願請間間容也猶今言中間也請容暇之頃當有所陳不欲於眾顯論也宋昌曰所言公公言之所言私王者無私太尉勃乃跪上天子璽代王謝曰至邸而議之既入代邸群臣從至上議願代王即天子位代王曰奉高帝宗廟重事也寡人不佞不佞不材也不足以稱稱副也音尺孕切願楚王計宜者楚王名交高帝弟也寡人弗敢群臣皆伏固請代王西鄉讓者三南鄉讓者再讓群臣也鄉讀曰嚮丞相平等皆曰臣伏計之大王奉高祖宗廟社稷計不敢忽願大王幸聽臣等臣謹奉天子璽符再拜上代王曰宗室將相王列侯以為其宜寡人寡人不敢辭遂即天子位群臣以次侍使太僕夏侯嬰東牟侯興居先清宮舊典天子行幸所至必遣靜室令先按行清靜殿中以虞非常奉天子法駕迎代邸法駕者侍中驂乘八車即御屬車三十六乘皇帝即日夕入未央宮夜拜宋昌為衛將軍領南北軍張武為郎中令行殿中行謂案行也還坐前殿大赦天下景帝文帝太子後七年六月丁未即皇帝位武帝景帝中子後三年正月甲子自太子即皇帝位昭帝武帝少子後元二年二月立為太子年八歲大司馬大將軍霍光等受遺詔輔少主政事一決於光初征和二年衛太子為江充所敗衛太子即戾太子也其母衛氏而燕王旦廣陵王胥皆多過失是時武帝年老帝母寵姬鉤弋趙婕妤武帝心欲以為嗣命大臣輔之察群臣惟光任大責重可屬社稷乃使黃門畫者畫周公負成王朝諸侯以賜光至是武帝游五柞宮病篤光涕泣問曰如有不諱誰當嗣者武帝曰君未諭前畫意耶立少子君行周公之事光頓首讓曰臣不如金日磾日磾亦曰臣外國人不如光武帝以光為大司馬大將軍日磾為車騎將軍及太僕上官桀為左將軍搜粟都尉桑弘羊為御史大夫皆拜臥內床下明日武帝晏駕遂即帝位元鳳四年正月丁亥帝加元服見于廟元服謂加冠也禮曰今月吉辰加爾元服元首也宣帝武帝曾孫衛太子孫也生數月遭巫蠱事坐收繫郡邸獄謂諸郡邸置獄也巫蠱獄收繫者眾故寄在郡邸獄因大赦廷尉監邴吉載送祖母史良娣家後有詔掖庭養視上屬籍宗正元平元年四月昭帝晏駕無嗣大將軍霍光請皇后徵昌邑王賀六月丙寅王受皇帝璽綬尊皇后曰皇太后癸巳光奏王賀淫亂請廢之會丞相以下議定所立廣陵王已前不用及燕刺王反誅其子不在議中近親唯有衛太子孫號皇曾孫在民間咸稱述焉光遂復與丞相張䣊等上奏曰禮曰人道親親故尊祖尊祖故敬宗大宗亡嗣擇支子孫賢者為嗣孝武皇帝曾孫病已武帝時有詔掖庭養視至今年十八師受詩論語孝經躬行節儉慈仁愛人可以嗣孝昭皇帝後奉承祖宗廟子萬姓臣昧死以聞皇太后詔曰可光遣宗正劉德至曾孫家尚冠禮洗沐賜御衣太僕以軨獵車迎曾孫就齋宗正寺入未央宮見皇太后封為陽武侯已而光奉上皇帝璽綬謁于高廟元帝宣帝太子黃龍元年十二月癸巳即皇帝位成帝元帝太子宣帝時為世嫡皇孫宣帝愛之竟寧元年六月己未自太子即皇帝位哀帝元帝庶孫定陶恭王子年十七徵為皇太子綏和二年四月丙午即皇帝位平帝元帝庶孫中山孝王子元壽二年六月哀帝晏駕大司馬董賢自殺太皇太后詔新都侯王莽為大司馬領尚書事七月遣車騎將軍王舜大鴻臚左咸使持節迎中山王九月辛酉中山王即皇帝位年九歲在位五年為莽所酖莽立宣帝元孫子嬰為皇帝年二歲嬰立三年為莽所廢後漢明帝光武第四子光武事具帝王中興門中元二年二月戊戌自皇太子即位章帝明帝第五子永平十八年八月壬子自皇太子即皇帝位和帝章帝第四子章和二年二月壬辰自皇太子即皇帝位殤帝和帝少子元興元年十二月辛未夜即皇帝位時誕育百餘日安帝清河王慶之子初封長安侯延平元年慶始就國鄧太后特詔留帝清河邸八月殤帝晏駕太后與兄車騎將軍鄧騭定策禁中其夜使騭持節以玉青蓋車迎帝齋於殿中皇太后御崇德殿百官皆吉服群臣陪位引拜帝為長安侯皇太后詔曰先帝聖德淑茂早棄天下朕奉皇帝夙夜瞻仰日月星辰冀望成就豈意率然顛沛天年不遂悲痛斷心朕惟平原王素被痼疾念宗廟之重思繼嗣之統唯長安侯祐質性忠孝小心翼翼能通詩論篤學樂古仁惠愛下年已十三有成人之志親德係後者莫宜于祐禮昆弟之子猶己子春秋之義為人後者為之子不以父命辭王父命其以祐為孝和帝嗣奉承祖宗案禮議奏又作策命曰惟延平元年秋七月癸丑皇太后曰咨長安侯祐孝和皇帝懿德巍巍光於四海大行皇帝不永天年朕惟侯孝章帝世嫡皇孫謙恭慈順在孺而勤宜奉郊廟統承大業今以侯嗣孝和皇帝後其審君漢國允執其中一人有慶兆民賴之皇帝其勉之哉讀冊畢太尉奉上璽綬即皇帝位年十三太后猶臨朝永初三年正月庚子皇帝加元服北鄉侯章帝孫濟北惠王壽之子安帝延光四年二月太后兄大鴻臚閻顯為車騎將軍定策禁中立之乙酉即皇帝位順帝安帝之子母李氏為閰皇后所害永寧元年立為皇太子延光三年安帝乳母王聖大長秋江京中常侍樊豐譖太子乳母王男廚監邴吉殺之太子數為歎息王聖等懼有後禍遂與豐京共搆陷太子太子坐廢為濟陰王明年三月安帝晏駕北鄉侯立濟陰王以廢出不得上殿親臨梓宮悲號不食內外群僚莫不哀之及北鄉侯薨車騎將軍閻顯及江京與中常侍劉安陳達等白太后秘不發喪而更徵立諸侯國王子乃閉宮屯兵自守十一月丁巳京師及郡國十六地震是夜中黃門孫程等十九人共斬江京劉安陳達等迎濟陰王於德陽殿西鐘下即皇帝位年十一近臣尚書以下從輦到南宮登雲臺召百官尚書令劉光等奏言孝安皇帝聖德明茂早棄天下陛下正統當奉宗廟而姦臣交搆遂令陛下龍潛藩國群僚遠近莫不失望天命有常北鄉不永漢德盛明福祚孔彰近臣建策左右扶翼內外同心稽合神明陛下踐祚奉遵鴻緒為郊廟主承續祖宗無窮之烈上當天心下厭民望而即位倉卒典章多缺請條案禮儀分別具奏制曰可乃召公卿百僚使虎賁林士屯南北諸門閻顯兄弟聞帝立率兵入北宮尚書郭鎮與交鋒刃遂斬顯弟衛校景戊午遣使者入省奪得璽綬乃幸嘉德殿遣侍御史持節收閻顯及其弟城門校尉耀執金吾晏竝下獄誅沖帝順帝之子建康元年八月庚午自皇太子即皇帝位年二歲質帝章帝玄孫渤海王鴻之子永嘉元年正月沖帝晏駕太尉李固以清河王蒜年長有德欲立之謂大將軍梁冀曰今當立帝宜擇長年高明有德任親政事者願將軍審詳大計察周霍之立文宣戒鄧閻之利幼弱冀不從乃立帝年八歲桓帝章帝曾孫蠡吾侯翼之子襲爵為侯本初元年梁太后徵帝到夏門亭將妻以女弟會質帝晏駕太后遂與兄大將軍冀定策禁中閏月庚寅使冀持節以玉青蓋車迎帝入南宮丁丑封建平侯其日即皇帝位年十五初李固議立嗣因引司徒胡廣司空趙戒先與冀書曰天下不幸乃遭大憂皇太后聖德當朝統攝萬機明將軍體位忠孝憂存社稷而頻年之間國祚三絕今當立帝天下重器誠知太后垂心將軍勞慮詳擇其人務存聖明然愚情眷眷竊獨有懷遠尋先世廢立舊儀近見國家踐祚前事未嘗不詢訪公卿廣求群議令上應天星下合眾望且永初以來政事多謬地震宮廟彗星竟天誠是將軍用情之日傳曰以天下與人昜為天下得人難昔昌邑之立昏亂日滋霍光憂媿發憤悔之折骨自非博陸忠勇延年英發大漢之祀幾將傾矣至憂至懼可不熟慮悠悠萬事唯此為大國之興衰在此一舉冀得書乃召三公中二千石列侯大議所立固廣戒及大鴻臚杜喬皆以為清河王蒜明德著聞又屬最尊親宜立為嗣先是蠡吾侯志嘗取冀妹時在京師冀欲立之眾論既異憤憤不得志而未有以相奪中常侍曹騰等聞而夜往說冀曰將軍累世有椒房之親乘攝萬機賓客縱橫多有過差清河王嚴明若果立則將軍受禍不久矣不若立蠡吾侯富貴可長保也冀然其言明日重會公卿冀意氣惱惱而言辭激切自胡廣趙戒以下莫不懾憚之皆曰惟大將軍命而固獨與杜喬堅守本議冀厲聲曰罷會固意既不從猶望眾心可立復議以書勸冀愈激冀乃說太后先策免固竟立蠡吾侯是為桓帝靈帝章帝孫解瀆亭侯萇之子襲侯爵永康元年十二月桓帝晏駕無子皇太后與父城門校尉竇武定策禁中使守光祿大夫劉儵持節將左右羽林至河間奉迎明年正月己亥帝到夏門亭竇武持節以玉青蓋車迎入殿中庚子即皇帝位年十二改元建寧元年四年春正月甲子帝加元服弘農王辨靈帝子中平六年四月戊午即皇帝位初靈帝何皇后生皇子辨王貴人生皇子協即獻帝也群臣請帝立太子帝以辨輕佻無威儀不可為人主然皇后有寵兄進又居重權故久不決至是帝疾篤屬協於上軍校尉蹇碩碩既受遺詔且素輕忌於進兄弟及帝晏駕碩時在內欲先誅進而立協及進從外入碩司馬播隱與進有舊迎而目之進驚馳從他道歸營引兵入屯北郡邸因稱疾不入碩謀不行皇子辨乃即位年十七八月為董卓所廢獻帝靈帝中子中平六年九月甲戌司空董卓廢弘農王立帝年九歲興平元年正月甲子帝加元服魏明帝文帝太子黃初二年為齊公三年為平原王以其母誅故未建為嗣七年五月文帝疾篤乃立為皇太子丁巳即皇帝位齊王明帝養子初帝無子養王及秦王詢宮省事秘莫有知其所繇來者青龍二年封為齊王景初三年正月丁亥朔帝病甚乃立為皇太子是日即皇帝位大赦秋七月始親臨聽公卿奏事正始四年正月帝加元服高貴鄉公文帝孫東海定王霖之子正始五年封剡縣高貴鄉公嘉平五年九月齊王廢公卿議迎立公十月己丑公至于玄武館群臣奏請舍前殿公以先帝舊處避正西廂群臣又請以法駕迎公不聽庚寅公入于雒陽群臣迎拜西掖門南宮下輿將答拜儐者請曰儀不拜公曰吾人臣也遂答拜至止車門下輿左右曰舊乘輿入公曰吾被皇太后徵未知所為遂步至太極東堂見于太后其日即皇帝位於太極前殿百寮陪位者欣欣焉陳留王武帝孫燕王宇之子甘露三年封安次縣常道鄉公五年五月高貴鄉公為成濟所弒公卿議迎立公六月甲寅入于雒陽見皇太后是日即皇帝位於太極前殿
