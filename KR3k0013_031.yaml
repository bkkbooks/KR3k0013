body:
  text: 奉先四奉先四唐武宗以開成五年正月即位上元聖昭獻皇帝尊諡廟號文宗葬章陵二月制穆宗妃韋氏追諡宣懿皇太后帝之母也三月敕復國忌行香以文宗開成三年十月曾廢故也會昌元年五月祔宣懿皇太后于太廟六日制曰朕近因載誕之日展承顏之慶皇太后謂朕曰天子之孝莫大於丕承人倫之義莫重於嗣續穆宗睿聖文惠孝皇帝厭代已久星霜屢遷禰宮曠合食之禮惟帝深濡露之感宣懿皇大后長慶之際德冠後宮夙表沙麓之祥實茂河洲之範先朝恩禮之厚中壼莫偕況誕我聖君纘承昌運已協華於先帝方延祚於後昆恩廣貽謀庶弘博愛爰遵舊典以慰孝思當以宣懿皇太后祔太廟穆宗睿聖文惠孝皇帝之室率是彝訓其敬承之祗奉慈旨載深感咽宜令宣示中外咸使聞知五年十月中書奏云汜水武牢關是太宗擒王世充竇建德之地關城東峰有二聖塑像在一堂之內伏以山河如舊城壘猶存威靈皆畏于軒臺風雲凝還於豐沛誠宜百代嚴奉萬邦所瞻西漢故事祖宗嘗所行幸皆令郡國立廟今緣定覺寺例合毀拆望取寺中大殿材木於東峰改造一殿四面兼置宮監伏望號為昭武廟以昭聖祖武功之盛望委孟懷節度使差幹事判官一人勾當修建然聖像頗已故暗望令李石於東都揀絶好畫手就加嚴飾初興功日望令東都差分司郎官一人薦告畢日別差官展敬從之六年二月太常禮禮院奏準敕東都太廟諸室神主都二十六都待修廟畢日具禮迎致于西夾室所遷神主月日及儀注等宜令所司詳定聞奏者擇用四月九日告制可宣宗以會昌六年三月即位上至道昭肅孝皇帝尊諡廟號武宗葬端陵四月東都留守李石奉修奏太廟畢所司迎奉太微宮神主祔廟訖東都太廟者本武太后家廟神龍中中宗反正廢武氏廟主立太祖已下神主祔之安祿山陷雒陽以廟為馬廄棄其神主而協律郎嚴郢收而藏之史思明再陷雒陽尋又散失賊平東京留守盧正己又募得之時廟己焚毀乃寄主於太微宮大曆十四年留守路嗣恭奏重修太廟以迎神主詔百官參議紛然不定禮儀使顏真卿堅請歸祔不從會昌五年留守李石因太微宮正殿圯多請以廢弘敬寺為太廟神主祔之又下百寮商量皆言準故事無兩都俱置宗廟之禮唯禮部侍郎陳商議云周之文武有鎬雒二廟今兩都異廟可也然不宜置主于廟主宜依禮瘞于廟之北墉事下未行而帝即位因詔有司迎太微宮寓主祔廢寺之新廟而知禮者非之懿宗以大中十三年八月即位上聖武獻文孝皇帝尊諡廟號宣宗葬真陵九月追尊母朝氏為太后諡曰元昭咸通元年十一月丁未有事于郊廟十三年十二月制追諡宣宗為元聖至明成武獻文睿智章仁神聰懿道大孝皇帝僖宗以咸通十四年七月二十日即位明年十一月庚寅郊廟禮畢大赦改元乾符盡七年乾符元年十一月庚寅有事于郊廟中和元年四月帝在成都府有司請享太祖已下十一室詔公卿議其儀太常卿崔厚議立行廟以玄宗幸蜀時道宮玄元殿之前架帷幕為十一室又無神主題神主版位達禮者非之明年乃特造神主以祔行廟光啓三年二月自興元還京以宮室未備權駐鳳翔禮院奏皇帝還宮先謁太廟今宗廟焚毀神主失墜請準禮例修奉制曰朕以涼德祗膺寶圖不能上承天休下正人紀兵革競興於寓縣車輿再越於藩垣宗廟震驚蒸常廢缺敬承典禮倍切哀摧宜付所司時奉修太廟使宰臣鄭延昌奏京城除充大內及正衙外別無殿宇伏聞先有詔旨欲以少府監大廳權充從之昭宗以文德元年三月八日即位明年正月御武德殿受朝賀宣制大赦改元龍紀盡其年四月庚午追諡聖母惠安太后王氏曰恭獻十一月甲寅有事於郊廟哀帝以天祐元年八月即位不改元盡四年三月二年二月己未昭宗皇帝神主祔太廟禮院奏昭宗廟樂曰咸寧之舞時左僕射裴贄等議遷廟合遷順宗一室從之四月敕河南府緱氏縣令宜兼充和陵臺令仍升為赤縣十月丁未改題襄宗神主廟號是日輟朝百官奉慰臣欽若等曰時起居郎蘇楷駁昭宗諡號太常卿張廷範改諡曰莊靈恭閔孝皇帝廟號襄宗後唐莊宗同光元年四月即位於魏州是月升魏州為東京改元城縣曰興唐貴鄉縣曰唐晉都督府曰興唐府以太原為西京鎮州為北都十一月甲辰敕雒京太廟先為朱溫毀廢將幸雒陽宮告廟下尚書省會議重修本朝宗廟二年正月丁巳所司奏懿祖昭烈皇帝八月十四日忌昭烈皇后十一月八日忌獻祖文皇帝十月十三日忌文景皇后九月六日忌太祖武皇帝正月二十日忌敕敬依典禮甲子西都留守張筠奏重修高祖太宗十聖宮殿戊辰饗太廟以皇子繼岌為亞獻皇弟存紀為終獻二月丁亥遣宗正李紓朝拜和陵丁酉吏部奏十道圖內州縣名共三十七處犯獻祖廟諱敕改易之三月中書門下奏北京三陵所宜尊奉竊尋故事宜建嘉名昭烈皇帝陵請以永興為名文皇帝陵請以長寧為名武皇帝陵請以建極為名從之八月以宗正少卿李瓊往曹州檢行哀帝陵寢三年正月丙申敕曰朕顧惟寡德獲嗣丕圖奉先之道常勤送往之誠靡怠爰自重興廟社載展郊禋旋蕩滌于瑕疵復涵濡于慶澤蓋憂勞靜國曠墜承祧御朽若驚涉川為懼繇是推移歲月鬱滯情懷恭念昭宗晏駕之辰少帝登遐之日咸罹虺毒遽殞龍髯委冠劍于仇讎託山陵于梟獍靜惟規制豈叶度程存愴結以彌深固寢興而增惕處思改卜式慰允懷宜令所司別選園陵備禮遷葬貴雪幽明之故以申追慕之心凡百臣寮體朕哀感雖有是命以年饑財不足而止己亥太常禮院奏三月合差官朝拜諸陵宜以十八日辛巳從之癸亥湖南馬殷奏管內州縣名有犯獻祖廟諱處道州延昌縣復舊名延唐縣彬州義昌縣改為義彰縣嶽州昌江縣改為平江縣所司鑄換新印賜之三月丙申寒食節車駕在鄴都帝與皇后出近郊遙享代州親廟十月上皇太后諡曰貞簡皇太后名陵曰坤陵十一月庚寅朔幸壽安號慟於坤陵明宗天成元年四月即位七月上莊宗尊諡曰光聖神閔孝皇帝八月甲午廢朝以莊宗神主祔太廟禮也十一月庚寅宗正少卿李蕘奏恭陵所其山園之內被民戶起舍屋居止臺觀皆被侵耕柏城松徑樵採殆盡乞下本縣與寺司重定完本園林地畝從之二年二月庚戌敕河南府新安縣宜升為次赤以雍陵在焉十二月丙午追尊四代祖麟州僕射諱聿諡曰孝恭皇帝廟號惠祖衛國夫人博陵崔氏諡曰孝恭昭皇后三代祖朔州司空諱敖諡曰孝質皇帝廟號毅祖趙國夫人張氏諡曰孝質順皇后皇祖蔚州司徒琰諡曰孝靖皇帝廟號烈祖皇祖妣秦國夫人何氏諡曰孝靖穆皇后皇考汾州太師諱霓諡曰孝成皇帝廟號德祖皇妣宋國夫人劉氏諡曰孝成懿皇后以應州舊宅為廟先是中書門下又奏伏以兩漢以諸侯王入繼帝統則必易名上諡廣孝稱皇載於諸王故事孝德皇孝仁皇孝元皇是也伏乞聖慈俯從人願許取皇而薦號兼上諡以尊名改置園陵仍增兵衛遂詔太常禮院定其儀制太常博士王丕等引漢桓帝入嗣尊其祖河間孝王曰孝穆皇帝蠡吾侯曰孝宗皇帝為例請付太常卿定諡刑部侍郎權判太常卿馬縞復議曰伏準兩漢故事以諸侯王宗室入承帝統亦必追尊父祖修樹園陵西漢宣帝東漢光武孝享之道故事具存自安帝入嗣遂有皇太后令別崇諡法追曰某皇所謂孝德孝穆之類是也前代惟孫皓自烏程侯繼嗣追父和為文皇帝事出非常不堪垂訓今據禮院狀漢安帝已下若據本紀又不見有帝字伏以諡法德象天地曰帝伏緣禮院以曾奏聞準將兩漢故事便述尊名請詔百官集議時右僕射李琪議曰伏睹歷代已來宗廟成制繼襲無異沿革或殊馬縞所奏禮有案據乞下制命令馬縞虔依典冊以述尊名時明宗意欲兼加帝字乃下詔曰朕聞開國承家得以制禮作樂故三皇不相襲五帝不相沿隨代創規于理無爽矧或情關祖禰事係蒸常且追諡追尊稱皇與帝既有減增之字合陳褒貶之辭大約二名俱為尊稱若三皇之代故不可加帝五帝之代亦不可言皇爰自秦朝使兼其號至若玄元皇帝事隔千祀宗追一原猶顯冊于鴻名豈須尊於漢典況朕居九五之位為億兆之尊不可總二名于眇躬惜一字于先代茍隨執議何表孝誠可委宰臣與百官詳定集兩班于中書逐班各陳所見準李琪等請于祖禰二室先加帝宰臣合衆議奏曰恭以朝廷之重宗廟為先事係承祧義符致美且聖朝追尊之日即引漢氏舊儀在漢氏封崇之時復依何代故事理關凝滯未曰聖謨道合變通方為民則且王者功成治定制禮作樂正朔服色尚有改更尊祖奉先何妨沿革若應州必立別廟即地遠上都今據開元中追尊皋陶為德明皇帝涼武昭皇為興聖皇帝皆立廟於京都臣等商量所議追尊四聖望依御札竝加皇帝之號兼請于各京立廟敕宣依應州舊宅立廟餘依所奏三年八月祠部舉新廟諱有與人姓同者請改之敕凡有姓犯廟諱者以本望為姓閏八月辛亥敕準兵部郎中蕭願奏大忌齊僧道各一百人列聖忌辰齊僧道五十人十月戊申帝服袞冕御崇元殿臨軒命禮部尚書韓彥惲工部侍郎住贊往應州奉冊四廟陵樂奏仗衛如式四年正月太常奏應州四廟陵號惠祖曰遂陵毅祖曰衍陵烈祖曰奕陵德祖曰慶陵忌日行香如太廟諸室八月戊申帝服袞御文明殿追冊昭宣光烈孝皇帝禮畢使兵部尚書盧質押冊出應天門登車鹵簿鼓吹前道八都亭驛翌日登赴曹州甲子曹州祔饗昭宣光烈孝皇帝禮畢文武百官詣西上閣門進名奉慰十月癸酉敕昭宣光烈孝皇帝曾居寶位久抱幽冤近始追崇方安寢廟宜升縣邑以奉園陵宜升曹州濟陰縣為次赤以本縣令兼陵令長興二年四月禘饗于太廟三年七月宗正寺奏今年經大雨太廟正殿疏漏門樓墊陷宮牆及神門外仗舍竝皆缺漏請下所司修補司天以墓年不宜興造請隨缺壞處量事增修從之閔帝應順元年二月山陵使上言太行山陵四月二十七日掩玄宮以御札皇帝親奉靈駕至園陵有司量事供備臣等伏見纍朝故事人君無親送葬之儀蓋承繼事大非薄於送終纍奏不從末帝清泰元年四月即位上明宗尊諡曰聖德和武欽孝皇帝十一月戊戌中書門下奏太常撰定冬至朝會儀詔曰初成園陵彌軫孝思遽履節辰尤增顧復所奏各伏宜停是月中書門下奏二十六日明宗忌群臣奉慰行香固有常禮恭以陛下初遇忌辰合存降殺仰惟追感難抑孝思固于茲時不同常歲臣等商量請于忌辰前後各一日不坐從之二年正月戊申宗正寺言北京永興長寧建極三陵應州遂衍奕三陵曹州溫陵例下本州府長官朝拜雍坤和徽四陵朝廷從之乙丑遣太常少卿蕭願宗正卿李郁朝拜徽陵右庶子韋華雍陵宗正少卿李知新殿中丞李延昭和陵太子中允劉賀太子中舍李均坤陵二月己丑宰臣盧文紀等上章曰臣聞聖列九皇必稟嚴慈之訓貴為萬乘彌懷顧復之思所謂生我劬勞昊天罔極故漢昭帝承祧御曆奉尊諡于雲陽魏文帝繼體守文思外家于甄館則追崇母后祔享廟庭愛親之道克隆敬本之文斯洽臣等常覽國史見玄宗大聖孝明皇帝母昭成皇太后竇氏作嬪初奉于相王歷位才終于藩孺及至上皇傳國聖子臨朝則追尊配享于閟宮儷極攸先于冢后臣又見代宗睿文孝武皇帝母章敬太后吳氏入宮才侍于忠王短世難登于命婦及寶祚爰歸于聖嗣追尊將祔于陵園則群臣歷懇于封亟嚴配請崇于徽號舊章斯在闕禮未伸臣等叨備鼎司合伸茂典伏惟聖母魯國太夫人夢梓興周望雲佐漢亶河洲之懿範契沙麓之休祥三母俱賢周武最承于天統四妃有子唐侯光啓于帝圖仰惟當寧之懷彌軫寒泉之思伏望配陵祔廟法地則天君親實殺于義方恩禮宜歸于聖善母以子貴乃春秋之格言孝以尊親固禮經之明義久虛時薦慮損皇猷俾秦官載顯于玉符魏寢永光于金冊則華夷大願臣子遑寧臣等謹案諡法聖善周聞曰宣施而不私曰宣博聞多能曰憲聖善周達曰憲謹上尊諡曰宣憲皇太后請依昭成章敬二太后故事擇日備禮冊命故事禮合配陵祔廟臣等再詳儀注備有典彝伏恐朝廷且務于便安司局貴期于辦集酌于故事更司簡詳臣等伏聞先太后舊陵未祔于先朝則都下難崇于別廟既追尊諡合創閟宮臣等謹案漢故事園寢不在王畿者或在陵所便立寢祠禮文雖異于國朝事理可循于權道臣等商量太后上尊諡後權立祠廟以伸告獻配祔之禮請俟他年詔曰朕猥將眇質獲嗣丕圖暑往寒來知昊天之罔極憂深思遠唯觸地以無容卿等學究源流文苞體要以致財成之美復陳孝理之規援引古今鋪陳茂實導朕以愛親之禮勉朕以追遠之文取則昭成明徵章敬仍加美諡益見忠誠至於權立閟宮頗亦叶於時變劬勞莫報長懸陟屺之心聖善斯崇且慰循陔之念謹依典禮哀慕增深六月乙丑太常卿李懌定宣憲太后陵號請以順為名三年五月太常奏于河南府東權立宣憲皇后寢宮從之六月御敷政殿遣工部尚書崔居儉奉宣憲皇太后寶冊于寢宮時陵園在河東適會兵興故權于京城修奉寢宮上諡焉九月戊申帝親行太原太常博士段顒白宰臣曰帝未嘗謁陵今河陽路當徽陵前安得經繇不行禮乎是日午時至陵園于仗舍前陳謁陵禮晉高祖天福二年正月丙寅改中興殿中興門為天福殿天福門五月丙辰御史中丞張昭遠奏汴州在梁室朱氏稱制之年有京都之號及唐莊宗平河南復廢為宣武軍至明宗行幸之時掌事者因緑修葺衙城遂掛梁室時宮殿門牌額當時識者或竊非之一昨車駕省方暫居梁苑臣觀衙城內齊閣牌額一如明宗行幸之時無都號而有殿名恐非典據臣竊尋奏漢已來寰海之內鑾輿所至多立宮名近代隋室於揚州立江都宮太原立汾陽宮岐州立仁壽宮唐朝於太原立晉陽宮同州立長春宮岐州立九成宮宮中殿閣皆題署牌額以類皇居臣伏準故事請於汴州衙城門權掛一宮門牌額則其餘齊閣竝可以取便為名庶使天下式瞻稍為宜稱者敕旨行闕宜以大寧宮為名其餘候續敕處分五月太常卿梁文矩奏奉敕旨定四廟諡號廟號陵號者伏以四代祖朔州使君府君自天所祐應時而生肇啓靈源始基鴻業謹案諡法寬容平和曰安臨事屢斷撫俗多方有明達之能無屈撓之事豈不謂之寬容平和乎又靖者柔德教衆之義也又義者行義不失者也請備神主追尊諡曰孝安皇帝廟號靖祖陵號義陵三代祖右省常侍府君動靜有常夙夜匪懈憂人若己視民如傷謹案諡法一德不懈曰簡富且不驕貴而好禮有典有則無怠無荒豈不謂一德不懈乎又肅者剛德克就之義惠者寬裕不苛者也請備神主追尊諡曰孝簡皇帝廟號肅祖陵號惠陵皇祖振武僕射府君淳德不雜素風自高得安邊靜塞之機有阜俗濟民之術謹案諡法執事有制曰平積善積德允武允文動不為身行唯濟物豈不謂執事有制乎又翼者思慮深遠之義又康者安樂撫民者也請備神主追尊諡曰孝平皇帝廟號翼祖陵號康陵皇考洛州太傅府君天資睿德神贊沈機臨戎則有敵必摧撫恤則無民不悅謹案諡法主善行德曰元盡善盡美乃神乃聖功煥龍圖慶流鳳扆豈不謂主善行德乎又憲者博聞多能之義昭者明德有功者也請備神主追尊諡曰孝元皇帝廟號憲祖陵號昭陵敕所定翼祖宜改為睿祖昭陵改為昌陵餘竝敬依又太常少卿裴坦奏奉敕定四廟皇后追尊諡議者伏惟四代祖妣秦氏積行芝蘭含貞閨壺徽猷令問厥彰內則之賢懿靜柔明綽有禮間之節諒非餘慶何啓昌期謹案諡法宣慈惠和曰元請追尊諡曰孝安元皇后伏惟三代祖妣安定太君安氏門稱盛族代謂良家修德行而義冠稽天蘊柔明而風昭齊體若非淑惠寧協休徵謹案諡法曰貴賢尚義曰恭請追尊諡曰孝簡恭皇后伏惟皇祖妣高平縣太君米氏令惠生知賢才天稟四德早聞於親戚一齊仍著于閨庭淑問常彰貞柔自固謹案諡法嚮惠德義曰獻請追尊諡曰孝平獻皇后皇妣南陽郡太夫人何氏族惟華貴德乃寬沖禮諧義聽之文詩協和鳴之詠履大跡而鍾慶祔神龍而克祥固有靈符來弘景祚謹案諡法溫柔聖善曰懿請追尊諡曰孝元懿皇后敕敬典禮七月壬申帝御崇元殿備禮命使冊四廟于雒京以四代祖朔州府君為孝安皇帝廟號靖祖以高祖妣秦氏為孝安元皇后以曾祖右省常侍府君為孝簡皇帝廟號肅祖以曾祖妣安定郡太君安氏為孝簡恭皇后以太王父振武僕射府君為孝平皇帝廟號睿祖以皇祖妣高平縣太君米氏為孝平獻皇后以皇考雒州太傅府君為孝元皇帝廟號憲祖皇妣南陽郡太夫人何氏為孝元懿皇后三年二月辛丑中書奏禮經云禮不諱嫌名二名不偏諱注云嫌名謂音相近若禹與雨丘與區也二名不偏諱謂孔子之母名徵在言在不稱徵言徵不稱在此古禮也唐太宗二名竝諱玄宗二名亦同人姓與國諱音聲相近是嫌名者亦改姓氏與古禮有異廟諱平聲字即不諱餘三聲諱側聲不諱平聲字所諱字玉文及偏旁闕點畫望依令式施行敕朝廷之制今古相沿道在人弘禮非天降況以方開曆數虔奉祖宗雖喻孔子之文未爽周公之訓冀崇孝行永載簡編取為二名及嫌名事宜依唐禮施行乃付所司五月丁巳敕應諸州縣名犯廟諱等相南管內資興縣本州名犯肅祖孝簡皇帝廟諱宜改為敦州州管縣名與州名同改為敦化縣義縣上一字亦與本州名同改為敦和縣武岡縣本州名與憲祖孝元皇帝廟諱上一字音同宜改為敏州州管陽縣上一字與州名同改為敏政縣嶺南晉興縣本州名與孝元皇帝廟諱下一字音同改為針州建州管武縣上一字亦與憲祖孝皇帝廟諱上一字音同改為昭武縣其已前州府縣上中下仍準舊制為定五年二月乙巳御史中丞竇貞固奏國忌日宰臣跪爐焚香僧人表讚孝思述祖先違世之事而文武百辟儼然列坐竊惟禮非天降酌在人情今古通規君親至敬對佛像行香之日實帝王不樂之辰豈有聽烈祖之舊勳悉安所坐聞明君之至德曾不暫興考經雖謂其相承度禮深疑其有失欲請跪爐仍舊餘依常位立班詔可其言仍令行香之後飯僧百人永為定制少帝以天福七年六月十三日即位九年七月辛未朔御崇元殿大赦改元開運盡三年是日宣赦未畢會大雨雪匆遽而罷都下震死者數百人明德門內震落石龍之首識者以為石乃國姓蓋不祥之甚八年二月以寒食節帝幸南莊遙奠顯陵焚御衣衣著紙錢至暮還宮開運二年正月宗正卿石光贊上言園陵宗廟請依古義時節薦新從之漢高祖初即位追尊太祖高皇帝世祖光武皇帝為不祧廟以親廟高祖司徒府君諱上諡曰明元皇帝廟號文祖高祖母隴西郡夫人李氏諡曰明貞皇后曾祖太保府君諱上諡曰恭僖皇帝廟號德祖曾祖母虢國太夫人楊氏諡曰恭惠皇后烈祖太傅府君諱上諡曰昭獻皇帝廟號翼祖烈祖母曾國太夫人李氏諡曰昭穆皇后烈考太師府君諱上諡曰章聖皇帝廟號顯祖烈妣吳國太夫人安氏諡曰章懿皇后乾祐元年正月吏部奏鄧州臨湍縣下一字犯文祖明元皇帝廟諱敕改為臨瀨縣仍府所司隱帝以乾祐元年二月即位上高祖尊諡曰睿文聖武昭肅孝皇帝十二月奉六廟神主于雒陽命宰臣蘇禹圭使副太府卿劉皞冊焉二年兵部員外郎盧瓊上言恭以高祖皇帝驅除戎虜救解倒懸德被生民功高邃古請依西漢祖宗故事于三京陝府許宋等州舊邸立別廟塑像以時禋祀以表遺愛從之周太祖廣順元年二月隰州刺史許遷上言河東賊軍侵我今月十一日遣步軍都指揮使孫繼業等領兵三百至州北長壽村掩殺獲賊寨將程筠軍使冒干王仁原供奉官李演竝駝馬等所獲賊將校竝斬之不數日賊引軍攻城四面齊進臣與判官李昉都指揮使趙太糧料使王光裔官員職掌百姓守把拒聞焚賊攻具死者五百餘傷者千餘信宿遁去詔曰凶狂烏合來犯軍城丑類蜂屯罔識天命汝誓平國螜固彼人心率驍鋭以前沖履鋒鋩而直進機籌神助部伍風生僞將活擒殘妖碎首心堅鐵石城固金湯蛇豕既殲梯沖竝爇孽豎偷生而遁跡雄師賈勇以追奔言念忠貞優無倫比嘉賞愧歎再三不忘時劉崇以朝廷初定徐方用兵遣子均領兵出陰地關侵晉隰以觀人心至是挫衄而退窺覬之意稍息矣是月安平兵馬監押馬彥珣言契丹入寇出兵掩襲奪下老幼人口竝牛馬各付其家五月辛未太常卿邊蔚上追尊四廟諡議皇高祖諱璟請上尊諡曰睿和皇帝廟號信祖陵曰溫陵皇高祖妣夫人張氏請上尊諡曰睿恭皇后皇曾祖太保諱諶請上尊諡曰明憲皇帝廟號僖祖陵曰齊陵皇曾祖妣鄭國夫人申氏請上尊諡曰明孝皇后皇祖太傅諱蘊請上尊諡曰翼順皇帝廟號義祖陵曰節陵皇祖妣陳國夫人韓氏請上尊諡曰翼敬皇后聖考太師諱簡請上尊諡曰章肅皇帝廟號慶祖陵曰欽陵聖妣燕國夫人王氏請上尊諡曰章德皇后又內出忌辰信祖四月七日睿恭皇后十月二十七日僖祖十二月七日明孝皇后正月十二日義祖五月元日翼敬皇后十一月十四日其三祖忌辰皇帝不視事宰臣百官赴佛寺行香慶祖九月十四日章德皇后三月十八日忌辰皇帝不視事一日宰臣百官西上閣門進名奉慰後赴佛寺行香敕敬依典禮七月癸酉太廟冊禮使馮道等至西京廟每室讀寶冊行祔饗之禮從西第一室信祖睿和皇帝睿恭皇后張氏祔饗第二僖祖明憲皇帝明孝皇后申氏祔饗第三義祖翼順皇帝翼敬皇后韓氏祔饗第四慶祖章肅皇帝章德皇后王氏祔饗宰臣百官進名奉慰辛酉帝被袞冕御崇元殿授四廟四室寶冊于使中書令馮道等是日侍中進冊中書令進寶太祖降階授之于使悽然感慟八月庚子賜冊太廟使及行事官綵帛銀器有差二年三月丁巳寒食節太祖幸城南園申遙奠之敬用家人之禮也十二月南郊大禮使中書令馮道自西京奉太廟神主至群臣班于西御園之東帝郊迎望輿再拜有司相禮廟主就行廟幄親行奠饗禮畢帝移蹕太廟門俟神輿至再拜百官陪位皆再拜宮闈令奉神主于四室帝設奠行祔饗禮畢還宮三年七月太常上言祭禮宗廟之祀三年一祫以孟冬五年一禘以孟夏恭惟追尊四廟經今三年準禮合改十月孟冬薦享為祫從之是月命兵部侍郎邊歸讜朝拜漢睿陵穎陵世宗顯德元年正月即位三月上太祖尊諡曰聖神恭肅文武孝皇帝六月親征河東回至新鄭縣丙寅親拜嵩陵望陵號慟至陵俯伏悲泣哀感左右拜跪祭奠而退賜奉陵將吏及近郊人戶帛有差五年四月遷五廟神主入于新廟先是以舊太廟在天街之側患其囂塵所及故改創今廟制度宏壯不日而成時帝征淮南車駕在行權東京留守王朴率留司百官奉迎神主以安于室六月禘於太廟恭帝以顯德六年六月即位八月上世宗尊諡曰睿武孝文皇帝
