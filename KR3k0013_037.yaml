body:
  text: 頌德頌德詩有六義其一曰頌所以議盛德之形容以其成功告於神明者也若乃駿命允集聖政光被武功震耀遠夷率服孝德昭著風俗歸厚乃至典禮修舉珍符沓委王澤漸漬時文載郁繇是群臣歸美頌聲並作或端委穆清壽觴斯薦或奏御公車英詞煥發摛華奮藻引商流羽是光帝德以播國風粲然可觀於斯為盛至有述上世之懿烈揚無窮之休問固足以播之管籥昭示來裔皆所以揄揚褒贊極臣子竭忠稱君之分也舜作歌曰敕天之命惟時惟幾因庶士允諧之政故作歌以戒安不忘危敕政也奉正天命以臨民惟在順時惟在慎微乃歌曰股肱喜哉元首起哉百工熙哉元首君也股肱之臣嘉樂盡忠君之治功乃起百官之事業乃廣皋陶拜手稽首揚言曰念哉大言曰揚詠歌以戒帝率作興事慎乃憲欽哉憲法也天子率臣下為起治之事當慎汝法度敬其職屢省乃成欽哉屢數也當數顧省汝成功敬忠以善無懈怠乃賡載歌曰元首明哉股肱良哉庶事康哉賡續載成也帝歌歸美股肱義足故續歌先君後臣衆力乃安以成其義成湯放桀于南巢惟有慚德湯效桀武功成故以為號南巢地名有慚德慚德不及古曰豫恐來世以台為口實恐來世論道我放天子常不去口仲虺曰惟王不邇聲色不殖貨利邇近也不近聲樂言清簡不近女色言貞固殖生也不生資貨財利言不貪也既有聖德兼有此行德懋懋官功懋懋賞用人惟己改過不吝勉於德者則勉之以官勉於功者則勉之以賞用人之言若自己出有過即改無所吝所以能成王業克寬克仁彰信兆民言湯寬仁之德明信于天下乃葛伯仇餉初征自葛東征西夷怨南征兆狄怨葛伯遊行見農民之餉于田者殺其人奪其餉故謂之仇餉仇怨也湯為是以不祀之罪伐之從此遂征無道西夷北狄舉遠以言則近者著矣曰奚獨後豫怨者辭也攸徂之民室家相慶曰徯豫后后來其蘇湯所往之民皆喜曰待我君來其可蘇息民之戴商厥惟舊哉史謂初征自葛始佑賢輔德顯忠遂良賢則輔之德則助之忠則顯之良則進之明主之道兼弱攻昧取亂侮亡弱則兼之暗則攻之亂則取之有亡形則侮之言正義推亡固存邦乃其昌有亡道則推而亡之有存道則輔而固之王者如此國乃昌盛德日新萬邦惟懷志自蒲九族乃離日新不怠自滿志盈溢王懋昭大德建中于民以義制事以禮制心垂裕後昆欲王自勉明大德建大中之道于民率義奉禮垂優足之道于後豫聞曰能自得師者王求賢聖而事之謂人莫己若者亡自多足人莫之益亡之道好問則裕自用則小問則有得所以足不問專固所以小嗚呼慎厥終惟其始靡不有初鮮克有終故戒慎終如其始殖有禮覆昏暴有禮者封殖之昏暴者復亡之欽崇天道永保天命王者如此王事則敬天安命之道周公居攝五年之末以文王受命不卒而終時天下太平故承其意而告之作惟天之命之詩成王時唐叔得禾異畝同穎獻諸天子王命唐叔歸國公于東作歸禾周公既得命禾旅天子之命已得唐叔之禾遂陳成王歸禾之命而推美成王善則稱君作嘉禾天下和同政之善者故周公作書以嘉禾名篇告天下宣王時仍叔為大夫作雲漢之詩以美宣王宣王承厲王之烈內有撥亂之志遇災而懼側身修行欲銷去之天下喜於王化復行百姓見憂故作是詩尹吉甫為王卿士作嵩高美宣王也天下復平能建國親諸侯褒賞申伯焉尹官氏申國申伯宣王之舅也以賢人為王之卿士佐王有功王以正禮遣申伯之國有車馬之賜踐于郿也又作蒸民美宣王任賢使能周室中興焉賢能謂樊侯仲山甫也其詩曰王命仲山甫式是百辟纘戎祖考王躬是保又作韓奕美宣王能錫命諸侯梁山于韓國之山最高大為國之鎮所望祀焉故美大其貌奕然謂之韓奕也梁山今在馮翊夏陽西北韓姬姓之國也後為晉所滅故大夫韓氏以為邑名焉其詩曰王錫韓侯其追其貊奄受北國因以為伯又作江漢美宣王能興衰撥亂命召公平淮夷也召穆公虎也淮夷東國在淮浦而夷行召公受命伐而服之召穆公為王卿士作常武之詩美宣王有常德以習武事因以為戒漢武東封泰山還登明堂御史大夫倪寬上壽曰臣聞三代改制屬象相因政教之法象相因屬屬連也間者聖統廢絶聖統聖人之道業謂禮文也陛下發憤合指天地祖立明堂辟雍祖始也宗祀泰一宗尊也六律五聲六律謂黃鍾大簇姑洗蕤賓夷則無射也五聲宮商角徵羽也幽贊聖意幽深也贊明也神樂四合各有方象四方色及五神祭祀聲樂各有等以承嘉祀為萬世則則法也天下幸甚將建太元本瑞登告岱宗發祉闔門以候景至癸亥宗祀日宣重光上元甲子肅雍永享太平之世日抱重光謂日有重日也將甫始之辭辭也太元太初曆也本瑞謂白麟玉鼎之屬也以候景冬至之景也上元甲子太初元年甲子朔旦冬至也宗尊也肅敬也雍和也既敬且和則長為天所享也光輝充塞天文粲然塞滿充燦然明貌見象曰昭報降符應言天顯示景象日月昭明也降下符應以報德化臣寬奉觴再拜上千萬歲壽制曰敬舉君之觴終軍為給事中從武帝幸雍祠五畤獲白麟一角而五蹄跱每一足有五蹄也又有奇木其枝傍出輒復合於木上帝異此二物博謀群臣訪其微意也軍對曰臣聞詩頌君德樂舞后功異經而同指明盛德之所隆也南越竄屏葭葦與鳥魚群葭蘆也或長則曰葦正朔不及其俗有司臨境而東甌內附閩王伏辜南越賴救比胡隨畜薦居薦屢也隨畜牧屢易故居不安往也左傳戎狄薦禽獸行虎狼心上古未能攝大將軍秉鉞單于奔幕驃騎抗旌昆邪右衽抗舉也右衽從中國化也是澤南洽而威兆暢也洽專也陽達也若罰不阿近舉不遺遠設官俟賢縣賞待功能者進以保祿罷者退而勞力謂不堪職任者也勞力歸農畝也刑於宇內矣刑法也言威法於宇內也一日刑見之履衆美而不足懷聖明而不專言自謙也建三宮之文質章厥職之所宜三宮明堂辟雍靈一也言於三宮班政教有文質也封禪之君無聞焉前世封禪之君不聞若斯之美也夫天命初定萬事草創謂創始受命之君也及臻六合同風九州共貫必待明聖潤色祖業傳於無窮潤色謂光飾也故周至成王然後制定休徵之應見休美也徵證也陛下盛日月之光垂聖思於勒成專神明之敬奉燔瘞於郊宮燔祭天地瘞祭地也祭天則燒之祭地則薶之郊居謂泰時及后土也獻享之精交神積和之氣塞明塞合也明者明靈亦謂神也而異獸來獲宜矣昔武王中流未濟白魚入舟俯取以燎群公咸曰休哉謂伐紂時今郊祀未見於神祗而獲獸以饋以饋謂充祭俎也此天之所以示饗而上通之符合也宜因昭時令日改定告元改元年以告神祗也昭明也令善也苴白茅於江淮發嘉號於營丘以應緝熙苴作席也江淮職貢三脊茅為藉也嘉號封禪也太山在齊分野故曰營丘地或曰登封太山以名姓號非苞苴之苴也使著事者有紀焉謂史官紀記也蓋六鷁退飛逆也六鷁退飛象諸畔逆宋襄公伯道退也白魚登舟順也謂武王伐紂而魚入王舟象征而必獲故曰順也夫明暗之徵上亂飛鳥下動淵魚亂變也各以類推今野獸並角明同本也並合也獸皆兩角今此獨一故云並也衆枝內附示無外也若此之應殆將有解編髮削左衽襲冠帶要衣裳而蒙化者焉要衣裳謂著中國之衣裳也斯拱而俟之耳對奏上甚異之繇是改元為元狩後數月越地及胸奴名王有率衆來降者時皆以軍言為中吾丘壽王為光祿大夫汾陰得寶鼎武帝嘉之薦宗廟藏於甘泉官群臣皆上壽賀曰陛下得周鼎壽王獨曰非周鼎帝聞之召而問之曰今朕得周鼎群臣皆以為然壽王獨以為非何也有説則可無説則死壽王對曰臣安敢無説臣聞周德始乎后稷長於公劉大於太王公劉后稷曾孫也太王文王之祖則古公亶父也成於文武顯於周公德澤上昭天下漏泉昭明也漏言潤澤下沾如屋之漏無所不通上天報應鼎為周出故名曰周鼎今漢自高祖繼周亦昭德顯行施恩布惠六合和同至於陛下恢廓祖業功德愈盛天瑞並至禎祥畢見昔秦始皇親出鼎於彭城而不能得天祚有德而寶鼎自出此天之所以與漢乃漢寶非周寶也上曰善群臣皆稱萬歲賜壽王金十斤宣帝時天下和平四夷賓服神爵五鳳之間屢蒙瑞應而益州刺史王襄欲宣風化於衆庶聞王褒有俊才請與相見使褒作中和樂職宣布詩中和者言政治和平也樂職者言百官各得其職也宣布者風化所洽無所不被選好事者令依鹿鳴之聲習而歌之時汜鄉侯何武為童子選在歌中久之武等學長安歌太學下轉而上聞宣帝召見武等觀之皆賜帛謂曰此盛德之事吾何足以當之褒既為刺史作頌即上中和樂職宣而詩也以美盛德故謂之頌又作其傳解釋頌歌之義及作者之意益州刺史因奏褒有軼材乃徵褒既至召為聖主得賢臣頌後漢明帝永平十七年公卿百官以帝威德懷遠祥物顯應乃並集朝堂奉觴上壽制曰天生神物以應王者遠人慕化實繇有德朕以虛薄何以享斯唯高祖光武聖德所被不敢有辭其敬舉觴太常擇吉日策告宗廟章帝建初三年正月己酉宗祀明堂時郎中傅毅追美孝明皇帝功德最盛而廟頌未立乃依清廟作顯宗頌十篇奏之元和中始修古禮巡狩方嶽崔駰上四巡頌以稱漢德辭甚典美時丁鴻以少府從上奏曰臣聞古之帝王統治天下五載巡狩至于岱宗柴祭於天望秩山川協時月正日角斗斛權衡使人不爭陛下尊履蒸蒸奉承弘業祀五帝於明堂配以光武二祖四宗咸有告祀瞻望泰山嘉澤降澍柴祭之日白雲上升與燎煙合黃鵠群翔所謂神人以和答饗之休符也帝善焉魏太祖以孫權稱臣遺咨大理王朗朗答曰孫權前箋自詭躬討虜以補前愆後疏稱臣以明無二牙獸屈膝言鳥告歡明珠南金遠珍必至情見乎辭效著乎功三江五湖為沼于魏西吳東越化為國民鄢郢既拔荊門自開席卷巴蜀形勢已成重休纍慶雜沓相隨承旨之日撫掌擊節情之畜者辭不能宣晉武帝時摯虞為聞喜令時天子留心正道又吳寇新平天下乂安虞上太康頌以美晉德潘嶽辟太尉府舉文章秀才武帝躬耕籍田嶽作賦以美其事元帝初王廙為琅琊王司馬王敦啓為荊州刺史及帝即位廙奏中興賦上疏曰臣託備肺腑幼蒙洪潤受自齠亂至於弱冠陛下之所撫育恩侔於兄弟義同於交友思欲攀龍鱗附鳳翼者有年矣是以昔忝濮陽棄官遠迹扶侍老母攜將細弱越長江歸陛下者誠以道之所存願託餘蔭故也天誘其願遇陛下中興當大明之盛而守局遐外不得奉瞻大禮聞問之日悲喜交集昔司馬相如不得觀封禪之事慷慨發憤況臣情則骨肉服膺聖化哉又臣昔常侍坐於先后説陛下誕育之日光明映室白毫生於額之左相者謂王當有四海又臣以壬申歲見用為鄱陽內史七月四星聚於牽牛又臣郡有枯樟更生及臣後還京都陛下見白兔命臣作賦時琅琊又獻甘露陛下命臣嘗之又驃騎將軍道向臣説晉陵有金鐸之瑞郭璞云必致中興璞之爻筮雖京房管輅不過也明天之曆數在陛下矣臣少好文學志在史籍而飄放遐外常與桀寇為對臣犬馬之年四十三矣未能上報天地而愆負屢彰恐先朝露填溝壑令微情不得上達謹竭其頑獻中興賦一篇雖未足以宣揚盛美亦是詩人嗟歎詠歌之義也成帝咸康八年九月廬江春榖縣留圭夜見門內有光取得玉鼎一枚圍四寸豫州刺史路求以縣著作郎曹毗上玉鼎頌孝武帝時袁宏為東陽太守以漢時傅毅作顯宗頌辭甚典雅乃作頌九章頌簡文之德上於帝後魏道武既破賀納遂命群臣登勿居山遊宴終日從官及諸部大人請聚石為峰以紀功德命張襄為文獻文時高允為中書令從帝北伐大捷而還至武川鎮上北伐頌帝覽而善之高閭為昭武將軍時獻文傳位從御崇光宮閭上表頌孝文時閭為中書監太和三年冬至帝及文明太后大饗群官帝親舞於太后前群臣皆舞帝乃歌仍率群臣再拜上壽閭進曰臣聞大夫行孝義合一家諸侯行孝聲著一國天子行孝德被四海今陛下聖性自天敦行孝道稱願上壽靈應無差臣等不勝慶踴謹上千萬歲壽帝大悅賜群臣帛人三十匹宣武永平中甄楷上孝文頌十三篇優詔報之高聰為散騎常侍黃門侍郎宣武幸鄴還於河內懷界帝親射矢一里五十餘步侍中高顯等奏伏見親御弧矢臨高設弋鳴弦動羽馳鏃所逮三百五十餘步臣等伏惟陛下聖武自天神藝夙茂巧會騶虞之節妙盡矍圃之義威稜攸疊彪光攝氣才猛所振勍憝彌心足以肅截九區赫服八宇矣盛事奇迹必宜表述諸勒銘射宮永彰聖意詔曰此乃弓弧小藝何足以示後葉喉唇近侍茍以為然亦豈容有異便可如請遂勒銘於射所聰為之詞隋高祖時突厥葉護可汗以帝所賜旗鼓西征婀婆遂生擒婀婆既而上書請婀婆既生之命上下其議左僕射高熲進曰骨肉相殘教之蠹也存養以示寬大帝曰善頻因奉觴進曰自軒轅以來獯鬻多為邊患今遠窮北海皆為臣妾此之盛事振古未聞臣敢再拜上壽唐高祖武德八年四月赤雀巢於殿門宴五品已上上頌者十餘人極歡而罷七月高祖從容謂侍中陳叔達曰自古帝王統一四海者凡有幾人對曰五帝三王已前年代浸遠近古已來有秦始皇之與兩漢下洎晉武耳高祖曰朕幸得繼前哲於朕良多叔達又對曰隋末亂離蒼生塗地若不逢陛下救其淪溺黎庶殆為魚矣此蓋天授非人力所致帝大悅九年四月給事中歐陽詢奏上帝德論帝覽之稱善太宗貞觀三年正月親祭先農躬御耒耜籍于千畝之甸初晉氏南遷後魏來自雲朔中原分裂又雜以獯戎代歷周隋此禮久廢而今始行之觀者莫不躍駭於是祕書郎岑文本獻籍田頌以美之臣欽若等曰按後魏後周並耕藉田與此所載有異六年閏八月祕書少監虞世南上聖德論帝手詔答曰卿所論太美但朕德甚寡恐有識者窺卿為後人所笑卿引古昔無為而治朕未敢擬倫此之近代乍踰之耳卿覩朕之始未見朕之終宜付祕書若朕能慎終如初則可為也如違此道不用後代笑卿焉十四年二月陝州言河水變清司空無忌等詣闕上表曰臣聞崑崙載極道玄液以周天積石流源委蒼波而括地俯作神州之紀仰膺上帝之官水德靈長斯其謂矣故能道符千載位長百川瑞馬開圖發榮光於遠代應龍闢壤致宅土於遐年自此不追寂寥難俟天之祚聖復在於茲伏惟皇帝陛下則哲承基窮神闡化功綿寓外德耀瀛表文教蔚乎三五至道格乎地天是以禎凝藪澤慶溢風煙丹井輝奇青丘表異嘉苗合穎入豐膳以鳴鐘天駟攝雲播頌聲於綴兆西鶼南雉之貴日至月書連珠湧醴之徵雲飛霧集宜其展事嬴里仰告成功出豫介丘方騰茂實猶且宵衣旰食若有追而不逮對越嘉祉乃固辭而弗居遂使萬土韜華三神鈌望西皇佇詔申以德水之祥東嶽希封勗以清河之貺伏見陝州刺史房仁裕狀稱所管界內二百餘里正月元日黃河載清謹案易乾鑿度曰聖人受命河水清京房飛候曰河水清天下太平繇是納渭含涇混流同潔凌門泑澤別派俱清馬頰馳波詳觀若鏡龍門激箭回眺飛空拍天之典煥然馮夷之都可見千尋朗徹俯映玄珠一曲澄鮮遙觀紫貝盡河宗之奧祕洞水府之仙靈豈非天鑑詳明不愛其道神心昭著在感斯通何幽顯合符人祗交際理均形見若斯之效歟臣等沐道醉心觀洋駭目披圖逖聽矌古無聞實慶生涯親承旦暮詔答曰嘉瑞爰降必資至德大河效祉實為希世顧惟寡昧但增慚惕乃天地表祥宗社垂祐欲使四海隆平八荒禔福王公卿士內外庶僚宜勉修正道以副靈貺焉三月秦州言河清七月白龍見於富平九月杭州言青龍見十五年十月太宗問特進魏徵曰朕為人主仰止前烈至于積德纍仁豐功厚利此四者帝王以為稱首朕皆庶幾自勉人苦不能自見不知於朕之身何等為優徵曰德仁功利陛下兼而有之然則內平禍亂外除戎狄是陛下之功安堵黎元各有生業是陛下之利繇此言之功利居多十六年七月太宗謂侍臣曰朕數召公等欲問愆闕庶幾善道以救不逮耳今常達夜不寢思為政術非惟憂勤萬姓亦欲貽法後昆司空長孫無忌奏稱古來撥亂人主載籍斯存天造草昧之辰爰始經綸之日何嘗不思聞帝道祗奉王度及即位之後漸染驕盈詩云鮮克有終此非空説陛下君臨四海將二十載視事之後每留群臣陛下為解威嚴貸以顏色唯欲其論國家善惡用康政化哀愍黎元聖情專切豈臣等獨蒙恩澤四海蒼生誰不幸甚二十一年二月詔皇太子之國學釋奠賜學官胄子帛各有差仍擢其高業右庶子許敬宗上四言詩以美其事二十二年四月磧外蕃人爭牧馬土界帝親臨斷決然後咸服黃門侍郎褚遂良進曰昔虞芮爭田去此三百里陛下聖德廣運無遠不臻磧外諸夷來斷境域振古以來所未聞也玄宗開元二年六月左拾遺蔡孚獻龍池集王公卿士以上凡百三十篇請付太常寺其詞合音律者為龍池樂章以歌聖德從之初帝在藩與宋王等居于興慶里時人謂為五王子宅及景龍末宅內神池涌出泛灩清瑩流之不竭中有龜龍遊焉故群臣歌之八年城門郎獨孤晏奏曰伏見聖上於別殿安置太宗高宗睿宗聖容每日侵早具服朝謁昔者周公宗祀文王於明堂以配上帝蓋有國之常祀聖上朝夕肅恭是過周公遠矣又聞禁中寧王憲申王撝內朝宴會聖上官中自拜跪如家人之禮岐王範薛王業恩錫特殊友愛雍睦海內稱之昔堯九族既睦平章百姓是過帝堯遠矣聖上近造一小院東西南北各三十餘步寢殿卑狹階高尺三寸房廊階不過四五寸無青墀所坐氈褥非破不易是過於夏禹遠矣聖上嘗得絹四十餘萬匹謂侍臣等曰此物擬充男女嫁娶左藏庫物是百官諸邊將士物豈得漫用節約且過漢文遠矣聖上至德光厚躬勞庶政憂人飢寒昔齊若雨雪御裘憂勞凍餒但恤寒耳今聖上憂冬寒夏熱是過之遠矣請宣付史官從之十三年十一月封東嶽禮畢於是中書令張説撰封祝壇頌侍中源乾曜撰社首壇頌禮部尚書蘇頲撰朝覲壇頌以紀聖德十九年八月幽州執叛奚壽斤來獻宰臣裴光庭等奏曰伏以深仁燭幽遠被無外至德感物矧茲有苗頃者奚壽斤放命不恭執訊來獻而陛下設誠不疑推致赤心歸于陬落襁負而至置之左右射御不違自非睿宗至誠被物何以驟改驕節卒為忠臣變鴟梟於鸞鳳登反側於仁壽求諸前古竹帛所不載稽諸近事耳目所未聞臣等豫覩休異輒敢書于史册帝曰奚壽斤往因脅從遂同逆命俘虜而至罪則難容收其悔過之心免其殊死之責推誠待物果獲忠臣此皆卿等輔翊之所致豈朕薄德之能感書之簡册以示將來當斯美名良用慚惕二十三年二月己亥以奚契丹既平宰臣裴耀卿張九齡李林甫等奏賀曰奚及契丹尤近邊鄙侵軼是慮式遏成勞臣庶常情欲其防禦所謂長策無出此者陛下獨斷宸襟高奪群議以為頓兵塞下轉粟邊軍曠日持久役無寧歲若不因利乘便一舉遂平使遷善者自新為惡者就戮其勞不久永息我人且命大兵臨之凶徒必潰不出此歲當並成擒臣等初奉聖謀高深未測及聞凱捷晷候不差遠蕃遺類莫不稽顙緣邊戍卒咸返耕稼臥鼓熄烽誠自此始斯皆陛下睿謀先定神算非常觀變早於未萌必取豫於無象臣伏以成功不宰君人所以為重有美不宣臣子所以成罪臣雖蒙瞽安敢無言既豫聞始謀又幸見成事豈可使天功虛往日用不知竹帛相傳復紀何事請宣付史館垂示將來仍許將吏等刊石立頌以紀功德帝手詔報曰事有難易因圖可卜小蕃背誕惡貫已盈人神棄之指期可滅今之剋定偶會夙心記以史官銘之樂石頗矜功伐不願為之卿等苦論載用多愧使桓山之頌復在茲乎八月癸巳千秋節命諸學士及僧道講論三教同異中書令張九齡上言曰臣聞好尚之論事躓於偏方至極之宗理歸於一貫非夫上聖孰採要旨伏惟陛下道契無為思談玄妙考六經之同異筌二教之幽賾將以降照群疑數化率土屏浮詞於玉殿緝精義於金門一變儒風再揚道要凡百士庶罔不知歸臣等幸侍軒墀親承至訓抃躍之極實倍常情望宣付史館帝手詔報曰略舉三教求之精義會三歸一初分漸頓理皆共貫使自求之卿等論議廟堂化源何遠事關風教任付史官天寶元年五月濮陽郡王璬及嗣王宗子等奏曰臣等伏以龍池肇慶賓祚攸章聖德動天禎符薦至臣等憤深家國志願光揚去開元二十二年於東京朝堂上表請建龍池聖德頌曲蒙天眷俯遂微誠其時修營已就刻勒所為頌文未備敘事多遺述聖談天萬不舉一既乖士庶之望莫展宗臣之心尋請改修冀昭聖德斐然雖竭於愚思翰墨未絶於琬琰今屬靈符降祉景命維新天寶之號再加郊廟之儀式展誠合書其寶録光闡徽猷綴集前文以存不朽特望天恩更許編録則聖德鴻業紀而無遺聖美形容於茲允備無任勤懇之至謹奉表陳請以聞帝手詔報曰夫頌者美盛德之形容每省朕躬曷稱奇紀歲月斯積符瑞屢臻欲備敘之復茲誠請實賴人事不遺神明允來意也八月突厥阿布惠與其黨屬來降中書門下奏曰臣等伏以胸奴患邊其來日久頃雖朝廷示信約為父子之國然而戎狄無親常蓄豺狼之志陛下聖謀廣運睿略玄通至道昭感神明叶贊不勞一卒不煩一兵使其種落自相攜二今葉護敗亡殞身漢北妻子縲繫為俘闕下巢傾席卷瓦解雲散萬里無事三邊遂空曠古不賓盡為臣僕普天所履皆入封疆諒繇負德背恩自速天亡之禍固亦休兵偃革用彰海晏之期實有無方之神寧惟不戰之勝求諸載籍所未嘗聞臣等幸遇昌期欣逄大慶望宣付史官從之十二月西河大破吐蕃中書門下表賀曰臣等自今月以來纍見隴右奏大破吐蕃大嶺青海等軍捷書前至日因奏事陛下謂臣等曰吐蕃背恩神人共棄豈惟隴右頻勝三數日間河西當有大捷今日王倕果奏大破吐蕃魚海及遊奕等軍擒生斬級並虜獲羊馬不可勝計竊觀前後克捷皆是特稟聖謀密練驍雄深討凶寇以寡擊衆所向無前天心與睿德合符士卒與神兵叶契九重制勝動必有成萬里知來見於未兆一月三捷千古未聞品物同歡何況臣等伏望宣示朝野編于史册詔曰坐運奇謀誠難與戰河西捷書相繼謂之伐叛可豫圖之所請者依九載靈州都督兼御史中丞張齊丘上言請於新築北大都護府建聖德碑頌許之十載九月中書門下奏曰臣等今日因奏事承德音聞江南為橘江北為枳蓋以地氣有殊物性因變朕近宮內種柑子樹數株今秋以來結實一百五顆乃與江南及蜀道所進無別亦可謂稍異者伏以自天所育者不能改有常之性曠古所無者乃可為非常之感是知聖人御物以元氣布和大道乘時則殊方叶致且橘柚所植南北異名實造化之有功匪陰陽之所革陛下玄風真紀六合一家雨露所均混天區而齊被草木有性憑地氣而潛通故茲江外之珍果為禁中之花實緑蒂含霜芳流綺殿金衣爛日色麗彤庭豈比夫搖木移根俟風而實若榴傳種因石為名理匪自於人謀事實關於神化圖牒未有耳目攸新臣等忝侍軒墀恭聞殊應喜慶交集倍萬常情仍望宣示朝廷光諸史册帝手詔報曰枳橘之性惟任土不遷陰陽之和實在能感致且寒谷吹律猶氣變燕郊則中樞化源故物備京邑今黃柑數株丹實盈條裛露迎風香逾江劍金光珠澤秀溢林庭豈斯果之足珍喜元和之必應故合天道信何遠焉所賀已知仍依來請十二月庚申敕安國寺以所撰先皇聖德頌刻石其石背上宜題親王嗣郡王及中書門下兩品五品以上供奉官御史中丞左右丞侍即諸司文武官員三品以上兼節度使及蕃酋大首領等名品準諸頌碑制名記肅宗至正二年十二月玄宗自蜀至帝奉迎於望賢宮左相苗晉卿中書侍郎同平章事崔圓表言伏見工部侍郎李遵及殿中監李輔國言皇帝於望賢宮奉迎上皇望樓趨馳捧足鳴咽問安既退侍膳皆親及出宮之時親選龍媒侍從歸闕孝敬之至傍感人神四海歸心恩深錫類群臣何幸得覩盛美陛下武功冠於千古孝德踰於百王昔夏之有窮少康復其業漢之新莽光武纘其緒雖復崇名茂績輝映當時而皆曠日持久動十數載致使宗社郡邑蕩復無遺未有如陛下神武奮發睿謀獨斷曾不再稔掃清群凶奉迎聖皇不失舊物蒸蒸翼翼榮輝區宇考之傳記振古未聞天地人神孰不慶幸臣請編諸史册傳之不朽詔曰荷社稷之靈賴上皇之感翦除寇盜克復京都浹辰之間大勳允集掃清宮闕奉迎鑾輿昨自望賢宮得申拜慶重歡侍省深戴君父之恩承順尊嚴固宜臣子之禮卿等訐謨致理翼贊成功方告史臣有慚薄德乙卯殿中監李輔國奉表上曰臣聞古今大寶皇王受命成功創業皆始艱難繇是足高光武之功漢圖斯永滅澆豷之患夏嗣以興豈比孝以感通德以成化光膺聖曆協契天時開闢已來未有如陛下者也頃巨猾開釁中夏不康陛下赫然發憤奉命專征曾不踰旬兩京剋復掃清宮闕奉迎鸞輿警蹕鳴笳舊儀逾盛行軍便幕故事無闕陛下整法駕擁群臣遠自望賢拜迎路次引旌旆而祥風不散拂鸞輿而瑞雪時飄承順天顏無違就養君父之禮億兆同歡猶乃不自為功至崇謙德過周文侍膳之典邁漢高獻壽之儀虔奉至尊敬恭受命伏惟陛下以孝理天下也如彼以德化天下也又如此盛德大業其至矣哉臣幸參締搆職在禁戎得覩盛明無任抃躍伏請編諸史册以示將來詔曰朕恭承明命親總兵戎掃攙搶之妖拯生靈之患宗社所祐何往不剋雖兆自於艱難而終盛於丕業昨日星順動鸞輿回京仰戴君父之恩重歡侍省之慶拜迎之日得展孝誠特荷恩慈多慚薄德遂得祥風引旆瑞雪灑途宮闕生光感應昭著卿為朕心膂夙夜忠勤所請宣付史館宜依代宗大曆三年夏四月戊申乾陵上仙觀天尊殿有雙鵲銜柴及泥補葺殿之隙壞凡一十五處宰臣等上表賀曰臣聞孝至於天則祥發陵邑德被於物則化及鳥獸伏惟陛下因心廣教弘道極和時因霜露之恩流行雲雨之澤故前聖垂裕歆於明誠皇天報貺賜以嘉應異鵲來感翔集可窺迹比人謀事歸神化伏望宣示中外編諸史册帝手詔答曰聖祖仙都高宗園寢希夷清淨之所肅穆哀敬之地二鵲翔集以月繫時常銜塈茨用補缺壞顧政禮之多闕而先靈之幽助祗奉貺祐感切良深卿等道備梓材任當構廈覩茲符應庶洽康寧實賴嘉謨弼豫不逮所請編諸史册者依七年十月帝畋于禁苑一發連二兔遣使出示宰臣仍賜之宰臣等拜舞稱慶抗表請付史官以紀鴻猷手詔不許癸丑宰臣等又上言曰聞王者有日官動而必書事無虛美用成善終之義觀乎召舉之明體合忠直輔宣法教斯良史之任也帝者盛美紀于一時闕登雅頌彰示家國斯君子之罪也昔漢武有獲蛟之歌魏祖有南皮之事皆盛其殊能敘列前載玄宗開元中搜於岐陽親御弧矢陳九軍之禮有百中之捷煥耀圖史布昭詠歌今陛下以豐歲皆秋農郊始隙因依時令習用戎事遊涉靈囿經于上蘭以一發之神連三窟之狡弦匪再控騎無角逐進異前禽之失舉明不合之圍事過舊聞妙歸天縱足以重威四夷高視千古恩賜之後榮慶中朝公卿庶尹動色相賀垂於簡牘允叶禮經若聖情沖深過於謙讓則史臣曠職後代無稱凡在庶位罔知所出伏願特回聖慈俯遂誠情手詔答曰帝王之制禮有三驅弧矢之威財成理道朕方欲清靜流化無為軌俗射御之藝闕而不書卿等爰據禮經博求良典舉聖祖岐陽之狩徵漢皇郊廟之歌再陳表章頻志簡册式遵彝訓宜依所請敬宗寶曆元年九月成德軍節度使王廷湊上言請於管內立皇帝聖德碑二年四月丙寅內出皇帝聖德碑本以賜廷湊武宗會昌中幽州節度使張仲武討殺回鶻烏介可汗至會昌末表請薊北立紀聖功銘帝詔遣宰臣李德裕為之後唐明宗天成二年十二月延宰臣於玄德殿馮道奏曰先皇帝末年不撫軍民惑於聲樂遂致人怨幾墜丕構陛下自膺人望軍民惠愛藩后入覲情同魚水時歲頻稔亦淳化所致也更願居安思危保守今日帝然之四年九月戊寅上御中興殿顧謂宰臣曰時事近日如何馮道奏曰臣省事以來無歲不聞戰伐蓋政令不一王網弛紊伏自陛下纂隆五載服之以武威懷之以文德任賢不二去邪不疑天下歸心人知恥格近歲以來可謂無事長興元年正月癸未上御中興殿謂宰臣曰近雖降春澤如何馮道奏曰今歲春初已見三白相次又降雨澤人情大洽蓋陛下聖德感通之應也臣聞天子事天臣下事君臣下若不供其職則刑法及之天子不守其道則災沴降之今陛下敬天事地憂勞百姓則歲有豐登二年十二月己卯帝御中興殿宰臣馮道奏曰臘日陛下方憂雪是夜便降立春日又降雨澤皆得其節也自陛下臨御于今六載家給人足而又放鷹鸇之類咸令遂性所謂仁及鳥獸也茍非聖德其孰能臻此三年三月癸巳帝御中興殿顧謂馮道曰春雨太多乎道對曰春澤稍多是豐年之兆契丹孔熾自近朝以來中國多事未暇制服向者王都背叛連結邊戎陛下命將得人俾匹馬不回使其畏懼而修朝貢則知皇威所振邁于前古也周世宗顯德四年五月癸卯翰林學士兵部侍郎知詔誥陶穀進紫芝白兔頌曰陛下嗣位之元年歲次甲寅薄伐太原興六月之師定王業也虎賁振旅兵度孟津汜水獻紫芝三莖曄曄分化惹度關之氣越三載歲在丙辰親征淮夷破十萬之衆宣武功也戎輅旋軫途次商唐穎州獻白兔一頭皎皎效質凝照社之光謹案瑞應圖曰王者恩霑行葦則紫芝秀五行傳曰國君德及昆蟲則白兔馴上宴息之暇有時臨玩覩禎祥而修德善馴擾之遂性三者昭萬物肇生之數白者叶太素返朴之義芝為瑞也左盤右屈而自然成形兔之異也或白或蒼亦不常其色豈可使曠代嘉瑞來者無聞今聖君儉德罷露臺至仁祝疏羅重林衡不時之禁則草木茂矣崇宗廟礿祭之禮則禽魚樂矣若然則朱草蓂莢將擢秀於庭際丹鳳麒麟豈空遊於郊藪下臣不佞再拜作頌頌曰美哉靈草邈矣明視慶上帝之所臨昭王者之嘉瑞考其祥稽其事芝為草也豈奪朱而效靈兔乃獸焉取守黑而為異徵其薦瑞之日俱在回鸞之次酌物情順天意吾君當垂衣而治
