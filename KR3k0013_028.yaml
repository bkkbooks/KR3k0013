body:
  text: 奉先一奉先一傳曰慎終追遠民德歸厚矣乃有聯華帝胄齒于宗盟景命弗融遘茲短歷或未極封爵之制或不及光華之旦或遭罹橫枉沉痛載懷或帝構艱難勳業靡究繇是舉敦旅之義申追命之典以至胙土建國節惠易名加尊極之稱升儲副之號備物典策寵章渥縟斯王者興仁敦睦化下美俗之道又豈止厚親親之恩而已哉有虞氏禘黃帝而郊嚳祖顓頊而宗堯禘郊祖廟謂祭禮以配食也有虞以前尚德故配用有德者臣欽若等按史記舜名重華父曰瞽瞍瞽瞍父曰蟜牛蟜牛父曰句望句望父曰敬康敬康父曰窮蟬窮蟬父曰帝顓頊顓頊父曰昌意昌意父曰黃帝自黃帝至舜凡九世也夏后氏禘黃帝而郊鯀祖顓頊而宗禹夏氏以下稍用其姓代之臣欽若等按史記禹之父曰鯀鯀之父曰顓項殷人禘嚳而郊夏祖契而宗湯臣欽若按史記帝嚳生契為殷祖自契之至冥六世也冥為司玄勤其管事死于水中殷人郊之太甲修德諸侯咸歸故稱太宗太戊時殷復興諸侯歸之故稱中宗祖庚時嘉武丁之以祥雉為德立其廟為高宗遂作高宗彤日及訓武丁修政行德天下咸歡殷道復興故商頌那祀高祖成湯也烈祖祀中宗也玄鳥殷武祀高宗也長發大禘也周文王之祭也事死者如事生思死者如不欲生忌日必哀稱諱如見親祀之忠也如見親之所愛思死者如不欲生言思親之深也武王立追尊古公為太王季歷為王季九年上祭于畢一作十一年畢文王墓也東觀兵至于孟津為文王木主載以車中軍武王自稱太子發言奉文王以伐不敢自專也十一年王既克殷一作十三年柴于上帝祈於社設奠於牧室遂率天下諸侯執豆籩逡奔走追王太王亶父王季歷文王昌不以卑臨尊也上治祖禰尊尊也下治子孫親親也旁治昆弟合族以食序以昭穆別之以禮義人道竭矣成王即位周公相王王道大洽制禮作樂禘嚳而郊稷祖文王而宗武王郊祀后稷以配天宗祀文王於明堂以配上帝四海之內各以其職來助祭故周頌思文后稷配天也天作祀先王先公也清廟祀文王也我將祀文王於明堂也執兢祀武王也豐年秋冬報也有瞽始作樂而合乎祖也潛季冬薦魚春獻鮪也雍禘太祖也大雅生民尊祖也后稷生於姜嫄文武之功起於后稷故推以配天焉其詩曰后稷肇祀庶無罪悔以迄于今王既即政以朝享之禮告于祖廟故周頌閔豫小子嗣王朝於廟也烈文諸侯助祭也載諸侯始見于武王廟也訪落嗣王謀於廟也王既在新邑蒸載祭歲文王騂牛一武王騂牛一王命作冊逸祝冊惟告周公其後王賓殺禋咸格王入太室祼漢高帝五年二月追尊先媼曰昭靈夫人十年八月令諸侯王皆立太上皇廟于國都惠帝以高祖十二年五月即位上高祖尊號曰高皇帝令郡國諸侯王立高祖廟是年帝為東朝長樂宮及間往數蹕煩民作復道方築武庫南奉常叔孫通奏事因請問曰陛下何自築復道高帝寢衣冠月出游高廟子孫奈何乘宗廟道上行哉帝懼曰急壞之通曰人主無過舉今已作百姓皆知之矣願陛下為原廟渭北衣冠月出游之益廣宗廟大孝之本帝乃詔有司立原廟帝嘗出游南宮叔孫通曰古者有春嘗果方今櫻桃熟可獻願陛下出因取櫻桃獻宗廟帝許之文帝以高后八年閏九月即位前元年十月辛亥見于高廟景帝元年十月詔曰蓋聞古者祖有功宗有德制禮樂各有繇歌者所以發德也舞者所以明功也高廟酎奏武德文始五行之舞武德高祖所作也文始舜舞也五行周舞也武德者其舞人執干戚文始舞執羽籥五行舞冠冕衣服法度也孝惠廟酎奏文始五行之舞孝文皇帝臨天下通關梁不異遠方除誹謗去肉刑賞賜長老收恤孤獨以遂群生減嗜欲不受獻罪人不孥不誅亡罪不私其利也除宮刑出美人重絶人之世也朕既不敏弗能勝識此皆上世之所不及而孝文皇帝親行之德厚侔天地利澤施四海靡不獲福明象乎日月而廟樂不稱朕甚懼焉其為孝文皇帝廟為昭德之舞以明休德然後祖宗之功德施於萬世永永無窮朕甚嘉之其與丞相列侯中二千石禮官具禮儀奏丞相臣嘉等奏曰申屠嘉也陛下永思孝道立昭德之舞以明孝文皇帝之盛德皆臣等愚所不及臣謹議曰功莫大於高皇德莫盛於孝文皇帝高皇帝廟宜為帝者太祖之廟孝文皇帝廟宜為帝者太宗之廟天子宜世世獻祖宗之廟郡國諸侯宜各為孝文皇帝立太宗之廟諸侯王列侯使者侍祠天子所獻祖宗之廟請布天下制曰可武帝元封五年三月祀高祖于明堂以配上帝太始四年三月壬午祀高祖于明堂以配上帝癸巳祀孝景皇帝于明堂昭帝以後元二年二月即位謁高廟七月尊趙婕妤為皇太后起雲陵婕妤先葬于雲陽以就雲陽為起雲陵始元元年夏又為太后起園廟雲陽陵三年秋募民徙雲陵四年六月徙三輔富人雲陵賜錢戶十萬元鳳四年正月丁亥帝加元服見于高廟宣帝以元平元年七月即位謁高廟本始元年六月詔曰故皇太子在湖未有號諡湖縣名太子死於湖因即葬焉歲時祠其議諡置園邑有司奏請禮為人後者為之子也故降其父母不得祭尊祖之義也陛下為孝昭帝後承宗祖之祀制禮不踰間謹行視孝昭帝所為故皇太子起位在湖史良娣冢在博望苑北親史皇孫位在廣明廓北諡法曰諡者行之跡也愚以為親諡宜曰悼母曰悼后比諸侯王園置奉邑三百家故皇太子諡曰戾置奉邑二百家史良娣曰戾夫人置守冢三十家園置長丞周衛奉守如法以湖閿鄉邢里聚為戾園長安白亭東為戾后園廣明成鄉為悼園皆改葬焉二年六月庚午尊孝武廟為世宗廟武帝巡狩所幸之郡國皆立廟焉初帝欲褒先帝詔丞相御史曰朕以眇身蒙遺德承聖業奉宗廟夙夜惟念孝武皇帝躬仁誼厲威武北征胸奴單于遠遁南平氐羌昆明甌駱兩越東定歲貉朝鮮廓地斥境立郡縣百蠻率服欸塞自至珍貢陳於宗廟協音律造樂歌薦上帝封太山立明堂改正朔易服色明開聖緒尊賢顯功興滅繼絶褒周後備天地之禮廣道術之路上天報貺符瑞竝應寶鼎出白麟獲海效巨魚神人竝見山稱萬歲功德茂盛不能盡宣而廟樂未稱朕甚悼焉其與列侯二千石博士議有司遂請尊孝武帝廟為世祖廟奏盛德文始五行之舞天下世世獻納以明盛德武帝巡狩所幸郡國凡四十九皆立廟如高祖太宗焉元康元年五月立皇考廟益奉明園戶為奉明縣廣明縣也時有司復言禮父為士子為天子祭以天子悼國宜稱尊號曰皇考立廟因園為寢以時薦享焉益奉明園民滿于六百家以為奉明縣尊戾夫人曰戾后置園奉邑及益戾園各滿三百家又改葬衛后追諡曰思后置園邑三百家長丞周衛奉守焉元帝以黃龍元年十二月癸巳即位謁高廟建昭五年六月庚申復戾園七月庚子復太上皇寢園原廟高祖已自有廟在長安城中惠帝更於渭北作廟謂之原廟昭靈后武安王昭哀后衛思后園昭靈后高祖母也武安王高祖兄也哀后高祖妹也衛后戾太子母也竟寧元年三月癸未復孝惠皇帝寢廟園孝文太后孝昭太后寢園初永光四年九月罷衛思后園及戾園十月罷祖宗廟在郡國者諸陵分屬三輔五年十二月毀太上皇孝惠皇帝寢廟園建昭元年冬罷孝文太后孝昭太后寢廟先是貢禹奏言古者天子七廟今孝惠孝景廟親盡宜毀及郡國廟不應占禮宜正定天子是其議未及施行而禹卒其後丞相韋玄成等議太上孝惠廟皆親盡宜毀奏可議者明年玄成復言孝文太后孝昭太后寢祠園宜如禮勿復修奏可後歲餘帝寢疾夢祖宗譴罷郡國廟帝少弟楚孝王亦夢焉至是帝疾連年遂盡復諸所罷寢廟園皆修祀如故是年五月帝又毀太上皇孝惠孝景廟竝太后廟成帝以竟寧元年六月即位謁高廟河平元年九月復太上皇寢廟園是時博士平當上書臣聞孔子曰如有王者必世而後仁世三十年三十年之間道德和洽制禮興樂災害不成禍亂不作今聖漢受命而王繼體承業二百餘年孜孜不怠政令清矣然風俗未和陰陽未調災害數見意者大本有不立與何德化休徵不應之久也禍福不虛必有因而至者焉宜深跡其道而務修其本昔者帝堯南面而治先克明峻德以親九族而化及萬國孝經曰天地之性人為貴人之行莫大於孝孝莫大於嚴父嚴父莫大於配天則周公其人也夫孝子善述人之志周公既成文王之業而制禮作樂修嚴父配天之事知文王不欲以子臨父故推而序之上極於后稷以配天此聖人之德亡以加於孝也高皇帝聖德受命有天下尊太上皇猶周文武之追王太王王季也此漢之始祖後嗣所宜尊奉以廣盛德孝之至也書云王稽古建功立事可以永年傳於亡窮太誓之辭帝納其言故下詔復太上皇寢廟園哀帝以綏和二年四月丙午即位謁高廟尊定陶恭王為恭皇建平二年四月詔曰漢家之制推親親以顯尊尊定陶恭皇之號不宜復稱定陶立恭皇廟于京師六月庚申帝太后丁氏喪詔曰朕聞夫婦一體詩云榖則異室死則同穴谷風之節昔季武子成寢杜氏之殯在西階下請合葬而許之事見禮記檀弓篇附葬之禮自周興焉孔子曰合葬非古自周公以來未之有改也郁郁乎文哉吾從周孝子事亡如事存帝太后宜起陵恭皇之園遂葬定陶平帝以元壽二年九月辛酉即位謁高廟元始四年正月郊祭高祖以配天宗祀孝文以配上帝夏尊孝宣廟為中宗孝元廟為高宗世世獻祭五年正月夾祭明堂諸侯王二十八人列侯二十人宗室子九百餘人徵助祭後漢光武建武元年六月即位于鄗今趙州鄗邑縣十月車駕入雒陽幸南宮卻非殿遂定都焉雒陽城有十二門其正南一門曰平風門平風門為官門不置候置屯司馬秩千石北宮屬衛尉其餘上西門雍門廣陽津門小苑門開陽門耗門中東門上東門穀門夏門凡十一門雒陽二十四街街一亭十二城門門一亭也二年正月立高廟于雒陽四時祫祀高祖為太祖文帝為太宗武帝為世宗如舊餘帝四時春以正月夏以四月秋以七月及臘一歲五祀光武都雒陽只合祖廟以下至平帝為一廟藏十一帝主于其中元帝次第八光武第九元帝為祖廟後遵而不改是年以皇祖皇考墓為昌陵置陵令守視後改為章陵因以春陵為章陵縣三年正月辛巳立親廟雒陽祀父南頓君以上至春陵節侯四廟二月己未以赤眉降祠高廟受傳國璽十月壬申立春陵祠園廟五年七月丁丑幸沛祠高祖原廟詔修復西京園陵代廟者及皇考廟事下公卿博士議郎大司徒涉等議宜立平帝哀帝成帝元帝廟奉所代今親廟父直以上親入廟兄弟以下使有司祠宜為南頓君立皇考廟祭上至春陵節侯群臣奉祠時議有異不著上可涉等議詔曰以宗廟處所未定且祫祭高廟其成哀平且祠長安故高廟其南陽春陵歲時各且因故園廟祭祠原廟去太守治所遠者在所令長行太守事侍祠惟孝宣帝有功德其上尊號曰中宗於是雒陽高廟四時加祭孝宣孝元五帝其西廟成哀平三帝主四時祭於故高廟東廟京兆尹侍祠冠衣車服如太常祠陵廟之禮南頓君以上至節侯皆就園廟南頓君稱皇考廟巨鹿都尉稱皇祖考廟鬱林太守稱皇曾祖考廟節侯稱皇高祖考廟在所郡縣侍祠二十二年閏正月幸長安祠高廟遂有事十一陵中元元年四月幸長安祀長陵十月甲申使司空告祠高廟六年四月丙子幸長安始謁高廟遂有事十一陵十年正月修理長安高廟八月幸長安祠高祖遂有事十一陵十一年二月己酉幸南陽還幸長陵祠園陵十五年四月戊申以太牢告祠宗廟十七年十月甲申幸長陵修園廟祠又為春陵宗室起祠堂十八年三月壬午祠高廟遂有事十一陵十月庚辰幸宣城還祠章陵立考侯康侯廟北園陵置嗇夫夫本即官主知賦役多少平其差品園陵置之知祭祀徵求諸事詔零陵郡奉祠節侯戴侯廟以四時及臘歲五祀焉置嗇夫佐吏各一人十九年正月庚子追尊孝宣皇帝曰中宗始祠昭帝元帝於太廟成帝哀帝平帝於長安春陵節侯以下四世於章陵時五官中郎將張純與太僕朱浮奏議禮為人子事太宗降其私親禮之設施不授之與自得之異意當除今親廟四孝宣皇帝以孫後祖為父立廟於奉明曰皇考廟獨群臣侍祠願下有司議先帝四廟當約非劉氏不王呂太后賊害三趙專王呂氏賴社稷之靈祿産伏誅天命幾墜危朝更安呂太后不宜配食高廟同祧至尊薄太后母德慈仁孝文皇帝賢明臨國子孫賴福延祚至今其上薄太后尊號曰高皇后配食地祗遷呂太后廟主于園四時上祭明帝即位以光武皇帝撥亂中興更為起廟上尊號曰世祖廟蔡雍表志孝明立世祖廟以明再受命祖有功之義後嗣遵儉不復改立皆藏主其中聖明所制一王之法也自執事之吏下至學士莫能知其所以兩廟之意誠宜具録本事建武乙未元和丙寅詔書下宗廟儀及齊令宜入郊祀志以為典式以元帝於光武為穆故雖非宗不毀也後遂為常永平元年正月帝率公卿以下朝於原陵如元會儀二年正月辛未宗祀光武皇帝於明堂帝及公卿列侯始服冠冕衣裳玉珮絢屨以行事漢官儀曰天子冠通天諸侯王冠遠遊三公諸侯冠進賢三梁卿大夫尚書二千石博士冠兩梁二千石以下至小吏冠一梁天子公卿特進諸侯祀天地明堂皆冠平冕天子十二旒三公九卿諸侯十其纓如其綬色玄衣纁裳周禮曰王祀昊天上帝則服大裘而冕祀五帝亦如之三禮圖曰冕以四十升以布漆為之廣八寸長尺六寸前圓後方前下後高有俯伏之形故謂之冕欲人之位彌高而志彌下故以名焉董巴輿服志曰顯宗初服冕衣裳以祀天地衣裳以玄上纁下乘輿備文曰月星辰十二章三公諸侯用山龍九章卿以下用華蟲七章皆五色采乘輿刺繡公卿以下皆織成陳留襄邑獻之徐廣輿服注曰漢文帝案古禮備其服章天子郊廟衣皂上絳下前三幅後四幅衣畫而裳繡禮記曰古之君子必佩玉君子於玉比德焉天子佩白玉諸侯佩玄玉大夫佩水蒼玉世子佩瑜玉周禮履人掌玉赤舄青絢鄭玄注曰赤舄為冕服之舄也絢履鼻頭以青采飾之三禮圖曰屨復下曰舄其色各隨裳色十月甲子西巡狩幸長安祠高廟遂有事於十一陵三年十月蒸祭光武廟冬祭曰蒸衆也冬物畢成可祭者衆初奏文始五行武德之舞甲子車駕從皇太后幸章陵十一年閏四月甲午南巡狩幸南陽祠章陵十五年三月辛卯幸大梁至定陶祠定陶恭王陵十七年正月當謁元陵夜夢先帝太后如平生歡既寤悲不能寐即案曆明旦日吉遂率百官及故客上陵其日降甘露於陵樹帝令百官采取以薦會畢帝從席前伏御床視太后鏡奩中物感動悲泣令易脂澤裝具左右皆泣莫能仰視焉是年公卿百官以帝威德懷遠祥物顯應乃竝集朝堂奉觴上壽帝曰其敬舉觴太常擇吉日策告宗廟和帝以章和二年二月壬辰即位三月辛酉有司上奏孝章皇帝崇弘洪業德化普洽垂意黎民留念稼穡文加殊俗武暢方表咸惟人面無思不服巍巍蕩蕩莫與比隆周頌曰於穆清廟肅雍顯相請上尊廟曰肅宗其進武德之舞制曰可四月丙子謁高廟丁丑謁世祖廟永元十年十一月癸卯祠高廟遂有事十一陵九年追諡帝母梁貴人曰恭懷皇后貴人父竦為章德竇后所陷坐誅貴人娣妹以憂卒后養帝為己子及后喪未及葬而梁貴人姊嫟上書陳貴人枉歿之狀太尉張酺司徒劉方司空張奮上奏依光武黜呂太后故事貶太后尊號不宜合葬先帝百官亦多上言者帝手詔曰竇氏雖不尊法度而太后常自減損朕奉事十年深惟大義禮臣子無貶尊上之文恩不忍離義不忍虧案前世上官太后亦無降黜其勿復議於是合葬敬陵帝以貴人酷歿斂葬禮闕乃改殯於承光宮上尊諡曰恭懷皇后追服喪制百官縞素與姊大貴人俱葬西陵儀比敬園以竇后配食章帝恭懷后別就陵寢祭之十五年十月戊申幸章陵祠舊宅園廟殤帝延平元年三月甲申尊孝和皇帝廟曰穆宗安帝以延平元年八月癸丑即位九月庚子謁高廟辛丑謁光武廟永初元年三月葬清河孝王王名慶安帝之父也贈龍旗虎賁建光元年三月有司上言清河孝王至德淳懿載育明聖承奉丕祚為郊廟主漢興高皇帝尊父為太上皇宣帝號父為皇考序昭穆置園邑太宗之義舊章不忘宜上尊號曰孝德皇皇妣左氏曰孝德皇后祖妣宋貴人追諡曰敬德皇后乃告祠高廟使司徒持節與大鴻臚奉策書璽綬清河追上尊號又遣中常侍奉太牢祠典護禮儀侍中劉珍等及宗室列侯皆往會事尊陵曰甘陵廟曰昭廟置令丞設兵車周衛比章陵復以廣川益清河園敬德後陵曰敬北陵延光三年二月丙子東巡狩丁丑告陳留太守祠南頓君光武皇帝於濟陽辛卯幸太山癸巳告祠二祖六宗二祖四宗前已解詔又孝元高宗孝章肅宗四月乙丑還宮假於祖禰十月行幸長安四月乙未祠高廟遂有事十一陵遣使者祠太上皇于萬年四年三月庚申幸宛帝不豫令太將軍耿寶行太尉事祠章陵園廟告長沙零陵太守祠定王節侯鬱林府君是月安帝晏駕初帝以讒害大臣廢太子及是無上宗之奏後自建武以來無毀者故遂嘗祭因以其陵號稱恭宗也順帝以延光四年十一月丁巳即位壬申謁高廟癸酉謁光武廟永建二年六月己酉追尊諡皇妣李氏為恭愍皇后葬于恭北陵先是李氏為閻太后鴆殺瘞在雒陽城北帝初不知莫敢以聞及太后葬左右白之帝感寤發哀親到瘞所更以禮殯之尊諡于策書金匱藏于世祖廟三年七年丁酉茂陵園寢災帝縞素避正殿辛亥使太常王龔持節告祠茂陵永和元年正月己巳宗祀明堂二年十月行幸長安十一月丙午祠高廟丁未遂有事十一陵漢安元年正月癸巳宗祀明堂沖帝以建康元年八月即位九月有司奏孝順皇帝弘秉聖哲龍興統業稽乾則古欽奉鴻烈寬裕宴宴宣恩以極躬自菲薄以崇玄默遺詔貽約顧念萬國衣無制新玩好不飾塋陵損狹不起寢廟遵履前制敬敕有司經曰愛敬盡於事親而德教加于百姓詩云敬慎威儀惟民之則臣請上尊號曰敬宗廟天子世世獻奉藏主祫祭進武德之舞如祖宗故事奏可質帝以永嘉元年正月丁巳即位甲申謁高廟乙酉謁光武廟桓帝以本初元年閏六月庚寅以清河孝王孫即位七月辛巳謁高廟光武廟時梁太后攝政以沖質二帝皆不享壽用殤帝故事就陵寢祭凡祠廟命三公分祭之九月戊戌追尊皇祖河間孝王曰孝穆皇夫人趙氏曰孝穆皇后廟曰清廟陵曰樂成陵皇考蠡吾侯曰孝崇皇廟曰烈廟陵曰博陵尊帝母匽氏為博園貴人臣欽若等曰事具帝王尊親門皆置令丞使司徒持節奉策書璽綬祠以太牢建和二年四月丙子封帝弟顧為平原王奉孝崇皇祀元嘉二年四月甲寅孝崇皇后匽氏喪以帝弟平原王后為喪主斂以東園畫梓壽器玉匣飯含之具禮儀制度比恭懷皇后使司徒持節大長秋奉弔祠賻錢四十萬布四萬匹中謁者僕射典護喪事侍御史護大駕鹵薄詔安平王豹河間王建渤海王悝長杜益陽二長公主與諸國侯三百里內者及中二千石二千石令長相皆會葬將作大匠復土繕廟合葬博陵延熹元年六月丙戌分中山置博陵郡以奉孝崇皇園陵博陵城今在瀛州博野縣也後徙安平二年十月行幸長安十一月丙午祠高廟丁未遂有事十一陵靈帝建寧元年正月庚子即位二月辛酉上孝桓皇帝尊號廟曰威宗庚午謁高廟辛未謁世祖廟閏二月甲午追尊皇祖淑為孝元皇夫人夏氏為孝元皇后陵曰敦陵廟曰靖廟皇考萇為孝仁皇尊夫人董氏為慎園貴人陵曰慎陵廟曰敻廟皆置令丞使司徒持節之河間奉策書璽綬祠以太牢常以歲時遣中常侍持節之河間奉祠是時京都四時所祭高廟五主世祖廟七主七主二字原在下文少帝後據後漢書祭祀志乙少帝少帝二字原在七主前據後漢書祭祀志乙三陵追尊后三陵凡牲用十八太牢殷祭之歲出祖廟主皆合于高廟如毀廟三太牢皆有副牲故高廟三主親毀之後亦俱殷祭之歲奉祠自建武以來關西諸陵以遠但四時牲帝每事長安謁諸陵乃太牢祠自雒陽諸陵至靈帝皆以晦望二十四氣伏臘及四時祠廟日上飯太常送用物園令食監典省其親陵所宮人隨鼓漏理被枕具災水陳嚴具獻帝興平元年加元服有司奏立長秋宮詔曰朕稟受不弘遭值禍亂未能紹先以光故典皇母前薨未卜宅兆禮章有闕中心如結三歲之戚蓋不言吉且須其後初帝母王美人為何皇后所殺於是有詔乃奏追尊王美人為靈懷皇后改葬文昭陵儀比敬恭二陵初平中相國董卓左屮郎將蔡雍等以和帝已下功德無殊而有過著不應為宗及餘兆宗者追尊三后皆奏毀之四時所祭高廟一祖二宗及近帝四凡十一帝
