body:
  text: 符瑞四符瑞四唐肅宗以天寶十五載七月即位于靈武改元至德是年九月三日帝降誕之辰有慶雲屬天白鶴飛舞於上所居殿宇翱翔二十餘匝而去十一月辛未長安雲氣如衣冠備具太史奏天下和平之象二年七月朔方節度郭子儀奏寧朔縣界荒地廣十五里有黑禾穀出遍地每日側近百姓掃盡經宿還生前後可得五六千石其禾圓實味甘美臣以為天啓興王瑞先百穀故漢稱雨粟周頌來牟豈瑞禾自出家給人足蓋陛下富教安人務豐敦本光復社稷康濟黎元之應也臣不勝大慶八月乙未太史奏其日老人星見光潤明澤十二月癸亥帝受國璽太清宮晨有紫雲見從殿東南角稍至殿前乾元元年四月甲寅帝親行享廟禮井祭昊天上帝禮畢有景雲見於日之南自卯及辰久而方散有頃朔方告破賊己未懷州刺史王奇光奏河內縣王升清種麥數畝皆一莖三穗丁卯太廟殿院北門內柱生芝草兩莖紫蓋七月庚寅朔方節度使郭子儀奏東京上陽西金華門外仗舍下見白鼠穴穿之得天子信寶一枚皆篆書背上雕刻青龍白虎朱雀玄武相盤以為帝德廣運乾道降祥璿圖永昌坤維耀寶請宣示朝廷詔曰我國家卜代悠久歷數無疆明神降休靈貺斯格昌符兆發寶印呈祥皇帝之徽號既彰天子之鴻名又信斯實纍聖致感上玄垂裕豈朕薄德所敢當仁卿國之大臣獲斯嘉瑞光我盛禮何慶如之三年五月嵐州上言合河關黃河水四十里間清如井水經四日而變十一月景寅左金吾衛大將軍王晟奏明鳳門有慶雲自欄桿上起盤旋紛郁光彩明耀門官皆睹焉上元二年七月甲辰延英殿御座生玉芝一莖三花御製玉靈芝詩三章八句八月戊辰夜老人星見其色黃明潤澤而大元年建子月戊戌冬至有雲迎日日揚光司天監韓穎奏謹按春秋感精符南至有雲迎日年豐之象建巳月壬子楚州刺史崔侁表獻定國寶玉十三枚一曰玄黃符如笏長八寸上圓下方近圓有孔黃玉也二曰玉雞毛文悉備白玉也三曰穀璧白玉也徑可五六寸其文粟粒無雕鐫之跡四曰西王母白環二枚白玉也徑六七寸六曰如意寶珠形圓如雞卵光如皎月七曰靺鞨大如巨粟赤如櫻桃八曰琅玕珠二枚長一寸六分十曰玉玦形如玉環四分缺一十一曰玉印大如半手斜長理如鹿形陷入印中以印物則鹿形著焉十二曰皇后採桑鉤長五六寸細如箸屈其末似金又似銀十三曰雷公石斧長四寸闊二寸無孔細緻如青玉十三寶置于日中皆白氣連天侁表云楚州寺尼真如者恍惚上升見天帝授以十三寶白中國有災宜以第二寶鎮之中書門下表賀詔曰太寶禎符時膺昌運皇天不祕紫府降靈敷上帝之耿光悟神祗之有鑒荷斯戩穀弘濟艱難冀與兆人同登壽域股肱奉上宗廟福豫豈唯朕躬致此嘉瑞卿咸有一德寅奉休徵將使發揮克諧輔弼所請宣示中外編入史冊者依乙丑詔元年宜改為寶應元年其楚州刺史井出寶縣官及進寶官量與進改隨進寶官典傔等各量與一子官宣示中外宜知朕意代宗寶應元年四月己巳即位其日有慶雲見初帝至飛龍廄座前有紫雲見雲中有三白鶴徊翔又有喜鵲鳴及將即位仗衛宿設夜分雲霧四合不辨咫尺既曉朝呼萬歲天地清朗非煙蒲空黃氣抱日咸以為聖感甲戌潞州獲赤雀獻之五月商州上言慶雲見七月己卯京兆府萬年縣獲三足烏獻之九月戊辰陝州上言黃河清是夜老人星見黃明潤澤司天少監瞿曇撰奏曰臣謹按春秋元命苞云老人星明則人主壽昌國多賢士常以秋分候於南郊所見合秋分之氣當天地之中伏望編諸史冊宣示朝廷從之甲午太州至陝州黃河清二百餘里澄徹見底戊戌太州嘉禾生異畝同穎獻之出示百寮廣德二年五月己酉河南府上言河陽縣界黃河清踰月不變十一月鎮南副都護寧齡先言合浦縣海內珠池自天寶元年以來官吏無政珠逃不見二十年間闕於進奉今年二月十五日珠還舊蒲臣按南越志云國步清合浦珠生此實國家寶瑞其地元敕封禁臣請採進許之永泰元年七月甲寅有三白鹿一白兔見于禁苑觀軍容使魚朝恩受命巡苑內屯田因獲之以獻朝恩上言請付史館編諸簡策手詔答曰白鹿白兔王者嘉瑞和平之應朕以寡德詎敢當焉卿及將士等務切軍儲克勤農畝上玄眷祐爰獲禎符所請付史館者依是月庚申京兆府上言鄂縣嘉禾生穗長一尺餘穗上粒生重疊如連珠八月戊子司天臺上言老人星見二年六月丁未是夜月重輪八月己酉秋分老人星見於景上黃潤明大十一月乾陵赤兔見獲而獻之大曆二年三月丁巳河中府獲玄狐獻之出示百寮八月庚子夜老人星見其色黃明而大十月己卯右羽林軍獲白雀獻之乙酉有醴泉出於京兆府之櫟陽飲者多愈痼疾己亥潞州長子縣嘉禾生兩莖同穗十一月己巳長至司天奏曰日色清明祥風四起請付所司從之三年正月晉州獲白雀獻之四月乾陵上仙觀三尊殿有兩雀銜柴及泥補葺殿之隙壞凡一十五處閏六月楊州上言和州歷陽縣有三烏同巢七月汴州獲白雀獻之閬州新井縣連理瓜生九月宣州獲白鼠三獻之十月太原府上言五色雲見及嘉禾生四年正月乙亥大雪平地盈尺百寮於宣政殿拜舞稱慶前年冬少雪故也三月潤州上元縣産芝草一莖四葉高七寸六月慶雲見於西郊五年四月癸巳廣州越州並言慶雲見丁未臺州言慶雲見五月己巳石州上言五色雲見六年七月己丑華州言甘露降道州上言五色雲見八月戊辰楚州上言芝草産于淮陰縣是夜老人星見其色黃明而大丁丑白兔見于太極殿之內廊獲之出示百寮九月丁酉沂州上言慶雲見十一月潭州上言長沙縣榮唐里樹下有瓜生同蒂連心永州上言湘源縣芝草生同根三莖合成一蓋十二月癸酉婺州上言嘉禾生一莖九穗一莖十二穗七年五月甲申毫州獲白雀六月丁亥蔡州言慶雲見是歲大稔八年四月壬申潞州上言玄宗十九瑞閣有白鶴來翔五月丁丑鳳翔府上言天興縣嘉禾生一莖二穗六月戊申梁州獲白雀二獻之庚辰廬州上言廬江縣紫芝草生一根兩莖一丈五尺又合肥縣棠梨樹上烏鵲同巢七月丙戌東都留守蔣澳上言太廟殿柱生芝草二莖太原府上言清源縣人韓景輝養冬蠶成繭詔給復終身甲午蔡州獲白鵲一獻之婺州上言金華縣李樹連理乙未蓬萊池獲毛龜出示百寮戊戌內侍省獲白鼠一出示百寮壬寅神策軍上言金天門外水渠中獲緑毛元龜獻之八月壬戌太原獲白鳥一白鵲一獻之庚寅亳州獲白鹿一白野雞一獻之滑州言靈昌縣連理瓜生及瑞麥一莖三穗九月丁丑京兆府上言梨樹及林檎樹並連理戊寅桂州上言芝草生是夜老人星見辛巳華州上言嘉禾生十月丁未襄州言芝草生庚戌楊州上言芝草生丁卯鳳翔府獲白鼠獻之太原府上言嘉禾生十一月鳳翔府上言天興縣禾生一莖三穗太原府上言壽陽縣嘉禾生兩莖同穗閏十一月丁未申州上言義陽縣芝草生乙丑衢州上言龍丘縣李樹上産芝草五莖成都府上言甘露降是月景子澤州上言嘉禾生是歲大有年九年二月庚午鄭州上言李樹上生芝草一莖三月癸卯毫州上言芝草生京兆府獲白鵲一獻之四月庚戌汝州上言甘露降甲午隴州獲白鵲一獻之五月丁巳隴州獲白鵲獻之京兆府上言瑞麥生九莖同穎七月丁酉廬州獲白鼠二舒州獲白雀一並獻之九月戊申晉州上言神仙縣慶唐觀柏葉松身樹已枯再生十月己巳申州上言芝草生辛卯鳳翔府上言嘉禾生一莖兩穗十一月癸亥福州獲白燕二獻之十二月戊寅寧州上言嘉禾生衡州上言李樹上芝草生莖連樹根丁亥婺州上言慶雲見十年正月壬寅冀州上言嘉禾生五莖生合為一莖乙巳處州上言李樹連理二月壬申江陵府上言芝草生壬午處州上言芝草生三月濠州上言芝草生鳳翔府獲白雀一獻之五月蜀州上言唐興縣李樹上芝草生三莖漢州上言李樹上芝草生一莖七月癸酉絳州上言芝草生八月己酉夜老人星見九月乙卯太原府上言嘉禾生十一年九月庚辰夜老人星見十二年正月乙丑渭北行營所獲赤雀二獻之壬申常州上言甘露降潔白凝泫味同飴蜜五月甲子成都府人郭遠因樵爂獲瑞禾一莖有文曰天下太平四字獻之以示百寮宰臣等奏賀曰頃者賊臣凶狡敢蔽聰明陛下以時發覺咸就誅放與人更始在物維新浹辰之間果獲佳應至德之化光賁草木太平之時遂形文字伏望藏於祕閣宣府史館從之六月癸未苑內獲白鼠一出示百寮九月戊午夜老人星見十月乙酉潭州上言慶雲見甲午陸州上言桐廬縣五色雲見十一月己酉蔡州上言汝陽縣芝草生紫莖黃蓋辛亥京兆府上言甘露降於城內靖恭坊之南街柳樹味如飴蜜十二月河中府上言臨晉縣嘉禾生四莖二穗德宗建中四年五月滑州濮州黃河清興元元年八月宋亳觀察使奏亳州貞元縣大空寺僧院李樹植來十四年長一丈八尺今春枝上忽聳高六尺周回似蓋九尺餘又先天觀玄元皇帝太后陵槐樹上有靈泉湧出六月忽有靈氣五色見於泉上貞元元年十一月京兆府奏有人於長興坊得玉璽文曰天子信璽中書門下表賀請付所司制曰可三年閏五月陝虢觀察使李泌獻瑞麥一莖五穗七月京兆府獻嘉禾異本同穗八月淄青節度使李納獻毛龜詔示百寮十二月同州沙苑監上言白鹿見四年四月宗正寺獻毛龜七月右神策軍獻瑞瓜三蔓合為一帶而生三瓜九月許州奏嘉禾芝草生五年五月宋州奏大麥一莖九岐者約一百餘本六年正月防州言櫪連理八月甲寅老人星見是月京兆府河南府並奏嘉禾異本同穎潮州上言芝草生連理李樹七年四月壬寅廣州言甘露降乙卯汴州獻白烏五月許州獻白烏八月同州言祥雲見九年五月辛卯左神策監州行營節度使胡堅右神策監州行營節度使張昌皆表奏初城監州鹵中獲懷土又置烽堡水路迥遠即時有兩廢鹽井悉生鹽事符聖德可謂天贊請宣付史館制曰可是月甲午鄆州言甘露降十年五月連州言慶雲見十一年二月同州獻五色雁六月河陽華州並獻白烏八月潞州獻白鵲九月成都言甘露降十一月潭州進赤烏十二年五月通州奏九樹甘露降六月京兆府進白鼠朗州進白烏七月丁酉東都留守進芝草甲辰滑州進白雀九月徐州奏嘉禾生十二月甲子左神策軍進白鵲丁亥許州進白獐十三年八月汴州進嘉禾九月癸亥懷州進嘉禾甲子幽州奏甘露降十月右神策軍進白雀十二月婺州奏廳前松樹甘露降十四年正月蔡州進瑞麥四月婺州奏甘露降閏五月乙丑滑州奏黃河清戊辰汴州進白烏九月丁未朔中書門下奏賀峨嵋獲白鷂丁卯中書門下奏賀苑中獲白鹿十五年正月潞州進白烏五月丁未延州進玄兔庚寅韓潭進白鼠七月鳳翔府雞足山慶雲見十八年五月眉州上言醴泉出八月徐州獻嘉禾白兔二十一年七月陝州獻紫芝成都府獻嘉禾辛卯潞州獻白雀憲宗以永貞元年八月即位明年正月改元元和元年盡十五年元和二年正月詔以湖南所獻古鼎付有司初永州百姓唐履昌于路側掘得古鼎重一百一十二斤異之故上獻八月戊辰老人星見七年十一月東川觀察使潘孟陽上言龍州武安川畬田中嘉禾生有麟食之復生麟之來一鹿引之群鹿隨焉光華不可正視使畫工就圖之井嘉禾一函以獻九年八月中書門下奏夏綏銀節度使今月八日因取土修城于西北角近倉掘得釜大小共計二百五十四並容六鬥已下五鬥以上俱無破損如新器物者伏以人天所資粒食為本錡釜之大火化是因今大軍方興此物自出則知何時藏瘞蓋神誘其衷今之彰呈豈天有所助聖作物感一何昭然望付史館從之穆宗長慶元年正月制曰師長庶工總詳六職重任久曠益難其人自非體參股肱位列鈞鼎盛引以知退致禮而加恩則授受之間何以允茲任也朝議大夫守門下侍郎同平章事襲徐國公蕭俯門承華袞位列清華用能周物志在佐時勤內署之論思肅南臺之綱紀朕初承天序擢處臺階推一心獻納之誠贊四方經營之績及此踰歲纍陳懇詞微恙所侵堅請難奪朕憂勤庶政親委大臣務厚始終以全進退既謝弼諧之任宜加端揆之崇爾宜戒之服我優秩可守尚書右僕射勳賜如故俯以西川節度使王播前任鹽鐵使日廣進財貨強名羡餘固位竊恩不憚清議及鎮益部又傾竭貢獻以圖臺衡宰相假文昌助之勢不可遏侻遂於閣內及延英屢諫不納乃以官進退冀帝感悟竟不從故有是拜三年四月同州言文宣王廟甘露降文宗太和元年十一月河中觀察使薛平奏當管虞鄉縣王賢鄉有白虎入靈峰觀謹按孫氏瑞應圖白虎者義獸也名騶虞王者德至鳥獸澤洞幽冥則見謹盡圖進上敕付所司三年十一月丁丑朔乙卯司天臺上言太陽當蝕不蝕宰臣率百官表賀六年七月河陽東川並奏慶雲見八月廣州奏六月二日慶雲見宣宗大中八年正月陝州黃河清昭宗文德元年九月雲韶殿前穿井得甘泉以示百寮群臣上表賀曰臣聞至德動天天乃垂甘露神功浹地地故出醴泉然猶兆自郊圻啓諸甸服未有因於改井得彼甘泉不離禁掖之中便是殿庭之側澄清若鏡汲引而固絶羸鉼香美如飴濟利而終期勿藥況銀床萬所玉甃千門味不可以和太羹美不足以調甘食若非皇帝陛下幽通井德明契天宮則何以華故從新致斯玄貺移鹹變若降此休禎臣等幸偶盛時叨塵寵祿思與堯年野老鑿以興歌願同漢水丈人汲而成藥哀帝天祐元年九月朱全忠進白兔一隻中書門下表賀曰今日東頭承旨常郁至奉聖旨者質素光而應候容潔朗以協時既昭耀於明庭實昭彰於聖德臣等覽晉中興書徵祥說曰白兔者月精也抱朴子云兔壽千歲滿五百歲則色白顧野王云王者恩加壽考則白兔見協太陰之瑞實表坤慈應千歲之祥雅符乾德伏以皇帝陛下膺圖纂嗣壓紐騰休紹祖宗之丕基示孝慈於衆彙敦禮耆老委任勛賢所以致八孔之效靈應三秋而發皓來從月窟疊霜毳以蒙茸獻自梁庭粲水毫而皎潔足以增輝瑞諜歸美皇猷聞天遠自於元勛拭曰共觀於多士豈比魯傳趙郡獨歌如練之詞實同晉獲壽春又繼凝鉛之詠詔曰上天眷祐靈㕙效珍道既協於坤慈祥乃彰於月窟雪霜是比皎皛可觀全忠道貫神明功高鼎鼐果因嘉瑞歸善天庭俾頒示於有司冀流光於不朽再三嘉玩歎注良深二年八月河南府奏雒苑谷水屯百姓馬會穀地內有嘉禾合穗謹隨表進者詔曰多稼如雲已稱大稔異畝同穎益表殊祥張全義尹正邦畿從容廊廟動必垂於惠化靜每著於燮調佐時之略彌章阜俗之風益顯爰昭玄貺可卜豐年訓農遐掩於衛文獻瑞迥同於唐叔載觀禎異尤切歎嘉仍付史館後唐莊宗同光元年十二月亳州太清宮道士奏聖祖玄元皇帝殿前枯檜再生枝畫圖以進宣示百官其表云按瀨鄉記此樹枯來莫知年代自高祖神堯皇帝武德二年太上老君見於晉州羊角山語樵人吉善行云為報唐天子吾是爾遠祖亳州曲仁里是吾降生之地有枯檜重榮唐祚永興高祖遂於羊角山置興唐觀其地改為神仙縣封羊角山為龍角既至亳州果有枯檜樹復生枝蓊鬱後因安祿山儹號之時萎悴及祿山殄滅玄宗翠華歸奏枝葉復榮今年十月中又於其上再生一枝約長二尺聳身直上迥出凌虛葉密枝繁獨異衆木敕當聖祖舊殿生枯檜新枝應皇家再造之期顯大國中興之運同上林仆柳祥既協於漢宣比南頓嘉禾瑞更超於光武宣標史冊以示寰瀛宜委本州太清宮副使常加檢察兼令功德使差道士一人往彼告謝仍付史館編録三年正月西都留守張筠奏昭應縣華清宮道士張沖虛狀四聖天尊院枯檜樹重生枝葉畫圖以進三月唐州奏淮瀆廣閏王廟前有兩樹東西相去七尺五寸其樹各出地亦七尺五寸兩樹相向連理五月許州進納兩岐麥一科其月汴州進兩岐麥兗州奏任城縣百姓大麥地內有兩岐三穗至四穗者八月丙子夜平明壽星見十一月青州符習奏萊州即墨縣人鄉貢士李夢徵室內柱上生芝草兩岐畫圖而進敕符習纍居藩翰屢顯政能靜以臨人寬而得衆撫裕已彰於惠愛輔時又致於休徵固得和氣潛蒸靈芝遽産同九莖而表瑞比三秀以呈祥載閲奏陳良深嘉歎三年三月振武節度使雒京內外蕃漢馬步使朱守殷奏臣修雒陽月波堤至立德坊南古岸得玉璽一面上進伏以皇帝陛下明德動天聖靈御宇遂使千年之瑞出於九地之間輝煥簡編光華帝道臣竊觀異瑞益表太平敕玉以呈祥印惟示信況坊名立德地近雒陽當鳳曆之再新與龜書而葉瑞獲茲至寶得自忠臣所宜載在簡編垂為盛美可送中書門下宣示百官宰相豆盧革等驗其篆文曰皇帝行寶四字圓方八寸厚二寸皆細交龍光瑩精妙莫知湮墜之由也謹按自秦漢以來天子之璽六文曰皇帝之璽皇帝信璽皇帝行璽天子之璽天子信璽天子行璽至玄宗時惡神器以璽為名改名國寶漢末董卓遷獻帝於長安燔燒雒陽宮袁術將孫堅攻卓收復京城營于城南軍士見甄宮井上有五色氣入懼不敢汲堅令浚井得漢傳國璽文曰受命于天既壽永昌方圓四寸細交五龍一角小缺王莽逼奪之時投地稍損議者意張讓劫帝出奔掌璽者投之甄井也自六璽之外有傳國璽即謂此受命璽也起於秦相李斯為之傳於高皇帝即漢末甄井所得即乘輿六寶之一也自隋末迄今喪亂弘多湮墜者恥而不言好事者落然無記吁哉守殷又於積善坊役所得古文錢四百五十六一十六文得一元寶四百四十文順大元寶守殷進納敕凡窺奇異盡繫休明所獲錢文式昭玄貺得一者佇歸於一統順天者式契于天心道煥一時事光千載殊休繼出信史必書宜付史館四月陝州柳溪樹連理五月陝州進白兔八月己卯司天奏老人星見十月癸亥司天奏老人星見其月密州諸城縣人徐霸送芝草兩莖嘉禾九穗刺史李紹嶽畫圖以進明宗天成元年十月巴州進嘉禾合穗井圖十一月密州獻芝草井圖宣示中書門下百寮稱賀二年四月郢州進白鵲五月癸亥懷州進白雀乙丑滄州進白鵲六月巴州進兩岐麥其月兗州進三足烏華州上言鄭縣羅文鄉百姓李存家有兩岐麥畫圖進上八月丁酉青州進芝草其月壬寅平明前壽星見于丙上三年九月閬州上言度支巡官陳知禮家生芝草兩本畫圖以進是月宰臣王建立進玉杯一隻上有傳家國寶萬歲杯字水運都將假洪趙實於臨河縣下得之四年七月遂州夏魯奇進嘉禾一莖九穗敕旨三秀靈芝標仙籍而罔資世務九莖嘉穀按地諜而實表豐年既呈殊異之祥雅葉治平之運宜付史館編記八月戊戌司天奏老人星見其色黃明長豐元年七月宿州進白兔以銀籠盛之八月丁未司天奏老人星見黃明潤大在井十一度時帝御便殿對宰臣因問曰司天奏老人星見卿等見否馮道曰老人壽星也每歲秋分見為常其色黃明則表聖壽臣等雖不見星出則定矣三年十月萊州即墨縣人王友家生芝草一莖三枝其枝又分兩岐或三岐上漸𨵗成片而圓色紫其片即為葉葉莖一色其表白高尺餘青州節度使進之井圖上又出宮中舊獻芝草四株其色莖葉皆同而枝葉多少為異耳末帝清泰三年六月洛州獻野繭二十斤晉高祖天福五年五月宋州貢瑞麥兩岐八月萊州芝草生六年八月登州蓬萊縣民楊蔚家芝草生畫圖進之七年四月甲寅朔避正殿不視朝司天前奏日蝕故也是月百官守司太陽不虧上表稱賀少帝天福八年有白鳥棲於作坊桐樹作坊使周務勍上言令捕而進之開武元年六月襄州獻白鵲漢高天福十二年二月辛未即位於晉陽乙酉陽曲縣令崔握遣主簿呂光鄴進白兔一隻帝覽而嘉之識者曰殷有白狼周有白魚唐有白雀皆為瑞況帝以乙卯降生而有此兆得不為大慶乎四月星宮奏有氣黃紫多龍鳳之狀塊莽盤旋不離城上識者曰天不能無雲而雨不能無氣而立今瑞氣如此劉氏其大昌盛乎隱帝乾祐二年四月穎州獻紫兔白兔皆緘之於櫝出示群臣六月潁州獻白鹿三年五月澶州衛南縣民王綰田麥兩岐凡十二莖二十四穗曹州乘氏縣民王豐麥一莖三穗周太祖廣順二年四月徐州以兩岐麥二十本來獻八月靈武獻嘉禾二銀盤世宗顯德元年正月朔日後景色昏晦日月多暈及帝即位之日天氣晴朗中外肅然五月丁亥是夕月重輪是月辛卯世宗親征河東午後慶雲見於西南既晡風雲雨雹起于東北五年二月登州貢芝草三枝十月登州刺史劉福進牟平縣畫到芝草圖一面十二月丁丑朔朗州上言醴陵縣玉仙觀山門中舊有田二萬餘頃久為山石閉塞昨於七月十七日夜有暴雷霹開其路復通詔褒之六年正月唐州民於野田中得玉璽玉紐本部遣使來上
