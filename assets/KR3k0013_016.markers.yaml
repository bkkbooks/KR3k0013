  - {type: variant, offset: 2452, length: 0, content: '', WYG: 者逆寇亂常悖違天紀六位回薄三光失序上皇南廵以避狄羣臣東没而面偽當此時也勇者不及奮智者不及謀則高祖太宗之業将墜於地矣上皇知聖嗣在昌人望大啓乃付陛下以天地之事将復高祖太宗之業告成功於天伏惟陛下至孝恭順格於天地不敢以剪逆夷難之務為上皇憂遂乃赫然龍驤雷動朔野以一旅之衆康天下之迍躬尭之聪明廣聼天下率禹之勤儉以先兆人孝通徳茂格于三極故蠻夷君長来庭于要荒之外五玊寳龜納錫于旌門之内其行如雲其植如山莫不裂眥致命開懐飲鏃死而後已實乃甘心是以瘈狗噬臍而遇毒奔鯨觸綸而皆斃大風一鼔而沴氣廓清斯實再造生人之極也陛下}
  - {type: page-break, offset: 2452, content: '', id: KR3k0013_WYG_016-9a}
  - {type: page-break, offset: 2452, content: '', id: KR3k0013_WYG_016-9b}
  - {type: variant, offset: 2452, length: 0, content: '', krp: 者逆寇亂常悖違天紀六位回薄三光失序上皇南廵以避狄羣臣東没而面偽當此時也勇者不及奮智者不及謀則高祖太宗之業将墜於地矣上皇知聖嗣在昌人望大啓乃付陛下以天地之事将復高祖太宗之業告成功於天伏惟陛下至孝恭順格於天地不敢以剪逆夷難之務為上皇憂遂乃赫然龍驤雷動朔野以一旅之衆康天下之迍躬尭之聪明廣聼天下率禹之勤儉以先兆人孝通徳茂格于三極故蠻夷君長来庭于要荒之外五玊寳龜納錫于旌門之内其行如雲其植如山莫不裂眥致命開懐飲鏃死而後已實乃甘心是以瘈狗噬臍而遇毒奔鯨觸綸而皆斃大風一鼔而沴氣廓清斯實再造生人之極也陛下}
  - {type: variant, offset: 2455, length: 0, content: '', WYG: 未至延俟鑾輿清宫待幸守而不失今上皇戾正昭徳報功廣聖人崇本之義徴王者未舉之禮百神奉職親受寳符過尭邁舜以慶天下以陛下有光上皇之徳經天下之文定禍亂之武窮不測之聖通神明之孝故命陛下曰光天文武大聖孝感皇帝皆象徳景行自然之符陛下尚執謙冲遷延若未當者今羣臣咸服睿謀肅将天下猶各有茅土銘勲景鍾陛下盛徳大業終古獨立不速即徽號以蔚皇圗臣恐天地神祗勤勞仰止臣謹與太常禮官等僉擇請以来嵗正月五日上尊號伏惟陛下膺天地之誠恭上皇之命遂羣臣之請滿百靈之心延光無窮天下幸甚詔曰朕以眇躬敬承明命兩遭狂胡擾亂宗社不寧禀上皇至聖之謀當仗鉞秉旌之任大師一振殘孽無遺上皇厭彼代紛棄兹人事萬邦之重俾付朕躬傳授寳符乃加徽號朕再三固讓實増黾勉恭膺典冊感慶良深覽卿等来章倍加祗懼依卿等所請三年正月戊寅太上皇御宣政殿授帝傳國寳符及受命寳符冊帝尊號曰光天文武大聖孝感皇帝上言曰陛下顧天位之累已推以付臣臣又畏天命以固辭期不奉詔未蒙詔許以辱四海而今加之徽號錫以洪名既受寳符又傳神器是重臣以不徳私臣以殊寵豈天地之容乎神人之望乎臣聞禮有常尊器不可假名無虚立義然後行頃以寇逆慿陵京闕失守撫軍監國事}
