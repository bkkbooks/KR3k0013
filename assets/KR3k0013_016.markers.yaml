  - {type: variant, offset: 2455, length: 0, content: '', krp: 未至延俟鑾輿清宫待幸守而不失今上皇戾正昭徳報功廣聖人崇本之義徴王者未舉之禮百神奉職親受寳符過尭邁舜以慶天下以陛下有光上皇之徳經天下之文定禍亂之武窮不測之聖通神明之孝故命陛下曰光天文武大聖孝感皇帝皆象徳景行自然之符陛下尚執謙冲遷延若未當者今羣臣咸服睿謀肅将天下猶各有茅土銘勲景鍾陛下盛徳大業終古獨立不速即徽號以蔚皇圗臣恐天地神祗勤勞仰止臣謹與太常禮官等僉擇請以来嵗正月五日上尊號伏惟陛下膺天地之誠恭上皇之命遂羣臣之請滿百靈之心延光無窮天下幸甚詔曰朕以眇躬敬承明命兩遭狂胡擾亂宗社不寧禀上皇至聖之謀當仗鉞秉旌之任大師一振殘孽無遺上皇厭彼代紛棄兹人事萬邦之重俾付朕躬傳授寳符乃加徽號朕再三固讓實増黾勉恭膺典冊感慶良深覽卿等来章倍加祗懼依卿等所請三年正月戊寅太上皇御宣政殿授帝傳國寳符及受命寳符冊帝尊號曰光天文武大聖孝感皇帝上言曰陛下顧天位之累已推以付臣臣又畏天命以固辭期不奉詔未蒙詔許以辱四海而今加之徽號錫以洪名既受寳符又傳神器是重臣以不徳私臣以殊寵豈天地之容乎神人之望乎臣聞禮有常尊器不可假名無虚立義然後行頃以寇逆慿陵京闕失守撫軍監國事}
  - {type: variant, offset: 2456, length: 2, content: 蜀朕, WYG: 一時正位居中尊無二上至於光天之業允文允武聖繇天作孝以感通臣何有焉此皆陛下之能事也曲成之惠在慈愛而愈深至公之道将詢謀而未叶伏望寝兹嚴命俯遂勤誠臣之下情不勝至願太上皇誥曰昊穹垂裕宗社發祥爾往在髫年素彰岐嶷泊乎問寝日増孝敬吾乆勤庶務嘗奉至真特好清虚尋将付託爾以華戎鋭士掃定神州功乃格天徳惟邁古是用受兹國寳加以大號典章斯集喜慰盈懐實謂道映前王何必志在讓禮克光丕業以副至公即斷来表帝再讓不允又以大聖二字非所當之言曰帝王者天所命也稱號者人所奉也惟有徳克躋大寳惟至聖始享鴻休於是乎人神形容其美行歌咏之不足或為之名焉伏惟陛下乾坤覆載河海潤澤道逹生靈惠懐蠻貊尊九廟以崇孝謁五陵以奉先禮二郊以嚴禋祠九宫以致敬刻石北京以揚祖烈泥金東嶽以告成功自三五以還歴選列辟聪明文武齊聖廣淵丕懿純殷孰與比議卓哉煌煌真聖人之表也夫天地至大不能定愆伏之序日月運行不能正薄蝕之變自狂孽開釁俶擾天紀與時消息為人請命舞干羽而氛祲永清垂衣裳而袵席無改納萬姓於仁夀之域朝百神於清穆之上窅然姑射之山思訪襄城之野斯又臣言之不及稽古所未聞羲軒唐虞何足以云今方推而不居為而不有付臣以宗廟重器錫臣以后王徽章何以克堪辭不獲命臣自奉明誥夙夜於邑以為名不可假尊不可踰敬承嚴㫖得為孝乎至於所託者深所荷者大不敢悉拒以違天􅇆而大聖二字得之不易求諸故實布在冊書伏望陛下顧兹當仁期以制義今王公侯伯卿士兆人詢謀僉同稽首闕下臣敢因衆人之議成小子之志上尊號於陛下曰太上至道聖皇天帝即命有司擇日奉行冊禮其錫臣帝號大聖二字伏願許停如臣言可以簡當所希採納如臣誠不足動天伏當待罪将以明授受之道辨上下之分不勝臣子下情懇願之極伏惟陛下俯垂允許以副四海之望表上不允又表曰陛下以宗社再安天下交泰付臣以神器授臣以寳符加臣以寵章錫臣以徽號君親之義惠下之道已彰臣子之心奉上之禮未足臣所以與王公卿士百辟兆人思垂裕後昆乃悉數前美仰陛下之行者衆星之拱北辰悦陛下之澤者百川之赴東海繇是累上尊號敢冒宸威陛下以無為之心不宰萬物抑而未允至於再三羣情顒顒罔知所措一昨辛夘賜誥命曰頻覽章表懇至難違爾寳命惟新洪名允集用加大聖之字克副昊天之心若成命無渝萬國同歡於翊戴儻固辭不已吾}
