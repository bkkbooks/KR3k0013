  - {type: variant, offset: 3606, length: 0, content: '', WYG: 領司徒侍郎録尚書事嘗别住華林之西隅與都亭官路密邇相接亦通後門帝每潛幸其所肆飲終日其寵如此又詳拜受因其私慶請帝帝頻幸南第御其後堂與髙太妃相見呼為阿母伏而上酒禮若家人臨出髙每拜送舉觴祝言願官家千萬年壽嵗嵗一至妾母子舍也}
