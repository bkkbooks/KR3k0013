  - {type: variant, offset: 7046, length: 0, content: '', WYG: 燒丹􅍳誥曰孝感之極通於神明傳於前史跡罕彰灼今日之事不其效歟吾比年服藥物比為金􅍳煮煉石英自經冦戎失其器用前日晚際思欲修營一昨早朝遽聞進奉有同符契若合神明此乃汝之因心測吾之本意豈惟此度前後非一則知惟睿作聖惟徳動天再闢寰區重㑹父子付托之際古今未聞色養之勤書册不載寤寐嘉歎深慰於懐宜頒示天下宣付史館帝上表謝曰臣伏奉恩命以臣所進藥器深合天心伏䝉特垂褒羙令頒示天下臣幸以菲才叨膺寳歴聖慈曲眷每事憂兢至於孝養之宜臣子常禮先意承㫖務達微誠不期進奉之時偶合聖㫖寕謂至誠能感事近前知以臣孝既繇衷物自冥應特加奬飾許載縑緗}
