  - {type: variant, offset: 3558, length: 302, content: 代廟者及皇考廟事下公卿博士議郎大司徒涉等議宜立平帝哀帝成帝元帝廟奉所代今親廟父直以上親入廟兄弟以下使有司祠宜為南頓君立皇考廟祭上至春陵節侯群臣奉祠時議有異不著上可涉等議詔曰以宗廟處所未定且祫祭高廟其成哀平且祠長安故高廟其南陽春陵歲時各且因故園廟祭祠原廟去太守治所遠者在所令長行太守事侍祠惟孝宣帝有功德其上尊號曰中宗於是雒陽高廟四時加祭孝宣孝元五帝其西廟成哀平三帝主四時祭於故高廟東廟京兆尹侍祠冠衣車服如太常祠陵廟之禮南頓君以上至節侯皆就園廟南頓君稱皇考廟鉅鹿都尉稱皇祖考廟鬱林太守稱皇曾祖考廟節侯稱皇高祖考廟在所郡縣侍祠二十二年閏正月幸長安祠高廟遂有事十一陵中元元年四月幸長安祀長陵十月甲申使司空告祠高廟, WYG: ''}
