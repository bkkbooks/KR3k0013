  - {type: variant, offset: 6888, length: 472, content: 朕又聞之安安而能遷民用丕變是故姬邑兩周如武王之意殷人五徙安成湯之業若不因民順天功業見乎變愛民治國者可不喟與然雒邑自古之都王畿之內天地之所合陰陽之所和控以三河固以四塞水陸通貢賦等故漢祖曰吾行天下多矣唯見雒陽自古皇王何嘗不留意所不都者蓋有繇焉或以九州未一或以困於府庫作雒之制所以未暇也我有隋之始便欲創茲日復一日粵暨于今永懷先旨興言感哽朕肅膺寶曆纂臨萬邦遵而不失思奉先志今者漢王諒悖逆毒被山東遂使州縣或淪非所此繇關河懸遠兵不赴急加以竝州移戶復在河南周遷殷民意在於此況復南服遐遠東夏殷大因機順動今也其時群司百辟僉諧厥議但成周墟瘠弗堪胥宇今可於伊雒營建東京便即設官分職以為民極也夫宮室之制本以便宜上棟下宇足避風露高臺廣廈豈曰適形故傳云儉德之恭侈惡之大宣尼有云與其奢也寧儉豈謂瑤臺瓊室方為宮殿者乎土階采椽而非帝王者乎是知非以天下奉一人乃以一人主天下也民惟邦本本固邦寧百姓不足君孰與足今所營搆務從節儉無令雕墻峻宇復起於當今欲使卑宮菲食將貽于後世有司明為條格稱朕意焉乃詔尚書令楊素納言楊逵將作大匠宇文愷營建東京徙豫州郭下居民以實之又徙天下富商大賈數萬家於東京太, WYG: ''}
