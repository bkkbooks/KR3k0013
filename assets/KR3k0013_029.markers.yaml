  - {type: variant, offset: 1321, length: 0, content: '', WYG: 丙寅受禪丁卯追尊皇祖宣王為宣皇帝伯考景王為景皇帝考文王為文皇帝宣王妃張氏為宣穆皇后景王夫人羊氏為景皇后初宣帝為魏太傅晉國初建追尊曰景王文帝為大将軍録尚書事封晉王諡曰文王至是皆追尊號二年正月有司奏置七廟帝重其役詔宜權立一廟於是羣臣議奏曰上古清廟一宫尊逺神祗逮至周室制為七廟以辨宗祧聖㫖深𢎞逺跡上世敦崇唐虞舍七廟之繁華尊一宫之逺㫖昔舜承堯禪受終於文祖遂陟帝位盖三十載月正元日又格於文祖遂陟帝位此則虞氏不改唐廟因仍舊宫可依有虞氏故事}
