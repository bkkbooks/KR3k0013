body:
  text: 徵應徵應自古受命而王者莫不有徵應焉歲起攝提肇生天皇書契而下益章章矣故曰黃河清而聖人生里社鳴而聖人出群龍見而聖人用生既異稟則文王之在母不憂出既殊感則漢高以斬蛇自負用既響合則光武應白水之讖而中興矣傳曰天降時雨山川出雲嗜欲將至有開必先易曰雲從龍風從虎聖人作而萬物睹上自日月星辰下及昆蟲草木以時薦祉者何可勝道哉是知天人合契靈祗幽贊運之斯啟感而遂通乘時建事大勛以集蓋帝者之興未有不休徵先兆以表春命之符者也帝堯初為唐侯常夢攀天而上之帝舜耕於歷山夢眉長與鬚等夏禹初為司空觀於河有長人白面魚身出曰吾河精也呼禹曰文命治淫授禹河圖言治水之事乃退入于淵周文王父季歷之十年飛龍盈於殷之牧野此蓋聖人在下位將起之符也及為西伯作邑于豐文王之妃曰大姒夢商庭生棘太子發植梓樹於闕間化為松柏柞棫以告文王文王幣告群臣與發並拜吉夢季秋之甲子赤雀啣書及豐止于昌戶昌拜稽首授之其文要曰姬昌蒼帝子亡殷者紂武王伐紂度孟津中流白魚羅入王舟王俯取魚長三尺目下有赤文成字言紂可伐王寫以吉字魚文消燔魚以告天有火自天止于王屋流為赤鳥鳥啣穀焉穀者紀后稷之德火者燔魚以告天天火流下應以吉也遂東伐紂勝於牧野兵不血刃而天下歸之漢高祖初從王媼武負貰酒時飲醉臥武負王媼見其上常有怪高祖每酤留飲讎數倍及見怪歲竟此兩家常折券棄責後高祖以亭長為縣送徒驪山徒多道亡自度比至皆亡之到豐西澤中亭止飲夜皆解縱所送徒曰公等皆去吾亦從此逝矣徒中壯士願從者十餘人高祖被酒夜逕澤中令一人行前行前者還報曰前有大蛇當徑願還高祖醉曰壯士行何畏乃前拔劍斬蛇蛇分為兩道開行數里醉因臥後人來至蛇所有一老嫗夜哭人問嫗何哭嫗曰人殺吾子人曰嫗子何為見殺嫗曰吾子白帝子也化為蛇當道今者赤帝子斬之故哭人乃以嫗為不誠欲苦之嫗因忽不見後人至高祖覺告高祖高祖乃心獨喜自負諸從者日益畏之高祖隱於芒碭山澤間呂后與人俱求常得之高祖怪問呂后后曰季所居上常有雲氣故從往常得季高祖又喜沛中子弟或聞之多欲附者高祖既入咸陽范增令人望其氣皆為龍成五色此天子氣故勸項籍急擊之勿失沛公用項伯張良謀來謝得免高祖既為漢王二年項籍擊漢睢水上大破漢軍多殺士卒睢水為之不流圍漢王三帀大風從西北起折木發屋揚沙石晝晦楚軍大亂而漢王得與數十騎遁去陳餘襲破常山王耳耳敗走曰漢王與我有故而項王疆立我我欲之楚甘公曰善說星者甘氏也齊人漢王之入關五星聚東井東井者秦分也先至必王楚雖疆後必屬漢耳遂走漢又漢書載漢元年十月五星聚晉東井以歷推之從歲星也此高皇帝受命之符故客謂張耳曰東井秦地漢王入秦五星從歲星聚當以義取天下秦王子嬰降漢王於軹道漢王以屬吏寶器婦女亡所取竝封公門還軍欠于霸上以侯諸侯與秦民約法三章民亡不歸心者可謂能行義矣天之所予也五年遂定天下即帝位此明歲星之聚東井為秦地明效也文帝初為代王會丞相大尉共誅諸呂使行迎代王代王報太后計猶豫未定卜之兆得大橫龜曰兆筮曰卦卜以荊灼黽文正橫也占曰大橫庚庚余為天王夏啟以光庚庚橫貌其繇文也占謂其謠也先是五帝官天下老則襢賢至夏啟始傅嗣能光先君之業文帝亦襲父迹言似啟也繇音文敕切本作籀書也謂讀卜辭代王曰寡人故已為王又何王乎卜人曰所謂天王者乃天子也昭帝武帝少子也母曰趙倢妤本以有奇異得幸謂望氣者言有奇女子氣及召見手指拳上自披之即時伸及生帝亦奇異十四月乃生宣帝武帝曾孫在襁褓坐戾太子繫郡邸獄望氣者言長安獄中有天子氣帝遣使者分條中都官獄繫者輕重皆殺之內謁者令郭穰夜至郡邸獄丙吉拒閉使者不得入曾孫賴吉得以全幼時居數有光耀每買餅所從家輒大雔與售同亦以是怪初昭帝元鳳三年正月泰山萊蕪山南匈匈有數千人聲民視之有大石自立高丈五尺大四十八圍入地深八尺三石為足石立後有白鳥數千下集其旁昌邑有枯社木臥復生又上林苑中大柳樹斷枯臥地亦自立生有蟲食樹葉成文字曰公孫病已立時眭孟推春秋之意以為石柳皆陰類下民之象泰山者岱宗之嶽王者易姓告代之處今大石自立僵柳復起非人力所為此當有從匹夫為天子者枯社木復生故廢之家復生明公孫氏當復興者也孟意亦不知所在即說曰先師董仲舒有言雖有繼體守文之君不害聖人之受命漢家堯後有傳國之運漢帝宜誰差天下求索賢人誰問差擇也問擇天下賢人襢以帝位襢古禪字而退自封百里如殷周二王後以承順天命孟使友人內官長賜上此書內官署名百官表云內官長丞初屬少府中屬主爵後屬宗正賜者其長之名也時昭帝幼大將軍霍光秉政惡之下其書廷尉奏眭孟妄設妖言惑眾大逆不道皆伏誅後五年孝宣帝興於民間即位徵孟子為郎宣帝初名病已後漢光武皇考南頓君欽初為濟陽令以建平元年十二月甲子夜生光武於縣舍有赤光炤室中欽異焉使卜者王長占之長辟左右曰此兆吉不可言是歲縣界有嘉禾生一莖九穗因名光武曰秀明年方士有夏賀良者上言哀帝云漢家歷運中衰當再受命於是改號為泰初元年稱陳聖劉太平皇帝以厭勝之及王莽篡位忌惡劉氏以錢文有金刀故改為貨泉或以貨泉字文為白水真人後望氣者蘇伯阿為王莽使至南陽遙望見舂陵郭唶曰氣佳哉鬱鬱匆匆然及始起兵還舂陵遠望舍南火光赫然屬天有頃不見道士西門君惠李守等亦云劉秀當為天子更始立光武為大司馬狥河北以王郎新盛乃比狥薊晨夜兼行蒙犯霜雪天時寒面眥破裂至滹沱河無船適遇水合得過未畢數車而陷又王霸傳曰光武狥薊王郎起兵光武即南馳至下曲陽傳聞王郎兵在後從者恐及至滹沱河侯吏還白河水流澌無船不可濟官屬大懼光武令王霸往視之霸恐驚眾欲且前阻水還即詭曰冰堅可渡官屬皆喜光武笑曰侯吏果妄語也遂前北至河河水亦合乃令霸護渡未畢數騎而冰解光武謂霸曰安吾眾得濟免者卿之力也霸謝曰此明公至德神靈之祐雖武王白魚之應無以加此光武謂官屬曰王霸權以濟事殆天瑞也惶惑不知所之有白衣老父在道旁指曰弩力信都郡為長安守此去八十里光武即馳赴之信都太守任光開門出迎光武安帝自在邸第數有神光炤室又有赤蜿盤於床笫之間獻帝母王美人妊娠畏何后服藥欲除之胎安不動又數夢負日而行魏太祖之為魏王也先是熹平五年黃龍見譙光祿大夫橋玄問太史令單颺此何祥也颺曰其國後當有王者與不及五十年亦當復見天事常象此其應也內黃殷登默而記之至四十五年太祖為魏王登尚在文帝初為魏王延康元年三月黃龍見譙登聞之曰單颺之言其驗茲乎魏書曰王召見登謂之曰昔成封聞楚丘之繇而敬事季友鄧晨信少公之言而自納光武登以篤老服膺占術記識天道豈有是乎賜登穀一百斛遣歸家四月饒安縣言白雉見賜饒安田租勃海郡百戶守酒大酺三日太常以太牢祠宗廟八月石邑縣言鳳凰集又郡國十三言鳳凰見二十七言白虎見是年麒麟十見郡國晉武帝初為中撫軍魏咸熙元年六月鎮西將軍衛瓘至於成都得璧玉印各一枚文似成信字魏人宣示百官藏于相國府賈充聞之曰吾聞譙周之言先帝諱備其訓具也後主諱禪其訓授也如言劉已具矣當授與人也今中撫軍名炎而漢年極於炎興瑞出成都而藏之于相國府此殆天意矣是歲拜充為梓潼太守明年八月嗣相國晉王位是月長人見於襄武長三丈告縣人王始曰今當太平初張掖郡刪丹縣金山玄川溢涌寶石負圖狀象靈龜廣一丈六尺長一丈七尺一寸圍五丈八寸立于川西有石馬七其一仙人騎之其一羈絆其五有形而不善成有玉匣關蓋於其前上有玉字玉玦二璜一麒麟在東鳳鳥在南白虎在西犧牛在北馬自中布列四面色皆蒼白其南有五字曰上上三天王又曰述大金大討曹金但取之金立中大金馬一匹在中大吉開壽此馬甲寅述水凡中字六金字十又有若八卦及列宿孛彗之象焉搜神記曰初漢元成之世先識之士有言曰魏年有和當有開石於西三千餘里擊五馬文曰大討曹及魏之初興也張掖之柳谷有開石馬始見於建安形成於黃初文備於太和周圍七尋中高一仞蒼質素章龍馬麟鹿鳳凰仙人之象燦然咸著此一事者魏晉大興之符也至晉太始三年張掖太守焦勝上言以留郡本國圖較今石文文字多少不同謹具圖上按其文有五馬象其一有人平上幘執戟而乘之其一有若馬形而不成其字有金有合有中有大司馬有王有大吉有正又有開壽其一成行曰金當取之漢晉春秋曰氐池縣大柳谷口夜激波湧溢其聲如雷曉而有蒼石立水中長一丈六尺高八尺白石盡文為十三馬一牛一鳥八卦玉玦之象皆隆起其文曰大討曹適水中甲寅帝惡其討也使鑿去為計以蒼石窒之宿昔而白石滿焉至晉初其文愈明象皆煥徹如玉焉懷帝初誕有嘉禾生於豫章之南昌先是望氣者云豫章有天子氣其後竟以豫章王為皇太弟元帝以晉王即位始秦時望氣者云五百年後金陵有天子故始皇東遊以厭之改其地曰秣陵塹北山以絕其勢及孫權之稱號自謂當之孫盛以為始皇建於孫氏四百三十七載考其歷數猶為未及帝之渡江也乃五百二十六年真人之應在於此矣初有玄石圖有牛繼馬故宣帝初忌牛氏遂為二榼共一口以貯酒焉帝先飲者佳而以毒酒鴆其將牛金而恭王妃夏侯氏竟通小吏牛氏而生元帝咸寧初風吹太社樹折社中有青氣占者以為東莞有帝者之祥繇是徙封東莞王於瑯琊即帝祖武王也及吳之亡王濬實先至建鄴而皓之降款遠歸璽於瑯琊天意人事又符中興之兆帝初鎮建業郭璞為王導參軍導令璞筮之遇咸之井璞曰東北郡縣有武名者當出鐸以著受命之符西南郡縣有陽名者井當沸其後晉陵武進縣人於田中得銅鐸五枚柄口皆有龍虎形又有將雛諸雀集其前皆驅去復還至於再三又有鵝三四頭高飛且鳴周回東西晝夜不下如此者六七日豫章有大樟樹大三十五圍枯死積久永嘉中忽更榮茂又歷陽縣中井沸經日乃止及帝為晉王又使璞筮遇豫之暌璞曰會稽當出鐘以告成功上有勒銘應在人家井泥中得之繇辭所謂先王以作樂崇德殷薦之上帝者也及帝即位大興初會稽郯縣人果於井中得一棧鐘長七寸二分口徑四寸半上有古文奇書十八字云會稽徽命餘字時人莫識之樸曰蓋王者之作必有靈符塞天人之心與神物合契然後可以言受命矣觀五鐸啟號於晉陵棧鐘告成於會稽瑞不失類出皆有方豈不偉哉若夫鐸發其響應徵其象器以數臻事以實應天人之際不可不察初武帝伐吳瑯琊武王伸率眾出塗中而王渾逼歷陽王濬已次近路孫皓欲降送天子璽授近越二將而遠送詣伸識者咸怪之吳之未亡也吳郡臨平湖一旦自開湖邊得石函中有小青石刻作皇帝字舊言臨平湖塞天下亂開則天下太平吳人以為美祥俄而吳滅後帝興於江左康帝初為吳王成帝咸和六年五月曲阿有柳樹倒地六載是月忽復起生九年五月甲戌吳雄家有死榆樹是日因風雨起生與漢上林斷柳起生同象時雖改封瑯邪而猶食吳郡為邑是帝起體饗國之象也曲阿先亦吳地象見吳皆天意也孝武帝始四歲時哀帝興寧三年五月廬陵西昌縣修明家有死栗樹是日忽起生及得位垂統識者竊曰西昌修明之祥帝諱實應之矣孝武諱曜字昌明是與漢宣帝頗同象也後魏道武初生于參合陂明年有榆生于埋胞之坎後遂成林帝既為代王登國六年十二月出獵親獲鹿一角召問群臣皆曰鹿當二角今是諸國將竝之應也天興元年遂即皇帝位初聖武帝諱詰汾嘗率數萬騎田於山澤欻見輜軿自天而下既至見美婦人侍衛甚盛帝異而問之對曰我天女也受命相遇遂同寢宿旦請還曰明年同時復會此處言終而別去如風雨及期帝至先所田處果復相見天女以所生男授帝曰此君之子也善養待之子孫相承當世為帝王語訖而去子即始祖神元帝諱力微也故時人謗曰詰汾皇帝無婦家力微皇帝無舅家天興四年新興太守上言晉昌民賈相昔年二十二為雁門郡吏入句注西涇見一老父謂相曰自今以後四十二年當有聖人出於北方時當太平子孫永長吾不及見之言終而過相顧視之父老化為石人相今七十下檢石人見存至帝破慕容寶之歲四十二年後周太祖其先普廻因狩得玉璽三紐有文曰皇帝璽普廻異之以為天授後太祖為夏州刺史嘗從數騎於野忽聞蕭鼓之音以問從人莫之聞也賀拔岳為侯莫陳悅所殺太祖遂奄有其眾初岳營於河曲有軍吏獨行忽見一老翁鬢眉皓素謂之曰賀拔雖復據有此眾然無所成當有一宇文家從東北來後必大盛言訖不見此吏常與所親言之至是方驗隋高祖初生有尼來自河東謂皇妣曰此兒所從來甚異不可俗間處之將高祖舍於別館躬自撫養皇妣常抱高祖忽見頭上角出遍體鱗起皇妣大駭墜高祖於地尼自外入見曰已驚我兒致令晚得天下至周武帝時定州城西門久閉不開齊文宣帝時或謂開之以便行路帝不許曰當有聖人來啟之及隋高祖至而開焉莫不驚異唐高祖初仕隋為譙隴刺史善相者史良言於高祖曰公骨法非常必為人主至於命也非所敢知久之史良復遇高祖乃大驚曰骨法如舊年壽之相頓異昔時勿忘鄙言願深自愛高祖心益自負及為殿內少監時尚食奉御郭弘道善相高祖善之弘道因言曰公天中伏犀下接於眉此非人臣之相宜深自愛高祖取弘道銀盆置之於地引弓射之謂弘道曰向言有驗當一發中之既發應弦而中弘道曰願公事驗之日賜賞金盆高祖大悅後為太原留守鎮竝州時武士彠為司鎧參軍事詰朝嘗於街內獨行聞空中有人言曰唐公是天子士彠尋聲不見有人乃以此白高祖竝進兵書高祖悅之曰幸勿多言兵書禁物尚能將來深識好心當同富貴耳其夜士彠夢高祖乘馬上天旦以狀聞高祖大悅於是出入臥內委以心腹大業十三年起義兵於太原五月甲子慶雲見甲戌有白鳥飛入高祖之懷七年丙辰師次霍邑隋武牙郎將宋老生陳兵拒險義師不得進屯軍於賈胡堡會霖雨積旬餽運不給高祖患之忽有白衣老父詣軍門請見曰予霍山神遣語大唐皇帝若向霍邑當東南傍山取路八月雨止我當助爾破之高祖初哂之遣人東南視地果有微道高祖笑曰此神不欺趙襄子豈當負吾耶時有訛言云突厥將襲太原又軍糧且盡高祖命旋師太宗切諫乃止八月己卯雨果霽高祖大悅以太牢祭霍山庚寅次古堆去絳郡二十餘里有紫雲如華蓋樓闕之形正臨高祖之上癸巳次龍門縣河水變清白狐見十一月丙辰入京師尊代王為天子改元義寧元年高祖為唐王義寧二年二月辛卯安邑白鹿見甲午河池言慶雲見三月丙辰高祖汎舟於後池有魚二躍入舟乙丑趙郡公孝恭獻神龜背上有文曰萬國付某代代樂武德六年七月車騎將軍劉山濤上書高祖龍潛時數往來雒交之莊舍踐二石靴跡見於石中至今猶在高祖令鑿之深寸餘其跡愈明乃止初隋大業中有謠云桃李子洪水繞揚山煬帝疑李氏有受命之符故誅李金故李密據雒口倉欲其應讖隋文時自長安故城東南移於唐興村置新都令西內承天門正當唐興村門今有大槐樹柯葉森鬱即村門樹也有司以行列不正將去之帝曰高熲嘗坐其下不可去也太宗文皇帝以隋開皇十八年歲次戊午生於武功之別館初太宗在孕而語聲達於外后心異之將誕育后不之覺而太宗已生時有慶雲見瀰漫數里上屬於天二龍戲於門外水中經三日乃沖天而去見者驚焉大業十三年望氣者云龍門有天子氣連太原甚盛故煬帝置離宮數遊汾陽宮以厭之至是太宗稱述此事以白高祖既舉義師旦日太宗所居處有紫雲當其上俄變為五色狀如飛龍武德八年拜中書令嘗夜於嘉猷門側見一神人長數丈素衣冠呼太宗進而言曰我當令汝作天子太宗再拜忽因不見所居弘義宮中有一大池常作佳氣鬱然高數百尺太宗心獨異之至九年其氣轉盛上屬於天六月癸未克定內難立為皇太子萬機巨細皆令取決初太宗為秦王高祖制詩云聖德合天地五宿連珠見和風拂世民上下同歡宴帝於宮西造宅初成高祖送玉璽以至帝所縉紳先生相謂曰詩及玉璽蓋奉國之祥瑞者歟又有方士喬伏仁善言符命見建成元吉俱有爭心因謂所親曰秦王應天上錄當為元君此二人乃驅除耳果如其言鄎隱海陵之未發也太史奏云太白入南斗秦王得天下其鋒不可當自非皇天眷顧何以臻此高宗初為晉王貞觀十七年太子承乾得罪廢為庶人次當立者濮王太宗以晉王仁孝又以太原瑞石文云李治萬吉乃與長孫無忌房玄齡李勣褚遂良等定計立為皇大子睿宗初生於含涼殿則天乃於殿內造佛事有玉象焉及長遊觀其側玉象忽言爾後當為天子玄宗初為臨淄郡王景龍三年出為潞州別駕境有黃龍白日上升天又視事之際吏咸見赤龍據案嘗出畋有紫雲在其上從者望而奇之四年來朝京師將行使術士韓禮筮有一耆孑然獨立禮驚曰策立其瑞非常之事也貴不可言既行所過之處大人跡見州人皆異之先是帝所居宅外有池水浸溢頃餘望氣者以為龍氣是年四月中宗幸其第因遊其池結絲為樓船令巨象踏之及平內難日寅時潞州聞空中語曰臨淄王誅韋庶人相王得天下吏驚走遽白于刺史以掾吏狂妄留繫旬日會制到乃捨之帝自至潞州日抱戴月重輪嘉禾合穗李樹連理等凡十有九瑞開元二年六月左拾遺蔡孚獻龍池集王公卿士以下凡百二十篇請付太常寺其辭合音律者為龍池樂章以歌聖德從之初帝在藩與宋王等居于興慶里時人謂為五王子宅及景龍末宅內成池湧出汎艷清瑩流之不竭中有龜龍遊焉故群臣歌之八年鄭州人元承徵上封事曰謹按魏典及北齊至後魏太平真君年中內學者奏言上黨有天子氣在壺關大王山于時太武南巡親幸上黨掘山封石將以厭之亦猶秦始皇東遊望氣者云五百年後金陵有天子氣始皇乃改金陵為秣陵塹北山以絕其勢孫權僭號吳人以為當之孫盛晉陽秋云從始皇東遊之歲至孫權僣號之時中間四百三十七年數權末當應及晉元帝南渡始有五百二十六年以彼金行奄居四海金陵之瑞其在茲乎又按太武之後百有餘年高歡以內學之言復欲妄干符命因勒兵馬來在晉陽舍於壺關六旬而去更有上黨百姓從在晉陽因名上黨之坊實曰晉陽之地歡又居此偽以應之論其僭應則高歡不異於孫權語以虛攘則太武有同於嬴政暗于時運豈不惜哉臣等恭尋符命壺關天子之氣正是陛下當焉玄穹上睠符命下鍾故使歷試潞州所以用當其應此天意也豈人事乎然而一幸潞州三移灰琯壼關之地歲時為蒐狩之場大王之山朝夕即豫遊之所始能龍潛上黨尋乃鳳舉咸寧內學之言果合符契又按內學所奏符應年月太平真君太平則叶今辰真君則更明陛下自唐至魏三百餘年觸類而推無不驗應伏願陛下上承天意下諭人心昭告寰瀛編列國史從之肅宗初為皇太子天寶十五載六月安祿山陷潼關玄宗幸蜀發馬嵬於是百姓緇黃耆耇號泣於路捧御馬而言曰逆胡亂常凌逼城關遂令鑾輿遷幸臣祖父生于中華請率子弟從皇太子為國討賊東收長安遂留帝在後撫慰百姓遣壽王琩及高力士送內人衣物等帝初不忍辭上皇涕泣不住帝第三子建寧王及飛龍騎李輔國攏帝馬請帝住乃勸帝曰逆寇入城天下潰亂若殿下從主上赴巴蜀而賊等追蹤燒絕棧路則二京宗廟拱手而付狂賊欲招天下義勇之士而收復長安豈可得乎不有居者誰守社稷望殿下絕兒女之愛成天下之大計帝遂留令廣平王馳以奏玄宗遂依眾請兼言傳位帝讓而不受賊帥追至渭便橋以斷渭水初漲又無舟楫帝於水濱號令百姓願從者三千餘人因而涉渡南遇潼關散卒誤以為賊與之戰士多傷敗乃收其餘復濟渭而北帝過渭之後左右唯廣平王及六軍將士二千人自奉天北上夕次永壽縣老幼悲喜遮道獻牛酒至新平郡通夜奔馳三百餘里從者器械亡失過半所存之眾不過一旅遂止於郡是月帝至平涼郡遂大閱監牧得馬數千萬牛羊十萬餘頭又召募得五百餘人數日間未知所適朔方留後度支副使杜鴻漸奉牒具陳兵馬招集之勢竝錄軍資器械倉儲庫物之數令判官李拯至平涼謁見帝帝大悅又會河西行軍司馬新授御史大夫裴冕詔赴朝廷自河西亦具陳事勢勸帝之朔方帝然之七月辛酉至靈武於是裴冕杜鴻漸等勸進者五甲子帝即皇帝位於靈州郡城南樓改元至德元年以廣平王為天下兵馬元帥二年九月廣平王收西京十月帝還長安分段代宗初封廣平王天寶末玄宗幸蜀帝侍肅宗北巡時賊陷京城所在多虞帝蒙犯荊榛晝夜不離肅宗左右及玄宗遜位稱太上皇肅宗即皇帝位遂以帝為天下兵馬元帥帝以國步未康不敢更辭乃建幕府以吏部侍郎蘇震諫議大夫暢璀七罪反等為副使判官諸道節度郭子儀李光弼王思禮等咸受節制時朝廷草創兵無一旅肅宗布恩信收集師徒自靈州建大號移幸涇寧及岐數月間兵號十萬至德二年九月丁亥帝受命東討統朔方安西廻紇南蠻大食之眾二十萬鼓行而前將行百寮拜送于朝堂帝答拜既出當闕不乘馬步出木馬門而後登車觀者美之帝既撫軍志清寇難見廻紇王子葉護約為兄弟遇之甚厚葉護大喜壬寅大會于京城之西南香積寺之北連亙三十里營伍嚴整啣枚無聲以安西北庭行營節度使李嗣業為前軍朔方河西隴右行營節度使郭子儀為中軍關內行營節度使王思禮為後軍戈鋋鼙鼓震山耀野賊將安守忠李歸仁悉以前軍來逼我師殆亂前軍節度使李嗣業謂子儀曰今日之事若不以身啖寇讎決戰取勝三軍之士無孑遺矣言訖乃仗長刀立陣前解衣袒而大呼手殺數十人陣容方駐繇是前軍之士皆執長刀如墻而進所向摧靡先是賊伏一軍於營東候動則發偵者知之以告帝親率回紇銳卒剪其伏軍遂躡大營背與嗣業合勢表裹夾攻自辰及酉斬首六萬餘級賊軍大潰填溝澗而死者十七八長安城中賊黨震慄喧囂之聲終夜不止賊黨張通儒為賊居守聞忠等大敗遂與麾下竝賊偽官萬餘人宵遁西京平遲明帝乃整軍容入城城內百姓僧道老幼遮道歡呼咸曰不圖今日復見國家舊儀帝所至宣恩慰撫城內纖毫無犯乃命後軍王思禮屯兵于苑以清宮禁親率大軍而東時逆賊安慶緒盡出精銳十餘萬使其黨嚴莊張通儒合軍保陝州帝與副元帥郭子儀大將李嗣業王思禮等率廻紇南蠻大食等會戰于陝西賊軍大敗生擒斬馘十餘萬通儒等遁走慶緒聞之竊與其黨自苑北門夜遁奔于河朔東京平帝入東京陳兵于天津橋宣恩勞徠士庶歡躍聲震四遠河南河東諸州為賊所陷者皆歸順十月肅宗還京師發使奉迎玄宗至自蜀郡居興慶宮百司文物三宮容衛悉復舊儀皆帝之功也憲宗自廣陵郡王冊為皇太子時順宗即位已久而臣下未有親奏對者內外咸言王伾王叔文專行斷決日有異說又屬頻陰雨皆以為群小用事之應及將行冊禮之夕雨乃止至行事之時天景晴朗有慶雲見識者以為天意有所歸宣宗初封光王十餘歲時遇重疾沈惙忽有光曜燭身蹶然而興正身拱揖如對臣僚乳媼以疾聞穆宗往視之撫其手曰此吾家英物非心憊也賜以玉如意御馬金帶嘗夢乘龍升天言之於鄭太后乃曰此不宜人知幸勿復言懿宗初封鄆王嘗經重疾郭淑妃侍醫藥見黃龍出入臥內既間妃以異告帝曰慎勿復言又嘗大雪數尺而帝寢室之上獨無人皆異之大中末年京城小兒摺布蘸水向日張之謂之捩暈又宣宗曾製奏邊陲曲撰詞云海岳宴咸通至是帝以鄆王即位改元咸通書皆驗昭宗即位前一日於宅所居之邸東垣有紫氣二條若成文字俄於氣生之處發其垣獲金龍子一枚諸王及左右咸共觀見及聽政頒示百官後唐武皇初為太原節度使以昭宗景福二年十二月狩於近郊獲白兔有角長三寸莊宗初嗣晉王時長柳巷田家有桃樹伐已經年舊坎仍在其仆木一朝屹然而起行數十步復於舊坎其家驚駭蒼黃散走議者以漢昭帝時上林仆木起立生枝蟲蠹成文而宣帝興今木理成文仆而重起亦李氏中興之符也又天祐十七年幽州人於田中得金印文曰關中龜印李紹宏使人送於行臺議者曰關中列聖所都龜者卜年之物符璽傳授之龜湮落在田乃今復見蓋王者受命之符也十八年正月魏州開元寺僧傳其獲傳國寶一送於行臺傳真之師於廣明中遇京師喪亂得之緘秘已四十年篆文古體人不識之唯以珍物秘藏非以為國璽也興建初法物司妝市寶玉傳真將鬻之玉人識而嘆曰國寶之一也何至於斯傳真且喜送於行臺帝出之以示諸將驗其文即受命八字也光彩瑩曜希世罕工群僚諸將奉觴稱賀帝曰天祚有德錫之神器顧于眇末何敢當之止於緘藏俟其真人耳二十年正月丙子朔五臺山僧獻銅鼎二枚每容二斗言於山中石崖陊裂得之形器古異識者以為中興之瑞按西漢哀平之間扶風王延年獲銅鼎二枚赤色有光後光武誅新莽中興漢室鼎者帝王重器以異為瑞不必貢金九牧質重萬鉤以為異也明宗初在太宗左右嘗巡邊宿於雁門逆旅逆旅媼方娠帝至媼慢不時具食腹中兒謂母曰大家至速宜具食聲聞於外媼異之遽起親奉爨敬事尤謹帝曰媼前倨後恭詰之曰公貴不可言也問其故具道娠子腹語事帝曰慢嫗遜言懼于辱耳同光末自鄴回趍白皋渡將濟以度船甚少帝方憂之忽有木栰數隻沿流而至即用以濟師故無留滯焉末帝初在太原嘗與晉高祖因擊毬同入趙襄子之廟見其塑像屹然起立帝私心自負及為護國軍節度使一日夢明宗召至寢門與宋王各剃頭而退及寤以問賓吏皆無對者時雨池擢塩推官李專美在坐屏人謂帝曰將來嗣主必明公也帝心喜之又帝在岐陽日有前為判獄吏何叟者失其名年踰七十暴卒於家見一人為何曰陰府召君何隨之至一公宇甚宏敞有吏憑几戒何曰召汝無他事為吾言於潞王來年三月當為天子善自愛也及蘇密告帝親要慮其妄誕不敢言月餘復卒陰官見而叱曰汝安得違吾旨不達其事何具陳為左右所阻陰官曰且放汝還可速言之何退見廊廡下有簿書狼籍以問主者曰此朝代將改升降人爵之籍也及再蘇謁劉延朗密道其事帝屏人召何入問謂曰爾雖有憑吾無以信何曰某衰耄若此唯有一子請大王質之如無驗可殺之又張濛岐州之瞽者自言知術數不龜不蓍言是太白山神其神祠元魏時崔浩廟時事否泰人之休咎濛告於神即傳吉凶之言房暠泥於事神酷信之帝在岐陽暠引濛謁見聞帝語聲駭然曰非人臣也令暠詢其事即傳神語曰三珠併一珠驢馬沒人驅歲月甲庚午中興戊巳土暠請曰神言予不知也長興四年五月府廨諸門無故自動人頗駭異遣暠問濛濛見暠來未交言先問暠衙署小興勿怪不出三日有恩命其夜報至封潞王及帝被疑除鎮甚恐再三質濛初濛曰且為備王保無患及王恩同兵將至又召濛謂之曰爾言無患今天下兵來萃我城下內無兵食外無援助得無患乎濛曰王有天下不能獨立朝廷兵來迎王也王若疑臣臣惟一子未及冠請王致之麾下以質臣心及帝入雒受太后冊日御明堂宰相讀冊文維應順元年歲次甲午四月庚午朔帝廻視房暠曰張濛神言甲庚事不亦異乎帝令暠共術士解三珠一珠事言三珠三帝也驢馬無人驅失主也又帝在岐時有人已死復生言帝必登大位二十三年好事者附其意言帝小字二十三又云潞字一足入雒時石𤪗人胡呆通會天文帝亦召問之曰王至貴不可言若有舉動宜以乙未年及舉兵又問曰今歲曆法名陰部首王者不宜建功立事王且挾今主俟來歲入朝則福祚永遠帝姓王氏真定房山人也邑南三里里墅名曰王子則所生之地地稱王子亦有符焉既即位以族兄為令訪名未獲守先舊廬植松檟以為墳園其側有古佛剎剎有石像忽搖動不已人駭而告令令趣之復爾時甚異焉晉高祖初為河東節度後唐末帝出師重圍晉陽帝遣心腹何福單騎求援北蕃蕃王自將諸部赴之不以繒帛不以珠金若響應聲謂福曰吾已兆於夢皆上帝命我非我意也時援兵未至唐將張敬達引軍逼城設柵柵將成忽有大風雨暴起柵無以立後築長連城城欲就又為水潦所壞城竟不能合晉陽有北宮宮城之上有祠曰毗沙門天王帝曾焚修默而禱之經數日城西北關正受敵處軍侯報稱夜來有一人長丈餘介金執殳行於城久方不見帝心異之又牙城有僧坊曰崇福坊之廡下西北隅有泥神神之首忽一日有煙生其騰郁如曲突之狀坊僧奔赴以為人火所延及俯而視之無所有焉事尋達帝帝召僧之臘高者問焉僧曰貧道見莊宗將得天下魯有此煙觀其噴湧甚於當時可知矣自此日傍多有五色雲氣如蓮芰之狀帝召占者視之謂曰此驗應誰占者曰見處為瑞更應何人又帝每詰旦使人慰撫守陴者率以為常忽一夕已暝城上有號令之聲聲不絕者三帝使人問之將吏云從上傳來人皆知其神助時城中忽有數處井泉暴溢不止及蕃軍大至合埶破唐師之眾如拉朽焉斯天運使然非人力也先是朱梁改元之始即天祐之四年也潞州行營使李思安奏壺關縣庶穰鄉鄉人伐樹樹倒自分兩片內有六字如左書云天十四載石進梁主藏於武庫時遣詞臣李琪答詔嘉其瑞焉然莫詳其義至帝即位人以為雖有國姓計其甲子則二十年有奇矣議者曰天字取四字中兩晝加之於旁則丙字也四字去中之兩晝加十字則申字也帝即位之年乃丙申也又易云晉者進也國號大晉皆符契焉又即位之前一年年在乙未鄴西有柵曰李固清淇合流在其側柵有橋橋下大鼠與蛇斗斗及日之中蛇不勝而死行人觀者數百識者志之後唐末帝果滅於申少帝初為金吾上將軍天福三年從高祖幸大名其年天旱高祖遣祈雨白龍潭焚請未罷有白龍見於潭心是日澍雨尺餘人甚異之漢高祖初仕為河東兵馬使嘗因事至代北遮虜軍路側有唐衛公李靖祠遇戍卒乘酒以索戲繫其神之頸卒尋致殞時戍長邑老玄陳祈禱以解之而了無應驗帝乃為祝曰公本朝名將精爽在天雖庸輩褻瀆誠當其責而人既有請良可恕焉因焚香致拜卒者俄蘇傳其神語曰此非大貴人救不可免也聞者神其事後為河東節度使天福十一年天下水太原葭蘆茂盛最上一葉如旗狀皆南指焉明年遂即帝位隱帝始高祖鎮太原周太祖握蕃漢兵要常侍帳中參決戎政時令少帝監符璽頗相戲狎暨從征鄴城旦夕同侍一日詰旦語太祖曰我夜來夢爾為驢負我昇天既捨爾乘俄變為龍捨我南去何祥也笑而言曰公為驢作少意智勿空見玩撫掌而罷為左衛大將軍高祖欲改年號中書進擬乾和二字高祖改為乾祐與帝名相符乾祐帝名帝微有風痰每連唾不止目多閃掣即位之始遽無恙周太祖微時當晝寢有如小虺五色出入觀鼻之間柴后遽見愕然始奇特之傾資無惜后恐人騰口貽患每寢戒左右俾於屏蔽之所在太原時有神尼同姓見太祖謂李瓊曰我宗天上大仙當為世界主瓊詰其故曰頂上有肉角也後唐清泰末時所居官舍之鄰吳氏有青衣佳娘者為山魈所魅鬼能人言而投瓦石鄰伍恐悚無敢過吳氏之舍而性剛者強詣必瓦石交下太祖聞而過之言笑侮戲移時寂然如是者再太祖去鬼言如故或謂鬼曰爾既神聖向者客來又何寂然鬼曰向來者大人也繇是軍中大異之及為樞密使北征率師如澶淵旭旦日邊有紫氣來當太祖馬首之上高不及百尺從官視而異之至鄴都一夕在山亭院齊忽有黃氣起于前繚繞而上遽際于天太祖於黃氣中仰見星文紫微文昌燦然在目駭曰予在室中而見天象不其異乎密告知星者乃拜賀曰坐見天衢物不能隔至貴之祥也異日又於衙署中紫氣起於幡竿龍頭之上凡二日觀者異之及討李守貞於河中帝嘗於東砦大陳師旅鉦鼓錚鞫旗幟光耀守貞登陴下瞰氣色不懌獨言曰是何妖變後城中人言見太祖軍上有紫氣如樓閣華蓋之狀故也
