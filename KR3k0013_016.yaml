body:
  text: 尊號一尊號一古者盛德之君若九皇五帝皆典籍之所述也夏商而下降號稱王秦竝天下始兼三五而建號然後尊極之名著矣歷代而下遵而不易時或因革理非沿襲踵事增華其流彌盛乃至傾臣子之將順頌君上之徽美守闕上書備物典策所以極光大之稱流景鑠之懿也若乃欽明文思溫恭允塞堯舜之德垂於緗素至於濬哲之后據天下之圖受三靈之命億兆欣戴戎夷款附功崇德鉅仁深澤廣繇是從人之欲順帝之則擁神休而尊明號亦何讓焉漢高祖初為漢王五年十二月既平項羽時以十月為歲首正月諸侯上疏曰楚王韓信淮南王英布梁王彭越故衡山王吳芮漢元年項羽立芮為衡山王後又奪之地謂之番君是以曰故趙王張敖燕王臧荼昧死再拜言秦以為人臣上書當言昧犯死罪而言漢遂遵之大王陛下王者有執兵於階陛之側群臣與至尊言不敢指斥故呼在陛者告之因卑以達尊也先時秦為亡道天下誅之大王先得秦王定關中於天下功最多存亡安危救敗繼絕以安萬民功盛德厚又加惠於諸侯王有功者使得立社稷地分已定而位號比儗亡上下之分言大王與臣等竝稱王是為比類相儗無尊卑之差別也分音扶問切大王功德之著於後世不宣言位號不殊則功德之著明者不宣於後世也昧死再拜上皇帝尊號漢王曰寡人聞帝者賢者有也言賢德之人乃可有帝號虛言亡實之名非所取也今諸侯王皆推高寡人將何以處之哉諸侯王皆曰大王起於細微滅亂秦威動海內又以辟陋之地辟讀曰僻自漢中行威德誅不義立有功平定海內功臣皆受地食邑非私之也大王德施四海諸侯王不足以道之居帝位實宜願大王以幸天下幸者吉而免凶可慶幸也故人福喜之事皆稱為幸而死謂之不幸漢王曰諸侯王幸以為便於天下之民則可矣於是諸侯王及太尉長安侯臣綰等三百人綰盧綰也與博士稷嗣君叔孫通稷嗣邑名謹擇良日二月甲午上尊號漢王即皇帝位于汜水之陽汜音汎在濟陰界取其汜愛弘大而潤下也哀帝太初元年號曰陳聖劉太平皇帝陳導也言得神道聖者劉也陳舜後王莽陳之後謬語以明莽當篡立而不知後魏顯祖獻文帝既禪位太子於是群公奏曰在昔三王之世澹泊無事故稱皇是以漢高祖既稱皇帝尊其父為太上皇明不統天下今皇帝幼沖萬機大政猶宜陛下總之謹上尊號太上皇帝乃從之國之大事咸以聞後周閔帝既受魏禪都長安宣帝大象元年自稱天元皇帝所居稱天臺唐高宗上元元年八月皇帝稱天皇皇后稱天后以避先帝先后之稱中宗神龍元年十一月文武百官上皇帝尊號曰應天皇帝三年八月王公以下表上尊號曰應天神龍皇帝九月庚子御太極殿受冊玄宗先天二年十一月群臣上表請加尊號為開元神武皇帝曰臣聞玄化不宰是有強名聖德彰聞必崇大號伏惟陛下首出千古體元獨斷掃氛祲於軒官闡文明於宸極皇綱絕而復正神器危而重安聖達神祗功齊天地若無尊號臣下何稱易曰陰陽不測之謂神傳曰保大定功之謂武陛下斷大事於容易見成形於未兆故一蓍呈祥千里傳慶斯所謂不測也興王業於多難安生靈於反側故百神奉職四夷納貢斯可謂定功也故臣等敢上尊號曰開元神武皇帝伏惟從之手詔荅曰朕觀上古人主唯稱帝王一字秦漢以來乃兼皇帝朕以薄德嗣守寶位乾乾惕厲懼不克勝豈自崇飾以招譴咎雖迫公卿之請終負平生之心所請加號甚無謂也群臣宗子及僧道耆艾等數百人又抗表三上乃從之戊子遂行冊禮加尊號為開元神武皇帝開元二十七年二月文武百官及僧道耆耋上表請以聖文二字加尊號凡八表然後許之天寶元年正月甲寅陳王府參軍田同秀上言玄元皇帝降見于丹鳳門之通衢告錫靈符尹喜故宅遣使發得之二月附玄元皇帝廟百僚加尊號為開元天寶聖文神武皇帝七載五月壬申文武百僚以休祥累見上表請加尊號曰應道表再上固違不從甲戌又上表曰臣聞道之應也萬姓叶心德之至也百靈表貺是以帝王從天以受休命臣子奉主以薦尊名下戴上為至忠上納下為大順伏惟陛下垂衣而端拱司契而乘時御辨而氣和提象而物睹臣等上稽儀極下考前訓旁求史氏明徵道書皆可以配至極之崇高建大號之美稱陛下宗師懸解狹五帝之常道恬愉自得陋三王之仁義同符帝典振古莫儔靈寶經曰大寶君者大洞之尊神玉皇之正氣陛下經高上之至理復帝先之淳源九炁生真二合成德殊休應道已契靈文景命揚符宿彰仙籙則知聖祖以大道授陸下久矣當以應道荅之茍人望洽而固違則群情抑而不副是以公卿宗子懇誠於內緇黃艾耋瀝款於外宜蒙納許以昭介福伏惟陛下承上玄乃顧之意順普天翊戴之情伏以端午良辰萬壽來應昌圖與兩儀配永寶運與三景俱長欽若鴻名克彰厚慶聿陳大禮式茂元和臣等謹竭愚誠冒死請加尊號期於成遂以叶眾心帝手詔報曰禎祥者所以合天人鴻名者所以彰德業今封章繼至誠請甚勤敬膺神休允答人望宜依來請己卯有司告獻太清宮太廟庚辰告昊天上帝皇地祗太社太稷壬午公卿百辟奉冊上尊號曰開元天寶聖文神武應道皇帝御興慶殿受冊八載六月太白山人李渾上言有神人言金星洞內有玉版石記聖皇福壽之符命御史中丞王鉷入仙遊谷求而獲之以獻帝御勤政樓受焉於是王公卿士道俗又請加尊號表三上不從乃詔曰朕欲使人述日用道遠親譽願行其心永守沖約未允來請宜識此懷丙辰文武百官禮部尚書崔翹等又上表曰臣聞上玄成命錫禎符以應期聖皇乘時受神冊於興運是以啟殊祥於景福崇大號於至公伏惟陛下纘重玄之耿光嗣五聖之丕緒大德侔於天地至化貫於陰陽感玄道之尊運百辟之議三冒闕下累陳洪名陛下猶以固讓為心不以至公為意臣等請以符瑞重敘明之日者五星如連珠兩曜如合壁卿雲蔚膏露凝天之貺也瑤英產於金戺玄記開於玉洞神光見真誥傳地之祥也固知天地以鴻休報陛下陛下以至德通乾元允宜合符克配徽號伏奉乙卯詔書曰志存要玅理卻虛名臣又聞之天不讓高地不辭大五帝法之而成象三王參之而比德先天地者道也聖祖已著於強名合天地者聖也陛下允膺於明稱式彰玅用豈曰虛名況禎祥感通既著於彼靈應參會又符於此是以封章再獻而雲日重光徽號三陳而煙霄降澤天人交感影響必臻若然者陸下安得闕三才之大端抑萬姓之勤願違祖宗之睠命曠天地之符文臣等固陋猶知不可況真宗示慶祕簡呈文乘王氣於玉行擁神休於寶運伏顧光臨大寶允答洪休常垂覆載之仁永保延長之曆天下幸甚帝手詔從之閏月丙寅親謁太清宮上聖祖玄元皇帝為大道玄元及高祖太宗高宗中宗睿宗皇帝並加大聖丁卯群臣奉上尊號曰開元天地大寶聖文神武應道皇帝御含元殿受冊十二載十二月庚寅文武百官憲部尚書張均等上表請上尊號加孝德及改應為證曰開元天地大寶聖文神武孝德證道皇帝凡三上表乃許之十三載二月甲戌御興慶殿受冊肅宗至德二年十二月詔曰頃以上皇在蜀朕亦居岐蜀郡宜改為南京鳳翔改為西京西京為中京蜀郡改為成都府鳳翔府尹已下官寮並同三京名號乾元元年十二月乙未公卿道俗上表請加號曰乾元三表乃許之二年正月朔帝御含元殿受朝賀便冊尊號曰乾元大聖光天文武孝感皇帝上元二年九月壬寅詔曰朕獲守丕業若履春冰敢忘謙沖日益招損欲垂範而自我亦去華而就實其乾元大聖光天文武孝感等尊崇之稱何德以當之自今已後朕號唯稱皇帝代宗寶應二年四月辛巳宰臣及文武百僚郭子儀等上尊號表曰臣聞功莫大於締搆乾坤孝莫先於纘承社稷伏惟皇帝陛下繼述冠於周武中興邁於漢光曩者巨逆慢天中原失序生人罹厥角之禍皇運甚綴旒之危陛下親討元兇指麾戎旅尊先帝於靈武返上皇於巴蜀以一旅而掃定二京不再周而克寧九廟是陛下締搆之功也及乎先帝厭代姦臣窺國懷躡足之變搆無將之端陛下隳將成之禍胎挫已就之凶計申大義而誅呂全至公而嗣文日月蝕而重明寰宇傾而再定陛下纘承之孝也臣伏以古先帝王繼體踐祚者年踰則改元創業垂統者功成則上號陛下頃以先帝梓宮象設猶在橋山石室弓劍未藏固違體天之典將申寧戚之義孝思之至又何加焉今二聖靈輴永安陵寢萬方黎庶悉夢華胥聖人之哀榮畢矣帝王之功業成矣宜其大崇徽號允群臣顒然之望惟新正朔覃四海莫大之澤伏願降明詔下有司許臣等徵三代之故事考百王之通典改元立號革故鼎新懸之無窮倬映千古臣子儀等與群臣萬姓不勝懇請大願之至手詔答曰朕嗣守洪名欽承丕搆克清多難奄甸四方聖靈在天玄德敷佑南面恭己朕何有焉巨猾削平非予之武言念海內生人至艱兵鋒猶虞暴骨未掩日旰忘食宵分疚懷遽稱成功良謂虛美玄宮甫畢豈宜即及改元寶位至尊何以更言加號宰臣之任職在輔弼勸進之詞深所不取表三上乃許之六月丙申上表獻議曰陛下昔在藩邸及登儲闈聰明狥齊齋肅端冕遇闕則下入廟必趨及乎著代成人繼明踐阼聖姿天縱神化日新學冠九流觀書過於乙夜文高五始逸興麗於秋風此則陛下明昭之文德也頃者凶羯亂常彝倫失序陛下親總戎旅誅討元凶掩慶緒於雒陽斬朝義於河朔罷三司而復其位職人懷莫大之恩收兩京而不問脅從國賀非常之澤洎先帝大漸凶臣伺釁陛下釋服即戎提戈清難九重遘慝王室危於綴旒百姓不知天下安於山岳此則陛下定難之武功也若夫心游繫象之表理絕名言之外聖斷沈遠同陰陽之不測睿謨鉤深與鬼神而爭奧休氣潛盈草木化為禎祥淳風遠覃蠻夷效其獻貢加以明並日月德參乾坤風雨應時自有雍熙之兆魚鱉咸若更登仁壽之期此則陛下莫大之至聖也至於色養盡心慎終追遠問安內侍豈一日而忘朝視膳宰夫知再飯而方退及乎三聖違代九域侵臨至性自天哀容觸地門外之理權依易月之期從心之喪實履終天之痛財傾象設力竭山陵莫不德通於神明哀感於天地故得役徒百數之眾皆曰子來送終三十餘日曾無塗潦此則陛下感通之至孝也若乃神告聖運天呈寶符陛下登極之辰泗水見其五壁天兵滅虜之日黃河清於千里神烏白雀之祥填林溢囿卿雲甘露之瑞歲至月書此皆靈貺昭告休期之大應也且夫允恭濬哲有軒轅戰伐之功焉德合乾坤有伏羲尊聖之業焉降天休呈地寶有夏禹玄珪之感焉經天緯地之謂文立極中興之謂武變化無方之謂聖精誠上通之謂孝降天和騰地氣生無期出有為之謂寶文以昭之武以定之聖以成之孝以通之寶以應之夫然後可以充天地之洪名崇帝王之大號故臣等犯冒萬死奉上寶應元聖文武孝皇帝尊號伏顧陛下祗膺景命對越神祗應天理人光膺大典臣等謹當撰吉日脩禮容設九賓覿群后昭告烈祖清廟展黃琮之儀有事昊穹圓丘陳蒼璧之禮臣子儀等與群臣萬姓不勝大慶謹上尊號以聞詔下有司七月壬寅御宣政殿受群臣上尊號冊曰寶應元聖文武孝皇帝德宗建中元年正月丁卯朔改元群臣上尊號曰聖神文武皇帝興元元年正月朔車駕在奉天詔曰乃者公卿百寮用加虛美以聖神文武之號被蒙闇寡昧之躬固辭不獲俯遂群議昨因內省良所瞿然體陰陽不測之謂神與天地合德之謂聖豈伊淺劣所敢當文者所以成化武者所以定亂朕自君臨于今六載化之不被亂是用興豈可茍徇群情猥當徽號重予不德益用懷慚自今以後中外所上書奏不得更言聖神文武之號貞元五年十月百僚累上表請復徽號詔曰三省來章彌用兢惕載崇大號何以當之前者示懷蓋非沖讓尚勞敦請豈所宜然卿等博達古今列於朝右思弘獻替共致太和豈以虛名重予不德再三循復增恧于懷想悉深衷勿更陳請六年九月戊午百僚及道士僧等詣闕抗表請上貞元聖神文武皇帝尊號手詔不許十月己亥再詣闕抗表猶不許因謂侍臣曰今年春夏亢旱粟麥不登朕精誠祈禱獲降甘雨既致豐穰告謝郊廟朕儻受徽號以禋享是有為為之更勿煩請也順宗永貞元年八月禪位于憲宗十二月辛酉宰臣文武百僚等請上太上皇及皇帝尊號表曰臣聞帝堯之禪虞舜也業歸于異代漢祖之尊太上也禮循乎虛名未有履尊極而捨萬乘之榮奉晨昏而傳七廟之重斯則堯圖非遠漢道未全倬然冠洪名而超古昔者孰若今之盛也伏惟皇帝陛下誕受聖姿欽膺寶曆自天生德與神合契近者太上皇恭默在疚禪授未行萬國注心思堯言以致理群生屬望渴聖人之利見陛下忠感於天地孝達於神明成堯舜之內禪固邦家之景命功莫盛於配天孝莫大於寧親讓莫高於傳聖故太上皇釋天下之負所以成其讓陛下受宗祧之寄所以保其功惟文王為無憂惟武王為善繼夏祀永固周命惟新巍巍蕩蕩固無德而稱矣又聞皇帝之道必體於至公稱號所加不私於為己將體元以立政必紀年以垂號伏願肇茲獻歲允極鴻名發揮玄功昭示景化則太上皇之德可表於徽冊陛下之孝克施於寰海然後父父子子君君臣臣仰東海者知聖化之深躋南山者願聖人之壽臣等不勝大願請上太上尊號曰應乾聖壽太上皇請上陛下尊號曰文武大聖孝德皇帝因三正之慶會鼓萬國之歡心奉寶冊以薦鴻徽率群臣而朝上日然後退自問寢列茲充庭先陳教孝之儀方受慶君之禮斯實邦家之耿光也古今之絕典也雖朝賀有次已稟於綸言而徽號所尊益勤於俞詔兆人懇願罔不顒然憲宗詔答曰高祖太宗接千載之統垂無疆之休太上皇承九聖之烈傳莫大之慶嗣德纘業允文允武弘帝堯之欽明宗玄元之清凈付朕天下顧神保和至道光於唐虞至仁合於天地卿等虔述休德祗獻鴻名循省再三允符朕志朕獲守寶位丕承睿訓雖嚴恭寅畏不敢怠遑而澤未洽於群生理未臻於皇極遽言徽號何以當之雖嘉乃誠難遂來請其上獻太上皇尊號宜依所奏凡百卿士當體至懷明年正月丙寅朔太上皇居興慶宮受朝賀皇帝率百僚奉上尊號曰應乾聖壽太上皇帝
