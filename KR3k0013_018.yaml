body:
  text: 帝德帝德自古王者受命以有德而後昌也書稱皇天無親惟德是輔易曰日新之謂盛德若夫創業之后天下樂推守文之主人心欣戴何哉蓋聖人以順動則悅隨暨嚴教則咸服者也昔三皇無為而化五帝垂拱而治巍巍蕩蕩無得而稱顒顒卬卬恭己而化三代而下百王以還雖教成之蹟不同而君民之德可舉莫不合天地之大齊日月之明表正萬邦輝映千古是知貴為萬乘富有四海在乎以百姓心為心萬物利為利無私之道不宰為功加之雖休勿休日慎一日者得以垂無疆之美也黃帝軒轅氏生而神靈弱而能言幼而狥齊年踰十五則聰明心慮無不狥通矣長而敦敏成而聰明既為天子置左右太監監於萬國萬國和而神鬼山川封禪以為多焉顓頊高陽氏靜淵以有謀疏通而知事養財以任地載時以象天依鬼神以制義治氣以教化潔誠以祭祀北至于幽陵南至于交趾西至于流沙流沙在張掖延居縣東至于蟠木東海中有山焉名曰度索上有大桃樹屈蟠三千里動靜之物大小之神日月所照莫不砥屬砥平也四遠皆平而來服屬帝嚳高辛氏生而神靈自言其名普施利物不私其身聰以知遠明以察微順天之義知民之急仁而威惠而信修身而天下服取地之財而節用之撫教萬民而利誨之歷日月而迎送之明鬼神而敬事之其色郁郁其德嶷嶷其動也時其服也士帝嚳溉執中而遍天下古既字作水傍遍字一作扁日月所照風雨所至莫不服從帝堯陶唐氏其仁如天其知如神就之如日望之如雲富而不驕貴而不舒將遜于位讓于虞舜曰若稽古帝堯曰放勛欽明文思安安允恭克讓光被四表格于上下克明俊德以親九族九族既睦平章百姓百姓昭明協和萬邦黎民於變時雍舜曰稽於衆舍己從人不虐無告不廢困窮惟帝時克帝謂堯也舜因嘉言無所伏遂稱堯德以成其義考衆從人矜孤憫窮凡人所輕聖人所重益曰都帝德廣運乃聖乃神乃武乃文益因舜言又美堯也廣謂所覆者大運謂所及者遠聖無所不通神妙無方文經天地武定禍亂皇天眷命奄有四海為天下君眷視奄同也言堯有此德故為天所命所以勉舜也禹曰帝光天之下至於海隅蒼生光天之下至於海隅蒼蒼然生草木言所及廣遠孔子曰大哉堯之為君也惟天為大惟堯則之蕩蕩乎民無能名焉巍巍乎其有成功帝舜虞氏年二十以孝聞三十而堯問可用者四嶽咸薦虞舜堯曰可於是堯乃以二女妻舜以觀其內使九男與處以觀其外舜居媯汭內行彌謹堯二女不敢以貴驕事舜親戚甚有婦道堯九男皆益篤舜耕歷山歷山之人皆讓畔漁雷澤雷澤之人皆讓居陶河濱器皆不苦窳病也一年而所居成聚二年成邑三年成都堯將使嗣位歷試諸艱作舜典曰若稽古帝舜亦言其順考古道而行之曰重華協于帝華謂文德言其光大重合於堯俱聖明濬哲文明溫恭允塞濬深哲智也舜有文明溫恭之德信允塞上下玄德升聞乃命以位孔子曰無為而治者其舜也與又曰舜其大知也與舜好問而好察邇言隱惡而楊善執其兩端用其中於民其斯以為舜乎兩端過與不及也用其中於民賢不肖皆能行之其德如此乃號為舜舜之言充也又曰後世雖有作者虞舜弗可及也已矣君天下生無私死不厚其子子民如父母有慘怛之愛有忠利之教親而尊安而敬威而愛富而有禮惠而能散其君子尊仁畏義恥費輕實忠而不犯義而順文而靜寬而有辨不厚其子言既不傳位又無以豐饒諸侯位也恥費不為辭費出空言也實謂貨財也辨別也猶寬而栗也甫刑曰德威惟畏德明惟明非虞帝其孰能如是乎德所威則人皆畏之言服罪也德所明則人皆寵之言得人也夏禹為人敏給克勤其德不違其仁可親其言可信聲為律身為度以身為法度稱以出出一作土亹亹穆穆為綱為紀帝堯使禹為司空勞身焦思居外十二年過家門不入薄衣食致孝於鬼神卑宮室致費於溝洫方里為井井間為溝十里為城城有溝洫溝廣深四尺洫八尺也作大禹謨曰若稽古大禹曰文命敷于四海祗承于帝言其外布文德教命內則敬承堯舜又禹立三年百姓以仁遂焉豈必盡仁言百姓效禹為仁非本能仁也遂猶達也禹治水敷土其德能大中國作大夏之樂殷湯出見野張網四面乃去其三面事具帝王仁慈門諸侯聞之曰湯德至矣及禽獸湯舉伊尹任以國政既踐天子位伊尹作咸有一德湯即位奉天無私故詩曰帝命不違至於湯齊湯降不遲聖敬日躋昭假遲遲上帝是祗帝命式於九圖仲虺之誥曰惟王不邇聲色不殖貨利邇近也不近聲樂言清簡不近女色言貞固殖生也不生資財貨利言不貪也既有聖德兼有此行德懋懋官功懋懋賞用人惟己改過不吝懋勉也勉於德者則勉之以官勉之於功者則勉之以賞用人之言若自己出有過則改無所吝惜所以能成王業克寬克仁彰信兆民言寬仁之德明信於天下佑賢輔德顯忠遂良賢則助之德則輔之忠則顯之良則遂之明王之道又伊訓曰惟我商王布昭聖武代虐以寬兆民允懷言布明武德以寬政代桀之虐政兆民以此皆信懷我商王之德又曰肇修人紀從諫弗咈先民時若居上克明為下克忠與人不求備檢身若不及以至于有萬邦微子之命曰乃祖成湯克齊聖廣淵言汝祖成湯能齊德聖達廣大深遠澤流後世皇天眷佑誕受厥命皇天眷顧湯佑助之大受其命為天子撫民以寬唋其邪虐撫民以寬政放桀邪虐湯之德功加于時德垂後裔言立功於當時德澤垂及後世又曰湯以寬治民而除其邪其德能護天下故作大護之樂周文王在母不憂體不變故不憂在傳弗勤處師弗煩事父不怒父謂王季既為西伯遵后稷公劉之業則古公王季之法篤仁敬老慈少禮下賢者日中不暇食以待士士以此多歸之虞芮之人有嶽不能決乃如周入界耕皆讓畔民俗皆讓長事具帝王創業門諸侯聞之曰西伯蓋受命之君云西伯蓋受命之年稱王武王伐紂以除其害其德能成武功故作大武之樂漢高祖寬仁愛人意豁如也常有大度不事家人生産作業不修文學而性明達好謀能聽既即位自監門戍卒見之如舊惠帝內修親親外禮宰相優寵齊悼趙隱恩敬篤矣聞叔孫通之諫則瞿然諫復道乘衣冠道也納曹相國之對而心說對循高帝制度可謂寬仁之主文帝即位二十三年宮室苑囿車騎服御無所增益吳王詐病不朝賜以幾杖張武等受賂金錢覺更加賞賜以愧其心專務以德化民是以海內殷富興於禮義斷獄數百幾致刑措措置也幾近也言天下死罪人不過數百也十三年詔曰祕祝之官移過於下朕甚弗取其除之元帝寬弘盡下出於恭儉號令溫雅有古之風烈成帝為太子時寬博謹慎初居桂宮桂宮在城中近北宮非太子宮元帝常急召太子出龍樓門門樓下有銅龍若白鶴飛廉之為名也不敢絶馳道馳道天子所行道也今之中道絶橫度也西至直城門黃圖西出南頭第二門也得絶乃度還入作室門元帝遲之問其故以狀對元帝大悅乃著令令太子得絶馳道及即位修容儀升車正立不內顧不疾言不親指不內顧謂儼然端嚴不回視不疾言者為輕肆也不親指為惑下也臨朝淵默尊嚴若神可謂穆穆天子之容者矣後漢光武以天下既定思念欲完功臣爵土不令以吏職為過故皆以列侯就第帝雖制御功臣而每能回容宥其小失回曲也曲法以容也遠方貢珍甘必先遍賜列侯而大官無餘有功輒增邑賞不任以吏職故皆保其福祿終無誅譴者帝明慎政體總攬權網量時度力舉無過事宮房無私愛左右無偏恩建武中幸章陵觀田廬置酒作樂賞賜時宗室諸母因酣悅相與語曰文叔帝之字也少時謹信與人不款曲唯直柔耳今乃能如此帝聞之大笑曰吾理天下亦欲以柔道行之明帝善刑理法令分明日晏坐朝幽枉必達內外無幸曲之私在上無矜大之色斷獄得情號居前代十二十斷其二言少刑也故後之言治者莫不先建武永平之政章帝平徭簡賦而人賴其慶又體之以忠恕文之以禮樂故乃藩輔克諧群后德讓謂之長者不亦宜乎魏文帝稱章帝長者魏明帝口吃少言而沉毅好斷初諸公受遺輔導帝皆以方任處之政自己出而優禮大臣開容善直雖犯言極諫無所摧戮其君人之量如此之偉也晉武帝宇量弘厚造次於仁恕容納讜正未嘗失色於人明達善謀能斷大事故得撫寧萬國綏靜四方明帝為太子性至孝有文武才略欽賢愛客雅好文辭當時名臣自王導庾亮溫嶠桓彝阮放等咸見親待常論聖人真假之意導等不能屈又習武藝善撫將士于是東朝濟濟遠近屬心焉及即位聰明有機斷尤精物理于時兵凶歲飢死疫過半虛弊既甚事極艱虞屬王敦挾震主之威將移神器帝崎嶇遵養以弱制強潛謀獨斷廓清大祲改授荊湘等四州以分上流之勢撥亂反正強本弱枝雖享國日淺而規模宏遠矣簡文帝幼而岐嶷為元帝所愛郭璞見而謂人曰興晉祚者必此人也及長清虛寡欲尤善玄言孝武帝幼稱聰悟即位時年十歲至晡不臨左右進諫答曰哀至則哭何嘗之有謝安常歎以為精理不減先帝既威權已出雅有人主之量恭帝為琅邪王輔政安帝既不慧帝每侍左右消息溫涼寢食之節以恭謹聞時人稱焉後魏道武幼遭艱難備常險阻具知民之情僞及在位躬行仁厚協和民庶既定中原患前代刑綱峻審乃命三公郎王德除其法之酷切於民者約定科令大崇簡易是時天下民久苦兵亂畏法樂安帝知其若此乃鎮之以玄默罰必從輕兆庶欣戴焉元明道武長子明睿寬毅非禮不動道武甚奇之太武聰明大度意豁如也獻文聰睿機悟幼而有濟民神武之規孝文惇睦九族禮敬俱深雖於大臣持法不縱然性寬慈每垂矜捨聽覽政事莫不從善如流哀矜百姓常思所以濟益天地五郊宗廟二分之禮常必躬親不以寒暑為倦每言凡為人君患於不均不能推誠遇物茍能推誠胡越之人亦可親如兄弟常從容謂史官曰直書時事無諱國惡人君威福自己史復不書將何所懼南北征巡有司奏請治道帝曰粗修橋梁通與馬便止不須去草劃令平也凡所修造不得已而為之不為不急之事損民力也巡幸淮南如在內地軍事須伐民樹者必留絹以酬其直稱梁無所傷踐太和十七年南伐太尉丕奏請以宮人從詔曰臨戎不語內事宜停來請帝愛奇好士情如飢渴待納朝賢隨才輕重常寄以布素之意翛然玄邁不以世務嬰心曾幸華林園因觀故景陽山侍郎郭祚曰山以仁靜水以智流願陛下修之帝曰魏明以奢失於前朕何為襲之於後祚曰高山仰止帝曰豈非景行之謂後周太祖性好朴素不尚虛飾常以反風俗復古始為心知人善任使從諫如流崇尚儒術明達政事恩信被物明帝寬明仁厚敦睦九族有君人之量武帝初為大司空甚為明帝所親愛朝廷大事多共參議性沉深有遠識非因顧問終不輒言明帝每歎曰夫人不言言必有中及即位勞謙接下自強不息征伐之處躬在行陳性又果決能斷大事伐齊將戰有司請換馬帝曰朕獨乘良馬欲何所之故能得士卒死力隋高祖初入太學深沉嚴重雖至親昵不敢狎侮外質木而內明敏有大略初得政之始群情不附諸子幼弱內有六王之謀外致三方之亂握強兵居重鎮者皆周之舊臣帝推以赤心各展其用不踰期月克定三邊未及十年平一四海唐高祖七歲襲爵唐國公倜儻不羈豁達大度至性剛直無所矯飾志略宏遠寬仁容衆凡所與遊集無貴賤皆得其歡心及義兵起群盜大俠爭來歸附焉謁見必與同坐或延之臥內握手造膝恩如朋友賞賜金帛無所愛吝凡有委任推以赤心皆許便宜從事未嘗限以文法繇是銜命畢力向義者如流及即位見舊愛故人特執撝降有自遠至者皆為之加禮貴臣常引升御榻辭意款昵言必稱名初軍國多務奏請填委臨朝處分剖決如流每發其姦伏皆出人之意表然唯舉大綱不存苛細嘗從容謂侍臣曰隋煬帝時遣左右覘察得失朝臣戰懼咸不自安君臣一體豈當如是太宗始自襁褓視瞻舉措有異於常尤為高祖穆太后之所鍾愛每將隨從不離左右踐祚之始霜早為災粟價騰起突厥侵抄州縣騷然帝布德寰中申威遐外旬月之間九區寧謐至於進賢任能厲精為政求士若不及從諫如轉圜分遣旌旄撫臨戎狄未幾單于面縛蔥西肉袒榜徵儒學興復制度禮樂畢備風教興行下無滯才上無粃政商旅野次無復盜賊外戶不閉囹圄常空制御王妃公主之家及大姓豪猾之伍斂手屏跡無敢侵犯亦古昔未之有也嘗謂待臣曰今天下無事四夷賓服唯須守此成功以養百姓又指殿而言曰安百姓者如造此舍經始斯畢安可改移若易一榱增一瓦人足競踐良工揮墨搖其梁棟所壞益多亦猶百姓既安因而撫養若慕奇功變法制不常其德必致勞擾又嘗狩于驪山帝登山頂見圍斷絶顧謂從官曰此山險絶馬路不通攀緣危澗人亦勞止若依軍令闕圍有罪朕為萬姓主不可登高就下察人之過乃回馬避之又嘗謂侍臣曰傳云己所不欲勿施於人朕今每事繇己誠能自節豈獨百姓不欲而必順其情但四夷不欲亦能從其意耳又嘗征遼將發定州詔以宮女十人從司徒長孫無忌表請陛下躬自度遼天下無符及神璽悉從宮女減少將委官人天下觀之以為陛下輕神器帝曰度遼者十餘萬人皆離家室朕將十人猶慚太多夫自厚其身必勞百姓十人以主璽符足可不任官人朕心已在言前無煩公重請右衛將軍陳萬福違法取驛麩數石不欲加罪賜麩以愧其心帝威容甚肅百寮進見皆失其措帝知其若此每見人奏事必假借顏色使得盡言嘗謂公卿曰朕見煬帝多忌朝臣不語非謂待下者也朕欲上和下睦君臣一體遂語百寮日午事隙各歸第所有情好任其往來虛懷博納不欲見人之短又謂群臣曰朕比許上封事者欲知國家臧否政教得失而無識人因此兼言公等愆過朕皆棄而不覽想不以懷疑玄宗生而聰明睿哲及長寬仁孝友識度弘遠英武果斷不拘小節肅宗始五歲聰明秀異及長英睿有謀略仁愛孝友得之天性有檢制規矩臨事立斷應若雷霆代宗天縱聖德仁孝友悌至性過人聰明神武寬而能斷碩量洪深喜慍不形于色自幼好學樂善強記及長博通經籍尤精易象而溫恭簡敬動必繇禮及即位取則二儀推誠萬方含弘光大寬而能斷聖德在人而不有神功格天而不言可謂中興之主德宗貞元中常謂宰臣曰先師有云居上不寬吾何以觀而今以後朕務行寬大之令百寮有才能而行有不周者當棄瑕録用無求備於一人順宗為太子時於父子間慈孝交結無嫌每以天下為憂德宗在位稍久不假宰相權而左右得因緣用事外則裴延齡李齊運韋渠牟等以姦佞相次進用延齡尤狡險判度支刻剝聚斂以自為功天下皆怨怒帝每進見候顏色輒言其不可及陸贄張滂李充等以毀譴朝臣悚懼諫議大夫陽城等伏閣極論德宗怒甚將加城等罪外無敢救者帝獨開解之城等賴以免德宗卒不相延齡渠牟者帝之力也貞元中中官多詐稱宮市肆奪人物百姓怨苦帝常以為言德宗雖不能悉聽用而心益賢重太子未嘗假借內官顏色居東宮二十餘年天下陰受其賜憲宗即位初升平公主進女口十五人帝曰太上皇不受獻朕何敢違其還郭氏京師士庶聞之者皆喜且相賀想望太平焉元和末光祿卿楊元卿奏曰淮西平甚有寶貨及犀帶臣知之往取必得帝曰朕本討賊為人除害今賊平人安則我求得矣寶貨犀帶非所求也後勿此言穆宗寬仁大度天資博厚喜慍不形於外元和末帝在東宮時侍讀諫議大夫韋綬奏帝學書至依字輒去其傍人字臣問之故答曰君父每以此字可天下之奏臣子豈合書之憲宗深嘉嘆焉文宗初封江王在藩邸溫恭沖默好學不倦宣宗每對臣寮肅然拱揖鮮有輕易之言大臣或獻章疏郎燒香盥手受而覽之當時以大中之政有貞觀之風焉昭宗攻書好文尤重儒術神氣雄俊有會昌之遺風以先朝威武不振國命寖微而尊禮大臣詳延道術意在恢張舊業號令天下即位之始中外稱之後唐莊宗便騎射膽略絶人其心豁如也採録善言聽納容物為晉王時躬親庶務每與賓寮參議以恤物為心視民如傷孜孜不倦常有疑獄法司以狀具聞帝猶慮獄吏榜笞誣枉覆訊曰非獄吏榜笞乎非勢門排陷乎黠囚或誣讕帝以具獄按格令條其罪以示之囚既俯首伏罪帝愍然謂之曰非吾殺爾爾當自殺每出於路遇飢寒無告者必駐馬臨問解衣衣之推食食之其山林群盜邑里酋豪皆革心從化各務生産屏出貪吏杜塞幸門登任循良振拔沉滯不逾期月民俗丕變市無強賈路不拾遺閭里之間無復犬吠之警流傭畢復頌聲聞於道路三農稔熟上下翕然明宗初為太祖親騎雄武獨斷謙和下士每有戰功未嘗自伐居常唯治兵仗持廉處靜晏如也太祖嘗試之召於泉府命恣其所取帝唯持束帛數緡而出晉高祖性沉淡寡言笑讀兵法重李牧周亞夫之所行事初為太原尹未嘗有絲竹滋味而輒自燕樂每公退必召幕客論民間稼穡及刑政得失幕客常俸皆曰但使人輦青白銅錢給之常俸之外優以品食但日在公宮不許遊適士人亦傾心自效無所倦焉周太祖性聰明凡軍志政經深窮肯綮人皆服其敏無以過之世宗幼而英悟以嚴重自處與賓客言必低聲柔氣商確古今及論攻戰之事則縱辨高談詞理鋒起故時人多之及即位與侍臣論及賞罰之道帝曰但依王道行之朕固不因怒加罪因喜賞人也
