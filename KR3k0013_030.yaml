body:
  text: 奉先三奉先三唐高祖以隋恭帝義寧元年封唐王二年三月己巳立四親廟武德元年五月甲子即位六月己卯追尊皇高祖瀛州府君曰宣簡公皇曾祖司空曰懿王皇祖景王曰景皇帝廟曰太祖陵曰永康皇祖妣曰景烈皇后皇考元王曰元帝廟曰世祖陵曰興陵皇妣曰元真皇后臣欽若等按唐史隋恭帝義寧元年十二月追贈高祖太祖唐襄公為景王考唐仁公為元王二年三月並高祖立四親至是追尊為元帝以上事見帝系門迎神主祔於太廟六年四月己未幸故宅改名通義宮祭元皇帝於舊寢以貞元皇后配享高祖哽咽悲不自勝侍衛莫不歔欷太宗貞觀三年正月戊午有事於太廟九年五月上太上皇諡曰太武皇帝廟號高祖陵曰獻陵七月甲寅增修太廟崇祔弘農府君及高祖神主並舊四室為六室臣欽若等按弘農府君太宗之六代祖名重耳仕後魏為弘農太守是歲太守命有司詳議廟制八座等奏議依晉宋故事立親廟六從之十二月庚戌詔曰昔周監二代崇文武之典禮漢紹三王尊高光之功烈斯固有國之彝訓不刊之令範高祖太武皇帝聰明神武睿聖徇齋應天順民撥亂反正德侔造化道濟區夏靖率土之沸騰拯黔首之塗炭一戎大定四海宅心制治定之禮作功成之樂天地交泰品物咸寧聲教遐洎休徵雜沓蠻夷戎狄之長輻湊稿街麟鳳龜龍之祥光映圖史然猶日慎一日推而弗居邁邃古之鴻名踰前王之至治朕以寡昧丕承景業緬惟永往攀慕終天思弘尊親之道庶展罔極之志竊惟太原之地肇基王迹事均豐沛義等宛譙理宜別建寢廟以彰聖德詳觀漢典抑有成規但先皇遺旨務存儉約虔奉訓誡無忘啓處宜令禮官與公卿等詳議以聞十三年正月乙巳朔謁獻陵先日宿衛黃麾仗周衛陵寢至是質明七廟子孫及諸侯百僚蕃夷君長皆陪列於司馬門內帝至小次降輿號哭入闕門西面再拜慟絶不能興禮畢改服入於寢躬親執饌閲高祖及先后服御之物匍匐床前悲慟左右侍御者莫不歔欷十六年四月辛亥制每薦新於太廟令太常卿及少卿一人行事十二月令左監門中郎將齋士員將兵衛獻陵乙酉帝召士員至望見而降殿自迎悲咽不已謂從官曰頃屬歲陰道暮情深罔極所備新衣珍饌欲以正旦奉薦園陵朕若親行便勞扈從三元告始家有吉凶慶慰之禮咸重茲日朕不欲煩勞乃自抑止因命江夏王道宗代行所獻之物並跪授道宗焉十七年四月十一日帝親謁太廟謝承乾之過高宗以貞觀二十三年五月即位明年正月辛丑詔曰比者恭膺寶位乃叶天時繼奉休命必因正朔太宗文皇帝龔行天罰寧一區夏宏功無外盛烈難名攀望徽猷哀盈園寢朕以寡德守茲神器仰憑堂構俯暢生靈酌彼彝倫道兼文武方今孟陬獻蔀常儀佇歷三元首事萬國來庭宜遵經國之典以叶陽秋之義可改貞觀二十四年為永徽元年盡六年永徽元年五月吐火羅國獻大鳥高七尺帝以太宗懷遠所致獻於昭陵仍刻像於陵之內三年正月丙子親祠太廟及布幣祼獻至太宗仰視六年正月壬申朔親謁昭陵文武百寮及宗室子孫並陪位帝降輦易服行哭就位再拜劈踴禮畢又改服奉謁寢宮其崇聖宮妃嬪大長公主已下及越趙二國太妃等先於神座左右侍列如平生帝入寢哭踊絶於地進至東階西面再拜號慟久之乃進太牢之饌如珍饈具品引太尉無忌司空績越王福曹王明左屯衛大將軍程知節並入執爵進俎帝至神座前拜哭奠饌閲先帝先后衣服拜辭訖行哭出寢北門乃御小輦還行宮五月辛未以高祖太武皇帝既開基業不可限以常禮忌日特宜廢務顯慶元年十月幸鄭州次汜水以先帝於汜水擒竇建德因平王充於是刻石立頌以紀功烈帝自為頌文五年二月乙未帝以每年二月太常卿少卿分行二陵事重人輕又不備鹵簿威儀有闕乃令三公行事太常卿少卿為副太常別造鹵簿事訖則納於本司仍著於令龍朔二年六月辛酉詔奉常寺每五月六月停教樂以太宗文皇帝文德皇太后忌月故也乾封元年六月戊午詔曰朕以寡德嗣守宗祧雖明發載懷肅恭禋祀踐霜露而興感奉盥洗以增哀每惟宗廟至敬虔誠祼享而二尊一奠情有未安思革舊章用崇嚴配管子曰禮者因人之情緣禮而為之節也故三王五帝禮制不同損益隨時期於適便況罔極之恩既展於茲辰終身之慕情深於是日豈可以因循經禮乖違誠敬自今已後宗廟薦享爵及簠簋登鈃各宜別奠其餘牢饌並依常典咸亨四年令劉仁軌郝處俊修撰國史帝以許敬宗所紀多不實處俊曰先聖仁恩觸類皆是臣處俊往年宿衛之日被差腰輿供奉見有三衛誤拂御衣此人怕懼五情無主先聖謂之曰此間無御史我不為汝作罪過不須怕懼帝謂處俊曰此亦須入史五年八月壬辰追尊太祖武皇帝為高祖神堯皇帝太宗文皇帝為太宗文武聖皇帝太穆皇后為太穆神皇后文德皇后為文德聖皇后皇帝稱天皇皇后稱天后以避先帝先后之稱儀鳳二年五月壬戌詔尊宣皇帝陵為建昌陵先皇帝陵為延陵臣欽若等曰宣皇帝即高宗六代祖也武德初進諡宣簡公先皇帝五代祖也武德初尊諡懿王至是俱尊為帝中宗以弘道元年十二月甲子自皇太子即位明年正月改元嗣聖是年二月則天皇后廢帝為廬陵王立豫王旦大赦改元文明元年其年九月甲寅大赦改元光宅元年二年正月丁未朔以徐敬業平大赦改元垂拱元年五年正月乙卯朔饗祀明堂大赦改為永昌元年二月十一月庚辰朔日南至饗明堂大赦改為戴初元年用周正朔以十一月為正月十二月為臘月正月為一月十月為年終其年九月壬午則天革命稱周廢豫王為皇嗣賜姓武大赦改為天授元年三年四月丙申大赦改為如意元年九月庚子大赦改為長壽元年三年五月則天僭號越古金輪聖神皇帝大赦改元為延載元年二年正月辛巳朔則天僭加號慈氏大赦改為證聖元年是年九月甲寅則天加號天册大赦改為天册萬歲元年二年三月重造明堂成號為通天宮大赦改為萬歲通天元年二年九月大享天宮大赦改為神功元年二年正月壬戌大赦改為聖曆元年三年五月癸丑大赦改為久視元年二年正月丁丑以成州有佛迹見改為大足元年其年十月則天幸長安大赦改為長安元年盡四年神龍元年正月復位改享德廟依舊為京太廟臣欽若等曰初武后革命改京太廟為享德廟至是復焉五月壬午遷武氏七廟王於西京崇尊廟崇尊武氏太廟東都創置太廟八月乙亥崇祔太祖景皇帝獻祖光皇帝代祖元皇帝高祖神堯皇帝太宗文武聖皇帝皇考高宗天皇大帝皇兄義宗孝敬皇帝於東都太廟禮畢即日還宮十二月上則天皇后諡曰則天大聖后睿宗唐隆元年六月即位七月庚辰追尊則天大聖皇后依舊為天后景雲元年十月復追尊天后為大聖天后十一月己酉葬中宗孝和皇帝於定陵帝思中宗之德乃為紀聖頌以揚其徽範命有司刻之於石初中宗以皇兄義宗孝敬皇帝祔太廟第七室至是中書令姚元之等奏於東都別立義宗廟祔中宗孝和皇帝和思皇后趙氏神主於太廟太極元年正月辛未朔有事於太廟延和元年六月乙卯追尊大聖天后為聖帝天后玄宗先天元年八月即位十月丁酉太上皇詔曰昔重華嗣德格於文祖高密陟后至於神宗蓋所以敬履端之元申孝享之道皇帝初嗣大寶允膺休命歡洽人靈慶溢宗社宜躬祗祀典用展肅雍可以今月四日謁享太廟所司準式庚子帝謁太廟壬寅祔昭成皇后肅明皇后神主於儀坤廟臣欽若等按唐書昭成皇后竇氏玄宗所生母也陵曰靖陵肅明皇后劉氏玄宗嫡母也陵曰惠陵開元二年四月辛未詔曰園陵之地衣冠所遊凡厥有司罔不祗事禮存則先王是訓禮失則后代何觀欽若永圖敢忘舊典頃者別致鷹狗供奉山陵至於料度極多費損況昔誡禽荒既非尋常所用遠惟龍馭每以仁愛為心彼耕象與耘鳥且增哀慕豈飛蒼而走黃更備畋獵有乖儀式無益崇嚴載懷虧紊良深悚惕諸陵所有供奉鷹狗等並宜即停四年七月己亥上太上皇尊諡曰大聖貞皇帝廟號睿宗葬橋陵八月壬子敕宜於太廟西街西少府監空園內別造中宗廟依前隸入太廟署臣欽若等按唐志禮官議曰孝和皇帝有中興之功而無後嗣請因殷之陽甲漢之成帝出為別廟從之肅明皇后神主於儀坤廟安置臣欽若等按唐志禮官議曰昭成皇后有大祧之德已配於睿宗肅明皇后無啓母之尊自應別廟從之乙巳敕中宗孝和皇帝合別立廟宜修理儀坤廟隸入太廟署不煩別署官屬十一月丁亥徙中宗神主於西廟五年正月癸卯太廟四室壞帝素服避正殿迎神主於太極殿輟朝五日視事於別殿己酉親享太極殿十月丙子京師修太廟成戊寅祔神主於太廟六年十一月辛卯至自東都丙申親謁太廟時有司撰儀注以祔祭之日車駕發宮中帝謂宰臣宋璟蘇頲曰祭必先齋齋原作齊據舊唐書禮儀志五改必也據儀注祭之日發大明宮又以質明行事朕便侵星而發猶是移辰方到質明之禮其可及乎又朕不宿齋宮即安正殿情所不敢宜於廟所設齋宮五日赴行宮宿齋六日質明行事庶合於禮璟等稱聖情深至請即奉行詔有司改定儀注注原脫據舊唐書禮儀志五補入其日帝自齋宮步詣太廟入自東門就立位樂奏九成升自阼階行祼奠之禮至睿宗室俯伏嗚咽侍臣莫不流涕乃下制曰朕聞禮莫大於孝惟孝所以通神明事莫大於祀惟祀所以謁宗廟顧此薄德獲承丕緒恭虔夙夜弗敢遑寧去歲爰命司空增崇太室尋以匠者功就饔人禮奉雖是效是則率繇典章而不躬不親曷盡誠敬粵自河雒旋於京師聿修齋祭致用蠲潔屬群方駿奔庶位咸列祼奠式受咸懷載殷聖靈在天若享精意伊爾王公卿士下逮黎蒸道存念茲惠乃錫類七年五月敕曰五月是齋舊有常式六月緣忌特令斷屠宜令所司進蔬食府縣捉搦勿令屠宰十年六月己巳增置京師太廟為九室移孝和皇帝神主以就正廟下詔曰朕聞王者乘時以設教因事以制禮沿革以從宜為本取捨以適會為先故損益之道有殊質文之用甚異且夫至德之謂孝所以通於神明大事之謂祭所以虔於宗廟國家握紀命曆重光纍盛四方繇其繼明七代可以觀德朕嗣守丕業祗奉睿圖聿懷昭事罔不恤祀常覽古典爰詢廟制遠則殷周事異近則漢晉道殊雖禮文之不一固嚴敬之無二朕以為立愛自親始教人睦立敬自長始教人順是知政以道存禮從時變特因宜以創制豈法古而限今況恩以降殺而疏廟以遷毀而廢雖式瞻古訓禮則不違而永言孝思情所未足享常則止豈愛崇而禮備有禱而祭非德盛而流永其祧室宜列為正室將使親而不盡遠而不祧廟以貌在宗由尊立俾四時式薦不間於毀主百代靡遷匪惟於始廟所謂變以合禮動而得中嚴配之典克崇肅雍之美茲在又兄弟繼及古有明文今中宗神主猶居別處詳求故實當守不安移就正廟用彰大典仍創置九室宜令所司擇日啓告移造十一年正月行幸北都紀功於太原府之南街有連理李樹連理甘棠生于太原縣二月祠后土于汾陽之雎土太史奏榮光出河休氣四塞徘徊繞壇日揚其光有司奏修壇掘地獲古銅鼎二其大者容一斗色皆青又獲古磚長九寸上有篆書千秋萬歲及長樂未央字又有赤兔見于壇側十一月癸酉日長至太史奏曰平明陰雲祁寒及其日出有雲迎日又有祥風至須臾日出有黃白冠及日南有珥臣謹按黃帝占云冬至之日陰雲祁寒來歲大稔人安五穀豐熟又曰風不及地和緩而來謂之祥風王者德至於天則祥風起日冠旦珥人主有嘉並太平之嘉應臣請宣付所司許之是月戊申尊八代祖宣皇帝號懿祖始祔於太廟之九室十七年十一月庚寅親享九廟辛卯發京師丙申謁橋陵帝望陵涕泣哀感左右奉先縣以所管萬三百戶供奉陵寢曲赦縣內大辟罪已下戊戌謁定陵己亥謁獻陵乙己謁乾陵戊申還宮二十一年正月乙巳遷肅明皇后神主於太廟祔睿宗室殿儀坤廟二十五年七月己卯詔諸陵廟並隸宗正寺其官員悉以宗子為之二十七年二月己巳詔曰宗廟致敬必先於如在神人所依無取於非族深惟至理用切因心其應緣太廟五享於宗子及嗣王王原脫據唐會要卷十七補郡王中揀擇有德望者令攝三公行事其異姓官吏不須令攝二十八年七月壬寅尊宣皇帝陵為建初陵先皇帝陵為啓運陵仍置官員天寶元年二月甲午親享太廟以加尊號故也二年三月制曰涼武昭王朕十一代祖也積德右地炳靈中葉奄有舊國兆先帝功敬追尊為興聖皇帝其陵側左近仍並禁樵牧春秋二時備致祭八月制曰禋祀者所以展誠敬之心薦新者所以申霜露之思是知先王制禮蓋緣情而感時朕承丕業肅恭祀事至於諸節常修薦享自流火屆期商風改律載深追遠感物增懷且詩著授衣令存休浣在於臣子猶及恩私恭事園陵未標典式自今以後每至九月一日薦衣於陵寢貽範千載庶展孝思且仲夏端午事無典實傅之淺俗遂乃移風況乎以孝道人因親設教感遊衣於漢紀成獻報於禮文宣示庶寮令知朕意六載正月丁亥親祠太廟以戊子祀圓丘故也八載閏六月丙寅上高祖神堯皇帝尊諡曰高祖神堯大聖皇帝太穆皇后竇氏尊諡曰太穆順聖皇后太宗文武聖皇帝尊諡曰太宗文武大聖皇帝文德聖皇后長孫氏尊諡曰文德順聖皇后高宗天皇大帝尊諡曰高祖天皇大聖皇帝大聖則天皇后武氏尊諡曰則天順聖皇后中宗孝和皇帝尊諡曰中宗孝和大聖皇帝和思皇后趙氏尊諡曰和思順聖皇后睿宗大聖真皇帝尊諡曰睿宗玄真大聖皇帝昭成皇后竇氏尊諡曰昭成順聖皇后肅明皇后劉氏尊諡曰肅明順聖皇后以來月五日於太清宮聖祖前恭申册禮宜令所司即詳定儀注聞奏丁卯詔曰禘祫之禮以存序位質文之變蓋取隨時國家系本仙家業承聖祖重熙纍盛既錫無疆之休合享登神思弘不易之典自今已後每神並於太清宮聖神前設位序正上以明陟配之禮欽若玄穹下以盡虔恭之誠無違至道比來每緣禘祫時享則停事雖適於從宜禮或虧於必備已後每緣禘祫其常享無廢又奉先追遠禮惟昭德崇福展敬義在因心自今已後獻祖宣皇帝宣莊皇后懿祖光皇帝光懿皇后忌日宜令京城寺觀一日設齋太祖景皇帝烈皇后代祖元皇帝元貞皇后忌日京城三日行道九載十一月己丑制曰春秋致享用存昭敬祝史陳信必在正辭茍名位之或乖於上下而非便故經稱崇事易載顒若所以展祗肅明等威朕欽崇道本嗣守丕業每懷如在之誠敢忘奉先之旨禮或未達情實匪寧承前有事宗廟皆稱告享茲乃臨下之辭頗虧尊上之義靜言斯稱殊未為允自今已後每親告獻太清宮太微宮改為朝獻有司行事為薦獻親告享宗廟為朝享有司行事為薦享親巡陵為朝拜有司行事為拜陵應緣諸事告宗廟者改為奏其郊天后土及祀祝云敢昭告於者並改為敢昭薦於式崇寧禮庶表因心宣示中外令知朕意十載正月癸巳朝享太廟以甲午有事於南郊故也十一載三月丙午制今後每月朔望宜令薦食於太廟每室一牙盤乃五日一開室門灑掃十三載二月癸酉親享太廟以兩漢諸帝廟號皆有孝字帝王徽號莫大於孝是以上高祖神堯大聖皇帝諡曰高祖神堯大聖大光孝皇帝太宗文武大聖皇帝曰太宗文武大聖大廣孝皇帝高宗天皇大聖皇帝曰高宗天皇大聖大弘孝皇帝中宗大和大聖皇帝曰中宗大和大聖大昭孝皇帝睿宗玄真大聖皇帝曰睿宗玄真大聖大興孝皇帝是歲改獻昭乾定橋五陵署為臺其署令改為臺令加舊一階肅宗至德二年十月丁卯入長安先是九廟為賊所焚帝素服哭於廟三日入大明宮十二月新作九廟神主於長安殿安置帝親告享流涕嗚咽感動左右初帝在彭原使人於鳳翔郡採栗木以作神主備之及是奉迎告享用之乾元元年四月辛亥九廟神主自長安殿遷入太廟帝備法駕鹵薄警蹕王公百寮從甲寅帝親行享禮代宗以寶應元年四月庚午即位六月庚申中書令李輔國上表請遜位乃特封為博陸王罷中書令復詔許唯朝朔望五月庚寅進册先妃吳氏為皇太后三年四月己丑祧獻祖懿祖二室遷太祖已下七室祔玄宗二室五月辛亥以醴泉縣奉建陵升固赤縣廣德二年正月丙辰勑以來月七日饗太廟二月甲戌親享太廟九室大曆二年四月癸未詔有司陵廟祠祭並三長齋月依舊薦酒肉七年五月徙欣州七聖廟尊容置於太原之紫極宮八年五月庚子是日太宗諱日命有司備四千僧齋於昭成寺十月己酉命有司大祫於廟是日冬享因展禮也德宗以大曆十四年五月即位明年正月丁卯朔御含元殿受朝賀下詔改為建中盡四年十二月己酉祔代宗神主於太廟禮儀使顏真卿奏議祧元皇帝於西夾堂建中元年正月庚午謁太廟以辛未有事於南郊也三月丙寅禮儀使奏東都太廟闕木主請造詔下議之初武后於東都立高祖太宗高宗三廟至中宗已後兩京太廟四時並祭至德之亂木主多亡缺未附於是議者紛然而大旨有三其一其一原脫據舊唐書禮儀志六補入日必存其廟遍立群主時享之日以他官攝行二日建廟立主存而不祭若皇輿時巡則就享之三日存其廟座或東幸則飾齋車奉京師群廟之主以往議皆不決而罷二年二月復肅宗神座於寢宮先是寶應二年西戎犯京師焚建陵之寢室至是始創復焉十月癸卯祫饗太廟始奉獻祖神主出行祫禮初寶應二年玄宗肅宗神主祔廟始遷獻祖懿祖神主於西夾室是時禮儀使于休烈以國喪畢將行祫享以太祖既位當東面獻祖懿祖屬尊於太祖若同祫享即太祖不得居正位於是永閟二神主於西夾室至是有司亦以國喪既畢當行祫禮於是太常博士陳京建議請準魏晉以來祫禮奉二主出同祫享與太祖並列昭穆而虛東向之位又云若以二祖同享謂太祖失尊位即請奉二祖神主於德明皇帝廟祫享詔下尚書省雜議禮儀使顏真卿請依蔡謨等議至祫享之日奉獻祖神主居東面之位自懿祖太祖洎諸祖宗尊左昭右穆之列時宰臣百寮並同真卿之議奏留中不出將及祫享真卿又奏請從蔡謨議為定從之興元元年十二月甲午詔曰朕一經播遷久曠禮儀不唯霜露之感實貽失墜之憂賴先澤在人上帝臨我克平大難載復舊京方欲展禮郊丘請罪宗廟而乃股肱卿士詢謀異同明孝敬之大端陳古今之正義三省章表深體乃誠以義制心允從衆請豫之不德愧歎良深其來年告謝郊廟百寮請俟後期者可之其元日御含元殿準式時李懷光李希烈並叛逆不賓京師將士賞賚未遍人情尚擾不安李晟自鎮上表請權停郊廟之禮百寮議與晟協故有是詔貞元五年八月詔天下諸上州並宜國忌日準式行香九年六月癸亥詔定國忌日寺觀齋僧道人數有差十一月甲寅朝享太廟前一日有敕至廟行禮不得施褥至敬之所自合履地而行十二年十月辛亥祫祭於太廟十四年正月詔曰八陵宮寢臣欽若等曰自高祖至代宗凡八陵久要修葺此緣日月非便未及興工宜令宗正寺與所司即計料依所擇日速修理初宗正寺奏諸陵宮寢屋宇摧壞及要科松柏等敕詔陰陽人楊季炎擇日起修三月詔曰八陵舊寢宮在山上置來多年曾經野火燒焚摧毀略盡其宮尋移在瑤臺寺側左今屬通年欲議修置緣供水稍遠百姓非常勞弊今欲於見住行宮處修造冀久遠便人又為改移舊制恐所見未周宜令中書門下及百寮同商量可否聞奏丁丑令昭陵宜修舊宮先有五間殿依舊基創造寢殿五間餘舍屋準圖起造初正月中令有司修葺陵寢以昭陵舊宮先因火焚毀百官詳議而議者多云修舊宮帝意欲遷移繇是以山下為定於是遣右諫議大夫平章事崔充修八陵使及所司計料獻昭乾定泰五陵各造屋三百七十八間橋陵一百四十間元陵三十間唯建陵不復創造但修葺而已所緣陵寢中惟床蓐一事已上並令創造帝親加閲視然後遣送赴陵所八月以修八陵畢廢朝一日群臣於宣政殿前橫行稱賀中尉第五守亮宣詔曰朕獲主宗祀以奉園陵歲月滋深是有崇飾今修奉既畢感慕增懷所賀知十五年二月丁亥不視事以公卿等朝拜諸陵循親規制也初是月七日拜陵官發其日本不視事適會董晉卒廢朝至十六年二月公卿拜陵發日遂不視事迄今便因循行此禮時謂不經無據也五月壬戌不視事以逼先帝忌故也十六年二月辛未不視朝以拜陵公卿辭故也十九年四月壬辰修德明興聖獻祖廟甲午詔曰奉遷獻祖懿祖神主太祖景皇帝正東向之位虔告之禮當在重臣宜令檢校司空平章事杜佑攝太尉告於太清宮門下侍郎平章事崔太尉告太廟詔曰國之大事式在於明禋王者孝享莫重於殷祭所以尊祖而正昭穆也朕承列聖之休德荷上天之眷命虔奉牲帛二十有五年永惟宗廟之位禘常之序夙夜祗栗不敢自專是用延訪公卿稽參典禮博考群議至於再三敬以令辰奉遷獻祖宣皇帝神主懿祖光皇帝神主祔於明德興聖皇帝廟太祖景皇帝正東向之位宜令有司備禮務極嚴重祗肅祀典載深感惕咨爾中外宜悉朕懷丙申奉遷獻祖懿祖神主祔於明德興聖廟文武三品已上官序位於廟廷宗子諸親咸陪列焉門下侍郎平章事崔攝司徒從金輅至行廟升座畢奠用脯酒稱官跪奏安神退戊戌帝不視事宰臣及百官以祔廟禮畢蹈舞賀於宣政殿前憲宗永貞元年九月丁卯上神武孝文皇帝尊諡廟號德宗葬崇陵十一月册諡德宗母沈氏曰睿貞皇后奉神主祔於代宗之室元和元年七月上至德大安孝皇帝尊諡廟號順宗葬豐陵以奉先縣神泉鄉擽陽縣大澤鄉美原縣義林鄉並隸富平縣以奉豐陵二年正月庚寅朝享於太廟初次諸室帝皆盡於敬誠至德宗順宗室帝流涕嗚咽若不自勝侍臣及奉册讀册官皆相顧感泣穆宗以元和十五年正月即位二月詔於西上閣門西廊右畔便門以通宰臣自閣中赴延英路長慶元年正月己亥朔備法駕親薦獻於太清宮遂齋於太廟庚子享太廟至順宗顯宗二室上歔欷流涕侍臣從官皆感動禮畢復齋於郊壇行宮敬宗以長慶四年正月癸酉即位明年正月辛亥親祀昊天上帝禮畢大赦改元寶曆盡二年寶曆元年正月庚戌謁太廟以辛亥有事於南郊故也七月辛亥敕奉先一縣獨奉八陵供辦支持實為繁併眷言物力須議優矜宜委京兆府減一半租並雜色役等令諸縣均出文宗以寶應二年十二月即位上睿武昭愍孝皇帝廟號敬宗葬莊陵太和元年四月禮儀使奏拆修太廟西夾室遷移神五位得大卜署令狀擇用四月二十四日吉其日光出室內先祧遷神主五位入幕殿便起首拆修至五月五日畢功六日卻移神主入室詔依五月京兆府奏莊陵準穆宗陵例割鄰近縣鄉奉陵供應今高陵縣萬福鄉富陵縣從化鄉雲陽縣善化鄉涇陽縣常樂鄉其界並不隔越伏唯穆宗陵例合割前件四鄉屬三原縣添奉陵寢從之三年十一月癸巳謁太廟以甲午有事於南郊故也五年五月戊戌朔辛丑宗正寺奏太廟第四室第六室破漏四月九日已具聞奏訖有司不時興工至今稽滯敕太廟或要修葺有司合星夜興工以涉稽滯須有懲責將作監王堪宜罰兩月俸料度支判官罰一月俸料宗正卿李銑奏報稍晚量罰一月俸帝遽命中人令領工徒以禁中即日修營材木修葺左補闕韋溫上疏極諫疏奏帝甚嘉納繇是追止中人命有司嚴加修奉甲寅宗正等請修獻陵乾陵定陵橋陵泰陵建陵元陵崇陵豐陵景陵光陵莊陵惠陵昭陵詔曰所修陵寢事至嚴重簡計崇飾須得精實宜令度支郎中盧商將作少監韋長同往諸陵子細簡計具合修與不合處聞奏八年正月丙寅修太廟以太常卿庾承宣攝太尉遍告九室遷神主於便殿五月甲寅詔曰忌辰修齋雖出近制斟酌損益貴於得中況在不遷之宗允資異數之禮五月六日二十六日兩忌設齋人數宜各加至二千人太穆文德皇后忌日亦宜各加倍數其寺觀仍舊十二月八日忌宜於五所寺觀共設四千人宜令所司準式己巳修太廟畢以吏部尚書令狐楚攝太尉遍告神主卻復正殿開成元年七月丙戌監察御史請修太廟祭器初帝言於宰臣曰宗廟之事朕令自行千乘萬騎動資國用每至有事之日被朕冠冕危坐待旦比聞有司發饌不精酒醴酸濁卿當宣諭監察御史俾之臨祭勿有不虔御史崔黯監察受宣遂有此奏四年三月己卯帝御紫宸殿宰臣楊嗣復奏曰太廟準禮三年一祫五年一禘今是禘祭時讓皇帝廟亦合禘祭臣案讓帝本封寧王玄宗親兄玄宗既定內難寧王能讓帝位玄宗感之贈以鴻名其復置廟享獻禘祫與九廟同至上元二年杜鴻漸奏停時享而禘祫存今玄宗肅宗神主已歸夾室讓皇帝猶禘祫不闕於禮未安李班曰宗廟事重比者臣不敢輕議帝王至今禘祫實不當禮嗣復所論至當今請下禮官議帝曰俞四月壬戌帝御紫宸殿問宰臣曰皇城使上言太廟中有獐走出安有宗廟之中得此野獸宰臣請宣示宗正寺使令巡檢帝曰可召宗正卿來朕自戒勵之遂召宗正卿李踐方至帝曰宗廟至重卿宜恪勤官業勿俾太廟有所壞隳勿拘陰陽不旋修葺漢有昭陽未央尚猶崇飾潔況宗廟乎無長蒿萊以藏野獸言訖泫然踐方叩頭請罪久之帝自即位宗廟祀事未嘗不戒勵有司俾其嚴潔詩云祀事孔明其此之謂乎
