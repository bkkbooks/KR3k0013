body:
  text: 運歷運歷昔郯子述五代之官紀蓋有倫矣稽之於易本其世數乃知庖犧之王正得天統共工繼起位非其序少昊之衰九黎亂德顓頊始復建重黎之官以司天地其後三苗干紀二官咸廢堯命羲和以纂其業授時定歲衆功允治既而授舜曰天之曆數在爾躬舜亦以命禹三代之際牲服殊典漢紹周世議論纍葉訖於中興始定厥制魏晉而下南北迭起而天祿永終實在中夏至或徵諸儒之説集盈庭之言敷引異轍沿襲相戾及夫循五德終始之傳叶三統因革之義頒正朔立制度咸推歷而更王居正而惟敘者矣太昊帝庖犧氏繼天而王為百王先首德始於木故為太昊帝炎帝神農氏繼庖犧氏以火承木故為炎帝黃帝軒轅氏繼神農氏火生土故為土德少昊氏黃帝之子青陽也是其子孫名摯立土生金故為金德天下號曰金天氏顓頊高陽氏繼少昊氏金生水故為水德天下號曰高陽氏帝嚳高辛氏青陽玄囂之孫也繼高陽氏水生木故為木德帝堯陶唐氏封於唐蓋高辛氏衰天下歸之木生火故為火德帝舜有虞氏堯袒以天下袒曰禪讓字也火生土故為土德伯禹夏后氏虞舜嬗以天下土生金故為金德故夏后氏尚黑以建寅之月為正物生黑色戎事乘驪戎兵也馬黑色曰驪爾雅曰騋牝驪牡玄牲用玄玄黑類也湯伐桀踐天子位乃改正朔服色尚白朝會以晝金生水故為水德天下號曰商後曰殷初契封商湯居殷而受命故二號故殷人尚白以建丑之月為正物萌白色戎事乘翰翰白馬也牲用白周武王伐紂踐天子位水生木故為木德號曰周室故周人尚赤以建子之月為正物萌色赤戎事乘騵騵驪馬白腹牲用騂騂赤類烈王二年周太史儋見秦獻公曰始周與秦國合合而別別五百載復合周孝王封伯翳之後為侯伯與周別五百載至昭王時西周君臣自歸受罪獻其邑三十六城合也謂從秦仲至孝公強大顯王致霸與之親合也合十七歲而霸王者出焉從此後十七年而秦昭王立武王昭王皆霸至始皇而王天下漢高祖起沛旗幟皆赤繇所殺蛇白帝子所殺者赤帝子故也既代秦繼周木生火故為火德文帝時魯人公孫臣上書曰始秦得水及漢受之推終始傳則漢當土德土德之應黃龍見宜改正朔服色上黃時丞相張蒼好律曆以為漢乃水德是時河決金隄其符也年始冬十月色外黑內赤十月陰氣在外故外黑陽氣尚伏在地故內赤也或曰十月百草外黑內赤也與德相應公孫臣言非是罷之明年黃龍見成紀天水之縣也文帝召公孫臣拜為博士與諸生申明土德草改歷服色事自漢興之初庶事草創唯一叔孫生略定朝廷之儀若乃正朔服色郊望之事數世猶未章焉至於孝文始以夏郊而張蒼據水德公孫臣賈誼更以為土德卒不能明武帝太初元年五月正曆以正月為歲首色尚黃數用五倪寬司馬遷等猶從臣誼之言公孫臣賈誼服色數度遂順黃德彼以五德之傳從所不勝五帝相承代常以金木水火相勝之法若火滅金便以火代金秦在水德故謂漢據土而克之劉向父子以為帝出于震故庖犧氏始受木德其後以母傳子終則復始自神農黃帝下歷唐虞三代而漢得火焉故高祖始起神母夜號著赤帝之符旗章遂赤自得天統矣向父子雖有此議時不施行至光武乃用火德耳後漢光武建武二年正月始正火德色尚赤漢初土德色尚黃至此始明火德旗幟尚赤服色於是乃正魏文帝以漢延康元年十一月受禪給事中博士蘇林董巴上表曰魏之氏族出自顓頊與舜同祖舜以土德承堯之火今魏亦以土德承漢之火於行運合於堯舜授受之次遂改延康元年為黃初元年議改正朔易服色殊徽號承土行十二月幸雒陽以夏數得天故即用夏正而服色尚黃又詔以漢火行也火忌水故雒去水而加隹魏於行次為土土水之壯也水得土而乃流土得水而柔故除佳加水變雒為洛明帝景初元年春正月壬辰山荏縣言黃龍見於是有司奏以為魏得地統宜以建丑之月為正三月定曆改年為孟夏四月初文皇帝即位以受禪於漢因循漢正朔弗改帝在東宮著論以為五帝三王禮不相襲正朔自宜改變以明受命之運及即位優遊者久之史官復著言宜改乃詔三公特進九卿中郎將大夫博士議郎千石六百石博議議者或不同帝據古典甲子詔曰夫太極運三辰五星於上元氣轉三統五行於下登降周旋終則又始故仲尼作春秋三微之月每月稱王以明三正迭相為首今推三統之次魏得地統當以建丑之月為正月考之洪範厥義章矣其改青龍五年三月為景初元年四月服色尚黃犧牲用白戎事乘黑首白馬建太赤之旗朝會建太白之旗改太和曆曰景初曆其春夏秋冬孟仲季月雖與正歲不同至於郊祀迎氣礿祀蒸常巡狩搜田分至啓閉班宣時令中氣早晚敬授民事皆以正歲斗建為曆數之序初高堂隆以為改正朔易服色殊徽號異器械自古帝王所以神明其政變民耳目故三春稱王明三統也於是敷演舊章奏而改焉帝從其議改青龍五年春三月為景初元年孟夏四月服色尚黃犧牲用白從地正也齊王芳以景初三年即位十二月詔曰烈祖皇帝以正月棄背天下臣子永惟忌日之哀其復用夏正雖違先帝通三統之義斯亦禮制所繇變改也又夏正於數為得天正其以建寅之月為正始元年正月以建丑月為後十二月晉武帝以太始元年即位二年九月群公奏唐堯舜禹不以易祚改制至於湯武各推行數宣尼答為邦之問則曰行夏之時輅冕之制通為百代之言蓋期於從政濟治不繫於行運也今大晉繼三皇之蹤踵舜禹之迹應天從民受禪有魏宜一用前代正朔服色皆如有虞遵唐故事於義為弘奏可史臣曰晉為金行服色尚赤考之天道其違甚矣元帝以丁丑歲稱晉王置宗廟使郭璞筮之云享二百年自丁丑至禪代之歲年在庚申為一百四歲然丁丑始係西晉庚申終入宋年所餘惟一百有二歲耳璞蓋以百二之期促故婉而倒之為二百也習鑿齒臨終上疏曰臣每謂皇晉宜越魏繼漢不應以魏後為三恪而身微官卑無繇上達懷抱愚情三十餘年今沉淪重疾性命難保遂長懷此當與之朽爛區區之情切所悼惜謹力疾著論一篇寫上如左願陛下考尋古義求經常之表超然遠覽不以臣微賤廢言其所論曰或問魏武帝功蓋中夏文帝受禪於漢而吾子謂漢終有晉豈實理乎且魏之見廢晉道亦病晉之臣子寧可以同此言哉答曰此乃所以尊晉也但絶節赴曲非常所悲見殊心異雖奇莫察請為子言焉昔漢氏失御九州殘隔三國乘間鼎峙數世干戈日尋流血百載雖各有偏平而其實亂也宣皇帝勢逼當年力制魏氏蠖屈從時遂羈戎役晦明掩耀龍潛下位俯首重足鞠躬屏息道有不容之難躬蹈履霜之險可謂危矣魏武既亡大難獲免始南擒孟達東蕩海隅西抑徑蜀旋撫諸夏摧吳人入侵之鋒掃曹爽見忌之黨植靈根以跨中嶽樹群才以翼子弟命世之志既恢非常之業亦固景文繼之靈武冠世剋伐二違以定厥庸席卷梁益奄征西極功格皇天勛侔古烈豐規顯祚故以灼如也至於武皇遂並強吳混一宇宙乂清四海同軌二漢除三國之大害靜漢末之交爭開九域之蒙晦定千載之盛功者皆司馬氏也而推魏繼漢以晉承魏比義唐虞自託純臣豈不惜哉今若以魏有代王之德則其道不足有靜亂之功則孫劉鼎立道不足則不可謂制當年當年不制於魏則魏未曾為天下之主王道不足於曹則曹未始為一日之王矣昔共工霸有九州秦政奄平區夏鞭撻華戎專總六合猶不見序於帝王淪沒於戰國何況暫制數州之人威行境內而已便可推為一代者乎茍以晉常事魏懼傷皇德拘惜禪名謂不可割則惑之甚者也何者隗囂據隴公孫帝蜀蜀隴之人雖服其役取之大義於彼何有且吳楚爭號周室未亡子文延陵不見貶絶宣皇帝官魏逼於性命舉非擇木何虧德美禪代之義不同堯舜校實定名必彰於後人各有心事胡可掩定空虛之魏以屈於己孰若仗義而以貶魏哉夫命世之人正情遇物假之際會必兼義勇宣皇祖考立功于漢世篤爾勞思報亦深魏武超越志在傾主德不素積義險冰薄宣帝與之情將何重雖形屈當年意申百世降心全己憤慨於下非道服北面有純臣之節畢命曹氏忘濟世之功者也夫成業者係於所為不係所藉立功者言其所濟不言所起是故漢高稟命於懷王劉氏乘斃於亡秦超二偽以遠嗣不論近而計功考五德於帝典不疑道於力政季無承楚之號漢有繼周之業取之既美而己德亦重故也凡天下事有可借喻於古以曉於今定之往昔而足為來證者當陽秋之時吳楚二國皆僭號之王也若使楚莊推鄢郢以尊有德闔閭舉三江以奉命世命世之君有德之主或藉之以應天或撫之而光宅彼必自係於周室不推吳楚以為代明矣況積勛纍功靜亂寧衆數之所録衆之所與不資於燕噲之授不賴於因藉之力長轡廟堂吳蜀兩斃運奇二紀而平定天下服魏武之所不能臣蕩纍葉之所不能除者哉自漢末鼎沸五六十年吳魏犯順而強蜀人仗正而弱三家不能相一萬姓曠而無主夫有定天下之大功為天下之所推孰如見推於暗人受尊於微弱配天而為帝方駕於三代豈比俯首於曹氏側足於不正即情而恆實取之而無慚何與詭事而託偽開亂於將來者乎是故故舊之恩可封魏後三恪之數不宜見列以晉承漢功實顯然正名當事情體亦厭又何為虛尊不正之魏而虧我道于大通哉昔周人詠祖宗之德追述剪商之功仲尼明大孝之道高稱配天之義然后稷勤於所職聿來未以翦商異於司馬氏仕乎曹族三宗之寓於魏世矣且夫魏自君之道不正則三祖臣魏之義未盡義未盡故假塗以運高略道不正故君臣之節有殊然則弘道不以輔魏而無逆取之嫌高拱不勞汗馬而有靜亂之功者蓋勛足以王四海義可以登天位雖我德慚於有周而彼道異於殷商故也今子不疑共工之不得列於帝王不嫌漢之係周而不係秦何至於一魏猶疑滯而不化哉夫欲尊其君而不知推之於堯舜之道欲重其國而反厝之於不勝之地豈君子之高義若猶未悟請於是止矣後魏道興元年十二月詔百司議定行次尚書崔玄伯等奏從土德服色尚黃數用五祖辰臘犧牲用白五郊立氣宣贊時令敬授民時行夏之正時有司奏國家繼黃帝之後宜為土德故神獸如牛牛上畜又黃色顯曜其符也於是始從土德天興中李先之子密問於先曰子今為魏臣將復事他主也先告曰未也國家政化長遠不可卒窮自始皇至齊受禪實五百餘載矣孝文太和十四年八月詔曰丘澤初制配尚宜定五德相襲分敘有常然異同之論著於往漢未詳之説疑在今史群官百辟可議其所應必令合衷以成萬代之式中書監高閭議以為帝王之祚百代可知運代相承書傳可稽雖祚命有長短德政有優劣至於受終嚴祖殷薦上帝其致一也故敢述其前載舉其大略臣聞居尊據極允應明命者莫不以中原為正統神州為帝宅茍位當名全化迹流洽則不專以世數為豫奪善惡為是非故堯舜禪揖一身異尚魏晉相代紀運少殊桀紂至虐不廢承曆之敘厲惠至昏不闕周晉之祿計五德之論始自劉向一時之議三家致別故張蒼以漢為水德賈誼公孫臣以為土德劉向以為火德以為水德者正以當有水溢之應則不推運代相承之數也以為土德者則以亡秦繼曆相即為次不推逆順之異也以為火德者懸證赤帝斬蛇之符棄秦之暴越惡承善不以世次為正也故以周為火德自茲厥後乃以為常魏承漢火生土故魏為土德晉承魏土生金故晉為金德趙承晉金生水故趙為水德燕承趙水生木故燕為木德秦承燕木生火故秦為火德秦之未滅皇魏未剋神州秦氏既亡大魏稱制玄朔故平文之廟始稱太祖以明受命之證如周在岐之陽若繼晉則晉亡已久若棄秦則中原有寄推此而言承秦之理事為明驗故以魏承秦魏為土德又五緯表驗黃星曜彩考氏定實合德軒轅承土祖木事為著矣又秦趙及燕雖非明聖各正號赤縣統有中土郊天祀地肆類咸秩明刑制禮不失舊章奄岱踰河境被淮漢非若齷齪邊方僭擬之屬遠如孫權劉備近若劉裕道成事繫蠻夷非關中夏伏惟聖朝德配天地道被四海承乾統曆功侔百王光格同於唐虞享祚流於周漢正位中境奄有萬方今若並棄三家遠承晉氏則蔑中原正次之實存之無損於此而有成於彼廢之無益於今而有傷於事臣愚以為宜色尚黃定為土德又前代之君明賢之史皆因其可褒褒之可貶貶之今議者偏據可絶之義而不録可全之理所論事大垂之萬葉宜並集中祕群儒人人別議擇其所長於理為悉祕書丞臣李彪著作郎崔光等議以為尚書閭議繼近秦氏臣職掌國籍頗覽前書惜此正次慨彼非緒輒仰推帝始遠尋百王魏雖建國君民兆朕振古祖黃制朔綿迹有因成此帝業神元為首案神元晉武往來和好至於桓穆雒京破亡二帝志摧聰勒思存晉氏每助劉琨申威並冀是以晉室銜扶救之仁越石深代王之請平文太祖抗衡苻石終平燕氏大造中區是則司馬祚終於郟鄉而元氏受命于雲代蓋自周之滅及漢正號幾六十年著符尚赤後雖張賈殊議暫疑而卒從火德以繼周氏排虐嬴以比共工蔑暴項而同吳廣近蠲謬偽遠即神正若此之明也寧使白蛇徒斬雕雲空結哉自有晉傾淪暨登國肇號亦幾六十餘載物色旗幟率多取黑是又自然合應玄同漢始且秦並天下革創法度漢仍其制少所變易猶仰推五運竟踵隆姬而況劉石苻燕世業促褊綱紀弗立魏接其弊自有夷典豈可易漢之承木捨晉而為土耶夫皇統崇極承運至重必當推協天緒考審王次不雜以僭竊參之強狡神元既晉武同世桓穆與懷愍接時晉室之淪平文治太廟號太祖抑亦有繇紹晉金德孰曰不可而欲次茲偽僭豈非惑乎臣所以慺慺惜之惟垂察納詔令群官議之十五年正月侍中司空長樂王穆亮侍中尚書左僕射平原王陸睿侍中吏部尚書中山王王元孫侍中尚書駙馬都尉南平王馮誕散騎常侍都曹尚書新秦侯遊明根散騎常侍南部令鄧侍祖祕書中散李愷尚書左丞郭祚右丞霸城子衛慶中書侍郎封琳中書郎泰昌子崔挺中書侍郎賈元壽等言臣等受敕共議中書監高閭祕書丞李彪等二人所議皇魏行次尚書高閭以石承晉為水德燕承石為木德以秦承燕為火德大魏次秦為土德皆以地據中夏以為得統之徵皇魏建號事接秦末晉既滅亡天命在我故因中原有寄即而承之彪等據神元皇帝與晉武並時桓穆二帝仍修舊好始自平文逮于太祖抗衡秦趙終平慕容晉祚終於秦方大魏興于雲朔據漢並秦承周之義以皇魏承晉為水德二家之論大略如此臣等謹共參論伏惟皇魏世王玄朔下迄魏晉趙秦二燕雖地據中華德祚微淺並獲推敘于理未愜又國家積德修長道光萬戴彪等職主東觀詳究圖史所據之理其志難奪今欲從彪等所議宜承晉為水德詔曰越近承遠情所未安然考次推時頗亦難繼朝賢所議豈朕能有違奪便可依為水德祖甲辰臘後周閔帝元年春正月辛丑即天王位是日魏槐里獻赤雀百官奏議云帝王之興必更正朔明受之於天革民視聽也逮于尼父稽諸陰陽云行夏之時後王所不易今魏曆告終周室受命以木乘水實當行録正用夏時式遵聖道惟文王誕玄氣之祥有黑水之讖服色烏制曰可隋高祖受禪召崔仲方與高熲議正朔服色事仲方曰晉為金行後魏為水周為木皇家以火承木得天之統又聖躬戴誕之初有赤光之瑞車服旗牲並宜用赤又勸帝除六官請依漢魏之舊帝皆從之開府盧賁奏改周代旗幟更為嘉名其青龍騶虞朱雀玄武千秋萬歲之旗皆賁所創也開皇元年六月癸未詔以初受天命赤雀降祥五德相生赤為火色其郊及社廟依服色之議而朝會之服旗幟犧牲各令尚赤戎服以黃七月乙卯帝始服黃百僚畢賀唐玄宗開元中有上書請以皇家為金德者中書令蕭嵩奏請集百僚詳議侍中裴光庭以國家符命久著史策若有改易恐貽後學之誚密奏請依舊為定乃下詔停百僚集議之事臣欽若等言唐初事闕天寶九載七月詔曰三王繼統質文既不相襲五德承時服色遵於所尚至於旗常改制騂翰異宜所以表軍國之容合聲名之度事之大者安可因循而已焉國家膺推紐之期纂黃中之曆憲章垂範運既屬於維新旗幟同色義必在於革故頃者俯納群議式明統緒故得天人致和風雨時若豈朕躬菲德克廣睿圖實纍聖鴻休允膺景運稽古之大既有昭明文物所資理宜詳正其諸衛應隊仗所用緋色幡等並改為赤黃色庶克遵於通變諒有叶於從宜其諸節度使並管內軍使等亦宜準此九月處士崔昌上封事以國家合承周漢其周隋不合為二王後請廢詔下尚書省集公卿議昌負獨見之明群議不屈會集賢院學士衛包抗表陳論上心遂定乃求殷周漢後為三恪廢韓介酅等公以昌為左贊善大夫包為虞部員外十載五月諸衛幡旗色始改為赤黃十二載五月己酉復以魏周隋依舊為恪及二王後其本封韓介酅等公如故初崔昌上封事推五行之運以皇家土德合承漢行自魏晉至隋皆非正統是閏位書奏詔公卿議是非相半時上方希古慕道得昌疏甚與意愜宰相林甫亦以昌意為是會集賢院學士衛包抗疏奏曰昨夜雲開四星聚於尾宿又都堂會議之際陰霧四塞緒言之後晴空萬里此蓋天意明國家承漢之象也上以為然遂行之及是楊國忠根本林甫之短乃奏云周漢遠不當為二王後衛包助邪獨與林甫計議大紊彝倫上疑之下包獄案鞫遂貶為夜郎郡夜郎尉崔昌為玉山郡烏雷尉並員外置代宗永泰中歸崇敬為膳部郎中時有術士巨彭祖上疏云大唐土德千年合符請每四季郊祀天地詔禮官儒者議之崇敬議曰案舊禮立春之日迎春於東郊祭青帝立夏之日迎夏於南郊祭赤帝先立春十八日迎黃靈於中地祀黃帝秋冬各如其方黃帝於五行為土王在四季生於火故火用事之末而祭之三季則否漢魏周隋共行此禮國家土德乘時亦以每歲六月土王之日祀黃帝於南郊以后土配所謂合禮今彭祖請用四季祠祀多憑緯候之文且據陰陽之説事涉不經恐難行用周太祖廣順元年司天上言歷代帝王以五運相承前朝紹承水德今國家建號周朝合以木德代水準經法國以歲暮為臘今曆日所行合以今年十二月二十二日丁未為臘從之臣欽若等曰晉承後唐漢承晉本文不載承土之德據周稱木德即是漢為水晉為金以繼唐土德也
