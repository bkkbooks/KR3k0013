body:
  text: 封禪一封禪一禮曰昔先王因天事天因地事地因名山升中于天書曰天子五載一巡狩歲二月東巡狩至于岱宗柴望此封禪之大略也昔齊桓公欲封禪管仲曰古者封泰山禪梁甫七十二家皆受命然後得封禪是知王者受昊天之命居大寶之位順考古道建用皇極仁及乎行葦澤浸乎昆蟲太平之風於是乎在若乃建顯號施尊名揚英聲騰茂實以祈景福以告成功則必申命有司發揮大典刻石紀績與黃帝比探策告祥配天無極故兒寬謂之帝王之盛節相如亦曰天下之壯觀可不謂然乎無懷氏封泰山禪云云無懷古之王者在伏義前云云在梁父東山名也又曰云云山在蒙陰縣故城東北下有虙羲封泰山禪云云虙讀曰伏神農氏封泰山禪云云炎帝封泰山禪云云炎帝神農後黃帝封泰山禪亭亭地理志巨人有亭亭山顓頊封泰山禪云云帝嚳封泰山禪云云堯帝封泰山禪云云舜封泰山禪云云禹封泰山禪會稽湯封泰山禪云云周成王封泰山禪于社首在巨平南十二里漢武帝議欲放古巡狩封禪之事放依也音甫往切諸儒對者五十餘人未能有所定先是司馬相如病死有遺書頌功德言符瑞足以封泰山上奇其書又司馬相如傳載相如既病免家居茂陵天子曰司馬相如病甚可往從悉取其書若後之矣所忠往而相如已死家無遺書問妻對曰長卿未嘗有書也時時著書人又求去長卿未死時為一卷書曰有使來求書奏之其遺札書言封禪事所忠奏焉天子異之以問左內史兒寬寬對曰陛下躬發聖德統攝群元統察攝聚也輯楫與集三字並同虞書曰楫五瑞是也其字從木宗祀天地薦禮百神精神所鄉徵兆必報天地並應符瑞昭明其封泰山禪梁父昭姓考瑞帝王之盛節也然享薦之義不著于經封禪之享薦也以非常禮故經無其文以為封禪告成合祛於天地神祗祛開散合閉也開閉于天地也祗戒精專以接神明總百官之職各稱事宜而為之節文稱副也唯聖主所繇制定其當當猶中也非群臣之所能列今將舉大事優遊數月言不決也使群臣得人自盡終莫能成所言不同各有執見也唯天子建中和之極兼總條貫金聲而玉振之言振揚德音如金玉之聲也以順成天慶垂萬世之基帝然之乃自制儀采儒術以文焉既成將用事拜寬為御史大夫初議封禪曰古者先振兵釋旅然後封禪乃遂北巡朔方勒兵十餘萬騎還祭黃帝冢橋山釋兵涼如地名帝曰吾聞黃帝不死有冢何也或對曰黃帝已仙上天群臣葬其衣冠既至甘泉為且用事泰山先類祠泰一且猶將也類祠謂以事類而祭之自得寶鼎上與公卿諸生議封禪封禪用希曠絶莫知其儀體而群儒采封禪尚書周官王制之望祀射牛事天子有事宗廟必自射牲示親殺也事見國語齊人丁公年九十餘曰封禪者古不死之名也秦始皇不得上封陛下必欲上稍上稍漸也即無風雨遂上封矣上於是乃令諸儒習射牛草封禪儀數年至且行天子既聞公孫卿及方士之言黃帝以上封禪皆致怪物與神通欲放黃帝放依也音甫往反以接神人蓬萊高世比德于九皇上古有人皇者九人而頗采儒術以文之群儒已不能辨明封禪事又拘于詩書古文而不敢騁帝為封祠器視視讀曰示群儒群儒或曰不與古同徐偃又曰太常諸生行禮不如魯善徐偃傅士姓名周霸屬圖封事屬會也會諸儒圖封事周霸人姓名也於是帝黜偃霸而盡罷諸儒弗用以元鼎六年五月東幸緱氏禮登中嶽太室從官在山上聞若有言萬歲云問上上不言問下下不言乃令祠官加增太室祠禁毋伐其山木以山下戶凡三百封崈高為之奉邑崈古崇字以崇奉嵩之山故謂之崇高奉邑也詔曰朕用事華山至於中嶽獲駮鹿見夏后啓母石翌日親登崈高御史乘屬在廟傍天子出御史除二人乘為曹護車駕吏卒咸聞呼萬歲者三登禮罔不答其令祠官加增太室祠禁無伐其草木以山下戶三百為之奉邑名曰崈高獨給祠復亡所與夏四月癸卯帝因東上泰山言易上也泰山從南面直上步道三十里車道百里泰山草木未生乃令人上石立之泰山顛從山下轉右而上也帝遂東巡海上行禮祠八神帝還至奉高帝念諸儒及方士言封禪人殊不經難施行人人殊異文不合經故難以施行天子至梁父禮祠地主至乙卯令侍中儒者皮辨縉紳射牛行事封泰山下東方如郊祀泰一之禮封廣丈二尺高九尺其下則有玉牒書書祕禮畢天子獨與侍中奉車子侯子侯霍去病子也上泰山亦有封其事皆禁明日下陰道丙辰禪泰山下址東北肅然山如祭后土禮天子皆親拜見衣上黃而盡用樂焉江淮間一茅三春為藉五色土益雜封縱遠方奇獸飛禽及白雉諸物頗以加祠兕牛象犀之屬不用皆至泰山然後去封禪祠其夜若有光晝有白雲出封中雲出于所封之中天子從封禪還坐明堂群臣更上壽更互也詔曰朕以眇身承至尊競競焉惟德菲薄不明於禮樂故用事八神遭天地況施著見景象諂屑同然如有聞震于怪物欲止不敢遂登封泰山至于梁父然後升袒肅然自新嘉與士大夫更始其以十月為元封元年行所巡至博奉高蛇丘歷梁父城民田租逋賦貸已除逋賦未出賦者逋貸官以物貸之而未還也加年七十已上孤寡帛人二匹四縣無出今年算自博至梁父凡五縣今云四縣奉高素以供禪非算限賜天下民爵一級女子百戶牛酒又曰古者天子五載一巡狩用事泰山諸侯有朝宿地其令諸侯各治其邸泰山下二年帝伐朝鮮夏旱公孫卿曰黃帝時封則旱乾封三年三歲不雨暴所封之土令乾也上乃下詔天旱意乾封乎言適新封則致天旱欲乾我所封乎其令天下尊祠靈星焉秋作明堂於泰山下五年春還至泰山增封甲子祠高祖於明堂以配上帝因朝諸侯王列侯受郡國計若今之計帳初封泰山東北址古時有明堂處處險不敞言其阻帝欲治明堂奉高旁未曉其制度濟南人公玉帶公玉姓帶名也呂氏春秋齊有公玉丹此蓋其舊族而説者讀公玉為宿非也單姓玉者後漢司徒玉況自音宿耳上黃帝時明堂圖明堂中有一殿四面無壁以茅蓋通水水圜宮垣為復道上有樓從西南入復讀曰復名曰昆侖天子從之入以拜祀上帝焉於是帝令奉高作明堂汶上如帶圖汶水名也出琅琊朱虛作所上明堂于汶水之上也帶圖公玉帶所上明堂圖及是歲修封則祠泰一五帝於明堂上坐合高帝祠坐對之漢是時未以高祖配天言對武帝以來乃配之祀后土於下房以二十太牢天子從昆侖道入始拜明堂如郊禮畢尞堂下而上尞古燎字又上泰山自有祕祠其顛而泰山下祠五帝各如其方黃帝並赤帝所與赤帝同處有司侍祠焉山上舉火下悉應之太初元年十月行幸泰山十一月甲子朔旦冬至祀上帝于明堂十二月袒高里山名在泰山下三年正月行東巡海上四月還修封泰山袒石閭石閭在泰山下址南方方士言仙人閭天漢三年三月行幸泰山修封祀明堂因受計太始四年三月行幸泰山壬午祀高祖於明堂以配上帝因受計癸未祀孝景皇帝於明堂甲申修封丙戌袒石閭征和四年幸泰山修封庚寅祀於明堂癸巳袒石閭先是武帝每修封其贊饗曰天增授皇帝泰元神策周而復始皇帝敬拜泰一自此已上贊祝者辭又東至海上考入海及方士求神者莫驗焉益遣幾遇之益多也幾讀曰冀後又親禪高里祠后土臨渤海將以奉祀蓬萊之屬幾致殊庭焉殊庭蓬萊中仙人庭也幾讀曰冀復東巡海上考神仙之屬未有驗者方士有言黃帝時為五城十二樓昆侖玄圃五城十二樓仙人之所常居以候神人於執期地名也名曰迎年迎年若云其年帝許之如方名曰明年言明其得延年也帝親禮祠上犢黃馬公玉帶曰黃帝時雖封泰山然風后封巨岐伯令黃帝封東泰山風后封巨岐伯皆黃帝臣也東泰山在琅琊朱虛界中有小泰山是禪几山几山在朱虛縣合符然後不死天子既令設祠具至東泰山卑小不稱其聲乃令祠官禮之而不封焉其後令帶奉祠候神物復還泰山修五年之禮如前而加禪祠石閭石閭者在泰山下址南方下基之南面方士言仙人閭也故帝親禪焉其後復至泰山修封還過祭恆山自封泰山後十三歲而周遍于五嶽四瀆矣後復至泰山修封甘泉泰一汾陰后土三年親郊祀而泰山五年一封修武帝凡五修封後漢光武建武三十年二月群臣上言即位三十年宜封禪泰山詔曰即位三十年百姓怨氣滿腹吾誰欺欺天乎曾謂泰山不如林放何事污七十二代之編録桓公欲封管仲非之若郡縣遠遣吏上壽盛稱虛美必髡兼令屯田從此群臣不敢言三月帝幸魯過泰山告太守以帝過故承詔祭山及梁父時虎賁中郎將梁松等議記曰齊將有事泰山先有事配林蓋諸侯之禮也河嶽視公侯王者祭焉宜無即事之漸不祭配林三十二年正月帝齋夜讀河圖會昌符曰赤劉之九會命岱宗不慎克用何益於承誠善用之姦偽不萌感此文乃詔松等復案索河雒讖文言九世封禪事者松等奏乃許焉初孝武帝欲求神仙以秩方者言黃帝繇禪封而後仙于是欲封禪封禪不常時人莫知元封元年帝以方士言作封禪器以示群儒多言不合古於是罷諸儒不用三月帝東上泰山乃上石立之泰山顛遂東巡海上求仙人無所見而還四月封泰山恐所施用非是乃祕其事帝許梁松等奏求元封時封禪故事議封禪所施用有司奏當用方石再纍置壇中背方五尺厚一尺用玉牒書藏方石牒厚五寸長尺三寸廣五寸有玉簡又用石簡十枚列于石傍東西各三南北各二皆長三尺廣一尺厚七寸簡中刻三處深處四寸方五寸有蓋簡用金縷五周以水銀和金以為泥玉璽一枚方二寸二分一枚方五寸方石四角又有距石皆再纍枚長一丈厚一尺廣二尺皆在圓壇上其下用距石十八枚皆高二尺厚一尺廣二尺如小碑環壇立之去壇三步距石下皆有石跗入地入地四尺又用石牌高九尺廣三尺五寸厚尺二寸立壇丙地去壇三丈以上刻書帝以用石功難又欲及二月封故詔松欲因故封石空簡更加封而已松上疏爭之以為登封之禮告功皇天垂後無窮以為萬民也承天之敬尤宜章明奉圖書之瑞尤宜顯著今因舊封竄寄玉牒故石下恐非重命之義受命中興宜當特異以明天意遂使太山郡及魯趣石工宜取完清石無必五色時以印工不能刻玉牒欲用丹漆書之會求得能刻玉者遂書書祕刻方石中命容玉牒二月帝至奉高遣侍御史與蘭臺令史將工先上山刻石文曰維建武三十有二年二月皇帝東巡狩至於岱宗柴望秩於山川班於群神遂觀東后從臣太尉熹行司徒事特進高密侯禹等漢賓二王之後在位孔子之後褒成侯序在東後藩王十二咸來助祭河圖赤符曰劉秀發兵捕不道四夷雲集龍鬭野四七之際火為主河圖會昌符曰赤帝九世巡省得中治平則封誠合帝道孔巨則天文靈出地祗瑞興帝劉之九會命岱宗誠善用之姦偽不萌赤漢得興九世會昌巡岱皆當天地扶九崇經之常漢大興之道在九世之王封于泰山刻石著紀禪于梁父退省考五河圖合古篇曰帝劉之秀九名之世帝行德封刻政河圖提劉豫曰九世之帝方明聖持衡拒九州平天下豫雒書甄曜度曰赤三德昌九世會修符合帝祭勉刻封孝經鉤命決曰豫誰行赤劉用帝三建孝九會修專茲竭行封岱清河雒命后經讖所傳昔在帝堯聰明密微讓與舜庶後裔握機王莽以舅后之家三司鼎足冢宰之權勢依託周公霍光輔幼歸政之義遂以篡叛僭號自立宗廟隳壤社稷喪亡不得血食十有八年楊徐青三州首亂兵革橫行延及荊州豪桀並兼百里屯聚往往僭號北狄作寇千里無煙無雞鳴犬吠之聲皇天眷顧皇帝以匹庶受命中興年二十八載興兵起是以中次誅討十有餘年罪人斯得黎庶得居爾田安爾宅書同文車同軌人同倫舟輿所通人迹所至靡不貢職建明堂立辟雍起靈臺設庠序同律度量衡修五禮五玉三帛二生一死贄吏各修職復于舊典在位三十有二年年六十二乾乾日昃不敢荒寧涉危歷險親巡黎元恭肅神祗惠恤耆老理庶遵古聰允明恕皇帝惟慎河圖雒書正文是月辛卯柴登封泰山甲午禪于梁陰以承靈瑞以為兆民永茲一事垂于後昆百寮從臣郡守師尹咸蒙祉福永永無極秦相李斯燔詩書樂隳禮壞建武元年以前文書散亡舊典不具不能明經文以章句細微相況八十一卷明者為驗又其十卷皆不昭晰子貢去告朔之餼羊子曰賜也爾愛其羊我愛其禮後有聖人正失誤刻石訖二十一日辛卯晨燎祭天於太平山下南方群臣皆從用樂如南郊諸王王者後二公孔子後褒成君皆助祭位事畢將升封或曰太山雖已從食於柴祭今親升告功宜有禮祭於是使謁者以一特牲於常祠太山處告祠太山如親耕貙劉先祠先農先虞故事至食時御輦升山日中後到山上更衣早晡時即位于壇北面群臣以次陳後西上畢位上壇尚書命奉玉牒簡皇帝以一寸二分璽親封之訖太常命人發壇上石尚書命藏玉牒以復石覆訖尚書令以五寸印封石簡事畢皇帝再拜群臣稱萬歲命人立所刻石碑乃復道下二十五日甲午禪祭地於梁陰以高后配山川群神從如元始中北郊故事四月己卯大赦天下以建武三十二年為中元元年復博奉高嬴勿出元年租芻藁以吉日刻玉牒書函藏金匱璽印封之乙酉使太尉行事以特告至高廟太尉奉匱以告高廟藏于廟室西壁石室高祖室之下又趙熹傳載熹為太尉上言宜封禪正三王之禮中元元年從封太山又張純傳載純為司徒奏帝宜封禪曰自古受命而帝治世之隆必有封禪以告成功焉樂動聲儀曰以雅治人風成於頌有周之盛成康之間郊配封禪皆可見也書曰歲二月東巡狩至于岱宗則封禪之義也臣伏見陛下受中興之命平海內之亂修復祖宗撫存萬姓天下曠然咸蒙更生恩德雲行惠澤雨施黎元安命夷狄慕義詩云受天之祐四方來賀今攝捉之歲蒼能甲寅德在東宮宜及嘉時遵唐帝之典繼孝武之業以二月東巡狩封于岱宗明中興勒功勳復宗統報天神禪梁父祠地祗傳祚子孫萬世之基也中元元年正月丁卯帝乃東巡岱宗以純視御史大夫從並上元封舊儀及刻石文章帝元和二年二月辛未幸泰山柴告岱宗有黃鵠三十從西南來經祠壇上東北過于宮屋翱翔升降進奉高壬申從祀五帝於汶上明堂癸酉告祀二祖四宗二祖謂高祖世祖四宗謂文帝為太宗武帝為世宗宣帝為中宗明帝為顯宗大赦天下諸犯罪不當得赦亦皆除之復博奉高嬴無出今年田租芻藁丁鴻以少府從帝奏曰臣聞古之帝王統治天下五載巡狩至于岱宗柴祭于天望秩于山川協時月正日角斗斛權衡使人不爭陛下尊履蒸蒸奉承業祀五帝於明堂配以光武二祖四宗咸有告祀瞻望太山嘉澤降澍柴祭之日白氣上升與燎煙合黃鵠群翔所謂神人以和答饗之休符也帝善焉安帝延光三年二月辛卯幸太山柴告岱宗太山王者告代之處為五嶽之宗故曰岱宗燔柴以告天魏明帝黃初中護軍蔣濟曰夫帝王大禮巡狩為先眧祖揚禰封禪為首是以自古革命受符未有不蹈梁父登太山刊無竟之名紀天人之際者也故司馬相如謂有文已來七十二君或順所繇於前謹遺教於後太史公曰主上有聖明而不宣布有司之過也然則元功懿德不刊梁山之石無以顯帝王之功示兆庶不朽之觀也語曰當君而歎堯舜之美常猶人子對厥親而譽他人之父今大魏乘百王之弊亂拯流遁之艱危接千載之衰緒繼百代之廢業自武文至于聖躬所以參成天地之道綱維人神之化上天報應嘉瑞顯祥以比往古無所取喻至於歷世迄今未廢大禮雖志在掃盡殘盜蕩滌餘穢未遑斯事若爾三苗倔強於江海大舜當廢東巡之儀徐夷跳梁於淮泗周成當止岱嶽之禮且去歲破吳虜於江漢今茲屠蜀賊於隴右其震蕩內潰在不復淹無纍于封禪之事也此議久廢非倉卒所定宜下公卿廣撰其禮卜年考時昭告上帝以副天下之望臣待罪軍旅不勝大願冒死以聞詔曰聞蔣濟斯言使吾汗出流足自開闢以來封禪者七十餘君耳故太史公曰雖有受命之君而功有不洽是以中間廣遠者千有餘年近者數百載其儀闕不可得記吾何德之修敢庶茲乎濟豈謂世無管仲以吾有桓公登太山之志乎吾不欺天也濟之所言華則榮矣非助我者也公卿侍中尚書常侍省之而已勿有所議亦不須答詔也天子雖拒濟議而實使高堂隆草封禪之儀以天下未一不欲便行大禮會隆卒不復行晉武帝平吳混一區宇太康元年九月庚寅尚書令衛瓘尚書左僕射山濤右僕射魏舒尚書劉實司空張華等奏曰臣聞肇自生靈則有后辟年載之數莫之能紀立德濟世揮揚仁風以登封泰山者七十有四家其諡號可知者十有四焉沉淪寂寞曾無遺聲者不可勝記大晉之德始自重黎實佐顓頊至於夏商世序天地其在於周不失其緒金德將升世濟明聖外平蜀漢海內歸心武功之盛實繇文德至于陛下受命踐祚弘建大業群生仰流惟獨江湖沅湘之表凶桀負固歷代不賓神謀獨斷命將出討兵威暫加數旬蕩定羈其鯨鯢赦其罪逆雲覆雨施八方來同聲教所被達於四極雖黃軒之征大禹遠略周之奕世何以尚今若夫玄石素文底號前載象以數表言以事告雖古河圖雒書之徵不是過也宜宣大典禮中嶽封泰山禪梁父發德號明至尊享天休篤黎庶勤千載之表播流後之聲俾百世之下莫不興起斯帝王之盛業天人之至望也詔曰今逋寇雖殄外則障塞有警內則百姓未康此盛德之事所未議也瓘等又奏曰今東漸于海西被于流沙大漠之陰日南北戶莫不通屬茫茫禹迹今實過之天人之道已同巍巍之功已著宜修禮地祗登封泰山致誠上帝以答神人之願也乞如前奏詔曰今陰陽未和政刑未當百姓未得其所豈可以勒功告成邪詔不許瓘等又奏曰臣聞處帝王之位者必有歷運之基天命之應濟兆庶之功者必有聖德之容告成之典無不可誣有不敢讓自古道也而明詔謙沖屢辭其禮雖聖德攸在推而未居夫三公職典天地實掌人物國之大事取義於此故漢氏封禪非是官也不在其事臣等前奏蓋陳祖考之功天命又應陛下之德合同四海迹古考今宜修此禮至於克定歲月須五府上議然後奏聞詔曰雖蕩清江表皆臨事者之勞何足以告成方望群后恩隆大化以寧區夏百姓獲乂與之休息斯朕日夜之望無所復下諸府矣瓘等又奏臣聞唐虞三代濟世弘功之君莫不仰承天休俯協人志登介丘履梁父未有辭焉者蓋不可讓也今陛下勛高百王德無與二茂績宏規巍巍之業固非臣等所能究論而聖旨勞謙屢自抑損時至弗應推美不居闕皇代之上儀塞靈祗之凝望使大晉之典謨不同風於三五臣等誠不敢奉詔請如前奏施行詔曰方當共思弘道以康庶績且俟他年無復紛紜也王公有司又奏自古聖明光宅四海封禪名山著於史籍作者七十四君矣舜禹之有天下也巡狩四嶽躬行其道易著觀俗省方禮有升中於天詩頌陟其高山皆載在方策文王為西伯以服事殷周公以魯藩列於諸侯或享於岐山或有事太山徒以聖德猶得為其事自是以來功薄而僭其儀者不可勝數號諡不泯以至於今況高祖宣皇帝肇開王業海外有截世宗景皇帝濟以大功輯寧區夏太祖文皇帝受命造晉蕩定蜀漢陛下應期龍興混一六合澤被群生威震無外昔漢氏失統吳蜀鼎峙兵興以來近將百年地險俗殊人望絶塞今不羈之寇二代而平非聰明神武先天弗違孰能巍巍其成功若茲者歟臣等幸以千載得遭運會親服大化日覩太平至公至美誰與為讓宜祖述先明憲章古昔勒功岱嶽登封告成弘禮樂之制正三雍之典揚名萬世以顯祖宗是以不勝大願敢昧死以聞請告太常具禮儀帝復詔曰所議誠列代之盛事也然方今未可以爾便報絶之隋文帝開皇九年平陳朝野物議咸願登封秋七月丙午詔曰豈可命一將軍除一小國遐邇注意便謂太平以薄德而封名山用虛言而干上帝非朕攸聞而今以後言及封禪宜禁絶又定州刺史豆盧通等上表請封禪帝不許又兗州刺史薛胄以天下太平登封告禪帝王盛烈遂遣博士登太山觀古迹撰封禪圖及儀上之高祖謙讓不許十四年群臣請封禪高祖不納晉王廣又率百官抗表固請帝命有司草儀注於是牛弘辛彥之許善心姚蔡虞世基等創定其禮奏之帝逡巡其事曰此事體大朕何德以堪之但當東狩因拜岱山耳十五年春行幸兗州遂次岱嶽為壇如南郊又壝外為柴壇飾神廟展宮懸於庭為埋坎二於南門外陳樂設位於青帝壇如南郊帝服袞冕乘金輅備法駕而行禮畢遂詣青帝壇而祭唐太宗貞觀五年正月朝集使趙郡王孝恭等僉議以為天下一統四夷來同詣闕上表請封禪帝手詔曰省表具懷自有隋失道四海橫流百王之弊於斯為甚朕提劍鞠旅首啓戎行扶翼興運克成鴻業遂荷慈眷恭承大寶每日昃思治弗敢康寧競競夕惕用忘興寢履薄馭朽不足為喻賴三靈顯命百辟同心海外無塵遠夷慕義但流遁永久凋殘未復田疇多曠倉廩猶虛家給人足尚懷多愧豈可遽追前代取譏虛美所望恂恂濟濟叶力盡誠輔其不逮致之王道如得雅頌形於金石菽粟同於水火反朴還淳當如來議十二月己亥朝集使利州都督武士穫等詣朝堂又上表請封禪帝曰隋末分離群凶競逐我提三尺劍數年之間正一四海是朕武功所定也突厥強梁世為紛更今乃襲我衣冠為我臣吏殊方異類輻輳鴻臚是朕文教所來也突厥破滅君臣為俘安養之情同於赤子是朕仁愛之道也林邑貢能言鳥新羅獻女樂憫其離本皆令反國是朕敦本也酬功録效必依賞格懲惡罰罪必據刑書割親愛捨嫌隙以弘至公之道是朕崇信也非朕苟自矜伐欲明聖人之教不徒然也比年穀稼頻登疾疚不作誠宜展禮名山以謝天地但以喪亂之後民物凋殘憚於勞費所未遑也六年公卿百寮以天下太平四夷賓服詣闕請封禪者首尾相屬帝不許嘗從容而言曰朕本詣公子也始望不及此屬天下喪亂遂有救焚拯溺之志義師入關之始群凶鼎沸當此之時但得三分天下亦為足矣朕以不武內稟太上皇之謀外假士大夫之力數年之間六合大定升中告禪信亦其時然朕往者蒙犯霜露遂嬰氣疾但恐登封之後彌增誡懼有乖管衛非所以益朕也少欲自怡用安年壽公卿等勿復為言十一年帝將有事於封禪國子博士劉伯莊睦州刺史徐令言等皆上封禪事互設疑惑言新禮簡略事有未周於是敕四方名儒博物之士及顏師古朱子奢等參議得失者數十家遞相駁難紛紜不決於是左僕射房玄齡特進魏徵中書令楊師道慎採衆議以為永式議昊天上帝壇其略曰將封先祭義在告神固當為壇下址豫申齊潔贊饗已畢然後登封既表重慎之深兼示行事有漸今請祭於太山下設壇以祀上帝以太祖景皇帝配饗壇長一十二丈高一丈二尺又議製玉牒曰金玉重寶質性貞堅宗祀郊禋皆充器幣豈嫌華靡實貴精確況乎三神壯觀萬代鴻名禮極殷崇事資藻縟玉牒玉簡式蘊靈琦傳之無窮永存不朽今請玉牒長一尺三寸廣厚各五寸玉簡厚二寸長短澗狹一如玉牒其印齒請隨璽大小仍纏以金繩五周又議玉策曰封禪禮祭嚴配作主皆奠玉策肅奉慶成今玉策四枚各長一尺三寸五分每策五簡俱以金編其一奠上帝一奠太祖座一奠方地祗一奠高祖座又議金匱曰祭配之策盛以金匱歸格藝祖藏之朝堂今請長短令容玉策高廣各六寸形如今之表函纏以金繩封以金泥印以受命璽又議方石璽纍藏玉牒止用石函亦猶盛書策笥所以或呼石策今請方石三枚以為再纍其十枚石簡刻石石四邊而立之纏以金繩封以石泥印以受命璽又議太山上圜壇曰四出開道壇場通議南面入升於事為允今請介丘山圜壇廣五丈高九尺用五色土加之四面各設一陛御位在壇南升自南陛而就上封玉牒又議圜壇上土封曰凡言封者皆是積土之名利建分封亦班土立號謂之封禪厥義可知今請於圜壇之上安置方石璽緘既畢加土築以為封高一丈二尺而廣二丈以五色土益封玉牒書藏於其內祀禪之所土封制亦同此議玉璽曰謹詳前載方石緘封玉撿金泥必資印以為祕固今請依令用受命璽以封石簡其玉簡既與石簡大小不同請更造璽一枚方一寸二分文同受命以封玉牒石撿私制依漢建武時故事又議立碑曰勒石紀號垂裔後昆美盛德之形容闡后王之休烈其義遠矣陛下聲暢九垓威橫八極靈祗不愛其寶兆庶無得而稱但當贊述希夷以攄臣下之志其登封及禪並肆覲之壇並請刻頌立碑顯揚功業又議設告至壇曰既至山下禮行告至柴於東方上帝望秩遍禮群神今請其壇方八丈一尺高三尺陛仍四出其禪方壇及自餘儀式請從今禮仍請柴望秩同時行事又議厥石闕及大小距石曰距石之設意取牢固本資實用豈云雕飾今既積土厚封足與天長地久其小距圜壇石闕回建事非經誥無益禮儀煩而非要請從減省以十五年奏從此議餘皆罷之遂附制于今禮永垂於後焉十四年十月甲戌趙王元景等表請封禪帝沖讓不許至於再三壬辰詔曰夫功成道合古今以為隆平登封降禪聖賢謂之大典是以出震則天之后革夏變商之君繼韶夏而施尊名崇號諡而廣符瑞顧遲遲焉群臣區區誠為此也原夫大始云構生靈厥萌黎庶布乎穹壤皇王司其右契遐哉上古以迄於茲歷選休徵未有如今日之盛也所以敢罄窺管無懼觸鱗瀝膽披肝言亦備矣援天引聖辭亦殫矣幸蒙亭育之澤降以聽覽之恩大賚雖敷猶申後命未便渙汗方事逡巡懷生之徒不遑寧處伏乞皇帝陛下則天成務應物為心協三才之會昌乃霈然而動色遂萬姓之延首俯凝旒而改容雖復龍圖告徵龜書襲吉尚咨諏於四嶽建明謨於兆人欲使六合之中沃心通於朝野八紘之內下問浹於華戎凡在人靈疇無抃躍今茲百辟咸集九有攸同並執玉以來庭俱式歌而且舞遠則重譯僉議近則端笏參謀欣覩增天之高願逢加地之厚絶域忘生而越險華髮忍死而爭趨中外之心克諧愚智之情允睦掌故事者草登封而待期執羈勒者儼車徒而俟命庶官率職三事夙興遠邇昌言明靈幽贊莫不傾視俯聽希陪肆覲之禮效祉呈祥欽承告成之慶山稱萬歲企和鑾而發奇雲浮五彩佇華蓋而交蔭兩儀之情轉迫萬國之望愈深臣又聞之屈己從衆至人所以稱仁絲言顯發哲王以之敷信昨奉明詔許以試之實降皇情俯同人欲寬仁之利斯博示信之道宜弘即日庶尹馳心咸奉章而守闕列藩翹足各伏地以祈恩所冀天慈深加昭察制可群僚之奏剋以發軫之期頒示普天申明絶典使夫一時之士欣獨高於萬代八荒之酋荷周露於再造則臣等死日猶生之年不任誠懇之至謹與連率方牧等奉表詣闕固請以聞於是下詔曰自古明王君臨區宇功濟天下道被生民內外無虞年穀豐稔莫不歸功上玄致禮厚地騰茂實於六合飛英聲於百代今公卿在列屢屬虛心嶽牧具僚固陳僉願理在難奪敬依來請顧循諸己仍懷慚德十五年三月庚辰肅州言所部川原遍生芝草先是百僚及雍州父老詣朝堂上表請封禪四月辛卯朔下詔曰肇有蒸庶樹之司牧載籍所紀風烈猶存至於道洽品物功成宇縣天眷彰於符瑞人事表於隆平莫不增封岱宗廣禪梁甫榮鏡六合對越三神前聖所以垂其尊名後王所以仰其休烈蓋繇此也自火德既衰三光分裂金行失御九鼎沉淪諸華競逐彝倫大壞雖周室削平趙魏隋氏混一文軌而金革之事未戢於封疆雅頌之音弗聞于朝廷遂使至教闕如淳風莫反齊郊絶類帝之禮日觀缺升中之儀其已久矣朕丕膺景命嗣守洪基承大亂之餘當率土之責負扆興惕納隍在慮上憑宗社之靈下資士庶之力草昧伊始援干戈以靖亂區夏既平引禮樂以緯俗尉候無警災畬有年比屋咸保其歡含氣不違其性殊方異域盡地界而來庭應圖合牒殫天符而表瑞緬懷前載詳求諸己豈伊寡德能致此乎固乃上玄所叶贊也而群公卿士百辟庶僚囿陳人祗之意請遵封禪之典推而不居至於數四文武之情彌切內外之議日聞誠請頻繁淹歷年載朕繼迹百王因心萬物上奉蒼昊義在薦功下撫黎元方祈厚福既迫茲理敢不祗從猥以眇身齊美上代永言夙志凜乎增惕可以來年二月有事泰山所司宜與公卿並諸儒士及朝臣有學業者詳定其儀博考聖賢之旨以允古今之中務盡誠敬稱朕意焉於是詔太常卿韋挺為檢校封禪大使禮部侍郎令狐德棻副焉朝廷參議其儀異端競起祕書少監顏師古乃奏稱臣撰定封禪之禮書在十一年春于時諸儒參詳以為適中詔公卿定其可否多從師古之禮六月己酉有星孛于太微宮犯即位辛亥朝散大夫行起居郎褚遂良進曰陛下撥亂反正功超前烈告成升嶽天下幸甚而行至雒陽彗星輒見此或有所未允合者也且漢武優柔數年始行岱禮臣愚伏願詳擇丙辰詔曰自古皇王受天之命建顯號於封禪揚洪名於竹帛者莫不功濟夷夏道叶人祗然後登泰山之高刊梁甫之石未有七德靡記九部寂寥而欲齊聲於聖哲垂美於篆籀者也朕承宗廟之重當區宇之責寅畏三靈憂勤萬姓雖戡翦禍亂克定遐荒而至教猶鬱刑典未厝勝殘之化未洽於率土和平之風多慚於往烈是以覽經籍而自失想壇場而增懼亟寢縉紳之奏屢拒公卿之請逡巡大典荏苒歷載近者文武百僚州縣庶尹頻繁抗表殷勤固陳咸以為兩儀交泰四夷賓服禮讓興行年穀豐稔蒼昊呈符於上靈符不可以久替黎獻協心於下衆欲不可以固拒朕迫茲群議敢不敬從欲薦功上玄大報后土升中之儀已具省方之期有日今太史奏有彗星出於西方朕撫躬自省深以戰栗良繇功業之被六合猶有未著德化之覃八表尚多所闕遂使神祗垂祐警戒昭然朕畏天之威寢興靡措且曠代盛典禮數非一行途之間勞費不少冬夏凋弊多未克復將送儀仗轉運糧儲雖存節省之義終煩黎庶之力非唯上虧天意亦恐下失人心解而更張抑有故實前以來年二月有事太山宜停庶夙夜自修遂其罪己之志勤恤匪懈申其納隍之情儻蒙靈祗回眷宗社介福朝廷同於大道風俗歸於朴素告成之美更思其宜仍命所司泰山有前代帝王因封禪立碑及石函撿之類往遭離亂被賊毀發並修立瘞藏之二十年十一月司徒長孫無忌與百官及方嶽等上表請封禪不許司徒長孫無忌與百僚又請封禪詔曰朕念遠役初寧頗須休息深知所請甚合機宜即事省方恐生勞擾俟百姓間逸可徐議之十二月己丑司徒長孫無忌等又詣順天門抗表請封禪曰臣聞陰陽不測陶冶生靈之謂神道德玄通仁育黎元之謂聖聖也者自天之攸縱也神也者代天之理物也是以惟天稱辟靈心作其會昌惟辟奉天至誠表其封禪升中之道抑斯之謂歟繇是先王急焉當仁不讓景中必熭時至則行務在告於成功故無俟於終日伏見綸旨辭遠役之初寧緩此嘉期託俟人之逸豫豈容前歌拔拒戢武之後辭勞拓境開疆太平之秋有倦誠如睿慮未昭百姓之心假此空言實乖千里之應臣等伏膺麟閣縱觀太始之初沉研烏文歷選櫓巢之上悠悠栗陸未辨犧牲渺渺大庭孰知樽俎袞衣為飾尚報太帝之功茹毛充薦輕展介丘之禮西敘窮乎積石東漸迫乎滄江化未覃於九夷貢有闕於三脊猶且範圍天地斡運羲舒揚翠旌於奉高撫朱絃於岱嶽迓百神而賓上帝契三靈而謁大壇玉牘靈文飛英華於萬古金繩祕撿騰清輝於八埏是知紀號垂名崇高莫加於肆類推功輯瑞廣厚莫大於登封若乃靈貺所集人謀允洽雖固執於撝謙諒無得而辭也伏惟皇帝陛下研精探賾神無不照唯幾所鑒洞出象帝之初先天成則超貫混元之際繇是大明揚彩麗雕軒以再中景宿騰輝藻璇題以霄映奔山車而疊軫促日馭之鳴鑾躍澤馬而相趨徵天駟之徐軔煙川清野蓄泄於奕奕之阿薰風警途扇蕩於云云之嶠其冥兆也如彼其顯應也若斯而陛下因事逡巡方稽大典使尊名顯號韜光於琰碑絶異殊尤沮絢於瓊簡孰謂畏天之命順人之欲者歟率土悽悽深所未喻臣又聞之遊海若者馮夷之宮為陋登太山者魯侯之邦蓋小是知絳霄不極九垓網絡於胸中赤縣無涯四海括囊於度內何者升山巢睫竊比所以懸殊朝菌靈椿長短自然相度也若夫大樂云替封豨盜鍾大禮既湮長鯨裂冕酌撫石於無體均天之響鬱興採掃地於無形禋宗之道逾劭則女希慚其創制軒后歸其正名矣至若比屋見誅農夫化為京觀稟噍無類芻牧窮於染鍔重興粒食頌棲畝之餘糧首建驂騵詠徒行之兼乘則農皇貶於推轂羲氏退以扶輪矣既而疑旒闡化中外禔福負扆勝殘飛沉遂性亭育侔於宇宙就望體於雲日荷其德以難名用其功而無謝故乃邈高辛之順義孕顓頊之疏通矣加以刑清政肅委金科而罔施毀犴空囹設盡衣而莫犯通關梁於敻服共苑囿於黎蒸擊壤而謠傳清音於戎狄耕田而食建可封於皂隸外戶設而不扃神獸馴而靡觸故以光融伊帝景煥虞庭至於卑宮菲膳孝享通於鬼神大路越席致敬極於嚴配黃屋建三辰之旗垂範裕於千祀玄冔垂九旒之藻設法懸於萬代小正調其玉燭應祥冥而不虧中天朗其金鏡與真明而同晷則文命以是伏膺玄王於茲負笈矣洎乎翦商除害夷項墾災戮冀野而復皇猷誅疇華而清帝道提倚天之長劍拯塗炭於遊魂揮駐日之雕戈暢懷生於仁壽則駭文武之仍代吞高光之纍葉矣詮彼數君時聞一善能兼之者實歸仁聖若乃提封海外總一寰中日域窮芳華之津月竁跨濛波之表顒顒面內並為冠帶之倫飄飄駕風總萃王庭之會賮北荒之明月牣天府以摛光筐南州之火毛鬻旗亭而吐曜龍伯鈞鼇之旅咸編列於武臣鳳洲君子之渠各委質於文吏斯乃書契之所未覩超古先而絶類矣竊惟域中三大義均一體感通繇乎影響彌綸切乎交際是知德逾厚者貺逾深功尤高者祥尤著當今皞窮儲祉浹天紘以宅心后土錫符總坤維而服化繇是百官纍息萬國聳神僉發即閽之請佇副上靈之望伏願時紆睿緩遠振天聲徵鴻儒聘鯢齒考逸義緝遺編托秦煨之逸文採魯壁之餘蠹酌雲經而定議憲河圖而繕儀然後玉路乘春金鏕肅景五牛翻其折羽六龍輝其鏤錫鼓豐隆而警翠微振列缺而清緑野疑笳發岫合萬歲於山言飛蓋登巒錯五松於林秀登圜壇而接武降曜魄而齊尊俾夫一代衣冠置其名於册府四方夷狄鑿其竅於靈宮則普天欣賴懷生再造朝聞夕死抃若登仙臣等深荷玉成不勝至願重竭愚瞽昧死以聞詔曰朕遐觀哲王煥在方册功既成矣咸禮備以升中道既行焉必奉符而告觶所以發揮天命昭報上靈其有建顯號以創鴻徽施尊名而騰茂烈者莫不揚輝於鏤玉絢景於塗金昭昭然麗三辰而並運滔滔焉播四冥而極深朕誠寡德良深景慕曩者氓俗凋弊國步甫安勉致隆平日不暇給而槐卿守闕請繼美於雲亭嶽牧叩閽祈踵武於梁岱自惟菲薄至道未凝抗禮皞穹寶懷疑懼緬尋幼齒運鍾交喪忘其家以徇天下委其體以濟寰中翊戴先皇削平諸夏出於萬死首導五橫之源不顧一生光錫兆人之命越自爐炭獲返管魂拔於鬼録並登仁壽竊惟天地之大德存於施生朕以徑寸之懷小心襲於造育降期體泰諒或繇茲不然者何能致於此也遂得池隍象浦苑囿龍沙置一侯於鶼林同六爻於鰥水實資天眷賁以咸亨豈朕微庸而能及此今茲列辟卿士鴻生碩德各迷靈微纍陳丹款既迫群議當事敬從乃詔有司廣召縉紳先生議方石圜壇之制草封禪射牛之禮修造羽儀輦輅並送之雒陽宮二十一年正月丁酉詔曰朕聞天高地大首播黎方媧皇燧人肇恭玄籙是知施生為德處崇高而不言亭毒攸資委欽明以司契洎乎三正迭建五運相遷休烈存乎典墳至道流乎雅頌其有仰齊七政俯會百神察靈眷於祥符報玄功於昭告莫不罄情梁岱繼踵雲亭對越兩儀盡先聖之能事揚蕤三統垂曩哲之尊名懸鏡天衢罔不繇於此也自中陽絶組堙白水於窮流宮孽紹興阻黃星於天塹永嘉東播化金馬以為牛道武南徂飛蒼鵝以登祚周吞嶽裔逮三葉而巢傾隋並舜後及二帝而舟覆莫不以凶易亂以暴代昏各肆巨壑之心規享上靈之佑卻行求進其可得乎繇是寂寥千祀無懷之風不嗣泯棄七經子長之言殆絶遂使成山日觀久闕升中之儀汶上明堂疇聞類帝之義顧瞻禮樂深有可嗟朕幼踐危機愍斯窮運上同負翼下靡息肩負荷休徵投旗鞠旅肅恭儲社吟雲躍鱗順朱鳥以行誅騫丹鳳而遐舉射九烏而懸日月區品物以煦陽和練五石以造乾坤濟摧角以全眉壽於是尊奉先帝凝旒於廟堂躬履兵鋒憂勤於燮輔既而仰逼威命俯順樂推越自唐侯言膺下武深惟憂責之重自勗若厲之懷遂致靈貺無涯翦毛頭而降錫遊魂削衽盡窮髮以開疆東苑蟠桃西池昧谷咸覃正朔並充和氣較凝禎於往代窮今古而罕聞考光澤於前皇罄練緗而莫睹豈朕眇身勤勞所逮諒繇高明垂鑒祚此隆平今茲三事大夫百僚庶尹各述天人之意請躡封禪之蹤顧惟寡薄推而不有杜絶群言至于數四中外之情尤切企佇之望逾深朕又詳思荷財成於穹昊自古賢哲並歸功於大帝迫斯至理弗獲固辭展禮上玄實增慚懼可以貞觀二十有二載仲春之月式遵故實有事於太山諸內外具僚嶽牧卿士既相敦喻將事告成各罄乃心無虧政道恪居職務以協時雍所司宜與縉紳先生載筆圓冠之士詳求通典裁其折中深加嚴敬稱朕意焉乃令天下諸州明揚仄陋其有學藝優洽文蔚翰林政術甄明才膺國器者並宜總集太山庶令作賦擲金不韞天庭之掞被褐懷玉無溺屠釣之間務得英奇當加不次也遣太常卿楊師道為檢校封禪大使戶部侍郎盧承慶為副後改令禮部尚書江夏郡王道宗為大使司空梁國公房玄齡等議云梁甫社首二山並是古昔禪祭之所去十五年議奏請禪梁甫今更奉詔詳議梁甫去泰山七十里又在東南至於行事未為穩便社首去泰山五里是周家禪處臣等參詳請禪社首有詔依奏餘並依十五年議八月壬戌詔曰朕聞探玄賾者先實而後賓體至公者本仁而末禮名歸於己往哲存而弗務德利於人前聖徇而為急是用範圍天地權輕重以會時宜取則陰陽適通變以從衆欲繇古之封禪無奪事機所謂奉天咸資務隙朕仰窺前志歷選哲王無懷有巢緬逾繩契之末龜文鳳紀越在俎豆之先扣寂寞以傳疑故可略而言也至如三元立統百物正名步驟之軌非遙損益之源可挹雖堯心廣運局疆域於流沙禹迹遐宣限隄封於碣石猶且先引即敘次展玉帛之儀首創賓門方備云亭之典告成之義罔弗繇茲況朕奄有方輿閫域該於千古仰承靈眷降福超於百王巨海所環莫非臣妄長河攸括並入封疆日者夷夏同文禎符狎至謂可鳴鑾日觀勒牒仙閭許以來春親行告憚而今延阤一姓流竄西陲控弦萬計初歸正朔新就縶維又以公卿庶僚各陳誠請遂有翠微之役非無板築之勞既而山谷阻深朝宗有礙重披丹懇請建玉華且復頻有興造恐致勞頻兼聞河北數州頗傷淹潦朕為人父母思濟黎元順動升中理無兼遂其介丘之禮宜且權停其玉華宮制度務從菲薄更令卑陋庶免風雨稱朕意焉
