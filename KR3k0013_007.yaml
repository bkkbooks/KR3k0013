body:
  text: 創業三創業三隋高祖文帝楊氏武元皇帝之子臣欽若等曰武元以上事迹具帝王帝系門初仕後周為大將軍襲爵隋國公周武帝聘高祖長女為皇太子妃齊王憲言於周帝曰普六茹堅相貌非常臣每見之不覺自失恐非人下請早除之帝曰此止可為將耳建德中率水軍三萬破齊師於河橋明年從武帝平齊進位柱國與宇文憲破齊任城王高楷於冀州除定州總管轉亳州總管宣帝即位以后父徵拜上柱國大司馬大象二年五月出為揚州總管將發暴有足疾不果行周宣帝晏駕時靜帝幼沖未能親理政事內史上大夫鄭譯御正下大夫劉昉以高祖皇后之父衆望所歸遂矯詔引高祖入總朝政都督內外諸軍事周氏諸王在藩者高祖恐其生變稱趙王招將嫁女於突厥為詞以徵之丁未發喪庚戌周帝拜高祖假黃鉞左丞相百官總己而聽焉以正陽宮為相府以鄭譯為長史劉昉為司馬具置寮佐宣帝時刑政苛酷群心惶駭莫有生意至是高祖大崇惠政法令清簡躬履節儉天下悅之六月趙王招陳王純越王盛代王達滕王逌並至于長安是月雍州牧畢王賢及陳趙等五王以天下之望歸於高祖因謀作亂高祖執賢斬之寢趙王等之罪因詔五王劍履上殿入朝不趨用安其心相州總管尉遲迥自以重臣宿將志不能平遂舉兵東下趙魏之士從者若流旬日之間衆至十餘萬又宇文胄以榮州石懸以建州席毗以沛郡毗弟文羅以兗州皆應於迥迥遣子質于陳以請援高祖命上柱國鄖國公韋孝寬討破之傳首闕下餘黨悉平初迥之亂也鄖州總管司馬消難據州響應淮南州縣多同之命襄州總管王喧討之消難奔陳荊郢群蠻乘釁作亂命亳州總管賀若喧討平之先是上柱國王謙為益州總管既見幼主在位政由高祖遂起巴蜀之衆以興復為辭高祖方以東夏山南為事未遑致討謙進兵屯劍閣陷始州至是乃命行軍元帥上柱國梁睿討平之傳首闕下巴蜀阻險人好為亂於是更開平道毀劍閣之路立銘垂誡焉是月誅趙王招越王盛九月周帝詔授高祖大丞相罷左右丞相之官十月誅陳王純十一月誅代王達滕王逌十二月進爵為王靜帝大定元年二月壬子加九錫遂受周禪開皇元年三月庚子詔曰自古帝王受終革代建侯錫爵多與運遷朕膺籙受圖君臨海內載懷沿革事有不同然則前帝後王俱在兼美立功立事爵賞仍行茍利於時其致一揆何謂物我之異無計今古之殊其前代品爵悉可依舊唐高祖神堯皇帝李氏太祖景皇帝之子臣欽若等曰景帝以上事迹具帝王帝系門襲封唐國公大業中為衛尉少卿遼東之役高祖於懷遠鎮督運糧知楊玄縱兄弟逃還密表聞奏煬帝始知玄感起逆乃班師於是慰勞高祖諭以親親之意元弘嗣先在弘化留守即斛斯政親戚乃遣高祖馳執弘嗣代為留守關右十三都兵皆受徵發高祖御衆寬簡結納英豪歷居中外皆樹恩德繇是四海之士多歸心焉于時絳郡賊柴保昌等有衆八萬煬帝令戶部尚書樊子蓋擊之子蓋深溝高壘不敢決戰有來歸首者不問多少必坑之繇是莫敢降賊徒日盛屯軍在外連年不能剋煬帝令高祖代總其衆高祖與賊頻戰每挫其鋒有來者引置左右推赤心待之人人自安願效死力其餘賊黨相謂曰我輩本無逆心徒以政令嚴苛懼死為盜耳前後首者為子蓋所殺窮無所歸今唐公與人無隔疏遠意坦如也我輩知不死矣遂相率歸首前後至者數萬餘人賊散走他郡時突厥犯塞煬帝令高祖與馬邑太守王仁恭率衆備邊會虜寇馬邑仁恭以衆寡不敵有懼色高祖謂之曰今主上遐遠孤城絶援若不死戰難以圖全於是親選精騎二千出為遊軍居處飲食隨逐水草一同於突厥見虜候騎但馳騁畋獵示若輕之及與虜相遇則犄角置陳選善射者為別隊持滿以待之虜莫能測不敢決戰因縱奇兵擊走之獲其特勒所乘駿馬斬首千餘級煬帝復以高祖為太原留守遣武賁郎將王威虎牙郎將高君雅二人為副會高陽賊帥歷山飛等衆號十萬來寇太原將軍慕容羅睺潘長文俱為所敗賊鋒益盛高祖率步騎六千以擊之相遇於同過水上賊陳彌亙十餘里埃塵漲天戰士大懼莫不股栗高祖神色自若令王威率大衆居前所有旌旗鼓角及輜重悉配之高祖與麾下數百騎居後賊望威軍為高祖盡鋭來戰威不能支軍遂敗高祖以騎翼擊之為賊所掩重圍數匝於是身先力戰會太宗來救因復收兵擊之賊遂大敗虜男女數萬口未幾突厥寇馬邑高祖遣高君雅拒之君雅頗憂罪譴高祖亦懼煬帝節度隋師不捷時太宗從在軍中知隋祚將亡潛圖為義舉欲以安天下因進白曰大人何憂之甚也當今主上無道百姓愁怨城門之外皆已為賊獨守小節必旦暮死亡若起義兵實當民欲人人之願此天授之機可因轉禍以就功業既天與不取憂之何益高祖大驚深拒之太宗趨而出明日復進説曰此為萬全之策以救族滅之事今王綱弛紊盜賊遍天下大人受命討捕其可盡乎賊既不盡自當獲罪且又世傳李氏姓應圖籙李金才位望隆貴一朝族滅大人就能平賊即有功當不賞以此求活可恃乎高祖意少解曰我日夜思量汝言大有理破家滅身亦繇汝化家為國亦繇汝繇是定計遇煬帝遣使者馳拘高祖送詣江都高祖素被猜忌及是大懼謂太宗曰事急矣計將安出太宗又進策高祖然之方令太宗舉兵以自濟會有詔釋高祖繇是止既而馬邑人劉武周殺刺史王仁恭舉兵反攻破汾陽宮百姓飢饉江都阻絶於是太宗復固請曰大人受委鎮守而賊徒日熾竊思既離宮闕不能捍禦若不早舉大計即身陷禍機悔無所及高祖從之因集將帥而謂之曰武周僣號天子在遠賊據汾陽宮我輩不能制自當族滅矣將如之何王威與高君雅及諸僚吏咸請集兵高祖欲觀威等之意乃曰朝廷出師皆稟詔敕未有閫外敢專之者今賊據離宮自稱尊號近在數百里間江都懸隔道路艱阻若待奏報還期未測夫以薪救火豈有撲滅者哉今進退維谷復將何計威等咸曰公地居賢戚務盡丹誠國家之利唯在平賊逡巡聽奏豈及事機高祖曰善乃命太宗與晉陽令劉文靜及門下客長孫順德劉弘基等各募兵旬日之間衆且一萬文靜頓於興國寺順德頓於阿育王寺威及君雅等見兵大集相與疑懼請高祖祈雨於晉祠將為不利高祖知其謀部勒麾下陰為之備五月甲子旦高祖與威及君雅等同坐視事太宗嚴兵在外以備非常遣劉文靜與高陽府司馬劉政會入告變云二人謀反陰引突厥將覆太原高祖徉驚曰豈有是耶徐以文書示之曰人告公反宜受勘當即於座上執之丙寅突厥數萬騎來寇城下高祖令開門偃旗幟虜不測所為引兵掠城外而去高祖令軍中曰人言王威勾賊此其效矣於是斬威君雅以謝太原百姓乃遣劉文靜連和於突厥六月己卯裴寂殷開山等請稱義兵準伊尹放太甲霍光廢昌邑故事尊煬帝為太上皇立代王以安隋室傳檄諸郡以彰義舉高祖可之甲辰命太宗將兵徇西河郡下之癸巳建大將軍府以裴寂為長史劉文靜為司馬具設官屬始置三軍分為左右以公子建成為隴西公左領大都督左三軍悉隸焉命太宗為燉煌公右領大都督右三軍悉隸焉開倉庫以賑窮乏遠近響應七月壬子以公子元吉為姑臧公太原留守高祖以兵西圍關中精甲三萬高祖仗白旗誓衆於太原之野引師即路甲寅遣將張瀹徇稽胡下離石隴泉文城三郡丙辰師次霍邑隋虎牙郎將宋老生陳兵拒險義師不得進屯軍於賈胡堡會霖雨積旬餽運不給高祖患之忽有白衣老父詣軍門請見曰豫霍山神遣語大唐皇帝若向霍山邑當東南傍山取路八日雨止我當助爾破之高祖初哂之遣人東南視地界有微道高祖笑曰此神不欺趙襄子豈當負吾邪時有訛言云突厥將襲太原又軍糧盡高祖命旋師太宗切諫乃止八月己卯雨果霽高祖大悅以太牢祭霍山辛巳引師從傍山道趨霍邑去城十餘里有陳雲起軍北東西竟天高祖謂裴寂曰雲色如此必當有慶又謂諸將曰老生若嬰城自守當即攻之主客勢懸卒難致力其計若何太宗進曰老生勇而無謀請以輕兵挑之必出戰則成擒矣高祖從之太宗以數騎指其城下舉鞭指麾若將圍城者老生果怒開城門出太宗馳白高祖曰事諧矣高祖因謂隴西公建成曰汝看兩陳將交引左軍直趨東門命太宗引右軍直趨南門以斷其歸路老生之軍背城而陳高祖以中軍與建成合陳於城東太宗及柴紹陳於城南老生麾兵疾進先薄高祖而建成墜馬老生乘之中軍與左軍卻太宗自南原遙見塵起知義師退率二百騎馳下峻坂殺一賊遂橫斷其軍出陳後表裏齊譟響若摧山隋師大潰各捨仗而走懸門發老生不得入城乃棄馬投塹甲士斬之致其首於麾下流血數里僵尸相枕四面乘勝進薄其城時無攻具士卒緣槊而上一時攀堞無敢當者遂平霍邑撫其餘衆而用之丙戌下臨汾郡時臨汾郡通守陳叔達堅守不下高祖謂廚人曰吾明日下城然後朝膳辛卯引兵攻城自旦及辰而破高祖乃食癸巳次龍門縣突厥始畢可汗遣康稍利率兵五百人馬二千匹以會於軍所九月己亥營於孤窟去河東六十里先是春夏早麥不熟穀米踴貴人相食及義師起澍雨應時至是大熟禾稼滿野義兵資之無所匱乏論者以為天贊時津梁為其所斷關中向義者頗以為阻於是水濱居人競進船不謀而至者前後數百里乃置水軍焉壬寅馮翊賊帥孫華土門賊帥白玄度率其衆來降高祖命華及王長諧等引兵先渡因戒之曰屈突通去此五十餘里不敢與我爭鋒其人守法懼罪必當伺便襲卿可宜為之備通果遣虎牙郎將辛顯和率精兵數千夜襲長諧義軍不利隋人逐北華將走太宗以遊騎掩其後顯和敗績僅以身免悉虜其衆丙辰馮翊太守蕭造以郡來降戊午高祖率衆攻屈突通於河東士卒登城南面者已千餘人高祖在東原望之而不見會雨暴至鳴角止軍繇是不剋或勸遂攻之高祖曰屈突通習兵而無勇若決戰非其所長嬰城難以必勝此自守虜耳不足為虞遂守軍營於河渚文武將吏勸領太尉加置僚佐高祖從之華陰令李孝嘗常以永豐倉歸義以少年祀河率大軍而濟甲子舍於長春宮三秦士庶至者有萬數高祖禮之並過所望人人喜悅更相謂曰真吾主也丙寅遣隴西公建成司馬劉文靜屯永豐倉以拒潼關太宗以前軍數萬人自渭北徇三輔所至皆下高祖第三女柴氏從父弟神道舉義於司竹至是以兵來會郿賊帥丘師利李仲文盩厔賊帥何潘仁向善志宜君賊帥劉旻等各率衆數千來降丁卯以師渡渭川略定鄠杜至於盩厔庚午高祖觀永豐倉笑謂官屬曰吾千里遠來志在此耳既為我有復何憂哉於是開倉大賑窮乏壬申過馮翊舊宅饗五廟乙亥命太宗率兵自渭汭屯阿城隴西公建成自新豐趨上灞是日延安上郡雕陰郡並遣使來降丙子高祖率大軍自下邽西上經煬帝行宮園苑悉罷之宮女放還親屬十月辛巳高祖至長樂宮時京師留守衛文升陰世師挾代王以拒義師高祖屯兵春明門有衆二十餘萬遣使至城下諭以興復之意再三皆不報將吏固請圍城辛卯太宗帥師入郭頓于城西乃命隴西公建成入頓城東分朱雀大街列營圍之甲辰諸將又請攻城高祖不許將吏進諫曰大軍西入本欲鎮撫關中輔翼隋室光崇帝業陰世師等違拒義師誑惑城內若不盡鋭取城誅君側之賊何以息於流謗高祖乃從之遂下令曰七廟及代王隋室公族並不得犯有違者罪及三族十一月丙辰軍頭雷紹先登守陴者分散京師平先命主符郎宋公弼收隋圖籍戊午以右衛將軍陰世師多黷貨京兆郡丞滑儀性苛酷有害於政並斬之以謝關中連坐者十餘人癸亥率百僚備法駕尊代王為天子大赦改元義寧元年十一月甲子高祖自長樂宮入京師至朝堂望闕而拜天子以高祖為丞相録尚書事假黃鉞進封唐王以武德殿為相府萬幾悉委焉高祖每日於廣化門視事乙丑榆林靈武五原平涼安定五郡遣使來降十二月癸未天子詔以隴西公建成為唐國長子進封太宗為秦國公元吉為齊國公高祖遣趙郡公李孝恭徇山南所至皆下乙未平涼太守張隆以其衆來降丁酉扶風太守竇璡阿池太守蕭瑀並以郡來降癸卯右翊衛長史宋遵貴以陝縣太原倉來降甲辰遣使者詹俊李袞等徇巴蜀並下之二年正月丁未天子詔高祖劍履上殿入朝不趨贊拜不名加前後羽葆鼓吹並依舊事辟仕癸丑遣楊義弘徇靈武戊午上雒浙楊二郡及浮靈賊帥蕭嶽周洮等並遣使來降癸亥論功行賞其登京城第一勛授光祿大夫開國郡公物一千段雖第一勳而身死者亦準此其官回授於子第宅奴婢仍並量給第二勳人各授三輔物二百段第三勳人從朝散加戊辰以長子建成為撫軍大將軍左元帥總兵十餘萬以徇東郡二月丁丑遣功曹參軍裴清率兵襲河陽己卯遣太常卿鄭元璹定樊鄧使者馬元規徇荊襄甲午出米七萬斛以賑貧人清河賊帥竇建德稱長樂王三月己酉以齊國公元吉為鎮北將軍太原道行軍元帥乙卯徙太宗為趙國公戊辰詔唐王備九錫之禮五月乙己朔詔唐王冕有十二旒建天子旌旗出警入蹕乘金根車駕六馬備五時副車置旄頭雲罕樂舞八佾設鐘磬宮懸王后王子王女爵命之號一遵舊典五月遂受隋禪後唐太祖武皇帝獻祖第三子獻祖以上事具帝王帝系門少為雲中守捉使唐僖宗乾符三年段文楚為代北水陸發運雲州防禦使時歲薦飢文楚稍削軍食諸軍咸怨帝部下爭訴以軍食不充邊校程懷素王行審蓋寓李存墇薛鐵山康君立等即擁帝入雲州衆且萬人營於斗雞臺城中械文楚出以應於外諸將列狀以聞請授帝旌鉞朝廷不允徵諸道兵以討之五年黃巢渡江其勢滋蔓天子乃悟其事以帝為大同軍節度使檢校工部尚書是歲獻祖以振武軍節度使出師討黨項會吐渾赫連鐸乘虛陷振武舉族為吐渾所虜帝至定邊軍迎獻祖歸雲州雲州守將拒關不納帝掠蔚朔之地得三千人屯神武川之新城赫連鐸晝夜攻圍帝昆弟三人四面應賊俄而獻祖自蔚州引軍至吐渾退走自是軍勢復振天子以赫連鐸為大同軍節度使進軍以討六年春又以昭義節度使李鈞充北面招討使將上黨太原之師過石嶺關屯於代州與幽州李可舉會赫連鐸同攻蔚州獻祖以一軍禦之帝以一軍南抵遮虜城以拒李鈞鈞中流矢而卒廣明元年春天子復命元帥李涿率兵數萬屯代州獻祖戰不利乃率其族奔於韃靼部是歲十一月黃巢寇潼關天子令河東監將陳思景為代北起軍使收兵破賊十二月黃巢犯長安僖宗幸蜀思景與李友金發沙陀諸部五千騎南赴京師友金即帝之族父也中和元年二月友金軍至絳州將渡河刺史瞿積謂陳景思曰巢賊方盛不如且還代北徐圖利害四月友金軍雁門瞿積至代州半月之間募兵三萬營於崞縣之西其軍皆北邊五部之衆不間軍法瞿積友金不能制友金謂景思曰舉大衆成大事當威明素著則可以服人今軍雖數萬茍無善帥進亦無功吾兄李司徒父子去歲於國家獲罪今寄北郡雄武之略為衆所推若驃騎急奏召還代北之人一麾響應則妖賊可平也景思然之促奏行在天子乃以帝為雁門節度使仍令以本軍討賊友金發五百騎齎詔召帝於達靼帝即率達靼諸部趨雁門五月整兵二萬南嚮京師太原鄭從讜以兵守石嶺關帝乃引軍出他道至太原城會大雨班師於雁門二年十月帝率欣代蔚朔達靼之軍三萬五千騎赴難於京師十二月至河中三年正月諸道都統王鐸承制授帝東北面行營都統帝令弟克修領前鋒五百騎渡河視賊黃巢遣將米重威齎重賂及偽詔以奉帝帝納其賂以給諸將燔其偽詔以兵自夏陽濟河二月營於乾坑店黃巢大將尚讓林言王璠趙璋等引軍十五萬屯於梁田坡翌日大軍合戰自午及晡巢賊大敗是夜賊衆遁據華州帝進軍圍之巢弟黃鄴黃揆固守三月尚讓引大軍赴援帝率兵萬餘逆戰於零口巢軍大敗帝進軍滑橋翌日黃揆棄華州而遁四月黃巢燔長安收其餘衆東走藍田關帝進收京師七月天子授帝金紫光祿大夫檢校左僕射河東節度使時年二十有八十一月平潞州表其弟克修為昭義軍節度使潞帥孟方立退保於邢州十二月許帥田從異汴帥朱溫徐帥時溥陳州刺史趙犨各遣使來告以巢蔡合從凶鋒尚熾請帝共力討賊四年四月帝帥蕃漢之師萬五千合徐汴之師破尚讓於太康斬獲萬計進攻賊於西華賊將黃鄴棄營而遁帝引軍營於中牟大破賊於王滿渡巢賊大至濟汴而北帝渡汴遇賊將渡而南半濟擊之大敗殘衆保於胙縣冤句大軍躡之黃巢乃攜妻子兄弟千餘人東走帝追賊至於曹州還至汴汴帥朱溫館於上源驛夜將圖之帝縋城而出事具帝王神助門光啓二年三月幽州李可舉鎮州王景崇連兵寇定州節度使王處存求援於帝帝遣大將康君立安老老薛可敦啜率兵赴之五月鎮人攻無極帝親領兵救之鎮人退保新城武皇攻之斬首萬餘級獲馬千匹王處存亦敗燕軍於易州十一月河中王重榮遣使來乞師且言邠州朱玫鳳翔府李符將加兵於己初帝與汴人搆怨前後八表請削奪汴帥官爵自以本軍進討天子纍遣內臣楊復恭宣旨令且全大體帝不時奉詔天子頗任汴帥時觀軍容使田令孜君側擅權惡王重榮與帝膠固將離其勢乃移重榮於定州重榮告於帝帝上章言李符朱玫挾邪忌正黨庇朱溫臣已點校蕃漢軍五萬取來年渡河先斬朱玫李符然後平蕩朱溫天子覽表遣使譬喻百端軺傳相望既而朱玫引邠鳳之師攻河中王重榮出師拒戰朱玫於沙苑對壘月餘十二月帝引軍渡河與朱玫決戰玫大敗收軍夜遁入於京師時京城大駭天子幸鳳翔帝退軍於河中二年正月僖宗南幸興元朱玫於鳳翔立嗣襄王熅為帝以偽詔賜帝帝燔之械其使馳檄諸方鎮遣使奉表於行在九月遣昭義節度李克修討孟方立於邢州大敗方立之衆於焦岡斬首數千級以大將安金俊為邢州刺史以撫其降人十月進攻邢州邢人出戰又敗之三年六月河中節度使王重榮為部將常行儒所殺帝表重榮兄重盈為帥文德元年二月僖宗自興元還京三月昭宗即位以帝為開府儀同三司檢校太師兼侍中隴西郡王十月邢州孟方立遣奚忠信將兵三萬寇遼州帝大破之斬首萬級大順元年遣李存孝攻邢州孟遷以邢洺磁三州降執汴將王虔裕三百人以獻帝徙孟遷於太原以安金俊為邢洺團練使三月帝攻雲州拔其東城赫連鐸求援於燕燕帥李康威將兵三萬以赴之戰於城下燕軍大敗康威與雲州赫連鐸及汴帥協謀連上表請加兵於帝六月天子削奪帝官爵以宰相張濬為招討使以京兆尹孫揆為副華州韓建為行營都虞侯以汴帥為河東東面招討使李康威河東北面招討使赫連鐸為副汴將朱友裕將兵屯晉絳時汴軍已據潞州又遣大將李讜等率軍數萬急攻澤州帝遣李存孝自潞州將三千騎以援之汴將鄧李筠以一軍犯陳存孝進擊擒其都將十數人獲馬千餘匹是夜李讜收軍而退大軍掩擊至馬牢關斬首萬餘級追襲至懷州而還存孝復引軍攻潞州九月汴將葛從周棄潞州而遁帝以康君立為潞州節度使十月張濬之師入晉州遊軍至汾隰帝遣薛鐵山李承嗣將騎三千出陰地關營於洪洞遣李存孝將兵五千營於趙城華州韓建以壯士三百人宵犯存孝之營存孝追擊直壓晉州西門張濬之師出戰為存孝所敗自是閉壁不出存孝引軍攻絳州十二月晉州刺史張行恭棄城而奔韓建張濬繇含山路遁去二年正月帝上章申理其略曰臣今身無官爵名是罪人不敢歸陛下藩方且欲於河中寄寓進退行止仗候聖裁天子尋就加守中書令是月魏博為汴將葛從周所寇節度使羅弘信遣使來求援帝出師以赴之三月邢州節度使安知建叛奔青州天子以知建為神武統軍自棣州泝河歸朝鄆州朱瑄邀斬於河上傳首晉陽以李存孝為邢州節度使四月帝大舉兵討赫連鐸於雲州七月平之邢州節度使李存孝以鎮州王鎔託附汴人謀亂河朔北連燕寇請乘雲代之捷平定燕趙帝然之八月大搜於晉陽遂南巡澤潞略地懷孟河陽趙克裕望風送款請修鄰好九月搜於邢州十月李存孝董前軍攻臨城鎮人五萬營於臨城西北龍尾岡帝令李存審存質以步軍攻之鎮人大敗殺獲萬計拔臨城進攻元氏幽州李康威以步騎五萬營於鄗邑以援鎮州帝分兵大掠旋軍邢州景福元年正月鎮州王鎔恃燕人之援率兵十餘萬攻邢州之堯山帝遣李存信李嗣勳李存審將兵援之大破燕趙之衆斬首三萬收其軍實三月帝進軍渡滹沱攻欒城下鼓城稿城八月赫連鐸誘幽州李康威之衆八萬寇天成軍遂攻雲州營於州北連亙數里帝潛軍入於雲州詰旦出騎軍以擊斬獲數萬李康威燒營而遁乾寧元年十二月帝攻媯州壬子燕兵復合入居庸關拒戰帝命精騎以疲之令步將李存審繇他道擊之自午至晡燕軍復敗李儔攜其族棄城而遁將之滄州隨行輜車臧獲妓妾甚衆滄帥盧彥威利其貨以兵攻儔於景城殺之盡虜其衆丙辰進軍幽州其守城大將請降帝令李存審與劉文恭入城撫勞三年六月表三帥之罪復移檄三鎮三鎮大懼是月次絳州刺史王瑤登陴拒命帝攻之旬日而拔斬瑤於軍門誅其黨千餘人七月次河中王珂迎謁於路同州節度使王行約棄城奔京師右軍指揮使李繼鵬茂貞假子也劫天子幸鳳翔左軍指揮使王行實行瑜弟也劫天子幸邠州又行瑜茂貞聲言自來迎駕天子遂幸南山駐蹕於莎城帝遣判官王環奉表奔問天子遣使賜詔令與王珂討邠鳳時帝方攻華州俄聞李茂貞領兵三萬至盩厔王行瑜領兵至興平欲往石門迎駕乃解華州之圍進營渭橋天子遣延王戒及丹王允齎詔促兵直抵邠鳳八月帝進營渭北遣史儼將三千騎往石門扈駕遣李存信李存審會鄜延之兵攻行瑜之梨園寨天子削奪行瑜官爵以帝為天下兵馬都招討天子還宮加帝守太師中書令邠寧四面行營都統時王行瑜弟兄固守梨園寨帝攻之甚急又表李罕之為副都統十月李存信於梨園寨北遇賊軍斬首千餘級自是賊閉壁不出帝令李罕之晝夜急攻賊軍乏食拔營而去李存信與罕之等先仗軍於厄路俟賊軍至縱軍擊之殺戮萬計是日收梨園等三寨生擒行瑜之子知進並母丘氏大將李元福等二百人送赴闕庭十一月收龍泉寨時行瑜以精甲五千守之李茂貞出兵來援為李罕之所敗邠賊遂棄龍泉寨而去行瑜復入邠州大軍進逼其城行瑜棄城而遁帝收其城封府庫遂以捷聞既而慶州奏王行瑜將家屬五百人到州界為部下所殺傳首闕下帝既平行瑜還軍渭北十二月天子賜號忠貞平難功臣進封晉王加實封二百戶帝復上表請討李茂貞天子不允遂班師光化元年正月鳳翔李茂貞華州韓建皆致書於帝乞修和好同獎王室兼乞助丁匠修繕秦宮帝許之四月汴將葛從周寇邢洺磁等州旬日之內三州連陷二年三月從周自土門陷承天軍又陷遼州三年十月遣李嗣昭率步騎三萬攻懷州下之天復元年正月汴將張存敬攻陷晉絳二州三月汴師自大梁至河中王珂出迎天子以汴帥兼鎮河中帝自是不復能援京師霸業中否天祐三年九月遣周德威李嗣昭合燕軍三萬以攻澤潞十二月潞州節度使丁會開門迎降四年四月哀帝禪位於汴帥五月梁祖遣其將康懷英率兵十萬圍潞州築壘環城帝遣周德威將兵赴援梁祖以懷英無功乃以李思安代之是歲西川王建遣吏至勸帝各王一方俟破賊之後訪唐朝宗室以嗣帝位然後各歸藩守帝不從以書報之曰竊念本朝屯否巨葉淪胥攀鼎駕以長違撫彤弓而自咎默默終古悠悠蒼生遘此厲階永為痛毒視橫流而莫救徒誓楫以興言別捧函題過垂獎論省覽周既駭惕異常淚下霑襟倍鬱申胥之素汗流浹背如聞蔣濟之言僕經事兩朝受恩三代位叨將相籍係宗枝賜鈇鉞以專征徵包茅而問罪鏖兵接戰二十餘年竟未能斬新莽之頭顱斷蚩尢之肩髀以至廟朝顛覆豺虎縱橫且受任分憂叨榮冒寵龜玉毀櫝誰之咎歟備閲指陳不勝慚恧然則君臣無常位陵谷有變遷或箠塞長河泥封函谷時移事改理有萬殊即如周末虎爭魏初鼎據孫權父子不顯授於漢恩劉備君臣自微興於涿郡得之不謀於家世失之無損於功名適當逐鹿之秋可靳華蟲之服唯僕纍朝席寵奕世輸忠忝佩訓詞粗存家法善博奕者唯先守道治蹊田者不可奪牛誓於此生靡敢失節仰憑廟勝蚤殄寇讎如其事與願違則共臧洪遊於地下亦無恨矣唯公社稷元勳華嵩降祉鎮九州之上地負一代之宏才合於此時自求多福所承良訊非僕深心天下其謂我何有國非吾節也慺慺孤懇此不盡陳同光初莊宗即位追尊號曰武皇帝廟曰太祖
