body:
  text: 奉先二奉先二魏文帝黃初元年十一月庚午帝自魏王登壇即阼百官陪位事訖降壇視燎成禮而反改延康為黃初盡七年二年六月甲辰以京師宗廟未成帝親祀武皇帝于建始殿躬執饋奠如家人之禮案禮將營宮室宗廟為先庶人無廟故祭於寢帝者非禮甚矣四年五月辛酉有司奏造二廟立太皇帝廟大長秋特進侯臣欽若等曰即曹騰也為漢中常侍大長秋貴庭侯也與高祖合祭親盡以次毀特立武皇帝廟四時享祭為魏太祖萬載不毀也明帝以黃初七年五月丁巳即位癸未追諡母甄夫人曰文昭皇后太和元年正月丁未郊祀武皇帝以配天宗祀文皇帝於明堂以配上帝二月辛巳立文昭皇后寢廟於鄴初甄后賜死故不列廟帝即位有司請追諡曰文昭皇后使司空王朗持節奉策以太牢告祠于陵三公奏曰自古周人始祖后稷又特立廟以祀姜嫄今文昭皇后之于後嗣聖德至化豈有量哉夫以皇家世妃之尊而克讓允恭固推盛位神靈遷化而無寢廟以承享禮非所以報顯德昭孝敬也稽之古制宜依周禮先妣別立寢廟並奏可四月甲申初營宗廟三年六月戊申追尊高祖大長秋曰高皇帝夫人吳氏曰高皇后並在鄴廟之所祠則文帝之高祖處士曾祖高皇太帝共一廟考太祖武皇帝特一廟臣欽若等曰處士明帝五代祖也十一月宗廟成使太常韓暨持節迎高皇帝太皇帝武帝文帝神主於鄴處士以親盡遷主置園也十二月己丑至奉安神主于廟先是漢獻帝建安十八年太祖為魏公始建魏宗廟于鄴自文帝受禪而雒陽宗廟未成黃初末韓暨為太常奏請迎鄴四廟神主建立雒陽廟四時蒸常親奉粢盛崇明正禮廢法淫祀多所規正四年以文昭甄皇后舊陵庳下使后父適孫虎賁中郎將像兼太尉持節詣鄴昭告后土十二月辛未改葬朝陽陵五年詔曰尊嚴祖考所以崇孝表行也追本敬始所以篤教流化也是以成湯文武實造商周書詩之義追尊稷契歌頌有娀姜嫄之事明聖德之源流受命所繇興也自我魏承天序既發跡於高皇太皇帝而功隆於武皇文皇帝至於高皇之父處士君潛修德讓行動神明斯乃乾坤所福饗先靈所從來也而精神幽遠號稱罔記非所謂崇孝重本也其令公卿以下會議號諡侍中劉曄議曰聖帝孝孫之欲褒崇先祖誠無量已然親疏之數遠近之降蓋有禮紀所以割斷私情克成公法為萬世式也周王所以上祖后稷者以其佐唐有功名在祀典故也至於漢氏之初追諡之義不過其父上比周室則大魏發跡自高皇始下論漢氏則追諡之禮不及其祖此誠往代之成法當今之明義也陛下孝思中發情無已已然君舉必書所以慎於禮制也以為追尊之義宜齊高皇而已尚書衛臻與曄議同事遂施行六年四月甲子初進親祼于廟景初元年六月丁未有司奏武皇帝撥亂反正為魏太祖樂用武始之舞文皇帝應天受命為魏高祖用咸熙之舞群公有司始更奏定七廟之制曰大魏三聖相承以成帝業武皇帝肇建洪基撥亂夷險為魏太祖文皇繼天革命應期受禪為魏高祖上集成大命清定華夏興制禮樂宜為魏烈祖於太祖廟北為二祧其左為文帝廟號曰高祖昭祧其右擬明帝號曰烈祖穆祧三祖之廟萬世不毀其餘四廟親盡迭遷一如周后稷文武廟祧之禮十月乙卯營雒陽宮委粟山為圓丘以曹氏世系出自有虞氏今以始祖帝舜配號圓丘曰皇皇帝天方丘所祭曰皇皇后地以舜妃伊氏配天郊所祭曰皇天之神以太祖武皇帝配地郊所祭曰皇地之祗以武宣皇后配宗祀皇考高祖文皇帝於明堂以配上帝十二月壬子冬至始祀皇皇帝天于圓丘以始祖有虞帝舜配齊王正始六年十一月祫祭太祖廟乙未有司奏文昭皇后立廟京都永傅享祀樂舞與祖同慶在鄴廟嘉平元年正月甲午謁高平陵在雒水南大石山去雒城九十里晉武帝泰始元年十二月即位封皇叔祖父孚為安平王皇叔父幹為平原王亮為扶風王胄為東莞王駿為汝陰王彤為梁王倫為琅邪王皇弟攸為齊王鑒為樂安王幾為燕王皇從伯父望為義陽王皇從叔父輔為渤海王冕為下邳王環為太原王圭為高陽王衡為嘗山王子又為沛王泰為隴西王權為彭城王綏為范陽王遂為濟南王遜為譙王睦為中山王陵為北海王斌為陳王皇從父兄洪為河間王皇從父弟楙為東平王四年七月己卯謁崇陽陵六年因廟毀改修創群臣議奏曰古者七廟所自宜如禮又曰古雖七廟自近代以來皆廟七室於禮無廢於情為敘亦隨時之宜也其便仍舊七年四月帝將親祠車駕夕牲而儀注還不拜詔問其故博士奏歷代相承如此帝曰非致敬宗廟之禮也於是實拜而還遂以為制夕牲必躬臨拜十年改築太廟於宣陽門內窮極壯麗廟成帝用摯虞議率百官遷神主於新廟自征西以下車服尊從皆如帝者之儀咸寧元年十二月丁亥追尊宣帝廟曰高祖景帝曰世宗文帝曰太祖二年六月癸丑薦荔枝于太廟太康元年五月丁卯薦酃淥酒于太廟八年九月改營太廟以正月廟殿陷十年四月太廟成乙巳遷神主於新廟帝迎于道左遂祫祭十二月庚寅太廟梁折惠帝以太熙元年四月即位五月辛未葬武帝於峻陽陵廟曰世祖懷帝以光熙元年十一月即位十二月封彭城王植子融為樂成縣王元帝建武元年三月辛卯即位立宗廟于建康太興二年正月丁卯崇陽陵毀帝素服哭三日使冠軍將軍梁堪守太常馬龜等修復山陵迎愍帝梓官于平陽不剋而退時劉曜作亂五月癸丑太陽陵毀帝素服哭三日是歲有詔琅琊恭王宜稱皇考賀循議云禮典之義于不敢以己爵加其父號帝從之三年正月乙卯詔曰吾雖上繼世祖然於懷愍皇帝皆北面稱臣今祠太廟不親執觴酌而令有司行事於情理不安可依禮更處臣欽若等曰事具禮官奏議門明帝太寧元年二月葬元帝於建平峻廟曰中宗三月戊寅朔改元臨軒停饗宴之禮懸而不樂二年正月丁丑帝臨朝停饗宴之禮懸而不樂十二月壬子帝謁建平陵從大祥之禮成帝以太寧三年閏八月己丑即位上明帝尊諡廟曰肅祖咸康元年建安郡君荀氏薨詔曰朕少遭閔凶慈訓無量撫有之勤建安君之仁也一旦薨殂實思報復永惟平昔感痛哀摧其贈豫章郡君別立廟于京都初荀氏為元帝官人有寵生明帝及琅琊王褒及明帝即位封建安郡君別立第宅太寧元年迎還宮內供奉隆厚成帝立尊重同於太后故為之立廟八年三月初以武悼夏皇后配饗武帝廟康帝以咸康八年六月即位封成帝子丕為琅邪王奕為東海王建元元年正月朔晦成恭杜皇后周忌有司奏至尊年應改服詔曰喪親名教之重也權制出於近代耶於是素服如舊非漢魏之典也穆帝永和七年九月峻陽陵毀甲辰帝素服臨于太極殿三日遣兼太常趙扶修復山陵八年二月峻平崇陽二陵毀戊辰帝臨三日遣殿中都尉王惠如雒陽以衛五陵五陵謂宣帝高原陵平陵文帝崇陽陵武帝峻陽陵惠帝太陽陵也九年正月丙寅皇太后與帝同拜建平陵八月遣太尉河間王欽修復五陵十年正月己酉朔帝臨朝以五陵未復懸而不樂十二年十一月遣兼司空散騎常侍車灌龍驤將軍袁真等持節如雒陽修五陵十二月庚戌以有事於五陵告于太廟帝及群臣皆服緦于太極殿臨三日升平元年正月壬戌朔帝加元服告于太廟哀帝以升平元年五月庚申即位七月戊午葬穆皇帝于永平陵廟號孝宗興寧元年三月壬寅皇太妃周氏薨于琅琊第癸卯帝奔喪詔司徒會稽王昱總內外重務簡文帝咸安元年十二月辛卯初薦酃淥酒於太廟孝武帝以咸安二年七月乙未即位九月甲寅追尊皇妣會稽王妃曰順皇后十月丁卯葬簡文皇帝于高平陵廟號太宗太元元年正月壬寅帝加元服見于太廟甲子謁建平等四陵四年正月丙子謁建平等七陵謂元帝建平陵明帝武平陵成帝興平陵康帝崇平陵穆帝永平陵哀帝安平陵簡文帝高平陵五年正月乙巳謁崇平陵九年正月辛未謁建平等四陵七月戊戌遣兼司空高密王純之修謁雒陽五陵十年正月甲午謁諸陵十六年正月庚申改築太廟九月癸未新廟成正室十四間東西儲各一間合十六間棟高八丈四尺備法駕遷神主于行廟征西至京兆四主及太孫各用其位之儀服四主不從帝者儀是與太康異也諸王既入廟設脯醢之奠及新廟成神主還室又設脯醢之奠十九年六月壬子追尊會稽王太妃鄭氏為簡文宣太后詔曰會稽太妃文母之德徽音有融誕載聖明光延于晉先帝追尊聖善朝議不一道以疑屈朕述尊先志常惕于心仰奉遺旨依陽秋二漢孝懷皇帝故事上太妃尊號曰簡文宣太后初鄭氏為元帝夫人生琅琊悼王簡文帝末后稱建平國夫人咸和元年薨簡文帝時為琅琊王制服重有司以王出繼宜降所主國臣不能匡正匡正原作親據晉書后妃下改奏免國相諸葛頭王上疏曰亡母生臨臣國沒留國第臣雖出後亦無所厭則私情得敘敬后喪孝王已出繼亦還服重此則朋比臣所憲章也穆皇后不奪其志乃徙琅琊王為會稽王追號后曰會稽太妃及簡文帝即位未及追尊臨喪封皇子道子為琅琊王領會稽國奉太妃祀二十年二月作宣太后廟于太廟路西陵曰嘉平安帝隆安三年三月己卯追尊所生陳夫人為德皇太后義熙十二年十月丙寅姚泓將姚先以雒陽降己丑遣兼司空高密王恢之修謁五陵恭帝元熙元年正月壬辰朔改元以安帝山陵未厝不朝會後魏道武天興元年十二月臨天文殿司徒進璽綬追尊成帝已下及后號諡樂用皇始之舞以神元皇帝為始祖臣欽若等按後魏書黃帝以土德王比積六十七世至成帝成及節莊明安宣景元和定僖成獻凡十二帝獻帝生聖武聖武生神元平文皇帝為太祖臣欽若等按後魏書神元至章平思昭凡三帝思帝生平文昭成皇帝為高祖臣欽若等按後魏書平文至惠煬烈凡四帝昭成帝平皇文次子也事具帝王帝系門其追尊祖始皆從帝諡焉考為獻明皇帝臣欽若等曰獻明即昭成太子也二年正月甲子初祀上帝于南郊以始祖神元皇帝配十月太廟成遷神元平文昭成獻明皇帝神主于太廟歲五祭用二至二分臘牲用太牢嘗以宗正兼太尉率祭官行事又立神元思帝平文昭成獻明五帝廟於宮中歲四祭用正冬臘九月牲用馬牛各一帝親祭又於雲中及盛樂神元舊都祀神元以下七帝歲三祭正冬臘牲用馬牛各一祭官侍祀四年三月帝親漁薦於寢廟明元永興元年十月壬午即位追尊皇妣劉貴人為宣穆皇后二年九月甲寅葬宣武皇帝於盛樂金陵廟號太祖三年四月謁金陵於盛樂五年五月幸雲中七月乙巳登薄山觀宣武遊幸刻石頌德之處乃於其牢起石壇而薦享焉神瑞二年二月甲辰立太祖廟於白登之西歲一祭具太牢帝親之無常月又詔郡國於太祖巡幸行宮之所各立壇祭以太牢歲一祭祭原脫據魏書禮志補入皆牧守侍祀又立太祖別廟於宮中歲四祭用馬牛羊各一後二年又於白登西太祖舊遊之處立昭成獻明太祖廟以九月十月之交帝親祭牲用馬牛羊又於雲中盛樂金陵三所各立太祖廟四時祭官侍祀泰常四年四月庚辰有事於東廟遠助祭者數百國五年五月乙酉詔曰宣武皇帝體道得一天縱自然大行大名未盡盛美非所以光揚洪烈垂之無窮也今因啓緯圓始睹尊號天人之義煥然著明其改宣為道更上尊諡曰道武皇帝以彰靈命之光啓聖德之玄同告祠郊廟宣于八表太武以泰常八年十月壬申即位十二月追尊妣為密皇太后庚子葬明元皇帝于雲中金陵廟號太宗始光三年六月幸雲中舊宮謁陵廟神麚三年九月癸卯立密皇太后廟于鄴后杜氏生帝而薨帝既立追尊號又立廟于鄴置祀官太常博士齊即三十餘人侍祀歲五祭刺史四時薦祀以魏郡太后所生之邑復其調役後甘露降于廟庭太延元年十一月行幸鄴祀密太后文成興安元年十月戊申即位十一月壬寅追尊皇考景穆太子為景穆皇帝廟號恭宗皇妣閭氏為恭皇后臣欽若等曰是年二月南安王僣立上大武尊諡廟號世宗大安元年正月辛酉奉世宗恭宗神主于太廟獻文以和平六年五月甲辰即位六月丙寅上文成皇帝尊諡廟號高宗天安元年三月辛丑奉高宗神主附于太廟孝文承明元年六月辛未上太上皇帝尊諡曰獻文皇帝葬于雲中金陵廟號顯宗七月甲辰追尊皇妣李貴人為惠祖后太和五年四月己亥行奉方山建永固石室於山上銘太皇太后終制于金冊六年十一月帝將親祀七廟詔有司依禮具儀於是群臣議曰昔有虞親虔祖考來格殷宗躬謁介福逌降大魏七廟之祭依先朝舊事多不親謁今陛下孝誠發中將思親祀稽合古王禮之常典臣等謹按舊章竝採漢魏故事撰祭服冠履牲牢之具罍洗簠簋俎豆之器百官助祭位次樂官節奏之引升降進退之法別集為拜之儀制可於是帝乃親祭其後四時常祀皆親之十二年五月壬寅增置彝器於太廟十四年十月癸酉葬文明太皇太后馮氏於永固陵甲戌車駕謁永固陵甲申再謁十五年三月甲辰謁永固陵四月乙丑謁永固陵己卯經始明堂改營太廟詔曰祖有功宗有德自非功德厚者不得擅祖宗之名居三祧之廟仰惟先朝舊事舛駁不同難以取準今將述尊先志具詳禮典宜制祖宗之號定將來之法烈祖有創基之功世祖有開折之德宜為祖宗百世不遷而遠祖平文之功未多於昭成然廟號為太祖道武建業之勳未高於平文廟號為烈祖比功較德以為未允朕今奉遷道武太祖顯祖為二祧餘者以次而遷七月乙丑謁永固陵己卯詔議祖宗以道武為太祖臣欽若等曰是年四月七月日辰俱有乙丑己卯案太和十二年閏九月十八年閏二月即是年閏在五月六月也八月壬申詔郡國有時果可薦者送京師以供廟饗乙巳親定禘祫之禮戊午又詔曰明堂太廟竝就祖宗配祭配享於斯備矣白登崞山雞嗚山廟惟遣有司行事馮宣王誕先王后復因在官長安立廟宜異常等可敕雍州以時供祭十月庚寅謁永固陵十一月丁卯以明堂太廟成遷七廟神主於新廟十六年正月始以太祖配南郊始以孟月祭廟宗祀顯祖獻文皇帝於明堂以配上帝禮置載戊申詔曰夫四時享祀人子常道然祭薦之禮貴賤不同故有邑之君祭以首時無田之土薦以仲月況七廟之重而用中節者哉自須蒸常之禮頗違舊義今將迎遵往式以此孟月時祠於太廟但朝典初改衆務殷奏無違齊潔遂及於今又按承神饗祖必須擇日今禮律未宣有司或不知此可敕太帝令剋日以聞九月甲寅朔大序昭穆於明堂祀文明太皇太后於玄室帝親為之詞云十月己亥詔曰夫先王制禮所以經綸萬代貽法後昆至乃郊天享祖莫不配祭然而有節白登廟者有為而興昭穆不次故太祖有三層之宇巴陵無方丈之室又嘗用季秋躬駕展虔祝禮或有褻慢之失嘉樂頗涉野合之儀今授衣之旦享祭明堂立冬之始奉蒸太廟若復致齊白登便為一月再駕事成褻瀆回詳二理謂宜省一白登之高未若九室之美幃次之華未如清廟之盛將欲廢彼東山之祀成此二享之敬可敕有司但令內典神者攝行祭事獻明道武名有廟稱可具依舊式十八年閏二月甲戌謁永固陵七月戊戌謁金陵八月庚午謁永固陵十月戊申親告太廟奉遷神主十九年四月太和廟成五月遷文成皇后馮氏神主於太和廟二十三年二月甲戌謁永固陵三月辛卯謁金陵宣武以太和二十三年四月即位上孝文皇帝尊諡葬于長陵廟號高祖六月戊辰追尊皇妣高氏曰文昭皇后十月丙戌帝謁長陵遵遺詔孝文皇帝三夫人已下悉免歸家丁酉有事於太廟景明元年正月壬寅謁長陵十月丁卯朔謁長陵二年正月丙辰朔謁長陵孝明以延昌四年正月即位二月冀州獻白雉二月豫州獻三足烏是月京師獲白雉三月冀州上言信都縣木連理是月河南獻白兔四月兗州獻白狐五月滎陽獻白雀六月司州獻白鹿是月京師木連理八月河南獻白兔是月秦州獻白雀是月青州獻白雀九月雍州上言鄠縣木連理是月河南獻白兔是月常州獻白雀是月雒陽獲白雀是月相州獻白狐十一月荊州獻白雀十二月幽州獻白雉閏月汾州獻白狐二是月岐州獻白雉熙平二年七月己巳車駕有事於太廟幼主釗以武泰元年二月乙卯即位三月甲申上孝明皇帝尊諡葬於定陵廟曰肅宗孝莊永安二年三月甲午追尊皇考為文穆皇帝臣欽若等按後魏書文穆皇帝即彭城王也廟號肅祖皇妣李氏為文穆皇后四月癸未遷肅祖文穆皇帝及文穆皇后神主於太廟前廢帝普泰元年二月己巳即位四月壬子有事于太廟九月癸巳追尊皇考為先帝皇妣王氏為先太妃臣欽若等按後魏書先帝即廣陵惠王羽也後廢帝中興二年二月辛亥上孝莊皇帝諡曰武懷皇帝孝武帝即位以武穆廟諱改諡孝莊皇帝廟號敬宗孝武帝即出帝也永熙二年正月丁巳追尊皇考為武穆帝臣欽若等曰武穆帝即廣平武穆王懷也太妃馮氏為武穆后妣李氏為皇太妃西魏文帝以永熙三年閏十二月即位上孝武皇帝尊諡殯于草堂佛寺大統元年三月戊申追尊皇考為文景皇帝臣欽若等按後魏書文景即京兆王也皇妣楊氏為后二年十一月追改始祖神元皇帝為太祖道武為烈祖廢帝以大統十七年三月即位四月庚辰上文皇帝追諡葬於永陵後周閔帝元年正月辛丑即天王位是日槐里獻赤雀二月秦州涇州各獻木連理五月槐里獻白燕四月壬午謁成陵太祖陵也乙酉還宮丁亥祠太廟七月辛亥享太廟明帝以元年九月即皇帝位十一月庚子祠太廟十二月庚午謁成陵癸酉還宮癸亥太廟成武成元年八月己亥改天王稱皇帝追尊文王為文帝祖考為德皇帝臣欽若等按後周書德皇帝諱耽太祖父也武帝以武成二年四月即位上明皇帝尊諡葬于昭陵廟保定元年正月戊辰詔曰履端開物實資元后代終成務諒惟宰棟故周文公以上聖之智翼彼姬周爰作六典用光七百自此厥後代失其緒俾巍巍之化歷千祀而莫傳郁郁之風終百王而永墜我太祖文皇帝稟純和之氣挺天縱之英德配乾元功侔造化故能捨末魏之弊風蹈隆周之睿典誕述百官厥用允集所謂乾巡改而重搆豈帝王洪範而已哉朕入嗣大寶思揚休烈今可班斯禮於太祖廟庭己巳祠太廟班太祖所述六官焉臣欽若等曰太祖依周禮六官置百官令班行之七月己酉追封伯父皓為邵國公第三伯父雒生為莒國公天和三年五月庚戌祠太廟十月癸亥祠太廟建德元年三月誅大冢宰宇文護四月庚寅追尊略陽公為孝閔帝詔曰慎始敬終有國彝典事亡如存哲王通制義崇追遠禮貴尊親故略陽公至德純粹天姿秀傑屬魏祚告終寶命將改謳歌允集曆數攸歸上協蒼靈之慶下昭后祗之錫而禍生肘腋釁起蕭牆白獸噬驂蒼鷹集殿幽辱神器弒酷乘輿冤結生民毒流寓縣今泊海澄清氣沴涓蕩追尊之禮宜崇徽號遣太師屬國公迥尉遲回也於南郊上諡曰孝閔皇帝陵曰靜陵二年正月乙卯祠太廟四月己亥祠太廟七月己巳祠太廟三年正月己巳祠太廟五年六月辛亥祠太廟六年四月己巳祠太廟十月戊午改葬德皇帝於冀州帝服緦哭於太極殿宣帝以宣政元年六月即位上武皇帝尊諡葬於孝陵廟曰高祖七月己巳祠太廟大象元年正月癸巳祠太廟四月己巳祠太廟二年正月癸巳祠太廟靜帝以大象二年五月入居天臺臣欽若等按後周書宣帝大象元年二月傳位於帝居正陽宮至是遂入居天臺上宣皇帝尊諡葬于定陵隋高祖開皇元年二月甲子即位是月京師慶雲見三月高平獲赤雀太原獲蒼烏長安獲白雀各一宣仁門槐樹連理衆枝內附又盩厔縣連理樹植之宮庭四年正月己巳有事於太廟七年正月癸巳有事於太廟十二年七月己巳有事於太廟十月壬午有事於太廟至太祖神主前帝流涕嗚咽悲不自勝十三年正月壬子親祀武帝煬帝以仁壽四年七月即位十一月幸雒陽詔曰乾道變化陰陽所以消息沿創不同生靈所以順敘若使天時不施變化何以成四時人事不易政教何以釐萬姓易不云乎通其變使民不倦變則通通則久有德則可久有功則可大朕又聞之安安而能遷民用丕變是故姬邑兩周如武王之意殷人五徙安成湯之業若不因民順天功業見乎變愛民治國者可不喟與然雒邑自古之都王畿之內天地之所合陰陽之所和控以三河固以四塞水陸通貢賦等故漢祖曰吾行天下多矣唯見雒陽自古皇王何嘗不留意所不都者蓋有繇焉或以九州未一或以困於府庫作雒之制所以未暇也我有隋之始便欲創茲日復一日粵暨于今永懷先旨興言感哽朕肅膺寶曆纂臨萬邦遵而不失思奉先志今者漢王諒悖逆毒被山東遂使州縣或淪非所此繇關河懸遠兵不赴急加以竝州移戶復在河南周遷殷民意在於此況復南服遐遠東夏殷大因機順動今也其時群司百辟僉諧厥議但成周墟瘠弗堪胥宇今可於伊雒營建東京便即設官分職以為民極也夫宮室之制本以便宜上棟下宇足避風露高臺廣廈豈曰適形故傳云儉德之恭侈惡之大宣尼有云與其奢也寧儉豈謂瑤臺瓊室方為宮殿者乎土階采椽而非帝王者乎是知非以天下奉一人乃以一人主天下也民惟邦本本固邦寧百姓不足君孰與足今所營搆務從節儉無令雕墻峻宇復起於當今欲使卑宮菲食將貽于後世有司明為條格稱朕意焉乃詔尚書令楊素納言楊逵將作大匠宇文愷營建東京徙豫州郭下居民以實之又徙天下富商大賈數萬家於東京太業元年營建雒邑乃於東都固本里北起天經宮以遊高祖衣冠四時致祭三年六月丁亥詔曰聿追孝享德莫至焉崇慶寢廟禮之大者然則質文異代損益於時學滅坑焚經典散逸廟堂制度師說不同所以世數多少莫能是正連室異宮亦無定準朕獲奉祖宗欽承景美水惟嚴配思降大典于是詢謀在位博訪儒術咸以為高祖文皇帝受天明命奄有區夏拯群黎于四海革雕弊于百王恤獄緩刑生靈皆遂其性輕徭薄賦比屋各安其業恢夷宇宙混同車書東漸西被無思不服南征北怨俱荷來蘇駕毳乘風歷代所弗至辨髮左衽聲教所罕及莫不厥角關塞頓顙闕庭譯靡絶時書無虛月韜戈偃武天下晏如嘉瑞休徵表裏禔福猗歟偉歟無得而名者也朕又聞之德厚者流光治辨者禮縟是以周之文武漢之高光其典章特立諡號斯重豈非緣情稱述即崇顯之義乎高祖文皇帝宜別建廟宇以彰巍巍之德乃遵月祭用表蒸蒸之懷有司以時創造務合典制又名位既殊禮亦異等天子七廟事著前經諸侯二昭義有差降故其以多為貴王者之禮今可依用貽厥後昆是年有司奏請準前議于東京建立宗廟帝謂祕書監柳誓曰今始祖及二祧已具今後子孫處朕何所又下詔唯議別立高祖之廟屬有行役遂復停寢九年閏九月己巳幸博陵庚午帝謂侍臣曰朕昔從先朝周旋于此年甫八歲日月不居條經三紀追惟平昔不可復希言未卒流涕嗚咽侍衛者皆泣下沾襟
