body:
  text: 孝德孝德夫德教加于百姓刑于四海者天子之孝也若乃總制區宇尊居宸極至性內發玄化潛運率土之濱民德歸厚矣其或在田處晦祗載之德已隆膺期撫運奉養之誠彌竭至於逮事靡及追懷罔極因心創巨時思永感哀動左右風化天下傳曰君子篤於親則民興於仁蓋聖人之教不肅而成不嚴而治繇茲道也帝舜側微堯聞其聰明將使嗣位乃曰咨四嶽朕在位七十載汝能庸命巽朕位嶽曰否德忝帝位曰明明揚側陋師錫帝曰有鰥在下曰虞舜帝曰俞豫聞如何嶽曰瞽子父頑母嚚象傲克諧以孝蒸蒸乂不格姦帝曰我其試哉女于時觀厥刑于二女釐降二女于媯汭嬪于虞帝曰欽哉其後益贊于禹曰帝初于歷山往于田日號泣于昊天于父母負罪引慝祗載見瞽瞍夔夔齋栗瞽瞍亦允若慝惡載事也夔夔栗懼之貌言舜負罪引慝敬以事見于父悚懼齋莊父亦信順之言能以至誠感頑父又按史記曰舜母死父瞽瞍更娶妻而生象瞽瞍頑母嚚弟象傲嘗欲殺舜舜避逃及有小過則受罪順事父及後母與弟象日以篤謹匪有懈順適不失子道兄弟孝慈欲殺不可得年二十而以孝聞三十而帝堯問可用者四嶽咸薦虞舜曰可於是堯乃以二女妻舜以觀其內九男與處以觀其外居媯汭內行稱謹堯二女不敢以貴驕事舜親戚甚有婦之道堯九男皆益篤堯乃錫舜絺衣與琴為築倉廩豫牛羊瞽瞍尚復欲殺之使舜上塗廩瞽瞍從下縱火焚廩舜乃以兩笠自扞而下得不死後瞽瞍又使舜穿井為匿空旁出舜既入深瞽瞍與象共下土實井舜從匿空旁出去瞽瞍象喜以舜為必死象曰本謀者象象與父母分於是曰舜妻堯二女與琴象取之牛羊倉廩豫父母象乃止舜宮居鼓其琴舜往見之象愕不懌曰我思君正鬱陶舜曰然爾其庶矣舜復事瞽瞍與象彌謹年五十攝行天子事六十一代堯踐帝位載天子旗往朝父瞽瞍夔夔夔唯謹如子道封弟象為諸侯又按孟子曰人少則慕父母知好色則慕少艾有妻子則慕妻子仕則慕君不得於君則熱中大孝終身慕父母五十而慕者豫於大舜見之矣熱中謂心熱恐懼又中庸篇載舜其大孝也與德為聖人尊為天子富有四海之內宗廟饗之子孫保之劉向新字載昔者舜自耕稼陶漁而躬孝友父瞽瞍頑母嚚及弟象傲皆下愚不移舜盡孝道以供養瞽瞍與象為浚井塗廩之謀欲殺舜舜孝益篤出田則號泣年五十猶嬰兒慕可謂至孝矣故耕於歷山歷山之耕者讓畔陶于河濱而陶者器不苦窳漁於雷澤雷澤之漁者均分及立為天子化蠻夷率服北發渠搜南撫交趾莫不慕義麟鳳在郊故孔子曰孝悌之至道通于神明光于四海舜之謂也商高宗宅憂亮陰三祀陰默也居憂信默三年不言又按論語曰高宗諒陰三年不言周文王之為世子朝於王季日三三皆日朝以其禮同雞初鳴而衣服至於寢門外問內豎之御者曰今日安否何如內豎小臣之屬掌內外之通命者御如今小使直日矣內豎曰安文王乃喜孝子當兢兢及日中又至亦如之及莫夜又至亦如之莫夕也其有不安節則內豎以告文王文王色憂行不能正履節謂居處故事履蹈地也王季復膳飲食安也然後亦復初鮮憂食上必在視寒暖之節在察也食下問所膳問所食者命膳宰曰未有原應曰諾然後退末猶無也原再也勿有所再進為其失飪臭味惡也退反其寢武王初為太子文王有疾武王不脫冠帶而養言常在側文王一飯亦一飯文王再飯亦再欲知氣力針藥所勝旬有二日乃間間乃瘳也禮記中庸篇曰子曰武王周公其達孝矣乎夫孝者善繼人之志善述人之事者也漢高祖居長安太上皇思欲歸豐高祖乃更築城寺市里如豐縣號曰新豐乃徙民以充實之文帝居代時薄太后嘗病三年帝不交睫解衣湯藥非口所嘗弗進後漢明帝永平七年皇太后陰氏喪帝性孝愛追慕無已十七年正月當謁原陵夜夢先帝太后如平生歡既寤悲不能寐即案曆明旦日吉遂率百官及故客上陵其日降甘露於陵樹帝令百官采取以薦會畢帝從席前伏御床視太后鏡奩中物感動悲涕令易脂澤裝具左右皆泣莫能仰視焉章帝母賈貴人明帝為太子以選入宮生帝而明德馬大后無子明帝命太后養之謂曰人未必當生子但患愛養不至耳后於是盡心撫育勞悴過於所生章帝亦孝性淳篤恩性天至母子慈愛始終無纖芥之間建初三年帝饗士于南宮因從太后周行掖庭池閣乃閲陰太后舊時器服愴然動容乃命留五時衣各一襲及帝所御衣合五十篋餘悉分布諸王主及子孫在京師者各有差特賜東平王蒼及琅琊王京書曰中大夫奉使親聞動靜喜之何已歲月騖過山陵寢遠孤心悽愴如何如何間饗衛士於南宮因閲視舊時衣物聞於師曰其物存其人亡不言哀而哀自至信矣惟王孝友之德亦豈不然今送光烈皇后假紒帛巾各一級衣一篋可時奉瞻以慰凱風寒泉之思又欲令後生子孫得見先后衣服之製今魯國孔氏尚有仲尼車輿冠履明德盛者光靈遠也其光武皇帝器服中元二年已賦諸國不敢復送魏明帝追尊母文昭甄后初營宗廟掘地得玉璽方一寸九分其文曰天子羡思慈親明帝為之改容以太牢告廟又嘗夢見后於是差次舅氏親疏高下敘用各有差晉景帝居母宣穆張皇后喪以孝聞武帝泰始二年八月詔曰此上旬先帝棄天下日也便已周年吾煢煢當復何時一得敘人子之情邪思慕煩毒欲詣陵瞻視以盡哀憤主者俱行備太牢安平王孚尚書令裴秀尚書僕射武陔等奏陛下至孝蒸蒸哀思罔極衰麻雖除哀毀蔬食有損神和秋節尚有餘暑謁建山陵悲感摧傷群下竊用疏息以為宜降抑聖情以慰萬國詔曰孤煢忽爾日月已周痛慕摧感永無逮及欲奉瞻山陵以敘哀憤體氣自佳耳又已涼便當行不得如所奏也主者便具行備又詔曰漢文不使天下盡哀亦帝王至謙之志當見山陵何心而無服其禮以衰絰行秀等重奏曰臣聞上古喪期無數後世乃有年月之漸漢文帝隨時之義制為短喪傳之於後陛下社稷宗廟之重萬方億兆之故既從權制除衰麻群臣百姓吉服今者謁陵以敘哀慕若加衰絰進退無當不敢奉詔詔曰亦知不在此麻布耳然人子情思為欲令哀喪之物在身蓋近情也群臣自當按舊制秀等又奏曰臣聞聖人制作必從時宜故五帝殊樂三王異禮此古今所以不同質文所以迭用也陛下隨時之宜既降心克己俯就權制已除衰麻而行心喪之禮今復制服義無所依若君服而臣不服亦未之敢安也忝議宜如前奏詔曰患情不能跂及耳衣服何在諸君勤勤之至豈苟相達四年帝母文明王皇后喪合葬崇陽陵將遷祔帝手疏后德行命史官為哀策初居文帝喪帝雖從漢魏之制既葬除服而深衣素冠除席撤膳哀敬如喪者有司奏改服進膳不許遂禮終而後復吉皇太后喪有司奏前代故事倚廬中施白縑帳蓐素床布裹巾丐草鞋輦板輿細犢車皆施縑衰詔不聽但令以布車而已其餘居喪之制亦如禮文有司又奏大行皇太后當以四月二十五日安厝故事虞著哀服既虞而除其內外官寮皆就朝晡臨位御除服訖各還所次除哀服詔曰夫三年之喪天下之達禮也受終身之愛而數年之服奈何葬而便即吉情所不忍也有司又奏世有險易道有污隆所遇之時誠有繇然非禮也方今戎馬未散王事至殷更須聽斷以熙庶績昔周康王始登翊室猶戴冕臨朝降于漢魏既除葬釋諒暗之禮日遠代而廢矣惟陛下割高宗之制從當時之宜敢固以請詔曰攬省奏事益增感劇夫三年之喪所以盡情致禮葬已便除情所不堪豈當然耳且今思存草土卒常以吉奪之乃所以重傷至心非見念也每代禮典質文皆不同此身何為限以近制使達喪闕然乎群臣又固請帝流涕久之乃許文帝崇陽陵先開一日遣侍梓宮又遣將軍校尉常直尉中監各一人將殿中將軍以下及帝時左右常給使詣陵宿衛明帝性至孝太寧元年二月葬元帝於建平陵帝徒跣至陵所康帝即位咸康八年七月丙辰葬成帝於興平陵帝親奉奠於西陛既發引徒行至閶闔門外素輿至于陵所建元元年四月有司奏成帝山陵已一周請改素服御進膳如舊壬寅詔曰禮之隆殺因時而寢興誠無常矣至於君親相準名教之重莫之改也權制之作蓋出近代雖曰適事實弊薄之始先王崇之後世猶怠而況因循又從輕降義弗可矣簡文帝為琅琊王年七歲鄭夫人薨帝號慕泣血固請服重元帝哀而許之孝武帝將以散騎常侍領著作郎吳隱之為黃門郎以隱之貌類簡文帝乃止後魏明元道武長子也初封齊王帝母劉貴人賜死道武告帝曰吾遠同漢武為長久之計帝素純孝哀泣不能自勝道武怒之帝還宮哀亦不自止日夜號泣道武知而又召之帝欲入左右曰孝子事父小杖則受大杖避之今陛下怒盛入或不測陷帝於不義不如且出待怒解而進不晚也帝懼從之大武明元長子帝生不逮母密太后及有識言則悲慟哀感傍人明元聞而喜及明元不豫衣不解帶孝文幼有至性年四歲獻文曾患癱帝親吮膿五歲受禪悲泣不能自勝獻文問之帝曰代親之感內切於心獻文甚嘆異之及居祖母文明太皇太后喪勺飲不入口五日毀慕過禮五日不食中部曹楊椿進諫曰陛下至性孝過有虞居哀五朝水漿不御群下惶灼莫知所言陛下荷祖宗之業臨萬國之重豈可同匹夫之至節以取僵仆且聖人之禮毀不滅性縱陛下欲自賢於萬代其若宗廟何帝感其言乃進粥已過期月毀瘠猶甚司空穆亮表曰王者居極至尊至重父天母地懷柔百靈是以古先哲王制禮成務施政立治必順天而後動宣憲垂範必依典而後行用能四時不忒陰陽和暢若有過舉咎徵必集故大舜至慕事在納麓之前孔子至聖喪無過瘠之紀堯書稽古之美不録在服之痛禮備諸侯之喪而無天子之式雖有上達之言未見居喪之典然則位重者為世以屈己居聖者達命以忘情伏惟陛下至德參二儀惠澤覃河海宣禮明刑動遵古式以至孝之痛服期年之喪練事既闋號慕如始統皇極之尊同衆庶之制廢越紼之大敬闕宗紀之舊軌誠繇文明太皇太后聖略超古惠訓深至欲報之德昊天罔極比之前代戚為過甚豈所謂順帝之則約躬隨衆者也陛下既為天地所子又為萬民父母子過哀父則為慘悴父過戚子則為憂傷近蒙接見咫尺旒冕聖容哀毀駭感群心書稱一人有慶兆民賴之一人過哀黎元焉繫群官所以顛殞震懼率土所以危惶悚栗百姓何仰而不憂嘉禾何由而播植願陛下上承金册遺訓下稱億兆之心時襲輕服數御常膳修宗郊祠垂惠咸秩輿駕時動以釋憂煩博採廣咨以尊性氣息無益之戀行利見之德則休徵可致嘉應必臻禮教必宣孝慈兼備普天蒙賴倉生幸甚詔曰茍孝悌之至無所不通今飄風亢旱時雨不降實繇誠慕未濃幽顯無感也所言過哀之咎諒為未衷省啓以增悲愧及再周忌日哭於陵前絶膳二日哭不輟聲先是太后葬於永固陵中反虞於鑒玄殿詔曰遵旨從儉不申罔極之痛稱情允禮又損儉訓之德進退思惟信用摧感又山陵之節亦有成命內則方丈外裁掩坎脫於孝子之心有所不盡者室中可二丈墳不得過三十餘步今以山陵萬世所仰復廣為六十步孤負遺旨益以痛絶其幽房大小棺槨質約不設盟器至于素帳幔茵瓷瓦之物亦皆不置此則遵先志從册令奉遺事而有從有違未達者或以致怪梓宮之裏玄堂之內聖靈所止是以一一奉遵仰昭儉德其餘外事有所不從以盡痛慕之情其宣示遠近著告群司上明儉誨之德下彰違命之失及卒哭孝文服縗近臣從服三品以下外臣衰服者變服就練七品以下盡除即吉設祔祭於太后殿公卿以下始親公事帝毀瘠絶酒肉不御者三年初帝孝於太后乃於永固陵東北里餘營壽宮遂有終焉瞻望之志及遷雒陽乃自表瀍西以為山園之所而方山虛宮號曰萬年堂云太和十六年九月辛未帝哭文明太后於陵左終日不絶聲幕越席為次侍臣侍哭壬申帝以忌日哭於陵左哀至則哭侍哭如昨帝二日不御膳癸酉朝中夕三時哭拜於陵前夜宿鑒玄殿是夜撤次甲戌帝拜哭辭陵還永樂宮前廢帝諱恭字修業廣陵惠王羽之子少端謹有志度事祖母嫡母以孝聞後周武帝建德三年三月帝居皇太后叱奴氏喪處倚廬朝夕共一溢米群臣表請纍旬乃止詔皇太子贇總釐庶政五月庚申葬文宣皇后於永固陵帝袒跣至陵所辛酉詔曰齊斬之情經籍彝訓近代沿革遂亡斯禮伏奉遺令既葬便除攀慕幾筵情實未忍三年之喪達於天子古今無易之道王者之所常行但時有未諧不得全制軍國務重須自聽朝縗麻之節苫盧之禮率遵前典以申罔極百寮以下宜依遺令公卿上表固請俯就權制過葬即吉帝不許引古禮答之群臣乃止於是遂申三年之制五服內亦令依禮隋高祖初仕後周為大將軍遇皇妣寢疾三年晝夜不離左右代稱純孝開皇十七年九月謂侍臣曰禮主於敬皆當盡心黍稷非馨貴在祗肅廟廷設樂本以迎神齋祭之日觸目多感當此之際何可為心在路奏樂禮未為允群公卿士宜更詳之遂下詔自今已後享廟日不須備鼓吹殿廷勿設樂懸仁壽二年詔曰哀哀父母生我劬勞欲報之德昊天罔極但風樹不靜嚴敬莫追霜露既降感思空切六月十三日是朕生日宜令海內為武元皇帝元明皇后斷屠唐高祖武德八年七月群臣食於御前果有蒲桃侍中陳叔達執而不食帝問其故對曰臣母患口乾永不能治欲歸以遺母帝曰卿有母可遺乎遂流涕嗚咽久之乃止賜物百段帝性至孝初葬元貞太后時遇祁寒跣行二十餘里足皆流血毀頓之極哀感行路言及二親未嘗不流涕有得時珍及諸方異膳必先薦享而己方食太宗貞觀二年八月帝以軍國無事每日視膳於西宮三年正月戊午帝有事於太廟至太穆皇后神主悲慟嗚咽伏地不能興侍衛者莫不歔欷先是帝在髫齔穆后於諸子之中獨所鍾愛自穆后寢疾朝夕侍側不解衣冠所進湯藥必先嘗之及丁穆皇后憂毀瘠三年杖而能起即位後幸隴州經慶善宮歔欷謂侍臣曰此朕生處朕之胞見在宮裏慈顏緬邈無可復追生育之恩不知何以上報因舉聲號慟悲不自勝在位者莫不嗚咽及還至宮享后於正寢後數歲下詔為后建福佛寺於京師初起作之夜帝夢見后侍奉若平生既寤悲感流涕達旦因下詔為后於寺盡京城僧尼設齋追福焉四年六月高祖不豫帝廢朝視藥膳於大安宮如家人之禮辛卯有瘳百寮稱慶詔曰書不云乎一人有慶兆民賴之朕虔奉大安愛敬崇極日嚴之養祗栗斯在近日聖躬違豫寢膳有虧憂懼有懷不遑寧處博求醫術備盡蠲療祈告明靈具陳懇篤上玄降福遂蒙昭祐應於康愈萬福咸宜慶幸之隆實兼家國思班愷樂洽于卿士然而尚齒興孝德教所先饗餼是加義超常等諸州都督刺史及文武官老人八十以上並孝旌表門閭者並宜節級賜物以申饗宴庶使萬國之內同此歡心施於四海皆知朕意八年三月高祖宴於兩儀殿顧長孫無忌曰當今蠻夷率服古未嘗有無忌對曰陛下以神武定天下付屬得人萬國乂安四夷賓服臣實不勝幸甚謹上千秋萬歲壽高祖大悅以酒賜帝帝奉觴上壽流涕而言曰百姓獲安四夷咸服皆奉遵聖旨豈臣之力也於是帝與文德皇后互進御膳並上服御衣物皆珍寶奇異又上珍寶巾豫皇后執櫛理鬢手自冠焉因言至尊年高髮白都盡帝與皇后皆流涕蒸蒸就養一同家人常禮高祖亦喜形於色群臣瞻奉莫不內懷感悅十三年正月帝朝於獻陵至小次降輿號哭入闕門西面再拜慟絶不能興禮畢改服入于寢宮宮原脫據唐會要卷二十補入躬親執饌閲高祖及先后服御之物匍匐床前悲慟左右侍御者莫不歔欷會要又載初甲辰之夜大雨雪及帝入陵悲號哭咽百辟哀慟有蒼雲出於丘陵之上俄而流布天地晦冥禮畢帝出自寢宮步過司馬門泥行二百餘步於是風靜雪止天色開霽咸以為孝感之所致焉十四年五月丁酉帝追感高祖先后同忌此月不御酒肉十六年十二月令左監門中郎將齊士員將兵衛獻陵帝召士員至望見而降殿自悲咽不已謂從官曰頃屬歲陰道暮情深罔極所備新衣珍饌欲以正旦奉薦園陵朕若親行便勞扈從三元告始家有吉凶慶慰之禮咸重茲日朕不欲勞人乃自抑止因命江夏王道宗代行所獻之物帝並跪授道宗焉十七年七月癸巳司空房玄齡給事中許敬宗著作佐郎敬播上所撰高祖並當朝實録各二十卷帝遣諫議大夫褚遂良讀之於前始讀至帝初生祥瑞遂感動流涕曰朕於今日富有四海追思膝下不可復休因悲不息命令收卷二十年十二月癸未帝謂司徒長孫無忌等曰今日吾之生日俗云生日可嘉樂於吾之情翻成感思君臨天下富有四海而追求侍養永不可得仲由懷負米之恨則吾情也因泣下數行群臣並皆掩淚高宗為晉王始年九歲居長孫皇后喪哀慕不能自勝太宗常加慰撫繇是特深寵異貞觀十六年立為皇太子十九年太宗親征遼左命太子於定州監國將發太子悲啼數日因奏請飛驛遞表起居又請遞敕垂報並許之飛表奏事自茲始也每聞太宗親臨賊城不踰百步中宵不寐達旦銜涕因上表曰願收雷霆之威駐矢石之外惴惴愚誠敢以死請及師旋太子從至並州時太宗患癰太子親吮之扶輦步從者數日既至京師太宗氣疾發動乃於北闕餌藥令太子總攝機務每日聽政於東宮罷朝復謁寢門視膳不離左右二十三年從幸翠微宮太宗苦痢增劇太子侍疾旬日之間髮有變白者太宗泣曰吾聞古之孝者不過文王汝今數日不食晝夜不離吾側口嘗湯藥盛年鬢則變白汝之孝敬過文王矣吾雖殞沒亦無所恨及太宗靈駕將引帝號叫自投於地扳轀車哽慟摧裂大軍悲哭不能自勝永徽二年四月己丑以將忌月令有司進素食太常停教終于五月自三年喪畢朔望未御正殿百寮上表請乞九月辛卯始御太極殿自此每五日一度太極殿視事十一月辛酉親祀南郊黃門侍郎宇文節奏言依儀明日朝群臣陳樂懸請奏九部樂帝曰被甲而舞者情不忍觀所司更不宜設言畢慘愴久之初太宗在藩樂工為秦王破陳樂舞以歌用兵之妙貞觀初以為武舞每宴享奏樂必陳之至是停於殿廷所作而所司依前習之三年正月丙子親祠太廟及布幣祼獻至太宗神座俯伏感慟悲不自勝侍衛者皆歔欷莫能仰視六年春正月壬申朔親謁昭陵文武百寮及宗室子孫並陪位帝降輦易服行哭就位再拜劈踴禮畢又改服奉謁寢宮其崇聖宮妃嬪太長公主以下及越趙二國太妃等先於神位左右侍列如平生帝入寢哭踴絶於地進至東階西面再拜號慟久之乃進太牢之饌加珍饈具品引太尉無忌司空績越王福曹王明左屯衛大將軍陳知節並入執爵進俎帝至神座前拜哭奠饌閲先帝先后衣服拜辭訖行哭出寢北門乃御小輦還行宮中宗為皇太子大定元年從則天幸京師時屬凝寒親捧天后足步從一里餘天后大悅下制褒美宣付史官二年正月欲躬侍則天皇后靈駕以赴山陵百官固諫乃止有司以則天皇后服滿三十六日請帝及百寮並從權制改服慘服帝不許竟服衰麻唯公卿以下聽服慘服帝自居諒暗令所司唯進倉米薄粥豆盧欽望以帝素有氣疾請少加一薑桂上表曰臣聞孝子居喪朝一溢米暮一溢米食之無算或粥或飯不能食粥者飯羹以菜可也又曰五十不致毀又曰喪有疾食肉飲酒加以薑桂又曰若不勝喪乃比於不慈不孝孝經曰毀不滅性此聖人之教也竊以兩溢之米欲滿大升或為飯粥隨性所嗜羹以助食年至五十不合致毀素有疾又加酒肉食味不美調以薑桂此乃聖人制禮原父母之情不欲令孝子病毀不勝哀痛也自古聖人制禮如此殷勤大行則天遺制如此墾至今陛下三日視事聽覽萬機群臣性命仰陛下存活三聖基業待陛下興隆伏惟聖年已登五十陛下緣在房州先患腳氣今在衰苦舊患更發又自今月二日已來唯令進倉米薄粥臣下驚恐不勝惶懼但倉米陳臭天下共知食即動氣奈何陛下以五十之年抱積久之患奉纍聖之緒承遺制之托上事宗廟社稷下養赤子蒼生故食動病之倉米不遵遺令之教訓陛下縱自輕性命其奈七廟何其奈萬姓何臣等痛切之至謹述先聖制禮大行遺制伏乞少進美膳加以薑桂即望聖體稍和舊患漸損制不許玄宗開元五年十二月己丑敕令在遏密又逼忌辰起今日後至來年正月上旬以來並進蔬食所司準式此限內仍令都城禁屠殺十七年十一月謁橋陵帝望陵涕泣哀感左右升奉先縣為赤縣以所管萬三百戶供奉陵寢肅宗至德二年十二月詔曰頃以上皇在蜀朕亦居岐蜀郡宜改為南京鳳翔改為西京西京為中京蜀郡改為成都府鳳翔府尹已下官寮並同三京名號上元元年七月殿中監李輔國矯詔自興慶宮移太上皇於大內帝更選擇後宮及上皇素所愛幸並妓樂百餘人令於西宮備灑掃又有詔令萬安咸宜二長主侍養上皇至於服御饌食窮以珍奇視膳問安加於常日異方進獻先到西宮國之大事咨之可否然帝從此怏怏成病常涕泣不樂每西宮朝見嗚咽不能自勝侍臣感動天下稱孝繇此嘗欲誅輔國會疾甚竟不行憲宗元和二年春正月庚寅朝享於太廟初次諸室帝皆盡于誠敬至德宗順宗室流涕嗚咽若不自勝侍臣及舉册官皆相顧感泣穆宗長慶元年正月庚子享太廟至順宗憲宗二室歔欷流涕侍臣從官皆感動文宗孝義天然太和中太皇太后居興慶宮寶曆太后居義安殿皇太后居大內太后憲宗懿安郭后也寶曆太后穆宗恭禧王后皇太后穆宗真獻蕭后也王后生敬宗蕭后生文宗時號三宮三太后帝五日參拜四節獻賀皆繇復道至南內開成中正月望夜帝於咸泰殿陳銀燭奏仙韶樂三宮太后俱集奉觴獻壽如家人禮諸親王公主附馬戚屬皆侍宴凡膳饈珍果蠻夷奇貢獻郊廟之後奉三宮而後進御帝嘗以宗廟祭器朽故不修丁寧言於宰臣因令郡縣有為漆器處精造以進既而江南諸道有以新祭器奏到有司遽將呈貢上斂容令陳於別殿具冠而閲之有頃歔欷而退後唐莊宗初嗣晉王居喪過制毀瘠不自勝將吏不得謁見監軍使張承業排闥至廬所言曰大孝在不墜家業不同匹夫之孝且君父厭世嗣主未立竊慮凶猾不逞之徒有懷覬望又汴寇壓境利我凶哀茍或搖動則倍張賊勢訛言不息懼有變生請依顧命墨縗聽政然後經略南征保家安親此為大孝勿拘常制以敗遠圖於是聽斷大事乃平定趙魏雖萬事之殷在鄴城每一歲之內馳駕歸寧太后者數四士民服其仁孝同光二年正月甲寅帝在雒京太常奏定皇太后到闕儀皇帝合於銀臺門內奉迎敕頃以未平國恥須運戎機十年親統於驍雄千里久違於定省寧辭櫛沐常切晨昏今已翦蕩元凶宅居中土仰稟庭闈之訓獲寧宇宙之心恨不得躬詣汾川攀迎法駕況皇太后遠涉山阻將及近畿朕何以端坐闕庭為拘常禮雖云舊制未叶斯懷朕今親至懷州奉迎丙辰中書奏緣自二十三日後在散齋之內不合遠出敕旨到河陽奉迎庚申幸河陽奉迎皇太后悲泣久之太后素與劉太妃善分決之後思心鬱陶雖娛玩充庭常悒然不樂俄聞太妃違豫日命尚醫中使問訊結轍使言有瘳即喜言加則不御飲膳自是終始無敢言加者既而謂帝曰吾與太妃恩如伯仲彼經年抱病但見吾面差足慰心吾驟歸晉陽句朔與太妃復來帝曰時方暑毒山路崎嶇無煩往復且可令存渥輦迎侍太妃譬諫久之方止及凶問至太后慟哭纍旬自是漸不豫帝朝夕嘗藥視膳后妃衣不解帶請禱山川竟不效帝居喪哀毀殆至滅性皇族伏苫諫譬五日方食閔帝即位初御中興殿群臣列位馮道升階進酒帝曰比於此物無愛除賓友之會不近樽斝況在沉痛之中安事飲啖命徹之周世宗初鎮鄆州太祖親征慕容彥超六月兗州平帝遣使奉表請車駕繇鄆濮路還京庶得一睹天顏太祖從之及太祖過澶淵帝迎謁於馬前悲咽流涕顯德元年帝親征河東迎故淑妃喪還太祖一后三妃及嵩陵就掩皆議陪祔帝以妃喪在賊境未及遷窆乃詔有司於嵩陵之側預營一冢以虛之俟賊平即議襄事至是帝幸晉郊果成素志蓋孝感之所致也
