body:
  text: 功業一功業一春秋述七德之武周官著九伐之法蓋夫有天下者未嘗不由嚴師律廣行威罰以成乎善志而式隆大業者焉三代之後賢王踵武丕承基緒以御諸夏或乃獷俗弗率俶擾邊鄙敵國拒命毒痛齊民以至巨猾猖狂連群而為盜凶黨跋扈逆理而自安繇是申命將帥恭行討伐式遏亂略震耀皇靈用能興衰撥亂宣威昭德推亡兼弱闢壤地以益國綏懷荒服遠通驛侯而置吏邊陲增保障之固文軌致混同之盛至若躬聖哲之表參締搆之謀履艱危之運著戡定之績豈止謀成帷幄授律之允減蓋亦身先士衆大勳之克集者也周宣王能興衰撥亂命召穆公虎平淮夷其詩曰徐方既同天子之功漢武帝元鼎五年四月南越王相呂嘉反殺漢使者及其王王太后遣伏波將軍路博德出桂陽下湟水樓船將軍楊僕出豫章下湞水歸義越侯嚴為戈船將軍出零陵下灕水嚴故越人降為歸義侯越人于水中負人船又有蛟龍之害故置戈于船下因以為名甲為下瀨將軍下蒼梧甲越人歸漢者伍子胥書有下瀨船皆將罪人江淮以南樓船十萬人越馳義侯遺亦越人別將巴蜀罪人發夜郎兵下牂牁江咸會番禺六年十月平之事具征討門以其地為儋耳珠崖南海蒼梧鬱林合浦交址九真日南九郡初馳義侯因犍為發南夷兵且蘭君恐遠行旁國虜其老弱恐發兵與漢行後其國空虛而旁國來寇鈔取其老弱也乃與其衆反殺使者及犍為太守漢乃發巴蜀罪人當擊南越者八校尉擊之會八校尉不下中郎將郭昌衛廣引兵還行誅隔滇道者且蘭言因軍行而便誅之斬首數萬遂平南夷為牂柯郡夜郎侯始倚南越南越已滅還誅反者謂軍還而誅且蘭夜郎遂入朝邛筰冉駹皆震恐請臣置吏以邛都為越巂郡筰都為沈黎郡冉駹為文山郡廣漢西白馬為武都郡是年秋東越王餘善反攻殺漢將吏遣橫海將軍韓鋭中尉王溫舒出會稽樓船將軍楊僕出豫章擊之明年冬東越殺王餘善降詔曰東越險阻反覆為後世患遷其民於江淮間晉武帝咸寧五年十一月大舉伐吳遣鎮軍將軍琅琊王佃出涂中安東將軍王渾出江西建威將軍王戎出武昌平西將軍胡奮出夏口鎮南大將軍杜預出江陵龍驤將軍王濬廣武將軍唐彬率巴蜀之卒浮江而下東西二十餘萬以太尉賈充為大都督行冠軍將軍楊濟為副總統大軍太康元年三月孫皓降收其圖籍剋州四郡四十三縣三百一十三後魏太武始光四年五月討僞夏赫連昌于長安六月甲辰昌將麾下數百騎西南走奔上邽乙巳入城虜昌群弟及其諸母姊妹妻妾宮人萬數府庫珍寶車旗器物不可勝計神麚元年二月監軍侍御史安頡擒昌歸京師後周武帝建德六年正月平北齊合州五十五郡一百六十二縣三百八十五戶三百三十萬二千五百二十八口二千萬六千八百八十六於河陽幽青南兗豫徐北朔定並置總管府相竝二總管各置官及六府官隋文帝開皇八年三月詔大舉伐陳十月命行臺尚書令晉王廣出六合秦王俊出襄陽清河公楊素出信州荊州刺史劉仁恩出江州宜陽公王世績出蘄春新義公韓擒虎出廬江襄邑公賀若弼出吳州落菆公燕榮出東海合總管卒兵五十一萬八千皆受晉王節度東按滄海西拒巴蜀旌旗舟楫橫亙數千里九年正月陳國平獲州三十郡一百縣四百唐太宗初為唐國公子隋末群盜蜂起陰有濟時之志遂降節下士推財養客無貴賤咸能得其歡心至于群盜大俠皆願效死及從高祖於太原與晉陽令劉文靜善文靜坐李密親繫獄帝乃就禁所與之言陰圖舉義于時百姓避賊多入郡城城中勝兵者殆將數萬人文靜為令歲久知其豪傑文長孫順德劉弘基等避遼東之役皆隱匿從帝遊客甚衆於是密布腹心陰設籌策部置悉定即舉兵恐驚高祖欲以情告又慮不聽沉吟者久之未能決後因屏人白狀高祖大驚曰何意敢發此言汝留勿出吾將執汝告官因命紙筆即欲表太宗徐復言曰見天時人事如此所以敢言必欲執告不敢辭死高祖乃言曰吾鍾愛於汝汝亦自知豈能告汝慎勿出口且去明日可更來太宗旦日復見辭情懇至高祖不得已遂許以備王威等故猶豫未發會高祖被拘帝流涕言於高祖曰奉國事家惟忠與孝今國亂主昏盡忠何益破家絶祀非孝所宜事急矣便須早建大計功若有成當威加天下不成猶可山頭望廷尉豈宜大亂之時受執於單使而坐見夷滅乎高祖悅而從之兵臨發會事釋而止帝又說高祖曰晉陽者唐之舊國天之命我久矣今順天舉事誰謂不成且天與不取反受其咎臨機不斷禍必從之會劉武周作亂於是決策誅王威高君雅首舉義師奉高祖為大將皆太宗之謀也尋率兵略地進擊西河郡初至城下諭之不從因縱飛梯士卒爭上司法書佐朱智諲為內應遂克之獲郡丞高德孺數之曰卿見野鳥謬稱是鸞以諂時主指鹿為馬以致亡秦卿之類也義兵之舉正欲誅佞人耳於是斬之餘皆慰撫盡復其業百姓大悅更相賀曰所謂以義安天下此真吾君也自今之後其見太平乎師旋拜右領軍大都督三軍皆隸焉封燉煌郡公及義兵謀將西上隋將宋老生頓兵霍邑屈突通鎮河東議者憚之帝笑曰天實棄隋人孰能輔商周之不敵其來尚矣老生之輩當如我何億兆離心適足為吾擒耳及師次賈胡堡會霖雨糧盡高祖僉謀於衆將返太原帝進諫曰本興大義以救蒼生奮不顧身以安百姓當須先據咸陽號令天下今遇小敵便即班師將恐義從之徒一朝解體還守太原一城之地此為賊耳何以自全高祖不納促令發引帝遽將復諫會暝高祖已寢帝不得入夜漸久遂於外號泣聲聞於內有命引入問其故對曰今者兵以義動進戰則剋退還則散兵散於前敵乘其後死亡須臾而至是以悲耳高祖乃悟曰兵馬已去如何帝曰初遣兵之使世民並執於堡外矣所領右軍嚴而未發左軍雖去猶應不遠今請自追之高祖笑曰吾成敗在汝知復何言任汝也帝親與公子建成分路追兵時方中夜帝馳入深谷遂失道下馬步上久而得路及兵回高祖乃令帝自為武候將輕騎夜發前行及次河東關中豪傑爭來附義帝請進師入關取永豐倉以賑窮乏收群盜以圖京師高祖皆曰善帝以前軍濟河先定渭北略地於三輔自同華豳雍吏人及賊盜爭赴軍門請自效者相繼不絶扶攜老幼蒲於麾下千里之間軍糧日至收納英俊以備僚列遠近聞者咸自託焉師次於涇陽勝兵九萬胡賊劉鷂子擁兵而至未即歸款太宗親率精騎襲擊破之遂竝其衆因趣司竹李仲文何潘仁向善志等歸附之衆頓阿城獲兵十三萬長安父老齎牛酒詣旌門者不可勝紀並勞而遣之一無所受軍令嚴肅秋毫無所犯先是避盜入南山者襁負皆出軍中有列肆如都邑焉初帝之趣司竹也留劉弘基殷開山屯長安故城隋人出爭利縱兵擊卻自是之後京師留守衛文升陰帥精兵十萬閉門城守不敢拒戰帝進屯金城坊及大軍圍京城自朱雀門及倉城並帝所部連營以圍之京師平隋恭帝義寧二年以帝為光祿大夫唐國內史封秦國公會薛舉以徑兵十餘萬至渭濱扶風危急太守竇璡請救帝率兵擊之大破其衆追斬萬餘級略地于隴坻尋為右元帥總兵十萬徇東都軍屯西苑營於三王陵自三月至於四月而旋時京師新定李密向強且事觀兵未遑決戰遒於熊穀二州置重鎮而還平定王世充之基始於此矣武德元年九月薛舉寇涇州帝發兵以擊之屯於高墌城深溝高壘相持六十餘日會舉死其子仁杲嗣立竝羌胡之衆尚十餘萬兵鋒甚鋭數求戰帝按甲以待之賊糧盡中頗攜二其將翟長孫梁胡郎率所部相繼來降帝知仁杲心腹內離顧謂諸將曰可戰矣因令行軍總管梁實營於淺水原以誘之賊大將宗羅㬋自恃驍悍求戰不得氣憤者久之及是盡鋭來攻梁實冀逞其志實固險不出以挫其鋒營中無水人馬不飲數日羅㬋攻之愈急帝度賊已疲復謂諸將曰彼氣將衰吾當取之必矣申令諸軍遲明合戰復令將軍龐玉陳於淺水原南出賊之右以先餌之羅㬋併軍共戰玉軍幾敗既而帝親御大軍奄自原北出其不意羅㬋望見復回師相拒我師表裏齊奮呼聲動天羅㬋氣奪於是大潰斬首數千級投澗谷而死者不可勝計帝因率左右二十餘騎追奔直趣折墌以乘之仁杲列陳城下帝據涇水以臨賊賊徒氣沮無敢進戰其驍將渾幹等數人臨陳來降請還取馬帝縱遣之於是各乘良馬須臾並至仁杲大懼嬰城自守帝具知賊中虛實將領大軍繼至四面合圍因縱辨士諭以禍福城中震駭計無所出詰朝仁杲率其將士開門請降師還拜太尉陝東道行臺尚書令鎮長春宮關東兵馬並受節度宋金剛之陷澮州也兵鋒甚鋭高祖以王行本尚據蒲州呂崇茂友於夏縣晉澮二州相繼陷沒關中震駭乃遣中書侍郎唐儉馳下手敕曰賊勢如此難與爭鋒宜棄河東之地謹守關西而已帝表曰太原王業所基國之根本河東殷實京邑所資若舉而棄之臣竊憤恨願假精兵三萬必望風平殄武周克復汾晉高祖大悅於是悉發關中兵以益之三年十二月帝趍龍門關履水而渡進屯柏壁於時大亂之後未有倉儲自河以東人情騷擾各入城壁莫有固志軍資糧食徵稅無所帝乃出教示其禍福令之所及爭來歸款自近至遠投附日多然後漸收其糧以濟軍事諸將咸悅遂養兵秣馬與賊相持唯令偏裨乘間抄掠大軍堅守不戰由是賊徒日蹙於後賊將尋相尉遲敬德潛引精騎援王行本於蒲州帝親率步騎三千從間道夜趨安邑邀擊大破之追奔數十里尋相等僅以身免悉虜其衆三年四月金剛糧絶而遁帝逐之於介州金剛列陳南北七里以抗官軍帝遣總管李績程咬金秦叔寶當其北翟長孫秦武通當其南親御中軍以臨之諸軍戰小卻為賊所乘帝精騎三千直趣金剛賊衆大潰斬首三千餘級追奔數十里至張難堡有浩州行軍總管樊伯通張德政先據此堡望見帝輕騎而來初未識帝帝免胄曰我也堡人歡譟既而涕泣曰不圖今日生謁大王死無恨矣時金剛脫身北遁尉遲敬德退保介州帝進軍逼之敬德與尋相王赤龍等率衆八千人來降武周大懼奔於突厥大軍進至竝州僞僕射楊休念以城降悉復舊地突厥遣步利設及骨咄祿勤來會於是大饗將士高祖遣蕭瑀就軍拜益州道行臺尚書令五月帝發竝州仍以旋師平夏縣歸而獻捷高祖大悅即奉詔以陝東道行臺總率諸將擊王世充於雒邑七月發京師自關東州府鎮兵馬咸受節度師次穀州王世充以精兵三萬來拒戰帝率輕騎挑之相遇於磁澗既衆寡不敵加以溪谷路險被圍數重進退阻絶衆咸大懼帝引弓馳射皆應弦而倒獲其大將燕頎賊乃退帝徐還犯冒埃塵見者不能識軍中自相拒抗帝免胄以示衆方得入營旦日陳兵穀水之上步騎五萬帝舉麾誓衆曰隋室無道毒被蒼生我國家受命於天寧濟億兆王世充敢抗大邦數行侵暴枉殺良善恣其淫酗國家為百姓除害事不獲已各宜整爾軍容修爾器械立勳立效躬行天討敢有犯命者斬無赦於是自穀州營於磁澗密遣黃君漢夜從河中下舟師回襲洛城克之因置兵為守以斷河橋王世充遣僞太子玄應率諸驍將盡鋭攻擊而校尉張乂等七十餘人戮力拒之會帝發兵來援賊衆乃退世充北路既斷自河以南城堡並相次歸降九月又移營屯於孝水分命諸軍進屯北芒連營以逼之帝以五百騎先觀戰地卒遇世充將萬餘人帝進擊其騎破之又衝步卒出其陳後以大羽箭射之死者相繼賊皆披靡亦會衆軍繼進合擊遂破之斬首三千餘級獲其大將軍陳智略世充僅以身免僞營州總管楊慶遣其兵曹劉敏行間行乞降請兵應接帝遣總管李績等率步騎數百自陽城迎之時僞太子玄應先將兵在滎汴之間聞績兵至遽來邀戰績擊卻之乃夜令郭恪與僞榮州刺史魏陸書喻令歸國陸許諾陰從東都城內送其父母出赴大軍以自取信玄應遣僞大將軍張志就陸徵兵陸詐病不出召志入遂擒之即以城降陸仍遣志詐為玄書停其東道兵馬令張慈寶且還汴州又密執刺史王要漢令圖慈寶傳首大軍玄應既見諸州相率歸國繇是大懼奔還東都李績乃得安慰東夏於是僞蔚州總管時德睿伏州刺史王孝矩袁州刺史楊承先封州刺史郭神會行軍總管武賈等竝首尾來降世充東道糧運自是而絶於是分遣總管史萬寶據龍門劉德威自太行圖河內王君廓屯雒口將趣成皋僞驍將單雄信裴孝達等與總管王君廓相持於雒口帝親率騎五千以援之次轘轅雄信聞而退走君廓追敗之世充以兵二萬攻我孝水堡帝率騎擊之斬首數百級于時出師日久士卒思歸總管李安遠劉弘基李壽等皆勸班師帝曰今者興兵正欲一勞永逸東道諸州望風歸附雒陽孤城何能久支功在垂成勢同沃雪何乃棄之而去非計之善者乃令諸軍曰世充未破師必不還更有請班師者斬衆心乃定帝與世充書諭以禍福不答羅志信取其千金堡帝令屈突通守之世充自來攻帝以兵赴援表裹奮擊世充大敗俘斬六千餘人幾獲世充僞鄭州司兵沈悅以武牢請降將軍王君廓夜應之自水門入擒其僞荊王行本遂取而守之會寶建德以兵十萬來救帝破之於滎陽建德築壘干板渚帝屯虎牢堅壁不與戰相持三十餘日五月有自賊中來者云建德伺官軍芻盡必牧馬於河北因襲武牢帝聞之遂北濟河南臨廣武察敵形勢觀兵而還因留馬以誘之是日晚至武牢誥朝建德果悉衆而西陳兵于汜水世充將郭士衡陳于淇南周亙數里鼓譟建德遣兵涉汜水帝令總管王君廓以少兵擊之待河北馬渡方欲與戰建德列陳自辰至午兵士飢倦人皆坐列又爭飲水帝乃令宇文士及將三百騎經賊陳之西馳而南上誡之曰賊若不動爾宜引歸如其覺動宜引東出士及才過賊衆果動逡巡欲退帝曰可以擊也親率輕騎追而誘之衆軍繼至建德回師而陳未及整列帝先登以擊之所向皆靡俄而衆軍合戰囂塵四起帝率史大奈程咬金秦叔寶宇文敵等纏幡而入出其陳後張我旗幟賊顧見之衆乃大潰追奔三十里斬首三千餘級虜其衆五萬餘人擒建德于陳介夫致之高祖聞而大悅手詔曰聞獲建德竟如汝所料畫策者雖吾平定者汝也吾聞黃河千年一清乃當今日汝功一也隋氏分離崤函隔絶兩雄合勢一朝清蕩汝功二也兵既克捷更無死傷無愧為臣不憂其父汝功三也吾今開懷抱養蒼生盡其天年心無外慮汝功四也既而帝從河南路還大營經世充鞏縣及偃師故城爭來投于是將建德至東都城下以示世充充聽其言而泣於是素服率其屬二千餘人詣軍門請罪帝接之以禮世充俯伏流汗帝謂之曰卿常以童子見處今見童子何恭之過乎世充頓首謝罪於是部分諸軍先入東都布兵守捉軍令齊肅莫敢有犯明晨入據宮城令蕭瑀寶軌等封府庫一無所取令記室房玄齡先入中書門下收隋圖籍詔誥已為世充除削一無所獲其城中文武與世充原同謀惡者誅之枉見囚禁者釋之非罪誅戮者祭之葬之官人百姓皆荷再生之恩矣師還群臣以帝功絶常倫請加殊號高祖以帝為天策上將位在王公上領司徒陝東道大行臺尚書令增邑二萬戶通前三萬戶賜金輅一乘袞冕之服玉璧一雙黃金六十斤前後二部鼓吹及九部之樂班劍四十人未幾寶建德舊將劉黑闥舉兵於湘州帝總戎東討五年正月進軍肥鄉相持兩月黑闥率步騎二萬南渡雒水結陳而至帝遣輕騎當之賊皆殊死戰於是親率精騎擊賊馬軍破之因乘勝躁其步卒自午及昏戰數合賊大潰斬首萬餘級溺水死者數千人黑闥與二百餘騎北走悉虜其衆時徐圓朗阻兵徐兗帝進師圍之會奉詔馳傳入朝因令巢刺王元吉以師濟河太宗至京師論攻取之勢高祖大悅復令馳詣黎陽與大軍會遂趣濟陰平圓朗十城聲震淮泗脅杜伏威令其入朝河濟江淮盡定遂班師六年突厥寇馬邑帝北伐至竝州突厥以馬邑歸國遣使和親置屯田於竝州而還七年幸仁智宮時寧州總管楊文幹舉兵作亂寧州人杜鳳詣官告變帝率衆討之師未至而凶徒震懾文幹為其麾下所殺于時突厥數為邊寇人或說高祖曰突厥頻寇關中者徒以府藏子女之在京師故也若焚燒長安而不都則胡寇自止高祖惑之遣中書侍郎宇文士及踰南山以至樊鄧行可居之地將徙都焉隱太子巢刺王及裴寂並贊成此計帝諫曰獫狁孔熾作患中華自古有之非獨今也周漢並懼其難未聞遷徙都邑今陛下聖明總一天下思皇多士帶甲百萬霍去病漢廷之將帥耳猶且志滅胸奴臣忝備潘維尚使胡塵不息遂令陛下議欲遷都此臣之責也幸乞聽臣一申微效取彼頡利以謝中州不數年間必係單于之頸何有遽遷都邑快犬羊一旦之情貽後人萬代之恥高祖大笑曰吾家千里信不虛也於是遂止是年秋突厥二可汗舉國入寇道自原州連營南上帝受詔北討巢刺王元吉隸焉初關中霖雨至是大水運糧阻絶士卒疲於征役甲仗不能堅利而突厥大逼舉朝危懼高祖獨恃帝委以捍禦既而器械不足以當敵城池不足以據守帝頗患之諸將憂見於色及勒兵北上與虜遇於豳州帝部分兵馬候機當戰頡利突利率萬餘騎奄至城西乘高而陳將士懾懼三軍大駭帝謂元吉曰吾既出討固敵是求今胡騎憑陵須與一鬥豈宜安坐示之以怯吾當自率精鋭以張國威爾可同行也元吉大懼對曰突厥兵勢若此之強輕脫取敗決無出理太宗曰汝不敢去宜傍觀得失吾當往為汝出奇乃親率百騎馳詣虜陳告之曰國家與可汗誓不相負何為背約深入吾地我秦王也故來一決可汗若自來我當與可汗兩人獨戰若欲兵馬總來我唯百騎相禦耳頡利弗之測笑而不對帝又令前騎告突利曰往與我盟急難相救爾今將兵來何無香火之情也亦宜早出一決勝負突利不對太宗又將前渡溝水頡利見帝輕出及聞香火之言乃陰猜突利因遣使曰王不須渡我無惡意更欲共王自斷當耳於是斂軍稍自引卻此後連雨更甚帝乃召諸將謂之曰虜控弦鳴鏑弓馬是憑今久雨彌時弧矢俱敝突厥人衆如鳥鍛翮我屋宿火食槍槊犀利料我之逸揣敵所勞此而不乘夫復何待今欲先令徑兵亂其陳乃率突騎驅其後虜俗進不相救自此以北澗谷深長時有一道魚貫以度因而迫之彼數十萬騎坑阱中物耳追至黃河縱不盡擒必當十獲八九此曉兵者所解諸君勿疑於是師夜出冒雨而進醜徒震駭因縱反間於突利突利悅歸心焉遂不欲戰其叔姪內離頡利欲戰不可因而請和帝許之結盟而去九年高祖以帝立為皇太子遂即位貞觀一十三年二月辛酉太宗克平沙漠以為州府其都督刺史候利發等競遣使來詣每元正朝賀則數百千人尋常馳使道路不絶老幼不憚遐遠悉手持方貢是月引見諸蕃使人太宗謂群臣曰漢武窮兵朔漠垂三十餘載中國空虛所獲無幾比於今時故無等級朕之功業大小竹帛豈能盡載中書侍郎崔仁師曰古者書史所載多為虛詞豈如今日事皆實録聖道之大故無得而稱豈縑素所能盡太宗曰吾知勞逸不同者有二鐵勒解辮歸國去危就安邊夷無事豈不逸樂而窮髮之地盡為齊人古昔以來書史不載今日起居記朕功業亦謂勤勞高宗乾封元年十一月命司空英國公李績為遼東道行軍大總管率裨將郭待封等以征高麗二年二月績度遼遂引兵於新城西南據山築柵且守城中窘迫數有降者自此所向克捷高藏及男建遣太元兄男産將首領九十八人持白幡出降請便入朝績以禮延接男建猶閉門固守總章元年九月績又移營於平壤城男建頻遣兵出戰皆大敗男建下捉兵總官僧信誠密遣人詣軍門許開城門為內應經五日信誠果開門績縱兵入登城鼓譟燒城門樓四面火起男建窘急自刺不死十一月拔平壤城虜高藏男建等十二月至京師獻俘於含元宮詔以高藏政不繇己授司平太常伯男産先降授司宰少卿男建配流黔州男生以鄉導有功授右衛大將軍封卞國公特進如故高麗國舊分為五部有城百七十六戶六十九萬七千乃分其地置都督府九州四十二縣一百又置安東都護府以統之擢其酋渠有功者授都督刺史及縣令與華人參理百姓仍遣左武衛將軍薛仁貴總兵鎮之
