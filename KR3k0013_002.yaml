body:
  text: 誕聖誕聖夫帝王之生必有休應豈非天命所屬歷數斯在警生靈之耳目為天飛之兆朕者乎故神祗幽贊靈物保護冥符夢感昭啓聖迹紛綸雜沓觸類而長諒不可談悉矣歷代而下質文斯變緣情之禮隨時而作亦以極臣子之誠顯邦家之慶紀乃誕日崇乎美名繇是陳宴享之禮洽魚藻之歡設桑門之饌修福田之事公卿士庶為節物以相遺諸侯牧守奉貢珍而來覲斯亦一時之盛觀百王之所不易者矣伏羲氏母曰華胥燧人之世有大人之迹出雷澤華胥履之生帝於成紀神農氏母曰女登為少典妃遊華陽有神人身龍首感女登於常陽而生帝黃帝母曰附寶見大電光繞北斗樞星照郊野感附寶而孕二十月而生帝於壽丘少昊母曰女節黃帝時有大星如虹下流華渚女節夢接感而生帝顓頊母曰女樞少昊之末瑤光之星貫月如虹感女樞於幽房之宮生帝於若水高辛不見其母生而神靈自言其名曰夋堯母曰慶都觀于三河嘗有龍隨之既而陰風四合赤龍感之孕十四月而生帝於丹陵舜母曰握登見大虹意感而生帝於姚墟夏禹母曰修己山行見流星貫昴夢接意感又吞神珠背剖而生禹於石一云胸折而生啓母曰塗山氏初禹治洪水通轘轅山化為熊謂塗山氏曰欲餉聞鼓聲乃來禹跳石誤中鼓塗山氏往見禹方作熊而去至嵩高山下化為石方生啓禹曰歸我子石破北方而啓生湯母曰扶都見白氣貫月意感以乙日生湯故號天乙周文王母曰太任夢長人感己溲于豕牢而生文王漢高祖以秦昭王五十一年生於豐臣欽若等曰自此以下有年無月及無年月者史闕初母媼嘗息大澤之陂夢與神遇時雷電晦冥父太公往視則見交龍於上已而有娠遂産高祖一云母名含始遊于雒池有玉雞禦赤珠刻曰玉英吞此者王舍始取而吞之惠帝以秦始皇三十七年生於豐文帝以漢王四年生初帝母薄姬高祖召欲幸之對曰昨暮夢龍據妾胸高祖曰是實貴徵也吾為汝成之遂幸有身歲中生帝於河南景帝以孝惠七年生於代宮武帝以孝景前元年生於長安初帝母王夫人內太子宮臣欽若等曰太子即景帝也太子幸愛之生三女一男男方娠夢日入其懷以告太子太子曰是貴徵也遂生武帝昭帝以太始三年生於鉤弋宮母曰趙倢妤二字或從女本以有奇異幸謂望氣者言有奇女天子氣生帝亦奇異十四月乃生宣帝以征和二年生於太子宮元帝以元平元年生於長安尚冠里成帝以甘露三年生於甲觀畫堂甲觀甲乙丙之次也畫堂畫以為飾哀帝以河平四年生於定陶平帝以元延四年生於中山孺子以元始四年生於廣戚後漢光武以建平元年十二月甲子夜生於濟陽縣舍有赤光照室中明帝以建武四年五月甲申生於常山元氏章帝以中元二年生於雒陽和帝以建初四年生於雒陽殤帝以元興元年秋生於雒陽安帝以永元六年生於清河邸順帝以元初元年生於雒陽沖帝以漢安二年生於雒陽質帝以永和三年生於渤海桓帝以陽嘉元年生於蠡吾靈帝以永壽三年生於河間饒陽解瀆亭弘農王以熹平二年八月丙寅生於雒陽宮獻帝以光和四年三月癸巳生於雒陽宮帝母王美人初妊娠畏何后服藥欲除之而胎安不動數夢負日而行魏文帝以後漢中平四年冬生於譙時有雲氣青色而圜如車蓋當其上終日望氣者以為至貴之證非人臣之氣高貴鄉公以正始三年九月二十五日生其日天氣晴朗堂上黃雲照耀久之乃散晉元帝以咸寧二年生雒陽有神光之異一室盡明所藉稿如始刈後魏道武母賀氏因遷徙遊於雲澤寢夢日出室內寤而見光自牖屬天欻然有感以建國三十四年七月七日生帝於參合陂北其夜復有光明明元以登國七年生於雲中宮太武以天賜五年生於東宮文成以太平真君元年六月生於東宮獻文以興光元年七月生於陰山之北孝文以皇興元年八月戊申生於平城宮神光照室天地氤氳和氣充塞宣武母高夫人初夢為日所逐避於床下日化為龍繞己數匝寤而驚遂有娠以太和七年閏四月生帝於平城宮孝明以永平三年三月丙戌生於宣化殿之東北有光照於庭中後周太祖母王氏初孕五月夢抱子升天不至而止寤以告德皇帝太祖父也帝喜曰雖不至天貴亦極矣及太祖生有黑氣如蓋下覆其身孝閔帝以西魏大統八年生於同州明帝以永熙三年生於統萬城武帝以大統九年生於同州有神光照室宣帝以武成元年生於同州靜帝以建德二年六月生於東宮隋高祖以西魏大統七年六月癸丑夜生於馮翊般若寺紫氣充庭唐高祖以後周天和元年十一月丁酉生於長安是日紫氣充庭神光照室太宗以隋開皇十八年十二月戊午生於武功之別館時有二龍戲於館門之外三日而去高宗以貞觀二年六月生於東宮之麗正殿中宗以顯慶元年十一月乙丑生於長安睿宗以龍朔二年六月己未生於長安玄宗以垂拱元年八月五日生於東都開元十七年八月癸亥以降誕之日大置酒張樂宴百寮於花萼樓下終宴尚書左丞相源乾曜右丞相張説率文武百官等上表曰臣聞聖人出則日月記其初王澤深則風俗傳其後故少昊著流虹之感商湯本玄鳥之命孟夏有佛生之供仲春修道祖之籙追始樂原其義一也伏惟開元神武皇帝陛下二氣合神九龍浴聖清明總於玉露爽朗冠於金天月惟仲秋日在端午常星不見之夜祥光照室之期群臣相賀曰誕聖之辰也焉可不以為嘉節乎比夫曲水褉亭重陽射圃五日綵線七夕粉筵豈同年而語也臣等不勝大願請以八月五日為千秋節臣欽若等曰誕聖節名始於此著之甲令布於天下咸令宴樂休假三日群臣以是日獻甘露醇酎上萬歲壽酒臣欽若等曰上壽自此始王公戚里進金鏡綬帶士庶以絲結承露囊更相遺問村社作壽酒宴樂名為賽白帝報田神上明玄天光啓大聖下彰皇化垂裕無窮異域占風同見美俗帝手詔報曰凡是節日或以天氣推移或因人事表記八月五日當朕生辰感先聖之慶靈荷皇天之眷命卿等請為令節上獻嘉名勝地良遊清秋高興百穀方熟萬寶以成自我作古舉無越禮朝野同歡是為美事依卿來請宣付所司十八年六月禮部奏請千秋節休假三日及村閭社會並就千秋節先賽白帝報田祖然後坐飲從之八月丁亥御花萼樓以千秋節百官獻賀賜四品已上金鏡珠囊縑綵賜五品以下束帛有差上賦八韻詩又製秋景詩臣欽若等曰自此已後或連年不書皆史氏闕文二十三年八月五日千秋節御花萼樓宴群臣御製千秋節詩序時小旱是日大澍雨百官等咸上表賀二十四年八月五日千秋節帝御廣達樓宴群臣奏九部樂內出舞人繩伎頒賜有差下制曰自古風俗所傳歲時相樂亦合因事大小在人朕生於仲秋厥日惟五遂為嘉節感慶誠深今屬時和氣清年穀漸熟中外無事朝野乂安不因此時何云燕喜卿等即宜坐飲相與盡歡又召京兆父老等宴之宣敕曰今茲節日穀稼有成頃年以來不及今歲百姓既足朕實多歡故於此時與父老同宴自朝及野福慶同之並宜坐食食訖樂飲兼賜少物宴訖領取天寶七載七月文武百官刑部尚書兼京兆尹蕭照等及宗子咸上表請改千秋節為天長節從之肅宗以景雲二年九月三日乙亥生於東宮之別殿祥光照室至德元年七月即位二年九月戊寅以降誕日王公已下咸有進獻帝以行在不受臣欽若等曰時安祿山盜據兩京故曰行在乾元元年八月甲辰上皇降誕日於金明樓宴百官賜綵五百匹二年九月丙寅帝降誕日宴百官於宣政殿前賜絹三千匹上元二年九月天成地平節臣欽若等曰史不書置節年月於三殿置道場代宗以開元十四年十月十三日生於東都上陽宮之別殿時玄宗幸汝州之溫陽有望氣者云宮中有天子氣玄宗即日還宮是夜帝降誕寶應元年四月即位十月宰臣等上言今月十三日皇帝降誕日望準天長節休假三日帝以山陵未畢不許宰臣又上言休假一日從之永泰二年十月降誕日諸道節度使進獻珍玩衣服名馬二十餘萬計以陳上壽自是歲以為常大曆二年十月降誕日宰臣及常參官率錢修齋度僧尼道士凡數百人三年十月降誕日諸道節度使上壽各獻衣服名馬及綾絹凡百餘萬四年十月降誕日百僚於章敬寺修齋行香陳樂大會六年十月降誕日修衆僧齋于資聖寺百僚行香諸道使各獻方物上壽八年十月降誕日於資聖寺修一千僧齋度僧尼凡二百餘人九年十月降誕日百僚分寺觀行香頒賜茶藥德宗以天寶元年四月癸巳生長安東宮別殿大曆十四年五月即位貞元六年四月乙酉帝降誕日京師諸司百官多於佛寺齋會十二年四月庚辰帝降誕之日近歲常以其日會沙門道士于麟德殿講論帝每謂三教與儒教所歸不殊但內外迹用有異爾是日兼召儒官給事中徐岱兵部郎中趙需禮部郎中許孟容四門博士韋渠牟與沙門談延道士萬參成等數十人迭升講坐論三教初如矛戟森然相向後類江河同歸於海帝大悅頒賜有差是歲昭義節度使王虞休上表曰臣聞於師夫君子為能知樂是故審音以知聲審樂以知政則治道備矣清明廣大終始周旋與天地同其和與四時合其序豈止於鐘鼓管磬云乎哉伏見開元天長節著于甲令每于是日海宇歡娛稱萬壽之無疆樂一人之有慶故追堯接舜邁禹踰湯自周已後不能議矣今陛下降誕之辰未有惟新之典無乃臣子之分或有所闕愚臣不揆頑昧敢思祖述之私歌竊忭忘寢與食久矣適遇有知音者與臣論其章樂探微致奧窮理盡情臣乃追造繼天誕聖樂一曲大抵八宮為調表五音之奉君也以土為德知五運之居中也凡二十五篇法二十四氣而足成一歲也每篇一十六拍象八元八愷登庸於朝也冀與雲門咸池永傳於律呂空桑絲竹合薦於宮縣不聞惉滯之聲長作中和之樂可使九方之人頓忘於肉味四夷之俗皆審於薰風與唐惟休終古盡善臣不勝懇款屏營之至謹昧死陳獻以聞其所造曲譜謹同封造先時有太常樂人劉玠流落至潞州虞休因令造誕聖樂起於此也順宗以上元二年正月十二日生憲宗以大曆十三年二月十四日生永貞元年八月即位十二月太常奏太上皇正月十二日降誕皇帝二月十四日降誕並請休假一日詔可元和七年二月降誕日宰臣舉舊制例進衣一副李吉甫獨進馬二匹賜通天犀帶一條金石凌一合九年二月降誕日御麟德殿垂簾命沙門道士三百五十人齋會于殿內食畢較論于高座晡而罷頒賜有差穆宗以貞元十一年七月六日生於大明宮之別殿元和十五年正月即位閏正月辛亥太常禮院奏準玄宗降誕為千秋節肅宗降誕為天成地平節並假一日自後纍聖降誕雖不別置節名其休假獻餽如舊今皇帝七月六日降誕準故事合休假上禮從之七月乙巳詔曰昔者聖王之法以孝理天下也廣愛敬之心推于四海盡奉養之志示于兆人然後自誠之化有情思感朕以眇身祗荷鴻業皇太后就安長樂朝夕承顏慈訓所加慶感兼極伏以今月六日是載誕之辰奉迎皇太后宮中上壽朕既獲申歡慰亦欲公卿大夫同之宜以今月六日平明於光順門集百寮及外命婦進名賀皇太后朕御光順門內殿與百寮相見永為常式又詔御麟德殿觀僧道講論頒賜有差先是尚書左丞韋綬以東朝舊恩多所陳奏請降誕日詔百官詣光順門先賀皇太后然後上皇帝壽書之史册光示萬古帝欣然納焉其後竟以降誕受賀禮無所據罷之長慶元年七月庚子降誕日百僚於紫宸殿稱賀畢詣昭德門外命婦詣光順門並進門奉賀皇太后去年降誕稱賀百寮與命婦並集於光順門群情以為非便故改其儀二年七月甲午降誕日宰臣率百寮入閣奉賀訖又詣光順門進名賀皇太后敬宗以元和四年六月九日生長慶四年正月即位四月庚辰朔中書門下奏皇帝六月九日降誕伏準故事休假一日從之其日帝御三殿命浮圖道士講論內官及翰林學士諸軍士駙馬皆從既罷賞賜有差寶曆元年六月敕降誕日文武百寮於紫宸殿稱賀及詣光順門奉賀皇太后自今已後宜停國朝本無降誕日賀儀蓋長慶初尚書左丞韋綬率情上疏行此禮至是方罷二年六月降誕日御三殿命兵部侍郎丁公著太常少卿陸亙前隨州刺史李繁與浮圖道士講論內官翰林學士及諸軍使公主駙馬皆從既罷賞賜有差文宗以元和四年十月十日生太和元年十月降誕日召祕書監白居易等與僧惟應道士趙常盈於麟德殿講論賜錦綵有差二年十月壬戌以降誕日召吏部侍郎楊嗣復吏部郎中崔戎等赴麟德殿講論賜錦綵銀器有差四年十月辛亥降誕日命道士僧徒講論于麟德殿是月鹽鐵使王涯進降誕綾羅錦綵等共一萬四千八百匹銀器一百事判度支王起進綾絹夾纈雜綵等共一萬四千三百匹御衣一副鏡一面諸方鎮稱是五年十月甲戌降誕日命沙門道士講論于麟德殿七年八月中書門下奏臣聞帝王有必著之符神靈無虛應之兆所以電繞樞極氣感虹流玄鳥祚商赤光啓漢考驗今古章焯圖書伏惟皇帝陛下馭三統之元膺千年之運當誕聖之日為河清之祥玄律應期乾宮以之定位開冬戒節水德表其靈長道若合符事光載籍臣等伏見前史稱漢宣之德則曰修武帝故事並以漢之隆平莫如武帝後之為理無及孝宣舉此二主以為極盛今陛下功濟天下道覆寰中威統百靈宰御群品修祖宗之德莫如貞觀開元且太宗幸慶善之宮即降誕之所賦詩賜宴播為樂章玄宗降聖之辰為千秋之節王公上壽士庶交歡流于管絃書之甲令此時張説宋璟歷懇獻章二臣之心必無違禮國史所載昭然可徵近者廣集緇黃多為法會誠有資於景福且未叶於舊儀夫四時成歲百穀成實必在首冬用成神化今臣等不勝大願請以十月十日為慶成節著在令式以示四方是日陛下於宮中奉迎太皇太后與昆弟諸王盛陳宴樂群臣詣延英門奉觴上千萬歲壽天下州府置宴一日積嘉祚於元命慶延洪於昌期上表中興之耿光次復開元之盛典臣等無任慺慺懇款之至制曰省表具知朕以誕生之日延集緇黃式遵常儀用弘二教卿等啓心輔德叶志納忠稽貞觀開元之舊章述慶善千秋之令範爰崇誕日請號慶成顧豫寡昧懼忝彝典今以同歡心於萬國申盛禮於兩宮深嘉誠勤是用依允十月甲午延英對宰臣因謂曰降誕設齋起自近代朕緣相承已久未可便革雖置齋會唯對源中等暫入殿臣欽若等曰源中姓王為翰林學士至僧道講論時盡不臨聽宰臣等奏曰伏以誕聖之辰普天同慶陛下只合侍皇太后與諸王盛陳宴樂以奉慈顏齋會誠資景福且非中國教化伏自開元十七年張説宋璟請以降誕為千秋節事頗得宜今若修祖宗故事至是日奉迎兩宮太后歡宴實為盛美帝深然之八年九月敕慶成節宜令百寮詣延英上壽仍令太常寺具儀注聞奏仍準上巳重陽例於曲江錫宴九年十月慶成節詔宰臣及文武百官慶成節赴延英殿庭奉觴稱賀禮畢錫宴於曲江亭開成元年十月慶成節宴于延英殿太常進雲韶樂宰臣及翰林學士赴宴又錫百寮宴於曲江二年九月詔曰慶成節朕之生辰天下賜宴庶同歡泰不欲屠宰用表好生非是信尚空門將希無妄之福恐中外臣庶不論朕懷廣置齋筵大集僧衆非獨凋耗物力兼恐致惑生靈自今宴會蔬食任陳脯醢永為常例咸使聞知又詔慶成節宜令京兆府準上巳重陽於曲江宴會文武百寮奉觴宜權停又詔慶成節假宜依上元日休假三日十月降誕日帝幸十六宅與諸王宴樂是日賜宴百寮于曲江三年十月慶成節命中人以酒脯並仙韶樂錫中書門下及文武百寮宴於曲江亭四年十月慶成節宴中書門下及文武百寮於曲江亭命中人以酒脯及仙韶樂宣錫之武宗以元和九年六月十一日生開成五年正月即位五月中書奏請以六月十一日帝載誕日為慶陽節從之會昌元年五月辛未敕慶陽節百官率外別賜錢三百貫文以素食合宴仍委京兆府量事陳設不用追集坊市歌舞宣宗以元和五年六月二十二日生會昌六年三月即位號壽昌節懿宗以太和七年十一月十四日生大中十三年八月即位號延慶節僖宗以咸通三年五月八日生於東內十四年七月即位號應天節昭宗以咸通八年三月二十二日生於長安東內文德元年三月即位龍紀元年三月帝載誕之日宰臣等表為嘉會節從之群臣上表賀曰臣聞聖人受命天必降其殊靈王者應生國必蒙其介祉故華渚有流虹之異玄樞呈大電之祥而皆近感神明遠符乾象叶千年而啓運契六合以居尊伏惟皇帝陛下德邁方圖道融三五因社鳴而正位逢井聚以樂推膺彼昌期弘斯丕構今者發生司律曆數在躬值清明馭氣之時當仁壽悅隨之始固可年同鶴算歲比山呼永符垂拱之風長保後天之慶哀帝以景福元年九月三日生天祐元年八月即位其是月中書門下奏皇帝九月三日降誕伏以電曜繞樞軒頊乃降天之日光輝照室明元實命代之辰爰自我朝乃崇令節著為故事抑播前文伏惟皇帝陛下九五飛龍四三應運國稱利見天表殊休當誕聖之時感真人以衛室居在籓之際實羽客以獻符是以克紹丕圖光膺寶祚敢循故典爰定美文臣等商量以降誕日為乾和節易曰乾健也蓋乾以自強不息和則衆彙皆同遠徵易文實諧聖德請依令式休假獻賀從之詔文武百寮諸軍諸使諸道進奉官準故事於寺觀設齋不得宰殺只許酒果脯醢後唐莊宗以光啓元年十月癸亥生於晉陽宮在妊時太后嘗夢神人黑衣擁扇夾侍左右載誕之辰紫氣出於窗戶同光元年十月壬辰萬壽節百官齋會於開封府二年十月丁亥萬壽節宴群臣於長春殿三年十月辛巳萬壽節宴長春殿賜百官分物明宗以咸通八年九月生於代北之金鳳城天成元年六月中書奏九月九日皇帝降誕之辰舊例特置節名以其日為應聖節休假三日仍令京都天下設樂以申祝壽從之九月九日應聖節百寮於敬愛寺設僧齋召緇黃衆於中興殿論難經義二年九月九日應聖節四方諸侯並有進獻丁巳百官奉為應聖節於敬愛寺行香設齋宣教坊伎宴樂之宰臣樞密使以下咸進壽酒各賜錦衣召兩街僧道於中興殿講論三年九月九日應聖節召兩街僧道談經於崇元殿宰相進壽酒百官行香修齋於相國寺宣教坊樂及左右廂百戲以宴樂之又僧道虛受等賜紫衣師號共六十人四年九月九日應聖節百官於敬愛寺齋設賜宰臣錦袍香囊手帕酒樂帝御廣壽殿近臣獻壽各頒錦袍復御中興殿聽僧道講論長興元年九月九日應聖節百官於敬愛寺齋設帝御廣壽殿聽僧道講論二年九月九日應聖節四方諸侯並有進獻丁巳百官奉為應聖節於敬愛寺行香設齋宣教坊伎宴樂之宰臣樞密使以下咸進壽酒各賜錦衣召兩街僧道於中興殿講論閔帝以天祐十一年十一月二十八日庚申生於晉陽舊第末帝以光啓元年正月二十三日己卯生於平山清泰元年九月壬申宰臣李愚等奏臣覽國史開元十七年宰臣張説源乾曜奏改朔體元固聖主之能事良辰嘉會亦俗化之大端蓋周人有合宴之儀漢代有賜酺之律所以歌詠皇德啓迪人情至若泛菊高臺遂號重陽之節流杯曲水永為上巳之遊在昔偶行於今不改豈足比君臨四海運應千年畫璿圖而敬授民時秉玉燭而節宣和氣身為律度德合乾坤仰惟樞電之祥最是寰區之樂願從人欲特創節名封函尋示於允俞自此永編於令式舊章斯在列聖常行將有擬倫預慚膚淺伏惟皇帝陛下動遵典法克叶祖宗方今玉鏡高懸璿樞廣運告成功於朝社正大禮於宮闈是以舞干率服於三苗班瑞雍熙於萬國臣等以獻歲元正之月是猗蘭降聖之辰梅花映雪於上林椒酒迎春於祕殿江邊野老願鑾輅之時巡陌上遊童醉堯樽而獻祝謂於是月特舉節名副與人共樂之言致率土交歡之義臣等謹案玄宗皇帝以八月五日載誕張説等請以其日為千秋節臣等不揆庸暗輒體憲章請以來年正月降聖日為千春節從之二年正月乙巳中書門下奏遇千春節凡刑獄公事奏覆候次月施行今後請重繫者即俟次月輕繫者即誕聖節前奏覆決遣從之戊戌於佛寺供僧張樂甲子宴群臣於長春殿晉高祖以唐景福元年二月二十八日生於太原汾陽里時有白氣充庭天福元年十二月宰臣馮道等奏曰臣聞惟睿作聖千年乃契於貞期大德曰生萬國咸思於令節將詮懿號仰慶休辰傾心未出於常名近意有塵於嘉會伏惟皇帝陛下應天順人握圖御寓拯寰瀛於否極俾動植以泰來允符鳴社之祥方顯繞樞之瑞而況斗柄正卯律吹仲春當帝王出震之方是天地同和之月斯辰誕聖衆靈咸歸顧前代而罕同在舊章而宜舉垂諸不朽簡編既溢於徽猷必也正名稱謂須符於景貺伏願以來年二月二十八日為天和節庶夫觴稱萬壽稍申將順之心節配四時永洽好生之德從之二年二月辛亥天和節帝御長春殿召左右街僧録威儀入內談經十月兩浙錢元瓘進天和節大排方龍座金腰帶一御衣十二事三年二月乙巳天和節嶽牧玉帛皆至是日宴近臣於廣政殿召僧道講論各賜有差四年二月庚子以天和節宴群臣於廣政殿賜物有差臣欽若等曰五年事史臣不書六年二月戊午天和節宴群臣於廣政殿賜道釋紫衣師號並寺額十月福州進天和節銀一千兩七年二月壬子天和節帝御武德殿宰臣率文武百官上壽如儀退就佛寺行香宴樂而罷其年詔天下郡縣不得以天和節禁屠宰輒滯刑獄少帝以天祐十一年六月二十七日生於太原汾陽里天福七年六月即位八年六月宰臣馮道以誕辰率文武百官上表曰臣等聞大電繞樞哲后繼犧農之運五星聚井真人啓文景之基昌圖允洽於千年嘉號宜光於載誕不有稱述曷顯休明伏惟皇帝陛下玉律調元金華啓旦上帝錫九齡之夢遒人問下武之詩德協無為民知有慶當大雨時行之日乃常星不見之辰將歡寓縣之心竊效華封之祝臣等不勝大願望以六月二十七日為啓聖節著于甲令告彼萬方使地角天涯望南山而祝壽九州四海仰北極以傾心誠乖致主之功輒敢稱君之美從之漢高祖以唐乾寧二年二月四日生於太原以晉開運四年即位於太原宮復稱天福十二年是年八月文武百寮上表請以二月四日降誕日為聖壽節從之隱帝以唐長興二年三月九日生於鄴都之舊第乾祐元年十二月辛卯百寮上表曰色變長瀾肇皇靈之寶構光流華渚開聖緒於瑤圖莫不慶洽同文光昭大象刻玉波沿於鳳紀鳴金颷振於洪猷所以皓氣凝空編為令典神光燭夜允叶昌期皇帝陛下守位以仁繼明以德化敷有感慶洽無疆當九龍洽聖之辰是五緯聯光之夕凡蒙地載共祝天長皇帝三月九日誕聖請以其日為嘉慶節休假三日群臣宴樂上壽從之三年三月壬子嘉慶節群臣詣佛寺齋設祝壽三年三月丙子嘉慶節御廣政殿文武百寮上壽酒初舉樂將相大臣獻金寶鞍馬為壽禮畢群臣入相國寺齋設賜教坊樂周太祖以唐天祐甲子歲七月二十八日庚寅之夕生於堯山之舊宅載誕之夕赤光照室初有聲如爐炭之裂星火四迸母王氏懼戒使者曰勿外言廣順元年六月甲午宰臣率百官上表曰恭以少昊乘乾曳祥虹於華渚軒轅出震流瑞電於樞星所以玉牒表天地之禎金策纂皇王之異仰惟聖德允叶昌期伏惟聖帝陛下德輝三五道煥古今開階成周室之昌啓運得堯基之典豈可使方濁澄明之狀未顯洪名圖清燦爛之文不章懿號臣等傾誠紫禁都慶丹丘願隆百代之基冀正萬年之祚臣等請以七月二十八日皇帝降聖日為永壽節群臣上壽內外宴樂從之七月戊子永壽節帝御廣政殿百寮進酒上壽班退賜衣服分物有差群臣赴相國寺齋設二年四月癸丑敕永壽節每年諸道節度防禦團練等使刺史奏薦僧尼道士紫衣師號等今後見任節度使帶使相僧尼道士紫衣師號可共奏三人見任節度使不帶使相共二人見任防禦團練刺史等祗奏一人在朝文武臣寮及前任官今後更不得奏薦七月丙辰敕內外文武臣寮遇永壽節辰皆於寺觀起置道場便為齋供訪聞皆是率醵不唯牽費兼且勞煩念忠節以可嘉在誠抱而增愧所宜減損以便公私今後中書門下與文武百寮共設一齋樞密使與內諸司使副使等共設一齋侍衛親軍馬步都指揮使已下共設一齋其餘前任官員及諸司職掌並不得更請開置道場及設齋壬午永壽節群臣詣廣政殿上壽畢赴相國寺齋設宰臣學士內諸司使前任節度使防禦團練等士侍御諸軍都將刺史等賜衣各一襲三年七月京城居民朝緒等言以永壽節各於門首齋燃燈三晝夜從之乙巳永壽節太祖御永福殿群臣上壽賜將相大臣禁軍大將等衣有差群臣赴僧寺齋會世宗以唐天祐十八年九月二十四日丙午生於邢臺之別墅顯德元年七月壬辰文武百寮上表曰伏以壽丘降迹爰符出震之期里社應祥式契乘乾之運頃觀舊史抑有彝章幸當載誕之辰仰奉延洪之稱伏惟皇帝陛下道超九聖祚啓千齡紹文武之耿光比成康之迪哲自登天寶益顯聖功運龍韜而親御戎車仗金鉞而立平賊寇破幽並之妖孽救澤潞之生靈觀兵而直抵晉陽奮武而遠臨代北元凶假息雜虜摧鋒還京闕而契人心謁園陵而伸孝道飲至才踰於旬日覃恩已被於八方四塞關山漸息煙塵之警萬邦臣妾咸登仁壽之鄉今則候屬澄河時當降聖是甲觀懸弧之日乃銅律禦戶之時鰈水鸛林望堯雲而獻祝桓圭穀璧趨禹會以駿奔臣等叨遇休明俱塵祿位荷君父巍巍之德伸臣子慺慺之誠祗率典謨尊奉宸極臣等不勝大願謹以九月二十四日降誕日奉上節名為天清節所冀金相玉振貞寶曆以彌新地久天長煥青編而不朽從之九月乙未天清節帝御廣政殿宰臣率文武百寮上壽如儀頒賚有差二年九月己丑天清節帝御廣政殿文武百寮上壽三年九月癸丑天清節賜文武臣寮衣有差宰臣率百官詣廣政殿上壽如儀四年九月丁未天清節百辟上壽如儀賜內外臣寮衣有差五年九月壬子天清節賜文武臣寮衣有差既而詣廣德殿上壽江南進奉使商崇義代李景捧壽觴以獻既罷百官詣相國寺修齋恭帝以廣順三年八月四日生於澶州之府第顯德六年即位其年文武臣寮上表請以八月四日為天壽節從之
