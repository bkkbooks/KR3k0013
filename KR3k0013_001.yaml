八日王弟陳留王立是為獻帝母曰王美人在位三十一年年四十禪於魏魏文帝封為山陽公明帝青龍二年薨年五十四後漢自光武乙酉歲至獻帝庚子凡八代十四帝共一百九十六年魏太祖姓曹氏漢相參之後其先出於黃帝當高陽世陸終之子曰安是為曹姓周武王克殷存先世之後封曹快於邾春秋之世與於盟會逮至戰國為楚所滅子孫分流或家於沛漢祖之起曹參以功封平陽侯世襲爵土絶而復紹桓帝世曹騰為中常侍太長秋封費亭侯養子嵩嗣官至太尉莫能審其生出本末一云嵩夏侯氏之子惇之叔父太祖於惇為從父兄弟嵩生太祖仕漢為丞相封魏王建安二十五年薨年六十六太子嗣丞相位魏王其年受漢禪是為文帝母曰卞皇后在位七年年四十太子立是為明帝母曰文昭甄皇后在位十四年年三十六無子養子齊王為太子宮省事祕莫有知其所繇來者在位十五年為司馬景王所廢年二十三文帝孫東海定王子高貴鄉公立在位七年年二十太祖孫燕王宇子常道鄉公立在位七年年二十禪於晉武帝封為陳留王薨年五十六魏自文帝庚子歲至陳留王乙酉歲凡四代五帝四十六年晉宣帝河內溫縣孝敬里人姓司馬氏其先出自帝高陽之子重黎為夏官祝融歷唐虞夏商世序其職及周以夏官為司馬其後程伯休父周宣王時以世官克平徐方錫以官族因而為氏楚漢間司馬邛為趙將與諸侯伐秦秦亡立為殷王都河內漢以其地為郡子孫遂家焉自邛八世生征西將軍鈞字叔平鈞生豫州太守量字公度量生潁川太守雋字元異雋生京兆尹防字達公帝即防之第二子也仕魏為太傅都督中外諸軍録尚書事加相國封安平郡公固讓嘉平三年薨年七十三追諡宣帝世子以撫軍大將軍輔政母曰宣穆張皇后明年遷大將軍加侍中都督中外諸軍事録尚書事纍加相國固辭正元二年薨年四十八追諡景帝母弟繼為大將軍加侍中都督中外諸軍録尚書事輔政纍加相國封晉王咸熙二年薨年五十五追諡文帝世子嗣相國晉王位母曰文明皇后其年受魏禪是為武帝在位二十六年年五十五太子立是為惠帝母曰武元楊皇后在位十六年年四十八皇太弟武帝第二十五子立是為懷帝母曰王太妃在位七年年三十武帝孫吳孝王晏子出繼秦王立是為愍帝在位五年年十八為劉聰所害宣帝曾孫琅琊恭王覲之子立為晉王明年即皇帝位是為東晉元帝母曰夏侯太妃在位五年年四十七太子立是為明帝母曰豫章郡君荀氏在位三年年二十七太子立是為成帝母曰明穆庾皇后在位十七年年二十二母弟琅琊王立是為康帝在位二年年二十三太子立是為穆帝母曰康獻褚皇后在位十七年年十九成帝長子琅琊王立是為哀帝母曰章太妃在位四年年二十五母弟琅琊王立在位六年大司馬桓溫廢為海西縣公大元十一年薨年四十五元帝少子琅琊王立是為簡文帝母曰簡文宣鄭太后在位二年年五十三太子立是為孝武帝母曰孝武李太后在位二十四年年三十五太子立是為安帝母曰安德陳太后在位二十二年年三十七母弟大司馬琅琊王立是為恭帝在位二年禪於宋其年遇害年三十六晉自武帝乙酉歲至恭帝庚申凡七世十五帝一百五十六年後魏道武姓拓跋氏其先出自黃帝黃帝有子二十五人或內列諸華或外分一服昌意少子受封北土國有大鮮卑山因以為號其後世為君長統幽都之北廣漠之野畜牧遷徙射獵為業淳朴為俗簡易為化不為文字刻木紀契而已世事遠近人相傳授如史官之紀録焉黃帝以土德王北俗謂土為拓謂后為跋故以為氏其裔始均入仕堯世逐女魃於弱水之北民賴其勤帝舜嘉之命為田祖爰歷三代以及秦漢獯鬻獫狁山戎胸奴之屬纍代殘暴作害中州而始均之裔不交南夏是以載籍無聞焉積六十七世至成皇帝屯立聰明武略遠近所推統國三十六大姓九十九威振北方莫不率服其後有節帝貸莊帝觀明帝樓安帝越宣帝推寅於是南遷大澤方千餘里厥土昏冥洳沮又有景帝利元帝侯和帝肆定帝機僖帝蓋威帝儈獻帝鄰時有神人言於國曰此土荒遐未足以建都邑宜復徙居獻帝年時衰老乃以位授子聖武帝詰汾獻帝命令南移山谷高深九難八阻於是欲止有神獸其形似馬其聲類牛先行導引歷年乃出始居胸奴之故地其遷徙策略多出宣獻二帝故時人並號曰推寅蓋俗云鑽研之義初聖武帝嘗率數萬騎田於山澤欻見輜軿自天而下既至見美婦人侍衛甚盛帝異而問之對曰我天女也受命相偶遂同寢宿旦請還曰明年周時復會此處言終而別去如風雨及期帝至先所田處果復相見天女以所生男授帝曰此君之子也善養視之子孫相承當世為帝王語訖而去子即始祖神元力微也故時人諺云詰汾皇帝無婦家力微皇帝無舅家神元生而英睿元年歲在庚子先是西部內侵國民離散依於沒鹿回部大人竇賓始祖有雄傑之度時人莫測後與賓攻西部賓軍敗失馬步走始祖使人以所乘駿馬給之賓歸令其部內求與馬之人當加重賞始祖隱而不言久之賓乃知大驚將分國之半以奉始祖始祖不受乃進其愛女賓猶思報恩故問所欲始祖請率所部北居長川賓乃敬從積十數歲德威大治諸舊部民咸來歸服二十九年賓臨終戒其二子使謹奉始祖其子不從乃陰謀為逆始祖召殺之盡並其衆諸部大人悉皆款服控弦上馬二十餘萬三十九年遷於定襄之盛樂四月祭天諸部君長皆來助祭唯白部大人觀望不至於是徵而戮之遠近肅然莫不震懾始祖乃告諸大人曰我歷觀前世胸奴踏頓之徒茍貪財利抄掠邊民雖有所得而其死傷不足相補更招寇讎百姓塗炭非長計也於是與魏相親神元饗國五十八年年百四歲子章帝悉鹿立諸部離叛國內紛擾饗國九年弟平帝綽立雄武有謀略威德復舉饗國七年神元孫太子追諡文帝沙漠汗之子惠帝弗立聰哲大度為諸父兄所重政崇寬簡百姓懷服饗國一年神元子昭帝祿官立分國為三部帝自以一部居東在上谷北濡源之西東接宇文部以文帝之長子桓帝猗色統一部居代郡之參合陂北以桓帝弟穆帝猗盧統一部居定襄之盛樂故城自始祖以來興晉和好百姓乂安財畜富實控弦騎士四十餘萬昭帝統部十三年穆帝天資英特勇略過人遂總攝三部為一統三年白部大人叛入西河鐵木劉虎舉衆於鴈門應之攻晉新興鴈門三郡並州刺史劉琨來乞師帝使弟子平文皇帝率騎二萬助琨擊之大破白部次攻劉虎屠其營落虎收其餘燼西走渡河竄居朔方晉懷帝進帝大單于封代公帝以封邑去國懸遠民不相接乃從琨求句注陘北之地琨自以託附聞之大喜乃徙馬邑陰館樓煩繁畤崞五縣之民於陘南更立城邑盡獻其地東接代郡西連西河朔方方數百里帝乃徙十萬家以充之八年晉愍帝為代王置官屬食代恆山二郡帝饗國九年子晉根立月餘而薨晉根子始生桓帝后立之其冬晉根子又薨思帝子平文帝鬱律立姿質雄壯甚有威略元年歲在丁丑二年劉虎據朔方來侵西部帝逆擊大破之虎單騎迸走其從弟路孤率部落內附帝以女妻之西兼烏孫故地東吞勿吉以西控弦上馬將有百萬饗國五年桓帝中子惠帝賀傉立以五年為元年政事太后臨朝四年帝始臨朝以諸部人情未悉款順乃築城於東木狼山徙都之饗國五年弟煬帝紇那立五年出居於宇文部賀蘭及諸部大人共立平文帝長子翳槐是為烈帝三年石虎遣將李穆率騎五千納烈帝於大寧國人六千餘落叛煬帝煬帝出居於慕容部烈帝復位以三年為後元年城新盛樂城在城東南十里是年平文帝次子昭成帝什翼揵立帝生而奇偉寬仁大度喜怒不形于色身長八尺隆準龍顏立髮委地臥則乳垂至席烈帝顧命使弟彌自詣鄴奉迎即位於繁畤之北時年十九稱建國元年二年春始置百官分掌衆職三年春移都於雲中之盛樂宮饗國二十九年為苻堅所破國衆離散堅使劉庫仁劉衛辰攝國事七年堅敗于淮南慕容文等殺庫仁庫仁弟眷攝國事九年庫仁子顯殺眷而代之明年昭成嫡孫即位於牛川建元登國凡九年又改皇始凡二年又改天興是年即皇帝位改國號魏遷都平城是為道武皇帝父曰獻明皇帝母曰獻明賀皇后並追尊成帝已下及后號諡道武在位十四年年三十九長子相國大將軍齊王立是為明元帝母曰劉貴人在位十五年年三十二長子太平王監國是為太武帝母曰密杜皇后在位二十九年年四十五嫡孫立是為文成帝父曰景穆皇帝母曰宮閭皇后在位十四年年二十六太子立是為獻文帝母曰李貴人在位六年傳國於太子是為孝文帝年二十二孝文母曰李夫人在位二十九年改國姓曰元氏年三十三太子立是為宣武帝母曰高夫人在位十六年年三十三太子立是為孝明帝母曰胡充華在位十三年年十九孝文曾孫京兆王愈孫洮王寶暉子劉立為幼帝在位六十日為爾朱榮所害獻文孫彭城王協第三子立是為孝莊帝母曰李妃在位三年年二十四為爾朱兆所害爾朱世隆立太武玄孫長平王曄在位六十日廢之又立獻文之孫廣陵王羽之子是為前廢帝母曰王氏在位一年年二十五為高歡所害立章武王馳第三子是為後廢帝母曰程氏在位二年年二十遜位於孝文之孫廣平王懷第三子是為出帝母曰李氏遷都長安為宇文泰所鴆在位五年年二十五泰立孝文孫京兆王愈之子是為西魏文帝母曰楊氏在位十七年年四十五長子立是為廢帝母曰乙弗后在位三年弟立是為恭帝在位三年禪於後周後魏自丙申歲道武建國至恭帝丙子歲凡七代十八帝共一百六十一年後周太祖文帝姓宇文氏代郡武川人也其先出自炎帝神農氏為黃帝所滅子孫遁居朔野有葛烏菟者雄武多算略鮮卑慕之奉以為主遂總十二部落世為大人其後普回因狩得玉璽三紐有文曰皇帝璽普回異之以為天授其俗謂天曰宇因號宇文國並以為氏焉普回子莫那自陰山南徙始居遼西是曰獻侯為魏舅生之國九世至侯豆歸為慕容晃所滅其子陵仕燕拜附馬都尉封玄菟公魏道武將攻中山陵從慕容寶禦之寶敗率甲騎五百歸魏拜都牧主賜爵安定侯天興初徙豪傑於太都陵隨例遷武川焉陵生系系生韜並以武略稱韜生肱任俠有氣幹正光末沃野鎮人破六汗披陵作亂遠近多應之其偽署王衛可孤徒黨最盛肱乃紏合鄉里斬可孤其衆乃散後避地中山遂陷於鮮于修禮修禮令肱還統其部衆後為定州軍所破沒於陳武成初追尊曰德皇帝太祖德皇帝之子仕西魏為太師大冢宰大將軍封安定公恭帝三年薨世子嗣大將軍位其年受魏禪即天王位是為孝閔帝追尊太祖為文王武成初追尊文皇帝孝閔母曰文皇后在位二百七十日為宇文護所廢太祖長子大將軍寧都郡公立是為明帝母曰姚夫人即天王位四年年二十七太祖第四子大將軍魯國公立是為武帝母曰叱奴太后即皇帝位十八年年三十六太子立是為宣帝母曰李太后在位二年傳位于太子是為靜帝宣帝自稱太上皇年二十二靜帝母曰朱皇后在位二年禪于隋後周自閔帝丁丑歲建國至靜帝辛丑凡三代五帝二十五年隋高祖文帝姓楊氏弘農華陰人漢太尉震八代孫鉉仕燕為北平太守鉉生元壽後魏代為武川鎮司馬子孫因家焉元壽生太原太守惠蝦惠蝦生平原太守烈烈生寧遠將軍禎禎生太司空隋國公忠從周太祖起義關西賜姓普六茹氏開皇初追諡武元皇帝忠生高祖受周禪即皇帝位復姓楊氏母曰呂皇后在位二十四年年六十四太子立是為煬帝母曰獨孤皇后在位十四年唐高祖立帝之孫元德太子昭之子是為恭帝母曰韋妃在位二年禪于唐封為酅國公明年薨年十五隋自高帝己酉建國至恭帝戊寅凡三代三帝三十八年唐高祖神堯帝姓李氏隴西狄道人其先出自顓頊顓頊生太業太業生女華女華生咎繇其子孫綿歷虞夏代為理官遂為理氏殷末有理徵者直道不容獲罪於紂子利貞逃難於伊侯之墟食李實得全又改理為李氏周時有李氏虔者生子曰重耳字伯陽周柱下史道家稱老君秦將李信即其後也信曾孫廣為漢將前軍自此後代為牧守廣十六葉孫李皓是為涼武昭王薨子歆嗣位為沮渠蒙遜所滅歆子重耳奔於江南仕宋為汝南郡守復歸於魏拜弘農太守贈豫州刺史生熙起家金門鎮將後以良家子鎮於武川都督軍戎百姓之務終於位因遂家焉生天錫仕魏為幢主大統時追贈司空公生太祖景皇帝虎少倜儻有大志好讀書而不存章句尤善射輕財重義雅尚名節深為太保賀拔嶽所重元皓之入雒也從嶽擊平之以功封晉壽縣開國子食邑三百戶拜寧朔將軍屯騎校尉復興嶽破万俟醜奴留鎮隴西纍遷東雍州刺史尋轉衛將軍賀拔嶽既鎮隴右以太祖為左相大都督委以內外軍事嶽尋為侯莫陳悅所害太祖哭之甚慟陰懷復讎之志時嶽兄勝在荊州太祖星夜赴告勸勝入關收嶽之衆勝不能從俄而周文帝起兵圖悅太祖聞之自荊州還至閿鄉為高歡將所獲送詣雒陽魏武帝將收關右見太祖甚喜拜為衛將軍賜以金帛鎮關中同與周文帝平侯莫陳悅遇高歡入雒太祖帥師迎魏武帝於潼關以功拜驍騎將軍加儀同三司遇靈州刺史曹泥擁兵作亂太祖率兵擊之時有破野頭賊屯聚塞下太祖遣使諭之皆來降服遂徵其衆並力攻泥四旬而剋靈州平會阿至羅部落別道斷其歸路太祖親率驍鋭襲擊大破之悉虜其衆進封長安縣侯食邑五百戶太祖不受讓於兄子康生周文帝許之後從文帝破高歡於沙苑斬級居多有賊帥梁企定據河州作亂太祖以本官兼尚書左僕射為隴右行臺總兵以擊之部將烏軍長命潛與企定相連陰圖不軌太祖斬之以令三軍賊聞而大懼不敢戰遁走河北太祖將濟師於河企定率衆降獲男女數萬口以實三輔進位開府儀同三司餘如故南岐州兵楊盆生馬僧等聚衆反與梁漢中相影響太祖以還師便道擊之軍大散遣人諭以禍福盆生遣使偽降太祖察知其懷詐因令軍曰賊既降可休士放馬以俟還期遣其使反盆生大喜遂不為備放兵於外營求糧食太祖因而趨之天將曉圍城已合外兵不得還城中大擾因令壯士排闥而入無敢動者軍令嚴肅秋毫不犯於是安輯其衆留別人鎮守俘盆生以歸周文帝嘉歎之遣使勞問尋授岐州刺史遇莫折後熾寇秦州太祖又討之軍臨賊境後熾懼而降歸收其精卒數千人會丁母憂哀毀過禮及葬特給轀輬車太祖因廬於墓側負土成墳優詔起令視事嘗與周文帝閲武於北山下時有人為豹所噬無敢救者太祖不暇持杖趨往捉豹殺之周文帝大悅曰公之名虎信不虛也後徙封趙郡公歷渭秦二州刺史復擊叛胡平之徙封隴西公進拜太尉遷右軍大都督柱國大將軍少師周受魏禪録佐命功居第一追封唐國公生世祖元皇帝昺世祖性至孝沉深有識量少為周文帝所禮在位十七年封汝陽縣伯食邑五百戶尋拜撫軍大將軍大都督通直散騎常侍俄轉車騎大將軍襲封隴西公遷驃騎大將軍開府儀同三司侍中周受禪襲封唐國公拜御中正大夫歷鄜州刺史安州總管為政簡靜甚獲當時之譽尋遷柱國大將軍贈少保同華等八州刺史高祖即元皇帝之世子母曰元貞皇后七歲襲封唐國公義寧二年受隋禪即皇帝位在位九年傳位於皇太子是為太宗年七十太宗母曰竇皇后在位二十三年年五十七太子立是為高宗母曰文德長孫皇后在位三十四年年五十六太子立三十六日母武太后廢為廬陵王立次子相王六年又降為皇嗣賜姓武氏太后遂革命稱周凡十五年復以廬陵王為太子尋即皇帝位是為中宗在位六年年五十五太子立是為少帝母韋庶人臨朝凡十七日相王第三子臨淄王隆基平韋氏亂奉相王即皇帝位是為睿宗在位三年年五十九太子立是為玄宗母曰昭成竇皇后在位四十四年傳位於太子是為肅宗玄宗稱太上皇年七十八肅宗母曰元獻楊皇后在位七年年五十二太子立是為代宗母曰章敬吳皇后在位十七年年五十四太子立是為德宗母曰睿貞沈太后在位二十六年年六十四太子立是為順宗母曰昭德王皇后在位百八十日傳位于太子是為憲宗順宗稱太上皇年四十六憲宗母曰莊憲王太后在位十五年年四十三太子立是為穆宗母曰懿安郭太皇后在位四年年三十太子立是為敬宗母曰恭僖王太皇在位二年年十八弟穆宗第二子江王立是為文宗母曰貞獻蕭皇后在位十四年年三十二弟穆宗第五子穎王立是為武宗母曰宣懿韋皇后在位四年年三十二憲宗第十三子皇太叔立是為宣宗母曰孝明鄭皇后在位十三年年五十太子立是為懿宗母曰元昭朝太后在位十四年年四十一太子立是為僖宗母曰惠安王皇后在位十五年年二十七母弟立是為昭宗在位十六年年三十八第九子輝王立是為哀帝母曰積善何太后在位四年禪于梁梁封為濟陰王明年薨年十七唐自高祖戊寅歲建國至哀帝丁卯凡五代二十帝通武后革命共二百九十年後唐太祖武帝本姓朱耶氏其先隴右金城人也始祖拔野唐貞觀中為墨離軍使從太宗討高麗薛延阤有功為金方道副都護因家於瓜州太宗平薛延阤諸部於安西北庭置都護以屬之分同羅僕骨之人置沙阤都督府蓋北庭有磧曰沙阤故因以為名焉永徽中以拔野為都督其後子孫五世相承曾祖盡忠貞元中繼為沙阤府都督既而為吐蕃所陷乃舉其族七千帳徙於甘州盡忠尋率部衆三萬東奔俄而吐蕃追兵大至盡忠戰沒祖執宜即盡忠之長子也收合餘衆至於靈州德宗命為陰山府都督元和初入為金吾將軍遷蔚州刺史代北行營招撫使莊宗即位追諡為昭烈皇帝廟號懿祖烈考國昌本名赤心仕唐朔州刺史咸通中討龐勛有功入為金吾上將軍賜姓李氏名國昌仍係鄭王一房出為振武節度使尋為吐蕃所襲退保於神武川及武皇鎮太原表為代北軍節度使中和三年薨莊宗即位追諡為文皇帝廟號獻祖太祖即獻祖之第三子也母曰秦氏仕唐為河東節度使纍封晉王天祐四年唐哀帝已禪于梁改元開平而太祖猶稱天祐至五年薨年五十三長子嗣晉王位是為莊宗同光初追諡為武皇帝廟號太祖莊宗母曰貞簡曹皇后天祐二十年即皇帝位於鄴都其年平梁在位四年年四十三蕃漢馬步總管李嗣源為三軍所立百寮勸進是為明宗明宗北代人生於應州之金城縣世事太祖及其賜姓也遂編入屬籍四代祖聿贈麟州刺史天成初追尊為孝恭皇帝廟號惠祖曾祖敖贈朔州刺史追尊為孝質皇帝廟號毅祖祖琰贈蔚州刺史追尊為孝靖皇帝廟號烈祖考霓贈汾州刺史追尊為孝成皇帝初孝成事獻祖為愛將獻祖之失振武為吐渾所攻部下離散孝成獨奮忠義解蔚州之圍明宗即孝成之元子母曰劉氏追尊孝成懿皇后在位八年年六十七第三子宋王立是為愍帝母曰昭懿皇后在位百五十日出奔於衛州太后令降為鄂王薨年二十一明宗養子潞王立是為末帝姓王氏鎮州人母曰宣憲魏皇后在位三年年五十三晉高祖入雒自焚後唐自莊宗癸未歲建國至末帝丙申凡三代四主十四年晉高祖姓石氏北京晉陽人也本衛大夫碏之後至漢奮自河內徙家長安與子慶等德位俱盛時號萬石君漢衰關輔亂子孫流徙西裔有居甘州者四代祖璟以唐元和中與沙陀軍都督朱耶氏靈武入附憲宗嘉之隸為河東陰山府校以邊功纍官至朔州刺史天福二年追尊孝安皇帝廟號靖祖三代祖郴早薨贈右散騎常侍追尊孝簡皇帝廟號肅祖祖昱任振武防禦使贈尚書右僕射追尊孝平皇帝廟號睿祖考紹雍蕃字曰臬捩雞善騎射有經遠大略始從後唐太祖平定巢賊及事莊宗拒梁人戰上黨柏仁討薊門劉守光有功功與周德威相亞德威鎮薊莊宗承制授平州刺史行事多抗於德威德威憚其名嘗以禮下之俄改洺州刺史薨於任贈太傅追尊孝元皇帝廟號憲祖高祖即憲祖第二子也母曰何氏追諡孝元懿皇后高祖事後唐尚明宗女永寧公主為河東節度使兼中書令封趙國公清泰三年契丹酋長耶律氏至太原册立為大晉皇帝是年入雒在位七年年五十一從子齊王立是為少帝父曰敬儒為莊宗騎將早薨母曰安太妃在位五年為耶律氏所陷晉自唐祖丙申歲建國至少帝丙午凡二代二主十一年漢高祖姓劉氏其先本沙阤部人也四代祖湍追尊為明元皇帝廟號文祖曾祖昂贈太保追尊為恭僖皇帝廟號德祖祖僎贈太傅追尊為昭獻皇帝廟號翼祖考琠事後唐武皇為列校贈太師追尊為章聖皇帝廟號顯祖高祖即顯祖之子母曰安氏追諡章懿皇后高祖仕晉為河東節度使太尉兼中書令封北平王開運四年正月晉少主為耶律氏所陷二月高祖即皇帝位于太原稱天福十二年五月至東京在位二年年五十四第二子周王立是為隱帝母曰李太后在位三年禪於周漢自高祖丁未歲建國至庚戌凡二代二主共四年周太祖姓郭氏邢州堯山人或云本常氏子幼隨母適郭氏故冒其姓高祖璟廣順初追尊為睿和皇帝廟號信祖曾祖諶贈太保追尊為明憲皇帝廟號僖祖祖蘊贈太傅追尊為翼順皇帝廟號義祖考簡贈太師追尊為章肅皇帝廟號慶祖初唐咸通中代北徐方用兵伐叛信祖僖祖從戎師接戰以勇敢知名義祖事後唐武皇為帳中親信乾寧中從征澤潞邢雒纍授河內馬步軍都虞侯武皇平安敬思再定邢雒移授邢之軍職因卜居堯山縣武皇經啓霸圖觀兵大鹵劉仁恭陸梁燕薊窺伺中原梁氏蠶食兩河尋戈不息慶祖為武皇內牙愛將專掌親軍指麾所行無不景從攻城野戰勇爵崇高天復中武皇兵出居庸山北剋捷以慶祖為順州刺史太祖即慶祖之子母曰王氏追諡章德皇后太祖仕漢為樞密使兼侍中乾祐四年受漢禪在位四年年五十一養子開封尹晉王立是為世宗本姓柴氏蓋太祖聖穆皇后之姪在位六年年三十九子梁王立是為恭帝在位一年禪於大宋周自太祖辛亥歲建國至恭帝庚申凡三代三主共十年
