front:
  text: 總序總序昔雒出書九章聖人則之以為世大法其初一曰五行一曰水二曰火三曰木四曰金五曰土帝王之起必承其王氣大古之世鴻荒朴略不可得而詳焉庖犧氏之王天下也繼天之統為百王先實承木德以建大號三墳所紀允居其首蓋五精之運以相生為德木生火火生土土生金金生水水生木乘時迭王以昭統緒故創業受命之主必推本乎曆數參考乎徵應稽其行次上承天統春秋之大居正貴其體元而建極也前志之論閏位謂其非次而不當也共工氏任智刑以御九域霸而不王雖承太昊之後而不齒五德之序神農氏以火承木故為炎帝軒轅有土德之瑞故號黃帝少昊以金德王故號曰金天氏顓頊以水德王號曰高陽氏帝嚳以木德王號曰高辛氏帝堯以火德王號曰陶唐氏帝舜以土德王號曰有虞氏繇虞氏以上皆承運更起應期正位參列五辰之次而克當統紀至於正朔服色之改度戎祀朝會之所尚記籍斯逸罕得而述焉夏后氏受有虞之禪是謂金德正用建寅其色尚黑商湯代夏以水德王正用建丑其色尚白周武以木德王正用建子其色尚赤三代之際各居一統錯綜其數以通其變順三微之序極三才之致咸享祚長久蓋得夫天曆之正也三季之衰秦兼天下獨推五勝不當正統漢祖以斷蛇之符上系成周是為火德起自沛中旗幟皆赤至文帝時魯人公孫臣推終始之傳謂漢承秦當用土德土德之應黃龍當見宜改正朔服色尚黃時丞相張蒼引河決金隄以為漢當水德以十月為正其色外黑內赤遂罷公孫臣之議明年黃龍見成紀乃用土行改曆服色而賈誼亦以為然孝武正曆以正月為歲首色尚黃數用五蓋以秦為水德據漢土而克之從所不勝遂順黃德劉向父子以為帝出乎震故庖犧氏姓受木德以母傳子終而復始自農軒歷唐虞三代漢得火行上合天統當時雖建厥議未克遵行世祖中興乃用其説魏氏始基有黃星之應又太史丞許芝言戊寅黃龍見此受命之符最著明者也又易運期讖有黃氣授真人出之言又太微中黃帝坐常明赤帝坐常不見以為黃家興而赤家衰亡之漸又熒惑失色十有餘年蘇林董巴等又言魏之氏族出自顓頊與舜同祖舜以土德承堯之火今魏亦以土德承漢之火於行運合於堯舜授受之次既而受漢禪改元黃初議更正朔易服色殊徽號同律度量以乘土行以夏數為得天即用夏正而服色尚黃然尚循漢正朔弗之改也明帝在東宮著論以為五帝三王雖同氣共祖祖不相襲正朔自宜改變以明受命之運即位久之從高堂隆之議乃推三統之次以魏得地統遂用建丑之月為正月服色尚青犧牲用白戎事乘黑首白馬建大赤之旗朝會建大白之旗齊王嗣位以夏正得天改用建寅為正月晉武泰始二年有司舉唐堯舜禹不易祚改制至於湯武始推行數今晉繼三皇舜禹之迹應天受禪宜用前代正朔服色如虞遵唐故事而史臣之記晉為金行服色尚赤後魏道武天興初始詔有司議定行次有司曰國家繼黃帝之後宜為土德有土畜之瑞及黃星之符遂從土德服色尚黃數用五犧牲用白行夏之正孝文太和中下詔以丘澤初制配尚宜定五德相襲論有異常帝令百辟集議高閭以為漢用火德徵斬蛇之符上繼於周棄秦之暴越惡承善不以世次為正自時厥後乃以為常魏承漢火生土故魏為土德晉承魏土生金故晉為金德趙承晉金生水故趙為水德燕承趙水生木故燕為木德秦承燕木生火故秦為火德今魏宜承秦為土德李彪崔光等以為宜紹晉金德不當次於僭偽建議各殊稱年不定既而穆亮等大臣共議宜上承晉世定為水德孝文下詔特從其説後周革命有赤雀之祥群臣奏議請更正朔定為木行以承水德服色尚烏隋文受禪次用火德以有赤光之瑞車服旌旗悉皆尚赤而帝服戎服悉皆以黃唐氏承統盛德在土至開元中有請改為金德者終報罷之天寶中令諸衛緋色幡改為赤黃色以應土德朱梁建國如秦之暴雖宅中夏不當正位同光纘服再承絶緒晉承唐後是為金德漢氏承晉實當水行周祖即位之初有司定為木德自伏羲氏以木王終始之傳循環五周至於皇朝以炎靈受命赤精應讖乘火德而王混一區夏宅土中而臨萬國得天統之正序矣凡帝王部一百二十八門帝系夫結繩之初朴略茫昧莫獲而詳書契之後辨姓授氏可得而記太昊之前譜牒蓋闕帝鴻之後世緒具存司馬遷著之史記以存系表明乎受天命膺帝期者蓋以祖宗實有茂德所以後世承乎發祥若乃后稷播植周室於是隆興唐堯文思漢緒繇其增盛蓋瓜瓞之相屬故蘿圖而有融魏晉以還方册可考罔不緬藉先烈誕啓丕圖若乃纍積之懿傳繼之盛蓋繇德有厚薄源有淺深憑舊烈者蕃衍無世資者衰替今並考舊史披帝籙詳究初終率用論次俾有條而不紊庶百世而可知矣太昊庖犧氏風姓母曰華胥作網罟以畋漁取犧牲故天下號曰庖犧氏一云取犧牲以充庖廚故曰庖犧氏是為犧皇後世音謬謂之伏犧或謂之宓犧一號皇雄氏繼天而王故曰帝太昊庖犧氏沒女媧氏立為女皇一云女帝亦風姓承庖犧制度女媧氏沒次有大庭氏柏皇氏中央氏栗陸氏驪連氏赫胥氏尊盧氏渾沌氏昊英氏有巢氏朱襄氏葛天氏陰康氏無懷氏凡十五世皆襲庖犧之號炎帝神農氏薑姓母曰任巳有蟜氏女為少典妃生帝以火承木故為炎帝一云南方生夏教民耕農故天下號曰神農氏一云農皇或云帝炎本起烈山氏或稱之一號魁隗氏納奔水氏女曰聽談生帝臨魁次帝承次帝明次帝直次帝釐次帝裏次帝榆罔自炎帝至榆罔凡八世黃帝軒轅氏少典之子有熊國君少典之子姓公孫一云姬姓母曰附寶居軒轅之丘因以為名一云有軒冕之服故天下號曰軒轅氏有土德之瑞故號黃帝一號帝鴻氏亦曰歸藏氏在位百年年百一十歲或云壽三百歲少昊金天氏黃帝之子黃帝娶西陵之女是為嫘祖一作俎為正妃生二子其一曰玄囂是為青陽降居江水即少昊也邑于窮桑以登帝位故謂之窮桑帝以金承土故天下號曰金天氏金主西方秋故曰少昊在位百年一云八十四年顓頊高陽氏姬姓黃帝之孫昌意之子昌意娶蜀山氏女曰昌僕謂之女樞生帝以水承金天下號曰高陽氏在位七十八年年九十八歲帝嚳高辛氏姬姓黃帝之曾孫父曰蟜極蟜極父曰玄囂帝於顓頊為族子其母不見以水承木天下號曰高辛氏在位七十五年年五百歲一云生十五而佐顓頊三十登帝位帝堯陶唐氏伊祁姓帝嚳之子帝嚳娶陳鋒氏生放勛娵訾氏生摯一云帝嚳納四妃有台氏女曰薑嫄生后稷次有娀氏女曰簡狄生契次陳鋒氏女曰慶都生放勛次娵訾氏女生摯摯於兄弟最長即位封放勛為唐侯摯在位一年而放勛立是為堯帝以火承木天下號曰陶唐氏在位九十八年年百一十八歲帝舜有虞氏姚姓父曰瞽叟瞽叟父曰橋牛橋牛父曰句望句望父曰敬康敬康父曰窮蟬窮蟬父曰帝顓頊顓頊父曰昌意以至舜七世矣自窮蟬以至帝舜皆微為庶人堯禪舜以天下以土承火天下號曰有虞氏始舜生三十徵庸言其始見試用三十在位歷試二年攝政二十八年五十載陟方乃死方道也舜即位五十年升道南方巡狩死於蒼梧之野而葬焉年百一十二歲通服堯喪三年也一云舜年二十以孝聞年三十堯舉之年五十稱行天子事年六十一代堯踐帝位三十九年年百歲禹夏后氏姒姓父曰鯀鯀之父曰帝顓頊顓頊之父曰昌意昌意之父曰黃帝禹者黃帝之玄孫而帝顓頊之孫也禹之曾太父昌意及父鯀皆不得在帝位為人臣舜禪禹以天下以金承土天下號曰夏后氏禹年八十六攝行天子事五年年九十餘舜喪明年即真年百歲禹娶塗山氏之女生啓在位九年啓生太康在位二十九年太康弟仲康在位十三年仲康生相一名相安在位二十八年相遺腹子母有仍氏之女生少康在位二十一年少康生寧一作杼又作季杼或曰松曼在位十七年寧生槐一作莽一作魁或曰祖武在位二十六年槐生芒一云荒和或曰帝荒在位十八年芒生泄一云泄宗在位十六年泄生不降或曰江戊在位五十九年不降弟扄一作扄又作昺或曰高陽在位二十一年扄生廑一作廛或曰廑江在位二十年不降生孔甲在位三十一年孔甲生皋一名皋苗在位十一年皋生發一名后或曰發惠在位十一年發生履癸是為桀諡法賊人多殺曰桀在位五十三年為湯所滅禹自戊戌歲建國盡己酉十五代十七王通羿浞四百三十二年殷湯子姓其先契母曰簡狄有娀氏之女有娀在不周之北為帝嚳次妃三人行浴見玄鳥墮其卵簡狄取吞之因孕生契契長而佐禹治水有功帝舜乃命契曰百姓不親五品不遜汝為司徒敬敷五教在寬封於商商今在雒商是也賜姓子氏祖以玄鳥生子也契興於唐虞大禹之際功業著於百姓百姓以平契生昭明昭明生相土相土就契封於商一云閼伯居商丘相土因之相土生昌若一云景若昌若生曹圉一云根圍曹圉生冥冥為司空勤其官事死於水中殷人郊之冥生振振生微微生報丁報丁生報乙報乙生報丙報丙生主壬主壬生主癸主癸之妃曰扶都生天乙以乙曰主是為成湯自契至湯十四世湯踐天子位十三年年百歲太子太丁未立而卒於是乃立太丁之弟外丙在位三年外丙弟仲壬在位四年仲壬兄太丁之子太甲在位十四年年百歲太甲生沃丁在位三十年一云二十九年沃丁生太康在位二十五年太康生小甲一云弟在位十七年一云三十年小甲弟雍己在位十二年雍己弟太戊在位一十五年太戊生仲丁在位十一年一云十二年仲丁弟外壬在位十五年外壬弟河亶甲在位九年河亶甲生祖乙在位十九年祖乙生祖辛在位十六年祖辛弟沃甲一云開甲在位二十五年沃甲兄祖辛之子祖丁在位三十二年祖丁弟沃甲之子南庚在位二十九年祖丁之子陽甲在位有七年陽甲弟盤庚在位二十八年盤庚弟小辛在位二十一年小辛弟小乙在位二十年一云二十一年小乙生武丁在位五十九年年百歲武丁生祖庚在位七年祖庚弟祖甲在位三十三年祖甲生廩辛一云馮辛在位六年廩辛弟庚丁在位二十一年庚丁生武乙在位四年武乙生太丁一名文丁在位三年太丁生帝乙在位三十七年帝乙生受辛天下謂之紂諡法殘義損善曰紂在位三十二年湯自乙未歲建國盡戊寅子孫十七代三十王共六百四十五年周文王姬姓其先后稷名棄其母有邰氏女曰薑嫄薑姓嫄字或曰諡號薑嫄為帝嚳元妃薑嫄出野見巨人迹心欣然説欲踐之踐之而身動如孕者居期而生子以為不祥棄之隘巷馬牛過者皆辟不踐徙置之林中適會山林多人遷之而棄渠中冰上飛鳥以其翼覆薦之薑嫄以為神遂收養之初欲棄之因名曰棄棄為兒時忔如巨人之志其遊戲好種樹麻菽麥及為成人遂好耕農相地之宜宜穀者稼穡焉民皆法則之帝堯聞之舉棄為農師天下得其利有功帝舜曰棄黎民始飢一云祖飢祖始也爾后稷播時百穀封棄於邰今釐鄉在扶風號曰后稷別姓姬氏后稷之興在陶唐虞夏之際皆有令德后稷生不窋不窋末年夏后氏政衰去稷不務而不窋以失其官而奔戎狄不窋生鞠鞠生公劉公劉雖在戎狄之間復修后稷之業務耕種行地宜自漆沮渡渭取財用行者有資居者有畜積民賴其慶百姓懷之多徙而保歸焉周道之興自此始故詩人歌樂思其德公劉卒慶節立國於豳新平漆縣之東北有豳亭慶節生皇僕皇僕生薑弗薑弗生毀隃一作體隃毀隃生公非公非生高圉高圉能率稷者也周人報之高圉生亞圉亞圉生公叔祖類公叔祖類生古公亶父復修后稷公劉之業積德行