body:
  text: 創業二創業二晉宣帝司馬氏後漢京兆尹防之子臣欽若等曰自防以下事跡具帝王帝系門建安中魏太祖為漢丞相辟文學掾轉東曹屬又轉為主簿從討張魯又從征孫權破之魏國建遷太子中庶子文帝即王位以帝為丞相長史封河津亭侯及魏受漢禪以帝為尚書黃初二年遷侍中尚書右僕射文帝疾篤帝與曹真等竝受顧命輔政明帝即位改封舞陽侯孫權圍江夏遣其將諸葛瑾張霸竝攻襄陽帝督諸軍討權走之進擊敗瑾斬霸竝首級千餘遷驃騎將軍太和元年蜀降將孟達領新城太守連吳固蜀潛圖中國帝發書喻之達猶豫不決帝潛軍進討倍道兼行八日到其城下八道攻之旬有六日達甥鄧賢將李輔等開門出降遂斬達首傳京師四年加大將軍大都督假黃鉞與曹真伐蜀帝自西城斫山開道水陸竝進泝沔而上至于朐䏰朐音蠢䏰音如允反地名拔其新豐縣軍次丹口遇雨班師五年蜀將諸葛亮寇天水乃使帝西屯長安都督雍梁二州諸軍事統車騎將軍張邰後將軍費曜征蜀進次漢陽與亮相遇亮退追至祁山亮屯鹵城據南北二山斷水為重圍帝攻拔其圍亮宵遁追擊破之俘斬萬計青龍二年亮又率衆十餘萬出斜谷壘于郿之渭水南原天子遣征蜀護軍秦朗督步騎二萬受帝節度帝與亮會于積石臨原而戰亮不得進還于五丈原帝遣奇兵犄亮之後斬五百餘級獲生口千餘降者六百人會亮死其部將楊儀魏延爭權儀斬延竝其衆帝欲乘隙而進有詔不許三年遷太尉蜀將馬岱入寇帝遣將軍牛金擊走之景初二年率胡遵等步騎四萬伐公孫文懿于遼東與賊營相逼會霖潦大水平地數尺三軍恐欲移營帝令軍中敢有言徙者斬都督令史張靜犯令斬之軍中乃定尋戰而克之明帝末與大將軍曹爽並受遺詔輔少主齊王即帝位遷帝侍中持節都督中外諸軍録尚書事與大將軍曹爽各統兵三千人共執朝政爽欲使尚書奏事先繇己乃言於天子徙帝為大司馬朝議以為前後大司馬纍薨於位乃加太傅入殿不趨贊拜不名劍履上殿正始二年吳人入寇帝督諸軍南征車駕送出津陽門帝以南方暑濕不宜持久使輕騎挑之然不敢動於是休戰士簡精鋭募先登申號令示必攻之勢吳軍夜遁走追至三洲口斬獲萬餘人收其舟船軍資而還天子遣侍中常侍勞軍于宛嘉平元年正月天子謁高陵爽兄弟皆從是日太白襲月帝乃奏永寧太后廢爽兄弟有司劾黃門張當竝發爽與何晏等反事乃收爽兄弟及其黨誅之二月天子以帝為丞相三年八月薨長子師次子昭繼為大將軍輔政晉國建追尊宣王武帝受禪追尊號曰宣皇帝景帝宣帝長子魏景初中拜散騎常侍纍遷中護軍宣帝之誅曹爽也深謀祕策與帝潛畫初帝陰養死士三千散在人間至是一朝而集衆莫知其所出事平以功封長平鄉侯加衛將軍及宣帝薨議者咸云伊尹既卒伊陟嗣事天子命帝以撫軍大將軍輔政嘉平四年遷大將軍加侍中持節都督中外諸軍録尚書事命百官舉賢良明少長恤窮獨理廢滯四海傾注朝野肅然或有請改易制度者帝曰不識不知順帝之則詩人之美也三祖典制所宜遵奉自非軍事不得妄有改革五年五月吳太傅諸葛恪圍新城帝使鎮東將軍毋丘儉揚州刺史文欽等距破之正元元年正月天子與中書令李豐后父光祿大夫張緝黃門監蘇鑠永寧署令樂敦冗從僕射劉寶賢等謀以太常夏侯玄代帝輔政帝密知之使舍人王羡以車迎豐豐見迫隨羡而至帝數之豐知禍及因肆惡言帝怒遣勇士以刀鐶築殺之逮捕玄緝等皆夷三族三月乃諷天子廢皇后張氏天子以玄緝之誅深不自安而帝亦慮難作潛謀廢立乃密諷永寧太后下令廢天子為齊王遣使迎高貴鄉公於元城立之公以帝為相國增邑至四萬戶帝固辭相國二年正月毋丘儉文欽舉兵作亂矯太后令移檄郡國為壇盟於西門之外各遣子四人質於吳以請救二月儉欽帥衆六萬渡淮而西帝會公卿謀征討計朝議多謂可遣諸將擊之太常王肅及尚書傅嘏中書侍郎鍾會勸帝自行帝統中軍步騎十餘萬以征之倍道兼行召三方兵大會于陳許之郊斬儉傳首京師欽遂奔吳淮南平閏月帝疾篤使弟昭總統諸軍晉國既建追尊景王武帝受禪上尊號曰景皇帝文帝景帝母弟魏景初三年封新城侯正始初為雒陽典農中郎將轉散騎常侍大將軍曹爽伐蜀以帝為征蜀將軍副夏侯玄出駱谷次于興平勸玄旋軍以為後圖還拜議郎蜀將姜維寇隴右征西將軍郭淮自長安距之以帝為安西將軍持節屯關中為諸軍節度淮攻維別將句安於趜久而不決帝乃進據長城南趣駱谷以疑之維懼退保南鄭安軍絶援率衆來降轉安東將軍持節鎮許昌及大軍討王陵帝督淮北諸軍事帥師會于項假金印紫綬蜀將姜維又寇隴右揚聲欲攻狄道以帝行征西將軍次長安維燒營而去會新平羌胡叛帝擊破之遂耀兵靈州北虜震讋叛者悉降高貴鄉公立以參定策進封高都侯毋丘儉文欽之亂大軍東征帝兼中領軍留鎮雒陽及景帝疾篤帝自京都省疾拜衛將軍景帝薨天子命帝鎮許昌尚書傅嘏帥六軍還京師帝用嘏及鍾會策自帥軍而還至雒陽進位大將軍加侍中都督中外諸軍録尚書事輔政劍履上殿帝固辭不受甘露元年正月加大都督六月進封高都公地方七百里加之九錫又固辭不受二年五月鎮東大將軍諸葛誕殺揚州刺史樂綝以淮南作亂遣子靚為質於吳以請救七月帝奉天子及皇太后東征徵兵青徐荊豫分取關中遊軍皆會淮北師次於項又進軍丘頭吳使文欽等將三萬人救誕三年正月誕欽等出攻長圍諸軍逆擊走之初誕欽內不相協會欽計事與忤誕手刃殺欽欽子鴦攻誕不克帝使諸將攻而拔之斬誕夷三族四月歸京師天子命改丘頭曰武丘以旌武功五月進封晉公加九錫進位相國帝九讓乃止景元元年四月天子以帝三世宰輔政非己出情不能安又慮廢辱將臨軒召百僚而行放黜五月戊子夜使冗從僕射李昭等發甲於凌雲臺召侍中王沉散騎常侍王業尚書王經出懷中黃素詔示之戒嚴俟旦沉業等馳告於帝帝召護軍賈充為之備天子知事泄帥左右攻相府稱有所討太子舍人成濟抽戈犯蹕帝斬濟夷其三族與公卿議立常道鄉公為帝四年天子乃申前命以太原等十郡封帝為晉公加九錫遣征西將軍鄧艾伐蜀於是徵四方之兵十八萬使艾自狄道攻姜維於沓中雍州刺史諸葛緒自祁山軍於武街絶維歸路鎮西將軍鍾會帥前將軍李輔征蜀護軍胡烈等自駱谷襲漢中艾帥萬餘人自陰平踰絶險至江油破蜀將諸葛瞻於綿竹進軍雒縣遂降劉禪又命晉公以相國總百揆於是上節傳去侍中大都督録尚書之號咸熙元年三月進爵為王增封竝前二十郡二年八月薨諡曰文王武帝受禪追尊號曰文皇帝武帝文帝長子仕魏纍遷中護軍封新昌鄉侯晉國建立為世子拜撫國大將軍開府副相國咸熙二年五月為晉王太子八月嗣相國晉王位下令寬刑宥罪撫衆息役十一月初置四護軍以統城外諸軍十一月遂受魏禪後魏道武皇帝拓拔氏昭成皇帝嫡孫臣欽若等曰昭成以上事起立悉具帝王帝系門始六歲居昭成喪僞秦苻堅使劉庫仁劉衛辰分攝國事南部大人長孫嵩盡將故民南依庫仁帝轉幸獨孤部其後七年十月苻堅敗於淮南是月庫仁為慕容文等所殺以其弟眷攝國部九年庫仁子顯殺眷而代之乃將謀逆臣欽若等曰將謀逆謂將殺道武商人王霸知之履帝足於衆中帝乃馳還是時故大人梁蓋盆子六春為顯謀主盡知其計密使部人穆崇馳告帝乃陰結舊臣長孫捷元他等幸賀蘭部顯使人求帝不及明年正月戊申帝即代王位于牛川建元登國元年復以長孫嵩為南部大人以叔孫普雒為北部大人班敘勛勞各有差二月幸定襄之盛樂息衆課農三月劉顯臣欽若等曰劉顯即劉庫仁之子是也自善無南走馬邑其族奴真率部來降四月改稱魏王五月車駕東幸陵石護佛侯部帥侯辰乙弗部帥代題叛走諸將請追之帝曰侯辰等世修職役雖有小愆宜且忍之當今草創人情未一愚近者固應趑趄不足追也七月己酉車駕還盛樂代題復以部落來降旬有數日亡奔劉顯帝使其孫倍斤代領部落是月劉顯弟肺泥率騎掠奴真部落既而率以來降初帝叔父窟咄為苻堅徙于長安因隨慕容永以為新興太守八月劉顯遣弟亢泥迎窟咄以近隨之來逼南境於是諸部騷動人心顧望帝左右于桓等與諸部人謀為逆以應之事泄誅造謀五人餘悉不問帝慮內難乃北踰陰山幸賀蘭部阻山為固遣行人安同長孫賀使于慕容垂以徵師垂遣使朝貢竝令其子賀驎率步騎以隨同等十月賀驎軍未至而寇已前逼於是北部大人叔孫普雒等十三人及諸烏丸亡奔衛辰帝自弩山遷幸牛川屯于延水南出代谷會賀驎於高柳大破窟咄窟咄奔衛辰衛辰殺之帝悉收其衆十二月慕容垂遣使朝貢奉帝西單于印綬封上谷王帝不納是歲慕容垂僣稱皇帝於中山自號大燕符丕死苻登自立於壟東姚萇稱皇帝於長安自號大秦慕容沖為部下所殺慕容永僣立也二年六月征劉顯於馬邑南追至彌皋大破之顯南奔慕容永盡收其部落三年五月北征庫莫奚陸月大破之獲其四部雜畜十餘萬七月庚申庫莫部帥鳩集遺散夜犯行宮帝縱騎撲討盡殺之十二月西征至女水討解如部大破之四年正月襲高車諸部落二月至女水討叱突鄰部皆大破之五年三月西征次鹿津海襲高車袁紇部四月幸意辛山討賀蘭紇突鄰紇奚諸部落皆大破之九月討吐奴部於囊典河十月討高車豆陳部於狼山亦皆破之六年二月遣九原公儀陳留公虔等臣欽若等曰儀虔二公皆宗室西討黜弗部破之七月衛辰遣子真力鞮出稠陽塞侵及黑城九月襲五原屠之十月北征蠕蠕追及之於大磧南林山下大破之十一月真力鞮寇南部帝討之大破其軍於鐵岐山自五原金津南度河次其所居悅跋城衛辰父子奔遁擒斬之自河以南諸部悉平八年三月西征侯呂鄰部四月至苦水大破之八月南征薛于部帥太悉佛於三城會其先出擊曹覆帝乘虛屠其城獲其子女珍寶徙其民而還皇始元年七月左司馬許謙上書勸進尊號帝始建天子旌旗初建臺省置百官封公侯將軍刺史太守尚書郎已下悉用文人天興元年六月丙子詔有司議定國號群臣曰昔周秦以前世居所生之土有國有家及王天下即承為號自漢以來罷侯置守時無世繼其應運而起者皆不繇尺土之資今國家萬世相承啓基雲代臣等以為若取長遠應以代為號詔曰昔朕遠祖總禦幽都控制遐國雖踐王位未定九州逮于朕躬處百代之季天下分裂諸華乏主民俗雖殊撫之在德故躬率六軍掃平中土凶逆蕩除遐邇率服宜仍先號以為魏焉布告天下咸知朕意閏十一月左丞相驃騎大將軍魏王儀及諸王公卿士等上表勸進即皇帝位帝三讓乃許之後周太祖文帝宇文氏德皇帝之子德皇帝事跡並具帝王帝系門後魏明帝孝昌二年燕州亂太祖始以統軍從爾朱榮征之先是北海王皓奔梁梁人立為魏主令率兵入雒魏孝莊帝出居河內以避之榮遣賀拔嶽討皓仍迎孝莊帝太祖與嶽有舊乃以別將從嶽及孝莊帝反正以功封寧都子邑三百戶遷鎮遠將軍步兵校尉萬俟醜奴作亂關右孝莊帝遣爾朱天光及嶽等討之太祖遂從嶽入關先鋒破僞行臺尉遲菩薩等及平醜奴定隴右太祖功居多遷征西將軍金紫光祿大夫增邑三百戶加直閣將軍普泰二年爾朱天光東拒齊神武留弟顯壽鎮長安秦州刺史侯莫陳悅為天光所召將軍衆東下賀拔嶽知天光必敗欲留悅共圖顯壽而計無所出太祖謂嶽曰今天光未有二心若以此事告之恐其驚懼然悅雖為主將不能制物若先說其衆必人有留心進失爾朱之期退恐人情變動乘此說悅事無不遂嶽大喜即令太祖入悅軍說之悅遂不行乃相率襲長安令太祖輕騎為前鋒策顯壽怯懦聞諸軍將至必當東走恐其遠遁乃倍道兼行顯壽果已東走追至華山擒之太昌元年關西大行臺賀拔嶽以太祖為左丞領嶽府司馬加散騎常侍事無巨細皆委決焉齊神武既破爾朱遂專朝政太祖請往觀之既至竝州齊神武問嶽軍事太祖占對雄辨齊神武以為非常人欲留之太祖詭陳忠款乃得反命遂星夜就道齊神武果遣追之至關不及太祖還謂嶽曰高歡非人臣也逆謀所以未發者憚公兄弟耳然凡欲立大功正社稷未有不因地勢總英雄而能克成者也侯莫陳悅本實庸材遭逄際會遂叨任委既無憂國之心亦不為高歡所忌但為之備圖之不難今費乜投控弦之騎不下一萬夏州刺史解拔彌俄定勝兵之士三千餘人及靈州刺史曹泥竝恃其僻遠常懷異望河西流民紇豆陵伊利等戶口富實未奉朝命今若移軍近隴扼其要害示之以威懷之以德即收其士馬以實吾軍西輯玄羌北撫沙塞還軍長安正輔魏室此桓文舉也嶽大悅復遣大祖詣關請事密陳其狀魏帝深納之加太祖武衛將軍還令報嶽遂引軍西次平涼謀於其衆曰夏州鄰接寇賊須加綏撫安得良刺史以鎮之衆皆曰宇文左丞即其人也嶽曰左丞吾之左右手也如何可去沉吟纍日乃從衆議於是表太祖為使持節衛將軍夏州刺史太祖至州伊利望風款附而曹泥猶通使於齊神武魏永熙三年春正月嶽欲討曹泥遣都督趙貴至夏州與太祖計事太祖曰曹泥孤城阻遠未足為憂侯莫陳悅怙衆密邇貪而無信必將為患願早圖之嶽不聽遂與悅俱討泥二月至于河曲嶽果為悅所害其士衆散還平涼唯大都督趙貴率部曲收嶽尸還營三軍未有所屬諸將以都督寇雒年最長相與推雒以總兵事雒素無雄略威令不行乃謂諸將曰雒智能本闕不宜統禦近者迫於群議權相攝領今請避位更擇賢才於是趙貴言於衆曰元帥忠公盡節暴於朝野勳業未就奄罹凶酷豈唯國喪良宰固亦衆無所依必欲糾合同盟復讎雪恥須擇賢者總統諸軍舉非其人則大事難集雖欲立忠建義其可得乎竊觀宇文夏州英姿不世雄謨冠時遠邇歸心士卒用命加以法令齊肅賞罰嚴明真足恃也今若告喪必來赴難因而奉之即大事集矣諸將皆稱善乃命赫連馳至夏州告太祖曰侯莫陳悅不顧盟誓棄恩背德賊害忠良群情憤惋控告無所公昔居管轄恩信著聞今無小無大咸願推奉衆之思公引日成歲願勿稽留以慰衆望也太祖將赴之夏州吏民咸泣請曰聞悅今在永雒去平涼不遠若已有賀拔公之衆則圖之實難願且停留以觀其變太祖曰悅既害元帥自應乘勢直據平涼而反趑趄屯兵永雒吾知其無能為也且難得易失者時也不俟終日者機也今不早赴將恐衆心自離都督彌妲元進規欲應悅密圖太祖事發斬之太祖乃發輕騎馳赴平涼時齊神武遣長史侯景招引嶽衆太祖至安定遇之謂景曰賀拔公雖死宇文泰尚存卿何為也景失色對曰我猶箭耳隨人所射安能自裁景於此即還太祖至平涼哭嶽甚慟將士且悲且喜曰宇文公至無所憂矣于時魏孝武帝將圖高歡聞嶽被害遣武衛將軍元毗宣旨慰勞追嶽軍還雒陽毗到平涼會諸將已推太祖侯莫陳悅亦被敕追還悅既附高歡不肯應召太祖謂諸將曰侯莫陳悅枉害忠良復不應詔命此國之大賊豈可容之乃命諸軍戒嚴將以討悅及元毗還太祖表於魏帝曰臣前以故關西大都督臣嶽竭誠奉國橫罹非命三軍喪氣朝野痛惜都督寇雒等銜冤茹戚志雪讎恥以臣昔同幕府苦賜要結臣便以今月十四日輕來赴軍當發之時已有別表既為衆情所逼權掌兵事詔召嶽軍人入京此乃為國良策但高歡之衆已至河東侯莫陳悅猶在永雒在此軍士多是關西之人皆戀鄉邑不願東下今逼以上命悉令赴闕悅躡其後歡邀其前首尾受敵其勢危矣臣殞身王事誠所甘心恐敗國殄人所損更大乞少停緩更思後圖徐事誘導漸就東引太祖志在討悅而未測朝旨且兵未集假此為詞因與元毗及諸將刑牲盟誓同獎王室魏帝詔太祖曰賀拔嶽既殞士衆未有所歸卿可為大都督即相統領知欲漸就東下良不可言今亦徵侯莫陳悅士馬入京若其不來朕當親自致罰宜體此意不過淹留太祖表曰侯莫陳悅違天逆理酷害良臣自以專戮罪重不恭詔命阻兵永雒強梁秦隴臣以大宥既班忍抑私憾頻問悅及都督可朱渾元等歸闕早晚而悅竝維縶使人不敢反報觀其指趣勢必別圖臣正為此未敢自拔兼順衆情乞少停緩太祖乃與悅書責之曰頃者正光之末天下沸騰塵飛河朔霧塞荊沔故將軍賀拔公攘袂勃起志寧寓縣援戈南指拯皇靈於已墜擁旌西邁濟百姓於淪胥西顧無憂繄公是賴勛伐茂隆遂征關右此乃行路所知不藉一二談也君實名微行薄本無遠量故將軍行遷喬之志篤彙征之理乃申啓朝廷薦君為隴右行臺朝議以君功名闕然未之許也遂頻煩請謁至於再三天子難違上將便於聽許是亦遐邇共知不復煩之翰墨縱使木石為心猶當知感況在生靈安能無愧加以王室多故高氏專權主上虛心寄隆晉鄭君復與故將軍同受密旨屢結盟約期於畢力共戡時難而貌恭心狠妒勝嫉賢口血未乾七首已發協黨固賊共危本朝孤恩負誓有靦面目豈不上畏於天下慚於地吾以弱才猥當藩牧蒙朝廷拔擢之恩故荷將軍國士之遇聞問之日魂守驚馳便陳啓天朝暫來奔赴衆情所推遂當戎重比有敕旨召吾還闕亦有別詔命君入朝雖操行無聞而年齒已宿今日進退唯君是視君若督率所部自山隴東邁吾亦總勒師徒北道還闕共追廉藺之跡同慕寇賈之風如其首鼠兩端不時奉詔專戮違旨國有常刑枕戈坐甲指日相見幸圖利害無貽噬臍悅既知太祖謀己詐為詔書與秦州刺史万俟普撥令與悅為黨援普撥疑之封詔以呈太祖太祖表之曰臣自奉詔總平涼之師責重憂深不遑啓處訓兵秣馬唯思竭力前以人戀本土侯莫陳悅窺窬進退量度且宜住此今若召悅授以境內官臣列旆東轅匪朝伊夕朝廷若以悅堪為邊捍乞處以瓜涼一藩不然則終致猜虞於事無益初原州刺史史歸為嶽所親任河曲之變反為悅守悅遣其黨王伯和成次安將兵二千人助歸鎮原州太祖遣都督侯莫陳崇率輕騎一千襲歸擒之竝獲次安伯和等送於平涼太祖表崇行原州事万俟普撥又遣其將北干保雒領二千騎來從軍三月太祖進軍至原州衆軍悉集諭以討悅之意士卒莫不懷憤太祖乃表曰臣聞誓死酬恩覆宗報主人倫所急赴蹈如歸自大都督臣嶽歿後臣頻奉詔還闕秣馬戒途志不俟旦直以督將已下咸稱賀拔公視我如子今讎恥未報亦何面目以處世間若得一雪冤酷萬死無恨且悅外附強臣內違朝旨臣今上思逐惡之志下遂節士之心冀仗天威為國除害小違大順實在茲辰克定之後伏待斧鉞四月引兵上隴留兄子遵為都督鎮原州太祖軍令嚴肅秋毫無犯百姓大悅識者知其有成軍出木峽關大雨雪平地二尺太祖知悅怯而多猜乃倍道兼行出其不意悅果疑其左右有異志者左右亦不自安衆遂離二聞大軍且至退保略陽留一萬餘人據守永雒太祖至永雒命圍之城降太祖即率輕騎數百趨略陽以臨悅軍悅大懼乃召其部將議之皆曰此鋒不可當勸悅退保上邽以避之時南秦州刺史李弼亦在悅軍乃間道遣使請為內應其夜悅出軍中自驚潰將卒或相率來降太祖縱兵奮擊大破之虜獲萬餘人馬八千匹悅與其子弟及麾下數十騎遁走太祖曰悅本與曹泥應接不過走向靈州乃令原州都督遵邀其前都督賀拔穎等追其後遵至牽屯山追及悅斬之太祖入上邽悅府庫財物山積皆以賞士卒毫釐無所取左右竊一銀鏤甕以歸太祖知而罪之即剖賜將士衆大悅時高歡已有異志故魏帝深仗太祖乃徵二千騎鎮東雍州助為聲援仍令太祖引軍而東太祖遣大都督梁禦率騎步五千鎮河渭合口為圖河東之計遂入雍州魏帝進太祖侍中驃騎大將軍開府儀同三司關西大都督略陽縣公尋尚書授僕射關西大行臺時魏帝方圖齊神武太祖乃傳檄方鎮曰蓋陰陽遞用盛衰相襲茍當百六無問三五皇家創曆陶鑄蒼生保安四海仁育萬物運距季末屯沴屢起隴冀騷動燕河狼顧雖靈命重起蕩定有期而乘釁之徒因生羽翼賊臣高歡器識庸下出自輿皂罕聞禮義直以一介鷹犬效力戎行靦冒恩私遂階榮寵不能竭誠盡節專挾姦回乃勸爾朱榮行茲篡逆及榮以專政伏誅世隆以凶黨外叛歡苦相敦勉令取京師又勸吐萬兒復與弒虐暫立建明以令天下假推普泰欲竊威權並歸廢斥俱見酷害於是稱兵河北假討爾朱復通表奏云取讒賊既行廢黜遂將篡弒以人望未改恐鼎鑊交及乃求宗室權允人心天方與魏必將有主翊戴聖明誠非歡力而歡阻兵安忍自以為功廣布腹心跨州連郡端揆禁闥莫非親黨皆行貪虐窫窳生人而舊將名臣正人直士橫生瘡痏動掛網羅故武衛將軍伊琳清貞剛毅禁旅攸屬直閣將軍鮮于康仁忠亮驍傑爪牙斯在歡收而戮之曾無聞奏司空高乾是其黨與每相影響謀危社稷但以姦志未從恐先泄漏乃密白朝廷使殺高乾方哭對其弟稱天子橫戮孫騰任祥歡之心膂竝使入居樞近伺國間隙知歡逆謀將發相繼逃歸歡益加撫待亦無匡白然歡入雒之始本有姦謀令親人蔡雋作牧河濟厚相恩贍以為東道主人故關西大都督清水公賀拔嶽勳德隆重興亡攸寄歡好亂樂禍深相忌毒乃與侯莫陳悅陰圖陷害幕府已受律專征便即討戮歡知狀已露稍懷旅拒遂遣蔡雋拒伐令竇泰佐之又遣侯景等云向白馬輔世珍等徑趣石濟高隆之匹婁昭等屯據壺關韓軌之徒擁衆蒲坂於是上書天子數論得失訾毀乘輿威侮朝廷藉此微庸冀茲大寶溪壑可盈禍心不測或言徑赴荊楚開疆於外或言分詣伊雒取彼讒人或言欲來入關與幕府決戰今聖明禦運天下清夷百寮師師四隩來暨人盡忠良誰為傾側而歡威福自已生是亂階緝搆南箕指鹿為馬包藏凶逆伺我神器是而可忍孰不可忍幕府折衝宇宙親當受脤鋭師百萬彀騎千群裏糧坐甲唯敵是俟義之所在糜軀匪吝況頻有詔書班告天下稱歡逆亂徵兵致伐今便分命將帥應機進討或趣其要害或襲其窟宅電繞蛇擊霧合星羅而歡違負天地毒被人鬼乘此掃蕩易同俯拾歡若渡河稍逼宗廟則分命諸將直取竝州幕府躬自東轅電赴伊雒若固其巢穴未敢發動亦命群帥百道俱前轘裂賊臣以謝天下其州鎮郡縣率土黎人或州鄉冠冕或勳庸世濟並宜捨逆歸順立效軍門封賞之科已有別格凡百君子可不勉歟七月魏帝從雒陽率輕騎入關太祖備儀衛奉迎謁見東陽驛乃奉命都長安披草萊立朝廷軍國之政咸取太祖決焉仍加授大將軍雍州刺史兼尚書令進封郡公尚馮翊長公主拜駙馬都尉閏十二月魏孝武帝大漸太祖與群公定策尊立南陽王寶炬為嗣是為文帝大統元年進都督中外諸軍録尚書事封安定郡王太祖固讓改封郡公三年正月東魏寇龍門屯軍蒲坂造三道浮橋度河又遣其將竇泰趣潼關太祖縱兵擊破之盡俘其衆斬泰首高歡撤橋而遁是年八月丁丑太祖率李弼獨孤信梁禦趙貴于謹若于惠怡峰劉亮王德侯莫陳崇李遠達奚武等十二將至潼關太祖乃誓於師曰與爾有衆奉天威誅暴亂惟爾衆士整爾甲兵戒爾戎事無貪財以輕敵無暴民以作威用命則有賞不用命則有戮爾衆士其勉之于謹狥地至盤豆降東魏將高叔禮及戍卒一千戊子至弘農于時連雨太祖乃率諸軍冒雨攻之庚戌城潰斬陝州刺史李徽伯虜其戰士八千擒將高干竝送長安於是宜陽邵郡皆來歸附十月壬辰破高歡於沙苑斬六千餘級降者二萬餘人歡夜遁追至河上復大克獲前後虜其卒七萬留其甲士二萬餘悉縱歸收其輜重兵甲獻俘長安還軍渭南於是所徵諸州兵始至乃於戰所令當時兵士人種柳一株以旌武功魏帝進太祖柱國大將軍四年七月東魏遣其將侯景庫狄干高敖曹韓軌可朱渾元莫多婁貸文等圍獨孤信於雒州八月庚寅太祖至穀城莫多婁貸文可朱渾元來逆臨陳斬貸文元單騎遁免悉虜其衆遂進軍瀍東景等北據河橋南屬邙山為陳與諸軍合戰斬高敖曹及其儀同李猛西兗州刺史宋顯等虜其甲士萬五千赴河死者萬數六年春侯景出三鴉將侵荊州太祖遣開府李弼獨孤信各率騎五千出武關景乃退還夏茹度河至夏州太祖召諸軍屯沙苑以備之八年冬高歡侵汾絳圍玉璧九年春度河據邙山十二年春侯景侵襄州九月高歡圍玉璧太祖皆破走之十三年正月歡卒子澄嗣與侯景有隙景舉河南十六州東附七月景叛歸于梁十四年正月進授太祖太師十五年六月梁竟陵郡守孫皓舉郡來附時侯景圍建業司州刺史柳仲禮帥兵赴援及景克建業仲禮還司州率衆來寂皓以郡叛十一月太祖遣開府楊忠率兵與行臺僕射長孫儉討之攻克隨郡忠進圍仲禮長史馬岫於安陸十六年正月擒仲禮悉虜其衆馬岫以城降十七年三月魏文帝終太子嗣位太祖以冢宰總百揆十月太祖遣大將王雄出子午伐上津魏興大將軍達奚武出散關伐南鄭明年去年號稱元年是年春王熊平上津魏興以其地置東梁州夏四月達奚武圍南鄭月餘梁州刺史宜農侯蕭循以州降武執循還長安二年三月遣大將軍魏安公尉遲迥率衆伐梁武陵王蕭紀於蜀夏四月太祖勒鋭騎三萬西踰隴度金城河至姑臧吐谷渾震懼遣使獻其方物五月蕭紀潼州刺史楊乾運以州降引迥軍向成都七月太祖自姑臧至于長安八月克成都劍南平三年春魏帝有怨言太祖與公卿定議廢帝尊立齊王廓是為恭帝元年七月梁元帝遣使請舊圖以定疆界又連結於齊言辭悖慢太祖曰古人有言天之所棄誰能興之其蕭繹之謂乎十月壬戌遣柱國于謹中山公護大將軍楊忠韋孝寬等步騎五萬討之十一月癸未師濟於漢中山公護與楊忠率鋭騎先屯其城下據江津以備其逸丙申謹至江陵列營圍守辛亥進攻城其日克之擒梁元帝殺之竝虜其百官及士民以歸沒為奴婢者十萬餘其免者二百餘家立蕭察為主居江陵為魏附庸三年正月行周禮建六官以太祖為太師九月太祖有疾十月乙亥大漸殂于雲陽宮十二月閔帝受魏禪追尊為文王廟曰太祖武成元年追尊為文皇帝閔帝太祖第三子魏恭帝三年三月命為安定公世子四月拜大將軍十月嗣位大冢宰十二月魏帝以岐陽之地封帝為周公遂受魏禪
