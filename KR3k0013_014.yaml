body:
  text: 都邑二都邑二唐高祖武德元年五月受隋禪都長安改隋大興殿為太極殿昭陽門為順天門離宮別館遊憩之所並廢十月以武功舊宅為武功宮四年十二月使行臺僕射屈突通焚乾元殿應天門紫微觀以其太奢五年七月營弘義宮初秦王居宮中承乾殿高祖以秦王有克定天下功特降殊禮別建此宮以居之六年四月幸龍潛舊宅改為通義宮十二月以奉義監為龍躍宮帝龍潛時莊舍也又以武功宅為慶善宮七年五月置仁智宮於宜州宜君縣今防州縣八年四月營太和宮於終南山九年六月改東宮弘禮嘉福等門為光宣門太宗貞觀三年四月太皇上以弘義宮有山林勝景乃徙居之改為太安宮六年監察御史馬周上疏曰臣伏見太安宮在城之西其墻宇門闕之制方之紫極尚為卑小臣伏以皇太子之宅猶處城中太安宮至尊所居更在城外雖太上皇遊心道素志存清儉陛下重違慈旨愛惜人力而番夷朝見及四方觀者有不足瞻仰焉臣願營築雉堞修起門樓務從高敞以稱萬方之望則大孝昭乎天下矣八年十月營永安宮改名大明宮以備太上皇清暑公卿百寮爭以私財助役十一年正月新作飛山宮七年廢明德宮及飛山宮之玄囿以給遭水之家十四年八月營襄城宮初帝將幸雒陽遣將作大匠閻立德行可清暑之地以建離宮於汝州西山前臨汝水傍通廣城澤以置宮焉役工一百九十餘萬雜費稱是十五年三月幸襄城宮及至暑熱又多毒虺帝大怒免立德官而罷其宮分賜百姓二十年七月辛亥宴五品已上於飛霜殿其殿在玄武門北因地形高敞層閣三城軒欄相注又引水為潔淥池樹白楊槐柳與陰相接以滌炎暑焉十月司空房玄齡及將作大匠閻立德大營北闕制顯道門觀並成二十一年復置翠微宮籠山為苑自初裁至於設幄九日而罷功因改名翠微宮正門北開謂之雲霞門視朝殿名翠微殿其寢殿名含風殿拜為皇太子搆別宮去臺連延里餘正門西開名金華門內殿名喜安殿七月建玉華宮於方州宜君縣之鳳凰谷帝手詔曰朕聞上代無為簷茅而砌土中季華用檻玉而臺瓊燥濕之致雖同奢儉之情則異朕承皇王之緒執造化之綱包萬類於心端圖八紘於目際夷夏一軌區宇大同雖則德有劣於難名道方參於至義若乃制服垂裳之后服牛羈馬之君弦弧剡矢之奇運車浮舟之智濟時為美功亦大焉至若浩浩九齡炎炎七載融山坼地滔天襄陵生人之艱勞亦極矣彼數德者功莫高乎吞狄此兩災者勞又甚乎裁宮今雖菲食卑宮有慚於曩哲安人濟難不恧於前賢然而人皆輕見重聞貴耳賤目德雖微也以其古而為大功雖巨也以其今而成小不亦謬哉每流鑑于前經常披懷而自勗思所以收驕閉逸卷欲除華而頃年已來憂勞煩結暨至茲歲風疾彌時嗟乎濟世之威患攢躬而靡制回天之力痛沈己而難移重以景熾流金風湯溽暑邅回幾度旭慕增勞俯仰巖廓寢興添弊唯冀廓景延涼蕩茲虛惙近因群下之志南營翠微本絶丹青之工才假林泉之勢峰居隘乎蚊睫山徑險乎焦原雖一己之可娛念百僚之有倦所以載懷爽塏爰制玉華故遵意於朴厚本無情於壯麗尺版尺築皆悉折庸寸作寸功故非虛役猶恐遐邇乖聽方輿怨咨非其樂勞人而竭力好峻宇而雕墻但以養性全生不獨在私在己怡神祈壽良以為國為人比者屢有征行非無疲頓前歲問罪遼左去秋巡幸靈州皆以翦害除凶懷柔服叛豈欲矜轍迹騁盤遊而已哉今復土木頻興營繕屢動永言思此深念人勞一則以為慚一則以為愧何則胸奴為患自古弊之十月防秋人血丹於水脈千里轉戰漢骨皓於塞垣當此之疲人不堪命尚興未央之役猶起甘泉之功今則毳幕穹廬取為郡縣天山瀚海分為苑池去既往之長勞成將來之永逸譬回一年之役創此新宮想志士哲人不以為言也布告黎庶明此意焉宮既成正門謂之南風門殿覆瓦餘皆葺之以茅帝以意在清涼務從儉約匠人以為層巖峻谷玄覽遐長於是疏泉抗殿包山通苑皇太子所居南風門之東正門謂之嘉禮門殿名暉和殿其官曹寺署並皆創立微事營造庶物亦憂市取供而折番和雇之費以巨億計矣及帝遊幸敕奉御王孝積於顯道門內起紫微殿十三間文甓重基高敞宏壯帝見之甚悅高宗永徽二年九月改九成宮為萬年宮廢玉華殿以為佛寺苑內及諸曹司舊是百姓田宅者並還本主三年四月將作大匠閻立德造新殿成移御之日謂侍臣曰朕性不宜熱所司頻奏請造此殿既作之役深懼人勞今既暑熱朕居屋下尚有流汗匠人暴露事亦可愍所以不令精妙意者只避炎暑耳長孫無忌曰聖心每以恤人為念天德如此臣等不勝幸甚五年三月幸萬年宮帝謂太尉長孫無忌曰此宮非直涼冷宜人且去京不遠朕離此十年屋宇無多損壞昨者不易一椽一瓦便已可安不知公等得安堵未曹司廨署周足未乃親制萬年宮銘並序七百餘字群臣請刊石建于永光門詔從之十月修築京師羅城和雇雍州四萬一千人三十日功畢九門仍各施觀明德門一觀至五門顯慶元年敕司農少卿田仁汪因事東都舊殿餘址修乾元殿高一百二十尺東西三百四十五尺南北一百七十六尺六月改東宮弘教殿為崇教殿二年十二月以雒陽宮為東都雒州官吏員品如雍州廢雒陽宮總監改青城宮為東都苑北面監明德宮為東都苑南面監雒陽宮農圃監為東都苑東面監食貨監為東都苑西面監雒州北市置官員準東西市隸太府寺五年五月修雒水水波堰又於東都苑內造八關宮尋改為合璧宮九月改東明門為賓躍門西明門為宣耀門時常機為司農少卿受詔檢校東都營田園苑之事帝謂之曰兩都是朕東西二宅也今之宮館隋代所造歲序既淹漸將頽毀欲有修造又費財力如何機奏曰臣任司農向以十年前後省費今見貯錢三十萬貫若以供葺理可不勞而就也帝大悅詔機兼統將作少府二司使漸營之於是機始造宿羽高山等宮並移雒水之中橋自立德之西街徙於長夏之通衢遂廢利涉橋公私以為便及機遷職帝登雒水高岸有臨眺之美詔機於其所營上陽宮宮成移御之龍朔二年六月帝染風痺以宮內湫濕乃修舊大明宮改名蓬萊宮北據高原南望爽塏是年置正門曰丹鳳正殿曰含元含元殿之後曰宣政宣政左右有中書門下二省弘文史二館三年二月稅雍同岐幽華寧鄜坊涇虢絳晉蒲慶等州率口錢修蓬萊宮又減京官一月俸助修蓬萊宮四月移仗就蓬萊宮是月始御紫宸殿聽政百寮奉賀新言成也初遣司稼少卿梁孝仁監造悉於庭院列白楊樹右驍衛大將軍契苾何力入宮中縱觀孝仁指白楊曰此木易長不過二三年宮中可得蔭映何力不答但誦古詩白楊多悲風蕭蕭愁殺人意謂此是蒙墓木也孝仁遽令拔去之更植梧桐謂人曰禮失求之於野固不虛也麟德二年二月東都造乾元殿成所司奏乾元殿成其應天門先亦焚之及是亦造成為則天門神龍元年三月十一日避元天后號改為應天門唐隆元年七月避中宗號改為神龍門開元初又為應天門乾封二年二月改萬年宮依舊為九成宮咸亨元年三月改蓬萊宮為含元宮長安元年十一月又改為大明宮十二月又改為大明殿神龍元年二月復改為含元殿儀鳳三年正月詔藍田縣新作涼宮宜名萬全宮四年五月造紫桂宮於澠池縣西永淳元年四月改芳桂宮是年帝入雒乃移御雒北陰殿尚書左僕射劉仁軌謂侍御史狄仁傑曰古之陂池臺榭皆在深宮重城之內不欲外人見之恐傷百姓之心也韋弘機之作列岸修廊在於堙堞之外萬方朝謁無不覿之此豈致君堯舜之意哉弘機聞之曰天下有道百司各奉職輔弼之臣則思獻替之事腑贓之臣行詔守官而已吾不敢越分也永淳元年七月造奉天宮於嵩山之南仍置嵩陽縣中宗神龍三年八月改玄武樓為制勝樓睿宗景雲元年十月以大內為太極宮玄宗開元二年七月宋王成器等纍上表請以興慶舊里宅為宮乃下制曰朕昔與弟兄聯居藩邸虔奉聖訓遂膺昌期常思鄠社之遊頗有芒碭之氣王等固陳符瑞取則不遠擬備巡幸推而勿居雖府在京師亦同於譙沛式遵故事宜依今請遂以興慶里舊邸為興慶宮初帝在藩邸與宋王等同居于興慶里時人號曰五王子宅至景隆末宅內有龍池涌出望氣者云有天子氣中宗數行其地命泛舟以馳象踏氣以厭之至是為宮焉役於西南置樓西面題曰花萼相輝之樓南面題曰勤政務本之樓至二十五年帝戒諸玉曰奉先帝宮室不敢有加時時補葺已愧於勞人矣唯興慶創制乃朝廷百辟卿士以吾舊邸因欲修建不免群卿考室之詞是即庶民子來之請亦所以表休徵之地新作南樓本欲察氓俗採風謠以防壅塞是亦古闢四門達四聰之意時有作樂宴慰不徒然也今因大哥讓朱邸以成花萼相輝之美歷觀自古聖帝明王有所興作欲以助教化也吾所冀者式崇敦睦漸漬薄俗令其人信厚耳興慶宮在東內之南自東內達南內有夾城復道徑通北門達南內人主往東兩官莫知之宮之西南隅有花萼相輝勤政務本之樓禁苑在皇城之北苑東西二十七里南北三十三里東至汶水西連故長安城南連京城北枕渭水苑內離宮亭以二十四所漢長安故城南東西十三里亦隸入苑中苑置四面監總監以掌種植五年七月改明堂為乾元殿詔曰古之操皇綱執大象者何嘗不上稽天道下順人極或變通以隨時爰損益以成務且衢室創制度堂以筵因之以禮神是光孝德用之以布政蓋稱視朔先王所以厚人倫感天地者少陽有位上帝斯歆此則神貴於不黷禮殷於至敬今之明堂俯臨宮掖比之嚴祀有異肅敬茍非憲章將何軌物繇是禮官博士公卿大夫廣參群議欽若前古宜存路寢之式用罷辟雍之號可改為乾元殿每臨御宜依正殿禮十一月並州置北都詔曰經邦創制建國設險必因時順人統物立極我國家以神武聖德應天受命龍躍晉水鳳翔太原建萬代之摸為億兆之主猶成湯之居亳有周之興岐朕以耿身纂承昌運守祖宗之大寶恢中興之洪業叶時卜守經始此都事本因心情兼惟舊近者嘉祥薦至休瑞屢臻此皆宗拓降靈神祗潛暨豈伊菲德獨享厥休昔堯理唐郊式建丹陵之地漢居雒邑更表南陽之都今王業正興宮觀猶在列于編郡情所未安非所以恢大聖之鴻規展孝思之誠敬其並州宜置北都改州為太原府刺史為尹司馬為少尹太原晉陽為赤縣諸縣為畿縣官吏品第視京雒兩府是年置溫泉宮於驪山十三年六月廢都西市十六年正月始移仗於興慶宮聽政十九年六月詔曰春秋之義立子以貴東海王陽皇后之子宜承大統皇太子疆崇執謙退願備藩國父子之情重久違之其以疆為東海王二十四年四月改造天津橋合為一橋六月廣花萼樓築夾城芙蓉園十二月毀東市東北角道政坊西北角以廣花萼樓前二十六年正月修望春宮十月兩京路行宮名造殿宇及屋千間二十七年九月於明堂舊址造乾元殿十月毀東都明堂之上層改下層為乾元殿二十八年正月兩京路及城中苑內種果樹天寶元年十月造長生殿名為集靈臺以祀神二年十二月東京應天門改為乾元門六載十月改溫泉宮為華清宮十二月發馮翊華陰等郡丁夫築會昌羅城於溫陽置百司七載十二月玄元皇帝降于朝元閣改為降聖閣八載四月華清宮作觀風樓五月以開遠門外作振旅亭十載四月興慶宮作交泰殿十二載十月城興慶宮役京師及三輔人凡一萬三千人並以時估酬錢肅宗至德二年十二月詔曰頃以上皇在蜀朕亦居岐蜀郡宜改為南京鳳翔改為西京西京為中京蜀郡改為成都府鳳翔府尹已下官寮並同三京名號三年正月改丹鳳樓門安化門為達禮門以祿山國讎惡聞其姓京城及坊門名有安字悉改之上元元年九月詔荊州大都督府宜改為江陵府仍為南都江陵縣為赤縣諸縣為畿縣長史為尹司馬為少尹餘官屬名位並同京兆府及京畿赤縣並依舊二年九月詔曰唐虞之代肇有九州王者所都文無異制其京兆府河南府太原府三京之號宜停其鳳翔先為西京亦宜準此元年建卯月詔曰五都之號其來自久宜以京兆府為上都河南府為東都鳳翔府為西都江陵府為南都太原府為北都代宗廣德元年九月禁城內六街種植二年二月又詔禁之初諸軍諸使以時艱歲儉奏耕京城六街之地以供芻或謂非宜乃罷之永泰元年二月出內人一千人品官六百人赴東京守衛十一月河南等道都統黃門侍郎平章事王縉上言請減諸道軍資錢四十萬貫修東都宮內殿宇從之二年正月京兆尹黎幹大發夫役種城內六街樹是歲不許京城內坊市侵街築墻造舍舊者並毀之德宗貞元三年作玄英門及觀於大明宮北垣四年二月築延喜門北復道屬於永春門復修延喜門觀三月自武德東門築垣約左藏庫之北屬宮城東垣於是武庫因而廢焉其器械隸於軍器仗五年正月戶部侍郎班宏修玄武樓八年正月新作玄武門及廡會踘場十二年八月增修望仙樓及廣夾城及十六王宅時京城街衢中樹缺縣吏多裁榆樹以其省便會吳湊為京兆尹每歲唯令植槐樹成列十三年三月於麟德殿前新造亭子成名曰會慶亭五月引龍首渠水自通化門入至太清宮前七月幸魚藻池池先深一丈淘加四尺八月詔曰昆明池俯近都城古之舊制蒲魚所産實利於人宜令京兆尹韓皋充使即勾當修堰漲池十一月韓罪奏準敕漲昆明池修石炭賀蘭兩堰並造土堰開溝渠都用錢七千四百三十貫文十九年二月修含元殿憲宗元和二年六月左神策軍新築夾城別開門曰玄化造樓曰晨輝三年十月敕修南內殿十三間墻舍共一千六百間及勤政樓明光樓六年五月毀興安門南竹亭八年五月河南尹許孟容進東都圖九年六月置禮賓院於長興里北十二年四月命右神策軍護軍中尉第五守進以衆二千築夾城自雲韶門芳林門西至修德里以通于興福寺又置新市于芳林門南閏五月作蓬萊池周廊四百間十三年二月詔六軍使創修麟德殿之右廊又浚龍首池起承暉殿雕飾綺煥徙置佛寺之花木以充焉十四年正月徙置仗內教坊於延政里三月詔左右軍各以官徒二千人修勤政樓穆宗以元和十五年正月即位二月詔於西上閣門西廊右畔便門以通宰臣自閣中赴延英路七月新作永安殿及寶慶殿及修日華門通乾門並朝堂廊舍八月發神策六軍三千人浚魚藻池十月發右神策軍兵各千人於門下省東少陽院前築墻長慶元年五月禁中造百尺樓時帑藏未實內外多事土木之功屢興物議喧然以為不可敬宗寶曆元年七月乙亥度支準宣進鏡銅三千餘斤黃金銀薄總十萬番充修清思院新殿及陽德殿圖障二年正月甲戌左右神策六軍威遠皇城左右金吾共差二萬人入內穿池修殿是月敕東都已來舊行宮宜令度支郎官一人領都科匠緑路簡計及雒城宮關與東都留守商議計料分析聞奏五月神策軍於苑內古長安城中修漢未央宮文宗太和元年四月詔毀升陽殿東放鴨亭望仙門側看樓十間並敬宗所造也八月癸卯詔毀如京倉舍以其地歸門下寶曆末好廣苑囿門下剩悍廄因通八禁中至是還之二年八月敕修安福樓及南殿院屋宇一百八十八間又修兩儀殿及甘露殿共一百七十二間九月集賢院奏請創造昭慶門裏西墻至集賢院門南廊舍三十九間許之九年二月敕都城勝賞之地唯有曲江承平已前亭館接連近年廢毀思俾葺修已令所司芟除栽植其諸司如有力及要創置亭館者給與間地任其營造十月右軍劈仗使田金操請準敕拆銀臺門起修三門樓詔左軍官健二千人填龍首池以為踘場又詔左右軍官健各一千五百人赴曲江修建紫雲樓九月帝幸右銀臺門觀門樓興工之作發左右神策軍一千五百人修淘曲江是日左右軍奏修曲江樓畢各進圖一軸是月內出新造紫雲樓彩霞亭額左軍中尉仇士良以鼓吹迎於銀臺門時帝好詩每吟杜甫曲江行云江頭宮殿銷千門細柳新蒲為誰緑乃知天寶已前曲江四面皆有行宮臺殿思復升平故事故為樓殿以臨之武宗會昌元年三月敕造靈符應聖院五年正月造仙臺六月修望仙樓及廊舍共五百三十九間宣宗大中元年二月敕修百福殿院八十間七月敕親親樓號雍和殿別造屋宇廊舍七百間二年正月敕修右銀臺門樓屋宇及南面城墻至睿武樓五年詔修明儀樓昭宗光化元年正月車駕在華州詔以韓建修京師宮闕是月李茂貞與諸道相次進表助營宮苑詔遣建自華至京經度宮室開構橋道九月自華還京天祐元年正月梁王朱全忠遣將寇彥卿請車駕遷都雒陽閏四月至東都哀帝天祐二年五月詔改雒都諸門與西京門同者延喜門改宣仁門重明門改興教門長樂門改光政門光範門改應天門乾化門改乾元門宣政門改敷政門宣政殿改貞觀殿日華門改左延福門月華門改右延福門萬壽門改萬春門積慶門改興善門舍章門改膺福門舍清門改延義門金鑾門改千秋門延和門改章善門保寧殿改文思殿詔曰法駕遷都之日雒京再建之初慮懷土有類於新豐惟更門以合於舊制今則妖星既出於雍分高閎難倣於秦餘宜復別門之名以壯卜年之永是用分疆畫野實顯驗於否臧東雒西京靡玄參於制度其京都見在門同西京門名並宜改復雒京舊門名蓋避妖星之變也十月敕雒城坊曲內舊有朝臣及諸司宅舍經亂荒榛張全義葺理以來皆以耕懇既供軍賦即係公田或恐妄有披論認為世業須煩按驗遂啓幸門其都內坊曲及畿內已耕殖田土諸色人並不得論認如要田業一任買置凡論認者不在給還之限如有本主元自差人勾當不在此限如荒田無主即許識認付河南府閏十二月皇城使奏伏以皇城之內咫尺禁闈晨夜巡警固須清肅伏乞準敕條漏鼓聲絶後禁斷人行今據軍人百姓更點動後尚恣夜行特乞聖慈再下六軍止絶從之後唐莊宗同光元年四月即位於魏州是月升魏州為東京改元城縣曰興唐貴鄉縣曰唐晉都督府曰興唐府以太原為西京鎮州為北都十二月壬申敕汴州偽庭所立殿宇諸門並去牌額復本名其宣武軍額置於咸安門所在宮苑即充行宮應有不合安鴟吻處並可去之二年正月丁未敕朝元殿北是明堂殿偽梁改為朝元殿今復舊名其崇勛殿宜改為中興殿應順門改為永曜門太平門改為萬春門通政門改為廣政門鳳鳴門改為韶和門萬春門改為中興門解卸殿改為端明殿八月敕三川奧壞四海名區為帝王光宅之都乃符瑞薦臻之地周朝始建卜年遂啓於延洪漢室中興即土是圖於遠大咸茲建極至我本朝壯麗可觀浩穰為最千門萬戶實為富庶之鄉接廡連薨宛有升平之俗而自偽梁僭逆諸夏憑陵尋干戈而虐用蒸黎恣塗炭而毒流草木依憑兔苑嘯聚梟巢遂令輦轂之間鞠興蕪沒之歡朕自削平大憝纂嗣丕圖重興卜雒之都永啓朝宗之會將資久遠須議葺修務令壯觀於九重實在駢羅於萬戶京城應有空間地任諸色人請射蓋造藩方侯伯內外臣僚於京邑之中無安居之所亦可請射各自修營其空間有主之地仍限半年本主須自修蓋如過限不見屋宇亦許他人占射貴在成功不得虛占是月辛巳詔曰朕刷蕩妖氛收復京輦三靈胥悅萬國駿奔凡在照臨畢同欣戴或出司土宅入觀朝廷若無列第於神州何表愛君之誠節諸道節度觀察防禦團練刺史等並宜令雒京修宅一區既表皇居之壯麗復佳清雒之浩穰因我后之化家睹群居之戀闕壬午西都奏重修華清宮溫湯屋宇三年三月詳定院奏近並魏州為東京簡諸道州縣須先定兩府始可各定官品未審依故事京兆河南為兩府太原興唐為次府天復以興王之地別有進止敕不唯府額各定於等差兼亦都名須正於升降將為經久之制宜遵固本之文本朝故事雍州為西京京兆府雒州為東都河南府是謂京都兩府並州舊為北都太原府在兩府之次近以中興大業以魏州為東京興唐府權為東京為雒京竊以雒京歷代帝王之都四方朝貢所便爰自漢魏迄于隋唐方建都城是比宸極宜依舊以雒京為東都魏州改為鄴都興唐府與北京太原府並為次府豈獨設官分職命秩免惑於有司抑亦畫界分疆取則無違於故事四月壬寅武德使上言重修嘉慶殿請丹漆金碧以營之帝曰此殿為火所廢不可不修但務宏壯何煩華侈尋改為廣壽殿六月壬戌敕河南府開永通厚載二門應京城內空間地如本主有力即速令蓋造若不修營即許諸色人請射起屋其月左諫議大夫崔憓上言曰臣伏見雒都項當制葺之初荒涼至甚才通行徑遍是荊榛此際集人開耕便許為主或農或圃逾三十年近歲居人漸多里巷頗隘須增屋室宜正街坊都邑之制度既成華夏之觀瞻益壯因循未改污濁增深竊惟舊制宮苑之側不許停穢惡之物今以菜園相接宗廟祠宇公府民家穢氣薰蒸甚非蠲潔請議條制俾令四方則之八月左補闕楊途奏明君舉事須合前規竊見京城之內尚有南州北州縱市井不可移改城池即宜毀廢復見都城舊墻多已摧塌不可使浩穰神京旁通緑野徘徊壁壘俯近皇居無或因循常宜修茸初光啓末張全義為河南尹為蔡賊所攻乃於南市一方之地築壘自固後更於市南又築嘉善坊為南城天復修都之際元未毀撤途所奏頗適事宜九月中書奏右補闕楊途先奏毀廢京內南北城臣簡到同光二年八月二十七日河南尹張全義奏臣自僖宗朝叨蒙委寄節制雒京臨蒞之初須置城壘臣乃取南市曹界分兼展一兩坊地修築兩城以立府衙廨署今區宇一平理合毀廢其城濠如一時平治即計功不少百姓忙時難為差使今欲且平女墻及擁門餘候農隙別取進止者奉敕京都之內古無郡城本朝多事以來諸侯握兵自保張全義土功斯毀李罕之塞地猶存時既朗清故宜除劃若時差夫役又恐擾人宜令河南府先分擘出舊日街巷其城壕許人占射平填便任蓋造屋宇其城基內舊有巷道處便為巷道不得因循妄有侵占仍請限一月如無力平劃許有力人戶占射平填庚申新作興教門樓明宗長興元年正月宗正少卿李延祚奏請止絶車牛不於天津橋來往二年六月戊辰應京城六街及諸間坊先許人修建屋室如聞侵地太多乃至不通車駕今後蓋造外須通車馬或有越衆牽蓋並須畫時毀拆並果園池亭外餘種蒔菜園空間田地如本自辦即限三月內蓋造須畢如自不辦並許人收買敕旨伊雒之都皇王所宅乃夷夏歸心之地非農桑取利之田當辭離而曾是荒涼及開泰而競為修葺從來闃寂多已駢闐永安天邑之居宜廣神州之制宜令御史臺兩街使河南府專切依次第擘畫曉示衆多勿客侵越或有利便亦可臨時詳度奏聞其月河南府奏淮敕京城坊市人戶菜園許人收買切慮本主占佃年多以鬻蔬為業固多貧窶豈辦蓋造恐資有力轉傷貧民敕旨都邑之間殷繁是貴欲九重之轉盛在百堵以齊興作事斷自於不疑出令必歸於畫一比據巡司申奏為有亂射土田遂設規程令還價直只要增修舍屋添益閭閻貴使華夏共觀壯麗朝廷以邦本興隆之計務使駢闐府司以園圃價例之間恐傷貧下備詳敷奏須議允俞其在京諸坊若是有力人戶及形勢職掌曹司等已有居第外於別處乃連宅置得菜園令園子主把或典賃與人者並準前敕價例出賣不得輒有違越如實是貧窮不濟人戶置得園圃年多手自灌園身自賣菜以供衣食者則與等第特添價直仍買者不得廣置地位各量事力須議修營並要酌中庶無踰越三年二月庚午修平頭門樓畢名乾通之門四月戊午中書奏奉敕重定三京諸道州府地望次第者據十道圖舊制以王者所都之地為上本朝都長安遂以關內道為上今宗廟宮闕見都雒陽請以河南道為上關內道第二河東道第三餘依舊制又本朝都長安以京兆府為上今都雒陽請以河南府為上其五府按十道圖以關內道為上遂以鳳翔府為首河中成都江陵興元為次中興初升魏博為興唐府鎮州為真定府皆是創業興王之地不與諸府雷同今望以興唐真定二府升在五府之上合為七府餘依舊制七月汴州李從嚴奏當州舊司天臺有銅渾儀拜板閣並在露地損爛欲毀拆敕旨復令繕理不得輒毀四年六月詔宮西新園宜名永芳園其間新殿宜名和慶殿愍帝應順元年閏正月甲寅集賢院上言以赦書修創凌煙閣詔問閣高下等級其凌煙閣都長安時在西內三清殿側畫像皆北向閣有中隔隔內北面寫功高宰輔南面寫功高諸侯王隔外面次第圖畫功臣題贊自西京版蕩四十餘年舊日主掌官吏及畫像工人淪喪集賢院所屬寫真官畫真官人數不少都雒後廢職今將特起閣請先定佐命功臣人數請下翰林院預令寫真本及下將作差人與畫工序間架修建院內先有寫真官沈居隱畫真官王武瓊二人相次淪亡無人應用詔集賢御書院復置寫真官畫真官名一員餘依所奏晉高祖天福二年正月丙寅改中興殿中興門為天福殿天福門五月丙辰御史中丞張昭遠奏汴州在梁室朱氏稱制之年有京都之號及唐莊宗平河南復廢為宣武軍至明宗行幸之時掌事者因緑修葺衙城遂挂梁室時宮殿門牌額當時識者或竊非之一昨車駕省方暫居梁苑臣觀衙城內齊閣牌額一如明宗行幸之時無都號而有殿名恐非典據臣竊尋奏漢已來寰海之內鑾輿所至多立宮名近代隋室於揚州立江都宮太原立汾陽宮岐州立仁壽宮唐朝於太原立晉陽宮同州立長春宮岐州立九成宮宮中殿閣皆題署牌額以類皇居臣伏準故事請於汴州衙城門權挂一宮門牌額則其餘齊閣並可以取便為名庶使天下式瞻稍為宜稱者敕旨行闕宜以大寧宮為名其餘候續敕處分七月改玄德殿為廣政殿玄德門為廣政門十一月改雒京潛龍宅為廣德宮北京潛龍宅為興義宮三年十月丙辰詔曰為國之規在於敏政建都之法務要利民歷考前經朗然通論顧倠涼德獲啓丕基當數朝戰伐之餘是兆庶傷殘之後車徒既廣帑廩咸虛經年之挽粟飛芻繼日而勞民動衆常煩漕運不給供須今汴州水陸要衝山河形勢乃萬庾千廂之地是四通八達之郊爰自按巡益觀宜便俾升都邑以利兵民汴州宜升為東京置開封府仍升開封浚儀兩縣為赤縣餘升為畿縣應舊制開封府時所官屬縣並可仍舊割屬收官亦升為畿縣其雒京改為西京其雍京改為晉昌軍丁亥詔改太寧宮門為明德門又改京城諸門名額南門尉氏門以薰風為名西二門鄭門梁門以金義乾明為名北二門酸棗封丘門以玄化宣陽為名東二門曹門宋門以迎春仁和為名四年二月辛卯改東京玉華殿為永福殿三月己卯改明德殿為滋德殿宮城南門同名故也五年九月戊子改東京上源驛為都亭驛六年八月壬子敕改鄴都皇城南門應天門為乾明門大名館為都亭驛七年閏三月敕改宣明門為朱鳳武德殿為視政文思殿為崇德畫堂為太清寢殿為乾福其門悉從殿名皇城南門改為乾明北為玄德東為萬春西為千秋四月乙丑敕改鄴都羅城及大城諸門羅城南博門為廣運門觀音門為金明門橙槽門為清景門寇氏門為永芳門朝城門為景風門大城南門為昭明門觀德門為廣義門北河門為靖安門魏縣門為膺福門尉氏門為迎春門朝臣門為興仁門上斗門為延清門下斗門為通遠門漢高祖以天福十二年二月即位於太原宮以太原為北京五月車駕至東京即汴州也周太祖廣順元年六月以唐都長安時京城等門北定今東京諸門薰風等為京城門明德門為皇城門啓運等為宮城門升龍等為宮門崇元等為殿門二年正月詔開封府修補京師羅郭率府界丁夫五萬五千板築旬日罷以積年不修不可通過兼淘抒舊壕免雨水壞民廬舍故也三年六月雒京武行德言五鳳樓西面朵樓北磚座落一丈三尺十月敕入厚載門內向東橫街東北屋宇宜令弘文館史館集賢等三館於此分擘廨署世宗顯德元年七月西京留守武行德率其部民萬數完雒陽羅城先是車駕自太原回行德覲於河陽帝以雒表城隍頽缺有日矣因面諭行德令葺之繇是徵丁夫數千而加板築焉二年四月詔曰惟王建國實曰京師度地居民固有前則東京華夷臻溱水陸會通時向隆平日增繁盛而都城因舊制度未恢諸衛軍營或多窄狹百司公署無處興修加以坊市之中邸店有限工商外至億兆無窮僦賃之資增添不定貧闕之戶供辦實艱而又屋宇交連街衢湫隘入夏有暑濕之苦居常多煙火之憂將便公私須廣都邑宜令所司於京城四面別築羅城先立標幟候將來冬末春初農務間時即量差近甸人夫漸次修築春作才動便令放散如或土功未畢則迤邐次年修築所畢寬容辦集今後凡有營葬及興置宅灶並草市並須去標幟七里外其標幟內候官中擘畫定街巷軍營倉場諸司公廨院務了即任百姓營造三年六月癸亥詔曰輦轂之下謂之浩穰萬國駿奔四方繁會此地比為籓翰近建京都人物誼闐閭巷隘狹雨雪則有泥濘之患風旱則多火燭之憂每遇炎蒸易生疫疾近者開廣都邑展引街坊雖然暫勞久成大利朕昨自淮上迥及京師周覽康衢更思通濟千門萬戶庶諧安逸之心盛暑隆冬倍減寒溫之苦其京城內街道闊五十步者許兩邊人戶各於五步內取便種樹掘井修蓋涼棚其三十步以下至二十五步者各與三步其次有差五年五月賜東京新城諸門名額在寅曰寅賓門在辰曰延春門在巳曰朱明門在午曰景風門在未曰畏景門在申曰迎秋門在戌曰肅政門在亥曰玄德門在子曰長景門在丑曰愛景門改大內東偏舊賓天門為通苑門又以京城東新修驛為懷信驛以待江南貢使焉恭帝顯德六年十二月改萬歲殿為紫宸殿
