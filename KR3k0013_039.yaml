body:
  text: 睦親睦親傳曰君子篤於親則民興於仁蓋先王因親以教愛自家邦而達天下也高辛而上書紀靡詳若夫唐堯親族虞帝大孝夏禹拜敦敘之言商書垂立愛之訓周家忠厚內睦九族二帝三代以來何莫繇斯也已厥後令王率循茲道乃有賜高年之典隆閨門之禮慰撫恩念發於至誠恤乏振滯形於軫惻逮於弛甸人之戾續宗正之籍録其孤息歸其削壤親親之恩斯為至矣其帝者之盛德歟唐堯克明峻德以親九族能明俊德之士任用之以睦高祖玄孫之親九族既睦平章百姓既已也百姓百官言化九族而平和韋明周成王燕兄弟召公作棠棣之書而歌以親之其詩曰棠棣之華鄂不韡韡承華者曰鄂鄂是得華之光明則韡韡然盛喻弟之敬事兄兄以恭覆弟恩義之顯亦韡韡然也又燕宗室同姓諸侯作湛露之詩曰湛湛露斯在彼豐草厭厭夜飲在宗載考湛湛露盛貌豐草喻同姓諸侯也夜飲之禮在宗室同姓諸侯則成之漢文帝四年五月復諸劉有屬籍家無所與賜諸侯王子邑各二千戶武帝初即位方好藝文以淮南王安屬為諸父安于武帝服屬為從父叔父辨博善為文辭甚尊重之每宴見談説得失及方技賦頌昏暮然後罷元朔二年賜几杖不朝城陽王子福為海嘗侯坐法失爵武帝平閩粵封福為繚嫈侯從軍無功以宗室故侯衡山王賜淮南王安之弟也安謀反賜當坐收有司請逮捕衡山王帝曰諸侯各以其國為本不當相坐建元三年諸侯王來朝帝初即位大臣多冤朝錯之策皆以諸侯連城數十泰強欲稍侵削數奏暴其過惡諸侯王自以骨肉至親先帝所以廣封連城犬牙相錯者為磐石宗也今或無罪為臣下所侵辱有司吹毛求疵笞服其臣使證其君多自以侵冤至是天子置酒中山王勝聞樂聲而泣因言群臣黨議朋友相為使夫宗室擯郤骨肉冰釋於是帝乃厚諸侯之禮省有司所奏諸侯事加親親之恩焉元光元年四月復七國宗室前絶屬者昭帝後元二年二月即位七月賜長公主及宗室昆弟各有差始元二年以宗室母在位者舉茂才劉辟疆劉長樂皆為光祿大夫辟疆守長樂位尉長樂宮之衛尉也宣帝地節元年六月詔曰蓋常聞堯親九族以和萬國朕蒙遺德奉承聖業惟念宗室屬未盡而以罪絶若有賢材改行勸善其後屬使得自親甘露三年烏孫楚主解憂上言年老思土願得歸骸骨葬漢地天子閔而迎之公主與烏孫男女三人俱來至京師公主年且七十賜以公第田宅奴婢奉養甚厚朝見儀比公主後二歲卒三孫因留守墳墓解憂楚王戊之孫也成帝即位以淮陽王欽屬為叔父敬寵之異於它國王上書自陳舅張博時事頗為石顯等所侵因為博家屬徙者求還丞相御史復劾欽前與博相遺私書指意非諸侯所宜蒙恩勿治事在赦前不悔過而復稱引自以為直失藩臣禮不敬上加恩許王還徙者建始二年秋罷太子博望苑武帝為衛太子作此苑令受賓客也以賜宗室朝謁者平帝元始元年詔宗室為吏舉廉佐史補四百石言宗室為吏者皆令舉廉各從本族而依廉吏遷之為佐史者倒補四百石後漢光武建武二年十二月詔曰惟宗室列侯為王莽所廢先靈無所依歸朕甚愍之其並復故國若侯身已歿屬所上其子孫見名尚書封拜屬所謂侯子孫所屬之郡縣也録其見名上于尚書封拜之十三年二月詔宗室及絶國封侯者一百七十三人明帝時廣陵王荊有罪自殺帝封荊子元壽為廣陵侯服玉璽綬食荊故國六縣又封元壽弟三人為鄉侯明年帝東巡狩徵元壽兄弟會東平宮班賜御服器物又取皇子輿馬悉以與之濟南王康在國不修法度交通賓客其後人上書告康招來州郡姦狡漁陽顏忠劉子彥等又多遺其繒帛案圖書謀議不軌事下考有司舉奏之帝以親親故不忍窮竟其事但削祝阿溫陰東朝陽安德平西昌五縣建初八年章帝復還所削地永平四年四月楚王英有罪自殺帝制詔英母許太后曰國家始聞楚事幸其不然既知審實懷用焯灼庶欲宥全王身令卒天年而王不念顧太后竟不自免此天命也無可奈何太后其保養幼弱勉飲食諸許願王富貴人情也已詔有司出其有諒者令安田宅許太后薨復遣光祿大夫持節弔祠留護喪事賻錢五百萬又遣謁者備王官屬迎英喪改葬彭城加王赤綬羽蓋華藻如嗣王儀追爵諡曰楚厲侯帝幸彭城見英夫人及六子厚加贈賜章帝建初三年帝饗衛士於南宮因從皇太后周行掖庭池閣乃閲陰太后舊時器服愴然動容乃留五時衣各一襲五時衣謂春青夏朱季夏黃秋白冬黑也衣單復具曰襲及常所御衣合五十篋餘悉分布諸王及子孫在京師者各有差時賜東平憲王蒼及琅琊王京書曰中大夫奉使親聞動靜嘉之何已歲月騖過山陵浸遠孤心悽愴如何如何間饗衛士於南宮因閲視舊時衣服聞於師曰其物存其人亡不言哀而哀自至信矣惟王孝友之德亦豈不然合送光烈皇后假紒帛各一周禮追師掌王后之首服為副副編鄭玄云副婦人首服三輔謂之假紒續漢書帛字作皂及衣一篋可時奉瞻以慰凱風寒泉之思詩國風曰凱風美孝子也凱風自南吹彼棘心棘心夭夭母氏劬勞爰有寒泉在浚之下有子七人母氏勞苦寒泉在今濮州濮陽縣又欲令後生子孫得見先后衣服之製今魯國孔氏尚有仲尼車輿冠履明德盛者光靈遠也孔子廟在魯曲阜城中年緝之從征記曰魯人藏孔子所乘車於廟中是顏路所請者也獻帝時廟遇火燒之冠履解見鍾離意傳其光武皇帝器服中元二年已賦諸國故不復送並遺苑馬一匹血從前髆上小孔中出嘗聞武帝歌天馬霑赤汗今親見其然也前書天馬歌曰太一況天馬下沾赤汗沫流赭頃及虜尚屯將帥在外憂念遑遑未有間寧願王寶精神加供養若言至戒望之如渴六年蒼上疏求朝明年正月帝許之特賜裝錢千五百萬其餘諸王各十萬帝以蒼胃涉寒露遣謁者賜貂裘及大官食物珍果使大鴻臚竇固持節郊迎帝乃親自修行邸豫設帷狀其錢帛器物無不充備下詔曰禮伯父歸寧乃國詩云叔父建爾元子敬之至也昔蕭相國加以不名優忠賢也況兼親尊者乎其濟南東平中山西王贊皆勿名蒼既至升殿及拜天子親答之七年大鴻臚奏遣諸王歸國帝特留東平王蒼賜以祕書列仙圖道術祕方至八月飲酎畢有司復奏遣蒼乃許之手詔曰骨肉天性誠不以遠近為親疏然數見顏色情重昔時念王久勞思得還休欲署大鴻臚奏不忍下筆顧受小黃門中心戀戀惻焉不能言於是車駕祖送流涕而訣復賜乘輿服珍寶輿馬錢布以億萬計和帝永光十五年幸章陵祠舊宅會宗室於舊廬勞賜作樂元興元年宗室以罪絶者悉復屬籍安帝元初六年任城國相行弘奏王安輕易貪吝請廢之帝不忍以一歲租五分之一贖罪順帝陽嘉元年詔宗室絶屬籍者一切復籍質帝即位還王侯所削戶邑靈帝熹平二年愍王寵嗣陳王國相師遷追奏前相魏愔與寵共祭天神希幸非冀罪至不道有司奏遣使者案驗是時新誅渤海王悝帝不忍復加法詔檻車傳送愔遷詣北寺詔獄使中常侍王酺與尚書令侍御史雜考愔辭與王供祭黃老君求長生福而已無他冀幸酺等奏愔職在規正而所為不端遷誣告其王岡以不道皆誅死有詔赦寵不案中平三年黃巾賊起甘陵王忠為國人所執既而釋之帝以親親故詔復國魏太祖時族子真字子丹少孤帝哀之收養與諸子同使與文帝共止明帝太和五年八月詔曰古者諸侯朝聘所以敦睦親親協和萬國也先帝著令不欲使諸王在京都者謂幼主在位母后攝政防微以漸關諸盛衰也伏惟不見諸王十有二載悠悠之懷能不興思其令諸王及宗室公侯各將適子一人朝復有少主母后在宮者自如先帝令申明著于令景初中詔曰陳思王植雖有過失既克己慎行以補前闕且自少至終篇籍不離于手誠難能也其收黃初中諸奏植罪狀公卿已下議尚書中書祕書三府大鴻臚者皆削除之撰録植前後所著賦詩銘雜論凡百餘篇副藏內外晉明帝即位西陽郡王羕放縱兵士劫鈔所司奏兔羕官詔不問恭帝時有庚戌制不得藏戶彭城王玄匿五戶桓溫表玄犯禁收付廷尉既而宥之後魏道武即位秦明王翰子儀以事賜死儀子纂五歲帝命養於宮中恩與諸皇子同時襲衛王儀坐事死道武欲敦宗親之義詔引諸王子弟令入宴常山王素等三十餘人咸謂與衛王相坐疑懼皆出逃遁將奔蠕蠕唯陳留王崇獨至帝見之甚悅厚加禮賜遂寵敬之素等於是亦安明元永興四年十一月內賜宗室近屬南陽王良已下至於緦麻之親布帛各有差大武嘗顧樂安王範之長子良曰兄弟之子猶子也親撫養之長而壯勇多知常參國大計獻文時崇舊齒拜華山王鷙曾孫襄陽侯乞斤外都大官甚優重孝文太和十一年五月詔復七廟子孫及外戚緦麻服已上賦役無所與十七年三月壬戌宴四廟子孫於文宣堂帝親與之齒行家人之禮又嘗宴王公侍臣於清徽堂命黃門郎崔光郭祚通直郎邢巒崔林等賦詩言志燭至公卿辭退李沖再拜上千萬歲壽帝曰卿向以燭至故辭復獻千萬之壽朕報卿以南山之詩帝曰燭至辭退庶姓之禮在宗載考宗族之義卿等且還朕與諸王宗室欲成此夜飲又云孝文詔延四廟之子下逮玄孫之胄申宗宴于皇信堂不以爵秩為列悉序昭穆為次用家人之禮汝陰王天賜景穆之子坐貪殘削除官爵卒帝素服哭於思政觀贈本爵葬從王禮南安王楨出為相州刺史帝餞楨於華林都亭詔曰從祖南安既之藩任將曠違千里豫懷憫戀然今者之集雖曰分岐實為曲宴並可賦詩申意射者可以觀德不能賦詩者可聽射也當使武士彎弓文人下筆孝文送楨於階下流涕而別楨坐事削除母劉太妃薨孝文親幸臨慰及葬贈布帛綵五百段齊郡王簡文成第四子帝嘗與簡俱朝元明太后於皇信堂簡居帝之右行家人禮遷太保孝文仁孝以諸父零落存者唯簡每見立以待之俟坐致敬問起居停簡拜伏文帝將議華變舊風大臣有難色又每引劉芳郭祚等密與規模共論時政國戚謂遂疏己怏怏有不平之色乃令陸凱私喻之曰至尊但欲廣知前事直當問其古式耳終無親彼而相疏也國戚舊人之意乃稍改遷雒改官制服飾禁絶舊言東陽公丕皆所不願帝亦不逼之但誘示大理令其不生同異至於衣冕已行朱服列位而丕猶嘗服列在坐隅晚乃稍加葉帶而不能修飾容儀帝以丕年衰體重亦不強責及罷降非道武子孫及異姓王者強駁於公爵而利享封邑亦不減獻子文雍為高陽王帝時幸雍第皆盡家人之禮北海王詳獻文之子孝文自雒北巡詳嘗與侍中彭城王協並在輿輦陪侍左右至文成射銘之處詔詳與侍臣皆試射遠近唯詳箭箭不及文成箭所十餘步孝文嘉之拊掌欣笑遂詔勒銘親自為製車駕南伐行中領軍留守給鼓吹一部甲仗三百人孝平熹明二年戊戌八月宴道武已來宗室年十五以上於顯陽殿用家人之禮又詔曰皇魏開基道邁周漢禪建二都德盛百祀雖帝祚蕃衍親賢並茂而猶沉屈素里曲褐衡門非所謂廣命戚族翼屏王室者也今可依世近遠敘之列位正光中詔曰周德崇厚蔡仲享國漢道仁恕淮南畢王皆所以申恩赦戚蠲蕩舊釁義彰曩策詠流前史頃者咸陽京兆王自貽禍敗事繇間惑猶有可矜兩門詣子並可聽附屬籍中山王喜弟略以喜舉兵略遂奔梁梁用為宣城太守俄而徐州刺史元法僧據城南叛州內士庶皆為法僧擁逼梁武乃以略為大都督令諸彭城接誘初附略至屯於河南為安樂王監所略唯數十騎入城梁尋遣其豫章王綜鎮徐州徵略與法僧同還略雖在江南自以家禍晨夜哭泣與法僧言未嘗一笑梁復除略衡州刺史未行會綜以城歸國綜長史汪革司馬祖烜將士五千人悉見擒虜孝明敕有司悉遣革等還南因以徵略梁乃備禮遣之略之將還也梁為置酒餞別賜金銀百斤梁之百官悉送別江上遣其右衛徐確率百餘人送至京師孝明詔光祿大夫刁雙境首勞問又敕徐州賜布帛各千匹除略侍中義陽王食邑一千戶還達石人驛亭詔宗室親黨內外百官先相識聽迎之近郊賜帛三千匹宅一區其司馬始賓除給事中領直後栗光法本縣令刀昌東平太守刁雙西兗州刺史其略所至一餐一粟之處無不霑賞尋改封東平王孝昌二年閏十一月詔曰頃舊京淪覆中原喪亂宗室子女籍在七廟之內為雜戶濫門所拘辱者悉聽離絶陸昕之尚獻文女常山公主無男以昕之從兄道第四子彰為後彰妻即咸陽王禧女禧誅養彭城王弟莊帝親之略同諸姊西魏文帝大統七年十二月御憑雲觀引見諸王敘家人之禮手詔為宗誡十條以賜之後周太祖姊建安長公主賀蘭祥年十一而孤居喪合禮長於舅氏特為帝所愛邵惠公顯第二子導之子廣曾侍食高祖所食瓜持以奉進高祖悅之隋高祖時河間王弘字辟惡帝從祖弟也父元孫死齊為周所並弘始入關與帝相得帝哀之為買田宅唐高祖於宗親彌見敦睦遂迎拜揖如家人之禮焉武德七年四月丙午宴王公親屬於文明殿高祖見長平王太妃以尊屬從家人禮降階再拜酒小闌徙坐翠華殿帝賦詩王公遞上壽賜帛各有差太宗貞觀十五年五月丁未幸濟比公李瑊第敦親親也十七年二月辛巳朔帝謂侍臣曰前代皇王莫不疏弟愛子唯漢明帝曾賜諸王不令子多於第良史書之垂美後葉我罔極之恩情鍾諸弟於是內外諸王同有班賜五月辛酉改葬元昌及祐以國公之禮元昌母妻子並宥給其田宅元昌高祖第七子也初封漢王坐太子承乾事死焉祐太宗第五子初封齊王亦以反死十八年三月甲午幸同安大長公主第帝以主春秋高常有風疾故親加省視賜絹五百匹侍主疾者賜絹有差膠東公道彥淮安王神通之子丁父憂廬於墓側容貌柴毀帝聞而加歎令侍中王圭就加開喻河間王孝恭貞觀中為襄州行臺左僕射人或告其謀反者徵還京師為憲司所告赦拜左金紫光祿大夫高宗以貞觀二十二年五月即位諸王及舊在藩者並加真封蒲一千戶賜物三千段中馬十匹彭王元則薨高宗為之舉哀贈司徒荊州都督柩車至京帝復罷朝命百官及諸親就第展哀及發引帝登望春宮望之而哭中宗神龍六年二月詔皇室子孫諸王妃主駙馬等自垂拱已來非命者皆不望殯宜令州縣尋求處所以牲牢致祭仍追復官爵備禮改葬其王並令陪葬昭獻二陵有嗣者即令承襲無嗣者聽取近親為後三月制曰君臣朝序貴賤之禮斯殊兄弟天倫先後之儀亦異聖哲之制率繇斯道朕臨茲寶樞信在崇高負扆當陽雖受宗枝之敬退朝私謁仍用家人之禮近代以來罕尊軌度王及公主曲致私情姑叔之尊拜於子侄違法背禮情用惻然自今已後宜從革弊安國相王及太平公主更不得輒拜衛王重俊兄弟及常寧公主弟姨妹等先告宗屬知朕意焉先是諸王及公主皆以親為貴天子之子諸臣叔見者必先拜告致啓事帝志欲敦敘親族故下制以革斯俗睿宗唐隆元年七月制曰皇后公主既尊且親有遷幽之義無戮辱之典倉卒之時亂兵所及致不以禮深用憮然宜矜罪戾且慰泉壤韋氏可一品禮葬悖逆庶人可三品禮葬所司準式譙王重福以反逆謀睿宗詔曰集州刺史譙王重福幼則凶頑長而險詖幸託體於先聖常通交於巨逆不臣不子自絶於天有國有家莫容於代往者頗不含忍令幽縶自太行晏駕韋氏臨朝將肆屠滅尤加防衛洎天有成命集于朕躬永懷猶子之情庶叶先親之義所以開置寮屬往隆刺舉冀其悛改以怙恩榮而詿誤有徒狂狡未息便即私出均州詐乘驛騎至於都下遂逞其謀先犯屯兵次燒左掖計窮力屈投河而斃雖人所共棄邦有嘗刑我非不慈爾自招咎且聞其故有惻於懷昔劉長既歿楚英遂殞以禮收葬抑惟舊章屈法申恩宜仍舊寵可以二品禮葬玄宗先天二年二月詔曰朕奉天明命虔受睿圖而皇室子弟未能稱職堂侄餘慶承煦紹宗行淹祚洽爾從弟璲志謙等不能謹身奉法而乃輕侮國章擯斥邊隅未為塞責朕憫其愚昧屈法申恩並追赴京令於國子監安置讀書如悔過自新克復先訓所司條奏當議其官皇宗親更有左貶嶺南邊遠州非惡逆緣坐等色中亦宜準此其有見任別駕年齒尚幼未堪理百姓者宜委中書門下及新興郡王晉李斯訓等簡擇追赴京其祿俸一事已上並本州委勾當每季付送入京分付其餘慶等本州祿亦準此宗親中有才行灼然為衆推揖者按察使具以名聞朕當擢以不次自今後有犯贓私違禮經者準法科處刑茲無捨庶敦睦之情必聞於九族自家刑國允洽於群心宜各勉勵以識朕意開元六年十一月丙申玄宗親謁太廟下詔七廟元皇帝已上三祖枝孫恐有失官序者宜各五品京官皇妃諸家有子孫今在選敘者量加甄擇十一年太原祀后土畢大赦天下皇親中有文武才用堪任使者委宗正具名薦以當有獎擢十四年敕曰停繼國王禮合停廢以朕近屬特宜並封郡王乃降封再從兄將作大匠嗣江王禕等為郡王褕為廣漢郡王再從叔太子員外率更令嗣密王徹為濮陽郡王再從兄太子員外家令嗣越王琚為中山郡王十五年七月戊戌幸寧王憲之第憲誕辰也二十五年五月辛丑命有司選宗子有才者宗正薦四從叔前奉天令知正四從叔前祁縣令志遠五從弟雒陽尉遇六從弟酸棗丞良五從弟武進尉朏五從姪鄭縣尉瞻五從姪前宋州參軍承嗣皆受臺省官及法官京縣官詔曰至公之用本無偏黨唯善所在豈隔親疏四從叔知證等咸有才名見推公族秉惟清之操兼致遠之資朕每慮同盟不勤于德嘗懸右職以勸其徒先委宗卿精為內舉量能考行歷在踰時名數則多升聞蓋寡光膺是選諒在得人固可擢以清要遷于臺閣將觀志于七子冀籍名於八人宜各悉行佇聞成績書不云乎九族既睦平章百姓冀繇內而理外必自近而及遠凡今懿戚可不慎歟違道慢常義無私於王法修身效節恩豈薄於他人期於率先勵我風俗深宜自勉以副明言七月帝追念故惠宣太子瑗深憫之乃下制曰兄弟之子於近屬而特深恩禮之情在諸孤而更切故惠宣太子男樂安郡王瑗能自砥礪克修名檢續承先績休有令聞宜受賜於千室俾傳芳於萬葉可食實封一千戶天寶三載八月祠九宮禮畢制皇親五等已上及九廟子孫諸親三等已上未出身與出身其前茲者選目稍優與處分見任更賜勳兩轉肅宗至德二年十二月詔曰頃以上皇在蜀朕亦居岐蜀郡宜改為南京鳳翔改為西京西京為中京蜀郡改為成都府鳳翔府尹已下官寮並同三京名號三年正月大赦詔皇五等已下親及九廟子孫有材學政理委宗正寺揀擇聞薦代宗廣德元年十月吐蕃盜入長安邠王守禮之孫廣武王承宏竊尊號及京城平鑾輿自陝州還京師十二月丙申放廣武王承宏于華州一切不問德宗以大曆十四年即位詔叔祖穎王已下叔彭王已下弟蜀王已下大長公主長公主公主各與一子京官郡縣主嗣王郡王各與一子出身建中元年十一月自己卯至庚辰出嫁嶽陽信寧宜芳順朗陵安陽襄陵德清南華元城新鄉等縣主初開元中置禮會院於崇仁里自兵興以來廢而不修公郡縣主不時降嫁殆三十年至有華髮猶非者雖處內館而不獲覲見帝初即位特謁太廟始與郡縣主相見尊者展其敬幼者申其愛歔欷涕泣感動左右至是皆以時降嫁禮物資送無大小必經聖心戚族老幼無不悲感貞元元年十一月癸卯日南至上祀昊天上帝于圓丘禮畢詔大長公主各與一子七品官嗣王郡主縣主各與一子出身應陪位皇親三品已上賜爵一級四品五品一階六品已下及當選散官等簡選日優與處分五年十二月詔郡縣主壻有正員官停者郡主每季給錢七十千縣主每季給五十千郡縣主壻已亡歿者亦準支給先是其主壻與官罷者頗不自給帝務於敦睦有是命六年六月以郜國大長公主薨其子端州流人蕭位等五人並召還八年正月壬午詔在京宗室每年三節宜準百官例宴會若大選集賜錢三百千非大選集錢三減一宗室任嘗參官者同之順宗初即位赦制曰大長公主嗣王等各與一子官及出身有差憲宗元和二年春正月庚寅朝享於太廟初次諸室帝皆盡于誠敬至德宗順宗室流涕嗚咽若不自勝侍臣及舉册官皆相顧感泣敬宗長慶四年正月即位三月壬子大赦其六宅十宅諸王女宜令每年於選人中擇端良者降嫁寶曆二年二月乙卯襄陽公主自西內有敕於歸里第以其男等有請從之公主光以罪囚于禁中故也文宗以寶曆二年十月乙巳即位丁巳以絳王薨帝不視朝三日詔曰叔父絳王為逆賊等援立竊窺大位既無討賊之意遂使忠義銜冤及王師擒妖義旅問罪前驅勇氣以致殲殂伏以太皇后慈仁思以慰解宜令有司量事收葬申恩討賊刑禮之中示于四方以明朕意太和元年赦詔太后第二等已上親大行皇帝皇太后第一等親委中書門下量才敘用九廟子孫陪位者各加兩階仍據始封每王後與一人出身委宗正卿簡尋圖譜取一房最深翳者充數具名開奏四年六月敕越王貞實陷非辜載在國史子孫久廢獎録所宜宜付宗正寺尋勘譜諜如是後嗣具狀聞奏至是宗正奏閲實貞諸孫敕付宗正寺收入屬籍仍賜陪位出身七月賜十六宅諸王綾絹二萬匹以內庫充開成元年八月詔朕因暇日常幸戚藩引見諸王爰加錫宴而故信王孫林行列之間皤然白首問其年齒則七十而有七詢其昭穆則玄宗之雲孫朕仰思開元之時威明之禮繼體承訓逮於朕躬惕然動懷當食興歎況尊祖之義立愛自親尚齒之文繇家刑國觀其威儀甚整視聽不衰載懷愍矜所宜敬異永惟烈祖之德用錫孝孫之慶旌其祚裔特舉徽章遽申開府之秩寵以分茅之貴俾從異等式是殊恩可之信王仍賜開府儀同三司初玄孫自藩邸與寧王憲等友睦既即位升右都督刺史京師立第宅通賓客及在位之久待諸王益至天寶末惟永王一人出入大門自是纍朝子孫雖白首不入宮禁帝深思敦敘之義因是有命十二月帝於禁中會宴諸王因命講讀劉仲武每雙日入內對諸王仍令尚食供食二年夏五月壬申帝幸十六宅召教坊樂人五人與諸王宴樂九月丙戌封故絳王長女為江華縣主故深王第三女為長壽縣主帝敦睦情深自近年公主縣主出降者相繼十月戊戌詔曰書載堯典首陳睦族詩歌周德實美維城朕嗣統百王憲章二代義雖本於敘族道無愧於尊賢式遵舊章爰舉成命嘉王運循王遹恭王通等孝敬恭恪敏裕齊莊播蘭茞之清芬炳圭玉之符采易凌沛獻詩掩楚元古人素風造次於是師氏典訓周旋以之固可以超金紫之貴階升台鉉之崇秩策勛詔爵以寵分茅並可金紫光祿大夫檢繇司空賜光柱國仍依百官例給料錢物檢繇吏部尚書安王溶檢繇兵部尚書穎王諱武宗皇帝宜並從百官例賜料錢三年正月金華縣主臨邑縣主因參賀入內上言家貧帝愍之各賜錢一百貫綵絹一百匹四月甲午幸十六宅賜諸王宴頒賜有差四年春丁卯夜於咸泰殿觀燈作樂三宮太后及諸公主並赴宴六月甲寅故越王貞玄孫女道士玄貞進狀曾祖名珍是越王第六男先天年得罪流配嶺南祖父皆亡歿嶺外雖纍蒙洗雪未還京師去開成三年十二月內嶺南節度使盧均出俸錢接借哀妾三代旅襯暴露各在一方特與發遣歸就大塋合祔今護四喪已到長安旅店權下未委故越王墳所在伏乞天恩允妾所奏許歸大塋妾年已六十三孤露家貧更無所依詔曰越王事迹國史著明枉陷非辜尋以洗雪其子珍他事配流數代漂零不還京國玄貞弱女孝節卓然啓護四喪綿歷萬里況是近族必可加恩行路猶或嗟稱朝廷固須恤助委宗正寺京兆府與訪越王墳墓報知如不是陪陵任祔塋下葬其葬事仍令京兆府接借必使備禮葬畢玄貞如願住京城便配宜觀安置庚申帝幸十六宅安王穎王院宴樂賜錢各五千貫絹二千匹銀器二十事帝與安王穎王兄弟也故大宴特異後唐莊宗同光二年二月南郊赦曰宗子維城本枝百代禮既行於配祖情敢忘於睦親應本朝皇親近屬因緣偽梁之遁遐遠並仰所在搜訪如非謬妄即與奏聞到京委宗正寺大勘不虛並與量材敘録三年三月丁酉帝宴皇親於復宮之山亭皇子弟如家人之禮內弟子作樂明宗同光四年四月即位時河中軍校王舜賢奏節度使李存審今月三日棄城出奔不知所在教曰寡人允副群情方監國事外安黎庶內睦家親庶諧敦敘之規永保隆平之運一昨京師變起禍難薦臻於戚屬之門不測驚奔之所慮因藏竄濫被傷夷言念于茲自然流涕宜令下河南府及諸道應諸王眷屬等昨因變起出奔所至即時津送如不幸物故者即量事收瘞以聞長興元年七月壬午敕先朝諸王頃因同光末年宮門變起諸王多奔北京沿路為部下所害宜於北京留守尋訪之所各依品秩禮葬訖奏聞閔帝應順元年正月陝州康思立言河中節度使洋王從璋在任日用內省絹未填帝以昆仲不之報晉高祖從父弟贇少而無賴棄其家私竄久流落於民間及帝鎮太原訪求始覆之署為牙校
