body:
  text: 尊號二尊號二憲宗元和元年十二月甲戌宰臣及百僚表請上尊號曰文武聖德皇帝不許三年正月癸巳御宣政殿受徽號曰睿聖文武皇帝壬欽若等曰本史闕群臣所請之文十四年五月丙申中書門下率百僚上表請加尊號曰臣聞惟帝之尊不言而理惟天為大無得而名所以舉鴻徽升大號者尊乾坤之心也伏惟睿聖文武皇帝陛下璿樞御柄氣母躋神總三靈以紀元宅萬國以鋪化霽日出海雄光照天煙霞變舒草樹動色夫纂大寶者重光之德崇張帝圖者屬統之功盛十聖儲祉貞明下土一天鏡開引耀幽蟄此臣所以稽衆心而窺景鑠者也臣聞孝於其父則導善因心忠於其君則望美終日蓋性本於內義激於中將曲成以無違期取實而不茍所以然也陸下粵臨宸極十有五年道本至公誠深馭朽有盡下之意無自我之規以喜怒之氣調陰陽之德比類百則有帝堯之聰明周旋一心秉神禹之恭儉繇是朔陲之凶以謀勝庸蜀之虜以刑誅徐夷之固以德歸吳寇之強以氣滅茂昭以二郡至弘正以全部來幽鎮無聲滄景交代至若從史執縛宗奭明刑語於大朝斯為細事頃自淮淝稔禍海岱奮妖歷五聖而不龔稽四紀而負恃陛下英威電斷睿略風行決必取於天心示不疑於輿聽此忠賢所以盡力猛毅所以捐軀一舉而元濟受擒再動而師道傳首地維自正天下一家六十餘年不聞此事野老擊壞仁風扇和巍巍成功蕩蕩區域遠可以比崇於唐虞軒頊近可以丕顯於高祖太宗且玄宗自先天三年至天寶十三年四十年間六上徽號今陛下發揮玄祉燀赫洪猷攄積憤於祖宗駕千齡於天地飾文武之氣象納廣大於昊穹澤及隱微仁霑動植圓方不足稱其遠辰象不足契其明瑞舞神魚祥升鳴鳳若不駿尊大號仰陟崇名豈非臣下之恧與臣等是以夕惕夙夜翕肩纍息上探元命下採群情不勝懇戴誠願之至謹上尊號曰元和順天應道聖文神武皇帝以崇莫大之業以配無為之功伏惟陛下奉順人靈俯從公議鑒深誠於億兆顧景貺於神祗顒顒四海孰不踴躍帝答詔不許表四上從之七月己丑御宣政殿群臣冊上尊號穆宗長慶元年四月辛卯中書門下及文武百僚請上尊號表曰臣聞上帝至尊也其名有九所以顯高明之位西方大聖也其號有十所以旌神化之功王者提寶運而光宅握瑤圖而首出必建徽號以稱鴻猷斯乃臣子之誠有所法則天之所與不可辭讓伏惟皇帝陛下欽明御曆神武纂戎挺上聖之姿撫中興之運鼓雷霆而清八極懸日月而照九圍粵若祗事郊廟敬養長樂大孝也省刑責己偃革息兵大澤也慶雲見甘露降羽毛呈瑞草木發祥天符也億兆歡心而太和蠻夷蹶角而威服人瑞也祖宗未賓之地帝王不收之氓皆勿耀天威獨運聖算未嘗血一刃勞一夫文軌罔不同桀驁罔不化則軒有版泉之戰堯有丹浦之征求之往籍彼宜慚色陛下有格天之大勛動天之大德徽烈已冠於前古而稱號猶抑於當今凡在朝野敢不知罪臣等不勝大願伏乞回天眷啓宸衷擇吉日崇徽號塞人祗慊慊之望合夷夏顒顒之誠制答曰朕以菲德初承大寶嚴恭夙夜修己臨人燭理未明舉政多闕雖展郊禋之禮或稱瑞應之符而俗尚凋訛人未康乂所患德之不立豈患名之不尊至於北狄求和西戎即敘南越投戈而率化西戎繼踵而來王不俟七旬之朝自銷積紀之弊此皆宗社垂裕公卿贊謀之力也朕何有焉遽議徽名深懼未稱卿等志思將順誠切致君宜體至懷勿徇虛美表四上從之七月壬子御宣政殿受冊文武孝德皇帝尊號敬宗寶曆元年四月丙寅宰臣等抗疏請上尊號不許自此纍獻四表詔方從之癸巳御宣政殿受冊文武大聖廣孝皇帝尊號文宗太和六年正月辛亥中書門下及文武百官請上尊號詔答不許甲寅再上表曰伏以昭闡大猷崇建明號爰自列聖實從人心或不踰於一二年或至于再三冊伏惟陛下握乾符而執左契掃氛祲而廓夷途時清俗平世更於七足以光寶祚暢洪徽追成規崇典禮而況百靈效祉庶績其凝祝告玄穹孝光長樂慶澤躋天而接地仁風輝古而映今休禎見于星雲嘉瑞洽于禽草英聲騰軼於八表和氣旁達於九圍而乃尚執勞謙未允誠望凡在臣庶實所章惶夫無為而理者不在於去名稱在於遂萬物之宜曲而成之者也恭默思道者不在於變典冊在於天下為公居而不有者也故曰惟天為大惟堯則之又曰聖人無常心以百姓之心為心然則王者舉措有法弛張隨時伏望答上帝乃眷之懷副下人傾心之望略撝謙之小節奉祖宗之舊儀臣等不勝大願謹上尊號曰太和文武至德皇帝伏乞仰遵成式俯順群心命有司擇吉日光膺盛禮允答天人天下幸甚詔曰朕以否德纂承睿圖業業乾乾懼不克荷是用法天地無私之道以成化象日月無私之照以燭幽慕唐堯虞舜之為君繼貞觀開元之致理朕以夕惕宵興不遑暇逸冀將紹復聖哲保綏華夷至於洪名允不輕議尚未審度豈可屬心卿等臺鉉重臣翼宣元化宜翊朕志臻于緝熙今陰雪傷和尚資寬宥乃以文武至德加于朕躬省視奏章難從虛美宜斷來表深諒豫懷庚申表三上詔答不許七年十二月甲午中書門下請上尊號表曰臣聞自古帝王之有天下也必建崇名立徽號號者功之表名者德之光所以配天立極傳於億祀表功明德示於四方伏惟皇帝陛下運啓中興業隆大寶總道德而施教法陰陽以為心雖日昃忘勞之規御朽典念之戒身衣弋綈之儉乙夜觀書之勤斯皆前代之令猷而哲王之懿範有一於此則為聖明陛下總而行之孜孜不倦而又抑退浮薄崇獎貞廉必齊素厚之風每尚儒學之本端靜邁於時俗孝愛浹於人倫掃滄景之妖凶定羌蠻之俶擾去華尚朴先自六宮端本澄源行乎四海近者旱暵偶數時雨稱愆陛下切納隍之憂深在豫之責德音才發靈貺已隨變慝銷災有如影響熒惑受制以軌道壽星叶紀以揚光品彙昭蘇風雨時若玄功之化覆載同和成貸之仁肖翹皆遂干戈載戢華夏以清自三代已還仁明聰聖未有如今日之盛者也而自龍飛代邸將及十年聖德咸通洪名久曠何以彰祖宗之盛烈副億兆之懇誠臣又聞行過乎恭自非中道名以出信斯蓋格言使尊稱抑而未揚大典闕而不舉天地之符未答神祗之望莫申臣等不勝大願謹上尊號曰太和文武仁聖皇帝伏惟誕膺丕典永峻鴻猷葵藿纖誠庶傾心於回照犬馬微志獲蹈舞於康衢無任悃款屏管之至前後凡四上表詔答不許宰臣以帝臨御八年請加徽號適有五坊中人薛季稜自同華回因奏關輔村閭百姓雕斃帝歎曰近甸今歲小稔人尚如此況江淮水潦之後流離疾苦未有弭災援溺之術焉可虛飾鴻名以自尊大乎因以通天帶賞季稜繇是宰臣不敢復請開成二年二月自朔至晦方嶽之臣請上尊號者二十二道或至再請者皆詔報不許武宗會昌二年四月乙丑朔司空兼門下侍郎平章事李德裕等上章請加尊號曰仁聖文武至神大孝皇帝戊寅御宣政殿受冊五年正月己酉朔太尉兼門下侍郎平章事李德裕及文武百官太常卿孫簡等六千二百二人等奉玉冊玉寶上尊號曰仁聖文武章天成功神德明道大孝皇帝初徽號內無道字有中旨令加之中書奏曰伏以軒居崆峒堯期姑射未有不心游至道而能功濟生靈暨漢之文景尊奉黃老理致刑措時稱太康開元中玄宗經始清宮崇追玄祖闡繹道要遂臻治平六合晏然四十餘年今者陛下蹈軒后之靈蹤遵開元之故事進道不貴於拱壁澄心已得於玄珠聖壽必過於殷宗景化方躋於漢武臣等所上徽號義雖盡美意有未周今謹上尊號為仁聖文武章天成功神德明道大孝皇帝所貴冠皇王之高號盡臣子之至誠伏希聖慈容鑒丹懇宣宗大中二年正月壬戌宰臣率文武百僚上徽號曰聖敬文思和武光孝皇帝御宣政殿受冊懿宗咸通三年正月庚午左僕射門下侍郎平章事杜悰率百寮上徽號曰睿文明聖孝德皇帝十二年正月戊申宰臣路巖率文武百寮上徽號曰睿文英武明德大聖廣孝皇帝御含元殿受冊僖宗乾符二年正月己丑宰臣崔彥昭率文武百僚上尊號曰聖神聰睿仁哲明孝皇帝御正殿受冊光啓元年五月宰臣蕭遘率文武百寮上徽號日至德光烈孝皇帝御宣政殿受冊大赦昭宗大順元年正月御武德殿受朝賀宰臣百官上徽號日聖文睿德光武弘孝皇帝大赦改元長興元年三月庚辰宰臣馮道率百僚拜表請上尊號曰聖明神武文德恭孝皇帝表曰先以中外同詞華夷叶慶敬尊往制特上徽名天眷未回王言疊降過持謙柄尚拘群情將永顯於洪休須再陳於丹素伏惟皇帝陛下中興纘祀下武應期務實去華還淳返朴有聞善必行之聖有無幽不燭之明以神武戡定四方以文德懷柔八極惟恭與孝繼祖承祧臣等考尋帝載奉揚休烈請上尊號日聖明文武恭孝皇帝約就望而臆談堯德敘聲身而首贊禹謨此際陛下以郊禋未展於泰壇帝饗未修於清廟易水之殘妖未殄江陵之闔境未寧堅違冊赤之誠更待和平之日今則乾坤大定書軌混同北暨幽陵南窮丹徼東踰滄海西越流沙率梯航者願布腹心俟干羽者已陶聲教圓丘報本顯陳燔燎之儀宗佑告虔親奉雲韶之薦而況萬邦胥悅百穀順成天垂上瑞之文人樂繇庚之化雞竿作解風紀維新野喧擊壤之歌兵入櫜弓之詠人祗欣合日月重光明哉康哉美矣盛矣臣等生逄景運仰纘丕圖是將億兆之心虔貢再三之請冀茂實永光於圖史徽猷式冠於右今上契天心下從人欲凡厥臣庶恭俟允俞詔曰朕顧惟涼德獲紹丕基賴心膂之訏謨繄股肱之寅亮懼難負荷常勵齊莊唯誠荒寧敢自蒲假卿等謨猷迭著翼亮彌勤遽以鴻名將加眇質雖驗忠貞之懇誠非謙慎之懷往年繼上封章纍增宣達近者告虔宗廟展禮郊丘皆輔弼之盡心亦纘承之常道縱頻摧北虜烽燧尤存雖稍靜南方車書未混至於年穀豐稔皆繇臺輔燮調豈豫沖人當斯盛美爾宜明豫畏相體朕師臣勉務弼諧無忘禆救堯舜禹湯之大道足可敷陳聖明神武之虛名無煩往復諒茲深意即斷來表章三上從之四年六月丙午宰臣馮道文武百僚拜章請上徽號內加廣道法天四字曰臣等聞乾文上布常居莫大之尊坤體下凝克闡無彊之道以是發生悠久亭育運行人識玄功遂配高明之號世祥陰德爰摽博厚之名皆彰得一之靈盡合通三之稱帝王繼統古今同符皇風愈至於洽平群願並虔於將順伏惟聖明神武文德恭孝皇帝陛下乾坤正氣日月並明千年膺出震之期萬乘發承祧之日寬仁大度映惇史於前王儉德淳風契徽猷於太古而自削平多難纂紹洪基視兆庶以如傷致八紘之丕變蠻夷率服稼穡豐登普天揚溢美之聲當寧固持謙之旨夙堅衆志久抑鴻名洎展禮祖宗告虔天地乃從人而降命獲奉冊以陳誠紀述聖謨但務屬詞之實申明拜典方諧得理之宜郊祀以來日新其化四年益理九土咸寧惡黨挺妖仗天威而悉殄遠藩效順感帝德以皆來塞外休兵域中無事保深根而固蒂延地久以天長臣等輒據群情虔徵故事合增加於徽稱免漏略於宸猷伏以道為廣大之宗天布生成之惠仰惟一德宜總二名臣等伏請於尊號內加廣道法天四字庶得彰明典禮若傾翊戴之心輝煥簡編永表雍熙之運詔答曰朕猥以眇躬虔承丕搆統臨區宇綿歷星霜九有所賓萬務思治鑒往代興廢之本稟前王嗣守之規馭朽索以兢懷攬宵衣而惕慮顧惟寡昧罔敢怠荒而猶帝道未臻皇猷罕著至於五兵銷偃九穀豐穰內繇調燮之功外假勛賢之力豈茲涼德擅彼徽名今則漸冀小康將凝大化諒繄臺輔俾契混同何乃遽貢飾辭爰加溢美乍披來奏深匪素懷致君不在於斯文尊主寧勞於懿號未若罄舟揖濟川之業竭股肱宣力之誠使化被入荒澤及四海武功文德感叶於休期君賢臣忠永摽於良史今茲來請具驗乃心徒切歎嘉必難依允所上尊號宜不允表三上從之八月丁未帝齊宿於明堂殿之寢室戊申被袞冕法服御明堂殿百僚朝服班于位攝太尉馮道進玉冊攝中書令劉晌讀冊戊申宣赦畢帝移御榻臨殿檻親慰勞百姓先是積陰旬月是日景物廓清帝甚悅謂范延光等曰豫之不德兩增徽號卿輩輔相之效也晉高祖天福三年十月戊寅北朝命使以寶冊上帝徽號曰英武明義皇帝左右金吾六軍儀仗兵部法物太常鼓吹殿中省傘扇昔等並出城迎引至崇元殿前陳列帝受徽號畢御殿受百官賀周太祖廣順三年十月甲子南郊大禮使中書令弘文館學士齊國公馮道率文武百僚諸道節度使內外將校官吏耆老僧道等上表曰粵以惟帝事天惟臣奉主就陽展禮一人虔報本之心揆德弘猷萬國切歸尊之願載揚明號思稱洪休瞻旒冕以獻言望昊穹而垂允臣等頓首臣聞德所以誕敷四海名所以馳裕萬邦茍黼藻之頌不傳則就望之容何著故質文迭用實實相符禮有常尊臣子合尊於舊典功無與讓君親當協於至公伏望皇帝陛下清明在躬紀德受命弘要道於天下暢貞風於域中通達無方淵源不測此所謂聖以合道也外宣百度上法三光銅渾眧乾健之規玉燭朗陽舒之景無幽不燭有感皆通此所謂明以燭遠也至如用姬公之典以御十倫敬孔子之祠以興四教觀書乙夜徇鐸孟春遠服殊鄰王道無偏而蕩蕩親平判壘天網不漏而恢恢虜帳以是魂銷竝土以之脅息此所謂文以興教武以宅功也又若煦嫗萬物昭蘇九圍協天載以無聲恢帝猷而有截汲如東海固比南山此所謂仁以阜成德以順正者也皇帝陛下聖廣造化明均照臨同文班黼黻之章常武蓄雷霆之勢仁兼孝以並率德與道而相權總集衆方光揚茂實臣等不勝大願謹上尊號曰聖明文武仁德皇帝恭惟雍熙之代開泰之朝君臣崇相正之規天地無不交之象書曰一人有慶當皇極之盛隆詩曰萬國作孚在鴻名之遠逮臣等幸逄景運獲事朝廷表端位而列群司各承豐澤章至尊而舒盛德敢怠前規瀝懇傾輸望恩俞允詔報曰眇覿前王德之盛者或弦弧剡矢去天下之暴或手胼足胝服四載之勤德普施於民而民不知其力蓋為而不有建之若偷巍巍聖功魯無稱號茍異於是孰不近名朕歷數在躬艱難承統莫識三皇之道徒知萬乘之尊至於翼翼小心孜孜庶政推誠待物損己益人上帝佑豫于茲三祀日慎一日無德可稱夫五禮交修四時不忒振頽綱於會府致函夏之小康斯乃公輔庶臣舉職之明效也七德訓戎四鄙不聳執干戈而衛社撫封域以安民此又勳臣將校為時而宣力也至若蟲螟消殄風雨不愆歲被豐登民躋富壽茲乃乾坤育物宗社貽休敢貪天功以為己力而公卿叶議中外同詞諸闕拜章增豫美號雖為臣之義將順則然諒愛君之心殊不在此朕顧寡薄非所宜當即斷來章無至固執所請宜不允表三上從之
