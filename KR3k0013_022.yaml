body:
  text: 符瑞一符瑞一傳曰麟鳳五靈王者之嘉瑞也夫德之休明天降茂祉則必百神幽贊庶物效靈故有非人力之所能致而自至焉者先民有言曰人主和德於上百姓和合於下則天下之和應矣故嘉禾興朱草生記曰天不愛其道地不愛其寶蓋珍符之應以應有德故王者重之是以書載歸禾詩詠鳴鳳芝房寶鼎升於樂府神雀甘露標為年紀皆所以發揚景貺光昭丕烈者也然而洪覆在上其道玄遠坤厚載物其德沉潛人靈歆乎至和昆蟲蒙乎利澤非布於偉兆震乎珍物又安能發輝眷祐而覺悟黎蒸者哉太昊伏義氏受龍圖畫八卦有景龍之瑞炎帝神農氏致大火之瑞嘉禾生醴泉出黃帝軒轅氏有土德之瑞故號黃帝天下既定聖德光被群瑞畢臻有屈軼之草生於庭佞人入朝則草指之是以佞人不敢進有景雲之瑞有赤方氣與青方氣相連赤方中有兩星青方中一星凡三星皆黃色以天晴明時見於攝提名曰景星一云景星見形如半月可以夜作黃帝黃服齊于中宮坐于玄扈雒水之上有鳳凰集於東園或巢於阿閣或鳴於庭其雄自歌其雌自舞麒麟在囿神鳥來儀有大螻如羊大蚓如虹黃帝以土氣勝遂以土德王五十年七月庚申天霧三日三夜晝昏黃帝問天老力牧容成曰於公何如天老曰臣聞之國安其主好文則鳳凰居之國亂其主好武則鳳凰去之今鳳凰翔於東郊而樂之其鳴音中夷則與天相副以是觀之天有嚴教以賜帝帝勿犯也乃召史卜之龜燋史曰臣不能占也其問之聖人帝曰已問天老力牧容成矣史北面再拜曰龜不違聖智故燋霧除遊于雒水之上見大魚殺五牲以醮之天乃甚雨七日十夜魚流於海得圖書焉龍圖出河龜書出雒赤文篆字以授軒轅軒轅接萬神於明庭今寒門谷口是也又獲寶鼎帝南巡狩至於東濱澤獸出能言達萬物之情少昊金天氏登帝位有鳳凰之瑞帝嚳高辛氏代高陽氏王天下使鼓人拊鞞擊鐘鳳凰鼓翼而舞帝堯在位七十年景星出翼鳳凰在庭朱草生嘉禾秀甘露潤醴泉出日月如合璧五星如連珠廚中自生肉其薄如箑搖動則風生食物寒而不臭名曰箑脯又有草夾階而生月朔始生一莢月半而生十五莢十六日已後日落一莢及晦而盡月小則一莢焦而不落名曰蓂莢一日歷莢帝舜即位蓂莢生於階鳳凰巢於庭擊石拊石百獸率舞景星出房地出乘黃之馬西王母獻白環玉玦舜命禹平水土四海之內咸戴帝舜之功於是禹乃興九韶之樂致異物鳳凰來翔天下明德自虞帝始夏禹即天子之位雒出龜書六十五字是為洪範此謂雒出書者也禹南巡狩濟江中流有二黃龍負舟舟人皆懼禹笑曰吾受命於天屈力以養人生寄也死命也奚懼龍哉龍於是曳尾而逃禹卑宮室盡力溝洫百谷用成龍女降湯有神牽白狼銜鉤而入商朝金德將盛銀山自溢周武王即位天下歸之周德既隆草木茂盛蒿堪為室因居蒿宮成王時周公旦攝政七年制禮作樂祥烏鳳凰見蓂莢生乃與成王觀於河雒沈璧禮畢王退俟至于日昧榮光並出黃河清慶雲至青龍臨壇銜玄甲之圖坐之而去禮于雒亦如之玄龜青龍蒼兕至于壇背甲刻書赤文成字周公援筆以世文寫之書成文消龜墮甲而去其言自周訖于秦漢盛衰之符麒麟遊苑鳳凰翔庭成王援琴而歌曰鳳凰翔兮於紫庭余何德兮以感靈賴先王兮恩澤深于胥樂兮民以寧周公東征諸侯咸服宗周天降祉福唐叔得禾異畝同穎一作穗穎即穗也獻之成王成王命唐叔以餽周公於東土作餽禾周公既受命禾嘉天子之命作嘉禾後魏書靈徵志曰成王時治政太平黑狐見穆王征西戎得四白狼白鹿漢文帝十五年春黃龍見於成紀又日中有王字景帝時會稽人朱仲獻三寸四寸珠明月珠王者不殺鱗介之物則出武帝元狩元年十月郊雍獲一角獸若麃然麃鹿屬也形似麞牛尾一角有司曰陛下肅祗郊祀上帝報享錫一角獸蓋麟云於是以薦五畤畤加一牛以燎賜諸侯白金以符應合于天也元鼎元年汾陰巫錦錦巫名為民祠魏睢后土營旁魏故魏國也汾睢本魏地之境故云魏睢也營謂祠之兆域也見地如鉤狀掊視得鼎掊謂手把土也鼎大異於衆鼎文縷無款識款刻也識記也怪之言吏吏告河東太守勝勝以聞天子使驗問巫得鼎無姦詐乃以禮祠迎鼎至甘泉從上行薦之以鼎從行甘泉將薦之天至中山宴溫有黃雲焉三輔謂口晴霽為宴宴而溫乃有黃雲故為異也中讀曰仲郎今雲陽之中山也下雲合茲中山亦同也有鹿過帝自射之因之以祭云至長安公卿大夫皆議尊寶鼎天子曰間者河溢歲數不登故巡祭后土祈為百姓育穀今年豐楙未報鼎曷為出哉楙美也稼穡美也未報者獲年豐而未賽也一曰雖祈穀而未獲年豐之報也張敞引此詔文云榖嗛失報嗛者少也有司皆言聞昔泰帝與神鼎一泰帝者即太昊伏羲氏也一者一統天地萬物所繫象也黃帝作寶鼎三象天地人禹妝九牧之金九牧九州之牧也鑄九鼎象九州皆嘗觴享上帝鬼神以享祀上帝也觴享者一也觴享鬻而祀也韓詩采蘋曰豫以觴之惟錡及釜其空足曰鬲足中空不寶者名之曰鬲也以象三德三德一曰正直二曰剛克三曰柔克事見周書洪範饗承天祐祐福也夏德衰鼎遷于殷殷德衰鼎遷于周周德衰鼎遷於秦秦德衰宋之社亡鼎乃淪胥而不見周頌曰自堂徂基自羊徂牛鼐鼎及鼒不吳不敖胡考之休周絲衣之詩基門孰之基鼎絶大者謂之鼎園弇上謂之鼒吳歡譁也考壽也休美也言報祭祀者或升堂室或升門墊視牛羊之牲及舉大小之鼎告其致潔神降之福故獲壽考之美曰何壽之美者嘆之言也今鼎至甘泉以光潤龍變承休無疆合茲中山有黃白雲降言鼎至甘泉之後光潤變見若龍之神能幽明能小大乘此休福無窮竟也有黃白雲降與初至中山黃雲之瑞相合也蓋若獸之為符言甘泉之雲又若獸形以為符瑞也路弓乘矢集獲壇下路大也四矢曰乘又於壇下獲弓矢之應報祀大享惟受命而帝者心知其意而合德焉高祖受命知之宜見鼎於其廟也合德謂與天合德鼎宜視宗禰廟臧於帝庭以合明應視讀曰示宗謂先帝有德可尊者也禰父廟也帝庭甘泉天子之庭制曰可時又有芝草生甘露殿房中天子為塞河興通天臺若有光云為塞河及造通天臺而有神光之應欲赦天下也乃下詔甘泉房中生芝九莖赦天下毋令復作元封二年六月詔曰甘泉宮內中産芝九莖連葉上帝博臨不異下房言天廣臨不以下房為幽側而隔異之賜以此芝賜朕弘休其赦天下賜雲陽都百戶牛酒作芝房之歌四年三月祠后土詔曰朕躬祭后土地祗見光集于雲臺一夜三燭燭謂照也幸中都宮殿上見光其赦汾陰夏陽中都死罪以下六年三月詔曰朕禮首山昆田出珍物化或為黃金祭后土神光三燭其赦汾陰殊死以下太初三年二月行幸東海獲赤鴈後元元年二月詔曰朕郊見上帝巡守北邊見群鶴留止以不羅罔靡所獲獻時春也非用罔羅時故無所獲也薦于泰畤光景並見其赦天下昭帝始元元年二月黃鵠下建章宮太液池中黃鵠大鳥舉千里者公卿上壽三年十月鳳凰集東海遣使者祠其處三年中鳳凰北下東海海西樂卿宣帝本始元年五月鳳凰集膠東千乘二年六月尊孝武廟為世宗告祠世宗廟日有白鶴集後庭以立世宗廟告祠孝昭寢有雁五色集殿前西阿築世宗廟神光興於殿旁有烏如白鶴前赤後青神光又興於房中如燭狀廣川國世宗廟殿上有鐘音房戶大開夜有光殿上盡明四年五月鳳凰集北海安丘淳于二縣皆屬北海地節二年四月鳳凰集魯群烏從之元康元年三月以鳳凰集泰山陳留甘露降未央宮赦天下徒四年三月神爵五彩以萬數集長樂未央北宮高寢甘泉泰畤殿中及上林苑神爵元年三月幸河東祠后土有神爵集詔曰乃元康四年嘉谷玄稷降于郡國玄稷黑粟也神爵仍集金芝九莖産于函德殿銅池中函德殿名也銅池承霤也以銅為之九真獻奇獸駒形鱗色牛角仁而愛仁南郡獲白虎威鳳為寶朕之不明震于珍物飭躬齋精祈為百姓東濟太河天氣清淨神魚舞河幸萬歲宮神爵翔集汾陰有萬歲官其以五年為神爵元年二年正月乙丑鳳凰神爵甘露降集京師群鳥從以萬數四年二月詔曰乃者鳳凰甘露降集京師嘉瑞並見修典泰山五帝后土之祠祈為百姓蒙祉福鸞鳳萬舉飛覽翱翔集止於旁齋戒之暮神光顯著薦鬯之夕神光交錯或見于天或登于地或從四方來集于壇上帝嘉嚮海內承福其赦天下十月鳳凰十一集杜陵十二月鳳凰集上林五鳳三年三月行幸河東祠后土詔曰朕飭躬齊戒郊上帝祠后土神光並見或興于谷燭耀齋宮十有餘刻甘露降神爵集鸞鳳又集長樂宮東闕中樹上門外闕樹行馬之裹樹也飛下止地文章五色留十餘刻吏民並觀其赦殊死以下甘露元年四月黃龍見新豐二年正月詔曰乃者鳳凰甘露降集黃龍登興醴泉滂流枯稿榮茂神光並見咸受禎祥其赦天下三年二月鳳凰集新蔡群鳥四面行列皆向鳳凰立以萬數黃龍元年二月黃龍見廣漢郡成帝鴻嘉元年冬黃龍見真定永始二年二月龍見於東萊四年正月行幸甘泉郊泰畤神光降集紫殿元延四年三月甘露降京師平帝元始元年正月越裳重譯獻白雉一黑雉二後漢光武建武二年野谷旅生麻菽尤盛野蠶成繭於山阜人收其利焉先是王莽末天下旱蝗黃金一斤易米一斛十二年夏甘露降南行唐縣名屬常山郡六月黃龍見東阿今濟州縣十三年九月南越獻白兔十七年十月有五鳳凰見於潁川之郟縣郟今郟城縣也東觀記曰鳳高八尺五彩群鳥並從行列蓋地數頃停一十七日中元元年五月京師醴泉湧出飲之者痼疾皆愈惟眇蹇者不瘳又有赤草生於水崖赤草朱草也朱草日生一葉至十五日以後日落一葉周而復始郡國頻上甘露群臣奏言地祗靈應而朱草萌生孝宣帝每有嘉瑞輒以改元神爵五鳳甘露黃龍列為年紀蓋以感致神祗表彰德信是以化致升平稱為中興今天下清寧靈物仍降陛下情存損挹推而不居豈可使祥符顯慶沒而無聞宜令太史撰集以傳來世帝不納常自謙無德每郡國所上輒抑而不宣故史官罕得記焉明帝永平六年二月王雒山出寶鼎雒或作雄盧江太守獻之四月甲子詔曰昔禹收九牧之金鑄鼎以象物使人知神姦不逢惡氣夏禹之詩令遠方圖畫山川奇異之物使九州之牧貢金鑄鼎以象之令人知鬼神百物之形狀而備之故人入山林川澤魑魅魍魎莫能逢之惡氣謂魍魎之類事見左傳遭德則興遷於商周周德既衰鼎乃淪亡史記曰周鼎亡入泗水中秦始皇過戎欲出周鼎於泗水使千人沒水求之不得祥瑞之降以應有德方今政化多僻何以致茲易曰鼎象三公易曰鼎拆足覆公餗豈公卿奉職得其理邪太常其以礿祭之日禮記曰夏祭周以礿薄也夏物未成祭尚薄陳鼎於廟以備器用十一年漅湖出黃金盧江太守以獻漅湖湖名今在盧州合肥縣東南時麒麟白雉醴泉嘉禾所在出焉十七年正月甘露降於甘陵是歲歲露仍降樹枝內附芝草生殿前神雀五色翔集京師章帝建初四年甘露降泉臨洮陽二縣二縣屬零陵郡五年零陵獻芝草有八黃龍見於泉陵見零陵泉陵湘水中相與戲其二大如馬有角六枚大如駒無角七年十月幸槐里岐山得銅器形似酒鐏獻之又獲白鹿於臨平觀元和二年二月丙辰東巡狩己未鳳凰集肥城縣今屬太山郡辛未幸太山柴告岱宗有黃鵠三十從西南來經祠壇上東北過於宮屋翱翔升降五月詔曰乃者鳳凰黃龍鸞鳥比集兩郡或一郡再見及白烏神雀甘露屢臻祖宗舊事或班恩施其賜天下吏爵人三級九月詔曰鳳凰黃龍所見亭部無出二年租賦鳳皇見肥城句窳寧槐樹上古今注曰黃龍見雒陽元延亭部三年正月車駕北巡以太牢祠北嶽山見黃白氣有神魚躍出十數章和元年七月詔曰朕聞明君之德啓迪鴻化緝熙康乂光照六幽緝熙光明也六幽謂六合幽隱之處訖惟人面靡不率俾仁風翔于海表威霆行乎鬼區鬼區即鬼方然後敬恭明祀膺五福之慶獲來儀之貺朕以不德受祖宗弘烈乃者鳳凰仍集麒麟並臻甘露宵降嘉榖滋生芝草之類歲月不絶朕夙夜祗畏上天無以彰于先世今改元和四年為章和元年盡二年和帝時前後符瑞八十一所自稱德薄皆抑而不宣安帝元初三年正月東平陸兗州縣名上言木連理三月車平陸有瓜異處共生八瓜同蒂延光元年八月九真言黃龍見無功無功縣屬九真郡二年六月九真言嘉禾生百五十六本七百六十八穗三年二月濟南上言鳳凰集薹縣丞霍收舍樹薹縣屬濟南郡故城在濟州平陵縣北四月沛國言甘露降豐縣六月扶風言白鹿見雍七月馮翊言白鹿見甘露降潁陽衙潁川上言木連理白鹿麒麟見陽翟八月潁川上言麒麟一白虎二見陽翟九月濟南上言黃龍見濟南歷城十月新豐上言鳳集西界亭十二月琅琊言黃龍見琅琊諸縣諸縣名四年正月東郡言黃龍二麒麟一見濮陽桓帝建和元年二月黃龍見沛國譙五月芝草生中黃藏府中黃藏府中藏幣帛金銀諸貨物也二年四月嘉禾生大司農帑藏七月河東言木連理又有嘉瓜兩體共蒂元嘉元年四月白烏見商國十一月鳳凰見濟陰二年八月濟陰言黃龍見句陽金城言黃龍見允街永興元年二月張掖言白鹿見二年四月光祿府吏舍夜壁下有青氣得玉鉤玦各一鉤長七寸三分玦周五寸四分身中皆雕鏤永壽元年四月白鳥見齊國延熹三年四月上郡言甘露降九年四月濟陰東郡濟北平原河水清永康元年八月魏郡言嘉禾生甘露降巴郡言黃龍見十一月西河言白兔見一云白雉靈帝熹平五年沛國言黃龍見譙光和四年二月郡國獻芝英草七月河南言鳳凰見新城群鳥隨之魏文帝黃初元年十一月庚午帝自魏王登壇即阼百官陪位事訖降壇視燎成禮而反改延康為黃初盡七年明帝太和元年四月雒邑初營文昭甄后廟握地得玉璽方一寸九分其文曰天子羡思慈親明帝為之改容以太牢告廟景初元年正月荏縣言黃龍見高貴卿公甘露元年五月鄴及上谷並言甘露降於是改元陳留王咸熙元年安彌福祿縣各言嘉禾生二年二月朐䏰縣獲靈龜以獻四月南深澤縣言甘露降晉武帝太和元年十二月鳳凰六青龍二麒麟各一見于郡國黃龍見雒濱白龍二見太原郡木連理生遼東方域白虎見河南陽翟又見弘農陸渾二年正月白虎見遼東樂浪又見天水西六月嘉奈一帶十實生酒泉八月木連理生河南成皋是年鳳凰六青龍十黃龍九麒麟各一見于郡國三年正月白龍二見于弘農四月張掖太守焦勝上言氐池縣大柳谷口見有玄石一所白晝成文實大晉之休祥圖之以獻詔以製幣告于太廟藏之天府五年正月青龍二見榮陽二月白龍見於趙國五月鳳凰見於趙國七月白兔見北海即墨長獲以獻六年四月白龍二見于東莞七年六月東宮玄圃池芙蓉二花共蒂皇太子以獻八年正月木連理生東平范陽五月白鳩二集太廟南門議郎董胄獲以獻是月木連理生東平壽張十月木連理生建寧白鹿見扶風雍州刺史嚴詢獲以獻是月瀘水胡王彭護獻嘉禾十年四月甘露降西河離石咸寧元年正月木連理生汝陰南頓四月白獐見琅琊趙王倫獲以獻是月甘露降張掖白雉見安豐松陽五月甘露降清河繹幕九月甘露降太原晉陽十二月白雉白雀見梁國睢陽梁王彤獲以獻二年四月木連理生清河五月甘露降玄菟郡治六月木連理生燕國十月黃龍二見於漢嘉靈關白兔二見河南陽翟陽翟令華衍獲以獻十一月白龍二見於梁國三年二月白虎見沛國七月白獐見魏郡是月木連理生始平鄠十一月白雉見渤海饒安相阮溫獲以獻四年六月白兔見天水八月木連理生陳留長垣五年二月白麟見於平原鬲縣六月甘露降巴郡南充國七月白烏見齊南隰太守獲以獻九月麒麟見河南陽城十一月青龍見京兆霸城是年木連理生義陽又生樂安臨濟太康元年正月木連理生涪陵永平三月白鹿見零陵泉陵四月木連里生頓丘是月白麟見於頓丘五月白鹿見天水西縣太守劉辛獲以獻又白鳥見襄城木連理二生濟陰乘氏沛國七月白鹿見零陵零陵令蔣微獲以獻是月木連理生馮翊粟邑八月白鹿見永昌南平又白龍三見于永昌九月白雉見中山二年正月木連理生榮陽密六月白雀二見河內太守阮侃獲以獻是月白雀二見河南河南尹向雄獲以獻七月白雄見太僕寺八月白兔見彭城十月白兔見趙國平鄉趙王倫獲以獻是月木連理十三生南安道三年四月木連理生琅琊閏四月白龍二見于濟南歷城六月嘉瓜異體同蒂生河南雒陽輔國大將軍王濬園是月木連里生廣陵海西八月白獐見梁國梁相解隆獲以獻四年正月木連理生馮翊臨晉蜀郡成都七月白虎見建平十一月白兔見北地富平十二月嘉禾生扶風雍是月白鳩見安定臨涇是月木連理生扶風五年三月甘露降東宮七月嘉禾生豫章南昌九月白獐見義陽六年八月白龍見于京兆陰槃七年三月木連理生河南新安四月甘露降京兆杜陵五月白獐見汲郡是月甘露降魏郡鄴六月木連理生南鄉范陽七月白雀見豫章八年閏三月嘉禾生東夷校尉國四月木連理生廬陵東昌八月白雀見河南雒陽九月嘉禾生東萊掖是月木連理生東萊廬鄉十二月白兔見陳留酸棗關內侯成公忠獲以獻九年九月木連理生陳留浚儀十二月青龍黃龍各一見于魯國十年五月白兔見京兆長安是月白雀見宣光北門華林園令孫邵獲以獻六月嘉麥生扶風郡一莖四穗是歲收三倍十月白虎見犍為十一月木連理生鄱陽鄡鄉是年白鳩見河南城太熙元年二月木連理生河南梁惠帝元康元年四月白烏見河南城皋縣令劉機獲以獻五月白烏見梁國睢陽是月木連理三生成都臨卬七月白燕二見酒泉福祿太守索靖以聞是月白烏見陳留獲以獻是月梁國內史任式上言武平界有柞櫟二樹合為一體連九月白鹿見交址武寧四年五月甘露降樂陵郡十月白兔見鄱陽七年三月成皋縣獄有龍升天愍帝建興元年六月甘露降西平縣八月嘉禾生襄平縣一莖十穗二年三月木連理生朱提是月木連理生益州雙柏六月木連理生襄平是月嘉禾生平州治三實同蒂九月麒麟見襄平刺史崔毖以聞十月大將軍劉琨掘地得玉璽使參軍郎碩奉之歸于京師三年四月赤雀見平州府倉七月嘉禾生襄平異體同蒂八月甘露降新昌縣十一月白雉見襄平元帝建武元年三月即晉王位乃備百官立宗廟社稷于建康今升州是大興元年正月麒麟見豫章七月木連理生武昌三年正月白鹿二見豫章四月甘露降琅琊費是月白鹿見晉陵延陵十一月木連理生零陵永昌元年九月白鹿見江乘縣二年正月赤烏見暨陽明帝太寧二年正月巴郡言甘露降十一月白烏見京都三年三月白烏見吳郡海虞獲以獻群官畢賀成帝咸和元年十月辛卯宣城春榖縣山岸摧獲石鼎重二斤受斛餘四年四月甘露降武昌郡閣前柳樹太守以聞五月白鹿見零陵洮陽獲以獻七月長沙郡邏吏黃光於南郡道遇白鹿驅之不去直來就光追尋光三百餘步光遠抱取遣吏李堅奉獻六年三月甘露降寧州城內北園桃榛樹刺史以聞是年鎮西將軍庾亮獻嘉橘一蒂十二實七年四月甘露降京邑楊州刺史王導以聞八年四月甘露降廬江襄安縣蔣胄家又降宣城宛陵縣之須里五月麒麟騶虞見遼東白虎見新昌縣是月木連理生昌黎九年四月甘露降吳國錢塘縣石鄉康巷之柳樹五月白鹿見吳國吳縣白鳶見吳國錢塘內史虞潭以獻八月白鹿見長沙臨湘十二月甘露降建平陵又降武平陵咸康元年四月甘露降西堂桃樹二年三月甘露降鬱林城內四月甘露降西堂又降尚書都堂桃樹又降會稽永興山陰及吳興武昌七月白鹿見豫章望蔡太守桓景獲以獻三年三月木連理生平州世子府治故園中四月甘露降殿後桃李樹五月甘露降義興縣陽羡里柞樹東西十四步南北十五步五年豫章南昌民掘地得銅鐘四枚太守褚裒以獻七年四月甘露降彭城上紘第內衆官畢賀十二月吳國內史王恬上言木連理生吳縣沙里八年九月廬江春榖縣留圭夜見門內有光取得玉鼎一枚外圍四寸豫州刺史以獻穆帝永和元年二月春榖民得金券一枚長五寸狀如鐵券明年桓溫平蜀三月廬江太守永上言於春穀城北見水岸邊有紫赤光取得金狀如印遣主簿李邁表送是月甘露降廬江郡內桃李樹太守永以聞八月有白麞見吳國吳縣西界包山獲以獻五年二月臨江太守藍田侯述言郡界木連理十一月太常劉邵上崇平陵令王昂即日奉行陵內甘露降于玄宮前殿十二月甘露降丹陽湖熟縣西界劉敖墓松樹縣令王恬以聞衆官畢賀八年十二月白麞見丹陽永世永世令徐該獲以獻十二年九月白鹿見鄱陽太守王耆之獲以獻十一月白麞見梁郡梁郡太守劉遂獲以獻升平三年十二月北中郎將郤曇獻白兔四年二月鳳凰將九雛見于豐城十一月鳳凰復見豐城衆鳥隨之五年二月南掖門有馬足陷地得銅鐘一枚四月鳳凰見於沔北海西公太和元年四月陽谷獻白兔簡文帝咸安二年正月甘露降隨郡聶陽縣界桑木沾凝十餘里中三月騶虞見豫章孝武帝康寧三年六月江寧縣建興里僑民李康家有樹異本連理太元三年七月乙酉老人星見南方十年七月丁巳老人星見十一年四月琅琊費有榆木異根連理相去四尺九寸八月白鳥集江州寺庭群鳥翔衛十二年八月甘露降寧州界內刺史費統以聞十四年六月寧州刺史費統上言所統晉寧之滇池縣舊有河水周回二百餘里有神馬二匹一白一黑出於河中去岸百步縣民董聰見之十一月白虎見豫章郡十五年三月白兔見淮南壽陽閏月甘露降永平陵十六年三月白鹿見豫章望蔡獲以獻十一月甘露降句陽縣是月白雀見南海增城縣民吳北屋十七年二月甘露降南海番禺縣陽十八年五月白鹿見江乘江乘令田熙之獲以獻十月臨川東興令惠欣之言縣東南溪旁有白銀樹芳靈樹李樹並連理十九年正月華林園延賢堂西北李樹連理二月行鞏令劉啓期行溫令趙邳並言白虎頻見二十年九月白鹿見巴陵清水山荊州刺史殷仲堪以獻二十一年正月木連理生南康寧都縣社後五月白烏見吳國獲以獻安帝隆安二年十月新野言騶虞見二年武陵臨沅獻安石榴一蒂六實十一月木連理生汝陽太守垣苗以聞五年十一月襄陽言騶虞見于新野白雀見宜都是月白鹿見長沙白麞見荊州刺史桓玄以聞元興元年正月木連理生泰山武陽二年十月甘露降武昌王成基家竹三年三月甘露降丹徒四月甘露降蘭臺六月白雀見豫章新塗獲以獻義熙元年南康雩都高山有金雞青黃色飛集巖間二年四月無錫壽陽並獻白兔七年五月白雉見豫章南昌十二年六月左衛兵陳陽於東府前淮水中得玉璽一枚
