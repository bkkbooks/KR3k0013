body:
  text: 符瑞三符瑞三唐高祖武德元年五月受隋禪都長安改隋大興殿為太極殿昭陽門為順天門離宮別館游憩之所並廢二年正月寧州獻白雉壬子麟州獻白鹿二月涪州上言李樹連理閏二月沁州上言慶雲見又渝州言甘露降三月安昌縣言太行山聖人崖響云唐國興治萬年四月有獻李樹連理盤屈如龍六月澤州言騶虞見七月益州獻嘉禾一莖六穗九月合州言慶雲見又梓州言景雲見十月河州言慶雲見三年二月鄯州言一角獸見鹿身五色牛尾馬蹄三月甘露降於華陰又甘露降於御史臺五月郇州獻瑞石有文曰天下萬年七月靈州言白龍見商州言白狼見鄯州言麟見四年二月白狐見玄武門綿州言甘露降肅州獻嘉禾一莖五穎四月慶州言慶雲見六月方州言慶雲見益州獻芝草如人狀毫州上言老子廟枯樹生枝葉五年正月代州言慶雲見豐州言騶虞見梁州言野蠶成繭百姓得而用之六年西沙州言甘露降彌漫一十五里益州言慶雲見管州言麟見七年陝州獲白石璽一紐章與傳國璽同仁州言騶虞見長安古城監渠水生藍色紅白而味甘狀如方印遼州獲玄兔萬年縣言甘露降九月丹州言河水清八年四月赤雀巢於殿門宴五品以上上頌者十餘人極歡而罷連州言甘露降徧於城廓九年正月西韓州獻芝草異莖同蓋二月蒲州言河水清四月甘露降於中華殿之桐樹凝泫如冰霰以示群臣六月於納義門獲白雀一己卯雅州涇陽縣生嘉禾異畝同穎是月益州獻白鹿陝州言白狼見七月幽州慶雲見海州言鳳凰見於城上群鳥數百隨之東北飛向蒼梧山徐州言慶雲見太宗以武德九年八月即位明年正月乙酉詔曰朕遐觀方冊歷選前聖大道既隱至公斯革莫不思樹風聲用隆龜鼎太皇膺籙受圖功成治定鄙聖人之餘事顧天下而窅然永言俗累高居物表爰以大寶俯授微躬自肅奉神器亟移仄律三正在旦萬國來庭長世之術既弘惟新之命方始體元居正今則其時可改武德十年為貞觀元年盡二十二年貞觀元年閏三月甘露降於長安縣五月豫州言白狼見十月和州言鸞見二年三月宜州言白狼見六月長安縣獻嘉禾戊戌郭州言白狼見九月甘州獻白馬朱鬣十月安州言騶虞見三年四月甘露降於雍州五月癸亥龍見玉女泉乙丑幽州言麟見七月宣州言甘露降壬子申州言木連理十二月潞州獻嘉禾四年三月赤雀見於萬年縣五年二月嶲州慶雲見四月甘露降於萬年縣六年四月楚州言騶虞見癸卯醴泉出丹霄殿之西命公卿以上示之因置酒於側賜帛各有差七年二月醴泉湧出於綿州之香溪痼疾者飲之多愈八年四月沂州言白鹿見九年閏四月衡州言騶虞見五月萬年縣獲白雀戊申和州言棠樹連理十月黎州言鳳凰見十一月瀛州獻白狼十二月京師蒼鳥見楊州獻白雀是月獲麟於德州十年二月白鹿見於九成宮之冷泉谷三月襄州言騶虞見八月雒州言鳳凰見十一年五月麟見京師之後苑九月醴泉出痼疾者服之皆愈十二年六月滁州言野蠶成繭於山阜九月楚州野蠶成繭徧於山谷濠州廬州獻野繭十月隰州言青龍見營州獻玄狐十三年正月濟州獻白鹿三月吉辰廄產白馬朱騣八月幽州獻嘉禾一莖九穗十四年二月陝州言河水變清司空無忌等詣闕上表曰臣聞崑崙載極道玄液以周天積石流源委蒼波而括地俯作神州之紀仰膺上帝之官水德靈長斯其謂矣故能道符千載位長百川瑞馬開圖發榮光於遠代應龍闢壤致宅土於遐年自此不追寂寥難俟天之祚聖復在於茲伏惟皇帝陛下則哲承基窮神闡化功綿寓外德耀瀛表文教蔚乎三五至道格乎地天是以禎凝藪澤慶溢風煙丹井輝奇青丘表異嘉苗合穎入豐膳以鳴鐘天駟攝雲播頌聲於綴兆西鶼南雉之貴日至月書連珠湧醴之徵雲飛霧集宜其展事嬴里仰告成功出豫介丘方騰茂實猶且宵衣旰食若有追而不逮對越嘉祉乃固辭而弗居遂使萬土韜華三神鈌望西皇佇詔申以德水之祥東岳希封勗以清河之貺伏見陝州刺史房仁裕狀稱所管界內二百餘里正月元日黃河載清謹案易乾鑿度曰聖人受命河水清京房飛候曰河水清天下太平繇是納渭含涇混流同潔凌門泑澤別派俱清馬頰馳波詳觀若鏡龍門激箭回眺飛空拍天之典煥然馮夷之都可見千尋朗徹俯映玄珠一曲澄鮮遙觀紫貝盡河宗之奧秘洞水府之仙靈豈非天鑑詳明不愛其道神心昭著在感斯通何幽顯合符人祗交際理均形見若斯之效歟臣等沐道醉心觀洋駭目披圖逖聽矌古無聞寔慶生涯親承旦暮詔答曰嘉瑞爰降必資至德大河效祉寔為希世顧惟寡昧但增慚惕乃天地表祥宗社垂祐欲使四海隆平八荒禔福王公卿士內外庶僚宜勉修正道以副靈貺焉三月秦州言河清七月白龍見於富平九月杭州言青龍見十五年二月開州言白龍見三月肅州言所部川原徧生芝草四月慶州言騶虞見冀州獻白狼五月癸未廬山府獻白鹿乙酉安禮門御榻產芝草五莖六月滁州言青龍見庚子商州言慶雲見七月洪州獻玄珪滄州言青龍見丁亥靈州言景雲見八月嘉州撫州各言慶雲見衡州言白鹿見九月滄州言龍見十一月幽州言五色雲見十六年正月宣州言慶雲見七月朔鄜州言白龍見溫州各言景雲見八月申州獻白雉九月金州言青龍見十月滑州獻白狼十一月箕州言景雲見湖州言慶雲見十二月宋州言青龍見十七年三月杭州言木連理二十四株有植黎二木合為一體有雄雉飛集東宮顯德殿前太宗問群臣曰頃來頻有雉集是何祥也諫議大夫褚遂良曰昔秦文時有童子化為雉雌者鳴於陳倉雄者鳴於南陽童子言曰得雄者王得雌者霸文公遂以為寶雞祠漢光武得雄遂起南陽而有四海陛下舊封秦王故雄雌見於秦地既古來將為祥貺所以彰表明德太宗曰立身之道不可無學遂良所對深為可重五月雍州獻三足烏己未湖州言甘露降潤州言慶雲見華平出於玄武門之池懷州獻白狼湖州言慶雲見閏六月柳州言慶雲見丹州獻白鹿七月鄜州言景雲見辛卯常州言青龍見八月涼州言昌松縣鴻池谷有石青質白章為文曰高皇海出多子李九王八千太平天子李世民王千年太子李治書燕山人士樂大國主尚汪諤獎文仁道千古天王五王六王七王十王鳳毛才子七佛八菩薩及上果佛佛田天子文武貞觀昌大聖延四方上下萬里忠者仙戈八為善九月魏州言慶雲見皇太子寢室產紫芝二十四莖竝為龍興鳳翥之形十一月竝永滁州景雲見鄭州河水清懷州河水清永州言慶雲見廓州獻白狐十八年正月嘉州言青龍見臺州言甘露降嶲州言慶雲見四月豫州言白龍見五月鄆州獻白狼六月辛亥鄭王府獻白狐瀛州言慶雲見七月會州言青龍見朗州言青龍見壬午滁州言景雲見八月商宋蘭鄧雒五州言景雲見曹雒二州言景雲見趙州獻白鹿九月汝州言青龍見十月潞州言慶雲見山南獻木連理交錯玲瓏有同羅目一丈之餘竝枝者二十餘所十一月湖州言慶雲見十九年二月岳州獻毛龜二滁州言騶虞見十月老人星見十一月費州言慶雲見渠州言青龍見二十年正月汝州言甘露降二月潮州言慶雲見戊午許州獲白狼二月德州言景雲見鄆州言一角獸見景戌冀州景雲見四月房州言赤雀見五月襄州言慶雲見景申澤州言甘露降七月安州言白龍及慶雲見穀州言景雲見八月老人星見九月澤州言白鹿見十月亳州言甘露降十一月雍州言甘樹一株有十八處連理李樹生芝英赤紫莖光色鮮麗陝州言青石理成文曰李君王三字汾州言青龍白龍見白龍吐物初在空中有光如火至地陷入二尺掘之則玄金之形團斜廣高六七寸疊州言五色雲見兗州言青龍見二十一年四月兗州鸞見易州言慶雲見六月始州言景雲見淄州言鳳凰見壬申亳宋二州各言慶雲見白龍見於鄆州懷荊二州言景雲見辛酉趙州言慶雲見七月懷襄同鳳瀘宋亳蓬綏等州言慶雲見鄆州言白龍見八月綏州言慶雲見九月崖州言白龍見岷州言慶雲見老人星見開州言景雲見十月南代州騶虞見戊戌綏州言景雲見二十二年正月玉華官李樹連理隔澗澗原作闊據唐會要卷二十八改合枝二月懷州河水清原州言景雲見六月洮州言白龍見循州言景雲見七月襄州言慶雲屢見定襄都督府言慶雲見八月昭州洪州言慶雲見九月晉州言慶雲見巴州沂州皆言慶雲見遂州涪水中獲古鼎受五石三㪷旁有銘刻取初風雨晦冥響若洪鐘十二月絳綿代潞五州並言慶雲見閏十二月朗州言慶雲見二十二年三月代州言慶雲見四月壬申靈州言河水清高宗永徽五年六月濟州言黃河清一十六里皎然澄徹是歲大稔雒州米斛至兩錢半粳米斗至十一文顯慶元年二月岐州獻一角獸五月岐州五龍見於皇后泉龍朔元年二月益綿等五州皆言龍見於是改元六月兗州青龍三十九見三年十二月詔以絳州麟見于介山含元殿前瑯臺閣內竝睹麟跡改來年正月為麟德元年在京及雍州諸縣見繫囚徒各降一等杖罪以下竝免之上元三年十一月陳州上言鳳凰見宛丘縣睿宗唐隆元年六月甲辰即位大赦天下是日慶雲見于東方丙午楊州上言慶雲白雉見七月己巳冊玄宗為皇太子是日有景雲之慶改元為景雲元年景雲二年六月雒州上言兩岐麥八月以高祖舊宅有柿樹天授中已經枯死至是重生因而大赦天下十月寧州嘉禾異畝同穎江州上言神泉湧十二月光州上言李樹連理三年正月有事於南郊是日佳氣四塞太極元年五月戊寅睿宗有事於北郊是日東南有紫氣扶日上延和元年六月涼州上言赤雀見玄宗先天二年八月江州獻靈龜六眸腹下有玄文象卦文懷州上言有嘉禾四穗十月有事於太廟是日慶雲見開元元年十二月有麟見於峽州遠安縣之鬼谷仙洞二年正月丙寅涼州獻朱騣尾白馬庚午原州獻肉角羊八月太子賓客薛謙光獻東都九鼎銘其豫州鼎銘武后所製文曰義農首出軒昊膺期唐虞繼踵湯禹乘時天下光宅域內雍熙上玄降祉方建隆基宰相姚崇盧懷慎等奏曰聖人啟運休兆必彰故化馬為龍預流謠頌秀為天子早著冥符臣等今見薛譙光所獻東都鼎銘大聖天后所製其文云上玄降祉方建隆基豫州處天地之中所以遠包四海銘文獨聖后所製固必先感二儀靈慶昭彰曠絕今古臣等忝陪近侍喜萬常情請宣付史官並頒示內外許之七年閏七月虢州奏閿鄉縣桃林鄉醴泉湧出楊州奏楊子縣一角獸見八月老人星見其色黃明而大八年正月甘露降五月德州奏平原縣麥一莖兩岐分秀八月老人星見十二月隰州慶雲見璧州甘露降齊州嘉禾生鄂州芝草生徐州獲白野雞岐州獲白鷰進之九年三月汝州奏魯山縣之堯山有白鵲見于許昌縣之唐祠掘地得古銅樽上又隱起雙鯉篆書文曰宜子孫竝請宣付史官從之五月絳州奏正平太守兩縣瑞麥七莖兩穗一莖四穗十月洪州慶雲見十一月蘄州奏蘭溪縣芝草生十一年正月行幸北都紀功於太原府之南街有連理李樹連理甘棠生于太原縣二月祠后土于汾陽之雎土太史奏榮光出河休氣四塞徘徊遶壇日揚其光有司奏脩壇掘地獲古銅鼎二其大者容一斗色皆青又獲古磚長九寸上有篆書千秋萬歲及長樂未央字又有赤兔見于壇側十一月癸酉日長至太史奏曰平明陰雲祁寒及其日出有雲迎日又有祥風至須臾日出有黃白冠及日南有珥臣謹按黃帝占云冬至之日陰雲祁寒來歲大稔人安五穀豐熟又曰風不及地和緩而來謂之祥風王者德至於天則祥風起日冠旦珥人主有嘉並太平之嘉應臣請宣付所司許之十二年五月溱州慶雲見太原獻異馬駒其耳如筒左右各一十六肋肉尾無毛六月景申光州五色雲見乙巳河南府之告成縣王利文家瑞麥生穗分岐一莖三秀利文上表曰陛下往在藩邸扈從三陽在臣宅上休憩臣宅北坂之下陛下以為毬場自夏徂秋往來遊賞其地因感聖氣今有瑞麥生苗或六穗分榮或一莖數秀方圓縱橫不離場邊自非至德潛通豈有瑞應若此詔賜利文絹三十疋遣之十月合州慶雲見閏十一月豫州言白獐見十三年五月甲申瑞麥生于河南府之壽安縣勸農使宇文融上表稱賀甲午潞州白鹿見戊戌以親製西嶽碑示百寮有五色雲見於前己亥代州甘露降九月兗州奏白雀見十月丁卯太史奏白雀見壬申萬年人王慶築垣掘地獲寶鼎五獻之四鼎皆有銘銘曰垂作尊鼎萬福無疆子孫永寶丁丑白鵲見於行宮十一月丙戌封禪至泰山之下戊子有雄野雞飛入齋宮馴而不去久之飛入仗衛忽不見邠王守禮等賀曰臣謹按舊典雌來者霸雄來者王又聖誕酉年雞主於酉斯蓋王道遐祚天命休禎請宣付史官以彰靈貺從之己丑日南至上備法駕登山至齋室其夕陰霧慘烈勁風四起裂幕折柱寒氣切骨上露立祈請仰天自誓曰某身有過請即降罰萬人無福亦請某為當罪應時風雨止天地清晏日氣和煦及升壇休氣四塞登歌奏樂有祥風自南而至絲竹之聲飄若天外及禪社首五色雲見日重輪及還山下之齋宮有慶雲隨馬祥風遶路時中書令張說等蹈舞拜賀帝日朕以薄德恭膺大寶雲物休洽皆是輔弼之力君臣相保勉副天心長如今日不敢矜怠說等又奏曰聖心誠懇昨夜齋居則息風反雨今朝封祀則天清日暖復有祥風助樂卿雲引燎靈跡盛事自古未聞陛下又思慎終如初長福萬姓天下幸甚十四年八月梓州言慶雲見通州言芝草生九年晉州神山縣玄元皇帝廟根子樹兩枝連理合成一枝十月己巳帝至自汝州之溫湯時有五色鸚鵡能言育于宮中帝令左右試牽御衣鳥輒瞋目叱吒岐王文學能延景因獻鸚鵡篇以贊其事帝以鳥及延景詩示百寮尚書左丞相張說上表賀曰伏見天恩以靈異鸚鵡及能延景所述篇出示朝列臣按南海異物志有時樂鳥鳴皆曰天下太平有道則見臣驗其圖丹首紅臆朱冠綠翼與此鸚鵡無異而心聰性辨護主報恩故非常品凡禽實瑞經所謂樂鳥也延景雖識其事未正其名望編國史以彰聖瑞許之十二月丙午越州言李樹連理癸丑邢州申州各言慶雲見十五年四月彭州言白兔見八月壬寅海州白麞見丁丑資州言慶雲見閏九月億歲殿生芝草一莖十月汝州言嘉禾生簡州言慶雲見十六年三月京兆府三原縣浪井出七月慶雲見于仙州葉縣十一月日南至帝御含元殿受朝賀太史奏黃雲扶日請付有司從之十七年五月庚寅有靈芝草產于太廟第九室殿柱甲寅有赤雀見于冀州一雄一雌六月有浪井出梓州十月睦州獻竹實十八年四月辛酉壽州獻白雀甲午嘉州奏楠木生連理枝廣州獻紅鸚鵡五月辛丑徐州奏慶雲見甲辰陝州奏靈芝產六月甲申沁州奏月抱瑞彩揚光五色乙酉鄂州奏景雲見十九年二月癸未皇太子鴻等奏曰昨正月二十七日伏見陛下於典慶宮親耕三百餘步既而青光紫氣覆地四月己卯楊州奏穭生稻二百一十頃再熟稻一千八百頃其粒與常稻無異壬辰河南府登封縣唐村李嗣谷當陽山南面石文舊有帝字新生上字識者以為聖明之應河南尹孟溫禮奏賀六月癸未有浪井出於卯州之龍興觀之平地泛溢五色相煇浮彩彪炳壬申芝草生於京城之勝業寺一本七莖心黃外紫八月辛巳上降誕之日有黃雲三道於西方九月乙未冀州任丘縣孝悌鄉嘉禾生庚申婺州永康縣嘉禾生一莖五穗神羊產于京兆之興平縣二十年三月有一角獸肉角當頂白毛上捧識者以為獬豸二十一年二月衢州獲魚有銘獻之侍中裴光庭等奉賀六月庚子眉州獻寶鼎重七百斤無耳足有篆文數字時渝州刺史段懷本奏此鼎到陳州界之對溪驛雲霧暗合有白虹逼鼎臣恐淪失不勝驚懼請至合州取陸路至京許之癸丑蓬州奏枯樹上生李枝結實絳州奏龍興觀池同心蓮一莖八月癸亥沂州產紫芝三莖是夜五更二籌後南方景上老人星見其色黃白太史奏曰臣謹按春秋文曜鉤云王者安靜則老人星臨其國主壽昌萬人安常以秋分節候之南郊今應期而見請付所司從之二十二年五月河州慶雲見八月幽州奏千秋節日有慶雲見於夷軍又軒轅皇帝廟中古井湧浪泛溢又安次縣百姓家產連理樹及大麥一本一十八莖穗秀兩岐十月尚書左丞相蕭嵩率百寮奏曰伏見所司奏今年祥瑞祥風起日抱戴嘉禾秀芝草生甘露降醴泉湧木連理瓜同蒂竹再生李成實馴鳩玄鶴慈烏鶺鴒寶鼎魚銘錢刀磚字等二十有一事臣聞惟德感神惟祥祚聖有欲之而莫致或不召而自彰蓋所謂天之輔人福之先見者也伏惟開元神武皇帝陛下狥齊敦敏欽明光宅三靈以泰百度惟貞故感應日聞珍符歲積蓋祥風者昭乎號令抱戴者表以納忠嘉禾主於同文芝草明於敬老甘露灑神靈之液醴泉發德澤之滋草木秀其地靈羽毛呈其天瑞其餘山川異氣器用殊姿舉而必然不可勝紀斯並玄天幽贊黃靈合德非大聖不能降其祥非太平不能當其應請宣付史官傳于後代上手詔報曰虔奉宗社昭事天地幸蒙垂祐降此禎祥豈自厥中以彰其外歸之于朕是用多慚宣付史官依卿所請二十三年二月丁未綿州白鹿見己酉安州慶雲見五月丁卯藍州有浪井出及醴泉滂湧癸未晉州慶雲見六月丙戌文州慶雲見壬子京兆富平縣瑞大麥生一莖五穗華州下邽縣瑞大麥生一莖三穗京畿採訪使御史中丞盧奐奏賀八月幽州長史張守珪奏榆關內有蝚蝗蟲食田稼蔓延入平州界俄頃有群雀來食此蟲一日食盡平州稼穡無有傷者九月乙丑楚州慶雲見十月沂州芝草生一莖九寸十岐乙未京兆府奏盩厔縣嘉禾生戊申楊州奏獲毛龜其色青庚戌朔州奏甘露降嘉禾生十一月楚州陵州會州並言慶雲見沂州密州皆奏芝草生十二月龍池聖德頌石自鳴其音清遠有如鐘聲百官等上表稱賀二十四年三月獲瑞獸首耳形類虎尾長於身有豹文能食虎七月辛巳沂州慶雲見瑞麥生壬午臺州鄆州並言慶雲見乙酉荊州萬州並言慶雲見八月戊申常州有神龜見綠毛黃甲庚戌老人星見黃色明靜而大太史奏曰臣謹按春秋文耀鉤王者安靜則老人星見孫氏應瑞圖云王者承天則老人星見臨其國又黃帝占云老人一名壽星色黃明大則主壽昌天下多賢士伏惟陛下以千秋節日祀于星壇而祭期將臨美應先至知曆數之方永嘉萬壽之昌期請付史官以光典策許之二十五年四月丁卯幽州慶雲見五月丁丑白鵲見戊寅河清八月丁未千秋節宴群臣於勤政樓下太史奏曰今日卯時有祥雲出東方及其樂作非煙燭於西北己午之時日有抱戴伏以陛下聖曆方永福履無疆洊臻嘉瑞之符載洽繞樞之日臣等不勝忭躍請宣付史館許之十月庚申宰臣李林甫牛仙客祭南北郊有瑞氣縈壇祥風拂地太史奏令日陛下虔報豐稔昭祭神祗臣謹候天地清謐星辰明朗初祭則樽俎適陳祥風拂地既奠之後瑞氣縈壇其風則暢和緩之候其氣乃蓄龍鳳之色臣謹按王者德至於天則祥風起又堯沈璧於河休氣四塞伏惟陛下一德馭物而天祥薦祉盡皇王之靈貺躋蒼生於仁壽請宣付所司編入史冊許之十一月青州奏日光五色十二月泗州奏日抱戴二十七年七月己卯蒲州刺史韓朝宗奏新置靈貞觀有慶雲見連理樹生壬午河西隴右節度使蕭炤討吐蕃大破之有慶雲見於陣前白兔舞於營中請編史冊許之二十八年陝州青州皆言慶雲見四月庚辰有慈烏巢于紫宸殿之拱侍中牛仙客中書令李林甫上表賀曰臣等伏因侍奉之際天恩令臣升殿觀此烏巢陛下孝弟之至通於神明仁慈所育豈獨黎庶故得上玄協應靈烏呈瑞翱翔不離於廷際棲集必歸於軒檻或人俗所有但止於園林今聖感而來乃巢於殿拱依人無懼戀主愈馴博考圖籍未之有也臣等幸忝樞近親睹休祥望頒示中外以彰靈感手詔報曰所聞不如所見故引卿等觀之頒示寰中俯依來請辛巳又有慈烏巢於宣政殿之拱仙客林甫又上表賀曰陛下孝友因心慈仁被物故得上帝儲祉靈烏發祥高棟重櫨共瞻爰止前軒內殿皆睹來巢視之彌馴逼之不懼休祐重沓而交應徵求古今而未聞臣等何人屢觀嘉瑞望與前狀同宣中外克紀禎符手詔報曰兩殿巢禽其義一也但有慚德深謝仁慈頒示四方隨卿所請二十九年正月亳州刺史鄭愿奏玄元皇帝廟中之井涌氣成雲五色相映三月甲申滑州刺史李邕獻馬一匹表云其馬肉鬃鱗臆嘶不類馬聲日三百里邕任淄青刺史日遇一老翁云聖主將得龍馬以應太平邕遂於青州馬會思家獲而獻之己丑亳州奏老君廟九井先涸自奉詔增修觀宇九泉皆湧及樹巳枯復榮四月甲寅深州奏連理甘棠樹生于陸澤縣甲戌溫州奏日抱戴揚光五色五月戊午有白雀白烏見於原州之平原戊寅有慶雲見於亳州真源縣之玄元皇帝廟兼有白鵲翔于廟門樓六月甘露降於司農寺八月命有司於興唐觀設齋自內迎玄元皇帝真容于觀宰臣已下百官悉行香有慶雲見天寶元年正月戊申安西都護田仁畹於于闐東王河獲瑞玉龜一盡以獻癸丑太史上言今旦卯時日有紅碧黃氣數見及紫赤雲氣潤澤鮮明在日上謹按瑞應圖名曰慶雲太平之應請編入史冊許之六月壬辰信都瑞麥生臨州郡人李嘉裔所居柱上芝草生形類尊容屢陳光彩太守張景佚拔柱獻之乙未隴右節度皇甫惟明奏龍支縣人庫狄孝義有馬生龍駒經九旬有九日身有鱗而不生毛臣就檢視時有慶雲五色遙覆馬上久而不散伏望宣付史官以光實錄從之睢陽郡嘉麥生一莖八十一穗八月乙酉老人星見二年三月南郡奏所部紫極宮有慶雲見三載三月癸酉興慶宮合鍊院芝草生一本六莖丙子武威郡上言番禾縣之天寶山有醴泉湧出嶺石化為瑞麵遠近貧乏者取以給食五月京兆尹奏所部芝草生四載八月戊子有班鹿產白鹿于苑中獻之請宣付史館上曰宮苑之內屢薦嘉祥今又縞質霜毛變林虞之獸族殊姿馴性實雲駕之龍媒允謂休徵用為慰也所請者依癸巳京兆之新豐嘉禾生或九穗六穗九月河南府登封縣嘉禾生一本十二穗五載五月乙卯河東郡太守李知柔奏乘泉縣潘水修功德處有白魚引舟五色雲起望宣付史館從之丙戌鄱陽郡上言甘露降於所部紫極宮之松樹絳郡上言姑射山修功德處有慶雲捧日七月汝陰郡上言有嘉麥生一莖兩岐七載三月有玉芝生於大同殿之柱礎一本兩莖神光炤於殿上命文武百寮入觀之八載六月大同殿又產芝一莖九載二月甲戌獻陵昭陵乾陵定陵橋陵等五陵柏樹盡垂甘露壬寅華陰郡奏白鶴見於西嶽五福峰甘露降大羅峰之醮壇白鹿見于大羅東南峰駕鶴嶺衛叔卿之得仙處請付史館從之七載七月有鹿產白麛于閑廄之試馬殿八月癸丑黔中郡紫極宮慶雲見甲寅上雒陽慶雲見丁巳丹陽郡茅山鍊丹院生芝草一莖庚午蘄春郡之天長觀聖容玉石蓮花座上生紫芝一本七莖九月壬午夜太史奏壽星見於景上大明色黃十月乙丑御朝元閣有慶雲見上賦詩群臣畢和癸酉丹陽郡茅山慶雲見白鶴群飛十一月長至太史奏北方有黑雲氣四方俱有薄黃雲佳氣濃厚又有黃氣扶日十二月餘杭郡慶雲見化樓閣勢兼有仙人形象乙卯彭城郡有慶雲見十四載三月南道觀察使源涓奏江陵郡古紀城東有紫氣成雲中有一人衣白衣乘雲氣向上其時安南招討使康令謙及同行軍將等同見臣謹畫圖奉獻伏望宣示中外編諸史冊從之四月劍南道獲白兔一獻之八月癸巳老人星見己亥中書省五色雲見庚子樂安郡上言嘉禾及獲白鵲白雀壬寅京兆府奏嘉禾生而獻之癸卯東平太守嗣吳王祗奏所部壽張順昌兩縣鹹穀櫓生丙辰蜀郡奏慶雲九見十月盧江郡人王恭家有李樹連理結紫實癸酉幸華清宮有石產玉芝宰相楊國忠請宣付示朝廷編諸史冊從之十五載六月玄宗幸蜀七月壬戌至益昌郡濟州於吉伯渡有雙白魚夾御舟而躍識者謂之兩隻飛龍焉
