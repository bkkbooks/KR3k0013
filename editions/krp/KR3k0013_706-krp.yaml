body:
  text: 册府元龜卷七百六宋王欽若等撰令長部强毅臯陶之述九徳其一曰强而義仲尼曰剛毅木訥近仁又曰士不可以不𢎞毅若夫宰百里之邑為千室之長非夫志除豪横不畏強禦亦何以庇民而興化哉戰國而下居是職者乃有力祛蠧政深抑權倖敢犯貴勢窮討姦宄専任威克資以武㫁用能保安罷弱澄清邑里巨猾收歛而知懼下吏震慄而不欺盗徙於鄰邦聲震于别部苛慝屏去政化以成自非器識邁倫勁直成性見義而有勇遭事而不惑者亦疇能及於是乎魏西門豹為鄴令豹往到鄴㑹長老問之民所疾苦長老曰苦為河伯娶婦以故貧豹問其故對曰鄴三老廷掾常嵗賦歛百姓收取其錢得數百萬用其二三十萬為河伯娶婦與祝巫共分其餘錢持歸當其時巫行視小家女好者云是當為河伯婦即聘取洗沐之為治新繒綺縠衣閒居齋戒為治齋宫河上張緹絳帷女居其中為具牛酒飯食行十餘日共粉飾之如嫁女床席令女居其上浮之河中始浮行數十里乃沒其人家有好女者恐大巫祝為河伯取之以故多持女逺逃亡以故城中益空無人又固貧所從来久遠矣民人俗語曰即不為河伯娶婦水来漂没溺其人民云豹曰至為河伯娶婦時願三老巫祝父老送女河上幸来告語之吾亦往送女皆曰諾至其時豹往㑹之河上三老官屬豪長者里父老皆㑹以人民徃觀之者二三千人其巫老女子也已年七十從弟子女十人所皆衣繒單衣立大巫後豹曰呼河伯婦来視其好醜即將女出帷中来至前豹視之顧謂三老巫祝父老曰是女子不好煩大巫嫗為入報河伯得更求好女後日送之即使吏卒共抱大巫嫗投之河中有頃曰巫嫗何久也弟子趣之復以弟子一人投之河中有頃曰弟子何久也復使一人趣之復投一弟子河中凡投三弟子豹曰巫嫗弟子是女子不能白事煩三老為入白之復投三老河中豹簮筆罄折嚮河立待良久長老吏傍觀者皆驚恐豹顧曰巫嫗三老不来還奈之何欲復使廷掾與豪長者二人入趣之皆叩頭叩頭且破額血流地色如死灰豹曰諾且留待之須㬰須㬰豹曰廷掾起矣状河伯留客之久皆罷去歸矣鄴吏民大驚恐從是以後不敢復言為河伯娶婦漢義縱武帝時任長陵及長安令直法行事不避貴戚以捕按太后外孫修成子中修成君王太后所生金氏女也中者其子也帝以為能胡建昭帝時為渭城令帝㓜皇后父上官安與帝姊葢主私夫丁外人相善外人驕恣怨故京兆尹樊福使客射殺之客藏公主廬吏不敢捕建將吏卒圍捕葢主聞之與外人上官將軍多從奴客往犇射追吏奔走赴之而射也吏散走主使僕射劾渭城令㳺徼傷主家奴建報亡它坐言㳺徼奉公無他坐也盖主怒使人上書告侵辱長公主射甲舎門甲舍即甲第公主之宅知吏賊傷奴辟報故不窮審言為㳺徼避罪而妄報文書故不窮治也大將軍霍光寝其奏後光病上官氏代聼事下吏捕建建自殺何並字子㢘哀帝時為長陵令道不拾遺初功成太后外家王氏貴而侍中王林卿通輕俠傾京師後坐法免賔客愈盛歸長陵上冡因留飲連日並恐其犯法自造門上謁謂林卿曰冡間單外君宜以時歸林卿曰諾先是林卿殺婢婿埋冡舎並具知之以非已時又見其新免故不發舉欲無令留界中而已即遣吏奉謁侍送林卿素驕慙於賔客並度其為變儲兵馬以待之林卿既去北度涇橋令騎奴還至寺門㧞刀剥其建鼓諸官曹之所通呼為寺建鼓一名植鼓建立也謂植木而旁懸鼓焉縣有此鼓者所以召集號令為開閉之時並自從吏兵追林卿行數十里林卿迫窘廼令奴冠其冠被其襜褕自代乗車從童騎身變服從間徑馳去㑹日暮追及收縳冠奴奴曰我非侍中奴耳並心自知已失林卿廼曰王君因自稱奴得脱死刑叱吏㫁頭持還縣所剥鼓置都亭下署曰故侍中王林卿坐殺人埋冡舎使奴剥寺門皷吏民驚駭林卿因亡命衆庶讙譁以為實死讙譁衆議也成帝王后以功成太后愛林卿故聞之涕泣為言哀帝哀帝問状而善之遷並隴西太守尹公為茂陵守令原渉為中郎免官欲上冢不欲㑹賔客宻獨與故人期㑹渉單車敺上茂陵投暮入其里宅因自匿不見人遣奴至市買肉奴乗渉氣與屠争言斫傷屠者亡是時尹公新視事渉未謁也聞之大怒知渉名豪欲以示衆厲俗遣兩吏脅守渉室日中奴不出吏欲便殺渉去渉廹窘不知所為㑹渉所與期上冢者車數十乗到皆諸豪也共説尹公尹公不聼諸豪則曰原巨先奴犯法不得使肉袒自縳箭貫耳詣延門謝辠於君威亦足矣尹公許之渉如言謝復服遣去巨先渉字也令渉如故著衣服也後漢趙憙建武中為懐令大姓李子春先為瑯邪相豪猾并兼為人所患憙下車聞其二孫殺人事未發覺即窮詰其姦收李子春二孫自殺京師為請者數十終不聼董宣建武中為雒陽令時湖陽公主蒼頭白日殺人匿主家吏不能得及主出行而以奴驂乗宣於夏門亭候之乃駐車叩馬以刀畫地大言數主之失叱奴下車因格殺之主即還宫訴於光武帝大怒召宣欲箠殺之宣叩頭曰願乞一言而死帝曰欲何言宣曰陛下聖徳中興而縱奴殺良人將何以理天下乎臣不須箠請得自殺即以頭擊楹流血被面帝令小黄門持之使宣叩頭謝主宣不從强使頓之宣兩手據地終不肯俯主曰文叔為白衣時蔵亡匿死吏不敢至門今為天子威不能行一令乎帝笑曰天子不與白衣同因勅强項令出勅令詣太守賜食宣受詔出飯盡覆桮食机上大官以状聞上問宣宣對曰臣食不敢遺餘如奉職不敢遺力賜宣錢三十萬宣悉以班諸吏由是摶擊豪强莫不震慄京師號為卧虎歌之曰枹皷不鳴董少平少平宣之字也馮魴建武中為虞令為政敢殺伐以威信稱遷郟令後光武西征隗囂潁川賊起攻圍縣舍魴力戰弩矢盡城䧟魴遁去帝聞叛馳赴潁川魴詣行在所帝案行鬬處知力戰乃嘉之曰此健令也虞延建武末為雒陽令是時隂氏有客馬成者甞為姦盗延收考之隂氏屢請獲一書輙加篣二百信陽侯隂就乃訴帝譛延多所寃枉帝乃臨御道之舘親録囚徒延陳其獄状可論者在東無理者在西成乃回欲趨東延前執之曰爾人之巨蠧久依城社不畏熏燒今考實未竟宜當盡法成大呼稱枉陛㦸郎以㦸刺延叱使置之帝知延不私謂成曰汝犯王法身自取之呵使速去後數日伏誅於是外戚歛手莫敢千法杜安為宛令先是宛有報讎者其令不忍致理將與俱亡縣中豪强有告其處者致捕得安深疾惡之到官治戮肆之於市懼有司䋲弹遂自免祝良為雒陽令案太尉龎參夫人有司以良不先聞奏輙折辱宰相坐繫詔獄良能得百姓心雒陽吏人守闕請代其罪者日有數千萬人詔乃原刑吴樹為宛令之官辭梁冀冀賔客布在縣界以情託樹樹對曰小人姦蠧比屋可誅明將軍以椒房之重處上將之位宜崇賢善以補朝闕宛為大都士之淵藪自侍坐以来未聞稱一長者而多託非人誠非敢聞冀嘿然不悦樹到縣遂誅殺冀客為人􅊣者數十人由是深怨之劉陶為除順陽長縣多姦猾陶到官宣募吏民有氣力勇猛能以死易生者不拘亡命姦臧於是剽輕劔客之徒過晏等千餘人過姓也過國之後皆来應募陶責其先過要以後效使各結所厚少年得數百人皆嚴兵待命於是覆案姦宄所發若神黄昌為宛令政尚嚴猛好發姦伏人有盗其車盖者昌初無所言後乃宻遣親客至門下賊曹家掩取得之收其家一時殺戮大姓戰懼皆稱神明張升守外黄令吏有受賕者即論殺之或譏升守領一時何足趨趨急也明威戮乎對曰昔仲尼暫相誅齊之侏儒手足異門而出故能威震强國反其侵地君子仕不為己職思其憂豈以久而異其度哉周䊸永平中補南行唐長到官曉吏人曰朝廷不以長不肖使牧黎民而性讎猾吏志除豪賊且勿相試遂殺縣中尤無狀者數十人吏人大震遷博平令收考姦贓無出獄者後徵拜雒陽令下車先問大姓主名吏數閭里豪彊以對䊸厲聲怒曰本問貴戚若馬竇等軰豈能知此賣菜傭乎於是部吏望風㫖争以激切為事貴戚跼蹐京師肅清皇后弟黄門郎竇篤從宫中歸夜至止姦亭亭長霍延遮止篤蒼頭與争延遂㧞劍擬篤而肆詈恣口篤以表聞詔召司𨽻校尉河南尹詣尚書譴問遣劍㦸士收䊸送廷尉詔獄數日貰出後竇氏貴盛篤兄弟秉權睚眦宿怨無不僵仆䊸自謂無全乃柴門自守以待其禍然篤等以䊸公正而怨隙有素遂不敢􅊣繆肜辟公府舉尤異遷中牟令縣近京師多權豪肜到誅諸姦吏及託名貴戚賔客者百有餘人威名遂行王渙永元末為雒陽令以譎數發摘姦伏京師稱歎任峻渤海人為劇令自王渙卒後連詔三公特選雒陽令皆不稱職永和中以峻補之峻推用文武吏皆盡其能糾剔姦盗不得旋踵一嵗㫁獄不過數十威風猛於渙而文理不及之王脩初平中守髙宻令髙宻孫氏素豪俠人客數犯法民有相刼者賊入孫氏吏不能執脩將吏民圍之孫氏拒守吏民畏憚不敢近脩令吏民敢有不攻者與同罪孫氏懼乃出賊繇是豪强懾服後守膠東令膠東人公沙盧宗强自為營塹不肯應發調脩獨將數騎徑入其門斬盧兄弟公沙氏驚愕莫敢動脩撫慰其餘由是冦少止魏司馬芝為管長時天下草創多不奉法郡主簿劉節舊族豪俠賔客千餘家出為盗賊入亂吏治頃之芝差節客王同等為兵掾吏據白節家前後未嘗給繇若至時蔵匿必為留負芝不聼與節書曰君為大宗加股肱郡而賔客毎不與役既衆庶怨望或流聲上聞令條同等為兵幸時發遣兵已集郡而節藏同等因令督郵以軍興詭責縣縣掾吏窮困乞代同行芝乃馳檄濟南具陳節罪太守郝光素敬信芝即以節代同行青州號芝以郡主簿為兵趙儼為朗陵長縣多豪猾無所畏忌儼取其尤甚者收縳案驗皆得死罪儼既囚之乃表府觧放自是威恩並著楊沛為長社令時曹洪賔客在縣界徴調不肯如法沛先撾折其脚遂殺之由此太祖以為能累遷九江東平樂安太守並有治迹坐與督軍争鬭髠刑五嵗輸作未竟㑹太祖出征在譙聞鄴下頗不奉科禁乃發教選鄴令當得嚴能如楊沛比故沛從徒中起為鄴令已拜太祖見之問曰以何治鄴沛曰竭盡心力奉宣科法太祖曰善顧坐席曰諸君此可畏也賜生口十人絹百疋既欲以勵之且以報乾椹也初沛為興平長人多饑窮沛收乾椹萱豆積千餘斛太祖軍過無糧沛乃進乾椹太祖甚喜故言及之沛辭去未到而軍中豪右曹洪劉勲等畏沛各遣家馳騎告子弟使各自簡勑沛為令數年以公能轉為護羗都尉沐並為成臯令校事劉肇出過縣遣人呼縣吏来索槀糓是時蝗旱官無有見未辦之間肇人從之並之閣下呴呼罵吏並怒因躧履提刀而出多從吏卒欲收肇肇覺知驅走具以状聞有詔肇為牧司爪牙吏而並欲收縳無所忌憚自恃清名遂收欲殺之肇髠决减死刑竟復吏由是放散十餘年滿寵字伯寧守髙平令縣人張苞為都督郵貪穢受取干亂吏政寵因其来在傳舍率吏卒出收之詰責所犯即日考竟遂棄官歸後為許令時曹洪宗室親貴有賔客在界數犯法寵收治之洪書報寵寵不聽洪白太祖太祖召許主者寵知將欲原乃速殺之太祖喜曰當事不當爾邪吴黄盖從孫䇿及權諸山越不賔有冦難之縣輙用葢為守長石城縣吏特難簡御葢乃置兩掾分主諸曹教曰令長不得徒以武功為官不以文吏為稱今賊冦未平有軍旅之務一以文書委付兩掾當簡攝諸曹糾摘謬誤兩掾所置事入諾出若有姦欺終不加以鞭杖宜各盡心無為衆先初皆怖威夙夜恭職久之吏以盖不視文書漸容人事盖亦嫌外懈怠時有所省各得兩掾不奉法數事乃悉請諸掾吏賜酒食因出事詰問兩掾辭屈皆叩頭謝罪盖曰前已相勑終不以鞭杖相加非相欺也遂殺之縣中震慄後轉春榖長尋陽令凡守九縣所在平定遷丹陽都尉抑强扶弱山越懐附賀齊字公苖㑹稽山隂人少為郡吏守剡長縣吏斯從輕俠為姦齊欲治之主簿諫曰從縣大族山越所附今日治之明日冦至齊聞大怒便立斬從從族黨遂相糾合衆千餘人舉兵攻縣齊率吏民開城門突擊大破之威震山越凌操為永平長平治山越姦猾歛手晉張輔為藍田令不為豪强所屈時强弩將軍龎宗西州大姓護軍趙浚宗婦族也故僮僕放縱為百姓所患輔䋲之殺其二奴又奪宗田二百餘頃以給貧户一縣稱之轉山陽令太尉陳凖家僮亦暴横輔復擊殺之山遐字彦林為餘姚令時江左初基法禁寛弛豪族多挾藏戸口以為私附遐䋲以峻法到縣八旬出口萬餘縣人虞喜以藏戸當棄市遐欲䋲喜諸豪强莫不切齒於遐言於執事以喜有髙節不宜屈辱又以遐輙造縣舎遂䧟其罪遐與㑹稽内史何充牋乞留百日窮翦逋逃退而就罪無恨也充申理不能得竟坐免官前秦王猛為始平令縣多枋頭枋頭地名西歸之人豪右縱横刼盗充斥猛下車明法峻刑澄察善惡禁勒强豪鞭殺一吏百姓上書訟之有司劾奏檻車徵下廷尉詔獄苻堅親問之曰為政之體徳化為先蒞任未㡬而殺戮無數何其酷也猛曰臣聞宰寧國以禮治亂邦以法陛下不以臣不才任臣以劇邑謹為明君翦除凶猾始殺一姦餘尚萬數若以臣不能窮殘盡暴肅清軌法者敢不甘心鼎鑊以謝孤負酷政之刑臣實未敢受之堅謂羣臣曰王景略固是夷吾子産之儔也於是赦之宋虞玩之為烏程令路太后外親朱仁彌犯法玩之依法録治太后怨訴孝武坐免官劉亮為武康令時境内多盗鑄錢亮掩討無不擒者所殺以千數南齊丘仲孚為于湖令有能名太守吕文顯當時倖臣凌詆属縣仲孚獨不為之屈孔琇之為吴興令有小兒年十嵗偷刈隣家稻一束琇之付獄治罪或諌之琇之曰十嵗便能為盗長大何所不為縣中皆震肅梁張稷為剡縣令時賊唐瑤作亂稷率勵縣人保全縣境江革歴秣陵建康令為治明肅豪强憚之王樆為秣陵令清直請謁不行羽林隊主潘敞有寵二宫勢傾人主婦弟犯法敞為之請樆樆投書於地更鞭四十敞怒譛之明日而見代沈瑀為餘姚令縣大姓虞氏千餘家請謁如市前後令長莫能絶自瑀到非訟所通其有去者悉立之階下以法䋲之縣南又有豪族數百家子弟縱横逓相庇䕃厚自封植百姓甚患之瑀召其老者為石頭倉監少者補縣僮皆號泣道路自是權右屏跡瑀初至富吏皆鮮衣美服以自彰别瑀怒曰汝等下縣吏何自擬貴人邪悉使着芒鞋麄布侍立終日足有蹉跌輙加榜棰瑀㣲時嘗自至此鬻瓦器為富人所辱故因以報焉由是士庻駭怨而瑀㢘潔自守故得遂行陳蕭引為建康令時殿内隊主吴璡反宫官李善慶蔡脫兒等多所請嘱引一皆不許引始族子宻時為黄門郎諫引曰李蔡之勢在位皆畏憚之亦宜少為身計引曰吾之立身自有本末亦安能為李蔡改行就令不平不過觧職耳吴璡竟作飛書李蔡證之坐免官卒於家禇玠為山隂令縣民張次的王休逹等與諸猾吏賄賂通姦全丁大戸類多隐沒玠乃鎖次的等具以状啓臺宣帝手勑慰勞并遣使助玠捜括所出軍民八百餘戸時舎人曹義逹為宣帝所寵縣民陳信家富於財謟事義逹信父顯文恃勢横暴玠乃遣使執顯文鞭之一百於是吏民服慄莫敢犯者後魏元志為雒陽令不避强禦與御史中尉李彪争路俱入見面陳得失彪言御史中尉辟承華車盖駐論道劍皷安有雒陽令與臣抗衡志言神鄉縣主普天之下誰不編戸豈有俯同衆官趨避中尉孝文曰雒陽我之豐沛自應分路揚鑣自今以後可分路而行及出與彪折尺量道各取其半帝謂邢巒曰此兒竟可所謂王孫公子不鏤自雕巒曰露竹霜條故多勁節非鸞則鳳其在本枝也宋飜字飛烏為河隂令順陽公主家奴為刼攝而不送飜將兵圍主宅執聓馮穆歩驅向縣時正炎暑立之日中流汗霑地縣舊有大枷時人號曰彌尾青及飜為縣主吏請焚之翻曰且置南牆下以待豪家未幾有内監楊小駒詣縣請事辭色不善命取尾青以鎮之既免入訴於宣武大怒勑河南尹推治其罪飜具自陳状詔曰卿故違朝法豈不欲作威以買名飜對云造者非臣買名者亦宜非臣所以留者非敢施於百姓欲待兇暴之徒如小駒者耳於是威震京師髙綽字僧裕為洛陽令為政强直不避豪右京邑憚之楊機字顯畧行河隂縣事當官正色不避權勢後為雒陽令京輦伏其威風希有干犯鄧淵字彦海為蒲吾令誅翦姦猾盗賊肅清陽固字敬安為雒陽令在縣甚有威風髙崇字積善為雒陽令為政清㫁吏民畏其威風毎有發摘不避强禦縣内肅然北齊路去病為定州饒陽令去病明閑時務性頗嚴毅人不敢欺然至㢘平為吏民歎服擢為成安令輦轂之下舊號難治重以政亂時難綱維不立功臣内戚請属百端去病消息事宜以理抗荅勢要之徒雖厮養小人莫不憚其風格亦至嫌恨自遷鄴以還鄴與臨漳成安三縣令治術去病獨為稱首後周樂運建徳中為萬年縣丞抑挫豪右號稱强直髙祖嘉之特許通籍事有不便於時者令巨細奏聞隋魏徳深大業中為舘陶長闔境老幼皆如見其父母有猾人員外郎趙君實與郡丞元寳藏深相交結前後令長未有不受其指麾者自徳深至縣君實屏處於室未嘗輙敢出門逃竄之徒歸来如市唐劉仁軌為陳倉尉部人有折衝都尉魯寕者恃有髙班豪縱無禮歴政莫能禁止仁軌特加誡喻期不可再犯寜又横暴尤甚竟杖殺之州司以聞太宗怒曰是何縣尉輒殺吾折衝遽追入與語竒其剛正擢授櫟陽丞李朝隠景雲初為長安令朝隠政刑畢舉權豪懾憚有内寺伯非禮干忤朝隠叱繫於獄睿宗嘉之加朝隠大中大夫馬燧寳應中為趙城尉是時回紇大軍還國恃復東都之功倔强恣睢所過或虜掠廪餼不如意輙賊殺之澤潞節度李抱玉難其供辦賔介皆憚不敢行燧自賛請主郵驛比廻紇至則先厚賂其渠帥與明要約廻紇乃授燧旗幟為識有犯令者令燧戮之燧又取死囚給左右厮役小違令殺之廻紇相顧色動渉其境無敢暴掠抱玉竒之竇㕘代宗朝為奉先尉縣人曹芬𨽻北軍素兇暴與弟敺其女弟芬父救之不得遂投井死㕘捕理芬兄弟當死官皆請俟免䘮㕘曰子因父生父由子死若以䘮延罪是殺父不坐也皆正其罪而杖殺之一縣畏伏晉顔衍兖州曲阜人仕梁為青州北海主簿自卑官不畏强禦縣民有豪暴者必嚴刑制之由是知名冊府元龜卷七百六
