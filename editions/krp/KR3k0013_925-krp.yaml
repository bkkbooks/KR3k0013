body:
  text: 册府元龜卷九百二十五宋王欽若等撰總錄部譴累傳曰君子不黨又曰君子周而不比盖黨比者其有譴累之患乎叔末澆競禮義陵遲愛憎之情作而黨與之風起故庠序之下搢紳之間至有各樹朋徒互相譏揣干鉤黨之議䧟禁錮之法亦有結託豪俠獄起而辭及附㑹權貴勢窮而釁至親族不道以服屬而從坐交逰抵禁因雅素而被譴将儆于後咸著于篇然而君子中立不倚正直不回疏不令之親絶非益之交宜乎全身而逺害也漢邳離侯路博徳武帝太初元年坐兄之子犯逆不道罪免宜鄊侯馮参天漢二年坐匿朝鮮亡虜下獄死後漢范滂汝南征羌人太守宗資請署功曹委任政事後牢修誣滂鉤黨坐繫黄門北寺獄獄吏謂曰凡坐繫皆祭臯陶滂曰臯陶賢者古之直臣知滂無罪将理之於帝如其有罪祭之何益衆人繇此亦止獄吏将加掠考滂以同囚多嬰病乃請先就格遂與同郡袁忠争受楚毒桓帝使中常侍王甫以次辨詰滂等皆三木囊頭暴於階下餘人在前或對或否忘滂於後越次而進王甫詰曰君為人臣不惟忠國而共造部黨自相褒舉評論朝廷虚搆無端諸所謀結並欲何為皆以情對不得隐飾滂對曰臣聞仲尼之言見善如不及見惡如探湯欲使善同其清惡同其汙謂王政之所願聞不悟更以為黨甫曰卿更相㧞舉迭為唇齒有不合者見則排斥其意如何滂乃慷慨仰天曰古之修善自求多福今之脩善身陷大戮身死之日願埋滂於首陽山側上不負皇天下不愧夷齊甫愍然為之改容乃得並觧桎梏建寕二年遂大誅黨人詔下急捕滂等督郵呉導至縣抱詔書閉傳舎伏床而泣滂聞之曰必為我也即自詣獄縣令郭揖大驚出觧印綬引與俱亡曰天下大矣子何為在此滂曰滂死則禍塞何敢以罪累君又令老母流離乎其母就與之訣滂白母曰仲博孝敬足以供養滂從龍舒君歸黄泉存亡各得其所唯大人割不可忍之㤙勿増感戚母曰汝今得與李杜齊名死亦何恨既有令名復求夀考可兼得乎滂跪受教再拜而辭顧謂其子曰吾欲使汝為惡則惡不可為欲使汝為善則我不為惡行路聞之莫不流涕時年三十三杜宻為北海相去官後桓帝徴拜尚書令遷河南尹轉太僕黨事既起免歸夲郡與李膺俱坐而名行相次故時人亦稱李杜焉後太傅陳蕃輔政復為太僕明年坐黨事被徴自殺夏馥陳留圉人桓帝初舉直言不就馥雖不交時宦官然以聲名為中官所憚遂與范滂張儉等俱被誣陷詔下州郡捕為黨魁及儉等亡命經歴之䖏皆被收考辭所連引布徧天下馥乃頓足而嘆曰孽自已作空汚良善一人逃死禍及萬家何以生為乃自剪鬚髪變形入林慮山中隠匿姓名為冶家傭親突煙火形貌毁瘁積二三年人無知者後馥弟静乘車馬載絹帛追之於湼陽市中遇馥不識聞其聲乃覺而拜之馥避不與語静追随至客舎共宿夜中宻呼静曰吾以守道疾惡故為權宦所陷且念營茍全以庇性命弟奈何載物相求是以禍見追也明旦别去黨禁未解而卒魏朗為河南太守蕃所薦徴為尚書㑹被黨議免歸朗性矜嚴閉門整法度家人不見惰容後竇武等誅朗以黨被急徴行至牛渚自殺李膺為司𨽻校尉是時朝廷日亂綱紀頽弛膺坐黨事免歸鄊里頃之靈帝崩陳蕃為太傅與大将軍竇武共秉朝政連謀誅諸宦官故引用天下名士乃以膺為長樂少府及陳竇之敗膺等復廢後張儉事起收捕鉤黨鄉人謂膺曰可去矣對曰事不辭難罪不迯刑臣之節也年已六十死生有命去将安之乃詣詔獄考死妻子徙邉門生故吏及其父兄並被禁錮尹勲為汝南太守上書解釋范滂袁忠等黨議禁錮尋徴拜将作大匠轉大司農坐竇武等事下獄自殺巴肅為議郎與竇武陳蕃等謀諸閹宦武等遇害肅亦坐當禁錮中常侍曹節後聞其謀收之肅自載詣縣縣令見肅入閣觧印綬與俱去肅曰為人臣者有謀不敢隠有罪不迯刑既不隐其謀矣又敢逃其刑乎遂被害刺史賈琮刋石立銘以記之張升仕郎為綱紀以能出守外黄令遇黨錮去官後更見誅年四十九羊陟為河南尹㑹黨起免官禁錮卒於家荀叔兄子昱字伯條曇字元智昱為沛相曇為廣陵太守兄弟皆正身疾惡志除閹宦其支黨賔客有在二郡者纎罪必誅昱後共将軍竇武謀中官與李膺俱死曇亦禁錮終身羊續辟大将軍竇武府及武敗坐黨事禁錮十餘年幽居守静及黨禁觧復辟太尉府霛帝光和二年四月大赦天下諸黨人禁錮小功以下皆除之時上禄長和海上言黨人錮及五族有乖典訓帝從之陳翔補御史中丞坐黨事考黄門北寺獄以無騐見原卒於家孔昱字元世太尉舉方正對策不合乃辭病去後遭黨事禁錮劉儒為侍中上封事十條極言得失出為任城相頃之徴拜議郎㑹竇武事下獄自殺張奐為太常與尚書劉猛刁韙衛良同薦王暢李膺可参三公之選而曹節等彌疾其言遂下詔切責之奐等皆自囚廷尉數日乃得出並以三月俸贖罪司𨽻校尉王寓出於宦官欲借寵公卿以求薦舉百僚畏惮莫不許諾唯奐獨拒之寓怒因此遂䧟以黨罪禁錮歸田里延篤為京兆尹以病免歸後遭黨事禁錮何䕫字叔龍漢末閹宦用事䕫從父衡為尚書有直言由是在黨中諸父兄皆禁錮䕫歎曰天地閉賢人隐故不應宰司之命符融陳留浚儀人少為都官吏耻之委去州郡公府連辟皆不應㑹有黨事亦遭禁錮魏文欽字仲若父稷為騎将有勇力少有材武及魏諷反欽坐與諷辭語相連及下獄掠笞數百當死太祖以稷故赦之晋裴楷為侍中子瓉娶楊駿女及駿誅楷以姻親收付廷尉賴侍中傅祗救䕶得免猶坐去官卞粹為右軍将軍張華之誅粹以華壻免官陸耽者機雲之弟為平東祭酒亦有清譽與雲同遇害劉曒為司𨽻校尉長沙乂討齊王冏曒豫謀封朱虚縣公又死坐免宋沈懷文為隋王誕後軍主簿誕嘗為廣州懐文固辭南行帝不悦弟懷逺納東陽公主養女王鸚鵡為妾元㐫行逆坐巫蠱鸚鵡預之事泄懐文因此失調為治書侍御史謝述子綜約緯皆有才名綜坐與舅范曄謀反伏誅約亦坐死緯尚太祖第五女長城公主素為所憎免死徙廣州鄧琬為輔國将軍南海太守率軍伐蕭簡於廣州攻圍踰年乃克以臧質反為廣州刺史宗殻所執值赦原免弟瓊與臧質同逆質敗從誅琬弟環亦坐死琬在逺又有功免死逺徙仍停廣州後魏李敷父順為寧西将軍髙平公卒皇興初以敷貴贈太尉公髙平王敷為南部尚書中書監見侍於孝文獻文弟奕又有寵於文明太后後為李訢列其隠罪二十餘條遂誅之削順位號為庶人敷奕與從弟顯徳妹夫廣平宋叔珍等皆坐開亂公私同時伏法敷長子伯和次仲良良與父俱死伯和走竄嵗餘為人執送殺之宋翻為河隂令弟道璵先為冀州京兆王愉法曹行叅軍愉反逼道璵為官翻與弟世景俱囚廷尉道璵後棄愉歸罪京師猶坐身死翻世景除名甄琛為太子少保黄門中正髙肇既死琛以肇之黨與謂不宜復参朝政出為營州刺史李仲尚少以文學知名起家京兆王愉行叅軍坐兄伯尚與咸陽王禧謀反詔賜死仲尚與弟李凱沉敏有識量坐伯尚事與母弟俱徙邉乆之㑹赦免遂寓居於晋陽沉廢積年鄭思明為直閣将軍坐弟思和同咸陽王禧逆徙邉㑹赦卒於家鄭義為給事黄門侍郎司徒左長史以從弟思和同咸陽王禧之逆與弟通直常侍道昭俱坐緦親出禁拜太常少卿邢晏為司徒東閣祭酒宣武初為與廣平王懐逰宴左遷鄭縣令未之官除給事中崔體字叔義孝莊時為尚書庫部郎坐兄㠸音弗鑄錢事發合家逃逸數日叔義見執獲時陽城王徽為司州牧臨淮王或以非其身罪驟為致請徽不從乃殺之劉藻為黎陽太守孝静天下坐子尚書郎洪業入闗中率衆侵擾伏法北齊祖珽字君信渉獵書史多諳雜藝位兼通直散騎常侍珽為陸太姬排毁解侍中僕射出為北徐州刺史君信亦見廢免隋叚文振為太僕卿突厥犯塞文振以行軍總管拒之遇逹頭可汗於汝野擊破之文振先與王世積有舊初文振北征世積遺以馳馬北還世積以罪被誅文振坐與交闗功遂不錄唐狄士文從妹為齊氏嬪有色齊㓕後賜薛公長孫覽覽妻鄭氏妬譛之文獻后后令覽離絶士文耻之不與相見後應州刺史唐君明居母憂聘以為妻由是君明士文並為御史所劾士文性剛在獄數日憤恚而死宇文善仕周官至上柱國許國公髙祖受禪遇之甚厚拜其子頴為上儀同及弟忻誅善及頴並廢于家忻弟愷為莱州刺史有能名亦坐忻除名于家乆不得調韓僧夀為上柱國有京兆人逹奚通妾王氏能清歌朝臣多相命觀之僧夀亦豫焉坐是除名陸爽為太子洗馬子法言敏學有家風釋褐承奉郎初爽為太子洗馬嘗奏髙祖云皇太子諸子未有嘉名請依春秋之義更立名字帝從之及太子廢帝追怒爽云我孫製名寕不自解陸爽乃爾多事扇惑於勇亦由此人其身雖故子孫並宜屏除終身不齒法言竟坐除名盧太翼善占候筭厯之術開皇時隐於白鹿山皇太子勇聞而召之太翼知太子必不為嗣謂所親曰吾拘逼而來不知所税駕也及太子廢坐法當死髙祖惜其才而不害配為官奴乆之乃釋其後目盲以手摸書而知其字髙熲為僕射後被誅其子盛道官至莒州刺史徙栁城而卒次宏徳封應國公晋王府記室次表仁封渤海郡公竝徙蜀郡楊恭仁為吏部侍郎恭仁弟綝性和厚頗有文學歴義州刺史淮南郡太守及父薨起為司𨽻校尉遼東之役楊𤣥感反其弟𤣥縱自帝所逃赴其兄路逢綝綝避人偶語久之司𨽻劉體文奏之時恭仁将兵於外帝寝其事綝憂發病而卒虞綽煬帝時為著作佐郎恃才任氣禮部尚書楊𤣥感稱為貴踞虚襟禮之與結布衣之友綽數從之逰其族人虞世南誡之曰帝性猜忌而君過厚𤣥感若與絶交者帝知君改悔可以無咎不然終當見禍綽不從尋有告綽以禁内兵書借𤣥感帝甚䘖之及𤣥感敗後籍沒其家妓妾並入官帝因問之曰𤣥感平常時與何人交往其妾以虞綽對帝令大理卿鄭善果窮治其事綽曰羈旅薄逰以𤣥感文酒談欵實無他謀帝怒不解坐徙邉潘徽為京兆尹博士楊𤣥感兄弟甚重之數相來往及𤣥感敗凡所交闗多罹其患徽以𤣥感故人為帝所不悦有司希㫖出徽為西海郡威定縣主簿意甚不平行至隴西發病卒王胄為朝散大夫禮部尚書楊𤣥感虛襟與交數逰其第及𤣥感敗與虞綽俱坐徙邉胄遂亡匿潜還江右為吏所捕遂坐誅王仁恭為光祿大夫㑹楊元感作亂其兄子武賁郎将仲伯預焉仁恭由是坐免梁文謙領武賁郎将為盧龍道軍副㑹楊𤣥感作亂其弟武賁郎将𤣥縱光祿文謙𤣥感反問未至而𤣥縱逃走文謙不之覺坐是配防于桂林而卒唐房𤣥齡仕隋補隰城縣尉漢王諒為逆徙坐除名徙於上郡欎欎不自得唯以諷讀為務髙士亷仕隋為奉禮郎兼通事舍人從征遼東時斛斯政為兵部侍郎當途任事尤親士亷數邀入幕同牀而寝言談中多㑹政以猜嫌懼罪内不自安亡奔髙麗士亷與交逰讁為交阯朱鳶縣主簿劉宏基貞觀初為并鉞将軍李希嘗長孫安業之謀逆也坐與交逰除名宇文節為侍中兼太子詹事平昌縣公房遺愛薛萬徹柴令武坐謀反伏誅遺愛弟遺直及母盧氏薛萬徹弟萬備柴令武兄哲威並以勲舊特免配流遺直貶春州銅陵尉萬備配流交州哲威流邵州尋皆卒於徙所節及特進太常卿江夏王道宗左驍衛大将軍駙馬都尉安國公執失思力並坐遺愛等交結流嶺外張文琮為户部侍郎從母弟房遺愛以罪貶授房州刺史文琮作詩祖餞及遺愛誅坐是出為建州刺史韋待價為左遷牛備身及江夏王道宗得罪待價即道宗之壻也縁坐左遷盧龍府果毅王勃髙宗時為虢州叅軍有官奴曹達犯罪為勃所匿又恐事泄殺達以滅口事覺當死㑹赦除名時勃父福時為雍州司功叅軍坐勃左遷交阯令魏𤣥同為司列大夫西臺侍郎上官儀被誅𤣥同坐與儀文章屬和配流嶺外薛元超拜東臺侍郎嵗餘西臺侍郎上官儀伏誅坐與文章欵宻配流嶲州鄧𤣥挺少觧屬文有名當代歴遷比部員外郎左史與上官儀善出為頓丘令宗秦客為撿校内史坐贓䧏授鎮州遵化縣尉内史邢文偉坐附㑹秦客貶授珍州刺史賀蘭敏之天后姊子為蘭臺左侍極當時咸傾附之有罪徙嶺外尚書右丞兼撿校沛王府長史皇甫公義以託附敏之長流横州太子中允劉懿之弟右史禕之知情配嶲州蘄州司馬徐齊𣆀前任王府椽與敏之交往左道除名長流嶺外前涇城令李善曽教敏之讀書専為左道長流嶲州綦連耀為雒州錄事叅軍連耀與箕州刺史劉思禮坐謀反棄市鳳閣侍郎李元素夏官侍郎孫元亨知天官侍郎事石抱忠劉竒給事中周譒鳳閣舎人王劇劇兄前涇州刺史勔太子司議郎路敬淳等坐與耀及思禮交結皆誅韋安石為左僕射留守東都妻薛氏暴虐子壻有妾誣其厭蠱迫以捶楚投井而死憲司以聞安石坐是出為蒲州刺史梁渉為右庶子栁勣為李林甫所搆伏誅渉及虢王巨嘗通勣資糧皆坐貶官連累者十餘人韋堅為刑部尚書為李林甫所陷長流嶺南殺之堅弟将作少匠蘭鄠縣令氷兵部員外郎芝及男河南府尹曹諒皆貶逺郡尋又分遣御史竝賜死諸子悉配𨽻邉都唯堅妻姜氏稱素為堅輕賤特放還夲宗盧從愿為刑部尚書坐子起居郎諭糶米入官有剰利為憲司所糾出為綘州刺史姜慶初為太常卿駙馬都尉以脩植建陵誤壞連岡賜自盡駙馬都尉倣削在身後官爵倣新平公主之子公主初出䧏駙馬都尉裴玲玲卒後出䧏慶初倣玲之子也韋陟為吏部尚書坐當墳墓子弟破伐松檟不能禁正貶綘郡太守第五琦為户部侍郎判度支時魚朝㤙伏誅與欵狎出為處州刺史元載自作相之後選嘗擢朝官之有才學令望者一人厚遇之将以代已初引禮部侍郎劉单单卒又引吏部侍郎薛邕邕貶引吏部侍郎楊炎炎與載同郡又元氏之出謂載為舅遂與載合載誅貶連州司馬凡在朝坐載累貶官者諌議大夫知制誥韓洄王定諌議大夫包佶徐縯大理少卿裴冀太常少卿王紀起居舍人韓㑹等十餘人王縉為相元載用事縉畢附之元載得罪連坐貶處州刺史姚南仲為右補闕與宰相常衮善衮既貶南仲出為海州縣令杜亞為河中尹劉晏得罪亞坐晏貶陸州刺史崔造為左司員外郎劉晏敗坐與晏善貶信州刺史趙恵伯為河南尹楊炎将立家廟先有私第在東都令恵伯貨之恵伯為炎市為官廨炎罷相盧杞知炎與京兆尹嚴郢有隙引為御史大夫恵伯自河中尹受代赴闕郢奏追捕恵伯詰案杞召吏繩炎為宰相栁吏貴估其宅賤入其幣詰贓為監主自盗罪當絞炎坐貶恵伯亦坐炎貶費州多田尉尋亦殺之令狐峘前為衡州刺史列上前政户口以為己功其後入為右庶子又與劉太真所親善太真坐事貶峘亦出為陜州别駕司正郭晞為撿校工部尚書兼太子賔客其子鋼為朔方節度杜希全判官攝豐州刺史晞慮其㓜不任邉職上請罷之帝遣吏使就召之鋼懼以他事見收遂奔吐蕃晞坐免官王佖太尉李晟之甥為神策将晟視佖㤙寵與愿愬不殊給與過之晟既為張延賞媒孽罷兵權亦不用佖為将帥入為左衛上将軍韋夏卿為給事中宰相竇参貶栁州夏卿坐與諸竇交逰左遷常州刺史裴諝為金吾将軍坐所善僧􅔰法貶閬州司馬馬英翰為宣武軍馬軍都虞􅔰以其男少逰謀叛亂英翰不言於道州安置蘓弁為户部侍郎判度支貶為汀州錄事参軍又貶其兄贊善大夫衮為永州司户叅軍前京兆府士曹冕為信州司户叅軍並同正郭映為右庶子映坐子壻卿侃於壽州謀亂削官于私第省過衛次公過知兵部侍郎知制誥翰林學士坐與宰相鄭絪厚善絪罷相次公左授太子賔客蘓表元和中以討淮西䇿干宰相武元衡元衡不見以監察御史宇文籍舊從事使召表而訊之因與表狎後捕駙馬王承系并窮按其門客而表在焉表被鞫因言籍與往來故籍坐貶江陵府士曹叅軍又被左衛騎曹叅軍楊敬之為吉州司户叅軍右神武倉曹韋衍為温州司倉叅軍秘書省正字薛庶囘為栁州司兵叅軍太子正字王叅元為遂州司倉叅軍鄊貢進士楊處厚為卭州太邑尉竝坐與表交逰故也左羽林将軍王翊元坐月給蘓表錢三千左授右領軍衛将軍籍為監察御史王承宗反詔捕其弟駙馬承系之賔客其中有為誤識者坐貶江陵戸曹韋處厚為禮部考功二員外早為宰相韋貫之所重時貫之以議兵不合帝㫖罷處厚坐與友善出為開州刺史貫之弟虢州刺史纁亦以清操為搢紳所慕亦坐貫之貶簡州刺史議者惜之于頔子駙馬都尉季友坐罪削官爵勑戸部尚書于頔不能訓子宜削金紫光禄大夫一階初帝意欲不坐頔但諷令因此致仕李逢吉奏曰雖古有父子兄弟罪不相及之義然季友恣行非法頔不能簡馭宜薄責以示誡又奉聖㫖許其致仕臣以懸車優禮事異繩違望待三兩月後商量為便故有此命馮宿從裴度東征為彰武軍節度判官淮西平拜比部郎中㑹韓愈論佛骨時宰疑宿草疏出為歙州刺史王仲舒為拾遺與京兆尹楊慿友善及慿得罪仲舒横議及之貶為硤州刺史張仲方為倉部員外郎㑹吕温羊士諤誣告宰相李吉甫隂事二人俱貶仲方坐吕温貢舉門生出為金州刺史韋宏景為吏部郎時度支郎中張仲方貶李吉甫謚憲宗怒貶仲方宏景坐與仲方善出為綿州刺史趙佶為度支郎中貶永州司馬坐皇甫鎛之黨也李景儉為諫議大夫乗醉入中書面詰侮宰相貶彰州刺史兵部郎中知制誥馮宿庫部郎中知制誥楊嗣復與景儉史舘同飲先起罰一季俸料又貶尚書員外郎史館修撰獨孤朗為韶州刺史起居舍人温造為郎州刺史司勲貟外郎李肇為灃州刺史刑部員外郎王鎰為郢州刺史坐景儉同飲考功員外郎史館修撰李翺與景儉素相善景儉除諌議薦翺自代及景儉獲譴翺亦出為郎州刺史李師素為兵部員外郎令狐楚坐山陵事貶師素與楚親出為賔州刺史李逢吉為相時景宗初即位逢吉内庭連結權傾天下惡李紳剛直與其黨共搆紳自户部侍郎貶錦州司馬又貶翰林學士駕部郎中知制誥龎嚴為信州刺史翰林學士司封員外郎知制誥蒋防為汀州刺史嚴防皆紳之所引王起為山南東道節度使時李訓用事訓即起貢舉門生也欲授起為相拜兵部侍郎判户部事其冬訓敗起以儒素長者人不以為累但罷判戸部事李同志同㨗之弟也同㨗㩀滄景拒命不赴兖海反状寝聞詔同志同巽委御史臺差人防守前滄州節度掌書記崔從長宜配常州安置進奏官皇測等七人竝錮身分配羊閬等州其弟及将佐在城者凡十人兼節級罪之續詔貶同巽金州漢陽縣尉同志金州叅軍竝馳驛發遣李讓夷為職方員外郎充翰林學士先是薛廷老翰林以終日酣醉不事撿宻逹於上聽故轉官罷職讓夷與之友善廷老之入讓夷實推㧞之故坐是為累罷守本官裴誼為江西觀察使卒前吉州刺史杜師仁坐贓計絹三萬餘匹詔師仁賜死於家又詔誼委之亷俗都下舉察宜削所贈工部尚書并御史大夫魏謩為諫議大夫謩初為李固言李珏楊嗣復所引數年之内至諌議大夫武宗即位李徳裕用事謩坐李楊之黨出為汾州刺史楊李貶官謩貶信州長史王凝為兵部侍郎充諸道監鐡轉運使以所補吏贓罪授秘書監孫祕為興唐少尹昭宗天祐三年詔曰祕是故崖州司戸叅軍孫乘親弟其兄既處極典其弟難貸餘生宜除名配流愛州充長流百姓仍委御史臺差人所在賜自盡栁遜為太子賔客哀帝初詔曰遜嘗為張濬租庸判官又王溥監修日奏充判官授工部侍郎又與趙崇裴贄為刎頸之交昨裴樞等得罪之時合當連坐尚矜暮齒且俾懸車可夲官致仕後唐史武者朱友謙之舊将也荘宗同光四年正月勑朱友謙同惡人史武薛敬容周唐殷楊師太王景來景仁白奉國等已當國法其家資竝籍沒史武等時皆為刺史以友謙死從坐無罪族㓕人士寃之李處徽為樞宻院承㫖明宗長興二年四月以處徽為忠武軍行軍司馬處徽邢州人始為郡吏為安重誨信愛之至是驟升厥職行已之道非其正也今重誨出鎮故有是命晋楊麟為清州節度楊光逺判官少帝開運元年詔楊光逺随幕賔從等久在樽罍比資叅佐當光逺始謀逆節未嘗聞極救之言及楊承勲决意歸明又不是贊成之數但思朋附悉合誅夷尚示寛㤙俾從逺竄麟流威州節度掌書記任邈流原州觀察支使徐晏流武州縱逢㤙赦不在放還之限王詔前為平盧節度副使開運二年貶詔為慶州司馬行軍司馬周光贊為商州司馬竝員外直同正員仍馳驛發遣楊光逺叛連坐故也漢王松為禮部尚書隠帝乾祐二年勑松事因有玷誠功上章述避嫌之辭形告退之意其男仁寳雖因除名曾授偽官一昨既翦兇酋合從俘執未明死所乃漏刑書路岐雖限於山河情愛且闗于父子便儀連坐恐失寛條以爾朝列舊臣班行宿徳累有退閑之請宜引軫惻之㤙特俾免官用明减等宜停見任周張昭為戸部尚書廣順元年七月以昭為太子賔客坐子陽翟薄秉陽犯法抵罪上章引咎詣閣待罪詔寛釋之踰月左授此官劉頊為監察御史廣順元年七月勑頊名昇通籍官列憲司凡繫所為尤冝知禁不能為子諍父而乃離局侵官宜謫掾於方州俾省愆于終日頊父濤為中書舍人令頊代直草辭責授少府少監分司西京故頊責授復州司户叅軍王敏為工部侍郎世宗顯徳三年八月詔敏停任敏嘗薦子壻陳南金為曹孟二鎮掌記南金奉職有闕遂連坐焉册府元龜卷九百二十五
