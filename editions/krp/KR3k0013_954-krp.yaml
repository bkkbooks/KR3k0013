body:
  text: 册府元龜卷九百五十四宋王欽若等撰總錄部寡學虚名妄作愚暗寡學温故知新好問則裕為學之益蓋君子之所急也乃有愚昧成性宴安任已靡思時習之義不念將落之刺懵厥古道束於常見繇是言致無稽之誚動成踰矩之咎為儒者之所恥曷士林之可預古人有言曰人而不學其猶正墻靣而立也蓋謂是矣宰予字子我魯人哀公問社於宰我宰我對曰夏后氏以松殷人以栢周人以栗曰使民戰栗凡建邦立社各以其土所宜之木宰我不本其意妄為之說因周用栗便云使民戰栗子聞之曰成事不說事已成不可復解說遂事不諌事已遂不可復諫也既往不咎事已往不可復追也孔子非宰我故歴言此三者欲使慎其後吳滕脩為廣州刺史或語脩蝦鬚長一丈脩不信其人後故至海取蝦鬚長四丈四尺封以示脩脩乃服之晉蔡謨為司徒謨初渡江見彭蜞大喜曰蟹有八足加以二螯令烹之既食吐下委頓方知非蟹後詣謝尚而說之尚曰卿讀爾雅不熟幾為勤學死虞嘯父為侍中孝武從容問曰卿在門下初不聞有所獻替耶嘯父家近海謂帝有所求對曰天時尚温䱥魚蝦鮓未可致尋當有所上獻帝大笑唐蘇良嗣為荆州都督郭下舊有河東寺後梁宣帝為其兄河東王譽所立也良嗣見而驚曰此在江漢之間與河東有何關涉遂奏改之繇是議者譏其學之不博也蕭炤為户部侍郎嘗與嚴挺之同行慶弔客次有禮記蕭炤讀之曰蒸嘗伏獵炤早従官無學術不識伏臘之意誤讀之挺之戲問炤對如初挺之白張九齡曰省中豈得有伏獵侍郎繇是出為岐州刺史李林甫為吏部侍郎時選人嚴逈判語有用枤杜二字者林甫不識枤字謂吏部侍郎韋陟曰此云杖杜何也陟俛首不敢言太常少卿姜度林甫舅子度妻誕子林甫手書慶之曰聞有弄麞之慶客視之掩口王鍔為太原節度使嘗讀左氏傳自稱儒者人皆笑之後唐李鏻為宗正卿初趙州昭慶縣有神堯之祖獻祖宣皇帝建初陵懿祖光皇帝啟運陵莊宗踐祚之後宗正司條奏陵園故事請置建初啓運陵臺令許之時有偽稱宗子言世為丹陽竟陵臺令投詣宗寺為聞喜令宗正少卿李瓊莫測其繇憑百姓偽書即面補之其人既至本處招庇百姓以為部曲出入建絳旌豪視長吏復侵奪近墓民田百餘頃言是陵園壖地百姓詣府陳訴州府不能辨疑乃具狀奏天子下公卿訪丹陽竟陵故事是何帝陵寢遂檢列聖陵園及追封録太子諸王尊號者皆無丹陽竟陵之號其偽百姓宗正司吏皆伏法瓊鏻以不閑故實謬補姦人鏻責授朝散大夫司農少卿瓊責授朝議郎守太子中舎丹陽之地北在南方竟陵之名六朝故事鏻等不知書故也李琪為太子少傅明宗天成末既平定州自汴還雒琪為留司官班首奏乞於偃師縣奉迎而奏章中有敗契丹之兇黨破真定之逆賊之言詔曰契丹即為兇黨真定不是逆賊李琪罰一月俸史臣曰大駕還京留司官出城奉迎載於典禮李琪好動移班師稱中山為真定躁人之詞俱失實也馬縞為國子祭酒時年八十餘形氣不甚衰而於事多遺忘嘗言元稹不應進士以父元魯山名進故也多如此類又上疏古者無嫂叔服文皇創意以兄弟之親不宜無服乃議服小功今令文省服制條為兄弟之妻大功不知何人議改而寘於令文諸博士駮云律令國之大經馬縞知禮院時不曾論定今遽上疏駮令式罪人也周盧損為太子少保致仕損梁開平初舉進士性頗剛介以髙情逺致自許儕類之中務欲自勝然學涉不博以此為人士所薄虚名夫名浮於行聲過其實先民用恥小人争騖蓋繇不純其德務飾其詐身為斧藻言生枝葉茍合於世䆮以成風大則朋扇相髙日彰浮稱次則矜持自用徒衒謏聞詭誕則多循實何有或誤聽而進擢或從權而委任㒺獲攸濟終敗乃事是知膠柱鼓瑟詎能合變畫地作餅不可以啖者矣漢東方朔為侍郎詼諧逢占射覆逢占逆占事猶云逆刺也其事浮淺行於衆庶童兒牧䜿莫不眩燿而後世好事者因取竒言怪語附著之劉向言少時數問長老賢人通於事及朔時者與朔同時者皆曰朔口諧倡辯不能持論喜為庸人誦說喜許吏反為去聲故令後世多傳聞者而揚雄亦以為朔言不純師行不純德其流風遺書蔑如也言辭義淺薄不足稱也然朔名過實者以其詼逹多端不名一行王成為膠東王相宣帝最先褒成後詔使丞相御史問郡國上計長吏守丞以政令得失或對言前膠東相成偽自増加以䝉顯賞是後俗吏多為虚名魏鄧颺為中書郎颺少得士名于京師與李勝等為浮華友與諸葛誕等馳名譽有四牕八逹之誚文帝疾之文欽為將好自壯勇髙人頗得虚名于三軍諸葛誕為御史中丞與尚書夏侯𤣥鄧颺等相善收名朝廷京都翕然言事者以誕颺等修浮華合虚譽漸不可長明帝惡之免誕官蜀許靖為劉璋蜀郡太守先主進圍成都靖將踰城降事覺不果璋以危亡在近故不誅靖璋既稽服先主以此薄靖不用也法正說曰天下有獲虚譽而無其實者許靖是也然今主公始創大業天下之人不可户說靖之浮稱播流四海若其不禮天下之人以是謂主公為賤賢也宜加敬重以眩逺近追昔燕王之待郭隗先主於是乃厚待靖諸葛瞻以丞相亮之子為尚書僕射加軍師將軍蜀人追思亮咸愛其才敏每朝廷有一善政佳事雖非瞻所建倡百姓皆傳相告曰葛侯之所為也是以美聲溢譽有過於實晉王衍為太子中庻子衍既有盛才累居顯職後進之士莫不景慕放效選舉登朝皆以為稱首矜髙浮誕遂成風俗焉謝萬太傅安之弟雖器量不及安而善自衒曜故早有時譽後至豫州刺史王綏字彦猶少有美稱厚自矜邁實鄙而無行後至冠軍將軍宋劉休為南康相善言理體而在郡無異績後魏和䟦為龍驤將軍累遷尚書平原太守道武寵遇䟦冠於諸將時羣臣皆敦尚恭儉而䟦好修虚譽衒曜於時劉仁之為御史歴西兖州刺史善候當途能為詭激每於稠人廣衆之中或撾一姦吏縦一孤寡大言自示眩巳髙明矜物無知淺識皆稱其美公能之譽動過其實唐房琯為吏部尚書平章事肅宗以琯素有重名傾意待之琯好賔客喜談論用兵素非所長而天子採其虚聲冀成實效琯既自無廟勝又以虚名擇將吏以至于敗後唐張文禮初爲鎮州大將従莊宗行營素不知書亦無兵家方畧唯於懦卒中萋菲上將自言甲不知進退乙不識兵機以此軍人推為良將周李知損為諌議大夫在梁朝時以牋刺篇詠出入于内臣之門繇是浪得虚譽時人目之為李羅隱妄作古人有言鄙没世而文采不表於後故感於哀樂而造其端緒茍非侈靡閎衍周通博達豈能為學者之所宗乎乃有不祖述於前典妄穿鑿於聖意言涉鄙俗義多詭詐雖確然自是而行之非逺布諸後世良可媿焉漢孟喜東海蘭陵人従田王孫受易喜好自稱譽得易家候隂陽災變書詐言師田生且死時枕喜䣛獨傳喜䣛與膝同同門梁丘賀疏通證明之同門同師學者也疏通猶言分别也證明明其偽也曰田生絶施讎手中時喜歸東海安得此事又蜀人趙賔好小數書後為易飾易文以為箕子明夷隂陽氣亡箕子者萬物方荄兹也易明夷卦彖曰内文明而外柔順以蒙大難文王以之利艱貞晦其明也内難而能正其志箕子以之而六五爻辭曰箕子之明夷利貞此箕子者謂殷父師說洪範者也而賔妄為說耳荄兹言其根荄方兹茂也荄音該又音皆賔持論巧慧易家不能難皆曰非古法也心不服也云受孟喜喜為名之名之者承取其名云實授也後賔死莫能持其說喜因不肯仞仞亦名也仞音刅以此不見信晉衛瓘為司空為左思作吳都賦叙及注叙粗有文辭至於為注了無所發明直為塵穢紙墨不合傳寫也束晢為尚書郎嘗為勸農及䴵諸賦文頗鄙俗時人薄之後魏張吾貴中山人年八十本郡舉為太學博士吾貴先未多學乃從酈詮受禮牛天祐受易詮祐粗為開發而吾貴覽讀一遍便即别構户牖世人競歸之曽在夏學聚徒千數而不講傳生徒竊云張生之於左氏似不能說吾貴聞之謂其徒曰我今夏講暫罷後當說傳君等来日皆當持本生徒怪之而巳吾貴謂劉蘭云君曾讀左氏為我一說蘭遂為講三旬之中吾貴讀杜服隱括兩家異同悉舉諸生後集便為講之義例無窮皆多新異蘭仍伏聽學者以此益竒之而以辨能飾非好為詭說繇是業不久傳成霄字景鸞亦學渉好為文詠但詞彩不倫率多鄙俗與河東姜質等朋遊相好詩賦間起知音之士共所嗤笑閭巷淺識頌諷成羣乃至大行於世北齊劉晝渤海阜城人河清初舉秀才考䇿不第乃恨不學屬文方復緝綴辭藻言甚古拙制一首賦以六合為名自謂絶倫吟諷不輟乃嘆曰儒者勞而少工見於斯矣我讀儒書二十餘年而答策不第始學作文便得如是曾以此賦呈魏收收謂人曰賦名六合其愚已甚及見其賦又愚於名晝又撰髙才不遇傳三篇在孝昭武成之朝又頻上書言亦切直而多非世要終不見收採石曜為黎陽郡守著石子十卷言甚淺俗隋張仲讓為太學博士未幾告歸鄉里著書十卷自云此書若奏我必為宰相又數言𤣥象事州縣列上其狀竟坐誅唐東方震徳州人𤣥宗開元十三年與鄭帝臣獻書詞理虚矯徙於道州南次回為國子監學生肅宗寳歴元年進皇帝親學圖一軸初太學博士李涉狂妄誘生徒上疏請親臨國庠因有詔令畵圖以進事尋不行後唐王思同初仕莊宗歴典諸軍至都將性疎俊粗有文性喜為詩什與人唱和自稱薊門戰客魏王繼岌待之若子時内養呂知柔侍興聖宫頗用事思同不平之知柔為終南山詩末句有頭字思同和曰料伊直擬衝霄漢賴有青天壓着頭其可笑詩句皆此類也晉崔居儉為户部尚書其先自後魏至唐推為甲族吉凶之事自著家禮與盧鄭不同但浮薄是務淳儒惡之愚暗夫愚暗之徒與賢知並生于世亦猶樗櫟之與杞梓瓦石之與珠玉也故含英炳靈者為賢知積汚藴濁者為愚暗則有㒺達人情靡周世務動為欺紿靡達變通至乃畏乎影者見月而却走失乎劍者刻舟而待求取柳葉以自蔽謂南金之可食其底滯之性有如此者其或應對失指率履過中言有逺於典型動必為於嗤笑紀諸竹素良足憮然燕李季好逺出其妻有士李季至士在内中妻患之乃令士裸而解髪直出門吾屬陽不見也於是士従其計疾走出門季曰是何人也家室皆曰無有季曰吾見鬼也季婦曰為之奈何然取五牲之毛浴之季曰諾乃浴矣㳙濁梁夏首之南人也其為人愚善畏明月而宵行宵見其影以為伏鬼仰見其髪以為伏魅匍匐而走比至其家失氣而死公孫綽魯諸孫也嘗告人曰我能治偏枯今吾倍為偏枯之藥則可以起死人矣楚人有涉江者本不載姓名其劍自舟中墜於水遽鍥其舟曰是吾劔所従墜也舟已行而劔不行若此求劔不亦惑乎宋人有耕者本不載姓名田中有株兎走觸之折頭而死因釋耕守株冀復得兎為宋國笑後漢劉𤣥王莽末為綠林渠帥號為更始既至長安諸將後至者更始問虜掠得幾何左右侍官皆宫省久吏各驚相視董卓獻帝初自為太尉領前將軍及逼帝遷都長安卓乃結壘於長安城東以自居又築塢于郿髙厚七丈號曰萬嵗塢積谷為三十年儲自云事成雄據天下不成守此足以畢老後王允與吕布及僕射士孫瑞謀誅卓有書吕字於布上負而行於市歌曰布乎有告卓者不悟公孫瓉為遼東太守破擒劉虞盡有幽州之地猛志益盛以童謡之言徙鎮易縣盛修營壘樓觀數十臨易河通遼海瓉慮有非常乃居于髙京以鐵為門斥去左右男子七嵗已上不得入易門專侍姬妾其文簿書記皆汲而上之令婦人習為大言聲使聞數百步以傳宣教令或問其故瓉曰我昔驅叛胡于塞表掃黄巾於孟津當此之時謂天下指揮可定至於今日兵革方始觀此非我所决不如休兵力耕以救凶年兵法百樓不攻今吾諸營樓樐千里積穀三百萬斛食此足以待天下之變後為袁紹所敗魏毛嘉以明帝后父封博平鄉侯嘉本興虞車工卒暴富貴帝令朝臣㑹其家飲宴其容止舉動甚蚩騃語輙自謂侯身時人以為笑位至散騎侍郎曹爽為大將軍與鄧颺何宴等專亂朝政司馬宣王將討之正始十年車駕朝髙平陵爽兄弟皆従宣王勒兵馬先據武庫遂出屯雒水浮橋奏請廢爽等爽得宣王奏事不通廹窘不知所為大司農桓範說爽使車駕幸許昌招外兵爽兄弟猶豫未决㑹宣王使許允陳太解語爽蔣濟亦與書逹宣王之㫖又使爽所信殿中校尉尹大目謂爽唯免官而已以雒水為誓爽信之罷兵爽既罷兵曰我不失作富家翁範哭曰曹子丹爽父真字子丹佳人生汝兄弟犢爾何圖今日坐汝等族滅矣爽兄弟歸家勅雒陽縣發民八百人使尉部圍爽第四角角作髙樓令人在上望視爽兄弟舉動爽計窮愁悶持彈到後園中樓上人便唱言故大將軍東南行爽還㕔事上與兄弟共議未知宣王意深淺作書與宣王曰賤子爽哀惶恐怖無狀招禍分受屠滅前遣家人迎粮于今未反數日乏匱尚煩見餉以繼旦夕宣王得書大驚即答書曰初不知乏粮甚懐踧踖令致米一百斛并肉脯鹽豉大豆尋送爽兄弟不達變數即便喜歡自謂不死顧愷之為桓温司馬參軍嘗以一厨畵糊題其前寄桓𤣥皆其深所珍惜者𤣥乃發其厨後竊取畵而緘閉如舊以還之紿云未開愷之見封題如初但失其畵直云妙畵通靈變化而去亦猶人之登仙了無怪色及為散騎常侍與謝瞻連省夜于月下長詠瞻每過賛之愷之彌自力㤀倦瞻將眠令人代己愷之不覺有異遂申旦而止尤信小術以為求之必得桓𤣥常以一柳葉紿之曰此蟬所翳葉也取以自蔽人不見己愷之喜引葉自蔽𤣥就溺焉愷之信其不見己也甚以珍之庾條為臨川太守條氷之弟翼之兄而條於兄弟最凡劣故禄位不至宋趙倫之為領軍将軍性野拙人情世務多所不解久居方伯頗覺富盛入為䕶軍資力不稱以為見貶光禄大夫范泰好戲謂曰司徒公缺必用汝老奴我不言汝資地所任要是外戚髙秩次第所至耳倫之大喜每載酒肴詣泰劉義綦襲封營道侯凡鄙無知識每為始興王濬兄弟所戲濬嘗謂義綦曰陸士衡詩曰營道無烈心其何意苦阿父如此義綦曰下官初不識士衡何忽見苦其庸塞皆然位湘州刺史戴法興後廢帝時為越騎校尉尋免官鄉里賜死於家法興臨死封閉庫藏使家人謹録其鑰王懌侍中琨之父懌不辨菽麥時以為殷道矜之流人無肯與婚家以獠婢恭心侍之遂生琨南齊劉道隆為右衛將軍時謝超宗作商淑儀誄奏之大嗟賞謂謝莊曰超宗殊有鳯毛道隆在御坐出候超宗曰聞君有異物可見乎超宗曰懸罄之室復有異物耶道隆武人無識正觸其父名曰旦侍宴至尊說君有鳯毛超宗徒跣還内道隆謂檢覔鳯毛至暗待不得乃去熊度初為武陵王賛中直兵沈攸之過郢州度於城中樓上罵辱至自發露形體穢辱之及事寧度功居多後見朝廷貴戚說郢城事宣露如初其戇如此張敬兒為征西將軍於襄陽城西起宅聚財貨又欲移羊叔子墮淚碑於其處立臺綱紀諌曰羊太傅遺德不宜遷動敬兒曰太傅是誰我不知也後為散騎常侍不習朝儀聞當内遷乃於密室中屏人學揖讓對空中俯仰竟日妾侍竊笑及時拜開府儀同三司謂其妓曰我拜後應開黄閤因口為鼓聲又於新林慈姥廟為妾乞兒祝神自稱三公梁柳津為太子詹事雖乏風華性甚强直人或勸之聚書津曰吾嘗請道士奏章驅鬼安用此鬼名耶張仲子竟陵人繇其子興世致位給事中及興世為雍州刺史欲將往襄陽愛鄉里不肯去嘗謂興世曰我雖田舎老公樂聞鼔角汝可送一部行田時欲吹之興世素恭謹畏法譬之曰此是天子鼓角非田舎所吹興世欲拜墓仲子謂曰汝衛從太多先人必當驚怖興世减撤而行胡僧祐為天水天門二郡太守性好讀書不解緝綴然每在公宴必强賦詩文辭鄙野多被嘲謔僧祐怡然自若謂己實工矜伐愈甚蕭應廬陵王之子應不慧父薨至内庫閱珍物見金鋌問左右曰此可食不答曰不可應曰既不可食並特乞汝他皆此類何敬容為左僕射其署名敬字則大作茍小為攵容字則大為父小為口陸垂戲之曰公家茍既竒大父亦不小敬容遂不能答嘗有客姓吉敬容問卿與邴吉逺近答曰如明公之與蕭何後魏翟黒子封遼東公有寵於太武奉使并州受布千疋事尋發覺黒子請計於著作郎髙允曰主上問我首與諱乎允曰公帷幄寵臣答詔宜實又自告忠誠罪必無慮中書侍郎崔覽公孫質等咸言首實不可測宜諱之黒子以覽等為親已而反怨允曰如君言誘我死何其不宜遂與允絶黒子以不實對竟為太武所疎終獲戮死宋鴻貴為定州平兆府參軍送戍兵於荆州坐取兵絹四百疋兵欲告之乃斬十人又疎凡不達律令見律有梟首之罪乃生斷兵手以水澆之然後斬决尋坐伏法時人哀兵之苦笑鴻貴之愚酈約性多造次好以榮利干謁乞丐不巳多為人所笑弄坎壈於世不免饑寒北齊庫狄干為太宰封章武郡王不知書署名為干字逆上畫之時人謂之穿鎚又武將王周者署名先為吉而後成其外二人至子孫始並知書尉瑾為右僕射閨門穢雜為世所鄙然亦折節下士意在引接名流但不之别也孫搴為散騎常侍學淺行薄邢邵嘗謂曰須更讀書搴曰我精騎三千足敵君羸卒數萬搴少時與温子昇齊名嘗謂子昇卿文何如我子昇謙曰不如卿搴要其為誓子昇笑曰但知劣於卿便是何勞旦旦搴悵然曰卿不為誓事可知矣唐韓簡為魏博節度使封昌黎郡王而性麄質毎對文士不曉其說心嘗恥之乃召一孝㢘令講論語及講至為政篇明日謂諸從事曰僕近知古人淳朴年至三十方能行立外有聞者無不絶倒髙霞寓為邠寧節度觀察等使霞寓本騎將性輕悍無節制之材始因隨吐突承璀東討遂累得任而又好非斥朝列侮慢僚屬鄙詞俚語日聞於人竟不自悟以至於卒張仲武武宗㑹昌中為幽州節度使教其民曰凡為牛馬羊豕之類必先擇其牝之大者則其種亦大乃自指曰吾所以形貌大者繇母故也趙道興為右武候將軍其父才居是官時廨宇仍舊不改時人以為榮道興嘗自指其㕔事曰此是趙才將軍㕔今還使趙才將軍兒坐為朝野所笑傳為口實後唐盧程為莊宗太原府支使莊宗嘗於帳中召程草奏程曰叨忝成名不閑筆硯繇是文翰之選不及於程時張承業專制河東留守士人皆敬憚舊例支使監諸廩出納程訴於承業曰此事非僕所長請擇能者承業叱之曰公稱文士即合飛文染翰以濟覇圖嘗命草辭自陳短拙及留職務又以為辭公所能者何也程垂泣謝之晉康福為秦州節度使福無軍功屬後唐明宗龍躍有際㑹之幸擢自小校暴為貴人毎食非羊之全髀不能飫腹與士大夫交言懵無所别在天水日嘗有疾幕客謁問福擁衾而坐客有退者謂同列曰錦衾爛兮福聞之遽召言者怒視曰吾雖生于塞下乃唐人也何得以為爛奚因叱出之繇是諸客不敢措辭復有末客姓駱其先與後唐懿祖武皇父来自金山府一日因公讌福謂従事輩曰駱評事官則卑門族甚髙正沙陁也聞者竊笑焉册府元龜巻九百五十四
