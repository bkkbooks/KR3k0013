body:
  text: 册府元龜卷四百二十七宋王欽若等撰將帥部受降夫叛而伐之服而舍之軍之善政也故舞干而格因壘而降義著於招擕功成於無戰皆聖主之令範焉乃有董厥戎政式遏亂畧恩信攸及威聲載道强敵懾畏羣伍離析繇是開壁送欵負鑕歸仁狙獷咸懐反側以定甲兵載戢而芒刄不頓連甍案堵而閭井以完至乃障塞寧謐夷羌綏附克固吾圉以屏諸華此眞得良帥之風而逹經武之要者也後漢齊武王縯字伯升更始即位為大司徒時平林後部攻新野不能下新野宰登城言曰王莾改令長為宰東觀記曰其宰潘臨也得司徒劉公一信願先下及伯升軍至即開城門降馮異為陽夏侯光武以赤眉延岑暴亂三輔郡縣大姓各擁兵衆遣異討之異所至皆布威信𢎞農郡盗稱將軍者十餘軰皆率衆降又與赤眉遇於華陰戰數十合降其將劉始王宣等五千餘人銚期為虎牙大將軍銅馬數十萬衆入清陽博平期與諸將迎擊之連戰不利期乃更背水而戰所殺傷甚多㑹光武救至遂大破之追至館陶皆降之岑彭為征南大將軍建武二年彭率傅俊臧宫劉宏等圍秦豐於黎丘時田戎擁衆夷陵聞秦豐被圍懼大兵方至欲降而妻兄辛臣諫戎曰今四方豪傑各據郡國雒陽地如掌耳辛臣為戎作地圖圖彭寵張歩董憲公孫述等所分郡國云雒陽所得如掌耳不如按甲以觀其變戎曰以秦王之強秦王秦豐也猶為征南所圍豈况吾邪降計决矣四年春戎乃留辛臣守夷陵自將兵㳂江泝沔止黎丘刻期日當降而辛臣於後盜戎珍寳從間道先降於彭而以書招戎戎疑必賣已遂不敢降東觀漢記戎至期日灼龜卜降兆中坼遂止不降而反與秦豐合彭出兵攻戎數月大破之其大將伍公詣彭降耿弇為建威大將軍光武建武五年夏伏兵縱擊張歩追至鉅昧水上八九十里僵尸相屬因復戰所殺傷甚多歩乃負斧鑕於軍門弇𫝊步詣行在所弇復引兵至城陽降五校餘黨齊地悉平馬援建武十一年為隴西太守時武都氐人背公孫述來降者援皆上復其侯王君長賜印綬帝悉從之十三年武都参狼羌為寇援時以兵擊之至氐道縣羌在山上援軍據便地奪其水草不與戰羌遂因亡出塞餘種萬餘人悉降於是隴右清净耿秉為駙馬都尉明帝永平十七年與奉車都尉竇固擊車師車師後主安得震怖從數百騎出迎秉而固司馬蘓安欲全功歸固馳謂安得曰漢貴將獨有奉車都尉天子姊婿固尚光武女涅陽公主明帝姊也爵為通侯當先降之安得乃還更令其諸將迎秉秉大怒被甲上馬麾其精騎徑造固璧言曰車師王降訖今不至請往請梟其首固大驚曰且止將敗事秉厲聲曰受降如受敵遂馳赴之安得惶恐走出門脫帽抱馬足降東觀記曰脫帽趨抱馬蹄秉將以詣固其前王亦歸命遂定車師而還耿恭章帝建初二年為長水校尉時金城隴西羌反遣恭帥五校士三千人副車騎將軍馬防討西羌㳟屯抱罕數與羌接戰明年秋燒當羌降防還京師恭留擊諸未服者首虜千餘人獲牛羊四萬餘頭勒姐姐音紫子也切燒何羌等十三種數萬人皆詣恭降龎奮為鴈門太守行度遼將軍和帝永元六年南匈奴反畔脅立前單于屯屠何子薁鞬日逐王逄侯為單于逄侯於塞外分為二部自領右部屯涿邪山下左部屯朔方西北相去數百里八年冬左部胡自相疑畔還入朔方塞奮迎受慰納之其勝兵四千人弱小萬餘口悉降以分處北邊諸郡後右温禺犢王烏居數千人復畔奮及馮柱與諸郡兵擊烏居戰其衆降於是徙烏居戰衆及諸還降者二萬餘人於安定北地梁慬為西域副校尉安帝永初三年冬南單于與烏桓大人俱反以大司農何熙行車騎將軍事中郎將龎雄與副將羽林五校營士及發㳂邉十郡兵三萬餘人又遼東太守耿䕫率將鮮卑種衆共擊之詔慬行度遼將軍事龎雄與耿䕫共擊匈奴薁鞬日逐王破之單于乃自将圍中郎將耿种於美稷連戰數月攻之轉急种移檄求救明年正月慬將八千餘人馳往赴之至屬國故城與匈奴左將軍烏桓大人戰破斬其渠帥殺三千餘人虜其妻子獲財物甚衆單于復自將七八千騎迎攻圍慬慬被甲奔擊所向皆破虜遂引還虎澤三月何熙軍到五原曼栢暴疾不能進遣龎雄與慬及耿种步騎萬六千人攻虎澤連營稍前單于惶怖遣薁鞬日逐王詣慬乞降乃大陳兵受之單于脫帽徒跣面縛稽顙納質張奐安帝永寧初為安定屬國都尉初到職而南匈奴左薁鞬臺耆且渠伯徳等七千餘人寇美稷東羌復舉種應之而奐壁唯有二百許人聞即勒兵而出軍吏以為力不敵叩頭爭止之奐不聽遂進屯長城收集兵士遣將王衞招誘東羌因據龜兹使南匈奴不得交通東羌諸豪遂相率與奐和親共擊薁鞬等連戰破之伯徳惶怖遂將其衆降郡縣界以寧耿曅順帝永建中為烏桓校尉時鮮卑寇㳂邉殺代郡太守曅率烏桓及諸郡卒出塞討擊大破之鮮卑震怖數萬人詣遼東降魏曹眞為大將軍時安定民楊條等畧吏民保月支城眞進軍圍之條謂其衆曰大將軍自來吾願早降耳遂自縛出三郡皆降郭淮為征西將軍都督雍凉諸軍事與雍州刺史陳泰恊䇿降蜀牙門將句安等於趐上王基為荆州刺史虜吳安北將軍譚正納降數千口於是移其降民置夷陵縣鄧艾討蜀自陰平道先軍而進大破蜀軍乃至於雒劉禪遣使奉皇帝璽綬為箋詣艾請降艾至成都禪率太子諸王及諸臣六千餘人靣縛輿櫬詣軍門艾執節解縛焚櫬受而宥之檢御將士無所虜畧綏納降附使復舊業蜀人稱焉先是鍾㑹初并諸葛緒之軍進攻劍閣不克引退蜀軍保險拒守鄧艾遂至綿竹大戰斬諸葛瞻姜維等聞瞻已破率其衆東入于巴㑹乃進軍至涪遣胡烈田續龎㑹等追維艾軍向成都劉禪詣艾降遣使勅維等令降於㑹維至廣都棲縣令兵悉放器仗送節傳於胡烈便從東道詣㑹降吳陸遜為大將軍襲南郡至公安劉備宜都太守樊友委郡走諸城長吏及蠻夷君長皆降遜請金銀銅印以假授初附呂岱代步隲為交州刺史到州高凉賊率錢博乞降岱因承制以博為高凉西部都尉孫峻為大將軍五鳯二年正月魏鎭東將軍母丘儉前將軍文欽以淮西之衆西入戰於樂嘉閏月壬辰峻與驃騎將軍呂據左將軍留贊率兵襲夀春軍及東興聞欽等敗壬寅兵進於橐臯欽詣峻降淮南餘衆數萬口來降晉王濬為龍驤將軍武帝太康元年正月濬發自成都率巴東監軍廣武將軍唐彬攻吳丹陽克之濬自發蜀兵不血刄攻無堅城夏口武昌無相支抗於是順流鼔棹徑造三山孫皓遣游擊將軍張象率舟師萬人禦濬衆軍望旗而降皓聞濬軍旌旗器甲屬天滿江威勢甚盛莫不破膽用光禄勲薛瑩中書令胡冲計送降文於濬曰吳郡孫皓叩頭死罪昔漢室失御九州幅裂先人因時畧有江南遂阻山河與魏乖隔大晉龍興徳覆四海闇劣偷安未喻天命至於今者猥煩六軍衡盖露次逺臨江渚舉國震惶假息漏刻敢縁天朝含𢎞光大謹遣私署太常張䕫等奉所佩璽綬委質請命壬寅濬入於石頭皓乃備亡國之禮素車白馬肉袒靣縛御璧牽羊大夫衰服士輿櫬率其偽太子瑾瑾弟魯王䖍等二十一人造於壘門濬躬解其縛受璧焚櫬送於京師收其圖籍封其府庫軍無私焉王戎為豫州刺史建威將軍受詔伐吳遣叅軍羅尚劉喬領前鋒進攻武昌吳將楊雍孫述江夏太守劉朗各率衆詣戎降戎督大軍臨江吳牙門將孟泰以蘄春邾二縣降高密王畧懐帝初為使持節都督荆州諸軍事京兆流人王逌與叟人郝洛聚衆數千屯於冠軍畧遣叅軍崔曠率將軍皮初張洛等討逌為逌所譎戰敗畧更遣左司馬曹攄統曠等進逼逌將大戰曠在後密自退走攄軍無繼戰敗死之畧乃赦曠罪復遣部將韓松又督曠攻逌逌乃降庾翼成帝咸康六年為安西將軍荆州刺史鎭武昌時石季龍汝南太守戴開率數千人詣翼降桓温為安西將軍穆帝永和二年率衆伐蜀李勢勢衆大潰温乘勝直進焚其小城勢遂夜遁九十里至晉夀葭萌城其將鄧嵩昝堅勸勢降乃面縛輿襯請命温解縛焚櫬送於京師戴施為督護永和八年冉閔亂其子智以鄴城降得其傳國璽施以送之桓冲孝武時為車騎將軍荆州刺史鎭江陵苻堅使其將郝貴守襄陽冲使揚威將軍朱綽討之又使上庸太守郭寶伐苻堅魏興太守褚垣上庸太守叚方並降之桓石䖍領河東太守進據樊城太守逐苻堅兖州刺史張崇納三千家而還前秦茍萇為武衞將軍苻堅遣萇率衆伐張天錫既䧟其河㑹纒縮等城又降其將軍掌據天錫遣司兵趙充哲為先鋒率勁勇五萬與萇等戰於赤岸充哲大敗天錫懼而奔還致牋請降萇至姑臧天錫乘素車白馬靣縛輿櫬降於軍門萇釋縛焚襯送之於長安諸郡縣悉降王猛為苻堅將堅遣猛等率步騎三萬攻慕容暐洛州刺史慕容筑於洛陽暐遣其將慕容臧等率精兵十萬將解筑圍猛使梁成等以精銳萬人卷甲赴之大破臧於滎陽筑懼而請降猛陳師以受之留邵羌鎭金墉猛振旅而歸宋劉勔為輔國司馬時豫州刺史殷琰叛以勔假輔國將軍討之時琰賊降者明帝並送琰城下令與城内交言繇是人情沮䘮琰將降先送義陽王休祐内人出城然後開門時琰有疾以板自與與諸將帥靣縛請罪勔並撫宥無所誅戮自將帥以下財物資貨皆還之纎毫無所失陳宜黄縣侯惠紀為荆州刺史後主禎明二年蕭琮尚書左僕射安平王蕭儼晉熈王蕭瓛等率其部衆男女三萬餘口詣紀請降紀以兵迎之後魏古弼大武時為立節將軍進為侍中吏部尚書典南部奏事與安原降東部高車于已尼陂尉元獻文時為冠軍將軍宋薛安都以徐州内附元與孔伯恭赴援宋兖州刺史畢衆敬遣東平太守章仇􅋆詣軍歸欵元並納之李煥孝文時為司空從事中郎時豫州刺史裴叔業以夀春歸附詔煥以本官為軍司與楊大眼奚康生等率衆迎接煥至淮西叔業兄子植遣使送質煥等濟師入城撫慰民咸忻恱盧淵為安南將軍時涇州羌叛殘破城邑淵以步騎六千衆號二萬徐行而追未經三旬賊衆逃散降者數萬口唯梟首惡餘悉不問薛眞度為豫州刺史齊裴叔業以夀春内附詔眞度率衆赴之眞度至叔業來降隋周法尚高祖時為永州總管安集嶺南陳桂州刺史錢季卿南康内史柳璿西衡州刺史鄧暠陽山太守毛爽等前後詣法尚降陳定州刺史呂子廓據山洞反法尚引兵踰嶺子廓兵衆日散與千餘人走保巖嶮其左右斬之而降韓擒虎開皇中為盧州總管委以平陳之任甚為敵人所憚及大舉伐陳以擒虎為先鋒次於新林江南父老素聞其威信來謁軍門晝夜不絶陳人大駭其將樊廵曾世眞田瑞等相繼降之晉王遣行軍總管杜彦與擒虎合軍步騎二萬陳叔寶遣領軍蔡徴守朱雀航聞擒虎將至衆懼而潰任蠻奴為賀若弼所敗棄軍降於擒虎將五百人直入朱雀門陳人欲戰蠻奴撝之曰老人尚降諸君何事衆皆散走遂平金陵于仲文開皇中為柱國將軍伐陳之役拜行軍總管以舟師自章山出漢口陳郢州刺史荀法尚魯山城主誕法澄鄧沙彌等請降秦王俊皆令仲文以兵納之郭衍為左武衞大將軍從煬帝討吐谷渾出金山道納降二萬餘戶唐嗣曹王臯徳宗建中初為衡州刺史初湖南團練使辛京杲遣將王國良鎭武崗京杲侵刻之又虐其士卒國良以兵叛因據山守險刼行旅以自給詔徴荆南江西黔桂兵誅之二嵗不下乃以臯為潭州刺史湖南都團練使臯率諸軍至武崗國良阻險兵不得進臯乃謂諸軍曰國良恐京杲刻害本非反也其情易見不如降之乃三遺之書國良因請降未得其情臯曰其心屈矣乃捨軍自稱使者乘偏舟直造其壘曰我曹王也國良遂出降後為江西節度李希烈南侵臯表王鍔兼御史中丞都虞候後臯攻安州使伊慎盛兵圍之賊懼請臯使至城中以約降臯使鍔懸而入既成約殺不從者以出明日城開臯以其衆入焉高崇文為東川節度使憲宗元和六年破劉闢賊衆二萬餘於鹿頭闗斬首千餘級大將降者十餘人㧞鎭四所焚其營遂軍於鹿頭西大河之口以斷賊糧道賊大駭是月賊綿江棚將李文悦以三千人歸順尋而鹿頭將仇良輔舉城降者衆二萬闢男方朔子壻蘇強先監良輔軍是日械繫送京師降卒投戈靣縛者彌十數里遂長驅而南直指城都徳陽等縣城皆鎭以重兵莫不望旗率服師無留行李光顔為忠武軍節度使元和十一年正月淮西賊將韓伯雄降於光顏三月賊將吳秀琳以文城栅兵三千降于李愬遂以秀琳之衆攻吳房四月賊之郾城守將鄧懐金請以城降於光顏光顏帥師入其羅城後唐魏王繼岌同光三年九月為西征都統伐蜀繼岌至鳯州偽武興軍節度使王承捷以鳯興文扶四州降大軍食其芻粟得糧四十萬兵士八千魏王給牒令攝武興軍節度使前一日康延孝李嚴至故鎭威武城偽指揮使唐景思吳鐸王權思部下兵四百降于延孝其軍史鄒彥諲指揮使李璠見城危方出歸投郭崇韜以初無降意皆伏誅以唐景思攝興州刺史城中除已殺戮得兵四千米麥一十七萬粟三萬威武城蜀道咽喉險固之地其城倚嘉陵江三靣山險延孝既㧞故鎭殺其守將其衆萬餘縱其逸去至興州偽蜀東川節度使宋光葆以梓綿劍龍普等五州來降武定軍節度使王承肇以洋蓬璧三州符印降其監軍使周永謙為衆所殺興元節度使王宗威以梁開通渠麟等五州符印送降階州王丞岳納符印來降康延孝李嚴至漢州偽蜀主王衍遣人送牛酒請降魏王至綿州王衍遣使上牋曰衍叩頭言伏以五帝三王竟歸於代謝有家垂國孰免其廢興茍大命之革新願轉禍而為福衍誠惶誠恐叩頭伏以衍先人頃以受唐封册列土坤維自覇一方于兹三紀乃者因夷門之構逆偶中國以䘮君勉副推崇遂開釁孽衍謬為世子獲紹舊基而以㓜冲不得負荷尋遇大唐皇帝中興聖運再造鴻圖輝赫大明照臨下土洊修嘉好仰恃恩盟感覆幬於堯天將驅馳於禹貢忽審王師討伐部内震驚靡敢當鋒幸思歸命伏惟殿下位尊上嗣徳寳元良騰少海之波瀾動前星之秀彩親乘象輅勞履劍闗已得萬民之歡心望恕斯人之死罪今則完全府庫守遏邑居率文武以陳誠輿棺櫬而納欵伏惟殿下特𢎞哀鍳保證奏開亦存諸典刑貯在肺腑庶幾先人之靈猶享血食之祀免支離於眷屬得敬養於庭闈惟聖君之明慈係殿下之𤣥造衍無任危廹殆越戰懼激切之至謹差私署檢校司空行尚書兵部侍郎歐陽彬軍使韓知權等奉牋以聞十一月辛亥魏王軍到徳陽偽蜀六軍使王宗弼遣使顏守倫上牋云蜀主王衍已出府第舉家遷於西宅王宗弼權稱西川兵馬留後安撫軍城以候王師又言宗弼欲至漢州迎奉天軍其偽六軍印縁發遣公事且留未納翌日宗弼又遣人奉牋言昨蜀主與將校同議欵其偽樞密使宋光嗣景淵澄南院宣徽使周輅北院宣徽使歐陽晃等四人同出異謀惑亂蜀主臣當時梟首以狥謹令送納偽中書令䕫王宗範上牋曰臣生居潁許因先父建光啓中討陳敬瑄在蜀偽司空平章事王諧上牋曰臣因天復三年奉使西川遇車駕刼遷洛陽因留蜀部王衍尋又遣使上表曰臣衍言臣先人建乆在坤維受先朝寵澤一開土宇衍四十年頃以梁孽興灾鴻圖板蕩不可助逆遂乃從權勉循衆人止王三蜀固非獲己未有所歸臣輙紹鎡基且安生聚臣衍誠憂誠懼頓首頓首伏惟皇帝陛下嗣堯舜之業揚湯武之師廓定寰區削平兇逆梯航聚集文軌㑹同臣方議改圖便期納欵遽聞王師致討實抱驚危今則將千里之封疆盡為王土冀萬家之臣妾皆沐皇恩必當輿櫬乞降負荆請命伏惟皇帝陛下廻照臨之造施覆幬之私别示哀矜以安反側儻墳寢而獲祀實存没以知歸臣無任望恩䖍禱之至表稱乙酉年十一月二十日不稱偽年號甲寅魏王繼岌至漢州偽蜀六軍使王宗弼至乙卯魏王統大軍至蜀城北舍於王宗弼之别墅丙辰招撫使李嚴自蜀城引王衍及偽文武百官儀仗法物至蜀城北昇仙橋下王衍初乘竹輿自城中出至降所素衣牽羊草索繫首肉袒衘璧輿櫬後從宰臣百官衰絰徒跣以俟命魏王降車取其璧郭崇韜解縛燔櫬王衍率偽百官東北再拜謝恩訖又率衆拜魏王復拜崇韜韜答拜復拜李嚴嚴亦答拜丁巳大軍入西川城戒諸軍剽掠法令嚴峻軍士强括民錢必論之以法市不改肆兵無血刃册府元龜卷四百二十七
