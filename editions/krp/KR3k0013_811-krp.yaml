body:
  text: 冊府元龜卷八百十一宋王欽若等撰總録部游學賜書聚書晩學游學傳曰玉不琢不成器人不學不知道又曰不學將落故士之立誠志道自強不息潛心大業思齊古人曷嘗不主善以為師多聞而求友遵來學之訓聳游方之操裂裳褁足不逺千里造太學抵名都修庠序之儀徇切磋之益因之而交勝已講前言游道日廣知類通逹總經術之奥傑然名家膺推擇之命躋彼高位強識而讓為世所宗稽古之力與時偕盛自非多聞為冨廣業以勤方來時習脫乎匏瓜之繫親仁約禮霑乎霧露之潤亦曷能有所立哉孔子為魯司㓂已而去魯困於陳蔡之間於是反魯南宮敬叔言於魯君曰請與孔子適周魯君與之一乗車兩馬一豎子俱適周問禮見老子陳良楚人悅周公仲尼之道北學於中國北方之學者未能或之先也蘇秦洛陽人與魏人張儀同師事鬼谷先生穎陽陽城有鬼谷蓋是其人所居因號為鬼谷先生六國時從横家也秦後并相六國甘茂者楚下蔡人也為秦左丞相初事下蔡史舉先生學百家之說李斯為秦相始從荀卿學帝王之術學已成乃西入秦漢鼂錯潁川人也錯音措景帝時為御史大夫初學申商刑名於軹張惔生所軹縣之儒生姓張名惔錯從之受申商法也與洛陽宋孟及劉帶同師司馬談學天官於唐都即律歴志所云方士唐都者受易於楊何何字叔元菑川人見儒林傳習道論於黄子景帝時人也儒林傳謂之黄生與轅固爭論於上前謂湯武非受命乃殺之官至太史令子遷生於龍門年十嵗則誦古文二十而南游江淮上㑹稽探禹穴窺九疑浮沅湘北涉汶泗講業齊魯之都觀夫子遺風鄉射鄒嶧鄒縣名嶧山名於此行鄉射之禮過梁楚以歸亦為太史令夏侯勝字長公始昌之族子少孤好學從始昌受尚書及洪範五行傳說災異後事簡卿姓簡名卿簡音奸又從歐陽氏問為學精熟所問非一師也善說禮服禮之喪服也徴為博士蕭望之字長倩東海蘭陵人也徙杜陵以田為業至望之好學治齊詩事同縣后蒼且十年以令詣太常受業令郡國官有好文學敬長肅政教者二千石奏上與計偕詣太常受業如弟子復事同學博士白竒甞同於后蒼受業而竒後為博士又從夏侯勝問論語禮服禮之䘮服京師諸儒稱述焉官至前將軍樓䕶字君卿齊人父世醫也元始中封息鄉侯列於九卿䕶少隨父為醫出入長安貴戚家誦本草方術十數萬言長者咸愛重之共謂曰以君卿之材何不宦學乎由是辭其父學經傳官至廣漢太守杜鄴字子夏本魏郡繁陽人也祖父武帝時徙茂陵鄴少孤其母張敞女鄴壯從敞子吉學問得其家書以孝亷為郎哀帝時遷凉州刺史班彪字叔皮幼與從兄嗣共遊學家有賜書内足於財好古之士自逺方至父黨揚子雲以下莫不造門嗣雖修儒學然貴老莊之術叔皮唯聖人之道然後盡心焉謂班嗣貴老莊之術彪後為徐令以病去官後漢丁鴻字孝公潁川定陵人鴻年十三從桓榮受歐陽尚書三十而明章句善論難為都講遂篤志精銳布衣荷擔不逺千里永元中為司徒馬嚴字威卿援兄子也章帝時為御史中丞嚴少孤而好撃劍習騎射後乃白援從平原楊太伯講學專心墳典能通春秋左氏因覽百家羣言遂交結英賢京師大夫咸器異之周磐字堅伯汝南安成人和帝初為謁者父業建武初為天水太守磐少遊京師學古文尚書洪範五行左氏傳好禮有行非典謨不言諸儒宗之官至重合令張衡南陽西鄂人少善屬文遊於三輔因入京師觀太學遂通經貫六藝永元中為侍中景鸞字漢伯廣徳梓潼人也少隨師學經涉七州之地能理齊詩施氏易兼受河洛圗緯之書州郡辟命不就崔瑗字子玉涿郡安平人早孤銳志好學十八至京師從侍中賈逵質正大義逵善待之瑗因留游學遂明天官歴數京房易傳六日七分諸儒宗之漢安初為濟北相崔琦瑗之弟也少游學京師以文章博通稱後為臨濟長李固字子堅司徒郃之子也少好學嘗改易姓名杖䇿驅驢負笈追師三輔學五經積十餘年博覽古今明於風角星算河圖䜟緯仰察俯占窮神知變每到太學宻入公府定省父母不令同業諸生知是郃子冲帝時為太尉杜喬字叔榮河南林慮縣人少好學雖二千石子嘗步擔求師建和初為太尉黄昌字聖真會稽餘姚人也本出孤㣲居近學宮數見諸生修庠序之禮因好之遂就經學漢安初為大司農王奐明五經負笈追業嘗賃灌園恥交勢利後為議郎范丹字史雲陳留外黄人少為縣吏遁去到南陽受業於樊英又遊三輔就馬融通經歴年乃還嘗為萊蕪長後去官辟太尉府以疾不行何顒字伯永南陽襄鄉人少從郭㤗賈彪等遊學洛陽㤗等與同風好顒顯名太學於是中朝名臣太傅陳蕃司𨽻李膺等皆深接之辟司空府戴封字平仲濟北剛人年十五詣太學師事鄮令東海申君為西華令仲長統字公理山陽高平人少好學博涉書記贍於文辭年二十餘遊學青徐并冀之間與交者多異之後為尚書郎承宮瑯邪姑幕人也時鄉里徐子盛者以春秋經授諸生宮過息廬下樂其業因就聽經遂請留門下為諸生拾薪執苦數年勤學不倦後為侍中祭酒郭泰字林宗太原介休人也家世貧賤母欲使給事縣廷林宗不從遂辭就成臯屈伯彦學三年業畢博通墳典善談論羙音制乃游於洛陽司徒黄瓊辟太常趙典舉有道並不就魏王基字伯輿東萊曲城人也少孤與叔翁居年十七郡召為吏非其好也遂去入瑯琊界游學後為征南將軍樂詳河東人少好學聞謝該善左氏傳乃與南陽步陟詣許從該問難諸要今左氏問七十二事詳所撰太和中為騎都尉邴原字根矩北海朱虚人年十一而喪父家貧早孤鄰有書舎原過其傍而泣師問曰童子何悲原曰孤者易傷貧者易感夫讀書者必皆具有父兄者一則羡其不孤二則羡其得學心中惻然而為涕零也師亦哀原之言而為之泣曰欲書可耳答曰無錢資師曰童子茍有志我徒相教不求資也於是遂就書一冬之間誦孝經論語自在童齓之中嶷然有異及長金玉其行欲逺遊學詣安丘孫崧崧辭曰君鄉里鄭君君知之乎原答曰然崧曰鄭君學覽古今博聞強識鈎深致逺誠學者之師模也君乃舎之躡足千里所謂以鄭君為東家丘者也君似不知而曰然者何原曰先生之說誠可為苦藥良鍼矣然猶未逹僕之㣲趣也人各有志所規不同故乃有登山而採玉者有入海而採珠者豈謂登山者不知海之深入海者不知山之高哉君謂僕以鄭君為東家丘君以僕為西家愚夫耶崧辭謝焉又曰兗豫之士吾多所識未有若君者當以書相介原重其意難辭之持書而别原心以為求師啓學志高者通非若交游待介而成也書何為哉乃藏書於家而行原舊能飲酒自行之後八九年間酒不向口單步負笈苦身持行至陳留則師韓子助潁川則宗陳仲弓汝南則交范孟博涿郡則親盧子幹臨别師友以原不飲酒㑹米肉送原原曰本能飲酒但以荒思廢業故斷之耳今當逺别因見貺饑可以一飲燕於是共坐飲酒終日不醉歸以書還孫崧觧以不致書之意後為郡所召署功曹主簿華佗一名旉音敷字元化沛國譙人游學徐土兼通數經沛相陳珪舉孝亷太尉黄琬辟皆不就蜀尹黙字思潛梓潼涪人益部多貴今文而不崇章句黙知其不博乃逺游荆州從司馬徳操宋仲子等受古學皆通諸經史又專精左氏春秋為大中大夫卒李仁字徳賢與同縣尹黙俱游荆州從司馬徽宋忠等學吳士燮字威秀蒼梧廣信人也少游學京師事潁川劉子竒治左氏春秋察孝亷補尚書郎晉范晷字彦長南陽順陽人也少游學清河遂徙家僑居郡命為五官掾葛洪字稚川丹陽句容人也少好學時或尋書問義不逺數千里﨑嶇冒涉期於必得遂䆒覽典籍後選大著作固辭不就趙至字景真代郡人寓居洛陽緱氏年十四詣洛陽游太學遇嵇康於學冩石經徘徊視之不能去而請問姓名康曰年少何以問邪曰觀君風器非常所以問耳康異而告之後乃亡到山陽求康不得而還又將逺學母禁之至遂陽狂走三五里輒追得之年十六游鄴復與康相遇隨康還山陽後至遼西幽州三辟部從事梁周興嗣字思纂世居姑熟年十三游學京師積十餘載遂博通記傳善屬文後為給事中直西省沈峻字士嵩吳興武康人世為農夫至峻好學初事宗人沈麟士麟士卒後乃出郡遍遊講肆遂博通五經尤長三禮官至國子五經博士陳戚衮字公文吳郡鹽官人衮少聰慧游學京都受三禮於國子助教劉文紹三年中大義畧備對䇿高第除揚州祭酒從事陳賀徳基字承業祖父事梁俱為祠部有名當世徳基少游學於京邑積年不歸衣資罄乏又恥服故敝盛冬止衣裌襦袴累遷尚書祠部郎後魏公孫表字𤣥元燕郡廣陽人也游學為諸生慕容冲以為尚書郎邢巒字洪賓河間鄭人也少而好學負笈尋師家貧勵節遂博覽史傳有文才幹畧州郡表貢拜中書博士高允渤海人性好文學擔笈負書千里就業博通經史郡召補功曹馮元興字子盛東魏郡肥鄉人也少有操尚世父僧襲為平原太守隨僧襲在平原因就中山張吾貴常山房虬學通禮傳頗有文才徐遵明華隂人也幼孤好學年十七隨鄉人毛靈和等詣山東求學至上黨乃師屯留王聰受毛詩尚書禮記一年便辭聰詣燕趙師事張吾貴貴門徒甚盛遵明服膺數月乃私謂其友人曰張生名高而義無檢格凢所講說不愜吾心請更從師遂與平原田猛畧就范陽孫買徳受業一年復欲去之猛畧謂遵明曰君年少從師每不終業千里負帙何去就之甚如此用意終恐無成遵明曰然吾今始知真師所在猛畧曰何在遵明乃指心曰正在於此乃詣平原唐遷納之居於蠶舎讀孝經論語毛詩尚書三禮不出門院凡經六年時彈筝吹笛以自娛慰又知陽平館陶趙世業家有服氏春秋是晉世永嘉舊本遵明乃徃讀之復經數年是後教授門徒蓋寡乆之乃盛後廣平王懐聞而徵焉至而尋退孫惠蔚武邑人年十五粗通詩書及孝經論語十八師董道季講易十九師程𤣥讀禮經及春秋三傳周流儒肆有名於冀方歴中書博士侍讀東宮董徵頓丘人年十七師清河監伯陽受論語毛詩春秋周易就河内高望崇受周官後於博陵劉獻之遍受諸經數年中大義精練太和末為四門小學博士北齊李鉉字寳鼎年十六從李周仁受毛詩尚書章武劉子猛受禮記常山房虬受周官儀禮漁陽鮮于靈馥受左氏春秋天保初詔鉉與殿中尚書郎邢邵中書令魏收等參議禮律劉畫字孔昭河間鄚人少負笈從師服膺無倦恨下里少墳籍便杖䇿入都知太府少卿宗世良多書乃造焉世良納之恣意披覽河清初還冀州舉秀才入京考䇿不第邢峙字士峻河間鄚人少翫典墳游學燕趙之間後為清河太守馬敬徳河間人少好儒術負笈從大儒徐遵明學詩禮後為國子祭酒張雕家世貧賤而慷慨有志節雅好古學精力絶人負篋從師不逺千里起家殄冦將軍北史作張雕武後周熊安生字植之長樂阜城人也少好學勵精不倦初從陳逹受三傳又從房虬受周禮並通大義後事徐遵明服膺歴年東魏天平中受禮於李寳鼎遂博通五經河清中楊休之等特奏為博士盧損范陽人世任嶺表父頴遊宦京師損少學文隨父客汴洛間沈重字徳厚吳興武康人專心儒學從師不逺千里遂博覽羣書尤明詩禮及左氏春秋梁大通三年起家王國常侍初在梁為散騎常侍高祖徴為露門學士樊深字文深河東猗氏人弱冠好學負書從師於三河講習五經晝夜不倦永安中隨軍征討以功除盪冦將軍隋薛濬字道賾幼好學有志行尋師於長安時初平江陵何妥歸國見而異之授以經業天和中襲爵虞城侯公孫景茂字元蔚河間阜城人少好學博涉經史初仕後魏察孝亷射策甲科為襄城王長史兼行參軍劉焯字士元信都昌亭人也少與河間劉炫為友同受詩於同郡劉軌思受左傳於廣平郭懋嘗問禮阜城熊安生皆不卒業而去武強交津橋劉智海家素多墳籍焯就之讀書向經十載雖衣食不繼晏如也遂以儒學知名官至員外將軍盧思道年十六遇中山劉松為人作碑以示思道讀之多不解於是感激讀書師事河間邢子才又就魏收借異書數年之間才學兼著解褐司空參軍長史唐張士衡瀛州樂夀人父友國子博士劉軌思授以毛詩周禮又從熊安生及劉焯受禮記皆精究大義初仕隋為餘杭令太宗貞觀中為崇賢館學士高子貢和州歴陽人弱冠游太學遍涉六經尤精史記舉明經歴祕書正字宏文館直學士賜書中祕之書藏諸私室西漢而下殆踰千禩而得之者甚鮮豈非君恩之賜特出非常儒者之榮舉無倫比者乎其有名動搢紳譽高宗室或在公成績或為政有方由是濬發徳音曲推眷奨幽經祕記咸所寵賜垂之編簡足為羙談者也漢班斿為右曹中郎將與劉向校祕書每奏事斿每奏校書之事斿以選受詔進讀羣書於天子前讀書帝器其能賜以祕書之副斿孫彪幼與從兄嗣共游太學家有賜書内足於財好古之士自逺方至時東平王求書不得而斿獲賜祕書明見寵異後漢王景明帝時辟司空伏恭府永平十二年議修汴渠乃引見景問以理水形便景陳其利害應對敏給帝善之又以嘗修浚儀渠功業有成乃賜景山海經河渠書東平王蒼光武子章帝建武七年遣諸王歸國帝時留蒼賜以祕書列仙圖道術方黄香字文強章帝賜香淮南子孟子各一本位至尚書令蔡邕陳留人有賜書四千許卷位至左中郎將晉皇甫謐自表就武帝借書帝送一車書與之謐雖羸疾而披閱不怠守學好古不應徵命南齊晉安王子懋啟求所好書武帝曰知汝嘗以書讀在心足為深欣也賜子懋杜預手所定左傳及古今善言王儉為左僕射領太子少傅國子祭酒高帝建元三年省總明觀悉以四部書充儉家蕭晉蘭陵人家有賜書志學不倦梁西陽王大鈞年七嵗高祖嘗問讀何書對曰學詩因命諷誦音韻清雅高祖因賜王羲之書一卷陳江總篤學有辭采家有賜書數十卷總晝夜尋讀未嘗輟手位至尚書令唐李大亮為凉州都督以惠政聞太宗嘗賜荀悅漢紀一部下書曰卿立志方直竭節至公處職當官每副所委方大任使以申重寄公事之閒宜尋典籍然此書叙致既明論議深博極為政之體盡君臣之義今以賜卿宜加尋閲也聚書士大夫以詩禮立身儒素為業廣聚墳典以遺子孫若良農之儲耒耜百工之利刀尺也繕其簡編飾諸緗帙手自刋校心無倦怠至於義畜百家室盈千卷觀乎油素逹聖哲之心遺之子孫有清白之業異夫金玉滿堂貲幣潤屋多藏為累厚亡可俟者也後漢杜林扶風人家多書王莽末客河西於河西得漆書古文尚書經一卷每遭困厄握抱此經位至大司空魏王修家不滿斗斛有書數百卷太祖嘆曰士不妄有名也官至奉常蜀向朗潛心典籍積聚篇卷於時最多年八十手自校書刋定謬誤位至特進晉張華為司空領著作嘗徙居載書三十乗祕書監摯虞撰定官書皆資華之本以取正焉天下奇祕世所希有者悉在華所由是博物洽聞世無與比身死之日家無餘財惟有文史溢于几篋葛洪博聞深洽抄五經史漢百家之言方伎雜事三百一十卷金匱藥方一百卷肘後要急方四卷洪後為諮議叅軍裴憲為尚書與荀綽家俱有書百帙宋王曇首太保宏之弟也幼有素尚兄弟分財曇首唯取圖書而已南齊崔慰祖清河東武城人也好學聚書至萬卷隣里年少好事者來從假借日數十帙慰祖親自取與未嘗為辭范蔚家世好學有書七千餘卷逺近來讀書者常有百餘人蔚為辦衣食沈麟士吳興武康人累徵不就火燒書數千卷麟士年過八十耳目猶聰明乃手寫細書復成二三千卷滿數十篋梁陸少𤣥光禄大夫澄之子家有父書萬餘卷張率與少𤣥善遂通書籍盡讀其書沈約聰明過人好墳籍聚書至二萬卷京師莫比位至特進侍中任昉為祕書監墳籍無所不見家雖貧聚書至萬餘卷率多異本昉卒後高祖使學士賀縱共沈約勘其書目官所無者就昉家取之袁峻字孝高篤志好學家貧無書從人假借必皆抄冩自課日課十紙紙數不登則不止仕至貟外散騎侍郎王僧孺為南康王諮議參軍好墳籍聚書至萬餘卷率多異本與沈約任昉家書相埓張緬性愛墳籍聚書至萬餘卷抄後漢書衆家異同為後漢紀四十卷晉抄三十卷又抄江左集未及成文集五卷位至御史中丞孔休源為光禄大夫聚書盈七千卷手自校理陳姚察年十二能屬文父上開府僧坦知名梁代二宫禮遇優厚每得供賜皆回給察為游學之資察並用聚書圗畫由是聞見日博仕至吏部尚書求天下書逢即冩録所得萬餘卷無所不覽北齊郎基字世業中山人為鄭州長史潁川郡守基泛涉墳籍清慎無所營求嘗語人云任官之所木枕亦不須作况重於此乎唯頗令人冩書潘子義曽遺之書曰在官冩書亦是風流罪過基答曰觀過知人斯亦可矣辛術為東南道行臺尚書及定淮南凡諸貲物一毫無犯唯大收典籍多是宋齊梁時佳本鳩集萬餘卷并顧陸之徒名畫二王已下書法數亦不少後周裴漢借人異書必躬自録本至于疾疹彌年亦未嘗釋書仕至車騎大將軍儀同三司隋陸爽字開明初仕北齊為中書侍郎齊㓕周武帝聞其名與陽休之袁叔徳等十餘人俱徵入關諸人多將輜重爽獨載書數千卷至長安授宣納上士唐王方慶聚書甚多不减祕閣至於圗畫亦多異本諸子莫能守其業卒後尋併散亡仕至太子左庻子李襲譽居家清儉凢禄俸必散之宗親其餘但冩書而已及從揚州罷職經史遂盈數車仕至凉州都督吳兢家聚書頗多嘗自録其卷第號吳氏西齋書目仕至左庶子蘇弁聚書至三萬卷皆手自刋校至今言蘇氏書次於集賢芸閣焉官至户部侍郎韋處厚聚書萬卷手自刋校官至相位王涯字廣津太原人也以詞藝登科踐揚清峻家書數萬卷侔於書府名畫人所保惜者必以厚貲致之函奩皆飾之金寳為垣竅而藏之複壁後為相梁孫隲開平初歴諫議常侍隲雅好聚書有六經史漢百家之言凢數千卷洎李善所注文選皆簡幹精至校勘詳審趙凝鎮襄州凝好聚書至數千卷後唐王都為定州節度好聚圗書自恒山始破汴州初平令人廣將金帛收市以得為務不責貴賤書至三萬卷名畫樂器各數百皆四方之精妙者萃於其府張憲沉靜寡慾喜聚圗書家書五千卷視事之餘手自刋校仕至太原尹賈馥故鎮州節度使王鎔判官家聚書三千卷馥手自刋校晩學夫學者所以博綜古今而發明道義者也故仲尼曰生而知之者上也學而知之者次也困而學之者又其次也若夫習童䝉之性負剛毅之氣或栖身丘壑躬樵牧之後或結黨豪俠為奔走之事爰動子衿之刺聿興墻面之誚則有逮遲暮之嵗厭泥塗之辱改節不恡服勤自修覃研六藝之文砥礪五常之行致位卿相垂名簡冊者比比而有以至既居顯赫之任方從來學之業斯乃朝聞夕死老而彌篤者之謂也晉平公問師曠曰吾年七十欲學恐晚如何對曰少年而學如日出之光二十而學如日中之光老學如秉燭之明孰與眯行平公曰善哉仲由字子路卞人也少孔子九嵗子路性鄙好勇力直伉陵暴孔子孔子設禮稍誘子路後儒服委質因門人請為弟子谷永少為長安小吏後博學經書位太中大夫魏崔琰字季珪性少樸訥好撃劒尚武事年二十三鄉舉為正始感激讀論語韓詩至年二十九乃結公孫方等就鄭𤣥受學太祖時為中尉孟康以郭后外屬轉散騎侍郎于時皆共輕之號為阿九康既無才敏因在冗官博讀書傳後遂有所彈駮其文義雅而切要衆人乃更加意蜀向朗字巨逹領丞相長史初朗少時雖涉獵文學然不治素簡以吏能見稱自去長吏優游無事垂三十年乃更潛心典籍孜孜不倦年踰八十猶手自校書刋定謬誤積聚篇卷於時最多誘納後進講論古義時上自執政下及童冠皆敬重焉晉唐彬字儒宗魯國鄒人也彬有經國大度而不拘行檢少便弓馬好遊獵長八尺走及奔鹿強力兼人晚乃敦悅經史尤明易經隨師受業還家教授常數百人初為郡門下掾胡奮家世將門晩乃好學有刀筆之用所在有聲績居邊特有威惠武帝時位至大僕射周處字子隱義興陽羡人也少好馳騁田獵不修細行州曲患之處自知為人所患慨然有改勵之志入吳尋二陸時機不在見雲具以情告曰欲自修而年已蹉跎恐將無及雲曰古人貴朝聞夕改君前塗尚可但患志之不立何憂名之不彰處遂勵志好學有文思志存義烈言必忠信克己朞年州府交辟仕吳為東觀左丞宋沈攸之順帝時為車騎大將軍晩學讀書手不釋卷史漢事多所諳憶嘗嘆曰早知窮逹有命恨不十年讀書梁張充字延符少好逸遊父緒嘗告歸至吳始入西郭逢充獵右臂鷹左牽狗遇船至便放紲脫韝拜於水次父緒曰一身兩役無乃勞乎跪曰充聞三十而立今二十九矣請至來年緒曰過而能改顔氏子焉及明年便修身改節學不盈載多所該通起家撫軍叅軍劉峻字孝標平原人自以少時未開悟晚更厲精明慧過人苦所見不博聞有異書必徃祈借清河崔慰祖謂之書滛於是博極羣書文藻秀出故其自序云黌中濟濟皆升堂亦有愚者觧衣裳言其少年魯鈍也峻後游東陽紫嵓山築室居焉後魏谷渾父衮膂力兼人彎弓三百斤渾少有父風任俠好氣以父母在常自退抑晩乃折節受經業遂覽羣書被服類儒者後為儀曹尚書劉蘭武邑人年二十餘始入小學書急就篇家人覺敏遂令從師受春秋詩禮於中山王保安家貧無以自資且耕且學三年之後便白其兄蘭欲講書其兄笑而聼之為立黌舍聚徒二百後為國子助教後周楊汪少凶躁好與人羣鬬拳所毆撃無不顛踣長更折節勤學專精左氏通三禮觧褐冀王侍讀隋豆盧勣周明帝時為左武伯中大夫勣自以經業未通請觧職遊露門學帝嘉之勑以本官就學王頗字景文齊州刺史頒之弟年數嵗値江陵䧟隨諸兄入闗少好遊俠年二十尚不知書為其兄顒所責怒於是感激始讀左傳禮易詩書乃嘆曰書無不可讀者勤學累載遂遍通五經䆒其㫖趣大為儒者所稱唐李安逺少時好飛鷹走狗遊蕩無度家代為將甚富於財然數從博徒遊至於破業晩始折節讀書敬慕名士但逢勝已皆傾心而與遊焉後為懐州刺史終侯君集拜吏部尚書進位光禄大夫君集出自行伍素無學術及被任遇方始讀書姚元崇少居廣成澤不知書唯以射獵為事年四十張憬藏謂元崇曰當以文學備用將相無自棄爾遂折節讀書後為相梁韓建為華州刺史比不知書治郡之暇日課學習遣人於器皿牀榻之上各題其名建視之既熟乃漸通文字冊府元龜卷八百十一
