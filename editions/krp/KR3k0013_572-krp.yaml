body:
  text: 册府元龜卷五百七十二宋王欽若等撰掌禮部討論第二魏蔣濟為太尉初侍中髙堂隆論郊祀事以魏為舜後推舜配天濟以舜本姓媯其苖曰田非曹之先著文以追詰隆及與尚書繆襲往反竝有理據又難鄭𤣥注祭法云有虞以上尚得禘郊祖宗配用有徳自夏已下稍用其姓氏濟曰夫虯龍神於獺獺自祭其先不祭虯龍也麒麟白虎仁於豺豺自祭其先不祭麟虎也如𤣥之說虞已上豺獺之不若邪臣以為祭法所云見疑學者久矣鄭𤣥不考正其違而就通其義吳張昭弱冠察孝亷不就汝南主簿應劭議宜為舊君諱論者皆互有異同事在風俗通昭著論曰客有見大國之議士君子之論云起元建武已來舊君名諱五十六人以為後生不得恊也取乎經論譬諸行事義髙辭麗甚可嘉羡愚意𥚹淺切有疑焉蓋乾坤刻分萬物定形肇有父子君臣之經故聖人順天之性制禮尚敬在三之義君實食之在䘮之哀君親臨之厚莫重焉恩莫大焉誠臣子所尊仰萬夫所天恃焉得而同之哉然親親有等尊尊有殺故禮服上不盡髙祖下不盡𤣥孫又傳記四世而緦麻服之窮也五世袒免殺同姓也六世而親屬竭矣又曲禮有不建事之義則不諱者蓋名之謂屬絶之義不拘於恊况乃古君五十六哉邾子㑹盟季友來歸不稱其名咸書字者是時魯人嘉之也何觧臣子為君父諱乎周穆王諱滿至定王時有王孫滿者其為大夫是臣恊君也又厲王諱胡及荘王之子名胡其比衆多夫類事建議經有明據傳有徴案然後進攻退守萬無奔北垂示百世永無咎失今應劭雖上尊舊君之名而下無所斷齊猶歸之疑云曲禮之篇疑事無質觀省上下闕義自證文辭可謂倡而不法将來何觀言聲一放猶拾瀋也過辭在前悔其何追又云昭與王朗共論舊君諱事州里才士陳琳等皆稱善之晉蔡謨為太常康帝建元元年太史上元日合朔後復疑應却㑹與否庾氷輔政冩劉邵議以示八座於時有謂邵為不得禮意茍或從之是勝人之一失謨遂著議非之曰邵論災消異伏又以梓慎禆竈猶有錯失太史上言亦不必審其理誠然也云聖人垂制不為變異預廢乎禮此則謬矣災祥之發所以譴告人君王者之所重誡故素服廢樂退避正寝百官䧏物用幣伐鼔躬親而救之夫敬誠之事與其疑而廢之寧慎而行之故孔子老𥅆助葬於巷黨以䘮不見星而行故日蝕而止柩曰安知其不見星也而邵廢之是棄聖贒之成規也魯桓公壬申有災而以乙亥甞祭春秋譏之災事既過猶追懼未已故廢宗廟之祭况聞天眚将至行慶樂之㑹於禮乖矣禮所云諸侯入門不得終禮者謂日官不豫言諸侯既入見蝕乃知耳非先聞當蝕而朝㑹不廢也引此可謂失其義㫖劉邵所執者禮記也夫子老𥅆巷黨之事亦禮記所言復違而反之進退無據然荀令所言漢朝所從遂使此言至今見稱莫知其誤矣後君子将擬以為式故正之云爾於是氷從衆議遂以却㑹至永和中殷浩輔政又欲從劉邵議不却㑹王彪之據咸寕建元故事又曰禮云諸侯旅見天子不得終禮而廢者四自謂卒暴有之非為先存其事而僥倖史官推衍謬錯故不豫廢朝禮也於是又從彪之議宋傅亮為中書令時御史中丞蔡廓疑揚州刺史廬陵王義真朝堂班次亮與廓書曰揚州自應著刺史服耳然謂坐起班次應在朝堂諸官上不應依官次坐下足下試更尋之詩序云王姬下嫁於諸侯衣服禮秩不係其夫下王后一等推王姫下王后一等則皇子居然在王公之上陸士衡起居注式乾殿集諸皇子悉在三司上今抄疏如别又海西即位赦文太宰武陵王第一撫軍将軍㑹稽王第二大司馬第三大司馬位既最髙又都督中外而次在二王之下豈非下皇子耶此文今具在也永和中蔡公為司徒司馬簡文為撫軍開府對録朝政蔡為正司不應反在儀同之下而於時位次相王在前蔡公次之耳諸例甚多不能復具疏揚州反乃居卿尹之下恐此失禮宜改之也廓答曰揚州位居卿尹之下甞亦為疑然朝廷以位相次不以本封復無明文云皇子加殊禮齊獻王為驃騎孫秀來䧏武帝欲優異之以秀為驃騎轉齊王為鎮軍在驃騎上若如足下言皇子便在公右則齊王本以自尊何改鎮軍令在驃騎上明知故依見位為次也又齊王為司空賈充為太尉俱録尚書署事甞在充後潘正叔奏公羊事於時三録梁王彤為衞将軍署在太尉隴西王㤗司徒王𤣥冲下近太元初賀新宫成司馬太傅為中軍而以齊王柔之為賀首立安帝為太子上禮徐邈為郎位次亦以太傅在諸王下又謁李太后宗正尚書符令以髙宻王為首時王東亭僕射王徐皆是近世識古今者足下引式乾公王吾謂未可為據其云上出式乾古傳中彭城王植荀組潘岳嵇紹杜斌然後道足下所疏四王在三司之上反在黄門郎下有何義且四王之下則云大将軍梁王彤車騎趙王倫然後云司徒王戎耳梁趙二王亦是皇子屬尊位齊在豫章王常侍之下又復不通蓋書家指疏時事不必存其班次式乾亦是私宴異於朝堂如今含章西堂足下在僕射下侍中在尚書下耳來示又云曽祖與簡文對録位在簡文下吾家故事則不然今冩如别王姬身無爵位故可得不從夫而以王女為尊皇子出任則有二位二位則依朝復示之班序唯引太和赦文差可為言然赦文前後亦參差不同太宰上公自應在大司馬前耳簡文雖撫軍時已授丞相殊禮又中外都督故以本任為班不以督中外便在公右也今䕶軍總方伯而位次故在持節都督下足下復思之建平王宏為左僕射孝武建武元年六月湘東國太妃以去三十年閏六月二十八日薨未詳周忌當在六月為取七月未詳服勅禮官議正博士丘邁之議案呉商議閏月亡者應以本正之月為忌謂正閏論雖各有所執商議為允宜以今六月為忌宏謂邁之議不可准據按晉世及皇代以來閏月亡者以閏之後月祥宜以來七月為祥忌南齊王儉為尚書左僕射時竟陵王子良母太妃以七月薨子良以八月奉㓙問及小祥疑南郡王應相待儉議以為禮有倫序義無徒設如令逺則不待近必相須禮例既乖即心無取若疑兄弟同居吉㓙舛雜則逺還之子自應開立别門以終䘮事靈筵祭奠隨在家之人再朞而毁庻子在家亦不待嫡而况諸妃正體王室中軍長奠之重天朝又行權制進退彌復非疑謂應不相待中軍縓縞之日聞喜致哀而已不受弔慰至聞喜變除昆弟亦宜相就冩情不對客從之後魏裴延儁宣武時為司州别駕加鎮逺将軍及詔立明堂羣官博議延儁獨著一堂之論太傅清河王懌時典衆議讀而笑曰子故欲逺符僕射也李謐涿郡人少好學博通諸經覽考工記大戴禮盛德篇以明堂之制不同遂著明堂制度論曰余謂論事辨物當取正於經典之真文援證定疑必有驗於周孔之遺訓然後可以稱凖的矣今禮文殘缺聖言靡存明堂之制誰使正之是以後人紛糾競興異論五九之說各信其習是非無凖得失相半故歴代紛紜靡所取正乃使裴頠云今羣儒紛糾互相掎摭就令其象可得而圗其所以居用之禮莫能通也為設虛噐耳况漢氏所作四維之个復不能令各處其辰愚以為尊祖配天其義明著廟宇之制理據未分直可為殿屋以崇嚴父之祀其餘雜碎一皆除之斯豈不以羣儒舛互竝乖其實據義求衷莫適可從哉但恨典文殘㓕求之靡據而已矣乃復遂去室牖諸制施之於教未知其所隆政求之於情未可喻其所以必須惜哉言乎仲尼有言曰賜也爾愛其羊我愛其禮余以為隆政必須其禮豈彼一羊哉推此而論則聖人之於禮殷勤而重之裴頠之於禮任意而忽之是則頠贒於仲尼矣以斯觀之裴氏子以不逹而失禮之㫖也余切不自量頗有鄙意據理尋義以求其真貴合雅衷不茍偏信乃藉之以紀傳考之以訓注博採先贒之言廣搜通儒之說量其當否參其同異棄其所短收其所長推義察圗以折厥𠂻豈敢必善聊亦合其言志矣凡論明堂之制者雖衆然較其大畧則二途而已言五室者則據周禮考工之記以為本是康成之徒所執言九室者則按大戴盛德之篇以為源是伯喈之論所持此之二書雖非聖㫖然是先贒之中博見洽通者也但各記所聞未能全正盡美未盡善也然先儒不能考其當否便各是所習卒相非毁豈逹士之確論哉小戴氏傳禮事四十九篇號曰禮記雖未能全當然多得其衷方之前贒亦無愧矣而月令玉藻明堂三篇頗有明堂之義余故採掇二家參之月令以為明堂五室古今通則其室居中者謂之太室當太室之東者謂之青陽當太室之南者謂之明堂當太室之西者謂之總章當太室之北者謂之𤣥堂四靣之室各有夾房謂之左右个三十六户七十二牖矣室个之形今之殿前是其遺像耳个者即寝之房也但明堂與寢施用既殊故房个之名亦隨事而遷耳今粗書其像以見鄙意按圗察義畧可騐矣故簡之五室則義明於考工較之户牖則數叶於盛德考之施用則事著於月令求之閏也合周禮與玉藻既同夏殷又符周秦雖乖衆儒儻或在斯矣考工記曰周人明堂度以九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵室中度以几堂上度以筵余謂記得之於五室而謬於堂之脩廣何者當以理推之令愜古今之情也夫明堂者蓋所以告月朔布時令宗文王祀五帝者也然營搆之範自當因宜創制耳故五室者合於五帝各居一室之義且四時之祀皆據其方之正又聽朔布令咸得其月之辰可請施政及記二三得允求之古義竊為當矣鄭康成漢末之通儒後學所宗正釋五室之位謂土居中木火金水各居四維然四維之室既乖其正施令聽朔各失厥衷左右之个棄而不顧乃反文之以美說飾之以巧辭言水木用事交於東北木火用事交於東南金火用事交與西南金水用事交於西北既以依五行當從其用事之交出何經典可謂攻於異端言非而博疑誤後學非所望於先儒也禮記玉藻曰天子聽朔於南門之外閏月則闔門左扉立於其中鄭𤣥注曰天子之廟及路寝皆如明堂制明堂在國之陽毎月就其時之堂而聽朔焉卒事及宿路寝亦如之閏月非常月也聽其朔於明堂中門還處路寝閏終月也而考工記周人明堂𤣥注曰或舉王寝或舉明堂互之以明其制同也其制同之言皆出鄭注然則明堂與寝不得異矣而尚書顧命篇曰迎子釗於南門之外延入翼室此之翼室即路寝矣其下曰大貝賁皷在西房垂之竹矢在東房此則路寝有左右房見於經史者也禮記䘮大記曰君夫人卒於路寝小歛婦人髽帶麻於房中鄭𤣥注曰此蓋諸侯禮帶麻於房中則西房也天子諸侯有左右房見於注者也諸路寝則列其左右房言明堂則闕其左右个同制之說還相矛盾通儒之注何其然乎使九室之徒奮筆而争鋒者豈不繇處室之不當哉記云東西九筵南北七筵五室凡室二筵置五室於斯堂雖使班倕搆思王爾營度亦不能令三室不居其南北也然則三室之間使居六筵之地而室壁之外裁有四尺五寸之堂焉豈有天子布政施令之所宗祀文王以配上帝之堂周公負扆以朝諸侯之處而室户之外僅餘四尺而已哉假在儉約為陋過矣論其堂宇則偏而非制求之道理則未愜人情其不然一也余恐為鄭學者茍求必勝競生異端以相訾抑云二筵者乃室東西耳南北則挾焉余故備論之曰若東西二筵則室户之外為丈三尺五寸矣南北户外復如此則三室之中南北各丈二尺耳記云四房兩夾窓若為三尺之戸二尺之窓窓戸人之明裁盈一尺䋲樞瓮牖之室蓽門圭竇之堂尚不然矣假令復欲小廣之則四靣之外闊狹不齊東西既深南北更淺屋宇之制不為通矣騐之衆塗畧無筭焉且凡室二筵丈八地耳然則户牖之間不踰二尺也禮記明堂天子負斧扆南向而立鄭𤣥注曰設斧扆於户牖之間而鄭氏禮圗說扆制曰縱廣八尺畫斧文於其上今之屏風也以八尺扆置二尺之間此之叵通不待智者較然可見矣且若二筵之室為四尺之户則户之兩頰裁各七尺耳全以置之猶不自容矧復户牖之間哉其不然二也又復以世代騐之即虞夏尚朴殷周尚文造制之差毎加崇飾而夏后世室堂脩二七周人之制反更促狹豈是夏禹卑宫之意周監郁郁之美哉以斯察之其不然三也又云堂崇一筵便是基髙九尺而壁户之外裁四尺五寸於營制之法自不相稱其不然四也又云室中度以几堂上度以筵而復云凡室二筵而不以几還自相違其不然五也以此騐之記者之謬抑可見矣盛德篇云明堂凡九室三十六户七十二牖上圓下方東西九仭南北七筵堂髙三尺也余謂盛德篇云得之於户牖失之於九室何者五室之制旁有夾房面各有户户有兩牖此乃因事立則非拘異術户牖之數固自然矣九室者論之五帝事既不合施之時令又失其辰左右之个重置一隅兩辰同處參差出入斯乃義無所據未足稱也且又堂之修廣裁六十三尺耳假使四尺五寸為外基其中五十四尺便是五室之地計其一室之中僅可一丈置其户牖則於何容之哉若必小而為之以容其數則令帝王側身出入斯為怪矣此匪直不合典制抑亦可哂之甚也余謂其九室之言誠亦有繇然竊以為戴氏聞三十六戸七十二牖弗見其制靡知所置便謂一室有四户之窓計其戸牖之數即以為九室耳或未之思也蔡伯喈漢末之時學士而見重於當時即識其脩廣之不當而必未思其九室之為謬更修而廣之假其法像可謂因偽飾詞順非而澤諒可歎矣余今省彼衆家委心從善庻探其衷不為茍異但是古非今俗間之常情愛逺惡近世中之常事而千載之下獨論古制驚俗之談固延多誚脫有深賞君子覽而揣之儻或存焉隋劉炫為旅騎尉吏部尚書牛𢎞建議以為禮諸侯絶傍朞大夫䧏一等今之上柱國雖不同古諸侯比大夫可也官在第二品宜䧏傍親一等議者多以為然炫駁之曰古之仕者宗一人而已庻子不得進繇是先王重適其宗子有分禄之義族人與宗子雖踈逺猶服縗三月良繇受其恩也今之仕者位以才昇不限嫡庻與古既異何䧏之有今之貴者多忽近親若或䧏之民德之踈自此始矣遂寝其事唐張柬之聖厯初為鳯閣舍人時𢎞文館直學士王元感著論云三年之䘮合三十六月柬之著論駁之曰三年之䘮二十五月不刋之典也謹按春秋魯僖公三十三年十二月乙巳公薨文公二年冬公子遂如齊納幣左傳曰禮也杜預注云僖公䘮終此年十一月納幣在十二月婚禮納采納徴皆有𤣥纁束帛諸侯則謂之納幣盖公為太子已行婚禮故傳稱禮也公羊傳曰納幣不書此何以書譏䘮娶在三年之外何以譏三年内不圖婚何休注云僖公以十二月薨至此冬未滿二十五月納采問名納吉皆在三年之内故譏何休以公十二月薨至此冬十二月纔二十四月非二十五月是未三年而圗婚也按經書十二月乙巳公薨杜以長厯推乙巳是十一月十二日非十二月經書十二是經誤文公元年四月葬我君僖公傳曰緩也諸侯五月而葬若是十二月薨即是五月不得言緩明知是十一月薨故注僖公䘮終此年至十二月而滿二十五月故丘明傳曰禮也據此推歩杜之考校豈公羊之所逮况丘明親受經於仲尼乎且二傳何杜所争惟争一月不争一年其二十五月除䘮繇來無别此則春秋三年之䘮二十五月之明騐也尚書伊訓云成湯既没太甲元年惟元祀十有二月伊尹祀於先王奉嗣王祗見厥祖孔安國注云湯以元年十一月殂據此則二年十一月小祥三年十一月大祥故太甲中篇云惟三祀十有二月朔伊尹以冕服奉嗣王歸於亳是十一月大祥訖十二月朔日加王冕服吉而歸亳也是孔言湯元年十一月之明騐顧命云四月哉生魄王不懌是四月十六日也翌日乙丑殂是十七日也丁卯命作册度是十九日也越七日癸酉伯相命士須材是四月二十五日也則成王殂至康王麻冕黼裳中間有十日康王方始見廟則知湯殂在十一月淹停至殮訖方始十二月祗見其祖顧命見廟訖諸侯出廟門俟伊訓言祗見厥祖侯甸羣后咸在則殂及見廟殷周之禮竝同此周因於殷禮損益可知也不得元年以前别有一年此尚書三年也䘮二十五月之明騐也禮記三年問云三年之䘮二十五月而畢哀痛未盡思慕未忘然而服以是斷之者豈不送死有已復生有節又䘮服四制云變而從宜故大祥鼓素琴告人以終又間傳云朞而小祥食菜果又朞而大祥有醯醤中月而禫食酒肉又䘮服小記云再朞之䘮三年也朞之䘮二年也九月七月之䘮三時也五月之䘮二時也三月之䘮一時也此禮記三年之䘮二十五月之明騐也儀禮士虞禮云朞而小祥又朞而大祥中月而禫禫是吉祭此禮周公所制則儀禮三年之䘮二十五月之明驗也此四驗者竝禮經正文或周公所制或仲尼所述吾子豈得以禮記戴聖所脩輙欲排毁漢初髙堂生傳禮記未周備宣帝時少傅后蒼因淹中孔壁所得五十六篇著曲臺記以授弟子戴德戴聖慶溥三人合以正經及孫卿所述竝相符㑹列於學官年代已乆今無端搆造異論既無依據深可歎息其二十五月先儒考校唯鄭康成注儀禮中月而禫以中月間一月自死至禫凡二十七月又觧禫云言澹澹然平安之意也今皆二十七月復常從鄭議也踰月入禫禫既復常則二十五月為免服二十五月二十七月其議本同竊以子之於父母䘮也有終身之痛創巨者日乆痛深者愈遲豈徒嵗月而已乎故練而慨然蓋悲慕之懐未盡而踊擗之情已歇祥而廓然者蓋哀傷之痛已除而孤邈之念更起此皆情之所致豈外飾哉故記云三年之䘮義同過隙先王立其中制以成文理是以祥則縞帶素紕禫則無所不佩今吾子将徇情棄禮實為乖僻夫棄縗麻之服襲錦縠之衣行道之人皆不忍也直為節之以禮無可奈何故繇也不能過制為姊服鯉也不能過朞哭其母夫豈不懐懼名教逼已也至若孔鄭何杜之徒竝命代挺生範模來裔宫牆積仭未易可窺但鑚仰不休當漸入勝境詎勞終年矻矻虛肆莠言請所有掎擿先儒願且以時消息時人以柬之所駁頗合於禮典顔真卿為憲部尚書肅宗復西京将還宫闕遣左司郎中李選先行告宗廟之禮有司撰祝文稱嗣皇帝真卿謂禮儀使崔噐曰上皇在蜀稱嗣可乎噐遽改之中㫖宣勞以為明儒深逹禮典冊府元龜卷五百七十二
