body:
  text: 冊府元龜卷四百十一宋王欽若等撰將帥部間諜周禮士師掌士之八成其三曰邦諜盖反間之作舊矣乃若用兵貴於伐謀臨敵重於制變揣其情狀離其親信多方以誤見機而作計成於詭譎事出於權道此所以未戰而屈人以竒而取勝者也春秋戰國干戈日尋故其縱諜遣覘多尚詐力漢魏而下本兵柄者亦有深衷宻畫巧法潜運用能摧勁敵剪大姦夷兇殘樹勲烈非心術之精妙軍志之詳練又曷能因時而合變哉伯嘉為羅大夫楚伐絞之役楚師分渉於彭彭水在新城魏縣羅人欲伐之使伯嘉諜之三廵數之羅熊姓國在宣城縣西山中復徙南郡枝江縣諜伺也廵徧也子元為楚令尹子元楚王之弟也以車六百乗伐鄭入於桔秩之門桔秩鄭逺郊之門也諸侯救鄭楚師夜遁鄭人將奔桐丘許昌東北有桐丘城諜告曰楚幕有烏乃止諜間也幕帳也子罕為宋司城宋以武公諱司空為司城子罕戴公後樂喜也陽門之介夫死陽門宋國名介夫甲衛士子罕入而哭之哀晉人之覘宋者反報於晉侯曰陽門之介夫死而子罕哭之哀而民説殆不可伐也覘窺視也孔子聞之曰善哉覘國乎善知其㣲詩云凡民有喪匍匐救之救猶助也雖微晉而已天下孰能當之微猶非也田單齊諸田疏屬也燕使樂毅伐破齊齊湣王出奔已而保莒城燕師長驅平齊而單走安平今之東安平也令其宗人盡斷其車軸木而傅鐵籠故得脱東保即墨即墨大夫出與戰敗死城中相與推單曰安平之戰田單宗人以鐵籠得全習兵立以為將軍以即墨拒燕頃之燕昭王卒惠王與樂毅有隙單聞之乃縱反間於燕宣言曰齊王已死城之不㧞者二耳樂毅畏誅而不敢歸以伐齊為名實欲連兵南面而王齊齊人未附故且緩攻即墨以待其事齊人所懼唯恐他將之來即墨殘矣燕王以為然使騎刼代樂毅樂毅因歸趙單又縱反間曰吾懼燕人掘吾城外冡墓僇先人可為寒心燕軍盡掘壟墓燒死人即墨人從城上望見皆泣涕其欲出戰怒自十倍遂夷殺其將騎刼燕軍擾亂奔走齊人追亡逐北所過城邑皆畔燕而歸單所亡七十餘城皆復公子無忌魏安釐王異母弟也與魏王博而北境傳舉烽言趙宼至且入界魏王釋博欲召大臣謀公子止王曰趙王田獵耳非為宼也復博如故王恐心不在博居頃復從北方來傳言曰趙王田獵耳非為宼也魏王大驚曰公子何以知之公子曰臣之客有能探得趙王隂事者趙王所為客輙以報臣臣是以知之趙奢為趙將秦伐韓軍於閼與趙王令趙奢將救之兵去邯鄲三十里為令軍中曰有以軍事諌者死秦軍軍武安西属魏郡在邯鄲西秦軍鼔譟勒兵武安屋瓦盡振軍中候有一人言急救武安趙奢立斬之堅壁留二十八日不行復益増壘秦間來入奢善食而遣之間以報秦將秦將大喜曰夫去國三十里而軍不行乃増壘閼與非趙地也奢既以遣秦間乃卷甲而趋之大破秦軍秦軍解而走遂解閼與之圍而歸范雎為秦昭王相王使左庶長王齕攻韓取上黨上黨民走趙趙軍長平在泫氏齕因攻趙趙使亷頗將亷頗堅壁以待秦秦數挑戰趙兵不出趙王數以為讓而睢使人行千金於趙為反間曰秦之所惡獨畏馬服子趙括將耳亷頗軍易與且降矣趙王既怒亷頗軍多失亡軍數敗乂反堅壁不敢戰而又聞秦反間之言因使趙括代亷頗將以擊秦秦聞馬服子將乃以武安君白起為上將軍秦軍射殺趙括括軍敗卒四十萬人䧏武安君武安君乃挾詐而盡坑殺之李牧為趙將嘗居代鴈門備匃奴多間諜王翦為秦將攻趙趙使李牧司馬尚禦之李牧數破走秦軍殺秦將桓齮翦惡之乃多與趙王寵臣郭開等金使為反間曰李牧司馬尚欲與秦及趙以多取封於秦趙王疑之使趙葱及顔聚代將斬李牧廢司馬尚後三月翦因急擊趙大破殺趙䓤虜王遷及其將顔聚遂滅趙漢陳平初為漢王䕶軍中尉項羽圍漢王於滎陽城漢王患之請割滎陽以西和項王弗聼平曰顧楚有可亂者彼項王骨鯁之臣亞夫鍾離昧龍且周殷之属不過數人耳大王能出捐數萬斤金行反間間其君臣以疑其心項王為人意忌信讒必内相誅漢因舉兵而攻之破楚必矣漢王以為然乃出黄金四萬斤予平恣所為不問出入平既多以金縱反間於楚軍宣言諸將鍾離昧等為項王將功多矣然終不得裂地而王欲與漢為一以滅項氏分王其地項王果疑之使使至漢漢為太牢之具舉進見楚使舉鼎爼而來即陽驚曰以為亞夫使乃項王使也復持去以惡草具進楚使去餚肉更以惡草之具使歸具以報項王果大疑亞夫亞夫欲急擊下滎陽城項王不信不肯聼亞夫亞夫聞項王疑之乃大怒疽發背而死髙帝七年被匃奴冐頓圍於白登平使畫工圖羙女間遣人遺閼氏云漢有羙女如此今皇帝困危欲献之閼氏畏其奪已寵因謂單于曰漢天子亦有神靈得其土地非其有也於是匃奴開出一角得突出後漢馮異為孟津將軍與河内太守宼恂合勢以拒更始將李䡍朱鮪河南太守武勃等異乃遺李軼書曰愚聞明鏡所以照形往事所以知今昔微子去殷而入周項伯畔楚而歸漢周勃迎代王而黜少帝霍光尊孝宣而廢昌邑彼皆畏天知命覩存亡之符見廢興之事故能成功於一時垂業於萬世也茍令長安尚可扶助延期嵗月疏不間親逺不踰近季文豈能居一隅㢤季文軼字今長安壞亂赤眉臨郊王侯搆難大臣乖離綱紀已絶四方分裂異姓並起是故蕭王跋渉霜雪經營河北方今英雋雲集百姓風靡雖邠岐慕周不足以喻季文誠能覺悟成敗亟定大計論功古人轉禍為福在此時矣如猛將長驅嚴兵圍城雖有悔恨亦無及已初軼與光武首結謀約加相親愛及更始立反共陷光武兄伯升雖知長安已危欲降又不自安乃報異書曰軼本與蕭王首謀造漢結生死之約同榮枯之計今軼守雒陽將軍鎮孟津俱據機軸千載一㑹思成斷金唯深達蕭王願進愚䇿以佐國安人軼自通書之後不復與異爭鋒故異因此得北攻天井関㧞上黨两城又南下河南成皋已東十三縣及諸屯聚皆平之降者十餘萬武勃將萬餘人攻諸畔者異引軍渡河與勃戰於士鄉下大破斬勃獲首五千餘級軼又閉門不救異見其信效具以奏聞光武故宣露軼書令朱鮪知之鮪怒遂使人刺殺軼由是城中乖離多有䧏者堅鐔為揚化將軍與諸將攻雒陽而朱鮪别將守東城者反間私約鐔晨開上東門鐔與建義大將軍朱祐乗朝而入與朱鮪大戰武庫下建始殿東有太倉倉東有武庫藏兵之所殺傷甚衆至旦食乃罷朱鮪由是遂䧏魏賈詡為執金吾參太子司空軍事太祖後與韓遂馬超戰於渭南超等索割地以和並求任子詡以為可偽許之太祖乃用詡謀離間超遂使相猜疑軍以大敗蔣濟為丹陽太守後辟為丞相主簿初蜀將關羽既䧏于禁斬龎德威震華夏曹公議徙許都以避其銳司馬宣王及濟以為關羽得志孫權必不願也可遣人勸權躡其後許割江南以封權則樊圍自解太祖如其言權聞之即引兵两襲江陵羽遂見擒蜀諸葛亮為丞相益州牧初孟達之䧏魏也領魏新城太守達連吳固蜀潜結中國亮惡其反覆又慮其為患達與魏興太守申儀有隙亮欲促其事乃遣郭謨詐降過儀因泄其謀吳胡綜為侍中兼左右領軍時魏䧏人或云魏都督河北振威將軍吳質頗見猜疑綜乃偽為質作降文三條其一曰天綱弛絶四海分裂羣生憔悴士人播越兵㓂所加邑無居民風塵烟火往往而處自三代以來大亂之極未有若今時者也臣質志薄處時無方繫於土壤不能翻飛遂為曹氏執事戎役逺處河朔天衢隔絶雖望風慕義思托大命媿無因縁得展其志每往來者竊聽風化伏知陛下齊徳乾坤同明日月神武之姿受之自然敷演皇極流化萬里自江以南户受覆燾英雄俊傑上達之士莫不心歌腹詠樂在歸附者也今年六月末奉聞吉日龍興踐阼恢宏大猷整理天綱將使遺民覩見定主昔武王伐殷殷民倒戈髙祖誅項四靣楚歌方之今日未足以喻臣質不勝昊天至願謹遣所親同郡黄定恭行奉表及託降叛間關求達其欲所陳載列於左其二曰昔伊尹去夏入商陳平委楚歸漢書功竹帛遺名後世世主不謂之背誕者以為知天命也臣昔為曹氏所見交接外託君臣内如骨肉恩義綢繆有合無離遂受偏方之任總河北之軍當此之時志望髙大永無曹氏同死俱生惟恐功之不建事之不成耳及曹氏之亡後嗣繼立㓜冲統政讒言彌興同儕者以勢相害異趣者得間其言而臣受性簡略素不下人視彼數子意實廹之此亦臣之過也遂為邪議所見搆㑹招致猜疑誣臣欲叛雖識真者保明其心世亂讒勝餘嫌猶在常懼一旦横受無辜憂心孔疚如履氷炭昔樂毅為燕昭王立功於齊惠王即位疑奪其任遂去燕之趙休烈不虧彼豈欲二三其徳蓋畏功名不建而懼禍之將及也昔遣魏郡周光以賈販為名託叛南詣宣達宻計時以倉卒未敢便有章奏使光口傳而已以為天下大歸可見天意所在非吳復誰此方之民思為臣妾延頸舉踵惟恐兵來之遲耳若使聖恩少加信納當以河北承望王師欵心赤實天日是鑒而光去經年不聞咳唾未審此意竟得達否瞻望長嘆日月以㡬魯望髙子何足以喻又臣今日見待稍薄蒼蠅之聲綿綿不絶必受此禍遲速事耳臣私度陛下未垂明慰者必以臣質貫穿仁義之道不行若此之事謂光所傳多虛少實或謂此中有他消息不知臣質搆讒見疑恐受大害也且臣質若有罪之日自當奔赴鼎鑊東身待罪此蓋人臣之宜也今日無罪横見譛毁將有商鞅白起之禍尋惟事勢去亦宜也死而弗義不去何為樂毅之出吳起之走君子傷其不遇未有非之者也願陛下推古况今不疑怪於臣質也又念人臣獲罪當如伍員奉己自效不敢徼倖因事為利然今與古厥勢不同南北悠逺江湖隔絶自不舉事何得濟免是以忘志士之節而思立功之義也且臣質又以曹氏之嗣非天命所在政弱刑亂柄奪於臣諸將專威於外各自為政莫或同心士卒衰耗帑藏虛空綱紀毁廢上下並昏想前後數得降叛具聞此問兼弱攻昧宜應天時此實陛下進取之秋是以區區敢献其計今若内兵淮泗據有下邳荆揚二州聞聲響應臣從河北席卷而南形勢一連根芽永固關西之兵繫於所衛青徐二州不敢徹守許雒餘兵衆不滿萬誰能來東與陛下争者此誠千載一㑹之期可不深思而熟計乎及臣所在既自多馬加諸羌胡常以三四月中羙草時驅馬來出隠度今者可得三千餘匹陛下出軍當投此時多將騎士來就馬耳此皆先定所一二知凢两軍不能相究虛實今此間實羸易可克定陛下舉動應者必多丕定洪業使普天一統下令臣質建非常之功此乃天也若不見納此亦天也願陛下思之不復多陳其三曰昔許子逺舍袁就曹規畫計校應見納受遂破袁軍以定曹業向使曹氏不信子逺懷疑猶豫不决於心則今天下袁氏有也願陛下思之間聞界上將閻浮趙楫欲歸大化唱和不速以取破亡今臣欵欵逺授其命若復懷疑不時舉動令臣孤絶受此厚禍即恐天下雄夫烈士欲立功者不敢復託命陛下矣願陛下思之皇天后土實聞其言此文既流行而質已入為待中矣陸遜為上大將軍右都䕶鎮荆州時魏江夏太守逯式兼領兵馬頗作邊害而與北舊將文聘子休宿不恊遜聞其然即假作荅式書云得報懇惻知與休乆結嫌隙勢不两存欲來歸附輙以宻呈來書表聞撰衆相迎宜潜速嚴更示定期以書置界上式兵得書以見式式惶懼遂自送妻子還雒由是吏士不復親附遂以免罷潘濬字承明為太常五溪蠻夷叛亂濬督諸軍討之時濬姨兄零陵蔣琬為蜀大將軍或有間濬於武陵太守衛旍者云濬遣宻使與琬相聞欲有自託之計旍以啟大帝大帝曰承明不為此也即封旍表以示於濬而召旍還免官周魴為鄱陽太守加昭義校尉被命宻求山中舊族名帥為北敵所聞知者令譎挑魏大司馬揚州牧曹休魴荅恐民帥小醜不足杖任事或漏泄不能致休乞遣親人齎牋七條以誘休其一曰魴以千載徼幸得備州民逺隔江川敬恪未顯瞻望雲景天實為之精誠微薄名位不昭雖懷焦渴曷縁見明狐死首丘人情戀本而逼所制奉覿禮違每獨矯首西顧未嘗不寤寐勞嘆展轉反側也因隙穴之際得陳宿昔之志非神啟之豈能致此不勝翹企萬里託命謹遣親人董岑邵南等託叛奉牋時事變故列於别紙惟明公君侯垂日月之光照逺民之趣永令歸命者有所戴賴其二曰魴逺在邊隅江汜分絶恩澤教化未蒙撫及而於山谷之間遥陳其所懷懼以大義未見信納夫物有感激計因變生古今同揆魴仕東典郡始願已獲銘心立報永矣無貳豈圖頃者中被横譴禍在漏刻危如投卵進有離合去就之宜退有誣罔枉死之咎雖志行輕微存沒一節顧非其所能不悵然敢縁古人因知所歸拳拳輸情陳露肝膈乞䧏春天之潤哀拯其急不復猜疑絶其委命事之宣泄受罪不測一則傷慈損計二則杜絶向化者心惟明使君逺鑒前世矜而愍之留神所質速賜祕報魴當候望舉動俟湏響應其三曰魴所代故太守廣陵王靖往者亦以郡民為變以見譴責靖勤自陳釋而終不解因立宻計欲北歸命不幸事露誅及嬰孩魴既目見靖事且觀東主一所非薄嫿不復厚雖或暫舍終見剪除今又令魴領郡者是欲責後效必殺魴之趣也雖尚視息憂惕焦灼未知軀命竟在何時人居世間猶白駒過隙而常抱危怖其可言乎惟當陳愚重自披盡懼以卑賤未能采納願明使君少垂詳察忖度其言今此郡民雖外名降首而故在山草看伺空隙欲復為亂之日魴命訖矣東主頃者潜部分諸將圖欲北進吕範孫韶等入淮全琮朱桓趋合肥諸葛瑾步隲朱然到襄陽陸議潘璋等討梅敷東主中營自掩石陽别遣從弟孫奐治安陸城修立邸閣輦資運糧以為軍儲又命諸葛亮進指闗西江邊諸將無復在者才留三子所兵守武昌耳若明使君以萬兵從皖南首江渚魴便從此率屬吏民以為内應此方諸郡前後舉事垂成而敗者由無外援使其然耳若北軍臨境傳檄屬城思詠之民誰不企踵願明使君上觀天時下察人事中參蓍龜則足昭徃言之不虚也其四曰所遣董岑邵南少長家門親之信之有如兒子是以特令齎牋託叛為辭目語心計不宣唇齒骨肉至親無有知者又已勅之到州當言徃降欲北叛來者得傳之也魴建此計任之於天若其濟也則有生全之福邂逅泄漏則受夷滅之禍常中夜仰天告誓星辰精誠之㣲豈能上感然事急孤窮惟天是訢耳遣使之日載生載死形存氣亡魄爽恍惚私恐使君未深保明岑南二人可留其一以為後信一齎敎還敎還故當言悔叛還首東主有常科悔叛還者皆自原罪如是彼此俱塞永無端原懸命西望涕筆俱下其五曰鄱陽之民實多愚勁帥之赴役未即應人倡之為變聞聲響抃今雖降首盤節未解山棲草藏亂心猶存而今東主圖興大衆舉國悉出江邊空曠屯塢虚損惟有諸刺姦耳若因是際而騷動此民一旦可得便㑹然要恃外援表裏機牙不爾以徃無所成也今使君若從皖道進住江上魴當從南對岸歴口為應若未徑到江岸可住百里上令此間民知北軍在彼即自善也此間民非苦饑寒而甘兵宼苦於征討樂得北属但窮困舉事不時見應尋受其禍耳如使石陽及青州諸軍首尾相銜牽綴徃兵使不得速退者則善之善也魴生在江淮長於時事見其便利百舉百㨗時不再來敢布腹心其六曰東主致恨前者不㧞石陽今此後舉大合新兵并使潘濬發夷民人數甚多聞豫設科條當以新羸兵置前好兵在後攻城之日云欲以羸兵填塹使即時破雖未能然是事大趣也私恐石陽城小不能久留往兵民使君速垂救濟誠宜疾宻王靖之變其鑒不逺今魴歸命非復在天正在明使君耳若見救已徃則功可必成如見救不時則與靖等同禍前彭綺時聞旌麾在逢龍此郡民大小歡喜並思立效若留一月日間事當大成恨去電速東得増衆專力討綺綺始敗耳願使君深察此言其七曰今舉大事自非爵號無以勸之乞請將軍侯印各五十紐即將印百紐校尉都尉印各二百紐得以假授諸魁帥奬厲其志并乞請幢麾數十以為表幟使山兵吏民目瞻見之知去就之分已决承引所救畫定又彼此䧏叛日月有人濶狹之間輙得聞知今之大事事宜神密若省魴牋乞加隠秘伏知智度有常防慮必深魴懐憂震灼啟事蒸仍乞未罪恠魴因别為密表曰方北有逋㓂因阻河雒久稽王誅自擅朔土臣曽不能吐竒舉善上以光賁洪化下以輸展萬一憂心如擣假寐忘寢聖朝天覆含臣無效猥發優命勅臣以前誘致賊休恨不如計令於郡界求山谷魁帥為北賊所聞知者令與北通臣伏思惟喜怖交集竊恐此人不可卒得假使得之懼不可信不如令臣譎休於計為便此臣得以經年之冀願逢值千載之一㑹輙自督勵竭盡頑蔽撰立牋草以誑誘休者如别紙臣知無古人單複之術加卒奉大略伀矇狼狽懼以輕愚忝負特施豫懷憂灼臣聞唐堯先天而天弗違博詢芻蕘以成盛勲朝廷神謨欲必致休於歩度之中靈贊聖規休必自送使六軍囊括虜無孑遺威風電邁天下幸甚謹拜表以聞并呈牋草懼於淺局追用悚息被報施行休果信魴帥歩騎十萬輜重滿道徑來入皖魴亦合衆隨陸遜横截休休幅裂瓦解斬獲萬計魴初建宻計時頻有郎官奉詔詰問諸事魴乃詣部郡門下因下髮謝故休聞之不復疑慮事㨗軍旋帝大㑹諸將歡宴酒酣謂曰君下髪載義成孤大事君之功名當書之竹帛加裨將軍賜爵關内侯又賊帥董嗣負阻刼鈔豫章臨川並受其害吾粲唐咨嘗以三千兵攻守連月不能㧞魴表乞罷兵得以便宜從事魴遣間諜受以方䇿誘狙殺嗣嗣弟怖懼詣武昌降於陸遜乞出平地自改為善由是數郡無復憂惕丁奉為右大司馬左軍師寳鼎三年皓命奉與諸葛靚攻合肥奉與晉大將軍石苞書搆而間之苞以徵還晉魏瓘為征北大將軍都督幽州諸軍事幽州刺史䕶烏桓校尉於時幽州東有務桓西有力徵並為邊害瓘離間二虜遂致嫌隙於是務桓䧏而力徴以憂死朝廷嘉其功賜一子亭侯杜預為鎮南大將軍督荆州既至鎮繕兵甲耀威武乃簡精銳襲吳西陵督張政大破之政吳之名將也據要害之地耻以無備取敗不以所䘮之實告于孫皓預欲間吳邊將乃表還其所獲之衆於皓皓果召政遣武昌監劉憲代之故大軍臨至使其將帥移易以成傾蕩之勢劉琨為并州刺史領匃奴中即將劉元海時在離石相去三百里許琨宻遣離間其部雜虜䧏者萬餘落元海甚懼遂城蒲子而居之李矩為冠軍將軍領河東平陽太守劉聰遣從弟暢討矩矩軍夜襲之選勇敢千人夜掩暢營暢僅以身免先是聰使其將趙固鎮雒陽長史周振與固不恊宻陳固罪矩之破暢也帳中得聰書勅暢平矩訖過雒陽收固斬之便以振代固矩送以示固固即斬振父子遂率騎一千來降矩還令守雒後周楊􅋆為太祖行臺左丞仍率義徒更為經略於是遣諜人誘說東魏城堡旬月之間正平河北南涉二絳建州太寕等諸城並有請為内應者大軍因攻而㧞之以􅋆行正平郡事左丞如故韋孝寛為宣武將軍南兖州刺史東魏將叚琛堯傑復據宜陽遣其揚州刺史牛道恒扇誘邊民孝寛深患之遣諜人訪獲道恒手迹偽作道恒與孝寛書論歸欵意又為落燼燒迹若火下書者還令諜人送於琛營琛得書果疑道恒其所欲經略皆不見用孝寛知其離阻日出竒兵掩襲擒道恒及琛等崤澠遂清後孝寛為標騎大將軍鎮玉璧孝寛善於撫御能得人心所遣間諜入齊者皆為盡力亦有齊人得孝寛金貨遥通書疏故齊動静朝廷皆先知時有主帥許盆孝寛托以心膂令守一戍盆乃以城東入孝寛怒遣諜取之俄而斬首而還其能致物情如此時北齊斛律光在汾北孝寛忌光英勇乃作謡言令間諜漏其文於鄴曰百升飛上天明月照長安光字明月又曰髙山不催自摧檞樹不扶自竪齊臣祖珽穆提婆與光有隙因續之曰育老公背上下大斧鐃舌老母不得語令小兒歌之於路提婆聞之以告後主乳母陸令萱令萱以饒舌斥已也育老翁謂珽也遂相與恊謀以謠言啟後主誅光武帝聞之始有滅齊之意竟平其國達奚武為東秦州刺史時齊神武趣沙苑太祖遣武覘之武從三騎皆衣敵人衣服至日暮去營數百歩下馬潜聽得其軍號因上馬歴營若警夜者有不如法者徃徃撻之具知敵之情狀以告太祖太祖深嘉焉遂破之李逺為都督義州宏農等二十一防諸軍事毎厚撫境外之人使為間諜敵中動静必先知之至有事泄被誅戮者亦不以為悔其得人心如此隋隂夀為幽州總管寳寕舉兵反壽討之寳寕奔於磧北夀班師留開府成道昻鎮之寳寕遣其子僧伽率輕騎掠城下而去尋引契丹靺羯之民來攻道昻苦戰連日乃退夀患之於是重購寳寕又遣人隂間其所親任者趙世謨王威等月餘世謨率其衆䧏寳寕復走契丹為其麾下趙修羅所殺北邊遂安長孫晟為奉車都尉以突厥攝圖玷厥阿波突利等各握强兵上書和同難以力征易可離間因上書陳突厥强弱形勝髙祖皆納用焉因遣太僕元暉出伊吾道使詣玷厥賜以狼頭纛謬為欽敬禮數甚優玷厥使來引居攝圖使上反間既行果相猜貳授軍騎將軍出黄龍道齎幣賜奚霫契丹等遣為鄉道得至處羅侯所深布心腹誘令内附二年攝圖四十萬騎自蘭州入至于周盤破達奚長儒軍更欲為入玷厥不從引兵而去時晟又説染干詐告攝圖曰鐡勒等反欲襲其牙攝圖乃懼廻兵出塞後數年突厥大入發八道元帥分兵拒之阿波至凉州與竇榮定戰賊帥累北時晟為偏將使謂之曰攝圖每來戰皆大勝阿波纔入便即致敗此乃突厥之耻豈不内愧于心乎且攝圖之與阿波兵勢本微今攝圖日勝為衆所崇阿波不利為國生辱攝圖必當因以罪歸于阿波成其夙詐滅北牙矣願自度量能禦之乎阿波使至晟又謂之曰今達頭與隋連和可汗何不依附天子耶阿波納之攝圖與衛王軍遇戰于白道敗走至磧聞阿波懐貳乃掩北牙盡獲其衆而殺其母阿波還無所歸而奔玷厥乞師十餘萬東擊攝圖故地收散卒數萬與攝圖相反阿波頻勝賀老弼鎮夀州時江南尚阻江都人來䕶兒住白土村宻邇江岸嘗令䕶兒為間諜授大都督平陳之役䕶兒有功焉趙仲卿為朔州總管突厥啟民可汗求婚高祖許之仲卿因是間其骨肉遂相攻擊開元七年啟民窘廹與隋使長孫晟投通漢鎮仲卿率騎千餘援之達頭不敢逼達頭亦可汗號潜遣人誘至啟民所部至者二萬餘家裴矩為黄門侍郎大業中煬帝遣將築伊吾城令矩共往經略矩又白狀令反間射匱潜攻處羅後處羅為射匱所廹竟隨使者入朝後以本官領武賁即將詔䕶北番軍事矩以始畢可汗部衆漸盛献䇿分其勢將以宗女嫁其弟叱吉設拜為南靣可汗叱吉不敢受始畢聞而漸怨矩又言于帝曰突厥本淳易可離間但由其内多有羣胡盡皆桀黠敎𨗳之耳臣聞史蜀胡悉尤多姦計幸于始畢請誘殺之帝曰善矩因遣人告胡悉曰天子大出珍物今在馬邑欲共蕃内多作交闗若前來者即得好物胡悉貪而信之不告始畢率其部落盡驅六畜星馳爭進兾先互市矩伏兵馬邑下誘而斬之詔報始畢曰史蜀胡悉忽領部落走來至此云背可汗請我容納突厥既是我臣彼有背叛我當共殺今已斬之故令徃報唐李靖為兵部尚書貞觀中突厥諸部離叛朝廷將圖進取以靖為代州道行軍總管率驍騎二千自馬邑出其不意直趣惡陽嶺以逼之突利可汗不虞於靖見官軍奄至于是大懼相謂曰唐兵若不傾國而來靖豈敢孤軍而至一日數警靖侯知之潜令間諜離其心腹其所親康蘇宻來䧏四年靖進擊定襄破之獲隋齊王暕之子楊正道及煬帝蕭后送于京師可汗僅以身遁竇静貞觀中為夏州都督值突厥擕貳諸將出征多詣其所静知虜虚實乃潜令人間其部落郁射設所部鬰孤尼等九俟斤並率衆内欵劉師立檢校岐州都督陳伐吐谷渾之䇿朝廷未之許師立又遣使間其部落多其䧏附裂其地為開橋二州蕭嵩開元中為河西節度判凉州事時悉諾邏恭禄威名甚振嵩乃縱反間於吐蕃言其與中國潜通贊普遂召而誅之王忠嗣天寳初為靈州都督是嵗北伐與奚戰于桑乾河敗之大虜其衆時突厥葉䕶新有内難忠嗣盛兵磧口以威振之烏蘇米施可汗倔强不䧏忠嗣乃縱反間于㧞悉宻㧞悉宻與葛邏禄回紇三部落攻米施可汗走之忠嗣出兵伐之取其右廂而歸其西葉䕶及毗伽可汗妻可敦男西殺葛臘哆率其部落千餘帳入朝曹王皋大歴中鎮江西先是牙將伊慎討梁崇義搉鋒陷敵李希烈意飲縻之慎以計遁歸皋始至鍾陵大集將吏得慎而壯之㧞為大將繕理舟師希烈懼慎為曹王所任遺慎七曲之甲詐為慎書行間焉徳宗遣中使即以詰之皋乃抗疏論雪上章未報㑹賊兵沂江來宼皋乃召慎勉之令戰大破三千餘衆朝廷始信其不二冊府元龜卷四百十一
