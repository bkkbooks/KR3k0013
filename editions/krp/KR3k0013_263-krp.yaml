九年六月詔曰春秋之義立子以貴東海王陽皇后之子宜承大統皇太子疆崇執謙退願備藩國父子之情重乆違之其以疆為東海王二十年六月徙封中山王輔為沛王二十八年徙魯王興為北海王三十年四月徙左翊王焉為中山王是年封趙節王栩三子為鄉亭侯齊哀王章子張為下博侯北海王子復為臨邑侯又封安城侯子暠為白牛侯中元二年封沛王輔子寶為沛侯魯王興二子為縣侯濟南王康子德為東武成侯明帝永平元年封沛王輔子嘉為僮侯東平王蒼子二人為縣侯三年四月封皇子建為千乗王羡為廣平王七年徙廣平王羡為西平王八年封阜陵質王魴弟十二人為鄉亭侯十年封成武侯順弟子三人為鄉亭侯十一年遣使手詔東平王蒼國中傅曰日者問東平王處家何等最樂王言為善最樂其言甚大副是要腹矣今送列侯印十九枚諸王子年五歳已上能趨拜者皆令帶之十四年封廣陵思王子元壽為廣陵侯服王璽綬食荆故國又封元壽弟三人鄉亭侯十五年四月封皇子恭為鉅鹿王黨為樂成王衍為下邳王暢為汝南王昞為常山王長為濟隂王十六年七月淮陽王延徙封阜陵王十八年徙西平王羡為陳王是年封北海王基二弟為縣侯二弟為鄉侯章帝建初二年封楚王英子楚侯种後徙封陸侯五弟皆為列侯並不得置相臣吏人又封趙王栩十子為鄉亭侯四年二月徙鉅鹿王恭為江陵王汝南王暢為梁王常山王昞為淮陽王封皇子伉為千乗王全為平春王七年六月廢皇太子慶為清河王徙廣平王羡為西平王封琅邪夷王字弟十三人為列侯元和元年四月分東平國封憲王蒼子尚為任城王餘五人為列侯是年封琅邪孝王孫二人為列侯二年五月徙江陵王恭為六安王是年封沛釐王定弟十二人為鄉侯章和二年徙封六安王恭為彭城王和帝永元二年五月分太山為濟北國分樂城涿郡渤海為河間國封皇弟夀為濟北王開為河間王叔為城陽王三年封趙王栩三子為亭侯四年封中山王憲弟十二人為列侯五年正月封皇弟萬歲為廣宗王八年封阜陵王魴弟十二人為鄉亭侯十年封東平憲王蒼孫梁為矜陽亭侯孝王敞弟六人為列侯十一年封濟南簡王錯弟七人為列侯十二年封陳王鈞六弟為列侯蕃為陽都鄉侯千秋為新平侯參為周亭侯夀為樂陽亭侯寳為博平侯旦為高亭侯十四年封任城王安母弟福為桃鄉侯十六年封東海頃王肅弟二十一人為侯梁恭王堅弟二人為鄉亭侯元興元年封趙頃王商四子為鄉亭侯沛王正弟十一人為縣侯殤帝延平元年封和帝長子勝為平原王安帝永初元年三月分清河國封清河孝王慶弟常保為廣川王是年封琅邪恭王壽弟八人為列侯二年封濟南孝王香弟四人為列侯三年封樂安王寵子延平為清河王四年封任成王安弟元為當塗鄉侯六年封彭城王恭子阿奴為竹邑侯七年封陳敬王孫安國為耕亭侯元初五年封彭城考王道弟三人為鄉亭侯丙為都鄉侯國為安鄉侯丁為魯陽鄉侯趙惠王乾二弟為鄉亭侯永寧元年封濟北節王登弟五人為鄉侯皆别食太山邑又封中山孝王宏弟為鄉亭侯延光元年封河間王開子得為安平王二年封琅邪貞王尊弟四人為鄉亭侯三年封阜陵王恢兄弟五人為鄉亭侯北海王睦少子為鄉亭侯順帝永建元年封下邳貞王成兄弟二人及惠王衍孫二人皆為列侯二年封梁懐王正兄弟七人為鄉亭侯東海孝王臻二弟敏儉為鄉侯淮王儀兄二人為鄉亭侯五年封濟南王廣弟文為樂城亭侯陽嘉元年封河間惠王政弟十三人皆為亭侯下邳愍王意弟八人為鄉亭侯永和四年立戰鄉侯安國為濟北王五年封琅邪安王㨿弟三人為鄉亭侯六年封中山穆王暢弟荆為南鄉侯質帝本初元年封彭城頃王定兄弟九人及趙惠王乾一子濟北孝王次弟猛皆為鄉亭侯𢎞農王光熹元年封淮陽節王豹兄四人為鄉亭侯獻帝建安十六年九月庚戌立皇太子熈為濟隂王懿為山陽王邈為濟北王敦為東海王十八年徙封趙王珪為博陵王魏樂城侯洪太祖從弟漢末封國明亭侯文帝即位進封野王侯邑二千一百户明帝時更封樂城侯長平侯休太祖族子文帝即王位封東陽亭侯黄初中進封安陽鄉侯明帝時更封長平侯邵陵侯真太祖族子漢末封靈壽亭侯文帝即位進封東鄉侯明帝時更封真薨五子義訓則彦皚弟彬皆為列侯任城王彰太祖子漢末封鄢陵侯黄初二年進爵為公三年立為任城王彰薨子楷嗣徙封中牟五年改封任城縣大和六年復改封任城國食五縣二千五百户陳思王植太祖子漢末封平原侯又徙封臨菑侯黄初二年除封鄄城侯三年立為鄄城王邑二千五百户四年徙封雍丘王太和元年徙封浚儀二年復還雍丘三年徙封東阿太和五年冬詔諸王朝六年正月其二月以陳四縣封植為陳王食邑二千五百户彭城王據太祖子漢末封范陽侯又徙封宛侯黄初二年進爵為公三年為章陵王其年徙封義陽文帝以南方下濕又以環太妃彭城人徙封彭城又徙封濟隂時改封諸王為縣王據改封定陶縣太和六年改封諸王皆以郡為國據復封彭城王景初正元中累増邑并前四千六百户燕王宇太祖子漢末封都鄉侯又改封魯陽侯黄初二年進爵為公三年為下邳王五年改封單父縣王太和六年改封燕王景初正元中累増邑并前五千五百户沛穆王林太祖子漢末封饒陽又徙封譙黄初二年進爵為公三年為譙王五年改封譙縣七年徙封鄄城太和六年改封沛景初正元中累増邑并前四千七百户中山恭王衮太祖子漢末封平鄉侯又徙封東鄉侯其年又改封贊侯黄初二年進爵為公三年為北海王六年改封中山景初正元景元中累増邑并前三千四百戸陳留恭王峻太祖子漢末封郿侯又徙封襄邑黄初二年進爵為公三年為陳留王五年改封襄邑縣太和六年又封陳留景初正元景元中累増邑并前四千七百戸趙王幹太祖子漢末封髙平亭侯又徙封頼亭侯其年改封𢎞農侯黄初二年進爵徙封燕公三年為河間王五年改封樂城縣七年徙封鉅鹿太和六年改封趙王景初正元景元中累増邑并前五千户楚王彪太袓子漢末封壽春侯黄初二年進爵徙封汝陽公三年封弋陽王其年徙封吳王五年改封壽春縣七年徙封白馬太和六年改封楚樂陵王茂太祖子漢末封萬歳亭侯改封平輿侯黄初三年進爵徙封乗氏公七年徙封中山太和元年徙封聊城公其年為王詔曰昔象之為虐至甚而大舜猶侯之有庳近漢氏淮南阜陵皆為亂臣逆子而猶或及身而復國或至子而鍚土有虞建之於上古漢文明章行之乎前代斯皆敦叙親親之厚義也聊城公茂少不閑禮教長不務善道先帝以為古之立諸侯也皆命賢者故姬姓有未必侯者是以獨不王茂太皇太后數以為言始聞茂頃來少知悔昔之非欲修善將來君子與其進不保其往也今封茂為聊城王以慰太皇太后下流之念正始五年徙封樂陵嘉平正元景元中累増邑并前五千户北海悼王㽔文帝子黄初七年明帝即位立為陽平縣王太和六年改封北海正元景元中累増邑三千五百戸東武陽懐王鑒文帝子黄初六年立東海定王霖文帝子黄初三年立為河東王六年改封館陶縣太和六年改封東海景初正元景元中累増邑并前六千二百戸元城哀王禮文帝子黄初二年封秦公以京兆郡為國三年改為京兆王六年改封元城王景初正元景元中累増邑并前四千五百户邯鄲懐王邕文帝子黄初二年封淮南公以九江郡為國三年進為淮南王四年改封陳六年改封邯鄲景初正元景元中累増邑并前四千四百戸清河悼王貢廣平哀王儼並文帝子黄初三年封明帝以黄初七年即位立皇子冏為清河王太和三年九月立皇子穆為繁陽王青龍三年八月立皇子詢為秦王蜀甘陵王永字公壽先主子章武元年六月使司徒靖許靖也立永為魯王策曰小子永受兹青土朕承天序繼統大業遵修稽古建爾國家封於東土奄有龜蒙世為藩輔嗚呼恭朕之詔惟彼魯邦一變適道風化存焉人之好德世兹懿羙王其秉心率禮綏爾士民是饗是宜其戒之哉建興八年改封甘陵安平王理字奉孝先主子與永異母章武元年六月使司徒靖立理為梁王䇿曰小子理朕統承漢序祇順天命遵修典秩建爾于東為漢藩輔惟彼梁土畿甸之邦民狎教化易道以禮往悉乃心懐保黎庻以永爾國王其敬之哉建興八年改封安平後主延熈元年立子瑶為安定王十五年立子琮為西河王十九年立子瓚為新平王景耀二年六月立子諶為北地王恂為新興王䖍為上黨王吳大帝黄武五年封從父弟英為沙羡侯七年三月封子慮為建昌侯赤烏五年八月立子霸為魯王大元二年正月立故太子和為南陽王和赤烏五年立為皇太子後被廢至是封爵居長沙子奮為齊王居武昌廢帝五鳯中封魯王霸子甚為吳侯壹為宛陵侯景帝永安元年十一月封太子和子德錢唐侯謙永安侯後主皓元興元年十月封景帝太子雨單為豫章王次子汝南王次子梁王次子陳王臣欽若等曰按吳志休四子長名雨單字􅔾次名字􅀢次名壾字昷次名寇字㷏建衞元年正月立淮陽東平王鳯凰二年九月改封淮陽為魯東平為齊又封陳留章陵等九王凡十一王王給三千兵天紀二年七月立成紀宣威等十一王王給三千兵四年春立中山代等十一王册府元龜卷二百六十三
