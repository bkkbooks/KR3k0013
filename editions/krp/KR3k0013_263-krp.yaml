body:
  text: 册府元龜卷二百六十三宋王欽若等撰宗室部封建第二漢武帝元光五年正月封河間獻王子明為滋侯六年七月封長沙定王子蒼為安誠侯成為宜春侯黨為勾容侯福為容陵侯九月封楚安王子成為杏山侯不害為浮丘侯元朔元年十月封魯恭王子將節為廣戚侯十二月封江都易王子敢為丹陽侯䝉之為盱眙侯正月封江都易王子胥行為胡敦侯纒為秣陵侯定國為淮陵侯二月封梁恭王子仁為張梁侯五月封菑川懿王子代為龍丘侯錯為劇原侯髙遂為懐昌侯賞為平望侯始昌為臨衆侯寛為葛魁侯胡為益都侯疆為平的侯黒為劇魁侯守為壽梁侯行為平度侯偃為宜城侯奴為臨朐侯封城陽共王弟豨為雷侯子吉為東莞侯壯為辟土侯六月封趙敬肅王子丙為尉文侯胡陽為封斯侯受福為榆丘侯建為襄嚵侯仁為邯㑹侯義為朝節侯遺為東城侯蒼為隂城侯中山靖王子忠為廣望侯朝平為將梁侯未央為薪館侯貞為陸城侯嘉為薪處侯二年十月封廣川惠王子嘉為蒲領侯明為西熊侯晏為棗彊侯嬰為畢梁侯河間獻王子殷為旁光侯匄為距陽侯退為蔞節侯豫為阿武侯免為參户侯禁為州卿侯禮為平城侯順為廣侯讓為蓋胥侯濟北貞王子不害為隂安侯騫為榮關侯何為周望侯則為陪繆侯信為前侯前或作菆樂為安陽侯濟北式王子曜丘為五據侯龍為富侯遂為平侯成為羽康侯楚為胡母侯正月封代恭王子綰為離石侯順為邵侯嘉為利昌侯罷軍為藺侯賢為臨河侯忠為隰成侯郢客為士軍侯遷為臯琅侯遇為千章侯三月封齊孝王子就為博陽侯魯恭王子恬為寧陽侯政為瑕丘侯順為公丘侯驕為郁桹侯敬為西昌侯中山靖王子義為陸地侯趙敬肅王子順為邯平侯四月封趙敬肅王子昌為武始侯賀為象氏侯平為昜安侯四年三月封長沙定王子童為路陵侯則為攸輿侯訢為茶陵侯拾為建成侯丹為安衆侯喜為葉平侯城陽恭王子嬰為利鄉侯釘為有利侯慶為東平侯記為運平侯齒為山州侯福為海常侯寛為騶丘侯貞為南城侯裘為廣陵侯臯為杜原侯四月封中山靖王子光為臨樂侯章為東野侯喜為髙平侯頗為廣川侯河間獻王子擔為重侯齊孝王子燕為被陽侯越為定敷侯定為稻夷侯國為山原侯忠為繁安侯陽已為柳康侯信為雲夷侯渫為牟平侯代為柴原侯五年十一月封趙敬肅王子終古為栢暢侯延平為歊安侯三月封中山靖王子將夜為乗丘侯破胡為髙丘侯盖為柳宿侯讓為戎丘侯修為樊輿侯恢為安道侯長沙定王子義為夫夷侯六月封長沙定王子買為舂陵侯定為都梁侯狩燕為洮陽侯賢為衆陵侯六年四月封衡山賜王子廣置為終弋侯元狩二年七月封膠東王寄少子慶為六安王六年三月乙亥御史臣光守尚書令丞非下御史書到言丞相臣青翟御史大夫臣湯太常臣充大行令臣息太子少𫝊臣安行宗正事昧死上言大司馬去病上疏曰陛下過聽使臣去病待罪行間宜專邉塞之思慮暴骸中野無以報乃敢惟他議以干用事者誠見陛下憂勞天下哀憐百姓以自忘虧膳貶樂損郎員皇子頼天能勝衣趨拜至今無號位師𫝊官陛下恭譲不䘏羣臣私望不敢越職而言臣竊不勝犬馬之心昧死願陛下詔有司因盛夏吉時定皇子位唯願陛下幸察制曰可下御史臣謹與中二千石臣賀等議古者裂地立國並建諸侯以承天子所以尊宗廟重社稷也今臣去病上疏不忘其職因以宣恩乃道天子卑譲自貶以勞天下慮皇子未有號位臣青翟臣湯等宜奉議遵職愚憧而不逹事方今盛夏吉時臣青翟臣湯等昧死請立皇子臣閎一作開臣旦臣胥為諸侯王昧死請所立國名制曰盖聞周封八百姬姓並列或子男附庸禮支子不祭云並建諸侯所以重社稷朕無聞焉且天非為君生民也朕之不德海内未洽乃以未教成者彊君連城即股肱何勸一作敦一作朂一作觀也其更議以列侯家之丙子奏未央宫丞相臣青翟御史大夫臣湯昧死言臣謹與列侯臣嬰中二千石臣賀諫議大夫博士臣安等議曰伏聞周封八百姬姓並列奉承天子康叔以祖考顯而伯禽以周公立咸為建國諸侯以相傳為輔百官奉憲諸侯各遵其職而國統備矣竊以為並建諸侯所以重社稷者四海諸侯各以其職奉貢祭支子不得奉祭宗祖禮也封建使守藩國帝王所以扶德施化陛下奉承天統明開聖緒尊賢顯功興㓕繼絶續蕭文終之後於鄼褒厲羣臣平津侯等昭六親之序明天施之屬使諸侯王封君得推私恩分子弟户邑鍚號尊建百有餘國而家皇子為列侯則尊卑相踰列國失序不可以垂統於萬世臣請立臣閎臣旦臣胥為諸侯王三月丙子奏未央宫制曰康叔親屬有十而獨尊者褒有德也周公祭天命郊故魯有白牡騂剛之牲魯祭周公用牲白牡魯公用騂剛白牡殷牲也騂剛赤脊周牲也羣公不毛不毛不純色也賢不肖差也髙山仰之景行嚮之朕甚慕焉所以抑未成家以列侯可臣青翟臣湯博士臣將行等伏聞康叔親屬有十武王繼體周公輔成王其八人皆以祖考之尊建為大國康叔之年幼周公在三公之位而伯禽據國於魯盖爵命之時未至成人康叔後扞禄父之難伯禽殄淮夷之亂昔五帝異制周爵五等春秋三等春秋變周之文從殷之質合伯子男以為一則殷爵三等者公侯伯也皆因時而序尊卑髙皇帝撥亂世反諸正昭至德定海内封建諸侯爵位二等皇子或在襁褓而立為諸侯王奉承天子為萬世法則不可易陛下躬親仁義體行聖德表裏文武顯慈孝之行廣賢能之路内褒有德外討彊暴極臨北海西凑月氏匈奴西域舉國奉師輿械之費不賦於民虛御府之藏以賞元戎開禁倉以賑貧窮减戍卒之半百蠻之君靡不嚮風承流稱意逺方殊俗重譯而朝澤及方外故珍獸至嘉穀興天應甚彰今諸侯支子封至諸侯王而家皇子為列辟臣青翟臣湯等竊伏熟計之皆以為尊卑失序使天下失望不可臣請立臣閎臣旦臣胥為諸侯王癸未奏未央宫留中不下丞相臣青翟大僕臣賀行御史大夫事太常臣充太子少𫝊臣安行宗正事昧死言青翟等前奏大司馬臣去病上疏言皇子未有號位臣謹與御史大夫臣湯中二千䂖諫議大夫博士臣慶等昧死請立皇子臣閎等為諸侯王陛下讓文武躬自切及皇子未教羣臣之議儒者稱其術或誖其心陛下固辭不許家皇子為列侯臣青翟等竊與列侯臣壽成蕭何之𤣥孫鄼侯壽成後為太常也等二十七人議皆曰以為尊卑失序髙皇帝建天下為漢太祖王子孫廣支輔先帝法則弗改所以宣至尊也臣請令史官擇吉具禮儀上御史奏輿地圖他皆如前故事制曰可丙申奏未央宫大僕臣賀行御史大夫事昧死言太常臣充言卜入四月二十八日乙巳可立諸侯王臣昧死奏輿地圖請所立國名禮儀别奏臣昧死請制曰立皇子閎為齊王旦為燕王胥為廣陵王四月丁酉奏未央宫六年四月戊寅朔癸卯御史大夫湯下丞相下中二千石郡太守諸侯相丞書從事下當用者如律令三王同日立皆賜䇿各以國土風俗申戒焉齊懐王賜䇿曰惟元狩六年四月乙巳皇帝使御史大夫湯廟立子閎為齊王曰嗚呼小子閎受兹青社王者以五色土為太社封四方諸侯各以其方色土與之苴以白茅歸以立社朕承天序惟稽古建爾國家封於東土世為漢藩輔嗚呼念哉共朕之詔惟命不於常人之好德克明顯光義之不圖俾君子怠悉爾心允執其中天禄永終厥有愆不臧迺凶於而國害於爾躬嗚呼保國乂民可不敬與王其戒之閎王夫人之子夫人趙人與衞夫人並幸閎且立為王其母病武帝自臨問之曰子當為王欲安所置之王夫人曰陛下在妾又何等可言者帝曰雖然意所欲於何王之王夫人曰願置之雒陽武帝曰雒陽有武庫敖倉天下衝阨漢國之大都也先世以來無子王於雒陽去雒陽餘盡可王夫人不應武帝曰關東之國無大於齊齊東負海而城郭大古時獨臨菑中十萬户天下膏腴地莫盛於齊者矣王夫人以手擊頭謝曰幸甚王夫人死帝痛之使使者拜曰皇帝謹使使大中大夫明奉璧一賜夫人為齊王太后燕刺王旦賜䇿曰嗚呼小子旦受兹𤣥社建爾國家封於北土世為漢藩輔嗚呼薰鬻氏虐老獸心以姦巧邉甿朕命將帥徂征厥罪萬夫長千夫長三十有二帥降旗奔師薰鬻徙域北州以安悉爾心母作怨母作棐德棐古匪字也匪非也毋乃廢備非教士不得從徴王其戒之廣陵厲王胥賜䇿曰嗚呼小子胥受兹赤社建爾國家封於南土世為漢藩輔古人有言曰大江之南五湖之間其人輕心揚州保疆三代要服不及以正嗚呼悉爾心祇祇兢兢乃惠乃順毋侗好逸毋邇宵人宵人輕脱之貌惟法惟則書云臣不作福不作威靡有後羞王其戒之元鼎元年四月封城陽頃王子昌為麥侯發為鉅合侯差為昌侯方為簣侯澤為虖葭侯敢為原雒侯昆景為挾衍侯覇為挾釐侯讓為朸侯光為文成侯雲為較靖侯餘為庸侯壽為翟侯應為鱣侯疆為彭侯息為瓠侯禹為虚水侯類為東淮侯賢為拘侯不疑為淯侯七月封菑川靖王子何為陸元侯國為廣饒侯成為鉼侯母害為俞閭侯廣川繆王子聖為襄隄侯四年常山王勃廢月餘以最親詔有司常山憲王早夭后妾不知適孽誣争䧟於不義以㓕國朕甚閔焉其封憲王子平三萬户為眞定王子商三萬户為泗水王元封元年五月封膠東康王子建為臯虞侯昌為魏其侯延年為祝兹侯臣欽若等曰時武帝封齊孝王子為髙乗侯失其名廣川惠王子則為參鬷侯喜為沂陵侯河間獻王王子自為沈陽侯失年月天漢四年六月封皇子􅀈為昌邑侯征和元年封趙敬肅王子樂為栗侯周舍為洨侯起為猇侯道為榔裴侯臣欽若等曰時武帝又封趙敬肅王子寛為漳北侯佗為南䜌侯慶為南陵侯丹為鄗侯福為安檀侯當為爰成侯失年月二年三月封中山靖王子屈釐為彭侯昭帝始元五年六月封六安恭王子霸為松兹侯膠東辰王子安國為温水侯魯安王子臨朝為蘭旗侯方山為容丘侯文德為良成侯六年五月封清河綱王子禄為蒲領侯遷為南曲侯長沙頃王子梁為髙城侯元鳯五年十一月封中山康王子喜為成侯廣川膠王子吉為新市侯六年十一月封城陽惠王子仁為江陽侯宣帝本始元年七月詔立燕刺王太子建為廣陽王立廣陵王胥少子𢎞為髙宻王封廣陵厲王子聖為朝陽侯曾為平曲侯昌為南利侯燕刺王子賢為安定侯三年四月封廣川繆王子寛為東襄侯四年二月封中山康王子章為宣處侯四月封清河綱王子寅為修市侯成為東昌侯豹為薪鄉侯福為修故侯𢎞為東陽侯五月封燕刺王子慶為新昌侯地節三年四月封趙頃王子偃為邯冓侯説為樂陽侯廣漢為桑中侯嵩為張侯河間獻王子雍為景成侯招為平隄侯佟為樂鄉侯􅀈為高郭侯四年二月封膠東戴王子光為樂望侯饒為成鄉侯强為柳泉侯元康元年正月封長沙頃王子延年為復陽侯度為鍾武侯梁為髙城侯二年三月封六安夷王子賜為富陽侯四月封昌邑哀王子賀為海昏侯七月封平干頃王子敬為曲梁侯三年四月立皇子欽為淮陽王四年三月封貞定烈王子宣為遽鄉侯神爵元年四月封膠東戴王子偃為新利侯三年四月封廣川繆王子强為樂信侯元為昌成侯七月封平干頃王子明為廣鄉侯慶為成鄉侯四年三月封平干頃王子世為平利侯玉為平鄉侯梁為平纂侯充為成陵侯廣川戴王子闢兵為西梁侯七月封廣川膠王子必勝為歴鄉侯平干頃王子田為陽城侯五鳯元年四月封平干頃王子仁為祚陽侯七月封廣川繆王子朝為武陶侯十二月封河間孝王子昌為陽興侯甘露元年三月封中山頃王子安為利鄉侯二年正月立皇子囂為定陶王