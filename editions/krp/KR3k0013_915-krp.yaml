body:
  text: 册府元龜卷九百十五宋王欽若等撰總録部廢滯孔子曰道之將廢命也是知志士仁人轗軻蹇迍沈廢不振者其命矣夫乃若懷才出類抗心邁俗智慮足以周物機用足以經世或迴翔下位歴歲不遷寂寞衡門屢空興歎而能含真履潔體和養恬介然如石安之若命不易其操無累乎心斯固秉大雅明哲之姿得君子進退之正者也至或慷慨自負高亢靡屈言必忤物動皆違俗因坐事而被譴致失行之貽譏罹乎悔尤至於顛沛流離委棄固足痛惜者哉荀卿趙人適楚而春申君以為蘭陵令春申君死而荀卿廢因家蘭陵漢張釋之字李南陽堵陽人也堵音者與兄仲同居以貲為騎郎漢以貲五百得為常侍郎事文帝十年不得調調選也馮唐文帝時為郎中署長帝輦過問唐曰父老何自為郎具以實對因拜為車騎都尉主中尉及郡國車士車戰之士十年景帝立以唐為楚相武帝即位求賢良舉唐唐時九十餘不能為官張敞宣帝時為京兆尹與蕭望之于定國相善始敞與定國俱以諫昌邑王超遷定國為大夫平尚書事敞出為刺史時望之大行丞後望之先至御史大夫定國後至丞相敞終不過郡守蓋寛饒為司𨽻校尉好言事刺譏奸犯上意宣帝以其儒者優容之然亦不得遷同列後進或至九卿劉向字子政成帝時為光禄大夫時帝元舅王鳳秉政數有災異向為洪範五行傳論奏之帝心知向精忠故為鳯兄弟起此論也然終不能奪王氏權帝數欲用向為九卿輙復為王氏居位者及丞相卿士所持故終不遷持謂排難阻抑也居列大夫官前後三十餘年陳咸字子康大將軍王鳳以咸有忠直節奏補長史遷冀州刺史又為東郡太守咸免官復為南陽太守咸三公子少顯名於朝廷而薛宣朱博翟方進孔光等仕宦絶在咸後皆以廉儉先至公卿而咸滯於郡守後為少府坐免頃之紅陽侯立舉咸方正為光禄大夫給事中翟方進復奏免之後數年立有罪就國方進奏歸咸故郡旋以憂死揚雄成帝時奏羽獵賦除為郎給事黃門與王莽劉歆並哀帝之初又與董賢同官當成哀平間莽賢皆為三公權傾人主所薦莫不拔擢而雄三世不徙官及莽篡位談說之士用符命稱功德獲封爵者甚衆雄乃復不侯以耆老久次轉為大夫恬於勢利譙𤣥成帝時舉詣公車拜議郎時數有災異𤣥輙陳其變既不省納故久稽郎官後遷太常丞以弟服去職平帝時遷中散大夫持節分行天下未及終而王莽居攝乃竄歸家後漢馮衍字敬通初更始時使鮑永安集河北永以衍為立漢將軍領狼孟長屯太原光武即位遣使者招永衍永衍不肯降審知更始已歿乃共罷兵幅巾降於河内帝怨衍等不時至永以立功得贖罪遂任用之而衍獨見黜建武末衍上疏自陳曰臣伏念髙祖之略而陳平之謀毁之則疏譽之則親以文帝之明而魏尚之忠繩之以法則為罪施之以德則為功逮至晩世董仲舒言道德見妬於公孫𢎞李廣奮節於匈奴見排於衛青此忠臣之所為常流涕也臣衍自維微賤之臣上無無知之薦下無馮唐之説乏董生之才寡李廣之勢而欲免讒口濟怨嫌豈不難哉臣衍之先祖以忠貞之故成私門之禍而臣衍復遭擾攘之時值兵革之際不敢回行求時之利事君無傾邪之謀將帥無擄掠之心衛尉隂興敬慎周密内自修勅外逺嫌疑故敢與交通興知臣之貧數欲本業之臣自維無三益之才不敢處三損之地固讓而不受之昔在更始太原執貨財之柄居倉卒之間據位食禄二十餘年而財産歲狹居處日貧家無布帛之積出無輿馬之飾於今遭清明之時飭躬力行之秋而怨讎叢興譏議橫世蓋富貴易為善貧賤難為工也疏逺隴畆之臣無望髙闕之下惶恐自陳以救罪尤書奏猶以前過不用衍不得志退而作顯志賦後與隂興隂就結交光武懲西京外戚賓客故皆以法繩之大者抵死徙其餘至貶黜衍由此得罪嘗自詣獄有詔赦不問西歸故郡閉門自保不敢復與親故通明帝即位又多短衍以文過其實遂廢於家桓譚王莽時為掌樂大夫更始立召拜大中大夫光武即位徵待詔上書言事失㫖遂不用桓榮習歐陽尚書建武十九年年六十餘始辟大司徒府三十年拜為太常桓典為侍御史七年不調一作十年班固為蘭臺郎二十餘年明帝時固自以二世二世為史彪及固不遇位不過郎感東方朔揚雄自論以不遭蘇張范蔡之時作賓戲以自通焉後遷𤣥武司馬掖宫門每門司馬一人秩比千石𤣥武司馬主𤣥武門馬融安帝永初中拜校書郎中詣東觀典校祕書初元二年上廣成頌以諷諫頌奏忤鄧氏滯於東觀十年不得調因兄子喪自劾歸王符字節信安定臨涇人也少好學安定俗鄙庶孽而符無外家為鄉人所賤自和安之後世務游宦當塗者更相薦引而符獨耿介不同於俗以此遂不得升進乃隱居著書三十餘篇韋義字季節為廣都長甘寧陳二縣令順帝世數上書譏劾左右貶刺竇氏言既無感而久抑不遷魏杜摯舉孝廉除郎中轉補校書摯與毌丘儉鄉里相親故為詩與儉求仙人藥一丸欲以感切儉求助也儉復答詩摯竟不得遷卒於祕書賈洪漢末以儒學為縣令其後馬超反超刧洪將詣華隂使作露布洪不獲已為作之司𨽻鍾繇在東識其文曰此賈洪作也及超破走太祖召洪署軍謀掾猶以其前為超作露布文故不即叙晩乃出為隂泉長程昱東郡東阿人少事太祖太祖嘗乏食昱略其縣供三日糧頗雜以人脯由是失朝望故位不至公終於衛尉楊沛漢末代張既為京兆尹文帝黃初中儒雅並進而沛本以事能見用遂以議郎冗散里巷蜀孟光字孝裕後主踐祚為符節令每直言無所囘避為世所嫌太常廣溪鐔承承字公文歴郡守少府光禄勲河東裴雋等年資皆在光後而登據上列處光之右蓋以此也吳韓當遼西令支人以便弓馬有膂力從孫堅征伐勤苦有功以軍旅陪𨽻介於英豪故爵位不加終於堅世為别部司馬晉禇䂮為縣吏年垂五十鎮南將軍羊祜與䂮有舊言於武帝始被升用官至安東將軍任愷武帝時為侍中愷惡賈充之為人不欲令久執朝政或為充謀曰宜啓令典選便得漸疏此一都令史事爾充因稱愷才宜在官人之職帝不之疑即日以愷為吏部尚書充遣尚書僕射高陽王珪奏愷免官愷既失職時因朝請帝或慰諭之愷初無復言惟泣而已後起為太僕轉太常初魏舒雖歴位郡守而未被任遇愷為侍中薦舒為散騎常侍至是舒為右光禄開府領司徒帝臨軒使愷拜授舒舒雖以𢎞量寛簡為稱時以愷有佐世器局而舒至三公愷止守散卿莫不為之憤歎也華廙字長駿𢎞敏有才義妻父盧毓典選難舉姻親故廙年三十五不得調晩為中書通事郎石喬苞之子也苞督揚州時朝廷疑之喬為尚書郎武帝因召喬不得深疑苞反及苞至有慙色謂之曰卿子㡬破卿門苞遂廢之終身不聽仕秦秀性悻直與物多忤為博士前後垂二十年卒於官陳壽遭父喪有疾使婢丸藥客徃見之鄉黨以為貶議及蜀平坐是沈滯者累年後為御史治書以母憂去職母遺言令葬雒陽壽遵其志又坐不以母歸葬竟被貶議初譙周嘗謂壽曰卿必以才學成名當被損折亦非不幸也宜深戒之壽至此再致廢辱皆如周言起為中庶子未拜而卒卞粹字𤣥仁濟隂寃句人也兄弟六人並登宰府世稱卞氏六龍𤣥仁無雙弟褒嘗忤其郡將郡將怒許其門内之私粹遂以不訓見譏陵遲積年後為中書令江灌為桓温所惡為侍中時以事免後為祕書監尋復解職時温方執權朝廷希㫖故灌積年不調温卒後始為吳興太守范𢎞之字長文安北將軍汪之孫也為太學博士議謝石諡法曰襄墨公因事有功曰襄貪以敗官曰墨又論殷浩宜加贈諡不得因桓温之黜以為國典仍叙温移鼎之跡時謝族方顯桓宗猶盛僕射王珣温故吏也三怨交集故出為餘杭令將行與㑹稽王道子牋辭雖亮直終以桓謝之故不調卒於餘杭令桓祕為中書領軍時兄温以事免祕官祕於是廢棄遂居於墓所放志田園好遊山水宋謝𤣥字存宗臨川内史靈運從祖弟也以才學見知及為尚書左丞以給太尉江夏王義恭錢二百萬為何承天所糾文帝大怒放歸田里禁錮終身謝惠連先受學於㑹稽郡吏杜德靈及居父憂贈以五言詩十餘首文行於世坐被徙廢不豫榮位元嘉七年方為司徒彭城王義康法曹行參軍沈懐文吳興武康人為始興王征北參軍坐納東陽公主養女鸚鵡為妾徙廣州終世祖世不得還懷文雖親要屢請終不許前廢帝世流徙者並聽歸本官至武康令南齊蔡仲熊執經論議徃徃與時宰不合亦終不改操求同故坎壈不進歴年方至尚書左丞當時恨其不遇任昉初為太子步兵校尉管東宫書記時明帝既廢鬱林王始為侍中中書監録尚書事使昉具表草意惡其辭旨甚愠昉由是終建武中位不過列校梁王筠出為貞威將軍臨海太守在郡被訟不調累年伏晅父曼容與樂安任瑶皆暱於齊太尉王儉瑤子昉及晅並見知頃之昉才遇稍盛齊未昉已為司徒右長史晅猶滯於㕘軍事及其終也名位略相侔陳蔡凝為給事黃門侍郎後主謂吏部尚書蔡徵曰蔡凝負地矜才無所用也尋遷信威晉熈王府長史鬱鬱不得志乃喟然歎曰天道有廢興夫子云樂天知命斯理庶㡬可達因制小室賦以見志甚有辭理後魏高允為大將軍從事中郎授中散恬退淡靜不競勢利十八年不易官後為中書侍郎領著作郎初與允同徵游雅等多至通官封侯及部下吏百數十人亦至刺史二千石而允為郎二十七年不徙官程靈虯祕書令駿從祖弟伯達之子也伯達早亡靈虯幼孤頗有文才而久淪末役在吏職十餘年坐事免㑹駿臨終啓請得擢為著作佐郎後坐稱在京無緦親而孝文知其與駿子公義為始族故致譴免至雒無官貧病久之補徐州梁郡太守嗜酒又失官張彝為秦州刺史為僕射高肇所譖彝雖無過見代還雒猶停廢數年因得偏風手脚不便然志性不移善自將攝稍能朝拜久之除光禄大夫加金章紫綬辛雄涉書史好刑名不妄交友為給事中十年不遷職乃以病免劉桃符為中書舍人以勤明見知久不遷職宣武謂之曰揚子雲為黃門頓歴三世卿居此任始十年不足辭也北齊李繪字文宣天保初為司徒右長史繪質性方重未嘗趨事權勢以此久沈屈荀士孫好學有思理為文清典見賞知音魏武定末舉司馬秀才迄天保十年不調後為中書侍郎蘇瓊天保中為南清河太守人庶懷之四表列為尤最遭憂解職尋起為司直廷尉正朝士嗟其屈尚書辛述曰既直且正名以定體不慮不申後周李季明為著作佐郎勤於所職著述不怠然性尤專固不合於時是以一為史官十年不調隋李德林開皇初為内史令德林少以文學見知及位望稍高頗傷自任爭名之徒更相譖毁所以運屬興王功㕘佐命十餘年間竟不徙級王孝籍少好學博覽羣言頗有文翰開皇中召入祕書助王邵修國史邵不之禮在省多年而不免輸稅孝籍鬱鬱不得志奏記於吏部尚書牛𢎞𢎞亦知其有學業而竟不得調後歸鄉里以教授為業卒於家劉炫河間人也少以聰敏見稱為郡禮曹從事以吏幹知名奉勅與著作郎王邵同修國史俄直門下省以待顧問又與諸術者修天文律厯兼於内史省考定羣言内史令博陵李德林甚禮之炫雖徧直三省竟不得官為縣司責其賦役炫自陳於内史送詣吏部尚書韋世康問其所能炫自為狀曰周禮禮記毛詩尚書公羊左傳孝經論語孔鄭王何服杜等注凡十三家雖義有精粗並堪講授周易儀禮穀梁用功差少子史文集嘉言美事咸誦於心天文律厯窮覈微妙至於公私文翰未嘗假手吏部竟不詳試然在朝知名之士十餘人保明炫所陳不謬於是除殿内將軍龎晃為右衛將軍性剛悍時廣平王雄當塗用事勢傾朝廷晃每陵侮之嘗於軍中卧見雄不起雄甚衘之復與高熲有隙二人屢譖晃由是宿衛十餘年官不得進辛德源初仕周為宣納上士㑹尉遲迥作亂遂亡去高祖受禪不得調者久之隱於林慮山鬱鬱不得志著幽居賦以自寄盧思道為武功太守開皇初以母老表請解職優詔許之思道自恃才地多所凌轢由是官塗淪滯既而又著勞生論指切當時裴肅初仕周為御正下大夫屬高祖為丞相肅聞而歎曰武帝以雄才定六合墳土未乾而一朝遷革豈天道歟高祖聞之甚不悅由是廢於家唐顔萬字師古齊黃門侍郎之推之孫也初仕隋為安養尉尋坐事免歸長安十年不得調家貧以教授為業太宗時為祕書少監物論稱其納賄出為栁州刺史將行太宗惜其才復其職師古既負其才又早見驅䇿冀被任用及頻遭罪譴意甚喪沮退朝後闔門杜絶人事巾褐裙帔蕭如也陳叔達字子聰陳宣帝第十六子也善容止頗有才學在陳為義陽王歴丹陽尹侍中陳滅入隋久不得調後入唐為禮部尚書韋思謙為監察御史以中書令褚遂良賤市中書譯語人地思謙奏劾其事遂良左授同州刺史及遂良復用思謙不得進出為清水令謂人曰吾狂鄙之性假以雄權觸機便發固宜為身災也大丈夫當正色之地必明目張膽以報國恩終不能為碌碌之臣保妻子爾賀知章與族姑子陸象先特相友善知章長於象先景雲二年象先自中書侍郎加平章事又加二品知章始被引為四門博士及太常博士身猶衣碧後二十餘年象先為少保知章授銀青光禄大夫李揆肅宗乾元初為中書侍郎平章事後貶萊州刺史司正累年量移歙州刺史初揆秉政侍中苗晉卿累薦元載為重官揆自恃門望以載地寒意甚輕易不納而戲晉卿曰龍章鳳姿之士不可見麞頭鼠目之子乃求官載衘恨頗深及載登庸因揆當徙職遂試祕書監江淮養疾既無俸禄家復貧匱孀居百口乞食取給萍寄諸州凡十五六年其牧守稍怠則又移居故其遷徙者蓋十餘州焉元載以罪誅除揆睦州刺史蔣沇代宗朝為刑部郎中兼御史領渭橋河運出納使時元載秉政潔廉守道者多不更職沇以故滯於郎位久不徙官劉迺大厯末為權知兵部侍郎屬楊炎盧杞為相意多醜正以故五歲不遷德宗建中四年夏但拜真而已裴遵慶綘州聞喜人世襲冠冕以門䕃從仕累授潞府司法㕘軍時年已衰邁未為人所知隨調吏部授大理寺丞栁登少嗜學年近六十方從官累官至膳部郎中杜黃裳德宗貞元中累為中書裴延齡所惡十年不遷後終河中晉綘等州節度使唐次為禮部貟外貞元中坐黨竇㕘出為開州刺史次以工文知名在開州十年不得進用後劍南西川節度使韋臯請次為副德宗使諭臯罷之次自悲以為怨謗之所積也乃採古之君子遭罹讒謗放逐至死而君終不寤者著辯謗略三篇以獻德宗猶恚之謂左右曰次乃方吾於古之昏主何自喻如此後改䕫州刺史盧景亮為右補闕德宗朝以廷諍得失貶朗州司馬凡遷謫二十年憲宗初中和州别駕始徵還拜駕部郎中歸登為右補闕起居舍人凡三任十五年同列當出其下者多以馳騖至顯官而登與右拾遺蔣武退然自守不以淹速介意徐晦為刑部兵部二侍郎出為同州刺史性狂直不阿隨當官正惟嗜酒太過晩年喪明遂至委廢李商隱以文宗開成二年登進士第為𢎞農尉以書判拔萃王茂元鎮河陽辟為掌書記得侍御史茂元愛其才以子妻之茂元雖讀儒書然本將家子李德裕秉政用為河陽帥德裕與李宗閔楊嗣復令狐楚大相讎怨商隱既為茂元從事宗閔黨大薄之時令狐楚已卒子綯為貟外郎以商隱背恩尤怒其無行俄而茂元卒來游京師久之不調㑹給事中鄭亞廉察桂州請為觀察判官檢校水部貟外郎宣宗大中初白敏中執政令狐綯在内署立排李德裕逐之亞坐德裕黨亦貶循州刺史商隱隨亞在嶺表累年三年入朝京兆尹盧𢎞正奏署掾曹令典牋奏明年令狐綯作相商隱屢啓陳情綯不之省𢎞正鎮徐州又徙為掌記書府罷入朝復以文章干綯乃補太學博士㑹河南尹栁仲郢鎮東蜀辟為節度使判官仲郢坐專殺左遷商隱廢罷還鄭州未幾病卒商隱博學强記下筆不能自休與太原温庭筠南郡段成式齊名文思清麗庭筠過之而俱無特操多詭激為當塗者所薄名宦不進坎壈終身鄭畋以書判拔萃授渭南尉直史館事未行父亞出桂州畋隨侍左右大中朝白敏中令狐綯相繼秉政十餘年素與德裕相惡凡德裕親舊多廢斥之畋久不偕於士伍張仲方以開成元年五月自華州刺史入為祕書監外議以鄭覃黨李德裕排擯仲方覃恐涉朋黨因紫宸奏事覃啓曰丞郎闕人臣欲用張仲方文宗曰中臺丞郎朝廷華選仲方作牧守無政安可以丞郎處之累加銀青光禄大夫上柱國曲江縣伯邑七百戸二年四月卒仲方貞確自立綽有祖風駮諡之後為德裕之黨擯斥坎坷而歿人士悲之後唐蕭希甫初為莊宗推官莊宗即位將以希甫知制誥時有詔定内宴樞密使坐宴否希甫以為不可由是樞密使張居翰馬紹宏等切齒怒之宰相豆盧革等亦希㫖排斥乃以希甫為駕部郎中忽忽不得志周李建崇後唐同光中為龍武捧璽都指揮使出為襄秦徐京兆都指揮使建崇性純厚處身任理不能巧宦以至久滯偏禆劉詞後唐同光初為効節軍使轉劍直指揮使尋以忤於權臣出為汝州小校凡留滯十餘年册府元龜卷九百十五
