body:
  text: 册府元龜卷一百十二宋王欽若等撰帝王部廵幸第一易曰風行地上觀先王以省方觀民設教書曰五載一廵狩羣后肆朝蔡邕云天子車駕所至民臣以為徼幸故謂之幸漢制曰廵狩之制以宣聲教如此則王者廵幸之禮有自來矣是故省風俗見髙年所過必給復所至必赦宥出警入蹕清道而郊駕春遊秋豫從容以展義必有節制是謂禮經管子曰先王之遊春出原農事之不本秋出補人之不足從樂而不反者謂之荒夏諺曰吾王不遊吾何以休吾王不豫吾何以助盖豫行教化勉民事而已豈徒事車轍馬跡以遍天下者乎黄帝南廵狩至於東濵澤舜既陟帝位嵗二月東廵狩至于岱宗柴諸侯為天子守土故稱守廵行之既班瑞之明月乃順春東廵岱宗泰山四岳所宗燔柴祭天告至望秩于山川東岳諸侯境内名山大川如其秩次望祭之謂五岳牲禮視三公四瀆視諸侯其餘視百子男肆覲東后遂見東方之國君恊時月正日同律度量衡合四時氣節月之小大日之甲乙使齊一也律法制及尺寸斛斗斤兩皆均同修五禮五玉修吉㓙賔軍嘉之禮五等諸侯執其玉三帛二生一死贄三帛諸侯世子執纁公之孤執𤣥附庸之君執黄二生卿執羔大夫執鴈一死士執雉玉帛生死所以為贄以見之如五器卒乃復卒終復還器謂圭璧如五器禮終則還之玉帛生死則否五月南廵狩至于南岳如岱禮南岳衡山自東岳南廵五月至八月西廵狩至於西岳如初西岳華山初謂岱宗十有一月朔廵狩至于北岳如西禮北岳恒山歸格于藝祖用特廵守四岳然後歸告至文祖之廟藝文也言祖則考特一牛五載一廵狩羣后四朝各會朝于方岳之下凡四處故曰四時將説敷奏之事故申言之堯舜同道舜治則然堯又可知敷奏以言明試以功車服以庸敷陳奏進也諸侯四時各使陳進治禮之音明試其言以要其功或則賜車服以表顯其能用三十九年南廵狩臣欽若等曰凡廵幸不書年月及無還宫月日者皆史闕夏禹十六年東廵狩會諸侯江南計功一大禹至大越上苖山大會計爵有徳封有功因名苖山曰會稽周成王撫萬邦廵侯甸即政撫萬國廵行天下侯服甸服也四征弗庭綏厥兆民四面征討諸侯之不直者所以安兆民事具帝王親征門穆王時造父取驥之乗匹與桃林盜驪驊騮緑耳獻之王使造父御西廵狩共王二年遊於涇上漢髙帝初為漢王二年十月如陜鎮撫闗外父老六年十月人告楚王信反帝用陳平計乃偽遊雲夢十二月會諸侯王于陳楚王迎謁因執之七年夏四月行如雒陽如徃也八年三月行如雒陽九月行自雒陽至九年十二月行如雒陽二月行自雒陽至十二年破淮南王布軍還過沛留置酒沛宫悉召故人父老子弟佐酒發沛中兒得百二十人教之歌酒酣帝擊筑自歌曰大風起分雲飛揚威加海内兮歸故郷安得猛士兮守四方令兒皆和習之帝乃起舞慷慨傷懐泣數行下謂沛父兄曰遊子悲故郷吾雖都闗中萬嵗之後吾魂魄猶思沛且朕自沛公以誅暴逆遂有天下其以沛為朕湯沭邑復其民世世無有所與沛父老諸母故人日樂飲極歡道舊故為笑樂十餘日帝欲去沛父兄固請帝曰吾人衆多父兄不能給乃去沛中空縣皆之邑西獻帝留上張飲三日恵帝時出遊離宫奉常叔孫通曰古者有春嘗果方今櫻桃熟可獻願陛下出因取櫻桃獻宗廟帝許之文帝三年五月匈奴入居北地河南為寇帝幸甘泉蔡邕云天子車駕所至民臣以為僥倖故曰幸見令長三老官屬親臨軒作樂賜以食帛越巾佩𢃄之屬民爵有級數或賜田租之半故因謂之幸也甘泉在雲陽本秦林光宫自甘泉之髙奴髙奴上郡之縣因幸太原見故羣臣皆賜之舉功行賞諸民里賜牛酒復晉陽中都民三嵗租留游太原十餘日七月自太原至長安十年冬行幸甘泉十一年十一月行幸代正月自代還十五年四月幸雍始郊見五帝後元二年夏行幸棫陽宫三年二月行幸代四年五月行幸雍五年正月行幸隴西三月行幸雍七月行幸代武帝元光二年十月行幸雍祠五畤六年六月行幸雍元朔四年冬行幸甘泉元狩元年十月行幸雍祠五畤二年冬行幸雍祠五畤元鼎四年十月行幸雍祠五畤賜民爵一級百戶牛酒行自夏陽東幸汾隂夏陽馮翊之縣也汾隂屬河東汾音扶云切十一月甲子立后土祠於汾隂脽上禮畢行幸滎陽還至雒陽五年十月行幸雍祠五畤遂踰隴即今之隴山登空同山名西臨祖厲河而還六年十月行東將幸緱氏至左邑桐郷聞南越破改為聞喜縣春至汲新中郷得吕嘉首改為獲嘉縣元封元年十月自雲陽北歴上郡西河五原出長城北登單于臺至朔方臨北河勒兵十八萬騎還祠黄帝於橋山在上郡周陽縣廼歸甘泉正月行幸緱氏用事華山至于中嶽遂東巡海上四月還登封泰山復東廵海上至碣石自遼西歴北邊九原歸于甘泉二年十月行幸雍祠五畤春幸緱氏遂至東萊四月還祠泰山至瓠子臨決河四年十月行幸雍祠五畤通回中道回中在安定髙平有險阻蕭関在其北自回中通道以出蕭関遂北出蕭闗蕭闗在安定朝那縣厯獨鹿鳴澤獨鹿山名也鳴澤澤名也皆在涿郡道縣北界也自代而還幸河東三月祠后土幸中都宫五年冬行南廵狩至于盛唐在南郡望祀虞舜于九嶷登灊天柱山在今舒州自尋陽浮江親射蛟江中獲之舳艫千里薄樅陽而出作盛唐樅陽之歌遂北至琅邪並海所過禮祠其名山大川三月増封泰山還幸甘泉郊泰畤六年冬行幸回中回中在安定蕭闗在其北三月行幸河東祠后土太初元年十月行幸泰山十二月䄠髙里祠后土東臨勃海望祠蓬萊山春還受計于甘泉八月行幸安定二年三月行幸河東祠后土三年正月行幸東廵海上四月還修封泰山禪石閭石閭山在泰山下阯南方方士言仙人閭四年冬行幸回中天漢元年正月行幸甘泉郊泰畤三月幸河東祠后土三年三月行幸泰山修封祠明堂因受計還幸北地祠常山瘞𤣥玉太始二年正月行幸回中三年二月行幸東海獲赤雁作朱雁之歌幸琅邪禮日成山登之罘浮大海山稱萬嵗四年三月行幸泰山四月幸不其祠神人于交門宫五月還幸建章宫大置酒十二月行幸雍祠五畤西至安定北地征和元年正月還行幸建章宫三年正月行幸雍至安定四年正月行幸東萊臨大海三月帝耕于鉅定齊國縣還幸泰山修封六月還幸甘泉後元元年正月行幸甘泉郊泰畤遂幸安定二年二月行幸盩厔五柞宫盩厔扶風縣也有五柞樹因以名宫宣帝神爵元年正月行幸甘泉郊泰畤三月行幸河東祠后土五鳯元年正月行幸甘泉郊泰畤二年三月行幸雍祠五畤三年三月行幸河東祠后土甘露元年正月行幸甘泉郊泰畤二年十二月行幸萯陽宫在扶風鄠縣秦文王所起萯音信屬玉觀屬玉水鳥似鵁鶄以名觀也屬音之欲切三年正月行幸甘泉郊泰畤黄龍元年正月行幸甘泉郊泰畤元帝初元二年正月行幸甘泉郊泰畤四年正月行幸甘泉郊泰畤三月行幸河東祠后土五年三月行幸雍祠五畤永光元年正月行幸甘泉郊泰畤四年三月行幸雍祠五畤五年正月行幸甘泉郊泰畤三月幸河東祠后土冬幸長楊射熊館建昭元年三月行幸雍祠五畤二年正月行幸甘泉郊泰畤三月幸河東祠后土成帝鴻嘉元年二月行幸初陵帝始為微行出永始四年正月行幸甘泉郊泰畤三月行幸河東祠后土帝乃帥羣臣横大海湊汾隂既祭行遊介山囘安邑介山在汾隂東北囘謂繞過顧龍門監鹽池龍門山在今蒲州龍門縣北鹽池在今虞州安邑縣南登厯觀歴山上有觀也在河東蒲阪縣陟西嶽以望八荒迹殷周之虛𦕈然以思唐虞之風西岳華山之上髙峻故言以望八荒殷都河内周都岐豊堯都平陽舜都蒲阪皆可想見故云迹殷周之虗思唐虞之風也虛謂曰墟元延元年三月行幸雍祠五畤二年正月行幸甘泉郊泰畤三月行幸河東祠后土冬行幸長楊宫從胡客大校獵宿萯陽宫三年三月行幸雍祠五畤四年正月行幸甘泉郊泰畤三月行幸河東祠后土綏和元年三月行幸雍祠五畤二年正月行幸甘泉郊泰畤三月行幸河東祠后土後漢光武建武二年二月己酉幸修武本殷之甯邑武王伐紂勒兵於此改曰修武今懐州縣也辛卯至自修武三年十月壬申幸舂陵祠園廟因置酒舊宅大㑹故人父老光武舊宅在今隨州棗陽縣東南宅南二里有白水焉十一月乙未至自舂陵四年二月壬子幸懐壬申至自懐四月丁巳幸鄴己巳進幸臨平屬鉅鹿五月進幸元氏辛巳進幸盧奴六月辛亥還宫七月丁亥幸譙八月戊午進幸夀春十月甲寅還宫十一月丙申幸宛十二月丙寅進幸黎丘五年正月癸巳還宫七月丁丑幸沛祠髙廟進幸湖陵縣名屬山陽又幸蕃音皮屬魯國八月己酉進幸郯縣名屬東海冬十月還幸魯使大司空祠孔子又幸臨淄進幸劇是月還宫九年六月丙戌幸緱氏登轘轅緱氏縣有緱氏山轘轅山有轘轅坂並各在雒陽東南十年八月乙亥幸長安祠髙廟有事十一陵戊戌進幸汧今隴州汧源縣十月庚寅還宫十一年二月己酉幸南陽還幸章陵祠園陵庚午還宫十七年四月乙夘南廵狩皇太子及右翊公輔楚公英東海公陽濟南公康東平公蒼從幸潁川進幸葉章陵五月乙卯還宫東觀記曰上以日食避正殿讀圖䜟多御座廡下淺露中風發疾苦眩甚左右有白大司馬史病苦如此不能動揺自强從公出乗車行數里病差四月二日車駕宿偃師病差數日入南陽界到葉以車騎省留數日行黎陽兵馬千餘匹遂到章陵起居平愈十月甲申幸章陵修園廟祠舊宅觀田廬置酒作樂賞賜十二月至自章陵十八年二月甲寅西廵狩幸長安三月壬午祠髙廟遂有事十一陵厯馮翊界進幸蒲坂祠后土四月甲戌還宫戊申幸河内戊子至自河内十月庚辰幸宜城今襄州縣還祠章陵十二月乙丑還宫十九年九月南廵狩壬申幸南陽進幸汝南南頓縣舍又幸淮陽梁沛二十年二月戊子還宫十月東廵狩甲午幸魯進幸東海楚沛國壬寅還宫二十二年閏正月丙戌幸長安祠髙廟遂有事十一陵二月己巳至自長安三十年二月東廵狩甲子幸魯進幸濟南閏月癸丑還宫七月丁酉幸魯國十一月丁酉至自魯中和元年正月丁卯東廵狩二月己卯幸魯進幸泰山事具帝王封禪門四月癸酉還宫己卯行幸長安祀長陵五月乙丑至自長安明帝永平二年十月甲子西廵狩幸長安祠髙廟遂有事十一陵十一月甲申進幸河東癸卯還宫三年十月帝從太后幸章陵觀舊廬置酒㑹隂鄧故人諸家子孫並受賞賜十二月戊辰至自章陵五年十月幸鄴常山三老言於帝曰上生於元氏願䝉優復詔復田租更賦六嵗勞賜掾吏及門闌走卒六年十月行幸魯祠東海恭王陵會沛王輔楚王英濟南王康東平王蒼淮南王延琅邪王京東海王政十二月還幸陽城遣使者祠中嶽壬午還宫十年閏四月甲午南廵狩幸南陽祠章陵日北至又祠舊宅禮畢召校官弟子作雅樂奏鹿鳴帝自御塤箎和之以娱嘉賔還幸南頓勞饗三老官屬至十二月甲午還宫十三年四月汴渠成辛巳幸滎陽廵河渠因渡河登太行進幸上黨壬寅還宫十五年二月庚子東廵狩辛丑幸偃師進幸彭城癸亥耕于下邳三月徴琅邪王京㑹良城徴東平王蒼會陽都又徴廣陵侯及其三弟會魯祠東海恭王陵還幸孔子宅又幸東平辛卯進幸大梁至定陶祠恭王陵四月庚子還宫章帝建初七年九月甲戌幸偃師東渉卷津至河内詔曰車駕行秋稼觀收穫因渉郡界皆精騎輕行無他輜重不得輙修橋道逺離城郭遣吏逢迎刺探起居出入前後以為煩擾動務省約但患不能脫粟瓢飲耳所過欲令貧弱有利無違詔書遂覽淇園己酉進幸鄴