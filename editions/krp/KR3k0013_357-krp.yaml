body:
  text: 册府元龜卷三百五十七宋王欽若等撰將帥部立功第十隋史萬嵗開皇中為左領軍將軍先是南寧夷㸑翫來降拜昆州刺史既而復叛遂以萬嵗為行軍總管率衆擊之入自靖蛉川經弄凍次小勃弄大勃弄至於南中賊前後屯據要害萬嵗皆擊破之行數百里見諸葛亮紀功碑銘其背曰萬嵗之後勝我者過此萬嵗令左右倒其碑而進渡西洱河入渠濫川行千餘里破其三千餘部虜獲男女二萬餘口諸夷大懼遣使請降獻明珠徑寸於是勒羙隋徳蘇孝慈開皇中檢校利州總管事從史萬嵗擊西㸑累戰有功進位大將軍尋檢校益州總管長史㑹越巂人王奉舉兵作亂沙羅從段文振討平之楊武通開皇中以行軍總管討西南夷以功封白水郡公張須陁開皇中從史萬嵗討西㸑以功授儀同煬帝嗣位漢王諒作亂并州從楊素平之加開府大業中為河南道黜陟討捕使賊帥盧明月衆十餘萬將冦河北須陁邀擊殺數千人賊吕明星帥仁參霍小漢等衆各萬餘擾濟北須陁進軍擊走之慕容三蔵開皇中為呉州刺史副襄陽公韋洸討嶺南酋長王仲宣既至廣州洸中流矢卒詔三蔵檢校廣州道行軍事賊衆四面攻圍三蔵固守月餘城中糧少矢盡三蔵以為不可持乆遂自率驍鋭夜出突圍擊之賊衆敗廣州獲全以功授大將軍陰夀開皇中為幽州總管先是高寳寧者北齊之疎屬也為人傑黠有籌筭在齊乆鎮黄龍及齊滅周武帝拜為營州刺史甚得華夷心高祖為丞相遂連結契丹靺鞨舉兵反高祖以中原多故未遑進討以書諭之而不得開皇初又引突厥攻圍北平至是令夀率步騎數萬出盧龍塞以討之寳寧求救於突厥時衞王爽等諸將數道北征突厥不能援寳寧棄城奔於磧北黄龍諸縣悉平張衡開皇中以行軍總管率歩騎五萬人討熈州賊李英林平之拜開府房兆開皇中為行軍總管擊胡以功官至柱國徐州總管賀婁子幹開皇中為行軍總管時吐谷渾復冦邊西土多被其害命幹討之馳驛至河西發五州兵入掠其國殺男女萬餘口二旬而還梁逺開皇中為汶州總管吐谷渾冦邉逺以鋭卒擊之斬千餘級元諧開皇中為大將軍總兵討吐谷渾時賊將定城王鍾利旁率騎三千渡河連結党項諧率兵出鄯州趨青海邀其歸路吐谷渾引兵拒諧相遇於豐利山賊鐵騎二萬與諧大戰諧擊走之賊駐兵青海遣其太子可博汗以勁騎五萬來掩官軍諧逆擊敗之追奔三十餘里俘斬萬計虜大震駭周羅㬋開皇末為幽州刺史突厥逹頭可汗犯塞從楊素擊之虜衆甚盛羅㬋白素曰賊陣未整請擊之素許焉與輕勇三十騎直衝虜陣從申至酉短兵屢接大破之進位大將軍王仁恭開皇末為車騎將軍從楊素擊突厥於靈武以功拜上開府後為驃騎將軍典蜀王軍事山獠作亂蜀王命仁恭討破之煬帝嗣位漢王諒舉兵反從楊素擊平之以功進位大將軍遼東之役以仁恭為將軍明年至新城賊數萬背城結陣仁恭率勁騎一千擊破之賊嬰城拒守仁恭四面攻圍帝聞而大悦遣舍人詣軍勞問賜以珍物進授光祿大夫董純開皇末為左衞將軍漢王諒作亂為行軍總管從楊素擊平之以功拜柱國後為榆林太守㑹彭城賊帥張大彪宗世模等衆至數萬保懸簿山冦掠徐兖煬帝令純討之純初閉營不與戰賊屢挑之不出賊以純為怯不設備縱兵大掠純選精鋭擊之合戰於昌慮大破之斬首萬餘級築為京觀賊魏騏驎衆萬餘人據單父純進擊又破之帝征遼復以純為彭城留守東海賊彭孝才衆數千掠懐仁縣純擊擒之何稠開皇末為員外散騎侍郎桂州李光仕聚衆為亂詔稠討之賊相繼降分遣建州開府梁昵討叛夷羅夀羅州刺史馮暄討賊帥李大壇並平之傳首軍門承制署首領為州縣官而還李渾仁夀初為象城府驃騎將軍從左僕射楊素為行軍總管出夏州北三百里破突厥阿勿俟斤於納逺川斬首五百級進位大將軍郭榮仁夀初為通州刺史西南夷獠多叛詔榮領八州諸軍事行軍總管率兵討之嵗餘悉平煬帝即位入為武侯驃騎將軍後數嵗黔安首領田羅駒阻清江亂夷陵諸郡民夷多應者詔榮擊平之遷左侯衞將軍吐萬緒仁夀末為太子左虞侯率煬帝嗣位漢王諒時鎮并州帝恐其為亂拜緒晉絳二州刺史馳傳之官緒未出闗諒已遣兵據蒲坂斷河橋緒不得進詔緒率兵從楊素擊破之拜左武侯將軍劉元進作亂江南以兵攻潤州帝徵緒討之緒率衆至楊子津元進自茅浦將渡江緒勒兵擊走緒因濟江背之為栅明日元進來攻又大挫之賊解潤州而去緒進屯曲阿元進復結栅拒緒挑之元進出戰陣未整緒以騎突之賊衆遂潰赴江水而死者數萬元進挺身夜遁歸保其偽署僕射朱燮管崇等屯於毘陵連營百餘里緒乗勢進擊復破之賊退保黄山緒進軍圍之賊窮蹙請降元進朱燮僅以身免於陣斬管崇及其將軍陸顓等五千餘人收其子女三萬餘口送江都宫進解㑹稽圍史祥仁夀末為行軍總管漢王諒之亂祥擊其將余公理大破之專趣黎陽討綦良綦良棄軍走其衆大潰進位上大將軍王辨仁夀末為車騎將軍漢王諒之亂辨從楊素討平之累遷鷹揚郎將遼東之役以功加通議大夫山東盜賊起上谷魏刀兒自號歴山飛衆十餘萬刼掠燕趙詔辨發步騎三千擊敗之其後賊帥郝孝徳孫宣雅時季康竇建徳魏刀兒等徃徃屯聚大至十萬小至數千冦掠河北辨進兵擊之所徃皆捷趙才煬帝大業中以行軍總管從征吐谷渾才與衞尉劉權兵部侍郎明雅等出合阿道與賊相遇擊破之以功進位金紫光祿大夫裴仁基大業中為武賁郎將從將軍李景討叛蠻向思多於黔安以功進銀青光祿大夫又擊吐谷渾於張掖破之陳稜大業中為武賁郎將與朝請大夫張鎮周發東陽兵擊琉球國分為五軍趨其都邑其王歡斯渴刺兜率衆數千逆拒稜遣張鎮周為先鋒擊走之稜乗勝逐北至其栅渴刺兜背栅而陣稜盡鋭擊之從辰至未苦鬭不息渴刺兜自以軍疲引入栅稜遂填塹攻破其栅斬渴刺兜獲其子島搥虜男女數千而歸進位右光祿大夫遼東之役以宿衞遷左光祿大夫明年帝復征遼東稜為東萊留守楊𤣥感之作亂也稜率衆萬餘人擊平黎陽斬𤣥感所署刺史元務本尋奉詔於江南營戰艦至彭城賊帥孟讓聚衆將十萬據都梁宫阻淮為固稜潜於下流而濟至江都率衆襲讓破之以功進位光祿大夫賜爵信安侯後帝幸江都宫而李子通據海陵左才相掠淮北杜佛威屯六合衆各數萬帝遣稜率宿衛兵擊之徃徃尅捷超拜右御衛將軍楊義臣大業中為左光祿大夫従煬帝征遼東時渤海高士逹清河張金稱並相聚為盜衆已數萬攻陷郡縣帝遣將軍段逹討之不能尅詔義臣率遼東還兵數萬擊之大破士逹斬金稱又収合降賊入豆子䴚討格謙擒之以狀聞奏帝惡其名遽追入朝賊繇是復盛義臣以功進位光祿大夫元成夀大業中為左親衞郎將楊𤣥感之亂也從刑部尚書衛𤣥擊之以功進位正議大夫拜西平通守斛斯萬善大業中從衞𤣥討楊𤣥感頻戰有功及𤣥感敗走萬善與數騎追及之𤣥感窘迫自殺繇是知名王世充大業中為江都守時厭次人格謙為盜數年兵十餘萬在豆子䴚中世充帥師破斬之威振羣賊又擊盧明月破之於南陽斬首數萬虜獲極多後還江都帝大悦自執杯酒以賜之唐張鎮周初仕隋為武賁郎將大業中汎海擊琉球國破之遷左衞將軍從帝江都於上江督運賊董道冲為阻進擊破之屈突通仕隋大業中為左驍衞大將軍時秦隴盜賊蜂起以通為闗内討捕大使有安定人劉迦論舉兵反據雕陰郡僣號建元署百官有衆十餘萬稽胡首領劉抜真劉鷂子聚衆與迦論相影響通發關中兵擊之賊衆大潰斬迦論并首級萬餘於上郡南山築為京觀虜男女數萬口而還後從太宗圍雒陽竇建徳且至太宗中分麾下以屬通令與齊王元吉圍守雒陽世充平通功為第一劉徳威仕隋大業末以校尉從左光祿大夫裴仁基討賊于淮左手斬魁帥李青蛙傳首行在所武徳初為潞州道行軍總管領兵出太行山經畧河内仍受太宗節度徳威進兵拔懐州從擒竇建徳平王世充皆有功蘭謀仕隋大業末以鷹揚將軍留守臨汾義旗建率所部來降從高祖平京城授左光祿大夫為太子左衞率又從太宗破宋金剛及王世充竇建徳劉黑闥徐圓朗等皆有戰勲數蒙賞賜李藝仕隋大業末為幽州總管及聞高祖踐祚奉表歸國於是璽書封王㑹劉黑闥舉兵高祖遣其弟監門將軍夀將兵與藝合勢攻劉黒闥藝率步騎數萬破劉什善於徐河又進兵與太宗軍㑹於洛水太宗令為馬軍總管仍領本兵從大軍擊賊有功武徳三年竇建徳侵幽州藝為總管擊走之斬首千餘級藺興粲為驍騎將軍武徳元年梁師都冦靈州興粲擊破之俘斬二千餘人鄜州刺史梁禮叛擊破之俘斬千餘人張綸以左驍騎衞將軍為絳州道行軍總管武徳元年討叛胡平之鮮于盛為統軍武徳元年王世充將高毗侵夀安盛斬首千餘級趙欽為驃騎武徳元年賊帥吕寳生衆七千人破盩厔縣欽擊之斬首百餘級王師仁為討捕使武徳元年胡賊八千人掠涇陽師仁擊走之王君廓武徳初以上柱國從大軍東討别下轘轅羅州二縣王世充遣將魏隱率兵拒之君廓撤營偽遁設伏以待之隱縱兵疾進發伏大破之又與諸軍下武牢執偽荆王行本擊王世充糧運於緱氏沉其米舩三十餘艘進爵彭國公邑三千戸黄君漢武徳初為行軍總管鎮于柏崖拒王世充將高毗敗之封虢國公後從太宗擊東都别下回洛城及東都平賜黄金百兩雜綵千餘段從平劉黑闥及破輔公祏皆有戰功丘行恭武徳初以光祿大夫從太宗討薛舉劉武周王世充竇建徳皆立殊勲授左驃騎貞觀中從侯君集平高昌封天水郡公裴行方武徳初為右親衞中郎將從征遼東授右五步軍總管破駐蹕山攻安市城有功授右衞將軍又奉詔討茂州叛羌董郎㺯大破之窮賊餘黨西至乞習山臨弱水而歸馬三寳武徳初以别擊叛胡劉拔真於北山破之又從平薛舉遷左驍衞大將軍復從柴紹擊吐谷渾於岷州先鋒陷陣斬其名王前後虜男女數千口以功封新興縣侯李大亮武徳初為金州總管府司馬時王世充遣其兄子𢎞烈據襄陽令大亮安撫樊鄧以圖進取亮進兵擊之所下十餘城高祖下書勞勉後從太宗討吐谷渾為河東道行軍總管遇賊於蜀渾山破之俘其名王虜雜畜五萬以功進爵為公殷嶠武徳初以陜東道行臺兵部尚書從討宋金剛與總管衞孝節將軍秦武通别破賊將尉遲敬徳於美良川拜吏部尚書以功進爵鄖國公食邑三千戸盧士良武徳初以戰功為柱國其後党𢎞仁督運於穀州士良以馬軍總管率兵為援遇王世充驍將葛彦璋接戰破之進下慈潤城擒其守張暁復從平宋金剛劉𢎞基武徳初以秦王府左一總管從太宗屯于拍壁率兵二千自隰州趣西河㫁賊歸路時賊鋒甚勁𢎞基堅壁不敢進及金剛遁𢎞基率騎趣之至于介休與太宗㑹追擊大破之貞觀中為輔國大將軍遼東之役以𢎞基為前軍大將軍從擊高延夀於駐蹕山力戰有功累蒙優賞公孫武逹武徳初為秦王府長鎗車騎從太宗討劉武周力戰功最後為右監門將軍合擊鹽州叛突厥可邏拔扈武逹引兵趨靈州至波邏廻及之賊方渡河見武逹至據河南岸與武逹相持武逹泊船引兵擊之斬可邏拔扈殺傷㡬盡進封東萊郡公盛彦師武徳初以行軍總管與史萬寳鎮宜陽以拒東冦斬李宻擒王伯當以功封葛國公拜武衞將軍秦叔寳武徳初以馬軍總管從太宗北征於美良川破尉遲敬徳功最居多尋授秦王府右三綂軍從破宋金剛於介休從討王世充每為先鋒又從平劉黒闥累授上柱國左武衞將軍封翼國公程知節武徳初以秦王府左三統軍破宋金剛擒竇建徳降王世充並領左一馬軍總管每陣先登以功封宿國公顯慶初為葱山道行軍總管與賀魯所部歌邏祿及處月戰於榆暮谷大破之斬首千餘級獲駝馬牛羊萬計副將周智度攻其突騎處木昆等於咽城拔之斬首三萬級虜獲甚衆張士貴武徳初為光禄大夫累有戰功賜爵新野縣公從太宗平東都授虢州刺史貞觀七年以右武侯將軍破反獠而還段志𤣥武徳初以光祿大夫從劉文静拒屈突通於潼關以功授樂遊府驃騎將軍後從討王世充破竇建徳功又居多遷秦王府右三䕶軍段徳操以武衞將軍為延州道行軍總管武徳二年梁師都侵延州徳操擊破之斬首三千餘級五年擊師都石堡大破之俘斬千餘人師都僅以身免李靖武徳二年以秦王幕府從討王世充以功授開府時蕭銑據荆州遣靖安輯之輕騎至金州遇蠻賊數萬聚山谷靖與廬江王瑗擊之多所克獲㑹開府蠻酋冉肇則反率衆冦䕫州趙郡王孝恭與戰不利靖率衆八百襲破其營臨陣斬肇則俘獲五千餘人四年以行軍總管攝孝恭行軍長史集兵於䕫州討蕭銑破之以功授上柱國封永康縣公十六年輔公祏反於丹陽靖又副孝恭以討平之貞觀三年突厥諸部離叛朝廷將圖進取以靖為代州道行軍總管率驍騎三千自馬邑出其不意直趣惡陽嶺以逼之四年二月次隂山擊頡利可汗大破之滅其國復定襄常安之地斥土界自隂山北至於大漢露布以聞李仲文為行軍總管武徳三年劉武周遣將軍張萬嵗侵涪州仲文擊走之俘斬數千人郭行方為襄州道安撫使武徳四年攻蕭銑郢州尅之九年為益州刺史行臺尚書擊眉州叛獠之衆大破之李勣武徳四年以陵州刺史從太宗伐王世充于東都累戰大捷又東畧地至武牢偽鄭州司兵沈悦請翻武牢勣夜潜兵應接尅之擒其偽刺史荆王行本從太宗振旅而還論功行賞太宗為上將勣為下將與太宗俱服金甲乗戎輅吿捷於太廟又從太宗破劉黒闥徐圓朗累遷左監門大將軍圓朗重據兖州反授勣河南大總管以討之尋獲圓朗斬首以獻七年詔與趙郡王孝恭討輔公祏孝恭領舟師巡江而下勣領步卒一萬渡淮拔其夀陽至硤石公祏之將陳正通率兵十萬屯于梁山又遣其大將馮惠亮率水軍十萬鏁連大艦以㫁江路仍於江西結壘分守水陸以禦王師勣攻其壘尋尅之惠亮單而遁乗勝逼之正通大潰以十餘騎奔于丹陽公棄城夜遁勣縱騎追斬之於武康江南悉定太宗即位拜并州都督賜實封九百户貞觀三年為通漠道行軍總管至雲中與突厥頡利可汗兵㑹大戰于白道突厥既敗屯營于磧口遣使請和詔鴻臚卿唐儉徃赦之勣時與定襄道大總管李靖軍㑹與議曰頡利雖敗人衆尚多若走渡磧保于九姓道徑阻深追則難及今詔使唐儉至彼其必弛備我等隨後襲之此不戰而平賊矣靖扼腕喜曰公之所言乃韓信滅田榮之䇿也於是定計靖將兵逼夜而發勣勒兵徑進靖軍既至賊營大潰頡利與萬餘人欲走渡磧勣屯軍於磧口頡利至不得渡磧其大酋長率其部落並降于勣虜五萬餘口而還勣為并州大都督長史十五年徵拜兵部尚書未赴京㑹薛延陁遣其子大度設帥騎八萬南侵李思摩部落命勣為朔州行軍總管率輕騎三千追及延陁於青山擊大破之斬其名王一人俘獲首虜五萬餘計以功封一子為縣公十九年太宗親征高麗授勣遼東道行軍大總管攻破葢牟遼東白崖數城以功封一子為郡公高宗總章元年為遼東道行軍大總管率兵平高麗加太子太師增食實封通前一千一百戸李安逺武徳中為左武衞將軍破宋金剛王世充擒劉黑闥皆有戰功尉遲敬徳武徳中以秦王府左一綂軍從太宗擊王世充大破之又從討劉黑闥於臨洺敬徳率壯士犯圍而入大破賊陣已又從破徐圓朗累有戰功授秦王府左二副䕶軍武徳末以行軍總管與突厥戰於涇陽大破之獲其侯斥阿史徳烏没啜斬首千餘級許紹武徳中以硤州刺史為行軍總管時蕭銑屡遣兵入硤州紹擊走之進圍安蜀鎮副將朱士陸殺其大將率士衆來降於紹紹又遣子智仁及禆將李𢎞節攻荆門鎮破之柴紹武徳中以左翊衞大將軍從太宗平薛舉破宋金剛攻平王世充於雒陽擒竇建徳於武牢封霍國公賜實封千二百戸九年為左衞大將軍擊突厥於秦州大破之斬其特勒一擒大將三人斬首千餘級竇軌武徳中以光祿大夫鎮秦州㑹赤排羌作亂軌與康州刺史楊師道擊破之餘黨悉降後率兵擊東都高祖引其將校五百人宴賜而遣之及還鎮于益州許以便宜從事時巴隆等數州隆今閬州山獠作亂軌擊破之還至方山羣獠潜相聚結夜襲軌營軌逆擊之戰數合賊始敗前後虜男女二萬口又屬党項冦松州詔軌援之又令扶州刺史蔣善合與軌合勢時党項引吐谷渾之衆其鋒甚鋭軌等分軍於宕昌岷山二道俱進軌師未至善合先期至錯川遇賊力戰走之高祖因令軌耀兵於臨洮酋首王子貢等詐降於軌收而斬之進擊左封破其部衆錢九隴武徳中為左監門郎將平薛仁杲劉武周以前後戰功累授右武衞將軍其後從太宗擒獲竇建徳平王世充從隱太子討劉黑闥於魏州力戰破賊策勲為最累封郇公仍以本官為苑遊將軍盧祖尚武徳六年以兖州刺史從趙郡王孝恭討輔公祏為前軍總管攻其宣歙二州克之進擊賊帥馮慧亮陳正通並破之賊平以功授蔣州刺史張公謹太宗貞觀初以代州都督副李靖經畧突厥破定襄破頡利璽書慰勞封鄒國公蘇定方為正道府折衝貞觀初隨李靖襲突厥頡利於磧口靖使定方率二百騎為前鋒乗霧而行去賊一里許忽然霧散望見其牙帳馳掩殺數十百人頡利及隋主狼狽散走餘衆俯伏靖軍既至遂悉降之軍還授左武衛中郎將永徽中以左衞中郎將從左衞大將軍程知節征賀魯有功擢為行軍大總管率兵盡平西域生擒賀魯而還顯慶五年授熊津道大總管率兵討平百濟定方前後滅三國皆生擒其主賞賜珍寳不可勝紀薛萬徹貞觀初為柴紹之副擊梁師都于朔方㑹突厥四面而至官軍稍却萬徹與兄萬均横出擊之斬其騎將虜陣既亂因而乗之殺傷被野鼓行而進遂圍師都降其城後從李靖擊突厥頡利可汗於塞北以功授統軍及靖將擊吐谷渾請萬徹同行與諸將各率百餘騎先行卒與虜數千騎相遇萬徹單騎馳擊之虜無敢當還謂諸將曰賊易與耳躍馬復進諸將隨之斬數千級又與兄萬均破吐谷渾天柱王於赤水源獲其雜畜二十萬計萬均官至左屯衞大將軍封潞國公萬徹後為蒲州刺史㑹薛延陁率廻紇同羅之衆渡磧南擊李思摩萬徹副李勣援之與虜相遇率數百騎先鋒擊其陣後騎皆散退賊顧見遂大潰追奔數十里斬首三千餘級獲馬萬五千匹以功别封一子縣侯後為青丘道行軍大總管率甲士二萬自萊州泛海伐高麗入鴨綠水百餘里至泊汋城高麗震懼多棄城而遁泊汋城主所夫孫帥步騎萬餘人拒戰萬徹遣右衞將軍裴行方領步卒為支軍繼進萬徹及諸軍乗之賊大潰追奔百餘里於陣斬所夫孫進兵圍泊汋城其城因山設險阻鴨綠水以為固攻之未抜高麗遣將高文率烏骨安地諸城兵三萬餘人來援分置兩陣萬徹分軍以當之鋒刃纔接而賊大潰張儉貞觀初以軍功累遷朔州刺史後為檢校營州都督府事營州所管契丹奚霫靺鞨諸蕃皆隣接境粟末靺鞨最近高麗引衆數千來冦儉率鎮兵及諸蕃首領邀擊之斬獲畧盡璽書慰勞拜營州都督及行軍總管征遼東時有獲高麗侯者稱莫離支將至遼東詔儉率兵新城路邀莫離支竟不敢出儉因進兵渡遼趨建安城賊徒大潰斬首數千級以功累封皖城郡公賞賜甚厚册府元龜卷三百五十七
