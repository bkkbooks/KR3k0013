body:
  text: 册府元龜卷五百五宋王欽若等撰邦計部俸祿國非賢不乂賢非后不食古先哲王官設居方必先正位位定然後制祿三代相㳂官倍於古周官太宰以八柄馭羣官其二曰祿秦漢而下命秩尤衆差定名數以月受俸下足以代耕上足以行義斯經世之令典官人之逹道雖百代孰能易哉若乃上無虛授下無虛受賞之以禮報之以功使賢者無家食之歎居官絶素餐之譏傳曰行爵出祿必當其位斯之謂至治矣周武王初定天下更立公侯伯子男凡五等諸侯之上大夫卿下大夫上士中士下士凡五等天子之田方千里公侯田方百里伯七十里子男五十里不能五十者不逹於天子附於諸侯曰附庸天子之三公之田視公侯天子之卿視伯天子之大夫視子男天子之元士視附庸皆象星辰之大小也不逹謂不列朝會也附庸者以國事附于大國未能以其名通也視猶比也元善也善士謂命士也此比殷所因夏爵三等之制也制農田百畝百畝之分上農夫食九人其次食八人其次食七人其次食六人下農夫食五人庶人在官者其祿以是為差農夫皆受田於公田肥磽有五等收入不同也庶人在官者謂府史之屬官長所除不命於天子國君者分或為糞諸侯之下士視上農夫祿足以代耕也中士倍下士上士倍中士下大夫倍上士卿四大夫祿君十卿祿次國之卿三大夫祿君十卿祿小國之卿倍大夫祿君十卿祿此班祿尊卑之差諸侯之下士祿食九人中士食十八人上士食三十六人下大夫食七十二人卿食二百八十八人君食二千八百八十人次國之卿食二百一十六人君食二千一百六十人小國之卿食百四十四人君食千四百四十人次國之卿命於其君者如小國之卿天子之大夫為三監監於諸侯之國者其祿視諸侯之卿其爵視次國之君其祿取之於方伯之地方伯為朝天子皆有湯沐之邑於天子之縣内視元士給齋戒自潔清之用湯沐用燔漢髙帝時因秦官號有御史大夫秩中二千石有兩丞秩千石博士秩比六百石廷尉有正左右監秩皆千石太子門大夫庶子秩皆六百石先先或作洗馬秩比謁者是時三公號稱萬石其奉月各三百五十斛中二千石者月各百八十斛二千石者百二十斛比二千石者百斛千石者八十斛六百石者七十斛比六百石者六十斛四百石者五十斛比四百石者四十五斛三百石者四十斛比三百石者三十七斛二百石者三十斛比二百石者二十七斛百石者十六斛斗食十一斛佐史奉八斛文帝二年置一丞相有兩長史秩千石武帝建元三年置期門僕射秩比千石元狩五年置部刺史秩六百石太初元年更名中大夫為光祿大夫秩比二千石太中大夫秩比千石又更名郎中令為光祿勲大行令為大鴻臚大農中尉為執金吾自太常光祿衛尉太僕太理鴻臚宗正司農少府執金吾皆中二千石丞皆千石又更右内史為京兆尹左内史為左馮翊都尉為右扶風自太子太傅將作少府詹事將行皇后卿即大長秋也典屬國水衡都尉左馮翊右扶風皆秩二千石丞六百石是時司𨽻城門中壘屯騎歩兵越騎長水胡騎射聲虎賁射士校尉秩皆二千石奉車都尉駙馬都尉秩比二千石前後左右將軍長史秩千石又有議郎中郎侍郎郎中皆無員多至千人議郎中郎秩比六百石侍郎比四百石郎中比三百石中郎有五官左右三將秩皆二千石郎中有車户騎三將主車曰車郎主戶衛曰戸郎漢儀注郎中令主郎中左右車將主左右車郎左右戸將主左右戸郎也秩皆比千石謁者秩比六百石有僕射謁請也白也僕主也秩比千石郡守秩二千石有丞邊郡又有長史秩皆六百石郡尉秩比二千石有丞秩皆六百石縣令長萬户以上為令秩千石至六百石减萬户為長秩五百戸至三百石皆有丞尉秩四百石至二百石是為長吏吏理也主理其縣内百石以下有斗食漢官名秩簿云斗食月俸十一斛佐史月奉八斛一説斗食者歲俸不滿百而計日而食一斗二升故云斗食也宣帝地節二年置西域都䕶有副校尉秩比二千石帝又令中郎將騎都尉監羽林比二千石三年置左右廷尉平秩皆六百石神爵三年八月詔曰吏不亷平則治道衰今小吏皆勤事而奉祿薄欲其毋侵漁百姓難矣其益吏百石以下奉十五若食一斛則益五斗元帝初元元年置戊巳校尉有丞司馬各一人候五人秩比六百石成帝陽朔二年除八百石五百石秩除八百就六百除五百就四百也綏和元年大司馬大司空祿比丞相更部刺史名牧秩二千石二年益吏三百石以下俸凡比二千石以上年老致仕者參分故祿與之終其身參音三其時亦有俸錢之差但本史不具耳故元帝時貢禹上書曰臣為諫大夫秩八百石俸錢月九千二百廪食太官又拜為光祿大夫秩二千石俸錢月萬二千祿賜愈多家日以益富哀帝元壽二年大司馬有長史秩千石平帝元始元年更名虎賁郎置郎中將秩比二千石後漢光武建武二十六年增百官俸有千石以下减於西京舊制六百石以下增於舊秩是時太傅太尉府長史一人千石東西曹掾比四百石餘掾比三百石屬比二百石故曰公府掾比古元士三命者也或曰漢初掾史辟皆上言之故有秩比命士其所不言則為百石屬其後皆自辟除故通為百石漢舊注曰公令史百石自中興以後注不說石數司徒司空府長史千石大將軍府長史司馬皆千石從事中郎六百石其領軍皆有部曲大將軍營五部部校尉比二千石軍司馬比千石部下有曲曲有軍候比六百石曲下有屯屯長比百石太史令六百石丞三百石博士祭酒六百石博士比六百石太祝令太宰令太子令髙廟令世祖廟令陵園令每陵食官令太卜令皆六百石五官中郎將及左右中郎將虎賁中郎將羽林中郎將皆比二千石五官及左右虎賁中郎比六百石五官左右虎賁侍郎比四百石五官左右虎賁郎中比三百石左右僕射左右陛長比六百石節從虎賁比二百石羽林郎比三百石羽林左右監六百石奉車都尉駙馬都尉比二千石騎都尉二千石光祿大夫比二千石太中大夫千石中散大夫諫議大夫議郎常侍謁者皆六百石謁者僕射比千石其給事謁者四百石灌謁者郎中皆三百石公車司馬令南北宫衛士令左右都候左右式道中候左右較令百軍中候考功令車府令未央廐令六廐令同廷尉正左監右平鴻臚大行令公主家令太倉令平凖令道官令廪犧令太毉令太官令守宫令上林苑令黄門及黄門令掖庭今永巷令御府令祠祀令鉤盾令中藏府令内謁者令尚方黄門穴從僕射符節令武庫令皆六百石公主家丞三百石濯龍監直里監宦者丞從丞黄門署長玊堂署長丙署長皆四百石永巷長比四百石宦者比三百石永巷郎中三百石中黄門比百石侍中比二千石中常侍千石宦者無員後增秩比三千石黄門侍郎六百石尚書令御史中丞千石尚書治書侍御史六百石左右丞侍郎四百石尚書令史符節令史二百石蘭臺令史六百石執金吾太子太傅太常光祿衛尉太僕廷尉大鴻臚宗正大司農少府諸卿皆中二千石丞千石太子少傅將作大匠二千石太子家令太子僕千石太子門大夫中庶子倉令食官令六百石洗馬比六百石太子廐長中盾比二千石丞比六百石令相千石丞尉四百石其六百石丞尉三百石長相四百石及三百石丞尉皆二百石諸侯公主家丞秩皆比二百石諸邊鄣塞尉諸陵校尉長皆二百石有常例者不署秩司𨽻校尉比二千石京都尹郡太守二千石屬國都尉使匈奴中郎將䕶烏桓校尉䕶羗校尉比二千石州刺史六百石每縣邑道大者置令千石其次六百石其次置長四百石其次三百石侯國之相亦如之前漢雒陽令秩千石丞及孝亷左右尉四百石鄉三老游徼百石鄉户五千則置有秩皇子封王其郡為國王傳相皆二千石殤帝延平元年中二千石俸月錢九千米七十二斛二千石錢六千五百米三十六斛比二千石錢五千米三十四斛千石錢四千米三十斛六百石錢三千五百米二十二斛四百石錢二千五百米十五斛三百石錢二千米十二斛二百石錢一千米九斛百石錢八百米四斛八斗大將軍三公臘賜錢各二十萬牛肉二百斤粳米百斛將進侯以下各有差立春之日遣使者賜文官司徒司空帛三十疋九卿十五疋武官太尉大將軍各六十疋執金吾諸校尉各三十疋武官倍文官也桓帝延熹三年九月詔無事之官權約俸豐年如故獻帝建安八年頒賜三公下金帛繇是三年一賜以為常例晉武帝泰始三年九月詔曰古者以德詔爵以庸制祿雖下士猶食上農外足以奉公忘私内足以飬親施惠今在位者祿不代耕非所以崇化之本也其議增吏俸太康元年平吳之後定官品第一至第九各以貴賤占田品第一者占五十頃第二品四十五頃第三品四十頃第四品三十五頃第五品三十頃第六品二十五頃第七品二十頃第八品十五頃第九品十頃又得蔭人以為衣食客及佃客品第六以上得衣食客三人第七第八品二人第九品及舉輦跡禽前驅繇基强弩司馬羽林郎殿中穴從虎賁殿中虎賁推持斧武騎虎賁持鈒穴從虎賁命中虎賁武士一人其應有佃客者官品第一第二者佃客無過四十户第三品三十五户第四品三十戸第五品二十五户第六品二十戸第七品十五戸第八品十戸第九品五戸其佃糓皆與大家量分簡文帝咸安二年三月詔曰徃者事故之後百度未充羣僚常俸並皆寡約葢隨時之義也然退食在朝而祿不代耕非經通之制今資儲漸豐可籌量增俸宋髙祖永初元年六月詔曰百官事殷俸薄祿不代耕雖國儲未豐要令公私周濟諸供給等减半者可悉復舊六軍見祿租可不在此例其餘官僚或自本俸素少者亦疇量增之二年二月制中二千石加公田一頃文帝元嘉二十七年正月制交寧二州假收郡縣俸祿聽依臺除二月以軍興减百官俸三分之一三月淮南太守諸葛闡求减俸祿同内百官於是州及郡縣丞尉並悉同减孝武大明二年正月復郡縣田秩并九親俸祿四年十月制郡縣减祿並先充公限五年五月制帝室朞親官非祿官者月給錢十萬八月制方鎮所假白收郡縣年限依臺除祿三分之一不給送六年二月復百官祿前廢帝永光元年二月减州郡縣田祿之半明帝泰始五年六月以軍興已來百官斷俸並給坐食南齊武帝永明元年正月詔經邦之寄寔資莅民守宰俸祿葢有常准徃以邊虞告警故沿時損益今區㝢寧晏庻績咸熈忠勤簡能宜加優奬郡丞尉可還田秩又云齊氏衆官有僮幹之役而不詳其制七年正月詔曰諸大夫年秩隆重祿力殊薄豈所謂下車惟舊趨橋敬老可增俸評給見役八年十二月詔尚書丞郎職事繁劇䘏俸未優可量增賜祿十年正月詔增内外有務衆官祿俸明帝建武三年閏十二月詔今歲不須光新可以見錢為百官供給東昏侯永元元年正月詔三品清資以應食祿者二親或祖父母年登七十並給見錢梁髙祖天監初定九品令帝於品下注一品秩為萬石第二第三品為中二千石第四第五品為二千石大通元年正月詔曰朕思利兆民惟日不足氣象環周每𢎞優簡百官俸祿本有定數前代以來皆多評准頃者因循未遑改革自今以後可長給見錢依時放出勿令逋緩太清末侯景之亂國用嘗褊京官文武月别唯得廪食多遥帶一郡縣官而取其祿秩焉揚徐等大州比令僕揚州督王畿理在建康徐州督重鎮京口並外官刺史最重者尚書令僕射官品第三寧桂等小州比叅軍班寧州理建寧今雲南郡桂州理始安今郡並與外官刺史最輕者府叅軍官品第六丹陽郡呉郡會稽等大郡同太子詹事尚書班丹陽理建康吳郡會稽即今郡並列郡重者詹事尚書官品第三髙源晉康等小郡王班而已髙源晉康即今郡並列郡軍輕者梁武帝定九品後其内官吏為十班以班多者為貴同班者即以居下為劣則興品第髙下不論當是其時更以清濁為差耳本史既畧不可詳焉大郡六班小縣兩轉方至一班其州郡祿米絹布絲綿當處轉臺傳倉庫若給刺史令等先准其所部文武名物多少繇勑而裁凢如祿秩既通所部兵士給之其家得蓋少諸王諸主出閣就第婚冠所須及衣裳服餙并酒米魚鮮香油紙燭等並定官給之王主壻外祿者不給觧任還京仍亦公給後魏孝文太和八年六月詔曰置官班祿行之尚矣周禮有食祿之典二漢著受俸之秩逮于魏晉不聿稽徃憲以經綸治道自中原䘮亂兹制中絶朝政因循未遑釐改朕永鑒四方求民之瘼夙興昧旦至於憂勤故憲章舊典以班俸祿罷諸商人以簡民事戸增調三疋糓二斛九斗以為官司之祿均預調為二疋之賦即兼商用雖有一時之煩終克永逸之益祿行之後賍滿一疋者死變法改度宜為更始其赦天下與之惟新初臨淮王他奏求依舊斷祿文明太后令召羣臣議之中書監髙閭表曰天生蒸民樹之以君明君不能獨理必須臣以作輔君使臣以禮臣事君以忠故車服有等差爵命有分秩德髙者則位尊任廣者則祿重下者祿足以代耕上者俸足以行義庶民均其賦以展奉上之心君王聚其財以供事業之用君班其俸垂惠則厚臣受其祿感恩則深於是貪錢之心止竭効之誠篤兆庶無侵削之煩百辟僃禮容之美斯則經世之明典為治之至術自堯舜已來逮至三季雖優劣不同而斯兹弗改自中原運否天下幅裂海内未一民數耗减國用不充俸祿遂廢此則事出臨時之宜良非長乆之道大魏應期紹祚昭臨萬方九服既和八表咸謐二聖欽明文思道冠百代動遵禮式稽考舊章准百王不易之勝法述前聖利世之髙軌置立隣黨頒宣俸祿事設令行於今已久苛慝不生上下無怨姦巧革慮闚覦絶心利潤之厚同於天地以斯觀之如何可革又洪波奔激則堤防宜厚姦悖充斥則禁網須嚴且饑寒切身慈母不保其子家給人足禮讓可得而生但亷清之人不必皆富豐財之士未必悉貧今始其俸則清者足以息其濫竊貪者足以感而勸善若不班祿則貪者肆其姦情清者不能自保難易之驗灼然可知如何一朝便欲去俸淮南之議不亦謬乎帝從閭議十月詔曰俸制已立宜時班行其以十月為首每季一請於是内外百官受祿有差九年二月制皇子封王者皇孫及皇曾孫紹封者皇女封者歲祿各有差十月詔均給天下民田諸宰人之官各隨近給公田刺史十五頃太守十頃治中别駕各八頃縣令郡丞六頃更代相付賣者坐如律十年十一月議定民依戸給俸十八年十二月詔王公侯伯子男開國食邑者王食半公三分食一侯伯四分食一子男五分食一十九年五月减閒官祿以禆軍國之用孝明以延昌四年即位先是孝文時以軍國多事用度不足百官之祿四分减一及帝即位侍中領軍將軍于忠既擅權欲以惠澤自固乃悉復所减之祿東魏孝靜天平二年十二月詔文武百官量事各給祿北齊文宣天保七年十一月制刺史今盡行兼不給幹物是時官秩一品每歲八百疋二百疋為一秩從一品七百疋百七十五疋為一秩二品六百疋百五十疋為一秩從二品五百疋百二十五疋為一秩三品四百疋百疋為一秩從三品三百疋七十五疋為一秩四品二百四十疋六十疋為一秩從四品二百疋五十疋為一秩五品百六十疋四十疋為一秩從五品百二十疋三十疋為一秩六品百疋二十五疋為一秩從六品八十疋二十疋為一秩七品六十疋十五疋為一秩從七品四十疋十疋為一秩八品三十六疋九疋為一秩從八品三十二疋八疋為一秩九品二十八疋七疋為一秩從九品二十四疋六疋為一秩祿率一分帛一分以粟一分錢事繁者優一秩平者守本秩閑者降一秩長兼試守者亦降一秩非執事不朝拜者皆不給祿州郡制祿之法刺史守令下車各前取一時之秩上上州刺史歲秩八十疋與司州牧同上中上下各五十疋為差中上降上下百疋中中及中下亦以五十疋為差下上降中下百疋下中下下亦各五十疋為差上郡太守歲秩五百疋降清都尹五十疋上中上下各以五十疋為差中上䧏上下四十疋中中及中下各以三十疋為差下上䧏中下四十疋下中下下各以三十疋為差上上縣歲百五十疋與鄴臨漳成安三縣同上中上下各以十疋為差中上䧏上下三十疋中中及中下各以五疋為差下上降中下二十疋下中下下各以十疋為差州自長史下逮于史吏郡縣自丞以下逮于掾佐亦皆以帛為秩郡有尉减丞之半皆以其所出嘗調課給之自一品以下至流外勲品各給事力一品至三十人流外勲品或以五人為等或以四人三人二人一人為等繁者加一等平者守本力閒者降一等諸州刺史守令以下幹及力皆聽勅乃給其幹出所部之人一幹輸絹十八疋幹身放之則白直充武成河清四年以年糓不登詔减百官食廪各有差後周太祖為西魏相創制六官祿秩下士百二十五石中士以上至於上大夫各倍之上大夫是為四千石卿二分孤三分公四分各益其一公因盈數為萬石其元秩百二十石八秩至於七秩每二秩六分而下各去其一二秩一秩俱為四十石凢頒祿親年之上下畝至四釡為上年上年頒其正三釡為中年中年頒其半二釡為下年下年頒其一無年㓙荒不頒祿武帝保定二年四月詔曰比以冦難猶梗九州未一文武之官立功効者雖錫以茅土而未給租賦諸柱國等勲德隆重宜有優崇各准别制邑戸聽寄食他縣隋髙祖開皇元年十月頒新令自諸王已下至于都督比給永業田各有差多者至一頃少者至四十畝京官又給職分田一品給五頃每品以五十畝為差至五品則為田三頃六品二頃其下每品以五十畝為差至九品為一頃縣官亦各有職分田是時京官正一品祿九百石其下每以百石為差至正四品是三百石從四品二百五十石其下每以五十石為差至正六品是為百石從六品九十石以下每以十石為差至從八品是為五十石食封及官不判事者并九品皆不給祿其給皆以春秋二季刺史太守縣令則計戸而給祿各以戸數為九等之差大州六百二十石其下每以四十石為差至於下下則三百石大郡三百四十石其下毎以三十石為差至於下下則百石大縣一百四十石其下每以十石為差至於下下則六十石其祿唯及刺史二佐及郡守縣令八年五月僕射髙熲奏諸州無課調及有課調州管户數少者官人祿力乗前已來嘗出附近之州但判官本為收人役力理出所部請於所管戸内計戸徵稅從之唐髙祖初為隋相國罷外官給祿每十斛給地二十畝武德元年十二月因隋制文武官給祿正一品七百石從一品六百石正二品五百石從二品四百六十石正三品四百石從三品三百六十石正四品三百石從四品二百六十石正五品二百石從五品一百六十石正六品一百石從六品九十石正七品八十石從七品七十石正八品六十石從八品五十石正九品四十石從九品三十石並每年給諸給祿者三師三公及太子三師三少若在京諸司文武官職事九品以上并左右千牛僃身左右太子千牛並依官給其春夏二季春給秋冬二季秋給凡京文武官每嵗紿祿總五千萬一千五百三十三石二斗自至德之後不給其在外武官九品以上准官皆䧏京官一等給其文武官在京官上者則不䧏諸給祿應給等者正從一品各以五十石為一等二品三品皆以三十石為一等四品五品皆以二十石為一等六品七品皆以五石為一等八品九品皆以二石五斗為一等其俸錢之制京司諸官初置公廨令行署及畨官興易以充俸又制内外官各給職分田京官一品十二頃二品一十頃三品九頃四品七頃五品六頃六品四頃七品三頃五十畝八品二頃五十畝九品二頃雍州及外州官二品十二頃三品十頃四品八頃五品七頃六品五頃七品四頃八品三頃九品二頃五十畝其統軍府及鎮戍關津之官又節給量减京司及州縣又各公廨田課其營種以供公私之費太宗貞觀二年二月詔官人得上考給一季祿六月制官人出使皆廪食妻子十二月詔外官新到任多有匱乏准品計日給糧三年正月詔官人得上下考給一年祿八年中書舍人髙季輔上表曰仕以應務亦以代耕外官卑品猶未得祿既離鄉井理必貧煎但妻子之戀賢逹其猶累懐饑寒之加夷惠罕全其行為政之道期於易從若不恤其匱乏難欲俾其清儉凢在末品中庸者多正恐廵察歳出輶軒繼軌不能肅其侵漁何以求其政術今户口漸殷倉廪已實斟量給祿使得養親然後督以嚴科責其報効則庶官畢力物議斯免十年正月詔有司收内外職田除公廨田園外並官收先給逃還貧下戸及欠丁田户其職田以正倉粟畝率二升給之十一年三月勑内外官職田恐侵百姓先令官收慮其祿薄家貧所以别給地子去歳縁有水旱遂令總停如聞卑官頗難支濟事須優恤使得自資宜准元勑給其地子十二年三月諫議大夫禇遂良以武德已後國家倉庫猶屬虛應京官料錢並給公廨本令當司令史畨官興易給利計官員多少分給乃上疏曰為政之本在於擇人不正其源遂差千里漢家以明經拜職或四科辟召必擇器任使量才命官然則市井子孫不居官吏大唐制令憲章古昔商估之人亦不居官位陛下近許諸司令史捉公廨本錢諸司取此色人號為捉錢令史不簡性識寧論書藝但令身能估販家足貲財錄牒吏部即依補擬大率人捉五十貫已下四十貫已上任居市肆恣其販易每月納利四千一百年凢輸五萬送利不違年滿受職有國家者嘗笑漢代賣官今開此路頗類於彼在今七十餘司大率司引九人更一二載後年别即有六百餘人輸利受職伏惟陛下理致升平任賢為政或文學髙第或諸州進士皆策同片玉經若懸河奉先聖之格言慕昔賢之廉恥㧞十取五量能授官然犯禁違公輒羅刑法况乎捉錢令史主於估販志意分毫之末耳目㕓肆之聞輸錢於官以獲品秩荏苒年歲陛下能不用之乎此人習於性成慣於求利茍得無恥莫蹈廉隅使其居職從何而可將來之弊宜絶本源臣每周遊人間為國視聽京司僚庶爰及外官異口同辭皆言不便伏願勑朝臣遣其詳議帝納之是月勑並停改署胥士七千人以諸州上戸充准防閤例輸課二年一替計官員多少分給十八年三月復京官職田以京兆及岐同華朔万等州空閑地及陂澤堪佃食者充之二十一年二月令在京諸司依舊置公廨給錢充本置令史咠士等令廻易納利以充官人俸二十三年九月勑諸王並宜食一千户封髙宗永徽元年四月廢京官諸司捉錢咠士其官人俸料以諸州租脚充八月詔文武五品以上觧官充侍者宜准致仕例每給以半祿并賜縑帛麟德二年八月詔文官五品已上同武職班給仗身以掌閑幕士充之咸亨元年四月十二日停給乾封元年八月詔京文武官應給防閣庶僕俸料始依職事品其課及賜各依本品凢京文武正官每歳供給俸食等錢總十五萬二千七百二十貫員外官不在此數外官則以公廨田收及息錢等嘗食公用之外充月料先以長官定數其州縣少尹長史司馬及丞各减長之半大都督府長史副都督别駕及判司准上佐以職田數為加减其叅軍及博士判試判司主簿縣尉丞各三分之一諸内外員同正員者祿料賜會食料一事以上並同正員其不以同正員者祿賜食料亦同正員餘各給半職田並不給自乾元之後以常賦不給内外官俸祿各减其半矣内供俸及裏行不帶本官者祿俸食料防閤庶僕一事以上並同正官帶官者聽從多處給若帶外官者依京官給諸簡較及判試知試等官不帶内外者料度一事以上准員外官同正員例給若簡較及判試之處正官見闕者兼給雜用其職田不應入正官者亦給其侍御史殿中及監察御史知試並同供俸裏行例儀鳯三年八月詔廪食為費同資於上農歲俸所頒並課於編戸因地出賦則沃瘠未均據丁收物則勞逸不等俾之富教其可得乎永念於斯裁懐釐創如聞文武内外官應給俸料課錢及公廨料度封戸租調等逺近不均貴賤有異輸納簡選事甚艱難運送脚錢損費實廣公廨出舉廻易典吏因此侵漁撫字之方豈合如此宜令王公已下百姓已上率口出錢以充防閤庶僕邑士白直折衝府仗身并封戸内官人俸食等料既依户次貧富有殊載詳職務繁簡不類率錢給用須有等差宜具條例并各逐便中宗神龍二年七月制功臣叚志𤣥屈突通蕭瑀李靖秦叔寶長孫順德劉𢎞基宇文士及錢九隴程知節龎卿惲竇琮苑君墇李子和張平髙張公瑾梁雒仁安脩仁秦行師獨孤卿雲蘇定方李安逺鄭仁泰杜君綽李孟嘗等二十六家所食實封並依舊給景龍二年九月勑諸色應食實封家户一定已後不得輒有移改三年十月勑應食封邑者一百四十餘家應出封户凢五十四州皆天下膏腴物產其安樂太平公主封又取富戸不在捐免限百姓着封戸甚於征行册府元龜卷五百五
