body:
  text: 册府元龜卷五百二宋王欽若等撰邦計部平糴常平平糴孟子曰犬彘食人食而不知撿塗有餓莩而不知發蓋譏其不以法度簡斂也是知善為國者當平豐之嵗為㐫荒之儲所以順天道僃冦賊而紓農人務政本也夫世有饑穰天之行也邦之經費旣不可闕民之資奉於是乎在或上熟而不收惡嵗而亡僃烏謂夫能通其變者也若乃權其輕重制其物宜則平糴之法存焉所以上操其柄下得其利農夫不困國用常足者亦繇是焉古之知治道者常從事於斯矣歴代而下咸可述焉管仲齊大夫也桓公問於管子曰吾欲守國財而無稅於天下而因可乎仲對曰昔武王為巨橋之粟貴糴之數武王旣勝殷得巨橋粟欲使糴貴巨橋倉在廣平郡曲周縣立重泉之戍戍名也重文恭切假設此戍名欲人憚役而竟收粟也令曰民自有百皷之粟者不行民舉所聚粟以避重泉之戍而國糓二什倍巨橋之粟亦二什倍武王以巨橋之粟二什倍而市繒帛雜綵曰繒軍五嵗無藉衣於人以巨橋之粟亦二什倍而衡平也黄金終身無藉於人桓公又曰齊西水潦而民饑齊東豐庸而糴賤欲以東之賤被西之貴為之有道乎管子曰今齊西之粟釜五鏂為釜百泉則鏂二十也斗二升八合曰鏂烏侯切泉錢也齊東之粟釜十泉則鏂二錢也請以令籍人三十泉得以五糓菽粟决其籍若此則西出三斗而决其籍齊東出三釜而决其籍然則釜十之粟皆實於倉廪西之人饑者得食寒者得衣若此則東西之相被逺近之凖平矣君下令税人三十錢准以五糓令齊東之人納三釜以賑西之人則東西俱平矣管子智用無窮以區區之齊一匡天下本仁祖義成其覇業所行權術因饑而發非為常道也故别篇云偏行不去盡也桓公又曰糴賤寡人恐五糓之歸於諸侯寡人欲為萬人藏之為此有道乎管子曰今者夷吾道市有新成囷京者二家大囷曰京君請式璧而聘之式用也璧玉也聘問也使玉人刻石為璧尺者萬泉八寸者八千七寸者七千是也賜之以璧仍存問也行令半年萬人舎其業而為囷京以藏菽粟者過半魏文侯相李悝曰悝音魁糴甚貴傷人此人謂士工啇甚賤傷農人傷則離散農傷則國貧故甚貴與甚賤其傷一也善為國者使人無傷而農益勸今一夫挾五口理田百畮嵗收畮一石半為粟百五十石除十一之税十五石餘百三十五石食人月一石半五人終嵗為粟九十石餘有四十五石石三十為錢千三百五十除社閭常新春秋之祠用錢三百餘千五十衣人率用錢三百五人終嵗用千五百不足四百五十少四百五十不足不幸疾病死喪之費及上賦斂又未與此此農夫所以常困有不勸耕之心而令糶至於甚貴者也是故善平糴者必謹觀嵗有上中下熟上熟其收自四餘四百石平嵗百畝收百五十石今大熟四倍收六百石計人終嵗長四百石官糴二百石此為糴三舎一也中熟自三餘三百石自三四百五十石也終嵗長三百石官糴其二百石此為糴二而舎一下熟自倍餘百石自倍収三百石終嵗長百石官糴其五十石云下熟糴以謂中分百石之一小饑則收百石平嵗百畝之收收百五十石今小饑收百石收三分之二也中饑七十石收二分之一大饑三十石收五分之一也以此凖之大小中饑之率故大熟則上糴三而舎一中熟則糴二下熟則糴一使人適足價平則止小饑則發小熟之所斂官以斂藏出糶中饑則發中熟之所斂大饑則發大熟之所斂而糶之故雖遇饑饉水旱糶不貴而人不散取有餘以補不足也行之魏國國以富強晉武帝欲平一江表時榖賤而布帛貴帝欲立平糴法用布帛市糓以為糧儲議者謂軍資尚少不宜以貴易賤㤗始二年帝乃下詔曰夫百姓平豐則用奢㐫荒則窮匱是相報之理也故古人權量國用取贏散滯有輕重平糴之法理財均施惠而不費之善政者也然此事久廢天下希習其宜加以官蓄未廣言者異同財貨未能通逹其制更令國寳散於穰嵗而上不收貧弱困於荒年而國無僃豪人富商挾輕資藴重積以管其利故農夫苦其業而末作不可禁也今者省徭務本並力墾殖欲令農功益登耕者益勸而猶或騰踴至於農人並傷今宜通糴以充儉法主者平議具為條制然事竟未行南齊武帝永明五年詔曰善為國者使民無乏而農益勸是以十一而税周道克隆開建常平漢載惟穆岱畎絲枲浮汶來貢杞梓皮革必縁楚徃自水徳將謝喪亂彌多師旅嵗興饑饉代有貧室盡於課調泉貝傾於絶域軍國器用動資四表不因厥産咸用九賦雖有交貿之名而無潤私之實民咨塗炭實此之繇昔在開運星紀未周餘幣尚重農桑不殷於曩日粟帛輕賤於當年工商罕兼金之儲匹夫多饑寒之患良由圜法乆廢上幣稍寡所謂民失其資能無匱乎凢下貧之家可蠲三調二年京師及四方出錢億萬糴米糓絲綿之屬平和其價以優黔首逺邦常市雜物非土俗所産者皆悉停之必是嵗賦攸宜都邑所乏可見直和市勿使逋刻後魏鹿悆前廢帝普㤗中為右光禄大夫兼度支尚書河北五州和糴大使後周武帝建徳三年正月詔以徃嵗年糓不登民多乏絶令公私道俗凢有貯積粟麥者皆准口聽留以外盡糴唐則天證聖元年三月二十一日勑州縣軍司府官等不得輒取和糴物亦不得遣人替𤣥宗開元二年閠二月十八日勑年嵗不稔有無須通所在州縣不得閉糴各令當處長吏簡校十六年九月詔曰如聞天下諸州今嵗普熟糓價至賤必恐傷農加錢收糴以實倉廪縱逢水旱不慮阻饑公私之間或亦為便令所在以常平本錢及當處物各於時價上量加三五錢百姓有糴易者為收糴事須兩和不得限數配糴訖具所用錢物及所收糴物數具申所司仍令上佐一人專簡校二十五年九月戊子勑曰適變從宜有國常典恤人濟物為政所先今嵗秋苖逺近豐熟時糓旣賤則甚傷農事資均糴以利百姓宜令户部郎中鄭昉殿中侍御史鄭章於都畿據時價外每斗加三兩錢和糴粟三四百萬石所在貯掌江淮漕運固甚煩勞務在安人宜令休息其江淮間今年所運租停其闗輔委度支郎中兼侍御史王翼准此和糴粟三四百萬石應須舩運等即與所司審計料奏聞二十六年三月丙申勑曰如聞寧慶兩州小麥甚賤百姓出糴又無人糶衣服之間或慮難得宜令所司與本道支使計㑹每㪷加於時價一兩錢糴取二萬石變造麥飯貯於朔方軍城二十七年九月勑曰理國者在乎安人安人者在乎足食以古先哲后立法濟時使家有三載之儲國有九年之蓄雖遇水旱終保康寧則堯湯之代繇此道也朕以薄徳丕承睿圖身雖在於九重心每同於兆庶而微誠克遂上帝降祥今嵗物已秋成農郊大稔豈但京坻之積有同水火之饒宜因豐穰預為收貯濟人救乏孰先于兹宜令所司速計料天下諸州倉有不充三年者宜量取今年稅錢各委所繇長官及時每斗加於時價一兩錢收糴天寳四載五月詔曰如聞今載收麥倍勝常嵗稍至豐賤即慮傷農處置之間事資通濟宜令河南河北諸郡長官取當處常平錢於時價外㪷别加三五錢量事收糴大麥貯掌其義倉亦宜准此仍委採訪使勾當便勘覆具數一時録奏諸道有糧儲少處各隨土宜如堪貯積亦准此處分肅宗上元元年九月勑先縁諸道閉糴頻有處分如聞所在米粟尚未流通宜令諸節度觀察各於管内捉搦不得輒令閉糴代宗大歴八年十一月癸未勑度支江淮轉運三十萬石米價并脚價充闗内和糴時京師大稔糓價驟賤大麥斗至八錢粟斗至二十錢帝勤䘏萬姓思以贍之以每嵗漕輓四十萬石米至上郡乃量逺近費減至十萬石三十萬石米價充闗内近加價和糴以利闗中人權也庚子詔京官職田一切官為收糴令度支估以聞度支奏估直五萬貫詔加至八萬貫以來估時賤寵百官也九年五月庚申以時屬年豐理國之本莫先兵食乃詔度支支七十萬貫諸道轉運使支五十萬貫充和糴十一年六月十三日勑自今已後所在一切不得閉糴及隔截𣙜稅徳宗興元元年閠十一月詔曰江淮之間連嵗豐稔迫於供賦頗亦傷農收其有餘濟彼不足宜令度支於淮南浙東浙西道加價和糴米三五十萬石差官船運於諸處减價出糴貴從權便以利於人貞元元年正月詔諸州府不得輒有閉糴二年十月度支奏京兆河南河中同華陜虢晉綘鄜坊丹延等州府秋夏兩稅青苖等錢物悉折糴粟麥所在儲積以僃軍食京兆府兼給錢收糴每斗於時價外更加十錢納於大倉詔可其奏自是每嵗行之以贍軍國十一月度支奏請於京兆府明年夏秋稅二十二萬四千貫文又請度支給錢添成四十萬貫令京兆府今年内收糴粟麥五十萬石以僃軍食詔從之三年閠五月度支奏河南河中府及同華晉綘陜虢鄜坊丹延等州今年夏稅各送上都及留州留都府錢八十一萬貫請量取三十萬貫折糴豆麥等貯納仍委和糴使兵部郎中姚南仲勾當從之四年九月詔京兆府於時價外加和糴差清強官先給價直然後貯納續令所司自搬載送大倉並差御史訪察有違勑文當重科貶先是多被折物或估踰時價或先斂而不訓追集停擁割斂運納逺近怨苦故有是詔八年十月以西北邊糓賤詔令度支增價和糴以實邊儲凢積米三十三萬斛九年正月詔曰分災救患法有常規通商惠人國之令典自今宜令州府不得輒有閉糴仍委鹽鐡使及觀察使訪察聞奏十六年十月勑京兆府今年和糴粟一百萬數内宜减三十萬憲宗元和七年七月户部侍郎判度支盧坦奏今年冬諸州和糴貯粟澤潞四十萬石鄭滑易定各一十五萬石夏州八萬石河陽一十萬石太原二十萬石靈武七萬石振武豐州鹽州各五萬石凢一百六十萬以今秋豐稔必資蓄僃其澤潞石易定鄭滑河陽委本道差判官和糴各於時價每㪷加十文所兾人知勸農國有常備從之八年九月癸丑權判度支兵部尚書王紹奏請折糴粟京兆府二十五萬石同州五萬石華州三萬石陜州五萬石虢州三萬石河中府三萬石綘州二萬石河南府六萬石河陽節度管内十萬石准舊仍各於本州處中旬時估每㪷加饒五之一京兆府量加五之二以當府秋稅青苖錢折納仍委户部以不折估疋叚據數俱還從之穆宗長慶元年三月勑春農方興種植是切其京西京北和糴使宜勒停先是度支以邊儲無備請置和糴使經年無序徒擾邊人故罷之七月十八日大赦制近邊所置和糴皆給實價如聞頃來積弊頗甚美利葢歸於主掌善價不及於村閭或虗招以奉於強家或廣僦用盗於游客若不嚴約弊何可除宜委度支精擇京西京北應供軍糧并和糴院官并營田水陸轉運切加訪察仍作條流撿括速具奏聞四年七月乙丑丁卯勑近日訪聞京城米價稍貴須有通變以便公私宜令户部應給百官俸料其中一半合給疋段者廻給官中所糴粟每㪷折錢五十文其疋段委别收貯至冬糴粟填納大倉時人以為甚便九月詔於闗内及闗東折糴粟一百五十萬石用備饑歉其和糴價以户部錢充收貯畢日仍委戸部管繫尋常不得支用敬宗寶歴元年八月勑度支於兩畿及鳯州邠涇鄜坊同華河中陜州河陽等道共和糴折糴聚二百萬斛命祠部郎中崔忠信等分道主之以是嵗大稔故也十二月戊辰勑如聞河東振武今年熟令博糴米十萬斛搬送靈武收貯其價以户部錢充文宗太和三年九月詔以河南河北諸道頻年水旱重以兵役而徐汴管内遭水潦如聞江淮諸郡所在豐稔困於甚賤不免傷農州縣長吏茍思自便條約不令出界雖無嚴榜以避詔條而商旅不通米價懸異致令水旱之處種食無資昔春秋之時列國異政分災救患猶載册書况今朝典大行逺近一統禁錢閉糴具在赦文宜令御史臺諫御史一人於河南廵撿但每道每州界首物價不等米商不行即時潛有約勒不必更待文榜為驗便具事狀及本貫刺史縣令察判名聞如河南通商旅之後淮南諸郡米價漸起展轉連接之處直至江西湖南荆襄已來並須約勒依此舉勘聞奏仍各令觀察使審詳前後赦條與御史切加訪察不得容蔽四年七月甲子内出綾絹三十萬疋付户部充和糴八年八月戊申詔曰嵗有歉穰糓有貴賤權其輕重須使通流非止救災亦為利物同州諸縣至河中晉綘京西北豐熟之處宜令近京諸道許商興販徃來不得止遏開成元年閠五月己卯帝御紫宸殿謂宰臣曰京兆府請開場收麥何如李固言曰但優饒百姓則易糴今年百姓雖放兩稅亦須聽其收貯自為嵗計但情願出糴即加於時價收之鄭覃曰不強其所不欲加價收糴人自樂輸十月户部請和糴粟一百萬石三年九月丙辰朔中書門下奏請配諸道收糴粟一百萬石以備㐫年甲申詔令户部差官京西東都河中共糴粟六十萬石各於當處收貯以備水旱宣宗大中六年五月勑自收闗隴便討黨項邊境生人皆失活業連屬艱食遂不寧居兼軍儲未得殷豐切在多贍助今年京畿及西北邊稍似時熟即京畿人家競搬運斛斗入城收為蓄積致使邊塞粟麥依前踴貴兼省司和糴亦頗艱難其弊至深須有釐革其京西北今年夏秋斛斗一切禁斷不得令入京畿兩界其年六月勑近斷京兆北斛斗入京如聞百姓多端以麵造麴入城貿易所費亦多切宜所在嚴加覺察不得容許懿宗咸通七年八月户部奏請開和糴勑曰自數年江淮頗為饑歉今年稼穡稍似豐穰國家比為傷農是開和糴如聞積弊繼有多端善價不及鄉閭美利皆歸司局徒為名目不益公私委户部自此擇人深須峻法稍循前弊必罪所司史官曰和糴之文累朝承弊大和中華州刺史宇文鼎户部員外郎盧允中右司員外判户部姚康以分使和糴錢八萬貫其廵司李孚楊洵美各杖一百允中等悉配邊葢此法未得中也惟白居易元和時為右拾遺上疏論和糴事其理最當辭云臣伏見有司以今年豐熟請令畿内及諸州和糴將收錢糓當利農夫以臣所觀有害無利何者凢曰和糴是官出錢人出糓兩和商量然後交易也比來和糴事殊不然但令府縣之官散配人户促力程限嚴加徴催茍有稽遲即被捉搦迫蹙鞭撻甚於賦稅和糴之名乃為虗設故曰有害無利也今若有司出錢開塲自糴比於時價稍校饒利誘人人若見利自然逺近爭來利害之間可以比辨茍除前之弊行此之宜是眞得和糴利人之道也二端取捨伏惟聖㫖裁之必不得已即不如折糴者折青苖稅錢使直納斛㪷免令賤糴别納見錢在農人亦甚為利况度支和糴多是雜色疋帛百姓多須轉賣然將納稅錢至於給付不免侵牟貿易不免損折所失過半其弊可知今若量折稅錢納斛㪷既無賤糴粟米之費又無轉賣疋段之勞利歸於人美歸於上則折糴之便豈不昭然繇是而論則配户不如開塲和糴不如折糴亦甚明矣臣乆處村閭曾為和糴之户親被蹙迫實不堪命臣近為畿尉曾領和糴之司親自鞭撻所不忍覩臣頃者常疏此人病聞於天聰疎逺賤微無因上逹今幸居禁職列在諫官茍有他聞猶合諫獻况備諳此事深知此弊臣若緘黙隱而不言不惟上辜聖恩實亦下負夙願猶慮愚誠不至聖鑒未廻即望令左右可親信者一人潛問鄉園百姓和糴之與折糴孰利而與孰害乎則知臣言不敢茍耳或陛下以勑命已行難於移改以臣愚懇則又不然夫聖人之舉事也唯務便人唯求利物若損益相半則不必遷移若利害相懸則事須追改不獨於此其他亦然十月二十三日御史臺奏今後如有所在閉糴者長吏必加貶䧏本判官録事叅軍並停見任書下考仍勒所在州縣各於版牓冩録此條懸示百姓每道委觀察判官每州府委録事叅軍勾當逐月具不閉糴事繇申臺從之後唐莊宗同光三年閠十二月十九日勑今嵗自京已東水潦為患物價騰踴人户多於西京收糴斛㪷近聞京西諸道州府逐㪷皆有稅錢遂不通行乃同閉糴宜令各下京西諸道州府凢閉糴斛㪷不得輒有稅索及經過水陸闗坊鎭縣妄有邀詰四年正月壬戌詔曰輦轂之中郊甸之内時物踊貴人户饑窮訪聞自陜已西遐及邠鳯積年時熟百糓價和縱未能别備於貢輸亦宜廣通於和糴近聞輒有稅索已曾䧏勑指揮尚恐闗鎭阻滯行塗增長物價仰所在長吏切加撿御以濟徃來推救災䘏患之心明奉國憂人之道又京圻之内自張全義制置已數十年每聞開墾荒蕪勸課稼穡曾無歉嵗甚有餘糧公私貯蓄及多收藏未肯出糴更俟厚價頗失衆情宜令中書門下條流應在京及諸縣有貯斛㪷並令减價出糴以濟公私如不遵行即仰聞奏别具撿括仍委河南府切詳勑命處分明宗天成二年八月乙酉中書舎人張文寶上言今嵗時雨不愆秋苗倍熟應大熟處望下勑收糴以備歉嵗末帝清㤗元年七月詔鳯州禁糴出外界晉髙祖天福二年十一月大理少卿路阮上言臣聞却敵者兵強兵者食兵不強無以驅除禍亂食不足無以贍濟國家方今海内未平寰中多事制叛則必攻必討壯國在足食足兵臣伏見天下諸州府舊糓尚賤新糓又登旣漸豐饒例難糴貨臣請國家每隆大計須作預防時當小稔之年可設無窮之備伏請取天下州府錢帛數逐年支計外委逐處長吏於津要處差清白官收糴粟一色别厫積貯以備荒年若在豐穰之日未見優長如逢饑饉之時方明利濟疏奏不納時輦下養兵數廣於前衣食又倍之猶是合諸藩上供不足以充費間以畝稅並折徴縑帛倉廪曾無兼年之蓄至廢帝嗣位大蝗起率百姓口食天下一空俄致戎人南牧幸其國虛故也周太祖廣順元年四月勑天災流行分野代有茍或閉糴豈是愛人宜令㳂淮渡口鎭鋪不得止淮南人糴易三年七月勑㳂淮諸州㸃撿淮南人所糴糧食如是以驢騾為䭾及人負擔即仰放過不得以舟車輦運過淮先是淮南大旱井泉涸竭太祖愍之命許博糴至是閒呉人收糴入官以備軍食遂詔止輦運過淮常平夫嵗有㐫穰故糓有貴賤令有緩急則物有重輕始自列國李悝起平糴之法至於漢世壽昌建常平之制裁之得宜馭之有道雖復天災流行水旱作沴而糓有常價民無饑色其後迫於羣議乃從中輟永平之嵗遵用舊典市糴益賤廪庾充積既而罷焉晉氏之後南北更主或建置有初或評論靡决名稱之際因革或殊經制之方損益小異汔于隋室復有義倉社倉之名唐祚延乆條式咸著朱梁五代干戈未息楊雄奏議亦頗及之原其立法之意誠以均節貨幣之髙下防虞稼穡之豐歉調盈虛而御國用謹聚散而濟民命管子所謂多則賤寡則貴散則輕聚則重眞得治財之術哉夫為邦者不可以不務也漢宣帝五鳯中大司農中丞耿壽昌奏言故事嵗漕闗東糓四百萬斛以給京師用卒六萬人宜糴三輔𢎞農河東上黨太原郡糓足供京師可以省漕卒過半帝從之壽昌遂白令邊郡皆平倉以糓賤時增其價而糴以利農糓貴時减價而糴名曰常平倉以給北邊民便之帝廼下詔賜壽昌爵闗内侯元帝即位天下大水闗束尤甚二年齊地饑民多餓死諸儒多言常平倉可罷帝從其議後漢明帝即位天下安寧民無横徭嵗比登稔永平五年作常平倉立粟市於城東粟斛直錢三十府廪還積一云永平十一年明帝欲置常平倉公卿議者多以為便屯騎校尉劉般對以常平倉外有利民之名而内實侵刻百姓豪右因縁為奸小民不能得其平置之不便帝乃止晉武帝㤗始四年立常平倉豐則糴儉則賣以利百姓咸寧二年起大倉於城東常平倉於東西市宋沈曇慶為右丞時嵗有水旱曇慶議立常平倉以救民急太祖納其言而事不行南齊永明中天下米糓布帛賤武帝欲置常平倉市積為儲六年下詔兼尚書右丞李珪之等叅議出上庫錢五千萬於京師市米買絲綿綾絹布揚州出錢千九百一十萬南徐州三百萬各於郡所市糴南豫州二百萬市絲綿綾絹布米菽麥江州五百萬市米胡麻荆州五百萬郢州三百萬皆市絹綿布米大小豆大麥胡麻荆州米兼粳粟湖州二百萬市米布蠟同州二百五十萬西豫州二百五十萬南兖州二百五十萬雍州五百萬皆市絹綿布米南兖州兼大麥大豆使臺傳並於所在市易後魏孝文太和十二年詔羣臣求安民之術有司上言請折州郡常調九分之二京都度支嵗用之餘各立官司豐年糴貯於倉時儉則私之糶之於民如此民必相力田以買官絹貯錢以取官粟年登則常積嵗歉則直給帝覽而善之尋施行焉自此公私豐贍雖時有水旱不為患也二十年十二月置常平倉東魏孝静天平中常調之外隨豐稔各處折絹糴粟以充國儲於本州緣河津濟皆官倉貯積以擬漕運自是之後倉廪之實雖有水旱㐫饑之處皆仰開倉以振元元之衆北齊武成河清三年定令諸州郡常别置富人倉初立之日准所領中下户口數得支一年之糧逐當州糓價賤時斟量割當年義租充入糓貴下價糴之賤則還用所糴之物依價糴貯後周太祖初為魏相創制司倉掌辨九糓之物以量國用國用足蓄其餘以待㐫荒不足則止餘用用足則以粟貸人春頒之秋歛之隋開皇三年陜州置常平倉京師置常平監五年五月詔置義倉時度支尚書長孫平見天下州縣多罹水旱百姓不給奏令民間每秋家出粟麥一石以下貧富為差等儲之閭里以備㐫年名曰義倉因上書曰臣聞國以民為本民以食為命勸農重糓先王令軌古者三年耕而餘一年之積九年作而有三年之儲雖水旱為災而民無菜色皆繇勸導有方蓄積先備者也去年亢陽闗右饑餒陛下運山東之粟置常平之官開發倉廪普加賑賜大徳鴻恩可謂至矣然經國之道義資逺算請勅諸州刺史縣令以勸農積榖為務帝深嘉納自是州里豐衍民頼焉一云長孫平請令諸州百姓及軍人勸課當社共立義倉收穫之日隨其所得勸課出粟及麥於當社造倉窖貯之即委社司執帳簡㑹每年收積勿使損敗若時或不熟當社有饑饉者即以此糓賙給十五年以義倉貯在人間多有費損下詔曰本置義倉止防水旱百姓之徒不思久計輕爾費損於後乏絶又北境諸州異於餘處雲朔夏綏靈鹽簡豐鄴涼甘𤓰等州所有義倉雜種並納本州若人有旱歉少糧先給雜種及逺年粟十六年正月詔秦疊成康武文芳宕旭洮岷渭紀河廓豳隴涇寧原敷丹延綏銀扶等州社倉並於當縣安置二年又詔社倉准上中下三等税上户不過一石中户不過七斗下户不過四斗仁壽二年九月置常平官唐髙祖武徳元年九月四日令州縣始置社倉是年九月二十二日詔曰朕祗膺靈命撫字黎民方緝隆平躋之仁壽田畝之賦一切蠲除錙銖之律悉皆停斷是以特建農圃用督耕耘思俾齊民既庶且富鍾庾之量兾同水火宜置常平監官以均天下之貨市肆騰踴則減價而出田嗇豐羡則增價而收觸類長之去甚去㤗庶使公私俱濟家給人足抑止并兼宣通壅滯五年十二月廢常平監官太宗貞觀二年四月制天下州縣並置義倉先是每嵗水旱皆以正倉出給無倉之處就食他州百姓流移或致窮困左丞戴胄上言水旱㐫災前聖之所不免國無九年之儲蓄禮經之所明誡今喪亂以後户口凋殘每嵗納租未實倉廪隨即出給纔供當年若有㐫災將何賑賉故隋開皇立制天下之人節級輸粟名為社倉終於文皇得無饑饉及大業中年國用不足並取社倉之物以充官費故至末途無以支給請自王公以下爰及衆庶計所墾田稼穡頃畝每至秋熟准其見苗以理勸課盡令出粟稻麥之鄉亦同此稅各納所在為立義倉若年糓不登百姓饑饉所在州縣隨便取給太宗曰既為百姓預作儲貯官為舉掌以備㐫年朕非所須横生賦斂利民之事深是可行宜下所司議立條制至是户部尚書韓仲良奏王公已下墾地畝納二升其粟麥秔稻之屬各依土地貯之州縣以備㐫年制可之自是倉儲衍溢億兆頼焉十三年十二月十四日詔於雒相幽徐齊并秦蒲等州置常平倉高宗永徽二年閠九月初六日勑義倉據地稅子實是勞煩宜令衆户出粟率上上户五石餘各有差六年八月京西二市初置常平倉以大雨道路不通京師米貴顯慶二年十二月三日京西常平倉置平署官員自太宗以至高宗則天數十年間義倉不許雜用其後公私窮迫漸貸義倉支用自中宗神龍之後天下義倉費用殆盡𤣥宗開元二年九月詔曰天下諸州今年稍熟糓價全賤或慮傷農常平之法行自徃古茍絶欺隠利益實多宜令諸州加時價三兩錢糴不得抑斂仍交相付領勿許懸欠蠶麥時熟糓米必貴即令减價出糴豆等堪貯者熟亦宜准此以時出入務在利人江嶺淮浙劔南地皆下濕不堪貯積不在此例其常平所須錢物宜令所司支料奏聞並委長官專知改任日逓相付受且以天災流行國家代有若無糧儲之備必致饑饉之憂縣令親人風俗所繫隨當處豐約勸課百姓未辦三載之糧且貯一年之食每家别為倉窖非蠶忙農要之時勿許破用仍委刺史及按察使簡校覺察不得容其矯妄四年五月勑曰天下百姓皆有正條正租州縣義倉本備饑年賑給若縁官事便用還以正倉却塡近年已來每三年一度以百姓義倉造米逺送交納仍勒百姓私出脚錢即并正租一年兩度打脚雇男鬻女折舎賣田力極計窮遂即逃竄勢不獲已情實可矜自今已後更不得以義倉囘造已上道者不在停限以後若不熟之少者任所司臨時具奏聽進止其脚並以官物充六年三月詔曰徳惟善政政在養人必將厚生阜俗利物𢎞義朕奉若天命副膺王業思一物失所以百姓為心間者河北河南頗非善熟之人糧食固應乏少頃雖分遣使臣已領廵問猶慮鰥獨不能自存凢立義倉用為嵗備今舊糓向没新麥未登蠶月務困田家作苦不有惠恤其何以安宜問彼囷儲時令貸給况京坻轉積嵗月滋壊因而變造為利𢎞多將以散滯收贏理財均施所司明作條件俾便公私七年六月勑闗内隴右河東河北五道及荆揚襄河南䕫綿益彭蜀資漢劔茂等州並置常平倉其本上州三千貫中州二千貫下州一千貫每糴具本利與正倉帳同申十六年十月勑自今嵗普熟糓價至賤必恐傷農加錢收糴以實倉廪縱逢水旱不慮阻饑公私之間或亦為便宜令所在以常本錢及當處物各於價上量加三錢百姓有糴平易者收糴事須兩和不得限數配糴訖具所用錢物及所糴得物數具申所司仍令上佐一人專勾當二十九年制曰本制倉儲用防水旱朕每念黎庶常憂匱乏承前有遭損之州皆待奏報然始賑給近年亦分命使臣與州縣相知處置尚慮道路應逺徃復淹滯以此恤人何救懸絶自今已後若有損處應須賑給宜令州縣長官與採訪使勘㑹量事給訖奏聞朕當重遣使臣宣慰按覆天寶四載五月詔曰如聞今載收麥倍勝常嵗稍至豐賤即慮傷農處置之間事資通濟宜令河南河北諸郡長官取當處常平錢於時價外㪷别加三五錢量事收糴大麥貯掌其義倉亦宜准此仍委採訪使勾當便勘覆具數一時録奏諸道有糧儲少處各隨土宜如堪貯積亦准此處分六載三月二十二日太府少卿張瑄奏准四載五月八日并五載三月十六日勑節文至貴時賤價出糶賤時加價收糴若百姓未辦錢物者任准開元二十八年七月九日勑量事賖糴至粟麥熟時徴納臣使司商量且糶舊糴新不同别用其賖糶者至納錢日若粟麥雜種等時價甚賤恐更廻易艱辛請加價便與折納代宗廣徳二年正月諸道轉運使專判度支户部侍郎第五琦奏天下諸州望置常平倉及庫使司商量置本錢隨當處米物時價賤則加價收糴貴則减價糶賣徳宗建中元年七月勑夫常平者常使糓價如一大豐不為之减大儉不為之加雖遇災荒人無菜色自今已後忽米價貴時宜量出官米十萬石麥十萬石每日量付兩市行人下價糶貨三年九月户部侍郎趙贊上言曰伏以舊制置倉儲粟名曰常平軍興已來此事浸廢因循未舉垂三十年其間或因㐫荒流散餒死相食者不可勝紀古者平凖之法使萬室之邑必有萬鍾之藏千室之邑必有千鍾之藏春以奉耕夏以奉耘雖有大賈富家不得豪奪吾人者葢謂能行輕重之法也自陛下登極來許京城兩市置常平官糴鹽米雖輕頻年少雨米價不復騰貴此乃即日明驗實要推而廣之當軍興之時與承平或異事須兼儲布帛以備時須臣今商量請於兩郡并江陵成都揚汴蘇洪等州府各置常平輕重本錢上至百萬貫下至十萬貫隨其所宜量定多少唯貯斛㪷疋段絲麻等常候物貴則下價出賣物賤則加價收糴權輕重以利疲人從之贊於是條奏諸道津要都會之所皆置吏閲商人財貨計錢每貫稅二十文天下所出竹木茶漆皆十一稅之以充常平本時軍用稍廣常賦不足所稅亦隨得而盡終不能為常平憲宗元和元年正月制嵗時有豐歉糓價有重輕將備水旱之虞在權聚斂之術應天下州府每年所稅地子數内宜十分取二分均充常平倉及義倉仍各逐稳便收貯以時糴糶務在救人賑貸所宜速須聞奏六年二月制如聞京畿之内舊糓已盡宿麥未登宜以常平義倉粟二十四萬石貸借百姓諸道州府有乏少糧種處亦委所在官長用常平義倉米借貸淮南浙西宣歙等道元和二年四月賑貸並宜停徴容至豐年然後塡納十三年正月户部侍郎孟簡奏應天下州府常平義倉等斛㪷請准舊例减估出糶但以名數奏申有司更不收管州縣得專逹以利百姓從之穆宗長慶二年十月詔江淮諸州旱損頗多所在米價不免踊貴宜委淮南浙西浙東宣歙江西福建等道觀察使各於本道有水旱處取常平義倉斛㪷據時估减半價出糶以惠貧民四年三月制曰義倉之制其來日乆近嵗所在盜用没入致使小有水旱生人坐委溝壑永言其弊職此之繇宜令諸州録事叅軍專勾當茍為長吏迫制即許驛表上聞考滿之日户部差官交割如有欠負與减一選如欠少者量加一選欠數過多户部奏聞節級科處文宗太和七年八月詔曰如聞今嵗所在豐稔其義倉斛㪷先有借用處委户部勾當並須及時塡足八年九月詔淮江浙西等道仍嵗水潦遣殿中侍御史任畹馳徃慰勞以比年賑貸多為奸吏所欺徒有其名惠不及下宜委所在長吏以軍州自貯官倉米减一半價出糶務及貧弱如無貯蓄處即以常平義倉米糶田苗全損處全放其年青苖錢餘亦量議蠲减九年二月中書門下奏常平義倉本虞水旱以時賑䘏州府不詳文理或申省取裁或奏候進止自今已後應遭水旱處先據貧下户及鰥寡惸獨不濟者便開倉准元勑作等第賑貸訖具數申報有司如或水旱尤甚米麥翔貴亦任准元年勅或减價出糶熟時糴塡委諸道觀察使各下諸州重令知悉三月制曰朕以寡徳託於兆人之上雖兢兢業業思理不怠而政道多闕和氣用傷仍嵗水旱黎民艱食為之父母斯心鬱陶如聞魏博六州阻饑尤甚野無青草道殣相望及山南東道陳許鄆曹濮淮南浙西等道皆困於饑疫慮乏鍾餉其魏博宜賜粟五萬石山南東道陳許鄆曹濮等三道各賜糙米二萬石充賑給委度支逐便遣淮南浙西兩道委長吏以常平義倉粟賑賜應諸道有饑疫處軍糧積蓄之外其屬度支户部雜糓並令减價出糶以濟貧人其有宰牧非才貪殘為害及承前積弊須有條流或寃獄畱滯速宜疎决者並委觀察使糾察詳訪具狀聞奏用弭天眚以副朕焦勞之慮開成元年八月户部奏應諸州府所置常平義倉伏請起今後通公私田畝别納粟一升逐年添貯義倉斂之至輕事必通濟嵗月稍乆自致充盈縱逢水旱之災永絶流亡之慮勑從之十一月陳許觀察使杜悰奏陳許蔡三州常平義倉斛㪷除元數外當使添置粟一十萬石分貯三州以備水旱十二月鹽鐡轉運使奏據江淮留後盧鋼以江淮諸州人將阻饑請於來年運米數内量留收貯至春夏百姓饑乏之際减價出糶收其直待熟償之無損于官有利于人帝嘉之詔留常運米三十萬石宣宗以㑹昌六年即位五月赦節年常平義倉斛斗已出百姓太和中又於常數外每畝配率一升稱防災沴其所徴常平義倉正數都無商量如聞此色在諸州縣皆兩徴已困之人何堪重斂自今已後宜停徴太和中每畝率配之數仍令所在長吏分明曉示以絶奸欺大中六年四月户部奏天下州府收管常平義倉斛㪷今日已後如諸道應遭災荒水旱便委長吏清強官審勘如實是水旱處便任開倉先貧下不濟户給貸訖具數分析申奏并報臣本司切不得妄給與富豪人户其所使斛斗仍仰録事叅軍至當年秋熟後專勾當據數追收塡納不令違欠如州府無水旱妄有給使又不及時塡貯其録事叅軍本判官重加殿罰其長吏具衘奏聽進止所兾得濟疲民兼免欠闕從之後唐明宗天成二年六月中書舎人張文寳請復常平倉四年九月左補闕張昭逺奏切見今秋物價絶賤百姓隨地畝細配錢物名目多般皆賤糴供輸極傷農業既未能減放貯請加估折納斛斗稍便於民又國朝已來備㐫年之法州府置常平倉饑嵗以賑貧民請於天下最豐熟處折納斛斗以倉貯之依常平法出納則國家常有粟而民不匱也疏奏不報長興元年五月右司郎中盧導奏請置常平義倉以備㐫年漢隱帝乾祐二年太子詹事曹允昇上言國以民為本民以食為天時或水旱為災蟲蝗害稼既無九年之蓄寧救萬姓之饑天災流行古今代有而前代縱逢災歉免至流亡葢以分災恤民素有儲備臣請依古法置常平倉請於天下京都州府租賦五斛斗上每斗别納一升别倉貯積若㐫災之處出貸貧民豐年即納本數庶㡬生聚永洽綏懐册府元龜卷五百二
