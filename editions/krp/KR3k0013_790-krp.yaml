body:
  text: 册府元龜卷七百九十宋王欽若等撰總録部知幾第二呉魯肅臨淮東城人為袁術東城長肅見術無綱紀不足與立事乃攜老幼將輕俠少年百餘人南到居巢就周瑜瑜之東渡因與同行肅位至横江將軍石偉為光禄勲及孫皓即位朝政昏亂偉乃辭老耄痼疾乞身就拜光禄大夫晉阮籍初仕魏為尚書郎少時又以病免及曹爽輔政召為參軍籍因以疾辭屏於田里嵗餘而爽誅時人服其逺識文帝初欲為武帝婚於籍籍醉六十日不得言而止鍾㑹數以事問之欲因其可否而致之罪皆以酣醉獲免華表仕魏為㪚騎黄門郎中正元初石苞來朝盛稱髙貴鄉公以為魏武更生時聞者流汗沾背表懼禍作頻稱疾歸下舍故免於大難羊祐仕魏為黄門侍郎及陳留王立以少帝不願為侍臣求補吏徙秘書監武陵武帝時為吏部尚書左僕射開府陵以在魏已為大臣本非佐命之功數懐遜譲不得已而居位故在官職無所荷任夙夜思恭而已終始全潔當世以為美譚束晳為趙王倫相國記室晳辭疾罷歸教授門徒及倫誅獲免王衍素輕趙王倫之為人及倫簒位衍陽狂斫婢以自免後位至司徒潘尼為著作郎及趙王倫簒位孫秀專政忠良之士皆罹禍酷尼遂稱疾篤取假拜掃墳墓張翰字季膺呉郡人為齊王冏大司馬東曹掾冏時執權翰謂同郡顧榮曰天下紛紛禍亂未已夫有四海之名者求退良難吾本山林間人無望於時子善以明防前以智慮後榮執其手愴然曰吾亦與子採南山蕨飲三江水耳翰因見秋風起乃思呉中菰菜􅐜羹鱸魚鱠曰人生貴得適志何能覊宦數千里以要名爵乎遂命駕而歸著首丘賦俄而冏敗人皆謂之知幾顧榮字彦先呉人為齊王冏大司馬主簿冏擅權榮懼及禍終日昏酣不綜府事以情告友人長樂馮熊熊謂冏長史葛旟曰以顧榮為主簿所以甄㧞才望委以事機不復計南北親疎欲平海内之心也今府大事殷非酒客之政旟曰榮江南望士且居職日淺不宜輕代易之熊曰可轉為中書侍郎榮不失清顯而府更實才旟然之白冏以中書侍郎不復飲酒人或問之曰何前醉而後醒耶榮懼罪乃復更飲與州里楊彦明書曰吾為齊王主簿嘗慮禍及見刀與䋲每欲自殺但人不知耳及冏誅榮以討葛旟功封嘉興伯儲翜山甲切為冠軍參軍于時長沙王乂擅權成都河間阻兵於外翜知内難方作乃棄官避地幽州李産字子喬范陽人少剛勵有志永嘉之亂同郡祖逖擁衆部於南土力能自固産遂徃依之逖素好縱横弟約有大志産㣲知其㫖乃率子弟十數人間行還鄉里桑沖為黄門郎河間王顒執權引為司馬沖知顒必敗就職一旬便稱疾求退索紞字叔徹燉煌人明天文善術數占候司徒辟除郎中紞知中國將亂避世而歸鄉人從紞占問吉凶門中如市紞曰攻乎異端戒在害巳無為多事多事多患遂詭言虛説無驗乃止張載為中書侍郎載見世方亂無復仕進意遂稱疾篤告歸卒於家張協為河間内史在郡清簡寡欲于時天下已亂所在㓂盜協遂棄絶人事屏居草澤守道不競以屬咏自娯董養字仲道陳留浚儀人永嘉中雒城東北歩廣里中地陷有二鵞出焉其蒼者飛去白者不能飛養歎曰昔周時所盟㑹狄泉即此地也今有二鵞蒼者胡象白者國家之象豈可盡言乎顧謂謝鯤阮孚曰易稱知幾其神乎君等可深藏矣乃與妻荷擔入蜀莫知所終荀䆳為陳留相懐帝欲納邃女先徴為㪚騎常侍䆳懼西都危逼故不應命而東渡江元帝以為軍諮祭酒䆳為侍中與刁協婚親時協執權欲以邃為吏部尚書䆳深拒之尋而王敦討協協黨與並及於難唯䆳以疎協獲免陶臻侃之兄子江州刺史華軼表侃為揚武將軍使屯夏口又以臻為叅軍軼與元帝表不平臻懼亂作託疾而歸白侃曰華彦夏有憂天下之志而才不足且與瑯琊不平難將作矣侃怒遣臻還軼臻遂東歸於元帝帝見之大悦臻為叅軍衛玠懐帝末過江以王敦豪爽不羣而好居物上恐非國之忠臣求向建鄴玠卒於太子洗馬羊曼為王敦右長史敦既與朝廷乖貳覊録朝士曼知敦不臣終日酣醉諷議而已敦以其士望厚加禮遇不委以事故得不渉其難劉裔為吏部郎王敦素與裔交甚欽貴之請為右司馬裔知敦有不臣心託疾不視事以是忤敦意出為豫章太守辭以脚疾詔就家授印綬桓彛為尚書吏部即名顯朝廷于時王敦擅權嫌忌士望彛以疾去職阮裕為太宰掾大將軍王敦命為主簿甚被知遇裕以敦有不臣之心乃終日酣觴以酒廢職敦謂裕非當世實才徒有虛譽而已出為溧陽令復以公事免官由是得違敦難論者以此貴之郭文河内軹人隠居臨安結廬舍於山中臨安令萬寵迎置縣中及蘇峻反破餘杭而臨安獨全人皆異之以為知幾阮孚成帝初為丹陽尹時太后臨朝政出舅族孚謂所親曰今江東雖累世而年數實淺主幼時艱運終百六而庾亮年少徳信未孚以吾觀之將兆亂矣㑹廣州刺史劉顗卒遂苦求出王𨗳等以孚疎放非京尹才乃除都督交廣寜三州軍事鎮南將軍領平越中郎將廣州刺史假節未至鎮卒尋而蘇峻作逆識者以為知幾徐邈東筦姑幕人㑹稽王道子將用為吏部郎邈以波競成俗非己所能節制苦辭乃止後為中書侍郎領太子衛率宋羊欣為桓𤣥平西叅軍轉主簿叅預機要欣欲自疎時自漏宻事𤣥覺其此意愈重之以為楚臺殿中郎謂曰尚書政事之本殿中禮樂所出卿昔處股肱方此為輕也欣拜職少日稱疾自免何承天為桓偉叅軍時殷仲堪桓𤣥等互舉兵北向朝廷承天懼禍亂未已觧職還益陽王敬𢎞為桓偉安西長史南平太守去官居作塘縣界桓𤣥輔政及簒位屢召不下劉榮祖為輔國將軍時領將軍謝晦深接待之廢立之際要榮祖榮祖固辭獲免及晦出鎮州荆楚欲請為南蠻校尉榮祖又固止之晦果誅死顧覬之為䕶軍司馬時大將軍彭城王義康秉權與殷景仁有隙覬之不欲與景仁久接事乃辭脚疾自免歸在家每夜嘗於牀上行脚家人竊異之而莫曉其意後義康徙廢朝廷多以異同受禍覬之竟免張穆之為員外郎散騎侍郎與吏部尚書江湛太子左率袁淑善淑薦之于始興王濬濬深宏納焉穆之監其禍萌思違其難言于湛求外出湛將用為東縣固乞逺郡久之得為寧逺將軍交阯太守王秀之為桂陽王休範司空從事中郎秀之知休範將反辭疾不就江智淵為竟陵王誕從事中郎誕將為逆智淵悟其機請假先返誕事發即除中書侍郎南齊王儉初仕宋為司徒長史蒼梧暴虐儉憂懼告袁燦求出引晉新安主婿王獻之為呉興例補義興太守劉繪為豫章王嶷大司馬咨議嶷與文惠太子以年秩不同物論謂宫府有疑繪苦求外出為南康相後遷寧朔將軍行南徐州事梁王義師起朝廷以繪為持節督雍梁南北秦四州郢州之竟陵司州之隋郡諸軍事輔國將軍領寧蠻校尉雍州刺史固譲不就衆以朝廷昏亂為之寒心繪終不受東昏改用張欣泰梁宋史仕宋為皇太孫書記太孫即位多過失德史頗自疎得為秣陵令遷尚書都官即隆昌末少帝見誅寵舊多罹其禍唯史及傳昭以清正免傳昭幼孤為外祖所養宋司徒建安王休仁欲致昭昭以宋氏多故遂不徃齊永明初以昭為南郡王侍讀王嗣帝位故時臣𨽻爭求權寵唯昭及南陽宋史保身守正無所叅入竟不罹其禍王晏為太子中庶子世祖在東宫專斷朝事多不聞啓晏慮及罪稱疾自疎尋領射聲校尉不拜吕僧珍仕齊為羽林監東昏即位司空徐孝嗣管朝政欲與共事僧珍揣不久安竟弗徃時髙祖已臨雍州僧珍固求西歸陳謝貞為侍郎及始興王叔陵為揚州刺史引祠部侍郎阮卓為記室辟貞為主簿貞不得已乃行尋遷府録事叅軍領丹陽丞貞度叔陵將有異志因與卓日疎于王每有宴逰輙辭以疾未嘗叅預叔陵雅重之弗之罪也俄而叔陵作逆府僚多相連逮唯貞與卓獨不坐後魏車路頭為忠貞將軍明元性明察群臣多以職事遇譴至有杖罪故路頭優㳺不任事侍宿左右從容譚笑而已張湛仕沮渠䝉遜為兵部尚書凉州平入國崔浩識禮之每嵗贈浩嘗報答及浩被誅湛懼悉焚之閉門却掃慶弔皆絶以夀終胡叟初在凉州沮渠牧犍遇之不重叟亦本無附之之誠乃以為詩示所知廣平程伯逺其略曰羣犬吠新客佞闇排疎賔直塗既已塞曲路非所遵望衛怨祝佗聘楚悼靈均何用宣憂懐託翰寄輔仁伯逺見詩謂吏曰凉州雖地居戎域然自張氏以來號有華風今則憲章無虧曷祝佗之有叟曰古人有言君子聞􅎏皷之聲則思戰爭之士貴主奉正朔而不淳慕仁義而未允地僻陋而僭徽號居小事大豈若茲乎徐偃之轍故不旋踵矣吾之擇人夙在大魏與子蹔違非久濶也嵗餘牧犍破降叟既先歸國朝廷以其識機拜武威將軍賜爵始復男陸旭孝文時為散騎常侍知天下將亂遂隠于太行山孝莊即位屢徴不起茹晧宣武時與趙修同侍直禁中為修所忌尋遷濮陽太守晧忻然而去内不以疎外為慼及趙修等敗竟獲全免穆紹宣武時為侍中謝事還家詔諭久乃起除車騎大將軍開府定州刺史固辭不受又除侍中託疾不起河隂之役故得免害北齊魏収初仕後魏為中書舍人時孝武猜忌神武内有間隙收遂以疾固辭而免其舅崔孝芬恠而問之収曰懼有晉陽之甲尋而神武南上帝西入關李愍初仕後魏安樂王元鍳表授武騎常侍時陽平以北皆為賊有鑒命愍討之頗有斬獲及鑒謀逆愍乃詐患風鑒信之因此得免李渾初仕後魏為給事中時四方多難乃謝病求為青州征東府司馬與河間邢邵北海王昕俱奉老母携妻子同赴青齊未幾而爾朱榮入雒衣冠殱盡論者以為知幾李曉仕魏為員外侍郎爾朱榮之害朝士曉時衣冠為䑕所噬不成行得免河隂之難及遷都鄴曉便寓居清河託從母兄崔悛宅給良田三十頃曉遂築室安居訓朂子姪無復宦情武定末以世道方泰乃入都從仕除頓丘守叱列平初仕後魏為右衛將軍時爾朱氏凌替平嘗慮危禍㑹神武起義平鄴破四胡於韓陵仲逺既走以平為東郡大行臺平鑒為開府儀同三司時和士開以佞幸勢傾朝列令人求鑒愛妾劉氏鑒即送之仍謂人曰老公失阿劉與死何異要自為身作計不得不然由是除齊州刺史後周黎季明初仕後魏為歩兵校尉及孝武西遷季明乃寓居伊雒侯景狥地河外召季明從軍除黎陽郡守季明從至懸瓠察景終不足恃遂去之客於潁川以世路未清欲優逰卒嵗時王思政鎮潁川累使召季明不得日出與相見留於内館月餘太祖又徴之遂入關髙賔初仕東魏後棄家歸闕太祖嘉之授安東將軍及明帝初除咸陽郡守政存簡惠甚得民和帝聞其能賜田園於郡境賔既覊旅歸國親屬在齊嘗慮見疑無以取信乃於所賜田内多將竹木盛搆堂宇并鑿池沼以環之有終焉之志朝廷以此知無二焉柳機為御正大夫宣帝失徳屢諌不聽恐禍及已託於鄭譯隂求出外於是拜華州刺史隋蘇威周度支尚書美陽公綽子也威周為郡功曹大冡宰宇文䕶見而禮之以其女新興主妻焉威見䕶專權恐禍及已逃入山中為叔父所逼卒不獲免然每屏居山寺諷讀為娛未幾授持節車騎大將軍儀同三司改封懐道縣公武帝親總萬幾拜稍伯下大夫前後所授並辭不拜梁睿為益州總管既平王謙自以威名太盛時髙祖總百揆恐為所忌遂大受金賄以自穢由是勲薄多不實詣朝堂稱屈者前後百數帝令有司案驗其事主者多獲罪睿惶懼上表陳謝歸大理帝慰諭遣之王世積為上柱國見髙祖性忌刻功臣多獲罪由是縱酒不與執政言及時事髙祖以為有酒疾舍之宫内令醫者療之世積詭稱疾愈始得就第裴矩為右光禄大夫從煬帝在江都時四方盜賊蜂起而驍衛大將軍屈突通敗問至矩以聞帝失色矩素勤謹未嘗忤物又見天下方亂恐為身禍其待遇人多過其所望皆得其歡心唐竇威初仕隋為蜀王秀記室以秀行事多不法稱疾還田里及秀廢黜府僚多獲罪唯威以先見保全李百藥初隋太子舍人東宫學士或有譖百藥者懐不自安乃託疾免去徐文逺隋末為越王侗國子祭酒為李宻軍所執其後復入東都王世充給其廩食而文逺進見之先拜或問曰聞君踞見李宻而敬王公何也答曰李宻君子也能受酈生之揖王公小人也有殺故人之義相時而動豈不然歟杜楚客右僕射如晦之弟武徳中見其兄為太宗所任隠太子尤忌之楚客恐禍及已遂隠於嵩山後為工部尚書坐事貶䖍化令卒尉遲敬徳貞觀中累遷開府儀同三司封鄂國公末年静居間處修理池臺嘗奏清商樂一部厚自奉養不與外人交權臯為貝州臨清尉𤣥宗天寳中安禄山以幽州長史充河北按察使假其才名署從事臯隂察禄山有異志畏其猜虐不可以潔退欲潛去又慮禍及老母天寳十四年禄山使臯獻戎俘自京師還過福昌福昌尉仲謩臯從父妹婿也密以計約之比至河陽詐以疾亟召謩謩至臯示已喑瞪謩乃勉哀而哭手自唅襲既逸臯而葬其棺人無知者從吏以詔書還臯母初不知聞臯死慟哭傷行路禄山不疑其詐死許其母歸臯時㣲服匿跡候母於淇門既得侍其母乃奉母晝夜南去及渡江禄山已反矣由是名聞天下孔巢父𤣥宗天寳末隠於徂徠山永王璘起兵江淮聞其賢以從事辟之巢父知其必敗側身潛遁由是名位至給事中張孝忠徳宗貞元中事李寳臣為易州刺史後寳臣疑忌殺大将李獻誠等四五人使召孝忠曰將無状聮頸受戮孝忠懼死不敢徃亦不敢叛猶公之不覲於朝慮禍而已無他志也孝節泣曰兄之不行吾歸死矣孝忠曰偕則併命吾留若無患也及歸果安孝忠後為横海軍節度使田𢎞正貞元中為魏博衙内兵馬使時節度使田季安唯務侈靡不恤軍務屢行殺罰宏正每從容規諷軍中甚頼之季安以人情歸附乃出為臨清鎮將欲捃摭其過害之𢎞正假以風痺請告炙灼滿身季安謂其無能為李紳元和初為國子助教非其好也東歸金陵觀察使李錡愛其才辟為從事紳以錡所為專恣不受其書幣錡怒將殺紳遁而獲免錡誅朝廷嘉之後唐張全義為忠武軍節度使自昭宗文徳元年以後託附梁祖垂三十年初梁祖猜忌元勲舊將多遭屠戮唯全義卑身曲事所有家財率先納賂自栢鄉喪師後全義每月獻馬鎧仗以補其軍兵儲稍乏則入粟為助梁祖季年欲害全義者數四以服勤盡瘁無以加諸而止許寂少有山水之好久棲四明山不干時譽昭宗聞其名徴赴闕召對於内殿㑹昭宗方與伶人調品篳篥事訖方命坐賜湯果問易義既退寂謂人曰君在滛聲不在政矣寂聞君人者將昭徳塞違以臨照百官或象之今不厭賤事在自求其工君道替矣尋請還山後為工部尚書致仕晉張筠為興元節度罷居雒下表乞歸咸陽俄而雒下有張從賔之亂獨免其難人咸謂筠有五福之具焉周王樸漢乾祐中擢進士第依樞宻使楊邠館於第是時漢室寖亂大臣交惡樸度其必危困乞告東歸未幾李業軰作亂害邠等三族凡遊其門下者多被其害而樸獨免後位至樞宻使册府元龜卷七百九十
