body:
  text: 册府元龜卷三百八十四宋王欽若等撰將帥部褒異第十隋慕容三藏開皇中為開府儀同大將軍副行軍總管韋洸討嶺南酋長王仲宣以功授大將軍賜奴婢百口加以金銀雜物魚俱羅為大都督從晉王平陳以功拜開府賜物一千五百段未㡬沈𤣥懀高智慧作亂江南楊素以俱羅壯勇請與同行每戰有功加上開府高唐縣公又與素擊突厥以功進位柱國張定和為驃騎將軍從上柱國李充擊突厥先登陷陣虜刺之中頸定和以草塞瘡而戰神氣自若虜遂敗走高祖聞而壯之遣使者齎藥馳詣定和所勞問之進位柱國封武安縣侯賞物二千段良馬二匹金百兩張奫自高祖作相授大都督領鄉兵賀若弼之鎭夀春也常為間諜平陳之役頗有功焉進位開府儀同三司封文安縣子邑八百戸賜物二千五百段粟二千五百石歳餘率水軍破逆賊笮子㳺於京口薛子建於和州徵入朝拜大將軍高祖命昇御座而宴之謂奫曰卿可為朕兒朕為卿父今日聚集示無外也後賜綺羅千匹綠沉甲獸文具裝㝷從楊素征江表别破高智慧於㑹稽呉世華於臨海進位上大將軍賜奴婢六十口縑綵三百疋開皇十八年為行軍總管從漢王諒征遼東諸軍多物故奫衆猶全高祖善之賜物二百五十段郭衍周武帝時為大將軍從武帝與齊主大戰於晉州追齊師至高壁敗之仍從平并州以功加開府武安縣公邑一千二百户尉遲逈之起擊其餘黨於濟北累戰破之超上柱國封武山郡公賞物七千段李圓通領左翊衛驃騎將軍伐陳之役以行軍總管從楊素出信州道以功進位大將軍進封萬安縣侯王韶為軍正周武帝既拔晉州意欲班師韶諫止及平齊氏以功進位開府封晉陽縣公邑五百户賜口馬雜畜以萬計高祖受禪累加大將軍晉王之鎮并州也除行臺右僕射賜綵五百匹平陳之役以本官為元帥府司馬及尅金陵進位柱國賜奴婢三百口棉絹五千段史祥為左衛將軍煬帝即位漢王諒發兵作亂遣其將綦良自滏口狥黎陽塞白馬津余公理自太行下河南帝以祥為行軍總管皆大破之進位上大將軍賜縑綵七千段女妓十人良馬二十匹轉太僕卿祥從征吐谷渾率衆出間道擊虜破之俘男女二千餘口賜奴婢六十人馬二百匹進位左光禄大夫拜左驍衛將軍楊義臣高祖仁夀初拜為朔州總管賜以御甲煬帝嗣位漢王諒作亂代州總管李景為諒將喬鍾葵所圍詔義臣救景義臣與戰破之以功進位上大將軍賜物二千段雜綵五百疋女妓十人良馬二十匹來䕶兒為上開府從楊素破高智慧盛道延進位柱國封永寧郡公高祖嘉其功使畫工圖其像以進尋詔追入朝賜以宫女寶刀駿馬錦綵等物煬帝時為左驍衛大將軍煬帝大業六年從駕江都賜物千段令上先人冢宴父老州里榮之陳稜為東萊留守楊𤣥感之亂也稜率兵至江都襲破彭城賊帥孟讓以功進位光禄大夫賜爵信安侯及煬帝幸江都遣稜率宿衛兵擊李子通徃見克捷超拜左禦衛將軍王辯為車騎將軍煬帝初漢王諒之作亂也從楊素討平之賜爵武寧縣男邑三百户遼東之役以功加通議大夫尋遷武賁郎將及上谷魏刀兒刼掠燕趙帝引辯升御座問以方畧辯論取賊形勢帝稱善於是發從行步騎三千擊敗之賜黄金二百兩渤海賊帥高士達自號東海公衆以萬數辯擊之屢挫其鋭帝在江都宫聞而馳召之及引見禮賜甚厚復令徃信都經略士達於是復戰破之優詔褒顯之周羅㬋初仕陳宣帝為使持節都督霍州諸軍事平山賊十二洞除右將軍始安縣伯邑四百户總檢校揚州内外諸軍事賜金銀三千兩高祖時從楊素擊突厥大破之進位大將軍煬帝即位授左武侯大將軍漢王諒反詔赴楊素討平之進授上大將軍段文振初仕後周為中外府兵曹從武帝攻齊晉州下之賜物千段授上儀同進平鄴都又賜綺羅二千疋開皇末為太僕卿越嶲蠻叛擊平之賜奴婢二百口煬帝時為兵部尚書從征吐谷渾以功進位右光禄大夫後為左候衛大將軍卒贈光禄大夫尚書左僕射北平侯賜物一千段粟麥二千䂖威儀鼓吹送至墓所宇文述周武帝時為英果中大夫高祖為丞相尉遲迥作亂以行軍總管擊其將李懏破之及平尉遲迥毎有戰功超拜上柱國進爵褒國公賜縑三千疋開皇初拜右衛大將軍平陳之役以行軍總管率衆擊陳軍大敗之吴㑹悉平以功賜物三千段拜安州總管開皇末為太子左衛率煬帝嗣位拜左衛大將軍三年加開府儀同三司毎元㑹冬正朝㑹輒給鼓吹一部大業中征高麗為扶餘道將軍臨發帝謂述曰禮七十者行役以婦人從公宜以家累自隨古稱婦人不入軍謂臨戰時耳至於營壘之間無所傷也項籍虞姬即其故事周法尚為巴州刺史破三鵶叛蠻復從柱國王誼擊走陳冦遷衡州總管四州諸軍事改封譙郡公邑二千户高祖幸雒陽召之及引見賜金鈿酒鍾一雙綵五百段良馬十五疋奴婢三百口給鼓吹一部法尚固辭帝曰公有大功於國特給鼓吹者欲令公卿知朕之寵公也伐陳之役以行軍總管𨽻秦孝王率舟師擊破其城州刺史熊門超擒於陣轉鄂州尋遷永州總管安集嶺南賜縑五百段良馬五百疋仍給黄州兵三千五百人為帳内又降斬陳桂州刺史錢季卿等賜綵五百段奴婢五十口并銀甕寶帶良馬十匹又為嶺南安撫大使後數年入朝以本官宿衛賜綵三百段米五百石絹五百疋未㡬與上柱國王世積討平桂州李光仕賜奴婢百五十口黄金百五十兩銀百五十斤仁夀中遂州獠叛復以行軍總管討平之嶲州烏蠻反詔法尚擊破之賜奴婢百口物三百段蜀馬二十匹煬帝時拜左武衛將軍賜良馬一匹絹三百疋又擊破黔安夷向思多還從討吐谷渾逐捕亡散至于青海賜奴婢一百口物三百段馬七十匹又領會寧太守遼東之役以舟師指朝鮮道㑹楊𤣥感反與將軍宇文述等破之以功進右光祿大夫賜物九百段又撃齊盜王薄孟讓等每挫其鋭賜奴婢百口王仁恭為車騎將軍從楊素擊突厥於靈武以功拜上開府賜物三千段以驃騎將軍典蜀王軍事山獠作亂蜀王命仁恭討破之賜奴婢三百口煬帝嗣位漢王諒舉兵反從楊素擊平之以功進位大將軍拜吕衛二州刺史賜帛四千匹女妓十人遼東之役仁恭為將軍及帝班師仁恭為殿遇賊擊走之進授光禄大夫賜絹六千段馬四十匹明年復為前軍賜良馬十匹黄金百兩仁恭遂進軍至新城賊數萬背城結陣仁恭擊破之帝聞而大悦遣舎人詣軍勞問賜以珍物進授光禄大夫賜絹五千匹董純仕周為典馭下大夫從武帝平齊以功拜儀同進爵大興縣侯増邑通前八百户高祖受禪累遷驃騎將軍後以軍功進位上開府開皇末以勞舊拜左衛將軍煬帝初漢王諒作亂并州以純為行軍總管河北道安撫副使從楊素擊平之以功拜柱國進爵為郡公増邑千户轉左驍衛將軍賜女妓十人縑五千疋趙才為右驍衛將軍從煬帝征吐谷渾以行軍總管率衛尉卿劉權兵部侍郎劉雅等出合河道與賊相遇擊破之以功進位金紫光祿大夫李子雄為帥都督時高祖作相從韋孝寛破尉遲迥於相州拜上開府賜爵建昌公高祖受禪為驃騎將軍伐陳之役以功進位大將軍焬帝初漢王諒之作亂也子雄授上大將軍力戰破之遷幽州總管趙元淑為驃騎將軍煬帝嗣位漢王諒作亂元淑從楊素擊平之以功進位柱國拜德州總管裴仁基開皇中為親衛平陳之役先登陷陣拜儀同賜物千段以本官領漢王諒府親信煬帝時為武賁郎將從將軍李景討叛蠻向思多於黔安以功進位銀青光祿大夫賜奴婢百口絹五百疋唐李高遷為右三統軍從高祖平霍邑圍京城力戰功最累遷左武衛大將軍封江夏郡公檢校西麟州刺史錢九隴為左監門郎將從高祖平薛仁杲劉武周以前後戰功累遷右武衛大將軍又從太祖擒竇建德平王世充從隱太子討劉黒闥於魏州力戰破賊策勲為最累封郇國公樊興為右監門將軍從太宗破薛舉平王世充竇建徳積戰功累封營國公賜物二千段黄金三十錠公孫武達為檢校右監門將軍肅州刺史擊斬突厥於張掖河太宗璽書慰勞拜左監門將軍又授詔擊鹽州叛突厥餘黨㡬盡進封東萊郡公張長遜武德初為五原太守及征薛舉長遜不待命而至以功拜豐州總管進封巴國公邑三千户賜以錦袍後為右武候將軍屬有疾高祖親幸其第以視之其見重如此唐儉自太宗為渭北道行軍元帥以儉為司馬平京城加光禄大夫長孫順德自高祖起義兵拜統軍從平霍邑破臨汾下綘郡俱有戰功尋與劉文靜擊屈突通執通歸京師仍略定陜縣高祖即位拜左驍衛大將軍封薛國公武德九年與秦叔寶等討建成餘黨於𤣥武門太宗踐阼眞食千二百户特賜以宫女殷嶠字開山太宗為渭北道元帥引為長史與統軍劉宏基率兵長安城隋將衛孝節自金光門出戰嶠與宏基擊破之京城平賜爵陳郡公武德二年兼陜東道大行臺兵部尚書從太宗討平王世充以功進爵鄖國公復從征劉黒闥道病卒太宗親臨䘮哭之甚慟贈陜東道大行臺右僕射柴紹為右領軍大都督府長史大軍發晉陽兼領馬軍總管及義師至霍邑紹力戰宋老生有功下臨汾平綘郡並先登陷陣授右光祿大夫武德元年累遷左翊衛大將軍尋從太宗平薛舉破宋金剛攻平王世充於雒陽擒竇建德於武牢封霍國公賜實封千二百户貞觀元年拜右衛大將軍二年擊梁師都於夏州平之轉左衛大將軍七年加鎭軍大將軍行右驍衛大將軍改封譙國公十二年寢疾太宗親自臨問尋卒贈荆州都督馬三寶為太子監門率别擊叛胡劉拔眞於北山破之又從平薛仁杲遷驍衛將軍後從柴紹擊吐谷渾於岷州前後虜男女數千口累封新興縣公屈突通初為太宗行軍元帥長史從平薛舉特賜金銀六百兩綵物一千段尋以本官判陜東道行臺僕射及大兵圍雒陽竇建德且至太宗中分麾下以屬通令與齊王元吉圍守雒陽世充平通功為第一尋拜陜東大行臺右僕射姜行本為左屯衛將軍高昌之役以行軍副總管率衆先出伊州遂與侯君集進平高昌璽書勞之進封金城郡公賜物一百五十段奴婢七十人後從太宗征高麗至蓋牟城中流矢卒太宗賦詩以悼之贈左衛大將軍鄜國公陪𦵏昭陵竇軌武德初為秦州總管時赤排羌冦漢中軌與賊連戰皆捷餘黨悉降進封鄼國公竇琮初為高祖大將軍府統軍從平西河破霍邑拜金紫光禄大夫封扶風郡公與段志𤣥等力戰隋大軍潰進兵東略下陜縣収太原拜左領軍大將軍賜物五百段武德初以元謀之勲特恕一死拜右屯衛大將軍復轉為左領軍時將圍雒陽遣琮留守陜城以督糧運王世充遣其驍將羅士信來斷糧道琮潛使人説以利害士信遂帥衆降及從平東都賞物一千四百段後以本官檢校晉州總管尋從隱太子討平劉黒闥以功封譙國公賞黄金五十斤竇抗為左武侯大將軍從太宗平薛舉勲居第一又從征王世充及東都平册勲太廟者九人抗與從弟軌俱預焉朝廷榮之賜女樂一部金寶萬計竇璡為民部尚書從太宗平薛仁杲以功特賜錦袍尋鎭益州李孝常隋末為華隂令率兵守永豐倉隂圖附義以倉城來䧏拜為左衛大將軍從平薛仁杲力戰有功高祖又念以其倉歸義手勑褒美進爵義安王邑三千户著屬籍宗正高祖臨朝毎賜同榻而坐其寵遇如此牛進達為左武衛將軍從侯君集為交河道總管征高昌有功累封琅邪公賜物一千三百段李思摩為右武衛將軍從征遼東為流矢所中太宗親為吮血其見顧遇如此未㡬卒於京師贈兵部尚書夏州都督賜東園秘器陪𦵏昭陵為冢像白道山任依蕃法燒訖然後𦵏王君廓為右領軍鎭幽州㑹突厥入冦君廓邀擊破之俘斬二千餘人獲馬二十匹高祖聞而大悦止之入朝賜以御馬令於殿庭乗之而出又謂侍臣曰吾聞相如叱秦王目眥出血君廓往擊竇建德將出戰徐勣遏之君廓發憤大呼目及鼻耳一時流血此之壯氣何謝古人不可以常例賞之復賜紫袍金帶竇靜為夏州都督値突厥攜貳諸將出征多詣其所靜知虜中虛實潛令人間其部落郁射所部鬰孤尼等九俟斤並率衆歸欵太宗稱善賜馬百匹羊千口李大亮為安州刺史高祖令徇廣州以東行次九江㑹輔公祏反大亮以計擒公祏將張善安公祏尋遣兵圍猷州刺史左難當嬰城自守大亮率兵進拔擊賊破之以功賜奴婢百人大亮謂曰汝輩多衣冠子女破亡至此吾亦何忍以汝為賤𨽻乎一皆放遣高祖聞而嘆異復賜僮婢二十人及討吐谷渾以大亮為河東道行軍總管與大總管李靖等出北路涉青海歴河源遇賊於蜀渾山接戰破之俘其名王雜畜萬計以功進爵為公賜物千段奴婢一百五十人李靖為行軍總管兼攝趙郡王孝恭行軍長史高祖以孝恭未更戎旅三軍之任一以委之擊蕭銑以功授上柱國封永康縣公賜物二千五百段又為嶺南道撫慰大使檢校桂州總管時輔公祏於丹陽反詔孝恭為元帥靖為副以討之江南悉平於是置東道行臺拜靖行臺兵部尚書賜物千段奴婢百口馬百匹及突厥冦太原以靖為行軍總管尋檢校安州大都督高祖每云李靖是蕭銑輔公祏膏肓古之名將韓白衛霍豈能踰之太宗嗣位拜刑部尚書並録前後功賜實封四百户又為代州道行軍總管進擊定襄破之以功進封代國公賜物六百段及名馬寶器貞觀初妻亡有詔墳塋制度依漢霍光故事象燕然及積石山以旌殊績靖有疾太宗親幸第流涕謂曰公是朕平生舊交又於國有大功忽聞疾病深以為憂賜絹一千匹及薨册賜司徒幷州都督給班劒四十人羽葆鼓吹陪𦵏昭陵張儉為營州都督兼䕶東夷校尉太宗將至遼東拜行軍總管進渡遼趨建安城賊徒大潰以功累封皖城郡公賞賜甚厚郭孝恪為安西都䕶㑹焉耆王與西突厥通親相為唇齒進貢希至孝恪表請擊之太宗許焉以孝恪為西州道行軍總管虜其王齒龍突騎支而還太宗嘉其逺立殊功遣使優勞加勲十一轉程務挺為雒州刺史從太宗平劉黒闥以功拜營州都督府長史封東平郡公賜物二千段黄金三百兩段德操為左武衛將軍延州道行軍總管以功拜柱國爵為郡公邑千戸賜以貂裘金帶布帛千匹姜確為左屯衛將軍征遼行軍總管攻蓋牟城中流矢卒太宗甚哀悼為五言詩以傷之時人榮之賜東園秘器陪𦵏昭陵墳高六丈王君愕為左武衛將軍從征遼戰傷還卒於營太宗深痛悼之賜東園秘器陪𦵏昭陵墳高六丈劉贍為浩州刺史時劉武周連年為冦鄰城多陷賊數攻之輒為贍所敗及裴寂之敗也晉州以北連城悉陷唯贍獨守李仲文以兵保之二人並力拒戰賊來攻之輒挫其鋭及太宗復幷州高祖遣使勞苦之賜帛三萬疋米麥千䂖頒其將士李君羨少以勇氣聞從太宗破宋金剛以功授上柱國驃騎將軍加賜牛馬錦帛及宫人拜左衛府中郎將突厥來至渭橋君羡與尉遲敬德等大破其衆太宗謂之曰盡如我君羡用心國賊亦何憂改授左武候中郎將封武連縣公蘇定方貞觀初為匡道府折衝隨李靖襲突厥頡利于磧口為前鋒悉降之軍還授左武候中郎將高祖時為行軍總管征賀魯擒之以功遷左驍衛大將軍封邢國公俄有思結闕俟斤都曼先鎭諸胡擁其所部及疎勒朱俱般蔥嶺三國復叛詔定方為安撫大使率兵討之都曼面縛出䧏蔥嶺已西悉定以功加食邑邢州鉅鹿眞邑五百戸顯慶五年從幸太原制授熊津道大總管率師討百濟平之賞賜珍寶不可勝計俄遷左武衛大將軍乾符二年卒褒贈幽州都督尉遲敬德為右府統軍從太宗擊王世充於東都世充驍將單雄信領騎直趨太宗敬德翼太宗以出賊圍賜金銀各一篋恩盻日隆又從破徐圓朗累有戰功授秦王府左二副䕶軍敬德歴鄜夏二州都督封鄂國公後解職顯慶中卒高宗舉哀於東雲龍門廢朝三日詔京官朝集使五品以上并赴宅哭仍遣黄門侍郎劉祥道持節賫璽書徃弔贈司徒幷州都督所司備禮册命給班劒三十人及羽葆鼓吹薛仁貴自太宗遼東之役以勇敢聞擢授㳺擊將軍雲泉府果毅仍令北門長上并賜生口十人高宗顯慶二年詔仁貴副程名振於遼東經略破高麗以功封河東縣男尋又領兵擊九姓突厥於天山將行高宗内出甲令試之仁貴射五重高宗大驚更取堅甲以賜之時九姓有衆十餘萬來挑戰仁貴擒其偽葉䕶兄弟三人而還乾封初高麗内附仁貴擊敗其餘衆高宗手勑勞之復遷左領軍衛將軍檢校代州都督病卒贈左驍衛大將軍官造靈轝并家口給傳還鄉劉𢎞基為右光祿大夫義師至河東𢎞基以兵千人先濟河進下馮翊為渭北道大使渡渭水屯於長安逆擊衛文昇一戰而捷高祖大恱賜馬二十匹及破京城功為第一從太宗擊薛舉於扶風破之累拜右領都督封河間郡公武德元年拜驍衛大將軍以元謀之勲恕其一死又為左一總管從太宗擊破宋金剛累封任國公尋從擊劉黒闥於洛州師旋授秉鉞將軍備胡冦於北鄙九年以佐命功眞食九百户太宗征遼東以𢎞基與前軍大總管從擊高延夀於駐驆山力戰有功太宗屢加勞勉高宗永徽元年加實封通前一千一百户其年卒高宗為之舉哀廢朝三日贈開府儀同三司并州都督馮盎為上柱國貞觀中羅竇諸洞獠叛詔令盎率部落二萬爲諸軍先鋒斬首千餘級太宗令其子智戴慰省之前後賞賜不可勝數阿史那社爾為左驍衛大將軍貞觀十四年授行軍總管以平高昌諸人咸即受賞社尒以未奉詔㫖秋毫無所取軍還太宗美其亷愼以高昌所得寳刀并雜綵千段賜之仍令檢校北門左屯營封畢國公十九年從太宗征遼所部兵士人百其勇師旋兼授鴻臚卿契苾何力為右驍衛大將軍太宗征遼東以何力為前軍總管軍次白崖城為賊所圍被矟中腰瘡重疾甚太宗自為傅藥高宗乾封初為遼東道行軍總管抜平壤城虜其王還授鎭軍大將軍行左衛大將軍徙封梁國公劉仁軌高宗乾封初為右相兼檢校太子左中䕶累前後戰功封樂城縣男咸亨五年為雞林大總管東伐新羅仁軌率兵徑渡瓠蘆河破其北方大鎭七重城以功進爵為公黑齒常之為左領軍員外將軍高宗儀鳳中吐蕃犯邊常之從李敬𤣥劉審禮擊之審禮敗敬𤣥欲抽軍引却阻泥溝而計無所出常之夜率敢死士五百人進掩賊營吐蕃大首領跋地設棄軍霄遁敬𤣥因此得還高宗嘆其才略擢授左武衛將軍兼檢校左羽林軍賜金五百兩絹五百疋仍充河源軍副使吐蕃贊婆及素和貴等賊徒三萬餘屯於良非川常之率精騎三千夜襲營殺獲二千級獲羊馬數萬贊婆等單騎而遁授常之為河源道經略大使又賞物四百疋王晙𤣥宗開元初為隴右羣牧使吐蕃冦臨洮晙率所部擊之大潰以功加銀青光禄大夫封清源縣男兼原州都督仍拜其子班為幷州大都督府長史明年討突厥殺掠甚衆以功遷左散騎常侍持節朔方道行軍大總管十一年代張説為相追録破胡之功加金紫光禄大夫仍充朔方軍節度大使張説為朔方軍節度大使時慶州方渠䧏胡康願子自立為可汗舉兵反説以討賊功賜實封三百户郭䖍瓘為左驍衛將軍兼北庭都䕶開元二年春突厥黙啜遣其子移湼可汗及同俄特勒率精騎圍逼北庭䖍瓘固守使勇士伏於路左斬同俄賊衆乞䧏以功拜冠軍大將軍行右驍衛大將軍又下制進封太原郡開國公俄轉安西副大都䕶攝御史大夫四鎭經略安撫使進封潞國公賜實封一百户郭知運為檢校伊州刺史兼伊吾軍使開元二年春副郭䖍瓘破突厥於北庭以功封介休縣公知雲麾將軍擢拜右武衛將軍吐蕃入冦隴右知運擊敗之拜鄯州都督隴右諸軍節度大使六年又率兵討吐蕃掩獲萬計獻捷拜知運為兼鴻臚卿攝御史中丞加封太原郡公八年六州胡康待賔等反詔知運與王晙討平之拜左武衛大將軍賜金銀器百事雜綵千段九年卒於軍贈梁州都督錫米粟五百斛絹帛五百段王君㚟為右衛副率及郭知運卒遂代為河西隴右節度使遷右羽林軍將軍判凉州都督事開元十六年冬吐蕃大將悉諾邏率衆入冦太斗谷又移攻甘州君㚟襲至青海俘獲其衆及羊馬萬數以功遷羽林軍大將軍依舊判凉州都督封晉昌伯𤣥宗又常於廣達樓引君㚟及妻夏氏設宴賜以金帛張守珪為平樂府别駕開元初突厥入冦北庭守珪請引兵自蒲昌輪臺擊之及賊敗以功特加㳺擊將軍後十五年授𤓰州刺史吐蕃暴至城下守珪縱兵擊敗之以功加銀青光禄大夫仍以𤓰州為都督府以守珪為都督二十一年轉幽州長史兼御史中丞營州都督河北節度副大使先是契丹及奚連年為邊患及守珪到官頻出擊之每戰皆捷斬契丹首領可突于首傳於東都明年春守珪獻捷㑹籍田禮畢酬宴𤣥宗賦詩以褒美之拜守珪為輔國大將軍右羽林大將軍兼御史大夫仍賜雜綵一千疋及金銀器物等王忠嗣為左威衛將軍河西討擊副使兼檢校代州都督為王昱所陷貶東陽府左果毅屬河西節度使杜希望謀拔新城𤣥宗詔追忠嗣赴河西既下新城忠嗣之功居多因授左威衛郎將專知行軍兵馬又大破吐蕃以功最詔拜左金吾衛將軍同正員册府元龜卷三百八十四
