body:
  text: 册府元龜卷二百十七宋王欽若等撰閏位部交侵春秋傳曰疆場之事一彼一此何常之有當鼎國分據暨南北更王迄於朱梁咸務兵戰用寧守宇至乃略地以闢國攻城以拓土爭要害之形勢騁變詐之機略金革亟舉熢燧日燔飛輓相望汙萊罔治士衆疲於轉鬬邊城患於驛騷而復勝敗相尋虚亢更伺或知難而退獲免於數奔或允當而歸克遵於善志抑兵者不祥之器葢不得已而用之若乃爭尋常以盡其民恃彊大而好於戰曷常不致失律之咎而貽自焚之釁哉蜀先主章武元年七月帥諸軍伐呉其未即位前交侵事具勲業門忿其襲殺闗侯也呉王遣書請和先主盛怒不許呉將陸議李異劉阿等屯巫秭歸將軍呉班馮習自巫攻破異等軍次秭歸五溪蠻夷遣使請兵二年正月先主軍還秭歸呉班陳式水軍屯夷陵夾江東西岸五溪蠻夷咸相響應鎮北將軍黄權督江北諸軍與呉軍相拒於夷陵道夏六月為陸議所破將軍馮習張楠等皆沒先主自猇亭猇音許交切還秭歸收合離散兵遂棄船舫繇步道還魚復今萬州是呉將李異劉阿等踵躡先主軍屯駐南山八月乃收兵還巫十月呉主聞先主住白帝甚懼遣使請和先主許之遣大中大夫宗瑋報命後主建興五年春丞相諸葛亮出屯漢中營沔北陽平石馬三月下詔曰朕聞天地之道福仁而禍淫善積者昌惡積者喪古今嘗數也是以湯武之修徳而王桀紂極暴而亡曩者漢祚中㣲網漏凶慝董卓造難震蕩京畿曹操階禍竊執天衡殘剥海内懷無君之心子丕孤竪敢尋亂階盜據神器更姓改物世濟其凶當此之時皇極幽昩天下無主則我帝命隕越于下昭烈皇帝體明睿之徳光演文武應乾坤之運出身平難經營四方人鬼同謀百姓與能兆民欣戴奉順符䜟建位易號丕承天序補弊興衰存復祖業膺誕皇綱不墜於地萬國未靜早世遐殂朕以幼沖繼統鴻基未習保傅之訓而嬰祖宗之重六合壅否社稷不建永惟所以念在扶救光載前緒未有攸濟朕甚懼焉是以夙興夜寐不敢自逸每崇菲薄以益國用勸分務穡以阜民財授方任能以叅其聽㫁私降意以養將士欲奮劍長驅指討凶逆朱旗未舉而丕復隕䘮斯所謂不燃我薪而自焚也殘類餘醜又支天禍恣睢河雒阻兵未弭諸葛亮丞相𢎞毅忠壯忘身憂國先帝託以天下以勗朕躬今授之以旄鉞之重付之以專命之權統領步騎二十萬衆董督元戎龔行天罰除患寧亂克復舊都在此行也昔項籍總一彊衆跨州兼土所務者大然卒敗垓下死於東城宗族如焚為笑千載皆以不義陵上虐下故也今賊效尤天人所怨奉時宜速庶馮炎精祖宗威靈相助之福所向必克呉王孫權同恤災患潛軍合謀犄角其後凉州諸國王各遣月支康居胡侯支富康植等二十餘人詣授節度大軍北出便欲率將兵馬奮戈先驅天命既集人事又至師貞勢并必無敵矣夫王者之兵有征無戰尊而且義莫敢抗也故鳴條之役軍不血刃牧野之師商人倒戈今旍麾首路其所經至亦不欲窮兵極武有能棄邪從正簞食壺漿以迎王師者國有常典封寵大小各有品限及魏之宗族支葉中外有能規利害審逆順之數來詣降者皆原除之昔輔果絶親於智氏而蒙全宗之福㣲子去殷項伯歸漢皆受茅土之慶此前世之明騐也若其迷沉不反將助亂人不式王命戮及妻孥罔有攸赦廣宣恩威貸其元帥吊其殘民他如詔書律令丞相其露布天下使稱朕意焉六年春亮出攻祁山不克冬復出散闗圍陳倉糧盡退魏將王雙率軍追亮與戰破之斬雙還漢中七年春亮遣陳式攻武都隂平遂克定二郡八年征西大將軍魏延破魏雍州刺史郭淮於陽谿九年三月亮復出軍圍祁山魏將司馬宣王張郃救祁山六月亮糧盡退軍郃追至青封與亮交戰郃被箭射死延熙十二年秋衞將軍姜維攻魏雍州不克而還十三年姜維復出西平不克而還十六年四月姜維復率衆圍南安不克而還十七年正月姜維還成都六月維復率衆出隴西冬拔狄道河間臨洮三縣民居于綿竹繁縣十八年春姜維還成都夏姜維率諸軍出狄道與魏雍州刺史王經戰于洮西大破之退保狄道城維却住鍾題十九年春姜維進位大將軍督戎馬與鎮西將軍胡濟期㑹上邽濟失誓不至二十年姜維率衆出駱谷至芒水景耀五年姜維復率衆出侯和為鄧艾所破還住沓中呉大帝初為呉王未封王以前交侵事具勲業門蜀先主帥軍來伐蜀章武元年也至巫山秭歸使使誘導武陵蠻夷五溪民皆反為蜀帝以陸遜為督督朱然潘章等以拒之黄武元年蜀章武二年也正月陸遜部將軍宋謙等攻蜀五屯皆破之斬其將蜀軍分據險地前後五十餘營遜隨輕重以兵應拒自正月至閏月大破之臨陣所斬及投兵降首數萬人先主奔走僅以身免九月魏乃命曹休張遼臧霸出洞口曹仁出濡須曹真夏侯尚張郃徐晃圍南郡大帝遣吕範等督五軍以舟軍拒休等諸葛瑾潘章楊粲救南郡朱桓以濡須督拒仁十一月大風範等溺死者數千人軍還江南曹休使臧霸以輕船五百敢死萬人襲攻徐陵燒攻城車殺略數千人將軍全琮徐盛追斬魏將尹盧殺獲數百二年正月曹真分兵據江陵中州三月曹仁遣將軍常彫等以兵五千乘油船晨渡濡須中州仁子泰因引軍急攻朱桓桓兵拒之遣將軍嚴圭等擊破彫等是月魏軍皆退六月令將軍賀齊督麋芳劉邵等襲蘄春虜太守晉宗先是宗為戯口守將殺其主將王直以衆叛如魏魏以為蘄春太守數犯邊境至是虜之五年七月帝聞魏明帝初立征江夏圍石陽不克而還七年五月鄱陽太守周魴偽叛誘魏將曹休八月帝至皖口使將軍陸遜督諸將大破休於石亭黄龍三年夏中郎將孫布詐降以誘魏將王淩淩以軍迎布十月帝以大兵潛伏於阜陵俟之淩覺而走嘉禾元年三月遣將軍周賀校尉裴潛乘海之遼東九月魏將田豫要擊斬賀於成山二年帝向合肥新城遣將軍全琮征六安皆不克還三年五月遣陸遜諸葛瑾等屯江夏沔口孫韶張承等向廣陵淮陽帝率大衆圍合肥新城是時蜀相諸葛亮出武功帝謂魏明帝不能逺出而帝遣兵助司馬宣王拒亮自率水軍東征未至夀春遂還孫韶亦罷六年十月遣衞將軍全琮襲六安不克赤烏二年三月遣使者羊衜鄭胄將軍孫怡之遼東擊魏守將張持高慮等虜得男女四年四月遣衞將軍全琮略淮南決芍陂燒安城邸閣收其人民威北將軍諸葛恪攻六安琮與魏將王淩戰于芍陂中郎將秦晃等十餘人戰死車騎將軍朱然圍樊大將軍諸葛瑾取柤中六年春諸葛恪征六安破魏將謝順營收其人民是嵗魏司馬宣王率軍入舒九年二月車騎將軍朱然征魏柤中斬獲千餘十年遣諸葛壹偽叛以誘諸葛誕誕以步騎一萬迎壹於高山大帝出涂中遂至高山潛軍以待之誕覺而還十三年十二月魏大將軍王昶圍南郡荆州刺史王基攻西陵遣將軍戴烈陸凱往拒之皆引還廢帝㑹稽王建興元年十二月魏使將軍諸葛誕胡遵等步騎七萬圍東興將軍王昶攻南郡母邱儉向武昌甲寅大傅諸葛恪以大兵赴敵戊午兵及東興交戰大破魏軍殺將軍韓綜桓嘉等二年三月諸葛恪率軍伐魏四月圍新城大疫兵卒死者大半八月恪引軍還五鳯二年正月魏鎮東將軍母邱儉前將軍文欽以淮南之衆西入戰于樂嘉閏月壬辰丞相孫峻及驃騎將軍吕據左將軍留贊率兵襲夀春軍及東興聞欽等敗壬寅兵進于槖臯欽詣峻降淮南餘衆數萬口來奔魏諸葛誕入夀春峻引軍還二月孫峻及魏將軍曹珍遇于高亭交戰珍敗績留贊為誕别將蔣班所敗於菰陵贊及將軍孫楞蔣脩等皆遇害三月使鎮南將軍朱異襲安豐不克太平元年二月孫峻用征北大將軍文欽計將征魏八月先遣欽及驃騎吕據車騎劉纂鎮南朱異前將軍唐咨軍自江都入淮泗後主建衡元年十一月遣監軍虞氾威南將軍薛珝蒼梧太守陶璜由荆州監軍李勗督軍徐存從建安海道皆就合浦擊交趾宋文帝元嘉元年後魏明元帝自率衆至方城遣鄭兵將軍達奚斤呉兵將軍公孫表二萬人於滑臺司州刺史毛徳祖時戍虎牢遣步騎三千拒之魏剋滑臺并力乘勝遂至虎牢魏主自率大衆至鄴鄭兵既克金墉還向虎牢又遣楚兵將軍涉歸東擊青州所向城邑皆奔走明元自遣兵益虎牢増圍急攻徳祖大敗魏主領楚兵諸軍自滑臺西就兵共攻虎牢虎牢被圍二百日遂克虎牢武帝未受禪已前事并入功業門五年十月淮北鎮將軍王仲徳遣步騎二千餘人侵後魏濟陽陳留閏月又遣將王𤣥謨兖州刺史竺靈秀步騎二千人攻滎陽將襲虎牢七年三月遣右將軍到彦之統舟師入河諸軍各有所向先遣殿中將軍由竒使魏言河南舊是宋土為彼所侵今當修復舊境不闗河北魏大武大怒謂奇曰我生頭髪未燥便聞河南是我家地爾豈可得若必進軍今權當歛戍相避須火行地淨河水氷合自更取之七月後將軍長沙王義欣出鎮彭城總綂羣師彦之進軍魏碻磝及滑臺諸戍並棄城走以尹沖為司州刺史戍虎牢十一月魏衆南渡河彦之敗退洛陽滑臺虎牢諸城復為魏所陷尹沖死之是嵗魏神䴥三年也魏書云八月宋將到彦之自清水入河泝流西行帝以河南兵少詔攝四鎮乃治兵將西討丙寅到彦之遣將渡河攻治反叛冠軍將軍安頡督諸軍破之斬首五百餘級投水死者甚衆十月庚申到彦之王仲徳治河置守還保東平乙亥冠軍安頡濟河攻洛陽丙子拔之擒宋將二十人斬首五千級時河北諸軍㑹於七女津彦之恐軍南渡遣將王蟠龍泝流欲盜官船征南大將軍杜超等擊破斬之辛巳安頡虎牢宋司州刺史尹沖墜城死甲午夀光侯叔孫建汝隂公長孫道生濟河到彦之王仲徳從清入濟東走青州宋兖州刺史竺靈秀棄頴昌南奔湖陸戊戌叔孫建大破竺靈秀於湖陸殺獲五千餘人辛丑冠軍安頡率諸軍攻滑臺瑯邪王司馬楚之破宋將于長杜四年正月丙申宋將檀道濟王仲徳從清水救滑臺丹陽王叔孫汝隂公長孫道生拒之道濟等不敢進二月辛酉安頡司馬楚之平滑臺擒宋將朱循之李元徳及東郡太守申謨二月宋將檀道濟王仲徳東走諸將追之至歴城而還三月庚戌冠軍將軍安頡獻宋俘萬餘人甲兵三萬八年正月征南大將軍檀道濟破魏軍於東夀張二月滑臺為魏所陷道濟引軍還二十年二月仇池為索虜所沒二十三年三月魏軍寇兖豫青冀刺史申恬破之二十七年二月魏攻汝南諸郡陳頓二郡太守鄭琨汝陽潁川二郡太守郭道隠委守走魏軍攻懸瓠城行汝南郡事陳憲拒之七月遣寧朔將軍王𤣥謨北伐太尉江夏王義恭出次彭城總統諸軍魏碻磝戍委城走閏月癸亥𤣥謨攻滑臺不克為魏軍所敗退還碻磝辛未雍州刺史隨王誕遣軍攻𢎞農城克之丙戌又克闗城十一月戊子魏軍陷鄒山魯陽平二郡太守崔邪利没甲午隨王誕所遣軍乂攻陜城克之癸卯左軍將軍劉康祖於夀陽尉武戍與魏軍戰敗見殺十二月戊午内外戒嚴乙丑冗從僕射胡崇之太子積弩將軍臧澄之建威將軍毛熙祚于盱眙與魏軍戰敗并見殺庚午魏主率大衆至𤓰步二十八年正月丁亥魏軍自𤓰步退走丁酉攻圍盱眙城是月寧朔將軍王𤣥謨自碻磝退還歴下二月丙辰魏軍自盱眙奔走時南平王鑠為豫州刺史遣中兵參軍胡盛之出汝南上蔡向長社戍主魯爽棄城奔走既克長社遣幢主王陽兒張略等進據小索魏豫州刺史僕蘭於大索率步騎二千攻陽兒陽兒擊大破之坦之等進向大索勞楊氏鄭徳𤣥張和各起義以應坦之僕蘭奔虎牢會王陽兒等至即據大索因向虎牢鑠又遣安蠻司馬劉康祖繼坦之魏永昌王宜勒仁庫貢救虎牢坦之敗走魏軍乘勝遥追於尉氏津逢康祖康祖戰敗見殺進脅夀陽因東過與魏主會於江上魏荆州刺史魯爽及弟秀等率部曲詣鑠歸順是時魏主雖不克懸瓠而虜略甚多與帝書云往索真珠璫恡不相與今所馘截髑髏可當幾許珠璫也彼往日北通芮芮西結赫連蒙遜吐谷東連馮𢎞高麗凡此數國皆我滅之以此而觀彼豈能獨立我今北征先除有足之寇彼若不從命來秋當復往取以彼無足不先致討諸方已定不復相釋我往之日彼作何方計為塹城以自守為築坦以自障也二十九年六月撫軍將軍蕭思話率衆北伐十月癸亥司州刺史魯爽攻虎牢不拔退還孝武帝大明元年二月魏軍侵兖州明帝泰始三年二月魏軍侵汝隂太守張景逺擊破之八月以中領軍沈攸之南行兖州刺史率衆北討是嵗魏獻文皇興元年也魏紀云閏正月宋青州刺史沈文秀冀州刺史崔道固並遣使請舉州内屬詔平東將軍長孫陵平南將軍疾窮竒赴援之二月詔征南大將軍慕容白曜督騎五萬次於碻磝為東道後援宋東平太守申纂戍無鹽遏絶王使詔白曜討之三月文秀道固復叛歸宋白曜回師討之拔宋肥城坦苖糜溝三戍四月白曜攻汴城八月攻歴城二年二月道固及宋梁鄒戍主平原太守劉林賔舉城降三月白曜進間東陽四年十月發諸軍州兵北伐五年正月乙丑魏克青州執刺史沈文秀以歸七年十月遣將垣崇祖率衆二萬自郁州侵魏東兖州屯于南城為刺史于雒侯所敗崇祖還郁州後廢帝元徽二年七月遣將侵魏縁淮諸鎮為魏徐州刺史尉元擊敗之順帝昇明元年十月葭蘆戍主楊文度遣弟䑕襲陷魏仇池七月又遣將伐魏仇池為魏隂平太守楊廣香所擊走之南齊高帝建元二年正月魏軍侵淮泗遣衆軍北伐内外戒嚴二月魏軍侵夀陽豫州刺史垣崇祖破走之是月西境獻㨗解嚴是嵗魏孝文太和四年也魏紀云齊徐州刺史崔文仲寇淮北陷茌眉戍二月遣尚書游明根率二千騎南討八月梁州刺史崔慧景遣長史裴叔寳率衆寇武興闗城氐帥楊鼠擊破之叔寳還南鄭茌音士甾反三年正月領軍將軍李安民左將軍孫文顯與魏軍戰於淮陽大敗之初魏軍至縁淮驅略江北居民驚走不可禁乃於梁山置二軍南置三軍慈姥置一軍冽州置二軍三山置二軍白沙州置一軍蔡州置五軍自慈姥以下皆江南地名屬今昇州長蘆置三軍蔬浦置二軍徐浦置一軍長蘆已下州渚屬揚州魏昌黎王馮莎向司州荒人栢天生説莎云諸蠻皆響應莎至蠻竟不動莎大怒於淮邊獵而去魏紀云南征諸軍擊破齊游擊將軍桓康於淮陽齊豫州刺史崇祖寇下蔡昌黎王馮熙擊破之假寜郡王嘉大破齊軍俘獲三萬餘口武帝永明六年四月遣將陳顯達攻陷醴陽魏左僕射長樂王穆亮率騎一萬討之十一年七月魏軍侵邊遣江州刺史李顯達鎮雍州樊城明帝建武二年正月魏軍攻豫司徐梁四州遣鎮南將軍王廣之督司州征討右衞將軍蕭坦之督徐州征討尚書右僕射沈文季督豫州征討二月魏軍攻鍾離徐州刺史蕭惠休破之詔太尉陳顯達使持節都督西北征討諸軍事内外戒嚴三月司州刺史蕭誕與衆軍擊魏破之魏軍自夀春退走是月解嚴四月魏軍圍漢中梁州刺史蕭懿拒退之是嵗魏太和十九年也魏紀云太和十八年十二月車駕南征至懸瓠十九年正月講武於汝水之西二月廵淮而東至鍾離是月班師三年四月魏軍侵司州戍兵擊破之四年魏侵沔北十月又侵司州遣太子中庶子梁王右軍司馬張稷討之是嵗魏太和二十一年魏書事備帝王親征門十二月丁丑遣度支尚書崔慧景率衆救雍州永泰元年正月沔北諸郡為魏所侵相㫁敗沒遣太尉陳顯達持節救雍州二月遣左衞將軍蕭惠休假節援夀陽豫州刺史裴叔業擊魏軍於淮北破之東昏侯永元二年正月詔討豫州刺史裴叔業時頻誅大臣叔業懼而降魏以衞尉蕭懿為豫州刺史征夀春叔業病死兄子積以夀春降魏三月遣平西將軍崔慧景率衆軍伐夀春魏書云宣武景明元年二月南齊豫州刺史裴叔業以夀春内屬二月齊將胡松李居士率衆萬餘屯宛陳伯之水軍泝淮而上以逼夀春四月彭城王勰車騎將軍王肅大破之斬首萬數七月齊又遣陳伯之寇淮南八月彭城王勰破伯之於肥口梁高祖天監元年五月魏揚州小峴戍主黨法宗襲破大峴戍二年八月魏將元興攻義陽陷寇軍將軍蔡靈恩等十餘將三年二月魏陷梁州八月陷司州是嵗魏宣武正始元年也魏紀云正始元年二月梁將姜慶真襲陷夀春外郭州軍擊走之閏十二月梁行梁州事夏侯道遷據漢中來降假尚書刑巒鎮西將軍率衆以赴之二年四月巒遣統軍王足西伐頻破梁軍遂入劍闗六月梁將李畎等置營始平郡東涪水之北王足逆擊敗之梁將魯方達攻竹亭足又破之方達屯戍新城足又遣統軍盧祖遷等擊敗之七月足又逼涪城梁巴西太守庚城統軍主李畎等逆戰足擊破之八月詔中山王英南討襄沔十一月足圍涪城益州諸郡戍降者十二三遂引軍而退四年十月大舉侵魏以中書將軍揚州刺史臨州王宏都督北討諸軍事尚書右僕射柳惔為副五年二月輔國將軍劉思效破魏青州刺史元擊於膠水是月魏將陳伯之自夀陽率衆歸降五月太子左衞率張惠之克魏宿豫城臨川王宏前軍克梁城豫州刺史韋叡克合肥城廬江太守裴邃克羊石城乂克霍邱城六月青冀二州刺史桓和前軍克朐山城十一月魏軍寇鍾離遣右將軍曹景宗率衆赴援魏書云宣武王正始二年正月梁冀州刺史桓和入寇南青州軍擊走之二月平南將軍陳伯之破梁徐州刺史昌義之於梁城是月梁將蕭昞率衆五萬寇淮陽以中山王英為征南將軍都督揚徐二道諸軍事指授邊將五月梁張惠紹入寇陷宿豫蕭容陷梁城韋叡陷合肥城又陷羊石霍邱二城六月又陷小峴戍是月假平南將軍奚康生破梁將張惠紹斬其徐州刺史宋黒詔發定冀瀛相並肆六州十萬人以濟南軍又詔平南將軍安樂王詮督後發諸軍以赴淮南九月中山王英大破梁軍於淮南梁中軍大將軍臨川王蕭宏尚書右僕射柳惔徐州刺史昌義之等棄梁城㳂淮東走追奔次於馬頭梁冠軍將軍戍主朱思逺棄城宵遁擒送梁四千餘人斬獲士卒五萬有餘英遂攻鍾離六年四月曹景宗韋叡等破魏軍於邵陽洲斬數萬計魏書云鍾離大水中山王英敗績而還七年十月詔大舉北伐以䕶軍將軍始興王憺為平北將軍率衆入清車騎將軍王樊率衆向宿豫是月魏懸瓠鎮軍主白皁生魏書云豫州白皁生豫州刺史胡遜以城内屬是嵗魏永平元年也魏書云豫州城人白皁生殺刺史司馬悦據城南叛梁遣將齊茍仁等四將以助之詔尚書郎邢巒行豫州事督將軍崔暹率騎討之是月邢巒大破卓生及茍仁軍於魚口十二月又克懸瓠斬白皁生擒齊茍仁等俘梁卒二千餘人分賜王公巳下八年正月魏鎮東參軍成景雋斬宿豫城主嚴仲寶以城内屬魏書云正月梁遣王神念寇南兖詔輔國將軍長孫稚假平南將軍為都督率統軍邴虬等五軍以討之十年三月盗殺東莞瑯琊二郡太守劉晰以朐山引魏軍遣振逺將軍馬仙琕討之是月魏徐州刺史盧昶率衆赴朐山十二月仙琕大破魏軍斬馘十餘萬克復朐山城魏書云四月梁遣其鎮北將軍張稷及馬仙琕宼朐山詔盧昶率兵赴之十一月朐山城陷昶大敗而還十四年魏降人王足陳計求堰淮水以灌夀陽帝率徐陽人二十萬户取五丁以築之四月堰將合淮水漂疾復决潰魏書云三月梁於浮山堰淮規為揚徐之害詔平南將軍楊大眼討之以冀州刺史蕭寳寅為鎮東將軍决淮堰寳寅東昏侯弟亡歸于魏也九月遣將趙祖悦襲據硤石十五年二月硤石為魏鎮南將軍崔亮鎮軍大將軍李平所克五月衡州刺史張齊侵益州為魏將傅竪眼所敗是魏孝明熙平元年也普通二年六月茂州刺史文僧明以州叛入於魏假大將軍裴邃節督衆軍北討五年六月以員外散騎常侍元樹為平北將軍北青冀二州刺史率衆北伐八月徐州刺史戎景雋克魏童城九月又克睢陵城北兖州刺史趙景悦圍荆山宣毅將軍裴邃襲夀陽入羅城弗克十月樹邃攻建陵城破之樹又破曲木掃虜將軍彭寶孫克瑯琊又克擅邱城邃破狄又克甓城遂進屯黎時定逺將軍曹世宗破曲城又克秦墟魏郿潘溪守悉棄城走東海太守韋敬欣以司吾城降十一月寳孫克東莞城邃攻夀陽之安城克之馬頭安城並來降十二月荆山城降武勇將軍李國興攻平靜闗克之信威長史楊法乾攻武陽闗又攻峴闗並克之六年正月雍州前軍克新蔡郡又克鄭城二月趙景悦下龍亢城五月遣中䕶軍夏侯亶督夀陽諸軍北伐六月豫章王綜奔于魏魏復據彭城七年十一月夏侯亶胡龍牙元樹曹世宗等衆軍克夀陽城大通元年正月司州刺史夏侯夔進軍三闗所至皆克五月成景儁克魏臨潼竹邑十月魏東豫州刺史元慶和以渦陽内屬十一月以中䕶軍蕭淵藻為北討都督征北大將軍鎮渦陽二年四月魏郢州刺史元願達以義陽内附時魏大亂其北海王元顥汝南王元恱並來降十月以元顥為魏主遣東宫直閣將軍陳慶之衞送還北中大通元年四月陳慶之攻魏梁城拔之進屠考城擒濟隂王元暉業五月克大梁又克虎牢城魏莊帝棄雒陽走河北元顥遂入雒陽尋為爾朱榮所殺二年六月遣魏汝南王元悦還北為魏主以魏尚書右僕射范遵為安北將軍司州牧隨元悦北討大同元年十月北梁州刺史蘭欽攻魏漢中克之二年十月乙亥詔大舉北伐十一月班師是嵗東魏天平二年也太清元年二月魏司徒侯景求以豫廣潁雒陽西揚東荆北荆襄東豫南兖西兖齊等十三州内屬三月遣司州刺史羊鴉仁兖州刺史桓和仁州刺史湛海珍等應接北豫六月以鄱陽王範為征北將軍總督漢北征討諸軍七月鴉仁入懸瓠城八月王師北伐以南豫州刺史蕭淵明為大都督十一月魏遣大將軍慕容紹宗等至寒山丙午大戰貞陽侯淵明敗績及北兖州刺史胡貴孫等並陷魏紹宗進圍潼州二年正月魏陷渦陽簡文大寳二年五月魏遣大師潘雒辛等冦秦郡王僧辯遣杜崱帥衆拒之孝元帝承聖二年正月西魏遣大將軍尉遲迥襲益州五月進逼巴西潼州刺史楊䖍運以城降迥六月迥圍陷益州九月西魏遣郭元建治舟師於合肥又遣大將邢杲逺步六汗薩東方老率衆㑹之四年三月北齊遣其上黨王高渙送貞陽侯蕭淵明來主梁嗣至東闗遣呉興太守裴之横與戰敗績之横死太尉王僧辯率衆出屯姑孰敬帝太平元年三月齊遣大將蕭軌出栅口向梁山司空陳霸先軍主黄菆音鄒逆擊大破之軌退保蕪湖遣周文育侯安都率衆據梁山拒之四月侯安都輕兵襲齊行臺司馬恭於歴陽大破之五月庚寅齊軍水步入丹陽縣丙申至秣陵故治勑周文育還頓方邱徐度頓馬牧杜稜頓大桁癸卯齊軍進據兒塘輿駕出頓趙建故籬門内外戒嚴六月甲辰齊潛軍至蔣山龍尾斜趨莫府山北至𤣥武廟西北乙卯司空陳霸先授衆軍節度與齊軍交戰大破之斬齊北兖州刺史杜方慶及徐嗣徽弟嗣宗生擒徐嗣産蕭軌東方老王敬寳李希光裴英起劉歸義等皆誅之辛酉解嚴二年二月庚午遣領軍將軍徐度入東闗戊子至合肥燒齊船三千艘後梁明帝天保五年陳湘州刺史華皎邕州刺史戴僧朔來附皎送其子𤣥響為質於梁仍率諸軍伐陳明帝上言其狀周高祖詔衞公直督荆州總管權景宣大將軍元定等赴之明帝亦遣其柱國王操率水軍二萬會皎於巴陵既而與陳將呉明徹等戰沌口直軍不利元定遂沒梁大將軍李廣等亦為陳人所虜長沙巴陵並陷於陳衞公直乃歸罪梁之柱國殷亮明帝雖以退敗不獨在亮然不敢違命遂誅之呉明徹乘勝攻克梁河東郡獲其守將許孝敬明徹進冦江陵引江水灌城明帝出頓紀南以避其鋭江陵副總管高琳與其尚書僕射王操拒守梁軍主馬武吉維等擊明徹退保公安明帝乃還江陵明帝之八年陳又遣其司空章昭達冦江陵總管陸騰及梁之將士擊走之昭達又冦竟陵之青泥明帝令其大將軍許世武赴援大為昭達所破初華皎戴僧朔從衞公直與陳人戰敗率其麾下數百人歸於明帝明帝以皎為司空封江夏郡公以僧朔為車騎將軍封呉興縣侯明帝之十年皎將來朝至襄陽請衞公直曰梁主既失江南諸郡民少國貧朝廷興亡繼絶理宜資贍豈使齊桓楚莊獨擅救衞復陳之美望借數州以俾梁國直然之乃遣使言狀周高祖許之詔以基平鄀三州歸之於梁陳高祖永定二年二月詔車騎將軍司空侯瑱總督水步軍以遏齊冦文帝天嘉元年周將賀若敦獨孤盛等來攻巴湘以司空侯瑱為西討都督大敗盛軍將餘衆自楊葉洲潛遁二年七月敦自拔遁歸人畜死者十七八宣帝太建五年三月分命衆軍北伐以鎮西將軍開府儀同三司呉明徹都督諸軍事四月癸卯前巴州刺史魯廣達克齊大峴城辛亥呉明徹克秦州水栅庚申齊兵十萬援歴陽儀同黄法氍破之辛酉齊救秦州呉明徹又破之甲子南譙太守徐槾克石梁城五月己巳廬梁城降癸酉陽平郡城降甲戌徐槾克江郡城丙子黄法氍克歴陽城己卯北高唐郡城降丙戌盧陵内史任忠軍次東闗克其東西二城進克蘄城戊子又克譙郡城秦州城降癸巳𤓰步胡墅以城降六月庚子郢州刺史李綜克灄口城乙巳任忠克合州外城庚戌淮陽沐陽郡並棄城走癸丑豫章内史程文季克涇州城乙卯宣毅司馬湛陁克新蔡城癸卯黄法氍克合州城呉明徹師次仁州甲子克其州城七月戊辰齊遣衆二萬援齊昌西陽太守周炅破之己巳吳明徹軍次峽口克其北岸城南岸守者棄城走周炅克巴州城淮北絳城及榖陽士民並誅其渠帥以城降丙戌呉明徹克夀陽外城八月乙未山陽城降壬寅盱眙城降壬子戎昭將軍徐敬辯克海安城青州東海城降壬申高唐太守沈善度克馬頭城甲戌齊安城降丙子左衞將軍樊毅克廣陵楚子城丁亥前鄱陽内史魯天念克黄城小城齊軍退保大城壬辰黄城大城降十月甲午郭黙城降乙巳呉明徹克夀陽城丁未齊兵萬人至潁口樊毅擊走之辛亥齊遣兵援蒼陵又破之戊午湛陁克齊昌城十一月甲戌淮隂城降庚辰威虜將軍劉桃根克胊山城辛巳樊毅克濟隂城己丑魯廣達等克北徐州十二月壬午任忠克霍州城六年正月甲申廣陵金城降七年正月乙亥左衞將軍樊毅克潼州城三月戊申樊毅克下邳高山等六城閏九月都督呉明徹大破齊軍於吕梁九年十月戊午司空呉明徹破周將梁士彦衆數萬于吕梁十年二月甲子北討衆軍敗績於吕梁司空呉明徹及將卒以下並為周軍所獲十一年十一月周遣柱國梁士彦率衆至肥口戊戌周軍進圍夀陽辛丑前豐州刺史臯文奏率步騎三千趣陽平郡癸卯任忠率步騎七千趣秦郡丙午新除仁威將軍右衞將軍魯廣達遣卒衆入淮是日樊毅領水軍二萬自東闗入焦湖武毅將軍蕭摩訶率步騎趣歴陽戊申豫州陷辛亥霍州又陷十二月乙丑南北兖晉三州及盱眙山陽陽平馬頭秦歴陽沛北譙南梁等九州並自拔還京師譙北徐州又陷自是淮南之地盡沒於周矣十二年八月庚申詔鎮西將軍樊毅進督沔漢諸軍事遣平南將軍南豫州刺史任忠率衆趣歴陽通直散騎常侍超武將軍陳慧紀為前軍都督趣南兖州庚午通直散騎常侍淳于陵克臨江郡癸酉智武將軍魯廣達克郭黙城丙子淳于陵克祐州城九月丁亥周將王延貴率衆援歴陽任忠擊破之生擒延貴等東魏孝靜帝天平二年二月梁司州刺史陳慶之冦豫州刺史堯雄擊走之六月梁魏王元慶和冦南頓堯雄大破之十一月梁將桞仲禮冦荆州刺史王元擊破之三年九月以定州刺史侯景兼尚書右僕射南道行臺節度諸軍南討十一月景攻克梁楚州獲刺史桓和是嵗與梁通好四年十月西魏行臺宫景夀都指揮楊白駒冦雒州大都督韓賢大破之西魏又遣其子大行臺元季海大都督獨孤信逼雒州刺史廣陽王湛棄城歸闕季海信遂據金墉元象元年八月大破西魏之衆于河隂武定五年九月梁武遣貞陽侯蕭明冦徐州堰泗水於寒山灌彭城以應侯景十一月以尚書左僕射慕容紹宗為東南道行臺與大都督高岳潘相樂大破擒之及其二子瑀遁十二月蕭明至闕帝御閶闔門讓而宥之岳等迴師討侯景六年四月大尉高岳司徒韓軌大都督劉豐等討西魏王思政於潁川引洧水灌其城七年五月大將軍高澄帥師赴潁川六月克之獲大將軍王思政等北齊文宣天保元年十一月周文帝率衆至陜城分騎北渡至建州帝親戎出次城東周文帝聞帝軍容嚴盛嘆曰高歡不死矣遂退師二年五月丙戌合朔州刺史斛斯顯攻克梁歴陽鎮七月癸酉行臺郎邢景逺破梁龍安戍獲鎮城李雒文三年三月以司州牧清河王岳為使持節南道大都督司徒潘相樂為使持節東南道大都督及行臺辛術率衆南伐六年正月壬寅清河王以衆軍渡江克夏首二月甲戌上黨王渙克譙郡三月丙戌上黨王渙克東闗斬梁將梁之横俘斬數千七年三月丁酉大都督蕭軌等率衆濟江六月乙卯蕭軌等與梁師戰于鍾山之西遇霖雨失利軌及都督李希光王敬寳東方老軍司裴英起並沒士卒散還者十二三武成河清二年十二月己酉周將楊忠率突厥阿史那木可汗等二十餘萬人自恒州分為三道殺掠吏人己未周軍逼并州又遣大將軍達奚武帥衆數萬東雍及晉州與突厥相應三年正月周軍至城下而陳戰於城西周軍及突厥大敗人馬死者相枕數百里不絶七月周軍三道並出使其將尉遲迥冦雒陽楊標入軹闗權景宣趣懸瓠十一月甲午周將尉遲迥等圍雒陽甲辰大尉婁叡大破周軍於軹闗擒楊標十二月豫州刺史王士良以城降周將權景宣壬戌太師段韶大破尉遲迥等解雒陽圍梁太祖開平二年四月甲寅淮冦侵軹潭岳邊境欲援郎州以戰艦百餘艘揚航西上泊鼎口湖南馬殷遣水軍都將黄瑀率樓船遮擊之賊衆㳂流宵遁追至鹿角鎮五月丁丑王師圍潞州將及二年李進通窮危旦夕不俟攻擊當自降太原李存勗以厚幣誘結北蕃諸部並其境内丁壯悉驅南征决戰以救上黨之急部落帳族馳馬甲兵數路齊進於銅鞮樹寨旗壘相望是月癸未淮賊冦荆州石首縣襄陽舉舟師㳂瀺港襲敗之六月丙辰邠岐來冦雍西編户困于逃避且芟害禾稼結營自固踰月同州劉知俊領所部兵擊退襲至幕谷大破之俘斬千計收其器甲宋文通僅以身免是月壬戌岳州為淮賊所據帝以北郡五領三湘水陸㑹合之地委輸商賈靡不繇斯遂令荆湘湖南北舉舟師同方致討王師集淮夷毀壁焚郛郭而遁十月己亥上在陜兩浙節度使奏於常州東州鎮殺淮賊萬餘人獲戰船一百二隻末帝乾元三年五月乙巳天雄軍節度使楊師厚及劉守奇率魏博邢洛徐兖鄆滑之衆十萬討鎮州庚戌營於鎮之南門外壬子晉將史達瑭自趙州領騎五百人入於鎮州師厚知其有備自九月移軍於下博劉知奇以一軍自貝州掠冀州衡水阜城陷下博師厚自弓高渡御河迫滄州張萬進懼送欵于師厚師厚表請以萬進為青州節度使以劉守奇為滄州節度使七月晉王率師自黄澤嶺東下寇邢洛魏博節度使楊師厚軍於潼水之東晉將曹進金來奔晉軍遂退貞明元年四月邠州留後李保衡以城歸順是月鳯翔李茂貞遣偽署涇州節度使劉知俊率師攻邠州以李保衡歸順故也自是凡攻圍十四日節度使霍彦威諸軍都指揮使黄貴堅等捍寇會救軍至岐人乃還六月庚寅晉王入魏州以賀徳倫為大同軍節度使舉族遷於晉陽是月晉人陷徳州秋七月又陷澶州刺史王彦章棄城來奔是月劉鄩自洹水潛師繇黄澤路西趣晉陽至樂平縣值霖雨積旬乃班師還次宗城遂至貝州軍於堂邑遇晉軍轉戰數十里晉軍稍還二年二月命許州節度使王檀河陽節度使謝彦章鄭州防禦使王彦章率師自隂地闗抵晉陽急攻其壘不克而旋三月劉鄩率師與晉王大戰於元城鄩軍敗績先是鄩軍駐於莘帝以河朔危急師老於外餉饋不克遣使賜鄩詔微以責讓鄩奏以寇勢方盛未可輕動帝又問鄩决勝之策鄩奏曰人給糧十斛盡則破敵帝不悦復遣促戰鄩召諸將會議諸將皆欲戰鄩黙然一日鄩引軍攻鎮定之營彼衆大駭上下騰亂俘斬甚衆時帝遣偏將楊延直領軍萬餘人屯檀州以應鄩既而晉王詐言歸太原劉鄩以為信是月詔楊延直會於魏城下鄩自莘率軍亦至與延直㑹既而晉王自貝州至鄩引軍漸退至故元城西與晉人决戰大為所敗追至河上軍士赴水死者甚衆鄩自黎陽濟河奔滑州四年二月遣將謝彦章帥衆數百迫楊劉城甲子晉王來援楊劉彦之軍不利而退八月晉王率師次楊劉口遂軍於麻家渡北面招討使賀環以兵屯濮州北行臺村對壘百餘日晉王以輕騎來覘許州節度使謝彦章發伏兵掩擊圍之數重會救軍至僅以身免十二月庚子朔晉王領軍迫行臺寨十里距寨結營而止二十二日晉王次臨濮賀瓌王彦章自行臺寨軍躡之二十四日至胡柳陂晉王領軍出戰瓌軍已成列晉王以騎突之王彦章一軍先敗彦章走濮陽晉人輜重在陳西瓌乃領軍薄之晉人大奔自相蹈藉死者不可勝計晉大將軍周徳威歿於陣瓌軍登七山列陣於山之下晉王復領軍來戰瓌軍遂敗翼日晉人攻濮陽陷之京師戒嚴五年春正月晉人城徳勝夾河為栅四月賀瓌攻徳勝南城以艨艟戰艦横於河以扼津濟之路晉人㫁其艨艟濟軍以援南城瓌等退軍十二月戊戌晉王領軍迫河南寨王瓉率師禦之獲晉將石家才既而瓉軍不利瓉退保楊村寨六年六月遣兖州節度使温昭圖莊宅使段凝領軍攻同州先是河中朱友謙襲陷同州節度使程全暉單騎奔京師友謙以其子令徳為同州留後表求節旄不允既而帝慮友謙怨望遂命兼鎮同州制命將下而友謙已叛遣使求援於晉故命將討之九月庚寅以供奉官郎公逺充契丹歡好使晉王遣都將李嗣昭李存審王建及率師來援同州戰於城下我師敗績諸將以餘衆退保華州龍徳元年春正月戴思逺率師襲魏州時晉方攻鎮州故思逺乘虚以襲之陷城安而還遂急攻徳勝北城晉將李存審極力拒守二月晉王以兵至思逺收軍而退復保楊村八月段凝張朗攻衞州下之獲刺史李存儒以獻戴思逺又下淇門共城新鄉等三縣自是澶州之西湘州之南皆為梁有晉人失軍儲三分之一焉三年五月以滑州節度使王彦章為北面行營招討使辛酉王彦章率舟師自村寨浮河而下㫁徳勝之浮梁攻南城下之殺數千人唐帝棄徳勝之北城併軍保楊劉己巳王彦章圍楊劉城六月乙亥唐帝引軍援楊劉潛軍至博州築壘於河東岸戊子王彦章杜晏球率兵急攻博州之新壘不克遂退保于鄒口七月丁未唐帝引軍㳂河而南王彦章棄鄒口復至楊劉己未自楊劉援營退保楊村寨八月以段凝代王彦章為北面行營招討使戊子段凝營於王村引軍自高陵渡河略臨河而還薰璋攻澤州下之庚寅命滑州節度使王彦章率兵屯守鄆之東境九月戊辰彦章以衆渡汶與唐軍於遞坊鎮彦章軍不利退保中都册府元龜卷二百十七
