body:
  text: 冊府元龜卷八百十二宋王欽若等撰總録部富好施富洪範之述五福其二曰富仲尼亦云富人之所欲也故潤屋之訓見紀於䇿書素封之重非藉乎禄位又何况編列之户以財力相君游談之士以貧賤為恥者哉三代以下乃有陪臣擬於公室匹夫敵於國君財力雄於京師射獵比於王者莫不藉其世資因其邑入占山澤之貨憑商賈之業或深耕以多積或居物而射利以至權倍稱之息廣畜牧之術精於方伎處於浩壤以致夫生生之厚焉然而老氏戒乎多藏仲尼鄙其不義自非保之以禮節約之以尋幅又曷能免充詘之誚逃偏重之釁哉管仲為齊大夫富擬於公室有三歸反坫齊人不以為侈秦后子有寵於桓公后子秦穆公子也景公之母弟公子鍼如二君於景其母曰不去懼選選數也后子奢冨弗去君將數其罪而加戮鍼適晉其車千乗言其富也后子饗晉侯造舟於河十里舍車舍置也相次十里一車自雍及絳用車百乗也自雍及絳歸取酬幣終事八反昭公元年慶封齊大夫魯襄公二十八年慶封奔吳句餘子之朱方句餘吳子夷昧也朱方吳地聚其族焉而居之富於其舊子服惠伯謂叔孫曰天殆富淫人慶封又富矣穆子曰善人富謂之賞淫人富謂之殃天其殃之也其將聚而殱旃殱盡也旃之也為昭四年殺慶封傳孟獻子魯大夫聘於晉韓宣子觴之飲三徙鍾石之懸不移而具獻子曰富哉宣子曰子之家孰與我富獻子曰吾家甚貧我有二士顔固慈無虚此二士者使吾邦家安平百姓和協客出宣子曰彼君子也以畜賢為富我鄙人也以鍾石金玉為富孔子曰孟獻子之富也可著於春秋也公叔文子衛大夫也朝而請享靈公退見史鰌而告之史鰌曰子必過矣子富而君貧罪其及子乎文子曰君既許我矣其若之何史鰌曰無害也子能執臣禮可以免富而能臣必免於難戍也驕戍文子之子公叔戌也其亡乎駟秦鄭嬖大夫也富而侈嘗陳卿之車服於庭鄭人惡而殺之端木賜字子貢衛人既學於仲尼退而仕衛發貯鬻財曹魯之間多有積貯聚時而發鬻賣之也七十子之徒賜最為饒言於弟子之中最為富而顔淵簞食瓢飲在於陋巷簞笥也食飯也瓢瓠勺也一簞之飯一瓢之飲至貧也子貢結駟連騎束帛之幣聘享諸侯所至國君無不分庭與之亢禮為賔主之禮然孔子賢顔淵而譏子貢曰囘也其庻乎屢空賜不受命而貨殖焉億則屢中顔囘度㡬聖道雖數空匱而樂在中子貢不受教命唯財是殖億度是非幸而中焉子貢好廢舉與時轉貨殖廢舉謂停貯也與時謂逐時也夫物賤則買而停貯貴即逐時轉易貨賣取資利也嘗相魯衛家累千金卒終于齊范蠡為越大夫越王勾踐困於㑹稽之上乃用范蠡計然計然者濮上人也博學無所不通尤善計算嘗游南越范蠡卑身事之其書則有萬物録著五方所出皆述之一號計研晉中經簿又吳越絶並作倪研及然聲相近計然曰知鬬則修備時用則知物二者形則萬貨之情可得而見矣形顯也故旱則資舟水則資車物之理也旱極則水水極則旱故於旱時而預蓄舟水時預蓄車以待其貴要其利也推此類而修之十年國富厚賂戰士遂報強吳刷㑹稽之恥刷謂拭除之也范蠡嘆曰計然之䇿十用其五而得意既以施國吾欲施之家乃乗扁舟浮江湖變名姓適齊為鴟夷子皮自號䲭夷者言若盛酒之鴟夷多所容受而可卷懐與時張弛也鴟夷皮之所為故曰子皮之陶為朱公陶即今之陶也以為陶天下之中諸侯四通貨物所交易也乃治產積居與時逐言預居貨物隨時為逐利而不貴於人故善治產者能擇人而任時十九年之間三致千金再分散於貧友昆弟後年衰老聴子孫修業而息之息生也遂致鉅萬故言富者稱陶朱公一云范蠡去越浮海出齊變姓名自謂鴟夷子皮耕干海畔苦身戮力父子治產居無幾何致產數千萬齊人聞其賢以為相范蠡喟然嘆曰居家則致千金居官則至卿相此布衣之極也久受尊名不祥乃歸相印盡散其財以分與知友鄉黨而懐其重寳間行以去止于陶以為此天下之中交易有無之路通為生可以致富矣於是自謂陶朱公復約要父子耕畜廢居候時轉物逐什一之利居無何則致貲累巨萬天下稱陶朱公猗頓魯之窮士耕則常饑桑則常寒聞朱公富徃而問術焉朱公告之曰子欲速富當畜五牸於是乃適西河大畜牛羊于猗氏之南十年之間其息不可計貲擬王公馳名天下以興富於猗氏故曰猗頓一云猗頓用盬鹽起盬鹽於池盬造鹽故曰盬鹽白圭周人當魏文侯時李克務盡地利而白圭樂觀時變故人棄我取人取我與夫嵗熟取糓予之絲漆蠒出取布絮與之食太隂在卯穰明嵗衰惡至午旱明嵗羙至酉穰明嵗衰惡至子大旱明嵗羙有水至卯積著率嵗倍欲長錢取下糓長石斗取上種能薄飲食忍嗜欲節衣服與用事僮僕同苦樂趨時若猛獸鷙鳥之發故曰居治生產猶伊尹呂尚之謀孫吳用兵商鞅行法是也是故其智不足與權變勇不足以决斷仁不能以取予彊不能有所守雖欲學吾術終不告之矣蓋天下言治生祖白圭其有所試矣彼亦有所長非茍而已也魏冉秦昭王母宣太后弟穰侯富於王室出闗輜車千乗有餘呂不韋陽翟大賈人徃來販賤賣貴家累千金乃為丞相家僮萬人郭縱邯鄲人以鐵冶成業與王者埓富烏氏臝畜牧烏氏姓也羸名也其人為畜牧之業也及衆斥賣畜牧蕃盛其數多則出而賣之也求竒繒伺間獻戎王避時之禁故伺間隙私遺戎王戎王十倍其償予之畜畜至用谷量牛馬言其饒不可計算數故以山谷多少言之始皇令臝比封君以時與列臣朝請卓氏之先趙人也用鐵冶富秦破趙遷卓氏之蜀夫妻推輦步車曰輦行詣遷處諸遷虜少有餘財争與吏求近處處葭萌縣名唯卓氏曰此地狹薄吾聞㟭山之下沃野下有蹲鴟至死不饑蹲鴟謂芋用其根可食以充糧故無饑年華陽國志曰汶上郡都安縣有大芋如蹲鴟也民工作布易賈乃求逺遷致之臨卭大喜即鐵山鼓鑄即就也運鑄算賈傾滇蜀之民行販賣於滇蜀之間也富至童八百人田池射獵之樂擬於人君程鄭山東遷虜也亦冶鑄賈魋結之民富埓卓氏椎髻漢書作魋結西南夷也言程鄭行賈求其利於人也埓等也程卓既衰至成哀間成都羅裒貲至鉅萬初裒賈京師隨身數十百萬言其自有數十萬且至百萬為平陵石氏持錢其人強力石氏貲次如苴其人強力謂羅裒也貲次如苴自謂石氏之饒財也親信厚資遣之令徃來巴蜀數年間致千餘萬裒舉其半賂遺曲陽定陵侯謂王根淳于長也依其權力賒貸郡國人莫敢負擅鹽井之利期年所得自倍遂殖其貨宛孔氏之先梁人也用鐵冶為業秦滅魏遷孔氏南陽大鼓鑄規陂田連騎游諸侯因通商賈之利有游閒公子之名言其志寛大不在急促公子者公侯貴人之子也言其舉動性行似之也若今言諸郎矣然贏得過當愈於纎嗇愈勝也纎約也嗇細吝也言其於利雖不汲汲茍得然所獲贏餘多於細吝者也下云周人既纎義類此家致千金南陽行賈盡法孔氏之雍容丙氏魯人也魯俗儉嗇而丙氏尤甚以鐵冶起富至鉅萬然家自父兄子弟約頫有拾仰有取俯仰必有所取拾無鉅細好惡也貰貸行賈徧郡國鄒魯以其故多去文學而趨利刁間齊人也俗賤奴虜而刁間獨愛貴之刁姓間名也桀黠奴人之所患唯刁間收取使之逐魚鹽商賈之利或連車騎交守相然愈益任之終得其力起數十萬故曰寧爵無刁刁間能畜豪奴奴或有連車騎交守相奴自謂寕欲免去作民有爵耶無將止為刁氏作奴乎無發聲助也言能使豪奴自饒而盡其力也師史周人轉轂百數轉轂謂以車載物而逐利者賈郡國無所不至洛陽街居至齊秦楚趙之中富貴相矜以久賈言洛陽之地居在諸國之中要衝之所若大街衢故其賈人無所不至而多得利不憚久行也中音竹仲切過邑不入門設用此等故師史能致十千萬十千萬即萬萬也言其財至萬萬也一曰至十萬者十焉漢任氏宣曲人其先為督道倉吏於京師四方諸道督其租耳道者非謂上道也秦之敗也豪傑争取金玉任氏獨窖倉粟取倉粟而窖藏之也楚漢相距滎陽人不得耕種米石至萬錢而豪傑金玉盡歸任氏任氏以此起富富人奢侈而任氏折節為力田畜人爭取賤賈任氏獨取貴言其居買之物不在賣賤在良美也善富者數世折節力田務於本業先公後私率道閭里故云善富然任公家約非田畜所生不衣食公事不畢則不得飲酒食肉任公任氏之公也言家為此私約制也以此為閭里率故富而主上重之母鹽氏闗中人吳楚兵之起長安中列侯封君行從軍旅齎貸子錢家行者須齎糧而出於子錢家貸之也貸謂求假之也子錢家以為闗東成敗未决莫肯予唯母鹽氏出捐千金貸貸謂假與之其息十之三月吳楚平一嵗之中則母鹽氏息十倍用此富闗中杜氏安陵人闗中富商大賈大抵盡諸田抵歸也田牆田蘭韋家栗氏杜氏亦鉅萬班一始皇之末避墬於樓煩墬古地字樓煩鴈門之縣致馬牛羊數千羣値漢初定與民無禁當孝惠高后時以財雄邊國家不設衣服車旗之禁故班氏以多財而為邊地之䧺豪出入弋獵旌旗鼔吹年百餘嵗以夀終故北方多以一為字者馬邑人聶一之類也今流俗書本多改此傳一字為壹非也鄧通文帝倖臣也帝使善相人相鄧通曰當貧餓死帝曰然富通者在我何說貧於是賜通蜀嚴道銅山得自鑄錢鄧氏錢布天下其富如此通官至上大夫橋桃漢塞之斥也唯橋桃以致馬千匹牛倍之羊萬粟以萬鍾計塞斥者言國家斥開邊塞更令寛廣故橋桃得恣其畜牧也以萬鍾計者不論斗斛千萬之數每率舉萬鍾而計之著其饒多也甯成武帝時為内史外戚多毁成之短抵罪髠鉗是時九卿死即死少被刑而成刑極自以為不復收刑極者言殘毁之重也乃觧脱詐刻傳出闗歸家輒觧脱鉗鉄亡去也傳所以出闗之符也稱曰仕不至二千石賈不至千萬安可比人乎賈謂販賣也乃貰貸陂田千餘頃貰貸假取之也假貧民役使數千家假謂僱貸也數年㑹赦致產數千萬張安世宣帝時為大司馬領尚書事安世以父子封侯在位太盛乃辭禄詔都内别藏張氏無名錢以百萬數都内主藏官也安世以還官官不簿也安世尊為公侯食邑萬户然身衣弋綈弋黑色也綈厚繒也夫人自紡績家童七百人皆有手技作事内治產業累積纎㣲是以能殖其貨富於大將軍光杜周始為廷史有一馬廷史即廷尉史也及大任事列三公而兩子夾河為郡守家貲累鉅萬矣史丹魯國人也盡得父財又食大國邑數見褒賞賞賜累千金僮奴以百數後房妾數十人後為左將軍亷平當以貲百萬自下邑徙平陵當後為丞相賜爵關内侯樊嘉杜陵人也自元成訖王莽京師富人嘉與茂陵摯綱平陵如氏苴氏長安丹王君房鼔樊少翁王孫大卿為天下高貲王君房賣丹樊少翁及王孫大卿賣鼓亦致高貲高貲謂多資財嘉五千萬其餘皆鉅萬矣王孫卿以財飬士與雄傑交王莽以為京師市司漢司東市令也此其章章尤著者也其餘郡國富民兼業顓利以貨賂自行取重於鄉里者不可勝數故秦楊以田農而甲一州以田地過限從此而富為州中笫一也翁伯以販脂而傾縣邑張氏以賣醫而隃侈質氏以洒削而鼎食洒濯也削謂刀劍室也謂人有刀劍削故惡者主為洒刷之去其垢穢更餙令新也濁氏以胃脯而連騎今大官嘗以十月作沸湯燖羊胃以末椒薑粉之暴使燥是也張里以為馬醫而撃鐘姓偉姓姓名偉臨菑人成哀間貲五千萬張長叔薛子仲洛陽人成哀王莽時貲亦十千萬皆以為納言士欲法武帝然不能得其利法武帝者言用卜式東郭咸陽孔慬等為官也後漢王丹字仲回京兆人哀平時仕州郡家累千金隱居飬志隂識南陽新野人其先祖子方至孝有仁恩當臘日晨炊而竈神形見子方再拜受福家有黄羊因以祠之自是以後暴至巨富有田七百餘頃輿馬僕𨽻比於封君子方嘗言我子孫當強大至識三世而遂繁昌故後常臘日祠竈而以黄羊識官至執金吾樊宏南陽湖陽人父重世善農稼好貨殖營理產業物無所棄課役僮𨽻各得其宜故能上下戮力財利嵗倍至開廣田土五百餘頃其廬舍皆有重堂高閣陂渠灌注酈元水經注三湖水支分東北為樊氏陂東西十里南北五里亦謂之凡亭陂東樊氏故宅樊氏既滅庾氏取其陂諺曰陂汪汪下田良樊氏失業庾氏昌其陂至今猶名為樊陂在今鄧州新野縣之西南也又魚池牧畜有求必給嘗欲作器物先種梓漆時人嗤之然積以嵗月皆得其用向之笑者咸求假焉貲至鉅萬馬援轉游隴漢間嘗謂賔客曰丈夫為志窮當益堅老當益壯因處田牧至有牛馬羊數千頭糓萬斛後為伏波將軍李通字次元南陽宛人世以貨殖著姓後為大司空郭况為大鴻臚光武數幸其宅賞金帛甚豐京師號况家為金穴言其富貴也杜篤子碩豪俠以貨殖聞篤仕郡文學掾馬防為光禄􅈴以病乞骸骨詔賜故中山王田廬以特進就第防兄弟貴盛奴婢各千人已上寳貨巨億皆買京師膏腴美業又大起第觀連閣臨道彌亘街路多聚聲樂曲度比諸郊廟賔客畢至京兆杜篤之徒數百人嘗為食客居門下戴遵字子高富於貲產輕財好義賓客常三四百人時人名之闗東大豪戴子高折像父國有貲財二億家僮八百人國終廣漢太守魏曹洪家富而性吝嗇初太祖為司空時以已率下每嵗發調使本縣平貲于時譙令平洪貲財與公家等太祖曰我家貲那得如子亷邪後為驃騎將軍婁圭字子伯初平中在荆州北界合衆詣太祖太祖以為大將子伯家累千金太祖曰婁子伯富樂於孤但勢不如孤蜀糜竺字子仲東海朐人祖世貨殖僮客萬人貲產鉅億為安漢將軍吳李衡嘗於武陵龍陽州上作宅種甘橘千株臨死勑兒曰母惡吾治家故窮如是然吾州里有千頭木奴不責汝衣食嵗一疋絹亦可足用耳衡亡後二十餘日兒以白母母曰此當是種甘橘也汝家失十户客來七八年必汝父遣為宅汝父嘗稱太史公言江陵千樹橘當封君家吾答曰且人患無徳義不患不富若貴而能貧方好耳用此何為吳末衡甘橘成嵗得絹數千疋家道殷足晉咸康中其宅上枯樹猶在衡為威逺將軍晉石崇為衛尉財產豐積屋宇宏麗後房百數皆曳䊵繡珥金翠絲竹盡當時之選庖膳窮水陸之珍與貴戚王愷羊琇之徒以奢靡相尚愷以􅏁澳釡崇以蠟代薪愷作紫絲步障四十里崇作錦步障五十里以敵之崇塗屋以椒愷用赤石脂崇愷爭豪如此武帝每助愷嘗以珊瑚樹賜之高二尺許枝柯扶疎世所罕比愷以示崇崇便以鐵如意撃之應手而碎愷既惋惜又以為疾已之寳聲色方厲崇曰不足多恨今還卿乃命左右悉取珊瑚樹有高三四尺者六七株條幹絶俗光彩耀日如愷比者甚衆愷怳然自失矣麴允金城人與游氏世為豪族西州為之語曰麴與游牛羊不數頭南開朱門北望青樓允為驃騎將軍刁逵字伯道弟暢字仲逺次弟宏字叔仁並歴顯職逵為廣州刺史領平越中郎將假節暢為始興相宏為冀州刺史兄弟子姪並不拘名行以貨殖為務有田萬頃奴婢數千人餘資稱是高祖起義暢宏謀襲之伏誅子姪無少長皆死刁氏遂滅刁氏素殷富奴客縱横固占山澤為京口之蠧宋祖散其資蓄令百姓稱力而取之彌日不盡當時天下饑弊編户頼之以濟焉宋孔靈符家本豐產業甚廣又於永興立墅周回三十三里水陸地二百六十五頃含帶二山有果園九處為有司所糾詔原之終㑹稽太守沈攸之為荆州刺史富擬王侯夜中諸廊然燭逹曉曵珠玉者數百人皆一時絶妙徐湛之財産豐富室宇園池貴游莫及門生千餘皆三吳富人子每出入行游塗巷盈滿湛之為尚書僕射領䕶軍將軍虞悰為豫章内史將軍悰治家富殖奴婢無游手雖住南土而㑹稽海味無不畢致焉後魏莫含鴈門繁畤人也家世貨殖貲累巨萬其故宅在桑乾川南世稱莫含壁或音訛謂之莫回城云含終左將軍畢衆敬善持家業尤能督課田產大致儲積為平南將軍兖州刺史仇廣與弟盆並善營産業家于中山號為巨富子孫仕進至州主簿張僧皓好產業孜孜不已藏鏹巨萬他資亦稱是第自供儉約車馬痩弊身服布裳而婢妾紈綺僧皓尤好蒲奕戲不擇人是以獲譏於世北齊婁昭字菩薩代郡平城人也祖父提雄傑有識度家僮千數牛馬以谷量性好周給士多歸附之終定州刺史後周韓仲恭以貲干榮利郡辟為功曹中正仲恭辭不獲免乃應之申公李穆嘗謂仲恭曰君唯願安坐作富家公名級何由可進須為子孫作資䕃寕止足於郡吏邪仲恭答曰第五之號豈减驃騎乎韋藝大修產業與北夷貨易家資巨萬為營州總管隋何妥字栖鳯西域人也父細明通商入蜀遂家郫縣事梁武陵王紀主知金帛因致巨富號為西州大賈妥終國子祭酒王辯字警畧馮翊蒲城人也祖訓以行商致富魏世出粟助給軍糧為假清河太守唐郝處俊安州安陸人高宗儀鳯中為侍中時侍中許圉師處俊之舅早同州里俱官逹於時又其鄉人田氏彭氏以殖貨見稱故江淮間為之語曰貴如許郝富如田彭馬燧為司徒京師貲貨甲天下燧既卒子暢承舊業屢為豪幸邀取徳宗貞元末中尉楊志亷諷暢令獻田園第宅順宗復賜焉晉張籛初仕後唐始在雍州因春景舒和出游近郊憇於大塜之上忽有黄雀衘一銅錢置於前而去未幾復於衙院晝卧見二鷰相鬭鬭畢各衘一錢落於籛首籛前後所獲三錢嘗祕於巾箱識者以為大富之徴莊宗同光末為西都知府先是魏王繼岌西征廻至咸陽時渭水暴漲籛斷浮橋魏王至渭南自經死所有隨行輜車蜀川珍貨女伎寳馬並為籛所有籛由是家財巨萬明宗朝居環衛時湖南馬希範與籛有舊奏朝廷請命為使允之籛宻賫蜀之竒貨徃焉又獲十餘萬緡以歸籛出入有庖者十人從行食皆水陸之珍鮮厚自奉飬無與為比後終宻州刺史袁正辭父象先梁祖之甥為宋亳節度使在州十餘年積財百餘萬趙在禮歴十餘鎮後為晉昌軍節度使善治生殖貨積財巨萬兩京及所蒞藩鎮皆邸店羅列宋彥筠為太子太師致仕筠性好貨殖能圖什一之利良田甲第相望于郡國及將終以伊洛之間莊十數區上進並籍於官焉好施夫富者是人之所欲者也蓋其芻豢逸樂之所安焉若乃積而能散富而好禮徳義生於心術仁愛出於天然遂能發其多蓄不獨享其豐利由是篤於故舊厚於宗族或恤其乏絶通乎有無或均其禄廪逮於鄉里是皆邁種其徳周人之急博濟而不有其惠重施而匪求其報以至傾匱而不怠乏絶而無悔者焉自非見義忘利為仁由已亦曷以臻此哉欒懐子晉大夫欒盈也懐子好施士多歸之漢蘇武再為典屬國所得賞賜盡以施予昆弟故人家無餘財楊惲為諸吏光禄勲親近用事初惲受父財五百萬及身封侯皆以分宗族後母無子財亦數百萬死皆予惲惲盡復分後母昆弟再受貲千餘萬皆以分施其輕財好義如此朱邑為大司農居家儉節禄賜以供九族鄉黨家亡餘財張臨安世曽孫嗣平原侯臨且死分施宗族故舊言將死之時多以財分施樓䕶為諫大夫使郡國䕶假貸官以物假貸貧人令䕶監之多持幣帛過齊上書求上先人冢因㑹宗族故人各以親疏與束帛一日散百金之費郇越字臣仲太原人以明經飭行顯名於世越散其先人貲千餘萬以分施九族州里志節尤高郡舉孝亷數病出官後漢馬援王莽時游隴漢間嘗謂賔客曰丈夫為志窮當益堅老當益壯因處田牧至有牛馬羊數千頭糓數萬斛既而嘆曰凡殖貨財產貴其能賑也否則守錢虜耳乃盡散以班昆弟故舊身衣羊裘皮袴位至伏波將軍王丹京兆人王莽時連徴不起家累千金隱居飬志好施周急後位太子太傅樊重南陽湖陽人也營理產業貲至巨萬而賑贍宗族恩加鄉閭外孫何氏兄弟爭財重恥之以田二頃觧其忿訟縣中稱美推為三老重年八十餘終其素所假貸人間數百萬遺令焚削文契債家聞者皆慙爭徃償之諸子從勑竟不肯受冦恂為執金吾歴河内潁川汝南太守封雍奴侯恂經明行修名重朝廷所得秩俸厚施朋友故人及從吏士嘗曰吾因士大夫以致此其可獨享之乎時人歸其長者以為有宰相器郭伋為并州牧徴為大中大夫賜宅一區及帷帳錢糓以充其家伋輒散與宗親九族無所遺餘梁竦字叔敬陵鄉侯統之子性好施不事產業長嫂舞隂公主臣欽若等曰竦兄松尚光武女贍給諸梁親疎有序特重敬竦雖衣食器物必有加異竦悉分與親族自無所服服猶用也辟命交至並不受宋宏為大司空封枸邑侯所得租俸分贍九族家無資產以清行致稱包咸為鴻臚明帝以咸有師傅恩而素清苦嘗特賞賜珍玩束帛俸禄増於諸卿咸散與諸生之貧者童恢父仲玉瑯琊姑幕人也遭世凶荒傾家賑恤九族鄉里頼全者以百數周楊少孤微嘗修逆旅逆旅客舍也以供過客而不受其報竇固為大將軍性謙儉愛人好施士以此稱之韋彪為大鴻臚行司徒事彪清儉好施禄賜分與宗族家無餘財亷范為蜀郡太守數年坐法免歸鄉里范世在邊廣田地積財粟悉以賑宗族朋友宣秉為大司徒司直所得俸禄輒以牧飬宗族其孤弱者分與田地自無擔石之儲趙典為太常每得賞賜輒分與諸生之貧者張奮為司空純之子襲爵富平侯少好學節儉行義嘗分捐租俸贍恤宗親雖至傾匱而施與不怠梁商為大將軍每有饑饉輒載租糓於城門外賑與貧餒不宣已惠桓鸞字始春少立操行推財孤寡分賄朋友㤗於待賢狹於飬已常著大布緼袍糲食醋餐位議郎馮緄巴郡宕渠人父煥幽州刺史緄家富好施賑赴窮急為州里所歸愛緄位廷尉种暠父為定陶令有財三千萬父卒暠悉以賑䘏宗族及邑里之貧者荀淑為朗陵侯相頃之棄官歸閒居飬志產業每増輒以贍宗族知友鄧訓為郎中樂施下士士大夫多歸之傅育食禄數十年秩俸贍給知友妻子不免操井臼折像廣漢雒人父國有貲財二億家僮八百人及國卒像感多藏厚亡之義乃散金帛貲產周施親疎或諫像曰君三男兩女孫息盈前當増益產業何為坐自單竭乎像曰昔鬬子文有言我乃逃禍非避富也吾門户殖財日乆盈滿之咎道家所忌今世將衰子又不才不仁而富謂之不幸牆隟而高其隳必疾也知者聞之咸服焉鄧綝為謁者屯田三輔臨發之日散千金之產分與兄弟甥舅族親各有差品朱儁少為縣門下書佐好義輕財鄉閭敬之荀恁少修清節資財千萬父越卒悉散與九族劉翊潁川人家世豐產常能周施而不有其惠後黄巾賊起郡縣饑荒翊救給乏絶資其食者數百人鄉族貧者死亡則為具殯𦵏婺獨則助營妻娶後遷陳留太守翊散所握珍玩唯餘車馬自載東歸出闗數百里見士大夫病亡道次翊以馬易棺脫衣斂之又逢知故困餒於路不忍委去因殺所駕牛以救其乏遂俱餓死魏温恢字曼基太原祁人父恕漢末為涿郡太守卒恢年十五送䘮還歸鄉里内足於財恢曰世方亂安以富為一朝盡散賑施宗族州里高之比之郇越位凉州刺史田疇漢末不就袁尚辟盡將其家屬及宗人三百餘家居鄴太祖賜疇車馬糓帛皆散之宗族知舊張範河内人太祖以為議郎叅丞相軍事救恤窮乏家無所餘中外孤寡皆歸焉毛价陳留人為太祖丞相東曹掾雖居顯位賞賜以賑施貧族家無所餘袁渙為太祖丞相軍祭酒前後得賜甚多皆散盡之家無所儲終不問產業乏則取之於人不為皦察之行然時人服其清管寧北海朱虚人每所居姻親知舊鄰里有困窮者家儲雖不盈擔石必分以贍救之位大中大夫吳張允為大帝東曹掾輕財重士名顯州郡魯肅臨淮東城人生而失父與祖母居家富於財性好施與爾時天下已亂肅不治家事大散財貨摽賣田地以賑窮弊結士為務甚得鄉邑歡心周瑜為居巢長將數百人過候肅并求資糧肅家有兩囷米各三千斛肅乃指一囷與周瑜瑜益知其竒也遂相親結定僑札之分肅位横江將軍朱據尚大帝公主為左將軍封雲陽侯謙虚接士輕財好施陳武為五校督仁厚好施鄉里逺方客多依託之全琮父柔為桂陽太守柔嘗使琮齎米數千斛到吳有所市易琮至皆散用空船而還柔大怒琮頓首曰愚以所市非急而士大夫方有倒懸之患故便賑贍不及啟報柔更以竒之是時中州士避亂而南依琮居者以百數琮傾家給濟與共有無遂顯名逺近嚴畯為衛尉不畜禄賜皆散之親戚知故家常不充晉劉實為太傅以老疾遜位實雖處榮寵居無第宅所得俸禄贍恤親故盧欽歴宰州郡禄俸散之親故不營貲產王衍字夷甫父為平北將軍卒於北平送故甚厚為親識之所借貸因以捨之數年之間家資罄盡出就洛城西田園而居焉位至司徒周訪少沉毅謙而能讓果於斷割周窮賑乏家無餘財位梁州刺史祖逖字士雅兄該納等並開爽有才幹逖輕財有節尚每至諸田舎輙稱兄意散糓帛以賙貧乏鄉黨親族以是重之位豫州刺史郄超愔之弟愔聚斂積錢數千萬嘗開庫任超所取超性好施一日中散與親故都盡超位司徒左長史羅憲性方亮嚴整待士無倦輕財好施不營產業位陵江將軍宋劉懐慎為五兵尚書加散騎常侍䕶軍將軍將禄賜班於宗族家無餘財劉䖍之誕節不營產業輕財好施後為江夏相南齊褚炫自江夏内史入為吏部尚書罷郡得錢十七萬於石頭並分與親族病無以市藥表自陳觧改授散騎常侍領安成王師崔慰祖父慶緒為梁州刺史資財千萬散與宗族漆器題為日字日字之器流乎逺近王騫歴黄門侍郎司徒右長史不事產業有舊墅在鍾山八十餘頃與諸兄及故舊共佃之嘗謂人曰我不如鄭公業有田四百頃而食常不周以此為愧梁韋叡為散騎常侍䕶軍將軍性慈愛撫孤兄子過於己子歴官所得禄賜皆散之親故家無餘財鄧元起當陽人性任俠好賑施鄉里年少多附之嘗至其西沮田舎有沙門造之乞元起問田人曰有稻㡬何對曰二千斛元起悉以施之時人稱其有大度康絢寛和少喜懼在朝廷見人如不能言號為長厚在省每寒見省官有襤縷者輒遣遺以襦衣其好施如此位衛尉卿張稷為都督青冀二州刺史歴官無蓄聚俸禄皆頒之親故家無餘財范雲初為郡號稱亷㓗及居貴重頗通饋遺然家無蓄積隨散之親友何㸃廬江灊人也性通脱好施與逺近致遺一無所逆隨復散焉蕭眎素為太子中舍人丹陽尹丞初拜高祖賜錢八萬眎素一朝散之親友范述曽為大中大夫還鄉里述曽生平得俸禄皆以分施及老遂壁立無所資以天監八年卒劉歊平原人少好施務周人之急人或遺之亦不拒也久而嘆曰受人者必報不則有愧於人吾固無以報人豈可常有愧乎陳孫瑒為侍中五兵尚書右軍將軍性通㤗有財物散之親友徐陵為侍中太子少傅陵器局深逺容止可觀性又清簡無所營樹禄俸與親族共之大建中食建昌邑邑户送米至于水次陵親戚有貧匱者皆令取之數日便盡陵家尋致乏絶府僚怪而問其故陵云我車牛衣裳可賣餘家有可賣不其周急如此後魏李冲為南部尚書為文明太后所幸恩寵日盛賞賜千萬冲家素清貧於是始為富室而謙以自牧積而能散近自姻族迨於鄉閭莫不分及虚已接物垂念羈寒衰舊淪屈由之躋叙者亦多矣時以此稱之崔敬友為梁郡太守㑹遭所生母憂不拜敬友恭寛接下修身厲節自景明已降頻嵗不登饑寒請丐者皆取足而去又置逆旅於蕭然山南大路之北設食以供行者宇文測尚陽平公主為駙馬都尉性仁恕好施與衣食之外家無蓄積呂顯為鉅鹿太守清貞奉公務存贍䘏妻子不免饑寒胡叟為武威將軍家於宻雲左右皆祗仰其徳嵗時奉以麻衣穀麥叟隨分散之家無餘財年八十而卒令狐仕兄弟四人孝著鄉邑而力田積粟博施不已堯雄為豫州刺史每受人物多所施與賔客徃來禮遺甚厚亦以此見稱北齊李元忠性仁恕家素富實其家人在鄉多有借貸求利元忠每焚契免責鄉人甚敬重之位驃騎大將軍楊愔為右僕射徙尚書令愔自居大位門絶私交輕貨財重仁義前後賞賜積累巨萬散之九族架篋之中唯有書數千卷畢義雲為兖州刺史兼七兵尚書性豪縱頗以施惠為心累世本州刺史家富於財士之匱乏者多有拯濟後周宇文貴好音樂耽奕棋留連不倦然好施愛士時人頗以稱之位太保唐瑾為司中大夫兼内史性好施與家無餘財所得禄賜常散之宗族其尤貧者又割膏腴田宅以賑之所留遺子孫者並墝埆之地朝野以此稱之隋栁謇之為光禄少卿十餘年送光化公主於吐谷渾義成公主於突厥前後奉使得二國所贈馬二千餘匹雜物稱是皆散之宗族家無餘財房彥謙終于涇陽令彦謙家有舊業資產素殷又前後居官所得俸禄皆以周恤親友家無餘財車服器用務存儉素自少及長一言一行未嘗涉私雖致屢空怡然自得嘗從容獨笑顧謂其子𤣥齡曰人皆因禄富我獨以官貧所遺子孫在於清白李士謙趙郡平棘人家富於財躬䖏節儉每以賑施為務隋有天下畢志不仕唐李軌字䖏則武威姑臧人有機辯頗窺書籍家富於財賑窮濟乏人亦以此稱之李勣少與父蓋皆疎財好施拯濟貧乏勣位太子太師李百藥不事產業見人士闕乏莫不極力遺之位宗正卿黄居漢性和厚家富於財見宗族故人多所賑施位懐州刺史劉徳威閨門雍穆接物寛平嘗經管𨽻者頗懐其惠所得財貨多以分贍宗親位同州刺史李進太僕少卿暈之子家素豐贍其於交友能賙貧拯急由是知名位兵部侍郎張廵河南偃師人也素輕財重施人有窘必傾產以給為士友所宗位主客郎中李藩父卒家富於財宗族弔者有挈去不禁愈務散施不數年以貧位平章事王思敬瑯琊人順宗莊憲皇后曽祖思敬富於財而好濟人之急少從軍官至試太子賓客薛苹為浙西觀察使俸禄悉以散親族故人子弟後唐趙鳯性豁逹輕財重義凡士友以窮厄告者必傾其資而餉之或賓友過從飲之食之無倦色位至平章事冊府元龜卷八百十二
