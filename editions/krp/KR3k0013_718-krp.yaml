body:
  text: 册府元龜卷七百十八宋王欽若等撰幕府部才學兩漢而下公府將幕咸得以辟署賓佐咨其䇿畫焉故士之懷才者莫不願伸於知己而效其所長者矣乃有藻翰英發學術淵奥洽聞強識稽古博逹擅筆牘之敏馳文雅之譽辭令尚乎體要書檄暢於事情銘記極於溫潤賦詠臻於典麗用能飛騰光價抑揚望實聳和門之風采為士林之矜式固可以隆賓禮之異數為道義之益友又豈特曵長𥚑託後乗已哉後漢傅毅章帝時為郎中以文雅顯於朝廷車騎將軍馬防外戚尊重請毅為軍司馬及馬氏敗免官歸永元元年車騎將軍竇憲復請毅為記室崔駰為主簿及憲遷大將軍復以毅為司馬班固為中䕶軍憲府文章之盛冠於當世班固永元初為大將軍竇憲中䕶軍與叅議從憲平匈奴固與傅毅之徒皆置幕府以典文章憲登燕然山去塞三千餘里刻石勒功紀漢盛徳令固作銘魏陳琳廣陵人漢末為大將軍何進主簿其後避難冀州袁紹使典文章袁氏敗琳歸太祖太祖謂曰卿昔為本初移書但可罪狀孤而已惡惡止其身何乃上及父祖邪琳謝罪太祖愛其才而不咎以為司空軍謀祭酒管記室宣琳作諸書及檄草成呈太祖太祖先苦頭風是日疾發卧讀琳所作翕然而起曰此愈我病數加厚賜阮瑀陳留人漢末都䕶曹洪欲使掌書記瑀終不為屈太祖以瑀及陳琳為司空軍謀祭酒管記室軍國檄書多琳瑀所作也太祖嘗使瑀作書與韓遂時太祖適近出瑀隨從因於馬上具草書成呈之太祖覽畢欲有所定而竟不能增損繁欽為太祖丞相主簿欽既長於書記又善為詩賦其所與太子書記發喉轉意率皆巧麗徐幹為太祖司空軍謀祭酒掾屬幹聰識洽聞操翰成章太祖特加旌命後為五官將文學董昭為袁紹叅軍事既歸太祖為太祖作書與長安諸將李傕郭汜等各隨輕重致殷勤傅嘏字蘭石司空陳羣辟為掾時散騎常侍劉劭作考課法事下三府嘏著論難劭正始初除尚書郎蜀李朝為先主益州牧别駕從事羣下上先主為漢中王其文朝所造也劉巴字子初為先主左將軍西曹掾先主稱尊號昭告於皇天上帝后土神祗凡諸文誥䇿命皆巴所作呉滕胄善屬文大帝為呉侯時待以賓禮軍國書疏嘗令損益潤色之胡綜字偉則大帝為討虜將軍時以綜為金曹從事累遷書部領右都督自帝統事諸文誥䇿命鄰國書符略皆綜之所造也晉荀勗初為文帝從事中郎記室㑹平蜀還雒與裴秀羊祜共管機密時將發使聘呉並遣當時文士作書與孫皓帝用朂所作皓既報命和親帝謂朂曰君前作書使呉思順勝十萬之衆也劉輿為東海王越左長史越既總錄以輿為上佐賓客滿筵文案盈几遠近書記日有數千終日不倦或以夜繼之皆人人歡暢莫不悅附命議如流酬對欵備時人服其能比之陳遵時稱越府有三才潘滔大才劉輿長才裴邈清才孫惠為東海王越記室專掌文疏越遷太傅以惠為軍諮祭酒數諮訪得失毎造書檄越或驛馬傕之應命立成皆有文采諸葛恢為元帝鎮東叅軍與卞壺並以時譽遷從事中郎兼統記室時四方多務牋疏殷積恢斟酌酬答咸稱折中於時王氏為將軍而恢兄弟及顧含並居顯要劉超以忠謹掌書令時人以帝善任一國之才孔衍避地江東元帝引為安東叅軍專掌記室書令殷積而衍每以稱職見知袁宏為大司馬桓溫府記室溫重其文筆專摠書記後為東征賦賦末列稱過江諸名徳而獨不載桓彞時伏滔先在溫府又與宏善苦諌之宏笑而不答溫知之甚忿而憚宏一時文宗不欲令人顯問後遊青山飲歸命宏同載衆為之懼行數里問宏云聞君作東征賦多稱先賢何故不及家君宏答曰尊公稱謂非下官敢專既未遑啓不敢顯之耳溫疑不實乃曰君欲為何辭宏即答曰風鍳散朗或搜或引身雖可亡道不可殞宣城之節信義為允溫泫然而止後從溫北征作北征賦皆其文之高者伏滔為桓溫叅軍從溫伐袁真至夀陽以淮南屢叛著論二篇名曰正淮羅含為征西將軍桓溫叅軍溫嘗與寮屬讌㑹含後至溫問衆坐曰此何如人或曰可謂荆楚之材溫曰此真江左之秀豈惟荆楚而已徴為尚書郎溫雅重其才又表轉征西户曹叅軍習鑿齒為桓溫别駕善尺牘論議溫甚器遇之時與清談文章之士韓伯伏滔等並相友善宋劉穆之為高祖車騎府記室穆之與叅軍朱齡石並便尺牘嘗於高祖坐與齡石答書自旦至日中穆之得百函齡石得八十函而穆之應對無廢也傅亮愽涉經史尤善文辭為高祖太尉從事中郎掌記室自登庸之始文筆皆是叅軍滕演北征廣固悉委長史王誕及宋國建以至受命表䇿文誥皆亮辭也謝晦為高祖太尉主簿涉獵文義朗贍多通高祖深加愛賞羣僚莫及沈懷文文帝時為揚州治中從事史時議省錄尚書懷文以為非宜上議曰昔天官正紀六典序職載師掌均七府成務所以翼平辰衡經賛邦極故總屬之原著夫官典和統之要昭於國言夏因虞禮有深冢司之則用承殷法無損掌邦之儀用乃調佐王均緝亮帝度而式憲之軌宏正漢庭述章之範崇明魏室雖條錄之名立稱於中代總釐之實不愆於自古比代相沿歴朝罔貳及乎爵以事變級以時改皆興替之道無害國章八統元任靡或省革按台輔之職三曰禮典以和邦國以統百官四曰政典以平邦國以正百官鄭康成云冢宰之於庶寮無所不總也考於兹義備於典文詳古凖今不冝虚廢帝從之南齊孔稚珪任宋為尚書殿中郎太祖為驃騎以稚珪有文翰取為記室叅軍與江淹對掌辭筆劉繪為豫章王嶷驃騎主簿繪聰警有文義善𨽻書數被賞召進對華敏僚吏之中見遇莫及瑯邪王詡為功曹以吏能自進嶷謂僚佐曰吾雖不能得應嗣陳蕃然閣下自有二驥也謝朓為隨王子隆鎮西功曹轉文學子隆在荆州好辭賦數集僚友朓以文才尤被賞愛流連晤語不捨日夕長史王秀之以朓年少密啓武帝遷新安王中軍記室朓牋辭子隆曰朓聞潢汙之水思朝宗而每竭駑蹇之乗希沃若而中疲何則臯壤揺落對之惆悵岐路西東或以嗚邑而乃服義徒擁歸志莫從邈若墜雨飄似秋蔕朓實庸流行能無算屬天地休明山川受納褒採一介搜揚小善捨耒塲圃奉筆園東汎三江西浮七澤契闊戎旃從容讌語長裾日曵後乗載脂榮立府庭恩加顔色沐髪晞陽未測涯涘撫臆論報早誓肌骨不寤滄溟末運波臣自蕩渤澥方春旅翮先謝清切藩房寂寞舊蓽輕舟反泝弔影獨留白雲在天龍門不見去徳滋永思徳滋深唯待清江可望俟歸艎於春渚朱邸方開效蓬心於秋實如其簪履或存衽席無改雖復身填溝壑猶望妻子知歸攬涕告辭悲來横集及為尚書殿中郎明帝輔政以朓為驃騎諮議領記室掌霸府文筆王秀之為豫章王驃騎長史王於荆州立學以秀之領儒林祭酒梁王僧孺仕齊為太學愽士尚書僕射王晏深相賞好晏為丹陽尹召補郡功曹使僧孺撰東宫新記范雲為齊竟陵王子良㑹稽主簿子良尅日登秦望山及命雲雲以山上有秦始皇刻石此文三句一韻人多作兩句讀之並不得韻又皆大篆人多不識乃夜取史記讀之令上口明日登山子良令賓僚讀之皆茫然不識末問雲雲曰下官嘗讀史記見此刻石文乃進讀之如流子良大悅因以為上賓自是寵冠府朝江淹字文通齊高帝輔政聞其才召為驃騎叅軍及荆州刺史沈攸之作亂是時軍書表記皆使淹具草相國建補記室叅軍事任昉齊永明初衛將軍王儉領丹陽尹引為主簿儉每見其文必三復殷勤以為當時無軰曰自傳季友已來始復見於任子若孔門是用入其室升其堂於是令昉作一文及見曰正得吾腹中之欲乃出自作文令昉㸃正昉因定數字儉拊几嘆曰後世誰知子定吾文其見知如此後為司徒竟陵王記室叅軍時瑯邪王融有雋才自謂無對當時見昉之文怳然自失裴邃河東聞喜人齊建武初刺史蕭遥昌引為府主簿壽陽有八公山廟遥昌為立碑使邃為文甚見稱賞丘遲字希範齊末為殿中郎高祖平建業引為驃騎主簿甚被禮遇時勸進梁王及殊禮皆遲文也天監四年中軍將軍臨川王宏北伐遲為諮議叅軍領記室時陳伯之在北與魏軍來拒遲以書喻之伯之遂降鍾嶸字仲偉天監中衡陽王元簡出守㑹稽引為寜朔記室專掌文翰時居士何裔築室若邪山山發洪水漂拔樹石而裔室獨存元簡命嶸作瑞室頌以旌表之辭甚典麗顏恊為元帝湘東王荆州記室時呉郡顧恊亦在藩邸與恊同名才學相亞府中稱為二恊劉緩字含度少知名歴安西湘東王記室時西府盛集文學緩居其首周宏直㓜而聰敏為元帝外兵記室叅軍與東海鮑泉南陽宗懍平原劉緩沛郡劉㲄同掌書記劉㲄為元帝中記室大清中侯景亂帝承制上流書檄多委㲄焉蕭子範為大司馬南平王户曹屬從事中郎王愛文學士子範偏被恩遇帝曰此宗室竒才也使製千字文其辭甚美王命記室蔡遠注釋之由是府中文筆皆使具草後梁蔡大寶初為岳陽王詧諮議叅軍元帝與河東王譽結隙詧令大寶使江陵以觀之元帝素知大寶見之甚悅乃示所製𤣥覽賦令注解焉三日而畢元帝大嗟賞之贈遺甚厚陳王勱仕梁為南滁州别駕從事史大同末武帝謁園陵道出朱方勱隨例迎候勅勱令從輦側所經山川莫不顧問勱隨事應對咸有故實又從登北顧樓賦詩辭義清典帝甚嘉之孔奐梁時為揚州刺史王僧辨治中從事史時侯景新平每事草創憲章故事無復存者奐博物强識甄明故實問無不識儀注體式牋表書翰皆出於奐趙知禮字齊旦天水人高祖之討元景仲或薦之引為記室知禮為文贍速毎占授軍書下筆便就率皆稱㫖及征侯景軍至白茅灣上表於梁元帝及與王僧辯論軍事其文並知禮所製蔡景歴為高祖記室高祖將討王僧辨獨與侯安都等數人謀之景歴弗之知也部分既畢召令草檄景歴援筆立成辭義感激事皆稱㫖僧辨誅高祖輔政除從事中郎掌記室如故徐伯陽初為司空侯安都府記室叅軍事安都素聞其名見之降席為禮時甘露降樂遊苑詔賜安都令伯陽為謝表文帝覽而奇之毛喜天嘉中為宣帝驃騎將軍府諮議叅軍領中記室府朝文翰皆喜詞也文帝謂宣帝曰我諸子皆以伯為名汝諸兒宜用叔為稱宣帝以訪於喜喜即條牒自古名賢杜叔英虞叔卿等二十餘人以啟帝稱善後魏胡方回初為赫連屈丐中書侍郎大武破赫連昌方回入國雖雅有才尚未為時所知也後為北鎮司馬為鎮脩表有所稱慶大武覽而嗟歎問誰所作既知方回召為中書博士賜爵臨涇子張普惠為任城王澄司空倉曹叅軍澄之表議書記多出普惠溫子升字鵬舉為廣陽王深東北道行臺郎中時黄門郎徐訖受四方表啓答之敏速於深獨沉思曰彼有溫郎中才藻可畏袁躍為太傅清河王懌文學雅為懌所愛賞懌之文表多出於躍王偉為侯景行臺郎中武定中景據河南齊文襄令韓軌討之不克議者咸云侯景猶有北望之心乃遺景書景復答文襄覽之問誰為作或曰其行臺郎王偉王曰偉才如此何因不使我知北齊楊愔為神武行臺郎時神武攻鄴未下命愔作祭文燎畢而城陷由是轉大行臺右丞於是霸圖草創軍國務廣文檄敎令皆自愔出後周盧柔為太祖行臺郎中除從事中郎時沙苑之役大軍屢㨗汝潁之間多舉義來附書翰往反日百餘牒柔隨機報答皆合事宜田徽為太祖夏州記室叅軍時軍國草創幕府務殷四方書檄皆徽之辭也裴俠字嵩和河東解人時王思政鎮玉壁歸於太祖乃以俠為長史齊神武以書招思政思政令俠草報書甚壯烈太祖善之曰雖魯仲連無以加也元偉字猷道少好學有文性尉遲迥伐蜀以偉為司錄書檄文記皆偉之所為裴漢初仕魏為大丞相府屬曹叅軍漢善尺牘尤便簿領理識明贍决斷如流相府為之語曰日下燦爛有裴漢劉璠初為梁雍州刺史蕭循司馬循在漢中與蕭紀牋及答國家書移襄陽文皆璠之辭也隋劉臻字宣摯周末為冢宰宇文䕶中外府記室軍書羽檄多成其手李徳林為高祖大丞相府屬未㡬而三方亂軍書羽檄朝夕填委一日之中動逾百數或機速競發口授數人文意百端不加治㸃進授丞相府從事内中郎禪代之際其相國摠百揆九錫殊禮詔䇿牋表璽書皆徳林之詞也祖君彦大業中位至東平郡書佐郡陷翟讓因為李密所得密甚禮之署為記室軍書羽檄皆成其手唐魏徴字𤣥成隋末武陽郡丞元寶藏舉兵以應李密召徴使典書記密每見寶藏文疏未嘗不稱善既聞徵所為遽使召之徴進十䇿以干密密雖奇之而不能用陳叔達高祖建議為丞相主簿禪代文誥多叔逹所為尋拜黄門侍郎房𤣥齡為秦府記室叅軍時戎軒歲警羽檄交馳出入十年嘗典管記每軍書表奏駐馬立成文約理贍初無藳草薛收為天䇿府記室叅軍太宗初授天䇿上將尚書令命收與虞世南並作第一讓表竟用收者太宗曾侍高祖遊後園池中獲一白魚命收為獻表收授筆立疏不復停思時人推其二表贍而速薛元敬有文學為從父收之亞武徳初為天䇿府叅軍事署學士與許敬宗俱以本官直記室張昌齡為崑山道行軍記室破盧明月平龜兹軍書露布皆昌齡之文也韋承慶為雍王府叅軍府中文翰皆出於承慶詞藻之美擅於一時又嘗扈從九成宫為山詩十首文理清暢屬和者數百令狐楚為太原掌書記時節度使鄭儋在鎮暴卒不及指撝後事軍中諠譁將欲有變中夜忽數十騎持刃廹楚至軍門諸將逼之令草遺表楚在白刃之中搦管立成讀示三軍無不感泣由是名聲益重李商隱為令狐楚天平宣武廵官商隱能為古文不喜偶對楚能章奏遂以其道授商隱自是始為今體章奏傅學強記下筆不能自休善為誄奠之詞與太原溫庭筠南郡段成式齊名時號三才商隱後為河陽王茂元掌書記桂州鄭亞東蜀柳仲郢判官有表狀集四十卷劉三復長於章奏李徳裕始鎮浙西迄於淮甸皆叅佐賓筵軍政之餘與之吟咏終日李巨川為王重榮河中掌書記時僖宗在蜀賊據京師重榮糾合諸藩恊力殄冦軍書奏請堆案盈几巨川文思敏速翰動如飛傳之藩鄰無不聳動後為韓建華州掌書記時昭宗駐蹕於華建以一州之力供億萬乗慮其不濟遣巨川傳檄天下請助轉餉同輔王室四方書檄醻報輻輳巨川灑翰陳叙文理俱愜昭宗深重之梁李珽為太祖掌書記滄州節度使劉守文拒命太祖引兵十餘萬圍之久而未下乃召珽草檄班師即就外次筆不停輟登時而成大為太祖嗟賞後唐李襲吉為武皇河東節度副使好學有筆述雖軍前馬上手不釋卷凡太原自中和末所發牋奏軍書皆襲吉所為也昭宗重其文章因入奏授諫議大夫使上事北省以榮之上事竟遣歸太原復其戎職馬郁幽州人少警悟有俊才多智數言辨縱横下筆成文乾寜末為幽州府刀筆小吏時節帥李威為王鎔所殺鎔書報其弟儔云威謀危軍府衷甲竊發與三軍接戰而死儔遣使於鎔問謀亂本末幕客為書多不知㫖郁時直記室即起草為之條列事狀云可疑者十詞理俊贍以此知名因得署幕職後在莊宗幕府自李襲吉卒後每有四方會盟書檄多命郁為之答呉蜀書與王檀檄皆郁文也盧汝弼初仕唐為祠部郎中知制誥天佑三年歸於武皇代李襲吉為副使軍國政務委其叅决汝弼美書翰文彩綺麗人士稱之司空頲初為羅紹威魏州掌書記後為楊師厚招討判官師厚卒賀徳倫初至三軍亂張彦召徳倫判官王正言令草奏正言本非文士又為亂兵所廹汗流浹背秉筆不能措一詞張彦怒排之榻下曰鈍漢辱我叱書吏曰誰能為吾草奏者吏曰司空郎中羅令公幕客有俊才即馳騎召之頲已被剽奪敝衣而至長揖彦即操筆於白刃間神氣自若筆不停輟連草數奏張彦讀至軍府無非甚切朝廷却以為閒必若四向取謀但恐六州俱失彦甚怪其意即日與之僕馬乃令徳倫請為判官李愚同光末自翰林學士為魏王繼岌伐蜀都統判官是時幕府軍書羽檄皆出其手蜀平就拜中書舍人周張沆後唐明宗朝擢進士第秦王從榮為河南尹表沆為廵官王童年疎率動不由禮每賔僚大集手自出題令面賦詩小不如意則壞裂抵棄沆初通刺屬合座客各為南湖㕔記謂沆曰聞生名請為此文沆不獲已措翰及羣士記成獨取沆所為勒之於石繇是署職王仁裕初仕後唐為王思同西京留守判官及思同敗績廢帝素聞其名召令隨駕入雒沿路書詔皆出仁裕之手册府元龜卷七百十八
