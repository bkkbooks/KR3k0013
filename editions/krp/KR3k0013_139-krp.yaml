body:
  text: 册府元龜卷一百三十九宋王欽若等撰帝王部旌表第三唐中宗神龍元年詔曰虢州人故楊初成徃者運屬殷憂志懐忠讜將迎六飛之駕奄罹五刑之罰身既伏誅家又從坐言念誠節深可哀矜宜有褒榮式旌忠順可贈左驍衛左一府郎將初成虢州人垂拱中偽稱郎將於東都市宣勑募人欲迎帝於房陵事覺坐斬籍沒其家至是旌表焉又故司空太子太師英國公李勣徃坐其孫敬業搆逆毁廢墳塋至是帝思其佐命功追復官爵命所司為起墳改葬三月以故司僕少卿徐有功執法平恕追贈越州都督仍遣使就其家弔祭令所司與一子官二年十二月贈廬州刺史朱敬則秘書監褒異行也敬則亳州人嘗與三從兄同居四十餘年財物無異三年六月乙亥旌表江夏潘元祚門閭以其居䘮結廬墓次負土成墳也睿宗唐隆元年六月下詔曰故許州司兵燕欽融先陳忠讜頗列章奏雖干非其位而進不顧身永言奄忽誠可傷悼方開諌路宜慰窀穸可贈諌議大夫仍令備禮改葬初景龍四年欽融以韋后干政連上䟽切諌韋氏等大怒勸中宗召之欽融因而致死帝踐祚以其言多切三下制贈焉郭岌定州人也亦備諌韋氏韋氏又勸杖殺之帝即祚甚加傷悼贈諌議大夫又制曰慎終追逺斯乃舊章表徳旌賢有光常䇿故中書令裴炎含和禀粹履信居貞望重國華才稱人秀惟幾成務績宜於代工偶俱無猜義深於奉上文明之際王室多虞保乂朕躬實著誠節而危疑起釁倉卒罹災嵗月屢遷丘封莫樹永言先正感悼良多宜追賁於九原俾増榮於萬古可贈益州大都督先是永淳中太后臨朝武承嗣請立武氏七廟中書令裴炎進諌太后不悦而止後崔燦上言炎有異圖胡元範符儼皆明其無罪太后不納令斬於都亭驛前故有是贈七月册立皇太子大赦天下自神龍已來直諌枉遭非命咸令封植其墓又追贈故韋月將為宣州刺史景雲二年八月追贈故滑州韋城縣尉張仲之為饒州長史旌義烈也𤣥宗即位下制曰以忠報國典册所稱感義捐軀名節斯在故右羽林衛大將軍上柱國遼陽郡王李多祚三韓貴種百戰餘雄席寵禁營廼心王室挺兹誠信翻䧟誅夷頼彼神明重覆姦慝永言徽烈深合褒崇宜追歿後之榮以復生前之命可還舊官仍宥其妻子多祚初為右羽林將軍節愍太子之舉兵也令多祚率衆先至𤣥武樓下冀帝聞以誅三思之意竟案兵不戰俄為左右所殺時年五十餘是日并其二子壻併命焉妻子並從籍沒至是追復又下制曰故蘇安常文學基身鯁直成操徃年抗䟽忠讜可嘉屬回邪擅權奄從非命興言軫悼用惻於懐宜贈寵章式旌徽烈可贈諌議大夫仍宥其妻子安常中宗時以事連節愍太子被殺故旌之先天二年七月詔曰太平公主子薛崇簡執心奉國勵節忘私早辯忠邪每有規諌因被嫌嫉加以鞭笞事不見從忠實可紀宜甄逆順復其官爵仍賜姓李太平公主謀逆諸子皆伏誅唯崇簡以先諌公主屢被鞭撻故得賜姓官爵如故是嵗有司奏孝子王知道母患骨蒸醫云須得生人肉食之知道遂宻割股上肉半斤許加五味以進母母食之便愈即託他疾卧不令母知州縣以狀聞宰相請賜束帛帝曰宜與一官以旌孝行是年江西道按察使上言東陵人唐君祐䘮母哀感鄉曲廬於墓側有芝草三莖生焉長沙人嚴待封少為祖母所飬祖母死居䘮三載負土成墳手植松檟百餘株澧陽人張仁興五代同居其家堂後生一草彩色甚茂並有勅旌表門閭開元二年正月乙酉制曰崔𤣥暐張柬之等徃以神龍之初保乂王室奸臣所忌讁居炎海流落變衰感激忠義𤣥暐嗣子吏部郎中璩清才雅韻静守専直柬之嫡孫毖祖考繼歿遺孤可傷彼勲業之下淪佇名賢之必復是得景倩而悲仲宣者也髙祖封樂毅之後武帝求蕭何之裔斯不逺哉昭於徳義緬懐前烈宜加後命璩毖並可朝散大夫二月乙亥以徐有功之子曰倫自大理司直為恭陵令勑曰其父昔為理官時宻刑網遂能堅守忠直每抗回邪海内稱其不寃朝廷頼其惟恤永言種徳必歸餘慶宜甄嗣子俾勸羣臣十月帝以王海賔單騎赴難勇冠羣帥及臨洮之役輕敵致䧟身殁功存誠節尤著乃詔贈左金吾衛大將軍賻物三百匹米粟三百石䘮事並官供命紫㣲舍人倪若水弔祭仍與一子五品官下制曰盤矛赴敵義光忠壯免胄捐軀情殷悼惜故防禦羣牧使豐安軍使右衛率府率王海賔七卒楨幹萬里長城抱鐡石於胸襟運韜鈐於掌握屬犬羊為冦牧圉罹災出車狥其征討躍馬先其掩襲挫彼鋒銳殱厥渠魁充國持邉佇終文畧建威臨陣忽䘮驍雄興言震懐思有褒羙宜加大將之禮兼茂后昆之秩四年十一月黄門盧懐慎卒明年帝於城南望見懐慎别業方設大祥齋帝憫其貧困歎息久之下詔曰故銀青光禄大夫檢校黄門監上柱國范陽縣開國伯贈荆州都督盧懐慎衣冠重望廊廟周材訏謨當三傑之一學行揔四科之二等平勃之輔漢同季文之相魯質隣於古儉實可師雖清白燕翼籯金非寳然妻孥貧窶擔石屢空言念平昔彌深軫悼宜恤凌統之孤用旌晏嬰之徳宜賜其家物一百叚米粟二百石因制中書侍郎蘇頲為之碑文仍親禮焉六年十二月以鄂州人潘元祚屢辭弓旌獨守墳墓行能勵俗學可為師拜左拾遺内供奉仍直左春坊侍皇太子讀書十一年行幸北都太原人趙栖桐隠居有道年暮羸痺詔就其私第拜著作郎仍聼致仕賜帛五十疋十四年宋州奏單父人劉九江三代同居有慈烏巢於庭户鄉里榮之名其鄉曰邕睦鄉里曰同居里請旌表其門許之是年鎮州鹿泉人李處恭張義貞青州北海人吕元簡定州鼓城人彭思義及蔡州孝女楊氏等並以孝義聞著旌表其門處恭與義貞異姓同居於今三代凡百餘年元簡四代同居所食六畜皆異母同乳思義居䘮至孝廬於墓側有嘉禾生及白兎馴擾十五年九月制曰故益州長史張守㓗故桂州都督員嘉静等並授委藩鎮克著勤勞奄隨化徃良深震悼言念旅櫬猶在遐方用加優恤以慰泉壌宜官造靈轝給傳還鄉所縁葬事並委有司支給是嵗華隂人韓思訥六代同居特旌其門二十年三月以右驍衛將軍同正員安金藏忠節見於先朝特封為代國王仍於東嶽西嶽等鐫碑勒其名制曰義不辭難忠為令徳保祐君主安固邦家則必荷寵光之休膺土宇之錫安金藏忠義奉國精誠事君徃属酷吏肆兇潜行謀搆當疑懼之際激忠烈之誠突刅刻心保明先聖見危授命沮奸邪之慝轉禍存福獲明夷之貞雖鳴玉衘珠已備於休命而疇庸䟽爵未洽於殊榮宜錫寵於珪組兼勒名於金石二十三年三月河北採訪使張守珪奏相州湯陽縣有孝子石仵奴請旌表門閭許之仵奴三嵗䘮親廬於墓側凡二十餘年塋内有楛樹重生枝葉羣鳥馴擾鄉里咸敬異之閏十一月相州又奏孝子石仵奴塋内有寒竹抽笋數十枝望旌表其門以章孝理許之二十四年制曰貴徳尊賢餙終念徃此聖人所以理天下厚風俗也王友貞禀氣元精遊心太朴孝惟不匱獨貫於明時道則難名髙謝於人代言念錫類方期化俗遽爾凋殂良深愍悼生無大位雖隔外臣之儀没有餘榮宜贈上卿之服可贈光禄大夫仍令州縣長官弔祭友貞長安人歴位長水縣令後罷歸田里中宗在春宫召為司議郎不就神龍初又拜太子舍人仍令所司以禮徴赴乃以疾辭制曰敦夷齊之行可以激貪尚顔閔之道用能勸俗新除太子中舍人王友貞徳義泉藪人倫茂異孝愛始於事親忠信表於行已富在文史亷於財貨久歴官常累聞課績有古人之風保君子之徳乃抗志塵外棲情物表深歸觧脱之門誓守薰脩之誡須加徴命作䕶儲闈固在辭榮陳情懇至朕方崇奨亷退懲静澆浮雖思廊廟之賢豈違山林之願宜加優秩仍遂雅懐可太子中舍人員外置給全禄以畢其身任其在家脩道仍令所在州縣存問四時送禄至其住所帝在東宫又表請備禮徴之以年老竟辭疾不赴是嵗九十餘卒故有褒贈二十五年五月己亥京兆人張阿九母疾阿九割股肉饋之厥疾遂愈先是同郡趙言亦以割股飬母聞帝嘉之賜阿九及言物各五十叚以旌孝行天寳四載二月京兆府奉天縣人趙正言母病割股肉以餌母疾瘳賜物五十叚以資孝飬華原人韓難陀父亡廬於墓側凡十六載金城女董氏家無兄弟孝飬不嫁父亡廬於墓側凡六載並表其門閭賜以粟帛三月陳留郡封丘人楊嵩珪母亡負土成墳於所居别立靈几畫父母形貎享祀十有餘載尉氏縣人楊思貞父亡廬於墓三十八載有芝草白兎甘露等瑞並賜粟帛旌表門閭四月冀州人燕遺倩既孤於堂中刻木為父母形象施帷帳衣服如存朝夕奠祭鄉閭甚敬異之蜀郡人郭景華孝行過人父䘮明景華晝夜啼泣宅中忽湧甘泉因以洗目漸明東陽郡人應先父亡廬於墓側有芝草連理樹生並旌表門閭以昭孝行十五載袁光庭為伊州刺史禄山之亂西北邉戍兵入赴難河隴郡邑皆為吐蕃所㧞惟光庭守伊州累年救不至虜乃百端誘說終不降屈部下如一及矢石既盡粮儲並竭城將䧟没光庭手殺其妻子自焚而死朝廷聞之贈工部尚書王君奭判凉州都督為吐蕃所殺帝甚痛惜之制贈特進荆州大都督給靈轝遞歸京師葬事並官給賻物三百叚粟三百斛仍令鴻臚卿一人充使監䕶韓思復睿宗朝為給事中活嚴善思於雷霆之下拒武三思於謟附之中帝御筆題碑云有唐忠孝韓長公之墓肅宗至徳二年二月大赦詔曰賊䧟兩京文武常參官及諸州刺史有絶脰仰藥不事叛人為衆所知者量加優贈十二月詔曰忠臣事君有死無貳烈士狗義雖㓕猶存其李憕盧奕顔杲卿袁履謙許逺張廵張介然蔣清龎堅等即與追贈臣欽若等曰自李憕以下並為安禄山亂死王事也三年正月詔内外文武官䧟在縣中潜藏不出或託疾不仕忠節可嘉並與成考是月京兆尹李峴奏奉天縣百姓滑清泌父茂先疾亟清泌割右股肉方圓二寸與父食之病乃痊詔清泌宜與官以旌孝道二月詔天下州縣有遭逆賊攻擊堅守不下竟以獲全其官人百姓中有誠効灼然為衆所知者宜令本道使案驗奏聞據狀迹酬其官賞身亡没者重加褒贈有父母存者仍與一官及邑號無父母者與一官如有一家丁壯盡被屠害其父母妻子仍令州縣以官物賑恤并量造舍宇使得安存乾元二年北庭行營使李嗣業自正月與諸將同圍相州是時築隄引潼水灌城經月餘城不㧞時軍無統帥諸將各自圖全人無鬭志賊毎出戰嗣業被堅衝突履鋒冐刅為流矢所中數日瘡欲愈卧於帳中忽聞金鼓之聲因而大呌瘡中血出數升注地而卒帝聞之痛悼而嘆惜之下詔曰臨難亡身為臣之大節念功加贈經國之常典故衛尉卿兼懐州刺史充北庭行營節度使虢國公李嗣業植操沉厚秉心忠烈懐幹時之勇畧有戡難之逺謀久仕邉陲備經任使自兇渠搆亂中夏不寜持感激之誠揔驍果之衆親當矢石頻立勲庸壯節可嘉將謀於百勝忠誠未遂空恨於九泉言念其功良深憫悼死於王事禮有可嘉宜増裂土之封用廣餙終之義可贈武威郡王其賵贈及縁葬事所司倍於常式仍令官給靈轝遞還所在以其子佐國襲其官爵實封二百户代宗寳應元年鳯翔天興人楊播隠居以孝行旌表門閭一云播登進士第隠居不仕𤣥宗徴為諌議大夫棄官就飬以孝行禎祥表其門閭肅宗就加散騎常侍賜號𤣥静先生初播父哲以孝行有異旌其門閭後播子炎為起居舍人辭禄就飬岐下丁父憂廬於墓前號泣不絶聲有紫芝白雀之祥又表其門閭孝著三代門樹六闕焉八月梁州刺史臧希譲上言南鄭縣百姓李貞古孝行彰聞請付所司旌表從之貞古六嵗而孤母欲改嫁貞古雨泣留之母遂守志母未食寝貞古不食寝及母亡負土成墳廬於墓側有猛虎馴於廬前白䑕見於墓門村人異之永泰元年正月京兆尹第五琦奏奉天縣竇昇朝二女伯娘仲娘雖長於村野而㓜有志操住於邠州接界草賊數千人持兵刅入其村落行剽刼聞二女有容色姊年十九妹年十六嵗藏於巖窟間賊徒擬為逼辱乃先曵伯娘出行數十歩又曵仲娘出賊相顧自慰行臨深谷伯娘曰我豈受賊汚辱乃投身於谷賊方驚駭仲娘又投於谷谷深數百尺姊尋卒仲娘脚折首破血流被體氣絶良久而蘇賊義而去琦感其貞烈奏之詔旌表門閭仍長免丁役二女葬事官給京兆户曹陸海首賦詩以美之三月河南等道都統黄門侍郎同中書門下平章事王縉奏徐州處士皇甫晅飬母以孝聞請旌表門閭許之是月追贈故徐州蘄縣令李瀾瀾弟渤等官先是東都未平梁宋間羣盗連聚或至二千餘衆攻䧟城邑瀾守蘄縣力屈為盗所執將害之瀾弟渤詣盗請代兄死瀾又請殺身貿弟兄弟争死俱為盗害瀾女原武尉盧甫妻也見父被執號泣請代死亦為盗所害宣慰使吏部侍郎李季卿以節義聞有尉氏尉王泛妻裴氏儀王傅巨卿之女也素有容範為賊所俘賊逼之裴曰吾衣冠之子當死即死終不苟全一命受汚於賊賊惜之臨之以兵逼之以力裴堅罵抗之賊怒乃支觧裴氏至死不屈季卿亦以狀迹聞詔曰鄭州原武尉盧甫亡妻李氏汴州尉氏尉王泛妻裴氏等懿範傳家柔明植性頃因冦難克彰義烈或請代父死表因心之孝或誓逐夫亡標難奪之節宜膺贈餙俾光休美李氏可贈孝昌縣君裴氏贈河南縣君仍編入史册瀾渤亦贈官秩二年六月賜安南節婦金氏兩丁侍飬金氏本賊帥陶齊亮之母以忠義訓齊亮不受遂與齊亮絶自績而衣自田而食州里稱之仍詔本道使每季給銀二兩并衣服以終其身大厯四年二月左千牛薛鋒母病割股肉啖母病愈詔下有司旌表門閭三月睦州司士參軍許利川居母䘮以孝聞有芝草八莖及連理樹一株産於墓廬詔旌表其門閭六月詔曰武徳貞觀之間有若魏徴王珪李靖李勣房𤣥齡杜如晦等扶翼大運勤勞王家尊主庇人匪躬致命咸有一徳格於皇天緬然長懐風烈猶在其後嗣沈翳特加優奨如廟宇荒毁即宜脩葺無徳不報何日忘之六年十月邙州上言依政縣百姓樊漪居父母䘮負土成墳廬於墓側有兎鴿馴擾木連理慈竹自生詔旌表門閭七年七月鎮州上言鼓城縣人陳屺居父䘮被髪廬於墓側不掩墓門哀毁過禮望旌表門閭許之十一月京兆府上言櫟陽縣人董思寵五代同居子孫凡八十餘人友愛敦睦鄉里稱之天寳末冦盗剽掠村閭此家獨全年遭水旱此家獨免至於征税每先於人伏望旌表門閭編諸史册許之八年十二月江南西道觀察使路嗣恭上言信州弋陽人張球父殁五年廬於墓側哀毁過禮墓門塼土生芝草七莖有鵲巢於墓之叢竹請旌表門閭許之九年二月庚辰追贈故河西隴右副元帥都知兵馬使秦州刺史郝廷玉為工部尚書録勲也四月追贈故平盧節度使桞城郡太守劉正臣為工部尚書正臣本名客奴初禄山叛逆正臣越海遣使奉順帝録其誠節故寵之徳宗建中元年十一月詔故侍中平陽郡公贈秦州刺史敬暉重贈太尉故吏部尚書漢陽郡公贈中書令越州刺史張柬之贈司徒故侍中扶陽郡公贈兖州刺史桓彦範贈司徒故中書令博陵郡公贈幽州刺史崔𤣥暐贈太子太師故中書令南陽郡公贈洪州刺史袁恕已贈太子太傅故中書令贈荆州大都督張九齡贈司徒故中書令越國公鍾紹宗贈太子太傅時以國朝將相雖嘗贈而未稱者再贈之故有是命二年三月代州刺史贈太子太師賈循重贈太尉并妻子皆備禮改葬故蘄州刺史贈華州刺史姚誾重贈潞州大都督與其子一人官皆以死王事也五月以澤州人雍先五代共居表其門閭七月贈故伊州刺史袁光庭工部尚書初光庭守伊州虜圍之連嵗不能㧞及力竭將䧟先刅其孥而自焚死焉三年二月贈故成徳軍節度判官檢校司封郎中兼御史中丞邵真户部尚書與一子五品正員官真嘗為李寳臣掌文翰深所信任寳臣死其子惟岳偽領父衆李正已田悦欲其同反各通使於惟岳真泣諌曰先公位兼將相受國厚恩大夫縗絰之中遽欲違命同隣道之惡背先公之志不可田悦與我宻邇絶之恐速禍正已稍逺絶之易耳但令悦使還報請徐思其宜執正已使於京師因請致討朝廷必嘉大夫忠而旌節可得若受節於正已即當臣之為之奈何惟岳許之令真草奏將發孔目吏胡震頗任事言於惟岳曰此事非細請與諸將吏議之至㑹議其鎮州刺史畢華曰先公與二道親好二十年一朝背之不可今執其使送京師大善脱未為朝廷所信正已兵强忽來襲我孤軍無援何以敵之不若仍舊勿絶徐觀其變惟岳又從之真又勸惟岳遣其弟惟簡入朝仍遣軍吏薛廣嗣詣河東節度馬燧軍請從順屯兵東鹿田悦聞其謀使使謂惟岳曰邵真惑亂軍政必速殺之不然吾且自討其罪矣惟岳懼遂殺之故有褒贈四月贈故右僕射禇遂良太尉五月詔曰故河西兼伊西北庭節度觀察使檢校工部尚書兼御史大夫贈太子太保楊休明故河西節度觀察使檢校工部尚書兼侍御史大夫周鼎故西州刺史兼御史中丞李秀璋故𤓰州刺史兼御史中丞知河西節度留後張銑或寄崇方鎮或攝揔留務時屬殷憂並抗貞節率勵將吏誓一其心固守西陲以俟朝命羗戎乘間驟逼城池國家方有内虞未遑外救河隴之右化為虜塲俾我忠良殁身異域彌歴年紀以逮於兹旅柩方旋誠深憫悼故遞加寵贈俾極朝榮式彰茂烈永賁幽壠休明可贈司空鼎可贈太保秀璋可贈户部尚書銑可贈兵部侍郎休明等自至徳後䧟没於吐蕃至是其族各以其柩至故加褒贈休明男燂并將校等追贈者十餘人仍官為殯葬八月太子賔客第五琦卒琦之子峯峯婦鄭氏女皆以孝著旌表其門四年二月將作監田昻亡母亡姨亡妻汾州刺史李再春亡妻其子瑤亡妻等並追贈國夫人昻瑶亡子亡女皆贈官封初昻再春瑶棄其族來降田悦盡㓕其家少長無類瑶至京師授左監門衛將軍再春為汾州刺史兼寵贈其家三月贈故淮寧軍都虞侯兼御史大夫實封一百户周曽太尉益實封二百户故許州鎮遏兵馬使兼御史中丞實封五十户王玢司徒益實封一百五十户故淮寧軍兵馬使兼御史中丞實封五十户吕從賁左僕射益實封一百户故十將試太常卿康秀琳右僕射益封一百户故節度押衙監察御史裏行姚憺兵部尚書賜實封二百户故十將試太子賔客梁興朝户部尚書賜實封一百户故十將試太常卿賈櫟卿刑部尚書賜實封一百户故試太常卿侯仙欽工部尚書實封一百户命散騎常侍蕭昕徃汝州境上以禮致祭并委李勉哥舒曜訪其家以名聞有子者得世父官爵子孫三代過犯者减一等論以淮寧軍節度押衙試殿中監韋清為太子賔客兼御史中丞封安定郡王賜實封一百户其周曽等所賜實封可載於典册傳其子孫初希烈怒哥舒曜收汝州令周曽等以兵三萬來擊曜曽玢憺清等自號四公子因希烈之親吏梁鋭動静輙馳告勉至是曽乃謀於周志欲廽軍據蔡州王玢應於許州姚憺韋清居中殺希烈議定宻令奏之且請毒藥以寘其食得陳藥一丸無效曽等以故久不發初希烈令飬子十人從曽曽次㐮城欲行其志飬子等知其謀亡告希烈乃使其將李克誠率騾軍千人攻殺曽等而收其兵復殺玢憺等始韋清約事洩無得相引清以故幸免然終懼不得脱乃説希烈曰今兵寡勢弱不足以集事請與朱滔使宋少直詣滔乞師希烈信然遣之夜次㐮邑境乃奔歸劉洽希烈聞曽等有變兵亂乃閉壁數日鄭州尉氏賊亦惶駭奔去希烈乃上䟽歸罪曽等率兵還保蔡州是月又贈故衛尉卿兼御史中丞顔杲卿司徒故常山郡太守袁履謙左散騎常侍故許州長史龎堅右散騎甞侍故鞏縣主簿蔣清禮部侍郎并録其子孫履謙妻封氏封申國夫人臣欽若等曰自顔杲卿已下並為安禄山亂死王事也又贈故右驍衛將軍代國公安金藏兵部尚書授其子承恩銀青光禄大夫試殿中監兼廬州長史四月贈故禮部尚書李之芳亡女隴西郡夫人初李克誠既䧟汝州殺掠居人士女賊至李氏家李氏恐逼辱遂投井死八月贈曹孝昌左僕射實封二百户孝昌李希烈之將孝昌以隨州降尋為其將康叔夜所殺復叛故有是贈十月贈左龍武大將軍吕希倩太尉賜實封三百户子孫不絶官爵又贈將軍髙仲傑司空實封三百户子孫不絶官爵初帝避難於奉天朱泚之賊於城東西南三面踰城渾瑊率招召突將三百人分道連戰翼日辰時殺傷太甚賊力屈而退希倩死之俄賊復攻城仲傑力戰而死故有是贈仍官給棺櫬衣服遣宰臣宣㫖致祭興元元年二月帝在奉天詔曰見危致命之謂忠臨義有勇之謂烈惟爾克勵臣節不憚殺身惟朕式嘉乃勲懋昭大典曰台不徳罔克若天遘兹殷憂變起都邑惟爾卿士嗷然靡依逼畏所加淄澠共混故開府儀同三司檢校禮部尚書司農卿上柱國張掖郡王叚秀實操行嶽立忠厚精至義形於色勇必有仁頃者甞鎮涇原克著威惠叛卒知訓咨爾以誠賊泚藏姦欺爾以詐守人臣之大節洞元惡之深情端委國門挺身白刅誓碎兇渠之首以敵君父之讐視死如歸履虎致咥噫天未悔禍事乖垂成雄風壯圖振駭羣盗昔王蠋守死以全節周顗正色而抗詞惟我信臣無愧前哲聲聞寰宇義冠古今足以激勵人倫光昭史册不有殊等之賞孰表非常之功爰議疇庸特超簡限著之甲令樹此風聲可贈太尉謚曰忠烈宣行史官仍賜實封五百户莊宅各一區長子與三品正員官諸子並與五品正員官仍廢朝三日收京城之後以禮葬祭旌表門閭朕承天子人臨馭億兆一夫不獲則予之辜况誠信不逹屢致冦戎使抱義之臣䧟於凶逆有臨危致命殁而愈彰有因事成功權以合道苟利社稷存亡一致酬報之典豈限常員並委所司訪其事跡續具條奏當加褒異錫其井賦圖形雲閣書功鼎彛以彰我有服節死誼之臣傳於不朽是月又贈故商州刺史謝良輔左散騎常侍初涇原兵亂京師後數日商州團練兵亦作亂害良輔焉及此追贈四月贈故吏部郎中郭雄同州刺史詔曰朕越自邦畿至於梁漢而庶尹卿士各勤其職雄以鋒刅之下倉卒遇害親戚阻絶孤魂何依豈不以予一人不徳而使子大夫罹其禍也永言憫惻増軫於懐爰申寵贈俾如常典六月故神䇿京西兵馬使檢校工部尚書兼御史大夫楊惠元贈右僕射仍賜絹百疋惠元男故尚食奉御晟贈殿中監故左衛兵曹參軍暠贈邠州刺史褒死難也惠元以兵屬李懐光建中四年冬自河朔同赴國難觧奉天之圍明年四月懐光既圖叛逆惠元義不受汚脱身奔竄至奉天㑹乘輿南幸李懐光怒惠元之逸令其將冉宗以百餘騎追及於好畤縣惠元計窮父子三人並投人家井中冉宗並出而害之及是各加追贈焉是月給事中孔巢父徃河中宣慰李懐光遇害帝聞而驚悼久之贈尚書左僕射賜其家布帛粟米甚厚仍授一子正員官收復河中日所司備禮葬祭之七月詔曰贈太尉叚秀實天授貞烈激其頽風蒼黄之中宻藴雄斷將舒國難詭收冦兵撓其兇謀果集吾事挺身徑進奮擊渠魁英名凛然振邁千古宜差官致祭并旌表門閭縁葬所要一切官給仍於墓所官為立碑以揚徽烈諸軍將士有身死王事委本使具名銜聞奏即與褒贈又贈故左驍衛大將軍樂平郡王劉海賔太子太保追贈實封一百户臣欽若等曰海賔事具後八月詔贈太尉叚秀實宜令所司即與置廟立碑九月贈故涇原都知兵馬使試太常卿何明禮兵部尚書故推官試晉州别駕岐靈岳贈同州刺史旌死節也初叚秀實與劉海賔及明禮靈岳潜與約剋期誅朱泚事洩皆遇害故有斯贈十月以前太常卿蕭定為太子少師前大理卿蔣沇為右常侍前秘書監程鎮之為太子賔客並以䧟賊不仕褒之也十二月以前祠部郎中王礎為比部郎中前起居舍人鄭南史為司封員外郎前工部員外郎史官脩撰荀尚為駕部員外郎前左庶子張蔇為彭州刺史礎等並朱泚時潜不仕也貞元元年正月詔曰君臣之義生録其功沒厚其禮况才優任國忠至㓕身朕毎興歎勞於寤寐故光禄大夫守太子太師上柱國魯郡公顔真卿器質自天公忠傑出出入四朝堅貞一志屬賊臣擾亂委以存諭拘脅累嵗死而不撓稽其盛節實謂猶生朕致移斯禍慙悼靡及式崇嘉命兼延爾嗣可贈司徒仍賻絹帛五百端米三百石男頵碩等至䘮制終後所司聞奏超授官秩時李希烈䧟汝州宰相盧杞奏顔真卿使諭之既為所廹不從遂縊殺之四月加朔方將石崇憲檢校工部尚書來重隨檢校太子詹事兼御史中丞初馬燧渾瑊統兵討李懐光懐光俾部將徐光將數千衆保長春宫復俾石崇憲將驍兵援徐光崇憲以數千騎來降懐光遂屠其家故加官九月贈朔方節度都虞侯吕鳴岳工部尚書鳴岳前欲圖李懐光以從順事洩為懐光所殺故追贈焉十一月贈朔方邠寧節度兵馬使兼御史大夫石演芬兵部尚書仍賜錢三百千演芬本西域胡人以武勇為朔方節度李懐光飬子以至右武鋒都將時懐光軍屯三橋將與朱泚通謀演芬乃使食客郜成義宻䟽具言懐光反狀請即罷其總統成義至奉天乃反以其言告懐光子璀璀宻報其父懐光乃召演芬責之曰我以爾為子奈何欲破我家耶今死可乎演芬對曰天子以公為腹心公以演芬為腹心公上負天子安可下責演芬且演芬胡人不觧異心欲守死以事一人幸得免呼為賊死當分也懐光初使左右臠食之皆曰此忠烈之士也可令快死乃以刀斷其頸至是上念其義烈故加追贈二年十月以前淮西行軍司馬檢校左庶子兼御史中丞吕仲容為刑部郎中前溵州刺史張應為吉州刺史仲容應皆䧟李希烈受其偽署官數有章表陳賊中事宜帝毎嘉歎及希烈平徴至特加賜賚而命官焉三年四月贈故淮西節度使檢校工部尚書兼御史大夫陳仙竒太子太保賻布帛粟米有差䘮事官給仙竒起於行間性特忠果自李希烈死頗竭誠節而呉少誠軰十數大將素兇悖醜正遂結黨害仙竒焉閏五月朔方河中副元帥渾瑊與蕃相尚結贊㑹盟於平凉瑊與副使兵部尚書崔漢衡監軍特進宋奉朝等皆入幕次結贊伐鼔三聲其衆呼譟而至瑊遽出自幕後偶得他馬奔歸奉朝為亂兵所殺六月贈奉朝開府儀同三司右衛大將軍以死王事也十一月彭城李子尹務榮䘮親廬於墓側六年有芝草之祥詔旌其門閭五月建州奏邵武縣人黄天䘮母廬於墓側有紫芝生詔旌其門閭五年二月潤州奏句容人張甞洧居父䘮孝行著聞詔旌表其門閭八年閏正月贈故御史中丞張廵妻隴西郡夫人李氏申國夫人帛百疋追舊勲也臣欽若等曰廵事具前十二年七月宣武軍節度李萬榮病疾署其子廼為兵馬使廼殺大將伊婁涗張伾倉官劉叔向等大將鄧惟恭等執廼送京師詔涗等三人委中書門下即與追贈仍各與一子八品正員官順宗以貞元二十一年正月即位六月詔曰前昭義軍泗州營衙前兵馬使大中大夫試太子賔客兼監察御史張重政門有勲力性推毅勇夙聞克家之羙嘗稱撫衆之才近者其父初亡羣小扇惑誘以竒計俾執軍麾而重政與其母兄號泣固拒遂全懇願奔告元戎不為利囬成其先志於家為孝子在國為忠臣軍郡乂安行義昭著念兹名節感歎良深宜洽恩榮俾𢎞激勸禮無辟於金革理當申於權奪戎章憲府式宗兼學可起復雲麾將軍守左金吾衛大將軍員外置同正員檢校太子詹事兼御史中丞仍委淮南節度使與要職事任使重政泗州刺史伾之子伾在州十餘年拜金吾詔未至病卒軍令欲令重政代為將重政與其母徐氏拒不從獲免故寵之七月贈故忠州别駕陸贄兵部尚書故道州刺史陽城左散騎常侍仍賜其家錢二百千令所在州縣給遞以册府元龜卷一百三十九
