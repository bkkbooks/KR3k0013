body:
  text: 册府元龜卷三百七十四宋王欽若等撰將帥部忠第五唐戴休顔為鹽州刺史奉天之難休顔以所部蕃漢三千號泣赴難及車駕甫幸梁洋畱守奉天及李懐光叛據咸陽使誘休顔休顔集三軍斬其使嬰城自守懐光大駭遂自涇陽夜遁尋拜檢校工部尚書奉天行營節度使韓游瓌為李懐光部將掌兵在奉天懐光反於河中乃與游瓌書約令為變游瓌密奏之翌日懐光又使趨之游瓌復奏間數日懐光又使趣游瓌為門者所捕懐光且宣言曰吾今與朱泚連和車駕當避繇是帝遽幸梁州游瓌退於邠寧殺懐光畱後張昕以邠州從順正授邠寧節度使楊懐賔楊朝晟父也朝晟為李懐光左廂兵馬使懐光反於河中朝晟被脅在軍德宗幸梁洋韓㳺瓌退於邠寧懐光以嘗在邠寧廹制如屬城以賊黨張昕在邠州總後務昕懼難作乃大索軍資徵卒乗約明潛發歸於懐光時懐賔為㳺瓌将夜後以數十騎斬昕及同謀者㳺瓌即日使懐賔奉表聞奏帝召勞問授兼御史中丞間諜至河中朝晟聞其事泣告懐光曰父立功於國子合誅戮不可主兵矣懐光遂繫之及諸軍進圍河中韓㳺瓌營於長春宫懐賔身當戰伐懐光平帝念其忠俾副元帥渾瑊特原朝晟因為㳺瓌都虞候時父子同軍皆為開府賔客御史中丞李晟為神策軍兵馬使討朱滔於范陽徳宗居奉天詔晟赴難晟聞命西向而哭趣軍将行時義武軍間於朱滔王武俊倚晟為重不欲晟去數為計以沮止晟軍晟謂将吏曰天子播越於外人臣當百舍一息死而後已張義武欲沮吾行吾當以愛子為質選良馬以啗其意乃留子憑以為婚義武軍有大將為張孝忠委信者謁晟晟乃解玉帶以遺之因曰吾欲西行願以為别因陳赴難之意受帶者果徳晟乃諌孝忠勿止晟晟得引軍踰飛狐師次代州詔加晟檢校工部尚書神策行營節度使李懐光叛徳宗在梁州晟大将張少𢎞自行在𫝊口詔授晟為左僕射平章事以安衆心晟拜哭受命且曰長安宗廟所在為天下夲若皆扈蹕誰復京師乃浚隍壁繕兵馬以誅泚興復為己任後渾瑊部将上官望自間道懐詔書加晟檢校右僕射兼河中尹河中晉絳慈隰節度觀察使益實封三百户又兼京畿渭北鄜坊丹延節度觀察招討使晟受詔流涕因上表請帝駐蹕梁州繫億兆之心圖剪㓕之勢儻陛下規小捨大作都岷峨人心少去武力謀臣無復施矣晟之鎮鳳翔也謂賔介曰魏徴能直言極諌致太宗於堯舜之上真忠臣也僕忻慕之軍司馬李叔度對曰此縉紳儒者之事非勲徳所宜晟歛容曰行軍失言傳稱邦有道危言危行今休明之期晟幸得備位将相心有不可忍而不言豈所謂有犯無隠知無不為者乎是非在人主所擇耳叔度慙而退晟後罷兵權朝謁之外罕有過從有通王府長史丁瓊者亦為張延賞所排心懐怨望乃求見晟言事且曰太尉功業至大猶罷兵權自古功髙無有保全者國家儻有變故瓊願備左右狡兎三穴盍蚤圖之晟怒曰爾安得不祥之言遽執瓊以聞王䖍休夲名延貴貞元中為澤潞都虞候節度使李抱真卒禆将元仲經等議立抱真子緘軍中擾亂䖍休正色告於衆曰軍州是天子軍州將帥闕合待朝命何乃云云出異意軍中服從其言繇是竟免潰亂程日華少為易定張孝忠牙将孝忠令知滄州事幽州朱滔合鎮冀王武俊謀叛二盗迭欲取滄州多遣人遊說又加兵攻圍日華俱不聽從乗城自固乆之徳宗深嘉之拜日華滄州刺史韓𢎞貞元中代劉全諒為汴州節度使先是陳許節度使曲環卒淮西節度使呉少誠将併有其地遂以兵㓂許州求援於全諒全諒館其使會全諒卒𢎞初受寵命喜而效順即斬其使以聞發兵三千助禁軍以討少誠張奉國夲名子良貞元末為徐州兵馬使張愔之難子良以其衆千餘奔於浙西團練使王緯表加兼御史中丞仍厚撫其軍士牙門百職子良必兼歴焉元和二年秋節度使李錡叛命遣子良以兵三千收宣州子良乃與錡甥裴行立及大将田少卿李奉仙等宻約圖錡反戈圍城大呼錡計窮縋下生致闕庭子良殺其餘黨遂平浙右憲宗追赴京師親自褒慰擢為右金吾将軍兼御史大夫改名奉國賜第室良田劉澭貞元末為隴右經畧使暨順宗寝疾𫝊位於憲宗稱太上皇有山人羅令則自京詣澭妄搆異說凡數百言皆廢立之事且矯太上皇詔請兵於澭澭立命繋之鞫得奸状令則又云某之黨多矣十月徳宗山陵約此時伺便而動澭械令則驛表上聞詔付禁軍按問其黨與皆杖死澭復請自領兵䕶靈武以備非常詔不許遣中使以名馬金玉繒錦錫之復録其功號其軍額曰保義范希朝為鎮武節度使貞元末累表請脩覲時節将不以佗故自述職者惟希朝一人徳宗大恱既至拜檢校右僕射兼右金吾衛大将軍劉濟為幽州節度使兩河擅自繼襲者尤驕蹇不奉命惟濟最務恭順朝獻相繼元和四年詔討王承宗諸軍未進濟獨率先以前軍擊破之生擒三百餘人斬首千餘級獻逆将於闕優詔褒之又為詩四韻上獻以表忠憤之志張茂昭為義武軍節度使元和四年王承宗叛詔河東河中振武三鎮之師合義武軍為恒州北道招討茂昭創廪廏開道路以待西軍屬正月之望軍吏請曰舊例上元後三夜不止行不闔里門今外道兵馬至請如軍令茂昭曰河東等三道官軍也焉得言外道邪一如舊例自禄山之亂兩河繼為阻命之地茂昭表請舉族歸闕以首率等夷隣封逰說者萬端而其志堅决累上疏求代帝許之命左庶子任簡迪為其行軍司馬乗驛赴之即以兩郡之簿書管鑰符印全付簡迪遣其妻季氏及男克譲克恭等先焉将行戒之曰使爾曹侍親出易者庻後之子孫不為風俗所染吾無恨矣時五年冬也道拜檢校太尉兼中書令充河中晉絳磁隰等州節度觀察等使田𢎞正初名興為魏博衙内兵馬使及田季安病篤其子懐諌㓜騃乃召興署以舊職季安卒懐諌委政於家僮蒋士則措置不平人情不恱咸曰都知兵馬使田興可為吾帥也衙兵數千人詣興私第陳情興拒門不出衆呼譟不已興出衆環而拜請入府署興頓仆於地乆之度終不免乃令於軍中曰三軍不以興不肖令主軍務欲與諸君前約當聼命否咸曰惟命是從興曰吾欲守天子法以六州版籍請吏勿犯副大使可乎皆曰諾是日入府視事殺蔣士則十數人而已翌日具事上聞憲宗嘉之以為魏博節度使賜名𢎞正𢎞正既受節鉞乃上表曰臣聞君臣父子是謂大倫爰立綱紀以正上下其或子為不子臣為不臣覆載莫可得而容幽明所宜共殛者也臣家夲邉塞累代唐人從乃祖乃父以來沐文子文孫之化臣幸因宗族蚤列偏禆空馳戎馬之鄉不覩朝廷之禮惟忠與孝天與臣心嘗思奮不顧生以身殉國無繇上逹私自感傷豈意命偶昌時事緣艱故白刃之下謬見推崇天慈遽臨免書罪戾朝章洊及仍委旌旄錫封壌於全藩列崇班於八座君父之恩已極絲毫之效未申所以靦厚知羞低徊自愧是知功勞所著必候危亂之時儌倖之來却在清平之日循涯揣分冐寵為憂伏以自天寳以還幽陵肇禍山東奥壌悉化戎墟雖外一車書而内懐梟獍官封代襲刑賞自專國家含垢匿瑕垂六十載臣毎思此當食忘味若稍假大軍得奉神筭兼弱攻昧批亢𢷬虚竭鷹犬之資展擒獲之用導揚和氣洗滌偽風然後退歸丘園以避賢路臣懐此志陛下察之又臣毎在軍中多居偏鎮毎遇竒計心實親之有布衣崔懽結茅王屋但茹松柏不雜風塵與臣周旋頗有年嵗自臣受命惠然肯來臣遂請攝節度㕘謀俾之奏事臣胸襟所蓄書不盡言實冀因人紓其積憤臣不勝感恩戴荷懇苦之至謹差攝節度㕘謀王屋山人臣崔懽謹奉表陳奏以聞憲宗優詔褒美先是河北不申吏員興乃奏管内州縣官二百五十三員内一百六十三員見差官假攝九十員請有司注擬從之烏重𦙍為潞州諸将會盧從史奉詔討賊常懐異志潜與王承宗通連吐突承璀以神䇿軍行營與從史對壘将圖之重𦙍通其謀竟縳從史於帳下時重𦙍職總牙門是日戒嚴其軍莫敢動者事聞朝廷擢重𦙍自都将兼州左司馬拜懐州刺史兼御史大夫河陽三城節度李光顔為忠武軍節度使元和中徴天下兵環申蔡而討呉元濟詔光顔以夲軍獨當一面連破賊衆韓𢎞為汴帥驕矜崛彊嘗倚賊勢索朝廷姑息耳惡諸将士力戰隂圖撓屈計無所施遂舉大梁城求得一美婦人教以歌舞絃管六博之藝飾之以珠翠金玉衣服之具計費數百萬命使者送遺冀光顔一見恱惑而怠於軍政也使者即齎書先造光顔壘曰夲使令公徳公私憂公暴露欲進一妓以慰公征役之思謹以候命光顔曰今日已暮明旦納焉詰朝光顔乃大宴軍士三軍咸集命使者進妓妓至則容止端麗殆非人間所有一座皆驚光顔乃於座上謂來使曰令公憐光顔離家室乆捨美妓見贈誠有以荷徳也然光顔受國恩深誓不與逆賊同生日月下今戰卒數萬皆背棄妻子蹈白刃光顔奈何獨以女色為樂言訖涕泣嗚咽堂下兵士數萬皆感激流涕乃厚以縑帛酬其來使俾領其妓自席上而回乃謂使者曰為光顔多謝令公光顔事君許國之心死無二矣自此兵衆之心彌加激勵李吉甫元和中為淮南節度使在揚州毎有朝廷得失軍國利害皆宻疏論列嚴綬為河東節度使元和中楊惠琳叛於夏州劉闢叛命綬表請出師討伐悉選精鋭付其将李光顔討賊李鄘元和中為淮南節度使及王師征淮夷鄆冦李師道表裏相援鄘發楚夀等州二萬餘兵壓賊境日費甚廣未嘗請於有司李夷簡元和中為㐮陽節度使先是貞元中淮西阻兵詔以漢西實當控壓遂移江西兵五百人戍襄陽調給仰於度支其後逃死且盡而嵗不减夷簡請曰人臣以誠事君當在無隠循舊專利孰云不欺乃以其事上聞歸之於有司王承元成徳軍節度使承宗之弟元和中承宗奏承元兼監察充鎮冀深趙觀察度支使承元年未及冠勸承宗以二千騎佐王師平李師道十五年承宗卒未發喪大将謀取帥於旁郡時㕘謀崔燧宻與握兵者謀乃以祖母涼國夫人之命告親兵及諸將使拜承元承元拜泣不受諸将請不已承元曰天子使中貴人監軍有事盍與議也及監軍至因以諸将意賛之承元謂将曰公不忘先徳不以承元齒少且使領軍承元欲效忠於國以奉先志諸公能從之乎諸将許諾遂於衙門都将所理事約左右不得呼留後事大小必㕘决於監軍宻疏請帥詔授檢校工部尚書鄭滑節度觀察使時隣境或以兩河近事諷之承元不聴諸将亦悔及起居舍人柏耆齎詔至宣朝廷之命兵士或拜或泣承元與柏耆於館中復召諸将坐語諸将益號泣喧譁承元曰諸公以先人之徳不欲承元去此意甚厚然奉詔遅留不去即罪矣前者李師道未破時議赦其罪師道欲行諸将止之他日殺師道亦諸将也今公軰復欲為師道之事乎敢以拜請遂拜諸将諸将皆泣涕不能對承元乃盡出家財籍其人以散之酌其勤者擢之部将李寂等數十人固留承元承元斬寂等軍中始定承元出鎮州時年十八所從将吏有具噐用貨幣而行者承元悉使留之承元昆弟及從父昆弟因為郡守者四人登朝者四人從事将校有勞者皆擢用未幾改鄜坊丹延節度觀察等使便道請覲穆宗深器之數召顧問又改授鳳翔隴州節度觀察等使劉總元和中為幽州節度使總累代據有燕薊軍中食其恩而未嘗承朝廷命長慶元年總以幽州歸朝為兵士遮留總殺其首謀十餘軰夜委兵符於監軍判官從間道去遲明軍中方覺李遜為陳許節度使長慶初穆宗方鋭意討賊諸道發兵例於度支貸借惟遜出兵率先諸道賞賜犒設備於當軍朝論美之田布長慶元年為涇原節度使其秋鎮州兵亂布父𢎞正被殺朝廷以李愬疾不能軍無以扞庭湊之亂且以魏州田氏舊衆乃疾徴布使起復為之節度仍遷檢校工部尚書詔布乗急𫝊之鎮布喪服居堊室去節旄導從之飾及入魏州處喪視事動皆得禮其祿俸月入百萬一無所取又籍魏中家之舊産無巨細計錢十餘萬貫皆出之頒齎軍士乃選其将史憲誠為先鋒兵馬使以憲誠前出已麾下必能輸竭故盡以精鋭付焉是時屢有中使齎急詔促其進兵至十月布遂以全軍三萬七千出抵賊之冀州南宫縣十一月進軍下賊二栅而魏人怯於格戰且以寒雪饋餉不給師無鬬志憲誠故常懐二心從而間之俄有詔分布軍與李光顔合勢東救深州其衆因大潰多為憲誠所有布提兵八千以是月十日還魏州十一日會諸将復議出師而将卒益驕惰皆曰尚書能行河朔舊事則生死從之若使戰皆不能也布自度其下終不為用歎曰功無成矣即日宻表陳軍情且稱遺表曰臣觀衆意終負國恩臣既無功敢忘即死伏願陛下速救光顔元翼不然者義士忠臣皆為河朔屠害奉表號哭拜其從事李石乃入啓父靈抽刃刺心曰上以謝君父下以示三軍言訖而絶時議以布才雖不足能以死謝家國心志决烈得燕趙之古風云牛元翼夲趙人代為鎮州将校王承宗叛命之際元翼嘗為謀主數将兵窘王師後王庭湊殺田𢎞正朝廷以元翼夲與庭湊等列遂用為節度時元翼在深州為庭湊所圍轉急後與數騎突圍而出詔以為㐮州節度使庭湊於後庭鴆殺深州将士其中大将十六人判官一人夲與元翼同休戚一旦皆被殺元翼悲咤慷慨而卒其所賜宅僮馬等並遺表進之李載義長慶中為幽州禆将時節度使朱克融死其子延嗣竊襲父位不遵朝㫖虐用其人載義遂殺延嗣數其罪以上聞敬宗嘉之拜檢校戸部尚書封武威郡王充幽州盧龍等軍節度觀察等使未幾李同捷據滄景以要襲父爵載義上表請付同捷以自効帝嘉其誠懇特加檢校右僕射累破賊軍以功加司空又奏故節度使張𢎞靖賔吏家屬凡一百九十人今並送赴京闕初𢎞靖立節范陽及軍亂被拘其副介以下多見戕害妻女軰從而拘繋既而朱克融彊邀符節復留之不遣至載義去逆效順盡歸其孥至於臧獲下軰一無所留殷侑為天平軍節度鄆曹濮觀察等使自元和末收復李師道十二州分為三鎮朝廷務安反側征賦所入盡留贍軍貫緡錢帛不入王府侑以軍賦有餘賦不上供非法也乃上表起太和七年請嵗供兩税𣙜酒等錢十五萬貫粟五萬石詔曰鄆曹濮等州元和以來地夲殷實自分三道十五餘年雖頒詔書竟未供賦殷侑承兵戈之後當歉旱之餘勤力奉公謹身守法纔及周嵗以致阜安而又體國輸忠率先入貢成三軍奉上之志陳一境樂輸之心尋省表章良用嘉歎尋就加檢校右僕射王景崇廣明中為鎮州節度使時僖宗西幸屈節偽廷者十三四景崇斬其賊使梟首於市時有邸吏齎偽詔至斬之因馳檄藩鄰奔問行在都統王鐸有徵要者必竭利噐竒貨駿蹄以助之繇是赴難者争先每議及國朝宗廟陵園未嘗不凄然慷慨梁王師範初仕唐天復元年為青州節度使其年冬李茂貞刼遷車駕幸鳳翔韓全誨矯詔加罪於太祖令方鎮出師赴難詔至青州師範承詔泣下曰吾輩天子藩籬君父有難畧無奮力者彊兵自衛縦賊如此使上失守宗祧危而不持是誰之過吾今日成敗以之乃發使通楊行宻遣将劉鄩襲兖州别将襲齊埭時太祖方圍鳳翔師範遣将張居厚部輿夫二百言有獻於太祖至華州東城守将婁敬思疑其有異剖輿視之乃兵仗也居厚等因大呼殺敬思聚衆攻西城時崔裔在華州遣部下閉闗距之遂遁去是日劉鄩下兖州河南數十郡同日發太祖遣朱友寧討之孫揆大順元年除昭義軍節度使以夲軍取刁黄嶺路赴任太原将李存孝偵知之引騎三百伏於長子縣崖谷間揆建衙持節褒衣大蓋擁衆而行存孝突出谷口遂擒揆及中使韓師範并将校五百人存孝械揆等以組練繫之環於潞州遂獻於武皇武皇謂揆曰公縉紳之士安然徐歩可至逹官何用如是揆無以對令繫於晋陽獄武皇将用為副使使人誘之揆言不遜遂殺之趙凝唐末為㐮州節度使弟明為荆南留後是時唐室㣲弱諸道常賦多不上供惟凝昆仲雖彊據江山然盡忠唐室貢賦不絶太祖将期受禪以凝兄弟並據藩鎮乃遣使先諭㫖焉凝對使者流涕答以受國㤙深豈敢隨時妄有他志使者復命太祖大怒天祐二年秋七月遣楊師厚率師討之凝以兵數萬逆戰大為師厚所敗乃燔其舟單舸㳂漢遁於金陵後卒於淮南牛存節開平四年為鄆州節度使夏中病渇至痏屬河北用軍末帝令率軍屯陽留以張大劉鄩之勢存節忠憤彌篤未嘗言病料敵治戎旦夕愈勵病革詔歸汶陽翌日而卒将終屬其子知業知譲等以忠孝言不及他深為時所重而木彊忠厚有賈復之風楊師厚為魏博節度使時庶人友珪簒逆末帝将圖之遣使謀於師厚師厚深陳欵效且托書於侍衛軍使袁象先及主軍大将又遣都指揮使朱漢賔率兵至滑州以應禁旅友珪既誅末帝即位於東京首封師厚為鄴王加檢校太師中書令王彦章為澶州刺史先鋒馬歩都指揮使貞明五年三月朝廷議割魏州為兩鎮慮魏人不從遣彦章率精騎五百人入鄴城駐於金波亭以備非常是月二十九日夜魏軍作亂首攻彦章於館舍彦章南奔七月晉人攻陷澶州彦章舉家陷没後唐荘宗遷其家於晋陽待之甚厚遣細人間行誘之彦章即斬其使以絶之後荘宗至鄆州彦章為唐将李紹竒所擒一云為夏魯竒所擒彦章恃其麤暴毎謂人曰晉王鬬鷄小兒彼何足畏至是見擒素憐其勇悍欲全活之令中使宣詔慰撫欲觀其心對曰臣比自匹夫朱氏拔擢位居方面與皇帝十五年抗衡今日兵敗力窮罪有常分皇帝縱垂矜宥臣何面目見人釁鼓狥師得死為幸帝令牀舁隨軍至任縣彦章言所傷楚痛因乞遲留遂令斬之一云荘宗欲留之彦章曰安有為将兼相朝事梁而暮事晋臣所不為也得就鈇鉞甘之如薺荘宗知不可屈遂殺之以成其志後唐薛志勤為武皇河東右都押衙先鋒右軍使從武皇救陳許平黄巢武皇遇難於上源驛汴将楊彦洪連車樹栅遮絶巷陌時騎從皆醉宴席既䦨汴軍四面攻傳舎志勤虓勇冠絶復酒膽激壮因獨登驛樓大呼曰朱僕射負恩無行邀我司空圖之吾三百人足以濟事因彎弧發射矢無虚發汴人斃者數十志勤私謂武皇曰事急矣如至五鼓吾屬無類矣可速行因扶武皇而去雷雨暴猛汴人扼橋志勤以其屬血戰擊敗之得侍武皇還營史敬思為武皇先鋒都督從入闗破黄㜸安三輔平陳蔡敬思嘗為騎将挺身酣戰勇冠三軍當武皇上源之難敬思方大醉從者喻之蹶然而起登驛樓控弦射賊矢不虚發汴賊横屍樓下既而遇雨解圍翼武皇登尉氏門敬思迷墜擁門故陷賊武皇還營流涕乆之苻習為義寧軍節度使有器度性忠壮自荘宗即位㳂河戰守習常以夲軍從心無顧望諸将服其為人石君立初𨽻李嗣昭為牙校歴典諸軍嗣昭出征常為前鋒天祐十七年将兵屯徳勝時汴軍自滑州轉餉以給楊村砦荘宗親率騎擊虜深入虜騎圍之數十重良乆不解嗣昭號泣赴之與立翼荘宗而還裴約為潞州節度使李嗣昭卒子繼韜據昭義叛同光元年荘宗遣李紹斌以甲士五千援澤州初繼韜叛歸賊庭也約以兵戍澤州召州民泣而諭之曰予事先君已餘二紀每見分財享士志在平讐不幸薨没壮心不遂今郎君不臣定覆家族父喪未𦵏違背君親縦然賊首開懐乆逺終被誅滅予可剸刃自殺不能送死與人衆皆感泣服其忠義偽梁以董璋為澤州刺史率衆攻城約拒守間道吿急帝知其言善謂諸将曰朕與繼韜何薄裴約何厚裴約能分逆順不附賊黨嗣昭一何不幸生此䲭梟乃顧謂李紹斌曰爾識機便為我取裴約來朕不藉澤州弹丸之地紹斌自遼州進軍未至城陷約被害帝聞嗟痛乆之李存審為横海軍節度使天祐十三年冬存審破楊劉進營麻口為都營使築壘以拒汴人時荘宗勇於接戰毎以輕騎嘗賊遇窘數四存審凌旦俟其出必叩馬泣諌曰王将復唐宗社宜為天下自愛搴旗挑戰一劍之任無益聖徳請責效於臣昔耿弇不以賊遺君父臣雖不武敢不代君之憂帝即時廻駕張全義初仕梁為天下兵馬副元帥荘宗至雒言事者以梁祖與我世讐宜斵棺燔柩全義獨上章申理議者嘉之周徳威性忠孝感武皇奨遇常思臨難忘身乾寧中為鐵林軍使從武皇討王行瑜有功移内衙軍副及荘宗初立徳威外握兵柄頗有浮議内外憂之徳威既至單騎入謁伏靈柩哭哀不自勝繇是羣情釋然後以功授盧龍軍節度使時天祐十五年下楊劉城荘宗大恱諸将渡河趨汴徴徳威進師討之将起徳威以為不利深入是夜鎮星犯文昌上将臨戰徳威軍為輜重所擾父子躍馬出與賊數百騎血戰而死帝會諸将相向流涕曰不聼老将之言竟至破敗父子俱没深所悲惜命以喪歸晋陽帝即位追贈太師李存賢為慈州刺史天祐十八年荘宗令将兵援河中十九年賊将段凝率衆五萬營於臨晋将㓂河中蒲人物議同異咸欲歸汴奸人間於存賢云河府兵欲殺子以歸梁存賢曰予奉君命來援死王事無恨尋汴兵亦退姚洪夲梁之小校也在梁時經事董璋長興初率兵千人戍閬州璋叛領衆攻閬州璋宻令人誘洪洪以大義拒之及璋攻城洪悉力拒守者三日禦備既竭城陷被擒璋謂曰爾頃為健兒繇吾奨拔至此吾書誘諭投之於厠何相負邪洪大罵曰老賊爾為天子鎮帥何苦反邪爾既孤㤙背主吾與爾何恩而云相負爾為李七郎奴掃馬糞得一臠殘炙感恩無盡今明天子付與茅土貴為諸侯而驅徒結黨圖為反噬爾夲奴才則無耻吾忠義之士不忍為也吾可為天子死不能與人奴茍生璋怒令軍士十人持刀刲割其膚燃鑊於前自取啗食洪至死大罵不已明宗聞之泣下置洪二子於近衛給賜甚厚王思同閔帝應順元年為京兆尹兼西京留守時潞王鎮鳳翔與之隣境及潞王不禀朝㫖致書於秦涇雍梁邠諸帥言賊臣亂政屬先帝疾篤謀害秦王迎立嗣君自擅權柄以至殘害骨肉揺動藩垣懼先人基業忽焉墜地故誓心入朝以除君側事濟之後謝病歸藩然藩邸素貧兵食俱困欲希國士共濟艱難乃令小伶安十十以五絃謁見思同因勸諌諷又令軍校宋審温者請使於雍若不從命即獨圖之又令推官郝詡府吏朱延乂以書檄起兵會副部署藥彦稠至方宴而岐使適至乃繫之於獄彦稠請誅審温拘送詡赴闕時思同已遣其子入朝言事朝廷嘉之乃以思同為鳳翔行營都部署起軍營於扶風三月十四日與張䖍釗會於岐下梯衝大集十五日進攻東西闗城城中戰偹不完然死力禦扞外兵傷夷者十二三十六日復進攻其城潞王登陴泣諭於外聞者悲之張䖍釗性𥚹詰旦西面用軍與都監皆血刄以督軍士軍士齊詬反攻䖍釗䖍釗躍馬避之時羽林指揮使楊思權引軍自西門先入䧏從珂而思同未之知猶督士登城俄而嚴衛指揮使尹暉呼曰城西軍已入城受賞矣何用戰邪軍士解甲棄仗之聲振動天地日午亂軍畢入涇州張從賔邠州康福河中安彦威皆遁去十七日思同與藥彦稠萇從簡俱至長安劉遂雍閉闗不内乃奔潼闗二十二日潞王至昭應前鋒執思同來獻王謂左右曰思同計乖於事然盡心於所奉亦可嘉也顧謂趙守均曰思同爾之故人可行迓之於路逹予撫慰之意思同至潞王譲之曰賊臣傾我家國殘害骨肉非子弟之過我起兵岐山盖誅一二賊臣耳爾何首䑕兩端多方誤我今日之罪其可逃乎思同曰臣起自行間受先朝爵命擁旄仗鉞累歴重藩終無顯效以答殊遇臣非不知攀龍附鳳則福多扶衰濟弱則禍速但惟瞑目之後無面見先帝釁鼓膏原纍囚之常分也潞王為之改容徐謂之曰且宜憩歇潞王欲宥之而楊思權之徒耻見其面屢啓於劉延朗言思同不可留慮失士心又潞王入長安時尹暉盡得思同家財及諸妓女故尤惡思同與劉延朗亟言之屬潞王醉不待報殺思同并其子徳勝潞王醒召思同左右報已誅之矣潞王怒延朗累日嗟惜之趙鳳為荆州節度使明宗厭代潞鄂搆難俄聞鄂王出奔鳳流涕集賔佐軍校曰主上播遷渡河而北吾輩安坐不赴奔問於理可乎軍校曰惟公所使尋聞王𢎞贄殺鄂王左右留王衛州又得清泰檄書而止張敬逹末帝清泰中從晋髙祖為北面兵馬副總管仍屯兵鴈門未幾晋髙祖建義末帝詔以敬逹為北面行營都招討使仍便委引部下兵圍太原以定州節度使楊光逺副焉尋統兵三萬營晉安鄉末帝自六月有詔促令攻取敬逹設長城連栅雲梯飛礟使工者運其巧思窮土木之力時督事者毎有所為城柵則暴風大雨平地水深數尺而城柵摧堕竟不能合其圍九月契丹軍至張敬逹大敗晉髙祖與番衆期迫一夕而圍合自晋安營南門之外長百餘里濶五十里布以氈帳用毛索懸之銅鈴而部伍多備犬以備警急營中嘗有夜遁者出則犬吠鈴動跬步不能行焉自是敬逹與麾下雜部曲五萬人馬萬匹無繇四奔但見穹廬如岡阜相屬諸軍相顧色如死灰始則削木篩糞以飼其馬日望末帝救軍及馬漸羸死則與将士分而食之馬盡食殫副将楊光逺次将安審琦知其不濟勸敬逹宜早䧏以求自安之計敬逹曰吾受恩明宗位歴方鎮主上授我大柄而失律如此已有愧於心也今救軍在近旦暮雪耻有期諸公何相迫邪待勢窮則請殺吾攜首以䧏亦未為晩光逺與審琦知敬逹意未决恐坐成魚肉遂斬敬逹以䧏末帝聞其殁也愴慟乆之北主戒其部曲及漢之䧏者曰為臣當如此人乃令部人收𦵏之晋萇從簡初仕後唐為金州刺史閔帝應順初舉軍討鳳翔從簡亦預征行軍變乃東還道遇張廷藴為廷藴所縛送於潞王潞王數之曰人皆歸我汝何偏攻我城而背我也從簡曰事主不敢忘今日死生惟命是聴潞王釋之張朗初為代州刺史又改行營諸軍馬歩都虞候髙祖建義於太原遣使以書諭之朗曰為人臣而有二心可乎乃斬其使髙漢筠仕後唐為金吾将軍清泰末髙祖建義朝廷詔遣晋州張敬逹屯於太原委漢筠巡撫其郡俄以漢筠為契丹所敗敬逹繼死之節度副使田承肇率部兵殺閤門使王彦通於公館次攻漢筠於府署漢筠乃啓闗延承肇謂曰僕與子俱承朝寄而相迫何甚承肇曰我欲扶公為節度使漢筠曰老夫耄矣不敢首為亂階死生任子籌之承肇目左右令前諸軍投刃於地曰髙金吾累朝宿徳不可枉殺肇以衆意難拒遂謝云與公戯耳漢筠遂促騎以還髙祖入雒飛詔徃徴遇諸途及入覲髙祖曰朕恐倉卒之際濫致傷害今見卿面深所喜也尋遷左騎衛大将軍内客省使馬全節授鎮州節度使屬契丹侵軼封疆加之蝗旱國家所徴發全節朝受而夕行治生餘財必充貢奉皇甫遇為河陽節度使少帝即位赴闕開運二年北騎南㓂遇戰於鄆州兆津大捷敵溺死者歩騎數千人以功領節滑臺三年蕃將率衆屯邯鄲遇與騎将安審琦慕容彦超禦之遇渡漳河敵前鋒大至遇引退轉鬬二十里至鄴南榆林店遇謂審琦等曰彼衆我寡走無生矣遂自辰及未血戰百餘合所傷甚衆遇所乗馬中鏑而斃遇有紀綱杜知敏以馬授遇遇得馬復戰乆之稍解顧杜知敏已為敵所獲謂彦超曰知敏倉皇之中以馬授我義也安可使陷戎賊中遂與彦超躍馬取知敏而還胡騎壮之俄而生軍復合遇不能解時審琦已至安陽河謂首将張從恩曰皇甫遇未至必為敵騎所圍若不急救則成擒矣從恩曰敵原至衆無以枝梧将軍獨徃何益審琦曰成敗命也設若不濟與之俱死假令賊不南來失此一将将何面目以見天子遂率鐵騎北渡赴之敵見塵起謂救軍併至乃引去遇與彦超中數鎗得還時諸軍歎曰二人皆猛将也朝廷累加至檢校太師同中書門下平章事四年敵復至從杜重威營濘水重威送欵遇不與其議及䧏心不平之時耶律氏欲遣遇先入汴辭之推張彦澤督其行遇私謂人曰自我身荷國恩位兼将相既不能死於軍陣何顔以見舊主更命圖之所不忍也明日行及趙郡平棘縣遇洎其公舍顧從者曰我已信宿不食疾甚矣主辱臣死無復南行因絶吭而殞逺近聞而義之周王重𦙍初仕後唐荘宗為㕔直将從征河上管契丹直帝有急難力救解之册府元龜卷三百七十四
