body:
  text: 册府元龜卷四百四十二宋王欽若等撰將帥部敗衂第二晉陸機成都王頴表為平原内史惠帝太安中頴假機後將軍河北大都督討長沙王乂列軍自朝歌至於河橋鼓聲聞數百里漢魏以來出師之盛未嘗有也乂與機戰于鹿苑機軍大敗赴七里澗而死者如積焉水為之不流將軍賈稜皆死之新蔡王騰為車騎將軍鎮鄴時公師藩與平陽人汲桑等為羣盜起於清河鄃縣衆千餘人冦頓丘以葬成都王頴為辭載頴主而行與張泓故將李豐等將攻鄴騰曰孤在并州七年胡圍城不能尅汲桑小賊何足憂也及豐等至騰不能守率輕騎而走為豐所害四子虞矯紹確虞有勇力騰之被害虞逐豐豐投水而死是日虞及矯紹并鉅鹿太守崔曼車騎長史羊桓從事中郎蔡充等又為豐餘黨所害及諸名家流移依鄴者死亡竝盡劉琨為并州都督屬石勒攻樂平太守韓據請救於琨而琨自以士衆新合欲因其銳以威勒箕澹諫曰此雖晉人久在荒裔未習恩信難以法御今内收鮮卑之餘榖外抄殘胡之牛羊且閉關守險務農息士既服化感義然後用之則功可立也琨不從悉發其衆命澹領歩騎二萬為前驅琨自為後繼勒先據險要設伏以擊澹大破之一軍皆没王堪為車騎將軍懐帝永嘉三年三月劉元海冦黎陽遣堪擊之王師敗績于延津死者三萬餘人九月堪與平北將軍曹武討劉聰王師敗績堪奔還京師山簡為征南將軍永嘉四年九月雍州人王如舉兵反於宛殺害令長自號大將軍司雍二州牧大掠漢沔新平人龎寔馮翊人嚴嶷京兆人侯脫等各起兵應之簡及荆州刺史王澄南中郎將杜蕤并遣兵援京師及如戰於宛諸軍皆大敗王澄獨以衆進至汴口衆潰而歸李矩為冠軍將軍時劉聰使劉曜䧟長安愍帝出降趙固郭黙攻河東至於綘邑右司𨽻部人盗牧馬負妻子奔之者三萬餘騎騎兵將軍劉勲追討之殺萬餘人固黙引歸劉頡遮邀擊之為固所敗聰使子粲及劉雅等伐趙固次于小平津固揚言曰要當生縛劉粲以贖天子聰聞而惡之李矩使郭黙郭誦救趙固屯于雒汭遣耿稚張皮潛濟襲粲貝丘王翼光自厘城覘之以告粲粲曰征北南渡趙固望聲逃竄彼方憂自固何暇來邪且聞上身在此自當不敢北視况敢濟乎不須驚動將士也是夜稚等襲敗粲軍粲奔據陽郷稚館榖粲壘雅聞而馳還柵于壘外與稚相持聰聞粲敗使太尉范隆率騎赴之稚等懼率衆五千突圍趍北山而南劉勲追之戰于河陽稚師大敗死者三千五百人投河死者千餘人梁巨為冠軍將軍劉聰攻河内石勒率騎㑹之攻巨於武徳懐帝遣兵救之勒留諸將守武徳與王桑逆巨於長陵巨請降勒弗許巨踰城而遁軍人執之勒馳如武徳坑降卒萬餘數巨罪而害之王師退還河北諸堡壁大震皆請降送任于勒荀羡為建威將軍攻慕容雋山茌士甾切拔之斬雋太山太守賈堅雋青州刺史慕容塵遣司馬悅明救之羡師敗績復䧟山茌諸葛攸又率水陸二萬討雋入自石門屯于河渚攸部將匡超進據嵪㠂蕭館屯于新柵又遣督䕶徐冏率水軍三千泛舟上下為東西聲勢雋遣慕容評𫝊顔等統歩騎五萬戰于東阿王師敗績毛寶為征虜將軍庾亮謀北伐上疏解豫州請以授寶于是明帝詔以寶監揚州之江西諸軍事豫州刺史將軍如故與西陽太守樊峻以萬人守邾城石季龍惡之乃遣其子鑒與其將夔安李莬等五萬人來冦張狢渡二萬騎攻邾城寶求救於亮亮以城固不時遣軍城遂䧟寶峻等率左右突圍出赴江死者六千人寶亦溺死徐龕為征討大將軍褚裒督䕶裒遣龕伐沛獲偽相支重郡中二千餘人歸降魯郡山有五百餘家亦建義請援裒遣龕領銳兵三千迎之龕違裒節度軍次代陂為石遵將李莬所敗死傷大半龕執節不撓為賊所害尹奉為寧州刺史李雄據益州寧州李才龎遺起義兵攻雄將任佪李謙等雄遣其將羅常費黑救之奉遣裨將姚昂朱提太守楊術援遺戰于登臺昂等敗績術死之李釗為越雋太守時王遜為寧州刺史先是釗為李雄所執自蜀逃歸遜復以釗為越雋太守李雄遣李讓任佪攻釗釗自南秦與漢嘉太守王載共拒之戰于温水釗敗績載遂以二郡附雄桓宣為平北將軍都督司雍梁三州南陽襄陽新野南郷四郡軍事梁州刺史庾翼遷鎮襄陽令宣進伐石季龍將李羆軍次丹水為賊所敗翼怒貶宣為建威將軍謝尚為西中郎將督揚州之六郡諸軍豫州刺史假節鎮歴陽大司馬桓温欲有事中原使尚率衆向壽春進號安西將軍初苻健將張遇降尚尚不能綏懐之遇怒據許昌叛尚討之為遇所敗收付廷尉時康獻皇后臨朝即尚之甥也特令降號為建威將軍桓温為大司馬率衆五萬伐慕容暐前兖州刺史孫元起兵應之温部將檀𤣥攻胡陸執暐寧東慕容忠暐遣其將慕容厲與温戰于黄墟厲師大敗單馬奔還髙平太守徐翻以郡歸順温前鋒朱序又破暐將傅顔于林渚温軍大振次於枋頭暐懼謀奔和龍慕容垂曰不然臣請擊之若戰不㨗走未晩也乃以垂為使持節南討大都督慕容徳為征南將軍率衆五萬拒温使其散騎侍郎樂嵩乞師於苻堅堅遣將軍茍池率衆二萬出自雒陽師于潁川外為赴援内實觀隙有兼并之志矣慕容徳屯于石門絶温糧漕豫州刺史李那率州兵五千斷温饋運温頻戰不利糧運復絶及聞堅師之至乃焚舟棄甲而退徳率勁騎四千先温至襄邑東伏於澗中與垂前後夾擊王師大敗死者三萬餘人茍池聞温班師邀擊于譙温衆又敗死者萬計桓豁遷征西大將軍開府及苻堅䧟仇池豁以新野太守吉挹行魏興太守督䕶梁州五郡軍事戍梁州堅䧟涪城梁州刺史楊亮益州刺史周仲孫竝委戍奔潰以威略不振所在覆敗又上疏陳謝固辭不拜開府郗恢為秦州刺史督隴上軍時魏氏强盛山陵危逼恢遣江夏相鄧啓方等以萬人拒之與魏道武戰于滎陽大敗而還劉牢之為龍驤將軍時苻堅伐晉敗歸長安牢之屯鄄城討諸未服河南城堡承風歸順者甚衆時堅子丕據鄴為慕容垂所逼請降牢之引兵救之垂聞軍至出新興城北走牢之與沛郡太守田次之追之行二百里至五橋澤中爭趣輜重稍亂為垂所擊牢之敗績士卒殱焉牢之策馬跳五丈澗得脫㑹丕救至因入臨漳集亡散兵復少振牢之以軍敗徴還劉毅為冠軍將軍毅躡桓𤣥死桓振桓謙復聚衆拒毅於靈溪𤣥將馮該以兵㑹於振毅進擊為振所敗退次潯陽坐免官尋原之又盧循反於廣州以舟師二萬發姑孰徐道覆聞毅將至建鄴報盧循曰劉毅兵重成敗繫此一戰宜併力拒之循乃引兵發巴陵與道覆連旗而下毅次于桑落州與賊戰敗績棄船以數百人歩走餘衆皆為賊所虜輜重盈積皆棄之毅走經渉蠻晉飢困死亡至者十二三參軍羊䆳竭力營䕶之僅而獲免焉魯宗之為南陽太守時桓振既破江陵自為荆州刺史都督八州宗之自襄陽破振將温楷于柞溪進屯紀南振聞楷敗留其將馮該守營自率衆與宗之大戰振勇冠三軍衆莫能禦宗之敗績宋桂陽王義真鎮關中王修既死人情離異無相統一髙祖遣將軍朱齡石替義真鎮關中使義真輕兵疾歸諸將競斂財貨多載子女方軌徐行虜追騎且至建威將軍傅𢎞之曰公處分亟進恐虜追擊人也今多將輜重一日行不過十里虜騎追至何以待之宜棄車輕行乃可以免不從賊追兵果至騎數萬匹輔國將軍蒯恩斷後不能禁至青泥後軍大敗諸將及府功曹王賜悉被俘虜義真在前故得與數百人奔散日暮虜不復窮追義真與左右相失獨逃草中中兵參軍叚宏單騎追㝷縁道呌義真識其聲出就之曰君非叚中兵邪身在此宏大喜負之而歸義真謂宏曰今日之事誠無崖略然丈夫不經此何以知艱難初髙祖聞青泥敗未得義真審問有前至者訪之竝云闇夜奔敗無以知存亡髙祖怒甚剋日北伐謝晦諌不從及得宏啟事知義真已免乃止劉粹為征虜將軍文帝元嘉三年討謝晦遣粹弟車騎從事中郎道濟龍驤將軍沈敞之就粹自陸道向江陵粹以道濟行竟陵内史與敞之及南陽太守沈道興歩騎至沙橋為晦司馬周超所敗士衆傷死者過半降號寧朔將軍臧質為輔國將軍時後魏太武侵徐豫率大衆數十萬遂向彭城以質為輔國將軍假節置佐率萬人北救始至盱眙太武已過淮冗從僕射胡崇之領質府司馬崇之副太子左積弩將軍臧澄之及毛熙祚亦受統於質盱眙城東有髙山質慮魏據之使崇之澄之二軍營於山上質營城南魏軍攻崇之澄之二營崇之等力戰不敵衆散竝為後魏所殺又攻熙祚熙祚所領悉北府精兵幢主李灌率厲將士殺賊甚多隊主周裔之外監楊方生又率射賊賊垂退㑹熙祚被創死軍遂散亂其日質案兵不敢救故三營一時覆没初仇池之平也以崇之為龍驤將軍北秦州刺史宋百頃行至濁水為索虜所攻舉軍敗散崇之及將佐以下皆為後魏所執後得叛還至是又為後魏所敗焉熙祚司州刺史脩之兄子也崇之熙祚並贈正員郎澄之三營既敗其夕質軍亦奔散棄輜重器甲率七百人投盱眙張永以元嘉二十九年太祖令督冀州青州之濟南樂安太原三郡諸軍事揚威將軍冀州刺史督王𤣥謨申坦等諸將經略河南攻碻磝城累旬不能拔其年八月七日夜虜開門燒樓及攻車士卒燒死及為虜所殺甚衆永即夜撤圍退軍不報告諸將衆軍驚擾為虜所乗死敗塗地永及申坦竝為統府撫軍將軍蕭思話所收繫於歴城獄太祖以屢征無功諸將不可任責永等與思話詔曰虜既乘利方向盛冬若脫敢送死兄弟父子自共當之言及増憤可以示張永申坦又與江夏王義恭書曰早知諸將如此恨不以白刅驅之今者悔何所及後永為使持節都督南兖徐二州諸軍事南兖州刺史常侍將軍如故時薛安都據彭城請降而誠心不欵明帝遣永與沈攸之以重兵迎之加督前鋒諸軍事進軍彭城安都招引索虜之兵既至士卒離散永狼狽引軍還為虜所追大敗復值寒雪士卒離散永脚指斷落僅以身免失其第四子王𤣥謨元嘉中守碻磝江夏王義恭為征討都督以為碻磝不可守召令還為魏軍所追大破之流矢中臂還至歴城義恭與𤣥謨書曰聞因敗為成臂上金瘡得非金印之徴邪田益之者弋陽西山蠻也晉安王子勛反遣其將郭確守弋陽益之起義攻郭確於弋陽以益之為輔國將軍督弋陽西山事輔國將軍劉勔赴壽陽築長圍始合田益之率蠻宗萬餘人攻子勛將龎定光於義陽定光遣從兄文生拒之為益之所破見殺遂圍其城定光求救於子勛子勛以定光父孟虬為司州刺史率精兵五千救義陽并解壽陽之圍常珍奇又自懸瓠率三千人援定光屯軍了水益之不戰望風奔散孟虬乘勝進軍向壽陽王藴後廢帝元徽初為東陽太守未之郡值桂陽王休範逼京邑藴領兵朱雀門戰敗被創事平除侍中南齊李安民初仕宋為寧朔將軍隨吳喜沈攸之擊虜達睢口戰敗還保宿豫淮北既没明帝勑留安民戍甬城陳顯達督平北將軍崔慧景衆軍四萬圍南郷堺馬圏城去襄陽三百里攻之四十日虜食盡噉死人肉及樹皮外圍既急虜突走斬獲千計官軍競取城中絹不復窮追顯逹入據其城遣軍主莊丘黑進取南郷縣故順陽郡治也後魏孝文自領十餘萬騎奄至顯達引軍渡水西據鷹子山築城人情沮敗虜兵甚急軍主崔恭祖胡松以烏布幔盛顯達數人擔之逕道從分磧山出均水口臺軍縁道奔退死者三萬人左軍將軍張千戰死追贈遊擊將軍顯達素有威聲著於蠻虜至是大損喪焉裴叔業明帝時為輔國將軍領衆圍渦陽後魏廣陵王率衆拒戰叔業等大敗之斬獲甚衆魏主聞廣陵王敗遣偽都督王肅大將軍楊大眼歩騎十餘萬救渦陽叔業見兵盛夜委軍遁走明日官軍奔潰虜追之傷殺不可勝數日暮乃止叔業還保渦口胡諧之為衞尉永明八年率禁兵討巴東王子響於江陵兼長史行事臺軍為子響所敗有司奏免官權行軍如故王珍國為征虜將軍時梁髙祖兵至東昏石頭軍主朱僧勇率水軍二千人歸降東昏又遣征虜將軍王珍國帥軍主胡虎牙列陳於航南大路悉配精手利器尚十餘萬人閹人王倀子持白獸幡督帥諸軍又開航背水以絶歸路王茂曹景宗犄角奔之將士皆殊死戰無不一當百鼓噪震天地珍國之衆一時瓦解投淮死者積尸與航等後至者乘之以濟於是朱雀諸軍望之皆潰散義兵追至宣陽門李居士以新亭壘徐元瑜以東府城降石頭白下諸軍竝宵潰梁馬仙琕遷司州諸軍事司州刺史魏豫州人白皁生殺其刺史琅邪王司馬慶曾自號平北將軍推郷人胡游為刺史以懸瓠來降髙祖使仙琕赴之遣直閣將軍武㑹超馬廣率衆為援仙琕進頓楚王城遣副將齊茍兒以兵二千助守懸瓠魏中山王英率衆十萬攻懸瓠仙琕遣廣㑹超等守三關英破懸瓠執齊茍兒遂進攻馬廣又破廣生擒之送雒陽仙琕不能救㑹超亦相次退散魏軍遂進據三關仙琕坐徵還南康簡王績之子㑹理為平北將軍武帝太清元年督衆軍北討至彭城為魏師所敗退歸本鎮邵陵攜王綸太清二年進位中衞將軍侯景搆逆加征討大都督率衆討景將發髙祖誡曰侯景小豎頗習行陣未可以一戰即殄當以歳月圖之綸次鍾離景已渡采石綸乃晝夜兼道旋軍入赴濟江中流風起人馬溺者十二三遂率寧逺將軍西豐公大春新塗公大成等歩騎三萬發自京口將軍趙伯超曰若從黄城大道必與賊遇不如逕路直指鍾山出其不意綸從之衆軍掩至賊徒大駭分為三道攻綸與戰大破之斬首千餘級翌日賊又來攻相持日晚賊稍引却南安侯駿以數十騎馳之賊廻距駿駿部亂賊因逼大軍遂潰綸至鍾山衆裁千人賊圍之戰又敗乃奔還京口三年春綸復與東陽州刺史大連等入援至于驃騎洲進位司空臺城䧟綸奔禹穴羊鴉仁前為司州刺史太清三年三月鴉仁等率所部入援臺城進軍東府北與賊戰大敗王質為假節寧逺將軍領東宫兵從貞陽侯北伐及貞陽敗績脫身逃還侯景於壽陽搆逆質又領舟師隨衆軍拒之景軍濟江質便退走尋領歩騎頓于宣陽門外景軍至京師質不戰而潰乃翦髪為桑門潛匿人間及柳仲禮等㑹援京邑軍據南岸質又收合餘衆從之京城䧟西奔荆州蕭明武帝兄子封貞陽侯豫州刺史武帝既納侯景詔明率水陸諸軍趨彭城大圖進取又命兖州刺史南康嗣王㑹理總馭羣帥指授方略明渡淮未幾官軍破被擒盡俘其衆魏帝升門樓觀引見明及諸將帥釋其禁送于晉陽楊乾運為信武將軍及達奚武圍南鄭武陵王紀遣乾運率兵援之為武所敗陳侯安都髙祖時為鎮北將軍率衆與周文育西討王琳至武昌琳將樊猛棄城走文育亦自豫章至時兩將俱行不相統攝因部下交爭稍不平軍至郢州琳將潘純於城中遥射官軍安都怒進軍圍之未能尅而王琳至于沌口安都乃釋郢州悉衆往沌口以禦之遇風不得進琳據東岸官軍據西岸相持數日乃合戰安都等敗績與周文育徐敬成竝為琳所囚總以一長鎻繫之置于䑽音沓下令所親宦者王子晉掌視之琳下至湓城白水浦安都等甘言許厚賂子晉子晉乃偽以小船依䑽而釣夜載安都文育敬成上岸入深草中歩投官軍還都自劾詔竝赦之復其官爵程靈洗為蘭陵太守隨周文育西討王琳於沌口敗績為琳所拘明年與侯安都等逃歸吳明徹授都督南北兖青譙五州諸軍事南兖州刺史㑹周氏滅齊髙祖將事徐兖詔明徹進軍北伐令世子戎昭將軍員外散騎侍郎慧覺攝行州事明徹軍至吕梁周徐州總管梁士彦率衆拒戰明徹頻破之因退兵守城不復敢出明徹仍引清水以灌其城環列舟艦於城下攻之甚急周遣上大將軍王軌將兵救之軌輕行自清水淮口横流豎木以鐵貫直輪遏斷船路諸將聞之甚恐議欲破堰拔軍以舫載馬馬明戍裴子烈議曰若決堰下船船必傾倒豈可得乎不如前遣馬出於事為允適㑹明徹苦背疾甚篤知事不濟遂從之乃遣蕭摩訶帥馬軍數千前還明徹乃自決其堰乗水勢而退軍兾其獲濟及至清口水勢漸㣲舟艦並不得渡衆軍皆潰明徹窮促乃就執尋以憂憤遘疾卒於長安蕭摩訶為侍中驃騎大將軍㑹隋總管賀若弼鎮廣陵窺覦江左後主委摩訶備禦之任授徐州刺史禎明三年正月元㑹徴摩訶還朝賀若弼乘虚濟江襲京口摩訶請率兵逆戰後主不許及弼進軍鍾山摩訶又請曰賀若弼懸軍深入聲援猶逺且其壘塹未堅羣情惶懼出兵掩襲必大尅之後主謂摩訶曰公可為我一决摩訶曰從來行陣為國為身今日之事兼為妻子後主多出金帛頒賞諸軍令中鎮軍魯廣達陳兵白土岡居衆軍之南偏鎮東大將軍任忠次之䕶軍將軍樊毅都官尚書孔範次之摩訶軍最居北衆軍南北亘三十里首尾進退各不相知初未戰時賀若弼將輕騎登山觀望形勢及見衆軍因馳下置陣廣達首率所部進薄弼軍屢却俄而復振更分軍趣北援諸將孔範出戰兵交而走諸將支離陣尚未合騎卒潰散駐之弗止摩訶無所用力焉為隋軍所執南康嗣王方泰後主禎明初為侍中三年隋師濟江方泰與忠武將軍南豫州刺史樊猛左衞將軍蔣元遜領水軍於白下往來斷遏江路隋遣行軍元帥長史髙熲領船艦泝流當之猛及元遜竝降方泰所部將士離散乃棄船走及臺城䧟與後主俱入關吕肅為南康太守時隋來伐陳肅將兵據巫峽以五條鐵鎻横江肅竭其私財以充軍用隋將楊素奮兵擊之四十餘戰爭馬鞍及磨刀澗守險隋軍死者五千餘人陳人盡取其鼻以求功賞既而隋軍屢㨗獲陳之士三縱之肅乃遁保延州别帥廖酉寵領大舫請降欲燒隋艦更决死一戰於是有五黄龍備衆色各長十餘丈驤首連接順流而東風浪大起雲霧晦㝠陳人震駭不覺火自焚隋軍乘髙艦張大弩以射之陳軍大敗風浪應時頓息肅收餘衆東走後魏宿沓于為虎威將軍道武天興五年正月慕容熙遣將冦遼西于等拒戰不利棄令支而還刁雍為建義將軍率衆二萬進屯固山雍從弟彌時亦率衆入京口規共討宋髙祖宋髙祖遣兵破之六月雍又侵宋青州雍敗乃收散卒保於馬耳山又為宋州軍所逼遂入大鄉山奚斤為司空征赫連昌昌弟助興先守長安聞昌敗遂走入上邽斤追之不及而還詔斤班師斤上疏曰赫連昌亡保上邽鳩合餘燼未有盤據之資今因其危滅之為易請益鎧馬平昌而還太武曰昌亡國叛夫擊之勞傷將士且可息兵取之不晩斤抗表固執乃許之給斤萬人遣將軍劉拔送馬三千匹與斤斤進討安定昌退保平凉斤屯軍安定以糧竭馬死遂深壘自固監軍侍御史安頡擊昌擒之昌衆復立昌弟定為主守平凉斤自以元帥而擒昌之功不在己深恥之乃捨輜重輕齎三日糧追定於平凉宗正娥清欲尋水而往斤不從自北道邀其走路定衆將出㑹一小將有罪亡入賊具告其實定知斤軍無糧乏水乃邀斤前後斤衆大潰斤及娥清劉拔為定所擒士卒死者六七千人後太武克平凉斤與娥清等得歸免為宰人使負酒食從駕還京師以辱之丘堆為太僕太武世征赫連昌堆與常山王素督歩兵三萬人為後軍昌戰敗南奔太武遣堆與宗正娥清率五千騎略地關右昌貳城守將堅守不下堆與清攻拔之詔堆班師而宜城王奚斤表留堆等進平昌許之堆斤合軍與昌相拒擊士馬乏糧堆與義兵將軍封禮督租於民間士卒暴掠為昌所襲敗績堆將數百騎還城本紀神䴥元年司空奚斤討赫連定於平凉馬髦嶺為定所擒丘堆先守輜重在安定聞斤敗棄甲東走長安帝聞大怒詔安頡斬堆盧淵為儀曹尚書孝文時南齊雍州刺史曹虎遣吏請降孝文以淵為使持節督前鋒諸軍逕赴樊鄧淵至葉具知曹虎譎詐之問兼陳利害詔淵進取南陽淵以兵少糧乏表求先攻赭陽以近葉倉故也孝文許焉乃進攻赭陽齊將垣歴生來救淵素無將略為賊所敗坐免官爵為民李佐為安南將軍副大司馬咸陽王禧為殿中將軍時孝文南討佐尋被勑與征南將軍城陽王鸞安南將軍盧淵等攻赭陽各不相節度諸軍皆坐甲城下欲以不戰降賊佐獨勒所部晨夜攻擊屬齊明帝遣其太子右衞率垣歴生衆來援咸以勢弱不敵規欲班師佐乃簡騎二千逆賊為賊所敗坐徙瀛州為民蕭寶夤齊明帝之子以梁武克建業殺其兄弟被害來奔宣武除為鎮東將軍及中山王英南伐寶夤又表求征乃授使持節鎮東將軍别將以繼英配羽林虎賁五百人與英頻破梁軍乘勝遂攻鍾離淮水汎溢寶夤與英狼狽引退士卒死没者十四五有司奏寶夤守東橋不固軍敗繇之處以極法詔曰寶夤因難投誠宜加矜貸可恕死免官削爵還第延昌四年遷撫軍將軍冀州刺史及大乘賊起寶夤遣軍討之頻為賊破臺軍乃滅之後於孝昌中為司空公出師既久兵將疲弊是月大敗還雍州仍停長安收聚離散有司處寶夤死罪詔恕為民楊昱為安東將軍蕭寶夤等敗於關中以昱兼七兵尚書持節假撫軍將軍都督防守雍州昱遇賊失利而反盧昶為都督時梁將馬仙琕率衆攻圍朐城戍主傅文驥嬰城固守以滎陽太守趙遐為别將與劉思祖等救之次於䰿音鼉口去城五十里夏雨頻降厲渉長驅將至朐城仙琕見遐營壘未就徑來逆戰思祖率彭沛之衆望陣奔退遐孤軍奮擊獨破仙琕斬其直閣將軍軍主李魯生仙琕乃分軍於朐城之西阻水列柵以圍固城遐身自潛行觀水深淺結草為筏啣枚夜進破其六柵遂散固城之圍進救朐城昶率大軍繼之未幾而文驥力竭以城降賊衆軍大敗昶棄其節輕騎而走唯遐獨握節而還遐坐失利免官河間王琛孝明時為秦州刺史時東益南秦二州氐反詔琛為都督進討氐羌大被摧破後又為大都督與長孫稚討鮮于修禮於鍾山琛與雉前到呼沲稚未欲戰而琛不從行達五鹿為修禮邀擊琛不赴之賊總至遂大敗稚與琛竝除名章武王融宣武初為河南尹以聚斂削爵時汾夏山胡叛逆連結正平平陽詔復融前封征東將軍持節都督以討之融寡於經略為胡所敗薛蠻為持節光禄大夫假安南將軍西道别將時莫折念生反於秦州遣其别帥卜胡王慶雲等寇涇州孝明以蠻與伊盆生等討之進及平凉郡東與賊交戰不利蠻等退還安樂王鑒為秘書監孝明孝昌元年徐州刺史元法僧據城反害行臺髙諒自稱宋王遣其子景仲歸於梁梁遣其將胡虎牙成景雋元略等率衆赴彭城詔鑒討之鑒於彭城南擊元略大破之盡俘其衆既而不備為法僧所敗梁武遣其豫章王綜入守彭城法僧擁其僚屬守令兵戍及郭邑士女萬餘口南入畢聞慰為都督安樂王鑒軍司馬元法僧反聞慰與鑒攻之為法僧所敗奔還京師被劾遇赦免崔延伯為征西將軍孝昌元年三月討万俟醜奴大敗於涇州戰殁源子恭為大都督孝莊建義元年爾朱兆冦丹谷都督崔伯鳯戰殁都督羊文義史五龍降兆子恭奔退盧仝為撫軍將軍營州城民就徳興反詔仝以本將軍為幽州刺史兼尚書行臺慰勞之仝慮徳興難信勒衆而往為徳興所擊大敗而還鹿悆音愈為使持節兼尚書右僕射東南道行臺至東郡值爾朱仲逺䧟西兖向滑臺詔與都督賀拔勝等拒仲逺軍敗還京崔暹為瀛州刺史武川鎮反詔暹為都督𨽻大都督李崇討之暹違崇節度為賊所敗單騎潛還北齊慕容儼神武時為揚州行臺監蕭莊王琳軍與陳將侯瑱侯安都戰於蕪湖敗還竇泰從神武西討令泰自潼關入泰至小關為周文帝所襲衆盡没泰自殺李希光為安南將軍西兖州刺史文宣責陳武帝廢蕭明命儀同蕭軌率希光東方老裴延起王敬寶歩騎數萬伐之以天保七年三月渡江襲克石頭城五將名位相侔延起以侍中為軍司蕭軌與希光竝為都督軍中抗禮不相服御競說謀略動必乖張頓軍丹陽城下值淋雨五十餘日及戰兵器竝不堪施用故致敗亡將帥俱死士卒得還者十二三所没器械軍資不可盡計宇文述為扶餘道將軍煬帝征髙麗述與九軍至鴨緑水糧盡議欲班師諸將多異同述又不測帝意㑹乙支文徳來詣其營述先與光禄大夫于仲文俱奉密㫖令誘執文徳既而緩縱文徳逃歸述内不自安遂與諸將渡水追之時文徳見述軍中多飢色欲疲述衆每鬭便北述一日之中七戰皆㨗既恃驟勝又内逼羣議於是遂進東濟陸水去平壤城三十里因山為營文徳復遣使偽降請述曰若旋師者當奉髙元髙麗之君朝行在所述見士卒疲弊不可復戰又平壤險固卒難致力遂因其詐而還衆半濟賊擊後軍於是大潰不可禁止九軍敗績一日一夜還至鴨緑水行四百五十里初渡遼九軍三十萬五千人及還至遼東城唯二千七百人帝大怒以述等屬吏至東都除名為民先是仲文率衆至鴨緑水述以糧盡欲還仲文議以精銳追文徳可以有功述固止之仲文怒曰將軍提十萬之衆不能破小賊何顔以見帝且仲文此行也固知無功矣述因厲聲曰何以知無功仲文曰昔周亞夫之為將也見天子軍容不變此决在一人所以功成名立今者人各有心何以赴敵初帝以仲文有計畫令諸軍諮禀節度故有此言繇是述等不得已而從之遂行東至薩水宇文述兵餒退歸師遂敗績帝以屬吏諸將皆罪於仲文帝大怒釋諸將獨繫仲文憂恚發病困篤方出之卒於家崔𢎞昇為涿郡太守遼東之役檢校左武衞大將軍事至平壤與宇文述等同敗績奔還發病而卒王辯為虎賁中郎將時翟讓冦徐豫辯進頻擊走之讓尋與李密屯據雒口倉辯與王世充討密阻雒水相持經年辯率諸將攻敗密因薄其營戰破外柵密諸營已有潰者乘勝將入城世充不知恐將士勞倦於是鳴角收兵翻為密徒所乘官軍大潰不可救止魏蘭根為河北行臺定州率募郷曲欲防井陘時爾朱榮將侯深自范陽趍山中蘭根與戰大敗尉破胡為開府儀同三司後主武平四年破胡長孫洪略等與陳將吳明徹戰於吕梁南大敗之破胡走以免洪略戰没遂䧟秦涇二州後周獨孤信為驃騎大將軍與馮翊王入雒陽潁豫襄廣陳留之地竝相繼欵附東魏將侯景等率衆圍雒陽信據金墉城旬有餘日及太祖至瀍東景退走信為右軍戰不利東魏遂有雒陽齊王憲太祖第五子也時李徹從武帝拔晉州及帝班師徹與憲屯雞棲原齊後主以大軍至憲引兵西上以避其鋒遣其驍將賀蘭豹子率勁騎躡憲戰於晉州城北憲師敗績與楊素宇文慶等力戰憲賴以獲全王褒初仕梁為僕射周軍征江陵梁元帝授褒都督城西諸軍事褒本以文雅見知一旦委以總戎深自勉勵盡忠勤之節被圍之後上下猜懼元帝唯於褒深自委信乃命褒與朱買臣率衆出宣陽之西門與周師戰買臣大敗褒督進不能禁乃貶為䕶軍將軍隋韓洪髙祖時為代州總管仁壽元年突厥達頭可汗犯塞洪率蔚州刺史劉隆大將軍李藥王拒之遇虜於恒安衆寡不敵洪四面搏戰身被重創將士沮氣虜悉衆圍之矢下如雨洪偽與虜和圍少解洪率所領潰圍而出死者大半殺虜亦倍洪及藥王除名為民隆竟坐死馮昱開皇初為行軍總管屯乙弗泊以備胡突厥數萬騎來掩之昱力戰累日衆寡不敵竟為虜所敗亡失數千人殺虜亦過當薛世雄為左衞大將軍涿郡留守未幾李密逼東都中原騷動煬帝詔世雄率幽薊精兵將擊之軍次河間營於郡城南河間諸縣竝集兵依世雄大軍為營欲討竇建徳建徳將軍來河口自選精銳數百夜來襲之先犯河間兵潰奔世雄營時遇雰霧晦暝莫相辨識軍不得成列皆騰柵而走於是大敗世雄與左右數十騎遁入河間城慙恚發病歸于涿郡未幾而卒叚達為左翊衞將軍煬帝幸江都宫詔達與太府卿元文郁留守東都李密據雒口縱兵侵掠城下逹與監門郎將龎玉武牙郎將霍舉率内兵出禦之頗有功遷左驍衞大將軍王充之敗也密復進據北邙來至上春門達與判左丞郭大懿尚書韋津出兵拒之達見賊盛不陣而走為密所乘軍大潰於陣繇是賊勢日盛王世充為江都守時李密攻䧟興雒倉進逼東都官軍數却光禄大夫裴仁基以武牢降于密煬帝惡之大發兵將討焉發中詔遣充為將軍於雒口以拒密前後百餘戰互有勝負充乃引軍渡雒水逼倉城李密與戰充敗績赴水溺死者萬餘人時天寒大雪兵士既渡水衣皆霑濕在道凍死者又數萬人比至河陽纔以千數充自繫獄請罪册府元龜卷四百四十二
