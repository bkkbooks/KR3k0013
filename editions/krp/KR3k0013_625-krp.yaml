body:
  text: 册府元龜卷六百二十五宋王欽若等撰卿監部邪佞貪冐廢黜邪佞易著閑邪之言傳垂逺佞之戒况夫職象河海任重股肱固宜悉其聰明好是正直若乃阿䛕靡媿巧令是圖蒐慝庸回廢忠毁信行媚以希於上指獻賕以恱於邇臣增宫禁之素規亂禮樂之舊物用速官謗或煩刑書於戲先王所以難任人者其以是夫漢張湯武帝時為廷尉意帝所欲辠予監吏深刻者卽帝意所釋予監吏輕平者杜周武帝時為廷尉其治大抵放張湯放依也音甫徃切而善候司觀望天子意帝所欲擠者因而陷之擠墜也音濟帝所欲釋乆繫待問而㣲見其寃狀見顯也後漢馮石為衞尉能取恱當世為安帝所寵晋石崇為衞尉與潘岳謟事賈謐與之親善號曰二十四友為廣城君賈后之母每出崇降車路左望塵而拜其卑佞如此宋王逺為光禄勲世為之語曰王逺如屏風屈曲從俗能蔽風露後魏王遇為將作大匠時太傅録尚書北海王詳親尊權重遇多随詳所欲而給之後因公事司空長史于忠於詳前謂遇曰殿下國之周公阿衡王室所湏財用自應闗㫖何阿䛕附勢損公惠私遇既不寜詳亦慙謝李世哲為鴻臚少卿性傾巧善事人亦以貨賂自達髙肇劉騰之處勢也皆與親善故世號為李錐隋袁充為太史令時髙祖將廢皇太子正窮治東宫官屬充見帝雅信符應因希㫖進曰比觀𤣥象皇太子當廢帝然之煬帝卽位之後熒惑守太㣲者數旬于時繕治宫室征役繁重充上表稱陛下修徳熒惑退舎百寮畢賀帝大喜前後賞賜將萬計時軍國多務充候帝意欲有所為便奏稱天文見象湏有改作以是取媚於帝累遷秘書少監其後天下亂帝初罹鴈門之厄又盗賊益起帝心不自安充復假託天文上表陳嘉瑞以媚於帝曰臣聞皇天輔徳福謙七政斯齊三辰告應伏惟陛下握鴻圖而馭黔首提萬善而化八紘以百姓為心匪以一人受慶先天罔違所欲後天必奉其時是以初膺寳歴正當上元之紀乾之初九又與本命符㑹斯則聖人冥契故能動合天經謹按去年以來𤣥象星瑞毫釐無爽謹録尤異上天降祥破突厥等狀七事其一云八月二十八日夜大流星如斗出王良北正落突厥營聲如隳墻其二八月二十九日夜復有大流星如斗出羽林向北流正當北方依占頻二夜流星墜賊所賊必敗散其三九月四日夜頻有兩星大如斗出斗魁向東北流依占北斗主殺伐賊必敗其四嵗星為福徳頻行京師二處分野依占國家之福其五七月内熒惑守羽林九月七日已退舎依占不出三日賊必敗散其六十一月二十日夜有流星赤如火從東北向西南落賊帥盧明月營破其撞車其七十二月十五日夜通漠鎮北有赤氣亘北方突厥將亡之應也依勘城録河南雒陽並當甲子與乾元初九爻及上元甲子符合此是福地永無所慮旋觀徃政側聞前古彼則異時間出今則一朝總萃豈非天贊有道助殱兇孽方清九夷於東穢沉五狄於北溟告成岱岳無為汾水書奏帝大恱超拜秘書令親待愈昵帝每欲征討充皆預知之乃假託星象奬成帝意在位者皆切患之宇文化及弑逆之際並誅裴藴為太常少卿初髙祖不好聲妓遣牛𢎞定樂非正聲清商及九部四舞之色皆罷遣從民至煬帝時藴揣知帝意奏括天下周齊梁陳樂家子弟皆為樂户其六品以下至於民庶有善音樂及倡優百戯者皆直太常是後異技滛聲咸萃樂府皆置愽士弟子逓相傳教增益樂人至三萬餘帝大恱宇文愷為將作大匠揣煬帝心在宏侈於是東京制度窮極壯䴡帝大恱之進位開府唐竇誕為大理卿誕閑習法令髙祖武徳中附從隠太子為之廻改文案太宗深責其短竇璡為將作大匠修營雒陽宫時太宗務存節儉璡乃於宫中鑿池起山崇飾雕䴡虚費功力太宗聞之大怒遽令毁之璡坐是免紀處訥神龍中為大府卿遣太史令傅孝忠奏曰有攝提至帝座王者與賢人相接大臣納忠時處訥奏事中宗賞焉楊元卿為光禄少卿憲宗元和末淮西平元卿初聞得蔡州請見帝曰淮西甚有寳貨及犀𢃄臣知徃取必得帝曰朕本討賊為人除害今賊平人安則我求得矣寳貨犀𢃄非所求也命勿言貪冐卿監之選古惟難才等威既崇職業斯重乃有昧操脩之㫖缺清白之行階藉恩寵因緣事任受財以逞欲治産以專利或侈汰以自任或牒訴而無耻以至犯縉紳之議罹簡書之刑詩所謂貪人敗類者其是之謂矣漢田延年宣帝時為大司農坐盗都内錢三千萬自殺事具邦計貪汚門丙顯元帝時為太僕十餘年與官屬大為姦利贓千餘萬免官奪邑四百户魏髙堂隆為侍中領太史令每祭與吏爭肉自取百斤猶以為少宋顔師伯為衞尉師伯居權日乆天下輻輳遊其門者爵位莫不踰分多納貨賄家産豐積伎妾聲樂盡天下之選園池第宅冠絶當時驕奢淫恣為衣冠所嫉後魏邢遜為大司農卿與少卿馬慶哲至相糾訟遜銳於財利議者鄙之祖瑩為秘書監以贓罰是務隋宇文化及自煬帝為太子時領千牛及卽位拜太子少卿益恃舊恩貪冐尤甚唐宇文頴隋末為司農少卿性貪鄙賍賄狼籍右司郎中盧楚將奏劾之頴懼與從父弟儒童等同奔於李宻顔師古太宗貞觀中為秘書少監多引後進之士為讐校師古抑素流先貴勢雖富商大賈亦引進之物論紛然稱其納賄繇是出為柳州刺史將行太宗惜其才謂之曰卿之識學良有可稱但事親居官未為清論所許今者此授卿自取之朕以卿曩從任使不忍遐棄宜深加誡厲也於是復以為秘書少監紀處訥中宗時為大府卿神龍中處訥私鑄錢奏京中許用惡錢大長姦偽于今弊之李逄年肅宗時為司農卿貪冐黷貨上元元年九月勅宜除名長流嶺南瀼州百姓終身勿齒鄭泌代宗時為司農卿大厯二年六月流于業州坐贓也韋洸憲宗時仕為光禄卿士元和五年十二月坐賍免官仍削銀青階裴通穆宗時為少府監長慶二年四月御史臺奏通前為弔祭回鶻使賣一子官與之印坐王榮兄憬偽稱外甥取錢一千貫奏授常州叅軍詔以通自絶域而還不之罪其王憬亦依前授官張武均穆宗時為將作監長慶四年十二月百姓董太和於有銀臺鐡耳稱供光陵材木武均不給價直出為洋州刺史稱疾不謝為憲司所糾再黜循州司馬明年閏七月御史書奏武均前任將作監日鬻優勞賍近九千貫合當司収管從之後唐柳􅈾明宗時為鴻臚卿將齊朗文書两件賣與同姓人柳居則其婢母論訴狀罪大理寺㫁罪當大辟縁遇恩赦令與减死奪見任官罰銅終身不齒晋李鍇少帝時為少府監開運二年坐冐請逃死人衣糧入已貶坊州司户楊延夀少帝時為太僕少卿襲酅國公開運三年奉命於辰州檢苗受贓二百餘疋准科當絞有司以二王後八議故貰其死除名配威州終身勿齒廢黜書曰王省惟嵗卿士惟月傳曰君之卿佐是謂股肱則知佩玉之列象河之任歴古為重選取其才至有罔愼厥位畔官離次享祀違失營搆過差馳道不修橋梁斯乏以至陵園被盗公田賂買或議論而不克或請託而必行至於廢黜以警曠慢者也漢孔臧為太常武帝元朔三年坐衣冠道橋壊不得渡免游衣冠之道張當居為太常元朔五年坐擇博士弟子故不以實免為城旦周平為太常武帝元狩三年坐不繕園陵免鄭當時為大司農任人賔客僦僦謂受顧賃而載運也言當時保仕其賓客於司農載運也僦子就切入多逋負司馬安為淮陽太守發其事當時以此陷罪贖為庶人李信成為太常元狩五年坐縱丞相侵神道為頴目劉受楚元王孫為宗正元狩五年坐聴請不具宗室耐為司冠受為宗正人有私請求者受聴許之故於宗室之中事有不具而受獲罪欒賁為太常元狩六年坐雍犧牲不如令免雍古扶風縣也五畤在此任越人為太常武帝元鼎二年坐廟酒酸論周仲居為太常元鼎三年坐不収赤側錢収行錢論赤側當廢而不收乃收見行之錢也蕭壽成為太常武帝元封元年坐犧牲痩不如令論免韓延年為太常元封二年坐流外國使人月入粟贖論杜恬為太常元封三年坐與大樂令中可當鄭舞人擅繇闌出入闗免擇可以為鄭舞而擅從役使之又闌出入闗杜相為太常元封四年坐擅繇太樂令論擅役使人也韓延夀為太常元封六年坐行大行令事留外國書一月乏興入糓贖免為城旦當有所興發因其遲留故闕之張昌為太常太初二年坐乏祠免祠事府聞也趙弟為太常太初二年坐鞫獄死而免為城旦鞫者以其辭戾罪也石徳為太常太初三年坐廟牲痩入糓贖論又坐失法㒺上祠不如令免為城旦靳石封為太常太初四年坐行幸離宫道橋苦惡故太僕敬聲繫以謁問赦免一云石封為太常坐為謁問囚故太僕敬聲亂尊卑免魏不害為太常昭帝始元五年坐孝文廟風發瓦免江徳為太常昭帝元鳳中坐廟廊夜飲失火免蘇昌為太常宣帝本始初坐籍霍山書泄秘書免以秘書借霍山宋疇為少府宣帝地節二年坐議鳳皇下彭城未至京師不足美貶為泗州太守任宫為太常地節四年坐人盗茂陵園中物免温順為少府成帝建始三年坐買公田與近臣下獄論劉順為宗正成帝河平四年坐使合陽侯舉子免平當成帝時為光禄勲先是太后娣子衞尉淳于長白言昌陵陵不可成下有司議當以為作治連年可遂就就亦成也上旣罷昌陵以長首建忠策復下公卿議封長當又以為長雖有善言不應封爵之科坐前議不正左遷鉅鹿太守前議謂罷昌陵蕭由為大鴻臚平帝元始中作明堂辟雍大朝諸侯由㑹病不及賔贊還歸故免官後漢梁松為太僕數為秘書請託郡縣永平二年發覺免官徐匡永平中為車府令車駕出信陽侯隂託干車騎突鹵簿匡就車收奴送獄詔書譴匡自繫不出吳良上書信陽侯驕慢干突車騎無人臣禮大不敬匡執法守正而下獄臣恐陛下政化繇是隳矣於是詔出匡左遷卽丘長晋張華為太常以太廟屋棟折免官鄭黙為太常齊王攸當之國下禮官議崇錫典制博士祭酒曹志等立異議黙容過其事坐免鄧攸為太常時南郊攸病不能從車駕過攸問疾攸力病出拜有司奏攸不堪行郊而拜道左坐免南齊虞悰為大匠卿起休安陵於陵所受局下牛酒坐免北齊杜弼為衞尉卿坐第二子廷尉監臺卿㫁獄稽遲與寺官俱為郎中封静哲所訟事旣上聞文宣發怒遂徙弼臨海鎭唐閻立徳為將作大匠貞觀中太宗將幸雒陽遣立徳行可清暑之地以建離宫遂於汝州西山前臨汝水旁通廣成澤以置宫焉役一百九十萬雜費稱是及此暑熱又多毒虺太宗大怒立徳竟坐免立徳初為將作少匠副髙士亷營獻陵拜將作大匠尋攝司空奉昭陵坐怠慢免韋宏機為司農卿兼統將作少府二官髙宗上元中始造宿羽髙山等宫又移雒水中橋營上陽宫劉仁軌謂侍御史狄仁傑曰古之陂池臺榭皆在深宫重城之内不欲外人見之恐傷百姓之心也機之所作列榭脩廊在於煙堞之外萬方朝謁無不覩之此豈致君堯舜之意哉機聞之曰天下有道百司各奉其職輔弼之臣則思獻替之事府藏之臣行詔守官而已吾不敢越分故也仁傑竟求索機過失奏劾之遂坐免官趙宗儒敬宗時以檢校左僕射兼太常卿太常有師子樂備五方之色非㑹朝聘享不作焉至是中人掌教坊之樂者移牒取之宗儒不敢違以狀白宰相宰相以為事在有司執守不合闗白宗儒憂恐不已宰相責以懦怯不任事除太子少師衞中行為國子祭酒寳厯元年中行擅用當司新賜錢一百八十五貫為分察使所劾中行稱是假借勑罰两月俸料梁李翼為光禄卿太祖乾化元年七月坐進廟胙色敗有詔罰兩月俸仇殷為司天監開平四年十月己巳夜月有蒼白暈鎭與胃昴在環中絡奎畢天舩卷舌殷不時奏罰兩月俸五年正月以天文變異殷又不時奏罰兩月俸冊府元龜卷六百二十五
