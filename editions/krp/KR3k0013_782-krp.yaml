body:
  text: 册府元龜卷七百八十二宋王欽若等撰總録部榮遇易曰崇髙莫大於富貴詩曰為龍為光盖士之趨世者或道合時主或功濟大業然後享豐禄齒髙位澤及於宗黨寵被於閨壼度越羣品垂為美談者斯有之矣若乃出於困辱奮自卑冗終以貴盛申其志節以至期運亨會勢望熏灼明詔敦奨徽美舉集或粲服歸於故郡或榮飬及於庭闈或展墓以達永懐或即家而為公府至乃父子更任於劇職宗戚迭處於要任以壯齒而躋顯仕因請老而還舊貫中外更踐便蕃增秩時君異其恩禮舉将更其出處斯皆才命胥契福祿来同致光景之振耀聳人倫之欽慕非夫保若驚之訓得持盈之道又曷能充終而寡悔哉蘇秦雒陽人出㳺數嵗大困而歸兄弟嫂妹妻妾皆笑之及為從約長并相六國北報趙王及行過雒陽車騎輜重諸侯各發使送之甚衆擬於王者周顯王聞之恐懼除道使人郊勞賔至近郊君使卿朝服用束帛勞蘇秦之昆弟妻嫂側目不敢仰視俯伏侍取食蘇秦笑謂其嫂曰何前倨而後恭也嫂委蛇蒲服以靣掩地而謝曰見季子位髙而金多也蘇秦字季子蘇秦喟然嘆曰此一人之身富貴則親戚畏懼之貧賤則輕易之况衆人乎且使我有雒陽負郭田二頃吾豈能佩六國相印乎於是散千金以賜宗族朋友漢嚴助會稽吳人為中大夫助侍燕從容武帝問助居鄉里時助對曰家貧為友壻富人所辱友壻同門之壻帝問所欲對願為會稽太守於是拜為會稽太守朱買臣字翁子會稽吳人家貧妻求去買臣不能留即聽去後買臣為會稽太守武帝謂買臣曰富貴不歸故鄉如衣繡夜行今子何如買臣頓首辭謝初買臣免待詔嘗從會稽守邸者寄居飯食拜為太守買臣衣故衣懐其印綬歩歸郡邸直上計時會稽吏方相與羣飲不視買臣買臣入室中守邸與共食食且飽少見其綬守邸怪之前引其綬視其印會稽太守章也守邸驚出語上計掾吏皆醉大呼曰妄誕耳守邸曰試來視之其故人素輕買臣者入内視之還走疾呼曰實然坐中驚駭白守丞漢舊郡國丞相長史與計吏俱逆計也謂之守丞者繫太守而言也相推排陳列中庭謁拜買臣徐出户有頃長安廐吏乗駟馬車來迎故事大夫乘官車駕駟如今州牧刺史矣買臣遂乘傳去會稽聞太守且至發民除縣長吏並送迎車百餘乘入吳界見其故妻妻夫治道買臣馳車呼令後車載其夫妻到太守舍置園中給食之居一月妻自經死買臣乞其夫錢令葬悉召見故人與飲食諸嘗有恩者皆報復焉司馬相如字長卿蜀郡成都人武帝時以中郎將至蜀太守以下郊迎縣令負弩矢先驅蜀人以為寵薛廣徳沛郡相人為御史大夫乞骸骨賜安車駟馬黄金六十斤罷廣徳東歸沛太守迎之界上沛以為榮懸其安車傳子孫疏廣為太子太傅廣兄子受為太子少傅太子每朝因進見太傅在前少傅在後父子並為師傅朝廷以為榮班伯髙祖壹始皇之末避地於樓煩漢孝惠時以財雄邊伯後為定襄太守歳餘成帝徵伯伯上書願過郡上父祖冢有詔太守都尉以下會其所因召宗族各以親疎加恩施散數百金北州以為榮長老紀焉後漢馮異潁川交城人為孟津將軍光武建武二年征陽翟賊嚴終趙根破之詔異歸上冢使大中大夫齎牛酒令二百里内太守都尉以下及宗族會焉景丹馮翊櫟陽人為驃騎大將軍建武二年定封丹櫟陽侯光武謂丹曰今關東故王國雖數縣不過櫟陽萬户邑夫富貴不歸故鄉如衣繡夜行故以封卿耳岑彭南陽棘陽人建武六年為征南大將屯津鄉南還有詔過家上冢大長秋以朔望問太夫人起居王恒潁川舞陽人為漢中將軍平沛郡賊建武六年徵恒還雒陽令人夫迎恒於舞陽歸家上冢吳漢南陽人建武十二年為大司馬平蜀振旅浮江而下至宛詔令過家上冢賜穀二萬斛傅燮北地靈州人太守范津舉燮孝亷及津為漢陽與燮交代合符而去鄉邦榮之韓稜潁川華陽人為南陽太守特聽稜得過家上冢鄉里以為榮韋端自凉州牧徵為太僕其子康代為凉州刺史時人榮之魏張既馮翊髙陵人漢末自尚書出為雍州刺史太祖謂既曰還君本州可為衣繡晝行矣張遼為前將軍屯合肥進遼爵都鄉侯給遼母輿車及兵馬送遼家詣屯勅遼母至導從出迎所督諸軍將吏皆羅拜道側觀者榮之吳朱治丹陽故鄣人大帝黄武二年拜安國將軍領吳郡是時丹陽深地頻有姦叛亦以年向老思戀土風自表屯故鄣鎮撫山越諸父老故人莫不詣門治皆引進與共飲宴鄉黨以為榮在故鄣歳餘還吳全琮吳郡錢塘人黄武七年為東安太守還經過錢塘修祭墳墓麾幢節盖曜於舊里請會邑人平生知舊宗族六親施散惠與千有餘萬本土以為榮諸葛恪為撫越将軍領丹陽太守授􅙶㦸武騎三百拜畢太帝命恪備威儀作皷吹導引歸家時年三十三紀陟景帝時父亮為尚書令陟為中書令每朝會詔以屏風隔其座焉晉鄭球字瑜少辟宰府七侍二宫袁瓌與弟猷俱渡江瓌為丹陽猷為武康兄弟列宰名邑論者美之陶侃家于潯陽後為江夏太守加鷹揚将軍侃備威儀迎母官舎鄉里榮之荀羨除北中郎将徐州刺史監徐兖二州揚州及晉陵諸軍事時年二十八中興方伯未有如羨之少者韋謏前後四登九列六在尚書三為侍中再為太子太傅封京兆公陳軍國之宜多見允納宋鄭鮮之為髙祖太尉諮議髙祖北伐以為右長史鮮之曽祖墓在開封相去三百里乞求拜省髙祖以騎送之南齊王奐仕宋領驍騎将軍又遷征虜將軍臨川王鎮西長史領南蠻校尉南郡内史一歳三遷張岱吳郡人髙帝建元元年出為左将軍吳郡太守太祖知岱厯任清直至郡未幾手勅岱曰大邦任重乃未欲廻換俱總戎務殷宜須望實今用卿為䕶軍加給事中岱拜竟詔以家為府孫㻛吳郡人自湘州刺史徵為散騎常侍中領軍未拜而武帝從容謂㻛曰昔朱買臣願為大郡卿豈有意乎乃改授持節安東將軍吳郡太守給皷吹一部及将之鎮乘輿幸近畿餞送鄉里榮之梁范雲為散騎常侍吏部尚書常侍讌髙祖謂臨川王宏鄱陽王恢曰我與尚書少親善申四海之敬今為天下主此禮即革汝宜代我呼范為兄二王下席拜與雲同車還尚書下省時人榮之吕僧珍東平苑人為左衛將軍領太子中庶子僧珍去家乆表求拜墓髙祖欲榮之使為本州乃授使持節平北將軍南兗州刺史栁慶逺河東解人為使持節都督雍梁南北秦四州諸軍事征虜将軍寧蠻校尉雍州刺史髙祖餞於新亭謂曰卿衣錦還鄉朕無西顧之憂矣到洽以天監二年為司徒主簿直待詔省勅使抄甲部書遷尚書殿中郎洽兄弟羣從遞居此職時人榮之王僧孺幼貧其母鬻紗布以自業常擕僧孺至市道遇中丞鹵簿驅廹溝中及僧孺為丞引騶清道悲感不自勝朱异為中書通事舍人遷散騎常侍累遷中領軍异居權要三十餘年厯官自員外常侍至侍中四職並驅鹵簿近代未之有也張綰為御史中丞舊制元日僕射中丞坐位東西相當大同四年綰兄纘為僕射及有司就列兄弟導騶兩塗前世未有也時人榮之孔休源初為中書舎人司徒臨川王記室參軍後臨川王為揚州刺史薨髙祖與羣臣議王代居州任者乆之時貴戚王咸望遷授髙祖曰朕已得人孔休源實應此選乃授宣惠将軍監揚州休源初為臨川王行佐及王薨而管州任時論榮之劉之燐南郡湼陽人自太學博士出為南郡太守髙祖謂曰卿母年徳並髙故令卿衣錦還鄉盡榮飬之理陳侯安都始興人為司空征北将軍南徐州刺史父文得為始興内史卒於官文帝徵安都還京師為發䘮尋起復本官贈其父散騎常侍金紫光禄大夫拜母為清逺國太夫人仍迎還都母固求停鄉里帝乃下詔改陸陽郡之汝城縣為廬陽郡分衡州之始興安逺二郡合三郡為東衡州以安都從弟曉為刺史安都第三子祕年九歳帝以為始興内史並令在鄉侍養王瑜字子珪早厯清顯三十官至侍中袁憲為右僕射參掌選事先是憲長兄樞為左僕射至是臺省目樞為太僕射憲為小僕射朝廷榮之後魏崔浩白馬公元伯之長子浩為祭酒每至郊祠父子並乘軒軺時人榮之畢衆敬為兖州刺史其子元賔亦為兖州刺史父子相代為州當世榮之甄琛中山毋極人為征北將軍定州刺史衣錦晝遊大為稱滿李憲為散騎侍郎以母老乞歸養憲趙郡平棘人也因拜趙郡太守李元䕶遼東襄平人為齊州刺史經拜舊墓廵省故宅享賜村老莫不欣暢崔鴻為尚書都兵郎中宣武詔太師彭城王勰以下公卿朝士儒學才明者三十人議定律令於尚書上省鴻與父光俱在其中時論榮之孫惠蔚厯國子祭酒祕書監出為平来将軍濟州刺史還京除光禄大夫魏初以来儒生寒官惠蔚最為顯達董徵頓邱衛國人為輔國將軍除安州刺史徵因述職路次過家置酒髙會大享邑老乃言曰腰龜返國昔人稱榮仗節還家云胡不樂因誡二三子弟曰此之富貴匪自天降乃勤學所致耳時人榮之茹皓舊吳人與趙脩俱侍直禁中為脩所妬出為濮陽太守其父讓之因皓訟理舊勲先除兖州陽平太守賜以子爵父子剖符名邦郡境相接趙邕南陽人為殿中将軍初邕父怡厯郢州刺史停家乆之以邕寵召拜太常少卿尋為荆州大中正出除征虜將軍荆州刺史邕弟尚中書舍人出除南陽太守怡辭荆州也尚求解郡與父俱還未至京師逆除歩兵校尉陸彰字明逺以衛将除齊州刺史又加驃騎将軍行懐州事轉北豫州刺史仍除徐州刺史将軍並如故一年厯三州當世榮之房士達清河人為京北王騎兵參軍其鄉人劉均房須等作亂攻陷郡縣士達父憂在家刺史元欣以士達為将士達率州人悉破平之就家拜平原太守孝莊帝時轉濟南太守士達不入京師而頻為夲州郡時人榮之楊逸字遵道為西平将軍南秦州刺史年二十九歳時方伯之少未有先之者北齊魏收字伯起初仕後魏節閔時為散騎侍郎尋勅典起居注并修國史俄兼中書侍郎時年二十六邢邵字子才仕東魏為太常卿中書監攝國子祭酒是時朝臣多守一職帶領二官甚少邵頓居三職並是文學之首當世榮之崔瞻為文宣相府司馬使于東魏孝静帝其父㥄侍宴又勅瞻令近御座亦有應詔詩詔問邢邵等曰此詩何如其父咸云㥄博雅宏麗瞻詞氣清新並詩人之冠冕讌罷共嗟賞之咸云今日之讌併為崔瞻父子後周楊標正平髙凉人魏孝武入關時為建武刺史鎮車箱標乆從軍役以未及葬父至是表請遷𦵏詔贈其父車騎大將軍儀同三司晉州刺史贈其母夏陽縣君並給儀衛州里榮之蘇亮武功人仕西魏為岐州刺史朝廷以其牧本州特給路車皷吹先還其宅并給騎士三十列羽儀遊鄉黨經過故人歡會旬日然後入州世以為榮亮自文帝大統以来無歳不轉官一年或至三遷僉曰才至不怪其速也赫連達雲中盛樂人仕西魏為帥都督封魏昌伯太祖以達勲望兼隆乃除雲州刺史進爵為公拜大都督田宏字廣略平原人西魏大統中自帥都督授原州刺史時以宏勲望兼至故以衣錦榮之叚永仕西魏為常州刺史于時朝貴多其部人謁永之日冠盖盈路當時榮之鄭雛初仕北齊為尚書郎趙郡李祖昇兄弟不甚敬憚及楊愔奏授雛趙郡太守祖昇兄弟具服至雛門投刺拜謁文宣聞之喜笑曰足得殺李家兒矣李穆除原州刺史又以兄賢子為平髙郡守逺子為平髙縣令並加皷吹穆自以叔姪一家三人皆牧宰鄉里恩遇過隆固辭不拜太祖不許王傑金城直城人仕西魏為驃騎大將軍孝閔踐祚進爵張掖郡公増邑一千戸出為河州刺史朝廷以傑勲望俱重授本州馮遷閔帝時為晉公䕶府掾後以其朝之舊齒欲以錦衣榮之乃授陜州刺史進爵隆山郡公増邑通前二千戸遷本寒微不為時輩所重一旦刺舉本州唯以謙恭接待鄉人無怨者令狐整為中外府樂曹參軍時諸功臣多為本州刺史晉公䕶謂整曰以公勲望應得本州但朝廷藉公委任無容逺出然公一門之内須有衣錦之榮乃以弟休為燉煌郡守劉雄臨洮子城人為内史大夫除候正髙祖嘗從容謂雄曰古人云富貴不歸故鄉猶衣錦夜遊今以卿為本州何如雄稽首拜謝於是詔以雄為河州刺史雄先己為本縣令復有此授鄉里榮之栁敏河東解人年未弱冠起家員外散騎侍郎累遷河東郡丞朝議以敏本邑故有此授唐瑾為蔡州刺史厯柘州硖州轉荆州總管府長史入為吏部中大夫厯御正納言中大夫曽未十旬遂遷四職搢紳咸以為榮辛威隴西人為鄜州刺史時望既重朝廷以桑梓榮之遷河州刺史本州大中正薛慎為膳部下大夫慎兄善又任工部並居清顯時人榮之王士良其先太原晉陽人後因避地凉州初仕齊為豫州刺史後歸周為鄜州刺史轉金州刺史士良去鄉既乆忽臨本州舊若故人猶有存者逺近咸以為榮李遷哲安康人世為山南豪族後為車騎将軍從開封府賀若敦狥地巴濮以功除直州刺史即本州也仍給軍儀皷節栁檜為撫軍將軍大都督時檜兄虬為秘書丞弟慶為尚書左丞檜嘗謂兄弟曰兄則職典簡牘褒貶人倫弟則管轄郡司股肱朝廷可謂榮寵矣然而四方未靜車書不一檜唯當蒙矢石履危難以報國恩耳隋劉宏彭城人初仕北齊西楚州刺史及齊亡周武帝以為本郡太守田式字顯摽馮翊下邽人祖安與父長樂仕魏俱為本郡太守式仕周又為本郡太守蘇威煬帝時為納言與左翊衛大將軍宇文述黄門侍郎裴矩御史大夫裴藴内史侍郎虞世基參掌朝政時人稱為五貴從征遼東還至涿郡詔威安撫關中以威孫尚輦直長儇為副其子鴻臚少卿䕫先為關中簡㸃大使一家三人俱奉使關右三輔榮之樊子盖廬江人為武威太守朝於江都宫煬帝謂之曰富貴不還故鄉真衣繡夜行耳勅廬江郡設三千人會賜米麥六千石使謁墳墓宴故老當時榮之來䕶兒江都人為右翊衛大將軍煬帝幸江都謂䕶兒曰衣錦晝遊古人所重卿今是也乃賜物三千叚并牛酒令謁先人墓宴鄉父老仍令三品已上並集其宅酣飲一日朝野榮之唐張鎮州同安人武徳中為舒州都督舒州即本邑也鎮州乃多市酒肴就望江舊宅盡召故人親戚與之酣宴散髮箕踞敦疇昔之歡十日贈以金帛既而垂泣謂親賔曰此者張鎮州與故人為歡今日已後舒州都督治百姓耳君民禮隔不得交遊因與之訣姜謩秦州上邽人武徳初平薛仁杲拜秦州刺史髙祖謂曰衣錦還鄉古人所尚今以本州相授用荅元功凉州之路近為荒梗宜宏方略有以靜之謩至州撫以恩信州人相謂曰吾輩復見太平官府矣盜賊悉来歸首士庶安之張士貴宏農盧氏人武徳中以戰功授虢州刺史髙祖謂曰欲卿衣錦晝遊耳温大雅武徳元年為黄門侍郎弟彦将為中書侍郎列居近侍議者榮之髙祖從容謂曰我起義晉陽為卿一門耳張行成定州義豐人為刑部侍郎太子詹事遼東之役從太子於定州監國即行成本邑也太子謂行成曰今者送公衣錦還鄉於是令有司祀其先人墓薛收與從父兄子元敬俱為文學舘學士賈敦實為饒陽令時制大功已上不得聨職敦實兄敦賾復為瀛州刺史朝廷以其兄弟亷謹特許令同州竟不遷替時人榮之劉禕之為左史宏文館直學士時又宻令參決以分宰相之權時人謂之北門學士禕之兄懿之時為給事中兄弟並居兩省論者美之韋承慶弟嗣立則天長夀中始代承慶為鳳閣舎人長安三年承慶又代嗣立為天官侍郎頃之又代嗣立知政事時以為榮蘇頲中宗神龍中累遷給事中加修文舘學士轉中書舎人時頲父瓌同中書門下三品父子同掌樞宻時以為榮賀知章為祕書監請度為道士求還鄉里天寳三載正月庚子遣左右相已下祖别於長樂坡帝賦詩以贈李峴信安王禕之第三子肅宗至徳中為京兆尹兼御史大夫時峴兄峘為戸部尚書兼成都尹乾元初𤣥宗還京峘自蜀至又兼御史大夫兄弟俱判臺事自國初以来兄弟並拜大夫未有其比時長安士庶皆賦詩美之于休烈嗣子益次子肅相繼為翰林學士歸宗敬徳宗興元初為散騎常侍宣慰兩河及還上表請歸拜墓許之賜以繒帛儒者榮之楊懐賔與其子朝晟並為邠寧節度韓遊瓌禆將父子同軍皆為開府賔客御史中丞異姓王榮於軍中陸贄為翰林學士時贄母韋氏在江東徳宗遣中使迎至京師搢紳榮之吳通微自夀安縣令入為金部郎中充翰林學士尋改職方郎中知制誥與弟通元同職禁署人士榮之趙宗儒為右拾遺翰林學士父驊為祕書少監與父並命出於中㫖當時榮之田宏正自魏博節度移統鎮冀其子希文為河陽三城懐州節度父子同日拜命皆領節制崔邠為吏部侍郎兄弟同時奉朝請者四人後改太常卿故事大卿初上大閱四部樂於官署觀者縱焉邠自私第去㡌親導母轝公卿逢者為廻騎避之衢路以為榮王鍔為容管經嶺南淮南河中太原四任節度受符節居方靣凡二十餘年仍加同平章事栁公綽為吏部侍郎與舅左丞崔從同省人士榮之孫徳昭與孫承誨董從實以反正功徳昭為檢校太保靜海軍節度使承誨邕州節度使從實容州節度使並同平章事時人呼為三使相恩澤俱冠世後唐張全義為忠武軍節度使全義於本朝迨朱氏之世自尚書僕射司空司徒平章事侍中守太師太傅太保太尉中書令尚書令封王食邑至一萬三千戸自雒鄆陜滑宋三􅊩河陽再領許州相繼十換麾幢厯二十九任位冠人臣善保終吉者一人而已李琪與兄班俱登進士第為梁太祖所知及革命以班為崇政學士琪為翰林學士昆仲並處禁林康思立本出隂山諸部性純厚善撫御明宗素重之故即位之始以應州所生之地授焉封舜卿為中書舎人從子渭為翰林學士叔姪對掌内外制又從子翹仕梁亦為翰林學士晉劉昫初仕後唐為兵部侍郎端明殿學士長興四年行中書侍郎兼刑部尚書平章事入謝日遇大祠明宗不御中興殿昫至中興殿門閤門使曰舊禮宰臣謝恩須於正殿通喚今日上以大祠不坐正殿請候来日樞宻使趙延夀曰命相之制下已三日中謝無宜後時即奏聞昫遂中謝於端明殿廷昫自端明學士拜相而謝於本殿人士榮之孔崇弼初仕後唐自吏部郎中授給事中時族兄昭序由給事中改左常侍兄弟同居門下時論榮之王建立為昭義軍節度使進封韓王仍割遼沁二州為昭義屬郡以建立本遼州人用成其衣錦之美也漢龍敏幽州永清人也初仕後唐為御史中丞敏父咸式年七十咸式之父年九十餘敏供飬二尊朝夕無懈咸式以敏貴得祕書監致仕敏為兵部侍郎奉使幽州鄉里耆舊留宴盡歡册府元龜卷七百八十二
