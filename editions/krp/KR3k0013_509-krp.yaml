body:
  text: 册府元龜卷五百九宋王欽若等撰邦計部鬻爵贖罪尚書曰徳懋懋官不聞以賄也秦漢以來乃懸納粟之令開鬻爵之品及鼂錯建議并許贖罪其初或因歲之薦饑兵之屢出邉陲餽運國用虚乏因立從權之制以濟一時之務至於免轉餉之役無讐歛之煩斯亦足食之竒䇿愛民之深㫖也厥後作法於貪流風益蠧乃有貯之别庫入於私門寖以成弊莫之能救還於蠲課役之户度釋老之徒條制彌煩驅役不已政典益壊俗化彌薄仲尼曰惟名與器不可以假人固在上者之所慎自非因時救急不得已者非可擬議焉秦始皇四年十月庚寅蝗蟲從東方蔽天天下疫百姓内粟千石拜爵一級漢惠帝元年十二月詔民有罪得買爵三十級以免死罪謂人出買爵之錢以贖罪一級直錢二千凡為六萬若令贖罪入三十匹縑矣六年十月令民得買爵文帝後六年四月詔民得買爵時中大夫鼂錯說帝曰聖王在上而民不凍饑者非能耕而食之織而衣之也為開其資財之道也故堯禹有九年之水湯有七年之旱而國亡捐瘠者捐謂民有饑相棄捐者瘠痩病也言無相棄捐而瘦疲者以畜積多而備先具也今海内為一土地人民之衆不避湯禹加以亡天災數年之水旱而畜積未及者何也地有遺利民有餘力生糓之土未盡墾山澤之利未盡出也㳺食之民未盡歸農也民貧則姦邪生貧生於不足不足生於不農不農則不地著不地著則離鄉輕家民如鳥獸雖有高城深池嚴法重刑猶不能禁也夫寒之於衣不待輕暖風霜不求靡麗也饑之於食不待甘㫖旨美也饑寒至身不顧亷恥人情一日不再食則饑終歲不製衣則寒夫腹饑不得食膚寒不得衣雖慈父不能保其子君安能以有其民哉明主知其然也故務民於農桑薄賦歛廣蓄積以實倉廪備水旱故民可得而有也民者在上所以收之趨利如水走下四方亡擇也夫珠玉金錢饑不可食寒不可衣然而衆貴之者以上用之故也其為物輕㣲易藏在於把握可以周海内而亡饑寒之患周謂周徧而㳺行此令臣輕背其主而民易去其鄉盗賊有所勸亡逃者得輕資也粟米布帛生於地長於時聚於力非可一日成也數石之重中人弗勝中人者處强弱之中也不為姦邪所利一日弗得而饑寒至是故明君貴五糓而賤金玉今農夫五口之家其服役者不下二人服事也給公事之役也其能耕者不過百畆百畆之收不過百石春耕夏耘秋穫冬藏伐薪樵治官府給繇役春不得避風塵夏不得避暑熱秋不得避隂雨冬不得避寒凍四時之間亡日休息又私自送往迎來弔死問疾養孤長㓜在其中勤苦如此尚復被水旱之災急政暴虐賦歛不時朝令而暮改當其有者半賈而賣本直千錢者止得五百也亡者取倍稱之息取一償二為倍稱舉稱也今俗所謂舉錢者也於是有賣田宅鬻子孫以償債者矣而商賈大者積貯倍息小者坐列販賣行賣曰商坐販曰賈列販若市中賣物行也操其奇嬴日㳺都市竒嬴謂有餘財蓄聚竒異之物也一說殘餘長也乘上之急所賣必倍上所急求其償倍貴故其男不耕耘女不蠶織衣必文采食必梁肉梁好粟也亡農夫之苦有仟伯之得仟謂千錢伯謂百錢也今俗猶謂百錢為一百因其富厚交通王侯力過吏執以利相傾千里㳺遨冠盖相望乘堅䇿肥履絲曵縞乘堅謂好車也縞皓素也繒之精白者也此農人所以流亡者也今法律賤商人商人已富貴矣尊農夫農夫已貧賤矣故俗之所貴主之所賤也吏之所卑法之所尊也上下相反好惡乖迕迕違也而欲國富法立不可得也方今之務莫若使民務農而已矣欲民務農在於貴粟貴粟之道在於使民以粟為賞罰今募天下入粟縣官得以拜爵得以除罪如此富民有爵農民有所渫渫散也夫能入粟以受爵皆有餘者也取於有餘以供上用則貧民之賦可損損减也所謂損有餘補不足令出而民利者也順於民心所補者三一曰主用足二曰民賦少三曰勸農功令民有車騎馬一匹者復卒三人復三卒之算錢也或曰除三夫不作甲卒也又曰為卒者免其三人不為卒者復其錢也車騎者天下武備也故為復卒神農之教曰有石城十仞八尺曰仭取人申臂之一尋也湯池百歩池城邉池也以沸湯為池不可輙近喻嚴周之甚也帶甲百萬而亡粟弗能守也以是觀之粟者王者大用政之本務令民入粟受爵至五大夫以上乃復一人耳五大夫第九等爵也此其與騎馬之功相去逺矣爵者上之所擅出於口而亡窮擅專也粟者民之所種生於地而不乏夫得高爵與免罪人之所甚欲也使天下人入粟於邊以受爵免罪不過三歲塞下之粟必多矣於是文帝從錯之言令民入粟於邊三百石爵上造上造第二等爵也稍増至四千石以五大夫萬二千石為大庶長大庶長第十八等爵也各以多少級數為差景帝時上郡以西旱復修賣爵令而裁其賈以招民裁謂减省之也及徒復作得輸粟於縣官以除罪時司馬相如以貲為郎武帝時事邊府庫並虚乃募民能入奴婢先為郎者増秩及入半者為郎庶人入婢奴則復終身先為郎者就増其秩也一曰奴婢少者復終身多者得為郎舊倉郎更増秩也後衞青比歲十餘萬衆擊胡比歲頻歲也斬捕首虜之士受賜黄金二十餘萬斤而漢軍士馬死者十餘萬兵甲轉漕之費不與焉於是大司農陳賦錢經用賦稅既竭不足以奉戰士陳謂列奏之經常也既盡也言常用之錢及諸賦秩並竭有司請令民得買爵及贖禁故免减罪請置賞官名曰武功爵茂陵中書有武爵一級曰造士二級曰閑輿衞三級曰良士四級曰元戎士五級曰官首六級曰秉鐸七級曰千夫八級曰樂卿九級曰執戎十級曰政戾庶長十一級曰軍衞此武帝所制以寵軍功也級十七萬凡直三十餘萬金諸買武功爵官首者使補吏先除千夫如五大夫五大夫舊二十等爵之第九級也至此以下始免徭役故每先選以為吏千夫者武功十一等爵之第七也亦得免役今則先除為吏比於五大夫也其有罪又减二等爵皆至樂卿樂卿者武功爵第八等也言買爵唯得至第八也臣顯軍功軍功多用超等大者封侯卿大夫小者郎吏道雜而多端則官職耗廢於是以東郭咸陽孔慬為大農丞姓東郭名咸陽並孔慬二人也咸陽齊之大鬻監孔慬南陽大冶皆致産累千金是時豪富皆匿財唯卜式數求入財以助縣官天子乃超拜式為中郎賜爵左庶長田十頃布告天下以風百姓其後桑宏羊為大司農中丞管設㑹計事始令吏得入糓補官郎至六百石吏遷補高官郎又就増其秩得至六百石也近臣所忠言世家子弟冨人或闘鷄走狗弋獵慱戲亂齊民所姓忠名也乃徴諸犯令相引數千人名曰株送徒入財者得補郎郎選衰矣諸坐博戯事史為徒者能入錢得補郎或曰被引者為其根株所送當充徒役而能入財者即當補郎時江充為直指繡衣使者督三輔盗賊禁察踰侈貴戚近臣多奢僣充皆舉刻奏請没入車馬令身待北軍擊匈奴令貴戚身待於北軍也奏可充即移書光禄勲中黄門逮召近臣侍中諸當詣北軍者移劾門衞禁止無令得出入宫殿於是貴戚子弟惶恐皆見帝叩頭求哀願得入錢贖罪帝許之令各以秩次輸錢北軍凡數千萬天漢三年九月令死罪入贖錢五十萬减死一等大始二年秋旱九月募死罪人贖錢五十萬减死一等黄覇字次公准陽陽夏人以豪傑役使徒雲陵身為豪傑而役鄉里人也覇少學律令喜為吏喜謂愛好也武帝末以待詔入錢賞官補侍郎謁者因入錢而見賞官坐同産有過劾免同産謂兄弟也後復入糓沈黎郡補左馮翊二百石卒史三輔郡得仕門它絜人而卒史獨二百石所謂尤異者馮翊以覇入財為官不署右職輕其為人也右職高職也使領郡錢糓計計謂出入之數章帝地節三年西羗反遣後將軍征之京兆尹張敞上書言國兵在外軍以夏發隴西以北安定以西吏民並給轉輸田事頗廢素無餘積雖羗虜以破來春民食必乏窮辟之處買亡所得縣官糓度不足以振之願令諸有罪非盗受財殺人及犯法不得赦者皆以差入糓此八郡贖罪差次也八郡即隴西以北安定以西務益致糓以豫備百姓之急事下有司左馮翊蕭望之與少府李疆議以為民函隂陽之氣有仁義欲利之心在教化之所助堯在上不能去民欲利之心而能令其欲利不勝其好義也雖桀在上不能去民好義之心而能令其好義不勝其欲利也故堯桀之分在于義利而已道民不可不慎也今欲令民量粟以贖罪如此則富者得生貧者獨死是貧富異刑而法不一也人情貧窮父兄囚執聞出財得以生活為人子弟者將不顧死亡之患敗亂之行以赴財利求救親戚一人得生十人以䘮如此伯夷之行壞公綽之名滅公綽魯大夫孟公綽也論語稱孔子曰若臧武仲之智公綽之不欲卞莊子之勇冉求之藝文之以禮樂可以為成人矣政教一傾雖有周召之佐恐不能復古者藏于民不足則取有餘則與詩曰爰及矜人哀此鰥寡小雅鴻鴈之詩也矜人可哀矜之人謂貧弱者也言王者恵澤下及哀矜之人以至鰥寡上惠下也又曰雨我公田遂及我私小雅大田之詩也言庶衆喜于時雨先潤公田又及私田是則其心先公後私下急上也今有西邊之役民失作業雖户賦口歛以贍其困乏率户而賦計口而歛也古之通義百姓莫以為非以死救生恐未可也子弟竭死以救父兄令其生也陛下布徳施政教化既成堯舜亡以加之今議開利路以傷既成之化臣竊痛之於是天子復下其議兩府丞相御史以難問張敞敞曰少府左馮翊所言常人之所守耳昔先帝征四夷兵行三十餘年百姓猶不加賦而軍用給今羗虜一隅小夷跳梁於山谷間漢但令辠人出財减罪以誅之其名賢於煩擾良民横興賦歛也又諸盗及殺人犯不道者百姓所疾苦也皆不得贖首匿見知縱所不當得為之屬議者或頗言其法可蠲除以其罪輕而法重故常欲除此科條今因此令贖其便明甚何化之所亂甫刑之罰小過赦薄罪贖吕侯為周穆王司冦作贖刑之法謂之吕刑後改為甫侯故又稱甫刑也有金選之品金銖兩名也字本作鋝鋝即鍰也其重十一銖二十五分銖之十三一曰重六兩吕刑曰墨辟疑赦其罰百鍰劓辟疑赦其罰惟倍剕辟疑赦其罰倍差宫辟疑赦其罰六百鍰大辟疑赦其罰千鍰是其品也所從來乆矣何賊之所生敞備皂衣二十餘年雖有五時服至朝皆着皂衣嘗聞罪人贖矣未聞盗賊起也竊憐凉州被㓂方秋饒時民尚有饑乏病死於道路况至來春將大困乎不早慮所以振救之䇿而引常經以難恐為後重責常人可與守經未可與權也敞幸得備列卿以輔兩府為職不敢不盡愚望之疆復對曰先帝聖徳賢良在位作憲乖法為無窮之規永惟邊境之不贍惟思也故金布令甲曰金布者令篇名也其上有府庫金錢布帛之事因以篇名令甲者其篇甲乙之次邊境數被兵離饑寒離遭也夭絶天年父子相失令天下共給其費同共給之也自此以上令甲之文故為軍旅卒暴之事也言此令文專為軍旅卒暴而施設聞天漢四年嘗使死罪人入五十萬錢减死罪一等豪强吏民請奪假貸至為盗賊以贖罪其後姦邪横暴羣盗並起至攻城邑殺郡守充滿山谷吏不能禁明詔遣繡衣使者以興兵擊之軍興之法也誅者過半然後衰止愚以為此使死罪贖之敗也故曰不便時丞相魏相御史大夫丙吉亦以為羗虜且破轉輸略足相給遂不施敞議成帝鴻嘉三年四月赦天下令吏民得買爵賈級千錢永始二年詔曰闗東比歲不登吏民以義收食貧民入糓物助縣官賑贍者已賜直收食貧人謂收取而飬食之助縣官賑贍謂出物以助郡之官也已賜直謂官賜其所費直也令方更入爵及免賦耳食讀曰飲其百萬以上加賜爵右更第十四爵也更音工行切欲為吏補三百石其吏也遷二等先以為吏則遷二等二十萬以上賜爵五大夫第九爵也吏亦遷二等民補郎十萬以上家無出租賦三歲萬錢以上一年平帝元始元年六月詔天下徒已諭歸家顧出錢月三百謂女徒論罪已定並放歸家不親役之但令一月出錢三百以顧人王莽時雒陽張長叔薛子仲貲亦十千萬莽皆以為納言士欲法武帝然不能得其利法武帝者言用卜式東郭咸陽孔慬等為官也後漢明帝以中元二年二月即位十二月甲寅詔天下亡命殊死以下聽得贖論死罪人縑二十匹右趾至髠鉗城旦舂十匹右趾謂刖其右足次則左足次劓次髠次髠鉗為城旦舂城旦者晝日司㓂虜夜暮築長城舂者婦人犯罪不任軍役之事但令舂以食徒者完城旦舂至司㓂作三匹完者謂不加髠鉗而築城也次鬼薪白粲次𨽻臣妾次作司㓂其未發覺詔書到先自告者半入贖永平十五年二月辛丑詔亡命自殊死以下贖死罪縑四十匹右趾至髠鉗城旦舂十匹完城旦至司冦五匹犯罪未發覺詔書到日自告者半入贖十八年三月丁亥詔曰其令天下亡命自殊死已下贖死罪縑三十匹右趾至髠鉗城旦舂十匹完城旦至司冦五匹吏人犯罪未發覺詔書到日自告者半入贖章帝建初七年九月辛邜詔贖死罪入縑二十匹右趾至髠鉗城旦舂十匹完城旦至司冦三匹吏人有罪未發覺詔書到日自告者半入贖元和元年八月癸酉詔亡命者贖各有差章和元年九月壬子詔亡命者贖死罪縑二十匹右趾至髠鉗城旦舂七匹完城旦至司㓂三匹吏民犯罪未發覺詔書到日告者半入贖和帝永元三年正月甲子皇帝加元服郡國中都官繫囚死罪贖縑至司㓂及亡命各有差八年八月辛酉詔自死罪已下至司㓂及亡命者入贖各有差安帝永初元年九月丙戌詔死罪以下及亡命者贖各有差二年四月丙寅三公以國用不足奏令吏人入錢糓得為關内侯虎賁羽林五大夫官府吏緹騎營士各有差元初二年十月詔郡國中都官繫囚减死一等勿笞詣馮翊扶風屯妻子自隨占著所在女子勿輸亡命死罪以下贖各有差其吏人聚為盗賊有悔過者除其罪延光三年九月乙巳詔郡國中都官死罪繫囚减罪一等詔燉煌隴西及度遼營其右趾以下及亡命者贖各有差順帝永建元年十月詔减死罪以下徙邊其亡命贖各有差永和五年五月丁丑令死罪以下及亡命者贖各有差漢安二年十月辛丑令郡國中都官繫囚殊死以下出縑贖各有差其不能入贖者遣詣臨羗縣居作二歲桓帝建和三年八月庚寅詔死罪以下及亡命者贖各有差延熹四年七月占賣闗内侯虎賁羽林緹騎營士五大夫錢各有差靈帝建寧元年十月甲辰令天下繫囚罪未决入縑贖各有差熹平三年十月癸丑令天下繫囚罪未决入縑贖四年十月丁巳令天下繫囚罪未决入縑贖光和元年初開西邸賣官自闗内侯虎賁羽林入錢各有差山陽公載記曰時賣官二千石二千萬四百石四百萬其以徳次應選者半之或三分之一于西園立庫以貯之私令在左賣公卿公千萬卿五百萬是時太尉段紀明樊陵司空張温等雖有功勤名譽然皆入錢上千萬下五百萬以買三公先輸貨財而後登公位崔烈名重北州歴位郡守九卿因傳母入錢五百萬得為司徒及拜日天子臨軒百僚畢㑹帝顧謂親倖者曰悔不小靳可至千萬靳顧惜也程夫人于傍應曰崔公冀州名士豈肯買官頼我得是反不知姝邪姝美也烈于是聲譽衰减曹嵩以貨得拜大司農大鴻臚代崔烈為太尉三年八月令繫囚罪未决入縑贖各有差五年七月癸酉令繫囚罪未决入縑贖中平四年九月丁酉令天下繫囚罪未决入縑贖是歲賣闗内侯假金印紫綬傳世入錢五百萬晉武帝嘗南郊禮畢問司𨽻校尉劉毅曰卿以吾可方漢何主也對曰桓靈之主帝曰吾雖徳不及古人猶克己為理南平呉㑹一同天下方之桓靈不亦甚乎對曰桓靈賣官錢入官庫陛下賣官錢入私門以此言之乃不如也後趙石季龍下書令刑贖之家得以錢代財帛無錢聽以糓麥皆隨時價輸水次倉宋前廢帝時軍旅大起國用不足募民上米二百斛錢五萬雜糓五百斛同賜荒縣除上米三百斛錢八萬雜糓千斛同賜五品正令史滿報若欲署四品在家亦聽上米四百斛錢十二萬雜糓一千三百石同賜四品令史滿報若欲署三品在家亦聽上米五百斛錢十五萬雜糓一千五百斛同賜三品令史滿報若欲署内監在家亦聽上米七百斛錢二十萬糓二十斛同賜荒郡除若欲署諸王國三令在家亦聽後魏孝明帝初任城王澄奏都城府寺猶未周悉今軍旅初寧無冝發衆請取諸職人及司州郡犯十杖已上百姓鞭已下收贖之物絹一匹輸慱二百以漸脩造詔從之太傅清河王懌表奏其事遂寢不行孝莊帝初承䘮亂之後倉廪虚罄遂班入粟之制輸粟八千石賞散侯六千石散伯四千石散子三千石散男職人輸七百石賞一大階授以實官白民輸五百石聽依第出身一千石加一大階無第者輸五百石聽九品出身一千石加一大階諸沙門有輸粟四千石入京倉者授本州統若無本州者授大州都統若不入京倉入外郡倉者三千石畿郡都統依州格若輸五百石入京倉者授本郡維郍其無本郡者授以外郡粟入外州郡倉者七百石入京倉者三百石授縣維郍永安三年二月詔曰關隴遭罹㓂難燕趙賊逆馮陵蒼生波流耕農靡業加諸轉運勞役已甚州倉儲實無且懸匱自非開輸賞之格何以息漕運之煩凡有能輸粟入瀛定岐雍四州者官斗二百斛賞一階入二華州者五百石賞一階不限多少粟畢授官唐肅宗至徳元年九月以軍典事殷國用不足詔權賣官及爵度僧尼節級納錢時裴冕為相不識大體以聚人曰財乃下令賣官鬻爵度僧尼道士以儲積為務人不願者科令就之其價益賤事轉為弊二年七月宣諭使侍御史鄭叔清奏承前諸使下召納錢物多給空名告身雖假以官賞其忠義猶未盡才能今皆量文武才藝兼情願穩便據條格擬同申奏聞便冩告身諸道士女道士僧尼如納錢請准勑廻授餘人并情願還俗授官勲邑號等亦聽如無人廽授及不願還俗者准法不合畜奴婢田宅資財既助國納錢不可更拘常格其所有資財能率十分納三分助國餘七分並任終身自䕃身殁之後亦任廻與近親又准勑納錢百千文與明經出身如曽受業粗通帖䇿修身慎行鄉曲所知者量减二十千文如先經舉送到省落第灼然有憑帖䇿不甚寥落者减五十千文若粗識文字者准元勑處分如未曽讀學不識文字者加三十千應授職事官并勲階邑號贈官等有合䕃子孫者如户内兼䕃丁中三人以上免課役者加百千文每加一丁中累加三千文其商賈准令所在收稅如能據所有資財十分納四助軍者便與終身優復如於勑條外有悉以家産助國嘉其竭誠待以非次先出身及官資並量資歴好惡各據本條格例節級優加擬授如七十以上情願致仕官者每色内量十分减二分錢時屬幽㓂内侮天下多虞軍用不充權為此制尋即停罷徳宗貞元四年正月制軍州官吏寄客能務農業入粟助邊量其多少酬以官秩憲宗元和十二年七月詔曰入粟助邊古今通制如聞定州側近秋稼多登屬以軍府虚貧未任收糴將設權宜之制以成儲蓄之資念切救人不同常例有人能于定州納粟五百石放同承優出身仍减三選聽集納粟一千石者使授解褐官有官者依資授官納粟二千石者超兩資授官如先有出身及官情願减選者每納三百石以减一選後唐莊宗同光三年閏十二月吏部尚書李琪上䟽曰臣伏思漢文帝時欲人務農乃募人入粟得拜爵及贖罪景帝亦如之後漢安帝時水旱不定三公奏請富人入粟得封闗内侯及公卿已下散官本朝乾元中亦曽如此今陛下縱不欲入粟授官願降明勑下諸道合差百姓轉般之有能出力運官物到京者五百石已上白身授一初任州縣官有官者依資遷授欠選者便與放選千石已上至萬石者不拘文武顯示賞酬免令方春農人流散此亦轉倉贍軍之一術也勑李琪所論召募轉倉斛斗與官行賞委租庸司下諸州府有應募者聞奏施行册府元龜卷五百九
