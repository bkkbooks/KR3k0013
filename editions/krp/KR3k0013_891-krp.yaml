body:
  text: 冊府元龜卷八百九十一宋王欽若等撰總録部㳺説第六漢范增居鄛人秦末天下兵起增説項梁曰陳勝敗固當夫秦滅六國楚最無罪自懐王入秦不返楚人憐之至今故楚南公曰楚雖三戸亡秦必楚今陳勝首事不立楚後而自立其勢不長今君起江東楚蜂起之将皆爭附君者以君世世楚将為能復立楚之後也乃求楚懐王孫心在民間牧羊立以為懐王以從民望也蒯通范陽人涿郡之縣也楚漢初起武臣畧定趙地號武信君通說范陽令徐公曰臣范陽百姓蒯通也竊閔公之将死故弔之雖然賀公得通而生也徐公再拜曰何以弔之通曰足下為令十餘年矣殺人之父孤人之子㫁人之足黥人之首甚衆慈父孝子所以不敢倳刅於公之腹者畏秦法也東方人以物挿地中為倳今天下大亂秦政不施施設也立也然則慈父孝子将爭接刅於公之腹以復其怨而成其名復猶報也此通之所以弔者也曰何以賀得子而生也曰趙武信君不知通不肖使人候問其死生通且見武信君而説之今将欲見之也曰必将戰勝而後畧地攻得而後下城臣竊以為殆矣殆危也用臣之計毋戰而畧地不攻而下城傳檄而千里定可乎彼将曰何謂也彼謂武信君也臣因對曰范陽令宜整頓士卒以戰守者也怯而畏死貪而好富貴故欲以其城先下君先下君而不利則邊地之城皆将相告曰范陽令先降而身死必将嬰城固守嬰以城自繞也皆為金城湯池不可攻也金以喻堅湯喻沸熱不可近也為君計者莫若以黄屋朱輪迎范陽令使馳騖於燕趙之郊令人皆見也則邊城皆将相告曰范陽令先下而身富貴必相率而降猶如阪上走丸也言勝勢便易此臣所謂傳檄而千里定者也徐公再拜具車馬遣通通遂以此說武臣武臣以車百乘騎二百侯印迎徐公燕趙聞之降者三十餘城如通䇿焉趙厮養卒不知何名厮取薪者飬飬人者趙王武臣間行為燕軍所得間出謂投間隙而微出也燕囚之欲與分地要刼之令割趙地輸燕以和解也使者徃燕輒殺之以固求地耳餘患之張耳陳餘也厮飬卒謝其舍以辭相告曰謝謝其舍謂告其舍中人也曰吾為二公説燕與趙王載歸二公張耳陳餘舍中人皆笑曰使者往十餘軰輒死若何以能得王若汝也乃走燕壁走趨也燕将見之問曰知臣何欲燕将曰若欲得趙王耳曰君知張耳陳餘何如人也燕将曰賢人也曰知其志何欲燕将曰欲得其王耳趙卒笑曰君未知両人所欲也夫武臣張耳陳餘杖馬箠下趙數十城言其不用兵革也箠謂馬撾也亦各欲南靣而王豈欲為卿相終已耶夫臣之與主豈可同日道哉顧其勢初定顧思念也且以長少先立武臣為王以持趙心今趙地已服此兩人亦欲分趙而王時未可耳今君囚趙王此兩人名為求王實欲燕殺之此両人分趙自立夫以一趙尚易燕易輕也况以両賢王左提右挈而責殺王之罪滅燕易矣提挈言相扶持也燕將以為然乃歸趙王養卒為御而歸酈食其陳留高陽人髙祖初為沛公從碭北攻昌邑未下西過高陽食其為里監門曰諸将過此者多吾視髙祖大度乃求見高祖高祖方踞牀使両女子洗洗洗足也酈生不拜長揖曰足下必欲誅無道秦不宜踞見長者於是高祖起攝衣謝之延上坐食其說高祖襲陳㽞高祖以為廣野君髙祖為漢王三年秋項羽擊漢拔滎陽漢兵遁保鞏楚人聞韓信破趙彭越數反梁地則分兵救之救趙及梁韓信方東擊齊漢王數困滎陽成臯計欲捐成臯以東屯鞏雒以距楚食其因曰臣聞之知天之天者王事可成不知天之天者王事不可成王者以民為天而民以食為天夫敖倉天下轉輸久矣臣聞其下乃有藏粟甚多楚人抜滎陽不堅守敖倉乃引而東令謫卒分守成臯謫卒謂卒之有罪謫者即所謂謫戍此乃天所以資漢方今楚易取而漢反卻自奪便不圗進取是為自奪便利也臣竊以為過矣且両雄不俱立楚漢乆相持不决百姓騷動海内揺蕩農夫釋耒織女下機耒手耕曲木也天下之心未有所定也願足下急復進兵收取滎陽據敖倉之粟塞成臯之險杜太行之道距飛狐之口守白馬之津以示諸侯形制之勢則天下知所歸矣方今燕趙已定唯齊未下今田廣據千里之齊田間将二十萬之衆軍於歴城諸田宗彊負海岱阻河濟南近楚齊人多變詐足下雖遣數十萬師未可以嵗月破也臣請得奉明詔説齊王使為漢而稱東籓上曰善乃從其畫復守敖倉而使食其説齊王曰王知天下之所歸乎曰不知也曰知天下之所歸則齊國可得而有也若不知天下之所歸則齊國未可保也齊王曰天下何歸食其曰天下歸漢齊王曰先生何以言之曰漢王與項王戮力西向擊秦約先入咸陽者王之項王背約不與而王之漢中項王遷殺義帝漢王起蜀漢之兵擊三秦出關而責義帝之負處收天下之兵立諸侯之後䧏城即以侯其将得賂則以分其士與天下同其利豪賢英才皆樂為之用諸侯之兵四靣而至蜀漢之粟方船而下方併也項王有背約之名殺義帝之負於人之功無所紀於人之罪無所忘言吝爵賞而念舊惡戰勝而不得其賞拔城而不得其封非項氏莫得用事言唯任同姓之親為人刻印刓而不能授言玩惜侯印不能以封人攻城得賂積財而不能賞天下畔之賢才怨之而莫為之用故天下之事歸於漢王可坐而筞也夫漢王發蜀漢定三秦渉西河之外援上黨之兵下井陘誅成安君破北魏舉三十二城此黄帝之兵非人之力天之福也今已據敖倉之粟塞成臯之險守白馬之津杜太行之阨距飛狐之口天下後服者先亡矣王疾下漢王齊國社稷可得而保也不下漢王危亡可立而待也田廣以為然乃聽食其罷歴下兵守戰備與食其日縱酒韓信聞食其馮軾下齊七十餘城乃夜度兵平原襲齊齊王田廣聞漢兵至以為食其賣已乃烹食其引兵走陳恢為秦南陽守齮舍人舍人親近左右之稱史失其姓高祖初為沛公攻破南陽守齮奔宛沛公圍之守欲自剄以刀割頸為剄恢曰死未晚也乃踰城見沛公曰臣聞足下約先入咸陽者王之今足下留守宛宛郡縣連城數十其吏民自以為䧏必死故皆堅守乘城乘登也謂上城而守今足下盡日止攻士死傷必多引兵去宛必隨足下前則失咸陽之約後有離宛之患為足下計莫若約䧏封其守因使止守引其甲卒與之西諸城未下者聞聲爭開門而待足下足下通行無所累沛公曰善七月南陽守齮降封為殷侯封陳恢千户張同不知何許人事成安君陳餘初項籍入關餘棄将印去不從籍既封諸侯聞其在南皮故因環封三縣綂南皮三縣以封之餘使同及夏説說齊王田榮曰項王為天下宰不明今盡王故王於醜地醜惡也而王羣臣諸将善地逐其故主趙王乃北居代餘以為不可於義當然聞大王起兵且不聽凡不義之事皆不聴順願大王資餘兵資給也使擊常山以復趙王請以國為扞蔽猶為齊之藩屛齊王許之因遣兵之趙餘悉發三縣兵與齊并擊常山大破之迎故趙王歇於代田生齊人史失其名高后時燕王澤為營陵侯田生㳺乏資以畫好澤以計畫干之澤大說之用金二百斤為田生夀因飲酒獻夀而與之金田生已得金即歸齊二嵗澤使人謂田生曰弗與矣與黨與也言不復與我為與也田生如長安不見澤而假大宅令其子求事吕后所幸大謁者張卿居數月田生子請張卿臨親脩具親父也具供具也張卿徃見田生帷帳具置如列侯張卿驚酒酣乃屏人說張卿曰臣觀諸侯邸第百餘皆高帝一切功臣今吕后雅故本推轂高帝就天下謂翼載崇奨以成帝業若車之行助推其轂故得引重而致逺功至大又有親戚太后之重太后春秋長言年老也諸吕弱太后欲立吕産為吕王王代吕后又重發之重難發其事也恐大臣不聽今卿最幸大臣所敬何不風大臣以聞太后太后必喜諸吕以為萬戸侯亦卿之有太后心欲之而卿為内臣不急發恐禍及身矣張卿大然諷大臣語太后太后朝因問大臣大臣請立吕産為吕王太后賜張卿千金張卿以其半進田生田生不受因説之曰吕産王也諸大臣未大服今營陵侯澤諸劉長為大将軍獨此尚觖望今卿言太后裂十餘縣王之彼得王喜於諸吕王益固矣張卿入言之又太后女弟吕􅎐女亦為營陵侯妻故遂立營陵侯澤為琅邪王與田生之國急行毋留出闗太后果使人追之已出即還公孫玃齊人景帝時吴王濞與七國謀反及發齊濟北両國城守不行漢既破吴齊王自殺得立嗣濟北王亦欲自殺幸全其妻子玃謂濟北王曰臣請試為大王明説梁王通意天子説而不用死未晚也玃遂見梁孝王曰夫濟北之地東接彊齊南牽吴越北脅燕趙此四分五裂之國四方受敵濟北居中央為五裂一云四分即交五而裂如田字也權不足以自守勁不足以扞寇又非為竒怪云以待難也言權謀勁力既不能守又無竒怪神靈可以禦難恐自全故墜言於呉也雖墜言於吴非其正計也墜猶失也昔者鄭祭仲許宋人立公子突以活其君非義也春秋記之為其以生易死以存易亡鄉使濟北見情實示不從之端則呉必先歴齊畢濟北歴過畢盡收濟北之地招燕趙而總之如此則山東之從結而無隙矣今呉楚之王練諸侯之兵敺白徒之衆綀選也白徒言秦非軍旅之人若今言白丁而與天子爭衡濟北獨砥節堅守不下使吳失與而無助跬歩獨進半歩曰跬瓦解土分破敗而不救者未必非濟北之力也夫以區區之濟北而與諸侯爭彊區區小貌是以羊犢之弱而扞虎狼之敵也守職不撓可謂誠一矣撓曲也功議如此尚見疑於上脅肩低首絫足撫衿脅翕也謂歛也使有自悔不前之心悔不與呉西也非社稷之利也臣恐藩臣守職者疑之臣竊料之能歴西山徑長樂抵未央攘袂而正議者獨大王爾西山謂有及華山抵至也攘卻也袂衣袖也上有全土之功下有安百姓之名德淪於骨髓㤙加於無窮淪入也願大王畱意詳惟之惟思也孝王大説使人馳以聞濟北王得不坐徙封為淄川高遂梁人景帝時竇嬰為太子太傅爭立太子事弗能得謝病屏居藍田南山下屏隠也數月諸竇賔客辯士説莫能来遂乃説嬰曰能富貴将軍者上也能親将軍者太后也臣欽若等曰竇太后嬰之從姑也今将軍傅太子太子廢爭不能得又不能死自引謝病擁趙女屏間處而不朝擁抱也間處猶言私處祗加懟自明揚主之過有如両宫奭将軍兩宫大后及帝也則妻子無類矣嬰然之乃起朝請如故後漢馮衍初為更始将軍㢘舟掾及舟與赤睂戰死衍乃亡命河東及更始遣尚書僕射鮑永行大将軍事安集北方衍因以計説永一云衍辟鄧禹府奏記於禹也曰衍聞明君不惡切慤之言以測幽㝠之論忠臣不顧爭引之患以逹萬機之變慤寔也幽㝠喻深逺也爭引謂引事與君争也事非一塗故曰萬機之變也是故君臣両興功名兼立銘勒金石令聞不忘今衍幸逄寛明之日将值危言之時豈敢拱黙避罪而不竭其誠哉伏念天下離王莽之害久矣始自東郡之師王莾居攝元年崔義起兵於東郡莽發八将軍擊之繼以西海之役王莾居攝元年西𦍑龎恬傳播等攻西海太守程永莽遣竇況擊之巴蜀沒於南夷緣邉破於北狄逺征萬里暴兵累年暴露也禍拏未解兵連不息拏謂相連引也刑法彌深賦歛愈重衆彊之黨横擊於外百僚之臣貪殘於内元元無聊饑寒竝臻父子流亡夫婦離散廬落丘墟田疇蕪穢疾疫大興災異蜂起於是江湖之上海岱之濱風騰波涌更相駘籍駘亦作跆蹋也四垂之人肝腦塗地死亡之數不啻大半殃咎之毒痛入骨髓匹夫僮婦咸懐怨怒僮猶賤也皇帝以聖德靈威龍興鳳舉率宛葉之衆将散亂之兵喢血昆陽長驅武關破百萬之陣摧九虎之軍王莾末下江兵攻武關莾拜将軍九人皆以虎為號捍之雷震四海席捲天下攘除禍亂誅滅無道一朞之間海内大定繼高祖之休烈修文武之絶業社稷復存炎精更輝德冠徃初功無與二天下自以去亡新就聖漢當蒙其福而賴其惠願樹㤙布德易以周洽其猶順驚風而飛鴻毛也言易也然而諸将虜掠迸倫絶理倫亦理也殺人父子妻人婦女燔其室屋掠其財産饑者毛食毛草也寒者裸跣寃結失望無所歸命今大将軍以明淑之徳秉大使之權絶三軍之政存撫并州之人惠愛之誠加乎百姓高世之聲聞乎羣士故其延頸企踵而望者非特一人也且大将軍之事豈特珪璧其行束修其心而已哉言當恢廓規摹不可空自清潔徒約束修身也将定國家之大業成天下之元功也昔周宣中興之主齊桓霸彊之君爾猶有申伯召虎夷吾吉甫攘其蟊賊蟊賊食稼虫喻姦盗侵漁也安其疆宇况乎萬里之漢明帝復興而大将軍為之梁棟此誠不可以忽也且衍聞之兵久則力屈人愁則變生今邯郸之賊未滅真定之際復擾邯郸謂王郎也真定謂劉楊也而大将軍所部不過百里守城不休戰争不息兵革雲翔百姓震駭奈何自怠不為深憂夫并州之地東帯名闗北逼彊胡并陘闗也一作石陘要害之塞故曰名闗年榖獨熟人庶多資斯四戰之地攻守之塲也如其不虞何以待之故曰徳不素積人不為用備不預具難以應卒今生人之命縣於将軍将軍所仗必湏良才宜改易非任更選賢能夫十室之邑必有忠信審得其人以承大将軍之明雖則山澤之人無不感德思樂為用矣然後簡精鋭之􅌰發屯守之士三軍既整兵甲已具相其土地之饒觀其水泉之利制屯田之術習戰射之教則威風逺暢人安其業矣若鎮太原撫上黨收百姓之歡心樹名賢之良佐天下無變則足以顯聲譽一朝有事則可以建大功惟大将軍開日月之明發淵泉之慮𥪡六經之論觀孫吴之筞省羣識之是非詳衆士之白黒白黒猶賢愚也以超周南之迹垂甘棠之風令夫功烈施於千載富貴傳於無窮伊望之筞何以加茲伊尹吕望永既素重衍為且受使得自置偏禆乃以衍為立漢将軍領狼孟長屯太原申屠剛扶風茂陵人王莾時避地河西隗囂據隴右欲背漢而附公孫述剛説之曰愚聞人所歸者天所與人所畔者天所去也伏念本朝謂光武也躬聖德舉義兵共行天罰所當必摧誠天所福非人力也将軍本無尺土孤立一隅宜推誠奉順與朝并力上應天心下醻人望為國立功可以永年嫌疑之事聖人所絶将軍之威重逺在千里動作舉措可不慎與今璽書數到委國歸信欲與将軍共同吉凶布衣相與尚有沒身不負然諾之信况於萬乘者哉今何畏何利乆疑如是􅌰有非常之變上負忠孝下愧當世言從漢何畏附蜀何利而乆疑不决夫未至豫言固嘗為虚及其已至又無所及是以忠信至諌希得為用誠願反覆愚老之言囂不納遂畔從述建武七年詔書徴剛剛将歸與囂書曰愚聞專已者孤拒諫者塞孤塞之政亡國之風也雖有明聖之姿猶屈己從衆故慮無遺策舉無過事夫聖人不以獨見為明而以萬物為心順人者昌逆人者亾此古今之所共也将軍以布衣為鄉里所推廟廊之計廊殿下屋廟太廟也國事必先謀於廟廊之所既不豫定動軍發衆又不深料今東方政敎日睦百姓平安而西州發兵人人懐憂騷動惶懼莫敢正言羣衆疑惑人懐顧望非徒無精鋭之心其患無所不至夫人窮則變生事急則計易其勢然也夫離道德逆人情而能有國有家者古今未有也将軍素以忠孝顯聞是以士大夫不逺千里慕樂道義今苟欲决意徼幸此何如哉夫天所祐者順人所助者信如未蒙祐助令小人受塗地之禍毁壊終身之徳敗亂君臣之節汚傷父子之㤙不從光武是亂君臣之節遣子恂入質而背之是傷父子之㤙也衆賢破膽可不慎哉囂不納馬援為隗囂綏德将軍建武四年隗囂子恂居雒陽光武召援計事援具言謀畫因使援将突騎五千徃来游説囂将高峻任禹之屬下及羗豪為陳禍福以離囂友黨援為書與囂将楊廣使曉勸於囂曰春卿無恙春卿楊廣字前别莫南天水冀縣寂無音驛援間還長安因留上林竊見四海已定兆民同情而季孟閉拒背畔季孟囂字為天下表的表標也言為標凖射的也嘗懼海内切齒思相屠裂故遺書戀戀以致惻隠之計乃聞季孟歸罪於援而納王㳺翁謟邪之説㳺翁王元字自謂函谷以西舉足可定以今而觀竟何如邪援間至河内過存伯春存猶聞也見其奴吉從西方還說伯春小弟仲舒望見吉欲問伯春無他否竟不能言曉夕號泣婉轉塵中又説其家悲愁之状不可言也夫怨讐可刺不可毁援聞之不自知泣下也援素知季孟孝愛曽閔不過夫孝於其親豈不慈於其子可有子抱三木而跳梁妄作三木桎梏及械自同分羔之事乎樂羊為魏将攻中山其子在中山中山君烹其子而遺之羹羊啜之盡一盂而攻抜中山季孟平生自言所以擁兵衆者欲以保全父母之國而完墳墓也又言苟厚士大夫而已而今所欲全者将破亡之所欲完者将毁傷之所欲厚者将反薄之季孟嘗折愧子陽而不受其爵愧猶辱也今更其陸陸陸陸猶碌碌也欲徃附之将難為顔乎若復責以重質當安從得子主給是哉往時子陽獨欲以王相待謂欲封為朔寧王也而春卿拒之今者歸老更欲低頭與小兒曹共槽櫪而食併肩側身於怨家之朝乎男兒溺死何傷而拘游哉㳺浮也今國家待春卿意深宜使牛孺卿與諸耆老大人大人謂豪傑也共説季孟若計畫不從真可引領去矣前披輿地圗見天下郡國百有六所奈何欲以區區二邦以當諸夏百有四乎春卿事季孟外有君臣之義内有朋友之道言君臣邪固當諌諍語朋友邪應有切磋骨曰切象曰磋豈有知其無成而但萎腇咋舌乂手從族乎萎腇弱也輭及今成計殊尚善也過是欲少味矣以食為諭且来君叔天下信士君叔来歙字朝廷重之其意依依嘗獨為西州言援商朝廷尤欲立信於此啇度也必不負約援不得乆留願急賜報廣竟不答周毖靈帝末為侍中董卓議廢立司𨽻袁紹不從卓怒紹出遂亡奔冀州毖與城門校尉伍瓊議郎何顒等皆名士也卓信之而陰為紹乃説卓曰夫廢立大事非常人所及紹不逹大體恐懼故出奔非有他志令購之急勢必為變袁氏樹㤙四世門生故吏徧天下若收豪傑以聚徒衆英雄因之而起則山東非公之有也不如赦之拜一郡守則紹喜於免罪必無患矣卓以為然乃拜紹渤海太守封邟鄉侯高幹陳留人袁紹既自號車騎将軍主盟與冀州牧韓馥起兵誅董卓馥軍至安平為公孫瓉所敗瓉遂引兵入冀州􅊞馥紹因馥惶遽使幹及潁川荀諶等説馥曰公孫瓉乘勝来南而諸郡應之袁車騎引軍東向其意未可量也竊為将軍危之馥懼曰然則為之奈何諶曰君自料寛仁容衆為天下所附孰與袁氏馥曰不如也臨危吐决智勇邁於人又孰與袁氏馥曰不如也世布㤙德天下蒙受其惠又孰與袁氏馥曰不如也諶曰勃海雖郡其實州也今将軍資三不如之勢乆處其上袁氏一時之傑必不為将軍下也且公孫瓉提燕代之卒其鋒不可當夫冀州天下之重資若両君并力兵交城下危亡可立而待也夫袁氏将軍之舊且為同盟當今之計莫若舉冀州以譲袁氏必厚徳将軍公孫瓉不能復與之争矣是将軍有譲賢之名而身安於㤗山也願勿有疑馥素性懦怯因然其計魏程昱漢末為夀張令太祖征徐州使昱與荀彧留守鄄城張邈等叛迎吕布郡縣響應唯鄄城范東阿不動吕布軍降者言陳宫欲自将兵取東阿又使汛嶷耴范吏民皆恐或謂昱曰今兖州反唯有此三城宫等以重兵臨之非有以深結其心三城必動君民之望也歸而説之殆可昱乃歸過范說其令靳允曰聞吕布執君母弟妻子孝子誠不可為心今天下大亂英雄竝起必有命世能息天下之亂者此智者所詳擇也得主者昌失主者亡陳宫叛迎吕布而百城皆應似能有為然以君觀之布何如人哉夫布麤中少親剛而無禮匹夫之雄爾宫等以勢假合不能相君也兵雖衆終必無成曹使君智畧不世出殆天所授君必固范我守東阿則田单之功可立也孰與違忠從惡而母子俱亡乎惟君詳慮之允流涕曰不敢有二心時汎嶷已在縣允乃見嶷伏兵刺殺之歸勒兵守劉放字子棄涿郡人歴郡綱紀舉孝㢘遭世大亂時漁陽王松據其土放徃依之太祖克冀州放説松曰往者董卓作逆英雄竝起阻兵擅命自封殖惟曺公能拔拯危亂翼戴天子奉辭伐罪所向必克以二袁之彊守則淮南氷消戰則官渡大敗乘勝席卷将清河朔威刑既合大勢已見速至者漸福後服者先亡此乃不俟終日馳騖之時也昔黥布棄南靣之尊仗劍歸漢誠識廢興之理審去就之分也将軍宜投身委命厚自結納松然之王粲山陽高平人既依荆州牧劉表表卒粲説其子琮曰僕有愚計願進之於将軍可乎琮曰吾所願聞也粲曰天下大亂豪傑並起在倉卒之際彊弱未分故人各有心爾當此之時家家欲為帝王人人欲為公侯觀古今之成敗能先見事機者則常受其福今将軍自度何如曹公邪琮不能對粲復曰如粲所聞曹公故人傑也雄畧冠時智謀出世摧袁氏於官渡驅孫權於江外逐劉備於隴右破烏丸於白登其餘梟夷蕩定者往往如神不可勝計今日之事去就可知将軍能聽粲計巻甲倒戈應天順命以歸曺公曺公必重德将軍保已全宗長享福祚垂之後嗣此萬全之筞也粲遭亂流離託命此州䝉将軍父子重顧敢不盡言琮納其言太祖辟為丞相椽賜爵闗内侯辛毗字佐治潁川翟陽人随兄評從袁紹紹卒袁尚攻兄譚於平原譚使毗詣太祖求和太祖将征荆州次于西平毗見太祖致譚意太祖大悦後数日更欲先平荆州使譚尚自相弊他日置酒毗望太祖色知有變以語郭嘉嘉白太祖太祖謂毗曰譚必可信尚必可克不毗對曰明公無問信與詐也直當論其勢耳袁氏本兄弟相伐非謂他人能間其間乃謂天下可定於己也今一旦求救於明公此可知也顯甫見顯思困而不能取此力竭也袁尚字顯甫袁譚字顯思兵革敗於外謀臣誅於内兄弟䜛䦧國分為二連年戰伐而介胄生蟣虱加以旱蝗饑饉並臻國無囷倉行無褁糧天災應於上人事困於下民無智者皆知土崩瓦觧此乃天亡尚之時也兵法稱有石城湯池帯甲百萬而無粟者不能守也今徃攻鄴尚不還救即不能自守還救即譚踵其後以明公之威應困窮之敵撃疲弊之寇無異迅風之振秋葉矣天以袁尚與明公明公不取而伐荆州荆州豐樂國未有釁仲虺有言取亂侮亡况今二袁不務逺畧而内相圗可謂亂矣居者無食行者無糧可謂亡矣朝不謀夕民命靡繼而不綏之欲待他年他年或登又自知亡而改修厥德失所以用兵之要矣今因其請救而撫之利莫大焉且四方之冦莫大於河北河北平則六軍威而天下震大祖曰善乃許譚平次于黎陽明年攻鄴克之蜀諸葛亮初先主居荆州先主為魏太祖所追至於夏口亮請奉命求救於吴孫權時權軍柴桑觀望成敗亮説權曰海内大亂将軍起兵據有江東劉豫州亦収衆漢南與曹操竝爭天下今操芟夷大難畧已平矣遂破荆州威震四海英雄無所用武故豫州遁逃至此将軍量力而處之若能以吴越之衆與中國抗衡不如早與之絶若不能當何不按兵束甲北靣而事之今将軍外託服從之名而内懐猶豫之計事急而不斷禍至無日矣權曰苟如君言劉豫州何不遂事之亮曰昔田横齊之壮士也猶守義不辱况劉豫州王室之胄英才蓋世衆士仰慕之若水歸海若事之不濟此乃天也安能復為之下孫主勃然曰吾不能舉全吴之地十萬之衆受制於人吾計决矣然非劉豫州莫可當曹操者然豫州新敗之後能抗此難乎亮曰豫州雖敗於長阪今戰士還者乃雲長水軍精甲萬人劉琦合江夏戰士亦不下萬人曺操之衆逺来疲弊聞追豫州輕騎一日一夜行三百里此所謂彊弩之末不能穿魯縞者也故兵法忌之今将軍誠與豫州恊規同力破操軍必矣權大悦即并力拒曹操曹公敗於赤壁吴朱治為安國将軍大帝從兄豫章太守賁女為曺公子婦及曺公破荆州威震南土賁畏懼欲遣子入質治聞之求往見賁為陳安危治説賁曰破虜将軍昔率義兵入討董卓聲冠中夏義士壮之討逆係世廓定六郡特以君侯骨肉至親器為時主故表漢朝剖符大郡兼建将校仍關綜両府榮冠宗室為逺近所瞻加討虜聪明神武係承洪業攬結英雄周濟世務軍衆日盛事業日隆雖昔蕭王之在河北無加也必克成王基應運東南故劉𤣥德逺布腹心求見拯救此天下所共知也前在東聞道路之言云将軍有畧趣良用憮然今曺公阻兵傾覆漢室㓜帝流離百姓元元未知所歸而中國蕭條或百里無烟城邑空虚道殣相望士怨於外婦歎乎室加之以師旅因之以饑饉以此料之豈能越長江與我爭利哉将軍當斯時也而欲背骨肉之親違萬安之計割同氣之膚啖虎狼之口為一女子改慮異圗失機毫釐差以千里豈不惜哉賁繇此遂止李衡為諸葛恪司馬魏将胡遷等南伐恪使衡往蜀説姜維令同舉曰古人有言聖人不能違時時至亦不可失也今敵政在私門外内猜隔兵挫於外而民怨於内自曺操以来彼之亡形未有如今者也若大舉伐之使吳攻其東漢入其西彼救西則東虚重東則西輕以練實之軍乘虚輕之敵破之必矣維從之晉顧榮為太傅東海王越軍諮祭酒屬廣陵相陳敏反南渡江逐揚州刺史劉機丹陽内史王曠阻兵據州分置子弟為列郡牧禮豪傑有孫劉鼎峙之計假榮右将軍丹陽内史榮數踐危亡之際嘗以恭遜自勉㑹敏欲誅諸士人榮説之曰中國䘮亂胡夷内侮觀太傅今日不能復振華夏百姓無復遺種江南雖有石氷之冦人物尚全榮嘗憂無竇氏孫劉之筞有以存之爾今将軍懐神武之畧有孫呉之能功勲效於己著勇略冠於當世帯甲數萬舳艫山積上方雖有數州亦可傳檄而定也若能委信君子各得盡懐散蔕芥之恨塞䜛謟之口則大事可圗也敏納其言悉引諸豪族委任之敏仍遣丼卓出横江堅甲利器盡以委之劉暾為司𨽻時王彌入雒百官殱焉彌以暾鄉里宿望故免於難暾因説彌曰今英雄競起九州幅裂有不世之功者宇内不容将軍自興兵以来何攻不克何戰不勝而復與劉曜不恊宜思文種之禍以范蠡為師且将軍可無帝王之意東王本州以觀事勢上可以混一天下下可以成鼎峙之事豈失孫劉乎蒯通有言将軍且圗之彌以為然使暾于青州與曺嶷謀且徴之暾至東阿為石勒遊騎所獲見彌與嶷書而大怒乃殺之毛寳為廬江太守蘓峻之作逆陶侃温嶠未能破賊侃欲率衆南還寳謂嶠曰下官能㽞之乃往説侃曰公本應領蕪湖為南北勢援前既已下勢不可還且軍政有進無退非直整齊示衆必死而已亦謂退無所據終至滅亡往者杜弢非強盛公竟滅之何至於峻獨不可破邪賊亦畏死非皆勇徤公可試與寳兵使上岸斷賊資糧出其不意使賊困蹙若寳不立效然後公去人心不恨侃然之加寳督䕶寳燒峻句容湖熟積聚峻頗乏食侃遂留不去劉牢之鎮京口安帝元興初朝廷討桓𤣥以牢之為前鋒都督征西将軍領江州事時會稽王世子元顥遣使以討𤣥事説牢之牢之以𤣥少有雄名仗全楚之衆懼不能制又慮平𤣥之後功蓋天下必不為元顥所容深懐疑貳不得已率北府文武屯洌洲桓以何穆説牢之曰自古亂世君臣相信者有燕昭樂毅𤣥德孔明然皆勲業未卒而二主早世設使功成事遂未保二臣之禍也鄙語有之高鳥盡良弓藏狡兎殫獵犬烹故文種誅於句踐韓白戮於秦漢彼皆英雄霸王之主猶不敢信其功臣况鹵愚凡庸之流也自開闢以来戴震主之威挟不賞之功以見容於闇世者而誰至如管仲相齊雍齒侯漢則往徃有之况君見與無射鉤屢逼之仇邪今君戰敗則傾宗戰勝亦覆族欲以安歸乎孰若翻然改圗保全富貴則身與金石等固名與天壌無窮孰與頭足異處身名俱滅為天下笑哉惟君圗之牢之自謂握強兵才能筭畧足以經綸江表時譙王尚之已敗人情轉沮乃頗納穆説遣使與𤣥交通其甥何無忌與劉裕固諫之竝不從俄令敬宣降𤣥劉敬宣牢之将也宋王誕為㑹稽王世子元顥長史及桓𤣥得志徙誕廣州盧循據廣州以誕為其平南府長史甚賓禮之誕乆客思歸乃説循曰下官流逺在此被蒙殊眷士感知己實思報答本非戎旅在此無用素為劉鎮軍所識情味不淺若得此歸必蒙任寄公私濟㑹厚㤙愈於停此空延嵗月循甚然之時廣州刺史吴隠之亦為循所拘畱誕又曰将軍今㽞呉公公私非計孫伯符豈不欲畱華子魚但以一境不容二君爾於是誕及隠之並得還後周栁帶韋初為太祖行臺左丞從軍南討時梁宜封侯蕭修守南鄭逹奚武攻之未拔乃令帶韋入城說修曰足下所固者險所恃者援所守者民今王師深入棧道長驅漢川此則所慿之險不足固也武興䧟沒於前白馬破亡於後自餘川谷酋豪路阻而不敢進此則所望之援不可恃也夫顧親戚懼誅夷貪榮慕利此生人常也今大兵縂至長圍四合戮逃亡以觀安居賞先降以招後服人人懐轉福之計家家圗安堵之謀此則所部之民不可守也且足下本朝䘮亂社稷無主盡忠将何所託死節不足成名竊為足下不取也僕聞賢者相時而動智者因變立功當今為足下計者莫若肉袒軍民歸命下吏免生民於塗炭全髪膚於孝道必當紆青拖紫裂土分珪名重當時業光後嗣豈若進退無據身名俱滅者哉修然之乃降魏唐崔義𤣥貝州武城人隋大業末黄君漢守據柏崕義𤣥往説之曰見㡬而作不俟終日今羣盗蜂起九州幅裂神噐所歸必在有德唐公據有秦京名應符籙此真主也足下孤城獨立宜遵冦恂竇融之筞及時歸城以取封侯也君漢然之即與義𤣥歸國拜懐州總管府司馬王君愕洛州邯郸人隋大業末并州人王君廓掠邯郸君愕往説君廓曰方今萬乘失御英雄競起誠宜撫納遺甿保全形勝按甲以觀時變擁衆而歸真主此富貴可圗也今足下居無尺土之地守無兼旬之糧恣行殘忍所過攘殺竊為足下寒心矣君廓曰計将安出君愕為陳井陘之險可先往據之君廓從其言乃屯井陘山嵗餘㑹義師入定闗中乃與君廓率所部萬餘人来降拜大将軍魏徴初随李密來降至京師乆不見知自請安輯山東乃授秘書丞驅傅至黎陽時徐世勣尚為密擁衆徴與世勣書曰自隋末亂離羣雄競逐跨州連郡不可勝數魏公起自叛徒奮臂大呼四方響應萬里風馳雲合霧聚衆數千萬威之所被将半天下破世充於雒口摧化及於黎山方欲西蹈咸陽北凌𤣥闕揚旌瀚海飲馬渭川翻以百勝之威敗於奔亡之虜固知神器之重自有所歸不可以力爭是以魏公思皇天之乃睠入函谷而不疑公生於擾攘之時感知己之遇根本已拔確乎不動烏合遣散據守一隅世充以乘勝餘勇息其東略建德因侮亡之勢不敢南謀公之英聲足以振于今古然孰無善始終之慮難去就之機安危大節若筞名得地則九族蔭其餘輝委質非人則一身不能自保殷鍳不逺公所聞見孟賁猶豫童子先之知機其神不俟終日今公處分爭之地乗宜速之機更事遲疑坐觀成敗恐兇狡之軰先人生心則公之事去矣世勣得書遂定計遣使歸國開倉運糧以餽淮安王神通之軍岑文本隋末郡舉秀才以時亂不應蕭銑僣號於荆州大收時望署文本中書侍郎及河間王孝恭之逼荆州也銑問計於文本文本勸銑降從之時官軍擄掠城中文本進説孝恭曰自隋無道羣雄鼎沸海内懐生想望真主今蕭君歸命者實望去危就安必若縱兵剽掠城中誠非王師来蘓之意亦恐江嶺之外向化之心沮矣孝恭稱善署為荆州別駕馬燧沈勇多智謀尤善兵法安禄山反俾光禄卿賈循守范陽燧説循曰禄山負㤙首亂雖䧟雒京必當夷滅何不建不代之功誅其逆将向潤客牛廷玠拔其根抵禄山西不能入闗則坐而受擒天下可定也循雖善之計不能决事洩禄山果遣韓朝陽来召循朝陽至范陽與循語陰伏壮士以弓弦縊殺之賈林辯士也德宗建中末王武俊僣建國稱王以常山為真定府澤潞節度李抱真使林詐降武俊林至營曰是来奉詔非䧏也武俊色動徴其説林曰天子知大夫宿誠及登壇建國之日撫膺顧左右曰我本忠義天子不省是後諸軍曽同表論列大夫天子覧表動容語使者曰朕前事誤追無及已朋友間失意尚可謝朕四海主毫芒失安可復念哉武俊曰僕虜将尚知有撫百姓天子固不専務殺人以安天下山東連大兵者五比戰勝骨盡暴野雖勝與誰守今不惮歸國家與諸軍盟約虜性直不欲曲在已朝廷能降㤙滌蕩僕首倡歸國不從者于以奉辭則上不負天子下不負朋友此謀行河朔不五旬可定及涇原兵犯闕德宗幸奉天京師問至諸将退軍李抱真将入澤潞田恱説武俊與朱㴞􅊞之林復説武俊曰令退軍前輜重後鋭師人心因不可圗也且戰勝而得地則利歸魏博䘮師即成徳大傷大夫本部易定滄趙四州何不先復故地武俊遂北馬首背田悦約林復説武俊曰大夫異拜豪族不合謀據中華且漢心幽險王室強即藉大夫援之卑即思有併吞且河朔無異國唯趙魏與燕爾今朱滔稱冀則窺大夫冀州其兆已形矣若㴞力制山東大夫須修臣禮不從即為攻奪比時能臣㴞乎武俊投袂作色曰二百年宗社我尚不臣誰能臣田舍漢繇此計定遂南通好抱真西連和馬燧興元初武俊削偽號授成德軍節度使兼幽盧龍両道節度時朱泚遥冊㴞為偽皇太弟㴞率幽檀勁􅌰誘回紇二千騎已圍貝州數十日将絶白馬津南盗雒都與泚合勢時李懐光反河中李希烈已䧟大梁南逼江漢李納尚反齊田緒未為用李晟孤軍壁渭上天子羽書所制者天下纔十二三海内蕩析人心失歸林又説武俊與抱真合軍同救魏博為武俊陳利害曰朱㴞此行欲先平魏博更逄田悦被害人心不安旬日不救魏貝必下下而益甲數萬張孝忠見貝魏拔必臣朱㴞三道連衡兼統回紇長驅至此家族可得完耶若閣下不利則昭義軍保山西河朔地盡入㴞今乘貝魏未下孝忠未附㴞與昭義合軍破之如掇遺此計就即震聲闗中京邑可坐復鑾輿反正公自勲業無二也武俊歡然許之後唐周式在梁時為鎮州王鎔判官光化三年秋梁祖将吞河朔乃親征鎮定縱其軍燔鎮之關城鎔謂賔佐曰事急矣謀其所向式有口辯出見梁祖梁祖盛怒逆謂式曰王令公朋附并汾違􅉀爽信弊賊業已及此期於無舍式曰明公為唐室之桓文當以禮義而成霸業返欲窮兵黷武天下其謂公何梁祖嘉引式袂而慰之曰前言戯之耳即送牛酒貨幣以犒軍式請鎔子昭祚及大将梁公孺李𢎞規子各一人任質於汴梁祖以女妻昭祚册府元龜卷八百九十一
