body:
  text: 冊府元龜卷三百九宋王欽若等撰宰輔部佐命晉何曾字穎考陳國陽夏人初仕魏累遷侍中司𨽻校尉時曹爽專權曾謝病爽誅乃起視事魏帝之廢也曾預其謀咸熈初拜司徒封朗陵侯文帝為晉王曾與高柔鄭冲俱為三公時入見二人揖而曾獨致拜武帝襲王位以曽為晉丞相加侍中與裴秀王沈等勸進踐祚拜太尉進爵為公食邑千户累遷司徒太傅裴秀字季彥河東聞喜人初仕魏為黄門侍郎廷尉正厯文帝安東及衞将軍司馬軍國之政多見信納遷散騎常侍帝之討諸葛誕也秀與尚書僕射陳泰黄門侍郎鍾會以行臺從預參謀畧誕平進尚書遷尚書僕射封秀濟川侯初文帝未定嗣而屬意舞陽侯攸武帝懼不得立問秀曰人有相否因以竒表示之秀後言於文帝曰中撫軍人望既茂天表如此固非人臣之相也由是世子乃定武帝即王位拜尚書令開府及受禪加左光祿大夫封鉅鹿郡公邑三千户泰始四年拜為司空陳騫臨淮東陽人起家尚書郎厯中山安平太守徴為相國司馬長史與賈充石苞裴秀等俱為心膂而騫智度過之蜀賊寇隴右以尚書持節行征蜀将軍破賊而還會諸葛誕之亂復以尚書行安東将軍夀春平拜都督淮北諸軍事轉都督豫州又轉都督江南徙荆州累處方任為士庶所懐武帝受禪以佐命之勲進車騎将軍封高平郡公累進太尉大司馬賈充字公閭平陽襄陵人初為魏黃門侍郎汲郡典農中郎将參大将軍軍事從景帝討母邱險文欽於樂嘉後為文帝大将軍司馬轉右長史帝新執朝權恐方鎮有異議使充詣諸葛誕圖欲伐呉隂察其變充既論説時事因謂誕曰天下皆願禪代君以為如何誕厲聲曰卿非賈豫州子乎世受魏恩豈可欲以社稷輸人乎若雒中有難吾當死之充黙然及還白帝曰誕在揚州威名夙著能得人死力觀其規畧為反必也今徴之反速而事小不徴事遲而禍大帝乃徴誕為司空而誕果叛復從征誕充進計曰楚兵輕而鋭若深溝高壘以逼賊城可不戰而尅也帝從之城陷帝登壘以勞充帝先歸雒陽使充統後事累遷廷尉中䕶軍時軍國多事朝廷機宻皆與籌之帝甚信重充與裴秀王沈羊祐荀朂同受腹心之任五等初建封臨沂侯為晉元勲初文帝以景帝恢贊王業欲傳位與舞陽侯攸充稱武帝寛仁且又居長有人君之徳宜奉社稷及文帝寢疾武帝請問後事文帝曰知汝者賈公閭也帝襲王位拜充晉國衞将軍儀同三司給事中改封臨頴侯及受禪充以建明大命轉車騎将軍㪚騎常侍尚書僕射更封魯郡公泰始中拜司空太尉石苞字仲容渤海南皮人初為景帝中䕶軍司馬徙鄴典農中郎将厯東萊琅琊太守文帝敗於東闗也苞獨全軍而退帝指所持節謂苞曰恨不以此授卿以䆒大事乃遷苞為奮武将軍假節監青州諸軍事頃之代王基都督揚州諸軍事苞因入朝當還辭魏高貴鄉公留語盡日既出白文帝曰非常主也數日而有成濟之事後進位征東大将軍文帝厭世賈充荀朂議葬禮未定苞時奔䘮慟哭曰基業如此而以人臣終乎葬禮乃定後每與陳騫諷魏帝以厯數已終天命有在及禪位苞有力焉武帝踐祚遷大司馬封樂陵郡公泰始五年拜為司徒王導字茂宏光祿大夫覽之孫鎮軍司馬裁之子司空劉寔引為東閣祭酒遷秘書郎太子舍人尚書郎並不行後參東海王越軍事時元帝為琅琊王與導素相親善導知天下已亂遂傾心推奉濳有興復之志帝亦雅相器重契同友執帝之在洛陽也導毎勸令之國會帝出鎮下邳請導為安東司馬軍謀宻策知無不為及徙鎮建康呉人不附居月餘士庶莫有至者導患之會從兄大将軍敦來朝導謂之曰琅琊王仁徳雖厚而名論猶輕兄威風已振宜有以拯濟者會三月上巳帝親觀禊乗肩轝具威儀敦導及諸名勝皆騎從呉人紀瞻顧榮皆江南之望竊覘之見其如此咸驚懼乃相率拜於道左導因進計曰古之王者莫不賔禮故老存問風俗虛己傾心以招俊乂況天下䘮亂九州分裂大業草創急於得人者乎顧榮賀循此土之望未若引之以結人心二子既至則無不來矣帝乃使導躬造循榮二人皆應命而至由是呉㑹風靡百姓歸心焉自此之後漸相崇奉君臣之禮始定俄而雒京傾覆中州士女避亂江左者十六七導勸帝收其賢人君子與之圖事時荆揚晏安户口殷實導為政務在清浄每勸帝尅己勵節翊主寧邦於是尤見委仗情好日隆朝野傾心號為仲父帝嘗從容謂導曰卿吾之蕭何也永嘉末遷丹陽太守累加振威将軍晉國既建以導為丞相軍諮祭酒累遷驃騎将軍都督中外諸軍事領中書監録尚書事及帝登尊號進驃騎大将軍儀同三司封武岡侯進位侍中司空宋徐羡之為桓修撫軍中兵參軍與高祖同府深相親結義旗建高祖拔為鎮軍參軍尚書庫部郎領軍司馬與謝鯤共事鯤甚知之累遷大司馬從事中郎将高祖北伐轉太尉左司馬掌留任以副貳劉穆之穆之卒羡之代為丹陽尹總知留任高祖踐祚進號鎮軍将軍加㪚騎常侍以佐命之功封南昌縣公遷尚書又拜司空録尚書事傅亮字季友北地靈州人仕晉厯中書黃門侍郎直西省高祖時為太尉欲以為東陽郡亮馳見高祖曰伏聞恩㫖賜擬東陽家貧忝祿私計為幸但慿䕃之願實結本心乞歸天宇不樂外出高祖笑曰謂卿之須祿耳若能如此甚所望也㑹西討司馬休之以亮為太尉從事中郎掌記室從征關雒還至彭城宋國建除侍中領世子中庶子徙中書令從還夀陽高祖有受禪意而難於發言乃集朝臣宴飲從容言曰桓元暴簒鼎命已移我首唱大義興復皇室南征北伐平定四海功成業著遂荷九錫今年将衰暮崇極如此物戒盛滿非可久安今欲奉還爵位歸老京師羣臣惟盛稱功徳莫曉此意日晩坐㪚亮還外乃悟㫖而宮門已閉亮於是叩扉請見高祖即開門見之亮入便曰臣暫宜還都高祖達解此意無復他言直云須幾人自送亮曰須數十人便足於是即便奉辭亮既出巳夜見長星竟天亮拊髀曰我嘗不信天文今始騐矣至都即徴高祖入輔及受禪以佐命功封建城公添食邑三千户少帝即位進位中書監尚書令南齊王儉字仲寳瑯琊臨沂人初尚宋明帝陽羡公主累遷黃門吏部郎太祖為太尉引為右長史恩禮隆宻專見任用轉左長史及太傅之授儉所唱也少有宰相之志物議咸相推許時大典将行儉為佐命禮儀詔䇿皆出於儉禇淵惟為禪詔文使儉参治之齊臺建遷右僕射領吏部時年二十八太祖從容謂儉曰我今日以青溪為鴻溝對曰天應民從庶無楚漢之事建元元年改封南昌縣公食邑二千户時朝廷初基制度草創儉識舊事問無不答太祖歎曰詩云維岳降神生甫及申今亦天為我生儉也太祖厭世遺詔以儉為侍中尚書令初儉素知太祖雄異後請問言於太祖曰功高不賞古來非一以公今日位地欲北靣居人臣可乎帝正色之而神采内和儉因又曰儉䝉公殊眄所以吐所難吐何賜拒之深宋以景祐元徽之滛虐非公豈復寧濟但人情澆薄不能持久公若小復推遷則人望去矣豈惟大業永淪七尺豈可得保太祖笑曰卿言不無理儉又曰公今名位固是經常宰相宜禮絶羣后微示變革當先令禇公知之儉請衘命太祖曰我當自往經少日太祖自造禇彦回欵言移晷乃謂曰我夢應得官彦回曰今授始爾恐一二年間未容便移且吉夢未必便在旦夕太祖還告儉曰禇是未達理虞整時為中書舍人甚閑辭翰儉乃自報整使作詔及太祖為太尉引儉為右長史尋轉左長史專見任用梁王茂字林逺太原祁人齊末為襄陽太守高祖義師起茂私於張宏䇿勸高祖迎和帝高祖以為不然既發雍部每遣茂為前驅師次郢城茂進平加湖破光子衿呉子陽等斬馘萬計還獻㨗于頴川郢魯既平臣欽若等曰郢魯郡郢城魯山也從高祖東下復為軍鋒師次秣陵東昏遣大将王珍國盛兵朱雀門衆號二十萬度航請戰茂與曹景宗等會撃大破之縱兵追奔積屍與航欄等其赴淮死者不可勝筭長驅至宣陽門建康城平以茂為䕶軍将軍俄遷侍中天監十一年位進司空王僧辯字君才右䕶衛将軍神念之子天監中隨父東奔元帝為湘東王時僧辯為王國左常侍帝尹丹陽府行叅軍帝出守會稽及為荆州皆以為中兵參軍帝為䕶軍及江州又以僧辯為司馬帝再為荆州又以為府諮議參軍事代柳仲禮為竟陵太守屬侯景反帝命僧辯假節總督舟師一萬兼糧饋赴援纔至京都宫城陷没天子蒙塵僧辯與柳仲禮兄弟及趙伯超等先屈膝於景然後入朝景悉收其軍實而厚加綏撫未幾遣僧辯歸于竟陵於是倍道兼行西就于帝帝承制以僧辯為領軍将軍代鮑泉討平湘土時侯景浮江西寇僧辯為大都督據巴陵城拒之景既遁帝命僧辯率諸軍㳂流討景師次郢城歩攻魯山魯山城主支化仁景之騎将也率其黨力戰衆軍大破化仁乃降僧辯仍督諸軍渡江攻郢即入羅城宋子仙蟻聚金城拒守攻之未尅子仙使其黨時靈䕶率衆三千開門出戰僧辯又大破之生擒靈䕶斬首千級子仙衆退據倉門帶江阻險衆軍攻之頻戰不尅景既聞魯山已没郢鎮復失羅城乃率餘衆倍道歸建業子仙等困蹙計無所出乞輸郢城身還就景僧辯偽許之命給舩艘數百以老其意子仙謂為信然浮舟将發僧辯命杜龕率精勇千人攀堞而上同時鼔譟掩至倉門水軍主宋遥率樓船暗江四靣雲合子仙行戰行走至于白楊浦乃大破之生擒子仙即率諸軍進師九水賊偽儀同范希榮盧暉畧尚據盆城及僧辯軍至希榮等因挾江州刺史臨城公棄城奔走加侍中尚書令征東大将僧辯於是發自江州直指建業既尅定京都帝即位以僧辯為司徒加鎮衛将軍永寧郡公食邑五千户侍中尚書令並如故後梁蔡大寶自宣帝為岳陽郡王以大寶為諮議參軍梁元帝與河東王譽結隟大寶使江陵還白帝云河東必有異圖禍亂将作不可不援臺城帝納之及為梁主除中書侍郎兼吏部掌文選事俄遷吏部尚書軍國之事咸委決焉帝於江陵稱帝以大寶為侍中尚書令大寶性嚴整有智謀雅達政事文辭贍速帝之章表書記敎令詔册並大寶專掌之帝推心委任以為謀主時人以帝之有大寶猶劉先主之有諸葛焉後魏長孫嵩代人年四十代父仁為南部大人後歸于道武累著軍功厯侍中司徒明元即位與奚斤等八人坐止車門右聽理萬機明元寢疾問後事於嵩嵩曰立長則順以徳則服今長皇子賢而世嫡天所命也請立乃定䇿詔太武臨朝監國嵩為左輔太武即位進爵北平王累遷太尉奚斤道武皇始初從征中原為征東長史遷晉兵将軍明元即位以斤為鄭兵将軍累遷左丞相與司徒長孫嵩等八人坐止車門右聽理萬機太武之為皇太子臨朝聽政以斤為左輔丘堆為散騎常侍太武監國臨朝堆與太尉穆觀等為右弼賀拔允為侍中值孝文帝将出山東允素知帝非常人早自結託以北土之望尤親禮之遂與允出信都參定大䇿中興初轉司徒領尚書令北齊杜弼為中書令弼志在毗贊知無不為文宣将受魏禪自晉陽至平城都命弼與司空司馬子如馳驛先入觀察物情踐祚之後以預定策之功遷驃騎将軍衞尉卿後周于謹初仕魏為大司寇太祖時為丞相既薨孝閔帝尚㓜中山公䕶雖受顧命而名位素下羣公各圖執政莫相率服䕶深憂之密訪於謹謹曰夙蒙丞相殊眷情深骨肉今日之事必以死争之對衆定䇿公必不得辭讓明日羣公會議謹曰昔帝室傾危人圖問鼎丞相志在扶救投袂荷戈遂得國祚中興羣生遂性今上天降禍奄棄庶僚嗣子雖㓜而中山公親則猶子兼受顧託軍國之事理須歸之辭色抗厲衆皆悚動䕶曰此是家事䕶雖庸昧何敢有辭謹既太祖等夷每申禮敬至是謹乃起而言曰若統理軍國謹等便有所依遂再拜羣公廹於謹亦再拜自是衆議始定孝閔踐祚進爵燕公邑萬戸遷太傅大宗伯與李弼侯莫陳崇等參議朝政宇文䕶字蕯寶太祖兄顥之少子太祖臨夏州留䕶事賀拔岳岳被害後太祖至平涼以軍出鎮江東與于謹征江陵為前鋒拔城鎮擒侯騎斷江津收舟艦待大軍之至圍而尅之時襄陽蠻師向天保等萬有餘落恃險作梗及師還䕶率軍討平之太祖西廵至牽屯山遇疾馳驛詔䕶䕶至涇州見太祖太祖謂曰諸子㓜小寇賊未寧天下之事屬之於汝宜勉力以成吾志䕶涕泣從命行至雲陽而太祖厭世䕶秘之至長安乃發䘮時嗣子冲弱寇賊在近人情不安䕶綱紀内外撫循文武於是衆心乃定既葬太祖䕶以天命有歸遣公卿諷魏帝遂行禪代之事閔帝踐祚拜大司馬遷大冡宰李弼字景加遼東襄平人後魏末為秦州刺史從太祖平竇泰又從平𢎞農與高歡戰於沙苑大破之以功拜特進又從東討雒陽東魏将莫多婁貸文率衆東至榖城弼斬之虜其衆累遷太保加柱國大将軍太祖西討留弼居守後事皆諮稟焉及晉公䕶執政朝之大事皆與于謹及弼等參議閔帝踐祚除太師封趙國公邑萬户趙貴字元貴天水南安人魏末天下兵起貴率鄉里避難南遷從賀拔岳平關中累遷大都督岳為侯莫陳悦所害太祖時臨夏州貴議迎太祖太祖至以貴為大都督領府司馬悦既平從太祖復𢎞農破沙苑又從戰河橋援玉壁戰邙山累遷侍中開府柱國大将軍閔帝踐祚拜太傅大冡宰封楚公邑萬户獨孤信雲中人魏末為荆州刺史防城縣都督賀拔勝出鎮荆州表信為武衛及勝弟岳為侯莫陳悅所害勝乃令入關撫岳餘衆屬太祖已統岳兵信與太祖鄉里少相友善相見甚歡因令信入雒請事後從太祖復𢎞農破沙苑率衆入雒陽潁預襄廣陳留之地並相繼欵附除隴右十一州大都督流民願附者數萬家累遷大司馬柱國大将軍閔帝踐祚拜太保大宗伯封衞國公邑萬户隋高熲初仕後周為開府從越王盛擊隰州叛胡平之高祖時為丞相素知熲强明又習兵事多計畧意欲引之入府遣邢國公楊惠諭意熲承㫖欣然曰願受驅馳縱令公事不成熲亦不辭滅族於是為相府司𨽻時長史鄭譯司馬劉昉並以奢縱被疎高祖彌屬意於熲委以心膂尉遲迥之起兵也高祖令韋孝寛擊之軍至河陽莫敢先進又令崔仲方監之仲方辭以父在山東熲遂請行因平尉遲迥進位柱國遷相府司馬寄任益隆及高祖受禪拜尚書左僕射兼納言封渤海郡公朝臣莫與為比唐裴寂字元真隋末為晉陽宮副監遇高祖留守太原深自結納高祖與之有舊特加親禮每留連宴語間以博奕至於通宵連日情忘厭倦遣隋宮人私侍高祖于時太宗将舉師而不敢發言見寂為高祖所厚欲因寂開説其路無由太祖出私錢數百貫隂結龍山令高斌廉使與寂博戲經數日漸以輸之得錢既多乃大喜每日從太宗逰見其懽甚遂以情告之寂即許諾他日高祖又從寂飲酒酣寂白状曰二郎云昨日方便已啓大人道今天下大亂城門外即是賊若守節旦夕死亡若起義兵必得天下衆情已叶公意何如高祖曰我兒誠有此計事已定矣祗得從之即召太宗謂寂曰我兒子中唯得此力今起大計復繇此兒若得事成即皇太子也寂對曰然是後始預計義兵起寂上宮女百人米九百萬斛雜綵九萬叚甲三十萬領以供軍用因拜為長史金紫光祿大夫從破宋老生授光祿大夫下臨汾封聞喜縣公邑千户義兵至河東隋将屈突通拒守攻之不下三輔豪傑争來欵附高祖将先定京師恐通為後患猶豫未決寂進説曰今通據關若不先平前有京城之守後有屈突之援此乃腹背受敵敗之道也未若攻蒲州而後入關京師絶援可不攻而定矣太宗曰兵法尚權權在於速宜乗機早渡以駭其心我若遲留彼則生計且關中羣盗所在屯結未有定主易可招懐賊附兵强何城不尅屈突通自守賊耳不足為虞若失入關之機則事未可知矣高祖兩從之遂命太宗入關以寂為江東安撫大使京師平賜良田千頃甲第一區布帛四萬叚進爵魏國公邑三千户及隋恭帝遜位高祖固讓不受寂勸進不答寂請見曰桀紂亡亦各有子殊未聞湯武臣而輔之可為龜鏡無所疑也寂之茅土大位皆受之於唐陛下不為唐帝臣當去官耳又陳符命十餘事高祖乃從之寂出命太常具禮儀擇吉日高祖既受禪謂寂曰使我至此者公之力也拜尚書右僕射賜以服玩不可勝計劉文靜隋末為晉陽令時裴寂為晉陽宮監數與之逰時天下已亂文靜與寂同宿見城上烽火寂仰歎曰卑賤之極家道屢空又屬亂離當何取濟文靜笑曰數運若此時事可知二人相得何患於卑賤及高祖鎮太原文靜察高祖有四方之志深自結託又竊觀太宗謂寂曰非常人也大度類於漢高神武同於魏祖其年雖少乃天縱矣寂初未然之後文靜坐與李宻連姻煬帝令繋於郡獄太宗隂有異志以文靜可與語遂入禁所看之文靜大喜曰天下大亂非有湯武高光之才不能定也太宗曰卿安知無但恐常人不能别耳今入禁所相看非兒女之情相憂而已時事如此故來與君圖舉大計請善籌其事文靜曰今李宻長圍雒邑主上流播淮南大賊連州郡小盗阻山澤者萬數矣但須真主驅駕取之誠能應天順人舉旗大呼則四海不足定也今太原百姓避盗賊者皆入此城文靜為令數年知其豪傑一朝嘯集可得十萬人尊公所領之兵復且數萬一言出口誰敢不從乗虛入闗號令天下不盈半歳帝業可成太宗笑曰君言正合人意於是部署賔客濳圖起義候機當發恐高祖不從沉吟者久之文靜見高祖厚於裴寂欲因關説於是引寂交於太宗得通謀議及高君雅為突厥所敗高祖被拘太宗又遣文靜共寂進説曰易稱知幾其神乎今大亂已作公處嫌疑之地當不賞之功何以圖全其裨将敗衂以罪見歸事誠迫矣當須為計晉陽之地士馬精强宮監之中府庫盈積以茲舉事可立大功關中天府代王冲㓜權豪並起未有適從願公興兵西入以圖大事何乃受單使之囚乎高祖然之時太宗濳結死士與文靜等恊議尅日舉兵會高祖得釋而止乃命文靜詐為煬帝敕發太原西河鴈門馬邑人年二十已上五十已下悉為兵期以歳暮集涿郡将伐遼東繇是人情大擾思亂者益衆文靜因謂裴寂曰公豈不聞先發制人後受制於人乎唐公名應圖䜟聞於天下何乃推延自貽禍釁宜早勸唐公以時舉義又脅寂曰且公為宫監而以宫人待客公死可爾何誤唐公也寂甚懼乃屢促高祖起兵會馬邑人劉武周殺太守王仁恭自稱天子引突厥之衆将侵太原太宗遣文靜及長孫順徳等分部募兵以討武周為辭又令文靜與裴寂偽作符敕出宮監庫物以供留守資用因募兵集衆及義兵将起副留守王威高君雅獨懐猜貳後數日将大會於晉祠威及君雅濳謀害高祖晉陽鄉長劉世龍以白太宗既知迫急欲先事誅之遣文靜與鷹揚府司馬劉政㑹為急變之書詣留守告威等二人謀反是日高祖與威君雅同坐視事文靜引政會至庭中云有宻狀知人欲反高柤指威等取狀看之政㑹不肯與曰所告是副留守事唯唐公得看之耳高祖佯驚曰豈有是乎覧狀訖謂威等曰此人吿公事如何君雅大詬曰此是反人欲殺我也文靜叱左右執之囚于别室既拘威等竟得舉兵高祖開大将軍府以文靜為軍司馬文靜勸改旗幟以彰義舉又請通突厥以益兵威高祖並從之因遣文靜使于始畢可汗始畢可汗曰唐公起事今欲何為文靜曰皇帝廢冡嫡𫝊位後主致斯禍亂唐公國之懿戚不忍坐觀成敗故起義兵欲黜不當立者願與可汗兵馬同入京師人衆土地入唐財帛金寶入突厥始畢大喜即遣将康鞘利領騎二千隨文靜而至又獻馬千疋高祖大悦謂文靜曰非公善辭何以致此尋率兵禦隋将屈突通於潼闗通遣虎牙郎将桑顯和勒兵來擊文靜苦戰者半日死者數千人文靜度顯和軍稍怠潛遣竒兵掩其後顯和大敗悉虜其衆通尚擁兵數萬将遁歸東都文靜遣諸将追而執之畧定新安已西之地轉大丞相府司馬進授光祿大夫封魯國公高祖踐祚拜納言杜如晦字克明御史大夫淹之兄子初仕隋淦陽縣尉非其好也後乃棄官歸于鄉里及義兵定闗中太宗引為秦王府兵曹參軍俄遷陜州總管長史時府中多英俊外遷者衆太宗患之記室參軍房元齡曰餘人不足惜杜如晦聰明達識王佐才也若大王守藩端拱無所用之必欲經營四方則非此人莫可太宗大驚曰爾不言幾失此人矣因奏為王府屬尋領行臺兵部郎中每從征伐軍國多事如晦剖斷如流為談者所服以功累加上柱國封建平縣男邑三百户以本官補文學舘學士畫像於丹青者十有八人而如晦為冠首令文學禇亮為之贊曰建平文雅休有烈光懐中履義身立名揚其見欽重如此時隐太子與元吉謀危太宗乃深忌之相與謀曰秦王府中所憚者唯杜如晦房元齡耳因誣以罪譖之於高祖由是逐之並令還宅及隐太子将為變太宗宻知之遣長孫無忌召如晦等着道士之服潛來入府共為籌畧社稷以寧擢為太子左庶子俄遷兵部尚書以定䇿安宗廟功居第一封蔡國公食邑三千户别食益州千三百户太宗即位以本官檢校侍中攝吏部尚書仍督兵衞皇太子尋為左僕射仍掌選事房元齡字喬年清河人隋末為隰城縣尉漢王諒為逆從坐除名㑹義旗入闗太宗以燉煌公狥渭北元齡因杖䇿謁於軍門太宗一見便如舊識署為記室參軍元齡既遇知己罄竭心力拾遺補闕知無不為賊寇毎平衆人競求珍異元齡獨先收人物致之幕府及有謀臣猛将皆與之潛相申結各盡其死力武徳末隐太子猜間太宗謂元齡曰阽危之兆其迹已見計将安出對曰國家患難今古何殊非睿聖欽明不能安輯大王功盖天地事鍾壓鈕神贊所在非藉人謀因與僚屬杜如晦同心戮力以前後軍功累加上柱國封臨淄縣侯補行臺屯田郎中尋轉考功又為文學舘學士隐太子以元齡既被太宗親禮為之謀事甚怨之乃譖之於髙祖由是與杜如晦並被驅斥息隐海陵将有變也前一日長孫無忌以教㫖令元齡衣道士服潛引入閣與之計事及事平太宗入春宫以元齡為右庶子既踐祚除中書令封邢國公貞觀三年為尚書左僕射累改為魏國房國公拜司空太傅梁敬翔好讀兵書善禮學尤長刀筆應用敏㨗舉進士未第遇黄巢陷長安乃東出關時太祖始鎮汴有觀察支使王發負才術獨當委用發與翔鄉里親也相遇甚喜乃恊力佐太祖商𣙜利病頗稱太祖意由是自進士奏為光祿寺主簿署舘驛廵官居中以司記奏之職太祖連破巢蔡實預勲府尋奏授太子中允賜朱紱討曹濮伐兖鄆凡用師未嘗不宻侍左右太祖之攻蔡也有弩矢犯左腋血染中單自翔外軍中無知者其待遇如此及太祖受唐禪改樞宻院為崇政院遂用翔知院事實掌大政翔初歸太祖見語及時務遂異禮焉因委奏記巨細預之凡發一言創一事嘗與太祖意同由是三十年翼戴四方之人尠有識靣者昏旦不離於左右恪勤公直以禆大事四征戰舉動必隨時或軍書藂委翔則據鞍旗麾之下運毫洒落有如風雨知文者雖阮瑀陳琳不能過也至于滅巢破蔡收兖鄆徐宿北至河翔南服嶺嶠訓强兵數十萬勤王奉上安黎庶廣賦税納賢雋自㣲至著内外機宜逮于化家為國皆翔之籌畧也其於險阻艱難櫛風沐雨未嘗頃刻不與上同自受唐禪讓改為梁翔總領機務締搆開創之業冠於本朝後唐郭崇韜字安時代州鴈門人父宏政太祖杖鉞鴈門也崇韜為李克脩之綱紀從定京師平巢賊克脩率昭義崇韜累典軍中物務頗稱㢘幹克修卒歸𨽻太原以為典謁嘗奉使鳯翔稱㫖遷左敎練西宮使帝平定魏𫝊召充副中門使與孟知祥俱參機要崇韜懐抱豁如果于臨事承授決斷畧無疑滯以此恩顧日隆先是呉琪張䖍厚相繼為中門使功多赤族故知祥堅請外任瓊花長華主泣請知祥於皇太后帝重違之以知祥為河東軍城都虞侯自是崇韜専典要宻軍籌計畫多所參決艱難戰伐靡所不從後從帝親征王徳明於鎮州時徳明誘契丹之衆至新樂虜騎已渡沙河我軍大恐或有歛輜車而去者李存渥斬之不能止諸将咸云賊城兵數不少今濟之以鮮卑王師不敵如被中外夾攻吾族盡矣不如退師還鄴候其罷退再議起居帝猶豫未能決崇韜曰臣聞按巴堅為王郁所誘僶俛而來本利貨財非敦隣好一逢挫敗遁走必矣況我新破汴寇威振北藩乗此驅攘無往不㨗況事之濟否亦有天命戎狄雖衆其如我何帝然其䇿因喻諸将破賊於新城按巴堅遁走安重誨自明宗龍潛時得給事左右及鎮邢州以重誨為中門使隨從征討凡十餘年委信無間勤勞亦至洎鄴城之變佐命之功獨居其右明宗踐祚領樞宻使俄遷左領軍衛大将軍充職晉天福二年六月宰臣李崧讓樞宻使崧始自范延光領常山為管記及明宗長興末為六軍副使以皇子秦王從榮不軌懇求出外會北虜屢寇雲中議選良帥以鎮北門帝問延光趙延夀等不敢遽對奏云候臣至本院商量欲定襄州連帥康義誠崧最在下位聳立請曰非石太尉不可延光曰僕累白上欲令出鎮嘗謂僕曰兄有得氣力者欲不遣在左右是何意也由是不敢復奏時帝又遣中使促之乃定帝領太原明日帝又使心腹導意至崧云累浮圖須與合却尖表感之深也乃義旗入雒崧為偽主端明殿學士出逃郊外俄召居舊秩無幾命為相兼樞宻使盖由此階縁故也崧時以宰相趙瑩使虜将還朝廷之元臣也故有表讓其機務以固帝心皆小數也桑維翰自後唐末帝清泰三年為太原掌書記時高祖将起義頗慮孤壘無成憂不遑處維翰揚言曰蝮虵在手壯士解腕今日朝廷待以匪人無復首免之理但極力自完萬一不濟契丹族帳在雲應朝呼夕至何患無成高祖釋然自是民請搆藩軍者多矣然關防重叠去者多獲朝廷又以虜性多疑必不以高祖單詞容易應副高祖使有達虜廷者報曰仲秋吾傾寨奉援且牢守備朝廷知之攻城頗急城中乞食慮難支久乃令小僕何福懇告藩首時八月末也藩首曰北候漸涼别無顧慮爾名曰福戰㨗之由數日出軍與何福俱來壬寅契丹至及高祖建號制授禮部侍郎知樞宻院事尋改中書侍郎平章事趙瑩華隂人後唐莊宗時為陜州從事明宗即位以高祖為陜府長史留後瑩時在郡以前官謁之一見如舊相識即奏署管記高祖厯諸鎭皆從之累使下官至御史大夫賜金紫高祖再鎮并州位至節度判官高祖受契丹冊既即位授瑩翰林承㫖金紫光祿大夫戸部侍郎知太原府事尋遷門下侍郎同平章事監脩國史漢蘇逢吉自高祖鎮太原為判官天福十二年秦州節度使叛入蜀高祖聞之歎曰中原無主使藩侯一至於此吾處方召之任得無愧於心乎逢吉等曰大王出鎮邊裔兵權久不在己外不能撫四夷内不能安牧伯朝廷致敗乃自失之夫不有廢也於何以興皆天運使然非大王之過大王富有全晉之地帶甲十萬一呼一吸海内孰不響應足以雪家國之恥足以圖帝王之業幸不以小善小節為拘累耳帝曰諸公何畧之甚吾以少主陷虜心焉如灼謀之與力已不迨於重耳皇緒若在将欲保竇融事業足矣安有他望耶高祖引咎養正率皆如此高祖凡有謀議立侍其側高祖素嚴毅及鎮太原位望崇重從事稀得謁見惟逄吉日侍左右雨使文簿堆案盈几有司不敢輙通逢吉置于懐䄂俟其色悦則詔之多見其可高祖建號於太原逢吉自節度判官拜同平章事集賢殿大學士楊邠魏州冠氏人高祖為鄴都留守用為左都押衙及高祖鎮太原方開霸府以羅英乂邠遂棄職挈族歸之帝察其誠賞其來喜而納焉置之近列俄置牙門都校軍國庶務靡不委之邠性亮直㢘約蒞事平允帝甚寵之及虜陷汴水晉少帝北徙羣議推迫帝建尊號帝固拒之邠與周高祖繼入請曰戎人亂華勢不能久今天下無主是歴數歸大王也且億兆之口不謀同辭若巨山已斷無能抑也乗龍在天不可下也由是帝心遂定至帝建義南向廵幸晉絳撫寧陜虢内定歸畧皆訪於邠邠毎有宻啓帝皆可之因謂曰始見公心為治粟郡尉之才也今見公方畧真撥亂經始之良臣也帝既自雒入汴河朔漸寧賞邠之功故有是命漢國建遷檢校太保樞宻使汴雒平正拜樞宻使檢校太傅蘇禹珪自高祖作鎮并門奏為㢘判開運末戎虜盗國高祖即位於晉陽為中書侍郎平章事王章自高祖典侍衛親軍召為都孔目官從至河東專委錢榖國初授三司使檢校太傅從征杜重威於鄴下明年高祖晏駕隠帝即位加檢校太尉同平章事周鄭仁誨晉陽人漢高祖之鎮河東也太祖累就其第與之燕語毎有質問無不以正理為答太祖深器之漢有天下太祖初領樞務即召為從職及太祖西征嘗宻賛軍機西師凱旋累遷至檢校吏部尚書太祖踐祚旌佐命功檢校司空客省使兼大内都檢㸃恩州團練使尋為樞宻副使轉宣徽北院使右衛大将軍出鎮澶淵檢校太保入為樞宻使加同平章事冊府元龜卷三百九
