  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_507-1a}
body:
  text: 册府元龜卷五百七宋王欽若等撰邦計部俸祿第三唐順宗以貞元二十一年正月即位制百官及在城諸使息利本錢徵放多年積成深弊内外官料錢職田等厚薄不均兩税及諸色㩁税錢物重輕須有損益宜委中書門下與所司商量其利害條件以聞不得擅有閉糴禁錢務令通濟又詔停内侍郭忠政等十九人正員官俸錢七月中書門下奏勑釐革京百司息利本錢應徵近親及重攤保并逺年逃亡等今年四月十七日勑本利并放訖其本事須借錢添填都計二萬五千九百四十三貫六百九十九文伏以百司本錢乆無疎理年歳深逺亡失頗多食料既虧公務則廢事須添借令可支持伏望聖恩許令准數支給仍請以在藏庫度支除陌錢充勑㫖宜依憲宗元和二年正月尚書左丞鄭元請取河中羡餘錢三千貫文充助都省厨本從之前為河中節度因有是請議者以為省司公膳自有成制茍或不足當更請於上不宜以前任羡財而私加之也六月中書門下上言伏以聖政惟新事必歸本近又疎理五坊户邑令府縣却收萬情欣欣喜出望外臣等敢不釐革舊弊率先有司上副聖情用𢎞至理其兩省納課陪厨户及捉錢人揔一百二十四人臣當司並不收管望各歸府縣從之五年六月户部侍郎判度支李夷簡奏應給食實封官自貞元十三年已後節度使兼宰相每百户給八百端匹若是絹更給綿六百兩節度使不兼宰相每百戸給四百端匹軍使及金吾諸衛諸軍大將軍每百户給三百五十端匹至貞元二十一年七月六日勑應食實封其節度使宜令百户給八百端匹若是絹兼綿六百兩伏以食封本因賞功封之多少視功之厚薄不以官位散要别制等差其節度使兼宰相請准舊例餘節度不兼宰相准貞元二十年已前例處分從之六年四月御史臺奏諸使慮有捉利錢户請同臺省例如有過犯差遣並任府縣處置從之五月御史中丞柳公綽奏請諸司諸使應有捉利錢户其本司本使給戸人牒身穪准放免雜差遣夫役等如有過犯請牒送本司本使科責府縣不得擅有决罰仍永為常式者臣昨因奉進止追勘閑廐使下利錢户割耳進狀劉嘉和訢被所繇分外科配等事由因勘責劉嘉和所執牒身所引勑文簡勑不獲牒閑廐使勘勑下年月日又稱逺年文案失落今據閑廐使利錢案一使之下己有利錢户八百餘人訪聞諸使並同此例戸免失役者通計數千家况犯罪之人又常僥倖所稱捉利錢户先亦不得本錢百姓利其牒身情願虚立保契文牒一定子孫相承至如劉嘉和情願充利錢戸事繇縁與人毆闘打人頭破時便於閑廐使情願納利錢得牒身免府縣科决實亦不得本錢已具推問奏聞訖伏奉進止令臣具條流奏聞者今請諸司諸使所管官錢户並依臺省舉本納利人例諸司諸使更不得妄有准勑給牒身免差遣夫役及有過犯許作府縣處分如官典有違請必科處使及長官奏聽進止其先給牒者並仰本司使收毁入後在人戸處收毁不盡其官典必有科責其捉錢户元不得本錢者亦任便不納利庶得州府不失丁夫姦人免有僥倖勑㫖宜依如已經處分後更有執此文牒求免差遣夫役者便委京兆府據罪科責仍具本司本使名銜聞奏六月詔减教坊樂官衣糧八月户部侍郎李綘奏諸州闕官職田祿米及見任官抽一分職田請所在收貯以備水旱賑貸從之又詔百官職田其數甚廣今縁水潦諸處道路不通宜令所在貯錢充度支支用百官却令據數於大倉請受十月詔河南水陸運陜府陜運潤州鎮海軍宣州採石軍越州義軍洪州南昌軍福州静海軍等使額並宜停所收使已下俸料一事已上各委本道充代百姓闕額兩稅仍具數聞奏如聞河南陜府兩處比來所給皆是置本利息不破正錢勒便添充兩飡錢雜給不要更徵庶我愛人之心不止於惜費立制之意必在於正名閏十一月勑河中鳯翔易定四道州縣久破俸給至微吏曹注官將同北逺在於理體切要均融宜以户部錢五萬五千貫文充加四道州縣官課料七年六月加賜澤潞礠邢洺五州府縣官料錢十二月以鄜坊邠等三州官吏近邉俸薄各加賜其料錢是年中書門下奏國家舊章依品制俸官一品月俸三十千其餘職田祿米大約不過千石自一品已下多少可知艱難已來綱禁漸弛於是增置使額厚請俸錢故大歴中權臣月俸有至九千貫者列郡刺史無大小給皆千貫常衮為相始立限約至李泌又量其閑劇随事增加時謂通濟理難减削然有名存職廢額去俸存閑劇之間厚薄頓異將為定式須立常規制從之乃命給事中叚平仲中書舎人韋貫之兵部侍郎許孟容户部侍郎李絳等詳定减省九年八月詔諸司食料錢縁初令戸部出放已久散失頗多湏有變通使其均濟其中書門下兩省及尚書省御史臺或務緫樞機或職司彈糾而倍稱息利於體尤乖冝以户部除陌錢毎貫先收二十文數外更加五文委户部别收貯計其所費逐處支給其本利錢先出放者冝各委本司勘㑹聞奏其合徵收者便充當司公廨什物添修等用其諸司食利亦准此勘會其合徵錢便充飯錢若數少不充以其前件除陌五文錢量所欠添本出放其所收五文錢每歲不闕添本之外合有所餘諸司廨宇破壊者便充修補縁諸司人吏轉遷不常新舊之間因縁乾没諸稱走失職此之繇何後須令本判官勾當勒令一一交割者逓相公付仍委御史臺一人專知勘覆仍先具條流聞奏十一月戸部奏准八月十五日勑諸司食利本錢出放已久散失頗多各委本司勘會其合徵錢數便充飡錢若數少不充以除陌五文錢量其所欠添本出放者令准勑各牒諸司勘會得報據秘書省等三十二司牒應管食利本錢物五萬三千九百五十二貫九百五十五文各随司被逃亡散失見在見徵數額與元置不同今但據元置數額而已秘書省三千三百八十四貫五百文太常寺六千七百二十二貫六百六文光祿寺一千二百九十九貫六十四文宗正寺一百一十七貫九十五文衞尉寺一千二百五十貫九百文太僕寺一千九貫五百文大理寺五千九百二十四貫七百四十文鴻臚寺二千六百六十貫文司農寺二千七百三十五貫七百七十文大府寺一千五百八貫九百文殿中省九百九十貫五百五十文詹事府一千一百九十一貫三百七十七文國子監二千六百四十四貫二百五十文少府監一千三百三十四貫七百三十一文將作監一千六百一十七貫文左春坊一千三百八貫七百七文右春坊一千貫文司天臺三百八十貫文家令司一千八百一十貫七百文太僕寺四百三十六貫六百五十文總監二千六百七十二貫文左藏庫六百二十貫文尚食局三百三十八貫文尚舎局三百七十四貫三百文尚輦局一百貫文太倉二千四百一十五貫六百八十一文内中局六百三十六貫二百文萬年縣三千四百貫六百文長安縣二千七百四十五貫四百三十三文左衞五百四十貫文左司禦帥府二百四十貫文右司禦帥府一百貫文勅宜更委御史臺子細簡勘具合徵放錢數及量諸司閑劇人日加减條流奏聞十二月勑比縁諸司食利錢出舉歲深為弊頗甚已有釐革别給飡錢其御史臺奏所勘責秘書省等三十二司食利本錢數内有重攤轉保稱甚困窮者據所欠本利並放其本户中納利如有十倍以上者既縁輸利歲久理亦可矜量准前本利並放其納經五倍以上從今年十二月以前應有欠利並放起元和十年正月以後准前計利徵收其餘人户等計其倍數納利非多不可一例矜放宜並委本司准前徵納其諸司所徵到錢自今已後仍於五分之中常抽一分留添官本各勒本司以後相承收管其諸司應見徵納及續舉放所收利錢並准今年八月十五日勑充添脩當司廨宇什物及令史驅使官厨料等用仍委御史臺勾當每常至年終勘會處分其諸司除踈理外見在本錢據額更不得破用如有欠失即便勒主掌官典所繇等據數填賠其中書門下兩省及尚書省御史臺應有食利錢外亦便令准此條流處分其諸司除此食利錢更别有諸色本錢不得妄援此例十年正月御史臺奏秘書省等三十二司除踈外見在食利本錢應見徵納及續舉放所收利錢准勑並充添修當司廨宇什物及令史驅使官厨料等用准元和九年十二月二十九日勑仍委御史臺勾當每至年終勘㑹處分其諸司踈理外見在本錢據額不得破用如有欠失即便勒主掌官典所繇等填賠者其諸司食利本錢踈理外合徵收者請改案額為元和十年新收置公廨本錢應縁添修廨宇什物及令史府史等厨並用勒本司據見在户名錢數各置案歴三官通押逐委造帳印訖入案仍不得侵用本錢如人户辦納本利錢縱都數未足亦勒據數與納召主别置案歴准前通押如至年終勘會欠少本利官典諸節級准法處分如主掌官典改移亦勒造帳交付承後官典具單帳報臺交割分明即給前官典牒知公驗如欠少本利送臺勘責具事由聞奏即冀官錢免至散失年額既定勾當有慿勑㫖宜依十二月勑新授右散騎常侍任廸簡秘書少監獨孤郁等如聞疾患日久未任視事其俸料等宜令所司住給十一年八月勑京城百司諸軍諸使及諸道應差所由并召人捉本錢右御史中丞崔從奏前件捉錢人等比縁皆以私錢添雜官本所防耗所禆補官利近日訪聞商販冨人投身要司依託官本廣求私利可徵索者自充家產或逋欠者證是官錢非理逼廹為弊非一今請許捉錢户添放私本不得過官本錢勘責有剰並請設官仍量輕重科處其所放官本并許添私本每舉放數足仰錢户具所舉人姓名錢數狀報本司仰本司收連入案三官同押排科印記仍各随錢人牒知如他時因有論竸勘案歴不同不在與徵理之限庶官利不失私家獲安從之九月東都御史臺奏當臺食利本錢從貞元十一年至元和十一年息利十倍以上者二十五戸從貞元十六年至元和十一年息利七倍以上者一百五十六戸從貞元二十年至元和十一年息利四倍以上者一百六十八戸伏見去年京畿諸司本錢並條流甄免其東都未䝉該及者竊以淮寇未平供饋尚切人力小弊衣食屢空及納息利年深正身既没子孫又盡移徵親族旁食無支族散徵諸保保人逃死或所繇代納縱有嫠老孤獨仰無所依立限踰年虚繫錢數公食屢闕人户不堪伏乞天恩同京諸司例特甄减裁下勑㫖從奏十二年正月門下省奏應管食利本錢總三千四百九十八貫三百二十一文宰相已下至主錄等食利三百七十八貫三百四十餘文直省院本錢准建中三年四月十五日勑以留院入錢置本中書省奏當省食利本錢共五千貫文宰相已下官至主錄等食利錢一千貫直省院食利本錢准建中三年四月勑當院自歛置本准元和九年十二月九日勑令勘會踈理其見在合徵錢准勑合充添修當司廨宇什物其省院本錢縁是當院自歛置本請便充本院添厨等用勑㫖依奏四月勑京百官俸料從五月已後宜並給見錢其數内一半先給元估匹叚者即據時佑實數廽給見錢八月京兆尹竇易直請改職田法並入兩税地事竟不行十三年三月詔百司職田多少不均為弊日久宜令每司各收職田草粟等數自長官已下㩀多少人作等差除留闕官物外分給六月以德埭倉景四州頃遭水潦給復一年遂定四州官吏俸錢料刺史每月一百五十千望𦂳上縣令每月四十千餘有差十四年三月屯田奏左右神策中尉准令式二品官令受田一十頃請取京兆府折衝府院戎塲垜埒公廨等地七十七頃二十六畝八分數内取二十頃充前件官職田依奏四月勑京畿二十二縣欠元和十四年京百司職田二十二萬九十一石束貫等京畿百姓聞甚艱貧頃差船運軍糧今又修營陵寢雖應縁驅役皆給價錢而屢有役名頗妨農畝豈可更徵懸欠重使憂愁其所欠並宜蠲免其合受納所欠職田或見在官班各請厚俸或近終考秩稍有餘資冝體朕懐以寛人力是月重定淮西州縣等制及官吏禄俸以蔡州為𦂳溵州為上其刺史俸錢月一百八十千申光二州並為中刺史月俸一百五千長史已下有差十月御史中丞蕭俛奏應諸司諸軍諸使公廨諸色本利錢等伏縁臣當司及秘書省等三十二司利錢伏准今年七月十三日赦文至十倍者本利並放展轉攤保至五倍者本利並放縁前件諸司諸使諸軍利錢節文並不該及其中有納利百姓見臣稱訴納利己至十倍者未蒙一例處分求臣上達天聽臣已面陳奏訖伏以南北諸司事體無異納利百姓皆陛下赤子若恩澤均及則雨露無偏伏望聖慈特賜放免如允臣所奏伏乞特降勑㫖並進今年七月十三日赦文處分仍永為定制勑㫖依奏穆宗以元和十五年正月即位二月詔内外百官食利錢十倍至五倍已上節級放免仍每經十年即内外官百司各賜錢一萬貫充本各據司大小公事閑劇及當司貧富作等第給付六月勑朕聞帝王所重者國體所切者人情茍得其體必臻於太和如失其情是繇于小利况設官求理頒祿責功既有常數寕宜就减近者以每歳經費量入不充外官俸料據數抽貫再三思度終所未安穏念彼外方或從卑官一家所給三載言歸在公當丼于㓗亷受祿又苦於减剋待我庶吏豈其然乎雖憂國之誠固須贍助而恤人之慮將起怨咨必若水旱為虞干戈未戢事非獲已人亦何辭今則幸遇豐登又方寧謐九州之内永絶妖氛三邉之上兾除烽警自宜剋己以足用安可剥下以為謀臨軒載懐實所增愧其度支所准五月二日勑應給用錢每貫抽五十文都計一百五十萬貫文並宜停抽初宰相以國用不足故權請抽减諌官及言事者累陳表章以為非便故復下此詔以罷之八月賜教坊錢五千貫充本以收息利長慶元年三月勑添給諸司本錢准元和十五年五月十一日勑内外百司准二月五日赦文宜共賜錢一萬貫文以户部錢充仍令御史臺㩀司額大小公事閑劇為等第均配七月制百司職田在京畿諸縣者訪問本地多被所繇侵隱抑令貧户佃食蒿荒百姓流亡半在於此宜委京兆府勘會均配務使公平二年十月勑司徒兼中書令韓𢎞疾未全平尚須在假將息其俸料冝從勑下日便令所司支給三年十一月賜内園本錢一萬貫軍器使三千貫十二月賜五坊使錢五千貫賜威逺鎮軍錢一千貫以為食利四年五月勑近日訪聞京城米價稍貴須有通變以便公私冝令戸部應給百官俸料其中一半合給匹叚者廽給官中所糴粟每㪷折錢五十文其匹叚委别貯至冬糴粟填納大倉時人以為甚便敬宗寳厯元年四月制京百司田散在畿内諸縣舊制配地出子歳月已深佃户至有流亡官曹多領虚數今欲據額均入地盤萬户供輸百司盡得隨稅出子逐畆平攤比量舊制孰為允便冝委京兆府與屯田審勘計會條流聞奏文宗太和元年三月塩鐡使王播進停减塩鐡官吏課料絹一萬六千三百匹十一月嶺南觀察使胡証奏端康封三州刺史月俸錢請各給至一百貫文請當道自圎融支給從之十二月殿中省奏尚食局新舊本錢總九百八十貫文伏以尚食貧虚更無羨餘添給伏乞聖慈更賜添本錢二千貫文許臣别條流方圎諸色改換收利支用庶得不失公事勑㫖賜本錢一千貫文以户部五文抽貫錢充三年七月詔滄德二州州縣官吏等刺史每月料錢八十貫録事參軍三十五貫判司各置二人各二十五貫縣令三十貫尉二十貫其令俸祿且以度支物充仍半支省佑匹叚半與實錢四年七月勑吏部奏應比逺道州縣官課料錢請令依元額計支給不得更有欠折勑㫖依奏是月勑應外任官帶一品正京官縱不知政事其俸料宜付所司並令兼支七年二月户部侍郎庾敬休奏應文武九品已上毎月料錢一半合給匹叚絲綿等伏以自冬渉春乆無雨雪米價稍貴人心未安自德音放免逋懸賑恤貧下中外群庶已感聖慈至於衣冠之家素乏儲畜朝夕取給猶足為憂以臣愚見若令百官料錢内一半停給匹叚絲綿等廽太倉粟每㪷計價七十文在衆庶必見懽康於公家無所虧减待至麥熟米價稍賤即依前却給匹叚等酌其事理庶叶變通勑㫖冝依八月勑中書門下省所將本錢與諸色人給驅使官文牒於江淮諸道經紀每年納利並無元額許置如聞皆是江淮富家大户納利殊少影庇至多私販茶塩頗撓文法州縣之弊莫甚於斯宜並勒停兩省先給文牒仍盡追收其去年所减人數雖無挾名尚執兩省文牒亦冝收訖聞奏以後不承正勑不在更置之限八年八月劔南東川觀察使楊嗣復言普渝合三州刺史料錢及六十千者請自加給從之九年正月勑中書門下兩省奏請依元和元年八月六日勑各置捉錢官勑中書省冝置三十人門下省置二十五人六月詔宰相俸料宜准元和十四年已前例並給見錢十一月詔江西湖南以官健衣糧一百二十五分送上都充宰相召雇手力是日中書門下上言宰相上弼聖政下理群司若忠正無邪宗社所祐縱逢盗賊兵不能傷若事渉隠欺心懐矯妄雖有防衞神得而誅臣等願推赤心以荅聖奬孟軻知非臧氏孔子不畏匡人其前件衣糧並請勒停依從前制置只以金吾司手力充引從從之開成元年五月判國子祭酒事門下侍郎平章事鄭覃奏太學新置五經博士各一人屯田素無職田請依王府官品秩例賜以祿粟許之二年八月户部侍郎李班奏京諸司六品以下官請假往外違假不到本官停給料錢勑㫖違限停俸料宜依餘准令式十月詔曰書載堯典首陳睦族詩歌周德實羨維城朕嗣統百王憲章二代義雖本於敘族道無愧於尊賢式遵舊章爰舉成命嘉王運循王遹通王常等皆孝敬恭懿敏裕齋莊播蘭茝之清芬炳珪玉之符采易陵沛獻詩掩楚元古人素風造次於是師氏典訓周旋以之固可以超金紫之貴階升台鉉之崇秩策勲詔爵以寵分茅並可金紫光祿大夫檢校司空賜上柱國仍依百官例給料錢勑檢校吏部尚書安王溶檢校兵部尚書頴王諒宜並依百官例賜料錢三年七月勑尚書省自長慶三年賜本錢後歳月滋乆散失頗多或息利數重經恩放免或人户逋欠無䖏徵收如聞尚書丞郎官入省日每事闕供須議添助除舊賜本錢徵利收及吏部告身錢外宜毎月共賜一百貫文委户部逐月支付其本錢任准前收利添充給用仍委都省納勒舊本及新添錢量多少均配逐行分析聞奏須令占額用度不得妄有破除毎至季終委都省磨勘申中書門下四年二月詔曰司徒兼中書令裴度盛有勲烈累任台衡以疾恙未任謝上須加優異用示恩榮其本官俸料冝起今日便付給所司三月詔曰仙韶院樂官每月料錢數内减三百千轉給翰林侍講太子少師王起起富於文學寛厚長者理家無法俸入及門盡為僕妾所有老年寒餒帝念以故老哀其貧寠故特有加給起不知陳讓而與令人分俸急於茍得時論讓之六月文宗御紫宸殿宰臣李珏奏堂厨食利錢一千五百貫文供宰相香油蠟燭捉錢官三十人頗擾百姓今勘文書堂頭共有一千餘貫所收利亦無幾臣欲總收此錢用自不盡假令十年之後更無此錢直令户部供給亦得兩省亦有此錢臣亦欲商量共有三百餘人在外求利米塩細碎非國體所宜帝曰大細碎楊嗣復曰百司食利實為煩碎自貞觀以後留此弊法臣等即條流聞奏乃奏宰臣置厨捉錢官並勒停其錢並本錢並追收勒堂後驅使官置庫收掌破用量入計費十年用盡後即據所須奏聽進止勑㫖宜依册府元龜卷五百七
