body:
  text: 册府元龜卷三百三十七宋王欽若等撰宰輔部不恊狥私樹黨不恊王者建輔弼之臣所以共成天功登翼王室恊和萬國典領百寮者也故當一乃心平其志使國典成式人謨允諧以謙抑自居以推讓為本増廟廊之重表堂陛之髙使和輯之風行於天下者也若乃固専朝政闊視王庭發言以相侵議事而不合或趨向之各異或先後以自矜爭論曲直交斥隠匿形於辭色遂為忿競搆成禍亂或至誅戮忠臣之節豈當若是者乎書于方冊可以垂戒周王叔陳生與伯輿爭政二子王卿士王右伯輿右助也王叔陳生怒而出奔及河王復之欲奔晋殺史狡以説焉説王叔也不入遂處之處叔河上晋侯使士匄平王室王叔與伯輿訟焉争曲直王叔之宰宰家臣與伯輿之大夫瑕禽瑕禽伯輿屬大夫坐獄於王庭獄訟也周禮命夫命婦不躬坐獄訟故使宰與大夫對争曲直士匄聴之王叔之宰曰蓽門圭竇之人而皆凌其上其難為上矣蓽門柴門圭竇小戸穿壁為戸上鋭下方状如圭也言伯輿微賤之家瑕禽曰昔平王東遷吾七姓從王牲用備具王頼之而賜之騂旄之盟平王徙時大臣從者有七姓伯輿之祖皆在其中主為王備犧牲共祭祀王恃其用故與之盟使世其職騂旄赤毛也舉騂旄者言得重盟不以犬鷄曰世世無失職若蓽門圭竇其能来東底乎且王何頼焉言我之貧賤何能来東使王恃其用而與之盟底至也今自王叔之相也政以賄成随財制政而刑放於寵寵臣専刑不任法官之師旅不勝其富師旅之長皆受賂吾能無蓽門圭竇乎言王叔之屬富故使吾貧惟大國圖之圖猶議也下而無直則何謂正矣正者不失下之直范宣子曰天子所右寡君亦右之所左亦左之宣子知伯輿直不欲自専故推之於王使王叔氏與伯輿合要合要辭王叔氏不能舉其契要契之辭王叔奔晋不書不告也單靖公為卿士以相王室代王叔漢上官桀為左将軍霍光為大将軍皆受遺詔輔少主桀自先帝時已為九卿位在光右及父子並為将軍有椒房中宫之重皇后上官安女光廼其外祖而顧専制朝事由是與光爭權蕭望之為御史大夫丞相丙吉年老宣帝重焉望之又奏言萬姓或乏困盗賊未止二千石多材下不任職三公非其人則三光為之不眀今首嵗日月少光咎在臣等帝以望之意輕丞相言三公非其人又云咎在臣等是其意毁丞相也由是不説又丞相司直緐延夀緐音婆奏故事丞相病眀日御史大夫輙問病朝奏事㑹庭中差居丞相後丞相謝大夫少進揖今丞相數病望之不問病㑹庭中與丞相均禮時議事不合意望之曰侯年寜能父我邪謂寜能與吾父同年邪坐是左遷太子太傅晋閻鼎為太子詹事愍帝即位以鼎總攝百揆京兆尹梁綜與鼎爭權鼎殺綜以王毗為京兆尹後魏長樂王夀樂自文成即位有援立功拜太宰大都督督中外諸軍録尚書事矜功與尚書令長孫渇侯爭權並伏法北齊唐邕為尚書令封晉昌王録尚書事車駕幸晋陽勅斛律孝卿摠知騎兵度支事多自决不相詢禀邕自恃從霸朝以来甞典樞要歴事六帝恩遇甚重一旦為孝卿所輕負氣鬱怏形於辭色唐崔日用為黄門侍郎参知政事為相月餘與中書侍郎薛稷不恊于中書忿競日用由是停知政事張嘉貞為中書令張説為兵部尚書平章事初嘉貞為兵部貟外時説為侍郎及是説位在嘉貞下嘉貞既無所推讓説頗不平由是不恊蕭嵩為中書令裴光庭為侍中同位數年情頗不恊及光庭為吏部奏用循資格并促選限至正月三十日令畢其流外行署亦令門下省審之光庭卒後嵩又奏請一切罷之光庭所引進者奏出為外職韓休為右丞相蕭嵩與裴光庭同位數年情頗不恊光庭卒元宗遣嵩擇相嵩以休長者舉之及休入直與嵩舉事休峭直輙不相假互於元宗前論曲直因讓位元宗眷嵩厚乃授嵩尚書右丞相休工部尚書李元紘為中書侍郎平章事與杜暹同在中書多所異同情遂不恊至有相執奏者李適之代牛仙客為左相與李林甫争權不叶隴右節度皇甫惟眀刑部尚書韋堅戸部尚書裴寛京兆尹韓朝宗悉與適之善林甫皆中傷之搆成其罪相繼放逐適之懼不自安求為散職乃罷知政事李吉甫再為平章事秉政之後視聴時有所蔽人心疑憚時之負公望者慮為吉甫所忌多避畏朝宗潜知其事未周嵗遂擢用李絳大與絳不叶而絳性剛訐於帝前互有爭論人多直絳然性畏慎雖甚不悦者亦無所傷張延賞與栁渾同在相位延賞怙權矜已而疾渾守正俾其所厚謂渾曰相公舊徳但節言于廟堂則重位可久答曰為吾謝張相公栁渾頭可斷也言不可絶自是終為延賞所擠尋除右散騎常侍罷知政事鄭覃為右僕射平章事其年李固言復為宰相固言與李宗閔楊嗣復善覃憎之因起居郎闕固言曰周敬復崔球張次宗等三人皆堪此任覃曰崔球逰宗閔之門赤墀下秉筆為千古法不可朋黨如裴中孺李讓夷臣不敢有纎介異論乃止楊嗣復自西川入相與覃尤相矛盾加之以固言李珏入對之際是非蜂起開成三年二月文宗御紫宸殿謂覃曰李宗閔在外已數年朕欲别與一官覃曰陛下以其地逺請量移二三百里即得不可再用姦邪如重用宗閔臣即請退陳夷行曰宗閔頃得罪以黨比責之冝死昔寳歴八關十六子李績張又新蘇景裔等朋比傾覆朝臣貨賄交通李珏曰若以數子之事罪在李逢吉如李績居䘮服闋不可不與一官臣恐在外衣冠多生議論非為李績也夷行曰昔舜逐四凶天下咸理今陛下何惜十數纎人楊嗣復曰事貴得中不可但狥私情帝曰但與一郡國覃曰與洪州司馬可也嗣復曰此為罔上非為量移夷行曰宗閔養得鄭注㡬傾覆朝廷嗣復曰比者陛下欲與鄭注好官宗閔不肯陛下亦當記憶其事鄭覃曰嗣復黨比宗閔姦邪直如李林甫嗣復曰豈可便以李林甫比宗閔昔𤣥宗暮年委任林甫誅破忠良十餘家宗閔未有此事况太和末宗閔與李徳裕同時得罪徳裕自開成初量移至二年夏為淮南節度使而宗閔尚在貶所只如殷侑與韓益奏官及章服臣以韓益前年犯贓未可其奏鄭覃託臣云幸且勿論孰為黨比李珏曰舍小過掩微瑕但量與一官亦無妨帝曰三度左遷與一郡無妨卿等悉出帝召左右史周敬復魏謨向前適来宰臣如此爭論去就得否對曰臣等以為不可然鄭覃等各竭盡忠誠不覺如此亦非敢觸犯龍鱗帝曰鄭覃僻直嗣復疎雋卿可商量宰臣所奏同為一状将来丁酉以衡州司馬外置同置貟李宗閔為杭州刺史陳夷行為工部侍郎平章事楊嗣復李珏繼入輔政夷行介特素惡其所為每文宗前議政語侵嗣復遂至往復珏不能堪上表稱疾辭位詔不許盧携為平章事與鄭畋同在中書黄巢之起携以浙西觀察使髙駢素有軍功奏為淮南節度使令扼賊衝尋以駢為諸道行營都統及巢奏請廣南朝議有請假節以紓患者畋採羣議欲以南海節度縻之携以始用髙駢欲其立功以圖勝携曰髙駢将畧無雙淮土甲兵甚鋭今諸道之師方集蕞爾纎寇不足平殄何事舍之示怯而令諸軍觧體邪畋曰巢賊之亂本因飢歳人以利合乃至寔繁江淮以南薦食殆半國家久不用兵士皆忘戰所在節将閉門自守尚不能支不如釋咎包容權降恩澤彼本以年饑利合一遇豐嵗孰不懐思郷土其衆一離巢則几上肉耳是所謂不戰而屈人之兵也若此際不以計攻全恃兵力恐天下之憂未艾也羣議然之而左僕射于琮曰南海有市舶之利嵗貢珠璣如為妖賊所有國藏漸當廢竭僖宗亦望駢成功乃依携議及中書商量出勅畋曰妖賊百萬横行天下髙公遷延玩寇無意剪除又從而保之彼得計矣國祚安危在我軰三四人畫度公倚淮南用兵吾不知税駕之所矣携怒拂衣而起袂染於硯因投之帝聞之怒曰大臣相詬何以表儀四海二人俱罷知政事後唐任圜為平章事時議命相樞宻使孔循意不欲河朔人居相位圜欲相李琪而宰臣鄭珏素與琪不恊循亦惡琪謂樞宻使安重誨曰李琪非無藝學但不亷耳朝論莫若崔恊重誨然之因奏擇相眀宗曰誰可乃以恊對任圜奏曰重誨被人欺賣如崔恊者少識文字時人謂之没字碑臣比不知書無才而進已為天下笑何容中書之内更益笑端朝退宰臣樞宻使休於中興殿之廡下孔循拂衣而去曰天下事一則任圜二則任圜崔恊暴死則已不死㑹居此位重誨私謂圜曰今相位闕人恊且可乎圜曰朝廷有李琪者學際天人奕葉軒冕論才校藝可敵時軰百人而䜛夫巧沮忌害其能必捨琪而相恊如棄蘇合之丸取蛣蜣之轉也李琪事梁為平章事與蕭頃同在中書頃性畏慎深宻琪倜儻負氣不拘小節中書奏覆多行其志而頃専掎摭其咎李愚為平章事與劉昫俱在中書時馮道已出鎮同州而昫與道為婚家愚性太峻或因舊事不便要釐革者對論不協愚必曰此公親家翁所為更之不亦便乎昫憾其言切於是毎言必相詰難或至喧呼無㡬兩人俱罷相晉桑維翰為平章事少帝微有不豫維翰曽宻遣中使達意於太后請為皇弟重睿擇師傅以教導之少帝由此疑其有他俄而馮玉作相同在中書㑹舍人盧價秩滿玉乃下筆除價為工部侍郎維翰曰詞臣除此官稍慢恐外有所議因不署名属維翰休假玉竟除之自此維翰與玉尤不相協俄因少帝以重睿擇師傅事言於玉遂以詞激少帝尋出維翰為開封尹狥私粤若寅亮天工協和民紀仰成大化直哉惟清斯宰相之職也若乃居具瞻之任爽中立之誠始務營私詎聞盡節公忠靡著怨欲是行或昔有違言或暫失微㫖既舉奪以私意遂好惡之有乖或異已以見傷或改法以更事狥故人之末節忘有國之至公加以租入是貪兒女嬰慮小猶損於政治大或蔽於聰眀而兾庶事咸康邪慝不作雖曰愚者未之信也歴代之下咸可眀懲茍異中道則有斯蔽矣漢田蚡武帝時為丞相元光中河决瓠子蚡奉邑食鄃鄃居河北鄃清河之縣也河决而南則鄃無水菑邑収入多蚡言於帝曰江河之决皆天事未易以人力彊塞彊塞之未必應天而望氣用數者亦以為然是以久不復塞也霍光昭帝時為大将軍輔政以光外孫上官氏為皇后光欲后擅寵有子時帝體不安左右及醫皆阿意言冝禁内雖宫人使令皆為窮袴多其帯窮袴有前後不得交通也使令所使之人也窮袴即今之裩袴襠也後宫莫有進者其後宣帝既立帝微時許妃為皇后光妻顯愛小女成君欲貴之私使乳醫淳于衍行毒藥殺許后乳醫視産乳之疾者因勸光内成君代立為后始許后暴終吏捕諸醫劾衍侍疾亡状不道獄吏簿問急顯恐事敗即以實語光光大驚欲自發舉不忍猶與猶與不决也㑹奏上因署衍勿論署者題其奏後光薨後語稍泄事具外戚悖逆門翟方進成帝時為丞相持法刻深舉奏牧守九卿峻文深詆詆毁也丁禮反中傷者尤多如陳咸朱博蕭育逢信孫閎之屬皆京師世家以材能少歴牧守列卿知名當世而方進特立後起十餘年間至宰相據法以彈咸等皆罷退之初咸最先進自元帝初為御史中丞顯名朝廷矣成帝初即位擢為部刺史歴楚國北海東郡太守陽朔中京兆尹王章譏切大臣而薦瑯琊太守馮野王可代大将軍王鳳輔政東郡太守陳咸可御史大夫是時方進甫從博士為刺史刺始也後方進為京兆尹咸從南陽太守入為少府與方進厚善先是逢信已從髙第郡守歴京兆太僕為衛尉及御史大夫缺三人皆在選中而方進得之㑹丞相薛宣有事與方進相連帝使五二千石雜問丞相御史大臣獄重故以秩二千石五人詰責之咸詰責方進冀得其處方進心恨初大將軍鳯奏除陳湯為中郎與從事每有政事皆與謀之而行鳯薨後從弟車騎將軍音代鳯輔政亦厚湯逢信陳咸皆與湯善湯數稱之於鳳音所久之音薨鳳弟成都侯商復為大司馬衛将軍輔政商素憎陳湯白其罪過下有司案驗遂免湯徙燉煌時方進新為丞相陳咸内懼不安廼令小冠杜子夏往觀其意微自觧説觧説猶曰分疏子夏既過方進揣知其指不敢發言揣謂探求之居無何無何猶言無㡬謂少時方進奏咸與逢信邪枉貪汚營私多欲皆知陳湯姦佞傾覆利口不軌而親交賄遺以求薦舉後為少府數饋遺湯信咸幸得備九卿不思盡忠正身内自知行辟亡功効而官媚邪臣欲以徼幸茍得亡恥孔子曰鄙夫可與事君也與哉謂鄙夫不可與事君也與讀曰歟咸信之謂也過惡暴見不冝處位臣請免以示天下奏可後二嵗舉方正直言之士紅陽侯立舉咸等册拜為光禄大夫給事中方進復奏咸前為九卿坐為貪邪免自知罪惡暴陳依託紅陽侯立徼幸有司莫敢舉奏冐濁茍容不顧恥辱不當䝉方正舉備内朝臣并劾紅陽侯立選舉故不以實有詔免咸勿劾立後數年皇太后姊子侍中衛尉定陵侯淳于長有罪帝以太后故免官勿治罪有司奏請遣長就國長以金錢與立立上封事為長求留曰陛下既託文以皇太后故謂託於詔文誠不可更有他計言不冝遣長就國後長陰事發遂下獄方進劾立懐姦邪亂朝政欲傾誤要主上狡猾不道請下獄帝曰紅陽侯朕之舅不忍致法遣就國於是方進復奏立黨友曰立素行積為不善衆人所共知邪臣自結附託為黨庶㡬立與政事欲獲其利今立斥逐就國所交結尤著者不冝備大臣為郡守案後将軍朱博鉅鹿太守孫閎故光禄大夫陳咸與立交通厚善相與為腹心有背公死黨之信死黨盡死於朋黨欲相攀援死而後已援引也已止也皆内有不仁之性而外有雋材過絶人倫勇猛果敢處事不疑所居皆尚殘賊酷虐苛刻惨毒以立威而已纎介愛利之風愛利謂仁愛而欲安利人也天下所共知愚者猶惑孔子曰人而不仁如禮何人而不仁如樂何言用不仁之人則禮樂廢壊言不仁之人亡所施用不仁而多材國之患也此三人皆内懐姦邪國之所患而深相與交信於貴戚姦臣此國家大憂大臣所冝没身而争也没盡昔季孫行父有言曰見有善於君者愛之若孝子之養父母也見不善者誅之若鷹鸇之逐鳥爵也鸇似鶚而小今謂之上鸇翅翼雖傷不避也貴戚彊黨之衆誠難犯之犯之衆敵並怨善惡相冐冐覆蔽也臣幸得備宰相不敢不盡死請免博閎咸歸故郡以銷姦雄之黨絶羣邪之望奏可咸既廢錮復徙故郡以憂發疾而死張禹成帝時為丞相以老疾罷就第位特進見禮如丞相置從事史五人禹每病車駕自臨問之禹頓首謝恩歸誠言老臣有四男一女愛女甚於男逺嫁為張掖太守蕭咸妻不勝父子私情思與相近帝即時徙咸為𢎞農太守後漢許馘為太尉靈帝光和五年詔公卿以謡言舉刺史二千石為民蠧害者時馘與司空張濟承望内官受取賄賂其宧者子弟賓客雖貪汙穢濁皆不敢問而虚糾邊逺小郡清脩有惠化者二十六人魏曹爽齊王時以大将軍輔政揚州刺史王陵奏廬江太守文欽貪殘不冝撫邊求免官治罪由是徴欽還爽以欽鄉里厚養待之不治欽事復遣還廬江加冠軍貴寵踰前欽以故益驕爽以何晏等為腹心因共分割雒陽野王典農部桑田數百頃及壊湯沐地以為産業承勢竊取官物因縁求欲州郡有司望風莫敢忤㫖晏等與廷尉盧毓素有不平因毓吏微過深文致毓法使主者先収毓印綬然後奏聞其作威如此晋汝南王亮為太宰録尚書事論賞誅楊駿之功過差欲以茍悦衆心由是失望魏舒為司徒左長史傅咸在位多所執正豫州大中正夏侯俊上言魯國小中正司空司馬孔毓四移病所不能接賓求以尚書郎曹馥代毓旬日復上毓為中正司徒三却俊故據正咸以俊與奪惟意乃奏免俊大中正舒俊之姻屬屢却不署咸據正甚堅舒終不從咸遂獨上舒奏咸激訕不直詔轉咸為車騎司馬後魏崔光為車騎大将軍儀同三司光自從貴達罕所申薦曽啟其女壻彭城劉敬徽云敬徽為荆州五隴戍主女隨夫行甞慮寇抄南北分張乞為徐州長史兼别駕暫集京師孝眀許之時人比之張禹北齊孫騰世居北邊因亂離亡一女及貴逺加推訪終亦不得疑其為人婢妾及為司徒奴婢許良者不研虚實率皆免之願免千人兾得其女時髙祖入朝左右有言之者髙祖大怒觧其司徒後遷太保初博陵崔孝芬取貧家子賈氏以為養女孝芬死其妻元更適鄭伯猷携賈於鄭氏賈有姿色騰納之始以為妾其妻袁氏死騰以賈有子正以為妻詔封丹陽郡君復請以袁氏爵廻授其女違禮肆情多此類也趙彦深為司徒諷朝廷以叔堅為中書侍郎頗招物議時馮子琮子慈眀祖班子君信並相繼居中書故時語云馮祖及趙穢我鳳池然堅身材最劣司馬子如執政尉瑾娶其外孫皮氏女由此擢瑾中書舍人隋蘇威為納言開府儀同三司威治身清儉以亷慎見稱然每至公議惡人異已雖或小事必固爭之時人以為無大臣之體唐許圉師為左相龍朔中圉師子静福府果毅文思奉輦直自然因田獵踐百姓苖稼地主忿怒更相擒捉自然遂以髐箭射之圉師杖自然一百竟不聞奏地主又詣司憲告司憲大夫楊徳裔不為推究西臺舍人袁公瑜遣人改姓名上封告之詔特免官李義府為中書令自言本出趙郡始與諸李叙昭穆而無頼之徒茍合藉其權勢拜伏為兄叔者甚衆給事中李崇徳初亦與同譜叙昭穆及義府出為普州刺史遂即除削義府聞而衘之及重為宰相乃令人誣搆其罪竟下獄自殺初貞觀中太宗命吏部尚書髙士廉御史大夫韋挺中書侍郎岑文本禮部侍郎令狐徳棻等及四方士大夫諳練門閥者修氏族志勒成百卷升降去取時稱允當頒下諸州藏為永式義府恥其家代無名乃奏改此書専委禮部郎中孔志約著作郎楊仁卿太子洗馬史元道太常丞吕才重修志約等遂立格云皇朝得五品官者皆升士流於是兵卒以軍功致五品者盡入書限更名為姓氏録由是縉紳士大夫多恥被甄叙皆號此書為勲格義府仍奏收天下氏族志本焚之闗東魏齊舊姓雖皆淪替猶相矜尚自為婚姻義府為子求婚不得乃奏隴西李等七家不得相與為婚劉幽求為侍中幽求妻李氏本幽州故将軍李謹行家賤妾也幽求往為館客通而妻焉謹行孫璡見幽求逹用事遂以為親璡任燕州刺史與幽州都督薛訥有隙幽求遂進孫佺為幽州都督幽州鎮守經畧使節度請軍以代之佺無将材欲令逺討衆知其必敗也張嘉貞為中書令駕幸東都有雒陽主簿王均為嘉貞修宅将以求御史因受賍事發𤣥宗特令朝堂决殺嘉貞從所由速其刑以滅口乃歸罪於御史大夫韋杭等皆貶之姚崇為紫微令縱其子光禄少卿彛等廣引賓客受納饋遺由是為時所譏時有中書主書趙誨為崇所親信受蕃人珍遺事發帝親加鞫問下獄處死崇結奏其罪復營救之帝由是不悦其冬曲赦京城勅文特標誨名令决杖一百配流嶺南崇自是憂懼頻面請避相位薦宋璟自代俄授開府儀同三司罷知政事蘇頲為相開元五年正月太廟四室壊伊闕人孫平子上封事以為去年禘孝和於别室太廟之際未祭孝和先祭太上皇所致詔下禮官太常博士陳貞節與馮宗蘇獻等議以為平子狂瞽危言元宗令平子與禮官對定可否平子口辯所引咸有經據獻等又不能屈之頲以博士蘇獻是從祖兄頗黨之議竟不行平子上論不已遂貶平子為康州都成縣尉議者以平子議為是張説為中書令車駕東廵行封禪之禮説自定侍從升山之官多引兩省録事主書及已之所親攝官而上遂加特進階超授五品及中書舍人張九齡草詔九齡言於説曰今登封霈澤千載一遇清流髙品不沐殊恩胥吏末班先加章􅌧但恐制出之後四方失望今進草之際事猶可改惟令公審籌之無貽後悔也説曰事已决矣悠悠之談何足慮也竟不從制出外内甚咎於説果為御史中丞宇文融所劾李元紘為中書侍郎平章事素重宋遥引為中書舍人與給事中嚴挺之等同考吏部等第判遙與挺之好尚不同遥言於元紘元紘詰挺之挺之曰眀公位尊國相情溺小人乃有憎惡甚為不取也詞色俱厲元紘曰小人為誰挺之曰即宋遥也因出為登州刺史李林甫為右相兵部侍郎李彭年與林甫善慕山東著姓為婚姻引為通譜以大其門典銓官七年竟以贓貶吕甄上元初為相引妻父程楚賓為衛尉少卿妻兄震為侍御史貟外郎王璵代宗朝為相時韓滉出為通州刺史彭王府諮議鄧景山為淮南節度表滉為賓佐未行除殿中侍御史追赴京師先是滉兄汯知制誥草王璵拜官之詞不加虛羙璵頗銜之及其秉政諸使奏滉兄弟者必以冗官授之璵免相羣議稱其屈故召拜焉楊炎徳宗初為相専意報恩復讎道州録事参軍王沼有微恩於炎炎舉沼為監察御史感元載恩専務行載之舊事盧杞徳宗初為相建中三年李納反叛淮南觀察陳少㳺以師収徐海等州尋棄之退軍旴𣅿又加簡校左僕射賜實封三百戸其年就加同平章事時宰相關播甞為少㳺賓僚杞早年與之同在僕固懐恩使府故驟加其官秩初播為給事中杞以播柔緩兾其易制驟薦之尋改吏部侍郎未㡬拜中書侍郎平章事時政事决在杞播但歛袵取容而已李泌徳宗初為中書侍郎平章事以王緯為給事中數月又遷潤州刺史浙西觀察使初緯與泌並為路嗣恭江西觀察判官嗣恭将䧟害泌緯救觧獲免及是遂擢用焉竇叅董晋貞元中俱在相府参驕盈多犯帝漸惡之参風晋奏給事中竇申為吏部侍郎帝正色曰豈不是竇参遣卿奏也晋不敢𨼆諱因問参遇失晋具奏之旬日参貶官晋憂懼累上表辭官李吉甫憲宗初為相元和三年二月勅許新除官及刺史等假於宣正門外謝便進状辭其授官於朝堂禮謝並不須候假開國朝舊制凡命都督刺史皆臨軒册拜特示恩禮近嵗雖不册拜而牧守受命之後皆便殿口對賜衣盖以親人之官恩禮不可廢也時吉甫之舅新除河南少尹裴復求速之任適遇寒食假吉甫特奏請遂兼刺史同有是命非舊典也又裴垍初罷相以太子賓客卒時吉甫復入相以宿嫌怒垍不加贈官給事中劉伯芻疏論贈垍太子少傅伯芻妻其從姨也或言吉甫以此奏論伯芻懼亟請散地因出為虢州刺史元載為門下侍郎平章事載初為侍中苖晉卿引用深徳之見晋卿子壻張延賞厚遇之薦為給事中御史中丞中書舍人㑹河南尹缺特奏為河南尹時河雒兵戈之後邑里丘墟延賞政尚易簡東郡甚理大歴年御史大夫缺上封人李少良潛以載陰事聞載知之乃奏少良狂妄詔下御史臺訊鞫載遂以延賞為大夫實有所屬也崔羣為相元和十四年七月鹽鉄福建院官權長孺坐贓一萬三百餘貫詔付京兆府杖殺之其母劉求哀於宰相羣因對言之帝愍其母老乃曰朕将舍長孺之死何如羣對曰陛下即捨之當速使人往若待正勅不及矣上乃使品官馳往止之翌日詔杖八十長流康州議者以長孺坐贓鉅萬冝處死以懲惡今以其母而貸其生是為人子者皆可以為大惡因母老而不死矣帝惻然捨之仁也宰相救免之非也段文昌穆宗初為相文昌好學尤喜古書畫求取不擇其人故刑部侍郎楊憑兄弟三人皆以文學知名於貞元中四方之士樂慕之憑亦好古故鍾王張鄭之蹟在書斷畫品者頗積其家憑孽子渾之盡獻于文昌求致進士第又翰林學士李紳好惡頗乖有進士周漢賓者倚以求事長慶元年春禮部侍郎錢徽入貢院日文昌及紳懇言二人繼以私書中書舍人李宗閔與翰林學士元稹早以才雋相友稹頃自拾遺御史以直道貶出久之徴為省郎乃大改前志以徼富貴宗閔亦急於進取二人遂有隙楊汝士與徽有舊㑹宗閔子壻蘇朝與右補闕楊汝士季弟殷士俱及第遂搆成其事時文昌已除西川節度使面辭日首發其事指摘牓内鄭朗等十四人皆子弟藝薄不當在選中穆宗以其事訪於翰林學士稹紳等奏與文昌同遂内出題目重試之朗等惶駭就試不能成其文遂考落朗等十人而貶錢徽為江州刺史宗閔劍州刺史汝士為開州臨江縣令元稹為工部侍郎平章事長慶二年以新授楚州刺史李景儉為少府少監分司東都初景儉兩為諫議大夫以險躁縱酗再黜逺地素與稹暱狎及稹作相景儉未達貶所遽遷大郡議者紛起方以散位處之賈餗文宗朝為相太和九年七月貶侍御史李甘為封州司馬殿中侍御史蘇特為潘州司戸蘇特非與李甘為比者賈餗為他事虐用朝典耳梁末帝乹化初于兢為司空平章事四月罷為工部侍郎尋貶䇿州司馬以其挟私與軍校往還故也後唐鄭珏為相崔貽孫自貶所遇赦還京珏以姻戚之分復擬吏部侍郎天官任重昏髦罔知復除禮部尚書致仕後唐韋説與豆盧革作相革説之子俱授拾遺父子同官為人所刺遂改授貟外郎革請説之子濤為宏文館學士説請革之子昇為集賢院學士交致阿私有同市井識者醜之初説在江陵與髙季興相知及入中書亦甞通信幣自討西蜀季興請攻峽内莊宗許之如能得夔忠萬歸峽等州俾為屬郡兩川既定季興無尺寸之功洎明宗纉承季興頻請三郡朝廷不得已而與之革説方在中書亦豫其議及季興占據獨歸其罪豆盧革荘宗時為相以樞宻使郭崇韜父名宏乃奏改宏文館為崇文館至眀宗天成二年正月勅三館重事歴代通呼只自先朝偶更舊制因近臣之避忌易大國之規模今屬維新理冝仍舊其崇文館冝却改為宏文館崔協為相天成二年五月御史中丞盧文紀奏今月一日廊下就食權知左丞崔居儉使大吏怪食無次第文紀以賜食出於御厨又非室中指縱為居儉堕越近條故舉之奉勅臺司舉奏務肅班行若鞫端繇且開飲饌縱令引證亦是小瑕並放時恊在中書與居儉有私憾及有是舉人亦非之馮道初為中書侍郎平章事吏部侍郎劉岳以道形神庸陋一旦為丞相人士多竊笑道自月華門赴班岳與工部侍郎任贊偶語見道行而復顧賛曰新相回顧何也岳曰定是忘持免册来道之鄉人在朝者聞之告道因授岳秘書監任賛散騎常侍趙鳳為中書侍郎平章事長興元年八月壬寅眀宗御中興殿對鳳奏曰一日已来臣等竊知有姦人熒惑陛下誣䧟大臣未知信否上曰閑事卿勿復言朕已處置訖鳳堅奏曰所聞之事不小陛下不得以為閑自數日已来衆口籍籍言安重誨㡬傾家族因指殿以諭之曰此殿宏壮所以不騫不撓者棟梁柱石之所扶持也如狂人折一柱壊一棟則殿危矣重誨歴艱險經危難事陛下致君為中興主人欲誣搆䧟之是壊陛下棟梁柱石也上因改容報曰予雖不信然生此䜛隙者皆兇徒也遽命族誅勅曰捧聖都軍使李徳行十将張儉等摭求虚事誣告重臣奏陳而頗駭聴聞詰騐而乃眀䜛謗間予心腹傾我棟梁為巨蠧以異常罪一身而未塞冝誅家族懲彼姦兇仰全家處斬其年九月甲戌樞宻使安重誨進第三表乞觧機務初進第一表上謂曰朕與兄無間兇軰厚誣尋以誅戮卿此後更無在懐翌日宰臣入對馮道等奏曰臣竊聞安重誨乞辭機務此事不可輕議乞陛下特挂宸襟以安中外上曰朕已面諭之無所改易至是重誨復面奏云臣以孤賤事陛下今日位重人臣忽被無名誣搆若非聖鍳至明察臣忠懇則已膏於斧鑕矣以臣才輕位重終恐難鎮流言且乞與臣一鎮暫觧機衡以息浮謗聖㫖不悦重誨奏不已帝怒謂之曰放卿出朕自有人宣徽使范延光奏曰自中興以来重誨参掌機務况無過失頗濟國家如重誨辭退誰可為代上曰卿豈不得延光奏曰重誨事陛下三十年為陛下無不陳力大臣㐲事日近幸逢興運叨竊寵靈比徳較功不可與重誨同年而語臣固才力不逮也帝遣促為之因令武徳使孟漢瓊至中書宣問宰臣商量重誨事執政疑其對惟馮道揚言曰諸人茍安令公紓其禍難則觧樞務為便也趙鳳争曰大臣不冝輕動公失言也道等因附漢瓊奏曰此斷在宸㫖然重臣不可輕議移改繇是兼命延光為樞宻重誨如故樹黨君子無黨先聖之格言私臣不忠往哲之眀戒况夫秉鈞巖廊之上髙議槐鼎之司股肱大君師表多士固冝摠釐百揆經濟逺圖以啟沃為憂以裁成為任豈有庸回蒐慝毁信廢忠朋附寵臣樹任私黨或交通於近職或締結於貴親務固寵榮廣布心腹上則蔽虧於王政下則毒痡於生民宜乎閲實典刑以謝天下焉後漢袁逢為司空後卒於執金吾弟隗少歴顯官先隗為三公時中常侍袁赦隗之宗也用事於中以逢隗世宰相家推崇以為外援故袁氏貴寵於世富奢甚不與他父族同劉熹為太尉與太𫝊馮石以阿黨貴免魏曹爽為大将軍時南陽何晏鄧颺李勝沛國丁謐東平畢軌咸有聲利進趣於時眀帝以其浮華皆抑黜之及爽秉政乃復進叙任為心腹爽以司馬宣王年徳並髙甞父事之不敢専行及晏颺謐等進用咸共推戴説爽以權重不冝委之於人乃以晏颺謐為尚書晏典選舉軌司𨽻校尉勝河南尹諸事希復由宣王宣王遂稱疾避爽又云爽執政秉權将樹其黨徙吏部尚書盧毓為僕射以侍中何晏代毓吴濮陽興為丞相與景帝寵臣左将軍張布共相表裏邦内失望南齊王儉髙帝時為左僕射儀曹郎孔逷常謀議幃幕每及選用頗失鄉曲情儉從容啟帝曰臣有孔逷猶陛下之有臣也時人呼孔逷何憲王儉為三公後魏崔浩太武時為司徒述成國記時著作令史關湛為浩信任見浩所注詩論書易遂上疏言馬鄭王賈雖著述六經並名疏謬不如浩之精微乞收境内諸書藏之秘府頒浩所注命天下習業並求勅浩注禮𫝊令後生得觀正義浩亦表薦湛有著述之才于忠孝眀時為侍中秉朝政與直閣将軍章初瓌千牛備身楊保元為斷金之交李世哲求寵於忠私以金帛寳貨賂初瓌保元等初瓌保元談之遂被賞愛引為腹心忠擅權昧進為崇訓之由皆世哲計也忠既尊靈太后居崇訓宫忠為儀同三司尚書令太后臨朝觧忠侍中領軍崇訓衛尉正元义為領軍将軍執政擅權樹結親黨車騎将軍侯剛長子义之妺夫乃引剛為侍中左衛将軍還領尚食典御以為枝援俄加車騎大将軍及义之觧領軍也靈太后以义腹心尚多恐難卒制故權以剛代之示安其意尋出為散騎常侍冀州刺史北齊祖班為侍中時武眀皇后姊子叚孝言為吏部尚書班執政将廢趙彦深引孝言為助除侍中入内省典機宻後周晋公䕶為大冡宰以中大夫叱羅協竭忠於已每提奨之頻考上中賞以粟帛遷少保轉少傅進位大将軍爵南陽郡公兼營作副監宫室既成以功賜爵雒邑縣公隋蘇威為侍中其子䕫少有盛名引致賔客四海士大夫多歸之時議樂事夔與國子博士何妥各有所持於是䕫妥各為一議使百僚署其所同朝廷多附威同䕫者十八九妥曰吾席間函丈四十餘年反為昨暮兒之所屈也遂奏威與禮部尚書盧愷吏部侍郎薛道衡尚書右丞王宏考功侍郎李同和等為朋黨省中呼王宏為世子李同和為叔言二人如威之子弟復言威以曲道任其從父弟徹肅等罔冐為官又國子學請蕩陰人王孝逸為書學博士威屬盧愷以為其府参軍帝令蜀王秀上柱國盧慶則等推案之事皆驗帝以宋書謝晦𫝊中朋黨事令威讀之威懼免冠頓首帝曰謝已晚矣於是免威官爵以開府就第知名之士坐威待罪者百餘人未㡬帝曰蘇威頃者但為人誤耳命之通籍嵗餘復爵邳公髙熲髙祖受禪拜尚書左僕射兼納言與内史令李徳林于翼同修律令蘇威又言廢郡徳林語之云修令時公何不論廢郡為便今令纔出其可改乎然髙熲同威之議奏稱徳林狼戾多所固執由是髙祖竟依威議唐宗楚客中宗時為中書令雖跡附韋氏而與侍中紀處訥共為朋黨故時人號為宗紀宇文融元宗時為黄門侍郎平章事時禮部尚書信安王禕為朔方節度殿中侍御史李宙劾之驛召将下獄禕既申訴得理融坐阿黨李宙出為汝州刺史裴光庭時兼御史大夫又彈融交遊朋黨及男受贓貶昭州平樂尉吕諲肅宗時為黄門侍郎同中書門下三品時馬上言以宣𫝊詔命諲親暱之有納錢買官者諲為奏藍田尉帝使御史敬翔劾之得其實上言决殺之以其肉賜從官食之遂罷諲相為太子賓客元載代宗時為門下侍郎平章事載自為相已後甞遷擢朝官之有文學才望者一人厚遇之将以代已初引領吏部侍郎劉單單卒又引禮部侍郎薛邕邕卒又引楊炎故當時親重之者無與炎比載敗炎坐貶道州司馬竇参徳宗時為中書侍郎平章事貞元中戸部侍郎竇覦無他能為吏粗有幹用初以韓滉子壻為節将辟奏及参秉政多樹私黨以從父之故極口薦論擢戸部數月又除淮南節度副大使既非德舉人咸薄之又有竇申者参之同族参特愛申每議除授多語於申申或泄之以招權受賂每所至人謂之喜鵲帝頗聞其事數謂参曰卿他日必為申所累不如出之以掩物議參曰臣無强子姪申雖疎屬臣親之不忍出請保無他犯帝曰卿雖自保如衆人何参固如前對申聞之不悛参為相無學術但多引用親黨使居要職以為耳目四方節度使皆畏憚之李泌為平章事有房式者宰相琯之姪舉進士泌為陜州觀察使時辟為從事泌入相累遷起居郎出入泌門為其耳目及泌卒再除忠州刺史杜佑徳宗末為門下侍郎平章事濠州刺史杜兼性浮險豪侈矜氣憲宗元和初入為刑部吏部郎中拜給事中除金商防禦使旋受河南尹知府事尋正拜尹皆佑在相位所惜䕶也李訓文宗時為平章事太和元年以刑部郎中兼侍御史知雜事李孝本為權知御史中丞自李固言由御史大夫作相舒元輿以知雜事為中丞及元輿入相復以孝本為中丞皆訓之所擢用後唐豆盧革荘宗同光初為門下侍郎平章事革引薦韋説為相兾諳事體與己同功説既登庸復事流品舉止輕脱怨歸於革孔循為樞宻使同平章事明宗天成初宰相豆盧革韋説得罪執政相與議宰相時經始之初言事者衆咸以循少侍宫禁諳故實知朝廷人士之才行樞宻使安重誨多聴之循意不欲河朔人居相位初已援引鄭珏入中書至是任圜欲相李琪而鄭珏與琪朱梁時同在翰林為學士二人不相善居常切齒循既以珏為門人亦排斥李琪謂重誨曰李琪非無藝學但不廉耳宰相人士之表儀但得身端有噐度足以輔弼矣朝論所與莫若崔恊重誨以為然後重誨内殿奏中書闕人欲擇丞相帝曰誰可相者乃以崔恊對任圜曰重誨未諳朝中人物被人欺賣如崔協者天下皆知少識文字時人呼為沒字碑臣以陛下藩邸之年即廻天睠比不知書無才幸進一旦驟塵輔弼終朝若負芒刺以臣一人取笑足矣何容中書之内更益笑端帝曰宰相重位卿等更自審詳然吾在藩時識易州刺史韋肅人言名家待我甞厚置於此位何如肅茍未可則馮書記先朝判官稱為長者多才博學與物無競可以相矣書記即馮道也甞為莊宗霸府書記帝素欵顔偶不記名但云書記朝退宰臣樞宻使休於中興殿廊舍循不揖拂衣徑去曰天下事一則任圜二則任圜圜何為者崔恊暴死則已不死㑹居此位重誨私謂圜曰今政闕人恊且備貟可乎圜曰公言何狭哉今朝廷有李琪者學際天人奕葉軒冕論才校藝可敵時軰百人而䜛夫巧沮忌害其能必捨琪而相協如棄蘇合之丸取蛣蜣之轉也重誨笑而止然與循同職循日言琪之短協之長月餘下制以馮道崔恊同平章事物論醜之范延光明宗時為樞宻使長興中新授許州節度使孟鵠謝退帝目送之顧謂侍臣曰孟鵠掌三司㡬年得至方鎮大竒事延光奏曰鵠於同光世已為三司司官天成初為三司副使出刺相州入判三司又三年帝曰鵠實幹事人以至此方鎮爭不勉旃鵠與延俱魏人鵠在相州延光自鎮州歸朝鵠厚相結託暨延光掌樞宻援引判三司又致節鉞帝心知其圖要有諷勸故延光委曲陳述帝所以云爭不勉旃漢蘇逢吉為中書侍郎平章事初與李濤論舊相得甚歡濤之入相逢吉有力焉㑹濤上章請出兩樞宻為方鎮帝怒罷濤相勒歸私第時論疑濤承逢吉之風㫖也冊府元龜卷三百三十七
