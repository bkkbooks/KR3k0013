body:
  text: 册府元龜卷七百九十七宋王欽若等撰總録部博物古之學詩者多識於鳥獸草木之名其博物之謂乎且品彚之衆賦象各異小大隠見變化紛紜方輿廣厚靡所不載或總括地志或傳流人間逺者隔越九州曠絶千載幽者埋没泉壤磨滅篆刻不時而出是為竒恠眩惑衆視莫質所疑茍非智賾萬殊識洞羣性洽聞强記目撃道存則何以徧閲名數周察毫芒别白臧否如指諸掌謂之君子不其然乎管仲字夷吾為齊桓公相桓公北征孤竹未至卑耳之谿十里闒然立瞠然視闒坐立貌瞠驚視貌援弓將射引而未發謂左右曰見是前人乎左右對曰不見也公曰事其不濟乎寡人大惑今者寡人見人長尺而人物具焉冠右袪衣走馬前疾事其不濟乎寡人大惑豈有人若此者乎管仲對曰臣聞登山之神有俞兒者長尺而人物具焉覇王之君興而登山之神見且走馬前道也袪衣示前有水也右袪衣示從右方涉也至卑耳之谿有贊水者謂贊引渡水者曰從左方涉其深及冠從右方涉其深至膝已涉其大濟桓公坐拜管仲之馬前曰仲父之聖至若此寡人之抵罪也乆矣抵當也不知仲父之聖是寡人當有罪乆矣管仲對曰夷吾聞之聖人先知無形今已有形而後知之臣非聖也善承教也善承古人之敎也介葛盧介國之君也葛盧聞牛鳴曰是生三犧皆用之矣其音云問之而信言人聽或通鳥獸之情展禽桞下季也爲魯士師海鳥爰居止於魯東門之外三日臧文仲使國人祭之文仲不知以為神展禽曰越哉臧孫之為政也越迂也言迂闊不知政要也夫祀國之大節也而節政之所成也故慎制祀以為國典今無故而加典非政之所宜也夫聖王之制祀也功施於民則祀之以死勤事則祀之以勞定國則祀之以能禦大灾則祀之能捍大患則祀之非是族也不在祀典今海鳥至矣不知而祀之以為國典難以為仁且智矣夫仁者講功智者處物無功而祀之非仁也不知而不問非智也今兹海其有灾乎夫廣川之鳥獸常知而避其災是嵗也海多大風冬煖爰居之所避也臧文仲聞栁下季之言使書以為三筴筴簡書也三筴三卿三通也謂司馬司徒司空公孫僑字子産為鄭大夫晉平公有疾鄭伯使公孫僑如晉聘且問疾叔向問焉曰寡君之疾病卜人曰實沈臺駘為祟史莫之知敢問此何神也子産曰昔髙辛氏有二子伯曰閼伯季曰實沈髙辛帝嚳居于曠林不相能也曠林地闊日㝷干戈以相征討尋用也后帝不臧后帝堯也臧善也遷閼伯于商丘主辰商丘宋地主祀辰星辰大火也商人是因故辰為商星商人湯先相土封商丘因閼伯故國祀辰星遷實沈于大夏主參大夏今晉陽縣唐人是因以服事夏商唐人若劉累之等累遷魯縣北在大夏其季世曰唐叔虞唐人之季世其君曰叔虞當武王邑姜方震大叔邑姜武王后齊太公之女懷胎為震大叔成王之弟叔虞夢帝謂己曰命而子曰虞帝取唐君之名將與之唐屬諸參而蕃育其子孫及生有文在其手曰虞遂以命之及成王滅唐而封大叔焉故參為晉星叔虞封唐是為晉侯由是觀之則實沈參神也昔金天氏有裔子曰昧為𤣥㝠師生允格臺駘金天氏帝少皥逺裔也𤣥㝠水官昧為水官之長臺駘能業其官纂昧之業宣汾洮宣猶通也汾洮二水名障大澤陂障之以處太原太原晉陽也臺駘之所居帝用嘉之封諸汾川帝顓頊沈姒蓐黄實守其祀四國臺駘之後今晉主汾而滅之矣滅四國由是觀之則臺駘汾神也抑此二者不及君身山川之神則水旱癘疫之灾於是乎禜之有水旱之灾則禜祭山川之神若臺駘者周禮曰禜祭也禜攅用幣以祀羣神山川星辰之神則雪霜風雨之不時於是乎禜之星辰之神若實沈者若君身則亦出入飲食哀樂之事也山川星辰之神又何為焉言實沈臺駘不為君疾僑聞之君子有四時朝以聽政聽國政晝以訪問問可否夕以脩令令所施夜以安身於是乎節宣其氣宣散也勿使有所塞閉湫底以露其體湫集也底滯也露羸也閉塞則血氣集滯而體贏露兹心不爽而昏亂百度兹此也爽明也百度百事之度今無乃一之同四時也則生疾矣僑又聞之内官不及同姓内官嬪御其生不殖殖長也美先盡矣則相生疾同姓之相與先美矣美極則盡盡則生疾君子是以惡之故志曰買妾不知其姓則卜之違此二者古之所慎也一四時二取同姓二者古人所慎男女辨姓禮之大司也辨别也今君内實有四姬焉同姓姬四人其無乃是也乎若由是四者弗可為也已為治也四姬有省猶可無則必生疾矣乎據異姓去同姓故言省叔向曰善哉肸未之聞也此皆然矣晉侯聞子産之言曰博物君子也重賄之後七年子産復聘于晉晉侯有疾韓宣子逆客私焉私語曰寡君寢疾於今三月矣並走羣望晉所望祀山川皆走往祈禱有加而無瘳今夢黄熊入於寢門其何厲鬼也對曰以君之明子為大政其何厲之有昔堯殛鯀于羽山羽山在東海祝其縣西南其神化為黄熊以入于羽淵寔為夏郊三代祀之鯀禹父夏家郊祭之厯殷周二代又通在羣神之數并見祀晉為盟主其或者未之祀乎言周衰晉為盟主得佐天子祀羣神韓宣子祀夏郊祀鯀晉侯有間賜子産莒之二方鼎方鼎莒所貢蔡墨晉太史昭公二十九年頃公時龍見于絳郊絳晉國都魏獻子問於蔡墨曰吾聞之蟲莫知於龍以其不生得也謂之知信乎對曰人寔不知非龍寔知言龍無知乃人不知之耳古者畜龍故國有豢龍氏有御龍氏豢御養也獻子曰是二氏者吾亦聞之而不知其故是何謂也對曰昔有飂叔安飂古國名叔安其君名有裔子曰董父裔逺也𤣥孫之後為裔寔甚好龍能求其嗜欲以飲食之龍多歸之乃擾畜龍以服事帝舜帝賜之姓曰董氏曰豢龍豢龍官名官有世功則以官氏封諸鬷川鬷夷氏其後也鬷水上夷皆董姓故帝舜氏世有畜龍及有夏孔甲擾于有帝孔甲少康之后九世君也其德能順於天帝賜之乗龍河漢各二各有雌雄孔甲不能食而未獲豢龍氏有陶唐氏既衰其後有劉累陶唐堯所治也學擾龍於豢龍氏以事孔甲能飲食之夏后嘉之賜氏曰御龍夏后孔甲以更豕韋之後更代也以劉累代彭姓之豕韋累尋遷魯縣豕韋復國至商而滅累之後世復承其國為豕韋氏在襄公二十四年龍一雌死濳醢以食夏后潜藏也藏以為醢明龍不知夏后享之既而使求之求致龍也懼而遷于魯縣不能致龍故懼遷魯縣自貶退也魯縣今魯陽范氏其後也仲尼魯人季桓子穿井得土缶中石羊羊生羊也故謂之恠也問仲尼云得狗獲羊而言狗者以孔子博物則知之仲尼曰以丘所聞羊也丘聞之木石之恠䕫魍魎木石謂土也或云䕫一足越人謂之山魈也或言燭是魍魎山精好學人聲而迷惑人也水之恠龍罔象龍神獸也非常見故曰恠或云罔象食人一名沐腫土之恠羵羊羵羊雌雄未成者也吳王夫差伐越墮㑹稽墮毁也得骨節專車骨一節其長專車專擅也王使使問仲尼骨何者最大仲尼曰禹致羣神於㑹稽山羣神謂主山川之君為羣神之主故謂之神也防風氏後至禹殺而戮之防風氏違命後至故禹殺之陳尸為戮其骨節專車此為大矣吳客曰誰為神仲尼曰山川之神足以綱紀天下其守為神守山川之祀者為神謂諸侯也足以綱紀天下守名山大川能興雲致雨以利天下也社稷為公侯但守社稷無山川之祀者直為公侯而已皆屬於王者客曰防風何守仲尼曰汪㒺氏之君守封禺之山封封山禺禺山在吳郡永安縣晉太康元年改永安為武康縣屬吳興郡為釐姓在虞夏商為汪㒺於周為長翟今謂之大人罔之初及書孔子之時其名異也客曰人長幾何仲尼曰焦僥氏三尺短之至也焦僥西南蠻之别名也在三秦國也長者不過十之數之極也十之謂三丈也數極於此於是吳客曰善哉聖人在陳湣公時有隼集於陳庭而死楛矢貫之弩矢長尺有咫隼鷙鳥今之鶚也楛矢名砮鏃也以石為之八寸曰咫楛矢貫之墜而死公使使問仲尼仲尼曰隼來逺矣此肅慎氏之矢昔武王克商通道九夷百蠻九夷東方有九種也百蠻夷狄之百種使各以其方賄來貢各以其國所有之物而來貢使無忘職業於是肅慎貢楛矢石弩長尺有咫先王欲昭其令徳以肅慎矢分大姬大姬武王女也配虞胡公而封諸陳分同姓以珍玉展親展重也王謂若夏后氏之類分異姓以逺方職貢使無忘服使無忘服從於王也故分陳以肅慎矢試求之故府果得之故府舊府也漢東方朔武帝時為郎建章宫後閣重櫟中有物出焉其狀似麋以聞帝往臨視之問左右羣臣習事通經術者莫能知詔東方朔視之朔曰臣知之願賜美酒粱飯大飱臣臣朔乃言詔曰可已飱又曰某所有公田魚池蒲葦數頃陛下以賜臣臣朔乃言詔曰可於是朔乃言曰昔所謂騶牙者也逺方當來歸義而騶牙先見其齒前後若一齊等無牙故謂之騶牙其後一嵗餘匈奴混邪王果将十萬衆來降漢乃復賜東方朔錢財甚多終軍為孝亷郎武帝時得豹文鼮鼠軍知之賜絹百疋張敞為京兆尹宣帝時美陽得鼎獻之美陽扶風之縣也下有司議多以為宜薦見宗廟如元鼎故事敞好古文字案鼎銘勒而上議曰臣聞周祖始乎后稷后稷封漦漦今武功故城是也公劉發迹於邠今邠州是也太王建國於􅑢梁梁山在􅑢山之東九峻之西非夏陽之梁山也文武興於鄷鎬鄷今長安城西灃水是也鎬在昆明池傍也由此言之則􅑢梁鄷鎬之間周舊居也固宜有宗廟壇塲祭祀之藏今鼎出於郊東中有刻書曰王命尸臣官此栒邑尸主事之臣也栒邑即邠地也賜爾旂鸞黼黻琱戈蛟龍為旂鸞謂有鸞之車飾也黼黻冕服也琱戈刻鏤也尸臣拜手稽首曰敢對揚天子丕顯休命臣愚不足以迹古文竊以傳記言之此鼎殆周之所以褒賜大臣大臣子孫刻銘其先功藏之宫廟也昔寳鼎之出於汾㫿也河東太守以聞詔曰朕巡祭后土祈為百姓蒙豐年今穀嗛未報嗛少意也言穀稼尚少未獲豐年也鼎焉為出哉博聞耆老意舊藏與言鼎豈舊藏今此城誠欲考得事實也有司驗睢上非舊藏處鼎大八尺一寸髙三尺六寸殊異於衆鼎今此鼎細小又有欵識款識列記也不宜薦見於宗廟制曰京兆尹議是後漢賈逵多智思明帝永平中有神雀集宫殿官府冠羽有五采色明帝異之以問臨邑侯劉復復不能對薦逵博義多識帝乃召見逵問之對曰昔武王終父之業鸑鷟在岐宣帝威懷戎狄神雀仍集此胡降之徵也帝勅蘭臺給筆札使作神雀頌拜為郎與班固並校祕書應對左右逵位至侍中魏王粲為侍中漢末䘮亂絶無玉珮粲識舊珮始復作之今之玉珮受法於粲也管輅字公明平原人時劉邠為平原太守邠謂輅曰此郡官舍連有變恠多形使人怖恐君似當逹此數者厥理何由輅言此郡所以名平原者本有原山無木石與地自然含隂不能吐雲含陽不能激風隂陽雖弱猶有㣲神微神不真多聚㓙姦以類相求魍魎成羣或因漢末兵馬擾攘軍尸流血染汚丘嶽彊魂相感變化無常故因昏夕之時多有恠形也昔夏禹文明不恠於黄龍周武信時不惑於暴風今明府道徳髙玅神不懼妖自天祐之吉無不利願安百禄以光休寵也邠曰聽雅論為近其理每有變恠輒聞皷角聲音或見弓劍形象夫以土山之精伯有之魂實能合會干犯明靈也邠問輅易言剛健篤實輝光日新斯為同不也輅曰不同之名朝旦為輝日中為光晉張華字茂先范陽方城人也雅愛書籍身死之日家無餘財惟有文史溢于几篋苦叶切嘗徙居載書三十乗祕書監摯虞撰定官書皆資華之本以取正焉天下竒祕世所希有者悉在華所由是博物洽聞世無與比惠帝中人有得鳥毛長三丈以示華華見慘然曰此謂海鳬毛也出則天下亂矣陸機嘗餉華鮓于時賔客滿座華發器便曰此龍肉也衆未之信華曰試以苦酒濯之必有異既而五色光起機還問鮓主果云園中茅積紫賜反下得一白魚質狀殊常以作鮓過美故以相獻武庫封閉甚宻其中忽有雉雊華曰此必蛇化為雉也開視雉側果有蛇蜕舒苪反託卧反焉吳郡臨平岸崩出一石皷搥之無聲帝以問華華曰可取蜀中桐材刻為魚形扣之則鳴矣如其言果聲聞數里初吳之未滅也斗牛之間常有紫氣道術者皆以吳方强盛未可圖也惟華以為不然及吳平之後紫氣愈明華聞豫章人雷煥玅達緯象乃要煥宿屏人曰可共㝷天文知将來吉凶因登樓仰觀煥曰僕察之乆矣惟斗牛之間頗有異氣華曰是何祥也煥曰寳劍之精上徹於天耳華曰君言得之吾少時有相者言吾年出六十位登三事當得寳劍佩之斯言豈效歟因問曰在何郡煥曰在豫章豐城華曰欲屈君為宰宻共尋之可乎煥許之華大喜即補煥為豐城令煥到縣掘獄屋基入地四丈餘得一石函光氣非常中有雙劍並刻題一曰龍泉一曰太阿其夕斗牛間氣不復見焉煥以南昌西山北巖下土以拭劍光芒豔發大盆盛水置劍其上視之者精芒眩目遣使送一劍并土與華留一自佩或謂煥曰得兩送一張公豈可欺乎煥曰本朝将亂張公當受其禍此劍當繫徐君墓樹耳靈異之物終當化去不久為人服也華得劍寳愛之常置坐側華以南昌土不如華隂赤土報煥書曰詳觀劍文乃干将也莫邪何復不至雖然天生神物終當合耳因以華隂土一斤致煥煥更以拭劍倍益精明華誅失劍所在煥卒子華為州從事持劍行經延平津劍忽於腰間躍出墮水使人沒水取之不見劍但見兩龍各長數丈蟠縈有文章沒者懼而反須臾光彩照水波浪驚沸於是失劍華乃曰先君化去之言張公終合之論此其驗矣華之博物多類此不可詳載束晳為尚書郎有人於嵩髙山下得竹簡一枚上兩行科斗書傳以相示莫有知者司空張華以問晳晳曰此漢明帝顯節陵中䇿文也較驗果然後趙續咸石勒時為建德校尉王和參軍和掘得員石銘曰律權石重四均同律度量衡有新氏造議者未詳或以為瑞咸曰王莽時物也其時兵亂之後典度湮滅遂命下禮官為準程定式前秦苻朗為青州刺史降于晉朗善識味鹹酢及肉皆别所由㑹稽王司馬道子為朗設盛饌極江左精餚食訖問曰關中之食孰若此答曰皆好惟鹽味小生耳既問宰夫皆如其言或人殺鷄以食之既進朗曰此鷄棲恒半露檢之皆驗又食鵝肉知黒白之處人不信記而試之無毫釐之差時人咸以為知味宋何承天博通古今為時所重張永開𤣥武湖遇古冢冢上得一銅斗有柄文帝以訪朝士承天曰此亡新威斗王莽三公亡皆賜之一在冢外一在冢内時合𦵏江左者唯甄邯為大司徒必邯之墓俄而又啟冢内更得一斗復有一石銘曰大司徒甄邯之墓承天位至御史中丞南齊王僧䖍髙祖初為撫軍将軍文惠太子鎮襄陽時有盜發古冢者相傳云是楚王冢大獲寳物玉屐玉屏風竹簡書青絲編簡廣數分長二丈皮節如新後人有得十餘簡以示僧䖍云是科斗書考工記周官所闕文也陸澄領國子祭酒竟陵王子良得古器小口方腹而底平可容七八升以問澄澄曰此名服匿單于以與蘇武子良後視器底有字髣髴可識如澄所言賈淵字希鏡宋孝武世青州人發古冢銘曰青州世子東海女郎帝問學士鮑昭徐爰蘇寳生並不能悉淵對曰此是司馬越女嫁茍晞兒檢訪果然由是見遇淵明帝時終北中郎将軍梁劉顯為中書侍郎與裴子野顧協連職禁中顯博聞强識過於裴顧時人獻古器有隠起字無能識者顯視文讀之無有滯礙考校年月一字不差髙祖甚嘉焉後魏髙祐為侍郎文成末兖州東郡吏獲一異獸送之京師時人咸無識者詔以問祐祐曰此是三吳所出厥名鯪鯉餘域率無今我獲之吳楚之地其有歸國者乎又有人於零丘得玉印一以獻詔以示祐祐曰印上有籀書二字文曰宋夀夀者命也我獲其命亦是歸我之徵獻文初宋文帝子義陽王昶來奔薛安都等以五州降附時謂祐言有驗祖瑩為散騎侍郎孝明孝昌中於廣平王第掘得古玉印勅召瑩與黄門侍郎李琰之辨之瑩云此是于闐國晉太康中所獻乃以墨塗字觀之果如瑩言時人稱為博物北齊徐之才博識多智時有以骨為刀子靶者五色斑斕之才曰此人瘤也問得處云於古冢見髑髏骨長數寸試削視有文理故用之其明悟多通如此官累至尚書左僕射後周斛斯徵為太常少卿時梁春平蜀得樂器人皆莫之識徵見之曰此錞于也人弗之信徵遂依干寳周禮注以芒筒将之其聲極振衆乃歎服徵取以合樂焉隋崔頥煬帝時為起居舍人大業初從駕幸汾陽宫次河陽鎮藍田令王曇於藍田山得一玉人長三尺四寸著大領衣冠幘奏之詔問羣臣莫有識者頥答曰謹案漢文已前未有冠幘即文帝以來所作也臣見魏大司農盧元明撰嵩山廟記云有神人以玉為形象長數寸或出或隠則令世延長伏惟陛下應天順人定鼎嵩雒岳神自見臣敢稱慶因再拜百官畢賀天子大悅賜縑二百疋册府元龜卷七百九十七
