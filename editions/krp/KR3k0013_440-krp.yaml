body:
  text: 冊府元龜卷四百四十宋王欽若等撰將帥部交結忌害交結朱穆有言曰古者進退趨業無私遊之交况乎總師律之嚴授閫寄之重而敢違背公路私相朋結者哉若乃始為勍敵終以膠固出處之際諂凟是務附當軸之勢託居中之權謀以姦成情以貨取至有造請宗室往還戚里合婚媾之好敦兄弟之契希進固寵蔽罪竊譽比周之迹斯露貪冒之志無厭雖曰僥榮何逃嗤鄙魏鍾㑹為司徒都督諸軍伐蜀蜀後主既降於鄧艾姜維詣鍾會于涪㑹厚待維等皆權還其印號節盖㑹與維出則同輿坐則同席謂長史杜預曰以伯約姜維字比中土名士公休太初不能勝也晉何充康帝建元中自中書令出為驃騎將軍都督徐州揚州之晉陵諸軍事假節領徐州刺史鎮京口以避諸庾頃之庾翼將北伐庾氷出鎮江州充入朝言於帝曰臣氷舅氏之重宜居宰相不應逺出朝議不從於是徵充入為都督揚豫徐州之瑯邪諸軍事假節領揚州刺史將軍如故先是翼悉發江荆二州編户奴以充兵役士庻嗷然充復欲發揚州奴以均其謗後以中興時已發三呉今不冝復發而止後魏甄琛孝明時為征北將軍定州刺史崔光辭司徒之授也琛與光書外相抑揚内實附㑹也光亦揣其意復書褒美以悦之唐章仇兼瓊為劔南節度使時貴妃從父子楊國忠為益州新都尉及貴妃有寵兼瓊以故引為幕賔安禄山𤣥宗時為平盧兵馬使時御史中丞張利貞為河北採訪使至平盧禄山素諂佞善伺人情嘗曲事利貞復以金帛厚遺其左右利貞歸朝盛稱禄山美以奏之遂授營州都督平盧軍使中使往來皆厚遺賂𤣥宗親信之天寳元年遂分平盧别為節度以禄山攝御史中丞為之使二年入朝奏對𤣥宗益賞重之加驃騎大將軍三載為范陽節度河北採訪使平盧節度如故五載禮部尚書席建侯為河北黜陟使表禄山公直無私嚴正奉法利貞推美於前建侯表薦于後右相李林甫亦素與禄山交通復屢言于𤣥宗由是特加寵遇王昻出自戎旅以軍功累遷河東節度使貪縱不知法令務於聚斂以貨藩身代宗時元載秉政與載親相交結拜刑部尚書崔寧為西川節度使時地險人富乃厚斂貨財交結權貴令弟寛留京師元載及諸子有所欲寛必與之故寛驟歴御史左司員外考功郎中兼侍御史知雜事御史丞寛兄審亦任郎中諌議大夫給事中韋臯為西川節度使順宗時王叔文用事臯遣副使劉闢將臯之意為叔文求都領劒南三川謂叔文曰太尉使某致㣲誠于公若與某三川某當以死相助若不與某亦當有以相酬叔文怒將斬之韋執誼固執不可王鍔憲宗時為廣州刺史嶺南節度使鍔以兩税錢上供時進及供奉外餘皆自入西南大海中諸國舶至盡没其利由是鍔家財富於公藏日發十餘艇重以犀象珠貝稱商貨而出諸境周以歳時循環不絶凡八年京師權門多富鍔之財拜刑部尚書嚴綬為山南東道節度使元和十年十一月為太子少保初憲宗以綬在太原所發偏裨戰討多克故移袁滋於江陵置綬於袁州以臨呉元濟綬自帥師至境上無威筭以制敵到軍日遽發公藏賞士卒府藏之積悉以賂中貴人師徒凍餒閉壁而已後裴度屢言其無軍政故罷之鄭權自工部尚書由他徑求嶺南節度既到鎮則掊聚財貨用償恩力俾小吏部送京國分權倖軰運纔至而殂謝已聞當時議者無不嗤鄙王播為淮南節度使以錢十萬貫賂遺恩倖求鹽鐵使諌議大夫獨孤朗張仲方起居郎孔敏行柳公權起居舍人宋申錫補闕韋仁實劉敦儒拾遺李景讓薛廷老等十人前一日詣延英抗論其事帝不納一云敬宗寳厯元年以王播兼諸道鹽鐵轉運播之再領鹽鐵不由宰臣聞薦是非之論紛然滿朝諫議大夫獨孤朗等廷諍乆之帝竟不納李祐無材能以善官文宗時累遷至金吾將軍祐小將趙崟用詭譎通於中人祐因崟厚賂之授涇原節度使高霞寓為右衛大將軍穆宗長慶六年為檢校工部尚書兼邠州刺史御史大夫充邠寧等州節度觀察等使霞寓本騎將性輕悍無節制之材元和初隨高崇文有功於蜀遂累承寵奬及討呉元濟擢為唐鄧節度使挫敗䧏為歸州刺史霞寓廣行賂遺結納權倖左遷未乆已復進用及是拜諫官屢抗章疏帝竟不納後唐劉仲殷初為秦州節度使累年恃秦王親戚聚財箕歛剥䘮生民比户咨怨流涕又招聚甲馬意在犄角以應秦王然蜀人亦不敢窺邊及秦王誅大懼閔帝即位遣使存問賜與甚厚仲殷表辭鎮守詔至京師納政不允凡所蓄兵馬財貨貢奉殆盡遂留宿衛㑹朱馮用事朱馮𢎞昭也以秦府之隙日夕憂懼貢奉之餘秦州所存苞苴嘗行賂遺與韓昭嘗有舊末帝未至已潛結託帝方以大義咎朱馮而雪秦府韓昭昭嘗毎言仲殷之強幹故清泰元年自上將軍復為宋州節度使段凝初仕梁為鄭州刺史監大軍於河上末帝以戴思逺為北靣招討使行師不利用王彦章代之受任之翌日取徳勝之南城軍聲大振趙巖匿彦章功歸凝凝掎摭彦章之短以聞梁末帝怒罷彦章兵權凝納賄於趙張二族求為招討使敬翔李振極言不可竟不能止朱漢賔莊宗時為左龍武統軍明宗即位以漢賔幸前朝罷統軍為右衛上將軍時樞宻使安重誨方當委重漢賔宻令結託得為婚家天成末用為潞州昭義軍節度使晉趙彦之深州人也始為鎮州軍士㑹後唐莊宗圍王德明於常州彦之數請以強弩伏於東門外騎軍多不得進漸補至百人長城䧟莊宗收之麾下與秦王重榮俱為散騎指揮使意甚相善有軍中十昆仲之契天福初彦之為關西指揮使重榮已領鎮州彦之請告葬父母與重榮相見遂留鎮州重榮視政之暇畋獵飲博未嘗一日相捨周馮暉初仕晉為靈武節度使後入典禁兵兼領近鎮忿朝廷縻留亦悔離靈武及馮玉李彦韜用事暉善奉之未幾復以暉為朔方節度使加檢校太師忌害夫將帥之臣安危所寄專制師律總統和門故當竭節以奉上推誠而率下乃有乗多難之際竊戎車之柄跨據方靣志在自專憚幕府持嚴毅之節惡偏禆有威武之稱或強諫而忤意或正言而拂心舉吏法以中傷因師敗而歸罪致其奔亡之禍起於竊發之事盖王綱之不競天憲之未加然而覆宗絶嗣隨亦至矣後漢鄧隲為大將軍安帝永初中羗胡反亂殘破并凉隲以軍役方費欲棄凉州郎中虞詡説太尉李修以為不可脩善其言四府皆從詡議隲兄弟以詡異其議因此不平欲以吏法中傷詡後朝歌賊甯季等數千人攻殺長吏屯聚連年州郡不能禁乃以詡為朝歌長梁冀為大將軍時梁太后臨朝有日食地震之變詔公卿舉賢良方正光祿勲杜喬少府房植舉荀淑對䇿議刺貴倖為冀所忌補朗陵侯相郭閎為梁州刺史時上郡沈氏隴西牢姐烏吾諸種羌共寇并凉二州䕶羌校尉叚紀明將湟中義從討之閎貪共其功稽留紀明軍使不得進義從役乆戀鄉舊皆悉反叛閎歸罪於紀明紀明坐徵下獄輸作左校羌遂陸梁覆没營塢轉相招結唐突諸郡于是吏人守闕訟紀明以千數朝廷知紀明為閎所誣詔問其狀紀明但謝罪不敢言枉京師稱為長者董卓為前將軍朱雋拜城門校尉卓擅政以雋宿將外甚親納而心實忌之袁紹為冀州牧以臧洪領青州刺史洪收撫離叛百姓復安在事二年紹憚其能徙為東郡太守治東武陽又董昭為紹所用而昭弟訪在張邈軍中邈與紹有隙紹信讒將致罪於昭昭欲詣獻帝至河内為張揚所留因揚上還印綬拜騎都尉又呂布既歸袁紹紹與布擊張燕布摧鋒陷陣遂破燕軍而求益兵衆將士鈔掠紹患忌之布覺其意從紹求去紹恐還為己害遣壯士夜掩殺布不獲事露布走河西與張揚合紹令衆追之皆畏布莫敢逼近者又紹之南征也别駕田豐諫紹紹不從豐强諫紹怒甚以為沮衆械繫之紹軍既敗或謂豐曰君必見重豐曰若軍有利吾必全今軍敗吾必死矣紹還謂左右曰吾不用田豐言果為所笑遂殺之劉表為荆州刺史遣從事中郎韓嵩詣魏太祖以觀虛實嵩還深陳太祖威徳説表遣子入質表疑嵩為太祖説大怒欲殺嵩考從行者知無他意乃止表雖外貌儒雅而心多疑忌皆此類也劉備奔表表厚待之然不能用公孫瓉為幽州牧討胡無功劉虞代之虞至胡相率來降瓚害虞有功乃隂使人徼殺胡使胡知其情間行詣虞瓚後誣虞與袁紹等欲稱尊號斬虞於薊市瓚遂驕矜記過忘善多所賊害魏程喜為征北將軍屯薊時杜恕出為幽州刺史䕶烏九校尉尚書袁侃等戒恕曰程申伯處先帝之世傾田園讓于青州足下今俱仗節共屯一城宜深有以待之而恕不以為意至官未期有鮮卑大人兒不繇關塞徑將數十騎詣州州斬所從來小子一人無表言上喜於是劾奏恕下廷尉當死以父畿勤事水死免為庻人徙章武郡喜欲恕折節謝已諷司馬宋權示之以㣲意恕答權書曰貺示委曲奉法天下事以善意相待無不致快也以不善意相待無不致嫌隙也而議者言凡人天性皆不善不當待以善意更墮其網中僕得此軰便欲歸蹈滄海乗桴耳不能自諧在其間也然以年五十二不見廢弃頗亦遭明達君子亮其本心若不見亮使人刳心著地正與數斤肉相似何足有所明故終不自解説程征北功名著在僕前甚多有人出征北乎若令下官事無大小咨而後行則非上司彈紏之意若咨而不從又非上下相順之宜故推一心任一意直而行之耳殺胡之事天下謂之是邪是僕諧也呼為非邪僕自受之無所怨咎程征北明之亦善不明之亦善諸君子自共為其心耳不在僕言也喜於是遂深文劾恕陶謙為徐州牧安東將軍時孫策渡江居江都謙深忌策策舅呉景時為丹陽太守策乃載母徙曲阿與呂範孫河俱就景呉孫峻為大將軍文欽説峻征魏峻使欽與呂據車騎劉纂鎮南朱異前將軍唐咨自江都入淮泗以圖青徐峻與滕𦙍至石頭因餞之領從者百許人入據營據御軍齊整峻惡之稱心痛去晉梁王彤為征西大將軍周處為御史中丞𨽻夏侯駿西征氐人齊萬年處知彤不平必當陷己時賊屯梁山有衆七萬而駿逼處以五千兵擊之處曰軍無後繼必至覆敗雖在亡身為國取耻彤復命處進討乃與振威將軍盧播雍州刺史解系攻萬年於六陌將戰處軍人未食彤促令速進而絶其後繼處知必敗賦詩曰去去世事已策馬觀西戎藜藿甘梁黍期之克令終言畢而戰没麴允為安夷䕶軍始平太守時雒陽傾覆閻鼎等立秦王為皇太子於長安鼎總攝百揆允心害鼎功且規權勢因鼎殺京兆太守梁綜乃與綜弟馮翊太守緯等攻鼎走之張春為南陽王模世子保將先是模既為劉粲所害都尉陳安歸保命統精勇千餘人以討羌寵遇甚厚春等疾之譖安有異志請除之保不許春等輙伏刺客以刺安安被創馳還隴城遣使詣保貢獻不絶王敦為大將軍驕傲自負有罔上心其從弟稜日夕諌諍以為宜自抑損推崇盟主且羣從一門竝相與服事應務相崇高以隆勲業每言苦切敦不能容潛使人害之敦又素憚周顗每見顗輙靣熱雖復冬月扇靣手不得休又陶侃為寧逺將軍荆州刺史既破杜弢敦深忌侃功將還江陵欲詣敦别皇甫方回及朱伺等諌以為不可侃不從敦果留侃不遣左轉廣州刺史南越中郎將以王廙為荆州侃之佐吏將士詣敦請留侃敦怒不許侃將鄭攀蘇温馬儁等不欲南行遂西迎杜曽以拒廙敦意攀承侃風㫖被甲持矛將殺侃出而復回者數四侃正色曰使君之雄斷當裁天下何此不决乎因起入如厠諮議叅軍梅陶長史陳頒言于敦曰周訪與侃親姻如左右手安有斷人左手而右手不應者乎敦意遂解於是設盛饌以餞之侃便夜發敦引其子瞻為叅軍侃既達豫章見周訪流涕曰非卿外援我殆不免又周訪平杜曽進位安南將軍梁州刺史屯襄陽初敦懼杜曽之難謂訪曰擒曽當相論為荆州刺史及是而敦不用至王廙去職詔以訪為荆州敦以訪名將勲業隆重有疑色其從事中郎郭舒説敦曰鄙州雖遇㓂難荒弊實為用武之國若以假人將有尾大之患公冝自領訪為梁州足矣敦從之訪大怒敦手書譬釋并遺玉環玉椀以申厚意訪投椀於地曰吾豈賈竪可以寳悦乎隂欲圖之既在襄陽務農訓卒勤於採納守宰有缺輙補然後言上敦患之而憚其強不敢有異又周札為右將軍㑹稽内史札兄子筵為呉興内史札一門五侯竝居列位呉士貴盛莫與為比敦深忌之後筵䘮母送者千數敦益憚焉及敦疾錢鳳以周氏宗彊與沈充權勢相侔欲自託於充謀滅周氏使充得專威揚土乃說敦曰夫有國者患于彊逼自古釁難恒必繇之今江東之豪莫強周沈公萬世之後二族必不靜矣周彊而多俊才宜先為之所後嗣可安國家可保耳敦納之時有道士李脱者妖術惑衆自言八百歳故號李八百自中州至建鄴以鬼道療病又署人官位時人多信事之弟子李𢎞養徒灊山云應䜟當王故敦使廬江太守李恒告札及其諸兄子與脱謀圖不軌時筵為敦諮議叅軍即營中殺筵及脫𢎞又遣叅軍賀鸞就沈充盡掩殺札兄弟子既而進軍㑹稽襲札札先不知卒聞兵至率麾下數百人出拒之兵散見殺又温嶠為侍中機宻大謀皆所叅綜詔命文翰亦悉豫焉俄轉中書令嶠有棟梁之任帝親而倚之甚為敦所忌因請為左司馬敦阻兵不朝多行陵縱嶠諌敦曰昔周公之相成王勞謙吐握豈好勤而惡逸哉誠謂處大任者不可不爾而公自還輦轂入輔國政闕拜覲之禮簡人臣之儀不達聖心者莫不於邑昔帝舜服事唐堯伯禹竭身虞庭文王雖盛臣節不諐故有庇人之大德必有事君之小心俾芳烈奮乎百世休風流乎萬祀至聖遺軌所不宜忽願思舜禹文王服事之勤維公旦吐握之事則天下幸甚敦不納又庾亮為中領軍時敦有異志内深忌亮而外崇重之亮憂懼以疾去官殷浩為揚州刺史中軍將軍後秦姚襄既歸晉浩憚其威名乃遣人宻殺之不得浩又潜遣將軍魏憬率五千餘人襲襄乃斬憬而并其衆浩愈惡之乃使將軍劉啓守譙遷襄于梁國蠡臺表授梁國内史襄遣權翼詣浩浩曰姚平北每舉動自由豈所望也翼曰將軍輕納姦言自生疑貳愚謂猜嫌之由不在于彼浩曰姚君縱放小人盜竊吾馬王臣之體固若是乎翼曰將軍謂姚平北以威武自強終為難保校兵練衆將懲不恪取馬者欲以自衛耳浩曰何至是也浩遣謝萬討襄襄逆擊破之浩甚怒㑹聞關中有變浩率衆北伐襄乃要擊浩於山桑大敗之斬獲萬計收其資仗使兄益守山桑壘復如淮南浩遣劉啟王彬之伐山桑襄自淮南擊滅之鼔行濟淮屯于盱眙掠流人衆至七萬分置守宰勸課農桑遣使建鄴罪狀殷浩并自陳謝流人郭斁等千餘人執晉堂邑内史劉仕降于襄朝廷大震桓温鎮荆州頻請范汪為長史江州刺史皆不就温甚恨之汪子甯字武子少篤學多所通覽簡文帝為相將辟之為桓温所諷遂寢不行故終温之世兄弟無在列位者又中軍將軍殷浩北征許雒師次山桑而姚襄反士卒亡叛温素忌浩及聞其敗上䟽罪浩曰案中軍將軍浩過蒙朝恩叨竊非據寵靈超卓再司京輦不能恭慎所任恪居職次而侵官離局高下在心前司徒臣謨執義履素位居台輔師傅先帝朝之元老年登七十以禮請退雖臨軒固辭不順恩㫖適足以明遜讓之風𢎞優賢之禮而浩虛生狡説疑誤朝聽獄之有司將致大辟自羯胡天亡羣㐫殄滅而百姓塗炭企延拯綏浩受專征之重無雪耻之志坐自封植妄生風塵遂使寇讎稽誅姦逆并起華夏鼎沸黎元殄悴浩懼罪將及不容于朝外聲進討内求茍免出次壽陽損甲彌年傾天府之資竭五州之力收合無賴以自强衛爵命無章猜害㒺顧故范豐之屬反叛於芍陂竒徳龍㑹作變于肘腋羌帥姚襄率衆歸化遣其母弟入質京邑浩不能撫而用之隂圖殺害再遣刺客為襄所覺襄遂惶懼用致逆命生長亂階自浩始也復不能以時掃滅縱放小豎鼓行毒害身狼狽於山桑軍破碎于梁國舟車焚燒輜重覆没三軍積實反以資寇精甲利器更為賊用神怒人怨衆之所棄傾危之憂將及社稷臣所以忘寢屏營啟處無地夫率正顯義所以致訓明罰敇法所以齊衆伏願陛下上追唐堯放命之刑下鑒春秋無君之典若聖上含洪未忍誅殛且宜遐棄擯之荒裔雖未足以塞山海之責粗可以宣誡於將來矣竟坐廢為庻人徙於東陽之信安縣前趙趙染為平西將軍時劉曜為大司馬次渭汭染次新豐索綝自長安東討染染狃于累㨗有輕綝之色長史魯徽曰今司馬氏君臣自以逼僣王畿雄劣不同必致死距我將軍宜整陣按兵以擊之弗可輕也困獸猶鬬况于國乎染曰以司馬模之強吾取之如拉朽索綝小豎豈敢汚吾馬蹄刀刄邪要擒之而後食晨率精騎數百馳出逆之戰于城西敗績而歸悔曰吾不用魯徽之言以至於此何靣目見之於是斬徽徽臨刑謂染曰將軍愎諌違謀戅而取敗而復忌前害勝誅戮忠良以逞愚忿亦何顔靣瞬息世間哉袁紹為之於前將軍踵之於後覆亡敗䘮亦當相尋所恨不得一見大司馬而死死者無知則己若其有知下見田豐為徒要當訴將軍於黃泉使將軍不得復牀枕而死叱刑者曰令吾靣向東大司馬曜聞之曰蹄涔不容尺鯉染之謂也宋朱齡石為益州刺史時譙縱叛亂自稱成都王既奔敗其尚書令馬耽封府庫以待王師及齡石入成都誅縱同祖之親縱自縊齡石徙馬耽於越巂追殺之耽之徙也謂其徒曰朱侯不送我京師滅衆口也吾必不免乃盥洗而卧引繩而死須㬰齡石使至遂戮尸焉劉道隆為右將軍時蔡興宗為荆州刺史道隆專統禁兵任叅内政以興宗強正不欲使擁兵上流改為中書監左光祿大夫開府儀同三司固辭不拜梁蕭穎達為江州刺史長史沈瑀性倔強每忤穎達穎達銜之天監八年因入諮事辭又激厲頴達作色曰朝廷用君作行事邪瑀出謂人曰我死而後已終不能傾側靣從是日於路為人所殺時年五十九多以為穎逹害焉子續累訟之遇頴達亦尋卒事遂不窮竟唐淮安王神通擊宇文化及於魏縣化及走聊城神通進至聊城㑹化及糧盡偽䧏遷延以俟外救既而士及自濟北饋之化及軍稍振遂拒戰神通督兵内薄而擊之貝州刺史趙君徳攀堞而上神通心害君德之功因止軍不戰君徳大詬而退王志𤣥為安東副都䕶劉正臣為平盧軍使天寳末與志𤣥同拒祿山遥相應援正臣領兵自平盧来襲范陽未至為逆賊將史思明等大敗之正臣奔歸為志𤣥所配而卒大厯九年追贈正臣工部尚書馬璘為涇原四鎮北庭節度時李晟為都知兵馬使璘戰吐蕃兵敗晟㧞璘出亂兵之中璘忌晟威名又遇之不以禮令朝京師代宗知之留宿衛為右神策都尉李説為河東節度使徳宗貞元中李景畧為豐州刺史甚有威名廻紇使至皆坐拜之于庭中後為説行軍司馬居疑帥之地勢已難處廻紇使梅録將軍入朝説置宴㑹梅録爭上下坐説不能遏景畧叱之梅録前過豐州都邑識景畧語音疾趨前拜曰非豐州李端公耶不意在此不拜麾下乆矣何其瘠也又再拜遂命之居次坐時將吏賓客顧景略皆加嚴憚説心不平厚賂中尉竇文塲將去景畧使為内應歳餘風言廻紇將南下隂山豐州宜得人文塲言景畧堪為邊任乃以景略為豐州刺史韓遊瓌為邠寧節度時范希朝為邠寧都虞候德宗幸奉天希朝戰守有功累加兼中丞為寧州刺史遊瓌入覲自奉天歸邠州以希朝素整肅有聲畏其逼己求其過將殺之希朝懼奔鳳翔德宗聞之趣召至京師寘於左神策軍中盧從史為昭義軍節度使辟孔戡為書記戡數以事爭論不從因謝病歸雒從史強以禮遣而隂衘之居東都乆之為淮南節度使李吉甫所辟而從史忿嫉累請貶降憲宗不得已授衛尉丞分司雒陽劉士寧鎮汴州其大將李萬榮與其父𤣥佐同里閈少相善寛厚得衆心士寧疑之去其兵權令攝汴州事萬榮深怨之王智興鎮徐州石雄為右廂捉生兵馬使討滄州李同㨗徐人伏雄之撫待惡智興之虐欲逐之而立雄智興以軍在賊境懼其變生因雄立功請授一郡刺史朝廷徵赴京師授壁州刺史智興尋殺雄之素相善諸將士百餘人仍奏雄揺動軍情請行顯戮文宗雅知其能惜之乃長流白州梁賀環為滑州節度使北靣招討使時兩京馬軍都軍使許州節度使謝彦章為排陣使同領大將駐於行臺寨與晉人對壘彦章時領騎軍與之挑戰晉人或望我軍行陣整肅則相謂曰必兩京太傅在此也不敢以名呼其為敵人所憚如此是時咸謂賀環能將歩軍彦章能領騎士既名聲相軋故環𠂻心忌之一日與環同設伏於郊外環指一方地謂彦章曰此地崗阜隆起中央坦夷好列柵之所尋而晉人舍之故環疑彦章與晉人通又環欲速戰彦章欲持重以老敵人環益疑之㑹為行營馬步軍都虞侯朱珪所誣環遂與珪協謀因享士伏甲以殺彦章及濮州刺史孟審澄别將侯温裕等於軍以謀叛聞晉王聞之喜曰彼將帥如是亡無日矣尹皓為華州節度使末帝貞明六年河東道招討使劉鄩與皓攻取同州先是河東朱友謙襲取同州以其子令徳為留後表請旄鉞末帝怒命鄩討之晉將李嗣昭率師來援戰于城下王師不利先是鄩與河中朱友珪為婚家及王師西討行次陜州鄩遣使齎檄諭友謙以禍福大計誘令歸國友謙不從如是停留月餘尹皓叚凝軰素忌鄩遂搆其罪言鄩逗遛養㓂俾候援兵末帝以為然及兵敗詔河南尹張宗奭承朝廷宻㫖逼令飲酖而卒後唐高行珪為安州節度使事多不遵法制副使范廷策者幽州人也性剛直覩其貪猥因强諫之行珪不從後廷策因入奏獻封章於闕下事有三條一請不禁過淮猪羊而禁絲緜匹帛以實中國一請于山林要害置軍鎮以絶寇盗一述藩侯之弊請敕從事明諫諍之不從令諸軍校列班廷諍行珪聞之深衘之後因戍兵作亂誣奏廷策與之同謀父子俱戮於汴聞者寃之西方鄴為䕫州節度使為政貪虐判官譚善達每諫其失鄴忿之令左右告善達受人金下獄拷掠死於獄中漢王繼𢎞為神徳軍節度使節度判官張易每見繼𢎞所為不法必切言之繼𢎞含怒以為輕已乾祐中因事誣奏之又奏觀察推官張制削官牒逐之因以郭謹代竟令害制焉冊府元龜卷四百四十
