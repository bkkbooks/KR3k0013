body:
  text: 册府元龜卷九百四十八宋王欽若等撰總録部逃難語曰賢者避世易曰君子見機葢天歩既艱刑網方密或顯斥於權要或公辨於邪謟私憾方逞大戮將至是以變易姓名毁壞形貌詭道以出間行而去投跡於絶域濯纓於洪波以至隱迹窮山之中潛身複壁之下屬辭悽愴拊心涕洟生民之窮良可哀也若乃負過越逸背國奔亡節行無聞逋迯是保紀于著事罪莫大焉尸子名佼秦相衛鞅客也衛鞅商君謀事畫計立法理民未嘗不與佼規鞅被刑佼恐并誅乃亡逃入蜀魏齊為魏相范睢從須賈使齊既歸以為睢持魏國隂事告齊以告魏齊魏齊大怒使舍人笞撃睢折脅摺齒睢佯死即卷以簀置厠中賔客飲者醉更溺睢故僇辱以懲後令無妄言者睢從簀中謂守者曰公能出我我必厚謝公守者乃請出棄簀中死人魏齊醉曰可矣范睢得出後范睢更姓名張禄范睢既相秦須賈使秦睢數曰為我告魏王急持魏齊頭來不然者我且屠大梁須賈歸以告魏齊魏齊恐亡走趙匿平原君所秦昭王聞魏齊在平原君所欲為范睢必報其仇乃佯為好書遺平原君曰寡人聞君之高義願與君為布衣之友君幸過寡人寡人願與君為十日之飲平原君畏秦且以為然而入秦見昭王昭王與平原君飲數日昭王謂平原君曰昔周文王得吕尚以為太公齊桓公得管夷吾以為仲父今范君亦寡人之叔父也范君之仇在君之家願使人歸取其頭來不然吾不出君於闗平原君曰貴而為友者為賤也富而為交者為貧也夫魏齊者勝之友也在固不出也今又不在臣所昭王乃遺趙王書曰王之弟在秦范君之仇魏齊在平原君之家王使人殺齊持其頭來不然吾舉兵而伐趙又不出王之弟於闗趙孝成王乃發卒圍平原君家急魏齊夜亡出見趙相虞卿虞卿度趙王終不可說乃解其相印與魏齊亡間行念諸侯莫可以急抵者乃復走梁欲因信陵君以走楚信陵君聞之畏秦猶豫未敢見曰虞卿何如人也時侯嬴在旁曰人固未易知知人亦未易也夫虞卿躡屩擔簦一見趙王賜白璧一䨇黄金百鎰再見拜為上卿三見卒受相印封萬戸侯當此之時天下爭知之夫魏齊窮困過虞卿虞卿不敢重爵禄之尊解相印捐萬戸侯而間行急士之窮而歸公子公子曰何如人人固不易知知人亦未易也信陵君大慙駕如野迎之魏齊聞信陵君之初難見之怒而自剄趙王聞之卒取其頭予秦秦昭王乃出平原君歸趙高漸離燕人也初荆軻與漸離飲於燕市酒酣徃徃漸離撃筑荆軻和而歌於市中後軻刺秦王不中漸離變名姓為人庸保匿依於宋子乆之作苦聞其家堂上客擊筑傍徨不能去每出言曰彼有善有不善從者以告其主曰彼庸乃知音竊言是非家主人召使前擊筑一坐稱善賜酒而高漸離念乆隱畏約無窮時乃退出其裝匣中筑與其善衣更容貌而前舉坐客皆驚下與抗禮以為上客使撃筑而歌客無不流涕而去者宋子傳客之漢陳平封曲逆侯初項羽畧地至河上平歸之從入破秦賜爵卿項羽之東王彭城也漢王還定三秦而東殷王反楚項羽廼以平為都尉賜金二十鎰居無何漢攻下殷項王怒將誅定殷者平懼誅廼封其金與印使使歸項王而間行歸漢後漢申屠剛仕郡功曹平帝時對策言王莽隔絶平帝外家馮衛二族為非莽令元后下詔罷剛歸田里後莽簒位剛遂避地河西轉入巴蜀徃來二十許年郅惲汝南西平人也明天文厯數王莽簒位惲知漢必再受命西至長安上書言之莽大怒繋詔獄㑹赦得出乃與同郡鄭敬南遁蒼梧後為長沙太守馬援兄貟為王莽增山連率莽敗與援俱去郡避地凉州光武即位貟始詣雒陽王隆馮翊人王莽簒位以父任為郎後避難河西為竇融左䕶軍許楊為酒泉都尉王莽簒位楊乃變姓名為巫醫迯匿它界莽敗方還鄉里劉昆陳留東昏人教授弟子嘗五百餘人王莽以昆多聚徒衆乃繫昆及家屬於外黄獄莽敗得免既而天下大亂昆避難河南負犢山中建武五年舉孝廉不行遂逃教授於江陵光武聞之即除為江陵令班彪性沈重好古年二十餘更始敗三輔大亂時隗囂擁衆天水彪乃避難從之彪既疾囂言著王命論以為漢德承堯有靈命之符王者興祚非詐力所致欲以感寤隗囂而囂終不寤遂避地河西後舉茂材至徐令劉宣字子高安衆侯崇之從弟知王莽簒乃變名姓抱經書隱避林藪承宫瑯琊姑幕人經典既明乃歸家教授遭天下䘮亂遂將諸生避地漢中後至侍中祭酒竇章安帝永初中三輔遭羗冦避難東國家於外黄居貧蓬戸蔬食躬勤孝養然講讀不輟後至大鴻臚杜根為郎鄧太后臨朝根以安帝年長宜親政事乃與同時郎上書直諫太后大怒執根等令於殿下撲殺之載出城外根得蘇因逃竄為宜城山中酒家保積十五年酒家知其賢厚敬待之及鄧氏誅左右皆言根之忠帝謂根已死乃下詔布告天下録其子孫根方歸鄉里劉矩沛人為尚書令性亮直失大將軍梁冀意以疾去官時冀妻兄孫祉為沛相矩懼為所害不敢還鄉里乃正補從事中郎荀爽桓帝時為郎中後遭黨錮隱於海上又南遁漢濵十餘年以著述為事遂稱為碩儒夏馥陳留圉人也桓帝初舉直言不就馥雖不交時宦然以聲名為中官所憚遂與范滂張儉等俱被誣䧟詔下州郡捕為黨魁及儉等亡命經歴之處皆被收考辭所連引布徧天下馥乃頓足而嘆曰孽自巳作空汙良善一人逃死禍及萬家何以生為乃自翦鬚變形入林慮山中隱匿姓名為冶家傭親突煙炭形貌毁瘁積二三年人無知者後馥弟靜乗車馬載縑帛追之於湼陽市中遇馥不識聞其言聲乃覺而拜之馥避不與語靜追至客舍共宿夜中密呼靜曰吾以守道疾惡故為權宦所䧟且念茍全以庇性命弟奈何載物相求是以禍見追也明旦别去黨禁未解而卒范滂汝南人少厲清節為鄉里所服太守宗資署為功曹委任政事坐誣鈎黨繫黄門北寺獄後事釋南歸始發亰師汝南南陽士大夫迎者車數千兩同囚鄉人殷陶黄穆亦免俱歸並衛侍於滂應對賓客滂顧謂陶等曰今子相隨是重吾禍也遂遁還鄉里王允為豫州刺史發中常侍張讓姦狀讓懷挾忿怨以事中允檻車徵以减死論是冬大赦而允獨不在宥三公咸復為言至明年乃得解釋是時宦者横暴睚眦觸死允懼不免乃變易名姓轉側河内陳留間王烈察孝廉三府並辟皆不就遭黄巾董卓之亂乃避地遼東夷人尊奉之范冉陳留外黄人桓帝時以冉為萊蕪長遭母憂不到官後遭黨人禁錮遂推鹿車載妻子捃拾自資或寓息客廬或依宿樹䕃如此十餘年乃結草室而居焉李爕字德公太尉固之子也初固既策罷知不免禍乃遣三子歸鄉里爕時年十三姊文姬為同郡趙伯英妻賢而有智見二兄歸具知事本黙然獨悲曰李氏滅矣自太公已來積德累仁何以遇此密與二兄謀豫藏匿爕託言還亰師人咸信之有頃難作下郡收固三子二兄受害文姬乃告父門生王成曰君執義先公有古人之節今委君以六尺之孤李氏存滅其在君矣成感其義乃將爕乗江東下入徐州界内令變姓名為酒家傭遇赦還鄉里後為亰兆尹盧植涿郡人為尚書㑹董卓議欲廢立植抗議不同卓怒免植官因以老病求歸懼不免禍乃詭道從轘轅出卓果使人追之到懷不及遂隱於山谷不交人事趙歧為皮氏長棄官西歸亰兆尹延篤復以為功曹先是中常侍唐衡兄玹為亰兆虎牙都尉郡人以玹進不繇德皆輕侮之歧及從兄襲又數為貶議玹深毒恨桓帝延熹元年玹為亰兆尹歧懼禍及乃與從子戬逃避玹果收家屬宗親䧟以重法盡殺之歧遂逃難四方江淮海岱靡所不歴自匿姓名賣餅北市中時安邱孫嵩年二十餘遊市見歧察非常人停車呼與共載歧懼失色嵩乃下帷令騎屏行人密問歧曰視子非賣餅者又相問而色動不有重怨即亡命乎我北海孫賓石闔門百口勢能相濟歧素聞嵩名即以實告之遂以俱歸嵩先入白母曰出行乃得死友迎入上堂饗之極歡藏歧複壁中數年歧作戹屯歌二十三章後諸唐死滅因赦乃出鄭𤣥被公卿舉為趙相道斷不至㑹黄巾冦青部乃避地徐州徐州牧陶謙接以師友之禮袁忠為沛相天下大亂忠棄官客㑹稽上虞見太守王朗徒從整餙心嫌之遂稱病自絶韓嵩初與同好數人隱居於酈西山中黄巾起嵩避難南方許邵汝南人初為郡功曹避地投揚州刺史劉繇於曲阿及孫策平呉邵與繇南奔豫章而卒李敏遼東人為河内太守罷歸時遼東太守公孫度有逆謀敏居郡中惡度所為恐為所害乃將家屬入於海度大怒掘其父冡剖棺焚屍誅其宗族魏崔琰年二十九就鄭𤣥受學學未朞徐州黄巾賊攻破北海𤣥與門人到不其山避難時榖糴縣乏𤣥罷謝諸生琰既受遣而冦賊充斥西道不通於是周旋青徐兖豫之郊東下夀春南望江湖自去家四年乃歸以琴書自娯後至侍中管寧與邴原相友時天下大亂聞公孫度令行於海外遂與原及平原王烈等至於遼東度虗舘以候之既徃見度乃廬於山谷時避難者多居郡南而寧居北示無遷志後漸來從之太祖為司空辟寧度子康絶命不宣國淵字子尼師事鄭𤣥後與邴原管寧等避亂遼東既還舊土太祖辟為司空掾邴原字根矩北海朱虗人也孔融在郡以原為計佐是時漢朝陵遲政以賄成原乃將家入欝洲山中郡舉有道融書喻原曰修性保眞清虗守高危邦不入乆潛樂土王室多難西遷鎬亰聖朝勞謙疇咨雋乂我徂求定策命懇惻國之將隕婺不恤緯家之將亡緹縈䟦渉彼匹婦也猶執此義實望根矩仁為己任授手援溺振民於難乃或晏晏自居莫我肯顧謂之君子固如此乎根矩可以來矣原遂到遼東後原歸鄉里止於三山孔融遺書曰隨㑹在秦賈季在翟諮仰靡所歎息增懷傾知來至近在三山詩不云乎來歸自鎬我行永乆今遣五官掾奉問榜人舟楫之勞禍福動靜告慰亂階未已阻兵之雄若棊奕爭梟原於是遂復反還積十餘年後乃遁還南行已數日而度甫覺度知原之不可復追也因曰邴君所謂雲中白鶴非鶉鷃之網所羅矣又吾自遣之勿復求也遂免危難後至五官長史鄭袤父泰為董卓將軍統諸軍擊闗東或謂董卓曰鄭泰智略過人而詰謀山東今資之士馬使就其黨竊為明公懼之卓收其兵馬留拜議郎後又與王允謀共誅卓泰脫身自武闗走東歸後將軍袁術以為楊州刺史未至官道卒其弟渾乃將袤避難淮南袁術賓禮甚厚渾知術必敗時華歆為豫章太守素與泰善渾乃渡江投歆太祖聞其篤行召為掾司馬朗河内温人董卓遷天子都長安朗知卓必亡恐見留朗散財物以賄遺卓用事者求歸鄉里到謂父老曰董卓悖逆為天下所讐此忠臣義士奮發之時也郡與亰都境壌相接雒東有成臯北界大河天下興義兵者若未得進其勢必停於此此乃四分五裂戰爭之地難以自安不如及道路尚通舉宗東到黎陽有營邱趙威孫鄉里舊婚為監營謁者統兵馬足以為主若後有變徐復觀望未晚也父老戀舊莫有從者惟同縣趙咨將家屬俱與朗徃焉後數月闗東諸州郡起兵衆數十萬皆集榮陽及河内諸將不能相一縱兵鈔略民人死者且半後至兖州刺史袁徽以儒素稱遭天下亂避難交州司徒辟不至陳群舉茂才除柘令不行隨父紀避難徐州韓暨舉孝㢘司空辟皆不就乃變名姓隱居避難魯陽山中山民合黨欲行冦掠暨散家財以供牛酒請其渠帥為陳安危山民化之終不為害楊俊以兵亂方起而河内處四達之衢必為戰塲乃扶持老弱詣亰密山間同行者百餘家俊振濟貧乏通共有無宗族知故為人所略作奴僕者凡六家俊皆傾財贖之後至南陽太守劉廙兄望之為劉表所害廙懼奔楊州道路為牋謝表曰考匊過蒙分遇榮授之顯未有管狐桓文之烈孤德隕命精誠不遂兄望之見禮在昔既無堂構昭前之績中規不密用墜禍辟斯乃明神弗祐天降之災悔吝之負哀號靡及廙之愚淺言行多違懼有浸潤三至之間考匊之愛已衰望之之責猶存必傷天慈既徃之分門戸殪滅取笑明哲是用迸竄永渉川路即日到廬江尋陽昔鍾儀有南音之操椒舉有班荆之思雖逺猶邇敢忘前施後至侍中王凌字彦雲叔父允為漢司徒誅董卓卓將李傕郭氾等為卓報仇入長安殺允盡害其家凌及兄晨時年皆少踰城得脫亡命歸鄉里凌舉孝㢘為發干長後至太尉蜀謝堅字文固少有美名辟公府為黄門侍郎獻帝之初三輔饑亂堅去官與弟援南入蜀依劉璋孟光字孝裕靈帝末為講部吏獻帝遷都長安遂迯入蜀劉焉父子待以客禮後至大司農來敏字敬逹漢末大亂姊夫黄琬是劉璋祖母之姪璋遣迎琬妻敏遂俱與姊入蜀常為璋賓客後至光禄大夫許靖漢末補御史中丞董卓秉政與吏部尚書周毖共進退天下士以尚書韓馥為冀州牧後卓斬毖靖懼誅奔孔伷伷卒依楊州刺史陳禕禕死呉郡都尉許貢㑹稽太守王朗素與靖有舊故徃保焉靖收恤親里經紀振贍出於仁厚孫策東渡江皆走交州以避其難靖身坐岸邊先載附從疎親悉發乃從後去當時見者莫不歎息靖在交州與曹公書曰世路戎夷禍亂遂令駑怯偷生自竄蠻貊成闊十年吉凶禮廢昔在㑹稽得所貽書辭㫖欵密乆要不忘迫於袁術方命圯族扇動群逆津塗四塞雖縣心北風欲行靡繇正禮師退術兵前進㑹稽傾覆景興失據三江五湖皆為虜庭臨時困厄無所控告便與袁沛鄧子孝等浮渉滄海南至交州經歴東甌閩越之國行經萬里不見漢地漂薄風波絶粮茹草饑殍薦臻死者大半既濟南海與領守兒孝德相見知足下忠義奮發整飭元戎西迎大駕廵省中嶽承此休問且悲且喜即與袁沛及徐元賢復共嚴裝欲北上荆州㑹蒼梧諸縣夷越䗬起州府傾覆道路阻絶元賢被害老弱並殺靖尋循渚岸五千餘里復遇疾癘伯母隕命并及群從自諸妻子一時略盡復相扶持前到北郡計為兵害及病亡者十遺一二生民艱苦之甚豈可具陳哉後至司徒呉劉繇辟司空掾除侍御史不就避亂淮浦後至楊州刺史薛綜字敬文少依族人避地交州從劉熈學後至太子少傅徴崇本姓李遭亂更姓遂隱於㑹稽躬耕以求其志歩隲世亂避難江東單身窮困與廣陵衛旌同年相善俱以種𤓰自給後至丞相魯肅少有壯節好為竒計後雄傑並起中州擾亂肅乃命其屬曰中國失綱冦賊横暴淮泗間非遺種之地吾聞江東沃野萬里民富兵彊可以避害寧肯相隨俱至樂土以觀時變乎其屬皆從命乃使細弱在前彊壯在後男女三百餘人州追騎至肅等徐行勒兵持滿謂之曰卿等丈夫當解大數今日天下兵亂有功弗賞不追無罰何為相偪乎又自植盾引弓射之矢皆洞貫騎既嘉肅言且度不能制乃相率還肅渡江徃見孫策焉後至横江將軍吕岱字定公廣陵海陵人為郡縣吏避亂南渡孫權統事岱詣幕府後至大司馬陸遜少孤隨從祖廬江太守康在官袁術與康有隙將攻康康遣遜及親戚還呉遜年長於康子績數歲為之綱紀門戸後至丞相趙逹少從漢侍中單甫受學用思精密謂東南有王者氣可以避難故脫身渡江高岱字孔文呉郡人太守盛憲以為上計舉孝㢘許貢來領郡岱將憲避難於許昭家求救於陶謙謙未即救岱憔悴泣血水醬不入口謙感其忠壯有申包胥之義許為出軍以書與貢岱得謙書以還而貢已囚其母呉人大小皆為危竦以貢宿忿徃必見害岱言在君且母在牢獄期於當徃若得入見則事自當解遂通書自白貢即與相見才辭敏㨗好自陳謝貢登時出其母岱將見貢語友人張允沈睧令豫具船以貢必悔當追逐之出便將母乗船易道而迯貢須臾遣人追之令追若及於船江上便殺之已過則止使與岱錯道遂免被誅時年三十餘晉庾衮明穆皇后伯父也鄉黨薦之州郡交命皆不降志及齊王冏歸於亰師踰年不朝曰晉室卑矣冦難方興乃擕其妻子適林慮山事其新鄉如其故鄉言忠信行篤敬比及朞年而林慮之人歸之咸曰庾賢及石勒攻林慮父老謀曰此有大頭山九州之絶險也上有古人遺迹可共保之惠帝遷于長安衮乃相與登于大頭山而田於其下年糓未熟食木實餌石蘂同保安之有終焉之志顧榮為成都王頴丞相從事中郎惠帝幸臨漳以榮兼侍中遣行園陵㑹張方據雒不復得進避之陳留及帝西遷長安徵為散騎常侍以世亂不應遂遷呉又徵拜侍中行至於彭城見禍難方作遂輕舟而還紀瞻與顧榮俱徵為尚書郎至滁州聞亂日甚將不行㑹刺史裴盾得東海王越書若榮等顧望以軍禮發遣乃與榮及陸玩等各解船棄車牛一日一夜行三百里得還楊州裴楷為侍中坐楊駿􅊚親去官太保衛瓘太宰亮稱楷貞正不阿附宜蒙爵土乃封臨海侯食邑二千戸代楚王瑋為北軍中候加散騎常侍瑋怨瓘亮斥己任楷楷聞之不敢拜轉為尚書楷長子輿先娶亮女女適衛瓘子楷慮内難未已求出外鎭除安南將軍假節都督荆州諸軍事垂當發而瑋果矯詔誅亮瓘瑋以楷前奪已中候又與亮瓘婚親密遣討楷楷素知瑋有望於巳聞有變單車入城匿于妻父王渾家與亮小子一夜八徙故得免難衛玠為太子洗馬兄璪為散騎侍郎玠以天下大亂欲移家南行母曰我不能舍仲寳去也玠啓諭深至為門戸大計母泣涕從之臨别玠謂兄曰在三之義人之所重今可謂致身之日兄其免之乃扶輿母轉至江夏郗鑒以世亂歸鄉里於時所在飢荒時中州之士素有感其恩義者相與資贍鑒復分所得以賉宗族及鄉曲孤老頼而全濟者甚多咸相謂曰今天子播越中原無伯常歸依仁德可以後亡遂共推鑒為主與千餘家俱避難於魯之嶧山後至太尉鄧攸初䧟石勒後逃勒至新鄭投李矩三年將去而矩不聽荀組以為陳郡汝南太守愍帝徵為尚書左丞長水校尉皆不果就後密捨矩去投荀組於許昌矩深恨焉乆之乃送家屬還攸攸與刁協周顗素厚遂至江東後至尚書僕射謝鯤為東海王越叅軍事鯤以時方多故乃謝疾去職避地于豫章後至豫章太守袁瓌字山甫永嘉末興弟猷欲奉母避亂求為江淮間縣拜吕令轉江都因南渡元帝以為丹陽令髙瞻渤海蓨人為尚書郎屬永嘉之亂還鄉里乃與父老議曰今皇綱不振兵革雲擾此郡沃壤憑固河海若兵荒歲儉必為冦庭非謂圖安之所王彭祖先在幽薊據燕代之資兵強國富可以託也諸君以為何如衆咸善之乃與叔父隱率數千家北徙幽州既而以王浚政令無常乃依崔如遼東徐邈東莞姑幕人為州治中屬永嘉之亂遂與鄉人臧琨等率弟子并閭里士庻千餘家南渡江家于亰口後至驍騎將軍褚翜為冠軍避地幽州後河北有冦難復還鄉里河南尹舉翜行本縣事及天下鼎沸翜招合同志將圖過江先移住陽城界潁川庾敳即翜之舅也亦憂世亂以家付翜翜道斷不得前東海王越以為叅軍辭疾不就孔愉㑹稽人避亂入新安山中改姓孫氏以稼穡讀書為務信著鄰里後忽捨去皆謂為神人而為之立祠永嘉中元帝始以安東將軍鎭揚土命愉為叅軍并族尋求莫知所在建興初始出應召為丞相掾年已五十矣毛德祖父祖並没于賊中德祖兄弟五人擕母南渡皆有武幹荆州刺史劉道規以德祖為建武將軍始平太守孫盛字安國太原中都人父恂潁川太守恂在郡遇賊被害盛年十歲逃難渡江及長博學善屬文後至秘書監給事中宋謝方明隨伯父邈為呉興太守孫恩之亂方明逃遁獲免頃之孫恩重侵㑹稽謝琰見害恩購求方明甚急方明於上虞以母妹奔東陽繇黄蘖嶠出鄱陽附載還都寄居國子學流離險厄屯苦備經而貞立之操在約無改沈懷文為治書侍御史元兇劭弑立以為中書侍郎世祖入討劭呼之使作符檄懷文固辭邵大怒投筆於地曰當今艱難卿欲避事邪㫖色甚切値殷冲在側申救得免託疾落馬間行奔新亭後至征虜長史廣陵守劉之遴梁南陽人為度支尚書太常卿時侯景以蕭正德為帝之遴時落景所將使授璽紱之遴預知乃剃髮披法服乃免先是平昌伏挺出家之遴為詩嘲之曰傳聞伏不闘化為支道林及之遴遇亂遂披法服時人笑之尋避難還鄉庾肩吾為太子中庶子太清中侯景䧟亰都簡文以肩吾為度支尚書時上流蕃鎭並據州拒景景矯詔遣肩吾使江州喻當陽公大心大心尋舉州降賊肩吾因逃入建昌界乆之方得赴江陵未㡬卒蕭子雲為侍中國子祭酒領南徐州大中正太清二年侯景冦逼子雲逃民間三年三月官城失守東奔晋陵餒卒于顯靈寺僧房江總為太子中舍人侯景冦亰都詔以總權兼太常卿守小廟臺城䧟總避難崎嶇累年至㑹稽郡憇於龍華寺乃製修心賦略序時事總第九舅蕭勃先據廣州總又自㑹稽徃依焉梁元帝平侯景徵為明威將軍始興内史以郡秩米八千斛給總行裝㑹江陵䧟遂不行總自此寓嶺南積歲天嘉四年以中書侍郎徵還朝陳蕭引為西昌侯儀同府主簿侯景之亂元帝為荆州刺史朝士多徃歸之引曰諸王力爭禍患方始今日逃難未是擇君之秋吾家再世為始興郡遺愛在民正可南行以存家門爾於是與弟彤及宗親等百餘人奔嶺表張正見為彭澤令屬梁季䘮亂避地於正俗山時焦僧度擁衆自保遣使請交正見懼之遜辭延納然以法自持僧度亦雅相敬憚册府元龜卷九百四十八
