body:
  text: 册府元龜卷七百四十三宋王欽若等撰陪臣部規諷第四孔子為魯大夫定公問君使臣臣事君如之何定公君臣失禮公患之故問孔子對曰君使臣以禮臣事君以忠定公又問一言而可以興邦有諸孔子對曰言不可以若是其幾也以其大要一言不能即興國㡬近也有近一言可以興國人之言曰為君難為臣不易如知為君之難也不㡬乎一言而興邦乎事不可以一言而成如知此則可近也曰一言而䘮邦有諸孔子對曰言不可以若是其幾也人之言曰予無樂乎為君唯其言而莫予違也言無樂于為君所樂者惟樂其言而不見違如其善而莫之違也不亦善乎如不善而莫之違也不幾乎一言而䘮邦乎人君所言善無違之者則善也所言不善而無敢違之者則近一言而䘮國顔淵魯人侍魯定公于臺東野畢御馬于臺下定公曰善哉東野畢之御顔淵曰善則善矣然其馬將佚定公不悅以告左右曰吾聞君子不讒人君子亦讒人乎顔淵不悅歴階而去須臾馬敗聞矣定公躐席而起曰趣駕請顔淵顔淵至定公曰向寡人曰善哉東野畢御也吾子曰善則善矣雖然其馬將佚矣不識吾子何以知之也顔淵曰臣以政知之昔舜工於使人造父工於使馬舜不窮其民造父不盡其馬是以舜無佚民造父無佚馬也今東野畢之御也上車執轡御體正矣周旋歩驟朝禮畢矣歴險致遠而馬力殫矣然求不已是以知其佚也定公曰善可少進與顔淵曰獸窮則觸鳥窮則啄人窮則詐自古及今未見有窮其下而能無危者也詩曰執轡如組兩驂如舞善御之謂也定公曰善哉寡人之過也有若為魯季氏宰哀公問於有若曰年饑用不足如之何有若對曰盍徹乎盍何不也周法什一而稅謂之徹徹通也為天下之通法曰二吾猶不足如之何其徹也二謂什二而稅對曰百姓足君孰與不足百姓不足君孰與足孰誰也范蠡為越大夫越王句踐即位三年而欲伐吳范蠡進諫曰夫國家之事有持盈持守盈滿有定傾定安傾危有節事節制王曰為三者奈何范蠡對曰持盈者與天與天法天也天道盈而不溢盛而不驕定傾者與人與人取人之心也人道好謙傾危之中當卑辭尊禮玩好女樂尊之以名也節事者與地與地法地時不至不可强生事不䆒不可强成之屬王不問蠡不敢言天道盈而不溢陽盛則損月滿則虧盛而不驕盛元氣廣大時也不驕不自縱弛也勞而不矜其功勞動而不已也矜大也不自大其功施而不德也夫聖人隨時以行是謂守時隨時時行則行時止則止天時不作弗為之客作起也攻者為客起謂天時利害災變之應人事不起弗為之始人事謂怨叛逆亂之萌先動為始今君王未盈而溢未盈國未富實而君意溢未盛而驕道化未盛而自驕不勞而矜其功未有勤勞而自大其功天時不作而先為人客吳未有天災而欲伐之人事不起而創為之始此逆於天而不和於人天應未至人事不起故逆於天而失人和也王若行之將妨於國家靡王躬行妨害靡損王弗聽蠡進諫曰夫勇者逆德也德尚禮讓勇則攻奪兵者㓙器也言害人争者事之末也言賢者修其德政而遠方附事文德不行然後用武故曰爭者事之末陰謀逆德好用㓙器陰謀兵謀勇為逆德始於人者人之所卒也始以伐人人終害之滛佚之事上帝之禁也淫佚放濫先行此者不利王曰無是貳言也吾已斷之矣貳二也二言陰謀滛佚也果興師而伐吳戰於五湖五湖今泰湖不勝棲於㑹稽越王歸自㑹稽其後十五年王召范蠡而問焉曰諺有之曰觥飯不及壺飱觥大也大飯盛饌也盛饌未具不能以虚待之不及壺飱之救饑疾也言已欲滅吳取便意得之而已不能待有餘力也今歲晚矣子將奈何蠡對曰微君王之言㣲無臣固將謁之謁請也伐吳臣聞從時者猶救火追亡人也蹶而趨之唯恐不及蹶走王曰諾遂興師伐吳於五湖吳人聞之出挑戰一日五反王弗忍欲許之不忍其忿蠡進諫曰夫謀之廊廟失之中原其可乎王姑勿許也臣聞之得時無怠時不再來天予不取反為之災贏縮轉化後將悔之贏縮進退轉化變易天節固然固然有轉化唯謀不遷謀必素定不可遷移王曰諾弗許蠡曰臣聞古之善用兵者謂若黄帝武湯贏縮以為常四時以為紀以為常隨其贏縮也紀法也四時有轉運用兵有利鈍也周語曰王欲合是五位二所而用之是也無過天極䆒數而止極至也䆒窮也無過天道之所至窮其數而止天道皇皇日月為常皇皇著明常象也明者以為法微者則是行明謂日月盛滿時也微謂虧損薄蝕也法其明者以進取行其微時以隠遁也陽至而陰陰至而陽至極日困而還月盈而虧困窮古之善用兵者因天地之常與之俱行隨時轉運虧盈晦明之常也後則用陰先則用陽後後動先先動用陰謂沈重固宻用陽謂輕疾猛厲也近則用柔遠則用剛敵近則用柔順示之以弱遠則抗威厲辭以抗御之後無陰蔽先無陽察後動者大舒靜為陰蔽也先動者大顯變為陽察也用人無藝往從其所藝射的也無藝無常所也行軍用人之道因敵制之不預設也故往從其所剛強以禦陽節不盡不死其野言敵以剛強來禦已其陽節未盡尚未可尅故曰不死其野彼來從我固守勿與勿與戰也若將與之必因天地之災彼有災變則可也又觀其民之饑飽勞逸以叅之言雖有災民尚逸飽則未也盡其陽節盈吾陰節而奪之彼陽勢已盡而吾陰節盛滿則能奪之宜為人客剛強而力疾陽節不盡輕而不可取先動為客於時宜為人客剛強力疾陽數未盡雖輕易猶不可得取宜為人主安徐而重固隂節不盡柔而不可迫時宜為人主安徐重固陰數未盡雖柔而不可困廹也凡陳之道設右以為牝蓋左以為牡陳有牝牡使相受也在陰為牝在陽為牡蚤晏無失必順天道晏晚周旋無䆒䆒窮也無窮若日月然今其來也剛強而力疾言吳陽勢未盡未可擊王姑待之王曰諾弗與戰其後四年越復伐吳吳士民罷弊輕鋭盡死於齊晉而越大破吳因而留圍之三年吳師敗越遂復棲吳王於姑蘇之山吳王使公孫雄吳大夫肉袒膝行而前請成越王曰孤臣夫差敢布腹心異日常得罪於會稽夫差不敢逆命得與君王成以歸今君王舉玉趾而誅孤臣孤臣惟命是聽意者亦欲如㑹稽之赦孤臣之罪乎句踐不忍欲許之范蠡曰㑹稽之事天以越賜吳吳不取今天以吳賜越越其可逆天乎且夫君王蚤朝晏罷非為吳邪謀之二十二年一旦而棄之可乎且夫天與弗取反受其咎伐柯者其則不遠君忘㑹稽之厄乎句踐曰吾欲聽子言吾不忍其使者范蠡乃鼓進兵曰王已屬政於執事執事蠡自謂也使者去不者且得罪我為子得罪吳使者泣而去句踐憐之乃使人謂吳王曰吾置王甬東君百家甬東㑹稽句章縣東海中洲也吳王謝曰吾老矣不能事君王遂自殺赤章蔓枝厹繇之臣也􅤌繇山中之國近晉者也智伯欲攻之而無道也無道路為鑄大鍾方二車軌以遺之􅤌繇之君特斬岸堙谿以迎鍾赤章蔓枝諫曰詩云唯則定國我胡以得是於智伯夫智伯之為人也貪而無信必欲攻我而無道也故為大鍾方二車軌以遺君君因斬岸堙谿以迎鍾師必隨之不聽又諫君曰大國為權而子逆之不祥子釋之赤章蔓枝曰為人臣不忠貞罪也忠貞不用遠身可也斬轂而行山中道狹故也至衞七日而􅤌繇亡大戊午趙大夫趙肅侯游大陵太原有大陵縣亦曰大陸出於鹿門大戊午扣馬曰耕事方急一日不作百日不食肅侯下車謝卜商字子夏居西河教授為魏文侯師魏文侯問於子夏曰吾端冕而聽古樂則唯恐卧聽鄭衛之音則不知倦敢問古樂之如彼何也新樂之如此何也端𤣥衣也古樂先王之正樂也子夏對曰今夫古樂進旅退旅和正以廣絃匏笙簧會守拊鼓始奏以文復亂以武治亂以相訊疾以雅君子於是語於是道古修身及家平均天下此古樂之發也旅猶俱也俱進俱退言其齊一也和正以廣無姦聲也㑹猶合也皆也言衆皆待擊鼔乃作周禮大師職曰大祭祀師瞽登歌合奏擊拊下管播樂器令奏鼔朄文表謂鼓也武謂金也相即拊也亦以節樂拊者以韋為裝之以糠一名相因以名焉齊人或謂糠為相雅亦樂器名也狀如漆筩中有椎也今夫新樂進俯退俯姦聲以濫溺而不止及優侏儒獶雜子女不知父子樂終不可以語不可以道古此新樂之發也俯猶曲也言不齊一也濫濫竊也溺而不止聲淫亂無以治之獶獮猴也言舞者如獮猴戯也亂男女之尊卑獶或為優今君之所問者樂也所好者音也夫樂者與音相近而不同言文侯好音而不知樂也鏗鏘之類皆為音應律乃為樂文侯曰敢問何如欲知音樂異也子夏對曰夫古者天地順而四時當民有德而五穀昌疾疢不作而無妖祥此之謂大當然後聖人作為父子君臣以為紀綱紀綱既正天下大定天下大定然後正六律和五聲絃歌詩頌此之謂德音德音之謂樂當謂樂不失其所詩云莫其德音其德克明克明克類克長克君王此大邦克順克俾俾于文王其德靡悔既受帝祉施于孫子此之謂也此有德之音所謂樂也德正應和曰莫照臨四方曰明勤施無私曰類教誨不倦曰長慶賞刑威曰君慈和徧服曰順俾當作比聲之誤也擇善從之曰比施延也言文王之德皆能如此故受天福延于後世也今君之所好者其溺音乎言無文王之德則所好非樂也文侯曰敢問溺音何從出也既習之久不知所由出也子夏對曰鄭音好濫淫志宋音燕女溺志衛音趨數煩志齊音敖辟喬志此四者皆淫於色而害於德是以祭祀弗用也言四國皆出此溺音濫濫竊姦聲也燕安也春秋傳曰懷與安實敗名趨數讀為促速聲之誤也煩勞也祭祀不用淫樂詩云肅雍和鳴先祖是聽夫肅肅敬也雍雍和也夫敬以和何事不行言古樂敬且和故無事而不用溺音無所施為人君者謹其所好惡而已矣君好之則臣為之上行之則民從之詩云誘民孔易此之謂也誘進也孔甚也言民從君所好惡進之於善無難然後聖人作為鞉鼓椌楬壎箎此六者德音之音也六者為本以其聲質也椌楬謂柷敔也壎箎或為簨􅒶然後鐘磬竽瑟以和之干戚旄狄以舞之此所以祭先王之廟也所以獻酬酳酢也所以官序貴賤各得其宜也所以示後世有尊卑長幼之序也官序貴賤謂尊卑樂噐列數有差次鐘聲鏗鏗以立號號以立横横以立武君子聽鐘聲則思武臣號號令所以警衆也横充也謂氣作充滿也石聲磬磬以立辨辨以致死君子聽磬聲則思死封疆之臣石聲磬磬當為罄字之誤也辨謂分明於節義絲聲哀哀以立亷亷以立志君子聽琴瑟之聲則思志義之臣亷亷隅也竹聲濫濫以立㑹㑹以聚衆君子聽竽笙簫管之聲則思畜聚之臣濫之意猶擥聚也㑹猶聚也聚或為最鼓鼙之聲讙讙以立動動以進衆君子聽鼓鼙之聲則思將帥之臣聞讙囂則人意動作讙或為歡動或為勲君子之聽音非聽其鏗鏘而已也彼亦有所合之也以聲合成已之意李克魏人魏文侯問曰吳之所以亡者何也對曰數戰而勝文侯曰數戰數勝國之福也其所以亡何也李克對曰數戰則民疲數勝則主驕以驕主使疲民此其所以亡也是故好戰窮武未有不亡者也文侯又問曰人有惡乎對曰有夫貴者則賤者惡之富者則貧者惡之智者則愚者惡之文侯曰善行此三者使人弗惡亦可乎李克曰可臣聞貴而下賤則衆弗惡也富能分貧則士弗惡也智而教愚則童蒙弗惡也文侯曰善哉言乎堯舜其猶病諸寡人雖不敏請守斯語矣狐巻子魏人魏文侯問曰父賢足恃乎對曰不足子賢足恃乎對曰不足兄賢足恃乎對曰不足弟賢足恃乎對曰不足臣賢足恃乎對曰不足文侯勃然作色而怒曰寡人問此五者於子一一以為不足者何也對曰父賢不過堯而丹朱放子賢不過舜而瞽叟拘兄賢不過舜而象敖弟賢不過周公而管叔誅臣賢不過湯武而桀紂伐望人者不至恃人者不久君欲治從身始人何可恃箕季魏人魏文侯見其牆壞而不築文侯曰何為不築對曰不時其牆枉而不端問曰何不端曰固然從者食其園之桃箕季禁之少焉日晏進糲飱瓜瓠之羮文侯出其僕曰君亦無得於箕季矣曩者進食臣竊視之糲飱之食瓜瓠之羮文侯曰吾何無得於箕季也吾一見季而得四焉其牆壞不築對云待時者教我無奪農時也牆枉而不端對云固然者是教我無侵封疆也從者食園桃箕季禁之豈愛桃哉是教我下無侵上也食我以糲飱者箕季豈不能具五味哉教我無多歛於百姓以省飲食之養也田子方為魏文侯友文侯與之飲酒而稱樂文侯曰鍾聲不比乎左高子方笑文侯曰奚笑子方曰臣聞之君明則樂官不明則樂音今君審於聲臣恐君之聾於官也文侯曰善敬聞命吳起為魏西河守魏武侯與諸大夫浮於西河稱曰河山之險豈不亦信固哉王鍾侍坐曰此晉國之所以强也若善修之則覇王之業具矣吳起對曰吾君之言危國之道也而子又附之是重危也武侯忿然曰子之言有說乎吳起對曰河山之險信不足保也是覇王之業不從此也昔者三苗之居左有彭蠡之波右有洞庭之水汶山在其南而衡山在其北恃此險也為政不善而禹放逐之夫夏桀之國左天門之陰而右天谿之陽盧睪在其北伊雒出其南有此險也然為政不善而湯伐之殷紂之國左孟門而右漳滏前帶河後被山有此險也然為政不善而武王伐之且君親從臣而勝降城城非不高人民非不衆也然而可得并者政惡故也從是觀之地形險阻奚足以霸王矣武侯曰善吾乃今日聞聖人之言也西河之政專委之子矣武侯謀事而當羣臣莫能逮朝而有喜色吳起進曰昔者有以楚莊王之語聞者乎武侯曰未也莊王之語奈何吳起曰楚莊王謀事而當羣臣莫能逮朝而有憂色申公巫臣進曰君朝而有憂色何也莊王曰吾聞之諸侯自擇師者王自擇友者霸是已而羣臣莫之若者亡今以不穀之不肖而議於朝且羣臣莫能逮吾國其㡬於亡乎吾是以有憂色也莊王之所以憂而君獨有喜色何也武侯逡廵而謝曰天使夫子振寡人之過也天使夫子振寡人之過也惠公魏惠王相惠施者也魏惠王死葬有日矣天大雨雪至於牛目羣臣多諫太子曰雪甚如此而葬行民必甚疾之官費又恐不給請弛期更日太子曰為人子者以民勞與費用之故而不行葬不義子勿復言羣臣皆莫敢諫以告犀首犀首魏人公孫衍也佩五國相印能合從連横號為犀首犀首曰吾未有以言之未無是其唯惠公乎請告惠公惠公曰諾駕而見太子曰葬有日矣太子曰然惠公曰昔王季歴葬於渦山之尾欒水齧其墓見棺之前和棺題曰和文王曰譆先君必欲一見羣臣百姓也夫故使欒水見之於是出而為之張朝百姓皆見之三日而後更葬此文王之義也今葬有日矣而雪甚及牛目難以行太子為及日之故得無嫌於欲亟葬乎願太子亦曰先王必欲少留而撫社稷安黔首也故使雨雪甚因弛期而更為日此文王之義也若此而不為義者羞法文王也太子曰甚善敬弛期更擇日許綰魏人也魏王將起中天臺令曰敢諫者死許綰負畚操鍤入曰聞大王起中天臺臣願加一力王曰子何力之有加綰曰雖無力能高臺王曰若何曰臣聞天與地相去萬五千里今王因而半之當起七千五百里之臺高既如是其趾湏方八千里盡王之地不足以為臺趾古者堯舜建諸侯地方五千里王必起此臺先以兵伐諸侯盡有其地猶不足又伐四夷得方八千里乃足以為臺趾材木之積人徒之衆倉廪之儲數以萬億度八千里之外當定農畆之地足以奉給王之臺者臺具已備乃可以作魏王黙然無以應乃罷起臺騶忌子以鼓琴見齊威王說而舎之右室湏臾王鼔琴騶忌子推戸入曰善鼔琴王勃然不說去琴按劒曰夫子見容未察何以知其善也騶忌子曰夫大弦濁以春溫者君也小弦亷折以淸者相也琴操曰大弦者君也寛和而温小弦者臣也清亷而不亂攫之深以瓜持也攫音俱足切醳之愉者一作舒政令也鈞諧以鳴大小相益囘邪而不相害者四時也吾是以知其善也王曰善語音騶忌子曰何獨語音夫治國家而弭人民皆在其中王又勃然不說曰若夫語五音之紀信未有如夫子者也若夫治國家而弭人民又何為乎絲桐之間騶忌子曰夫大弦濁以春溫者君也小弦亷折以清者相也攫之深而舎之愉者政令也鈞諧以鳴大小相益囘邪而不相害者四時也夫復而不亂者所以治昌也連而徑者所以存亡也故曰琴音調而天下治夫治國家而引人民者無若乎五音者王曰善三月而受相印淳于髠齊之贅壻也齊威王喜隱好為滛樂長夜之飲沈湎不治委政卿大夫百官荒亂諸侯竝侵國且危亡在於旦暮左右莫敢諫淳于髠說之以隱曰國中有大鳥止王之庭三年不蜚又不鳴王知此鳥何也王曰此鳥不飛則已一飛冲天不鳴則已一鳴驚人於是乃朝諸縣令長七十二人賞一人誅一人奮兵而出諸侯振驚皆還齊侵地威王大說後置酒後宫召髠賜之酒問曰先生能飲㡬何而醉髠對曰臣飲一斗亦醉一石亦醉威王曰先生飲一斗而醉惡能飲一石哉其說可得聞乎髠曰賜酒大王之前執法在傍御史在後髠恐懼俯伏而飲不過一斗徑醉矣若親有嚴客髠帣韝鞠􅎽帣收衣褏也褏衿也韝臂捍也音溝鞠曲也􅎽音其紀切又與跽同謂小跪也侍酒於前時賜餘瀝奉觴上壽數起飲不過二斗徑醉矣若朋友交游久不相見卒然相覩歡然道故私情相語飲可五六斗徑醉矣若乃州閭之會男女雜坐行酒稽留六博投壺相引為曹握手無罰目眙不禁眙吐甑切直視貌前有墮珥後有遺簮髠竊樂此飲可八斗而醉二參猶言有餘日暮酒闌合尊促坐男女同席履舄交錯杯盤狼藉堂上燭滅主人留髠而送客一本云留髠坐起送客襦襟解微聞薌澤當此之時髠心最歡能飲一石故曰酒極則亂樂極則悲萬事盡然言不可極極之而衰以諷諫焉齊王曰善乃罷長夜之飲王斗齊人也欲見齊宣王宣王使謁者延入王斗曰斗趨見王為好勢王趨見斗為好士於王何如使者復還報王曰先生徐之寡人請從宣王因趨而迎之於門與入曰寡人奉先君之宗廟守社稷聞先生直言正諫不諱王斗對曰王聞之過斗生於亂世事亂君焉敢直言正諫宣王忿然作色不說有間王斗曰昔先君桓公所好者五九合諸侯一匡天下天子受籍立為大伯今王有四焉宣王說曰寡人愚陋守齊國唯恐夫抎云粉切之焉能有四焉王斗曰先君好馬王亦好馬先君好狗王亦好狗先君好酒王亦好酒先君好色王亦好色先君好士而王不好士宣王曰當今之世無士寡人何好王斗曰世無騏驎騄耳王之駟已備矣世無東郭俊盧氏之狗王之走狗已具矣世無毛廧西施王宫已充矣王亦不好士也何患無士王曰寡人憂國愛民固願得士以治之王斗曰王之憂國愛民不若王愛尺縠也王曰何謂也王斗曰王使人為冠不使左右便辟而使工者何也為能之也今王治齊非左右便辟無使也臣故曰不如愛尺縠也宣王謝曰寡人有罪國家於是舉士五人任官齊國大治莫敖子華楚大夫也楚威王問於莫敖子華曰自從先君文王以至不穀之身亦有不為爵勸不為祿勉以憂社稷者乎莫敖子華對曰如子華不足知之矣王曰不於大夫無所聞之莫敖子華對曰君王將何問者也彼有亷其爵貧其身以憂社稷者有崇其爵豐其祿以憂社稷者有斷脰决腹一瞑而萬世不視不知所益以憂社稷者有勞其身愁其志以憂社稷者亦有不為爵勸不為祿勉以憂社稷者王曰大夫此言將何謂也莫敖子華對曰昔令尹子文緇帛之衣以朝鹿裘以處未明而立於朝日晦而歸食朝不謀夕無一月之積故彼亷其爵貧其身以憂社稷者令尹子文是也昔者葉公子高身獲於表薄而財於柱國定白公之禍寧楚國之事恢先君以揜方城之外四封不亷名不挫於諸侯當此之時也天下莫敢舉兵南鄉葉公子高食田六百畛故彼崇其爵豐其祿以憂社稷者葉公子高是也昔者吳與楚戰於柏舉两師之間夫卒交莫敖大心撫其御之手顧而大息曰嗟乎子乎楚國亡之日至矣吾將深入吳軍若扑一人若捽一人以與大心者社稷其庶幾乎故斷脰决腹一瞑而萬世不視不知所益以憂社稷者莫敖大心是也昔吳與楚戰於柏舉三戰入郢寡君身出大夫悉屬百姓離散棼冐勃蘇曰吾被堅執鋭赴强敵而死此猶一卒也不若奔諸侯於是贏糧潛行上崢山踰深谿蹠穿膝暴七日而薄秦王之朝雀立不轉晝吟宵哭七日不得告水漿無入口瘨而殫悶旄不知人秦王聞而走之冠帶不相及左奉其首右濡其口勃蘇乃蘇秦王身問之子孰誰也棼冐勃蘇對曰臣非異人楚之使棼冐勃蘇吳與楚人戰於柏舉三戰入郢寡君身出大夫悉屬百姓離散使下臣來告亡且求救秦王顧令之起寡人聞之萬乘之君得罪一士社稷其危今此之謂也遂出革車千乘卒萬人屬之子蒲與子虎下塞以東與吳人戰於濁水而大敗之亦聞於遂蒲故勞其身愁其思以憂社稷者棼冐勃蘇是也吳與楚戰於柏舉三戰入郢君王身出大夫悉屬百姓離散蒙穀結鬬於宫唐之上舎鬬奔郢曰若有孤楚國社稷其庶㡬乎遂入大宫負雞次之典以浮於江逃於雲夢之中昭王反郢五官失法百姓昬亂蒙穀獻典五官得法而百姓大治此蒙穀之功多與存國相若封之執圭田六百畛蒙穀怒曰穀非人臣社稷之臣茍社稷血食餘豈悉無君乎遂自棄於磨山之中至今無冐故不為爵勸不為祿勉以憂社稷蒙穀是也王乃大息曰此古之人也今之人焉能有之耶莫敖子華對曰昔者先君靈王好小腰楚士約食馮而能立式而能起食之可欲忍而不入死之可惡殺而不避子華聞之其君好射者其臣决拾君王直不好若君王誠好賢此五臣者皆可得而致之樛留韓宣王時人也韓宣王謂樛留曰吾欲兩用公仲公叔其可乎對曰不可晉用六卿而國分簡公用田成監止而簡公弑魏兩用犀首張儀而西河之外亡今王兩用之其多力者内樹其黨其寡力者藉外權羣臣或内樹其黨以擅其主或外為交以裂其地則王之國必危矣中期秦昭王時人也秦昭王謂左右曰今時韓魏與始孰强對曰不如始强王曰今時如耳魏齊與孟嘗芒卯孰賢對曰不如嘗卯王曰以孟嘗芒卯之賢率强韓魏以攻秦猶無奈寡人何也今以無能之如耳魏齊而率弱韓魏以伐秦其無奈寡人何亦明矣左右皆曰甚然中期推琴而對曰王之料天下過矣當晉六卿之時知氏最强滅范中行又率韓魏之兵以圍趙襄子於晉陽决晉水以灌晉陽之城不沈者三板知伯行水魏桓子御韓康子為參乘知伯曰吾始不知水之可以亡人之國也乃今知之汾水可以灌安邑洚水可以灌平陽魏桓子肘韓康子韓康子履魏桓子肘足接於車上而知氏地分身死國亡為天下笑今秦兵雖强不能過知氏韓魏雖弱尚賢其在晉陽之下也此方其用肘足之時也願王之必無易也於是秦王恐貫珠者齊人也莫知其名氏齊襄王立田單相之過菑水有老人渉菑而寒出不能行坐沙中田單解裘而衣之襄王惡之曰田單之施將欲以取我國乎不早圖恐後之左右顧無人聲下有貫珠者襄王呼而問之曰女聞言乎對曰聞之王曰女以為何若對曰王不如因以為已善王嘉單之善下令曰寡人憂民之饑也單收而食之寡人憂民之寒也單解裘而衣之寡人憂勞百姓而單亦憂之稱寡人之意單有是善而王嘉之單之善亦王之善已王曰善乃賜單牛酒嘉其行後數日貫珠者復見王曰王至朝日宜召田單而揖之於庭口勞之乃布令求百姓之饑寒者收穀之乃使人聽於閭里聞丈夫之相與語曰田單之愛人嗟嗟乃王之教澤也貂勃齊襄王時人也王有所幸臣九人之屬欲傷安平君田單也相與語於王曰燕之伐齊之時楚王使將軍將萬人而佐齊今國已定而社稷已安矣何不使使者謝於楚王王曰左右孰可九人之屬曰貂勃可貂勃使楚楚王受而觴之數日不反九人之屬相與語於王曰夫一人之身而牽留萬乘者豈不以據勢也哉且安平君之與王也君臣無禮而上下無别且其志欲為不善内收百姓循撫其心振窮補不足布德於民外懷戎翟天下之賢士隂結諸侯之雄俊豪英其志欲有為也願王察之異日而王曰召相單來田單免冠徒跣肉袒而進退而請死罪五日而王曰子無罪於寡人子為子之臣禮吾為吾之王禮而已矣貂勃從楚來王賜之宴酒酣曰召相田單而來貂勃避席稽首曰王惡得此亡國之言乎王上者孰與周文王王曰吾不若也貂勃曰然臣固知王之不若也下者孰與齊桓公王曰吾不若也貂勃曰然臣固知王之不若也昔周文王得吕尚以為太公齊桓公得管夷吾以為仲父今王得安平君田單且自天地之開民人之治為人臣之功者誰有厚於安平君者哉而王曰單單惡得此亡國之言乎且王不能守王之社稷燕人興師而襲齊墟王走而之城陽之山中安平君以惴惴之即墨三里之城五里之郭敝卒七千人禽其司馬而反千里之齊安平君之功也當是時也闔城陽而王天下莫之能正然而計之於道歸之於義以為不可故為棧道木閣而迎王與后於城陽山中王乃得反子臨百姓今國已定民已安矣王乃曰單單且嬰兒之計不為此王其亟殺此九子者以謝安平君不然國危矣乃殺九子而逐其家益封安平君以邑萬户屈原字平楚大夫秦使張儀獻楚懷王以商於之地六百里使絶齊楚使受地儀詐曰與王約六里不聞六百里懷王怒興師伐秦楚大敗明年秦割漢中地以和楚王不願得地願得張儀而甘心焉儀請如楚儀設詭辯於懷王之寵姬鄭袖鄭袖卒言張儀於王而出之儀出懷王因善遇儀儀因說楚王以叛從約而與秦合親約婚姻張儀已去屈原使從齊來諫王曰何不誅張儀懷王悔使人追儀弗及其後秦昭王與楚婚欲與懷王㑹懷王欲行屈原曰秦虎狼之國不可信不如無行懷王稚子子蘭勸王行王入武關秦伏兵絶其後因留王竟死於秦莊辛楚襄王時人也謂楚襄王曰君王左州侯右夏侯輦從鄢陵君與壽陵君專淫逸侈靡不顧國政鄢郢必危矣襄王曰先生老悖乎將以為楚國妖祥乎莊辛曰臣誠見其必然也非敢以為國妖祥也君王卒幸四子者不衰楚國必亡矣臣請辟於趙淹留以觀之莊辛之趙留五月秦果舉鄢郢巫山蔡陳之地襄王流揜於城陽於是使人發騶徵莊辛於趙莊辛曰諾莊辛至襄王曰寡人不能用先生之言今事至於此為之奈何莊辛對曰臣聞鄙語曰見兎而顧犬未為晚也亡羊而補牢未為遲也臣聞昔湯武以百里昌桀紂以天下亡今楚國雖小絶長續短猶以數千里豈特百里哉王獨不見夫蜻蛉乎六足四翼飛翔乎天地之間俛啄蚉䖟而食之仰承甘露而飲之自以為無患與人無争也不知夫五尺童子方將調飴膠絲加已乎四仞之上而下為螻蟻食也蜻蛉其小者也黄雀因是以俯噣白粒仰棲茂樹鼓翅奮翼自以為無患與人無爭也不知夫公子王孫左挾彈右攝丸將加已乎十仞之上以其類為招晝游乎茂樹夕調乎酸醎夫黄雀其小者也黄鵠因是以游於江海淹乎大沼俯噣鰋鯉仰嚙䔖荇奮其六翮而凌清風飄搖乎髙翔自以為無患與人無争也不知夫射者方將脩其碆盧治其矰繳將加已乎百仞之上被礛磻引微繳折清風而抎矣故晝游乎江河夕調乎鼎鼐夫黄鵠其小者也蔡靈侯之事因是以南㳺乎高陂北陵乎巫山飲茹谿之流食湘波之魚左抱幼妾右擁嬖女與之馳騁乎髙蔡之中而不以國家為事而不知夫子發方受命乎靈王繫已以朱絲而見之也蔡靈侯之事其小者也君王之事因是以左州侯右夏侯輦從鄢陵君與壽陵君飯封祿之粟而戴方府之金與之馳騁乎雲夢之中而不以國家為事不知夫穣侯方受命乎秦王塡黽塞之内而投已乎黽塞之外襄王聞之顔色變怍身體戰慄於是乃以執珪而受之封為陽陵君雍門司馬齊大夫不載名氏齊王建入朝於秦雍門司馬前曰所為立王者為社稷耶為王立王耶王曰為社稷司馬曰為社稷立王王何以去社稷而入秦齊王還車而反樂間事燕封昌國君燕王命相栗腹約歡趙以五百金為趙王酒還報燕王曰趙王壯者皆死長平其孤未壯可伐也王召樂間問之對曰趙四戰之國其民習兵不可伐王曰吾以五而伐一對曰不可燕王怒群臣皆以為可卒起二軍車二十乘栗腹將而攻鄗在常山今曰髙邑卿秦攻代唯獨大夫將渠謂燕王曰與人通關約交以五百金飲人之王使者報而反攻之不祥兵無成功燕王不聽自將偏軍隨之將渠引燕王綬止之曰王必無自徃徃無成功王蹵以足將渠泣曰臣非以自為為王也燕軍至宋子屬鉅鹿趙使亷頗將擊破栗腹於鄗破卿秦樂乘於代樂間奔趙册府元龜卷七百四十三
