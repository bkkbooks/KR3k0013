body:
  text: 冊府元龜卷六百二十四宋王欽若等撰卿監部智識夫智者不惑識以知微故能施于有政克集其事其有處慶賴之地領監署之職竭志奉上思所裨益自非機用周敏䇿略宏逹才出世表言為國經者曷嘗著名稱于厥任哉至乃决獄上議本乎忠恪參考條制臻夫倫要全物力以省費論軍志而獨見深明姦隙曲揣敵意戒乎輕舉洞于未萌亦有鍳通人倫𤣥合上㫖幹局餘力兼濟于下莫不究天人之奥賾詳事物之軌制練逹國體暁暢時義以至諮詢訪對引喻精詣渙然氷釋昭若發蒙沃于主心為衆所服者悉可徴矣漢張湯為廷尉决大獄欲傅古義乃請博士弟子理尚書春秋補廷尉平亭疑法奏讞疑事必先為上分别其原以揚主之明言此自天子意非繇有司也奏事有善則讓曰監掾史某所為也亭者平也均也召信臣竟寧中為少府奏請上林諸離逺宫舘稀幸御者勿復繕治共張又奏省樂府黄門倡優諸戲又宫舘兵弩什噐减過泰半大官園種冬生葱韮菜茹覆以屋廡廡周室也茹人庶切廡音舞晝夜㸐藴火待温氣乃生㸐古然字藴小蓄也温於云切信臣以為此皆不時之物有傷于人不宜以奉供養及他非法食物悉奏罷省費嵗數千萬朱愽為廷尉職典决疑當讞平天下獄愽恐為官屬所誣視事召見正監典法掾史謂曰廷尉本起于武吏不通法律幸有衆賢亦何憂然廷尉治郡斷獄以來且二十年亦獨耳剽日乆剽刦也猶言行聽也剽頴妙切三尺律令事出其中言可以人情知之掾史試與正監共撰前世决事吏議難知者數十事持以問廷尉得為諸君覆意之但欲用意覆之不近法律事故也正監以為愽茍强意未必能然即共條白焉愽皆召掾史并坐而問為平處其輕重十中八九中音行仲切官屬咸服愽之䟽略材過人也後漢牟融為大司農是時明帝方勤萬機公卿數朝會每輙延謀政事判折獄訟融經明才髙善論議朝廷皆服其能帝數嗟嘆以為才堪宰相袁安為太僕元和三年武威太守孟雲上書北虜既已和親而南部復徃抄掠北單于謂漢欺之謀欲犯邉宜還其生口以安慰之詔百官議朝堂公卿皆言夷狄譎詐求欲無厭既得生口當復妄自誇大不可開許安獨曰北虜遣使奉獻和親有得邉生口者輙以歸漢此明其畏威而非先違約也雲以大臣典邉不宜負信于戎狄還之足示中國優貸而使邉人得安誠便司徒桓虞既議從公太尉鄭𢎞司空第五倫皆恨之𢎞因大言激勵虞曰諸言當還生口者皆為不忠虞廷叱之倫及大鴻臚韋彪各作色變容司𨽻校尉舉奏安等皆上印綬謝詔報曰乆議沉滯各有所志葢事以議從䇿繇衆定誾誾衎衎得禮之容寝黙抑心更非朝廷之福君何尤而深謝其各冠履帝竟從安議孔融為将作大匠遷少府每朝訪對融輙為議主引正定議公卿大夫皆𨽻名而已魏司馬芝為大司農每上官有所召問常先見掾史為斷其意故教其所以荅塞之状皆如所度王肅為光禄勲時有三魚長尺集武庫之屋有以為吉祥肅辨之曰魚生於淵而亢于屋鱗介之物失其所也邉将其殆有棄甲之變乎其後果有東關之敗遷太常時毌丘儉文欽反大将軍司馬景王問肅曰安主寧國其術焉在肅曰昔關侯率荆州之衆降于禁扵漢濵遂有北向爭天下之志後孫權襲取其将士家屬侯士衆一旦瓦解今淮南将士父母妻子皆在内州但急徃禦衛使不得前必有關侯土分之勢矣景王從之遂破儉欽辛毗為衛尉時蜀相諸葛亮圍祁山不克引退張郃追之為流矢所中死明帝惜郃臨朝而嘆曰蜀未平而郃死将若之何司空陳羣曰郃誠良将國所依也毗心以為郃雖可惜然已死不當内弱主意而示外以不大也乃持群曰陳公是何言歟當建安之末天下不可一日無武皇帝也及委國祚而文皇帝受命黄初之世亦謂一日不可無文皇帝也及委棄天下而陛下龍興今國内所少豈張郃乎陳群曰亦誠如辛毗言帝曰陳公可謂善變矣崔林為大鴻臚龜兹王遣侍子來朝朝廷嘉其自逺至褒賞其王甚厚餘國各遣子來朝問使連屬林恐所遣或非真的權取䟽屬賈胡因通使命利得印綬而道路䕶送所損滋多勞所養之民資無益之事為夷狄所笑此曩時之所患也乃移書燉煌喻指并録前世待遇諸豐約故事使其有常吳潘濬為太常文帝時驃騎将軍歩隲屯漚口求召募諸郡以増兵權以問濬濬曰豪将在民間耗亂為害加隲有名勢在所媚不可聽也從之晉鄭袤仕魏為光禄勲領宗正母丘儉作亂景帝自出征之百官祖送於城東袤疾病不任會帝謂中領軍王肅曰唯不見鄭光禄為恨肅以語袤袤自興追帝及於近道帝笑曰故知侯生必來也遂與袤共載曰計将何先袤曰昔與儉俱為臺郎特所知悉其人好謀而不逹事情自昔勲建幽州志望無限又矜勇無筭今大軍出其不意江淮之卒銳而不能固深溝髙壘以挫其氣此亞夫之長也帝稱善蔡謨成帝時為太常彭城王紘上言樂賢堂有先帝手畵佛象經歴冦難而此堂猶存宜勑作頌帝下其議謨曰佛者夷狄之俗非經典之制先帝量同天地多才多藝聊因暇時而畫此象至於雅好佛道所未承聞盗賊奔突王都隳敗而此堂塊然獨存斯誠神靈保祚之徴然未是大晉盛徳之形容歌頌之所先也人臣覩物興義私作賦頌可也今欲發王命𠡠史官上稱先帝好佛之志下為夷狄作一象之頌於義有疑焉於是遂寝時征西将軍庾亮以石勒新死欲移鎮石城為滅賊之漸事下公卿謨議曰時有否泰道有屈伸暴逆之冦雖終滅亡然當彊盛皆屈而避之是以高祖受黜於巴漢忍辱於平城也若爭彊於鴻門則亡不終日故蕭何曰百戰百敗不死何待也原始要終歸於大濟而已豈與當亡之冦爭遲速之間哉夫唯鴻門之不爭故垓下莫能與之争文王身阨於羑里故道泰於牧野句踐見屈於會稽故威申於强吳今日之事亦繇此矣賊假息之命垂盡而豺狼之力尚彊宜抗威以待時或曰抗威待時時㠯可矣愚以為時之可否在賊之強弱賊之強弱在季龍之能否季龍之能否可得而言矣自勒初起則季龍為爪牙百戰百勝遂定中國境土所㨿同於魏世及勒死之日将相内外欲誅季龍季龍獨起於衆異之中殺嗣主誅寵臣内難既定千里逺出一攻而㧞金墉再戰而斬石生禽彭彪殺石聰㓕郭權還據根本内外並定四方鎮守不失尺土詳察此事豈能乎将不能也假令不能者為之其将濟乎将不濟也賊前攻襄陽而不能㧞誠有之矣不信百戰之効而執攻之之驗棄多從少於理安乎譬若射者百發而一不中可謂之拙乎且不㧞襄陽者非季龍身也桓平北守邉之将耳賊前攻之争疆場耳得之為善不得則止非其所急也今征西之徃則異於是何者重鎮也名賢也中國之人所聞而歸心也今而西度實有席卷河南之勢賊所大懼豈與桓宣同哉季龍必率其精兵身來距爭若欲與戰戰何如石生若欲城守守何如金墉若欲沮沔沔何如大江蘇峻何如季龍凡此數者宜詳挍之愚謂石生猛将關中精兵征西之日戰不能勝也金墉險固劉曜十萬所不能㧞今征西之守不能勝也又是時兖州雒陽關中皆舉兵撃季龍今此三處反為其用方之於前倍半之舉也若石生不能敵其半而征西欲當其倍愚所疑也蘇峻之彊不及季龍沔水之險不及大江大江不能禦蘇峻而以沔水禦季龍又所疑也昔祖士雅在譙佃於城北虜賊來攻因以為資故豫安軍屯以禦其外糓将熟賊果至丁夫戰于外老弱穫於内多持炬火急則燒糓而走如此数年竟不得其利是時賊惟據沔水地方之於今四分之一耳士雅不能捍其一而征西欲禦其四又所疑也或曰賊若多來則必無糧然致糧之難莫過崤函而季龍昔渉此險深入敵國平關中而後還今至襄陽路既無險又行其國内自相供給方之於前難易百倍已經至難而謂今不能濟其易又所疑也然此所論徃說征西既至之後耳尚未論道路之慮也自沔已西水急岸髙魚貫泝流首尾百里若賊無宋襄之義及我未陣而擊之如之何今王士與賊水陸異勢便習不同宼若送死雖開江延敵以一當千猶吞之有餘宜誘而致之以保萬全棄江逺敵以我所短擊彼所長懼非廟勝之筭朝議同之故亮不果移鎮王彪之為太常領崇徳衛尉時或謂簡文曰武陵第中大脩噐杖将謀非常也簡文以問彪之彪之曰武陵王志意盡於馳騁田獵耳願深静之以懐異同者或復以此為言簡文甚恱南齊胡諧之為衛尉領中庶子諧之有識計每朝廷官缺及應遷代宻量主所用人皆如諧之言虞悰以此稱服梁傅岐為太僕司農卿在禁省十餘年機事宻勿亞於朱异貞陽侯蕭明伐彭城兵敗囚於魏三年明遣使還述魏欲通和好勑有司及近臣定議左衛朱异曰邉境且得静冦息人於事為便議者並然之岐獨曰髙澄既新得志何事須和必是設間故令貞陽遣使令侯景自疑當以貞陽易景景意不安必圖禍亂若許通好是堕其計中且彭城去嵗䘮師渦陽復新敗退今使就和益示國家之弱切不可許异等固執帝遂從之乃遣使景果有疑遂舉兵入冦請誅朱异後魏崔浩為祭酒泰常元年宋髙祖為晉将伐姚泓舟師自淮泗入清欲泝河西上假道於國詔羣臣議之外朝公卿咸曰函谷關號曰天險一人荷戈萬夫不得進劉裕舟船歩兵何能西入脫我乘其後還路甚難若北上河岸其行為易揚言伐姚意或難測假其水道㓂不可縱宜先發軍斷河上流勿令西過又議之内朝咸同外計明元将從之浩曰此非上䇿司馬休之之徒擾其荆州劉裕切齒來乆今興死子㓜乘其危亡而伐之臣觀其意必欲入關勁躁之人不顧後患若今塞其西路裕必上岸北侵如此則姚無事而我受敵矣今蠕蠕内㓂民食又乏不可發軍赴南則北㓂進擊若其救北則南州復危未若假之水道縱裕西入然後興兵塞其東歸之路所謂卞荘刺虎兩得之勢也使裕勝也必徳我假道之惠令姚氏勝也亦不失救隣之名縱使裕得關中懸逺難守彼不能守終為我物今不勞兵馬坐觀成敗鬪兩虎而收長乆利上䇿也夫為國之計擇利而為之豈顧婚姻酬一女子之惠也假令國家棄恒山以南裕必不能發吳越之兵與官軍爭守河北也居然可知議者猶曰裕西入函谷則進退路窮腹背受敵北上岸則姚軍必不出關助我揚聲西行意在北進其勢然也明元遂從群議遣長孫嵩發兵拒之戰於畔城為晉将朱超石所敗師人多傷明元聞之恨不用浩計明年齊郡太守王懿來降上書陳計稱劉裕在洛勸國家以軍絶其後路則裕可不戰而克書奏帝善之會浩在前進講書傳帝問浩劉裕西伐前軍已至潼關其事如何以卿觀之事得濟不浩對曰昔姚興好養虚名而無實用子泓又病衆叛親離裕乘其危亡兵精将勇以臣觀之克之必矣明元曰劉裕武能何如慕容垂浩曰裕勝明元曰試言其状浩曰慕容垂乘父祖世君之資生便尊貴同類歸之若夜蛾之赴火少加倚仗便足立功劉裕挺出寒微不階尺土之資不因一卒之用奮臂大呼而夷㓕桓𤣥北擒慕容超南摧盧循等僣晉陵遲遂執國命裕若平姚而還必簒其主其勢然矣秦地戎夷渾并虎狼之國裕亦不能守之風俗不同人情難變欲行荆揚之化于三秦之地無翼而欲飛無足而欲走不可得也若留衆守之必資于冦孔子曰善人為邦百年可以勝殘去殺今以秦之難制一二年間豈裕所能哉且可治戎束甲息民備境以待其歸秦地亦當終為國有可坐而守也明元曰裕已入關不能進退我遣精騎南襲彭城夀春裕亦何能自立浩曰今西北二冦未弭陛下不可親御六師兵衆雖盛将無韓白長孫嵩有治國之用無進取之能非劉裕敵也請待之不晩明元笑曰卿量之已審矣浩曰臣嘗私論近世人物不敢不上聞若王猛之治國苻堅之管仲也慕容𤣥恭之輔少主慕容暐之霍光也劉裕之平逆亂司馬徳宗之曹操也明元曰卿謂先帝如何浩曰小人管闚懸象何能見𤣥穹之廣大雖然太祖用漠北醇樸之人南入中地變風易俗化洽四海自與羲農齊烈臣豈能仰名明元曰屈沔何如浩曰屈沔家國夷滅一身孤寄為姚氏封殖不思樹黨強隣報仇雪耻乃結忿蠕蠕背徳于姚興獗竪小人無大經畧正可殘暴終為人所滅耳明元大恱語至中夜賜浩御縹醪酒十􅀈水精戎鹽一兩曰朕味卿言若此鹽酒故與卿同其甘也始光中為太常卿時議討赫連昌羣臣皆以為難唯浩曰往年以來熒惑再守羽林皆成鈎已其占秦亡及今年五星并出東方利以西伐天應人和時會并集不可失也太武乃使奚斤等擊蒲坂而親率輕騎襲其都城大獲而還及太武復討昌次其城下收衆偽退昌鼓譟而前舒陣為两翼會有風雨從東南來揚沙昏晝宦者趙倪進曰今風雨從賊來我向彼背天不助人又将士飢渇願陛下攝騎避之更待後日浩叱之曰是何言與千里制勝一日之中豈得變易前行不止後已離絶宜分軍隠出掩擊不意風道在人豈有常也太武曰善分騎奮擊昌軍大潰時議擊蠕蠕朝臣内外盡不欲行保太后固止太武皆不聽唯浩讚成䇿畧尚書令劉潔左僕射安原等乃使黄門侍郎仇齊推赫連昌太史張淵徐辨說太武曰今年己巳三隂之嵗嵗星襲月太白在西方不可舉兵北伐必敗雖剋不利于上又羣臣共讚和淵等云淵少時嘗諫苻堅不可南征堅不從而敗今天時人事都不和協何可舉動太武意未决乃召浩令與淵等辨之浩難淵曰陽者徳也隂者刑也故日蝕修徳月蝕修刑夫王之用兵刑之大者也以此言之三隂用兵葢得其類修刑之義也嵗星襲月年飢民流應在他國逺期十二年太白行蒼龍宿於天文為東不妨北伐淵等俗生志意淺近牽於小數不逹大體難與逺圖臣觀天文比年已來月行掩昴至今猶然其占三年天子大破旄頭之國蠕蠕髙車旄頭之衆也夫聖明御時能行非常之事古人語曰非常之原黎民懼焉及其成功天下晏然願陛下勿疑也淵等慙而言曰蠕蠕荒外無用之物得其地不可耕而食得其民不可臣而使輕疾無常難得而制有何汲汲而苦勞士馬也浩曰淵言天時是其所職若論形勢非彼所知斯乃漢世舊說常談施之於今不合事宜也何以言之夫蠕蠕者舊是國家北邉叛𨽻今誅其元惡收其善民令復舊役非無用也漠北高凉不生蚊蚋水草美善夏則北遷田牧其地非不可耕而食也蠕蠕子弟來降貴者尚公主賤者將軍大夫居列満朝又高車號為名騎非不臣而畜也夫以南人追之則患其輕疾於國兵則不然何者彼能逺逐非難制也徃數入國民吏震驚盡今夏不乘虚掩進破滅其國至秋復來不得安卧自太宗之世迄於今日無嵗不驚豈不汲汲乎哉世人皆謂淵辨通觧數術明决成敗臣請試之問其西國未滅之前有何亡徴知而不言是其不忠若實不知是其無術而赫連昌在坐淵等自以無失言慙赧而不能對太武大悦謂公卿曰吾意决矣亡國之師不可與謀信矣哉而保太后猶難之復令羣臣保太后前評議太武謂浩曰此等意猶不伏卿善暁之令悟既罷朝或有尤浩者曰今吳賊侵南而舍之北伐行師千里其誰不知若蠕蠕逺遁前無所獲後有南賊之患危之道也浩曰不然今年不摧蠕蠕則無以禦南賊自國家并西國已來南人恐懼揚聲動衆以衛淮北彼北我南彼勞我息其勢然矣破蠕蠕徃還之間故不見其至也何以言之劉裕得關中留其愛子精兵數萬良将勁卒猶不能固守舉軍盡没號哭之聲至今未巳如何正當國家休明之世士馬強盛之時而欲以駒犢齒虎口也設令國家與之河南彼必不能守之自量不能守是以必不來若或有衆備邉之軍耳夫見瓶水之凍知天下之寒嘗肉一臠識鑊中之味物有其類可推而得也且蠕蠕恃其絶逺謂國家力不能至自寛來乆故夏則散衆放畜秋肥乃聚背寒向温南來冦抄今出其慮表攻其不備大軍卒至必驚駭星分望塵奔走牡馬護群牝馬戀駒驅馳難制不得水草未過數日則聚而困弊可一舉而滅暫勞永逸長乆之利時不可失也惟患上無此意今聖慮已决發曠世之謀如何止之陋矣哉公卿也諸軍遂行天師冦謙之謂浩曰是行也如之何可果勝乎浩對曰天時形勢必克無疑但恐諸将𤨏𤨏前後顧慮不能乘勝深入使不全舉耳今軍入其境蠕蠕先不設備民畜布野驚怖四奔莫相收攝於是分軍捜討東西五千里南北三千里凡所俘虜及獲畜産車廬彌漫山澤葢數百萬髙車殺蠕蠕種類降者三十餘萬落虜遂散亂矣太武㳂弱水西行至涿邪山諸大将果疑虜深入有伏兵勸太武停止不追天師以浩前言固勸太武窮討不聽後有降人言蠕蠕大檀先被疾乃焚焼穹廬科車自載将數百人入南山走民畜窘聚方六十里中無人統領相去八十里追軍不至乃徐西遁唯此得免後聞凉州賈胡言若復前行二日則盡滅之矣太武深恨之大軍既還南賊竟不能動如浩所量范紹為羽林監時楊州刺史任城王澄請征鍾離勑詔詣壽春共量進止澄曰須兵十萬徃還百日漚陽鍾離廣陵盧江欲數道俱進但粮仗軍資須朝廷速具紹曰計十萬之衆徃還百日湏糧百日頃秋已向末方欲徴召兵仗可集恐糧難至有兵無糧何以克敵願王善思為社稷深慮澄沉思良乆曰實如卿之所言使還具以狀聞後澄遂征鍾離無功而返北齊陽斐初仕魏為廷尉少卿時東郡太守陸士佩以黎陽關河形勝欲因山即壑以為公家苑囿遺斐書曰當諮大将軍以足下為匠者斐荅書拒曰當今殷憂啓聖運遭昌歴故大丞相天啓霸功再造太極大将軍光承先搆嗣續丕顯國歩始康民勞未息誠宜輕徭薄賦勤恤民隠詩不云乎民亦勞止迄可小康惠此中國以綏四方古之帝王亦有表山刋樹未足盡其意下輦成宴詎能窮其情正足以靡天地之財用劉生民之髓腦是故孔子對葉公以來逺酬哀公以臨民所問雖同所急務異故也相如壮上林之觀揚雄騁羽獵之辭雖係以隤􅀈填塹亂以收罝落網而言無補於風規祗足昭其愆度也後周裴漢為司車路下大夫與工部郭彦大府髙賔等參議格令每較量時事必有條理彦等咸敬異之隋樊叔畧開皇後為司農卿朝廷有疑滯公卿所未能决者叔畧輒為評理雖無學術有所依據然師心獨見闇與理合甚為上所親委髙熲楊素亦禮遇之叔畧雖為司農徃徃叅督九卿事李文博為直祕書内省商畧古今治政得失如指諸掌唐令狐徳棻永徽初為太常少卿髙宗召中書門下三品及𢎞文館學士於中華殿論議帝問曰何者為王道何者為覇道又孰為先後徳棻對曰王道在徳覇道在刑自三王以上皆行王道唯秦任伯術漢則雜而行之魏晉已下王覇俱失如欲用之王道為最而行之為難帝曰今之所行何政為要徳棻對曰古者為政清其心簡其事以此為本當今天下無虞年糓豐稔薄賦歛少征役此乃合於王道為政之要莫過於此帝曰政道莫尚於無為又問曰禹湯何以興桀紂何以亡徳棻對曰傳稱禹湯罪已其興也勃焉桀紂罪人其亡也忽焉二主惑於妺喜妲己誅戮諫者造炮烙之刑以是而亡帝甚恱各賜以繒帛叚秀實建中初為司農卿見禁兵寡少不足以備非常乃上疏曰臣聞天子曰萬乘諸侯曰千乘大夫曰百乘此葢以大制小以十制一也尊君卑臣強幹弱枝之義在於此矣今外有不庭之虜内有梗命之臣竊觀禁兵不精其數全少卒有患難将何待之且猛虎所以百獸畏者為爪牙也若去其爪牙則犬彘馬牛悉能為敵伏願少留聖慮兾裨萬一其後涇原兵作亂召神䇿六軍遂無一人至者秀實守節不回竟没於賊其明畧義烈如此薛珏貞元初為司農卿時詔天下舉可任刺史縣令者殆百人有詔令與群官詢考珏乃延問人間疾苦及胥吏得失取其有惻隠通逹事理者條舉十纔一二宰相将以詞䇿校之珏曰求良吏不可兼責以文學宜以聖君愛人之本為心執政卒無以難之皆叙進官頗多稱職蒋乂為祕書監在朝三十年前後每有大政大議宰臣不能裁决者必召以諮訪乂徴引典故以叅時事多合其宜冊府元龜卷六百二十四
