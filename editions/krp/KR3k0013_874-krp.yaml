body:
  text: 册府元龜卷八百七十四宋王欽若等撰總録部訟寃第三魏樂詳河東人杜恕以齊王嘉平初為幽州刺史持節䕶烏丸校尉時征西將軍程喜屯薊尚書袁侃等戒恕曰程申伯處先帝之世傾田園讓於青州足下今俱仗節使共屯一城宜深有以待之而恕不以為意至官未期有鮮卑大人兒不繇關塞徑將數十騎詣州州斬所從來小子一人無表言上喜於是劾奏恕下廷尉當死以父畿勤事水死免為庶人徙章武郡卒於徙所詳年九十餘上書訟畿之遺績朝廷感焉詔封恕子預為豐樂亭侯邑百戸吳駱統為將軍先是張温以輔義中郎將使蜀還大帝隂銜温稱美蜀政又嫌聲名太盛衆庶炫惑恐終不為己用思有以中傷之㑹暨豔事起因此發舉豔字子林亦吳郡人也温引致之以為選曹郎至尚書豔性狷厲好為清議見時郎署混濁淆雜多非其人欲臧否區别賢愚異貫彈射百寮覈選三署率皆貶髙就下降損數等其守故者十未能一其居位貪鄙志節汙卑者皆以為軍吏置營府以處之而怨憤之聲積浸潤之譖行矣競言豔及選曹郎徐彪専用私情憎愛不繇公理吳録曰彪字仲虞廣陵人豔彪皆坐自殺温宿與豔彪同意數交書疏聞問往還即罪温帝幽之有司下令曰昔令召張温虚已待之既至顯授有過舊臣何圖凶醜専挾異心昔暨豔父兄附于惡逆寡人無忌故進而任之欲觀豔何如察其中間形熊果見而温與之結連死生豔所進退皆温所為頭角更相表裏共為腹背非温之黨即就疵瑕為之生論又前任温董督三郡指撝吏客及殘餘兵時恐有事欲令速歸故授棨㦸奬以威柄乃便到豫章表討宿惡寡人信受其言特以繞帳帳下解煩兵五千人付之後聞曹丕自出淮泗故豫勑温有急便出而温悉内諸將布於深山被命不至賴丕自退不然已往豈可深計又殷禮者本占候召而温先後乞將到蜀扇揚異國為之譚論又禮之還當親本職而令守尚書戸曹郎如此署置在温而已又温語賈原當薦卿作御史語蔣康當用卿代賈原専衒賈國恩為己形勢揆其姦心無所不為不忍暴於市朝今斥還本郡以給厮吏嗚呼温也免罪為幸統表理温曰伏惟陛下天生明徳神啟聖心招髦秀於四方置俊乂於宫朝多士既受普篤之恩張温又蒙最隆之施而温自招罪譴孤負榮遇念其如此誠可悲疚然臣周旋之間為國觀聽深知其狀故密陳其理温實心無他情事無逆迹但年紀尚少鎭重尚淺而戴赫烈之寵體卓偉之才亢臧否之譚効褒貶之議於是務勢者妬其寵爭名者嫉其才𤣥黙者非其譚瑕釁者諱其議此臣下所當詳辨明朝所當究察也昔賈誼至忠之臣也漢文大明之君也然而綘灌一言賈誼逺退何者疾之者深譖之者巧也然而誤聞於天下失彰於後世故孔子曰為君難為臣不易也温雖智非從横武非虓虎然其𢎞雅之素英秀之徳文章之采論議之辯卓犖冠羣煇曄曜世世人未有及之者也故論温才即可惜言罪則可恕若忍威烈以赦盛徳宥賢才以敦大業故明朝之休光四方之麗觀也國家之於暨豔不内之忌族猶等之平民是故先見用於朱治次見舉於衆人中見任於明朝亦見交於温也君臣之義義之最重朋友之交交之最輕者也國家不嫌於豔為最重之義是以温亦不嫌於豔為最輕之交也時世寵之於上温竊親之於下也夫宿惡之民放逸山險則為勁冦將置平土則為健兵故温念在欲取宿惡以除勁冦之害而増健兵之銳也但自錯落功不副言然計其送兵以比許晏數之多少温不減之用之彊羸温不下之至於遲速温不後之故得及秋冬之月赴有警之期不敢忘恩而遺力也温之到蜀共譽殷禮雖臣無境外之交亦有可原也境外之交謂無君命而私相從非國事而隂相聞者也若以命行既修君好因敘已情亦使臣之道也故孔子使鄰國則有私覿之禮季子聘諸夏亦有燕譚之義也古人有言欲知其君觀其所使見其下之明明知其上之赫赫温若譽禮能使彼歎之誠所以昭我臣之多良明使之得其人顯國人於異境揚君命於他邦是以晉趙文子之盟于宋也稱隨㑹於屈建楚王孫圉之使于晉也譽左史於趙鞅亦向他國之輔而歎本邦之臣經傳美之以光國而不譏之以外交也王靖内不憂時外不趨事温彈之不私推之不假於是與靖遂為大怨此其盡節之明驗也靖兵衆之勢幹任之用皆勝於賈原蔣康温尚不容私以安於靖豈敢賣恩以協原康邪又原在職不勤當事不堪温數對以醜色彈以急聲若其誠欲賣恩作亂則亦不必貪原也凡此數者較之於事既不合參之於衆亦不驗臣竊念人君雖有聖哲之姿非常之智然以一人之身御兆民之衆從深宫之内瞰四國之外昭羣下之情求萬機之理猶未易周也固當聽察羣下之言以廣聰明之烈今者人非温既殷勤臣是温又契濶辭則俱巧意則俱至各自言欲為國誰其言欲為私倉卒之間猶難即别然以殿下之聰叡察謀論之曲直若潛神留思纎粗研核情何嫌而不宣事何昧而不昭哉温非親臣臣非愛温者也昔之君子皆抑乎私忿以増君明彼獨行之於前臣恥廢之於後故遂發宿懐於今日納愚言於聖聽實盡心於明朝非有念於温身也帝終不納劉助為左將軍朱據典軍吏嘉禾中始鑄大錢一當五百後據部曲應受三萬緡工王遂詐而受之典校吕壹疑據實取拷問主者死於杖下據哀其無辜厚棺斂之壹又表據吏為據隱故厚其殯大帝數責問據據無以自明藉草待罪數月助覺言王遂所取帝大感寤曰朱據見枉况吏民乎乃窮治壹罪賞助百萬晉叚灼字休然魏末為鄧艾鎭西司馬從艾破蜀有功累遷議郎艾為鍾㑹所搆而死武帝即位泰始中灼上疏追理艾曰故征西將軍鄧艾心懐至忠而荷反逆之名平定巴蜀而受三族之誅臣竊悼之惜哉言艾之反也以艾性剛急矜功伐善而不能協同朋類輕犯雅俗失君子之心故莫肯理之臣敢昧死言艾所以不反之狀艾本屯田掌犢人宣皇帝㧞之於農吏之中顯之於宰府之職處内外之官據文武之任所在輙有名績固足以明宣皇帝之知人矣㑹值洮西之役官兵失利刺史王經困於圍城之中當爾之時二州危懼隴右懔懔幾非國家之有也先帝以為深憂重慮思惟可以安邊殺敵莫賢於艾故授之以兵馬解狄道之圍圍解留屯上邽承官軍大敗之後士卒破膽將吏無氣倉庫空虚器械殫盡艾欲積榖彊兵以待有事是歳少雨又為區種之法手執耒耜率先將士所統萬數而身不離僕虜之勞親執士卒之役故落門叚谷之戰能以少擊多摧破彊賊斬首萬計遂委艾以廟勝成圖指受長策艾受命忘身龍驤麟振前無堅敵蜀地險阻山髙谷深而艾歩乗不滿二萬束馬懸車自投死地勇氣凌雲將士乗勢故使劉禪震怖君臣面縳軍不踰時而巴蜀蕩定此又固足以彰先帝之善任矣艾功名已成亦當書之竹帛傳祚萬世七十老公復何所求哉艾以禪初降逺郡未附矯令承制權安社稷雖違常科有合古義原心定罪事可詳論故鎭西將軍鍾㑹有吞天下之心恐艾威名知必不同因其疑似搆成其事艾被詔書即遣彊兵束身就縳不敢顧望誠自知奉見先帝必無當死之理也㑹受誅之後艾參佐官屬部曲將吏愚贛相聚自共追艾破壊檻車解其囚執艾在困地是以狼狽失據夫反非小事若懐惡心即當謀及豪傑然後乃能興動大衆不聞艾有腹心一人臨死口無一言獨受腹背之誅豈不哀哉故見之者垂涕聞之者歎息此賈誼所以慷慨於漢文天下之事可為痛哭者良有以也陛下興龍闡𢎞大度受誅之家不拘敘用聽艾立後祭祀不絶昔秦人憐白起之無罪吳人傷子胥之寃酷皆為之立祠天下之人為艾悼心痛恨亦繇是也謂可聽艾門生故吏收艾尸柩歸葬舊墓還其田宅以平蜀之功繼封其後使艾闔棺定諡死無所恨赦寃魂于黄泉收信義于後世則天下徇名之士思立功之臣必投湯火樂為陛下死矣帝省表甚嘉其意樊震以積射將軍出為西戎牙門得見辭武帝帝問震所繇進震自陳曾為鄧艾伐蜀時帳下將帝遂尋問艾震具申艾之忠言之流涕先是以艾孫朗為丹水尹繇此遷為定陵令閻纘字續伯惠帝時為西戎校尉司馬愍懐太子之廢也纘輿棺詣闕上書理太子之寃曰伏見赦文及牓下前太子遹手疏以為驚愕自古以來臣子悖逆未有如此之甚也幸賴天慈全其首領臣伏念遹生於聖父而至此者繇於長養深宫沉淪富貴受饒先帝父母驕之每見選師傅下至羣吏率取膏粱擊鐘鼎食之家希有寒門儒素如衞綰周文石奮疏廣洗馬舎人亦無汲黯鄭莊之比遂使不見事父事君之道臣案古典太子居以士禮與國人齒以此明帝王欲令知先賤然後乃貴自頃東宫亦微太盛所以致敗也非但東宫歴觀諸王師友文學皆豪族力能得者率非龔遂王陽能以道訓友無亮直三益之節官以文學為名實不讀書但共鮮衣好馬縱酒髙㑹嬉遊博弈豈有切磋能相長益臣常恐公族陵遲以此歎息今遹可以為戒恐其被斥棄逐逺郊始當悔過無所復及昔戾太子無狀稱兵距命而壺關三老上書有田千秋之言猶曰子弄父兵罪應笞爾漢武感悟之築思子之臺今遹無狀言語悖逆受罪之日不敢失道猶為輕于戾太子尚可禁持重選保傅如司空張華道徳深逺乃心忠誠以為之師光禄大夫劉寔寒苦自立終始不衰年同吕望經籍不廢以為之保尚書僕射裴頠明允恭肅體道居正以為之友置游談文學皆選寒門孤宦以學行自立者及取服勤更事渉履艱難事君事親名行素聞者使與共處使嚴御史監䕶其家絶貴戚子弟輕薄賓客如此左右前後莫非正人師傅文學可令十日一講使共論議於前勑使但道古今孝子慈親忠臣事君及思愆改過之義皆聞善道庶幾可全昔太甲有罪放之三年思康克復為殷明王又魏文帝懼於見廢夙夜自祗竟能自全及至明帝因母得罪廢為平原侯為置家臣庶子師友文學皆取正人共相匡矯兢兢愼罰事父以孝父没事母以謹聞于天下于今稱之漢髙皇帝數置酒于庭欲廢太子後四皓為師子房為傅竟復成就前事不忘後事之戒孟軻有云孤臣孽子其操心也危慮患也深故多善功李斯云慈母多敗子嚴家無格虜繇陛下驕遹使至於此庶其受罪以來足自思改方今天下多虞四夷未寧將伺國隙儲副大事不宜空虚宜為大計小復停留先加嚴誨依平原侯故事若不悛改棄之未晚也臣素寒門無力仕宦不經東宫情不私遹念昔楚國處女諫其王曰有龍無尾言年四十未有太子臣嘗備近職雖未能自結天日情同閽寺悾悾之誠皆為國計臣老母見臣為表乃為臣卜卦云書御即死妻子守臣涕泣見止獨以為頻見㧞擢嘗為近職此恩難忘何以報徳惟當陳誠以死獻忠輙具棺絮伏須刑誅書御不省石崇為黄門郎兄統忤扶風王駿有司承㫖奏統將加重罰既而見原以崇不詣闕謝恩有司復欲加統罪崇自表曰臣兄統以先父之恩早被優遇出入清顯歴位盡勤伏度聖心有以垂察近為扶風王駿横所誣謗司𨽻中丞等飛筆重奏劾案深文累塵天聽臣兄弟跼蹐憂心如悸駿戚屬尊重權要赫奕内外有司望風承㫖茍有所惡易於投卵自統枉劾以來臣兄弟不敢一言稍自申理戢舌鉗口惟須刑書古人稱榮華於順㫖枯槁於逆違誠哉斯言於今信矣是以雖董司直繩不能不深其文抱枉含謗不得不輸其理幸賴陛下天聽四達靈鑒昭逺存先父勲徳之重察臣等勉勵之志中詔申料罪譴澄雪臣等刻肌碎首未足上報臣即以今月十四日與兄統駿等詣公車門拜表謝恩伏度奏御之日暫經聽覽此月二十日忽被蘭臺禁止符以統蒙宥恩出非常臣晏然私門曾不陳謝復見彈奏訕辱理盡臣始聞此惶懼狼狽靜而思之固無怪也茍尊勢所驅何所不至望奉法之直繩不可得也臣以凡才累荷顯重不能負戴折薪以答萬分一月之中奏劾頻加曲之與直非臣所計所愧不能承奉戚屬自䧟於此不媚於竈實愧王孫隨巢子稱明君之徳察情為上察事次之所懐具經聖聽伏待罪黜無所多言繇是事解傅咸為中丞秦王東薨郎中令李含依臺儀葬訖除喪尚書趙浚有内寵疾含不事已遂奏含不應除喪本州大中正傅祗以名義貶含咸上表理含曰臣州秦國郎中令始平李含忠公清正才經世務實有史魚秉直之風雖以此不能協和流俗然其名行峻厲不可得掩二郡並舉孝廉異行尚書郭奕臨州含寒門少年而奕超為别駕太保衞瓘辟含為掾每語臣曰李世容含字也當為晉匪躬之臣秦王之薨悲慟感人百僚㑹喪皆所目見而今以含俯就王制謂之背戚居榮奪其中正天王之朝既葬不除藩國之喪既葬而除藩國欲同不除乃當責引尊準卑非所宜言爾今天朝告于上欲令藩國服于下此為藩國之義隆而天朝之禮薄也又云諸王公皆終喪禮寧盡乃敘明以喪制宜隆務在敦重也夫寧盡乃敘明以哀其病爾異於天朝制使終喪未見斯文國制既葬而除既除而祔爰自漢魏迄于聖晉文皇仙去武帝升遐世祖過哀陛下毁頓銜疚諒闇以終三年率土臣妾豈無攀慕遂服之心實以國制不可以踰故於既葬不敢不除天王之喪釋除于上藩國之臣獨遂于下此不可安復以秦王無後含應為喪主而王喪既除而祔則應吉祭因曰王未有廟主不應除服秦王始封無所連祔靈主所居即便為廟不問國制云何而以無廟為貶以含今日之所行移博士使案禮文必也放勲之殂遏密三載世祖之喪數旬即吉引古繩今闔世有貶何但李含不應除服今也無貶王制故也聖上諒闇哀聲不輟股肱近侍猶宜心喪不宜便行婚娶歡樂之事而莫云者豈不以大制不可以曲邪且前以含有王喪上為差代尚書勑王葬日在近葬訖含應攝職不應差代葬訖含猶躊躇司徒屢罰訪問促含攝職而隨擊之此為臺勑府符䧟含於惡若謂臺府為傷教義則當據正不正符勑惟含是貶含之困躓尚可惜乎國制不可偏爾又含自以隴西人雖户屬始平非所綜悉自初見使為中正反覆言辭說非始平國人不宜為中正後為郎中含又自以選官引臺府為比以讓常山太守蘇韶辭意懇切形于文墨含之固讓乃在王未薨之前葬後躊躇窮於對罰而攝職爾臣從弟祗為州都督意在欲隆風教議含已過不良之人遂相扇動冀挾名義法外致案足有所邀中正龎騰便割含品臣雖無祁大夫之徳見含為騰所侮謹表以聞乞朝廷以時博議令騰得妄弄刀尺帝不從含遂被貶退割為五品劉繇為太保衞瓘主簿瓘與汝南王亮共輔朝政亮奏遣諸王還藩與朝臣廷議無敢應者惟瓘贊其事楚王瑋繇是憾焉賈后素怨瓘且忌其方直不得騁已淫虐又聞瓘與瑋有隙遂謗瓘與亮欲為伊霍之事啟惠帝作手詔使瑋免瓘等官黄門齎詔授瑋瑋性輕險欲騁私怨夜使清河王遐收瓘左右疑遐矯詔咸諫曰禮律刑名台輔大臣未有此比且請距之須自表得報就戮未晚也瓘不從遂與子常岳裔及孫等九人同被害時年七十二繇冐難收瓘而葬之初瓘為司空時帳下督榮晦有罪瓘斥遣之及難作隨兵討瓘故子孫皆及于禍楚王瑋之伏誅也瓘女與國臣書曰先公名諡未顯無異凡人每怪一國蔑然無言春秋之失其咎安在悲憤感慨故以示意於是繇等執黄幡撾登聞鼓上言曰初矯詔者至公承詔當免即便奉送章綬雖有兵仗不施一刃重勑出第單車從命如矯詔之文惟免官右軍已下即承詐偽違其本文輙戮宰輔不復表上横收公子孫輒皆行刑賊害大臣父子九人伏見詔書為楚王所誑誤非本同謀者皆施遣如書之㫖謂里舎人被驅逼齎白杖者爾律受教殺人不得免死况乎手害功臣賊殺忠良雖云非謀理所不赦今元惡雖誅殺賊猶存臣懼有司未詳事實或有縱漏不加精盡使公父子讐賊不滅寃魂永恨訴於穹蒼酷痛之臣悲於明世臣等身被創痍殯斂始訖謹條瓘前在司空時帳下給使榮晦無情被黜知瓘家人數小孫名字晦後轉給右軍其夜晦在門外揚聲大呼宣詔免公還第及門開晦前到中門復讀所齎偽詔手取公章綬貂蟬催公出第晦案次録瓘家口及其子孫皆兵仗將送著東亭道北圍守一時之間便皆斬斫害公子孫實繇于晦及將人劫盗府庫皆晦所為考晦一人衆姦皆出乞驗盡情偽加以族誅詔從之朝廷以瓘舉門無辜受禍乃追瓘伐蜀勲封蘭陵郡公増邑三千户諡曰成贈假黄鉞摯虞為衞尉卿先是司空張華為趙王倫所害及倫與孫秀伏誅齊王冏輔政虞致箋於冏曰間於張華没後入中書省得華先帝時答詔本草先帝問華可以輔政持重待以後事者華答明徳至親莫如先王宜留以為社稷之鎭其忠良之謀欵誠之言信於幽㝠没而後彰與茍且隨時者不可同世而論也議者有責華以愍懐太子之事不抗節廷爭當此之時諫者必得違命之死先聖之教死而無益者不以責人故晏嬰齊之正卿不死崔杼之難季札吳之宗臣不爭逆順之理理盡而無所施者固聖教之所不責也冏於是奏曰臣聞興微繼絶聖王之髙政貶惡嘉善春秋之美義是以武王封比干之墓表商容之閭誠幽明之固有以相通也孫秀逆亂滅佐命之國誅骨鯁之臣以斵喪王室肆其虐戾功臣之後多見泯滅張華裴頠各以見憚取誅於時解系解結同以羔羊並被其害歐陽建等無罪而死百姓憐之今陛下更日月之光布惟新之命然此等諸族未蒙恩理昔欒郤降在皁𨽻而春秋傳其違幽王絶功臣之後棄賢者子孫而詩人以為刺臣備忝在職思納愚誠若合聖意可令羣官通議議者各有所執而多稱其寃壯武國臣竺道又詣長沙王求復華爵位依違者久之太安二年詔曰夫愛惡相攻佞邪醜正自古而有故司空壯武公華竭盡忠貞思翼朝政謀謨之勲每事賴之前以華弼濟之功宜同封建而華固讓至于八九深陳大制不可得爾終有顛敗危辱之慮辭義懇誠足勸逺近華之至心誓於神明華以伐吳之勲受爵於先帝後封既非國體又不宜以小功踰前大賞華之見害俱以姦逆圖亂濫被枉賊其復華侍中中書監司空公廣武侯及所没財物與印綬符策遣使弔祭之齊王冏以淮南王允起兵討趙王倫遇害及倫誅冏上表理允曰故淮南王允忠孝篤誠憂國忘身討亂奮發幾於尅捷遭天凶運奄至隕没逆黨遘惡并害三子寃魂酷毒莫不悲酸自興義兵淮南國人相率領衆過萬人人懐慷慨愍國統滅絶發言流涕臣輒以息超繼允後以慰存亡有詔改葬賜以殊禮追贈司徒崔悅盧諶並為劉琨從事中郎琨為叚疋磾所害時朝廷以疋磾尚彊為國討石勒不舉琨喪三年悅等上奏理琨曰臣聞經國之體在於崇明典刑立政之務在於固愼關塞况方岳之臣殺生之柄而可不正其枉直以杜其姦邪哉竊見故司空廣武侯琨在惠皇帝擾攘之際值羣后鼎沸之難戮力皇家義誠彌厲躬統華夷親受矢石石超授首吕朗面縳社稷克寧鑾輿反駕奉迎之勲琨實為隆此琨效忠之一驗也其後并州刺史東嬴公騰以晉川荒匱移鎭臨漳太原西河盡徙三魏琨受任并州屬承其弊到官之日遺戸無幾當易危之勢處難濟之土鳩集傷痍撫和戎狄數年之間公私漸振㑹京都失守羣逆縱逸邊萌頓仆茍懐宴安咸以為并州之地四塞為固且可閉關守險畜資養徒抗辭厲聲忠亮奮發以為天子沉辱而不殞身死節情非所安遂乃䟦履山川東西征討屠谷乗虛晉陽沮潰琨父母罹屠戮之殃門族受殱夷之禍向使琨從州人之心為自守之計則聖朝未必加誅而族黨可以不喪及猗盧敗亂晉人歸奔琨於平城納其初附將軍箕澹又以為此雖晉人久在荒裔難以法整不可便用琨又讓之義形於色假從澹議偷於茍存則晏然於并土必不亡身於燕薊也琨自以備位方岳綱維不舉無縁虚荷大任坐居三司是以陛下登阼更引愆告遜前後章表具陳誠欵尋令從事中郎臣續澹以章綬節傳奉還本朝與疋磾使榮邵期一時俱發又疋磾以琨王室大臣懼奪已威重忌琨之形漸彰于外琨知其如此慮不可久欲遣妻息大小盡詣京城以其門室一委陛下有征舉之㑹則身充一卒若疋磾從凶慝則妻息可免具令臣澹密宣此㫖求詔勑路次令相迎衞㑹王成從平陽逃來說南陽王保稱號隴右士衆甚盛當移關中疋磾聞此私懐顧望留停榮邵欲遣前兼鴻臚邊邈奉使詣保懼澹獨南言其此事遂不許引路丹誠赤心卒不上達疋磾兄眷喪亡嗣子幼弱欲因奔喪奪取其國又自以欺國陵家懐邪樂禍恐父兄宗黨不容其罪是以卷甲櫜弓隂圖作亂欲害其從叔驎從弟末波等以取其國疋磾親信密告驎波驎波乃遣人距之疋磾僅以身免百姓謂疋磾已没皆憑向琨若琨于時有害疋磾之情則居然可擒不復勞于人力自此之後上下並離疋磾遂欲盡勒胡晉徙保上谷琨深不然之勸移厭次南憑朝廷疋磾不能納反禍害父息四人從兄二息同時并命琨未遇害知疋磾必有禍心語臣等云受國厚恩不能克報雖才畧不及亦繇遇此厄運人誰不死死生命也惟恨下不能效節於一方上不得歸誠於陛下辭㫖慷慨動於左右疋磾既害琨横加誣謗言琨欲闚神器謀圖不軌琨既無述囂頑凶之思又無信布懼誅之情踦􅛤亂亡之際脅肩異類之間而有如此之心哉雖臧獲之愚厮養之智猶不為之况在國士之列忠節先著者乎疋磾之害琨稱陛下密詔琨信有罪陛下加誅自當肆諸市朝與衆棄之不令殊俗之䜿戮台輔之臣亦已明矣然則擅詔有罪雖小必誅矯制有功雖大不論正以興替之根咸在於此開塞之繇不可不閉故也而疋磾無所顧忌怙亂専殺虚假王命虐害鼎臣辱諸夏之望敗王室之法是可忍也孰不可忍若聖朝猶加隱忍未明大體則不逞之人襲疋磾之跡殺生自繇好惡任意陛下將何以誅之哉折衝厭難惟存戰勝之將除暴討亂必須智畧之臣故古語云山有猛獸藜藿為之不採非虚言矣自河以北幽并以南醜類有所顧憚者惟琨而已琨受害之後羣凶欣欣莫不得意鼓行中州曾無纎介此又華夷小大所以長歎者也伏惟陛下叡聖之隆中興之緒方將平章典刑以經序萬國而琨受害非所寃痛已甚未聞朝廷有以甄論昔壺關三老訟衞太子之罪谷永劉向辨陳湯之功下足以明功罪之分上足以悟聖主之懐臣等祖考以來世受殊遇入侍翠幃出簮彤管弗克負荷播越遐荒與琨周旋接事終始是以仰慕三臣在昔之義謹陳本末冐以上聞仰希聖朝曲賜哀察太子中庶子温嶠又上疏理之帝乃下詔曰故太尉廣武侯劉琨忠亮開濟乃誠王家不幸遭難志節不遂朕甚悼之往以戎事未加弔祭其下幽州便依舊弔祭贈侍中太尉諡曰愍髙崧為太學博士父艱去職初崧父悝位至丹陽尹封建昌伯以納妾致訟被黜及終崧乃自繫廷尉訟寃遂停喪五年不葬表疏數十上帝哀之乃下詔曰悝備位大臣違憲被黜事已久判其子崧求直無已今特聽復伯爵繇是見稱陶侃為龍驤將軍拜荆州刺史參軍王貢與杜曾舉兵反擊侃侃敗坐免官王敦表以侃白衣領職侃復率周訪等進軍入湘使都尉楊舉為先驅擊杜弢大破之屯兵于城西侃之佐史辭詣王敦曰州將陶使君孤根特立從微至著忠允之功所在有效出佐南夏輔翼劉征南前遇張昌後屬陳敏侃以偏旅獨當大冦無征不尅羣醜破滅近者王如亂北杜弢跨南二征奔走一州星馳其餘郡縣所在土崩侃招擕以禮懐逺以徳子來之衆前後累至奉承指授獨守危阨人往不動人離不散往年董督徑造湘城志凌雲霄神機獨斷徒以軍少糧懸不果獻捷然杜弢慴懼來經夏口未經信宿建平流人迎賊俱叛侃即廻軍遡流芟夷醜類至使西門不鍵華圻無虞者侃之功也明將軍愍此荆楚救命塗炭使侃統領窮殘之餘寒者衣之饑者食之比屋相慶有若挾纊江濵孤危地非重險非可單軍獨能保固故移就髙苲以避其衝賊輕易先至大衆在後侃距戰經日殺其名帥賊尋犬羊相結并力來攻侃以忠臣之節義無顧退被堅執銳身當戎行將士奮擊莫不用命當時死者不可勝數賊衆參伍更息更戰侃以孤軍一隊力不獨禦量宜取全以俟後舉而主者責侃重加黜削侃性謙冲功成身退今奉還所受惟恐稽遲然某等區區實恐理失於内事敗於外毫釐之差將致千里使荆蠻乖離西嵎不守唇亡齒寒侵逼無限也敦於是奏復侃官周札為㑹稽内史兄子筵為吳興内史札一門五侯並居列位王敦深忌憚之使人告札及其諸兄謀圖不軌殺之及敦死札筵故吏並詣闕訟周氏之寃宜加贈諡事下八座從司徒王導議追贈札衞尉遣使者祠以少牢周謨為後軍將軍初兄左僕射䕶軍將軍顗為王敦所害王敦死後詔贈戴若思譙王承等而未及顗謨上疏曰臣亡兄顗昔蒙先帝顧眄之施特垂表啓以參戎佐顯居上列遂管朝政並與羣后共隆中興仍典選曹重蒙寵授忝位師傅得與陛下揖讓抗禮恩結特隆加以鄙族結婚帝室義深任重庶竭股肱以報所受凶逆所忌惡直醜正身䧟極禍忠不忘君守死善道有隕無二顗之云亡誰不痛心况臣同生能不哀結王敦無君繇來實久元惡之甚古今無二幸賴陛下聖聰神武故能摧破凶彊撥亂反正以寧區宇前軍事之際聖恩不遺取顗息閔得充近侍臣時面啓欲令閔還襲臣亡父侯爵時卞壼庾亮並侍御坐壼云事了當論顯贈時未淹久言猶在耳至於譙王承甘卓已蒙清復王澄久逺猶在論議况顗忠以衞主身死王事雖嵇紹之不違難何以過之至今不聞復封加贈褒顯之言不知顗有餘責獨負殊恩為朝廷急于時務不暇論及此所以痛心疾首重用哀歎者也不勝辛酸冐陳愚欵疏奏不報謨復重表然後追贈顗官桓稚為佐著作郎先是荆州刺史王澄為王敦所害及敦平稚澄故吏也上表理澄請加贈詔復澄本官諡曰憲顧悅之殷浩故吏也浩廢為庶人卒後將改葬悅之上疏訟浩曰伏見故中軍將軍揚州刺史殷浩體徳沉粹識理淹長風流雅勝聲葢當時再臨神州萬里肅清勲績茂著聖朝欽加遂授分陜推轂之任戎旗既建出鎭壽陽驅其豺狼翦其荆棘收羅向義廣開屯田沐雨櫛風等勤臺僕仰憑皇威羣醜革面進軍河雒修復園陵不虞之變中路猖蹶遂令為山之功摧於垂成忠欵之志於是而廢既受削黜自擯山海杜門終身與世兩絶可謂克己復禮窮而無怨者也尋浩所犯葢負敗之常科非即情之永責論其名徳深誠則如彼察其補過罪已則如此豈可棄而不䘏使法有餘寃方今宅兆已成埏隧已開懸棺而窆禮同庶人存亡有非命之分九泉無自訴之期仰感三良昊天罔極若使明詔爰發旌我善人崇復本官逺彰幽昧斯則國家威恩有兼濟之美死而可作無負心之恨疏奏詔遣復浩本官悅之歴尚書右丞卒殷融為丹陽尹先是尚書令刁協性剛與物多忤每崇上抑下故為王氏所疾及王敦搆逆上疏罪協元帝流涕勸令避禍行至江東為人所殺敦平後周顗戴若思等皆被顯贈惟協以出奔不在其例咸康中協子彞上疏訟之在位者多以明帝之世褒貶已定非所得更議且協不能抗節殞身乃出奔遇害不可復其官爵也融議曰王敦惡逆罪不容誅則協之善亦不容賞若以忠非良圖謀事失筭以此為責者葢在於譏議之間爾即凶殘之誅以為國刑將何以沮勸乎當敦専逼之時慶賞威刑専自己出是以元帝慮深崇本以協為比事繇國計葢不為私昔孔寧儀行父從君於昏楚復其位者君之黨故也况協之比君在於義順且中興四佐位為朝首于時事窮計屈奉命追冦非為逃刑謂宜顯贈以明忠義時庾冰輔政疑不能决左光禄大夫蔡謨與冰書曰夫爵人者宜顯其功罰人者宜彰其罪此古今之所慎也凡小之人猶尚如此刁令中興上佐有死難之名天下不聞其罪而見其貶致令刁氏稱寃此乃為王敦復讐也内沮忠臣之節論者惑之若實有大罪宜顯其事令天下知之明聖朝不貶死難之臣春秋之義以功補過過輕功重者得以加封功極過重者不免誅絶功足贖罪者無黜雖先有邪佞之罪而臨難之日黨於其君者不絶之也孔寧儀行父親與靈公淫亂于朝君殺國滅繇此二臣而楚尚納之傳稱有禮不絶其位者君之黨也若刁令有罪重於孔儀絶之可也若無此罪宜見追論或謂明帝之世已見寢廢今不宜復改吾又以為不然夫大道宰世殊塗一致萬機之事或異或同同不相善異不相譏故堯抑元愷而舜舉之堯不為失舜不為非何必前世所廢便不宜改乎漢蕭何之後坐法失侯文帝不封而景帝封之後復失侯武昭二帝不封而宣帝封之近去元年車駕釋奠拜孔子之座此亦元明二帝所不行也又刁令但是明帝所不贈爾非誅之也王平子第伍猗皆元帝所誅而今日所贈豈以改前為嫌乎凡處事者當上合古義下凖今例然後譚者不惑受罪者無怨爾按周僕射戴征西本非王敦唱檄所讐也事定乃見害爾周筵郭璞等並亦非為主禦難也自平居見殺爾皆見褒贈刁令事義豈輕於此乎自頃員外散騎尚得追贈况刁令位亞三司若先自壽終不失員外散騎之例也就不蒙贈不失以本官殯葬也此為一人之身壽終則蒙贈死難則見絶豈所以明事君之道厲為臣之節乎宜顯評其事以解天下疑惑之論又聞譚者亦多謂宜贈凡事不允當而得衆助者若善柔得衆而刁令麄剛多怨若以貴也刁氏今賤若以富也刁氏今貧人士何故反助寒門而此言之足下宜察此意冰然之事奏成帝詔曰協情在忠主而失為臣之道故令社稷受屈元皇銜恥致禍之原豈不有繇若極明國典則曩刑非重今正當以協之勤有可書敦之逆命不可長故議其事爾今可復協本位加之册祭以明有忠於君者纎介必顯雖於貶裁未盡然或足有勸矣於是追贈本官祭以太牢呼延謨為前趙陜都太守先是陜婦人不知姓字年十九嫠居陜縣事叔姑甚謹其家欲嫁之此婦毁面自誓後叔姑病死其叔姑有女在夫家先從此婦乞假不得因而誣殺其母有司不能察而誅之時有羣鳥悲鳴尸上其聲甚哀盛夏暴尸十日不腐亦不為蠱獸所敗其境乃經歳不雨及謨為太守訪知其寃乃斬此女設少牢以祭其墓諡曰孝烈卓婦其日大雨册府元龜卷八百七十四
