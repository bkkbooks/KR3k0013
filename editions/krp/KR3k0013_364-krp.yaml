body:
  text: 册府元龜卷三百六十四宋王欽若等撰將帥部機畧第四後魏李先明元永興中為安東將軍與上黨王長孫道生率衆襲馮跋乙連城尅之悉虜其衆乃進討和龍先言於道生曰宜密使兵人人備青草一束各五尺圍用填城塹攻其西南絶其外援勒兵急攻賊必可擒道生不從遂掠民而還蒲城侯崙太武時為統萬鎮將從永昌王仁南征别出汝隂濟淮宋將劉康祖屯於慰武亭以邀軍路師人患之崙曰今大風既勁若令推草車方軌並進乗風縱火以精兵自後乗之破必矣從之斬康祖𫝊首行宫沛郡公禎為司衛監從太武征蠕蠕忽遇賊别部多少不敵禎乃就山解鞍放馬以示有伏賊果疑而避之古弼為安西將軍從太武征赫連定駕至平涼次于涇南遣弼與侍中張黎擊平涼赫連定自安定率歩騎二萬来救與弼等相遇弼偽退以誘之太武使髙車勅勒馳擊定斬首數千級弼乗勝取安定陸俟為内都大官安定盧永劉超等聚黨萬餘人以叛太武以俟威恩被於關中詔以本官加都督秦雍諸軍事鎮長安太武曰秦川險絶奉化日近吏民未被恩惠故頃年已来頻有叛動今劉超等恃險不順王命朕若以重兵與卿則超等必合而為一據險拒戰未易攻也若以輕兵與卿則不制矣今使卿以方畧定之於是俟單馬之鎮超等聞之大欣以為無能為也既至申揚威信示以成敗誘納超女外若姻親超猶自驚初無降意俟乃率其帳下往見超觀其舉措設掩襲之計超使人逆曰三百人以外當以弓馬相待三百人以内當以酒食相供俟乃將二百騎詣超設備甚嚴俟遂縱酒盡醉而還後謂將士曰超可取也乃密選精兵五百人陳國恩德激厲將士言至懇切士卒奮勇各曰以死從公必無二也遂偽獵詣超與士卒約曰今㑹發機當以醉為限俟於是詐醉上馬大呼手斬超首士卒應聲縱擊殺傷千數遂平之太武大悦源賀為平西將軍太武征涼州以賀為郷導詔問攻戰之計賀對曰姑臧城外有四部鮮卑各為之援然皆是臣祖父舊民臣願軍前宣國威信示其禍福必相率歸降外援既服然後攻其孤城拔之如反掌爾太武曰善於是遣賀率精鋭歴諸部招慰下三萬餘落獲雜畜十餘萬頭及圍姑臧繇是無外慮故得専力攻之涼州平遷征西將軍後為征南將軍時詔都督三道諸軍屯於漠南是時每嵗秋冬遣三道並出以備北冦至春中乃班師賀以勞役京都又非禦邉長計乃上言請募諸州鎮有武健者三萬人復其徭賦厚加賑恤分為三部二鎮之間築城城置萬人給彊弩十二牀武衛三百乗弩一牀給牛六頭武衛一乗給牛二頭多造馬槍及諸器械使武畧大將二人以鎮撫之冬則講武春則種植並戍並耕則兵未勞而有盈畜矣又於白道南三處立倉運近州鎮租粟以充之足食足兵以備不虞於宜為便不可嵗常舉衆連動京師令朝廷常有北顧之慮也事寢不報劉潔為尚書令從太武破蠕蠕大檀于雲中潔言於帝曰大檀恃衆雖破膽奔北恐不懼往敗將復送死請收田訖復一大舉東西並進為二道討之帝然其言濟隂王新成有武畧庫莫奚侵擾詔新成討之新成乃多為毒酒賊逼便棄營而去賊至兢飲遂簡輕騎縱擊俘馘甚多李崇孝文帝時為安東將軍徐州降人郭陸聚黨作逆人多應之騷擾南北崇遣髙平人卜冀州詐稱犯罪逃亡歸於陸陸納之以為謀主數月冀州斬陸送之賊徒潰散後為車騎將軍揚州刺史時梁人於浮山堰淮以灌揚徐水勢日増崇乃於硖石之戍間編舟為橋北更立船樓十各髙三丈十歩置一籬至兩岸蕃板裝治四箱解合賊至舉用不戰解下又於樓船之北連覆大船東西竟水防賊火栰又於八公山之東南更起一城以備大水州人號曰魏昌城中山王英初為梁州刺史孝文時梁州民李天幹等詣英降待以國士之禮天幹等家在南鄭之西請師迎接英遣迎之蕭懿聞而遣將姜脩率衆追襲逮夜交戰頗有殺傷脩後屢敗復更請軍懿遣衆赴之迎者告急英率騎一千倍道赴救未至賊已退還英恐其入城别遣統軍元拔以随其後英徼其前合擊破之盡俘其衆懿續遣軍英不虞賊至且衆力已疲軍少人皆懼咸欲奔走英乃緩騎徐行神色自若登髙望賊東西指麾狀似處分然後整列而前賊心謂有伏兵俄然賊退乗勢追殄遂圍南鄭㑹蕭懿遣將伐獠英統軍為其所敗後英以竒兵掩之盡皆擒獲被勅班師英於是先遣老弱身勒精兵留後遣使與懿告别懿以為詐也英還一日猶閉門不開二日之後懿乃遣將追英英親自殿後與士卒下馬交戰賊衆莫敢逼之四日四夜然後賊退全軍而還後與邢巒討梁將齊茍仁于懸瓠城英既次義陽將取三關英䇿之曰三關相須如左右手若尅一關兩關不待攻而定攻難不如攻易東關易攻宜須先取即黄石公所謂戰如風發攻如河決英恐其并力於東乃使長吏李華率五統向西關分其兵勢自督諸軍向東關先是馬仙琕使雲騎將軍馬廣率衆拒屯於長薄軍主胡文超别屯松峴英至長薄馬廣夜遁入於武陽英進師攻之聞梁遣其冠軍將軍彭瓫生驃騎將軍徐超秀援武陽英乃緩軍曰縱之使入此城吾先曽觀其形勢易攻爾吾取之如拾遺也諸將未之信瓫生等既入武陽英促圍攻之六日而廣等降於是進撃黄峴梁太子左衛率李元履棄城奔竄又討西關梁司州刺史馬仙琕亦即退走果如英䇿凡擒其大將六人支將二十人卒七千人米四十萬石軍資稱是尉元孝文時為都督南征諸軍事征西大將軍元上表曰臣天安之初奉律總戎廓寧淮左海岱既平仍忝徐岳素飱尸祿積有年嵗彼土安危竊所具悉每惟彭城水陸之要江南用兵莫不因之威陵諸夏夫國之大計豫備為先且臣初尅徐方青齊未定從河以南猶懐彼此時劉彧遣張永沈攸之陳顯逹蕭順之等前後數度規取彭城勢連青兖唯以彭城既固而永等摧屈今計彼戍兵多是胡人臣前鎮徐州之日胡人子都將呼延籠達因於負罪便爾叛亂鳩引胡類一時扇動賴靈威遐被罪人斯戮又團城子都將胡人王𠡠懃負釁南叛每懼姦圖狡誘同黨愚誠所見宜以彭城胡軍換取南豫州徙民之兵轉戍彭城又以中州鮮卑増實兵數於事為宜詔曰公之所陳甚合事機其先薛安都以徐州内附以元與孔伯恭赴援元表分兵置戌進定青冀復表曰彭城賊之要藩不有積粟彊守不可以固若儲糧廣戌雖劉彧師徒悉動不敢窺𨵦淮北之城此自然之勢也詔曰待後軍到量宜守防其青冀已遣軍援須待尅定更運軍糧元又有表曰臣前表以下邳水陸所湊先規殄滅遣兵屢討猶未擒定然彭城下邳信命未斷此之戍人元居賊界心尚戀土輒相抗拒或希幸非望南来息耗壅塞不達雖至窮迫仍不肯降彭城民任𤣥明從淮南到鎮稱劉彧遣將任農夫陳顯達領兵三千来循宿豫臣即以其日密遣覘使驗其虚實如明所言臣欲自出擊之以運糧未接又恐新民生變遣子都將于沓劉龍駒等歩騎五千將往赴擊但征人淹久逃亡者多迭相扇動莫有固志器仗敗毁無一可用臣聞伐國事重古人所難功雖可立必須經畧而舉若賊向彭城必繇清泗過宿豫歴下邳趣青州路繇下邳入沂水經東安即為賊用師之要今若先定下邳平宿豫鎮淮南戌東安則青冀諸鎮可不攻而尅若四處不服青冀雖抜百姓狼顧猶懐僥倖之心愚臣以為宜釋青冀之師先定東南之地夏水雖盛無津途可因冬路雖通無髙城可固如此則淮北自舉暫勞永逸傅永孝文時為豫州刺史平南將軍王肅長史齊明帝遣將魯康祚趙公政衆號一萬侵豫州之太倉口肅令永勒甲士三千擊之時康祚等軍於淮南永舎淮北十有餘里永量吴楚之兵好以斫營為事即夜分兵為二部出於營外又以賊若夜来必應於渡淮之所以火記其淺處永既設伏乃密令人以瓠盛火渡淮南岸當深處置之教之云若有火起即亦然之其夜康祚公政等果親率領来斫永營東西二伏夹擊之康祚等奔趣淮水火既競起不能記其本濟遂望永所置之火而争渡焉水深溺死斬首者數千級生擒公政康祚人馬墜淮曉而獲其尸斬首并公政送於京師公政岐州刺史超宗之從兄也時裴叔業率王茂先李定等来侵楚王茂永適還州肅復令永討之永將心腹一人馳詣楚王茂至即令填塞外塹夜伏戰士一千人於城外曉而叔業等至頓於城東列陣將置長圍永所伏兵於左道擊其後軍破之叔業乃令將佐守所列之陣自率精甲數千救之永上門樓觀叔業南行五六里許便開門奮擊遂摧破之叔業進退失圖於是奔走左右欲追之永曰弱卒不滿三千彼精甲猶盛非力屈而敗自墮吾計中爾既不測我之虚寔足喪其膽執俘足矣何假逐之獲叔業傘扇皷幕甲仗萬餘兩月之中遂獻再捷奚康生孝文時為中堅將軍討吐京叛胡辛支追至車突谷康生詐為墮馬胡皆謂死争欲取之康生騰騎奮矛殺數十人胡遂奔北輕騎退走去康生百餘歩彎弓射之應弦而死因俘其牛羊駞馬以萬數辛祥為龍驤府長史帶義陽太守梁將胡武城陶平虜於州南金山之上連營侵逼衆情大懼祥從容曉喻人心遂安時出挑戰偽退以驕賊賊果日来攻逼不復自備乃夜出襲其營將曉矢刄交下賊大分散擒平虜并斬武城以送京師州境獲全楊椿為平西將軍時秦州𦍑吕茍兒涇州屠各陳瞻等聚衆叛詔椿為别將𨽻安西將軍元麗討之賊入隴守溪自固或謀伏兵山徑斷其出入待糧盡而攻之或云斬除山木縱火焚之然後進討椿曰並非計也此本規盗非有經畧自王師一至無戰不摧所以深竄者正避死爾今宜勒三軍勿更侵掠賊必謂我見險不前必輕我軍然後掩其不備可舉而平矣乃緩師不進賊果出掠仍以軍中驢馬餌之不加討逐如是多日隂簡精卒銜枚夜襲斬瞻而𫝊其首椿弟津為定州刺史時賊帥薛脩禮杜雒周殘掠州境津與賊帥元洪業及與賊中督將尉靈根程殺鬼潘法顯等書曉諭之并授鐵劵許以爵位令圖賊帥毛普賢洪業等復書云今與諸人密議欲殺普賢願公聴之又賊欲圍城正為取北人耳城中所有北人必須盡殺公若置之恐縱敵為患矣願公察之津以城内北人雖是惡黨然掌握中物未忍便殺但收内子城防禁而已將吏無不感其仁恕田益宗為征虜將軍宣武景明初梁遣軍王吴子陽率衆㓂三關益宗遣梅與之等擊之獲其二城益宗上表曰臣聞機之所在聖賢弗之疑兼弱攻昧前王莫之捨皆拯羣生於湯炭盛武功於方来然霜葉將淪非勁飈無以速其蘀天之所棄非假手無以殱其人竊惟蕭衍常以君臣交争江外州鎮中分為兩東西抗峙已淹嵗時民庶窮於轉輸兵甲疲於戰鬬事救於目前力盡於麾下維州鎮綱紀庶方藩城碁立孤存而已不乗機電掃廓彼蠻疆恐後之經畧未易於此且夀春雖平三面仍梗鎮守之宜寔須豫設義陽差近淮源利渉津要朝廷行師必繇此道若江南一平有事淮外須乗夏水汎長列舟長淮師赴夀春須從義陽之北便是居我喉要在慮彌深義陽之滅今實時矣度彼衆不過須精卒一萬二千然行師之法貴張形勢請使兩荆之衆西擬随雍揚州之卒頓於建安得捍三關之援然後二豫之軍直據南關對抗延頭遣一都督總諸軍節度季冬進師迄于春末弗過十旬尅之必矣宣武納之遣鎮南元英攻義陽益宗遣其息魯生領步騎八千斷賊糧運并焚其鈞城積聚梁戍主趙文舉率衆拒戰魯生破之獲文舉及小將胡建興古皓莊元仲等斬五千餘級溺死者千五百人食米運舟焚燒殆盡源懐景明中為車騎將軍涼州大中正懐奏曰南賊遊魂江揚職為亂逆肆厥狂悖月滋日甚貴臣重將靡有孑遺崇信姦回昵比閹䜿内外離心骨肉猜叛蕭寳融僭號於荆郢其雍州刺史蕭衍勒兵而東襲上流之衆已逼其郊廣陵京口各持兵而懐兩望鍾離淮隂並鼎峙而觀得失秣陵孤危制不出門君子小人並罹災禍延首北望朝不及夕斯實天啓之期吞并之㑹乗厥蕭墻之釁藉其分離之隙東據歴陽兼指瓜歩緣江鎮戍逹於荆郢然後奮雷電之威布山河之信則江西之地不刄自来吴㑹之鄉指期可舉昔王濬有言皓若暴死更立賢主文武之官各得其任則勍敵也若使蕭衍克就上下同心非直後圖之難實亦揚境危逼何則夀春之去建業七百而已山川水陸彼所諳利脱江湘無波君臣效職藉水憑舟倐忽而至夀春容不自保江南將若之何今寳卷邑居有土崩之形邉城無繼援之兆清蕩江區寔在今日臣受恩既重不敢不言詔曰不君不臣江南常弊有粟不食其在斯矣上天既欲亡之諸藩又願取之人事天道孰云匪㑹但以養害仁者不為且十月五日衍軍已逹大航其大傷小亡之勢久應有決假令天罰寳融衍兵獲進則衍之主佐又是亂亡遺孽皇靈其能久祐之乎今之所矜者正以南黔企徳邉書繼至殄瘁之氓理須救接若爾者揚州兵力配積不少但可速遣任城委以處分别加慰勉令妙盡邉算也以衍事克遂停正始中蠕蠕㓂邉詔懐禦之懐至雲中蠕蠕亡遁懐旋至恒代案視諸鎮左右要害之地可以築城置戍之處皆量其髙下揣其厚薄及儲糧積仗之宜犬牙相救之勢凡表五十八條表曰蠕蠕不羈自古而爾遊魂鳥集水草為家中國患者皆斯類耳歴代驅逐莫之能制雖比拓榆中逺臨瀚海而智臣勇將力算俱竭胡人頗遁中國以疲于時賢哲思造化之至理推生民之習業量夫中夏粒食邑居之民蠶衣儒歩之士與荒表茹毛飲血之類鳥宿禽居之徒親較長短固宜防制知城郭之固暫勞永逸自皇魏統極都於平城威震天下德籠宇宙今定鼎成周去北遥逺代表諸藩北固髙車外叛尋遭旱儉戎馬甲兵十分闕八去嵗復鎮隂山庶士盪盡遣尚書郎中韓貞宋世量等簡行要險防遏形便謂凖舊鎮東西相望令形勢相接築城置戍分兵要害勸農積粟警急之日随便翦討如此則威形増廣兵勢亦盛耳北方沙漠夏乏水草時有小泉不濟大衆脱有非意要待秋冬因雲而動若至冬日冰沙凝厲遊騎之㓂終不敢攻城亦不敢越城南出如此北方無憂矣宣武從之今北鎮諸戍東西九城是也任城王澄宣武時為鎮南大將軍揚州刺史表曰蕭衍頻斷東關欲令巢湖泛溢周回四百餘里東關合江之際廣不過數十歩若賊計得成大湖傾注者則淮南諸戍必同晉陽之事矣又吴楚便水且灌且戰淮南之地將非國有夀陽去江五百餘里衆庶惶惶並懼水害脱乗民之願攻敵之虚豫勒諸州纂集士馬首秋大集則南瀆可為飲馬之津霍嶺必成徙倚之觀事貴應機經畧須早縱混一不可必果江西自是無虞若猶豫緩圖不加除討關塞既成襄陵方及平原民戍定為魚矣澄弟嵩宣武時為平南將軍荆州刺史嵩表曰蕭寳融骨肉相殘忠良先戮臣下囂然莫不離背君臣攜貳干戈日尋流聞寳卷雍州刺史蕭衍兄懿於建業阻兵與寳融相持荆郢二州刺史並是寳卷之弟必有圖衍之志臣若遣書相聞迎其本謀兾獲同心并力除衍衍平之後必旋師赴救丹陽當不能復經營疆陲全固襄沔臣之軍威已得臨據則沔南之地可一舉而收緣漢耀兵示以威德思歸有道者則引而納之受疑告危者則援而接之總兵竚鋭觀釁伺隙若其零落之形已彰怠懈之勢已著便可順流摧鋒長驅席卷詔曰所陳嘉謀深是良計如當機形可進任將軍裁之既而梁武尋克建業乃止安定王燮宣武時為征虜將軍華州刺史燮表曰謹惟州治李潤堡雖是少梁舊地晉芮錫壤然胡夷内附遂為戎落城非舊邑先代之名爰自國初䕶𦍑小戍及改鎮立郡依岳立州因籍倉府未刋名實竊見馮翊古城𦍑魏兩民之交許雒水陸之際先漢之左輔皇魏之右翼形勢名都實惟西蕃奥府今州之所在豈惟非舊至乃居崗飲澗井谷穢雜升降劬勞往還數里譐誻明昏有虧禮教未若馮翊面華渭包原澤井淺池平樵牧饒廣採材華隂陸運七十伐木龍門順流而下培植舊雉功省力易人各為巳不以為勞昔宋民無井穿井而忻得人况合城無水得水而不家慶竊聞前政刺史非無是意或值兵舉或遇年灾緣此契濶稽延至此去嵗已熟秋方大登四境晏安京師無事丁不十錢之費人無八旬之勤損輕益重乞垂鑒逺詔曰一勞永逸便可聴移蕭寳夤為撫軍將軍宣武時梁武遣將康絢於浮山堰淮以灌揚徐除寳夤都督東討諸軍事堰既成淮水濫溢將為揚徐之患寳夤於堰上流更鑿新渠引注淮澤水乃小減邢巒宣武時為安西將軍既平蜀巴西乃表曰揚州成都相去萬里陸途既絶惟資水路蕭衍兄子淵藻去年四月十三日發揚州今嵗四月四日至蜀水軍西上非周年不逹外無軍援一可圖也益州頃經劉季連反叛鄧元超攻圍資儲散盡倉庫空竭今猶未復兼民人喪膽無復固守之意二可圖也蕭淵藻是羣劇少年未洽治務及至益州便戮鄧元超曹亮宗臨戎斬將則是駕馭失方范國恵津渠退敗鏁執在獄今之所任並非宿將重名皆是左右少年而已既不厭民望多行殘暴民心離解三可圖也蜀之所恃惟阻劍閣今既克南安已奪其險據彼界内三分已一從南安向涪方軌任意前軍累破後衆喪魂四可圖也昔劉禪據一國之地姜維為佐鄧艾既出綿竹彼即投降及苻堅之世楊安朱彤三月取漢中四月至涪城兵未及州仲孫逃命桓温西征不旬月而平蜀地昔来常多不守况淵藻是蕭衍兄子骨肉至親若其逃亡當無死理脱軍克涪城淵藻復何宜城中坐而受困若其出鬬庸蜀之卒唯便刀矟弓箭至少假有遥射弗至傷人五可圖也臣聞乗機而動武之善經攻昧侮亡春秋明義未有捨干戚而康時不征伐而混一伏惟陛下纂武文之業當必世之期跨中州之饒兼甲兵之盛清蕩天區在於今矣是以踐極之初夀春馳欵先嵗命將義陽克闢淮外既以風清荆沔於焉肅晏方欲偃甲息兵候機而動而天贊休明時来斯速雖欲靖戎理不獲已至使道遷歸誠漢境佇拔臣以不才屬當戎寄内省文吏不以軍謀自許指臨漢中唯規保疆守界事屬艱途東西㓂竊上憑國威下仗將士邉帥用命頻有薄捷藉勢乗威逕度大劍既克南安據彼要險前軍長邁已至梓潼新化之民飜然懐恵瞻望涪益旦夕可屠正以兵少糧匱未宜前出為爾稽緩懼失民心則更為㓂今若不取後圖便難輒率愚管庶㡬殄尅如其無功分受憲坐且益州殷實户餘十萬比夀春義陽三倍非匹可乗可利實在于兹若朝廷志存保民未欲經畧臣之在此便為無事乞歸侍養微展烏鳥詔曰若賊敢闚𨵦觀機翦撲如其無也則安民保境以悦邉心平蜀之舉更聴後勅方將席卷岷蜀電掃西南何得辭以戀親中途告退宜朂令圖務申髙略巒又表曰昔鄧艾鍾㑹率十八萬衆傾中國資給裁得平蜀所以然者鬬實力故也况臣才絶古人智勇又闕復何宜請二萬之衆而希平蜀所以敢者正以據得要險士民慕義此往則易彼来則難任力而行理有可尅今王足前進已逼涪城脱得涪城則益州便是成擒之物但得之有旦晚爾且梓潼已附民户數萬朝廷豈得不守之也若守也直保境之兵則已一萬臣今請二萬五千所増無㡬又劍閣天險古来所稱張載銘云世亂則逆世清則順此之一言良可惜矣臣誠知征伐大事不易可為自軍度劍閣以来鬢髪中白憂慮戰懼寧可一日為心所以勉强者既得此地而自退不守恐辜先皇之恩遇負陛下之爵祿是以孜孜頻有陳請且臣之意算正欲先圖涪城以漸而進若尅涪城便是中分益州之地斷水陸之衝彼外無援軍孤城自守復何能持久哉臣今欲使軍軍相次聲勢連接先作萬全之計然後圖彼得之則大尅不得則自全乂巴西南鄭相離一千四百去州迢遞恒多生動昔在南之日以其統綰勢難故増立巴州鎮静夷獠梁州藉利因而表罷彼土民望嚴蒲何揚非唯五三族落雖在山居而多有豪右文學箋啓往往可觀冠帶風流亦為不少但以去州既逺不能仕進至於州綱無繇厠迹巴境民豪便是無梁州之分是以鬱怏多生動静建議之始嚴𤣥思自號巴州刺史尅城以来仍使行事巴西廣袤一千户餘四萬若彼立州鎮攝華獠則大帖民情從墊江已還不復勞征自為國有宣武不從又王足於涪城輒還遂不定蜀崔延伯宣武永平中為後將軍幽州刺史梁衍遣其左遊擊將軍趙祖悦率衆偷據硖石詔延伯為别將與都督崔亮討之亮令延伯守下蔡延伯與别將伊瓮生挟淮為營延伯遂取車輪去輞削鋭其輻兩兩接對揉竹為絙貫連相屬並十餘道横水為橋兩頭施大轆轤出沒任情不可燒斫既斷祖悦等走路又令舟舸不通繇是梁軍不能赴救祖悦合軍咸見俘虜於軍拜平南將軍光祿大夫後與楊大眼等至自淮陽靈太后幸西林園引見延伯等太后曰卿等志尚雄猛皆國之名將北平硖石公私慶快此乃卿等之功也但淮堰仍在宜須預謀故引卿等親共量算各出一圖以為後計大眼對曰臣輒謂水陸二道一時俱下往無不尅延伯曰臣今輒難大眼既對聖顔答㫖宜實水南水北各有溝瀆陸地之計如何可前愚臣短見願聖心愍水兵之勤苦給復一年専習水戰脱有不虞召便可用往無不獲靈太后曰卿之所言深是宜要當勅如請袁飜孝明時為冠軍將軍涼州刺史㑹蠕蠕主阿那瓌後主婆羅門並以國亂来降朝廷問飜安置之所飜表曰謬以非才忝荷邉任猥垂訪逮安置蠕蠕主阿那瓌婆羅門等處所逺近利害之宜竊惟匈奴為患其来久矣雖隆周盛漢莫能降服衰弱則降富彊則叛是以方叔召虎不遑自息衛青去病勤亦勞止或修文德以来之或興干戈以伐之而一得一失利害相侔故呼韓来朝左賢入侍史籍謂之盛事千載以為美談至于皇代勃興威馭四海爰在北京仍梗疆場自卜惟雒食定鼎伊瀍髙車蠕蠕迭相吞噬始則蠕蠕衰微髙車彊盛蠕蠕則自救靡暇髙車則僻逺西北及蠕蠕復振反破髙車主喪民離不絶如綫而髙車今能終雪其恥復摧蠕蠕者正繇種類繁多不可頓滅故也然鬬此兩敵即卞莊之算得使境上無塵數十年中者抑此之繇也今蠕蠕内為髙車所討滅外憑大國之威靈兩主投身一朞而至百姓歸誠萬里相屬進希朝廷哀矜剋復宗社退望庇身有道保其妻兒雖乃逺夷荒桀不識信順終無純固之節必有孤負之心然興亡繼絶列聖同規撫降䘏附百王共軌若棄而不受則虧我大德若納而禮待則損我資儲来者既多全徙内地非直其情不願迎送艱難然夷不亂華殷鑒不逺覆車在於劉石毀轍固不可尋且蠕蠕尚存則髙車猶有内顧之憂未暇窺窬上國若蠕蠕全滅則髙車跋扈之計豈易可知今蠕蠕雖主奔於上民散於下而餘黨寔繁部落猶衆處處碁布以望令主爾髙車亦未能一時并兼盡令率附又髙車士馬雖衆主甚愚弱上不制下下不奉上唯以掠盜為資陵奪為業河西捍禦彊敵唯涼州燉煌而已涼州土廣人民皆稀糧仗素闕燉煌酒泉空虚尤甚若蠕蠕無復豎立令髙車獨擅北垂則西顧之憂匪旦伊夕愚謂蠕蠕二主並宜存之居阿那瓌於東偏處婆羅門于西裔分其降民各有收屬那瓌住所非所經見其中事勢不敢輒陳其婆羅門請修西海故城以安處之西海郡本屬涼州今在酒泉直抵張掖西北千二百里去髙車所住金山一千餘里正是北虜往来之衝要漢家行軍之舊道土地沃衍大宜耕殖非但今處婆羅門於事為便即可永為重戍鎮防西北宜遣一良將加以配衣仍令監䕶婆羅門凡諸州鎮應徙之兵随宜割配且田且戍雖外為置蠕蠕之聲内實防髙車之䇿一二年後足食足兵斯固安邉保塞之長計也若婆羅門能自尅厲使餘燼歸心收離聚散復興其國者乃漸令北轉徙渡流沙即是我之外藩髙車勍敵西北之虞可無過慮如其奸回反覆孤恩背德者此不過為逋逃之冦於我何損今不早圖戎心一啓脱先據西海奪我險要則酒泉張掖自然孤危長河以西終非國有不圖厥始而憂其終噬臍之恨悔將何及愚見如允乞遣大使往涼州燉煌及於西海躬行山谷要害之所親閲亭障逺近之宜商量士馬校練糧仗部分定見處置得所入東西海之間即令播種至秋收一年之食使不復勞轉輸之功也且西海北垂即是大磧野獸所聚千百為羣正是蠕蠕射獵之處殖田以自供籍獸以自給彼此相資足以自固今之豫度微似小損嵗終大計其利實多髙車豺狼之心何可専信假令稱臣致欵正可外加優納而復内備彌深所謂先人有奪人之心者也管窺所陳懼多孟浪時朝議是之曹世表孝明時為征虜將軍出行豫州刺史值梁將湛僧珍陷東豫州州民劉獲鄭辨反於州界為之内應朝廷以源子恭代世表為州以世表為東南道行臺率元安平元顯伯皇甫鄧林等討之於時賊衆彊斷小殷關驛使不通諸將以士馬單少皆敗散之餘不敢復戰咸欲保城自固世表時患背腫乃轝病出外呼統軍是𤣥寳謂之曰湛僧珍所以敢深入為冦者以獲辨皆州民之望為之内應向有驛至知劉獲移軍欲迎僧珍去此八十里今出其不意一戰可破獲破則湛僧珍自走東南請服卿之功也乃簡選兵馬付寳討之促令發軍即暮出城比曉兵合賊不意官軍卒至一戰破獲諸賊悉平湛僧珍退走唯鄭辨與子恭親舊亡匿子恭所世表召諸將吏衆責子恭收辨斬之𫝊首京師勅遣中使宣㫖慰喻賜馬二匹衣服被褥復以世表行豫州事行臺如故賀拔岳孝莊時為衛將軍討万俟醜奴於渭南傍水分置精騎四十五十以為一所随地形便駱驛置之明日自將百餘騎隔水與賊相見並且東行岳漸前進先所置驛騎随岳而集騎既漸増賊不復測其多少行二十里許便至淺可濟岳便馳馬東出以示奔遁賊謂岳走乃棄歩兵南渡渭水輕騎追岳岳東行數十餘里依横岡伏兵以待之賊以路險不得前進前後繼至半度岡東岳乃回戰身先士卒急擊之賊便退走岳號令所部賊下馬者皆不聴殺賊顧見之便悉投馬俄而虜獲三千人馬亦無遺遂渡渭北降歩兵萬餘收其輜重慕容儼為京畿都督孝宗時西荆州為梁將曹義宗所圍儼應募赴之時北平太守宋帶劔謀叛儼乃輕騎出其不意直至城下語云大軍已到太守何不出迎帶劒造次惶恐不知所為便出迎儼即執之一郡遂定叱列延慶孝宗時為都督恒雲燕朔四州諸軍事前廢帝即位幽州刺史劉靈助舉兵倡義諸州豪右咸相結附劉靈助進屯於定州之安固世隆白前廢帝以延慶與大都督侯淵於定州相㑹以討靈助淵謂延慶曰靈助善於卜占百姓信惑所在響應未易可圖若萬一戰有利鈍鈍則大事去矣未若還師西入據關拒險以待其變延慶曰劉靈助庸人也天道深逺豈其所識大兵一臨彼皆恃其妖術坐看符厭寧肯戮力致死與吾争勝負哉如吾計者政欲出營城外詭言西歸靈助聞之必信而自寛潛軍往襲可一往而擒淵從之乃出頓城西聲云將還揀精騎一千夜發詰朝造靈助壘戰於城北遂破擒之侯淵為驃騎將軍討韓樓配卒甚少淵遂廣張軍聲多設供具親率數百騎深入樓境欲執行人以問虚實去薊百餘里值賊帥陳周馬歩萬餘淵遂潜伏以乗其背大破之虜其卒五千餘人尋還其馬仗縱令入城左右諫曰既獲賊衆何為復資遣之也淵曰我兵既少不可力戰事須為計以離隙之淵度其已至遂率騎夜集昧旦叩其城門韓樓果疑降卒為淵内應遂遁走追擒之樊子鵠出帝時為東南道大行臺時蕭衍遣元樹入據譙城子鵠討之逆戰大破梁衆遂圍譙城樹勒兵出戰輒被摧衂遂不敢岀自守而已子鵠恐梁武遣救乃分兵擊梁苞州然州宕州大澗蒙縣等五城並望風逃散樹既無外援計無所出子鵠又令人説之樹遂請率衆歸南以地還國子鵠等許之共結盟約及樹衆半出子鵠中擊破之擒樹及梁譙州刺史朱文開俘馘甚多北齊堯雄初仕後魏為二豫揚郢四州都督梁司州刺史陳慶之復圍南荆州雄曰白茍堆梁之北面重鎮因其空虚攻之必尅彼若聞難荆圍自解此所謂機不可失也遂率衆攻之慶之果棄荆州来未至雄陷其城擒梁鎮將茍元廣兵二千人薛循義為東魏衛將軍從神武戰沙苑退還晉州西魏儀同長孫子彦圍逼城下循義開門伏甲士以待之子彦不測虚實於是遁去神武甚嘉之斛律羌舉東魏時為都督從神武西討大軍濟河集諸將議進趣之計羌舉曰黑獺聚兇黨强弱可知若欲固守無糧援可恃今揣其情已同困獸若不與其戰而逕趣咸陽咸陽空虚可不戰而尅拔其根本彼無所歸則黑獺之首懸於軍門矣諸將議有異同遂戰於渭曲大軍敗績斛律金為東魏汾州刺史沙苑之役神武以地阨少却軍為西師所乗遂亂張華原以簿帳歴㸃兵莫有應者神武將集兵便戰金曰衆散將離其勢不可復用宜急向河東神武據鞍未動金以鞭拂馬神武乃還於是大敗喪軍士八萬侯景斂西魏力人持大棒守河橋衣甲厚射不入賀拔仁侯其轉靣射一發斃之是役也無金先請還㡬至危矣盧勇行雒州事東魏元象初官軍圍廣州數旬未拔行臺侯景聞西魏救兵將至集諸將議之勇進觀形勢於是率百騎各籠一匹馬至大隗山知魏將李景和率軍將至勇多置幡旗於樹頭分騎為十隊鳴角直前擒西魏儀同程華斬儀同王征蠻驅馬三百匹逼夜而還廣州守將駱超以城降神武令勇行廣州事張亮為行臺右丞髙仲密之叛也與斛律金守河陽周太祖於上流放火船燒河橋亮乃備小艇百餘艘皆載長鏁鏁頭施鈎火船將至即馳小艇以鈎鈎之引鏁向岸火船不得及橋橋之獲全亮之計也段韶為并州刺史周武帝遣將率羌夷與突厥合衆逼晉陽世祖自鄴倍道兼行赴救突厥從北結陣而前東拒汾河西被風谷時事既倉卒兵馬未整世祖見如此亦欲避之而東尋納河間王孝琬之請令趙郡王盡䕶諸將時大雪之後周人以歩卒為前鋒從西山而下去城二里諸將咸欲逆擊之韶曰歩人氣勢自有限今積雪既厚逆賊非便不如陣以待之彼勞我逸破之必矣既而交戰大破之敵前鋒盡殪無復孑遺自餘通宵奔遁仍令韶率騎追之出塞不及而還世祖嘉其功别封懐州武德郡公進位冢宰許惇為大司農㑹侯景背叛王思政入據潁城王師出討引洧水灌城惇之䇿也遷殿中尚書獨孤永業後主時為河陽道行臺僕射雒州刺史周武帝親攻金墉永業出兵禦之問曰是何逹官作何行動周人曰至尊自来主人何不出看客永業曰客行怱速是故不出乃通夜辦馬槽二千周人聞之以為大軍將至乃解圍去册府元龜卷三百六十四
