body:
  text: 册府元龜卷一百七王欽若等撰帝王部朝㑹第一夫春朝夏宗秋覲冬遇天子端委而嚮明諸侯輯瑞而畢㑹九賔在位三揖成禮號令憲章於是乎出聲名文物罔有不備寅恭者加禮怠惰者貶爵所以訓上下之則正君臣之序教庶民以事上示率土以大同也夏禹之塗山刑辟以討後至康王之酆宫慈恵以接來庭三代之制於斯為盛厥後質文雖異因革同歸罔不修其班制差其功位旣以述職亦用講禮盖昧爽而聴政人君之盛儀假寐而待旦人臣之忠節臨三軍者以之生懼有家邦者其可忽此至若甘泉受計露門頒令小正以和見仲夏以咸覿奉乎皮幣錫以車馬發樽以求諫交㦸以宣威此歴代之遺美前王之令範書之方册可為彛訓隋氏而上史多闕文唐室而下所記詳悉並詮次其事列之於篇其有長樂之尊承華之貴三元慶賀率為典故以至國家多事因而廢朝咸附之言爾虞舜正月上日受終於文祖上日朔日也終謂堯終帝位之事文祖者堯始祖之廟輯五瑞旣月乃日覲四岳羣牧班瑞於羣后輯斂旣盡覲見班還后君也舜斂公侯伯子男之瑞圭璧盡以正月中乃日見四岳及九州牧監還五瑞於諸侯與之正始也夏禹合諸侯於塗山執玊帛者萬國諸侯執玉附庸執帛塗山在夀春東北周成王即位少周公攝政朝諸侯於明堂之位周公攝王位以明堂之禮儀朝諸侯不於宗廟避王也天子負斧扆南向而立天子周公也負之言背也斧扆為斧文屏風於户牖之間周公於前立焉三公中階之前北面東上諸侯之位阼階之東西面北上諸伯之國西階之西東面北上諸子之國門東北面東上諸男之國門西北面東上九夷之國東門之外西面北上八蠻之國南門之外北面東上六戎之國西門之外東面南上五狄之國北門之外南面東上九采之國應門之外北面東上四塞世告至此周公明堂之位也朝之禮不於此周公權用之也朝位之上近主位尊也九采九州之牧典貢職者也正門謂之應門二伯帥諸侯而入牧居外而糾察之也四塞謂夷服鎮服在四方為蔽塞者新君即位則來朝周禮侯服嵗一見甸服二嵗一見男服三嵗一見采服四嵗一見衞服五嵗一見要服六嵗一見九州之外謂之蕃國世一見康王旣尸天子尸主也主天子之位號出在應門之内出臯門立應門内之中處南面太保帥西方諸侯入應門左畢公率東方諸侯入應門右二公為二伯各率其所掌諸侯随其方為位皆北面皆布乗黄朱諸侯皆陳四黄馬朱鬛以為庭實賔稱奉圭兼幣曰一二臣衞敢執壤奠賔諸侯也敢執壤地所出而奠贄也皆再拜稽首王義嗣徳答拜康王以義繼先人明徳答其拜受其幣太保曁芮伯咸進相揖皆再拜稽首冡宰與司徒皆共羣臣諸侯並進陳戒不言諸侯以内見外其後康王又有酆宫之朝酆在始平鄠縣東有靈臺康王於是朝諸侯穆王有塗山之㑹漢髙帝七年長樂宫成諸侯羣臣朝十月髙帝因秦制以十月為嵗首用叔孫通新儀先平明謁者治禮引以次入殿門庭中陳車騎歩卒衞官設兵張旗志志與幟同音式餌切傳言趨傳聲教入者皆令趨謂疾行為敬也殿下郎中俠陛陛數百人俠與夾同俠其兩傍毎陛皆數百人也功臣列侯諸將軍軍吏以次陳西方東鄉文官丞相以下陳東方西鄉大行設九賔臚句傳上傳語告下為臚下告上為句也大行掌賔客之禮今之鴻臚也九賔則周禮九儀也公侯伯子男孤卿大夫士也臚音盧於是皇帝輦出房百官執㦸傳警傳聲而唱警引諸侯王以下至吏六百石以次奉賀自諸侯王以下莫不震恐肅敬至禮畢盡復置法酒法酒者猶言禮酌謂不飲之至醉諸侍坐殿下皆伏抑首抑屈也謂禮法不敢平坐而視以尊卑次起上夀觴九行謁者罷酒御史執法舉不如儀者輙引去竟朝置酒無敢讙譁失禮者於是髙帝曰吾乃今日知為皇帝之貴也武帝元封五年春南廵狩還増封泰山因朝諸侯王列侯受郡國計計若今諸州計帳也太初元年春受計於甘泉天漢四年正月朝諸侯王於甘泉宫後元二年正月朝諸侯王於甘泉宫宣帝神爵元年六月詔曰軍旅暴露轉輸煩勞其令諸侯王列侯蠻夷王侯君長當朝二年者皆毋朝後漢安帝永初四年正月元日㑹徹樂不陳充庭車每大朝㑹必陳法物車輦於庭故曰充庭車以年饑故不陳魏齊王景初元年正月即位七月始親臨朝聴公卿奏事晉武帝泰始六年正月丁亥朔帝臨軒不設樂史不載其所以不設樂之故元帝大興元年正月戊申朔臨朝懸而不樂時愍帝蒙塵明帝太寧元年三月戊寅朔改元臨軒二年正月丁丑帝臨朝停饗宴之禮穆帝永和六年帝臨朝以褚裒䘮故懸而不樂褚裒康獻皇后之父七年正月丁酉朔日有食之先是廷尉王彪文與揚州刺史殷浩書曰太史上元日合朔談者或有疑應却㑹與不昔建元元年亦元日合朔唐車騎寫劉孔才所論以示八座于時朝議有謂孔才所論為不得禮儀苟令從之是聖人之一失也何者禮云諸侯旅見天子入門不得終禮而廢者四太廟火日蝕后之䘮雨霑服失容尋此四事之指自謂諸侯雖已入門而卒暴有之則不得終禮非謂先存其事而徼倖史官推術錯謬故不預廢朝禮也夫三辰有災莫大日蝕史官譴而無懼容不修預防之禮而廢消救之術方大饗華夷君臣相慶豈是將䖍天災罪已之謂且檢之事實合朔之儀至尊靜躬殿堂不聴政事冕服御坐門闥之制與元㑹禮畢自不得兼行則當權其事宜合朔之禮不輕於元㑹元㑹有可却之凖合朔無可廢之儀謂應依建元故事却元㑹浩從之竟却㑹十年正月己酉朔帝臨朝以五陵未復懸而不樂十二年正月丁卯帝臨朝以皇太后母䘮懸而不樂恭帝元熙元年正月壬辰朔改元以山陵未厝不朝㑹後魏大武正平元年正月丙戌朔帝南伐臨江大㑹羣臣於江上孝文太和十年正月癸亥朔帝始服衮冕朝饗萬國十五年十一月丙戌初罷小嵗賀小嵗謂冬至十八年春正月丁未朔朝羣臣於鄴宫澄鑾殿十九年十二月乙未朔引見羣臣於光極堂甲子又引見羣臣於光極堂班賜冠服出帝太昌元年十二月戊戌朝㑹百官於太極前殿後周武帝保定五年春正月甲申朔廢朝以康國公王雄死王事故也天和六年春正月己酉朔廢朝以路門未成故也建徳三年正月壬戌朝羣臣於路門宣帝大象元年正月己丑受朝於路門帝服通天冠絳紗袍羣臣皆服漢魏衣冠大赦改元二年正月丁亥帝受朝於道㑹苑唐髙祖武徳九年正月庚寅朔廢朝雨也太宗貞觀十一年正月朔帝臨軒懸而不樂禮也為髙祖憂故十三年正月僕射房𤣥齡奏天下太平萬機事簡請三日一臨朝詔許之十五年正月庚午朔帝常服不臨軒行幸雒陽宫衣冠禮樂闕設也二十年正月甲子朔太宗常服不臨軒行在故也是年征遼回髙宗貞觀二十三年即位九月十一日太尉無忌等奏請視朝坐日帝報曰朕登大位日夕孜孜猶恐壅滯衆務自今已後毎日常坐永徽二年八月二十九日下詔來月一日太極殿受朝此後每五日一度太極殿視事朔望即為常式四年正月癸丑朔帝臨軒懸而不樂以濮王泰在殯故也六年正月壬申親謁昭陵甲戌至自昭陵庚子受朝賀於太極殿顯慶二年二月太尉長孫無忌等奏以天下無虞請隔日視事許之中宗神龍元年四月癸亥初令文武官四品已上每朔望叅日升殿食丙子以時屬炎暑制令每隔日方坐左拾遺靳常上疏諫不納事具諫諍直諫門二年正月庚子朔以則天皇后梓宫在殯不朝㑹睿宗太極元年正月癸丑釋慘服御正殿奏廣樂於庭受皇太子及百官朝賀𤣥宗先天二年正月太上皇誥正月十五日朝改取十一日每年皆然又非朔望日而同朔望受朝者前後有誥非一開元四年正月戊寅朔帝御正殿受朝賀禮畢親朝太上皇于西宫五年正月壬寅朔帝不受朝太上皇䘮制故也七年正月辛卯朔御含元殿受朝仗衞如常儀八年十一月中書門下奏曰伏以冬至一陽初生萬物潛動所以自古聖帝明王皆於此日朝萬國視雲物禮之大者莫逾是時其日亦祀圜丘皆令攝官行事質明旣畢日出視朝國家已來更無改易縁新格將其日祀圜丘遂改用小冬至日受朝若親拜南郊受朝須改旣令攝祭禮不可移伏請改正從之因勅自今冬至日受朝永為常式十年正月癸卯朔御含元殿受朝賀十一年十二月二十四日勅萬春公主薨廢元日朝賀十六年正月戊戌朔始聴政於興慶宫朝賀如常儀臣欽若等曰興慶宫聴政自此始十一月乙巳日南至御含元殿受朝賀如常儀十八年正月癸酉御含元殿受百寮朝賀如常儀二十一年正月庚子朔御含元殿受朝賀如常儀二十二年閏十一月壬午朔日有食之是日長至停朝癸未御應天樓受朝賀是日詔諸州考使六品以下朔望日朝宜准例賜食二十三年正月戊申朔御含元殿朝賀如常儀二十六年正月庚午朔御含元殿朝賀如常儀二十八年正月戊子朔御含元殿朝賀如常儀二十九年正月癸未朔御含元殿朝賀天寳元年正月丁未朔御勤政樓受朝賀大赦天下改開元三十年為天寳元年二年正月辛丑朔御含元殿受朝賀三載正月丙辰朔御含元殿受朝賀四載正月己未朔御含元殿受朝賀五載正月癸丑朔御含元殿受朝賀六載正月辛巳朔御含元殿受朝賀是月詔曰今勝殘在運無事為心願此朝儀當符至理旣時非旰食將致昇平而廷設殺刑何成在宥其每日立仗食及杖鍉等並宜停廢十一月辛卯朔引朝集使及貢舉人見十二月丙寅仗下後百官於尚書省閲貢物七載正月壬申朔御含元殿受朝賀八載正月丙寅朔御含元殿受朝賀九載正月庚寅朔帝御華清宫受朝賀十載正月乙酉朔御含元殿受朝賀十一月丙午冬至御觀風樓受朝賀十一載正月己卯朔帝御華清宫受朝賀十二載正月癸卯朔帝御含元殿受朝賀十三載正月丁酉朔幸華清宫御觀風樓受朝賀十四載正月庚申朔御含元殿受朝賀十五載正月乙卯朔御宣政殿受朝賀肅宗至徳三載正月甲戌朔御含元殿受朝百官上夀稱賀乾元二年十一月丁亥冬至帝朝聖皇於興慶宫翌日受朝於含元殿三年正月癸亥朔帝御含元殿受朝中書令代國公子儀攝太尉上夀稱賀朝退百僚於宣政殿起居聖皇乙丑常服於崇明門通賀皇太子丙寅外命婦朝皇后於光順門内殿上元二年正月丁亥朔御含元殿受朝賀禮畢百官起居聖皇己丑外命婦朝皇后百官賀皇太子元年建子月壬午朔帝御含元殿受朝賀畢羣臣起居聖皇癸未内外命婦朝皇后百官起居皇太子戊戌冬至受朝賀禮畢朝聖皇於西宫百官進名起居代宗廣徳二年正月己亥朔御含元殿受朝賀如常儀六月丁卯朔始御宣政殿受朝以國哀終制故也凡朔望朝於殿前舊章也九月乙未朔自八月連雨至是日不止宰臣元載等奏曰准儀制令泥雨合停朝叅今縁軍國事繁准式停朝恐有廢闕望延三刻傳㸃従之十一月甲寅是日長至御含元殿受朝賀仗衞如常儀禮畢百官詣崇明門進名謁皇太子永泰元年正月癸巳朔御含元殿下制大赦天下宣制畢乃受朝賀禮畢百官詣崇明門進名謁皇太子十一月己未是日長至御含元殿受朝賀仗衞如常儀禮畢百官詣崇明門進名謁皇太子二年正月丁巳朔御含元殿受朝賀仗衞如常儀禮畢百寮詣崇明門進名謁皇太子十一月甲子長至含元殿下制大赦改元大歴宣制畢乃受朝賀禮畢百寮詣崇明門進名謁皇太子大歴二年正月壬子朔御含元殿受朝賀仗衞如常儀禮畢百寮詣崇明門進名謁皇太子十一月己巳長至御含元殿受朝賀仗衞如常儀禮畢百寮詣崇明門進名謁皇太子三年正月丙午朔御含元殿受朝賀仗衞如常儀禮畢百寮詣崇明門進名謁皇太子十一月甲戌長至御含元殿受朝賀仗衞如常儀禮畢百寮詣崇明門進名謁皇太子八年正月丁丑朔御含元殿受朝賀仗衞如常儀禮畢百寮詣崇明門進名謁皇太子閏十一月壬寅朔冬至御含元殿受朝賀仗衞如常儀禮畢百寮詣崇明門進名謁皇太子九年正月庚子朔御含元殿受朝賀仗衞如常儀禮畢百寮詣崇明門進名謁皇太子十一月甲戌長至御含元殿受朝賀仗衞如常儀禮畢百寮詣崇明門進名謁皇太子是時四方無事間日坐朝雙日不復入閣十年正月乙未朔御含元殿受朝賀仗衞如常儀禮畢百寮詣崇明門進名謁皇太子十一月丙午長至詔停賀邇梁王葬期也十一年正月庚寅朔御含元殿受朝賀仗衞如常儀禮畢百寮詣崇明門進名謁皇太子十一月丁巳冬至御含元殿受朝賀仗衞如常儀禮畢百寮詣崇明門進名謁皇太子十二年八月以久雨宥常叅百寮不許御史㸃班十三年正月戊申朔御含元殿受朝賀仗衞如常儀仗以後百寮詣崇明門進名謁皇太子十一月丁卯長至命有司祀昊天上帝于南郊不視朝戊辰上御含元殿朝賀仗衞如常儀禮畢百寮詣崇明門進名謁皇太子十四年正月壬寅朔御含元殿受朝賀仗衞如常儀禮畢百寮詣崇明門進名謁皇太子徳宗建中元年十一月辛酉朔朝集使及貢使見於宣政殿兵興以來四方州府不上計内外不㑹同者二十有五年至此始復舊典凡州府計吏至者一百七十有三又命朝集使二人毎日待制丁丑日南至戊寅御含元殿受朝賀初令親王出閣就班二年正月庚申朔御含元殿受朝賀四方貢賦珍寳列為庭實復舊制也三年正月乙卯朔御含元殿受朝賀四年正月戊寅朔御含元殿受朝賀禮畢以建中元歴二十八卷示百寮初司天少監徐承嗣奏來年嵗次甲子應上元首請修新歴至是成羣臣稱賀貞元元年七月闗中蝗食禾稼無孑遺榖大貴八月甲子詔不御正殿奏事悉於延英庚寅視朝於延英殿羣臣列位於延英門外申甲子之詔也丁丑雨戊寅中書門下上言陛下前以愆陽經時避居正殿凡在臣庻無任兢惶今至誠感通嘉雨霑洽兇渠授首同類格心臣等敢昧死請自今以後依常儀御正殿詔曰可十二月丁亥詔曰朕以𦕈身仰承列聖不能纂修先志以洽昇平馴致冦戎屢興兵革上𤣥降警蝗旱為災年不順成人方歉食言念於此實用傷懐是以齋心别宫與人祈榖雖陽和在候而黔首無聊稱慶於予竊所不敢其來年正月一日朝賀宜罷三年正月丙戌朔停朝賀以大行皇后在殯故也庚寅百寮以停朝賀及是嵗假滿於崇明門奉慰皇太子四年五月庚戌朔御含元殿受朝賀畢御丹鳳門樓大赦天下五年正月壬辰朔御含元殿受賀六年正月癸卯朔不視朝先是有司奏元日日有食之遂停朝㑹及時不食百寮皆賀五月丙寅朔上御紫宸殿受朝先是上以五月一隂生臣子道長君父道衰非善月也父子必以是朔面焉臣子一例因令是月朝見初將冕服御宣政殿塗潦乃以常服御紫宸殿七年正月壬戌朔帝不視朝以去年冬親郊故也四月詔曰仲夏之時陽徳方盛隂事始承聖賢因天地交㑹之時為父子咸覿之禮旣行親戚豈隔君臣自我為初申恩卿士起今年五月朔御宣政殿召見文武百官九品以上外官因朝奏咸聴就列仍編入式以為常典五月庚申朔御宣政殿朝見百官書新禮也十一月丁亥日南至不視朝八年正月丙辰朔御含元殿受朝賀五月乙卯朔御宣政殿受朝賀九年正月庚辰朔御含元殿受朝賀禮畢上賦退朝觀軍仗歸營詩以示宰臣等十年正月乙亥朔罷朝賀之禮以九年冬郊祀故也十一年正月庚午朔御含元殿受朝賀五月朔帝御宣政殿受朝八月辛卯廢朝以故端王太妃薨故也十一月丙辰日南至不受朝賀十二年正月甲午朔御含元殿受朝賀十三年正月朔御含元殿受朝賀是月御史臺奏諸司常叅文官隔假三月已上並横行叅假其武班每月先配九叅六叅九叅謂每月九次朝叅六叅謂每月六次朝叅比來或經冬至及嵗首寒食等三節假滿不是本配入日並不横行事實乖闕請從今已後毎經三節假滿縱不是本配入日其前件官請依文官例横行叅假庻㡬周行式序可之五月丙戌朔以雨罷御宣政殿是月帝以累月天隂街鼓聲暗百官入朝多走馬奔馳是日令宣示宰臣及百官曰卿等朝謁是常或隂雨不聞鼔聲則不免奔波走馬忽有墜損深軫朕懐自今已後縦鼓聲差池亦不得走馬并時暑稍甚及雨雪泥潦亦量放朝叅宰臣等上表陳謝十四年正月朔御含元殿受朝賀五月朔御宣政殿受朝十五年正月朔御含元殿朝賀五月朔以雨罷御宣政殿十一月罷冬至朝賀以興兵討蔡州呉少誠也十六年正月御含元殿受朝賀五月朔以雨罷御宣政殿是月壬戌以徐州節度張建封卒廢朝近例節度使帶僕射已上者卒廢朝三日尚書已下一日都團練觀察使則否洎貞元八年嗣曹王臯李自良皆知節度帶尚書卒各輟朝三日至十四年樊澤以僕射卒廢朝一日十五年黔中觀察使王礎卒特為廢朝以例不定故書之十一月戊戌以齊國大長公主薨廢朝三日己亥以義陽公主薨起今七日廢朝三日是月罷冬至朝賀以襄王第五男薨廢朝十七年正月朔御含元殿受朝賀十八年正月戊午朔大雨雪罷朝賀十九年正月朔御含元殿受朝賀二十年正月朔御含元殿受朝賀五月朔罷御宣政殿二十一年正月朔御含元殿受朝賀憲宗永貞元年十月丙申百寮於興慶宫起居皇太子十一月己亥日南至百寮詣興慶宫起居皇太子元和元年正月丙寅帝率百寮於興慶宫奉册太上皇尊號丁卯御含元殿受朝賀四月御史中丞武元衡奏正衙待制官兩員本置前官以備顧問比來正衙多不奏事又貞元七年更有次對雖議兩置去歲次對已停則待制唯六品清官恐非盡善請自今已後尚書省六品已上諸司四品已上職事官東宫師傅賓詹及王傳等每坐日令兩人待制退朝詣延英候對従之十二月甲辰日南至權停朝賀羣臣詣興慶宫稱賀皇太后二年二月己巳宰臣延英罷對起居舎人鄭随次對詔入面受進止令宣付兩省供奉官自今已後有事即進狀來其次對宜停初貞元七年詔每御延英引見常叅官二人訪以政道謂之次對官所以廣視聴也宰臣奏罷時議非之是年六月丁巳朔百官初入待漏院候禁門啟入朝故事建福望仙等門昏而闔五更而啟與諸里門同時至徳中有吐蕃囚自金吾仗亡命因勅晩開宰相待漏於太僕寺車坊至是始命有司各㨿班品置院於建福門外三年正月癸未朔以將受尊號元日權停朝賀百官詣興慶宫進名起居皇太后又赴延英門進名奉賀四月勅舊制五月一日御宣政殿受朝賀禮宜停初貞元六年徳宗以五月一隂生臣子道長君父道衰非善月也故人之父子必以是月朔面焉遂為常俗臣子一也因詔以是日御正殿與羣臣相見其後每嵗率多權停帝以數術之說經典不載遂罷之十一月甲申日南至權停朝賀羣臣詣興慶宫奉賀皇太后四年正月戊寅朔御含元殿受朝賀禮畢百官詣興慶宫賀太后五年正月壬寅朔御含元殿受朝賀十二月制來年正月一日御含元殿受朝賀令所司准式六年正月丙寅朔御含元殿受朝賀十一月乙巳勅今年冬至朝賀宜權停十二月庚午以苦寒放朝五日閏十二月壬子勅來年正月一日御含元殿受朝賀興慶宫叅賀皇太后並宜權停七年正月辛酉朔帝不受朝賀以皇太子薨廢朝故也四月壬子開延英對宰臣以下是月以恵昭太子葬復多雨至是積旬有六日方坐朝十二月戊戌勅來年正月一日御含元殿宜令所司准式甲寅晦宰臣並宿于中書八年正月乙卯朔御含元殿受朝賀十月丙辰以大雪放朝三日十一月庚戌朔勅權停冬至朝賀九年正月己酉朔含元殿受賀百寮退謁皇太子於崇明門乃詣興慶宫候皇太后起居六月癸卯以時暑甚放百官五日叅戊寅以豐州刺史天徳軍經畧使周懐義卒廢朝一日經畧使廢朝自懐義始也十年正月癸酉朔御含元殿受朝賀旣退百官赴崇明門通刺謁皇太子又赴興慶宫候皇太后起居三月壬申朔御延英殿召對宰臣故事朔望日皇帝御宣政殿見羣臣謂之大朝𤣥宗始以朔望陵寢薦食不聴政其後遂以為常今之見宰臣特以事召也六月勅御史臺自今以後常叅官入朝以見到人名衘進來其朔望及雙日莫進十二月勅淮蔡未賔師人暴露而三朝之㑹萬國來庭舉樂稱慶有懐愧惕其來年正月朝賀宜權停諸軍優賜並准例處分十一年正月丁卯朔不受朝賀宰臣率百官洎内外命婦起居皇太后於興慶宫十二年正月辛酉朔以淮右宿兵不受朝賀十月乙卯隋唐節度使李愬帥師入蔡州執賊帥吳元濟以聞淮西平辛巳御宣政殿受賀九品以上及宗子四夷之使皆㑹十三年正月乙酉朔御含元殿受朝賀畢御丹鳳樓大赦天下十四年正月庚辰朔不受朝賀以東討淄青李師道未班師故也穆宗以元和十五年即位閏正月丁巳詔以二月五日御丹鳳樓宣令所司准式二月辛巳太常禮院奏准禮及開元乾元上元元和以來元日及冬至日皇帝御含元殿受朝賀禮畢百寮赴皇太后所居殿門外進名候起居諸親及内外命婦並有朝㑹叅賀之禮伏請准元和元年十月二十三日勅外命婦有邑號者每年元日冬至立夏立秋立冬赴皇太后宫門進名奉叅如遇泥雨即停制曰可九月辛酉立冬外命婦詣興慶宫進名候皇太后起居十一月丁未日南至羣臣及命婦赴興慶宫進名奉賀皇太后長慶元年四月甲午以張𢎞靖入幽州時幽州劉總納土詔以𢎞靖代之帝御紫宸殿受朝時綏定兩河克平交趾北虜納徴西戎請盟京師及四方頻遇豐年天下暫獲晏如也時議者皆以河朔負固不來庭乆矣至是不勞師而幽土底定庻㡬小康而識者以為止戈偃武皆資治理雖君有仁聖之姿而股肱未稱政令之出中外不行既未有以厭於人心則成功不可以偶致稽諸倚伏深懼其兆亂焉十一月丁酉以討鎮州勅權停今年冬至朝賀二年正月癸巳朔以幽鎮阻兵不受朝賀時幽州朱克融囚張𢎞靖鎮州王庭凑殺田𢎞正宰臣率百官洎内外命婦候皇太后起居於興慶宫八月詔曰夏秋之間嘗多水潦如縁暮夜暴雨道路不通車馬宜便放其日朝叅委御史臺勾當仍每日奏如雨不至甚即不在此例十一月戊午日南至宰臣與百官洎内外命婦候皇太后起居於興慶宮册府元龜卷一百七
