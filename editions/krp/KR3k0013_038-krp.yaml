body:
  text: 册府元龜卷三十八宋王欽若等撰帝王部尊親尊師尊乳母尊親仲尼曰故雖天子必有尊也孟軻亦曰孝子之至莫大乎尊親夫自家刑國父天母地正位凝命總治綱紀巍乎在上風以化下鞠育之重經義攸著于以樹崇名殊徽號異宫室之制申朝覲之禮増飾服用嚴備官屬晨夕奉養罄竭恭愛徳教彌逺兆庶是賴書稱一人有慶者無善於此矣虞舜踐帝位載天子旗往朝父瞽瞍漢髙帝六年三月帝歸櫟陽五日一朝太公太公家令説太公曰天無二日土無二王皇帝雖子人主也太公雖父人臣也奈何令人主拜人臣如此則威重不行後帝朝太公擁篲為恭也如今卒持帚者也迎門卻行郤退而行也帝大驚下扶太公太公曰帝人主奈何以我亂天下法於是帝心善家令言善其發悟已心因得尊崇父號非善其令父敬已賜黄金五百斤五月丙午詔曰人之至親莫親於父子故父有天下傳歸於子子有天下尊歸於父此人道之極也前日天下大亂兵革並起萬民苦殃朕親被堅執銳被堅謂甲胄也執銳謂利兵也自帥士卒犯危難平暴亂立諸侯偃兵息民天下大安此皆太公之敎訓也諸王通侯將軍羣卿大夫已尊朕為皇帝而太公未有號今上尊太公曰太上皇太上極尊之稱也皇君也天子之父故號曰皇不預治國故不言帝臣欽若等曰太上皇號始於此惠帝髙祖十二年五月丙寅即位尊母吕皇后曰皇太后文帝初封代王十七年髙后喪大臣議立後疾外家吕氏彊暴皆稱薄氏仁善故迎立代王為皇帝尊母薄太后為皇太后景帝即位尊母竇皇后為皇太后武帝即位尊竇太后曰太皇太后母王皇后為皇太后臣欽若等曰漢因秦之稱號帝母稱皇太后祖母稱太皇太后昌邑王即位尊昭帝皇后上官氏為皇太后元帝即位尊皇太后曰太皇太后上官后也皇母曰皇太后卭成王皇后母養元帝者也成帝即位尊皇太后曰太皇太后母王皇后曰皇太后哀帝即位尊皇太后曰太皇太后成帝趙后曰皇太后太皇太后下詔尊定陶恭王為恭皇哀帝因是曰春秋母以子貴尊傅太后為恭皇太后丁姬為恭皇后各置左右詹事食邑如長信宫建平二年夏四月詔曰漢家之制推親親以顯尊尊天子之至親當極尊號定陶恭皇之號不宜復稱定陶尊恭皇太后曰帝太太后稱永信宫恭皇后曰帝太后稱中安宫成帝母太皇太后本稱長信宫成帝趙后為皇太后並四太后各置少太僕秩皆中二千石平帝中山孝王子也元夀二年即位元始元年六月使少府左將軍豐豐甄豐也賜帝母中山孝王姬衞氏璽書拜為中山孝王后孺子嬰立尊平帝王皇后為皇太后後漢明帝即位尊母陰皇后為皇太后章帝即位尊明帝馬皇后為皇太后及太后喪乃策書加所生母賈貴人王赤綬諸侯王赤綬也安車一駟永巷宫人二百永巷宫中署名也後改為掖庭永巷宫人即宮婢也御府雜帛二萬疋大司農黄金千斤錢二千萬和帝即位尊章帝竇皇后為皇太后殤帝即位尊和帝鄧皇后為皇太后安帝清河王慶子也母曰左姬建光元年追尊父慶為孝德皇尊孝德皇元妃耿氏為甘陵大貴人甘陵孝徳皇之陵也桓帝即位尊母匽氏為孝崇博園貴人帝追尊父蠡吾侯翼曰孝崇皇置園廟曰博園和平元年梁太后葬就博陵尊貴人為孝崇皇后遣司徒持節奉策授璽綬齎乘輿器服物備法物宫曰永樂置太僕少府已下皆如長樂宫故事漢宫儀帝祖母稱長信宫帝母稱長樂宫故有長信少府長樂少府反職吏皆宦者為之又置虎賁羽林衞士起宫室分鉅鹿九縣為后湯沭邑靈帝母曰孝仁董皇后后河間人也為解瀆侯萇夫人生帝帝即位追尊萇為孝仁皇陵曰愼陵以后為愼園貴人及竇氏誅帝使中常侍迎貴人兄寵到京師上尊號曰孝仁皇后居南宫嘉德殿宫稱永樂熹平四年拜冲帝母虞大家為憲園貴人質帝母陳夫人為渤海孝王妃先是梁冀秉政虞氏抑而不登但稱大家而已陳夫人亦以梁氏故榮寵不及焉時小黄門趙祐議郎卑整上言春秋之義母以子貴隆漢盛典尊崇母氏凡在外戚莫不加寵今冲帝母虞大家質帝母陳夫人皆誕生聖皇而未有稱號夫臣子雖賤尚有追贈之典況二母見在不蒙崇顯之次無以述尊先世垂示後嗣也帝感其言乃拜焉魏文帝初即王位尊母卞氏為王太后及踐阼尊后曰皇太后稱永夀宫明帝即位尊卞太后曰太皇太后郭皇后曰皇太后稱永安宫齊王嗣位尊明元郭皇后曰皇太后稱永寧宫陳留王燕王旦之子景元元年十一月燕王上表賀冬至稱臣詔曰古之王者或有所不臣王將宜依此義表不稱臣乎又當為報夫後大宗者降其私親况所繼者重邪若便同之臣妾亦情所未安其皆依禮典處當務盡其宜有司奏陛下稽徳期運撫臨萬國紹太宗之重隆三祖之基伏惟燕王體尊戚屬正位藩服躬秉䖍肅率蹈恭德以先萬國其于正典闡濟大順所不得制聖朝誠宜崇以非常之制奉以不臣之禮臣等平議以為燕王表章可聽如舊式中詔所施或存好問凖之義類則宴覿之族也可少順聖敬嘉崇義稱示不敢斥宜曰皇帝敬問太王侍御至於制書國之正典朝廷所以辨章公制宜昭軌儀於天下者也宜循法故曰制詔燕王凡詔命制書奏事上書諸稱燕王者可皆上平其非宗廟助祭之事皆不得稱王名奏事上書文書及吏民皆不得觸王諱以彰殊禮加於羣后上遵正典尊祖之制俯順聖敬烝烝之心二者不愆禮實宜之普告施行晉武帝以魏咸熈二年即位尊母太妃王氏曰皇太后宫曰崇化初置宫卿重選其職以太常諸葛緒為衞尉太僕劉源為太僕宗正曹楷為少府泰始二年以景皇帝夫人羊氏居𢎞訓宫號𢎞訓太后惠帝太熈元年四月即位尊武皇帝皇后楊氏曰皇太后明帝母荀氏元帝宫人及帝即位封建安君别立第宅太寧元年帝迎還臺内供奉隆厚及成帝立尊重同於太后穆帝即位尊康帝皇后褚氏曰皇太后居崇德宫哀帝即位詔有司議母貴人周氏位號太尉桓温議宜稱夫人尚書僕射江霦議應曰太夫人詔崇為皇太妃儀服與太后同又詔朝臣不為太妃敬合禮典不太常江逌議位號不極不應盡敬簡文帝即位尊褚太后曰崇德太后孝武帝即位尊母李氏為淑妃太元三年進為貴人九年又進為夫人十二年加為皇太妃儀服一同太后十九年尊為皇太后稱崇訓宫安帝隆安元年二月尊皇太后李氏為太皇太后後魏獻文即位尊文成皇后馮氏為皇太后孝文帝即位尊馮太后曰太皇太后孝明帝即位尊宣武皇后髙氏為皇太后又尊所生母胡氏為皇太妃後又尊為太后後周武帝即位尊母叱奴氏為皇太后又尊愍帝后元氏為孝愍皇后先是愍帝被廢后出俗為尼至是尊焉宣帝即位尊武帝阿史那皇后為天元上皇太后又尊所生母李氏為天元聖皇太后靜帝受禪尊天元上皇太后為太皇太后天元聖皇太后為太帝太后又尊宣帝天元大皇后楊氏為皇太后所生母天大皇后朱氏為帝太后其天中大皇后元氏為天后太皇后天元皇后陳氏為天元太皇后唐中宗神龍元年正月即位上天后尊號為則天大聖六月以時屬炎暑恐則天皇后勞于臨御遂罷十日一外朝更以朔望為常儀𤣥宗開元四年正月戊寅朔帝御正殿受朝賀禮畢親朝太上皇於西宫肅宗時太上皇居興慶宫每日問安寢門聖皇亦時至大明宫問皇帝及太上皇移於内地更選後宫為聖皇所愛者百餘人赴西宮備灑掃又令萬安咸宜二長公主入侍養服御饌食窮以珍奇加于常日皇帝問安如舊憲宗元和元年春正月丙寅朔帝率百寮於興慶宫奉册上太上皇尊號事在尊號門元和元年三月乙丑中書門下上表請尊太上皇后王氏為皇太后詔依穆宗以元和十五年正月即位帝母憲宗貴妃郭氏是年閏正月乙卯詔曰朕光膺寳厯正位宸居大行皇帝貴妃尊冠六宫母臨萬國謹上尊號曰皇太后敬宗長慶四年正月癸酉即位二月己亥尊皇太后曰太皇太后聖母王氏為皇太后文宗寳厯二年十二月丁未即位戊申尊聖母蕭氏為皇太后太和元年五月壬戌朔帝赴興慶宫起居太皇太后宗正卿李銳率諸宗屬詣右銀臺門進名起居丙寅帝赴興慶宫上壽内外端午進獻如常嵗四年四月以有司貢新𤓰獻赴興慶宫奉太皇太后及皇太后并分賜十宅諸王已下初有司以帝命送諸宫時嵗餼味雖太后之尊一槩以賜為名帝始即位嘗因内園進櫻桃將以賜三宫太后帝曰焉可以為賜因授筆易其文簿曰奉太后自是以為常十一月己亥日南至帝繇複道謁太皇太后寳厯太后于興慶宫五年正月庚子朔以隂雨連旬罷元㑹之禮帝複道朝賀太皇太后于興慶宫六年正月乙未朔以久雪廢元㑹帝赴興慶宫起居太皇太后義安太后宣宗即位尊母郭氏為皇太后僖宗即位尊聖母王氏為皇太后哀帝二年五月有司修皇太后宫畢中書奏皇太后慈惠臨人寛仁馭物景叶俔天之兆克彰誕聖之符今輪奐新宫規模舊典崇訓既徵於信史積善宜顯於昌期太后宫請以積善為名從之後唐莊宗即位尊母曹氏曰皇太后又册武皇夫人劉氏為太妃同光中詔曰皇太后母儀天下子視羣生當别建宫闈顯標名號兾因稱謂益表尊嚴宜以長壽宫為名三年正月甲午朔皇太后生辰帝御嘉慶殿召諸王家宴極歡而罷閔帝即位尊明宗皇后曹氏曰皇太后又册王氏為皇太妃晉少帝嗣位册髙祖皇后李氏為皇太后尊母王氏為皇太妃漢隠帝即位尊髙祖皇后李氏為皇太后尊師周禮師氏以媺詔王𫝊曰詔於天子無北面又曰當其為師則弗臣然則尊賢貴德承師問道屈萬乘之重明五學之義上以達經國之要下以得化人之本是知尊師重傅則法度存雖曰聖人必繇學也嚴恭之道於是在焉若乃尊其爵位委以樞要厚師臣之遇執弟子之禮或不名以示恩或乞言以敦敎生則優其奉禄殁則蒙其渥澤至於幸第以存問變服以臨弔皆所以成主善之美繇諮德之㫖誠帝者之懿範也故曰雖天子必有尊也斯之謂歟神農師悉謂悉姓謂名黄帝師大撓大撓作甲子者一云學乎太真顓頊師伯夷父一云學乎緑圖帝嚳師伯招一云學乎赤松子帝堯師子州支父一云學乎尹壽帝舜師許由一云學乎務成跗夏禹師大成摯一云學乎西王國商湯師小臣即伊尹一云學乎威子伯髙宗學先王之道於甘盤甘盤賢臣有道徳者周文王既為西伯師吕尚東海上人葢嘗窮困年老矣以漁釣干西伯事具宰輔佐命門西伯與語大說曰自吾先君太公曰當有聖適周以興子真是邪吾太公望子久矣故號之曰太公望立為師一云學乎錫疇子斯武王即位九年東伐師尚父左杖黄鉞右把白旄以誓遂至盟津諸侯不期而會者八百及踐阼詔師尚父而問曰昔黄帝顓頊之道存乎意亦忽不可得見與師尚父曰在丹書王欲聞之則齊矣王齊三日端冕師尚父亦端冕奉書而入負屏而立王下壇南面而立師尚父曰先王之道不北面王行西折而南東面而立師尚父西面道書之言成王以周公為太師公薨成王葬於畢不敢臣周公故使近文王之墓漢昭帝時光禄大夫給事中蔡義以韓詩進授帝數歳拜為少府遷御史大夫代楊敞為丞相封陽平侯義為丞相年八十餘短小無鬚眉貌似老嫗行步俛即俯字也僂常兩吏扶夾乃能行時大將軍霍光秉政議者或言光置宰相不選賢苟用可顓制者顓與專同光聞之謂侍中左右及官屬曰以為人主師當為宰相何謂云云云云衆語謂有不選賢之言也此語不可使天下聞也又韋賢為博士給事中以詩進授帝稍遷光禄大夫詹事至大鴻臚宣帝即位以先帝師甚見尊重元帝為太子時孔霸為大中大夫以選授皇太子經遷詹事髙密相是時諸侯王相在郡守上帝即位徵霸以師賜爵關内侯食邑八百户號褒成君為帝師敎令成就故曰褒成君給事中加賜黄金二百斤第一區徙名數于長安及薨帝素服臨弔者再至賜東園秘器錢帛策贈以列侯禮諡曰烈君初元中制詔御史曰國之將興尊師而重傅故前將軍望之蕭姓傅朕八年道以經術厥功茂焉其賜望之爵關内侯食邑六百户給事中朝朔望坐次將軍周堪初為太子少傅及帝即位堪為光禄大夫與蕭望之並領尚書事歐陽地餘初為元帝太子中庶子授經後為博士論石渠及帝即位侍中貴幸至少府成帝為太子時張禹鄭寛中皆授經於帝及即位以師錫爵關内侯寛中食邑八百户禹六百户拜為諸吏光禄大夫秩中二千石給事中領尚書事建始中鄭寛中卒谷永上疏曰臣聞聖王尊師傅褒賢雋顯有功生則致其爵死則異其禮諡者周公薨以變禮而當天心周公死成王欲𦵏之於成周天方雷雨以風盡偃大木斯拔國大恐王乃葬周公于畢示不敢臣也事見尚書大傳而與古文書不同公叔文子卒衞侯加以美諡著為後法公叔文子衞大夫公叔發也文子卒其子請諡於君君曰昔日衛國凶饑夫子為粥與國之餓者不亦惠乎衞國有難夫子以其死衞寡人不亦貞乎夫子聽衞國之政脩其班制以與四隣交衞國社稷不辱不亦文乎謂夫子貞惠文子近事大司空朱邑右扶風尹翁歸德茂天年孝宣皇帝愍册厚賜贊命之臣靡不激揚贊佐也關内侯鄭寛中有顔子之美質包商偃之文學論語云文學子游子夏商子夏名偃子㳺名嚴然總五經之妙論立師傅之顯位入則鄉唐虞之閎道王法納乎聖德閎大也言陳聖王之法聞于天子出則參冡宰之重職功烈施乎政事退食自公私門不開退食自公召南羔羊詩之辭言貶退所食之禄務從至公之道也散賜九族田畝不益德配周召中合羔羊末德登司徒有家臣司徒掌禮教之臣言寛中學行堪為之也家臣若今諸公國官及輔佐也卒然早死尤可悼痛臣愚以為宜加其葬禮賜之令諡令善也以章尊師褒賢顯公之德鴻嘉中張禹老病乞骸骨帝加優再三廼聽許賜安車駟馬黄金百斤罷就第以列侯朝朔望位特進見禮如丞相置從事史五人益封四百戸天子數加賞賜前後數千萬禹雖家居以特進為天子師國家每有大政必與定議大將軍王根害禹寵數毁惡之惡謂言其過惡天子愈益敬厚禹每病輒以起居聞謂其飲食寢臥之増損車駕自臨問之帝親拜禹牀下平帝年幼選署師友大司徒孔光以明經髙行為孔氏師京兆尹金欽以家世忠孝為金氏友後漢明帝為太子時桓榮以少傅授太子經學及即位尊榮以師禮甚為親重拜二子為郎榮年踰八十自以衰老數上書乞身輒加賞賜乘輿嘗幸太常府令榮坐東面設几杖㑹百官驃騎將軍東平王蒼以下及榮門生數百人天子親自執業每言輒曰太師在是既罷悉以大官供具賜大常家其恩禮若此永平二年三雍初成拜榮為五更每大射養老禮畢帝輒引榮及弟子升堂執經自為下説乃封榮為關内侯食邑五千戸榮每疾病輒遣使者存問大官大醫相望於道及篤上疏謝恩讓還爵土帝幸其家問起居入街下車擁經而前撫榮垂涕賜以牀茵帷帳刀劒衣被良久乃去自是諸侯將軍大夫問疾者不敢復乘車到門皆拜牀下榮卒帝親自變服臨喪送葬賜冡塋于首山之陽除兄子二人補四百石都講生八人補二百石其餘門徒多至公卿五年以侍中右中郎將包咸為大鴻臚咸建武中以郎中入授皇太子論語又為其章句拜諫議大夫帝即位每進見賜以几杖入朝不趨贊事不名經傳有疑輒遣小黄門就舍即問帝以咸有師傅恩而素清苦常特賞賜珍玩束帛奉禄増於諸卿咸皆散與諸生之貧者病篤帝親輦駕臨視章帝為太子時張酺侍講及即位出為東郡太守元和二年東巡狩幸東郡引酺及門生并郡縣掾史並㑹庭中帝先備弟子之儀使酺講尚書一篇然後脩君臣之禮賞賜殊特莫不沾洽魏髙貴鄉公幸太學命太常王祥為三老祥南面几杖以師道自居天子北面乞言祥陳明王聖帝君臣政化之要以訓之聞者莫不砥礪晉明帝即位以東宫時師傅猶宜盡敬乃下詔曰朕以不德夙遭閔凶猥以𦕈身託于王公之上哀㷀在疚靡所諮仰憂懐惴惴如臨于谷孔子有云故雖天子必有尊也朕將祗奉先師之禮以諮有徳大宰西陽王名羕秩尊望重在貴思降丞相武昌公王敦司空即丘子王導體道髙邈勲德兼備先帝執友朕之師傅太常安陽侯訓保朕躬忠肅篤誠夫崇親尊賢先帝所重朕見四君及書疏儀體一如東宫故事後魏明帝在藩邸時梁越以上大夫授諸皇子經書及即阼以師傅之恩賜爵祝阿侯太武為監國時盧醜以篤學博聞授經後以師傅舊恩賜爵濟陰公宣武為太子時孫惠蔚侍講東宫及即位之後仍在左右敷訓經典延昌二年追賞侍講之勞封棗彊縣開國男食邑三百戸後周武帝少嘗受業於盧光及即位以光為陜州總管府長史卒贈賻有加常典贈太子少保唐𤣥宗為太子時褚無量以國子祭酒侍讀及即位加右散騎常侍與秘書監兼昭文館學士馬懐素同為侍讀每次閤門則令乘肩輿以進上居别館以路逺則命宫中乘馬或親自送迎以申師資之禮開元六年懐素卒帝為之舉哀廢朝一日贈潤州刺史物三百段米粟一百石喪事所需並官給八年褚無量卒帝震悼久之謂宰相宋璟蘇頲等曰無量碩儒且有德業朕早所師習每用尊崇三史九經前言往行有可以禆益時政規正朕躬未嘗不造膝切論所聞其屬纊之時難以脩書為儀永念其逝實軫予懐庶事宜皆優厚德宗居春宫張渉為侍讀及即位之夕召渉入宫庶政小大皆咨之恩禮甚崇多所𢎞益尊乳保禮曰國君世子生三日卜士之妻大夫之妾使食之又曰擇於諸母與可者必求其寛裕慈惠温良恭敬慎而寡言者次為保母皆居子室葢所以資保阿之力育端聖之體如渭城淮陽厥功茂焉厚賞其子錫之公田亦無爽古三年勞賜之意也降及東漢其禮益厚元魏之世至有僣母后之號濫陵寢之名者亦已甚乎故當以義㫁恩以禮制事而取厥中焉漢武帝少時東武侯母嘗養帝帝後號之曰大乳母率一月再朝朝奏入有詔使幸臣馬㳺卿以帛五十疋賜乳母又奉飲糒飱養乳母乳母上書曰某所有公田願得假倩之帝曰乳母欲得之乎以賜乳母乳母所言未嘗不聽有詔得令乳母乘車行馳道中當此之時公卿大臣皆敬重乳母乳母家子孫奴從者横暴長安當道掣頓人車馬奪人衣服聞於中不忍寘之法有司請徙乳母家室處之於邊奏可即入見辭去時有所幸倡郭舎人疾言罵之曰咄老女子何不疾行陛下已壯矣寧尚須汝乳而活邪帝悲之乃下詔止無徙乳母宣帝生數日以武帝曽孫坐衞太子事繫郡邸獄故廷尉監丙吉知太子無事實重哀曽孫無辜擇謹厚女徒令保養曽孫置間燥處間寛凈也燥髙敞也吉治巫蠱事連嵗不決曽孫病幾不全者數焉吉數敕保養乳母加致醫藥視遇甚有恩惠及帝即位吉絶口不道前恩地節三年掖庭宫婢則則婢名也史失其姓令民夫上書自陳有阿保之功謂未為宫婢時有舊夫在民間辭引吉吉謂則曰汝嘗坐養皇曽孫不謹督笞汝安得有功督謂視察之獨渭城胡組淮陽郭徵卿有恩耳分别奏組等供養勞苦狀詔吉求組徵卿已死有子孫皆受厚賞詔免則為庶人賜錢十萬後漢安帝封乳母王聖為野王君聖因保養之勤縁恩放恣女伯榮出入宫掖博通奸賂司徒震上疏曰臣聞政以得賢為本禮以去穢為務是以唐虞俊乂在官四凶流放天下咸服以致雍熈方今九徳未事嬖倖充庭阿母王聖出自賤㣲得遭千載奉養聖躬雖有推燥居濕之勤前後賞惠報過勞苦而無厭之心不知紀極外交屬託擾亂天下損辱清朝塵㸃日月書戒牝鷄晨鳴詩刺哲婦喪國昔鄭莊公從母氏之欲恣驕弟之情幾至危國然後加討春秋貶之以為失教夫女子小人近之喜逺之怨實為難養易曰無攸遂在中饋言婦人不得與於政事也宜速出阿母令居外舎斷絶伯榮莫使往來令恩徳兩隆上下俱美惟陛下絶婉孌之私割不忍之心留神萬機戒慎拜爵減省獻御損節徵發令野無鶴鳴之歎朝無小明之悔大東不典於今勞止不怨於下擬踪往古比徳哲王豈不休哉奏入帝以示阿母等内倖皆懐忿恚餘具宰輔諫諍門順帝封乳母宋娥為山陽君邑五千户初帝自太子廢為濟隂王娥與黄門孫程等共議立帝帝後以娥前有謀遂封之靈帝封乳母趙嬈為平氏君其後蔡邕上疏曰前者乳母趙嬈貴重天下生則貲藏侔於天府死則丘墓踰於園陵兩子受封兄弟典郡疏具諫臣直諫門晉元帝中興乳母阿蘇有乳保之功賜號保聖君成帝以乳保母周氏有阿保之勞欲假其名號内外皆奉詔侍中顧和獨上疏以為周氏保佑聖躬不遺其勲第舍供給擬於戚屬恩澤所加已為過隆若假名號記籍未見明此惟漢靈帝以乳母趙嬈為平氏君此末代之私恩非先代之令典若君舉必書將軌物垂則書而不法後嗣何觀帝從之後魏太武始光二年尊保母竇氏曰保太后延和元年尊為皇太后初竇氏以夫家坐事與二女俱入宫操行純備進退以禮明元命為帝保母性仁慈勤撫導帝感其恩訓奉養不異所生既尊為皇太后又封其弟漏頭為遼東王竇氏訓釐内外甚有稱聲性恬素寡欲喜怒不形於色好揚人之善隱人之過帝征凉州蠕蠕吳提入寇太后命諸將擊走之太平真君元年崩詔天下大臨三日太保盧魯元監䕶喪事諡曰惠葬崞山從后意也初后嘗登崞山顧謂左右曰吾母養帝躬敬神而愛人若死而不滅必不為賤鬼然於先朝本無位次不可違禮以從園陵此山之上可以終託故葬焉别立后寢廟於崞山建碑頌徳文成帝初立尊保母常氏為保太后興安二年三月尊為皇太后和平元年崩詔天下大臨三日諡曰昭葬於廣甯磨笄山俗謂之鳴雞山太后遺志也依惠太后故事别立寢廟置守陵二百家樹碑頌德常氏本遼西人因事入宮乳帝有劬勞保䕶之功累尊為皇太后其兄英字世華自肥如令超為散騎常侍鎮軍大將軍賜爵遼西公弟喜鎮東大將軍祠曹尚書帶方公三妹皆封縣君妹夫王暏為平州刺史遼東公追贈英祖父苻堅扶風太守亥為鎮西將軍遼西蘭公父渤海太守澄為侍中征東大將軍太宰遼西獻王英母許氏為博陵郡君遣兼太常盧度世持節改葬獻王於遼西樹碑立廟置守冢百家太安初英為侍中征東大將軍太宰進爵為王喜左光禄大夫改封燕郡從兄泰為安東將軍朝鮮侯訢子伯夫散騎常侍選部尚書次子員金部尚書喜子振太子庶子三年英領太師評尚書事内都大官伏寳泰等州刺史五年詔以太后母宋氏為遼西王太妃和平元年喜為雒州刺史初英事宋不能謹而暏奉宋甚至就食於和龍無車牛宋疲不進暏負宋於笈至是宋於英等薄不如暏之篤謂太后曰何不王暏而黜英太后曰英為長兄門户主也家内小小不順何足追計暏雖盡力故是他姓奈何居英上本州郡公亦足報耳天安中英為平州刺史訢為幽州刺史伯夫進爵范陽公英濁貨徙燉煌諸常自興公及至是皆以親疏受爵賜田宅時為隆盛後伯夫為雒州刺史以贜汙欺妄徵斬於京師承明元年徵英復官後員與伯夫子禽可共為飛書誣謗有司執憲刑及五族孝文帝以昭太后故罪止一門文明太后以昭太后故悉出其家前後没入婦女以喜子振試守正平郡唐中宗神龍元年封乳母于氏為平恩郡夫人𤣥宗先天二年五月太上皇誥曰皇帝乳母蔣氏莫氏等行籍柔良心惟靜順襁褓祇事夙効於勤勞井邑分封宜申於寵命蔣氏可封吳國夫人莫氏可封燕國夫人是嵗九月詔曰燕國夫人竇氏慈慧和順掌執禮經女憲母師獨髙柔則朕在孩㓜躬勞乳養逺惟恩義寧忘夙昔瞻既往而莫追見如存而永慕撫渭城之事未足為言視南陽之書益増其感俾錫朝寵㣲申朕懐俸料禄課等一准職事三品給代宗大厯八年六月勅曰古者縁情立禮著慈母之制葢聖人示德無不報之禮而漢宣帝亦追禄掖庭郡邸嘗有阿保之勤以功深淺並授封賞記于前典歴代是之故妳婆元氏朕在襁褓受其撫育推乾就濕慈愛特深可謂仁人厚惠茂德者矣可贈潁川郡太夫人憲宗元和五年十月贈保母盧氏為燕國夫人哀帝天祐二年九月勅妳婆楊氏可封昭儀妳婆王氏可封郡夫人弟二妳婆王氏先昭宗皇帝封郡夫人今准楊氏例改封中書門下奏曰伏以妳婆楊氏等保持夙宵善養勞苦且隆恩澤以報勤劬竊以事體參詳合陳管見臣聞周制宫職夫人只列三人漢氏後宫之等十有四元帝時置昭儀位視丞相秩比諸侯王至於列妾惟稱夫人亦無裂土割郡之號以乳母郭徵卿胡組著保養宣帝之功後子孫只受厚賞而無封爵之號且帝外祖母封博平君非乳母之例後漢順帝封阿母宋氏為山陽君則致漢陽地震安帝時封乳母王聖為野王君亦致地震京師其時中正上言亦以封爵過當乃貽厥咎非叶髙祖山河之約至晉室中興乳母阿蘇有乳保元帝之功賜號保聖君既非爵邑又彰其功爰擇美名在理甚當至髙齊陸令宣以乾阿妳授封郡君尋亂制度中宗神龍元年封乳母于氏為平恩郡夫人景龍四年封尚食髙氏為脩國夫人封爵之失始自于此後睿宗下誥封𤣥宗乳母莫氏為夫人竊以中宗朝政歸韋氏睿宗朝駕躡軒轅當時無復紀綱歴載寖為訛弊伏以陛下重興寳運再闡丕圖奉髙祖太宗之舊行往代前賢故事克臻至道以顯中興庶彚提綱衆務畢舉今者進封保母為郡夫人再至加恩須至封國夫人竊以婦人無爵從夫之爵以賞功勲則命爵又四方多事方注意公卿以勲勞昭著者室家爵邑自郡夫人今則宣授乳母為郡夫人加恩必及列土朝廷大柄以爵禄為主命爵不定其等差則天下之人無以為貴以為貴功則封比礪山榮室則爵同乳母臣等竊意有室家者實恥之況四海九州之内有功勞安社稷勲賢得不對室家慙於所命之爵其所封乳母楊氏王氏臣等參詳望賜釐革雖居濕推燥畢彰保飬之勤但胙土分茅且異䟽封之例況昭儀内侍燕寢位列宫嬪夫人則亞列妃嬙供奉左右竊按儀禮乳母緦以其名母方有緦服今則不可以嬪御之號増榮於阿保揆于禮文有乖事體宜加眷佑當樹鴻私永示規程以服寰宇臣等商量妳婆揚氏望賜號安聖君妳婆王氏望賜號福聖君第二妳婆王氏望賜號康聖君從之周太祖廣順二年九月癸未制敦叙九族糺綏六親生者錫其寵臨没者優其追贈哲王茂典歴代芳規故南陽郡韓氏婉淑居貞賢明垂範奉嬪率禮興家道於仁孝之基諸母推恩撫朕躬於幼冲之歲朝露溘先而奚速慶雲華陰以彌髙宜洽明恩追崇大國式是載揚之美寧攄欲報之情庶俾後昆永覃清懿噫嘻貞魄享此儀章可追封楚國太夫人太祖孩幼而孤楚國撫視敎道有恩故有是命册府元龜卷三十八
