body:
  text: 册府元龜卷四百八十七宋王欽若等撰邦計部賦税自禹平水土乃定九州之賦商周二代率循其制有賦有稅稅以給郊社宗廟百神之祀乗輿奉養百官禄食庶事之費賦以供兵甲車馬士徒之役府庫錫予之用葢周之法詳矣其後㳂襲殊範貪涼迭變乃至履畝之政作丘甲之斂生失於舉中異夫稽古漢氏之後或因或革若夫度田以收租量口以出調成丁以給役計役以收庸隨風宜以折課奠物直以徵算乃至蠻俚之俗亦收財賦司籍之記可得而徵然而制財用之節量輕重之法陳之藝極歸于底慎必在乎稽先王之彛憲求歴代之令典是以什一而賦謂之中正頌聲之作罔不繇是焉堯時禹為司空平水土既别九州作禹貢冀州厥賦惟上上錯賦謂土地所生以供天子上上第一雜出第二之賦兖州厥賦貞貞正也州第九賦正與九相當作十有三載乃同作治十三年乃使賦法與他州同厥貢漆絲厥篚織文地宜漆材又宜桑蠶織文錦綺之屬盛之箱篚而貢焉青州厥賦中上賦第四厥貢鹽絺海物惟錯絺細葛錯雜非一種岱畎絲枲鈆松怪石畎谷也怪石好石似玉者岱山之谷出此五物皆貢之徐州厥賦中中賦第五厥貢惟土五色王者封五色土為社建諸侯則各割其方色土與之使立社燾以黄土苴以白茅茅取其潔黄取王者覆四方羽畎夏翟嶧陽孤桐夏翟翟雉名羽中旌旄羽山之谷有之孤特也嶧山之陽特生梧中琴瑟泗濵浮磬淮夷蠙珠暨魚泗水涯水中見石可以為磬蠙珠珠名淮夷水中出蠙珠及羙魚厥篚𤣥纎縞𤣥黒繒縞白繒織細也織在中明二物皆當細揚州厥賦下上上錯賦第七雜出第六厥貢惟金三品金銀銅也瑤琨篠蕩瑤琨皆美玉齒革羽毛鳥羽惟木齒象牙革犀皮羽毛旄牛尾木楩梓豫章島夷卉服北海島夷革服葛越厥篚織貝織細紵貝文物厥包橘柚錫貢小曰橘大曰柚其所包裹而致者錫命乃貢言不常荆州厥賦上下賦第三人功修厥貢羽毛齒革惟金三品土所出與揚州同杶榦栝栢三木名栢葉松身曰栝礪砥砮丹砥細于礪皆磨石也砮石中矢鏃丹朱類惟箘簵楛三邦底貢厥名箘簵美竹楛木名三物皆出雲夢之善澤近澤三國嘗致貢之其名天下稱包匭菁茅匭匣也菁以為菹茅以縮酒厥篚𤣥纁璣組此州染𤣥纁色善故貢之璣珠類生于水組綬類九江納錫大龜尺二寸曰大龜出于九江水中龜不常用錫命而納之豫州厥賦錯上中賦第二又雜出第一等厥貢漆枲絺紵厥篚纎纊纊細綿錫貢磬錯治玉石曰錯此治磬錯梁州厥賦下中三錯賦第八雜出第七第九二等厥貢璆鐵銀鏤砮磬璆玉名鏤剛鐵熊羆狐狸織皮貢四獸之皮織為罽雍州厥賦中下賦第六人功少厥貢惟球琳琅玕球琳皆玉石琅玕石而似玉庶土交正底慎財賦交俱也衆土俱得其正慎者言取之有節不過度也咸則三壌成賦中邦皆法壌田上中下大較三品成九州之賦明水害除五百里甸服規方千里之内謂之甸服為天子服治田賦王城四靣五百里百里賦納總甸服内之百里近王城者禾藁曰總入之供飼國馬二百里納銍銍刈謂禾穂三百里納秸服秸藁也四百里粟五百里米所納近者粗逺者精五百里侯服甸服外之五百里侯候也斥候而服事百里采侯服内之百里供王事者二百里男邦男任也任王事者三百里諸侯三百里同為王者斥候故合三為一名五百里綏服綏安也侯服外五百里安服王者政教三百里揆文教揆度也度王者文教而行之三百里皆同二百里奮武衛文教外之二百里奮武衛天子所以安五百里要服綏服之外五百里要束以文教三百里夷守平常之教事王者而已二百里蔡蔡法也法三百里而差簡五百里荒服要服之外五百里言荒又簡畧三百里蠻以文徳招來之不制以法二百里流流移也言政教隨其俗凡五服相距為方五千里夏后氏五十而貢殷人七十而助助藉也天子百里之内以供官千里之内以為御謂此地之田稅所給也官謂其文書財用也御謂衣也是時公田藉而不稅藉之言借也借民以治公田美惡取于此不税民之所自治也周人百畝而徹徹通也圭田無征圭猶治也征稅也孟子曰卿以下必有圭田治圭田者不稅所以厚賢也此則周禮之土田以任近郊之地稅什一也小司徒之職乃經土地而井牧其田野九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都以任地事而令貢賦凡稅斂之事井牧者春秋所謂井衍沃牧隰臯者也隰臯之地九夫為牧二牧而當一井今造都鄙授井田有不易有一易有再易通率二而當一是之謂井牧百里之國凡四都一都之田稅入于王五十里之國凡四縣一縣之田稅入于王二十五里之國凡四甸一甸之田稅入于王地事是謂農牧衡虞也貢謂九谷山澤之財也賦謂出車徒給徭役也乃分地域而辨其守施其職而平其政職謂九職也政稅也政當作征卿大夫之職以嵗時登夫家之衆寡辨其可任者國中自七尺以及六十野自六尺以及六十有五皆征之其舎者國中貴者賢者能者服公事者老者疾者皆舎以嵗時入其書登成也定也國中城郭中也晩賦稅而早免之以其復多役少早賦稅而晩免之以其復少役多征之者給公上事也舎者謂有復除舎不收事也貴者謂若宗室及闗内侯皆是服公事者謂若吏胥也老者謂若八十九十之類疾者謂若疲癃者入其書者言于大司徒載師掌任土之法以物地事授地職而待其政令任土者任其力勢所能生育且制貢賦也物物色之以知其所宜之事而授農牧衡虞使職之凡任地國宅無征園廛二十而一近郊十一逺郊二十而三甸稍縣都皆無過十二唯其漆林之征二十而五征稅也言征以供國政也任地謂任土地以起稅賦也國宅城中宅也無征無稅也周稅輕近而重逺近者多役也園廛亦輕之者廛無穀園少利也閭師掌國中及四郊之人民六畜之數以任其力以待其政令以時征其賦賦謂九賦及九貢凡任民任農以耕事貢九榖任圃以樹事貢草木任工以飭材事貢器物任商以市事貢貨賄任牧以畜事貢鳥獸任嬪以女事貢布帛任衡以山事貢其物任虞以澤事貢其物貢草木謂葵韭果蓏之屬凡無職者出夫布獨言無職者掌其九賦魯宣公十五年秋初稅畝公田之法十取其一今又覆其餘畝復十收其一故哀公曰二吾猶不足遂以為常故曰初非禮也穀出不過藉周法民制百畝公田十畝借民力而治之稅不過此以豐財也成公元年三月作丘甲周禮九夫為井四井為邑四邑為丘丘十六井出戎馬一匹牛三頭四丘為甸甸六井出長轂一乘戎馬四匹牛十二頭甲士三人步卒七十二人此甸所賦今魯使丘出之重斂也昭公四年鄭子産作丘賦丘十六井當出馬一匹牛三頭今子産别賦其田財通共出馬一匹哀公十二年春用田賦古者九夫為井十六井為丘丘賦之法因其田財通共出馬一匹牛三頭今别其田及家財各為一賦故言田賦先是季孫欲以田賦使冉有訪諸仲尼仲尼曰丘不識也三發三發問卒曰卒終也子為國老待子而行若之何子之不言也仲尼不對不答公而私於冉有曰君子之行也行政事度於禮施取其厚事舉其中斂從其薄如是則以丘亦足矣丘謂之常法若不度於禮而貪冐無厭則雖以田賦又將不足且子季孫若欲行而法則周公之典在若欲茍而行又何訪焉弗聼秦孝公十四年初為賦制貢稅之法漢高祖即位初約法省禁輕田租什五而稅一量吏禄度官用以賦於民纔取足四年八月初為算漢儀注民年十五以上至五十六出賦錢人百二十為一算為治庫兵車馬十一年二月詔曰欲省賦甚意甚欲省賦斂也今獻未有程程法式也吏或多賦以為獻而諸侯王尤多民疾之諸侯王賦其國中以為獻物又多於郡故百姓疾苦之今諸侯王通侯常以十月朝獻及郡各以其口數率率計也人嵗六十三錢以給獻費惠帝即位初减田租復十五稅一漢家初十五稅一儉於周十稅一也中間廢今復之也六年十月令女子十五以上至三十不嫁王算國語趙王句踐令國中女子年十七嵗不嫁者父母有罪欲人民繁息也漢律人出一算算百二十錢惟賣人與奴婢倍算今使五算罪謫之也文帝時人賦四十丁男二十年而事常賦嵗百二十嵗一事時天下人多故出賦四十三嵗一事景帝二年五月令田半租三十而稅一也武帝建元元年二月詔年八十復二算九十復田卒二算二口之算也復田卒不豫革車之賦也元光六年冬初算商車始稅商賈車船令出算時商賈以幣之變多積貨逐利于是公卿言郡國頗被灾害貧民無産業者募徙廣饒之地陛下損膳省用出禁錢以賑元元寛貸而民不齊出南畝言農人尚少不皆務耕種也商賈滋衆貧者畜積無有皆仰縣官異時算軺車賈人之緡錢皆有差異時言徃時也軺小車也緡謂錢貫也請算如故諸賈人末作貰貸賣買居邑貯積諸物貰賖也貸假與也及商以取利者雖無市籍各以其物自占占隠度也各隠度其財物多少而為名簿送之於官也率緡錢二千而算一率計有二千錢者則出一算諸作有租及鑄以手力所作而賣之者率緡錢四千算一非吏比者三老北邊騎士軺車一算比例也身非為北吏之例非為三老非為邊騎士而有軺車皆令出一算商賈人軺車二算商賈人有軺車又使多出一算重其賦舡五丈以上一算匿不自占占不悉戍邊一嵗没入緡錢悉盡也有能告者以其半畀之元狩四年冬初算緡錢緡絲也以貫錢也一貫千錢出算二十也謂有儲積錢者計其緡貰而稅之昭帝元鳯六年夏詔曰榖賤傷農今三輔太常榖減賤其令以菽粟當今年賦元平元年二月詔曰天下以農桑為本日者省用罷不急官減外繇耕桑者益衆而百姓未能家給朕甚愍焉其減口賦錢有司奏請減十三帝許之宣帝甘露二年春減民算三十一算減錢三十也元帝即位初諫大夫貢禹奏言古民無賦算口錢起武帝征伐四夷重賦於民民産子三嵗則出口錢故民重困至於生子輒殺甚可悲痛宜令兒七嵗去齒乃出口錢年二十乃算天子下其議令民産子七嵗乃出口錢自此始成帝建始二年正月減天下賦算四十本算百二十今減四十為八十平帝元始元年六月天下女徒已論歸家顧山錢月三百謂女徒論罪已定並放歸家不親役之但令一月出錢三百以僱人也後漢光武建武六年十二月詔曰頃者師旅未解用度不足故行什一之稅謂十分而取其一也孟子曰夏五十而貢殷七十而助周百畝而徹其實皆什一也今軍士屯田糧儲差積武帝初通西域始致校尉屯田其令郡國收見田租三十稅一如舊制景帝二年令人田租三十而稅一令依景帝故云舊制桓帝延熹八年八月初令郡國有田者畝斂稅錢畝十錢也靈帝中平二年二月稅天下田畝十錢以脩宫室魏太祖初平袁氏以定鄴都令收田租畝粟四升户絹二疋并綿二斤餘不得擅興晉武帝平吳之後制户調之式丁男之户嵗輸絹三疋綿三斤女及次丁男為户者半輸其諸邊郡或三分之二遠者三分之一夷人輸賨布户一疋逺者或一丈男女年十六已上至六十為正丁十五已下至十三六十一已上至六十五為次丁十二已下六十六已上為老小不事逺夷不課田者輸義米户三斛逺者五斗極逺輸算錢人二十八文元帝時百姓之自投南奔者竝謂之僑人皆取舊壌之名僑立郡縣往往散居無有土着江南之俗火耕水耨土地卑濕無有蓄積之資諸蠻俚洞霑沐王化者為隨輕重收其賧物以禆國用其嶺外酋帥因生口翡翠明珠犀象之饒擁於鄉曲者朝廷因而置之以收其利歴宋齊梁陳皆因而不改其軍國所須雜物隨土所出臨時折課市取乃無常法定例令州郡縣制其任土所出以為徵賦其無貫之人不樂州縣編户者謂之浮浪人樂輸亦無定數任量准所輸終優於正課焉其課丁男調布絹二丈絲三兩綿八兩禄絹八尺禄綿三兩二分租米五石禄米二石丁女竝半之男女年十六已上至六十為丁女年十六亦半課男年十六正課六十六免課女以嫁者為丁若在室者年二十乃為丁其男丁每嵗役不過二十日又率十八人出一運丁役之其田畝税米二升葢大率如此其度量斗則三斗當今一斗稱則三兩當今一兩尺則一尺二寸當今一尺成帝咸和五年始度百姓田取十分之以率畝税米三升哀帝隆和元年減田租畝收二升孝武太元二年除度田收税之制公王以下口税三斛惟蠲在役之身八年増税米五石宋孝武大明五年十二月制天下民户嵗輸布四疋七年十二月制聽受雜物當租以浙東諸郡大旱南齊武帝永明四年詔揚南徐二州今年租户三分二取見布一分取錢來嵗以後逺近諸州輸錢處竝減布直疋准四百依舊折半以為永制明帝建武四年詔所在結課屋宅田桑可詳減舊價後魏道武天興初詔採諸漏户令輸綸緜自後諸逃户占為紬蠒羅縠甚衆明元永興五年正月詔諸州六十户出戎馬一匹泰常六年二月調民二十户輸戎馬一匹大牛一頭六部民羊滿百口輸戎馬一匹文成興安二年正月詔與民雜調十五獻文以和平六年五月即位六月詔曰夫賦斂煩則民財匱課調輕則用不足是以什一而税頌聲作矣先朝權其輕重以惠百姓朕承洪業上惟祖宗之休命夙興待旦惟民之恤故令天下同於逸豫而徭賦不息將何以塞煩去苛拯濟黎元者哉今兵革不起蓄積有餘諸有雜調一以丐民先是興安中文成以常賦之外雜調十五頗為煩重將與除之尚書毛法仁曰此是軍國資用今頓罷之臣愚以為不可帝曰使地利無窮民力不竭百姓有餘吾孰與不足遂免之未㡬復調如前至是乃終罷焉于是賦斂稍輕民復贍矣是年因民貧富為租輸三等九品之制千里外納米上三品入京師中三品入他州要倉下三品入本州孝文延興三年七月詔河南六州之民户收絹一疋綿一斤租三十石十月太上皇將南討詔州郡之民十丁取一以充行户收租五十石以備軍用五年四月詔天下賦調縣專督集牧守封簡送京師違者免所居官太和八年六月始准古班百官之禄以品第各有差先是天下户以九品混通户調帛二疋絮二斤絲一斤粟二十石又入帛一疋二丈委之州庫以供調外之費至是户増帛三疋粟二石九斗以為官司之禄十年給事中李沖上言宜准古五家立一鄰長五鄰立一里長五里立一黨長長取鄉人強謹者鄰長復一夫里長二黨長三所復復征戍餘若民三載亡愆則陟用陟之一等其民調一夫一婦帛一疋粟二石民年十五以上未娶者四人出一夫一婦之調奴任耕婢任織者八口當未娶者四耕牛二十頭當奴婢者八其麻布之鄉一夫一婦布一疋下至牛以此為降大率十疋為公調二疋為調外費三疋為内外百官俸此外雜調民年八十以上聽一子不從役孤獨癃老篤疾貧窮不能自存者三長内迭養之書奏諸官通議稱善者衆孝文從之於是遣使者行其事乃下詔曰夫任土錯貢所以通有無井乗定賦所以均勞逸有無通則民財不匱勞逸均則人樂其業此自古之常道也又鄰里鄉黨之制所由來乆欲使風教易周家至日見以大督小從近及逺如身之使手榦之總條然後口算平均義興訟息是以三典所同隨世汚隆貳監之行從時損益故鄭僑復丘賦之術周人獻盍徹之規雖輕重不同而當時俱適自昔以來諸州户口籍貫不實包藏隠漏廢公罔私富強者并兼有餘貧弱者餬口不足賦税齊等無輕重之殊力役同科無衆寡之别雖建九品之格而豐埆之土未融雖立均輸之楷而蠶織之鄉無異致使淳化未樹民情偷薄朕每思之良懐深慨今革舊從新為里黨之法在乎牧守宜以喻民使知去煩即簡之要初百姓咸以為不若循常豪富并兼尤弗願也事施行後計省昔十有餘倍於是海内安之十二年詔郡臣求安民之術有司上言請折州郡常調九分之二京都度支嵗用之餘各立官司豐年糴貯於倉時儉則加私之一糶之於民如此民必力田以買絹積財以取粟官年登則常積嵗凶則直給又别立農官取州郡户十分之一以為屯民相水陸之宜斷頃畝之數以贓贖雜物市牛科給令其肆力一夫之田嵗責六十斛甄其正課并征戍雜役行此二事數年之中則榖積而民足矣帝覽而善之尋施行焉自此公私豐贍雖時有水旱不為災也二十年十月以州司之民十二夫調一吏為四年更卒嵗開番假以供公私力役孝明孝昌二年冬税京師田租畝五升借賃公田者畝一斗是時辛穆為汝陽太守值水澇民饑上表請輕租賦孝明從之遂勅汝陽一郡聼以小絹為調出帝太昌元年六月詔曰間者凶權誕恣法令變常遂立夷貊輕賦冀收天下之意隨其箕斂之重終納十倍之征掩目捕雀何能過此朕屬念黎蒸無忘寢食加以田桑始事生業未滋若頓依常格或不周展今嵗租調且兩收一丐來年復舊北齊文宣天保初立九等之户富者税其錢貧者役其力武成河清三年定令率以十八受田輸租調二十充兵六十免力役六十六退田免租調率人一牀調絹一疋綿八兩凡十斤綿中折一斤作絲舊制未娶者輸半牀租調有妻者輸一牀無者半牀墾租二石義租五斗奴婢各准良人之半牛調絹二尺墾租一斗義租五升墾租送臺義租納郡以備水旱皆依貧富為三梟其賦税常調則少者直出上户中者及中户多者及下户上梟輸逺處中梟輸次逺下梟輸當州倉三年一校租入臺者五百里内輸粟五百里外輸米入州鎮者輸粟人欲輸錢者准上絹收錢後周太祖為西魏相國創制司賦掌功賦之政令民人自十八以至六十有四與輕癃者皆賦之其賦之法有室者嵗不過絹一疋綿八兩粟五斛丁者半之其非桑土有室者布一疋麻十斤丁者又半之豐年則全賦中年半之下年三之皆以時徴焉若罹凶札則不徴其賦司役掌力役之政令凡人自十八以至五十有九皆任於役豐年不過三旬中年則二旬下年則一旬凡起徒役無過家一人其人有年八十者一子不從役百年者家不從役廢疾非人不養者一人不從役若凶札又無力役武帝保定元年三月改八丁兵為十二丁兵率嵗一月役隋髙祖開皇元年遷都發山東丁毁造宫室仍依周制役丁為十二番匠則六番二年頒新令丁男一牀租粟三石桑土調以絹絁麻土調以絹布絹絁以疋加綿三兩布一端加麻三斤单丁及僕𨽻各半之有品爵及孝子順孫義夫節婦竝免課役三年正月減十二番令嵗役功不過三十日不役者收庸減調絹一疋為二丈初蘓威父綽仕西魏為度支尚書以國用不足為征税之法頗稱其重既而嘆曰今所為者正如張弓非平世法也後之君子誰能弛乎威聞其言每以為己任至是威為民部尚書奏減賦役務從輕典帝悉從之十年五月制人年五十免役收庸是時宇内無事益輕徭賦焉十八年五月左僕射髙熲奏諸州無課調處及課州管户數少者官人禄力乘前以來常出隨近之州但判官本為牧人役力理出所部請於所管户内計户徴税帝從之煬帝大業初除婦人及奴婢部曲之課其後將事遼碣増置軍府掃地為兵自是租賦之人益減矣唐髙祖武德二年制每一丁租二石絹二疋綿三兩自兹以外不得橫有調斂七年三月始定均田賦税每丁嵗入粟三石調則隨鄉土所産綾絹絁為二丈布加五分之一輸綾絹絁者兼調綿三兩輸布者麻三斤凡丁嵗役二旬若不役則收其庸每日三尺有事而加役者旬有五日免其調三旬則租調俱免通正役不過五十日若嶺南諸州則税米上户一石二斗次户八斗下户六斗若夷獠之户皆從半輸蕃胡内附者上户丁税錢十文次户五文下户免之附經二年者上户丁輸半二口次户一口下三户共一口凡水旱蟲傷為災十損四以上免租損六以上免調損七以上課役俱免𤣥宗開元九年十月勅曰如聞天下諸州送租庸行綱發州之日依數收領至京都不合有欠或自為停滯因此耗損兼擅將貨易交折遂多妄稱舉債陪填至州重徵百姓或假托貴要肆行逼迫江淮之間此事尤甚所由既下文牒州縣逓相禀承户口艱辛莫不由此自今以後所有損欠應須陪填一事以上竝勒行綱及元受領所由人知其受納司不須為行下文牒州縣亦不得徵打仍委按察司採訪如有此色所由官停却具狀奏十六年七月勅諸州税及地税等宜令州郡長吏專勾當依限徵納訖具所納數及徵官名品申省如徵納違限及簡覆不實所由官竝先與替仍准法科徵二十二年五月勅定户之時百姓非商户郭外居宅及每丁一牛不得將入財貨數其雜匠及幕事并諸色同類有畨役令免征行者一户之内四丁已上任色役不得過兩人三丁已上不得過一人七月勅自今已後京兆府闗内諸州應徵庸調及資課并限十月三十日畢二十三年六月勅天下百姓正丁課輕徭役所入惟納租庸人以安之國用常足比緣户口殷衆色役繁多每嵗分番計勞入任因納資課取便公私兼租脚税户權宜輕率約錢定數不得不然如聞州縣官僚不能處置凡如此色邀納見錢或非時徵納錢賣布帛既輕蠶織爭務貨泉農商之間頗亦為弊朕每思敦本將以便人期於省約使致通濟自今已後凡是資課税户租脚營窖折里等應納官者竝不須令出見錢抑遣徵備任以當土所司均融支料常令折𠂻十道使明加簡察勿使乖宜二十五年四月勅闗輔庸調所税非少既寡蠶桑皆資菽粟常賤糴貴賣捐費逾深又江淮苦變造之勞河路増轉輸之弊每計其運脚數倍加錢今嵗屬和平庶物穰賤南畝有十千之獲京師同水止之饒均其餘以減逺貴順其便使農無傷自今已後闗内諸州庸調資課竝宜准時價變粟取米送至京逐要支用其路逺處不可運送者所在收貯便充隨近軍糧其河南河北有不通水舟宜折租造絹以代闗中調課所司仍明為條件稱朕意焉九月詔曰大河南北人户殷繁衣食之原租賦尤廣頃年水旱厫庾尚虗今嵗屬和平時遇豐稔而租所入水陸運漕縁脚錢雜必甚傷農務在優饒惠彼黎庶息其轉輸大實倉儲今年河南河北應送含嘉太原等倉租米宜折粟留納本州天寳元年正月勅如聞百姓之内有户髙丁多茍為規避父母見在乃别籍異居宜令州縣勘㑹其一家之中有十丁已上者放兩丁征行賦役五丁已上放一丁即令同籍共居以敦風教其賦丁孝假與免差科三年十一月制自今以後天下百姓宜以十八已上為中男二十三已上成丁每載庸調八月徵收農功未畢恐難濟辨自今已後延至九月二十日為限八載正月勅朕永念黎元務𢎞愛育所以惠政頻及善貸相仍亦將克致和平登於仁壽如聞流庸之軰漸亦歸復浮食未還其數非廣靜言此色竝見其繇葢為宰牧等授任親人職在安戢稍有逃逸恥言減耗籍帳之間虗存户口調賦之際旁及親隣此弊因循其事自乆寤寐興念良用憮然不有釐革孰致殷阜其承前所有虗掛丁户應徵租庸課税令近親隣保代輸者宜一切竝停應合除削各委本道採訪使與外州相知審細簡覆申牒所繇分其逃還復業者務令優恤使得安存縱先為代輸租庸不在酬還之限是時庸調租等約出絲綿郡縣計三百七十餘萬丁庸調輸絹約七百四十餘萬疋每丁計二疋綿則百八十五萬餘屯每丁三兩六兩為屯每兩丁合成一屯也租粟則七百四十餘萬石每丁兩石約出布郡縣計四百五十餘萬丁庸調輸布約千三十五萬餘端每丁兩端一丈五尺十丁則二十二端也其租約百九十餘萬丁江南郡縣折納布約五百七十餘萬端大約八等以下户計之八等折租每丁三端一丈九等則二端二丈今通以三端為率也二百六十餘萬丁江北郡縣納粟約五百二十餘萬石大凡都計租税庸調每嵗錢粟絹綿布等約得五千二百三十餘萬端疋屯貫石十四載八月制天下諸郡逃户有田宅産業妄被人破除并縁欠負租庸先以親鄰買賣及其歸復無所依投永言至此須加安輯應有復業者宜竝却還縱已代出租税亦不在徵陪之限國之役力合均有無比來應定門夫殊非得所每縣中男多者累載方始一差中男少者一周遂役數過既縁偏併豈可因循自今已後諸郡所差門夫宜於當郡縣通率准式納課分配令得均平代宗廣德元年七月詔一户之中有三丁放一丁庸調地税依舊每畝税二升天下男子宜二十五嵗成丁五十五入老應徵税租刺史縣令據見在户徵税其逃亡絶者不得虗攤鄰保二年二月制冦戎以來積有年嵗徵求數廣彫弊轉深自今已後除正租税及正勅并度支符外餘一切不在徵科限永康元年五月京畿表大稔京兆尹第五琦奏請每十畝官税一畝效古十一之義從之二年五月諸道税地錢使殿中侍御史韋元𦙍等自諸道使還乾元已來屬天下用兵京師百官俸錢減耗帝即位推恩庶僚下議公卿或以税畝有苗者公私減濟乃分遣憲官税天下地青苗錢以充百司課料至是得錢四百九十萬貫仍以御史大夫為税地錢物使嵗以為常均給百官大歴元年十一月制曰夫從簡之道大易至言薄賦之規前王令範朕志遵儉約務欲息人徵斂無期誠為勞弊天下百姓除正租庸及軍器所須外不承正勅一切不得輙有科率逃亡失業萍泛無依特宜招綏使安鄉井其逃户復業者宜給復三年如百姓先貨賣田宅盡者宜委州縣取逃户死口田宅量丁口充給仍仰縣令親至鄉村安存處置務從樂業以贍資糧王畿之間賦斂尤重百役供億當甚艱辛哀我疲人良深憫念盍徹之税著自周經未便於人何必行古其什一之税宜停四年正月詔曰有司定天下百姓及王公已下每年税錢分為九等上上户四千文上中户三千五百文上下户三千文中上户二千五百文中中户二千文中下户一千五百文下上户一千文下中户七百文下下户五百文其見任官一品准上上户九品准下下户餘品竝准依此户等税若一户數處任官亦每處依品納税其内外官仍據正員及占額内闕者税其試及同正員文武官不在税限其百姓有邸店行舖及爐冶應准式合加本户二等税者依此税數勘責徵納其寄莊户准舊例從八等户税寄住户從九等户税比類百姓事恐不均宜各遞加一等税其諸色浮客及權時寄住户等無問有官無官亦所在為兩等收税稍殷者准八等户餘准九等户如數處有莊田及每處税諸道將士莊田既縁防禦勤勞不可同百姓例竝一切從九等輸税十月勅曰比屬秋霖頗傷苗稼百姓種麥其數非多如聞村閭不免流散來年税麥須有優矜其大歴五年夏麥所税特宜與減常年税其地總分為兩等上等每畝税一斗下等每畝税五升其荒田如能開佃者一切每畝税二升令在必行用明大信仍委令長宣示百姓并録勅牓示村坊要路令知朕意十二月勅頃以蕃冦猶虞王師未戢所資軍費皆出邦畿征調薦興日加煩重念流亡之役減嵗入之租務於惠養兾有蘇息尚聞告病終未安居深用愧悼更思愛䘏今闗輔諸州墾田漸廣江淮轉漕常數又加計一年之儲有大半之助其餘他税固可從輕其京兆來年秋税宜分作兩等上下各半上等每畝税一斗下等每畝税六升其荒田如能佃者宜准今年十月二十九日勅一切每畝稅二升仍委京兆尹及令長一一存撫令知朕意五年三月定京兆府百姓税夏税上田畝税六升下田畝税四升秋税上田畝税五升下田畝税三升荒田開佃者畝率二升八年正月詔諸色丁匠如有情願納貲課代役者每月每人任納錢二千文其青苗地頭錢天下諸州每畝率十五文比以京師煩劇加至三十文自今已後宜准諸州例每畝十五文册府元龜卷四百八十七
