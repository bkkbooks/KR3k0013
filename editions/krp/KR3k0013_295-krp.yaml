body:
  text: 册府元龜卷二百九十五宋王欽若等撰宗室部復爵自周成以來竝建懿戚大啓土宇所以彊幹弱枝𫝊祚遐世顧豈欲絶之者哉其或反道敗徳弗率王庭作威弛禁侵害吏治則削而絀之用殄厥世斯葢不得已而為之也然後推敦族之恩申猶宥之典赦其罪戻還其璽綬或則加禮諡於既沒復爵土於嗣子俾宗祊無損邦畿如舊霈然渥縟與之更始亦有被誣見疑非辜遘禍率用追復以申其寃斯皆厚親親之仁成亢宗之美也漢淮南王長高祖少子以謀反遷蜀道死民有作歌歌淮南王曰一尺布尚可縫一斗粟尚可舂兄弟二人不相容一尺布可縫而共衣一斗粟可舂而共食况以天下之廣而不相容也文帝聞之曰昔堯舜放逐骨肉周公殺管蔡鯀及共工皆堯舜之同姓故云骨肉天下稱聖不以私害公天下豈以為我貪淮南地邪廼徙城陽王王淮南故地而追尊淮南王為厲王置園如諸侯儀後漢楚王英以逆謀廢徙丹陽涇縣明年至丹陽自殺詔遣光禄大夫持節弔祠贈賵如法加賜列侯印綬以諸侯禮葬於涇元和三年又遣謁者備王官屬迎英䘮改葬彭城加王赤綬羽葢華藻如嗣王儀追爵諡曰楚厲侯阜陵王延以逆謀貶爵為侯章帝行幸九江賜延書與車駕㑹壽春帝見延及妻子愍然傷之乃下詔曰昔周之爵封千有八百而姬姓居半者所以楨幹王室也朕南巡望淮海意在阜陵遂與侯相見侯志意衰落形體非故瞻省懷感以喜以悲今復侯為阜陵王増封四縣并前為五縣齊王晃光武兄伯升曾孫晃與太姬宗更相誣告章和元年有司奏請免晃爵為庶人徙丹徒帝不忍下詔貶晃爵為蕪湖侯遣謁者收晃璽綬晃立十七年而降爵晃卒子無忌嗣帝以伯升首創大業而後嗣罪廢心常愍之時北海亦絶無後詔令復二國永元二年乃復封無忌為齊王勃海王悝謀為不道有司請廢之桓帝不忍貶為癭陶王食一縣悝後因中常侍王甫求復國許謝錢五千萬桓帝遺詔復為渤海王魏巳氏公琮坐於中上方作禁物貶爵都鄉侯明帝景初三年復巳氏公吳齊王奮廢徙章安廢帝太平三年封為章安侯詔曰齊王奮前坐殺吏廢為庶人連有赦令獨不見原縱未宜復王何以不侯又諸孫兄弟作將列在江渚孤有兄獨爾云何有司奏可就拜為侯晉高陽王睦宣帝弟子也初封中山王坐誘逋亾貶封丹水縣侯太康初詔復爵有司奏封江陽王武帝曰睦退靜思愆改脩其徳今有爵土不但以赦江陽險逺其以高陽郡封之乃封為高陽王汝南王亮為楚王瑋所害及瑋誅追復亮爵位䘮葬之禮如安平獻王孚故事廟設軒懸之樂汝南郡王羕汝南王亮之子永興初為侍中以長沙王乂黨廢為庶人惠帝還雒復羕封為撫軍將軍又以汝南期思西陵益其國齊王冏為長沙王乂所害惠帝光熙初追册曰咨故大司馬齊王冏昔以宗籓穆裔紹世緒于東國作翰許京允鎮靜我王室誕率義徒同盟觸澤克成元勲大濟潁東朕用應嘉茂績謂篤爾勞俾式先典以疇兹顯懿廓土殊分跨兼吳楚崇禮備物寵侔蕭霍庶慿翼戴之重永隆邦家之望而恭徳不建取侮二方有司過舉致王于戮古人有言曰用其法猶思其人况王功濟朕身勲存社稷追惟既往有悼於厥心哉今復王本封命嗣子還紹厥緒禮秩典度一如舊制使持節大鴻臚即墓賜䇿祠以太牢魂而有靈祇奉朕命肆寧爾心嘉兹寵榮子超嗣爵永嘉中懷帝下詔重述冏倡義元勲還贈大司馬加侍中假節追諡成都王穎既死汲桑載頴棺於軍每事啓靈以行軍令桑敗棄棺於故井中頴故臣收之改葬於雒陽懷帝加以縣王禮東安王繇以專行誅賞兄澹因隙譖之汝南王亮惑其説免繇官以公就第坐有悖言廢徙帶方惠帝永康初徴繇復封後遭母䘮在鄴勸成都王頴解兵為頴所害永寧元年九月追復其爵河間王顒安平獻王孚孫為南陽王模使人扼殺之武帝咸和六年六月復顒爵位棘陽王竒義陽王望孫望薨竒襲坐遣三部吏到交廣商貨為有司所奏武帝太康九年詔貶為三縱亭侯復立為棘陽王東萊王𬎼齊王冏兄冏輔政𬎼與左衛將軍王輿謀共廢冏事覺免為庶人尋詔徙𬎼上庸後封微陽侯上庸内史陳鍾承冏㫖害𬎼冏死詔誅鍾復𬎼封改葬吳王晏武帝子與兄淮南王允共攻趙王倫允敗倫貶晏為賓徒縣王後徙封代王倫誅復本封武陵王晞為太宰為桓温所忌温逼新蔡王晃自誣與晞及晞子綜等謀逆請誅之簡文帝不許温奏徙新安郡家悉徙之太元六年晞卒孝武帝三日臨于西堂詔曰感惟摧慟便奉迎靈柩并改移妃應氏及故世子梁王諸䘮家屬悉還復下詔曰故前武陵王體自皇極尅已思愆仰惟先朝仁宥之㫖豈可情理靡寄其追封新寧郡王邑一千户十二年追復晞武陵國王梁王㻱晞子出繼梁王翹與父晞俱廢薨子龢嗣孝武太元中復國宋廬陵王義真高祖子也少帝失德徐羡之等宻謀廢立則次第應在義真以義真輕𦕈不任主社稷因其與少帝不恊乃奏廢為庶人徙新安郡景平二年六月羡之等遣使殺於徙所文帝元嘉元年八月詔曰前廬陵王靈柩在逺國封堕替感惟摧慟情若貫割王體自至極地戚屬尊豈可令情禮永淪終始無寄可追復先封特遣奉迎并孫脩華謝妃一時俱還言增摧哽三年正月誅徐羡之𫝊亮等是日詔曰故廬陵王含章履正英哲自然道心内昭徽風遐被遭時多難志匡權逼天未悔禍運鍾屯險群㓙肆醜專竊國柄禍心濳構釁生不圖朕每永念讐耻含痛内結遵養奸慝情禮未申今王道既亨政刑始判宣昭國章於是乎在可追崇侍中大將軍王如故庶慰寃魂少申悲憤江夏王義恭高祖子也為前廢帝所害太宗定亂令書曰故中書監太宰領太尉録尚書事江夏王道性淵深睿鑒通逺樹聲列藩宣風鉉徳位隆姬輔任屬負圖勤勞國家方熙託付之重盡心毗道永融雍穆之化而㓙醜忌威奄加寃害夷戮有暴殯穸無聞憤逹幽明痛貫朝野朕蒙險在難含哀莫申幸賴宗社之靈克纂祈天之祚仰惟勲戚震慟厥心昔梁王徴庸警蹕備禮東平好善黄屋在御况公徳猷𢎞懋彞典未殊者哉可追崇使持節侍中都督中外諸軍事丞相領太尉中書監録尚書事如故給九旒鸞輅虎賁班劍百人前後部羽葆皷吹輯輬車安隆王叡江夏王義恭子為元㓙所害孝武大明二年追封安隆王追諡宣王贈江夏王伯禽亦義恭子也伯禽官輔國將軍為前廢帝所害諡曰哀世子又追贈江夏王改諡曰愍始平王子鸞孝武之子孝武諸子多為前廢帝所害廢帝素疾子鸞有寵遣使賜死同生弟妹竝死及明帝即位詔曰夫紓寃伸痛雖往必追縁情測愛感事彌逺故使持節都督南徐州諸軍事撫軍南徐州刺史新安王子鸞夙表成器早延殊寵方樹美業克光藩維而㓙心肆忌奄罹横禍興言永傷有兼常懷宜旌天秀以雪沉魂可贈使持節侍中都督南徐兖二州諸軍事司徒南徐州刺史王如故第二皇子子師俱嬰謬酷有增酸悼子師復先封為南海王竝加徽諡南齊明帝初輔政所誅諸王及即位後復屬籍各封諸子為侯梁長沙元王弟藻武帝普通三年遷領軍將軍加侍中六年為軍師將軍與西豐侯正徳北伐渦陽輙班師為有司所奏免官削爵土七年起為宗正卿八年復封爵臨賀王正徳普通六年逃奔于魏七年又自魏逃歸高祖不之過也復其封爵後魏河間公齊太武時坐事免官爵後為前將軍尅仇池威震羌氐復賜爵河間公襲江陽王繼為青州刺史後入為度支尚書繼在青州之日民饑餒為家僮取民女為婦妾又以良人為婢為御史所彈坐免官爵靈太后臨朝復繼尚書本封襲廣陽王淵為葛榮所害莊帝追復王爵諡曰忠武汝隂王天賜為懷朔大將軍坐貪殘恕死削除官爵卒孝文哭於思政觀贈本爵塟從王禮諡曰靈王東平王匡為度支尚書又兼宗正卿每有奏請尚書令任城王澄時致執奪匡剛隘内遂不平澄因是奏匡罪狀三十餘條廷尉處以死刑詔付八議特加原宥削爵除官孝明孝昌初卒追復本爵改封濟南王中山王英為鎮南將軍行揚州梁遣將冦肥梁詔英率衆討之英表云可尅後水盛英及諸將狼狽奔退士衆没者十五六有司奏英經筭失圖案劾處死詔恕死為民後復王封邑千户樂陵王思譽為鎮北大將軍及穆泰隂謀不軌思譽知而不告恕死削封為庶人孝文太和末復還其王爵京兆王愉出為冀州刺史謀逆事敗見執徴赴京師至野王絶氣而死或云高肇令人殺之後靈太后令愉之四子皆附屬籍追封愉臨洮王子寶月乃改塟父母追服三年河間王琛以討鮮于脩禮敗免官爵後討汾晉胡屬卒於軍追復王爵北海王詳獻文子也宣武親政尚書高肇譖詳與茹皓等謀為逆亂付廷尉治罪詔免為庶人别營坊館如法禁衞限以終身詳哭數聲而暴死停殯五載永平元年十月詔曰故太傅北海王體自先皇特鍾友愛受遺訓輔冲昧攸託不圖暮節晦徳終缺哀榮便可追復王封尅日營厝少慰幽魂以旌隂戚諡曰平王咸陽王禧謀反賜死後孝明正光中復禧王爵葬以王禮襲趙郡王謐在母䘮聽音聲飲戯為御史中尉李平所彈遇赦復封樂浪王長命坐殺人賜死除國子忠明帝時復前爵位襲安樂王鑒為北討大都督討葛榮與都督裴衍共救信都鑒謀反降葛榮都督源子邕與裴衍圍鑒斬首傳雒詔改其元氏莊帝初許復本族又特復鑒王爵贈司空畧陽王羯兒督諸軍討秃髪坐貪暴降爵為公後統河西諸軍襲蠕蠕至於漠南仍復王爵廣陽王嘉之孫湛弟瑾以謀殺齊文襄王事泄合門伏法湛先有婢紫光生子法輪齊王矜湛覆㓕乃慰原之復其爵土襲京兆王大興拜長安鎮大將軍以黷貨削除官爵後除秘書監還復前爵後周常武公㑹邵惠公孫初封譚國公後與晉公護同誅建徳三年追復封爵常武公唐巢王元吉高祖第四子武徳元年封為齊王九年與太子建成謀逆伏誅貞觀元年追封海陵郡王諡曰剌十六年七月又詔曰有虞受終𢎞肆赦之典隆周革命篤親親之恩海陵剌王元吉地維藩翰夙承朝寵陷於不軌得罪君親朕嗣膺靈命無㤀敦睦同生之重既切於本枝在原之悼寔纒於歲月興言泉壤思備寵章可追封巢王諡乃依舊荆王元景高祖第六子武徳三年封為趙王貞觀十年徙封荆王永徽三年坐與房遺愛謀反賜死國除後追封沈黎王備禮改葬韓王元嘉高祖第十一子武徳四年封宋王五年徙荆王貞觀十年改封韓王埀拱四年則天誅戮宗室諸王不附已者元嘉大懼與其子黄國公及越王貞父子謀起兵坐誅神龍元年追復爵土封其第五子訥為嗣韓王是年二月制皇室子孫諸王自埀拱已來非命者皆不埋殯宜令州縣尋求處所以牲牢致祭乃追復官爵備禮改殯其王并令陪葬昭獻二陵有嗣者即令承襲無息嗣者取近親為後霍王元軌高祖第十四子武徳六年封蜀王八年徙封吳王貞觀十年改封霍王埀拱四年坐與韓王元嘉連謀起兵事覺徙居黔州至陳倉而死長子緒封江都王坐與裴承光交通被誅神龍元年並追復爵土封緒孫暉為霍王嗣舒王元名高祖第十八子貞觀五年封譙王十年徙封舒王永昌中與其子豫章王亶俱為丘神勣所陷被殺神龍元年復其官爵仍令以禮改葬封亶子津為嗣舒王魯王靈夔高祖第十九子貞觀五年封魏王十年徙燕王十四年改封魯王垂拱四年與韓王子黄國公譔結謀起兵事洩流辰州縊死有二子長子清河王詵少子范陽王謁亦為酷吏所陷神龍元年追復靈夔官仍令以禮改葬封謁子道堅為嗣魯王江夏王道宗高祖從父兄之子永徽四年房遺愛伏誅長孫無忌禇遂良素與道宗不協上言道宗與遺愛交結流配象州道宗病卒及無忌遂良得罪乾封元年追復道宗官爵吳王恪太宗第三子貞觀三年封蜀王十年徙封吳王永徽四年房遺愛謀反遂因事誅恪以絶衆望子四人仁瑋琨璄竝流于嶺表尋追封恪為鬰林王又封仁為鬰林侯蜀王愔太宗第六子吳王恪之母弟貞觀五年封梁王十年改封蜀王恪既誅愔黜為庶人徙巴州尋改為涪陵王咸亨初追復爵土陪葬昭陵諡曰悼封子璠為嗣蜀王越王貞太宗第八子貞觀五年封濮王十年徙封原王尋改封越王埀拱四年貞及其子瑯琊王冲坐與韓王元嘉結謀起兵被誅改姓虺氏神龍元年追復王與子冲俱復舊姓紀王慎太宗第十子也貞觀五年封申王十年改封紀王垂拱中越王貞將起事慎不肯同謀及貞敗慎亦下獄臨行免改姓虺氏配流嶺表至蒲州而卒中興初追復官爵澤王上金高宗第三子永徽元年封杞王文明元年封畢王又改澤王永昌元年出為随州刺史武承嗣使酷吏周興誣告上金謀反召至都恐懼自縊死神龍元年追復上金官爵封庶子義珣為嗣澤王許王素節高宗第四子永徽二年封雍王尋徙郇王改葛王又進封許王出為舒州刺史與澤王上金同被誣告追赴都縊死則天以庶人禮葬之神龍元年追封許王以禮改葬封少子瓘為嗣許王成王千里吳王恪之長子本名仁封鬰林侯中興初進封成王為左金吾衛將軍三年節愍太子謀殺武三思兵敗與其子天水王僖俱被誅改姓蝮氏景雲元年詔曰故成王千里保國安人克成忠義願除㓙醜翻陷誅夷永言淪没良深痛悼宜復舊官爵復本姓歸政郡王俊吳王恪第四子本名璄中興初封歸政郡王宗正卿坐兄千里事貶南州司馬卒景雲元年追復宗正卿歸政郡王官爵常山公倩越王貞第二子垂拱中坐與父貞兄冲連謀起兵被誅神龍初侍中敬暉等以冲父子翼戴皇家義存社稷請復其官爵武三思令上官昭容代中宗手詔不許開元四年詔追復爵土令備禮改葬棣王琰𤣥宗第四子也坐二孺人不相叶乃宻求巫者書符置於琰履中以求媚琰監院中官宻奏於𤣥宗𤣥宗命推問之竟孺人也𤣥宗猶疑琰知情乃囚於鷹狗坊中絶朝請憂懼而死代宗寶應元年贈其王位鄂王瑶𤣥宗第五子開元二十五年得罪廢寶應元年追復光王琚𤣥宗第八子也有才力𤣥宗愛之以母見踈薄嘗有怨言為人所構得罪寶應元年追復齊王凑穆宗第六子也初封漳王後為鄭注誣告王與宋申錫謀不軌降封巢縣公卒開成三年正月追封為齊王梁博王友文為庶人友珪所害末帝即位詔曰我國家賞功罸罪必叶朝章報徳伸寃敢欺天道茍顯違于法制雖蹔滯于歲時終振大綱須歸至理重念太祖皇帝嘗開霸府有事四方迨建皇朝載遷都邑每以主留重務居守難才慎擇親賢方應寄任故博王友文才兼文武識逹古今俾分憂於在浚之郊亦共理於興王之地一心無易二紀于兹常施惠於士民實有勞於國家去歲郢王友珪嘗懷逆節已露兇鋒將不利於君親欲竊窺於神器此際直先皇寢疾大漸日臻博王乃宻上封章請嚴宮禁因以萊州刺史授於郢王友珪纔覩宣頭俄行大逆豈有自縱兵於内殿却翻事於東都又矯詔書枉加刑戮仍奪博王封爵又改姓名寃恥兩深誑欺何極伏賴上𤣥垂祐宗社降靈俾中外以叶謀致遐邇之共怒尋平内難獲勦元㓙既雪恥於同天且免譏於共國朕方期遁世敢竊臨人遽廹推崇爰膺纘嗣寃憤既伸於幽顯霈澤宜及於下泉博王宜却復官爵仍令有司擇日歸葬後唐贈太保從璨明帝之諸子性剛直好客踈財意豁如也天成中為右衞大將軍時安重誨方秉事權從璨亦不之屈重誨常以此忌之明宗幸汴留從璨為大内皇城使一日召賔友於㑹節園酒酣之後戯登於御榻安重誨奏請誅之詔曰皇城使李從璨朕廵幸汴州使警大内乃全乖委任但恣追遊於予行從之園頻恣歌歡之㑹仍施峻法顯辱平人致彼諠譁達於聞聽方當立法固不黨親宜貶授房州司户參軍仍令盡命長興中重誨之得罪也詔復舊官仍贈太保册府元龜卷二百九十五
