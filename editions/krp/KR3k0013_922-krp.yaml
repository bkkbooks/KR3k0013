body:
  text: 冊府元龜卷九百二十二宋王欽若等撰總録部妖妄第二唐崔履行者北齊尚書僕射暹之孫也頗有才辯自言道術隋煬帝嘗令煉丹於王母祠履行妻父麴稜為冀州刺史竇建徳攻之履行在稜所因白稜曰城守多年士卒疲弊若其驟戰彌致死傷此自弱之道也今有禳敵之術不假遺鏃之費而賊自殺願効之於使君稜初不許而惑其詭辯卒從之履行遣陴守者皆坐不得妄戰因令衆曰賊若乘城慎勿懼我必令賊自縳也既而履行於星月之下設壇章醮身衣縗絰杖笪登北樓慟哭又令婦人外屋西向振裾賊攻之急俄而城陷履行哭猶不輟志覺大原人為沙門死經十日而蘇言多妖妄謂總管李仲文曰公五色光見有金狗自衛仲文荅曰闗中十五己上並事洛陽亢陽不雨榖食騰涌天意人事表裏可知若為計今其時也髙祖固疑之及唐儉使太原又言於髙祖曰仲文信惑妖邪自謂應䜟及言龍附己即於汾州置龍㳺府又娶陶氏之女以應桃李之歌髙祖追仲文赴朝以罪伏誅李孝常隋兵部尚書圓通之子髙祖時為利州都督每以佃獵為務太宗嗣位表請入朝因留京師其子義宗坐刼盗被誅因此怨望與劉徳裕等隂圖不軌其子義立謂其友人蔡惲曰我常從齊王遊獵與王相失道傍見一老母眉髮皓然我問王所在答曰汝即王也因忽不見鄠縣丞李延曰往於太和谷得一石其狀如龜外有秊圓郭中有常字又新錢文曰開元通寳此即圓通之子孝常之符命也有劉文贊者又言衛元髙詩云天道自常此則孝常之䜟矣徳裕乃與孝常之甥統軍元宏善及監門將軍長孫業謀以入直之夜勒兵以起大事尊李孝常為帝徳裕武徳初自洛陽歸國為秦王府庫直騎歴護軍太子左内率遷為將軍與孝常通謀克日將反其子孝本又謂賀婁善積曰我父好酒豁達有漢髙之風手握禁兵而左驍衛大將軍劉宏基右騎衛大将軍長孫順徳郎將元律城門郎韋元整等深親善今起大事嘯命必成不宜屈於人下劉文贊亦奨成其事徳裕曰我生日有異當汝請又大業初童謠曰白楊樹下一池水决之則是劉不决則為李但李在未决之前劉居已决之後明知李氏以後天下當歸我家當决之順天之命耳後謀洩及其黨與皆伏誅死者十二人公孫嘗河東人也自言好養生能黄白之術遂徧歴卿相之門時衛州人劉道安自云頭有肉角隠見不常誑惑州人多信附遂授官建號期於貞觀二十年二月舉兵反嘗亦通知其謀事猶未發㑹十九年正月太宗以他事召嘗嘗懼罪而自殺嘗弟節因告其事道安等十餘人皆伏誅那羅邇娑婆寐帝那伏國人也貞觀二十二年右衛率長史王𤣥策破帝那伏國得之自言夀三百嵗云有長生之術太宗頗信之深加禮敬館之金飈門内造延年之藥令兵部尚書崔敦禮監主之發使天下採諸竒藥異石不可勝數又遣使往娑羅門諸國以求藥物有藥名畔茶佉水出山中石臼内有七種色或熱或冷能消草木金鐵人手入水即銷爛若欲取之以駱駞髑髏沈於石臼以水轉注瓠蘆中毎有此水處即有石柱似人形守之若彼山人傳道出此水者即死又有藥名咀頼蘿在髙山石崖腹有石孔孔前有一小樹其葉青緑狀如藜杏石孔中有大毒蛇守之人不得到欲取此樹為藥以大方頭箭射取枝葉葉下便有鳥鳥御将飛去即以衆箭射鳥而取其葉詭異之事類多如此徒延嵗月術卒不就後放之還其本土竟不去終死於長安段方謙金城人太極初昇太極殿登御牀自稱天子呼宿衛兵士令稱萬嵗有司固請誅之睿宗以為風狂特免死流嶺表劉誡之太極初與盧千仞及太常博士靳翰太僕署令李奐通謀以誡之有尺分預為結託曰靳翰為今之子房千仞謂長安縣尉常彦偉曰代有真人足下不欲一見乎彦偉佯許之定日過焉遂報其父左羽林将軍元楷奏降中使於元楷宅房中彦偉延入與説使者具録以聞及其黨胡太宰出入玉門妖惑衆庶事發並同日就戮王懐古𤣥宗開元初謂人曰釋迦牟尼佛末更有新佛出李家欲末劉家欲興今各當有黒雪下具州合出銀城勑下諸道按察使捕而戮之懐照蒲州大雲寺僧也嘗建石碑云我母夢日入懐而生因名懐照開元七年或告於郡刺史李尚隠以聞下州訊其状懐照曰偶然寓意用副巳名慮其疑誤已改作王昭時有詞客馮待徴為其文張待聘勒其字待聘皆與懐照詞同尚隠奏曰老僧愚駑誠不足教夢日之狀稍渉妖訛勑曰懐照訛言信無憑據量其情狀終合徴懲宜遣播州安置到彼勿許東西馮待徴等事已經恩赦特從釋放姚閎者宰相元崇孫也左相牛仙客初為朔方軍使閎為判官及知政事閎累遷侍御史自云能通鬼道預知休咎仙客頗信惑之及疾甚閎請為仙客祈禱在其門下遂逼仙客令作遺表薦閎叔尚書右丞奕及兵部侍郎盧渙堪代已閎為起草仙客既時危殆署字不成其妻因中使来弔以其表上𤣥宗覺而怒之左遷奕為永陽太守盧渙為臨淄太守賜閎死王璵開元末為太常博士每行祠禱或焚紙錢禳祈福祐近於巫覡乾元中累至中書侍郎平章事肅宗嘗不豫大卜祟在山川璵乃遣女巫分行天下祈祭名山大川巫皆盛服乘傳而行後轉太子少師卒璵以妖妄致位将相以左道進者往往有之李泌徳宗朝為相頗有讜直之風而好談神仙鬼道或云嘗與赤松子王喬安期羡門逰處故為代所輕雖詭道求容不為時君所重李廣宏小字軟奴自稱嵩山僧或詐云王孫因涇原兵叛奔至邠州為僧自稱見五嶽四瀆神言為天子令今年九月㓂及五月與其黨王昌皆至京師有董昌者導廣宏舍於資敬寺尼智因董昌又令妖人唐郛言廣宏當大貴郛又誘射生將韓欽緒李政諫南珍霞及神策将魏循李傪前越州㕘軍李昉明經陸降於廣宏所皆行君臣之禮各有署置廣宏通於智因許以為妃又云嶽瀆為我擇十月十日庚寅舉行魏循李傪上變令中官捕之三司覆驗連坐死者數百人張洪撫州人也憲宗元和四年洪乘牛備冠屨古服詣光順門獻書以無可取遣之梁叔髙者妖人也元和九年自廣州来授書於吏部侍郎楊於陵使為已輔於陵執以告勅京兆府杖殺之栁泌本姓楊名仁晝少習方術憲宗末年鋭於服餌詔天下捜訪竒士宰相皇甫鏄與鄂節度李道古薦泌及僧大通等皆待詔翰林泌動多詐自言能致雲藥并黄白術憲宗頗竒之因盛言天台多靈草羣仙所㑹臣嘗知之而力不能致願假郡縣之權以求之憲宗以為然乃授台州刺史賜服金紫咸諫曰方士不當假以州郡之政憲宗怒曰煩一郡之力而致神仙不死之事臣下於吾何惜焉由是不敢復諫泌到州驅吏人於山谷間聲言採藥鞭撻慘急嵗餘一無所得懼詐發獲罪遂挈其家潛入山谷本道觀察使捕之送京師鎛與道古保明其能又詔直翰林院憲宗服泌藥日以躁渴竟為所誤大通自云年一百五十嵗有不死藥穆宗即位詔曰山人栁泌輙懐左道上惑先朝罔求牧人貴欲疑衆自知虚誕仍更逋逃僧大通醫方不精藥術皆妄既延禍釁俱是奸邪邦國罔有常刑人臣所宜共棄宜並付京兆府决痛杖一頓處死翰林醫官董宏景程準山人李元戢田佐元並流嶺表初栁泌繋於京兆府吏人或問曰何苦虚詐如此泌曰皆道古教我且令我言四百嵗時人或謂将死必自能𨼆化及解衣就刑訖無他異唯炙灼之痕浃體而已田佐元鳳儀虢縣人亦自言有竒術能變瓦礫為黄金自白衣授本縣令其餘皆遞相薦引罔上惑衆歡歡景公寺僧也穆宗長慶二年以妖言惑衆下伏内鞠之多引中人無驗竟杖殺之其坐死者數人張良自言舉進士敬宗寳厯二年以造妖言付京兆府杖殺之良不知其所從来先是假托神人於絹上朱書論朝廷事及勸帝東幸令家僮夜詣中尉劉宏規門投之門人即時擒獲按驗以迷妄伏罪周息元浙西隠士也寳厯二年八月徴至闕息元上言識張果葉静能有詔命畫工李士昉就問其狀而寫之息元居淮浙間自號數百嵗其實一常人也及是又多虚誕蠱惑之説人頗非之髙駢為淮南節度使有吕用之張守一諸葛殷者皆江吳醫祝之輩咸昇之劇職寘於左右用之曽言於駢曰神仙好樓居因於公守之北跨河起迎仙樓晝夜斤斧相續半嵗方成所費巨萬竟未登逰又起延和閣髙八十尺綺窻綉户飾以珠金每焚香於上祈王母之降吕用之曰磻溪真君守一曰赤松子殷曰葛将軍復有姓蕭者謂之曰秦穆公駙馬其妖誕率多此類用之又曰𤣥真上聖要降非難所患者學道之人淫穢未斷或神狎近俗輩接對凡人則真氣有虧靈貺遂絶駢乃謝絶人事寂然而已賔僚將吏無復遇其面有不得已而見者則使其人沐浴齋戒而後得見致拜而已罕得交言繇是内外隔絶政事巨細一委用之守一副使李琯觀察轉運判官顧雲盧説愛將梁纉猶子傑皆相屬以目不敢指諫後怪異數見駢忽忽不安竟為畢師鐸所殺吕用之者鄱陽人性桀黠畧知文字事九華山道士牛𢎞徽求驅役考召之術𢎞徽死乃客於廣陵楮巾布褐用符藥以給衣食及丞相劉鄴節制淮海有以蠱道寘於法者用之懼南適江浙時髙駢鎮京口求不死之術乃謁焉㑹駢有愛將俞公楚薦之尋欲署以文職用之乞居牙校駢因試其能左右附成其偽駢既篤信丹竈之外訪以時事用之悉能茍合矯順駢遂委仗先是駢之舊将有譛俞公楚姚歸禮用之悉排斥散地駢遂孤立大逞仙書神物左右羣小咸用之所樹由是賄賂公行條章日費用之又請募軍二萬人為左右鏌邪軍以總之起第千餘間出則肩輿小駟驅殿蔽路入則姬侍百餘輩皆廣陵極色又建樓百尺目曰占星欲遍窺城中慮有權兵圖己者或連日宴聚箕斂市肆留三司綱運半歸其家凡欲奪人資産掠人妻妾則以利禄誘其親者使告之不法捕入鍛鍊委曲以成其獄亦有以金帛免其斬絞號曰贖命駢覽其文簿皆唯唯稱其能姚歸禮怒用之欲手刅焉㑹用之宿於倡樓居禮縱火焚其鄰舎用之覺易服而遁火遂爇千餘家不止時僖宗中和三年三月也歸禮與俞公楚尋為用之所圖駢有從子前左驍騎大將軍濬曽疏用之罪二十餘幅其畧曰吕用之誑惑尊徳塗炭生靈奸偽之名逺近諠沸内則以神仙之事茍媚一時外則行節制之權取怨百姓大将則畏死不説從事則尸禄求容荏苒數年䆮成大蠧則兇邪以露羽翼将成若不誅之恐髙氏勲庸一旦為此所累因嗚咽流涕駢謂曰爾醉邪風狂邪遽命扶出後為用之所搆竟斃之駢每召用之則書一雲字㸃畫之間宻有辨認言必相字未嘗以名光啓初襄王偽授用之廣南制置使開幕建牙以擬於駢號曰二府凡駢之将吏用之逼令歸已駢自此稍悟其事然芽蘗已成不能奪其權及畢師鐸舉兵衆不滿千人用之據强兵數萬畧無他籌而半月下其城遂至宵遁後與楊行宻相遇於天長因語之曰用之有白金五萬鋌瘞於所居廡下冦平之後願􅊀公一醉之直及師鐸遁用之復其家月餘天長之約寝而不言至是行宻欲問其衆用之在側忽顧之曰公在西寨時許與此輩銀今日何負心也用之未及對率下令軍吏械而鞫之凡述百餘罪其一曰用之取今年中元夜請髙公於用之私第建黄籙齋因入静之時宻絞之偽云上昇此際便令諸軍率百姓扶用之領揚州節制其兇狡之性率多如此是日斬之懸首於市諸葛殷者鄱陽人也初吕用之獲寵于髙駢殷知之訪於廣陵以左道求薦於駢用之時謂駢曰玉皇以公久為人臣慮廢政獲譴子為君輟一靈仙為道中羽翼若其至也公善待之欲其不去可以人間優職縻之異日駢既見殷鬼態妖姿辨詐不能測遂謂曰道家葛将軍每從容於盃酒間云可以坐召鬼神立變寒暑矣尋以牢盆之職縻之所入巨萬時有大賈周師儒者所居多花木樓榭之勝為廣陵甲第殷欲之一日謂駢曰此城當有妖起非水旱兵戈之可比也駢曰為之奈何殷曰當就其下起壇以靈官鎮之即指師儒之第遽命軍吏驅出其家使殷居之殷手足先有風疽駢性嚴潔每相對促席膿血霑汚左右或以為言駢曰吾聞神仙多以此試人飲啗曽無難色駢從子傑嘗謂人曰争知此不是吾滅族寃家襄王時偽授檢校御史中丞殷嘗謂人曰男子患不得志當以富貴自奉人生寜有兩重死邪及用之敗師鐸獲之杖下馬橋絞而未死㑹師鐸母肩輿通其法官掌刑者扶以避之殷蘇於橋下及師鐸母過決之如初方死焉至是殷乃有兩重之死既死人皆挑其目斷其舌張守一扶陽田里人自言能變易五金以溺好利者吕用之薦于節度使髙駢駢每以真仙遇之中和末用之忽謂駢曰適得上仙書宰執間有隂圖令公者使一刺客来今夕當至駢時與鄭畋不足既聞其言驚失七筯因問計於用之曰張先生年少時嘗學此術駢乃告守一守一曰老夫久不為之勉力為公乃令駢衣婦人之服匿於深室守一至夜分擲一銅鐵器于軒砌之上鏗然有聲遂於皮囊中出彘血灑之如格鬪之處及旦謂駢曰幾輸此人駢乃泣謝輦金玉以酬之光啓中襄王偽授守一郡守師鐸據城請合大還丹至行宻入殺之由是覆髙氏之黨者盡矣後唐劉仁恭為幽州節度使物力雄富志氣驕縱師道士王若訥修長生之法乃於州西大安山營造臺觀極其雕麗聚美婦人為黄帝房中之法又慮四鄰侵冦幽州城陷且曰吾居此山四面絶壁以百士守門萬夫不能進乃圖無窮之計號令九州禁使銅錢自以膠和墐土為泥丸令九州行使其銅錢峻法賦斂鑿大安山為石穴以藏之其數百萬每藏畢即殺匠石以滅口自仁恭父子敗後往往有上言者知錢處所皆無所得劉唐鄴都妖人荘宗同光三年八月鄴都張憲奏唐為河漲上龍興寺幡竿請捨身時鄴都御河溢岸髙四尺傾都功役夹河為堤以防水注瀲灧將溢人心危恐初有書生陳禳水法請於上流為紙屋人物馬牛五萬投於河流殺牲以祀府尹訊之此法何從出對曰出予新意命笞之既而妖人復登幡竿聚衆數千云予若不以軀命救衆生今夜其為魚乎居民咸恐駭悲涕軍虞侯孫岳聞之令人圍佛竿謂之曰爾必能捨身救人即投於竿下妖人既見衆散徘徊祈哀命下之鞭背投於流翌日水減三尺楊千郎魏州賤民自言傳墨子術於婦翁能役使隂物㡌下召食物菓實之類又蒲必勝人有掌握之物以法必取又説鍊丹乾汞易人形破扄鐍或云可驗初在鄴都貴要間皆神竒之白於荘宗甚蒙待遇官至檢校尚書郎賜紫其妻出入宫掖頗承恩寵人士有憑之而仕官者及在洛陽輕薄少年累與之逰皇弟存又存渥元行欽嘗朋淫於家同光四年存又伏誅千郎亦被其禍李應之定州人節度使王處直信應之閲白丁於管内别置新軍起第於博陵坊面開一門動皆鬼道處直信重日隆将校相慮變在朝夕言即先罹其禍㑹燕師假道伏甲於外城以備不虞昧旦入郭諸校因引軍以圍其第應之死於亂兵咸云不見其屍僧誠恵不知何時人㓜於五臺山出家能修戒律稱㑹皮骨三命人初歸向聲名漸逺四方供饋不逺千里而至者衆矣自云能役使毒龍可致風雨其徒號曰降龍大師天祐十八年鎮州大水壊其南城誠恵謂人曰彼無信心吾使一小龍驚之耳由是氣燄彌盛人多畏之同光初鄴下權貴皆拜之樞宻郭崇韜初欲不拜即慮其謗己乃因御前見之故得免私禮三年京師旱荘宗迎至雒下親拜之六宫㕘禮士庶瞻仰謂朝夕可致甘澤禱祝數旬畧無徴應或謂誠惠曰官以師祈雨無徴將加焚燎焉誠惠聞之懼道潛去至其寺慙恚而終天成中其徒弟遷果等建塔乞請名諡於朝賜號法雨大師慈雲之塔解元龜道士以明宗天成三年三月自西川至見於便殿稱年一百一嵗進詩以歌王化元龜上表乞西都留守兼四川制置使要修西京宫闕帝謂侍臣曰此人老耄自逺來北朝别有異見反為身名甚堪笑也賜號知白先生賜放西歸又四年正月有僧於相國寺示幻惑衆云頭上出舎利康義誠按其偽状命戮於寺前周趙應為韋城鎮将廣順三年五月開封府上言應與僧智欽鎮氏陳光濟二十人同謀發塚掘井妄稱羅漢聖出誑惑閭閻希求財物逐人勘責並招妖妄其錢各入已分張藏匿勅趙應智欽陳光濟三人處死連坐郭延貴等十七人並决杖配蔡河務收管孫方諫為定州節度先是州北二百里有狼山山上有堡邉人頼之以避契丹之患中置佛舎有孫氏尼者主其事以香火之教聚其流俗逺近村民多歸之徒衆甚盛人亦異之尼死其徒聲言其屍不壊因覆以衣衿瞻禮信奉有同其生方諫即其宗人也嗣行其道舉族不食葷茹其黨皆推之為主冊府元龜卷九百二十二
