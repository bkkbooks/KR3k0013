body:
  text: 冊府元龜卷一百四十五宋王欽若等撰帝王部弭災第三唐穆宗長慶二年十二月己亥詔曰自冬以来甚少雨雪農耕方始災旱是虞慮有寃滯感傷和氣宜委御史臺大理寺及府縣長吏自録囚徒仍速決遣除身犯罪應支證追呼近繫者一切並令放出須辨對者任其責保兾得克消沴氣延致休祥四年六月辛巳詔曰近者夏麥垂熟霖雨稍多雖不甚損傷亦是隂陽小沴必慮囚徒之中或有寃濫宜令御史中丞刑部侍郎大理卿同疎理决遣訖聞奏其在内諸軍使囚徒亦委本司疎決聞奏敬宗寳歴二年六月癸亥詔曰近日京城雖已得雨畿甸之内霑灑未周災歉是虞黎元重困救旱之備深所注懐宜令京兆府各勒諸縣令長疎理見禁囚徒除首罪外餘支證並責保放出其有法不得原情有可恕者府司一一條舉當為蠲免御史臺大理寺亦委本司長官親自覆視准前處分炎熾方甚狴牢可矜京城及畿内諸獄亦宜並與除放兾得存活文宗太和元年六月庚子詔縁自夏少雨應見禁囚徒宜差清彊御史各就諸司廵勘速理聞奏無令寃滯是月以霖潦詔京城見禁囚徒慮有寃滯宜令御史臺府縣及諸司各量輕重疎決三日内聞奏六年五月庚申詔曰朕聞王者之理天下一物失所興納隍之咎一夫不獲歎時予之辜雖饑疫凶荒國家代有而隂陽祲沴儆戒朕躬自諸道水旱害人疫疾相繼宵旰罪已興寢疚懐屢降詔書俾副勤恤發廪蠲賦救患賑貧亦謂至矣今長吏申奏札瘥猶甚盖教化未感於蒸人精誠未格於天地法令之或爽官吏之或非百姓稱寃税役多弊姦贓未去農業失時有一于兹皆傷和氣並委内外文武常參官一一條疏各具所見聞奏必當親覧無憚直言其諸道應災荒處疾疫之家有一門盡歿者官給凶具随事瘞藏一家如有口累疫死一半者量事與本户税錢三分中減一分死一半已上者與減一半本户税其疫未定處並委長吏差官廵撫量給醫藥詢問救療之術各加拯濟事畢條疏奏来其有一家長大者皆死所餘孩稚十二至襁褓者不能自活必致天傷長吏勒其近親収養仍官中給兩月糧亦具都數聞奏江南諸道既有㓙荒賦入上供悉多蠲減國用常限或慮不充宗廟切急所須外所有舊例市買貯備雜物一事已上並仰權停待嵗熟時和則舉處分於戲朕自臨御于今七年兢兢乾乾不敢自逸而冲昧寡徳未能燮調艱旱水災或罹於藩郡夭亡疾苦或害於生人悼於厥心省已自責其州府長吏各奉詔條勉加拯䘏七月壬寅詔曰秋稼方茂時稍愆亢慮有寃繫致傷和氣應内外諸司見禁囚徒各委本司長吏随罪疎決務從寛典副我憂懐七年正月壬子詔曰朕承上天之眷佑荷累聖之丕圖宵旰兢勞不敢暇逸思致康乂八年于今而水旱流行疾疫作沴兆庶艱食札瘥相仍盖徳未動天誠未感物一類失所有過在予載懐罪已之心深軫納隍之歎宜敷恵澤式表憂勤如聞去年以来河東闗輔亢旱為災秋稼不収人甚窮困今方春之時湏務農事若不賑救恐至流亡其京兆府河中等九州府宜賜七萬石同華陜虢晉等州各賜十萬石並以常平義倉及折糴斛㪷充無本色以運米折給為本州府長吏明作等第差官吏對面宣賜先從貧下起給京兆府太和六年青苖搉酒錢在百姓腹内並放免京兆河中同華陜虢晉絳等州府自太和六年秋税以前諸色逋懸在百姓腹内悉放免議獄恤刑前王攸重苟有寃滯即傷陽和應在城諸司諸使應有囚徒限七月内處分訖奏聞河南府八州府勑到准此處分諸色功役非灼然交切者勒停應管内名山大川能致風雨者委長吏精誠禱請水旱之數雖云常理𨗳化失節亦致咎災顧惟寡昧敢㤀剋責常参官及外州府長吏如有規諫者各上封事極言得失俟有規正期於阜安咸唘乃誠用致予理無或有隠以忝在公内外官有貪暴殘虐蠧政害人者臺司紀察聞奏朕為人父母䖍奉丕業夕惕若厲夙興匪寧減膳徹樂庶答天戒咨爾長吏實分予憂勉加撫綏用副惻隠庶切救災之義爰申為上之懐中外臣僚宜體朕意七月己酉勑曰今縁稼穡方滋旬月少雨慮其寃滯或有感傷宜委左僕射李程及御史大夫鄭覃同就尚書省疎理諸司囚徒務從寛降限五日内畢聞奏其外州府為有稍旱處委長吏速准此處分壬子以旱命吏部尚書令狐楚御史大夫鄭覃同疎决囚徒甲寅徙市閏七月乙卯詔曰朕嗣纂聖圖覆育生類兢業寅畏上承天休而隂陽失和膏澤愆候害我稼穡災于黔黎有過在予敢忘咎責是用避殿徹樂減膳省刑思惕慮以覃思庶薦誠而致雨時澤未降已来朕當避正殿減供膳太常教坊聲樂權停閱習飛龍厩馬量減食粟其百司官署厨饌亦宜權減隂陽鬱堙縶繫傷害有紊和氣是乖燮調今放出宫人一千人其諸道今年合進鷹犬宜數内停減一百頭聨在五坊者宜減放一百頭聨京城囚徒慮有寃滯已委疎決務從寛降宜令鄭覃令狐楚速具條疏聞奏内外諸司先有修造稍非急切者並宜停省公卿百寮及戚里舊将相之家如有僣侈踰制委御史臺糾察聞奏諸州府長吏及縣令有貪縱苛暴者委御史臺訪察聞奏名山大川及能興雲致雨者各委長吏精誠祈禱於戲朕受天眷佑為人父母暵旱作沴焦勞匪寧徧祀山川靡愛珪璧菲食罪已緩獄消災載深勤雨之心冀警納隍之戒凡百士庶宜諒予懐時以久無雨帝徧走羣望至是復有此詔既而甘澤普霑人心大悦八年六月甲午詔曰近者咎徴所集陽亢成災靡神不宗未獲嘉應豈刑政之尚乖其當将獄犴之未察其寃夙興以思庶答天譴宜令尚書右僕射李逢吉御史大夫鄭覃於尚書省疎理刑獄輕繫者咸從於決遣重條者議所以矜寛小大以情必詳必慎致誠無怠稱朕意焉丁酉詔曰時属亢陽慮有寃繫應諸州府囚徒各委所在長吏疎理處分務從寛降其縁制獄未决遣者委刑部大理寺速立限奏覆稍渉留滯者仍令御史臺紏劾舉奏九年三月乙丑制以仍嵗水旱黎民艱食其宰牧非才貪殘為害及承前積弊湏有條疏或寃獄留滯速宜疎决者並委觀察使紏察詳訪具狀聞奏用弭天𤯝七月詔曲江雩土龍開成二年三月壬申以妖星見降詔誡百司及天下州府見禁囚徒死者從流流已下並釋放膏澤不愆播種伊始土木興役恐妨農功禁中及百司所有修造並宜權停韶陽御辰生氣方盛思全物類以順天時内外五坊凡有籠養鷹鷂及雞鴨鳥雀狐兎等悉宜放之朕今素服避殿命太常徹樂太官減膳一日常分為一旬常叅官及諸州府長吏如有規謀者各上封事極言得失陳救災之本眀致理之方咸竭乃心以輔厥辟於戲朕眀誠未感化理未孚譴告在天丁寧斯甚所宜盡意其與同憂勉進嘉言共凝庶績弼違納誨副茲虛懐宣示内外各令知悉甲戌以彗星見命京師諸佛寺開仁王經道場四月戊申詔曰自春以来未降甘澤從来但以過時無雨議祈禱及至降洒已似後時今雖未旱亦要沾洽各宜差官精誠祈禱七月庚午詔曰農人徧野甘澤稍愆眷言時苗未保収穫齋心懇禱猶望有成各宜差長吏所在靈廟禱祈乙亥以久旱移市開坊市南門乙酉詔曰秋旱未雨慮有幽寃縲禁多時湏議疎决京司刑獄宜令右僕射兼門下侍郎平章事鄭覃親往疎理乃分命宰臣祈雨於太廟太社白帝壇己丑遣侍御史崔虞孫範各往諸道廵覆蝗蟲并加宣慰三年正月乙亥京兆尹崔珙奏畿内去冬少雪宿麥未滋今欲差少尹於終南廣恵公廟祈禱諸縣各委令長於靈跡處精誠祈請從之癸未詔曰朕自守丕訓恭臨大寳兢兢業業十有三年何嘗不恵下以愛人克己以利物外無畋遊之樂内絶土木之功浣衣菲食宵興夕惕厚於身者無不去便於人者無不行損羣方之底貢驅時風於樸素将以宏祖宗法制致夷夏雍熙勤求理道日兾平泰而去秋旱蝗所及稼穡卒瘁哀此蒸人懼罹艱食是用順時布令助煦育之深仁施恵覃恩法雨露之殊澤其淄青兖海鄆曹濮去秋蝗蟲害物偏甚其三道有去年上供錢及斛㪷在百姓腹内者並宜放免今年夏税上供錢及斛㪷亦宜全放仍以當處常平義倉斛㪷速加賑救京兆府諸州府應有蝗蟲米榖貴處亦宜以常平義倉及側近官中所貯斛㪷量加賑賜閉糴禁錢為時之蠧方将革弊尤藉通商其見錢及斛㪷所在方鎮州府輙不得擅有壅遏任其交易必使流行仍委出使郎官御史及所在度支鹽鐵廵院切加勾當兼委車運使設法般運江淮糙米於河隂貯積以備節級賑救應方鎮州府借使度支鹽鐵户部錢物斛㪷經五年已上者並宜放免刑獄之重人命所懸将絶寃濫必資慎恤京城百司及畿内見禁囚徒委中書門下差官疎理無使滯寃於戲唯此凶災是彰菲徳情敢㤀於罪己恵所貴於及人施令布和期於蘓息凡厥臣庶宜體朕懐十一月壬戌帝以妖星見詔京城百司及諸道州府十一月八日以前見禁囚徒未經勑斷者犯死罪並降從流流已下逓減一等其十惡及謀殺人刼盜賊并官典犯贓不在此限諸道今年遭水及蝗蟲州縣人户等宜委觀察使與州縣長吏計㑹精加訪察勿憚奏論諸道所有進獻時新委中書門下更㸃勘撙減以稱朕意京畿之内百役繁興欲其阜安切在憂䘏其今年二月二十五日勑賑貸諸縣百姓糧種粟八萬四千九百七十八石如聞數内半是義倉斛㪷此乃救災之備豐年自合収填其餘有户部管係者並宜停徴以俟来嵗畿内諸縣應有開成元年已前諸色逋欠仍委度支與府司同檢勘聞奏如是官吏破用不在此限皇太子葬事縁卜日稍近但令粗及禮制不必過務虛儀以渉繁冗則湏裁減冀無害物夫豈傷恩易定兩州地里深阻近者守臣䘮歿軍中初有異圖累譴詔書申明事理革心遷善章表繼来張元益出定州後應是初扶樹元益有違朝㫖者自将校至于官徤委新節度使安存慰諭並從洗釋如或輙相告訐即以其罪罪之冀使藩方永無疑懼文武百寮及諸色人有能通逹刑政之源参考天人之際任各上章疏指言得失至於徹樂減膳抑亦舊章便當内自指揮不復更形綸翰宣示中外宜體朕懐懿宗咸通十年六月戊戌制曰動天地者莫若精誠致和平者莫若修政朕顧惟庸昧託于王公之上于兹十一年矣祗荷丕搆寅畏小心慕唐堯之欽若昊天遵周王之昭事上帝念兹夙夜靡替䖍恭同馭朽之憂勤思納隍之軫慮内戒奢靡外罷畋遊匪敢期於雍熙祈自得於清浄上望寰區無事稼穡有年而燭理不眀渉道惟淺氣多堙鬱誠未感通旱暵是虞蟲螟為害蠻蛋未賔於遐裔冦盜復蠧於中原尚駕戎車益調兵食俾黎元之重困每宵旰而㤀安今盛夏驕陽時雨久曠憂勤蒸庶旦夕焦勞内修香火以䖍祈外罄牲玉以精禱仰俟𤣥貺必致甘滋而油雲未興秋稼闕望覩兹愆亢軫于誠懐復慮暴政煩刑强官酷吏侵漁囊槖䧟害孤㷀致有寃抑之人搆成災沴之氣主守長吏無忘奉公伐叛興師盖非獲已除姦討逆必使當辜苟或䧟及平人自然風雨愆侯凡行營将帥切在審詳昭示惻憫之心敬聼勤䘏之㫖應京城天下諸州府見禁囚徒除十惡五逆官典犯贓故意殺人合造毒藥光火持杖開刼墳墓及闗連徐州逆黨外並宜量罪輕重速令决遣無久繫留雷雨不周田疇方瘁誠宜愍物以示好生其京城未降雨問宜令坊市權斷屠宰昨陜虢中使廻方知蝗旱有損處諸道長吏分憂共理宜各推公共思濟物界内有饑歉切在慰安哀此蒸人無俾艱食徐方冦孽未殄師旅有征凡合誅鋤審分淑慝無令脅從横死元惡偷生宜申告伐之文使知逆順之理於戲每思禹湯之罪己其庶成康之措刑孰謂徳信未孚教化猶梗咨爾多士毗予一人既引過在躬亦漸㡬于理布告中外稱朕意焉哀宗天祐二年三月詔曰朕以宿麥未登時陽久亢慮闕粢盛之備軫予宵旰之憂所宜避正位於宸居減珍羞於常膳諒惟𦕈質深合罪躬庶其昭感之祥以致滂沱之澤今月八日已後不坐正殿及減常膳四月壬申詔曰朕以冲幼克嗣丕基業業兢兢敬恭夕惕今以彗星謫見深宜罪躬雖已降恩赦更起今月二十四日避正殿減常膳眀自思過咎也己未司天臺奏星文彗見請于太清宮建黄籙道場從之三年九月詔以久雨恐妨農事遣工部侍郎孔績禜定鼎門如不止止于三日後唐荘宗同光元年十二月庚寅自冬無雪差官分道禜於百神二年二月自冬不雨命禱百神三年勑時雨稍愆差官祈禱八月乙未勑旬日霖雨恐傷秋稼湏命祈止冀獲開晴可差官分禱祠廟九月有司上言以八月二日夜五鼔四籌熒惑犯星二度星周之分請依法禳之於京城四門懸東流水一罌兼令闗坊都市嚴備盜火止絶夜行從之十二月戊寅勑節及杪冬稍愆時雪湏命祈禱以濟農功宜令有司差官分命祈祭諸神廟乙酉輿駕幸廣化寺祈雪三年正月戊午時雨稍愆命興唐府差官分禱祠廟二月辛丑帝祈雨於郭伯神祠四月丁卯勑時雨少愆恐妨農事須命祈禱冀遂豐登宜令差官分道祈禱百神癸酉租庸院奏時雨少愆恐傷宿麥兼慮有妨耕稼請諸道州府依法祈禱從之辛巳勑亢陽稍甚祈禱未徴将致感通難避勞擾宜令河南府於府門造五方龍集巫禱祭徙市五月壬子勑時雨尚未沾足宜令河南府徙市閉坊門依法畫龍置水祈請令宰臣於諸寺燒香戊申帝幸龍門之廣化寺開佛塔請雨七月丁酉勑河南尹依法祈晴己亥勑淫雨稍甚宜差官分道祈晴九月辛卯朔勑霖雨未止恐傷苗稼及妨収穫宜令差官於諸寺觀神祠䖍心祈禱仍令河南府差官應有靈迹處精䖍祈止丙午勑霖雨未晴宜令宰臣尚書丞郎分於寺觀祈晴四年正月諸道各奏准宣為去年十月地震命僧道置消災道塲眀宗天成元年五月辛未以時雨稍愆分命朝臣禱祠嶽瀆八月勅久雨不晴慮傷農稼可申命禱禜仍曉諭天下州府疏理繫囚無令寃滯十月己丑日月色皆赤庚寅日月尚赤遣使祠五嶽丁酉勅自秋渉冬稍愆雨雪慮傷宿麥宜令禱祠分遣朝臣告祠羣望宜付所司二年正月司天奏今年嵗日五鼔後東方有青黒雲主嵗多隂雨宜行禳禜禱祠從之六月癸未宣宰臣於諸寺祈雨辛丑勑近以時雨稍愆恐傷禾稼爰命祈禱果獲感通宜令本官各於本處賽謝三年七月霖雨稍甚命宰臣散於寺觀祈晴八月汴州稍旱命丞相祈雨於寺觀十二月以十月至是月少雪命公卿散祈於祠廟四年十二月丙午中書舍人程遜奏三冬未降時雪請命臣僚䖍申祈禱從之長興元年四月甲辰勑自夏以来稍愆時雨宜差官祈禱二年三月勑自春以来稍愆時雨宜分命朝臣祈禱四月乙巳帝幸龍門寺祈雨至晩還宫乙卯勑久愆時雨深疚予心雖遍䖍祈猶未溥足宜廣推恩之道更敷恤物之懐貴獲感通必彰靈應宜令諸道州府各委長吏親問刑獄省察寃濫應見禁囚徒除犯死刑外餘盡時疎放除省司主持廻圖敗闕軍将及諸色人等見别指揮三司商量或有情可矜憫或非欺㒺積年致有逋懸各具分析續行勑命并公私債負放至秋熟填納今年取者不在此限八月丙子勅隂雨稍頻慮妨収穫宜令河南府依古法祈晴三年三月丙申帝以春雨稍頻慮妨耕種宜令河南府依古法祈晴帝問翰林叅謀趙延文自春以来頻雨何故奏曰縁火犯井所以頻雨兼雷聲似夏並不益時乞寛刑獄從之壬寅司天奏以時雨過多請差官禱禜從之六月辛酉命文武百官應在京寺觀神祠祈晴又勅霖雨積旬尚未晴霽睠言刑獄慮在滯淹京城諸司繫囚並宜疎理釋放七月以久雨未晴分命禱禜勑天下州府見禁囚徒據事理疾速斷决不得滯淹久雨未晴恐至淹抑四年七月壬午勅時雨稍愆慮傷時稼分命朝臣禱禜諸神末帝清泰元年六月丙子諸内外差官祈雨自去年秋不雨冬無雪帝初至至徳宮雨數寸至是旱京師暍死十數人帝命韓昭裔開廣化寺三藏塔是夕雨至三寸丁酉以久旱京師酷熱自七日至十三日暍死者數百道路死者相望帝深憫惻日遣中使往龍門廣化寺禱雨百僚奔走祠宇至十三日雨四寸七月己亥分命宰臣百僚諸祠廟祈雨甲辰幸龍門佛寺禱雨至晚還宮又詔以京畿旱遣供奉官賀守圖湯王廟取聖水澤州西界有析城山山巔有池水側有湯廟土人遇旱取水禱雨多驗先是帝憂旱甚房暠言聖水可以致雨故也八月甲申詔曰霖雨稍頻慮妨収穫分命朝臣諸祠宇祈晴乙未詔曰苦雨連綿已踰旬浹差官祈禜尚未晴明宜令宰臣李愚劉昫盧文紀姚顗各於諸寺觀䖍告自十一日後霖不止至是日稍霽九月己亥詔曰久雨未霽禮有祈禳禜都城門三日不止乃祈山川告宗廟社稷宜令太子賔客李延範等禜諸城門太常卿李懌工部尚書崔居儉告宗廟社稷甲辰詔曰霖霪稍甚愆伏為災朕燭理不眀慮傷和氣都下諸獄委御史臺差官慮問西都差留守判官藩鎮差觀察判官刺史州委軍事判官諸縣委令録據見繫罪人一一親自録問恐姦吏逗留致其渰抑畫時疎理如是大獄即具奏聞癸卯司天監靈臺郎李徳舟以霖雨為災獻唐初太史令李淳風祈晴法天皇大帝北極北斗夀星九曜二十八宿天地水三官五嶽神又有陪位神五嶽判官五道将軍風伯雨師名山大川醮法用紙錢馳馬有差詔曰李徳舟顯陳藝術特貢封章以霖雨之為災恐粢盛之不稔請修祈醮以示消禳恭以天地星辰宗廟社稷雨師風伯皆遵祀典薦告不虧名山大川屢行祈禱今據徳舟所陳據祠禱不該者所司嚴潔祠祭以表精䖍十一月辛亥詔曰朕君於人上燭理不眀自冬初迄今未降宻雪虞愆伏災及黎民宜令宰臣百寮分詣諸祠壇祈告十二月戊子以自冬無雪詔宰臣盧文紀祈嵩嶽庚寅幸龍門廣化寺開無畏塔祈雪自卯至申時還宫又侍御史陳保極上疏𤣥冬告謝宻雪未零竊慮今夏龍徳唘圖鑾旌赴闕擁十萬衆臨九重城讋怖龍神震驚方位致瘥札為沴風雨失時請在京諸寺觀置迎年消災資福安土地龍神道場優詔從之甲午詔曰李元龜官處法司次當侯對以稍愆於時雪請特降於優恩初則以貶謫官亡歿外州乞容歸葬次則以亡歿者兒孫絶嗣請本處瘞埋宜依所陳頒告諸道時元龜為刑部郎中上言以開成格凡貶官降本處春秋以存亡報省如歿於貶所有骨肉許歸葬如無骨肉本處便與葬埋故有是命二年三月丙申詔宰臣姚顗告嵩嶽右丞陳韜光告亳州太清宫祈雨四月壬午以京畿旱命宰臣盧文紀告太微宫太廟姚顗告嵩嶽七月戊辰以京師苦雨遣左武衛将軍穆延輝嵩山祈晴九月乙酉京師以大雨霖祈晴十二月癸未詔曰隂陽爽侯時雪稍愆分命臣僚詣祠廟祈請三年正月戊戌以自去冬少雪幸龍門廣化寺開無畏師塔祈禱三月庚寅詔曰時雨稍愆宜分命朝臣祠廟祈禱五月庚午詔曰時雨稍愆頗傷農稼分命朝臣祈禱居數日以庶官禱請不䖍乃命宰臣盧文紀禱太微宮姚顗崇道宫馬裔孫清宫嵩嶽又無雨帝問宰臣愆伏之故文紀等奏曰愆伏之本洪範有其説若考校往代理義相違臣等思之此盖時數若求於政失則兵戰之氣生隂霖擾攘之氣生蝗旱稍近理也自頃皇祚甫寧徴求過當雖宸念疾心事不獲已無足論其變沴也帝俛首而已七月丁亥同華言自夏不雨京畿旱遣供奉官杜紹懐往析城山取聖水晉髙祖天福元年十二月辛卯以自秋不雨經冬無雪命羣官散禱山川二年十二月甲辰幸相國寺祈雪四年六月己亥司天臺奏七月一日太陽有虧缺於北極於東於南未盈而沒太常禮官詳舊制日有變天子素服避殿太史以所司救日於社陳五嶽五鼓麾東㦸南矛西弩北楯中央置皷服從其位百職廢務素服守司重列於庭每等異位向日而立眀復而罷今所司法物或不能具且去嵗正旦日有食之唯謹藏兵仗皇帝避正殿尚素食百官守司而已中奏欲行近禮從之十二月丁巳帝御便殿謂馮道曰大雪害民五旬不止京城之下十八神祠六寺二觀悉令祈禱了無其騐得非朕之凉徳不儲神休者乎道對曰陛下克己恭儉無荒無怠推恩四海必合天心但愛民慎刑始終如一雖星宿之變水旱之沴亦将警聖人而成其徳也帝曰朕聼斷有誤卿當再三正之安静小心共相保守因令出薪炭米粟給軍士貧民等七年三月壬戌以春旱分命朝臣諸寺觀神祠禱雨丁丑詔宰臣馮道等於開元諸寺及紫極宫祈雨少帝天福八年五月癸巳勑以久愆時雨遣宰臣馮道等諸寺觀䖍祈其餘祠廟仍下開封府徧差官禱之甲辰勑以飛蝗作沴膏雨久愆應三京鄴都諸道州府見禁囚人除十惡行刼諸殺人者及偽行印信合造毒藥官與犯贓外罪者減一等餘並放内有欠官錢者宜令三司酌量與限監出徴理乙巳幸相國寺祈雨六月庚戌宣差侍衛馬軍都指揮使李守貞以蝗為害往臯門村祭告丁巳宣遣供奉官衛延韜嵩山投龍祈雨壬戌宣供奉官朱彦威等七人各部領奉國兵士一指揮於封丘長垣陽武浚儀酸棗中牟開封等縣捕蝗又遣内班秦宗超亳州太清宮祈雨開運元年九月詔曰朕䖍承顧命獲嗣丕基常懼顛危不克負荷宵分日昃罔敢怠荒夕惕晨興每懐祗畏但以恩信未著徳教未敷理道不眀咎徴斯至向者頻年災沴稼穡不登萬姓饑荒道殣相望上天垂譴凉徳所招仍属干戈尚興邊陲多事倉廪不足則輟人之餱食帑倉不足則索人之資財兵士不足則取人之中丁戰騎不足則假人之乗馬雖事不獲已而理将若何訪聞差去使臣殊乖體認不能敦於勉諭而乃臨以威刑自有所聞益深愧悼旋属守臣叛命戎虜犯邊致使甲兵不暇休息軍旅有戰征之苦人民有飛輓之勞疲瘵未蘓科斂尚急言念于此寢食何安得不省過興懐側身罪己載深減損思召和平所宜去無用之資罷不急之務棄華取實惜費省功一則符先帝慈儉之規一則慕前王樸素之徳向者造作軍器破用稍多但取堅剛不湏華靡今後作坊製造器械不得更用金銀裝飾比於遊畋素非所好凡諸服御尤欲去奢應天下州府不得以珍寳玩好及鷹犬為貢在昔聖帝眀君無非惡衣菲食况予薄徳所合恭行今後太官常膳減去多品衣服帷帳務去華飾在禦寒濕而已峻宇雕墻昔人攸誡玉杯象箸前代所非今後凡有營繕之處丹堊雕鏤不得過度宫闈之内有非理費用一切禁止於戲繼聖承祧握樞臨極昧於至道若履春氷属以天災流行國歩多梗因時致懼引咎推誠期於将来庶㡬有補更賴王公将相貴戚豪宗各唘乃心率由兹道共臻富庶以致康寧凡百臣僚宜體朕意三年二月壬戌勑令以漸及春農久愆時雨深慮囹圄或有滯淹宜䘏刑章甫召和氣其諸道州府見禁人等並須據罪輕重疾速斷遣仍限半月内有斷遣訖奏四月己未以久旱命宰臣趙瑩與羣官禱雨戊寅帝幸相國寺祈雨漢隠帝乾祐元年四月庚辰朔以自春不雨勑青州収瘞用兵討楊光逺時骸骨丁亥以旱幸道宮佛寺禱雨賜僧道帛有差未時還宫正月戊午勅以旱分命羣官於諸寺觀神祠祈雨七月乙卯以久旱帝幸道宫佛寺禱雨仍分命羣官祈諸神祠賜僧道帛有差日晩還官𤣥雲四布猛風北至俄而㴻雨尺餘人情熙熙周太祖廣順二年夏四月戊子勅以旱分命羣臣於諸祠廟祈禱雨三年正月丁卯以自去冬京師無雪是日分命朝臣於祠廟祈禱冊府元龜卷一百四十五
