body:
  text: 冊府元龜卷七百八十九宋王欽若等撰總錄部知幾易稱知幾其神又曰幾者事之㣲也㣲而可見不亦神乎是故君子處出語黙消長盈虚唯道是從不失其正應其速則豈俟乎終日順其義則姑務於隨時不見是圖唯變所適若夫叔世蹇剝禍機紛擾大道斯隱小人乘器或察言而觀色或入國而審政其或恣苛暴以隳絶人紀樹凶狡以專侮政柄夸辨横起天理棄滅將欲攘美於賢俊盜名於仁義萌朕已見情偽斯得繇是遜辭以防患矯迹以自晦保全始終之分不處嫌疑之地進或屑就退必高翔雖干戈相尋亦能方圖自任矣周武王封太公於齊營丘東就國道宿行遲逆旅之人曰吾聞時難得而易失客寢甚安殆非就國者也太公聞之夜衣而行黎明至國而萊侯來伐與之争營丘孔子繇大司寇攝行相事與聞國政齊人聞而懼曰孔子為政必霸霸則吾地近焉我為之先并矣盍致地焉犁鉏曰請先嘗沮之沮之而不可則致地庸遲乎於是選齊國中女子好者八十人皆衣文衣而舞康樂文馬三十駟遺魯君陳女樂馬於魯城南臯門外季桓子微服往觀再三將受乃語魯君為周道㳺往觀終日怠於政事子路曰夫子可以行矣孔子曰魯今且郊如致膰乎大夫膰祭肉則吾猶可以止桓子卒受齊女樂三日不聽政郊又不致膰爼於大夫孔子遂行宿乎屯而師已送曰夫子則非罪孔子曰吾歌可乎歌曰彼婦之口可以出走彼婦之謁可以死敗言婦人之請謁足以憂使人死敗故可以出走也葢優哉㳺哉維以卒嵗言仕不遇也故且優㳺以終嵗師已反桓子曰孔子亦何言師已以實告桓子喟然歎曰夫子罪我以羣婢故也夫子遂適衞居頃之或譛孔子於衞靈公靈公使公孫餘假一出一入孔子恐獲罪焉居十月去衞月餘復反靈公夫人有南子者使人謂孔子曰四方之君子不辱欲與寡君為兄弟者必見寡小君寡小君願見孔子辭謝不得已而見之夫人在絺帷中孔子入門北面稽首夫人自帷中再拜環珮玉聲璆然孔子曰吾鄉為弗見見之禮答焉子路不恱夫子矢之曰予所否者天厭之天厭之見南子者猶文王之拘羑里也天厭之者言我之否屈乃天命所厭也蔡謨曰矢陳也夫子為子路陳天命也居衞月餘靈公與夫人同車宦者雍渠㕘乘出使孔子為次乘招揺市過之孔子曰吾未見好德如好色者也疾時薄於德厚於色故發此言李充曰使好德如好色則棄邪而反正矣於是醜之去過曹孔子既不得用於衞將西見趙簡子至於河而聞竇鳴犢舜華之死也或作鳴鐸竇犨臨河而歎曰美哉水洋洋乎丘之不濟此命也夫子貢趨而進曰敢問何謂也孔子曰竇鳴犢舜華晉國之賢大夫也趙簡子未得志之時須此兩人而後從政及其已得志殺之乃從政丘聞之也刳胎殺夭則麒麟不至郊竭澤涸漁則蛟龍不合隂陽覆巢毁卵則鳯凰不翔何則君子諱傷其類也夫鳥獸之於不義也尚知避之而况乎丘哉乃還息乎陬鄕作為陬操以哀之陬操琴曲名也而反乎衞入主蘧伯玉家他日靈公問兵陳軍陳行列之法孔子曰爼豆之事則嘗聞之軍旅之事未之學也萬二千人為軍五百人為旅軍旅末事本未立不可敎以末也明日與孔子語見蜚雁仰視之色不在孔子孔子遂行初衞太叔疾娶於宋子朝疾即齊也子朝宋人仕衞為大夫其娣嬖娣所娶女之娣子朝出出奔孔文子使疾出其妻而妻之疾使侍人誘其初妻之娣寘於犁犁衛邑而為之一宮如二妻文子怒欲攻之訪於仲尼仲尼曰瑚簋之事則嘗學之矣瑚簋禮器名夏曰瑚周曰簋甲兵之事未之聞也退命駕而行曰鳥則擇木木豈能擇鳥以鳥自喻文子遽止之曰圉豈敢度其私訪衞國之難也圉文子名度謀也將止仲尼止魯人以幣召之乃歸於是自衞反魯樂正雅頌各得其所初陽貨欲見孔子孔子不見陽貨陽虎也季氏家臣而專魯國之政欲見孔子使仕歸孔子豚欲使往謝故遺孔子豚孔子時其亡也而往拜之遇諸塗謂孔子曰來予與爾言曰懷其寶而迷其邦可謂仁乎曰不可好從事而亟失時可謂知乎曰不可日月逝矣嵗不我與孔子曰諾吾將仕矣范蠡為越相與越王勾踐苦身戮力二十餘年竟滅吳夫差蠡以為大名之下難以乆居且勾踐為人可與同患難難與處安樂為書辭勾踐曰臣聞主憂臣辱主辱臣死昔者君王辱於會稽所以不死為此事也今既以雪恥臣請從會稽之誅勾踐曰孤將與子分國而有之不然將加誅于子范蠡曰君行令臣行意乃裝其輕寶珠玉自與其私徒屬乘舟浮海以行終不反魏公子無忌為魏將自知再以毁廢乃謝病不朝與賔客為長夜飲飲醇酒多近婦人日夜為樂飲者四嵗竟病酒而卒范睢魏人秦昭王使謁者王稽於魏王稽載范睢入秦至湖關望見車騎從西來范睢曰彼來者為誰王稽曰秦相穰侯東行縣邑范睢曰吾聞穰侯專秦權惡内諸侯客比恐辱我我寧且匿車中有頃穰侯果至勞王稽因立車而語曰關東有何變曰無有又謂王稽曰謁君得無與諸侯客子俱來乎無益徒亂人國耳王稽曰不敢即别去范睢曰吾聞穰侯智士也其見事遲鄉者疑車中有人忘索之於是范睢下車走曰此必悔之行十餘里果使騎還索車中無客乃已王稽遂與范睢入咸陽睢後代穰侯為丞相王翦為秦將將兵六十萬人伐荆始皇自送至㶚上王翦行請美田宅園池甚衆始皇曰將軍行矣何憂貧乎王翦曰為大王將有功終不得封侯故及大王之嚮臣臣亦及時以請園池為子孫業耳始皇大笑王翦既至關使使還請善田者五輩善一作菑或曰將軍之乞貸亦已甚矣王翦曰不然夫秦王怚音麄而不信人怚一作粗今空秦國甲士而專委於我我不多請田宅為子孫業以自堅顧令秦王坐而疑我矣漢叔通薛人薛縣名屬魯國秦時以文學徵待詔博士於博士中待詔數嵗陳勝起二世召博士諸儒生問曰楚戍卒攻蘄入陳於公何如博士諸生三十餘人前曰人臣無將將則反罪死無赦將有其意願陛下急發兵擊之二世怒作色不許其言陳勝為反作色謂變動其色通前曰諸生言非夫天下為一家毁郡縣城鑠其兵示天下弗復用鑠銷也且明主在上法令具於下吏人人奉職四方輻輳輳聚也言如車輻之聚於轂也字或作凑並音千豆切安有反者此特羣盜鼠竊狗盜如鼠之竊如狗之盜何足置齒牙間哉郡守尉今捕誅何足憂二世喜盡問諸生諸生或言反或言盜於是二世令御史按諸生言反者下吏非所直言諸生言盜者皆罷之乃賜通帛二十匹衣一襲一襲上下皆具也今人呼為一副也拜為博士通已出反舍還其所居也諸生曰生何言之䛕也通曰公不知我幾不免虎口幾音鉅依切迺亡去之薛蕭何秦末為沛主吏掾秦御史監郡者欲從事辨之何與共事脩辨明何素有方略也秦時無刺史以御史監郡何乃給泗水卒史泗水郡沛所屬也何為郡卒史秦御史欲入言徵何何固請得無行御史以何明辨欲因入奏事之次言於朝廷徵何用之何心不願以情固請而御史故止得不行也何位至相國陳平封户牖侯高帝末燕王盧綰反樊噲以相國將兵擊之既行人有短惡噲者高帝怒用平計詔平乘馳傳載周勃代噲將至軍中即斬噲二人馳傳未至軍行計曰樊噲帝之故人功多又呂后女弟須夫有親且貴帝以忿怒故欲斬之即恐後悔寧囚而致上令上自誅之未至軍為壇以節召噲噲受詔即反接反縳兩手也載諸長安而令周勃代將平行聞惠帝立平恐呂后及呂須怒乃馳傳先去逢使者詔平與灌嬰屯於滎陽平受詔立復馳至宮哭殊悲因奏事喪前呂后哀之曰君出休矣平畏讒之就就成也言畏讒毒已者得成其計因固請之得宿衞宫中太后乃以為郎中令曰𫝊敎帝傅相也是後呂須讒乃不得行穆生與白生申公為楚元王中大夫元王敬禮申公等穆生不耆酒耆讀曰嗜元王毎置酒嘗為穆生設醴醴甘酒也少麴多米一宿而熟不齊之及王戊即位嘗設後忘設穆生退曰可以逝矣醴酒不設王之意怠不去楚人將鉗我於市鉗以鐵束頸也音其炎反稱疾卧申公白生強起之曰獨不念先王之法與與讀曰歟今王一旦失小禮何足至此穆生曰易稱知幾其神乎幾者動之微吉凶之先見者也見音胡電切君子見幾而作不俟終日先王之所以禮吾三人者為道之存故也今而忽之是忘道也忘道之人胡可與乆處豈為區區之禮哉遂謝病去申公白生獨留王戊稍淫暴二人諫不聽胥靡之王仲本瑯琊不其人好明道術明天文諸呂作亂齊哀王襄謀發兵而數問於仲及濟北王興居反欲委兵師仲仲懼禍及乃浮海東奔樂浪山中因而家焉董仲舒為膠西相膠西王聞仲舒素聞其賢也大儒善待之仲舒恐其乆獲罪病免金賞為太僕其妻霍光女也霍氏有事萌牙上書去妻萌牙者言始有端緒若草之始生宣帝亦自哀之獨得不坐陳咸為尚書平帝時王莽輔政多改漢制咸心非之及莽因呂寛事誅不附已者何武鮑宣等咸乃嘆曰易稱君子見幾而作不俟終日吾可以逝矣即乞骸骨去職及莽簒位召咸以為掌冦大夫謝病不肯應時三子參豐欽皆在位乃悉令解官父子相與歸鄉里閉門不出後漢崔篆駰之祖父也王莽時太保甄豐舉為歩兵校尉不就後王莽以篆為建新大尹篆不得已乃歎曰吾生無妄之世值澆羿之君上有老母下有兄弟安得獨潔已而危所生哉乃遂單車到官稱疾不視事三年不行縣樊宏當更始之立欲以宏為將宏叩頭辭曰書生不習兵事竟得免歸世祖即位拜光禄大夫卓茂為更始侍中祭酒從至長安知更始政亂以年老乞骸骨歸建武中位至太傅竇融字周公更始大司馬趙萌薦融為鉅鹿太守融見更始新立東方尚擾不欲出關而高祖父嘗為張掖太守從祖父為䕶羌校尉從弟亦為武威太守累世在河西知其土俗獨謂兄弟曰天下安危未可知河西殷富帶河為固張掖屬國精兵萬騎漢邉郡置屬國一旦緩急杜絶河津足以自守此遺種處也兄弟皆然之融於是日往守萌守猶求也辭讓鉅鹿圖出河西萌為言更始乃得為張掖屬國都尉融大喜即將家屬而西賈復為左將軍封膠東侯知光武欲偃干戈修文德不欲功臣擁衆京師乃與高宻侯鄧禹並剽甲兵敦儒學帝深然之遂罷左右將軍復以列侯就第加位特進剽削也謂削除甲兵鄭敬為汝南太守歐陽歙門下掾嵗十月享會歙出敎曰西部督郵繇延忠貞公方今與諸儒共顯之於朝功曹郅惲愀然曰司正舉觥延恣性貪邪明府以惡為善股肱以直從曲敬曰君明臣直明府德也歙曰敬奉觥惲歸府稱病延亦自退敬素與惲厚見其言忤歙乃相招去曰子廷争繇延君猶不納延今雖去其勢必還直心無諱誠三代之道然道不同者不相為謀吾不能忍見子有不容君之危盍去之乎惲曰孟軻以強其君之所不能為忠量其君之所不能為賊惲業已彊之矣障君於朝既有其直而不死職罪也延退而惲又去不可敬乃獨隱於弋陽山中居數月歙果復召延惲於是乃去從敬止魚釣自娛馬嚴為陳留太守將之官言於章帝竇固竇勲家不宜親近京師時勲女為皇后有側聽嚴言者以告竇憲兄弟繇是失權貴心後遷將作大匠坐事免既為竇氏所忌遂不復在位及竇太后臨朝乃退居自守訓敎子孫卒於家崔實召拜尚書實以世方阻亂稱疾不視事數月免歸楊秉為光禄大夫是時大將軍梁冀用權秉稱病六年冀誅後乃拜太僕許劭汝南平輿人初為郡功曹後司空楊彪辟舉方正敦樸徵皆不就或勸劭仕對曰方今小人道長王室將亂吾欲避地淮海以全老幼乃南到廣陵徐州刺史陶謙禮之甚厚劭不自安告其徒曰陶恭祖外慕聲名内非真正待吾雖厚其勢必薄不如去之遂投揚州刺史劉繇於河曲其後陶謙果捕諸寓士寓寄也陳紀為平原相往謁董卓時議欲以為司徒紀見禍亂方作不復辨嚴即時之郡魏桓字仲英桓帝時數被徵其鄉人勸之行桓曰夫干禄求進所以行志也今後宮千數其可損乎廏馬萬匹其可減乎左右悉權豪其可去乎皆對曰不可桓乃慨然歎曰使桓生行死歸於諸子何有哉遂隱身不出郭泰字林宗太原介休人游於雒陽名震京師司徒黃瓊辟太常趙典舉有道或勸林宗仕進者對曰吾夜觀乾象晝察人事天之所廢不可支也遂並不應林宗雖善人倫臣欽若等曰范曄著後漢書諱其父名故稱字也而不為危言激論故宦官擅政而不能傷也及黨事起知名之士多被其害唯林宗及汝南袁閎得免焉袁閎從父逢隗並貴盛閎見時方險亂而家門富盛嘗對兄弟歎曰吾先公福祚後世不能以德守之而競為驕奢與亂世爭權此即晉之三郤矣延熹末黨事將作閎遂散髮絶世欲投迹深林以老母不宜遠遁乃築土室四周於庭不為户自牖納飲食而已且於室中東向拜母母思閎時往就視母去便自掩閉兄弟妻子莫得見也及母殁莫不為制服設位時莫能名或以為狂生潜身十八年黃巾賊起攻没郡縣百姓驚散閎通經不移賊相約語不入其閭郷人就閎避難皆得全免卒於土室蒯越為大將軍何進東曹掾越勸進誅諸閹宦進猶豫不決越知進必敗求出為汝陽令申屠蟠陳留外黃人也再舉有道不就先是京師㳺士汝南范滂等非訐朝政自公卿以下皆折節下之蟠獨歎曰昔戰國之世處士横議列國之王至為擁篲先驅卒有坑儒燒書之禍今之謂矣乃絶迹於梁碭之間居二年滂等果罹黨錮或死或刑蟠確然免於疑論其後董卓廢𢎞農王立獻帝蟠及荀爽韓融陳紀等復俱公車徵唯蟠不到衆人咸勸之蟠笑而不應居無幾爽等為卓所脅迫西都長安京師擾亂及大駕西遷公卿多遇兵飢室家流散融等僅以身脱唯蟠獨處亂末終全高志賈彪少逰京師志節慷慨先是岑晊以黨事逃亡親友多匿焉彪獨閉門不納時人望之彪曰傳言相時而動無累後人公孝臣欽若等曰公孝晊字也以要君致釁自遺其咎吾以不能奮戈相待反可容隱之乎於是咸服其裁正位至新息長袁術為虎賁中郎將時董卓將欲廢立以術為後將軍術畏卓之禍出奔南陽韓嵩字德高義陽人少好學貧不改操知世將亂不應三公之命後為劉表從事中郎荆州平就拜大鴻臚士孫瑞為尚書僕射與司徒王允同誅董卓瑞頗有才謀瑞以允自專討董卓之勞故歸功不侯所以獲免於難楊彪為太尉見漢祚將終遂稱脚攣不復行魏和洽字陽士汝南西平人舉孝亷大將軍辟皆不就袁紹在冀州遣使迎汝南士大夫洽獨以冀州土平民強英傑所利四戰之地本初乘資雖能強大然雄豪方起全未可必也荆州劉表無他遠志愛人樂士土地險阻山夷民弱易依倚也遂與親舊俱南從表表以客待之洽曰所以不從本初避争地也昏世之主不可黷近乆而阽危必有讒慝間其中者遂南渡武陵後位至太常田疇右北平人漢末率宗族入徐無山中袁紹數遣使招命又即授將軍印因安輯所統疇皆拒不當紹死其子尚又辟焉疇終不行後拜為議郎韓暨漢末避袁術命召徙居山都之山荆州牧劉表禮辟遂遁逃南居孱陵界所在見敬愛而表深恨之暨懼應命除宜城長張承字公先漢末以方正徵拜議郎遷伊闕都尉董卓作亂承欲合徒衆與天下共誅卓承弟昭時為議郎適從長安來謂承曰今欲誅卓衆寡不敵且起一朝之謀戰阡陌之民士不素撫兵不練習難以成功卓阻兵而無義固不能乆不若擇所歸待時而動然後可以如志承然之乃解印綬間行歸家與兄避地揚州管寧北海朱虛人也與邴原值亂往遼東依公孫度邴原性剛直淸議以格物度己下心不安之寧謂原曰潛龍以不見成德言非其時皆招禍之道也宻遣令西還寧後徵拜大中大夫不受劉曄淮南人漢光武子阜陵王延之後揚士多輕俠有鄭寶張多許乾之屬各擁部曲寶最驍果才力過人一方所憚欲驅略百姓越江來以曄高族名人欲強曄使唱導此謀曄内憂之而未有縁會太祖遣使詣州有所按問曄往見為論事勢寶從數百人齎牛酒來候曄曄因自引取佩刀斫殺寶斬其首令其軍云曹公有令敢有違令者與同罪即乘寶馬詣寶营門論以禍福慰撫安懷咸悉恱服推曄為主曄覩漢室漸微已為支屬不欲擁兵遂委其部曲與廬江太守劉勲勲恠其故曄曰寶無法制其衆素以鈔略為利僕宿無資而整齊之必懷怨難乆故相與耳位至大中大夫毛玠避亂荆州未至聞劉表政令不明遂往魯陽太祖臨兖州辟為治中從事高柔字文惠陳留圉人父靖漢末為蜀郡都尉柔留郷里謂邑中曰今者英雄並起陳留四戰之地也曹將軍雖㨿兖州本有四方之圖未得安坐守也而張君先得志於陳留吾恐變乘間作也欲與諸君避之衆人皆以張邈與曹公善柔又年少不然其言後邈畏太祖終為袁紹擊已也心不自安叛太祖柔位至太尉賈詡為宣義將軍李傕郭汜鬭長安中是時將軍段煨屯華陰與詡同郡遂去傕託煨詡素知名為煨軍所望煨内恐其見奪而外奉詡禮甚備詡愈不自安張繡在南陽詡陰結繡繡遣人迎詡將行或謂詡曰煨待君厚矣君安去之詡曰煨性多疑有忌詡意禮雖厚不可恃乆將為所圖我去必喜望吾結大援於外必厚吾妻子繡無謀主亦願得詡則家與身必俱全矣詡遂往繡執子孫禮煨果善視其家後為魏大中大夫自以非太祖舊臣而䇿謀深長懼見猜嫌闔門自守退無私交男女嫁娶不結高門天下之論智計者歸之袁徽陳郡扶樂人也以儒素稱遭天下將亂避難交州司徒辟不至初徽從兄渙慨然嘆曰漢室凌遲亂無日矣茍天下擾攘逃將安之若天未喪道民以義存唯彊而有禮可以庇身乎徽曰古人有言知幾其神乎見幾而作君子所以元吉也天理盛衰漢其亡矣夫有功必有大事此又君子之所以深識退藏於宻者也且兵革既興外患必衆徽遠迹山海以求免身及亂作各行其志裴潛字文行河東聞喜人避世亂荆州劉表待以賔禮潛私謂所親王粲司馬芝曰劉牧非覇王之才乃欲西伯自處其亂無日矣遂南適長沙後位至光祿大夫冊府元龜卷七百八十九
