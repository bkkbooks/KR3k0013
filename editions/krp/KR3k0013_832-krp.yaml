body:
  text: 冊府元龜卷八百三十二宋王欽若等撰總録部規諷第二宋范晏廬陵王義真故吏義真與謝靈運顔延之暱狎過甚晏從容戒之義真曰靈運空疎延之隘薄魏文帝云鮮能以名節自立者但性情所得未能忘言於悟賞故與之遊耳沈慶之為車騎大将軍時柳元景顔師伯嘗詣慶之㑹其游田元慶等鳴笳列卒滿道慶之獨與左右一人在田見之悄然改容曰夫貧賤不可居富貴亦難守吾與諸公並出貧賤因時際㑹榮貴至此唯當共思損挹之事老子八十之年目見成敗者已多諸君炫此車服欲何為乎於是挿杖而耘不為之顧元景等撤侍褰裳從之慶之乃與相對為歡范泰為侍中左光禄大夫時司徒王𢎞輔政泰謂𢎞曰天下務廣而權要難居卿兄弟盛滿當深存降挹彭城王帝之次弟宜徴還入朝共參政事𢎞納其言成粲為平陵令時王𢎞輔政彭城王義康為荆州刺史鎮江陵粲與𢎞書曰僕聞軌物設教必隨時制宜世代盈虚亦與之消息夫勢之所處非親不居是以周之宗盟異姓為後權軸之要任歸二南斯前代之明謨當今之顯轍明公位極台鼎四海具瞻劬勞夙夜義同吐握而總録百揆兼牧畿甸功實盛大莫之與儔天道福謙宜存挹損驃騎彭城王道徳昭備上之懿弟宗本歸源所應推先宜出據列藩齊光魯衛明公髙枕論道燮理隂陽則天下和平災害不作福慶與大宋升降享年與松喬齊久名垂萬代豈不美與𢎞本有退志得粲言由是固自陳請乃降為衛将軍開府儀同三司柳元景字孝仁為冠軍将軍文帝時薛安都從弟道生亦以軍功為大司馬參軍犯罪為秣陵令庾淑之所鞭安都大怒乃乗馬從數千人令左右執矟欲徃殺淑之行至朱雀航逢元景元景遥問薛公何處去安都躍馬至車後曰小子庾淑之鞭我從弟今特徃刺殺之元景慮其不可駐車紿之曰小子無故宜適卿徃與手甚快安都既廻馬復追呼之别宜與卿有所論令下馬入車既入車因責讓之曰卿從弟服章言論與寒細不異雖復人士庾淑之亦何由得知且人身犯罪理應加罰卿為朝廷勲臣宜崇奉法憲云何放恣輒欲於都邑殺人非唯科律所不容主上亦無辭以相宥因載之俱歸安都乃止垣䕶之元嘉初為殿中将軍隨到彦之北伐彦之将廻師䕶之為書諌曰外聞節下欲廻師䕶之竊所不同何者殘虜畏威望風奔迸八載侵地不戰克復方當長驅朔漠窮掃遺醜况乃自送無假遠勞宜使竺靈秀速進滑臺助朱修之固守節下大軍進據河北則牢落遊魂自然奔退且昔人有連年攻戰失衆乏糧者猶張膽爭前莫肯輕退况今青州豐穰濟漕流通士馬飽逸威力無損若空棄滑臺坐喪成業豈是朝廷受任之㫖彦之不納散敗而歸太祖聞而善之以補江夏王義恭征北将軍北髙平太守郢有野老帶苫而耕時衡陽王義季嘗大蒐於郢命左右斥之老人擁耒對曰昔楚子盤遊受譏令尹今陽和扇氣播厥之始一日不作人失其時大王馳騁為樂驅斥老夫非勸農之意義季止馬曰此賢者也命賜之食老曰吁願大王均其賜也茍不奪人時則一時皆享王賜老人不偏其私矣斯飯也弗敢當問其名不言而退南齊茍丕潁川人豫章王嶷為荆州時丕獻書令减損奢麗王優教酬答尚書令王儉有名當世丕又與儉書曰足下建髙世之名而不顯髙世之跡将何以書於齊史哉梁謝郁會稽人也何敬容為尚書令參掌機密以罪免職尋起為金紫光禄大夫未拜又加侍中敬容舊時賔客門生諠譁如昔冀其復用郁致書戒之曰草萊之人聞諸道路君侯已得瞻歩宫闕出入禁門醉尉将不敢呵斥然不無其漸甚休甚休敢賀於前又将弔也昔流言纔作公旦東奔燕書始來子孟不入夫聖賢被虚過以自斥未有嬰時釁而求親者也且曝鰓之鱗不念杯杓之水雲霄之翼豈顧籠樊之糧何者所託已盛也昔君侯納言加首鳴玉在腰廻豐貂以歩文昌聳髙蟬而趨武帳可謂盛矣不以此時薦才㧞士少報聖主之恩今卒如爰絲之説受責見過方復欲更窺朝廷觖望萬分竊不為左右取也昔竇嬰楊惲亦得罪明時不能謝絶賔客勢交黨援卒無後福終益前禍僕之所弔實在於斯人人所以頗猶有踵君侯之門者未必皆感惠懷仁有灌夫任安之義乃戒翟公之大署冀君侯之復用也夫在思過之日而挾復用之意未可為智者説矣君侯宜杜門念失無有所通築茅茨於鍾阜聊優游以卒歳見可憐之意著待終之情復仲尼能改之言推子貢更也之譬少戢言於衆口微自救於竹帛所謂失之東隅收之桑榆如此令明主聞知尚有冀也僕東臯鄙人入穴幸無銜窶之恥天下之士不為執事道之故披肝膽示情素君侯豈能鑒焉袁敬為太子舎人江陵淪没流寓嶺表髙祖受禪敬在廣州依歐陽頠卒其子紇據州将有異志敬累諫紇為陳逆順之理言甚至紇終不從髙宗即位遣章昭逹率衆討紇紇恨不納敬言朝廷義之陳虞寄為岳陽王中記室侯景之亂寄隨兄荔入臺城除鎮南湘東王諮議參軍加貞威将軍京城䧟遯還鄉里及張彪徃臨川强寄俱行與彪将鄭瑋同舟而載瑋嘗忤彪意乃刼寄奔于晉安時陳寶應據有閩中得寄甚喜髙祖平侯景寄勸令自結寶應從之乃遣使歸誠承聖元年除和戎将軍中書侍郎寶應愛其才託以道阻不遣毎欲引寄為僚屬委以文翰寄因辭獲免及寶應結婚留異潜有逆謀寄微知其意言説之際毎陳逆順之理微以諷諫寶應輒引説他事以拒之又嘗令左右誦漢書臥而聽之至蒯通説韓信相君之背貴不可言寶應起曰可謂智士寄正色曰覆酈驕韓未足稱智豈若班彪王命識所歸乎寄知寶應不可諫慮禍及已乃為居士服以拒絶之嘗居東山寺偽稱脚疾不復起寶應以為假託使燒寄所臥室寄安臥不動親近将扶寄出寄曰吾命有所懸避欲安徃所縱火者旋自救之寶應自此方信及留異稱兵寶應資其部曲寄乃因書極諌曰東山虞寄致書於明将軍使君節下寄流離世故飄寓貴鄉将軍待以上賔之禮申以國士之眷意氣所感何日忘之而寄沉痼彌留愒隂将盡常恐卒填溝壑涓塵莫報是以敢布腹心冐陳丹欵願将軍留須臾之意少思察之則瞑目之日所懷畢矣夫安危之兆禍福之機匪獨天時亦由人事失之毫釐差以千里是以明智之士據重位而不傾執大節而不失豈惑於浮辭哉将軍文質兼資英威不世徃因多難仗劔興師援旗誓衆抗威千里豈不以四郊多壘共謀王室佐時報主寕國庇民乎此所以五尺童子皆願荷㦸而隨将軍者也及髙祖武皇肇基草昧初濟艱難于時天下沸騰民無定主豺狼當道鯨鯢横擊海内業業未知所從将軍運洞微之鑒折縱横之辯策名委質自託宗盟此将軍妙筭遠圖發於衷誠者也及主上繼業欽明睿聖選賢與能羣臣輯睦結将軍以維城之重崇将軍以列土之封豈非宏謨妙略推赤心於物也屢申明詔欵篤殷勤君臣之分定矣骨肉之恩深矣不意将軍惑於邪説遽生異計寄所以疾首痛心泣盡繼之以血萬全之策竊為将軍惜之寄雖疾侵耄及言無足採千慮一得請陳愚算願将軍少戢雷霆賖其晷刻使得盡狂瞽之説披肝膽之誠則死之日猶生之年也自天厭梁徳多難薦臻寰宇分離英雄互起不可勝紀人人自以為得之然夷凶剪亂拯溺扶危四海樂推三靈眷命揖讓而居南面者陳氏也豈非厯數有在唯天所授當璧應運其事甚明一也主上承基明徳逺被天綱再張地維重紐夫以王琳之强侯瑱之力進足以揺蕩中原爭衡天下退足以倔强江外雄長偏隅然或命一旅之師或資一士之説琳則瓦觧氷泮投身異域瑱則厥角稽顙委命闕庭斯又天假之威而除其患其事甚明二也今将軍以藩戚之重東南之衆盡忠奉上戮力勤王豈不勲髙竇融寵過呉苪析珪判野南面稱孤其事甚明三也且聖明棄瑕忘過寛厚待人改過自新咸加叙擢至於余孝頃潘純陁李孝欽歐陽頠等悉委以心腹任以爪牙胸中豁然曽無纎芥况将軍釁非張繡罪異畢諶當何慮於危亡何失於富貴此又其事甚明四也方今周齊鄰睦境外無虞并兵一向匪朝伊夕非劉項競逐之機楚趙連從之勢何得雍容髙拱坐論西伯其事甚明五也且留将軍狼顧一隅亟經摧䘐聲實虧喪膽氣衰沮髙瓌向文政留瑜黄子玉此數人将軍所知首䑕兩端惟利是視其餘将帥亦可見矣孰能被堅執鋭長驅深入繫馬埋輪奮不顧命以先士卒者乎此又其事甚明六也且将軍之强孰如侯景将軍之衆孰如王琳武皇滅侯景於前今上摧王琳於後此乃天時非復人力且兵革之後民皆厭亂其孰能棄墳墓捐妻子出萬死不顧之計從将軍於白刅之間乎此又其事甚明七也厯觀前古鑒之徃事子陽季孟傾覆相尋餘善右渠危亡繼及天命可畏山川難恃况将軍欲以數郡之地當天下之兵以諸侯之資拒天子之命强弱逆順可得侔乎此又其事甚明八也且非我族類其心必異不愛其親豈能及物留将軍身縻國爵子尚王姬猶且棄天屬而弗顧背明帝而孤立危急之日豈能同憂共患不背将軍者乎至於師老力屈懼誅利賞必有韓智晉陽之謀張陳井陘之勢此又其事甚明九也且北軍萬里遠鬬鋒不可當将軍自戰其地人多顧後衆寡不敵将帥不侔師以無名而出事以無機而動以此稱兵未知其利以漢朝呉楚晉室潁顒連城數十長㦸百萬㧞本塞源自圖家國其有成功者乎此又其事甚明十也為将軍計者莫若不遠而復絶親留氏秦郎快郎隨遣入質釋甲偃兵一遵詔㫖且朝廷許以鐵劵之要申以白馬之盟朕弗食言誓之宗社寄聞明者鑒未形智者不再計此成敗之効将軍勿疑吉凶之幾間不容髪方今藩維尚少皇子幼冲凡預宗枝皆蒙寵樹况以将軍之地将軍之才将軍之名将軍之勢而克脩藩服北面稱臣寕與劉澤同年而語其功業哉豈不身與山河等安名與金石相弊願加三思慮之無忽寄氣力綿微餘隂無幾感恩懷徳不覺狂言鈇鉞之誅甘之如薺寶應覽書大怒或謂寶應曰虞公病勢漸篤言多錯謬寶應意乃少釋亦為寄有民望且優容之及寶應敗走夜至蒲田顧其子扞秦曰早從虞公計不至今日扞秦但泣而已寶應既擒凡諸賔客微有交渉者皆伏誅唯寄以先識免禍後魏李平為相州刺史前來臺使頗好侵取平乃畫履虎尾踐薄氷於客館注頌其下以示戒焉髙湖字大淵初為慕容垂散騎常侍垂遣其太子寶伐魏湖言於垂曰魏燕之與國彼有内難此遣赴之此有所求彼無違者和好多年行人相繼往求馬不得遂留其弟曲在於此非彼之失政當敦修舊好乂寕國家而復令太子率衆伐遠且魏主雄畧兵馬精强險阻艱難備嘗之矣太子富於春秋意果心鋭輕敵好勝難可獨行兵凶戰危願以深慮言頗切厲垂怒免湖官既而寶果敗於參合張普惠為歩兵校尉時驍騎将軍刁整家有舊訓将營儉𦵏普惠以為矯時太甚與整書論之髙允為太傅時太武皇帝之子翰為東平王允以翰年少作諸侯箴以遺之翰覽之大悦後周庾季才太祖時為車騎大将軍其後大冡宰宇文䕶執政謂季才曰此日天道有何徴祥季才對曰荷恩深厚若不盡言便同木石頃上台有變不利宰輔公宜歸政天子請老私門此則自享期頥而受旦奭之美子孫藩屏終保維城之固不然者非復所知䕶沉吟乆之謂季才曰吾本意如此但辭未獲免爾隋房彦謙為鄀州司馬黄門郎張衡與彦謙相善于時帝營東都窮極侈麗天下失望又漢王搆逆罹罪者多彦謙見衡當塗而不能匡救以書諭之曰竊聞賞者所以勸善刑者所以懲惡故疎賤之人有善必賞尊貴之戚犯惡必刑未有罰則避親賞則遺賤者今諸州刺史受委宰牧善惡之間上逹本朝懾憚憲章不敢怠慢國家祗承靈命作民父母刑賞曲直升聞於天寅畏照臨亦宜謹肅故文王云我其夙夜畏天之威以此而論雖州國有殊髙下懸邈然憂民慎法其理一也至如并州釁逆須有甄明若楊諒實以詔命不通慮宗社危逼徴兵聚衆非為干紀則當原其本情議其刑罰上副聖主友于之意下曉愚民疑惑之心若審知外内無虞嗣后纂統而好亂樂禍妄有覬覦管蔡之誅當在於諒同惡相濟無所逃罪梟懸孥戮國有常刑其間乃有情非協同力不自固或被逼擁淪䧟兇威遂使籍沒流移恐為寃濫恢恢天網豈其然乎罪宜從輕其義安在昔叔向寘鬻獄之死晉國所嘉釋之斷犯蹕之刑漢文稱善羊舌寕不愛弟廷尉非茍違君但以執法無私不容輕重且聖人大寶是曰神器茍非天命不可妄得故蚩尤項籍之驍勇伊尹霍光之權勢李老孔丘之才智吕望孫武之兵術呉楚連盤石之據産禄承母后之基不應厯運之兆終無帝王之位况乎蕞爾一隅蜂扇蟻聚楊諒之愚鄙羣小之凶慝而欲憑陵畿甸覬幸非望者哉開闢以降書契云及皇帝之跡可得而詳自非積徳累仁豐功厚利孰能道洽幽顯義感聖祗是以古之哲王昧旦丕顯履氷在念御朽兢懷逮叔世驕荒曽無戒懼肆於民上騁嗜奔慾不可具載請畧陳之曩者齊陳二國並居大位自謂天地合徳日月齊明罔念憂虞不恤刑政近臣懷寵稱善而隱惡史官曲筆掩瑕而録美是以民庶呼嗟終閉塞於視聽公卿虚譽日敷陳於左右法網嚴密刑辟日多徭役煩興左右疲苦昔鄭有子産齊有晏嬰楚有叔敖晉有士㑹凡此小國尚足名臣齊陳之强豈無良佐但以執政壅蔽懷私殉軀忘國憂家外同内忌設有正直之士才堪幹時於己非宜即加擯壓儻遇謟佞之輩行多穢慝於我有益遽蒙薦舉以此求賢何從而至夫賢才者非尚膂力豈係文華唯須正身負載確乎不動譬棟之處屋如骨之在身所謂棟梁骨鯁之才也齊陳不任骨鯁信近讒邪天髙聽卑鑒其淫僻故總收神器歸我大隋向使二國祗敬上𤣥惠恤鰥寡委任方直斥遠浮華卑菲為心惻隱是務河朔富强江湖險隔各保其業民不思亂泰山之固弗可動也然而寝臥積薪宴安鴆毒遂使禾黍生廟露霧沾衣弔影撫心何嗟及矣故詩云殷之未喪師克配上帝宜鑒于殷峻命不易萬幾之事何者不須熟慮哉伏惟皇帝望雲就日仁孝夙彰錫社分珪大成規矩及總統淮海盛徳日新當璧之符遐邇僉屬纉厯甫爾寛仁已布率土蒼生翹足而喜并州之亂變起倉卒職由楊諒詭惑詿誤吏民非有搆怨本朝棄徳從賊者也而有司将帥稱其願反非止誣䧟良善亦恐大玷皇猷足下宿當重寄早預心膂粤自藩邸柱石見知方當書名竹帛傳芳萬古稷契伊吕彼獨何人既屬明時須存謇諤立當世之大誡作将來之憲範豈容曲順人主以愛虧刑又使脅從之徒横貽罪譴忝蒙眷遇輒冩微誠野人愚瞽不知忌諱衡得書歎息而不敢奏聞陳孝意大業初為魯郡司法書佐郡内號為亷平太守蘇威嘗欲殺一囚孝意固諌至於再三威不許孝意觧衣請先受死良久威意乃觧謝而遣之髙孝基為吏部侍郎時髙士亷屏居終南山琴書自娯孝基清鑒士也謂士亷曰吾聞不仕謂之無義揚名所以顯親弟富於從政今乃銷聲隱逸自託清髙此乃招謗何成避嫌爾士亷感悟方有宦情唐凌敬為竇建徳國子祭酒初建徳嘗破趙州執刺史張志昻邢州刺史陳君賓大使張道源等以侵軼其境建徳将戮之敬諌曰夫犬各吠非其主今鄰人堅守力屈就擒此乃忠確士也若加酷害何以勸大王之臣乎建徳怒曰我至城下猶迷不降勞我師旅罪何可赦敬又曰今大王使大将軍髙士興於易水北抗禦羅藝兵纔至士興卽降大王之意復為可不建徳乃悟即命釋之陳振鷺客崔湜門下韋庶人臨朝湜為中書侍郎同中書門下三品睿宗即位出為華州刺史俄為太平公主所引復遷中書侍郎同中書門下三品先天元年拜中書令與劉幽求爭權不協䧟幽求徙於嶺表湜既私附太平公主時人咸為之懼振鷺獻海鷗賦以諷之湜雖稱善而心實不悦也契苾何力為左驍衛大将軍時司稼少卿梁孝仁監造新宫於諸庭院列樹何力入中宫縱觀孝仁指白楊曰此木易長不過二三年宫中可得䕃映何力不答但誦古詩曰白楊多悲風蕭蕭愁殺人意謂此是塜墓間木也孝仁遽令㧞去更植梧桐袁楚客陳郡人也魏元忠則天時稱為清正中宗神龍初重為宰相天下莫不傾屬元忠乃親附權豪抑棄寒畯竟不能賞善罰惡勉脩徳政議者以此少之楚客嘗致書規正元忠曰今皇帝新服厥徳任官惟賢才左右惟其人君為元首臣作股肱可布大化以利朝廷存古道以正天下去邪佞使小人之道消進忠良使君子之道長豈得安其榮寵守其循黙者哉若以此為常非所以愛人治國矣傳曰茍利社稷専之可也君侯念之哉昔漢成帝時王氏擅權劉向諌曰臣聞公族者國之枝葉枝葉落本根無所庇廕方今同姓疎遠母黨専政排擯宗枝孤弱公族非所以保守社稷安固國嗣也其言甚切多所稱引成帝雖悲傷歎息而不能用此非帝不知知之而不贊者臣之罪也其後王氏竟假周公之事而起田常之亂此乃大臣循黙之失也惟君侯誡之哉夫利萬物者道也惟君子能行之害萬物者邪也惟小人固為之以道心濟物則上天祐之雖履危而必安矣以邪心害物則明神殛之雖居安而必危矣何則勢使之然也故濟物者其心廣矣害物者其心褊矣心廣者所務不専於身心褊者所利不及於物哲人知其若此必守道以廣其心屈已以利其物行道於身而必全其身行道於國而必全其國帝王失道之正大臣必以道化之昔伊尹有言曰予弗克俾厥后惟堯舜其心愧恥若撻於市若覽伊尹之説非堯舜之君但以道佐之亦可致之於堯舜也既食人主之禄而憂人主之事光贊其美規救其惡建功於當年可謂無負於天下惟君侯志之哉夫欲安天下者先正其本本正則天下必固不正其本則天下必危國之興亡實在此矣師丹曰太子者天下之本也譬之大樹無本則枝葉零瘁國無太子則朝野不安先王必立之者以儲君有次立之勢故令師保教以君人之道用藴崇其徳所以重宗社而安天下也今皇子既長而未定嫡嗣是天下無本也天下無本可謂危矣猶大樹無枝葉何以存乎願君侯以清宴之間而盡言於上擇其賢者而立之此乃安天下之道也書曰一人元良萬邦以貞斯之謂也而使春宫久曠豈謂宜乎此則朝廷之失君侯不正誰正之哉又聞古之封子弟建侯伯者将以藩屏王室安固邦基垂永代之業為盤石之宗也又聞女有内則男有外傅男女有别剛柔分矣内外斯隔隂陽著矣豈可濫哉然而幕府者丈夫之職非婦人之事今諸公主並開建府僚悉置官秩若以女處男職所謂長隂抑陽也而望隂陽不愆風雨無爽其可得乎竊謂非致遠之計乖乆長之策書曰事不師古以克永世匪説攸聞此之謂也此則朝廷之二失君侯不正誰正之哉又聞人之生也有禍有福有貴有賤此並禀之於前業當受之於此身然崇佛教者特以資彼來生鮮有益於見報若求之理國恐不在此矣然三教俱設各有所務而行之者不可過也行釋教者脩身之本行儒教者理國之源修身是來生之資理國乃即代之務然則即代至近來生至遠捨近求遠不亦乖乎存彼棄此不亦謬乎今度人既多緇衣滿路率無戒行寕有經業空齎重寶専附權門取錢奏名皆有定價昔之賣官也錢入公府今賣度也錢入私家以兹入道實非履正詭情不變徒為遊食使法侣有失而流俗生厭名曰度人其實頺矣今主上雖希心聖教専想冺空奈社稷何奈蒼生何君侯不以中庸之義悟大聖之志但能致一代於仁夀之域斯亦至尊之道也此則朝廷之三失君侯不正誰正之哉又聞古人有言曰唯名與器不可以假人書曰天工人其代之故知代天工非才不可若有所濫必失天意而無患禍者未之有也今不專精於庶政而留心於竒伎至於倡優之輩因其耳目之好遂升之以位授之以官豈非輕朝廷而亂正法邪然人君無私賞無私怒盖以私怒者恐傷物私賞者恐費財古人此之尤慎豈得私人以官乎若以此為政何以答皇天之命也此則朝廷之四失君侯不正誰正之哉又聞賢者邦家之光也任之可以致理棄之足能生亂三仁去而殷亡百里入而秦覇有國家者固須擇也昔者戰國之代得士者昌失士者亡莫不以求賢為急務覇者仗之以命諸侯况巍巍唐國明天子茍存斯道則三皇五帝可緩歩而越也近者有制搜揚廣求賢俊戔戔束帛賁於丘園翹翹車乗訪及山谷此我皇勤求之至也雖有好賢之名竟無得賢之譽非皇情之不眷諒有司之過也何則聖主求賢訪諸草澤及有司選士多是親黨若非有賄必以勢求上失天心下違人望既非為官擇吏所謂為人擇官蠧政之源敗國之甚書曰治亂在庶官孔安國曰得人則理失人則亂葛洪曰舉秀才不知書察孝亷濁如泥髙第賢良恡如蠅古人規職勤誦經今人圖家勉營生此之謂也此則朝廷之五失君侯不正誰正之哉又閹豎者給宫掖之事供掃除之役上古皆備此職但以奴𨽻畜之豈及於官次中古以來大道乖喪不重賢哲唯親近習或委以事或授以權遂使豎刁亂齊伊戾敗宋君側之人衆所畏懼葛洪所謂鷹頭之蠅廟垣之䑕無拳無勇職為亂階者也洎乎後漢用事尤甚時君既不知其失大臣又畏罪不言所以害及生靈毒流天下至於晚節竟亂中朝各相黨與屠宰良善此時也忠臣義士覩斯慷慨不得不權行殺戮至於無鬚而横死者不可勝言豈非結禍之深自危之速易曰小人用壮斯之謂也自大君受命中興成務獨有閹豎坐昇班秩既無正闕多授員外舉其全數向滿千人茍綰青紫𧖟食府藏既非致理之道實為長亂之階書曰人無於水鑒當於民鑒觀徃古之成敗亦可見今之得喪故曰前事之驗後事之師此則朝廷之六失君侯不正誰正之哉又聞自古聖帝卑宫菲食茅茨不剪采椽不斵将以儉約遺子孫亦所以愛惜人力也書曰酣酒嗜音峻宇彫墻有一於此未或不亡况於臣下安得以肆奢為務乎若有僣濫必生患禍患禍之來可翹足而待也今之公王凡有所賞将以傾府庫所造私宅皆是官供觀其疏鑿池亭崇峻廊宇山無木石必他山以致之木無因近必窮遠以採之珍館出雲畫堂赫日造之竟歳功用不絶自開泰以來未之有也而行者見之僉曰非國戚不得如此非尊貴不得若斯僕毎聞此言将以有譏於君矣何者為君所以養人非所以害人今外戚不助養人反害於人豈有益於吾君乎然堂上遠於百里君門隔於九重人主既不知之君侯又不言之豈使人主虚受謗於天下也此則朝廷之七失君侯不正誰正之哉又聞官者将以理人将以安人非以亂人非以害人故先王欲人理必選材以理之欲人安必省事以安之不欲人於亂必撥亂以整之不欲人有害必去害以全之若此誠欲與天下同憂矣人有樂君共之君有樂人慶之可謂同樂矣如此則上下無間君臣合徳同於一體也若下有懷憂之人上無同憂之主欲求人理不可得也今天下困窮海内虚耗復以州牧縣宰選授多不得人自餘僚佐鮮有稱職不務公謹専於割剥人不聊生安肯懼死既不懼死是能生變下有憂而上不知也比之馬也必除其害牧狀之羊也必去其亂羣此道尚有所闕而反更員外置官所謂助桀為虐足以速禍也夫人之情自知員外恐人不畏必峻法以懼之恐財之不足必枉道以奪之以有限之物供無厭之用欲其不亂豈可得哉古人有言十羊九牧羊既不得食人亦不得息唐虞之代建官惟百夏商官倍亦克用乂書曰官不必備惟其人孔子譏管仲曰官事不攝焉得儉據此雖正員之官猶不欲其備况正員之外更置員外乎此則朝廷之八失君侯不正誰正之哉又聞英主開基以定天下者将以傳之於萬代也繼明之帝豈得隳之哉有所下廢則政出多門政出多門大亂之漸也近封數夫人者皆先朝之宫女賞其勤勞加之邑號若備内職則不當知外不備内職自可居外安得出入内外徃來宫掖者哉若下創革内言必出外言必入内外互言禁衞何施必㺯君之法縱而不禁非所以重宗廟固國家也孔子曰彼婦之口可以出走彼婦之謁可以死敗戒之哉戒之哉此則朝廷之九失君侯不正誰正之哉又聞以正道事君者将以安天下也以非道事君者所以危天下也若有危天下之臣不可不逐之若有安天下之臣不可不任之正道者行仁義以補君之過非道者行蠱媚以成君之惡補過者國之幹也成惡者國之賊也今代或有不脩忠正以事君引鬼神而惑主然則鬼神之事𡨕漠難知故左道之人因此自致其詐售其賂遺必據非材之位必食非徳之禄此國賊也書曰官不及私昵惟其能爵罔及惡徳惟其賢又曰與治同道罔不興與亂同事罔不亡傳曰國之将興聽於人将亡聽於神豈近是乎此則朝廷之十失君侯不正誰正之乎此十失者誠國之巨蠧粗而言之以有言於君侯者将以扶危去蠧救蒼生之命願君侯稍垂意微有所採此亦君侯自安之道也庶幾無忽元忠覽而大慙頗引咎自責韋乾慶知鹽鐵江陵院時裴均為節度使欲請劉闢為判官苻載為從事乾慶牒均去之言其狂狡不宜寘之幕府均乃止冊府元龜卷八百三十二
