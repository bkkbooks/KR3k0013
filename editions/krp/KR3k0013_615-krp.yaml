body:
  text: 册府元龜卷六百十五宋王欽若等撰刑法部議讞第二宋蔡廓仕晉爲著作佐郎于時議復肉刑廓上議曰夫建邦立法𢎞治稽化必隨時置制德刑兼施貞一以閑其邪教禁以簡其慢灑湛露以膏潤厲嚴霜以肅威晞風者陶和而養恬穢戾者聞憲而警慮雖復質文迭用而斯道莫革肉刑之設肇自哲王蓋繇曩世風淳民多厚謹圖象既陳則機心𡨕戢刑人在途則不逞改操故能勝殘去殺化隆無爲季末澆僞法網彌宻利巧之懐日滋恥畏之情轉寡終身劇役不足以止其姦况乎黥劓豈能反其善徒有酸慘之聲而無濟治之益至於棄市之條實非不赦之罪事非手殺考律同歸輕重均科减降路塞鍾陳以之抗言元皇所爲留愍今英輔翼贊道邈伊周雖閉否之運甫開而遺育之難未已誠宜明愼用刑愛民𢎞育申哀矜以革濫移大辟於支體全性命之至重恢繁息於將來而孔琳之議不同用王朗夏侯𤣥之㫖時論多與琳之同故遂不行後爲侍中建議以爲鞫獄不宜令子孫下辭明言父祖之罪虧教求情莫此爲大自今後人與囚相見無乞鞫之訴便足以明伏罪不湏責家人下辭朝議咸以爲允從之王𢎞爲衛將軍錄尚書事識練治體留心庶事斟酌時宜每存優允與八座丞郎疏曰同伍犯法無士人不罪之科然每至詰謫輒有請訴若垂恩宥則法廢不可行依事糾責則物以爲苦怨宜更爲其制使得優苦之𠂻也又主守偷五疋常偷四十疋並加大辟議者咸以爲重宜進主偷十疋常五十疋死四十疋降以補兵既得少寛民命亦足以有懲也想各言所懐左丞江奥議士人犯盗贓不及棄市者刑竟自在贓汙淫盗之目清議終身經赦不原當之者足以塞愆聞之者足以鑒戒若復雷同羣小謫以兵役愚謂爲苦符伍雖比屋鄰居至於士庶之際實自天隔含藏之罪無以相關奴客與符伍交接有所藏蔽可以得知是以罪及奴客自是客身犯愆非代郎主受罪也如其無奴則不應坐右丞孔默之議君子小人既雜爲符伍不得不以相檢爲義士庶雖殊而理有聞察譬百司居上所以下不必躬親而後同坐是故犯違之日理自相關今罪其養子典計者蓋義存戮僕如此則無奴之室豈得宴安但既云復士宜令輸贖常盗四十疋主守五疋降死補兵雖大存寛惠以紓民命然官長二千石及失節士大夫時有犯者罪乃可戮恐不可以補兵也謂此制可施小人士人自還用舊律尚書王淮之議昔爲山隂令士人在伍謂之押符同伍有愆得不及坐士人有罪符伍糾之此非士庶殊制寔使即刑當罪耳夫束修之胄與小人隔絶防檢無方宜及不逞之士事接羣細既同符伍故使糾之于時行此非惟一處左丞議奴客與鄰伍伯相關可得簡察符中有犯使及刑坐即事而求有乖寔理有奴客者類多使役東西分散住家者少其有停者左右驅馳動止所湏出門甚寡典計者在家十無其一奴客坐伍濫刑必衆恐非立法當罪本㫖右丞議士人犯偷不及大辟者宥其補兵雖欲𢎞士懼無以懲邪乗理則君子違之則小人制嚴於上猶冐犯之况其宥科犯者或衆使畏法革心乃所以大宥也且士庶異制意所不同殿中郎謝元議謂事必先正其本然後其末可理本所以押士大夫於符伍者將以檢小人邪爲使受檢於小人邪案左丞稱士庶天隔則士無𢎞庶之繇以不知而押之於伍則是受檢於小人也然則小人有罪士人無罪僕𨽻何罪而令坐之若以實相交關責其聞察則意有未因何者名實殊章公私異令奴不押符是無名也民之資財是私賤也以私賤無名之人豫令公家有實之任公私混淆名實非允繇此而言謂不宜坐還從其主於事爲宜無奴之士不在此例若士人本檢小人則小人有過已應獲罪而其奴則義歸戮僕然則無奴之士未合宴安使之輸贖於事非謬二科所附惟制之本耳此是辨章二本欲使各從其分至於求之管見宜附前科區别士庶於義爲美盗制案左丞議士人既終不爲兵革幸可同寛宥之惠不必依其舊律於議咸允吏部何尚之議案孔右丞議士人坐符伍爲罪有奴罪奴無奴輸贖既許士庶緬隔則聞察自難不宜以難知之事定以必知之法夫有奴不賢無奴不必不賢今多僮者傲然於王憲無僕者怵廹於時網是爲恩之所霑常在程卓法之所設必加顔原求之鄙懐竊所未惬謝殿中謂奴不隨主於名分不明誠是有理然奴僕實與閭里相關今都不問恐有所失意同右丞議𢎞議曰尋律令既不分别士庶又士人坐同伍罹謫者無處無之多爲時恩所宥故不盡親謫耳呉及義興適有許陸之徒以同符合給二千石論啓丹書己未問㑹稽士人云十數年前亦有四族坐此被責以時恩獲停而王尚書云舊無同伍坐所未之解恐莅任之日偶不値此事故耶聖明御世士人誠不憂至苦然要湏臨事論通上千天聽徒爲紛擾不如近與定科使輕重有節也又尋甲符制蠲士人不傳符耳令史復除亦得如之共相押領有違糾列了無等衰非許士人閭里之外也諸議云士庶緬絶不相參知則士人犯法庶民得不知若庶民不許不知何許士人不知小民自非超然檢獨永絶塵粃者比門接棟小以爲意終自聞知不必湏日夕來往也右丞百司之言粗是其况如襄陵士人實與里巷關接相知情狀乃當與冠帶小民今謂之士人便與小人之坐署爲小民輒受士人之罰於情於法不其頗歟且都令不及士流士流何爲輕則小人今使徴預其罰便事至相糾閭伍之防亦爲不同謂士人可不受同伍之謫耳罪其奴客庸何傷邪無奴客可令輸贖又或無奴僮爲衆所明者官長二千石便當親臨列上依事遣判偷五疋四十疋謂應見優量者實以小吏無知臨財易昧或繇疎慢事蹈重科求之於心常有可愍故欲小進疋數寛其性命耳至於官長以上荷蒙祿榮付以局任當正已明憲檢下防非而親犯科律亂法冐利五疋乃已爲𢎞矣士人無私相偷四十疋理就使至此致以明罰固其宜耳並何容復加哀矜且此軰士人可殺不可讁有如諸論本意自不在此也近聞之道路聊欲共論不呼乃爾難精既衆議糾紛將不如其已若呼不應停寢謂宜集議奏聞决之聖㫖太祖詔衛軍議爲允𢎞又上言舊制民年十三半役十六全役當以十三已上能自營私及公故以充役而考之見事猶或未盡體有強弱不皆稱年且在家自隨力所能堪不容過苦移之公役動有定科循吏隱恤可無其患庸宰守常已有勤劇况値苛政豈可稱言乃有務在豐役増進年齒孤遠貧弱其弊尤深至令依寄無所生死靡告一身之切逃竄求免家人遠討胎孕不育巧避羅憲實亦繇之今皇化惟新四方無事役召之應存乎消息十五至十六宜爲半丁十七爲全從之何叔度爲尚書呉興武康縣民王延祖爲刼父睦以告官新制凢刼身斬刑家人棄市睦既自告於法有疑叔度議曰設法止姦本於情理一人爲刼闔門應刑所以罪及同産欲開其相告以出爲惡之身睦父子之至容可悉共逃亡而割其天屬還相縛送螫毒在手解腕求全於情可愍理亦宜宥使㐫人不容於家逃刑無所乃大絶根源也睦既糾送則餘人無應復告並合捨之孔淵之爲比部郎時安陸應城縣民張江陵與妻呉共罵母黄令死黄忿恨自縊死値赦律文子賊殺傷毆父母梟首罵棄市謀殺夫之父母亦棄市値赦免刑補治江陵罵母母以之自裁重於傷毆若同殺科則疑重用殺傷及罵制則疑輕准制唯有打父母遇赦猶梟首無罵母致死値赦之科淵之議曰夫違理逆心而仁者不入名且惡之况乃人事故毆傷呪詛法所不原罵之致盡則理無可宥罰有從輕蓋疑失善求之文㫖非此之謂江陵雖値赦恩故合梟首婦本以義愛非天屬黄之所恨情不在呉原死補治有允正法詔如淵之議呉免棄市臨川王義慶爲丹陽尹有民黄初妻趙殺子婦遇赦應徒送避孫讎義慶曰按周禮父母之仇避之海外雖遇市朝鬭不反兵蓋以莫大之寃理不可奪合戚枕戈義許必報至於親戚爲戮骨肉相殘故道乖常憲記無定准求之法外裁以人情且禮有過失之宥律無讎祖之文况趙之縱暴本繇於酒論心即實事盡荒耄豈得以荒耄之王母等行路之深讎臣謂此孫忍愧䘖悲不違子義共天同域無虧孝道傅隆爲司徒左長史時㑹稽剡縣民黄初妻趙打息載妻王死已遇赦王有父母及息男稱息女葉依法徙趙二千里外隆議曰原夫禮律之典蓋本之自然永之情理非從天墮非從地出也父子至親分形同氣稱之於載即載之於趙雖云三世爲體猶一未有能分之者也稱雖創巨痛深固無讐祖之義若稱可殺趙當何以處載將父子孫祖互相殘戮懼非先王明罰各繇立法之本㫖也向使石厚之子日磾之孫砥鋒挺鍔不與二祖同戴天日則石碏秺侯何得流名百代以爲美談者哉舊令殺人父母徙之二千里外不施父子孫祖明矣趙當避王朞功千里外耳令亦云凡流徙者同籍親近欲相隨者隨之此又大通情體因親以教愛者也趙既流移載爲人子何得不從載而行稱不行豈名教所許如此稱趙竟不可分趙雖内愧終身稱沈痛沒齒孫祖之義自不得以永絶事理固然也從之徐羡之爲尚書僕射大司馬府軍人朱興妻周息男道扶年三歳先得癎疾周因其病發掘地生埋之爲道扶姑女所告正周棄市刑羡之議曰自然之愛虎狼猶仁周之㐫忍宜加顯戮臣以爲法律之外故尚𢎞物之理母之即刑繇子而致爲子之道焉有自容之地雖伏法者當罪而任宥者靡容愚謂可特申之遐裔從之顧顗之爲吏部尚書沛郡相縣唐賜往比村朱起母彭家飲酒還因病吐蟲蟲十餘枚臨死語妻張死後刳腹出病後張手自破視五臟悉縻碎郡縣以張忍行刳剖賜子副又不禁駐事起赦前法不能决律傷死人四歳刑妻傷夫五歳刑子不孝父母棄市並非科例三公郎劉勰議賜妻痛往遵言兒識謝及理考事原心非存忍割謂宜哀矜顗之議曰法移路尸猶爲不道况在妻子而忍行凡人所不行不宜曲通小情當以大理爲斷謂副爲不孝張同不道詔如顗之議何承天爲撫軍劉毅爲叅軍毅常出行而鄢陵縣史陳滿射鳥箭悞中直印雖不傷人處法棄市承天議曰獄貴情斷疑則從輕昔驚漢文帝乘輿馬者張釋之劾以犯蹕罪止罰金何者明其無心於驚馬也故不以乘輿之重加以異制今滿意在射鳥非有心於中人案律過悞傷人三歳刑况不傷乎微罰可也及爲謝誨南蠻長史時有尹嘉者家貧母熊自以身貼錢爲嘉償債坐不孝當死承天議曰彼府宣令普議尹嘉大辟事稱法吏葛滕籖母告子不孝欲殺者許之法云謂違犯教令敬恭有虧父母欲殺皆許之其所告唯取信於所求而許之謹尋事原心嘉母辭自求質錢爲子還債嘉雖虧犯教義而熊無請殺之辭熊求所以生之而今殺之非隨所求之謂始以不孝爲劾終於和賣結刑倚旁兩端母子俱罪滕籖法文爲非其條嘉所存者大理在難申但明教爰發矜其愚蔽夫明德愼罰文王所以恤下議獄緩死中孚所以垂化言情則母爲子隱語敬則禮所不及今捨乞宥之評依請殺之條責敬恭之節於饑寒之𨽻誠非罰疑從輕寜失有罪之謂也愚以爲降嘉之死普春澤之恩赦熊之愆以明子隱之宜則蒲亭雖陋可比德於盛明豚魚微物不獨遺於今化事未判値赦並免後爲殿中郎兼左丞呉興餘杭民薄道舉爲刼制同籍朞親補兵道舉從弟代公道生等並爲大功親非應在補讁之例法以代公等母存爲朞親則子宜隨母補兵承天議曰尋刼制同籍朞親補兵大功不在例婦人三從既嫁從夫夫死從子今道舉爲刼若其叔尚存制應補譴妻子營居固其宜也但爲刼之時叔父已沒代公道生並是從弟大功之親不合補譴今若以叔母爲朞親令代公隨母補兵既違大功不讁之制又失婦人三從之道繇於主者守朞親之文不辯男女之異逺嫌畏負以生疑懼非聖朝䘏刑之㫖謂代公等母子並宜見原王韶之爲黄門侍郎時東冶士朱道民禽三叛士依例放遣韶之啓曰尚書金部奏事如右斯誠簡妄一時權制懼非經國𢎞本之令典臣尋舊制以罪補士凡有十餘條雖同異不紊而輕重實殊至於詐列父母死誣㒺父母淫亂破義及刼此四條寔窮亂抵逆人理必盡雖復殊刑過制猶不足以塞莫大之罪既獲全首領大造已隆寜可復遂㧞徒𨽻緩帶當年自同編戸列齒齊民乎臣懼此制永行所虧實大方今聖化惟新崇本棄末一切之令宜加詳改愚謂此四條不合加贖罪之恩侍中褚淡之同韶之三條刼宜仍舊詔可何尚之爲尚書令時丞相南郡王義宣車騎將軍臧質反義宣司馬竺超民臧質長史陸展兄弟並應從誅尚之上言曰刑罰得失治亂所繇聖賢留心不可不愼竺超民爲義宣司馬賊既遁走一夫可禽非惟免愆亦可要不義之賞而超民曽無此意微足觀過知仁且爲官保全城府謹守庫藏端坐待縛今戮及兄弟同之巨逆於事爲重臣豫蒙顧待自殊凡𨽻茍有所懐不敢自默超民坐者繇此得原蔡興宗爲廷尉解士先告申坦昔與丞相義宣同謀坦已死子令孫時作山陽郡自繫廷尉興宗議曰若坦昔爲戎首身今尚存累經肆𤯝猶應蒙宥令孫天屬理相爲隱况人亡事遠追相誣訐斷以禮律義不合關若士先審知逆謀當時即應聞啓苞藏積年發因私怨况稱風聲路傳實無定主而干黷欺罔罪合極法又有訟民嚴道恩等二十二人事未洗正勑以當訊權繫尚方興宗以訟民本在求理故不加械即若廣繋尚方於事爲苦又司徒前劾送武康令謝沈及郡縣尉還職司十一人坐仲良鑄錢不禽久已判結又送郡主簿丘元敬等九人或下疾假或去職已久又加執啓事悉見從南齊張融爲儀曹郎時明帝取荆郢湘雍四州射手叛者斬人身及家長家口沒奚官元徽初郢州射手有叛者融建議家人家長罪所不及亡身刑謂亡者身受刑也袁彖爲南郡太守江陵縣人茍蔣之弟胡之婦爲曽口寺沙門所淫夜入茍家蔣之殺沙門爲官司所簡蔣之列家門穢行欲告則恥欲忍則不可寔已所殺胡之列又如此兄弟爭死江陵令宗躬啓州荆州刺史盧江王永博議彖曰夫迅寒急節乃見松筠之操危機廹遘是識貞孤之風竊以蔣之胡之原心非暴辯讞之日友于讓生事憐左右義哀行路昔文舉引謗獲漏疎網蔣之心迹同符古人若䧟以深刑寔傷爲善繇是蔣之兄弟免死梁蕭琛仕齊爲尚書左丞明帝用法嚴峻尚書郎坐杖罰者皆即科行琛乃宻啓曰郎有杖起自後漢爾時郎官位卑親主文案與令史不異故郎三十五人令史二十人是以古人多恥爲此職自魏晉已來郎官稍重今方叅用高華吏部又近於通貴不應官高昔品而罰遵曩科所以從來彈舉雖在空文而許以推遷或逢赦恩或入春令便得息停宋元嘉大明中經有被罰者别繇犯忤主心非關常凖自㤗始建元已來未經以施行事廢久人情未習自奉勑之後已行倉部郎江重欣杖督五十皆無不人懐慙懼兼有子弟成長彌復難爲儀適其應行罰可特賜輸贖使與令史有異以彰優緩之澤帝納之自是應受罰者依舊不行虞僧虬爲法官高祖天監三年八月建康女人任提女坐誘口當死其子景慈對鞫辭云母實行此僧虬稱案子之事親有隱無犯直躬證父仲尼爲非景慈素無防閑之道死有明白之據䧟親極刑傷和損俗凡乞鞫不審降罪一等豈得避五歳之刑忽死母之命景慈宜加罪辟詔流于交州陳沈洙廢帝光大中爲戎昭將軍衡陽王長史行府國事梁代舊律測囚之法旦上起自晡鼔盡于二更及比部郎范泉删定律令以舊制測立時久非人所堪分其尅數日再上廷尉以爲新制過輕請集八座丞郎并祭酒孔奐行事沈洙五舍人㑹尚書省詳議時宣帝錄尚書集衆議之都官尚書周𢎞正曰未知獄所測人有㡬人疑㡬人不欵湏前責取人名及數并其罪目然後更集得廷尉監沈仲繇列稱别制已後有夀羽兒一人坐殺夀慧劉磊渴等八人坐偷馬伏家口渡北依法測之限訖不欵劉道朔坐犯七叚偷依法測立首尾二日而欵陳法滿坐被封藏惡法受錢未及上而欵𢎞正議曰犯小大之獄必應以情正言依准五聽驗其虛實豈可令恣考掠以判刑罪且測人時節本非古制近代以來方有此法起自晡鼔迄于二更豈是常人所能堪忍所以重械之下免墮之士無人不服誣枉者多朝晩二時同等則數進退而求於事爲𠂻若謂小促前期致實罪不伏如復時節延長則無諐妄欵且人之所堪既有強弱人之立意固亦多途至如貫高榜笞刺爇身無完者戴就熏針並極困篤不移豈關時刻長短掠測優方夫與殺不辜寜失不經罪疑惟輕功疑惟重斯則古之聖王垂此明法愚謂依范著制於事爲允舍人盛權議曰比部范泉新制尚書周𢎞正明議咸爲允虞書惟輕之㫖殷頌敷正之言竊尋廷尉監沈仲繇等列新制以後凡有獄十一人其所測者十人欵者惟一愚謂染罪之囚獄官明加辨折窮考事理若罪有可疑自宜啓審分判幸無濫測若罪有實驗乃可啓審測立則枉直有分刑宥斯理范泉今牒述漢律云死罪及除名罪證明白考掠已至而抵隱不服者處當列上杜預注云處當證驗明白之狀列其抵隱之意竊尋舊制深峻百中不欵或一新制寛優十中不欵者九叅㑹兩文寛猛頗異處當列上未見釐革愚謂宜付典法更詳處列上之文洙議曰夜中測立緩急易欺兼用晝漏於事爲允但漏刻賒促今古不同漢書律厯何承天祖冲之祖晅父子漏經並自關鼓至下鼔自晡鼔至關鼔皆十三刻冬夏四時不異若其日有長短分在中時前後今用梁末改漏下鼓之後分其長短夏至之日各十七刻冬至之日各十二刻伏承命㫖刻同勒令簡一日之刻乃同而四時之門不等廷尉今牒以時刻短促致罪人不欵愚意願去夜測之昧從晝漏之明斟酌今古之日㑹二漏之義捨秋冬之少刻從夏日之長晷不問寒暑並依今之夏至朝夕上測各十七刻比之古漏則一上多昔四刻即用今漏冬至多五刻雖冬至之時數刻侵夜正是少日於事非疑庶罪人不以漏短而爲捍獄囚無在夜之致誣求之鄙意竊謂允合衆議以爲宜依范泉前制宣帝曰沈長史議得中宜更博議左丞宗元饒議曰竊尋沈議非頓異范正是欲使四時均其刻數兼斟酌其宜以㑹優劇即同牒請冩還删定曹詳改前制宣帝議依事施行後魏李冲爲尚書疑元㧞穆㤗罪事冲奏曰前彭城鎭將元㧞與穆㤗同逆養子降夀宜從㧞罪而太尉咸陽王禧等以爲律文養子而爲罪父及兄弟不知情者不坐謹審律意以養子於父非天性於兄弟非同氣敦薄既差故刑典有降是以養子雖爲罪而父兄不預然父兄爲罪養不知謀易地情均豈獨從戮乎理固不然臣以爲依據律文不追戮於所生則從坐於所養明矣又律唯言父不從子不言子不從父當是優尊厲卑之義臣禧等以爲律雖不正見互文起制於乞也舉父之罪於養也見子坐視爲互起兩明無罪必矣若以嫡繼養與生同則父子宜均祗明不坐且繼養之法云若有别制不同此律又今文云諸有封爵若無親子及其身卒雖有養繼國除不襲是爲有福不及也有罪便預坐均事等情律令之意便相矛楯伏度律㫖必不然也臣冲以爲指例尋條罪在無疑准令語情頗亦同式詔曰僕射之議據律明矣太尉等論於典矯也養所以從戮者緣其已免所生故不得復甄於所養此獨何福長處吞舟于國所以不襲者重列爵位特立制因天之所絶推而除之耳豈復報對刑賞于斯則應死可特原之郭祚爲吏部尚書宣武詔以姦吏逃刑懸配遠戍若永避不出兄弟代之祚奏曰愼獄審刑道煥先古垂憲設禁義纂惟今是以先王㳂物之情爲之軌法故八刑備於昔典姦律炳於來制皆所以謀其始迹訪厥成罪敦風厲俗永資世範者也伏惟㫖義博遠理絶近情既懐愚異不容不述誠以敗法之原起於姦吏姦吏雖微敗法實甚伏尋詔㫖信亦斷其逋逃之路爲治之要實在於斯然法貴止姦不在過酷立制施禁爲可傳之於後若法猛而姦不息禁過不可永傳將何以載之刑書垂之百代若以姧吏逃竄徙其兄弟罪人妻子應從之此則一人之罪禍傾二室愚謂罪人既逃止徙妻子走者之身懸名永配於責不免姦途自塞詔從之竇瑗行晉州刺史既還京師上表曰臣在平州之日䝉班麟趾新制即依朝命宣示所部士庶忻仰有若三章臣聞法象巍巍乃大舜之事政道郁郁亦隆周之軌故元首股肱可否相濟聲教之日於此爲證伏惟陛下應圗臨㝢握紀承天克搆洪基㑹昌寶厯式張琴瑟且調宫商去甚删㤗革弊遷訛俾高祖之德不墜於地畫一既歌萬國歡躍臣伏讀至三公曹第六十六條母殺其父子不得告告者死三反覆之未得其門何者案律文子孫告父母祖父母者死又漢宣云子匿大父母皆勿論蓋謂父母祖父母小者攘羊甚者殺害之類恩許相隱律抑不言法理如是足見其直未必指母殺父止子不言也若父殺母乃是夫殺妻母卑於父此子不告是也而母殺父不聽子告臣誠下愚輒以爲惑昔楚康王欲殺令尹子南其子棄疾爲王御士而王告焉對曰泄命重刑臣不爲也王遂殺子南其徒曰行乎曰吾與殺吾父行將焉入曰臣王乎曰殺父事讎吾不忍乃縊而死注云棄疾自謂不告父爲與殺謂王爲讎皆非禮春秋譏焉斯蓋門外之治以義斷恩知君殺父而子不告是也母之於父同在門内恩無可掩義無斷割知母將殺理應告父如其已殺宜聽告官今母殺父而子不告便是知母而不知父識以比野人義以近禽獸且母之於父作合移天既殺已之天復殺子之天二天頓毁豈容頓黙此母之罪義在不赦下手之日母忍即離仍以母道不告鄙臣所以致惑今聖化淳洽穆如韶夏食椹懐音梟獍猶變况承風禀教識善知惡之民哉脱下愚不移事在言外如或有之可臨時議罪何用豫制斯條用爲訓誡恐千載之下談者諠譁以明明大朝尊母卑父之論以臣管見實所不取如在淳風厚俗必欲行之且君父一也父者子之天被殺事重宜附之謀反大逆子得告之條父一而已致情可見切惟聖主有作明賢贊成光國寜民厥用惟大非下走頑蔽所能上測但受恩深重輒獻瞽言儻蒙收察乞付評議詔付尚書三公郎封君義立判云身體髮膚受之父母生我勞悴續莫大焉子於父母同氣異息終天靡報在情一也今忽欲論其尊卑辨其優劣推心未忍訪古無據母殺其父子復告母母繇告死便是子殺天下未有無母之國不知此子將欲何之案春秋莊公元年不稱即位文姜出故服䖍注云文姜通兄齊襄與殺公而不反父殺母出隱痛諱深朞而中練思慕少殺念至於母故經書三月夫人遜於齊既有念母深諱之文明無讐疾告列之理且聖人設法所以防滛禁暴極言善惡使知而避之若避事議刑則䧟罪多矣惡之甚者殺父害君著之律令百王㒺革此制何嫌獨求削去既於法無違於事非害宣布有年謂不宜改瑗復難云尋局判云子於父母同氣異息終天靡報在情一也今論其尊卑辨其優劣推心未忍訪古無據瑗以爲易曰天尊地卑乾坤定矣又曰乾天也故稱於父坤地也故稱於母又乾爲天爲父坤爲地爲母禮䘮服經曰爲父斬衰三年爲母齊衰朞尊卑優劣顯在典章何言訪古無據局判云母殺其父子復告母母繇告死便是子殺天下未有無母之國不知此子將欲何之瑗察典律未聞母殺其父而子有隠母之義既不告母便是與殺父同天下可有無父之國此子獨得有所之乎局判又云案春秋莊公元年不稱即位文姜出故服䖍注云文姜通於兄齊襄與殺而不反父殺母出隱痛諱深朞而中練思慕少殺念至於母故經書三月夫人遜於齊既有念母深諱之文明無讎疾告列之理瑗尋注義隱痛深諱者以父爲齊所殺而母與之隱痛父死深諱母出故不稱即位非爲諱母與殺也是以下文以義絶其罪不爲與殺明矣公羊傳曰君殺子不言即位隱之也朞而中練父憂少衰始念於母略書夫人遜於齊是内諱出奔猶爲罪文傳曰不稱姜氏絶不爲親禮也注云夫人有與殺桓之罪絶不爲親得尊父之義善莊公思大義絶有罪故曰禮也以大義絶有罪得禮之𠂻明有仇疾告列之理但春秋莊公之際齊爲大國通于文姜魯公謫之文姜以告齊襄使公子彭生殺之魯既弱小而懼於齊是時天下又無賢霸故不敢仇之又不敢告列國唯得告于齊曰無所歸咎惡於諸侯請以公子彭生除之齊人殺公子彭生案即此斷雖有援引即以情推理尚未遣事遂停寢邢巒爲尚書延昌二年符璽郎中高賢弟員外散騎侍郎仲賢叔司徒府主簿陸珍等坐弟季賢同元偷逆除名爲民㑹赦之後被㫖勿論巒奏案季賢既受逆官爲其傳檄規扇幽瀛遘兹禍亂據律准犯罪當孥戮兄叔從坐法有明典頼蒙大宥身命獲全除名還民於其爲幸然反逆坐重故支屬相及體既相及事同一科豈有赦前皆從流斬之罪赦後獨除反者之身又緣坐之罪不得以職除流且貨賕小愆冦盗微戾賊承露驗者㑹赦猶除其名何有罪極裂冠釁均毁冕父子齊刑兄弟共罰赦前則同斬從流赦後有復官之理依律則罪合孥戮准赦則例皆除名古人議無將之罪者毁其室洿其宫絶其蹤滅其類其宅猶棄而况人乎請依律處除爲民詔曰死者既在赦前又員外非在正待之限便可悉聽復任又廷尉奏平北將軍朔州刺史楊椿前爲太僕卿日招引細人盗種收田三百四十頃依律處刑五歳巒據正始别格奏椿罪應除名爲庶人注籍盗門同籍合門不仕宣武以新律既班不宜雜用舊制詔依寺聽斷以贖李平爲尚書延昌三年平奏冀州袁城民費羊皮母亡家貧無以葬賣七歳女先與同城人張廻爲婢廻轉於鄃縣梁定之不良狀案盗律掠人掠賣人和賣人爲奴婢者死廻故買羊皮女謀以轉賣依律處絞刑詔曰律稱和賣人者謂兩人詐取他財今羊皮賣女造廻稱良廻利賤知良公買誠於律俱乖而兩各非詐此女雖父賣爲婢體本是良廻轉賣之日應有遲疑而决從眞賣於情不可更推例以爲永式廷尉少卿楊均議曰謹詳盗律掠人賣人爲奴婢者皆死别條賣子孫者一歳刑賣良是一而刑死懸殊者繇緣情制罰則致罪有差又詳羣盗強盗首從皆同和掠之罪固應不異及知人掠盗之物而故買者以隨從論然五服相賣皆有明條買者之罪不得過於賣者之咎也但羊皮賣女爲婢不言追贖張廻眞買謂同家財至於轉鬻之日不復疑慮緣其買之於女父便賣之於他人准其和掠此有因緣之類也又詳恐喝條注尊長與之已决恐喝幼賤求之然恐喝體同而不受恐喝之罪者以尊長與之已决故也而張廻本買婢於羊皮乃眞賣於定之准此條例得先有繇推之因緣理頗相類即狀准條䖍流爲允公郎中崔鴻議曰案律賣子有一歳刑買五服因親屬在尊長者死朞親及妾與子婦流唯買者無罪文然賣者既以有罪買者不得不坐但賣者以天性難奪支屬易遺尊卑不同故罪有異者知良故買又於彼無親若罪同賣者即理不可何者賣五服内親屬在尊長者死此亦非掠從其眞買暨於致罪刑死大殊明知買者之坐自應一例不得全如均議云買者之罪不過賣者之咎也且買者於彼無天性支屬之義何故得有差等之理又案别條知人掠盗之物而故買者以隨從論依此律文之人掠良從其罪宜止於流然其親屬相賣坐殊凡掠至於買者亦宜不等若處同流坐於法爲深准律斟降合刑五歳至如買者知是良人决遣眞賣不語前人得之繇緒前人謂眞奴婢更或轉賣因此流漂罔知所在家人追贖求訪無處永沈賤𨽻無復良期案其罪狀與掠無異且法嚴而姦易息政寛而民多犯水火之喻先典明文而謂買人親屬而復决賣不告前人良狀繇緒處同掠罪太保高陽王雍議曰州處張廻專引盗律檢廻所犯本非和掠保證明然去盗遠矣今引以盗律之條處以和掠之罪原情究律實爲乖當如臣均之議知買掠良人者本無罪文何以言之羣盗強盗無罪從皆同和掠之罪故應不異明此自無正條引類以結罪臣鴻以轉賣流漂罪與掠等可謂罪人斯得案賊律云謀殺人而發覺者流從者五歳刑已傷及殺而還蘇者死從者流已死者斬從而加功者死不加功者流詳沉賤之與身死漂流之與腐骨一存一亡爲害孰甚然賊律殺人者有首從之科盗之賣買無唱和差等謀殺之與和掠同是良人應爲准例所以不引殺人减之降從強盗之一科縱令謀殺之與強盗俱得爲例而以從輕其義安在又云知人良掠盗之物而故買者以隨從論此明禁暴掠之原遏姦盗之本非謂市之於親尊之手而同之於盗掠之刑竊謂五服相賣俱是良人所以容有差等之罪者相去掠盗理遠故從親疏爲差級尊卑爲輕重依律諸共犯罪皆以發意爲首明賣買之元有繇魁末之坐宜定若羊皮不云賣則廻無買心則羊皮爲元首張廻爲從坐首有活刑之科從有極黜之戾推之憲律法刑無據買者之罪宜各從賣者之坐又羣臣鴻之議有從他親屬買得良人而復眞賣不語後人申狀者處同掠罪既一爲婢賣與不賣俱非良人何必以不賣而可原轉賣爲難恕張廻之愆宜鞭一百賣子𦵏親孝誠可美而表賞之議未聞刑罰之科已降恐非敦風厲俗以徳導民之謂請免羊皮之罪公酬賣直詔曰羊皮賣女𦵏母孝誠可嘉便可特原張廻雖買之於父不應轉賣可刑五歳裴延儁爲廷尉卿孝明熈平中有冀州妖賊延陵王買負罪逃亡赦書斷限之後不自歸首延儁上言法律例諸逃亡赦書斷限之後不自歸首者復罪如初依律賊謀叛大逆處買梟首其延陵法權等所謂月光童子劉景暉者妖言惑衆事在赦後亦合死坐正崔纂以爲景暉云能變爲蛇雉此乃傍人之言雖殺暉爲無理恐赦暉復惑衆是以依違不敢專執當今不諱之朝不應行無罪之戮景暉九歳小兒口尚乳臭舉動云爲並不關已月光之稱不出其口皆姦吏無端横生粉墨所謂爲之者巧殺之者能若以妖言惑衆據律應死然赦令之後方顯其事律令之外更求其罪赦律何以取信於天下天下焉得不疑於赦律乎書曰與殺無辜寜失有罪又案法例律八十已上八歳已下殺傷論坐者上請議者謂悼耄之罪不用此律愚以老智如尚父少惠如甘羅此非常之士可如其議景暉愚小自依凡律靈太后令曰景暉既經恩宥何得議加横罪如奏李瑒爲司徒主簿時司州表河東郡民李憐坐行毒藥案以死坐其母訴稱一身年老更無期親例合上請檢籍不謬未及判申憐母身衰州斷三年服終後乃行决司徒法曹叅軍許琰謂州判爲允瑒駮曰案法例律諸犯死罪若祖父母父母年七十已上無成人子孫旁無朞親者具狀上請流者鞭笞留養其親終則從流不在原赦之例檢上請之言非應府州所决殺人者斬妻子流計其所犯實重餘憲准之情律所虧不淺且憐既懐酖毒之心謂不可叅憐人伍計其母在猶宜闔門投畀况今死也引以三年之禮乎且給假殯葬足示仁寛今以卒哭不合更延依律處斬流其妻子實足誡彼氓庶肅是刑章尚書蕭寶寅奏從瑒執詔從之辛雄爲尚書三公郎神龜中廷尉少卿袁飜以犯罪之人經恩競訴枉直難明遂奏曽染風聞者不問曲直推爲獄成悉不斷理詔令門下尚書廷尉議之雄議曰春秋之義不幸而失寜僭不濫僭則失罪人濫乃害善人今議者不忍罪姦吏使出入縱情令君子小人薫蕕不别豈所謂賞善罰惡慇懃隱䘏者也仰尋周公不減流言之愆俯惟釋之不加驚馬之辟所以大小用情貴在得所失之千里差在毫釐雄久執案牘數見疑訟職掌三千願言者一曰御史所糾有注其逃走者及其出訴或爲公使本曹給過所有指不如推簡文案灼然者雪之二曰御史赦前注獲見贓不辯行主名簡無賂以置直之主宜應洗復三曰經拷不引傍無三證比以獄案既成因即除削或有據今奏復者與奪不同未獲爲通例又湏定何如得爲證人若必湏三人對見受財然後成證則於理太寛若傳聞即爲証則於理太急今請以三賕後三人俱見物及証伏顯著准以爲驗四曰赦前斷事或引律乖錯使除復失𠂻雖案成經赦宜追從律五曰經赦除名之後或邀駕訴枉被㫖重究或訴省稱寃爲奏更簡事付有司未被研判遂遇恩宥如此之徒謂不得異於常格依前案爲定若有合拷究已復之流請不追奪六曰或受辭下簡反復使鞫獄証占分明理合清雪未及告案忽逢恩赦若從証占而雪則違正格如除其名罪濫潔士以罪湏案成雪以占定若拷未畢格及要証一人不集不得爲占定古人雖患察獄不精未聞知寃而不理今之所陳寔士師之深疑朝夕之急務願垂察焉詔從雄議高謙之爲廷尉丞正光中尚書左丞元孚慰勞蠕蠕返被拘留及蠕蠕大掠而還置孚歸國事下廷尉卿及監以下謂孚無坐唯謙之以孚辱命以流罪尚書同卿執詔可謙之奏崔纂爲尚書三公郎中神龜中蘭陵公主駙馬都尉劉輝坐與河隂縣民張智夀妹容妃陳慶和妹慧猛姦亂躭惑毆主傷胎輝懼罪迯亡門下處奏各入死刑智夀慶和並以知情不加防限處以流坐詔曰容妃慧猛恕死髠鞭付宫餘如奏纂執曰伏見㫖募若獲劉輝者職人賞二階白民聽出身進一階厮役奴婢爲良案輝無叛逆之罪賞司返入劉宣明之格又尋門下處案以容妃慧猛與輝私姦兩情躭惑今輝挾忿毆主傷胎雖無正條罪合極法並處入死其智夀等二家配燉煌爲兵天慈廣被不即依决雖恕其命竊謂未可失律令高皇帝所以治天下不爲喜怒増减不繇親疎改易案鬭律祖父母父母忿怒以兵刃殺子孫者五歳刑毆殺者四歳刑若心有愛憎而故殺者各加一等雖王姬下䧏貴殊常妻然人婦之孕不得非子又依永平四年先朝舊格諸刑流及死皆首罪判定後决從者事必因本以求支獄若以輝逃避便應懸處未有捨其首罪而成其末愆流死叅差或時未允門下中禁大臣職在敷奏昔邴吉爲相不存鬭斃而問牛喘豈不以司别故也案容妃等罪止於姧私若擒之穢席衆証分明即律科處不越刑坐何得同宫掖之罪齊奚官之役案知夀口訴妹適司士叅軍羅顯貴已生二女於其夫則他家之母若有失度罪在於夫舋非兄弟昔魏晉未除五族之刑有免子戮母之坐何曽諍之謂在室之女從父母之刑已醮之婦從夫家之戮斯乃不刋之令軌古今之通議律朞親相隱指謂凡罪况姧私之醜得以同氣相証論刑過其所犯語情又乖律憲案律罪無相緣之坐不可借輝之忿加兄弟之刑夫刑人於市與衆棄之爵人於朝與衆共之明不私於天下無欺於耳目何得以正刑書施於四海刑名一失駟馬不追既有詔㫖依即行下非律之案理宜更請尚書元脩議以爲昔哀姜悖禮於魯齊侯取而殺之春秋所譏又夏姬罪盗於陳國但責徴舒而不非父母明婦人外成犯法之愆無關本屬况出適之妹舋及兄弟乎右僕射游肇奏言臣等謬参樞轄獻替是司門下出納謨明常則至於良奸犯法職有司存劾罪結案本非其事容妃等姦狀罪至於刑並處極法准律未當出適之女坐及其兄推據典憲理寔爲猛又輝雖逃刑罪非孥戮募同大逆亦謂加重乖律之案理宜陳情乞付有司重更詳議詔曰輝悖法亂理罪不可縱厚賞懸募必望擒獲容妃慧猛與輝私亂因此躭惑致至非常此而不誅將何懲肅且已醮之女不應坐及昆弟但智夀慶和知妹姦情初不防禁招引劉輝共成淫醜敗風穢俗理深其罰特勑門下結獄不拘常司豈得一同常例不爲通准且古有詔獄寜復一歸大理而尚書治本納言所屬弗究悖理之淺深不詳損化之多少違彼義途茍存執憲殊乖任寄深合罪責崔纂可免印都官尚書悉奪祿一時孫騰爲侍中自孝昌以後天下淆亂法令不常或寛或猛及爾朱擅權輕重肆意在官者多以深酷爲能至遷京鄴畿羣盗頗起有司奏立嚴制諸強盗殺人者首從皆斬妻子同籍配爲樂户其不殺人及贓不滿五疋魁首斬從者死妻子亦爲樂戸小盗贓滿十疋已上魁首死妻子配驛從者流騰上言謹詳法若畫一理尚不二不可喜怒繇情而致輕重案肆公私刼盗罪止流刑而比執事若違好爲穿鑿律令之外更立餘條通相糾之路班捉獲之賞斯乃刑書徒設獄訟更煩法令滋章盗賊多有非所謂不嚴而治遵守典故者矣臣以爲昇平之美義在省刑陵遲之弊必繇峻法是以漢約三章天下歸徳秦酷五刑率土瓦解禮訓君子律禁小人舉罪定名國有常辟至如𤯝災肆赦怙終賊刑經典垂言國朝成範隨時所用各有司存巨細滋煩令民預僃恐防之彌堅攻之彌甚請諸犯盗之人悉准律令以明常憲庶使刑殺折𠂻不得棄本從末詔從之天平後遷移草創百司多不奉法貨賄公行興和初齊文襄入輔朝政以公平肅物大改其風至孝静武定中法令嚴明四海知治矣冊府元龜卷六百十五
