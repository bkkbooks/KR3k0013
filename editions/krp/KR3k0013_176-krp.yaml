body:
  text: 册府元龜卷一百七十六宋王欽若等撰帝王部姑息王者握圖御厯統制寰區必在賞慶刑威彰善癉惡恢髙明之道以馭羣下體剛健之德以制多方若乃運屬艱難數當百六干紀者投彼天隟竊柄者撓乎國經上失其權下無其輔姑息之道繇是用焉其或廟堂有䟦扈之臣藩翰有驕蹇之將或奉欵來附内持於兩端或憑衆竊立坐邀乎九命或跨據河山之固包於禍心或僥倖雲雷之屯圖其非望繇是申招㩦之意懲黷武之禍加之爵秩厚其恩賚此固不得已而用之者焉後漢靈帝光和中賊帥恒山人張燕輕勇趫㨗故軍中號曰飛燕善得士卒心乃與中山趙郡上黨河内諸山谷冦賊更相交通衆至百萬號曰黒山賊河北諸郡縣竝被其害朝廷不能討燕乃遣使京師奏書乞降遂拜燕平難中郎將領河北諸山谷事嵗得舉孝廉計吏獻帝初平四年袁紹與公孫瓚交惡天子使太傅馬日磾太僕趙岐和解關東岐别詣河北紹出迎於百里外拜奏帝命岐往紹營移書告瓚瓚遣使具與紹書曰趙太僕以周召之德銜命來征宣揚朝恩示以和睦曠若開雲見日何喜如之昔賈復冦恂亦争士卒欲相危害遇光武之寛親俱陛見同輿共出時人以為榮自省邊鄙得與將軍共同此福此誠將軍之眷而瓚之幸也紹於是引軍南還帝以紹為太尉轉為大將軍封鄴侯紹讓侯不受建安初馬騰為征西將軍與鎮西將軍韓遂始甚相親後以部曲相侵連兵不觧時國家紀綱始弛乃使司𨽻校尉鍾繇涼州牧韋端和解之魏明帝太和二年十二月遼東太守公孫恭兄子淵刼奪恭位遂以淵領遼東太守唐𤣥宗先天元年御史中丞兼左羽林將軍張暐左臺殿中侍御史鄧光賔竝放于嶺表先是太平公主之引崔湜蕭至忠也幽求等恐其為變每有奏請為太平所嫉𤣥宗不獲已奏之故有此放肅宗元年建夘月河東節度鄧景山為部下所殺帝聞以景山統御失所恐因此以為亂不復究騐其罪遣使慰喻之軍中因請以都知兵馬使代州刺史辛雲京為節度使從之代宗寳應元年五月壬寅以檢校户部尚書安州刺史充淮西等十州節度使來瑱他見反復為襄州刺史充山南東道兼陳蔡淮西等十州節度觀察等使初淮西節度王仲昇兵敗䧟入賊詔瑱代仲昇為淮西節度兼督許蔡等十州以瑱為行軍司馬兼御史中丞裴茂為襄州刺史瑱以淮西邇賊日尋干戈逗留不進茂宻表以聞瑱又陳奏朝廷務姑息仍復以瑱依舊為襄州刺史山南東道節度等使仍兼安州刺史淮西節度茂初以行軍司馬鎮于穀城即表瑱不奉詔懼瑱阻兵來拒乃率麾下精銳赴州襲瑱為所敗詔罪茂二年閏正月癸亥宥史朝義降將薛嵩田承嗣李懐仙等竝以賊之所署偽刺史奬以朝命也嵩為檢校刑部尚書相州刺史相衛等州節度使承嗣為檢校户部尚書魏州刺史魏博節度防禦使李懐仙為檢校侍中兼幽州大督都府長史范陽節度使廣德二年三月許河北四節度使立碑紀其誠節初王師討平河朔州縣風靡向化相州薛嵩魏州田承嗣鎮州張忠志幽州李懐仙皆為賊守聞詔書一切不問趨僕固懐恩馬首乞行間自効懐恩包藏貳心乃表請以偽署官秩任之嵩等遂分鎮河北一道各擁精兵數萬帝姑務安人含𢎞之實懐恩啟之也是月襄州兵馬使梁崇義殺本州大將薛南陽併其衆矯狀以聞朝廷以襄州薦履兵禍屈法含容乃授崇義為襄州刺史山南東道節度留後姑務息人也永泰元年七月以鄭王邈為開府儀同三司充平盧淄青節度度支營田等大使先是平盧淄青節度使史希逸為副將李懐玉所逐希逸奔于滑州上疏請罪特詔赦希逸罪乃以鄭王邈為大使令懐玉權知留後姑務息人也二年正月同華節度使周智光以專殺鄜坊節度使杜冕家屬懼罪召不赴命朝廷外示優容俾杜冕使于梁州實避讐也大厯三年七月瀘州刺史楊子琳竊所部兵叛冦成都府遂據其城以討崔寜為名劎南節度留後寜之弟寛攻破之子琳潰走子琳蜀人初為瀘南賊帥人甚惡之後有詔撫子琳束身歸罪劎南節度使驅使屯守瀘州時崔寧為西川兵馬使專殺節度使郭英乂成都兵亂子琳率麾下士乃募山洞羣盜表請討寜寜甚憚慄州縣官吏以其奉順多有應者寜與弟寛分将精卒各數萬為之備亦以表聞帝恐平人罹其害子琳及寧二表俱不報遣宰臣杜鴻漸出鎮成都宣恩招慰鴻漸懼寧兵强不敢同異時子琳與卭州兵馬使柏貞節犄角相應誓以靖難為事鴻漸姑務事寜乃表讓劒南節度與寧奏貞節為卬州刺史子琳為瀘州刺史和解之寜既受命隨鴻漸入覲留弟寛守成都子琳聞寧出乗間以精騎數千突入成都及子琳兵潰収合餘燼㳂江而下朝廷聞之慮為亂階特詔荆南節度安撫之五年夏以殿中監王昻為江陵尹御史大夫充荆南節度時荆南節度觀察使衛伯玉以内憂去職故命昻代之昻既行伯玉諷荆南大將楊銶等拒昻乞留伯玉優詔許之六年四月澧州刺史兼御史中丞楊子琳至自澧州赴詔也初子琳自成都喪敗退守瀘州増修軍政招延亡命之士累月後成數千人乃具舟㳂江而揚言歸朝渝州忠州萬州皆震懾備餼牢申犒軍士涪州有黄牛峽峽路之隘者守捉王守仙伏兵五百人於此子琳前驅悉擒之以獻至忠州盡殺之唯守仙獲免子琳遂入䕫州殺别駕張忠而以成守遣使詣闕請罪帝務安人又以子琳本謀近忠姑容之乃以為峽州刺史子琳益不自安又移授澧州刺史澧朗兩州鎮遏使在灃州二年至是表乞朝謁帝特容之及至引見于延英殿與語甚悦賜名猷七年詔授幽州權知留後朱泚檢校左散騎常侍兼御史中丞幽州盧龍軍節度留後泚初𨽻幽州李懐仙為十將改經畧副使朱希寀殺李懐仙自為節度以泚宗姓甚委信之希寀為政苛酷人不堪命竟為孔目官李瑗所殺倉卒之際未有所從泚營在城北弟㴞主衙内兵亦得衆心㴞變詐多端潛使百餘人於衆中大言曰節度使非城北朱泚莫可衆既無從因共推泚泚遂權知留後遣使奉表京師遂有是命十一年正月魏博田承嗣乞束身歸朝時淄青節度李正己上表乞許承嗣自新承嗣乃上表帝以久勞師旅姑務息人乃下詔曰臣子之義違而必懲春秋之辭服而後捨故武威以制其不恪文德以懐其自新田承嗣悮惑奸邪輙干紀律朝有彛憲當奉典刑猶示含容薄令降黜兾其遷悔全彼平人不赴所貶之官再任造端之將遲廻師旅綿引旬時朕猶憫脅從悮兹併命其人何罪顧悼増懐深思改過之期以救無辜之禍而承嗣果能尅責頻獻誠辭泥首束身請歸庭闕輸心瀝懇備在封章而正已地邇藩陲具昭誠欵遂屡有陳奏達其深衷故宜宥以悔非之誠全其改往之志翻然効順頗用嘉之即宜與子姪家口等同赴上都當待以殊恩永守終吉豈不美歟其魏博所管官吏將士僧道耆夀百姓等初因迫脅曽受驅馳或久抗官軍辭不獲已或徴科郡邑出入門庭皆懼於不全盖素非元惡既徃之咎竝與維新一無所問或先在昭義軍管内諸州者竝宜却還本貫各安舊業其昭義所管官吏將士截耳軍健身及家口先在魏博等州妄有驅廹各被質留原其初心本非巨惡既因詿誤先合蠲除仰即歸本州亦一切莫問各守所務無相奪倫王典無私信存賞罰脅從㒺理前聖嘉謨歸命者必全知過者必宥今既納承嗣之懇請亦已虛懐捨脅從之前非悉命原免如其譎詭時日猶事逗留國有常刑法難屢屈過期不至獲罪如初其諸道兵馬即冝同力協心大軍尅期不可追悔轉禍為福唯在此時至于再三非不深切想及官吏將士已下奉而行之知朕懐也承嗣竟逗留不赴朝十二年三月庚午有左降官永州刺史田承嗣復舊官爵詔曰昔在虞舜舞干羽于兩階而苖人服洎漢髙嘗遣陸賈宣赦南越光武亦下璽書招附竇融然則太上以德撫人其次因時制宜其或有阻兵便地未從紀律將畏刑以紓禍俟文誥而斯懐則明恕之道宥過為大其來久矣永州刺史前魏博等七州節度觀察處置管内度支營田等使開府儀同三司太尉檢校尚書左僕射同中書門下平章事兼魏州大都督府長史上柱國鴈門郡王食實封一千户田承嗣頃因封壤之外或収郡邑是以下尺一之詔徵縣道之師貶刺零陵式彰典憲而國家十連將帥千里旌旗車騎繦屬於山河樓船鏁結於淮海而承嗣轅門宿將方面舊臣授鉞持衡素經委遇乃繕甲脩備越河應敵然未離魏郡嬰壘自固頻遣章奏申聞欵誠􅈤祈革心永用遷善又聞聚族興歎嘗思更新廢食遺寢沉憂成疾夫為君上者承天子人兼宥廣覆一夫不獲則曰時予之辜今河南河北之人皆朕之人也豈可不念隱恤求逞其心令其父兄乗城子弟攻取矢石之下骨肉相殘邑里之間敵讐交斃而又兵連禍結廪餼取資暴賦急征井閭殫竭男釋耒耜女廢蠶桑流離凍餒擠于溝壑而欲勞師黷武必舉彛章終夕惟慮誠所未忍且使蒼生罹此塗炭皆繇朕司牧無方非朕不德誰之過也今將投膳撤懸内省歸咎以寛承嗣冝竝復承嗣本官爵仍委在彼勾當軍州事不須入朝弟庭琳及子姪等凡所連坐貶降者一切什放竝還本官仍各依舊職掌驅使其魏博相衛等管内諸州各判官兵馬使以下及州縣將吏百姓及汴宋過河将袁奉珪祝舜并將士等竝從原宥一無所問於戯以欲從人必求諸道澤渚時禁仁有被於泉流麛卵不傷德可懐於鳥獸今則偃戈務全兆庶以兹明誠上答天睠公卿百辟悉朕意焉又詔曰播州帶水縣百姓田悦等王者之於典刑也舉違是放聞義則歸雖審而有常亦宥而不過况本於黜免各從親累今與之更始宜復官常當思遷善之規載勤事上之命田悦可依舊魏博節度中軍兵馬使銀青光禄大夫檢校右散騎常侍兼魏州大都督府左司馬御史中丞潮州程鄉縣尉田綰可依舊檢校尚書駕部郎中兼御史中丞栁州義章縣尉田渚可依舊試京兆府参軍萬州南浦縣尉田淪可依舊試大理評事四月命給事中杜亞使于魏州宣慰田承嗣賜承嗣鐡劵十二月以淄青節度使李正己之子前淄州刺史納為青州刺史仍賜實封五千户十三年正月淄青節度使李正己請附入屬籍帝從之三月命諫議大夫蔣鎮使於魏州宣慰以田承嗣有弟喪故也十四年二月癸未魏博七州節度使檢校尚書左僕射同中書門下平章事田承嗣卒甲申以前魏博節度中軍兵馬使檢校右散騎常侍兼魏州大都督府左司馬御史中丞田悦依前本官兼御史中丞充魏博節度觀察等使留後悦承嗣姪也承嗣軍務親兵多委其統制及承嗣死悦即代領其衆朝廷因授焉四月成德軍節度太子太傅檢校尚書左僕射兼御史大夫檢校同司空中書門下平章事清河郡王張寳臣依舊賜姓李復封隴西郡王寳臣奚之種裔本姓張名忠志以武勇再䧟逆賊偽職寶應元年河朔平僕固懐恩舉為將帥鎮嘗州帝方綏懐四海乃加缺恩寵特賜宗姓列屬籍前年抗表請歸本姓帝從之及是心不遑安又抗表乞從賜姓帝又許之廣恩也德宗建中二年正月成德軍節度使李寳臣卒子惟岳匿父喪以求襲位帝難之乃遣給事中班寵問疾且諭惟岳四月加山南東道節度使梁崇義平章事初崇義不朝兇謀日甚賔僚或有忠言沮勸多遭傷害時羣兇方日疑阻朝廷將推仗大信欲來而安之以示天下故加崇義同平章事其妻子悉加封賞且賜鐡劵誓之淮西節度使李希烈數請興師討崇義崇義懼軍旅之事加嚴焉流人郭昔告其變崇義聞之請罪昔坐決杖配流命金部員外郎李舟諭㫖以安之三年四月戊寅以中書侍郎平章事張鎰為鳳翔尹隴右節度觀察兼度支營田等使以待朱泚初泚弟㴞叛於幽州故罷泚兵柄加泚實封五百户一子五品官又賜竇氏名園涇水上腴田并重錦五綵帛金銀器甚厚以安其意興元元年正月帝罪已大赦反側王武俊集三軍削偽號先是武俊僭稱趙王以鎮州為真定府偽命官秩㑹大赦遂削號帝詔國子祭酒兼御史大夫董晉中使王進傑自行在往鎮州宣命授武俊檢校兵部尚書成德軍節度使尋加司空同平章事兼幽州盧龍兩道節度使又魏博田承嗣子緒殺田恱朝廷因授緒魏博節度時朱㴞率兵兼引回鶻之衆南侵緒遣兵助王武俊李抱真等大破㴞衆以加功檢校工部尚書貞元元年以嘉誠公主下降加緒駙馬都尉尋遷檢校右僕射賜實封五百户是嵗加同平章事及卒廢朝三日贈司空賻物有差又易定節度使張孝忠使衙前將程日華使滄州州兵殺其刺史李固烈而推日華為刺史日華遣使間道聞於梁州因拜横海軍節度但令嵗以滄州稅錢十二萬貫資孝忠軍焉二月甲子加朔方邠寜節度度支營田觀察六城水運押諸蕃部落鹽池兼河中晉絳磁隰等州節度觀察等使充朔方邠寧同華陕虢河中晉絳磁隰等州及管内諸軍行營兵馬副元帥開府儀同三司行中書令兼靈州大都督單于鎮北大都䕶河中尹上柱國連城郡王李光懐太尉加賞封至二千户仍賜鐡劵赦三死十月劉怦為幽州長史兼御史大夫盧龍軍節度副大使知節度事初怦為涿州刺史朱滔每有征伐必令怦幽州留後時朱滔死怦素為衆所服因有其兵地貞元元年九月范陽節度劉怦卒其州軍人習河朔舊事請其子行軍司馬濟代父為帥朝廷姑務便安因而從之累加檢校兵部尚書二年三月詔授淮西李希烈禆將吳少誠申光蔡等州節度觀察兵馬留後初希烈叛少誠頗為其用希烈死少誠等初推陳仙竒統戎事朝廷已命之仙竒尋被少誠等謀殺衆共推少誠朝廷遂有是命尋正除節度等使三年七月宣武軍兵馬使劉昌率其衆自坊州赴靈臺既次三原遂縱掠一夕方定淮西散兵百餘人𨽻於昌及是昌歸罪於淮西兵盡殺之尋以昌為本軍京西行營節度使初昌衆憚戍靈臺剽三原後各欲散歸昌招撫之乃定因加昌以董之改戍麟逰四年福建觀察使吳詵為叛卒所逐詵奔建州初詵從職守於汧隴嘗以猛毅自許及領福建頗輕忿越兵薄其糧賜苦其役使而不恤也衆卒咸叛數讓詵而逐之且請于詵牒用大將郝誠溢掌留後而殺詵之腹心將薛大清十餘人等而聽命於誠溢秋毫無所犯乃抗表請罪焉帝命中使就赦而安之五年十月詔曰法令者國之典章藩岳者朕之屏翰封域既列疆里有經必守信誠用永終始干紀難虧於常憲念功宜貸於新恩酌於厥中是有兹命義武節度易定觀察等使檢校司空平章事張孝忠受委旌鉞作鎮方夏頃興士旅擅入邉城朝命既臨不逺而復有過能改此誠可嘉是卑左揆之授俾參論道之職懋昭來効勿替舊勲可檢校尚書左僕射同平章事如故於戯君人執信臣人執忠忠信允叶邦家乃乂朕奉祖宗之法期於慎守託王公之上務以存誠畫野分圻皆有定制踰憲章則彼此交惡保封疆則烝庶獲安偃甲息人所存者大咨爾方岳𢎞宣永為各守爾典欽承王度勲賢列辟宜體至懐初孝忠以兵襲蔚州驅掠人畜帝連詔責之踰旬方還所部繇是降其詔焉八年四月庚寅以前汴州長史李士寜起復左金吾大將軍同正兼汴州刺史御史大夫宣武軍節度觀察使士寧故宣武節度𤣥佐子也初𤣥佐薨諸將校列狀脅監軍上奏請士寜為節度使且曰朝廷或不從忍令數萬之兵東向以求生也盖指李納以邀命帝乃召宰相入議竇參先與吳湊不相得且曰若不許懼合於李納則汴鄆非朝廷有也因請授士寧節度使帝從之故有是命一云𤣥佐歿士寜纔十七八謀於父之親吏諷三軍請繼父任時德宗厭兵不復討問遂授以鉞麾既而日恣以荒暴誅戮無不怨苦都虞候李萬榮因其獵於近郊閉州門以拒之士寜馳歸闕下德宗撫之頗厚既不加責仍授以右衛将軍僅二十年累歴班序人皆目為幸人九年四月削海州刺史本州團練使張昇璘官仍令昇璘兄昇雲示衆決杖昇雲為定州刺史昇璘娶淄青李納女用事於納以父喪大祥歸定州嘗於公座慢罵成德軍節度使王武俊武俊大怒以事聞詔中使詣定州臨決遇昇璘於太原杖而囚於别所武俊素以定州殷冨同壤嘗欲攻奪因是遣深州出兵襲取義封又出兵驅掠安喜無極萬餘口徙於德埭悉取其粟帛牛畜昇雲嬰城自固累遣使謝過於武俊方止十一年九月横海軍大将程懐信逐其節度使程懐直歸京師懐信遂領軍士尋詔以䖍王諒為横海軍節度使以横海節度兵馬使試殿中監程懐信起復左武衛大將軍同正兼滄州刺史横海軍節度營田滄景觀察留後依前兼御史大夫䖍王諒不出閣故也十二年正月庚子洛州叛将元誼與其衆李文通常恱石定蕃康秀玢等率洺州城内兵五千并家口萬餘人叛奔田緒累路潰散入衛州者三千餘人中使吳朝弼為亂兵所殺二月丙午詔曰元誼李文通等皆有勲庸久於戎旅頃者事因疑誤城守經時自致危懼比獻章表請率師人願赴京西用申誠効亦遣使宣慰待之如初俟至闕庭期於任使而行李之際士衆㩦離雖非本圖情亦可恕且處之東夏鎮在西郊皆我王事誠為一體况田緒任兼將相寄重方州委之撫綏必能加輯言念將士素著勤勞既有申明各宜安堵仍委田緒切加存恤以副朕懐其元誼男承嗣竝先在城又特召對仍令中使送赴魏州是月以成德軍節度度支營田常冀深趙德棣觀察使開府儀同三司檢校司徒平章事兼常州長史瑯邪郡王王武俊為檢校太尉兼中書令依前兼常州長史節度等使以朔方河中絳邠寜慶兵馬副元帥河中絳州節度度支營田觀察使元從奉天定難功臣開府儀同三司檢校司徒兼侍中河中尹上柱國咸寜郡王渾瑊為檢校司徒兼中書令依前兼侍中河中尹充副元帥節度等使已巳加山南西道節度度支營田觀察檢校左僕射兼興元尹御史大夫嚴振魏博等州節度營田度支觀察使檢校右僕射兼魏州大都督府長史兼御史大夫駙馬都尉田緒幽州盧龍節度度支營田觀察押奚契丹兩蕃經畧盧龍軍使檢校右僕射兼幽州大都督府長史御史大夫劉濟劒南西川節度支度營田觀察統押近界諸蠻及山西八國兼雲南安撫使檢校右僕射兼成都尹御史大夫韋臯竝同平章事乙亥加陳許等州節度使檢校兵部尚書兼許州刺史御史大夫曲環淮南節度觀察營田使檢校刑部尚書兼揚州長史御史大夫賜紫金魚袋杜祐邠寜節度檢校刑部尚書兼邠州刺史御史大夫張獻甫義成軍節度鄭滑觀察營田使檢校刑部尚書兼滑州刺史御史大夫賜紫金魚袋李復竝檢校左僕射山南東道節度觀察使檢校吏部尚書兼襄州刺史御史大夫賜紫金魚袋樊澤四鎮北庭行營兼涇原節度使檢校禮部尚書兼涇州刺史御史大夫劉昌右神䇿軍行營節度隴右大夫觀察度支營田使檢校工部尚書兼鳯翔尹御史大夫邢君牙左神䇿軍行營節度檢校工部尚書兼御史大夫韓全義平盧軍淄青節度度支營田觀察陸運押新羅渤海兩蕃使檢校禮部尚書兼鄆州長史御史大夫李師古劎南東川節度營田觀察使静戎軍使檢校工部尚書兼梓州刺史御史大夫王叔邕申光蔡度支營田等使檢校工部尚書兼蔡州刺史御史大夫吳少誠徐泗濠節度觀察度支營田使檢校禮部尚書兼徐州刺史御史大夫張建封竝檢校右僕射又加振武麟勝節度營田觀察蕃落使單于大都督兼御史大夫范希朝麟鄜坊丹延節度觀察使鄜州刺史兼御史大夫王栖曜夏綏銀節度觀察押蕃落使夏州刺史兼御史大夫韓潭竝檢校禮部尚書荆南節度觀察使江陵尹兼御史大夫裴胄宣武軍節度度支營田汴宋亳潁等州觀察使汴州刺史兼御史大夫李萬榮昭義軍節度營澤潞磁邢洺觀察使潞州長史兼御史大夫王䖍休浙江西道都團練觀察及諸道鹽鐡轉運使潤州刺史兼御史大夫王緯竝檢校工部尚書又以河東節度度支營田觀察留後太原尹兼御史大夫北都副留守李說為檢校工部尚書河陽三城懐州節度營田使又加朔方靈鹽豐西受降定逺城天德軍節度營田觀察使押蕃落使廬州長史兼御史大夫李欒浙江東道都團練觀察使越州刺史御史中丞皇甫政宣歙池都團練觀察使采石軍使宣州刺史御史中丞劉瓚鄂州刺史兼御史中丞何士幹等竝兼御史大夫册府元龜卷一百七十六
