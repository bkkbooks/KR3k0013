body:
  text: 冊府元龜卷四百八十四宋王欽若等撰邦計部經費周官太宰之職以九式均節財用又置國用必於嵗之杪量入以為出此邦家經費之制也盖夫富有諸夏維御羣品必慎財賦以均用度若乃兵戎祭祀之給禄廪賜予之數乗輿之奉養庶事之供擬固亦有常制矣其或觀風展義舉時廵之典陳師鞫旅揚天討之威或勁敵来降遣將以臨塞或敵國授首勞師以行賞斯皆常限之外厥費寖廣加以水旱為沴饑饉荐臻於是乎稽防救之術為裁損之策去其不急取其有餘以至推振廪之仁遣墾田之議雖恩繇人主而責成有司歴代之云為皆可覿矣漢髙祖平項羽天下以定民亡蓋藏無物可蓋藏自天子不能具醇駟醇不雜也無色醇之駟謂駟馬雜色也而將相或乗牛車以牛駕車也帝於是約法省禁輕田租什伍而稅一量吏禄度用以賦於民纔取足而山川園池市肆租稅之入自天子以至封君湯沐邑皆各為私奉養不領於天子之經費言各收其所賦稅以自供不入國朝之倉廪府庫之經常也漕轉關東粟以給中都嵗不過數十萬石武帝時驃騎將軍霍去病仍再出擊胡大克獲仍頻也渾邪王率數萬衆来降渾音胡昆反於是漢發車三萬兩迎之一兩一乗既至受賞賜及有功之士費凢百餘鉅萬先是胡降者數萬人皆得厚賞衣食仰給縣官仰音牛向切縣官不給給足也天子乃損膳解乗輿駟出御府禁藏以澹音贍之其後大將軍衛青及去病大出擊胡賞賜十萬金軍馬死者十餘萬匹轉漕車甲之費不與焉與讀曰豫是時財匱匱財乏也戰士頗不得禄矣元封中武帝北至朔方東封泰山廵海上旁北邉以歸旁音歩浪切所過賞賜用帛百餘萬匹金錢以鉅萬計皆取足大農後漢章帝元和中榖貴縣官經用不足朝廷憂之尚書張林上言榖所以貴由錢賤故也可盡封錢一取布帛為租以通天下用又鹽食之急者雖貴人不得不須官可自䰞又宜因交阯益州上計吏徃来市珍寳收采其利武帝時所謂均輸者也於是詔諸尚書通議尚書朱暉奏㨿林言不可施行事遂寢後陳事者復重述林前議以為於國誠便帝然之有詔施行暉復獨奏曰王制天子不言有無諸侯不言多少食禄之家不與百姓争利今均輸之法賈販無異鹽利歸官則下人窮怨布帛為租則吏多姦盜誠非明主所當宜行帝卒以林等言為然順帝永建元年令安定北地上郡及隴西金城常儲榖令周數年永和元年以西羌反叛二十餘年兵連師老軍旅之費三百二十餘億六年詔貸王侯國租一嵗漢安二年詔貸王侯國租一嵗桓帝延熹五年八月詔減虎賁羽林住寺不任事者半奉勿與冬衣東觀記曰以軍師水旱疫病帑藏空虚虎賁羽林不任事者住寺減半奉據此謂簡選疲弱不勝軍事者留住寺也是年十月假公卿以下奉又換王侯租以助軍糧出濯龍中藏錢還之八月段紀明為䕶羌校尉上言伏計永初中諸羌反叛十有四年用二百四十億永和之末復經七年用十八餘億費耗若此猶不誅盡魏齊王正始元年秋七月詔曰易稱損上益下節以制度不傷財害民方今百姓不足而御府多作金銀雜物将奚以為今出黄金銀物百五十種千八百餘斤銷冶以供軍用晉明帝太寧元年以軍國饑乏調刺史以下米各有差後魏道武天興五年帝聞姚興將宼邊庚寅大簡輿徒詔并州諸軍積榖于平陽之乾壁明元泰常三年九月詔諸州調民租户五十石積於定相冀三州宣武正始元年九月詔縁淮南北所在鎮戍皆令及秋播麥春納粟稻隨其土宜水陸兼用必使地無餘力比其来稔令公私俱濟也後周太祖初為魏相創制司倉嘗辦九榖之物以量國用國用足蓄其餘以待凶荒不足則止餘用用足則以粟貸人春頒之秋歛之隋髙祖開皇九年陳平帝親御朱雀門勞凱旋師因行慶賀自門外夾道列布帛逹於南郭以次頒給所費三百餘萬段十一年江南又反越國公楊素討平師還賜物甚廣其餘出師命賞亦莫不優隆煬帝大業初戸口益多府庫盈羡及帝將事遼東増置軍府掃地為兵自是租稅之入益減矣唐髙祖平京師傾府藏以賜勲人既而又患國用不足太原人劉義節進計曰今義師數十萬並在長安樵貴而布帛賤若伐街衢及苑中之樹為樵以易布帛嵗取數萬匹立可致也又藏内繒絹疋皆有餘軸之使申裁取剰物以供雜費動盈十餘萬段矣髙祖並從之大收其利𤣥宗開元十六年勅曰年支和市合出有處官既酬錢無要率戸如聞州縣不配有家率戸散科費損尤甚設今給假亦慮隠藏宜令所司更申明格勅應欲反配須審料度所有和市各就出處二十六年正月制長安萬年兩縣各與本錢一千貫收利供驛仍付雜驛三月乙酉河南雒陽兩縣亦借本一千貫收利充人吏課役肅宗乾元元年四月庚午勅諸司諸使支一物已上商量減省三分之二以兩京初收務令節儉代宗廣徳二年九月戊戌諸道稅地錢物使左僕射裴冕請進百官俸禄二萬貫助糶軍糧許之永泰元年冬郭子儀率廻紇兵大破吐蕃詔稅百官錢市絹十萬匹以賞廻紇時師旅荐興急於饋運百僚上表請納職田充軍糧許之大歴二年九月吐蕃宼靈州命有司運米二萬石供靈州軍是年冬率城百官士庶錢充朔方軍糧其六軍兵士不存此限九年五月乙丑勅曰四海之内方叶大寜西戎無厭獨阻王命不可忘戰尚勞事邊朕頃以兵革之役軍國空耗躬率節儉務勸農桑上𤣥儲休仍嵗大稔益用大愧不知其然雖屬此人和近於家給而邊榖未實戎備猶虚因其天時思致豐積将設平糴以之饋軍然以中都所供内府不足粗充常入之數豈齊倍餘之收其在方面藎臣成兹大計共佐公家之急以資塞下之儲應諸道每嵗皆有防秋兵馬其淮南四千人浙西三千人魏博四千人昭義二千人成徳三千人山南東道三千人荆南二千人湖南三千人山南西道二千人劍南西川三千人劍南東川二千人鄂岳一千五百人宣歙三千人福建一千五百人其嶺南江南浙西浙東等亦合准例恐路逺徃来増費各委本道節度觀察使都團練等使每年當使諸色雜錢及廻易利潤贓贖錢物每人計二十千每道各據所配人數都計市輕貨送上都左藏庫貯納約充别勅和糴用並不得尅當将軍士衣糧充數仍以和收送畢徳宗大歴十四年正月即位閏五月丁亥内田宅使上言州府有官租萬四千餘斛上令分給所在以為軍儲十二月己卯詔曰凡財庫皆歸左藏庫一用舊式每嵗於數中擇精好之物三五十萬匹進納大盈庫而度支先以全數聞建中四年討李希烈時李燧李懐光李抱眞李芃四節度之兵屯於魏縣李晟退次易州李勉陳少遊劉洽哥舒曜等屯於淮汝之間神策并劒南東西二道浙西荆南江西湖南黔中領南沔鄂等道之兵皆進臨賊境諸道行營出其境者糧料皆仰給度支謂之食出界糧又於諸軍各以臺省官一人司其供億謂之糧料使帝尤䘏軍士每出境者加給酒肉本道之糧又留給妻子凡境一人兼三人之糧由是将士利之纔進召逾境以規供費故諸軍月費錢一百三十餘萬貫判度支侍郎趙贊以常賦不足用乃請採蓮州白銅鑄大錢以一當十權其輕重又請置大田天下人田計其頃畆官收十五之一擇其上腴樹桑環之公田公桑自王公至於匹庶差借其力得榖絲以給國用詔從其說贊熟計之自以為非便皆寝不下請行常平稅竹木茶漆之法興元初李晟為神策行營節度使時李懐光叛徳宗再幸梁州初無芻藁乃令檢校戸部郎中張彧假京兆尹擇官吏以賦渭北畿縣不數日芻糧皆足後為副元帥討朱泚時渭橋先積米鹽十餘萬斛度支方運以備懐光軍晟又密疏以謂近畿雖乗兵亂尚可賦歛宼盜未滅宿兵曠時人廢耕桑又無儲蓄非防微制勝之術也帝深納之至是守禦益固軍不乏食貞元元年自春大旱麥枯死禾無苖度支奏京師經費及關内外征討士馬月須米鹽五十三萬石錢六十萬貫草三百八十三萬圍春冬衣賜元日冬至立仗賜物不在其中時漕江東租賦百餘萬貫在江陵度支主吏宋棲桐無部置遇火焚之國用益窘關中百姓蒸蝗曝颺去翅足而食之人心大恐二年十月度支奏京兆河南河中同華陜虢晉絳鄜坊丹延等及州府秋夏兩稅青苗等物悉折糴粟麥所在儲積以備軍食京兆兼給錢收糴每斗于時估外更加十錢納于太倉詔可其奏自是每嵗行之以贍軍十一月度支奏請于京兆府折明年夏秋稅錢二十二萬四千貫文又請度支給錢添成四十萬貫令京兆府今年内收糴粟麥五十萬石以備軍食詔從之十二月度支使奏先准勅以河中兩池鹽充諸軍收城将士賞錢自𣙜法不行旅商頗絶請一切罷之其所欠賞錢待江淮鹽利續至即給從之三年閏五月度支奏請浙江東西節度使韓滉自建中年已後供軍資費賞設等每年續加當錢六十一萬六千貫准今年五月五日勅近日甲兵止息無别徴求此是常稅先有成例宜令浙西觀察使白志貞浙東觀察使皇甫政各據本道元額依舊每年兩稅徴收發遣其錢物到别庫收貯每有給用皆先奏取進止其錢舊例每年六月舉徴至秋限送納今京西師旅頗衆經用尤多望令依稅限納市經貨送上都從之四年二月詔以中外給用除陌錢及闕官俸外一分職田停額内官俸及刺史執刀司馬軍事等錢令竇參専掌之以給在軍京文武官俸料先是京兆俸薄多不自贍帝特命有司厚其月給自是京官益重頗優裕焉初除陌錢𨽻度支帝以度支自有兩稅及鹽鐵𣙜酒錢物以充經費是錢宜别貯之給京官俸料之餘以備他用自此戸部别庫稅嵗貯錢物僅三百萬貫京師俸料所費不過五十萬貫其京兆和糴物價及度支給諸軍冬衣或闕悉以是錢充之他用之外常貯僅二百萬貫國計頼焉是年涇原節度劉昌與隴右節度李元諒於涇州及潘原收軍田粟數萬石初劉昌遣兵數千屯於潘原以禦藩寇自是邊軍頗有儲積八年五月以都官郎中鄭克鈞為靈夏二州運糧使吐蕃之圍靈州軍食絶及吐蕃稍却鈞自夏州以牛馬雜運米六萬餘斛致靈州度支又於勝州沂河運雲朔米萬餘斛是秋雲州亦有積年榖稻數萬斛人心頗固十月以西北邊榖賤詔令度支増價和糴以實邊儲凡積米三十萬斛是年裴延齡為戸部侍郎判度支奏請令京兆府以兩稅青苗錢市草一百萬圍送苑中宰相陸贄趙憬議以為若市送百萬圍草即一府百姓自冬歴夏般載不了百役供應須悉停罷又妨奪農務請令府縣量市三二十萬圍各貯近處時要即支用九年五月福建觀察使福州刺史王栩奏諸州並設軍額防虞役使更置執刀甚為煩費既乖簡要又給資糧況臣本道頻遇水旱百姓艱乏職貢或闕臣自到官已訖停其管諸州並請停罷其資糧等望借臣充當管軍資所要待年豐人戸歸復即收送度支以裨國用制曰可其資糧二年後令戸部准停減例收管諸州府執刀亦宜省罷其資糧委戸部徴收憲宗元和四年三月辛未靈武節度使范希朝奏請於太原防秋官健中以六百人衣糧充給沙陁突厥從之六年十二月辛未勅黔中水災之後又宸叙初安如聞軍府之間每事罄竭俾其存濟須有優矜其涪州縁屬荆南有供荆南節度錢二千四百貫令隨本州割還黔府兼於涪州送省錢三千八萬貫文内更取一千五百貫添賜黔府見在将士軍資七年七月戸部侍郎判度支盧坦奏今年冬諸州和糴貯備粟澤潞四十萬石鄭滑易定一十五萬石河陽一十萬石太原二十萬石靈武七萬石夏州八萬石振武豐州鹽州各五萬石凡一百六十萬石以今秋豐稔必資蓄備其澤潞易定鄭滑河陽委本道差判官和糴各於時價每斗加十文所冀人知勸農國有常備從之八年六月丙戌以東都留守韓臯為檢校吏部尚書兼許州刺史御史大夫充忠武軍節度等使勅以陳許二州經水澇賜臯綾絹布葛十萬端疋以佐軍資備宴賞十一月癸酉昭義節度使郗士美奏請以其衆鎮于臨雒就食十年十一月癸亥詔以内庫繒絹五千萬疋付左藏庫以供軍十一年九月己丑勅宼賊未平國用兹廣若加賦歛重困黎元行權取濟自今已應内外支用錢宜每貫除墊陌外量抽五十文仍於本道本使據數逐季收計其諸道錢使綱部送副度支收管隨貯納以備軍須賊平後則依常制從有司之請也十一月以内庫錢五十萬貫出付度支供軍十二年正月甲申鹽鐵轉運使王播奏伏以軍興之時在繫財賦國用之本出於江淮頃者劉晏掌領鹽鐵租庸每自廵按至於錢榖利病州縣否臧隨以上聞使得釐革臣縁在城務重不獲躬行伏望遣臣副使程异特以詔命出廵江淮其諸州府上供錢米如妄託水旱輒有破除伏請委程异一切勘實聞奏其度支戸部并臣當司合送上都行營錢物并令急切催促其逺年逋欠亦委具可徴之數聞奏從之因令异與淮南浙東宣歙江西河南嶺南桂管福建等道觀察使計㑹各減常用去浮費取其羡助軍是月壬辰詔出内庫紬絹布綿共九十萬端匹銀五千兩付度支饋運九月戊子詔以内庫羅縠及犀玉金𢃄之具及婦人首餙送度支令歸其直十三年二月壬午内出玳瑁梳四百隻犀𢃄具五百副令度支出賣進直六月内庫出絹三十萬匹錢三十萬貫付度支給軍用十四年二月乙卯出内府錢帛貫匹共一萬付度支給軍用十五年五月壬寅朔癸卯詔曰比縁用兵嵗久初息干戈百役所資國用多闕不可更加賦稅重擾疲人參酌權宜事貴通濟自今已後應内外支用錢宜於天下收兩稅鹽利𣙜酒稅茶及職掌人課料等錢並每貫除舊墊陌外量抽五十文委本道本司本使據數逐季收計其諸道錢使差綱部送並付度支收等待一二年後國用稍充即依舊制其京百司俸科文官已准别勅每月量抽修文宣王廟不可重有除減武官所給較薄亦不在抽限七月乙卯勅自今已後新除觀察節度使到任日具見在錢物斛斗器械數分析以聞穆宗長慶元年二月浙東奏准詔停老弱官健收衣糧四月己丑河南尹韋貫之請以去年夏末至今年夏初供館驛外剰錢一萬三千五百八十貫草九萬五百八十束代百姓塡元和十一年至十五年逋欠及今年夏稅從之十二月乙亥勅諸道州府每年徴納兩稅除送上都外留州留使錢縁草賊未殄費用滋廣兩稅之外難議加徴然其饋運之間又須得濟諸道留使錢宜令長吏於諸色給用中每貫量減二百文以資軍用事平之後即任仍舊壬午出内藏庫五萬貫付度支以備軍須二年正月内出繒帛八萬匹付度支以助軍資四月辛未詔曰頃以寇賊未殄費用滋廣先有詔勅於諸道留州留使給用錢中每貫量抽二百文今兵戎已戢經費有常其抽錢宜從今年四月十一日已後停切令官吏所在知委不得妄有増減七月以討汴州李㝏内出綾絹五十萬匹付度支以充軍用敬宗以長慶四年正月即位三月大赦制官禁經費及乗輿服膳委所司起今年三月其本色物價及水陸脚價一半委度支收管一半使任本州收充助貧下戸闕額稅錢寳厯二年五月辛巳勅如聞度支近年請諸色支用常有欠闕今又諸軍諸使衣賜支遣是時須有萬員使其濟辦宜量賜絹及紬一萬匹以戸部物充七月壬辰戸部侍郎崔元畧進准宣索見在左藏庫挺銀及銀器十萬兩金器七千兩舊制戸部所管金銀器悉貯於左藏庫時帝意欲便於賜與故命盡輸内藏文宗太和元年三月鹽鐵使王播進停減鹽鐵官吏課料絹一萬六千三百匹六月司空兼門下侍郎平章事判度支裴度進金六十八挺十一月庚寅勅李寰下將士衣糧舊准神策軍例支給今初移鎮五令度支且准舊例處分待滄景事平後仍委條流聞奏二年十月辛酉勅寧武軍士馬悉在行營不同常日舊賜綾絹二萬匹仍委度支逐便支送四年五月戊子罷度支每年於劒南西川織造年支綾羅錦等共八千一百六十七匹令數内減二千五百十匹九年春正月甲戌中書門下奏太倉見在粟二百六十萬八百五十四石並請留充貯備不承别勅不在給用之限如有特勅支用亦須覆奏從之七月乙巳戸部尚書判度支王璠奏東渭橋每年北倉收貯漕運糙米一十萬石以備水旱今累年計貯三十萬石請以今年所運者換之自是三嵗一換率以為常則所貯不陳而耗蠧不作許之開成元年正月一日赦詔京兆府附一年所支用錢物斛斗草等並勒鹽鐵使以開成元年直進綾絹充還辛酉鹽鐵使左僕射令狐楚請以罷修曲江亭子絹一萬三千七百匹廻修尚書省二月度支奏每年供諸司并畿内諸鎮軍糧等計粟麥一百六十餘萬石約以錢九十六萬六千餘貫糴之畿内百姓每年納兩稅見錢五十萬貫約以粟麥二百餘萬貫糴之是度支糴以六十而百姓糴以二十五農人賤糴利歸商徒度支貴糴賄行黔吏今請以度支貴糴錢五十萬貫送京兆府充百姓一年兩稅勒二十三縣代緡輸粟八十萬石小麥二十萬石充度支諸色軍糧則開成三年以後似每嵗放百姓一半稅錢又省度支錢一十萬貫勸農減費物理昭然仍請百姓廣開田畆更不加稅行之有節富庶可期詔付京兆府夏季以前先造戸帖務使平允凡折納之術行於豐年斯惠農務茍非豐登人用苦之盖輸緡易而輸粟難也武宗㑹昌元年赦曰應州縣等每有過客衣冠皆求應接行李茍不供給必致怨尤刺史縣令務取虛名不惜百姓夫蓄皆配人戸酒食科率所繇令虛通領状招領價錢又陳設之物遍擾閭里蠧政害人莫斯為甚宜委本道觀察使條流量州縣大小及道路要僻各置本錢逐月收利前觀察使刺史前任臺省官不乗館驛者許量事供給其前便以留州留使及羡餘錢充每至季終申觀察使不得輙配所由人戸並限赦書到後一月内處置訖聞奏虚立名目妄破官錢依錢科配並同入以枉法贜處分縣令已下親故以家口同行者並須以料錢供給不得擅配店戸祗供其所在食估切宜禁㫁如有犯者並以贓論仍委御史臺及所在廵按常加察訪懿宗咸通五年五月丁酉詔如聞湖南桂州是嶺路係口諸道兵馬綱運無不經過頓逓供承動多差配凋傷轉甚宜有恩宥潭桂兩道各賜錢三萬貫文以助軍錢以充館驛息利本錢其江陵江西鄂州三道比於潭桂徭配稍簡宜令本道觀察使諸𡨕閑劇准此例與置本錢七月壬子延資庫使夏侯孜奏鹽錢户部先積欠當使咸通四年已前延資錢絹三百六十九萬餘貫疋内戸部每年合送錢二十六萬四千二百八十五貫疋從大中十二年至咸通四年九月已前除納外欠一百五十萬五千七百一十四貫疋當使縁戸部積欠數多先具申奏請於諸道州府塲院合納戸部所收八十文除陌錢内割一十五文屬當使自收管勅命須行送納稽緩今得戸部牒稱所收除陌錢除錢絹外更有諸雜貨物延資庫徴收不便請起今年合納延資庫錢絹一時便足其已前積欠候物力稍充積漸堙塡其所割十五文錢即當司仍舊收管又縁累嵗已来嶺南用兵多支戸部錢物當使不欲堅論舊欠請依戸部商量合納今年一年額色錢絹須足明年即依舊制三月九月兩限送納畢其已前積欠仍令戸部自立塡納期限者勅㫖依之八年九月丁酉延資庫使曹確奏戸部每年合納當使三月九月兩限絹二十一萬四千一百匹錢五萬貫自大中八年已後至咸通四年積欠五十萬五千七百餘貫疋前使杜悰申奏起請咸通五年正月已後於諸道州府塲鹽院合送戸部八十文除陌錢内割十五文當使收管以塡積欠續據戸部牒稱州府除陌錢有折色零碎請起咸通五年所合送延資庫錢絹逐年兩限須足其除陌十五文當司仍舊收管前使夏侯孜具事由申奏且請依戸部論請期限其咸通五年錢絹戸部已送納自六年至八年其錢絹依前不旋送納又積欠三十六萬五千五百七十貫文者伏以所置延資庫初以備邉為名至大中三年始改今號若財物不充則名額虚設當置制之時所令三司逐年分改減送當使收管元勅只有錢數但令本司減割送庫不定色目以此因循漸隳舊制年月既乆積欠轉多既無計以徴收乃指色以取濟稍稱備邉名號得遵元勅指揮乃割戸部除陌八十文内十五文收管及戸部請逐年送庫具票從今既積欠又多終慮不及期限臣今酌量請諸道州府場鹽院合送戸部錢絹内分配令勒留下合送納延資庫數目令本處别為綱運與戸部綱同送上都直納延資庫則戸部免有逋懸不至累年積欠從之十月丙寅戸部侍郎判度支崔彦昭奏當司應收管江淮諸道州府咸通八年已前兩稅𣙜酒及度支米價并二十文除陌諸色屬省錢准舊例逐年商人投状便換自南蠻用兵已来置供軍使當司在諸州府場鹽錢猶有商人便換齎錢司便換文牒至本州府請領皆備諸州稱准供軍使指揮占留以此商人疑惑乃致當司支用不充乞下諸道州府場監院依限送納及給還商人不得託稱占留昭宗乾寧四年同州節度使長春宫使韓建奏以京兆府於每年見徴賦内減四十萬貫充上供梁太祖開平二年十一月兩浙節度使奏差使押茶貨徃青州廻變供軍布衫段送納後唐明宗天成元年四月制曰先皇帝運關外之資糧供雒中之戎馬遂致百姓困弊不勝饋輓之勞今則須為制置令度支與總管司㑹定在京兵數據所供饋積貯京師其近畿糧儲可令諸軍就食其租庸使先将係省錢與人廻圖所供課利或爛茶弊物積年之後和本乾没為弊最深宜令盡底收納以塞倖門八月乙未汴州奏兵額數廣稅物不多切慮年終供饋有闕支郡舊管漕州伏乞却歸當道從之三年三月三司使奏河陽白波鞏縣見有軍儲百萬餘斛草二百七十萬束長興二年四月太子賓客裴臯上言以京師牛馬多草價貴請畿内種禾者放地頭錢及甸服之内舟舩所通㳂河置場買草每至春夏即官中出賣三年十二月乙亥三司使馮贇奏奉聖㫖賜内外臣僚節料羊計支三千口帝曰不亦多乎范延光奏曰供御厨及内史食羊每日二百口嵗計七百萬餘口釀酒糯米二萬餘石帝聞奏歛容良久曰支費大過如何減省初莊宗同光時御厨日食羊二百口當時物論已為大侈今羊數既同帝故駭心四年二月癸丑帝御中興殿樞密使范延光曰縁邊屯戍兵士人馬支費月計極多若春夏之交便有霖雨山水湍險軍無興舉之理應縁邊兵馬請移於近裏州郡以便芻糧從之帝因問延光内外見管馬數對曰見兵馬數管騎軍三萬五千帝撫髀歎曰朕從戎四十年太祖在太原時騎軍不過數千先皇與汴家二十年較戰自始至終馬數裁萬今有鐵馬三萬五千匹而不能使九州混一是吾養士卒練將帥之不至也吾老矣馬將奈何延光奏曰臣每思之國家養馬太多試計一騎士之費可贍歩卒五人養三萬五千騎抵十五萬歩卒既無所施虛耗國力臣恐一年不易帝曰誠如卿言肥騎士而瘠吾民何負哉八月賜侍衛親軍優給有差時月内再有頒給自兹府藏無餘積矣十一月辛巳朱𢎞昭馬贇曰臣等自蒙重委計度國力盈虚而支給常若不足者直以賞軍無等買馬太多之弊也若不早為節限後将難濟宜嚴勅西北邊鎮守比後請禁止其来閔帝應順元年正月洋州節度使孫漢韶上言於雒谷路造倉舎三月討鳯翔西京留守王思同上言度支支供軍錢一千萬末帝即位改元清泰太后太妃出宫中衣服器用簮珥之屬令主者陳於帝庭以助勞軍也帝朝太后辭之不獲初三司計用賞軍錢五十萬及率士庶房課搜索質兼貢物及二十萬兩宫知之故有斯助二年六月甲申以邊軍儲運不給詔北面總管以河東諸州民戸有多積粟菽者量事抄借以益軍儲乙酉詔鎮州輸絹五萬匹於北面總管府博糴軍儲七月甲午北面總管言邊軍乏芻糧其安重榮廵邊兵士欲移振武就軍食從之晉髙祖初即位改元天福赦制曰悉力為時罄財助國茍不推於恩命亦何示於賞酬自舉義以来應借率人戸及經抄括商旅資財錢物委所司明置文籍候平定之後當議給還二年九月丁卯據度支奏應請假入覲省朝人皆是等第支賜茶藥自前委所司以諸進到者給今諸庫並無見在今後應有請假臣寮欲請權住支候有進到即依舊支賜從之六年八月宣三司指揮鄴都澶相貝博五州配買修軍營材料一萬五千間仍差工匠人夫共九千人充役周廣順元年五月内鄴都王殷言奉宣以去年諸倉羡餘斛斗留一萬石本府公使餘係籍管從之册府元龜卷四百八十四
