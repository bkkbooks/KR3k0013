body:
  text: 册府元龜卷二百十三宋王欽若等撰閏位部求賢命使求賢古之爲邦令聞長世者曷嘗不諮訪幽仄詳求髦彦以熈工濟俗者哉自南紀建國汔于髙齊朱梁莫不延采逋逸網羅俊乂俾有位以論薦命輶軒而詢察勤勤懇懇形於詔令皆所以踐聖哲之風軌隆政教之元本收一代之材濟當世之務者也宋文帝元嘉十二年詔曰周宗以寜實繇多士漢室之隆亦資得人朕寝寤樂賢為日已乆而則哲難偕明揚莫効用令遺才在野管庫虗朝永懐前載慙徳深矣夫舉爾所知宣尼之彛訓貢士任官先代之成凖便可宣勅内外各有薦舉當依方銓引以觀厥用孝武帝大明六年詔下四方旌賞茂異其有懐真抱素志行清白恬退自守不交當世或識通古今才經軍國奉公亷直髙譽在民者具以名奏前廢帝景和元年八月既誅太宰江夏王義恭等詔曰昔凝神佇逸磻溪讚道湛慮思才傅巖毗化朕位御三極風澄萬㝢資鈇電㫁正邜斯戮思所以仰宣遺烈俯𢎞景祚每結夢庖鼎瞻言版築有劬日昃無忘昧旦可甄訪郡國揖聘閭部其有孝性忠節幽居遯棲信誠義行亷正表俗文敏博識幹事治民務加旌舉隨才引擢庶官方克順彛倫咸敘主者精加詳括穪朕意焉明帝㤗始二年詔曰林澤貞栖丘園耿潔博洽古今敦崇孝譲四方在任可明盡搜揚具即以聞隨就褒立五年九月己未詔曰夫箕潁之操振古所貴冲素之風哲王攸重朕屬横流之㑹接難晦之辰龕暴翦亂日不暇給今雖關梁蕩靄區縣澄氛偃武修文於是乎在思崇亷耻用静馳薄固已物色載懐寝興竚歎其有貞栖隠約息事衡樊鑿坯遺榮負釣辭聘志恬江海行髙塵俗者在所精加搜括特以名聞将賁園矜徳茂昭厥禮羣司各舉所知以時授爵後廢帝即位初詔曰夫寢夢期賢徃誥垂羙物色求良前書稱盛朕以冲昧嗣膺寳業思欲仰述聖猷勉𢎞政道興言多士常想得人可普下牧守廣加搜採其有孝友門族義讓光閭或匿名屠釣隠采耕牧足以整厲澆風扶益淳化者凡厥一善咸無遺逸虗輪佇帛俟聞嘉薦順帝昇明元年詔曰昔聖王既沒淳風已衰龜書永湮龍圖長秘故三代之末徳刑相擾世淪物競道詖人諛然猶正士比轂竒才接軫朕襲運金樞纂靈瑶極負扆廵政日晏忘疲永言興替望古盈虚姬夏前載猶傳訓謨漢魏餘文布在方册故元封興茂才之制地節創獨行之品振維務本存乎得人今可宣下州郡搜揚幽仄標採鄉邑隨名薦上朕將親覧甄其茂異庶野無遺彦永激遐芬南齊武帝永明元年詔王公卿士各舉所知隨方登敘八年詔公卿以下各舉所知隨才授職進得其人受登賢之賞薦非其才獲濫舉之罰鬱林王隆昌元年正月詔王公以下各舉所知明帝建武二年詔王公以下各舉所知梁髙祖天監元年四月詔遣内侍周省四方訪賢舉滯若懐寳迷邦藴竒待價蓄響藏真不求聞逹並依名騰奏罔或遺隠使輶軒所屆如朕親覧五年正月丁卯朔詔曰在昔周漢取士方國頃代彫訛幽仄罕被人孤地絶用隔聽覽士操淪胥因茲靡勸豈其岳瀆鍾靈偏有厚薄寔由知與不知用與不用耳朕以菲德君此兆民而兼明廣炤屈於堂户飛耳長目不及四方永言愧懐無忘旦夕凡諸郡國舊邦族内無在朝位者選官搜括使郡有一人十四年正月南郊詔曰朕躬祗明祀昭事上靈臨行宫而登㤗壇服衮冕而奉蒼璧柴望既升誠敬克展思所以對越乾元𢎞宣德教而缺于治道政法多昧實佇羣才用康庶績可班下逺近博採英畏若有確然郷黨獨行州閭肥遯丘園不求聞逹藏器待時未加收採或賢才方正孝悌力田並即騰奏具以名上當擢彼周行試以邦邑庶百司咸事兆民無隠普通三年五月詔連帥郡國舉賢良方正直言之士七年四月詔在位羣臣各舉所知凡是清吏咸使薦聞州年舉二人大郡一人太清元年正月詔可班下逺近博採英畏或徳茂州閭道行鄉邑或獨行丘壑聞逹不求咸使上言以時招聘二年正月詔在位各舉所知四月詔在朝及州郡各舉清人任治民者皆以禮送京師五月詔曰爲國在於多士寜下寄於得人朕暗於行事尤闕治道孤立在上如臨深谷凡爾在朝咸思規救獻可替否用相啓沃班下方岳旁求俊乂窮其屠釣盡其巖穴以時奏聞敬帝太平元年九月詔殊才異行所在奏聞陳文帝天嘉元年詔曰朕以𦕈身屬當大寳負荷至重憂責實深而庶績未康胥怨猶結延佇賢良發於夢想每有一言入聽片言可求何嘗不褒奨抽揚緘書紳帶而傅巖虚徃空谷尚淹蒲幣空陳旌弓不至豈當有乖則哲使華澤遺才将時運澆流今不逮古側食常懐寢興増歎新安太守陸山才有啓薦梁前征西從事中郎蕭䇿梁前尚書中兵部王暹並世胄清華羽儀著族或文史足用或孝德可稱並宜登之朝序擢以不次王公已下其各進舉賢良申薦淪屈庶衆才必舉大厦可成使棫樸載歌由庚在詠宣帝大建四年秋九月辛亥大赦天下詔曰與善從諌在上之明規進賢謁言為臣之令範朕以寡徳嗣守寳位雖世襲隆平治非寜一辨方分職旰食早衣旁闕爭臣下無貢士何其闕爾鮮能抗直豈余獨運匪薦讜言置鼓公車罕論得失施石象魏莫陳可否朱雲摧檻良所不逄禽息觸楹又為難值至如衣褐以見擔簦以遊或耆艾絶倫或妙年異等于時而不偶左右莫之譽黑貂故敝黄金且殫終其滯淹可為太息又貴為百辟賤有十品工拙並騖勸沮莫分街謡徒壅廷議斯闕寔朕之弗明而時無獻替永言至治何廼爽與外可通示文武凡厥在位風化乖舛朝政紕蠧正色直辭有犯無隠兼各舉所知隨才明試其莅政亷穢在職能否分别矢言俟茲黜陟後主即位初詔曰夫體國經野長世字氓雖因革儻殊弛張或異至於旁求俊乂爰逮側㣲用適和羮是隆大厦上智中主咸繇此術朕以寡薄嗣膺景祚雖哀疚在躬情慮昏舛而宗社任重黎庶務殷無繇暫安拱黙敢忘康濟思所以登顯髦彦式備周行但勞宵夢屬勤史卜五就莫來五能不至是用申旦凝慮景夜捐懐豈以食玉炊桂無因自逹将懐寳迷邦咸思獨善應内外衆官九品以上可各薦一人以㑹彚征之㫖且取備實難舉長或易小大之用明言所施勿使南箕北斗名而非實其有負能仗氣擯壓當時著賓戲以自憐草客嘲以慰志人生一世逄遇誠難亦宜去此幽谷翔茲天路趨銅駞以觀國望金馬而來庭便當隨彼方員訪之矩矱北齊孝昭皇帝皇建二年詔内外執事之官從五品已上及三府主簿録事参軍諸王文學侍御史廷尉三官尚書舍人每二年之内各舉一人後主天統三年太上皇帝詔京師執事散官三品已上舉三人五品已上各舉二人稱事七品已上及殿中侍御史尚書都檢校御史主書及門下録事各舉一人武平三年詔文武官五品以上各舉一人梁太祖開平元年初受禪求理尤切委宰臣搜訪賢良或有在下位抱負器業乆不得伸者特加擢用有明政理得失之道規救時病者可陳章疏當親鑒擇利害施行然後賞以爵秩有晦跡丘園不求聞逹者令彼長吏備禮邀致冀無遺逸之恨二年七月癸巳以禪代已來思求賢哲乃下令搜訪牢籠之期以好爵待以優榮各隨其材咸使登用宜令所在長吏切加搜訪每得其人則疏姓名以聞如在下位不能自振者有司薦𨗳之如任使後顯立功勞别加遷陟三年制自開創已來凡有赦書徳音節文内皆委諸道搜訪賢良尚慮所在長吏未切薦揚其有卓犖不羈沉濳用晦負王覇之業藴經濟之謀䆒古今刑政之源逹禮樂質文之奥機籌可以制變經術可以辨疑一事軼羣一才拔俗並令招聘旋具奏聞然後試其所長待以不次所貴牢籠俊傑採摭英翹四年九月下詔曰朕聞歴代帝王首推堯舜為人父母孰比禹湯睿謀髙出於古先聖徳普聞於天下尚或卑躬待士屈已求賢俯仰星雲慮一民之遺逸網羅巖穴恐片善之韜藏延爵禄以徴求設丹青而訪召使其為政樂在進賢蓋繇國有萬幾朝稱百揆非才不治得士則昌自朕光宅中區迄今三載宵分輟寐日旰忘飡思共力於廟謀庶永清於王道而乃朝廷之内或未盡於昌言軍旅之間亦罕聞於竒䇿眷言方岳下及山林豈無英竒副我延佇諸道都督觀察防禦使等或勲髙翊世或才號知人必於塗巷之賢備察芻蕘之士詔到可精搜郡邑博訪賢良喻之以千載一時約之以髙官羙秩諒無求備唯在得人如有卓犖不羈沉濳自負通覇王之上畧逹文武之大綱究古今刑政之源識禮樂質文之變朕則待之不次委以非常用佐經綸豈勞階級如或一言㧞俗一事出羣亦當捨短從長隨才授任大小方圓之器寜限九流温良恭儉之人難誣十室勉思薦舉勿至因循俟爾發揚慰予翹渴仍從别勑處分命使周官有瑞節之制小雅著皇華之詠至於四方安車之適八月輶軒之舉皆命使之謂也自建康數代以汔于魏齊朱梁曷嘗不順考古道疇咨今典濬發明詔臨遣使臣宣布徳澤班示政令紏吏治之得失詢民氓之疾苦賑災荒以施恵索亡叛以詰姦觀省風俗搜揚逋遯察獄犴以盡欽恤之㫖勞屯戍以申賜賚之命是皆古先令王明逹其視聽兢業於幾㣲之意也斯為邦之要道昭徳之丕訓者歟吳景帝永安四年八月遣光禄大夫周奕石偉廵行風俗察将吏清濁民所疾苦為黜陟之詔後主鳳皇三年七月遣使者二十五人分至州郡科出亡叛宋髙祖永初元年六月丁夘即位丁丑詔曰古之王者廵狩省方躬覽民物搜揚幽隠拯災䘏患用能風澤遐被逺至邇安朕以寡闇道謝前哲因受終之期託兆庶之上鑒寐屬慮思求民瘼才弱事艱苦無津濟夕惕永念心馳遐域可遣大使分行四方旌賢舉善問所疾苦其有獄訟虧濫政刑乖愆傷化擾治未允民聽者皆當具以事聞方事之宜無失厥中暢朝廷乃眷之㫖宣下民壅隔之情文帝元嘉三年正月誅司徒徐羡之等分遣大使廵行天下通直散騎常侍袁渝司徒左西掾孔邈使揚州尚書三公郎陸子真起部郎甄法崇使荆州員外散騎常侍范雍司徒主簿龎遵使南兖州前尚書右丞孔黙使南北二豫州撫軍叅軍王歆之使徐州冗從僕射車宗使青兖州國子博士裴松之使湘州尚書殿中郎阮長之使雍州前竟陵太守殷道鸞使益州員外散騎常侍李躭之使廣州郎中殷斌使梁州南秦州前員外散騎侍郎阮園容使交州駙馬都尉奉朝請潘思先使寜州並兼散騎常侍班宣詔書曰昔王者廵功羣后述職不然則有存省之禮聘頫之規所以觀民立政命事考績上下偕通遐邇咸被故能功昭長世道歴逺年朕以寡暗屬承洪業寅畏在位昧于治道夕惕惟憂如臨深谷懼國俗凌頽民風凋偽𤯝厲違和水旱傷業雖躬勤庶事思𢎞攸宜而機務惟殷顧循多闕政刑乖謬未獲具聞豈誠素弗孚使羣心莫盡納隍之愧在予一人以嵗時多難王道未一卜征之禮廢而未脩眷彼氓庶無忘攸恤今使兼散騎常侍渝等申命四方周行邦邑親見刺史二千石官長申述至誠廣詢治要觀察吏政訪求民隠旌舉操行存問所疾禮俗得失一依周典每各為書還具條奏俾朕昭然若親覧焉大夫君子其各悉心敬事無隳乃力其有咨謀逺圖謹言中誠陳之使者無或隠遺方將敬納良規以補其闕勉哉朂之稱朕意焉五月乙巳詔曰夫哲王宰世廣逹四聰猶廵嶽省方採風觀政所以情偽必審幽遐罔滯王澤無壅九臯有聞者也朕以寡薄猥纂洪緒雖永念治道志存昧旦願言傅巖發想宵寐而丘園之秀藏器未臻物情民隠尚隔親聽乃眷區域輟寢忘飡今氛祲祛蕩宇内寜宴旌賢𢎞化於是乎始可遣大使廵行四方其宰守稱職之良圭蓽一介之善悉須列奏勿或有遺若刑獄不䘏政治乖謬傷民害教者具以事聞其髙年鰥寡幼孤六疾不能自存者可與郡縣優量賑給慱採輿誦廣納嘉謀務盡銜命之㫖俾若朕親覽焉八年閏六月揚州旱乙巳遣侍御史省獄訟申調役九年六月詔曰益梁交廣境域幽遐治宜物情或多偏壅可更遣大使廵求民瘼十二年東諸郡大水人民饑饉吳義興及吳郡之錢塘升光三百以司徒左西掾州治中從事史沈演之及尚書祠部郎江䆳並兼散騎常侍廵行拯恤許以便宜從事孝武以元嘉三十年四月即位五月庚辰詔曰天歩艱難國道用否雖基構永固而氣數時愆朕以𦕈身奄承皇業奉尋歴命鍳寢震懐萬邦風政人治之本感念凌替若疚在心可分遣大使廵省方俗閏六月遣兼散騎常侍樂詢等十五人廵行風俗明帝㤗始元年十二月即位詔曰朕龕亂寕民屬膺景祚鴻製初造革道維新而國故頻罹仁澤偏壅每鍳昧疚心罔識攸濟廵方問俗𢎞政所先可分遣大使廣求民瘼考守宰之良採衡閭之善若獄犴淹枉傷民害教者具以事聞鰥寡孤獨癃殘六疾不能自存者郡縣優量賑給貞婦孝子髙行力田詳悉條奏博詢輿誦廣納嘉謀每盡皇華之㫖俾若朕親覽焉三年八月丙午遣吏部尚書褚淵慰勞縁淮將帥隨宜量賜後廢帝以泰豫元年四月即位六月壬辰詔曰夫興王經制寔先民隠方求廣教刑於四維朕以㷀𦕈夙膺寳厯永言民政未接聽覧眷言乃顧無忘鍳寢可遣大使分行四方觀採風謡問其疾苦令民間有法不便俗者悉各條奏若守宰威恵可紀亷勤允著依事騰聞如獄訟誣枉職事紕繆惰公存私害民利已者無或隠昧廣納芻輿之議博求獻藝之規廵省之道務令精治深檢行識俾若朕親覽焉元徽元年九月壬午詔曰我國賦税蓋有常品徃屬戎難務先軍實徴課之宜或乖徃昔淮湘江州糧運偏積調役既繁庶徒彌擾因循權政容有未革民單力弊嵗月逾甚永言矜歎情兼宵寢可遣使到所明加詳察其輸違舊令役非公限者並即蠲改具條以聞南齊太祖建元元年四月即位五月丙辰詔遣大使分行四方遣兼散騎常侍十二人廵行四方以交寜道逺不遣使二年二月遣大使廵慰淮淝徐豫邉民尤貧遘難者刺史二千石量加賑䘏又遣右衛將軍給事中吕安國出司州案集民戸詔曰郢司之間流雜繁廣宜並加區判定其𨽻屬叅詳兩州事無専任安國可蹔徃經理三年十二月命散騎常侍虞炎等十二人廵行諸州郡觀省風俗焉海陵王以延興元年七月丁酉即位八月甲辰詔遣大使廵行風俗梁髙祖天建元年四月即位詔曰觀風省俗哲后𢎞規狩岳廵方明王盛軌所以重華在上五品聿修文命肇基四載斯履故能物色幽㣲耳目屠釣致王道於緝熈被淳風於遐邇朕以寡薄昧于治方籍代終之運當握符之重取鑒前古懐若馭朽思所以振民育徳去殺勝殘觧網更張置之仁夀而明慙昭逺智不周物兼以嵗之不易未遑卜征興言夕惕無忘鑒寐可分遣内侍周省四方觀政聽謡訪賢舉滯其有田野不闢獄訟無章忘公徇私侵漁是務者悉隨事以聞若懐寳迷邦藴竒待價蓄響藏真不求聞逹並依名騰奏罔或遺隠使輶軒所屆如朕親覽焉三年六月詔曰昔哲王之宰世也每嵗下征躬事廵省民俗政刑罔不畢逹末代風彫乆曠茲典雖欲肆逺忘勞究臨幽仄而居今行古事未易從所以日晏踟蹰情同再撫總攬九州逺近人庶或川路幽遐或貧羸老疾懐寃抱理莫繇自申所以東海匹婦致災邦國西土孤魂登樓請訴念此于懐中夜太息可分將命廵行州部其有深寃鉅害抑鬱無歸聽詣使者依原自列庶以矜隠之念昭被四方逖聽逺聞事均親覧敬帝太平元年二月以東土經杜龕張彪抄暴遣大使廵省陳武帝永定元年十月乙亥即位己卯分遣大使宣勞四方下璽書勅州郡曰夫四王革代商周所以應天五勝相推軒羲所以當運梁德不造䘮亂積年東夏沸騰西都蕩覆蕭勃干紀非惟趙倫侯景滔天踰於劉載貞陽反簒賊約連兵江左累屬於鮮卑金陵乆非於梁國自有氤氲混沌之世龍圖鳳紀之前東漢興平之初西朝永嘉之亂天下分離未能若於梁朝者也朕以虗薄屬當興運自昔登庸首清諸越徐門浪泊靡不征行浮海乗山所在戡定冐愬風塵騁馳師旅六延梁祀十剪強㓂豈曰人謀皆繇天啓梁氏以天禄斯改期運永終欽若唐虞推其鼎玉朕東西退譲拜手陳辭避舜子於箕山之陽求支伯於滄洲之野而公卿敦逼率土翹惶天命難稽遂享嘉祚今月乙亥升禮太壇言念遷桐但有慙德自梁氏將末頻月亢陽大運斯終秋霖奄降翌日成禮圜丘宿設埃雲晚霽星象夜張朝景重輪泣三危之膏露晨光合璧帶五色之卿雲頋惟寡薄彌慙休祉昧旦丕顯方思至治卿等擁旄方岳相任股肱割符名宇方寄恤隠玉歴惟新念有欣慶想深求民瘼務在亷平慶恵以撫孤貧威刑以禦狡猾若有萑蒲之盗或犯戎商山谷之首擅強幽險皆從肆赦咸使知聞如或迷途俾在無貸今遣使人具宣徃㫖念思善政副此虗懐時熊曇朗在豫章周廸在臨川留異在東陽陳寳應在晉安共相連結閩中豪帥互相自保帝患之令黄門侍郎蕭乾徃諭之謂曰陸賈南征趙佗歸順隨何奉使黥布來臣追想清風髣髴在目卿宜勉建功名不煩更勞師旅乾至示以逆順所在歸附文帝天嘉元年正月遣使者宣勞四方二月遣使者齎糧璽書宣勞四方宣帝大建元年正月分命大使廵行四方觀省風俗二年六月分遣大使廵行州郡省理寃屈六年四月詔曰戢情懐善有國之令圖拯弊救危聖範之通訓近命師薄伐義在濟民青齊舊𨽻膠光部落乆患㓙戎爭歸有道弃彼農桑忘其衣食而大軍未接中途止憇胊山黄郭車營布滿扶老携幼蓬流草䟦既䘮其本業咸事遊手饑饉病疾不免流離可遣大使精加慰撫仍出陽平倉榖拯其懸罄并充糧種勸課士女隨近耕種石鼈等屯適意修墾後主至德二年正月分遣大使廵省風俗東魏孝静帝天平元年十二月遣侍中封隆之等五人為大使廵諭天下三年十一月詔遣使廵檢河北移饑人興和元年六月以尚書左僕射司馬子如為山東黜陟大使北齊文宣帝天保元年五月戊午即位辛未遣大使於四方觀察風俗問民疾苦嚴勅長吏厲以亷平興利除害務存安静若法有不便於時政有未盡於事者具條得失還以聞奏遣李奨等八人充大使廵省方俗問民疾苦廢帝以天保十年十月即位十一月分命使者廵省四方求政得失省察風俗問民疾苦孝昭帝以皇建元年八月壬午即位壬辰詔分遣大使廵省四方觀察風俗問民疾苦考求得失搜訪賢良武成帝以太寜元年十一月即位詔大使廵行天下求政善惡問人疾苦擢進賢良河清三年九月詔遣十二使廵行水潦免其租調後主天統五年七月詔使廵省河北諸州無雨處境内偏旱者優免租調梁太祖乾化元年十二月命大理卿王鄯使于安南左散騎常侍吳藹使于朗州皆以旌節官告錫之也又命將作少監姜𢎞道為朗州旌節官告使副册府元龜卷二百十三
