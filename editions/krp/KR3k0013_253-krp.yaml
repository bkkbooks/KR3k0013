body:
  text: 册府元龜卷二百五十三宋王欽若等撰列國君部識闇奢僭信讒識闇夫分土於社以啓疆宇受爵於朝以治人民皆親親賢賢褒徳報功之舉也及乎象賢以主祀繼世而為邦於是無克肖之姿㒺愼修之志或懵於知臣所任而非允或昧於察已所作而靡成或用武無謀以自受其弊或出令不愼以終致其凶至於禍難将成尚忽忠臣之諫回邪已熾方思古人之功大以覆宗小以失位軍旅亡於外宗祏廢其祀蓋智有所不至謀有所不臧雖天命之難知固人事之可鑒者也鄭文公大夫髙克好利而不顧其君文公惡而欲逺之不能使髙克將兵而禦狄於竟音境陳其師旅翺翔河上乆而不召衆散而歸清人之詩齊襄公無禮義而求大功不修德而求諸侯志大心勞所以求者非其道甫田之詩刺襄公也陳僖公愿而無立志故作衡門之詩以誘掖其君也宋襄公伐鄭楚伐宋以救之襄公與楚成王戰於泓楚人未濟公子目夷曰彼衆我寡及其未濟擊之公不聽已濟未陳又曰可擊公曰待其已陳陳成宋人擊之宋師大敗襄公傷股國人皆怨公公曰君子不困人於阨不皷不成列軍法以皷戰以金止不皷不戰也不成列未成陳子魚曰子魚目夷字兵以勝為功何常言與一云尚何言與必如公言即奴事之耳又何戰為晉厲公令胥童以兵八百攻殺三郄胥童因以刼欒書中行偃於朝曰不殺二子患必及公公曰一旦殺三卿寡人不忍益也對曰人將忍君公弗聽謝欒書等以誅郄氏罪大夫復位厲公游匠驪氏欒書中行偃以其黨襲厲公而殺胥童迎公子周而立之陳厲公佗取蔡女數如蔡厲公所殺桓公太子免之三弟共令蔡人誘厲公以好女與蔡人共殺厲公齊景公與衛伐晉將濟河諸大夫皆曰不可邴意兹曰可乃伐河内齊侯皆斂諸大夫之軒唯邴意兹乘軒以其言當齊侯欲與衛侯乘共載與之宴而駕乘廣載甲焉使告曰晉師至矣齊侯曰比君之駕也寡人請攝以已車攝代衛車乃介而與之乘驅之或告曰無晉師乃止傳言齊侯輕所以不能成功田乞為齊大夫其收賦稅於民以小斗受之貸粟於民以大斗行陰德於民而景公弗禁繇此田氏得齊衆心宗族益彊晏子數諫景公景公不聽齊簡公之在魯也闞止有寵焉簡公悼公陽生子壬也闞止子我也事在六年及即位使為政陳成子憚之驟顧諸朝成子陳恒心不安故數顧諸御鞅言於公曰陳闞不可並也君其擇焉公弗聽後陳恒執公於舒州公曰吾早從鞅之言不及此又云簡公以田常監止一作闞俱為左右相監止幸於簡公田常心害監止大夫朝禦鞅諫曰田監不可並也公弗聽監止舍公宫田常兄弟四人常每欲殺子我子我閉門簡公與婦人飲檀臺將欲擊田常太史子餘曰田常非敢為亂將除害簡公乃止田常擊子我殺之簡公奔莒衛靈公時公叔氏以蒲畔靈公聞孔子來喜郊迎問曰蒲可伐乎對曰可靈公曰吾大夫以為不可今蒲衛之所以待晉楚也以衛伐之無乃不可乎孔子曰其男子有死之志公叔氏欲以蒲適他國而男子欲死之不樂適他婦人有保西河之志婦人恐懼欲保西河無戰意也吾所伐者不過四五人本與公叔同畔者靈公曰善然不伐蒲魯昭公伐季氏季平子登臺謝曰君以讒不察臣罪誅之請遷沂上弗許請囚於鄪弗許請以五乘亡弗許子家駒曰君其許之政自季氏乆矣為徒者衆衆將合謀弗聽郈昭伯曰必殺之季氏與叔孫氏孟氏共伐公公奔齊呉王夫差悉發精兵擊越敗之夫椒越王乃以餘兵五千人保棲於㑹稽呉王追而圍之越王謂范蠡曰以不聽子故至於此為之奈何蠡對曰持滿者與天定傾者與人節事者以地卑辭厚禮以遺之不許而身與之市勾踐曰諾乃令大夫種行成於呉膝行頓首曰君王亡臣勾踐使陪臣種敢告下執事勾踐請為臣妻為妾呉王將許之子胥言於呉王曰天以越賜呉勿許也種還以報勾踐勾踐欲殺妻子燔寳噐觸戰以死種止勾踐曰夫呉太宰嚭貪可誘以利請間行言之於是勾踐乃以美女寳噐令種間獻呉太宰嚭嚭受乃見大夫種於呉王種頓首言曰願大王赦勾踐之罪盡入其寳噐不幸不赦勾踐將盡殺其妻子燔其寳噐悉五千人觸戰必有當也嚭因說呉王曰越以服為臣若將赦之此國之利也呉王將許之子胥進諫曰今不滅越後必悔之勾踐賢君種蠡良臣若反國將為亂呉王弗聽卒赦越罷兵而歸韓宣惠王十六年秦伐韓急韓相公仲謂韓王曰與國非可恃也今秦之欲伐楚久矣王不如因張儀為和於秦賂以一名都具甲與之南伐楚此以一易二之計也韓王曰善乃警公仲之行將西購於秦楚王聞之大恐召陳軫告之軫乃警四境之内興師言救韓命戰車滿道路發信臣多其車重其幣謂韓王曰不穀國雖小已悉發之矣願大王遂肆志於秦不穀將以楚徇韓韓王聞之大恱乃止公仲之行公仲曰不可夫以實伐我者秦也以虛名救我者楚也王恃楚之虛名而輕絶彊秦之敵王必為天下大笑且楚韓非兄弟之國也又非素約而謀伐秦也已有伐形因發兵言救韓此必陳軫之謀也且王已使人報於秦矣今不行是欺秦也夫輕欺彊秦而信楚之謀臣恐王必悔之韓王不聽遂絶於秦秦因大怒益甲伐韓大戰楚救不至大破于岸門潁陰有岸亭燕王噲以子之為相貴重主斷蘇秦之在燕與子之為婚而蘇代與子之交蘇秦死蘇代為齊使於燕燕王問曰齊王奚如對曰必不霸燕王曰何也對曰不信其臣蘇代欲以激燕王以尊子之也於是燕王大信子之子之因遺蘇代百金而聽其所使鹿毛壽一作厝毛又曰甘陵縣本名厝謂燕王不如以國讓相子之人之謂堯賢者以其讓天下於許繇許繇不受有讓天下之名而實不失天下今王以國讓於子之子之必不敢受是王與堯同行也燕王因屬國於子之子之大重或曰禹薦益已而以啓人為吏及老而以啓為不足任天下𫝊之於益已而啓與交黨攻益奪之天下謂禹名傳天下於益已而實令啓自取之今王言屬國於子之而吏無非太子人者是名屬子之而實太子用事也王因收印自三百石吏已上而效之子之子之南面行王事而噲老不聽政顧為臣國事皆決於子之三年國大亂齊王建以后勝為相后勝受秦間金多使賔客入秦秦又多子金皆為反間勸王去從朝秦不修攻戰之備不助五國攻秦秦以故得滅五國五國亡秦兵卒入臨淄民莫敢格者王建遂降遷於共故齊人怨王建不蚤與諸侯合從攻秦聽姦臣賔客以亡其國楚懷王時秦昭王與楚婚欲與懷王㑹懷王欲行大夫屈平曰秦虎狼之國不可信不如無行懷王稚子子蘭勸王行奈何絶秦歡懷王卒行入武關秦伏兵絶其後因留懷王三十年入秦以求割地懷王怒不聽亡走趙趙不内復之秦竟死於秦奢僭列國之君數世而下席祖宗之勲烈承霸王之基扄奢侈萌生驕僭自至瀆宗廟之義廣宮室之制暨乎濫施名器弗顧典彛増飾冠服務夸竒曲蜉蝣之刺於是興焉曹昭公好奢而任小人民無所依焉故詩人賦蜉蝣以刺之魯隱公五年九月考仲子之宮初獻六羽持羽而舞天子八佾諸侯六大夫四魯僭諸公也桓公惠公之子也禮緇布冠繢緌諸侯之冠也𤣥冠丹組纓諸侯之齊冠也𤣥冠紫緌自魯桓公始也蓋僣王者之服也緌當用繢楚子熊通立三十五年伐隨隨曰我無罪楚曰我蠻夷也我有敝甲欲以觀中國之政請王室尊吾號隨人為之周請尊楚王室不聽還報楚楚熊通怒曰吾先鬻熊文王之師也早終成王舉我先公乃以子男田令居楚蠻夷皆率服而王不加位我自尊耳乃自立為武王與隨人盟而去魯莊公二十三年秋丹桓宮楹楹柱禮天子諸侯黝堊黝堊黑色大夫蒼士黈丹楹非禮也二十四年春刻桓公桷禮天子之桷斵之礱之加密䂖焉以細石礱之諸侯之桷斵之礱之大夫斵之士斵本刻桷非正也夫人所以崇宗廟也取非禮與非正而加之於宗廟以飾夫人非正也非禮謂娶讐女非正斵刻桷上楹也本非宗廟之宜故曰加言將親迎欲為夫人飾又非正也齊桓公設庭燎之百禮曰庭燎之百繇桓公始也僣天子也庭燎之差公蓋五十侯伯子男皆三十晉靈公壯侈厚斂以雕牆宋文公卒始厚葬用蜃炭益車馬始用殉燒蛤為炭以瘞壙多埋車馬用人從葬也重器備重猶多也椁有四阿棺有翰檜四阿四注椁也翰旁飾檜上飾皆王禮晉景公十二年始作六軍初作六車僭王也楚靈王㑹諸侯于申楚子示諸侯侈椒舉諫弗聽後使蕩侯等帥師圍徐以懼呉楚子次于乾谿在譙國城父縣南以為之援雨雪王皮冠秦復陶秦所遺羽衣翠被以翠羽飾被豹舄以豹皮為履魯昭公將殺季氏傳言殺者從昭公之辭告子家駒曰季氏為無道僭於公室乆矣諸侯稱公室吾欲弑之何如昭公素畏季氏意者以為如人君故言弑子家駒曰諸侯僭於天子大夫僭於諸侯久矣昭公曰吾何僭矣哉失禮成俗不自知也子家駒曰設兩觀禮天子諸侯臺門天子外闕兩觀諸侯内闕一觀乘大輅禮天子大輅諸侯輅車大夫大車上士飾車朱干干楯也以朱飾楯玉戚戚斧也以玉飾斧以舞大夏大夏夏樂也周所以舞夏樂者王者始起未制作之時取先王之樂與已同者假以風化天下天下大同乃自作樂取夏樂者與周俱文也王者舞六樂於宗廟之中舞先王之樂明有法之也也舞已之樂明有則也舞四夷之樂明大徳廣及八佾以舞大武此皆天子之禮也齊景公為西曲潢其深滅軌髙三仭横木龍虵立木鳥獸公衣黼黻衣素繡之裳一衣而五采具焉帶凍玉而冠且被髪亂首南面而立傲然呉王夫差出師在陳楚大夫皆懼曰闔廬惟能用其民以敗我於栢舉今聞其嗣又甚焉將若之何子西曰二三子恤不相睦無患呉矣今聞夫差㳄有臺榭陂池焉積土為髙曰臺有次木曰榭過再宿曰宿有妃嬙嬪御焉妃嬙貴者嬪御賤者皆内官一日之行所欲必成玩好必從珍異是聚觀樂是務視民如讐而用之日新夫自先敗也已安能敗我信讒夫讒言敗善君子之所憂偏聽生姦先民之攸戒蓋夫浸潤之譛萋菲之謗其言孔甘内深刺骨非夫特藴明識洞察情偽固將詒禍於賢哲兆亂於家邦者焉矧乃分五等之爵臨千乘之國有人民以為政有家陪而就列乃復昵比憸佞寘於左右啓納邪蠱申之誅罰俾含忠守道之士惄然隱憂蒐慝險中之夫得肆其志斯小雅風人之所傷也陳宣公多信讒君子憂懼焉作防有鵲巢憂讒賊也鄭厲公時齊人伐鄭孔叔言於鄭伯曰諺有之曰心則不競何憚於病競强也憚難也既不能彊又不能弱所以斃也國危矣請下齊以救國公曰吾知其所繇來矣姑少待我欲以申侯說對曰朝不及夕何以待君於是鄭殺申侯以說於齊且用陳轅濤塗之譛也五年濤塗怨鄭申侯反已於召陵故勸之城其賜邑曰美城之大名也子孫不忘吾助子請乃為之請於諸侯而城之美遂譛諸鄭伯曰美城其賜邑將以叛也申侯繇是得罪晉獻公立驪姬為夫人生奚齊及將立奚齊既與中大夫成謀姬謂太子曰君夢齊姜必速祭之齊姜太子母言求食太子祭於曲沃歸胙於公胙祭之酒肉公田姬置諸宮六日公至毒而獻之毒酒經宿輒敗而經六日明公之惑公祭之地地墳與犬犬斃與小臣小臣亦斃姬泣告曰賊繇太子太子奔新城新城曲沃公殺其傅杜原款或謂太子子辭君必辨焉以六日之狀自理太子曰君非姬氏居不安食不飽我辭姬必有罪君老矣吾又不樂吾自理則姬死姬死則君必不樂不樂為由吾也曰子其行乎太子曰君實不察其罪被此名也以出人誰納我縊于新城姬遂譛二公子曰皆知之重耳奔蒲夷吾奔屈詩之唐風蓋刺獻公好聽讒焉楚成王時晉陽處父侵蔡令尹子上救之夾泜而軍子上欲涉大孫伯曰晉人半涉而薄我悔敗何及不如紓之乃退舎陽子宣言曰楚師遁矣遂歸楚師亦歸太子商臣譛子上曰受晉賂而辟之楚之恥也罪莫大焉王殺子上衛成公出奔楚使元喧奉叔武以受盟於諸侯或訴元咺於衛侯曰立叔武矣其子角從公公使殺之角元咺子咺不廢命奉夷叔以入守晉厲公五年三郤讒伯宗殺之伯宗晉大夫三郤郤錡郤犫郤至厲公多外嬖姬歸欲盡去羣大夫而立諸姬兄弟寵姬兄曰胥童者嘗與郤至有怨及欒書又怨郤至不用其計而遂敗楚欒書欲待楚師退而擊之郤至云楚有六間不可失也乃使人間謝楚楚來詐厲公曰鄢陵之戰實至召楚欲作亂内子周立之㑹與國不具是以事不成厲公告欒書欒書曰其殆有矣願公試使至之周周京師微考之果使郤至於周欒書又使公子周見郤至郤至不知見賣也厲公騐之信然遂怨郤至欲殺之八年厲公獵與姬飲郤至殺豕奉進宦者奪之郤至射殺宦者公怒曰季子欺予公反以為郤至奪豕也将誅三郤未發也郤錡欲攻公曰我雖死公亦病矣郤至曰信不反君智不害民勇不作亂失此三者誰與我死耳公令胥童以兵八百人襲攻殺三郤魯昭公十三年㑹諸侯於平丘莒人愬於晉曰魯朝夕伐我㡬亡矣自昭公即位邾魯同好又不朝夕伐莒無故怨愬晉人信之所謂讒慝𢎞多我之不共魯故之以不共晉貢以魯故也晉侯不見公使叔向来辭曰諸侯将以甲戌盟寡君將不得事君矣請君無勤託謙辭以絶魯子服恵伯對曰君信蠻夷之訴蠻夷謂莒以絶兄弟之國棄周公之後亦惟君寡君聞命矣齊靈公時慶克通於聲孟子與婦人蒙衣乘輦而入於閎慶克慶封父䝉衣亦為婦人服與婦人相冒閎巷門鮑牽見之以告國武子鮑牽鮑叔牙曽孫武子召慶克而謂之慶克乆不出慙卧於家夫人所以怪之而告夫人曰國子謫我譴責也夫人怒國子相靈以㑹㑹伐鄭髙鮑處守髙無咎鮑牽及還將至閉門而索客蒐索備姦人孟子訴之曰髙鮑將不納君而立公子角國子知之靈公刖鮑牽而逐髙無咎無咎奔莒宋平公共公子也初芮司徒生女子芮司徒宋大夫赤而毛棄諸堤下共姬之妾取以入共姬宋伯姬也名之曰棄長而羙平公入夕平公共姬子也共姬與之食公見棄也而視之尤尤甚也姬納諸御嬖生佐佐元公惡而婉佐貎惡而心順太子痤羙而狠貎羙而心狠戾合左師畏而惡之合左師向戌寺人恵牆伊戾為太子内師而無寵恵牆氏伊戾名楚客聘於晉過宋太子知之請野享之公使往伊戾請從之公曰夫不惡女乎夫謂太子也對曰小人之事君子也惡之不敢逺好之不敢近敬以待命敢有二心乎縱有共其外莫共其内伊戾為太子内師不行恐内侍廢闕臣請往也遣之至則㰱血用牲加書徵之詐作盟處為太子反徵驗而騁告公騁馳也曰太子將為亂與楚客盟矣公曰為我子又何求對曰欲速言欲速得公位公使視之則信有焉有盟徵問諸夫人與左師則皆曰固聞之公囚太子太子乃自縊而死景公時皇瑗之子麋瑗宋右師有友曰田丙而奪其兄酁般邑以與之酁般愠而行告桓司焉之臣子儀克克在下邑不與魋之亂故在子儀克適宋告夫人曰麋將納桓氏公問諸子仲子仲皇野初子仲將以杞姒之非我為子為適子杞姒子仲之妻麋曰必立伯也伯非我兄是良材子仲怒弗從故對曰右師則老矣不識麋也言右師老不能為亂麋不可知公執執麋皇瑗奔晉楚靈王時成虎為大夫或譛成虎於楚子楚子謂虎若敖之餘也遂殺之成虎令尹子玉之孫與鬭氏同出於若敖宣四年鬭椒作亂今楚子信譛而訖討若敖之餘齊景公時田穰苴為將軍扞燕晉之師晉師罷去燕師度水而解追擊之遂取所亡邦内故境而引兵歸景公既見穰苴尊為大司馬田氏日以益於齊已而大夫鮑氏髙國之屬害之譛於景公景公退穰苴苴發疾而死時景公任用讒佞賞無功罰不辜晏子諫曰臣聞明君望見聖人而信其教不聞聽讒佞以誅賞又問晏子曰治國之患亦有常乎對曰讒夫佞人之在君側者好惡良臣而行與小人比國之常患也公曰讒佞人則亦誠不善矣雖然則奚曽與國常患乎晏子曰君以為耳目而好繆也夫上亂君之耳目下使羣臣皆失其職豈不誠足患哉楚平王七年殺其大夫伍奢伍尚太子建奔宋初楚子之在蔡也鄖陽封人之女奔之生太子建及即位使伍奢為師費無極為少師無寵焉欲譛諸王曰建可室矣王為之聘於秦無極與逆勸王取之又言於楚子曰晉之伯也邇於諸夏而楚僻陋故不能與之爭若大城城父而寘太子焉以通北方王收南方是得天下也王説從之故太子建居於城父無極言於楚子曰建與伍奢將以方城之外叛自以為猶宋鄭也齊晉又交輔之將以害楚其事集矣王信之問伍奢伍奢對曰君一過多矣一過納建妻何信於讒王執伍奢忿奢切言使城父司馬奮揚殺太子未至而使遣之知太子寃故遣令去三月太子建奔宋王召奮揚奮揚使城父人執已以至王曰言出於余口入於爾耳誰告建也對曰臣告之君王命臣曰事建如事余臣不佞佞才也不能茍貳奉初以還奉初命以周旋不忍後命故遣之既而悔之亦無及已王曰而敢來何也對曰使而失命召而不來是再奸也奸犯也逃無所入王曰歸從政如他日善其言舎使還無極曰奢之子材若在呉必憂楚國盍以免其父召之彼仁必來不然將為患王使召之曰來吾免而父棠君尚謂其弟員棠君奢之長子尚也為棠邑大夫員尚弟子胥曰爾適呉我將歸死吾知不逮我能死爾能報聞免父之命不可以莫之奔也親戚為戮不可以莫之報也奔死免父孝也度功而行仁也擇任而徃知也知死不辟勇也父不可棄名不可廢爾其勉之相從為愈伍尚歸奢聞員不來曰楚君大夫其旰食乎楚人皆殺之衛靈公時孔子居衛頃之或譛孔子於靈公靈公使公孫余假一出一入臣欽若等按史記音義曰以兵仗入脅孔子孔子恐獲罪焉居十月去衛齊悼公時或譛胡姬於齊侯胡姬景公妾曰安孺子之黨也齊侯殺胡姬安孺子景公太子荼也呉王夫差時太宰伯嚭數與伍子胥爭越議因讒子胥曰伍員貎忠而實忍人其父兄不顧安能顧王王前欲伐齊員彊諫已而有功用是反怨王王不備伍員員必為亂與逄同共謀讒之王王始不從乃使子胥於齊聞員託子於鮑氏王乃大怒曰伍員果欺寡人欲反使人賜子胥屬鏤劒以自殺子胥大笑曰我令而父霸又立若若初欲分呉國半予我我不受已今若反以讒誅我嗟乎嗟乎一人固不能獨立報使者曰必取吾眼置東呉門以觀越兵入也衛出公逐其臣太叔遺初衛侯占夢嬖人以能占夢見愛求酒於太叔僖子僖子太叔遺不得與卜人比而告公曰君有大臣在西南隅弗去懼害託占卜夢而言乃逐太叔遺遣奔晉魯元公時呉起為將攻齊大破之人或惡吳起曰起之為人猜忍人也其少時家累千金㳺仕不遂遂破其家鄉黨笑之呉起殺其謗已者三十餘人而東出衛郭門與其母訣齧臂而盟曰起不為卿相不復入衛遂事曽子居頃之其母死起終不歸曽子簿之而與起絶起乃之魯學兵法以事君殺妻以求將夫魯小國而有戰勝之名則諸侯圗魯矣且魯衛兄弟之國也而君用起則是棄魯魯君疑之謝呉起魏武侯時呉起為西河守公叔為相尚魏公主而害呉起公叔之僕曰起易去也公叔曰奈何其僕曰呉起為人節廉而自喜名也君因先為武侯言曰夫呉起賢人也而侯之國小又與彊秦壤界臣竊恐起之無留心也武侯即曰奈何君因謂武侯曰試延以公主起有留心則必受之無留心則必辭之以此卜之君因召呉起而與歸即令公主怒而輕君呉起見公主之賤君也則必辭於是呉起見公主之賤魏相果辭鬼委武侯武侯疑之起懼得罪遂去即之楚魯平公將出嬖人臧倉者請曰他日君出則必命有司所之今乗輿已駕矣有司未知所之敢請嬖人愛幸小人也公曰將見孟子平公敬孟子有不敢請召將徃就見之也臧倉曰何哉君所為輕身以先於匹夫者以為賢乎禮義繇賢者出而孟子之後䘮踰前䘮君無見焉匹夫亡夫也臧倉言君何為輕千乘而先匹夫乎以為君子賢者當行禮義而孟子前䘮父約後䘮母奢君毋見之也公曰諾楚懷王時屈原為左徒博文彊志明於治亂嫻音閑於辭令入則與王圗議國事以出號令出則接遇賔客應對諸侯王甚任之上官大夫與之同列爭寵而心害其能懷王使屈原造為憲令屈原屬草藁未定上官大夫見而欲奪之屈原不與因讒之曰王使屈原為令衆莫不知每一令出平伐其功曰以為非吾莫能為也王怒而疏屈原燕惠王為太子時常不快於樂毅是時樂毅為上將軍并䕶趙楚韓魏燕之兵以伐齊破之濟上而諸侯兵罷歸而燕軍樂毅追至於臨淄下齊七十餘城皆為郡縣以屬燕惟獨莒即墨未服㑹惠王即位齊之田單聞之乃縱反間於燕曰齊城不下者兩城耳然所不早拔者聞樂毅與燕新王有隙欲連兵且留齊南面而王齊齊之所患唯恐他將之來於是燕惠王固已疑樂毅得齊反間乃使騎刼代將魏安釐王時公子無忌率五國之兵破秦軍於河外走蒙驁遂乘勝逐秦軍至函谷關抑秦兵秦兵不敢出當是時公子威振天下諸侯之客進兵法公子皆名之故世俗稱魏公子兵法秦王患之乃行金萬斤於魏求晉鄙客令毁公子於魏王曰公子亡在外十年矣今為魏將諸侯將皆屬諸侯徒聞魏公子不聞魏王公子亦欲因此時定南面而王諸侯畏公子之威方欲共立之秦數使反間偽賀公子得立為魏王未也魏王日聞其毁不能不信後果使人代公子將公子自知再以毁廢乃謝病不朝與賔客為長夜飲飲醇酒多近婦女日夜為樂飲者四嵗竟病酒而卒趙王遷時秦使王翦攻趙趙使李牧司馬尚禦之秦多與趙王寵臣郭開金為反間言李牧司馬尚欲反趙王乃使趙蔥及齊將顔聚代李牧李牧不受命趙使人微捕得李牧斬之廢司馬尚後三月王翦因急擊趙大破之殺趙蔥虜趙王遷及其將顔聚遂滅趙魏王時史不書王謚龎恭與太子質於邯鄲恭謂魏王曰今一人言市有虎王信之乎王曰否二人言市有虎王信之乎王曰寡人疑之矣三人言市有虎王信之乎王曰寡人信之矣龎恭曰夫市之無虎明矣然而三人言而成虎今邯鄲去大梁也逺於市而議臣者過於三人矣願大王察之於是辭行而讒言先至恭果不見魏君矣册府元龜卷二百五十三
