body:
  text: 册府元龜卷九百五宋王欽若等撰總錄部書信第三宋王㣲字景𤣥一名徵起家司徒祭酒始興王後軍功曹記室參軍素無宦情稱疾不就仍除中書侍郎又擬南琅琊義興太守並固辭吏部尚書江湛舉徵為吏部郎徵與湛書曰弟心病亂度非但蹇躄而已此處朝野所共知騶㑹忽招蓽門閭咸以為祥怪君多識前世之載天值何其易傾弟受海内駭笑不過如燕石秃鶖而未知君何以自解於良史耶今雖王道鴻鬯或有激朗於天表必欲探援潛寶傾海求珠自可卜肆巫祠之間馬棧牛口之下賞劇孟於博徒援卜式於芻牧亦有西戎孤臣東都戒士上窮範馳之御下盡詭遇之能兼鱗雜襲者必不示於世矣且廬於承明署乎金馬皆明察之官又賢於管庫之末何為刼勒通家疾人塵穢難甚之選将以靖國不亦益囂乎書云任官惟賢才而君擢士先疾廢芃芃棫樸似不如此且弟曠違兄姊迄将十載姊時歸來終不任輿曵入閤兄守金城永不堪扶抱就路若不憊疾非性僻而何此君曰表裏無假長目飛耳也常謂生遭太公将即華士之戮幸遇管叔必蒙僻儒之養光武以馮衍才浮其實故棄而不齒諸葛孔明云來敏亂羣過於孔文舉况無古人之才槩敢干周漢之常刑彼二三英賢足為曉治與否恐君逄此時或亦不免髙閣乃復假名不知己者豈欲自比衛賜耶君欲高斆山公而以仲容見處徒以搥提禮樂本不叅選鄙夫瞻彼固不任下走未知新沓何如州陵耳而作不師古坐亂官政誣飾蚯蚓冀招神龍如復託以眞素者又不宜居華留名有害風俗君亦不至期人如此若交以為人賜舉未以己勞則商販之事又連所不忍聞也豈謂不肖易擢貪者易誘凡此數者君必居一焉雖假天口於齊駢藉鬼説於周季公孫碎毛髪之文荘生縱􅐯瀁之極終不能舉其契為之辭矣子将明魂必靈咍於蒿里汝潁餘彦将拂衣而不朝浮華一開風俗或從此而爽鬼谷以揣情為最難何君忖度之輕謬今有此書非敢叨擬中散誠不能顧影負心純盗虚聲所以綿絡累紙本不營尚書虎𤓰板也成童便往來居舍晨省復經周旋如有諸甥亦何得頓絕慶弔然生平之意自於此都盡君平公云生我名者殺我身天爵且猶滅名安用吏部郎哉其舉可陋其事不經非獨縉紳者不道僕妾皆将笑之忽忽不樂自知夀不得長且使千載知弟不詐諼爾徵既為始興王濬府吏濬數相存慰㣲奉答牋書輙飭以辭采㣲為古文甚頗抑揚袁淑見之謂為訴屈㣲因此又與縱弟僧綽書曰吾雖無人鑒要是早弟毎共晏語前言何嘗不以止足為貴且持盈畏滿自是家門舊風何為一旦落漠至此當局苦迷将不然耶詎容都不先聞或可不知爾衣冠胄𦙍如吾者甚多才能固不足道惟不傾側溢詐士頗以此容之至於規矩細行難可詳料疹疾日滋縱恣意甚人道所貴廢不復修幸値聖明兼容置之教外且舊恩所及毎蒙寛假吾亦自揆疾疹重侵難復支振民生安樂之事心死乆矣所以視日偷存盡於大布糲粟半夕安寢便以自度血氣盈虚不復稍道長以丸散為和羮弟為不見之邪疾廢居然且事一已上不足敗俗傷化下不至毁辱家門泊爾尸居無方待化凡此二三皆是事實吾與弟書不得家中相欺也州陵此舉為無所因反覆思之了不能辭豈見吾近者諸牋耶良可怪笑吾少學作文又晩節如小進使者公欲民不偷毎加存飾詶對尊貴不厭敬恭且文辭不怨思抑揚則流澹無味文好古貴能連類可悲一往視之如似多意當見居非求志清論所排便是通辭訴屈耶爾者眞可謂眞素寡矣其數旦見客小防自來盈門亦不煩獨舉吉也此軰乃云語勢所至非其要也弟無懷居今地萬物初不以相非然魯器齊簴實宜書紳今三署六府之人誰表裏此内儻疑弟豫有力於素論何如哉則吾長阨不死終誤盛壮也江不過强吹拂吾云是巖穴人巖穴人情所高吾得當此則鷄鶩變作鳯凰何為干飭㢘隅秩秩見於面目所惜者大耳諸舍闔門皆蒙時私此既未易陳道故嘗因含聲不言至兄弟尤為叨竊臨海頻煩二郡謙亦越進清階吾髙枕家巷遂至中書郎此足以闔棺矣又前年優㫖自弟所宣雖夏后撫辜人周宣及鰥寡不足過也語皆修簡校跡不為虚飭也作人不阿䛕無縁頭髪見白稍學諂詐且吾何以為足不能行自不得出户頭不耐風故不可扶曵家本貧餒至於惡衣蔬食設使盗跖居此亦不能兩展其足妄意珍藏也正今選官設作此舉於吾亦無劒㦸之傷所以懃懃畏人之多言也管子晉賢乃闗人主之輕重此何容易哉州陵亦自言視明聽聰而返區區飾吾何辯致而下英俊夫奇士必龍居深藏與蛙蝦為伍放勲其猶難之林宗軰不足識也似不肯睠睠奉牋記彫琢獻文章居家近市㕓親戚滿城府吾猶自知袁陽源軰當平此不飾詐之與直獨兩不闗吾心又何所耿介弟自宜以解塞羣賢矣兼悉怒此言自爾家任兄故能也日日望弟來属病終不起何意向與江書粗布胷心無人可寫比面乃具與弟書便覺成本以當半日相見吾既惡勞不得多語樞機幸非所長相見亦不勝讀此書也親屬欲見自可示無急付手時論者或云㣲之見舉廬江何偃亦豫其議慮為㣲所咎與書自陳㣲報之曰卿昔稱吾於義興吾嘗謂之見知然復自怪鄙野不參風流未有一介孰悉於事何用獨識之也近日何見綽送卿書雖知如戲知卿固不能相哀相哀之未知何相期之可論卿少陶𤣥風淹雅修暢自是正始中人吾眞庸性人爾自然志操不倍王樂小兒時尤麄笨無好常從博士讀小小章句竟無可口吃不能劇讀遂絶意於尋求至二十左右復就觀小説往來者見床頭有數帙書便言學問試就簡當何有哉乃復持此擬議人羣尚獨愧笑楊子之褒贍猶耻辭賦為君子若吾篆刻菲亦甚矣卿諸人亦當尤以此見議或謂言深博作一叚意氣鄙薄人世初不敢然是以每見世人文賦書論無所是非不解處即日借問此其本心也至於生平好服上藥起年十二時病虚耳所撰服食方中粗言之矣自此始信攝養有徵故門冬昌木隨時參進寒温相補欲以扶䕶色羸見冀白首家貧乏役至於春秋令節輙自将兩三門生入草采之吾實倦游醫部頗曉和藥尤信本草欲其必行是以躬親意在取精世人便言希仙好異矯慕不羈不同家頗有罵之者又性知畫繢蓋亦鳴鵠識夜之機盤紆糾紛或記心目故兼山水之愛一往跡求皆彷像也不好詣人能忘榮以避權右宜自宻應對舉止因卷慙自保不能免其所短爾繇來有此數條二三諸賢因復架累致之高塵詠之清壑瓦礫有資不敢輕厠金銀也而頃年嬰疾沉淪無已區區之情愒於生存自恐難復而先命猥加魂氣褰繭常人不得作常自處疾苦正亦卧思已熟謂有記自論既仰天光不夭庶類兼望諸賢共相哀體而卿首唱誕言布之翰墨萬石之慎或未然耶好盡之累豈其如此綽大駭歎便是闔朝兄病者吾本像人加疹意昏一旦聞此便惶怖矣五六日來復苦心痛引喉状如胷中悉腫甚自憂力作此答無復條貫貴布所懷落漠不舉卿既不可解立欲便别且當笑王僧逹為宣城太守時沈璞守旴𣅿魏太武攻之璞拒退僧逹與璞書曰足下何如想舘舍平安士馬無恙離析有時音㫖無日憂詠沉吟増其勞望間者獯獫扈横掠刺邉鄙郵販絕塵勺汴靡瞻瞻江眡淮𦕈然千里吾聞涇陽梗棘伊滑荐遁鳥集絃絶患深自古承知乃昔冦苦城境勝胄朝飡任甲宵舍烽鼓交驚羽鏑驟合而足下砥兵勵伍總接豪産遂能固孤城䧟死地古之田孫何以尚兹商驛始通甚善甚善周朗為江夏王義恭太尉參軍元嘉二十七年春朝議當遣義恭出鎮彭城為北討大統朗聞之解職及義恭出鎮府主簿羊希從行與朗書戲之勸令獻奇進䇿朗報書曰羊生足下豈當適使人進哉何卿才之更茂也宅生結意可復佳爾屬華比采何更工耶視已反覆慰亦無已觀諸紙上方審卿復逄知己動以何術而能毎降恩明豈不為足下欣耶然更憂不知卿死所處爾夫匈奴之不誅有日皇居之亡辱舊矣天下孰不憤心悲腸以忿胡人之患孊衣媮食以望國家之師自智士鉗口雄人蓄氣不得議圗邉之事者良淹嵗紀今天子以炎軒之徳冡輔以姬吕之賢故赫然發怒将以匈奴亹旗惻然動仁欲使餘氓被惠及取士之令朝發宰士暮登英豪調兵之詔夕行主公旦升雄俊延賢人者固非一日况復加此焉夫天下之事砥行磨名欲不辱其志氣選竒蓄異将進善於所天非但有建國之謀不及安民之論不與至反以孝潔生議於鄉曲忠烈起謗於君宷身不絓王臣之録名不厠通人之班顛倒國門湮銷丘里者自數十年以往豈一人哉若吾身無他伎而出値明君變官望主嵗増恩價竟不能柔心飾帶取重左右校於向士則榮已多料於今職則笑亦廣而足下方復廣吾以馳志之時求予以安邉之術何足下不知言也若以賢未登則今之登賢如此以才應進則吾之非才若是豈可欲以殞海之鬐望鼓鰓於䜿鱗之肆墜風之羽覬振翮於騫毳之林其不能俱陪淥水並負青天可無待於明見若乃闕奇謀深智之術無悦主狎俗之能亦不可復稍為卿説但觀以上國再毁之臣望府一逐之吏當復是天下才不此皆足下所親知吾雖疲冗亦甞聼君子之餘論豈敢忘之凡士之置身有三其一則雲户岫寝欒危桂榮秣芝浮霜剪松沉雪憐肌畜髓寶氣愛魂非但土石侯卿腐鴆梁錦實乃竚意天后睨目羽人次則刳心掃智剖命驅生横議於雲臺之下切辭於宣室之上衍主徳而批民患進貞白而酖姧猾委玉入而齊聲禮掲金出而烹勍寇使車軌一風甸道共徳令功日濟而已無跡道日富而君難名致諸侯斂手天子改觀其末則厭􅏁而出望旃而入結冕兩宫之下鼔袖六王之間俛眉脇肩言天下之道徳瞋目扼腕陳縱横於四海理有泰則止而進調覺迕則返而還閑居違官交造頓罷捐暮遺憂夷毁銷譽呼噏以補其氣繕嚼以輔其生凡此者皆志士仁人之所行非吾之所能也若吾幸病不及死役不至身蓬藜既滿方杜長者之轍穀稼是諮自絶世豪之顧塵生牀帷苔積階月又擔中山木時華月深池上海草嵗榮日蔓且室間軒左幸有陳書十篋席隅奥右頗得宿酒數壺按絃拭徽讎方校石時復陳局露初奠爵星晩驩然不覺是羲軒後也近春田三頃秋園五畦若此無災山装可具候振飲之罷俟封勒之畢當敬觀邠鄷肅尋伊鄗傍眺燕隴邪履遼衞覔我周之軫迹弔他賢之憂夭當其少渉未休此欲但理實詭固物好交加或徵勢而笑其言或觀謀而害其意夫楊朱以此猶見嗤於梁人况才減楊子之器物甚魏君之意者哉若如漢太宗之言李廣此固許天下之有才又知天下之時非也豈若黨巷閭里之間忌見貞士之遭遇便為是臧獲傭人之徒爾士固願呈心於其主露奇於所歸卿相末事也若廣者何用侯為至乃復有致謁於為亂之口被訕於害正之徒心竒而無繇露事直而變為枉豈不痛哉豈不痛哉若足下可謂冠負日月藉踐淵海心支身首無不通炤今復出入燕河交闗姬衞整笏振毫已議於帷筵之上提鞭鳴劒復呵於軍埸之間身超每深恩之所集心動必明主之所亮可不直議正身輔人君之過誤明目張膽謀軍家之得失抜忠勇之将薦俊正之士此乃足下之所以報也不爾便擐甲脩戈徘徊左右衛君王之身當馬首之鏑闗必固之壘交死進之戰使身分而主豫寇滅而兵全此亦報之次也如是則繫匈奴於北闕無日矣亡但黙黙窺寵而坐謂子有心敢書薄意朗之辭意倜儻類皆如此羊希太山人吳郡陸法眞孝武世歴官有清節法眞嘗為劉秀之安北録事叅軍希與安北諮議叅軍孫銑書曰足下同僚似有陸錄事者此生東南明地又張𤣥外孫持身至清雅有志節年高位下秉操不衰計當日夕想申意袁淑為太子左衛率何尚之致仕於方山著退居賦以明所適而議者咸謂尚之不能固志淑與尚之書曰昨遣脩問承丈人已晦志山田雖曰年禮宜遵亦事難期貴俾疎班邴魏通美於前策龔貢山衛淪慙乎曩篇規迨休告雪滌素懷冀尋幽之勸畢栖𤣥之適但淑逸操偏逈野性懵滯果兹冲叙必沉樂忘歸然而邑議塗間者謂丈人徽名未耗譽業方籍儻能失事康道降節殉務企南頻或屈俶此行永决矣望眷有積約日無誤尚之宅在南澗寺側故書云南頻毛詩所謂于以采蘋南澗之濵也南齊丘珍孫為寕朔将軍時吳郡錢塘人褚伯玉有高世之行王僧逹為吳郡苦禮致之伯玉不得已停郡信宿裁交數言而退珍孫與僧逹書曰聞褚先生出居貴舘此子滅景雲棲不事王侯抗高木食有年載矣自非折節好賢何以致之昔文舉棲治城安道入昌門於兹而三焉夫却粒之士飡霞之人乃可暫致不宜乆覊君當思遂其高歩成其羽化還䇿之日蹔紆清塵亦願助為譬説僧逹答曰褚先生從白雲遊舊矣古之逸民或留慮兒女或使華隂成市而此子索然唯朋松石分於孤峰絕嶺者積數十載近故要其來此冀慰日夜比談討芝桂借訪荔蘿若已窺煙液臨滄洲矣知君欲見之輙當申譬劉善明為征虜将軍淮南宣城二郡太守善明少與崔祖思友善祖思出為青冀二州善明遺書曰昔時之遊于今邈矣或携手春林或負杖秋澗逐清風於林杪追素月於園垂如何故人殂落殆盡足下方擁旄北服吾剖竹南甸相去千里間以江山人生如寄來㑹何時常覽書史數千年來畧在眼中矣歴代參差萬里同異夫龍虎風雲之氣亂極必夷之機古今豈殊此實一揆日者沈攸之擁長蛇於外粲秉復為異識所推唯有京鎮創為聖基遂乃擢吾為首佐授吾以大郡付吾闗中委吾留任既不辨有抽劔兩城之用横槊搴旗之能徒以挈瓶小智名參佐命常恐朝露一下深恩不酬憂深責重轉不可據還視生世倍無次緒藿羹布被猶篤鄙好惡色憎聲暮齡尤甚出藩不與台輔别入國不與公卿遊孤立天地之間無猜無託惟知奉上以忠事親以孝臨民以潔居家以儉足下今鳴笳舊鄉衣繡故國宋李荼毒之悲已蒙蘇㤗闗河倒懸之苦方須救㧞遣游辯之生為鄉導之使輕装啟行經營舊壤令泗上歸業稷下還風君欲誰讓耶聊送諸心敬申貧贈張融為南陽王友融父暢先為丞相長史義宣事難暢為王𤣥謨所錄将殺之𤣥謨子瞻為南陽王前軍長史融啟求去官不許融家貧願祿初與從叔征北将軍永書曰融昔稱幼學早訓家風雖則不敏率以成性布衣葦席弱年所安簞食瓢飲不覺不樂但世業清貧人生多待榛栗棗脩女贄既長束帛禽鳥男禮已大勉身就官十年七仕不欲代耕何至此事昔求三吳一丞雖屬舛錯今聞南康缺守應得為之融不知階級階級亦可不知融政以求丞不得所以求郡求郡不得亦可復求丞又與吏部尚書王僧䖍書曰融天地之逸民也進不辯貴退不知賤兀然造化忽如草木實以家貧累積孤寡傷心八姪俱孤二弟頓弱撫之而感古人所悲豈能山海陋祿申融情累阮籍愛東平土風融亦欣晉平閑外時議以融非御人才竟不果張充為武陵王友武帝欲以充父緒為尚書僕射王儉執不可充以為愠與儉書曰頃日路長霖霞韜晦涼暑未平想無虧攝充幸以漁釣之閑鎌採之暇時復引軸以自娛逍遥乎前史縱横萬古動黙之路多端紛綸百年升降之塗不一故金剛水柔性之别也圓行方止器之異也善御性者不違金水之質善為器者不易方圓之用充生平少長偶不以利欲干懷三十六年差得以棲貧自澹介然之志峭聳霜崖確乎之情峰横海岸至如彯纓天閣既謝廊廟之華綴組雲臺終愧衣冠之秀寔繇氣岸疎凝情塗狷隔獨師懷抱不見許於俗人孤秀神崖每邅迴於在世長羣魚鳥畢景松阿雖復玉没於訪珪之辰桂掩於捜芳之日汎濫於漁父之遊偃息於卜居之㑹如此而已充何求哉若夫驚巖罩日吐海連天竦石崩尋分危落仞桂蘭綺靡叢雜於山幽松栢陰森相繚於澗側元卿於是乎不歸伯休亦以兹長往至於飛竿釣渚濯足滄州獨浪煙霞髙卧風月悠悠琴酒岫逺誰來灼灼文言空擬方寸不覺鬱然千里路隔江川毎至西風何嘗不歎丈人嵗路未彊學優而仕道佐蒼生功横海望可謂徳盛當時孤松獨秀者也而茂陵之彦望冠蓋而長懷渭川之甿佇簪裾而竦歎得無惜乎充琨西百姓岱表一人蠶而衣耕而食不能事王侯覔知己見造時人騁遊説容與於屠博之間其懽甚矣然舉世皆謂充為狂充亦何能與諸君道之哉是以披聞見掃心胷述平生論語黙所可通夣交魂推襟送抱者唯丈人而已闕廷夐阻書罷莫因儻遇樵夫妄塵執事儉以為脱畧弗之重仍以書示緒緒杖之一百又為御史中丞到偽所奏免官禁錮沈約見其書歎曰充始為之敗終為之成乆之為司徒諮議參軍梁陳伯之為征南将軍江州刺史叛入魏魏以為平南将軍光祿大夫天監四年詔太尉臨川王宏率軍北討宏命記室丘遲私與伯之書曰陳将軍足下無恙幸甚幸甚将軍勇冠三軍才為世出棄鷰雀之小志慕鴻鵠以高翔昔因機變化遭逄明主立功立事開國承家朱輪華轂擁旄萬里何其壮也如何一旦為奔亡之虜聞鳴鏑而股戰對穹廬以屈膝又何劣耶尋君去就之際非有他故直以不能内審諸已外受流言沈迷猖蹷以至於此聖朝赦罪論功棄瑕錄用收赤心於天下安反側於萬物此将軍之所知不假僕一二談也朱鮪渉血於友于張繡倳刃於愛子漢主不以為疑魏君待之若舊况将軍無昔人之罪而勲重於當世夫迷塗知反往哲是與不逺而復先典攸髙主上屈法伸恩呑舟是漏将軍松栢不翦親戚安居髙臺未傾愛妾尚在悠悠爾心亦何可言今功臣名将鴈行有序懷黄佩紫贊帷幄之謀乗軺建節奉疆埸之任並刑馬作誓傳之子孫将軍獨􅌤顔借命驅馳異域寕不哀哉夫以慕容超之彊身送東市姚泓之盛面縛西都故知霜露所均不育異類姬漢舊邦無取雜種北虜僭盗中原多歴年所惡積禍盈理至燋爛况偽孽昏狡自相夷戮部落攜離酋豪猜貳方當繫頸蠻邸懸首槀街而将軍魚逰於沸鼎之中鷰巢於飛幕之上不亦惑乎暮春三月江南草長雜花生樹羣鶯亂飛見故國之旗鼓感平生於疇日撫弦登陴豈不愴恨所以㢘公之思趙将吳子之泣西河人之情也将軍獨無情哉想早勵良圖自求多福伯之乃於尋陽擁衆八千歸沈約為尚書令侍中乆處端揆有志台司時論咸謂為宜而帝終不用乃求外出又不見許與徐勉素善遂以書陳情於勉曰吾弱年孤苦傍無朞屬往者将墜於地契濶迍邅困於朝夕崎嶇薄宦事非為己望得小祿傍此東歸歳逾十稔方忝襄陽縣公私情計非所了具以身資物不得不任人事永明末出守東陽意在止足而建武肇運人世膠加一去不返行之未易及昬猜之始王政多門因此謀退庶㡬可果託卿布懷於徐令想記未忘聖道聿興謬逄嘉運往志宿心復成乖爽今嵗開元禮年云至懸車之請事繇恩奪誠不能宏宣風政光闡朝猷尚欲討尋文簿時議同異而開年以來病増慮切當繇生靈有限勞役過差摠此彫竭歸之暮年牽䇿行止弩力祗事外觀傍覽尚似全人而形骸力用不相綜攝常須過自策持方可僶俛解衣一卧支體不復相闗上熱下冷月増日篤取煖則煩加寒必利後差不及前差後劇必甚前劇百日數旬革帶常應移孔以手握臂率計月小半分以此推筭豈能支乆若此不休日復一日将貽聖主不追之恨冐欲表聞乞歸老之秩若天假其年還得平健才力所堪唯思是策勉為言於高祖請三司之儀弗許但加鼔吹而已伏挺字士標為西中郎記室叅軍遂築室不復仕挺少有盛名又善處當世朝中勢素多與交逰故不能乆事隠静時僕射徐勉以疾假還宅挺致書以觀其意曰昔徳士懷顧戀興數日輔嗣思友情勞一旬故知深心所係貴賤一也况復恩隆世親義重知已道庇生人徳宏覆蓋而朝野懸隔山林邈殊雖咳唾時沾而顔色不覯東山之歡豈云旋復西風可懷孰能無思加以静居廓處顧影莫酬秋風四起園林易色凉野寂寞寒蟲吟呌懷抱不可直置情慮不能無託時因吟詠動輙盈篇楊生沈鬱且猶覆盎惠子五車彌多蹐駮一日聊呈小文不期過賞還逮隆渥累牘兼翰紙縟字磨誦復無巳徒恨許與過當有傷准的昔子建不欲妄讚陳琳恐見哂後代今之過奢餘論将不有累清談挺竄迹草萊事絶聞見藉以謳謡得之輿牧仰承有事砭石仍成簡通娛腸悦耳稍從擯落晏處榮觀務在滌除綺羅絲竹二列頓遣方丈員案三桮僅存故以道變區中情冲域外操彼弦誦賁兹觀省追留侯之却粒念韓卿之辭榮睠想東都屬懷南岳鑽仰來貺有符下風雖云幸甚然則未喻雖復帝道康寕走馬行却繇庚得所寅亮有歸悠悠之人展氏猶且攘袂浩浩之泉寗叟方欲褰裳是知君子拯物義非狥已思與赤松子逰誰其克遂願驅之仁夀綏此多福雖則不言四時行矣然後黔首有庇薦紳靡奪白駒不在空谷屠羊豫蒙其賚豈不休哉豈不休哉昔杜眞自閉深室郎宗絶迹幽野難矣誠非所希井丹髙潔相如慢世尚復遊渉權門雍容鄉邑常謂此道為㤗每竊慕之方念擁箒延思以陳侍者請至農隙無待邀求挺誠好屬文不㑹今世不能促節局歩以應流俗事等昌菹謬褊嗜是用不羞固陋無憚龍門昔敬通之賞景卿孟公之知仲蔚止乎通人猶稱盛美况在時宗彌為未易近以蒲槧勿用箋素多闕聊效東方獻書丞相須得善寫更請潤訶儻逄子侯比復削牘勉報曰復覽來書累牘兼翰事苞出處言兼語黙事義周悉意致深逺發函伸紙倍増憤歎卿雄州擢秀弱冠升朝穿綜百家佃漁六學觀眸表其韶慧視色見其英華若燕國之名駒邁雲中之白鶴及占顯邑試吏腴壤将有武城弦歌桐鄉謡詠豈與卓魯㫁㫁同年而語邪方當見賞長者良能有加寵授餙兹簮帶寘彼周行而欲逺慕卷舒用懷愚智既知益之為累爰悟滿則辭多髙蹈風塵良所欽挹沉以金商戒節素秋御序蕭條林野無人共樂偃卧墳籍逰浪儒𤣥物我兼忘寵辱誰滯誠乃歡羡用有殊同今逖聼旁求興懷寤宿白駒空谷幽人引領貧賤為耻鳥獸難羣故當捐此薜蘿出從鵷鷺無乖隠顯不亦休哉吾智乏佐時才慙濟世禀承朝則不敢荒寕力弱途遥愧心非一天下有道堯人何事得因疲病念從閑逸若使車書混合尉候無驚作樂制禮紀石封山然後反服衡門實為多幸但夙有風欬遘兹虛眩瘠類士安嬴同長孺簿領沈廢臺閣未理娯耳爛腸因事而息非闗欲追松子逺慕留侯天假之年自當靖恭所職擬非倫匹良覺辭費覽復循環爽焉若失清塵獨逺白雲飄蕩依然何極猥降書札示之文翰覽復成誦流連縟紙昔仲宣才敏籍中郎而表譽正平頴悟賴北海以騰聲望古料今吾有慙徳儻成卷帙力為稱首無令獨耀隨掌空使辭人扼腕式閭願見宜事掃門亦有來思赴其懸榻輕苔魚網别當以薦城闕之歎曷日無懷所遲萱蘇書不盡意挺後遂出仕謝幾卿為軍師長史免官時佐丞庾仲容亦免歸二人意志相得並肆情誕縱湘東王在荆鎮與書慰勉之幾卿答曰下官自奉南浦卷迹東郊王望日臨風瞻言佇立仰尋惠渥陪奉逰㝠漾桂櫂於清池席落英於層岨蘭香兼御羽觴競集側聼餘論沐浴𤣥流濤波之辯懸河不足譬春藻之辭麗文無以定莫不相顧動容服心騰口不覺春日為遲更欲脩夜為促嘉㑹難常搏雲易逺言念如昨忽焉素秋恩光不遺謿逺降因事罷歸豈云棲息既匪髙官理就一廛田家作苦實符清誨本乏金羈之飾無假玉璧為資徒以老使形疎疾令心阻沈滯牀簟彌歴七旬夢幻俄頃憂傷在念竟知無意思自袪逺尋理滌意即以任命為膏蘇覽鏡炤形翻以支離代萱樹故得仰慕徽猷永言前哲鬼谷深棲接輿髙舉遯名屠肆發迹闍市其人緬邈餘流可想若令亡者有知寕不縈悲𤣥壤悵隔芳塵如其逝者可作必當昭被光景懽同遊豫使夫一介老圃得簉虚心末席去日已疎來侍未僝連劒飛鳬擬非其類懷私我徳竊用涕零後魏元樹父咸陽王禧以逆見誅樹遂奔梁梁封為鄴王時江陽王長子义先納靈太后妹為室及孝明嗣位太后臨朝又為侍中領軍威鎮内外及淮南王孫法僧為徐州刺史义以反逆奔梁樹與法僧書曰魏室不造姧䜿擅朝社稷阽危綴旒非譬元义險慝狼戾人倫不齒属籍疎逺素無聞望特以太后姻婭早蒙寵擢曽不懷音公行反噬肆兹悖逆人神同憤自頃境土所傳皆云义狼心蠆毒藉權位而日滋含忍諂詐與日月而彌甚無君之心非復一日篡逼之事旦暮必發抑又聞之夫名以出信信以制義山川隠疾且猶不以命名曰成師晉始兆辭求之史籍有自來矣元义本名夜义弟羅實名羅刹夜义羅刹此鬼食人非遇黒風事同飄墮嗚呼魏境離此二災惡水盗泉不息不飲勝名梟稱不入不為况昆季此名表能噬物曰靈义矣始信斯言况乃母后幽辱繼主蒙塵釋位揮戈言謀王室不在今日何謂人臣諸賢或奕世載徳或将相繼踵或受任累朝或職居機要或姻戚匪他或忠義是秉俛眉逆手見制㐫威臣節未申念有勤悴又間义專政億兆離徳重以歳時災厲年年水旱牛馬殪踣桑石樵枯饑饉相仍菜色滿道妖災造譴人皆姑息瀍澗西北羗戎陸梁泗汴左右戍漕流離加以剖斮忠賢殱殄宗室哀彼本邦一朝横潰今既率師将除君側區區之懷庶令冠屨得所大憝同必誅之戮魏祀無忽諸之非又為逺近所惡如此宋欽拜著作郎欽與高允書允答書曰頃因行李足下高問延佇之心為日傾乆王途啟一得叙其懷欣於相遇情無有已足下兼愛為心毎能存顧養之以風味惠之以徳音執翫反覆銘於心抱吾少乏尋常之操長無老成之致而來喻褒飾有過其分今令往詩一篇誠不足以摽明來㫖且表其心莊弼中山人張普惠為諌議奏以胡太后父有太上之名普惠思直諌排其議於是弼遺書普惠明曰侯淵儒碩學身負大才秉此公方來居諌職蹇蹇如也諤諤如也一昨承胡司徒弟當庭面諍雖問難鋒至而應對響出宋城之帶始縈魯門之柝裁警終使羣后逡廵庶僚咸拱雖不見用於一時固欲傳美於百代聞風快然敬裁此日普惠美其此書每為口實北齊王晞累辟不赴西魏将獨孤信入雒署為記室晞稱先被犬傷困篤不赴有故人疑其所傷非猘書勸令赴晞復書曰辱告存念見令起疾循復眷㫖似疑以吾所傷未必是猘吾豈願其必猘但理契無疑爾就足下疑之亦有過説足下既疑其非猘亦可疑其是猘其疑半矣若疑其是猘而營䕶雖非猘亦無損疑其非猘而不療儻是猘則難救然則過療則致萬全過不療或至於死若王晞無可惜也則不足取既取之便是可惜柰何奪其萬全任其或死且将軍威徳所被飈飛霧襲方掩八紘豈在一介若必從隗始先須濟其生靈足下何不從容為将軍言也於是方得寛俄而信返晞遂歸鄴後周王褒字子淵自梁歸國甚為武帝禮遇為少司空仍掌綸誥初褒與梁處士汝南周宏讓相善及兄宏正自陳來䀻髙祖許褒等通親知音問褒贈宏讓詩并致書曰嗣宗窮途楊朱岐路征蓬長逝流水不歸舒慘殊方炎涼異節木皮春厚桂樹冬榮想攝衛惟宜動静多務賢兄入闗敬承欵曲猶依掘陵之水尚保池陽之田鏟迹幽蹊銷聲窮谷何期愉樂幸甚幸甚弟昔因多疾亟覽九仙之方晚渉世途常懷五嶽之舉同夫關令物色異人譬彼客卿服膺髙士上經説道屢聽𤣥妙之談中藥養神每禀丹砂之説頃年事業遒盡容髪衰謝芸其黄矣零落無時還念生涯繁憂摠集是視陰愒日猶趙孟之徂年負杖行吟同劉琨之積慘河陽北臨空思鞏縣覇陵南望還見長安所冀書生之魂求依舊里射聲之鬼無恨他鄉白雲在天長離别矣㑹見之期邈無日矣援筆攬紙龍鍾横集宏讓復書曰甚矣悲哉此之為别也雲飛泥沈金鑠簡滅玉音不嗣瑶華莫因家兄至自鎬京致書於窮谷故人之迹有如對面開題申紙流臉沾膝江南燠熱橘柚冬青渭北沍寒楊榆晚葉土風氣候冬集所安飱衛適時寝興多福甚喜與弟分袂西陜言及東區雖保周陂還依蒋徑三姜離析二仲不歸麋鹿為曹更多悲緒丹經在握貧病莫諧芝术可求常為採掇昔吾壮日及弟富年俱値雍熙並歡衡泌南風雅操清商妙曲絃琴促坐無乏昏晨玉瀝金獲冀獲難老不虞一旦翻覆波瀾吾已愒陰弟非茂齒禽尚之契各在天涯永念生平難為胷臆且當視陰數箭排愁破涕人生樂爾憂慼何為豈能遽悲次房逰魂不返逺傷金産骸柩無託但願愛玉體珍金相保期頥享黄髪猶冀蒼鴈頳鯉時傳尺素清風朗月俱寄相思子淵長離别矣握管操觚聲淚俱咽册府元龜卷九百五
