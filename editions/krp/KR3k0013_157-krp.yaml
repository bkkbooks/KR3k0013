body:
  text: 冊府元龜卷一百五十七宋王欽若等撰帝王部誡勵第二隋髙祖見太子勇文飾蜀鎧恐致奢侈之漸因而戒之曰我聞天道無親唯徳是與歴觀前代帝王未有奢華而長乆者汝當儲后若不上稱天心下合人意何以承宗廟之重居兆民之上吾昔日衣服各留一物時復看之以自警戒今以刀子賜汝宜識我心秦孝王俊以奢僣免官就第薨於秦邸俊所為奢麗之物悉命焚之勑送終之具務從儉約以為後法也王府僚佐請立碑髙祖曰欲求名一卷史書足矣何用碑為若子孫不能保家後與人作鎮石耳韋洸開皇中平陳之後為江州總管進圖嶺南髙祖遺洸書曰公鴻勲大業名髙望重率將戎旅撫慰彼方風行電掃咸行稽服若使干戈不用兆庶獲安方副朕懷是公之力煬帝大業初元徳太子初薨朝野注望皆以齊王當立帝方重王府之選乃拜黄門侍郎柳謇之為齊王長史帝法服臨軒備儀衛命齊王立於西朝堂之前北面遣吏部尚書牛𢎞内史令楊約左衛大將軍宇文述等從殿庭引謇之詣齊王所西面立牛𢎞宣勅謂齊王曰我昔階縁恩寵啟封晉陽出藩之初時年十二先帝立我於西朝堂乃令髙熲虞慶則元旻等從内送王子相於我于時誡我曰以汝㓜冲未更世事今令子相作輔於汝事無大小皆可委之無得昵近小人踈逺子相若從我言者有益於社稷成立汝名行如不用此言唯國及身敗無日矣吾受勑之後奉以周旋不敢失墜㣲子相之力吾無今日矣若與謇之從事一如子相也又勑謇之曰今以卿作輔於齊善思匡救之理副朕所望若齊王徳業修備富貴自當鍾卿一門若有不善罪亦相及唐髙祖武徳元年十一月太宗降薛仁杲凱旋獻俘於太廟髙祖享勞旋師因謂羣臣曰諸公共相翊戴以承帝業今若天下晏安使得同守富貴若使王世充得志公等豈有種乎正如薛仁杲君臣不能自守致此顚覆可為殷鑑也二年命秦王鎮長春宫初秦王自㓜年嘗從髙祖及起義或總戎在外事畢則還未嘗乆别至是作鎮悲不自勝髙祖戒曰汝之於家則父子出則君臣父子之道豈欲分别但安天下耳汝既情深家國時宜勉之太宗以武徳九年即位從容謂公卿曰朕思所以安天下者有二事唯在朕與公輩耳荒淫田獵殺戮任情人君之惡也私樹朋黨阿諛順㫖人臣之惡也宜各制其慾則為治不難矣貞觀元年正月謂侍臣曰自古帝王不能獨治唯藉輔佐共安天下古人耻其君不如堯舜諸公勉思此義焉十一月謂羣臣曰朕聞忠臣之事君猶孝子之事父母務其樂不遺其憂公輩亦宜濟朕所憂致朕所樂若以聲色珍竒娯朕耳目未足為歡也唯當撫飬百姓訓諭其下使朕眼不見犯法之事耳不聞刑殺之聲此則朕之歡娯公之報効耳二年六月謂侍臣曰朕觀隋煬帝文集博而有才亦悅堯舜而惡桀紂何言行之相反也杜如晦對曰能言之者未必能行魏徴又對曰為人君者智者為其謀勇者為其戰雖聖哲猶垂旒黈纊以杜聰明煬帝雖有俊才而無人君之量所謂非知之難行之實難雖解口談堯舜而躬行桀紂此其所以亡也太宗曰然昔漢武征役不息戸口减半中途能改還得傳祚子孫向使隋主早悟亦當不至於㓕前事不逺朕與公輩當思自勉三年三月帝謂房𤣥齡杜如晦曰公為僕射當須廣開耳目求訪賢哲有武藝謀畧才堪撫衆者任以邉事有經明徳修性理通悟者任以侍臣有明幹清慤處事公平者任以劇務有學通今古識逹政術者任以理人此乃宰相之𢎞益也比聞聽受辭訟日不暇給安能助朕求賢哉因勑尚書細務屬左右丞惟枉屈大事合聞奏者關於僕射八年十一月謂大理卿竇誕曰法官卿為長也武徳之時為息隱王所囑便廽改文案苟事曲從此卿之短也朕以至公臨天下法之所行無捨親昵卿當保所長而棄所短無阿朕意以虧憲典十二月醼西征將帥帝誡之曰吐谷渾妄自矜大失藩臣之禮數為草竊侵我邉陲是行也以寡制衆良在不疑然敵不可輕㓂不可玩閫外之事將軍裁之制變應機不可預算官賞罪罰竝在此行當思自勉也十年三月諸王出藩帝嗚咽為别既而顧謂房𤣥齡曰朕歴觀前代撥亂創業之主生長民間識達情偽罕至於破亡逮乎繼世守文之君生而富貴不知疾苦動至夷滅朕少小以來經營多難備知天下之事猶恐有所不逮至如諸弟生自深宫識不及逺豈能念此哉朕毎一食必念稼穡之艱難每一衣則思紡織之辛苦諸弟盍學朕乎今選良臣以為藩弼庶其習近善人得免於愆過耳十五年正月誡朝集使曰禮義者人倫紀綱卿等頗能繇之百姓自然而化導徳齊禮豈不善邪若南方諸州多統夷獠官人於彼言語不通里吏鄉首侵漁匹庶不勝忿怨梃刃相讐因是叛亡輕犯州縣興兵討捕即致殺傷每念於此嘗為惕然卿當深識朕意制姦撫弱又不肖長吏或與富室交通積成欵狎怠忽刑典是惟蠧政特宜禁絶四月甲午謂諸衛將軍曰元首股肱千載難合卿今委質於朕寔望魚水相資或薦所知或救不逮有犯無隱是曰人臣頃者武官多相攜貳欲有論爭衆挫必使其慙所謂不自為善而惡人獨善者也宜改斯弊八月謂侍臣曰朕昨觀尚書帝王之道坦然可見因顧左僕射房𤣥齡曰卿為百司之首佐理隂陽朕有不逮宜矯其失謂吏部尚書侯君集曰職在選舉發言朕聽宜屏黜不肖進用賢才謂戸部尚書唐儉曰朕情存兆庶誠不懈怠宜知其疾苦體其虗實謂工部尚書杜楚客曰人君欲竒服異器以散府藏當諫而勿為也謂鴻臚卿劉善固曰今逺方之人朝貢不絶來數則煩迎送拒之便絶通和宜處之以道令懐而不怨朕每庶㡬唐虞欲卿等齊肩稷契耳書云可愛非君可畏非民為天子者有道則人推而王無道則人棄而不用誠可畏也九月謂公卿曰朕昨閱帝系畧有八十餘君亡國喪身者多興邦利物者少覽此興亡極懷戰惕觀其明主能任用賢才察其闇君必以聰明自任但天下至大萬㡬至廣以一人之身總四海之事縱令聖叡豈能無失朕今任用公等必望庶事咸康方今地平天成亦是公等振鱗之日捐軀報國盡忠奉上寧止曵朱紫於當今亦獲嘉名於後代耳十一月朝集使貢庭實帝謂曰情在萬邦欲家給人足州縣官寮不識朕意耳崇虗畧實激聲要譽春蠶始簇即呼呈蠒殖苗未生已求填穀斯實深煩百姓觀者或似至公刺史一州之長縣鄉取則其下或有煩勞為朕禁制又蒲州刺史趙元楷課父老服黄紗單衣迎謁路左盛飾廨宇修營樓雉欲以求媚又潜飼羊百餘口魚數百頭將饋貴戚太宗知而數之曰朕廵省河雒經歴數州凡有所須皆資官物卿飼羊飬魚雕飾院宇此乃亡隋弊俗不可復行當識朕心改卿舊態也元楷在隋有邪佞之目太宗故發此言以誡之又喬軌為左驍衛左監門將軍兼左武衛大將軍出為夏州都督軌性踈傲不能以禮自居將發太宗誡之曰恭者禮之本慎者人之行卿在宿衛頗失此道乆留陛階下恐長朕之過夏州重鎮卿其勉之十六年四月帝謂禇遂良曰卿為諫議比來何為不諫遂良曰臣聞木從繩則正后從諫則聖而歴代帝王進納忠讜從善如流者國常獲安化洽聲稱厥后絶忠臣之路惡諫諍之言沉迷嗜欲賊害良善者何嘗不國敗身亡以為後誡陛下功徳之盛古今莫二視朝之餘假以顔色奬誘愚臣使罄矇瞽臣實慙駑下不稱萬一尸祿素飡誠負陛下五月謂侍臣曰自知者明信為難矣至如屬文之士伎巧之人皆自謂己長他人弗及若明公文匠商畧詆訶蕪音拙跡於是乃見况一人聽㫁一日萬㡬雖復憂勞何能盡善嘗念魏徴正諫多中朕失明鏡鑒形無以加也因舉觴屬房𤣥齡等數人以朂之十七年正月謂漢王元昌等曰人有事不可奪汝知之乎咸曰不知帝曰爾等祿位我得奪之行善潤身我不能奪然善事非自爾身亦貽爾子孫矣又謂侍臣曰頃頻有妖言謀反者此皆不識天時自取亡滅運屬太平誰與為亂且帝王必俟符命班叔皮論之詳矣自非上天睠顧何以克當譬之賣笏人皆競選或先署某買衆便絶言朕署天下十有餘載所謂分定可絶覬覦矣朕雖不及堯舜而以公等為稷契共安天下可不勉哉又謂侍臣曰自古開基之主至子孫多亂何也司空房𢎞齡曰此為㓜主不贒所以致亂太宗曰公意推過於主朕意歸罪於臣夫功臣子弟多無才行藉祖考基䕃遂處大官禮徳不修奢淫是好崇小人之附勢蔑君子之鳴謙以無賴之臣事㓜弱之主顛而不扶豈能無亂隋煬帝錄宇文述在藩之功擢化及於髙位不思報効翻行弑逆此豈非臣下之過歟朕發此言欲公等誡朂子弟使無愆犯即國家之慶也是月漢王元昌霍王元軌舒王元名滕王元嬰宻王元曉越王貞紀王慎晉王治皆侍坐帝謂曰我弱冠之年頗愛逰獵蘧伯玉云行年五十知四十九年非昨之是今復非之頃來不好跨鞍不窺苑囿唯披翫書籍中宵乃寢有益於時必為之三復乃知事弗師古無以為政四月立晉王為皇太子己亥帝御兩儀殿皇太子侍側陳孝徳以戒之是月又累歎侯君集大臣懷姦承乾為逆因謂侍臣曰夫不善者善人之資朕嘗語皇太子承乾為元龜公等亦以君集為鑒戒閏六月帝謂侍臣曰朕自皇太子立也遇物必誨見其將飯告曰稼穡艱難不奪農時乃可常有其食見其乘舟謂曰舟况人君水比黎庶水能載舟亦能覆舟爾方為人君可不懼畏見其休於屈木之下謂曰木雖曲從繩則正后雖暗從諫則聖耳七月謂侍臣曰天子有二難追蹤上古事常不稱為一難思安兆庶而或未得所二難也而為臣亦有二難企踵昔賢盡心事上為一難仰止前哲居官必理為二難然天子慕堯則堯之侣慕桀則桀之徒臣慕賢與不肖亦猶是矣十月朔帝召雍州諸縣令誡之曰夫人君為心百姓為體安則心樂苦則心危然手足寒則應心政令急則傷下爾等或飭郵厨要聲譽非朕所尚平法憲安黎元使老弱窮獨皆得其所豪家富室不有侵漁朕所孜孜在此而已十二月帝謂呉王曰父之於子恩愛是常子能仁孝不騫父亦恩情自重若不順其親數有罪惡刑戮將及何愛之有昔漢武立昭帝燕王旦譸張不服霍光遣一折簡至身死國除為人臣不得不慎十八年九月帝謂侍臣曰蜃性含水待月而水生木性懷火因燧而燄發人性含靈待學而成美卿等其勉之十月帝謂侍臣曰皇太子齒學之歲須日聞所不聞乃詔太子就席而謂太子太師司徒長孫無忌等曰太子生於深宫之中未嘗知憂未嘗知懼未嘗知危未嘗知哀未嘗知勞煩公等為陳以啟其意無忌答曰太子外温内敏天授多才但勤於博學事無不曉太宗曰公知其梗槩而未得其理夫人主日出視朝賢人君子頫首在列而已負扆以制御之一物失理亂亡之端以此思憂則憂可知矣行至郊野周覽逺望亡國之墟將有數矣此古昔之國其已尚焉今焉耆王不求賢佐不能盡心事大國吾遣偏師擊之係頸至此流飄萬里自取滅亡以此思懼則懼可知矣夫有天下者以政化為本以人心為固古人有言君者舟也人者水也水所以載舟亦所以覆舟以此思危則危可知矣夫將為人君則躬事宗廟入廟而右登自阼階俯察几筵仰覩榱桷其器皆在其親不見以此思哀則哀可知矣古之太子行則撫軍今六軍行從是所自觀爾則乘堅驅良彼則負重致逺以此思勞則勞可知矣皇太子謝曰臣徳義無聞超居上嗣投足憂懼如臨氷谷䝉陛下誘訓愚闇遂廣條流親承音㫖得此五事皆是發慮安危致言經逺臣謹奉以周旋不敢失墜十九年帝征遼留皇太子在定州將發皇太子對帝悲啼者已數日帝謂曰承乾㓙悖爾非次而得立自為嫡長常在吾膝前與嬰兒孺子奚異哉而官寮皆天下著名之士吾今東征故留爾作鎮亦冀天下之人見汝風彩夫為國施化贒者須進不肖者須黜為善必賞積惡必誅心存於公事不僣濫勉行此而已亦安用悲乎太子曰念臣七歳偏孤蒙陛下手加鞠飬自朝及夕未嘗違離明旦辭違隕心泣血今日頓鍾於臣因悲不自支帝亦為之灑淚又韋挺時為御史大夫封平陽縣男帝從容謂之曰卿之此任獨朕意耳左右大臣無為卿地者卿其勉之二十年十二月謂羣臣曰朕聞以愚事聖為難以明事暗亦難所以自古君臣難以道合諒繇於此朕自方禹湯以上恐有不逮至秦漢以降頗亦可知而宇宙康寧蠻夷懾伏自謂古今未有然自惟暗短事藉明哲卿等竝朕之股肱心腹寄以共政必宜竭心啟沃無所私隱中書門下古稱喉舌出納言語之謂而比拱黙寂寥罕聞陳說將謂朕不能受所以杜口邪偽自不能悉也楊師道尚桂楊公主為太常卿駙馬都尉師道卒子豫之不肖薄行太宗嘗謂羣臣曰夫子有孝與不孝臣有忠與不忠公等見不孝之子不忠之臣豈不同嫉然不孝之子父母亡殁已後肆情為惡虧犯名教良由闕於義方今緣師道兒喪虧禮節誠所難恕若訓導合宜縱其頑鄙猶不狼狽公等各有子弟咸須示語無賴者亦勿存育二十一年正月謂司空房𤣥齡等曰朕撫四海二十餘載年已五十餘歳不我與古人輕尺璧而重寸隂然賢人君子立身成名各欲及時雖自勵不怠但恐歳月如馳徳不周物因勑百官各勤其事二十二年二月朝集使奉辭引五品以上升殿宴謂之曰調風化俗莫尚於文潤徳光身孰先於學是以海蜯不剖明珠不現崑竹不㫁鳯音不彰故髦俊以博識洽聞立名國家以任賢使能致治我每殷勤約束務在勤學其所貢舉既得其人今年貢人不多升第又少豈非公等失於勸導所致又曰育物濟人必資於食家給人足本藉於農縱使瓦礫盡作隋珠沙石皆為和璧珍寳滿目何解饑寒比年以來亦大豐稔纔有一兩州水旱即須開倉賑給良以不勸貯積朕為公等不取又曰我共公等三年一度相見今日所見或非舊人我見公等非常慰意公等見我想亦歡忻宜各為我樂飲㑹訖又曰古人贈遺不貴珍寳其所重者相贈以言公等在州當撫馭百姓若能威惠兼舉信義不虧奉國之情無忘忠節唯以公方為意不以私務為心雖不求安而安自至雖不求名而名自顯若所行反道舉指乖方身名俱喪危亡斯及但正塗難踐斜徑易登各宜勉遵善道勿貽咎累朝集使等承㫖下拜其預聞詔誨者竝皆悦服又皇太子獻玉華宫山銘太宗讀之以示羣公曰朕以暇日常教其文體觀其辭彩差欲相類然詩賦非政道之急必在屈己下人至如漢武窮奢極靡肆情縱欲而得身不顚滅貽厥子孫者正以賢臣輔弼所致卿等束髪逰宦九有俱瞻宜各守其業以相翊贊無忌曰陛下自方漢武臣所未安臣等逺擬前賢誠多慙徳然有角折齒事不兩兼幸蒙庇䕃敢不自勉高宗永徽初蜀王愔為虢州刺史遊獵馳騁典軍楊道整叩馬陳諫愔曳而捶之又嘗毆擊所部縣令帝聞而泣謂荆王元景等曰先朝櫛風沭雨平定四方逺近肅清車書混一朕纂承鴻業懼均御朽與王共慼同憂為家為國蜀王田獵無度侵擾黎甿縣令典軍無辜被罰阿謏卽喜忤意便嗔如此居官何以共理歴觀古來諸王若能動遵禮度慶流子孫違越朝章誅不旋踵愔為法司所劾朕甚恥之隴西郡王博文有妓妾數百人皆曵羅綺餘粱肉與其弟渤海王奉慈俱以貪縱為時所鄙髙宗嘗謂曰我怨讐有善猶擢以不次况於親戚而不委任乎聞叔等唯昵近小人好為不軌先王墳典不聞習學今賜絹二百疋各買經史習讀務為善道也中宗景龍二年七月大理正王志愔奏言法令者人之隄防隄防不立則無所禁竊見大理官寮多不奉法以縱罪爲寛恕以守文為苛刻臣愚少執刑典即為衆所謗帝謂曰法急則傷人寛則漏罪原情寘罰在於中平宜慎之志愔因奏上應正論以見意四年正月丁巳内出欹器以示侍臣曰古有欹器朕今造成置之座右以誡盈滿卿等當思自朂常保榮寵睿宗景雲元年十二月帝以諸王及皇親任刺史别駕多有愆過手勑戒之曰朕聞司牧兆人有國彜訓敦叙九族前王令典念此宗枝乆遭沉翳近從班命庻展才能或授外藩或居内職留念訪察屬想風謡罕立嘉聲或聞蠧政當官不存於職務處事多陷於偏私禽荒酒徳者盖多樂善敬賢者全少將性之昏昧違此義方豈朕之不明成爾薄徳當從戒慎勉遂悛改如迷而不復自速愆尤已實為之悔之無及即宜逓相告示以副朕懐二年三月朝集使辭帝謂之曰頃年以來國家多難朕以薄徳祗膺丕緒哀疾不暇未能逺圖四海凋殘百度隳廢端憂永念氷炭盈懐卿等夙荷朝榮位班列牧正當與朕同此憂心今者考課已終各還所部將何以闡揚朝典慰彼黎甿勉思良圖日新政理年終奏計佇有所聞朕遣人分道亷問十二月制曰設官分職本期致理惟賢是任匪私親昵若使才勝其任望重於時一日累遷固未為速如或化工無取考績非明十年不調豈應論屈頃者官失其序僥倖路開人不務徳惟速是視在職無㡬妄希遷陟又每謁見之時多請仗下奏事不聞公議唯乞榮班王爵與能豈繇干請朕雖逺慙聖哲多媿大明自臨寰宇斯焉兩載卿士人材皆所知悉不被昇擢蓋自取之當務責躬何宜往訴且難進而易退君子格言後己而先人往哲明訓周文多士虞舜舉才克讓滿朝故稱為理今位叅臺省階列通班唯務趨競餘何足紀朕方欲大革澆浮俾歸淳俗自今已後謁見之日若更有干冒祈榮者雖地處親勲才稱俊秀皆當格之清議一從屏黜崇亷耻之節洽昇平之化𤣥宗先天二年九月制曰法之所設本以懲非令之必行期於禁止致理為要何莫繇斯至如官典受贓國有常法承前雖經處分在外多未遵奉且不戒視成為暴不令而罰為虐豈含容之既乆將訓導之未明歟朕情存畫一過不欲貳恐愚人陷罪莫識隄防姦吏徇私自嬰徽纆永言於此明發興懐今日已前既往不咎從今已後有犯必繩朕不食言爾無荒怠所以慇懃懇懇戒爾凡百者蓋以罰止罰可不慎哉告示遐邇令知朕意十月引京畿縣令入見謂之曰間者畿輔之地水旱有愆朕務在恤人将幸于雒㳟承嚴旨遂輟東巡百姓等或有出闗恐至失業朕每自節儉惠養黎元卿等深體朕懐各敬廼事時太上皇有誥不令東幸也開元五年六月突騎施酋長蘇禄潜窺亭障安西東護郭䖍瓘及十姓可汗阿史郍獻皆反側不安各以表聞乃遣使齎璽書慰喻之并降書謂䖍瓘及獻曰朕聞師克在和不在於衆懐逺以徳不獨以兵卿等或宿將重名或賢王貴種咸負才畧受任邉疆當須戮力同心盡誠報國捨嫌窒隙忘軀立事近得表狀更相異同又請益兵乃非長算自從開四鎮列諸軍控扼有常置額乆定即卿等所統蕃漢相兼以之制邉綽有餘裕在乎善用豈藉所加或云突騎施圍逼石城則縁史獻致寇或云葛邏禄徵兵馬則被䖍瓘沮謀進退遂有兩端讒邪必然三至若大將不恊小人間之自保不遑何功可就卿等去日朕已面諭不謂即今尚猶如此且史獻十姓酋長先拜可汗一方黎庶共知所屬突騎施部落雖云稍衆當應履信思順安可恃力爭髙䖍瓘頃將嘉言且以忠道此際尤資史獻未可即來入朝蘇禄先是大將軍未經制命今故遣左武衛翊府中郎將王恵充使宣我朝恩册為國公令職朝序并賜物二千段及器物等務於綏懐得所不欲征討示威史獻前擬發兵葛邏禄其時遣衆慮於勞擾當更審思其中權宜屬在卿等王惠廻日一一奏聞昔相如能屈亷頗竟展功業寇恂不較賈復終承教命率繇公道匪徇私情明鏡靈龜各以為鑒七月諸州朝集使辭詔曰朕聞御寰瀛者不可以乖化養黎獻者必存於從理故專一方親百姓有愁苦之心非牧伯之徳所以精求臺閣歴選縉紳嘗舉百寮之要以光出刺之重虛想佳政用成庶績自冬入計者則循名責實詢事考言雖不無等差終未有殊異得非嵗時或淺風教未洽耶故一切不遷各再臨所典至於敬耆老恤㷀弱止姦盗伏豪强人不忍欺吏不敢犯田疇墾闢獄圄空虗徭賦必平逋逃自復門杜請謁庭無滯留若是者廼聞舉職思可力政至於弭災眚集休祥尚徳義崇禮樂儒風大長道化滂流耕夫克譲織婦知節草木不夭昆蟲咸遂扇彼淳源登兹夀域若是者亦𢎞之在我仁逺乎哉豈惟禄秩就加當以公卿入拜其或靡副朝奬不㳟朕言陟既有之黜故宜及勉旃俞往各勤我之休命八月詔曰分命督將保寕疆塲且變無知之俗長為不叛之臣必也仁明在乎清整若脂膏不潤豪髪無欺開懐納戎張䄂延狄彼當愛官吏猶父母安國家如天地欲其亡散庸可得乎若其心不公所視唯利放縱部曲阿容子弟此乃求鷹鸇以馴乳使豺狼以掌牧欲其輯寧庸可得也徃年趙翽在營府總統乖方近日張知運在單于徴調失所遂令東胡喪亂北騎披猖爰搆征戍之勤頗致瘡痍之酷言念於此可為深戒今諸蕃歸降色類非一在蕃者則漢官押領入附者或邊陲安置風俗未通言語不逹至於畜飬實務綏懷宜令所在軍州牧將等倍加存恤申其寃盡其理問疾苦知饑寒公私不得有侵巨細必令無擾儻處馭多僻威恩不孚龜玊之毁典刑斯及御史出入仍訪察以聞七年正月京畿縣令朝見敕之曰諸縣令等親百姓之官莫先於邑宰成一年之事特要於春時卿等列在三畿各知民務宜用心處置以副朕懷農功不可奪蠶事須勿擾市獄在簡典正宜肅徭賦須平豪强勿恣凡著賢能必無曠職即宜好去三月朝集使還本任敕之曰朕聞天生蒸人薄于四海天有成命孚于萬邦必内立公卿外建侯伯后非賢㒺使賢非后㒺事借耳以廣聽假目以遐覽則諭上㫖通下情庶政諧而羣萌樂矣繇是三考黜陟百官會計若昔之訓兹焉是取朕以薄徳祗膺寳位受乾坤之顧荷宗廟之靈凛乎若渉春氷馭朽索責在司牧所賴分憂曷嘗不想望賢才馨香至化七年于兹矣咨爾羣嶽實邦之良朕每勤政途深佇嘉績豈為吏罕乆與人未信何尤異杜絶寂寥厥聲惟恭永圖當副虗屬孔子曰苟有用我者三年有成漢宣曰庶人安其田里無愁恨之聲政平訟理也以為太守數易則下不安誠哉是言今之牧守古之諸侯寵數攸加情寄尤切故躬饗廷内則飲食宴樂幣帛篚筥入至朕前則敷柱以陳命席而對所冀仁且不逺言之必行以朕憂勞之心託卿勤恤之助卿等各宜慎厥始成厥終徃欽哉祗守爾典操一州之統分六條之察念兹在兹用光我班瑞之命有賞有罰朕無戲言八年二月敕朝集使曰古者覲羣臣后比邦國黜幽陟明循政思理㒺云廢也朕以虗薄屬當期運受命穹昊司牧黎元何曾不中夜求衣晝分忘食欲其日月所燭霜露所墜不獨親其親不獨子其子五榖豐殖萬物阜安為無為事無事與能共化于兹八年矣而淳源未還至道猶鬱豈朕之不徳耶將吏之不賢耶徭賦或繁耶綱維或紊耶故延入軒陛躬問得失如卿所對則朕無憂矣書曰非知之難語曰仁逺乎哉我欲仁斯仁至矣卿等宜祗典厥職先正其身循于國章允兹朝寄因乎風俗示之訓誘必也導徳齊禮以公滅私田里息愁恨之聲邦國聞寛厚之化乃當優賞如或依勢作威倚法以削流亡未至教令不行必加其罰自餘宜依别敕處分勤恤人隱以副朕懷又詔曰朕聞諸禮曰刑禁暴爵舉賢則政均矣好惡著則賢不肖别矣朕之虗薄祗膺景命荷宗廟之靈當億兆之貴曷嘗不早朝晏坐畏天愛人思欲保其和樂躋於仁夀則與我共理者其惟良二千石乎每計吏還州與之陛見示其罰賞錫以篚筥亦云爾而已矣朝集使豫州刺史裴綱乆典荆豫為政煩苛頃年不登合議蠲復部人有訴便致科繩縣長為言仍遭留繫御史推案遽以實聞虐政弊人一至於此朕夙夜兢惕匪遑寧居尋遣使存問諸道有災損處已量加賑恤水旱不時實朕之過惠飬失所分刺之繇是用黜綱於嶺裔誡彼羣嶽朕於蒼生若保赤子為之均井邑制田廬必欲其時和年登逺安邇肅託于牧宰代以躬親故歴世難其官誠經國致理之意也夫徳惟善政政在飬人故土煩則草木不長水煩則魚鼈不大必也寛恕貴乎清淨諸州刺史都督宜問疾苦拯貧窮杜侵漁察寃獄至於賦役尤須减省苛刻為事人何以堪切在求理務從折𠂻用存楷式其有不便穩者隨事條奏朕將親覽欽爾有官勤爾有政如風化允穆課績殊尤當擢之不次旌乃厥美凡百庶邦敬聽朕命册府元龜卷一百五十七
