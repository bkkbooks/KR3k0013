body:
  text: 册府元龜卷六百六宋王欽若等撰學校部注釋第二宋何偃為侍中素好談𤣥注莊子逍遥篇又撰毛詩釋一卷卞伯玉為東陽太守注周易繫辭二卷荀柔之潁陽人為奉朝請注周易繫辭二卷并為易音范歆為陳令撰周易義二卷何諲之為中大夫撰周易疑通五卷沈林撰周易義三卷姜道盛為給事中注集釋尚書十一卷一云注古文尚書樂安王友撰伊訓説孫暢之撰毛詩引辯一卷毛詩序義七卷五經雜義六卷雷次宗字仲倫以通直郎徴不起撰毛詩序義二卷畧注喪服經傳一卷裴松之為大中大夫撰集注喪服經傳一卷注三國志六十五卷蔡超宗字希遠為丞相諮議叅軍集注喪服經傳二卷庾蔚之字季隨為員外常侍註喪服要記及略解儀禮十卷徐爰字季玉為大中大夫註周易繫辭二卷為易音毛詩音禮記音二卷三國志評三卷雷肅之撰禮記義疏三卷何始貞撰春秋左氏區别三十卷費沈為撫軍司馬撰喪服集議十卷注孝經一卷何承天為廷尉卿撰禮論三百卷注孝經一卷任預撰禮論條牒十卷答問雜儀二卷張略為司空撰論語疏八卷裴駰注史記八十卷徐野民為中散大夫撰史記音義十二卷諸葛氏撰楚辭音一卷周續之字道祖為詩序義劉道拔為海豐令注喪服經傳一卷葉遵字長儒為奉朝請注儀禮十二卷荀昶字茂祖為中書郎注孝經孔澄之字仲淵為新安太守注論語一卷李叔之字穆夜撰莊子義疏三卷南齊沈驎士隠居教授著周易兩繫莊子内篇訓注易經禮記春秋尚書論語孝經喪服老子要略數十卷司馬瓛撰喪服經傳義疏五卷虞愿為廷尉著五經論問顧歡字景怡或云字𤣥平為太學博士注王弼易二繫又撰毛詩集解序義又作老子堂話四卷一云老子義疏徐伯珍東陽人積學十年究尋經史吳郡顧歡摘出尚書滯義伯珍訓答甚有條理儒者宗之後刺史豫章王辟從事不就祖沖之為長水校尉著易老莊義釋論語孝經注九章造綴述數十篇費元珪注周易九卷劉瓛字子珪為歩兵校尉撰周易乾坤義一卷又撰周易四德例一卷毛詩序義疏一卷毛詩次篇義一卷周易繫辭義疏二卷顧璀撰尚書問一卷明僧紹字承烈平原人國子博士徴不赴注繫辭為易義及集解又注孝經一卷樓幼瑜撰喪服經傳義疏二卷王𤣥載字彦運為光祿大夫注孝經一卷注老子道德經二卷虞遐為貟外郎注孝經陸澄為光祿大夫撰漢書注一卷姚方興采馬王之注造尚書孔傳舜典一篇田携之字僧紹為宋平太守注周禮喪服二巻關康之世居京口以文義見稱徴通直郎不就顧悦之難王弼易義四十餘條康之申王難顧遠有情理又為毛詩義經籍疑滯多所論釋及造禮論十卷梁賀瑒為歩兵校尉領五經博士著禮易老莊講疏朝廷博議數百篇賔禮儀注一百四十五卷孝經義疏一卷五經異同論一卷伏曼容為臨海太守為周易毛詩喪服集解老荘論語義江避為南平王大司馬府記室避博學有思理更著論語孝經韋稜為治書御史著漢書續訓三卷崔靈恩為國子博士先習左傳服解不為江東所行及改説杜義每文句常申服以難杜遂注左氏條義以明之時有助教虞僧誕又精杜學因作申杜難服以荅靈恩世竝行焉靈恩集注毛詩二十二卷集注周禮四十巻三禮義宗四十七卷左氏經傳義二十二卷左氏條例十卷公羊榖梁文句義十卷劉昭為豫章王中軍臨川記室初昭伯父彤集衆家晉書注于寶晉紀為四十卷至昭又集後漢同異以注范曄書世稱博悉遷通直郎出為剡令卒官集注後漢一百八十卷庾詵徴黄門侍郎不赴著易林二十卷又著喪服儀文字體例老莊義疏注算經及七曜厯何𦙍為左氏尚書注周易十卷毛詩總集六卷毛詩隠義十卷禮記隠義二十卷禮答問五十五卷史不載官范述曽為太中大夫注易文言沈重字德厚為五經博士多所撰述咸得其指要行於世者周禮義三十一卷儀禮義二十五卷禮義三十卷毛詩義二十八卷喪服經義五卷周禮音一卷儀禮音一卷禮記音一卷毛詩音二卷孔子祛為步兵校尉著尚書義二十卷集注尚書三十卷續朱异集注周易一百卷續何承天集禮論一百五十卷一云撰禮易詩皇偘為國子助教撰禮記講疏五十卷及喪服義疏又撰論語義十卷孝經疏三卷劉杳為尚書左丞撰楚詞草木疏一卷陶𢎞景為奉朝請著孝經論語集注本草集注及注毛詩序一卷三禮目錄一卷注孝經一卷集解論語十卷宋蹇為大中大夫注周易繫辭二巻李玉之為臨沂令撰周易乾坤義一卷南平王撰周易幾義一卷禇仲都為五經博士撰周易講疏十六卷蕭子政為都官尚書撰周易義疏十四卷繫辭義疏三卷薛景和撰周易普𤣥圖八卷顔氏撰周易大演統一卷劉叔嗣為五經博士注尚書亡篇序又云注尚書二十一卷費甝為國子助教撰尚書義疏十卷謝曇濟撰毛詩撿漏義二卷何佟之撰喪服經傳義疏一卷禮答問十卷裴子野為中書侍郎撰喪服傳一卷沈宏撰春秋五辯二卷周捨為太子詹事撰禮疑義五十二卷嚴植之為中撫軍記室叅軍兼五經博士注孝經一卷蕭子顯為吳興太守撰孝經義疏一卷又撰孝經愛敬義一卷叔明為揚州從事文學太史撰孝經義一卷又集觧論語劉被為太尉叅軍撰論語孔志十卷述孔鮒義疏蕭子範為國子祭酒注千字文一卷鄒誕生為輕車錄事叅軍撰史記音義三卷韋稜為北平諮議叅軍撰漢書續訓二卷杜弼注老子沈琁約之子也為黄門侍郎集注莊子又注爾雅十卷賀琛為中軍宣成王長史撰三禮講疏五經滯義許懋撰風雅比興義十五卷周興嗣為給事中直西省左衞率周捨奉勅注髙祖所製厯代賦啟興嗣助焉後梁蔡大寶為中書監博覽羣書學無不綜著尚書義疏三十卷陳周𢎞正為尚書左僕射領國子祭酒所著周易義疏十六卷論語疏十一卷莊子疏八卷老子疏五卷孝經疏二卷行於世王元規為尚書祠部郎入請為秦王東閣祭酒著春秋發題辭及義記十一卷續經典大義十四卷孝經義記二卷左傳音三卷禮記音二卷張譏為國子博士所撰周易義三十卷尚書義十五卷毛詩義二十卷孝經義八卷論語義二十卷老子義十一卷莊子内篇義十二卷外篇義二十卷雜篇義十卷𤣥部通義十二卷姚察為吏部尚書入隋為太子内舍人著漢書訓纂三十卷漢書集解一卷定漢書疑二卷謝嶠撰喪服義七卷并爾雅音沈文阿為通直散騎常侍撰春秋左氏經傳義畧三十卷一云撰經典大義十八卷徐孝克為散騎常侍入隋為國子博士撰孝經講疏六卷論語句義五卷臧競撰范漢音訓三卷施乾為博士撰爾雅音顧野王為舍人撰爾雅音戚衮為太學博士撰禮記義四十卷後魏房景先孝文時為太學博士作五經疑問百餘篇又符璽郎王神貴答之名為辯疑合成十卷亦有可觀辛子馥為尚書右丞以三傳經同説異遂總為一部傳注竝出較比短長㑹亡未就髙允為太常所製左氏公羊釋毛詩拾遺論雜解議何鄭膏肓事凡百餘篇宋繪少勤學多所博覧好撰述依准裴松之注三國志體注王隠及中興書闞駰博道經傳注王朗易傳學者藉以通經累官至姑臧太守張湛燉煌人好學能屬文仕沮渠䝉遜為黄門侍郎梁州平入國司徒崔浩識禮之浩注易叙曰國家西平河右燉煌張湛金城宗欽武威叚承根三人皆儒者竝有雋才見稱於西州每與余論易餘以左氏傳卦解之遂相勸為注故因退朝之餘暇而為之解焉其見稱如此劉昞注周易韓子人物志黄石公三略竝行於世後為樂平王從事中郎劉芳為太常撰鄭𤣥所注周官儀禮音干寶所注周官音王肅所注尚書音何休所注公羊音范寗所注榖梁音韋昭所注國語音范曄注後漢書音各一卷辯類三卷徐州人地錄二十卷急就篇續注音義證三卷毛詩箋音義證十卷禮記義證十卷周官儀禮義證各五巻陳竒博通墳籍常非馬融鄭𤣥解經失㫖志在著述五經始注孝經論語頗傳於世為縉紳所稱召赴京不得敘其論語注義多異鄭𤣥往往與司徒崔浩同常爽字仕明河内人置學館於温水之右門徒七百餘人爽因教授之暇述六經略注以廣制作甚有條貫其序曰傳稱立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義然則仁義者人之性也經典者身之文也皆以陶鑄神情啟悟耳目未有不繇學而能成其器不繇習而能利其業是故季路勇士也服道以成忠烈之槩甯越庸夫也講藝以全髙尚之節盖所繇者習也所因者本也本立而道生身文而德備焉昔者先王之訓天下也莫不導以詩書教以禮樂移其風俗和其人民故恭儉荘敬而不煩者教深於禮也廣博易良而不奢者教深於樂也溫柔敦厚而不愚者教深於詩也疏通知遠而不誣者教深於書也㓗静精微而不賊者教深於易也屬辭比事而不亂者教深於春秋也夫樂以和神詩以正言禮以明體書以廣聽春秋以斷事五者盖五常之道相須而備而易為之源故曰易不可見則乾坤其幾乎息矣繇是言之六經者先王之遺烈聖人之盛事也安可不遊心寓目習性文身哉頃因暇日屬意藝林略撰所聞討論其本名曰六經畧注以訓門徒焉其畧注行於世爽不仕號儒林先生劉獻之博陵人徴典内校書以疾辭門徒數百皆通經之士時五經大義雖有師説而海内諸生多有疑滯咸决於獻之六藝之文雖不悉注然所撰宗㫖頗異舊義撰三禮大義四卷三傳略例三卷注毛詩序義一卷今行於世并章句疏三卷李彪在祕書嵗餘區分書體述春秋三傳十卷酈道元為御史中尉好學厯覽竒書撰注水經四十卷本志十三篇崔浩為司徒注周易十卷注急就章二卷元明進撰毛詩義府三卷游肇為國子博士為易解徐遵明華陰人東道大使元羅表薦之竟無禮辟遵明撰春秋義章為三十卷北齊杜弼為膠州刺史耽好𤣥理老而愈篤又注莊子惠施篇易上下繫名新注義苑並行於世李鉉為國子博士撰定孝經論語毛詩三禮義疏及三傳異同易義例合三十餘卷權㑹為四門博士注易一部行於世後周樂遜為太學博士所撰孝經論語毛詩左傳春秋序論十餘篇又著春秋序義通賈服説發杜氏違辭理竝有可觀樊深為國子博士撰孝經喪服問疑各一卷又撰七經異同説三卷義綱略論并目錄三十卷竝行於世熊安生為露門學博士下大夫所撰周禮義疏二十卷禮記義疏四十卷孝經義疏一卷竝行於世蕭大圜為滕王友入隋為西河郡守撰喪服儀注五卷要訣二卷隋宇文㢸為尚書孝經注行於世明克讓為太子率更令著孝經義疏一部王頍撰五經大義三十卷蕭該為國子博士撰漢書及文選音咸為當時所貴張冲字叔𤣥初仕陳為左中郎将非其好也乃覃思經典撰春秋義畧異於杜氏七十餘事喪服義三卷孝經義三卷論語義十卷前漢書義十二卷官至漢王侍讀辛彦之為路州刺史撰五經異義一部王孝藉開皇中召入祕書注尚書及詩遭亂零落辛德源為著作郎王邵同修國史德源每於務隙撰集注春秋三十卷注揚子法言二十卷劉炫為太學博士以品卑去任著論語述議十卷春秋攻昧十卷五經正名十二卷孝經述議五卷春秋述議三十卷尚書述議二十卷毛詩述議四十卷又注詩譜二卷及注春秋左氏傳杜預序集解一卷禇輝為太學博士撰禮疏一百卷顧彪為祕書學士明尚書春秋為古文尚書疏二十卷今文尚書音一卷大傳音一卷尚書文義一卷何妥為國子祭酒通直散騎常侍撰周易講疏十三卷孝經義疏三卷莊子義疏四巻唐魏徴為侍中徴以戴聖禮記論次不倫遂為類禮二十卷以類相從削其重復採先儒訓注擇善從之研精覃思數年而畢太宗覽而善之賜物一千叚錄數本以賜太子及諸王仍藏之祕府徐文遠為國子博士撰左傳義疏六十卷行於時陸德明為國子博士撰老子疏十卷莊易疏各一十五卷經典通釋三十卷竝行於時王𤣥度為校書郎貞觀十六年十月上其所注尚書毛詩周易并義决三卷與舊解尤别者一百九十餘條付學官詳其可否諸儒皆因習先師譏其穿鑿𤣥度隨方應荅竟不肯屈太宗欲廣見聞竝納之祕府王方慶為麟臺監精三禮好事者多詢訪之每所酬答咸有典據故時人編次名曰雜禮答問孔穎逹為國子祭酒太宗以儒學多門章句繁雜令穎逹與諸儒撰正五經義疏一百七十卷數年乃成名曰義贊有詔改為五經正義云雖復包括衆家稍為詳悉然亦有紕繆崔義𤣥少受章句之學五經大義先儒所疑有音訓不明者兼採衆家皆為解釋傍引證據各有條疏上聞之詔義𤣥討論五經正義與諸博士等詳定是非事竟不就後為蒲州刺史卒顔遊秦師古叔父也為鄆州刺史卒官撰漢官决疑十二卷為學者所稱後師古注漢書亦多取其義顔師古為祕書少監太子承乾在東宮命師古注漢書承乾表上之太宗令編之祕閣許叔牙為太子洗馬兼崇賢館學士嘗撰毛詩纂義十卷以進太子賜帛二百叚兼令冩本付司經局其後御史大夫髙智周謂人曰凡欲言詩者必須先讀此書始可也格輔元兄希𤣥髙宗時官至雒州司法叅軍章懷太子賢召令與洗馬劉訥言等注范曄後漢書行於世張太安髙宗時為太子左庶子太子賢令太安與洗馬劉訥言雒州司戸叅軍格希𤣥等注范曄後漢書表上之賜物三萬段仍以其書付秘閣王勃髙宗時為虢州叅軍撰周易發五卷次論十卷王元感則天長安中為四門博士表上其所撰尚書糾繆十巻春秋振滯二十卷禮記繩愆三十卷并所注孝經史記漢書草請官紙筆給冩秘閣制令𢎞文館崇賢兩館學士及成均博士詳其可否𢎞文館學士祝欽明崇賢館學士李憲趙元亨成均博士郭山惲皆守先儒章句深譏元感掎摭舊義元感隨方應答竟不之屈唯鳯閣舍人魏知古司封郎中徐堅左史劉知幾右史張思敬雅好異聞每為元感申理其義由是擢拜太子司議郎加朝散大夫崇賢館學士韋顗為吏部侍郎著易藴解推演潛元終始之義甚有奥㫖髙定為京兆叅軍幼聰警絶倫尤精王氏易嘗為易圖合八出以畫八卦上圓下方合則重轉則演七轉而六十四卦六甲八節備焉著易外傳二十二卷裴延齡為汜水尉乾元末過東都為賊所據因寓居於鄂州綴緝裴駰所注史記之闕遺自號小裴韋公肅為祕書著作郎公肅注太宗文皇帝帝範一十二篇上獻有詔付集賢仍令别冩一本進内崔𤣥暐為中書令撰行已要範十卷友義傳十卷義士傳十三卷訓注文館詞林䇿二十卷李善寓居汴鄭間講文選為業所注文選十卷行於世後為崇賢館學士韓滉為左僕射平章事好易象及春秋著春秋通例及天文事序議各一卷張守節少集詩禮尤精史義注正義四十卷張鎰撰三禮圖十二卷五經微㫖十四卷孟子音義三卷李吉甫為相嘗討論易象異義附於僧一行集注之下陸䞇為給事中皇太子侍讀著集書春秋二十卷類禮二十卷君臣圖翼三十五卷竝行於代馮伉元和初為國子祭酒著三傳異同三卷裴通為詹事著易𤣥解并總論二十卷易禦冦十三卷易洗心二十卷韋表微為翰林學士户部侍郎少時尅苦自立著九經師授譜一卷春秋三傳總例二十卷李磎為相曽注觧書傳之闕疑僅及百卷經巢讓之亂悉為灰燼焉册府元龜卷六百六
