body:
  text: 册府元龜卷一百七十三宋王欽若等撰帝王部繼絶自古受命及中興之君莫不興滅繼絶以歸天下之心焉書稱虞賓在位羣后德讓謂雖丹朱之不肖而以帝堯神明之後尊而禮之故周武克商未及下車追存賢聖爵而祿之以奉祭祀俾故老遺俗感仁澤之至厚繼體守文存鑒戒之悠逺致恭三恪其義益顯炎漢而下封崇尤盛至於六國餘烈佐命元勲籍其名數罔有家食斯又念功勸勞之深㫖也夏禹踐天子之位堯子丹朱舜子商均皆有疆土以唐封堯之子以虞封舜之子以奉其先祀服其服禮樂如之以客見天子天子弗臣示不敢專也周武王勝殷封紂子武庚祿父以續殷祀使管叔蔡叔傅相之又追思先聖王乃褒封神農之後於焦𢎞農陜縣有焦城故焦國也黄帝之後於祝帝堯之後於薊燕國有薊縣帝舜之後於陳舜妻堯之二女居於媯其後因以為氏舜子商均為封國夏後之時或失或續至是求舜後有媯滿封之以奉舜祀大禹之後於杞禹之苖裔殷時或封或續至是求禹之後得東樓公封之以奉夏后氏祀成王即位少周公旦代立行政當國管蔡疑之乃與武庚作亂欲襲成王周公一云欲襲成周周公既承成王命誅武庚殺管叔放蔡叔乃命微子開代殷後奉其先祀作微子之命封命之書王若曰猷殷王元子㣲子帝乙元子故順道本而稱之惟稽古崇德象賢惟考古典有尊德象賢之義言今法之統承先王修其禮物言二王之後各修其典禮正朔服色與時王並通三統作賓于王家與國咸休永世無窮為時王賔客與時皆美長世無窮嗚呼乃祖成湯克齊聖廣淵言汝祖成湯能齊德聖達廣大深逺澤流後世皇天眷佑誕受厥命皇天眷顧湯佑助之大受其命謂天命撫民以寛除其邪虐湯撫民以寛徳除桀邪虐之政功加於時德垂後裔言湯立功加于當時德澤垂及後世裔末也爾惟踐修厥猷舊有令聞汝㣲子言能踐湯德久有善譽昭聞逺近恪慎克孝肅恭神人予嘉乃德曰篤不忘言微子敬慎能孝肅恭神人故我善汝德謂厚不可忘上帝時歆下民祇協庸建爾于上公尹兹東夏孝恭之人祭祀則神歆享施令則人敬和用是封立汝於上公之位正此東方華夏之國宋在京師東欽哉往敷乃訓慎乃服命率繇典常以蕃王室欽哉敬其為君之德往臨大布汝敎訓慎汝祖服命循用舊典無失其常以藩屏周室戒之𢎞乃烈祖律乃有民永綏厥位毗予一人大汝烈祖成湯之道以法度齊汝所有之人則長安其位以輔我一人言上下同榮慶世世享德萬邦作式言㣲子累世享德不忝厥祖雖同公侯而特為萬邦法式俾我有周無斁汝世祖享德則使我有周好汝無厭嗚呼往哉惟休無替朕命㣲子乃代武庚殷之餘民甚愛戴之故周頌有客微子來見祖廟也振鷺二王之後來助祭也二王夏殷也其後杞也宋也漢髙祖十年帝至邯鄲求樂毅後得其孫叔封之樂鄉在洪新城號曰華成君文帝元年封舞陽侯樊噲庶子市人為侯初噲子伉吕后妹吕須之子嗣舞陽侯髙后薨大臣誅吕須等因誅伉數月帝立廼復封市人為侯復故邑後三年以絳侯周勃子亞夫為條侯初勃子勝之嗣絳侯尚公主不相中也意不相可也坐殺人死國絶一年帝乃擇勃子賢者河内太守亞夫嗣勃後景帝二年制詔御史故相國蕭何髙皇帝大功臣所與為天下也為治也一曰共造其功業今其祀絶朕甚憐之其以武陽縣户二千封何孫嘉為列侯一作舞陽嘉兄有罪免六年以絳侯周勃子堅為平曲侯續絳侯後以勃子亞夫有罪死國絶中元年以髙景侯周成孫應紹封髙景侯初成以父苛為項籍死事子俠文帝五年謀反誅三年以曲周侯酈商子堅紹封曲周侯初商子寄嗣有罪免六年以河陵侯郭亭孫延居紹封河陵侯初亭孫客嗣有罪免費侯陳賀子最紹封費侯初賀子常嗣卒後元年以杜衍侯王翥子郢人紹封杜衍侯初翥孫市臣嗣亡後武帝元光二年以平定侯齊受曽孫延居紹封平定侯初受孫嗣亡後元狩三年詔御史以鄼户二千四百封蕭何曾孫慶為鄼侯布告天下令明知朕報蕭相國德也初何曽孫勝嗣坐侍祠不齊耐而𨽻元鼎四年帝祠后土還至雒陽求周苗裔封其後嘉三十里地比列侯奉其先祭詔曰祭地冀州瞻望河雒巡省豫州觀於周室邈而無祀詢問耆老乃得孽子嘉其封嘉為周子南君後元年以游擊將軍按道侯韓說子増一作曽紹封龍頟侯初說子興嗣征和四年坐巫蠱誅一云坐祝詛腰斬帝曰游擊將軍死事無論坐者說當時掘巫蠱於太子宫為太子所殺死於國事興雖以巫蠱見誅其昆弟宗族應從坐者可勿論之乃復封興弟増為龍頟侯宣帝地節四年詔丞相御史求問蕭相國後在者得𤣥孫建世等十二人復下詔以酇户二千封建世為酇侯元康元年復髙皇帝功臣絳侯周勃等一百三十六人家子孫令奉祭祀世世勿絶其毋嗣者復其次元帝初元五年正月以周子南君姓姬名延年嘉之孫也為周承休侯承休國在潁川位次諸侯王是時帝使諸大夫博士求殷後分散為十餘姓郡國往往得其大家推求子孫絶不能紀時丞相奏議以為王者存二王後所以尊其先王而通三統也其犯誅絶之罪者絶而更封他親為始封君上承其王者之始祖春秋之義諸侯不能守其社稷者絶今宋國已不守其統而失國矣則宜更立殷後為始封君而上承湯統非當繼宋之絶侯也宜明殷後而已今之故宋惟求其嫡嫡之先已絶不當得立禮記孔子曰丘殷人也先師所共傳宜以孔子世為湯後帝以其語不經遂見寢成帝鴻嘉元年制詔丞相御史蓋聞褒功德繼絶統所以重宗廟廣賢聖之路也故博陽侯丙吉以舊恩有功而封今其祀絶朕甚憐之夫善善及乎子孫古今之通誼也其封吉孫中郎將關内侯昌為博陽侯奉吉後國絶三十二嵗復續元延元年十月封蕭相國後一云𤣥孫之子南䜌長喜䜌鉅鹿邑名喜為此縣長為鄼侯時功臣子孫多廢絶杜業說曰昔唐以萬國致時雍之政虞夏以羣后饗恭已之治湯法三聖殷民太平周封八百重譯来賀使以内恕之君樂繼絶世隆名之主安立亡國至於不及下車德念深矣成王察牧野之克顧羣后之勤知其恩結于民心功光于王府也故追述先父之志録遺老之策髙其位大其寓愛敬斯盡命賜備厚大孝之隆于是為至至其沒也世主歎其功無民而不思所息之樹且猶不伐況其廟乎是以燕齊之祀與周並溥子繼弟及歴載不墜豈無刑辟繇祖之竭力故支庶頼焉迹漢功臣亦皆剖符世爵受山河之誓存以著其號亡以顯其魄賞亦不細矣百餘年間而襲封者盡或絶氏姓或乏無主朽骨孤於墓苗裔流於道生為愍𨽻死為轉屍以往况今甚可悲傷聖朝憐憫詔求其後四方忻忻靡不歸心出入數年而不省察恐議者不思大義設言虛亡則愿德掩義逰東布章非所以視化勸後世也三人為衆雖難盡繼宜從尤功於是成帝復詔蕭何綏和元年二月詔曰葢聞王者必存二王之後所以通三統也天地人並為三統二王之後並以為三昔成湯受命列為三代夏商周而祭祀廢絶考求其後莫正孔吉無若孔吉最正也其封吉為殷紹嘉侯三月進爵為公及周承休侯皆為公地各百里一云二月甲子封殷後孔子世吉適子何齊為紹嘉侯後六月進爵為公地方百里元始二年更為宋公哀帝元夀二年封平陽侯曹參𤣥孫之孫本始為平陽侯參𤣥孫宗有罪免為城旦至是以本始紹封平帝元始元年正月令諸侯王公列侯關内侯無子而有孫若子同産子者皆得以為嗣子同産子者謂飬昆弟之子為子者公列侯嗣子有罪耐以上先請宗室屬未盡而以罪絶者復其屬於是封龍頟侯韓増兄子岑為龍頟侯初増子寳嗣亡後岑一作共六月封周公後公孫相如為褒魯侯二年四月封故大司馬博陸侯霍光從父昆弟曾孫陽宣平侯張敖𤣥孫慶忌綘侯周勃𤣥孫共舞陽侯樊噲𤣥孫之子章皆為列侯復爵賜故曲周侯酈商等後𤣥孫酈明友等百一十三人爵關内侯食邑各有差是嵗賜曲逆侯陳平代後者鳯爵關内侯不言世後漢光武建武二年五月封周後姬常為周承休公承休所封故城在今汝州東北五年二月壬申封殷後孔安為殷紹嘉公十三年二月庚午以殷紹嘉公孔安為宋公周承休公姬常為衛公以為漢賔在三公上明帝永平十四年封安豐侯竇融孫嘉為安豐侯初融子穆穆子勲俱以罪死詔還融夫人與小孫一人居雒陽家舍至是封勲弟嘉為定豐侯食邑二千奉融後章帝建初元年封膠東侯賈復少子邯為膠東侯邯弟宗為即墨侯各一縣初復子忠嗣忠卒子敏嗣坐誣告母殺人國除二年封平陽侯曹參後湛為平陽侯又封東光侯耿純孫旴為髙亭侯初純子阜嗣徙封莒鄉侯永平四年坐同族耿歙與楚人顔忠辭語相連國除七年十月西巡狩數召奉車都尉韋彪入問三輔舊事禮儀風俗彪因建言今西廵舊都宜追録髙祖中宗功臣褒顯先勲紀其子孫帝納之行至長安乃制詔京兆尹右扶風求蕭何霍光後時光無苗裔唯封何末孫熊為酇侯八年以廣平侯吳漢孫旦為灈陽侯灈陽縣名屬汝南郡旦卒無子國除帝徙旦弟筑陽侯旴為平春侯平春縣名屬江夏以奉漢祠和帝永元三年十一月幸長安詔曰髙祖功臣蕭曹為首有傳世不絶之義曹相國後容城侯無嗣朕望長陵東門見二臣之壠蕭何墓在長陵東司馬門道北百步曹參冢在長陵旁道北近蕭何冡循其逺節每有感焉忠義獲寵古今所同可遣使者以中牢祠大鴻臚求之近親宜為嗣者須景風紹封以彰厥功大鴻臚掌封拜諸侯及其嗣春秋考異郵曰夏至四十五日景風至則封有功臣也安帝永初六年詔曰夫仁不遺親義不忘勞興滅繼絶善及子孫古之典也論語曰興滅國繼絶世公羊傳曰善善及子孫惡惡止其身昔我光武受命中興恢𢎞聖緒横被四表昭格上下昭明也格至也上下天地光耀萬世祉祚流衍垂於㒺極予末小子夙夜永思追惟勲烈披圗漢籍建武元功二十八將佐命虎臣䜟記有徵葢蕭曹紹封傳繼於今和帝紹封蕭曹之後以彰厥功也況此未逺而或至乏祀朕甚愍之其條二十八将無嗣絶世若犯罪奪國其子孫應當繼後者分别署狀上將及景風章叙舊德顯兹遺功焉初膠東侯賈復孫平鄉侯普有罪國除於是紹封普子晨為平鄉侯明年二十八将絶國者皆紹封焉七年詔封安平侯盖延曾孫恢為蘆亭侯初延子扶嗣扶卒子側嗣側永平十三年坐與舅王平謀反伏誅國除揚虚侯馬武孫震為漻亭侯初武子檀嗣坐兄伯濟與楚王英黨顔忠謀反國除昆陽侯傅俊孫鐡為髙置亭侯初俊子昌嗣徙封蕪湖侯建初中遭母憂上書以國貧不願之封乞錢五十萬為關内侯章帝怒貶為關内侯竟不賜錢參蘧鄉侯杜茂孫奉為安樂亭侯初茂子元嗣永平十四年坐與東平王等謀反減死一等國除櫟陽侯景丹孫遽為監亭侯初丹子尚嗣徙封余吾侯尚卒子苞嗣苞卒子臨嗣臨無子國除鬲侯朱祐曾孫沖為鬲侯初祐子商嗣商卒子演嗣演以永元十四年坐從兄伯為外孫陰皇后巫蠱事免為庶人槐里侯萬修曽孫豐為曲平亭侯初修子普嗣徙封泫氏侯普卒子親嗣徙封扶栁侯親卒無子國除中水侯李忠孫純為琴亭侯初忠子威嗣威卒子純嗣永平九年坐毋殺純叔父國除一云殺威弟季許侯馬光子朗為合鄉侯初光就國因竇憲奴誣光與憲逆自殺元初元年封靈夀侯邳肜孫音為平亭侯初肜子湯嗣湯卒子某嗣臣欽若等曰史闕名無子國除於是紹封三年封順侯馬廖孫度為潁陽侯初廖子遵嗣徙封程鄉侯遵卒無子國除於是紹封永寜元年封朗陵侯臧宫曽孫繇為朗陵侯初繇兄松嗣侯元初四年與母别居國除至是封繇建光二年封舞陰侯岑彭一作舞陽曽孫杞為細陽侯初彭征蜀薨子遵嗣徙封細陽侯細陽縣名故城在今汝陰縣西遵卒子伉嗣伉卒子杞嗣杞一作起元初三年坐事失國至是復封順帝陽嘉三年封林慮公主子耿寳子箕為牟平侯初寳弟子承襲公主爵為林慮侯後閻太后以寳等阿附嬖倖共為不道策免寳及承皆貶爵為亭侯遣就國寳於道自殺國除大貴人數為耿請乃詔封之桓帝延熹二年紹封全椒侯馬成𤣥孫昌為益陽亭侯成六世孫配嗣棘陵侯以罪失國于是封之槐里侯萬修𤣥孫恭為門德亭侯初修曽孫豐為曲平亭侯豐卒子熾嗣無子國除魏文帝黄初中賜蓚令亭侯田疇從孫續爵關内侯以奉其嗣疇從太祖平烏丸有功封亭侯邑五百戸疇固讓不受及卒子又早死於是封其從孫紹封陵樹亭侯荀攸孫彪為陵樹亭侯初攸子適嗣無子國除都亭侯任峻中子覽為關内侯初峻子先嗣無子國除都亭侯蘇則子愉為都亭侯初則子怡嗣無子明帝青龍二年三月庚寅山陽公薨漢獻帝也八月壬申葬于山陽國適孫桂氏鄉侯康嗣立為山陽公髙貴鄉公正元元年紹功臣世封荆州牧昌陵鄉侯夏侯尚從孫本為昌陵亭侯邑三百户以奉尚後初尚子𤣥嗣以謀廢司馬景王夷三族甘露二年報封河東太守豐樂亭侯杜畿孫預為豐樂亭侯邑百户初畿子恕嗣免為庶人徙章武郡是嵗河東樂詳年九十餘上書訟畿之遺績朝廷感焉陳留王景元四年封蘭陵侯王肅子恂為蘭陵侯晉武帝泰始元年十二月詔曰昔太尉王凌謀廢齊王而王竟不足以守位征西將軍鄧艾矜功失節實應大辟然被書之日罷遣人衆束手受罪比於求生遂為惡者誠復不同今大赦得還若無子孫者聽使立後令祭祀不絶元帝時以太尉臨淮公荀顗兄𤣥孫序為顗後封臨淮公又封蘭陵公衛瓘𤣥孫崇為江夏郡公明帝大寧三年七月詔曰三恪二王世代之所重興滅繼絶政道之所先又宗室哲王有功勲於大晉受命之際者佐命功臣碩德名賢三祖所與共維大業咸開國祚土誓同山河者而並廢絶禋祀不傳甚用懐傷主者其詳議請應立後者以聞成帝咸和元年十月封魏武帝𤣥孫曹勱為陳留王咸康二年十月詔曰歴觀先代莫不褒崇明祀賓禮三恪故杞宋啟土光於周典宗姬侯衛垂美漢册自頃喪亂庶邦殄悴周漢之後絶而莫繼其詳求衛公山陽公近屬有履行修明可以繼承其祀者依舊典施行孝武帝太元二年正月繼絶世紹功臣詔曰故太尉西平公張軌著德遐域世襲前勞强兵縱害遂至失守散騎常侍天錫拔迹登朝先祀淪替用増矜慨可復天錫西平郡公爵又封太尉臨淮公荀顗兄𤣥孫序之子為臨淮公以繼顗後又封博陵王沈從孫道素為博陵公又封髙平公陳騫𤣥孫襲爵髙平公以騫孫粹嗣後遇害故也後魏大武時求故司空封西昌侯庾岳子孫任為將帥者得其子陵從征有功聽襲爵岳道武時誅之人咸寃惜焉延和初詔曰故征西將軍爵臨淮公丘堆國之肺腑勲著先朝西征喪師遂從軍法國除祀絶朕甚愍之可賜其子跋爵淮陵侯初堆與奚斤進平赫連昌斤追擊昌弟定留堆守輜重斤為定所擒堆棄甲走長安大武大怒遣安頡斬之孝文延興元年冬詔訪舜後獲東萊郡民媯茍之復其家畢世以彰盛德之不朽宣武繼絶世詔以故萬騎大將軍封𢎞農王奚斤諸弟子鑒特詔其後以承封邑初斤薨子他觀襲爵他觀為将征懸瓠卒於軍子延襲爵出為萬城鎮將卒子緒襲爵開建五等封恒農郡開國侯食邑三百户後例降為縣改封登城縣開國侯増邑九百户卒子遵襲爵卒無子國除又詔復故試守河内郡陸琇爵以子景祚襲陸俊為征西大將軍封東平王薨子馥襲馥卒子琇襲琇為祠部尚書免官試守河内郡咸陽王禧謀反令于曇和先據河内琇聞禧敗斬曇和首時以琇不先送曇和禧敗始斬首責其通情徵詣廷尉死於獄琇弟凱上書訴寃乃詔復之隋文帝以周後宇文雒為介國公賓於隋煬帝大業四年十月辛亥詔曰昔周王下車首封唐虞之裔漢帝承厯亦命殷周之後皆所以褒立先代憲章在昔朕嗣膺景業旁求雅訓有一𢎞益欽若令典以為周兼夏殷文質大備漢有天下車書混一魏晉紹襲風流未逺並宜立後以存繼絶之義有司可求其胄緒别聞唐髙祖武德元年五月二十三日詔曰革命創制禮樂變於三王修廢繼絶德澤隆於二代是以鳴條尅伐杞用夏郊牧野降休宋承殷祀爰及魏晉禪代相仍山陽賜號於當塗陳留受封於典午上天迴睠授厯朕躬隋氏順時遜其寳位敬奉休命敢不對揚永作我賔冝開土宇其以莒之酅邑奉隋帝為酅公行隋正朔車旗服色一依舊章仍立周後介公共為二王後二年五月酅公薨追崇為隋帝謚曰恭太宗貞觀二年八月制曰二王之後禮數宜崇寝廟不修廪餼多闕非所以追崇先代式敬國賓可令所司量置國官營立廟宇中宗神龍元年五月制仍舊以周隋為二王後先永昌元年以周漢之後為二王仍封舜禹成湯之裔為三恪𤣥宗開元三年二月勅二王後每年四時饗廟牲及祭服祭器並官給其帷帳几案有闕亦官給主客司四時省問子孫准同正三品蔭隋後每年給絹三百匹米粟二百石並春秋支給仍准見承襲人親兄無分襲者與三分餘各一分兄弟有得職事官者其物即還見襲人五年二月行幸東都大赦制武德貞觀以來勲臣子孫無在任者更詳求其後奏聞十一年十一月南郊大赦詔武德以來實封功臣知政宰輔有身無大故而亡官失封子孫淪屈者所司勘責具以狀聞存者可醻其官榮逝者當録其裔嗣使幽明同慶知有今辰十五年閏九月勅二王後為賔者㑹賜同京官正三品其夫人亦同諸王公以下無子孫以兄弟為後曽經侍飬者聽其承襲贈爵者亦准此若死王事雖不曽經侍飬亦聽承襲又二王後犯罪當除爵者改立次賢二十五年六月辛酉制曰夏典有虞賔之位周書載微子之封皆所以啟迪前王發揮後嗣故介國公宇文超男晏倬彼茂緒曰予嘉客肅雍成性温潤合禮雅有助祭之容宛是宜邦之具爰復爾國以承天休可襲封介國公天寳七載五月詔曰自古帝王建邦受命必敬先代以循舊章周備禮文既存三恪之位漢存損益唯立二王之後自兹以降具復因循將廣繼絶之恩式𢎞復古之道宜於後魏子孫中簡擇譜屬灼然相承者一人委所司勘責准酅公例定為三恪八載制曰胡公啟陳微子分宋位存三恪秩比二王後魏孝文帝十代孫元伯明器藴中和業彰前烈保大明之餘慶標幹蠱之良才謙而不渝信而可復固當纂承殷後式備虞賔頃屬覃恩爰崇繼絶主魏祀者非爾而誰受兹寵章無忝負荷宜大啟於土宇俾光膺於禮物可襲封韓國公食邑三千户九載處士崔昌上封事推五行之運以國家合承周漢其周隋不合為二王後請廢詔下尚書省集公卿議昌負獨見之明羣議不屈㑹集賢院學士衛包抗表陳論議之夜四星聚於尾宿天意昭然帝心遂定乃求殷周漢後為三恪廢韓介酅等公以昌為左贊善大夫包為虞部員外郎肅宗乾元元年四月大赦天下詔曰二王三恪各與一子官德宗以大厯十四年即位詔二王三恪褒聖侯各與一子官貞元五年三月詔曰懐舊念功仁之大也興滅繼絶義之𢎞也昔蔡叔圮族周公封其子於東土韓信干紀漢后爵其孥以弓髙侯君集之不率景化我太宗存其嗣以主祀詳考先王之道洎乎烈祖之訓皆以刑佐德俾人嚮方則斧鉞之誅兵甲之伐葢不得已而用也曩嵗盜臣竊發國步多虞朕狩於近郊指期薄伐將振昆陽之旅以興涿鹿之功徵師未達於諸侯衛士且疲於士卒而李懐光三軍夙駕千里勤王上假雷霆之威下逐虎狼之衆議功方始守節靡終潛構禍胎拒違朝命棄同即異捨順効逆為臣至此在法必誅猶示綏懐庻其牽復而梟音益勵猿突莫遷大戮可加曽無噍類雖自貽伊戚與衆棄之而言念爾勞何嗟及此以其前效猶在孤魂無歸懐之怳然是用悽軫予欲布陳大信冀以成化保合太和期以刑措宜以懐光外孫燕八八賜姓李氏名承緒授左衛率府胄曹參軍承懐光之後仍賜錢一千貫在於懐光墓側置立荘園侍飬懐光妻王氏并備四時享奠之禮嗚呼朕甚不德臨於兆人泣辜宥罪素誠所志爾其保姓受氏宣力承家勉紹乃考之建國庸無若爾父之違王命初懐光授首其子璀瑗等皆死唯妻王氏在帝特赦其死及是又思懐光舊勲哀其絶後乃命承緒繼之九年十一月日南至郊祀禮畢大赦天下詔九廟配享功臣封爵廢絶者宜令紹封以時享祀十三年五月封前左衛率府兵曹同正元份為襲三恪韓國公順宗以貞元二十一年正月即位制曰二王三恪褒聖侯各與一子官穆宗以元和十五年即位閏正月二王介國公宇文仲達卒命有司舉舊典葬祭敬宗寳厯元年八月戊申以故酅國公楊造男前行左内率府曹参軍元凑襲酅國公食邑三千户文宗太和五年正月酅國公楊元凑奏臣先祖隋文帝等陵四所在鳳翔一所在揚州兩所在京兆府准去年四月九日勑二王後介國公先祖陵例每陵每月合給看守丁三人鳳翔府已蒙給丁其京兆府及揚州未蒙准勑㫖詔各令州府准元勅處分後唐荘宗同光二年二月詔曰皇帝御宇禮三恪而為賔烈士敦風頼五帝而濟世當宜封崇後裔欽奉前修應前代二王三恪及文宣王之後並可各令繼襲仍加恩命所有祖宗廟宇亦宜各與増修其隨處合得俸户并子孫户下差稅徭役仍委中書門下檢本朝格律施行明宗天成四年八月以二王後前河清縣令襲封酅國公食邑三千户楊仁規為秘書丞長興三年五月以二王後前詹事府司直楊延紹為贊善大夫仍襲封酅國公食邑三千末帝清泰三年將作監丞襲封介國公宇文頡奏蒙恩襲封除官無襲爵俸給詔特給本官俸晉髙祖天福二年正月勑周以把宋封夏殷之後為二王後兼封舜之後為三恪唐以周隋之後封公又封魏之後為三恪夫應天開國恭已臨人宜覃繼絶之恩以廣延洪之道宜於唐朝宗屬中取一人封公世襲兼隋之酅公為二王後以後周介公備三恪其主祀及赴大朝㑹委所司具典籍申奏其唐朝宗屬中舊在朝及諸為官者各㩀資歴考限滿日循品秩序遷已有出身者任令叅選十一月二王後太子右贊善大夫襲酅國楊延夀父大理評事鄴贈太子中舍四年九月癸未勑周受龍圗立夏殷之祀唐膺鳳厯開酅介之封歴代相㳂百王不易朕顯符景運肇啟丕基乃睠前朝載稽舊典宜開土宇俾奉宗祧周推繼絶之仁以示惟新之德宜以郇國三千户封唐許王李從益為郇公奉唐之祀服色旌旗一依舊制以西京至德宫為廟牲帛器服悉從官給五年正月庚寅以二王後前太子右贊善大夫襲封酅國公食邑三千户楊延壽為太子左諭德三恪後汝州襄城縣令襲介國公宇文頡加食邑三千户六年二月以三恪後汝州襄城縣令襲封介國公食邑三千户宇文頡為太子率更令漢隠帝即位詔唐晉兩朝求訪子孫立為二王後周太祖廣順元年正月五日制以晉漢之裔為二王後委中書門下處分其年十月以李重玉為右監門衛將軍重玉明宗之孫也父從㻮荘宗末遇害至太祖授重玉官秩令主祭念遺孤䘏王者之後也册府元龜卷一百七十三
