body:
  text: 册府元龜卷二百六十二宋王欽若等撰宗室部總序古者紏合宗族所以展親建立子孫用為夾輔故能庇於本根謂之藩屏分以寳玉禮之脤燔故孝悌之道逹骨肉之恩厚焉雖復商周已往典籍靡全然其大抵亦可槩見昔者黄帝二十五子凡一十四姓故其裔緒後世尤盛髙陽氏生一子後世有才子八人是曰八凱髙辛氏生四子皆有天下後世有才子八人是曰八元又黄帝之後有驩兠少昊之後有共工顓頊之後有鯀雖帝者之胄而其德不類焉堯有庻子九人舜亦有庻子其嫡子不立故庻子之封爵無聞焉然自黄帝以迄舜禹皆同姓而異號則其宗枝盛矣禹之後以國為氏者凡十有三人盖夏后氏有扈氏有男氏斟尋氏彤城氏褒氏費氏杞氏鄫氏辛氏𡨕氏斟氏戈氏焉其孫太康有弟五人號曰五觀即夏書所謂五子之歌者也湯之後以國為氏者凡七盖商氏來氏宋氏空桐氏穉氏北殷氏目夷氏焉其後帝乙正妃生三子㣲子㣲仲紂也庻妃生一子箕子也紂生一子武庚也紂雖失國武庚雖不祀而㣲子箕子皆聞於周焉周初封國八百而同姓者五十有餘國詩謂周文王則百斯男經史所載正妃大姒之子十人餘莫可知其國存者十六而已文武周公之胄分封而受國者即左氏所謂管蔡郕霍魯衛毛𣆀郜雍曹滕畢原鄷郇文之昭也邘晉應韓武之穆也凡蔣邢茅胙祭周公之裔也秦氏分封以國為姓有徐氏郯氏莒氏終黎氏運奄氏莬裘氏將梁氏黄氏江氏修魚氏白𡨕氏蜚㢘氏始皇并有天下而子弟不得封建長子扶蘇及諸公子將閭昆弟皆為胡亥所殺故其祚殱焉漢制非劉氏不王皇子封王金璽盭綬掌治其國髙祖尊王子弟大啓九國連城數十景帝用晁錯削地之謀而吳楚七國皆叛及七國既誅五年乃令諸侯王不得治國又以諸侯王疆土過制或僣差失軌而子弟為匹夫輕重不相凖於是制詔諸侯王或欲推恩分子弟邑者令各條上自是支庻畢侯矣然而藩國自析其後皇子始封者大國不過十餘城至於哀平之際皆繼體苗裔宗屬疎逺不為士民所尊勢與富室亡異後漢皇子為王皆安車朱班輪青盖畫轓文輈金塗故名曰王青盖車赤綬四采長二丈一尺三百首皇孫綠盖車名曰皇孫車諸侯王法官屬傅相已下皆備鹵簿似京都官騎張弓帶鞬遮避出入稱課促封者受茅土歸立社稷為宫室其列侯以肺腑在京都者亦随時見食位在博士議郎謂之猥侯諸王皆就封東平王蒼以明帝母弟為驃騎大將軍輔政後亦罷歸國其餘宗室以才能為公卿者多矣晉制諸侯王青盖車皇孫緑盖車並駕三左右騑諸王有勲德者特加皂盖車國初諸王皆在京都咸寧中衞將軍楊珧與中書監荀朂以齊王攸為時望所歸懼有後難同追故司空裴秀立五等封建之㫖共言於武帝以為異姓諸將居邉宜參以親戚帝下詔議其制有司奏從制為大國次國小國非皇子不得為王而諸王之支庻亦各以土推恩受封其大國次國始封之王支子為公所封王之支子為侯繼承王之支子為伯小國五千戸已上始封王之支子為子不滿五千戸始封王之支子及始封公侯之支子皆為男大國中國置三軍中軍二千人上下軍各千五百人次國二軍上軍二千人下軍千人小國一軍其未之國者大國置守土百人次國八十人小國六十人西晉諸王皆主兵臨州以威勢相陵干戈並搆隊于屠滅盖有漸爾宋世諸王得白服裙㡌出入齋閣唯太極四朝乃備朝服孝武以南郡王義宣亂逆繇於强盛欲削弱之江夏王義恭乃表諸省易九事有司附益凡成二十四條聴事不得南向坐施帳并帷蕃國官正冬不得跣登國殿及夾侍國師傳令及油㦸公主王妃傳令不得朱服轝不得重杠鄣扇不得雉尾劒不得鹿盧形槊眊不得孔省白鷩夾轂隊不得絳襖平乗誕馬不得過二匹胡伎不得綵衣舞伎正冬著袿衣不得粧面蔽花正冬㑹不得鐸舞杯柈舞長蹻伎䞬舒丸劒博山伎縁大橦伎五案伎自非正冬㑹奏舞曲不得舞朱妃主不得著衮帶信幡非臺省官悉用絳郡縣内史相及封内官長於其封君既非在三罷官則不復追敬不合稱臣宜從下官而已諸鎮嘗行車前後不得過六隊白直夾轂不在其限刀不得過銀銅為餙諸王女封縣主諸王子孫襲封王王妃及封侯者夫人行並不得鹵簿諸王子繼體為王者婚葬吉㓙悉依諸國公侯之禮不得同皇帝皇子車輿非軺車不得油幢平乘舫皆平兩頭作露平形不得擬象龍舟悉不得朱油帳􅟈不得作五花及豎筍形詔可又王之世子金印紫綬進賢兩梁冠佩山𤣥玉王支子為侯者食邑皆千戸南齊諸王逺遊冠𤣥纓公侯並同平冕各以組纓為八旒衣山龍九章纁朱綬赤黄縹紺金璽龜紐文四中郎將晉世庻姓為之宋齊以來以處諸王而劉氏蕭氏宗室諸子皆罹非命其傳爵土盖亦鮮矣梁制諸王皆假金虎符第一至第五佐領使第一至第十其言曰令境内稱之曰殿下自稱曰寡人並乘通幰平乘車其有勲德者亦時皆駕皂輪車其封公侯者皆假銅虎符竹使符第一言曰教境内稱曰第下自稱寡人國相以下公文上事皆詣典書自諸王皇宗並青傘朱裏此雖云梁制然江右相承有自來矣陳因梁制有親王嗣王藩王之别親王起家則為侍中皇太子冡嫡封王起家依諸王餘子並封公起家中書郎諸王子并諸侯世子起家給事江左承西晉諸王開國並以户數相差為大小三品陳自永定訖於禎明唯衡陽王昌特加至五千户其餘不過二千小國至千戸後魏皇子封王宫室立宗師州置三制刺郡置三太守縣置三令長其一以宗望為之北齊親王位列大司馬上多與梁制同其封内之調盡以入臺二分食一隋制皇伯叔昆弟皇子謂之親王乗通􅚫車初受册入朝助祭親迎則服衮冕青珠九旒九章常服則逺遊三梁冠黒介幘纁朱綬長一丈八尺二百四十首自漢而下五輅之制金象革木通得乘之但减旂章駕馬以為等級自晉親王公以下車服卑雜故不得乗馬唐制宗正寺掌九族六親之屬籍以别昭穆之序凡五等親有昇降皆立簿籍三年一遣凡大祭祀及册命朝㑹之禮皇親應陪位預㑹者亦為宗皇弟兄皆封籍國謂之親王王之子承嫡者謂之嗣王皇太子諸子並封郡王王子承恩澤者亦封郡王諸子封郡公其嗣王郡王及特進王子孫承襲者降封國公舊制親王食封八百戸有至千户髙宗朝以沛縣三王武后所生食封逾於常制神龍初有封五千戸三千户者相王封五千户衡王封三千户開元之後明皇睦親以寧王㝡長封至五千五百户岐薛愛弟著勲至五千戸申王家㣲至四千戸邠王以外枝至一千八百户其後皇子封王者二千戸舊以七丁為限至是以三丁為限降封國公先是髙祖受禪以天下未定廣封宗室以威天下皇從弟及姪年始孩童數十人皆封為郡王又文皇即位因舉宗正屬籍以問侍臣尚書右僕射封德彛謂非至公之道於是宗室率以屬疏降爵為郡公唯有功者封王貞觀十年又詔諸王為代襲刺史都督俄又罷之文皇至髙祖朝其親王有年雖長而不出閣者其出閣者皆為刺史都督上佐亦有為卿監將軍同正員開元之後有為大都䕶節度大使者皆不之任以副都䕶副大使典其事先天之後皇子㓜則居内東宮年以漸成長乃於安國寺東附苑城同為大宅分院居為十王宅令中官押之於夾城中起居每日家令進膳又引詞舉工書之人入教謂之侍讀十王謂慶忠埭鄂榮光頴永延濟盖舉全數其後盛儀壽陳豐鎮凉六王又就封入内宅二十五年鄂光得罪忠繼大統天寳中慶埭又殁唯榮儀等十四王居院而府幕列於外坊歳時通名起居而已外諸孫成長又於十宅外置百孫院每歳幸華清宫宫側亦有十王院百孫院宫人每院四百餘人百孫院二十四人又於宫中置維城庫諸王月俸物納之而給用諸孫納妃嫁女亦就十宅中太子不居於東宫但居於乘輿所幸之别院太子亦分院而居婚嫁則同親王公主在於宗仁之禮院天寳之末禄山犯順得明皇之子儀頴而下十一王及扈從其餘宗室多罹於兵難然而天寳艱難之後宗室子弟賢而立功者唯鄭王曹王子孫耳代宗大歴九年諸王皆幼多未封建大臣奏議請封親王分領戎帥以威天下於是皇子勝衣者盡加王爵而不出閣建中初詔親王子弟帶開府朝秩者出就本班自先天兵興之後皇族子弟皆散棄無位或流落他縣湮沉不齒無異匹庻及德宗即位叙用枝屬公族長幼莫不悲感將有大禮必與諸父昆弟同其齋沐五代之制大約遵於唐室夫以託霄極之尊依蘿圖之盛承本枝之蕃茂膺盤石之疏封是曰君宗咸居屬籍雖親疎之節著於宗人而善惡之名紀乎惇史或以德行振或以才藝升或以悖逆廢或以荒怠黜或以猜忌擯或以至親顯並著之簡編垂夫龜鑑見善善之有因惡惡之無爽也凡宗室部四十二門封建太史公稱封建之制商氏以前尚矣周監二代列爵五等三聖之法厥用垂世詩云懐德惟寧宗子維城豈徒敦叙宗黨推廣仁愛盖欲其枝葉相持臂指昜使犬牙交錯磐石彌固者爾然而俗有淳漓道或消長泥於古者未為通變故秦㨿勝勢專宰疆理矯枉過正蕩㓕禮義炎漢建業大啓藩垣既失厥中流濫致溢先儒之論盖亦多矣自兹已䧏或㳂或革究其始終隨時彊弱天之視聽在民耳目深根忠附匪特於兹若夫展親睦族典章優渥雖或不以德舉亦彊幹作翰之㫖也舜踐帝位封弟象為諸侯封之有庳在零陵今庳亭是夏少康封庻子史闕其名於㑹稽以奉守禹之祀周武王克商平天下封功臣昆弟於是封叔鮮於管管在滎陽京縣東北封叔度於蔡二人相紂子武庚禄父治殷遺民封叔旦於魯而相周為周公一云封周公旦於少昊之墟曲阜是為魯公臣欽若等曰周公留相於王子伯禽就封封叔振鐸於曹封叔武於成封叔處於霍叔封季載皆少未得封求㤗伯仲雍之後得周章周章已君吳因而封之乃封周章弟虞仲於周之北故夏虚在河東太陽縣是為虞列為諸侯成王即位唐有亂周公誅㓕唐成王與叔虞戯削桐葉為珪以與叔虞曰以此封若史佚曰天子無戲言言則史書之禮成之樂歌之於是遂封叔虞於唐唐在河汾之東方百里周公旣誅武庚殺管叔放蔡叔而分殷餘民為二其一封微子啓於宋以續殷祀其一封康叔封於衛又封季載於冉臣欽若等檢左傳管蔡郕霍魯衞毛𣆀郜雍也曺滕畢原酆郇文之昭也邗晉應韓武之穆凡蔣邢茅胙祭周公之裔也今㨿史記所封八國餘皆闕又封伯禽於魯曰生以養周公死以為周公後宣王二十二年封庻子弟友於鄭鄭云母弟即桓公也考王封其弟於河南是為桓公以續周公之官職漢髙祖六年十二月詔曰齊古之建國也今為郡縣其復以為諸侯將軍劉賈數有大功及擇寛惠修潔者王齊荆地正月丙午韓王信等奏請以故東陽郡鄣郡吳郡五十三縣立劉賈為荆王以碭郡薛郡郯郡三十六縣立弟文信君交為楚王壬子以雲中鴈門代郡五十三縣立兄宜信侯喜為代王以膠東膠西臨淄濟北博陽城陽郡七十三縣立子肥為齊王賈髙祖從父兄有功交髙祖同父弟與蕭曹等俱從髙祖入武關至覇上封文信君從入蜀還定三秦及即帝位常出入卧内髙祖廢楚王信分其地為二國立賈為荆王交為楚王先有功也肥之母髙祖㣲時外婦食七十餘城諸民能齊言者皆與齊齊最為大國以海内初定子弟少感秦孤立亡藩輔故大封同姓以鎮天下七年十二月匈奴攻代代王喜棄國自歸雒陽赦為合陽侯立子如意為代王是年封兄子信為頡羔侯十一年十二月封兄子濞為沛侯正月詔曰代地居常山之北與夷狄邉趙乃從山南有之逺數有胡㓂難以為國頗取山南太原之地益屬代代之雲中以西為雲中郡則代受邉冦益少矣王相國通侯吏二千石擇可立為代王者燕王綰相國何等三十三十人皆曰子恒文帝名賢知温良請立為代王都晉陽二月詔擇可以為梁王淮陽王者燕王綰相國何等請立子恢為梁王子友為淮陽王罷東郡頗益梁罷潁川郡頗益淮陽七月詔王相國擇可立為淮南王者羣臣請立子長為王十二年十月詔曰吳古之建國也日者荆王兼有其地今死亡後朕欲立吳王其議可者長沙王臣等言沛侯濞重厚可立為吳王初黥布反髙祖自將往誅之濞年二十以騎將從破布軍髙祖患吳㑹稽輕悍無狀王塡之諸子少乃立濞十一月封兄子廣為德侯二月詔諸侯王議可立為燕王者長沙王臣等臣者長沙王吳芮之子請立子建為燕王髙后元年立惠帝後宫子強為淮陽王不疑為常山王𢎞為襄城侯朝為軹侯武為壺關侯一云皆吕氏子二年五月封楚元王子郢為下邳侯齊悼惠王子章為朱虛侯六年四月封齊悼惠王子興居為東牟侯七年正月立營陵侯劉澤為琅邪王澤髙祖從祖昆弟文帝元年十二月立趙幽王子遂為趙王徙琅邪王澤為燕王吕氏所奪齊楚地皆歸之二年三月有司請立皇子為諸侯王詔曰前趙幽王幽死朕甚憐之已立其太子遂為趙王遂弟辟疆辟疆言辟禦强梁者一云辟疆言闢土地也衞侯朝于周周行人問其名衞侯曰辟疆行人還之曰啟疆天子之號也諸侯弗得用更其名曰燬其義兩説並通及齊悼惠王朱虛侯章東牟侯興居有功可王乃遂立辟疆為河間王章為城陽王興居為濟北王因立皇子武為代王參為太原王揖為梁王四年九月封齊悼惠王子十人為列侯罷軍為管侯寜國為𤓰丘侯信都為營平侯安為楊丘侯將閭為楊虚侯辟光為扐侯志為安都侯卬為平昌侯賢為武成侯雄渠為白石侯八年五月封淮南厲王長子四人為列侯安為阜陵侯勃為安陽侯賜為陽周侯良為東城侯十六年五月立齊悼惠王子六人安都侯志為濟北王扐侯辟光為濟南王武城侯賢為菑川王平昌侯卬為膠西王白石侯雄渠為膠東王淮南厲王子三人阜陽侯安為淮南王安陽侯勃為衡山王陽周侯賜為廬江王皆為王景帝元年四月封元王寵子五人禮為平陸侯富為休侯歳為沈猶侯王子侯表屬千乗髙苑蓻為宛朐侯調為棘樂侯二年三月立皇子德為河間王閼為臨江王餘為睢陽王非為汝南王彭祖為廣川王發為長沙王發母唐姬故程姫侍者景帝召程姬程姬有所避不願進謂月事而飭侍者唐兒使夜進上醉不知以為程姬而幸之遂有身已乃覺非程姬也及生子因名曰發長沙王生乃發寤己之繆幸唐妃以其母㣲無寵故王卑濕貧國三年立皇子端為膠西王勝為中山王是年吳楚反膠西王菑川濟南發兵應圍齊孝王將閭急隂與三國通漢將欒布擊破三國兵齊孝王懼飲藥自殺帝以為齊首善以廹刼有謀非其罪也召立孝王太子壽是為懿王衡山王勃堅守無二心吳楚破來朝帝勞苦之曰南方卑濕徙王於濟北以褒之中元二年四月封故皇子越為廣川王寄為膠東王五年五月立皇子舜為常山王封梁孝王子買為乗氏侯明為垣邑侯六年四月梁孝王薨竇太后泣極哀不食帝哀懼不知所為與長公主計之迺分梁為五國盡立孝王子男五人為王乗氏侯買為梁王垣邑侯明為濟川王彭離為濟東王定為山陽王不識為濟隂王册府元龜卷二百六十二
