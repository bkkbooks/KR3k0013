body:
  text: 册府元龜卷八百二十六宋王欽若等撰總録部品藻傳曰儗人必於其倫古之作者曷嘗不靈機内炤精鍳外朗詳識人物區別淑慝或察言而知行或因詩以見志或窮居而表其操或目擊而辯其道乃至哲人既往遺風可挹標舉推引形容摹擬明其志行之所趣用俾方來而取法斯聖賢之深㫖也春秋之時褒貶尤著尼丘聖師其論已博矣子輿著書亦頗商𣙜厥後孟堅列九等之序汝南有月旦之評皆是物也歴代而下話言靡絶蓋子貢方人夫子稱其不暇者誠以賜之多言也在於品題銓度取資為監夫豈有過哉賈季為晉大夫奔狄狄相鄷舒問於賈季曰趙衰趙盾孰賢對曰趙衰冬日之日也趙盾夏日之日也冬日可愛夏日可畏管仲為齊相既寢疾桓公往問之曰仲父之疾甚矣若不可諱也不幸而不起此疾彼政我將安移之管仲未對桓公曰鮑叔之為人如何管仲曰鮑叔君子也千乘之國不以其道予之不受也雖與千乘之國不以其道彼必不受雖然不可以為政其為人也好善而惡惡之已甚已太也言憎惡惡太甚見一惡終身不忘桓公曰然則孰可管仲對曰隰朋可朋之為人好上識而下問好上識謂好知逺大之事臣聞之以徳與人者謂之仁以財與人者謂之良以善勝人者未有能服人者也以善勝人人亦生勝已之心故不服之以善養人者未有不服人者也于國有所不知政于家有所不知事必則朋乎若皆知之則事鍾於已將不勝任而敗朋能有所不知故可以移政且朋之為人也居其家不忘公門居公門不忘其家事君不二其心亦不忘其身舉齊國之幣握路之家五十室其人不知也大仁也哉其朋乎握持也或有舉齊國之幣持與路旁之家五十室言其事大而且亦顯此皆自有主司朋能不干預而疆知此所謂於國有所不知政合於天地之大天不容載故曰大仁哉其朋乎公又問曰不幸而失仲父也二三大夫者其猶能以國寧乎管仲對曰君請矍已乎矍已謂有所驚懼而問未止鮑叔牙之為人也好直賔胥無之為人也好善甯戚之為人也能事孫在之為人也善言公曰此四子者其孰能一人之上也寡人并而臣之則其不以國寧何也言四子皆超絶之材無人能過其上今吾并得臣之國尚不寧何也對曰鮑叔之為人好直而不能以國詘不能為國以詘其直賔胥無之為人好善而不能以國詘甯戚之為人能事而不能以足息寗戚善於農植貪於積聚不能知足而息已孫在之為人善言而不能以信黙其所陳言既見信用尚不能黙凡此四子皆矜能太過不能與時屈伸故國不寧臣聞之消息滿虗與百姓詘信然後能以國寧勿己者朋其可乎朋之為人動必量力舉必量技言終喟然而嘆曰天之生朋以為夷吾舌也其身死舌焉生哉言朋亦將隨己早亡不得乆理齊政故哀歎言此先知未然夷吾所以稱嘆也趙孟為晉大夫自宋還過鄭鄭伯享趙孟於垂隴子展伯有子西子産子太叔二子石從二子石印段公孫段趙孟曰七子從君以寵武也請皆賦以卒君貺武亦以觀七子之志詩以言志子展賦草蟲草蟲詩召南日未見君子憂心忡忡亦既見止亦既覯止我心則降以趙孟為君子趙孟曰善哉民之主也在上不忘降故可以主民抑武也不足以當之辭君子伯有賦鶉之賁賁鶉之賁賁詩鄘風衛人刺其君淫亂鶉鵲之不若義取人之無良我以為兄我以為君也趙孟曰牀笫之言不踰閾况在野乎非使人之所得聞也笫簀笫之此詩刺淫亂故云牀閾門限使人趙孟自謂子西賦黍苖之四章黍苖詩小雅四章曰肅肅謝功召伯營之烈烈征師召伯成之比趙孟於召伯趙孟曰寡君在武何能焉推善於其君子産賦隰桑隰桑詩小雅義取思見君子盡心以事之曰既見君子其樂如何趙孟曰武請受其卒章卒章曰心乎愛矣遐不謂矣中心藏之何日忘之趙武欲子産之見規誨也子太叔賦野有蔓草野有蔓草詩鄭風取其邂逅相遇適我願兮趙孟曰吾子之惠也太叔喜於相遇故趙孟受其惠印段賦蟋蟀蟋蟀詩唐風曰無已太康職思其居好樂無荒良土瞿瞿言瞿瞿然顧禮義趙孟曰善哉保家之主也吾有望矣能戒懼不荒所以保家公孫叚賦桑扈桑扈詩小雅義取君子有禮文故能受天之祜趙孟曰匪交匪敖福將焉往此桑扈詩卒章趙孟因以取義若保是言也欲辭福禄得乎卒享文子告叔向曰伯有將為戮矣詩以言志志誣其上而公怨之以為賔榮言誣則鄭伯未有其實趙孟倡賦詩以自寵故言公怨之以為賔榮其能乆乎幸而後亡言必先亡叔向曰然已侈所謂不及五稔者夫子之謂矣文子曰其餘皆數世之主也子展其後亡者也在上不忘降謂賦草蟲曰我心則降印氏其次也樂而不荒謂賦蟋蟀曰好樂無荒樂以安民不淫以使之後亡不亦可乎孔子謂子産有君子之道四焉其行已也恭其事上也敬其養民也惠其使民也義又曰晏平仲善與人交乆而敬之齊大夫晏姓平謚名嬰又曰臧文仲居蔡臧文仲魯大夫臧孫辰之謚也蔡國君之守龜出蔡地因以為名焉長尺有二寸居蔡僣也山節藻棁節者栭也刻鏤為山棁者梁上楹畫為藻文言其奢侈何如其知也非時人謂之為知子曰管仲之器小哉言其器量小也或曰管仲儉乎或人見孔子小之以為謂之大儉曰管氏有三歸官事不攝焉得儉三歸娶三姓女婦人謂嫁曰歸攝猶兼也禮國君事大官各有人大夫兼并今管仲家臣備職非為儉然則管仲知禮乎或人以儉問故答以安得儉或人聞不儉便謂為知禮曰邦君樹塞門管氏亦樹塞門邦君為兩君之好有反坫管氏亦有反坫反坫反爵之坫在兩楹之間人君別内外於門樹屏以蔽之若與鄰國為好㑹其酬酢之禮更酌酌畢則各反爵於坫上今管仲皆僭為之如是是不知禮管氏而知禮孰不知禮又曰伯夷叔齊不念舊惡怨是用希伯夷叔齊孤竹君之二子孤竹國名又曰孰謂㣲生髙直㣲生姓名髙魯人或乞醯焉乞諸其鄰而與之乞之四鄰以應求者用意委曲非為直人又曰從我於陳蔡者皆不及門也言弟子從我於陳蔡者皆不及仕進之門而失其所徳行顔淵閔子騫冉伯牛仲弓言語宰我子貢政事冉有季路文學子游子夏又曰孟公綽為趙魏老則優不可以為滕薛大夫公綽魯大夫趙魏皆晉卿家臣稱老公綽性寡欲趙魏貴賢家老無職故優薛小國大夫職煩故不可為又曰晉文公譎而不正譎詐也謂召天子而使諸侯朝之仲尼曰以臣召君不可以訓故書云天王狩於河陽是譎而不正也齊桓公正而不譎伐楚以大義責包茅之貢不入問昭王南征不還是正而不譎也又或問子産子曰惠人也惠愛也子産古之遺愛問子西曰彼哉彼哉馬曰子西鄭大夫彼哉彼哉言無足稱或曰楚令尹子西問管仲曰人也猶詩言所謂伊人奪伯氏駢邑三百飯疏食沒齒無怨言伯氏齊大夫駢邑地名齒年也伯氏食邑三百家管仲奪之使至疏食而沒齒無怨言以其當理故又曰由之瑟奚為於丘之門子路鼓瑟不合雅頌門人不敬子路子曰由也升堂矣未入於室也升我堂矣未入於室耳門人不解孔子言為賤子路故復觧之又曰吾未見剛者或對曰申棖申棖魯人子曰棖也慾焉得剛慾多情慾又曰甯武子衛大夫甯俞武諡也邦有道則知邦無道則愚其知可及也其愚不可及也佯愚似實故曰不可及又曰回也其心三月不違仁其餘則日月至焉而已矣餘人蹔有至仁時唯回移時而不違又曰柴也愚髙柴字子羔愚直之愚參也魯魯鈍也曾子性遅鈍師也辟子張才過人失在邪辟文過由也喭子路之行失於鄙喭子曰回也其庶乎屢空賜不受命而貨殖焉億則屢中言回庶幾聖道雖數空匱而樂在其中賜不受教命惟財貨猶是殖億度是非蓋美回所以勵賜也一曰屢猶每也空虗中也以聖人之善道較數子之庻㡬猶不至於知道者各内有此害其於庶幾毎能虗中者唯回懷道深逺不虗心不能知道子貢雖無數子之病然亦不知道者雖不窮理而幸中雖非天命而偶富亦所以不虗心也又曰雍也可使南面可使南面任諸侯治又曰直哉史魚衛大夫史鰌邦有道如矢邦無道如矢有道無道行直如矢言不曲君子哉蘧伯玉邦有道則仕邦無道則可卷而懷之卷而懷謂不與時政柔順而不忤於人又曰齊景公有馬千駟死之日民無徳而稱焉千駟四千匹伯夷叔齊餓于首陽之下首陽山在河東蒲坂縣華山之北河曲之上民到于今稱之其斯之謂與此所謂以徳為稱又曰不降其志不辱其身伯夷叔齊與言其行己之志不入庸君之朝謂柳下惠少連降志辱身矣言中倫行中慮其斯而已矣但能言應倫理行應思慮如此而已謂虞仲夷逸隱居放言放置也不復言世務身中清廢中權清純潔也遭世亂自廢棄以免患合於權也我則異於是無可無不可亦不必進亦不必退唯義所在又曰管仲鏤簋而朱紘旅樹而反坫山節而藻税賢大夫也而難為上也言其僣天子諸侯鏤簋刻為蟲獸也冠有笄者為紘紘在纓處兩端端上属不結也旅樹門屏也反坫反爵之坫也山節藻楹刻之為山梲侏儒柱畫之為藻文晏平仲祀其先人豚肩不揜豆賢大夫也而難為下也言其偪士庶人也豚爼實豆徑尺言并豚兩肩不能揜豆喻小也君子上不僭上下不偪下仲由字子路爲衛大夫謂孔子曰桓公殺公子糾召忽死之管仲不死曰未仁乎齊襄公立無常鮑叔牙曰君使民慢亂將作矣奉公子小白出奔莒襄公從弟公孫無知殺襄公管夷吾召忽奉公子糾出奔魯齊人殺無知魯伐齊納子糾小白自莒先入是為桓公乃殺子糾召忽死之子曰桓公九合諸侯不以兵車管仲之力也如其仁如其仁誰如管仲之仁子貢曰管仲非仁者與桓公殺公子糾不能死又相之子曰管仲相桓公覇諸候一匡天下天子㣲弱桓公帥諸侯以尊周室一匡天下民到于今受其賜受其賜者謂不被髪左袵之惠㣲管仲吾其被髪左袵矣㣲無也無管仲則君不君臣不臣皆為夷狄豈若匹夫匹婦之為諒也自經於溝瀆而莫之知也經經死於溝瀆中也管仲召忽之於公子糾君臣之義未正故死之未足深嘉不死未足多非死事既難亦在於過厚故仲尼但美管仲之功亦不言召忽不當死端木賜字子貢孔子弟子也嘗相魯衛子貢問孔子曰師與商也孰賢子曰師也過商也不及言俱不得中曰然則師愈與子曰過猶不及愈猶勝也又問曰賜也何如子曰女器也言女器用之人曰何器也曰瑚璉也瑚璉黍稷之器夏曰瑚殷曰璉周曰簠簋宗廟之器貴者又問曰孔文子何以謂之文也孔文子衛大夫圉文諡也子曰敏而好學不耻下問是以謂之文也敏者識之達也下問謂凢在已下顓孫師字子張陳人也子張問孔子曰令尹子文令尹子文楚大夫姓鬬名穀字於莵三仕為令尹無喜色三已之無愠色舊令尹之政必以告新令尹何如子曰忠矣曰仁矣乎曰未知焉得仁但聞其忠事未知其仁也崔子弑齊君陳文子有馬十乘棄而違之皆齊大夫崔杼作亂陳文子惡之捐其四十匹馬違而去之至於他邦則曰猶吾大夫崔子也違之之一邦則又曰猶吾大夫崔子也違之何如子曰清矣曰仁矣乎曰未知焉得仁文子辟惡逆去無道求有道當春秋時臣陵其君皆如崔子無有可止者孟武伯魯大夫也問孔子曰子路仁乎子曰不知也仁道至大不可全名又問子曰由也千乘之國可使治其賦也賦兵賦不知其仁也求也何如子曰求也千室之邑百乘之家可使為之宰也千室之邑卿大夫之邑卿大夫稱家諸侯千乘大夫百乗宰家臣不知其仁也赤也何如子曰赤也束帶立於朝可使與賔客言也赤弟子公西華有容儀可使為行人不知其仁也冉雍字仲弓問子桑伯子於孔子伯子書傳無見焉子曰可也簡以其能簡故曰可也仲弓曰居敬而行簡以臨其民不亦可乎居身敬肅臨下寛略則可居簡而行簡無乃太簡乎伯子之簡太簡子曰雍之言然季子然季氏之家臣問孔子曰仲由冉求可謂大臣與子然季氏子弟自多得臣此二子故問之子曰吾以子為異之問曾由與求之問謂子問異事耳則此二人之問安足大乎所謂大臣者以道事君不可則止今由與求也可謂具臣矣言備臣數而已曰然則從之者與問為臣皆當從君所欲邪子曰弑父與君亦不從也言二子雖從其主亦不與大逆季康子魯大夫也問孔子曰仲由可使從政也與子曰由也果果謂果敢决斷於從政乎何有曰賜也可使從政也與曰賜也達達謂通於物理於從政乎何有曰求也可使從政也與曰求也藝藝謂多才藝於從政乎何有言偃吳人字子游為武城宰謂曾參曰吾友張也為難能也言子張容儀之難及然而未仁曾子曰堂堂乎張也難與並為仁矣言子張容儀盛而於仁道薄也孟軻鄒人也事齊宣王宣王不能用適梁梁惠王不果所言退作孟子七篇軻曰伯夷隘柳下惠不恭隘與不恭君子不由也伯夷懼人之汙來及已太隘狹也柳下惠輕忽時人禽獸畜之太不恭也先言二人之行孟子平之禹稷當平世三過其門而不入孔子賢之顔子當亂世居於陋巷一簞食一瓢飲人不堪其憂顔子不改其樂孔子賢之孟子曰禹稷顔回同道當平世三過其門者身為公卿憂民急也當亂世安陋巷者不用於世窮而樂道也孟子以為憂人之道同用與不用不在是也故孔子俱賢之禹思天下有溺者由己溺之也稷思天下有饑者由己饑之也是以如是其急也禹稷顔子易地則皆然禹稷急民之難若是顔子與之易地其心亦然不在其位勞佚異矣又曰伯夷聖之清者也伊尹聖之任者也柳下惠聖之和者也孔子聖之時者也曽參居武城有越冦冦至則去冦退乃反子思居於衛有齊冦至或曰冦至盍去諸子思曰如伋去君誰與守伋子思名也欲助衛君赴難孟子曰曾子子思同道曾子師也父兄也子思臣也㣲也曽子子思易地則皆然曾子為武城人作師則其父兄故去留無毁子思㣲少為臣當死難故不去公孫丑問孟子曰伯夷伊尹何如曰不同道非其君不事非其民不使治則進亂則退伯夷也何事非君何使非民治亦進亂亦進伊尹也要爲天治物冀得行道而已矣可以仕則仕可以止則止可以乆則乆可以速則速孔子也皆古聖人也吾未能有行焉乃所願則學孔子也言皆古聖人我未能有所行若此乃言我心之所庶㡬則願欲學孔子所履曰伯夷伊尹於孔子若是班乎班齊等之貎也丑兼伯夷伊尹與孔子相比問此三人之徳班然而等乎曰否自有生民以來未有如孔子也漢爰盎為郎中文帝即位絳侯為丞相朝罷趨出意得甚帝禮之恭常目送之盎進曰丞相何如人也帝曰社稷臣盎曰絳侯所謂功臣非社稷臣社稷臣主在與在主亡與亡方呂后時諸呂用事擅相王劉氏不絶如帶是時絳侯為太尉本兵柄弗能正呂后沒大臣相與共誅諸呂太尉主兵適㑹其成功所謂功臣非社稷臣嚴助為汲黯請告武帝曰汲黯何如人也助曰使黯任職居官亡以踰人然至其輔少主守成雖自謂賁育弗能奪也帝曰然古有社稷之臣至如汲黯近之矣後官至㑹稽太守後漢陳蕃為光禄卿桓帝問曰徐穉袁閎韋著誰為先後蕃對曰閎生出公族聞道漸訓著長於三輔禮義之俗所謂不扶自直不鏤自雕至於穉者爰自江南卑薄之域而角立傑出宜當為先范滂汝南人或問滂曰郭林宗何如人滂曰隱不違親貞不絶俗天子不得臣諸侯不得友吾不知其它滂後辟太尉黄瓊掾郭泰字林宗太原介休人泰之所名人品乃定先言後驗衆皆服之始至南州過袁奉髙不宿而去從黄叔度累日不去或以問泰泰曰奉髙之器譬之泛濫雖清而易挹叔度之器汪汪若千頃之波澄之不清擾之不濁不可量也已而果然又嘗謂劉儒口訥心辯有珪璋之質終必為令徳之士司徒黄瓊辟太常趙典舉有道並不應許卲汝南人初為郡功曹與從兄靖俱有髙名好共覈論鄉黨人物每月輙更其品題故汝南俗有月旦評焉卲嘗到潁川多長者之逰唯不候陳寔又陳蕃䘮妻還𦵏鄉人畢至而卲獨不往或問其故卲曰太丘道廣廣則難周仲舉性峻峻則少通故不造也其多所裁量若此或問卲曰荀靖與荀爽孰賢卲曰二人皆玉也慈明外朗叔慈内潤孔融與韋端書曰前日元將來淵才亮茂雅度𢎞毅偉世之器也昨日仲將又來臣欽若等曰韋端二子康字元將誕字仲將懿性貞實文愍篤誠保家之主也不意雙珠近出老蚌甚􅎇貴之後官至少府龎徳公襄陽人居峴山之南嘗謂諸葛孔明為卧龍龎士元為鳯雛司馬徳操為水鏡皆徳公語也李膺潁川襄城人時鍾皓及荀淑並為士大夫所歸慕膺嘗歎曰荀君清識難尚鍾君至徳可師膺位至司𨽻校尉冊府元龜卷八百二十六
