body:
  text: 冊府元龜卷七百三十四宋王欽若等撰陪臣部智識第三仲孫湫齊大夫也魯莊公之薨閔公元年仲孫湫來省魯難歸曰不去慶父魯難未已時慶父亦已還魯公曰若之何而去之對曰難不已將自斃斃踣也君其待之公曰魯可取乎對曰不可猶秉周禮周禮所以本也臣聞之國將亡本必先顛而後枝葉從之魯不棄周禮未可動也君其務寧魯難而親之親有禮因重固能重能固則當成之間携貳離而相疑者其當因而間之覆昬亂覆敗也覇王之器也又齊湫聘且言王子帶前年王子帶奔齊言欲伐之事畢不與王言不言子帶事歸復命曰未可王怒未息其十年乎不十年王弗召也管仲齊大夫也僖公七年諸侯盟于寗母謀鄭故也管仲言於齊侯曰臣聞之招擕以禮懷逺以徳擕離也徳禮不易無人不懷齊侯修禮於諸侯諸侯官受方物諸侯官司各於齊受其方所當貢天子之物鄭伯使其太子華聽命於㑹言於齊侯曰洩氏孔氏子人氏此三族者實違君之命三族鄭之大夫也君若去之以為成我以鄭為内臣君亦無所不利焉以鄭事齊如封内臣齊侯將許之管仲曰君以禮與信屬諸侯而以姦終之無乃不可乎子父不奸之謂禮守命共時之謂信守君命共時事違此二者姦莫大焉公曰諸侯有討於鄭未㨗今茍有釁從之不亦可乎子華犯父命是其釁隙對曰君若綏之以徳加之以訓辭而帥諸侯以討鄭鄭將覆亡之不暇豈敢不懼若總其罪人以臨之總將領也子華奸父之命即罪人鄭有辭矣何懼以大義為辭且夫合諸侯以崇徳也㑹而列姦何以示後嗣列姦用子華夫諸侯之㑹其徳刑禮義無國不記記姦之位位㑹位也子華為姦人而列在㑹位將為諸侯所記君盟替矣替廢也作而不記非盛徳也君舉必書雖復齊史隠諱亦損盛徳君其勿許鄭必受盟夫子華既為太子而求介於大國以弱其國亦必不免介因也鄭有叔詹堵叔師叔三良為政未可間也齊侯辭焉子華繇是得罪于鄭冬鄭伯使請盟於齊曹沬為魯将與齊戰三敗北魯荘公與齊桓公盟曹沬執匕首刼桓公桓公乃許盡歸魯之侵地沬下壇桓公怒欲倍其約管仲曰不可夫貪小利以自快棄信於諸侯失天下之援不如與之於是桓公乃遂割魯侵地曹沬三戰所亡地盡復予魯齊桓公合諸侯衛人後至公朝而與管仲謀伐衛罷朝而入衛姬望見君下堂再請衛君之罪公曰吾與衛無故子曷為請對曰妾望見君之入也足髙氣彊伐國之志也見妾而有動色伐衛也眀日君朝揖管仲而進之管仲曰君舍衛乎公曰仲父安識之管仲曰君之揖朝也恭而言也徐見臣而有慙色臣是以知之公曰善管仲治外夫人治内寡人知終不為諸侯笑矣東郭郵齊人也齊桓公與管仲闔門而謀伐莒未發而已聞於國矣桓公宻謂管仲曰寡人與仲父闔門而謀伐莒未發也而已聞於國其故何也管仲曰國必有聖人桓公曰然夫日之役者有執席食以上視者彼必是邪桓公與管仲謀時役人於前乃有執席而食私目上視所以察君也必是人者知君謀於是乃令之復役毋復相代時執席而食者代人入役因得察君今不令相代彼亦知君覺已必當自來之也少焉東郭郵至桓公令擯者延而上擯謂贊引賓客者也與之分級而上公以客禮待之故與之分級而上謂使之就賓階也問焉曰子言伐莒者乎東郭郵曰然臣也桓公曰寡人不言伐莒而子言伐莒其故何也東郭郵對曰臣聞之君子善謀而小人善意善以意度之也臣意之也桓公曰子奚以意之東郭郵曰夫欣然喜樂者鐘鼓之色也淵然清静者縗絰之色也漻然豐滿心在兵武則氣盛故其貎豐滿而手足拇動者中勇外形必應故手足拇動也兵甲之色也日者視二君之在臺上也口開而不闔是言莒也莒字兩口故二君開口相對即知其言莒也舉手而指勢當莒也且臣觀小國諸侯之不服者唯莒於是惟莒不服於是知之臣故曰伐莒桓公曰善哉以微射明此之謂乎言以形色之微知伐國之明子其坐寡人與子同之同伐莒之謀也又云齊桓公與管仲謀伐莒謀未發而聞於國桓公恠之曰與仲父謀伐莒未發而聞於國其故何也管仲對曰國必有聖人也桓公曰譆日之役者有執蹠胎而上視者意者其是邪乃令復役毋得相代少頃東郭郵至管仲曰此必是已乃令賔者延之而上分之而立管仲曰即言伐莒者對曰然管仲曰我不言伐莒子何故言伐莒子何以意之對曰臣聞君子有三色顯然喜樂者鐘鼓之色愀然清静者縗絰之色艴然充盈手足矜者兵革之色也日者臣望君之在臺上者艴然充盈手足矜者此兵革之色也君呿而不唫呿開唫閉所言者莒也君舉臂而指所當者莒也臣切聞諸侯之不服者其莒乎臣故言之晏桓子齊大夫也公孫歸父㑹齊侯於穀桓子與之言魯樂桓子告髙宣子桓子晏嬰父宣子髙固也曰子家其亡乎懐於魯矣子家歸父字懐思也懐必貪貪必謀人謀人亦謀已一國謀之何以不亡後歸父奔齊晏平仲齊大夫也晉欒盈奔楚魯襄公二十二年秋盈自楚適齊晏平仲言於齊侯曰商任之㑹受命於晉受錮欒氏之命今納欒氏将安用之小所以事大信也失信不立君其圖之弗聽退告陳文子曰君人執信臣人執共忠信篤敬上下同之天之道也君自棄也弗能乆矣欒盈猶在齊晏子曰禍将作矣齊将伐晉不可以不懼眀年齊伐晉齊侯自衛将遂伐晉平仲曰君恃勇力以伐盟主若不濟國之福也不徳而有功憂必及君襄公二十八年慶封患子雅子尾之怒使析歸父告晏平仲欲與共謀子雅子尾平仲曰嬰之衆不足用也知無能謀也言弗敢出不敢洩謀有盟可也子家曰子之言云子家析歸父又焉用盟告北郭子車子車齊大夫子車曰人各有以事君非佐之所能也佐子車名又昭公三年齊公孫竈卒竈子雅司馬竈見平仲司馬竈齊大夫曰又䘮子雅矣平仲曰惜也子旗不免殆哉以旗不臣姜族弱矣而媯将始昌媯陳氏二恵競爽猶可子雅子尾皆齊惠公之孫也競强也爽明也又弱一个一作介焉姜其危哉齊侯伐北燕将約簡公簡公北燕伯三年出奔齊晏子曰不入燕有君矣民不二吾君賄左右諂䛕作大事不以信未甞可也又髙子問晏子曰子事靈公荘公景公皆敬子三君之心一邪夫子之心三邪對曰善哉問事君嬰一心可以事百君三心不可以事一君故三君之心非一心也而嬰之心非三心也且嬰之於靈公也盡復而不能立之政所謂僅全其四支以從其君者也及荘公陳武夫尚勇力欲辟勝於邪而嬰不能禁故退而野處嬰聞之言不用者不受其禄不理其事者不與其難吾於荘公行之矣今之君輕國而重樂薄於民而厚於養籍歛過量使令過任而嬰不能禁庸知能全身以事君乎又晉叔向問晏子曰齊國之治衰矣今子若何晏子對曰嬰聞之事眀君者竭心力以沒其身行不逮則退不以誣持禄事惰君者優游其身以沒其世力不能則去不以䛕持危且嬰聞君子之事君也進不失忠退不失行不茍合以隠志可謂不失忠不持利以傷亷可謂不失行叔向曰善哉詩有之曰進退惟谷其此之謂歟叔向又問曰事君之倫徒處之義奚如晏子曰事君之倫知慮足以安國譽厚足以道君和柔足以懐衆不亷上以為名不倍民以為行上也潔於治已不飾過以求先不䜛䛕以求進不阿所私不誣所能次也盡力守職不敢怠奉官從上不敢惰畏上故不茍忌罪故不辟下也三者事君之倫也及夫大賢則徒處與有事無擇也随時宜者也有所謂君子者能不足以補上退處不順上治唐園考菲履共恤上令第長鄉里不夸言不愧行君子也不以上為本不以民為憂内不恤其家外不顧其交夸言愧行自勤於饑寒不及醜儕命之曰狂辟之民明上之所禁也進不能及上退不能獨處作窮於富利之門畢志於畎畆之業窮通行無常處之慮佚於心利通不能窮業不成命之曰處封之民眀上之所誅也有知不足以補君有能不足以勞民俞身徒處謂之傲上茍進不擇所道茍得不知所惡謂之亂賊身無以與君能無以勞民飾徒處之義揚輕上之名謂之亂國眀君在上三者不免罪叔向曰賢不肖性夫吾毎有問而退未甞自得也又公孫接田開疆古冶子事景公以勇力搏虎聞晏子過而趨三子者不起晏子入見公曰臣聞眀君之蓄勇力之士也上有君臣之義下有長率之倫内可以禁暴外可以威敵上利其功下服其勇故尊其位重其禄今君之蓄勇力之士也上無君臣之義下無長率之倫内不可以禁暴外不可以威敵危國之器也不若去之公曰三子者搏之恐不得刺之恐不中也晏子曰此皆力攻勍敵之人也無長幼之禮因請公使人少餽之二桃曰三子何不計功而食桃公孫接仰天而歎曰晏子智人也夫使公之計吾功者不受桃是無勇也士衆而桃寡何不計功而食桃矣接一搏特豬而再摶乳虎若接之功可以食桃而無與人同矣援桃而起田開疆曰吾伏兵而郤三軍者再若開疆之功亦可以食桃而無與人同矣援桃而起古冶子曰吾甞從君濟於河黿衘左驂以入砥柱之流當是時也冶少不能游濳行逆流百歩順流九里得黿而殺之左操驂尾右挈黿頭鶴躍而出津人皆曰河伯也若冶視之則大黿之首也若冶之功者亦可以食桃而無與人同矣二子者何不反桃抽劒而起公孫接田開疆曰吾勇不子若功不子逮取桃不讓是貪也然而不死無勇也皆反其桃挈領而死古冶子曰二子死之冶獨生之不仁夫恥人以言而夸其聲不義恨乎所行而不死無勇雖然二子同桃而節冶專桃而宜亦反其桃挈領而死侍者復曰已死矣殮之以服𦵏之以士禮焉陳文子齊大夫也襄二十四年齊侯伐晉而懼将欲見楚子楚子使薳啓疆如齊聘且請期請㑹期齊社蒐軍實使客觀之祭社因閱數軍器以示薳啓疆文子曰齊将有㓂吾聞之兵不戢必取其族戢藏也族類也取族還自害也苑何忌齊大夫也昭公二十年齊侯使公孫青聘于衛既出聞衛亂使請所聘及衛告寧于齊且言子石子石公孫青言其有禮齊侯将飲酒徧賜大夫曰二三子之教也喜青敬衛侯苑何忌辭曰與於青之賞必及於其罰言青若有罪亦并受其罰在康誥曰父子兄弟罪不相及尚書康誥况在羣臣臣敢貪君賜以干先王乎言受賜則犯康誥之義騶忌子齊大夫也魏恵王圍邯鄲趙求救於齊齊威王召大臣而謀曰救趙孰與勿救騶忌子曰不如勿救叚干朋曰不救則不義且不利威王曰何也對曰夫魏氏并邯鄲其於齊何利哉且夫救趙而軍其郊是趙不伐而魏全也故不如南攻襄陵以弊魏邯鄲㧞而乘魏之弊威王從其計一說魏伐趙趙與韓親共擊魏趙不利戰於南梁韓氏請救於齊齊宣王召大臣而謀曰蚤救孰與晩救騶忌子曰不如勿救田忌曰弗救則韓且折而入于魏不如蚤救之孫子曰夫韓魏之兵未弊而救之是吾代韓受魏之兵顧反聽命於韓也且魏有破國之志韓見亡必東靣而愬於齊矣吾因深結韓之親而晚受魏之弊則可重利而得尊名也宣王曰善乃隂告韓之使者而遣之韓因恃齊五戰不勝而東委國於齊齊因起兵使田忌田嬰將徐廣曰嬰一作朌孫子為帥救韓趙以擊魏大敗之馬陵殺其將龎涓虜魏太子申又國䇿云南梁之難韓氏請救於齊田侯召大臣而謀曰早救之孰與晩救之便張丐對曰晚救之韓且折而入魏不如早救之便田忌曰不可夫韓魏之兵未弊而我救之是我代韓而受魏之兵顧反聽命於韓也且夫魏有破韓之志韓見其亡必東愬於齊我因隂結韓之親而晚承魏韓之弊則國可重利可得名可尊矣田侯曰善乃隂告氏使者而遣之韓自以專有齊國五戰五不勝東愬於齊齊因起兵擊魏大敗之馬陵魏破韓弱韓魏之君因田嬰北靣而朝田侯田侯齊宣王也田文齊公子號孟甞君初趙王封孟甞君以武城孟甞君擇舍人以為武城吏而遣之曰鄙語豈不曰借車者馳之借衣者被之哉皆對曰有之孟甞君曰文甚不取也夫所借衣車者非親友則兄弟也夫馳親友之車被兄弟之衣文以為不可今趙王不知文不肖而封之以武城願大夫之任也毋伐樹木毋發屋室訾然使趙王悟而知文也宫之竒虞大夫也僖公五年晉侯復假道於虞以伐虢宫之竒諌曰虢虞之表也虢亡虞必從之晉不可啓寇不可翫翫習也一之謂甚其可再乎為二年假晉道滅下陽諺所謂輔車相依唇亡齒寒者其虞虢之謂乎輔頰輔車牙車公曰晉吾宗也豈害我哉對曰太伯虞仲太王之昭也太伯不從是以不嗣太伯虞仲皆太王之子不從父命俱讓適吳仲雍支子别封西吳虞公其後也穆生昭昭生穆以世次計之故太伯虞仲於周為昭虢仲虢叔王季之穆也王季者太伯虞仲之母弟也虢仲虢叔王季之子文王之母弟也仲叔皆虢君字為文王卿士勲在王室藏於盟府盟府司盟之官将虢是滅何愛於虞且虞能親於桓荘乎其愛之也桓荘之族何罪而以為戮不唯偪乎桓叔荘伯之族晉獻公之從袓昆弟獻公患其偪盡殺之親以寵偪猶尚害之况以國乎公曰吾享祀豐潔神必據我據安也對曰臣聞之鬼神非人實親唯徳是依故周書曰皇天無親惟徳是輔周書逸書又曰黍稷非馨明徳惟馨馨香之逺聞又曰民不易物惟徳繄物黍稷牲玉無徳則不見享有徳則見享言物一而用異如是則非徳民不和神不享矣神所慿依将在徳矣若晉取虞而明徳以薦馨香神其吐之乎弗聴許晉使宫之竒以其族行行去也曰虞不臘矣臘嵗終祭衆神之名在此行也晉不更舉矣晉伐虢之役師出於虞宫之竒諫而不聽出謂其子曰虞将亡矣惟忠信者能留外宼而不害除闇以應外謂之忠定身以行事謂之信今君施其所惡於人闇不除矣貪賄滅親身不定矣夫國非忠不立非信不固既不忠信而留外宼人知其釁而歸圖焉已自㧞其本矣何以能乆吾不去懼及焉因以其孥適西山三月虞乃亡公孫枝秦大夫也僖公九年晉惠公入秦伯謂公孫枝曰夷吾其定乎公孫枝秦大夫子桑也對曰臣聞之唯則定國詩曰不識不知順帝之則文王之謂也詩大雅帝天也則法也言文王闇行自然合天之法又曰不僭不賊鮮不為則僭過差也賊傷害也能不然則可為人法則無好無惡不忌不克之謂也今其言多忌克既僭而賊難哉言能自定難公曰忌則多怨又焉能克是吾利也僖十三年晉荐饑荐饑皆不熟使乞糴于秦秦伯謂子桑子與諸乎對曰重施而報君将何求言不損秦也重施而不報其民必攜攜而討焉無衆必敗不義故民離謂百里與諸乎百里秦大夫對曰天災流行國家代有救災恤鄰道也行道有福百里奚秦大夫也僖公二十三年秦伯将襲鄭輕行疾至不戒以入曰襲百里子與蹇叔子諫曰千里而襲人未有不亡者也行疾不假途變必生道逺多險阻遭變必亡秦伯怒曰若爾之年者宰上之木拱矣宰冡也拱可以手對抱爾曷知師出百里子與蹇叔子送其子而戒之曰爾即死必於殽之嶔巖是文王之所辟風雨者也其處險阻隘勢一人可要百故文王之驅馳常若辟風雨襲鄭所當繇也過吾将尸爾焉在床曰尸在棺曰柩子揖師而行揖其父于師中介胄不拜為其拜如尊百里子與蹇叔子從其子而哭之秦伯怒曰爾曷為哭吾師對曰臣非敢哭君師哭臣之子也言恐臣先死子不見臣故先哭之弦髙者鄭商也鄭商賈人僖三十三年遇之殽矯以鄭伯之命而犒師焉詐稱曰矯犒勞也見其軍於非常不似君子恐見虜掠故生意矯君命勞之或曰往矣或曰反矣軍中語也時以為鄭實使弦髙來犒之或以為鄭伯已知将見襲必設備不如還或曰緒也當遂往之然而晉人與姜戎要之殽而撃之匹馬隻輪無反者繞朝秦大夫也文公十三年晉使魏夀餘偽以魏叛者以誘士㑹秦伯師于河西魏人在東夀餘曰請東人之能與夫二三有司言者吾與之先欲與晉人在秦者共先告諭魏有司使士㑹士㑹辭曰晉人虎狼也若背其言臣死妻子為戮無益於君不可悔也秦伯曰若背其言所不歸爾孥者有如河言必歸其妻子明白如河士㑹往繞朝贈之以䇿䇿馬撾别授之馬撾并示已所䇿以展情曰子無謂秦無人吾謀適不用也示已覺其情既濟魏人譟而還秦人歸其孥后子秦大夫也昭公元年奔晉見趙孟趙孟曰吾子其曷歸問何時當歸對曰鍼懼選於寡君是以在此将待嗣君趙孟曰秦君何如對曰無道趙孟曰亡乎對曰何為一世無道國未艾也艾絶也國於天地有與立焉言欲輔助之者多不數世滛弗能斃也趙孟曰天乎對曰有焉趙孟曰其幾何對曰鍼聞之國無道而年穀和熟天贊之也贊助也鮮不五稔鮮少也少尚當歴五年多則不啻趙孟視蔭曰朝夕不相及誰能待五蔭日景也趙孟意衰以日景自喻故言朝夕不相及誰能待五后子出而告人曰趙孟将死矣主民翫嵗而愒日翫愒皆貪也其與幾何言不能乆甘茂事秦武王為左丞相武王三年謂甘茂曰寡人欲容車通三川以窺周室而寡人死不朽矣甘茂曰請之魏約以伐韓而令向夀輔行甘茂至謂向夀曰子歸言之於王曰魏聴臣矣然願王勿伐事成盡以為子功向夀歸以告王王迎甘茂於息壤甘茂至王問其故對曰宜陽大縣也上黨南陽積之久矣名曰縣其實郡也今王倍數險行千里而攻之難矣昔曽參之處費魯人有與曽參同姓名者殺人人告其母曰曽參殺人其母織自若也頃之一人又告其母曰曽參殺人其母尚織自若也頃又一人告之曰曽參殺人其母投杼下機踰牆而走夫以曽參之賢與其母之信也三人疑之其母懼焉今臣之賢不若曽參王之信臣又不若曽參之母信曽參也疑臣者非特三人臣恐大王之投杼也始張儀西并巴蜀之地北開西河之外南取上庸天下不以多張子而以賢先王魏文侯令樂羊将而攻中山三年而㧞之樂羊返而論功文侯示之謗書一篋樂羊再拜稽首曰此非臣之功也主君之力也今臣覊旅之臣也樗里子公孫奭二人者挾韓而議之王必聴之是王欺魏王而臣受公仲侈一作馮之怨也王曰寡人不聽也請與子盟於是與之盟於息壤卒使丞相甘茂将兵伐宜陽五月而不㧞樗里子公孫奭果爭之武王召甘茂欲罷兵甘茂曰息壤在彼王曰有之因大悉起兵使甘茂擊之斬首六萬遂㧞宜陽韓襄王使公孫侈入謝與秦平武王竟至周而卒于周甯荘子衛大夫也衛大旱卜有事於山川不吉有事祭也甯荘子曰昔周饑克殷而年豐今邢方無道諸侯無伯伯長也天其或者欲使衛討邢乎從之師興而雨甯武子衛大夫也僖公三十一年衛成公夣康叔曰相奪予享相夏后啓之孫居帝丘享祭也公命祀相武子不可曰鬼神非其族類不歆其祀歆猶享也杞鄫何事言杞鄫夏後自當祀相相之不享於此久矣非衛之罪也言帝丘乆不祀相非衛所絶不可以間成王周公之命祀諸侯受命各有常祀請改祀命改祀相之命從之右宰榖襄公二十六年衛獻公出奔求復國於寗喜寗喜告右宰榖右宰穀曰不可獲罪於兩君前出獻公今弑剽天下誰畜之畜猶容也悼子曰吾受命於先人不可以貳悼子寗喜也穀曰我請使焉而觀之觀之可還否遂見公於夷儀反曰君淹恤在外十二年矣淹久也而無憂色亦無寛言猶夫人也言其為人猶如故若不已死無日矣已止也悼子曰子鮮在右宰穀曰子鮮在何益多而能亡於我何為言子鮮為義多不過亡出悼子曰雖然弗可以已獻公入而果誅喜北宫文子衛大夫也初襄公三十一年相衛襄公以如楚文子北宫佗襄公獻公子過鄭印段延勞于棐林如聘禮而以勞辭用聘禮而用郊勞之辭文子入聘報印叚子羽為行人馮簡子與子太叔逆客逆文子事畢而出言於衛侯曰鄭有禮其數世之福也其無大國之討乎詩云誰能執熱逝不以濯詩大雅濯以水濯手禮之於政如熱之有濯也濯以救熱何患之有此以上文子辭衛侯在楚北宫文子見令尹圍之威儀言於衛侯曰令尹似君矣将有他志言語瞻視行歩不常雖獲其志不能終也詩云靡不有初鮮克有終終之實難令尹其将不免公曰子何以知之對曰詩云敬慎威儀惟民之則令尹無威儀民無則焉民所不則以在民上不可以終公曰善哉何謂威儀對曰有威而可畏謂之威有儀而可象謂之儀君有君之威儀其臣畏而愛之則而象之故能有其國家令聞長世臣有臣之威儀其下畏而愛之故能守其官職保族宜家順是以下皆如是是以上下能相固也衛詩曰威儀棣棣不可選也詩邶風棣棣富而閑也選數也言君臣上下父子兄弟内外大小皆有威儀也周詩曰朋友攸攝攝以威儀詩大雅攸所也攝佐也言朋友之道必相教訓以威儀也周書數文王之徳曰逸書大國畏其力小國懐其徳言畏而愛之也詩云不識不知順帝之則言則而象之也大雅又言文王行事無所斟酌惟在則象上天紂囚文王七年諸侯皆從之囚紂於是懼而歸之可謂愛之文王伐崇再駕而降為臣文王聞崇徳亂而伐之三旬不降退修教而復伐之因壘而降蠻夷帥服可謂畏之文王之功天下誦而歌舞之可謂則之文王之行至今為法可謂象之有威儀也故君子在位可畏施舍可愛進退可度周旋可則容止可觀作事可法徳行可象聲氣可樂動作有文言語有章以臨其下謂之有威儀也褚師圃衛大夫也初齊伐晉衛侯乃過中牟中牟人欲伐之褚師圃亡在中牟曰衛雖小其君在焉未可勝也齊師克城而驕其帥又賤城謂夷儀也帥謂東郭書遇必敗之不如從齊乃伐齊師敗之公叔文子衛大夫也定公十三年文子朝而請享靈公欲令君臨其家退見史鰌而告之史鰌史魚史鰌曰子必禍矣子富而君貪罪其及子乎文子曰然吾不先告子是吾罪也君既許我矣其若之何史鰌曰無害子臣可以免言能執臣禮富而能臣必免於難上下同之言尊卑皆然戍也驕其亡乎戍文子之子富而不驕者鮮吾惟子之見驕而不亡者未之有也戍必與焉與禍難及文子卒衛侯始惡於公叔戍以其富也公叔戍又将去夫人之黨靈公夫人南子黨宋朝之徒夫人愬之曰戍将為亂於是戍奔魯目夷宋大夫也字子魚僖公二十一年宋襄公為鹿上之盟以求諸侯於楚楚人許之公子目夷諫曰小國争盟禍也宋其亡乎幸而後敗諸侯㑹宋公盟于盂子魚曰禍其在此乎君欲已甚其何以堪之於是楚執宋公以伐宋㑹于薄以釋之子魚曰禍猶未也未足以懲君及二十二年夏宋公伐鄭子魚曰所謂禍在此矣與楚戰於泓宋師敗績公傷股公孫固宋大夫也晉重耳過宋宋襄公新困兵於楚傷於泓聞重耳賢欲得晉援乃以國禮禮於重耳以馬二十乘公孫固善於舅犯曰宋小國新困不足以求入更之大國重耳乃去西鉏吾宋大夫也成公十八年楚子鄭伯伐宋宋魚石復入于彭城宋人患之西鉏吾曰何也若楚人與吾同惡以徳於我吾固事之也不敢貳矣惡謂魚石大國無厭鄙我猶憾言已事之則以我為鄙邑猶恨不足此吾患也不然而收吾憎使贊其政謂不同惡魚石而用之使佐政以間吾釁亦吾患也今将崇諸侯之姦而披其地崇長也謂楚今取彭城以封魚石披猶分也以塞夷庚夷庚吳晉往来之要道楚封魚石於彭城欲以截吳晉之道逞姦而攜服毒諸侯而懼吴晉隔吳晉之道故懼攜離也吾庸多矣非吾憂也且事晉何為晉必恤之言宋常事晉何為顧有此患難子罕宋大夫也襄公二十七年向戍㑹諸侯之大夫以弭兵向戍宋左師左師請賞曰請免死之邑欲宋君稱功加厚賞故謙言免死之邑也公與之邑六十以示子罕子罕曰凡諸侯小國晉楚所以兵威之畏而後上下慈和慈和而後能安靖其國家以事大國所以存也無威則驕驕則亂生亂生必滅所以亡也天生五材金木水火土也民並用之廢一不可誰能去兵兵之設久矣所以威不軌而昭文徳也聖人以興謂湯武亂人以廢謂桀紂廢興存亡昬明之術皆兵之繇也而子求去之不亦誣乎以誣道蔽諸侯罪莫大焉縱無大討而又求賞無厭之甚也削而投之削賞左師之書左師辭邑向氏欲攻司城司城子罕左師曰我将亡夫子存我徳莫大焉又可攻乎君子曰彼已之子邦之司直詩鄭風司主也樂喜之謂乎何以恤我我其收之逸詩恤憂也收取也向戍之謂乎善向戌能知其過仲幾宋大夫也昭二十五年宋元公将為魯昭公故如晉請納公夢太子欒即位於廟已與平公服而相之平公元公父且召六卿公曰寡人不佞不能事父兄父兄謂華向以為二三子憂寡人之罪也若以羣子之靈獲保首領以沒唯是楄柎所以藉幹者楄柎棺中笭牀也幹骸骨也請無及先君欲自貶損仲幾對曰君若以社稷之故私降昵宴羣臣弗敢知昵近也降昵宴謂降損親近宴樂飲食之事若夫宋國之法死生之度先君有命矣羣臣以死守之弗敢失墜臣之失職常刑不赦臣不忍其死君命祗辱言君命必不行適以自辱也宋公遂行卒於曲棘逄滑為陳大夫哀元年吳之入楚也使召陳懐公懐公朝國人而問焉曰欲與楚者右欲與吳者左陳人從田無田從黨都邑之人無田者随黨而立不知所與故直從所居田在西者居右在東者居左逄滑當公而進不左不右曰臣聞國之興也以福其亡也以禍今吳未有福楚未有禍楚未可棄吳未可從而晉盟主也若以晉辭吳若何公曰國勝君亡非禍而何楚為吳所勝對曰國之有是多矣何必不復小國猶復况大國乎臣聞國之興也視臣如傷是其福也如傷恐驚動其亡也以民爲土芥是其禍也芥草也楚雖無德亦不艾殺其民吳日敝於兵暴骨如莾草生於廣野莾莾然故曰草莾而未見德焉天其或者正訓楚也使懼而改過禍之適吳其何日之有言至今陳侯從之册府元龜卷七百三十四
