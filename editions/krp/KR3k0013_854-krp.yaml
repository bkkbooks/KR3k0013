body:
  text: 冊府元龜卷八百五十四宋王欽若等撰總録部立言春秋傳曰太上有立徳其次有立言盖徳之盛者必形諸言言之文者以足於志昔之君子嘗從事於斯矣及司馬譚論六家之要劉子政分九流之目揚㩁是非稽合同異源流洞分指歸攸别然而挟術非一揆營道非一致各崇所善用極其說故先儒引殊塗同歸之言以為六經之支裔使之逢時效用何啻霸者之佐去聖踰逺猶賢外野之求今特詳求而比次之庶百代之作者開卷而可見也鬻子二十二篇名熊為周師自穆王以下問焉周封為楚祖鬻音弋六反尹佚二篇周臣在成康時也管仲字夷吾相齊著牧民山高乗馬輕重九府書劉向别録九府書民間無有山高一名形勢晏嬰相齊作晏子春秋老子至函闗闗令尹喜曰子將隠矣强為我著書於是老子廼著書上下篇言道徳之意五千餘言而去莫知其所終闗令尹喜者周大夫也善内學星宿服精華隠徳行仁時人莫知老子西游喜先見其氣知真人當過候物色而迹之果見老子老子亦知其竒為著書與老子俱之流沙之西莫知其所終喜亦著書九篇名闗尹子老萊子楚人也著書十五篇言道家之用孔伋字子思仲尼孫也嘗困於宋作中庸曽參孔子弟子著曽子十八篇漆彫子十三篇孔子弟子漆彫啓後宓子十六篇名不齊字子賤孔子弟子師古曰宓讀與伏同景子三篇說宓不齊語似其弟子世子二十一篇名碩陳人也七十子之弟子文子九篇老子弟子與孔子並時而稱周閔王問以依記者也蜎子十三篇名淵楚人老子弟子師古曰蜎姓也音以元反李克七篇子夏弟子為魏文侯相公孫尼子二十八篇七十子之弟子墨子七十一篇名翟為宋大夫在孔子後田俅子三篇先韓子俅音求我子一篇劉向别録公為墨子之學隨巢子六篇墨翟弟子胡非三篇墨翟弟子芈子十八篇名嬰齊人七十子之後芈音寗越一篇中牟人為周威王師王孫子一篇曰巧心也公孫固一篇十八篇齊閔王失國問之固因為陳古今成敗也董子一篇名元心從墨子徐子四十二篇宋外黄人魯仲連子十四篇平原君七篇朱建也虞氏春秋十五篇虞卿也李子三十二篇名悝相魏文侯富國强兵處子九篇史記云趙有處子列子八篇名禦冦先莊子莊子稱之莊周蒙人嘗為蒙漆園吏與梁惠王齊宣王同時其學無所不窺然其要本歸於老子之言故著書十餘萬言大抵率寓言也作漁父盜跖胠篋以詆訿孔子之徒以明老子之術畏累虛亢桑子之屬皆空語無事實然善屬書離辭指事類情用剽剥儒墨雖當世宿學不能自解免也其言洸洋自恣適已故自王公大人不能器之惠子一篇名施與莊子同時申不害荆人故鄭之賤臣學術以干韓昭侯昭侯用為相内修政教外應諸侯十五年終申子之身國治兵强無侵韓者申子之學本於黄老而主刑名著書二篇號曰申子荀卿趙人年五十始來遊學於齊嫉濁世之政亡國亂君相屬不遂大道而營於巫祝信禨祥鄙儒小拘如莊周等又滑稽亂俗於是推儒墨道徳之行事興懐序列著數萬言為楚蘭陵令而卒因葬蘭陵孟軻事齊適梁俱不能用當是之時秦用商君富國强兵楚魏用吳起戰勝弱敵齊威王宣王用孫子田忌之徒而諸侯東面朝齊天下方務於合從連衡以攻伐為賢而孟軻乃述唐虞三代之徳是以所如皆不合退而與萬章之徒序詩書述仲尼之意作孟子七篇孟子序文云孟子亦自知遭臧倉之讒毁值炎劉之末奮進不得佐興唐虞雍熈之治退不能信三代之餘風耻沒世而無聞焉是故垂憲言以詔後人仲尼有云我欲託之空言不如載之行事之深切著明也於是退而論集所與高弟弟子公孫丑萬章之徒難答問曰又自撰其法度之言著書七篇二百六十一章三萬四千六百八十五字包羅天地揆叙萬類仁義道徳性命禍福粲然靡所不載帝王公侯遵之則可以尊君父立忠守志厲操者儀之則可以崇高節抗浮雲有風人之託二雅之正可謂直而不倨曲而不屈命世亞聖之大才者也鄒衍齊人覩有國者益淫侈不能尚徳若大雅整之於身施及黎庶乃深觀隂陽消息而作怪遷之變終始大聖之篇十餘萬言其語閎大不經必先驗小物推而大之至於無垠先序今以上至黄帝學者所共術大並時盛衰因載其禨祥度制推而逺之至天地未生窈㝠不可考而原也先列中國名山大川通谷禽獸水土所殖物類所珍因而推之及海外之人所不能覩稱引天地剖判以來五徳轉移治各有宜而符應若兹以為儒者所謂中國者於天下乃八十一分居其一分爾中國名曰赤縣神州赤縣神州自有九州禹之序九州是也不得為州數中國外如赤縣神州者九乃所謂九州也於是有禆海環之人民禽獸莫能相通者如一區中者乃為一州如此者九乃有大瀛海環其外天地之際焉其術皆此類也然要其歸必止乎仁義節儉君臣上下六親之施始也濫漫王公大人初見其術瞿然顧化其後不能行之慎到趙人田駢接子齊人環淵楚人皆學黄老道徳之術因發明序其指意故慎到著十二論今慎子劉向所定有四十一篇環淵著上下篇而田駢接子皆有所論焉尸佼晉人秦相衛鞅客也鞅謀事畫計立法理民未嘗不與佼規也鞅被刑佼恐并誅乃逃入蜀造書二十篇凡六萬餘言卒因葬蜀虞卿相趙孝成王以魏齊之故不重萬户侯卿相之印與齊間行去趙困於梁魏齊已死不得意乃著書上採春秋下觀近世曰節義稱號揣摩政謀凡八篇以刺譏國家得失世傳之虞氏春秋魏齊事具總錄復讐門蘇子三十一篇名秦張子十篇名儀鄭長者一篇六國時先韓子韓子稱别錄云鄭人知姓名鄒奭子十二篇齊人號曰彫龍奭奭音式亦反閭丘子十三篇名快魏人在南公前將鉅子五篇六國時先南公南公稱之杜文公五篇六國時劉向别傳云韓人也黄帝泰素二十篇六國時韓諸公子所作劉向别錄云或言韓諸公孫之所作也言隂陽五行以為黄帝之道也故曰泰素南公三十一篇六國時公子牟四篇魏之公子也先莊子莊子稱之田子二十五篇名駢齊人游稷下號談天口駢音步田反黔婁子四篇齊隠士守道不詘威王下之黔音其炎切反下婁音胡稼反宫孫子二篇宫孫姓也不知名鶡冠子一篇是人居深山以鶡鳥羽為冠鄧析子二篇鄭人與子産並時列子及孫卿並云子産殺鄧析據左傳昭公二十五年子産卒定公九年駟厥殺鄧析而用其竹刑則非子産所殺人也尹文子一篇說齊宣王先公孫龍劉向云與宋鈃俱游稷下鈃音刑公孫龍子十四篇趙人為堅白之辯者成公生五篇趙黄公等同時姓成公劉向云與李斯子繇同時繇為三川守成公游談不仕黄公四篇名疵為秦博士作歌詩在秦時歌詩中疵音才期反毛公九篇趙人與公孫龍等並游平原君趙勝家劉向别錄云堅白同異以為可以治天下盖史記所云藏於徒者吕不韋相秦是時諸侯多辯士如荀卿之徒著書布天下吕不韋乃使其客人又著聞集論以為八覽六論十二紀二十餘萬言以為備天地萬物古今之事號曰吕氏春秋布咸陽市門縣千金其上延諸侯游士賔客有能増損一字者予千金又云吕不韋相秦莊襄王乃上觀尚書删拾春秋集六國時事為吕氏春秋韓非韓諸公子為人口吃不能道說而善著書與李斯俱事荀卿斯自以為不如非見韓之削弱數以書諫韓王不能用於是韓非疾治國不務修明法制執勢以御其臣下富國强兵而以求人任賢反舉浮淫之蠧而加之於功實之上以為儒者用文亂法而俠者以武犯禁寛則寵名譽之人急則用介胄之士今者所養非所用所用非所養悲亷直不容於邪枉之臣觀往者得失之變故作孤憤五蠧内外儲說林說難千餘萬言漢蒯通范陽人論戰國時說士權變亦自序其說凡八十一首號曰雋永雋肥肉也永長也言其所論甘美而義深長也漢志載藏子五篇陸賈高帝時為大中大夫時時前說稱詩書高帝罵之曰乃公居馬上得之安事詩書賈曰馬上得之寧可以馬上治乎且湯武逆取而以順守文武並用長久之術也昔者吳王夫差智伯極武而亡秦任刑法不變卒滅嬴氏鄉使秦并天下行仁義法先聖陛下安得而有之髙帝不懌有慚色謂賈曰試為我著秦所以失天下吾所以得天下者及古成敗之國賈凡著十二篇毎奏一篇髙帝未嘗不稱善左右呼萬嵗稱其書曰新語公孫渾邪景帝時為隴西守以將軍擊吳楚有功封平西侯著書十餘篇藝文志隂陽家有公孫渾邪十五篇是也桓寛鹽鐵六十篇寛字次公汝南人也孝昭帝時丞相御史與諸賢良文學論鹽鐵事寛次之揚雄王莽時為大夫草太𤣥覃思渾天覃深也渾天天象也參摹而四分之三析而四分天之宿度甲乙也極於八十一旁則摹九据据今據字也據猶位也處也極之七百二十九贊亦自然之道也故觀易者見其卦而名之觀𤣥者數其畫而定其𤣥首四重者非卦也數也其用自天元推一晝一夜隂陽數度律厯之紀九九大運與天終始故𤣥三方九州二十七部八十一家二百四十表七百二十九贊分為三卷曰一二三與太初厯相應亦有顓頊之厯焉􅨸之以三策三而分之闗之以休咎絣絣雜之以象類播之以人事播布也文之以五行擬之以道徳仁義禮智無主知名要合五經茍非其事文不虚生為之泰曼漶而不可知曼漶不分别白損言蒙鴻也故有首衝錯測攡營數文掜圖告十一篇皆以觧剥𤣥體離散之句尚不存焉𤣥中之文雖有章句其㫖深妙尚不能盡存故觧剝而離散也劉歆嘗觀之謂雄曰空自苦今學者有禄利然尚不能明易又云𤣥何言無奈之何吾恐後人用覆醤瓿也瓿小甖也雄笑而不應雄見諸子各以其知殊馳殊相也大抵詆訾聖人即為怪迂析辯詭詞以撓世事言諸子之書文㫖歸非毁周孔之敎為巧辯異辭以攪亂時政也雖小辯終破大道而惑衆使溺於所聞而不自知其非也及太史公記六國歴楚漢訖麟止不與聖人同是非頗謬於經故人時有問雄者嘗用法應之譔以為十三卷象論語號曰法言王莽大司空王邑納言嚴尤聞雄死謂桓譚曰子嘗稱揚雄書豈能傳於後世乎譚曰必傳顧君與譚不及見也顧見也凡人賤近而貴逺親見子雲禄位容貌不能動人故輕其書老𥅆著空無言兩篇謂道徳經也薄仁義非禮學然後世好之者尚以為過於五經自漢文景之君及司馬遷皆有是言今楊子之書文義至深而論不詭於聖人詭違也聖人謂周公孔子若使遭遇時君更閱賢知為所稱善則必度越諸子矣嚴君平蜀郡人博覽無不通依老子嚴周之指著書十餘萬言嚴周即莊周後漢桓譚光武時為議郎給事中著書言當世行事二十九篇號曰新論尚書獻之帝善焉新論一曰本造二王霸三求輔四言體五見徵六譴非七啓寤八祛蔽九正經十職通十一離事十二道賦十三辨惑十四述䇿十五閔友十六琴道本造述䇿閔友道各一篇餘並有上下光武續之勑言卷大令皆别為上下凡二十九篇琴道一篇未成肅宗使班固續成之琴道未畢但有發首一章梁竦安定烏氏人閉門自養以經籍為娛辟命交至並無所就著書數篇名曰七序班固見而稱曰孔子著春秋而亂臣賊子懼梁竦作七篇而竊位素餐者慙郅惲為芒長免官著書八篇韋彪為大鴻臚著書十二篇號曰韋卿子王充㑹稽上虞人仕郡為功曹好論說始若詭異終有理實以為俗儒守文多失其真閉門潛思絶慶弔之禮戸牖墻壁各置刀筆著論衡八十五篇二十餘萬言充所作論衡中土未有傳者蔡邕入吳始得之嘗祕玩以為談助其後王朗為㑹稽太守又得其書及還許下時人稱其才進或曰不見異人當得異書問之果以論衡之益繇是遂傳視焉又時人嫌蔡邕得異書捜求其帳中隠處果得論衡抱數卷持去邕丁寜之曰唯我與爾共之勿廣也釋物類同異正時俗嫌疑王符安定臨涇人少好學不得升進志意藴憤乃隠居著書三十餘篇以譏當時失得不欲章顯其名故號曰潛夫論其指訐時短討擿物情足以觀見當時風政仲長綂山陽髙平人州郡辟命稱疾不就少學博士渉書記贍於文辭毎論說古今時俗行事發憤歎息因著論名曰昌言凡三十四篇十餘萬言桓彬為尚書郎著七說及書三篇陳紀潁川許人實之子也遭黨錮發憤著書數萬言號曰陳子後至大鴻臚劉陶為諫議大夫著書數有十萬言又作正老子反韓非復孟軻辨疑等篇荀悦為祕書監侍中時政移曹氏天子恭已而已悦志在獻替而謀無所用乃作申鑒五篇其所論辨甚通政體又著崇徳政論及諸論數十篇周黨太原廣武人後隠居澠池著書上下篇而終劉珍為衛尉撰釋名三十篇以辨萬有之稱號云魏朗㑹稽人為尚書㑹被議免歸家著書數篇號魏子唐擅舉孝亷為郎中棄官去著書二十八篇名為唐子崔實為郎明於治體吏才有餘論當世便事數十條名曰政論指切時要言辨而確當世稱之仲長綂曰凡為人主宜冩一通置之坐側趙岐辟司徒胡廣府㑹南匈奴烏桓鮮卑反叛公卿舉岐擢拜并州刺史岐欲奏守邊之䇿未及上㑹坐黨事免因撰次以為禦冦論牟融為太尉撰牟子魏劉廙為太祖丞相倉曹屬著書數十篇及與丁儀共論刑禮皆傳於世劉劭為散騎常侍著樂論十四篇成未上㑹明帝晏駕不施行又撰法論人物志之類百餘篇王基為安豐太守時曹爽專柄風化陵遲基著時要論以切世事王昶為兖州刺史加揚烈将軍雖在外任心存朝廷以為魏承秦漢之弊法制苛碎不大釐改國典以凖先王之風而望治化復興不可得也乃著治論略依古制而合於時務者二十餘篇任嘏為河東太守有重名嘗著書三十八篇凡四萬餘言嘏卒後故吏東郡程威趙國劉固河東上官崇等録其事行及所著書奏之詔下祕書以貫羣言隋書志載守身論一任子道論十卷杜恕為趙相以疾去官還家陳留阮武亦從清河太守徴還俱自簿廷尉謂恕曰相觀才性可以繇公道而持之不厲器能可以處大官而求之不順才學可以述古今而志之如不以此所謂有其才而無用今向閒暇可試潛思成一家言在章武遂著體論八篇杜氏新書以為人倫之大綱莫重於君臣立身之基本莫大於言行安上理民莫精於政法勝殘去殺莫善於用兵夫禮也者萬物之體也物皆得其體無有不善故謂之體論也又著興性論一篇盖興於為已桓威為成安令威出自孤㣲年十八而著渾輿經依道以見意徐幹為太子文學撰中論王肅為中領軍散騎常侍撰王子正論十卷阮武為清河太守撰阮子正論五卷蔣濟為東中郎将撰萬機論文帝善之蜀諸葛亮為相作八務七戒六恐五懼皆有條章以訓厲臣子李宓為漢中太守去官著述理論十篇晉安東将軍胡熊與皇甫士安並善之譙周字允南為太子家令于時軍旅數出百姓凋瘁周與尚書令陳祗論其害退而書之謂之仇國論陳術字申伯博學多聞著釋問七篇吳顧譚為太常平尚書事後為大都督全琮父子所搆有司奏誣罔大不敬坐徙交州幽而發憤著新言三十篇其知難篇盖以自悼傷也殷基為無難督以才學知名著通語數十篇唐滂隋志不載所在撰唐子十卷張儼為大鴻臚撰嘿記三卷裴𤣥為大鴻臚撰裴氏新言五卷秦菁隋書不載所在撰秦子三卷晉陸喜字恭仲為吏部尚書少有聲名好學有才思嘗自叙曰劉向省新語而作新序桓譚詠新序而作新論余不自量感子雲之法言而作言道覩賈子之美才而作訪論觀子政洪範而作古今厯覽蔣子通萬機而作審機讀幽通思𤣥四愁而作娛賔九思真所謂忍愧者也其書近百篇吳平又作西州清論傳於世借稱諸葛孔明以行其書也陸雲為清河内史著新書十篇傅𤣥為司𨽻校尉少時避難於河内專心誦學後雖顯貴而著述不廢撰論經國九流及三史故事評斷得失各為區别名為傅子為内外中篇凡有四部六録合百四十首數十萬言行於世𤣥初作内篇成子咸以示司空王沉沉與𤣥書曰省足下所著書言富理齊經綸政體存重儒敎足以塞揚墨之流遁齊荀孟於往代毎開卷未嘗不歎息也不見賈生自以為過之乃今不及信矣袁凖為給事中著書十餘萬言論治世之務華譚元帝時為鎮東軍諮祭酒譚博學多通在府無事乃著書三十卷名曰辨道上牋進之帝親自覽焉王長文廣漢郪人州府辟命皆不就著書四卷擬易名曰通𤣥經有文言卦象可用卜筮時人比之揚雄太𤣥同郡馬秀曰揚雄作太𤣥惟桓譚以為必傳後世晚遭陸續𤣥道遂明長文通𤣥經未遭陸續君山爾周處為御史中丞著黙語三十篇葛洪為司徒王導諮議參軍凡所著撰精覈是非而才章富贍所著子書言黄白之事名曰内篇其餘駮難通釋名曰外篇大凡内外一百一十六篇自號抱朴子凡以名書韋謏字憲道為太子太傅著伏林二千餘言遂演為典林二十餘篇凡所述作皆深博有才義杜夷為國子祭酒著幽求子一十篇行於世兄崧字行髙亦有志節惠帝時俗多浮偽著杜子春秋以刺之徐苗髙宻淳于人也依道家著𤣥㣲論前後所造數萬言皆有義味公府五辟博士不就夏侯湛為常侍撰新論十卷楊泉者徴士也撰物理論十卷又太元經十四卷虞喜以博士徴不就撰志林新書三十卷于寳為散騎常侍撰于子十八篇蔡歆為江州從事撰問論顧夷為揚州主簿撰顧子十卷吕竦為儒林祭酒撰要覽十卷蘇彦為北中郎參軍撰蘇子宣聘為宣城令撰宣子張顯為議郎撰析言論二十卷楊偉為征南軍師撰桑丘先生書二卷又有時務論十二卷前秦苻朗堅之從兄子著苻子數十篇行於世亦老莊之流也宋傅亮為散騎常侍見世路屯險著論名曰演慎賀遵養為太學博士撰賀子述言十卷梁劉勰為東宫通事舎人撰文心雕龍五十篇論古今文體引而次之後魏崔浩為左光禄大夫大師冦謙之毎與浩言聞其論古治亂之迹常自夜達旦竦意斂容無有懈倦既而歎美之曰斯人言惠皆可底行亦當今之臯繇也但世人貴逺賤近不能深察之爾因謂浩曰吾行道隠居不營世務忽受神中之訣當兼修儒敎輔助太平真君繼千載之絶綂而學不稽古臨事闇昧為吾撰列王者治典并論其大要浩乃著書二十餘篇上推太初下盡秦漢變弊之迹大㫖先以復五等為本李公緒為冀州司馬至齊文宣時以侍御史徴不就撰典言十卷北齊顔之推撰家訓二十篇後入隋為太子學士隋辛徳源為蜀王諮議參軍撰政訓内訓各二十卷王通仕隋為蜀郡書佐大業末棄官歸絳州著書為業又依孔子家語揚雄法言例為客主對答之說號曰中説皆為儒家所稱唐崔𤣥􅀈中宗時為中書令撰行已要範十卷盧景亮為中書舎人早有時名前後述作皆根於中正頗有經國理人之志嘗以為國之要足食足兵而又得士方可以為政於是採黄帝以還訖于本朝著書上下篇名曰三足又作答秦客辭陳漕運飛輓之利病晉尹玉羽為光禄大夫退居秦中十年之間著書五十卷名曰武庫集冊府元龜卷八百五十四
