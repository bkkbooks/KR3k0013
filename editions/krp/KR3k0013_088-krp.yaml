  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_088-1a}
body:
  text: 冊府元龜卷八十八宋王欽若等撰帝王部赦宥第七唐代宗以寶應元年四月己巳即位五月丁酉帝御丹鳳樓門下大赦天下制曰髙宗嗣興諒闇成受終之禮康王承統翌日奉顧命之書况萬事尚殷蕭墻有釁蒼生佇望社稷謀安教雖逹於通䘮禮有變於金革順人聽政僶俛從權朕頃從鑾輿率彼西夏佐成草昧俾掌戎車國歩艱難睿圖廣運再清㝢縣崇復宗社禀承命以受律敢貪天以為功聖慈𢎞深冊踐明兩奉承庭訓敢有怠遑嗚呼不弔昊天殃咎荐至皇祖之哀未釋閔凶之罰奄鍾攀號罔極若無天地誓終䘮紀企及前王百辟抑予俾恭遺訓俯遂衆望嗣膺丕烈欽兹大寶懼不勝任若蹈春氷如集喬木日者先聖哀損朕在問安而䦧墻搆災凌長成禍閫闈作孽閽寺㴞天職為亂階潜置巫蠱将以竊弄覆我邦家賴良弼翊戴爪牙同徳天道助順神理害盈昭此共工之心終貽管蔡之辱舍彼有罪咸伏其辜廢於離宫實於城潁今天衢雖泰率土未康式協公卿之心仰遵易月之命奉時斯在先甲未孚宜允人神覃兹渙汗可大赦天下自寶應元年五月十九日昧爽已前大辟罪已下已發覺未發覺已結正未結正繫囚見徒常赦所不免者罪無輕重咸赦除之自開元已來所有諸色犯累者並宜雪免左降官并諸色流人及罰鎮効配軍圑人等一切即放還其中有見任刺史縣令及正員者并依本任其四月十五日已後諸色流貶者與量移近處逆賊史朝義已下有能投降及率衆歸附者當超與封賞天下禁囚不得過五日所有推劾不得分外拷掠亦不得信友證便結罪名諸色文武官應在凌霄門内謁見者并飛龍射生等並宜以寶應功臣為名諸州刺史與一子官刺史縣令入五品減兩考内外文武官三品已上賜爵一級四品已下各加一階諸州刺史父母在無官者與致仕官及母邑號已亡歿者追贈諸州防禦使並停天下子為父後者各賜勲一轉州縣官自今已後宜令三考一替大官饔膳等特宜减省有渉奢侈一切宜停天下百姓逋租懸調貸糧種子諸色欠負官物一切放免開元乾元等錢並宜准一文用不須計以虛數益昌郡王邈進封鄭王延慶郡王逈進封韓王故庶人皇后王氏故庶人太子瑛鄂王瑶光王琚宜並復封號棣王琰永王璘及應安禄山詿誤人反状人等並宜昭雪建昌王追封為濟王崇恩王追封為衛王靈昌王追封為鄆王其有明於政理博綜典墳文可經邦謀能制勝及孝悌力田諸州刺史並宜捜揚聞薦投匭者不須勘以停處姓名務招直言以副朕意十一月辛巳詔東都河北應受賊脇從署偽官并偽出身悉原其罪一切不問廣徳元年七月壬子御宣政殿下詔曰惟髙祖太宗敷大徳於天下覆載之内湛恩茂育累聖同道用康兆人寶位重光深其徳澤被服漸漬洽於生靈者百有五十年之間兵不作而刑将措矣自㓂虐横厲山東不開釁起渠魁毒流區宇三軍七萃之士豪傑忠良之徒制在風波遭其驅刼繇是干戈不息征賦寔煩哀我人斯並罹災患憫兹有犯無罪萬方朕上載皇天下臨黔首奉先聖之成命集一切之大勲元惡既誅羣生思乂是欲鏡清六合網决八紘庶齊大道之時克復太平之理至化猶鬰兵嚴初解百辟卿士中外衆臣並進昌言請上號徽曰寶應元聖文武孝皇帝朕渉道日寡慚徳良多恐沮樂推之心自増神器之重俯應典冊敬受鴻名便欲謁報昊天展事郊廟又以孟秋多稼垂及西成王畿之間人實勞止輟兹大禮式候𤣥冬切為踰年改元之制纉承洪業敢廢舊章博採羣公之義乃貞協用之紀其寶應二年改為廣徳元年爰屬履端乃𢎞肆眚救兹湯火俾雲行而雨施滌其瑕穢将玉振而金聲宜廣更始之恩用明嚮勸之福可大赦天下自廣徳元年七月十一日昧爽已前大辟罪無輕重已發覺未發覺已結正未結正繫囚見徒常赦所不免者咸赦除之左降官即量移近處亡官失爵各與收叙諸色流人罰鎮効力安置配𨽻等一切放還其安禄山史朝義親族應在諸道一切原免並無所問天下所有諸色結聚羌渾党項等但能悔過自陳各歸生業一切並捨其罪其中有頭首能勸率并束手来歸者并加官賞仍令本道防禦使并本管刺史縣令分明曉諭所有到者各具名録奏請百姓逋租懸調及一切欠負官物等自寶應元年十二月三十日已前並放免一户之中有三丁放一丁庸調地稅依舊每畆稅二升天下男子宜二十五成丁五十五入老應徴租稅刺史縣令據見在户徴科其迯亡死絶者不得虛攤隣保河北百姓復三年應是回紇行營經厯處免今年租稅内外文武三品已上賜爵一級四品已上加一階仍各賜兩轉天下兵馬元帥雍王智謀夙成忠孝純至恭行討伐親統元戎撫外蕃以仁訓羣帥以義班師獻㨗勲茂武成宜兼尚書令加實封二千户回紇可汗冊為頡咄登密施合俱縁英義建功毗伽可汗可敦冊為娑墨光親麗華毗伽可敦可汗及左右殺内外宰相已下共加實封二萬户令御史大夫王翊持節就衙帳冊禮左右殺胡禄都督等並封為王諸部督並封國公河北副元帥懐恩宜兼太保仍與一子二品官一子四品官並階更加實封五百户河南副元帥光弼與一子三品官并階更加實封三百户幽州節度使懐仙與一子三品并階加實封二百户李抱玉郭英乂辛雲京侯希逸田神功孫志直白孝徳令狐彰并各與一子五品官并階加實封二百户李寶臣薛嵩田承嗣張獻誠等各與一子五品官并階仍加實封二百户魚朝恩寄崇師律程元振勲髙佐命各加實封二百户仍與一子五品官並階僕固瑒髙彦崇渾日進李建義李光逸楊崇光李懐光張如岳白元光温如雅拓拔澄泌髙暉盧欽友成惟良曺楚玉等各與一子五品官加實封一百户仍各賜鐵劵以名藏大廟畵像於凌烟之閣并㓂難已来将相勲業髙者其名籍圖畵亦準此子儀與一子四品官并階實加封二百户晉卿劉晏裴遵慶元載各與一子四品官并階加實封一百户儀王及彭王已下男未官者并準舊例與官及封永穆并長樂已下長公主及郡縣主嗣王郡王等各與一子官皇親五等已上諸親三等已上各與一子出身二王後各與一子官諸道節度觀察使立功将士其父兄在無官者依子文武與官已歿者追贈陣亡将士襲父官爵河北河南有懐材抱器安身節素在丘園不仕為衆所知委所在長官具名聞薦應授偽官等并已昭洗矜才宥過宜有甄收委所繇勘本官名銜資厯聞奏量才處分文武正員常叅官并諸州刺史父母無邑號官者宜與致仕官及邑號贈者更與改贈刺史縣令自今以後改轉刺史三年為限縣令四年為限員外及攝試官一切不得釐務諫官每月上封事無所廻避河南河北偽度僧尼道士女冠並與正度天下刑獄須大理正斷刑部詳覆不得中書門下即便處分諸色人中有孝弟力田經術通博文詞雅麗政理優長本州各以名薦二年二月戊子御鳴鳳門下詔大赦天下制曰惟我髙祖太宗之有邦罔不昭事於上帝嚴恭敬畏與神合符七聖在天眷命永固朕嗣守鴻業敢忘奉先尚質貴誠聿修盛典頃以四方多難責在朕躬六侯行師日不暇給東擒羯胡之首西禦犬戎之患元元告病社稷阽危内定外攘不遑展禮雖高明未逹而精意惟勤克通至誠以錫純嘏蕃戎即叙弓矢載櫜䖍奉泰壇鑒寐接神祗之顧永保宗社歲時結霜露之思近又百辟在庭儼然而進奉請元子以居少陽冊命乃行鬯匕攸主按風雨之清道乘星火之仲春朝於𤣥元格於藝祖躬執珪奠祗見南郊天何言哉神所勞矣敷兆人之戩榖廣四逹之聰明式重燔柴之經益申解網之恵可大赦天下自廣徳二年二月二十一日昧爽已前大辟罪無輕重已發覺未發覺已結正未結正繫囚見徒常赦所不免者咸赦除之左降官即與量移近處亡官失爵放歸不齒之類并官已復資未得本階者各量與收叙諸色流人及量移人并罰鎮効力配𨽻等一切放還自兇孽亂常王室多故干戈不息今已十年軍國務繁闗輔尤劇念兹疲耗久困徴科其京城諸司諸使應配彍騎官散官諸色丁匠幕士供膳音聲人執祭齋郎問事掌閑師并諸司門僕京兆府騎丁屯丁及諸色納資人每月總八萬四千五十八人數内宜每月共支二千九百四十四人令河東闗内諸州府配不得偏出京兆府餘八萬一千一百一十四人并停所須衛役使宜樽節定數官給資錢不得干擾百姓其寶應元年十二月三十日已前諸色逋欠在百姓腹内者并放免天下户口宜委刺史縣令據見在實户量貧富作等第差科不得依舊藉帳據其虛額攤及鄰保其天下諸州府長史及縣令有清白著聞善政稱最能招輯逃亡編附復業户口増多者具状聞奏朕當差人按覆與所舉状同者超資進改天下所有諸色結聚及羌渾党項等能悔過自陳各歸生業一切并捨其罪其中有能率先来降者仍特加官賞征人不息勤戍斯久丁壮疲弊老弱困窮光武有言頭鬚為白戢藏鋒刃牧養元元方面重臣宜悉朕意應諸州團練将士等委本道節度及諸防禦使等審與州府商議如地非要害無所防虞其團練人等並放營農休息㓂戎以来積有年嵗徴求數廣彫弊轉深自今已後除正租稅及正敕并度支符外餘一切不在徴科限内外文武官三品已上賜爵一級四品已下各加一階仍並賜勲兩轉武徳元從功臣勲業特崇子孫沉翳者委所司勘責各與一人官成都靈武元從普恩之外三品已上更賜一級四品已下更加一階寶應功臣普恩之外三品已上各與一子六品官賜爵一級四品已下各加兩階更賜勲兩轉五品已上官子為父後者賜勲兩轉副元帥光弼子儀各與一子三品官并階諸道節度使各與一子五品官并階都防禦使及經畧等使各與一子六品官并階去嵗行幸陜州六軍英武威逺威武寶應射生衙前射生左右歩軍等并内外文武百官扈從到行在者三品已上與一子官四品已上各加兩階自陜州至上都已来置頓使及州府長官普恩之外各與一子出身置頓使判官已下縁路縣令及専知置頓官各加一階其六軍神䇿寶應射生衙前射生及左右歩軍英武威逺威武等諸軍左右金吾将士縁大禮扈從及在城留從者共賜錢五萬貫鴻臚蕃客共賜錢一千貫儀王及彭王已下諸王男未有官者並準舊例與官其已封為郡王國公者及永穆長樂已下長公主及諸郡縣主并嗣王郡王各與一子官皇親五等已上諸親三等已下各與一子出身二王之後各與一子官臺省之官事資履厯刺史縣令任在親人職務所更是為理本其左右丞侍郎御史中丞等取曽任刺史者郎官亦取曽任縣令者并所選御史亦宜於録事叅軍縣令中簡擇仍須資歴稍深者其有官非累厯才行特堪任用者自布衣已下任所在聞薦委中書門下尚書省考試堪任者不在此限尚書省政理所繫左右綱轄攸歸比来百司職事皆廢宜令明徴式令舉所職百官有論時政得失并任指陳事實具状進封必宜切直無諱有司白身人亦宜準此任詣匭使進表朕将親覽必加擇用朕每思素儉敦以淳風必約嚴章以齊侈俗其珠玉器玩寶鈿雜繡等一切禁斷諸攝官頻有處分一切盡停尚聞因循其弊未革即宜申明舊勅勒停三年之䘮謂之逹禮自非金革不可從權其文官自今已後并許終制一切不得輒有奏請縁大禮應升壇殿行事者普恩之外更與一子官應在太清宫郊廟諸色職掌者及冊皇太子行事官撰冊并書文及檢校造冊官普恩之外三品已上賜爵一級四品已下加一階仍賜勲一轉天下耆老九十已上版授刺史七十已上版授上佐縣令孝子順孫義夫節婦旌表門閭終身勿事五嶽四瀆名山大川今古聖帝明王忠臣義士宜令所管致祭永泰元年正月癸巳朔御含元殿大赦天下制曰協五紀者建號以體元受四時者布和而順氣天心可見人欲是從爰立大中之道式受惟新之命朕嗣膺下武獲主多方顧以薄徳乘兹艱運式麾問罪今已十年飲至䇿勲雖凶渠之授首勞師黷武豈人主之用心况乃軍役屢興干戈靡定茫茫士庶斃於鋒鏑噫皇穹以朕為子蒼生以朕為父至徳不能以被物精誠不能以動天俾我生靈擠於溝壑非朕之咎誰之過歟朕所以馭朽懸旌坐而待曙勞懐罪已之念延想安人之䇿亦惟羣公卿士百辟庶寮咸聴朕命叶宣乃力務履清白之道還興淳素之風率是黎元歸於仁夀君臣一徳何以尚之廼者刑政不修恵化未洽既盡財力良多抵犯静惟哀敬實軫於懐今将大振維綱益明懲勸肇舉改元之典𢎞敷在宥之澤可大赦天下改廣徳三年為永泰元年自永泰元年正月一日昧爽已前大辟已下罪無輕重已發覺未發覺已結正未結正繫囚見徒常赦所不免者咸赦除之僕固懐恩戰伐有功訐謀任重不終臣節輒肆姦凶妄誘異蕃同為不軌朕惟務責已情重舊勲如能翻然来歸必從寛宥其下偏禆等因被驅率不獲巳者所在山谷草竊反側未安者如能束手而來一切竝無所問自廣徳元年已前天下百姓所欠負官物一切放免在官典腹内者不在免限其百姓除正租庸外不得更别有科率刺史縣令與朕分憂彫瘵之人切須撫字一夫不獲情甚納隍有能招輯迯亡平均賦稅増多户口廣闢田疇清節有聞課效尤著者宜委所在節度觀察具名聞奏即名按覆超資擢授其有治無能政迹渉贓私必當重加貶奪永為殿累農政本也食人天也方春之首重於東作除軍興至急餘一切竝停令百姓専營農事其迯户復業及浮客情愿編附者仰州縣長吏親就存撫特令賦役全不濟者量貸種子務合安集孝弟力田懐才抱器遺逸未經薦逹者各委州府聞奏親當䇿試量能叙用應自立仗諸軍将士等宜共賜錢五萬貫書稱咸秩詩美懐柔仰惟衆靈念兹多祐其五嶽四瀆名山大川宜令所管牧宰精誠致祭中外寮吏各揚其職無使曠官克副朕意大厯元年十一月甲子日長至制曰王者欽若昊天誕受丕命莫不協五紀而成運稽三㣲而體元上齊璿衡下立人極乃頒厯於惟嵗更覃恩於率土朕嗣守鴻業恭臨寶位頃以時當㓂難運屬干戈誓衆興師為人除害實賴宗社降福寰宇小康用興淳樸之風庶洽雍熙之化乾坤敷祐大庇生靈文武協心同力王室豈朕薄徳而臻於此乃者金革所聚綿厯嵗時征賦頗繁人猶彫瘵是用疚心疾首當宁而興懐罪以在予馭朽而貽懼每思𢎞濟之道用拯黎元之斃月躔星昴律中黄鍾合天正之符承日至之永祥雲在矚既當伯趙之司恵澤布和宜順一陽之氣建元發號革故維新俾及履長之節用深行慶之典可大赦天下其永泰二年宜改為大厯元年自大厯元年十一月十二日昧爽已前大辟罪已下已發覺未發覺已結正未結正繫囚見徒罪無輕重常赦所不免者咸赦除之長吏犯贓不在免限夫從簡之道大易至言薄賦之規前王令範朕志遵儉約務欲息人徴歛無期誠為勞弊天下百姓除正租庸及軍器所須外不承正勅一切不得輒有科率國以人為本人以農為業頃繇師旅征稅殷繁編户流離田疇荒廢永言牧宰政切親人其刺史縣令宜以招輯户口墾田多少用為殿最每年終委本道按察使節度等使案覆聞奏如課績尤異當加超擢或正理無聞必寘科貶迯亡失業萍泛無依特宜招撫使安鄉井其迯户復業者宜給復三年如百姓先貨賣田宅盡者宜委州縣取逃死户口田宅量丁口充給仍仰縣令親至鄉村安存處置務從樂業以贍資糧王畿之間賦歛尤重百役供億當甚艱辛哀我疲人良多憫念盍徹之稅著自周經未便於人何必行古其什一稅宜停周徴俊造漢辟賢良垂之典謨永代作則天下有安貧樂道孝弟力田未經薦用者委所在長官具以名聞奏朕當親自䇿試量才叙用其立仗将士等宜賜物五萬疋五嶽四瀆名山大川祀典攸存禋理昭著宜以禮致祭四年七月癸未詔曰至理之代先徳後刑上歡心以臨下下欣然而奉上禍亂不作法令可施去聖久逺薄於教化簡書填委獄訟繁興苛吏舞文寃人致辟思欲刷心改行厥路無繇豈天地父母慈愛之意也朕主三靈之重託羣后之上夕惕若厲不敢荒寧内訪卿士外咨方岳日不暇給八年於兹而大道淳風鬱而不振四郊多壘連嵗備邉師旅在外役費尤廣賦輿轉輸疲耗吾人困竭無聊窮斯濫矣下庶闇昧不見刑網戎士在軍未習法令犯禁抵罪其徒實繁狴牢之間未詳事實吏議不決動淹時序傷沮和氣數彰咎徴此皆朕之不明教之未至上失其道而繩下以刑敢不罪己以荅災眚且人者君之支體害之則君有傷刑者教之輔助失之則人無所措慮有寃濫慘然憂傷用明慎罰之典俾𢎞在宥之澤其天下見禁囚死罪降流流已下罪釋放其左降官及流人移𨽻等並與量移仍為所司即勘責送名中書門下奏聴進止如聞州縣官比来率意恣行麤杖不依格令致使殞斃深可哀傷頻有處分仍聞乖越自今已後非灼然蠧害者不得輒加非理仍委觀察節度使嚴加捉搦勿令有犯録名聞奏宣示中外宜悉朕懐五年三月丙戌制曰古者以季春之月布徳行恵恤刑振乏朕親執犠牲玊帛獲奉於上帝神祗九年於兹矣克已思理明不能燭昆夷未叙王畧猶虞嵗募三秦之師日有千金之費悉索敝賦疲於餽軍侯甸之間徴求耗竭百榖翔貴闗中小歉窮則斯濫安能懼刑困而成盗多有犯法至於軍戎之士致使廪賜不充因之迯亡或抵邦憲事非獲已情亦可察近以露濡之恩明發有懐屬禁火之令節方薦鮪於園寝聖祖敷祐景靈告祥先天後天載荷嘉貺以隂以雨又助發生固宜順曲成之仁布惟新之命赦罪育物曠然滌除其京兆府及三輔并京城内諸司諸使見禁囚犯死罪已下特宜釋放其有犯未發覺者罪無輕重一切放免如妄有論告以其罪罪之官典犯贓不在免限六月以來以彗星始滅赦下制曰惟辟奉天作人父母若天垂戒於上人不安於下則修徳勤政以達至誠恤刑獄之寃滯問閭閻之疾苦招納諫諍方求良弼允廸前烈率繇兹道朕獲承宗廟之重託於王侯之上夙夜齋慄莫敢荒寧推誠以撫萬邦屈己以安百姓憂勤之志日慎一日服御之給損之又損而渉道猶淺燭理不明國經王度多有廢闕加以㓂戎聚犯軍國煩勞賦重人竭因之嵗歉田荒業廢逋散相仍每深怵悼頻有蠲降兼亦簡求良吏以恵矜人除去姦兇用逹幽枉大變風俗更張刑政兾人和之漸洽荷天眚之累彰固以朕徳之寡昧化之衰薄其咎不逺在予一人亦繇郡邑之政未盡條理或貪以害物或擾以傷農有凌弱暴寡之寃有不均失中之政人無所措多陥刑辟盖上之教導未至豈忍以文法繩之慘然憂嗟深自隱慝雖靡草麥秋之後方斷薄刑而南風長養之時宜寛庶獄大决疏網與之更新其天下見禁囚徒死罪並降徒流流已下並釋放内外文武官及前資官六品已下并草澤中有碩學専門茂才異等智謀經武諷諫主文者仰所在州府觀察牧宰精求表薦如其中捜揚未盡遺逸林間者即宜詣闕自舉親當䇿試量能擢用朕覽漢文詔書至陽和之時草木羣生之類皆有以自樂而吾百姓或陥於死亡而莫之省緬然遐想感歎増懐哀今之人又甚於昔思有贍恤俾安其居觀察節度使及刺史各宜訓勵所部使奉科條變貪官之節激循吏之行其清白明著政理殊尤者具以名聞必加奨擢若冒干貨賄紊我紀綱切宜糾按當峻刑憲其官人犯贓經恩免罪者並宜申報中書門下及所司不得容其抑止自王室多故積有嵗時皆我文武之臣中外戮力今天下既定崇徳報功與之剖符傳代不絶至於莅官述職各宜明慎典刑宜慶子孫永以為戒於戲武徳貞觀之間有若魏徴王珪李靖李勣房𤣥齡杜如晦等扶翼大運勤勞王家尊主庇人匪躬致命咸有一徳格於皇天緬然長懐風烈猶在其後嗣沉翳特加優奨如廟宇荒毁即宜修葺無徳不報何日忘之其有鰥寡惸獨老幼貧窮不能自存者委州府縣長吏取諸色官物量事賑給仍仰招㩦户口勸課農桑應所在州府首興工役處非灼然急切者宜並停五嶽四瀆名山大川神明所居風雨是主宜委中書門下分使致祭以達精誠孝子順孫義夫節婦事迹明著者特加旌表頒示中外知朕意焉七年五月乙未制曰濟於道者化醇而刑措善於理者綱舉而網疏朕渉道未𢎞燭理多昧嘗亦遐想太古髙揖𤣥風保合太和在宥天下盖徳薄而未臻也是用因時以設教便俗以立防務盡平恕用申哀恤又教淺而多犯也加以邉虞未戢徭賦猶繁荒廢之餘㓂攘斯起遂令圜土嘉石之下積有纍囚竹章牙簡之中困於法吏屬盛陽之候大暑方蒸永念狴牢何堪鬱灼所以沮傷和氣感致咎徴天道人事豈相逺也如聞天下諸州自春已来或愆時雨首種不入宿麥未登哀我矜人何恃不恐皆繇朕過益用懼焉惕然憂嗟深自咎責所以減膳徹樂别居齋官禱於神明兾獲嘉應仲夏之月靜事無刑以助晏隂以𢎞長養斷薄决小已過於麥秋繼長増髙宜順乎天意可大赦天下其大厯七年五月十五日昧爽已前已發覺未發覺已結正未結正應天下見禁囚徒罪無輕重一切並宜放免所在不須類例聞奏宜令諸道節度觀察及州牧縣宰等於當管内所有名山靈迹各精誠致祭所降甘露兾獲豐稔永思流弊庶振風猷其巴南諸州仍嵗水旱廹於凍餒或致流離因有剽求苟全性命懼刑網之所及姑哨聚以相依抑有繇焉盖非獲巳永言其弊用軫於懐如能相率来歸各安生業並無所問咸許自新宣示中外咸使知悉八年五月壬辰曲宥京城内見禁囚徒並釋放是月癸夘制曰自古帝王順時行令當北至之炎燠應南風之長嬴必事無刑解網申恵叙麥秋之氣而代天理物矣朕獲奉珪璧䖍恭郊廟一紀有餘承累聖之鴻業為兆人之父母戰戰兢兢恐不克濟而天地幽賛隂陽化育闗輔之内農祥薦臻嘉榖豐衍宿麥滋殖閭閻之間倉廪皆實百價低賤寔曰小康此皆上帝報貺烈祖儲祉卿士存誠黎元盡力之效思與萬方百辟咸共樂之而未能也况或抵常憲纍然就拘辨對官曹幽閉獄户永惟械繫之慘追復冒犯之繇皆自王化之未醇風教之多闕俾民忘耻格俗虧禮讓陥在刑典久於狴牢當順陽助生之時積寃蔽感傷之氣百姓有過在予一人顧諟欽恤誠切傷痛用申在宥之旨庶洽惟新之令自大厯八年五月二十五日昧爽已前天下繫囚見徒及已發覺未發覺已結正未結正死罪並降徒流流已下罪並宜放免敢以赦前事相言告者以其罪罪之亡命山澤挾藏軍器百日不首復罪如初夫承天之叙則三時有成自中形外則四海蒙福嗟爾庶士諒悉予懐九年四月壬辰制曰朕誕膺天命以撫方夏兢兢多惕保祐惟人懼庶獄之未孚俾一夫之不獲思用哀恤與之和寧頃屬夷夏多虞干戈是務徴賦頗重黎元不康内廹艱窮外乘師旅因行盗竊自陥典刑纍然圜土之下佇𠞰視隂之命永念愚惑惻焉疚心而寰宇之間舉類斯衆今火中惟夏長嬴及時鬱然沈繫致傷和氣萬方有罪在予一人将洽至淳之化更布惟新之理其大厯九年四月二十四日昧爽已前大辟罪已下已發覺未發覺已結正未結正罪無輕重一切並宜放免敢以赦前事相言告者以其罪罪之其在軍将士有刀箭所傷久嬰沉疾者戮力疆場致身鋒刃各委所繇量給藥物厚加優賞其陣亡将士仰本路隨事優恤妻子各申錫賚其百姓鰥寡孤獨不能自存者困窮無主誠可哀傷仰所在州府長官每事以諸色官物量加贍恤令其得所亡命山澤挾藏軍器百日不首復罪如初在宥之典既周動植純嘏之錫庶延子孫凡在品彚各宜遷善宣示中外諒悉朕懐十二月壬辰勅京城内見禁囚犯死罪從流流已下罪釋放十年九月壬寅宥京城内見禁囚死罪從流流已下釋放十二年六月丁未以旱故詔曰頃屬煩暑差候愆陽積旬處於髙明之中猶有鬱蒸之嘆而况幽閉獄户辨對官曺俯臨秋期将正時憲重修欽恤之道載𢎞全宥之仁其京城見禁囚犯流已下罪並宜釋放冊府元龜卷八十八
