body:
  text: 册府元龜卷八百九十六宋王欽若等撰總錄部復讎傳曰父之讎弗與共戴天春秋傳曰子不復讎非子也周官調人之職掌和萬民而教其辟讎同國而不相辟者言之於士殺之無罪盖報仇之所由来舊矣中古而下方牘所記乃有天性之戚手足之痛或義篤於諸父或情厚於交友獨能奮不顧死勦絶其命攄逝者之沉憤聳人倫之風槩乃至朝議髙其節理官緩其法亦有詢外庭之論遵王章之制不免於戮者焉若夫受誅於官者非怨殺人而義者勿讎斯典經之丕訓百代所不易盖以銷忿毒之漸致清夷之化納民於軌物者也其可忽諸叔孫昭子魯大夫也昭子叔孫婼父穆子穆子叔孫豹寵豎牛豎牛欲亂其室曰夫子疾病不欲見人使寘饋于个而退个東西廂牛弗進則置虚命徹寫器令空示若叔孫已食命去之叔孫不食卒三日絶糧牛立昭子而相之昭子朝其家衆曰豎牛禍叔孫氏使亂大從使從於亂殺適立庶謂殺孟丙彊與仲盟又披其邑将以赦罪披析也謂以邑與南遺昭子不知豎牛餓死其父故但言其見罪罪莫大焉必速殺之豎牛懼奔齊孟仲之子殺諸塞關之外齊魯界上關投其首於寜風之棘上寜風齊地仲尼曰叔孫昭子之不勞不可能也不以立已為功據其所言善之時魯人不以餓死語昭子周任有言曰為政者不賞私勞不罰私怨詩云有覺徳行四國順之詩大雅覺直也言徳行直則四國順之漢灌夫父張孟吴椘反時頴隂侯灌嬰為将軍属太尉頴隂侯是灌嬰之子名何轉寫誤為嬰耳請孟為校尉夫以千人與父俱官主千人如候司馬也孟年老頴隂侯强請之鬰鬰不得意故戰常陷堅遂死呉軍中漢法父子俱在軍中有死事得與喪歸夫不随䘮歸奮曰願取吳王若将軍頭以報父讎自奮厲也於是夫披甲持㦸募軍中壮士所善願從數十人所善素與已善者及出壁門莫敢前獨兩人及從奴十餘騎馳入吴軍至戯下戯大將之旗也所殺傷數十人不得前復還走漢壁皆亡走輙嚮也其奴獨與一騎歸夫身中大創十餘適有萬金良藥故得無死萬金者言其價貴也金字或作全言得之者必生全也創少瘳又復請将軍曰吾益知吴壁曲折請復往曲折猶言委曲也将軍壮而義之恐亡夫廼言太尉太尉召固止之吴軍破夫以此名聞天下李敢代父廣為郎中令頃之怨大將軍青之恨其父青衛青也令其父恨而死也廼擊傷大將軍大將軍匿諱之原渉為谷口令先是渉季父為茂陵秦氏所殺渉居谷口半嵗所自劾去官欲報讎谷口豪傑為殺秦氏亡命嵗餘逢赦出郡國諸豪及長安五陵諸為氣節者皆歸慕之後漢劉鯉更始子也得幸於沛獻王輔鯉怨劉盆子害其父因輔結客報殺盆子兄故式侯㳟輔坐繫詔獄三日乃得出劉賜字子琴光武族兄賜少孤兄顯報怨殺人吏捕顯殺之賜與顯子信賣田宅同抛財産結客報吏續漢書曰王莽時諸劉抑廢為邵縣所侵蔡陽國釡亭侯長醉詢更始父子張怒刺殺亭長後十餘嵗亭長子報殺更始弟寒賜兄顯欲報怨賔客轉刼人發覺别郡殺顯獄中賜與小子信結客陳政等九人燔燒殺亭長妻子四人皆亡命逃伏遭赦歸周黨太原人鄉佐甞衆中辱黨父黨乆懐之後至長安逰學讀春秋聞復讎之義便輟講而還與鄉佐尅日交刅黨為其所傷困頓鄉佐服義與歸養之數日方蘓黨後累徴不屈趙熹字伯陽南陽宛人少有節操從凡為人所殺無子熹年十五常思報之乃挟兵結客後遂往復讎而讎家皆疾病無相距者熹以因疾報殺非仁者心且釋之而去顧謂讎曰爾曺若徤逺相避也讎皆卧自摶自摶猶叩頭也後病愈悉自縳詣熹熹不與相見後竟殺之熹後至太傳郅惲友人董子張者父先為鄊人所害及子張病将終惲從候之子張垂殁視惲歔欷不能言惲曰吾知子不悲天命痛讎不復也子在吾憂而不手子亡吾手而不憂也言子在吾憂子讎未能報而不須手自揮鋒子若亡吾直為子手刄讎人不須心懐憂也子張但目撃而已惲即起作鹿字寫将客遮讎人取其頭以示子張子張見而氣絶惲因而詣縣以状自首令應之遅惲曰為友報讎吏之私也奉法不阿君之義也虧君以生非臣節也趨出就獄令跣而追惲不及遂自至獄令㧞刄自向以要惲曰子不從我出敢以死眀心惲得此乃自因病去後至長沙太守杜詩為南陽太守坐遣客為弟報讎被殺崔瑗兄章為人所殺瑗手刄報讎因亡命㑹赦歸家後至濟北相蘓不韋扶風人父謙初為郡督郵時魏郡李暠為羙陽令與中常侍貝瑗交通貪暴為民患前後監司畏其勢援莫敢糾問及謙至部案得其臧論輸左校謙累遷至金城太守去郡歸鄊里漢法免罷守令自非詔徴不得妄到京師而謙後私至雒陽時暠為司𨽻校尉收謙詰掠死獄中暠又因刑其屍以報昔怨不韋時年十八徴詣公車㑹謙見殺不韋載䘮歸鄊里瘞而不葬仰天嘆曰伍子胥獨何人也乃蔵母於武都山中遂變名姓盡以家財募劍客邀暠於諸陵間諸陵謂長安中五陵也不尅㑹暠遷大司農時右校芻廥在寺北垣下廥芻藁蔵也垣墻也不韋以親從兄弟潜入廥中夜則鑿地晝則逃伏如此經月遂得傍達暠之寢室出其床下值暠在厠因殺其妾并及小兒留書而去暠大驚懼乃布棘於室以板籍地一夕九徙雖家人莫知其處每出輙劍㦸随身壮士自衛不韋知暠有偹乃日夜飛馳徑到魏郡掘其父阜冡阜謂暠父斷取阜頭以祭父墳又標之於市曰李君遷父頭暠匿不敢言而自上退位歸鄊里私掩塞冡椁捕求不韋歴嵗不能得憤恚感傷發病歐血死不韋後遇赦還家乃始改葬行䘮士大夫多譏其發掘冡墓歸罪枯骨不合古義唯任城何休方之伍員太原郭林宗聞而論之曰子胥須云逃命而見用强吴馮闔閭之威因輕悍之衆雪怨舊郢㑹不終朝而但鞭墓戮屍以舒其憤竟無手刄後主之報豈如蘇子單持孑立靡因靡資强讎豪援據位九卿城闕天阻宫府幽絶塵埃所不能過霧露所不能沾不韋毁身焦慮出於百死冒觸嚴禁䧟族禍門雖不獲逞為報已深况復分骸斷首以毒生者使暠懐憤結不得其命猶假手神靈以斃之也力唯匹夫功隆千乗比之於員不以優乎議者於是貴之太傅陳蕃辟不應為郡五官掾陽球漁陽泉州人郡吏有辱其母者球結少年數十人殺吏滅其家由是知名後至衛尉賈淑太原介休人為舅宋瑗報讎於縣中為吏所捕繋獄當死鄊人郭泰與語淑懇惻流涕泰詣縣令應操陳其報怨蹈義之事被赦縣不宥之郡上言乃得原魏孫資有時名太祖為司空辟資㑹兄為鄊人所害資手刄報讎乃将家属避地河東遂不應命何顒友人虞偉髙有父讎未報而篤病将終顒往候之偉髙泣而訴顒感其義為復讎以頭醊其墓魏郎少為縣吏兄為鄊人所殺郎白日操刄報讎於縣遂亡命到陳國龎㑹立義将軍惪之子惪南屯樊與關雲長戰敗為關所殺㑹随鍾鄧伐蜀蜀破盡滅闗氏家韓暨字公至南陽堵陽人同縣豪右陳茂譛暨父兄㡬至大辟暨陽不以為言庸賃積資隂結死士遂尋擒茂以首祭父墓由是顯名典韋好俠襄邑劉氏與睢陽李禮為讎韋為報之禮故富春長備怨甚謹韋乗車載鷄酒偽託候者門開懐匕首入殺禮并殺其妻徐出取車晉索綝舉秀才除郎中嘗報兄讎手殺三十七人時人壮之沈勁字世堅父充與王敦搆逆衆敗而逃為部曲将吴儒所殺當坐誅鄊人錢舉匿之得免其後竟殺讎人後至冠軍長史戰死朱昌父軌為荆州刺史王廙将廙使軌及趙誘繋杜曽皆為曽所殺及周訪討曽既執曽欲生致武昌昌與趙誘息裔乞曽以復怨於是斬曽而昌裔臠其肉而噉之刁彛字太倫協之子少遭家難王敦誅後彛斬讎人黨以首祭父墓詣廷尉請罪朝廷特宥之由是知名後至北中郎将譙烈王無忌閔王承之子承為荆州刺史王廙所害無忌以年小獲免後為黄門侍郎江州刺史禇褒當之鎮無忌及丹陽尹常景等餞於版橋時王廙子丹陽丞耆之在坐無忌志欲復讎㧞刀将手刄之褒景命左右救捍獲免御史中丞崔灌奏無忌欲専殺人付廷尉科罪成帝詔曰王敦作亂閔王遇禍尋事原情今王何責然公私憲制亦已有斷王當以體國為大豈可尋繹由来以亂朝憲主者其申明法令自今以往有犯必誅於是聼以贖罪論王談年十嵗父為隣人竇度所殺談隂有復讎志而懼為度所疑寸刄不畜日往伺度未得年至十八乃宻布利鍤陽若耕鉏者度嘗乗船出遊經一橋下談伺度行還伏草中度既過談於橋上以鍤斬之應手而死既而歸罪有司太守光巖義其孝勇列上宥之後巖諸子為孫恩所害無嗣談乃移居㑹稽脩理巖父子墳墓盡其心力也桓温父彛為韓晃所害涇令江播豫焉温時年十五枕戈泣血志在復讎至年十八㑹播已終子彪兄弟三人居䘮置刄杖中以為温備温詭稱弔客得進刄彪於廬中并追二弟殺之時人稱之桓𤣥温之子與王恭討江州刺史王愉兵敗𤣥至長唐湖遇商人錢强强宿憾王恭故将軍殷確以告湖浦尉尉收之送京師至倪塘斬之及𤣥執政腰斬湖浦尉及錢强等殷簡之父仲堪為桓𤣥所害簡之載䘮下都𦵏於丹徒遂居墓側宋髙祖義旗建率私僮客随義軍躡桓𤣥𤣥死簡之食其肉謝琨琰之小子琰討孫恩兵敗帳下督張猛於後斫琰馬遂遇害後宋髙祖左里之㨗生擒猛送琨琨刳肝生食之朱綽兄憲及斌俱為西中郎袁真将佐桓温伐夀陽真以憲兄弟與温潜通並殺之綽逃歸温攻戰常居先不避矢石夀陽平真已死綽輒發棺戮尸龔壮巴西人父叔為李特所害壮積年不除䘮力弱不能復讎及李夀戍漢中與李期有嫌期特孫也壮欲假夀以報乃説夀曰節下若能并有西土稱藩於晉人必樂從且捨小就大以危易安莫大之䇿也夀然之遂率衆討期果尅之李夀見期兄弟十餘人年方壮大而並有强兵懼不自全乃數聘禮巴西壮雖不應聘數往見夀時岷山傾江水竭夀悪之每問壮以自安之術壮以特殺其父及叔欲假手報讎未有其由因説夀曰節下若能捨小從大以危易安則開國裂土長為諸侯名髙桓文勲流百代矣夀從之隂與長安客羅尚巴西觧思明共謀據成都稱藩歸順乃誓文武得數千人襲尅之宋毛循之一作修之父瑾晉末為梁秦二州刺史為譙縦所殺髙祖表循之為龍驤将軍配兵力遣令奔赴又遣益州刺史司馬榮期及文處茂時延祖等西討循之至巖渠榮期為叅軍楊承祖所殺承祖自稱鎮将軍巴州刺史循之退白帝承祖自下攻之不㧞循之使叅軍嚴綱䓁收合兵衆漢嘉太守馮遷率兵来㑹討承祖斬之時文處茂猶在巴郡循之遣振武将軍張季仁五百兵係處茂䓁荆州刺史道規又遣奮武将軍原導之領千人受循之節度循之遣原導之與季仁俱進時益州刺史鮑陋不肯進討循之下都上表曰臣聞有生所以重生實有生理可保臣之情地生途已竭所以未淪於泉壤借命於朝露者以日月並炤有兼映之輝庶慿天威誅夷讎逆自提戈西赴備嘗時難遂使齊斧停柯狡𥪡假息誠由經路有暨暨及也亦縁制不自已撫影窮號泣望西路益州刺史鮑陋始以四月二十九日達巴東頓白帝以俟廟略可乗之機宜踐投袂之禽屢愆臣雖効死㓂庭而理兼義絶是以束骸載馳訴寃象魏昔宋害申舟椘莊有遺腹之憤况忘家殉國勘有臣門節冠風霜人所矜悼伍員不虧君義申胥不忘國艱俟㑹摧鋒思時乃發今臣庸踰在昔未搴宵邁之旗是以仰宸極以希炤眷西土以灑涙也公私抱恥仰望洪恩豈宜遂享名器比肩人伍求情既所不容即實又非所繼但以方仗威靈要須綜攝乞觧金紫寵私之榮賜以鷹揚折衝之號臣之於國理無虚請自臣渉道情慮荒越疾毒交纒嘗慮性命要當躬先士卒身馳賊庭手斬㐫醜以攄莫大之痛然後就死之日即化如歸闔門靈爽豈不謝先帝於𤣥宫髙祖哀其情事乃命冠軍将軍劉敬宣率文處茂時延禮諸軍伐蜀軍次黄虎無功而退譙縦由此送循之父伯及中表䘮柩口累並得俱還沈林子與沈預有讎因自歸髙祖從髙祖克京城沈預慮林子與兄田子還東報讎因五月夏節日至預正大集㑹子弟盈堂林子兄弟挺身直入斬預首男女無長幼悉屠之以預首祭父祖墓垣閬文帝元嘉中爲貟外散騎侍郎母墓為東阿寺道人曇雒等所發閬與弟殿中将軍閎共殺曇雒等五人詣官歸罪見原宋越父為蠻所殺殺其父者嘗出郡越於市中刺殺之太守夏侯穆嘉其意擢為隊主錢延慶吴興長城人父仲期為同縣奚慶恩所殺延慶属役在都聞父死馳還於庾浦埭逢慶恩手刄殺之自繋烏城縣獄太守郗顒表不加罪許之申孝叔父令孫代薛安都為徐州刺史令孫至郡境降安都從子索肥為其所殺後索肥兵敗走向雒平縣界孝叔斬之房愛親父元慶為沈文秀建威府司馬為文秀所害愛親率勒鄉部攻文秀眀帝嘉之起家授龍驤将軍尋㑹文秀降乃止南齊沈文秀宋司空慶之之子慶之為景和臣欽若䓁曰景和宋前廢帝年號所殺兵仗圍宅収捕諸子文秀長兄文叔謂文秀曰我能死爾能報遂自縊文秀揮刀馳馬去收者不敢追遂得免時沈攸之為景和御史殺慶之後攸之反文秀督吴錢塘軍事文秀收殺攸之弟新安太守登之誅其宗族聞人敻吴興人年十七結客報父讎為髙祖所賞朱謙之字處光父昭之以學稱於鄉里謙之年數嵗所生母亡昭之假葬田宅側為族人朱幼方燎火所焚同産娣宻語之謙之雖小便哀戚如持䘮年長不婚娶永眀中手刄殺幼方詣獄自繋縣令申靈朂表上别駕孔稚珪兼記室劉璡司徒左西掾張融牋與刺史豫章王曰禮開報讎之典以申孝義之情法斷相殺之條以表權時之制謙之揮刄斬寃既申私禮繋頸就死又明公法今仍殺之則成當世罪人宥而活之即為盛朝孝子殺一罪人未足𢎞憲活一孝子實廣風徳張緒陸澄是其鄉舊應具来由融等與謙之並不相識區區短見深有恨然豫章王言之武帝時吴郡太守王慈太常張緒尚書陸澄並表論其事帝嘉其義慮相報復乃遣謙隨曹虎西行将發幼方子惲於津陽門伺殺謙之謙之兄選之又刺殺之有司以聞帝曰此皆是義事不可問悉赦之吴興沈顗聞而歎曰弟死於孝兄殉於義孝友之節萃此一門梁蘭道恭益州人父為刺史劉季連所殺道恭出亡季連還都同出建陽門道恭殺之趙䟦扈新城人兄震動富於財太守樊文茂求之不已震動怒曰無厭将及我文茂聞其語聚其族誅之䟦扈走免亡命聚黨至社樹呪曰文茂殺䟦扈兄今欲報之若事尅斫樹處更生不克即死三宿三枿生十丈餘人間傳以為神附者十餘萬既殺文茂轉攻傍邑将至成都十餘日戰敗退保新城求降成景雋范陽人父安樂仕後魏為淮陽太守武帝天監六年常邕和殺安樂以城内附景隽謀復讎因殺魏宿預城王以地南入普通六年邕和為鄱陽内史景隽購人刺殺之未乆重購邕和家人鴆殺其子弟讎類俱盡武帝義之每為屈法景隽家讎既雪每思報効後除北豫州刺史侵魏所向必摧其智勇時以比馬仙琕張景仁廣平人父梁為同縣韋法所殺景仁時年八嵗及長志在復讎普通七年遇法於公田渚手斬其首以祭父墓事竟詣郡自縳乞依刑法太守蔡天起上言於州時簡文在鎮乃下教褒羙之原其罪下屬長蠲其一戸租調以旌孝行李慶緒廣漢郪人父為人所害慶緒九嵗而孤為兄所養日夜號泣志在復讎投州将陳顯達仍於部伍白日手刄其讎自縳歸州州将義而釋之陳侯瑱巴西人父𢎞逺世為西蜀酋豪蜀賊張文萼據白崖山有衆萬人梁益州刺史鄱陽王蕭範命𢎞逺討之𢎞逺戰死瑱固請復讎每戰必先鋒䧟陣遂斬文萼由是知名後魏元郎父東阿公順爾朱之亂為陵户鮮于康奴所害郎時年十七枕戈潜伏積年乃手刄康奴以首祭於順墓然後詣闕請罪朝廷嘉而不問鄭思眀父連山為光祿大夫性嚴暴撾撻僮僕酷過人理父子一時為奴所害斷首投馬槽下乗馬北逝思眀驍勇善騎射披髪率村義馳騎追之於河村義謂村中義俠也奴乗馬投水思明将從不聼放矢乃自射之一發而中落馬隨流衆人擒執至家臠而食之傅融有三子靈慶靈根靈越並有才力宋将蕭斌王𤣥謨㓂碻磝時融始死𤣥謨强引靈慶為軍主後與二弟匿於山澤之間時靈慶從叔乾愛為斌法曹叅軍斌遣乾愛誘呼之以腰刀為信宻令壮徤者隨之而乾愛不知斌之欲圖靈慶也既至靈慶家對坐未乆斌所遣壮士執靈慶殺之靈慶将死與母崔氏訣言法曹殺人不可忘也靈根靈越奔河北靈越至京師文成見而竒之靈越因説齊民慕化青州可平帝大悦拜靈越鎮逺將軍青州刺史貝丘子鎮羊蘭城靈根為臨齊副將鎮明潜壘靈越北入之後母崔氏遇赦免宋人恐靈越在邊擾動三齊乃以靈越叔父琰為冀州治中乾愛為樂陵太守陵與羊蘭隔河相對命琰遣其門生與靈越婢詐為夫婦投化以招之靈越與母分離思積遂與靈根相要南走靈越與羊蘭奮兵相撃乾愛遣船迎之得免靈根差期不得俱度臨齊人覺知剉斬殺之乾愛出郡迎靈越問靈根愆期之状而靈越殊不應答但言不知而已乾愛不以為惡勑左右出匣中烏皮袴褶令靈越代所常服靈越言不須乾愛云汝豈可着體上衣服見垣公也時垣䕶之為刺史靈越奮聲言垣公着此當見南方國主豈垣公也竟不肯着及至丹陽宋孝武見而禮之拜員外郎兖州司馬帶魯郡而乾愛亦遷青冀司馬帶魏郡後二人俱遷建康靈越意常欲為兄復讎而乾愛初不疑防知乾愛嗜雞肉菜求食乃為作之下以毒藥乾愛還而卒淳于誕南齊南安太守興宗之子年十二隨父向揚州父於路為羣盗所害誕雖童稚而哀感奮發傾資結客旬朔之内遂得復讎由是州里歎異之益州刺史劉悛召為主簿吴悉達弟兄三人年並幼小父母為人所殺四時號慕悲感鄉隣及長報讎避地永安孫益徳其母為人所害益徳童幼為母復讎還家哭於殯以待縣官孝文文眀太后以其幼而孝决又不逃罪特免之荀瓊年十五復父讎於成都市以孝聞楊孝邕以父為爾朱天光所害孝邕走免匿於蠻中潜結渠帥謀應北齊神武以誅爾朱氏微服入雒叅司機㑹為人所告爾朱世降收付廷尉掠殺之北齊崔達挐尚安樂公主文宣帝嘗問公主達挐於汝何似答云甚相敬重唯何家憎児顯祖召達挐母入内殺之投屍漳水齊滅達挐殺主以報讎後周杜叔毗㐮陽人初仕梁為蕭修府史直兵叅軍太祖令大将軍達奚武經略漢川眀年武圍修於南鄭修令叔毗詣闕請和太祖見而禮之使未及而修中直兵叅軍曹策叅軍劉曉謀以城降武時叔毗兄君錫為脩中記室叅軍從子映録事叅軍映弟晣中直兵叅軍並有文武才畧各領部曲數百人䇿䓁忌之懼不同已遂誣以謀叛擅加害焉修䓁討䇿䓁擒之斬曉而免䇿及修降䇿至長安叔毗朝夕號泣具申寃状朝議以事在歸附之前不可追罪叔毗内懐憤惋志在復讎然恐違朝憲坐及其母遂沈吟積時母知其意謂叔毗曰汝兄横罹禍酷痛切骨髓若曹䇿朝死吾以夕殁亦所甘心汝何疑焉叔毗受母言愈更感厲後遂白日手刄䇿於京城斷首刳腹觧其肢體然後面縳請就戮焉太祖嘉其志氣特命赦之栁慶為司㑹先是慶兄檜為魏興郡守為賊黄衆寳所害檜子三人皆幼弱慶撫養甚篤後衆寳率衆歸朝朝廷待以優禮居數年檜次子雄亮白日手刄寳於長安城中晉公䕶聞而大怒執慶及諸子姪皆囚之譲曰國家憲綱皆君䓁所為雖有私怨寜得擅殺人也對曰慶聞父母之讎不同天兄弟之讎不同國明公以孝治天下何乃責於此乎䕶愈怒慶辭色無所屈率以免隋来䕶児幼孤養於世母吴氏侯景之亂䕶児世父為鄉人陶武子所害吴氏每流涕為䕶児言之武子宗族數百家厚自封殖䕶児每思復怨因其有婚禮乃結客數人直入其家引武子斬之賔客皆懾不敢動乃以其頭祭世父墓因潜伏嵗餘㑹周師定淮南乃歸鄉里唐髙季輔渤海人也兄元道仕隋為汲令武徳初縣人翻城從賊元道被害季輔率其黨出闘竟擒殺兄者斬之持其首以祭甚為士友所稱獨孤脩徳為宣州刺史武徳中髙祖徙王世充於蜀脩徳以讎人請而殺之王君操莱州即墨人其父隋末與鄉人李君則闘競因被毆殺君操時六嵗其母劉氏告縣收捕君則棄家亡命追訪數年弗獲貞觀初君則自以世代遷革不慮國刑又見君操孤微謂無復讎之志遂詣州府自若而君操宻袖白刄刺殺之刳腹取其心肝咀食立盡詣刺史具自陳告州司以其擅殺戮問云殺人償死律有明文何方自理以求生路對曰亡父被殺二十餘載聞諸曲禮不可同天早願圖之乆而未遂常懼亡滅不展寃情今大恥既雪甘從刑憲州司據法處死列上其状太宗特詔原免同蹄智夀雍州同官人其父髙宗永徽初被族人安吉所害智夀及弟智爽候安吉於塗撃殺之兄弟相率歸罪於縣爭為謀首官司經數年不能决鄉人或證智爽先謀竟伏誅臨刑神色自若顧謂市人曰父讎已報死亦何恨智夀頓絶中衢血流徧體又收智爽屍䑛血食之皆盡見者莫不傷焉張琇蒲州觧人父審素為隽州都督在邊累載俄有糾其贓罪勅監察御史楊汪馳傳就軍按之汪在路為審素黨與所刼對汪殺告事者脇令汪奏雪審素之罪俄而州人翻殺審素之黨汪始得還至益州奏稱審素謀反因深按審素搆成其罪斬之籍没其家琇與兄瑝以年幼坐徙嶺外尋各逃歸汪轉至殿中侍御史改名萬頃開元二十三年瑝琇候萬頃於都城挺刄殺之瑝雖年長其發謀及手刄皆琇為之既殺萬頃繋表於斧刄自言報讎之狀便逃奔将就江外殺與萬頃同搆父罪者行至汜水為捕者所獲時都城士庶皆矜琇䓁幼稚孝烈能復父讎多言其合矜恕者中書令張九齡又欲活之裴耀卿李林甫固言國法不可縦報讎𤣥宗以為然因謂九齡䓁曰復讎雖禮經所許殺人亦格律具在孝子之情義不顧命國家設法焉得容此殺人成復讎之志赦之虧律格之條然道路諠議故須告示乃下勑曰張瑝䓁兄弟同殺推問欵承律有正條俱合至死近聞士庶頗有諠譁矜其為父復讎或言夲罪寃濫但國家設法事存經乆盖以濟人期於止殺各申為子之志誰非狥孝之夫展轉相讎相殺何限咎繇作士法在必行曽参殺人亦不可恕不能加以刑戮肆諸市朝宜付河南尹告示决殺瑝琇既死士庶咸傷愍之為作哀誄牓於衢路市人歛錢於死所造義井并葬瑝琇於北邙又恐萬頃家人發之并作疑冡數具時人所傷如此劉士幹宣武節度劉𤣥讐之養子有樂士朝者亦為𤣥讐所子因姓劉氏素與士榦有隙徳宗貞元中𤣥讐薨或云為士朝所酖士幹微知之及士朝至京師士幹乃宻以奴持刀伏於䘮位紿士朝曰有弔客至誘入堂哭因殺之士幹坐是賜死余常安衢州常山人父及叔父為方全所殺亡去十餘年㑹赦乃歸嘗安熟聞知之憲宗元和中嘗安年十七乃報殺之詣州請罪州司以其事聞制依法處死刺史元錫義之累上表請下百僚詳議復詔嘗安死時歎其寃梁悦富平人為父報讎斫殺讎人秦杲自投縣請罪勑復讎殺人固有彛典以其申寃請罪視死如歸自詣公門發於天性志在殉節夲無求生之心寜失不經特從减死之法宜决一百配流循州職方員外郎韓愈獻議曰伏奉今月五日勑復讎據禮經則義不同天徴法令則殺人者死禮法二事皆王教之端爰有異同因資論辯宜令都省集議聞奏者伏以子復父讎見於春秋見於禮記又見於周官又見於諸子史不可勝數未有非而罪之者也最宜詳於律而律無其條非闕文也盖以為不許復讎則傷孝子之心而乖先王之訓許復讎則人将倚法専殺無以禁止其端矣夫律雖夲於聖人然執而行之者有司也經之所眀者制有司者也丁寜其義於經而深没其文於律者其意将使法吏一斷於法而經術之士得引經而議也周官曰凡殺人而義者令勿讎讎之則死義宜也眀殺人而不得其宜者子得復讎也此百姓之相讎也公羊傳曰父不受誅子復讎可也不受誅者罪不當誅者也上於下之辭非百姓之相殺者也又周官曰凡報仇讎者書於士殺之無罪言将復讎必先言於官則無罪也今陛下垂意典章思立定制惜有司之守憐孝子之心示不自専訪議羣下臣愚以為復讎之名雖同而其事各異或百姓相讎如周官所稱可議於今者或為官吏所誅如公羊所稱不可行於今者又周官所稱將復讎先告於士則無罪者若孤稚羸弱抱微志而伺敵人之便恐不能自言於官未可以斷於今也然則殺之與赦不可一例且定其制曰凡有人復父讎者事發具其事申尚書省集議奏聞酌其宜而處之則經無失其指矣康買徳父憲為羽林官騎京兆府雲陽縣力人張涖欠憲錢米憲徴之涖乗醉拉憲氣息将絶買徳年十四将救其父以涖角觝力人不敢撝觧遂持木鍤擊涖涖首見血後三日致死刑部員外郎孫革奏准律父為人所毆子往救擊其人折傷减凡闘三䓁致死者依常律即買徳救父雖是性孝非暴擊張涖是心切非兇以髫丱之嵗正父子之親若非聖化所加童子安能及此王制稱五刑之理必原父子之親以權之測淺深之量以别之春秋之義原心定罪周書所訓諸罸有權今買徳生被皇風幼符至孝哀矜之宥臣伏在聖慈職當讞刑合分善惡先具事由陳奏伏冀賜下中書門下商量勑㫖康買徳尚在童年得知子道雖殺人當死而為父可哀若從沈命之科恐失原情之義宜付法司减死罪一䓁處分後唐髙𢎞超洺州平息人父暉為鄉人王感所殺𢎞超挾刄以報之遂携其首自陳大理寺以故殺傷論刑部員外李殷夢覆曰伏以挟刄殺人按律處死投獄自首降罪垂文髙𢎞超既遂復讎固不逃法戴天罔愧視死如歸歴代已来事多貸命長慶三年有康買徳父憲為力人張涖乗醉拉憲氣息将絶買徳年十四以木鍤擊涖後三日致死勑㫖宜减死處分又元和六年富平人梁悦殺父之讎投縣請罪勑㫖特從减死方今時時有此孝子其髙𢎞超若使須歸極法實慮未契鴻慈奉勑忠孝之道乃治國之大柄典刑之要在誅意之深文差若毫釐繫之理道昔紀信替主赴難何青史之永刋今髙𢎞超為父報寃即丹書之不尚人倫至孝法網宜矜减死罪一䓁處分晉韓顒鄴人少帝開運中為父報讎殺經赦賊平興刑部員外郎古昭裔斷曰伏以韓顒稱為父報讎准律謀殺人者死情雖可軫法且不容請依大理寺斷遣從之漢髙勲仕晉為閤門使初勲與張彦澤不協彦澤害其家属及虜入汴勲訴耶律氏尋誅彦澤雪其家恥周張永徳父頴為安州防禦使性卞急峻刻部曲曹澄與不逞之徒數人同謀執頴而殺之遂奔于金陵及世宗征淮南以永徳之故遣江南李景執澄等賜永徳俾甘心而戮之册府元龜卷八百九十六
