body:
  text: 册府元龜卷八百十八宋王欽若等撰總錄部知子古人有言曰知子莫若父蓋天性之親氣類脗合故肇自髫齔至於成人或端厚不羣俊逸特異至性孝友清識超邁禀賦所及斯可見矣至有天性兇狠體質庸鄙雖加教朂罔或悛改以至先請其罪免於從坐斯又明於藻鑒不稱其親者也施及同氣以迄宗黨觀厥所為察其所與終善終惡信而有徴咸附於篇用儆厥後楚若敖子良為司馬生子越椒子文曰必殺之子文子良之兄是子也熊虎之狀而豺狼之聲弗殺必滅若敖氏矣諺曰狼子野心是乃狼也其可畜乎子良不可子文以為大慼及將死聚其族曰椒也知政乃速行矣無及於難且泣曰鬼猶求食若敖氏之鬼不其餒而及令尹子文卒後子越為令尹遂處烝野將攻王烝野楚邑楚子與若敖氏戰於臯滸臯滸楚地遂滅若敖氏伍奢楚大夫平王囚伍奢將誅之費無忌曰伍奢有二子不殺當為楚國患盍以免其父召之必至於是王使使謂奢能致二子則生不能將死奢曰尚至胥不至王曰何也奢曰尚之為人廉而死節慈孝而仁聞召而免父必至不顧其死胥之為人智而好謀勇而矜功知來必死必不來然為楚國憂者必此子於是王使人召之曰來吾免爾父伍尚謂伍胥曰聞免父而莫奔不孝也父戮莫報無謀也度能任事智也子其行矣我其歸死伍尚遂歸伍胥彎弓屬矢出見使者曰父有罪何以召其子為將射使者還走遂出奔吳伍奢聞之曰胥亡楚國危哉楚人遂殺伍奢及尚朱公居陶生少子及少子壯而朱公中男殺人囚於楚朱公曰殺人而死職也然吾聞千金之子不死於市告其少子徃視之乃裝黄金千鎰置褐器中載以一牛車且遣其少子朱公長男固請欲行朱公不聽長男曰家有長子曰家督今弟有罪大人不遣乃遣少弟是吾不肖欲自殺其母為言曰今遣少子未必能生中子也而先空亡長男奈何朱公不得已而遣長子為一封書遺故所善莊生曰至則進千金於莊生所聽其所為慎無與争事長男既行亦自私齎數百金至楚莊生家負郭披藜藿到門居甚貧然長男發書進千金如其父言莊生曰可疾去矣慎毋留即弟出勿問所以然長男既去不過莊生而私留以其私齎獻遺楚國貴人用事者莊生雖居窮閻然以廉直聞於國自楚王以下皆師尊之及朱公進金非有意受也欲以成事後復歸之以為信耳故金至謂其婦曰此朱公之金有如病不宿誡後復歸勿動而朱公長男不知其意以其殊無短長也莊生間時入見楚王言某星宿某此則害於楚楚王素信莊生曰今為奈何莊生曰獨以德為可以除之楚王曰生休矣寡人將行之王乃使使者封三錢之府周景王時將鑄大錢又自虞夏商周金幣三等或赤或白或黄黄為上幣銅錢為下幣錢者金帛之名所以貿買物通財用也古者有母平子子權母而行然則三品之來古而然矣楚貴人驚告朱公長男曰王且赦曰何以也曰每王且赦嘗封三錢之府昨暮王使使封之或曰王且赦嘗封三錢之府者錢幣至重慮人知有赦盗竊之所以封錢府備盗竊也漢靈帝時河内張成能候風角知將有赦出教其子殺人捕得七日赦出此其類也朱公長男以為赦弟固當出也重千金虚棄莊生無所為也乃復見莊生莊生驚曰若不去耶長男曰固未也初為弟事弟今議自赦故辭生去莊生知其意欲復得其金曰若自入室取金長男即自入室取金持去獨自歡幸莊生羞為兒子所賣乃入見楚王曰臣前言某星事王言欲以修德報之今臣出道路皆言陶之富人朱公之子殺人囚楚其家多持金錢賂王左右故王非能恤楚國而赦乃以朱公子故楚王大怒曰寡人雖不德耳奈何以朱公之子故而施惠乎令論殺朱公子明日遂下赦令朱公子長男竟持其弟䘮歸至其母及邑人盡哀之唯朱公獨笑曰吾固知必殺其弟也彼非不愛其弟顧有所不能忍者也是少與我俱見苦為生難故重棄財至如少弟者生而見我富乗堅驅良逐狡兎豈知財所從來故輕棄之非所惜吝前日吾所為欲遣少子固為其能棄財故也而長者不能故卒以殺其弟事之理也無足悲者吾日夜固以望其䘮之來也趙趙奢子括自少時學兵法言兵事以天下莫能當嘗與奢言兵事不能難然不謂善括母問奢其故奢曰兵死地也而括輕易言之使趙不將即已若必將之破趙軍者必括也後趙王以括代廉頗為將悉更約束易置軍吏秦將白起絶其糧道四十餘日軍餓括自搏戰秦軍射殺括括軍敗數十萬之衆遂降秦秦悉坑之漢張敞為京兆尹弟武拜梁相是時梁王驕貴民多豪强號為難治敞問武欲何以治梁武敬憚兄謙不肯言敞使吏送至關戒吏自問武應曰馭黠馬者利其銜䇿梁國大都吏民凋敝且當以柱後惠文彈治之耳漢法冠也故號柱後惠文以纚裹鐵柱卷秦制執法服今御史服之謂之獬廌獬廌一角今冠兩角以獬廌為名耳纚即今方目紗秦時獄法吏冠柱後惠文武意欲以刑法治梁武還道之敞笑曰審如掾言武必辦治梁矣武既到官其治有迹亦能吏也丙吉為丞相子顯少為諸曹嘗從祠高廟至夕牲日乃使出取齋衣未祭一日其夕展視牲具謂之夕牲吉大怒謂其夫人曰宗廟至重而顯不敬慎亡吾爵者必顯也夫人為言然後乃已後顯為太僕與官屬大為姦利臧千餘萬帝以吉舊恩止免官奪邑薛宣子惠為彭城令宣從臨淮遷至陳留過其縣橋梁郵亭不修郵行書之舎亦如今之驛及行道館舍也宣心知惠不能留彭城數日案行舍中處置什器處安也什器為生之具也觀視園菜終不問惠以吏事惠自知治縣不稱宣意遣門下掾送宣至陳留令掾進見自從其所問宣不教戒惠吏職之意若自出其意不云惠使之言宣笑曰吏道以法令為師可問而知及能與不能自有資財何可學也衆人傳稱以宣言為然後漢馬况字長平余字聖卿員字季主援之三兄也並有才能援少有大志諸兄竒之嘗受齊詩意不能守章句乃辭况欲就邊郡田牧况曰汝大才當晚成良工不示人以樸且從所好從其所請也朱勃字叔陽年十二能誦詩書嘗候援兄况勃衣方領能矩步辭言􅈺雅援纔知書見之自失况知其意乃自酌酒慰援曰朱勃小器速成智盡此耳卒當從汝稟學勿畏也及援為將軍封侯而勃位不過縣令折像廣漢雒人家富散金帛資産周施親疏人或諌之像曰今世將衰子又不才不仁而富謂之不幸智者咸服焉及卒家無餘資諸子衰劣如其言魏賈逵字梁道河東襄陵人也自為兒童戱㺯嘗設部伍祖父習異之曰汝大必為將率口授兵法數萬言位至建威將軍令狐邵族子愚字公治為白衣時嘗有高志衆人謂愚必榮令狐氏而邵獨以為愚性倜儻不修德而願大必滅我宗愚聞邵言其心不平及邵為虎賁郞將而愚仕進已多所更歴所在有名稱愚見邵因從容言次㣲激之曰先時聞大人謂愚為不繼愚今竟云何邪邵熟視而不答也然私謂其妻子曰公治性度猶如故也以吾觀之終當敗滅但不知我久當坐之不邪將逮汝曹耳邵没之後十餘年間愚為兖州刺史果與王凌謀廢立家屬誅滅邵子華時為𢎞農郡丞以疏屬得不坐陳實子羣為兒時實嘗竒異之謂宗人父老曰此兒必興吾宗後至司空鍾毓㑹兄也司馬文王遣㑹征蜀毓宻啟文王言㑹挾術難保不可專任後㑹果謀反㑹所養兄子峻辿等下獄當伏誅故宥峻等漢晉春秋曰文王嘉其忠亮笑答毓曰若如卿言必不以及宗矣蜀龎德公從子統字士元少未有識者惟德公重之年十八使往見司馬德操德操與語既而嘆曰德公誠知人此實盛德也後為軍師中郞將諸葛亮子瞻字思逺亮出武功與兄瑾書曰瞻今已八嵗而聰慧可愛嫌其早成恐不為重器耳後至軍師將軍美聲洋溢有過其實吳諸葛瑾子恪名盛當世文帝深器異之然瑾嘗嫌之謂非保家之子每以憂戚嘆曰恪不大興吾家將大赤吾家也時大帝置節度官使典掌軍糧初用侍中偏將軍徐詳詳死將用恪恪季父亮聞之書與陸遜曰家兄年老而恪性疎今使典主糧榖糧榖軍之最要僕雖在逺竊用不安足下特為啟至尊轉之遜以白大帝即轉恪領兵鍾離駰之弟牧樓船都尉緒之子駰上計吏少與同郡謝贊吳郡顧譚齊名牧童齔時號為遲訥駰嘗謂人曰牧必勝我不可輕也時人皆以為不然牧後為前將軍假節領武陵太守卒官家無餘財士民思之張俶後主天紀中為司直中郞將以姦情發聞伏誅初俶父為㑹稽山隂縣卒知俶不良上表云若用俶為司直有罪乞不從坐皓許之俶表立彈曲二十人專糾司不法於是愛惡相攻互相謗告彈曲丞言收繫囹圄聽訟失理獄以賄成人民窮困無所措手足俶奢淫無厭取小妻三十餘人擅殺無辜衆姦並發父子俱見車裂晉王祥二子烈芬並㓜知名為祥所愛二子亦同時而亡將死烈欲還𦵏舊土芬欲留𦵏京邑祥流涕曰不忘故鄉仁也不戀本土逹也惟仁與逹吾二子有焉祥位至太保石崇字季倫苞之子少敏慧勇而有謀苞臨終分財與諸子獨不及崇其母以為言苞曰此兒雖小後自能得果至衛尉財産豐積王湛少言語初有隱德人莫能知兄弟宗族皆以為癡其父昶獨異焉後至汝南内史索綝字巨秀少有逸羣之才父靖每曰綝宗廟之器非簡札之用州縣之任不足汚吾兒也懷帝蒙塵以為驃騎大將軍左僕射衛玠字叔寳年五嵗風神秀異祖父瓘曰此兒有異於衆顧吾年老不見其成長耳玠後為太子洗馬陽裕字士倫右北平無終人少孤兄弟皆早亡單㷀獨立雖宗族無能識者惟叔父耽㓜而竒之曰此兒非惟吾門之標秀乃佐時之良器也後為段遼中軍將軍段陳敏為廣陵相時惠帝幸長安四方交争敏遂有割據江東之志其父聞之怒曰滅我門者必此兒也後與母及妻子皆伏誅王戎有人倫鑒識族弟敦眉目疎朗性簡脱有鑒裁學左氏口不言財利尤好清談時人莫知惟族兄戎異之一云敦有高名戎惡之敦每候戎輙託疾不見敦後果為逆亂又戎從弟衍字夷甫武帝聞其名問戎曰夷甫當世誰比戎曰未見其比當從古人中求耳夷甫位至太尉王衍有重名於世時人許以人倫之鑒從弟澄字平子衍尤重澄及王敦庾敳嘗為天下人士目曰阿平第一子嵩第二處仲第三子嵩庾敳字處仲王敦字澄嘗曰兄形似道而神鋒太儁衍曰誠不如卿落落穆穆然也澄繇是顯名澄為元帝諮議叅軍為王敦所殺顧和字君孝侍中衆之族子二嵗䘮父總角便有清操族叔榮雅重之曰此吾家麒麟興吾宗者必此子也時宗人球亦有令聞為州别駕榮謂之曰卿速步君孝超卿矣後至左光祿大夫儀同三司祖約元帝時為平西將軍豫州刺史與逖同母偏相親愛約異母兄光祿大夫納宻言於帝曰約内懷陵上之心抑而使之可也今顯侍左右假其權勢將為亂階矣帝不納時人亦謂納與約異生忌其寵貴故有此言朝廷因此棄納納既閒居但清談披閲文史而已及約謀逆朝野嘆納有鑒裁焉周顗字伯仁母李氏字絡秀生顗嵩謨嘗冬至置酒絡秀舉觴賜三子曰吾本渡江託足無所不謂爾等並貴列吾目前吾復何憂嵩起曰恐不如尊㫖伯仁志大而才短名重而識闇好乘人之弊此非自全之道嵩性抗直亦不容於世唯阿奴碌碌當在阿母目下耳阿奴謨小字也後果如其言荀崧字景猷羽林右監頵之子志操清純雅好文學齠齔時族曽祖顗見而竒之以為必興頵門後至右光禄大夫開府儀同三司陸曄字士光少有雅望從兄機每稱之曰我家世不乏公侯後至左光祿大夫開府儀同三司王羲之少敏悟及長辯贍以骨鯁稱深為從伯敦導所器時陳留阮裕有重名為敦主簿敦嘗謂羲之曰汝是吾家子弟當不減阮主簿裕亦目羲之與王承王悦為王氏三少羲之位至右軍將軍㑹稽内史謝𤣥封康樂縣公子瑍嗣瑍早卒靈運嗣瑍少不慧而靈運文藻豔逸𤣥嘗稱曰我尚生瑍瑍那得不生靈運桓温諸弟中冲最淹識有武幹温甚器之前秦王猛孫鎮惡以五月五日生家人以俗忌欲令出繼他宗猛見而竒之曰此非常兒昔孟嘗君惡月生而相齊是兒亦將興吾門矣故名之為鎮惡後至安西司馬征虜將軍宋劉鎮之毅之從父以毅貴歴顯位閒居京口未嘗應召嘗謂毅曰汝破吾家毅甚憚之後至衛將軍荆州刺史被誅王惠字令明㓜而夷簡為叔父司徒謐所知謝𢎞㣲東郡陽夏人武昌太守思之子童㓜時精神端審時然後言叔父混名為知人見而異之謂思曰此兒深中夙敏方成佳器有子如此足矣混風格高峻少所交納唯與族子靈運瞻曜晦𢎞微並以文義賞㑹瞻等才辭辯富𢎞微每以約言服之混特所敬貴號曰㣲子謂瞻等曰汝諸人雖才義豐辯未必皆愜衆心至於領㑹機賞言約理要故當與我共推微子嘗云阿逺剛躁負氣阿客博而無簡阿逺謂瞻字宣逺也阿客靈運小字客兒曜恃才而操持不篤晦自知而納善不周設復功濟三才終亦以此為恨至如微子吾無間然又云微子異不傷物同不害正若年造六十必至公輔羊𤣥保子戎有才氣而輕薄少行檢文帝好與𤣥保棊嘗中使至𤣥保曰今日上何召我耶戎曰金溝清泚銅池揺颺極佳光景當得劇棊𤣥保嘗嫌其輕脱云此兒必亡我家戎官至通直郞與王僧逹謗議時政賜死死後世祖引見𤣥保𤣥保謝曰臣無日磾之明以此上負帝美其言顏延之瑯琊臨沂人為光祿大夫太祖問延之卿諸子誰有卿風對曰竣得臣筆測得臣文􅎢得臣義躍得臣酒范曄少時兄晏嘗云此兒進利終破門户後至太子詹事謀反誅死果如晏言王藴字彦深小字阿益大中大夫楷之子楷人才凡劣故藴不為羣從所禮嘗懷恥慨家貧為廣德令㑹太宗初即位四方叛逆藴遂感激為將假寜朔將軍建安王休仁司徒參軍楷弟景文甚不悦論之曰阿益汝必破我門戶後果斬於秣陵市王𤣥謨㓜而不羣世父㽔有知人鑒嘗笑曰此兒氣概高亮有太尉彦雲之風後至右光祿大夫遷南豫州刺史南齊王僧䖍伯父為太保兄弟集㑹諸子孫𢎞子僧達下地跳戲僧䖍年數歳獨正坐採蠟燭珠為鳯凰𢎞曰此兒終當為長者僧䖍位至開府儀同三司劉懐珍小字道玉平原人㓜隨伯父奉伯為陳南頓二郡太守至夀陽豫州刺史趙伯符出獵百姓聚觀懷珍獨避不視奉伯異之曰此兒方興吾宗册府元龜卷八百十八
