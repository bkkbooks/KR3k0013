body:
  text: 册府元龜卷五百六宋王欽若等撰邦計部俸祿第二唐𤣥宗開元五年十月詔曰養老乞言人惟求舊尊儒尚齒風化攸先其致仕官所請物宜令所司專定一官勾當送至宅六年七月秘書少監崔涵議州縣官月料錢狀曰養賢之祿國用尤先取之齊人未為剥下何用立本息利法商求資皇運之初務革其弊託本收利以繩富家固乃一切權宜諒非經通彛典頃以州縣典吏併捉官錢收利數多破産者衆散諸編戸本少利輕人用不休時以為便付本收利患及於人然則議國事者亦當憂人為謀恤下立計天下州縣積數既多大抵皆然為害不少且五十之本七分生利一年所輸四千二百兼筭勞費不啻五千在於平人已為重賦富户既免其徭貧户則受其弊傷人刻下俱在其中未若大率羣臣通計衆户據官定料均户出資常年發賦之時每丁量加升尺以近及逺損有兼無合而籌之所增盖少時則不擾簡而易從庶乎流亡漸歸倉庫稍實則當咸出正賦罷所新加天下坦然什一而稅上下各足不其逺矣十年正月勑内外官職田除公廨田園外並官收又令有司收天下公廨錢其官人料以萬户稅錢充每月准舊分利數給是月甲子又勑王公已下視品國官及京官五品已下每月别給仗身悉停凡京司文武職事官五品已上給防閤一品九十六人二品七十二人三品四十八人四品三十二人五品二十四人六品以下給庶僕六品五人七品四人八品三人公主邑士八十人郡主六十人縣主四十人特封縣主二十四人京官任兩職者從多給凡州縣官皆有白直二品四十人三品三十二人四品二十四人五品十六人六品十人七品六人八品五人九品四人凡諸親王府屬並給士力數如白直其防閤庶僕白直士力納課者每年不過二千五百執衣元不過一千文防閤庶僕舊制季分月俸食料雜用即月分諸官應月給乙丑命有司收内外官職田以給逃還貧下戸其職田以正倉粟畝二升給之六月初置職田本非古法爰自近制是以因循事有變通應須删改其内外官所給職田子從今年九月已後並宜停給十六年十一月勑文武百官俸料錢所給物宜依時價給十八年三月勑京官職田將令准令給受其年九月御史大夫李朝隠奏請薄稅一年稅錢充本依舊令高戸及典正捉隨月收供官人料錢十九年四月勑天下諸州縣并府鎮戍官等職田四至頃畝造帳申省仍依元租價􅍟定六㪷已下者依舊定以上者不得過六㪷二十二年二月勑京官兼外州都督刺史大都督府長史俸料並宜兩給二十四年六月勑百官料錢宜令為一色都以月俸為名各據本官隨月給付其貯米宜令入祿數同申應合减折及申請時限並依常式一品三十一千月俸八千食料一千八百防閤二十千雜用一千二百文二品二十四千月俸六千食料一千五百防閤一十五千五百雜用一千文三品十七千月俸五千食料一千一百防閤一十千雜用九百文四品一十一千八百六十七文月俸四千五百食料七百文防閤六千六十七文雜用六百文五品九千二百月俸三千食料六百防閤五千雜用六百文六品五千三百月俸二千三百食料四百庶僕二千二百雜用四百文七品四千五十月俸一千七百五十食料三百五十庶僕一千六百雜用三百五十文八品二千四百七十五月俸一千三百食料三百庶僕六百二十五雜用二百五十文九品一千九百一十七月俸一千五十食料二百五十庶僕四百一十七雜用二百文二十九年二月勑外官職田委所司准例倉中受納納畢一時分付縣官亦准此三月勑京畿地狹人户殷繁計丁給田尚猶不足兼充百官苖子固難周濟其諸司官令分在都者宜令所司具作定額計應受職田並於都畿給付其應退地委採訪使與本州長官給貧下百姓其應給職田亦委採訪使與所繇長官勘會同給仍永為常式天寳元年六月勑如聞河東河北官人職田既納地租仍收桑課田樹兼稅人何以堪自今已後官人及公廨職田有桑一切不得更徵絲課二年十一月勑京官兼太守等官俸料兩給者停其外官太守兼京官除准式親王帶京官任外官副大將軍者副使知軍及政事京官兼内外官知政事據文合兼給者餘並從一處給任逐穏便三載臣欽若等曰天寳自三年已後稱載三月勑郡縣關職錢送納大府寺自今已後納當郡充員外官料錢不足即收正官料錢分若無員外官當郡分五載三月勑郡縣官人及公廨白直天下約計一載破十萬丁巳上一丁每月戍錢二百八文每至月初當䖏徵納送縣來徃數日功程在於百姓尤是重役其郡縣白直計數多少請用料錢加稅充用其應差丁充白直望請並停一免百姓艱辛二省國家丁壯六載三月户部奏諸道請實封人准長行㫖三百户已下户部給符就州請受三百戸已上附庸使送兩京大府寺賜坊給付者今縁就州請受有損於人今三百戸已下尚許彼請公私之間未免侵擾望一切送至兩京就此給付即公私省便侵損無繇又准戸部式節文諸食封人身殁已後所得封物隨其男數為分承嫡者加一分至𤣥孫即不在分限其封緫入承嫡房一依上法為分者如此則𤣥孫請物比於嫡男計數之間多較數倍舉輕明重理實未通望請至𤣥孫已下准𤣥孫直下一房許依令式餘並請停惟享祭一分百代不易自無爭競永賜勲庸無替十一載十二月勑諸郡員外官無闕職處均取正官料給錢數不定頗為勞煩自今已後闕料官收員外官依式取官錢准給十二載十月勑兩京百官職田承前佃人自送道路或逺勞費頗多自今已後其職田去城五十里内者依舊令佃人自送入城自餘並限十月内便於所管縣并脚價貯納其脚價五十里外每㪷各徵二文一百里外不得過三文並令百官差本司人請受十四載八月制曰王制下士視上農周政庶人倍祿者衣食既足則廉耻乃知至如資用靡充或貪求不已敗名冒法實此之繇輦轂之下尤難取給其在西京文武九品已上正員官既親於職務可謂勤心自今後每月給俸食雜用防閤庶僕等宜十分率加二分其同正員官加一分仍為常式肅宗至德二年四月勑天下都府及縣官祿白直品子等課從今載正月一日以後並量給一半事平之後當續支遣乾元元年外官給半料與職田京官不給料至德已後内外官無料錢至是給之仍勑度支使量閑劇司給手力課員外官一切無料二年九月詔京官比無俸料桂玉之費將何以堪宜取綘州新錢給冬季料即仰所繇申請計㑹支給且艱難之際家國是同頃者急在軍戎所以久虧祿俸眷言憂恤常媿于懐今甫及授衣略為賙給庶資時要宜悉朕懐三年四月工部尚書李遵奏中外官職田者苖子准令依租分法並人新人水陸田十一月一日已後上者子並入官草准式當司官分其䫫遷改人乃有一年之中數處合得者按令云職分陸田限三月三十日已前水田限四月三十日夏田限九月三十日已後上者人前人已前上者人後人即是各以耕種時在職者為王此職既闕本是公田耕耘收刈已皆畢功新人方來何理領受請自今後水陸田並限六月三十日宿麥限十二月三十日春麥限三月三十日已前上者人新已後上者並草並人官若其年己得前任苖子者草粟稻麥並不重受亦入官上元元年十月勑京官職田准式並合佃人輸送至京中間楊國忠奏去城五十里外貯納縣倉本官自差人請受緣是暫時寄貯所繇觸途乾没就中閑司尤被抑屈公私不便因循累年自今已後京兆河南府諸縣並令依舊送京輸納本官如邀頡停留并輙受加耗請准所費及剰數計贓以枉法論至死者加役流代宗廣德二年正月稅天下地畝青苗錢給百官俸料起七月給十月宰臣等奏减百司職田租之半以助軍糧從之永泰元年十月以師旅薦興急於饋運百寮上表請納職田充軍糧許之二年正月自今已後子孫襲實封宜减半永為常式三月勑應請封家三分給二待兵革稍寧即當全給五月諸道税地錢使殿中侍御史韋光裔等自諸道使還初肅宗乾元已來屬天下用兵京師百官俸錢减耗即帝位推恩庶寮下議公卿或以稅畝有苖者公私咸濟乃分遣憲官稅天下地青苖錢以充百司課料至是得錢四百九十萬貫仍以御史大夫為稅地錢物使歲以為常均給百官十一月詔曰京諸司官等自艱難已來不請祿料職田苖子又充軍粮頗聞艱辛須使均濟其諸州府縣官及折衝府官職田據苖子多少三分每年宜取一分依當處時價廽市輕貨數内破脚差綱部領送上都納青苖錢庫其闕官職田據數盡送仍青苖錢與本道節度觀察都防禦等使會切勾當從今年職田並依此數徵收發遣其送物綱典計數准輕貨綱典例處分大厯二年正月詔京兆府及畿縣官職田宜令准外州府縣官例三分取一分十月减京官職田錢一分充軍糧二分給大官三年十一月加廊下百官厨料増舊五分之一是年通計京城諸司每月給手力資錢凡四萬七千五百四十六貫四十八並以天下青苖錢充初以常賦不給乃稅人墾田畆十有五錢資用窘急不暇成熟候苖青即征之故謂之青苖錢主其任者為青苖使六年三月勑軍器公廨本錢三千貫文放在人上取利充使以下食料紙筆宜於數内收一千貫文别納店舖課錢添公廨收利雜用十二年四月度支奏給京百司文武官及京兆府縣官每月料錢太師太傅太保太尉司徒司空侍中中書令每月各一百二十貫文中書門下侍郎各一百貫文東宫三太左右僕射各八十貫文東宫三少各七十貫文六尚書御史大夫太常卿各六十貫文常侍宗正卿太子詹事國子祭酒各五十貫文左右丞及諸司侍郎給事舍人中丞賔客殿中監秘書監司農等卿將作等監各四十五貫文太子左右庶子太常少卿各四十貫文課議諸司少卿少監各三十五貫文國子司業内侍東宫三卿各三十貫文郎中侍御史司天監少詹事諸王傅國子博士諭德中允中舎殿中秘書太常宗正丞各二十五貫文殿中侍御史著作郎大理正都水使者緫監内常侍給事中各二十貫文員外郎通事舎人起居王府長史各十八貫文監察御史臺主簿補闕王府司馬司天少監太子典内太常博士主簿宗正主簿門下錄事中書主簿各十五貫文拾遺司議太子秘書著作佐郎國子大學四門廣文等博士大理司直詹事府及諸寺監丞謁者監中書門下主事各十二貫文洗馬賛善諸寺監主簿詹事府司直各一十貫文評事各八貫文諸較正各六貫文諸奉御九成宫緫監諸王諮議友諸陵令各九貫二百文城門符寳國子助教六局郎王府掾屬太常侍醫文學錄事參軍主簿記室諸衞及六軍長史兩市令諸副緫監武庫署令太公廟令各五貫三百文大子通事舎人東宫三寺丞國子太學廣文助教内坊丞諸直長内寺伯千牛衞及諸率府長史諸陵丞諸陵署諸王府判司司竹溫泉監尚書都事都水及諸揔監丞司天臺丞太子侍醫諸司上局署令及王府國令苑四靣副監公主邑司令各四貫一百一十六文國子四門助教律醫學博士協律郎内謁者諸衞六軍左右衞率府等衞佐諸王府參軍大農都省兵吏禮考功主事春坊錄事司竹副監諸司中局署令都水主簿諸司上局署及監廟邑司丞司天臺靈臺郎保章挈壺正太常針醫及醫監尚藥局司醫各四千四百七十五文大祝奉禮省中諸行主事門下典儀御史臺殿中秘書内侍省春坊詹事府主事諸寺監諸衞六軍諸司錄事諸司中局署丞及大理獄丞諸司府作監事殿諸司監錄事殿中省醫佐食醫奉輦司庫司廪奉乘鴻臚寺掌客司儀太僕寺主乘内坊典直司天臺司辰司歴監内侍省宫教博士東宫三等主簿太常大樂鼔吹丞醫正