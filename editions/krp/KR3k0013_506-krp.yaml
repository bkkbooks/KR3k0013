他用之外嘗貯僅二百萬貫國計頼焉八月勅准田令永業田職事官從一品郡王各五十頃國公若職事官正二品各四十頃郡公若職事官從二品各三十五頃縣公若職事官從三品各二十頃侯若職事官正四品各十四頃伯若職事官從四品各十一頃五年四月以大子少傅兼禮部尚書蕭昕為工部尚書前大子少詹事韋建為秘書監並致仕仍給半祿料後授致仕官者並宜准此舊例致仕官給半祿及賜帛其俸料悉絶帝念歸老之臣時命賜其半焉致仕官給半祿料自昕等始也十二月詔郡縣主聓有正員官停者郡主每季給錢七十千縣主每季給五十千郡縣主聓已亡殁者亦准此支給先是其主聓或官罷者頗不自給帝務於敦睦故有是命七年三月户部奏伏以周漢故事有功即加地有罪即奪國既明賞罰方申沮勸其犯除名以上罪有實封准法合除比來因循兼不申舉自今以後應實封人或縁罪犯其堂省及本軍本使本貫奏狀請令並摽實封户數本犯州名同奏勑下户部以為慿㨿其犯法罪三分望奪一分流罪奪一半除名以上罪即准法悉除並以本犯條論不在减贖之限其奉特勑貶謫驗制詞内所犯無正條者伏請准流罪奪一半勑㫖依奏十一月詔郡主聓檢校四品京官者月給三十千歲給祿粟百二十石縣主聓簡較五品京官者給俸二十千祿粟百石其正官欲從舉選者聽之如登朝不用此制八年七月减山南西道州縣官俸八月戸部奏准貞元七年三月二十日勑節文比來食實封人多不依令式皆身殁之後子孫自申請傳襲伏請自今以後并今日以前應食實封人並一年内准式具合襲子孫官品年名并母氏嫡庶於本貫陳牒如無本貫即於食封人本任本使申牒如合襲人有罪疾及身死者亦限一周年内申牒請立以次合襲人仍具家口陳牒請附籍帳本貫勘責當家及近親如實是嫡長即與責保准式附貫然後申省到後即取文武職事三品正員一人充保勑㫖宜依十年二月詔曰君臣之際義莫重焉每聞薨殂深用惻悼宜厚哀榮之禮以申終始之恩文武朝臣有薨卒者自今以後其月俸料宜全給仍更准本官一月俸料以為賻贈若諸司三品已上官及尚書省四品官仍令有司舉舊令聞奏行弔祭之禮務從優備用稱朕懐初左庶子雷咸以是月朔卒有司以故事計其月俸以月數給之帝聞之故有是命以廣恩澤無幾有致仕官卒者有司以官雖致仕而朝朔望請悉同正官卒者給賻從之十一年八月屯田奏諸州府送納内外文武官職田及公廨田四至白簿等前件簿書准天寳十四年八月十二日勑每年六月十三日勘造申省如建本判官牒吏部先用闕本典准法科處者伏以地叚佃户並無改移随年造簿實有勞費今請令諸州府及畿内縣三年一送違限者准勑科䖏勑㫖每年造簿事乃近煩三年一申又為大簡如外官並須勘造切慮因此擾人宜令應管京官職田等州府所造文簿二年一送餘依十二年四月禮部尚書李齊運奏當司本錢至少厨食闕絶請准秘書省大理寺例取户部闕職官錢二千貫文充本收利以助公厨可之是年御史中丞王顔奏簡勘足數十王厨二十貫十六正宅三百九十二貫八百二十五文門下省三千九百七十貫四十文中書省五千九百九十八貫集賢院四千四百六十八貫八百文崇𤣥館五百貫文𢎞文館七百二十六貫二百文太清宫一千貫文史館一千三百一十貫四百文尚書都省一萬二百一十五貫二百三十八文吏部尚書銓三千一百八十二貫二十文東銓二千四百四十五貫三百一十文西銓二千四百三十三貫六百六十一文南曹五百八十貫文甲庫二百八十四貫六十五文功狀院二千五百貫文流外銓三百貫文急畵五百貫文主事五百貫文白院五千六百二十三貫文考功一千五百二十六貫一百九十五文司勲二百二十八貫文兵部六千五百二十貫五百五十二文戸部六千貫五百五十六文工倉部四百七十七貫三百三十文兵部三百貫文刑部六十貫文禮部三千五百二十八貫五百三十七文工部四千三百二十貫九百五十九文御史臺一萬八千五百九十一貫文東都御史臺五十貫文西京觀察使五千四十六貫八百五文三衞使五百貫文軍器使二千一百九十一貫一百三十文監食使七十四貫五十文秘書省四千七十貫文殿中省二百三十八貫五百文太常寺一萬四千二百五十四貫八百文太常禮院一千七百貫文光祿寺一百五十六十六貫文衞尉寺一千二百四貫八百七文宗正寺一千八百八十四貫文大理寺五千九十二貫八百文太僕寺三千貫文鴻臚寺六千六百五貫一百二十九文司農寺五千六百五貫二百八十二文大倉諸色共七百八十七貫四百三十四文大府寺二千二百八十一貫六百三文左藏庫將作監七百貫文少府監六百七十八貫七百文中尚七百七十貫文國子監三千三百八十二貫三百六十文詹事府一千七百一十六貫七百三十二文家令寺七百八十七貫九百文僕寺四百貫文左春坊一百八十四貫六百文右春坊二百八十貫文崇文館八百一十貫文司天臺二百八十貫文皇城留守一千二百三十四貫八百文右金吾衞九千貫文右金吾引駕仗三千三百六十九貫文右街使一千八百六十貫八百三十文左金吾衞九千九貫五百文左金吾引駕仗六千一百二十貫文左街使三千九百一十六貫三百八十文緫監三千貫文京兆府四萬八千八百八十九貫二百二十四文京兆府御逓院二千五百貫文十四年六月判度支于䪹請收百官闕職田以贍軍須從之十五年十二月詔今年十月三日詔權减諸道刺史判軍事料及專知勾當加手力課并减縣官手力門倉獄子園子館鐸廨宇等錢宜一切却仍舊初獻計者言收諸道軍事錢及手力資課等當得百數十萬貫可以助