body:
  text: 册府元龜卷八百四十宋王欽若等撰總録部文章第四後周薛憕字景猷初仕西魏文帝為中書侍郎大統四年宣光清徽殿初成憕為之頌又文帝作二歌憕各為頌王褒博覽史傳能屬文初仕梁元帝為僕射江陵未陷前褒作燕歌行妙盡闗塞寒苦之状元帝及諸文士並和之而競為悽切之詞至此方騐焉唐瑾為司中大夫兼内史所著賦碑誄二十餘萬言薛寘幼覽墳籍好屬文所著文章二十餘卷行於世位至驃騎大将軍封開府儀同三司栁虬字仲盤博渉子史雅好屬文為中書侍郎修起居注時人論文體者有古今之異虬又以為時有今古非文有今古乃為文質論虬有文章數十篇行於世盧柔為開府儀同三司卒於位所作詩頌碑銘檄表啓行於世者數十篇宗懔少聰慧博有才藻位至車騎大将軍儀同三司有集二十卷行於世劉璠字寳義篤志好學兼善文筆終為黄門侍郎儀同三司嘗卧疾居家對雪感興乃作雪賦以遂志有集二十卷行於世呂思禮好學有文才長於論難所為筆誄表頌並傳於世位至都官尚書庾信幼而俊邁聰敏絶倫初在梁事昭明太子為抄撰學士既有盛才文並綺艶故世號為徐庾體焉當時後進競相模範毎有一文京都莫不傳誦自梁入周位望通顯嘗有鄉闗之思乃作哀江南賦以致其意後為司宗中大夫明帝雅好文學信特蒙惠禮羣公碑誌多相託焉惟王褒頗與信埒自餘文人莫有及者顔之儀博渉羣書好為辭賦嘗獻神州頌辭致雅贍梁元帝手勅報曰枚乗二葉俱得遊梁應貞兩世並稱文學我求才子鯁慰哀深江陵平之儀随例遷長安後為集州刺史有文集十卷行於世栁慶字更興博渉羣書初仕魏孝武為尚書都官郎中時北雍州獻白鹿羣臣欲草表陳賀尚書蘇綽謂慶曰近代以來文章華靡逮於江左彌復輕薄雒陽後進祖述不已相公柄民軌物君職典文房宜製此表以革前弊慶操筆立成辭兼文質綽讀而笑曰枳橘猶自移况才子也栁機博渉羣書辭彩雅贍有文集行於世位至御史下大夫蘇亮字景順少通敏博學好屬文所著文筆數十篇頗行於世位至侍中薛慎能屬文善草書為藩部大夫有文集頗為世所傳李旭解屬文武帝時為大将軍開府儀同三司旭自太祖世已當樞要兵馬處分專以委之詔冊文筆皆旭所作也旭嘗曰文章之事不足流於後世經邦治務庶及古人故所作文筆了無藁草韋夐髙尚不仕時武帝以佛道儒三教不同詔夐辨其優劣夐以三教雖殊同歸於善其道似有深淺其致理若無等級著三教序奏之帝覽而稱善夐少愛文史留情著述手自抄録數十萬言晩節虚静惟以體道㑹真為務舊所製述咸削其藁故文筆雖多並不存檀翥字鳯翔好讀書善屬文為殿中侍御史臺中表奏皆翥為之隋虞世基初仕陳為尚書左丞陳主嘗於幕府山較獵令世基作講武賦於座奏之陳主嘉之賜馬一疋陳滅歸國為通直郎内史省嘗為五言詩以見意情理凄切世以為工作者莫不吟咏盧愷魏中書監柔之子也為禮部大夫李穆攻拔軹闗拍崖山鎮命愷作露布帝讀之大悦曰盧愷文章大進荀景倩故是令君之子許善心幼聰明有思理解屬文髙祖時為虞部侍郎開皇十六年有神雀降於含章閣髙祖召百官賜讌告以此瑞善心於座請紙筆製神雀頌頌成奏之髙帝甚悦曰我見神雀共皇后觀之今旦召公入適述此事善心於座始知即能成頌文不加㸃筆不停毫嘗聞此言今見其事因賜物二百叚孫萬夀博渉子史善屬文滕穆王瓉引為文學坐衣冠不整配防江南行軍總管宇文述召典軍書萬夀鬱鬱不得志為五言詩贈京邑知友盛為當時之所吟誦天下好事者書壁而翫之王貞少聰敏善屬文詞開皇中舉秀才授縣尉非其道也於是謝病於家齊王暕鎮江都以書召之又索文集貞啓謝上集云十三卷復上江都賦李徳林善屬文辭覈而理暢魏収嘗對髙隆之謂其父曰賢子文筆終當繼温子昇隆之大笑曰魏常侍殊已嫉賢何不近比老彭乃逺求温子後北齊任城王諧薦徳林於尚書令楊遵彦楊遵彦即令徳林製讓尚書令表援筆立成文不加㸃因大相賞異以示吏部郎中陸卬云已見其文筆浩浩如黄河東注比來所見後生制作涓澮之流耳卬仍命其子乂與徳林周旋戒曰汝無事宜師此人以為模楷齊平為髙祖丞相府從事内中郎禪代之際其相國揔百揆九錫殊禮詔策牋表璽書皆徳林之辭也髙祖登位為内令史卒既少有才名重以貴顯凡製文章動行於世或有不知者謂古人焉初撰奉思賦一篇世稱其麗又徳林以梁士彦及元諧之徒頗有逆意大江之南抗衡上國乃著天命論上之所撰文集勒成八十卷遭亂亡失見二十卷行於世潘徽性聰敏善屬文為秦孝王俊學士從俊朝京師在塗令徽於馬上為賦行一驛而成名曰述恩賦俊覽而善之又為述江都集禮序杜正𤣥自八世祖曼至正𤣥世以文學相授僕射楊素負才傲物正𤣥抗辭酬對無所屈撓素不悦乆之㑹林邑獻白鸚鵡素促召正𤣥使者相望及至即令作賦正𤣥倉卒之際援筆成章素見文不加㸃始異之因令更擬諸雜文筆十有餘條又皆立成而詞理華贍素乃嘆曰此真秀才吾不及也祖君彦言詞訥澁有才學大業末為李宻所得署為記室參軍軍書羽檄皆成於其手楊素為尚書令嘗以五言詩七百字贈畨州刺史薛道衡氣調宏拔風韻秀上亦為一時之盛作未㡬而卒道衡嘆曰人之将死其言也善豈若是乎有集十卷牛宏在周起家為納言上士嘗專文翰甚有稱善以大業六年卒加右光禄大夫贈儀同三司有文集十二卷行於世何妥為龍州刺史箴勒於州門外有文集十卷並行於世王頍字景文解綴文善談論有文集十卷官至國子博士薛孺清貞孤介不交流俗渉歴經史有才思雖不為大夫所有詩詠詞致清逺為襄城郡掾卒官諸葛穎能屬文煬帝時為著作郎甚見親倖有集二十卷常得志博學善屬文官至秦王記室及王薨過故宮為五言詩詞理悲壮甚為時人所重復為兄弟論義理可稱王胄字承基為著作佐郎以文詞為煬帝所重帝自東都遷京師賜天下大酺因為五言詩詔胄和之帝覽而善之因謂侍臣曰氣髙致逺歸之於胄詞清體潤其在世基意宻理新推庾自直過此者未可以言詩也帝所有篇什令繼和庾自直少好學大業初為著作佐郎自直解屬文於五言詩尤善性恭慎不妄交遊時為煬帝所愛帝有篇章必先示自直令其詆訶自直所難帝輙改之或至於再三俟其稱善然後方出其見親禮如此薛道衡為尚書左外兵郎陳使傅繹聘齊以道衡兼主客郎接對之繹贈詩五十韻道衡和之南北稱美魏収曰傅繹所謂以蚓投魚耳道衡位至司𨽻大夫有集七十卷薛師古為安城尉時薛道衡為襄州總管與其祖有舊又悦其才有所綴文帝嘗使其掎摭利病甚親昵之宇文㢸音弼博學多通為禮部尚書所著詞賦二十餘萬言虞綽字士裕博學有俊才尤工草𨽻陳左衛将軍傅繹有盛名於世見綽詞賦歎謂人曰虞郎之文無以尚也為著作佐郎從煬帝征遼東帝舎臨海顧見大鳥異之詔綽為銘帝覽而善之命有司勒於海上栁𧦬少聰敏解屬文為晉王諮議參軍王朝京作歸籓賦命𧦬為序詞甚典初王屬文效庾信體及見𧦬後文體遂變𧦬位至秘書監有集十卷髙搆字孝基有名於時河東薛道衡才髙當世毎稱搆有清鑒所為文筆必先以草呈搆有所詆訶道衡未嘗不嗟伏位至吏部侍郎杜正臧字為善好學善屬文弱冠舉秀才授純州行參軍歴下邑正臧著碑誄銘頌詩賦百餘篇又著文章體式大為後進所寳時人號為文軌乃至海外髙麗百濟亦共傳習稱為杜家新書唐髙士亷風調温雅屬詞清潤隋司𨽻大夫薛道衡起居舎人崔祖濬並稱先逹與士亷為忘年之好毎因事隟多賦篇章繇是公卿藉甚位至尚書右僕射同中書門下平章事禇亮初在陳年十八詣僕射徐陵與商確文章陵毎嘆異後主聞之召見時江揔及諸詞人咸在詔亮賦詩合坐推善國初為宏文舘學士亮夲以文翰知名毎有新詩好事之人傳寫信宿遍於京邑虞世南善屬文嘗祖述徐陵陵亦言世南得已之意世南為秘書少監上聖徳詞論多不載康國獻獅子詔世南為之賦命編之東觀袁朗勤學好屬文初在陳為秘書郎嘗製千字詩當時以為盛作後主聞而召入禁中使為月賦朗染翰立成後主曰此賦謝希逸不能獨美於前矣又使為芝草嘉蓮二頌深見優賞歸朝為給事中卒有文集十卷庾抱初在隋為延州參軍後三嵗調吏部尚書牛宏知其有學術給筆札令自序援翰便成宏甚竒之後補元徳太子學士㑹皇孫載誕太子宴賔客召於坐獻嫡皇孫頌深被嗟賞謝偃為魏王府功曹偃嘗為塵影二賦其詞甚工太宗聞而召見自製賦序言區寓乂安功徳茂盛令其為賦偃奉詔撰成名曰述聖賦賜綵數十疋偃又獻推皇誡徳賦以申諷諫時李百藥工為五言詩而偃善作賦時人稱為李詩謝賦焉張藴博渉書傳善綴文自幽州總管府記室直中書省太宗初即位上大寳箴以諷李百藥七嵗能屬文隋大業中授桂州司馬所經名川美境必制篇章莫不藻麗清新為當時所諷誦貞觀十一年以宗正卿致仕太宗嘗製帝京篇命百藥並作歎其工手詔曰卿何其身之老而才之壮齒之宿而意之新乎百藥藻思沉鬱尤長於五言詩雖樵童牧䜿亦皆唫諷有集三十卷蕭瑀字時文梁明帝之子也姊為隋晉王妃從入長安聚學屬文帝觀劉孝標辨命論惡其傷先王之教述性命之理乃作非辨命論以釋之大㫖以為人禀天地氣生孰云非命然吉凶禍福亦因人而有若一之於命其敝已甚時晉府學士栁顧言諸葛穎稱之曰自孝標後數十年間言性命之理者莫能詆詰今蕭君此論足療劉子膏盲瑀太宗時位至太子太保同中書門下岑文本為秘書郎直秘書省太宗行藉田之禮文本上藉田頌及元日臨軒宴百僚文本復上三元頌其辭甚美劉子翼以文學知名貞觀中為著作郎宏文舘學士有集二十卷杜正倫善屬文貞觀初置文學舘尚書左丞魏徴表薦正倫以為古今難匹遂擢授兵部員外累遷中書令有集十卷行於代張昌齡弱冠以文辭知名貞觀二十一年翠㣲宮成詣闕獻頌太宗召見試作息兵詔草俄頃而就太宗甚悦乃勅於通事舎人裏供奉後卒於襄州司戸有文集三十卷行於代元萬頃善屬文起家拜通事舎人從李勣征髙麗為遼東道管記時别帥馮本以水軍援禆将郭待封船破失期待封欲作書與勣恐髙麗知其救兵不至乗危迫之乃令萬頃作離合詩贈勣李義府瀛州饒陽人也初應進士舉劉洎馬周薦之太宗令詠烏義府援筆為詩曰上林無限樹不借一枝棲太宗喜曰當借卿全樹何一枝也尋除監察御史張文宗為亳州刺史髙宗永徽初表獻太宗文皇帝頌優制褒美賜絹百匹富嘉謨舉進士為晉陽尉與新安呉少㣲友善同官先是文士撰碑頌皆以徐庾為宗氣調漸劣嘉謨與少㣲屬辭皆經典為本時所欽慕之文體一變稱為呉富體嘉謨作䨇龍泉頌千蠋谷頌少㣲撰崇福寺鐘銘詞最髙雅作者推重嘉謨既卒少㣲哭而賦詩尋亦卒李安期百藥之子也七嵗解屬文龍朔中為司列少常伯受詔為東封朝覲壇碑文崔行功為司文郎中當時朝廷大手筆多是行功及蘭臺侍郎李懐儼之詞有集六十卷裴遵慶初登省所嘗著王政記述今古理體識者見之知有公輔之量位至尚書左僕射上官儀渉獵經史善屬文龍朔中為宏文舘學士工於五言詩好以綺錯婉媚為本當時多有效其體者時人謂上官體崔液湜之子也尤工五言之作湜嘗嗟賞之曰海子我家之神駒也海子即液小名官至殿中侍御史坐兄配流逃匿於郢州胡履靈之家作幽征賦以見意詞甚典麗遇赦還道病卒友人裴耀卿纂其遺文為集十卷王勃字子安六嵗善屬文未弱冠應幽素舉及第乾封初詣闕上宸遊東岳頌時東都初造乾元殿勃又上乾元殿頌沛王賢聞其名召為沛府修撰甚愛重之諸王鬭鷄互有勝負勃戲為檄英王鷄文勃後以罪除名往交趾省父道出江中為採蓮賦以見意其辭甚美勃毎有制作時人咸諷詠之著有文集三十卷楊炯華州華隂人博學善屬文為盈川令如意元年十月望日宮中出盂蘭盆分送佛寺則天御雒城南門與百寮觀之炯獻盂蘭盆賦詞甚雅麗少與絳州王勃范陽盧炤鄰東野駱賔王皆以文詞知名海内稱為王楊盧駱亦號為四傑炯聞之謂人曰吾愧在盧前恥居王後當時議亦以為然崔融李嶠及張説皆為一時宗匠崔李嘗曰王勃文章宏逸有絶塵之跡固非常流所及炯與炤隣則可企而至盈川之文如懸河注水酌之不竭既優於盧亦不減王恥居王後則然愧在盧前為誤矣盧炤隣博學善屬文為新都尉以疾居陽翟之具茨山著釋疾文五悲等詞頗有騷人之風甚為文士所重有文集二十卷駱賔王善屬文於五言詩尤妙為長安主簿坐職左遷郄雲卿集其文為十卷麴昭祖為司膳卿頗以詩詠流譽有文集二十卷劉知㡬為懐州獲嘉縣主簿則天朝官爵易得而法網嘗嚴故人競為趨進而多陷刑戮知㡬又著思慎賦以刺時且以見志鳯閣侍郎蘇味道李嶠見之相顧而歎曰陸機豪士所不及也當今防身要道盡在此矣員半千為右衛長史顯福門待制則天封中岳半千撰封禪四壇碑十二首張鷟字文成自長安尉遷鴻臚丞凡四參選判策為銓府之最員外郎員半千謂人曰張子之文如青銅錢萬選萬中未聞退時時流重之目為青錢學士後為司門員外郎鷟下筆敏速著述尤多言頗詼諧是時天下知名無賢不肖皆記誦其文天后朝中使馬仙童陷黙啜黙啜謂仙童曰張文成在否曰近自御史貶官黙啜曰國有此人而不用漢無能為也新羅日本東夷諸蕃尤重其文毎遣使入朝必重出金貝以購其文其才名逺播如此孔紹安少以文辭知名為秘書監因侍宴應詔詠石榴詩曰只為時來晚花開不及春時人稱之蘇味道初為裴行儉征突厥管記孝敬皇帝妃父裴居道再登左金吾将軍訪當時才子為謝表託於味道援筆而成詞理清宻盛傳於世朱敬則為左補闕嘗採魏晉已來君臣成敗之事著十代興亡論十卷為當代所重有集十卷行於世崔融為國子司業兼修國史為文典麗當時罕有其比文集六十卷傳於代杜審言雅善五言詩為雒陽丞坐事貶授吉州司戸參軍又與州寮不恊司馬周季重與員外司戸郭若訥共搆審言罪状繋獄将因事殺之既而季重等於府中酣讌審言子并年十三嵗懐刃以撃之季重中傷而死并亦為左右所殺季重臨死曰吾不知杜審言有孝子郭若訥誤我至此審言因此免官還東都自為文祭并後則天召見審言将加擢用問曰卿歡喜否審言蹈舞謝恩因令作歡喜詩甚見嘉賞終修文舘直學士有文集二十卷劉允濟為左史兼直宏文舘垂拱四年明堂初成允濟上明堂賦天后甚嘉歎之手製褒美拜著作郎宋之問弱冠知名尤善於五言詩當時無出其右為尚方監丞左奉宸内供奉則天幸雒南龍門令從官賦詩左史東方虬詩先成則天以錦袍賜之及之問詩成則天稱其詞愈髙奪虬袍以賞閻朝隱文章雖無風雅之體而善搆甚竒為時人所賞累遷給事中陳子昻苦節讀書尤善屬文初為感遇詩三十首京兆司功王適見而驚曰此子必為天下文宗後為武攸宜管記文翰皆委之有文集十卷友人黄門侍郎盧蔵用為之序韋承慶為鳯閣侍郎同鳯閣鸞臺平章事兼修國史中宗神龍初坐附推張易之弟昌宗失實配流嶺表時易之等既伏誅承慶去巾解帶而待罪時欲草赦書衆議以為無如承慶者乃召承慶為之承慶神色不撓援筆而成詞甚典美當時咸歎服之承慶嘗以人用心多擾濁浮躁罕詣冲和之境遂著靈臺賦以廣其志盧蔵用尚書承慶之族有才藝早知名睿宗朝為尚書左丞有集二十卷沈佺期善屬文尤長五言之作與宋之問齊名時人稱為沈宋位至太子詹事有集十卷弟佺交及子亦以文詞知名李適為工部侍郎時天台道士司馬承禎被徴至京師及還適贈詩叙其髙尚之致其詞甚美當時朝廷之士無不屬和凡百餘人徐彦伯編而叙之謂之白雲記許景先為中書舎人以文翰見稱中書令張説嘗稱曰許舎人之文雖無峻鋒激流斬絶之勢然屬詞豐美得中和之氣亦一時之秀李華為吏部員外郎頗善屬文與蘭陵蕭穎士友善華進士時著含元殿賦萬餘言穎士見而賞之曰景福之上靈光之下華文體温麗少宏傑之氣穎士詞鋒俊發華自以所業過之疑其詆訶乃為上古戰塲文燻汙之如故物置於佛書之閣華與穎士因閲佛書得之華謂之曰此文何如穎士曰可矣華曰當代秉筆者誰及於此穎士曰君稍精思便可及此華愕然華著論言龜卜可廢通人賞其言又為魯山令元徳秀墓碑顔真卿書李陽氷篆額後人爭摸寫之號為四絶碑蕭穎士登進士第有盛名李林甫採其名欲拔用之乃召見時穎士寓廣陵居母喪即縗麻而詣京師徑謁林甫於政事省林甫素不識遽見縗麻大惡之即令去穎士大怒乃為伐櫻桃賦以刺之王仲舒嗜學工文為職方郎中知制誥仲舒文思温雅制誥所出人皆傳寫徐安貞尤善五言詩為中書舎人集賢院學士𤣥宗屬文作手詔多命安貞視草甚承恩顧累遷中書侍郎王翰為并州長史張嘉貞竒其才禮接甚厚翰感之撰樂府詞以叙情有文集十卷李邕早擅才名尤長碑頌雖貶職在外中朝衣冠及天下寺觀多齎金帛往求其文前後所製數百篇受納饋遺亦至鉅萬時議以為自古鬻文獲財未有如邕者邕歴汲郡二太守姦贓事發誅有文集七十卷其張韓公行状洪州放生池碑批韋巨源諡議文士推重之王維有俊才尤工五言詩獨步於當時染翰之後人皆諷誦位至尚書右丞杜甫天寳末獻三大禮賦𤣥宗竒之召試文章授京兆府兵曹參軍甫與李白齊名而白自負文格放逹譏甫齷齪有文集六十卷熊廷景為岐王文學有五色鸚鵡能言育於宮中𤣥宗令左右試牽御衣鳥輙嗔目叱咤廷景因獻鸚鵡篇以賛其事帝以鳥及廷景詩示百寮尚書左丞相張説上表賀曰伏見天㤙以靈異鸚鵡及熊廷景所述篇出示朝列臣按海南異物志有時樂鳥鳴皆曰太平天下有道則見臣騐其圖丹首紅臆朱冠緑翼與此鸚鵡無異而心聰性辯䕶主報㤙故非常品凡禽寳瑞經所謂時樂鳥也廷景雖叙其事未正其名望編國史以彰聖瑞許之王昌齡為文緒㣲而思清為汜水縣尉貶斥而卒有文集五卷賈至為中書舎人禄山之亂從上皇幸蜀時肅宗即位於靈武上皇遣至為傳位册文上皇覽之歎曰昔先帝遜位於朕册文即卿父所為今朕以神器大寳付儲君卿又當演誥累朝盛典出卿父子之手可謂繼美矣册府元龜卷八百四十
