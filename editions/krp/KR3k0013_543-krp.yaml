body:
  text: 冊府元龜卷五百四十三宋王欽若等撰諫諍部直諌第十唐禇遂良為起居郎貞觀十五年詔有事㤗山先幸雒陽有星孛于太微犯郎位遂良言於太宗曰陛下撥亂反正功超前烈將告成東嶽天下幸甚而行至雒陽彗星輒見此或有所未允合者也且漢武優柔數年始行岱禮臣愚伏願詳擇太宗深然之下詔罷封禪之事其年遷諌議大夫太宗毎月給魏王㤗料物有踰於皇太子遂良上䟽諌曰昔聖人制禮尊嫡卑庶謂之儲君道亞霄極其為崇重用物不計泉貨財帛與王者共之庶子體卑不得為例所以塞嫌疑之漸除禍亂之源而先王必本人情然後制法知有國家必有嫡庶然庶子雖愛不得超越嫡子正體特湏尊崇如當親者踈當尊者卑則佞巧之姦乘機而動私恩害公或至亂國伏惟陛下功超䆳古道冠百王發號施令為世作法一日萬幾或未盡善臣職在諌諍無容静黙伏見儲君料物翻少魏王朝野見聞不以為是傳曰臣聞愛子教之以義方忠孝恭儉義方之謂昔漢竇太后及景帝遂驕恣梁孝王封四十餘城苑方三百里大營宫室複道彌望積財鉅萬計出入警蹕小不得意發病死宣帝以驕恣淮陽憲王幾至於敗輔以退譲之臣僅乃獲免且魏王既新出閣伏願常存禮則言提其耳且示儉節自可在後月加歳増妙擇師傅示其成敗既敦之以謙儉又勸之以文學惟忠惟孝因而奬之道徳齊禮乃為良噐此所謂聖人之教不肅而成者也太宗納其言遂良後為太子賔客時薛延陁遣使請婚太宗許以女妻之納其財聘既而不與遂良上䟽曰臣聞信為國本百姓所歸是以文王許枯骨而不違仲尼寧去食而存信延陁曩歳廼一斥候耳值神兵北指蕩平沙塞狼山瀚海萬里蕭條陛下加兵諸外而恩起於内以為餘冦奔波湏立酋長璽書皷纛立為可汗其懐恩光仰天無極而餘方戎狄莫不聞知以共沐和風同飱恩信頃者頻年遣使請婚大國陛下復降洪私許其姻媾於是報吐蕃告思摩示中國五尺童子人皆知之於是御幸北門受其獻食於時百僚端笏戎夷左袵䖍奉歡宴皆承徳音口歌手舞樂以終日百官㑹畢亦各有言咸以為陛下欲得百姓安寧不欲邊境交戰遂不惜一女而妻可汗預在含生所以感徳今一朝生進退之意有改悔之心臣為國家惜兹聲聽君子失色於物不失口於人晋文公圍原命三日糧原不降命去之諜出曰原將降矣軍吏請待之公曰信國之寳也民之庇也得原失信何以庇之陛下慮生意表信在言前今者臨事忽然乖殊所惜者少所失滋多情既不通方生嫌隙一方所以相畏忌邊境不得無風塵西州朔方能無勞擾彼胡以主被欺而心怨此土以主無信而懐慙不可以訓戎兵不可以勵軍事伏惟陛下以聖徳神功廓清四表自君臨天下十有七載以仁恩而結庶類以信義而撫戎夷莫不欣然負之無力其見在之人皆思報厚徳其所生息嗣亦望報陛下子孫今者得一公主配之以成陛下之信有始有卒其惟聖人乎且又龍沙以北部落無筭中國繫之終不能盡亦由可汗敗芮芮興突厥亡延陁盛是以古人虚外實内懐之以徳為惡在夷不在華失信在彼不在此伏惟陛下聖徳無涯威靈逺震遂平高昌破吐渾立延陁㓕頡利輕刑薄賦庶事無擁菽粟豐賤祥符累臻此則堯舜禹湯不及陛下逺矣伏願旁垂愷悌廣滋含育而常嗔絶域有意逺藩非偃武興文之道非止戈為武之義臣以庸暗忝居左右敢獻瞽言不勝戰懼時太宗欲親征討高麗顧謂侍臣曰高麗莫離支賊殺其主虐用其人夫出師弔伐當乘機便今因其殺虐誅之甚易遂良對曰陛下兵機神筭人莫能知昔隋末亂離手平冦亂及北狄侵邊西蕃失禮陛下欲命將擊之羣臣莫不苦諌陛下獨斷進討卒並誅夷海内之人徼外之國畏威懾伏為此舉也今陛下將興師遼東臣意熒惑何者陛下神武不比前代人君兵既渡遼指期尅㨗萬一差跌無以威示逺方若再發忿興兵則安危難測太宗深然之兵部尚書李勣曰近者延陁犯邊陛下必欲追擊此時陛下取魏徵之言遂失機㑹若如聖䇿延陁無一人生還可五十年間疆塲無事帝曰誠如卿言由魏徵誤計耳朕不欲以一計不當而尤之後有良筭安肯矢謀由是從勣之言經畫渡遼之師遂良以太宗鋭意三韓懼其遺悔翼日上䟽諌曰臣聞有國家者譬諸身兩京等於心腹四境方乎手足他方絶域若身外臣近於坐下伏奉口勑布語臣下云自欲伐遼臣數夜思量不逹其理高麗王為陛下之所立莫離支輒殺其主陛下討逆收地斯實承機闗東頼陛下徳澤乆無征戰但命二三勇將發兵四五萬飛石輕梯取如反掌夫聖人有作必履常規貴能克平㐫亂駕馭才傑惟陛下𢎞兩儀之道扇三五之風提勵人物皆思效命昔侯君集李靖所謂庸夫猶能掃萬里之高昌平千載之突厥皆是陛下發縦指示聲居聖明臣旁求史籍訖乎近代為人之主無自伐遼人臣往征則有之矣漢朝則荀彘楊僕魏代則毋丘儉王頎司馬懿猶為人臣慕容真僭號之子皆為其主長驅高麗虜其人民削平城墓立功同於天地美化苞於古昔自當超邁於百王豈止俯同於六子陛下昔剪平冦逆大有爪牙年齒未衰猶堪任用惟陛下之所使亦何行而不克方今太子新立年實㓜少自除藩屛陛下所知今一旦棄金湯之全渡遼海之外臣忽三思煩愁並集大魚依於巨海神龍據於川泉此謂人君不可輕而遠也且以長遼之左或遇霖滛水潦騰波平地數尺帯方𤣥兎海途深測非萬乘所冝行踐留京徑路非逺為其節度以設軍謀繫莫離支頸獻皇家之廟此實處安全之上計社稷之根本特乞天慈一垂省察太宗不納蕭鈞為諌議大夫永徽初左武侯引駕盧文操踰垣盗左蔵庫物高宗以引駕職在紀繩身行盗竊命有司誅之鈞進曰文操所犯情實難原然於常法罪不至死今致之極刑將恐天下聞之咸謂陛下輕法律賤人命任喜怒貴財物帝納之韓瑗為黄門侍郎永徽中高宗欲廢皇后王氏立武昭儀瑗因奏事泣涕諌之曰皇后是陛下在藩府時先帝所娶今無過愆即行廢黜四海之士誰不惕然且國家屡有廢立非長乆之術願陛下為社稷大計無以臣愚不垂採察帝不納瑗又上䟽諌曰臣聞王者立后以作配天地比徳日月並明則照臨四海如日月有薄蝕則天地昏矣且匹夫匹婦尚相揀擇况天子乎夫皇后母儀萬國善惡由之故嫫母輔佐於黄帝妲己傾覆於殷王前史載之殷鑒不逺詩云赫赫宗周褒姒㓕之毎覽前古未嘗不輟卷歎息不謂於今塵黷聖代今如不法後嗣何觀伏願陛下詳之無為後世所笑若使殺身以益國家菹醢之戮臣之分也昔吳王不用子胥之言子胥云臣見麋鹿遊於姑蘇臣今恐海内失望之後有荆棘生於闕庭宗廟不血食期有日矣中書侍郎來濟又宻表諌曰臣聞王者之立后也將以匹乾坤之道象二儀敷育之義主承宗廟母臨天下以配后土執饋皇姑必擇禮教名家幽閒淑令副四海之望稱神祗之意是故周文造周姒氏而興闗雎之化百姓蒙祚孝成任心縱欲以婢為后遂使皇統亡絶社稷淪傾有周之隆既如彼大漢之禍又如此惟陛下詳察李君球為蔚州刺史龍朔元年四月詔諸道總管率三十五軍川陸分途先觀高麗之舋高宗將親率六軍以繼之君球上䟽曰臣聞司馬法曰國雖大好戰必亡天下雖平忘戰必危兵者㓙器戰者危事故聖主明王重行之也愛人力之盡恐府庫之殫懼社稷之危生中國之患故古人之務廣徳者昌務廣地者亡昔秦始皇好戰不已至於失國是不愛其内而務其外故也漢武逺討朔方殆乎萬里廣招南海分為八郡終户口减半國用空虚至於末年方下哀痛之詔自悔其失彼高麗者僻側小醜潛蔵山海之間得其人不足以彰聖化棄其地不足以損天威何至乎疲中國之人傾府庫之實使男子不得耕耘女子不得蠶織陛下為人父母不垂惻隐之心傾其有限之資貪於無用之地設令高麗既㓕即不得不發兵鎮守少發即兵威不足多發即人心不安是乃疲於轉戍萬姓無聊生也萬姓無聊即天下敗矣天下既敗即陛下何以自安故臣以為征之不如不征滅之不如不滅惟陛下裁斷䟽奏不報張文瓘為東䑓侍郎龍朔三年蓬萊宫成百官奉賀文瓘諌曰人力不可不惜百姓不可不養養之逸則富以康使之勞則怨以叛秦皇漢武廣事四夷多造宫室致使土分瓦觧户口减半臣聞致治於未亂保邦於未危人㒺常懐懐於有仁陛下不制之於未亂之前安能救於既危之後百姓不堪其弊必搆禍難殷鍳不逺近在隋朝臣願稍安撫之無使生怨帝深納其言徐齊𥅆為西䑓舍人咸亨元年三月勅令突厥酋長子弟事東宫齊𥅆上䟽曰昔姬誦與伯禽同業晋儲以師曠為友匪惟專頼師資故亦詳觀近習皇太子自可招尋園綺寤寐應劉階闥小臣必採於端士馳驅所任並歸於正人方流好善之風永播崇賢之美今乃使氊裘之子入陪望苑在於道義臣竊有疑詩云敬慎威儀以近有徳書曰任官惟賢才左右惟其人盖殷勤於此防㣲之至也齊𣆀俄又上奏曰齊獻公即陛下外氏雖子孫有犯不合上延於祖今周忠孝公廟甚修而齊獻公廟毁不審陛下將何以垂示海内以彰孝理之風帝皆納其言劉思立為侍御史儀鳯二年四月詔以河南河北旱儉遣御史中丞崔謐等分道存問賑給思立上䟽諌曰今麥序方秋蠶桑未畢三時之務萬姓所先勅使撫廵人皆竦忭忘其家業冀此天恩踊躍參迎必難抑止集聚既廣妨廢亦多加以逾程徃還兼之晨夕停滯既縁賑給湏立簿書本欲安存却成煩擾又無驛之處求馬稱難揀擇公私預湏追集雨後農要特切常情暫廢湏臾即虧嵗計每為一馬遂勒數家從此相乘必恐滋甚且委州縣賑給待秋後閒時出使褒貶䟽奏謐等遂停不行袁利貞為太常博士永隆二年正月王公以下及朝集使以太子初立獻食勅於宣政殿㑹百官及命婦利貞上䟽曰伏以恩㫖宣政殿上兼設命婦坐位九部伎及散樂並從宣政門入臣以前殿正寢非命婦宴㑹之處象闕路門非倡優進御之所望請命婦㑹於别殿九部伎從東西門入散樂一色伏望停省若於三殿别所自可備極恩施微臣庸蔽不閑典則忝預禮司不敢不奏輕陳狂瞽願垂省察帝從之改向麟徳殿陳設至㑹日群臣樂飲帝使中書侍郎薛元超謂利貞曰卿門承忠鯁能抗䟽直言不加厚錫無以奬勸之於是賜百叚錦綵李善感為監察御史裏行永淳元年造奉天宫於嵩山之南仍置嵩陽縣又於藍田造萬全宫善感諌曰自古帝王莫不以登封告成為盛事天皇以封㤗山告太平致群瑞則與三皇五帝比隆矣但數年以來菽粟不稔百姓餓死道路相望兼四夷交侵日有徵發天皇冝恭黙思道以禳災譴方更營造宫室勞役不已天下聞之莫不失望臣聞不矜細行終累大徳臣忝任御史是國家耳目竊以此為憂帝雖優容之竟不納其奏善感頗渉經學時承平日乆諌諍殆絶善感既進諌時人甚以此稱之蘇良嗣為荆州都督府長史高宗令宦官縁江採異竹將於苑中植之使者科舟載竹所在縱暴還過荆州良嗣囚之因上䟽切諌稱逺方求珍異以疲道路恐非聖人抑己愛人之道又小人竊弄威福以虧皇明言甚切直䟽奏帝謂太后曰吾約束不嚴果為良嗣所怪遽下手詔慰諭良嗣且令棄竹於江中朱敬則為右補闕初則天臨朝稱制天下頗多流言異議長夀中既漸寧宴冝絶告宻羅織之徒乃上䟽曰臣聞李斯之相秦也行申商之法重刑名之家杜私門張公室棄無用之費損不急之官惜日愛功疾耕急戰人繁國富遂屠諸侯此救弊之術也故曰刻薄可施於進趨變詐可陳於攻戰夫兵猶火也不戢將自焚况鋒鏑已銷石城又毁諒可易之以寛大潤之以淳和八風之樂以柔之三代之禮以導之秦既不然滛虐滋甚往而不返卒至土分此不變之禍也陸賈叔孫通之事漢王也當榮陽成臯之間糧饋已窮智勇俱困不敢開一說効一竒進豪猾之才薦貪暴之客及區宇適平干戈向戢金鼔之聲未歇傷痍之痛尚聞二子顧盻綽有餘態乃陳詩書說禮樂開至道謀帝圖高皇帝忿然曰吾以馬上得之安事詩書乎對曰陛下馬上得之安可馬上理之乎高皇黙然於是陸賈著新語叔孫通定禮儀始知天子之尊方覺帝王之貴此知變之善也向使高皇排二子而不收置詩書而不顧重攻戰之吏尊首級之材複道争功張良已知其變㧞劔擊柱吾屬不得無謀即晷漏難逾何十二帝乎亡秦是續何二百年乎故曰仁義者聖人之蘧廬禮經者先王之陳迹然則祝祠向畢芻狗湏投淳精已竭糟粕可棄二義尚此况輕此者乎自文明草昧天地屯蒙三叔流言四㓙搆難不設鉤距無以應天順人不切刑名不可摧姦息暴故置神器開告端曲直之影必呈包蔵之心盡露神道助直無罪不除人心保寧無妖不戮以兹妙筭窮造化之幽深用此神謀入天人之秘術故計不下席聽不出門蒼生晏然紫宸易主大哉偉哉無得而稱也豈比造攻鳴條大戰牧野血變草木頭折不周可同年而語乎然而急趨無善迹促柱少和聲拯溺不虧行療饑非鼎食即向時之妙䇿乃當今之芻狗也伏願覽秦漢之得失考時事之合冝審糟粕之可遺察蘧廬之湏毁見㡬而作豈勞終日乎陛下必不可偃蹇太平徘徊中路伏願改法制立章程下恬愉之詞流曠蕩之澤絶萋菲之牙角頓姦險之鋒鋩塞羅織之蹊掃朋黨之迹使天下之蒼生坦然大悅豈不樂哉則天甚善之盧蔵用為左拾遺則天將營興㤗宫於萬安山藏用上䟽諌曰臣愚雖不逹時變竊讀書見自古帝王之迹衆矣臣聞土階三尺茅茨不剪采椽不斵者唐堯之徳也卑宫室菲飲食盡力於溝洫者大禹之行也惜中人十家之産而罷露䑓之制者漢文之明也並能垂名無窮為帝王之烈豈不以克念狥物博施濟衆以臻於仁恕哉今陛下崇䑓䆳宇離宫别館亦已多矣更窮人之力以事土木臣恐議者以陛下為不愛人務奉己且頃歳以來雖年穀頗登而百姓未有儲蓄陛下西幸東廵人未休息土木之役嵗月不空陛下不因此時施徳布化復廣造宫苑臣恐人未易堪今左右近臣多以順意為忠朝廷百僚皆以犯忤為患至今陛下不知百姓失業百姓亦不知左右傷陛下至仁也臣聞忠臣不避死亡之患以納君於至仁明君不患切直之言以垂名於千載陛下誠能發明恕之制出勞人之詞則天下必以陛下為惜人力而知民苦也小臣固陋不識忌諱敢昧死上聞乞下此章與執政者議其可而天下幸甚徐堅為萬年主簿則天如意元年六月上䟽曰臣聞書有五聽之道慮失情實也令著三復之奏恐致虚枉也竊見比有勅勘當反逆令使者得實便决殺人命至重死不可生儻萬分之中有一不實欲訴無路懐枉誰明飲恨吞聲赤族從戮豈不痛哉此不足肅姦逆而明刑典適所以長威福而生疑懼臣望絶此處分依法覆奏則死者甘伏知泣辜之恩生人藻悅見祥刑之意又法官之任人命所懸若不揀擇恐招枉濫諸百僚之内有用法寛平百姓所稱者願親而任之有處事深酷不允者願踈而退之則囹圄無寃億兆幸甚臣又聞罸不及嗣虞帝之明規罪不至孥漢君之茂徳故郤芮作亂而郤缺登朝嵇康被刑而嵇紹入用終能立功白狄効死湯隂千載美談斯為稱首父子猶其如此餘親尚何疑哉竊見逆人之親選曹廣責至於無親無服亦數十條士子之中十將三四今聖人在上寳命惟新有道貧賤實為深耻遂令此等長從遐棄懐才抱噐將何望哉是以聖意哀矜頻降恩制令同常例各使坦懐故姚璹之徒皆逢任委而在下僚列不識天心為求微疵不𢎞大體又准勅逆人同堂親不得任京及兩畿三輔准法刑戮緦麻親不得充近侍宿衞臣望申勅有司勅令之外不得輙為勘責收其賢能示之曠蕩斯則巍巍之徳作範百王穆穆之風垂裕千祀劉承慶為左拾遺證聖元年正月制九品以上各上封事承慶上䟽曰臣聞自古帝王皆有休祥所以昭其徳災變所以知其善天意之常理王者之常事然則休祥屢臻不可以矜功而自滿災變奄降不可輕忽而靡驚故殷宗以桑穀生朝懐懼而内省妖不勝徳遂立中興之功商紂以雀生大鳥恃福而自盈祥不勝驕終致傾亡之禍故災變之生將以覺悟明主扶持大業使盛而不衰理湏祗畏神心驚懼天誡餙身正是業業兢兢則凶往而吉來轉禍而成福昔殷湯禱身而降雨成王省事以反風宋公憂熒惑之災而膺三舎之夀高宗懲雉鼎之異而享百年之福此皆其類也自陛下承天理物至道通神美瑞嘉祥薦臻狎委非臣所能盡述日者變生大火損其神宫驚惕聖心震動黎庶臣謹按左氏傳曰人火曰火天火曰災人火因人而興故指火體而為稱天火不知何起直以災言之其名雖殊為害不别又漢書五行志曰火失其性則自上而降及濫燄妄起災宗廟燒宫觀自上而降所謂天火濫燄妄起所謂人火其來雖異為患是同王者舉措云為必闗幽顯幽為天道顯為人事幽顯亦通天人理合今匠人宿藏其火本無放燎之心明堂教化之宫復非延燒之所孽煨潜扇倐忽成災雖即因人亦闗神理臣愚以為火發既從廟主後及總章意將所云佛舎恐勞而無益但宗佛教即是津梁何假紺宫方從汲引既僻在明堂之後又前逼牲牢之筵兼以厥搆崇大功多難畢立像𢎞法本擬利益黎元傷財役人却且煩勞家國承前大風折木天誡已顯今者纛燄斯熾人孽復彰聖人動作必假天人之助一興功役二者俱違厥應昭然殆將縁此臣以為明堂是正陽之位至尊所居展禮班常崇化立政玊帛朝㑹神靈依慿營之可曰人功損之實非輕事既失嚴禋之所復傷孝理之情陛下昨降明制猶申寅畏之㫖群僚理合兢莊震悚勉力司存豈合承恩躭樂安然酺宴又下人感荷聖徳都變悚惶神體克寧豈非深悅但以火氣初止尚多驚懼餘憂未息遽以歡事逼之臣恐憂喜相争傷於情性故傳曰可憂而樂取憂之道又古者有火祭四墉即隂之氣祈之以禳火災夫火陽氣歡樂陽事火氣方勝不可復興陽事臣聞災變之興至聖不免聿修其徳來患可禳陛下垂制博訪許陳至理而左史張鼎以為今既火流王屋彌顯大周之祥通事舎人逢敏奏稱當彌勒初成佛道時有天魔燒宫七寳䑓湏臾散壞斯實謟佞之邪言實非君臣之正論晻昧王化無益萬㡬夫天道雖高其察彌近神心雖寂其聽彌明交際皇王事均影響今大風烈火譴咎相仍斯實天人丁寧戒諭聖王使鴻基益固天禄永終之意也伏願陛下乾乾在慮翼翼為懐若渉巨川如承大祭審其致災之理詳其降𤯝之由無戾天人之心而興不急之役則兆民蒙頼福禄無窮幸甚幸甚丘愔前為魯王府功曹參軍延載元年檢校内史李昭徳專權用事為朝野所惡愔上䟽言其罪狀曰臣聞百王之失皆由權歸於下宰臣持政常以勢盛為殃魏冉誅庶族以安秦非不忠也弱諸侯以强國非無功也然以出入自專擊㫁無忌威震朝野不聞有王張禄一進深言卒用憂死向使昭王不即覺悟魏冉遂以專權則秦之覇業或不傳於子孫陛下創業興王撥亂英主總權收柄司契握圖天授已前萬機發皆命中舉事無遺公卿百僚具職而已自長夀以來厭怠細政委任昭徳使長機權然其雖有幹濟小才不堪軍國大用直以性好凌轢氣負剛強盲聾下人芻狗同列刻薄慶賞矯誑憲章國家所頼者微所妨者大南䑓見勅自諸䖏奏事陛下已依昭徳請不依陛下便不依如此改張不可勝數昭徳叅奉機宻獻可替否事有便利不預諮謀要待盡可將行方始别生駮易揚露專擅顯示外人歸美引愆義不如此州縣列位䑓寺庶官入謁出辭望塵慴氣一切奏獻與奪事冝皆承㫖意㑹附上言令有秩之吏多為昭徳之人陛下勿謂昭徳小心是我手臂臣觀其膽乃大於身鼻息所衝上拂雲漢近者新䧟來侯兩族兼挫侯王二讎鋒銳更不可當方寸良難窺測書曰知人則哲然人亦未易知漢光武將以龎萌可以託孤卒為戎首魏文帝期司馬懿以安國竟肆姦回夫小家理生有千百之資將以託人尚憂失授况兼天下之重可輕忽委任者乎今昭徳作福專威横絶朝野愛憎與奪傍若無人陛下恩遇至深掩蔽過厚臣聞蟻孔壊堤針芒㵼氣涓流不絶必成江河履霜堅氷湏防其漸權重一去收之極難伏願陛下殷鍳古先早為裁抑無令禍大使至難除臣又聞之譏刺近臣犯顔深諌明王聖主亦有不容臣熟知今日言之於前明日伏誅於後但使國安身死臣實不悔所望陛下深覽臣言為萬姓自愛昭徳竟坐免張說為右補闕則天聖厯三年四月幸三陽宫避暑不時還都說上䟽諫曰陛下屯萬乘幸離宫暑退凉歸未降還㫖愚臣愚陋恐非長䇿請為陛下陳其不可三陽宫去雒城一百六十里有伊水之隔有堮坂之峻過夏渉秋水潦方積道環山險不通轉運河廣無梁咫尺千里扈從兵馬日有費給連雨彌旬即難周濟陛下太倉武庫並在都邑紅粟利器藴若丘山奈何去宗廟之上都安山谷之僻處是猶倒持劍㦸示人鐏柄臣竊為陛下不取夫禍變之生在人所忽故曰安樂必戒無行所悔此不可止之理一也宫城褊小萬方輻輳填城隘郭併挿無所排斥居人蓬宿草次風雨暴至不知庇託孤惸老疾流轉衢巷陛下作人之父母將若之何此不可止之理二也池亭竒巧誘掖上心削巒起觀竭流漲海俯貫地脉仰出雲路易山川之氣奪農桑之土延木石運斧斤山谷連聲春夏不輟勸陛下作此者豈正人耶詩云人亦勞止迄可小康此不可止之理三也御苑東西二十餘里出入往來雜人甚多無墻垣扃禁内有榛藂谿谷猛獸所伏暴慝是憑陛下往往輕行警蹕不肅歴蒙宻乘險巇卒然有逸獸狂夫驚犯左右豈不殆哉雖萬全無疑然人主之動不冝易也易曰思患豫防願陛下為萬姓持重此不可止之理四也今國家北有胡冦窺邊南有夷獠騷徼闗西小旱耕稼是憂安東近平輸漕方始臣願陛下及時旋駕深居上京息人以展化修徳以來逺罷不急之役省無用之費澄心澹慮億萬斯年蒼蒼群生莫不幸甚臣自度芻議十不一從何者阻盤遊之娛間林池之玩規逺圖而替近適要後利而替前歡未沃明主之心已戾貴臣之意然臣盡誠宻奏而不愛死者不願負陛下言責之職耳輕觸天威伏地待罪䟽奏不納劉知㡬為懐州獲嘉主簿證聖元年表陳四事其一曰臣聞小不忍亂大謀小人者大人之賊也竊以赦之為用復何益於國哉若乃皇業權輿天地開闔嗣君即位黎元更始則時籍非常之慶以申再造之恩必求之政術猶謂未克况乃時非變革代属清平而輙降彼謬恩原兹罸罪者乎是以歴觀夐古兩漢舊事康衡儒學之俊才呉漢弼諧之良輔至於讜言規主惟願勿赦劉先主亦常謂諸葛亮曰吾周旋陳元方鄭康成間每見啓告亂理之道備矣曽不語赦也若劉景升王秀父子嵗歳赦有何益於理及後主嗣業蜀赦漸多故孟光於衆中責費禕曰夫赦者偏枯之物非明世所冝有也今上賢仁百僚稱職有何旦夕之急而數患姦軌之徒上犯天時下違人理豈具瞻之美所望於明徳哉自是蜀政凌遲浸以彫弊竊惟皇家之受命也肇自攝政負圖之始迄乎維新革命之初赦宥之澤可謂多矣逮乎六合清宴兆民樂康而非常之恩猶未寢息近則一年再命逺則毎歳無遺至若違法悖禮之徒無頼不仁之輩編户則冦攘為業當官則贓賄是求莫不公然故犯了無疑憚假使身嬰桎梏跡窘狴牢而元日之朝指期天澤重陽之節佇降皇恩如其忖度咸果釋免或有名垂結正罪將斷决竊行貨賄方使規求申請謁於吏部之曹納金帛於司刑之吏不即剖斷故致稽延推遷荏苒既霑恩宥且下愚不移習性難改雖頻煩肆𤯝每放自新而見利㤀義終焉不易用使俗多頑悖時罕亷隅為善者不預恩光作惡者獨承徼幸若乃方正直言之士守善嫉惡之夫毎欲攬轡埋輪効鷹鸇而報國褰帷露冕去蝥賊以安人而遇赦無以効其功聞恩無以施其巧古語云小人之幸君子之不幸斯之謂也臣望陛下逺覽衡吳陳鄭之說近尋劉葛孟費之談而今而後頗節於赦使兆人百姓有罪者無所逃刑理務當官負愆者無由免罸自當黎甿知禁姦宄肅清刑期勿刑罸一勸百與夫年年降赦歳歳承恩而違犯相仍罪責不已較其優劣不可同年而語哉其二曰臣聞君不虛授臣不虚受授則無失是曰能官又曰妄受不為忠妄施不為惠此皆聖賢之逹論君子之格言也是以古之善為政者表賢愚甄善惡才有可紀則白衣登公用無所堪則土牛不進惟漢代有賜爵一級恩澤封侯此乃曠古殊恩千載一遇非是頻煩渥澤每歳常行者也臣竊料皇家始自文明迄乎證聖其間不過十餘年耳海内具僚九品已上毎歳逢赦必賜階勲無功獲賞徼倖實為深矣何者天下善人少惡人多其釐務當官尸素尤衆彌年歴紀竟無絲髪之功准例班隨屢獲丘山之施而曽無耻愧逾長貪叨每論設官途規求仕進而不希孝悌取逹准擬遭遇便遷或言少一品未脱碧衣待一階方披朱服遂乃先求笏帶預辦衫袍今日御則天門必是加勲一轉明朝享正陽觀多應賜級一班既而如願果諧依期必獲得之者自謂己力受之者不以為慚報恩之績未聞知足之情安在至於朝野宴聚公私集㑹緋服衆於青衣象板多於木笏皆榮非徳舉位罕才昇紆紫拖青瓴􅀈將瓊瑶並列懐金佩玊芝蘭與蕭艾連行不知何者為妍􅑦何者為美惡臣望自今已後稍節私恩使有善者愈效忠勤無才者咸知勉勵自當人皆匪懈官盡奉公士林載清人倫有序矣其三曰臣昔見有唐御歴列職命官國多刓印之譏人有積薪之歎自陛下臨朝踐極頓革此風然矯枉過正亦為甚矣至如六品以下職事清官遂乃方之土芥比之沙礫其有行無聞於十室即預朝流識不及於三隅俄登仕伍斯固比肩咸是舉目皆然咸聞翹楚之歌惟見伐檀之刺故都中有諺曰補闕連車載拾遺平斗量杷推侍御史椀脫校書郎四方流傳遂為口實臣聞漢明帝代公主有為子求尚書郎者帝曰郎官上應列宿非其人則不可竟不之許而多賜之金夫以國儀之尊一郎之賤猶尚慎其所舉不以假人况今尸禄謬官其流非一若遂不加沙汰臣恐有穢皇風其四曰臣聞漢宣帝云與朕共理天下者其惟良二千石乎今之刺史是也移風易俗其寄不輕求瘼字人僉屬斯在然則歴觀兩漢已降迄乎魏晋之年方伯岳牧臨州按部或十年不易或一紀仍留莫不盡其化下之方責以理人之術既而日將月就風加草靡故能化行千里恩漸百成今之牧伯有異於是倐來忽徃蓬轉萍流近則累月仍遷遠則踰年必徙將㕔事為逆旅以下車為傳舎或云來歳入貢多應改職或道今兹㑹計必是移藩既懐茍且之謀何暇循良之用使百城千邑無聞亷杜之歌萬國九州罕見趙張之政臣望自今已後刺史非三歳已上不可遷官仍明察功過尤甄賞罸庶𢎞共理之風以賛垂衣之化䟽奏帝並嘉其公直冊府元龜卷五百四十三
