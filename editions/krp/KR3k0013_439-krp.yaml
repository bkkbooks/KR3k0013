body:
  text: 冊府元龜卷四百三十九宋王欽若等撰將帥部要君違命擅命要君子曰要君者無上又曰臧武仲雖曰不要君吾不信也是知要君者先聖之深戒也降自中古世態寖驕遜讓之徳微而貪競之風長謂爵命可以邀取謂車服可以力求乃有仗鉞軍和建牙邊徼自言權輕不足以鎮亂位下不足以威人負恃勲庸徼望光寵至有請假王之號求橫吹之儀要賜㦸之榮覬鳴騶之盛阻兵以待旄節託詞以避險艱陳啓無厭黷慢斯甚雖復幸亂離之際徇姑息之私而天之害盈敗亦旋至於戲後之為臣者當取戒于兹焉漢韓信為大將部署諸將及楚方急圍漢王時信以平齊使人言漢王曰齊夸詐多變反覆之國南邊楚邊近也不為假王以填之其勢不定填與鎮同今權輕不足以安之臣請自立為假王漢王大怒罵曰吾困于此且暮望而來佐我乃欲自立為王張良陳平伏後躡漢王足因附耳語遂遣張良立信為齊王晉桓冲孝武時領䕶南蠻校尉荆州刺史以疾疫還鎮上明表兄子石民堪居此任輒版督荆江十郡軍事振武將軍襄城太守尋陽北接强蠻西連荆郢亦一任之要今府州既分請以王薈補江州刺史詔從之時薈始遭兄劭䘮將塟辭不欲出于是衛將軍謝安更以中領軍謝輶代之冲聞之而怒上疏以為輶文武無堪求自領江州帝許之宋羊希為寧朔將軍廣州刺史希初請女夫鎮北中兵參軍蕭惠徽為長史帶南海太守明帝不許又請為東莞太守希既到鎮長史南海太守陸法真喪官希又請惠徽補任詔曰希卑門寒士累世無聞輕薄多釁備彰厯職累徒以清刻一介擢授嶺南干上逞欲求訴不已可降號横野將軍南齊垣崇祖為都督號平西將軍常自比韓信白起後破北虜增封千五百户崇祖聞陳顯達李安民皆增給軍儀啓帝求鼓吹橫吹太祖勑曰韓白何事不與衆異給鼓吹一部先是崇祖在宋明帝時啟曰淮北士民力屈胡虜南向之心日夜以冀況崇祖父伯竝為淮北州郡門族布在北邊百姓所信一朝嘯咤事功可立名位尚輕不足威衆乞假名號以示逺近帝以為輔國將軍北琅邪蘭陵二州刺史後魏廣陵侯衍為梁州刺史表請假王以崇威重詔曰可謂無厭求也所請不荅轉徐州刺史明亮字文德平原亳人性方厚有識幹自給事中歴員外常侍延昌中宣武臨朝堂親自黜陟授亮勇武將軍亮進曰臣本官常侍是第三清今授臣勇武其號至濁且文武又殊請更改授宣武曰今依勞行賞不論清濁卿何得乃復以清濁為辭亮曰聖明在上清濁攸分臣既属聖明是以敢啓宣武曰九流之内人咸君子雖文武號殊佐治一也卿何得獨欲乖衆妄分清濁所請未可但依前授亮曰今江左未賔書軌宜一方為陛下授命前驅擴定呉㑹官爵陛下之所輕賤命㣲臣之所重陛下方收所重何惜所輕宣武笑曰卿欲為朕擴定江東剪平呉㑹非勇莫可今之所授實副卿言辭勇及武自相矛盾亮曰臣欲仰禀聖規運籌而定何假勇武方乃成功宣武曰謀勇二事體本相須若勇而無謀則勇不獨舉若謀而無勇則謀不孤行必須兼兩乃能制勝何得云偏須運籌而不復假勇乎亮曰請改授平逺將軍宣武曰運籌用武然後逺人始平卿但用武平之何患不得平逺也亮乃陳謝而退崔孝芬為安南將軍莊帝還宮授西兖州刺史將軍如故孝芬乆倦外役固辭不行仍除太常卿爾朱仲逺前廢帝時為都督三徐二兖諸軍事加大將軍又兼尚書令竟不之州遂鎮于大梁仲逺遣使請准朝式在軍嗚騶帝覽啟笑而許之隋李安為郢州刺史弟哲為上儀同安數日轉鄧州刺史安請為内職高祖重違其意除左領軍左右將軍俄遷右領軍大將軍復拜哲開府儀同三司備身將軍兄弟俱典禁衛唐韋綬為興元節度使穆宗長慶三年請賜門㦸十二月將行又言家貧請賜錢二百萬請廻授子元弼官及至鎮不親政事無幾而卒後唐李存審為幽州節度使莊宗同光元年存審疾甚欲尋醫請除李紹宏為幽州監軍知州事降詔諭之不俞其請張文禮為鎮州大將既殺王鎔請旄節于朝廷莊宗曰文禮之罪期於不赦適當斬首以謝寃魂輙敢邀予旄節賔友賀曰王氏之寃實在文禮方事之殷且須含垢不欲與人生事但假之以告命徐為後圖帝不得已而從之晉趙在禮後唐莊宗同光末為挍節指揮使屯貝州㑹軍士皇甫暉作亂遂引衆入鄴自稱留後明宗天成初授在禮滑州義成軍節度滑濮等州觀察處置等使乃封天水縣開國伯食邑七百户制下在禮以軍情言語為辭竟不之任尋改天雄軍兵馬留後鄴都留守後皇甫暉受陳州趙進受貝州在禮請除移楊思權後唐長興末為右羽林都指揮使遣戍興元閔帝嗣位奉詔從張䖍釗討鳳翔洎至岐下思權首唱倒戈以攻䖍釗尋領部下軍率先入城謂唐末帝曰臣既赤心奉殿下候京城平定與臣一鎮勿置在防禦團練使内乃懷中取紙一幅謂帝曰願殿下親書臣姓名以志之帝命筆書可邠州節度使及即位授推誠奉國保乂功臣静難軍節度邠寧慶衍等州觀察處置等使檢校太保周李仁福為夏州節度使後唐明宗長興四年三月遣押衙賈師温奏事稱疾甚以次子彛超權知軍州事乞降正命乃遣供奉官齎延州留後官告賜彛超促令赴任仍以其叔思瑶為夏州行軍司馬兄彛殷為節度副使彛超為延州留後長興四年五月丁丑供奉官崔處訥自夏州廻彛超附表臣奉詔受延州留後尋欲赴任而軍民留連未容進發伏乞更容臣周歳違命軍志有言將在軍君命有所不受盖機謀立斷寸晷不移稱疾雷之勢決破竹之功幸而克勝猶然請罪若乃倔强專欲顚沛無成㧞數奔之斾靡屢北之旗遂作戎羞自拘司敗又何悔焉後漢鄧禹為大司徒光武建武元年率衆征赤眉禹戰敗走至高陵軍士飢餓皆食棗菜光武乃徵禹還敇曰赤眉無榖自當來東吾折箠笞之非諸將憂也無得進兵禹慚於受任而功不遂數以飢卒徼戰輙不利徼古堯反三年春與車騎將軍鄧𢎞擊赤眉遂為所敗衆皆死散禹獨與二十四騎還詣宜陽謝上大司徒梁侯印綬有詔還侯印綬盖延為虎牙將軍擊董憲建武三年董憲將賁休舉蘭陵城降憲聞之自郯圍休時延及平敵將軍龎萌在楚請往救之光武敕曰可直往擣郯則蘭陵必自觧延等以賁休城危遂先赴之憲逆戰而陽敗延等遂逐退因㧞圍入城明日憲大兵出合圍延等懼遽出突走因往攻郯帝讓之曰間欲先赴郯者以其不意故耳今既奔走賊計已立圍其可解乎延等至郯果不能克而董憲遂㧞蘭陵殺賁休呉漢為大司馬建武八年隗囂叛遣漢西屯長安從車駕上隴遂圍隗囂于西城光武敕漢曰諸郡甲卒但坐費糧食若有逃亡則沮敗衆心宜悉罷之漢等貪并力攻囂遂不能遣糧食日少吏士疲役逃亡者多及公孫述救至漢遂退敗十二年漢征公孫述攻㧞廣都遣輕騎燒成都市橋武陽以東諸小城皆降帝戒漢曰成都十餘萬衆不可輕也但堅據廣都待其來攻勿與爭鋒若不敢來公轉營廹之須其力疲乃可擊也漢乗利遂自將歩騎二萬餘人進逼成都去城十餘里阻江北為營作浮橋使副將武威將軍劉尚將萬餘人屯于江南相去二十餘里帝聞大驚讓漢曰比敕公千條萬端何意臨事悖亂既輕敵深入又與尚别營事有緩急不復相及賊若出兵綴公以大衆攻尚尚破公即敗矣幸無他者急引兵還廣都詔書未到述果使其將謝豐袁吉將衆十許萬分為二十餘營并出攻漢别將萬餘人劫劉尚令不得相救漢與大戰一日兵敗走入壁董卓為前將軍屯于扶風靈帝中平六年徵為少府不肻就上書言所將湟中義從及秦胡兵皆詣臣曰牢直不畢廪賜斷絶妻子飢凍牽挽臣車使不得行羌胡敝腸狗態臣不能禁止輙將順安慰増異復上朝廷不能制頗以為慮及靈帝寢疾璽書拜卓為并州牧令以兵属皇甫嵩卓復上書言曰臣既無老謀又無壯事天恩誤加掌戎十年士卒大小相狎彌乆戀臣畜飬之恩為臣奮一旦之命乞將之比州効力邊陲于是駐兵河東以觀時變卓再違詔敕㑹為何進所召竟亂漢室晉桓温為揚州牧録尚書事哀帝興寧二年四月遣使喻温入相温不從秋七月復徵温入朝八月温至赭圻遂城而居之南燕平規慕容垂將也垂建節將軍徐嵓叛于武邑驅掠四千餘人北走幽州垂馳敕規曰但固守勿戰北破丁零吾當自討之規違命拒戰為嵓所敗嵓乗勝入薊掠千餘户而去所過寇暴遂去令支梁曹景宗為右衛將軍高祖天監五年魏軍圍徐州遣景宗與豫州刺史韋叡援之詔景宗頓道人洲待衆軍齊集俱進景宗固啓求先據邵陽洲尾高祖不聽景宗欲專其功乃違詔而進值暴風卒起頗有渰溺復還守先頓高祖聞之曰此所以破賊也景宗不進盖天意乎若孤軍獨往城不時立必見狼狽今得待衆同進始知大㨗矣後魏公孫表明元時為博士叅功勞將軍元屈軍討吐京叛胡以功封固安子時河西飢胡劉虎聚結流民反于上黨南冦河内詔表討虎又令表與姚興雒陽戍將結期使備河南岸然後進軍討之時胡内自疑阻更相殺害表以其有觧散之勢遂不與戍將相聞率衆討之法令不整為胡所敗軍人大被殺傷明元深銜之穆壽太武時為冝都王征東將軍及輿駕征凉州命壽輔太子總録機要内外聽焉行次雲中將濟河宴諸將於宮太武别御静室召壽及司徒崔浩尚書李順太武謂壽曰蠕蠕呉提與牧犍連和今聞朕征凉州必來犯塞若伏兵漠南殄之為易朕故留壯兵肥馬使卿輔佐太子收田既訖便可分伏要害以待虜至引使深入然後擊之擒之必矣涼州路逺朕不得救卿若違朕指授為虜侵害朕還斬卿崔浩李順為證非虛言也壽頓首受詔壽信卜筮之言謂賊不來竟不設備而呉提果至侵及善無京師大駭壽不知所為欲築西郭門請太子避保南山惠太后不聽乃止遣司空長孫道生等擊走之太武還以無大損傷故不追咎任城王澄宣武帝時為鎮南大將軍伐梁將攻鍾離詔以鍾離若食盡三月已前固有可尅如至四月淮水汎漲舟行無礙宜善量之前事之㨗也此實將軍經略勲有常焉如或以水盛難圖亦可為萬全之計不宜昧利無成以貽後悔也梁冠軍將軍張惠紹遊擊將軍殷暹驍騎將軍趙景悦龍驤將軍張景仁等率衆五千送糧鍾離澄遣統軍王足劉思祖等邀擊惠紹等大破之獲惠紹殷暹景仁及其屯騎校尉史文淵軍主已上二十七人既而遇雨淮水暴漲引歸壽春還既狼狽失兵四千餘人頻表解州帝不許有司奏軍還失路奪其開府又降三階中山王英宣武時為征南將軍都督揚徐二州諸軍事討梁下梁馬頭戍圍鍾離詔曰師行已乆士馬疲瘠賊城險固卒難攻屠冬春之交稍非勝便十萬之衆日費無訾方圖後舉不待全事且可宻裝徐嚴為振旅之意整疆完土開示威略左右蠻楚素應逃亡或竄山湖或難制掠若㓙渠黠黨有須剪除者便可撲掃以清疆界如其强狡慿阻未易致力者亦不煩肆兵凱旋遲近不復委曲英表曰臣奉辭伐罪志殄逋寇想敵量攻期至二月將末三月之初理在必尅但自此月一日已來霖雨連併可謂天違人願然王者行師舉動不易不可以少致暌淹便生異議臣亦諦思若入三月以後天晴地燥馮陵是常如其連雨仍接不得進攻者臣已更高邵陽之橋防其汎突意外洪漲慮其破橋臣亦部分造船復于鍾離城隨水狹處營造浮橋至三月中旬橋必克成晴則出攻雨則圍守水陸二圖以得為限實願朝廷特開逺略少復賜寛假以日月無使為山之功中道而廢詔曰大軍野次已成勞乆攻守之方理可豫見此頻得啟制勝不過暮春及省後表復期孟夏之末彼土蒸濘無宜乆淹勢雖必取乃將軍之深計兵乆力殆亦朝廷之所憂故遣主簿曹道往觀軍勢使還一一具聞及道還英猶表云可尅四月水盛破橋英及諸將狼狽奔退士衆没者十有五六至揚州遣使送節及衣冠貂蟬章綬有司奏英經筭失圖按劾處死詔恕死為民唐田承嗣為魏博節度使代宗大厯十年相衛節度薛嵩卒其弟㠋為衛將裴志清所逐率衆歸承嗣扇誘相州將吏謀亂遂將兵襲擊謬稱救應詔内侍孫知古使于魏州宣慰因曉示承嗣各守封疆承嗣不奉詔李納為淄青節度使先是成德王武俊棣州守將趙鎬以城降納徳宗累詔令歸之納乃請進海州以易之帝不許納又詭奏以趙鎬在棣州旋領將士赴上都當以州歸武俊苟遷延未决冀朝廷遂之堅意不可納悔懼方奏俟武俊歸田緒貝州之四縣然後以棣州付之詔令武俊退四縣之師納始奉詔其深趙徳棣三千餘人從趙鎬至鄆者武俊悉請歸之劉𤣥佐為宣武軍節度使韓滉為相請于江淮收兵及聚財賦令𤣥佐西討及滉没宰相張延賞停減官員收其俸料以資西討之用奏曰為政之本必先命官舊制官員繁而且費州縣殘破職此之由臣在荆南劍南所管州縣闕官員者或數十年吏部未嘗補挍但令一官假攝公事亦理以此言之官員可减無可碍也今請减天下官員收其禄俸重募戰士俾𤣥佐收復河湟軍用不匱乏矣帝然之𤣥佐本為韓滉所感勵決策西行及滉卒意亦怠焉又慮延賞資給不充因以疾辭西討帝遣中官勞問卧以受命延賞知不可用奏請令李抱貞西討抱貞已驕貴矣又辭不行時抱貞判官陳曇奏事京師延賞命曇勸抱貞抱貞竟拒絶之呉少誠為淮西節度使貞元十三年九月少誠擅開淘刀河達汝州遣中使宣慰止之不禀受何進滔為魏博大將史憲誠被害衆推進滔為帥詔割相衛等三州别為一鎮進滔不奉詔表言三軍不受梁李讜為太祖元從騎將唐大順元年柳王友裕領兵攻澤州時太祖駐軍於盟津乃領讜將兵越太行授以籌謀讜頗違節度乆而無功太祖遣追還廷責其罪戮之於河橋李重裔為太祖右廂馬歩軍指揮使大順元年從柳王友裕收澤州與晉軍戰於馬牢川王師敗績廻守河陽太祖謂諸將曰李讜李重裔違我節度不能立功頗辜任使於是李讜竝戮于河橋李彛超為夏州節度使明宗長興中彛超奏奉詔除延州留後已授恩命訖三軍百姓擁隔未遂赴任帝遣閤門使蘇繼顔齎詔促彛超赴任擅命傳曰大夫出疆有安國家定社稷專之可也又曰禀命則不威其或權百萬之師爭斯須之利觀釁而動見可而進勢若雷霆擊如鷹隼俟請期於千里將失筭于一時或知機而奮發盖忠烈而内激者也盖曰權宜不足垂訓幸于一勝猶聞待罪㣲有沮衂則何救哉與其矯命而勝未若師貞之吉履霜之戒其在兹乎漢韓信為相國平齊使人言于漢王曰齊夸詐多變反覆之國南邊楚邊近也不為假王以填之填所刅切其勢不定今權輕不足以安之臣請自立為假王當是時楚方急圍漢王于滎陽使者至發書發信使者所齎書也漢王大怒罵曰吾困於此旦暮望而來佐我而汝也乃欲自立為王張良陳平伏後躡漢王足因附耳語曰漢方不利寧能禁信之自王乎不如因而善遇之使自為守不然變生漢王亦寤因復罵曰大丈夫定諸侯即為真王耳何以假為遂遣張良立信為齊王無錫侯多軍武帝征和四年坐追反虜到𢎞農擅弃兵還贖罪免公孫戎奴為上黨太守發兵擊匃奴不以聞段㑹宗成帝時為西域都護康居太子保蘇匿率衆萬餘人欲䧏㑹宗奏狀漢遣衛司馬逢迎迎之于道隨所到而逢之故曰逢迎也㑹宗發戊巳校尉兵隨司馬受䧏司馬畏其衆欲令降者皆自縛保蘇匿怨望舉衆亡去㑹宗更盡還以擅發戊巳校尉之兵乏興有詔贖論後漢王梁為大司空與大司馬呉漢等俱擊檀鄉有詔軍事一屬大司馬而梁輙發野王兵光武以其不奉詔敇令止在所縣而梁復以便宜進軍帝以梁前後違命大怒遣尚書宗廣持節軍中斬梁廣不忍乃檻車送京師既至赦之月餘以為中郎將行執金吾事何進為大將軍與司𨽻校尉袁紹謀誅閹宦而何太后不許進乃私呼左將軍董卓將兵入朝以脅太后卓得召即時就道上書曰中常侍張讓等竊幸承寵濁亂海内臣聞揚湯止沸莫若去薪潰癰雖痛勝於内食昔趙鞅興晉陽之甲以逐君側之惡今臣輙鳴鐘鼓如雒陽請收讓等以清姦穢卓未至而何進敗魏鄧艾齊王甘露元年為征西將軍陳留王景元四年艾平蜀受劉禪降輙依鄧禹故事承制拜禪行驃騎將軍太子奉車請王駙馬都尉蜀羣司各隨高下拜為王官或領艾官屬以師纂領益州刺史隴西太守索𢎞等領蜀中諸縣乃言於司馬文王曰兵有先聲而後實者今因平蜀之勢以乗呉呉人震恐席卷之時也然大舉之後將士疲勞不可使用且徐緩之留隴右兵二萬人蜀兵二萬人煮鹽興冶為軍農要用並作舟船預順流之事然後發使告以利害呉必歸化可不征而定也今宜厚劉禪以致孫休安士民以來逺人若便送禪於京都呉以為流徙則於向化之心不勸宜權停留須來年秋冬比爾呉亦足平以為可封禪為扶風王錫其資財供其左右郡有董卓塢為之宮舍爵其子為公侯食郡内縣以顯歸命之寵開廣陵城陽以待呉人則畏威懷徳望風而從矣文王使監軍衛瓘喻艾事當須報不宜輙行艾重言曰銜命征行奉指授之䇿元惡既服至於承制拜假以安初附謂合權宜今蜀舉衆歸命地盡南海東接呉㑹宜早鎮定若待國命往復道途延引日月春秋之義大夫出疆有可安社稷利國家專之可也今呉未賔勢與蜀連不可拘常以失事機兵法進不求名退不避罪艾雖無古人之節終不自嫌以損于國也晉唐彬武帝時領䕶烏桓校尉右將軍鮮卑諸種畏懼遂殺大莫廆彬欲討之恐上俟報虜必逃散乃發幽冀車牛參軍許秪宻奏之詔遣御史檻車徵彬付廷尉以事直見釋庾翼成帝時為安西將軍荆州刺史代兄亮鎮武昌及康帝即位翼欲率衆北伐上疏曰賊季龍石季龍也年已六十奢滛理盡醜類怨叛又欲決死遼東皝雖驍果皝慕容皝未必能固若北無掣手之虜則江南將不異遼左矣臣所以輙發良人不顧忿咎然東西形援未必齊舉且欲北進移鎮安隆入沔五百溳水通流輙率南郡太守王愆期江夏相謝尚潯陽太守袁真西陽太守曹據等精銳三萬風馳上道并勒平北將軍桓宣撲取黃季欲并丹水揺蕩秦雍御以長轡用逸待勞比及數年興復可冀臣既臨許雒竊謂桓温可渡戍廣陵何充可移據淮泗赭圻路永進屯合肥伏願表御之日便決聖聽不可廣詢同異以乖事㑹兵聞拙速不聞工之乆也于是并發所統六州奴及車牛驢馬百姓嗟怨時欲向襄陽慮朝廷不許故以安陸為辭帝及朝士皆遣使譬止車騎參軍孫綽亦致書諌翼不從遂違詔輙行至夏口復上表曰臣近以胡寇有敝亡之勢暫率所統致討山北竝分見衆略復江夏數城臣等以九月十九日發武昌以二十四日達夏口輙簡卒捜乘停當上道而所調借牛馬來處皆逺百姓所蓄榖草不充竝多羸瘠難以渉路加以向冬野草漸枯往反二千或容躓頓輙便隨事籌量權停此舉又山南諸城每至秋冬水多燥涸運漕用功實為艱阻計襄陽荆楚之舊西接益梁與關隴咫尺北去雒河不盈千里土沃田良方城險峻水路流通轉運無滯進可以掃盪秦趙退可以保據上流臣雖不武意略短淺荷國重㤙志存立效是以受任四年唯以習戎為務實欲上慿聖朝威靈高略下籍士民義慨之誠因寇衰弊漸臨逼之而八年春上表請據樂鄉廣蓄穀以伺二寇之釁而值天高聽邈未垂察照朝議紛紜遂令微誠不暢自爾以來上參天人之證下採䧏俘之言胡寇衰滅其日不逺臣雖未獲長驅中原馘截㓙醜亦不可以不進據要害思攻取之冝是以輙量宜入沔徙鎮襄陽其謝尚王愆期等悉令還據本戍須到所在馳遣啓聞翼時有衆四萬詔加都督征討軍事師次襄陽大㑹僚佐陳旌甲親授弧矢曰我之行也若此射矣遂三起三疊徒衆属目其氣十倍初翼遷襄陽舉朝謂之不可議者或謂避衰惟兄氷意同桓温及譙王無忌賛成其計至是氷求鎮武昌為翼繼援朝議謂氷不宜出氷乃止又進翼征西將軍領南蠻校尉胡賊五六百騎出樊城翼遣冠軍將軍曹據擊于撓溝北破之死者近半獲馬百匹翼綏來荒逺務盡招納之宜立客舘置典賔參軍桓宣卒翼以長子方之為義城太守代領宣衆司馬應延為龍驤將軍襄陽太守叅軍司馬勲為建威將軍梁州刺史戍西城穆帝立兄氷卒以家國情事留方之戍襄陽還鎮夏口悉取氷所領兵自配以兄子統為潯陽太守詔使翼還督江州又領豫州刺史辭豫州復欲移鎮樂鄉詔不許繕脩軍器大佃積穀欲圖後舉桓温為安西將軍領䕶南蠻校尉穆帝永和二年帥征虜將軍周撫輔國將軍譙王無忌建武將軍袁喬伐蜀拜表輙行三年春三月乙卯攻成都府尅之及石季龍死温欲率衆北征先上疏求朝廷議水陸之宜乆不報時知朝廷仗殷浩等以抗已温甚忿之然素知浩弗之憚也以國無他釁遂得相持彌年雖有君臣之迹亦相覊縻而已八州士衆資調殆不為國家用聲言北伐拜表便行順流而下行達武昌衆四五萬殷浩慮為温所廢將謀避之又欲以騶虞幡住温軍内外噂􅊱人情震駭簡文帝時為撫軍與温書明社稷大計疑惑所由温即廻軍還鎮上䟽曰臣近親率所統欲北掃趙魏軍次武昌獲撫軍大將軍㑹稽王昱書説風塵紛紜妄生疑惑辭㫖危急憂及社稷省之惋愕不知所由形影相顧隕越無地臣以闇蔽忝荷重任雖才非其人職在靜亂㓂讐不滅國耻未雪幸因開泰之期遇可乗之㑹匹夫有志猶懷憤慨臣亦何心坐觀其弊故荷戈驅馳不遑寧處前後表陳于今歴年矣丹誠坦然公私所察有何纎介容此嫌忌豈醜正之徒心懷怵惕操弄虛説以惑朝聽昔樂毅竭誠垂涕流奔霍光盡忠上官告變讒説殄行姦邪亂徳乃歴代之常患存亡之所由也今主上富於春秋陛下以聖叡臨朝恭已委任責成羣下方寄㑹通於羣才布德信于遐荒况臣世蒙殊恩服事三朝身非羈旅之賔迹無韓彭之釁而反間起於胷心交亂過于四國此古賢所以歎息於既往而臣亦大懼于當年也今寇賊氷銷大事垂定晉之遺黎鵠立南望赴義之衆慷慨即路元㓙之命懸在漏刻而横議妄生成此貝錦使垂滅之賊復獲蘇息所以痛心絶氣悲慨彌深臣雖所存者公所務者國然外難未弭而内弊交興非臣本心陳力之志也進位太尉固讓不拜時殷浩至雒陽脩復園陵經涉數年屢戰敗器械都盡温復進督司州因朝野之怨乃奏廢浩自此内外大權一歸温矣安西將軍庾翼子爰之方之皆有翼風翼之疾篤也表爰之為輔國將軍荆州刺史尋為温所廢温既廢爰之又以征虜將軍劉惔監沔中軍事領義成太守代方之爰之竝遷于豫章南齊王洪軌明帝建武中為青冀二州刺史私集兵侵虜界奔敗結氣卒後魏崔僧淵為龍驤將軍南青州刺史坐擅出師無據檢覈幽禁後乃獲免唐薛萬徹為右領軍鎮黄龍後坐擅將兵出境被徵入朝楊猷為荆南節度澧朗兩州鎮遏使澧州刺史代宗大歴九年擅出境浮江下到郢州詔許赴汝州猷遂泝漢而上復州郢州俱閉城自守山南東道節度使梁崇義以兵拒之梁崇義為羽林射生從來瑱鎮襄陽沉黙寡言衆悦之累遷為偏禆瑱朝京師分使諸將戍福昌南陽瑱被誅戍者皆潰歸崇義時在南陽統歸師徑入襄陽與同列李昭薛南陽相讓為長不決諸將乃請曰兵非梁卿主之不可遂推崇義為帥無何崇義殺昭與南陽以脅衆心朝廷因授其節度焉于頔為襄陽節度使累遷檢校左僕射平章事封燕國公未幾不奉詔㫖擅移軍於南陽朝廷幾為之旰食冊府元龜卷四百三十九
