body:
  text: 册府元龜卷七百十九宋王欽若等撰幕府部公正清亷公正夫率性蹈道中立不倚毅然其色確乎其志其行已也強禦不畏其事上也詭隨靡縱斯烈士之所守也漢氏之後選辟尤盛故戎府之賓佐州郡之從事濟濟乎其多賢才焉乃有涖職剛果遇事忼慨臨難不茍當官而行靡念媮合未嘗曲意杜塞請託之徑勸激忠義之節持論守正造次由禮脅逼而無撓危險而靡憚乃至言之不用志之不伸投傳而去褁足而逝者盖有之矣斯皆含忠履潔立誠秉操守死而不貳者也顧豈肯枉道而事人希世而取容者哉詩曰靖恭爾位好是正直傳曰不為利回不為義疚盖古之益友者歟漢尹翁歸為河東督郵河東二十八縣分為兩部汾北翁歸部汾南所舉應法得其罪辜屬長吏雖中傷莫有怨者後漢樊準字㓜陵南陽人為州從事一云為郡功曹臨職介正不發私書衛羽為兖州從事時中常侍單超兄子康為濟陰太守負其勢大為貪放刺史第五種欲劾之聞羽素抗厲乃召羽謂曰聞公不畏強禦今欲相委以重事若何對曰願庶幾於一割羽出遂馳至定陶閉城門收康賓客親吏四十餘人七日中糾發其贜五六千萬種即舉奏一州震慄楊倫為大將軍梁商長史諫諍不合出補常山王傅呉祐為大將軍梁冀長史及冀誣奏大尉李固祐聞而請見與冀爭之不聽時扶風馬融在坐為冀章草祐因謂融曰李公之罪成于卿手李公即誅卿何面目見天下之人乎冀怒而起入室祐亦徑去冀遂出祐為河間相楊仁辟云徒桓虞府掾有宋章者貪奢不法仁終不與交言同席時人畏其節陳蕃字仲舉汝南平輿人也初仕郡舉孝亷刺史周景辟别駕從事以諫爭不合投傳而去何敞辟大尉宋由府時齊殤王子都鄉侯暢奔弔國憂上書未報侍中竇憲遂令人刺殺暢于城門屯衛之中而主名不立敞又說由曰劉暢宗室肺腑茅土藩臣來弔大憂上書湏報親在武衛致此殘酷奉憲之吏莫適討捕蹤迹不顯主名不立敞備數肱股職典賊曹故欲親至發所以糾其變而二府以為故事三公不與賊盗昔陳平生於征戰之世猶知宰相之分云外鎮四夷内撫諸侯使卿大夫各得其宜今二府執事不深惟大義或於所聞公縱姦慝莫以為咎惟明公運獨見之明昭然勿疑敞不勝所見請獨奏案由乃許焉二府聞敞行皆遣主者隨之於是推舉具得事實京師稱其正朱震字伯厚初為州從事奏齊陰太守單康贓罪并連單兄中常侍車騎將軍超桓帝收康下廷尉以譴超超詣獄謝三府諺曰車如雞栖馬如狗疾惡如風朱伯厚胡騰字子升桂陽人桓帝廵狩南陽以騰為䕶駕從事公卿貴戚車騎萬計徴求費役不可勝極騰上言天子無外乘輿所幸即為京師臣請以荆州刺史比司𨽻校尉南陽屬荆州故請以刺史比司𨽻臣自同都官從事帝從之都官從事主雒陽百官朝㑹與三府掾同也自是肅然莫敢妄有所干騰以此顯名盖勲為漢陽長史時武威太守倚恃權勢恣行貪横從事武都蘇正和案致其罪凉州刺史梁鵠畏懼貴戚欲殺正和以免其負乃訪之于勲勲素與正和有仇或勸勲可因此報隙勲曰不可謀事殺良非忠也乗人之危非仁也乃諫鵠曰夫紲食鷹鳶欲其鷙鷙而烹之將何用哉鵠從其言正和喜于得免而詣勲求謝勲不見曰吾為梁使君謀非為蘓正和也怨之如初王允太原人為郡吏郡人有路佛者少為名行而太守王球召以補吏允犯顔固爭球怒收允欲殺之刺史鄧盛聞而馳傳辟為别駕從事劉惠為冀州治中董卓廢少帝袁紹奔冀州紹舉兵刺史韓馥乃謀於衆曰助袁氏乎助董氏乎惠勃然曰興兵為國安問袁董孔融辟司徒楊賜府時隠覆官僚之貪濁者將加貶黜融多舉中官親族尚書畏廹内寵召掾屬詰責之融陳對罪惡言無阿撓韓嵩北海人避難南方劉表逼以為别駕轉從事中郎表郊祀天地嵩正諫不從漸見違忤魏牽招字子經冀州牧袁紹辟為督軍從事兼領烏丸突騎紹舍人犯令招先斬乃白紹奇其意而不見罪也徐奕為太祖東曹屬丁儀等見寵於時竝害之而奕終不為動或謂奕曰夫以史魚之直孰與遽伯玉之智丁儀方貴重冝思所以下之奕曰以公明聖儀豈得久行其偽乎且姦以事君者吾所能禦也子寜以他規我國淵辟太祖司空掾屬每於公朝論議常直言正色退無私焉袁渙避地江淮間為袁術所命術每有所咨訪渙常正議術不能抗然敬之不敢不禮也崔琰初為袁紹所辟後太祖領冀州牧又辟琰為别駕從事太祖謂琰曰昨案户籍可得三十萬衆故為大州也琰對曰今天下分崩九州幅裂二袁兄弟親尋干戈冀方蒸庶暴骨原野未聞王師仁聲先路存問風俗救其塗炭而挍計甲兵唯此為先斯豈鄙州士女所望於明公哉太祖改容謝之於時賔客皆伏失色邴原為五官將長史閉門自守非公事不出賈逵為文帝丞相主簿從至黎陽津渡者亂行逵斬之乃整高堂隆㤗山人太守薛悌命為督郵郡督軍與悌爭論名悌而呵之隆按劒叱督軍曰昔魯定見侮仲尼歴階趙彈秦筝相如進缶臨臣名君義之所討也督軍失色悌驚起止之蜀費詩為部永昌從事初漢陽縣降人李鴻來詣諸葛亮時蔣琬與詩在坐鴻謂亮曰孟達委仰明公無復已巳亮謂琬詩曰還都當有書與子度相聞詩進曰孟逹小子昔事振威不忠後又背叛先主反覆之人何足與書耶亮黙然不答呉劉繇東萊牟平人漢末州辟部濟南濟南相中常侍子貪穢不修繇奏免之潘濬字承明武陵漢夀人漢未荆州牧劉表辟為部江夏從事時沙羡長贓穢不修濬按殺之一郡震靖晉劉毅字仲雄魏平陽太守杜恕請為功曹沙汰郡吏百餘人三魏稱焉為之語曰但聞劉功曹不聞杜府君魏末辟司𨽻都官從事京邑肅然彈河南尹司吏不許曰攫獸之犬鼷鼠蹈其背毅曰既能攫獸又能殺鼠何損于犬投傳而去盧欽字子若初仕魏大將軍曹爽辟為掾爽弟嘗有所屬請欽白爽子弟不宜干犯法度爽深納之而罰其弟程衛為劉毅都官從事毅奏中䕶軍羊琇犯憲應死武帝與琇有舊乃遣齊王攸喻毅許之衛正色以為不可徑自馳車入䕶軍營収琇屬吏考問陰私先奏琇所犯狼籍然後言於毅由是名振遐邇百官厲行傅咸為司徒左長史在位多所執正豫州大中正夏侯駿上言魯國小中正司馬孔毓四移病所不能接賓求以尚書郎曹馥代毓旬日復上毓為中正司徒三却駿故據正咸以俊與奪惟意乃奏免駿大中正司徒魏舒駿之姻屬屢却不署咸據正甚苦舒終不從咸遂獨上舒奏咸激訕不直詔轉咸為車騎司馬王濬宏農人州辟河東從事守令有不廉潔者望風自引而去王銓為梁王肜大將軍叅軍肜嘗大會謂銓曰我從兄為尚書令不能啖大臠大臠故難銓曰公在此獨嚼尚難矣肜曰長史大臠為誰曰盧播是也肜曰是家吏隠之耳銓曰天下咸是家吏便恐王法不可復行肜又曰我在長安作何等不善因指單衣補􅎻以為清銓答曰朝野望公舉薦賢才使不仁者逺而位居公輔單衣補􅎻以此為清無足取也肜有慙色羊亮為太傅楊駿叅軍時京兆多盗竊駿欲更重其法盗百錢加大辟請官屬會議亮曰昔楚江一母失布以為盗由令尹公若無欲盗宜自止何重法為駿慙而止卞敦字仲仁為東海王越主簿王彌逼雒敦及胡母輔之勸越擊王彌而王衍潘滔共執不聽敦庭爭苦至衆咸壯之陳頵字延思陳國苦人州辟部從事劾按沛王韜獄未竟會解結代楊凖為刺史韜因河間王顒屬結結至大㑹問主簿史鳯曰沛王貴藩州據何法而擅拘邪時頵在坐對曰甲午詔書刺史銜命國之外臺其非所部而在境者刺史竝糾事徴文墨前後列上七被詔書如州所劾無有違謬結曰衆人之言不可妄聽宜依法窮竟陶侃為盧江郡主簿㑹州部從事之郡欲有所按侃閉門部勒諸吏謂從事曰若鄙郡有違自當明憲直繩不宜相逼若不以禮吾能禦之從事即退何充為大將軍王敦主簿敦兄含時為廬江郡貪汙狼藉敦嘗於座中稱曰家兄在郡定佳廬江人士咸稱之充正色曰充即廬江人所聞異于此敦黙然傍人皆為之不安充晏然自若由是忤敦左遷東海王文學宋劉敬宣晉末為會稽王元顯驃騎從事中郎元顯驕滛縱肆羣下化之敬宣每預燕會未嘗飲酒調戲之來無所酬答元顯甚不悦吉翰字休文為長沙王道璘驃騎中兵叅軍從事中郎為將佐十餘年清謹剛正甚為高祖所知賞劉湛為廬陵王義貞車騎長史義貞居高祖憂使帳下備膳湛禁之義貞乃使左右人索魚肉珍羞於齋内别立厨帳會湛入因命臑酒炙車螯湛正色曰公當今不宜有此設義貞曰旦甚寒一盌酒亦何傷長史事同一家望不為異酒既至湛因起去曰既不能以禮自處又不能以禮處人沈演之為彭城王義康别駕從事史領本郡中正深為義康所待故在府州前後十餘年後劉湛劉威等結黨欲排廢尚書僕射殷景仁演之雅㐲正義與湛等不同湛因此讒之於義康嘗因論事不會義康㫖義康變色曰自今後我不復相信演之與景仁素善盡心於朝廷太祖甚嘉之袁淑為彭城王義康軍司時祭酒劉湛淑從母兄也欲其附已而淑不以為意由是大相乖失以久疾免官張暢為南譙王義宣長史及義宣有異圖蔡超等以暢人望勸義宣留之乃解南蠻校尉以授暢加冠軍將軍領丞相長史暢遣門生荀僧寶下郡因顔竣陳義宣釁狀僧寶載私貨止巴陵不時下㑹義宣起兵津路斷絶遂不得前義宣將為逆使嬖人翟靈寶告暢暢陳必無此理請以死保之靈寶還白義宣云暢必不可廻請殺以狥衆賴丞相司馬竺超民得免進號撫軍别立軍部以收人望暢雖署文檄飲酒常醉不省其事阮韜為兖州别駕時刺史江夏王義恭起逆求其資費錢韜曰此朝廷物執不與南齊劉璡建元初為武陵王瞱冠軍征虜叅軍瞱與寮佐飲自割鵝炙璡曰應刃落爼膳夫之事殿下親執鸞刀下官未敢安席因起請退蕭暢為始安王遥光諮議叅軍遥光初起兵問暢暢正色拒折不從乃與撫軍長史沈昭略潛自南出濟淮還臺梁孫謙仕宋為征北司馬府主簿建平王將稱兵患謙彊直託事遣使京師然後作亂及建平誅遷左軍叅軍夏侯詳為齊明帝豫州别駕及帝輔政招令出都將大用之每引詳及鄉人裴叔業日夜與語詳輒末畧不酬帝問叔業叔業告詳詳曰不為福始不為禍先由此微有忤出為征虜長史義陽太守庾蓽仕齊為荆州别駕初梁州人益州刺史鄧元起功勲甚著名地卑𤨏願名挂士流時始興忠武王憺為州將元起位已高謂挂籍不先州官則不為鄉里所悉元起上籍出身州從事憺命蓽用之蓽不從憺大怒責之曰元起已經我府卿何為茍惜從事蓽曰府是尊府州是蓽州宜湏品藻憺不能折遂止庾喬蓽子也為荆州别駕時元帝為荆州刺史而州人范興話以寒賤仕加九流選為州主簿又皇太子令及之故元帝勒喬聽興話到職及屬元日府州朝賀喬不肯受列曰庾喬忝為端右不能與小人范興話同處興話羞慙還鄉憤卒世以喬為不墜家風沈瑀為尋陽太守仍為信威蕭頴逹長史太守如故瑀性崛強每忤頴逹頴逹銜之天監八年因入諮事辭又激厲頴逹作色曰朝廷用君作行事邪瑀出謂人曰我死而後已終不能傾側面從是日於路為盗所殺多以頴逹害焉子續累訟之遇頴逹亦尋卒由是遂不窮竟後魏公孫同慶篤厚亷慎為李崇驃騎府外兵叅軍隨崇北征有方直之稱陽固為大將軍宋王劉㫤征義陽法曹行叅軍昶嚴暴治軍甚急三軍戰慄無敢言者固啟諫并面陳事冝昶大怒欲斬之使監當攻道固在軍勇決志意閑雅了無懼色昶甚奇之費穆字郎興為涇州平西府長史時刺史皇甫集靈太后之元舅恃外戚之親多為非法穆正色規諫集亦憚之轉安定太守仍為長史辛少雍為高陽王雍田曹叅軍少雍性清正不憚彊禦積年久訟造次決之請託路絶時稱堅明辛雄為清河王懌司徒左曹叅軍竝當煩劇爭訟填委雄用心平直加以閑明政事經其斷割莫不悅服懌重之每謂人曰必也無訟乎辛雄有焉由是名顯懌遷太尉又為記室叅軍鹿悆為貴州彭城王劭府司馬廣川人劉鈞清河人房湏反劭遣悆監州軍討之戰於商山頗有所㨗將統皆劭左右擅增首級妄請賞帛悆面執不與劭弗從悆勃然作色曰竭志立言為王為國豈悆家事不辭而出劭追而謝焉竊勲者放言噂􅊱欲加私害悆聞而笑之不以介意羊敦為梁州别駕公平正直見有非法敦終不判署于烈為司空長史太傅錄尚書北海王詳親尊權重將作大匠王遇多隨詳所欲而給之後因公事烈于詳前謂遇曰殿下國之周公阿衡王室所湏財用自應關㫖何至阿諛附勢損公惠私也遇既不寜詳亦慙謝北齊盧勇為高祖丞相主簿屬山西霜儉運山東租輸皆令載實違者治罪令勇典其事瑯邪公主虚僦千餘車勇繩劾之公主訢于高祖而勇守法不屈高祖謂郭秀曰盧勇懍懍有不可犯之色真公直人也方當委之大事豈直納租而已杜弼為大行臺郎中相府法曹辛子炎議事云湏取署子炎讀署為樹高祖大怒曰小人都不知避人家諱弼進曰禮二名不偏諱子炎因䝉釋宥世子在京聞之語楊愔曰王左右賴有此人方正庶天下皆䝉其利豈獨吾家也李繪天保初除司徒右長史繪質性方重未嘗趨事權門以此久而沉屈隋李雄為鴻臚卿開皇中晉王出鎮并州高祖以雄為河北行臺兵部尚書雄當官正直侃然有不可犯之色王甚敬憚吏民稱焉王韶為晉王并州行臺右僕射韶性剛直王甚憚之每事詔詢不敢違於法度元巖為兵部尚書封平昌郡公蜀王秀鎮益州以巖為總管長史王性好奢侈嘗欲取獠口以為閹人又欲生剖死囚取膽和為藥巖皆不奉敎排閣切諫王輒謝而止憚巖為人每循法度蜀中獄訟巖所裁斷莫不悅服其有得罪者相謂曰平昌公與吾何怨焉帝甚嘉之賞賜優洽房彦謙年十八屬齊廣寜王孝衍為齊州刺史辟為主簿時禁網疎濶州郡之職尤多縱弛及彦謙在職清簡守法州境肅然莫不敬憚唐杜景儉為益州録事叅軍時隆州司馬房嗣業除益州司馬除書未到欲即視事又鞭笞僚吏特以威勝景儉謂曰公雖受命為此州司馬而州司莫受命也何藉數日之禄而不待九重之㫖即欲視事不亦急耶益怒景儉又曰今公持咫尺之制真偽未知即欲攬一州之權誰敢相保揚州之禍非此類邪遂叱左右各罷散房慙赧而止俄有制除嗣業荆州司馬竟不得視事人吏為之語曰錄事意與天通益州司馬折威風景儉由是稍知名韋倫天寶末為劒南節度行軍司馬時中官及禁軍人相次到蜀多所侵暴號為難理倫清儉率身以化之蜀川咸賴其理竟遭中官毁譖貶衡州司户穆寜上元二年為殿中侍御史佐鹽鐵轉運使副元帥李光弼以餉運不繼或惡寜者誣譖於光弼且言將殺寜以脅之寜直抵徐州見光弼喻以義理不為撓折光弼深敬之寜得行職崔祐甫為永平軍行軍司馬尋知本軍京師留後性剛直無所容受遇事不回高郢為朔方節度郭子儀掌書記儀嘗怒從事張曇奏殺之郢極言爭救遂忤其意奏貶猗氏丞王宗為夀州團練副使貞元十五年夀州刺史楊承恩老耄多病其政事委於男澄及判官卿侃孔目官林扆等至是疾甚侃等乃與將校等謀以澄為刺史宗知之密與大將軍田瑀等議曰楊大夫暫疾耳當即痊平脫有不諱即朝廷自除刺史豈可便令楊澄知事也遂囚繫澄侃等驛騎以聞故授宗權知夀州刺史事扆侃等得罪尋加宗御史中丞李藩為東都留守杜亞從事雒中盗發有誣牙將令狐運者亞信之拷掠竟罪藩知其寃爭之不從辭出後獲真盗宋瞿曇藩益知名薛戎少有學術不求聞逹居陽羡山辟江西從事府罷歸山栁冕為福建觀察表戎為從事會泉州闕刺史冕署戎權領州事是時姚南仲節制鄭滑從事馬摠以其直道為監軍使誣奏貶泉州别駕冕附㑹權勢將搆成摠罪使戎案問曲成之戎以摠無辜不從冕意别白其狀戎還自泉州冕盛氣據衙令引戎入戎叱引者曰安有觀察使據衙而見賓客哉遂歴東廂從容而入冕度勢未可屈徐起以見一揖而退又搆其罪具以狀聞置戎于佛寺環以武夫恣其侵辱如是累月誘令成摠之罪戎操心如一竟不動揺杜佑鎮淮南知戎之寃乃上其表發書諭之戎難方解遂辭職寓居於江湖間賈直言居河朔間始以孝聞鄉里得齒士類後為李師道賓佐頗以逆順之理規正之師道前後將加危害者數四及師道就戮劉悟於禁錮之所引為上介移鎮東郡上黨皆在府幕悟有纖毫之失未嘗緘言於是正直之譽頗洽羣聽朝廷以謀議大夫徴之詔下之時無不稱當韓愈貞元中叅故相董晉汴州幕府後為張建封徐州從事言多率直無所畏避孔戡元和初為昭義軍節度盧從史從事從史狂恣不道戡以言直不從引去及從史敗時已死贈司勲員外郎後唐譚善逹為寧江軍節度使西方鄴判官鄴為政貪虐善逹每箴其失鄴忿形於色令左右告善逹受人金下獄拷掠善達亦剛詞多不遜遂殺於獄中無幾寢疾時見善逹入其户俄卒於治所劉賛明宗朝為刑部侍郎時秦王為元帥秦王府判官太子詹事王居敏與賛鄉曲之舊以秦王盛年自恣湏朝中選端士納誨冀其稟畏乃薦賛明宗授秘書監兼秦王傅賛性雍和與物無忤居官畏慎人若以私故干之雖權豪不能移其操及在秦府因事或發正論王側目怒視殊無下賢之色或與諸僚候於外屏有竟日不召而不得食而指闕之謀故不預聞及秦府得罪或傳㫖安慰言止於朝降而賛已被麻衣驢乘在門聞其安慰曰此存撫之情也豈有國君之嗣一旦舉室塗地而叅佐朝降免死幸也俄而臺吏示勅長流即時詣貶所在嵐州踰年放歸田里晉符䝉倅常山戎事安重榮在鎮所為不法䝉多否之為左右所間幾罹其禍清亷夫委之貨財不虧其義儒者之行也約失者鮮儉則固先民之訓也由漢而下盛幕府之選士之負氣節懷智術者多歸焉故有敦尚名檢砥礪亷隅内懷耿介無所遷染以至奉身居家儉而有度輕財辭賂舉無矯飾受賜不思於茍得安貧未聞於改樂自非道義中積志尚絶俗又惡能確然秉操言不隕獲者哉漢趙廣漢涿郡蠡吾人少為郡吏州從事以廉潔通敏下士為名後漢王良為大司徒司直在位恭儉妻子不入官舍布被瓦器聞人襲為郡督郵行則負擔卧則無被連麕皮以自覆不受人之費雷義字仲公豫章鄱陽人初為郡功曹嘗濟人死罪罪者後以金二斤謝之不受金主伺義不在密投金於承塵上後葺理屋宇乃得金金主已死無所復還義乃以付縣曹范丹辟公府步行無被囊自隨蓋勲為漢陽長史中平初黄巾賊起故武威太守黄㒞被徴失期刺史梁鵠欲奏誅㒞勲為言得免㒞以黄金二十斤謝勲謂㒞曰吾以子罪在八議故為子言吾豈賣評哉終辭不受魏王修為袁譚别駕袁氏政寛在職勢者多蓄聚太祖破鄴籍沒審配等家財物貨以萬數及破南皮閱修家榖不滿十斛有書數百卷太祖歎曰士不妄有名乃辟為司空掾行司金中郎將晉薛亷為元帝丞相長史甚勤王事以上佐祿優每自約損取周而已南齊王延之仕宋為司徒建安王休仁左長史加寧朔將軍延之清貧居宇穿漏褚淵往候之見其如此具啟明帝帝即勅有司為搆三間齋室梁范岫仕齊為蔡興宗荆州主簿興宗將卒以岫貧乏遺㫖賜錢二十萬岫辭拒之庾蓽仕齊為荆州别駕前後紀綱皆致富饒蓽再為之清身率下杜絶請託布被蔬食妻子不免飢寒明帝聞而嘉焉手勅褒美州里榮之庾黔婁為鄧元起益州長史及成都平城中珍寶山積元起悉分與僚佐唯黔婁一無所取元起惡其異衆厲聲曰長史何獨為高黔婁示不違之請書數篋蕭介為武陵王揚州長史在職清白為朝廷所稱蕭洽為南徐州中從事近畿重鎮職吏數千人前後居者皆致巨富洽清身率職饋遺一無所受妻子不免飢寒江革歴官八府長史四王行事旁無姬侍家徒壁立世以此高之後魏高允神嘉三年大武舅陽平王杜超行征南大將軍鎮鄴以允為從事中郎年四十餘矣超以方春而諸州囚多不决乃表允與中郎呂熙等分詣諸州共評獄事熙等皆以貪穢得罪唯允以清平獲賞劉懋為太尉司馬家甚清貧亡之日家徒四壁而已太傅清河王懌及當時才雋莫不痛惜之張普惠為任城王澄叅軍及澄轉揚州普惠又為開府主簿歴佐二藩甚有聲譽旋京之日裝束藍縷澄賚絹二十疋以充行資鹿悆為真定公元子直國中尉子直出鎮梁州悆隨之州州有兵糧和糴者靡不潤屋悆不取子直強之終不從命平恒為幽州别駕亷貞寡欲不營資産衣食至常不足妻子不免飢寒温子昇為廣陽王東北道行臺郎中高車破走珍寶盈滿子昇取絹四十疋北齊張耀為中軍大都督韓軌府長史及軌除瀛冀二州長史又以耀為軌諮議叅軍後為御史所劾州府僚佐及軌左右以贓罪挂網者百有餘人唯耀以清白獨免徴為丞相府倉曹後周裴文舉為齊王憲府司錄憲出鎮劒南復以文舉為益州總管府中郎蜀土沃饒商販百倍或有勸文舉以利者文舉答之曰利人為貴莫若身安身安則道隆非貨之謂是以不為非惡財也憲矜其貧窶每欲資給之文舉常自謙遜辭多受少隋趙軌開皇初為齊州别駕有能名其東隣有桑葚落其家軌遣人悉拾還謂其諸子曰吾非以此求名意者非機杼之物不願侵人汝等宜以為誡在州考績連最持節使者郃陽公梁子恭上狀文帝賜以米帛甚優令入朝父老將送者各揮涕曰别駕在官水火不與百姓交是以不敢盃酒相送公請酌一盃水奉餞軌受飲之韋師平陳之役領元帥掾陳國府藏悉委於師秋豪無犯稱為清白陳孝意大業中為鴈門郡丞時政刑日紊長吏多贓汚孝意清節彌勵敬肅大業末為潁川郡丞去官之日家無餘財唐崔義元清河人大業末說賊帥黄君漢歸國拜懷州總管府司馬王世充遣將高毗畧河内義元擊敗之君漢將分所獲金帛義元拒而不受杜暹為婺州叅軍秩滿將歸州吏以紙三萬餘張以贈之暹唯受一百餘悉還之時州僚别者見而歎曰昔清吏受一文錢復何異也韋倫天寶末為劍南節度行軍司馬時中官及禁軍相次到蜀多所侵暴號為難理倫清儉率身以化之蜀川咸賴其理晉李遐天福初為西京留守判官兼監西京左藏庫㑹張從賓作亂使人輦取金帛以賞羣逆遐曰不奉詔書安敢承命遂為其下所害漢王松晉高祖鎮太原時松為節度判官晉祖令監帑廩以清苦見重周馮道初為河東節度掌書記所得廩賜不置别庖皆與從者共之册府元龜卷七百十九
