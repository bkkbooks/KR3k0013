body:
  text: 册府元龜卷二百六十七宋王欽若等撰宗室部孝行有若有言曰孝弟也者其為仁之本歟矧乃公族之賢宗室之懿躬履至行出於天性或承顏侍膳就養無方或攀慕時思永懷罔極因心表於童丱寧戚逮於毁傷斯皆國風忠厚之美人倫模範之盛傳所謂常守富貴能保社稷者諸侯之孝也又何止不驕不溢云乎哉固將錫類以貽休興仁而成化矣周公旦武王之弟以太王所居周地為其采邑故謂周公自文王時旦為子仁孝異於羣子漢梁孝王文帝之子為人慈孝每聞太后病口不能食常留長安侍太后太后亦愛之楚孝王囂成帝河平中入朝被疾天子聞之下詔曰蓋聞天地之性人為貴人之行莫大於孝楚王囂素行孝順朕甚嘉之河間惠王良循其祖獻王之行母大后薨服喪如禮哀帝下詔褒揚曰河間王良喪大后三年為宗室儀表其益封萬户後漢淄川王終泗水王歙之子歙薨終居喪思慕哭泣二十餘日亦薨東海孝王臻頃王肅之子臻及弟蒸鄉侯儉並有篤行母卒皆吐血毁眥眥或作脊至服練紅兄弟追念頃王初喪幼小哀禮有闕因復重行喪制既祥之後而服練也練衣縓縁黄裏縓即紅也琅邪孝王京光武之子性恭孝東平孝王敞喪母至孝國相陳珍上其行狀任城王博有孝行喪母服制如禮清河王慶明帝之子母宋貴人為竇后所譖自殺慶常以貴人葬禮有闕每竊感恨至四節伏臘輒祭於私室竇氏誅後謂竇憲伏誅後始使乳母於城北遙祠及竇大后𦵏慶求上冢致哀和帝許之詔大官四時給祭具慶垂泣曰生雖不獲供養終得奉祭祀私願足矣欲求作祠堂恐有自同恭懷梁后之嫌遂不敢言常泣向左右以為没齒之恨後上言外祖母王年老遭憂病下土無醫藥願乞詣雒陽療疾於是詔宋氏悉歸京師和帝厭世慶號泣前殿嘔血數升因以發病及病篤謂宋衍等曰清河埤薄欲乞骸骨於貴人冢傍下棺而已朝廷大恩猶當應有祠室庶母子并食魂靈有所依庇死復何恨乃上書於大后曰臣國土下濕願乞骸骨下從貴人於樊濯雖没且不朽矣及今口目尚能言視冒昧干請命在呼吸願䝉哀憐遂薨濟北孝王次釐王安國之子九嵗喪父至孝桓帝建和元年梁太后下詔曰濟北王次以幼年守藩躬履孝道父没哀慟焦毁過禮草廬土席衰杖在身頭不枇沐體生瘡腫諒闇已來二十八月自諸國有憂未之聞也朝廷甚嘉焉書不云乎用徳彰厥善詩云孝子不匱永錫爾類今增次封五千戸廣其土宇以慰孝子惻隱之勞彭城孝王和頃王定之子性至孝太夫人薨行喪陵次毁脊過禮傅相以聞桓帝詔使奉牛酒迎王還宫魏長平侯休太祖族子文帝時為征東將軍領揚州刺史休喪母至孝帝使侍中奪喪服使飲酒食肉休受詔而形體益憔悴乞歸譙葬母帝復遣越騎校尉薛喬奉詔節其憂哀使歸家治喪一宿便𦵏𦵏訖詣行在所帝見親自寛慰之其見愛重如此陳王志思王植之子遭母憂居喪盡哀因得疾病喜怒失常晉扶風武王駿宣帝子有孝行母伏太妃隨兄亮在官駿常涕泣思慕若聞有疾輒憂懼不食或時委官定省新野王歆駿之子謹身履道母臧太妃薨居喪過禮以孝聞齊獻王攸文帝之子景帝無子攸為嗣景帝山陵攸年十歲哀動左右大見稱歎襲封武陽侯奉景獻羊后于别第事后以孝聞及居文帝喪哀毁過禮杖而後起左右以稻米乾飯雜理中丸進之攸泣而不受太后自往勉喻曰若萬一加以他疾將復如何宜逺慮深計不可專守一志常遣人逼進飲食後太后有疾既瘳武帝與攸奉觴上壽攸以太后前疾危篤因歔欷流涕帝有愧焉攸侍帝病有憂戚之容時人以此稱歎之攸至性過人有觸其諱者輒泫然流涕雖武帝亦憚之每引之同處必擇言而後發攸子武閔王冏初攸有疾武帝不信遣太醫診候皆言無疾及攸薨帝往臨喪冏號踊訴父病為醫所誣詔即誅醫繇是見稱遂得為嗣成都王穎武帝子與齊王冏誅趙王倫迎太子反正穎遂歸鄴遣信與冏别冏大驚馳出送穎至七里澗及之穎住車言别流涕不及時事惟以太妃疾苦形於顏色百姓觀者莫不傾心髙陽元王珪安平獻王孚之子為北中郎將督鄴城守諸軍事泰始中入朝以父孚年髙乞留供養拜尚書遷僕射長沙厲王乂武帝子年十五居武帝喪孺慕過禮㑹楚王瑋奔喪諸王皆近路迎之乂獨至陵所號慟以俟瑋武陵忠敬王遵威王晞之子初襲封新寧時年十二受拜流涕哀感左右東安王繇事親孝居喪盡禮宋建平王景素宣簡王宏之子性甚仁厚事母太妃朝夕不違侍養太妃有不安景素傍行蓬髪與人言喣喣常傷其情南齊豫章文獻王嶷髙帝第二子居帝喪哀號過度眼耳俱出血祁陽縣侯子範嶷子也有孝性丁所生母憂居喪以毁聞武陵昭王曄髙帝第五子母羅氏從帝淮隂以罪誅曄年四嵗思慕不異成人每慟吐血髙帝勅武帝曰三昧至性如此恐不濟汝可與共住每抑割之三昧曄小字也始興王鑑髙帝第十子年八嵗喪所生母號慕過人數日中便至骨立豫章文獻王聞之撫其身嗚咽謂髙帝曰此兒操行異人恐其不濟帝亦悲不自勝衡陽王鈞髙帝第十一子年五嵗所生區貴人病便加慘悴左右依常以五色䬳飴之不肯食曰須待姨差年七嵗出繼衡陽元王見髙帝未拜便涕泗横流高帝執其手曰伯叔父猶父勿怨所以令汝出繼以汝有意堪奉烝嘗故耳即敕外如先給通幰車雉尾扇等事事依正王區貴人卒居喪盡禮服闋尫羸骨立登車三上不能升乃止典籖曹道人具以聞武帝即幸鈞邸見之愴然還謂禇蓁曰昨見衡陽猶竒毁損卿可數相撫悦先是貴人以花釵厨子并剪刻錦繡中倒炬鳯凰蓮芰星月之屬賜鈞以為玩弄貴人亡後每嵗時及朔望輒開視再拜哽咽見者皆悲宜都王鏗髙帝第十六子生三歲喪母及有識問母所在左右告以早亡便思慕蔬食自悲不識母常祈請幽㝠求一夢見至六嵗遂夢死見一女人云是其母鏗泣向舊左右説容貌衣服事皆如平生聞者莫不歔欷河東王鉉髙帝第十九子年三四嵗帝晝卧纒髪鉉上髙帝腹上弄繩髙帝因以繩賜鉉及喪帝後鉉以寶函盛繩歲時輒開視嗚咽流涕人才至凡而有此一至竟陵王子良武帝第二子帝為贑縣時與裴后不諧遣人般送后還都邑已登路子良時年少在庭前不悦帝謂曰汝何不讀書子良曰孃今何處何用讀書帝異之即詔后還縣晉安王子懋武帝第七子年七嵗時母阮淑媛嘗病危篤請僧行道有獻蓮花供佛者衆僧以銅甖盛水漬其莖欲花不萎子懋流涕禮佛曰若使阿姨因此和勝願諸佛令花竟齋不萎七日齋畢花更鮮紅視甖中稍有根鬚當時稱其孝感南海王子罕武帝第十一子母樂容華嘗寢疾子罕晝夜禱祈於時以竹為燈纉照夜此纉宿昔枝葉大茂母病亦愈咸以為孝感所致主簿劉鬷及侍讀賀子喬為之賦頌當時以為美談南豐伯穎胄高帝從祖弟赤斧之子遭父喪感脚疾數年然後能行武帝有詔慰勉賜醫藥新呉侯景先高祖從子少遭父敬宗喪有至性帝嘉之梁安成康王秀高祖弟年十二所生母呉太妃亡秀母弟始興王憺時年九嵗並以孝聞居喪累日不進飲太祖親取粥授之哀其早孤命側室陳氏並母二子陳亦無子有母徳視二子如親生焉臨川靜惠王宏高祖弟也宏所生母陳太妃寢疾宏與母弟南平元襄王偉侍疾衣不解帶每二宫參問輒對使泣涕及太妃薨水漿不入口者五日髙祖每臨幸慰勉之偉雖奉詔而毁瘠殆不勝喪先是齊末宏避難潛伏與太妃異處每遣參太妃消息或謂宏曰逃難須密不宜往來宏銜淚答曰乃可無我不可於此事蹔廢鄱陽忠烈王恢髙祖弟也有孝性初鎮蜀所生費太妃猶停都下後於都不豫恢未之知一夜忽夢還侍疾既覺憂惶便廢寢食俄而都信至太妃已瘳後又有目疾乆廢瞻視有北度道人慧龍得治眼術恢請之既至空中忽見聖僧及慧龍下鍼豁然開朗咸謂精誠所致恢孫宜豐侯修性至孝年十二丁所生徐氏喪自荆州反𦵏中江風前後部伍多致沈溺修抱柩長號血淚俱下隨波搖蕩終得無他𦵏訖因廬墓次先時山中多猛獸至是絶跡野鳥馴狎棲宿簷宇武帝嘉之以頒告宗室始興忠武王憺髙祖弟始數嵗所生母呉太妃卒憺哀感傍人後為荆州刺史慈母陳太妃薨水漿不入口六日居喪過禮髙祖優詔勉之使攝州任憺子新喻侯映為淮南太守丁父憂隆冬席地哭不絶聲不嘗穀粒惟飲冷水因患癥結除太子洗馬映弟上黄侯曄自憺不豫侍疾衣不釋帶言與淚并憺薨杖而後起服闋後居太后憂泣血三年桂陽嗣王象髙祖兄子容止閒雅事所生母以孝聞南康簡王績髙祖子為江州刺史丁董淑儀憂居喪過禮髙祖手詔勉之使攝州任固求解職乃徵授安右將軍領石頭戍軍事尋加䕶軍羸瘠弗堪視事績子通理生十旬而績薨至三嵗能言見内人分散涕泣相送通理問其故或曰此簡王宫人喪畢去耳通理便號泣悲不自勝諸宫人喪畢見之莫不傷感為之停者三人焉服闋後見高祖又悲泣不自勝高祖為之流涕謂左右曰此兒大必為竒士南海王大臨簡文帝子年十一遭左夫人憂哭泣毁瘠以孝聞義安王大昕簡文帝子始四嵗母陳夫人卒便哀慕毁顇有若成人及簡文居髙帝喪大昕奉慰嗚咽不能自勝左右見之莫不掩泣西昌侯藻髙祖兄長沙王懿之子懿仕齊為東昏侯所害藻常布衣蒲席不食鮮禽非在公庭不聴音樂髙祖每以此稱之呉平侯景髙祖從父弟父崇之為東陽太守遇害景八歲隨父在郡居喪以毁聞景子勵為太子洗馬以母憂去職殆不勝喪每一思至必徒步之墓或遇風雨仆卧中路坐地號慟起而復前家人不能禁景特所鍾愛曰吾百年後其無此子乎使左右節哭服闋除太子中舎人景薨於郢鎮或以路逺秘其㓙問以疾漸為辭勵乃奔波届於江夏不進水漿七日廬於墓所親友隔絶會叔父曇下詔獄勵乃率昆弟羣從同詣大理雖門生故吏莫能識之後襲封呉平侯對揚王命悲慟嗚咽傍人亦為隕涕陳鄱陽王伯山文帝子也丁所生母憂居喪以孝聞後主嘗幸吏部尚書蔡徵宅因往弔之伯山號慟殆絶因起為鎮衛將軍仍謂羣臣曰鄱陽王至性可嘉又是西第之長豫章已兼司空其亦須遷太尉未及發詔而伯山薨後魏任城康王雲太武帝弟始五歲恭宗薨太武長子也文成追尊為景穆皇帝廟號恭宗號哭不絶聲太武聞之而呼抱之泣曰汝何知而有成人之意後為征東大將軍開府徐州刺史以太妃蓋氏薨表求解任獻文不許雲悲號慟疾乃許之雲子文宣王澄字道鏡少而好學父康王薨澄居喪以孝聞後為征北大將軍定州刺史孟太妃薨居喪毁瘠當世稱之澄子東阿文烈公順為太常少卿以父憂去職哭泣嘔血身自負土時年二十五便有白髮免喪抽去不復更生世人以為孝思所致澄初為吏部尚書兼右僕射順後亦為之順上省登階向榻見榻甚故問都令史徐仵起仵起曰此曽經先王坐順即哽塞涕泗交流乆而不能言遂令換之南安王楨景穆之子也性忠謹事母以孝聞高祖賜帛千匹以褒之彭城王勰字彥和獻文帝之子生而母潘氏卒其年獻文喪及有所知啓求追服文明太后不許乃毁瘠三年弗參吉慶孝文大竒之臨淮王提為梁州刺史以貪縱削除加罰徙配北鎮乆之提子員外郎穎免冠請解所居官代父邊戍孝文不許提子濟南王昌好文學居父母喪哀號孺慕悲感行人昌子彧詔封濟南王為東道行䑓會爾朱榮入雒殺害元氏遂奔於梁及知莊帝踐祚彧以母老請還辭㫖懇切梁武帝惜其人才又難違其意遣其僕射徐勉私勸彧留彧曰死猶願北況於生也乃以禮遣彧性至孝自經違離不進酒肉容貎憔悴見者傷之艾陵伯萇子子華母房氏曾就親人飲食夜還大吐人以為中毒母甚憂懼子華遂掬吐盡噉之其母乃安饒陽男遙京兆王子推之子為左衛將軍宣武初遭所生母憂表請解任詔以餘尊所厭不許馮翊王亨年十二恭帝在儲宫引為交友大統末襲父季爵邑千戸授拜之日悲痛不能自勝北齊清河王岳神武從父弟仕魏為京畿大都督元象元年遭母憂去職岳性至孝盡力色養母若疾衣不解帶及遭喪哀毁骨立神武深以憂之每日遣人勞勉宣城郡公叡髙祖弟趙郡王琛之子生三旬而孤為髙祖所愛養於宫中令游娘母之至四歲未嘗識母其母則魏華陽公主也有鄭氏者叡母之從母姊妹之女戯語叡曰汝是我姨兒何因倒親游氏叡因問訪遂精神不怡髙祖甚以為怪疑其感疾欲命醫看之叡對曰兒無患苦但聞有所生欲得蹔見髙祖驚曰誰向汝道耶叡具陳本末髙祖命元夫人令就宫與叡相見叡前跪拜因抱頸大哭髙祖甚以悲傷語平秦王歸彥曰此兒天生至孝我兒子無有及者遂為休務一日叡初讀孝經至資於事父輒流涕歔欷十歲喪母髙祖親送叡至領軍府為叡發喪舉聲殞絶哀感左右三日水漿不入口髙祖與武明婁皇后殷勤敦譬方漸順㫖居喪盡禮持佛像長齋至於骨立杖而后起髙祖令常山王共卧起日夜説喻之并勅左右不聴進水雖絶清潄午後輒不肯食繇是髙祖食心喚叡同案其見愍惜如此居髙祖喪哭泣嘔血及壯將為婚娶而貎有戚容世宗謂之曰我為爾娶鄭述祖女門閥甚髙汝何所嫌而精神不樂叡對曰自痛孤遺常深膝下之慕方從昬冠彌用感切言未卒嗚咽不自勝世宗為之憫然天統中追贈叡父琛假黄鉞母元氏趙郡王妃諡曰貞昭華陽長公主如故有司備禮儀就墓拜授時隆冬盛寒叡跣步號哭面皆破裂嘔血數升及還不堪參謝帝親就第㸔問博陵王濟神武第十二子嘗從文宣巡幸在路忽憶太后遂逃歸帝怒臨以白刃因此驚怳平秦王歸彥高祖族弟嫡母康氏所生母王氏並為太妃善事二母以孝聞是時南陽王綽兄弟皆呼父為兄兄嫡母為家家乳母為姊姊婦為妹妹後周邵恵公顥文帝之長兄性至孝居徳皇后喪哀毁過禮徳皇帝與衛可孤戰墜馬顥與數騎奔救乃免顥遂戰没保定初追封焉顥曾孫豳公廣母李氏以廣患彌年憂而成病因此致卒廣居喪更加綿篤及以毁薨世稱母為廣病廣為母死慈孝之道極於一門高祖素服親臨百僚畢集故吏儀同李充信等上表論其忠孝其宿志期以窀穸之禮庶存儉約伏願聴許詔從之遂贈本官加太保塟於隴右齊王憲所生達步干氏蠕蠕人建徳三年册為齊國太妃憲有至性事親以孝聞太妃舊患風熱屢經發動憲衣不解帶扶持左右憲或東西從役每心驚其母必有疾乃馳使參問果如所慮隋趙王杲煬帝幼子性至孝嘗見帝風動不進膳杲亦終日不食又蕭后當灸杲先請試炷后不許之杲泣請曰后所服藥皆蒙嘗之今灸願聴嘗炷悲咽不已后竟為其停灸繇是尤愛之燕王倓元徳太子次子母曰大劉良娣煬帝於諸孫中特所鍾愛良娣早終倓每至忌日未嘗不流涕嗚咽帝繇是益以奇之唐韓王元嘉年十五在潞州聞大妃病便涕泣不食至京發喪哀毁過禮太宗嗟其至性屢慰勉之道王元慶事母以孝聞髙宗顯慶中太妃薨上表請躬修墳塋詔不許之薛王業母終從母賢妃親鞠養之至是迎賢妃出外宅事之甚謹同母妹淮陽涼國二公主公主早卒業撫愛其子逾於已子睿宗以業孝友特加親愛信安郡王禕少有志尚事繼母甚謹撫繼母所生弟祗等以友愛稱𤣥宗開元中丁母憂去官起復授瀛州刺史又上表固終喪制許之高平王道立孫涵有名宗室代宗寳應元年初平河朔拜涵左庶子兼中丞河北宣慰使丁母憂起復本官而往每至州縣郵驛公事之外都不發言蔬食飲水席地而息使還固請罷官終喪制代宗以其毁瘠許之嗣曹王臯奉太妃鄭氏以孝聞後為衡州刺史時坐小法御史覆訊懼貽太妃憂出則素服入則公服言貌如平常太妃不之知也及為潮州刺史詭詞謂遷官屬楊炎貶官在道知臯事直後炎作相復以為衡州刺史方且以事白太妃因泣下具言非疾不敢有聞其沈密重愼如此比貞元初為江陵尹乃請歸東都祔喪徳宗使中使弔之贈臯父右僕射母鄭氏曹國太妃既𦵏朝於京師詔還鎮出東都將以拜墓觀者榮之後唐昭義節度使李嗣昭太祖弟克柔之子在昭義為梁師所圍及莊宗解夾城之圍嗣昭知太祖棄世號踊毁瘠殆不勝喪册府元龜卷二百六十七
