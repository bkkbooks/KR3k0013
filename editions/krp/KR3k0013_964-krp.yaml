body:
  text: 册府元龜巻九百六十四宋王欽若等撰外臣部封冊第二唐髙祖武徳元年七月突厥曷薩那可汗弟闕可汗遣使内附帝厚加慰撫拜為吐烏過㧞闕可汗十二月突厥曷薩那可汗自宇文化及所来降封為歸義王三年三月䍧州蠻首領謝龍羽遣使朝貢授龍羽䍧州刺史封夜郎郡公七年正月封髙麗王髙建武為遼東郡王百濟王扶餘璋為𢃄方郡王新羅王金真平為樂浪郡王太宗貞觀三年八月薛延陁可汗一利咄夷男遣使朝貢詔逰擊將軍喬師望齎冊書拜夷男為毗伽可汗居大漠之北俱倫水南牙帳去長安四千餘里四年三月以突厥夾畢特勒和順郡公阿史那思摩為右武侯大將軍化州都督是月詔突利可汗阿史那什鉢苾志懷英果識機能斷情深獨悟寔惟先覺往在北蕃位地兼重早知慕化特布欵誠及漠北降災龍荒兆亂潛圖决䇿棄難歸朝披露肝膽僃陳丹赤轉禍為福厥義可嘉宜有褒隆用彰寵渥錫兹茅土識叅戎禁可右衛大將軍封北平郡王食邑千户五月封突厥阿史那蘇尼失為懷徳郡王阿史那思摩懷化郡王六年八月遣鴻臚少卿劉善因立西突厥莫賀設為奚利邲咄陸可汗賜以皷纛綵萬段是年遣中郎將桑孝彦册立焉耆國王突騎支為咥利失可汗九年閠四月李靖平吐谷渾帝復建其國下詔曰伐罪弔人前王髙義興亡繼絶有國令典吐谷渾擅相君長竊據荒裔志在凶徳政出權門酋渠携貳種落怨憤長惡不悛野心彌熾莫顧藩臣之節曾無事上之禮草竊疆埸䖍劉氓庶積惡既稔天亡有徴朕君臨四海含育萬類一物失所深責在予所以爰命六軍申兹九伐義存活國情無黷武其子大寜王慕容順隋氏之甥志懷明悟長自中土早慕華風爰見時機深識逆順以其父愎諌違衆獨䧟迷途遂誅邪臣存茲大計翻然改轍代父歸罪忠孝之美深有可嘉子能立功足以補過既往之釁特宜原免然其建國西鄙巳歴年代即從廢絶情所未忍繼其宗祀允歸令子封順西平郡王食邑四千户仍授趉胡吕烏丼豆可汗所司量遣使人備禮册命是年遣使持節册命新羅金善徳臣欽若等曰善徳金真平之女也真平卒無子乃立善徳為王以宗室大臣乙祭總知政國柱國封樂浪郡公新羅王十年三月詔曰文徳懷逺列聖之𢎞規興亡繼絶至仁之通訓吐谷渾發跡東胡竄居西域負險自固擅立君長爰在前代通使中原或為叛臣不常厥徳近者慕容歩薩鉢為主老而不智迷而亡返志懷首䑕䖍劉疆場朕頻命行人殷勤誘諭不納忠信之言唯行蜂蠆之毒及六軍問罪尚令申諭遂無悛革以至㓕亡其子順國蹙事窮歴身無所委命下吏輿襯轅門故令解網釋俘繼其宗祀乃懷貳志遵彼覆車曽未浹旬自貽屠戮子燕王諾曷鉢弱不好弄㓜稱通理纔纂舊業即逄内難故遣旌節逺申安撫遂能率其種類同竭誠欵盡其巢落迎謁使者屈膝頓顙尊奉朝化請頒正朔願入提封丹誠内發深可嘉尚宜隆寵章懋茲賞典可封河源郡王食邑四千户仍授烏地也㧞勒豆可汗即遣使人備禮册命十二年九月詔曰天地之徳平分於四時皇王之道無偏於萬物故能亭育黎庶覆燾區夏聲教咸洎於遐方爵命不遺於殊俗薛延陁真珠毗伽可汗器宇沉毅識具明允夙見時機早禀正朔忠誠峻節克著於塞外貢獻琛賮不絶於王府加以訓朂裔嗣輯寜種落俱率藩職咸慕朝風其子沙躭彌葉䕶㧞酌達度莫賀咄設頡利苾並志懷敦確氣幹強果或深竭忠欵廼心闕庭或逺經朝覲拜首軒陛言念丹誠良可嘉尚宜錫徽號用申褒寵㧞酌可肆葉䕶可汗仍賜狼頭纛四鼓四頡利苾可汗達莫賀咄葉䕶賜狼頭纛二皷二仍令左領軍大將軍梁方師持節備册命十三年七月詔曰天地大徳覆載極於八荒日月貞明炤臨周於萬物是以哲王撫運聖人垂範經邦立政之道取法於造化興亡繼絶之義靡隔於華夷惟彼北戎代居荒塞飬畜牧於天山之外擅勇敢於瀚海之濵逮其未葉狂愚嗣位侵盗之釁禍結於諸華苛暴之風毒被於大漠酋豪携貳部衆離阻革靣者相望於道路請命者填委於闕庭朕情切納隍志存懷逺乃令上將拯其將溺元戎纔動倒戈相繼既而屠耆歸命單于反接分地之長解辮而來王引弓之民盡落而内附龍城既殄狼望遂空朕愍其破亡恕其瑕釁解縳焚襯賜以再生收電廻霜宥以寛政於是選内外之職分珪組以授之擇肥饒之地設州縣以處之開倉府以恤其饑寒馳輶軒以問其疾苦恩侔中夏禮均舊臣十載於茲矣時授命三靈因心百姓爰初薄伐非貪闢土之功洎於克定實𢎞安民之道乆欲存其亡國返其遺萌尚恐瘡痍未瘳衣食不足今嵗已積年榖屢登衆種増多畜牧蕃息繒絮無乏咸弃其氊裘菽粟有餘靡資於狐兎便可復其故庭繼其先緒歸三祠於沮澤旋十角於盧山使復㑹蹛林弭其依風之思重宴樂水遂其向日之歡然則左方既建右地已設必候君長一其號令自蠻鞮貴種醢落忠誠何以宣布朝化輯寜藩服右武候大將軍化州都督懷化郡王李思摩器懷沉毅識用詳明早慕皇風夙效丹欵故寵以賜姓榮以髙爵内典徼循之重外受連卒之寄譽光朝職誠簡朕心錫以藩號紹以宗祀可乙彌泥敦俟利苾可汗並賜之皷纛仍令就其部備禮册命突厥及胡在諸州安置者並令渡河還其舊部俾夫世作藩屏同之帶舊長保邉塞傳諸後昆又以左屯衛將軍阿史那忠為左賢王左武衛將軍阿史那泥孰為右賢王十五年五月詔曰懷逺之道莫先於寵命飾終之義無隔於遐方故柱國帶方郡王百濟王扶餘璋棧山航海遠禀正朔獻琛奉賮克固始終奄致薨殞追逺慜悼宜加常數式表哀榮可贈光祿大夫令其嫡子義慈嗣位授柱國封帶方郡王百濟王使祠部郎中鄭文表持節備禮册命七月命左領軍將軍張大師持節立西突厥弩失畢賀咄葉䕶為乙毗沙鉢羅葉䕶可汗賜以皷纛十七年閠六月詔曰懷逺之規前王令典繼世之義列代舊章髙麗王嗣子藏姓髙名藏器懷韶敏識宇詳正早習禮教徳義有聞肇承藩業誠欵先著宜加爵命允茲故實可上柱國封遼東郡王髙麗王遣使持節冊命十九年九月薛延陁真珠毗伽可汗卒帝設祭於營左為發哀初延陁請以其庶長子曵莾為突利失可汗居東方所統皆雜種嫡子㧞灼為西葉䕶可汗居西方所統皆延陁詔許之並以禮册命二十二年正月新羅王金善徳卒贈光禄大夫以善徳妹真徳為柱國封樂浪郡王遣使持節冊命是年契丹酋長窟哥等内屬為置松漠都督府以窟哥為左領軍將軍兼松漠都督封無極縣男賜姓李氏髙宗以貞觀二十三年即位拜吐蕃贊府弄讃為駙馬都尉臣欽若等曰以尚文成公主故也封海西郡王弄讃因致書長孫無忌云上初即位若臣下有不臧之心者請勒兵以赴之并獻金銀珠寳十五種請置太宗靈座之前以表其誠於是進封賔王賜雜綵三千段乃刻其形像列於昭陵𤣥闕之下永徽元年以故龜茲王左武衛中郎將訶黎布失畢為右驍衛大將軍尋放還蕃撫其餘衆依舊為龜茲王先是太宗既破龜茲移置安西都䕶府於其國城以郭孝恪為都䕶兼統于闐踈勒碎葉謂之四鎮帝嗣位不欲廣地勞人復命有司棄龜茲等四鎮故訶黎布失畢王其舊地五年閠五月新羅女王金真徳卒以其弟國相金春秋為新羅王繼真徳之位仍拜開府儀同三司封樂浪郡王遣使持節備禮冊命六年遣禮臣臣欽若等曰史闕官往西突厥冊拜頡苾達度設為可汗頡苾達度設者咄六可汗之子也初為真珠葉䕶與其父不遵朝化及賀魯之叛咄六死後方遣使歸順頻表請兵誅討賀魯故有此授焉禮臣至碎葉城西賀魯兵拒之不得前又真珠葉䕶部下廬帳並被賀魯兼并人衆寡弱不為羣夷所附禮臣遂不冊而歸顯慶二年十二月伊麗道行軍總營右屯衛將軍蘇定方大破阿史那賀魯于金牙山盡収其所據之地西域悉平詔分其地置濛池崑陵二都䕶府以右武衛大將軍阿史那彌射為驃騎大將軍崑陵都䕶興昔亡可汗屯衛大將軍阿史那歩真為驃騎大將軍行右大將軍濛池都䕶繼往絶可汗各賜物十萬匹仍遣光禄卿盧承慶持節冊命三年正月立龜茲王嗣子白素稽為龜茲王授右驍衛大將軍仍遣使就加冊命五月以左驍衛大將兼安西都䕶天山縣公麴智湛為西州都督統髙昌之故地十二月以左驍衛大將軍渤海都督廻紇婆潤為左衛大將軍右驍衛大將軍燕然都督多覽葛塞匐為右衛大將軍龍朔元年九月特進新羅王金春秋薨帝遣使弔之便册其嗣子法敏為新羅王二年正月立波斯都督卑路斯為波斯王三年四月詔以新羅國為雞林大都督府以新羅王金法敏為雞林州大都督乾封元年五月封河源王慕容諾曷鉢為青海王總章元年十月東天竺烏切荼國長年婆羅門盧迦逸多特拜懷化大將軍旌竒術也時逸多受詔合金丹咸亨元年四月以西突厥首領阿史那都之為左驍衛大將軍兼匐延都督以安輯五咄六及咽麵之衆上元二年正月以于闐國為毗沙都督府分其境内為十州以于闐王尉遲伏闍雄為毗沙都督擊吐蕃有功故也開耀元年十月新羅王金法敏薨遣冊立其子政明為新羅王仍襲父官爵則天埀拱二年九月冊拜右玉鈐衛將軍阿史那斛瑟羅襲其父繼往絶可汗是月東女國王歛臂遣大臣湯劔左來朝仍請官號乃冊拜歛臂為左玉鈐衛員外將軍仍以瑞錦製蕃服以賜之天授二年臘月以于闐王尉伏闍雄卒册立真子璥為于闐王璥一作瑕長夀二年新羅王金政明卒為之舉哀遣使弔祭冊其子理洪為新羅王仍令襲父輔國大將軍行左豹韜衛大將軍雞林州都督萬嵗通天元年九月則天以突厥黙啜不同契丹之逆遣左豹韜衛大將閻知㣲冊授驃騎大將軍行左衛大將軍上柱國公遷善可汗是月封康國王大首領左玉鈐衛將軍篤婆鉢提為康國王二年十月左玉鈐衛員外將軍兼檢校汴州刺史李括莫離為歸順王聖歴元年七月冊立泥沮師師為康國王是年突厥啜遣使請和制遣左豹韜衛將軍閻知㣲入蕃册為立功報國可汗三年臘月司禮卿兼池州大都䕶竭忠事上可汗阿史那斛瑟羅為左衛大將軍仍充平西軍大總管鎮撫碎葉三月臣欽若等曰是時則天以十一月為正月二月為臘月故三月在臘月之後以吐谷渾青海國王慕容宣超一作宣趙為左豹韜衛員外大將軍仍襲父烏地也㧞勒豆可汗長安二年新羅王金理洪卒則天遣使立其弟興光為新羅王仍襲兄將軍都督之號四年正月冊拜右武威衛大將軍阿史那懷道為十姓可汗中宗神龍二年二月封突騎施烏質勒為懷徳郡王十二月戊戍命唱鹿州都督突騎施婆葛襲父烏質勒為左驍騎大將軍兼衛尉卿懷徳郡王仍令右屯衛大將軍十姓可汗阿史那懷道充使冊命景龍三年七月遣使持節䇿授左驍衛將軍兼衛尉卿金河王突騎施守忠為歸化可汗𤣥宗先天二年二月拜髙麗大首領髙定傅為特進是月封靺鞨大祚榮為渤海郡王大祚榮聖歴中自立為振國王在營州東二千里兵數萬人至是遣郎將崔訢徃冊命祚榮左驍衛員外大將軍渤海郡王仍以其所統為汗州都督自是毎嵗遣使朝貢開元三年八月髙麗吐渾等諸蕃降附制曰天亡驕子胡運其終國有忠臣漢封斯在髙麗王莫離支髙文簡都督􅎤跌思太吐渾大首領刺史慕容道奴郁射施大首領鶻屈利斤大首領刺史苾悉頡力麗大首領拱毅等或遼海貴族或隂山寵裔知則能勇權而善謀從事本蕃頡頑髙位料逆順之道知變通之節或誓以沉族或翻然庇身共驗郅支之亡遂觀繇余之入將軍遇敵永罷射鵰使者迎降果聞乘傳棄寒苦之地就陽和之澤爾其誠矣朕實休之宜開土宇之封式盛壇塲之制文簡可封遼西郡王食邑三千户行左衛大將軍員外置同正員賜宅一區馬四匹物六百段􅎤跌思太可特進行右衛大將軍員外置兼􅎤跌都督封樓煩國公食邑三千户賜宅一區馬三匹物五百段道奴可左威衛將軍員外置兼刺史封雲中郡開國公食邑二千户賜宅一區物四百段馬兩匹鶻屈頡斤可左驍衛將軍員外置兼刺史封隂山郡開國公食邑二千户賜馬兩匹物二百段苾悉頡力可左武衛將軍員外置兼刺史封鴈門郡開國公食邑二千户賜馬兩匹物四百段宅一區拱毅可左領軍衛將軍員外置兼刺史封平城郡開國公食邑二千户賜馬兩匹物四百段鶻頡川妻契苾賜物壹百五十段手力二人各賜物五十段四年八月契丹李失活奚李大輔各以所部來降制曰混一六合紀綱四海開物所以苞舉華夷列爵所以範圍中外契丹松漠州都督李失活奚饒樂州都督李大輔等並材雄劔騎家襲簮組翻飛涿鹿之郊髙視無閭之地往屬詿惑遂爾攜離海表為虞在苞桑之厚戒彚征順命乃連茹而同歸柔懷有章寵渥斯在俾矦利建宜膺胙土之榮上將師貞仍允齋壇之拜失活可封松漠郡王食邑三千户行左金吾衛大將軍大輔可封饒樂郡王食邑三千户行右金吾衛大將軍並員外置餘如故五年五月册命勃律國王蘇弗舍利支離泥為勃律王册曰維開元五年嵗次丁巳五月庚子朔二十七日丙寅皇帝若曰於戱夫象賢踵徳匪直諸華開國承家無隔殊俗咨爾勃律國王蘇弗舍利支離泥卿歴代酋渠執心忠肅遥申誠欵克修職貢謝知信繇其逺畧郭䖍瓘所以足兵行觀郁成授首何止匈奴斷臂是用命爾為勃律國王爾宜善始令終長奉正朔寜人保國慶及苖裔徃欽哉其先膺典冊袛朕寵命可不慎歟六年五月制曰王者懷柔莫不率俾禮其君長必備典章右武衛大將軍員外置突騎施都督車鼻施啜蘇祿中部貴人右賢豪緒族系繁於朔野郊㕓拒於隂寒自趍風入獻服義來歸爰奉戎索實司邉行懋勲可紀忠節是嘉俾昇絶席之尊仍茂錫圭之寵可左羽林軍大將軍員外置仍封順國公食邑三千户餘如故並賜錦袍鈿帶魚袋七事仍充金方道經畧大使所司備禮冊拜六月以故松漠郡王李失活弟中郎將婆固為松漠都督左金吾衛大將軍員外置同正員静柝軍經畧大使襲封松漠郡王食邑二千户七年三月忽汗州都督渤海郡王大祚榮卒遣使撫立其嫡子桂婁郡王大武藝襲為左驍衛大將軍渤海郡王忽汗州都督七月龜茲國王白莫苾卒以其嫡子孝節嗣位十月冊金方道經畧大使突騎施蘇祿為忠順可汗八年三月封䕶宻國王羅施伊具骨咄祿多比勒莫賀咄達靡薩爾為䕶宻王賜紫袍金帶七事并雜綵五十匹四月遣使冊立烏長國王骨咄國王俱立國王並降冊文皆賜綵二百段三國在安西之西與大食隣境大食煽誘為虐俱守節不從潜布欵誠于朝廷帝深嘉之六月遣使冊勃律國王蘇麟陁逸之為勃律國王八月遣使冊箇失宻國王真陁羅祕利為箇失宻國王是月冊渤海郡王左驍衛大將軍大武藝嫡男大都利行為桂婁郡王九月遣使冊葛達羅支頡利發誓屈爾為謝䫻國王葛達羅支特勒為罽賔國王十一月遣使冊南天竺國王尸利那羅僧伽寳多㧞摩為南天竺國王十年四月以契丹首領松漠府都督李欝于為松漠郡王奚首領饒樂府都督李魯蘇為饒樂郡王各賜物一千疋銀器七十事及錦袍鈿帶等五月䍧州刺史夜郎郡公謝元齊死詔立其嫡孫嘉藝襲官封十二年八月制曰尸利佛誓國王尸利施羅㧞摩逺修職貢載勤忠欵嘉其乃誠宜有褒錫可遙授左威衛大將軍賜紫袍金鈿帶十四年改封契丹松漠郡王李卲固為廣化王奚饒樂郡王李魯蘇為奉誠王仍封宗室外甥女二人為公主各以妻之制曰李邵固等輸忠保塞乃誠奉國屬外寰中無逺不届而華夷靡隔等數有加宜賜休名俾承慶澤十六年正月封于闐阿摩支知王事右武衛大將軍員外置同正員上柱國尉遲伏師為于闐王冊曰踐義立身資忠成性稟崆峒之氣威武可稱慕函夏之風欵誠必盡功著沙漠聲聞闕庭宜有褒崇俾膺封建今遣大理正攝鴻臚少卿喬夢松冊爾為于闐王於戯祗若順訓聿修令徳無怠無荒以保土宇爾徃欽哉又封踈阿摩支裴安定為踈勒國王冊曰維開元十六年嵗次戊辰正月戊戍朔十四日辛亥皇帝若曰萬邦述職無隔華夷五等䟽封式固藩屏咨爾踈勒阿摩支知王事左武衛將軍員外置裴安定誕靈蒲海禀秀葱山藴義以立名蹈仁而成徳雖日月所炤莫非王土而𤇺燧時警猶曰外庭遂能扞彼邉陲歸我聲教載闡疇庸之義俾𢎞利建之風今遣大理正攝鴻臚少卿喬夢松冊爾為䟽勒王於戯允廸繇庚勿替敬典綏厥戎落永為漢藩爾往欽哉十七年正月冊吐火羅骨咄祿頡達度為吐火羅葉䕶悒怚王十九年四月突厥可汗弟闕特勒卒冊小勃律國王難泥為其國王降書謂之曰惟爾代雄荒服為國藩衛居萬里之外竭一心之忠用能濳應王師克剪悖冦葱河失險青海無波使我威靈逺加繇爾誠節克著言念功效歎美良深今册爾為本國王并賜衣帶王宜領取是月康國王烏勒遣使上表請封其子咄曷為曹王啜黙為米王並許之降書報烏勒曰卿僻在遐荒乆修誠欵情深本國志慕欽風節義著於家邦忠孝兼於臣子言念懇到歎美良深所請各依可知朕意二十年九月䕶宻王發卒封其弟䕶真檀為䕶宻國王是年渤海桂婁郡王大武藝病死其子大欽茂嗣立帝降書册且弔之曰念卿亡父素勵誠節與善無徴奄至殂謝興言求往軫念良深卿是長嫡當襲父位宜全忠孝以繼前蹤今故遣使持節冊命兼申弔祭冊曰皇帝若曰於戯王者宅中守在海外必立藩長以寜遐荒咨爾故渤海郡王嫡子大欽茂代承緒業早聞才幹昔在爾考忠於國家爰逮爾躬當茲負荷豈惟立嫡亦乃擇賢休問可嘉寵章宜及是用命爾為渤海郡王爾徃欽哉永為藩屏長保忠信効節本朝作範殊俗可不美歟是年突厥可汗小殺卒國人立其子為伊然可汗詔宗正卿李佺册立伊然病卒立其弟登利可汗登利華言果報也二十一年四月冊箇失宻國王木多筆為本國王冊曰維開元二十一年嵗次癸酉四月丁酉朔五日辛丑皇帝若曰咨爾箇失宻國王木多筆嗚呼奕葉歸順逺輸誠節修職貢之禮受蕃落之寄時有代謝兄亡弟襲保界山川輯率黎庶國有制度俗尚清静可不勉歟今命爾為箇失宻國王恭膺冊命徃欽哉九月䕶宻國王真檀來朝宴于内殿授左金吾衛將軍員外置賜紫袍金帶魚袋等七事及帛百匹放還蕃是年渤海靺鞨越海入冦登萊詔新羅王金興光發兵討之仍加授興光開府儀同三司寜海軍使二十三年正月契丹知兵馬官李過折來獻戎㨗制曰髙懸爵秩以待勲庸能者得之固其宜也契丹兵馬官李過折蕃中貴種塞下雄才其謀慮之深既能轉禍當義勇之發何異疾雷故得積年逋誅一朝蕩滌使鳥竄之衆復為戎人鷹揚之師且息邉甲言念誠節宜超等數特加象輅之封仍異龍城之禮可封北平郡王同幽州節度副大使賜帛一千疋二十五年正月新羅王金興光卒其子承慶嗣位遣使來告帝悼惜乆之贈太子太保命賛善大夫邢璹攝鴻臚少卿往其國行弔祭冊立之禮興光新羅王政明之子理洪之弟也二十六年九月封西南大酋帥蒙歸義為雲南王制曰古之封建誓以山河義在疇庸故無虚授西南蠻都大酋帥特進越國公賜紫袍金鈿帶七事歸義挺秀西南是稱酋傑仁而有勇孝乃兼忠懷馭衆之長材秉事君之勁節瞻言諸部或有姦人潛通犬戎敢肆蜂蠆遂能躬擐甲胃總率驍雄深入長驅左縈右拂凡厥醜類應時誅剪戎功若此朝寵宜加俾膺胙土之榮以勵扞城之士復遣中使李思敬齎冊書往冊焉十月詔康國王烏勒卒封其子咄喝為嗣謝䫻國王誓䫻卒封其子如没拂達為嗣曹國王没羡卒封其弟蘓都僕羅為嗣史國王延屯死封其子忽鉢為嗣皆死在他年今從赴也是月罽賔國王烏散勒灑以年老上表請立其嫡子拂菻罽婆嗣位從之乃封拂菻罽婆為罽賔國王自康國已下皆降書宣慰冊封二十八年三月以石國蕃王莫賀咄吐屯有功封為石國王加特進仍賜旌節翌日又册為順義王册曰維開元二十八年嵗次庚辰三月丁亥朔二十二日戊申皇帝若曰於戯茂秩攸升䟽封有命寵榮斯及必在英賢咨爾石國王莫賀咄吐代襲誠節器標果斷盡忠向化作扞蕃陲頃以蘇禄殘妖尚為邊患乃能納其鄰國授以良圗候彼疆塲相為表裏致令克清邊徼逺輯殊方實頼心膂載宣勲力静言褒異非爾而誰是用冊爾為順義王爾宜敬慎王猷撫寜部衆永保藩輔可不慎歟是月加拓羯王斯謹鞮特進賞平蘇祿可汗之功冊曰維開元二十八年嵗次庚辰三月丁亥朔二十六日壬子皇帝若曰於戯乃瞻隂方代有君長至於膺我盛禮榮彼殊鄰必擇其人諒無虚授咨爾突厥苾伽骨咄祿可汗氣禀崆峒材雄朔漠見事無惑執心不渝迄先代以來結好中國自纘承舊業克繼前修逺遣使臣來朝闕下義之所感情實嘉焉不有褒稱孰彰忠順是用冊爾為可汗今遣從弟左金吾衛將軍質持節禮冊徃欽哉可汗其丕承徽章益勵名節永保多福以貽後昆可不慎歟是月磧西節度使盖嘉運俘吐火仙可汗來獻帝特捨之授以官爵制曰徳以柔逺兵以威敵服而捨之古之制也突騎施吐火仙可汗骨啜弟葉䕶頻阿波等背北乘邉阻兵恃衆雖蟻聚為梗或擾疆塲而王師所向盡𢷬巢穴憫其束身就戮歸命而朝宜加宥過之典載洽覃恩之命俾厥弟兄並膺光寵或分茅土復列鉤陳骨啜可左金吾衛員外大將軍仍封為循義王頡阿波可右武衛員外大將軍是年遣右金吾將軍李質齎璽書入突厥冊立登利為可汗二十九年二月小勃律國王卒冊立其兄麻號來嗣位冊曰於戯王澤無偏義𢎞於逺邇朝榮所厚諒敦於欵誠咨爾麻號來代襲君長家傳忠信地雖限於絶域心每歸於本朝爰建爾躬足繼前緒素有馭下之畧益堅奉上之志是用冊爾為勃律國王爾其敬奉典冊無忘節義永保土宇以貽子孫可不慎歟冊府元龜巻九百六十四
