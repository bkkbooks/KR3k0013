body:
  text: 册府元龜卷八百三十一宋王欽若等撰總録部規諷書曰官師相規所以更箴其闕也傳曰士有爭友所以成人之美也是知相勸以義相勉以正時惟君子之道聞善則告有過則規斯乃朋友之職故其至言而無隱同心而多益葢由乎切切偲偲忠告善道使其喜聞其過莫逆於心不離於令名罔䧟於非義者矣故臧孫有惡石之喻荀伯有盡心之説仲尼之論友貴乎直諒重華之申戒鄙乎面從皆是物也亦有位下而輸忠交疎而詰過盡拳拳之志成諤諤之美斯葢聞善必告竭誠無隱俾夫心善其説深納其戒釋囘而増美縫闕而窒非亦異夫未見顔色而言之也若乃遭其惡直始終固拒後以致敗卒如所規良可太息者已晏子齊大夫也昭公十年齊欒施髙彊奔魯陳鮑分其室晏子謂桓子必致諸公讓徳之主也讓之謂懿徳凡有血氣皆有爭心故利不可彊不可强取思義為愈義利之本也藴利生孽藴畜也孽害也姑使無藴乎可以滋長桓子盡致諸公而請老于莒莒齊地富子鄭大夫也昭公十六年晉韓起聘于鄭鄭伯享之子産戒曰茍有位於朝無有不共恪孔張後至立於客間孔張子孔之孫執政禦之執政掌位列者禦止也適客後又禦之適縣間縣樂肆客從而笑之事畢富子諫曰夫大國之人不可不慎也幾為之笑而不陵我言數見笑則必陵侮我我皆有禮人猶鄙我鄙賤也國而無禮何以求榮孔張失位吾子之恥也子産怒曰發命之不衷衷當也出令之不信刑之頗類縁事類以成偏頗獄之放紛放縱也紛亂也㑹朝之不敬謂國無禮敬之心使命之不聽下不從上命取陵於大國罷民而無功罪及而弗知僑之恥也孔張君之昆孫子孔之後也昆兄也子孔襄公兄孔張之祖父執政之嗣也子孔嘗執鄭國之政為嗣大夫承命以使周於諸侯國人所尊諸侯所知立於朝而祀於家卿得自立廟於家有禄於國受禄邑有賦於軍軍出卿賦百乗喪祭有職有所主受脤歸脤受脤謂君祭以肉賜大夫歸脤謂大夫祭以肉歸公皆社之戎祭也其祭在廟已有著位在位數世世守其業而忘其所僑焉得恥之其祭在廟謂助君祭辟邪之人而皆及執政是先王無刑罰也言為過謬者自應用刑罰子寧以他規我規正也閔子馬魯大夫也時季武子無適子公鉏長而愛悼子乃立之以公鉏為馬正馬正家司馬愠而不出閔子馬見之閔子馬閔馬父曰子無然禍福無門唯人所召為人子者患不孝不患無所所位處敬共父命何常之有言廢置在父無常位也若能孝敬富倍季氏可也父寵之則可富姦囘不軌禍倍下民可也禍甚於貧賤公鉏然之敬共朝夕恪居官次次舎也季孫喜使飲已酒而以具徃盡舎旃具饗燕之具孔子魯人也為魯司冦季康子問政於孔子對曰政者正也子帥以正孰敢不正康子魯上卿諸臣之帥也季康子患盗問於孔子孔子對曰茍子之不欲雖賞之不竊欲多情欲言民化於上不從其令從其所好又問政於孔子曰如殺無道以就有道何如就成也欲多殺以止姦孔子對曰子為政焉用殺子欲善而民善矣君子之徳風小人之徳草草上之風必偃孔子亦欲令康子先自正上加也偃仆也風無不仆草猶民之化於上又葉公語孔子曰吾黨有直躬者其父攘羊而子證之孔子曰吾黨之直者異於是父為子隱子為父隱直在其中矣孔子又侍坐於季孫季孫之宰通曰君使人假馬其與之乎孔子曰吾聞君取於臣謂之取不曰假季孫悟告宰曰自今以來君有取謂之取無曰假楚狂接輿歌而過孔子曰鳳兮鳳兮何徳之衰徃者不可諫兮不可復也來者猶可追也已而已而今之從政者殆矣孔子下欲與之言趨而去弗得與之言曽子名參孔子弟子也曽子有疾孟敬子問之孟敬子魯大夫仲孫捷曽子言曰鳥之將死其鳴也哀人之將死其言也善欲戒敬子言我将死言善可用君子所貴乎道者三動容貌斯遠暴慢矣正顔色斯近信矣出辭氣斯遠鄙倍矣此道謂禮也動容貌能濟濟蹌蹌則人不敢暴之正顔色能矜莊嚴栗則人不敢欺誕之出辭氣能順而説之則無惡戾之言入於耳籩豆之事則有司存敬子忽大務小故又戒之以此籩豆禮器南蒯為季氏費邑宰季平子立而不禮於南蒯南蒯謂子仲子仲公子整吾出季氏而歸其室於公室季氏家財子更其位更代也我以費為公臣子仲許之南蒯懼不克以費叛蒯之將叛也其鄉人或知之過之而歎鄉人過蒯而歎且言曰恤恤乎湫乎攸乎恤恤憂患湫愁隘攸懸危之貌深思而淺謀邇身而遠志家臣而君圖家臣而圖人君之事言思深而謀淺身近而志遠有人矣哉言今有此人微以感之靖郭君田嬰齊威王少子為宣王相將城薛客多以諫靖郭君謂謁者無為客通齊人有請者曰臣請三言而已矣益一言臣請烹靖郭君因見之客趨而進曰海大魚因反走君曰客有於此客曰鄙臣不敢以死為戲君曰亡更言之對曰君不聞大魚乎網不能止鈎不能牽蕩而失水則螻蟻得意焉今夫齊亦君之水也君長齊奚以薛為失齊雖隆薛之城到於天猶之無益也君曰善乃輟城薛周舎趙簡子臣也舎好直諫立於門下三日三夜簡子使問之曰子欲見寡人何對曰願為諤諤之臣墨筆操牘從君之過而日有記月有成歳有效也虎㑹趙簡子臣也簡子上羊腸之坂羣臣皆偏袒推車而虎㑹獨擔㦸行歌不推車簡子曰寡人上坂羣臣皆推車㑹獨擔㦸行歌不推車是㑹為人臣侮其主為人臣侮其主其罪何若虎㑹對曰為人臣而侮其主者死而又死簡子曰何謂死而又死虎㑹曰身死妻子又死若是謂死而又死君既已聞為人臣而侮其主者之罪矣君亦聞為人君而侮其臣者乎簡子曰為人君而侮其臣者何若虎㑹對曰為人君而侮其臣者智者不為謀辯者不為使勇者不為鬬智者不為謀則社稷危辯者不為使則使不通勇者不為鬬則邉境侵簡子曰善乃罷羣臣不推車為士大夫置酒與羣臣飲以虎㑹為上客優莫趙之優者也襄子飲酒五日五夜不廢酒謂侍者曰我誠邦士也夫飲酒五日五夜矣殊不病優莫曰君勉之不及紂二日耳紂七日七夜今君五日襄子懼謂優莫曰然則吾亡乎優莫曰不亡襄子曰不及紂二日不亡何待優莫曰桀紂之亡也遇湯武今天下盡桀也而君紂也桀紂並世安能相亡然殆矣李同趙邯鄲𫝊舎吏子秦急圍邯鄲邯鄲急且降平原君甚患之同説平原君曰君不憂趙亡邪平原君曰趙亡則勝為虜何為不憂乎李同曰邯鄲之民炊骨易子而食可謂殆矣而君之後宫以數百婢妾被綺縠餘粱肉而民褐衣不完糟糠不厭民困兵盡或剡木為矛矢而君器物鐘磬自若使秦破趙君安得有此使趙得全君何患無有今君誠能令夫人以下編於士卒之間分功而作家之所有盡散以享士士方其危苦之時易徳耳於是平原君從之趙良以商君相秦十年宗室貴戚多怨望者良見商君商君曰鞅之得見也從孟蘭臯今鞅請得交可乎趙良曰僕弗敢願也昔孔丘有言曰推賢而戴者進聚不肖而王者退僕不肖故不敢受命僕聞之曰非其位而居之曰貪位非其名而有之曰貪名僕聽君之義則恐僕貪位貪名也故不敢聞命商君曰子不説吾治秦與趙良曰反聽之謂聰内視之謂明自勝之謂彊虞舜有言曰自卑也尚矣君不若道虞舜之道無為問僕矣商君曰始秦戎翟之教父子無别同室而居今我更制其教而為其男女之别大築冀闕營如魯衛矣子觀我治秦也孰與五羖大夫賢趙良曰千羊之皮不如一狐之腋千人之諾諾不如一士之諤諤武王諤諤以昌殷紂黙黙以亡君若不非武王乎則僕請終日正言而無誅可乎商君曰語有之矣貌言華也至言實也苦言藥也甘言疾也夫子果肯終日正言鞅之藥也鞅將事子子又何辭焉趙良曰夫五羖大夫荆之鄙人也聞秦繆公之賢而願望見行而無資自粥於秦客被褐食牛期年繆公知之舉之牛口之下而加之百姓之上秦國莫敢望焉相秦六七年而東伐鄭三置晉國之君一救荆國之禍發教封内而巴人致貢施徳諸侯而八戎來服由余聞之欵關請見欵叩也五羖大夫之相秦也勞不坐乗暑不張葢行於國中不從車乗不操干戈功名藏於府庫徳行施於後世五羖大夫死秦國男女流涕童子不歌謡舂者不相杵相謂送杵聲以音聲自勸也此五羖大夫之徳也今君之見秦王也因嬖人景監以為主非所以為名也相秦不以百姓為事而大築冀闕非所以為功也刑黥太子之師傅殘傷民以峻刑是積怨蓄禍也教之化民也深於命民之效上也捷於令今君又左建外易非所以為教也君又南面而稱寡人日繩秦之貴公子詩曰相䑕有體人而無禮人而無禮何不遄死以詩觀之非所以為壽也公子䖍杜門不出已八年矣君又殺祝懽而黥公孫賈詩曰得人者興失人者摧此數事者非所以得人也君之出也後車十乗從車載甲多力而駢脇者為驂乗持矛而操闟所及反㦸者一作尞屈盧之勁矛干将之雄㦸旁車而趨此一物不具君固不出書曰恃徳者昌恃力者亡君之危若朝露尚將欲延年益壽乎則何不歸十五都灌園於鄙勸秦王顯巖穴之士養老存孤敬父兄序有功尊有徳可以少安君尚将貪商於之富寵秦國之教畜百姓之怨秦王一旦捐賓客而不立朝秦國之所以收君者豈其微哉亡可翹足而待商君弗從漢召平者故秦東陵侯秦破居長安城東時陳豨反髙祖自将至邯鄲而韓信謀反關中吕后用蕭何計誅信髙祖已聞信誅便拜何相國益封五千户令卒五百人一都尉為相國衞諸君皆賀平獨弔謂何曰禍自此始矣上暴露於外而君守内非被矢石之難而益君封置衞者以今者淮隂新反於中有疑君心夫置衞衞君非以寵君也恐其為變故守衞之願君讓封勿受悉以家私財佐軍何從其計帝悦東郭先生齊人以方士待詔公車武帝時大将軍衞青者衞后兄也衞青傳曰子夫之弟也封為長平侯從軍擊匈奴至余吾水上而還斬首捕虜有功來歸詔賜金千斤将軍出宫門東郭先生當道遮衞将軍車拜謁曰願白事将軍止車前東郭先生旁車言曰王夫人新得幸於上家貧今将軍得金千斤誠以其半賜王夫人之親人主聞之必喜此所謂竒策便計也衞将軍謝之曰先生幸告之以便計謹奉教於是衞将軍乃以五百金為王夫人之親壽王夫人以聞武帝帝曰大将軍不知為此問之安所受計策對曰受之待詔者東郭先生詔召東郭先生拜以為郡都尉雋不疑渤海人暴勝之為直指使者至渤海請與不疑相見登堂坐定不疑據地曰竊伏海瀕聞暴公子舊矣瀕涯也公子勝之字也舊久也瀕音頻又音賓今乃承顔接辭凡為吏太剛則折太柔則廢威行施之以恩然後樹功揚名永終天禄勝之知不疑非庸人敬納其戒深接以禮位至京兆尹丙吉為光禄大夫與魏相善時相遷揚州刺史考按郡國守相多所貶退吉與相書曰朝廷已深知弱翁治行相字弱翁方且大用矣願少慎事自重藏器於身易下繫辭云君子藏器於身待時而動不顯見其材能相心善其言為霽威嚴後漢桓譚字君山哀帝時董賢為大司馬聞譚名欲與之交譚先奏書於賢説以輔國保身之術賢不能用遂不與通卒為六安郡丞班彪扶風安陵人性沈重好古年二十餘更始敗三輔大亂時隗囂擁衆天水彪乃避難從之囂問彪曰徃者周亡戰國並爭天下分裂數世然後定意者從横之事復起於今乎将承運迭興在於一人也願生試論之對曰周之廢興與漢殊異昔周爵五等諸侯從政本根既微枝葉强大故其末流有從横之事勢數然也漢承秦制改立郡縣主有専已之威臣無百年之柄至於成帝假借外家哀帝短祚國嗣三絶故王氏擅朝因竊號位危自上起傷不及下是以即真之後天下莫不引領而歎十餘年間中外騷擾遠近俱發假號雲合咸稱劉氏不謀同辭方今雄桀帶州域者皆無七國世業之資而百姓謳吟思仰漢徳已可知矣囂曰生言周漢之勢可也至於但見愚人習識劉氏姓號之故而謂漢家復興疎矣昔秦失其鹿劉季逐而羈之時人復知漢乎彪既疾囂言又傷時方難乃著王命論以為漢徳承堯有靈命之符王者興祚非詐力所致欲以感之而囂不悟彪終於望都長李淑豫章人為軍師将軍更始至長安所受官爵皆羣小賈豎淑上疏諌曰方今賊冦始誅王化未行百官有司宜慎其任夫三公上應台宿九卿下括河海故天工人其代之陛下定業雖因下江平林之勢斯葢臨時濟用不可施之既安宜釐改制度更延英俊因才授爵以匡王國今公卿大位莫非戎陳尚書顯官皆出庸伍資亭長賊捕之用而當輔佐綱維之任唯名與器聖人所重今以所重加非其人望其毗益萬分興化致理譬猶縁木求魚升山採珠海内望此有以闚度漢祚臣非有憎疾以求進也但為陛下惜此舉措敗材傷錦所宜至慮惟割既徃謬妄之失思隆周文濟濟之美更始怒繫淑詔獄自是關中離心四方怨叛諸将出征各自専置牧守州郡交錯不知所從王閎王莽叔父平阿侯譚之子也更始遣閎為瑯琊太守張歩拒之不得進後歩以閎掌郡事時梁王劉永死歩等欲立永子紆為天子自為定漢公置百官閎諫曰梁王以奉本朝之故是以山東頗能歸之今尊立其子将疑衆心且齊人多詐宜且詳之歩乃止董崇與寇恂同門生光武以恂為河内太守行大將軍事崇説恂曰上新即位四方未定而君以此時據大郡此讒人所側目怨禍之府也宜思功遂身退之計恂然其言因病不視事崔駰字亭伯為竇憲車騎将軍掾竇太后臨朝憲以重戚出納王命駰獻書誡之曰駰聞交淺而言深者愚也在賤而望貴者惑也未信而納忠者謗也三者皆所不宜而或蹈之者思効其區區憤盈而不能已也竊見足下體淳淑之姿躬髙明之量意美志厲有上賢之風駰幸得充下館列後陳是以竭其拳拳敢進一言傳曰生而富者驕生而貴者傲生富貴而能不驕傲者未之有也今寵禄初隆百寮觀行當堯舜之盛世處光華之顯時豈可不庶幾夙夜以永終譽𢎞申伯之美致周召之事乎語曰不患無位患所以立昔馮野王以外戚居位稱為賢臣近隂衞尉克己復禮終受多福郯氏之宗非不尊也陽侯之族非不盛也重侯累将建天樞執斗柄其所以獲譏於時垂愆於後者何也葢在滿而自溢位有餘而徳不足也漢興以後迄于哀平外家二十保族全身四人而已書曰鑒于有殷可不慎哉竇氏之興肇自孝文二君以淳淑守道成名先日安豐以佐命著徳顯自中興内以忠誠自固外以法度自守卒享國祚垂祉於今夫謙德之光周易所美滿溢之位道家所戒故君子福大而愈懼爵隆而益恭遠察近覽俯仰有則銘諸几杖刻諸盤盂兢兢業業無怠無荒如此則百福是荷慶流無窮矣傅燮為漢陽太守時刺史耿鄙委任治中程球球為通姦利士人怨之靈帝中平四年鄙率郡兵討金城賊王國韓遂等燮知鄙失衆必敗諫曰使君統政日淺人未知教孔子曰以不教民戰是謂棄之今率不習之人越大隴之阻将十舉十危而賊聞大軍將至必萬人一心邊兵多勇其鋒難當而新合之衆上下未和萬一内變雖悔無及不若息軍養徳明賞必罰賊得寛挺必謂我怯羣惡爭勢其離可必然後率已教之人討已離之賊其功可坐而待也今不為萬全之福而就必危之禍竊為使君不取鄙不從行至狄道果有反者先殺球次害鄙邴原北海朱虛人魯國孔融在郡教選計當任公卿之才乃以鄭𤣥為計掾彭璆為計吏原為計佐融有所愛一人嘗盛嗟嘆之後恚望欲殺之朝吏皆請時其人亦在坐叩頭流血而融意不觧原獨不為請融謂原曰衆皆請而君何獨不原對曰明府於某本不薄也常言歳終當舉之此所謂吾一子也如是朝吏受恩未有在某前者矣而今乃欲殺之明府愛之則引而方之於子憎則推之欲危其身原愚不知明府以何愛之以何惡之融曰某生於微門吾成就其兄弟㧞擢而用之某今孤負恩施夫善則進之惡則誅之固君道也徃者應仲遠為泰山太守舉一孝亷旬月之間而殺之夫君人者厚薄何常之有原對曰仲遠舉孝亷殺之其義焉在夫孝亷國之俊選也舉之若是則殺之非也若殺之是則舉之非也詩云彼其之子不遂其媾葢譏之也語云愛之欲其生惡之欲其死既欲其生又欲其死是惑也仲遠之惑甚矣明府奚取焉融乃大笑曰吾但戲耳原又曰君子於其言出乎身加乎民言行君子之樞機也安有欲殺人而可以為戲者哉融無以答官至五官将長史髙順為吕布督将時泰山臧覇等攻破莒城許吕布財幣以相結而未及送布乃自徃求之順諫止曰将軍威名宣播遠近所畏何求不得而自行求賂萬一不克豈不損耶布不從既至莒覇等不測徃意固守拒之無獲而還布性决易所為無常順毎諫曰将軍舉動不肯詳思忽有失得動輒言誤誤事豈可數乎布知其忠而不能從魏諸葛原字景春為新興太守管輅餞之原與輅别戒以二事言卿性樂酒量雖温克然不可保寕當節之卿有水鏡之才所見者玅仰觀雖神禍如膏火不可不慎持卿叡才遊於雲漢之間不憂不富貴也輅言酒不可極才不可盡吾欲持酒以禮持才以愚何患之有也蒋班焦彜皆諸葛誕爪牙計事者時誕據淮南反大軍圍誕於壽春呉将朱異再以大衆來迎班彜等言於誕曰朱異等以大衆來而不能進孫綝殺異而歸江東外以發兵為名而内實坐湏成敗其歸可見矣今宜及衆心尚固士卒思用并力决死攻其一面雖不能盡克猶可有全者文欽曰江東乗戰勝之威久矣未有難北方者也况公今舉十餘萬之衆内附而欽與全端等皆同居死地父兄子弟盡在江表就孫綝不欲主上及其親戚豈肯聽乎且中國無歳無事軍民並疲今守我一年勢力已困異圖生心變故将起以徃凖今可計日而望也班彜固勸之欽怒而誕欲殺班彜二人懼且知誕之必敗也十一月乃相携而降張邈為陳留太守初事袁術時術議稱尊號邈謂術曰漢據火徳絶而復揚徳澤豐流誕生明公居軸處中入則享於上席出則為衆目之所屬華霍不能増其髙淵泉不能同其量可謂巍巍蕩蕩無與為二何為捨此而欲稱制恐福不盈眥禍将溢世荘周之稱郊祭犧牛養飼經年衣以文繡宰執鸞刀以入廟門當此之時求為孤犢不可得也蜀黄權字公衡巴西人少為郡吏州牧劉璋召為主簿時别駕張松建議宜迎先主使拒張魯權諌曰左将軍有驍名今請到欲以部曲遇之則不滿其心欲以賔客禮待則一國不容二君若客有泰山之安則主有累卵之危可但閉境以待河清璋不聽竟遣使迎先主出權為廣漢長劉巴字子初劉璋遣法正迎先主巴諫曰備雄人也入必為害不可納也既入巴復諫曰若使備討張魯是放虎於山林也璋不聽巴閉門稱疾備攻成都令軍中曰其有害巴者誅及三族及得巴甚喜後代法正為尚書令呉朱據字子範呉郡呉人有姿貌膂力又能論難大帝黄武初徴拜五官郎中補侍御史是時選曹尚書暨豔疾貪汙在位欲沙汰之據以為天下未定宜以功覆過棄瑕取用舉清厲濁足以沮勸若一時貶黜懼有後咎豔不聽卒敗陸瑁字子璋州郡辟舉皆不就時尚書暨豔盛明臧否差斷三署頗揚人闇昧之失以顯其讁瑁與書曰夫聖人嘉善矜愚忘過記功以成美化如今王業始建将一大統此乃漢髙棄瑕録用之時也若令善惡異流貴汝潁月旦之評誠可以勵俗明教然恐未易行也宜遠模仲尼之汛愛中則郭泰之𢎞濟近有益於大道也豔不能行卒以致敗後為選曹尚書晉華譚友人袁甫者厯陽人少能言議與譚齊名友善景帝大安中入雒譚與甫書曰誠以枯澤非蛟龍之淵棘林非鸞鳳之窟昔食其自匿監門非髙祖不長揖孔明躬稼南陽非劉氏不馳驅望雲霄而矯翮見鴻鵠之輕羽瞻長塗而髙鳴知騏驥之迅足官至祕書監皇甫方囘謐子避亂荆州刺史陶侃禮之甚厚王敦遣從弟廙代侃遷侃為廣州侃将詣敦方回諌曰吾聞敵國滅功臣亡足下新破杜弢功莫與二欲無危其可得乎侃不從而行敦果欲殺侃頼周訪獲免方回徴博士不起冊府元龜卷八百三十一
