body:
  text: 册府元龜卷九百六十二宋王欽若等撰外臣部官號才智賢行官號夫明王慎徳四夷咸賔乃有欵塞稱藩厥角詣吏奉琛修貢觧辮向化由是典客之職通譯其言執簡之史詳記其俗故其妃匹之號官稱之品員秩之命數典司之位局或咸得書於載籍而藏之秘閣焉觀夫疆域殊峙風軌異化種族之制匪一等威之辨不同仲尼所謂夷狄之有君葢與夫雲官鳥紀之說戾矣東夷扶餘國以六畜名官有馬加牛加狗加其邑落皆主屬諸加高句驪國後漢時其國置官有相加對盧沛者古鄒大加古鄒大加高驪掌賔客之官如大鴻臚也主簿優台使者帛衣先人一說大官有大對盧次有太大兄大兄小兄意俟奢烏拙太大使者小使者褥奢翳屬仙人并褥薩凡十三等復有内評外評分掌内外事焉其大對盧則以强弱相凌奪而自為之不由王之署置也百濟國其王妻號於陸夏言妃也官有十六品長曰左平五人一品次大率三十人二品一作達率次恩率三品次徳率四品次杆率五品次奈率六品以上次将徳七品服紫帯次施徳八品皂帯次固徳九品赤帯次季徳十品青帯次對徳十一品文督十二品皆黄帯次武督十三品次佐軍十四品次振武十五品次克虞十六品一作䘮虞皆白帯其冠制並同准奈率以上飾以銀花自恩率以下官無常員各有部刀部功徳部藥部木部法部後宫部外有司軍部司徒部司空部外舎綢部日官部長吏三年一交代畿内有五部部有五巷人居焉部統兵五百人五方各有領一人以達率為之方佐二之方有十郡有将三人以徳率為之統兵一千二百人以下七百人以上又内官曰内臣佐平掌宣納事内頭佐平掌庫藏事内法佐平掌禮儀事衛士佐平掌宿衛兵事朝廷佐平掌刑獄事兵官佐平掌在外兵馬事新羅國其官有十七等其一曰伊罰干貴如相國次伊尺干次迎干次破彌干次大阿尺干次阿尺干次乙吉干次沙咄干次及伏干次大奈摩干次大舎次小舎次吉士次大烏次小烏次造位外有郡縣後唐同光初其王金朴英遣倉部侍郎金樂錄事叅軍金幼卿来朝二年又遣朝散大夫倉部侍郎金岳来朝天成二年遣使中散大夫兵部侍郎張芬副使兵部郎中朴術法判官倉部員外郎李忠武来朝長興三年遣使執事侍郎金咄副使司賔大卿李儒来朝日本國其大臣朝臣真人者猶中國户部尚書倭國其王妻號雞彌没名太子為利歌彌多佛利内官十有二等一曰大徳次小徳次大仁次小仁次大義次小義次大禮次小禮次大智次小智次大信次小信員無定數有軍尼一百二十人猶中國牧宰八千户置一伊尼翼如今里長也十伊尼翼屬一軍尼大羊同國有四大臣分掌國事南蠻林邑國尊官有二其一曰西那婆帝其二曰薩婆地歌其為官三其一曰倫多性次歌倫帝次乙他伽蘭外官分為二百餘部其長官曰弗羅次曰可輪如牧宰之差也赤土國其官有薩陁迦邏一人陁迦邏一人陁挐逹又二人迦利蜜迦三人共掌政事俱羅未帝一人掌刑法每城置那耶迦一人鉢帝十人眞臘國其國有五大臣一曰孤落支二曰髙相憑三曰婆何多陵四曰舎摩陵五曰髥羅婁及諸小臣朝於王者輒於階下三稽首王喚上階則跪以兩手抱膊遶王環坐議政事訖跪伏而去婆利國官曰獨訶耶挐次曰獨訶氏挐琉球國有四五帥統諸洞洞有小王往往有村村有鳥了帥并以善戰者為之自相對立理一村之事南詔蠻謂王為詔謂相為清平官凡置六人其酋望有大将軍之號後唐天成元年嶲州山後兩林百蠻都鬼主李卑晚羌大鬼主傅䏻阿花等来朝二年有轉牒稱督爽大長和國宰相布燮等西域婼音而遮切羌國漢時其王號去胡来王言去離胡戎来附漢鄯善國有輔國侯郤胡侯郤音立畧切鄯善都尉撃車師都尉左右且渠撃車師君各一人譯長二人臣欽若等按漢書西域傳凡國五十自譯長君監吏大禄百長千都尉且渠賞户将相至侯王皆佩漢印綬且末國且音子余切有輔國侯左右將譯長各一人小宛國有輔國侯左右都尉各一人精絶國有精絶都尉左右将譯長各一人戎盧國有輔國侯左右將左右都尉左右騎君各一人譯長二人于闐國有輔國侯左右將左右騎君東西城長譯長各一人晉天福三年九月其王李聖文遣殿頭宣㫖通使馬繼榮副使黄門將軍張再適人吳順規朝事舍貢皮山國有左右将左右都尉騎君譯長各一人蒲犂國漢時有侯都尉各一人大月氐有五翖侯翖即翕字一曰休宻翕侯二曰雙摩翕侯三曰貴霜翕侯四曰盻頓翕侯五曰髙附翕侯皆屬大月氐莎車國有輔國侯左右騎君備西夜君各一人都尉二人譯長四人䟽勒國有䟽勒侯撃胡輔國侯都尉左右將左右騎君左右譯長各一人尉頭國有左右都尉左右騎君各一人烏孫國王號大昆彌有相大禄大將二人侯三人大夫将都尉各一人大監二人大吏一人舎中大吏二人騎君一人姑墨國有姑墨侯輔國侯都尉左右将左右騎君各一人譯長二人温宿國有輔國侯左右将左右都尉左右騎君譯長各一人龜兹國有大都尉丞輔國侯安國侯撃胡侯郤胡都尉撃車師都尉左右将左右都尉左右騎君左右力輔君各一人東西南北部千長各二人郤胡君三人譯長四人烏壘國有城都尉譯長各一人尉犂國有尉犂侯安世侯左右將左右都尉撃胡君各一人譯長二人危須國有撃胡侯撃胡都尉左右将左右都尉左右騎君撃胡君譯長各一人焉耆國有撃胡侯郤胡侯輔國侯左右將左右都尉撃胡左右君撃車師君歸義車師君各一人撃胡都尉撃胡君各二人譯長三人烏貪訾離國有輔國侯左右都尉各一人卑陸國有輔國侯左右将左右都尉左右譯長各一人卑陸後王國有輔國侯都尉譯長各一人郁立師國有輔國侯左右都尉譯長各一人單桓國有輔國侯将左右都尉譯長各一人蒲類國有輔國侯左右将左右都尉各一人蒲類後國有輔國侯将左右都尉譯長各一人西且彌國且音子余切下同有西且彌侯左右將左右騎君各一人東且彌國有東且彌侯左右都尉各一人刼國有輔國侯都尉譯長各一人孤胡國有輔國侯左右都尉各一人山國有輔國侯左右将左右都尉譯長各一人車師前王國有輔國侯安國侯左右將都尉歸漢都尉車師君通善君鄉善君各一人鄉讀曰嚮譯長一人波斯國其王曰毉噆妃曰防步率王之諸子曰殺野大官有模胡檀掌國内獄訟泥忽汗掌庫蔵開禁地卑掌文書及衆務次有遏羅訶地掌王之内事薛波勃掌四方兵馬其下皆有屬官分統其事大秦國其王都城分為五城各方五里王居中城城置八臣次主四方而王城亦置八臣分主四城若謀國事及四方有不决者則四城之臣集議王所王自聽之然後施行女國以女為主有小女王共知國政女王之夫號曰金聚不知政事東女國女王號為賔就有女官曰高覇評議國事在外官僚並男夫為之高昌國官有令尹一人比中夏相國次有公二人皆其王子也一為交河公二為田地公次有左右衛次有八長史曰吏部祠部庫倉部主客禮部民部兵部等長史也次有達陵江殿中伏波等将軍次有八司馬長史之副也次有侍郎校郎主簿従事階位相次分掌諸事次有省事掌𨗳引其大事决之於王小事則世子及二公随状斷决評章録記事訖即除籍書之外無事乆掌文案官人雖有列位並無曹府唯毎旦集於牙門評議衆事諸城各有户曹毎城遣司馬侍郎監檢校名為城令廻紇隋時稱特勒唐貞觀末自號可汗署官號皆如突厥故事開元中有九部落置都督十一人代宗時遣使册命可汗及其妻可敦并封左右殺胡禄都督抜覧将軍内外宰相已下白狗羌有品籠官五品籠官吐蕃號其王為賛普置大論小論以統理國事雖有官不常厥職臨時統領北狄匈奴單于者廣大之貌也言其象天單于然也漢時其國置左右賢王左右谷蠡谷音鹿蠡音盧奚切左右大将左右大都尉左右大當户左右骨都侯匈奴謂賢曰屠耆故嘗以太子為左屠耆王自左右賢王以下至當户大者萬餘騎小者數千凡二十四長立號曰萬騎其大臣皆世官呼衍氏蘭氏呼衍即今鮮卑姓呼延者是也蘭姓今亦有之其後須卜氏此三姓其貴種也而左右賢王左右谷蠡取大國左右骨都侯輔政諸二十四長亦各自置千長百長行長什禆小王禆音頻移切相都尉當户且渠之屬且音子余切相之阻渠姓葢本因此官後漢時其大臣貴者左賢王次左谷蠡王次右賢王次右谷蠡王謂之四角次左右日逐王次左右温禺鞮王次左右漸将王是謂六角皆單于子弟次第當單于者也異姓大臣左右骨都侯次左右尸逐骨都侯其餘日逐且渠當户諸官號各以權力優劣部衆多少為高下次第焉至晉時其官號有左賢王右賢王左奕蠡王右奕蠡王左於陸王右於陸王左漸尚王右漸尚王左朔方王右朔方王左獨鹿王右獨鹿王左顯禄王右顯禄王左安樂王右安樂王凡十六等皆用單于親子弟也其左賢王最貴唯太子得君之其四姓有呼延氏卜氏蘭氏喬氏而呼延氏最貴則有左日逐右日逐世為輔相卜氏則有左沮渠右沮渠蘭氏則有左當戸右當户喬氏則有左都侯右都侯又有車陽沮渠餘地諸雜號猶中國百官也吐谷渾晉末自稱沙州刺史其官置長史司馬将軍魏周之際始稱可汗官有王公僕射尚書及郎中将軍之號烏桓亦作丸國有勇健能理决闘訟者推為大人無丗業相繼邑落各有小帥數百千落自為一部大人蠕蠕國千人為軍軍置将一人百人為幢幢置帥一自稱為可汗其俗君及大臣因其行䏻即為稱號若中國立諡既死之後不復追稱突厥後魏時自稱可汗號其妻為賀可敦其子弟謂之特勒别部領兵者謂之設其大官屈律啜次阿波次頡利發次吐屯次俟斤其初國貴賤官號凡有十等或以形體或以老小或以顔色鬢髮或以酒肉或以獸名其勇健者謂之始波羅亦呼為莫賀弗肥鹿者謂三大羅大羅便酒器也似角而麄短體貌似之故以為號此官特貴唯其子弟為之謂老為哥利故有達官謂馬為賀蘭故賀蘭蘇尼闕蘇尼掌兵之官也謂黒色者為珂羅復故有珂羅啜官甚髙耆年者為之謂髪為索葛故有索葛吐屯如州縣官也謂酒為匐你熱汗故有熱汗賞監察非違釐整班次謂肉為安禪故有安禪具泥掌家事如國官也有時置附隣可汗隣狼名也取其貪殺為稱亦有可汗位在葉護下者或有居家大姓相呼為遺可汗者突厥呼屋為遺言屋可汗也其後大官有葉護次設特勒次俟利發次吐屯發餘小官凡二十八等皆世襲焉西突厥本與北突厥同祖其官有葉護有設特勒常以可汗子弟及宗族為之又有乙斤屈利啜閻漢達頡利發吐屯俟斤等官世襲其位奚有五部每部置俟斤一人為其帥其後部有刺史縣有令長其大首領號奚王唐置饒樂府以其王為都督南室韋有二十五部有餘莫弗瞞咄猶酋長也北室韋有九部其渠帥號乞引莫賀咄每部有莫何弗三人以貳之契丹有八部毎部皆號大人内推一人為主唐末耶律阿保機自稱國王其後乃稱皇帝署中國官號國人虢保機為天皇王有子三人長人皇王次元帥太子幼安端少君渤海國唐中宗時封大祚滎為渤海郡王其俗呼其王為可毒夫對面為聖王牋表呼基下父曰老王母曰太妃妻曰貴妃長子曰副王諸子曰王子世以大氏為酋長才智要荒之服蠻夷是居北方之疆世習其俗丹穴之智時有其人豈地氣之使然抑天性之斯異或計慮之惟允或辭辯之可觀懐英果之才申嚴于族類慕華夏之徳竊覽于典章若䏻堅柔服之心革忿鷙之性奉順王命自異匪人雖欲謂之異域其可得乎今採其才智之士著于録戎子駒支駒支戎子名魯㐮公十四年晉士匄范宣子也㑹諸侯之大夫㑹于向將執駒支范宣子親數諸朝行之所在亦設朝位曰来姜戎氏昔秦人追逐乃祖吾離于𤓰州四嶽之後皆姜姓又别為允姓𤓰州地在今燉煌乃祖吾離被苫蓋蓋苫之别名䝉荆棘以来歸我先君蒙冒也我先君惠公有不腆之田腆厚也與女剖分而食之中分為剖今諸侯之事我寡君不如昔者盖言語漏洩則職女之繇職主也詰朝之事爾無與焉詰朝明旦不使復得與㑹事與將執女對曰昔秦人負恃其衆貪于土地逐我諸戎恵公蠲其大徳蠲明也謂我諸戎是四嶽之裔胄也四嶽堯時方伯姜姓也裔系也胄後也毋是翦弃翦削也賜我南鄙之田狐狸所居豺狼所嘷我諸戎除翦其荆棘驅其狐狸豺狼以為先君不侵不叛之臣至于今不貳不内侵亦不外叛昔文公與秦伐鄭秦人竊與鄭盟而舎戍焉事在魯僖公三十年於是乎有殽之師事在魯僖公三十三年晉禦其上戎亢其下亢猶當也秦師不復我諸戎實然譬如捕鹿晉人角之諸戎掎之掎其足也與晉踣之踣僵也戎何以不免自是以来晉之百役與我諸戎相繼于時言給晉役不曠時以従執政猶殽志也意常如殽無有二也豈敢離逷今官之師旅無乃寔有所闕以攜諸侯而罪我諸戎我諸戎飲食衣服不與華同贄幣不通言語不達何惡之䏻為不與於㑹亦無瞢瞢悶也賦青蠅而退青蠅詩小雅取其愷悌君子無信讒言宣子辭焉使即事於㑹成愷悌也成愷悌不信讒也不書者戎為晉屬不得特達漢匈奴單于冒頓既立時東胡强廼使使謂冒頓曰欲得頭曼時號千里馬頭曼即冒頓父也曼音莫安切冒頓問羣臣皆曰此匈奴寳馬也勿予讀曰與冒頓曰奈何與人鄰國愛一馬乎遂與之頃之東胡以為冒頓畏之使謂冒頓曰欲得單于一閼氏閼氏匈奴皇后號也閼音於連切氏音支冒頓復問左右左右皆曰東胡無道廼求閼氏請撃之冒頓曰奈何與人鄰國愛一女子乎遂取所愛閼氏予東胡東胡王愈驕西侵與匈奴中間棄地莫居千餘里各居其邊為甌脱甌音一侯切脫音士活切境上候望之處若今之伏宿舎也東胡使使謂冒頓曰匈奴與我界甌脱外棄地匈奴不能至也吾欲有之冒頓問羣臣或曰此棄地與之於是冒頓斬之冒頓上馬令國中有後者斬遂東襲撃東胡東胡初輕冒頓不為俻及冒頓以兵至大破滅東胡王虜其民衆畜産而歸後漢烏丸大人蹋頓多畫計䇿鮮卑軻比能本小種鮮卑以勇健斷法平端不貪財物衆推以為大人部落近塞自袁紹據河北中國人多亡叛歸之教作兵器鎧楯頗學文字故其勒御部衆擬則中國出入弋獵建立旌麾以鼓節為進退晉吐谷渾視羆性英果有雄畧嘗従容謂博士金城騫苞曰易云動静有常剛柔斷矣先王以仁宰世不任威刑所以剛柔靡斷取輕鄰敵當仁不譲豈宜拱黙者乎今将秣馬厲兵争衡中國先生以為何如苞曰大王之言髙世之畧秦隴英豪所願聞也於是虚襟撫納衆赴如歸吐谷渾葉延長而沈毅好問天地造化帝皇年歴司馬薄落鄰曰臣等不學實未審三皇何父之子五帝誰母所生延曰自羲皇以来符命元象昭言著見卿等面牆何其鄙哉語曰夏蟲不知冬氷良不虚也又曰禮云公孫之子得以王父字為氏吾祖始自昌黎光宅於此今以吐谷渾為氏尊祖之義也後魏回紇菩薩善籌䇿以少制衆常以戰陣射獵為務其母烏羅渾主知諍訟之事平决嚴明部内齊肅唐馮盎高州良徳人代為本郡大首領隋開皇中潮成五州獠叛盎馳至京請討之文帝勑左僕射楊素與盎論賊形勢素驚曰不意蠻夷中有此人大竒武徳中授髙州總管累封國公盎勤於簿領詰摘姦伏甚得人情新羅王真徳以高宗永徽元年織錦作五言太平頌以獻之其詞曰大唐開洪業巍巍皇猷昌止戈戎衣定修文繼百王統天崇雨施理物體含章深仁諧日月撫運邁時康幡旗何赫赫鉦鼓何鍠鍠外夷違命者剪覆被天殃淳風凝幽顯遐邇競呈祥四時和玉燭七曜巡萬方維嶽降宰輔維帝任忠良五三成一徳昭我唐家光帝嘉焉仲琮為吐蕃大臣咸亨三年吐蕃遣仲琮来朝先是仲琮年少時嘗充質入朝詣太學生例讀書頗曉文字至是帝召入賜宴甚優禮之問曰汝國賛府孰與其祖為賢對曰雄勇果斷不及其祖然勤於聽理下不敢欺亦令主也且吐蕃土風寒苦物産貧薄所部邏婆川唯有楊栁人以為資更無草木烏海之南盛夏積雪冬則羊裘數重暑月猶衣裘褐賛府春夏每随水草秋冬始入城隍但施廬帳又無屋宇文物器用豈當中夏萬分之一但其國法嚴整上下齊力議事則自下而起因人所利而行之斯所以䏻持乆也帝曰吐蕃與吐渾本是甥舅之國素和貴叛主奔赱吐蕃納之信其間隔侵逼渾國招其叛士奪其土地我遣薛仁貴等安輯慕容之衆吐蕃掩其不備伏甲撃破之既又冦逼凉州欲陷城堡其故何也對曰臣受命貢獻而已攻戰之事非臣所得預聞也帝厚賜而遣之薛賛婆為吐蕃首領其父禄東賛領觧兵術吐蕃賛府以國事委之講兵訓師雅有節制吐蕃之并兼諸羌雄覇本土東賛有力焉東賛有子五人長曰賛悉若次欽陵次賛婆次悉多千次勃論東賛死欽陵兄弟後専其國欽陵每多居中諸弟分提方面賛婆則専在東境與中國為鄰三十餘年常為邊患其兄弟皆有才畧諸蕃憚之突厥毗伽可汗小殺開元中謀欲南入為寇其謀主暾欲谷曰唐主英武人和年豐未有間隙不可動也且休息我衆觀變而舉小殺又欲修築城壁造立寺觀暾欲谷曰不可突厥人户寡少不敵唐家百分之一分所以常䏻抗拒者正以随逐水草居䖏無常射獵為業人皆習武强則進兵抄掠退則竄伏山林唐兵雖多無所施用若築城而居改變舊俗一朝失利必将為唐所併且寺觀之法教人仁弱本非用武争强之道不可置也小殺等湥然其計八年冬御史大夫王晙為朔方大縂管奏請西徵㧞悉宻東發奚契丹兩蕃尅期掩突厥衙帳於稽落河上小殺聞之大恐暾欲谷曰㧞悉宻今在北庭與兩蕃東西相去極逺勢必不合王晙兵馬計亦無䏻至此必若能来候其臨到即移衙帳向北三日唐兵糧盡自然去矣且㧞悉宻輕而好利聞命必是先来王晙與張嘉貞不叶奏請有所不惬必不敢動若晙兵馬不来抜悉宻獨至突厥欲撃之暾欲谷曰此衆去國千里必將死戰未可也不如以兵躡之去北庭二百里暾欲谷分兵間道先掩北庭因縦兵撃抜悉宻之還衆遂散赱投北庭而城陷不得入盡為突厥所擒并虜其男女而還暾欲谷廻兵因出赤亭以掠凉州牛馬凉州都督楊敬述為暾欲谷所敗小殺由是大振盡有黙啜之衆南詔異牟尋頗知書有才智善撫其衆賢行夫天生蒸民夷夏雖異而所禀之性或善或惡復何殊㦲故仲尼稱有教無類盖謂是矣若乃䔍仁孝之道敦愛敬之風感慨以報仇謙退而行譲或崇其信誓或守之端慤或殉𦵏以見志或憂國以殞命或俯従忠讜之諫或力行博施之義自餘従容知禮寛厚得衆者抑又其次焉咸著之篇以示於後西羌東吾湞吾子也湞吾後漢明帝永平中降漢東吾立以父降漢乃入居塞内謹愿自守百濟其先夫餘王東明之後有仇台篤於仁信始立國於帯方高驪王名宫将叛於魏其臣句驪沛者名得来數諌宫宫不従其言得来歎曰立見此地将生蓬蒿遂不食而死舉國賢之吐谷渾辟奚性仁厚慈恵三弟皆専恣長史鍾惡地恐為國􅊣謂司馬乞宿雲曰昔鄭荘公秦昭王以一弟之寵宗祀㡬傾况今三孽並驕必為社稷之患吾與公忝當元輔若獲保首領以没于地先君有問其将何辭吾今誅之矣宿雲請白辟奚惡地曰吾王無斷不可以告於是因羣下入覲遂執三弟而誅之辟奚自投於牀惡地等奔而扶之曰臣昨夢先王告臣云三弟将為逆亂汝速除之臣謹奉先王之命矣辟奚素友愛因恍惚成疾謂世子視連曰吾禍㓕同生何以見之於地下國事大小汝宜攝之吾餘年殘命寄食而已遂以憂卒視連幼㢘慎有志性視連既立以父憂卒不知政事不飲酒遊畋七年矣鍾惡地進曰夫人君者以徳御世以威齊衆養以五味娱以聲色此四者聖帝明王之所先而公皆畧之昔昭公儉嗇而䘮偃王仁義而亾然則仁義所以存身亦所以亡己經國者徳禮也濟世者刑法也二者或差則綱維失緒明公奕葉重光恩結西夏雖仁孝發於天然猶宜憲章周孔不可獨追徐偃之仁徳委而不逮視連泣曰先王追友于之痛悲憤升遐孤雖纉業尸存而已聲色遊娱豈所安也綱維刑禮付之将来臨終謂其子視羆曰我高祖吐谷渾公嘗言子孫必有興者永為中國之西籓慶流百世吾已不及汝亦不見當在汝之子孫輩耳葉延年十嵗其父吐延為羌酋姜聰所害每旦縛草爲姜聰之象哭而射之中之則號泣不中則瞑目大呼其母謂曰姜聰諸将已屠膾之矣汝何為如此葉延泣曰誠知射草人不益於先讐以申㒺極之志耳性至孝母病五日不食葉延亦不食焉耆國王龍安夫人獪胡之女姙身十二月剖脅生子曰㑹立之為世子㑹少而勇傑安病篤謂㑹曰我嘗為龜兹王白山所辱不忘於心汝䏻雪之乃吾子也及㑹立襲滅白山遂據其國叱干阿利叱干部他斗伏兄子也赫連勃勃父衛辰為後魏殺之勃勃奔于叱干部叱干他斗伏送勃勃於魏阿利先戍大落川聞将送勃勃馳諌曰鳥雀投人尚宜濟免况勃勃國破家亡歸命於我縦不能容猶宜任其所奔今執而送之深非仁者之舉他斗伏懼為魏所責弗従阿利潜遣勁勇簒勃勃於路送於姚興高平公没奕于以女妻之馬邑族奴真後魏初領部来附奴真兄犍先居賀蘭部至是奴真請召犍而譲部焉道武義而許之蛭㧞寅勑韋部人也蛭㧞寅兄地千坐盗食官馬依制命死㧞寅自誣已殺實非兄殺兄弟争死辭不䏻㝎唐高祖詔原之康國王字代失畢為人寛厚甚得衆心胡禄達官吐渾邪頡利臣也頡利卒渾邪等自刎以殉渾邪者頡利之母婆施氏之媵臣也頡利初誕以付渾邪至是哀慟而死唐太宗聞而異之贈中郎将仍𦵏於頡利墳側詔中書侍郎岑文本製頡利及渾邪之事以紀之吐蕃相禄東賛貞觀十五年来朝先是許以文成公主出降賛普遣禄東賛来迓召見顧問進對合㫖詔以瑯邪公主外孫女妻之禄東賛辭曰臣本國有婦少小夫婦雖𣸪至尊殊恩奴身不願違棄舊婦且賛府未謁公主陪臣安敢輙娶太宗嘉之欲撫以厚恩雖竒其答而不遂其請乃以為右衛大将軍阿史那社爾突厥處羅可汗第二子也初在本籓號為拓設分部落以統之及處羅卒毁瘠三載在位十年無所課歛或鄙其所為不䏻富貴社爾曰部落既豐於我便足有識者稱之叔父頡利黷於用武社爾屢諌不聽乃辭頡利歸於所部百濟王義慈事親以孝行聞友于兄弟時人號為海東曾閔突厥苾伽可汗開元二十一年遣其大臣葛阿黙察之来朝獻馬五十匹謝恩也初苾伽之弟闕特勒死苾伽表請巧匠寫其真詔遣畫工六人往焉既畫工妙絶倫突厥國内未之見者苾伽毎觀畫處歔欷如弟每生悲涕不自勝故遣察之謝恩且送畫人也尉遲勝于闐質子也廣徳中以勝為毗沙府都督于闐王令還國勝固請留宿衛加開府儀同三司封武都王實封百户勝請以本國王弟曜詔従之勝乃於京師修行里盛飾林亭以待賔客好事者多訪之建中末従幸奉天為兼御史中丞帝在興元勝為右領軍将軍俄遷右威衛大将軍厯睦王傅貞元初曜遣使上䟽稱有國已来代嫡承嗣兄勝既譲國請立勝子銳帝乃以銳為檢校光祿卿兼毗沙府長史還國勝固辭且言曰曜乆行國事人皆恱服銳生於京華不習國俗不可遣往因授韶王諮議兄弟譲國人多稱之册府元龜卷九百六十二
