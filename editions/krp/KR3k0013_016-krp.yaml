body:
  text: 册府元龜卷十六宋王欽若等撰帝王部尊號一古者盛徳之君若九皇五帝皆典籍之所述也夏商而下降號稱王秦并天下始兼三五而建號然後尊極之名著矣歴代而下遵而不易時或因革理非㳂襲踵事増華其流彌盛乃至傾臣子之将順頌君上之徽羙守闕上書僃物典䇿所以極光大之稱流景鑠之懿也若乃欽明文思温恭允塞尭舜之徳垂於緗素至於濬哲之后據天下之圗受三靈之命億兆欣戴戎夷款附功崇徳鉅仁深澤廣繇是從人之欲順帝之則擁神休而尊明號亦何讓焉漢高祖初為漢王五年十二月既平項羽時以十月為歲首正月諸侯上疏曰楚王韓信韓王信淮南王英布梁王彭越故衡山王吴芮漢元年項羽立芮為衡山王後又奪之地謂之畨君是以曰故趙王張敖燕王臧荼昧死再拜言秦以為人臣上書當言昧犯死罪而言漢遂遵之大王陛下王者有執兵於階陛之側羣臣與至尊言不敢指斥故呼在陛者告之因卑以逹尊也先時秦為亡道天下誅之大王先得秦王定闗中於天下功最多存亡安危救敗繼絶以安萬民功盛徳厚又加惠於諸侯王有功者使得立社稷地分已定而位號比儗亡上下之分言大王與臣等并稱王是為比類相儗無尊卑之差别也分音扶問切大王功徳之著於後世不宣言位號不殊則功徳之著明者不宣於後世也昧死再拜上皇帝尊號漢王曰寡人聞帝者賢者有也言賢徳之人乃可有帝號虗言亡實之名非所取也今諸侯王皆推高寡人将何以處之哉諸侯王皆曰大王起於細微滅亂秦威動海内又以辟陋之地辟讀曰僻自漢中行威徳誅不義立有功平定海内功臣皆受地食邑非私之也大王徳施四海諸侯王不足以道之居帝位實宜願大王以幸天下幸者吉而免凶可慶幸也故人福喜之事皆稱為幸而死謂之不幸漢王曰諸侯王幸以為便於天下之民則可矣於是諸侯王及太尉長安侯臣綰等三百人綰盧綰也與博士稷嗣君叔孫通稷嗣邑名謹擇良日二月甲午上尊號漢王即皇帝位于汜水之陽汜音汎在濟隂界取其汜愛𢎞大而潤下也哀帝太初元年號曰陳聖劉太平皇帝陳導也言得神道聖者劉也陳舜後王莽陳之後謬語以明莽當簒立而不知後魏顯祖獻文帝既禪位太子於是羣公奏曰在昔三王之世澹泊無事故稱皇是以漢高祖既稱皇帝尊其父為太上皇明不統天下今皇帝幼冲萬機大政猶宜陛下縂之謹上尊號太上皇帝乃從之國之大事咸以聞後周閔帝既受魏禪即天王位至明帝三年八月改天王稱皇帝建元武成元年時崔猷為御史中大夫以為世有澆淳故帝王因以㳂革今天子稱王不足以威天下請遵秦漢稱皇帝建年號朝議從之宣帝大象元年自稱天元皇帝所居稱天臺唐高宗上元元年八月皇帝稱天皇皇后稱天后以避先帝先后之稱中宗神龍元年十一月文武百官上皇帝尊號曰應天皇帝三年八月王公以下表上尊號曰應天神龍皇帝九月庚子御太極殿受冊𤣥宗先天二年十一月羣臣上表請加尊號為開元神武皇帝曰臣聞𤣥化不宰是有强名聖徳彰聞必崇大號伏惟陛下首出千古體元獨斷掃氛祲於軒宫闡文明於宸極皇綱絶而復正神器危而重安聖逹神祗功齊天地若無尊號臣下何稱易曰隂陽不測之謂神傳曰保大定功之謂武陛下斷大事於俄頃見成形於未兆故一蓍呈祥千里傳慶斯所謂不測也興王業於多難安生靈於反側故百神奉職四夷納貢斯可謂定功也故臣等敢上尊號曰開元神武皇帝伏惟從之手詔荅曰朕觀上古人主唯稱帝王一字秦漢以来乃兼皇帝朕以薄徳嗣守寳位乾乾惕厲懼不克勝豈自崇飾以招譴咎雖迫公卿之請終負平生之心所請加號甚無謂也羣臣宗子及僧道耆艾等數百人又抗表三上乃從之戊子遂行冊禮加尊號為開元神武皇帝開元二十七年二月文武百官及僧道耆耋上表請以聖文二字加尊號凡八表然後許之天寳元年正月甲寅陳王府叅軍田同秀上言𤣥元皇帝降見于丹鳯門之通衢告錫寳符尹喜故宅遣使發得之二月享𤣥元皇帝廟百僚加尊號為開元天寳聖文神武皇帝七載五月壬申文武百僚以休祥累見上表請加尊號曰應道表再上固違不從甲戌又上表曰臣聞道之應也萬姓叶心徳之至也百靈表貺是以帝王從天以受休命臣子奉主以薦尊名下戴上為至忠上納下為大順伏惟陛下垂衣而端拱司契而乘時御宇而氣和提象而物覩臣等上稽儀極下考前訓旁求史氏明徴道書皆可以配至極之崇高建大號之美稱陛下宗師懸觧狭五帝之常道恬愉自得陋三王之仁義同符帝典振古莫儔靈寳經曰大寳君者大洞之尊神玊皇之正氣陛下經高上之至理復帝先之淳源九炁生真二合成徳殊休應道已契靈文景命揚符宿彰仙籙則知聖祖以大道授陛下乆矣當以應道答之苟人望洽而固違則羣情抑而不副是以公卿宗子懇誠於内緇黃艾耋瀝欵於外宜蒙納許以昭介福伏惟陛下承上𤣥乃顧之意順普天翊戴之情伏以端午良辰萬夀来應昌圗與兩儀配永寳運與三景俱長欽若鴻名克彰厚慶聿陳大禮式茂元和臣等謹竭愚誠冒死請加尊號期於成遂以叶衆心帝手詔報曰禎祥者所以合天人鴻名者所以彰徳業今封章繼至誠請甚勤敬膺神休允答人望宜依来請己卯有司告獻太清宫太廟庚辰告昊天上帝皇地祗太社太稷壬午公卿百辟奉冊上尊號曰開元天寳聖文神武應道皇帝御興慶殿受冊八載六月太白山人李渾上言有神人言金星洞内有玉版石記聖皇福夀之符命御史中丞王鉷入仙遊谷求而獲之以獻帝御勤政樓受焉於是王公卿士道俗又請加尊號表三上不從乃詔曰朕欲使人述日用道逺親譽願行其心永守冲約未允来請宜識此懐丙辰文武百官禮部尚書崔翹等又上表曰臣聞上𤣥成命錫禎符以應期聖皇乗時受神冊於興運是以啟殊祥於景福崇大號於至公伏惟陛下纉重𤣥之耿光嗣五聖之丕緒大徳侔於天地至化貫於隂陽感𤣥道之尊運百辟之議三冐闕下累陳洪名陛下猶以固讓為心不以至公為意臣等請以符瑞重叙明之日者五星如連珠兩曜如合璧卿雲蔚膏露凝天之貺也瑶英産於金戺𤣥記開於玉洞神光見真誥傳地之祥也固知天地以鴻休報陛下陛下以至徳通乾元允宜合符克配徽號伏奉乙卯詔書曰志存要玅理却虛名臣又聞之天不讓高地不辭大五帝法之而成象三王參之而比徳先天地者道也聖祖已著於强名合天地者聖也陛下允膺於大號式彰玅用豈曰虗名况禎祥感通既著於彼靈應參㑹又符於此是以封章再獻而雲日重光徽號三陳而烟霄降澤天人交感影響必臻若然者陛下安得闕三才之大端抑萬姓之勤願違祖宗之睠命曠天地之符文臣等固陋猶知不可况真宗示慶秘簡呈文乗王氣於玊行擁神休於寳運伏願光臨大寳允答洪休常垂覆載之仁永保延長之歴天下幸甚帝手詔從之閏月丙寅親謁太清宫上聖祖𤣥元皇帝為大道𤣥元及高祖太宗高宗中宗睿宗皇帝並加大聖丁卯羣臣奉上尊號曰開元天地大寳聖文神武應道皇帝御含元殿受册十二載十二月庚寅文武百官憲部尚書張筠等上表請上尊號加孝徳及改應為證曰開元天地大寳聖文神武孝徳證道皇帝凡三上表乃許之十三載二月甲戌御興慶殿受册肅宗至徳二年十二月壬申右僕射裴冕與百僚上言曰頃者逆寇亂常悖違天紀六位回薄三光失序上皇南廵以避狄羣臣東没而面偽當此時也勇者不及奮智者不及謀則高祖太宗之業将墜於地矣上皇知聖嗣在昌人望大啓乃付陛下以天地之事将復高祖太宗之業告成功於天伏惟陛下至孝恭順格於天地不敢以剪逆夷難之務為上皇憂遂乃赫然龍驤雷動朔野以一旅之衆康天下之迍躬尭之聪明廣聼天下率禹之勤儉以先兆人孝通徳茂格于三極故蠻夷君長来庭于要荒之外五玊寳龜納錫于旌門之内其行如雲其植如山莫不裂眥致命開懐飲鏃死而後已實乃甘心是以瘈狗噬臍而遇毒奔鯨觸綸而皆斃大風一鼔而沴氣廓清斯實再造生人之極也陛下以上皇未至延俟鑾輿清宫待幸守而不失今上皇戾正昭徳報功廣聖人崇本之義徴王者未舉之禮百神奉職親受寳符過尭邁舜以慶天下以陛下有光上皇之徳經天下之文定禍亂之武窮不測之聖通神明之孝故命陛下曰光天文武大聖孝感皇帝皆象徳景行自然之符陛下尚執謙冲遷延若未當者今羣臣咸服睿謀肅将天下猶各有茅土銘勲景鍾陛下盛徳大業終古獨立不速即徽號以蔚皇圗臣恐天地神祗勤勞仰止臣謹與太常禮官等僉擇請以来嵗正月五日上尊號伏惟陛下膺天地之誠恭上皇之命遂羣臣之請滿百靈之心延光無窮天下幸甚詔曰朕以眇躬敬承明命兩遭狂胡擾亂宗社不寧禀上皇至聖之謀當仗鉞秉旌之任大師一振殘孽無遺上皇厭彼代紛棄兹人事萬邦之重俾付朕躬傳授寳符乃加徽號朕再三固讓實増黾勉恭膺典冊感慶良深覽卿等来章倍加祗懼依卿等所請三年正月戊寅太上皇御宣政殿授帝傳國寳符及受命寳符冊帝尊號曰光天文武大聖孝感皇帝上言曰陛下顧天位之累已推以付臣臣又畏天命以固辭期不奉詔未蒙詔許以辱四海而今加之徽號錫以洪名既受寳符又傳神器是重臣以不徳私臣以殊寵豈天地之容乎神人之望乎臣聞禮有常尊器不可假名無虚立義然後行頃以寇逆慿陵京闕失守撫軍監國事在一時正位居中尊無二上至於光天之業允文允武聖繇天作孝以感通臣何有焉此皆陛下之能事也曲成之惠在慈愛而愈深至公之道将詢謀而未叶伏望寝兹嚴命俯遂勤誠臣之下情不勝至願太上皇誥曰昊穹垂裕宗社發祥爾往在髫年素彰岐嶷泊乎問寝日増孝敬吾乆勤庶務嘗奉至真特好清虚尋将付託爾以華戎鋭士掃定神州功乃格天徳惟邁古是用受兹國寳加以大號典章斯集喜慰盈懐實謂道映前王何必志在讓禮克光丕業以副至公即斷来表帝再讓不允又以大聖二字非所當之言曰帝王者天所命也稱號者人所奉也惟有徳克躋大寳惟至聖始享鴻休於是乎人神形容其美行歌咏之不足或為之名焉伏惟陛下乾坤覆載河海潤澤道逹生靈惠懐蠻貊尊九廟以崇孝謁五陵以奉先禮二郊以嚴禋祠九宫以致敬刻石北京以揚祖烈泥金東嶽以告成功自三五以還歴選列辟聪明文武齊聖廣淵丕懿純殷孰與比議卓哉煌煌真聖人之表也夫天地至大不能定愆伏之序日月運行不能正薄蝕之變自狂孽開釁俶擾天紀與時消息為人請命舞干羽而氛祲永清垂衣裳而袵席無改納萬姓於仁夀之域朝百神於清穆之上窅然姑射之山思訪襄城之野斯又臣言之不及稽古所未聞羲軒唐虞何足以云今方推而不居為而不有付臣以宗廟重器錫臣以后王徽章何以克堪辭不獲命臣自奉明誥夙夜於邑以為名不可假尊不可踰敬承嚴㫖得為孝乎至於所託者深所荷者大不敢悉拒以違天衷而大聖二字得之不易求諸故實布在冊書伏望陛下顧兹當仁期以制義今王公侯伯卿士兆人詢謀僉同稽首闕下臣敢因衆人之議成小子之志上尊號於陛下曰太上至道聖皇天帝即命有司擇日奉行冊禮其錫臣帝號大聖二字伏願許停如臣言可以簡當所希採納如臣誠不足動天伏當待罪将以明授受之道辨上下之分不勝臣子下情懇願之極伏惟陛下俯垂允許以副四海之望表上不允又表曰陛下以宗社再安天下交泰付臣以神器授臣以寳符加臣以寵章錫臣以徽號君親之義惠下之道已彰臣子之心奉上之禮未足臣所以與王公卿士百辟兆人思垂裕後昆乃悉數前美仰陛下之行者衆星之拱北辰悦陛下之澤者百川之赴東海繇是累上尊號敢冒宸威陛下以無為之心不宰萬物抑而未允至於再三羣情顒顒罔知所措一昨辛夘賜誥命曰頻覽章表懇至難違爾寳命惟新洪名允集用加大聖之字克副昊天之心若成命無渝萬國同歡於翊戴儻固辭不已吾亦未膺乎典冊今不許撝謙令斷来表進廹嚴㫖何以克堪退荷殊私無任隕越小子伏受命矣伏惟陛下允臣所請則自下上上日月之光昭從上下下雨露之恩廣臣已詢諸龜筮僃其禮物請以来月乙巳奉上册禮聖恩招納即日付外施行不勝懇願之至誥曰汝孝以奉親明以御字上從君父之命下順黎元之欲既𢎞茂實爰副崇名千古攸高百王是式循環章奏喜慰可知予志每集虗心嘗遺焰方契真宗之㫖豈云稱號之榮汝就養無違歸尊有裕載獻從龜之吉復當乙巳之辰巳僃典章當依来請是月乙巳於興慶殿冊太上皇尊號曰太上至道聖皇天帝乾元元年十二月乙未公卿道俗上表請加號曰乾元三表乃許之二年正月朔帝御含元殿受朝賀便冊尊號曰乾元大聖光天文武孝感皇帝上元二年九月壬寅詔曰朕獲守丕業若履春氷敢忘謙冲日益招損欲垂範而自我亦去華而就實其乾元大聖光天文武孝感等尊崇之稱何徳以當之自今已後朕號唯稱皇帝代宗寳應二年四月辛巳宰臣及文武百僚郭子儀等上尊號表曰臣聞功莫大於締搆乾坤孝莫先於纉承社稷伏惟皇帝陛下繼述冠於周武中興邁於漢光曩者巨逆慢天中原失序生人罹厥角之禍皇運甚綴旒之危陛下親討元兇指麾戎旅尊先帝於靈武返上皇於巴蜀以一旅而掃定二京不再周而克寧九廟是陛下締搆之功也及乎先帝厭代姦臣窺國懐躡足之變搆無将之端陛下隳将成之禍胎挫已就之凶計申大義而誅吕全至公而嗣文日月蝕而重明寰宇傾而再定陛下纉承之孝也臣伏以古先帝王繼體踐祚者年踰則改元創業垂統者功成則上號陛下頃以先帝梓宫象設猶在橋山石室弓劍未蔵固違體天之典将申寧戚之義孝思之至又何加焉今二聖靈輴永安陵寝萬方黎庶悉夢華胥聖人之哀榮畢矣帝王之功業成矣宜其大崇徽號允羣臣顒然之望惟新正朔覃四海莫大之澤伏願降明詔下有司許臣等徴三代之故事考百王之通典改元立號革故鼎新懸之無窮倬映千古臣子儀等與羣臣萬姓不勝懇請大願之至手詔答曰朕嗣守洪業欽承丕搆克清多難奄甸四方聖靈在天𤣥徳敷佑南面恭已朕何有焉巨猾削平非予之武言念海内生人至艱兵鋒猶虞暴骨未掩日旰忘食宵分疚懐遽稱成功良謂虗美𤣥宫甫畢豈宜即及改元寳位至尊何以更言加號宰臣之任職在輔弼勸進之詞深所不取表三上乃許之六月丙申上表獻議曰陛下昔在藩邸及登儲闈聪明狥齊齋肅端冕遇闕則下入廟必趨及乎著代成人繼明踐阼聖姿天縱神化日新學冠九流觀書過於乙夜文高五始逸興麗於秋風此則陛下明昭之文徳也頃者凶羯亂常彛倫失序陛下親搃戎旅誅討元凶掩慶緒於雒陽斬朝義於河朔罷三司而復其位職人懐莫大之恩收兩京而不問脅從國荷非常之澤洎先帝大漸凶臣伺釁陛下釋服即戎提戈清難九重遘慝王室危於綴旒百姓不知天下安於山岳此則陛下定難之武功也若夫心游繋象之表理絶名言之外聖斷沈逺同隂陽之不測睿謨鈎深與鬼神而争奥休氣潜盈草木化為禎祥淳風逺覃蠻夷效其獻貢加以明並日月徳叅乾坤風雨應時自有雍熙之兆魚鱉咸若更登仁夀之期此則陛下莫大之至聖也至於色養盡心慎終追逺問安内豎豈一日而忘朝視膳宰夫知再飰而方退及乎三聖違代九域侵臨至性自天哀容觸地門外之禮權依易月之期從心之喪實履終天之痛財傾象設力竭山陵莫不徳通於神明哀感於天地故得役徒百數之衆皆曰子来送終三十餘日曽無塗潦此則陛下感通之至孝也若乃神告聖運天呈寳符陛下登極之辰泗水見其五璧天兵滅虜之日黄河清於千里神烏白雀之祥填林溢囿卿雲甘露之瑞嵗至月書此皆靈貺昭告休期之大應也且夫允恭濬哲有軒轅戰伐之功焉徳合乾坤有伏羲尊聖之業焉降天休呈地寳有夏禹𤣥珪之感焉經天緯地之謂文立極中興之謂武變化無方之謂聖精誠上通之謂孝降天和騰地氣生無期出有為之謂寳文以昭之武以定之聖以成之孝以通之寳以應之夫然後可以充天地之洪名崇帝王之大號故臣等犯冐萬死奉上寳應元聖文武孝皇帝尊號伏願陛下祗膺景命對越神祗應天理人光膺大典臣等謹當撰吉日脩禮容設九賓覿羣后昭告烈祖清廟展黄琮之儀有事昊穹圜丘陳蒼璧之禮臣子儀等與羣臣萬姓不勝大慶謹上尊號以聞詔下有司七月壬寅御宣政殿受羣臣上尊號冊曰寳應元聖文武孝皇帝徳宗建中元年正月丁卯朔改元羣臣上尊號曰聖神文武皇帝興元元年正月朔車駕在奉天詔曰乃者公卿百寮用加虛美以聖神文武之號被蒙䦣寡昧之躬固辭不獲俯遂羣議昨因内省良所瞿然體隂陽不測之謂神與天地合徳之謂聖豈伊淺劣所敢當文者所以成化武者所以定亂朕自君臨于今六載化之不被亂是用興豈可苟狥羣情猥當徽號重予不徳益用懐慙自今以後中外所上書奏不得更言聖神文武之號貞元五年十月百僚累上表請復徽號詔曰三省来章彌用兢惕載崇大號何以當之前者示懐盖非冲讓尚勞敦請豈所宜然卿等愽逹古今列於朝右思𢎞獻替共致太和豈以虛名重予不徳再三循復増恧于懐想悉深𠂻勿更陳請六年九月戊午百僚京城道俗等詣闕抗表請上貞元聖神文武皇帝尊號手詔不許十月己亥再詣闕抗表猶不許因謂侍臣曰今年春夏亢旱粟麥不登朕精誠祈禱獲降甘雨既致豐穰告謝郊廟朕儻因禋祀而受徽號是有為為之更勿煩請也順宗永貞元年八月禪位于憲宗十二月辛酉宰臣文武百僚等請上太上皇及皇帝尊號表曰臣聞帝尭之禪虞舜也業歸于異代漢祖之尊太上也禮循乎虗名未有履尊極而捨萬乗之榮奉晨昏而傳七廟之重斯則尭圗非逺漢道未全倬然冠洪名而超古昔者孰若今之盛也伏惟皇帝陛下誕受聖姿欽膺寳歴自天生徳與神合契近者太上皇㳟黙在疚禪授未行萬國注心思尭言以致理羣生属望渴聖人之利見陛下忠感於天地孝逹於神明成尭舜之内禪固邦家之景命功莫盛於配天孝莫大於寧親讓莫高於𫝊聖故太上皇釋天下之負所以成其讓陛下受宗祧之寄所以保其功惟文王為無憂惟武王為善繼夏祀永固周命惟新巍巍蕩蕩固無徳而稱矣又聞皇帝之道必體於至公稱號所加不私於為已将體元以立政必紀年以垂號伏願肇兹獻嵗允極鴻名發揮𤣥功昭示景化則太上皇之徳可表於徽冊陛下之孝克施於寰海然後父殳子子君君臣臣仰東海者知聖化之深躋南山者願聖人之夀臣等不勝大願請上太上尊號曰應乾聖夀太上皇請上陛下尊號曰文武大聖孝徳皇帝因三正之慶會鼓萬國之歡心奉寳册以薦鴻徽率羣臣而朝上日然後退自問寝列兹充庭先陳教孝之儀方受慶君之禮斯實邦家之耿光也古今之絶典也雖朝賀有次已稟於綸言而徽號所尊益勤於俞詔兆人懇願罔不顒然憲宗詔答曰高祖太宗接千載之統垂無疆之休太上皇承九聖之烈𫝊莫大之慶嗣徳纉業允文允武𢎞帝尭之欽明宗𤣥元之清浄付朕天下頤神保和至道光於唐虞至仁合於天地卿等䖍述休徳祗獻鴻名循省再三允符朕志朕獲守寳位丕承睿訓雖嚴恭寅畏不敢怠遑而澤未洽於羣生理未臻於皇極遽言徽號何以當之雖嘉乃誠難遂来請其上獻太上皇尊號宜依所奏凡百卿士當體至懐明年正月丙寅朔太上皇居興慶宫受朝賀皇帝率百僚奉上尊號曰應乾聖夀太上皇帝册府元龜卷十六
