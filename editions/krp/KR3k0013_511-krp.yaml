body:
  text: 册府元龜卷五百十一宋王欽若等撰邦計部曠敗誣誷貪汚曠敗夫均其民財制兹國用斯為重任必俟能臣茍才識之有愆則經費之不足若乃師徒待濟失饋運之期水旱為災乏防虞之備弗克莅事皆謂曠官自拘司敗又何悔焉漢鄭當時為大司農時征匈奴招四夷天下費多財用益屈屈盡也其勿切當時任人賓客僦當時為大司農而任使其賓客辜較作僦也僦謂受顧賃而載運言當時保任其賓客於司農載運也僦音子就切入多逋負司馬安為淮隂太守發其事當時以此陷罪贖為庶人唐韋挺為太常卿太宗將伐遼東令挺先運軍糧河北諸州取挺節度挺厯職清顯無他材術徒以闗中舊望時見優寵性自矜尚頗以敖物致譏行至幽州但置酒髙宴又不先簡河路遽出庫物造船六百餘艘役召百姓貞觀十八年秋運米自桑乾河下至虜思臺去幽州八百里方知運漕壅塞乃大徴夫役以廣渠道挺既失支度方懐憂懼晝夜驅迫箠楚亂加官人百姓莫不愁苦船米竟不得進更屬雪寒遂下米於臺側馳傳以聞太宗不恱詔挺曰兵尚拙速不貴工遲朕欲十九年春大舉今言糧米未發甚無謂也㑹太宗遣使往挺所檢覆路渠使人迴具陳其狀并言必欲十九年出師恐米無濟軍之理太宗大怒令將作少匠李道裕代挺發使械挺赴雒陽除名仍遣從軍第五琦為户部侍郎判度支領河南等道支度都勾當轉運租庸鹽鐡鑄錢司農太府出納山南東西江淮南館驛等使乾元二年以本官加同中書門下平章事初琦以國用未足幣重貨輕乃請鑄乾元重寳錢以一當十行用之及作相又請更鑄重輪乾元錢一當五十與乾元錢及開通元寳錢三品並行既而穀價騰貴餓饉死亡枕藉道路又盗鑄爭起中外皆以為琦變法之弊封奏日聞是年貶忠州長史蘇弁為户部侍郎判度支坐給長武城軍糧朽敗貶汴州司户叅軍潘孟陽憲宗初權知户部侍郎時既誅王叔文乃以杜佑專度支事請孟陽為副帝新即位乃命孟陽巡江淮省財仍加鹽鐵轉運副使且察東南鎮帥之理孟陽以氣豪權重所至唯務賞宴奢縱每厯鎮府傾涸酒饌與婦女為夜飲奔走財賄補吏職而已及歸大失人望罷為大理卿楊於陵為兵部侍郎判度支淮西用兵於陵用所親為唐鄧供軍使節度使髙霞㝢以供軍有闕移牒度支於陵不為之易供闕如舊霞㝢軍屢有摧敗詔書督責之乃奏以度支饋運不繼憲宗怒貶於陵桂陽郡守王彦威為户部侍郎判度支㑹邊軍上訴衣物不時兼之朽故宰臣惡其所為攝度支人吏付臺推訊彦威殊不介懐入司視事及人吏受罰左授衞尉卿停務方還私第後唐孔謙為租庸使莊宗同光三年秋雨河大水户口流亡都下供饋不充軍士乏食謙日於上東門外竚望輦轂計數旋給諸軍各出怨言以至於亂明宗至雒陽乃下詔暴謙罪惡削奪官爵斬於都市籍沒其家孟鵠眀宗初為三司副使出為相州刺史㑹范延光再典樞機乃徴鵠為三司使鵠專掌邦賦操剸依違名譽頓減朞年疾發求外任乃授許州節度使不周歲卒晉賈元珪少帝時為膳部員外郎開運三年左降秦州觀察支使以監安州㩁稅不及舊數故也誣誷古人有言曰與其有聚歛之臣寧有盗臣且聚歛之臣猶害於政况其掌邦計之重蓄誣誷之心或虚張名目多設鈎距或逞其剛愎謀害俊乂惟兾希於主意殊不恤於人言㒺察夫涸民之力謂其有富國之術及夫公輔發其誕妄生民空於杼軸亦乃稔於譎詐安於柄用斯亦有國之巨害也唐宇文融𤣥宗開元中為兵部員外郎兼侍御史充捜括逃户使於是諸道括得客户凡八十餘萬田亦稱是州縣希融㫖意務於獲多皆虚張其數亦有以實户為客者歲終得客户錢數百萬融繇是擢拜御史中丞尋兼户部侍郎王鉷天寳中為御史中丞勾當户口色後使時有勑給百姓一年復鉷即奏徴其脚錢廣張其數又市輕貨乃甚於不放輸納物者有浸漬折估皆下本郡徴納恣行割剥以媚於時人用囂然𤣥宗在位多載妃御承恩多賞賜不欲頻於左右藏取之鉷探㫖意歲進錢寳百億萬便貯於内庫以恣主恩錫賚鉷云此是常年額外物非征稅物帝以為鉷有富國之術利於王用益厚待之韓滉代宗時為户部侍郎判度支大厯十二年秋霖雨害稼京兆尹黎幹奏畿縣多損田滉執云幹奏不實乃命御史巡覆迴奏諸縣凡損三萬一千一百九十五頃渭南令劉澡曲附滉言所部無損户部分廵官御史趙計復簡行奏與澡合帝覽而疑之命御史朱敖再簡渭南損田三千餘頃澡計皆伏罪貶滉弄權樹黨皆此類也俄改太常卿羣議未息又出為晉州刺史憲宗即位滉為鎮海軍節度使貞元二年尚書右丞元琇判度支以闗輔旱儉請運江淮租米以給京師帝以滉素著威名加江淮轉運使欲令専督運務琇以滉性剛愎難與集事乃條奏令滉督運江南米至揚子凡一十八里自揚子而北皆元琇主之滉深怒於琇琇以京師錢重貨輕切病之乃於江東鹽監院收獲見錢四十餘萬貫令轉送入闗滉不許乃誣奏之以為運千錢至京師費錢萬於國有害請罷之帝以問琇琇奏曰一千之重約與米一㪷均至江南水路至京一千之運所費三百耳豈至萬乎帝然之遣中使齎手詔令運錢滉堅執以為不可其年十二月加滉度支諸道轉運等使遂逞宿怒誣奏琇罪貶雷州司户其責既重舉朝以為非裴延齡徳宗時為司農少卿貞元八年守本官權領度支自揣不通食貨之務乃多設鈎距召度支老吏與謀以求恩顧乃奏言天下每年出入錢物新陳相因常不減六七千萬貫唯在一庫差舛散失莫可知之請於左蔵庫中分置别貯久負耗賸等庫及季庫納給諸色錢物帝皆從之且貴欲多張名目以惑帝視聽其實於錢物更無增加惟虚費簿書人吏耳其年遷户部侍郎判度支京西有汚池卑濕處時有蘆葦生焉亦不過數畝延齡乃奏云廐馬冬月合在槽櫪秣飼夏中即須牧放比尋訪得長安咸陽兩縣界有陂池數百頃請以為内廐牧馬之地且去京城十數里與苑廐中無别帝初信之言於宰相宰相對曰恐必無此帝乃差官閱視事皆虚妄延齡既慚且怒又誣奏京兆尹李充為百姓妄請積年合市物價特勑令折填謂之底折錢常因奏對請積貯錢帛以實帑藏帝曰若為可得錢物延齡奏曰開元天寳中天下户僅千萬百司公務殷繁官員尚或有缺自兵興以來户口減耗大半今一官可兼領數司伏請自今已後内外百官闕未須補置收其闕官禄俸以實帑藏後因對事帝謂延齡曰朕所居浴堂院殿一袱以年多之故似有損壊而未能換延齡曰宗廟事重殿袱事輕陛下自有本分錢物帝驚曰本分錢者何也對曰此是經義愚儒常才不可能知陛下正合問臣惟臣能知之准禮經天下賦稅當為三分一分乾豆一分充賓客一分充君之庖㕑乾豆者供宗廟也今陛下奉宗廟雖至敬至嚴至豐至厚亦不能用一分財賦也只如鴻臚禮賓諸國蕃客至於廻鶻馬價用一分錢物尚有贏羨甚多况陛下御膳宫厨皆極簡儉所用外已賜百官充俸料飱錢等猶未能盡據此而言庖厨之餘其數尚多皆陛下本分錢也用修數十殿亦不合疑何况一袱帝曰經義如此人總未曽言之頷之而已又因計料造神龍寺須長五十尺松木延齡奏云臣於近同州簡得一谷木可數千條皆長七八十尺帝曰人云開元天寳中側近求長五六十尺木尚未易得皆須於嵐勝等州採市如今何為近處便有此木延齡奏曰臣聞賢材寳物皆處處常有但遇聖君即出現今此木生自闗輔盖為聖君豈開元天寳合得有也十年陸贄秉政帝素所禮重每於延英極論其誕妄不可令掌財賦帝以為排擯待延齡益厚贄上書疏其失帝不恱是時鹽鐡轉運使張滂京兆尹李充司農卿李銛以事相闗皆證延齡矯妄帝罷陸贄知政事為太子賓客滂充銛悉罷職左遷十一年春暮帝數畋于苑中時久旱人心憂惴延齡遽上疏言贄等失權怨望今専大言於衆曰天下災旱人庶流亡度支多欠闕諸軍糧草以激怒羣情後數日帝又幸苑中適㑹神䇿軍人訴度支欠廐馬芻草帝思延齡言即時廻駕因發怒遂斥逐贄充滂銛等朝廷中外惴恐延齡方謀害朝中正直之士㑹諫議大夫陽城等伏閤上疏固諫事遂且止陸贄等雖貶黜延齡憾怒未己乃掩捕充腹心吏張忠拷掠捶楚令為之辭云充前後隱沒官錢五十萬貫米麥稱是其錢物多結託權貴充妻嘗於車檐中將金寳繒帛遺贄妻忠不勝楚毒並依延齡教示之詞具於欵占忠母及妻等散於光順門匭使進狀訴寃詔御史臺推問一宿得其寔狀事皆虚妄延齡又奏京兆府妄破用錢糓請令比部郎中崔元翰覆勾元翰嘗為陸贄所黜也及比部奏京兆府糓帛又無交加二年三月加户部尚書依前判度支是歲諸道鹽鐵轉運使王緯奏度支所奏諸道州府欠諸色錢四百餘萬貫臣檢勘得各州府報具有破除及申送處先是延齡奏此錢為羨餘請進奉别收貯以圖恩寵至此緯以實奏之延齡大怒始與緯有隙是時穆賛為御史中丞延齡屬吏有贓犯賛鞫理承伏延齡請曲法出之賛三執不許以欵聞延齡誣賛不平貶饒州别駕延齡既銳意以苛刻剥下附上為功每奏對之際皆恣騁詭怪虚妄他人莫敢言者延齡言之不疑亦人之所未嘗聞帝頗知其誕妄但以其敢言無隱且欲訪問外事故斷意用之杜亞貞元中為東都留守既染風疾又希恩寵乃奏請開苑内地為營田以資軍糧減度支每年所給從之亞不躬親部署但委判官張薦楊腆初奏請取荒地營田其苑内地堪耕食者先為留司中官及軍人等墾食已盡亞計急乃取軍中雜錢舉息與畿内百姓每至田收之際多令軍人車牛散入村鄉收歛百姓所得菽粟悉將還軍家畧盡更無可輸稅及充糧食由是大致流散又厚賂中官令奏河南尹無政亞自此規求兼領河南尹事既不果徳宗漸知虚誕乃以禮部尚書董晉代為吏部留守召亞還京師蘇弁代裴延齡為户部侍郎判度支貞元十三年三月弁奏諸道州府各遭旱損其諸州府有貞元八年已前見貯米麥斛斗三百八十萬石請各委州府借貸令秋成熟後依本數却納可之輿議以其米麥等多散在百姓間歲月已久人户流亡無從徴得弁此奏但為虚妄耳李實簡校工部尚書司農卿貞元二十年春夏旱闗中大歉實為政猛暴方務聚歛進奉以固恩顧百姓所訴一不介意因入對徳宗問人疾苦實曰今年雖旱糓田甚好由是租稅皆不免人窮無告乃有徹屋瓦木賣麥苗以供賦歛者皇甫鏄憲宗元和末為門下侍郎平章事判度支時内出滯貨付度支佑賣多陳朽之物鏄盡以善價買之以給邊軍羅縠繒綵觸之而化隨手散壊軍士怨怒皆聚而焚之宰臣裴度與鏄延英奏事度因盛言軍所得衣賜皆積年敗物可視不可觸軍士咸怨鏄因引其足曰此靴乃内庫出賣者臣以俸錢百千買之堅新可以久服所言不任用皆詐也帝然之由是益無所憚賀拔志穆宗時為度支水邊營田使長慶四年六月丁亥振武軍節度使奏志以刅自割不死志前奏營田數過實將圗功效及命主客郎中白行簡覆騐志不勝其懼遂欲自裁張平叔為鴻臚卿判度支長慶二年因延英對回詣相府云面奉恩㫖除户部侍郎職如舊間二日詔方下初幽鎮行營諸軍以出境仰給度支者十五餘萬人魏博滄景之師皆壓賊境而壘亦藉兵數徴計司所給自南北置供軍院其布帛衣粟往往不至供軍院遽為諸軍强見驅奪懸師前鬭者反無以支給其饋餉主吏由此得罪者前後相次平叔知國用空乏遂以牙計得司邦賦至是又寵之地卿然竟無術以救其闕驟塵顯級人皆罪之王播敬宗時為淮南節度使復領鹽鐵轉運使播既得舊職乃於銅鹽之内巧為賦歛以事月進名為羨餘其實正額務希奬擢不恤人言貪汚詩云貪人敗類傳云貪以敗官為墨盖貪而不敗者未之有也夫小人縱欲棄義貪冒崇侈心甚丘壑莫之盈厭語利於市猶為不可况夫總管𣙜之任舉飛漕之職内度經費外調輿賦㒺能避白圭之玷全素絲之潔惟以取舎由己奢僣是圗虐下以刑傾衆以勢侵盜于國誅求于民聚歛積實不知紀極以至苞苴盈門簠簋不飭罹罪罟伏歐刀而不悔焉何狥財瀆貨之至是也漢田延年為大司農先是茂陵人焦氏賈氏以數千萬隂積貯炭葦諸下里物死者歸蒿里𦵏也故曰下里又曰以數千萬錢為本而貯此物昭帝大行時方上事暴起方上事壙中也用度未辦延年奏言商賈或豫收方上不祥器物兾有疾用欲以求利非民臣所當為請沒入縣官奏可富人亡財者悉怨出錢求延年罪初大司農取民牛車三萬兩為僦一乗為一兩僦謂賃之與僱直也藏沙便橋下送致方上車直千錢延年上簿詐増僦直車二千凡六千萬盜取其半焦賈兩家告其事下丞相議奏延年主守盜三千萬不道及使者召延年詣廷尉聞鼓聲自刎死使者至司農司農發詔書故鳴鼓也唐吳裴代宗時為舟水轉運使襄王府司馬大厯二年與判官大理司直殷釪音于並坐贓配流嶺外裴等以戚屬得入中禁妄陳利害督錢糓之物貪冒貨賄更相糾謫及訊鞫奸贓悉露帝深惡之崔渙為御史大夫稅地青苗錢使渙給百官俸物不平皇城副留守張清發之代宗詔尚書左丞蔣渙等訊鞫數日以渙及判官等贓狀聞貶渙為道州刺史判官出削有差初渙為屬吏希中以下估為使料上估為百官料有司訊鞫渙無詞以對乃坐是貶鄭浪徳宗時為度支山南東道巡院貞元四年九月坐乾沒財物徴擾平人質其妻女穢黷士類醜跡姦情枉法殊死宜令所在决重杖一頓處死徐粲貞元中為御史中丞主揚子院鹽鐵轉運粲既不理且以賄聞判度支使竇參欲代之副使班宏執不可户部侍郎張滂至揚州按粲逮僕妾子姪得贓鉅萬乃徙嶺表裴延齡貞元中為户部侍郎判度支既病多載運度支官庫中錢物歸私第無人敢言李錡貞元中為浙西觀察諸道鹽鐵轉運等使鹽鐵漕輓之利積於錡之私室而國計日耗于臯謩憲宗時為行營糧料使元和六年五月坐犯諸色贓計錢四千二百貫并前糧料使董谿犯諸色贓計四千三百貫又於正額供軍市糴錢物數内抽充羨餘公廨諸色給用計錢四萬一千三百貫勑于臯謩董谿等頃以山東興師饋運務重朕召於内殿委以使車誡厲激揚非不誠切亦謂盡力成務滅私奉公而乃肆意貪求曽無忌憚擅請時服乾沒軍資負恩敗法一至於此據其罪狀合寘極刑以其嘗列班行皆承門序𢎞以好生之澤免其殊死之辜是俾投荒期於勿齒臯謩除名配流春州董谿除名配流封州其判官崔元受韋岵薛巽王湘等並貶嶺外臯謩谿行至潭州並專遣中使賜死六月丁丑御史臺奏推問前行營糧料使判官元翛及典吏等計贓一千萬宜并付京兆府各决重杖一頓處死權長孺為鹽鐵福建院官元和四年十一月坐贓一萬三百餘貫詔付京兆府杖殺之其母劉求哀於宰相崔羣因對言之憲宗愍其母老乃曰朕將捨長孺之死何如羣對曰陛下即捨之當速使人往若待正勑不及矣帝乃使品官馳往止之翌日詔杖八十長流康州張宗本穆宗時為山劒三川㩁鹽使長慶元年坐盜用東川院及諸監院耗剰錢共一萬五百餘貫推按明驗前勑决痛杖一頓處死㑹逼降誕日宗本子贄進狀請代父命帝因貸死决杖八十配流雷州羅立言敬宗時為鹽鐵河隂留後簡校主客員外郎兼殿中侍御史寳厯二年七月坐和糴米價不實計入已贓一萬九千三百餘貫制削兼侍御史立言贓狀狼藉不死為幸而所責止於削去冗秩執事者侮易典法亦云甚矣韓益文宗時為金部員外郎判度支案開成元年十月貶梧州司户叅軍益初為度支推巡官累至員外郎判案子弟僮僕與人吏交通御史鞫訊計贓三千餘貫半是擬贓及前為推巡時所犯帝問御史中丞歸融曰韓益所犯與去年盧元中姚康孰甚融對曰元中與康枉破官錢三萬餘貫韓益乃取受人事比之殊輕遂有是貶梁趙巖為租庸使天下貨賂半入其門奢侈不法自古無比每日之費破錢數萬僦歛商販其徒如市天下良田美宅可有千計後唐尹玉羽明宗時為解縣㩁鹽使遷光祿大夫天成三年五月為人所訟使過官錢按之不虚且令徴納填贓纔足自舉欲就通班勑㫖停見任周䕶末帝時為户部郎中充鹽鐵判官大通賄賂輙無避忌掌計者目之無如之何清泰之政隳焉晉董遇髙祖天福中為三司副使阿附人吏滯於部斷有王景遇者累掌銅鹽雜務善以賂事人朝廷之間多有受其媚為之左右者因其貨數千萬賂遇求為解縣㩁鹽使數年敗負下獄景遇蔓引數十人而遇以受賂聞周李知損仕晉為右司郎中充度支判官坐受㩁鹽使王景遇厚賂謫於均州冊府元龜卷五百十一
