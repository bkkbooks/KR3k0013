body:
  text: 册府元龜卷六百四十宋王欽若等撰貢舉部條制第二唐天寳元年四月詔曰化之原者曰道道之用者為徳其義至大非聖人孰能章之昔有周季年代與道䘮我列祖𤣥元皇帝乃發明妙本汲引生靈遂著𤣥經五千言用救時弊義髙象繫理貫希夷非百氏之能儔豈六經之所擬承前習業人等以其卷數非多列在小經之目㣲言奧㫖稱謂殊乖自今以後天下應舉除崇𤣥學生外自餘所試道徳經宜竝停仍令所司更詳擇一小經代之其道經為上經徳經為下經庶乎道尊徳貴是崇是奉凡在遐邇知朕意焉五月中書門下奏兩京及諸郡崇𤣥學生等准開元二十九年正月制前件人合習道徳及南華通𤣥冲虚等四經又准天寳元年二月制改庚桑子為洞靈真經准諸條補崇𤣥學亦合習讀伏准後制合通五經其洞靈真經人間少本臣近令諸觀尋訪道士全無習者本既無廣業實難成并通𤣥冲虚二經亦恐文字不定𤣥教方闡學者宜精其洞靈等三經望付所司各冩十本校定訖付諸道採訪使頒行其貢舉司及兩京崇𤣥學生亦望各付一本今冬崇𤣥學人望且准開元二十九年正月諸條考試其洞靈真經請待業成後准式從之二年三月十六日制崇𤣥生試及帖冊各減一條三年業成始依常式七載五月詔曰道教之設淳化之源必在𢎞闡以敦風俗頃列四經之科將冠九流之首雖及門求進頗有其人而覩奥窮㣲罕聞逹者豈専精難就為勸奬未𢎞天下諸色人中有通明道徳經及南華等四經任於所在自舉各委長官考試申送其崇𤣥生出身自今以後每至選宜減於常例以為留放十一載七月舉人帖及口試竝宜對衆考定便唱通否十二月勑禮部舉人比來試人頗非允當帖經首尾不出前後復取者也之乎頗相類之處下帖為弊已久須是釐革禮部起請每帖前後各出一行相類之處並不須帖是載禮部侍郎楊浚始開為三行不得帖斷絶疑似之言也明經所試一大經及孝經論語爾雅帖各有差帖既通而口問之一經問十義得六者為通而後試䇿凡三條三試皆通者為第進士所試一大經及爾雅舊制帖一小經并註開元二十五年改帖大經其爾雅亦并帖註也帖既通而後試文試賦各一篇文通而後試䇿凡五條三試皆通者為第經䇿全通為甲䇿道四帖通四帖以上為乙䇿道三帖通三以下及䇿雖全通而帖經文不通四或帖經雖通四以上而䇿不通四皆為不第明法試律令各十帖試冊共十條律七條令三條全通為甲通八以上為乙自七以下為不第書者試説文字林凡十帖説文六帖字林四帖試無常限皆通者為第算者試九章海島孫子五曹張丘建夏侯陽周髀五經綴術緝古帖各有差九章九帖五經等七部各一帖綴術六帖緝古四帖兼試問大義皆通者為第凡衆科有能兼學則加超奨不在常限案今科第秀才與明經同為四等進士與明法同為二等然秀才之科久廢而明經雖有甲乙丙丁四科進士有甲乙二科自武徳以來明經惟有丙丁第進士惟乙科而已先試之期命舉人謁于先師有司卜日宿張於國學宰輔以下皆會而觀焉博集羣議講論而退禮部闗試之日皆嚴設兵衛薦棘圍之捜索衣服譏訶出入以防假濫焉其進士大抵千人得第者一二明經倍之得第者十一二其制誥舉人不有常科皆摽其目而搜揚之試之日或在殿庭天子親臨觀之試已糊其名於中考之文册髙者特授以美官其次與出身開元以後四海晏清士無賢不肖恥不以文章逹其應詔而舉者多則二千人少猶不減千人所收百纔有一十二載七月詔天下舉人不得充鄉試皆須補國子學生及郡縣學生然後聽舉四門博士停十三載十月御含元殿親試博通墳典洞曉𤣥經詞藻宏麗軍謀出衆等舉人命有司供食既暮而罷其詞藻宏麗問䇿外更試詩賦各一首制舉試詩賦自此始也是月道舉停習道徳經加周易宜以來載為始十四載二月𢎞文舘學生自今以後宜依國子監學生例帖試明經進士帖經並減半雜文及䇿皆須粗通仍永為常式肅宗至徳二載已後依前鄉貢乾元元年四月詔曰國子監學生明經法帖策口試各十並通四以上進士通三與及第鄉貢明經准常式州縣學生放歸營農待賊平之後任依常式代宗寳應二年六月禮部侍郎楊綰上疏曰國之選士必資賢良盖孝友純備言行敦實居常育徳動不違仁體忠信之資履謙恭之操蔵器則未嘗自伐虚心而所應必誠夫如是故能率已從政化人鎮俗者也自叔葉澆詐兹道浸㣲争尚文詞互相矜衒馬卿浮薄竟不周於時用趙壹虚誕終取擯於鄉閭自時厥後其道彌盛不思實行皆狥空名敗俗傷風備載前史古人比文章於鄭衛盖有繇也近焬帝始制進士之科當時猶試策而已至髙宗朝劉思立為考工員外郎又奏進士加雜文明經加帖從此積弊轉而成俗幼能就學皆誦當代之詩長而博文不越諸家之集逓相黨與用致虛聲六經則未嘗開卷三史則皆同挂壁况復徴以孔門之道責其君子之儒者哉祖習既深奔競為尚矜能者曽無愧色勇進者但欲凌人以毁黷為常談以向背為己任投刺干謁驅馳於要津露才揚巳宣騰於當代古之賢良方正豈有如此者乎朝之公卿以此待士家之長老以此垂訓欲其返敦朴懐禮讓守忠信識亷隅何可得也譬之於水其流已濁若不澄本何當復清方今聖徳御天再寧寰宇四海之内顒顒向化皆延頸舉踵思聖朝之理也不以此時而理之則太平之制又乖矣凡國之大柄莫先擇士自古哲后皆側席待賢今之取人令投牒自應殊非經國之體也欲望請依古制令縣令察孝廉審知在鄉閭有孝友信義㢘恥之行加以經業才堪策試者以孝亷為名薦之於州刺史當以禮待之試其所通之學其堪者送名於省自縣至省不得令舉人輙自陳牒比來有到狀保辨試牒等一切並停其所習經取左傳公羊榖梁禮記周禮儀禮尚書毛詩周易任通一經務取深逹奥㫖旁通諸家之義試日差諸司官有儒學者對問每經問義十條問畢對策三道其策皆問古今理體及當時要務取堪行用者其經義并策全通為上第望付吏部便與官其經通八策通二為中第與出身下第者罷歸其明經比試帖經殊非古義皆誦帖括兾圖僥倖近有道舉亦非理國之體望請與明經進士並停其國子監人亦請准此如有行業不著所繇妄相推薦請量加貶黜所兾數年之間人倫一變既歸實學當識大猷居家者必修徳業從政者皆修亷恥浮競自止敦龎自勸教人之本實在兹焉事若施行即别立條制詔委左右丞相諸司侍郎御史大夫中丞給舍同議奏聞給事中李栖筠尚書左丞賈至京兆尹兼御史大夫嚴武各奏議状與綰同賈至議曰謹案夏之政尚忠殷之政尚敬周之政尚文文與忠敬皆統人之行也且諡號述行美於文文興則忠敬存焉是故前代以文取士本行文也繇詞以觀行則及詞也宣父稱顔子不遷怒不貳過謂之好學至乎修春秋則游夏之徒不能措一詞不亦明乎間者禮部取人有乖斯義易曰觀乎人文以化成天下闗雎之義曰先王以是經夫婦成孝敬厚人倫美教化移風俗盖王政之所繇廢興也故延陵聴詩知諸侯之存亡今試學者以帖字為精通不窮㫖義豈能知遷怒二過之道乎考文者以聲病為是非惟擇浮艶豈能知移風易俗化天下之事乎是以上失其源而下襲其流波蕩不知所止先王之道莫能行也夫先王之道消則小人之道長小人之道長則亂臣賊子繇是生焉臣弑其君子弑其父非一朝一夕之故其所繇來者漸矣漸者何謂忠信之凌頽恥尚之失所未學之馳騁儒道之不舉四者皆繇取士之失也夫一國之士繫一人之本謂之風贊揚其風卿大夫也卿大夫何嘗不出于士乎今取士試之小道而不以逺者大者使干禄之徒趨馳末術是誘道之差也夫以蝸蚓之餌雜垂滄海而望吞舟之至不亦難乎所以食垂餌者皆小魚就科試者皆小藝四人之業士最闗於風化近代趨士靡然向風致使禄山一呼而四海震蕩思明再亂而十年不復向使禮讓之道𢎞仁義之風著則忠臣孝子比屋可封逆節不得而萌也人心不得而揺也且夏有天下四百載禹之道䘮而殷始興焉殷有天下六百祀湯之法棄而周始興焉周有天下八百年文武之政廢而秦始并焉觀三代之選士任賢皆取實行故能風俗淳一運祚長逺秦坑儒士二代而亡漢興雜三代之政𢎞四科之舉西京始振經術之學東都終持名節之行至有外戚竊位强臣擅權弱主外立母后専政而社稷不隕終彼四百豈非學行扇化於鄉里哉厥後文章道弊尚於浮侈取士術異茍濟一時自魏至隋四百餘載三光分景九州阻域竊號僣位徳義不修是以子孫速顛享國咸促今國家革魏晉梁隋之弊承夏商周漢之業四隩既宅九州攸同覆燾亭育合徳天地安有捨皇王舉士之道從亂代取人之術此公卿大夫之恥也楊綰所奏實為正論然自典午覆敗中原板蕩戎狄亂華衣冠遷徙南北分裂人多僑處聖朝一平區宇尚復因循版圖則張閭井未設士居鄉土百無一二因縁官族所在耕桑地望繫數百年之外而身皆東西南北之人焉今欲依制鄉舉里選猶恐取士之未盡也請兼廣學校以𢎞訓誘今兩京有大學州縣有小學兵革一動生徒流離儒臣師氏禄廪無向貢士不稱行實胄子何嘗講習獨禮部每嵗擢甲乙之第謂𢎞奨擢不亦謬歟祗足長浮薄之風啓僥倖之門矣其國子博士等望加員數厚其禄秩選通儒碩生間居其職十道大郡量大學舘令博士出外兼領郡官召置生徒依乎故事保桑梓者鄉里舉焉在流寓者庠序推焉朝而行之夕見其利如此則青青不復興刺擾擾繇其歸本矣人倫之始王化之先不過是也李廙等議與至恊文多不載宰臣等奏以舉人舊業已成難於速改其今嵗舉人望且許應舊舉來嵗即依新格廣徳元年七月禮部侍郎楊綰上貢舉條目曰孝亷舉人請取精通一經每經問義二十條皆須旁通諸義深識㣲言試策三道每日問一道問古今理體取堪行用者經義及策全通為上第望付吏部便與官義通七策通二為中第與出身下第者罷之論語孝經聖人深㫖孟子儒門之逹者望兼習此三者為一經其試如上先取在家有孝義廉恥謙恭之行好學不倦精通經義并堪對策者縣令徴於鄉里送名於州刺史與曹官對試以其通者送省既是貢士刺史縣令不得以部人待之加其禮數隨朝集使以十月二十五日到省其鄉飲酒及至上都朝見并謁先師并依舊式又以冦難之故衣冠多去故鄉所居必聞才行斯在望許所在州縣且舉所諳知者秀才舉人准舊格惟試方畧策五條望令精通五經每經准孝廉例問義二十條對策五條每日試一道全通為上第送中書門下超與處分十條通七策通四為中第送吏部與官下者罷之又國子監舉人亦請每嵗本業博士推擇才行送名與祭酒依鄉貢例試通者送省舉人自縣至州皆不得輙自陳牒比來有到狀保辨停牒等請並停明法舉人望付刑部考試疏入帝問翰林學士或以進士明經行來頗久不可頓令改業遂勑與舊法兼行是月勅𢎞文崇文兩舘生皆以資廕補充所習經業務湏精熟楷書字體皆得正様通七者與出身不通者罷之二年五月罷嵗貢孝悌力田及童子科從禮部侍郎楊綰奏也綰以孝悌之行宜有實狀童子越衆不在常科同之嵗貢恐成僥倖之路永泰元年始置兩都貢舉禮部侍郎官號皆以知兩都為名每嵗兩地别放及第大厯三年四月復置童子科舉每嵗本貫申送禮部同明經考試取十嵗以下習一經兼論語孝經每卷誦文十科全通者與官通七以上者與出身仍每年冬本貫申送禮部同明經舉人例考試訖聞奏十年五月詔今年諸色舉人並赴上都集先是禮部侍郎賈至以時艱嵗歉舉人赴省者衆權奏兩都分理時禮部侍郎常衮以貢舉人合謁見異於選人並合上都集舉舊章也是後不置東都貢舉是月勑停童子科舉徳宗建中二年二月中書門下奏准制崇𤣥舘學生試日减策一道者其崇𤣥舘附學官見任者既同行事例合霑恩惟策一道不可更减大義兩條從之六月勅孝㢘科宜停二年十月中書舍人趙贊權知貢舉先時進士試詩賦各一篇時務策五道明經策三道贊奏以箴論表贊代詩賦仍各試䇿三道應口問大義明經人明經之目義以為先比來相承惟務習帖至於義理少有能通經術寖衰莫不繇此今若頓取大義恐全少其人欲且因循又無以勸學請約舉司舊例稍示考義之難承前問義不形文字落第之後喧競者多臣今請以所問録於紙上各令直書其義不假文言既與策有殊又事堪徴證慿此取舍庶歸至公如有義䇿全通者五經舉人請准廣徳元年七月勅超與處分明經請减兩選伏請每嵗甄奨不過數人庶使經術漸興人知教本勅㫖明經義䇿全通者令所司具名聞奏續商量處分餘依三年四月勅禮部應進士舉人等自今以後如有試官并不合選并諸色出身人有應舉者先於舉司陳状准例考試如才堪及第者送名中書門下重加考覈如實才堪即令所司進納告身注毁官申准例與及第至選日仍稍優與處分其正員官不在舉限貞元二年六月勅自今已後舉選人有能習開元禮者舉人同一經例選人不限選數許集但問大義一百條試策三道全通者超資與官義通七十條策通二道已上者放及第已下不在放限其有試官能通者亦依正員官例處分其明經舉人有能習律一部以代爾雅者如帖義俱通於本色減兩選令即日與官其明法舉人有能兼習一經小帖義通者依明經例處分五年四月制曰明經舉人所習爾雅多是草木鳥獸之名無益理道宜令習老子道徳經以代爾雅其進士同大經例帖六年九月勅本置兩舘學士皆選勲賢胄子盖欲令其講藝紹習家風固非開此倖門墮紊典教且令式之内具有條章考試之時理須精覈比聞此色倖冐頗深或假市門資或變易昭穆殊虧教化之本但長澆漓之風未補者務取闕員已補者自然登第用廕既已乖實試藝又皆假人誘進之方豈當如此自今已後所司宜據式文考試定其升黜如有假代並准法處分九年五月制曰王者設教勸學攸先生徒肄業執禮為本故孔子曰不學禮無以立又曰安上理人莫善於禮然則禮者盖務學之本立身之端居安之大猷致治之要道属詞比事而不裁之以禮則亂疏通知逺而不節之以禮則誣實百行之本源為五經之户牖雖聖人設教罔不會通而學者遵行宜有先後自頃有司定議計功記習不量教化淺深義理難易遂使修傳學者例從冬集習禮經者獨授散官敦本勸人頗乖指要始務𢎞奨以廣儒風自今已後明經習禮記及第者亦宜冬集如中經兼習周易若儀禮者量减一選應諸色人中習三禮者前資及出身人依科目例白身人依貢舉例每經問大義三十條試策三道仍主司於朝官學官中簡選精通經術三五人聞奏主司與同試問質定通否義策全通為上等轉加超奨大義每經通十五條已上策通兩道已上為次等依資與官如先是員外試官者聴依正員例其習開元禮人問大義一百條試策三道全通者為上等大義通八十條已上策兩道已上為次等餘一切並准習三禮例處分其諸舘學士願習三禮及開元禮者並聴仍永為常式十年中書侍郎平章事齊抗奏罷禮部别頭舉人故事禮部侍郎掌貢舉其親故即試于考功謂之别頭舉人抗奏罷之十二年三月國子司業裴肅奏爾雅為六經文字之楷模老子是聖人𤣥㣲之奥㫖請勒天下明經進士五經及明一經進士五經及諸科舉人依前習道徳經者宜准天寳元年勅處分應合習爾雅者竝准舊式初天寳元年尊崇道教以老子乃𤣥元皇帝㣲言奥㫖不可列為小經今有司以爾雅代老子至貞元五年四月宰臣又議云所習爾雅多是草木鳥獸之名無益理道又令舉人停爾雅改習道徳經至是又改焉十三年十二月顧少連為尚書左丞權知貢舉奏伏以取士之科以明經為首教人之本則義理為先至於帖書及以對策皆形文字并易考尋試義之時獨令口問對答之失覆視無慿黜退之中流議遂起伏請准建中二年十二月𠡠以所問録於紙上各令直書其義不假文言仍請依經疏對奏𠡠宜依十四年九月詔鄉貢武舉并應百隻箭及三十隻箭人等今年宜權停時諌議大夫田敦因蒙召對奏言兵部武舉等每年常數百千人持挾弓矢出入皇城間恐非所宜上聞而矍然故命停之其實武舉者每嵗不過十數人時議惡敦慣欲非短舊事奏議不實自是訖于貞元更不復置十六年十二月勅禮部别頭舉人宜委禮部考試不須置别頭十八年五月勅明經進士自今以後每年考試所收人明經不得過一百人進士不得過二十人如無其人不必要滿此數十九年六月勅禮部舉人自春以來久愆時雨念其旅食京邑資用屢空其禮部舉人今年宜權停憲宗元和二年十二月壬申禮部貢舉院奏五經舉人請罷試口義依前試墨義十條五經通五明經通六便放入第從之勅自今以後州府所送進士如迹渉疎狂兼虧禮教或曽為官司科罰或曽任州府小吏一事不合入清流者雖薄有詞藝并不得申送入如舉送以後事發長吏停見任及已停替者殿二年本試官及司功官并貶降三年五月兵部奏鄉貢武舉准貞元十四年九月詔宜權停今請准舊例却置從之七年十二月權知禮部侍郎韋貫之奏試明經請停墨義依舊格問口義從之十三年十月權知禮部侍郎庾承宣奏臣有親属應明經進士舉者請准舊例送考功試之先是貞元十六年髙郢掌貢請停考功别試識者是之至是始復穆宗長慶元年三月勅今年禮部侍郎錢徽下進士及第鄭朗等一十四人重試聞奏四月制曰國家設文學之科本求實才茍容僥倖則異至公訪聞近日浮薄之徒扇為朋黨謂之闗節干擾主司每嵗策名無不先定永言敗俗深用興懷鄭朗等昨令重試意在精覈藝能不於異書之中固求深僻題目貴令所試成就以觀學藝淺深孤竹管是祭天之樂出於周禮正經閲其呈試之文都似不知本事詞律鄙淺蕪累至多亦令宣示錢徽庶其深自懐愧誠宜盡棄以警將來但以四海無虞人心方泰用引寧僣式示殊恩特掩爾瑕庶明予志孔溫業趙存約竇狥直所試粗通與及第盧公亮等十人並落下錢徽從别勅處分自今以後禮部舉人宜准開元二十五年勅及第訖所試雜文并策送中書門下詳覆二年二月諫議大夫殷侑奏謹案春秋二百四十二年行事王道之正人倫之紀備矣故先師仲尼稱志在春秋歴代立學莫不崇尚其教伏以左傳卷軸文字比禮記多較一倍公羊榖梁比尚書周易多較五倍是以國朝舊制明經若大經中經能習一傳即放冬集然明經為學者猶十不一二今明經一例冬集人之常情趨少就易三傳無復學者伏恐周公之㣲㫖仲尼之新意史官之舊章將墜於地伏請置三傳科以勸學者左傳問大義五十條公羊榖梁各問大義三十條策三道義通七以上策通二以上與及第其白身應者請同五經例處分其先有出身及前資官應者請准學䆒一經例别處分又奏歴代史書皆記當時善惡繫以褒貶垂裕勸戒其司馬遷史記班固范曄兩漢書㫖義詳明懲惡勸善亞於六經堪為代教伏惟國朝故事國子學有文史直者𢎞文舘𢎞文生並試以史記兩漢書三國志又有一史科近日已來史學都廢至於有身處班列朝廷舊章昧而莫知者况乎前代之載焉能知之伏請量前件史科每史問大義一百條策三道義通七策通二以上為及第能通一史者白身請同五經三傳例處分其有出身及前資官應者請同學究一經别處分其有出身及前資官稍優與處分其三史皆通者請録奏聞特加奨擢仍請班下兩都國子監任生徒習請勅㫖宜依仍付所司三年禮部侍郎王起掌貢舉先是貢舉偎濫勢門子弟交相酬酢寒門俊造十棄六七及元稹李紳在翰林深怒其事故有覆試之科及起考貢士奏曰伏以禮部放榜已是成名中書重覆尚未及第若重覆之中萬不一定則放榜之後逺近誤傳其於事理實為非便請今年進士堪及第者本司考試訖其詩賦先送中書門下詳覆候勅却下本司然後准例大字放榜從之冊府元龜卷六百四十
