  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_066-1a}
body:
  text: 册府元龜卷六十六宋王欽若等撰帝王部發號令第五後唐明宗長興元年二月赦書應諸色私債納利已經一倍者只許徴本本外欠數並放納利已經兩倍者本利並放四月前邢州節度使李從温未得替朝見帝謂安重誨曰從温不待交替何得先来甚虧事體今後可指揮諸道更有除移湏替人到交割公事了即得離任五月勅㫖自今後凡有除移准宣詔追抽外其餘湏候替人到彼㸃檢交割軍州公事了日即可發離本處不得輒離州府仍令逐道觀察使散下管内諸州准此指揮六月辛亥勅宜令諸道應有防禦團練刺史行軍司馬節度副使等或月限將滿或遇闕員湏俟朝廷除授不得更奏薦七月勅㫖今年二月二十一日郊天赦書節文朝臣及藩鎮郡守亡父母祖父母及父母在并妻室未霑恩命並與追封贈及叙封者今赦書頒下已及半年所行追贈叙封所司尚未奏覆深慮留滯各速指揮朝臣限兩月内齊具録奏外處與限一年仍並據品秩准格列指揮朝臣不得踰越二年正月詔曰要道纔行則千岐共貫宏綱一舉則萬目皆張前王之法制罔殊百代之科條悉在無煩改作各有定規守度程者心逸日休率胷臆者心勞日拙天垂萬象星辰之分野靡差地載羣倫嶽瀆之方隅不易儻各司其局則皆盡其心其律令格式六典凡闗庶政互有區分乆不舉行遂至隳紊宜准舊制令百司各於其間録出本局公事巨細一一抄寫不得漏落纎毫集成卷軸兼粉壁書在公㕔若未有廨署者其文書委官司主掌仍毎有新授官到令自寫録一本披尋或因顧問之時應對湏知次第無容曠闕毎在執行使庶寮則守法奉公宰臣則提綱振領必當彛倫攸叙所謂至道不繁何必期年然後報政宜令御史臺徧加告諭催促限兩月内抄録及粉壁書寫湏畢其間或有未可便行曽釐革事件委逐司旋申中書門下當更㕘酌奏覆施行五月勅國頼賢良雖務捜揚之道官繇請託實開僥倖之門盖任不當材則民將受弊稍乖掄擇大紊紀綱近聞百執事等或親居内職或貴列廷臣或因宣逹君恩或因勾當公事經繇列鎮干擾諸侯指射職員安排親昵或潛申意㫖或顯發書題苟狥私情罔循公道争能峻阻湏至强行遂使受命者負勢以臨人得替者銜寃而去職既虧慎舉漸益躁求務要肅清當行釐革自今已後應内外臣寮不計在朝出使並不得輙發書題及行所屬於諸處亂安排人宜令三司兼諸道節度防禦團練刺史等或更有人不畏新勅猶躡舊踪者并仰宻具姓名聞奏發薦人貶所在官求薦人配流邉逺州縣常知所在如逐處長吏自狥人情顯違勅命只仰被替本人詣闕上訴勘問不虛長吏罰兩月俸罰薦人比前條更加一等被替人不准是何職掌却令依舊勾當仍從再勾當後三年内除别顯有罪名外不得妄有替移其餘長興二年五月一日已前所犯不在上訴之限兼勅到後但是州府並于管驛處粉壁具録勅命曉示毎令脩䕶永使聞知况國家懸爵待人惟賢是舉稍聞俊乂必令奬昇其有端士正人雄文大學言可以經綸王道行可以規矩人倫者但當顯陳表章明具論薦名如得正工不棄財所務絶彼倖人豈可滯諸賢者是月鴻臚卿柳膺將齋郎文書兩件賣與同姓人柳居則其婢母論訴伏罪大理寺斷罪當大辟縁遇恩赦合與减死奪見任官員罰銅終身不齒勅㫖訪聞諸色官員之中多有此色之事湏行釐革以塞弊源應諸色常調選人如有此色文書便湏焚毁如是元補正身曽受中興已来官誥便許以近受文書叙理及諸色䕃補子孫如無虛假不論庶嫡並宜叙録如實無子孫别立人繼嗣已出補身得者只許續䕃一人凡闗資䕃皆繫恩榮將革弊訛湏行憲法自本朝喪亂多士因循貪冒者叙補無常彰敗者未聞嚴斷遂成隳紊莫識規程且一人身名具三代名諱𫝊于同姓利以私財上則欺罔人君下則貨鬻先祖行之不已罪莫大焉柳膺顯致訟論合當誅殛偶逢恩勅特减死刑尚念承此弊来年深同此罪者頗衆特矜已往各許自新别設嚴條免令後犯今日已前並依前項條理其不合叙使文書仍限一百日焚毁湏絶如此後更敢公然將合焚毁文書㕘選求事有人紏告及所司㸃勘彰露所犯之人𫝊者受者並當極法其告事人如有官序别與超擢任使如是百姓與免户下差徭兼自此應合得資䕃出身人並湏依格令及天成三年十一月二十日禮部起進條件施行如敢故違本司官員并本行人吏别加嚴斷不許去任離司罪無寛恕事從發覺理任澄清不惟正邦國典刑抑亦保縉紳家法有犯無赦斷在的行六月勅諸道州府推斷刑獄或慮有司因循仍以赦令前事輙有申理紊亂刑罰宜令盡舉中興以来所降赦書徳音釐革恩勅曉示王者應天順人發號施令布絲綸於逺邇示恩信於華夷儻隐而不行則主者有罪湏重提舉無致因循宜令御史臺兼三京及諸道州府應受詞狀及推勘詳斷之所湏具此令文牓壁各令詳審無致踰違如或公然以赦書徳音及恩勅前事輙敢受而為理者應狀案經過之處并當勘責以故違勅命律格科罪兼自此後凡有詳斷刑獄並湏依坐律令格式條件及新勅釐革次第施行又勅無厭之求既虧亷耻不義而富終取悔尤應諸道係省店宅莊園或抵犯刑章納来家業或主持敗闕收致抵當姓名纔係簿書諸利未經收管諸色人等不度勲庸髙下不量事分淺深相尚貪饕競謀請射惟利是視以得為期諸色人朝廷稍立㣲功必加懋賞大都大邑尚以委人廢宅荒田豈留潤國自可特恩頒賜奚容越分希求遂使畏懼者但處棲遅僭踰者更滋積聚失懲惡勸善之道啟幸災樂禍之門頗汚風教湏行止絶七月前安州應城縣主簿王鼎前随州唐縣主簿陳廷毓同獻時務七件勅㫖投匭上章條流不阻合表進䇿理例無聞而况七件之中有長有短兩人之内孰否孰臧方當選以公才未可混其言路王鼎陳廷毓宜各試以䇿問兩道定其優劣兼自此應諸色人進策毎五道别試䇿問兩道十道已下試三道十道已上約此指揮比校元進䇿條詞理可否當與等第處分仍令匭院分明牓示此後止絶不得有同表進䇿所貴人知區别事無汎行庶堅激勸之誠免誤擬倫之道八月前攝普州洪洞縣令胡廷暐獻時務糴糶斛斗買賣絲綿請因舊様斗秤勅㫖官中比設量度民間合務均平苟縱欺謾誠為蠧弊宜令三司及諸道州府常如約勒如違犯量事科刑九月昭義縣主簿張廷詡上言應諸道州縣之内有在仕居閒衣冠不得與編民一例差遣及有假稱攝試抗禮公㕔請賜條理勅㫖凡曰士流州縣盡應饒假詐稱門族長吏豈肯延容應是户人皆編部籍如或為其家富邀坐公㕔顯從賔主之儀頗辱朝廷之任所在必無此事其中或有如斯湏重衣冠以敦風俗州縣官或與富百姓同坐交通者随處紏察使知事若不虛當行嚴斷其妄稱士族者亦議科罪三年正月前攝臨沂縣令孟師敏獻時務切見齊州村店要津皆有闌頭乞賜止絶勅㫖比置闗防津舖為要禁察奸兇如或縱捨賊徒透漏商稅既虧職分難逭刑章若敢阻滯行人僥求潤巳但有發覺並以枉法贓論宜令諸道常切指揮無使違犯乙巳左右金吾街門使奏狀見法人多于清化坊南禁街内請移於歸義坊南河灘新市從之四月河南府奏據陸渾縣令陳巖狀申縣邑荒凉欲脩葺今有客户各欲盖造屋宇有礙同光二年條格乞准近勅屬縣亦許客户於坊市脩營屋宇所期完葺勅㫖凡興舍宇務廣人煙既聞完葺之期式叶綏安之道况京城之内已有條流縣邑之中可援事例應諸縣有臨街店舍田地宜准勅許人收買依限脩盖其佐官宅基舊屬縣廨宇并寺院伽藍地如人户已盖造屋舍居止不在起移之限便任永逺為主如更别占據空地作園圃及種蒔苗稼仍仰縣司與寺家决定辦得脩盖即許識認交割限兩月内了絶其地畆租税随地供輸如未辦脩營不得妄陳識認愍帝以長興五年正月即位詔闗西鎮城禁回鶻帶挾私人往来所在檢校非正數即時勒留末帝初為潞王舉兵向闕次陜州下令曰余叨居冢嫡謬列盤維成家於十死九生立國於千征萬戰事父母敦于至孝為臣子敢於盡忠將相期夾輔之勲以廣文明之祚一昨先皇晏駕嗣聖承祧敢不遵周召以勤王相成康而在位社稷既然有奉人民於是知歸但固宗祊敢論季孟豈意梓宫在阼靈駕未歸而朱𢎞昭馮贇等妄興猜忌之心驟起窺圖之計喪紀在近除書遽行津涯莫知廹促尤甚况又不宣麻制便降使臣立遣離藩俾其懼禍霆電之速軍民可知是以聊葺城池以緩碪機十鎮驅貔貅而遽至六師擁組練以齊来當此阽危如何旅拒不謂天道鑒其非罪人情愍以無辜憚以攻城自来束手數鎮慿陵之帥立自滅亡九重侍衞之師翻為心腹以至抱義者感泣懐憤者咄嗟凡百有知皆悲無罪今則軍戎大集園寢將成羣帥獻忠迫令赴闕載念遺弓在近仙駕將歸既息憂惶又盈哀慘今則湏將禁旅入赴山陵面朝太后太妃自訴為臣為子今月二十七日已次陜州其在京文武兩班内諸司使務除朱𢎞昭馮贇家族伏法外凡百士庶並無憂疑况禁令嚴明軍都整肅必無暴犯克保平寜苟渝此言何以行令清泰元年七月丙午詔曰長興二年閏五月勅律令格式六典凡闗庶政盡有區分久不舉明遂致隳紊宜令京百司各於其間録出本司事裁成卷軸或粉壁寫在廨署本司官常宜省覽以備顧問自勅下至今累年如聞諸司或以無廨宇處並未書寫施行宜令御史臺差兩廵使分廵百司局以聞如因事未辦處與限五日湏抄録依元勅指揮其諸道州縣亦有六典内合行公事條件抄録粉壁官吏長宜觀省其律令格式事繁昨以撮成四卷州縣差人抄録以備撿尋今後宜令御史臺毎至正初具録前後勅文告示諸司及諸州府永為常式十月甲午詔曰官吏通衢陳訴比来時亦有之若抱屈難伸或有理未雪固難抗節湏至望塵至於方潔之人猶以為耻近則無知之軰遽相倣例䆮以成風頻至於列肆長街遮䦨宰臣陳訴及其處理多礙格式或勅命已行確祈追改亦于赦條之外妄有披論不惟紊亂于綱紀抑亦有同於輕侮此後州縣官或有所陳并於中書門下據事理陳訴如實有屈塞登時即與勘窮如是僭越虧公付銓量與殿選如不闗銓量陳訴者即下法司推詰所兾羣官奉法免令進取以嘵訛萬國来王復覩朝廷之整肅十一月壬子侍御馬軍都指揮使安從進奏䕶聖軍使王彦塘先西南面行營所至州府乞索錢物恃酒訛言抵忤本指揮使趙廷昭詰之伏罪已斬于本軍門詔曰夫命將所以行兵聚兵所以遏亂必在上下有理進退無違入則畏法以謹身出則圖功而效命畏法必無罪戾圖功則有寵恩以此言之不可不慎王彦塘方期任使輙敢恃憑既都將以上言在軍法而難恕况屬環衞并在藩方上至偏裨下及行伍皆是久經訓練備曉條章官爵甚髙衣糧極厚必能共思整戢自務保全是宜特舉規程徧加曉諭責令遵守務肅轅營今後在京及諸道馬歩將士上至都尉下及長行並湏各據職資共存禮體逓相鈐轄遵禀指揮如紊亂條章下不從上指使前却使酒訛言其長行犯者委本都副兵馬使已下節級科罰其副兵馬使節級犯者委本都頭科罰其都頭犯者若無事不出時録罪申奏若出軍指使之時便委随處統將科罰其或所犯人自負罪愆不伏首領刑責便即奏聞如指揮使都頭已下但務顔情藏庇兇軰自招負累必不恕容頒下内外諸軍知悉三年中書門下言自今年三月後諸州奏軍事判官九人行之礙新詳定勅文慮在外未知詔軍事判官宜令本州刺史自選擇奏舉初且除本職未得與官或與刺史連任相随顯有勞能許本州刺史以聞量事奬賞仍不許横有奏薦其三月後九人俱與施行晉髙祖天福元年即位赦制曰易俗移風宜遵善敎尊本敬始自有常規應明宗朝所行勅命法制仰所在遵行不得改易二年二月勅古之用兵必先立法等第既分於將領髙卑自有于規繩或聞近年多踰此制至於行間士卒罔遵都内指揮既侮國章且乖師律適當開創要整紀綱宜示條流免干法制應在京及諸道馬歩諸軍將領節級長行等今後仰並依階級次第凡事制禦區分如是長行或有違犯即副將便可據罪處理如是副將十將違犯即便勒本指揮使據罪科處指揮使違犯不出軍時即委都指揮使具録事繇騰奏當行勘斷如是行營在外即便委行營統領依軍法施行其餘諸道軍都見在本處者或有違犯便委本處節級防禦團練使刺史據罪科處事要整齊法宜遵守分明告諭咸使聞知又勅州縣之官俾其戢理錢榖之職委以秉持湏選亷勤豈容薦託一時苟從於私狥久逺必紊於公方頃在唐朝曽有勅命貴杜僥倖之漸明懸誡約之條時異理同再宜申舉自今後中外臣寮或因差使出入並不得薦囑人于藩鎮希求事任如有犯者並准唐朝長興二年勅條處分仍付所司四月甲午勅鹽鐵度支户部應監臨主持場院倉庫官吏等制置場務總𣙜課程將期共濟於軍流免使偏竭於民力向者所差官吏鮮有専勤省思録任之時盡言氷蘗及郡府主持之後例縱輕肥莫濟公家但營私室所以處處多聞其逋欠年年空係其徴催固執遷延坐期蠲放毎惟此軰並合嚴誅又以開創之初含𢎞是切既往者已闗恩制今後者别立嚴規或躡前非必難輕恕豈是願行峻法欲致豐財盖帑藏猶虛師徒甚衆俟期充濟難縱隐欺宜懸畫一之文兼舉必行之令十月辛巳禁諸道不得擅造器甲十一月禁黎陽至楊劉岸渡人以魏博未下故也四年五月甲寅勅訪聞朝臣於外州侯伯求其表狀奏薦交親朕以應天順人開基創業大化方流於區宇至公必絶於嘵訛私謁不容朝經具舉更兹告諭止在依行今後文武庶官不可更行薦託如有狀書便宜宻具進呈觀察使散下諸州亦准此處分五年正月詔曰朕自御萬方于今五稔毎推誠而待物貴捨巳以從人乃有不體朕懐柔恣行兇慝顯干紀律湏舉憲章福州王昶恃彼偏方亂其彛典於使臣而倨傲向朝闕以邀求深虧臣子之儀固掇神祗之怒尚全大體特示寛恩所有貢輸悉令廽復舞羽而聿思修徳轉規而猶兾省諐而王建立三上奏章楊光逺繼陳表疏朝行之内邦計之司同有敷敭謂非允當且王昶以無用之物取利中華萌不軌之心僭稱大號盗乗輿之式度竊冠冕之威儀眩誘良家招收竒貨此而可恕孰不能容或貢讜言請從籍録鄭元弼等相次上狀不願廽歸亦可憫傷各令存䘏其福州貢物私商宜准律處分六年二月辛卯天下郡縣不得以天和節禁屠宰滯刑獄戊申詔曰臣子之心務申勤敬國家之體自有規繩凡侯伯之来朝或君臣之相見豈煩貢奉方啟宴筵事既非宜理當改制臣下置宴今後宜停七年四月戊寅勅曰時屬炎蒸路當衝要使命之往来甚衆州府之迎送頗多既有煩勞所宜軫惻自鄴都至㐮州㳂路州府除専到使臣依尋常迎送外其餘經過并不在迎送去年六月已曽有勅至是以頓兵㐮州使臣旁午思其勞擾再申明焉少帝開運二年正月太常少卿陶榖奏臣任監察御史日留臺西京竊見臺司詳斷者至於夫婦之間小小争訟動引支證淹滯積時及坊市死亡喪葬又湏臺司判狀奴婢病亡又湏檢驗人吏貪狡因此邀求動經旬時不遂埋瘞是臣目擊嘗嫉弊訛者勅㫖淹延刑獄實啟倖門稽滯瘞埋尤傷和氣追呼既廣勞擾斯煩檢驗取裁停駐為弊宜令凡有禁繫不得分外追人百姓死亡亦仰及時葬送既無重擾式叶化風仍付所司三年六月乙丑勅諸道不許横薦官寮爰自近年頗踰舊制起今後諸道藩鎮防禦團練刺史如本處幕席中有闕准元勅合奏薦當與除授不得横薦前資賔從州縣官及諸色職員希於在朝及外官安排不得有違周太祖初即位制曰帝王之道徳化為先崇飾虛名朕所不取苟致治之未洽雖多瑞以奚為今後諸道所有祥瑞不得輙有奏獻廣順元年正月丁卯制曰設官分職具列司存離局侵權誠為紊擾今後諸司公事並湏各歸局分不得越次施行朝廷之務顯有舊章職官具存安可廢墜如聞目前諸司事多有壅滯今後並可疾速舉行丙戌河東劉崇憯號太祖遣供奉官張令權齎勅書曉諭晉絳慈隰諸州軍民曰朕早事劉氏共立漢朝當髙祖寢疾既危朕與楊州史𢎞肇於御牀之前同受顧託嗣君既立叛亂繼興朕討平河中克寜闗内敢言勞苦貴保宗祧自鎮鄴都復當戎寄忘食廢寢夜思晝行固䕶邉疆訓齊師旅憂時憂國盡節盡忠不期羣小連謀蔽惑㓜主忽於内殿併害大臣朕方在外藩亦遭䜛搆宻降宣命潛遣行誅諸將知此無辜乞除君側之惡遂與將士同赴闕廷兇豎計窮迫害㓜主朕遂奏太后請立劉贇比候到京方議册立便值河北告急契丹内侵遂領大軍徑赴救援自澶州起程北去輜重相次先行旗隊纔移軍情忽變喊聲動地事勢莫知攅集戈矛請朕為主逃脱無地扶擁入京内外臣僚藩岳侯伯表章繼至推戴益堅勉副羣情尋豋大位炤臨之内罔不傾心不謂北京留守劉崇顯有包藏輙萌僭竊散飛文字誑惑人民騷動一方酷虐萬姓差㸃丁壯率掠貨財殺戮無辜誅剥難狀况劉崇自居藩鎮唯務貪求刻削軍都増添稅賦千里之内民不聊生今則又作猖狂更加暴虐謂人情可以詐取謂天命可以僭求顛越如斯不亡何待朕方輯寜區宇拯救黔黎見舉大軍往平㣲孽爰念河東管界皆是朕之生靈被此兇殘深懐軫惻即候收復城壘當議減放稅租内外軍民並與洗滌更在沿邉藩鎮明宣朕懐接界户人勿令侵擾其邉界城池已令脩戢要辯奸細切湏隄防安撫生民以副朕意是月徐州王彦超言殿直王殷押送到賞給衣服銀帶臣又于宋州取到賞給錢帛收管又奉宣取宿州散從官二百并于宿州單州各差夫二千以備攻城指使是日降勅宣諭徐宿二州官吏百姓曰朕猥以寡薄肇創基圖思康濟于兆民推恩信于天下庶㡬致理漸至平寜楊温等比事藩維止為小校妄生猜懼輙閉城門朕亦累賜勅書開懐示信諭以安危之道俾全忠孝之名亦繼有文字進呈止望朝廷恕捨朕念端倪未審之際事勢使然彼既無心豈忍加罪是以授之郡牧許以自新而不體優恩尚敢拒命執迷罔悟但作遷延今已差兵士往彼攻取期於旦夕必易盪平汝等皆居封境之中各懐仁義之節况屬陽和之候方當農養之時暫駐兵甲固無騷擾宜思齊力安家二月癸巳賜王彦超詔曰昨以鞏廷美楊温等妄抱憂疑輙敢違拒累令招諭未體誠懐湏至加兵以安民衆切慮破城之後玉石難分卿可告諭諸軍勿令殺人放火但誅惡黨宜捨脅從眷惟許國之心當體好生之意三月丙子勅㳂淮州鎮朝廷比與淮南素非仇怨互分疆土各有人民商旅往来比無阻滯兵師屯戍自守闗防其自近朝稍聞多事煙塵時動生聚無聊爰當開創之初毎求安静之道㳂淮千里所宜禁暴戢兵比屋小民漸兾息肩樂土庶期嵗月馴致和平凡我疆場之臣當體宵旰之念應㳂淮州縣軍鎮今後自守疆土鈐轄兵士鄉軍不得縱一人一騎擅入淮南地分稍或違令不宜輕恕商旅行李經過輙不得妄致邀難如聞滯留必行勘罪更仰指揮㳂邉廵檢止絶賊盗務在道途清肅人户謐寜詔到速散行管界凡津要口鋪可丁寜曉告二年七月戊辰詔河東接界㳂山諸州闗塞山路止絶向北商賈往来九月勅北面㳂邉州府鎮戍兵自守疆場不得入幽瀛界俘掠十月戊子詔諸州府曉諭軍民不得屠牛驢及賣生口辛亥勅致理安邦必先刑政分争辨訟各有職司内則臺省官僚外則州縣曹局共承寄任同體憂勤苟衆務之有條則蒸民之無怨比来百姓訴訟不得越次訴論近日繼有便詣朝廷不經州縣宜再止絶免致踰違今後百姓凡有訴論及言灾瀰先訴於縣縣如不治即訴于州州治不平訴於觀察使或斷遣不當即可詣臺省如或越次訴論所司不得承接如有抵犯准律科懲其訴事文狀或自手寫或是僱人並于狀後書其姓名并住止處所如無人寫狀許過白紙事條並湏為已如或容訴是挾阿私鞫得其情必議嚴斷若所經處所斷遣不平致詣朝廷長史推司當行謫罰三年正月宣河北諸州凡有急切公事即入馬逓奏報四年延州向訓言請禁止州界民賣軍裝兵器於蕃部從之是月隴州防禦使石公覇上言元管三縣五鎮自秦州阻隔廢定戎新闗兩鎮唯汧源皆稱直屬本府及官吏批書歴子考較課最賊盗寇攘户民减損又責州司職分何以撿校昨汧陽令李玉上府主簿林蕚下鄉州司不曽指揮本縣亦無申報毎有提舉皆稱本府追呼無以指縱何能致理其間户口多有逃亡預虞大比之時恐速小臣之罪伏覩近勅凡有訴訟尚委逐處區分不得驀越豈可本屬縣鎮毎事直詣鳯翔望降新規以滌舊弊勅鳯翔屬郡宜令依諸道體例指揮今後凡諸縣公事徴科訴訟並委逐州官員區分於事或有疑悮湏禀使府者則縣申州州申使府不得驀越其李玉林蕚専擅上府下鄉本州勘罪奏聞六月詔諸州府㳂路縣鎮使臣經過不得差借逓驢八月詔㳂淮諸州㸃撿淮南人糶過糧食如是以騾驢為䭾及人負荷放過只不得以舟車輦運過淮先是淮南大旱井泉涸竭塘堰中生草淮淺可渉又聞昇州火灾石偶人言于淮上其主惡之命擊落其首淮南民渡淮而北者相繼濠濤受以兵止之民與兵闘淮人隂糴我粟以為儲蓄初太祖愍之曰彼我民一也繇是諸軍郡許淮南人糴易至是聞呉人收糴入官以備軍食故有是詔九月辛卯詔曰西道軍鎮藩部經過不得與之市買鞍馬器仗十月勅御史臺勘成除官不謝不赴任人孟翰裴韶賈蟾程範崔中庸五人放罪勒赴任龎延祚李玫准元勅殿選起今後更有受官不謝宜令門下省御史臺嚴切檢舉追勘聞奏授官後違程不赴任准元勅殿選如選未滿使使来乞官者除本選外别行殿黜十一月勅近降命京兆鳯翔同華邠延涇鄜耀等州管内縣鎮各守職分州縣徴税賦治婚田詞訟廵鎮賊盗追捕非不丁寜宜令三司使依前勅更嚴切指揮各守職分不得侵越諸州各行訖聞奏世宗顯徳元年三月勅化理之本孝弟為先苟或虧違實亂名敎則有士庶之内兇卒之徒不順于父兄不恭于尊長狂悖難狀訓誨莫從親族容隐而不言里巷畏避而不告傷化敗俗莫甚於兹今後或有不仁義之人違戾尊長諠避毁辱及父母在異財别居略不共待如此之軰不計官軍人百姓之家宜令御史臺及本軍大使所在州縣廂界彈察如或容縱不切檢舉罪有所歸十月戊辰帝謂侍臣曰諸道頻報賊徒結集傷刼人户雖加捜捕未能遏絶累朝已来分遣使臣廵檢致藩侯郡守不戮力于擒捉即宜抽廽使臣専委藩郡屏逐務令封部清肅四年二月癸亥禁内外職官薦遊客于縣鎮干求財帛者五年五月辛巳朔帝御崇元殿禮畢内降徳音曰疆場未寜旗皷下出師之命氛霾既静雲雷覃及物之恩四維張而載戢五兵武功成而必修文徳朕戎衣再御三載親征令行而霆霹争雄陣起而龍蛇合勢盖舟車之所及諒聲敎以咸臻敢言凉徳之懐柔實頼忠臣之宣力積水激朝宗之浪事等疏川客星廻拱極之光瑞増懸象今則斗柄建午火正司南順𤣥穹長養之心伸有國亭毒之令睠彼戎士咸遵武經或從我征行久服勤于甲胄或守兹城邑能安定於封圻宜舉彛章首膺懋賞應侍衞殿前及諸道馬歩軍將士等各賜等第優給餘從宣命處分疾風勁草既驗忠誠臨難捐軀所宜旌異應淮南行營將士殁于王事者各與贈官逐人若有親嫡子孫並與叙録内有傷中殘廢不任征行者等第各給救接錢帛排難疆場馬革無慙於壯志遺骸暴露牛岡有軫于深仁載尋掩骼之文俾釋窮泉之恨凡經戰陣處應有暴露骨骸仰逐處州縣收拾埋瘞淮南界内逐處墳墓有曽遭發掘處委逐處州縣差人掩閉用兵之際力役是供當矜貸之在展諒優給之宜被自去年十月後来㳂淮人户曽充夫役内有遭傷殺不回者本家各給絹三疋仍放免本户下三年諸雜差役江南疲俗克復方新特示蠲除俾令存濟揚秦通滁和濠泗楚光夀舒盧蘄黄州連水漢陽汶川等縣自去年終已前所欠秋夏殘稅及諸色徴科配歛博徴物色等並與除放自東南用兵首尾三載㳂淮州郡應奉軍期飛輓頻仍力役勞併念其艱苦深軫所懐其徐宿宋亳陳潁許蔡等州人户所欠去年秋夏稅並與除放於戲江表来賔顧車書之已混寰中未乂資將相之同心所宜共率憲章動遵王度咨爾三事逹于庶官當整嘉謀弼予不逮册府元龜卷六十六
