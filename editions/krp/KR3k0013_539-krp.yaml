body:
  text: 冊府元龜卷五百三十九宋王欽若等撰諌諍部直諫第六魏董尋為司徒軍議掾景初元年明帝於芳林園大起土山植竹樹尋上書諌曰臣聞古之直士盡言於國不避死亡故周昌比髙祖於桀紂劉輔譬趙后於人婢天生忠直雖白刃沸湯往而不顧者誠為時主愛惜天下也建安以来野戰死亡或門殫戸盡雖有存者遺孤老弱若今宫室狭小當廣大之猶宜随時不妨農務况乃作無益之物黄龍鳯凰九龍承露盤土山淵池此皆聖眀之所不興也其功參倍於殿舎三公九卿侍中尚書天下至徳皆知非道而不敢言者以殿下春秋方剛心畏雷霆今陛下既尊羣臣顯以冠冕被以文繡載以華輿所以異於小人而使穿方舉土面目垢黒沾體塗足衣冠了鳥毁國之光以崇無益甚無謂也孔子曰君使臣以禮臣事君以忠無忠無禮國何以立故有君不君臣不臣父不父子不子上下不通心懷欝結使陰陽不和災害屢降兇惡之徒因間而起誰當為陛下盡言是者乎又誰當千萬乗以死為戯乎臣今言出必死而臣自比九牛之一毛生既無益死亦何損秉筆流涕心為世辭臣有八子臣死之後累陛下矣将奏沐浴既通帝曰董尋不畏死耶主者奏収尋有詔勿問眀帝取農民以理宫室典農毌丘儉上䟽曰臣愚以為天下所急除者二賊所急務者衣食誠使二賊不滅士民飢凍雖崇羙宫室猶無益也張茂為太子舎人青龍中大理雒陽宫納士民妻女茂以吳蜀數動諸出征而帝盛興宮室留意於玩好賜與無度帑藏空竭又録奪士女前已嫁為吏民妻者還以配士既聽以生口自贖簡選其姿首者内之掖庭乃上書諫曰臣伏見詔書諸士女嫁非士者一切録以配戰士斯誠權時之宜然非大化之善者也臣請議之陛下天之子也百姓吏民亦陛下之子也禮賜君子小人不同所以殊貴賤也吏屬君子士為小人今奪彼以與此亦無以異於奪兄之妻妻弟也於父母之恩偏矣又詔書聽得以生口年紀顔色與妻相當者自代故富者則傾家盡産貧者則假貸貫貲買生口以贖其妻縣官以配士得婦者未有歡心而失妻者必有憂色或窮或愁皆不得志夫君有天下而不得萬姓之歡心者尠不危殆且軍師在外數千萬人一日之費非徒千金舉天下之賦以奉此役猶将不給况復有宫庭非貟無録之女椒房母后之家賞賜横興内外交引其費半軍昔漢武帝好神仙信方士掘地為海聚土為山頼是時天下為一莫敢與争者爾自衰亂以来四五十載馬不捨鞍士不釋甲每一交戰血流丹野創痍號痛之聲于今未已彊冦在疆圖危魏室陛下不兢兢業業念崇節約思所以安天下者而乃夸靡是務中尚方純作玩弄之物炫燿後園建承露之盤斯誠快耳目之觀然亦足以騁㓂讐之心矣惜乎舎堯舜之節儉而為漢武之侈事臣竊惟陛下不取也願陛下沛然下詔萬幾之事無益而有損者悉除去之以所除無益之費厚賜将士父母妻子之飢寒者問民所疾而除其所惡實倉廪繕甲兵恪恭以臨天下如是吳賊面縛蜀虜輿櫬不待誅而自伏太平之路可計日而待也陛下可無勞神思於海表軍師髙枕戰士備員今羣公皆結舌而臣所以不敢不獻瞽言者臣昔上要言散騎奏臣書以聴諫篇為善詔曰是也擢臣為太子舎人且臣為書譏為人臣不能諫諍今有可諫之事而臣不諫此為作書虚妄而不能言也臣年五十常恐至死無以報國是以投軀没命冒昧以聞惟陛下裁察書通上顧左右曰張茂恃鄉里故也以事付散騎而已髙堂隆為散騎常侍青龍中大治殿舎西取長安大鐘隆上䟽曰昔周景王不儀刑文武之眀徳忽公旦之聖制既鑄大錢又作大鐘單穆公諫而弗聽伶州鳩對而弗從遂迷不反周徳以衰良史記焉以為永鑒然今之小人好說秦漢之奢靡以盪聖心求取亡國不度之器勞役費損以傷徳政非所以興禮樂之和保神眀之休也是日帝幸上方隆與卞蘭從帝以隆表授蘭使難隆曰興衰在政樂何為也化之不眀豈鐘之罪隆曰夫禮樂者為治之大本也故簫韶九成鳳凰来儀雷鼔六變天神以降政是以平刑是以措和之至也新聲發響商辛以没大鐘既鑄周景以斃存亡之機常繇斯作安在廢興之不階也君舉必書古之道也作而不法何以示後聖王樂聞其闕故有箴規之道忠臣願竭其節故有匪躬之義也帝稱善遷侍中猶領太史令有星孛于大辰隆上疏曰凡帝王徙都立邑必先定天地社稷之位敬恭以奉之將營宫室則宗廟為先廐庫為次居室為後今圜丘方澤南北郊眀堂社稷神位未定宗廟之制又未如禮而崇飾宫室士民失業外人咸云宫人之用興戎軍國之費所盡畧齊民不堪命皆有怨怨書曰天聰明自我民聰眀天明畏自我民眀威輿人作頌則嚮以五福民怒吁嗟則威以六極言天之賞罰隨民言順民心也是以臨政務在安民為先然後稽古之化格于上下自古及今未嘗不然也夫采椽卑宫唐虞大禹之所以垂皇風也玉臺瓊室夏癸商辛之所以犯昊天也今之宫室實違禮度乃更建立九龍華餙過前天彗章灼始起於房心犯帝座而干紫微此乃皇天子愛陛下是以發教戒之象始卒皆於尊位殷勤鄭重欲必覺陛下斯乃慈父懇切之訓宜崇孝子祗從之禮以率先天下以昭示後昆不宜有忽以重天怒景初中愈增崇宫殿雕餙觀閣鑿太行之石英采榖城之文石起景陽山於芳林之園建昭陽殿於太極之北鑄作黄龍鳳凰竒偉之獸飾金墉凌雲臺凌霄闕百役繁興作者萬數公卿以下至學士莫不展力帝乃躬自掘土以率之而遼東不朝悼皇后山陵天作淫雨冀州水出漂没民物隆上疏諫曰盖天地之大徳曰生聖人之大寳曰位何以守位曰仁何以聚人曰財然則士民者乃國家之鎮也榖帛乃士民之命也榖帛非造化不育非人力不成是以帝畊以勸農后桑以成服所以昭事上帝告䖍報施也昔在伊唐世值陽九厄運之㑹洪水滔天使鯀理之績用不成乃舉文命隨山刋木前後歴年二十二載災𤯝之甚莫過於彼力役之興莫久於此堯舜君臣南面而已禹敷九州庶士庸勲各有差等君子小人物有服章今無若時之急而使公卿大夫竝與厮徒共供事役聞之四夷非嘉聲也垂之竹帛非令名也是以有國有家者近取諸身逺取諸物嫗煦養育故稱愷悌君子民之父母今上下勞役疾病㐫荒耕稼者寡饑饉薦臻無以卒嵗宜加愍䘏以救其困臣觀在昔書籍所載天人之際未有不應也是以古先哲王畏上天之眀命循陰陽之逆順兢兢業業惟恐有違然後理道用興徳與神符災異既發懼而脩政未有不延期流祚者也爰及末葉闇君荒主不崇先王之令軌不納正士之直言以遂其情志恬忽變戒未有不尋踐禍難至於顛覆者也天道既著請以人倫論之夫六情五性同在於人嗜欲㢘貞各居其一及其動也交争于心欲强質弱則縱濫不禁精誠不制則放溢無極夫情之所在非好則美而美好之集非人力不成非榖帛不立苟情無極則人不堪其勞物不充其求勞求竝至将起禍亂故不割情無以相供仲尼云人無逺慮必有近憂繇此觀之禮義之制非苟拘分将以遠害而興治也今吳蜀二賊非徒白地小虜聚邑之冦乃據險乗流跨有士衆僣號稱帝欲與中國争衡今若有人来告權備竝脩徳政復履清儉輕省租賦不理玩好動咨耆賢事遵禮度陛下聞之豈不惕然惡其如此以為難卒討滅而為國憂乎若使告者曰彼二賊竝為無道崇侈無度役其士民重其徴賦下不堪命吁嗟日甚陛下聞之豈不勃然忿其困我無辜之民而欲速加之誅其次豈不幸彼疲弊而取之不難乎苟如此則可易心而度事議之數亦不逺矣且秦始皇不築道徳之基而築阿房之宫不憂蕭墻之變而修長城之役當其君臣為此計也亦欲立萬世之業使子孫長有天下豈意一朝匹夫大呼而天下傾覆哉故臣以為使先代之君知其所行将至於敗則弗為之矣是以亡國之主自謂不亡然後至於亡賢聖之君自謂将亡然後至於不亡昔漢文帝稱為賢主躬行儉約惠下養民而賈誼方之以為天下倒懸可為痛哭者一可為流涕者二可為長歎息者三况今天下彫弊民無儋石之儲國無終年之蓄外有强敵六軍暴邉内興土功州郡騷動若有冦警則臣懼版築之士不能投命虜庭矣又将吏俸祿稍見折減方之於昔五分居一諸受休者又絶廪賜不應輸者今皆出半此為官入兼名於舊其所出與参少於昔而度支經用更每不足牛肉小賦前後相繼反而推之凡此諸費必有所在且夫祿賜榖帛人主所以惠養吏民而為之司命者也若今有費是奪其命矣既得之而又失之此生怨之府也周禮天府掌九賦之則以給九式之用入有其分出有其所不相干乘而用各足各足之後乃以式貢之餘供王玩好又上用財必考于司㑹今陛下所與共坐廊廟理天下者非三司九列則臺閣近臣皆腹心造膝宜在無諱若見豐省而不敢以告從命奔走惟恐不勝是則具臣非鯁輔也昔李斯教秦二世曰為人主而不恣睢命之曰天下桎梏二世用之秦國以覆斯亦滅族是以史遷譏其不正諫而為世誡書奏帝覽焉謂中書監令曰觀隆此奏使朕懼哉王肅為散騎常侍明帝宫室盛興而期㑹迫急有稽限者帝親召問言猶在口身首已分肅抗疏曰大魏承百王之極生民無幾干戈未戢誠宜息民而惠之以安静遐邇之時也夫務畜積而息疲民在於省徭役而勤稼穡今宫室未就功業未訖運漕調發轉相供奉是以丁夫疲於力作農者離其南畝種榖者寡食榖者衆舊榖既没新榖莫繼斯則有國之大患而非偹豫之長策也今見作者三四萬人九龍可以安聖體其内足以列六宮顯陽之殿又向将畢惟㤗極已前功夫尚大方向盛寒疾疢或作誠願陛下發徳音下眀詔深愍役夫之疲勞厚矜兆民之不贍取嘗食廪之士非急要者之用選其丁壮擇留萬人使一朞而更之咸知息代有日則莫不恱以即事勞而不怨矣計一嵗有三百六十萬夫亦不為少當一歳成者聽且三年分遣其餘使皆即農無窮之計也倉有溢粟民有餘力以此興功何功不立以此行化何化不成夫信之於民國家大寳也仲尼曰自古皆有死民無信不立夫區區之晉國微微之重耳欲用其民先示以信是故原雖将降顧信而歸用能一戰而霸于今見稱前車駕當幸雒陽發民為營有司命以營成而罷既成又利其功力不以時遣有司徒營其目前之利不顧經國之體臣愚以為自今以後倘復使民宜明其令使必如期若有事以次寜復更發無或失信凡陛下臨時之所行刑皆有罪之吏宜死之人也然衆庶不知謂為倉卒故願陛下下之於吏而暴其罪鈞其死也無使汙于宫掖而為逺近所疑且人命至重難生易殺氣絶而不續者也是以聖賢重之孟軻稱殺一不辜以取天下仁者不為也漢時有犯蹕警乗輿馬者廷尉張釋之奏使罰金文帝怪其輕而釋之曰方其時上使誅之則已今下廷尉廷尉天下之平也一傾之天下用法皆為輕重民安措其手足臣以為大失其義非忠臣所宜陳也廷尉者天子之吏也猶不可以失平而天子之身反可以惑謬乎斯重於為已而輕於為君不忠之甚也周公曰天子無戯言言則史書之工誦之士稱之言猶不戯而况行之乎故釋之之言不可不察周公之戒不可不法也又陳諸禽獸無用之物而有芻榖人徒之費皆可蠲除王基為中書侍郎眀帝盛修宫室百姓勞瘁基上疏曰臣聞古人以水喻民曰水所以載舟亦所以覆舟故在民上者不可以不戒懼夫民逸則慮易苦則思難是以先王居之以儉約俾不至於生是患者顔淵云東野子之御馬力盡矣而求進不已是以知其将敗今事役勞苦男女離曠願陛下深察東野之弊留意舟水之喻息奔駟於未盡節力役於未困昔漢有天下至孝文時唯有同姓諸侯而賈誼憂之曰置火積薪之下而寝其上因謂之安也今冦賊未殄猛将擁兵簡之則無以應敵久之則難以遺後當盛眀之世不務以除患若子孫不競社稷之憂也使賈誼復起必深切於曩時矣衞覬為尚書眀帝時百姓彫匱而役務方殷覬上疏曰夫變情厲性强所不能人臣言之既不易人主受之又艱難且人之所樂者富貴顯榮也所惡者貧賤死亡也言此四者君上之無制也君愛之則富貴顯榮君惡之則貧賤死亡也順之者愛之所由来逆意者惡之所從至也故人臣皆争順指而避逆意非破家為國殺身成君者誰能犯顔色觸忌諱建一言開一説陛下留意察之則臣下之情可見矣今議者多好悦耳其言理政則比陛下於堯舜其言征伐則比二虜於狸䑕臣以為不然昔漢文之時諸侯强大賈誼累息以為至危况今四海之内分而為三羣士陳力各為其主其来降者未肯言舎邪􅈬正咸稱迫於困急是與六國分理無以為異也當今千里無煙遺民困苦陛下不善留意将遂彫弊難可復振禮天子之器必有金玉之餙飲食之餚必有八珍之味至於凶荒則徹膳降服然後奢儉之節必視世之豐約也武皇帝之時後宫食不過一肉衣不用錦繡茵蓐不緣餙器物無丹漆用能平定天下遺福子孫此皆陛下之所親覽也當今之務宜君臣上下並用籌策計較府庫量入為出深思句踐滋民之術繇恐不及而尚方所造金銀之物漸更增工役不輟侈靡日崇帑藏日竭昔漢武信求神仙之道謂當得雲表之露以餐玉屑故立仙掌以承髙露陛下通眀每所非笑漢武有求於露而繇尚見非陛下無求於露而空設之不益於好而糜費功夫誠皆聖慮所宜裁制也覬歴漢魏時獻忠言率如此蜀譙周為太子家令時後主頗出㳺觀增廣聲樂周上疏諫曰昔王莽之敗豪傑竝起跨州據郡欲弄神器於是賢才智士思望所歸未必以其勢之廣狭惟其徳之厚薄也是故於時更始公孫述及諸有大衆者多已廣大然莫不快情恣欲怠於為善㳺獵飲食不恤民物世祖初入河北馮異等勸之曰當行人所不能為遂務理寃獄節儉飲食勤遵法度故北州歌歎聲布四逺於是鄧禹自南陽追之吳漢冦恂未識世祖遥聞徳行遂以權計舉漁陽上谷突騎迎于廣阿其餘望風慕徳者邳彤耿純劉植之徒至于輿病齎棺襁負而至者不可勝數故能以弱為强屠王郎吞銅馬折赤眉而成帝業也又在雒陽嘗欲小出車駕已御銚期諫曰天下未寜臣誠不願陛下數出即時還車及征隗囂潁川盗起世祖還雒陽但遣冦恂往恂曰潁川以陛下逺征故姦猾起叛未知陛下還恐不時降陛下自臨潁川賊必即降遂至潁川竟如恂言故非急務欲小出不敢至於急務欲自安不為故帝者之欲善也如此故傳曰百姓不徒附誠以徳先之也今漢遭厄運天下三分雄哲之士思望之時也陛下天姿至孝䘮踰三年言及隕涕曾閔不過也敬賢任才使之盡力有踰成康故國内和一大小戮力臣所不能陳然臣不勝大願願復廣人所不能者夫輓大重者其用力苦不衆㧞大艱者其善術苦不廣且承事宗廟者非徒求福祐所以率民尊上也至於四時之祀或有不臨池苑之觀或有仍出臣之愚滯私不自安夫憂責在身者不暇盡樂先帝之志堂構未成誠非盡樂之時願省減樂官後宫所增造但脩奉先帝所施下為子孫節儉之教吳張紘為長史大帝征合肥率輕騎将往突敵紘諫曰夫兵者凶器戰者危事也今麾下恃盛壮之氣忽强暴之虜三軍之衆莫不寒心雖斬将搴旗威震敵塲此乃偏将之任非主将之宜也願抑賁育之勇懷霸王之計大帝納紘言而止既還眀年将復出軍紘又諫曰自古帝王受命之君雖有皇靈佐於上文徳播於下亦頼武功以昭其勲然而貴於時動乃後為威耳今麾下值四百之厄有扶傾之功宜且隱息師徒廣開播植任賢使能務崇寛惠順天命以行誅可不勞而定也於是遂止不行薛綜為尚書僕射公孫淵降吳而復叛大帝盛怒欲自親征綜上疏諫曰夫帝王者萬國之元首天下之所係命也是以居則重門擊柝以戒不虞行則清道按節以養威嚴盖所以存萬安之福鎮四海之腹心昔孔子疾時託乗桴浮海之語季由斯喜拒以無所取材漢元帝欲御樓船薛廣徳請刎頸以血染車何則水火之險至危非帝王所宜渉也諺曰千金之子坐不垂堂况萬乗之尊乃欲輕舉乎夫小國無城郭之固備禦之術器械銖鈍草創無政往必禽克誠如明詔然其方土寒埔榖稼不植民習鞍馬轉徙無常卒聞大軍之至自度不敵鳥驚獸駭長驅奔竄一人匹馬不可得見雖獲其地守之無益此不可一也加又洪流滉瀁有成山之難海行無常風波難免倐忽之間人船異勢雖有堯舜之德計無所施賁育之勇力不得設此不可二也加以鬱霧㝠其上鹹水蒸其下善生流種轉相洿染凡行海者稀無斯患此不可三也天生神聖顯以符瑞當承平䘮亂康此民物嘉祥日集海内垂定逆虜凶虐滅亡在近中國一平淵力自弊但當拱手以待耳今乃違必然之圖尋至危之阻忽九州之固肆一朝之忿既非社稷之重計又開闢以来所未嘗有斯誠羣僚所以傾身側息食不甘味寝棄安席者惟陛下抑雷霆之威忍赫斯之怒遵乗橋之安逺履氷之險則臣子賴祉天下幸甚時羣臣多諫權遂不行陸瑁為選曹尚書大帝忿公孫淵之狙詐反覆欲親征之瑁上疏諫曰臣聞聖王之御逺夷覊縻而已不常保有故古者制地謂之荒服言慌惚無常不可保也今淵東夷小醜屏在海隅雖託人面與禽獸無異國家所謂不愛貨寳逺以爵命加之者非嘉其德義也誠欲納誘愚筭以規其馬耳淵之驕黠恃逺負命此乃荒貌常態豈足深怪昔漢諸君亦嘗鋭意以事外夷馳使散貨充滿西域雖時有恭從然其使人見害財貨并没不可勝數今陛下不忍悁悁之忿欲越巨海身踐其土羣臣愚議竊謂不安何者北㓂與國壤接地連苟有間隙應機而至夫所以越海求馬曲意於淵者為赴目前之急除腹心之疾也而更棄本追末捐近治逺忿以改規激以動衆斯乃猾虜所願聞非大吳之至計也又兵家之術以功役相疲勞逸相待得失之間所覺輙多且沓渚去淵道里尚逺今到其岸兵勢三分使强者進取次當守船又次運糧行人雖多難行悉用加以單歩負糧輕逺深入賊地多馬邀截無常若淵狙詐與北未絶動衆之日唇齒相濟若實孑然無所憑賴其畏怖遠遁或難卒滅使天誅稽於朔野山虜乗間而𧺫恐非萬安之長慮也帝未許瑁重上疏曰夫兵革者固前代所以誅暴亂威四夷也然其役皆在姦雄已除天下無事從容廟堂之上以餘議議之至於中夏鼎沸九域槃牙之時率湏深根固本愛力惜費務自将養以待隣敵之闕未有正於此時舎近治逺以疲軍旅者也昔尉佗叛逆僭號稱帝于時天下乂安百姓殷阜帶甲之數糧食之計可謂多矣然漢文猶以逺征不易重興師旅告喻而已今凶桀未殄疆塲猶警雖蚩尤鬼方之亂故當以緩急差之未宜以淵為先願陛下抑威任計暫寜六師潜神嘿規以為後圗天下幸甚帝再覽瑁書嘉其詞理端切遂不行顧譚為平尚書事魯王霸有盛寵與太子和齊衡譚上疏曰臣聞有國有家者必眀嫡庶之端異尊卑之禮使上下有差階級踰邈如此則骨肉之恩生覬覦之望絶昔賈誼陳治安之計論諸侯之勢以為勢重雖親必有逆節之累勢輕雖疎必有保全之祚故淮南親弟不終饗國失之於勢重也吳芮踈臣傳祚長沙得之於勢輕也昔漢文帝使慎夫人與皇后同席袁盎退夫人之坐帝有怒色及盎辨上下之儀陳人彘之戒帝既悦懌夫人以悟今臣所陳非有所偏誠欲以安太子而便魯王也由是霸與譚有隙歩隲為驃騎将軍時中書吕壹典校文書多所糾舉隲上疏曰伏聞諸典校擿抉細微吹毛求瑕重按深誣趨欲䧟人以成威福無罪無辜横受大刑是以使民跼天踳地誰不戰慄昔之獄官惟賢是任故臯陶作士吕侯贖刑張子廷尉民無寃枉休泰之祚實由此興今之小臣動與古異獄以賄成輕忽人命歸咎于上為國速怨夫一人吁嗟王道為虧甚可仇疾眀徳慎罰哲人惟刑書傳所羙目今蔽獄都下則宜諮顧雍武昌則陸遜潘濬平心専意務在得情隲黨神眀受罪何恨又曰天子父天母地故宫室百官動法列宿若施政令欽順時節官得其人則隂陽和平七曜循度至於今日官僚多闕雖有大臣復不信任如此天地焉得無變故頻年枯旱亢陽之應也又嘉禾六年五月十四日赤烏二年正月一日及二十七日地皆震動地陰類臣之象陰氣盛故動臣下專政之故也夫天地見異所以警悟人主可不深思其意哉又曰丞相顧雍上大将軍陸遜太常潘濬深貴重臣在竭誠夙夜兢兢寝食不寜念欲安國利民建久長之計可謂心膂股肱社稷之臣矣宜各委任不使他官監其所司責其功效課其負殿此三者思慮不到則已豈敢專擅威福欺負所天乎又曰懸賞則顯善設刑以威姦任賢而使能審眀于法術則何功而不成何事而不辦何聽而不聞何視而不覩哉若今郡守百里皆各得其人共相經緯如是庶政豈不康哉竊聞諸縣並有偹吏吏多民煩俗以之弊但小人因緣御命不務奉公而作威福無益視聽更為民害愚以為可一切罷省帝亦覺悟遂誅吕壹隲前後薦逹屈滯救解患難書數十上帝雖不能悉納然時采其言多蒙濟賴羊衜為督軍使者時太子和與弟魯王霸不睦衜上疏曰臣聞古之有天下者皆先顯别適庻封建子弟所以尊重祖宗為國藩表也二宫拜授海内稱宜斯乃大吳興隆之基頃聞二宫並絶賔客逺近悚然大小失望竊從走下風聽採衆論咸謂二宫智逹英茂自正名建號於今三年徳行内著羙稱外昭西北二隅久所服聞謂陛下當副遐邇所以歸徳勤命二宮賔延四逺使異國聞聲思為臣妾今既未垂意於此而發眀詔省奪備衛抑絶賔客使四方禮敬不復得通雖實陛下敦尚古義欲令二宫專志於學不復顧慮視聽小宜期於温故博物而已然非臣下傾企顒顒之至願也或二宮不遵典式此臣所以寝息不寜就如所嫌猶宜補察宻加九酌不使逺近得容異言臣懼積疑或謗久将宣流而西北二隅去國不逺異同之語易以聞達聞達之日聲論當興将為二宫有不順之愆不審陛下何以解之若無以解異國則無以釋境内境内守疑異國興謗非所以育巍巍鎮社稷也願陛下早發優詔使二宫周旋禮命如初則天清地晏萬國幸甚矣華覈為中書丞時孫皓更營新宫制度𢎞廣餙以珠玉所費甚多是時盛夏興工農守並廢覈上疏諫曰臣聞漢文之世九州晏然秦民憙去慘毒之苛政歸劉氏之寛仁省役約法與之更始分王子弟以藩公室當此之時皆以為泰山之安無窮之基也至於賈誼有以為可痛哭及流涕者三可為長嘆息者六乃曰今時之勢何異抱火於積薪之下而寝其上火未及然而謂之安其後變亂皆如其言臣雖下愚不識大倫竊以曩時之事揆今之勢誼云復數年間諸王方剛漢之傅相稱疾罷歸欲以此為治雖堯舜不能安今大敵據九州之地有大半之衆習攻戰之餘術乗戎馬之舊勢欲與中國争相吞之計其猶楚漢勢不兩立非徒漢之諸王淮南濟北而已誼之所欲痛哭比今為緩抱火卧薪之喻於今為急大皇帝覽前代之如彼察今勢之如此故廣開農桑之業積不訾之儲恤民重役務養戰士是以大小感恩各思竭命期運未至早棄萬國自是之後强臣專政上詭天時下違衆議亡安存之本邀一時之利數興軍旅傾竭府藏兵勞民困無時獲安今之存者乃創痍之餘衆哀苦之餘民耳遂使軍資空匱倉廩不實布帛之賜寒暑不周重以失業家戸不贍而北方積榖養民專心東向無復他警蜀為西藩土地險固加承先主統御之術謂其守御足以長久不圗一朝奄至傾覆唇亡齒寒古人所懼交州諸郡國之南土交趾九真二郡已没日南孤危存亡難保合浦以北民皆揺動因連避役多有離叛而備戍減少威鎭轉輕常恐呼吸復有變故昔海虜窺窬東縣多得離民地習海行狃於往年鈔盗無日今兇背有嫌首尾多難乃國朝之厄運也誠宜除建立之役先備預之計勉墾植之業為飢乏之救惟恐農時将過東作向晚有事之日整嚴未辦若舎此急盡力功作卒有風塵不虞之變當委版築之役應烽燧之急驅怨苦之衆赴白刃之難此乃大敵所因為資也如但固守曠日持久則軍糧必乏不待接刃而戰士已困矣昔太戊之時桑榖生庭懼而脩徳怪消殷興熒惑守心宋以為災景公下從瞽史之言而熒惑退舎景公延年夫修徳於身而感異類言發子口而通神眀臣以為愚蔽誤忝近侍不能翼宣仁澤以感靈祗仰慙俯愧無所逃處退伏思維熒惑桑榖之異天示二主至如他餘錙介之妖近是門庭小神所為驗之天地無有他變而徴祥符瑞前後屢臻眀珠既覿白雀繼見萬億之祚實靈所挺以九域為宅天下為家不與編户之民轉徙同也又今之宫室先帝所營卜土立基非為不祥又揚市土地與宫連接若大功畢輿駕遷住門行之神皆轉移猶恐長乆未必勝舊屢遷不可留則有嫌此乃愚臣所以夙夜為憂灼也臣省月令季夏之月不可以興土功不可以㑹諸侯不可以起兵動衆舉大事必有天殃今雖諸侯不㑹諸侯之軍與㑹無異六月戊己土行正王既不可犯加又農月時不可失昔魯隱公夏城中丘春秋書之垂為後戒今築宫為長世之洪基而犯天地之大禁襲春秋之所書廢禁授之上務臣以愚管竊所未安又恐所召離民或有不至者討之則廢役興事不討則日月滋蔓若悉並到大衆聚㑹希無疾病且人心安則念善苦則怨叛江南精兵北土所難欲以一卒當東一人天下未定深可憂惜之如此宫成死叛十五則北軍之衆更增五萬若到萬人則倍增十萬病者有死亡之損叛者傳不善之語此乃大敵所以歡喜也今當角力中原以定强弱正於際㑹彼益我損加以勞困此乃雄夫智士所以深憂臣聞先王治國無三年之儲曰國非其國安寜之世戒備如此况敵强大而忽農亡畜今雖頗種植間者大水沉没其餘存者當須耘耯而長吏怖期上方諸郡身渉山林盡力伐材廢農棄務士民妻孥羸小墾植又薄若有水旱則永無所獲州郡見米當待有事冗食之衆仰官供濟若上下空乏運漕不供而北敵犯疆使周召更生良平復出不能為陛下計眀矣臣聞君眀者臣忠主聖者臣直是以慺慺昧犯天威乞垂哀省書奏皓不納覈遷東觀令領右國史時倉廩無儲世俗滋侈覈上疏曰今㓂虜充斥征伐未已居無積年之儲出無應敵之畜此乃有國者所宜深憂也夫財榖所生當出於民趨時務農國之上急而都下諸官所掌别異各自下調不計民力輙與近期長吏畏罪晝夜催民委舎佃事遑赴㑹日促送到都或藴積不用而徒使百姓消力失時到秋収月督其限入奪其播植之時而責其今年之税如有逋懸則籍没財物故家戸貧困衣食不足宜暫息衆役專心農桑故人稱一夫不耕或受其飢一女不織或受其寒是以先王治國惟農是務軍興已来已向百戰農人廢南畝之務士女停機杼之業推此揆之則蔬食而長饑薄衣而履氷者固不少矣臣聞主之所求於民者二民之所望於主者三二謂求其為己勞也求其為己死也三謂飢者能食之勞者能息之有功者能賞之民以致其二事而主失其三望者則怨心生而功不建今帑藏不實民勞役猥主之二求已備民之三望未報且飢者不待羙饌而後飽寒者不俟狐貉而後温滋味者口之竒文繡者身之餙今事多而役繁民貧而俗奢百工作無用之器婦人為綺靡之飾不勤麻枲並繡文黼黻轉相倣傚恥獨無有兵民之家猶復逐俗内無儋石之儲而出有綾綺之服至於富賈商販之家重以金銀奢恣尤甚天下未平百姓不贍宜益生民之原豐榖帛之業而棄功於浮華之巧妨日於侈靡之事上無尊卑等級之差下有耗財費力之損今吏士之家少無子女多者三四少者一二通令戸有一女十萬家則十萬人織績一嵗一束則十萬束矣使四疆之内同心戮力數年之間布帛必積恣民五色惟所服用但禁綺繡無益之餙且羙貌者不待華采以崇好豔姿者不待文綺以致愛五彩之餙足以麗矣若極粉黛窮盛服未必無醜婦廢華彩去文繡未必無美人也若實如論有之無益廢之無損者何愛而不暫禁以充府藏之急乎此救乏之上務富國之本業也雖管晏復生無以易此漢之文景承平繼統天下已定四海無虞猶以雕文之傷農事錦繡之害女工開富國之利杜飢寒之本况今六合分垂豺狼充路兵不離强甲不解帶而可以不廣生財之原充府藏之積哉冊府元龜卷五百三十九
