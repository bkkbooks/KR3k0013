  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_605-1a}
body:
  text: 册府元龜卷六百五宋王欽若等撰學校部注釋第一夫六藝之文所以明天道正人倫學者之所宗百王之取則者也仲尼既没微言遂絶而聖門達者傳受彌廣厯聘諸國奮為人師亦復敷繹奥義為之訓傳秦并天下乃有坑焚之酷編簡散逸大義益乖自漢之表章六經尊立學校方領矩步之士亦稍稍而出故其演暢經㫖發明典誥廣章句之學極討論之致師資或異傳受不同各自名家咸用垂世至乃述其訓詁以發揮隠賾推厥義例以錯綜條貫著撰之美藹乎前聞逮乎百家之衆制厯代之載籍為之注釋以輔其説者并紀焉卜商魏人為魏文侯師傳周易二卷漢孔鲋為陳勝博士撰論語義疏三卷周王孫雒陽人作易傳二篇史不載官下倣此服光齊人一云服生著易傳彭宣字子佩淮陽人為大司馬長平侯作易傳戴崇字子平沛人為少府作易傳魯申公為詩訓故而齊轅固燕韓生皆為之傳或取春秋采雜説咸非其本義與不得已魯最為近之與不得已者言不得也三家皆不得其真而魯最近也三家皆列於學官徴為大中大夫韓嬰燕人也孝文時為博士景帝時至常山太傅嬰推詩人之意而作内外傳數萬言其語頗與齊魯間殊然歸一也淮南賁生受之燕趙間言詩者繇韓生韓生亦以易授人推易意而為之傳燕趙間好詩故其易微惟韓氏自傳之賈誼為梁王太傅修春秋左氏傳誼為左氏傳訓故丁寛為梁孝王将軍距吳楚號丁将軍作易説三萬言訓詁舉大誼而已詁謂經之㫖趣也今小章句是也費直字長翁東萊人也治易為郎至單父令長於卦筮亡章句徒以彖象繫辭十篇文言解説上下經隋志載直注周易四卷董仲舒為江都相少治春秋所著皆明經術之意及上疏條教凡百二十三篇而説春秋事得失聞舉玉杯繁露清明竹林之屬皆其所著書名也復數十篇十餘萬言皆傳於後世隋志載仲舒撰春秋决事十卷夏侯勝為太子太傅受詔撰尚書論語説觧其意者今意疏也后倉通詩禮為博士至少府説禮數萬言號曰后氏曲臺記曲臺殿在未央宮孟喜字長卿為曲臺署長丞相掾為易章句十卷張禹為成帝師以帝難數對已問經為論語章句獻之後至丞相安昌侯劉向考易説以為諸易家説後至中壘校尉歐陽髙為博士作尚書章句京房為魏郡太守撰周易章句十卷一云十二卷周易錯八卷趙曣撰詩道微十一篇孔安國為臨淮太守傳古文尚書十三卷今字尚書十四卷傳古文孝經一卷侯苞撰韓詩翼要十卷嚴彭祖為太子太傅撰春秋左氏圖七卷又注春秋公羊傳十二卷尹更始為諫議大夫長樂戸將為榖梁章句十五卷孔光注孝經一卷至太傅卒樊光為中散大夫注爾雅三卷侯苞注揚子法言嚴遵字君平蜀郡人注老子二卷又注老子指歸一十卷河上公注老子四篇又云作節解二卷安丘望之為長陵三老為老子章句二卷想余注老子二卷一云張魯或云劉表魯字公旗為鎮南將軍犍為郡文學卒史臣舍人注爾雅二卷劉歆注爾雅三卷與李廵注正同疑非歆注後為京兆尹後漢鄭衆為大司農傳毛詩及左氏條例章句又傳周官禮記論語孝經何休精研六經世儒無及者太傅陳蕃辟之蕃敗休廢錮乃作春秋公羊解詁博物志曰何休注公羊云何氏學有不解者或答曰休謙辭受學於師乃宣此義不出於已此言為允也覃思不闚門十有七年又注訓孝經論語風角七分皆經緯典謨不與守文同説又以春秋駁漢事六百餘條妙得公羊本意休善厯算與其師博士羊弼追述李育意以難二傳作公羊墨守言公羊之義不可攻如墨翟之守城也左氏膏肓榖梁廢疾後為諫議大夫鄭𤣥隠修經業杜門不出時任城何休好公羊學遂著公羊墨守左氏膏肓説文曰肓膈也心下為膏喻左氏之疾不可為也榖梁廢疾𤣥乃發墨守鍼膏盲起廢疾休見而嘆曰康成入吾室操吾矛而伐我乎𤣥作毛詩箋周官注𤣥本習小戴禮後以故經校之取其義長者故為鄭氏學𤣥又注小戴所傳禮記四十九篇通為三禮焉𤣥所注周易尚書毛詩儀禮禮記論語孝經尚書大傳中候乾象厯又注天文七政論語魯禮禘祫義六藝講論毛詩譜駁許慎五經異議答臨孝存周禮凡百餘萬言𤣥質於辭訓通人頗譏其繁至於經傳洽熟稱為純儒齊魯間宗之又注論語孔子弟子目錄一卷又注孟子七卷又撰三禮音各一卷詔以大司農徴不起馬融字季長為南郡太守議郎作毛詩傳及為左氏三家異同之説注孝經論語詩易三禮尚書列女傳老子淮南子離騷夏侯建字長卿勝從父兄子為博士議郎太子少傅師事勝及歐陽髙左右采獲又從五經諸儒問與尚書相出入者牽引以次章句為小夏后氏學賈逵字景伯左氏傳國語為之解詁五十一篇永平中上疏獻之明帝重其書冩藏祕舘逵數為帝言古文尚書與經傳爾雅訓詁相應詔令撰歐陽大小夏侯尚書古文同異逵集為三卷帝善之復令撰齊魯韓詩與毛詩異同並作周官觧詁逵又於章帝時受詔列公羊榖梁不如左氏四十事名曰左氏長義帝善之為侍中卒洼丹建武初為博士作易通論七篇世號洼君通應劭為袁紹軍謀校尉集觧漢書又注漢儀五卷王逸順帝時為侍中著楚辭章句行於世牟長少習歐陽尚書著尚書章句皆本之歐陽氏俗號為牟氏章句為中散大夫卒翟酺為将作大匠尤善圖緯著援神鉤命解詁十二篇張衡為尚書著周官訓詁崔瑗以為不能有異於諸儒也又欲繼孔子易説彖象殘缺者竟不能就衞宏從大司空杜林受古文尚書為作訓㫖後為議郎謝曼卿善毛詩乃為其訓平帝元始中公車徴説詩橋仁為大鴻臚初從同郡戴德學著禮記章句四十九篇號曰橋君學穎容字子嚴陳國長平人也初平中避亂荆州聚徒千餘人著春秋左氏條例五萬餘言劉表以為武陵太守不起謝該字文儀善明春秋左氏為世名儒門徒數百十人建安中河東人樂詳條左氏疑滯數十事以問該皆為通解之名為謝氏釋行於世為議郎卒許慎以五經傳説臧否不同於是撰為五經異議又注淮南子二十一卷再遷除洨長卒楊終著春秋外傳十二篇改定章句十五萬言徴拜郎中景鸞字漢伯理齊詩施氏易兼授河雒圖緯作易説及詩解文句及作月令章句州郡辟命不就程曽字秀升受業長安習嚴氏春秋積十餘年還家講授㑹稽顧本等數百人嘗居門下著書百餘篇皆五經通難又作孟子章句為海西令卒杜林為司空注蒼頡篇二卷服䖍字子慎少以清苦建志入太學受業有雅才善著文論作春秋左氏傳解行之又以左氏傳駁何休之所駁漢事六十條又撰左氏傳音一卷為九江太守免張正習韓詩作章句許淑字惠卿為大中大夫注解左氏鄭興将門人從劉歆講正大義歆美興才使撰條例章句訓詁為大中大夫孔嘉字山甫為大中大夫注解左氏趙岐注孟子十四卷後為太常王隆撰漢官解詁三卷建武中為新汲令盧植作尚書章句三禮解詁官至尚書荀單字景文作易集解為太子中庶子包咸字子良為大鴻臚為論語章句宋衷字仲子南陽章陵人為荆州五等從事注易九卷周氏為論語章句胡廣注漢官觧詁三卷為太傅卒荀爽著禮易傳詩傳尚書正經春秋條例又云注周易十篇又有荀爽九家集注十卷不知何人所集稱荀爽者以為主故也其序有荀爽京房馬融鄭𤣥宋衷虞翻陸績姚信翟子𤣥子不詳何人為義易注内又有張氏朱氏竝不詳何人春秋公羊傳問荅八卷及辯䜟并它所論敘題為新書為司空陳元為司空南閣祭酒撰左氏同異延篤字叔堅受左氏於賈逵之孫伯升因而注之為京兆尹後卒於家蔡邕撰月令章句十二卷後為左中郎将王玢為司徒掾撰春秋左氏逵長議一卷劉熈為安南太守撰禮諮法三卷釋名八卷宋均撰孝經皇義一卷注詩緯十八卷注禮記黙房二卷注樂緯二卷注孝經鉤命决六卷注孝經援神契七卷注論䜟八卷後為河内太守崔豹為尚書左丞集論語集義八卷劉表為鎮南将軍荆州牧撰易章句五卷一云注易十卷髙誘注呂氏春秋二十六卷淮南子二十一卷辟司空掾除濮陽令樊英著易章句世名樊氏學後為光祿大夫賜告歸曹充傳慶氏禮建武中為博士永平中後拜侍中作章句辯難於是遂有慶氏學曹褒充之子也傳充慶氏禮作通義十二篇演經雜論百二十篇後為侍中魏王弼字輔嗣為尚書郎好論儒道辭才逸辯注易及老子又作老子指畧及撰易畧一卷周易義一卷論語釋疑三卷王朗字景興為司徒著易春秋孝經周官傳及撰春秋左氏釋駁一卷王肅字子雍年十八從宋忠讀太𤣥而更為之解初肅善賈馬之學而不好鄭氏采㑹同異為尚書詩論語三禮左氏解及撰定父朗所作易傳皆列於學官及作周易春秋例毛詩禮記春秋三傳國語爾雅諸注隋書志載肅撰尚書駁議五卷又撰尚書義問三卷又解孝經一卷論語釋駁三卷及解孔子家語又注老子二卷又撰三禮音各一卷為太常董遇字季直為侍中大司農注周易十卷又為春秋左氏傳章句周生烈字文逸燉煌人為博士注集解左傳又解論語陳羣字長文為司空解論語鍾㑹撰周易盡神論一卷又撰周易無亙體論三卷及注老子二卷後為鎮西将軍何晏撰周易私記二十卷周易講疏十三卷注孝經一卷注論語十卷五經大義五卷老子道德經二卷後為尚書劉楨為太子文學撰毛詩義問九卷王基字伯輿東萊人為荆州刺史撰毛詩駁一卷駁王肅申鄭義又注解左氏傳康信為樂平太守撰春秋要一卷徐凱為安平太守撰答春秋公羊論二卷魏益為大長秋撰春秋三傳論十卷蘇林字孝友為散騎常侍注孝經一卷劉劭字孔才為光祿大夫注孝經二卷孟子注老子二卷或云孟康字公休為中書監注老子二卷孫炎以祕書監徴不起注儀禮二十九卷一云注禮記三十卷注爾雅二卷音一卷李仲欽梓潼人著左氏指歸糜信字南山為樂平太守注榖梁十二卷蜀杜瓊為太守字伯瑜少受學於任安注韓詩章句十餘萬言不教諸子内學無傳業者蔣琬為大将軍錄尚書事撰喪服要義一卷李譔為中㪚大夫右中郎将著古文易尚書毛詩三禮左氏傳太𤣥指歸皆依準賈馬異於鄭𤣥與王氏殊隔初不見其所述而意歸多同譙周字允南入晉為㪚騎常侍不拜封陽城亭侯注論語十卷撰五經然否論五卷古文考二十五卷蜀才不詳何人注周易十卷又注老子二卷七志云是王弼後人蜀李書云姓范名長生一名賢隠居青城山自號蜀才李雄以為丞相尹濤注易六卷巨生解老子二卷吳虞翻字仲翔初為後漢侍御史與少府孔融書竝示以所著易注融荅書曰聞延陵之理樂覩五子之治易乃知東南之美者非徒㑹稽之竹箭也又觀象雲物察絪縕原其禍福與神合契可謂探賾窮通者也翻又為老子論語國語訓注又注揚子太𤣥經十四卷范望州字淑文為尚書郎作老子注訓三卷程秉為太常著周易摘尚書駁論語弼凡三萬餘言徐整為太常卿為毛詩譜三卷又撰孝經嘿注一卷韋昭為侍中撰毛詩荅雜問七卷又注春秋國語二十二卷孝經解賛一卷辨釋名一卷漢書音義七卷射慈字孝宗為中書侍郎撰喪服變除圖五卷禮記音一卷士燮字彦威為衞将軍注春秋經十一卷唐固字世正為尚書僕射注春秋榖梁傳十三卷又著春秋外傳國語二十一卷劉毅為太尉撰尚書荅姚信字德祐吳興人為太常卿注易十卷謝貞撰禮記音一卷陸績為鬱林太守述易十三卷陸璣字元恪吳郡人為太子中庶子烏程令作毛詩草木鳥獸蟲魚疏二卷晉羊祜為征南大将軍解釋老子二卷杜預為征南大将軍鎮荆州既立功之後從容無事乃躭思經籍為春秋左氏經傳集解又叅考衆家譜第謂之釋例又作盟㑹圖春秋長厯備成一家之學比老乃成當時論者謂預文義質直世人未之重惟祕書監摰虞賞之曰左丘明本為春秋作傳而左傳自以孤行釋例本為傳設而所發明何但左傳故亦孤行隋志載預傳春秋左氏傳二卷又撰音一卷嵇康為中散大夫撰春秋左氏音三卷向秀字子竒河内懷人為㪚騎常侍清悟有遠識少為山濤所知雅好老莊之學莊周著内外數十篇厯世才士雖有觀者莫適論其㫖統也秀為之隠解發明其趣振起𤣥風讀之者超然心悟莫不自足一時也又為易義郭象字子𤣥為太傅主簿好老莊能清言先是注莊子者數十家莫能究其㫖綂向秀於舊注外而為解義妙演竒致大暢𤣥風惟秋水至樂二篇未竟而秀卒秀子幼其義零落然頗有别本遷流象為人行薄以秀義不傳於世遂竊以為己注乃自注秋水至樂二篇又易馬蹄一篇其餘衆篇或㸃定文句而已其後秀義别本出故有向郭二莊其義一也又注論語體畧二卷劉實為太尉尤精三傳辨正公羊以為衞輙不應辭以王父命祭仲失為臣之節舉此二端以明臣子之體遂行於世撰春秋條例二十卷王接為臨汾公相國學雖博通特精禮傳嘗謂左氏辭義贍富自是一家書不主為經發公羊附經立傳經所不書傳不妄起於文為儉通經為長任城何休訓釋甚詳而黜周王魯大體乖硋且志通公羊而往往還為公羊病接乃更注公羊春秋多有新義袁准字孝尼至給事中為易周官詩傳及論五經滯義聖人之微言并注喪服經袁喬為益州刺史湘西侯博學有文才注論語及詩皆行於世范寗以春秋榖梁氏未有善釋遂沉思積年為之集解其義精審為世所重既而徐邈復為之注世亦稱之又注古文尚書舜典一卷為豫章太守卒鄭冲為㪚騎常侍與孫邕曹義荀顗何晏共集論語諸家訓注之善者記其姓名因從其義有不安者輙改易之名曰論語集解成奏之魏朝于今傳焉干寶為㪚騎常侍領著作為春秋左氏義外傳注周易周官凡數十篇又撰周易問難二卷周易𤣥品二卷周易爻義一卷春秋左氏承傳義十五卷春秋序論三卷又為詩音鄧粲為荆州别駕注老子行於世虞溥為鄱陽内史注春秋經傳序束晳為尚書郎才學博通著五經通論發既行於世劉黄老劭之族子太元中為尚書郎有義學注慎子老子竝傳於世魯勝字叔時代郡人也少有才操為佐著作郎其著述為世所稱遭亂遺失惟注墨辯存其序曰名者所以别同異明是非道義之門政化之準繩也孔子曰必也正名名不正則事不成墨子著書作辨經以立名本惠施公孫龍祖述其學以正刑名於世孟子非墨子其辯言正辭則與墨同荀卿莊周等皆非毁名家而不能易其論也必有形察莫如别色故有堅白之辯名必有分明分明莫如有無故有無序之辯是有不是可有不可是名両可同而有異異而有同是之謂同異至同無不同至異無不異是謂辯同異異同生是非是非生吉凶取辨於一吻而原極天下之汙隆名之至也自鄧析至秦時名家者世有篇籍率頗難知後學莫復傳習於今五百餘嵗遂亡絶滅墨辯有上下經經各有説凡四篇與其書衆篇連第故獨存今引説在經各附其章疑者闕之又采其衆雜集為刑名二篇畧解指歸以俟君子其或興㣲繼絶者亦有樂乎此也李充為大著作遷中書侍郎注尚書及周易㫖六篇釋莊論上下二篇注論語十卷劉兆五辟公府三徴博士皆不就博學洽聞以春秋一經而三家殊途諸儒是非之議紛然互為讎敵乃思三家之異合而通之周禮有調人之官作春秋調人七萬餘言皆論其首尾使大義無乖時有不合者舉長短以通之又為春秋左氏解名曰全綜公羊榖梁解詁皆納經傳中朱書以别之又撰周易訓註以正動二體𤣥通其文凡所贊述百餘萬言徐苗再徴博士不就作五經同異評郭璞為著作郎注釋爾雅别為音義圖譜又注三蒼方言穆天子傳山海經及楚辭子虚上林賦數十萬言汜毓奕世儒素召補太傅叅軍不就合三傳為之解注撰春秋釋疑肉刑論凡所述造七萬言徐邈為驍騎将軍撰正五經音訓學者宗之所注榖梁傳見重於時又撰楚辭音一卷莊子音一卷蔡謨字道明領祕書監總應劭已來注班固漢書者為之集解又撰禮記音二卷徐廣為祕書監撰答禮問及毛詩背隠藏義二卷虞喜累徴博士不就釋毛詩畧注孝經撰周官駁難又注論語九卷新書討張論語十卷郭琦字公偉有雅量博學注榖梁京氏易百卷鄉人王游等皆就琦學為佐著作郎宋纎字令艾燉煌人為張祚太子太傅明究經緯注論語及為詩頌數萬言孟整一云孟陋江夏人博學多通於三禮注論語行於世徴撫軍叅軍不就虞諶為司空從事中郎将注莊子行於世盈氏注論語十卷又注老子二卷薛貞為太尉叅軍注歸藏十三卷黄穎為廣州儒林從事注周易十卷王廣為驃騎将軍注周易三卷張軌字士彦為凉州刺史諡武公撰易義宣舒字幼驥為宣城令為易通知來藏往論邢融裴藻許適楊藻四人不詳何人竝為易義袁悦之字元禮為驃騎諮議叅軍注繫辭及為易音孫綽字興公為廷尉卿集註論語十卷張瑀為著作郎注周易八卷一云集觧易十二卷桓𤣥字敬道為後将軍荆州刺史注周易繫辭二卷謝萬字萬石為西中郎将注周易繫辭一卷又注孝經韓伯字康伯為中郎太常注周易繫辭二卷李軌為祠部中郎都亭侯撰周易音一卷春秋左氏傳音三卷又撰春秋公羊音一卷又解小雅一卷注揚子法言莊子音一卷周禮儀禮音各一卷禮記音一卷楊乂字𤣥舒為司徒左長史撰周易卦序論一卷又撰毛詩辨異三卷毛詩異義二卷毛詩雜義五卷阮咸字仲容為散騎常侍撰易義阮渾字長咸為中庶子撰易義一云撰周易論二卷顧夷為揚州從事撰難王輔嗣義一卷李顒字長林為江夏太守撰周易卦象數㫖二卷集解尚書十一卷尚書新釋二卷謝沉字行思為祠部郎中註尚書十五卷又註毛詩二十卷釋義十卷孔晁為五經博士撰尚書義問三卷又注春秋外傳國語江熙字太和為兖州别駕注毛詩二十卷又注論語十卷孫毓字休朗為長沙太守撰毛詩異同評十卷評毛鄭王肅三家異同而朋於王又為春秋左氏傳義註二十八卷禮記音一卷陳統為徐州從事撰難孫毓申鄭毛詩評四卷又傳毛詩索隠二卷殷仲堪為荆州刺史撰毛詩雜議四卷孟氏註莊子十八卷王楙約為燕王師註周官寧朔新書八卷禮記寧朔新書八卷陳歆為司空長史撰周官禮異同評十三卷吳商為益夀令撰禮難十二卷孔倫為廬陵太守撰集註喪服經傳一卷張嗣注老子二卷王愆期字門子為散騎常侍注春秋公羊經十三卷江惇字思悛累徴不就撰毛詩音又傳公羊音一卷庾翼為安西将軍荆州刺史撰答春秋公羊釋論語一卷徐乾字文祚為給事中注春秋榖梁傳十三卷張靖為業邑太守注春秋榖梁傳十卷又箋榖梁廢疾荀朂為尚書令集解孝經一卷袁敬仲為東陽太守集議孝經一卷陽宏為給事中注孝經一卷虞盤佐字𢎞猷髙平人注孝經一卷史云處士孫氏注孝經一卷殷仲文為東陽太守注孝經一卷殷叔道為晉陽太守注孝經一卷車武子為丹陽令注孝經一卷崔豹字正熊為尚書左兵中郎注論語十卷江鴻為兖州别駕集解論語梁凱為國子博士注論語十卷繆播為太弟中庶子撰論語㫖序三卷欒肇為尚書郎撰易義及論語釋疑十卷又撰論語駁序二卷庾亮為征西将軍開府儀同三司撰論語君子無所争一卷陽方為髙凉太守撰五經鈎沉十卷戴逵字安道為㪚騎常侍撰五經大義三卷又撰老子音一卷劉寶為安北将軍撰漢書駁義二卷摯虞為太常卿註三輔决錄七卷王尚述字君曽為江州刺史註老子二卷程韶為郎中集解老子二卷邯鄲氏註老子二卷袁真字彦仁為西中郎将註老子二卷常氏注老子二卷孫登字仲山為尚書郎注老子道德經張湛為中書侍郎注列子八卷崔譔為議郎注莊子十卷司馬彪字紹綂為祕書監注莊子二十一卷李頥字景真為丞相叅軍自號𤣥道子注莊子三十卷皇甫謐累徴不起注鬼谷子三卷王廙字世将為荆州刺史注易十二卷庾運字𤣥度為尚書撰易義一云易注應貞字吉甫為散騎常侍為明易論荀惲字景文為太子中庶子撰易義又云注易十卷張輝字義元為侍中撰易義王宏字正宗弼之兄為大司農撰易義袁宏字彦伯為東陽太守注孝經王濟字武子為河南尹撰易義衞瓘字伯玉為太保撰易義又注論語八卷張馮字長明為司徒左長史註論語十卷又註老子三卷杜育字方叔為國子祭酒撰易義楊瓚為司徒左長史撰易義阮侃字德恕為河内太守撰詩音蔡氏孔氏不詳何所人竝為詩音陳銓註周禮喪服曹耽字愛道辟安北諮議叅軍不就撰禮記音二卷尹毅為國子助教撰禮記音一卷注論語十卷范宣字宣子徴員外不起以講誦為業禮易論難皆行於世又撰禮記音一卷聶氏作周禮音一卷一云定鄭氏音出北王工南無此書不詳何人孔衍字舒元為廣陵相撰春秋榖梁傳集觧十四卷註公羊十四卷荀訥字世言為尚書左侍郎撰左氏音四卷集解榖梁十卷髙龍為河南太守注公羊十二卷叚肅注榖梁十二卷徐整注孝經劉遺民為柴桑令撰老子𤣥機一卷楊泓為給事中註孝經庾氏注孝經董景道字文博𢎞農人劉曜累徴不起明三禮禮義顓遵鄭氏著通論非駁雜諸儒演廣鄭音册府元龜卷六百五
