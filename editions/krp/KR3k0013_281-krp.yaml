  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_281-1a}
body:
  text: 册府元龜巻二百八十一宋王欽若等撰宗室部領鎮第四後魏南安恵王禎景穆帝子孝文即位除凉州鎮都大將尋以綏撫有能加都督西戎諸軍事征西大將軍領䕶西域校尉儀同三司凉州刺史徴為内都大官出為使持節侍中本將軍開府長安鎮都大將雍州刺史後以罪削除封爵以庶人歸第孝文南伐禎從至雒及議遷都禎首從大計帝以禎議定遷都復封爵出為鎮北大將軍相州刺史禎子獻武王英孝文時為平北将軍武川鎮都大將假魏公未㡬遷都督梁益寜三州諸軍事安南將軍領䕶西戎校尉仇池鎮都大將梁州刺史尋鎮荆州英子文荘王熈自光禄勲除平西将軍東秦州刺史進號安西將軍尋以本將軍授相州刺史熈弟誘自衛尉少卿出為右將軍南秦州刺史英孫魯郡王肅荘帝初除散騎常侍出為後將軍廣州刺史後除衛將軍肆州刺史城陽康王長夀景穆帝子自征西大將軍外都大官出為沃野鎮都大將在鎮甚有威名長夀子懐王鸞孝文時自外都大官出為持節都督河西諸軍事征西大將軍領䕶西戎校尉凉州鎮都大將改鎮立州以鸞為凉州刺史姑臧鎮都大將後除使持節征南大將軍都督豫荆郢三州河内山陽東郡諸軍事又除冠軍將軍河内太守轉并州刺史宣武初除平東將軍青州刺史轉安北將軍定州刺史鸞子文獻王徽孝明時除右將軍凉州刺史徽以徑途阻逺固請不行除散騎常侍其年除後將軍并州刺史加安北將軍拜安西將軍秦州刺史詔書旦至夕發徽以將之秦部請詣闕恭授仍表啓固陳請不之職莊帝踐祚拜司州牧徽次兄顯恭為荆州刺史莊帝既殺爾朱榮乃除顯恭使持節都督晋建南汾三州諸軍事鎮西將軍兼尚書左僕射西北道行臺晋州刺史安定靖王休景穆帝子孝文初庫莫奚寇邊以休為使持節侍中都督諸軍事征東大將軍領䕶東夷校尉儀同三司和龍鎮將休撫防有方賊乃欵附入為中都大官蠕蠕犯塞出為使持節征北大將軍撫冥鎮大將休子爕宣武初襲拜太中大夫除征虜將軍華州刺史後為豳州刺史爕弟永平為征虜将軍南州刺史永平弟東萊王貴平荘帝時除平北將軍南相州刺史廢帝時以本任官行青州事還除車騎将軍加散騎常侍出為青州刺史章武王彬景穆帝孫繼章武敬王後出為使持節都督東秦豳夏三州諸軍事鎮西大將軍西戎校尉統萬鎮都大將朔州刺史是時吐京胡反詔彬持節假平北將軍行汾州事率并泗之衆往討之胡平仍除征虜将軍汾州刺史彬子融為征虜将軍别将南討大摧梁衆于時揚州刺史元嵩為奴所害勅融行揚州事尋除假節征虜将軍并州刺史又為宗正卿以本官行瀛州事遇疾不行未幾除散騎常侍平東将軍青州刺史還為秘書監遷撫軍将軍領河南尹融弟東安王凝荘帝時除持節安東将軍兖州刺史轉濟州刺史樂陵宻王思譽景穆帝孫繼樂陵康王胡兒後孝文時為鎮北大将軍北征大都将後除使持節本将軍領䕶匈奴校尉都督中軍都将出為使持節鎮東大将軍和龍鎮都大将營州刺史領䕶東夷校尉思譽子惠王景畧宣武時襲封拜驍騎将軍除持節冠軍将軍幽州刺史景畧弟洪畧為中軍将軍行東雍州刺史陽平荘王順景穆帝孫自懐朔鎮大将除朔州刺史景明元年薨於青州刺史頥弟廣陵康侯衍為梁州刺史轉徐州刺史卒於雍州刺史衍弟欽為司州牧濟陰王欝景穆帝孫位開府為徐州刺史欝弟之子静王誕累遷齊州刺史欝弟麗字寶掌宣武時拜雍州刺史遷冀州刺史汝陰威王逞景穆帝孫卒於齊州刺史逞子慶和為東豫州刺史逞弟汎自元士稍遷營州刺史汎弟脩義自元士為齊州刺史又遷秦州雍州刺史廣平文貞王匡景穆帝孫繼廣平殤王雒侯後宣武親政除肆州刺史遷恒州刺史後為光禄大夫兼宗正卿出為兖州刺史又除平州刺史徙青州刺史尋為闗右都督兼尚書行臺安樂王長樂文成第二子獻文承明元年以太尉出為定州刺史長樂子詮襲爵宣武初為凉州刺史後除定州刺史詮子鑒襲爵後除相州刺史齊郡王子琛繼河間王若後宣武時拜定州刺史孝明時為都官尚書出為秦州刺史安豐王猛文成第六子孝文太和中加侍中出為鎮都大将營州刺史猛子延明襲爵孝明時為豫州刺史遷都督徐州刺史咸陽王禧獻文第二子孝文太和中自侍中驃騎大将軍中都大官出為使持節開府冀州刺史孝文餞於南郊後禧朝京師将還州孝文親餞之賦詩叙意加禧都督冀相兖東兖南豫東荆六州諸軍事有司奏冀州人蘇僧瓘等三千人稱禧清明有惠政請世胙冀州詔曰利建雖古未必今冝經野繇君理非下請邑采之封自有别式入除司州牧都督司豫荆郢雒東荆六州諸軍事開府如故趙郡王幹獻文第三子孝文太和中自車騎将軍左光禄大夫領吏部尚書拜使持節都督南豫郢東荆三州諸軍事征南大将軍開府豫州刺史及帝南伐以幹為使持節車騎大将軍都督闗右諸軍事給銅虎符十别賜詩書尋除都督冀定瀛三州諸軍事征東大将軍冀州刺史開府如故後轉特進司州牧幹子謐自太子中庶子出為冠軍将軍岐州刺史以罪罷州還除大司農卿又除散騎常侍平北将軍幽州刺史謐兄諶累遷後将軍肆州刺史固辭不拜後為黄門侍郎進號安南将軍光禄大夫出為散騎常侍中軍将軍相州刺史諶弟譚自羽林監出為髙陽太守為政嚴斷孝明初入為直閣将軍遷光禄少卿行南兖州事除征虜将軍涇州刺史又為安西将軍秦州刺史廣陵王羽獻文第五子孝文遷都之後北蕃入夷多有未悟羽鎮撫代京内外肅然及車駕南伐羽進號衞将軍除使持節都督青齊光南青四州諸軍事征東大将軍開府青州刺史孝明即位遷司州牧羽子欣孝明時自通直散騎常侍北中郎将出為冠軍将軍荆州刺史轉征虜将軍齊州刺史欣在二州頗得人和出帝時加太師開府襲封廣陵王除太傅司州牧髙陽王雍獻文子孝文太和中自散騎常侍除使持節鎮北将軍相州刺史常侍如故宣武初遷使持節都督冀相瀛三州諸軍事征北大将軍開府冀州刺史雍在二州㣲有聲稱入拜驃騎大将軍司州牧雍子端自散騎常侍出為安東将軍青州刺史時梁武遣将冦逼徐揚除端撫軍将軍金紫光禄大夫使持節東南道大使䖏分軍機事平拜鎮軍将軍兖州刺史端弟誕孝静初拜侍中車騎大将軍儀同三司司州牧北海王詳獻文子孝文太和中累加侍中秘書監趙郡王幹薨以詳行司州牧詳子顥自都官尚書出除散騎常侍撫軍将軍徐州刺史尋為御史弹奏除名其後賊帥宿勤明達叱千騏驎等冦亂豳華諸州乃復顥王爵以本将軍加使持節假征西将軍都督華豳東秦諸軍事兼左僕射西道行臺以功進號征西将軍為侍中驃騎大将軍開府儀同三司相州刺史顥弟瑱自黄門郎出除平北將軍相州刺史彭城王勰獻文子孝文太和中從征沔北除使持節都督南征諸軍事中軍大将軍開府孝明時為使持節侍中都督冀定幽瀛營安平七州諸軍事驃騎大将軍開府定州刺史又以本官領揚州刺史勰子劭起家宗正少卿除使持節假散騎常侍平東将軍青州刺史劭子韶襲爵武定末為司州牧劭兄子直累遷給事黄門侍郎出為冠軍将軍梁州刺史京兆王愉孝文子太和末拜都督徐州刺史宣武初為䕶軍将軍遷中書監出為冀州刺史北齊平秦王歸彦神武族弟武成時為司徙威權振主乃拜太宰冀州刺史任城王湝神武子武平初遷太師司州牧出為冀州刺史加太宰遷右丞相都督青州刺史隋義城公處綱髙祖族父開皇中以右領軍将軍出拜蒲州刺史吏民恱之進位大将軍遷秦州總管滕穆王瓉髙祖母弟開皇初拜雍州牧瓉子綸開皇初拜邵州刺史衞昭王爽髙祖異母弟開皇中拜雍州牧累遷左領軍大将軍權領并州總管轉梁州總管所治甚有聲河間王𢎞高祖從祖弟開皇初自右衛大將軍出拜寧州總管後數載還京未㡬拜蒲州刺史得以便宜從事毎晋王入朝𢎞輙領揚州總管晋王歸藩復還蒲州在官十餘年風教大治𢎞子嗣郇王慶累遷滎陽郡太守頗有治績秦孝王俊髙祖第三子開皇二年拜柱國河南道行臺尚書令雒州刺史三年遷秦州總管隴州諸州盡𨽻焉平陳之後領揚州總管一十四州諸軍事頗有令聞髙祖聞而大恱降璽書奨勵焉蜀王秀髙祖第四子開皇元年拜益州刺史總管二十四州諸軍事十二年入為内史令右領軍大将軍尋復出鎮於蜀漢王諒髙祖第五子開皇十二年為雍州牧累加左衞大将軍十七年出為并州總管帝幸温湯而送之自山以東至於滄海南抵黄河五十二州盡𨽻焉特許以便冝不拘律令蔡王智積髙祖弟整之子開皇初襲王爵加開府儀同三司授同州刺史儀衞資送甚盛二十年徴還大業七年授𢎞農太守觀徳王雄高祖族子大業中檢校鄭州刺史嵗餘授懐州刺史尋拜京兆尹唐永安王孝基髙祖從父弟武徳初拜陜州總管廬江王瑗髙祖從父兄子武徳元年拜信州總管九年累遷幽州大都督襄邑王神符髙祖從父弟武徳四年累遷并州總管九年遷揚州大都督魏郡公文暕神符少子也厯幽州都督膠東公道彦髙祖從父弟神通之子武徳中授隴州刺史貞觀初轉湘州都督後遷岷州都督吳國公孝逸道彦之弟髙宗末為益州大都督府長史光宅初為左王鈐衛大将軍揚州行軍大總管郇國公孝協髙祖從父弟叔良之子貞觀中累遷魏州刺史孝斌孝協弟官至原州都督府長史襄武王琛髙祖從父兄安之子武徳中厯蒲絳二州總管及宋金剛陷澮州時稽胡多叛轉琛為隰州總管以鎮之河間王孝恭琛之弟也武徳二年授信州總管三年以平蕭銑功遷荆州大總管又以平輔公祏功拜揚州大都督貞觀初除觀州刺史與長孫無忌等代襲刺史孝恭弟濟北郡王瑊武徳中為始州刺史瑊弟漢陽公瓌武徳中代孝恭為荆州都督貞觀四年拜冝州刺史譙國公崇義孝恭子也歴蒲同二州刺史益州大都府長史甚有威名崇義弟晦乾封中累除營州都督以善政聞淮陽王道𤣥髙祖從父兄子也武徳中從太宗討王世充東都平拜雒州總管及府廢改授雒州刺史武都郡王道明道𤣥之弟也卒於鄆城刺史江夏王道宗道𤣥從父弟也武徳五年授靈州總管貞觀元年徴拜鴻臚卿大将經畧突厥入拜靈州都督十二年坐贓免十三年起為茂州都督未行轉晋州刺史盧國公景恒道宗子也官至湘州刺史渤海王奉慈髙祖兄子髙宗顯慶中累遷原州都督巢王元吉髙祖子武徳元年授并州總管并州為劉武周所䧟元吉拜稷州刺史六年加隰州總管荆王元景髙祖第六子武徳八年授安州都督貞觀初遷雍州牧十年授荆州都督久之轉鄜州刺史漢王元昌髙祖第七子也貞觀五年授華州刺史轉梁州刺史鄷王元亨髙祖第八子也貞觀二年拜金州刺史徐王元禮高祖第十子貞觀六年授鄭州刺史遷徐州都督十七年轉絳州刺史永徽四年加司徒兼潞州刺史韓王元嘉髙祖第十一子也貞觀六年授潞州刺史十年加本州都督髙宗末轉澤州刺史太后臨朝授定州刺史武陵郡王誼元嘉之次子也官至濮州刺史彭王元則髙祖第十二子也貞觀七年授豫州刺史十年除遂州都督十七年拜澧州刺史鄭王元懿髙祖第十三子也貞觀七年授兖州刺史歴鄭潞絳三州刺史嗣鄭王敬元懿之子也官至鄂州刺史霍王元軌髙祖第十四子也貞觀元年拜夀州刺史十年授絳州刺史尋轉徐州刺史二十三年為定州刺史垂拱初自司徒出為湘州刺史轉青州刺史子緒為金州刺史虢王鳯髙祖第十五子也貞觀七年授鄧州刺史厯虢豫青三州刺史平陽郡王翼鳯之長子也官至光州刺史定襄郡公宏鳯第三子也則天初為曹州刺史東莞郡公融鳯第五子也垂拱初為申州刺史道王元慶髙祖第十六子也貞觀九年拜趙州刺史十年授豫州刺史永徽四年歴滑徐沁衞四州刺史臨淮王誘元慶之子也為澧州刺史誘弟詢為夀州刺史鄧王元裕髙祖第十七子也貞觀中歴鄧梁黄三州刺史髙宗時乂歴夀襄二州刺史兖州都督舒王元名髙祖第十八子也貞觀十一年拜夀州刺史後歴許滑宋三州轉石州刺史在州二十年垂拱年除青州又除鄭州轉滑州刺史豫章王亶元名子也為江州刺史魯王靈夔高祖第十九子貞觀十年授幽州都督十四年授兖州都督永徽六年轉隆州刺史後歴襄絳滑定等州刺史垂拱元年授邢州刺史嗣魯王道堅靈夔孫也歴果龍吉冀洛汾滄等七州刺史開元二十二年檢校魏州刺史未行改汴州刺史江王元祥髙祖第二十子也貞觀十一年授蘇州刺史髙宗時歴金鄜鄭三州刺史永嘉王晫元祥之子永隆中為復州刺史宻王元曉髙祖第二十一子也貞觀九年授虢州刺史二十三年轉潞州刺史永徽中歴宣徐二州刺史滕王元嬰髙祖第二十二子也貞觀十五年授金州刺史永徽中遷蘇州刺史尋轉洪州都督歴夀隆二州刺史梁州都督吳王恪太宗子武徳二年授益州大都督以年㓜不之官貞觀十二年授安州都督髙宗即位拜梁州都督成王千里恪長子也初名仁永昌元年授襄州刺史後改名千里歴唐廬許衞蒲五州刺史神龍初拜左金吾大将軍兼領益州大都督廣州大都督五府經略安撫大使張掖郡王琨仁之弟也則天朝歴淄衞宋鄭梁幽六州刺史信安郡王禕琨之子也景雲元年為徳蔡衞等州刺史開元後轉蜀濮等州刺史丁母憂起復授瀛州刺史十五年服除授朔方節度副大使知節度事尋遷節度使坐事出為衢州刺史歴滑懐二州刺史嗣吳王祗禕之弟也天寳末為陳留太守持節充河南道節度採訪使濮王㤗太宗第四子也貞觀二年授揚州大都督七年轉鄜州大都督並不之官除雍州牧十年遥領湘州都督齊王祐太宗第五子貞觀初授幽州都督蜀王愔太宗第六子貞觀七年授襄州刺史十年轉益州都督十三年除岐州刺史蔣王惲大宗第七子貞觀八年授洛州刺史十年拜安州都督永徽三年除梁州都督後歴遂湘二州刺史越王貞太宗第八子貞觀七年授徐州都督十年除揚州都督十七年轉湘州刺史永徽四年授安州都督咸亨中復轉湘州刺史則天臨朝除蔡州刺史琅邪王冲貞長子也歴宻濟博三州刺史紀王慎太宗第十子貞觀七年授秦州都督十七年遷襄州刺史永徽元年拜左衞将軍二年授荆州都督累除邢州刺史文明元年轉貞州刺史嗣紀王澄慎少子也歴徳瀛冀三州刺史趙王福太宗第十三子貞觀十八年授秦州都督二十三年累除梁州都督曹王明太宗第十四子也顯慶中授梁州都督後歴虢蔡蘇三州刺史燕王忠髙宗長子永徽元年拜雍州牧顯慶元年廢忠為梁王授梁州都督其年轉房州刺史原王孝髙宗第二子也永徽三年拜并州都督顯慶三年累除遂州刺史澤王上金髙宗第三子也永徽三年遥授益州大都督乾封元年累轉夀州刺史有罪免削至永隆二年二月為沔州刺史文明元年為蘇州刺史垂拱元年改陳州刺史永昌元年為遂州刺史許王素節髙宗第四子永徽中自雍州牧轉岐州刺史被讒出為申州刺史永隆元年轉岳州刺史累除舒州刺史邠王守禮章懐太子次子也睿宗景雲二年帶光禄卿兼幽州刺史轉左金吾衞大将軍遥領單于大都䕶開元初歴虢隴㐮晋滑等六州刺史漢中王瑀讓皇帝之次子也𤣥宗幸蜀加漢中郡太守棣王琰𤣥宗第四子也開元十五年遥領太原牧太原以北諸軍節度大使天寳元年六月遥領兼武威郡都督河西隴右經略節度大使鄂王瑶𤣥宗第五子也開元十二年遥領幽州都督河北道節度大使光王琚𤣥宗第八子也開元十二年遥領廣州都督五府經略大使儀王璲𤣥宗第十二子也開元十五年授河南牧潁王璬𤣥宗第十三子也開元十五年遥領安東都䕶平盧軍節度大使安禄山叛除蜀郡都督劒南節度大使永王璘𤣥宗第六子也開元十五年遥領荆州大都督天寳十五載六月𤣥宗幸蜀至漢中郡下詔以璘為山南東路及嶺南黔中江南西路四道節度採訪等使江陵大都督夀王瑁𤣥宗第十八子也開元十五年遥領益州大都督劒南節度大使延王玢𤣥宗第二十子也開元十五年遥領安西大都䕶磧西節度大使盛王琦𤣥宗第二十一子也開元十五年遥領揚州大都督及𤣥宗幸蜀在路除琦為廣陵大都督仍領江南東路及淮南河南等路節度度支採訪等都使豐王珙𤣥宗第二十六子也𤣥宗幸蜀至扶風郡授珙武威郡都督仍領河西隴右安西北庭等路節度採訪都使珙竟不行彭王僅肅宗第五子也至徳三年除僅充河東節度大使兖王僴肅宗第六子也乾元三年領河北節度大使涇王侹肅宗第七子也乾元三年領隴右節度大使睦王述代宗第三子大歴十年二月詔充嶺南節度使營田五府經畧觀察處置等大使丹王逾代宗第五子大歴十年二月詔領渭北鄜坊節度大使韓王廻代宗第七子大歴十二年二月除汴宋等節度觀察處置等大使鄜王造代宗第十三子大歴十二年二月除昭義軍節度觀察處置等大使舒王誼代宗第三子照靖太子邈之子也建中元年領四鎮北庭行軍涇原節度大使三年詔為揚州大都督持節荆襄江西沔鄂等道節度兼諸軍行營兵馬元帥通王諶徳宗第三子貞元九年十月領宣武軍節度大使汴宋等州觀察度支營田等使王不出閣十一年為河東節度大使亦不出閣䖍王諒徳宗第四子貞元二年領蔡州節度大使申光蔡觀察等使十年領朔方靈鹽節度大使靈州大都督十一年十月以諒領橫海節度大使滄景觀察等使王不出閣十六年以諒領徐州節度大使徐泗濠觀察處置等使建王恪本名審憲宗第七子也元和元年八月授開府儀同三司鄆州大都督充平盧軍淄青等州節度營田觀察處置陸運海軍押新羅渤海兩蕃等使梁郴王友裕太祖長子也唐昭宗景福中太祖令權知許州乾寜二年加檢校司空尋為武寜軍節度留後四年太祖下東平改天平留後加檢校司徒光啓元年再領許州天復初為奉國軍節度留後太祖兼鎮河中以友裕為䕶國軍節度留後尋遷華州節度使加檢校太保興徳尹廣王全昱太祖長兄也庶人簒位授宋州節度使惠王友能全昱第二子也末帝時鎮陳州鄧王友誨全昱第三子也末帝時鎮陜州後唐睦王存乂莊宗異母弟也同光中歴鄜州節度使魏王繼岌莊宗子也莊宗即位於魏州以繼岌充北都留守及以鎮州為北都又命為留守秦王從榮明宗第二子也明宗踐阼天成初授鄴都留守天雄軍節度使三年移北京留守充河東節度使四年入為河南尹末帝長子重吉閔帝嗣位出為亳州團練使晋髙祖㓜子重睿開運二年領秦州三年春移領許州廣王敬威之弟贇髙祖從父弟也帝即位遥領忠州刺史天福中歴曹州防禦使河陽節度使開運二年九月出鎮鄧州韓王暉髙祖從弟也天福二年遥授濠州刺史遷曹州防禦使漢髙祖建號晋陽以弟崇為特進檢校太尉行太原尹漢祖將南幸以崇為北京留守㝷加同平章事蔡王信髙祖之從弟也國初為侍衛馬軍都指揮使兼義成軍節度使㝷移鎮許州册府元龜卷二百八十一
