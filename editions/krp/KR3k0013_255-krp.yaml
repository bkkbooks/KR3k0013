body:
  text: 册府元龜巻二百五十五宋王欽若撰列國君部失賢拒諫害賢失賢古語曰千里一賢猶云比肩言希有也又曰黄金累千不如一賢謂難得也必能遇而禮之得而任之則治無不勝道無不臧觀其簡兮之詩適彼之句邦君失道賢人退藏欲霸盛不其難哉衛頃公時仁人不遇小人在側不遇者君不受己之志也君近小人則賢者見侵害矣詩人賦栢舟言其不遇也又簡兮刺不用賢也衛之賢者仕於伶官皆可以仕於王者也伶官樂官也伶氏世掌樂官而善焉故後世多號樂官為伶官又北門刺仕不得志也言衞之忠臣不得其志爾不得其志者君不知己志而遇困苦也鄭荘公不能繼先公之業使賢者退而窮處窮猶終也詩人賦考槃刺莊公也又羔裘刺朝也言古之君子以風其朝焉鄭自莊公而賢者陵之朝無忠正之臣故刺之又遵大路詩思君子也莊公失道君子去之國人思望焉昭公不能與賢人圗事權臣擅命祭仲專權詩人賦狡童刺忽也忽昭公也又揚之水君子閔忽之無忠臣良士終以死亡而作是詩也曹共公逺君子而好近小人詩人賦侯人以刺之虞公史不書名及諡時晉侯復假道於虞以伐虢大夫宫之竒諫曰虢虞之表也虢亡虞必從之虞公不聴宫之竒以其族行曰虞不臘矣又云虞不用百里奚而亡而亡一本云而去虞公之不可諫奚知之秦康公亡穆公之業始棄其賢臣詩人賦晨風以刺之又權輿刺康公忘先君之舊臣與賢者有始而無終也是時晉大夫士會奔秦晉人患秦之用士㑹也六卿相見於諸浮諸浮晉地趙宣子曰隨㑹在秦賈季在狄難日至矣若之何賈季亦晉大夫奔狄中行桓子曰請復賈季中行桓子荀林父也能外事且繇舊勲有狐偃之舊郤成子曰賈季亂且罪大殺陽處父故不如隨㑹能賤而有恥柔而不犯不可犯以不義其知足使也且無罪乃使魏壽餘偽以魏叛者以誘士㑹執其孥於晉使夜逸魏壽餘畢萬之後孥壽餘子也請自歸於秦秦伯許之許受其邑履士會之足於朝躡士㑹足欲使行秦伯師於河西將取魏魏人在東今河北縣於秦為在河之東壽餘曰請東人之能與夫二三有司言者吾與之先欲與晉人在秦者共先告喻魏有司使士㑹士㑹辭曰晉人虎狼也若背其言臣死妻子為戮無益於君不可悔也辭行示已無去心秦伯曰若背其言所不歸爾孥者有如河言必歸其妻子明白如河乃行繞朝贈之以策策馬撾臨别授之馬撾並示已所策以展情繞朝秦大夫曰子無謂秦無人吾謀適不用也示已覺其情既濟魏人譟而還喜得士㑹齊景公時孔子適齊景公止孔子曰奉子以季氏吾不能以季孟之間待之魯三卿季氏為上卿最貴孟氏為下卿不用事言待之以二者之間也齊大夫欲害孔子孔子聞之景公曰吾老矣不能用也孔子遂行以聖道難成故云吾不能用衛靈公時孔子適衛靈公問孔子居魯得禄㡬何對曰奉粟六萬衛人亦致粟六萬居頃之或譛孔子於靈公靈公使公孫余假一出一入孔子恐獲罪焉居十月去衛其後自陳還衛靈公老怠於政不用孔子孔子喟然嘆曰茍有用我者期月已可三年有成言誠有用我於政事者朞月而可以行其政敎必三年乃有成功孔子既行不得用於衛將西見趙簡子至於河聞竇鳴犢舜華之死也乃還反乎衛靈公與孔子語見蜚鴈仰視之色不在孔子孔子遂行魯哀公時孔子之去魯凡十四嵗而反乎魯哀公問政對曰政在選臣然魯終不能用孔子孔子亦不求仕魏惠王時相公叔痤病惠王親往問病曰公叔病有如不可諱將奈社稷何公叔痤曰痤之中庶子公孫鞅年雖少有竒才願王舉國而聴之王黙然王且去痤屏人言王即不聴用鞅必殺之無令出境王許諾而去公叔痤召鞅謝曰今者王問可以為相者我言若王色不許我我方先君後臣因謂王即弗用鞅當殺之王許我汝可疾去矣且見禽鞅曰彼王不能用君之言任臣又安能用君之言殺臣乎卒不去惠王既去而謂左右曰公叔病甚悲乎欲令寡人以國聴公孫鞅也豈不悖哉公孫鞅乃西入秦齊宣王時鄒人孟軻受業子思之門人道既通㳺事齊王王不能用適梁襄王時荀卿最為老師齊尚修列大夫之缺而荀卿三為祭酒齊人或讒荀卿乃適楚楚懷王時屈原為左徒博聞强志明於治亂懷王聴上官大夫之讒疏之及頃襄王立以其弟子蘭為令尹楚人既咎子蘭以勸懷王入秦而不反也屈原既嫉之雖放流睠顧楚國繫心懷王不忘欲反兾幸君之一悟俗之一改也其存君與國而欲反覆之一篇之中三致志焉然終無可奈何故不可以反卒以此見懷王之終不悟也拒諫夫四海之富重畜也故天子建德以藩屏丕緒千乘之國厚位也故諸侯立家以保佑王爵所以彌縫其闕而圖惟厥終者也故曰諸侯有諍臣五人雖無道不失其國矣噫禮義下衰風流殊缺或臣能承命摩勵之志屢申而君匪從流忠力之臣罕諒傳曰法語之言能無從乎改之為貴從而不改亂之階也其自用甚者則唯戮是聞故有盡思進忠之臣萌禍心以為報謀以衛國之士賞刑典而勿捨在愎諫之斯甚咸貪亂以自䘮民之無援禍不旋踵斯可哀也哉衛莊公時公子州吁有寵而好兵公弗禁莊姜惡之石碏諫之弗聴魯隠公三年臣欽若等曰自此已後諫辭並具陪臣規諷門魯隠公將如棠觀魚者五年臧僖伯諫之公曰吾將略地焉偽辭以略地畧摠攝巡幸之名傳曰東畧之不知西則否矣遂往陳魚而觀之陳設張也公大設捕魚之備而觀之僖伯稱疾不從書曰矢魚于棠非禮也陳桓公時鄭伯請成于陳成猶平也魯隠公六年陳侯不許五父諫曰親仁善鄰國之寳也君其許鄭五父陳公子佗陳侯曰宋衛實難可畏難也鄭何能為遂不許魯桓公取郜大鼎于宋一年納于太廟非禮也臧哀伯諫之大夫僖伯之子公不聴莊公如齊觀社二十三年曹劌諫之公不聴遂如齊是年丹桓公之楹而刻其桷匠師慶言於公曰臣聞聖王公之先封者遺後人之法今先君儉而君侈之令德替矣公曰吾屬欲美之對曰無益於君而替前之令德臣故曰庶可以已乎公弗聴又哀姜至公使大夫宗婦覿用幣御孫曰男女同䞇是無别也男女之别國之大節也而繇夫人亂之無乃不可乎弗聴宋昭公將去羣公子魯文公時樂豫曰不可公族公室枝葉也若去之則本根無所庇廕矣葛藟猶能庇其本根葛之能藟蔓繁滋者以其本支廕之也故君子以為比謂詩人取以喻九族兄弟況國君乎此諺所謂庇焉而縱尋斧焉者也縱放也必不可君其圖之親之以德皆股肱也誰敢攜貳若之何去之不聴齊景公時晉大夫欒盈自楚適齊晏平仲言於齊侯曰商任之㑹受命於晉受錮欒氏之命今納欒氏將安用之小所以事大信也失信不立君其圖之弗聴退告陳文子曰君人執信臣人執共忠信篤敬上下同之天之道也君自棄也弗能乆矣魯昭公自齊如晉將如乾侯齊侯卑公故適晉子家子曰有求於人而即其安人孰矜之其造於境欲使次於境以待命弗聴使請逆於晉晉人曰天禍魯國君淹恤在外君亦不使一介辱在寡人一介單使而即安於甥舅其亦使逆君言自使齊逆君使公復于竟後逆之逆侯也言公不能用子家所以見辱獻公使太子申生伐東山臯落氏赤狄别種也臯落其氏族里克諫曰君之嗣適不可以帥師君失其官帥師不威將焉用之太子統師是失其官也専命則不孝是為帥必不威且臣聞臯落氏將戰君其舎之公曰寡人有子未知其誰立焉不對而退惠公時秦饑使乞糴于晉魯僖公十四年晉人弗與慶鄭曰背施無親幸災不仁貪愛不祥怒鄰不義四德皆失何以守國弗聽退曰君其悔是哉明年秦伐晉惠公乘小駟鄭入也鄭所獻馬名小駟慶鄭曰古者大事必乘其産生其水土而知其人心安其教訓而服習其道惟所納之無不如志今乘異産以從戎事及懼而變將與人易變易人心亂氣狡憤隂血周作張􅍺憤興外彊中乾狡戾也憤動也氣狡憤於外則血􅍺必周身而作隨氣張動外雖有彊形而内實乾竭進退不可周旋不能君必悔之弗聴及戰于韓原戎馬還濘而止濘泥也還便旋也小駟不調故墮泥中秦獲晉侯以歸鄭文公時晉公子重耳過鄭文公不禮焉叔瞻諫之弗聴叔瞻曰若不禮焉則請殺之諺曰黍稷無成不能為榮黍不為黍不能蕃廡稷不為稷不能蕃殖所生不疑唯德之基弗聴曹共公時晉公子重耳自衞過曹共公不禮焉聞其駢脅欲觀其狀止其舎謀其浴設帷薄而觀之僖負羈言於曹伯曰晉公子生十七年而亡卿才三人從之可謂賢矣而君蔑之不用賢也謂晉公之亡不可不憐也比之賔客不可不禮也失此二者是不禮賔不憐窮也玉帛酒食猶糞土也愛糞土以毁三常政之幹禮之宗歸之常無乃不可乎君其圖之公弗聴宋襄公時楚人伐宋以救鄭宋公將戰大司馬固諫曰天之棄商乆矣君將興之弗可赦也已大司馬固莊公之孫公孫固也言君興天所棄必不可不如赦楚勿與戰弗聴魯僖公時邾人以須句故出師僖公卑邾不設備而禦之卑小也臧文仲曰國無小不可易也無備雖衆不可恃也弗聴公及邾師戰于升陘我師敗績晉靈公時趙宣子為政魯文公時驟諫而不入宣子趙盾靈公壯侈厚斂彫牆彫畫也從臺人彈人觀其避丸也宰夫胹熊蹯不熟蹯熊掌其肉難熟靈公怒殺宰夫使婦人持其屍出棄之過朝趙盾隨㑹前數諫靈公患之使鉏麑刺趙盾楚靈王虐靈王魯昭公時白公子張驟諫子張楚大夫白公王患謂史老曰吾欲已子張之諫若何史老子亹也對曰用之實難已之易矣若諫君則曰余左執鬼中右執殤宫中身也禮曰其中退然夭死曰殤宫殤之居也執謂記其録籍制服其身如其居處若今世云能使殤賢凡百箴諫也吾盡聞之矣寧聞佗言不欲聞諫白公又諫王如史老之言對曰臣懼民之不信君也故不敢不言不然何急其以言取罪也王病之曰子復語病不能然故復使語不穀雖不能用吾憗寘之於耳憗猶願寘置也對曰賴君之用之也故言賴恃不然巴浦之犀犛兕象其可盡乎其又以䂓為瑱也犛犛牛䂓見也瑱所以塞耳言四獸之牙角可以為難盡而又以規諫為之乎今象出徼外其三獸則荆交有也浦地名或曰巴浦巴郡合浦遂趨而退歸杜門不出七月乃有乾谿之亂靈王死之呉王夫差伐越越王勾踐敗於㑹稽請委國為臣妾呉王將許之伍子胥諫曰勾踐為人能辛苦今不滅後必悔之呉王不聴又聞齊景公死而大臣爭寵嗣君弱乃興師北伐齊子胥諫曰越王勾踐食不重味衣不重彩弔死問疾且欲有所用其衆此人不死必為呉患今越王腹心疾而王不先而務齊不亦謬乎呉王不聴其後越王勾踐率其衆以朝呉厚獻遺之呉王喜唯子胥懼曰是棄呉也諫曰越在腹心今得志於齊猶石田無所用石田不可耕且盤庚之誥有顛越勿遺顛隕也越墜也隕越無道則割絶無遺也商之以興一本作盤庚之誥有顛之越之商以之興子胥傳語曰有隕越商之興也呉王不聴果為越所滅楚懷王聴張儀計欲許秦易黔中之地屈原曰前大王見欺於張儀張儀至臣以為大王烹之今縱弗忍殺之又聴其邪説不可懷王曰許儀而得黔中美利也後而背之不可故卒許張儀與秦親後懷王怒張儀之詐興師將伐秦陳軫又曰伐秦非也不如因賂之一名都與之伐齊是我亡於秦取償於齊也吾國尚可全今王既絶於齊而責欺於秦是吾合秦齊之交而來天下之兵也國必大傷矣楚王不聴遂絶和於秦發兵而西攻秦秦亦發兵擊之與秦戰丹陽秦大敗我軍斬甲士八萬虜我大將軍屈匄禆將軍逢侯丑等七十人遂取漢中之郡齊王建時秦攻趙齊楚救之秦計曰齊楚救趙親則退兵不親遂攻之趙無食請粟於齊齊不聴周子曰不如聴之以退秦兵不聴則秦兵不却是秦之計中而齊楚之計過也且趙之於齊楚扞蔽也猶齒之有唇也唇亡則齒寒今日亡趙明日患於齊楚且救趙之務宜若奉漏甕沃焦釡也夫救趙髙義也却秦兵顯名也義救亡國威却彊秦之兵不務為此而務愛粟為國計者過矣齊弗聴燕王喜時秦破趙於長平四十餘萬遂圍邯鄲燕王命相栗腹約歡趙以五百金為趙王酒還報燕王曰趙王壯者皆死長平其孤未壯可伐也王召昌國君樂間問之對曰不可趙四戰之國其民習兵不可伐曰吾以五而伐一對曰不可燕王怒羣臣皆以為可卒起二軍車二千乘栗腹將而攻鄗徐廣曰在常山今曰高邑卿秦攻代唯獨大夫將渠謂燕王曰與人通關約交以五百金飲人之王使者服而反攻之不祥兵無成功燕王不聴自將偏軍隨之將渠引燕王綬止之曰王必無自徃徃無成功王蹴以足將渠泣曰臣非以自為為王也燕軍至宋子徐廣曰屬鉅鹿趙使廉頗將擊破栗腹於鄗破卿秦樂乘於代樂間奔趙廉頗逐之五百餘里圍其國害賢夫賢者國之紀人之望興亡治亂之所繫焉在昔周道陵遲諸侯彊盛家部之伍惟儁是澤斯所以建定霸之業成夾輔之勲者也乃有昩則哲之鑒孤遺託之命或忿其忠讜之諫或乖於委任之道而皆非辜受禍没地無告以至悲傷其士庶殞絶其宗社千古之下覽之者固可掩卷而嘆息矣晉懷公立魯僖公二十三年畏秦之伐也乃令國中諸從重耳亡者與期期盡不到者盡滅其家狐突之子毛及偃從重耳在秦弗肯召懷王怒囚狐突曰子來則免曰臣之子事重耳有年數矣今召之是教之反君也何以敎之懷王卒殺狐突秦穆公卒魯文公六年以子車氏之三子奄息仲行鍼虎為殉子車秦大夫氏也以人從葬為殉皆秦之良也國人哀之為之賦黄鳥黄鳥詩秦風義取黄鳥止于棘桑徃來得其所傷三良不然君子曰秦穆之不為盟主也宜哉死而棄民先王遺世猶詒之法而況奪之善人乎詩曰人之云亡邦國殄瘁詩大雅言善人亡則國瘁病無善人之謂也若之何奪之秦穆公卒葬雍秦穆公冡在槖泉宫祈年觀下晉靈公不君失君道也趙宣子驟諫公患之魯宣公二年使鉏麑賊之鉏麑晉力士晨徃寢門闢矣盛服將朝尚早坐而假寐不解衣冠而睡鉏麑觸槐而死槐趙盾庭樹鉏麑具摠錄部義烈門是年秋晉侯飲趙盾酒伏甲將攻之其右提彌明知之右軍右趨登曰臣侍君宴過三爵非禮也遂扶以下公嗾夫獒焉明摶而殺之獒猛犬也陳靈公與孔寧儀行父通於夏姬魯宣公九年皆衷其衵服以戲于朝二子陳卿夏姬鄭穆公女大夫御叔妻衷懷也衵服近身衣洩冶諫曰公卿宣淫民無效焉宣示也且聞不令君其納之納藏衵服也公曰吾能改矣公告二子二子謀殺之公弗禁遂殺洩冶一云洩冶閫之入諫曰使國人聞之則猶可使仁人聞之則不可君媿於洩冶不能用其言而殺之晉厲公五年魯成公十五年三郤讒伯宗殺之三郤郤錡郤犨郤至伯宗以好直諫得此禍國人以是不附厲公呉王夫差將伐齊子胥諫曰未可臣聞勾踐食不重味與百姓同苦樂此人不死必為國患呉有越腹心之疾齊與呉疥㿅也願王釋齊先越呉王弗聴遂伐齊敗之艾陵虜齊高國以歸讓子胥子胥曰王毋喜王怒子胥欲自殺王聞而止之越大夫種曰臣觀呉王政驕矣請試嘗之貸粟以卜其事請貸吳王欲與子胥諫勿與王遂與之越乃私喜子胥言曰王不聴諫後三年呉其墟乎太宰嚭聞之乃數與子胥爭越議因讒子胥曰伍貟貎忠而實忍人其父兄不顧安能顧王王前欲伐齊貟彊諫已而有功用是反怨王王不備伍貟貟必為亂與逢同共謀讒之王王始不從乃使子胥於齊聞其託子於鮑氏王乃大怒曰伍貟果欺寡人欲反使人賜子胥屬鏤劔以自殺子胥大笑曰我令而父霸我又立若若初欲分呉國半予我我不受已今若反以讒誅我嗟乎嗟乎一人固不能獨立報使者曰必取吾眼置呉東門以觀越兵入也呉太宰既與子胥有隙因讒于夫差曰子胥為人剛暴少恩猜賊怨望恐為深禍也前日王欲伐齊子胥以為不可王卒伐之而有大功子胥恥其計謀不用乃反怨望而今王又復伐齊子胥專愎彊諫沮毁用事徒幸呉之敗以自勝其計謀耳謝今王自行悉國中武力以伐齊而子胥諫不用因輟佯病不行王不可不備此起禍不難且嚭使人微伺之其使於齊也乃屬其子於齊之鮑氏夫為人臣内不得意外倚諸侯自以為先王之謀臣今不見用嘗鞅鞅有怨望願王早圖之呉王曰微子之言吾亦疑之乃使賜伍子胥屬鏤劔曰子以此死子胥仰天嘆曰嗟乎讒臣嚭為亂矣王乃反誅我我令若父霸若未立時諸公子爭立我以死爭之於先王幾不得立若既得立欲分呉國與我我顧不敢望也然今若聴諛臣言以殺長者乃告其舎人必樹吾墓上以梓令可以為器而必抉吾眼懸呉東門之上以觀越冦之入滅呉也乃自剄越王勾踐既平呉范蠡遂去自齊遺大夫種書曰􅀢鳥盡良弓藏狡兔死走狗烹狡兔作郊越王為人長頸烏喙可與共患難不可共安樂子何不去種見書稱病不朝人或讒種且作亂越王乃賜種劔曰子敎寡人伐呉七術寡人用其三而敗呉其四在子子為我從先王試之種自殺秦昭王發兵使五大夫王陵攻趙邯鄲是時武安君病不任行陵攻邯鄲少利秦益發兵佐陵陵兵亡五較武安君病愈秦王欲使武安君代陵將武安君言曰邯鄲實未易攻也且諸侯救日至彼諸侯怨秦之日乆矣今秦雖破長平軍而秦卒死者過半國内空逺絶河山而爭人國都趙應其内諸侯攻其外破秦軍必矣不可秦王自命不行乃使應侯請之武安君終辭不肯行遂稱病秦王使王齕代陵將九月圍邯鄲不能拔楚使春申君及魏公子將兵數十萬攻秦軍秦軍多失亡武安君言曰秦不聴臣計今如何矣秦王聞之怒彊起武安君武安君遂稱病篤應侯請之不起於是免武安君為士伍遷之陰密屬安定府武安君病未能行居三月諸侯攻秦軍急秦軍數却使者日至秦王乃使人遣武安君不得留咸陽中武安君既行出咸陽西門十里至杜郵秦昭王與應侯羣臣議曰白起之遷其意尚怏怏不服有餘言秦王乃使使者賜之劔遂自殺齊閔王時負郭之民有狐咺者正議王殺之檀衢百姓不附齊宗室子陳舉直言殺之東閭宗族離心司馬穰苴為政者也殺之大臣不親趙王遷七年秦使王翦攻趙趙使李牧司馬尚禦之秦多與趙王寵臣郭開金為反間言李牧司馬尚欲反趙王乃使趙葱及齊將顔聚代李牧李牧不受命趙使人微捕得李牧斬之廢司馬尚後三月王翦因急擊趙大破殺趙葱虜趙王遷及其將顔聚遂滅趙册府元龜卷二百五十五
