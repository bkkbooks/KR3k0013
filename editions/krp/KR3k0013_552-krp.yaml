body:
  text: 册府元龜卷五百五十二宋王欽若等撰詞臣部獻替夫獻可替否弼違箴闕竭慮以盡規犯顔而無隱者真邇臣之任也若乃典司命令發揮帝載列位扃闥備問清宴而能藴直方之節勵忠藎之誠罄其智慮思有云補或削牘為奏極扵敷陳或乗間以言冀其感悟嘉話溢扵前籍英風聳乎來裔自非秉彞有守持正無撓以謇諤為己任靡循嘿而取容不茍貪扵寵靈期有利扵社稷者又孰能批逆鱗之威進苦口之說哉唐裴漼為中書舎人睿宗太極初炎旱寺觀興役漼上疏曰臣謹按禮經春令曰無聚大衆無起大役不可以興土工恐妨農事若號令乖度役使不時則人加疾疫之危國有水旱之變此五行之應也今自春將夏時雨愆期下人憂心莫知所出陛下雖降哀矜之旨兩都仍有寺觀之作時旱之應實此之繇近日已來雨雖不多僅得下種若不勸以農桑恐棄本者多故書云雖有鎡基不如逢時言在乎時不可失也今春告期東作方始正是丁壯就工之日而土木方興臣恐所妨尤多所益尤少耕夫桑妾飢寒之源故春秋莊公三十一年冬不雨五行傳以為是嵗三築臺僖公二十一年夏大旱五行傳以為不時作南門勞人興役陛下每以萬方為念睿旨殷勤安國濟人防深慮逺伏願下眀制發徳音順天時副人望兩京公私營造及諸處和市木等並請且停則蒼生幸甚若農桑失時户口流㪚縦寺觀營搆豈假黎元飢寒之弊哉帝覽而善之蘓源眀為考功郎中知制誥時肅宗乾元二年十月詔以十七日幸東京又以殿中監李輔國為行營兵馬使以御史大夫賀蘭進眀為中京留守時公卿皆獻書進帝以制命已行不納源眀及給舍等上言諫曰臣等今月四日及七日上言車駕幸東京不便籲天而訴稽首而祈竭誠不精留中不下臣等自咎自毒若惽若狂以為雨淫孟冬霖積季秋道路且泥甚不可一也從春大旱方始秋苖田農之間十已耗半方且歛穫猶未收入先之以清道之役申之以祇頓之苦水欲澄而撓之人欲静而棼之甚不可二也臣等每立廊下竊見旌旗之下盡是餓夫執殳仆于行門者日見一二市井之中半是餒人或求食死扵路傍者日見四五甚不可三也姦人連牆盜兒接棟磨礪以須陛下出爾前麾凌于灞上兇人肆于城中御史大夫必不能愊而禦之甚不可四也臣等伏料之殷鑒不逺近在天寳十五載季夏爾聖皇廵蜀後大都内府財貨朝臣富民資産盡在道路之手有乗馬駃驢入宣政紫宸殿者擾亂如此一至扵是况陛下復二都有四海日淺錢穀滿蓄不及曩時者必為利而行此賊臣作計誘掖給陛下而已詩曰三星在罶音栁臣不勝嗚咽為陛下痛之宜速下詔書罷東幸不然窮𨽻樂禍已扼腕爾甚不可五也方今犯王畿者河洛繹騷侮侯服者江湖叛渙詩曰中原有菽庶人采之彼思眀康楚元者采菽之庶人也陛下何遽輕萬乗而媒孽速成之邪甚不可六也自河南北盡為盜境淮東江西又見修阻王公已下未給廩禄將士已來且支日月陛下中官冗食不減徃年梨園雜伎有盛今日陛下未得穆然髙枕用此奚為中官指使太常正樂外一切放歸仍給長牒勿事待郎五六年後随事進退今聚而仰給甚不可七也司空李光弼能拔河陽尚書王思禮應下晋原中丞衛伯玉勁卒接焉耆過析支不日且至大夫王𤣥志壓巫閭臨幽都汝州刺史田南金乗闕口遏二室揚州長史鄧景山凌長淮餼梁汴然而狂賊失身蹙于緱氏山北不敢逾孟津東不敢過􅑥子只待反接耳陛下不坐而受之而欲親征狥一朝之怒甚不可八也王者扵天地神祇第付之有司享之牲幣則已夫何求哉記曰不祈土地今方士蠢愚巫祝淫瀆妄有閑說甚不可九也天子順動人皆幸之之謂幸人皆病之之謂不幸不幸之謂虐臣等見陛下否而弗聽聨伏赤墀之下頓顙流涕而出陛下或容而免之或毁而罪之凡百之臣如昌言扵朝有萬之口必錯謗扵外甚不可十也臣聞子不諫扵父且焉得為孝乎臣不諍扵君又焉得為忠乎不孝不忠而茍榮冒禄圏牢之物不若也臣等至賤不能委身圏牢之中使樵夫共指而笑之不勝大願願陛下留神𤣥㣲養和淡泊天下幸甚帝省表遂不東幸常衮代宗永泰中為中書舍人時内侍魚朝恩恃權寵兼領國子監事衮上疏以為不可時朝廷多事西邊北邊連為寇盜侵逼衮累工表章陳其利害代宗甚顧遇之令狐峘為中書舍人徳宗初即位將厚奉元陵峘上疏諫曰臣聞傳曰近臣盡規禮記曰事君有犯而無隱臣幸遇昌運謬參近列敢竭狂愚庶裨分寸伏惟陛下詳察焉臣嘗讀漢書見劉向抗疏論王者山陵之式良史稱歎萬古芬芳何者聖賢之心勤儉是務必求諸道不作無益故舜葬蒼梧不變其肆禹𦵏㑹稽不改其列周武葬扵畢陌無邱隴之處漢文葬扵霸陵因山谷之制禹非不忠也啟非不順也周公非不友也景帝非不孝也其葬君親皆守㣲薄至宋文公始厚葬用蜃炭益車馬其臣華元樂舉春秋書為不臣秦始皇葬扵驪山魚膏為燈燭水銀為江海珍寳之蔵不可勝計千載非之故桓魋為石椁夫子曰不如速朽子㳺問䘮具夫子曰稱家有無張釋之對孝文曰使其中無可欲雖無石椁又何戚焉是以漢修霸陵皆以瓦器不以金銀為飾繇是觀之有徳者𦵏逾薄無徳者𦵏逾厚昭然可覩矣陛下自臨御天下聖政日新進忠去邪減膳節用不珍雲物之瑞不近鷹犬之娛有司給物悉依元估利扵人也四方底貢唯供祀事薄扵己也故澤州奏慶雲詔曰以時和為嘉祥邕州奏金坑詔曰以不貪為寳恭惟聖慮無非至理而獨六月一日制度節文云應縁山陵制度務取優厚當竭帑蔵以供費用者此縁仁孝之徳切扵聖衷伏以尊親之義貴扵合禮陛下每下眀詔發徳音皆比蹤唐虞超邁周漢豈取恱凡常之目有違賢哲之心與失徳之君競其奢侈者也臣又伏讀遺詔曰其䘮儀制度務従儉約不得以金銀為縁飾陛下恭順先帝動無違者若制度優厚豈顧命之意邪伏惟陛下逺鑒虞夏周漢之儀深惟夫子釋之之戒䖍奉先㫖俯遵禮經為萬代法天下幸甚今赦書雖頒行諸條猶未出因之奉遺制敷聖理固其時也伏望速詔有司悉従古禮臣聞愚夫之言聖主擇焉况臣忝職史官親述睿徳恥同華元樂舉之為臣也願以禹舜之理紀聖猷也夙夜懇廹不敢不言祗犯聰眀實憂罪譴言行身黜雖死猶生詔答曰朕頃議山陵心方迷謬忘遵先㫖遂有優厚之文卿聞見該通識達𢎞逺深知不可切以為言引古援今依經據理非唯中朕之病兼亦成朕之身今所以令朕免不子之名不遺君親扵患者皆卿之力也敢不聞義而從收之桑榆奉以始終期無失墜嗟乎古之遺直何以加卿姜公輔建中初為京兆府戸曹叅軍翰林學士特承恩顧才髙有器識每對見言事徳宗多従之四年涇原兵反帝將出自苑便門公輔俯諫曰朱泚嘗總涇原兵以朱滔故坐奪其兵權常憂憤不得志不如使人捕之陪鑾駕忽羣兇立以為帥恐必為後害臣昔嘗陳奏云陛下不能寛懐待之當殺之養猛獸自為患悔且無及帝卒愕不遑聽且曰己無及矣陸䞇建中初為祠部員外郎充翰林學士性忠藎既居近宻感人主重知思有以效報政或有缺巨細必陳四年涇原兵叛従幸奉天其年冬議欲以新嵗改元而卜祝之流皆以國家數鍾百六凡事宜有變革以應時數徳宗謂䞇曰徃年羣臣請上尊號聖神文武四字今緣寇難諸事並宜改更衆欲扵朕舊號之中更加兩字其事如何贄奏曰尊號之興本非古制行扵安泰之日已累謙冲襲乎喪亂之時尤傷事體今者鑾輿播越未復宫闈宗祏震驚尚愆禋祀中區多梗大憝猶存此乃人情向背之秋天意去就之際陛下宜深自懲勵收攬羣心痛自貶損以識靈譴不可近従末議重益美名帝曰卿所奏陳雖理體甚切然時運必須小有改變亦不可執滯卿更思量贄曰古之人君稱謂或稱皇或稱帝或稱王但一字而已至暴秦乃兼皇帝二字後代因之及昏僻之君乃有聖劉天元之號是知人主輕重不在自稱崇其號無補扵徽猷損其名不傷扵徳美然而損之有謙光稽古之善崇之獲矜能納謟之譏得失不侔居然可辨况今時運屯否事屬艱危尤宜恐懼思以自貶抑必也俯稽術數須有變更與其增美稱而失人心不若黜舊號以祇天戒天時人事理必相符人既好謙天亦助順陛下誠能斷自宸鑒煥發徳音引咎降名深示刻責惟謙與順一舉而二美従之帝納焉但改興元年號而已初徳宗倉皇出幸府蔵委棄凝冽之際士衆多寒服御之外無尺縑文帛及賊泚解圍諸藩貢奉繼至乃扵奉天行在貯貢物扵廊下仍題曰瓊林大盈二庫名贄諫曰瓊林大盈自古悉無其制傳諸耆舊之說皆云創自開元貴臣貪權飾巧求媚乃言郡邑貢賦所用盍區分賦稅當委扵有司以給經費貢獻宜歸扵天子以奉私求𤣥宗恱之新是二庫蕩心侈欲萌禍扵兹迨乎失邦終以餌寇記曰貨悖而出豈其效歟陛下嗣位之初務遵理道敦行儉約斥逺貪饕雖内庫舊蔵未歸太府而諸方典獻不入禁闈清風肅然海内丕變近以寇逆亂常鑾輿外幸既屬憂危之運宜增儆勵之誠臣昨奉使軍營出逰行殿忽覩右廊下牓列二庫之名戄然若驚不識所以何者天衢尚梗師旅方殷瘡痛呻吟之聲噢咻未息忠勤戰守之効賞賚未行諸道貢珍遽私别庫萬目所視孰能忍懐竊揣軍情或生觖望或急形謗讟或配肆謡言頗含思亂之情亦有悔忠之意是知甿俗昏鄙識昧髙卑不可以尊極臨而可以誠義感頃者六師初降百物無儲外捍兇徒内防危堞晝夜不息迨將五旬凍餒夾侵死傷相枕畢命同力竟夷大難良以陛下不厚其身不欲其欲絶甘以同卒伍輟食以㗖功勞無猛制而人不擕懐所感也無厚賞而人不怨悉所無也今者攻圍已解衣食已豐而謡讟方興軍情稍沮豈不以勇夫常性嗜貨矜功其患難既與之同憂而好樂不與之同利茍異恬黙能無怨咨此理之常固不足怪記曰財散則民聚豈其效歟陛下天資英聖見善必遷是將化蓄怨為銜恩反過差為至當促殄遺寇永垂鴻名大聖應機固當不俟終日帝嘉納之令去其題署累遷考功郎中諫議大夫依前充學士先是鳳翔衙將李楚琳乗涇師之亂殺節度使張鎰歸欵朱泚及奉天解圍楚琳遣使貢奉時方艱阻不獲已命為鳳翔節度使帝忿其弑逆心不能容既至漢中楚琳使來絶不召對贄諫曰楚琳之罪固不容誅但以乗輿未復大憝猶存勤王之師悉在畿内急宜速告晷刻是争商嶺則道迂且遥駱谷復為賊所扼僅通王命唯在褒斜此路若又阻艱南北便成隔絶以諸鎮危疑之勢居二逆誘脅之中恟恟羣情各懐向背賊勝則徃我勝則來其間事機不容差跌儻楚琳發憾公肆猖狂南塞要衝東延巨猾則我咽喉梗而心膂分矣其勢豈不病哉帝釋然開悟乃善待楚琳使優詔安慰其心時帝又欲以谷口已北従臣賜號曰奉天定難功臣谷口以南随扈者曰元従功臣不選朝官内官一例俱賜䞇奏曰破賊扞難武臣之效至如宫闈近侍班列員僚但馳走従行而已恐與介胄奮命之士俱號功臣伏恐武臣憤惋乃止李晟既收京城遣中使宣付翰林院具録先㪚失宫人名字令草詔賜渾瑊遣扵奉天尋訪以得為限仍量與資裝送赴行在䞇不時奉詔進狀論之曰頃以理道乖錯禍亂薦鍾陛下思咎懼災裕人罪已屢降大號誓將更新天下之人垂涕相賀懲憤釋怨煦仁戴眀畢力同心共平多難止土壊扵絶岸收版蕩扵横流殄寇清都不失舊物實繇陛下至誠動扵天地深悔感扵神人故得百靈降康兆庶歸徳不如此自古何嘗有捐棄宫闕失守宗祧繼逆扵赴難之師再遷扵蒙塵之日不踰半嵗而復興大業者乎今渠魁始平法駕將返近自郊甸逺周寰瀛百役疲瘵之甿重傷殘廢之卒皆忍死扶病傾耳聳肩想聞徳聲翹望聖澤陛下固當感上天悔禍之眷荷列祖垂裕之休念將士鋒刃之殃愍黎元塗炭之酷以致寇為戒以居上為危以務理為憂以復言為急損之又損尚懼汰侈之易滋艱之惟艱尤恐戒懼之難久謀始盡善克終已稀始而不謀終則何有夫以内人為號盖是中壼末流天子之尊富有宫掖如此等軰固繁有徒但恐傷多豈憂乏少翦除元惡曾未浹旬奔賀徃來道途如織何必自虧君徳首訪婦人又令資裝速赴行在萬目閱視衆口流傳恐非所以答慶頼之心副惟新之望也夫事有先後義有重輕重者宜先輕者宜後故武王尅殷有未及下車而為之者盖美其不失先後之宜也自翠華播越萬姓靡依清廟震驚三時乏祀當今所務莫大扵斯誠宜速遣大臣馳傳先徃迎復神主修整郊壇展禋享之儀申告謝之意然後弔恤死義慰犒有功綏輯黎蒸優問耆耋安定反側寛宥脅従宣暢鬱堙褒奬忠直宜先不可後也至如崇飾服器繕緝殿臺備耳目之娛選巾櫛之侍是皆宜後不可先也且㪚失内人已經累月既當離亂之際必為將士所私其人若稍有知不求當自陳獻其人若甚無識求之適使憂虞自因寇亂喪亡頗有大扵此者一聞捜索懐懼必多餘孽尚繁羣情未一因而善撫猶恐危疑若又懼之扵何不有昔人所以掩絶纓而飲盜馬者豈必忘其情愛盖知為君之體然也以小妨大眀者不為天下固多藝人何必獨在扵此所令撰賜渾瑊詔書未敢順旨帝遂不降詔但遣使而已自車駕播遷贄奏云方今詔書宜痛自引過罪已以感動人心昔湯武罪已致興後代推以為聖人楚昭王失國亡走一言善而復其國至今稱為賢君陛下誠能不恡改過以言謝天下臣雖愚陋為詔詞無所忌諱庶能令天下叛逆者廻心喻旨徳宗從之故行在制詔始下聞者雖武夫悍卒無不揮涕感激議者咸以為帝之尅復寇難旋復天邑不唯神武之功𤓰牙寘力盖亦文徳廣被腹心有助焉貞元初李抱真來朝因前賀曰陛下之幸奉天山南時赦書至山東士卒無不感泣思奮者臣時見之即知諸賊不足平也衛次公貞元末為左補闕充翰林學士順宗在諒闇外有王叔文軰操權樹黨無復經制次公與鄭絪同處内庭多所規正李吉甫憲宗元和初為翰林學士中書舍人時中書小吏滑渙與知樞宻劉光琦暱善頗竊朝權吉甫請去之及劉闢反憲宗誅討之計未决吉甫宻贊其謀兼請廣徵江淮之師繇三峽路入以分蜀寇之力事皆允従繇是甚見親信李綘元和初為主客員外郎充翰林學士以孜孜規諫為己任憲宗初即位叛臣李錡阻兵于浙右錡既誅朝廷將輦歸其家私財帛綘上言曰李錡兇狡叛戾僣侈誅求刻剝六州之人積成一道之苦聖恩本以叛亂致討蘓息一方今輦運錢帛播聞四海非所謂式遏亂畧恵綏困窮也伏望天慈並以賜本道百姓今年租賦則百姓欣戴四海歌詠也帝覽狀嘉之時中官吐突承瓘自藩邸承恩寵既為神策軍䕶軍中尉嘗欲扵安國佛寺建立聖徳碑大興工作且上聞令翰林為之文加之厚貺絳即上言曰陛下布惟新之政剗積習之弊四海延頸日望徳音今忽立聖徳碑以示天下不廣大易稱大人者與天地合徳日月合眀執契垂拱勵精求治豈可以文字而盡聖徳又安可以碑表而贊皇猷若可叙述是有分限乃反虧損盛徳豈謂敷揚至道哉故自堯舜禹湯文武並無建碑之事至秦始皇荒逸之君煩酷之政然後有之興嶧山之碑揚誅伐之功紀廵幸之跡適足為百姓所笑萬代所譏至今為失道亡國之主豈可擬議扵此陛下嗣髙祖太宗之業舉貞觀開元之政思理不遑食従諫如順流固可與堯舜禹湯文武方駕而行安得追秦皇暴虐不經之事而損聖政近者聞巨源請立紀聖徳碑嚴勵請立紀聖功碑陛下詳盡事宜皆不允許今忽令立此與前事頗乖此碑既在安國寺即不得不叙載逰觀崇飾之事述逰觀且乖理要叙崇飾又匪政經固非哲王所宜行也其碑伏乞聖恩特令寢罷帝覽狀即時不令建立先是軍中已建碑樓猶延候帝旨不令毁去帝知之令以牛數十拽倒綘又嘗因浴堂北廊奏對違忤帝旨指切時病及論中官縦恣方鎮進獻事宜帝怒甚厲聲曰卿所論事何太過耶綘前論不已曰臣所陳豈臣身之利是國家之利陛下不以臣愚使處腹心之地豈可見事虧聖徳致損清時而惜身不言仰屋竊歎是臣負陛下也若不顧患禍盡誠奏論旁忤倖臣上犯聖旨以此獲罪是陛下負臣也且臣與内官素不相識又無嫌隙秪是恐威福太盛上損聖朝臣所以不敢不論爾使臣緘默非社稷之福也帝見其誠切不廻怒色郤散稍慰諭曰卿盡節扵朕人所不言者卿悉言之使朕聞所不聞眞忠正誠節之臣也他日南靣亦須如今日綘拜恩而退遽宣宰臣命與改官授中書舍人依前翰林學士翌日面賜金紫帝親為綘擇良笏前後朝臣裴武栁公綽白居易等或為姦人所排䧟將加貶黜綘每以宻疏申論得獲寛宥及鎮州節度使王士真死朝廷將用兵討除綘深陳以為未可綘既盡心規益憲宗每有詢訪多叶事機崔羣元和中為中書舍人翰林學士常以讜言正論聞扵時憲宗嘉賞降宣旨云自今後學士進狀並取崔羣連署然後進來羣以禁宻之司動為故事自爾學士或惡直醜正則其下學士無繇上言羣堅不奉詔三疏論奏方允時吐突承瓘恩寵特異恵昭太子薨議立儲副承瓘獨排羣議屬意澧王欲以威權自樹賴憲宗眀斷不惑及將冊拜太子即穆宗也詔羣代澧王作讓表羣奏曰凡事已合當而不為則有退讓澧王非嫡不當立復何讓焉憲宗深納之又魏博節度使田季安進絹五千疋充助修開業寺羣以為事實無名體尤不可請止絶所進羣前後所論率多聽納白居易元和中為左拾遺充翰林學士時監察御史元稹謫為江陵府士曹掾翰林學士李絳崔羣扵憲宗前抗論稹無罪居易累疏切諫曰臣昨緣元稹左降頻已奏聞臣内察事情外聽衆議元稹左降有不可者三何者元稹守官正直人所共知自授御史已來舉奏不避權勢祇如奏李公佐等事多是朝廷親情人誰無私因以挾恨或假公議將報私嫌遂使誣謗之聲上聞天聽臣恐元稹左降已後凡在位者每欲舉職必先以元稹為誡無人肯為陛下當官守法無人肯為陛下嫉惡繩愆内外權貴親黨縦有大過大罪者必相容隱陛下従此無繇得知此其不可者一也昨元稹所追勘房式之事心雖狥公事稍過當既従重罰足以懲違况經謝恩旋又左降雖引前事以為責辭然外議喧喧皆以為元稹與中使劉士元争㕔因此獲罪至扵争廳事理已具前狀奏陳况聞士元蹋破驛門奪將鞍馬仍索弓箭嚇辱朝官承前已來未有此事今中官有罪未聞處置御史無過郤先貶官逺近聞知實損聖徳臣恐従今以後中官出使縦暴益甚朝官受辱必不敢言縦有被凌辱毆打者亦以元稹為戒但吞聲而已陛下從此無繇得聞此其不可者二也臣又訪聞元稹自去年已來舉奏嚴礪在東川日枉法沒入平人資産八十餘家又奏王絪違法給劵令監軍神樞及家口入驛又奏裴玢違勑徵百姓草又奏韓臯改軍將封杖打殺縣令如此之事前後甚多屬朝廷法行悉有懲罰計天下方鎮皆怒元稹守官今貶為江陵判司即是送與方鎮從此方便報怨朝廷何繇得知臣伏聞徳宗時有崔善貞者告李錡必反徳宗不信送與李錡錡掘坑熾火燒殺善貞曾未數年李錡果反至今天下為之痛心臣恐元稹貶官方鎮有過無人敢言陛下無繇得知不法之事此其不可者三也若無此三不可假如朝廷誤左降一御史盖是小事臣安敢煩瀆聖聽至扵再三誠以所損者深所闗者大以此思慮敢不極言疏入不報淄青節度使李師道進絹為魏徵子孫贖宅居易諫曰徵是陛下先朝宰相太宗賞賜殿材成其正宅尤與諸家第宅不同子孫典貼其錢不多自可官中為之收贖而令師道掠美事實非宜憲宗深然之帝又欲加河東王鍔平章事居易諫曰宰相是陛下輔臣非賢良不可當此位鍔誅剥民財以市恩澤不可使四方之人謂陛下得王鍔進奉而與之宰相深無益扵聖朝乃止王承宗拒命帝令神策中尉吐突承璀為招討使諫官上章者七十人居易靣論詞情切至既而又請罷河北用兵凡數千百言皆人之難言者帝多聽納李徳裕穆宗長慶初為屯田員外郎充翰林學士時穆宗不持政道多所恩貸戚里諸親邪謀請謁𫝊道中人之旨與權臣徃來徳裕上疏曰臣伏見國朝故事駙馬縁係親宻並不合與朝廷要官徃來𤣥宗開元中禁止尤切訪聞近日駙馬等輒至宰相及要官宅此軰無他才可以延接唯是漏洩禁宻交通中外羣情所知以為甚弊其朝官素是雜流則不妨來徃若職在清列豈可知聞伏望宣示宰臣其駙馬自今已後有公事任至中書見宰相此外更不得至宰相及臺省要官宅帝欣納焉册府元龜卷五百五十二
