body:
  text: 册府元龜卷二百七十九宋王欽若等撰宗室部領鎮第二宋始安王休仁文帝第十二子孝建三年都督南兖徐二州諸軍事冠軍將軍兖州刺史大眀元年入為侍中四年出為湘州刺史加號平南將軍八年遷使持節督江州南豫州之晉熙新蔡郢州之西陽三郡諸軍事安南將軍江州刺史未拜前廢帝景和元年遷使持節都督雍梁南北秦四州諸軍事安西將軍寜蠻校尉雍州刺史未之任留為散騎常侍䕶軍將軍太宗立以為使持節侍中都督揚南徐二州諸軍事司徒尚書令揚州刺史薛安都據彭城招引後魏復都督北討諸軍事時豫州刺史殷琰據壽春未平晉平王休祐先督征討諸軍事休祐出領江陵休仁又代督西討諸軍事泰始五年進都督豫司二州休仁子伯融歴南豫州刺史琅琊臨淮二郡太守寜朔將軍廣州刺史不之職晉平刺王休祐文帝十三子大眀元年領長安校尉遷東揚州刺史未拜徙湘州刺史加號征虜將軍四年為使持節都督豫司二州南豫州之梁郡諸軍事右將軍豫州刺史眀帝定亂以為使持節都督荆湘雍益梁寜南北秦八州諸軍事驃騎大將軍荆州刺史改都督江郢雍湘等州江州刺史又改都督江南豫司州南豫州刺史又改都督豫江司三州豫州刺史時豫州刺史殷琰據壽春反叛休祐出鎮歴陽督劉勔等討琰琰未平勔築長城守之休祐復徙都督荆湘雍益梁寜南北秦八州諸軍事荆州刺史泰始六年徴為都督南徐南兖徐兖青冀六州諸軍事南徐州刺史加侍中帝以休祐貪虐不可蒞民留之京邑遣上佐行府州事休祐子宣翊為寜朔將軍湘州刺史未拜免海陵王休茂文帝第十四子大眀二年以為使持節都督雍梁南北秦四州郢州之竟陵隨二郡諸軍北中郎將寜蠻校尉雍州刺史桂陽王休範文帝第十八子大眀三年出為江州刺史眀帝定亂以為使持節都督南徐州未拜以驃騎大將軍還為江州進督越州諸軍事巴陵哀王休若文帝第十九子大眀四年出為都督徐州諸軍事増督豫州之梁郡眀年徴為散騎常侍左右郎將呉興太守復徴為散騎常侍眀帝泰始元年出為使持節都督㑹稽東陽永嘉臨海新安五郡諸軍事領安東將軍㑹稽太守率衆東討進督呉興晉陵二郡進號衛將軍給皷吹一部又進督晉安二郡諸軍事二年遷督雍梁南北秦四州荆州之竟陵隨二郡諸軍事寜蠻校尉雍州刺史四年遷使持節都督湘州諸軍事進號征南將軍湘州刺史仍為都督荆湘雍益梁寜南北秦八州諸軍事征西將軍荆州刺史六年荆州刺史晉平王休祐入以休若監荆州事進號征南將軍湘州刺史仍為都督荆湘雍益梁寜南北秦八州諸軍事征西將軍荆州刺史七年被徵代休祐為都督南徐南兖徐兖青冀六州諸軍事征北大將軍南徐州刺史豫章王子尚孝武帝第二子孝建三年都督南徐南兖二州諸軍事北中郎將南兖州刺史其年遷揚州刺史大眀二年加撫軍將軍三年浙江西立王畿以江東為揚州子尚都督揚州江州之鄱陽晉安建安三郡諸軍事揚州刺史五年改封豫州領㑹稽太守七年加使持節前廢帝即位罷王畿復徴子尚都督揚南徐二州諸軍事領尚書令觧督東揚州晉安王子勛孝武第三子大眀四年都督南兖州徐州之東海諸軍事征虜將軍南兖州刺史七年改督江州南豫州之晉熙新蔡郢州之西陽三郡諸軍事前將軍江州刺史八年遷使持節都督雍梁南北秦四州郢州之竟陵隨二郡諸軍事鎮軍將軍寧蠻校尉雍州刺史未拜以鎮軍將軍還為江州景和元年加使持節松滋侯子房孝武第六子永光元年自宣城太守遷東揚州刺史景和元年罷東揚州子房以本號督㑹稽東陽新安臨海永嘉五郡諸軍事㑹稽太守眀帝即位改督為都督進號安東將軍臨海王子頊孝武第七子大眀五年自呉興太守遷使持節都督廣交二州湘州之始興始安臨賀三郡諸軍事征虜將軍平越中郎將廣州刺史未之鎮徙荆州刺史廢帝即位以本號都督荆湘雍益梁寜南北秦八州諸軍事刺史如故眀帝即位觧督雍州以為鎮軍丹陽尹尋留本任進督雍州始平孝敬王子鸞孝武第八子大眀五年自呉郡太守遷北中郎將南徐州刺史領南琅邪太守六年加都督南徐州諸軍事八年加中書令領司徒前廢帝即位解中書令領司徒加持節之鎮永嘉王子仁孝武第九子大眀五年年五歲監雍梁南北秦四州郢州之竟陵隨二郡諸軍事北中郎將寧蠻校尉雍州刺史遷東中郎將呉郡太守六年又遷丹陽尹前廢帝即位加征虜將軍領衛尉尋出為左將軍南兖州刺史景和元年遷南徐州刺史泰始中四方平定以為使持節都督湘廣交三州諸軍事平南將軍湘州刺史始安王子真孝武第十一子大眀七年自呉興太守遷使持節監廣交二州始興始安臨賀三郡諸軍事平越中郎將廣州刺史不之鎮遷征虜將軍南彭城太守領石頭戍事景和元年為丹陽尹尋為南兖州刺史邵陵王子元孝武第十三子景和元年出為湘州刺史晉熙王爕眀帝第六子元徽元年年四歲以為使持節監郢州豫州之西陽司州之義陽二郡諸軍事征虜將軍郢州刺史以黄門郎王奐為長史揔府州之任眀年太尉江州刺史桂陽王休範舉兵逼朝廷爕遣中兵叅軍馮景祖襲潯陽休範留中兵叅軍毛思連州别駕程罕之居守開門詣景祖降進爕號安西將軍加督江州諸軍事四年又進爕鎮西將軍加皷吹一部順帝即位徴為使持節督揚南徐二州諸軍事撫軍將軍揚州刺史先是齊世子蕭賾為爕安西長史行府州事時亦被徴為左衛將軍與爕俱下㑹荆州刺史沈攸之舉兵反世子因奉爕鎮潯陽之盆城據中流為内外形援攸之平爕還京邑齊王蕭道成為南徐州燮解督南徐進督南豫江州諸軍事號中軍將軍儀同三司邵陵殤王友眀帝第七子元徽二年年五歲出為使持節督江州豫州之西陽新蔡晋熈三郡諸軍事南中郎將江州刺史順帝即位進號左將軍改為郡都督昇眀二年徙都督南豫豫司三州諸軍事安南將軍南豫州刺史歴陽太守武陵王賛眀帝第九子元徽四年出為使持節南徐兖青冀等州諸軍事北中郎將南徐州刺史順帝昇眀元年遷持節督郢州司州之義陽諸軍事前將軍郢州刺史二年為沈攸之所圍徙督荆湘雍益梁寜南北秦八州諸軍事安西將軍荆州刺史攸之平乃之鎮隨陽王翽眀帝第十子昇眀元年為使持節督郢州司州之義陽諸軍事西中郎將郢州刺史未拜徙督湘州諸軍事南中郎將湘州刺史南齊豫章文獻王嶷太祖第二子太祖為宋相嶷出鎮東府加冠軍將軍出為使持節都督江州豫州之新蔡晉熈二郡軍事左將軍江州刺史徙都督荆湘雍益梁寜南北秦八州諸軍事鎮西將軍荆州刺史持節太祖即位遷侍中尚書令都督揚南徐二州諸軍事驃騎大將軍開府儀同三司揚州刺史㑹北邉騷動帝思為經略乃詔曰西關揔司王畿誠為治要荆楚領馭遐逺任寄𢎞隆自頃公私彫盡綏撫之宜尤重恒日復以為都督荆湘雍益梁寜南北秦八州諸軍事南蠻校尉荆湘二州刺史入為都督揚南徐二州諸軍事中書監司空揚州刺史臨川獻王映太祖第三子宋末沈攸之事難作太祖時領南徐州以映為寜朔將軍鎮京口事寜除淮南宣城二郡太守並不拜仍為假節都督南兗兗徐青冀五州諸軍事行兖州刺史復為冠軍將軍南兖州刺史太祖踐阼以映為使持節都督荆湘雍益梁寜南北秦八州諸軍事平西將軍荆州刺史又領湘州刺史不行改授散騎常侍都督揚南徐二州諸軍事前將軍揚州刺史出為都督荆湘雍益梁巴寜南北秦九州諸軍事鎮西將軍荆州刺史長沙威王晃太祖第四子宋順帝昇眀二年自寜朔將軍淮南宣城二郡太守遷為持節監豫司二州之西陽諸軍事西中郎將豫州刺史尋遷使持節都督南徐兖二州諸軍事後將軍南徐州刺史世祖加晃鎮軍將軍轉丹陽尹武陵昭王曄太祖第五子建元三年出為持節都督㑹稽東陽新安永嘉臨海五郡軍事㑹稽太守世祖以曄為江州刺史又為丹陽尹安成恭王暠太祖第六子建元二年除冠軍將軍鎮石頭戍領軍事四年出為使持節督江州豫州之晉熈諸軍事南中郎將江州刺史永明六年為南徐州刺史九年遷散騎常侍秘書監領石頭戍事鄱陽王鏘太祖第七子建元四年世祖即位以鏘為使持節督雍梁南北秦四州郢州之竟陵司州之隨郡軍事北中郎將寧蠻校尉雍州刺史七年轉征虜將軍丹陽尹尋加散騎常侍特進號撫軍出為江州刺史九年始親府州事加使持節督江州諸軍事安南將軍桂陽王鑠字宣朗太祖第八子永明二年出為南徐州刺史鎮京口歴代鎮府鑠出蕃始省軍府始興簡王鑑太祖第十子永明二年世祖始以鑑為持節都督益寧二州軍事前將軍益州刺史八年進號安西將軍明年為散騎常侍祕書監領石頭戍事衡陽王鈞太祖第十一子出繼元王道度永明四年為江州刺史累遷左衛將軍為世祖所知兄弟中意遇次鄱陽王鏘十年轉中書令領石頭戍事江夏王鋒太祖第十二子永明七年自輔國將軍南彭城平昌二郡太守遷左衞將軍仍轉侍中領石頭戍事九年出為徐州刺史南平王鋭太祖第十五子永眀十年出為持節都督湘州諸軍事南中郎將湘州刺史宜都王鏗太祖第十六子永眀十一年為持節都督南豫司二州軍事冠軍將軍南豫州刺史晉熈王銶太祖第十八子隆昌元年出為持節都督郢司二州軍事冠軍將軍郢州刺史河東王鉉太祖第十九子隆昌元年為驍騎將軍出為徐州刺史竟陵文宣王子良世祖第二子宋末昇眀三年為使持節都督㑹稽東陽臨海永嘉新安五郡輔國將軍㑹稽太守太祖建元二年穆妃薨去官仍為征虜將軍丹陽尹世祖即位以為使持節都督南徐兖二州諸軍事鎮北將軍南徐州刺史永眀元年徙為侍中都督南兗兗徐青冀五州征北將軍南兖州刺史持節如故眀年入為䕶軍將軍兼司徒鎮西州十年領尚書令尋為使持節都督揚州諸軍事揚州刺史隆昌元年進督南徐州廬陵王子卿世祖第三子世祖即位為使持節都督郢州司州之義陽軍事冠軍將軍郢州刺史永眀元年徙都督荆湘益寜梁南北秦七州安西將軍荆州刺史十年遷使持節都督南豫司三州軍事驃騎將軍南豫州刺史魚復侯子響世祖第四子永眀三年自輔國將軍南彭城臨淮二郡太守遷使持節都督豫州郢州之西陽汝南二郡軍事冠軍將軍豫州刺史四年進號右將軍進督南豫州之歴陽淮南潁川汝陽四郡尋出為江州刺史七年遷使持節都督荆湘雍梁寧南北秦七州軍事鎮軍將軍荆州刺史安陸王子敬世祖第五子永明五年為都督荆湘梁雍南北秦六州軍事平西將軍荆州刺史十年轉散騎常侍撫軍將軍丹陽尹隆昌元年遷使持節都督南兖兖徐青冀五州征北大將軍南兖州刺史晉安王子𢡟世祖第七子永眀三年為持節都督南豫豫司三州南中郎將南豫州刺史魚復侯子響為豫州子𢡟解督四年進號征虜將軍南豫新置力役寡少加子𢡟宣城太守五年為監南兖兖徐青冀五州軍事後將軍南兖州刺史六年徙監湘州平南將軍湘州刺史眀年加持節都督八年進號鎮南將軍九年親府州事十一年為使持節都督雍梁南北秦四州郢州之竟陵司州之隨郡軍事征北將軍雍州刺史隆昌元年為都督江州刺史隨郡王子隆世祖第八子永眀六年自輔國將軍南琅邪彭城二郡太守遷江州刺史未拜遷持節督㑹稽東陽新安臨海永嘉五郡東中郎將㑹稽太守八年代魚復侯子響為使持節都督荆雍梁寜南北秦六州鎮西將軍荆州刺史其年始興王鑑罷益州進號督益州九年親府州事建安王子真