body:
  text: 册府元龜卷六百七十六宋王欽若等撰牧守部教化孔子曰道之以政齊之以刑民免而無耻道之以徳齊之以禮有耻且格然則徳禮之與政刑感人之深淺成俗之厚薄可知也自堯命州牧事多闕文秦置郡守民罕見徳迨于兩漢之世始有循吏之名或興學而化行或修禮而教闡或引咎而人知勸或掩過而人遷善若文翁韓延夀之屬皆著異迹煥乎惇史後之繼踵比比有焉非夫仁信篤誠寛厚清靜正其身而率下者孰能至於此哉漢文翁廬江舒人也少好學通春秋以郡縣吏察舉景帝末為蜀郡守仁愛好教化見蜀地辟陋有蠻夷風文翁欲誘進之乃選郡縣小吏開敏有材者張叔等十餘人親自飭厲遣詣京師受業博士或學律令減省少府用度買刀布蜀物齎計吏以遺博士少府郡掌財物之府以供太守者也刀凡蜀刀有環者也布蜀布細密也二者蜀人作之皆善故齎以為貨無限於書刀布刀也數嵗蜀生皆成就還歸文翁以為右職郡中髙職也用次察舉官有至郡守刺史者又修起學宫於成都市中學宫學之宫舍招下縣子弟以為學官子弟下縣四郊之縣非郡所治也為除更繇不令從役也髙者以補郡縣次為孝弟力田常選學官僮子使在便坐受事便坐别坐可以視事非正廷也每出行縣益從學官諸生明經飭行者與俱益多也使傳教令出入閨閣閨閣内中小門也縣邑吏民見而榮之數年爭欲為學官弟子富人至出錢以求之繇是大化蜀地學於京師者比齊魯焉至武帝時乃令天下郡國皆立學校官自文翁為之始韓延夀為潁川太守潁川多豪强難治國家嘗為選良二千石先是趙廣漢為太守患其俗朋黨故搆㑹吏民令相告訐搆結也一切以為聰明潁川繇是以為俗民多怨讐延夀欲改更之教以禮讓恐百姓不從乃歴召郡中長老為鄉里所信向者數十人設酒具食親與相對接以禮意又問以謡俗民所疾苦謡俗謂閭里歌謡政教善惡也為陳和睦親愛銷除怨咎之路長老皆以為便可施行因與議定嫁娶喪祭儀品畧依古禮不得過法延夀於是令文學校官諸生皮弁執俎豆為吏民行喪嫁娶禮百姓遵用其教賣偶車馬下里偽物者弃之市道下里地下蒿里偽物也偶木土為人象真車馬之形也偶對也弃其物於市之道上也數年徙為東郡太守延夀為吏上禮義好古教化所至必聘其賢士以禮待用廣謀議納諫爭舉行喪讓財表孝弟有行修治學宫學宫謂庠序之舍也春秋鄉射陳鐘皷管絃盛升降揖讓及都試講武設斧鉞旌旗習射御之事治城郭收賦租先明布告其日以期㑹為大事吏民敬畏趨鄉之延夀接待下吏恩施甚厚而約誓明或欺負之者延夀痛自刻責豈其負之何以至此言豈我負之邪其人何以為此事吏聞者自傷悔其縣尉至自刺死及門下掾自剄人救不殊因瘖不能言殊絶也以人救之故身首不相絶也延夀聞之對掾史涕泣遣吏醫治視遣醫治之而吏䕶視之厚復其家延夀常出臨上車騎吏一人後至敕功曹議罰白令定其罪名而更白之還至府門門卒當車願有所言延夀止車問之卒曰孝經曰資於事父以事君而敬同故母取其愛而君取其敬兼之者父也資取也取事父之道以事君其敬則同故母則極愛君則極敬不如父之兼敬也今旦明府早駕久駐未出騎吏父來至府門不敢入騎吏聞之趨走出謁適㑹明府登車以敬父而見罰得毋虧大化乎延夀舉手輿中曰微子太守不自知過微無也歸舍召見門卒卒本諸生聞延夀賢無因自達故代卒代人為卒也延夀遂待用之其納善聽諌皆此類也入守左馮翊嵗餘不肯出行縣丞掾數白宜循行郡中覽觀民俗考長吏治迹延夀曰縣皆有賢令長督郵分明善惡於外行縣恐無所益重為煩擾丞掾皆以為方春月可一出勸耕桑延夀不得已行縣至髙陵民有昆弟相與訟田自言延夀大傷之曰幸得備位為郡表率不能宣明教化至令民有骨肉爭訟既傷風化重使賢長吏嗇夫三老孝弟受其耻咎在馮翊當先退是日移病不聽事因入卧傳舍閉閣思過一縣莫知所為令丞嗇夫三老亦皆自繫待罪於是訟者宗族傳相責讓此兩昆弟深自悔皆自髠肉袒謝願以田相移終死不敢復爭兄以讓弟弟又讓之故云相移延夀大喜開閣延見内酒肉與相對飲食厲勉以意告鄉部有以表勸悔過從善之民以其悔過從善故令表顯以示勸勵延夀乃起聽事勞謝令丞以下引見尉薦郡中歙然莫不傳相勅厲不敢犯延夀恩信周遍二十四縣莫復以辭訟自言者推其至誠吏民不忍欺紿紿誆也黄霸為潁川太守宣帝垂意於治數下恩澤詔書吏不奉宣不令百姓皆知也霸為選擇良吏分部宣布詔令分扶問反令民咸知上意使郵亭鄉官皆畜雞豚郵行書舍謂傳送文書所止處亦如今之驛館者鄉所治處也以贍鰥寡貧窮者薛宣為左馮翊得郡中吏民罪名輙召告其縣長吏使自行罰曉曰府所以不自發舉者不欲代縣治奪賢令長名也長吏莫不喜懼免冠謝宣歸思受戒者何武為揚州刺史二千石有罪應時舉奏其餘賢與不肖敬之如一是以郡國各重其守相州中清平行部必先即學宫見諸生即就也學宫學舍也試其誦論問以得失意後漢冦恂光武時為汝南太守盗賊清靜郡中無事恂素好學乃修鄉校教生徒聘能為左氏春秋者親受學焉李忠為丹陽太守以丹陽越俗不好學嫁娶禮儀衰於中國乃為起學校習禮容春秋鄉飲校亦學也禮記鄉飲酒之義主人拜迎賔於庠門之外三揖而後至階三讓而後升堂所以致尊讓也七十者坐五十者立侍以聽政役所以明尊長也合諸鄉射教之鄉飲酒之禮而孝弟之行立選用明經郡中向慕之衛颯為桂陽太守郡與交州接境頗染其俗不知禮則颯下車修庠序之教設婚姻之禮期年間邦俗從化任延為㑹稽都尉每時行縣輙使尉勉孝子就飱飯之後為九真太守駱越之民無嫁娶禮法各因淫好無適對匹不識父子之性夫婦之道延乃移書屬縣為使男年二十至五十女年十五至四十皆以年齒相配其貧無禮聘令長吏以下各省奉禄以賑助之同時相娶者二千餘人是嵗風雨順節榖稼豐衍其産子者始知種姓咸曰使我有是子者任君也多名子為任於是徼外蠻夷夜郎等慕義保塞延遂止罷偵候戍卒初平帝時漢申錫光為交趾太守教導民夷漸以禮義化聲侔於延王莽末閉境拒守建武初遣使貢獻封鹽水侯嶺南華風始於二守焉又為武威太守造立校官自掾吏子孫皆令詣學受業復其徭役章句既通悉顯㧞榮進之郡遂有儒雅之士秦彭為山陽太守以禮訓人不任刑罰崇好儒雅敦明庠序每春秋享射輙修升降揖讓之儀乃為人設四誡以定六親長㓜之禮有遵奉教化者擢為鄉三老嘗以八月致酒肉以勸勉之吏有過咎罷遣而已不加耻辱百姓懐愛莫有欺犯張湛為左馮翊在郡修典禮設條教政化大行歐陽歙為汝南太守世傳伏生尚書在郡教授數百人伏恭為常山太守明齊詩敦修學校教授不輟繇是北州多為伏氏學王追為益州郡太守始興起學校漸遷其俗廉范厯武威武都二郡太守隨俗化導各得治宜建初中遷蜀郡太守其俗尚文辯好相持短長范每厲以淳厚不受偷薄之説羊續為南陽太守班宣政令候民利病百姓勸服時權豪之家多尚奢麗續深疾之嘗弊衣薄食車馬羸敗張霸為㑹稽太守表用郡人處士顧奉公孫松等奉後為潁川太守松為司𨽻校尉並有名稱其餘有業行者皆見擢用郡中爭厲志節習經者以千數道路但聞誦聲鮑徳為南陽太守時郡學久廢徳乃修起黌舍備俎豆黼冕行禮奏樂又尊饗國老宴㑹諸儒百姓觀者莫不歡服劉寛為東海相遷南陽太守典歴三郡温仁多恕雖在倉卒未嘗疾言遽色嘗以為齊之以刑民免而無耻吏人過但用蒲鞭罰之示辱而已終不加苦事有功善推之自下災異或見引躬克責每行縣止息亭傳輒引學官祭酒及處士諸生執經對講見父老慰以農里之言年少勉以孝悌之訓人感徳興行日有所化欒巴為桂陽太守以郡處南垂不閑典訓為吏人定婚姻喪紀之禮興立學校以奨進之雖幹吏卑末皆課令習讀程試殿最隨能升授幹府吏之類也晉令諸郡國不滿五千以下置幹吏二人郡縣皆有幹幹猶主也何敞為汝南太守敞疾文俗吏以苛刻求當時名譽故在職以寛和為政立春日嘗召督郵還府督郵主司察愆過立春陽氣發生故召歸分遣儒術大吏案行屬縣顯孝悌有義行者及舉寃獄以春秋義斷之是以郡中無怨聲百姓化其恩禮其出居者皆歸養其父母追行喪服出居謂與父母别居者其親先亡者自恨喪禮不足追行喪制也推財相讓者二百許人髙譚等百八十五人推財相讓置立禮官不任文吏王暢為南陽太守郡中豪族多以奢靡相尚暢嘗布衣皮褥車馬羸敗以矯其弊同郡劉表諫之暢曰昔公儀休在魯抜園葵去織婦孫叔敖相楚其子被裘刈薪夫以約失之者鮮矣聞伯夷之風者貪夫有立志雖以不徳敢慕遺烈袁安為河南尹政號嚴明然未曽以贓罪鞫人嘗稱曰學仕者髙則望宰相下則希牧守錮人於聖世尹所不忍為也聞之者皆感激自勵在職十年京師肅然名重朝廷應奉為武陵太守興學校舉仄陋魏霸為鉅鹿太守以簡樸寛恕為政掾吏有過要先誨其失不改者乃罷之吏或相毁訴霸輙稱它吏之長終不及人短訴者懐慙譛訟遂息許荆為桂陽太守郡濵南川風俗脆薄不識學義荆為設喪紀婚姻制度使知禮禁嘗行春到來陽縣人有蔣均者兄弟爭財互相言訟荆對之嘆曰吾荷國重任而教化不行咎在太守乃顧使吏上書陳狀乞詣廷尉均兄弟感悔各求受罪郴人謝𢎞等不養父母兄弟分拆因此皆還繼養者千有餘人也在事十二年父老稱歌劉表為荆州刺史起立學校博求儒術綦毋誾宋忠等撰立五經章句講之孔融為北海相立學校表顯儒術魏袁煥為梁相煥每勅諸縣務存鰥寡髙年表異孝子貞婦嘗談曰世治則禮詳世亂則禮簡全在斟酌之間耳方今雖擾難以禮化然在吾所以為之為政崇教訓恕思而後行外温柔而内能斷杜畿為河東太守是時天下郡縣皆殘破河東最先定少耗減畿治之崇寛恵與民無為民嘗辭訟有相告者畿親見為陳大義遣令歸諦思之若意有所不盡更來詣府鄉邑父老自相責怒曰有君如此奈何不從其教自是少有辭訟班下屬縣舉孝子貞婦順孫復其徭役隨時慰勉之漸課民畜牸牛草馬下逮雞豚犬豕皆有章程百姓勤農家家豐實畿乃曰民富矣不可不教也於是冬月修戎講武又開學宫親自執經教授郡中化之郡人樂詳少好學畿署詳文學祭酒使教後進於是河東學業大興韓遂馬超之叛也𢎞農馮翊多舉縣邑以應之河東雖與賊接民無異心王恂為河南尹建立二學崇明五經皆恂所定令狐邵為𢎞農太守舉善而教恕以待人不好獄訟與下無忌時郡無知經者乃厯問諸吏有欲逺行就師輙假遣令詣河東就樂詳學經粗明乃還因設文學學業轉興顔斐為京兆太守起文學聽吏民欲讀書者復其小徭又課民當輸租時車牛各因便致薪兩束為冬寒氷炙筆硯於是風化大行吏不煩民民不求吏劉馥為揚州刺史恩化大行於是聚諸生立學校索招為鴈門太守簡選有才識者詣大學受業還相授教數年中庠序大興徐邈為凉州刺史收歛民間私仗藏之府庫然後率以仁義立學明訓禁厚葬斷滛祀進善黜惡風化大行百姓歸心焉西域流通羌城入貢皆邈勲也任嘏為河東太守所在化行有遺風餘教劉邵為陳留太守敦崇教化百姓稱之王凌為青州刺史時海濵喪亂之後法度未整凌布政施教賞善罰惡甚有綱紀百姓稱之不容於口徙為東豫州刺史咸得軍民之歡心始至豫州旌先賢之後求未顯之士各有條教意義甚美王基為荆州刺史明制度整軍農兼修學校南方稱之楊俊為南陽太守宣徳教立學校吏民稱之范粲為武威太守到郡選良吏立學校勸農桑又郡壤富貴珍玩充積粲制之息其華侈蜀王商為蜀郡守修學校廣農桑百姓便之呉顧邵為豫章太守禁其滛祀非禮之祭者小吏姿質有佳者輙令就學擇其先進擢置右職舉善以教風化大行晉曹志字允恭為樂平太守在郡上書以為宜尊儒重道請為博士置吏卒李重為平陽太守崇徳化修學校表篤行拔賢能清簡無欲正身率下鄭袤為濟隂太守下車旌表孝悌敬禮賢能興立庠序開誘後進陶侃為荆州刺史諸參佐或以談戲廢事者乃命取其酒器蒲博之具悉投之於江吏将則加鞭扑曰摴蒲者牧豬奴戲耳老莊浮華非先王之法言不可行也君子當正其衣冠攝其威儀何有亂頭養望自謂宏達邪有奉饋者皆問其所繇若力作所致雖微必喜慰賜參倍若非禮得之則切厲訶辱還其所饋嘗出遊見人持一把未熟稻侃問用此何為人云行道所見抑取之耳侃大怒曰汝既不佃而戲賊人稻執而鞭之是以百姓勤殖家給人足孔衍為廣陵郡守雖隣接於賊猶教誘後進不以戎務廢業周處為楚内史郡既經喪亂新舊雜居風俗未一處敦以教義虞傳為鄱陽内史大修庠序廣招學徒移告屬縣范汪為東陽太守在郡大興學校甚有恵政范甯汪子也為豫章太守在郡大設庠序遣人往交州探磬石以供學用改革舊制不拘常憲逺近至者千餘人資給衆費一出私禄并取郡四姓子弟皆充學生課讀五經又起學臺功用彌廣江州刺史王凝之上言曰豫章郡居此州之半太守臣甯入參機省出宰名郡而肆其奢濁所為狼籍郡城先有六門甯悉改作重樓復更開二門合前為八私立下舍七所臣伏思宗廟之設各有品秩而甯自置家廟又下十五縣皆使左宗廟右社稷凖之大廟皆資人力又奪人居宅功夫萬計甯若以古制宜崇自當列上而敢專輙惟存任心州既聞知即符從事制不復聽而甯嚴威屬縣惟令速立願出臣表下太常議之禮典詔曰漢宣云可與共治天下者良二千石也若范甯果如凝之所表者豈可復宰郡乎以此抵罪子泰時為天門太守弃官稱訴帝以甯所務惟學事久不判㑹赦免庾亮為征西将軍鎮武昌開置學宫亮薨乃廢王承為東海太守有犯夜者為吏所拘承問其故答云從師受書不覺日暮承曰鞭撻甯越以立威名非政化之本使吏送令歸家宋孔季恭為㑹稽内史修飭學校計課調習蔡興宗為㑹稽太守三呉舊有鄉射禮久不復修興宗行之禮儀甚整先是元嘉中羊𤣥保為郡亦行鄉射杜慧度為交州刺史崇修學校南齊劉悛為司州刺史於州治下立學校虞愿為晉平太守在郡立學堂教授豫章王嶷為荆湘二州刺史於南蠻園東南開立學上表言狀置四十人取舊族父祖位正佐臺郎年二十五以上補之置儒林叅軍二人文學祭酒一人勸學從事二人行釋菜禮竟陵王子良為㑹稽太守時有山隂人孔平詣子良訟嫂市米負錢不還子良嘆曰昔髙文通與寡嫂訟田義異於此乃賜米錢以償平江祀為東海太守治下有宣尼廟久廢不修祀更開掃搆立梁始興王憺出為益州刺史開立學校勸課就業遣子映親受經焉繇是多向方者殷均為臨川内史體羸多疾閉閣卧治而百姓化其徳刼盗皆奔出境嘗禽刼帥不加考掠但和言誚責刼帥稽顙乞改過均便命遣之後遂為善人陸襄為鄱陽内史有彭李二家因忿爭遂相告襄引入内室不加責誚但以和言解喻之二人感悟深自咎悔乃為設酒食令其盡歡酒罷同載而還因相親厚民歌曰陸君解無怨家鬬既罷讐共車柳惲為鄱陽相聽吏屬得盡三年喪禮著之文教百姓稱焉張綰為豫章内史在郡述制㫖禮記正言義四姓衣冠士子聽者嘗數百人王欽若等曰禮記正言是梁武所撰故稱制㫖四姓謂朱張顧陸也顧憲之為衡陽内史土俗山民有病輙云先為禍皆開塜剖棺木洗枯骨名為除祟憲之曉諭為陳生死之别事不相繇風俗遂改時刺史王奂新至唯衡陽獨無訟者乃歎曰顧衡陽之化至矣若九郡率然吾将何事張緬為豫章内史緬為政任恩恵不設鈎距吏人化其徳亦不敢欺故老咸云數十年未有也後魏張恂為廣平太守招集離散開建學校優顯儒士吏民歌詠之賈雋為荆州刺史先是上谷置荆州後改為雒州在重山民不知學雋乃表置學官選悟者以教之李仲璇為兖州刺史以孔子廟墻宇頗有頺毁遂修改焉裴延雋為幽州刺史以范陽人酈惲好學有文才用為主簿令其修起學校禮教大行民歌謡之李平為相州刺史勸課農桑修飭太學簡試通儒以充博士選五郡聰敏者以教之圖孔子及七十二子於講堂親為之贊劉道斌為𢎞農太守修立學館建孔子廟堂圖畫形像盧道将為燕郡太守優禮儒生勵勸學業敦課農桑墾田嵗倍張萇年為汝南太守有郡民劉崇之兄弟分拆家貧唯有一牛爭之不决訟於郡庭萇年見之悽然曰汝曹當以一牛故致此競脱有二牛各應得一豈有訟理即以家牛一頭賜之於是郡境之中各相誡約咸敦敬讓裴安祖河東聞喜人弱冠州辟主簿民有兄弟爭財詣州相訟安祖召其兄弟以禮義責讓之此人兄弟明日相率謝罪境内欽服之韋彧為東豫州刺史綏懐蠻左頗得其心蠻首田益宗子魯生魯賢先叛父南入數為冦掠自彧至州魯生等咸牋啟修敬不復為害彧以蠻俗荒梗不識禮義乃表立大學還諸郡生徒於州總教李訢為相州刺史上疏求立學校曰臣聞至治之隆非文徳無以經綸王道太平之義非良才無以光贊皇化是以昔之明王建庠序於京畿立學宫於都邑教國子弟習其道藝然後選其俊異以為造士今聖治欽明道隆三五禮服之民咸仰徳化而所任州土學校未立臣雖不敏誠願備之使後生聞雅頌之音童㓜覩經教之本臣昔蒙恩寵長管中祕時課修學有成立之人髦俊之士已蒙進用臣今重荷榮遇顯任名岳思闡帝猷光宣於外自到已來訪諸文學舊徳已老後生未進嵗首所貢雖依制遣對問之日懼不克堪臣愚欲仰依先典於州郡治所各立學宫使士望之流冠冕之胄就而受業庶必有成其經藝通明者貢之天府則郁郁之文於是不墜書奏獻文從之髙允為懐州刺史時年将九十勸民學業風化頗行蕭寳寅為徐州刺史起學館朔望引見四姓子弟接以恩顔與論經義勤於政治吏民愛之崔辯為武邑太守政事之餘專以勸學為務崔遊為河東太守大學舊在城内遊乃移至城南開敞之處親自説經當時學者莫不勸慕號為良守髙祐為西兖州刺史以郡國雖有大學縣黨宜有黌序乃縣立講學黨立小學崔孝暐為趙郡太守興立學校親加勸督百姓頼之楊津為華州刺史先是受調絹度尺特長在事因縁共相進退百姓苦之津乃令依公尺度其輸物尤好者賜以杯酒而出所輸少劣亦為受之但無以示其耻於是人競相勸官調更勝舊日又為岐州刺史巨細躬親孜孜不倦守令寮佐有濁貨者未曽公言其罪嘗以私書切責之於是官屬感厲莫有犯法冦雋為梁州刺史民俗荒獷多為賊盗雋乃令郡縣立為庠序勸賊盗使歸農桑敦以禮讓數年之中風俗頓革北齊鄭述祖父道昭先為兖州刺史述祖天保初又為之有人入市盗布其父怒曰何忍欺人君執之以歸首述祖特原之自是之後境内無盗人歌之曰大鄭公小鄭公相去五十載風教猶相同蘇瓊為南海太守有百姓乙普明兄弟爭田積年不斷各相援引乃至百人瓊召普明兄弟對衆人語之曰天下難得者兄弟易求者田地假令得田地失兄弟心如何因而下淚衆人莫不灑泣普明兄弟叩頭乞外更思分異十年遂還同居住每年春總集大儒衛隆田元鳳等講於郡學掾吏文案之暇悉令受書時人指吏曹為學生屋後周長孫儉初仕魏為荆州刺史所部鄭縣令泉璨為民所訟推治獲實儉即大集僚屬而謂之曰此繇刺史教誨不明信不被物是我之愆非泉璨之罪遂於㕔事前肉袒自罰捨璨不問於是屬城肅勵莫有犯法西魏文帝璽書勞之太祖又與儉書曰近行路傳公以部内縣令有罪遂自杖三十用肅羣下吾昔聞王臣謇謇匪躬之故蓋謂憂公忘私知無不為而已未有如公刻身罰已以訓羣僚者也聞之嘉歎荆蠻舊俗少不敬長儉殷勤勸導風俗大革務廣耕桑兼習武事故得邊境無虞民安其業吏民表請為儉搆清徳樓樹碑刻頌朝議許焉柳霞為霍州刺史導民務先以徳再三不用者乃微加貶異以耻之而已其下感而化之不復為過咸曰我君仁恵如此其可欺乎薛慎為湖州刺史州界既雜蠻夷常以刼掠為務慎乃集諸豪帥具宣朝㫖仍令首領每月一叅或須言事者不限時節慎每見必殷勤勸誡乃賜酒食一年之間翕然從化諸蠻乃相謂曰今日始知刺史真民之父母也莫不欣悦自是襁負而至者千餘戸蠻俗婚娶之後父母雖在即與别居慎謂守令曰牧守令長是化人者也豈有其子娶妻便與父母離拆非唯蠻俗之失亦是牧守之罪慎乃親自誘導示以孝慈并遣守令者喻所部有數戸蠻别居數年遂還侍養及行得果膳歸奉父母慎以其從善之速具以狀聞有詔蠲其賦役於是風化大行有同華俗樂遜為湖州刺史民多蠻左未習儒風遜勸勵生徒加以課試數年之間化洽州境蠻俗生子長大多與父母别居遜每加勸導多革前弊在任數載頻被褒錫隋于義字慈恭為武安太守專崇徳教不尚威刑有郡民張善安王叔兒爭財相訟義曰太守徳薄不勝任之所致非其罪也於是取財倍與二人論而遣去善安等各懐耻愧移貫他州於是風教大洽以其徳化人皆此類也梁毗為西寧州刺史在州十一年先是蠻夷酋長皆服金冠以金多者為豪雋繇此遞相陵奪每干邊境略無寧嵗毗患之後因諸酋長相率以金遺毗於是置金坐側對之慟哭而謂之曰此物饑不可食寒不可衣汝等以此相滅不可勝數今将此來欲殺我邪一無所納悉以還之於是蠻夷感悟遂不相攻擊髙祖聞而善之趙賢通為冀州刺史有人盗其田中蒿者為吏所執賢通曰此乃刺史不能宣風化彼何罪也慰喻而遣之令人載蒿一車以賜盗者媿惡過於重刑其以徳化民皆此類也令狐熙開皇中為桂州刺史先是州縣生梗長吏多不得之官寄政於總管府熙悉遣之為建城邑開設學校人夷感化焉乞伏慧領潭桂二州總管三十一州諸軍事其俗輕剽慧躬行樸素以矯之風化大洽楊汪字元度厯荆雒二州長史每聽政之暇必延生徒講授時人稱之辛公義為牟州刺史下車先至獄中因露坐牢側親自騐問十餘日間決斷咸盡方還大㕔受領新訟皆不立文案遣當直佐寮一人側坐訊問事若有不盡應須禁者公義即宿㕔事終不還閤人或諌之曰此事有程使君何自苦也答曰刺史無徳可以導人尚令百姓係於囹圄豈有禁人在獄而心自安乎罪人聞之咸自歎服後有欲爭訟者其鄉閭父老遽相曉曰此蓋小事何忍勤勞使君訟者多兩讓而止梁彦光為相州刺史自齊亡衣冠士人多遷闗内唯技巧商販及樂戸之家移實州郭繇是人情險詖妄起風謡訴訟官人萬端千變彦光欲革其弊乃用秩俸之物招致山東大儒每鄉立學非聖哲之書不得教授嘗季月招集之親臨䇿試有勤學異等聰令有聞者升堂設饌其餘並坐廊下有爭訟惰業無成者坐之庭中設以草具及大成當舉行賔貢之禮行於郊外祖道并以財物資之於是人皆克勵風俗大改有塗陽人焦通性酣酒事親禮闕為從弟所訟彦光弗之罪将至州學令觀於孔子廟于時廟中有韓伯瑜母杖不痛哀母力弱對母悲泣之像通遂感悟既悲且愧若無自容彦光訓諭而遣之後改過勵行卒為善士以徳化人皆此類也吏人感悦畧無爭訟柳旦為龍川太守民居山洞好相攻擊旦開設學校大變其風煬帝聞而善之下詔褒美唐髙士㢘太宗時為益州大都督府長史蜀土俗薄畏鬼而惡疾父母病有危殆不躬扶持杖頭挂食遥以哺之兄弟異財罕通假借士㢘隨方誘勸有不悛者親率官屬詣其門而諭之繇是邑里翕然多為孝悌兼命儒生講論墳典勉勵後進西蜀學校一時復興髙智周髙宗時為夀州刺史每行部必先召學官見諸生試其講誦訪以經義及時政得失然後問及墾田獄訟之事李栖筠代宗時為浙西觀察使屬師旅饑饉之後百姓流離講誦之徒數年竟絶乃大開學館招延秀異表大儒河南褚冲呉郡何員等超資授官為學者師身自執經質問疑義繇是逺邇趨風鼓篋升堂者至數百人教化大行俗若鄒魯馬燧為懐州刺史乗兵亂後其夏大旱人失耕種燧乃務教化将吏有父母者燧輙造之施敬收瘞暴骨去其煩苛至秋田中生穭禾人頗便之張鎰為濠州刺史招經術之士講訓生徒比去郡升明經者四十餘人陽城徳宗時為道州刺史在州以家人法為理吏人宜罰者罰之宜賞者賞之一不以簿書介意前刺史有贓罪觀察使方推鞫之吏有幸於前刺史者捃拾其不法事以告欲自為功城立杖殺之賦税不登觀察使請誚讓州上考功第城自署其第曰撫字心勞徵科政拙考下下觀察使嘗使判官督其賦至州恠城不出迎以問州吏吏曰刺史聞判官來以為已有罪自囚於獄不敢出判官大驚馳入謁城獄曰使君何罪某奉命來候安否耳留一二日未去城因不復歸館門外有故門扇横城晝夜坐卧其上判官不自安辭去其後觀察使又遣他判官崔某往案之王欽若等日史失其名崔承命不辭載妻子以行中道而逃令狐楚穆帝時為宣武軍節度使先是汴卒驕悍累逐主帥韓𢎞以重法繩之人皆偷生莫革其性楚以仁恵明其教令人遂從化曹華為沂州刺史初李正已盗有青鄆十二州傳襲四世垂五十年人俗頑驁不知禮教華令将吏曰鄒魯儒者之鄉不宜忽於禮義乃躬禮儒士習俎豆之容春秋釋奠於孔子廟立學講經儒冠四集出家財贍給俾成名入仕其往者如歸鄭澣文宗時為興元尹先是澣父餘慶之鎮興元創儒宫設學館至澣之來復繼前美册府元龜卷六百七十六
