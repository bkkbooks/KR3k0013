body:
  text: 册府元龜巻一百六十宋王欽若等撰帝王部革弊第二唐徳宗大厯十四年五月癸亥即位六月己亥朔赦書應士庶自艱難以來田宅踰制車服奢侈仰所司詳前後格勑明立法度王公百官既處榮班宜知亷愼如聞坊市之内置邸舖販鬻與人爭利竝宜禁㫁仍委御史臺及京兆尹紏察七月壬申毁元載馬璘劉中翼之第自天寳中京師堂寢已極𢎞麗而第宅未甚逾制然魏國公李靖廟已為嬖人楊氏廐矣及安史二逆之後法度摧壞大臣宿將競崇棟宇臺榭之飾無復界限力窮乃止人謂之木妖而馬璘之堂尤甚計錢二十萬貫他室稱是既而璘卒於軍以䘮歸京師士庶欲觀其宏麗假名於故吏投刺㑹弔者數十百人故命撤毁之自是京師樓榭之踰制者皆毁七月己卯令王公百官及天下長吏無得與人爭利先於揚州置邸肆貨易者皆罷之先是諸道節度觀察使以廣陵當南北之衝百貨所集多以軍儲貨販例置邸肆名託軍用實私其利焉至是乃絶貞元三年十一月壬戌罷浙西雜罰錢初浙西觀察使王緯以諸州人吏為前使韓滉所濫罰錢凡欠十八萬滉留府吏何士幹奏請徴以進奉緯抗疏曰滉懲人吏皆是罰錢格式正贓流徒合免况多雜罰身已當辜縱有欠繫僅存家資估賣盪盡以滉至苛至切比年猶徴不得臣自發上都煩言載路及到所部有所傳聞臣謬寄方隅特蒙天造奉辭之日親承徳音今臣開闢田疇安輯黎庶豈敢流毒無告勤人自容特請停徴以綏下土從之順宗以貞元二十二年正月丙申即位二月甲子大赦制舊事宫中所要市外間物令官吏主之與人為市隨給其直貞元末以宦者為使抑買人物稍不如本估末年不復行文書置白望數十百人於兩市及要閙坊閲人所賣物但稱官市則斂手付與真偽不復可辨無敢問所從來及論價之髙下者率用直百錢物買人直數千貫物仍索進奉門户及脚價錢人将詣市至有空手而歸者名為官市而實奪之嘗有農夫以驢負柴至城賣之遇内官稱宮市取之纔與絹數尺又就索門户仍邀以驢送柴農夫啼泣以所得絹付之不肻受曰須要汝驢送柴至内農夫曰我有父母妻子待此然後食今以柴與汝不敢求直而歸汝尚不肻我有死而已遂毆内官街吏擒以獻詔黜此内官而賜農夫絹十疋然官市亦不為之改易諫官御史數奏疏諫不聼帝初即位卽禁之及大赦又明禁焉又貞元中内要乳母皆令選京城寺觀婢以充之而給與其直例多不中選寺觀次當出者皆賣産業無業割院及地賣之貴買有姿貎者以進其徒苦之及此亦禁焉貞元末五坊小兒張捕鳥雀於閭里者皆為暴横以取人錢物至於張羅網於門不許出入者或以張井上使不得汲者近之輙曰汝驚供奉鳥雀即痛毆之出錢物求謝乃去或相聚斂飲食於酒食之肆醉飽而去賣者或不知就索其直多被毆罵或時留蛇一囊為質曰此蛇所以致鳥雀而捕之者今留付汝幸善飼之勿令饑渴賣者媿謝求哀乃攜挈而去帝在春宫時則知其弊嘗欲禁之及即位遂推而行之人情大悅憲宗永貞元年九月己巳罷教坊樂人授正員官之制元和七年二月癸丑詔自今應有入蕃使不得與私覿正員官别給錢物以充私覿舊使絶域者許鬻十數員官取貲以充私覿蓋優假逺使然殊非典法至是革焉八年四月乙未罷宣徽院樂人所借官宅自貞元己未選樂工三十餘人出入禁中號宣徽院長入供奉皆假以官第每奏伎樂稍稱㫖輙蒙厚賜及帝即位令分畨上下更無他賜至是收所借宅九月詔曰比聞嶺南五管并福建黔中等道多以南口餉遺及於諸處博易骨肉離析良賤難分念兹逺人受抑無告所以去歲處分諸道不令進獻近因賂遺事覺方驗詔㫖不行雖量輕重各正刑典猶慮未降明勑尚有因循自今嶺南諸道輙不得以口餉遺及將諸處博易又有求利之徒以口博易闗鎮人吏容縱頗多竝勒所在長吏嚴加捉搦如更違犯必重科懲如長吏不存勾當委御史臺察訪聞奏因是宣罷口臘等使九年十一月丙子詔如聞比來京兆府每及臘日府縣捕養狐兎以充進獻深乖道理既違天性又勞人力自今已後宜竝停十一年十一月壬申門下省奏諸道奏事官非急切者不得乘驛馬從之時未班師詔命曰宣泊諸軍之奏請所至驛騎不足以充傳州縣發公私乘以濟之中使力奪道中徃來馬有餘則驅之以行拒者輙毆辱之雖執公劵衘王命至大鎮賔倅或為其陵折於是有繇經山谷歴﨑險冒蓁薈而行都邑大道乘者幾絶中人每至之處又遣驛吏搜發徃來私馬驛吏因執馬求賂厚者免之甚為時害十三年十二月辛亥詔左右龍武六軍及威逺營應納課戸共一千八百人所請衣糧宜勒停仍各委本軍具姓名牒送府縣收管自貞元已來長安富戸皆𨽻要司求影庇禁軍挂籍者什五六焉至有恃其多藏安處闤闠身不宿衛以錢代行謂之納課戸至是禁絶十四年二月壬申詔如聞諸道州府長吏等或有本任得替後於當處置百姓莊園舍宅或因替代情庇便破除正額兩稅不出差科自今已後有此色竝勒依元額為定穆宗元和十五年正月辛丑即位二月丁丑赦詔如聞度支鹽鐵院等所在影占富商髙戸庇入院司不伏州縣差科疲人偏苦事轉不濟如有此色仰當日勒歸州縣文宗以寳厯二年十二月乙巳即位庚申詔曰蓋君天下者莫尚乎崇澹泊子困窮遵道以端本推誠而逹下故聖祖之誡以慈儉為寳大易明訓垂簡易之文未有上約而下不豐欲寡而求不給朕以𦕈薄遭逢内難刷君父之仇耻攄億兆之哀寃而股肱大臣羣卿庶士𢎞義抗請至于再三以圖宗社之安以答華夷之望俯從衆欲夙夜震兢思所以克己復禮修政安人宵興匪寧旰食勞慮夫儉過則酌之以禮文勝則矯之以質庶乎俗登太古道洽生靈儀刑邦家以化天下長春宫見在斛斗及絲草席等依前戸部收管鄠縣渼陂鳯翔任谷地竝還府縣教坊樂官翰林待詔伎術官并摠監諸色職事中冗員者一千二百七十人竝宜停廢摠監中一百二十四人先屬諸軍各竝歸本營先供教坊衣糧一百分廂家及諸司新加衣糧三千分竝宜停給應縁田獵鷹雛獸犬等竝宜放除五坊加配諸道鷹鷂等長慶已來嘗進外宣索自今已後一切停進其須備蒐狩量留者宜准憲宗朝故事其今年新宣附食度支衣糧小兒一百人竝宜停罷應别詔宣索纂組雕鏤不在常貢内者竝停度支鹽鐵戸部及州府百司應供宮禁年支一物以上竝准貞元額為定度支撿勘具元和以來加配合停色數二十日内分析聞奏先造供禁中牀榻以金飾瑟瑟雜寳鈿眞珠瑪碯装者悉宜停進東頭御馬坊毬塲宜却還左龍武軍其殿及亭子令所司折收餘舍竝賜龍武軍收管應行從處張設不得用花臘結綵華飾今年已來諸道所進音聲女人各賜束帛放還本道應城外墳墓先有開斸道路以備行幸處宜令兩軍及府縣曉示百姓任其修塞於戲昔漢文顧十室之産而天下乆安我太宗皇帝勤四海之理而帝業隆盛暨乎列聖罔不承式而歲代滋乆訛弊以生仍屬艱故未遑改作朕祗荷重器思臻大寧將正躬以立訓爰取新而革故咨爾百辟卿士外服侯衛其喻朕意永堅乃心無縱慾而敗度自底身於不類率是教典用交修焉布告中外咸使知悉上登極纔踰旬日蠧弊所革出自宸㫖中外慶抃見貞觀之風復行於今矣太和二年十月勑嶺南福建桂管邕管安南等道百姓禁掠賣餉遺前後勑制處分重疊非不分明近日衛中行李元志等雖云買致數實至多宜令本道舉行元和四年閏三月五日及八年九月十八日勑文切加約勒逐道各著判官一人專知即定名聞奏如已後發覺當重加貶降五年十月中書門下奏應屬諸使内外百司度支戸部鹽鐵在城及諸監院畿内并諸州監牧公主邑司等將徤官典所繇等准承前例皆令先具挾名勑牒州府免本身色役自艱難已後事或因循多無挾名自補置恣行影占侵害平人自元和二年長慶元年寳厯元年太和三年前后赦令約勒皆令條疏及勒具挾名聞奏所司竟未遵行姦弊日深須有釐革况聖王在上百度惟新内外有司悉心奉法改更制置今也其時臣等若又依違蒼生何由蘇息望合令本軍本使本司勘㑹㨿元勑元管數額合食衣糧資課糧料人具挾名補置年月鄉里分析聞奏此外不得更有影占自此之后有迯死補替仍每年終具替人挾名闕聞奏其挾名限勑下三箇月内聞奏畢左右神䇿六軍威逺營除請依餘一切委本軍條疎理訖具數聞奏其餘諸司諸使竝令御史臺勾當依限申奏仍切加訪察勿許因循從之七年七月勑諸道如有兵革水旱州府殘破及不存濟為逺近所知者除朝廷特有借賜外輙不得自請賞設錢物又諸道戎帥除替后倉庫便屬后人賞設三軍須待新使近日皆有留别賞給自行私惠頗紊朝章向後諸道節度觀察使除替后竝須待新使賞設不得更有留别九年十二月丁丑東川節度使馮宿奏准勑禁㫁印厯日版劔南兩川及淮南道皆以版印厯日鬻於市每歲司天臺未奏頒下新厯其印厯已滿天下有乖敬授之道故命禁之開成元年正月戊辰勑度支自此後不得收貯材木如或宣索即以其直市供諸色作料亦如之先是度支奏舊管右神策軍及諸色人假商人名中納材木計支賈直三十三萬二千四百餘貫所置材木並無至者御史臺推鞫皆王蟠受王守澄輩請託中納故有是命十二月戊申詔曰仕雜工商實因鬻爵尚須命使改以賜材其入蕃使舊例與私覿官十員宜停别與錢五十貫交令度支分付永為定例二年十月詔天后所撰十二字並却書其本字十二月丁未詔曰制服輕重必資典禮如聞徃者駙馬嘗為公主服三年縁情之義殊非故實違經之制今乃聞知宜令行杖用通制便為定議時駙馬杜悰以公主薨日近除官未謝帝問戸部侍郎李以近例奏聞因言士族不願為國戚蓋由此也帝聞之大驚遂遽下是詔三年九月癸未詔曰左右神䇿所奏將例改轉比多行牒中書門下便復奏處起今已後宜令軍司一一聞奏狀到中書然後撿勘進覆自開成初軍人奏官多不先聞奏轉遷相次僅無虗日至是方釐革之四年六月己丑中書門下奏請停堂厨捉錢官從之先是宰相厨廣召富人以飱錢散配息利謂之堂厨捉錢官影占富豪為弊日乆至是宰臣楊福請罷之武宗㑹昌元年正月赦節文每有過客衣冠皆求應接行李苟不供給必致怨尤刺史縣令但取虗名不惜百姓夫畜皆配民户酒食科率所由蠧政害人莫斯為甚宜委本道觀察使條疏量縣大小及道路要僻各置本錢逐月收利或前觀察使刺史前任臺省官不乘舘驛者許量事供給其錢便以留州留使錢充每至季冬申觀察使如妄破官錢依錢料配竝同入已贓論仍委出使御史紏察聞奏宣宗大中四年五月御史臺奏所在物産自有時價官人買賣合准時宜近日相承皆置供應戸既資影庇多是富豪州縣科差盡歸貧下不均害理為弊頗深自此已後委觀察使嚴加覺察宜竝禁㫁切慮諸道州府尚有此色諸各牒諸州府勘㑹巨細申臺以慿鞫理從之六年十二月勑准開元十三年八月十四日及太和八年二月十三日勑文𠢐耳稱寃先决四十然後依法勘當近日無良之徒等閒詣闕𠢐耳每驚勿聽皆為抱寃及令推窮多是虗妄若不止絶轉恣兇狂宜自今以後應有人欲論訴事自審㸔必有道理即任自詣闕及經臺府披訴當為盡理推勘不令受寃更不得輙有自卧皆𠢐耳前有犯者便准前勑處分後配流逺處縱有道理亦不為申明時御史臺奏覆驗稱寃人澹進通妄𠢐耳稱寃甘伏科罪故降是勑唐莊宗同光二年二月制鄉村糴貨斛斗及賣薪炭等物多被牙人於城外接賤糴買到房店増價邀求遂使貧困之家嘗買貴物稱量之際又罔平人宜令府縣及御史臺於諸門嚴切條疏不得更令違犯又國以人為本人困則國何所依人以食為天食艱則人何以濟蓋聞偽朝已來恣為掊歛至於雜色斛斗柴草受納倉塲邀頡人戸分外課求納一斗則二斗未充納一束則三束不充互相蒙蔽上下均分疲弊生靈莫斯為甚自今已後仰長吏選清强官吏充主納仍須嚴立條制以防姦欺兼具逐色所納加耗申奏當官者宜守於朝章力田者宜尊於王制苟容僥倖必亂規繩訪問富户田疇多投權勢影占縣州不敢科役貧下者更代征徭轉致彫殘最為蠧弊將安疲瘵須擇循良者明宗天成元年四月誅租庸使孔謙停租庸名額依舊為鹽鐡户部度支三司委宰臣豆盧革專判中書門下奏請停廢諸道監軍使内局司租庸院大程官出放猪羊柴炭户括田竿尺一依偽梁度制仍委節度使通田三司不得差使量撿州使公廨錢物先被租庸院一切管係今據數却還州府州府不得科率百姓先遇赦所放逋稅租庸違制徴收並與除放今欲曉告河南府及諸道准此施行從之九月都官員外郎于鄴奏請指揮不得書契劵輙賣良人從之二年六月詔以僧尼不歸寺院競占民舍以居之訛濫日甚勑除名額寺院外無堂殿佛像者竝勒毁之三年八月以山南西道乆從偽命有不益於國患於民者六事咸命除之是月帝聞隨鄧復郢均房之間父母骨肉有疾以竹竿遥致粥食於病者之側出嫁女父母有疾夫家亦不令知聞哀始奔喪者勑曰萬物之中人曹為貴百行之内孝道為先凡戴北辰竝遵皇化備聞南北多爽時風皆傾事鬼之心不守敬親之道於父母如此無行披日月何以立身弊乆積於鄉閭化全繇於長吏昔西門豹一縣令耳尚能投巫百姓保女子之愛絶河伯之虞㫁自一時傳於千古况位居侯伯化洽封廵豈不能宣北闕之風變南方之俗宜令逐處觀察使刺史丁寧曉告自今以後父母骨肉有疾者竝須日夕專切不離左右㸔侍使子奉其父母婦侍其舅姑弟不慢於諸兄姪不怠於諸父母如或不移故態老者卧病少者不勤事奉子女弟姪竝加嚴㫁出嫁女父母有疾不令知者當罪其夫及其舅姑閏八月吏部郎中何澤請廢户部蠲紙奉勑日月流行之處王人億萬之家既絶煩苛無濫力役唯忠孝二柄可以旌表户門若廣給蠲符深為弊事昨日所為地圖方域逐閏重疊上供州郡之中皆須厚斂而猶尋降誡束竝勒廢停今此倖端豈合更啟逐年蠲紙宜令削去四年六月己丑勑自天成纘紹之初曽降勑應隨駕竝内外將校職員許奏名銜當議遷陟俾行賞舊之恩以報惟新之命自後累據奏薦人數及多已經數載尚有奏陳既是論乞新恩豈宜積年申奏兼恐有後來補署纔改職名更望官員罔爭爵命若無止絶慮啟倖門此後諸州諸使不得更有論請新恩如是顯立功勞要行酬奬即委本處長吏特具奏聞酌其續效當議施行夫爵賞之權國家利器頃因多事散以賞功苟利社稷夫何愛焉近縁肆赦萬方陪臣例許陞轉且聞亂離已前諸節度州職掌自兵馬使已上或因立效或遇覃恩許奏乞憲銜每使不過十數人矣軍府有額守之不踰自偽梁已還侯伯無考秩每將去任遷補不常至於守門掌庫簡札小胥卜祝優倡例稱轅門劇職奏請天命少則二三百通多則五六百通三公八座之秩徃徃有焉金章紫綬不間於小胥賤吏於此之中猶多謬濫帝知其事故令止之長興元年七月勑訪聞諸道州縣官自衒虗名不惜人戸皆於省限已前行帖催驅須令人戸貴買充納且徴科租賦乃是常規所務事集人安不必急徴暴斂况累降勑命非不丁寧只據規程勿令踰僣此後為徴科事辦亦不酬勞本州不得申奏如違限稽慢即准條䟽責罰如灼然添得廨署招得流民無害於公私者可具事繇申奏固得特行優奬初同光時租庸使孔謙起自胥徒不知大體方中原未平所利財賦辦集乃奏請州縣官有徴科先可者則行恩奬或與撿校官或賜章服繇是長吏競為苛刻於省限前卒徴暴歛以希曲恩或蠶未繭而欲絲麥初芒而督稅皆出利求取其費數倍人皆哭泣而末訴自天成已來猶仍舊轍長吏以此成風計司奏請無已時政懲其如是屢奏改革猶未能杜其倖門惜哉又勑京百司不許影庇州縣户人虗出課利二年四月夏詔罷州縣官到任後率斂為地圖五月詔曰近聞百執事等或親居内職或貴列廷臣或宣逹君恩或勾當公事經繇列鎮干撓諸侯指射職員安排親昵或潜申意㫖或顯發書題自今之後一切止絶有所犯者發薦人貶官求薦人流配如逐處長吏自徇人情只仰被替人詣闕上訴長吏罰兩月俸發薦人加一等被替人却令依舊末帝清泰二年五月庚戌詔曰朕聞竒伎滛巧増費損功古先哲王嘗戒其事朕憲章百代臨御萬方以其欲致延洪必絶驕奢之漸將期富庶須除蠧耗之原每務實以去華期化民而成俗近者諸色進奉寳裝龍鳯雕鏤刺作組織之異曾經釐革尚敢踰違宜在舉行貴於遵守今後此色物諸處不得進奉所繇司不得輙通晉髙祖天福元年閏十一月壬午勑曰竒伎滛巧徃誥不容務實去華哲王所尚應有浮虗假偽之物不得鬻於市肆委所在嘗加覺察犯者重加刑責二年九月將作少監髙鴻漸奏伏覩近年已來士庶之家死喪之苦當殯𦵏之日被諸色音聲伎藝人等作樂求覔錢物伏乞顯降勑文特行止絶或所在官吏等通容不與覺察請行朝典勑喪𦵏有期哀情慘極其或舉樂可謂乖儀始因伎藝苟求遂致澆訛漸起所陳章疏頗正時風宜下有司永令止絶十月詳定院奏前洺州鷄澤縣主簿范恕進策五件可行者有二其一云伏見諸道行遣公事皆有前後通規定知後所繇置逓符脚力每遇緩急嘗遣徃來既有嚴程孰敢慢事近日州使多差牽攏散從承符歩探官等下縣追督公事始發一替專人又致續催使者事則一件兩件使乃五人七人非唯剥削蒸黎實為撓煩縣邑及官吏無暇區分庶事唯當祗奉專人如此弊訛特望條貫若令佐稍虧職分或後公期顯有憲章請行法典其二曰自前兩稅徴賦已立三限條流官員懼殿罰之威節級畏科懲之罪苟非水旱敢怠區分未嘗有不了之州何處是不前之縣臣今覩諸道省限未滿州使先追仍勒官員部領胥徒云與倉庫㑹探務行誅剥因作瘡痍全無軫恤之心但資貪求之意外邑所繇等不免牽費非理盤纒例總破家皆聞迯役自今之後伏乞只慿倉庫納數㸃算便即委知仍取縣司申聞勘㑹以明同異若實違省司期限請依常典指揮㑹探之名特乞停寢者臣等叅詳范恕所陳事件要絶煩苛當務息民以俾求理誠為允當望賜施行從之少帝開運二年秋左諫議大夫李元龜奏請禁止天下僧尼典買院舍從之晉髙祖天福十二年左衛將軍許敬遷奏臣伏見天下鞍轡器械竝取契丹様裝餙以為美好安有中國之人反效異域之俗請下明詔毁棄須依漢境舊儀勑曰近年中華兆人浮薄不依漢禮却慕殊風果致狂兵來侵諸夏應有契丹様鞍轡器械服裝等竝令逐處禁㫁隱帝乾祐二年國子司業樊倫上言游惰之民多歸僧舍朝廷用兵須豐軍食請三五年間止絶僧尼戒壇兼禁私行剃度從之乾祐三年九月甲申詔諸道州府自行軍副使已下至令録佐掾不得於本部内影庇人戸名為伏事自是州縣舊舎職役人除籍放之周太祖廣順元年正月制天下諸侯皆有親校自可慎擇委任當必禆奉朝廷若更别差理或未當宜矯前失庶恊通規其先於在京諸司差軍將充諸州郡元從都押衙孔目官内知客等竝可停廢三月壬申勑前朝於諸州府差散從親事官等前朝創置蓋岀權宜苟便一時本非舊貫近者徧詢羣議兼採封章具言前件抽差於理不甚允當一則碍州縣之色役一則妨春夏之耕耘貧乏者困於供須豪富者幸於影庇既為煩擾須至改更况當東作之時宜罷不急之務其諸州所在差散從親事官竝宜放散自遂田農自去年四月已前州縣元管係人數一切如舊其逓舖如已前招到者且仰仍舊今後更不得招召其諸處塲院竝不得影庇兩稅人户所有河北諸州及澤潞晉絳磁隰解等州於先差散從親事官内選到弓箭手只且留在本州管係其餘放散先是漢隠帝於諸州府百姓内差親事散從官乂差力及户充逓舖又下三司諸塲務召百姓替占役兵士帝心知其不便乃下詔革焉公私便之四月皇子鎮寕軍節度使榮即世宗言屬州帳内有羊猪紙炭等户并羊毛紅花紫草及進奉官月科竝是影占大户凡差役者是貧下户今竝欲放免為散户詔褒之曰卿作鎮王畿留心政道雖米鹽細務不懈於躬親而㑹斂無名盡思於蠲放能恵窮困深恊眷懐已降宣命指揮使竝放為散戸二年四月勑諸縣鎮令佐鎮將不得乞年許人糾告八月甲午勑諸州縣吏民緇黄繼來詣闕留舉刺史縣令牧宰之任委寄非輕繫烝庻之慘舒布朝廷之條法若亷勤奉職撫字及民自有政聲逹於朝聰何勞民庶逺致舉留既妨農養之時又耗路途之費所宜釐革免致勞煩今刺史縣令顯有政能觀察使審詳事狀朝廷當議奬昇百姓僧道更不舉請一切止絶十月庚申詔諸州或罷任或朝覲不得以器械進貢先是諸道州府各有作院每日課定造軍器逐季般送京師進納其逐州每年占留係省資金不少謂之甲科仍更於本部内廣配土産物又徴斂數倍部民苦之除上供軍器外節度使刺史又私造器甲以進貢為名功費又倍悉取之於民户帝以諸州上供器甲造作不精兼占留屬省物用過多乃令罷諸州作院詔藩侯郡牧罷貢器甲仍選擇諸處作工赴京作坊以備役使辛丑詔諸道州府所差知館驛人不得於縣界别差人戸貼助致擾貧民十一月丙午勑曰古者封樹之制定喪𦵏之期著在典經是為名教洎乎世俗衰薄風化陵遅親殁而多闕送終身後而便為無主或覊束於仕宦或拘忌於隂陽旅櫬不歸遺骸何託但以先王埀訓孝子因心非以厚𦵏為賢只以稱家為禮掃地而祭尚可以告䖍負土成墳所貴乎盡力宜頒條令用警因循庶使九原絶抱恨之魂千古無不歸之骨搢紳人士當體兹懷應内外文武臣寮幕職州縣官選人等今後有父母祖父母亡殁未經遷𦵏其主家之長不得輙求仕進所繇司亦不得申舉解送如是卑㓜在下者不在此役其合赴舉選者或是𦵏事禮畢或是卑㓜在下勒於納家狀内具言不得罔冒宜令御史臺及逐處長吏本司長官所繇司覺察紏舉違犯者當行典憲如是不切覺察縱任罔冒罪在紏舉司其中有兵戈阻隔或是朝廷特恩除拜起復追徴及内外官職員皆以金革從事竝不拘此例所有勑前見任職員官今年舉選人等不在紏舉之限是月鳳翔言義州蕃部買牛入蕃多是宰殺乞止絶㳂路州縣道路百姓不得殺牛貨賣與蕃人從之二年五月勑牓宋州曉諭管内諸縣民等省節度使嘗思所進絲四萬一千四百七兩言出放在民例以五月内徴納其絲竝還元契除放如已納到者委廵檢使柴進據使追戸責領歸牓到速告報知委世宗顯徳三年十一月勑廢天下淫祠仍禁擅興祠宇如有功績灼然合建置廟貌者奏取處分自是諸道奏不合典禮而享廟食者咸毁之五年正月尅復淮南詔免濠泗楚海揚康滁和等州管内罪人及蠲其殘稅轉徴科率之物先是州人於兩税外以茗茶及鹽抑配户民令輸縑帛稻米以充其直謂之轉徴又歲率羊彘薪炭之類人甚苦之帝以尅復之始悉命除放民情悦甚允蘇之望册府元龜卷一百六十
