body:
  text: 册府元龜卷八百十四宋王欽若等撰總録部讓周禮大司徒以陽禮教讓則民不爭故先王之訓也觴酒豆肉讓而受惡袵席之上讓而坐下朝廷之位讓而就賤若太伯伯夷之倫仲尼曰可謂至德又曰古之賢人此其大者昭昭然掲日月而行也其餘官秩之命封爵之拜或推之於賢者或移之於所親或堅辭不當或固與乃受皆可以崇亷耻之道激趨競之俗垂於方䇿爲之大訓孟子所謂聞伯夷之風頑夫亷懦夫有立志者斯之謂也吳太伯武王追封爲吳伯故曰吳太伯太伯弟仲雍皆太王之子而王季歴之兄也季歴賢而有聖子昌太王欲立季歴以及昌於是太伯仲雍二人乃奔荆蠻文身斷髪示不可用以避季歴果立是爲王季伯夷叔齊孤竹君之二子也父欲立叔齊及父卒叔齊讓伯夷伯夷曰父命也遂逃去叔齊亦不肯立而逃之國人立其中子鮑叔牙齊人也桓公使爲宰鮑叔辭曰臣君之庸臣也君有加惠於其臣使臣不凍饑則是君之賜也若必治國家則非臣之能也其唯管夷吾乎臣之所不如管夷吾者五寛惠愛民臣不如也治國不失秉臣不如也秉柄也柄所以操作事國秉者賞罰又繩要也忠信可結於諸侯臣不如也禮義可法於四方臣不如也介胄執枹立於軍門使百姓皆加勇臣不如也枹撃皷椎夫管子民之父母將欲治其子不可棄其父母陳完字敬仲陳公子也齊侯欲使爲卿辭曰羇旅之臣羇竒也旅客也幸若獲宥及於寛政宥赦也赦其不閑於教訓而免於罪戾弛於負擔弛去離君之惠也所獲多矣敢辱髙位以速官謗請以死告以死自誓使爲工正宋公子目夷宋桓公子也桓公疾太子茲父固請曰目夷長且仁君其立之兹父襄公也目夷兹父庻兄子魚也公命子魚子魚辭曰能以國讓仁孰大焉臣不及也且又不順立庻不順禮遂走而退子良鄭穆公庻子也公子宋子公也與子家公子歸生也弑靈公靈公穆公子也鄭人立子良辭曰以賢則去疾不足去疾子良名也以順則公子堅長乃立襄公襄公堅也趙衰晉大夫爲卿辭曰欒枝貞愼先軫有謀胥臣多聞皆可以爲輔臣弗若也乃使欒枝將下軍先軫佐之取五鹿先軫之謀也卻縠卒先軫代之胥臣佐下軍公子臧曹宣公之子也宣公卒兄負芻殺太子而自立諸侯討而執之歸諸京師諸侯將見子臧於王而立之子臧辭曰前志有之曰聖達節聖人應天順命不拘常節次守節謂賢者下失節愚者妄動爲君非吾節不能聖敢失守乎遂逃奔宋句須魯施氏之家臣也鮑國去鮑氏而來爲施孝叔臣施氏卜宰句須吉卜立家宰施氏之宰有百室之邑與句須邑使爲宰讓鮑國而致邑焉施孝叔曰子實吉對曰能與忠良吉孰大焉鮑國相施氏忠故齊人取以爲鮑氏後子叔聲伯魯大夫宣公弟叔肸之子公孫嬰齊也初叔孫僑如欲去季氏譛文子於晉晉人執之郤犫之妻聲伯外妹故魯成公使聲伯如晉謝郤犫欲與之邑弗受歸鮑國謂之曰子何以辭苦成叔之邑信讓耶抑知其不可耶對曰吾聞之不厚其棟不能任重重莫如國棟莫如德夫苦成家欲任兩國無大德其不在也亡無日矣譬之如疾余恐易焉苦成氏有三亡少德而多寵位下而欲上政無大功而欲大禄皆怨府也其君驕而多私勝敵而歸必立新家其身之不能定焉能予人邑鮑國曰我信不若子若鮑氏有釁吾不圖矣今子圖遠以讓邑必常立矣吳季札吳子乘之子也乘卒長子諸樊立既除喪將立季札札諸樊少弟季札辭曰曹宣公之卒諸侯與曹人不義曹君曹君公子負芻也殺太子而自立事在成十三年將立子臧子臧去之遂弗爲之以成曹君君子曰能守節君義嗣也諸樊適子故曰義嗣誰敢奸君有國非吾節也札雖不才願附於子臧以無失節固立之棄其室而耕乃舍之傳言季札之讓原季晉大夫文公使爲卿辭曰夫三德者偃之出也以德紀民其章大矣不可廢也三德謂勸文公納襄王以示民義伐原以示信大蒐以示民禮也偃狐偃也使狐偃爲卿辭曰毛之智賢於臣其齒又長毛偃之兄毛也不在位不敢聞命乃使狐毛將上軍狐偃佐之狐毛卒使趙衰代之辭曰城濮之役先且居之佐軍也善軍伐有賞伐功也善君有賞能其官有賞且居有三賞不可廢也且臣之倫箕鄭胥嬰先都在倫出也三子晉大夫乃使先且居將上軍公曰趙衰三讓其所讓皆社稷之衛也廢讓是廢德也以趙衰之故蒐于清原作五軍使趙衰將新上軍箕鄭佐之胥嬰將新下軍先都佐之韓獻子爲晉上卿告老公族穆子有廢疾穆子韓厥長子成十八年爲公族大夫將立之代厥爲卿辭曰詩曰豈不夙夜謂行多露詩言雖欲早夜而行懼露之濡已義取非禮不可妄也又曰弗躬弗親庻民弗信詩小雅譏在位者不躬親政事則庻民不奉信其命言已有疾不能躬親政事無忌不才讓其可乎請立起也無忌穆子名起無忌弟宣子也與田蘇㳺而曰好仁田蘇晉賢人蘇言起好仁詩曰靖共爾位好是正直神之聽之介爾景福靖安也介即也景大也是小雅言君子當思不出其位求正直之人與之並立如是則神明順之致大福也恤民爲德靖共其位所以恤民正直爲正正已心正曲爲直正人曲參和爲仁德正直三者備乃爲仁如是則神聽之介福降之立之不亦可乎言起有此三德庚戌使宣子朝遂老韓厥致仕晉侯謂韓無忌仁使掌公族大夫士匄晉大夫襄公十三年荀罃士魴卒晉侯蒐于綿上以治兵爲將命軍帥也必蒐而命之所以與衆共使士匄將中軍辭曰伯㳺長伯㳺荀偃昔臣習於知伯是以佐之非能賢也七年韓厥老知罃代將中軍士匄佐之匄今將讓故謂爾時之舉不以已賢事見九年請從伯㳺荀偃將中軍代荀罃士匄佐之位如故使韓起將上軍辭以趙武又使欒黶以武位卑故不聽更命黶辭曰臣不如韓起韓起願上趙武君其聽之使趙武將上軍武自新軍超四等代荀偃韓起佐之位如故欒黶將下軍魏絳佐之黶亦如故絳自新軍佐超一等代士魴新軍無帥將位皆在晉侯難其人使其什吏率其卒乘官屬以從於下軍禮也得慎舉之禮晉國之民是以大和諸侯遂睦君子曰讓禮之主也范宣子讓其下皆讓欒黶爲汰弗敢違也晉國以平數世頼之刑善也夫張老晉大夫悼公使爲卿辭曰臣不如魏絳夫絳之志能治大官其仁可以利公室不忘其勇不疾於刑其學不廢先人之職不在卿位外内不平且雞丘之會其官不犯而辭順不可不賞也公五命之固辭乃使爲司馬使魏絳佐新軍公子啟楚昭王兄也楚子在城父將救陳卜戰不吉卜退不吉王曰然則死也冄敗楚師不如死前已敗於柏舉今若退還亦是敗棄盟逃讐亦不如死死一也其死讐乎命公子申爲王不可則命公子結亦不可則命公子啟子西結子期啟閭皆昭王兄五辭而後許將戰王有疾王攻大𡨕卒於城父大𡨕陳地呉師所在子閭退曰君王舍其子而讓羣臣敢忘君乎從君之命順也從君許立立君之子亦順也二順不可失也與子西子期謀潛師閉塗逆越女之子章立之而後還潛師宻發也閉塗不通外使也越女昭王妾章惠公子郢衛靈公子也初衛侯逰於郊子南僕子南子郢也僕御也公曰余無子將立女蒯瞶奔無太子不對他日又謂之對曰郢不足以辱社稷君其改圖君夫人在堂三揖在下三揖卿大夫士君命祗辱言立適當以禮與内外同之今君私命事必不從適爲辱公卒夫人曰命公子郢爲太子君命也對曰郢異於他子言用意不同且君没於吾手若有之郢必聞之言當以臨死爲正且亡人之子輒在輒蒯瞶之子出公也靈公適孫乃立輒齊淳于髠齊王欲以傅太子髠辭曰臣不肖不足以當此大任也王不若擇國之長者而使之漢張良初以成信侯從漢王漢王六年封功臣良未嘗有戰鬬功高帝曰運籌帷幄中决勝千里外子房功也自擇齊三萬戸良曰始臣起下邳與上會畱此天以臣授陛下陛下用臣計幸而時中臣願封畱足矣不敢當三萬戸乃封良爲畱侯韋元成宣帝時爲大河都尉今東平郡本爲齊東郡後王國除入河郡𤣥成兄宏爲太常丞職奉宗廟典諸陵邑煩劇多罪過父賢以宏當爲嗣故勑令自免恐其有罪見黜妨爲繼嗣故令以疾去官也宏懐謙不去官謂若欲代父爲侯故避謙不肯也以賢病篤宏竟坐宗廟事繋獄罪未决室家問賢當爲後者賢恚恨不肯言於是賢門生博士義債等與宗家計議博士姓義名債也宗家賢之同族也共矯賢令使家丞上書言大行爲文書於大行以言其事也以太河都尉𤣥成爲後賢薨𤣥成在官聞䘮又言當爲嗣𤣥成深知其非賢雅意即陽爲病狂臥便利妄笑語昬辭便利大小便徵至長安既葬當襲爵以狂不應召大鴻臚奏狀章下丞相御史案驗𤣥成素有名聲士大夫多疑其欲讓爵辟兄者案事丞相御史乃與𤣥成書即案驗𤣥成事者曰古之辭讓必有文義可觀故能垂榮於後今子獨壊容貎蒙耻辱爲狂癡光曜晻而不宣㣲哉子之所託名也名聲名也僕素愚陋過爲宰相執事過謬也願少聞風聲不然恐子傷高而僕爲小人也𤣥成友人侍郎章亦上疏言聖王貴以禮讓爲國宜優養𤣥成勿枉其志使得自安衡門之下衡門謂横一木於門上貧者之所居也而丞相御史遂以𤣥成實不病劾奏之有詔勿劾引拜已受爵宣帝高其節以𤣥成為河南太守兄宏太山都尉張延壽歴位九卿既嗣侯國在陳畱别邑在魏郡租入歲千餘萬延壽身自以無功德何以能久堪先人大國數上書讓減戸邑又因弟陽都侯彭祖口陳至誠天子以為有讓乃徙封平原并一國戸口如故而租税减半後漢朱鮪為更始大司馬更始封為膠東王鮪辭曰臣非劉宗不敢干典遂讓不受乃徙鮪為左大司馬郭丹更始二年為諫議大夫更始敗歸鄉太守杜詩請為功曹丹薦鄉人長者自代而去詩乃嘆曰昔明王興化卿士讓位今功曹推賢可謂至德勑以丹事編署黄堂以為後法黄堂太守之㕔事梁綂字仲寧安定烏氏人也更始二年召補中郎將使安集凉州拜酒泉太守會更始敗赤眉入長安綂與竇融及諸郡守起兵保境謀共立帥初以位次咸共推綂固辭曰昔陳嬰不受王者以有老母也今綂内有尊親又德薄能寡誠不足以當之遂共推融為河西大將軍桓榮為議郎建武中博士缺帝欲用榮榮叩頭讓曰臣經術淺薄不如同門生郎中彭閎揚州從事臯宏帝曰俞往女諧桓郁榮子也以父任為郎榮卒郁當襲爵上書讓於兄子况明帝不許不得已受封悉以租入與之王閎樂浪郡人為郡三老更始敗士人王調殺郡守劉憲自稱大將軍樂浪太守建武六年光武遣太守王遵將兵撃之至遼東閎與郡功曹史楊邑等殺王調迎遵皆封為列侯閎獨讓爵帝竒而徵之道病卒杜詩為南陽太守詩自以無勞不安久居大郡求欲降避功臣乃上疏曰陛下亮成天工克濟大業偃兵修文羣帥反旅反旅謂班師也海内恊和萬世蒙福天下幸甚唯匈奴未譬一猶曉也聖德威武二垂二垂謂西與北也陵虐中國邉民虛耗不能自守臣恐武猛之將雖勤亦未得辭甲櫜弓也夫勤而不息亦怨勞而不休亦怨怨恨之師難復責功臣伏覩將帥之情功臣之望冀一休足於内郡休足止行役也然後即戎出命不敢有恨臣愚以爲師克在和不在衆陛下雖垂念北邉亦當頗泄用之泄猶離也昔湯武善御衆故無忿鷙之師鷙撃也無忿怒而撃也陛下起兵十有三年將帥和睦士卒鳬藻言其和睦歡悦如鳬之戯於水藻也今若使公卿郡守出於軍壘則將帥自厲士卒之復復謂優寛也比於宿衛則戎士自伯士卒得比於郎則人百其勇何者天下已安各重性命大臣以下咸懐樂土不讐其功而厲其用無以勸也陛下誠宜虛缺數郡以侯振旅之臣重復厚賞加於乆役之士如此緣邉屯戍之師競而忘死乘城拒塞之衆不辭其勞則烽火精明守城堅固聖王之政必因人心今猥用愚薄塞功臣之望誠非其宜臣詩伏自惟忖本以史吏一介之才遭陛下創制大業賢俊在外空乏之間超受大恩牧養不稱奉職無效乆竊禄位令功臣懐愠誠惶誠恐八年上書乞避功德陛下殊恩未許放退臣詩蒙恩尤深義不敢茍冐虛請誠不勝至願願退大郡受小職及臣齒壯力能經營劇事如使臣詩必有補益復受大位雖析珪受爵所不辭也惟陛下哀矜帝惜其能遂不許之范升字辨卿代郡人也建武二年爲議郎遷博士上疏讓曰臣與博士梁恭山陽太守吕羗俱修梁丘易二臣年竝耆艾經學深明而臣不以時退與恭並立深知羗學又不能逹慙負二老無顔於世誦而不行知而不言不可開口以爲人師推博士以避恭羗帝不許然由是重之鍾興字次文汝南汝陽人也光武時爲中郎將詔以經授皇太子又使宗室諸侯從興受章句封關内侯興自以無功不敢受爵帝曰先教訓太子及諸王侯非大功邪興曰臣師丁恭於是復封恭而興遂固辭不受爵卒於官丁鴻字孝公潁川定陵人鴻父綝建武中爲河南太守以功封陵陽侯初綝從世祖征伐鴻獨與弟盛居憐盛幼小而共寒苦及綝卒鴻當襲封上書讓國於盛不報既葬乃挂縗絰於冡廬而逃去畱書與盛曰鴻貪經書不顧恩義弱而隨師生不供養死不飯含皇天先祖並不佑助身被大病不任茅土前上疾狀願辭爵仲公仲公盛字也章寢不報廹且當襲封甘自放棄遠求良醫如遂不瘳永歸溝壑後同學鮑駿責以大義乃還就國鄧彪字智伯南陽人也父邯中興初以功封鄳侯仕至渤海太守彪少勵志修孝行父卒讓國於異弟荆鳳明帝高其節下詔許焉後終於太傅録尚書事劉愷字伯豫愷父般爲宗正封居巢侯卒愷當襲爵讓與弟憲遁逃避封乆之章和中有司奏絶愷國章帝美其義特優假之愷猶不出積十餘年至永元十年有司復奏之侍中賈逵尚書言之詔特聽焉後爲太尉李郃爲司徒時北鄉侯病郃隂與少府陶範等謀立順帝會孫程等事先故郃功不顯明年䇿免將作大匠翟酺上郃潛圖大計以安社稷於是録隂謀之功封郃渉都侯辭讓不受徐衡父防封龎鄉侯卒衡當嗣讓封於其弟崇數歲不得已出就爵郭賀太傅鎮之子也鎮封定潁侯及卒賀以長子當嗣爵讓與小弟時而逃去積數年詔大鴻臚下州郡追之賀不得已乃出受封累遷至廷尉陳重子景公豫章宜春人也少與同郡雷義爲友俱學魯詩顔氏春秋太守張雲舉重孝亷重以讓義前後十餘通記雲不聽義明年舉孝亷重與俱在郎署後俱拜尚書郎義坐事黜退重見義去亦以病免一曰雷義舉茂才讓於陳重刺史不聽義遂陽狂被髪走不應命鄉里爲之語曰膠漆自謂堅不如雷與陳耿國牟平侯况子也建武中爲駙馬都尉父况卒國於次當嗣上疏以先侯爵少子霸固自陳讓詔許焉桓焉爲太常順帝爲皇太子被廢焉與太僕來歴諫之不能得後順帝即位以焉前廷議守正封陽平侯固讓不受楊賜爲太尉免後桓帝得賜所上張角奏賜初爲司徒上言張角滋暴攻刧州縣簡别流民以孤其勢事畱中及前侍講注籍乃感悟詔封臨晉侯邑千五百户賜與太尉劉寛司空張濟並入侍講自以不宜獨受封賞上書願分户邑於寛濟帝嘉歎復封寛及濟子魏王修北海營陵人也初平中北海孔融召爲主簿舉孝亷修讓邴原融不聽融集有融答修教曰原之賢也吾知之以昔高陽氏有才子八人堯不能用舜實舉之原可謂不患無位之士以遺後賢不亦可乎修重辭融答曰掾清身㓗己歴世艱難謀而鮮過惠訓不倦余嘉乃勲應乃懿德用先爾于王廷其可辭乎時天下亂遂不行後爲太常蔡邕陳畱外黄人也同郡申屠蟠有節行邕深重之及被州辟乃辭讓之曰申屠蟠禀氣𤣥妙性敏心通喪親盡禮幾於毁滅至行美義人所鮮能安貧樂潛味道守真不爲燥濕輕重不爲窮逹易節方之於邕以齒則長以德則賢後郡召爲主簿不行崔琰清河東武城人也初爲武帝東曹掾記讓曰徵士邴原議郎張範皆秉德純懿志行忠方清靜足以厲俗貞固足以幹事所謂龍翰鳳翼國之重寳舉而用之不仁者遠吳嚴畯字曼才彭城人也張昭進之於大帝帝以爲騎都尉從事中郎及横江將軍魯肅卒帝以畯代肅督兵萬人鎮據陸口衆人咸爲畯喜畯前後固辭曰樸素書生不閑軍事非才而據咎悔必至發言慷慨至於流涕帝乃聽焉世嘉其能以實讓陳表字文奥武之庶子也爲偏將軍從撃合肥戰死後追録功臣封表兄修爲都亭侯修卒乃封表爲都亭侯以繼舊表皆陳讓乞以傳修子延大帝不許晉荀崧爲尚書右僕射從弟馗早亡二息序廞年各數歲崧迎與共居恩同其子太尉臨淮公荀顗國嗣廢絶朝廷以崧近屬欲以崧子襲封崧哀序孤㣲乃議封與序論者稱焉衛瓘爲征北大將軍以功封一子亭侯瓘乞以封弟未受命而亡子宻受封爲亭侯瓘六男無爵悉讓二弟遠近稱之裴頠爲國子祭酒兼右軍將軍其兄子憬爲白衣頠論述世勲賜爵高陽亭侯楊駿之誅也以功當封武昌侯頠請以封憬帝竟封頠次子該頠苦陳憬本承嫡宜襲鉅鹿先帝恩旨辭不獲命武昌之封已之所蒙特請以封憬該時尚主故帝不聽頠後爲侍中遷尚書侍中如故加光禄大夫每受一職未曾不殷勤固讓表疏十餘上博引古今成敗以爲言覧之者莫不寒心馮恢父爲宏農太守愛少子淑欲以爵傳之恢父終服闋乃還鄕里結草爲廬陽瘖不能言淑得襲爵顧衆吳郡吳人爲鄱陽太守王敦搆逆欲以爲吳興内史衆固辭舉吏部郎桓彛亦讓衆事並不行熊遠字孝文有志尚縣召爲功曹不起強與衣幘扶之使謁十餘日薦於郡由是辟爲文學掾遠曰辭大不辭小也固請留縣前燕陽騖仕慕容暐爲太尉慨然而歎曰昔嘗林徐邈先代名臣猶以鼎足任重而終辭三事以吾虛薄何德以堪之固求罷職言甚懇至暐優答不許前秦王猛仕苻堅爲冀州牧堅召猛爲丞相猛至長安加都督中外諸軍事猛辭讓再三堅不許後爲尚書令轉司徒録尚書事猛辭以無功不拜其後數年復授司徒猛復上疏曰臣聞乾象盈虛惟后則之位稱不才官非則曠鄭氏翼周仍世載詠王叔昧寵政替身亡斯則成敗之殷監爲臣之烱戒竊惟鼎宰崇重叅路天階宜妙盡時賢對揚休命魏祖以文和爲公貽笑孫后千秋以一言致相匈奴哂之臣何庸狷而應斯舉不但取嗤鄰遠實令爲虜輕秦昔東野窮馭顔子知其將弊陛下不復料度臣之才力私懼敗亡是及且上虧憲典臣何顔處之雖陛下私臣其如天下何願廻日月之鑒矜臣後悔使上無過授之謗臣蒙覆燾之恩堅竟不從宋蔡景𤣥興宗子也興宗薨遺令薄葬奏還奉爵追贈後授景𤣥固辭不受又奏還封表疏十餘上見許詔曰景𤣥表如此故散騎常侍中書監左光禄大夫開府儀同三司樂安縣開國伯興宗忠恪立朝謀猷宣著徃屬時難勲亮帷幄錫珪分壤實允通誥而懇誠慊訢備彰存没亷槩素情有絜聲軌景𤣥固陳先志良以惻然雖彛典宜全而哀欵難奪可特申不瞑之請永矜克讓之風孔顗會稽山隂人初爲衡陽王義季安西主簿領南義陽太守轉署記室奉牋固辭曰記室之局實惟華要自非文行秀敏莫或居之顗遜業之舉無聞於鄉部惰逰之貶有編於疲農直山淵藏引用不遐棄故得抃風撫潤憑附彌年今日之命非所敢冐昔之學優文富猶尚斯難况顗能薄質魯亦何容易顗聞居方辨物君人所以官才陳力就列自下所以奉上顗雖不敏嘗服斯言今寵藉惟舊舉非尚德恐無以提衡一隅僉允視聽者也伏願皇天明炤其心乞改今局授以閒曹則鳬鶴從方所憂去矣又曰夫以記室之要且須通才敏思加性情倫宻者顗學不綜實性又疏惰何可以屬之祕記秉筆文閨假吹之尤方所非濫顗少淪常簡本無遠植榮進之願何能忘懐若實有螢爝增暉光景固其騰聲之日飛藻之辰也豈敢自求從容保其淡逸伏願矜其魯拙業之有地則曲成厚施終始優渥義季不能奪遂得免南齊吳達之義興人也少有義行爲鄉里所稱郡命爲主簿固以讓兄又讓世業舊田爲族弟弟亦不受田遂閒廢建元二年詔表門閭禇賁淵之長子也建元初爲侍中淵卒上表稱疾讓封與弟蓁永明八年蓁改封巴東郡侯明年表讓封還賁子霽詔許之梁陽公則爲中䕶軍寜都侯公則卒子㬓嗣有罪國除高祖以公則勲臣特詔聽庻長子晀嗣晀固讓歴年乃受後魏李承字伯業鎮國大將軍燉煌公寳之子也太武時爲爵姑臧侯寳卒承應傳先封以自有爵乃讓弟茂時論多之文成時爲龍驤將軍滎陽太守卒裴詢爲散騎常侍時大邑中正闕司徒召詢爲之詢族叔昞自陳情願此官詢遂讓焉時論善之封萬䕶父勑文爲鎮西將軍賜爵天水公獻文天安元年五月卒萬䕶以長子讓爵於弟翰於時讓者唯萬䕶及元氏侯趙辟惡子元伯讓其弟次興朝廷義而許之王肅爲輔國將軍長史賜爵開陽伯肅固辭伯爵許之崔光韶初除奉朝請與弟光伯䨇生操業相侔特相友愛遂經吏部尚書李冲讓官於光伯辭色懇至冲爲奏聞孝文嘉而許之太和二十年以光韶爲司空行叅軍復請讓從叔和曰臣誠㣲賤未登讓品屬逢唐朝耻無讓德和亦謙退辭而不當孝武善之遂以和爲廣陵王國常侍崔光爲侍中領著作與李彪共撰國書光以彪意在專功表觧侍中著作以讓彪宣武不許其子勵除祕書郎中以父光爲著作固辭不拜路侍慶陽平清淵人有幹用與廣平宋飜俱知名爲鄉閭所稱相州刺史李安世並表薦之太和中除奉朝請侍慶以從兄文舉有才望因推讓之孝文遂並拜焉盧同爲撫軍將軍兄綉少多大言嘗云公侯可致至此始爲都水使者同啟求迴身二階以加琇遂除征安州刺史論者稱之竇瑗字世珍遼西雒陽人也爲爾朱榮北道大行臺左丞從榮東討葛榮事平封容城縣開國伯邑五百戸後除征虜將軍通直散騎常侍仍左丞瑗乞以容城伯讓兄叔珍詔聽以新書男轉授之叔珍由是位至太山太守李謐相州刺史晏世之少子好學博通諸經以公子徵拜著作佐郎辭以授弟郁詔許之盧道將字祖應祕書監淵之長子淵卒襲父爵固安伯而讓其第八弟道舒有司奏聞詔曰長嫡承重禮之大經何得輙授也而道將引清河國王常侍韓子熈讓弟仲穆魯陽男之例尚書李平重申奏詔乃聽後爲燕郡太守司徒司馬韓子熈麒麟之子爲清河王懌郎中令初麒麟以爵讓弟顯宗不受子熈緣父素懐卒亦不襲及顯宗卒子熈别蒙賜爵讓弟仲穆北齊叚韶爲武衞將軍封下雒縣男後以恩賜父榮姑臧縣侯其下雒縣男啟讓繼母弟寜安文宣受禪别封霸城縣侯韶讓其繼母弟孝言論者羙之司馬子如爲太尉兄子膺之自尚書郎歴中書黄門郎子如别封須昌縣公廻授膺之封隆之爲儀同三司表以先爵富城子及武城子轉授弟子孝琬等朝廷嘉而從之李元忠爲太常卿殷州大中正後以從兄瑾年長以中正讓之後周楊寛事魏爲華州别駕孝莊反正拜華州大中正封澄城縣伯孝武末請以澄城縣伯讓兄穆詔許之陸通吳郡人也父政爲文帝行臺左丞原州長史封爵中都縣伯通以軍功又别封都昌伯及政卒乃讓父爵中都縣伯令弟逞襲之隋乞伏慧馬邑鮮卑人也爲大將軍豫平尉遲逈功進位柱國賜爵西河郡公邑二千戸賚物二千二百叚請以官爵讓兄朝廷不許論者義之楊文思父寛開皇初爲左光禄大夫封正平郡公文思當襲父爵自以非嫡遂讓封於弟文紀當世多之唐徐世勣父盍爲上柱國舒國公詔宜封濟隂郡王食邑五千户盍後竟辭王爵許之劉審禮刑部尚書彭城郡公德威之子貞觀中爲左驍衞郎將丁父憂服闋當襲爵累表讓弟朝議不許許誡惑當襲爵讓弟誡言誡言固辭竟封誡惑制曰鴻臚少卿許誡惑門襲建侯地應立長而業存友愛嘗推邑以成名弟且能賢復讓封於義嗣是彰德舉足附前徽宜取正於承家俾有明於合禮可封鹽山縣開國侯食邑一千户泉獻誠高麗人也則天天授元年遷左衛大將軍時内出金銀寳物令宰相於南北衙文武官内擇能射者五人共賭之内史張光輔先讓獻誠爲第一獻誠復讓右玉鈐衛大將軍薛咄摩之摩之又讓獻誠既而獻誠奏曰陛下今簡能射五人所得者多非漢官也臣恐自此後無漢官功射之名伏望停寢此射則天嘉而從之孔戢字方舉父岑著作郎屬季父巢父死難德宗憫悼加等俾與子姪一人官因授戢修武尉戢以長兄未仕固乞廻授後終京兆尹梁張佶不知何郡人也唐乾寜初劉建峯據湖南獨邵州不賓命都將馬殷討之朞歲未尅而建峯爲部下所殺軍亂隣冦且至是時佶爲行軍司馬屬潭人謀帥曰張行軍即所奉也佶不得已而視事旬日之間威聲大振冦亦觧去乃謂將吏曰佶才能不如馬公况明庭重藩非其人不可因以牘召殷殷亦不疑禀命而至佶受拜謁禮畢命升階讓殷爲帥佶即趨下率衆抃賀乃自請率師代殷攻邵州下之復爲行軍司馬垂二十年册府元龜卷八百十四
