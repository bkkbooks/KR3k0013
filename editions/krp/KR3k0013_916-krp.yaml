body:
  text: 册府元龜卷九百十六宋王欽若等撰總録部偏執介僻褊急偏執夫凝滯於物者其偏執之謂歟蓋人各有性所稟斯異故有師心自是果行而不疑潔已以處矯俗而獨任或遵隂陽之忌或乖禮經之制或封執以過當或􅘆㢮而靡顧乃至鬼神之事著於方册而興鄙斥之論竺乾之教布于華夏而行毁訾之説漢魏而下蓋不乏其人矣然而獲譏者至多垂譽者蓋鮮固與夫從容中道惟變所適不失其正著通人之號者異焉漢張竦王莽時至郡守封侯值王莽敗客北地陽左馮翊之縣也竦知有賊當去㑹反支吾不去因為賊所殺桓譚以為通人之蔽也後漢樊英嘗有疾妻遣婢拜問英下牀將答拜陳寔怪而問之英曰妻齊也共奉祭祀禮無不答其恭謹若是初徵五官中郎將數月以光禄大夫告歸趙興下邳人章帝時為司𨽻校尉不䘏諱忌䘏憂也每入官舍輙更繕修館宇移穿改築故犯妖禁而家人爵禄益用豐熾官至潁川太守子峻太傅以才器稱孫安世魯相三葉皆為司𨽻時稱其盛陳伯敬者桓帝時人行必矩步坐必端膝呵叱狗馬終不言死目有所見不食其肉行路聞㓙便解駕留止還觸歸忌則寄宿鄉亭年老寢滯不過舉孝廉後坐女壻亡吏太守邵䕫怒而殺之時人忌禁者多譚為證焉魏董遇善治老子為老子作訓注又善左氏傳更為作朱墨别異人有從學者遇不肯教而云必當先讀百遍言讀書百遍而義自見從學者云苦渴無日遇言當以三餘或問三餘之意遇言冬者歲之餘夜者日之餘隂雨者晴之餘也由是諸生少從遇學無傳其朱墨者官至大司農晉盧欽動循禮典妻亡制廬杖終喪居外為侍中奉車都尉劉毅為尚書左僕射毅夙夜在公坐而待旦言議切直無所曲撓為朝野之所式瞻嘗散齋而疾其妻省之毅便奏加妻罪而請解齋妻子有過立加杖捶其公正如此然以峭直故不至公輔毛循之為右衛將軍不信鬼神所至必焚除房廟時蔣山廟中有佳牛好馬循之並奪取之阮瞻字千里為東海王越記室素執無鬼論物莫能難瞻每自謂此理足可以辨正幽明忽有一客通名詣瞻寒温畢聊譚名理客甚有才辨瞻與之言良乆及鬼神之事反覆甚苦客遂屈乃作色曰鬼神古今聖賢所共傳君何得獨言無即僕便是鬼於是變為異形須臾消滅瞻黙然意色大惡後歲餘病卒於倉垣時年三十阮修字宣子嘗有論鬼神有無者皆以人死者有鬼修獨以為無曰今見鬼者云著生時衣服若人死有鬼衣亦有鬼邪論者服焉後遂伐社樹或止之修曰若社而為樹伐樹則社移樹而為社伐樹則社亡矣仕為太傅行參軍太子洗馬蔡謨性方雅丞相王導作女伎施設牀席謨先在坐不悦而去導亦不止之後位至司徒宋王琨避諱過甚父名懌母名恭心並不得犯焉時咸謂矯枉過正官至侍中武陵王師張敷為江夏王義恭撫軍記室參軍時義恭就太祖求一學義沙門比沙門求見發遣㑹敷赴假還江陵太祖謂沙門曰張敷應西當令相載及敷辭帝謂曰撫軍須一意懷道人卿可以後艑載之道中可得言晤敷不奉㫖曰臣性不耐雜帝甚不悦南齊王思逺立身簡潔衣服牀筵窮治素淨賓客來通輙使人先密覘衣服垢穢方便不前形儀新楚乃與促膝焉既去之後猶令二人交帚拂其坐處高宗從祖弟季敞性甚豪縦高宗心非之謂季敞曰卿可數詣王思逺卒於度支尚書梁蕭琛為吳興太守郡有項羽廟土民名為憤王甚有靈騐遂於郡􅈦事安施牀幕為神座公私請禱前後二千石皆於􅈦拜祠而避居他室琛至移神還廟處之不疑范縝為宜都太守性不信鬼神夷陽有五相廟唐漢三神廟胡里神廟縝乃下教斷不祠又在齊世常侍竟陵王子良子良精信釋教而縝盛稱無佛子良問曰君不信因果世間何得有富有貴何得有貧有賤縝答曰人之生譬如一樹花同發一枝俱開一蒂隨風而墮自有拂簾幌墜於茵席之上自有關籬廧落溷糞之側墜茵席者殿下是也落溷糞者下官是也貴賤雖復殊途因果竟在何處子良不能屈深怪之縝退論其理著神滅論隂子春閨門混雜而身服垢汙脚數年一洗言每洗則失財敗事云在梁州以洗足致梁州敗官至左衛將軍侍中後魏崔浩為司徒非毁佛法而妻郭氏敬好釋典時時讀誦浩怒取而焚之捐灰於厠中及浩幽執置之檻内送於城南使衛士數十人溲其上呼聲嗷嗷聞於行路自宰司之被戮辱未有如浩者也世皆以為果報之騐浩既不信佛道從弟滎陽太守模深所歸向每雖糞土之中禮拜形像浩大笑之云持此頭顱不淨處跪是胡神也浩性又不好老莊之書每讀不過數十行輙棄之曰此矯誣之説不近人情必非老子所作老耼習禮仲尼所師豈設敗法文書以亂先王之教袁生所謂家人廂篋中物不可揚於王庭也裴粲出帝初為驃騎大將軍膠州刺史時亢旱士民勸令禱於海神粲憚違衆心乃為祈請直據胡牀舉杯而言曰僕白君左右云前後例皆拜謁粲曰五嶽視三公四瀆視諸侯安有方伯而致禮海神也卒不肯拜高謙之為國子博士修凉書十卷初凉國盛事佛道為論貶之因稱佛是九流之一家當世名士競以佛理來難謙之還以佛義對之竟不能屈後周魏元嵩蜀郡人性尤不信釋教嘗上疏極論之唐傅奕武德末為太史令上疏請除去釋教曰佛在西域言妖路逺漢譯胡書恣其假託故使不忠不孝削髮而揖君親游食易服以逃租税演其妖書述其邪法偽啓三塗謬張六道恐嚇愚夫詐欺庸品凡百黎庶通識者稀不察根原信其矯詐乃追既往之罪虚規將來之福布施萬倍希萬倍之報持齋一日冀百日之糧遂使愚迷妄求功德不憚科禁輕犯憲章其有造作惡逆身墜刑網方乃獄中禮佛口誦佛經晝夜忘疲規免其罪且生死壽夭由於自然刑德威福關之人主乃謂貧富貴賤功業所招而愚僧矯託皆云由佛竊人主之權擅造化之力其為害政良可悲矣按書云惟辟作福惟辟作威惟辟玉食臣無有作福作威玉食臣之有作福作威玉食其害于而家㓙于而國民用側頗僻降自羲農至于漢魏皆無佛法君明臣忠祚長年久漢明假託夢想始立胡神西域桑門自傳其法西晉以上國有嚴科不許中國之人輙行髠髮之事洎于苻石羌胡亂華主庸臣佞政虐祚短皆由佛教致災也梁武齊襄足為明鏡昔褒姒一女妖惑幽王尚致亡國况天下僧尼數盈十萬翦刻繪綵裝束泥人而為厭魅迷惑萬姓者乎今之僧尼請令匹配即成十萬餘户産育男女十年長養一紀教訓自然益國可以足兵四海免蠶食之殃百姓知威福所在則妖惑之風自革淳朴之化還興且古今忠諫鮮不及福竊見齊朝章讐子他上表言僧尼徒衆糜損國家寺塔奢侈虚費金帛為諸僧附㑹宰相對朝讒毁諸尼依託妃主潛行謗讟子他竟被囚執刑於都市及周武平齊制封其墓臣雖不敏竊慕其蹤又上疏十一首詞甚切直高祖付羣官詳議惟太僕卿張道源稱奕奏合理中書令蕭瑀與之爭論曰佛聖人也奕為此議非聖人者無法請寘嚴刑奕曰禮本於事親終於奉上此則忠孝之理著臣子之行成而佛踰城出家逃背其父以匹夫抗天子以繼體而悖所親蕭瑀非出於空桑乃遵無父之教臣聞非孝者無親其瑀之謂矣瑀不能答但合掌曰地獄之設正為是人高祖將從奕言㑹傳位而止太宗嘗臨朝謂奕曰佛道𤣥妙聖迹可師且報應顯然屢有徵騐卿獨不悟其理何也奕對佛是胡中桀黠欺誑夷狄初上西域漸流中國遵尚其道皆是邪僻小人模寫莊老𤣥言飾虚幻之教爾於百姓無補於國家有害太宗頗然之韓愈字退之素不喜佛初鳳翔法門寺有䕶國真身塔塔内有釋迦文佛指骨一節其書本傳法三十年一開開則歲豐人泰元和十四年正月憲宗令中使杜英竒押宫人三十人持香花赴臨臯驛迎佛骨自光順門入大内留禁中三日乃送詣寺王公士庶奔走捨施惟恐在後百姓有廢業破産燒頂灼臂而求供養者愈為兵部侍郎上疏極諫帝怒貶潮州刺史介僻夫人之生各有所稟故好尚殊致其類非一子産所謂人心之不同也如其面焉蓋謂是矣乃有懐耿介之性挺直方之操以固必而自任在夷險而一貫不可以利誘不可以威折猶石之莫轉豈流之可汨然而志存矯激足資於名教道或迂濶亦取於時譏者焉後漢朱暉為臨淮太守坐法免暉剛於為吏見忌於上所在多被劾自去臨淮屏居野澤布衣蔬食不與邑里通鄉黨譏其介第五倫為㑹稽太守坐法免歸田里身自耕種不交通人物吳祐為膠東侯相處同僚無私書之問上司無牋檄之敬在膠東書不入京師也周澤為太常清潔修行盡敬宗廟嘗卧疾齋宫其妻哀澤老病闚問所苦乃大怒以妻干犯齋禁遂收送詣獄謝罪當世疑其詭激時人為之語曰生世不諧作太常妻一歲三百六十日三百五十九日齋漢官儀此下云一日不齋醉如泥姜肱與徐穉俱徵不至桓帝乃下彭城畫工圖其形狀肱卧於幽闇以被韜面言感眩疾不欲出風上竟不得見之范冉冉或作丹為萊蕪長去官嘗使兒捃拾麥得五斛鄰人尹臺遺之一斛囑兒莫道丹後知即令并送六斛言麥已雜矣遂誓不敢受姜岐漢陽郡人守道隱居名聞西州太守橋𤣥召以為吏稱疾不就𤣥怒勑督郵尹益逼致之曰岐若不至趣嫁其母益固爭不能得遽曉譬岐岐堅卧不起郡内士大夫亦競往諫元乃止時頗以為譏盧植為尚書初事馬融融外戚豪家多列女倡歌舞於前植侍講積年未嘗轉眄融以是敬之桓曄仕郡為功曹尤修志介姑為司空楊賜夫人初曄父鸞卒姑歸寧赴哀將至止於傳舍整飭從者而後入曄心非之及姑勞問終無所言號哭而已賜遣吏奉祠因縣發取祠具曄拒不受後每至京師未嘗舍宿楊氏其貞忮若此賓客從者皆祇其志行一飱不受於人李孚字子憲鉅鹿人興平中本郡人民饑困孚為諸生嘗種薤欲以成計有從索者亦不與一莖亦不自食故時人謂能行意袁忠為沛相天下大亂棄官客㑹稽上虞時王朗為太守忠乘船戴笠蓋詣朗見朗左右僮從皆著青絳采衣忠非其奢麗即辭疾發而退也魏沐並字德信河間人也少孤苦袁紹父子時始為名吏有志介嘗過姊為殺鷄炊黍而不留也後為議郎焦先河東人結草為裳科頭徒跣每出見婦人則隱翳湏去乃出吳顧悌為偏將軍待妻有禮常夜入晨出希見其面嘗疾篤妻出省之悌命左右扶起冠幘加襲起對輙令妻還其貞潔不瀆如此晉孫晷初仕吳為伏波將軍雖侯家豐厚而常布衣蔬食躬親壟畝誦詠不廢欣然獨得父母愍其如此欲加優饒而夙興夜寐無暫懈也阮籍字嗣宗嘗隨叔父至東郡兗州刺史王昶請與相見終日不開一言自以不能測後為步兵校尉陸納為吏部尚書謝安嘗欲詣納而納殊無供辦其兄子俶不敢問之乃密為之具安既至納所設惟茶果而已俶遂陳盛饌珍羞畢具客罷納大怒曰汝不能光益叔父乃復穢我素業耶於是杖之四十然其吝惜多此類夏統高尚不仕其從父敬寧祠先人迎女巫章丹陳珠二人並有國色裝服甚麗善歌舞又能隱形匿影甲夜之初撞鐘擊鼓間以絲竹丹珠乃拔刀破舌吞刀吐火雲霧杳冥流光電發統諸從兄弟欲往觀之難統於是共紿之曰從父間疾病得瘳大小以為喜慶欲因其祭祀並往賀之卿可俱行乎統從之入門忽見丹珠在中庭輕步徊儛靈談鬼笑飛觸桃柈音盤酬酢翩飜統驚愕而走不由門破藩直出歸責諸人曰昔淫亂之俗興衛文公為之悲惋蝃蝀之氣見君子尚不敢指季桓納齊女仲尼載馳而退子路見南子憤恚而慷慨吾嘗恨不得頓叔向之頭陷華父之眼奈何諸君迎此妖物夜與遊戲放傲逸之情縱奢淫之行亂男女之禮破貞尚之節何也遂隱牀上披髮而卧不復言衆親踧踖即退遣丹珠各各分散楊軻天水人少好易長而不娶學業精微養徒數百常食麤飲水衣褐緼袍人不堪其憂而軻悠然自得疎賓異客音止未曽交也雖受業門徒非入室弟子莫得親言所欲論授須旁無雜人授入室弟子令遞相宣授殷羨字洪喬為豫章太守都下人士因其致書者百餘函行次石頭皆投之水中曰沉者自沉浮者自浮殷洪喬不為致書郵其資性介立如此羅含為荆州别駕以廨舍喧擾於城西池小洲上立茅屋伐木為材織葦為席而居布衣蔬食晏如也王育行已任性頗不偶俗妻喪弔之者不過四五人然皆鄉閭名士後仕劉聰為鎮西大將軍宋羊欣除中散大夫有病不堪拜伏辭不朝覲高祖恨不識之自非尋省近親不妄行詣行必由城外未嘗入六關王琨為度支尚書時尚書僕射顔師伯豪貴不省設女樂要琨同聽傳酒行炙皆悉内妓琨以男女無親授傳行每至令置牀上迴避之然後取畢又如此座上莫不撫手嗤笑琨容色自若師伯後為設樂邀琨琨不往蕭惠開少有風氣涉獵文史家雖貴戚而居服簡素初為祕書郎著作並名家年少惠開意趣與人多不同比肩或三年不共語外祖光禄大夫沛郡劉成戒之曰汝恩戚家子當應將迎時俗緝外内之歡如汝自業將無小傷多異以取天下之疾患耶惠開曰人間宜相緝和甚如慈㫖但不幸耿介恥作見凡人畫龍未成故遂至於多忤耳王裕之字敬宏為侍中性介僻兒孫歲中不過一再相見見輙克日子恢之嘗請假還東定省敬宏克日見之至日輙不果假日將盡恢之乞求奉辭敬宏呼前既至閤復不見恢之於閣外拜辭流涕而去庾炳之為吏部尚書性好潔士大夫造之者去不出户輙令人拭席洗牀時陳郡殷冲亦好淨小吏非淨潔新衣不得近左右士大夫小不整潔者亦每容接之炳之好潔反是冲亦譏之王惠字令明幼而夷簡恬靜不交游未嘗有雜事後為吏部尚書未曽接客南齊關康之字伯愉世居丹徒以墳籍為務四十年不出門不應州府辟宋太始中徵通直郎不就晩以母老家貧求為嶺南小縣性清約獨處一室希與妻子相見不通賓客弟子以業傳授王僧祐為黃門郎太尉儉從祖兄負氣不羣儉嘗詣之辭不見武帝數閲武僧祐獻講武賦儉借觀僧祐不與禇賁為左户尚書疾篤其子霽載以歸疾小間知非故處大怒不肯復飲食内外閣悉釘塞之不與人相聞數日裁餘氣息謝聞其弊往候之排閣不可開以杵槌破見謂賁曰事之不可得者身也身之不可全者名也名與身俱滅者君也豈不㑹之哉賁曰吾少無人間心豈身名之可慕但願啓手歸泉必在舊隴兒輩不才非達余趣移尸從殯失吾素心更以此為恨爾劉璡為武陵王曄冠軍征虜㕘軍與友人孔澈同舟入東澈留目觀岸上女子璡舉席自隔不復同坐梁何修之為尚書左丞性好潔一日之中洗滌者十餘過猶恨不足時人稱為水淫後魏平恒為祕書丞以三子並不率父業乃别搆精廬并置經籍於其中一奴自給妻子莫得而往酒食亦不與同時有珍美呼時老東安公刁雍等共飲噉之家人無得嘗焉信都芳好學天文算數隱居樂平東山性清儉質樸不與物和慕容紹宗給其騾馬不肯乘騎夜遣婢侍以試之芳忿呼敺擊不聽近已狷介自守無求於物北齊庫狄士文為具州刺史性孤直雖鄰里至親莫與通狎隋薛孺高祖開皇中為侍御史揚州總管司功㕘軍每以方直自處府僚多不便之太常丞胡仲操非雅士竟不與之晉史圭為具州刺史退歸常山閉門杜絶人事雖親故人造者不見其面毎游外墅則乘婦人氈車以自蔽匿人莫明其心也論者以圭隂僻褊急人雖萬物之靈五行之秀然其稟受蓋有蔽錮其或位處通顯而性過峻急至於口不擇言與物多忤掇親友之嫌失縉紳之歡者多矣成同寮之憤䦧遭明庭之譴怒大則致於殞斃次則貽於困躓比比有焉若乃知非自咎不逺而復佩韋以救過銘座以柅情亦庶㡬矣先聖有言曰一朝之忿忘其身以及其親非惑歟此誠立身之元龜也宛射犬為鄭大夫晉侯使張骼輔躒致楚師求御於鄭鄭人使射犬御二子在幄坐射犬於外既食而後食之及戰射犬近不告而馳之收禽挾囚不待而出既戰二子問曰胡不在謀謂不告而馳不待而出對曰曩者志入而已今則怯也皆笑曰公孫之亟也謂性急不受屈也邾莊公與夷射姑飲酒私出射姑邾大夫出辟酒閽乞肉焉奪之杖以敲之奪閽杖以敲閽頭也明年邾子在門臺門上有臺臨廷閽以缾水沃廷邾子望見之怒閽曰夷射姑旋焉旋小便命執之見其不潔執射姑弗得滋怒自投于牀廢于罏炭爛遂卒廢墮也莊公卞急而好潔故及是卞躁西門豹為鄴令性急佩韋以自緩後漢范冉或云丹字史雲辟太尉府以狷急不能從俗嘗佩韋於朝董卓為太師性剛而褊忿吕布為所委信嘗小失意不思難拔手㦸擲布布拳㨗避之為卓顧謝卓意亦解由是隂怨卓魏賈逵為𢎞農太守與典農校尉爭公事不得理乃發憤生癭後所病稍大自啓願欲令醫割之太祖惜逵忠恐其不活教謝主簿吾聞十人割癭九人死逵猶行其意而癭愈大王思為司農性急嘗執筆作書蠅集筆端驅去復來如是再三思恚怒自起逐蠅不能得還取筆擲地蹋壞之晉傅𤣥為司𨽻校尉天性峻急不能有所容每有奏劾或值日暮捧白簡整簮帶竦踊不寐坐而待旦王述為尚書令性急為累嘗食雞子以筯刺之不得便大怒擲地雞子圓轉不止便下牀以屐齒蹋之又不得瞋甚掇内口中齧破而吐之宋何承天為廷尉性褊促嘗對主者厲聲曰天何言哉四時行焉百物生焉文帝知之應遣使先誡曰善候何顔色如其不悦無湏多陳顔延之為太常卿性褊急兼有酒過肆意直言曽無迴改謝靈運為太子左衛率為性褊激多愆禮度朝廷唯以文義處之不以應賓相許王淮之為都官尚書改領吏部性峭急頗失縉紳之望出為丹陽尹王宏為太保領中書監性褊隘人忤意者輙以加責辱劉榮祖為輔國將軍性褊隘頗失士君子之心梁謝㡬卿為太子率更令性不容非與物多忤有乖已者輙肆意罵之退無所言後魏元子華為齊州刺史性甚褊急當其急也口不擇言自捶擊長史鄭子湛子華親友也畏其侮罵遂即去之子華雖自悔厲終不能改李平為吏部尚書加撫軍將軍平高明强濟所在有聲但以性急為累李業興為國子祭酒性躁隘至於論難之際高聲攘振無儒者之風每語人云但道我好雖知妄言故勝道惡務進忌前不顧後患時人以此惡之後周王羆為驃騎將軍性嚴急嘗有吏挾私陳事者羆不暇命捶撲乃手取鞾履持以擊之隋諸葛頴煬帝為太子時藥藏監及帝即位累遷正議大夫頴性褊急與栁䛒每相忿䦧帝屢責怒之而猶不止於後帝亦薄之唐張九齡為荆州大都督府長史性躁急動輙忿詈議者以此少之蕭頴士登進士第以傲誕褊急困躓而卒陸贄為翰林學士時同職吳通𤣥弟兄以東宫侍帝由是爭寵頗相嫌恨贄性褊急屢於帝前短通𤣥崔元翰為禮部員外郎知制誥性大剛褊不能取容於時罷知制誥守比部郎中為時所擯終於散位崔陵為户部尚書居官清嚴所至必理然性介急待官僚頗無禮節恃已之清見贓汙者如仇讐韓愈為吏部侍郎轉京兆尹兼御史大夫以不臺參為御史中丞李紳所劾愈不伏言准勑仍不臺參紳愈性皆褊僻移刺往來紛然不止乃出紳為浙西觀察使愈為兵部侍郎劉禹錫為禮部郎中集賢院學士求分司東都終以恃才褊心不得處朝列之職周張頴為安州防禦使性褊急慘刻不容人之小過雖左右親近亦皆怨之册府元龜卷九百十六
