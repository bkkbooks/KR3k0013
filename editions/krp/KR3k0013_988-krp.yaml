body:
  text: 册府元龜巻九百八十八宋王欽若等撰外臣部備禦自昔至治之世守在四夷其後或干紀猾夏侵敗王略是用完其守備險其走集明其伍候正其疆塲所以遏外侮而備不虞有國之令典也三代之際狄難以作降及秦漢以迄於五代或臣或叛何常之有繇是繕治險固率厲威武御之以䇿略懐之以恩信連城積粟以守其要材官長技不忘乎戰制置之術悉講乎便宜覊縻之義必酌乎故實至於采外庭之嘉論納羣下之婉畫話言可舉永圗斯在葢夫桀驁荒獷殊俗異類得其善言不足以為喜置之度外允謂乎得宜然而備豫之方慎固之道不可以不為之慮矣周文王為西伯以殷王之命命南仲為將卒往築城於朔方為軍壘以禦北狄之難故作出車之詩曰天子命我城彼朔方赫赫南仲玁狁于襄㐮除也秦始皇巳併天下乃使蒙恬将三十萬衆北逐戎狄收河南築長城因地形用制險塞起臨洮属隴西至遼東延袤萬餘里於是渡河據陽山五原西安陽縣北有隂山隂山在河南陽山在河北逶蛇而北暴師於外十餘年漢髙祖二年十一月繕治河上塞秦北攻胡築河上塞六月興闗中卒乗邉塞乗登也登而守之十一年正月詔曰代地居常山之北與夷狄邉趙乃従山南有之趙數有胡冦難以為國頗取山南太原之地益屬代少割以益之不盡取也代之雲中以西為雲中郡則代受邊冦益少矣王相國通侯吏二千石擇可立為代王者燕王綰相國何等三十三人皆曰子常賢知温良請立以為代王都晉陽一說都中都又文帝過太原復晋陽中都二嵗似遷都於中都也文帝十四年冬匈奴寇邉殺北地都尉邛遣三将軍軍隴西北地上郡中尉周舎為衛将軍郎中令張武為車騎将軍軍渭北車十萬騎卒十萬人帝親勞軍勒兵申教令賜吏卒自欲征匈奴羣臣諫不聼皇太后固要帝乃止要脅也哀痛祝誓之言於是以東陽侯張相如為大将軍建成侯董赤内史欒布皆為将軍擊匈奴匈奴走是時太子家令晁錯上言兵事臣聞漢興以来胡虜數入邉地小入則小利大入則大利髙后時再入隴西攻城屠邑敺略畜産敺與駈同其後復入隴西殺吏卒大冦盗竊聞戰勝之威民氣百倍益奮厲也敗兵之卒沒世不復永挫折也自髙后以来隴西三困於匈奴矣民氣破傷亾有勝意今兹隴西之吏賴社稷之神靈奉陛下之眀詔和輯士卒底厲其節輯與集同底與砥同起破傷之民以當乗勝之匈奴用少擊衆殺一王敗其衆而有大利非隴西之民有勇怯廼将吏之制巧拙異也故兵法曰有必勝之将無必勝之民繇此觀之安邉境立功名在於良将不可不擇也臣又聞用兵臨戰合刄之急者三合刄謂交兵一曰得地形二曰卒服習三曰噐用利兵法曰丈五之溝漸車之水漸讀曰韯謂侵也山林積石經川丘阜經川常流之水也大陸曰阜􅋄木所在􅋄古草字此歩兵之地也車騎二不當一土山丘陵漫衍相属漫衍猶聨延也属續也平原曠野此車騎之地也歩兵十不當一平陸相逺川谷居間仰髙臨下此弓弩之地也短兵百不當一兩陣相近平地淺草可前可後此長㦸之地也劔楯三不當一雈葦竹蕭雈􅯈也葦葭也蕭蒿也艸木蒙籠支葉茂接此矛鋋之地也長㦸二不當一曲道相伏險阸相薄此劍楯之地也弓弩三不當一士不選練卒不服習起居不精動静不集集齊也趨利弗及避難不畢前擊後解與金鼓之音相失此不習勒卒之過也百不當十兵不完利與空手同甲不堅宻與袒裼同弩不可以及逺與短兵同射不能中與亾矢同中不能入與亾鏃同此将不省兵之過也五不當一故兵法曰噐械不利以其卒予敵也卒不可用以其将予敵也将不知兵以其主予敵也君不擇将以其國予敵也四者兵之至要也臣又聞小大異形彊弱異勢險易異備夫卑身以事彊小國之形也合小以攻大敵國之形也彼我均不能相勝則惟連結外援共制之也以蠻夷攻蠻夷中國之形也不煩華夏之兵也其同類自相攻擊也今匈奴地形技藝與中國異上下山阪出入溪澗中國之馬弗與也與猶如也險道傾仄且馳且射仄古側字中國之騎弗與也風雨罷勞飢渴不困中國之人弗與也此匃奴之長技也若夫平原易地輕車突騎則匈奴之衆易撓亂也勁弩長㦸射䟽及逺則匈奴之弓弗能格也堅甲利刄長短相雜遊弩往来什五俱前五人為伍二五為什則匈奴之兵弗能當也材官騶發矢道同的騶謂矢之善者也材官有材力者騶發騶矢以射者工矢善故中則同的則匈奴之革笥木薦弗能攴也革笥以皮作如札鎧者被之木薦以木枝作如楯下馬地闘劔㦸相接去就相薄則匈奴之足弗能給也此中國之長技也以此觀之匈奴之長技三中國之長技五陛下又興數十萬之師以誅數萬之匈奴衆寡之計以一擊十之術也雖然兵凶噐戰危事以大為小以疆為弱在俛仰之間耳夫以人之死争勝跌而不振則悔之亾及也帝王之道出於萬全今降胡義渠蠻夷之属来歸義者其衆數千飲食長技與匈奴同可賜之堅甲絮衣勁弓利矢益以邉郡之良騎令明将能知其習俗和輯其心者以陛下之眀約将之即有險阻以此當之平地通道則以輕車材官制之两軍相當表裏各用其長技衡加之以衆此萬全之術也傳曰狂夫之言而明主擇焉臣錯愚陋昧死上狂言唯陛下財擇財與裁同文帝嘉之乃賜錯璽書寵荅焉曰皇帝問太子家令上書言兵體三章聞之三者得地形卒服習噐用利書言狂夫之言而明主擇焉今則不然言者不狂而擇者不眀國之大患故在於此使夫不明擇於不狂是以萬聴而萬不當也錯復言守邉備塞勸農力本當世急務二事曰臣聞秦時北攻胡貉築塞河上南攻揚粤置戍卒焉其𧺫兵而攻胡粤者非以衛邉地而救民死也貪戾而欲廣大也故功未立而天下亂且夫起兵而不知其勢戰則為人禽屯則卒積死夫胡貉之地積隂之處也木皮三寸氷厚六尺食肉而飲酪其人宻理鳥獸毳毛宻理謂其肌肉也毳細毛也其性能寒揚粤之地少隂多陽其人疏理鳥獸希毛其性能暑秦之戍卒不能其水土戍者死於邉輸者僨於道秦民見行如往棄市因以謫發之名曰謫戍先發吏有讁及贅婿賈人閭取其左閭者門也居閭之左一切皆發之發之不順行者深怨有背畔之心凡民守戰至死而不降北者以計為之也北謂敗退故戰勝守固則有拜爵之賞攻城屠邑則得其財􅒾以富家室故能使其衆蒙矢石赴湯火蒙冐犯也視死如生今秦之發卒也有萬死之害而亾銖两之報死事之後不得一筭之復天下明知禍烈及已也陳勝行戍至於大澤為天下先倡天下從之如流水者秦以威刼而行之之敝也胡人衣食之業不著於地其勢易以擾亂邉境何以明之胡人食肉飲酪衣皮毛非有城郭田宅之歸居如飛鳥走獸於壙埜埜古野字羙草甘水則止草盡水竭則移以是觀之往来轉徙時至時去此胡人之生業而中國之所以離南畮也今使胡人數處轉牧行獵於塞下或當燕代或當上郡北地隴西以候備塞之卒卒少則入陛下不救則邉民絶望而有降敵之心救之少發則不足多發逺縣纔至則胡又已去聚而不罷為費甚大罷之則復入如此連年則中國貧苦而民不安矣陛下幸憂邉境遣将吏發卒以治塞甚大惠也然今逺方之卒守塞一嵗而更更調易代也音庚不知胡人之能不如選常居者家室田作且以備之以便為之髙城深塹具藺石布渠荅渠荅鐡蒺䔧也藺石城上雷石也雷来内切復為一城其内城間百五十歩要􅊣之處通川之道調立城邑毋下千家調為筭度之也摠計城邑之中令有千家以上也調音徒弔切為中周虎落虎落外籓也若今竹虎落也以竹蔑相連遮落也先為室屋具田噐廼募臯人及免徒復作令居之不足募以丁奴婢贖罪及輸奴婢欲以拜爵者不足廼募民之欲往者皆賜髙爵復其家復音方日反予冬夏衣廪食能自給而止初徙之時縣官常廩給其衣食於後能自供贍乃止也郡縣之民得買其爵以自増至卿文帝時二十等爵内無有卿名蓋謂其等級同列卿者也其亾夫若妻者縣官買予之人情非有匹敵不能久安其處塞下之民禄利不厚不可使久居危難之地胡人入驅而能止其所驅者以其半予之言胡人入而冦驅略漢人及畜産而它人能止得其所驅者令其本主以半賞之縣官為贖謂官為備價贖之其民如是則邑里相救助赴胡不避死非以徳上也言非以此事欲立德義於主上也欲全親戚而利其財也此與東方之戍卒不習地勢而心畏胡者功相萬也東方諸郡民不習戰闘當戍邉者也以陛下之時徙民實邉使逺方亾屯戍之事塞下之民父子相保亾係慮之患利施後世名稱聖明其與秦之行怨民相去逺矣言發怨恨之人使行戍役也上従其言募民徙塞下錯復言陛下幸募民相徙以實塞下使屯戍之事益省輸将之費益寡将送也資也甚大恵也下吏誠能稱厚恵奉明法稱副也存恤所徙之老弱善遇其壮士和輯其心而勿侵刻輯與集同使先至者安樂而不思故鄉則貧民相募而勸往矣臣聞古之徙逺方以實廣虚也所以充實寛廣空虚之地相其隂陽之和甞其泉水之味審其土地之宜觀其草木之饒然後營邑立城制里割宅通田作之道平阡陌之界先為築室家有一堂二内門戸之閉二内二房也置噐物焉民至有居作有所用此民所以輕去故鄉而勸之新邑也之往也為置醫巫以救疾病以脩祭祀男女有昏昏謂昏因配合也生死相恤墳墓相従種樹畜長畜長六畜也種樹謂桑果之属長音竹两切室屋完安此所以使民樂其處而有長居之心也臣又聞古之制邉縣以備敵也使五家為伍伍有一長十長一里里有假士四里一連連有假伍伯十連一邑邑有假候皆擇其邑之賢材有護有保䕶之能者也習地形知民心者居則習民於射法出則教民於應敵故卒伍成於内則軍正定於外服習以成勿令遷徙各守其業也㓜則同遊長則共事夜戰聲相知則足以相救晝戰目相見則足以相識驩愛之心足以相死如此而勸以厚賞威以重罰則前死不還踵矣所徙之民非壯有材力但費衣糧不可用也雖有材力不得良吏猶亾功也陛下絶匈奴不與和親臣竊意其冬来南也一大治則終身創矣欲立威者始於折膠秋氣至膠可折弓弩可用匈奴常以為候而出軍来而不能困使得氣去使其守勝逹志而去後未易服也愚臣亾識唯陛下財察後元六年冬匈奴三萬騎入上郡三萬騎入雲中以中大夫令免為車騎将軍屯飛狐中大夫官名其人姓令名免耳此諸将軍下至徐厲皆書姓而徐廣以為中大夫令是官名此說非也㩀百官表景帝初改衛尉中大夫夫令文帝時無此官而中大夫是郎中令属官秩比二千石飛狐在代郡故楚相蘇意為将軍屯句注山險名也在鴈門隂館句音章句之句将軍張武屯北地河内太守周亞夫為将軍次細桞在長安西北又曰長安細桞倉在渭北近右徼又曰在昆明地南京有桞市是也一宿曰宿再宿曰信過為次匈奴傳云置三将軍長安西細柳謂北棘門覇上此則細栁又在渭北宗正劉禮為将軍次覇上祝兹侯徐厲為將軍次棘門在長安北秦時宫門也三輔黄圖棘門在横門外也以備胡武帝元光二年十月匈奴請和親上下其議下音遐駕切大行王恢燕人數為邉吏習故事議曰漢與匈奴和親率不過數嵗即背約不如勿許舉兵擊之御史大夫韓安國曰千里而戰即兵不獲利今匈奴負戎馬足懐鳥獸心負恃也遷徙鳥集難得而制得其地不足為廣有其衆不足為彊自上古弗屬不内屬於中國漢數千里争利則人馬罷罷讀曰疲虜以全制其敝勢必危殆臣故以為不如和親羣臣議多附安國於是帝許和親明年鴈門馬邑豪聶壹豪酋帥也因大行王恢言匈奴初和親親信邉可誘以利致之伏兵襲擊必破之道也帝廼召問公卿曰朕飾子女以配單于幣帛文錦賂之甚厚單于待命加嫚侵盗無己邉竟數驚朕甚閔之竟讀曰境其下亦同今欲舉兵攻之何如大行恢對曰陛下雖未言臣固碩效之效之致也致其計臣聞全代之時代未分之時也六國之時全代為一固尚能以擊匈奴况今加以漢大乎北有彊胡之敵内連中國之兵然尚得飬老長㓜種樹以時倉廩甞實樹殖也匈奴不輕侵也今以陛下之威海内為一天下同任任事也又遣子弟乗邉守塞乗登也登其城而備守也轉粟輓輸以為之備輓引車也音晚然匈奴侵盗不已者無它以不恐之故耳不于恐懼威令也臣竊以為擊之便御史大夫安國曰不然臣聞髙皇帝甞圍於平城匈奴至者投鞍髙如城者數所觧脫其馬示間暇也按積其鞍若營壘也平城之饑七日不食天下歌之及觧圍反位而無忿怒之心夫聖人以天下為度者也言常随天下人心而寛大其度量也不以巳私怒傷天下之功故乃遣劉敬奉金千斤以結和親至今為五世利孝文皇帝又甞一擁天下之精兵聚之廣武常谿廣武鴈門縣常谿名然無尺寸之功而天下黔首無不憂者孝文寤於兵之不可宿宿以留也故復合和親之約此二聖之迹足以為效矣臣竊以為勿擊便恢曰不然臣聞五帝不相襲禮三王不相復樂襲因也復重也復音扶且切非故相反也因世宜也且髙帝身被堅執銳冐霧露沐霜雪行㡬十年㡬近也音巨依切所以不報平城之怨者非力不能所以休天下之心也今邉境數驚士卒傷死中國槥車相望槥小棺也從送致其䘮載槥之車軍死者以槥相望於道言其多也槥音衛此仁人所隐也隐痛也臣故曰擊之便安國曰不然臣聞利不十者不易業功不百者不變常是以古之人君謀事必就祖發政必占語重作事也祖祖廟也占聞也重猶難之也且自三代之盛夷狄不與正朔服色與讀曰豫非威不能制彊弗能服也以為逺方絶地不牧之民不足煩中國也不牧謂不可牧飬也且匈奴輕疾悍亟之兵也悍勇也亟急也音紀力切至如焱風去如收電焱疾風也必遥切畜牧為業弧弓射獵以木曰弧以角曰弓逐獸随草居處無常難得而制今使邉郡久廢耕織以支胡之常事其勢不相權也輕重不等也臣故曰勿擊便恢曰不然臣聞鳯鳥乗於風聖人因於時昔秦繆公都雍繆讀與穆同地方三百里知時宜之變攻取西戎辟地千里并國十四辟讀曰闢次下亦同隴西赤狄是也及後蒙恬為秦侵胡辟數千里以河為竟竟讀曰境累石為城樹榆為塞塞上種榆也匈奴不敢飲馬於河置𤇺燧然後敢牧馬燧火也夫匈奴獨可以威服不可以仁畜也今以中國之盛萬倍之資遣百分之一以攻匈奴辟猶以彊弩射且潰之癰也必不留行矣留止也言無所礙也若是則北發月氏可得而臣也發猶徴召也言威聲之盛北狄發自月支以来皆可徴召而為臣也臣故曰擊之便安國曰不然臣聞用兵者以飽待飢正治以待亂定舎以待勞舎止息也故接兵覆衆伐國隳城覆收也隳毁也言兵與之不同則取其衆所伐之國則毁其城也覆音弟目切隳音火規切常役敵國此聖人之兵也且臣聞之衝風之衰不能起毛羽衝風疾風之衝突者也彊弩之末力不能入魯縞縞表也曲阜之地俗善作之尤為輕細故以取喻也夫盛之有衰猶朝之必莫也今將巻甲輕舉深入長敺難以為功敺與驅同従行則迫衡行則中絶従音子容反衡横也疾則粮乏徐則後利後利謂不及計利不至千里人馬乏食兵法曰遺人獲也言以軍遺敵人令其虜獲也遺音戈季反意者有它繆巧可以禽之則臣不知也不然則未見深入之利也臣故曰勿擊便恢曰不然夫草木遭霜者不可以風過清水明鏡不可以形逃通方之士不可以文亂方道也今臣言擊之者固非發而深入也將順因單于之欲誘而致之邉吾選梟騎壮士隂伏而處以為之備審遮險阻以為其戒吾勢以定或營其左或營其右或當其前或絶其後單于可禽百全必取帝曰善廼従恢議是年主父偃上書闕下朝奏召入見所言九事其一事諫伐匈奴曰臣聞明主不惡切諫以愽觀忠臣不避重誅以直諫是故事無遺策而功流萬世今不敢隠忠避死以效愚計碩陛下幸赦而少察之司馬法曰國雖大好戰必亾天下雖平忘戰必危司馬穰苴善用兵著書言兵法謂之司馬法一說司馬古主兵之官有軍陣用兵之法天下既平天子大愷大愷周禮還師振旅之樂也春蒐秋獮諸侯春振旅秋治兵所不忘戰也春為陽中其行木也秋為陰中其行金作兵噐所資故於此時蒐獮治兵也蒐蒐索北取不孕者獮應殺氣也振整旅衆也且怒者逆德也兵㐫噐也争者末節也古之人君一怒必伏尸流血故聖王重行之重行也夫務戰勝窮武事未有不悔者也昔秦皇帝任戰勝之威蠶食天下并吞戰國海内為一功齊三代務時不休欲攻匈奴李斯諫曰不可夫匈奴無城郭之居委積之守遷徙鳥舉難得而制輕兵深入粮食必絶運糧以行重不及事得其地不足以為利得其民不可調而守也不可和調也勝必棄之非民父母靡弊中國甘心匈奴靡散也非完計也秦皇帝不聼遂使蒙恬将兵而攻胡郤地千里以河為境地固澤鹵不生五榖地多沮澤而鹹鹵然後發天下丁男以守北河暴兵露師十有餘年死者不可勝數終不能踰河而北是豈人衆之不足兵革之不備哉其勢不可也又使天下飛芻輓粟車載芻藁令其急至故曰飛芻也輓謂曰車舩也起於黄腄瑯琊負海之郡轉輸北河黄腄二縣名也並在東莱言自東莱及瑯琊縁海諸郡皆令轉輸至北河也率二十鍾而致一石六斛四㪷為鍾計其道路所費凡用百九十二斛乃得一石男子疾耕不足於粮餉女子紡績不足於帷幕百姓靡弊孤寡老弱不能相飬道死者相望道死謂死於路也葢天下始叛也及至髙皇帝定天下略地於邉聞匈奴聚代谷之外而欲擊之御史成諫曰不可夫匈奴獸聚而鳥散從之如搏景摶擊也摶人之長景言不可得也今以陛下盛徳攻匈奴臣竊危之髙帝不聼遂至代谷有平城之圍髙帝悔之廼使劉敬往結和親然後天下亾干戈之事故兵法曰興師十萬日費千金秦常積衆數十萬人雖有覆軍殺将係虜單于適足以結怨深讎不足以償天下之廢夫匈奴行盗侵敺所以為業天性固然求侵邉境而敺略人畜也上自虞夏殷周固不程督程課也督視責也禽獸視之不比為人夫不上觀虞夏殷周之統而下循近世之失此臣之所以大恐百姓所以疾苦也且夫兵久則變生事苦則慮易言思慮變易失其常也使邉境之民靡敝愁苦将吏相疑而外市與外國交求已利若章邯之軰也故尉佗章邯得成其私佗音徒何切而秦政不行權分二子此得失之效也故周書曰安危在出令存亾在所用周書者本尚書之餘也碩陛下熟計之五年夏發巴蜀治南夷道又發卒萬人治鴈門阻險所以為鴈門止匈奴之冦也六年秋匈奴盗邉遣将軍韓安國屯漁陽元朔二年取匈奴河南地築朔方復繕故秦時蒙恬所為塞因河而為固三年春罷滄海郡秋罷西南夷城朔方元光中公孫𢎞為博士時方通西南夷巴蜀苦之詔使𢎞視焉還奏事盛毁西南夷無所用帝不聴至是𢎞為御史大夫數諫以為罷弊中國以奉無用之地碩罷之於是帝使待詔朱買臣等難𢎞置朔方之便發十策𢎞不得一廼謝曰山東鄙人不知其便若是願罷西南夷滄海專奉朔方元狩四年遣驃騎將軍霍去病擊破匈奴左地因徙烏桓上谷漁陽右北平遼東五郡塞外為漢偵察匈奴動静其大人嵗一朝見於是始置護烏桓校尉秩二千石擁節監領之使不得與匈奴交通五年三月徙天下姦滑吏民於邉元鼎六年秋遣浮沮将軍公孫賀出九原浮沮井名在匈奴中去九原二千里匈河将軍趙破奴出令居匃河水名在匈奴中去令居千里皆二千餘里不見虜而還廼分武威酒泉地置張掖燉煌郡徙民以實之元封四年秋匈奴冦邉遣㧞胡将軍郭昌屯朔方太初元年五月遣因杆将軍公孫敖築塞外受降城三年句㴝胡單于立四月漢使光禄勲徐自為出五原塞數百里逺自千里築城障列亭至盧朐盧朐山名也胊音劬而使㳺擊将軍韓說張平侯衛伉屯其旁說讀曰恱伉音抗即衛青子使彊弩都尉路愽德築居延澤上天漢元年秋發讁戍屯五原昭帝始元二年冬發習戰射士詣朔方元鳯五年六月發三輔及郡國惡少年吏有告劾亾者屯遼東惡少年謂無賴子弟也告者謂人所告劾者為人所劾亾謂被告劾而逃亾者六年春正月募郡國徙築遼東𤣥莵城是時邉郡烽火候望精明匈奴為邉冦者少利希復犯塞宣帝元康中匈奴遣兵擊漢屯田車師者不能下帝與後将軍趙充國等議欲因匈奴衰弱出兵擊其右地使不敢復擾西域丞相魏相上書諫曰臣聞之救亂誅暴謂之義兵兵義者王敵加於己不得巳而起者謂之應兵兵應者勝争恨小故不忍憤怒者謂之忿兵兵忿者敗利人土地貨寳者謂之貪兵兵貪者破恃國家之大矜民人之衆欲見威於敵者謂之驕兵兵驕者滅此五者非但人事乃天道也間者匈奴甞有善意所得漢民輙奉歸之未有犯於邉境雖争屯車師不足致患今聞諸将軍欲興兵入其地臣愚不知此兵何名也今邉郡困乏父子共犬羊之裘食草菜之實常恐不能自存難以動兵不可以兵事動之軍旅之後必有凶年言民以其愁苦之氣傷隂陽之和也出兵雖勝猶有後憂恐災害之變因此以生今郡國守相多不實選風俗尤薄水旱不時案今年計子弟殺父兄妻殺夫者凡二百二十二人臣愚以為此非小變也今左右不憂此乃欲發兵報纎芥之忿於逺夷殆孔子所謂吾恐季孫之憂不在顓臾而在蕭墻之内也願陛下與平昌侯樂昌侯平㤙侯及有識者詳議乃可平昌侯王無故樂昌侯王武並帝之舅平㤙侯許昌皇太子外祖父也帝從相言而止神爵元年三月西羌反發三輔中都官徒弛刑及應募佽飛射士羽林孤兒胡越騎三河潁川沛郡淮陽汝南材官金城隴西天水安定北地上郡騎士羌騎詣金城夏四月遣後将軍趙充國擊西羌充國計欲以威信招降罕开及刼略者觧散虜謀徼極廼擊之徼要也要其倦極者徼工堯切時漢己發三輔太常徒弛刑弛刑謂不加鉗鉗者也弛言觧也三河潁川沛郡淮陽江南材官金城隴西天水安定北地上郡騎士羌騎與武威張掖酒泉太守各屯其郡者合六萬人矣酒泉太守辛武賢奏言郡兵皆屯備南山北邉空虚勢不可久或曰至秋冬廼進兵此虜在竟外之冊竟讀曰境也今虜朝夕為冦土地寒苦漢馬不能冬屯兵在武威張掖酒泉萬騎以上皆多羸瘦可益馬食以七月上旬賫四十日糧分兵並出張掖酒泉合擊罕开在鮮水上者虜以畜産為命今皆離散兵即分出雖不能盡誅且擅奪其畜産虜其妻子復引軍還冬復擊之大兵仍出虜必震壊仍潁也天子下其書充國令與校尉以下吏士知羌事者博議充國及長史董通年以為武賢欲輕引萬騎分為两道出張掖囘逺千里謂路紆曲也以一馬自佗負三十日食凡以畜産載負物者皆為佗為米二斛四斗麥八斛又有衣裝兵噐難以追逐勤勞而至虜必商軍進退稍稍引去商謂計度也逐水􅋄入山林随而深入虜即據前險守後阨以絶粮道必有傷危之憂為夷狄笑千載不可復而武賢以為可以奪其畜産虜其妻子此殆空言非至計也殆近也又武威縣張掖日勒皆當北塞有通谷水草日勒張掖之縣也臣恐匈奴與羌有謀且欲大入幸能要杜張掖酒泉以絶西域要遮也杜塞也其郡兵尤不可發先零首為畔逆佗種刼略言被刼略而反叛非其本心也故臣愚䇿欲捐罕开闇昧之過隐而勿章先行先零之誅以震動之宜悔過反善因赦其罪選擇良吏知其俗者捬循和輯此全師保勝安邉之䇿天子下其書公卿議者咸以為先零兵盛而負䍐开之助負恃也不先破䍐开則先零未可圗也帝廼拜侍中樂成侯許延夀為強弩将軍即拜酒泉太守武賢為破羌将軍即就也就其郡拜之也賜璽書嘉納其䇿以書勅譲充國曰譲責也皇帝問後将軍甚苦暴露将軍計欲至正月廼擊䍐羌羌人當穫麥已逺其妻子従其妻子令逺居而身来為冦精兵萬人欲為酒泉燉煌邉冦兵少民守保不得田作今張掖以来粟石百餘芻藁束數十皆謂直錢之數言其貴轉輸並起百姓煩擾将軍萬餘之衆若不早及秋兵水草之利争其畜食此畜謂畜産牛羊之属也食謂穀麥之属也一曰畜食畜之所食即謂草也欲至冬虜皆當畜食此畜讀曰蓄蓄聚積也多蔵匿山中依險阻将軍士寒手足皸瘃皸拆裂也瘃寒創也寧有利哉将軍不念中國之費欲以嵗數而勝微乆厯年嵗乃勝小敵也将軍誰不樂此者言凡為将軍者皆樂此今詔破羌將軍武賢将兵六千一百人燉煌太守快将二千人長水校尉富昌酒泉侯奉世将婼月氏兵四千人亾慮萬二千人亡慮大計也賫三十日食以七月二十二日擊䍐羌入鮮水北句㢘上㢘謂水岸曲而有廉稜者也去酒泉八百里去将軍可千二百里将軍其引兵便道西並進雖不相及使虜聞東方北方兵並来分散其心意離其黨與雖不能殄滅當有瓦觧者已詔中郎將卭将胡越佽飛射士歩兵二挍益将軍兵今五星聚東方中國大利蠻夷大敗五星所聚天下勝羌人在西五星在東則為漢太白出髙用兵法深敢戰者吉弗敢戰者凶将軍急装因天時誅不義萬下必全勿復有疑充國既得譲以為将任兵在外便宜有守以安國家言為将之道受任行兵於外雖受詔若有便宜則當固守以取安利也廼上書謝罪因陳兵利害曰臣竊見騎都尉安國前幸賜書擇羌人可使䍐开諭告以大軍當至漢不誅䍐以觧其謀恩澤甚厚非臣下所能及臣獨私羙陛下盛德至計亡已故遣开豪調庫宣天子至德䍐开之属皆聞知明詔今先零羌楊玉此羌之首帥名王将騎四千及煎鞏騎五千阻山石木候便為冦謂依阻山之木石以自保故也䍐羌未有犯今置先零先擊䍐釋有罪誅亡辜釋置也起一難就兩害誠非陛下大計也臣聞兵攻不足者守有餘又曰善戰者致人不致於人皆兵法之辭也致人引至而取之也致於人為人所引今䍐羌欲於燉煌酒泉冦且飭兵練戰士以湏其至飭整也湏待也飭與餝同坐得致敵之術以逸擊勞取勝之道也今恐二郡兵少不足以守而發之行攻釋致虜之術而從為虜所致之道臣愚以為不便先零羌虜欲為背叛故與䍐开觧仇結約然其私心不能亡恐漢兵至而䍐开背之也臣愚以為其計常欲先赴䍐开之急以堅其約先擊䍐羌先零必助之今虜馬肥糧食方饒擊之恐不能傷害適使先零得施徳於䍐羌堅其約合其黨施徳自樹徳也虜交堅黨合精兵二萬餘人迫脅諸小種附著者稍衆莫湏之属不輕得離也莫湏小種羌名也如是虜兵䆮多寖多也誅之用力數倍臣恐國家憂累繇十年數不二三嵗而已臣得蒙天子厚恩父子俱為顯列臣位至上卿爵為列侯犬馬之齒七十六為明詔填溝壑死骨不朽亡所顧念獨思惟兵利害至熟悉也於臣之計先誅先零已則䍐开之属不煩兵而服矣先零已誅而䍐开不服渉正月擊之得計之理又其時也以今進兵誠不見其利唯陛下裁察六月戊申奏七月甲寅璽書報従充國計焉二年匈奴單于将十餘萬兵旁塞獵旁音歩浪反欲入邉冦未至㑹其民顯除渠堂亾降漢言状漢以為言兵鹿奚盧侯而遣後将軍趙充國将兵四萬餘騎屯縁邉九郡備虜月餘單于病歐血固不敢入還去即罷兵五鳯三年匈奴大亂議者多曰匈奴為害日久可因其壊亂舉兵滅之詔遣中朝大司馬車騎将軍韓増諸吏富平侯張延夀光禄勲楊惲太僕戴長樂問御史大夫蕭望之計䇿望之對曰春秋晋士匄帥師侵齊聞齊侯卒引師而還君子大其不伐䘮士匄晋大夫范宣子也春秋公羊傳㐮十九年齊侯環卒晋士匄帥師侵齊至榖聞齊侯卒乃還還者何善辭也大其不伐䘮也以為㤙足以服孝子誼足以動諸侯前單于慕化鄉善稱弟遣使請求和親海内欣然夷狄莫不聞未終奉約不幸為賊臣殺今而伐之是乗亂而幸災也彼必奔走逺遁不以義動兵恐勞而無功宜遣使者弔問輔其微弱救其災患四夷聞之咸貴中國之仁義如遂蒙㤙得復其位必稱臣服此徳之盛也帝従其議後竟遣兵護輔呼韓邪單于定其國元帝永光二年秋隴西羌多姐旁種反彡音先亷切姐音子今西羌尚有此姓又音先冉切詔召丞相韋𤣥成御史大夫鄭𢎞大司馬車騎将軍王接左将軍許嘉右将軍馮奉世入議是時嵗比不登比頻也登成也京師糓石二百餘一石直二百餘錢邉郡四百關東五百四方飢饉朝廷方以為憂而遭羌變𤣥成等漠然莫有對者漠無也音莫奉世曰羌虜近竟内皆叛竟讀曰境不以時誅亾以威制逺蠻臣願帥師討之帝問用兵數對曰臣聞善用兵者役不再興糧不三載故師不久暴而天誅亟被暴露也亟急也音居力切徃者數不料敵料量也而師至於折傷再三發軵軵推也淮南子曰内郡軵車而餉音而隴切則曠日煩費威武虧矣今反虜無慮三萬人無慮舉大之言也無小思慮而大言也法當倍用六萬人然羌戎弓矛之兵耳噐不犀利犀堅也可用四萬人一月足以决丞相御史兩将軍皆以為民方收歛時未可多發萬人也守之且足奉世曰不可天下被饑饉士馬羸耗耗减也音呼到反守戰之備久廢不簡簡謂選揀夷狄皆有輕邉吏之心而羌首難言創首為㓂難也今以萬人分屯數處虜見兵少必不畏懼戰則挫兵病師守則百姓不救如此怯弱之形見羌人乗利諸種並和和應也音故引切相扇而起臣恐中國之役不得止於四萬非財幣所能觧也少發師而曠日曠空也空来其日計無功也與一舉而疾决利害相萬也相益為萬倍也固争之不能得有詔益二千人於是遣奉世将萬二千人騎以将屯為名且云領兵屯田不言討也典属國任立護軍都尉昌為偏禆到隴西屯三處典属國為右軍屯白石護軍都尉為前軍屯臨洮奉世為中軍屯首陽西極上西極山名也前軍到降同阪阪平阪也降同者阪名也阪府阪切降下江切阪普河切先遣校尉在前與羌争地利又别遣校尉救民於廣陽谷羌虜盛多皆為所破殺兩校尉奉世具上地形部衆多少之計願益三萬六千人反足以决事書奏天子為發兵六萬餘人拜太常弋陽侯任千秋為奮武将軍以助焉竟寧元年呼韓邪單于来朝賜以良家子王嬙單于驩喜上書碩保塞上谷以西至燉煌保守也自請保守之令無㓂盗傳之無窮請罷邉備塞吏卒以休天子人民天子令下有司議者皆以為便郎中令侯應習邉事以為不可許帝問狀應曰周秦以来匈奴暴桀冦侵邉境漢興尤被其害臣聞北邉塞至遼東外有隂山東西千餘里草木茂盛多禽獸本冐頓單于依阻其中治作弓矢来出為冦是其苑囿也至孝武世出師征伐斥奪此地攘之於幕北斥開也攘却也建塞徼起亭隧隧謂深開小道而行避敵鈔冦也築外城設屯戍以守之然後邉竟得用少安幕北地平少草木多大沙匈奴来冦少所蔽隠従塞以南徑深山谷往来差難邉長老言匈奴失隂山之後過之未甞不哭也如罷備塞戎卒示夷狄之大利不可一也今聖徳廣被天覆匈奴如天之覆也匈奴得蒙全活之㤙稽首来臣夫夷狄之情困則卑順彊則驕逆天性然也前以罷外城省亭隧今裁足以候望通烽火而已古者安不忘危不可復罷二也中國有禮義之教刑罸之誅愚民猶尚犯禁又况單于能必其衆不犯約哉三也必極也極保之也且中國尚建闗梁以制諸侯所以絶臣下之覬覦也設塞􅗲置屯戍非獨為匈奴而已亦為諸属國降民本故匈奴之人恐其思舊逃亾四也近西羌保塞與漢人通變吏民貪利侵盗其畜産妻子以此怨恨起而背畔世世不絶今罷乗塞則生嫚易分争之漸五也乗塞登之而守也嫚易猶相欺侮也易音弋阪切往者從軍沒不還者子孫貧困一旦亾出求其親戚六也又邉人奴婢愁苦欲亾者多曰聞匈奴中樂無奈候望急何然時有亾出塞者七也盗賊桀黠羣軰犯法如其窘急亾走北出則不可制八也𧺫塞以来百有餘年非皆以土垣也或因山巖石木柴僵落谿谷水門僵落謂山下樹木摧折或亡死枯僵堕落者僵音薑稍稍平之率徒築治功費久逺不可勝計臣恐議者不勝慮其終始欲以一切省繇戍一切謂摧時也十年之外百嵗之内卒有他變障塞破壊亭隧滅絶當更發屯繕治累世之功不可卒復九也如罷戍卒省候望單于自已保塞守禦必深徳漢於漢自稱㤙徳也請求無己小失其意則不可測開夷狄之隙虧中國之固十也非所以永持治安威制百蠻之長策也封奏天子有詔勿議罷邉塞事使車騎將軍口諭單于将軍許嘉也諭謂曉也曰單于上書願罷北邉吏士屯戍子孫世世保塞單于鄉慕禮義所以為民計者甚厚此長久之䇿也朕甚嘉之中國四方皆有闗梁障塞非獨以備塞外也亦以防中國姦邪放縦出為冦害故眀法度以專衆心也敬諭單于之意言已曉知其意也朕無疑焉為單于怪其不罷故使大司馬車騎将軍嘉曉單于單于謝曰愚不知大計天子幸使大臣告語甚厚册府元龜巻九百八十八
