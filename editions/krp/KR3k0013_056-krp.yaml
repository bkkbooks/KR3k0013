body:
  text: 册府元龜卷五十六宋王欽若等撰帝王部節儉傳曰儉者國之寳也漢文帝曰吾為天下守財耳豈可妄用之哉蓋王者據神器之重託億兆之上在乎約費以足用崇儉以率下故古先哲王無宫室苑囿之飭無珠玉輿馬之玩衣無文繡食無兼味不視奇怪之物不聽淫靡之音急於致理薄於自奉繇是風行草偃家給人足民俗以之淳厚品物以之茂遂故曰上節用則國富君無欲則民安斯之謂矣黄帝勤勞心力耳目節用水火財物臣欽若等曰卷中不載年月日者竝史闕文餘皆准此帝嚳取地財而節用之帝堯富而不驕貴而不舒黄收純衣純一作絞太古冠冕圖夏名冕曰收禮記曰野夫黄冠純衣士之祭服純讀曰緇堂髙三尺土堦三等茅茨不剪棌椽不斵屋蓋曰茅茨以茅蓋屋也棌木名今之櫟木也飯土簋歠土刑簋以盛飯刑以盛羮土謂燒土為之糲梁之食糲粗米也一斛粟七斗米為糲藜藿之羮夏日衣葛冬日鹿裘其送死桐棺三寸帝舜甑盆無膻而工不以巧獲罪言工不以工巧之事獲罪也夏禹菲飲食而致孝乎鬼神惡衣服而致美乎黻冕卑宫室而盡力乎溝洫周文王卑服即康功田功文王節儉卑其衣服以就其安人之功以就田功以知稼穡之艱難宣王中興更為儉宫室小寢廟詩人美之作斯干之詩漢文帝二年十一月詔太僕見馬遺財足遺留也太僕見在之馬今當减留財足充事帝即位二十三年宫室苑囿車騎服御無所增益有不便輒弛以利民嘗欲作露臺召匠計之直百金上曰百金中人十家之産也中謂不富不貧吾奉先帝宫室常恐羞之何以臺為今新豐縣南驪山頂有露臺鄉極為髙顯猶有文帝所欲作臺之處身衣弋綈弋皁也身衣弋綈又曰弋黒色綈厚繒所幸慎夫人衣不曵地帷帳無文繡以示敦朴為天下先治霸陵皆瓦噐不得以金銀銅錫為飾因其山不起墳霸陵文帝陵名又後漢書云文帝處百姓於靈臺餙帷帳於皁囊或有譏其儉者帝曰朕為天下處財耳豈得妄用之哉又東方朔曰文帝集上書囊以為殿帷又後漢書王符曰孝文皇帝躬衣弋綈革為韋帶成帝建始二年三月罷六廄技巧官秩减乘輿廄馬哀帝綏和二年即位詔三齊服綺綉難成害女紅减乘輿服御後宫用度及罷尚方御府百工技巧靡麗無益之物晉武帝太始元年十二月戊辰下詔大𢎞儉約出御府珠玉玩好之物頒賜王公以下乙亥詔省郡國御調禁樂府靡麗百戲之技及彤文㳺畋之具武帝承魏氏奢侈刻弊之後百姓思古之遺風乃厲以恭儉敦以寡慾有司嘗奏御牛青絲靷斷詔以青麻代之惠帝永興元年十二月丁亥詔曰頃戎車屢征勞費人力供御之物皆减三分之二元帝性簡儉冲素有司嘗奏太極殿廣室施絳帳帝曰漢文集上書皂囊為帷遂令冬施青布夏施練帷帳將拜貴人有司請市雀釵帝以煩凟不許所幸鄭夫人衣無文綵從母弟王廙為母立屋過制流涕止之成帝咸和七年七月丙辰詔諸養獸之屬損費者多一切除之咸康七年三月戊戌杜皇后䘮帝下詔曰吉凶典儀誠宜備設然豐約之度亦當隨時况重壤之下而崇飾無用邪今山陵之事一從節儉上陵賜賞皆是死事勲績之家親戚受寵未曾横有所及魏文成和平四年七月壬午詔曰朕每嵗以秋時閒月命郡官講武平壤所幸之處必止改作孝文太和十一年十月辛未詔起部罷無益之作出宫人不知機杼者十一月丁未詔罷尚方綿繡綾羅之功四民欲造任之無禁其御厨衣服金銀珠玉綾羅紬錦大官雜噐太僕乘具内庫弓矢出其大半班賚百官及京師士庶下至工商皁𨽻逮於六鎮戍士各有差帝性儉素常服澣濯之衣鞍勒鐵木而已帝之雅志皆此類也西魏文帝大統元年九月有司奏煎御香澤須錢數萬帝以軍旅在外停之後周太祖性好朴素不尚虗飾常以反風俗復古始為心五年五月免妓樂雜役之徒皆從編户武帝保定元年二月丙午省轝輦去百戲二年十月戊戌詔曰樹之元首君臨海内本乎宣明教化亭毒黔黎豈惟尊貴其身侈富其位是以唐堯疎葛之衣麄糲之食尚臨汾陽而永歎登姑射而興想况無聖人之徳而嗜欲過之何以克厭衆心處于尊位朕甚恧焉今巨冦未平軍戎費廣百姓虛空誰與為足凡是共朕衣服飲食四時所須爰及宫内調度朕今手自减削縱不得頓行古人之道豈曰全無庶幾凡爾百司安得不思省約朂朕不逮者哉天和二年省掖庭四夷樂後宫羅綺工人五百餘人建徳元年十二月庚寅幸會道院以上善殿壯麗遂焚之六年正月辛丑詔曰偽齊叛渙竊有漳濵世縱淫風事窮雕飾或穿池運石為山學海或層臺累搆槩日凌雲以暴亂之心極奢侈之事有一於此未或弗亡朕菲食薄衣以𢎞風教追念生民之費尚想力役之勞方當易兹弊俗率歸節儉其東山南園及三臺可竝毁撒瓦木諸物凡入用者盡賜下民山園之田各還本主五月己丑詔曰朕欽承丕緒寢興寅畏惡衣菲食貴昭儉約上棟下宇土階茅屋猶恐居之者逸作之者勞詎可廣厦髙堂肆其嗜欲往者冢臣專任制度有違正殿别寢事窮壯麗非直雕墻峻宇深戒前王而緯搆𢎞敞有踰清廟不軌不物何以示後兼東夏初平民未見德率先海内宜自朕始其露寢會義崇信含光雲合思齊諸殿等農隙之時悉可毁拆彫斵之物竝賜貧民繕造之宜務從卑朴癸巳行幸雲陽宫戊戌詔曰京師宫殿已從撤毁并鄴二都華侈過度誠復作之非我豈容因而弗革諸堂殿壯麗竝宜除蕩甍宇諸物分賜窮民三農之隙别漸營搆止蔽風雨務在卑狹帝性既明察少於恩惠凡布徳立行皆欲踰越古人身衣布袍寢布被無金寳之餙諸宫殿華綺者皆撤毁之改為土堦數尺不施櫨栱其雕文刻鏤錦繡纂組一皆禁斷後宫嬪御不過十餘人隋髙帝居處服翫既務存節儉令行禁止上下化之開皇仁夀之間丈夫不衣綾綺而無金玉之飾常服率多布帛裝帶至以銅鐵骨角而已雖嗇於財至賞賜有功亦無所愛恡帝既躬體儉約六宫咸服澣濯之衣乘輿供御有故敝者隨令補用皆不改作非享燕之事所食不過一肉而已有司嘗進乾薑以布袋貯之帝因以為費大加譴責後進香復以氈袋因笞所司以為後戒自是内外率職府帑充實百官禄賜及賞功臣皆出於豐厚焉唐髙祖武徳元年七月庚申詔曰隋代離宫别館遊憩之所竝廢之十月庚辰詔曰國初草創日不暇給凡厥禮儀鮮能盡傋且生人未乂彫弊寔多至於畜産思致蕃息祭祀之本皆以為身窮極事神有乖正直殺牛不如禴祭明德即是馨香望古推今祭神一揆其祭圜丘方澤宗廟以外竝可止用少牢先用少牢者宜用特牲待時和年豐然後克循常禮髙祖凡所營為務從簡易服用取給而已太宗貞觀二年八月乙未公卿奏曰依禮季夏之月可以處臺榭今隆暑未退秋霖方始宫中卑濕請營一閣以居之帝曰朕有氣病豈宜下濕若遂來請縻費良多昔漢文帝將起露臺而惜十家之産朕徳不逮於漢帝而所費過之豈謂為民父母之道也固請竟不許四年十一月己丑户部奏窖苫須麻十萬綟帝曰麻為靸鞋得供國用自今窖苫宜以葛蔓為之又將作大匠竇璡修營雒陽宫帝務存節儉璡乃於宫鑿池起山崇飾雕麗虗費功力帝聞之大怒遽令毁之璡又坐是免十六年二月壬寅帝謂侍臣曰朕頃因覧劉聰傳聰將為劉后起䳨儀殿廷尉陳元達諌聰大怒命斬之劉后手䟽啟請甚切聰怒觧而甚媿之人之讀書欲廣聞見行之難也朕於藍田市木將别為一殿取制兩儀仍搆重閣其木已具逺想聰事斯作遂止二十二年四月以頻造宫室務從卑儉終費人力帝謂侍臣曰唐堯茅茨不剪以為儉徳不知堯時無瓦蓋桀紂為之若於無瓦之晨為茅茨者未為儉徳不剪之言蓋書史粉飾之耳朕今搆采椽於椒風之日立茅茨於有瓦之時將為節儉自當不謝古昔省宫室之廣大役人功以此再思不能無媿髙宗永徽六年十一月戊子詔曰少府監非軍國所需宗廟之用竝不須飾以珠玉諸州常貢珠寳者竝宜停進其市肆間不得更為彫鏤及貨鬻珠寳及金銀等物龍朔二年六月癸亥詔曰比每誕育王子公主諸親慶賀多進錦繡纂組金銀雕鏤虛有縻費深乖節儉自今以後即宜竝停𤣥宗先天二年八月戊午勅曰禮曰寧儉書戒無逸約費嗇財為國之本至於賜酺合宴正欲與人同歡廣為聚斂故非取樂之意况自徇於奢是不戒也心勞於偽是不經也殷監于此良用憮然自今以後兩京及天下酺宴所作山車旱船結綵樓閣寳車等無用之物竝宜禁斷開元二年七月乙未内出珠玉錦繡於殿庭焚之勅曰朕聞殊玉饑不可食寒不可衣故漢文云雕文刻鏤傷農事錦繡纂組害女工農事傷則饑之本女工害則寒之源又賈生有言曰夫人一日不再食則饑終歳不製衣則寒饑寒切體慈母不能保其子君焉得以有其民哉朕以眇躬託於王公之上曷嘗不日旰忘食未明求衣使反朴還淳家給人足而倉廩未實饑饉相仍水旱或愆糟糠不厭靜思厥故皆朕之咎故有漿酒霍肉玉食錦衣互相誇尚浸成風俗夫令之所施惟行不惟反人之化上從實不從言是以古先哲王以身率下如風之靡何俗不易此事近有處分當以施行朕若躬服珠玉目玩錦繡而欲公卿節儉黎庶敦朴是揚湯止沸渉海無濡不可得也是知文質之風自上而始朕欲捐金抵玉塞本澄源所以服御金銀器物今付有司令鑄為鋌仍貯掌以供軍國珠玉之貨無益於時竝宜焚於殿前用絶浮競至誠所感期於動天况凡百官有違朕命其宫掖之内后妃以下咸服澣濯之衣永除珠翠之餙當使金玉同價風俗大行日用不知克臻至道布告遐邇如朕意焉戊戌詔天下更不得採取珠玉刻鏤器玩造作錦繡珠䋲織成帖縚二色綾綺羅作龍鳯禽獸等異文字及堅􅏌錦文者决一百受僱工匠降一等科之兩京及諸州舊有官織錦坊宜停十二年正月戊寅勅曰朕聞舞者所以節八音而行八風豈徒誇詡時代眩曜耳目而已也自立雲韶内府百有餘年都不出於九重今欲陳於萬姓冀與羣公同樂豈獨娛於一身且珠翠綺羅孰非珍玩常念百金之費每惜十家之産是以所服之服俱非綺羅所冠之冠亦非珠翠若弋綈之制大帛之衣徳雖謝於古人儉不忘於曩哲庶羣公觀此當體朕之不奢肅宗至徳二年十二月詔宫女及狗豽鷄鷹鷂之數宜即停减屋宇車輿衣服噐用竝宜准式珠玉寳鈿平脱金泥織成刺繡之類一切禁斷乾元二年正月戊寅帝耕藉田先至於先農之壇因閲耒耜有雕刻文飾者謂左右曰田噐農人執之在於朴素豈貴文飾乎乃命撤之下詔曰古之聖王臨御天下莫不務農敦本寳儉為先蓋用勤身率下也屬東耕啟候爰事藉田將欲勸彼蒸人所以執兹耒耜如聞有司所造農噐妄加雕飾殊匪典章况紺轅縹軛固前王有制崇奢尚靡諒為國所疵靜言思之良用歎息豈朕法堯舜重茅茨之意邪其所造雕飾者宜停仍令有司依農用常式即别改造庶萬方黎獻知朕意焉三月壬寅詔曰朕聞古者皇王乘時致理莫不上稽天象下順人心所以革弊移風推誠布化也朕自纂膺鴻業再復寰區何嘗不勤已勵精兢兢業業一物失所爰軫納隍之憂四方未寧深懐馭朽之懼頃雖㳂革之令隨事每下而弛張之要未得其宜遂使人瘼尚繁冦虞猶梗有乖政本諒在朕躬用懷酌損之儀庶叶惟新之典自今已後常膳及服御等物悉從節减周身之外一切竝停武徳中尚作等坊除造賞物賜蕃客將士噐物及軍戎祠祭所要餘竝停上元二年八月壬申内宴宰臣已下内出妓樂不過數人甚儉司徒兼中書令郭子儀等上表曰臣聞古先哲王莫不崇儉以阜時戒奢以敦本勤以樹善利在化淳伏惟乾元大聖光天文武孝感皇帝陛下纉成盛業傋歴諸難功存造化澤被甿俗至於服用之飾聲樂之娛宜有所增加以彰聖徳今月十六日臣等伏蒙天恩幸霑内宴切見後庭妓樂其數非多衣製儉薄頗為逼下顧無麗綺之玩是行質素之風恭惟睿慈允臻於道昔漢文帝念中人之産晉武焚外國之裘皆抑止於有餘匪謙讓於當分以今比古無徳而稱况聖作物覩著自格言上行下效存於理體陛下以農桑未乂軍務猶虞思懲富教之繇率先儉約之化康寧之福莫尚於此臣等僃位宰臣職當毗賛恐聖烈無紀臣下未知請編之史策宣下中外詔曰儉徳之恭約失者鮮格言為重理道在兹朕志復淳源用濟海内振其𤣥化鏡以至清非謂艱難之時自崇樸素之本無聲之樂庶聞於四方曳地之衣將比於前古且率人而自我亦揉木而銷金為君之難事當乎增惕股肱之義務在乎弼違期於啟沃之勤不在延君之譽為人上者此道惟常豈可付以史官宣於中外載循來表殊匪朕懷翼日太子賔客韓擇木入奏因奉賀節儉妓樂衣無綺繡之飾食無珍羞之具上因出衣袖以示之曰朕此衣已三度浣矣代宗寳應元年六月戊午勅尚食等厨三分量减一分所司不得輙有奏請至秋熟後任依常式廣徳二年二月乙亥南郊禮畢敕曰朕思素儉敦以淳風必約嚴章以齊侈俗其珠玉噐玩寳鈿雜繡等一切禁斷徳宗初即位大厯十四年閏五月癸未詔罷梨園使及伶官之冗食者三百餘人畱者𨽻太常是月丙戌詔曰四方貢銀噐有以金飾者去之六月己亥敕曰乘輿服御量加减省務敦質素天下進獻事縁郊祀陵廟所須依前勿闕餘竝撙節歸於省約奇噐異服綿繡珠玉等竝不得輙有進獻七月庚午詔王者不寳逺物所寳惟賢故堯設茅茨禹卑宫室光武捨去寳劔順帝封還大珠朕仰止前王思齊朴素邕州所奏金坑誠為潤國害人放利非朕素懷方以不貪為寳惟徳其物豈兹難得之貨生其可欲之心耶其金坑任人開採官不得占先是元載馬璘劉忠翼之第自天寳中京師堂寢已極𢎞麗而第宅未甚逾制然衞公李靖廟已為嬖人楊氏廄矣及安史二逆之後法度摧壞大軍宿將競崇棟宇臺榭之飾無復界限力窮乃止人謂之木妖而馬璘之堂尤盛計錢二十萬貫他室稱是既而璘卒於軍以䘮歸京師士庶欲觀其宏麗假名於故吏投刺會弔者數千百人故命撤毁之自是京師樓榭之踰制皆毁癸酉詔减服物供獻之屬以千數徳宗始即位徳音屢下務存儉徳内外人心皆得其理建中元年十月己丑詔减膳羞常貢之物貞元二年四月辛巳陜虢觀察使李泌奏虢州盧氏縣山冶近出瑟瑟請充貢獻禁人開採詔曰瑟瑟之寳朕不飾噐玩不尚珍奇常思反朴之風用明躬儉之節其出瑟瑟處任百姓求採不宜禁止瑟瑟玉名三年正月庚戌詔内外諸親設祭於大行皇后竝不得假飾花果已後公私集會竝宜准此順宗貞元二十一年二月即位甲子赦曰清淨者理國之本恭儉者修已之端朕臨御萬邦方𢎞此道苟可濟物子何愛焉宫掖之中宜先省約其後宫細人子弟音聲人等竝宜放歸親族憲宗元和五年十一月丙午帝謂宰臣曰朕以禁中舊殿歳乆危壞昨令有司經度資費多非意欲漸葺搆之所冀成功不毁但縁國用未贍物力猶詘是以每務簡儉情在不勞至於車服飲食亦深畏奢侈以是思之不知竟可營造否權徳輿對曰陛下以至徳愛人情存節用此實為理之本仲尼謂大禹卑宫室菲飲食惡衣服以為無間然漢文帝欲起露臺召匠計之直百金帝曰中人十家之産吾奉先帝宫室常恐羞之何以臺為遂止是以文帝之代四海庶富俗敦禮讓一歳斷獄纔百人幾致刑措前史以為羙談後王用為師表且簡則不勞人儉則不廢財人安財足天下自化上好奢侈則下亦變風人務縱欲爭奪自起今陛下至誠恭儉有過昔王卑躬愛人動務至理實天下蒼生幸甚文宗太和元年四月壬辰勅皇太子料宜權停敬宗以晉王位居中嗣時方二歳已命有司供獻盡同儲副至是權罷之壬寅命毁放鴨亭子先是敬宗嘗於昇陽殿東增置亭沼多聚水禽謂之放鴨亭子是日命毁之戊申幸教坊迴仰望仙門側有看樓十間帝以不復逰御命毁之二年五月庚子詔應諸道進奉内庫四節及降誕進奉金花銀噐并纂組文綾纈雜物竝折充挺銀及綾絹其中有賜與所須待五年後續有進止文宗鋭意求理每與宰臣議政深惡侈靡故每下詔勅常以敦本崇儉為先庶乎上行下效之有漸也丁巳命内官赴漢陽公主等宅宣每遇對日不得廣挿釵梳不須服短窄衣服三年九月辛巳命中使宣兩軍中尉及諸司使内官等不許著紗縠及綾羅等自艱難以來風俗寖歸奢靡權邪貴近競相尚豪溢而不能制之帝姿性高雅始自登極時用服飾必以儉素為先思有以自近懲革繇是孜孜以留意其後駙馬都尉韋處仁入見巾夾羅巾以進帝謂曰本慕卿門户清素故俯從選尚如此巾服從他諸職為之卿不須為也十一月甲午詔四方竝不得輙以雜行様難行非常之物為獻其於纎麗若花絲布撩綾之類竝禁斷勅到一月日機杼一切焚棄開成四年正月丁卯夜於咸泰殿觀燈作樂三宫太后及諸公主竝赴宴帝思節儉化天下衣服咸有制度左右親幸莫敢踰越延安公主衣裙寛大即時遣歸駙馬都尉竇澣待罪勅曰公主入參衣服踰制從夫之義過有所歸竇澣宜奪兩月賜錢又便殿對六學士帝語及漢文恭儉因舉袂曰此澣濯者三矣宣宗春秋既盛在藩邸時僃知民間庶事延英對宰臣無不議及百姓又性常儉素先宫中每有行幸即以龍腦欝金藉之於地至是帝皆不許時人方之漢文帝後唐明宗以同光四年四月即位甲寅詔曰夫人不能自理立之君以理之豈可殫天下之租賦為宫中之玩好後宫内職量畱一百人其餘任歸骨肉内官守閽掌扇量畱三十人教坊音聲量畱一百人鷹犬之事以僃蒐狩量畱二十人御厨膳夫量畱五十人其餘任從所適内諸司事有名無事者竝從停廢天成四年四月壬寅武徳使上言重修嘉慶殿請丹漆金碧以瑩之帝曰此殿為火所廢不可不修但務宏壯何煩華侈尋改為廣夀殿末帝清泰二年五月庚戌詔不得貢奉寳裝龍鳯雕鏤刺作組織之物晉高祖天福二年四月户部尚書王權奏臣聞戒奢從儉惟經國之逺圖務實去華乃前王之令範伏惟皇帝陛下開基創業應天順人顯宗朴素之風克協聖明之訓臣伏見諸侯奉貢九土勤王羅紈則纎麗奇工噐皿則雕鏤異狀文之錦繡雜以珠璣雖外表珍華而事近淫巧臣伏請特降勅㫖頒下列藩自今奉貢其鮮麗匹段等酌其物料所直折進生白重絹可將一匹之鮮麗變數匹之縑繒又進奉銀噐及鞍轡等竝不在雕鐫金玉其餘衣甲噐械竝不在飾以銀裝布金彩如有鉤玦瑕處可將銅鐵代之足以换彼鮮明益其堅利雖所减者輕同積羽而所集者重可如山匪為淳厚國風抑亦豐資天府勅王權素推華族方處重官覩四海之貢輸虛陳巧麗察五兵之噐用枉飾珍奇不惟耗彼生靈實且傷於淳素爰陳章疏將召和平宜允敷敭明示誡約自今後臣寮貢奉不得務其淫巧衣甲噐械不得飾以金銀咸委遵行勿得踰越仍付所司十一月湖南馬希範進金漆栢木銀裝起突龍鳯茶床椅子踏床子紅羅金銀綿繡褥紅絲網子又進金銀玳瑁白檀香噐皿銀結條假菓花樹龍鳯鑾畫皷等物又進含膏桃源洞白茅百靈藤渠江南嶽紫蓋峯白雲洞清花等茶又進蟬翼鍾乳頭香石亭脂木𤓰丸一萬顆藥橄㰖子帝覧之謂侍臣曰奇巧蕩心斯何用耳藥茗可進而丸可食乎但地僻海曲習以成風來遠之道遽止為難宜令所司與收聞者服其儉徳漢髙祖乾祐元年詔曰卑宫菲食前代之令猷革舄綈衣哲后之明徳至於損上益下惜力愛人冀息煩苛漸期富庶所有乘輿服御後宫費用太官常膳一切减損在京及内諸司并天下州府除應奉軍期急切外其餘不急之務非禮營造竝皆停罷免致勞役周太祖廣順元年正月制曰朕早在藩鎮常戒奢華今御寰區尤思節儉况國家多事帑藏甚虛將愛憂勞所宜省約應乗輿服御之物不得過為華飾宫門噐用竝從朴素太官常膳一切减損諸道所有進奉比助軍國支費其珍巧纎華及奇禽異獸鷹犬之類不許輙有貢獻諸無用之物不急之務竝宜停罷二月内出寳玉噐數十有茶籠酒噐枕及金銀結鏤寳裝床几飲食之具碎之於殿庭有一玉杯累擲之不壊樞宻使王峻上請太祖笑而賜之太祖謂侍臣曰凡為帝王安用此為近聞漢隱與嬖寵嬉戯珍華寳玩不離於側覆車未逺宜以為鑑仍戒左右今後凡有珍華悦目之物不得入宫世宗顯徳五年六月壬申宣徽院進呈御食物料之數帝因批出曰朕之常膳所用物料今後减半餘人所食即須仍舊册府元龜卷五十六
