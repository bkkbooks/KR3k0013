body:
  text: 册府元龜卷八百二十宋王欽若等撰總錄部立祠禮曰法施於人則祀之以死勤事以勞定國能禦大災能捍大患則祀之又曰孟夏禱祀古之卿士有益於人者此乃古先哲王旌有功褒有徳載在祀典領之祀官以垂勸乎天下也乃有自天生徳崇四教以化人事君盡忠以直諫而殞命或化流於千里或仁洽於一國以至家行敦篤鄉邑之所欽慕威名殚輝戎狄之所畏服繇是搆之祠宇薦以苾芬没者寄其悲哀生者伸其企戀至於刻貞石紀茂績咸用論次以示于後伍子胥呉大夫也呉王夫差賜伍子胥屬鏤之劍曰子以此死子胥乃自剄死呉王取子胥尸盛以鴟夷革取馬皮為䲭夷䲭夷壺形浮之江中呉人憐之為立祠於江上因命曰胥山孔子為魯司宼哀公十六年卒魯人世世相傳以嵗時奉祠祀孔子冡冡大一頃後世因廟藏孔子衣冠琴車書至于漢二百餘年不絶白起為秦將封武安君昭王賜起劔使自殺起死非其罪秦人憐之鄉邑皆祭祀焉漢欒布為燕相燕齊之間皆為立社號曰欒公社石慶為齊相齊國慕其家行不治而齊國大治不治無所治罰為立石相祠李廣利為貳師將軍降匈奴嵗餘衛律害其寵㑹母閼氏病單于之母也律飭胡巫言先單于怒曰胡故時祠兵嘗言得貳師以社以祀社今何故不用於是收貳師貳師罵曰我死必滅匈奴遂屠貳師以祠㑹雨雪數月畜産死人民疫病榖稼不熟北方早寒雖不宜禾稷匈奴中亦種黍稷單于恐為貳師立祠室胡建為渭城令治甚有聲為蓋主所告自殺吏民稱寃至今渭城立其祠于公定國之父為縣獄吏郡中為之立生祠號曰于公祠文翁為蜀郡太守終于蜀吏民為立祠堂嵗時祭祀不絶召信臣九江人為南陽太守九江郡二千石嵗時率官屬行禮奉祀信臣冡而南陽亦為立祠平帝元始四年詔書祀百辟卿士有益於民者蜀郡以文翁九江以信臣應詔段㑹宗為西域都䕶病死烏孫中城郭諸國發喪立祠祭不絶龔遂為水衡都尉卒歸葬平陽後延篤為平陽侯相到官表遂之墓立銘祭祠擢用其後於畎畝之間朱邑為大司農病且死屬其子曰我故為桐鄉吏其民爱我必葬桐鄉後世子孫奉嘗我不如桐鄉民嘗謂烝嘗之祭及死其子葬之桐鄉西郭外民果為邑起冡立祠嵗祭至今不絶後漢文齊為益州太守降集蠻夷甚得其和光武徴之於道卒詔為起祠堂郡人立廟祀之陳衆為揚州牧歐陽歙從事時李憲餘黨淳于臨等猶聚衆千人屯灊山攻殺安風令歙遣兵不能尅衆白歙請得喻降臨於是乗單車駕白馬徃説而降之灊山人共生為立祠號白馬陳從事云任安廣漢緜竹人少事楊厚究極圖籍還家講授建安七年卒門人慕仰為立碑銘許楊為汝南太守鄧晨都水掾復立鴻郤陂後以病卒晨於都宫為楊起廟圖畫形象百姓思其功績皆祭祀之侯覇為臨淮太尹後為大司徒薨臨淮吏人共為立祠四時祭焉祭彤為遼東太守及死遼東吏人為立祠四時祭奉范冉冉或作丹陳留人卒諡貞節先生刺史郡守各為立碑表墓焉岑彭為征南將軍征蜀為刺客所殺蜀人憐之為立廟武陽嵗祠焉韋義為廣都長以兄順䘮去官廣都為生立廟王堂為巴郡太守時西羗冦郡為民患堂馳兵赴賊斬虜千餘級巴庸清静吏民生為立祠楊仲續為祁令甚有徳惠人為立祠楊厚為侍中稱病歸犍為以黄老教人及卒門人為立廟郡文學掾史春秋饗射常祠之王喬為葉令卒百姓乃為立廟號葉君祠牧守毎班録皆先謁拜之吏人祈禱無不如應若有違犯亦能為祟張禽為越嶲太守政化清平得夷人和及卒夷人愛之如䘮父母詔書嘉美為立祠堂宋登為汝隂令後為潁川太守病免卒汝隂人配社祠之鄧訓為䕶羗校尉卒夷人羗胡家家立祠毎有疾病輙此請禱求福何敞為汝南太守脩理鮦陽舊渠百姓頼其利鮦陽縣屬汝南郡故城在今豫州新蔡縣北水經注云葛陂東出為鮦水俗謂之三丈陂墾田増二萬餘頃吏人共刻石頌敞功徳周嘉為零陵太守卒吏民為立祠趙炳東陽人能為越方善禁呪也章安令惡其惑衆收殺之人為立祠室於永康至今蚊蚋不能入在今婺州永康縣東姜詩為江陽令卒于官所居治鄉人為立祠高獲汝陽人光武引見欲用為吏出便辭去後逺遁江南卒於石城石城人思之共為立祠王渙為洛陽令卒民思其徳為立祠安陽亭西每食輙弦歌而薦之古樂府歌曰孝和帝在時洛陽令王君本自益州廣漢蜀人少行官學通五經論明知法令歴代衣冠從温補洛陽令化行致賢外行猛烈内懐慈仁移惡子姓名五篇著里端無妄發賦念在理寃清身苦體夙夜勞勤化有能名逺近所聞天年不傳遂早就奄昏為君作祠安陽亭西欲令後代莫不稱延熹中桓帝事黄老道悉毁諸方祀惟特詔宻縣存故大傅卓茂廟雒陽留王渙祠焉崔寔為尚書稱疾免歸建寧中卒于家大鴻臚袁隗樹碑頌徳任延為九眞太守視事四年徴詣雒陽以病稽留左轉睢陽令九眞吏人生為立祠荀淑為當塗長歴朗陵使相及卒二縣皆為立祠許荆為桂陽太守卒於官桂陽人為立廟樹碑賈逵為豫州刺史及卒吏民追思之刻石立祠張奐為武威太守其俗多妖忌凢二月五月産子及與父母同月生者悉殺之奐示以義方嚴加賞罰風俗遂改百姓生為立祠奐卒武威多為立祠世世不絶延篤南陽犨人為京兆尹以病免歸卒于家鄉里圖其形於屈原之廟屈原楚大夫抱忠貞而死篤有志行文彩故圖其像而偶之周黨隐居黽池及終邑人賢而祠之韓韶潁川人為贏長卒於官同郡李膺陳寔杜宻荀淑等為立碑頌焉陳寔潁川人為太丘長以沛相賦斂違法乃觧印綬去及卒海内赴者三萬餘人制衰麻者以百數共刋立石碑桓彬卒蔡邕等共論序其志僉以為彬有過人者四夙智早成岐嶷也學優文䴡至通也仕不茍禄絶高也辭隆從窊潔操也乃共樹碑而頌焉馬稜遷廣陵太守時榖貴民饑奏罷鹽官以利百姓賑貧羸薄賦税興復陂湖漑田二萬餘頃吏民刻石頌之郭㤗字林宗太原介休人太常趙典舉有道不應年四十二卒于家四方之士千餘人皆來㑹𦵏同志者乃共刻石立碑蔡邕為文既而謂盧植曰吾為碑銘多矣皆有慙徳惟郭有道無媿色爾魏倉慈為敦煌太守數年卒州為立祠顔斐為京兆太守數年遷平原及卒京兆為立碑稱頌之田豫為汝南太守後遷衛尉遜位歸居魏縣及卒汝南人就為立碑蜀諸葛亮為相既卒所在各求為立廟朝議以禮秩不聼百姓遂因時節私祭之於道陌上言事者或以為可聼立廟於成都者後主不從歩兵校尉習隆中書郎向充等共上表曰臣聞周人懐召伯之徳甘棠為之不伐越人思范蠡之功鑄金以存其像自漢興以來小善小徳而圖形立廟者多矣况亮徳範遐邇勲盖季世興王室之不壊實斯人是賴而烝嘗止於私門廟像闕而莫立使百姓巷祭戎夷野祀非所以存徳念功追述在昔者也今若盡順民心則瀆而無典建之京師又偪宗廟此聖懐所以惟疑也臣愚以為宜因近其墓立之於沔陽使所親屬以時賜祭凢其臣故吏欲奉祠者皆限至廟斷其私祀以崇正禮於是始從之馬忠為庲降都督鎮南大將軍處事能㫁威恩竝立蠻夷畏而爱之及卒莫不自致䘮庭流涕盡哀為之立廟迄今猶在張嶷初為越嶲太守後為盪冦將軍與魏將戰臨陣隕身南土越巂民夷聞嶷死無不悲泣為嶷立廟四時水旱輙祀之王商為蜀郡太守為嚴君平李𢎞立祠秦宓與商書曰疾病伏匿甫知足下為嚴李立祠可謂厚黨勤類者也觀嚴文章冠冐天下由夷逸操山嶽不移使揚子不歎固自昭明如李仲元不遭法言令名必淪其無虎豹之文故也可謂攀龍附鳯者矣如揚子雲潜心著述有補於世泥蟠不滓行叅聖師于今海内談詠厥辭邦有斯人以耀四逺怪子替兹不立祠堂蜀本無學士文翁遣相如東受七經還教吏民於是蜀學比於齊魯故地里志曰文翁倡其教相如為之師漢家得士盛於其世仲舒之徒不逹封禪相如制其禮夫能制禮造樂移風易俗非禮所秩有益於世者乎雖有王孫之累猶孔子大齊桓之覇公羊賢叔術之譲僕亦善長卿之化宜立祠堂速定其銘晋扶風王駿為征西大將軍都督雍凉諸軍事鎮闗中病薨西土聞其薨泣者盈路百姓為之樹碑長老見碑無不下拜閻徳東海人門徒甚多獨目唐彬有廊廟材及彬官成而徳已卒乃為之立碑唐彬為使持節監幽州諸軍事領䕶烏桓校尉右將軍邉境獲安無犬吠之警坐事徴百姓追慕彬功徳生為立碑作頌荀朂為安陽令轉驃騎從事中郎朂有遺愛安陽生為立祠羊祜鎮荆州及薨㐮陽百姓於峴山祜平生逰憇之處建碑立廟嵗時享祭焉望其碑者莫不流涕杜預因名為墮涙碑杜預為鎮南大將軍好為後世名嘗言高岸為谷深谷為陵刻石為二碑紀其勲績一沉萬山之下一立峴山之上曰焉知此後不為陵谷乎江惇以高尚飬志為時所重及卒友朋相與刋石立頌以表其徳美嵇紹為侍中死於湯隂難後東海王越路經滎陽過紹墓哭之悲慟刋石立碑楚王瑋性開濟好施能得衆心及誅莫不隕淚百姓為之立祠丁紹為廣平太守時臨漳被圍南陽王模窘急紹率羣兵赴之模頼以獲全感紹恩生為立碑杜軫除池陽令為雍州十一郡最百姓生為立祠得罪者無怨言祖逖為豫州刺史鎮西將軍卒豫州士女若䘮考妣譙梁百姓為之立祠李雲為成都王頴所害門生故吏迎䘮塟清河修墓立碑四時祠祭范平太康中頻徴不起及卒有詔追諡號曰文貞先生賀循立碑紀其徳行孔愉㑹稽人避亂入新安山中改姓孫氏以稼穡讀書為務信著隣里後忽捨去皆謂為神人而為之立祠宋劉勔為右將軍討殷琰平夀陽無所犯害百姓徳之為立碑記蕭承之為漢中太守既卒梁士民思之於峩公山立廟祭祀安陸王緬為雍州刺史既卒百姓於峴山立祠南齊王儉為衛將軍開府儀同三司卒梁武帝受禪詔為儉立碑梁蕭昱為晉陵守暴疾卒百姓號哭市井為之喧沸又相率為立廟建碑崔景真為平昌太守有惠政嘗懸一蒲鞭而未嘗用去任之日士人思之為立祠夏侯亶為呉興太守在郡復有惠政吏民圖其像立碑頌美焉後為徐豫二州刺史州民請為亶立碑置祠詔許之謝舉為晋陵太守罷郡吏民請立碑許之何逺為武康令歴宣城太守新興内史所至皆生為立祠表言治状高祖毎優詔答焉任昉為新安太守為政清省吏民便之視事期嵗卒於官舍闔境痛惜百姓共立祠堂於城南貞陽侯淵明為豫州刺史百姓詣闕拜表言其徳政樹碑於州門内及碑匠採石出自肥陵淵明廣營厨帳多召人物躬自率領至州識者笑之曰王自立碑非其州人也徐勉為侍中卒故佐吏尚書左丞劉覽等詣闕陳勉行状請刋石紀徳政奉詔許立碑於墓陸㐮為鄱陽内史在政六年郡中大治民李晛等四百二十人詣闕拜表陳㐮徳化求於郡中立碑詔許之伏暅為新安太守在郡清恪屬縣始新遂安海寧竝時生為立祠藺欽為衛州刺史在州有惠政吏民詣闕請立碑頌徳詔許焉陳王勱為晉陵太守在郡甚有威惠郡人表請立碑頌勱政績詔許之鄭萬頃為豐州刺史在州甚有惠政吏民表請立碑詔許焉侯安都為南徐州刺史留異擁據東陽安都討平之仍還本鎮其年吏民詣闕表請立碑頌美安都功績詔許之後魏高允為懐州刺史時年將九十勸民學業風化頗行後正光中中散大夫中書舍人河内常景追思允立祠于野王之南立碑紀徳陸騰為隆州總管討信州蠻蜑前後破平諸賊巴蜀悉定詔令樹碑紀績焉北齊李繪字敬文為高陽内史瀛州三郡人俱詣州立祠州請為繪立碑於郡街元子華為齊州刺史鞫獄訊囚務加仁恕齊人樹碑頌徳長孫儉為荆州刺史殷勤勸導風俗大革務廣耕桑兼習武事故得邉境無虞民安其業吏民表請為儉構清徳樓樹碑刻頌朝議許焉及卒荆州民儀同趙超等七百人感儉遺愛詣闕請為立廟樹碑詔許之隋李士謙初為魏廣平王府叅軍隋有天下畢志不仕家富於財毎以賑施為務開皇八年終於家趙郡士女聞之莫不流涕曰我曹不死而令李叅軍死乎㑹𦵏者萬餘人鄉人李景伯等以士謙道著丘園條其行狀詣尚書省請先生之諡事寝不行遂相與樹碑於墓裴肅為永平郡丞甚得民心嵗餘卒夷獠思之為立廟於鄣江之浦樊叔略為相州刺史徴拜司農吏民相與立碑頌其徳政令狐熈為滄州刺史徙為河北道行臺度支尚書吏民追思立碑頌徳楊文思為魏州刺史及去職吏民思之為立碑頌徳侯莫陳頴為瀛州刺史坐秦王俊交通免官百姓送者莫不流涙因相與立碑頌徳樊子盖為武威太守後卒於京武威民吏聞其死莫不嗟痛立碑頌徳房彦謙為長葛令甚有惠化及移鄭州司馬吏民號泣相謂曰房明府今去吾屬何用生為百姓思之立碑頌徳高孝基為吏部侍郎大業中杜如晦預選孝基曰願保崇令徳今欲甫就卑職應為湏少禄俸爾遂補滏楊尉後如晦為尚書右僕射以孝基有知人之鍳為其樹神道碑以記其徳唐李思摩為右武衛將軍從征遼東為流矢所中未幾卒葬訖仍立碑於化州賈敦頥永徽中為雒州刺史百姓為其樹碑于大市通衢弟敦實咸亨初轉雒州長史甚有惠政及敦實去職復刻石頌美於兄碑之側時人號為棠棣碑高智周為費縣令政化大行吏人刋石以頌之高叡為通義令以善政稱去官後吏人樹碑頌徳崔縱為藍田令寛明勤謹徳化大行縣人立碑楚王靈龜為魏州刺史稱為良牧及䘮歸百姓思其徳為立碑韋景駿為肥鄉令及去任人吏立碑頌徳王晙景龍末為桂州都督數年州人為立碑以頌其政宋璟為廣州都督夷夏懐惠立碑以紀其政李鼎為鳯翔尹百姓立生祠王方翼為肅州刺史屬蝗儉諸州貧人死於道路而肅州全活者甚衆州人為立碑頌楊㻛為國子祭酒生徒為㻛立頌於學門之外狄仁傑為魏州刺史撫和戎夏人得歡心郡人立碑頌徳崔隐甫開元九年自華州刺史轉太原尹人吏刻石頌其美政苗晋卿天寳中為安康郡太守遷魏郡太守所到有惠化金州魏州人思之皆立碑頌徳呂諲為荆州都督府長史充澧朗荆忠峽五州節度觀察等使理江陵三年號為良牧郡人立生祠諲沒後嵗餘江陵將吏合錢十萬於府西爽塏地大立祠宇四時祀禱之李勉大歴中為廣州刺史在官累年噐用車服無増餙耆老以為可繼前朝宋璟盧奐李朝隠之徒人吏詣闕請立碑詔許之張延賞大歴建中間連統四鎮所至稱治其去皆刻石紀績嚴郢為河南尹有能政都人為立碑紀述李融興元初為金州刺史兼防禦使州人懷之刻石紀政孫成貞元初為信州刺史信州吏人上表請立碑陳其殊績優詔褒異而允其請楊元卿為涇源節度使涇人請立徳政碑從之韋丹為江西觀察使卒官太和中觀察裴誼奏與丹立碑祠袁滋元和中為義成軍節度百姓立生祠禱祀之田𢎞正穆宗初為魏博節度州縣官請與𢎞正立徳政碑從之成汭為荆南節度使薨荆州趙凝奏請與汭於荆南劒南建置廟貌哀帝從之杜洪為鄂州節度薨梁王奏請與洪於本道置立祠廟哀帝從之劉徳威為綿州刺史以亷平著稱百姓為之立碑梁馮行襲為許州節度使開平二年本州官吏百姓詣四方舘進狀請與行襲立徳政碑太祖允之王重榮開平二年為河中節度使贈太師晋王仍立廟差右僕射張禕撰碑文委河中尹選擇稳便處立碑奏聞馬殷為武安節度使開平四年潭州録事叅軍馬琳軍府官吏僧道等進狀稱殷自到所著功庸政績合具上聞伏乞許於本道以徳政立碑并生祠堂事太祖優詔許之并令翰林學士封舜卿撰碑文錢鏐為呉越王開平五年四月杭州將吏耆老列狀願為鏐建生祠以頌功徳太祖詔刑部侍郎李光嗣為宣慰立祠堂使仍令翰林學士李琪製碑文以賜之韓遜為靈州節度使善於為理部民請立生祠堂於其地太祖許之仍詔禮部侍郎薛廷珪撰碑文以賜之其廟至今在焉晋安重榮為成徳軍節度使天福二年副使朱崇節奏鎮州軍府將吏僧道父老詣闕請立重榮徳政碑高祖敕安重榮功宣締搆寄重藩維善布詔條克除民瘼遂致僚吏僧道詣闕上章求勒貞珉以揚異政旣觀勤功宜示允俞其碑文仍令太子賔客任賛撰進安元信為山北諸州團練使清㤗元年領上黨加簡校太尉累加食邑三千户實封二百户進封至武威郡公三年二月以疾終於位時年七十四贈太師葬於太原交城元信有子六人長曰友權官至武衛大將軍帝以元信宿望命禮部定諡表迹業也仍賜建神道碑使禮部郎中呂咸休為其文周劉表徴廣順初為新安令河南府上言縣民三百七十稱表徴公平之政請刋石頌美太祖從之李暉廣順初為滄州節度使州民張鑒明等於黎陽山採石欲為暉立徳政碑暉出於軍校前鎮河陽部人已刋碑頌及涖浮陽又聞其政不亦善乎何福進廣順中為成徳軍節度使鎮州民吏請為福進建立徳政碑王晏為徐州節度使顯徳元年九月官吏緇黄耆老以晏有善政及民乞立碑以紀之詔可之尋命中書舍人張正撰文以賜焉曹英為成徳軍節度使英本貫鎮州詔真定縣宜改台輔鄉為衣錦鄉鴻儒坊為勲徳里李瓊為安州防禦使顯徳四年十二月癸酉本州監軍馮守規上言州之官吏百姓乞與防禦使李瓊立徳政碑尋命中書舍人竇儼撰文以賜之薛瓊廣順中為宿州團練使宿州民吏詣闕上言請為瓊立碑頌美太祖從之後為菜州團練使及卒菜州官吏僧道百姓等列狀上請以瓊有善政在人乞立祠堂及樹碑以述其遺愛世宗從之張晏廣順初為共城令滑州刺史言縣民張祚等請留晏欲為晏立碑頌太祖從之册府元龜卷八百二十
