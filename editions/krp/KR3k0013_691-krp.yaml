body:
  text: 冊府元龜卷六百九十一宋王欽若等撰牧守部智畧夫鈎深致逺表微達變之謂智臨事制宜經物成務之謂畧盖君子之所以熙民志而賛邦治何莫繇斯道也若乃膺長人之寄總連城之政兵農之衆條教所出禮俗之化風軌攸繫由漢而下良吏接武乃有材謀兼蘊幾神獨炤設計䇿以屏寇盗推恩信而懐戎旅撫御夷落而威惠式孚招輯氓庶而流徙来復興利以竭地力備患以謹天戒式遏邊圉而保障増固居守京邑而輦轂以清斯皆負兼濟之用得馭衆之術真王國之傑俊者哉漢龔遂宣帝時為渤海郡太守渤海左右郡嵗饑盗賊並起郡聞新太守至發兵以迎遂皆遣還移書勅屬縣悉罷逐捕盗賊吏諸持鉏鈎田噐者皆為良民吏毋得問持兵者廼為賊遂單車獨行至府郡中翕然盗賊亦皆罷渤海又多劫畧相隨聞遂教令即時解散棄兵弩而持鈎鉏盗賊於是悉平孫寳為諫議大夫成帝鴻嘉中廣漢羣盗起選為益州刺史廣漢太守扈商者大司馬車騎將軍王音娣子軟弱不任職寳至部親入山谷諭告羣盗非本造意渠率皆得悔過自出渠大也遣歸田里自劾矯制擅放盗歸故云矯制後漢王閎更始遣為瑯琊太守郡人張步聚衆據本郡閎為檄曉諭吏人降得贛榆等六縣収兵數千人與歩戰不勝歩拓地寖廣甲兵日盛閎懼兵衆散乃詣歩相見欲誘以義方歩大陳兵引閎怒曰歩有何過君前見攻之甚乎閎按劍曰太守奉朝命而文公擁兵相拒文公張步字閎攻賊耳何謂甚耶步黙然良久離席跪謝陳樂獻酒待以上賔之禮令閎關掌郡事關通也竇融為張掖屬國都尉既到撫結雄傑懐輯羌虜甚得其懽心河西翕然歸之是時酒泉太守梁統金城太守厙鈞厙姓即倉月㫖後也今羌中有姓厙音舎云承鈞之後張掖都尉史苞苞字叔文茂陵人酒泉都尉竺曾燉煌都尉辛彤並州郡英俊融皆與為厚善及更始敗融與梁統等計議曰今天下擾亂未知所歸河西斗絶在羌胡中不同心戮力則不能自守權均力齊難以相率當推一人為大將軍共全五郡觀時變動議計定而各謙譲咸以融世任河西為吏人所敬向乃推融行河西郡將軍事是時威武太守馬期張掖太守任冲並孤立無黨乃共移書告示之二人即解印綬去於是以梁統為武威太守史苞為張掖太守竺曾為酒泉太守辛彤為燉煌太守厙鈞為金城太守後隗囂兵寇安定光武將自西征之先戒竇融期㑹遇雨道斷且囂兵已退乃止融至姑臧被詔罷歸融恐大兵遂久不出乃上書曰隗囂聞車駕將西臣融東下士衆騷動計且不戰囂將髙峻之屬皆欲逢迎大車後聞兵罷峻等復疑囂揚言東方有變西州豪傑遂復附從囂入引公孫述令守突門臣融孤弱介在其間雖承威靈宜速救助國家當其前臣融促其後緩急迭用首尾相資囂執排迮不得進退此必破也若兵不早進久生持疑則外長寇仇内示困弱復令讒邪得有因緣臣竊憂之惟陛下哀矜帝深美之鮑永為魯郡太守時董憲别帥彭豐虞休皮常等各千餘人稱將軍不肯下頃之孔子闕里無故荆棘自除從講堂至于里門永異之謂府丞及魯令曰方今危急而闕里自開斯豈夫子欲令太守行禮助吾誅無道耶乃㑹人衆修鄉射之里請豐等共㑹觀視欲因此擒之豐等亦欲殺永乃持牛酒勞饗而潜挾兵器永覺之手格殺豐等禽破黨與光武嘉其畧封為關内侯魏梁習為太祖西曹屬漢土新附習以别部司馬領并州刺史時承髙幹荒亂之餘胡狄在界張雄䟦扈吏民亡叛入其部落兵家擁衆作為寇害更相扇動往往棊跱習到官誘諭招納皆禮召其豪右稍稍薦舉使詣幕府豪右已盡乃次發諸丁彊以為義從又因大軍出征分請以為勇力吏兵已去之後稍移其家前後送鄴凡數萬口其不從命者興兵致討斬首千數降附者萬計單于恭順名王稽顙部曲服事供職同于編户邊境肅清百姓布野勤勸農桑鮮卑大人盲延常為州所畏而一旦將其部落五千餘騎詣習求互市習念不聽則恐其怨若聽到州下又恐為所畧于是乃許之往與㑹空城中交市遂勅郡縣自將治中以下軍往就之市易未畢市吏収縛一胡延騎皆驚上馬彎弓圍習數重吏民惶怖不知所施習乃徐呼市吏問縛胡意而胡實侵犯人習乃使譯呼延延到習責延曰汝胡自犯法吏不侵汝汝何為使諸騎驚駭耶遂斬之餘胡破膽不敢動是後無寇虜至太祖拔漢中諸軍還到長安因留騎督太原烏丸王魯昔使屯咸陽以備蘆水昔有愛妻住在晉陽昔既思之又恐遂不得歸乃以其部五百騎叛還并州留其餘騎置山谷間而單騎獨入晉陽盗取其妻已出城州郡乃覺吏民又畏習善射不敢追昔乃令從事張景募鮮卑使逐昔昔馬負其妻重騎行遲未及與其衆合而為鮮卑所射死始太祖聞昔叛恐其為亂於北邊㑹聞已殺之大喜以習前後有䇿畧封為關内侯裴潛為太祖倉曹屬時代郡大亂以潛為代郡太守烏丸王及其大人凡三人各自稱單于専制郡事前太守莫能治正太祖欲授潛精兵以鎮討之潛辭曰代郡户口殷衆士馬控弦動有萬數單于自知放横日久内不自安今多將兵往必懼而拒境少將則不見憚宜以計謀圖之不可以兵威迫也遂單車之郡單于驚喜潛撫之以静單于以下脱帽稽顙悉還前後所畧婦女器械財物潛案諸郡中大吏與單于為表裏者郝溫郭端等十餘人北邊大震百姓歸心杜畿代王邑為河東太守而髙幹舉并州反河東人衞固范先外以請邑為名而内實與幹通謀太祖遣夏侯惇討之未至荀彧謂畿曰宜須大兵畿曰河東有三萬户非皆欲為亂也今兵迫之急欲為善者無主必懼而聽于固固等勢専必以死戰討之不勝四隣應之天下之變未息也討之而勝是殘一郡之民也且固等未顯絶王命外以請故君為名必不害新君吾單車直往出其不意固為人多計而無斷必偽受吾吾得居郡一月以計縻之足矣遂詭道從郖津渡郖音豆范先欲殺畿以威衆且觀畿去就於門下斬殺主簿已下三十餘人畿舉動自若於是固曰殺之無損徒有惡名且制之在我遂奉之畿謂衞固范先曰衞范河東之望也吾仰成而已然君臣有定議成敗同之大事當共平議以固為都督行承事領功曺將校吏兵三千餘人皆范先督之固等喜雖陽事畿不以為意固欲大發兵畿患之説固曰夫欲為非常之事不可動衆心今大發兵衆必擾不如徐以貲募兵固以為然從之遂為貲調發十日乃定諸將貪多應募而少遣兵又入諭固等曰人情顧家諸將掾史可分遣休息緩急召之不難固等惡逆衆心又從之於是善人在外隂為巳援惡人分散各還其家則衆離矣㑹白騎攻東垣髙幹入濩澤上黨諸縣殺長吏𢎞農執郡守固等密調兵未至畿知諸縣附已因出單將數十騎赴張辟拒守吏民多舉城助畿者比數十日得四千餘人固等與髙幹張晟共攻畿不下畧諸縣無所得㑹大兵至幹晟敗固等伏誅其餘黨皆赦之使復其居業牽招為鴈門太守郡在邊陲雖有候望之備而寇鈔不斷招既教民戰陣又表復烏丸五百餘家租調使備鞌馬逺遣偵候虜每犯塞勒兵逆擊来輙摧破於是吏民膽氣日鋭荒野無虞又搆間離散使虜更相猜疑鮮卑大人歩度根泄歸泥等與軻比能為隙將部落三萬餘家諸郡附塞勅令還擊比能殺比能弟苴羅侯及叛烏丸歸義侯王同王寄等大結仇怨是以招自出率將歸泥等討比能於雲中故郡大破之招通河西鮮卑附頭等七有餘萬家繕治陘北故上館城置屯戍以鎮内外夷虜大恐莫不歸心諸亡叛雖親戚不敢藏匿咸悉収送于是野居晏閉寇賊静息趙儼為扶風太守時被書差千二百兵往助漢中守使平難將軍殷署督送之行者卒與室家别皆有憂色署發後一日儼慮其有變乃自追至斜谷人人慰勞又深戒署還宿雍州刺史張既舎署軍復前四十里兵果叛亂未知署吉凶而儼自随歩騎百五十人皆與叛者同部曲或婚姻得此問各驚被甲持兵不復自安儼欲還既等以為今本營黨已擾亂一身赴之無益可須定問儼曰雖疑本營與叛者同謀要當聞行者變乃發之又有欲善不能自定宜及猶豫促撫寜之且為之元帥既不能安輯身受禍難命也遂去行三十里止放馬息盡呼所從人喻以成敗慰勞懇切皆慷慨曰生死當随䕶軍不敢有二前到諸營各召料簡諸姦結叛者八百餘人散在原野惟取其造謀魁率治之餘一不問郡縣所収送皆放遣乃即相率還降儼密白宜遣將詣大營請舊兵鎮守關中太祖遣將軍劉柱將二千人當須到乃發遣而事露諸營大駭不可安喻儼謂諸將曰舊兵既少東兵未到是以諸營圖為邪謀若或成變為難不測因其狐疑當令早决遂宣言當差召新兵之溫厚者千人鎮守關中其餘悉遣東便見主者内諸營兵籍案累重立差别之留者意定與儼同心其當去者亦不敢動儼一日盡遣上道因所留千人分布羅落之東兵尋至乃復脅喻并徙千人令相及共東凡所全致二萬餘口王觀字偉臺為涿郡太守涿北接鮮卑數有寇盜觀令邊民十家已上屯居築京候時或有不願者觀乃假遣朝吏使歸助子弟不與期㑹但勅事訖各還於是吏民相率不督自勸旬日之中一時俱成守禦有􅊀寇鈔以息孫禮為滎陽都尉魯山中賊數百人保固險阻為民作害乃徙禮為魯相禮至官出俸榖發吏民募首級招納降附使還為間應時平泰胡質為東征將軍假節都督青徐諸軍事廣農積穀有兼年之儲置東征臺且佃且守又通渠諸郡利舟楫嚴設備以待敵海邊無事吳殷扎為零陵太守言於大帝曰今天棄曹氏喪誅累見分争之際而幼童蒞事陛下身自御戎取亂侮亡宜滌荆揚之地舉彊羸之數使彊者執㦸羸者轉運西命益州軍於隴右授諸葛瑾朱然大衆指事㐮陽陸遜朱桓别征夀春大駕入淮陽歴青徐㐮陽夀春困于受敵長安以西務對蜀軍許雒之衆勢必分歴犄角瓦解民必内應將帥對向或失便宜一軍敗績則三軍離心便當秣馬脂車陵蹈城邑乘勝逐北以定華夏若不悉軍動衆循前輕舉則不足大用易於屢退民痛威消時往力竭非出兵之䇿也帝弗能用諸葛恪為撫越將軍領丹陽太守時山賊未平恪到府乃移書四部屬城長吏令各保其疆界明立部伍其從化平民悉令屯居乃分内諸將羅兵幽阻但繕藩籬不與交鋒候其穀稼將熟輙縱兵芟刈使無遺種舊穀既盡新田不収平民屯居畧無所入於是山民饑窮漸出降首恪乃復勅下曰山民去惡從善皆當撫慰徙出外縣不得嫌疑有所執拘越陽長胡伉得降民周遺遺舊惡民困迫暫出内圖叛逆伉縳送府恪以伉違教斬以徇以狀表上民聞伉坐執人被戮知官惟欲出之而已於是老幼相擕而出嵗期人數皆如本規恪自領萬餘人分給諸將大帝嘉其功拜恪威北將軍封都鄉侯晉杜預為荆州刺史咸寜三年詔曰今年霖雨過差又有䖝災潁州襄城自春以来畧不下種深以為慮主者何以為百姓計促處當之預上疏曰臣竊思惟今者水災東南特劇非但五稼不収居業并損下田所在停汙髙地皆多磽瘠此即百姓困窮方在来年雖詔書切告長吏二千石為之設計而不廓開大制定其趣舍之宜恐徒文具所益盖薄當今秋夏蔬食之時而百姓已有不贍前至冬春野無青草則必指仰官穀以為生命此乃一方之大事不可不預為思慮者也臣愚謂既以水為困當恃魚菜螺蜯而洪波汎濫貧弱者終不能得今者宜大壊兖豫州東界諸陂随其所歸而宣導之交令饑者盡得水産之饒百姓不出境界之内旦暮野食此目下日給之益也水去之後填淤之田畝収數鍾至春大種五穀五穀必豐此又明年益也臣前啟典牧種牛不供耕駕至于老不穿鼻者無益於用而徒有吏士穀草之費嵗送任駕者甚少尚復不調習宜大出賣以易穀及為賞直詔曰孳育之物不宜咸散事遂停寢問王者今典虞右典牧種産牛大小相通有四萬五千餘頭苟不益世用頭數雖多其費日廣古者匹馬邱牛居則以耕出則以戰非如猪羊類也今徒養宜用之牛終為無用之費甚失事宜東南以水田為業今無牛犢今既壊陂可分種牛三萬五千頭以付二州將吏士庶使及春耕穀登之後頭責二百斛是為化無用之費得運水次成穀七百萬斛此又數年後之益也加以百姓降邱宅土將来公私之饒乃不可計其所留好種萬頭可即令右典牧都尉官屬養之人多畜少可並佃牧地明其考課此又三魏近甸嵗當復入數千萬斛穀牛又皆當調習動可駕用皆今日之可全者也預又言諸欲修水田者皆以火耕水耨為便非不爾也然此事施於新田草莱與百姓居相絶離者耳往者東南草創人稀故得火田之利自頃户口日增而坡堨嵗决良田變生蒲葦人居沮澤之際水陸失宜放牧絶種樹木立枯皆陂之害也陂多則土薄水淺潦不下潤故每有水雨輙復横流延及陸田言者不思其故因云此土不可陸種臣計漢之户口以驗今之陂處皆陸業也其或有舊陂舊堨則堅完修固非今所謂當為人害者也臣前見尚書胡威啟宜壞坡其言懇至臣中者又見宋侯相應遵上便宜求壞泗坡徙運道時下都督度支共處當各㨿所見不從遵言臣案遵上事運道東詣夀春有舊渠可不繇泗陂泗陂在遵地界壞地凡三千餘頃傷敗成業遵縣領應佃二千六百口可謂至少而猶患地狹不足肆力此皆水之為害也當所共恤而都督度支方復執異非所見之難直以不同害理也人心所見既不同利害之情又有異軍家之與郡縣士大夫之與百姓其意莫有同者此皆偏其利以忘其害者也此理之所以未盡而事之所以多患也臣又案豫州界二度支所領佃者州郡大軍雜士凡用水田七千五百餘頃耳計三年之儲不過二萬餘頃以常理言之無為多積無用之水况於今者水潦分溢大為災害臣以為與其失當寜㵼之不畜宜發明詔勅刺史二千石其漢氏舊陂舊堨及山谷私家小陂皆當修繕以積水其諸魏氏以来所造立及諸因雨決溢蒲葦馬腹陂之類皆決瀝之長吏二千石躬親勸功諸食力之人並一時附功令比及水凍得粗枯涸其所修功食之人皆以俾之其舊陂堨溝渠當有所補塞者皆尋求微跡一如漢時故事預為部分列上須冬東南休兵交代各留一月以佐之夫川瀆有常流地形有定體漢氏居人數多猶以無患今因其所患而宣寫之跡古事以明近大理顯然可坐論而得臣不勝愚意切謂最是今日之實益也朝廷從之陶侃為江夏太守鷹揚將軍陳敏遣其弟恢来寇武昌侃與諸軍并力拒恢乃以運船為戰艦或言不可侃曰用官物討官賊但須列上有本末耳於是擊恢所向必破宋申怙為濟南太守時又遷換諸郡守怙上表曰伏惟朝恩當加臣濟南太守仰惟優㫖荒心散越臣殃咎之餘遭蒙踰沗寵私罔已復兼今授豈其愚迷所能上答臣近至止即履行所統究其形宜河濟之間應置戍扞其中四處急須修立瓮口故城又是要所宜移太原委以邊事緣山諸邏並得除省防衞綏懐利便非一吕綽誠効益著深同臣意百姓聞者咸皆附悦急有廻異二三求宜且房紹之蒞郡經年君民粗狎改以帶臣有舊事逺牽太原於民為苦而瓮口之計復成义牙人情非樂容有不安疆場威刑患不開廣若得依先處分公私允緝帝從之顔竣為丹陽尹時嵗旱民饑竣上言禁餳一月息米近萬斛南齊王𤣥邈為梁南秦二州刺史兄弟同時為方伯髙帝建元初亡命李鳥奴作亂梁部𤣥邈使人偽降鳥奴告之曰王使君兵弱擕愛妾二人已去矣鳥奴盡輕兵襲州城𤣥邈竒兵破之帝聞之曰𤣥邈果不負吾夏侯詳為新興太守便道先到江陽時始安王遥光稱兵京邑南康王長吏蕭頴胄並未至中兵叅軍劉山陽先在州山陽副潘紹欲謀作亂詳偽呼紹議事即於城門斬之州府乃安栁慶逺字文和為魏興太守郡遭暴水流漂居民吏請徙民祀城慶逺曰天降雨水豈城之所知吾聞江河長不可三日斯亦何慮命築土而已俄而水過百姓服之梁張齊為巴西梓潼二郡太守巴西郡居益州之半又當東道衝要刺史經過軍府逺渉多饋遺齊緣路聚糧食種蔬菜行者皆取給焉其能濟辦多此數也後魏于栗磾明元時為豫州刺史帝南幸盟津謂栗磾曰河可橋乎栗磾曰杜預造橋遺事可想乃編次大船搆橋於治坂六軍既濟帝深歎美之南安王禎孝文初拜南豫州刺史大胡山蠻時鈔掠前後守牧多覊縻而已禎乃召新蔡襄城蠻首使之觀射先選左右能射者二十餘人禎自發數箭皆中然後命左右以次而射先出一囚犯死罪者使叅射限命不中禎即責而斬之蠻魁等伏強畏威相視股慄又預教左右取死囚四十人皆着蠻衣云是鈔賊禎乃臨坐偽舉目瞻天微風有動禎謂蠻曰風氣少暴似有鈔賊入境不過十人當在西南五十里許即命騎追掩果縳送十人禎告諸蠻曰爾鄉里作賊如此合死不蠻等即叩頭曰合萬死禎即斬之因慰喻遣還自是境無暴掠茍頽為司空孝文大駕行幸三州頽留守京師沙門法秀謀反頽率禁兵収掩畢獲内外晏然駕還飲至文明太后曰當爾之日卿若持疑不即収捕處分失所則事成不測矣今京畿不擾宗社獲安者實卿之功也于烈孝文末為散騎常侍時齊將陳顯達寇馬圏帝親征之以烈為留守及彭城王勰稱詔召宣武㑹駕魯陽以烈留守之重密報以孝文凶問烈處分行留神色無變後遷車騎大將軍太尉咸陽王禧友謀反武興王楊集始馳于北邙以告時宣武從禽於野左右分散直衞無㡬倉卒之際莫知計之所出乃勅烈子忠馳視虛實烈時留守已處處有備因忠奏曰臣雖朽邁心力猶可此等猖狂不足為慮願緩蹕徐還以安物望帝聞之甚以慰悦李彦宣武時為徐州刺史延昌二年夏大霖雨川瀆皆溢彦相水陸形勢随便疏通得無淹潰之害朝廷嘉之頻詔勞勉北齊潘樂為東雍州刺史神武嘗議欲廢州樂以為東雍地界山河境連胡蜀形勝之㑹不可棄遂如故楊津為岐州刺史有武功民齎絹三疋去城十里為賊所劫時有使者馳驛而被劫人因以告之使者到州以狀白津津乃下教云有人着某色衣乗某色馬在城東十里被劫不知姓名若有家人可速収視有一老母行出而哭云是巳子於是遣騎追収并絹俱獲自是合境畏服祖珽為徐州刺史至州㑹有陳寇百姓多反珽不開城門守陴者皆令下城静坐街巷禁斷人行雞犬不聽鳴吠賊無所聞見者不測所以或聞人走空城不設警􅊀珽忽然令大呌鼓譟聒天賊大驚登時走散後復結陳向城珽乘馬自出令録事叅軍王君植率兵馬乃親臨戰賊先聞其盲謂為不能抗拒忽見親在戎行彎弧從鏑相與驚怪畏之而罷李愍為南荆州刺史當州大都督此州自孝昌以来舊路斷絶前後刺史皆從間道始得達州愍勒部曲數千人徑向懸弧從比湯舊道且戰且前三百餘里所經之處即立郵亭蠻酋大服後周崔猷西魏大統中為浙州刺史侯景據河南歸欵行臺王思政赴之太祖與思政書曰崔猷智畧明贍有應變之才若有所疑宜與量其可不思政初頓兵襄城後於潁川為行臺并致書于猷猷書曰襄城控帶京洛實當今之要地如有動静易相應接者也潁川既叱諌官出者數四時中外屬望大寮三數人廷辨其事僕射竇易直曰人臣無將將而必誅聞者愕然惟京兆尹崔琯大理卿王正雅連上疏請出内獄且曰王師文未獲即獄未具請出豆盧者與申錫同付外廷勘當人情翕然推重初議申錫抵死顧物論不可又將殺于嶺表帝終悟外廷之言乃有開州之命初申錫既被罪怡然不以為意自中書歸私第止于外㕔素服以俟命妻出謂之曰公為宰相人臣位極於此何負天子反乎申錫對曰吾自書生被厚恩擢相位不能鋤去姦亂反為所羅網夫人察申錫豈反者乎因相與泣數行下申錫至自居内廷及為宰相以時風侈靡居要位者尤取納不顧風俗不暇更方逺古且與貞觀時甚相背矣申錫至此約身謹潔尤以公廉為己任四方問遺悉無受者既被罪為有司騐劾多獲其四方収領所還問遺之状朝野為之歎息丁未詔曰朕以菲徳奉兹丕搆雖處恭修已不敢暇逸而誠意格物未能𢎞敷遂使姦兇懐非覬之端藩同日生日言貌有貴相在陳世已據南海平陳後文帝因而撫之即拜安州刺史然驕倨恃險未嘗叅謁熙手書諭之申以交友之分其母有疾熙復遺以藥猛力感之詣府謁不敢為非李詢為司衞上士武帝建徳三年幸雲陽宫委以留府事衞王直作亂焚肅章門詢於内益火故賊不敢入帝聞而善之隋梁睿周末為益州總管威振西州夷獠歸附惟南寧酋帥爨震恃逺不賔時髙祖總百揆睿上疏曰竊以逺撫長駕王者令圖易俗移風有國常典寜州漢氏牂牁之地近代以来分置興古雲南建寜朱提四郡户口殷衆金寳富饒二河有駿馬明珠益寧出鹽井犀角晉太始七年以益州曠逺分置寜州至偽梁置南寜州刺史徐文盛被湘東徵赴荆州屬東夏尚阻未遑逺畧土民爨瓚遂竊據一方國家遥授刺史其子震相承至今而震臣禮多虧貢賦不入每年獻不過數十匹馬其處去益路止一千朱提北境即與戎州接界今聞彼民苦其苛政思被皇風伏惟大丞相禆贊聖朝寜濟區宇繼後光前方埀萬代闢土服逺今正其時幸因平蜀士衆不煩重興師旅壓獠既訖即請畧定南寜自瀘戎以東軍糧須給過此即于蠻夷徵税以供兵馬其寜州朱提雲南西爨並置總管州縣計彼熟變租調足供城防倉儲一則以肅蠻夷一則禆益軍國今謹件南寜州郡縣及事意如别有大都督杜神敬昔曽使彼俱所諳練今并送往書未答又請曰竊以柔逺能邇著自前經拓土開疆王者所務南寜州漢世牂牁之郡其地沃壌多是漢民既饒寳物又出名馬今若往取仍置州郡一則逺振威名二則有益軍國其處與交廣相接路乃非通漢世開此本為討越之計伐復之日復是一機以此商量决謂須取髙祖深納之然以天下初定恐民心不安未之許後竟遣史萬嵗討平之並自睿之䇿也唐敬暉為衞州刺史時河北新有突厥之寇方秋而修城不輟暉下車謂曰金湯非粟而不守豈有棄収穫而繕城郭哉悉令罷散繇是吏人感悦王方翼為夏州都督屬牛役無以營農方翼造人耕之法施關鍵使人推之百姓賴焉王翃為河中少尹節度留後有悍將凌正者横猾擾軍政因約夜鼓譟斬關以逐翃有告翃者乃縮夜漏數刻以差其期賊驚而遁遂戮其首亂者康日知為趙州刺史㑹成徳軍節度使李寳臣卒其子惟岳謀有父位令兵馬使王武俊統衆擊日知日知遣使謂武俊曰惟岳孱而無謀何足同反我城堅衆一未可以嵗月下之且惟岳恃田悦為援前嵗悦之丁男甲卒塗地於邢州城下猶不能䧟况此城乎復紿為手詔招武俊武俊信之遂倒兵入鎮州殺惟岳李承建中初為襄陽節度時李希烈雖歸蔡州留守將校等於襄州守當所掠得財帛什器等繇是使使襄漢往来不絶承亦使腹心臧叔雅往来許蔡厚結希烈腹心周曾王蚡姚憺等及曾謀殺希烈以衆歸朝多承首建謀也累賜密詔褒美之劉怦為涿州刺史居數年朱淊將兵討田承嗣奏署怦領留府寛緩得衆心時李寳臣為田承嗣間説與之通謀承嗣又以滄州與寳臣乃以兵劫朱淊于瓦橋淊脱身走乘勝欲襲取幽州怦設方畧鎮撫寳臣不敢進以功加御史中丞自是淊每將兵皆以怦為守韋臯為鳳翔判官權知隴州營田留後徳宗幸奉天鳳翔兵馬使李楚琳殺張鎰以府城叛歸於朱泚隴州刺史郝通奔於楚琳先是朱泚自范陽入朝以甲士随因為鳳翔節度故隴州有盧龍之卒五百人而牛雲光為之將雲光素事泚泚既以兵圍奉天雲光因稱疾請臯為帥將謀亂擒臯以赴泚臯將翟曄知之白臯雲光知事洩遂率其兵以奔泚及汧陽遇泚之家僮蘇玉將使于臯所蘇玉因請雲光曰太尉既為天子矣今使我持詔以韋臯為御史中丞君可領兵士疾返韋臯若承命即吾人矣如不受彼圖之無不濟矣乃反旗疾趨隴州臯迎勞之先納蘇玉受其命乃問雲光曰始不告而去今又来者何雲光曰前未知公心故前去今公既受新天子命則復来願與公合力立功同生死耳臯應曰大使苟不懐詐請納器甲使城中人無所疑衆乃可入雲光以書生視臯且以為信然乃併戈甲臯即受之乃納其衆明日臯伏兵宴雲光蘇玉并陳牛酒犒其卒即就坐殺其卒斬雲光蘇玉首以殉劉昌裔為陳州刺史貞元十六年韓全義討蔡州敗於溵水諸道兵皆走保陳州求舎昌裔登城謂曰天子命公討蔡州今乃来陳州義不敢納請舎城外已而從千騎入全義營持牛酒勞軍全義不自意驚喜歎服郗士美為鄂州觀察使貞元末安黄節度使伊慎来朝其子宥主留事朝廷未能去㑹宥母卒於京師宥貪其土不發喪士美命從事託他故過其境宥果迎之告以凶問先備宥監即日遣之呂元膺為東郡留守畿汝防禦使時朝廷方討淮西鄆賊李師道遣將率兇徒數十人伏雒陽邸潛結嵩山羣盗欲焚劫雒陽屠衣冠以撓朝廷計指日將發㑹有告者元膺發留守兵捕之賊黨白晝持滿斬關而去雒人震恐河南府門往往晝閉留守兵殘弱不可倚而元膺坐皇城自若以故居人稍安後數日得賊于嵩山斬之桺公綽為襄州刺史山南東道節度使行部至鄧縣二吏犯法一贓賄一舞文縣令以公綽守法必殺贓吏獄具判之曰贓吏犯法法在姦吏壞法法亡誅舞文者漢趙在禮為晉昌節度使在郡有飛蝗為害在禮使北户張幡幟鳴鼙皷蝗皆越境而去人亦服其智焉冊府元龜卷六百九十一
