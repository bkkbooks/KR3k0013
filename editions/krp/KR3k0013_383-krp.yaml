  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_383-1a}
body:
  text: 册府元龜卷三百八十三宋王欽若等撰將帥部褒異第九隋李雅後周時領左右軍征吐谷渾縱竒兵擊破之賜奴婢百口李金才為楊素行軍總管破突厥阿勿俟斤於納逺川進位大將軍李詢自高祖為丞相以元帥長史平尉遲逈之亂進位上柱國改封隴西郡公賜帛千疋加以口馬梁睿後周時為大將軍從齊王憲拒齊將斛律明月於洛陽毎戰有功遷少冡宰高祖主百揆代王謙為益州總管行至漢川而謙反高祖命睿為行軍元帥討平之進位上柱國總管如故賜物五千段奴婢一千口金二千兩銀三千兩食邑千户開皇初徵還京師及引見帝為之興命睿上殿握手極歡睿退謂所親曰功遂身退今其時也遂謝病於家闔户自守不交當世帝賜以板輿毎有朝覲必令三衛輿上殿于義為梁睿行軍總管時王謙搆逆其將達奚惎擁衆據開逺義將左軍擊破之尋拜潼州總管賜奴婢五百口雜綵三千段隂夀仕周為儀同從武帝平齊進位開府賜物千段奴婢百口女樂二十人高祖為丞相夀以行軍總管鎭幽州即拜幽州總管時有高寶寧者齊氏之疎屬也周武帝拜為營州刺史連結契丹靺鞨舉兵反夀遣人隂間其所親任者寶寧為其麾下所殺北邉遂安賜物千段卒官贈司空竇榮定初為平東將軍從周太祖與齊人戰於北邙擊郤齊以功拜上儀同後從周武皇帝引突厥木杆侵齊之并州賜物三百段襲爵永富縣公邑千户進位開府除中州刺史從武帝平齊加上開府拜前將軍佽飛中大夫高祖受禪累遷右武侯大將軍尋除秦州總管賜吴樂一部突厥沙鉢畧冦邊以為行軍元帥率九總管步騎三萬出凉州數挫其鋒沙鉢畧突厥請盟而去賜縑萬疋進爵安豐郡公増邑一千六百户轉左武衛大將軍開皇六年卒帝為之廢朝令左衛大將軍元旻監䕶䘮事賻絹三千疋贈冀州刺史陳國公元景山周閔帝時為撫軍將軍數從征伐累遷儀同三司賜爵文昌縣公授疊川防主後與齊人戰於北邙斬級居多加開府遷建州刺史進封宋安郡公邑三千户從周武帝平齊毎戰有功拜大將軍改封平原郡公邑二千户賜女樂一部帛六千疋奴婢二百五十口牛羊數千高祖為丞相景山以上將軍率騎與司馬消難將樊毅馬傑等戰尅之拜安州總管進位柱國前後賜帛三千疋時桐栢山蠻相聚為亂景山復擊平之高祖受禪拜上柱國源雄周太祖時賜爵隴西郡公後周武帝伐齊以功授開府改封朔方郡公拜冀州刺史時以突厥冦邊徙雄為平州刺史以鎭之未㡬檢校徐州總管及高祖為丞相時陳人見中原多故遣其將陳紀等侵江北雄與吴州總管于顗等擊走之又東潼州刺史曹孝達據州作亂雄遣兵襲擊走之進位上大將軍伐陳之役從秦王俊出信州道及陳平以功進位上柱國賜物五千段復鎭朔州豆盧勣仕周為柱國利州總管高祖為丞相益州總管王謙作亂勣嬰城固守出竒兵擊之賊因解去高祖遣開府趙仲卿勞之詔可使持節上柱國及突厥犯塞以勣為北道行軍元帥以備邊嵗餘拜夏州總管詔曰上柱國楚國公勣蜀人寇亂之日稱兵犯順固守金湯隱如敵國嘉猷大節其勞已多可食始州臨津縣邑千户後以病徵還京師詔諸王並至勣第中使顧問道路不絶其年卒高祖悼惜者乆之特加賵贈鴻臚監䕶䘮事豆盧通仕周為武賁中大夫北徐州刺史及高祖為丞相尉遲逈作逆遣其所署莒州刺史烏丸尼率衆來攻通逆擊破之賜物八百段進位大將軍賀若誼仕周為熊州刺史平齊之役誼率兵出函谷先據雒陽即拜雒州刺史進封建威縣侯齊范陽王高紹義之奔突厥也誼以兵追之戰於馬邑遂擒紹義以功進位大將軍高祖為丞相拜亳州總管西遏司馬消難東拒尉遲逈申州刺史李慧反誼討平之進爵范陽郡公授上大將軍梁士彦為熊州刺史從周武帝拔晉州進位柱國除使持節晉絳二州諸軍事晉州刺史及帝還後齊後主親總六軍而圍之士彦固守孤城及齊平封郕國公進位上柱國梁剛仕周為儀同以平尉遲逈功加開府撃突厥有勲進位上大將軍通政縣公梁黙為行軍總管從楊素北征突厥進位大將軍漢王諒之反復以行軍總管從楊素討平之加授柱國宇文忺仕周為儀同三司賜爵興固縣公韋孝寛之鎭玉壁也以忺同行屢有戰功加位開府驃騎將軍進爵化政郡公邑二千户從武帝伐齊拔晉陽及齊平進位大將軍賜物千段尋與烏丸軌破陳將吴明徹於吕梁進柱國賜奴婢二百口高祖為丞相尉遲逈作亂以忺為行軍總管從韋孝寛擊之逈軍大敗及平鄴城以功加上柱國賜奴婢二百口牛馬羊萬計高祖顧忻曰尉遲逈傾山東之衆連百萬之師公舉無遺䇿戰無全陣誠天下之英傑也進封英國公增邑三千户王誼周武帝時為内史大夫封陽國公從帝伐齊帝頼以全濟及齊平授相州刺史未㡬徵為内史汾州稽胡為亂誼率兵擊走及平賊而還賜物五千段高祖為丞相轉汾州總管司馬消難反誼為行軍元帥討平之高祖以誼前代舊臣甚加禮敬之遣使勞問冠盖不絶拜大司馬誼自以與高祖有舊亦歸心焉及帝受禪顧遇彌厚帝親幸其第與之極歡元諧為大將軍時高祖為丞相尉遲逈作亂遣兵冦小鄉令諧擊破之及高祖受禪賜宴極歡進位上大將軍封樂安郡公邑千户吐谷渾冦凉州詔諧為行軍元帥擊破之詔遷上柱國王世積仕周為上儀同長子縣公高祖為丞相尉遲逈作亂從韋孝寛擊之毎戰有功拜上柱國高祖受禪進封宜陽郡公未㡬授蘄州總管平陳之役以舟師自蘄水趨九江與陳將紀瑱戰於蘄口大破之又移書告諭陳諸兵將並降以功進位柱國荆州總管賜絹五百段加之寶帶邑三千户後數歳桂州人李光仕作亂世積以行軍總管討平之帝遣都官員外郎辛凱卿馳勞之及還進位上柱國賜物二千段帝甚重之遼東之役與漢王並為行軍元帥至柳州遇疾疫而還拜凉州總管令騎士七百人送之官高熲周武帝時為下大夫以平齊功拜開府從越王盛擊隰州叛胡平之高祖得政屬意於熲委以心膂尉遲逈之起兵遂自請行大破之因平尉遲逈還常侍宴於臥内帝撤御帷以賜之進位柱國改封義寧縣公遷丞相府司馬高祖受禪拜尚書左僕射兼納言進封渤海郡公俄拜左衛大將軍時突厥屢為冦患詔熲鎭遏縁邊及還賜馬百餘匹牛羊千計後為左領軍大將軍及伐陳以熲為元帥長史陳平以功授上柱國高祖幸幷州留熲居守及帝還京賜縑五千疋復賜行宫一所以為莊舎其夫人賀拔氏寢疾中使顧問絡繹不絶帝親幸其第賜錢百萬絹萬疋復賜以千里馬楊素周武帝時為車騎大將軍父没於齊以素申理贈大將軍及平齊之役素請率父麾下先驅帝從之賜以竹䇿曰朕方欲大相驅策故用此物賜卿從齊王憲與齊人戰於河隂以功封清河縣子邑五百户授司城大夫復從憲抜晉州其後毎戰有功及齊平加上開府改封成安縣公邑千五百户賜以粟帛奴婢雜畜高祖為丞相㑹尉遲逈作亂榮州刺史宇文胄據武牢以應逈高祖拜素大將軍發河内兵擊胄破之遷徐州總管進位柱國封清河郡公邑二千户高祖受禪加上柱國帝方圖江表先是素數進取陳之計未㡬拜信州總管賜錢百萬錦千段馬二百匹而遣之及大舉伐陳以素為行軍元帥大破賊還拜荆州總管進爵郢國公邑三千户眞食長夀縣千户賜物萬段粟萬䂖加以金寳又賜陳主妹及女妓十四人轉内史令俄而江南人李稜等作亂素進討悉平之帝以素乆勞於外詔令馳傳入朝加子𤣥感官為上開府賜綵物三千段又斬浙江賊帥高智惠於泉州自餘支黨悉來降附江南大定帝遣左領衛將軍獨孤陀至浚儀迎勞比到京師問者日至賜黄金四十斤加銀缾實以金錢縑三千段馬二百匹羊三千口公田百頃宅一區又為幷州道行軍總管討平漢王諒以功賞物五萬段綺羅千疋諒之妓妾二十人又為靈州道行軍總管破逹頭可汗優詔褒賜縑二萬疋及萬釘寳帶楊文思仕周為車騎大將軍治翼州事討平党項羗及擊破山獠等又從陳王攻齊河隂城又從帝攻拔晉州以勲進授上儀同三司改封永寧縣公増邑至千户又生擒夀陽劉叔仁及别從王誼破賊於鯉魚栅其後累以軍功遷果毅右旅下大夫高祖為丞相從韋孝寛拒尉遲逈於武陟逈遣其將李儁圍懐州與行軍總管宇文述擊走之破尉遲惇平鄴城皆有功進授上大將軍改封雒川縣公尋拜隆州刺史開皇元年進爵正平郡公加邑二千户蘇孝慈為宣納上士從武帝伐齊以功進位開府賜爵文安縣公邑千五百户蘇沙羅仕周為都督後從韋孝寛破尉遲逈以功授開府儀同三司封通泰縣公及高祖開皇中遷檢校利州總管事從史萬嵗擊西㸑累戰有功進位大將軍賜物千段尋檢校益州總管長史㑹越嶲人王奉舉兵作亂沙羅從段文振討平之賜奴婢百餘口李雄周太祖時為輔國將軍從達奚武平漢中定興州又討汾州胡録前後功拜驃騎大將軍儀同三司武帝時為凉州總管長史從滕王逌破吐谷渾於青海以功加上儀同宣帝嗣位從行軍總管韋孝寛畧定淮南雄以輕騎數百至硤石說下十餘城拜亳州刺史高祖總百揆徵為司㑹中大夫以淮南之功加位上開府高祖受禪拜鴻臚卿進爵高都郡公食邑二千户韋洸仕周為開府賜爵衛國縣公高祖為丞相從季父孝寛擊尉遲逈於相州以功拜柱國進封襄陽郡公邑二千户韋藝為上儀同時高祖為丞相藝從季父孝寛擊尉遲逈及破尉遲惇平相州皆有力焉以功進位上大將軍改封武威縣公邑千户高祖受禪進封魏興郡公宇文慶為驃騎大將軍從周武帝拔晉州及齊師大至慶又破高緯拔高壁克幷州下信都擒高湝功並居最武帝詔遷大將軍封汝南郡公邑千六百户尋以行軍總管擊延安反胡平之拜延州總管俄轉寧州總管高祖為丞相復以行軍總管南征江表師次白帝徵還以勞進位上大將軍尋加柱國開皇初拜左武衛大將軍進位上柱國楊文紀仕周為車騎大將軍安州總管長史將兵迎陳降將李瑗於齊安與陳將周法尚軍遇擊走之以功進授開府高祖為丞相改封汾隂縣公從梁睿討王謙以功進授上大將軍前後増邑三千户李禮成仕周為平東將軍以軍功拜車騎大將軍儀同三司賜爵修陽縣侯伐齊之役從武帝圍晉陽禮成以兵擊南門齊將席毗羅率精甲數千拒帝禮成力戰退之加開府進封冠軍縣公元褒仕周官至開府北平縣公趙州刺史及高祖為丞相從韋孝寛撃尉遲逈以功超拜柱國進封河間郡公邑二千户高祖仁夀初以行軍總管撃平嘉州夷獠煬帝即位拜齊州刺史郭榮周武帝時為宣納中士從帝平齊以戰功賜馬二十匹錦絹六百段封平陽縣男至高祖仁夀初西南夷獠多叛詔榮領八州諸軍事行軍總管率兵討之嵗餘悉平賜奴婢三百餘口煬帝即位入為武候驃騎將軍後數嵗擊平亂夷遷左侯衛將軍從帝西征吐谷渾拜銀青光祿大夫遼東之役以功進左光祿大夫從軍攻遼東城榮親䝉矢石晝夜不釋甲胄百餘日帝每令人窺諸將所為知榮如是帝大悦毎勞勉之後拜右候衛大將軍楊𤣥感之亂帝令馳守太原明年復從帝至柳城遇疾帝令存問動靜中使相望卒於懐逺鎭帝為之廢朝贈兵部尚書賜物千段李安為黄門侍郎平陳之役高祖以為楊素行軍司馬仍領行軍總管安率衆先鋒大破陳師高祖嘉之進位上大將軍郢州刺史長孫覽仕周武帝歴小司空從平齊進封薛國公長孫熾為稍伯下大夫周武帝建德中從信州總管王長述破王謙擒其偽總管元振以功拜儀同三司至煬帝時歴位大理卿户部尚書吐谷渾冦張掖令熾率精騎擊之以功授銀青光祿大夫韓擒虎為廬州總管高祖委以平陳之任平金陵執陳叔寶賜物萬段又與賀若弼爭功於帝前於是進位上柱國賜物八千段其後突厥來朝帝謂之曰汝聞江南有陳國天子乎對曰聞帝命左右引突厥詣擒虎前曰此是執得陳國天子者擒虎厲然顧之突厥惶恐不敢仰視别封夀光縣公邑千户韓僧夀仕周為中旅下大夫高祖得政從韋孝寛平尉遲逈每戰有功授大將軍封昌樂縣公邑千户至高祖開皇中檢校靈州總管事從楊素擊突厥破之進位上柱國改封江都郡公韓洪仕周為大都督高祖為丞相從韋孝寛破尉遲逈於相州加上開府甘棠縣侯邑八百户高祖受禪進爵為公尋授驃騎將軍平陳之役授行軍總管及陳平以功加上柱國賀若弼為吴郡總管時高祖委以平陳之事若弼獻取陳十策帝稱善賜以寶刀開皇九年大舉伐陳以弼為行軍總管平陳有功帝下詔褒揚及見迎勞曰克定三吳公之功也命登御坐賜物八千段加位上柱國進爵宋國公眞食邑三千户加以寶劒寶帶金甕金盤各一并雉尾扇曲蓋雜綵二千段女樂二部又賜陳叔寶妹為妾拜右領軍大將軍達奚長儒初仕周太祖為大都督數有戰功假輔國將軍累遷使持節撫軍將軍平蜀之役常為先鋒攻城野戰所當必破除車騎大將軍儀同三司増邑二百户又遷驃騎大將軍從武帝平齊遷上開府進爵安成郡公邑千二百户宣政元年除前將軍勇猛中大夫獲陳將吴明徹以功進位大將軍尋授行軍總管高祖為丞相王謙舉兵於蜀詔長儒擊破之高祖受禪進位上大將軍封蘄春郡公邑二千五百户賀婁子幹為秦州刺史與宇文述等擊破尉遲逈於懐州髙祖大悦賜手書進位上開府封武川縣公邑三千户開皇元年進爵鉅鹿郡公其年吐谷渾㓂凉州子幹為行軍總管從上柱國元諧撃之功最優詔褒美明年突厥犯蘭州子幹擊之於是册授上大將軍徵授營新都副監尋拜工部尚書突厥犯塞詔子幹以行軍總管從竇榮定擊之子幹别路破賊斬首千餘級高祖嘉之遣通事舎人曹威齎優詔勞勉之子幹請入朝詔令馳驛奉見突厥雍虞閭遣使請降並獻羊馬詔以子幹為行軍總管出西北道應接之還拜雲州總管以突厥所獻馬百疋羊千口以賜之乃下書曰自公守北門風塵不警突厥所獻還以賜公史萬嵗仕周為開府儀同三司從梁士彦擊尉遲逈每戰先登及逈平以功拜上大將軍後領車騎將軍平陳之役又以功加上開府及高智慧等作亂江南以行軍總管從楊素擊之萬嵗率衆二千自東陽别道而進踰嶺越海攻陷溪洞不可勝數前後七百餘戰轉鬬千餘里寂無聲聞者十旬遠近皆以為没萬嵗以水陸阻絶信使不通乃置書竹筒中浮之於水汲者得之以言於素素大悦上其事高祖嗟嘆賜其家錢十萬還拜左領軍將軍劉方仕周為承御上士尋以戰功拜上儀同高祖為丞相方從韋孝寛破尉遲逈於相州以功加開府賜爵河隂縣侯邑八百户高祖受禪進爵為公開皇三年從衛王爽破突厥於白道進位大將軍馮昱多權略有武藝高祖為丞相以行軍總管與王誼李威等討叛蠻平之拜柱國王􅋆驍勇善射高祖以其有將帥才毎以行軍總管屯兵江北禦陳冦數有戰功伐陳之役及高智慧反攻討皆有殊績遷柱國李充少慷慨有英略開皇中頻以行軍總管擊突厥有功官至上柱國武陽郡公楊武通性果烈善馳射數以行軍總管討西南夷毎有戰功進封白水郡公陳永貴以勇烈知名高祖甚親愛之數以行軍總管領邊毎戰必單騎陷陣官至柱國蘭利二州總管封北陳郡公房兆剛毅有武略頻以行軍總管擊胡有功官至柱國徐州總管王長述高祖為丞相時授信州總管部内夷獠猶有未賔長述討平之進位上大將軍又陳取王謙之策帝大悦前後賜黄金五百兩授行軍總管率衆討謙以功進位柱國開皇初復獻平陳之計帝善其能頻加賞勞後數嵗以行軍總管擊南寧未至道病卒帝甚傷惜之令使者弔祭贈上柱國冀州刺史李衍為義州刺史從韋孝寛鎭玉壁城數與賊戰敵人憚之及齊平以軍功進授大將軍改封眞鄉郡公拜左宫伯賜雜綵三百疋奴婢二十口及王謙作亂高祖以衍為行軍總管從梁睿平之進位上大將軍賜縑二千疋開皇元年又以行軍總管討叛蠻平之進位柱國賜帛二千疋及大舉伐陳授行軍總管田仁恭仕周為開府儀同三司中外府掾從宇文䕶征伐數有戰功改封襄武縣公邑五百户從武帝平齊加授上開府進封淅陽郡公増邑二千户高祖為丞相進位大將軍從韋孝寛破尉遲逈於相州拜柱國杜整為左武衛將軍開皇中宻進取陳之策高祖善之於是以行軍總管鎭襄陽病卒帝聞而傷之贈帛四百疋米四百石薛世雄初從周武帝為帥都督開皇中數有戰功累遷儀同三司又為玉門道行軍大將擊降伊吾進位正議大夫賜物二千段李徹為車騎大將軍周武帝時從皇太子西征吐谷渾以功賜爵周昌縣男邑三百戸復從帝破齊師於汾北乘勝下高壁拔晉陽擒高湝於冀州俱有力焉録前後功加開府别封蔡陽縣公邑千户至高祖受禪為左武衛將軍總晉王府軍事進爵齊安郡公及突厥沙鉢略可汗犯塞與李充率精騎五千出其不意掩擊大破之以功加上大將軍杜彦仕周為龍州刺史賜爵永安縣伯高祖為丞相從韋孝寛擊尉遲逈於相州毎戰有功賜物三千段奴婢三十口進位上開府開皇中為左武衛將軍平陳之役以行軍總管與新義公韓擒虎相繼而進及平陳賜物五千段粟六千石進位柱國高智慧作亂復以行軍總管從楊素討平之賜奴婢百餘口拜洪州總管高勵為光州刺史高祖為丞相時上取陳五䇿及大舉伐陳以勵為行軍總管從宣陽公王世積下陳江州以功拜上開府賜物三千段爾朱敞為驃騎大將軍周武帝東征上表求從許之攻城陷陣所當皆破進位上開府除南光州刺史入為䕶軍大將軍轉膠州刺史高祖受禪改封邉城郡公黔安蠻叛命敞討平之師旋拜金州總管獨孤楷仕周為車騎將軍其後數從征伐賜爵廣阿縣公邑千户拜右侍下大夫周木從韋孝寛平淮南以功賜子景雲爵西河縣公高祖為丞相進授開府及受禪拜右監門將軍進封汝陽郡公乞伏慧周武帝時為熊渠中大夫高祖為丞相從韋孝寛擊尉遲惇於武陟所當皆破授大將軍賜物八百段及平尉遲逈進位柱國賜爵河西郡公邑三千户賚物二千三百段張威仕周位至柱國高祖以威為行軍總管從元帥梁睿撃王謙平之進上柱國拜瀘州總管和洪周武帝時為車騎大將軍儀同三司時龍州蠻任公忻李國立等聚衆為亂洪擒斬之從帝攻河隂洪力戰陷其西門帝壯之賜物千段復從帝平齊進位上儀同賜爵北平侯邑八百户拜左勲曹下大夫柱國王軌之擒吴明徹也洪有功焉加位開府遷折衝中大夫尉遲逈作亂相州以洪為行軍總管從韋孝寛擊走之又破尉遲惇於武陟及破平相州每戰有功拜柱國封廣武郡公邑二千户前後賜物萬段奴婢五十口金銀各百錠牛馬百疋宇文㢸初為内史從周武帝平齊以功拜上儀同封武威縣公邑千五百户賜物千五百段奴婢五十口牛羊千餘頭拜司州總管司録宣帝時為監軍從梁士彦攻拔夀陽尋改封安樂縣公増邑六百户賜物六百段加以口馬俄轉南司州刺史遇陳將樊毅戰於漳口虜獲三千人除黄州刺史尋轉南定州刺史高祖開皇初以前功封平昌縣公加邑一千二百户三年突厥冦甘州以行軍司馬從元帥竇榮定撃破之還除太僕少卿轉吏部侍郎平陳之役㢸持節為諸軍節度仍領行軍總管劉仁恩之破陳將吕仲肅也㢸有謀焉加開府擢拜刑部尚書張衡為揚州總管司馬開皇中熈州李英林聚衆反署置百官以衡為行軍總管率步騎五萬人討平之拜開府賜奴婢一百三十口物五百段金銀雜畜稱是崔仲方為㑹州總管時諸羗猶未賔附高祖詔令仲方擊之與賊三十餘戰諸部悉平賜奴婢一百三十口黄金三十金雜物稱是于仲文為大將軍高祖初為丞相尉遲逈之亂仲文討之河南既平勒石紀功樹於泗上入朝京師高祖引入卧内宴享極歡賜雜綵千餘段妓女十人拜柱國河南道大行臺李景以行軍總管從王世積伐陳陷陣有功進位上開府賜奴婢六十口物千五百段及高智慧等作亂江南復以行軍總管從楊素擊之還授鄜州刺史遼東之役為馬軍總管後為代州總管時漢王諒作亂景發兵擊破之景尋被徵入京進位柱國拜右武衛大將軍賜縑九千疋女樂一部加以珍物景智略非所長忠直為時所許帝甚信之擊叛蠻向思多破之賜奴婢六十口又擊吐谷渾於青海破之進位光祿大夫賜奴婢六十口縑二千疋又攻高麗武列城破之賜爵苑丘侯物一千段册府元龜卷三百八十三
