body:
  text: 册府元龜巻五百二十一宋王欽若等撰憲官部不稱希㫖殘酷不稱夫紏察之官是持邦憲耳目之任以司君聽故職修則事舉官邪則政廢矧乃居夫彈劾必當罄其謇諤其或簡畧是務靡見於繩愆畏避為心坐貽於官謗授受之際葢兩失歟器人之能未易議也宋荀子伯為御史中丞凡所奏劾莫不深相呵毁或延及祖禰其言切直又頗雜嘲戯故世人以此非之梁謝㡬卿自尚書三公郎為侍書侍御史舊郎官轉為此職者謂為南奔幾卿頗失志多陳疾臺事畧不復理徙為㪚騎侍郎後魏爾朱承世領御史中尉人才猥劣備員而已甄琛為侍中領中尉俛眉畏避不能繩糾貴逰凡所劾治率多下吏唐楊國忠初名釗𤣥宗天寳中以貴妃從父之子為監察御史去就輕率驟履清憲朝士指目嗤之韋陟肅宗時為御史大夫時朝臣六班多不整肅至有班頭相弔哭者乃罷陟御史大夫以顔眞卿代柳渾代宗時為監察御史憲臺執法之地動循儀軌渾性放曠不堪檢束其僚長局吏咸忿其疎縱渾既不樂乞守外職執政惜其才奏為左補闕王翊代宗時為御史大夫奉職雖不能舉正綱條以亷謹知名張延賞代宗時為御史大夫初元載持權歲久寵賂日彰朝綱爵賞無不大壊帝思得正人為己腹心漸收載權以肅朝政繇是浙西觀察使李栖筠與延賞赴闕時延賞為河南尹以地近先至除大夫適㑹前成都府司録李少良與殿中侍御史陸班等宻上封事論載得失帝付臺問狀延賞疑懼不敢鞫遂託疾以避其事内不能平猶惜人望出延賞為淮南節度使敬恬代宗時為御史大夫從容養望不舉綱紀士亦以此少之于頎德宗建中時為御史大夫初頎為河南尹以無政代還時徵汾州刺史劉暹暹剛愎嫉惡歴典數州皆為亷使畏憚宰相盧杞恐暹為御史大夫虧沮己之所建遽稱薦頎為之以其柔佞易制也李元素憲宗時為御史大夫是官自貞元中位缺乆難其人至是元素以名望召拜中外聳聽及居位一無修舉但規求作相乆之寢不得志見客必曰無以官散相疎也見屬官必先拜脂韋在列大失人情李珝文宗開成初為御史中丞帝御紫宸殿宰臣李固言奏曰李珝在臺雖無甚過以為人疎易不稱此官此官乃天下綱紀有司䋲凖茍用人非當則紊亂典章帝曰李珝官業應不堪舉然為人豈不長厚耶固言對曰臣所奏緣與御史中丞不相宜人即長厚且憲司彈奏事亦至難官要得宜者杜宣猷與柳瓌崔郢魏中唐髙宏簡俱為監察御史開成四年四月詔以宣猷為河南府司録叅軍瓌為監察縣令郢為侍御史充鄜坊節度使判官先是御史中丞髙元裕上言御史府官屬選用至重宣猷等才望不稱請出之因有是命後唐崔協莊宗同光初為御史中丞憲司舉奏多以文字錯誤屢受責罰崔協器宇宏爽高談虛論多不近理時人以為虛有其表李琪明宗天成初為御史大夫時樞宻使安重誨宅與御史臺差相對重誨前騶至臺門殿直馬延衝前騶重誨即命斬於臺門琪以重誨權重不敢舉其過又慮諫官論奏乃白於宰相任圜託先聞於重誨即具上聞琪即奏重誨言於臺門斬人事辭㫖依違不敢正言其罪梁文矩天成中為御史中丞上表曰臣近聞有勅命夏秋苖稅取天成二年額為長定雖聖主時行憂軫而黎民未甚聞知伏請再降明勅令粉壁曉告文矩初執憲綱志在舉職而首陳此議論者以為欲去邪指佞理甚迂闊盧損末帝清泰中為御史中丞時有赦放繫囚白文審者延安之劇賊也繫於臺囹圄乆之是日釋放翌日衆知之大駭乃重詳赦文比不該放者頼臺司復捕獲文審損與知雜韋稅本推御史魏遜皆停任希㫖夫執霜簡峩豸冠立赤墀之下蓋所以振肅紀綱糾繩違謬是曰邦之司直者矣則有性本頗邪志必憸險承望風㫖迎合意趣或文致其罪惡或増飾其左驗陰中良善宻搆忠賢多所剿絶自求進取無靦於面目不畏於簡書雖曰人之不臧亦乃政之多辟云耳後漢郗慮為御史大夫少府孔融見曹公雄詐漸著數不能堪故發辭偏宕多致乖忤偏邪跌宕不拘正理曹公憚之以融名重天下外相容忍而潛忌正議慮承望風㫖以微法奏免融官晉王宏武帝時為司𨽻校尉於是簡察士庻使車服異制庻人不得衣紫綘及綺繡錦繢帝嘗遣左右微行觀察風俗宏緣此復遣吏科簡婦人袒服至褰發於路論者以為暮年謬妄繇是獲議於世復坐免官南齊孔稚珪為御史中丞初王融為竟陵王子良拔置寧朔軍主武帝疾篤融欲立子良欝林忿之即位十日收下廷尉使稚珪倚為奏曰融姿性剛險立身浮競動跡驚羣抗言異類近塞外微塵苦求將領遂招納不逞扇誘荒傖狡弄聲勢專行權利反覆唇齒之間傾動頰舌之内威福自已無所忌憚誹謗朝政歴毁王公謂已才流無所推下事曝逺近使融依原據答融辭曰囚實頑蔽觸行多諐但夙忝門素得奉教君子爰自摠髪迄將立年州閭鄉黨見許愚愼朝廷衣冠謂無釁咎過蒙大行皇帝奬育之恩又荷文皇帝職任之重司徒公賜預士林安陸王曲垂盻接既身被國慈必欲以死自効前後陳伐敵之計亦仰開先朝今假邊塵乍擾令囚草撰符詔又司徒宣勅招募同例非一實以戎事不小不敢承教續蒙軍號賜使招集衘勅而行非敢虛扇且格取亡叛不限傖楚狡弄聲勢應有形迹專行權利又無贓賄反覆唇齒之間未審悉與誰言輕動頰舌之内不容都無主此但聖主膺教實所沐浴自上甘露頌及銀甕啓生日詩序接敵使語辭竭思稱揚得非誹謗且王公百司唯賢是與髙下之敬等秩有差不敢踰濫豈應訿毁囚才分本劣謬被䇿用悚怍之情夙宵兢惕未嘗誇示里閭彰曝逺近自循自省竝愧流言良繇慮淺寡虞致貽囂謗伏惟皇明臨宇普天蒙澤戊寅赦恩輕重必宥百日曠期始蒙旬日一介罪身獨嬰憲劾若事實有徵爰對有在身死之日無恨泉壤詔獄賜死時年二十七臨死嘆曰我若不為百嵗老母當吐一言融意欲指斥帝在東宮時過失也融被收朋友部曲叅問此等相繼於道融請救於子良憂懼不敢救後魏甄琛宣武時為御史中尉時趙修盛寵琛傾身事之琛父凝為中散大夫弟僧林為本州别駕皆託修申達至修奸事露明當收考今日乃舉其罪及監决修猶想隠惻琛告人曰趙修小人背如土牛殊耐鞭杖有識以此非之北齊封孝琰廢帝時為通直散騎常侍兼尚書左丞其所彈射多承意㫖隋裴藴為御史大夫時蘇威為納言焬帝時盗賊不止天下大亂威毎諷諌帝彌不平後復問伐遼東事威對願赦羣盗遣討髙麗帝益怒藴希㫖令白衣張行本奏威昔在髙陽典選濫授人官畏怯突厥請還京師帝令案其事及獄成下詔曰威立性朋黨好為異端懷挾詭道徼幸名利詆訶律令謗訕臺省昔嵗薄伐奉述先志凡預切問各盡胷臆而威不以開懐遂無對命啟沃之道其若是乎資敬之義何其甚薄於是除名為民藴又與裴矩虞世基叅掌機宻藴善候伺人主微意若欲罪者則曲法順情鍛成其罪所欲宥者則附從輕典因而釋之是後大小之獄皆以附藴憲部大理莫敢與奪必禀承進止然後决斷藴亦機辯所論法理言若懸河或重或輕皆繇其口剖析明敏時人不能致詰唐崔義元高宗時為御史大夫希宻㫖陰中長孫無忌等罪立皇后武氏袁守一為監察御史時節愍太子重俊搆亂魏元忠子昇時為脇從宗楚客等將誣元忠通謀侍中楊再思中書令李喬又希楚客㫖欲致其罪中宗不從守一遂表彈元忠曰臣聞去疾宜逺史䇿攸存惡逆不誅禍難未已故潘崇進説宮甲遂興霍禹陰謀芒刺可驗謹案魏元忠擢自布衣越昇台衮十旬逺至一歲九遷日月借其光彩風雲姿其鳴躍享營邱之大名食睢陽之茅土當湏竭誠畢命徇義酬恩而乃搆惑儲宮躬為謀主位高勢重狼顧豺聲親典五兵又司百揆儲宮向闕先召賊臣北軍斬闗未聞死難至於陷重俊令犯逆誘臣下使謀君戎馬滿於宮中戰塲在於闕下宸座驚逼兆庻憂懼一日之間中外隔絶禍交之首實階元忠宜肅朝章以明典法用塞人祗之怨稍清郊廟之恥罪狀既實自孽難逃義士忠臣誰不憤激重俊是陛下之子猶加昭憲元忠非勲非戚焉得獨漏嚴刑縱陛下惡死好生其如國典何元忠等請汙宮以謝罪赤族以申刑伏望付法據狀科斷敬羽為御史中丞時道士申泰芝託使鬼物却老之術得幸於肅宗因使徃湖南宣慰受奸贓鉅萬又以訛言惑衆潭州刺史龎承鼎按其事以聞肅宗不之信召泰芝赴京師下承鼎於江陵獄詔嚴郢窮理之郢具以泰芝奸狀聞肅宗又令中使與呂諲同驗諲亦執奏泰芝無狀肅宗皆不納羽希㫖附㑹泰芝肅宗大怒竟杖殺承鼎賈全為御史中丞德宗貞元中夏州節度使韓潭朝京師其監軍賈英秀在鎭挾誣捕州人馮翃節度推官王游順典李縉朝以枷拉殺翃翃子琪以寃上訴兼告英秀贓狀下御史臺按之全希㫖以附中人奏請留免英秀於内侍省餘黨於臺推得實故㳺順等坐死英秀獨削一階殘酷書曰與其殺不辜寕失不經此聖哲知一成而不可變故矜恤之心至矣暨夫失政之世強猜多忌峻刑罰以攝下委酷吏以為能擢之憲臺恣彼兇忍或求官屬之陰罪或屠流人以逞威始為嫉惡如讐兾叅柄用終則舞文深詆謂其敢决招集同惡則千里響應自臨箠朴則五毒備極行路為之寒心舉朝為之累足其後雖萬乘易慮何補寃痛異代覧之孰不嗟惋漢王温舒武帝時以廷尉史事張湯為御史督盗賊殺傷甚多咸宣武帝時為御史及中丞使治主父偃及淮南反獄所以微文深詆殺者甚衆詆誣也稱為决疑數廢數起為御史中丞者幾二十歲幾音巨衣反杜周武帝時以廷尉史事張湯至御史使案邊失亡邊卒多亡也一云郡縣主守有所失亡也所論殺甚衆奏事中上意任用與咸宣相編更為中丞十餘歲其治與宣相倣然重遲外寛内深刺骨其用罪深刻至骨後漢周紓章帝時為御史中丞和帝即位太傅鄧彪奏在任過酷不宜典司京輦免歸田里永元五年復徵為御史中丞遷司𨽻校尉六年夏旱車駕自幸雒陽録囚徒二人被掠生蟲左除騎都尉陽球靈帝時為司𨽻校尉先是球為尚書令時中常侍王甫曹節等姦虐弄權扇動外内球嘗拊髀發憤曰若陽球作司𨽻此曹子安得容乎光和二年遷為司𨽻校尉王甫休沐里舍球詣闕謝恩奏收甫及中常侍淳于登袁赦封莫大羽中黄門劉毅小黄門龎訓朱禹齊盛等及子弟為守令者姦猾縱恣罪合㓕族太尉段紀明諂附佞倖宜竝誅戮於是悉收甫紀明等送雒陽獄及甫子永樂少府萌沛相吉球自臨考甫等五毒備極萌謂球曰父子既當伏誅少以楚毒假借老父球曰若罪惡無状死不㓕責乃欲求假借邪萌乃罵曰爾前奉事吾父子如奴奴敢反汝主乎今日困吾行自及也球使以土窒萌口箠朴交至父子悉死杖下紀明亦自殺乃僵磔甫屍於夏城門大署榜曰賊臣王甫盡沒入財産妻子皆徙北景球既誅甫復欲以次表曹節等乃勑中都官從事曰且先去大猾當次案豪右權門聞之莫不屏氣諸奢飾之物皆各緘縢不敢陳設京師畏震時順帝虞貴人塟百官㑹喪還曹節見磔甫屍道次慨然抆淚曰我曹自可相食何宜使犬䑛其汁乎語諸常侍今且俱入勿過里舍也節直入省白帝曰陽球故酷暴吏前三府奏當免官以九江微功復見擢用愆過之人好為妄作不宜使在司𨽻以騁毒虐帝乃徙球為衛尉時球出謁陵節勑尚書令召拜不得稽留尺一球被召急因求見帝叩頭曰臣無清髙之行横蒙鷹犬之任前雖糾誅王甫段紀明盖簡落狐狸未足宣示天下願假臣一月必令豺狼鴟梟各服其辜叩頭流血殿上呵叱曰衛尉扞詔邪至於再三乃受拜後魏李彪為御史中尉號為嚴酷以姦欵難得乃為木手擊其脇腋氣絶而復屬者時有焉又慰喻汾州叛胡得其土渠皆鞭而殺之彪之病也體上徃徃瘡病痛毒備極北齊宋㳺道仕東魏為御史中尉性剛直疾惡如讐見人犯罪皆欲致之極法彈糾見事又好察陰私問獄察情捶撻嚴酷别劾吉寧等五人同死有欣悦色朝士甚鄙之唐來俊臣則天時為御史按制獄素小不合意者必引之前後坐族千餘家擢拜左臺御史中丞與侍御史侯思正王宏義郭霸李敬仁評事康暐衞遂忠等同惡相濟招集告事者數百人共為羅織數州相連千里響應欲誣陷一人即數頭别告皆事状不異異口同音以惑上下仍具云請付來俊臣等推勘必獲實又造告宻羅織經一卷其意皆網羅前人織成反狀俊臣毎鞫囚無問輕重多以醋灌鼻禁地牢中或盛之於瓮以火圍燒炙之兼絶其糧餉至有抽衣絮以噉之者又令寢處糞穢備諸苦毒自非身死終不得出每有制書寛宥囚徒俊臣先遣獄卒盡殺重囚然後宣示又與㳺擊將軍索元禮等作大枷凡有十號一曰定百脉二曰喘不得三曰突地吼四曰著即承五曰失䰟魄六曰實同反七曰反是實八曰死猪愁九曰求即死十曰求破家復有鐵籠頭遭其加者輪轉於地斯須悶絶矣囚人無貴賤必先布枷棒於地召囚前曰此是作具見之䰟膽飛越無不自誣矣則天重其賞以酬之故吏兢勸為酷毒繇是告宻之徒紛然道路俊臣復按大將軍張䖍朂大將軍内侍范雲仙於雒州收院䖍朂等不堪其苦自訟於徐有功言辭頗厲俊臣命衞士亂刀斬殺之雲仙亦言歴事先朝使臣寃苦俊臣命截去其舌士庻破膽無敢言者俊臣贓汚滋甚荒淫無度百官妻子及商人財貨多被其逼奪御史紀履忠劾奏其狀准犯當誅則天以俊臣告事有功特恕其死侯思止則天時為左臺侍御史既按制獄苛酷日甚嘗按中丞魏元忠曰急承白司馬不然即喫孟青白司馬者雒陽有坂號白司馬孟青者將軍姓孟名青棒即殺瑯琊王冲者也思止閭巷庸奴嘗以此謂諸囚也元忠辭氣不屈思止怒而倒曵元忠徐起曰我薄命如乘惡驢墜脚為鐙所繫被拖曵思止大怒又曵之萬國俊則天時為司刑評事長夀二年二月有上封事人言嶺表流人有陰謀逆者則天遣國俊攝監察御史就按之若得反狀便斬决國俊至廣州遍召流人置於别所矯制賜自盡竝號呼稱寃不服國俊乃引出擁之水曲以次加戮三百餘人一時併命然後鍛錬曲成反狀仍便誣奏云諸道流人咸有怨望若不推究為變不遥則天深然其奏又命右衞翊二府兵曹叅軍劉光業司刑評事王德壽苑南靣監丞鮑思恭尚輦直長王大貞右武衛兵曹叅軍屈真筠竝攝監察御史分徃劔南黔中安南嶺南等六道按鞫諸州流人尋擢授國俊朝散大夫行左肅政臺侍御史光業等見國俊盛行殘殺得加榮賞幷受鸞臺侍郎傳㳺藝之㫖乃共肆其凶惡唯恐後之故所在殺戮光業誅七百一云九百德壽五百人一云七百其餘少者不减百人一云五百亦有雜犯及逺年流人本非革命時犯罪者亦枉及禍焉則天知其寃濫制被六道所誅家口未歸者逓還本貫國俊等俄相次被誅其不死者坐事流竄而衆議咸以為殘酷所致王宏義則天時為左臺侍御史毎暑月繫囚必於小房中積蒿而施氊褥遭之者斯須氣絶矣與來俊臣嘗行移文牒州縣慴懼自矜曰我之文牒有如狼毒野葛也郭霸則天時為左臺殿中侍御史嘗推坊州刺史李思徵榜棰拷禁不勝而死胡元禮為侍御史長夀中左臺侍御史王宏義流放瓊州妄稱勅追時元禮使嶺南次於襄鄧㑹而按之宏義詞窮乃請曰與公氣類元禮曰足下任御史元禮任雒陽尉元禮今為御史公乃流囚復何氣類乃榜殺之周利貞中宗神龍中為侍御史出為嘉州司馬桓彦範袁恕己等為武三思誣搆流桓彦範於瀼州敬暉為崖州袁恕己於環州三思猶慮重被進用納崔湜計令利貞攝右臺侍御史就嶺南矯制殺之彦範行至貴州利貞遇之於途乃令左右執縛曵於竹槎之上肉盡至骨然後杖殺之恕己至環州為利貞所逼飲野葛汁數升恕己嘗服黄金飲毒訖憤悶以手掘地取土而食爪甲殆盡竟不死乃擊殺之姚紹之為監察御史中宗朝駙馬都尉王同皎與張仲之祖延慶謀誅武三思事洩乃勑左臺大夫李承嘉與紹之按於新開門紹之初將直盡其事詔宰相李嶠等對問諸相懼三思但僶俛佯不問仲之延慶言不已宰相有附㑹三思者屢與承嘉耳語復説誘紹之其事乃變遂宻置人力十餘引仲之對問至則為紹之所擒塞口反接送獄中紹之還謂仲之曰張三事不諧矣仲之固言三思反狀紹之命捧之而臂折大呼天者六七謂紹之曰反賊臂且折矣命已輸爾當訴爾於天帝乃自誣反而遇族王旭𤣥宗時為左臺侍御史開元初光禄少卿盧崇道以崔湜妻父貶於嶺外迯歸匿於東都為讐家所發詔旭究其獄旭欲擅其威權因捕崇道親黨數十人皆極其楚毒然後結成其罪累遷左司郎中嘗帶侍御史旭為人嚴苛左右無敢支吾每衘命推劾一見無不輸欵者敬羽肅宗時為監察御史作大枷有􅬷尾榆着即悶絶又丱囚於地以門關輾其腹號為肉膊飥掘地為坑實以棘刺以敗席覆上領囚臨坑訊之必墜其中萬刺攅之有胡人康謙為試鴻臚卿知山南東路譯人嫉之告其陰通史朝義謙髭鬚長三尺按之兩宿鬚髪皆秃膝踝亦拷碎視之者以為鬼物非人類也册府元龜卷五百二十一
