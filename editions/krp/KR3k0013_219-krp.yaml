立後為魏所伐奔髙句麗在位六年偽號大興南凉秃髪烏孤初為吕光將晉安帝隆安元年自稱大都督大將軍大單于西平王赦其境内年號太初在位三年弟利鹿孤立秃髪利鹿孤晉隆安三年立既逾年赦其境内改元曰建和在位三年弟傉擅嗣秃髪傉擅以晉元興元年僭號凉王遷於樂都改元𢎞昌又改嘉平在位十三年宏昌六年嘉平七年為乞伏熾磐所滅南燕慕容徳垂之弟垂臨終勅其子寳以鄴城委徳寳既嗣位以徳為丞相冀州牧承制南夏晉隆安二年自鄴徙於滑臺眀年寳為蘭汗所殺徳依燕元故事稱元年赦殊死已下置百官四年僭即皇帝位於南郊大赦改元為建平在位五年兄子超嗣位慕容超即位改元曰太上在位六年為晉所滅北凉沮渠蒙遜等初推叚業為凉州牧建康公改吕光龍飛二年為神璽元年業後僭稱凉王蒙遜殺之晉安帝隆安五年蒙遜僭稱凉州牧張掖公赦其境内改元永安義熙八年僭即河西王位大赦境内改元𤣥始置官寮如吕光為三河王故事在偽位三十三年永安十二年𤣥始十六年承𤣥三年義和三年記不書承𤣥義和二年號按帝王真偽記編入子茂乾嗣沮渠茂乾在偽位七年年號承和為後魏所滅夏赫連勃勃初為姚興安北將軍五原公晉義熙二年僭稱天王大單于建元曰隆昇署置百官自以匈奴氏之苖裔也國稱大夏其後改元為鳯翔勃勃既入長安為壇於㶚上僭即皇帝位赦其境内改元為昌武自長安還統萬以宫殿大成於是赦其境内又改元曰真興勃勃在位十八年龍昇六年鳯翔五年昌武元年真興七年子昌嗣赫連昌嗣偽位年號永光四年為魏所擒弟定立赫連定僭偽位於平凉年號服光四年為魏所滅吳楊渭淮南節度使𢎞農郡王行宻次子行宻唐天祐三年卒長子渥繼襲是嵗梁太祖既受唐禪改元開平而渥猶稱天祐至五年渥為大將張顥所殺顥自稱留後將納欵於梁又為别將徐温所殺以渭為主至十六年温冊渭為天子改元武義盡二年楊溥渭之弟渭卒溥嗣偽位改元順義盡七年又改乾貞盡二年又改太和盡二年又改天祚盡二年遜位於李昪前蜀王建梁開平三年以劒東南西川節度使蜀王僭即皇帝位於成都改元武成三年改元永平五年改元通正是年冬改元天漢又改元光天王衍建之幼子嗣偽位改元乾徳六年十二月改眀年為咸康漢劉陟青海静海兩軍節度使南海王隠之弟隠以梁開平四年卒陟代據其位貞眀三年僭號於廣州國號大漢改元乾亨九年白龍見於南海改元白龍四年改元大有凡僭號三十六年劉玢陟長子陟卒玢嗣偽位改元光天在位一年為弟晟所殺劉晟即偽位改元應乾又改元乾和劉鋹晟之長子襲偽位改元太寳閩王延均福建節度使閩王審知次子審知卒長子延翰嗣為延均所殺延均襲位後唐長興三年上言吳越國王錢鏐薨乞封為吳越王不報遂自稱皇帝國號大閩改元龍啓在位十一年王昶延均之子嗣偽位改元通文王延羲審知之少子嗣偽位改元永隆在位六年後蜀孟知祥後唐應順六年以劒東南西川節度使蜀王稱帝於蜀改元眀徳在位一年孟昶知祥第三子嗣偽位猶稱眀徳至四年冬改眀年為廣政盡二十八年歸皇朝唐李昪晉天福二年以偽吳太尉錄尚書事封齊王受吳禪僭即尊位國號大齊改元昇元建都於金陵尋改國為唐在位七年李景昪之長子嗣偽位改元保大周世宗南伐遂稱唐國主行顯徳年號後漢劉崇周廣順元年以河東節度使僭號於太原稱漢改名旻仍以乾祐為年號崇卒子均襲偽位本紀不書年號册府元龜卷二百十九
