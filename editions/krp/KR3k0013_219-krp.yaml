body:
  text: 册府元龜卷二百十九宋王欽若等撰僭偽部總序夫餘分為閏既異夫居正之統王綱失紐或有乎僭命之號斯盍豪傑竊起以蓄乎覬覦强弱相凌分據乎土宇雖政令之自岀非運序之所繫自魏武徙氐羌之種雜處秦州晉氏之興厥類彌熾罔狥名臣之議失於長世之御亂華之暴乘間而作故劉淵以五部之衆起於離石石勒因晉陽之甲據乎襄國厲階之搆乃繇於此而李特以流徙之隷奄宅益部而為蜀慕容廆因封建之舊保界遼碣而為燕羣雄競起宇内分裂河西之區張軌攸領因而稱制是稱前凉自此晉綱絶紐中原震蕩龜玉南徙遂荒江介其後符洪自薊州之廣川建三晉之號入㓂闗輔居長安而為秦李暠跨燉煌之地雄西夏而稱西凉慕容垂守中山之國蹈兩河而為後燕乞伏國仁憑河湟之奥而為西秦吕光按酒泉之富而為後凉姚萇乘符氏之業而為後秦馮䟦踐昌黎之域而為北燕秃髪烏孤負西平之阻而號南凉慕容徳依廣固之險而為南燕沮渠蒙遜保張掖而為北凉赫連勃勃連朔方而稱夏凡十有六國焉俱僭大號各建正朔或稱王爵並専誅賞𫝊世垂祚歴嵗彌乆而率多戎虜之種或出氐羌之類始愆制馭終以彊大分宰諸夏専制民命吞併相繼兵難不絶家國殊政百有餘年洎宋祖之奮威及元魏之雄視芟夷掃蕩剪焉靡餘以至唐室之季王度交䘮禮樂征伐不出於朝廷山河疆理遂分於土壤王審知跨據山海裂五郡而為閩王建憑恃巖險包三川而為蜀楊行宻宅淮海之壤擅魚鹽之富建號而稱吳劉陟總百越之衆通珠貝之利開國而為漢其後孟知祥因同光之難憑二劍之固僣尊名而為後蜀李昪承吳人之業保重江之阻冒舊服而為唐劉崇以漢室之亡托於宗胄仍厥位號保於太原而吳唐二蜀繼守其宇七閩之亂厥土三分顯徳之世尚餘四國皇朝受命始平井絡旋殄五嶺後克江表三晉遺孽再駕而服混一區内以致太平今自西晉之後洎唐宋諸國論次其事類以為僭偽部凡三十七門姓系年號姓系夫胙土命氏事存於魯史别生分類義載於虞書盖所以辨族類而定嫌疑厚人倫而正宗祀也若夫桀黠之流乘時射利割據州壤負阻山河或保聚方隅或饕竊大號雖游魂假息寜亂紀於帝圗然𤓰割豆分咸編名於惇史源流所自祚裔攸存廣記備言既可徵於舊史洽聞殫見將有助於方来爰用討論咸從編次前凉張軌字士彦安定烏氏人漢常山景王耳十七世孫也家世孝㢘以儒學顯父温為太官令軌晉恵帝時為散騎常侍征西軍司馬永寜初出為䕶羌校尉凉州刺史愍帝時進位司空固讓又拜侍中太尉凉州牧西平公軌又固辭在州十三年表立子寔為世子卒年六十諡曰武公州人推寔攝父位寔字安遜愍帝因下䇿書授持節都督凉州諸軍事西中郎將凉州刺史領䕶羌校尉西平公在位六年為帳下閻沙所害私諡曰昭公元帝賜諡曰元子駿年㓜弟茂攝事州人推茂為大都督太尉凉州牧茂不從但授使持節平西將軍凉州牧在位五年卒私諡曰成茂無子寔子駿嗣位駿字公庭在位二十二年卒私諡曰文公穆帝追諡曰忠成公第二子重華嗣位自稱持節大都督太尉䕶羌校尉凉州牧西平公假凉王重華字泰臨在位十一年卒私諡曰昭公後改曰桓公穆帝賜諡曰敬烈子耀靈年十嵗嗣事稱大司馬校尉刺史西平公在位一年為伯父祚所害私諡曰哀公祚字太伯自稱大都督大將軍凉州牧永和十年祚僭稱帝位簒立三年為其下張瓘䓁所殺立耀靈庶弟𤣥靚為大都督大將軍校尉凉州牧西平公𤣥靚字元安在位九年為駿少子天錫所害私諡曰冲公孝武帝賜諡曰敬悼公天錫自號大將軍校尉凉州牧西平公在位十三年降於苻堅自軌為凉州至天錫凡九世七十六年西凉李暠字𤣥盛小字長生隴西成紀人漢前將軍廣之十六世孫也廣曾祖仲翔漢初為將軍討叛羌於素昌素昌即狄道也衆寡不敵死之仲翔子伯考奔䘮因葬於狄道之東川遂家焉世為西州右姓髙祖雍曾祖柔仕晉並歴位郡守祖弇仕張軌為武衛將軍家世亭侯父㫤幼有令名早卒遺腹生暠吕光末叚業所署沙州刺史孟敏署暠效榖令敏卒䕶軍郭謙治中索僊等推𤣥盛為敦煌太守稱藩於業晉安帝隆安四年晉昌太守唐瑶推𤣥盛為大都督將軍凉公領秦凉二州牧䕶羌校尉在位十八年年六十四私諡曰武昭王子歆嗣歆字士業小字桐椎在位四年為沮渠䝉遜所滅弟敦煌太守恂為郡人宋承等所推為凉州刺史二年又為䝉遜所滅始暠以安帝隆安四年僭位凡三世二十四年前趙劉淵字元海新興匈奴人冒頓之後也初漢髙祖以宗女為公主以妻冒頓約為兄弟故其子孫遂冒姓劉氏後漢建武初烏珠留若鞮單于子右奥鞬日逐王比自立為南單于入居西河美稷今離石左國城即單于所徙庭也中平中單于羌渠使子於扶羅將兵助漢討平黄巾㑹羌渠為國人所殺於扶羅以其衆留漢自尊為單于屬董卓之亂㓂掠太原河東屯於河内於扶羅死弟呼厨泉立以於扶羅子豹為左賢王即元海之父也魏武分其衆為五部以豹為左部帥其餘部師皆以劉氏為之太康中改置都尉左部居太原泫氏右部居祁南部居蒲子北部居新興中部居大陵劉氏雖分居五部然皆家於晉陽汾澗之濵豹生元海晉恵帝時為成都王頴所拜北單于永興元年僭稱漢王永嘉二年僭即皇帝位在位六年偽諡光文皇帝太子和立和字𤣥泰嗣偽位為弟聰所害聰字𤣥眀一名載元海第四子以永嘉四年僭即皇帝位在位九年偽諡曰昭武皇帝子粲嗣偽位粲字士光在位一年為靳準所殺元海族子曜自長安赴難至於赤壁偽太保呼延宴等迎立之以大興元年僭即皇帝位曜字永眀在位十年為石勒所殺元海自懐帝永嘉四年僭位至曜三世凡二十有七年後趙石勒字世龍初名􅂒上黨武鄉羯人也其先匈奴别部羌渠之胄祖邪奕於父周曷朱一名乞翼加並為部落小率勒仕劉元海為平東大將軍封親漢王晉元帝大興二年偽稱趙王成帝咸和五年僭號趙天王行皇帝事尋僭即皇帝位在位十五年年六十子𢎞嗣偽位𢎞字大雅在位二年年二十二為勒從子虎所廢尋殺之虎字季龍稱居攝趙天王咸康三年僭稱大趙天王穆帝永和五年僭即皇帝位六年季龍死在位十五年子世立凡三十三日為兄遵所廢遵立一百八十三日為冉閔所殺立石鑒鑒在位一百三日為閔所殺始勒以成帝咸和三年僭立二主四子凡二十三年閔字永曾小字棘奴季龍之養孫也父瞻字𢎞武本姓冉名良魏郡内黄人也其先漢黎陽騎都督累世牙門勒破陳午獲瞻時年十二命季龍子之驍猛多力攻戰無前歴位左積射將軍西華侯閔㓜而果銳季龍撫之如孫永和六年殺石鑒自立僭位二年為慕容雋所滅前燕慕容廆字奕雒瓌昌黎棘城鮮卑人也其先有熊氏之苖裔世居北夷邑於紫蒙之野號曰東胡其後與匈奴並盛控弦之士二十餘萬風俗官號與匈奴畧同秦漢之際為匈奴所敗分保鮮卑山因以為號曽祖莫䕶䟦魏初率其諸部入居遼西從宣帝伐公孫氏有功拜率義王始建國於棘城之北時燕代多冠歩揺冠莫䕶䟦見而好之乃斂髪襲冠諸部因呼之為歩揺及後音訛遂為慕容或云慕二儀之徳繼三光之容遂以慕容為氏祖木延左賢王父渉歸以全栁城之功進拜鮮卑單于遷邑於遼東北於是漸慕諸夏之風矣廆晉武帝太康中為鮮卑都督累轉遼東公持節都督幽州諸軍事車騎將軍平州牧大單于在位四十九年年六十五成帝遣使者䇿贈大將軍開府儀同三司諡曰襄第三子皝嗣位皝字元真帝遣謁者拜征北大將軍平州刺史大單于遼東公咸康三年僭即天王位在位十五年年五十二第二子雋立雋字宣英穆帝永和五年僭即燕王位八年僣即皇帝位在位十一年年四十二子暐嗣偽位暐字景茂在位一十一年為符堅所滅始廆以武帝太康六年稱公至暐四世凡八十五年前秦苻洪字廣世畧陽臨渭氐人也其先蓋有扈之苗裔為西戎酋長始其家池中蒲生長五丈五節如竹形時咸謂之蒲家因以為氏焉父懐歸部落小帥洪仕石季龍累有戰功封西平郡公穆帝永和六年季龍死洪自稱大將軍大單于三秦王改姓苻氏是年洪死年六十六子健嗣位去秦王之號七年僭稱天王大單于八年僭即皇帝位健字建業在位四年年三十九子生嗣偽位生字長生在位二年年二十三為苻堅所殺堅字永固一名文玉洪季子雄之子也以升平元年僭稱大秦天王在位二十七年年四十八孝武太元十年為姚萇所滅堅庶長子丕僭即皇帝位於晉陽丕字永叙在位二年為慕容永所敗堅族孫登以太元十一年僭即皇帝位登字文髙在位九年年五十二為姚興所滅始健以永和七年僭立至登五世凡四十四年後秦姚弋仲南安赤亭羌人也其先有虞氏之苖裔禹封舜少子於西戎世為羌酋其後燒當雄於洮罕之間七世孫填虞漢中元末宼擾西州為楊虚侯馬武所敗徙出塞虞九世孫遷那率種人内附漢朝嘉之假冠軍將軍西羌校尉歸順王處之於南安之赤亭那𤣥孫柯廽為魏鎮西將軍綏戎校尉西羌都督廽生弋仲仕石季龍為征西大將軍封西平郡公晉穆帝永和七年遣使降晉拜六夷大都督大單于封髙陵郡公八年弋仲卒子襄嗣襄字景國升平元年為符堅所殺弟萇降堅萇字景茂堅以為揚武將軍累遷龍驤將軍孝武太元九年自稱大將軍大單于萬年秦王以太元十一年僭即皇帝位在位八年年六十四長子興嗣自稱大將軍眀年僭即皇帝位興字子畧在位二十二年年五十一長子泓嗣以義熙十一年僭即皇帝位泓字元子在位二年年三十為晉所滅始萇以孝武太元九年僭立至泓三世凡三十三年後蜀李特字𤣥休巴西宕渠人其先廪君之苖裔也昔武落鍾離山崩有石穴二所其一赤如丹一黒如漆有人出於赤穴者名曰務相姓巴氏有出於黒穴者凡四姓曰曎氏樊氏栢氏鄭氏五姓俱出皆争為神於是相與以劍刺穴屋能著者以為廪君四姓莫著而務相之劍縣焉又以土為船彫畫之而浮水中曰若其船浮存者以為廪君務相船又獨浮於是遂稱廪君乘其土船將其徒卒當夷水而下至於鹽陽水神女子止廪君曰此魚鹽所有地又廣大與君俱生可止無行廪君曰我當為君求廪地不能止也鹽神夜從廪君宿旦輒去為飛䖝諸神皆從其飛蔽日晝昏廪君欲殺之不可别又不知天地東西如此者十日廪君乃以青縷遺鹽神曰嬰此即宜之與汝俱生弗宜將去汝鹽神受而嬰之廪君立碭石之上望膺有青縷者跪而射之中鹽神鹽神死羣神與俱飛者皆去天乃開朗廪君復乘土船下及夷城夷城石岸曲泉水亦曲廪君望如穴狀歎曰我新從穴中出今又入此奈何岸即為摧廣三丈餘而階陛相乘廪君登之岸上有平石方一丈長五尺廪君休其上投䇿計筭皆著石焉因立城其旁而居之其後種類遂繁秦并天下以為黔中郡薄賦斂之口嵗出錢四十巴人呼賦為賨因為賨人焉特父纂為東羌獵將特晉武帝元康中随流人至蜀其後流人以特為主行鎮北大將軍恵帝大安元年自稱益州牧都督梁益二州諸軍事在位二年為晉益州刺史羅尚所殺特弟流自稱大將軍大都督益州牧流字元通年五十六死特子雄自稱大都督大將軍益州牧永興元年僭稱成都王又僭即帝位雄字仲雋在位三十年年六十一兄蕩之子班嗣偽位班字世文為李越所殺在位一年年四十七遂立雄之子期字世運在位三年年二十五為李夀所廢自縊死夀字武考特弟驤之子在位五年年四十四長子勢嗣偽位勢字子仁在位五年為晉所滅始特以恵帝太安元年起兵至勢六世凡四十六年後凉吕光字世眀畧陽氐人也其先吕文和漢文帝初自沛避難徙焉世為酋豪父婆樓佐命符堅官至太尉光仕符堅為都督五門巴西諸軍事安西將軍西域校尉堅為姚萇所害光於是自稱使持節侍中中外大都督督隴右河西諸軍事大將軍領䕶匈奴中郎將凉州牧酒泉公晉孝武太元十五年僭即三河王位二十一年僭即天王位在位十年年六十嫡子紹嗣偽位為庶長子纂所殺纂字永緒僭即天王位在位三年為吕起所殺立光弟寳之子隆嗣偽位隆字永基為姚興所滅始光以孝武太元十二年定凉州十五年僭立至隆凡十有三載後燕慕容垂字道眀前燕慕容皝之第五子慕容雋時封為吳王慕容暐為符堅所滅垂在堅朝歴位京兆尹堅敗垂引兵至滎陽以晉孝武太元八年自稱大將軍大都督燕王在位十三年年七十一子寳嗣寳字道祐在位三年年四十四子盛嗣盛字道運在位三年年二十九垂少子熈嗣熙字道文在位六年年二十三為寳養子雲所弑雲字子雨祖父髙和句驪之支庶自云髙陽氏之苖裔故以為髙氏焉始垂以孝武太元八年僭立至熙四世凡二十四年雲尋為幸臣離班姚仁所殺西秦乞伏國仁隴西鮮卑人也在昔有如弗斯出連叱盧三部自漢北南出大隂山遇一巨蟲於路其狀若神龜大如陵阜乃殺馬而祭之祝曰若善神也便開路惡神也遂塞不通俄而不見乃有一小兒在焉時又有乞伏部有老父無子者請養為子衆咸許之老父欣然自以有所依憑字之曰紇干紇干者夏言依倚也年十嵗驍勇善射彎弓五百斤四部服其雄武推為統主號之曰乞伏可汗託鐸莫何託鐸者言非神非人之稱也其後有祐鄰者即國仁五世祖也晉武帝泰始初率戸五千遷於夏縁部衆稍盛鮮卑鹿結七萬餘落屯於髙平川與祐鄰迭相攻擊鹿結敗南奔畧陽祐鄰盡并其衆因居髙平川祐鄰死子結權立徙於牽屯結權死子利郍立擊鮮卑吐頼於烏樹山討尉遲渴權於大非川收衆三萬餘落利郍死弟祁埿立祁埿死利郍子述延立討鮮卑莫侯於菀川大破之降其衆二萬餘落因居菀川以叔父軻埿為師傅委以國政斯引烏埿為左輔將軍鎮蔡園川出連髙胡為右輔將軍鎮至便川叱盧郍胡為率義將軍鎮牽屯山述延死子傉大寒立㑹石勒滅劉曜懼而遷於麥田無孤山大寒死子司繁立始遷於度堅山尋為符堅將王統所襲部衆叛降於統司繁歎謂左右曰智不距敵徳不撫衆劒騎未交而本根已敗見衆分散勢亦難全若奔諸部必不我容吾將為呼韓邪之計矣乃詣統降於堅堅恱署為南單于留之長安以司繁叔父吐雷為勇士䕶軍撫其部衆俄而鮮卑勃寒侵斥隴右堅以司繁為使持節都督討西胡諸軍事鎮西將軍以討之勃寒懼而請降司繁遂鎮勇士川甚有威恵司繁卒國仁代鎮孝武太元十年自稱大都督大將軍大單于領秦凉二州牧在位四年弟乾歸嗣乾歸在位二十四年子熾磐嗣熾磐在位十五年子慕末嗣慕末在位四年為赫連定所殺始國仁以孝武太元十年僭位至慕末凡四世四十有六載而滅北燕馮䟦字文起長樂信都人也小字乞直伐其先畢萬之後也萬之子孫有食采馮鄉者因以氏焉永嘉之亂䟦祖父和避地上黨父安雄武有器量慕容永時為將軍永滅䟦東徙和龍家於長谷䟦為慕容雲所署使持節侍中都督中外諸軍事雲為其幸臣所殺䟦乃僭稱天王位於昌黎在位二十二年弟𢎞立六年為後魏所滅始䟦以孝武太元二十年僭立至𢎞凡二世二十八年南凉秃髪烏孤西河鮮卑人也其先與後魏同出八世祖匹孤率其部自塞北遷於河西其地東至麥田牽屯西至濕羅南至澆河北接大漠匹孤卒子夀闐立初夀闐之在孕母胡掖氏因寢而産於被中鮮卑謂被為秃髪因而氏焉夀闐卒孫樹機能立壯果多謀畧晉武帝泰始中殺秦州刺史胡烈於萬斛堆殺凉州刺史蘇愉於金山盡有凉州之地武帝為之旰食後為馬隆所敗部下殺之以降弟務丸立死孫推斤立死子思復鞬立部衆稍盛烏孤即思復鞬之子也安帝隆安元年自稱大都督大將軍大單于西平王在位三年弟利鹿孤立徙居西平利鹿孤在位三年弟傉擅嗣傉擅僭位凉王遷於樂都在位十三年年五十一為乞伏熾磐所滅始烏孤以安帝隆安元年僭立凡三世十有九年南燕慕容徳字𤣥眀後燕慕容垂之弟垂稱燕王以徳為車騎大將軍垂死子寳嗣寳以徳為丞相領冀州牧承制南夏晉安帝隆安四年僭即皇帝位在位五年年七十兄子超嗣超字祖眀在位六年為晉所滅始徳以安帝隆安四年僭立至超二世凡十一年北凉沮渠蒙遜臨松盧水胡人也其先世為匈奴左沮渠遂以官為氏焉蒙遜仕叚業為張掖太守晉安帝隆安五年梁中庸等推為使持節大都督大將軍凉州牧義熙八年僭立在偽位三十三年年六十六子茂䖍立六年為後魏所擒凡二世三十九載夏赫連勃勃字屈子匈奴右賢王去卑之後劉元海之族也曽祖武劉聰世以宗室封樓煩公拜安北將軍監鮮卑諸軍事丁零中郎將雄據肆盧川為代王猗盧所敗遂出塞表祖豹子招集種落復為諸部之雄石季龍遣使就拜平北將軍左賢王丁零單于父衛辰入居塞内符堅以為西單于督攝河西諸虜屯於代来城及堅國亂遂有朔方之地控弦之士三萬八千後魏師伐之辰令其子力侯提拒戰為魏所敗魏人乘勝濟河尅代来執辰殺之勃勃乃奔於叱干部晉安帝義熙三年僭稱天王大單于自以匈奴夏后氏之苖裔也國稱大夏又下書曰朕之皇祖自北遷幽朔姓改姒氏音殊中國故從母氏為劉子而從母之姓非禮也古人氏族無常或以因生為氏或以王父之名朕將以義易之帝王者係天為子是為徽赫實與天連今改姓曰赫連氏庶恊皇天之意永保無疆大慶係天之尊不可令支庶同之其非正統皆以鐵伐為氏