body:
  text: 册府元龜卷五百十七宋王欽若等撰憲官部振舉第二後唐莊宗同光元年十二月庚辰御史中丞李徳休奏當司刑部大理寺本朝法書自朱温僣逆刪改事條或重貨財輕人生命或自徇枉過濫加刑罰今見在三司收貯刑書并是偽廷刪改者兼偽廷先下諸道追取本朝法書焚毁或經兵火所遺皆無舊本節目只定州勑庫有本朝法書具在請勑定州節度使速寫副本進納庶刑法並合本朝式令勑李徳休譽洽朝端任隆臺憲将舉行於舊典請刪定其法書載閱申陳備見公切從之二年三月三十日御史臺奏新除諸道節度觀察防禦經略等使刺史縣令及諸道募府兼諸司帶憲銜兼官合納光臺錢謹具本朝元納及後減落錢數如後兼御史大夫元納三十貫減落外今納一十五貫兼御史中丞元納二十貫減落外今納一十貫文兼侍御史元納八貫三百減落外今納五貫一百五十文兼殿中侍御史元納一十一貫三百減落外今納五貫六百五十文兼監察御史元納一十三貫三百減落外今納六貫六百五十文以前臺司准本朝例及減落外後徴前數分折如前應有諸道節度觀察使刺史經略防禦等使及諸道募府上佐官并諸司班行新授兼官者並合送納前件光臺憲御禮錢今欲准例勒辭謝驅使官申報牒兵部勒告身案除准宣取外准例須候送納光臺禮錢了朱鈔到方可給付轉帖諸道進奏及知後院等准從前事例申報催徴無致有隳舊規從之至周顯徳五年閏七月一日御史臺申臺司見行事件應新除節度防禦團練使科史賓幕州縣官兼帶五院憲御合徴光臺禮錢如是已曽納過准舊例不徴兼御史大夫元徴三十貫今徴六貫文兼御史中丞元徴二十貫今徴四貫文兼侍御史元徴八貫三百今徴一貫六百六十文兼殿中侍御史元徴一十二貫三百今徴二貫二百二十文兼監察御史元徴一十三貫三百今徴二貫六百六十文五月己酉御史臺奏准本朝故事當司六察合行職事條例如後吏察應吏部行内南北兩曹磨勘選人合具駁放判成人具名䘖報分察使及三銓應鏁注官後具前衘後擬報分察使典簡如有踰濫即察使舉追本行令使推勘兵察應兵部司公事一一合報察使戸察應戸部司諸州戸帳貢物出給蠲符具事件合報察使刑察應刑部司法律赦書徳音流貶量移㫁罪重輕合報察使禮察應禮部補轉鑄印諸祠祭科法物合報察使工察應工部司工役等合報察使伏以御史臺六員監察謂之分察使察訪網舉動靜必行但緣曠廢久不施行今欲重行條貫從之明宗天成元年七月侍御史臺奏每月文明殿入閣及百官五日一赴中興殿等事伏准故事毎月百官入閣所司排儀仗金吾勘契入後有待制次對官各舉論本司公事左右起居分記言動以付史館編脩帝錄此本朝經久之制也昨陛下初膺大寳思致治平遂降綸言特申聖㫖百官除常朝外依宰臣每五日一度入内起居所貴得預敷陳俾凝庶績此蓋陛下切於百司各言時政特令五日一面於天顔雖眷睠以丁寧限朝儀之拘束序班而入拜手而迴縱有公事要言亦且倦行須出百司何由舉職兩史無以記言外則因此廢待制次對之官内則無以分延英衆人之别以臣愚見竊有所陳欲乞陛下每月一日十五日兩度出御文明殿排入閣之儀諸司依前轉對奏論今司公事其百官就食謂之廊飡則中外既有區分禁庭亦更嚴宻如陛下切於羣臣有所敷陳即乞因宰臣五日一度延英之際班行内有要奏事者臨門状到便許引入此又於旅進旅退事理不同言路既開别彰聖徳如或以山陵日近朔望不坐即取次日亦合舊規候過陵園還如法制臣叨司邦憲獲典朝儀儻遇事而不言即奉公而何取乞宣付中書門下商量曽獲經久者中書奏議曰比令五日内殿起居慮百司有事論奏中外或為壅隔至於朔望入閣亦是朝廷舊儀李琪自領憲綱毎循故事備官條奏頗叶國章望依所奏勑㫖曰五日起居之意所貴數見羣臣俾陳時事憲司所奏朔望入閣等事既合往例得以允俞其五日一度起居之際班行内有要奏事者便出行奏對仍付所司自後言事者又奏請五日内殿起居之日請令百官次第轉對奏事又從之自是百官五日内殿起居以所言事形於牋奏録在笏記明敭於殿庭而素無文學及不閑理體者其文句鄙陋詞繁理寡敷奏之際人皆竊笑然以次第當言無所辭避而冗散之徒或行路假手􅀈俛供職愁苦無憀時議者以為不便後竟罷之始知李琪所奏深達治體矣八月御史臺奏凡新除官及差使者合於正辭每遇内殿起居日百官不於正衙叙班其差使及新除員其日辭謝不得或恐差使者已定發日除官者准宣催發以一日無班便妨辭謝臣愚叅詳毎内殿起居日百寮先叙班於文明殿庭候辭謝官退則班入内殿兾便於官吏辭謝者從之十月庚戌以吏部侍郎盧文紀為御史中丞文紀初領事於御史府諸道進奏官來賀文紀曰事例如何臺史喬徳威等言朝廷在長安日進奏官見大夫中丞如首吏見長官之禮及偽梁将革命本朝㣲弱諸藩强㨿人主大臣皆姑息邸吏時中丞上事邸吏雖至皆於客次傳語竟不相見自今兵亂便以為常文紀令臺吏諭以舊儀相見據案端簡通名賛拜邸吏輩既出怒不自勝十一月丙子進奏官等相率於閣門求見騰口喧訴状奏曰臣等今月四日中丞上事禮合至臺比期不越前規依舊傳語忽蒙處分通出尋則在取指揮要明審的又蒙問大夫相公上事日如何臣等云大夫曽為宰相進奏官伏事中書事體之間寔為舊史若以别官除授合云傳語又堅傳指揮便合通出臣等出身藩府不㑹朝儀拒命則恐有奏問遵禀則全隳則例伏恐此後到臺叅賀儀則不定者上謂宰臣趙鳯曰進奏官此外何官鳯曰府縣發遞知後之流也帝曰乃吏卒耳安得慢吾法官乃詔曰御史臺是本朝執憲之司乃四海繩違之地凡居中外皆待整齊藩侯尚展於公叅邸吏豈宜於抗禮遽觀論列可驗侮輕但以喪亂滋多綱紀隳紊霜威掃地風憲銷聲今則景運惟新皇圖重正宜加提舉漸止澆訛宣令御史臺凡闕舊例並須行舉稍不禀承當行朝典十二月丙戌御史臺奏常朝辭謝官常朝則南班横行與百官齊拜入閣日敷正門外序班亦伏南横行百官雖不拜候喚伏時辭謝官便展拜儀今伏見每内殿起居日先於文明殿庭序班百官固不設拜只候宰相至便入起居固不傳宣命若有南班辭謝稍似非儀請自今後其日不許辭皆令次日候有常朝即得辭謝若遇急切公事即准舊例令隔門辭謝或於閣門祗候宣放其文武兩班不更於文明殿序立至於中興殿門外立班祗候宰臣到便依次第入起居又准故事常叅官每日趨朝不合無故請假如寔疾病不朝叅間不得私行人事新官未謝不合私人事到宰相宅每月請假不得過三日吏部南曹郎中請以鏁院前五日免朝若遇起居入閣叅假追朝御樓謝賀行香城外班並合到不到書罰三司河南府職事帶正員官如南曹例勑㫖盧文紀自領憲綱頗思振舉備觀條奏皆叶通規李琪以内殿起居不廢辭謝蓋慮留滯乃是權儀盧文紀以正衙序班恐隳故事請候次日亦可允依所請三銓免朝事繫繁省選人既少公務非多宜且依所奏鏁銓前五日免朝將來人數漸多須容㸃檢即許開曹後免朝永以為例付所司庚戌御史臺奏京城坊市士庶工商之家有婢僕自經投井非理物故者近年以來凡是死亡皆是臺司左右巡舉勘驗施行已久仍恐所差人吏及街市胥卒同於民家因事邀頡取索臣詢訪故事當司今有舊京往例凡京城民庶之家死喪委府縣檢舉軍家委軍巡商旅委户部然諸司檢舉後具事由申臺其間或枉濫情故臺司訪聞即行舉勘如是文武兩班官吏之家即是臺司簡舉臣自今已後欲准故事施行者兼左右巡使録到喪𦵏車輿格例比縁官品等差無官秩之家過為僣侈供應者固當行責今則凡是𦵏儀動踰勑格但官中只行簡察在人情各盡孝思徇彼稱家之心許便送終之禮又難折孝心盡決嚴刑遂以供人例行書罰以助本司支費兼縁設此防禁為此權豪之家違禮厚𦵏若貧民薄飲不充無憂僣禮書罰兩京即是臺司州府元無條例者勑㫖今後文武兩班及諸司官吏諸道商旅凡喪亡即准臺司所奏施行其坊市民庶軍士之家凡死喪及婢僕非理物故臺司所奏委府縣軍巡同簡舉仍不得縱其吏卒於物故之家妄有邀頡或恐暑月屍柩難停若待申聞簡舉縱無邀頡亦須經時日今後仰其家喚四鄰簡究無他故遂便𦵏埋具結罪文状報官或後别聞枉濫妄有保證官中訪知勘詰不虛本户鄰保量事科罪如聞諸道州府坊市死喪取分巡院簡舉頗致淹停人多流怨亦仰約京城事例處分所奏喪𦵏車輿格例今後據品秩之外如庶人喪𦵏宜令御史臺差御史一員㸃簡供任行人如有違越據所犯科罪臺司不得書罰擾徴行人文非憲綱事體付所司是月十一日御史臺奏謹具本朝舊例合行公事如右應諸道進奏院准本朝例各合置臺巡驅使官一人凡有公事並合申報臺巡逐日在臺祗候應奉公事應諸道進奏官每四孟月初及五月冬至新除大夫中丞并合臺叅伏自偽朝以來全隳舊例今准勑命條疏請准本朝舊例施行應諸道節度觀察防禦經略團練使及諸州刺史新除付任及郎幕上佐官等得賛及准宣進奉到闕及歸本道並合廊叅正衛謝見辭如遇大夫中丞入臺並合臺叅兼凡有公事及到發日並合申報如遇追勘進奏官典勘責科罰又伏以偽朝已來全隳往制既未條理轉失繩規伏乞特降明勑指揮免令隳紊奉勑宜依二年四月御史臺奏今月三日廊下設食百官坐定兩省方來自五品已下輒起勑每赴廊飡如對御宴若行私禮是失朝儀宜各罸半月俸九月御史臺奏每遇入閣日只一員侍御史在龍墀邊祗候弹奏公事或有兩班叅雜失儀㸃簡不及難於舉奏者伏以入閣之儀務在整肅或少虧於恪敬則有慢於典經今欲依常朝例差殿中御史二員押鐘皷樓位仍各綴供奉班出入所冀共為糾察免失規程敢将舉職之程粗益朝天之敬從之四年三月二十日御史臺奏臺中舊有格杖近年不行每有決遣公事皆於河南雒陽兩縣追取人杖今縁臺中常有囚徒勘責若一一於兩縣追取又縁地里遙逺及後差人往來交妨指揮公事者今臺司請置常行人杖免有妨滯公事奉勑宜依長興三年三月勑近日累據御史臺奏陳状訴屈人據状内皆是勘責多時却曉示陳状人送本道依次第論對及州府追到支證本人又不到彼處恐紊規繩須行條理宜令御史臺今後諸色人論訟稱已經州府㫁遣後抑屈更不在牒本道勘逐便可據状施行若未經州府論訴驀越陳状即須留本人據事理詰勘如實未經本處訴論便可具事由勒本道進奏官差人齎牒監送本處就關連人勘㫁後申奏仍不得虛有禁繫四年五月二十四日御史中丞龍敏等奏陳事如後一伏以臺司除御史中丞隨行印及左右巡事監察使并出使印等外其御史臺印一面先准令式即是主簿監臨近年已來縁無主簿遂至内弹御史權時主持常隨本官出入不定伏縁臺中公事不同諸司動繁重難常憂遲滯當奏申堂之際及牒州牒府之時事無輕重並使此印今准令式逐日有御史一員臺直承受制勑公文其御史臺印今欲勒留臺中不令在外選差令史一人帖司一人同知此印凡有諸色文按印發之時指揮諸司各置印歴一道具其事節件數書在歴中即於直官面前㸃簡印發其印至夜封閉候交直轉付下次直官共議執行保無差謬者伏以御史臺事總朝綱職司天憲所管人吏色役最多上至朝堂次及班列或在京勾簡公事或外地催勘稽違監守狴牢行遣按牘或隨從出使或祠祭監臨凡有係於臺司皆須籍其人吏俾無闕事以賛國容近年以來人數極少及月限者授官出外為官滿者追呼未來人力既到不勉公事便至停滯切以往嵗臺中亦闕人吏曽於諸州抽取今欲於諸州使院内量事差取十人據臺中諸司闕人臨時量才填補者一其臺中令史今欲條流凡出官考滿却來歸司者便具到日申堂請以到日繫其選限如有經年不到追領不來即具申堂便乞除落名姓奉勑宜依凡京百司人吏考滿歸司繫其選限亦宜令准此末帝清泰元年御史中丞張鵬奏文武常叅官入閣日廊下設食每宣放伏拜後就食相承以為謝食拜臣以每日常朝宣不坐後拜退豈謝食之謂乎如臣所見自今宣放仗拜後具就次候将設食别降使於敷政門外宣賜酒食羣臣謝恩後食從之是年鵬又自舉内殿起居門外序班與御史晩到失儀詔各罰一月俸料故事御史府不治尚書左右丞舉奏今鵬自彈則尚書左右可知矣二年十一月知彈御史奏今月二日班入遇雨移班廊下知班臺吏董瑾引僕射在中丞三院御史之下僕射詰問董瑾稱准常例臺司刺都省請簡討舊儀都省稱國朝以端揆之重師長百僚雖在别司皆為統屬且左右僕射常朝不在中丞之下赴宴廊飡並在中丞之上况中丞有公叅之禮避路之儀詳其道理自有等降臺司又堅稱李琪盧質任僕射之日亦如此又引通事舍人在一品班上尋申中書門下奉宰臣判令廊下使重定班位廊下使言今後遇雨移班廊下欲請依殿前塼位次第二品在三品前一品後如中丞大夫俱置即大夫在中丞前其西班准此謹聞勅宜令置一品二品三品塼位晉高祖天福二年三月御史臺奏唐朝令式南衙常叅官文武百僚每日朝退於廊下賜食謂之常食自唐末亂離常食漸廢仍於入閣起居日賜食每入閣禮畢閣門宣放仗羣官俱拜謂之謝食至清泰年中入閣禮畢更差中使至正衙門口宣賜食百官立班重謝交失本根今後入閣賜食望不差中使口宣從之四月御史臺奏文武百官每月朔望入閣禮畢賜廊下食在京時祇於朝堂幕次兩廊下今在行朝於正衙門外權為幕次房廊隘狭伏恐五月一日朝㑹禮畢准例賜食於幕次難為排比伏見唐明宗時兩省官於文明殿前廊下賜食今未審入閣日權於正衙門兩廊下排比賜食為復别有處分勅宜依明宗朝舊規廊下賜食四年三月御史臺奏按六典侍御史掌糾舉百僚推鞠獄訟居上者判臺知公廨雜事次知西推贓贖三司受事次知東推理匭伏乞今後准故事施行勅宜依舊制尋以尚書駕部員外郎兼侍御史知雜事劉皥為河南少尹自是無尚書郎知雜者五月御史臺奏尚書郎知雜之時赴臺禮上軍巡邸吏咸集公叅府司并兩縣皆呈印伏令年深御史判雜上事欲准前例從之五年二月乙巳御史中丞竇貞固奏國忌日宰臣跪爐焚香僧人表讃孝思述祖先違世之事而文武百辟儼然列坐竊惟禮非天降酌在人情今古通規君親至敬對像佛行香之日實帝王不樂之辰豈有聴烈祖之勲舊加冠光祿賛冠諸王則郎中加冠中尉賛冠合同於諸皇則重依於諸王則輕又春秋之義不以父命辭王父命禮父在斯為子君在斯為臣皇太子居臣子之節無專用之道南郡雖處蕃國非支庶之例宜禀天朝之命㣲申冠阼之禮晉武帝詔稱漢魏遣使冠諸王非古正典此蓋謂庶子對王合依公冠自主之義至於國之長孫遣使惟允宜使太常持節加冠太鴻臚為賛醮酒之儀亦歸二卿祝醮之辭附准經記别更撰立不依蕃國常體國官陪位拜賀自依舊章其日内外二品清官以上詣止車門集賀并詣東宫南門通牋别日上禮宫臣亦詣門稱慶如上臺之儀既冠之後尅日謁廟以𢎞尊祖之義此既大典宜通闗八座承郎并下二學詳義僕射王奐等十四人議并同并撰立賛冠醮酒二辭詔可伏曼容為太子歩兵校尉永明初王金輅建碧旂象大輅建赤旂曼容議以為齊徳尚青五輅牛及五色幡旗並宜以青為先次軍容是月殿中侍御史賈玭殿中侍御史劉載状由自漢朝初每遇内殿起居臺司定左右巡使先入起居後於殿廷左右立定百官始入起居有官失儀具彈奏者自今後欲依入閣彈奏儀折腰奏候宣徽使言所奏知通事舍人喝拜兩拜訖使喝好去便退如兩巡使自有失儀亦候班退左巡使失儀右巡使彈奏右巡使失儀左巡使彈奏世宗顯徳五年閏七月一日御史臺奏文武百官每日赴朝叅不到如是常朝不到於本官料錢上每貫罰二十二文如是内殿起居入閣行香出城衆集及非時慶賀御樓御殿横行叅假不到並是倍罰臺司先榜幕次曉告本官限三日外即牒三司尅折如有故曽陳牒即将領由呈驗又十六愆條准元和二年十二月内御史臺奏文武常叅官准乾元元年三月勅如有朝堂相吊慰跪拜待漏行立失序談笑喧嘩入衙門執笏不端行立遲慢至班列行立不正起拜失儀拜跪不俯伏舒脚穿班伏出閣門不即就班無故離位廊下食行坐失儀拜起振衣退朝不從正衙門出非公事入中書每犯者奪一月俸今商量比舊條各減一半如所由指揮尚或抵拒即准舊例録奏貶降從之同日御史臺由臺司見管四推臺一推臺二推殿一推殿二推或准勅命宣頭堂帖指揮送到公事并諸道州府論訴准例三人已上三院御史從上輪次配推兼具差定推官名御申奏申中書門下如是三人已上即本彈推勘若四推皆有公事外更有刑獄即差次官推勘兼便逐日輪差官吏臺直㸃檢刑獄同日御史臺申臺司或准勑命宣頭委臺司差官出外推勘刑獄臺司舊例於監察御史内從下差定如是時勑定名不拘此例册府元龜卷五百十七
