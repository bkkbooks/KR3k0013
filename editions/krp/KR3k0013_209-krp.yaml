body:
  text: 册府元龜卷二百九宋王欽若等撰閏位部欽恤念功寛恕宥過悔過欽恤眀慎之文見之於羲易欽恤之戒著之於虞書故君子之所以盡心者盖刑之謂矣昔劉氏閏位宅彼江介惟梁暨陳維守其國乃有勵精政治軫念黎庻下寛大之詔開疏闊之網革去苛法逮用中典雖未臻夫至化亦可見其休徳者焉宋髙祖永初二年六月壬寅詔曰杖罰雖有舊科然職務殷碎推坐相尋若皆有其實則體所不堪文行而已又非設罰之意可籌量粗為中否之格十月丁酉詔曰兵刑峻重務在得宜役身死叛輙考傍親流遷彌廣未見其極遂令冠帶之倫淪䧟非所宜革以𢎞㤗去其宻科自今犯罪充軍合舉户從役者便付營押領其科户絶及讁止一身者一不得復侵濫服親以相連染少帝即位初詔曰平理獄訟政道所先朕哀荒在疚未堪親覽司空尚書令可率衆官月二决獄孝武帝大眀三年八月甲子詔曰昔姫道方凝刑罰斯厝漢徳初明犴圄用簡良繇上一其道下淳其性今民澆俗薄誠淺偽深重以寡徳弗能心化故知方者尠趣辟寔繁向因廵覽見二尚方徒𨽻纓金屨較既有矜復加以國慶民和獨隔凱澤益以慙焉可詳所原宥九月己巳詔曰夫五辟三刺自古所難巧法深文在季彌甚故㳂情察訟魯師致㨗市獄勿擾漢史飛聲廷尉逺邇疑讞平决攸歸而一蹈幽圄動逾時嵗民嬰其困吏容其私自今囚至辭具並即以聞朕當悉詳斷庻無㽞獄若繁文滯劾證逮遐廣必須親察以盡情状自後依舊聽訟五年十一月詔曰王畿内奉京師外表衆夏民殷務廣宜思簡惠可遣尚書就加詳簡並與縣宰平治庶獄其有凝滯具以状聞南齊武帝永眀二年四月詔揚南兖二州統内諸獄荆豫江三州府見囚江州潯陽新蔡兩郡繫獄並部送還臺須俟克日斷枉直縁江逺郡及諸州委刺史詳察訊鞫眀帝建武二年四月己亥朔詔三百里内獄訟同集京師克日聽覽此外委州訊察三署徒𨽻原遣有差梁髙祖天監二年正月甲寅朔詔曰三訊五聽著自聖典哀矜折獄義重前誥盖所以眀慎用刑深戒疑枉成功致治罔不繇茲自昔藩部嘗躬訊録求理得情洪細必盡末運弛網斯政又闕牢犴沉壅申析靡從朕屬當期運君臨億兆雖復齋居宣室㽞心聽斷而九牧遐荒無因臨覽深懼懐寃就鞠匪唯一方可申勑諸司月一臨訊博詢擇善務在確實五年四月甲寅詔曰朕昧旦齋居惟刑之恤三辟五聽寝興載懐故陳肺石於都街増官司於詔獄殷勤親覽小大以情而明慎未洽囹圄尚壅永言納隍在予興愧凡犴獄之所可遣法官近侍遞録囚徒如有枉滯以時奏聞十六年正月詔班下四方諸州郡縣時理獄訟勿使寃滯並若親覽陳文帝天嘉元年十二月詔曰古者春夏二氣不决重罪盖以陽和布澤天秩是𢎞寛網省刑義符含育前王所以則天象地懸法垂訓者也朕屬當澆季思求民瘼哀矜惻隠念甚納隍欲遵舊軌用長風化自今孟春訖于夏首罪人伏辟事已疑者宜且申停後主禎眀二年十一月丁夘詔曰夫議獄緩刑皇王之所垂範勝殘去殺仁人之所同心自畵冠既息刻吏斯起法令滋彰手足無措朕君臨區宇屬當澆末輕重之典在政未康小大之情興言多媿眷茲狴犴有軫哀矜可克日於大政殿訊獄念功非賢罔治實著於昌言惟帝念功式敷於光宅君臣之際今古共然自皇階未夷世道多梗合離之期有數雄俊之才遂興雖䜟緯之符未參於命厯然經綸之業咸闡於茂勲觀其感召風雲招延心膂爪牙之用茍有補於當時帶礪之盟乃仰同於前典至於顧待終始感慨存亡必舊人而是圗雖小忿而無廢豈唯忠諒之節類王臣而匪躬抑亦沮勸之方俾懦夫而増氣蜀向朗字巨達領丞相諸葛亮長史後免官歸成都數年為光禄勲亮卒後徙左将軍後主追論舊功封顯明亭侯位特進吳周瑜字公瑾兄子峻亦以瑜元功為偏将軍領吏士千人峻卒全琮表峻子護為将大帝曰昔走曹操拓有荆州皆是公瑾常不忘之初聞峻亡仍欲用護聞護性行危險用之適為作禍故便止之孤念公瑾豈有已乎周裔瑜之子封都郷侯後以罪徙廬陵郡赤烏二年諸葛瑾歩隲連名上疏曰故将軍周瑜子裔昔蒙粉餙受封為将不能養之以福思立功效以至縱情欲招速罪辟臣竊以瑜昔見寵任入作心膂出為𤓰牙御命出征身當矢石盡節用命視死如歸故能摧曹操於烏林走曹仁於郢都揚國威徳華夏是震蠢爾蠻荆莫不賓服雖周之方叔漢之信布誠無以尚也夫折衝扞難之臣自古帝王莫不貴重故漢髙帝封爵之誓曰使黄河如帶太山如礪國以永存爰及苖裔申以丹書重以盟詛藏于宗廟傳於無窮欲使功臣之後世世相踵非徒子孫乃関苖裔報徳眀功勤勤懇懇如此之念欲勸戒後人用命之臣死而無悔也况於瑜身沒而未乆而其子降為匹夫益可悼傷竊惟陛下欽眀稽古隆於興繼為裔歸訴乞匄餘罪還兵復爵使失旦之鷄復得一鳴抱罪之臣展其後效大帝答曰腹心舊勲與孤協事公瑾有之誠所不忘昔裔年少初無功勞横受精兵爵以侯将盖念公瑾以及於裔也而裔恃此酗淫自恣前後告諭曽無悛改孤於公瑾義猶二君樂裔成就豈有已哉廹裔非惡未宜便還且欲苦之使自知之今二君勤勤援引漢髙河山之誓孤用恧然雖徳非其儔猶欲庶幾事亦如爾故未順㫖以公瑾之子而二君在中間茍使得改亦何患乎瑾隲表比上朱然及全琮亦俱陳乞大帝乃許之潘璋為右将軍性奢泰數不奉法監司舉奏大帝惜其功而輙原不問嘉禾三年卒子平以無行徙㑹稽璋妻居建業賜田宅復客五十家顧譚代祖父雍平尚書事後有司奏譚誣罔大不敬罪應大辟大帝以雍故不致法皆徙之宋檀韶初以佐命功為江州刺史嗜酒貪横所蒞無績髙祖嘉其合門從義弟道濟又有大功既免官故特見寵授加邑至千五百户傅亮少帝景平二年率行臺至江陵奉迎文帝後帝将誅亮至廣莫門帝遣中書舎人以詔書示亮並謂曰以公江陵之誠當使諸子無恙謝靈運為臨川内史在郡逰放司徒遣使隨州録事鄭望生收之靈運執望生興兵叛逸廷尉論正斬刑文帝愛其才欲免官而已彭城王義康堅執謂不宜恕乃詔曰靈運罪釁累仍誠合盡法但謝𤣥勲參微管宜宥及後嗣可降死一等徙付廣州張茂度為益州刺史時文帝討荆州刺史謝晦詔益州遣軍襲江陵晦已平而軍始至白帝茂度與晦素善議者疑其出軍遲㽞時茂度弟劭為湘州刺史起兵應大駕帝以邵誠節故不加罪被代還京師累遷太常以脚疾出為義興太守從容謂曰勿以西蜀介懐對曰臣不遭陛下之眀墓木拱矣劉康祖襲父䖍之封轉貟外散騎常侍以浮蕩蒲酒為事前後屢被劾文帝以勲臣子每原貸之王華為護軍侍中卒年四十三追贈散騎常侍衛将軍元嘉九年文帝思誅徐羡之功追封新建縣侯食邑千户謚曰宜侯王曇首為侍中元嘉七年卒九年文帝以豫誅徐羡之等謀追封豫寧縣侯邑千户謚曰文侯南齊王敬則為南兖州刺史進號安北將軍魏人侵淮泗敬則恐委鎮還都百姓皆驚散奔走太祖以其功臣不問以為都官尚書撫軍又進號征東将軍宋廣州刺史王翌之子妾路氏酷暴殺婢翌之子法郎告敬則敬則付山隂獄殺之路氏家証為有司所奏山隂令劉岱坐棄市刑敬則入朝太祖謂敬則曰人命至重是誰下意殺之何不啓聞敬則曰是臣愚意臣知何物科法見背後有節便言應得殺人劉岱亦引罪太祖乃赦之敬則免官以公領郡梁曹景宗為平西将軍郢州刺史魏軍攻司州圍刺史蔡道恭城中負版而汲景宗望門不出但揮軍逰獵而已及司州城䧟為御史中丞任昉所奏髙祖以功寝而不治徴為護軍将軍既至復拜散騎常侍右衛将軍北齊薛循義髙祖時為齊州刺史以黷貨除名追其前守晉州功復其官爵慕容紹宗為開府累有戰功卒贈太尉尚書令後其長子士肅為散騎常侍尋以謀反伏誅文襄以紹宗之故罪止肅身髙慎為豫州刺史遂據武牢降西魏慎先入關周文帝率衆東出髙祖破之於邙山慎妻子将西度於路盡擒之髙祖以其勲家啟慎一房配沒而已厙狄干從神武起兵破四胡於韓陵封廣平縣公尋進郡公河隂之役諸将大㨗唯干兵退神武以其舊功竟不責黜尋轉太子太傅晉華温琪仕梁為晉州節度使温琪在任違法籍民家財入已其家訟于朝制使劾之伏罪末帝以先朝草昧之臣不忍加法左拾遺李愚堅案其罪帝詔曰朕若不與鞠䆒謂予不念赤子若遂行與憲謂予不念功臣為子君者不亦難乎其華温琪所受贓宜官給代還所訟之家寛恕史臣稱漢祖寛眀而仁恕又聖人之言曰寛則得衆是知有國之君受天之命何嘗不收覽羣心開創王業而况閏位之主書軌不同勍敵互相争伐豪傑得以願望儻非體巨浸之納汚同山藪之藏疾則何以立彼宗祏傳之子孫故有奔亡隣國待妻子以如初交關外域宥昆弟而勿坐至於念世禄重時名慰覉孤之心安反側之意屈彼彛憲從於輕典或不奪其爵土或復實於官裳本乎原情繇之得衆雖刑故無小或失為邦之訓而御下以寛亦見君人之度矣蜀先主時黄權為鎮北将軍督江北軍以防魏師先主自江南及吳将軍陸議乘流斷圍南軍敗績先主引退而道隔絶權不得還故率将所領降魏有司執法白收權妻子先主曰孤負黄權權不負孤待之如初吳大帝嘉禾六年丞相顧雍奏在官奔喪自從大辟其後吳令孟宗喪母奔赴已而自拘於武昌以聽刑陸遜陳其素行因為之請帝乃减宗一等後不得以為比因此遂絶宋少帝時王𤣥謨為謝晦荆州南蠻行參軍武昌太守晦敗以非大帥見原徐湛之為丹陽尹范煜等謀逆湛之始與之同後發其事所陳多不盡為煜等欵辭所連乃詣廷尉歸罪帝慰遣令還郡湛之上表曰賊臣范煜孔熈先等連結謀逆法静尼宣分往還與大将軍臣義康共相唇齒備於鞫對伏尋仲承祖始達熈先等意便極言姦状而臣兒女近情不識大體上聞之初不務指斥紙翰所載尤復漫略者實以㓙計既表逆事歸露又仰縁聖慈不欲窮盡故言勢依違未敢縷陳情㫖無隠已昭天監及羣㓙收擒各有所列煜等口辭多見誣謗承祖醜言紛紜特甚乃云臣與義康宿有宻契在省之言期以為定潜通奸意報示天文末云熈先懸指必同以誑於煜或以智勇見稱或以愚懦為目既美其信懐可覆復駭其動止必啟凡諸詭妄還自違伐多舉事端不䆒原統齎傳之信無有主名所徴之人又已死沒首尼乖舛自為矛盾即臣誘引之辭以為始謀之證銜臣糾告並見怨咎縱肆狂言必見禍䧟伏自探省亦復有繇昔義康南出之始𠡠臣入相伴慰晨夕覲對經踰旬日逆圗成謀雖無顯然懟容異意頗形言㫖遺臣利刄期以際㑹臣苦相諌譬深加距塞以為怨憤所至不足為慮便以關啓懼成虚妄思量反覆實經愚心非為納受曲相蔽匿又令申情范煜釋中間之憾致懐蕭思話恨婚意未申謂此僥倖亦不宣達陛下敦惜天倫彰於四海藩禁優簡親理咸通又昔蒙眷顧不容自絶音翰信命時相往來或言少意多㫖深文淺辭色之間往往難測臣每懼異聞皆略而不答惟心無邪悖故不稍以自嫌縷縷丹誠實具如此啟至於法静所傳及熈先等謀知實不早見闗之日便即以聞雖晨光幽燭曲昭窮欵裁以正義無所逃刑束骸北闕請罪司㓂乾施含宥未加治考中㫖頻降制使還往仰荷恩私哀惶失守臣殃積罪深丁罹酷罰乆應屏棄永謝人理况姦謀所染忠孝頓闕智防愚淺闇於禍萌士類未明其心羣庶謂之同惡朝野側目衆議沸騰專信讐隙之辭不復稍相申體臣雖駑下情非木石豈不知醜㸃難嬰伏劍為易而靦然視息忍此餘生實非茍希微命假延漏刻誠以負戾灰滅貽惡方來貪及視息少自披訴冀幽誠丹欵儻或昭然雖復身膏草木九泉無恨顯居官次垢穢朝班厚顔何地可以自處乞蒙隳放伏待鈇鑕優詔不許孔靈符為㑹稽太守加豫章王撫軍長史靈符家本豐富産業甚廣又於永興立墅周逥三十三里水陸地二百六十五頃合帶二山又有果園九處為有司所紏詔原之王僧逹為太子舎人坐属疾而於楊烈橋觀鬭鴨為有司所紏原不問謝靈運為侍中自以名軰應參時政被徴召便以此自許既至太祖唯接以文義而王曇首等名位素不之踰並見任遇靈運意不平多稱疾不朝直出郭遊行經旬不歸既無表聞又不請急帝不欲傷大臣諷㫖令自解靈運乃上表陳疾賜假東歸孝武帝時孔覬為御史中丞鞭令史為有司所紏原不問南齊太祖時卞彬初仕宋為員外郎齊臺初建彬曰誰謂宋逺跂予望之太祖聞之不加罪也王𤣥邈仕宋為青州刺史太祖鎮淮隂𤣥邈啟宋明帝稱太祖有異謀太祖不恨也昇眀中太祖引為驃騎司馬𤣥邈甚懼太祖待之如初謝朏為宋侍中太祖受禪日朏當解璽朏陽不知曰有何公事傳詔曰解璽授齊王朏曰齊自應有侍中乃枕臥傳詔懼乃使稱疾朏曰我無疾何所道遂朝服出東掖門乃得車還宅是日遂以王儉為侍中解璽既而武帝請誅朏太祖曰殺之則成其名正應容之度外武帝時張敬兒坐遣使與蠻中交關伏誅弟恭兒官至員外郎在襄陽聞敬兒敗将數十騎走入蠻中收捕不得後首出帝原其罪梁髙祖舉義兵至京師州牧郡守皆望風降欵吳興太守袁昻獨拒境不受命及建康城平昻束身詣闕髙祖宥之不問也天監二年以為後軍臨川王參軍事昻奉啓謝曰恩降絶望之辰慶集寒心之日熖灰非喻荑枯未擬摳衣聚足顛懼不勝臣遍歴三墳備詳六典廵較賞罰之科調檢生死之律莫不嚴五辟於明君之朝峻三章於聖明之世是以塗山始㑹致防風之誅酆邑方構有崇侯之伐未有緩憲於斮戮之人奢刑於耐罪之族出萬死入一生如臣者也推恩反罪在臣實大披心瀝血敢乞言之臣東國賤人學行何取既殊鳴鳯直木故無結綬弹冠徒藉羽儀易農就仕往年濫職守秩東隅仰属龔行風馳電掩當其時也負鼎國者日至執玉帛者相望獨生在愚臣頓昏大義殉鴻毛之輕忘同徳之重但三吳險薄五湖交通屢起田儋之變每懼殷通之禍空慕君魚保境遂失師㳙抱器後至者斬臣甘斯戮明刑殉衆誰曰不然幸蒙約法之𢎞承解網羅之宥猶當降等薪粲遂乃頓釋鉗赭歛骨吹䰟還編黔庶濯庇蕩穢入楚逰陳夭波既洗雲油遽沐古人有言非死之難處死之難臣之所荷曠古不書臣之死所未知何地髙祖答曰朕遺卿卿無自外江蒨初為齊建康内史視事朞月義師下次江州遣寧朔将軍劉諓之為郡蒨帥吏民據郡拒之及建康城平蒨坐禁錮俄被原起為後軍臨川王外兵參軍劉季連為益州刺史舉兵叛後降既至詣闕謝髙祖引見之季連自東掖門入數歩一稽顙以至髙祖前笑謂曰卿欲慕劉備而曽不及公孫述豈無卧龍之臣乎季連復稽顙謝赦為庶人陳伯之初叛入魏後於尋陽擁衆八千復歸既至以為使持節都督西豫州刺史永新縣侯邑千戸未之任復以為通直散騎常侍驍騎将軍謝覽為侍中頗樂酒因讌席與散騎常侍蕭琛相詆毁為有司所奏髙祖以覽年少直出為中權長史張欣㤗為武陵内史坐贓私殺人被紏見原還復為直閣歩兵校尉領羽林監元帝時劉孝勝初為安西武陵王紀長史蜀都太守髙祖太清中侯景䧟京師紀僣號於蜀以孝勝為尚書僕射承聖中隨紀出峽口兵敗被執下獄帝尋宥之起為司徒右長史陳髙祖初侯瑱為江州刺史鎮豫章討余孝頃㽞妻子於豫章令從弟􅔿知後事􅔿與其部下侯方兒不恊方兒怒率所部攻􅔿虜掠瑱軍妓妾金玉歸於髙祖瑱既失根本兵衆皆潰徑歸豫章人拒之乃趍湓城投其将焦僧度勸瑱以髙祖有大量必能容已乃詣闕請罪髙祖復其爵位歐陽頠隨髙祖討侯景有功梁兀帝以為忠武将軍衡州刺史進封始興縣侯時蕭勃在廣州兵彊位重元帝深患之遣王琳代刺史琳已至小桂領勃遣其将孫瑒監州盡率部下至始興避琳兵鋒頠别據一城不往謁勃閉門髙壘亦不拒戰勃怒遣兵襲頠盡收其貨財馬仗尋赦之還復其所復與結盟荆州䧟委質於勃及勃渡嶺出南康以頠為前軍都督頓豫章之苦竹灘周文育擊破之擒送于髙祖釋之深加接待徐陵初自北齊還太尉王僧辯接待其禮甚厚以陵為尚書吏部郎掌詔誥其年髙祖率兵誅僧辯仍進討韋載時任約徐嗣徽承虚襲石頭陵感僧辯舊恩乃往赴約及約等平髙祖釋陵尋以為貞威将軍尚書左丞文帝時華皎之叛也同逆皆誅之唯章昭裕昭逹之弟劉廣業廣徳之弟曹宣髙祖舊臣任蠻奴嘗有宻啟於朝廷由是並獲宥王琳據土流周文昭以州從之及髙祖踐祚琳遣其将曹慶等攻周廸仍使周文昭将兵犄角之進為侯安都所敗擒以送都文帝釋之授戎威将軍定州刺史帶西陽武昌二郡太守謝嘏在梁為建安太守侯景之亂嘏之廣州依蕭勃承聖中元帝徴為五兵尚書辭以道阻轉授智武将軍蕭勃鎮南長史南海太守勃敗還至臨川為周廸所㽞乆之又度嶺之晉安依陳寳應世祖前後頻召之嘏﨑嶇㓂虜不能自㧞及寳應平嘏方詣闕為御史中丞江徳操所舉劾文帝不加罪責以為給事黄門侍郎張種為都官尚書賜無錫嘉興縣秩嘗於無錫見重囚在獄天寒呼出曝日遂失之大笑而不深責宣帝初殷不佞為東官通事舎人廢帝嗣立帝為太傳録尚書輔政甚為朝望所歸不佞素以名節自立乆受委東宫乃與僕射到仲舉中書舎人劉師知尚書左丞王暹等謀矯詔出髙宗衆人猶豫未敢先發不佞乃馳詣相府面宣勑令相王還第及事發仲舉等皆伏誅髙宗雅重不佞特赦之免其官而已北齊髙祖為東魏丞相相府法曹辛子炎諮事云須取署子炎讀署為樹髙祖大怒曰小人都不知避人家諱髙祖父名樹杖之於前行臺郎中杜弼進曰禮二名不偏諱孔子曰言徴不言在言在不言徴子炎之罪理或可恕髙祖罵之曰眼㸔人嗔乃復牽經引禮叱令出去弼行十歩呼還子炎亦蒙釋宥王則為荆襄六州都督渭曲之役則為西師圍逼遂棄城奔梁梁放還髙祖恕而不責爾朱文略其妹魏孝荘皇后髙祖納之文略以兄文羅卒無後襲梁王以兄文暢事當從坐髙祖特寛貸文襄帝時司馬世雲太尉子如之兄子為潁州刺史侯景反世雲舉州從之時母弟在鄴便傾心附景無復顧望諸将圍景於潁川世雲臨城遥對諸将言甚不遜帝猶以子如恩舊免其諸弟死罪徙於北邊梁太祖開平二年五月王師敗於潞州壬辰軍前行營都将康懐英孫海金以下主将四十三人於左銀臺門進状待罪帝以去年發軍之日不利有違兵法並釋放兼各賜分物酒食勞問乾化元年八月戊寅幸興安鞠場大教閲帝自指麾無不踊抃坐作進退聲振宫掖立神武統軍丁審衢對御以紅帛囊劍擬乘輿物帝曰宿将也恕之以劉重覇代其任二年命供奉官朱嶠於河南府宣取先收禁定州進奉官崔騰並傔從一十四人並釋放仍命押領漢送至其鄉騰唐户部侍郎潔之子也廣明喪亂客于北諸侯為定州節度使王處存所辟去載領貢獻至闕未幾其師稱兵遂縶之至是帝念賓介之來又已出境特命縱而歸焉宥過夫閏以定位割據興邦舎小過舉賢才是其權也雖讐若射鈎惡如盗馬叛國亡命犯禁抵刑猶然宥之况其小者哉所以感彼衆志得其衆力保全宗祀聲振隣敵能用權也與夫吹毛刺骨棄瑜錄瑕者不侔矣吳景帝初嗣位詔曰丹陽太守李衡以徃事之嫌自拘有司夫射鉤斬袪在君為君遣衡還郡勿令自疑衡為丹陽太守時景帝在郡治衡數以法䋲之衡妻習氏每諫衡衡不從會帝立衡憂懼謂妻曰不用卿言以至如此遂欲奔魏妻曰不可君本庶人耳先帝相㧞過重既數作無禮而復逆自積嫌逃叛求活以此北歸何面見中國人乎衡曰計何所出妻曰琅邪王素好慕名方欲自顯于天下終不以私嫌殺君明矣可自囚詣獄表列前失顯求受罪如此乃當逆見優饒非但直活而已衡從之果得無患又加威逺將軍授以棨㦸宋高祖初表毛修之為龍驤將軍及劉毅鎮江陵以修之為軍司馬輔國将軍修之雖為毅将佐而深自結于髙祖髙祖討毅先遣王鎮惡襲取江陵修之與諮議參軍任集之等並為毅力戰髙祖宥之文帝時垣護之為江夏王義恭征北行參軍北髙平太守以載禁物繫尚方乆之䝉宥明帝初在籓以戴明寳為典籖甚為所任及事平坐參掌戎務多納貨賄削所封爵繫尚方尋被宥復為安陸太守太始初王敬則為直閣将軍坐捉刀入殿啟事繫尚方十餘日乃復直閣劉係宗為竟陵王誕子景粹侍書誕舉兵廣陵城内皆死勑沈慶之赦係宗以為東宫侍書南齊武帝時虞悰為散騎常侍太子右卒永明八年大水百官戎服救太廟悰朱衣乘車鹵簿於宣揚門外行馬内驅打人為有司所奏特見原栁世隆為湘州刺史在州立邸治為中丞庾杲之所奏詔原不問東昏侯永元元年陳顯逹為侍中太尉北伐敗衂御史中丞范岫奏免顯逹官朝議優詔答曰昔衛霍出塞往往無功馮鄧入關有時虧喪况公規謀肅舉期寄兼深見可知難無損威略方振逺圗廓清朔土雖執憲有常非所得議顯逹表解職不許降號又不許以顯逹為都督江州軍事江州刺史鎮湓城持節本官如故梁髙祖天監三年丘遲為永嘉太守在郡不稱職為有司所紏髙祖愛其才寢其奏蕭頴逹為太子左衛率啓乞魚軍稅御史中丞任昉奏請以見事免頴達所居官以俟還第髙祖詔原之陳髙祖初受禪梁國子博士領歩兵校尉沈文阿輙棄官還武康髙祖大怒發使往誅之時文阿宗人沈恪為郡請使者寛其死即面縳鎻致於髙祖髙祖視而笑曰腐儒復何為者遂赦之永定元年十一月西討都督周文育侯安都於郢州敗績囚于王琳二年二月安都等於王琳所逃歸自劾廷尉即日引見並宥之戊寅詔復文育等本官二年二月南豫州刺史沈㤗奔於齊三月甲午詔曰罰不及嗣自古通典罪疑惟輕布在方䇿沈㤗反覆無行遐邇所知昔有微功仍荷朝寄割符名郡推轂累藩漢口班師還居方嶽良田有踰於四百食客不止於三千富貴顯榮正當如此鬼害其盈天奪其魄無故猖狂自投獯醜雖復知人則哲惟帝其難光武有蔽於龎萌魏武不知於于禁但今朝廷無我負人其部曲妻兒各令復業所在及軍人若有恐脅侵掠者皆以刼論若有男女口為人所藏並許詣臺申訴若樂隨臨川王及節将立功者悉皆聽許文帝天嘉元年王琳反奉蕭荘為王及兵敗俱奔於齊文帝乃詔蕭荘偽署文武官屬還朝者量加録序宣帝時任忠為豫寧太守衡陽内史華皎之舉兵也忠豫其謀及皎平帝以忠先有宻啟於朝釋而不問後主時魯廣逹為中領軍隋将韓擒虎之濟江也廣逹長子世貞在新蔡乃與其弟世雄及所部奔擒虎遣使致書以招廣逹時屯兵京師乃自劾廷尉請罪後主謂之曰世貞雖異路中大夫公國之重臣吾所恃賴豈得自同嫌疑之間乎加賜黄金即日還營北齊髙祖義旗初起李義深為龍驤将軍歸髙視於信都以為大行臺郎中中興初除平南将軍鴻臚少卿義深見爾朱兆兵盛遂叛髙祖奔之兆平髙祖恕其罪以為大丞相府記室參軍陳元康為相府功曹參軍時髙仲宻之叛髙祖知其繇崔暹故也將殺暹世宗匿而為之諌請髙祖曰我為捨其命須與苦手世宗乃出暹而謂元康曰卿若使崔得杖無相見也暹在廷解衣将受罰元康趋入歴階而陞且言大王方以天下付大将軍有一崔暹不能容忍耶髙祖從而宥焉文宣帝天保中盧潜為左民郎中坐譏議魏書與王松年李庶等俱被禁止㑹清河王岳将兵救江陵特舎潜以為岳行臺郎還遷中書侍郎武成帝時王則為徐州刺史梁遣貞陽侯淵眀堰水灌城則固守歴時而取受狼籍鏁送晉陽帝恕其罪悔過古人有言曰改過不吝盖所以懲往者之失杜将來之非也自夘金絶紐吳蜀争雄洎宋齊以還南北競爽至於興戎創業嚮明决政謀有失策事或過舉乃至暴怒中發斥棄仁賢率意肆刑外失羣望而能深引前咎勿憚改作雖有發矢不追之機噬臍無及之悔然亦來者之可圖也為人君者能保其國鮮不繇斯而已矣蜀先主初入蜀於涪大㑹置酒作樂謂龎統曰今日之㑹可謂樂矣統曰伐人之國而以為歡非仁者之兵也先主醉怒曰武王伐紂前歌後舞非仁者耶卿言不當宜速起出於是統逡廵引退先主尋悔請還統復故位初不顧謝飲酒自若先主謂曰向者之論阿誰為失統對曰君臣俱失先主大笑宴樂如初章武元年先主将伐吳黄權諌曰吳人悍戰又水軍順流進易退難臣請為先驅以嘗㓂陛下宜為後鎮先主不從以權為鎮北将軍督江北軍以防魏師先主自在江南及先主軍敗引退而道隔絶權不得還故率所将領降于魏有司執法白收權妻子先主曰孤負黄權權不負孤也待之如初吳大帝初為吳王黄武中騎都尉虞翻性疏直權積怒非一遂徙交州翻雖在徙棄心不忘國常憂五谿宜討以遼東海絶聽人使來屬尚不足取令去人財以求馬既非國利又恐無獲欲諌不敢作表以示吕岱岱不報為愛憎所白復徙蒼梧猛陵後權遣将士至遼東於海中遭風多沒失權悔之乃令曰昔趙簡子稱諸君之唯唯不如周舎之諤諤虞翻亮直善於盡言國之周舎也前使翻在此此役不成促下問交州翻若尚存者給其人船發遣還都若已亡者送喪還本郡使兒子仕官㑹翻已終歸𦵏舊墓妻子乃得還嘉禾元年十月魏遼東太守公孫淵遣使稱藩於權權遣張彌許晏至遼東拜公孫淵為燕王婁侯張昭切諌權卒遣之昭忿言之不用稱疾不朝權恨之土塞其門昭又於内以土封之淵果殺彌晏權數慰謝昭昭固不起權因出過其門呼昭昭辭疾篤權燒其門欲以恐之昭更閉户權使人滅火住門良乆昭諸子共扶昭起權載以復還官深自克責吳吕壹嘉禾中為校事權信任之壹性苛慘用法深刻太子登數諌權不納大臣繇是莫敢言後壹姦罪發露伏誅權引責躬一云典校吕壹竊㺯權柄擅作威福大将軍陸遜與太常潘濬同心憂之言至流涕後權誅壹深以自責陸遜赤烏中為荆州牧太子有不安之議遜上疏陳太子正統宜有金石之固魯王藩臣當使寵秩有差彼此得所上下獲安謹叩頭流血以聞書三四上及帝詣都欲口論適庶之分既不聽許而遜外甥顧譚顧承姚信並以親附太子枉見流徙太子太傅吳粲坐數與遜交書下獄死權遣中使責讓遜遜憤恚致卒後遜子抗為中郎将屯柴桑太元元年就都治病病瘥當還權涕泣與别謂曰吾前聽用讒言與汝父大義不篤以此負汝前後所問一焚滅之莫令人見也宋文帝元嘉二十七年十二月魏太武率大衆至𤓰歩聲欲渡江都下震懼咸荷擔而立始議北侵朝士多有不同至是帝登烽火樓極望不悦謂江湛曰北伐之計同議者少今日士庶勞怨不得無慙貽大夫之憂在予過矣明帝㤗始二年正月徐州刺史薛安都既降魏後遣使歸順帝遣張永率軍迎之尚書右僕射蔡興宗曰安都遣使歸順此誠不虚今宜撫之以和即安所莅不過須單使及咫尺書耳若以重兵迎之勢必疑懼或能招引北兵為患不測時張永已行不見從安都聞大軍過淮嬰城自守要取索虜永戰大敗又值寒雪死者十八九遂失淮北四州永敗問至帝在乾明殿先召司徒建安王休仁又召興宗謂休仁曰吾慙蔡僕射以敗書示興宗曰我愧卿南齊武帝永明元年五月誅車騎将軍張敬兒初敬兒妻謂敬兒曰昔時夣手熱如火而君得南陽郡元徽中夣半身熱而君得本州今復夣舉體熱矣有閹人聞其言説之事逹帝敬兒又遣使與蠻中交關帝疑其有異志勑朝臣華林八關齋於坐收敬兒誅之後數年帝與豫章王嶷三日曲水内晏舴艋船流至御坐前覆沒帝繇是言及敬兒悔殺之孫惠素武帝時為少府卿勑市銅官碧青一千二百觔供御盡用錢六十五萬有讒惠素納利武帝怒勑尚書評價貴二十八萬餘有司奏伏誅死後家徒四壁帝後知無罪甚悔恨之梁元帝承聖中以荆湘疑上命領軍将軍王僧辯及鮑泉討之僧辯謂泉曰非精兵一萬不足以制之我竟陵甲士已遣召之帝性嚴忌微聞其言以為遷延不肯去稍已含怒及僧辯将入謂泉曰我先發言君可見係泉又許之及見帝帝迎問曰卿已辦乎何日當發僧辯具對如向所言帝大怒案劔厲聲曰卿憚行耶因起入内泉震怖失色竟不敢言湏㬰遣左右數十人收僧辯既至謂曰卿拒命不行是欲同賊今唯有死耳僧辯對曰僧辯食禄既深憂責實重今日就戮豈敢懐恨但恨不見老母帝因斫之中其左脾音髀流血至地僧辯悶絶乆之方蘇即送付廷尉並收其子姪並皆繫之㑹岳陽王軍襲江陵人情搔擾未知其備帝遣左右往獄問計於僧辯僧辯具陳方略帝即赦為城内都督後梁宣帝初為岳陽王鎮襄陽與西魏柱國于謹伐江陵平之帝将尹徳毅説帝請于謹等為歡豫伏武士因而斃之分命果毅掩其營壘斬馘逋醜帝不從謂徳毅曰卿之此策非不善也然魏人待我甚厚豈可背徳若遽為卿計則鄧祁侯所謂人将不食吾餘也既而闔城長㓜被虜入關又失襄陽之地帝乃追悔曰恨不用尹徳毅之言以至於是陳宣帝大建中問五兵尚書毛喜曰我欲進兵彭汴於卿意如何喜對以不若安民保境寢兵復約帝不從後吳明徹䧟周帝深悔之謂袁憲曰不用毛喜計遂令至此朕之過也初吳明徹北伐克㨗帝以為河南可定通事舎人蔡景歴諌稱師老将驕不宜過窮逺略帝惡其沮衆大怒出為豫章内史又徙㑹稽及明徹敗帝追憶景歴前言即日追還復以為征南鄱陽王諮議參軍數日遷貟外散騎常侍兼御史中丞復本封爵北齊神武将圗關右與鎮北将軍叚榮宻謀榮盛稱未可及渭曲失利神武悔之曰吾不用段榮之言以至於此陳元康為尚書右丞初從神武破周太祖於邙山大㑹諸将議進退䇿咸以為野無青草人馬疲痩不可逺追元康曰兩雄交争嵗月已乆今得大㨗便是天授時不可失必須乘勝追之神武曰若遇伏兵孤何以濟元康曰王前沙苑還軍彼尚無伏今奔敗若此何能逺謀若捨而不追必成後患神武竟不從及疾篤謂文襄曰邙山之戰不用元康之言方貽汝患以此為恨死不瞑目文宣帝天保初中書舎人元文遥忽有中㫖幽執竟不知所繇如此積年帝後自幸禁獄執手愧謝親解所着金帶及御服賜之即日起為尚書祠部郎中梁太祖初為梁王唐天祐二年十月自襄州引軍繇光州路趨淮南将發判官敬翔切諌請班師以全軍勢帝不聽及次于棗陽遇大雨頗阻師行之勢軍至夀春夀人堅壁清野以待帝軍帝乃退舎於正陽十一月大軍北濟帝至汝隂深悔淮南之行册府元龜卷二百九
