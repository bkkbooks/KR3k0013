body:
  text: 册府元龜卷一百三十四宋王欽若等撰帝王部念功夫八辟麗法周官之明訓十世猶宥左氏之格言是知帝王存忘過之徳恢包荒之念度基業之綿搆知臣下之勤勞莫不䟽以大封縻之好爵其或罹乎憲網屬諸吏議而能追其舊績錄功恕罪責其後効屈法申恩所以使忠者竭誠而勲臣兢勸也若乃子孫席其舊徳朝廷命以世封或自貽伊戚或坐招官謗而復念勲代之後哀門户所寄或全其嗣息或復其邑封兹義士所以忘死而賢人所以發憤也漢宣帝甘露中丙吉子嗣博陽侯顯有罪削爵為闗内侯元帝時長安士伍尊上書先嘗有罪經奪免之而與士卒為伍故稱士伍其人名尊言臣少時為郡邸小吏竊見孝武皇帝曾孫遭離無辜吉仁心感動涕泣悽惻選擇復作胡組養視皇孫吉常從臣尊日再侍卧庭上郡邸之庭也侍謂參省之也時皇孫孤弱常在襁褓故指言卧也後遭修獄之詔吉扞拒大難不避嚴刑峻法既遭大赦吉謂守丞誰如皇孫不當在官守丞者守獄官之丞誰如其姓名也謂皇孫不當在獄官宜屬郡縣也使誰如移書京兆尹遣與胡組俱送京兆尹不受復還及組日滿當去皇孫思慕吉以私錢顧組令留與郭徴卿竝養數月乃遣組去後少内嗇夫白吉曰食皇孫亡詔令少内掖庭主府藏之官也詔令無文無從得其廪具時吉得食米肉月以給皇孫吉即時病有病時也詔使臣尊朝夕請問皇孫視省席蓐燥濕候伺組徴卿不得令晨夜去皇孫敖盪去離也敖㳺戲也盪施也數奏丼毳食物奏進也毳讀與脆同所以擁全神靈成育聖躬功徳已亡量矣時豈豫知天下之福而徼其報哉徼要也誠其仁恩内結於心也雖介之推割肌以存君不足以比晉公子重耳之亡也里鳬湏從因盜其資而逃重耳無糧饋不能行介子推割其股肉以食重耳乃能行也孝宣皇帝時臣上書言狀幸得下吉吉謙讓不敢自代删去臣辭專歸美於組徴卿徴卿皆以受田宅賜錢吉封為博陽侯臣尊不得比組徴卿臣年老居貧死在旦暮欲終不言恐使有功不著吉子顯坐㣲文奪爵為闗内侯臣愚以為宜復其爵邑以報先人功徳先是顯為太僕十餘年與官屬大為姦利贓千餘萬司𨽻校尉昌案劾罪至不道奏請逮捕帝曰故丞相吉後有舊恩朕不忍絶免顯官奪邑四百户復後以為城門校尉後漢光武建武十五年南郡太守劉隆坐墾田不實徴下獄其疇輩十餘人皆死帝以隆功臣特免為庻人張純髙祖父安世宣帝時封富平侯純少襲爵光武初先來詣闕故得復封後為五官中郎將有司奏列侯非宗室不宜復國光武曰張純宿衛十有餘年其勿廢更封武始侯食富平之半武始縣屬魏郡富平縣屬平原郡也朱浮初從光武為大司馬主簿遷偏將軍破邯鄲為大將軍討定北邊建武二年復封浮為新息侯帝以浮陵轢同列毎䘖之惜其功能不忍加罪魏文帝為魏王時賈逵為丞相主簿祭酒嘗坐人為罪王曰叔向猶十世宥之况逵功徳親在其身乎一無所問明帝即位時驃騎將軍野在侯曹洪既免官削爵土洪先帝功臣時人多為觖望帝拜為將軍更封樂城侯邑千户位特進復拜驃騎將軍丁謐父斐從太祖為典軍校尉摠攝内外謐少不肯交游但博觀書傳為人沈毅頗有才畧明帝太和中嘗家鄴借人空屋居其中而諸王亦欲借之不知謐已得直開門入謐望見王交脚卧而起而呼其僕曰此何等人呵使去王怒其無禮還具上言明帝收謐繫鄴獄以其功臣子原出後帝聞其有父風召拜度支郎中齊王正始中夏侯覇為討蜀䕶軍右將軍封博昌亭侯覇素為曹爽所厚聞爽誅自疑亡入蜀以父淵舊勲赦覇子徙樂浪郡陳留王景元五年春鍾㑹為鎮西將軍伐蜀謀反誅其兄毓以四年冬先薨㑹竟未知聞㑹兄子邕隨㑹亦與俱死㑹所養兄子毅及峻辿勑連切等下獄當伏誅司馬文王表天子下詔曰峻等祖父繇三祖之世極位台司佐命立勲配饗廟庭父毓厯職内外幹事有績昔楚思子文之治不滅鬭氏之祀晉錄成宣之忠用存趙氏之後以㑹邕之罪而絶繇毓之類吾有愍然峻辿兄弟特原有官爵者如故惟毅及邕息伏法晉武帝泰始九年詔曰鄧艾有功勲受罪不逃刑而子孫為氓𨽻朕常愍之其以嫡孫朗為郎中穆帝升平三年下詔復征虜將軍州陵縣侯毛寳本封寳守邾城石季龍將攻邾城城䧟赴江溺死詔曰寳之傾敗宜在貶裁蘇峻之難致力王室今咎其過故不加贈祭之可也其後公卿言寳有重勲加死王事不宜奪爵故復本封安帝隆安初虞嘯父為呉國内史徴補尚書未發而王廞舉兵叛以嘯父行呉興太守嘯父即入呉興應廞廞敗有司奏嘯父與廞同謀罪應斬詔以嘯父祖潭舊勲聽以侯贖為庻人以起義軍討沈充功封零陵縣侯又以前後功進爵武昌縣侯嘯父嗣侯桓茂逺荆州刺史冲孫也為中書令𤣥篡位為吏部尚書隨𤣥西奔𤣥死歸降孝武詔曰夫善著則祚逺勲彰故事殊以宣孟之忠蒙後晉國子文之徳世嗣獲存故太尉冲昔藩陜西忠誠王室諸子染凶自貽罪戮念冲遺勤用悽於懐其孫宜見矜宥以奨為善可特全生命徙於新安後魏道武以庾岳為將以功至司空岳兄子路有罪諸父兄弟悉誅特赦岳父子叔孫建少以智勇著稱道武之幸賀蘭部建嘗從左右參軍國之謀後為并州刺史以公事免守鄴城園明元即位念建前功乃以建為正直將軍相州刺史來大千代人也父初真從道武避難北侯山參剏業之功官至後將軍武原侯與在八議穆崇代人也道武之居獨孤部崇嘗徃來奉給後劉顯之謀逆也崇來告難太祖馳如賀蘭部太祖李公窟咄之難崇甥于桓執太祖以應之告崇崇乃夜告道武道武誅桓等崇甚見寵待從平中原後為太尉衛王儀謀逆崇豫焉道武惜其功而秘之屈㧞右僕射垣孫也垣字長生垣以破平凉功賜爵濟北公太武信任之委以大政㧞襲祖爵太武追思其祖年四十為南部大人時太武南伐擒宋將胡盛之以付㧞酒醉不覺盛之逃去太武大怒命斬之將伏鑕太武愴然曰若鬼而有知長生問其子孫朕何以應之乃赦㧞免為中散大夫文成時穆頭為征西大將軍都督諸軍西征吐谷渾坐擊賊不進免官爵徙邊帝又以頭著勲前朝徴為内都大官薛真度為䕶南蠻校尉平南將軍文成時齊雍州刺史曹虎許降詔真度督四將出襄陽無功而還後征赭陽為房伯玉所敗有司奏免官爵髙祖詔曰真度之罪誠如所奏但頃與安都送款彭方開闗徐宋外捍沈攸道成之師内寕邊境烏合之衆淮海來服功頗在兹言念厥績毎用嘉美赭陽之敗何足計也宜異羣將更申後効可還其元勲之爵復除荆州刺史自餘徽號削奪進足彰忠退可明失尋除假節冠軍將軍獻文時劉尼為司徒皇興四年車駕北征帝親誓衆而尼昏醉兵陣不整帝以其功重特恕之免官而已長孫觀獻文時襲祖爵上黨王時異姓諸王襲爵多降為公帝以其祖道生佐命先朝故特不降孝文時穆羆為虎牢鎮將頻以不法致罪以其勲徳之胄讓而赦之羆太尉崇之後也元麗為魏衛將軍時泰州屠各王法智與主簿名狗兒為亂麗討平之麗因平賊之勢枉掠良善七百餘人宣武嘉其功詔有司不聽追簡劉藻文成時為征虜將軍頻破賊軍後與髙聰等戰敗俱徙平州景明初宣武追錄舊功以藻為太尉司馬楊大眼為平東將軍與中山王英同圍鍾離大眼軍城東守淮橋屬水汛長大眼所綰統軍劉神符公孫祉兩軍夜中爭橋奔退大眼不能禁相尋而走坐徙為營州兵永平中宣武追其前勲起為試守中山内史裴植為大鴻臚卿後以長子昕南叛有司處之大辟宣武詔曰植闔門歸欵子昕愚昧為人誘䧟雖刑書有常理宜矜恤可特恕其罪以表勲誠孝莊帝即位詔復盧同本秩先是同為撫軍大將軍元義之廢靈太后同為義所親營州城民就德興反同持節慰勞安輯其民而還靈太后反政以同義黨除名及帝踐阼詔復本秩除都官尚書復兼七兵以同前慰勞德興之功封章武縣開國伯食邑四百户隋文帝摠百揆以鄭譯司摠六府事譯性姦險不親職務而贓貨狼籍帝隂疎之然以其有定䇿功不忍廢放隂勑官屬不得白事於譯獨坐㕔事無所闗預譯懼頓首求觧職帝寛諭之接以恩禮于顗初仕周為東廣州刺史與摠管趙文表不協抽刀砍殺文表誣其通謀於尉遲逈及文帝受禪文表弟詣闕稱兄無罪帝令按其事太傳竇熾等議顗當死帝以門著勲績特原之仍為開府宇文愷忻之弟也文帝為丞相加上開府中大夫及踐阼誅宇文氏愷初亦在殺中以與周本别兄忻有功於國使人馳赦之僅而得免張威開皇中為青州摠管在州頗治産業侵擾百姓坐廢於家後從文帝祠太山至雒陽帝謂威曰自朕之有天下毎委公以重鎮可謂推赤心矣何乃不修名行惟利是視豈直孤負朕心亦且累卿名徳因問威曰公所執笏今安在威頓首曰臣負罪虧憲無顔復執謹藏於家帝曰可持來威明日奉笏以見帝曰雖不遵法度功效實多朕不忘之今還公笏於是復拜雒州刺史權武文帝時為潭州摠管晩生一子與客宴集酒酣遂擅赦所部内獄囚武以南越邊逺治從其俗務適便宜不依律令而毎言當今法急官不可為帝令有司案其事驗帝大怒命斬之武於獄中上書言其父為武元皇帝戰於馬前以此求哀繇是除名為民虞慶則為右僕射時突厥將内附使慶則充使安撫文帝勑之曰我欲存立突厥彼送公馬但取三五匹攝圖見慶則贈馬千匹又以女妻之帝以慶則勲髙皆無所問攝圖突厥主也唐髙祖武徳二年三月羣臣曰義兵初至河東唯孫華先至此之誠効不可忘也華不幸早終毎用傷嘆其下將帥宜更優之是日封華部將十人為開國侯華先已贈屯衛大將軍太宗時李靖為定襄道行軍摠管擒突厥頡利可汗御史大夫温彦博害其功譛靖軍無綱紀致令虜中竒寳散於亂兵之手帝大加責讓靖頓首謝乆之帝謂曰隋將史萬歲破逹頭可汗有功不賞以罪致戮朕則不然當赦公之罪錄公之勲詔加左光禄大夫賜絹千疋真食邑通前五百户未幾帝謂靖曰前有人䜛公今朕意已悟公勿以為懐賜帛二千疋拜尚書左僕射丘行恭為右武侯大將軍性嚴酷所在同列皆懾憚之數坐事觧免太宗毎思其功不踰時月復其官李徳謇為將作少監衛國公靖之長子庻人承乾之廢也徳謇與之交通流嶺南後太宗以靖故改徙蘇州杜楚客為工部尚書攝魏王泰府事所在以威肅聞楚客知太宗不悦承乾遂潜圖交搆朝貴用事者至有懐金以賂之因説魏王聰明可為嫡嗣人或以聞奏太宗隐而不言至是釁發太宗始揚其事仍以兄有佐命之功免死廢為庻人尋授處州奉化縣令江夏王道宗從太宗征遼攻安市城不克道宗為憲司所劾太宗曰道宗之愆理在殊死然擊破盖牟遼東二城并新城南戰竝有勲績以彼之功補此之過不可加戮也特宜捨之髙宗永徽三年十月弓月道行軍摠管梁建方副總管髙徳逸為御史所劾建方兵衆足以追討而逗留不進徳逸乃令市馬自取駿者帝以建方有破處宻之功釋而不問大理卿李道裕奏言徳逸所取之馬筋力異常請實中廐帝謂侍臣曰建方出總戎麾嘗愞不進徳逸違法取馬自有刑名就中不和俱合深責朕以出師命將務在軍功凱旋之際便加黜免情所不忍所以特令宥之道裕法官職在决斷進馬之事非其所司請以馬送北門妄希我意深乖法官之體豈朕行事不為羣下所知邪朕今日咎未能即黜道裕龍朔元年冬十月辛未狩於南山布圍大順府果毅王萬興以輙先促圍集衆欲斬之帝謂侍臣曰軍令有犯罪在不赦但恐外人謂我翫好畋獵輕斷人命又以其曾從征遼有功特令放免薛仁貴為邏逤道行軍大總管為吐蕃所敗坐除名尋而髙麗餘衆相率復叛詔仁貴為雞林道總管以經畧之上元中坐事徙象州赦歸髙宗思其功尋復召見謂曰徃九成宫遭水無卿已為魚矣卿又北伐九姓東擊髙麗漠北遼東咸遵聲教者竝卿之力也卿雖有過豈可相忘有人言卿烏海城下故不擊賊致使失利朕所恨之唯此事耳今西邊不靜𤓰沙路絶卿豈可髙枕鄉邑不為朕指撝邪於是起授𤓰州長史𤣥宗先天初劉幽求為右僕射以太平公主將謀逆亂乃與右羽林郎將軍張暐請以羽林兵誅之暐洩其謀睿宗下幽求等詔獄乃流幽求於封州歲餘太平公主等伏誅其日詔徴復官爵曰劉幽求風雲感𤣥川嶽萃靈學綜九流文窮三變義以臨事精能貫日忠以成謀用若投水茂勲立艱難之際嘉話盈啓沃之初存謙直以不囬為姦邪之所忌釁萌頗露譛端潜發元宰見逐䜛人孔多既殄羣凶方宣大化期問政於經始載登賢於夢卜可依舊金紫光祿大夫守尚書右僕射知軍國重事監修國史上柱國開元七年崔日用為常州刺史羗降田賦特下制曰唐元之際逆黨搆兇崔日用當時潜論其事及於戡剪實豫元謀功既居多不宜减封是年轉并州長史十年三月制曰漳州懐恩縣尉員外置鍾紹京夙負藝能早申誠節録其殊効賜以崇班未答恩私自招瑕累雷雨作解品物惟新言念舊勞稍加甄叙可郴州别駕肅宗至德二年九月河東兵馬節度馬承光奉詔發河東兵馬屯於渭北而馮翊太守王鳯佚執異見沮軍不發承光斬之詔責不上聞使使劾之有上言稱承光有大功賊䧟潼闗承光収河東逆賊崔乾祐攻安邑承光引兵収陜郡解安邑圍走崔乾祐皆承光之功合得免死帝優詔免之代宗廣德元年十二月宦官程元振先得罪放歸田里潜詣京師館於所昵司農卿陳景銓之第將圖進取京兆府擒獲以聞二年春正月御史臺以元振獄狀聞元振配秦州百姓景銓貶為新州新興縣尉同正元振既行帝念其舊勲務以遐裔特恩許江陵府安置徳宗建中三年五月壬午詔曰故尚父子儀有大勲力保乂於皇家嘗以山河為誓琢之金石其可忘也家前時與人為市以子儀歿後或被誣搆欲論奪之有司無得為理子儀既薨其女壻太僕卿趙縱少府少監李洞有光禄少卿王宰貶官相屬其子曖所尚昇平公主又以坐事幽於南宫曖亦絶其出入郭氏大震恐姦人幸其危懼多論取奪其田宅奴婢郭氏懼不敢與爭帝聞故有是詔是年徐帥李洧卒髙承宗乆為洧將軍人悦之請以為帥洧弟淡先為團練副使頗凶險耻居承宗下乃宻使人言於李納請分兵擊徐州淡居中為應其使路出於滕因令説滕將翟濟同叛濟表奏之詔以濟兼沂州刺史召淡至京師以其兄洧有功特赦不罪興元元年十月中書門下奏李晟廵邊欲至涇州田希鍳潜伏兵馬謀害綂帥李晟察其姦計今以伏辜原其情狀合坐宗族頃以朱泚窮蹙奔竄涇原希鍳去逆歸順閉門不納恐湏録其前効特全後嗣其妻王氏并男太子通事舎人華左金吾倉曹參軍葦折衝芮折衝萱等并請免死差綱逓送嶺南分付杜佑令配諸州從之貞元元年八月己卯詔曰朕聞自昔哲王以道化下不竭物以充欲不勞人以樹威億兆之心戴若父母兵革不試四方來同苟昧於徳綏務以力勝士旅疲耗蒸黎困窮幸以成功豈云有補李懐光出自戎伍頗著忠勞㧞於等倫授以旄鉞誓師河朔奔難奉天秉心匪彞自底不類怙衆貪亂附姦脇君朕用再遷幾危宗社洎股肱宣力賊泚就誅率土之人咸懐奮擊朕獨排羣議未忍加兵復其官封志期全貸昏迷不反悖慢逾彰殘害使臣侵敗王畧上帝悔禍元臣叶謀克集茂勲以夷大難良以誠信未著撫御失宜至使功臣䧟於誅戮謂之冦敵能不愧心然以懐光一家在法無捨念其昔居將相嘗寄腹心罪雖挂於刑書功已藏於王府以干紀之跡固合㓕身以赴難之身所宜有後務從寛宥俾洽幽明宜以懐光男一人為嗣賜庄宅各一所仍還懐光首及屍任其收𦵏其懐光妻子孫在室女等并逓送澧州委李臯逐便安置使得存立其出嫁女及諸親戚等竝宜釋放是月華州節度駱元光專殺徐庭光元光累有功慮諌官論其專殺先令宰相諭諌官勿論三年十一月癸亥以神策軍大將軍莫仁擢為左驍衛上將軍丁卯以河東兵馬使兼御史大夫張元芝為神䇿軍大將軍己巳詔奉天定難功臣左神䇿將軍兼御史大夫武陵郡王孟日華於洪州安置仍賜絹百匹充家口路糧至彼委本道都團練使給十人衣糧以時存問初仁擢出官日華自謂代之既授張元芝日華忿於衆曰吾於國有功且乆次當遷今以大將軍授元芝吾寧貶黜不能事也朝廷用人失序何以致理大詬拂衣而出監軍竇文塲大怒列狀請誅帝念其功故但黜謫之七年十月詔曰郭晞男鋼在法叛亡已上道者斬父母妻子皆有連坐朕以先尚父翼戴肆勤安固邦國不忍以子忘其先勞今竝原之俾復其位其諸不坐皆釋放初鋼之走吐蕃吐蕃疑之不納置於河栰㳂流以歸杜希全得之以聞召至京是日賜自盡穆宗長慶二年十二月勑贈工部尚書田頴夙彰忠勇累効勲勤方議奨能遽聞棄代永言嗟悼湏有優矜宜賜絹布一百五十疋端度支逐便支給仍令所在州縣傳逓送至許州委李光顔官給𦵏事其男克素待過卒哭亦委本道量與軍中職事收管驅使頴前為李光顔部將淮西之役累有勝㨗其後王師征討頴常在戰陣以忠勇著聞及汴州平䇿勲拜宋州刺史人皆謂頴宜受方任㑹以疾卒敬宗寳厯二年正月御史䑓奏右賛善大夫李方現把笏擊損内園品官李重實款狀明具勑李方現不自謹身有此喧競假如品官凌忽只合具實奏聞輙肆狂疎恣行毆擊傷人見血理在難容但以父有勤勞身叨宗屬特從輕典粗以䋲違宜量罰兩月俸文宗太和四年前豐州刺史充天徳軍使渾鐬坐贓七年千餘貫貶袁州司馬帝以咸寧王勲烈特異故特命有司俯從輕文至五年春以鐬守袁王傳賜紫金魚袋以父太師忠勲故也五年春盧龍軍節度觀察等使李載義為其部下楊志誠所逐因入覲帝以載義有平滄景之功又能恭順朝㫖冊拜太保同平章事其年改山南西道節度觀察等使兼興元尹後唐明宗長興四年八月顧謂侍臣曰前洋帥陳臯稱病其乞致仕信乎對曰實然帝因愴然改容良乆曰陳臯昔為徤兒從吾征伐操戈擐甲氣吞豺狼今衰落如此浮生壯徤都幾何時哉咄嗟乆之因令孟漢瓊徃勞問王思同當明宗朝伐蜀之役為先鋒指揮使思同恃勇先入劒門大軍未相繼復為董璋兵逐出之及班師思同以曾獲劍門之功移鎮山南西道册府元龜卷一百三十四
