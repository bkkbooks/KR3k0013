body:
  text: 册府元龜卷七百五十四宋王欽若等撰總録部孝第四陳傅繹梁太清末擕母南奔避難俄丁母憂在兵亂之中居喪盡禮哀毁骨立士友以此稱之位至秘書監司馬申仕梁為邵陵王丹陽主簿屬太清之難父母俱没因此自誓菜食終身張種仕梁為武陵王征西東曹掾種辭以母老抗表陳請為有司所奏坐黜免侯景之亂種奉其母東奔乆之得還鄉里俄而母卒種時年五十而毁瘠過甚又廹以凶荒未獲時塟服制雖畢而居處飲食常若在喪及景平司徒王僧辨以狀奏聞起為貞威將軍治中從事史并為具塟禮塟訖種方即吉僧辨又以種年老傍無繼嗣賜之以妾及居處之具徐凌仕梁為通直散騎常侍及侯景冦京師凌父摛先在圍城之内凌不奉家信便蔬食布衣若居憂憫司馬暠字文昇㓜聰警有至性年十二丁内艱號慕過禮水奬不入口殆經一旬每號慟必致悶絶内外親戚皆懼其不勝喪父子產每曉喻之逼進饘粥然毁瘠骨立服闋以姻戚子弟預入問訊梁武帝見暠羸瘦歎息良久謂其父子産曰昨日羅兒尚爾顦顇使人惻然便是不墜家風為有子矣羅兒即暠小字也釋褐太學愽士累遷正員郎丁父艱哀毁過甚廬于墓側一日之内惟進薄麥粥一升位至司州中正司馬延義字希忠暠子也少沉敏好學江陵之陷隨父入關丁母憂喪過于禮及暠還都延義乃躬扶靈櫬晝伏宵行冐履氷霜手足皆皸瘃及至都以中風冷遂至攣廢數年方愈位至司徒從事中郎張昭呉郡呉人字徳明幼有孝性色養甚謹禮無違者父熯嘗患消渴嗜鮮魚昭乃身自維網捕魚以供朝夕弟乾字𤣥明聰敏慱學亦有至性及父卒兄弟竝不衣綿帛不食鹽醋日惟食一升麥屑粥而已每一感慟必致嘔血鄰里聞其哭聲皆為之涕泣父服未終母陸氏又亡兄弟六年哀毁形容骨立親友見者莫識焉家貧未得大葬遂布衣蔬食十有餘年杜門不出屏絶人事時衡陽王伯信臨郡舉乾孝廉固辭不就兄弟竝因毁成􅍚昭失一眼乾亦中冷苦癖年竝未五十終于家何之元幼好學有才思居喪過禮為梁司空袁昻所重天監末昴表薦之因得召見解褐梁太尉臨川王揚州議曺從事史虞荔為太子中庶子領大著作荔母隨荔入臺卒于臺内尋而城陷情理不申繇是終身蔬食布衣不聽音樂孔奐遭母憂哀毁過禮時梁室喪亂皆不能行三年之喪惟奐及呉國張種雖在冦亂中不違法度竝以孝聞位至散騎常侍殷不害性至孝居父憂過禮繇是少知名家世儉約居甚貧窶有弟五人皆㓜弱不害事慈母養小弟勤劇無所不至士大夫以篤行稱之為中書郎兼廷尉卿江陵之陷也不害先於别所督戰失母所在于時甚寒冰雪交下老弱凍死者填滿溝塹不害行哭道路遠近尋求無所不至遇見死人溝水中投身而下捧閱舉視體凍濕水漿不入口號泣不輟聲如是者七日始得母屍不害憑屍而哭每舉音即氣絶行路無不為之流涕即於江陵權殯與王褒庾信俱入長安自是蔬食布衣枯槁骨立見者莫不哀之位至給事中殷不佞不害弟也少立名節居父喪以至孝稱梁元帝承聖初為武康令㑹江陵陷而母卒道路隔絶久不得奔赴四載之中晝夜號泣居處飲食嘗為居喪之禮高祖受禪起為戎昭將軍除婁令至是四兄不齊始至江陵迎母喪柩歸葬不佞居處禮節如始聞問若此者又三年身自負土手植松栢每歳時伏臘必三日不食位至尚書右丞沈烱為梁給事黄門侍郎領尚書左丞荆州陷為西魏所虜魏人甚禮之授烱儀同三司烱以母在東嘗思歸國恐魏人愛其文才留之嘗閉門却掃無所交逰時有文章隨即棄毁不令流布承聖二年還至都除司農卿遷御史中丞高祖受禪加通直散騎常侍中丞如故以母老表請歸養詔不許文帝嗣位又表曰臣嬰生不幸弱冠而孤母子零丁兄弟相長謹身為養仕不擇官宦成梁朝命存亂世冐危履險百死經生妻息誅夷昆季㝠滅餘臣母子得逢興運臣母妾劉今年八十有一臣叔母妾丘七十有五臣門弟姪故自無人妾丘兒孫又久亡泯兩家侍養惟臣一人前帝知臣之孤㷀養臣以州里不欲使頓居草茅又復矜臣温凊所以一年之内再三休沐臣之屢披丹欵頻冐宸嚴非欲茍違朝廷遠離畿輦一者以年將六十湯火居心每跪讀家書前懼後喜温枕扇席無復成童二者軄居彛憲邦之司直若或自虧身體何問國章前徳綢繆始許哀放内侍近臣多悉此㫖正以選賢與能廣求明哲趦趄荏苒未始取才而上𤣥降戾奄至今日徳音在耳墳土遽乾悠悠昊天哀此罔極兼臣私心煎切彌迫近時慺慺之祈轉忘塵觸伏惟陛下睿哲聰明嗣興文武刑于四海宏此孝理寸管求天仰歸帷扆有感必應實望聖明特乞霈然申其私禮則王者之徳覃及無方矧彼翔沉孰非涵養詔答曰省表具懷卿譽馳咸雒情深宛沛日者理切倚門言歸異域復牽時役遂乖侍養雖周生之思每欲棄官戴禮垂文得遺從政前朝光宅四海劬勞萬機以卿才為獨歩職居專席方深委任屢屈情禮朕嗣奉洪基思宏景業顧茲寡薄兼纒哀疚實賴賢哲同致雍熈豈便釋簡南闈解紱東路當令馮親入舍荀母從官用睹朝榮不虧家禮尋勅所司相迎尊累使卿公私得所竝無廢也王固清虛寡欲居喪以孝聞又崇信佛法及丁所生母憂遂終身蔬食夜則坐禪晝誦佛經兼習成實論義位至徐州大中正岑之敬為征南府諮議叅軍每忌日營齋必躬自灑掃泣涕終日士君子以篤行稱之孟猛以父遇酷終文帝之世不聽音樂蔬食布衣以喪禮自處宣帝立乃始求位周確為東宮通事舍人丁母憂去職及歐陽紇平越起為中書舍人命於廣州慰勞服闋為太府卿歴太子家令以父憂去軄尋起為貞威將軍呉令確固辭不之官程文季父霛洗為臨海太守卒文季盡領其衆起為超武將軍仍防郢州文季性孝雖軍旅奪禮而毁瘠甚至沈君理為東陽太守以父憂去軄起為信威將軍左衛將軍又起為持節都督東衡二州諸軍事任威將軍東衡州刺史領始興内史又起為明威將軍中書令前後奪情者三竝不就陸繕字子繕少有志尚以雅正知名父任梁御史中丞及繕為御史中丞以父任所終固辭不就後位至左僕射袁憲尚梁簡文帝女南沙公主武帝太清二年遷太子舍人侯景冦逆憲東之呉郡尋丁母憂哀毁過禮敬帝承制徵授尚書殿中即父君正為呉郡太守憲至宣帝太建六年除呉郡太守以父任固辭不拜改授南康内史徐孝克陵弟也為通直散騎常侍兼國子祭酒每侍宴無所食噉至席散當其前膳羞損減宣帝密記以問中書舍人管斌斌不能對自是斌以意伺之見孝克取珍果内袖帶中斌當時莫識其意後更尋訪方知還以遺母斌以實啟帝帝嗟嘆良久乃勅所司自今宴享孝克前饌竝遣將還以賜其母時論美之陳亡隨例入關家道壁立所生母患欲粳米為粥不能常辦母亡之後孝克遂嘗噉麥有遺粳米者孝克對之悲泣終身不復食之焉王元規性孝事母甚謹晨昏未嘗離左右梁時山隂外有暴水流漂居宅元規惟有一小船倉卒引其母妹并孤入船規自執檝棹而去留其男女三人閣於樹稍及水退獲全時人皆稱其至行庾持字允徳少孤性至孝居父憂過禮位大中大夫江徳藻性至孝事親盡禮藻以父憂去職服闋之後容貌毁瘠如居喪時位至新淦令陸瓊年十六丁父憂毁瘠有至性後為吏部尚書丁母憂哀慕過毁蔡徴七歳丁母憂居喪如成人禮繼母劉氏性悍忌視之不以道徴供侍益謹初無怨色徴夲名覽父景歴以為有王祥之性更名徴字希祥位至給事中姚察為南郡王行叅軍兼尚書駕部郎值梁室喪亂於金陵隨二親還鄉時東土兵荒人飢相食告糴無處察家口既多竝採野蔬自給每﨑嶇艱阻求請供養之資糧粒嘗得相繼後為太子僕父僧垣入于長安察蔬食布衣不聽音樂僧垣凶聞因聘使到江南時察母韋氏喪制始除後主以察羸瘠慮加毁頓乃遣中書舍人司馬申就宅發哀乃勑申専加譬抑服闋除給事黄門侍郎察累年憂服兼齋素日久自免憂後因加氣疾後主見其柴瘠過甚為之動容陳滅入隋開皇十三年襲父爵北絳郡公察徃歳之聘周也因得與父僧垣相見相别之際絶而復蘇至是承襲愈更悲感見者莫不為之歔欷魯悉逹㓜以孝聞及為呉州刺史遭母憂哀毁過禮因遘疾卒歐陽頠字靖世長沙臨湘人少質直有思理以言行篤信著聞於嶺表父喪哀毁甚至位至征南將軍張譏幼喪母有錯綵經帕即母之遺制及有所識家人具以告之每歳時輙對帕哽噎不能自勝及丁父憂居喪過禮服闋補湘東王國佐常侍韋翽字子羽少有志操弱冠喪父以哀毁甚重致疾撫孤兄子以孝義著稱位至宣城太守謝貞㓜聰敏有至性祖母阮氏先苦風眩每發一二日不能飲食貞時年七歳祖母不食貞亦不食徃徃如是親族莫不奇之年十四丁父艱號頓于地絶而復蘇者數矣初父藺居母阮氏喪不食泣血而卒家人賓客懼貞復然從父洽從兄暠乃共往華嚴寺請長爪禪師為貞説法仍謂貞曰孝子既無兄弟極須自愛若憂毁滅性誰養母耶自後少進饘粥太清之亂親屬散亡貞於江陵陷没入周為趙王侍讀王即周武帝之愛弟厚相禮遇王嘗聞左右説貞每獨處必晝夜涕泣因私使訪問知貞母年老遠在江南乃謂貞曰寡人若出居藩當遣侍讀還家供養後數年王果出因辭見面奏曰謝貞至孝而母老臣願放還武帝奇王仁愛而遣之因隨聘使子暉還國後為南平王友加招逺將軍掌記室事後主至徳三年以母憂去職頃之勑起還府仍加招逺將軍掌記室貞累啟固辭勅報曰省啟具懷雖知哀㷀在疚而官俟得才禮有權奪可便力疾還府也貞哀毁羸瘠終不能之官舍時尚書右丞徐祚尚書左丞沈客卿俱來候貞見形體骨立祚等愴然歎息徐喻之曰弟年事巳衰禮有常制小宜引割自全貞因更感慟氣絶良久涕泣不能自勝祚等憫黙而出祚謂客卿曰信哉孝門有孝子客卿曰謝公家傳至孝士大夫誰不仰止此恐不能起如何位至招逺將軍阮卓父問道初隨岳陽王出江州卒焉卓以後主禎明三年入于隋行至江州追感父所終因遘疾而卒位至招逺將軍後魏許謙初為符雒所請之和龍未幾以繼母老辭還位至招逺將軍崔𤣥伯為黄門侍郎從道武幸鄴及車駕還京師次於嘗嶺道武親登山頂撫慰新民適遇𤣥伯扶老母登嶺道武嘉之賜以牛米因詔徙人不自進者給以車牛崔懷順父邪利仕宋為魯郡太守以郡降賜爵臨淄子拜廣寧太守卒於郡懷順以父入國故不出仕及尅青州懷順迎邪利喪還葬張白澤年十一遭母憂居喪以孝聞太武聞而嘉之高猛虎為鄯善鎮錄事及居喪以至性稱遂絶宦情乞伏保父居獻文時嘗在左右出内詔命賜宮人河南宗氏亡後賜以宮人申氏太子左率申垣兄女也歳餘居卒申撫養保性嚴肅捶罵切至而保奉事孝謹初無恨色稍遷左中郎將每請祿賜在外公私尺丈所用無不白知出為道善鎮將申年八十餘保手製馬轝親自扶接申欣然隨之申亡保解官奉喪還雒復為長兼南中郎將卒崔浩父疾篤浩乃剪爪截髪夜在庭中仰禱斗極為父請命求以身代叩頭流血歳餘不息家人罕有知者及父終居喪盡禮時人稱之嘗曰没親之後值國龍興之會平暴除亂拓定四方余備位台鉉與叅大謀賞獲豐厚牛羊善澤貲累巨萬衣則重錦食則梁肉遠惟平生思季路負米之時不可復得位至侍中特進撫軍大將軍陸麗性至孝遭父憂毁瘠過禮位至撫軍大將軍冦臻字先勝年十一遭父憂居喪以孝稱後為中州太守以母老屢求解任久乃從之李東字休賢父遵坐通西賊伏誅東郡辟功曹以父憂去職遂終身不食酒肉因屏居鄉里位至司徒諮議叅軍慕容真安為征南大將軍濟南王白曜之子父事誅時人寃之真安年十一聞父被執將自殺家人止之曰輕重未可知真安曰王位高功重若有小罪終不至此我何忍見父死遂自縊焉酈惲為長孫稚行臺郎在軍啟求減身官爵為父䕫請贈詔贈䕫征虜將軍安州刺史冦治為征虜將軍東荆州刺史父亡雖久而猶於平生所處堂宇備設帳幃几杖以時節開堂列拜垂涙陳薦若宗廟然吉凶之事必先啟告遠出行反亦如之房景伯生於桑乾少喪父以孝聞家貧傭書自給養母甚謹尚書盧淵稱之於李冲冲時典選㧞為奉朝請司空祭酒宇文延瀛州刺史文福子也延為員外散騎常侍以父老詔聽隨侍在瀛州屬大乗妖黨突入州城延率奴客戰死者數人身被重瘡賊乃小退而縱火燒齋閣福時在内延突火而入抱福出外支體灼爛髪盡於是勒衆與賊苦戰賊乃散走以此見稱韋雋字頴超早有識學少孤事祖母以孝聞性温和謙讓為州里所稱辛紹先有至性丁父憂二年口不甘味頭不櫛沐髪遂落盡故嘗著垂裙皂㡌位至下邳太守辛少雍字季仲少有孝行尤為祖父紹先所愛紹先性嗜羊肝嘗呼少雍共食及紹先卒雍終身不食肝位至給事中崔仲哲生為祖母宋氏所養早有知識六歳宋亡啼慕不止見者悲之位至司徒叅軍假寧朔將軍崔康為左光祿大夫去軄少子季良風望閒雅為太尉長史及康還鄉良亦去職歸養崔鑒與盧𤣥高允李靈等俱時被徴尋以其母老固辭鑒後位至徐州刺史隂孟貴性至孝每向田間耘耨早朝拜父世隆來亦如之鄉人欽其篤於事親胡叟少孤每言及父母則涙下若孺子之號春秋當祭之前則先求㫖酒美膳將其所知廣平甯嘗順陽馮翊田文宗上谷侯法雋提壺執爼至郭外空静處設坐奠拜盡孝思之敬位至武威將軍宋繇字體業生而父遼為張邕所誅繇五歳喪母事伯母張氏以孝聞八歳而張氏卒居喪過禮位至安遠將軍崔勉為散騎常侍征東將軍後還家屬母李氏喪亡勉哀毁過禮病卒崔孝政字季讓十歳父挺亡號哭不絶見者為之悲傷汝南王越辟行叅軍張敬伯平遠將軍讜之子也讜卒敬伯求致父喪出葬冀州清河舊墓久不被許停柩在家積五六年第四子敬叔先在徐州初聞父喪不欲奔赴而規南叛為徐州所勒送至乃自理後得襲父爵敬伯自以隨父歸國之功賜爵昌安侯出為樂陵太守敬叔武邑太守父喪得葬舊墓還屬清河張彛為黄門侍郎從孝文南征母憂解任彛居喪過禮送葬自平城達家千里徒歩不乗車馬年貌毁瘠當世稱之崔光韶亮從父弟也光韶事親以孝聞為司空從事中郎以母老解官歸養賦詩展意朝士屬和者數十人久之徴為司徒諮議固辭不受崔敬友除梁郡太守會遭所生母憂不拜命敬友精心佛道晝夜誦經免喪之後遂莱食終身崔光本名孝伯家貧好學晝耕夜誦傭書以養父母孝文太和六年拜中書慱士甄琛為侍中領御史中尉免歸本郡始琛以父母年老常求解官扶侍故孝文授以夲州長史及貴逹不復請歸至是乃還供養數年遭母憂服未闋復喪父琛於塋兆之内手種松栢隆冬之月負掘水土鄉老哀之咸助加功十餘年中墳成木茂長孫慮代人也母因飲酒其父貞呵叱之誤以杖撃便即致死貞為縣囚執貞處以重坐慮列辭尚書云父母忿争本無餘惡真以誤謬一朝横禍今母喪未殯父命旦夕慮兄弟五人竝幼冲慮身居長今年十五有一女弟始向四歳更相鞠養不能保全父若就刑交墜溝壑乞以身代老父命使嬰弱衆孤得蒙存立尚書奏云慮於父為孝子於弟為仁兄尋宄情狀特可矜感孝文詔特恕其父死罪以從遠流崔休字惠盛為尚書左丞宣武初以弟亡祖父未葬固求渤海於是除為雒州刺史在州數年母老辭州許之裴延雋少偏孤事後母以孝聞為幽州刺史後母隨延雋在州遇重患延雋啟求侍母還京療治仕至平秦太守裴仲規為司徒主簿父在鄉疾病棄官奔赴以違制免陽固為雒陽令丁母憂號慕毁瘠杖而能起練禫之後猶酒肉不進時固年踰五十而喪過於哀鄉黨親族咸歎服焉辛琛少孤曾過友人見其父母兄弟無恙垂涙久之位至揚州征南府長史辛雄字世賓釋褐奉朝請父於郡遇患雄自免歸晨夜扶抱及父喪居憂殆不可識為世所稱王續生榮陽京縣人遭繼母憂居喪杖而後起及終禮制鬢髪盡落有司奏聞世宗詔標旌門閭袁聿修字叔徳翻子也七歳遭喪居處禮若成人位至撫軍將軍令狐仕猗氏縣人兄弟四人早喪父泣慕十載奉養其母孝著鄉邑皇甫奴河東郡樂戸同郡楊風等七百五十人列稱奴兄弟雖沉屈兵伍而操尚彌高奉養繼親甚著恭孝之稱閻元明河東安邑人至孝母亡服終心喪積載每忌日悲動傍隣楊引武鄉襄垣人三歳喪父為叔所養母年九十三引年七十五哀毁過禮三年服畢恨不識父追服斬衰食粥麤服誓終身命經十三年哀慕不改樊子鵠為殷州刺史及爾朱榮之死世隆等遣書招子鵠欲與同趨京師子鵠不從以母在晉陽啟求移鎮河南莊帝嘉之除車騎大將軍豫州刺史郭文恭仕為太平鄉令年踰七十父母喪亡文恭孝慕㒺極乃居祖父墓次晨夕拜跪跣足負土陪祖父二墓寒暑竭力積年不巳見者莫不哀歎尚書奏聞標其門閭趙琰字叔起父温為楊難當司馬苻堅亂琰為乳母携奔壽春年十四乃歸孝心色養餁熟之節必親調之後為淮南王府長史時禁制甚嚴不聽越關葬於舊兆琰積三十餘年不得葬二親及蒸嘗拜獻未曾不嬰慕卒事每於時節不受子孫慶賀年餘耳順而孝思彌篤歳月推移遷窆無期乃絶鹽莱斷諸滋味食麥而已陸夸年二十遭父喪鬢髪致白每一悲哭聞者為之流涕盧義僖字遠慶早有學尚識度沉雅年九歳喪父便有至性為僕射李冲所歎美李顯達潁川陽澤人父喪水漿不入口七日鬢髪墮落形體枯悴六年廬於墓側哭不絶聲殆於滅性張昇榮陽人居父母喪鬢髪墮落水漿不入口吐血數升倉跋榮陽京縣人喪母水漿不入口五日吐血數升居憂毁瘠見稱州里楊𤣥就安西將軍仲宣之子仲宣為爾朱天光所害𤣥就幼而俊拔收捕時年九歳牽挽兵人謂曰欲害諸尊乞先就死兵人以刀斫斷其臂猶請死不止遂先殺之崔承宗齊州人其父仕漢中母喪因殯彼後青徐歸日遂為隔絶承宗性至孝萬里投險偷路負喪還京師黄門侍郎孫惠蔚聞之曰吾於斯人見亷范之情矣於是弔贈盡禮如舊相識門文愛汲郡山陽人早孤供養伯父母以孝謹聞伯父亡服未終伯母又亡文愛居喪持服六年哀毁骨立鄉人魏仲賢等相與標其孝義王静除趙郡太守以母老固辭不拜册府元龜卷七百五十四
