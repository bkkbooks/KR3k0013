body:
  text: 册府元龜巻五百二十二宋王欽若等撰憲官部私曲譴讓誣誷私曲夫耳目之官糺轄之任必資方正以崇風憲茍非其人即隳成式而廼夤緣公議快復私讐或造飛語風聞以汚黷良善或慿深文巧詆以傾陷忠賢城社是依搏擊莫及豈唯人之不幸抑亦國之巨蠧矣後漢胡种為司𨽻校尉與王宏有隙及宏下獄种遂迫促殺之宏臨命詬曰宋翼迂儒不足議大計胡种樂人之禍禍將及之种後眼輙見宏以杖擊之因發病數日死李暠為司𨽻校尉初蘇謙為扶風郡都郵時暠為美陽令與中常侍具瑗交通貪暴為民患前後監司畏其勢莫敢糺問及謙至部案得其贓論輸左挍謙累遷至金城太守去都歸鄉里漢法免罷守令自非詔徵不得妄到京師而謙後私至雒陽暠收謙詰掠死獄中暠又因刑其屍以報苦怨段紀明為司𨽻校尉紀明曲意宦官故得保其富貴遂黨中常侍王甫枉誅中常侍鄭颯董騰等晉荀愷為司𨽻校尉牽秀為司空從事中郎與帝舅王愷素相輕侮王愷奏秀夜在道中載髙平國守士田興妻秀即表訴彼誣論穢行文辭亢厲以譏抵外戚于時朝臣雖多證明其行而秀盛名美譽繇是而損遂坐免官宋荀伯子為御史中丞凢所奏劾莫不深相汚毁或延及祖禰示其切直又頗雜嘲戲故世人以此非之南齊袁彖為御史中丞坐彈謝超宗簡奏依違免官袁昻為御史中丞先是沈淵為御史中丞彈昻從兄吳興太守彖及昻為中丞到官數日奏彈淵子續父在僦白幰車免官禁錮陸澄為御史丞弟鮮為揚州主簿顧測以兩奴就鮮質錢鮮死子暉誣為買券測與澄書相往反後又牋與太守蕭緬云澄欲遂子弟之非未近義方之訓此趨販所不為況縉紳領袖儒宗勝達乎測遂為澄所排抑世以此少之梁到洽為御史中丞初劉孝綽與洽友善同㳺東宫孝綽自以才優於洽每於宴坐嗤鄙其文洽銜之及孝綽為廷尉卿携妾入官府其母猶停私宅洽遣令史案其事遂劾奏之云携少妹於華省棄老母於下宅髙祖為隠其惡改妹為姝坐免官陳劉孝儀為御史中丞與徐陵有隙及陵出為上虞令孝儀風聞劾陵在縣贓汙因坐免後魏高道悦為治書侍御史時徵兵䦧集道悦奏主文中散元志等稽違期㑹時道悦兄現為外兵郎中而道悦有黨兄之負孝文詔責然以事經恩宥遂寢而不論崔亮為御史中尉初邢巒為度支尚書侍中盧昶與巒不平昶與元暉俱宣武所寵亮昶之黨也昶暉令亮糾巒事成許言於帝以亮為侍中亮於是奏劾巒在漢中掠良人為奴婢亮外雖方正内亦承候時情宣傳左右郭神安頗被孝明識遇以弟託亮亮引為御史及神安貶後因集禁中孝明令兼侍中盧昶宣㫖責亮身在法官何故受左右嘱請亮拜謝而已無以上對王顯為御史中尉屬官不悉稱職諷求更換詔委改選務盡才能而顯所舉或有請嘱未皆得人於是衆口喧譁聲望致損北齊髙愼為御史中尉選用御史多其親戚鄉閭不稱朝望文襄奏令改選焉張子階為御史初畢義雲為司馬子瑞所彈而子瑞從兄消難為北豫州刺史義雲遣子階詣州采風聞先禁其典籖家客等消難危懼遂叛入周時論歸罪義雲雲具覆執子瑞事亦上聞以前讌賞義雲嘗預從此後集見稍疎聲望大損隋斐藴為御史大夫煬帝親征遼東以尚書左丞郎茂為晉陽宮留守恒山賛治王文同與茂有隙奏茂朋黨附下罔上詔遣納言蘇威與藴雜治之茂素與藴等不平藴因深文巧詆成其罪狀帝大怒及其弟司𨽻别駕楚之皆除名為民徙且末郡唐袁異式為監察御史初右相劉仁軌為給事中受詔按李義府殺畢正義之事仁軌既不曲掩其狀義府衘之繇是見排出為青州刺史俄又以運糧失船異式馳徃鞫之承義府之㫖逼仁軌令自殺辭曰仁軌効官不辦國有常刑公若以法斃之則將欲迯死亦不可得也今若遽自絞縊以快讐者竊所未甘心焉於是結奏仁軌罪詔削官爵令於遼東効力宇文融為御史中丞時中書令張説惡其為人屢排抑之融乃與崔𨼆甫劾奏説贓狀説繇是罷相張著為監察御史冠豸冠彈京兆尹兼御史中丞嚴郢於紫宸殿劾郢奉詔發人浚陵陽渠匿詔不時行故使奔蹙以歸怨於上帝即位之初侍御史朱敖請復制置朱衣豸冠於内廊有犯者御史服以弹帝許之又令御史得專弹舉不復闗白於中丞大夫至是著首行之乃削郢御史中丞而著特賜緋魚袋自是懸衣冠于宣政之左廊然著承楊炎意彈郢無何御史張滂復以朋黨私釁彈中丞元全柔衆議不直乃詔御史不得專舉竇參為御史中丞多率情壊法初定百官俸料以嘗為司直黨其官故給俸過於本寺丞又定百官班秩初令太常少卿在左右庻子之上又惡詹事李昇遂移詹事班退居諸府尹之下甚為識者所嗤嚴郢為御史大夫初郢為京兆尹兼御史中丞時楊炎為相惡其異已誣以他罪削兼中丞及盧杞將傾炎炎罷相乃引郢為御史大夫與恊謀發炎罪及河中觀察使趙惠伯下御史臺獄箠楚無騐搆成其罪貶炎于崖州惠伯于費州郢既報怨過當人頗不直郢後得罪既至費州道左睹柩殯問其姓名或曰得罪趙惠伯之殯也郢黙然慙恧嵗餘而卒李夷簡為御史初京兆尹楊慿在江西日夷簡自御史出官在廵屬慿頗疎縱不顧接之夷簡嘗切齒及慿歸朝修第於永寧里功作幷興又廣蓄伎妾於永樂里之别宅時人大以為言夷簡乗衆議舉劾前事且言修營之僣將欲殺之及下獄置對數日未得其事夷簡持益急上聞且貶焉追舊從事以騐自貞元已來居方鎭者為德宗所姑息故窮極僣奢無所疑忌及憲宗即位以法制臨下夷簡首舉慿罪故時議以為宜然繩之太過物議又譏其深切矣崔元畧任刑部郎中知雜時中丞改京兆尹物議以吏部郎中崔植有風憲之望元畧因入閣妄稱植失儀命御史彈之時二人皆進擬中丞㫖果授元畧植深衘之竇易直為御史中丞時吏部尚書鄭餘慶議僕射上曰儀制不當與隔品官元禮易直時奏非餘慶所議及易直為右僕射却行隔品致敬之禮時論非之譴讓周官小宰之職所以糾邦禁秦制御史之任所以持國憲蓋言責之攸重必剛正以自守官或有曠咎將焉徃若乃論奏失中案劾非實稽留諸事抑滯枉愬逮捕而靡審報聞而自擅畏避不舉違慢弗恭縱吏受賕徇私成黨舞文以巧詆罔上以飾詐忘書馬之為愼恣逆鱗而忤㫖自作弗靖罔求諸已用是譴罷實取衆棄其有備員臺署懵視簡牘不練習於舊典惟專事於外剛蔑聞令猷實損朝望繇兹坐免不亦媿乎後漢鮑永光武建武中為司𨽻校尉大司徒韓歆坐事永固請之不得以此忤帝意出為東海相鮑昱為司𨽻校尉明帝永平五年坐救火遲免晉傅祗為司𨽻校尉楚王瑋之矯詔也祗以聞奏稽留免官范㤗為御史中丞坐議殷祠事謬白衣領職宋王凖之為御史中丞坐世子右衞率謝靈運殺人不舉免官何承天為御史中丞尚書左丞謝元舉承天賣茭四百七十束與官屬求貴價承天坐白衣領職南齊陸澄為御史中丞太祖建元元年驃騎諮議沈憲等坐家奴客為刼子弟被劾憲等晏然左丞任遐奏澄不糺請免澄官澄上表自理言舊例無左丞糺中丞之義詔外詳議尚書令褚彦囘簡宋已來左丞糺正而中丞不糾免官者甚衆奏澄諛聞膚見貽撓後昆上掩皇明下籠朝職請以見事免澄所居官詔曰澄表據多謬不足深劾可白衣領職梁張緬為御史中丞坐收捕人與外國使鬬左降黄門兼領先職陳王政為御史中丞時始興王叔陵所作尤不軌侵滛上聞宣帝遣責政以不舉奏免政官北齊髙愼為御史中丞以不稱朝望文襄奏令改選焉愼前妻吏部郎中崔暹妹為愼所棄暹時為文襄委任愼謂其搆已性既狷急積懷憤恨因是罕有糾劾多所縱舍髙祖嫌責之彌不自安出為北豫州刺史袁聿修為司徒左長史加驃騎大將軍領兼御史中丞司徒録事叅軍盧思道私貸庫錢四十萬聘太原王文女為妻而王氏已先納陸孔文禮聘為定聿修坐為首寮又是國之司憲知而不劾被責免中丞隋張衡為御史大夫煬帝欲大汾陽宮令衡與紀宏整具圖奏之衡承間進諫曰比年勞役繁多百姓疲弊伏願留神稍加折損帝意甚不平後嘗目衡謂侍臣曰張衡自謂繇其計畫令我有天下也時齊王暕失愛於上帝宻令人求暕罪失有人譛暕違制將伊闕令皇甫翊從之汾陽宮又録前幸涿郡及祠北嶽時父老謁見者衣冠多不整帝譴衡以憲司皆不能舉正出為榆林太守劉子翊大業中為侍書侍御史從幸江都値天下亂帝猶不悟子翊因侍切諌繇是忤㫖令子翊為丹陽留守唐泰令言為監察御史時雒州長史譙國公許力士以子欽明犯奸贓配流建州令言以按事失實解任初令言受詔推欽明客謂令言曰君䑕目不應利見戒在奏事令言曰此素所便也不習而入及奏不稱且謂力士為許長史帝怒曰對我猶喚許長史此豈推得事更令法司重鞫之力士又侵居人田宅以廣園池占渚田以為馬牧繇是力士令言皆得罪崔謐為御史中丞以推明崇儼事失實貶為䖍州長史張洽為御史中丞開元十年以雒陽縣主簿王鈞坐贓杖殺之𤣥宗謂宰相張嘉貞曰兩臺御史河南尹韋湊作何政理遣吏官侵漁朕思復淳風永懐夀域輦轂之下豈圖有此等官慢法何謂有司春秋責帥即其義也嘉貞對曰陛下深愛黎元為之除害韋湊等不明不肅實負聖朝臣望各貶其官以勸長吏即日遂貶湊為曹州刺史洽為通州司馬韋陟肅宗至德中為御史大夫時右拾遺杜甫上表論房琯尚有大臣度眞宰相噐聖朝不容詞㫖迂誕帝令崔光逺與陟及憲部尚書顔眞卿同訊之陟入言甫所陳讜言論房琯被黜不失諫臣大體帝由此益疎遂罷御史大夫受吏部尚書房宗􅟠為御史中丞建中元年坐與劉晏友善貶䖍州司馬楊䕶代宗大歴八年為殿中侍御史分職左廵時郇模哭市䕶不聞奏帝以為壅蔽貶䕶為連州桂陽縣丞員外置呂渭為殿中侍御史德宗初即位以李􅉼為太子少傅充山陵副使渭為判官上言􅉼父名少康今官名犯諱恐乖禮典宰相崔祐甫奏曰若朝廷事有乖舛羣臣悉能如此實太平之道除渭司門員外郎尋有人言􅉼昔為宗正少卿此時無言今為少傅渭妄有奏議詔曰呂渭僣陳章奏為其本使薄訴官名朕以宋有司城之嫌晉有司曹之諱歎其忠於所事亦謂確以上聞乃加殊恩俾膺厚賞近聞所陳少字徃歲已任少卿昔是今非罔我何甚豈得謬當朝典更側周行宜佐遐藩用誡薄俗可歙州司馬同正繇是改􅉼為簡校工部尚書兼光禄少卿仍充山陵副使崔薳貞元十九年為監察御史初建中元年勅京城諸使及府縣季終命御史分曹廵按繫囚省其寃濫以聞近年以此軍職在禁宻移牒而已御史未嘗至其軍薳任官近嚴明遇下下思陷之知薳不練故事令至右神䇿軍云奉制廵覆軍使等以為持有制令御史推覆不詳其舊例也頗驚愕軍中遽奏之帝發怒笞薳四十配崖州元稹憲宗元和五年為監察御史分司以攝河南尹房式於台擅令停務罰俸料一季追赴西臺旋貶江陵府士曹叅軍盧則為監察御史出按連州刺史崔簡得實及還其下吏受觀察使李衆賂綾六百疋簡弟計訴推吏决杖配流勑御史出使動為摽式功在肅下不唯撿事監察御史盧則奉使推鞫致使官曲犯贓被人告訴失在周愼亦可薄懲宜停見任韋乾度元和十二年為御史中丞時監察御史韋楚材請按河中觀察使趙宗儒擅用貯備凶荒羨餘錢及贓罰錢米貫石數至八萬詔監察御史崔鄯覆則宗儒以行營軍用且有詔命以楚材舉不實貶為江陵兵曹叅軍楚材以無公劵因宿於城東别墅三日方逹藍田縣㑹乾度疏理楚材事楚材素與裴度善時度與李逄吉不叶憲宗以事連宰相故召給事中張賈中書舎人李程召乾度及比部郎中兼侍御史知雜宋景兼追楚材等鞫辯之其所追堂帖先至商州數日後楚材方到帝皆知之又本推覆楚材所舉趙宗儒事御史崔鄯稱奉使囘謁辭乾度於私第乾度引之外堂約鄯令附㑹楚材事故兼以崔鄯同鞫之於是貶乾度為朗州刺史宋景為韶州司馬景初被鞫對曰侍御史知雜事所以賛中丞也今若以乾度為過即景無所逃責故貶焉李道樞敬宗寳歴初為侍御史被酒詣中丞獨孤朗宅請事醉不能去即劾奏之故以道樞為太子司議郎分司東都王源植寳歴二年為殿中侍御史源植於衢路為教坊樂伎所侮源植道從訶叱不止遂成忿競京兆尹劉栖楚科責伎者訴於本司因有詔令御史臺勘詰時中丞獨孤朗論之稍過帝怒遂貶源植為昭州司馬同正髙少逸寳歴二年為侍御史時金吾將軍李岵入閣失儀少逸為知彈御史以不彈奏貶太子左賛善大夫御史丞獨孤朗侍御史竇鞏不彈奏少逸宜各罰一月俸温造為御史中丞文宗太和二年宮中遺火造奏初聞宮中遺火緣妖賊竝禁在臺恐有奸謀遂追集人吏設備隄防然後奔走入朝到稍在後兩廵使崔宜姚合其日臺中忽聞有火遂追集所領赴朝堂到稍在後臣等職列紀律之次庻寮動皆取則若不重罰難勵衆情自罰三十直宜合請各罰三十直宰臣等奏禁中火焰所及迫近正衙宰相已下皆在火所御史中丞合率僚屬先至闕下其日兩廵使直至申時火㓕始到中丞隔宿追朝隨例方至物情不可議論喧然其所議罰纔比臺司錯失既以上聞又不待罪有乖敬愼恐須别議責罰奉勅事出非常臺有妖賊官曹警備亦謂慮周即合待罪朝堂候聽處分量罰自許事渉乖儀温造姚合崔宜等各罰一月俸所請罪錢宜竝放賜梁蕭頃為御史司憲太祖開平三年鄆州百姓劉郁於駕前陳狀論金吾大將軍石彦辭賣宅不肯交割經御史臺論理不為推窮事頃與侍御史盧庥各罰兩月俸孔邈為殿中侍御史乾化元年貶為同州瀓縣尉以扈從北征後至行在故也鄭觀為監察御史乾化二年御史臺奏准堂帖送到臘饗行事官秘書監苗暐等五人狀稱十二月二十六日臘祭百神十九日早於都省受誓戒至午時監察御史鄭觀狀稱其日泥雪稍深所乗驢畜瘦劣墜車數四遂至遲違者奉勅國之重典祀事為先監察御史本虞不恪今則衆官晨興已到御史日晏方來既紊國章難虧朝典其鄭觀宜停見任後唐崔協為御史中丞莊宗同光中與殿中侍御史韋棁魏遜詣東上閣門進狀待罪罰俸有差刑獄奏牘脱畧文字故也趙玉為侍御史明宗天成四年七月推劾汴州相國寺僧崇德宗内誤書僧審方入罰一月俸盧損末帝清泰三年為御史中丞初延州保安鎭將白文審郡之劇賊髙行周作鎭時差人徃替不受代屬前年春擾亂文審專殺郡人趙思謙等十餘人後經赦放罪去年春思謙弟思誨詣闕訴兄之寃帝亦素知文審之兇惡宻令本道捕之下獄遣殿中少監張仁愿於鄜州置獄推鞫文審伏殺十餘人罪未盡疑乃追赴京師連坐者二十八人繫臺獄方按鞫屬五月十二日御札自今年五月十二日已前除五逆十惡放火刼舎持杖殺人外竝委長吏如已得事情或未見贓驗不在追窮枝蔓以所招疾速斷遣損為人輕易即破械釋文審後奏帝大怒復收文審誅之堂帖勘臺公文云奉德音釋放不得追領祗證中書詰云御札云不在追窮枝蔓無不得追領祗證六字擅添改勅語詔責授右賛善大夫知雜御史韋棁責授太僕寺丞侍御史魏遜責授太府寺主簿王岳責授司農寺主簿晉薛融為御史中丞髙祖天福四年融乗馬入尚書省門罰俸一月李鼎為侍御史天福八年勅曰李鼎方居憲府合禀朝章豈可八月中喪妻十月後供狀欺公冐寵以死為生既彰罔上之愆難處觸邪之地止停見任尚示寛恩宜勅停見任初侍御史鄭摶彈奏云伏見李鼎今月十一日衙謝妻陳叙封事察認羣言似踰常例臣遂簡詳按内具李鼎去年八月中請妻亡准式假十月終供狀請叙封有此過尤致招羣論竊循職分理合舉明者勅下臺司勘狀不虛鼎稱准去年七月十七日德音特叙封鼎妻八月中病亡十月内中書大例遍取朝臣父母妻官諱邵氏遂供文狀自後不解開落申報者所司奏聞遂有是命周邊歸讜為御史中丞顯德五年奪俸一季先是百官因事班於廣德殿門外歸讜忽爾厲聲聞於帝座觀者無不悚然故寘於罰誣誷夫職司邦憲位振朝綱則必篤之以嚴明守之以正直行之以禮奉之以仁故法靡不通事無不舉若乃誣誷以肆其意髙下以快其心或以報仇讐或以伸怨憾或搆䜛以成其罪或邀寵以重其法無辜受禍因私被戮夫如是茍逃人患必致天誅士君子束髪從官出身事主可不鍳於斯而已夫唐來子珣為侍御史天授二年臘月誣搆文昌左相魏王承嗣文昌右相岑長倩監修國史殿中監河内王懿宗兼簡校右金吾衞大將軍雅州刺史劉行實及弟渠州刺史行瑜尚衣奉御行感并兄子鷹揚衞將軍䖍通竝以謀反誅來俊臣累遷侍御史天授初王公百僚皆勸革命右衞將軍李安靜太子少保綱之孫獨義形於色無所陳請及被收下制獄俊臣詰其反狀安静謂曰以我是唐家老臣須殺任殺若問以謀反實無可對俊臣竟誣搆殺之二年臘月劉行感兄弟坐謀反制令納言史務滋與俊臣同鞫其獄俊臣奏言務滋素與行感周宻意欲寢其反狀則天怒令俊臣鞫之務滋恐被陷於極刑遂自殺俊臣遷御史中丞三年十月奏鳳閣侍郎任知古地官侍郎狄仁傑冬官侍郎裴行本司農卿裴宣禮前文昌右丞盧獻御史中丞魏元忠潞州刺史李嗣眞竝謀逆請誅之制不許特令免死文昌左相魏王承嗣曰仁傑等包藏逆節事迹竝彰陛下雖欲屈法申恩無以懲艾凶慝則天曰朕好生惡殺志在恤刑渙汗已行不可更返殿中侍御史霍獻可奏曰陛下不殺裴宣禮等臣請絶命於前遂以頭觸殿階流血覆面獻可即禮之甥以此表人臣之節鳳閣舍人向光道侍御史張知黙又極言請誅之不許唯左授知古江夏縣令仁傑彭澤令宣禮夷陵令元忠涪陵令獻西鄉令行本嗣眞流於嶺表又羽林將軍蘇幹遷東官尚書俊臣素忌疾之遂誣奏在魏州與瑯琊王冲書疏徃復囚繫獄發憤而卒又泉獻誠為右衞大将軍俊臣怒遂誣其謀反縊殺之又俊臣與太僕少卿李昭德素不協遂誣搆以反罪姚庭筠為御史中丞節愍太子之舉兵魏元忠子昇為其脇從遂稷為亂兵所殺庭筠誣奏曰臣聞貞觀中兵部尚書侯君集有社稷元勲蒙賜鐵劵后與太子承乾謀反法司斷以極法太宗臨朝謂羣臣曰君集有功于國朕將乞其性命公卿等許我乎于時羣臣爭進皆云君集擬傾危社稷天地不容請處斬之以明大法太宗涕泣與訣令依國典斬於四達之衢以謝天下其后房遺愛薛萬徹及齊王祐等作逆雖是懿親皆從國法誅戮今魏元忠與李多祚等結搆謀反并男俱入逆從陛下仁恩欲掩其過臣今訐揚是犯龍鱗忤主意但以事緣宗社豈能希㫖不言且元忠功不逮君集身又非國戚君集等反形讒見未有兵戈元忠等兵纒紫微圍逼宸座今朝廷諠議皆云據元忠釁逆合赤族汙宮在朝廷有朋黨寛救其惡為飾詐詞以惑聖聽昔宣尼為魯司㓂七日誅少正卯臣蒙擢居憲司已經十日不能誅鋤逆黨息朝廷紛議可謂素飡尸禄負陛下鼎鑊之烹願行兩觀之誅以絶四凶之慝中宗頗然之繇是貶元忠宋州員外司馬冉祖雍為侍御史與冬官侍郎朱敬則不協遂誣其與王同皎親善貶授涪州刺史未行朝廷知其非罪轉廬州刺史俄以疾卒宇文融為御史中丞開元中盧從愿代韋抗為刑部尚書頻年充較京外官考使前後咸稱允當時融承恩用事以括獲田之功本司校考為上下從愿抑不與之融頗以為恨遂宻奏從愿廣占良田至有百餘頃其後𤣥宗嘗擇堪為宰相者或薦從愿帝曰從愿廣占田園是不亷也遂止不用楊國忠貴妃從父之子天寳中為監察御史時李林甫於皇太子有不利之釁乃潛圖傾覆以避後患侍御史楊愼矜承望風㫖宻誣奏韋堅與皇甫惟明私謁太子状以兾動揺𤣥宗素知太子無他愼矜因舉其别犯奏議畏却以國忠怙寵敢言援之為黨使接其事京兆府法曹吉温深文醜誣為國忠爪牙固深竟堅及太子良姊親屬柳績杜昆吾等痛繩其罪以樹權於長安中别起推事院自是嵗連大獄追捕擠陷誅夷者數百家皆國忠發之林甫方以深阻保位國忠凢所劾奏渉疑似於太子者林甫雖不明言以指導之皆林甫所使國忠乗而為邪得以肆意累遷御史中丞日加親幸初楊愼矜白林甫引王鉷為御史中丞同其奸謀及大獄屬搆帝終無疑太子意愼矜稍自退将避後禍因與鉷有隙鉷與國忠連奏愼矜抵以不道誅於是權傾内外公卿累息唐旻肅宗時為御史誣蒲州刺史顔眞卿貶饒州刺史竇羣性險躁喜營為與李吉甫善元和三年吉甫擢為御史中丞及得權反與知雜事呂温侍御史羊士諤等黨比同搆陷吉甫每隂伺其過吉甫嘗召術者陳登宿於安邑第翌日羣命吏捕登考鞫偽搆吉甫陰事宻以上聞憲宗召登立辯其偽貶温為均州刺史士諤資州刺史羣出為潭州刺史既行又貶為黔州刺史韋楚材為監察御史元和十二年楚材請按河中觀察使趙宗儒擅用貯備凶荒羨餘錢及贓罰錢米貫石數至八萬詔發監察御史崔鄯覆之則宗儒以行營軍用且詔命三州分數不同勑趙宗儒取晉絳等州錢物事皆有繇水旱錢减亦為明據遂釋放以楚材舉不實貶楚材為江陵府兵曹叅軍册府元龜卷五百二十二
