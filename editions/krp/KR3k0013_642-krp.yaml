body:
  text: 册府元龜卷六百四十二宋王欽若等撰貢舉部條制第四後唐明宗長興元年二月勑傳科不精公糓虚有其名禮科未逹周儀如何登第兼知前後空聞定制去留皆在終塲博通者混雜以進身膚淺者僥求而望事湏頒明勑俾叶公途自此後貢院應試三傳三禮宜令准進士九經五經明經例逐塲皆湏去留不得候終塲方定仍具所通否粗一一旋於牓内吿示其學䆒不在念書可特示墨義三十道亦准上指揮如此則人知激勸事有區分主司免致於繁忙舉子不興於僣濫仍所司學䆒不念書新例也國朝所設五科唯學䆒文書最少乃令念其經而通其義故曰學䆒今秪許對義即學者皆専於此科時論非之五月勑宏詞㧞萃明筭道舉百篇等科並宜停廢六月中書門下奏勑新及第進士所試新文委中書門下細覧詳覆方具奏聞不得輙狥人情有隳事體中書於今年四月二十九日帖貢院准元勑指揮中書量重具詳覆者李飛賦内三處犯韻李糓一處犯韻兼詩内錯書青字為清字並以詞翰可嘉望特恕此誤今後舉人詞賦屬對並湏要切或有犯韻及諸雜違格不得放及第仍望付翰林别撰律詩賦各一首具體式一一曉示將來舉人合作者即與及第其李飛樊吉夏侯珙吳油王徳柔李糓等六人盧價賦内薄伐字合使平聲字今使仄聲字犯格孫澄賦内御字韻使宇字已落韻又使膂字是上聲有字韻中押售字是去聲又有朽字犯韻詩内田字犯韻李象賦内一句六石慶兮並合使此奚字道之以禮合使此導字及錯下事嘗字韻内使方字詩中言十千十字處合使平聲字偏字犯韻楊文龜賦内均字韻内使民字以君上為驂騑之士失奉上之體兼善字是上聲合押徧字是去聲如字内使輿字詩中徧字犯韻師均賦内仁字犯韻晏如書晏如又河清海晏晏字不合韻又無理晏字即落韻楊仁遠賦内賞罰字書伐字衘勤字書鍼字詩内蓮蒲字合着平聲字兼黍粱不律王谷賦内御字韻押處字上聲則落韻去聲則失理善字韻内使顯字犯韻如字韻押殊字落韻其盧價等七人望許令將來就試仍放再取文解高䇿賦内於字韻内使依字疑其海外音訛文意稍可望特恕此其鄭朴賦内言肱股詩中十千字犯韻又言玉珠其鄭朴許令將來就試亦放取解仍自此賔貢毎年祗放一人仍湏事藝精奇張文寳試士不得精當望罰一季俸今後知舉官如敢因循當行嚴典伏以國設高科人貪上第所望不小其業湏精實以喪亂年多苦辛人少半失宣尼之道倍勞宗伯之心不望超羣且湏合格今逢聖運大闡皇猷設官共革於時訛選士實期於嵗勝又朝廷較藝為擇賢或臣下收恩豈成公道時論以貢舉官為丘門恩門及以登第為門生門生者門弟子也顔閔㳺夏等並受仲尼之訓即是師門大朝所命春官不曽敎誨舉子舉子是國家貢士非宗伯門徒况又斥先聖之名失為儒之體今後及第人放牓時並湏據才藝高低從上依次第安排不得以隻科取鼎島岳斗之名為貴兾從敦實以息浮澆兼不得呼春官為恩門師門不得自稱門生除賜宴外不得輙有率歛别謀歡㑹曽赴舉落第人無故不得改名將來舉人並依據地理遠近於十月三旬下納文解如違不在收受之限勑㫖從之七月比部員外郎知制誥崔稅奏臣伏見開元五年勑毎年貢舉人見訖宜令引就國子監謁先師學官為之開講質疑所司設食永為常式自經多故其禮寖停請舉舊典從之八月勑其童子准徃例委諸道表薦不得解送兼所司毎年所放不得過十人仍所念書並湏是部帙正經不得以諸雜零碎文書虚成卷數兼及第後十一選集第一任未得授親人官是月勑今後吏部所應宏詞㧞萃宜並權停其貢院據見應進士九經五經明經並五科童子名外其餘諸色科名亦宜並停十二月毎年貢舉人所試詩賦多不依體式中書奏請下翰林院命學士撰詩賦各一首下貢院以為舉人模式學士院奏伏以體物縁情文士各推其工拙掄材校藝詞塲素有其規程凡務䇿名合遵常式况聖君御宇奥學盈朝儻令明示其規模或慮衆貽其臧否厯代作者垂範相傳將期絶彼微瑕未若舉其舊制伏乞下所司依詩格賦樞考試進士庶令職分互展恪勤從之二年二月禮部貢院奏當司奉堂帖夜試進士有何條格者勑㫖秋來赴舉備有常程夜後為文曽無舊制王道以明規是設公事湏白晝顯行兾盛觀光猶敦勸善毎取翰林學士徃例皆試五題共觀筆下摛詞不俟燭前搆思其進士並令排門齊入就試至門開時試畢内有先了者上厯晝時旋令先出其入䇿亦湏晝試應諸科對䇿並依此例餘准前後勑格處分夜試進士非前例也六月刑部員外郎和凝奏臣竊見明法一科久無人應今應令請減其選限必當漸舉人謹按考課令諸明法試律令十條以識逹義理問無疑滯者為通所貴懸科待士自勤講學之功為官擇人終免曠遺之咎况當明代宜舉此科勑㫖宜升明法一科同開元禮選數兼赴舉之時委貢院别奏請㑹刑法試官依格例考試先是天成三年十一月權判大理寺蕭希甫上言曰臣聞禁暴亂者莫先於刑律勤禮義者無切於詩書刑律明則人不敢為非禮義行則時自然無事今詩書之教則業必有官刑律之科則世皆莫曉近者大理正宋昇請置律學生徒雖獲上聞未蒙申舉伏乞時頒詔㫖下付國庠令再設此科許其嵗貢仍委諸州各薦送一兩人就京習學候至業成便放出身兼許以卑官却還夲處則率土之内盡㑹刑書免誤觸於金科兾咸遵於皇化至是凝復奏請三年正月詔曰貢舉之人辛勤頗甚毎年隨計終日食貧湏寛奬勸之門俾釋覊棲之歎今後落第舉人所司已納家狀者次年便付所司就試並免再取文解兼下納文解之時不在拘以三旬但十月内到者並與收受十二月禮部貢院奏准㑹要長夀二年七月十日左拾遺劉承慶上疏曰伏見比年已來天下諸州所貢方物至元日皆陳在御前惟貢人獨於朝堂列拜伏請貢人至元日列在方物之前以備充廷之禮制曰可近年直至臨鏁院前赴應天門外朝見今後請令舉人復赴正仗仍縁今嵗已晩貢士未齊欲且據見到人㸃引牒送四方舘至元日請令通事舍人一員引押朝賀列在貢物之前或以人數不少即請祗取諸科解頭一人就列其餘續到者候齊日别令朝見如蒙允許當司即於都省㸃别習儀奉勑宜准元勑處分餘宜依四年二月知貢舉和凝奏舉人就試日請皇城司差人於院門前聴察舉人挾帶文書入院請殿將來舉數自一舉至三舉放牓後及第人看牓訖便綴行於五鳳樓前謝恩後赴國學謝先師舊例侵星張牓訖貢舉考試官便出院盖恐人牓下諠訴今年請放牓後貢舉官已下至晩出勑㫖五鳳樓前非舉子謝恩之所令於朝堂謝訖即赴國學試日宜令御史臺差人院司聴察放牓日至晩出院此後永為定制餘並依奏是月禮部貢院奏新立條件一九經五經明經呈帖經之時試官書通不後有不及格者唱落後請置筆硯將所納由分明却令自看或是試官錯書通不當與改正如懐疑者使許請本經書面前撿對如實是錯誤即更於帖上書名而退一五科常年駮牓出多稱屈塞今年並明書所對經書墨義云第幾道不第幾道粗第幾道通任將本經書疏照證如考試官錯書不粗請别將狀陳訴當再加考校如實錯誤妄陳文狀當行嚴斷一今年舉人有抱屈落第者許將狀披訴貢院當與重試如貢院不理即詣御史臺論訴請自試舉人日令御史臺差人受舉人訴屈文狀并引本身勘問所論事件或知貢舉官及考試官已下取受貨賂昇擢親情屈塞藝能應副囑託及不依格去留一事有違請行朝典一懐挾書䇿舊例禁止請自今年後入省門捜得文書者不計多少准例扶出殿將來一舉上鋪後捜得文書者准例扶出殿將來兩舉一遥口授人廻授試處及抄義題帖書時諸般相救准例扶出請殿將來三舉一自是藝業未精准格落下出外及見駮牓後羞見同人妄扇屈聲擬為将來基址及别人帖對過塲數多者便生誣玷墜䧟或羅織毆罵者並當收禁牓送御史臺請賜勘窮如知貢舉官及考試官事渉徇私屈塞藝士請行朝典若虚妄者請痛行科斷牒送本道重處色役仍永不得入舉塲同保人亦請連坐各殿三舉奉勑宜依三月童子閻惟一等三十九人進狀伏見貢院牓童子祗放十人乞念苦辛更加人數勑㫖都收二十人湏是實苦辛者仍此後不得援末帝清泰元年九月中書門下帖太常以長興三年勑諸科舉人常年薦送先令行鄉飲酒之禮凡預舉人列從鄉賦遂奏鹿鳴之什俾騰龍化之津雅音既動於笙簧厚禮復陳於筐筥行兹盛事克振儒風宜令復行鄉飲酒之禮太常草定儀注頒下諸州預前肄習解送舉人之時便行此禮其儀速具聞奏時李懌為太常文士淺於禮學唯博士叚顒據禮記賔主次第申初長興中宰臣李愚好古奏行此禮累年不暇至是愚復舉奏及觀禮官所定無緒禮直官孫知訓以為古禮無次序不可施行博士或言於愚曰梁朝時青州曽行一度遂令青州訪舊簿書以聞二年七月御史中丞盧損言天成二年二月勑毎年進士合有聞喜宴春闗宴并有司所出春闗牒用綾紙並官給臣等以舉人既成名第宴席所費屬私况國用未充枉有勞費請依舊制不賜詔曰春闗冬集綾紙聞喜闗宴所賜錢並仍舊官給餘從之九月禮部貢院言選制勑内該合行二十五道理有未盡條例長興四年詔明經對墨義已前無此條例清泰二年二月詔明經念疏毎問三道後許請熟卷都問十道通六即放入䇿天成五年二月詔學䆒不念書試墨義三十道清泰二年三月詔學䆒依舊念書并注十道後别試墨義十道及格即放入䇿長興二年二月詔進士引試早入試晩出者今請依舊例進士試雜文並㸃門入省經宿就徃例童子表薦不解送毎年所放不過十人長興四年三月詔許放二十人應順元年正月詔許放十五人今請如最後勑人數長興元年詔進士九經五經明經五科童子外諸色科目並停縁舊有明筭道舉令欲施行長興二年正月詔毎年落第舉人免取文解今欲依元格諸科並再取解以十月二十五日到省畢違限不收以天成四年詔諸色舉人入試前五日納試紙用中書省印訖付貢院院司縁五科所試塲數極多旋用紙鏁宿内中書徃來不便請祗用當司印從之其月舉人張洞而下以去年落第人各於鄉里取解以試期近來徃不及乞今年且徇舊例從之來年即勒本州取解三年五月明經崔貺等經中書訴宋州節度掌書計上封事貢舉人湏依舊格取本州里文解者見附國子監諸生赴舉皆不取文解條例異同詔曰凡布化條惟務均一茍公平之無爽即中外以適從國子監毎舉舉人皆自四方來集不詢解送何辨是非其附監舉人並依去年八月一日勑湏取本處文解如不及第者次年便許監司解送若初投名未嘗令本處取解者初舉落第後監司勿更收補其淮南江南黔蜀遠人即不拘此例監生禮部補令式在焉晉髙祖天福三年三月翰林學士承㫖兵部侍郎權知貢舉崔稅奏臣謬蒙眷渥叨掌文衡實憂庸懦之材不副捜羅之㫖敢不揣摩頑鈍絶杜阿私上則顯陛下求賢次則使平人得路但以今年就舉比常嵗倍多科目之中兇豪甚衆毎駮牓出後則時有喧張不自省循但言屈塞互相朋扇各出言詞或云主司不公或云試官受賂實慮上逹聖聴微臣無以自明晝省夜思臨深履薄今臣欲請令舉人落第之後或不甘心任自投狀披陳却請所試與疏義對證兼令其日一甲同共較量若獨委試官恐未息詞理儻是實負抑屈則所司固難逭憲章如其妄有陳論則舉人乞痛加懲斷兾此際免虚遭謗議亦將來可遠久施行儻蒙聖造俞允伏乞降勑處分從之四年六月勑尚書禮部厯代懸科為時取士任使貴期於稱職捜羅毎慮於遺才其如銓司注官員闕有限貢闈考第人數不常雖大朝務廣於選求而常調頗聞於淹滯毎候一闕或經累年遂令覊旅之人多起怨咨之論將令通濟湏識從權庶幾進取之流更勵専勤之業其貢舉公事宜權停一年五年三月詔及第舉人與主司選勝筵宴及中書舍人靸鞋接見舉人兼兵部禮部引人過堂之日幕次酒食㑹客悉宜廢之四月禮部侍郎張允奏曰明君側席雖切旁求貢士觀光豈宜濫進竊窺前代未設諸科始以明經俾昇髙第自有九經五經之後及三禮三傳已來孝亷之科遂因循而不廢縉紳之士亦緘黙而無言以至相承未能改作毎嵗明經一科少至五百已上多及一千有餘舉人如是繁多試官豈能精當况此等多不䆒義唯攻帖書文理既不甚通名第豈可妄與且當年登科者不少相次起選者甚多州縣之間必無貢闕輦轂之下湏有稽留怨嗟自此而興謗讟因兹而起但令廣塲大啟諸科並有明經者悉包於九經五經之中無出於三禮三傳之内若無釐革恐未便宜其明經一科伏請停廢又奏國家懸科待士貴務捜揚責實求才湏除訛濫童子毎當就試止在念書背經則雖似精詳對卷則不能讀誦及名成貢院身返故鄉但刻日以取官更無心而習業濫蠲徭役虚占官名其童子一科亦請停廢勑明經童子宏詞㧞萃明筭道舉百篇等科並停六年五月勑明法一科今後宜令五選集合格注官因仍優與處分少帝開運元年八月詔曰明經童子之科前代所設盖期取士良謂通規爰自近年暫從停廢損益之機未見牢籠之義全虧将闡斯文宜依舊貫庶臻至理用廣旁求其明經童子二科今後復置十一月工部尚書權知貢舉竇貞固奏進士考試雜文及與諸科舉人入䇿厯代已來皆以三條燭盡為限長興二年改令晝試伏以懸科取士有國常規沿革之道雖殊公共之情難失若使就試兩廊之下揮毫短景之中視晷刻而惟畏稽遲演詞藻而難求妍麗未見觀光之美但同欵答之由既非師古之規恐失取人之道今於考試之時准舊例以三條燭為限其進士并諸色舉貢人等有懐蔵書冊入院者舊例扶出不令就試近年以來雖見懐蔵多是容縱今欲振舉弛紊明辨臧否兾在必行庶為定式十二月勑禮部貢院自前考試進士皆以三條燭為限并諸色舉人等有懐蔵書冊不令就試宜並准舊施行從竇貞固奏也漢隐帝乾祐二年刑部侍郎邉歸讜上言臣竊見毎年貢舉人數甚衆動應五舉六舉多至二千三千既事業不精即人文何取請勑三京鄴都就道州府長官合發諸色貢舉人文解者並湏精加考校事業精研即得解送不得濫有舉送兾塞濫進之門開興能之路勑從之其間條奏未盡處下貢院録天福五年四月二十七日勑文告諭天下依元勑條件施行如有故違其隨處考試官員當准勑條處分周太祖廣順二年二月禮部侍郎趙上交奏貢院諸科今欲不試泛義口義共十五道改試墨義共十一道從之三年正月戸部侍郎權知貢院趙上交奏九經舉人元帖經一百二十帖墨義三十道臣今欲罷帖經於諸經對墨義一百五十道五經元帖八十帖墨義二十道今欲罷帖經令對墨義一百道明經元帖書五十帖今欲罷帖書令對義五十道明法元帖律令各十帖義二十道今欲罷帖律令對義二十道學䆒元念書二十道對義二十道今欲罷念書對義五十道三禮元對墨義九十道三傳元對義一百一十道欲三禮於周禮儀禮各添義二十道三傳於公羊榖梁傳各添義二十道開元禮三史元義三百道欲各添義五十道進士元添試詩賦各一首帖書二十帖對義五道欲罷帖書别試雜文二首試䇿並仍舊童子元念書一十四道欲添念通前五十道念及三十道者放及第從之九月翰林學士承㫖刑部侍郎知制誥權知貢舉徐合符奏貢舉之司條貫之道有沿有革或否或臧盖趣向之不同致施行之有異今欲酌其近例按彼舊規叅而用之從其可者謹條如右九經元格帖經一百二十帖對墨義汎義口義共六十道䇿五道去年知舉趙上交起請罷帖書汎義口義都對墨義一百五十道合今請去汎義口義都對墨義六十道其帖書對䇿依元格五經元格帖書八十帖對墨義五十道臣今請對墨義十五道其帖書對䇿依元格明法元格帖律令一十帖對律令墨義二十道䇿試十條去年罷帖對墨義六十道䇿試如舊臣今請並依元格學䆒元格念書對墨義各二十道䇿五道去年罷念書都對墨義五十道今請依去年起請三禮元格對墨義九十道去年添四十道臣今請並依元格三傳元格對墨義一百一十道去年對四十道臣今請並依元格開元禮三史元格各對墨義三百道䇿五道去年加對五十道臣今請並依元格進士試雜文詩賦帖經二十帖對墨義五道去年代帖經對義别試雜文二首臣今請依起請别試雜文其帖書對義請依元格童子元格念書二十四道起請添念書都五十道及三十通者放臣請依起請勑國家開仕進之路設儒學之科校業掄才登賢舉俊其或藝能素淺履行無聞來造科塲要求僥倖及當試落便起怨嗟謗議沸騰是非蜂起至有偽造制勑之語扇惑儕流巧為誣毁之言隐蔵名姓以茲取事得非薄徒宜立憲章以示澄汰其禮部貢院條奏宜依仍於引試之時精詳考校逐塲去留無藝者雖應年深不得饒僣塲數若有藝者雖當黜落並許訴陳祗不得於街市省門故為喧競及投無名文字訕毁主司如有故違必行嚴斷本司鏁宿後御史臺開封府所差守當人專切覺察其有不自苦辛祗慿勢援潜求薦託俯拾科名致使孤寒滯於進取起今後主司不得受薦託書題如有書題密具姓名聞奏其舉人不得就試今後舉人湏取本鄉貫文解若鄉貫阻隔祗許兩京給解世宗顯德元年十一月勑國子監所解送廣順三年已前監生人數宜令禮部貢院收納文解其今年内新收補監生祗仰落下今後湏是監中受業方得准令式收補解送先是國學收補監生顯有條例邇來學官因循多有近甸州府不得解者即投監請補送省率以為常是嵗主文者知其弊因取監司所送學生七十四人狀事詳之例不合於令式悉不收試由是移刺紛紜更相援引監司舉奏束修之條以塞其議貢院告於執政因逹於上聴故降是命議者非成均而是禮闥二年三月勑尚書禮部貢院奏今年新及第進士李覃嚴說何曮武允成王汾閭丘舜卿楊徴之任惟吉趙隣幾周度張慎微王翥馬文劉選程浩然李震等一十六人所試詩賦文論䇿文等國家設貢舉之司求英俊之士務詢文行方中科名比聞近年以來多有濫進或以年勞而得第或因媒勢以出身今嵗所放舉人試令看驗果然紕繆湏至去留其李覃何曮楊徴之趙隣幾等四人宜放及第其嚴説武允成王汾閭丘舜卿任惟吉周度張慎微王翥馬文劉選程浩然李震等一十二人藝學未精並宜勾落且令苦學以俟再來禮部侍郎劉温叟失於選士頗屬因循據其過尤合行譴謫尚示寛恕别具條理聞奏五月翰林學士尚書禮部侍郎知貢舉竇儀上言伏以朝廷設科比來取藝州府貢士祗合薦能爰因近年頗隳舊制其舉子之弊也多是纔謀習業便切干名周儀未詳赴三禮之舉公榖不䆒應三傳之科經學則偏試帖由進士則鮮通經義取解之處譸張妄説於辛勤到京之時奔競惟求於薦託其舉送之弊也多是明知荒淺具委兇麄新差考試之官利其情禮之物雖所取無幾實啟倖非輕凡對問題任從同議謾鑿通而鑿否了無去以無留惟狥人情僅同兒戲致令至時就試不下三千毎嵗登科罕踰一百假使無添而漸放約湏畢世而方周乃知難其舉則至公而有益於人易其來則小惠而無實於事有益者知濫進不得必致精勤無實者欲多放無能虚令來徃且明經所業包在諸科近間應者漸多其研精者益少又今之童子比號神童既㓜稚之年禀神異之性語言辨慧精采英奇出於自然有則可舉竊聞近日實異於斯抑嬉戲之心教念誦之語斷其日月委以師資限隔而游思不容仆跌而痛楚多及孩童之意本未有知父母之情恐或不忍而復省試之際嵗數難知或念誦分明則年貌稍過或年貌適中則念誦未精及有司之去留多家人之訴訟伏况晉朝之日罷此三科年代非遥勑又見在今宜釐革别俾進修臣謬以非才獲承此任本重難而為最復遺闕以相仍䖍奉勑文重令條奏或從長而仍舊亦因弊以改為上副聖情廣遵公道除依舊格勑施行外其明經童子請却依晉天福五年勑停罷任改就别科赴舉其進士請今後省卷限納五卷已上於中湏有詩賦論各一卷餘外雜文謌篇並許同納祗不得有神道碑誌文之類其帖經對義並湏實考通三已上為合格將來却復晝試候考試終塲其不及第人以文藝優劣定為五等取文字乖舛詞理紕繆最甚者為第五等殿五舉其次者為第四等殿三舉以次稍優者為第三第二第一等並許次年赴舉三禮請今後解試省試第一塲禮記第二塲周禮第三塲儀禮三傳第一塲左氏第二塲公羊第三塲榖梁並終而復始學䆒請今後周易尚書併為一科毎經對墨義三十道仍問經考試毛詩依舊為一科對墨義六十道及第後請並減為上選集諸科舉人所對䇿問或不應問曰詞理乖錯者並當駮落其諸科舉人請第一塲十否者殿五舉第二塲三塲十否者殿三舉其三塲内有九否者並殿一舉其進士及諸科所殿舉數並於所試卷子上朱書封送中書門下請行指揮及罪發解試官監官等其監官試官如受取解人情禮財物請今後並准枉法贓論又進士以徳行為基文章為業茍容欺詐何稱科名近年塲中多有詐偽託他人之述作竊自己之聲光用此面欺将為身計宜加條約以誡輕浮今後如有倩人述作文字應舉者許人告言送本處色役永不得仕進又切覧唐書見穆宗朝禮部侍郎王起奏所試貢舉人試訖申送中書候覆訖下當司然後大字放牓是時從之臣欲請將來考試及第進士先具姓名雜文申送中書奏覆訖下當司與諸科一齊放牓詔並從之唯進士并諸科舉人放牓一依舊施行四年冬十月詔曰制䇿懸科前朝盛事莫不訪賢良於側陋求讜正於箴規殿廷之間帝王親試其或大禆於國政有益於時機則必待以優恩縻之好爵㧞竒取異無尚於兹得人者昌於是乎在爰從近代久廢此科懐才抱噐者欝而不伸隐耀韜光者晦而莫出遂使翹翹之楚多致於棄捐皎皎之駒莫就於縻縶遺才滯用闕孰甚焉應天下諸色人有賢良方正能直言極諫經學優深可為師法詳閑吏理逹於教化等者不限前資見任職官黄衣草澤並許應詔其逐處州府依毎年貢舉人式例差官别考試解送尚書吏部仍量試䇿論三道共三千字已上當日内成取文理俱優人物爽秀者方得解送取來年十月集上都其登朝官亦許上表自舉時兵部尚書張昭條奏請興制舉故有是詔五年三月詔曰比者以近年貢舉頗是因循頻詔有司精加試練所兾去留無濫優劣昭然昨據貢院奏今年新及第進士等所試文字或有否臧爰命詞臣再令考覆庶涇渭之不雜免玉石之相參其劉垣戴貽慶李頌徐緯張覲等詩賦稍優宜放及第王汾據其文字亦未精當念以湏曽剥落特與成名熊若谷陳保衡皆是遠人深可嗟念亦放及第郭峻趙保雍楊丹安元度張昉董咸則杜思道等未甚苦辛並從退落更宜修進以俟將來知貢院右諫議大夫劉濤選士不當有失用心可責授右賛善大夫俾令省過以誡當官先是濤於東京放牓後率新及第進士劉坦已下一十五人來赴行在以其所試詩賦進呈上以其詞紕繆命翰林學士李昉覆試故有是命六年正月壬子對諸道貢舉人石熈載等三百餘人於萬春殿舊例毎嵗舉人皆見於閣門外上以優待儒者故允其入見甲戌詔曰起今後毎年新及第進士及諸科舉人聞喜宴宜令宣徽院指揮排比先是禮部毎年及第人聞喜宴皆自相醵歛以備焉帝以優待賢雋故有是命乙亥詔曰禮部貢院起今後應合及第舉人委知舉官依逐科等第定人數姓名并所試文字聞奏候勑下後放牓冊府元龜卷六百四十二
