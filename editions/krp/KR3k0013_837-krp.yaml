body:
  text: 册府元龜巻八百三十七宋王欽若等撰總録部文章易曰觀乎人文以化成天下仲尼曰言之不文行之不逺蓋斯文之作其來尚矣經藝之設本於儒術辭賦之起原乎六藝騷人之後風流彌劭漢氏中葉稍革古制藻絢交錯支𣲖逾廣英才間出衆體互興分鑣並驅因枝振葉故子雲有鞶帨之說蕭統興推輪之嘆而沿襲或異意制横作習尚殊軌氣韻相髙沈約有云自漢至魏四百載間文體三變自是而下豈勝道哉繇靈均以來迄于五代屬辭之士連衡接武咸用全次以備夫廣記云屈原名平楚之同姓也為懐王左徒王甚任之上官大夫害其能讒之王怒而疏平故平憂愁幽恚作離騷離騷者猶離憂也又有賦二十五篇唐勒楚大夫有賦四篇宋玉楚大夫有賦十六篇宋玉唐勒景差之徒在屈原後皆好辭而以賦見稱然皆祖屈原之從容辭令荀卿賦十篇荀卿趙人齊襄王時荀卿最為老師三為祭酒後適楚為蘭陵令避漢宣帝名改為孫卿漢陸賈楚人為大中大夫有賦三篇朱建楚人髙祖賜號平原王有賦一篇莊夫子名忌吳人有賦二十四篇賈生名誼為中大夫天子議以任公卿之位絳灌東陽侯馮敬之屬盡害之乃以賈生為長沙王太傅賈生既辭任意不自得及渡湘水為賦以弔屈原後三年有鴞飛入賈生舎止於坐隅楚人命鴞曰服賈生既以謫居長沙長沙卑隰自以為壽不得長傷悼之乃為賦自廣一云有賦六篇韋孟家本彭城為楚元王傅傅子夷王及孫王戊官為楚王傅而歴相三王也不遵道孟作詩諷諌後遂去位徙家於鄒又作鄒詩孔臧為太常有賦二十篇吾丘壽王字子贛趙人為光禄大夫有賦十五篇蔡曰賦一篇吏闕官倪寛千乘人為御史大夫有賦二篇張子僑為光禄大夫有賦三篇莊忽竒為常侍郎有賦十一篇七略云忽竒者或言莊夫子族家子或言莊助弟芘子朱買臣字翁子吳人為丞相長史有賦三篇司馬遷字子長為太史公有賦八篇蘓李為遼東太守有賦二篇蕭望之字長倩東海人為前將軍輔政有賦一篇徐明字長君為河内太守有賦三篇李息為給事黄門侍郎有賦九篇馮商有賦九篇杜參為長社尉有賦二篇張豐字僑予為車郎有賦三篇朱宇為驃騎將軍有賦三篇一云朱宇為驃騎將軍史李思有孝景皇帝頌十五篇李忠為衛士令有賦二篇賈偃賦二篇賈充賦四篇張仁賦六篇秦充賦二篇李歩昌賦二篇謝多為侍郎有賦十篇周長孺為平陽公主舎人有賦二篇華錡賦九篇眭𢎞賦一篇即眭孟也以明經為議郎别栩陽賦五篇王商為黄門書者假史有賦十三篇徐博為侍中有賦四篇王廣為黄門書者作吕嘉賦五篇華龍為漢中都尉丞有賦二篇路恭為左馮翊史有賦八篇東方朔字曼倩平原厭次人為常侍郎乆之朔上書陳農戰彊國之計因自頌獨不得大官欲求試用數萬言終不見用朔因著論設客已用位卑以自慰諭又設非有先生論此二篇最善其餘有封泰山責和氏璧及皇太子生禖祝屏風殷上柏柱平樂觀獵賦八言七言上下八言七言詩各有上下篇從公孫𢎞借車凡劉向所録朔書具是矣劉向别録所載枚乘字叔淮隂人景帝時召拜𢎞農郡都尉以病去官復㳺梁梁客皆善屬辭賦乘尤髙孝王薨乗歸淮隂有賦九首枚臯字少孺乘之子也上書北闕自稱枚乘之子武帝得之大喜召入見侍詔使賦平樂舘善之拜為郎武帝春秋二十九乃得皇子羣臣喜故臯與東方朔作皇子生賦初衛皇后立臯奏賦以戒終臯為賦善於朔也從行至甘泉雍河東東廵狩封泰山塞决河宣房㳺觀三輔離宫舘臨山澤弋獵射馭狗馬蹴踘刻鏤上有所感輒使賦之奉詔輒成臯自言為賦不如相如又言為賦乃俳見視如倡自悔類倡也故其賦有詆娸東方朔又自詆娸其文骫骳曲隨其事皆得其意頗詼笑不甚閑靡凡可讀者百二十篇其尤嫚戱不可讀者尚數十篇司馬相如字長卿蜀郡成都人為武騎㑹景帝不好辭賦是時梁孝王來朝從游說之士齊人鄒陽淮隂枚乘吳嚴忌夫子之徒嚴忌本姓莊當時尊上號曰夫子史家避漢明帝諱故遂為嚴耳相如見而說之因病免客游梁得與諸侯游士居數嵗乃著子虛之賦以子虛虛言也為楚稱稱說楚之美也烏有先生者烏有此事也為齊難亡是公者亡是人也亡讀曰無欲明天子之義故虛藉此三人為辭藉假也以推天子諸侯之苑囿其卒章歸之於節儉因以風諌上林賦亡是公言上林廣大山谷水泉萬物及子虛言雲夢所有甚衆侈靡多過其實且非義理所止故删取其要歸正道而論之言不尚其侈靡之論且取終篇歸於正道且非除其辭也矣武帝既美子虛之事相如見武帝好僊因曰上林之事未足美也尚有靡者臣嘗為大人賦未就請具而奏之相如以為列僊之儒居山澤間儒有道術之稱也凡有道術皆為儒形容甚臞臞瘠也音年句切又音衢此非帝王之僊意也乃遂奏大人賦既奏武帝大恱飄飄有凌雲氣游天地間之意武帝過宜春宫相如又奏賦以哀二世行失相如後為孝文園令病免家居茂陵天子曰司馬相如病甚可往從悉取其書若後之矣若汝也言汝今去已在他人後所忠往所忠使者姓名也而相如已死家無遺書問妻對曰長卿未嘗有書也時時著書人又取去長卿未死時為一卷書曰有使來求書奏之其遺札書言封禪事所忠奏焉天子異之相如他所著遺平陵侯書與五公子相難草木書篇不采采其尤著公卿者王褒字子淵蜀人也有才俊益州刺史王襄欲宣風化於衆庶間請與褒相見使褒作中和樂職宣布詩又作其傳因奏褒有軼才宣帝徴褒詔褒為聖主得賢臣頌帝令褒與張子僑等並待詔所幸宫舘輒為歌頌頃之擢褒為諌大夫元帝為太子喜褒所為甘泉及洞簫賦令後宫誦讀之韋𤣥成字少翁丞相賢子襲封扶陽侯以列侯侍祀孝惠廟當晨入廟天雨淖不駕駟馬車而騎至廟下有司劾奏等輩數人皆削爵為關内侯𤣥成自傷貶黜父爵嘆曰吾何面目以奉祭祀作詩自劾責元帝永光中代于定國為丞相貶黜十年之間遂繼父相位封侯故國榮當世焉𤣥成復作詩自著復玷缺之囏難因以戒示子孫揚雄字子雲蜀郡成都人雄好辭賦先時蜀有司馬相如賦甚𢎞麗雄毎作賦嘗擬之以為式又作書摭離騷文而反之自岷山投諸江流以弔屈原名曰反離騷又作廣騷畔牢愁孝成帝時有薦雄文似相如者召雄待詔承明之庭從上甘泉還奏甘泉賦帝祭后土又奏河東賦嘗從羽獵又奏羽獵賦拜為郎明年又奏長楊賦雄方草太𤣥或嘲雄以𤣥尚白而𤣥解之曰解嘲雄實好古而樂道其意欲求文章成名於後世以為箴莫善於虞箴作州箴九州之箴也賦莫深於離騷反而廣之辭莫麗於相如作四賦皆斟酌其本相與放依而馳騁云其後雄以為賦者將以風之必推類而言極麗靡之辭閎侈鉅衍競於使人不能加也既乃歸之於正然覽者已過矣往時武帝好神仙相如上大人賦欲以諷帝及飄飄有凌雲之志繇是言之賦勸而不止明矣又頗似俳優淳于髠優孟之徒非法度所存賢人君子賦詩之正也於是輟不復為薛方字子容齊人嘗為郡掾祭酒王莽時居家以經教授喜屬文著詩賦數十篇後漢班彪扶風人更始敗隗囂擁衆天水彪從之彪傷方難乃著王命論以為漢徳承堯有靈命之符王者興祚非詐力所致囂終不寤遂避地河西河西大將軍竇融以為從事及融徴還京師光武問曰所上章奏誰與參之對曰皆從事班彪所為後為望都長建武三十年卒著賦論書記奏事合九篇桓譚字君山沛國人博學多通能文章為議郎給事中出為六安郡丞道病卒所著賦誄書奏凡二十六篇田邑字伯玉馮翊人有大節渉學藝能善屬文為漁陽太守王隆字文山馮翊人建武中為新汲令能文章所著詩賦銘書凡二十六篇杜篤字季雅京兆人少博學居美陽與美陽令相恨令怨收篤送京師㑹大司馬吳漢薨光武詔諸儒誄之篤於獄中為誄辭最髙帝美之賜帛免刑篤以關中表裏山河先帝舊京不宜改營雒邑乃上奏論篤賦所著賦誄弔書讚七言女誡及雜文凡十八篇又著明世論十五篇後車騎將軍防擊西羗請篤為從事中郎戰没史岑字子孝沛國人王莽末以文章顯莽以為謁者著頌誄復神說疾凡四篇岑一字孝山作出師頌崔篆涿郡人王莽以為新建大尹稱疾去建武初客居滎陽臨終作賦以自悼名曰慰志梁竦字叔敬松弟也明帝永平中坐松事徙九真南厯江湖濟沅湘感悼子胥屈原以非辜沈身乃作悼騷賦繫𤣥石而沈之後辟命交至並無所就賈逵字景伯扶風平陵人永平中有神雀集宫殿官府翹羽有五采色帝異之以問臨邑侯劉復復不能對薦逵博物多識帝乃召見逵問之對曰昔武王終父之業鸑鷟在岐宣帝威懐戎狄神雀仍集此胡降之徴也帝勑蘭臺給筆札使作神雀頌拜為郎後為魯相所作詩頌誄書連珠酒令凡九篇班固字孟堅彪子也弱冠而孤作幽通賦以致命遂志永平中為郎典校祕書時京師修起宫室濬繕城隍而關中耆老猶望朝廷西顧固感前世相如壽王東方之徒造搆文辭終以諷勸乃上兩都賦盛稱雒邑制度之美以折西賔淫侈之論固所著典引賔戲應譏詩賦銘誄頌書文記議六言在者凡四十一篇𫝊毅字武仲扶風人明帝永平中於平陵習章句因作廸志詩章毅以帝求賢不篤士多隱處故作七激以為諷建初中章帝博召文學之士以毅為蘭臺令史拜郎中與班固賈逵共校書毅追美孝皇帝功徳最盛而廟頌未立乃依清廟作顯宗頌十篇奏之毅早卒著詩賦誄頌祀文七激連珠凡二十八篇馮衍字敬通京兆杜陵人幼有竒才為曲陽令得罪西歸故郡衍不得志退而作賦自勵命其篇曰顯志顯志者言光明之情昭章𤣥妙之思也居貧年老卒於家所著賦誄銘問交徳誥慎情衍集有問交一篇慎情一篇書記說自序官録䇿五十篇章帝甚重其文王景字仲通樂浪人建初七年為徐州刺史先是杜陵杜篤奏上論遷都賦欲令車駕還遷長安耆老聞者皆動懐土之心莫不眷然仲立西望舊京以宫廟已立恐人情疑惑㑹時有神雀諸瑞乃作金人論頌雒邑之美崔駰字亭伯篆孫也善屬文嘗以典籍為業未遑仕進之事時人或譏其太𤣥静將以後名失實駰擬揚雄解嘲作達㫖以答焉華嶠曰駰譏揚雄以為范蔡鄒衍之徒乘釁相傾誑曜諸侯者也而云彼我異尚又曰竊資卓氏割炙細君斯蓋士之贅行而云不能與此數公者同以為失類而改之也元和中章帝始修古禮廵狩方岳駰上四廵頌以稱漢徳辭甚典美為竇憲主簿出為長岑長以逺去不之官而歸和帝永元中卒所著詩賦銘頌書記表七依婚禮結言達㫖酒警合二十一篇崔瑗字子玉駰子也為濟北相卒瑗髙於文詞尤善為書記箴銘所著賦碑銘箴頌七蘇牧乘七發之流南陽文學官志嘆辭移社文悔祈草書埶七言凡五十七篇其南陽文學官志稱於後世諸能為文者皆自以弗及崔烈有文才所著詩書教頌等凡四篇位至太尉崔實字子真一名台字元始為尚書病卒所著碑論箴銘答七言詞文表記書凡十五篇李尤字伯仁廣漢人少以文章顯和帝時侍中賈逵薦尤有相如揚雄之風召詣東觀受詔作賦拜蘭臺令史累遷樂安相卒所著詩賦銘誄頌七嘆哀典凡二十八篇李漢廣漢人有文才為東觀郎著賦誄頌論數十篇桓麟郁孫也為許令卒著誄讃說書凡二十篇摯虞文章志麟文在者十八篇有碑九首誄七首說一首沛相郭府君書一首桓彬字彦林麟子也為尚書郎卒於家所著七說及書凡三篇朱穆字公叔南陽人嘗感時澆薄慕尚敦篤乃作崇厚論又著廣絶交論亦矯時之作後為尚書卒所著論䇿奏教書詩記嘲凡二十篇穆著論甚美蔡邕嘗至其家自寫之張衡字平子南陽人少善屬文和帝永元中天下承平日乆自王侯以下莫不踰侈衡乃擬班固兩都作二京賦因以諷諌精思𫝊㑹十年乃成順帝初為太史令衡不慕當世所居之官輒積年不徙自去史職五載復還乃設客問作應間以見其志遷侍中中官共讒之衡嘗思圖身之事以為吉凶倚伏幽微難明乃作思𤣥賦以宣寄情志後為尚書卒所著詩賦銘七言靈憲應間七辨廵誥懸圖凡三十二篇衡集作𤣥圖蓋懸與𤣥通葛龔字元甫梁國寜陵人也和帝時以善文記知名著文賦碑誄書記凡二十篇終臨汾令胡廣字伯始南郡華容人為太傅録尚書令薨初揚雄依虞箴作十州二十五官箴其九箴亡闕後涿郡崔駰及子瑗及臨邑侯劉騊駼増補十六篇廣復繼作四篇文甚典美乃悉撰次首目為之解釋名曰百官箴凡四十八篇其餘所著詩賦銘頌箴弔及諸解詁凡二十二篇夏恭字敬公梁國蒙人為太山郡尉卒官恭為文著善賦頌詩勵學凡二十篇恭子牙少習家業著賦頌讚誄凡四十篇舉孝亷早卒蘇順字孝山京兆人和安間以才學見稱為郎中卒官所著賦論誄哀辭雜文凡二十六篇時三輔多士扶風曹衆伯師亦有才學著誄書論四篇又有曹朔不知何許人作漢頌四篇劉珍一名寳南陽人安帝延光五年為衛尉卒官著誄頌連珠凡七篇黄香字文彊能文章為魏郡太守卒官著賦牋奏書令凡五篇馬融字季長有俊才安帝永初四年為校書郎中是時鄧太后臨朝鄧隲兄弟輔政以為文徳可興武功宜廢遂廢蒐狩之禮初元二年乃上廣成頌以諷出為河間王廐長史時車駕東廵岱宗融上東廵頌帝竒其文召拜郎中桓帝延熹九年卒年八十八所著賦頌碑誄書記表奏七言琴歌對䇿遺令凡二十一篇崔琦字子瑋涿郡人少游學京師以文章博通稱舉孝亷梁冀聞其清與交琦作外戚箴以戒之琦以言不從失意復作白鵠賦以為風後為冀殺之所著賦頌銘誄箴弔論九咨七言凡十五篇王逸字叔師順帝時為侍中著賦誄書論及雜文凡二十一篇又作漢詩凡一百二十三篇王延壽字文考逸之子也有儁才少游魯國作靈光殿賦後蔡邕亦造此賦未成及見延壽所為甚竒之遂輟翰而已曽有異夣意惡之乃作夢賦以自勵後溺水死邊讓字文禮陳畱人少辯博能屬文作章華賦雖多淫麗之辭而終之以正亦如相如之諷也位至九江太守邊韶字孝先陳畱人以文學知名為陳相卒於官著詩頌碑銘書䇿五十篇趙壹恃才倨傲屢抵罪幾致死友人救得免壹乃貽書謝恩及為窮鳥賦又作刺世疾邪賦著賦頌箴誄書及雜文十六篇壹十辟公府竝不就終於家張升字彦真尉氏人為外黄令著賦誄頌碑書凡十六篇侯瑾字子瓏燉煌人州郡累召公車有道徴並稱疾不到作矯世論以譏刺當世而徙入山中單思著述以莫知於世故作應時賔難以自寄餘所作雜文數十篇多亡矣西河人敬其才而不敢名之皆稱為侯君劉梁字曼山一名岑東平人少孤貧嘗疾世多利交以邪曲相黨乃著破羣論時之覽者以為仲尼作春秋亂世知志今此論之作俗士豈不愧心又作辨和同之論為尚書郎累遷野王令未行病卒蔡邕字伯喈陳畱圉人少博學好辭章閒居翫古不交當世感東方客難及揚雄班固崔駰之徒設疑以自通乃斟酌羣言韙其是而矯其非作釋誨以戒勵後為左中郎將邕著詩賦碑誄銘讚連珠箴弔論議獨斷勸學釋誨叙樂女訓篆埶祝文章表書記凡四百篇傳於世仲長統字公理山陽人博渉書記贍於文辭後恭丞相曹操軍事卒統友人東海繆襲嘗稱統文章足當西京董賈劉揚楊修字徳祖有俊才為丞相曹公主簿所著賦頌碑讚詩哀辭表記書凡十五篇禰衡字正平平原人少有才辨曹公送與劉表表及荆州士大夫先服其才名甚賔禮文章言議非衡不定表嘗與諸文人共草章奏並擇其才思時衡出還見之開省未周因毁以抵地表憮然為駭衡乃從求筆札湏臾立成辭義可觀表大恱益重之後復侮慢於表表耻不能容以江夏太守黄祖性急故送衡與之祖亦善待焉衡為作書記輕重疎密各得體宜祖持其手曰處士此正得祖意如祖腹中之所欲言也祖長子射為章陵太守嘗大㑹賔客人有獻鸚鵡者黄祖舉巵於衡曰願先生賦之以娛嘉賔衡覽筆而作文無加㸃辭采甚麗後為祖所殺張超字子並河間人畱侯良之後有文才靈帝時從車騎將軍朱㒞征黄巾為别部司馬著賦頌碑文薦檄牋書碣文嘲凡十九篇髙彪字子義吳郡人除郎中校書東觀數奏賦頌竒文因事諷諌靈帝異之時京兆第五永為督軍御史使督幽州百官大㑹祖餞於長樂觀議郎蔡邕等皆賦詩彪乃獨作箴邕等甚美其文以為莫尚也出為内黄令卒於官文章多亡張奐字然明酒泉人後為𢎞農人為太常以黨罪歸田里卒所著銘書教誡述志對䇿章表二十四篇李固字子堅漢中人為太尉所著章表奏議教令對䇿記銘凡十一篇延篤字叔堅南陽人為京兆尹以病免歸卒于家所著詩論銘書應訊表教令凡二十篇應奉字世叔汝南人為司𨽻校尉及黨事起奉乃慨然以疾自退追愍屈原因以自傷著感騷三十篇數萬言盧植字子幹涿郡人為北中郎將免官隱於上谷卒所著碑誄表記凡六篇陶邱洪字子休平原人清達博辨文冠當代辟太尉府卒皇甫規字威明安定朝那人為䕶羗校尉以疾卒所著賦銘碑讚禱文弔章表教令書檄牋記凡二十七篇魏孔融字文舉魯國人為少府所著詩頌碑文論議六言䇿文表檄教令書記凡二十五篇王粲字仲宣山陽髙平人為太祖軍謀祭酒魏國建為侍中粲善屬文舉筆便成無所改定時人常以為宿搆然正復精意單思亦不能加也粲才既髙辨論應幾鍾繇王朗等雖名為魏卿相至於朝廷奏議皆擱筆不能措手著詩賦論議垂六十篇徐幹字偉長北海人陳琳字孔璋廣陵人阮瑀字元瑜陳畱人應瑒字徳璉汝南人劉楨字公幹東平人幹為司空軍謀祭酒掾屬五官將文學琳瑀為司空軍謀祭酒管記室軍國書檄多琳瑀所作也琳徙門下督瑀為倉曹掾屬瑒楨並為太祖丞相掾咸著文賦數十篇魏文帝典論曰魏世文人魯國孔融廣陵陳琳山陽王粲北海徐幹陳畱阮瑀汝陽應瑒東平劉楨斯七子者於學無所遺於辭無所假粲長於辭賦幹時有逸氣然非粲匹也如粲之初征登樓槐賦征思幹之𤣥猨漏巵圓扇橘賦雖張蔡不過也然於他文未能稱是琳瑀之章表書記今之儁也應瑒和而不壯劉楨壯而不宻孔融體氣髙妙有過人者然不能持論理不勝辭至于雜以嘲戯乃其所善揚班之儁也自潁川邯鄲淳繁欽陳畱路粹沛國丁儀丁廙𢎞農楊修河内荀繹等亦有文采而不在此七人之列瑒弟璩璩子貞咸以文章顯邯鄲淳一名竺字子叔潁川人博學有文章黄初中為博士給事中作投壺千餘言奏之文帝以為工賜帛千疋繁欽字休伯以文才機辯少得名於汝潁欽既長於書記又善為詩賦其所與太子書說喉轉意率皆巧麗為丞相主簿卒夏侯㑹字雅權幼以才學見稱善屬文議終樂安太守與陳郡太守任城孫該郎中令河東杜摯等並著文賦頗傳於世韋誕字仲將太僕端之子終光禄大夫有文才善屬辭章劉劭字孔才廣平人為散騎常侍嘗作趙都賦明帝美之詔劭作許都雒都賦時外興軍旅内營宫室劭作二賦皆諷諌焉衛覬字伯儒河東人少夙成以才學稱為尚書凡所撰述數十篇黄初中潘朂王象與覬並以文書顯潘朂字元茂為尚書左丞魏公九錫䇿命朂所作也王象字羲伯黄初時為散騎常侍初建安中與同郡荀緯等俱為魏太子所禮待及王粲陳琳阬瑀路粹等亡後新出之中惟象才最髙吳質字季重濟隂人為北中郎將以文才為文帝所善應璩字休璉博學好屬文善為書記曹爽秉政多違法度璩為詩以諷焉其言雖頗諧合多切時要世共傳之終於侍中周不疑年十七著文選論四首嚴苞黄初中以髙才入為祕書丞數奏文賦文帝異之夏侯𤣥字太初為太常𤣥常著樂毅張良及本無肉刑論辭㫖通遠咸傳於世何晏字平叔為尚書晏少以才秀知名作道徳論及諸文賦著述凡數十篇袁亮貞固有學行疾何晏鄧颺等著論以譏刺之位至尚書劉盛有文藻又善言名理諸所論著並傳於世鍾㑹字士季為中書侍郎時司馬景王命中書令虞松作表再呈不可意命松更定以經時松思竭不能改心存之形於顔色㑹察其有憂問松所能松以實答㑹取視為定五字松恱服以呈王王曰不當爾邪誰所定也松曰鍾㑹向亦欲啟之㑹公見不敢饕其能王曰如此可大用可令來蜀諸葛亮字孔明為丞相亮言教書奏多可觀别為一集楊戱字文然犍為人為射聲校尉以後主延熈四年著季漢輔臣賛其所頌述今多載於蜀書呂雅為謁者清厲有文才著格論十五篇郤正字令先河南人弱冠能屬文為祕書郎性澹於榮利而尤耽意文章自司馬王揚班𫝊張蔡之儔遺文篇賦及當世美書善論益部有者則鑽鑿推求略皆寓目自在内職三十年官不過六百石依則先儒假文以見意號曰釋譏其文繼於崔駰達㫖景耀六年後主從譙周之計遣使請降於鄧艾其書正所造也凡所著述詩論賦之屬垂百篇秦宓字子勑廣漢人少有才學為大司農卒宓見帝系之文五帝皆同一族宓辯其不然之本論皇帝王覇飬龍之說甚有通理譙允南少時數往諮訪記録其言於春秋然否論譙周字允南巴西人為中散大夫太子家令于時軍旅數出百姓彫瘁周與尚書令陳祗論其利害退而書之謂之仇國論陳術字申伯漢中人博學多聞著釋論七篇歴三郡太守吳張紘字子綱廣陵人為大帝長史見柟橊枕愛其文為作賦陳琳在北見之以示人曰此吾鄉里張子綱所作也後紘見陳琳作武庫賦應譏論與琳書深嘆美之琳答曰自僕在河北與天下隔此間率少於文章易為雄霸故使僕受此過差之譚非其實也今景興魏王朗字景興在此足下與子布呉張昭字子布在彼所謂小巫見大巫神氣盡矣紘著詩賦銘誄十餘篇胡綜字偉則汝南固始人也為建武中郎將黄武八年夏黄龍見舉口於是大帝稱尊號因瑞改元又作黄龍大牙樹在中軍諸軍進退視其所向命綜作賦後為偏將軍凡自大帝統事諸為文誥䇿命鄰國書符略皆綜之所造也薛綜字敬宗沛郡人少善屬文有秀才為太子少傅領選曹尚書赤烏六年卒凡所著詩賦難論數萬言名曰私載子瑩建衡中為選部尚書領太子少傅後主追嘆綜遺文且命瑩繼作瑩遂獻詩張昭字子布彭城人少好學時汝南主簿應劭議宜為舊君諱論者互有異同著論州里才士陳琳等皆稱善之嚴畯字曼才彭城人少耽學為尚書令卒畯著孝經傳潮水論又與裴𤣥張承論管仲季路皆傳於世孫丞好學有文章作螢火賦行於世范慎字孝敬廣陵人為太子登賔客著論二十篇名曰矯非後為太尉終韋曜字𢎞嗣吳郡人少好學能屬文為太子中庶子時蔡穎亦在東宫性好博奕太子和以為無益命曜論之册府元龜卷八百三十七
