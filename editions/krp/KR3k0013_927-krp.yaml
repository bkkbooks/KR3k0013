body:
  text: 冊府元龜卷九百二十七宋王欽若等撰總録部畏懦佞佛䜛佞畏懦夫禀脆弱之性有巽懦之懼故乃臨事而示怯畏威而奪氣終於敗辱不能有立是以無拳無勇詩人之所譏淺為丈夫昔賢之所醜雖率勵以義僅或自强然授任於事終為不武遂成愧耻固其分哉陳不占齊東觀漁者也崔杼殺莊公不占聞君有難將往死之飡則失哺上車失軾僕曰敵在數百里外食則失哺上車失軾雖往其有益乎陳不占曰死君義也無勇私也遂驅車比至君門聞鼓鐘之音閗戰之聲遂駭而死杜之善楚人一云楚善白公之難辭其母而行將死君難比至朝三廢車中其僕曰子懼何不返也杜之善曰懼吾私也死君公也吾聞君子不以私害公遂往死也漢楊敞為大司農明帝元鳯中稻田使者燕蒼知上官桀等謀反以告敞敞素事上畏事不敢言廼移病卧移病移書言病一曰以病而移居以告諌議大夫杜延年以聞蒼延年皆封敞以九卿不輙言故不得侯李次元王莽時人㑹前隊大夫誅謀反者次元聞事發覺被馬欲出馬駕在轅中惶遽著鞍上馬出門顧見車方自覺乃止後漢劉𤣥王莽立設壇塲於淯水上沙中陳兵大㑹即位朝羣臣𤣥素懦弱羞愧流汗舉手不能言莽居長樂宫升前殿郎吏以次列庭中𤣥羞怍俛首刮席不敢視韓馥為冀州刺史以州讓袁紹馥自懷猜辭紹索去往依張邈後紹遣使詣邈有所計議因共耳語馥時在坐謂見圖謀無何如厠自殺至厠因以書刀自殺栢孝長為南陽功曹劉表攻西鄂西鄂長杜子緒子緒帥縣男女嬰城而守孝長亦在城中聞兵聲恐懼入室閉户牽被覆頭相攻半日稍敢出面牛輔董卓女婿為中郎將懦怯失守不能自安嘗把辟兵符以鐡鎻致其旁欲以自强見客先使相者相之知有反氣與不反筮知吉凶然後乃見之魏李豐為尚書僕射㑹司馬宣王誅曹爽駐車闕下與豐相聞怖遽氣索足委地不能起宋劉彦節少以宗室清謹見知齊髙帝輔政彦節知運祚將遷宻懷異圗及沈攸之舉兵齊髙帝入屯朝堂袁粲鎮石頭潛與彦節及諸大將黄回等謀夜㑹石頭詰旦乃發彦節素怯騷擾不安再晡後便自丹陽郡車載婦女盡室奔石頭臨去婦蕭氏强勸令食彦節歠羔冩胸中手振不自禁事敗被誅佞佛釋氏之教興於西域東漢之後漸於中夏其教之化人也大率以清浄為本將使為其殺盗之源而澄為定慧之本故慕仙道者示湼槃之㫖邀世福者指太天之路而乃心起於貪事即於佞民之有過則俾之作禮以贖其正刑僧之犯法則屈其常憲而不懼恵姦紀綱既隳施用無節身之及家或致喪敗兹所謂背其始而遵其末者也吳管融漢末聚衆數百依徐州牧陶謙謙使督運漕遂以江淮委輸自入乃大起浮圖祠以銅為人黄金塗身衣錦采銅槃九重下為重樓閣道可容三千餘人悉課讀佛經令界内及旁郡人有好佛者聽受道復其他役以招致之繇此逺近前後至者五千餘人户毎浴佛多設酒飯布席於路徑數十里民人來觀及就食且萬人費以巨億計晉王恭為安北將軍鎮京口性雖抗直闇於機㑹尤信佛道調役百姓修營佛寺務在壯麗士庶怨嗟臨刑猶誦佛經自理髭鬢神無懼容何充為侍中錄尚書事而性好釋典崇修佛寺供給沙門以百數縻費巨億而不吝也親友至於貧乏以此獲譏於世阮裕嘗戯之曰卿志大宇宙勇邁終古充問其故裕曰我圖數千户郡尚不能得卿圖作佛不亦大乎又其弟凖崇信釋氏謝萬譏之云二何佞於佛張淹為東陽太守逼郡吏燒臂炤佛民有罪使禮佛贖愆動至數千拜坐免官孔顗為㑹稽太守反敗死淹是其黨屯軍上饒縣聞劉故敗軍副鄱陽太守費曅欲圖之詐云得鄧琬信急宜諮論欲因此斬淹淹素事佛方禮佛不得時進曅復誑云捕虎借大鼓及仗士二百人淹信而與之曅因率衆入山饗士約誓揚言虎走城西鳴鼓大呼直來趣城城門守衛悉委仗觀之曅率衆突入淹正禮佛聞難走出因斬首南齊王績為太子中庶子武帝出射雉績信佛法稱疾不從梁劉勰早孤家貧不婚娶依沙門僧祐與之居積十餘年高祖時為歩兵校尉兼東宫通事舍人昭明太子深愛接之勅與慧震沙門於定林寺撰經證功畢遂啟求出家先燔鬢髪以自誓勅許之後魏張彛為秦州刺史為國造佛寺名曰興皇諸有罪咎者隨其輕重謫為土木之功無復鞭杖之罸馮熈為雒州刺史廢毁三字石經為政不能仁厚而信佛法自出家財在諸州鎮建佛圖精舍合七十二處冩十六部一切經延致名徳沙門日講論精勤不倦所費亦不貲而諸州營塔寺多在高山秀阜傷殺人牛有沙門勸止之熈曰成就後唯見佛圖焉知殺人牛也北齊高隆之為尚書右僕射領御史中尉廣費人功大營寺塔為高祖所責唐裴寛崇信釋典嘗與僧徒往來焚香禮懴老而彌篤𤣥宗開元末為河南尹僧普寂卒寛與妻子皆服縗經設次哭臨妻子送喪至嵩山嚴挺之與裴寛皆奉佛開元末僧恵義卒挺之服縗麻送於龕所天寳初授員外詹事使令東京飬疾挺之欝欝不得志成疾自為墓誌塟于大炤和尚塔次西原臣欽若等曰大炤即恵義師謚也王縉字夏卿為門下侍郎平章事與兄維俱奉佛不茹葷血縉晚年尤甚與杜鴻漸捨財造寺無限極妻李氏卒捨道政里第為寺與之追福奏其額曰寳應度僧三十七人住持寺節度觀察使入朝必延至寳應寺議令施財助己修繕初代宗喜祠祀未甚重佛而元載杜鴻漸與縉喜飯僧徒代宗嘗問以福業報應載等因而啟奏代宗繇是奉之過當魚朝恩為内侍代宗永泰初設無遮㑹齋於崇仁坊之南街大奏音樂大歴中又抗疏請度母為尼法名功徳居修慈寺許之請以通化門外莊為寺以章敬為名福資太后許之是莊連城對郭林沼臺榭形勝第一朝恩初以恩賜得之及是造寺窮極壯麗以為城市林木不足充費乃奏壊曲江館華清宫風樓月觀及百司行廨署并將相歿官宅給其用焉土木之役僅逾萬億杜鴻漸為山劔副元帥篤好佛法惡軍旅之事大厯初自劔南回請千僧齋於資聖寺仍請魚朝恩李懐玉同行香許之以使蜀無恙徼福也又於長興里築第崇餙門館賦詩大畧曰嘗願追禪侣焉能挹化源朝士多和之將卒命僧剃頭遺令其子建塔塟不為墳冀同于僧頗為逺識所誚時人惜之藍簡憲宗元和中為諫議性柔奉浮圖之像教拘溺過甚劉總為幽州節度使穆宗長慶初奏請以私第為佛寺又奏請為僧詔授侍中天平軍節度總因乞出家朝廷以緇服就賜之錫名大覺裴休為相家世奉佛休尤深於釋典太原鳳翔近名山多僧寺視事之隟逰踐山林與僧講求佛理中年後不食葷血嘗齋戒屏嗜欲香爐貝典不離齋中咏歌賛唄以為法樂與尚書紇紀泉皆以法號相字時人重其高潔而鄙其太過梁李鄑為太子太傅末帝詔曰李鄑多因釋教誑惑羣情此後不得出入無常周宋彦筠初仕晉為同州節度使貪鄙無術溺於釋氏唯營寺繢塑香燈幢幡僧尼資貝之類則捨之無慳日給數十千多取於四民以充其費後為豳州節度使所貯資金多奉釋氏嘗謂人曰吾前後供僧一千餘萬造佛宫九十餘所又嘗召僧讀畢生經日課若干卷至瞑目以來令不負所課如嬰疾闕讀隨即填補立劵設咒毎僧給二十緡僧至者甚衆乃减緡一半未幾只給三緡其無行貪穢猥之僧利其緡投劵者填咽彦筠患之乃止初彦筠一旦與其主母有㣲忿遽擊殺之自後嘗有所睹彦筠心不自安乃修浮屠法以禳之因而溺志於釋氏其後毎嵗至金仙入湼槃之日嘗衣斬縗號慟於其像前其佞佛也如是家有婢妾數十人皆令削髪披緇以侍左右大為當時所誚䜛佞有虞之命則曰堲䜛説先聖之戒則曰逺佞人葢邪偽可以惑聰明浸潤可以間忠信淳素既隐巧詖滋萌義以利遷政繇寵放故有行媚於内善䛕於朝脂韋其性以悦於上貝錦其辭以譖於下愛同嫉異害正忌能挾蔕芥之嫌緣疑似之隙媒孽其短文致厥辜采苓之刺以興投杼之疑斯起交亂國家離間君臣職為厲階無已太甚故君子之惡利口王者之難任人其有㫖哉寒浞伯明氏之䜛子弟也寒國名伯明其君名伯明后寒棄之夷羿收之信而使之以為已相浞行媚于内内宫也而施賂于外愚弄其民欺㒺之而虞羿于田樂之㳺田樹之作慝以取其國家樹立也外内咸服服信詐周虢石父幽王時為卿用事國人皆怨石父為人佞巧佞一作謟善䛕王用之暴公為卿士而譖蘇公作何人斯之詩而絶之暴也蘇也皆畿内國名虢仲譖其大夫詹父於王虢仲王卿士詹父屬大夫詹父有辭以王師伐虢夏虢公出奔虞鄭詹鄭之㣲者也齊人執之自齊逃來書其佞也曰佞人來矣一云鄭詹鄭之佞人也豎牛魯叔孫豹穆子也小臣使為政為家政初穆子適齊娶於國氏生孟丙仲壬公孫明知叔孫於齊公孫明齊大夫子明也與叔孫相親知歸未逆國姜子明取之國姜孟仲母故怒其子長而後使逆之子孟丙仲壬田於丘蕕丘蕕地名遂遇疾焉豎牛欲亂其室而有之强與孟盟不可欲使從已孟不肯叔孫為孟鐘曰爾未際際接也孟未與諸大夫相接見饗大夫以落之以猳猪血釁鐘曰落既具饗禮具使豎牛請日請饗日入弗謁謁白也出命之日許命日及賔至聞鐘聲牛曰孟有北婦人之客北婦人國姜也客謂公孫明怒將往牛止之賔出使拘而殺諸外殺孟丙牛又强與仲盟不可仲與公御萊書觀於公萊書公御士名仲與之私㳺觀於公宫公與之環使牛入示之示叔孫入不示出命佩之牛謂叔孫見仲而何而何如何叔孫曰何為怪牛言曰不見既自見矣言仲已自往見公公與之環而佩之矣遂逐之費無極楚大夫也郤宛為左尹直而和國人説之以直事君以和接類鄢將師為右領右領官名與費無極比而惡之惡郤宛令尹子常賄而信䜛無極譛卻宛焉謂子常曰子惡欲飲子酒子惡卻宛又謂子惡令尹欲飲酒於子氏子惡曰我賤人也不足以辱令尹令尹將必來辱為恵已甚吾無以酬之若何酬報獻無極曰令尹好甲兵子出之吾擇焉擇取以進子常取五甲五兵曰寘諸門令尹至必觀之而從以酬之及饗日帷諸門左張帷陳甲兵其中無極謂令尹曰吾幾祸子子惡將為子不利甲在門矣子必無往且此役也吳可以得志子惡取賂焉而還又誤羣帥使退其師曰乗亂不祥吳乗我喪我乗其亂不亦可乎令尹使視郤氏則有甲焉不往召鄢將師而告之告子惡門有甲兵將害己將師退遂令攻郤氏且爇之爇燒也子惡聞之遂自殺也國人弗爇令曰不爇郤氏與之同罪或取一編菅焉或取一秉秆焉編菅苫也秉把也秆束也國人投之遂弗爇也令尹炮之炮燔卻宛盡滅卻氏之族黨公伯僚字子固魯人固愬子路於季孫子服景伯以告孔子曰夫子固有惑志季孫信䜛恚子路也僚也吾力猶能肆諸市朝孔子曰道之將行命也道之將廢命也公伯僚其如命何臧倉魯平公嬖人也公將出倉請曰它日君出必命有司所之今已駕矣敢請公曰吾將見孟子倉曰君何為輕身以先於匹夫者以為賢乎禮義繇賢者出孟子之後喪踰前喪君無見焉公曰諾上官大夫楚懐王臣也時屈原字平嫺音閑於辭令王甚任之上官大夫與之同列争寵而心害其能懐王使屈原造為憲令屬草藁未定上官大夫見而欲奪之屈平不與因讓之曰王使屈平為令衆莫不知每一令出平伐其功曰以為非我莫能為也王怒而䟽屈平後漢令狐畧狼孟大姓也建武六年曲陽令馮衍上書陳八事光武將召見先是衍為狼孟長以罪摧䧟畧是時畧為司空長史䜛之於尚書令王䕶尚書周生豐曰衍所以求見者欲毁君也䕶等懼之即共排間衍遂不得入孟岱當袁紹官渡之敗審配二子為曹操所擒岱與配有隙因蔣竒言於紹曰配在位専政族大兵强且二子在南必懐反畔郭圖辛評亦以為然紹遂以岱為監軍代配守鄴逄紀為袁紹統軍事田豐為别駕紀憚豐亮直數䜛之於紹紹遂忌豐紹時與曹公戰豐固諫之紹怒囚豐而去及紹軍之敗於官渡也士潰奔北師徒畧盡軍皆拊膺而泣曰向令田豐在此不至於是也紹謂逄紀曰冀州人聞吾軍敗皆當念吾唯田别駕前諫止吾與衆不同吾亦慙見之紀復曰豐聞將軍之敗拊手大笑喜其言之中也紹於是有害豐之意魏劉曄為侍中以先進見幸因譛尚書令陳矯専權矯懼以問長子本本不知所出次子騫曰主上明聖大人大臣今若不合不過不作公耳晉嚴舒為雒陽太守馬隆為平虜䕶軍西平太守加授東羌校尉積十餘年威信振隴右舒與楊駿通親宻圖代隆毁隆年老謬耄不宜服戎於是徴隆以舒代鎮氐羌聚結百姓驚懼朝廷恐關隴復擾乃免舒遣隆復職盧志為成都王頴左長史頴既以陸機為將頴謂機曰若功成事定當爵為郡公位以台司將軍勉之矣機曰昔齊桓任夷吾以建九合之功燕恵疑樂毅以失垂成之業今日之事在公不在機也志心害機寵言於頴曰陸機自比管樂擬君闇主自古命將遣師未有臣陵其君而可以濟事者也頴黙然扈瓌為隋郡内史陳敏之亂荆州刺史劉宏以南蠻長史陶侃為江夏太守加鷹揚將軍敏遣其弟恢來冦武昌侃出兵禦之瓌間侃於宏曰侃與敏有鄉里之舊居大郡統强兵脱有異志則荆州無東門矣宏曰侃之忠能吾得之已乆豈有是乎侃潛聞之遽遣子洪及兄子臻詣宏以自固宏引為叅軍資而遣之王國寳少無士操不修亷隅婦父謝安惡其傾側毎抑而不用除尚書郎國寳以中興膏腴之族惟作吏部不為除曹郎甚怨望固辭不拜從妺為㑹稽王道子妃繇是與道子㳺處遂間毁安焉孝武末年嗜酒好肉而道子昏醟尤甚惟狎昵諂邪於是國寳諂諛之計稍行於主相之間而好利險詖之徒以安功名盛極而搆㑹之嫌隙遂成後趙程遐以清河張披為長史遐甚委昵之張賔舉為别駕引叅政事遐疾披去已又惡賔之權盛石勒世子宏即遐之甥也自以有援欲收威重於朝乃使宏之母譛之曰張披與張賔為遊俠門客日百餘乗物望皆歸之非社稷之利也宜除披以便國家勒然之至是披取急召不時至因此遂殺之賔知遐之間已遂弗敢請梁梁矜孫鄧元起為益州刺史任庾黔婁蔣光濟以州事並勸為善政矜孫性輕脱與黔婁志行不同乃言於元起曰城中稱有三刺史節下何以堪之元起繇此䟽黔婁光濟而治迹稍損後唐段凝初為梁將後降莊宗莊宗以為􅉸州兵馬留後凝上䟽奏梁朝掌事權者趙巖等並助成虐政結怨於人聖政惟新宜誅首惡以謝天下於是張漢傑張漢融張漢倫張希逸趙縠朱珪等並族誅家財籍沒朱守殷本名㑹兒莊宗就學時諸奴也及莊宗嗣位以本院僕從為長直軍使雖列戎行不聞戰功毎搆人之短長中於莊宗漸以為腹心册府元龜卷九百二十七
