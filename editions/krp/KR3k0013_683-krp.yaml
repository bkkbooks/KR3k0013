body:
  text: 册府元龜卷六百八十三宋王欽若等撰牧守部遺愛第二後魏刁雍為徐州刺史在鎮七年徴還京師頻歲為邊民所請太武嘉之復授使持節侍中都督楊豫兖徐四州諸軍事征南将軍徐豫二州刺史伊馥為東雍州刺史恩化大行百姓思之薛虎子文成時為枋頭鎮将因小過黜為鎮門事獻文南巡虎子拜訴於路時山東饑饉盗賊競起相州民孫誨等五百餘人稱虎子在鎮之日土境清静訴乞虎子乃復除枋頭鎮将即日之任陸馥為相州刺史假長廣公徴為散騎常侍民乞留馥者千餘人獻文不許民吏大斂布帛以遺之馥一皆不受民亦不取於是以物造佛寺焉名長廣公寺崔寛為鎮西将軍陜城鎮将宏農土出漆蠟竹木之饒路與南通販貿來往家産豐富百姓樂之諸鎮之中號為能政及解鎮還京民多追戀詣闕上者三百餘人書奏孝文嘉之穆羆為征東将軍吐京鎮将孝文改吐京鎮為汾州仍以羆為刺史前吐京太守劉升在郡甚有威惠限滿還都胡民八百餘人詣羆請之羆為表請帝從之後州民李軌郭及祖等七百餘人詣闕頌羆恩德帝以羆政和民悦増秩延限穆亮羆之子亮累遷使持節征西大将軍西戎校尉燉煌錦都大将軍政尚寛簡賑恤窮乏被徴還百姓追思之長孫陳為北鎮都将性寛厚好學愛士所厯輒為人追思之尉諾為幽州刺史在州有惠政吏民追思之薊人張廣逹等二百餘人詣闕請之復除幽州刺史李祥為河間太守有威恩之稱徴拜中書侍郎民有千餘上書乞留數年不許任城王雲為徐州刺史性善撫綏得徐方人心以盍太妃憂去官為百姓追戀所遺錢貨一無所受彭城王勰為揚州刺史政崇寛裕秋毫不犯淮南士庶追其餘惠至今思之張蒲為相州刺史卒於州吏民痛惜之冦治為荆州刺史代下之後蠻民以刺史酈道元峻刻請治為刺史朝議以邊民宜悦乃以治代道元崔挺為光州刺史宣武即位累表乞還景明初見代老幼泣涕追隨縑帛贈送挺悉不納後北海王祥為司徒錄尚書事以挺為司馬卒光州故吏聞凶問莫不悲感共鑄八尺銅像於城東廣固寺起八關齋追奉㝠福其遺愛如此楊逸為光州刺史甚有異政及其家禍爾朱仲逺遣使於州害之吏人如喪親戚城邑村落為營齋供一月之中所在不絶傅豎眼為益州刺史屢請解州乃以元法僧代之益州民追隨戀泣者數百里崔休為幽州刺史遷青州在幽青積五六年皆清白愛民甚著聲績二州懷其德澤百姓追思之裴衍為建興河内二郡太守亷眞寡欲善撫百姓民吏追思之劉道斌為嘗農太守修理學舘建孔子廟堂畵圖形像去郡之後民追思之乃復畵道斌形於孔像之西而拜謁焉明亮為平陽太守清白愛民甚有惠政聲績之美顯著當時朝廷嘉其風化轉汲郡太守為治如前二郡民吏迄今追思之趙宗為河東太守清浄愛人及卒百姓追思之房景伯為清河太守舊守令六年為限限滿将代郡民韓靈和等三百餘人表訴乞留復加二載韋崇為鄉郡太守更滿應代吏民詣闕乞留復延三年在郡九年羊敦為廣平太守卒吏民奔哭莫不悲慟淮南王他孫法夀為安州刺史更滿還朝吏人詣闕訴乞孝明嘉之詔復州任李韶為冀州刺史清簡愛民復轉定州刺史及赴中山冀州父老皆送出西境相聚而泣正光三年卒於官既𦵏之後有冀州兵千餘人戍於荆州還經韶墓相率陪冢數日方歸其遺愛如此杜纂厯博陵鉅鹿平陽清河太守蔬食敝衣為百姓所思號為良守纂後為大中大夫正光末清河人房通等三百人頌纂德政乞重臨郡詔許之蘇淑為樂陵内史在郡綏撫甚有名譽始經二周謝病乞解有詔聽之民吏老幼訴乞淑者甚衆後厯滎陽太守亦有能名又拜中山太守卒於郡淑清心愛下所厯三郡皆為吏民所思當時稱為良二千石堯雄為豫州刺史尋與行䑓侯景破梁楚豫州民上書更乞雄為刺史復行豫州事撫養兵民得其力用在邊十年屢有功績豫人於今懷之裴他為趙郡太守轉東荆州刺史郡民戀仰傾境餞送至今追思之史寧為凉州刺史西魏大統中詔寧率所部鎮河陽寧先在凉州戎夷服其威惠遷鎮之後邊民竝思慕之復除凉州刺史北齊彭城王浟自定州刺史徴為侍中人吏送别悲號有老翁數百人相率具饌曰自殿下至來五載人不識吏吏不欺人百姓有識已來始逢今化殿下唯飲此鄉水未食百姓食聊獻蔬薄浟重其意為食一口封隆之為冀州刺史留心撫字吏民追思立碑頌德韓軌為秦州刺史甚得邊和神武巡秦州欲以軌還仍賜城人戸别絹布兩匹州人田昭等七千户皆辭不受唯乞留軌神武嘉歎乃留焉李平厯八州刺史再臨懷州所在為吏民所思立碑頌德趙彦深為東南道行臺尚書徐州刺史政尚恩信為吏人所懷多所降下所營軍處士庶追思號趙行臺文宣璽書勞勉徴為侍中辛術為清河太守政有能名追授并州長史遭父憂去職清河父老數百人詣闕上請立碑頌德赫連子悦為鄭州刺史治為天下之最入為都官尚書鄭州民八百餘人請立碑頌德有詔許焉獨孤永業為雒州刺史徴為領軍将軍河雒民庶多思永業朝廷又以疆埸不安除永業河陽道行臺僕射雒州刺史陽休之為中山太守後為西兖州刺史俱有惠政為吏民所懷去官之後百姓樹碑頌德盧潛為揚州刺史大樹風績徴為五兵尚書揚州吏民以潜戒斷酒肉篤信釋氏大設僧會以香花縁道流涕送之潛歎曰正恐不乆復來耳至鄴未幾陳将吳明徹度江侵掠復以潛為揚州行臺尚書韋津脩為信州刺史及解代還京民庶道路追别滿道或将酒脯涕泣留連竟欲送出境既盛暑恐其勞弊往往為之駐馬隨舉一酌示領其意辭謝令還後州民鄭播宗等七百餘人請為立碑斂縑布數百匹託中書侍郎李德林為文以紀功德府省為奏勑報許之郎基為潁川郡守既卒柩将還逺近將送莫不攀轅悲哭宋世良為清河太守及代至傾城祖道有老人丁金剛泣而前謝曰巳年九十記三十五政君非唯善治清亦徹底今失賢君民何以濟莫不攀轅涕泣後周邵惠公道為秦州刺史薨於上邽議者以道撫和西戎威恩顯著欲令世鎮隴右以彰厥德乃𦵏上邽城西無疆原華戎㑹𦵏萬餘人奠祭於路悲號滿野皆曰我君拾我而去大小相率負土成墳墳髙五十餘尺周迴八十餘歩為官司所止然後泣辭而去其遺愛見思如此齊殤王憲為益州刺史時年十六憲善綏撫留心政術辭訟輻輳聽受不疲蜀人懷之共立碑頌德崔謙為濟北太守既徴赴鄴百姓號泣遮道數日不得前冦雋為梁州刺史雋在州清苦不治産業其子等竝徒歩而還吏民送雋留連乆之乃得出界郭賢厯廣勲安三州刺史在官無明察之譽以亷平待物去後頗亦見思長孫儉為荆州總管以疾還京及卒荆民儀同趙超等七百人感儉遺愛詣闕請為儉立廟樹碑詔許之韋􅖰為𤓰州刺史州通西域蕃夷前後刺史多受賂遺􅖰雅性清儉蕃夷賂遺一無所受公私安静夷夏安之及秩滿還京夷民戀慕老幼追送留連十日方得出境郭彦為灃州刺史秩滿還朝民吏號泣送彦三百餘里唐永為幽州刺史夷人送路者莫不垂淚當路遮留相隨數日始得出境薛端為蔡州刺史為政寛惠人吏愛之轉基州刺史州地接于梁籍其鎭撫總管史寧遣司馬梁榮催令赴任蔡州父老訴榮請留端者千餘人尉遲迥為益州刺史及徴還蜀人思之立碑頌德宇文顯和為夏州刺史以疾去職深為吏民所懷柳敏為郢州刺史甚得物情及将還朝夷夏士人感其惠政竝賫酒餚及物産候之於路敏乃從他道而還申徽為襄州刺史及代還人吏送者數十里不絶徽自以無德於人慨然懷愧因賦詩題於清水亭長幼聞之皆竟來就讀逓相謂曰此是申使君手迹竝冩讀之竇熾為原州刺史州城之北有泉水焉熾屢經遊踐嘗與僚吏宴於泉側因酌水自美曰吾在此州唯當飲水而已及去職之後人吏感其遺惠每至此泉者莫不懷之楊敷自䝉州刺史徴為司水中大夫夷夏吏民及荆州總管長孫儉竝表請留之時議欲東討将委敷以舟艦轉漕之事故弗許焉裴俠為河北郡太守後遷工部中大夫卒河北郡前功曹張因及吏人等感俠遺愛乃作頌紀其清德焉隋獨孤楷為益州總管甚有惠政蜀中父老于今稱之伊婁謙字彦恭為澤州刺史清約自處甚得人和以疾去職吏人攀戀行數百里不絶樊叔畧為相州刺史徴拜司農卿吏人莫不流涕相與立碑頌其德政公孫景茂厯息伊道淄四州刺史皆有德政其去伊州吏人號泣於道身死之日諸州人吏赴喪者數千人或不及𦵏皆望墳慟哭野祭而去趙軌為齊州别駕考績連最髙祖徴軌入朝父老相送者各揮泣曰别駕在官水火不與百姓交是以不敢以壺酒相送公清若水請酌一杯水奉餞軌受而飲之令狐熈為滄州刺史風教大治開皇四年髙祖幸雒陽熈之朝吏民恐其遷易悲泣於道及熈復還百姓出境迎謁歡叫盈路八年徙為河北道行臺度支尚書吏民追思立碑頌德王仁恭為汲郡太守有能名遷信都太守汲郡吏民扣馬號哭於道數日不得出境其得人情如此樊子盖先任武威太守後卒於京武威民吏聞其死莫不嗟痛立碑頌德薛胄檢校相州事甚有能名後以罪鏁詣大理相州吏人素感其恩詣闕理胄者百餘人周羅㬋初仕陳為豫章内史獄訟庭决不關吏手民懐其惠立碑頌德焉裴肅為永平郡丞甚得民夷心歲餘卒夷獠思之為立廟於鄣江之浦元巖為益州總管長史卒官髙祖悼惜乆之益州父老莫不殞涕于今思之于璽為邵州刺史在州數年甚有恩惠州人張顯等數十人詣闕上表請留髙祖嘉歎良乆令還邵州父老相賀衛𤣥為衛尉少卿仁夀初山獠作亂為資州刺史以鎮撫之𤣥到官單騎造其營說以利害渠帥感説解兵而去除遂州總管仍令劍南安撫煬帝即位復徴為衛尉夷獠攀戀數百里不絶𤣥曉之曰天子詔徴不可乆住因與之訣夷獠各揮涕而去來護兒為瀛州刺史以善政聞頻見勞勉煬帝嗣位被徴入朝百姓攀戀累日不能出境詣闕上書致請者前後數百人帝謂曰昔國歩未康卿為名将今天下無事又為良二千石可謂兼美矣楊文思為魏州刺史甚有惠政及去職吏民思之為立碑頌德元亨為衛州刺史衛土俗薄亨以威嚴鎮之在職八年風化大洽後以老病表乞骸骨吏人詣闕乞表請留卧治帝嗟嘆者乆之其年亨以疾重還京侯莫陳頴為瀛州刺史甚有惠政在職數年坐與秦王俊交通免官百姓送者莫不流涕因相與立碑頌頴清德郭絢為涿郡通守将兵擊竇建德於河間戰死人吏哭之數日不息唐韋仁夀武德初為雋州刺史檢校南寧州都督及将還諸酋長號泣曰天子遣公鎮撫南寧何得便去仁夀以城池未立為辭諸酋長乃相與築城立廨舍仁夀曰吾奉詔但令巡撫不敢擅住及将歸蠻夷父老各揮涕相送因遣子弟隨之劉師立貞觀中檢校岐州都督丁母憂去職岐州父老上表請留之太宗下優詔不許赴哀令更聴後㫖楚王靈龜髙宗永徽中為魏州刺史稱為良牧及喪歸百姓思其德政為立碑焉賈敦實咸亨初為雒州長史初敦實兄敦頥為雒州刺史甚有惠政百姓共為樹碑于大市通衢及敦實去職復刻石頌其德立於兄碑之側故時人呼為棠棣碑焉崔日用為并州刺史為政以恵愛見稱及卒靈櫬初發并州吏人數百皆縞素送喪裴懷古初為并州大都督府長史為吏人所懷中宗神龍中遷左羽林大將軍未逹都復授并州長史吏人聞懷古下車而罷出郊以候懷古懷古恐傷其意命官吏驅逐出迎之人而百姓奔赴逾衆其為人所思如此李濬厯潤虢潞三州刺史又拜益州長史所厯皆以誠信待物稱為良吏及去職咸有遺愛王晙景龍末為桂州都督桂州糧匱乏晙始改築羅城奏罷屯兵及轉運又堰江水開屯田數千頃百姓賴之後上疏請歸鄉拜墓州人詣闕請留之中宗手詔報晙曰卿處事强濟逺近寧輯築城務農利益已廣括穏撫綏復業已多宜俟政成安此黎庶况百姓堅請豈敢固違不須來也晙在州數年人立碑以頌其政陽嶠為魏州刺史厯兖州荆州長史所在以清白聞魏人詣闕割耳請嶠重臨其郡又除魏州刺史宋璟為廣州都督夷夏懷惠立碑以紀其政呂諲肅宗上元中為荆州節度理江陵三年號為良牧初立生祠祈禱殁後嵗餘将士等又率錢十萬於府西爽塏地移祠宇立之李鼎為鳯翔尹百姓立生祠鼎執表乞改置佛寺度僧七人許之苗晉卿寛厚亷謹為政舉大綱不問小過所到有惠化所蒞金州魏州人思之皆立碑頌德嚴郢為京兆尹宰臣楊炎惡其累已隂令御史張著廷尉劾郢誣以他罪拘於金吾仗京師百姓日數千百人将詣闕救郢於建福門德宗微知之乃削郢兼御史中丞百姓知郢得不坐皆迎拜喧呼聲聞數里張延賞練逹政經大厯建中間連統四鎮所至稱理其去也皆刻石紀德焉陳孝揚為雋州刺史二十餘年蠻夷愛之後以老歸成都蠻夷交持之泣涕數百里方免袁滋自華州刺史徴拜左金吾衛大将軍耆耋鰥孤遮道不得去楊於陵代其任宣言謂百姓曰於陵必不敢易袁公之政然後羅拜而訣嚴公弼為隨州刺史亡母墓在沔州為盗所發公弼奔赴沔州隨州百姓耆老相率見觀察使柳公綽稱公弼在州甚有惠政公綽上言却令守本官以從人欲可之薛平元和中為滑州刺史鄭滑節度使在鎮六周嵗兵甲完利井賦均一至是入覲百姓遮道乞留數日乃得出時人以為近日節制罕有其比楊元卿為涇原節度使既罷監軍奏涇人請為立德政碑以紀之薛放為江南西道觀察使在鎮唯用清潔為理一方之人至今思之韋丹為江西觀察使卒官太和中觀察使裴誼奏請與丹立碑祠丹踐厯官次深逹吏方江西邑屋皆以草覆竹椽常多火患及丹到悉以瓦木大革前俗并課百姓墾田人多儲蓄因有是請文宗從之王質為虢州刺史厯河南尹宣歙池等州觀察使每分憂寄必先究其土俗然後致理故所至有遺愛焉崔戎自華州刺史遷兖海沂密都團練觀察等使將行州人戀惜遮道至有解鞾竊鐙者令狐緒為汝州刺史有能政後郡人請立碑頌德及為夀州罷郡吏人乞留焉張仲武武宗會昌中鎮幽州既卒漁陽之人有八九十嵗少而識其面者説之則淚宗回咸通末為潁州刺史僧道百姓詣義成軍節度使杜慆與留惂奏之勑曰宗回清幹臨人自有月限方藉綏葺未議替移後唐張全義自唐末為河南尹四十年兵亂之餘再造都畿瀍雒之民恩如父母斑白耆老到今思之李嗣昭為昭義節度天祐十六年代周德威權幽州軍府事九月李紹宏代歸嗣昭出薊門百姓號泣請留截鞍惜别嗣昭夜遁而歸夏魯竒明宗天成初自河陽移鎮許州百姓官吏填門號泣留一年如是數日不能别魯竒曰吾為天子軍民長史遲留違詔昭有常刑多謝父老勿貽我譴父老曰拜章聞天可也公不可行乃至卧輪斷鐙塹守軍門明宗遣中使慰譬之方解父老號泣攀隨交境而去袁象先為天平節度使奉詔赴闕鄆人遮留毁石橋而不得進乃自他門而逃烏震初為趙州刺史疎財禮士有安民之政轉深州刺史人頗思之郭延魯末帝清泰中為復州刺史臨任忽驚嘆曰先人曾為沁牧九年不移我得不遵其家法而使政有紕繆者乎由是正俸之外未嘗歛貸庶事致理一郡賴焉及秩滿百姓上章舉留将離境攀轅遮圍者不能去朝廷聞而嘉之晉李承約初仕後唐為黔南節度使數年之間巴卭蠻蛋不敢犯境外勸農桑内興學校凶邪悉去民皆感義故父老司徒俊等詣闕言其政化又聽留周嵗符令謙初仕後唐為趙州刺史不周嵗而部内大理俄以病終於官及歸𦵏本邑百姓隨而泣之者數千人庶幾為一代之良牧也漢劉審交為汝州防禦使汝為近輔號為難治審交盡去州弊無擾於民百姓歌之乾祐三年春卒郡人聚哭於柩所列狀乞留葬本州界立碑起祠以時致祭本州以聞詔曰朝廷之制皆有舊章牧守之官比無増典其或政能殊異惠及蒸黎生有令名殁留遺愛褒賢奬善豈限彜章可特贈太尉吏民所請宜依周翟光鄴廣順中權知京兆府既卒吏民如喪所親街衢父老相逢垂涕或以漿酒遥奠者將𦵏郡民詣府乞留神柩葬於雍土仍請立祠以時祭醊府司以聞朝廷不允其請李榖初仕漢為陳州刺史廣順末陳州言宛邱縣民稱榖以惠愛治民欲立祠堂以聞時榖為宰輔聞郡人陳請太祖前陳讓者數四薛瓊為萊州團練使卒本州僧道百姓等列狀上請以瓊有善政在人乞立祠堂及樹碑以述其遺愛世宗從之册府元龜卷六百八十三
