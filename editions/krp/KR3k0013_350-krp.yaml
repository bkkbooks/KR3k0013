body:
  text: 册府元龜卷三百五十宋王欽若等撰將帥部立功第三晉胡奮初仕魏為校尉匈奴中部帥劉猛叛使驍騎路蕃討之以奮為監軍假節頓軍硜北為蕃後繼擊猛破之猛帳下將李恪斬猛而降以功累遷征南將軍假節都督荆州諸軍事石苞初仕魏為奮武將軍監青州軍事及諸葛誕舉兵淮南苞統青州諸軍督兖州刺史周泰徐州刺史胡質簡鋭卒為游軍以備外寇吳遣大將朱異丁奉等來迎誕等留輜重於都陸輕兵渡黎水苞等逆擊大破之太山太守胡烈以奇兵詭道襲都陸盡焚其委輸異等收餘衆而退壽春平拜苞鎮東將軍封東光侯馬隆武帝泰始中為司馬督涼州為虜所没乃以隆為武威太守討之隆西渡温水虜樹機能等以衆萬計或乘險以遏隆前或設伏以斷隆後隆依八陣圖作偏箱車地廣則鹿角車營路狹則為木屋於車上且戰且前弓矢所及應弦而倒奇謀間發出敵不意或夾道累磁石賊負鐡鎧行不能前隆卒悉被犀甲無所留礙賊咸以為神轉戰千里殺傷以千數隆到武威虜大人猝跋韓且萬能等率萬餘落歸降前後誅殺及降附者以萬計又率善戎没骨能等與樹機能大戰斬之涼州遂平王渾泰始中以安東將軍都督揚州諸軍事鎮夀春吳人大佃皖城圗為邊害渾遣揚州刺史應綽督淮南諸軍攻破之并破諸别屯焚其積榖百八十餘萬斛稻苖四千餘頃船六百餘艘渾遂陳兵東疆視其地形險易歴觀敵城察攻取之勢及大舉伐吳渾率師出横江遣參軍陳慎都尉張喬攻㝷陽瀨郷又擊吳牙門將孔忠皆破之獲吳將周興等五人又遣殄吳䕶軍李純據髙望城討吳將俞恭破之多所斬獲吳厲武將軍陳代平虜將軍朱明懐懼而來降吳丞相張悌大將軍孫震等率衆數萬指城陽渾遣司馬孫疇揚州刺史周浚擊破之臨陣斬二將及首虜七千八百級吳人大震吳司徒何植建威將軍孫晏送印節詣渾降既而王濬破石頭降孫皓眀日渾始濟江登建鄴宫以功增封八千戸進爵為公陳騫泰始末以大將軍攻拔吳枳里城破涂中屯戍獲吳立信校尉莊祐王濬太康元年正月以龍驤將軍率巴東監軍廣武將軍唐彬攻吳丹陽尅之擒其丹陽監盛紀二月庚申尅吳西陵獲其鎮南將軍劉憲征南將軍成據宜都太守虞忠壬戌尅荆門夷道二城獲監軍陸晏乙丑尅樂鄉乙亥詔進濬為平東將軍假節都督益梁諸軍事濬自發巴蜀兵不血刃攻無堅城夏口武昌無相支抗于是順流鼓棹徑造三山孫皓遣游擊將軍張象率舟軍萬人禦濬象望旗而降皓用光禄勲薛瑩中書令胡冲計送降文于濬壬寅濬入于石頭收其圗籍領州四郡四十三縣三百一十三户五十二萬三千吏三萬二千兵二十三萬男女口二百三十萬米榖二百八十萬斛舟船五千餘艘杜預太康元年以鎮南大將軍都督荆州諸軍事陳兵於江陵遣參軍樊顯尹林鄧圭襄陽太守周奇等率衆循江西上授以節度旬日之間累尅城邑又遣牙門管定周㫖伍巢等率奇兵八百汎舟夜渡以襲樂郷虜吳都督孫歆而還于是進逼江陵吳督將伍延偽請降而列兵登陴預攻尅之既平上流于是沅湘以南至於交廣吳之州郡皆望風歸命奉送印綬預杖節稱詔而撫之凡所斬及生獲吳都督監軍十四牙門郡守百二十餘人孫皓既平振旅凱入以功封當陽侯周浚太康元年以折衝將軍射陽侯領揚州刺史隨王渾伐吳攻破江西屯戍與孫皓中軍大戰斬偽丞相張悌等首級數千俘馘萬計進軍屯于横江孫皓既降于王濬浚乃濟江與王渾共行吳城壘綏撫新附以功進封成武侯食邑六千戸眀年移鎮秣陵時吳初平屢有逃亡者頻討平之孟觀惠帝時為積弩將軍氐帥齊萬年反于關中衆數十萬諸將覆敗相繼以觀沈毅有文武材用乃啟觀討之觀所領宿衞皆趫健勇悍并綂關中士卒身當矢石大戰十數皆破之生擒萬年威慴氐羌轉東羌校尉李矩為征西將軍梁王肜牙門將伐氐帥齊萬年有殊功封東眀亭侯及雒陽不守太尉荀藩奔陽城衞將軍華薈奔成臯時大饑賊帥侯都等每略人而食之藩薈部曲多為所啖矩討都等滅之乃營護藩薈各為立屋宇輸榖以給之及藩承制建行臺假矩滎陽太守矩招懐離散逺近多附之石勒親率大衆襲矩矩遣老弱入山令所在散牛馬因設伏以待之賊争取牛馬伏發齊呼聲動山谷遂大破之斬獲甚衆勒乃退索綝為鷹揚將軍南陽王模從事中郎劉聰侵掠關東以綝為奮威將軍以禦之斬聰將吕逸又破聰黨劉豐遷新平太守愍帝立綝領太尉擊破劉曜將日逐王呼延莫劉曜入關芟麥苗綝又擊破之自長安伐劉聰聰將趙染染仗其累捷有自矜之色帥精騎數百與綝戰大破之染單馬而走麴允為尚書左僕射領軍持節西戎校尉時劉曜殷凱趙染數萬衆逼長安允擊破之擒凱于陣茍晞以北軍中候行兖州刺史汲桑之破鄴也東海王越出次官渡以討之命晞為前鋒桑素憚之於城外為栅以自守晞將至頓軍休士先遣單騎示以祻福桑衆大震弃栅宵遁嬰城固守晞陷其九壘遂定鄴而還西討吕朗等滅之後髙宻王泰討青州賊劉根破汲桑故將公師藩敗石勒于河北威名甚盛時人擬之韓白進位撫軍將軍假節都督青兖諸軍事封東平郡侯邑萬户劉𢎞太安中以南蠻校尉荆州刺史率前將軍趙驤等討賊帥張昌自方城至新野所向皆平及新野王歆之敗也以𢎞代為鎮南將軍都督荆州諸軍事𢎞遣長史陶侃為大都䕶參軍蒯恒為義軍督䕶牙門將皮初為都戰帥進據襄陽張昌并軍圍宛敗趙驤軍𢎞退屯梁侃初等累戰破昌前後斬首數萬級及到宛西昌懼而逃其衆悉降荆土平𢎞遣軍討昌于下雋山斬之悉降其衆進拜侍中鎮南大將軍周玘太安中右將軍陳敏反于揚州以玘為安豐太守加四品將軍玘稱疾不行宻遣使告鎮東將軍劉凖令發兵臨江玘為内應凖遣督護衡彥率衆而東時敏弟昶為廣武將軍歴陽内史以吳興錢廣為司馬玘宻諷廣殺昶玘與顧榮甘卓等以兵攻敏敏衆奔潰單馬北走追獲之于江乘界斬之於建康張光為順陽太守陵江將軍討陳敏之亂時江夏太守陶侃與敏大將錢端相拒於長岐將戰襄陽太守皮初為歩軍使光設伏以待之武陵太守苗光為水軍藏舟艦於沔水皮初等與賊交戰光發伏兵應之水陸同奮賊衆大敗王浚為安北將軍懐帝永嘉三年九月石勒寇恒山浚使鮮卑騎救之大破勒于飛龍山應詹愍帝時為南平太守假督南平天門武陵三郡軍事天門武陵谿蠻竝反詹討降之鎮南將軍山簡復假詹督五郡軍事會蜀賊杜疇作亂來攻詹郡力戰摧之㝷與陶侃破杜弢于長沙眀帝時王敦作逆帝以詹為護軍將軍假節都督朱雀橋南賊從竹格渡江詹與建威將軍趙裔等擊敗之斬賊帥杜發梟首數千級賊平封觀陽縣侯食邑千六百户甘卓元帝初渡江授卓前鋒都督揚威將軍後討周馥征杜弢屢經苦戰多所擒獲以前後功進爵南鄉侯周訪為揚烈將軍領兵一千二百屯㝷陽鄂陵與甘卓趙誘討華軼軼所統武昌太守馮逸來攻訪訪率衆擊破之逸遁保柴桑訪乘勝進討軼遣其黨王約𫝊札等萬餘人助逸大戰于湓口約等又敗訪與甘卓等㑹於彭澤與軼水軍將朱矩等戰又敗之軼將周廣燒城以應訪軼衆潰訪執軼斬之遂平江州以為振武將軍㝷陽太守又與諸軍共征杜弢弢歸湘州訪復以舟師造湘城軍逹富池而弢遣杜𢎞出海昏時湓口騷動訪步上柴桑偷渡與賊戰斬首數百賊退保廬陵訪追擊敗之賊嬰城自守㝷而軍糧為賊所掠退住巴丘糧廩既至復圍𢎞於廬陵𢎞大擲財物于城外軍人競拾之𢎞因陣亂突圍而出訪率軍追之獲鞍馬鎧仗不可勝數𢎞入南康太守將率兵逆擊又破之奔于臨賀進龍驤將軍武關賊帥杜曾聚兵數萬大為人害威震江沔帝命訪擊之曾攻訪左右甄皆敗訪選精鋭八百人以進賊未至三十步親鳴鼓將士皆騰躍奔赴曾遂大潰殺千餘人曾遁走訪部將蘇温收曾赴軍送王敦斬之祖約為平西將軍豫州刺史及王敦舉兵約歸衞京都率衆次夀陽逐敦所署淮南太守任台以功封五等侯進號鎮西將軍蘇峻為奮威將軍臨淮内史及王敦舉兵渡竹格渚拔栅將戰峻率其將韓晃于南塘横截大破之又隨庾亮追沈充進使持節冠軍將軍歴陽内史加散騎常侍封邵陵公温嶠為中壘將軍王敦逼京師嶠自率衆與賊夾水戰擊王含敗之復督劉遐追錢鳳於江寧事平封建寧縣開國公進號前將軍朱伺為綏夷都尉陳敏作亂陶侃鎮江夏以伺能水戰曉作舟艦乃遣作大艦署為左甄據江口摧破敏前鋒敏兄恢稱荆州刺史在武昌侃率伺及諸軍進討破之敏恢既平伺以功封亭侯領騎督隨陶侃討杜弢有殊功加威逺將軍又以平蜀賊龍髙之功加廣咸將軍毛寳為南中郎將督隨義陽二郡鎮上眀隨庾亮討郭黙黙平與亮司馬王愆期等救桓宣于章山擊賊將石遇破之鄧嶽為西陽太守及蘇峻反平南將軍温嶠遣嶽與督護王愆期鄱陽太守紀睦等率舟軍赴難峻平還郡郭黙之叛大司馬陶侃使嶽率西陽之衆討之黙平遷督交廣二州軍事建武將軍領平越中郎將廣州刺史假節録前後勲封宜城縣伯咸康三年嶽遣軍伐夜郎破之劉遐為龍驤將軍下邳内史初沛人周堅一名撫與同郡周黙因天下亂各為塢主以寇抄為事及黙降祖逖撫怒遂襲殺黙以彭城叛石勒遣騎援之詔遐領彭城内史與徐州刺史蔡豹太山太守徐龕共討撫戰于寒山撫敗走荀羨為徐州刺史監青州軍事慕容擕攻段蘭於青州詔使羨救之擕將王騰趙盤寇瑯邪鄄城北境騷動羨討之擒騰盤迸走軍次琅邪而蘭已没羨退還下邳留將軍諸葛攸髙平太守劉莊等三千人守琅邪參軍戴逯蕭鎋二千人守泰山是時慕容蘭以數萬衆屯汴城甚為邉害羨自光水引汶通渠至於東阿以征之臨陣斬蘭陶侃為龍驤將軍元帝使侃擊杜弢令振威將軍周訪廣武將軍趙誘受侃節度令二將為前鋒兄子輿為左甄擊賊破之侃後為平南將軍時交州刺史王諒為賊梁碩所陷陶侃遣將髙寳進擊平之録前後功封次子夏為都亭侯王舒為假節都督行揚州刺史討蘇峻時吳國内史庾氷棄郡奔舒舒移告屬縣以吳王師虞􅔎為軍司御史中丞謝藻行龍驤將軍監前鋒征討軍事率衆一萬與庾氷俱渡浙江前義興太守顧衆護軍參軍顧颺等皆起義軍以應舒舒假衆揚威將軍督護吳中軍事颺監晉陵軍事于御亭築壘峻聞舒等兵起乃赦庾亮諸弟以悦東軍舒率衆次郡之西江為氷藻後繼氷颺等遣前鋒進據無錫遇賊將張健等數千人交戰大敗奔還御亭復自相驚擾氷颺等竝退於錢塘藻守嘉興賊遂入吳燒府舎掠諸縣所在塗地舒以輕進奔敗斬二軍主者免氷颺督護吳晉陵軍屯兵章埭吳興太守虞潭率所領討健屯烏苞亭竝不敢進時暴雨大水賊管商乘船旁出襲潭及衆潭等奔敗潭還保吳興衆退守錢塘舒更遣將軍陳孺率精鋭千人增戍海浦所在築壘或勸舒宜還都使謝藻守西陵扶海立柵舒不聴留藻守錢塘使衆颺守紫壁於是賊轉攻吳興潭諸軍復退賊復掠東遷餘杭武康諸縣舒遣子允之行揚烈將軍與將軍徐遜陳孺及揚烈司馬朱燾以精銳三千徑邀賊于武康出其不意遂破之斬首數百級賊委舟歩走允之收其器械進兵助潭時賊韓晃既破宣城轉入故鄣長城允之遣朱燾何凖等擊之戰於乾湖潭以彊弩射之晃等退走斬首千餘級納降二千人潭繇是得保郡是時臨海新安諸山縣竝反應賊舒分兵悉討平之㑹陶侃等至京都潭等竝以屢戰失利移書盟府自貶去節侃遣使敦喻不聽及侃立行䑓上舒監浙江東五郡軍事允之都護吳郡義興晉陵三郡征討軍事既而晃等南走允之追躡於長塘湖復大破之賊平以功封彭澤縣侯庾氷為吳國内史蘇峻作逆遣兵攻氷氷不能禦便棄郡奔會稽會稽内史王舒以氷行奮武將軍拒峻别率張健於吳中健黨甚衆諸將莫敢先進氷率衆擊健走之于是乘勝西進赴于京都又遣司馬滕含攻賊石頭城拔之氷勲為多庾懌為左衞將軍以討蘇峻功封廣饒男顧衆為揚威將軍蘇峻反王師敗績衆還吳濳圗義舉時吳國内史庾氷奔于會稽峻以蔡謨代之前陵江將軍張悊為峻收兵於吳衆遣人喻悊悊從之衆乃遣郎中徐機告謨曰衆已濳合家兵待時而奮又與張悊尅期効節謨乃檄衆為本國督護揚威將軍仍舊衆從弟護軍將軍颺為威逺將軍前鋒督護吳中人士同時響應峻遣將𢎞徽領甲卒五百鼔行而前衆與颺悊要擊徽戰於髙莋大破之收其軍實謨以氷當還任故便去郡衆遣颺率諸軍屯無錫氷至鎮御亭恐賊從海虞道入衆自徃備之而賊帥張健馬流攻無錫颺等大敗庾氷亦失守健等遂據吳城衆自海虞繇婁縣東倉與賊别率交戰破之義軍又集進屯烏苞㑹稽内史王舒吳興内史虞潭並檄衆為五郡大督護統諸義軍討健潭遣將姚休為衆前鋒與賊戰没衆還守紫壁時賊黨方鋭義軍沮退人咸勸衆過浙江衆曰不然今保固紫壁可得全錢塘以南五縣若越他境便為寓軍控引無所非長計也臨平人范眀亦謂衆曰此地險要可以制寇不可委也衆乃拔眀為參軍明率宗黨五百人合諸軍凡四千人復進討健健退于曲阿留錢𢎞為吳令軍次路丘即斬𢎞首衆進住吳城遣督護朱祈等九軍與蘭陵太守李閎共守庱亭健遣馬流陶陽等往攻之閎與祈等逆擊大破之斬首二千餘級峻平論功衆以承檄奮義推功于謨謨以衆唱謀非己之力俱表相讓論者美之封鄱陽縣伯周撫為征虜將軍督寜州諸軍事穆帝永和初桓温征蜀進撫督梁州之漢中巴西梓潼隂平四郡軍事鎮彭模撫擊破蜀餘寇隗文鄧定等斬偽尚書僕射王誓平南將軍王潤以功遷平西將軍隗文鄧定等復反立范賢子賁為帝初賢為李雄國師以左道惑百姓人多事之賁遂有衆一萬撫與龍驤將軍朱燾擊破斬之以功進爵封建城縣公桓温為安西將軍永和二年伐蜀蜀李勢衆大潰温乘勝直進焚其小城勢遂夜遁九十里至晉夀葭萌城其將鄧嵩昝堅勸勢降乃面縛輿櫬請命温解縛焚櫬送于京師温停蜀三旬舉賢旌善偽尚書僕射王誓中書監王瑜鎮東將軍鄧定散騎常侍常璩等皆蜀之良也竝以為參軍百姓咸悦軍未旋而王誓鄧定隗文等反温復討平之振旅還江陵十二年姚襄入於許昌温以太尉為大都督討之戰于伊水大敗之襄走平陽徙其餘衆三千餘家於江漢之間執降賊周成而歸太和四年率衆伐慕容暐暐將慕容垂帥衆拒温温擊敗之九月戊寅温裨將鄧遐宋序遇暐將傅末波於林渚又大破之温弟豁為建威將軍督沔中七郡軍事擊慕容屈塵破之進號右將軍監荆揚雍州軍事領護南蠻校尉時梁州刺史司馬勳以梁益叛豁使其參軍桓羆討之而南陽督護趙𢎞趙憶等逐太守桓淡據宛城以叛豁與竟陵太守羅崇討破之又攻偽南中郎將趙盤于宛盤退走豁追至魯陽獲之送于京師置戍而還豁弟冲為鷹揚將軍鎮蠻護軍西陽太守從其兄温征伐有功遷都督荆州之南陽襄陽新野義陽順陽雍州之京兆揚州之義城七郡軍事寧朔將軍鎮襄陽又從温破姚襄及虜周成進爵豐城公温之破姚襄也獲襄將張駿楊凝等徙于㝷陽冲在江陵未及之職而駿率其徒五百人殺江州督護趙毗掠武昌府庫將妻子北叛冲遣將討獲之遽還所鎮豁卒冲領護南蠻校尉荆州刺史苻堅遣其將苻融寇樊鄧石越寇魯陽姚萇寇南郷韋鍾寇魏興冲率前將軍劉波及兄子振威將軍石民冠軍將軍石䖍等伐之拔堅筑陽攻武當走堅兖州刺史張崇又使石䖍伐堅襄陽太守閻震擒之及大小帥二十九人送於京師堅使其將郝貴守襄陽冲使揚威將軍朱綽討之遂焚燒沔北稻田拔六百餘戸而還又遣上庸太守郭寳伐堅魏興太守禇坦上庸太守段方竝降之新城太守麴常遁走三郡皆平豁子石䖍為寧逺將軍領南頓太守帥諸將攻袁真于夀陽尅其南城又擊符堅將王鑒于石橋獲馬五百匹後為冠軍將軍領南平太守㑹符堅荆州刺史梁成襄陽太守閻震率衆入寇竟陵石䖍與弟石民距之賊阻滶水屯管城石䖍設計夜渡水既濟賊始覺力戰破之進尅管城擒震斬首七千級俘獲萬人馬數百匹牛羊千頭具裝鎧三百領成以輕騎走保襄陽石䖍復領河東太守進據樊城逐堅兖州刺史張崇納降二千家而還石䖍弟石民為衞將軍謝安參軍叔父冲上疏拔石民振武將軍戍夏口與兄石䖍攻符堅荆州刺史梁成等於竟陵眀年又與隨郡太守夏侯澄之破符堅將慕容垂姜成等於漳口復領譙國内史梁郡太守冲薨詔以石民監荆州軍事西中郎將荆州刺史石民遣將軍晏謙伐𢎞農賊東中郎將慕容䕫降之始置胡陜二戍獲關中擔幢伎以充太樂時符堅子丕僭號於河北謀襲雒陽石民遣將軍馮該討之臨陣斬丕及其左僕射王孚吏部尚書荀操等傳首京都時乞活黄淮自稱并州刺史與翟遼共攻長社衆數千人石民復遣南平太守郭銓松滋太守王遐之擊淮斬之遼走河北以前後功進左將軍石民弟石康為振威將軍荆州刺史以討庾仄功封武陵王朱序為鷹揚將軍江夏相興寧末梁州刺史司馬勲反桓温表序征討都䕶往討之以功拜征虜將軍封襄平子桓宣為南中郎將江夏相石勒荆州刺史郭敬戍襄陽陶侃使其子平西參軍斌與宣俱攻樊城拔之竟陵太守李陽又破新野敬懼遁走宣與陽遂平襄陽侃使宣鎮之後庾亮為荆州將謀北伐以宣為都督沔北前鋒征討軍事平北將軍司州刺史假節鎮襄陽石季龍使騎七千渡沔攻之亮遣司馬王愆期輔國將軍毛寳救宣賊三面為地窟攻城宣募精勇出其不意殺傷數百人多獲鎧馬賊解圍退走桓伊為建威將軍督豫州之十二郡揚州之江西五郡軍事與謝𤣥共破符堅别將王鑒張蚝等以功封宣城縣子又進都督豫州諸軍事西中郎將豫州刺史及符堅南寇伊與冠軍將軍謝𤣥輔國將軍謝琰俱破堅於淝水以功封永修縣侯進號右軍將軍謝尚為建威將軍鎮夀春時符堅將楊平戍許昌尚遣兵襲破之謝安尚從弟也為侍中都督揚豫徐兖青州五州幽州之燕國諸軍事假節時符堅強盛疆場多虞諸將敗退相繼安遣弟石及兄子𤣥等應機征討所在尅捷拜衛將軍開府儀同三司封建昌縣公堅後率衆號百萬次于淮淝京師震恐加安征討大都督指授將帥各當其任𤣥等既破堅安以總統功進拜太保安子琰為侍中苻堅之役安以琰有軍國才用出為輔國將軍以精卒八千與從兄𤣥俱陷陣破堅以勲封望蔡公王恭舉兵假琰節都督前鋒軍事恭平遷衞將軍徐州刺史假節孫恩作亂加督吳興義興二郡州事討恩至義興斬賊許允之迎太守魏鄢還郡進討吳興賊丘延破之謝𤣥安兄子也為南郡相監北征討軍事于時符堅彊盛邉境數被侵寇𤣥以建武將軍兖州刺史領廣陵相監江北諸軍事苻堅遣軍圍襄陽車騎將軍桓冲禦之詔𤣥發三州人丁遣彭城内史何謙游軍襄淮以為形援堅將彭超進軍南侵句難毛當自襄陽來㑹超圍幽州刺史田洛于三阿有衆六萬詔征虜將軍謝石率水軍次涂中右衞將軍毛安之㳺擊將軍河間王曇之淮南太守楊廣宣城内史丘凖次堂邑既而盱眙城陷髙宻内史毛藻没安之等軍人相驚遂各散退朝廷震動𤣥於是自廣陵西討難等何謙解田洛圍進據白馬與賊大戰破之斬其偽將都督顔因復進兵又破之斬其偽將邵保超難引退𤣥率何謙戴逯田洛追之戰於君川復大破之𤣥參軍劉牢之攻破浮航及白船督護諸葛侃單父令李都又破其運艦難等相率北走僅以身免於是罷彭城下邳二戍詔遣殿中將軍慰勞進號冠軍加領徐州刺史還於廣陵以功封東興縣侯及苻堅自率兵次于項城衆號百萬而涼州之師始達咸陽蜀漢順流幽并繼至先遣符融慕容暐張蚝苻方等至潁口梁成王先等屯雒澗詔以𤣥為前鋒都督徐兖青三州揚州之晉陵幽州之燕國諸軍事與叔父征虜將軍石從弟輔國將軍琰西中郎將桓伊龍驤將軍檀𤣥建威將軍戴熈揚武將軍陶隱等拒之衆凡八萬𤣥先遣廣陵相劉牢之五千人直至雒澗即斬梁成及成弟雲步騎奔潰爭赴淮水牢之縱兵追之生擒堅偽將梁佗王顯梁悌慕容屈氐等收其軍實堅進屯壽陽列陣臨淝水𤣥軍不得渡𤣥使謂苻融曰君逺涉吾境而臨水為陣是不欲速戰諸君稍却令將士得周旋僕與諸君緩轡而觀之不亦樂乎堅衆皆曰宜阻淝水莫令得上我衆彼寡勢必萬全堅曰但却軍令得過而我以鐵騎數十萬向水逼而殺之融亦以為然遂麾使却陣衆因亂不能止於是𤣥與琰伊等以精銳八千涉淝水石軍距張蚝小退𤣥琰仍進決戰淝水南堅中流矢臨陣斬融堅衆奔潰自相蹈藉投水死者不可勝計淝水為之不流餘衆棄甲宵遁聞風聲鶴唳皆以為王師已至草行露宿重以飢凍死者十七八獲堅乘輿雲母車儀服噐械軍資珍寳山積牛馬驢騾駱駝十萬餘𤣥已破苻堅復率衆次于彭城遣叅軍劉襲攻堅兖州刺史張崇于鄄城走之使劉牢之守鄄城兖州既平遣淮陵太守髙素以三千人向廣固降堅青州刺史苻朗又進伐冀州遣龍驤將軍劉牢之濟北太守丁匡據磝碻濟陽太守郭滿據滑臺奮武將軍顔雄渡河立營堅子丕遣將桑據屯黎陽𤣥命劉襲夜襲據走之丕惶遽欲降𤣥許之丕告饑𤣥饋丕米二千斛又遣晉陵太守滕恬之渡河守黎陽三魏皆降以兖青司豫平加𤣥都督徐兖青司冀幽并七州軍事𤣥上疏以方平河北幽冀宜須總督司州懸逺應統豫州以勲封康樂縣公復遣寧逺將軍春演伐申凱于魏郡破之謝石為尚書僕射征句難以勲封興平縣伯淮淝之役詔石解僕射以將軍假節征討大都督與兄子𤣥琰破苻堅堅之敗也雖功始劉牢之而成于𤣥琰然石時實為都督焉遷中軍將軍尚書令劉牢之為謝𤣥前鋒符堅將句難南侵𤣥率何謙等拒之牢之破難輜重于盱眙獲其運船遷鷹揚將軍廣陵相時車騎將軍桓冲擊襄陽宣城内史胡彬率衆向夀陽以為冲聲援牢之領卒三千為彬後繼淮肥之役苻堅遣其弟融及驍將張蚝攻陷夀陽𤣥使彬與牢之拒之師次硤石不敢進堅將梁成又以二萬人屯雒澗𤣥遣牢之以精卒五千拒之去賊十里成阻澗列陣牢之率參軍劉襲諸葛求等直進渡水臨陣斬成及其弟雲又分兵斷其歸津賊步騎奔潰爭赴淮水殺獲萬人又收其器械堅㝷亦敗歸長安餘黨所在屯結牢之進平譙城使戴寳戍之遷龍驤將軍彭城内史以功詔賜爵武岡縣男復守淮隂後進戍彭城領太守妖賊劉黎僭尊號于皇丘牢之討滅之符堅將張遇遣兵擊破金鄉圍泰山太守羊邁牢之遣叅軍向欽之擊走之㑹慕容垂叛將翟釗救遇牢之引還釗還牢之進平泰山追釗于鄄城釗走河北因獲張遇以歸牢之鎮京口孫恩攻陷㑹稽牢之遣將桓寳帥師救三吳復遣子敬宣為寳後繼比至曲阿吳郡内史桓謙已棄郡走牢之乃率衆東討拜表輒行至吳與衞將軍謝琰擊賊屢勝殺傷甚衆徑臨浙江進拜前將軍都督吳郡諸軍事時謝琰屯烏程遣司馬髙素助牢之牢之率衆軍濟浙江恩懼逃于海牢之還鎮恩復入㑹稽為害謝琰牢之進號鎮北軍都督㑹稽五郡率衆東征屯上虞分軍戍諸縣恩復攻破吳國殺内史袁山松牢之使參軍劉裕討之恩復入海頃之恩浮海奄至京口戰士十萬樓船千餘牢之在山隂使劉裕自海鹽赴難牢之率大衆而還裕兵不滿千人與賊戰破之恩聞牢之已還京口乃走郁州又為敬宣劉裕等所破及恩死牢之威名轉振楊佺期少仕軍府咸康中領衆屯城固苻堅將潘猛拒守康回壘佺期擊走之其衆悉降拜廣威將軍河南太守戍雒陽苻堅將竇衝率衆攻平陽太守張元熈于皇天塢佺期擊走之佺期自湖城入潼關累戰皆捷斬獲千計降九百餘家歸於雒陽進號龍驤將軍虞丘進少時隨謝𤣥討苻堅有功封關内侯中從劉裕征孫恩戍句章城被圍數十日無日不戰身被數鎗至餘姚阿浦破賊張驃追至海鹽故治及婁縣于滿濤口與孫恩水戰又被重傷追恩至壽州又至石鹿頭還海鹽大柱頻戰有功劉毅為桓𢎞中兵參軍屬桓𤣥簒位毅與劉裕何無忌魏詠之等起義兵討𤣥裕率毅等至竹里𤣥使其將皇甫敷吳甫之北拒義軍遇之于江乘臨陣斬甫之進至羅落橋又斬敷首𤣥大懼使桓謙何澹之屯覆舟山毅等軍至蔣山裕使羸弱登山多張旗幟𤣥不之測益以危懼謙等士卒多北府人素慴伏裕莫敢出鬭裕與毅等分為數隊進突謙陣皆殊死戰無不一當百時東北風急義軍放火煙塵張天皷譟之音震駭京邑謙等諸軍一時奔敗𤣥既西走裕以毅為冠軍將軍青州刺史與何無忌劉道規躡𤣥毅與道規及下邳太守孟懷玉等追及𤣥戰于崢嶸州毅乘風縱火盡鋭爭先𤣥衆大潰燒輜重夜走𤣥將郭銓劉雅等襲陷㝷陽毅遣武威將軍劉懐肅討平之毅復與劉道規追桓𤣥至㝷陽桓亮自號江州刺史毅遣劉敬宣擊走之毅軍次夏口桓振黨馮該戍大岸孟山圗據魯城桓山客守偃月壘衆合萬人連艦二岸水陸相援毅督衆軍進討未至夏口遇風飄没千餘人毅與劉懐肅索邈等攻魯城道規攻偃月壘何無忌與檀祗列艦于中流以防越逸毅躬貫甲胄陵城半日而二壘俱潰生擒山客而馮該遁走毅進平巴陵南陽太守魯宗之起義襲襄陽破桓蔚毅等諸軍次江陵之馬頭桓振擁乘輿出營江津宗之又破偽將温楷振自擊宗之毅因率無忌道規等諸軍破馮該於豫章口摧鋒而進遂入江陵振聞城陷與謙北走乘輿反正毅執𤣥黨卞範之羊僧夀夏侯崇之桓道恭等皆斬之桓振復與苻宏自鄖城襲陷江陵與劉懐肅相持毅遣部將擊振殺之并斬偽輔國將軍桓珍毅又攻拔遷陵斬𤣥太守劉叔祖於臨嶂其餘擁衆假號以十數皆討平之二州既平以毅為撫軍將軍時刁豫等作亂屯於湘中毅遣將分討皆滅之詔以毅為都督豫州揚州諸軍事梁州刺史劉雅反毅遣將討擒之諸葛長民劉裕建義初為揚武將軍從討桓𤣥以功拜輔國將軍宣城内史於時桓歆聚衆向歴陽長民擊走之又與劉敬宣破歆於芍陂封新淦縣公督淮北諸軍事鎮山陽城義熈初慕容超寇下邳長民遣部將徐琰擊走之何無忌為輔國將軍瑯邪内史以㑹稽王道子所部精兵悉配之南追桓𤣥與振武將軍劉道規俱受冠軍將軍劉毅節度𤣥留其龍驤將軍何澹之前將軍郭銓江州刺史郭昶之守湓口無忌等次桑落州道規乘勝徑進無忌又皷譟赴之澹之遂潰進據㝷陽遣使奉送宗廟主及䕶武康公主瑯邪王妃還京都又與劉毅劉道規破走桓𤣥于崢嶸州無忌進據巴陵𤣥從兄謙從子振乘間陷江陵無忌道規進攻謙於馬頭攻桓蔚於龍泉皆破之既而為桓振所敗退還㝷陽無忌與毅道規復進討振尅夏口三城遂平巴陵進次馬頭桓謙請割荆江二州奉送天子無忌不許進軍破江陵謙等敗走無忌侍衞安帝還京師復以興復之功封安城郡開國公册府元龜卷三百五十
