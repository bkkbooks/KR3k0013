body:
  text: 册府元龜卷五百宋王欽若等撰邦計部錢幣第二宋高祖即位初言事者多以錢幣减少國用不足欲悉市民銅更鑄五銖錢散騎常侍范泰奏議曰流聞將禁私銅以充官銅民雖失器終於獲直國用不足其利實多臣愚意異不寧寢黙臣聞治國若烹小鮮拯弊莫若務本百姓不足君孰與足未有民貧而國富本不足而末有餘者也故囊漏貯中識者不吝反裘負薪存毛實難王者不言有無諸侯不言多少食禄之家不與百姓争利故㧞葵所以明治織蒲謂之不仁是以貴賤有章職分無爽今之所憂在農民尚寡倉廪未充轉運無已資食者衆家無私積難以禦荒耳夫貨存貿易不在多少昔日之貴今日之賤彼此共之其揆一也但令官民均通則無患不足若使必資貨廣以收國用者則龜貝之屬自古所行尋銅之為器在用也博矣鍾律所通者逺機衡所揆者大夏鼎負圖實冠衆瑞晉鐸呈象亦啟休徵器有要用則貴賤同資物有適宜則家國共急今毁必資之器而為無施之錢於貨則功不補勞在用財則君民俱困校之以實損多益少陛下勞謙終日無倦庶務以身率物勤素成風而頌聲不作者良由基根未固意在逺畧伏願思可乆之道除欲速之情𢎞山海之納擇蒭牧之説則嘉謀日陳聖慮可廣也文帝元嘉七年立錢署鑄四銖錢文曰四銖重如其文二十四年以貨貴制大錢一當兩二十五年罷大錢當兩先是貨少鑄四銖錢民間頗盜鑄多剪鑿古錢以取銅文帝患之錄尚書江夏王義恭建議以一大錢當兩以防剪鑿議者多同尚書僕射何尚之議曰伏覽明命欲改錢制不勞採鑄其利自倍實救弊之𢎞筭増貨之良術求之管淺猶有未譬夫泉貝之興以估貨為本事存交易豈假多少數少則幣輕數多則物重多少雖異濟用不殊况復以一當兩徒崇虚價者耶凡創制改法宜從民情未有違衆矯物而可乆者也泉布廢興驟議前代赤仄白金俄然罷息六貨潰亂民泣於市良由事不畫一難用遵行自非急病權時宜守乆長之業煩政曲雜致逺嘗泥且貨偏則民病故先王立井田之法以一之使富不滛侈貧不過匱雖兹法乆廢不可頓施要宜而近粗相放擬若今制遂行富人貲貨自倍貧者彌増其困懼非所以欲均之意又錢之行式大小多品直云大錢則未知其格若止於四銖五銖則文皆古篆既非下走所識如或漫滅尤難分明公私交亂争訟必起此最是其深疑者也命㫖兼慮剪鑿日多以至消盡鄙意復謂殆無此嫌民巧雖宻要有蹤跡且用錢貨銅事可尋撿直由屬所怠縱糾察不精致使立制以來發覺者寡令雖有懸金之名竟無酬與之實若申明舊科禽獲即報明畏法希賞不日自定矣愚者之議智者擇焉猥参訪逮敢不輸盡吏部尚書庾炳之侍中太子左衛率蕭思話中䕶軍趙伯符御史中丞何承天太常郄敬叔並同尚之議中領軍沈演之以為龜貝行於上古泉刀興自有周皆所以阜財通利實國富民者也歴代雖逺資用彌便但採鑄乆廢兼䘮亂累仍縻散湮㓕何可勝計晉遷河南彊境未廓或士習其風錢不普用其數本少為患尚輕今王畧開廣聲教遐暨金鏹所布爰逮荒服昔所不及悉已流行之矣用彌廣而貨愈狹加復競竊剪鑿銷毁滋繁刑雖重禁姦弊方宻遂使嵗月增貴貧室日虚愍作肆力之民徒勤不足以供贍誠由貨貴物賤嘗調未革弗思釐改為弊專深斯實親教之良時通變之嘉㑹愚謂若以大錢當兩則國傳難朽之寳家贏一倍之利不俟加憲巧源自絶施一令而衆美成無興造之費莫盛於兹矣帝從演之議遂以一當兩行之經時至是以公私非便乃罷孝武建元元年更鑄四銖錢立錢署鑄錢先是元嘉中鑄四銖錢輪郭形制與五銖同用費損無利故百姓不盜鑄及帝即位又鑄孝建四銖百姓因此盜鑄錢轉偽小商貨不行尚書右丞徐爰議曰貴貨利民載自八政開鑄流圜法成九府民富國實教立化光及時移俗易則通變適用是以周漢俶遷隨世輕重降及後代財豐用足因循前貫無復改創年歴既逺䘮亂屢經煙焚剪毁日月消减貨薄民貧公私俱困不有革造必將大乏宜應式遵古典收銅繕鑄納贖刋刑著在往策今宜以銅贖刑隨罪為品詔可之所鑄錢形式薄小輪郭不成就於是民間盜鑄者雲起雜以鉛錫並不牢固又剪鑿古錢以取其銅錢既薄小稍違官式雖重制嚴刑民吏官長坐死免者相係而盜鑄彌甚百物踊貴人患苦之乃立品格薄小無輪郭者悉加禁斷始興郡公沈慶之立議曰昔秦幣過重髙祖是患普令民鑄改造榆莢而貨輕物重又復乖時太宗放鑄賈誼致譏誠以採山術存銅多利重耕戰之器曩時所用四民競造為害或多而孝文弗納民鑄遂行故能朽貫盈府天下殷實况今耕戰不用採鑄廢乆鎔冶所資多因成器功艱利薄絶吳鄧之資農民不息無釋耒之患方今中興開運聖化唯新雖復偃甲銷戈而倉庫未實公私所乏唯錢而已愚謂宜聽民鑄錢郡縣開置錢署樂鑄之家皆居署内平其准式去其雜偽官歛輪郭藏之以為永寳去春所禁新品一時施用今鑄悉依此格萬税三千嚴撿盜鑄并禁剪鑿數年之間公私豐贍銅盡事息姦偽自止且禁鑄則銅轉成器開鑄則器化為財剪華利用於事為益帝下其事公卿太宰江夏王義恭議曰伏見沈慶之議聽民私鑄樂鑄之室皆入署居平其凖式去其雜偽愚謂百姓不樂與官相關由來甚乆又多是人士蓋不欲入署凡盜鑄為利利在偽雜偽雜既禁樂入必寡云歛取輪郭藏為永寳愚謂上之所貴下必從之百姓聞官歛輪郭輪郭之價百倍大小對易誰肯為之强制使换狀似逼奪又去春所禁新品一時施用愚謂此條在可開許又云今鑄宜依此格萬税三千又云嚴撿盜鑄不得更造愚謂禁制之設非惟一旦昧利犯憲羣庶常情不患制輕患在冒犯今入署必萬輸三千私鑄無十三之税逐利犯禁居然不斷又云銅盡事息姦偽自禁愚謂赤縣内銅非可卒盡比及銅盡姦偽己積又云禁鑄則銅轉成器開鑄則器化為財然頃所患於刑式不均加以剪鑿又鉛錫衆雜耳止於盜鑄者銅亦無須苦禁顔竣議曰泉貨利用近古所同輕重之議定於漢世魏晉以降未之能改誠以物貨既均改之偽生故也世代漸乆弊運頓至因革之道宜有其術今云開署放鑄誠所欣同但慮採山爭鑄器用日耗銅既轉少器亦彌貴設器直一千則鑄之减半為之無利雖令不行又云去春所禁一時施行用是欲使天下豐財若細物必行而不從公鑄利己既深情偽無極私鑄剪鑿書不可禁五銖半兩之属不盈一年必至於盡財貨未贍大錢已竭數嵗之間悉為塵土豈可令取弊之道基於皇代今百姓之貨雖為轉少而市井之民未有嗟怨此新禁初行品式未一須臾自止不足以埀聖慮唯府藏空匱實為重憂今縱行細錢官無益賦之理百姓雖贍無解官乏唯簡費去華設在節儉求贍之道莫此為貴然錢有定限而消息無方剪鑄雖息終致窮盡者亡應官開取銅之路絶器用之塗定其品式月日漸鑄嵗乆之後可為世益耳時議者又以銅轉難得欲鑄二銖錢竣又議曰議者將為官藏空虚宜更改鑄天下銅少宜减錢式以救交弊賑國舒民愚以為不然今鑄二銖恣行新細於官無解於乏而民奸巧大興天下之貨靡碎至盡空立嚴禁而利深難絶不過一二年間其弊不可復救此甚不可一也今鎔鑄有頓得一二倍之理縱復得此必待彌年嵗暮税登財幣漸革日用之費不贍數月雖權徴助何解下乏耶徒使奸民意駃而貽厥愆謀此又甚不可二也民懲大錢之改兼畏近日新禁市井之間必生喧擾逺利未開切患猥及富商得志貧民困窘此又甚不可三也若使交易深重尚不可行况又未見其利而衆弊如此失筭當時取誚百代乎帝不聽前廢帝永光元年開百姓鑄錢由是錢貨亂散一千錢長不盈三寸大小稱此謂之鵝眼錢劣於此者謂之綖環錢入水不沉隨手破碎市井不復料數十萬錢不盈一掬斗米一萬商貨不行景和元年鑄二銖錢形式轉細官錢毎出民間即模效之而大小厚薄皆不及也無輪郭不磨鑢如今之剪鑿者謂之來子明帝即位初禁鵝眼綖環錢其餘皆通用復禁民鑄官署亦廢止太始二年斷新錢專用古錢南齊太祖建元四年奏朝請孔顗上鑄錢均貨議辭甚博其畧以為食貨相通理勢自然李悝曰糴甚貴傷民甚賤傷農民傷則離散農傷則國貧甚貴甚賤其傷一也三吳國之關奥比嵗時被水潦而糴不貴是天下錢少非穀穰賤此不可不察也鑄錢之弊在輕重屢變重錢患難用而難用為無累輕錢弊盜鑄而盜鑄為禍深民所盜鑄嚴法不禁者由上鑄錢惜銅愛工也惜銅愛工者謂錢無用之器以通交易務欲令輕而數多使省工而易成不詳慮其為患也自漢鑄五銖錢至宋文帝歴五百餘年制度世有廢興而不變五銖錢者明其輕重可法得貨之宜也以為宜開置泉府方收貢金大興鎔鑄錢重五銖一依漢法府庫已實國用有儲乃量俸祿薄賦税則家給民足頃盜鑄新錢者皆效作剪鑿不鑄大錢也摩澤淄染始皆類也故交易之後渝變還新良民弗習淄染不復行矣所鬻賣者皆徒實其物盜鑄者復賤買新錢淄染更用反覆生詐循環起奸此明主尤所深禁而不可長也若官錢已布於民使嚴斷剪鑿小輕破缺無周郭者悉不得行官錢細小者稱合銖兩銷以為大利貧良之民塞奸巧之路錢貨既均逺近若一百姓樂業市道無爭衣食滋殖矣時議者多以錢貨轉少宜更廣鑄重其銖兩以防民奸帝使諸州郡大市銅㑹晏駕事寢武帝即位初水旱不時竟陵王子良啟曰泉鑄年逺類多剪鑿江東大錢十不一在公家所受必須輪郭完全遂買本一千加子七百求請無地揺革相尋完者為用既不兼兩廻復遷貿會非委積縱令小民無嬰困苦且錢帛相半為制永乆或聞長宰須令輸直進違舊科退容奸利永明八年廣郡卑蒙山下有城名蒙城可二頃地有燒爐四所高一丈五尺從蒙城渡水南北許歩平地掘土深二尺得銅又有古掘銅坑深二丈并居宅處猶存鄧通南安人漢文帝賜通嚴道縣銅山鑄錢今蒙山近青衣水南青衣在側並是故秦之銅山嚴道地青衣縣又改名漢嘉且蒙山去南安一百里按此必是通所鑄地近唤蒙山僚出云甚可經畧此議若立潤利無極并獻蒙山銅片又銅石一片平州鐡刀一口帝從之遣使入蜀鑄錢得千工費多乃止梁高祖天監初准京師及三呉荆郢江湘梁益用錢其餘州郡則雜以穀帛交易交廣之域全以金銀為貨帝乃鑄錢肉好周郭文曰五銖重四銖三參二黍其百文則重一斤二兩又别鑄除其肉各謂之公式女錢徑一寸文曰五銖重如新鑄五銖二品並行百姓或私以古錢交易者其五銖徑一寸三分重八銖文曰五銖三吳属縣行之女錢徑一寸重五銖無輪郭郡縣皆通用太平百錢二種並徑一寸重四銖四銖源流本一但文字古今之殊耳文並曰太平百錢定平二百五銖徑六分重一銖半文曰定平一曰稚錢五銖徑一寸半重四銖文曰五銖源出於五銖但狹小東境謂之稚錢五銖徑七分半重三銖半文曰五銖源出稚錢但稍遷異以銖為朱耳三呉行之差少於餘錢又有對文錢其源未聞豐貨錢徑一寸重四銖半謂之男錢亦婦人佩之即生男此等輕重不一天子頻下詔書非新鑄二等之錢並不許用趨利之徒私用轉甚普通四年十二月罷銅錢鑄鐡錢時人以鐡易得並皆私鑄大同已後所在鐡錢遂如丘山物價騰貴交易者以車載錢不復計數而唯論貫商旅奸詐因以求利自破嶺以東八十為陌名曰東錢江郢以上七十為陌名曰西錢京師以九十為陌名曰長錢大同元年七月詔曰朝四而暮三衆狙皆喜名實未虧而喜怒為用頃聞外間多用九陌錢陌錢减則物貴陌錢足則物賤非物有貴賤是心有顚倒至於逺方日更滋甚豈直國有異政乃家有殊俗徒亂王制無益民財今可通用足陌錢令書行後百日為期若猶有犯男子謪運女子質作並同詔下而人不從錢陌益少至於末年遂以三十五為陌敬帝太平元年三月班下逺近並同雜用今古錢二年四月鑄四柱錢一准二十壬辰改四柱錢一准十丙申復閉細錢陳高祖永定初承梁䘮亂之後鐡錢不行梁元始末又有兩銖錢及鵝眼錢於時人雜用其價同但兩柱重而鵞眼輕私家多鎔鑄又間以錫鐡兼以粟帛為貨文帝天嘉三年改鑄五銖錢初出一當鵞眼之十宣帝大建十一年七月初用大貨六銖錢一當五銖之十與五銖並行後還當一人皆不便乃相訛言曰六銖錢有不利縣官之象遂廢六銖而行五銖竟至陳亡其嶺南諸州多以鹽米布交易俱不用錢後魏之初錢貨無所用孝文始詔曰天下用錢太和十九年公鑄粗備文曰太和五銖詔京師及諸州郡皆通行之内外百官祿皆准絹給錢絹疋為錢二百在所遣錢工備爐冶民有欲鑄聽就鑄之銅必精練無所和雜宣武永平三年冬又鑄五銖錢孝明熈平元年京師及諸州鎮或有止用古錢不行新鑄致商貨不通貿遷頗隔尚書令任城王澄上言臣聞洪範八政貨居二焉易稱天地之大德曰生聖人之大寳曰位何以守位曰仁何以聚人曰財財者帝王所以聚人守位成養群生奉順天德治國安民之本也夏殷之政九州貢金以定五品周仍其舊太公立九府之法於是圜貨始行定兩銖之楷齊桓修之因以覇諸侯降及秦始漢文遂有輕重之異吳濞鄧通之錢收利遍於天下河南之地猶甚多焉逮於孝武乃更造五銖其中毁鑄隨利改易故使錢有大小之品竊尋太和之錢孝文留心剏制後與五銖並行此乃不刋之式但臣竊聞之君子行禮不求變俗因其所宜順而致用太和五銖雖利於京師之肆而不入徐揚之市土貨既殊貿鬻亦異便於荆郢之邦者則礙於兖豫之域致使貧民有至困之切王道貽隔化之訟去永平三年都座奏斷天下用錢不依准式者時被勑云不行之錢雖有常禁其先用之處權可聽行至年末悉令斷之暨延昌二年徐州民儉刺史啟奏求行土錢㫖聽權宜依舊用謹尋不行之錢律有明式指謂鵞眼環鑿更無餘禁計河南諸州今所行者悉非制限昔來繩禁愚竊惑焉又河北州鎮既無新造五銖設有舊者而復禁斷並不得行專以單絲之縑疎縷之布狹幅促度不中常式裂疋為尺以濟有無至今徒成杼軸之勞不免饑寒之苦良民分截布帛壅塞錢貨實非救恤凍餒子育黎元謹唯自古以來錢品不一前後累代易變無常且錢之為名欲泉流不已臣之愚意謂今之太和與新鑄五銖及諸古錢方俗所便用者雖有大小之異並得通行貴賤之差自依鄉價庶貨環海内公私無壅其不行之錢及盜鑄毁大為小巧偽不如法者據律罪之詔曰錢行已乆今東南有事且依舊用澄又奏臣猥属樞衡庶罄心力嘗願貨物均通書軌一範謹詳周禮外府掌邦布之出入布猶泉也其藏曰泉其流曰布然則錢之興也始於一品欲令世匠均同環流無極爰暨周景降建亡新易鑄相尋参差百品遂令接境乖商連邦隔貿臣比奏求宣下海内依式行錢澄被㫖勑錢行已乆且可依舊謹重叅量以為太和五銖乃大魏之通貨不朽之常模寧可專貿於京邑不行於天下但今戎馬在郊江疆未一東南之州依舊為便至於西京北城内外州鎮未用錢處行之則不足為難塞之則有乖通典何者布帛不可尺寸而裂五榖則有負擔之難錢之為用貫鏹相属不假斗斛之器不勞秤尺之平濟世之宜謂為深允請並下諸州方鎮其太和及新鑄五銖並古錢内外全好者不限大小悉聽行之鵝眼逺鑿依律而禁河南州鎮先用錢者既聽依舊不在斷限太和五銖二錢得用公造新者其餘雜種一用古錢生新之類普同禁約諸方之錢通行京師其聽依舊之處與太和錢及新造五銖並行若盜鑄錢者罪重常憲既欲均齊物品廛井斯和若不繩以嚴法無以肅兹違犯符㫖一宣仍不遵用者刺史守令依律治罪詔從之而河北諸州舊少錢貨猶以他物交易錢畧不入於市也二年冬尚書崔亮奏𢎞農郡銅青谷有銅鑛計一升得銅五兩四銖葦池谷鑛一升得銅五兩變帳山鑛計一升得銅四兩河内郡王屋山計鑛一升得銅八兩南貴州苑燭山齊州商山並是往昔銅官舊迹見在謹按鑄錢方興用銅處廣既有地利並宜鼔鑄詔從之自後所行之錢民多私鑄稍就小薄價用彌賤孝昌三年正月詔立鑄錢之制是時朝議鑄錢以國子博士髙謙之為鑄錢都將長史乃上表求鑄三銖錢曰蓋錢貨之立本以通有無便交易故錢之輕重世代不同太公為周制九府圜法至景王時更鑄大錢秦兼海内錢重半兩漢興以秦錢重改鑄榆莢錢至文帝五年復為四銖孝武時悉復銷壊更鑄三銖至元狩中變為五銖又造赤仄之錢以一當五王莽攝政錢有六等大錢重十二銖次九銖次七銖次五銖次三銖次一銖文帝罷五銖錢明帝復立孫權江左鑄大錢一當五百權赤烏年復鑄大錢一當千輕重大小莫不隨時而變竊以食貨之要八政為首聚財之貴貽訓典文是以昔之帝王乗天地之饒御海内之富莫不腐紅粟於太倉藏朽貫於泉府儲蓄既盈民無困弊可以寧謐四極如身使臂者矣昔漢之孝武地廣財豐外事四夷遂虚國用於是草萊之臣出財助國興利之計納税廟堂市列酒𣙜之官邑有造緡之令鹽鐡既興錢幣屢改少府遂豐上林饒積外闢百蠻内不增賦者皆計利之由也今群妖未息四郊多壘徵税頗煩千金日費資儲漸耗才用將竭誠楊氏獻説之秋桑兒言利之日夫以西京之盛錢猶屢改並行大小子母相權况今冦難未除州郡淪敗名物凋零軍國用少别鑄小錢可以富益何損於政也且政興不以錢大政衰不以錢小唯貴公私得所政化無虧既已行之於古亦宜效之於今矣昔禹遭大水以歴山之金鑄錢救民之困湯遭大旱以荘山之金鑄錢贖民之賣子者今百姓窮悴甚於曩日欽明之主豈得埀拱而觀之哉臣今此鑄以濟交乏五銖之錢任使並用行之無損國得其益穆公之言於斯驗矣臣雖術愧計然識非心筭暫充錢官頗覩其理茍有所益不得不言脱以為疑求下公卿博議如謂為允即乞施行詔將從之事未就㑹謙之卒孝莊永安二年秋更鑄永安五銖錢是時所用錢人多私鑄稍就薄小乃至風飄水浮米斗㡬直一千御史中尉高道穆表曰四民之業錢貨為本救弊改鑄王政所先自頃以來私鑄薄濫官司糾繩桂網非一在市銅價八十一文得銅一斤私造薄錢斤餘二百既示之以深利又隨之以重刑罹罪者雖多奸鑄者彌衆今錢徒有五銖之文而無二銖之實薄甚榆莢上貫便破置之水上殆欲不沉此乃因循有漸科防不切朝廷之愆彼復何罪昔漢文以五分錢小改鑄四銖至武帝復改三銖為半兩此皆以大易小以重代輕也論今據古宜改鑄大錢文載年號以記其始則一斤所成止七十六文銅價至賤五十有餘其中人工食料鍚炭鉛沙縱復私營不能自潤直至無利應自息心况復嚴刑廣設也以臣測之必當錢貨永通公私獲允黃門侍郎楊侃奏曰昔馬援在隴西嘗上書求復五銖錢事下三府不許及援徵入為虎賁中郎親對光武申釋其趣事始施行臣頃在雍州亦表陳其事聽人與官並鑄五銖錢使人樂為而俗弊得改㫖下尚書八座不許以今况昔即理不殊求取臣前表經御披拆侃乃隨事剖辯帝從之乃鑄五銖錢如侃所奏官自立爐起自九月至三年正月而止官欲貴賤乃出藏絹分遣使人於二市賣之絹疋正錢二百而私市者猶三百利之所在盜鑄彌衆巧偽既多輕重非一四方州鎮用各不同遷鄴之後輕濫尤多北齊神武罷政之初承魏猶用永安五銖遷鄴已後百姓私鑄體制漸别遂各以為名有雍州青赤梁州生厚𦂳錢吉錢河陽生澁天柱牽之稱冀州之北錢皆不行交易者皆以絹帛神武乃收境内之銅及錢仍依舊文更鑄流之西境未㡬之間漸復細薄奸偽競起文襄輔政時以錢文五銖名須稱實宜稱與秤同錢一文重五銖者聽入市用計百錢重一斤四兩十二銖自餘皆准此為數其京邑二市天下州鎮郡縣之市各置二秤懸於市門私民所用之稱皆准市稱以定輕重凡有私鑄悉不禁斷但重五銖然後聽用入市之錢重不五銖或雖重五銖而多雜鉛鑞並不聽用若有輙以小薄雜錢入市有人糾獲其錢悉入告者其小薄之錢若即禁斷恐人交乏絶畿内五十日外州百日為限群官參議咸以時穀頗貴請待有年王從之而止文宣天保三年除永安之錢改鑄新錢文曰常平五銖重如其文其錢甚貴且制造甚精少帝乾明昭帝皇建之間往往私鑄鄴中用錢有赤郭青熟細眉赤生之異河南所用有青薄鉛鍚之别青齊徐兖梁豫等州軰類各殊武平已後私鑄甚薄或以生鐡和銅至于齊亡卒不能禁後周之初尚用魏錢及武帝保定元年七月更鑄錢文曰布泉以一當五與五銖並行時梁益之境又雜用錢交易河西諸郡或用西域金銀之錢而官不禁建徳三年更鑄五行大布錢以一當十與布泉錢並行四年七月以邉境之上人多盜鑄乃禁五行大布錢不得出入四關布泉之錢聽入而不聽出五年正月以布泉漸賤而人不用遂廢之初令私鑄錢者絞其從者逺配為民宣帝大象元年十一月又鑄永通萬國錢以一當十與五行大布及五銖凡三品並行隋高祖開皇元年九月以天下錢貨輕重不等乃更鑄新錢背面肉好皆有周郭文曰五銖而重如其文每錢一千重四斤二兩三年四月高祖以錢既新出百姓或私有鎔鑄乃詔四面諸關各付百錢為様從關外來勘様相似然後得過様不同者即壞以為銅入官詔行新錢已後前代舊錢有五行大布永通萬國及齊常平所在勿用以貿易不止四年詔仍依舊不禁者縣令奪半年祿然百姓習用既乆尚猶不絶五年正月詔又嚴其制自是錢貨始一所在流布百姓便之是時見用之錢皆私和以錫鑞錫鑞既賤求利者多私鑄之錢不可禁約其年詔乃禁出錫鑞之處並不得私有採取十年詔晉王廣聴於揚州立五罏鑄錢其後奸狡稍漸磨鑪錢郭取銅私鑄又雜以鉛錫逓相倣效錢遂輕薄乃下惡錢之禁京師及諸州邸肆之上皆令立榜置様為准不中様者不入於市十八年詔漢王諒聽於并州立五罏鑄錢是時江南人間錢少晉王又鑄於鄂州白紵山有銅鉚處錮銅鑄錢於是詔聽置十罏鑄錢又詔蜀王秀聽於益州立五罏鑄錢是時錢益濫惡乃令有司括天下邸肆見錢非官鑄者皆毁之其銅入官而京師以惡錢貿易為利所執有死者數年之間私鑄頗息煬帝大業已後王綱弛紊巨奸狡猾遂多私鑄錢轉薄惡初每千猶重二斤後漸輕至一斤或剪鐡鍱裁皮糊紙以為錢相雜用之貨賤物貴以至於亡册府元龜卷五百
