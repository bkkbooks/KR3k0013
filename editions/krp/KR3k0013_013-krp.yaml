body:
  text: 册府元龜巻十三宋王欽若等撰帝王部都邑周禮曰惟王建國辨方正位體國經野以為民極春秋傳曰有宗廟先君之主曰都巢穴已徃棟宇未僃順民遷徙不常厥居伏羲而下可得而紀或基乎始興就為之制或測景地中用安九鼎或相其形勝以從便利故王畿千里法日月之經天府四塞保河山之固提封萬井旁流百川内則闕庭神麗宫室翬飛倣太紫之圜方順隂陽而開闢于以嚮明布政懸法示人訪道棲神登䧏有序繇是景靈翔集佳氣鬱葱善哉酇侯之言天子以四海為家非令壯麗無以重威者也乃至通門十二經涂九軌順流為沼造舟為梁厥初經營咸存軌制詩不云乎京邑翼翼四方是則于以見化民成俗里仁處義維桑維梓雞犬相聞熈熈之衆咸躋壽域者矣且夫端拱清穆王者之大徳樂生懷土庶物之常情故商民屢遷民用胥怨自耿至亳弗堪其勞班固所以賦兩都者葢明安土重遷之深旨也伏羲氏居太昊之墟今陳州是神農氏初都陳後徙于魯黄帝受國號有熊居軒轅之丘在窮山之際西射之南邑于涿鹿之阿遷徙徃來無常處以師兵為營衛又曰上谷涿鹿黄帝所都少昊邑于窮桑在魯城北後徙曲阜今魯城中顓頊都帝丘今東都濮陽是帝嚳髙辛氏都亳今河南偃師是堯為唐侯都中山後徙河東平陽在平河之陽舜都蒲坂或言平陽或言潘潘上谷也或言居漢中郡西城西北媯墟夏禹初受封陽翟今許州縣後都平陽或在安邑或在晉陽殷始祖契興於唐虞大禹之際功業著于百姓其孫相土封于商今上谷商邑自契至湯八遷始居南亳梁國谷熟即梁都也從先王居契父帝嚳都亳湯自商丘遷焉故曰從先王居太甲嘗居鄴今相州縣仲丁遷囂太戊子去亳囂音敖地名作仲丁陳遷都之義亶甲居相仲丁弟相地名在河北作河亶甲祖乙圯于耿亶甲子乙自相遷於耿河水所毁曰圯作祖乙仲丁河亶甲祖乙三篇皆亡書盤庚時殷巳都河北盤庚渡河南復居成湯之故居乃五遷無定處民咨胥怨胥相也民不欲徙乃咨嗟憂愁相與怨上作盤庚三篇武乙立殷復去亳徙河北紂都河内朝歌周始祖后稷堯時封於邰音台地名在扶風子不窋失其官而犇戎狄之間至不窋孫公劉之子慶節始歸於豳新平漆縣之東北有豳縣後十世古公亶父避狄人之攻遂去豳渡漆沮踰梁山止於岐山山在扶風美陽西北其南有周原邑於周地故始改國曰周豳人隨之古公乃營築城郭室屋而邑别居之文王自岐山徙都豐一曰文王居陳徙都豐又曰美陽中水鄉文王所居作靈臺靈囿靈沼神之精明者曰靈四方而髙者曰臺言文王化行似神之精明故以名焉武王遷鎬長安豐亭有鎬池詩曰考卜維王宅是鎬京維龜正之武王成之既伐商至于周自夜不寐周公旦即王所曰曷為不寐王曰告女維天不饗殷自發未生於今六十年麋鹿在牧又云夷羊在牧夷羊怪物也蜚鴻滿野天不享殷乃今有成維天建殷其登名民三百六十夫不顯亦不賓滅一云不顧夫亦不賓夫滅又一云不顧亦不恤也以至今我未定天保何暇寐王曰定天保依天室悉求夫惡貶從殷王受日夜勞來定我西土我惟顯服及徳方明自雒汭延于伊汭居易毋固其有夏之居夏居河南初在陽城後居陽翟我南望三途北望嶽鄙顧詹有河周書度邑曰武王問太公曰吾將因有夏之居也南望過于三途北詹望於清河粤詹雒伊毋逺天室營周居于雒邑而後去成王使召公相宅作召誥召公以成王新即政因相宅以作誥曰惟二月既望周公攝政七年二月十五日日月相望因紀之越六日乙未王朝歩自周則至于豐於已後望六月二十一日成王朝行從鎬京則至于豐以遷都之事告文王廟告文王則告武王可知以祖見考惟太保先周公相宅太保召公也召公於周公前相視雒居周公後往越若來三月惟丙午朏越三日戊申太保朝至于雒卜宅朏明也月三日明生之名於順來三月丙午朏于朏三日三月五日召公早朝至于雒邑相上所居厥既得卜則經營其已得吉卜則經營規度城郭郊廟朝市之位越三日庚戌太保乃以庶殷攻位于雒汭越五日甲寅位成于戊申三日庚戌以衆殷之民治都邑之位於雒水北今河南城也於庚戌以五日所治之位皆成言衆殷本其所繇來若翼日乙卯周公朝至于雒周公順位成之明日而朝至於雒汭則逹觀于新邑營周公通逹觀新邑所營言周徧越三日丁巳用牲于郊牛二于乙卯三日用牲告立郊位於天以后稷配故二牛后稷貶于天有羊豕不見可知越翼日戊午乃社于新邑牛一羊一豕一告以社稷之位用太牢共工氏子曰勾龍能平水土祀以為社周祖后稷能殖百榖祀以為稷社稷共牢初周公營成周使來告卜作雒誥曰周公拜手稽首曰予惟乙卯朝至于雒師致政在冬本其春來至雒衆說始卜定都之意我卜河朔黎水我乃卜澗水東瀍水西惟雒食我使人卜河北黎水不吉又卜澗瀍之間南近雒吉河南也卜必先墨畫龜然後灼之兆順食墨我又卜瀍水東亦惟雒食伻來以圗及獻卜今雒陽也將定下都遷殷頑民故幷卜之遣使以所卜地圗及獻所卜吉兆來告成王王拜手稽首曰公不敢不敬天之休來相宅其作周匹休成王尊敬周公答其拜手稽首而受其言述而美之言公不敢不敬天之美來相宅其作周以配天之美公既定宅伻來來視予卜休恒吉我二人共貞言公前以定宅遣使來來視我以所卜之美常居之吉我與公共正其美公其以予萬億年敬天之休宣王嗣位國富人殷於是築宫廟羣寢既成而釁之歌斯干之詩以落之平王都河南郡南故郏鄏地先是武王遷九鼎周公致太平營以為都是為王城至平王居之或稱周伐紂居雒邑綜其實不然武王營之成王使召公卜居九鼎焉而周復都豐鄗至犬戎敗幽王周乃東徙于雒邑春秋時謂之王城方七百二十丈郛方七十里南望雒水北當陕山去今雒陽城四十里漢高祖二年都櫟陽五年十二月既平項羽二月甲午漢王即皇帝位于汜水之陽乃西都雒陽五月兵皆罷歸家六月戍卒劉敬敬本姓婁賜姓劉説曰陛下都雒陽豈欲與周室比隆哉帝曰然敬曰陛下取天下與周異周之先自后稷堯封之邰積徳絫善十餘世絫古纍字公劉避桀居豳太王以狄伐故去豳杖馬箠去居岐箠馬策也杖謂拄之也云杖馬箠者以示無所㩦持也國人爭歸之及文王為西伯斷虞芮訟二國爭田化文王之徳而自和也始受命吕望伯夷自海濱來歸之武王伐紂不期而㑹孟津上者八百諸侯遂滅殷成王即位周公之屬傅相焉廼營成周都雒以此為天下中中音竹仲反諸侯四方納貢職道里均矣有徳則易以王無徳則易以亡凡居此者欲令務以德致人不欲阻險令後世驕奢以虐民也及周之衰分而為二謂東周君西周君天下莫朝周周不能制非徳薄形勢弱也今陛下起豐沛收卒三千人以之徑徃卷蜀漢定三秦與項籍戰滎陽大戰七十小戰四十使天下之民肝腦塗地父子暴骸中野不可勝數哭泣之聲不絶傷夷者未起而欲比隆成康之時臣竊以為不侔矣且夫秦地披山帶河四塞以為固卒然有急百萬之衆可具因秦之固資甚美膏腴之地此所謂天府陛下入關而都之山東雖亂秦故地可全而有也與人鬭不搤其亢捬其背未能全勝亢喉嚨也搤與抗同謂捉持之也今陛下入關而都案秦之故此亦搤天下之亢而拊其背也帝以問羣臣羣臣皆山東人爭言周數百年秦二世則亡不如都周東有成臯西有殽黽殽山也黽地名背河鄕雒其固亦足恃鄉讀曰嚮張良曰雒陽雖有此固其中小不過數百里地薄四面受敵此非用武之國夫關中左殽凾右隴蜀沃野千里南有巴蜀之饒北有胡苑之利阻三面而固守獨以一面東制諸侯諸侯安定河渭漕輓天下西給京師輓音晚諸侯有變順流而下足以委輸此所謂金城千里天府之國劉敬説是也於是即日車駕西都長安後九月徙諸侯於闗中治長樂宫七年二月髙帝自將擊韓王信還至長安蕭何治未央宫立東闕北闕前殿武庫太倉帝見其壯麗甚怒謂何曰天下匈匈勞苦數歳成敗未可知是何治宫室過度也何曰天下方未定固可因以就宫室且夫天子以四海為家非令壯麗亡以重威且亡令後世有以加也亡音無帝説遂自櫟陽徙都長安惠帝元年正月城長安長安城方六十三里經緯合長十五里十二城門九百七十三頃城中皆屬長安今長安北黒壤城中土其赤如火其堅如石父老所傳盡鑿龍首山為城二年起黄山宫三年春發長安六百里内男女十四萬六千人城長安三十日罷六月發諸侯王列侯徒𨽻二萬人城長安五年正月復發長安六百里内男女十四萬五千人城長安三十日罷九月長安城成六年六月起長安西市修敖倉武帝建元三年春作便門橋去長安四十四里在長安西北茂陵東便門即平門也又起集靈宫于華隂起蘭池宫于右扶風渭城元狩三年秋發讁吏穿昆明池以舊吏弄法故讁使穿更發有貲者為吏也西南夷昆明國有滇池方三百里漢使求身毒國而為昆明所閉今欲伐之故作昆明池象之以習水戰在長安西南周回四十里食貨志又載時越欲與漢用船戰顛遂乃大脩昆明池也讁吏吏有罪者罰而役之滇立元鼎元年春起柏梁臺或曰用百頭梁作臺也三輔舊事云以香栢為之今書皆作栢字元封二年夏作甘泉通天臺長安飛廉舘飛廉神禽能致風氣也飛廉身似鹿頭如雀有角而蛇尾文如豹文通天臺者言此臺髙上通于天也漢官儀云髙三十丈望見長安城太初元年二月起建章宫越匠名勇謂帝曰越國有火災即復大起宫室以壓勝之故帝作建章宫在未央宫西今長安故城西俗所呼貞女樓者即建章宫之闕也四年秋起明光宫三輔黄圗云在城中宣帝神爵三年春起樂游苑三輔黄圖云杜陵西北又闗中記云帝立廟於曲池之北號樂游按其處則今之所呼樂游廟者是也其餘基尚可識焉葢本為苑後因立廟樂音耒各反元帝時翼奉以宫室苑囿奢泰難供以故民困國虛亡累年之蓄所繇來乆不改其本難以正末乃上疏曰臣聞昔者盤庚改邑以興殷道聖人美之竊聞漢徳隆盛在於孝文皇帝躬行節儉外省繇役其時未有丼泉建章及上林中諸離宫舘也未央宫又無髙門武臺麒麟鳯凰白虎玉堂金華之殿獨有前殿曲臺漸臺宣室温室承明耳孝文欲作一臺度用百金度計也大各反重民之財廢而不為其積土基至今猶存今在新豐縣南驪山頂上也又下遺詔不起山墳故其時天下太和百姓洽足徳流後嗣如令處於當今因此制度必不能成功名天道有常王道亡常亡常者所以應有常也必有非常之主然後能立非常之功臣願陛下徙都於成周左據成臯右阻黽池前鄉嵩髙後介大河建滎陽扶河東南北千里以為闗而入敖倉地方百里者八九足以自娛東厭諸侯之權西逺羗胡之難厭抑也一葉反逺千萬反陛下恭已無為案成周之居兼盤庚之徳萬歲之後長為高宗漢家郊兆寢廟祭祀之禮多不應古臣奉誠難亶居而改作亶居猶虛居也欲徙都乃可更制度也亶讀曰但但居謂依舊都也故願陛下遷都正本衆制皆定亡復繕治宫館不急之費嵗可餘一年之蓄臣聞三代之祖積徳以王然皆不過數百年而絶周至成王有上賢之材因文武之業以周召為輔有司各敬其事在位莫非其人所用皆賢材也天下甫二世耳甫始也然周公猶作詩書深戒成王以恐失天下書則曰王毋若殷王紂周書亡逸篇也其書曰周公曰嗚呼毋若殷王紂之迷亂酗于酒徳哉是也其詩則曰殷之未喪師克配上帝宜監于殷峻命不易詩大雅文王之詩也師衆也峻大也言殷家自帝乙以上未喪天下之時皆能配天而行至紂荒怠自取敗滅今宜以殷王賢愚為鏡知天之大命甚難也今漢初取天下起於豐沛以兵征伐徳化未洽後世奢侈國家之費當數代之用非直費財又乃費士孝武之世暴骨四夷不可勝數有天下雖未乆至於陛下八世九主矣吕后為主不得為世故八世九主矣雖有成王之明然無周召之佐今東方連年饑饉加之以疾疫百姓菜色或至相食人專食菜故肌膚青黄為菜色也地比震動天氣溷濁日光侵奪比類也溷汙也下頓反繇此言之執國政者豈不可以懐怵惕而戒萬分之一乎故臣願陛下因天變而徙都所謂與天下更始者也天道終而復始窮則反本故能延長而亡窮也今漢道未終陛下本而始之於以永世延祚不亦優乎如因丙子之孟夏順太陽以東行如今因丙子之四月也太陽是時在甲戌當轉在乙亥丙子左旋之也到後七年之明嵗必有五年餘之蓄然後大行考室之禮凡宫新成殺牲以釁祭致其日祀之神謂之考室考成其禮也詩小雅斯干之詩曰秩秩斯干宣王考室也故奉引之雖周之隆盛亡以加此唯陛下留神詳察萬世之䇿書奏天子異其意答曰問奉今園廟有七云東徙狀何如奉對曰昔成王徙雒盤庚遷殷其所避就皆陛下所明知也非有聖明不能一變天下之道臣奉愚戅狂惑唯陛下裁赦帝不從平帝元始元年六月罷明光宫及三輔馳道後漢光武建武元年六月即位于鄗今趙州鄗邑縣十月車駕入雒陽幸南宫却非殿遂定都焉雒陽城有十二門其正南一門曰平風門平風門為官門不置候置屯司馬秩千石北宫屬衛尉其餘上西門雍門廣陽津門小苑門開陽門耗門中東門上東門榖門夏門凢十一門雒陽二十四街街一亭十二城門門一亭也十四年正月起南宫前殿十九年脩西京宫室明帝永平五年自長安迎取飛廉并銅馬置上西門外名平樂舘章帝建初中杜陵人杜篤以闗中表裡山河先帝舊京不宜改營雒邑乃上奏論都賦欲令車駕遷還長安耆老聞者皆動懷土之心莫不眷然佇立西望徐州刺史王景以宫廟已立恐人情疑惑㑹時有神雀諸瑞乃作金人論頌雒邑之美天人之符帝乃止順帝陽嘉元年起西苑脩餙宫殿桓帝延熈二年七月初造顯陽苑後又餙芳林而考濯龍之宫薛綜注東京賦云濯龍殿名芳林謂兩旁樹木蘭也考成也既成而祭之左傳曰考仲子之宫靈帝光和三年作罼圭靈昆苑罼圭苑有二東罼圭苑周一千五百歩中有魚梁臺西罼圭苑周三千三百歩並在雒陽宣平門外也五年起四百尺觀於阿亭道中平二年造萬金堂於西園獻帝初平元年二月丁亥遷都長安董卓驅徙京師百姓悉西入闗自留屯罼圭苑三月乙巳車駕入長安幸未央宫己酉卓焚雒陽宫廟及人家初卓欲遷都長安召公卿以下議曰髙祖都闗中十有一世光武都雒陽於今亦十世矣案石包讖宜徙都長安以應天人之意百官無敢言者司徒楊彪曰移都改制天下大事故盤庚五遷殷民胥怨殷王盤庚遷都于殷殷人相與怨恨也初湯遷亳仲丁遷囂河亶甲居相祖乙居耿并盤庚五也昔闗中遭王莽變亂宫室焚燒民庶塗炭百不一在光武受命更都雒邑今天下無虞虞度也言無可度之事也書曰四方無虞百姓樂安明公建立聖主光隆漢祚無故捐宗廟棄園陵恐百姓驚動必有麋沸之亂如麋粥之事也詩曰如沸如羮石包讖緯妖邪之書豈可信用卓曰闗中肥饒故秦得并吞六國且隴右材木自出致之甚易又杜陵南山下有武帝故瓦陶竈數千所并功營之可使一朝而辦百姓何足與議若有前却我有大兵驅之可令詣滄海言不敢避險難也彪曰天下動之至易安之甚難惟明公慮焉卓作色曰公欲沮國計邪沮止也太尉黄琬曰此國之大事楊公之言得無可思卓不答司空荀爽見卓意壯恐害彪等因從容言曰相國豈樂此邪山東兵起非一日可禁故當遷以圗之此秦漢之勢也卓意少解爽私謂彪曰諸君堅爭不止禍必有歸故吾不為也議罷卓使司𨽻校尉宣播以災異奏免琬彪等建安元年七月帝還雒陽假丞相曹公節鉞錄尚書事雒陽殘破董昭等勸曹公都許九月車駕轘轅而東以曹公為大將軍封武平侯自帝西遷朝廷日亂至是宗廟社稷制度始立孔融為少府帝初都許融以為宜畧依舊制度王畿正司𨽻所部為千里之封乃引公卿上書言其義魏太祖以漢獻帝建安十八年五月封為魏公九月作金虎臺鑿渠引漳水入白溝以通河初建安十五年太祖為丞相作銅雀臺于鄴文帝黄初元年十一月既受漢禪十二月初營雒陽宫戊午幸雒陽是時帝居北宫以建始殿朝羣臣門曰承明陳思王詩曰謁帝承明廬是也二年築凌雲臺三年穿靈芝池五年穿天淵池七年築九華臺明帝太和六年九月治許昌宫起景福承光殿時長安雒陽許昌譙鄴謂之五都青龍三年大治雒陽宫起昭陽太極殿築總章觀秋八月丁巳命有司復築崇華殿改名九龍殿景初元年銅鑄巨人二號翁仲置之司馬門外晉武帝泰始元年十二月受魏禪都雒陽惠帝永興元年六月新作三城門元帝建武元年三月即晉王位乃僃百官立宗廟社稷于建康今昇州是成帝咸和五年九月造新宫始繕苑城七年十二月庚戌帝遷于新宫咸康二年十月新作朱雀浮桁橋孝武太元三年二月作新宫帝移居㑹稽王邸七月帝入新宫先是謝安輔政宫室毁壊安欲繕之尚書令王彪之等以外㓂為諫安不從竞獨决之宫室用成皆仰模𤣥象合體辰極兩無勞怨十七年八月新作東宫二十一年正月造清暑殿四月新作永安宫後魏道武登國元年正月戊申帝即代王位郊天建元大㑹於牛川天興元年正月帝至鄴廵登臺榭徧覽宫城將有定都之意乃至行臺以龍驤將軍日南公和䟦為尚書與左丞賈彛率郎吏及兵五千人鎭鄴七月遷都平城始營宮室建宗廟立社稷八月詔有司正封畿制郊甸端經術標道里平五權較五量定五度十月起天文殿二年春二月以所獲高車衆起鹿苑於南臺隂北拒長城東包白登屬之西山廣踰數十里鑿渠引武川水注之苑中疏為三溝分流宫城内外又穿鴻鴈池秋七月起天華殿八月増啓京師十二門作西武庫十二月天華殿成三年三月穿城南渠通於城内作東西魚池七月起中天殿及雲母堂金華堂四年五月起紫極殿𤣥武樓凉風觀石池鹿苑臺六年十月起西昭陽殿天賜元年十月築西宮三年六月發八部五百里内男丁築灅南宫灅音壘水名在鴈門門闕高十丈餘引溝穿池廣苑囿䂓立外城方二十里分置市里經塗洞逹三十日罷四年七月築北宫垣三旬而罷明元永興五年二月穿魚池于北苑神瑞元年二月起豐宫于平城東北泰常元年十一月起蓬臺于北苑二年七月作白臺于城南三年十月築宫于西苑四年三月築宫于蓬臺北九月築宫于白登山五年四月起灅南宫十一月詔驍騎將軍延普城乾城六年正月發京師六千人築苑起自舊苑東包白登周廻四十餘里七年九月築平城外郭周廻三十二里八年十月廣西宫起外垣墻周廻二十里太武始光二年三月營故東宫為萬壽宫起永安安樂二殿臨望觀九華堂神䴥四年七月行幸河西起承華宫延和元年七月築東宫太平眞君元年二月發長安人五千浚昆明池十一年二月大修宫室皇太子居于北宫文成興安二年二月乙丑發京師五千人穿天淵池太安四年起太華殿獻文皇興五年八月傳位于太子帝稱太上皇帝徙御崇光宫采椽不斵土階而已初帝于苑内立殿勑中秘羣官製名儀曹郎公孫叡奏曰臣聞至尊至貴莫崇於帝王天人挹損莫大于謙光伏惟陛下躬唐虞之徳存道頥神逍遥物外宫居之名當協叡旨臣愚以為宜曰崇光奏可孝文延興三年正月改崇光宫為寧光宫承明元年十月起七寶承安行殿太和元年正月起太和安昌二殿詔曰昔軒皇誕御垂棟宇之構爰歴三代興宫觀之式然茅茨土堦昭徳于上代層臺廣厦崇威于中葉良繇文質異宜華朴殊禮故也是以周成繼業營明堂于東都漢祖聿興建未央于咸鎬蓋所以尊嚴皇威崇重帝徳豈好奢惡儉苟弊民力者哉國家皇運統天協纂乾歴銳意四方靡遑建制宫室之度頗為未允太祖初基雖粗有經式自茲厥後復多營改至于三元慶饗萬國充庭觀光之使具瞻有闕朕以寡徳猥承洪緒時屬休期事鍾昌運宜遵逺度式兹宫宇指訓規模事昭于平日明堂太廟已成于昔年又因往嵗之豐資藉民情之安逸將以今春營改正殿違犯時令行之惕然但朔土多寒事殊南夏自非裁度經春興役徂暑則廣制重基莫繇克就成功立事非委賢莫可改制規模非任能莫濟尚書李冲器懷淵博經度明逺可領將作大匠司空長樂宫穆亮可與大匠共監興繕其去故崇新之宜修復太極之制朕當别加指授七月二殿成起朱明思賢門九月庚子起永樂遊觀殿於北苑穿神淵池三年正月巛古坤字徳六合殿成二月乾象六合殿成六月起文石室靈泉殿于方山四年正月乾象四合殿成九月思義殿及東明觀成七年十月皇信堂成九年七月新作諸門十二年九月起宣文堂經武殿十六年二月帝移御永樂宫壊太華殿經始太極殿十一月依古六寢權制三室以安昌殿為内寢皇信堂為中寢四合殿為外寢十七年三月改作後宫八月車駕南伐發代都侍中李冲諫以不可帝乃諭羣臣曰今者興動不小動而無成何以傳之後代苟欲班師無以垂之千載朕仰惟逺祖世居幽漠違衆南遷以饗無窮之美豈其無心輕遺陵壤今之君子寧獨有懐當繇天工人代王業湏成故也若不南征即當移都於此光宅中土亦其時矣公等以為何如議之所决不得旋踵欲遷者左不欲者右安定王休等相率如右前南安王禎進曰夫愚者闇於成事智者見於未萌行至徳者不議於俗成大功者不謀於衆非常之人乃能建非常之事廓神都以延王業度土中以制帝京周公啟之於前陛下行之於後固其宜也且天下至重莫若皇居人之所貴寧如遺體請上安聖躬下慰民望光宅中原輟彼南伐此臣等願言蒼生幸甚羣臣咸唱萬嵗帝初謀南遷恐衆心戀舊乃示為大舉因以脅定羣情外名南伐其實遷也舊人懐土多所不願内憚南征無敢言者於是定都雒陽尚書李冲言於孝文曰陛下方修周公之制定鼎成周然營建六寢不可遊駕待就興造城郛難以馬上營起願暫還北都令臣下營造功成事訖然後僃文物之章和玉鑾之響時廵南徙軌儀土中帝曰朕將廵省方嶽至鄴少停春始便還未宜歸北十月戊寅幸金墉城詔徵司空穆亮與尚書李冲將作大匠董爵經始雒京乙未設壇于滑臺城東告行廟以遷都之意起滑臺宫癸卯幸鄴城乙巳詔安定王休率從官迎家于代京車駕送于漳水初帝之南伐也起宫殿于鄴西十有一月癸亥宫成十八年二月甲辰詔天下諭以遷都之意壬辰帝臨太極殿諭在代羣臣以遷移之畧先是孝文外示南討意在謀遷齋于明堂左个詔太常卿王諶親令龜易筮南伐之事其兆遇革帝曰此是湯武革命順天應人之卦也羣臣莫敢言任城王澄進曰易言革者更也將欲應天順人革君臣之命湯武得之為吉陛下帝有天下重光累葉今日卜征乃可伐叛不得云革命此非君人之卦未可全為吉也帝厲聲曰此象云大人虎變何言不吉也澄曰陛下龍興既乆豈可方同虎變帝勃然作色曰社稷我社稷任城而欲阻衆也澄曰社稷誠知陛下之社稷然臣是社稷之臣子豫參顧問敢盡愚衷帝既銳意必行聞澄此對乆之乃解曰各言其志亦復何傷車駕還宫乃召澄未及升陛遥謂曰向者之革卦今更欲論之明堂之忿懼衆人競言阻我大計故厲色怖文武耳想解朕意也乃獨謂澄曰今日之行誠知不易但國家興自北土徙居平城雖富有四海文軌未一此間用武之地非可文治其欲移風易俗信為甚難崤凾帝宅河雒千里因茲大舉光宅中原任城意以為何如澄曰伊雒中區天下所據陛下總統華夏諧平荒服蒼生聞之此應當大慶帝曰北人戀本忽聞將移能不驚擾也澄曰此既非常之事當非常人所知唯湏决之聖懷此輩亦何能為也帝曰任城便我之子房加撫軍大將軍太子少保又兼尚書左僕射及駕幸雒陽定遷都之䇿詔曰遷移之旨必湏訪衆當遣任城馳驛向代問彼百司論擇可否近日論革今真所謂革也王其勉之既至代聞遷都詔莫不驚駭澄援引今古徐以曉之衆乃信伏遂南馳還報㑹車駕於滑臺帝大恱曰若非任城朕事業不得就也十九年八月金墉宫成九月車駕幸金墉宫九月庚午六宫及文武盡遷雒陽初帝詔東陽公丕等以移都之事使各陳其志燕州刺史穆羆進曰移都事如成臣愚見謂為未可曰卿便言不可之理羆曰北有獫狁之㓂南有荆揚未賓西有吐谷渾之阻東有高句麗之難四方未平九區未定以此推之謂為不可征伐之舉要湏戎馬如其無馬事不可剋帝曰卿言無馬此理粗可馬嘗出北方廐在此置卿何慮無馬今代在常山之北為九州之外以是之故遷于中原羆曰臣聞黄帝都涿鹿以此言之古之聖王不必悉居中原帝曰黃帝以天下未定居于涿鹿既定之後亦遷于河南尚書于杲曰臣誠不識古事如聞百姓之言先皇建都于此無故欲移以為不可中原之地數有簒奪自建邑平城以來與天地並固日月齊明臣雖管見膚淺性不昭達終不以代朔之地而擬伊雒之美但以安土重遷物之常情一旦南移懼不樂允丕曰陛下去嵗御大軍討蕭氏至雒遣任城王澄宣旨勑臣等議都於雒初奉恩旨心情皇越凡欲遷移當訊之卜筮審定吉否然後乃可帝謂丕曰往在鄴中司徒公誕咸陽王僖尚書李冲等皆欲請龜占移雒吉凶之事朕時謂誕等曰周召卜宅伊雒乃識至兆今無若斯之人卜亦無益然卜者所以决疑此既不疑何湏卜也昔軒轅請卜兆龜燋然卜者訪諸賢哲軒轅乃問天老天老謂為善遂從其言終致昌吉然則至人之量未能審其歸矣朕既以四海為家或南或北遲速無常南移之民朕自多積倉儲不令窮乏丕曰臣仰奉慈詔不勝喜舞帝又詔羣官曰卿等或以朕無為移徙也昔平文皇帝棄背昭成營居盛樂道武應天遷居平城朕幸属勝殘之運故移宅中原肇成皇宇前懐州刺史青龍臣欽若等曰姓纂無姓青龍氏疑是人名前秦州刺史吕受恩等仍守愚固帝皆撫而答之辭屈而退唯給事黄門侍郎兼大鴻臚卿李韶對曰雒陽九鼎舊所七百攸基地則土中實均朝貢惟王建國莫尚於此帝稱善宣武景明二年九月發畿内夫五萬五千人築京師三百二十三坊四旬而罷初廣陽王嘉孝文時為司州牧表請於京四面築坊三百二十各周一千二百歩乞發三正復丁以充茲役臣欽若等曰三正謂京邑毎坊置里正三人也雖有暫勞姦盗永止詔從之至是而成三年十一月詔曰京雒兵蕪嵗踰十紀先皇定鼎舊都惟新魏厯剪除榛荒剏兹雲構鴻功茂績規模長逺今廟社重建宫極斯崇便當以来月中旬蠲吉徙御仰尋遺意感慶交𠂻既禮盛周宣斯干之制事高漢祖壯麗之儀可依典故僃茲考吉以稱遐邇人臣之望永平二年九月詔定諸門闥名四年五月遷代京銅龍置天淵池孝明帝熈平初任城王澄奏都城府寺猶未周悉今軍旅初寧無宜發衆請取諸職人及司州郡犯十枝以上百鞭以下收贖之物絹一疋輸磚二百以漸修造帝從之太傅清河王懌表奏其事遂寢不行後廢帝中興元年十月即位于信都城二年二月丁丑車駕幸鄴乙酉詔文武官家属自信都赴鄴城出帝永熈元年四月即位于雒城東郭之外自東陽雲龍門御太極前殿三年七月高歡兵至帝從雒陽輕騎入關都長安宇文泰披草萊立朝廷後周閔帝既受魏禪都長安武帝武成二年十二月改作路門應門保定三年八月改作路寢天和二年三月改武遊園為道㑹苑宣政元年三月于蒲州置宫廢同州及長春二宫宣帝大象元年正月行幸雒陽詔曰河雒之地世稱朝市上則於天陰陽所㑹下紀於地職貢路均聖人以萬物阜安廼建王國時經五代世歴千紀規模宏逺邑居壯麗自魏氏失馭城闕為墟君子有戀舊之風小人深懐土之思我太祖受命豐鎬胥宇崤函蕩定四方有懐光宅高祖神功聖略混一區宇徃廵東夏省方觀俗布政此宫遂移氣序朕以𦕈身祗承寶祚庶㡬聿修之志敢忘燕翼之心昨一駐蹕金墉僃嘗遊覽百王制度基址尚存今若増脩為功易立宜命邦事修復舊都奢儉取文質之間功役依子来之義北瞻河内咫尺非遥前詔經營今宜停罷於是發山東諸州兵増一月功為四十五日役起雒陽宫常役四萬人以迄于晏駕并移相州六府於雒陽稱東京六府二年二月行幸同州宫為大成宫靜帝即位停雒陽宫作隋高祖文帝開皇元年既受周禪都長安二年六月詔曰朕祗奉上𤣥君臨萬國属生人之弊處前代之宫嘗以為作之者勞居之者逸改創之事心未遑也而王公大臣陳謀獻䇿咸云羲農以降至于姬劉有當代而屢遷無革命而不徙曹馬之後時見因循乃末代之晏安非徃聖之宏義此城從漢以来彫殘日乆屢為戰塲舊經䘮亂今之宫室事近權宜又非謀筮從龜瞻星揆日不足建皇王之邑合大衆所聚論變通之數稽幽顯之符同心固請詞情深切然則京師百官之府四海歸嚮非朕一人之所獨有苟利於物其可違乎且殷之五遷恐人多死是則以吉凶之土制長短之命謀新去故如農望秋雖暫劬勞其究安宅今區㝢寜一隂陽順序安安以遷勿懐胥怨龍首山川原隰秀麗卉物滋阜卜食相土宜建都邑定鼎之基永固無窮之業在斯公私府宅規模逺近營搆資費隨事條奏仍詔左僕射高熲將作大匠劉龍鉅鹿郡公賀婁子幹太府少卿髙龍乂等創造新都初帝嫌臺城制度迮小宫内多鬼妖夜與髙熲蘓威二人定議遷都通直散騎常侍庾季才旦而奏曰臣仰觀𤣥象俯察圗記龜兆允襲必有遷都且堯都平陽舜都冀土是知帝王居止世代不同而漢營此城經今八百嵗水皆鹹鹵不甚宜人願陛下協天人之心為遷徙之計帝愕然謂熲等曰是何神也朕自今已後信有天道矣是時太師李穆上表曰帝王所居隨時興廢天道人事理有存焉始自三皇暨夫兩漢有一世而屢遷無革命而不徙曹馬同雒水之陽魏周共長安之内此之四代葢聞之矣曹則三家鼎立馬則四海尋分有魏及周甫得平定事乃不暇非曰師古徃者周運將窮禍生華裔廟堂冠帶屢覩姦回士有包藏人稀柱石四海萬國皆縱豺狼不叛不侵百城罕一伏惟陛下應期誕聖秉籙受圗始晦君人之徳俯從將相之重内翦羣凶崇朝大定外誅巨猾不日肅清變大亂之民成太平之俗百靈符命兆庶謳歌幽顯樂推日月塡委乆屈箕潁之志始順内外之請自受命神宗𢎞道設教陶冶與隂陽合徳覆育共天地齊旨萬物開闢之初八表光華之旦視聽以革風俗且移至若帝室天居未議經剏非所謂發明大造光贊惟新自漢以来為䘮亂之地爰從近代累葉所都未嘗謀龜問筮瞻星定鼎何以副聖上之規表大隋之徳竊以神州之廣福地之多將為皇家興廟建寢上𤣥之意當别有之伏願逺順天人取决卜筮時改都邑光宅區夏任子来之民垂無窮之業應神宫於宸極順和氣於天壤治康物阜永隆長世臣日薄桑榆位髙軒冕經邦論道自顧缺然丹赤所懐無容噤嘿帝曰天道聰明已有徵應太師民望復抗此請是則可矣遂發詔施行七月癸未詔新置都處墳墓令悉遷葬設祭仍詔人工無主者官發殯葬十二月名新都曰太興城三年三月丙辰雨常服入新都是月詔營仁壽宫十八年十一月詔自京師至仁夀宫置行宫十有二所煬帝以仁夀四年七月即位十一月幸雒陽詔曰乾道變化隂陽所以消息沿創不同生靈所以順叙若使天時不變化工何以成四時人事不易政敎何以釐萬姓易不云乎通其變使民不倦變則通通則乆有徳則可乆有功則可大朕又聞之安安而能遷民用丕變是故姬邑兩周如武王之意殷人五徙安成湯之業若不因民順天功業見乎變愛民治國者可不喟與然雒邑自古之都王畿之内天地之所合隂陽之所和控以三河固以四塞水陸通貢賦等故漢祖曰吾行天下多矣唯見雒陽自古皇王何嘗不留意所不都者葢有繇焉或以九州未一或以困於府庫作雒之制所以未暇也我有隋之始便欲創兹懷雒日復一日粤暨於今永懷先㫖興言感哽朕肅膺寶厯纂臨萬邦遵而不失思奉先志今者漢王諒悖逆毒被山東遂使州縣或淪非所此繇闗河懸逺兵不赴急加以并州移户復在河南周遷殷民意在於此况復南服遐逺東夏殷大因機順動今也其時羣司百辟僉諧厥議但成周墟瘠弗堪胥宇今可於伊雒營建東京便即設官分職以為民極也夫宫室之制本以便宜上棟下宇足避風露高臺廣厦豈曰適形故傳云儉徳之恭侈惡之大宣尼有云與其奢也寕儉豈謂瑶臺瓊室方為宫殿者乎土堦采椽而非帝王者乎是知非以天下奉一人乃以一人主天下也民惟邦本本固邦寕百姓不足君孰與足今所營搆務從節儉無令雕墻峻宇復起於當今欲使卑宫菲食將貽于後世有司明為條格稱朕意焉乃詔尚書令楊素納言楊逹將作大匠宇文愷營建東京徙豫州郭下居民以實之又徙天下富商大賈數萬家於東京大業元年建東都於阜澗營顯仁宫苑囿連接北至新安南及飛山西至澠池周圍數百里課天下諸州各貢草木花果奇禽異獸於其間二年正月東京成三年八月次太原詔營晉陽宫五年正月改東京為東都二月己未帝御崇徳殿之西院愀然不怡顧謂左右曰此先帝之所居實用増感情所未安宜於此院之西别營一殿九年三月丁丑發丁男十萬城大興册府元龜卷十三
