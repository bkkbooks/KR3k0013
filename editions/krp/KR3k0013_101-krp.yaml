body:
  text: 册府元龜卷一百一宋王欽若等撰帝王部納諫書曰木從繩則正后從諫則聖又曰稽于衆舍己從人是知容納直言樂聞已失講求至當之理詢擇悠久之謀聞善若驚改過弗吝雖嬰鱗而無忤惟虗懐而兼容斯乃眀主不惡直以博觀臣下寧正言而無諱者已其或事有過舉令未順時刑罰不中賞任非允而或予違汝弼官箴王闕過則必正失者斯革始或違忤終焉聴從忘其誹謗之咎諒其忠直之志故能刑無頗類政無滅裂昭徳塞違令聞長世盖所謂拂於心而求諸道逆於耳而利於行者不可以不察也已漢髙祖為沛公既至咸陽降子嬰覩宮室帷帳狗馬重寳婦女以千數意欲留居之樊噲諫沛公不聽張良曰夫秦為無道故公得至此為天下除殘去暴宜縞素為資資質也縞白也欲令沛公反秦奢泰服儉素以為質今始入秦即安其樂此所謂助桀為虐且忠言逆耳利於行毒藥苦口利於病願公聽樊噲言公乃還霸上其後相國蕭何以罪繫獄數日王衞尉侍衞尉王氏無名字史氏失之也前問曰相國胡大罪陛下繫之暴也髙祖曰吾聞李斯相秦皇帝有善歸主有惡自予今相國多受賈豎金為請吾苑以自媚於民媚愛也求愛於民故繫治之王衞尉曰夫職事苟有便於民而請之真宰相事也陛下柰何乃疑相國受賈民錢乎且陛下距楚數嵗陳豨黥布反時陛下自將往當是時相國守關中闗中揺足則關西非陛下有也相國不以此時為利乃利賈人之金乎且秦以不聞其過亡天下夫李斯之分過又何足法哉陛下何疑宰相之淺也帝不懌是日使使持節赦出何何年老素恭謹徒跣入謝帝曰相國休矣相國為民請苑吾不許我不過為桀紂王而相國為賢相吾故繫相國欲令百姓聞吾過文帝幸上林皇后慎夫人從其在禁中常同坐同坐謂所坐之處髙下齊同無差等也及坐郎署袁盎引郤慎夫人坐郎署上林中直衞之署也盎時為中郎將天子幸署豫設供帳待之故得郤慎夫人坐也郤謂退而卑之也慎夫人怒不肯坐帝亦怒盎起因前説曰臣聞尊卑有序則上下和今陛下既已立后慎夫人廼妾妾主豈可同坐哉且陛下幸之則厚賜之陛下所以為慎夫人適所以禍之也獨不見人豕乎戚夫人也帝乃説説讀曰悦入語慎夫人慎夫人賜盎金五十斤賈誼為梁王太傅上疏曰人主之尊譬如堂羣臣如陛陛九級則堂髙七級則堂卑夫梁王嘗在貴寵之位矣天子改容而禮貌之吏民嘗俯伏以敬畏之今有過廢之可也賜之死可也若夫束縛之係緤之司寇小史詈罵而榜笞之殆非所以令衆庶見也是時丞相絳侯周勃免就國人有告勃謀反逮繫長安獄治卒亡事復爵邑故賈誼以此譏帝帝深納其言養臣下有節是後大臣罪皆自殺不受刑至武帝復入獄自寗成始張釋之為謁者僕射從登虎圏文帝問上林尉禽獸簿十餘問尉不能對虎圏嗇夫從旁代對甚悉帝詔釋之拜嗇夫為上林令釋之前曰陛下以嗇夫口辯而超遷之臣恐天下隨風靡爭口辯亡其實且下之化上疾於影響舉錯不可不察也帝曰善廼止不拜嗇夫武帝為竇太主置酒宣室使謁者引内董君董偃也東方朔陛㦸殿下辟㦸而前曰董偃有斬罪三安得入乎夫宣室者先帝之正處也非法度之政不得入焉帝曰善有詔止更置酒北宫引董君從東司馬門入東司馬門更名東交門賜朔黄金三十斤宣帝時劉更生獻淮南枕中洪寳苑秘之方苑秘者言秘術之苑囿也令尚方著作事不驗更生坐論京兆尹張敞上疏諫曰願眀主斥逺方士之虛語㳺心帝皇之術太平庶㡬可興也後尚方待詔皆罷元帝幸甘泉郊泰畤禮畢因留射獵御史大夫薛廣徳上書曰竊見關東困極人民流離陛下日撞亡秦之鐘聽鄭衞之樂臣誠悼之今士卒暴露從官勞倦願陛下亟反宮亟急也思與百姓同憂樂天下幸甚帝即日還後漢光武嘗輕與期門近出帝將出必與北地良家子期于殿門故曰期門衞尉銚期頓首車前曰臣聞古今之戒變生不意誠不願陛下微行數出帝為之回輿而還朱浮為執金吾時帝以二千石長吏多不勝任時有纎微之過者必見斥罷交易紛擾百姓不寧浮上疏曰堯舜之盛猶加三考大漢之興亦累功效吏皆積久養老於官至名子孫因為氏姓自是牧守易代頗簡蔡茂為廣漢太守雒陽令董宣舉糾雒陽公主光武始怒收宣既而赦之茂喜宣剛正欲令朝廷禁制貴戚乃上書曰今者外戚驕逸賓客放濫宜勑有司按理姦罪使執平之吏永申其用以厭逺近不緝之情帝納之明帝數幸廣成苑尚書僕射鍾離意以為從禽廢政常當車陳諫盤樂遊田之事天子即時還宮章帝初承永平故事吏政尚嚴切尚書決事率近於重尚書陳寵以帝新即位宜改前世苛俗乃上疏諫帝敬納寵言建初元年大旱榖貴蘭臺校書楊終以為廣陵楚淮南濟南之獄徙者萬數又逺屯絶域吏民怨曠乃上疏盡諫帝下其章司空第五倫亦同終議帝從之聽還徙者悉罷邊屯和帝時唐羌為臨武長縣接南海獻龍眼荔枝十里一置五里一堠奔騰阻死者繼路羌乃上書諫帝下詔曰逺國珍羞本以薦奉宗廟苟有傷害豈愛民之本其勑大官勿復受獻繇是遂省焉順帝欲立皇后而貴人有寵者四人莫知所建議欲探籌以神定選尚書僕射胡廣與尚書郭慶史敞上疏諫曰恃神任筮未必當賢就值其人猶非徳選宜參良家簡求有徳帝從之以梁貴人良家子定立為皇后永建三年大旱尚書僕射黄瓊上疏曰昔魯僖遇旱以六事自讓躬節儉閉女謁放讒佞者十三人誅税民受貨者九人退舍南郊天立大雨今亦宜顧省政事有所損闕務存節儉以易民聽尚方御府息除煩費眀勅近臣使遵法度如有不務示以好惡數見公卿引納儒士訪以政化使陳得失又囚徒尚積多致死亡亦足以感傷和氣招降災旱若改敝從善擇用嘉謀則灾消福至矣書奏引見陽徳殿使中常侍以瓊奏書屬主者施行桓帝欲廣開鴻池侍中趙典諫曰鴻池汎溉已且百頃猶復增而深之非所以崇唐虞之約已遵孝文之愛人也帝納其言而止靈帝時市賈小民為宣陵孝子者數十人悉除為郎中太子舍人議郎蔡邕上封事曰太子官屬宜搜選令徳豈有但取丘墓㓙醜之人其為不祥莫與大焉書奏詔宣陵孝子為舍人者悉改為丞尉焉光和二年上禄長和海上言禮從祖兄弟别居異財恩義已輕服屬疎末而今黨人錮及五族既乖典訓之文有謬經常之法帝覽而悟之黨錮自從祖以下皆得解釋魏文帝時侍中蘇則從行獵槎桎㧞失鹿帝大怒踞胡床投刀悉收督吏將斬之則稽首曰臣聞古之聖王不以禽獸害人今陛下方隆堯舜之化而以獵戲多殺羣吏愚臣以為不可敢以死請帝曰卿直臣也遂皆赦之王朗為司空文帝頻出遊獵或昏夜還宮朗上疏諫帝報曰覽表雖魏絳稱虞箴以諷晉悼相如陳猛獸以戒漢武未足以喻方今二寇未殄將帥逺征故時入原野以習戎備至於夜還之戒已詔有司施行辛毗為侍中文帝欲徙冀州士家十萬戸實河南時連蝗民饑羣司以為不可而帝意甚盛毗與羣臣俱求見帝知其欲諫作色以見之皆莫敢言毗曰今徙既失民心又無以食也帝遂徙其半嘗從帝射雉帝曰射雉樂哉毗曰於陛下甚樂而於羣下甚苦帝黙然遂為之稀出明帝欲平北芒令於其上作臺觀則見孟津辛毗諌帝乃止王肅為散騎常侍太和四年大司馬曹真征蜀肅上疏諫於是遂罷髙柔為廷尉明帝時大興殿舎百姓勞役廣采衆女充盈後宫後宮皇子連夭繼嗣未育柔上疏諫帝報曰知卿忠允乃心王室輙克昌言他復以聞蔣濟為䕶軍將軍景初中外勤征役内務宫室怨曠者多而年榖饑儉濟上疏諫詔曰微䕶軍吾弗聞斯言也楊阜為將作大匠帝既新作許宮又營雒陽宮殿觀閣發美女以充後庭數出入弋獵秋大雨震電多殺鳥雀阜上疏諌詔報曰聞得宻表先陳往古明王聖主以諷闇政切至之辭欵誠篤實退思補過將順規究備至悉矣覽思苦言吾甚嘉之徐宣為左僕射時上方令坐猥見考竟宣上疏諫威刑太過又諫作宫殿窮盡民力帝皆手詔嘉納晉元帝性簡儉冲素容納直言虚已待物初鎮江東頗以酒廢事王導深以為言帝命酌引觴覆之於此遂絶周嵩為御史中丞帝以王敦勢盛漸疎忌王導等嵩上疏曰王導王廙忠素竭誠義以奉上共隆洪基翼成大業而一旦聽孤臣之言惑疑似之説乃更以危為安以疎易親放逐舊徳以佞伍賢逺虧既往之明顧傷伊管之交傾巍巍之望䘮如山之功疏奏帝感悟故導等獲全穆帝將修後池起閣道吏部郎長兼侍中江逌上疏諫帝嘉其言而止哀帝以天文失度欲依尚書洪範之制於太極前殿親執䖍肅冀以免咎使太常集博士草其制太常江逌上疏諫又陳古義帝乃止後魏獻文時詔諸監臨之官所監治受羊一口酒一斛者罪至大辟與者以坐論糾告得尚書以下罪狀者各随所糾官輕重而授之雍州刺史張白澤上疏諫曰臣恐姦人窺望忠臣懈節而欲使事静民安治清務簡至於委任責成不一難辨帝納之陸馛為選部尚書獻文將禪位於京兆王子推任城王雲太尉源賀並皆固諫馛抗言曰皇太子四海属望不可横議臣請刎頸殿庭有死無二乆之帝意乃解詔曰馛直臣也其能保吾子乎遂以馛為太保與源賀持節奉皇帝璽綬傳位於孝文孝文時崔挺為光州刺史時以犯罪配邊者多有逃越遂立重制一人犯罪逋亡合門充役挺上書以為周書父子罪不相及天下善人少惡人多以一人犯罪延及合門司馬牛受桓魋之罰栁下恵嬰盗跖之誅豈不哀哉辭甚雅切帝納之髙道悦孝文時為諫議大夫兼御史中尉留守雒京時宮極初基廟庫未搆孝文車駕將從水路幸鄴已詔都水迴營搆之材以造舟楫道悦表諫於是帝遂從陸路太和十七年九月帝南伐詔六軍發軫丁丑戎服執鞭御馬而出羣臣稽顙於馬前請停南伐帝乃止仍定遷都之計初甄琛為諫議大夫時有所陳亦帝所知賞後周閔帝元年五月帝欲觀魚於昆明池博士姜須諫乃止武帝時李禮成為遷州刺史朝廷有所徴發禮成度蠻夷不可擾擾必為亂上表固諌帝從之又樂運為露門學士前犯顔屢諫多被嘉納隋文帝開皇中蘇威與髙熲參掌朝政威見宮中以銀為幔鈎因盛陳節儉之美以諭帝帝為之改容雕飾舊物悉命除毁長孫平開皇中為工部尚書時有人告大都督邴紹非毁朝廷為憒憒者帝怒將斬之平進諫曰邴紹之言不應聞奏陛下又復誅之臣恐百代之後有虧聖徳於是赦紹因勅羣臣誹謗之罪勿復以聞唐髙祖武徳元年孫伏伽詣闕以三事上諫帝大悦時軍國多事賦歛繁重伏伽屢奏請改革舊政帝並納之因謂裴寂曰隋末無道上下相蒙主則驕矜臣唯謟佞上不聞過下不盡忠至使社稷傾危身死匹夫之手朕撥亂反正念在安人平亂任武臣官方委文吏庶得各展器能以禆不逮比每虛心接待冀聞讜言然唯李綱善盡忠欵伏伽可謂誠直餘人猶踵弊風俛首而已豈朕所望哉褚亮為秦王文學帝以冦亂漸平每冬畋狩亮抗表諫疏奏帝納之太宗即位初務止姦慝風聞諸曹按典多有受賂乃遣左右試以財遺之有司門令史受餽絹一匹太宗怒將殺之尚書裴矩進諫曰此人受賂誠宜重誅但陛下以物試之即行極法謂䧟其入罪恐非道徳齊禮之義也帝納之因詔文武五品以下謂曰朕欲殺之非是有偏憎惡直欲懲肅望不更犯耳裴矩遂能廷折不肯面從每事如此天下何憂不治帝常欲行幸屬收穫未畢櫟陽縣丞劉仁軌上表切諫深被嘉納超授新安令貞觀三年二月帝謂孫伏伽曰卿累上封事言朕得失皆中朕之病而卿有忠言必聞朕復聞過而能改何慮社稷之不安也伏伽辭謝焉四年六月帝發卒修雒陽宮以備廵狩給事中張𤣥素上書諫曰每承音㫖未即廵幸此則事不急之務成虛費之勞國無兼年之積何用兩都之好勞役過度怨讟將起此其不可也帝覽之大恱謂房𤣥齡曰雒陽中土朝貢道均朕故欲修營意在便於百姓今𤣥素上表實亦可依後必事理須行露坐亦復何苦所有作役宜即停之五年十月帝將逐兎於内苑左領軍將軍執失思力諫曰天授陛下為華夷父母何過自輕儻使萬一馬有顚蹶將若之何帝顧而異之又將逐鹿思力乃脱巾帶跪而固請帝為之止焉十年褚遂良為諫議大夫時皇子年㓜者多任都督刺史遂良上疏諫曰臣愚見陛下兒孫内年齒尚㓜未堪臨人者且留京師教以經學一則畏天之威不敢犯禁二則觀見朝儀自然成立因此積習自知為人審堪臨州然後遣出帝深納之遂良前後諫奏及陳便宜書數十上多見采納十一年七月魏徴上疏言為國之基必資徳禮君之所保唯在誠信又云貞觀之始乃聞善若驚暨五六年間猶悦以從諫自兹厥後漸惡直言雖或勉強時有所容非復曩時之豁如也帝手詔荅曰卿頻抗表誠極忠欵言窮切至披覽忘倦每達宵分非公體國情深匪躬義重豈能示以良圖救其不及朕在衡門尚惟童㓜未漸師保之訓罕聞先達之言朕值隋祚分離萬邦塗炭慘慘黔黎庇身無所朕自二九之年有懐拯溺發憤投袂便事干戈蒙犯霜露東西征伐日不暇給居無寧嵗降蒼昊之靈禀廟堂之畧義旗所指觸向平夷弱水流沙並通輶軒之使被髮左袵化為冠盖之域正朔所班無逺弗届恭承寳厯寅奉帝圗垂拱無為氛埃静息於兹十有一載矣盖股肱罄帷幄之謀爪牙竭熊羆之力協徳同心以致於此豈其寡薄獨享斯休每以大寳神器憂責至重常懼萬機多曠四聰不達何常不戰戰兢兢坐以待旦詢於公卿以至芻蕘推以赤心庶㡬刑措但頃年以來禍釁既極又缺嘉偶茶毒未㡬悲傷繼及凢在生靈孰勝哀痛嵗序屢遷觸目摧感自爾以来心慮恍惚當食忘味中宵廢寢是以三思萬慮或失毫釐刑賞之乖寔繇於此昔者狗齊叡知資風牧以致隆平翼善欽明頼稷契以康至道然後文徳武功載勒於鐘石淳風至徳永𫝊於竹素克播鴻名永為稱首朕以虛薄名慙漢代若不仗任舟檝豈能濟彼巨川非藉鹽梅安得調夫鼎味朕聞晉武帝自平吳以後務在驕奢不復留心治政何曽退朝謂其子劭曰吾每見王上不論經國逺圗但説平生常語此非貽厥子孫者也爾身猶可以免指諸孫曰此等必遇亂及孫綏果為滛刑所戮前史美之以為明於先見朕意不然謂曽之不忠其罪大矣夫為人臣當進思竭誠退思補過將順其美規救其惡所以為治也曽位極台司名器隆重當直詞正諫論道佐時今乃退有後言進無廷諫以為明智不亦謬乎顛而不扶安用彼相公之所諫朕聞過矣當置之几案事等絃韋必望收彼桑榆期之嵗暮不亦康哉良哉獨慙於往日若魚若水遂爽於當今遲復嘉謀犯而無隠朕將虛衿靖志敬佇徳音八月甲子帝謂長孫無忌曰比來上封事人皆謂朕遊獵過多朕謂海内既安邊表無事不能不出入園苑時復射獵一事不干百姓計亦何苦特進魏徴奏曰古者立誹謗之木欲聞己過今之封事誹木之流也陛下既遣上封思聞得失凢所有事只得恣其陳道若所言忠則有益於陛下若不忠亦無損於國家帝曰此言是也並勞而遣之十八年劉洎遷侍中帝謂侍臣曰夫人臣之對帝王多順㫖而不逆甘言以取容朕今發問欲聞己過卿等須言朕愆失長孫無忌李勣楊師道等咸云陛下聖化致太平臣等不見其失劉洎對曰陛下化髙萬古誠如無忌等言然頃上書人不稱㫖者或面加窮詰無不慙退恐非奬進言者之路帝曰卿言是也當為卿改之時太宗每與公卿言及古今必詰難往復洎上書諫御筆為飛白答之曰非慮無以臨下非言無以述慮比有談論遂致煩多輕物驕人恐繇兹道形神心氣非此為勞今聞讜言虛懐以改髙宗永徽二年八月左武候引駕盧文操踰垣盗左蔵庫物帝以引駕職在糾繩身行盜竊命有司誅之諫議大夫蕭鈞進曰文操所犯情實難原然於常法罪不至死今致之極刑將恐天下聞之咸謂陛下輕法律賤人命任喜怒貴財物帝納之謂鈞曰卿職在司諫遂能盡規特為卿免其死罪因顧侍臣曰此乃真諫議也五年八月庚申太常樂工宋四通并給使王遊道長吉等入監内教因為宮人通傳消息帝特令處死仍遣附律諫議大夫蕭鈞奏曰四通等所犯在未附律前不合至死帝曰朕聞防禍未萌先賢所重宮闈之禁其可漸歟昔如姬竊符朕用為永監不謂今兹自彰其過但朕翹心紫禁思覿引𥚑側目朱欄冀旌折檻今喜得蕭鈞之言特免四通等死配流逺䖏咸亨初令突厥酋長子弟事東宫西臺舎人徐齊􅖫上疏切諫帝嘉納其言永隆二年正月王公已下及朝集使以太子初立獻食勅於宣政殿㑹百官及命婦太常博士袁利貞上疏曰臣以為前殿正寢非命婦宴㑹之䖏象闕路門非倡優進御之所望請命婦㑹於别䖏帝從之改向麟徳殿陳設蘇良嗣為荆州都督府長史帝嘗令宦官緣江採異竹將於苑中植之使者科舟載竹所在縱暴還過荆州良嗣囚之因上疏切諫帝謂天后曰吾約束不嚴果為良嗣所怪遽下手詔慰諭良嗣且令棄竹於江中𤣥宗先天二年正月望蕃僧婆陀請夜開門然百千燈太上皇御延熹門觀樂凢經四日又追作先天元年大酺太上皇御安福門樓觀百司酺宴以夜繼晝經月餘日右拾遺嚴挺之上疏諫陳五不可帝納其言而止開元二年十二月右威衞中郎將周慶立為嶺南市舶使與波斯僧廣造竒巧將以進内監選使殿中侍御史栁澤上書諫帝嘉納之肅宗乾元中蘇源明為考功郎中知制誥時將幸東京又以殿中監李輔國為行營兵馬使以御史大夫賀蘭進明為中京留守時公卿皆獻書進諫帝以制命已行不納源明及給舍等上言諫帝省表遂不東幸代宗大厯中姚南仲為右補闕時將𦵏貞懿皇后帝恩寵所屬全繕陵寢邇章敬寺復當遊幸近地左右莫敢言者南仲上疏諫帝覽表歎息立從其議徳宗建中初將厚奉山陵事中書舎人令狐峘上疏極諫詔答曰朕頃議山陵心方迷謬忘遵先㫖遂有優厚之文卿聞見該通識達𢎞逺深知不可切以為言引古援今依經據禮非特中朕之病兼以成朕之身今所以令朕免不子之名不遺君親於患者皆卿之力也敢不聞義而徙收之桑榆奉以始終期無失墜嗟乎古之遺直何以加卿貞元元年正月量移吉州長史盧杞為饒州刺史給事中袁髙執詔書不下又廷諍之乃止太子少保韋倫太府卿張獻恭於紫宸殿前奏髙所奏至當臣恐煩聖聽不敢縷陳其事獻恭奏曰袁髙是陛下一良臣望特加優異帝謂宰臣李勉等曰朕欲授杞一小州刺史可乎勉曰陛下授大州亦可其如兆庶失望何帝曰衆人奏杞姦邪朕何不知之勉曰盧杞姦邪天下之人皆知之唯陛下不知此所以為姦邪也帝黙然良乆左常侍李泌復對見帝曰盧杞之事朕已可袁髙奏何如泌奏曰累日外人竊議以陛下同漢之桓靈臣今覩承聖㫖廼知堯舜之不逮也帝悦慰勉之憲宗元和五年翰林學士司勲郎中知制誥李絳面論吐突承璀用兵無功合加顯責又承璀於軍中立聖政碑非舊制不可許帝初甚怒色變絳前語不已辭㫖懇切因泣下上徐察其意直色稍和卒大開悟遂以絳為中書舎人學士如前亟命軍中曳去所立碑曰微絳言不知此為損我翼日又面賜絳紫衣金魚親為絳擇良笏勉之曰爾他時在南面無易此心絳為相時教坊忽稱宻㫖取良家士女及衣冠别第妓人京師囂然絳謂同列曰此事大虧損聖徳須有論諫或曰此嗜欲間事從諫官上疏絳曰居常相公常病諫官不論事此難事即推與諫官可乎遂極疏論奏翼日對延英帝舉手謂絳曰昨見卿狀所論採擇事非卿盡忠於朕何以及此朕都不知向外此是教坊罪過不諭朕意以至於此朕緣丹王已下四人院中都無侍者朕令於樂工中及閭里有情願者厚其錢帛只取四人四王各與一人伊不㑹朕意便至如此朕今已科罰其所取人並放歸若非卿言朕寧知過失六年永昌公主薨欲起祠堂宰臣李吉甫奏請置墓戸翼日帝謂吉甫曰卿昨所奏罷祠堂深惬朕心朕初疑其冗費緣未知故實是以量減及覽所奏方知無據然朕不欲破二三十戸百姓當擇官戸謹信者委之吉甫等拜賀帝曰此豈是難事有關朕身不便於時者苟聞之則改此豈足多邪卿但切思規正無謂朕不能行也九年十二月釋下邽縣令裴寰之罪仍放本縣視事初每嵗冬以鷹犬出近畿習狩謂之外按宣徽院供奉官為其使令徒衆數百或有恃恩恣横郡邑懼擾皆厚禮迎犒之恣其所便止舎私邸百姓畏之如冦盗每留旬月方更其所是年冬行次下邽寰嫉其暴但據文供饋使處公舘杜其侵擾使者歸或譛寰有慢言帝大怒將以不敬論宰臣武元衡等於延英懇救理之帝怒不解及出逢御史中丞裴度將入元衡等謂曰裴寰事帝意不回恐不可論度唯唯而入抗陳其事謂寰無罪帝愈怒曰卿言裴寰無罪則當決五坊小使小使無罪則當決裴寰度曰誠如聖㫖但以裴寰為令長愛惜陛下百姓如此豈可罪之帝怒稍解初令書罰翼日釋之十四年四月命中官五人為京西和糴使諌議大夫鄭覃右補闕髙鉞等同以疏論帝覽之即日罷其使穆宗以元和十五年正月即位二月丁亥監察御史楊虞卿以帝頻出盤逰上疏切諫疏奏帝令中使宣付宰臣云虞卿所上疏切直可奬後宰臣令狐楚蕭俛叚文昌延英奏事因以納諫為賀十月羣臣入閣既退諫議大夫鄭覃崔偃補闕辛丘度拾遺韋璀温㑹等廷論得失覃進言曰陛下即位以来宴樂過多畋逰無度今蕃㓂在境緩急奏報不知乘輿所在臣等忝備諫列不勝憂迫伏願稍減遊樂留心政道又竊聞陛下晨夜暱狎倡優近習之徒賞賜過厚凡金銀貨幣皆出於蒼生膏血不可使無功之人濫沾賜與縱内蔵有餘亦乞陛下恭守節儉勿容易而散如四方有事得以支用免令有司重歛百姓實天下之幸帝初訝之顧宰臣蕭俛曰此軰何人俛進曰諫議大夫鄭覃等帝意稍解謂俛等曰朕有過失臣下能犯顔直諫豈非忠也又謂覃等曰允卿所奏宰臣皆蹈舞稱賀既退宰臣復詣延英奏事帝令宣示覃等曰閣中奏事殊不從容今日已後有事須面論者可於延英請對當與卿等從容講論時久無論諫於内閣者覃等既諍帝欣然納之中外相賀十一月行幸温湯李絳崔元畧等切諫辛酉命宰臣召李絳崔元畧等至中書宣㫖曰朕緣皇太后違和欲幸温湯前者所以督行親自檢校卿等遂能極諫深所愧懐於是各以表謝敬宗以長慶四年正月即位五月勅度支所進修造殿宇木石一物以上並付山陵使収管仍令般送陵所便充造作帝富有春秋畋獵之暇好治宮室皆命為别殿以新宴逰及庀蔵事功用至廣宰相李程諫曰自古聖帝明王率資儉徳以化天下况諒隂之内豈宜興作願陛下悉以見在瓦木及工役之費迴奉陵寢因有是詔程兼請置侍講學士帝皆嘉納十二月以翰林學士戸部郎中髙鉞為中書舎人充職謝恩於思政殿因諫帝以求理莫若躬親用示憂勤之㫖也帝深納其言寳厯元年二月浙西觀察使李徳裕獻丹扆箴帝雖不能盡用徳裕之言而特命翰林學士韋䖏厚殷勤草詔還答亦可謂奬善納忠至矣又常欲東幸宰相及諸大臣等無不切諫而帝意益堅常正色謂宰臣曰朕去意已定其從官宮人等悉令内備糗糧必不擾百姓宰臣李逢吉等頓首答言陛下貴為天子富有四海天下一家何往不可況東都千里而近宮闕具存廵狩逰幸固有常典但陛下法駕一動事須備儀千乘萬騎不可減省縱不令費用絶廣亦須使豐儉合宜豈得自備糗糧以失大體臣等所以為不可者祗以干戈未甚戢邊鄙未甚寧切恐人心揺動伏乞陛下上為宗廟下為庶人稍迴聖慮則天下幸甚非唯臣等幸甚帝不聽乃命度支員外郎盧貞檢討人情大擾雒中居第及物價頓貴數倍百執事相繼獻䟽亦並不省朝廷方憂恐之次裴度自興元入相因别對具奏云國家建立都邑盖備廵逰然自艱難以来此事遂絶東都宮闕及六軍營壘百司廨宇悉已荒廢陛下必欲行幸亦須緩緩修葺一年半嵗後方可議行目下交恐無素帝曰羣臣皆云不合去若以卿言即不去亦得何止後期旋又朱克融史憲誠各請以丁匠五千人助修東都宰臣因之復得論陳乃追貞還而罷行計文宗太和元年四月丙辰宰臣等於延英既出再召韋處厚獨對一刻餘時宰臣啟事得請之後往往中變是日處厚與裴度竇易直同對既而從容獨進曰陛下用臣等為宰相使參大政前後論奏皆蒙聽納近日雖云不阻然臣等既退尋多改移事若出自聖㫖則是陛下示臣等以不信若與别人商量則臣等不合更居此位且裴度以元勲舊徳厯相四朝孜孜竭誠人望所屬陛下固宜親重易直以忠厚長者輔佐先帝陛下亦當委付㣲臣是陛下首自選擢非因陳乞帝瞿然曰卿何事邪卿何事邪朕知卿合作宰相一昨内難既定朕以人望所屬用卿不疑軍國事多方所倚頼今卿辭免是彰朕之不徳朝廷四方其謂朕何慰勉久之而退既出延英門遽命中人復召處厚獨入咨訪移晷開陳理體者數百言其要以旌别淑慝修舉法制為請因復懇言裴度勲大望崇且其心忠藎可以久於任使帝欣納焉九年御史中丞李孝本以罪誅帝取其二女以入右拾遺魏謩上疏切諫帝立出二女以謩為右補闕開成元年正月以叙州司戸參軍董昌齡為硤州刺史昌齡前在邕南以殺衡方厚待罪無何復命右拾遺魏謩上疏曰臣聞王者渙汗之恩凢罪寛宥唯故殺人者死乃王者不易之典也其董昌齡比者録以㣲効任之方隅不能祗慎寵光恣其狂暴無辜殺戮事跡顯彰妻孥銜寃萬里来訴伏蒙陛下睿聖慈憫念其狂横特令鞫劾尋得貰原尚以微績曲全性命中外言議竊為未當今授之牧守以理疲人則殺人者遭拔擢寃苦者何申訴此則法理所紊交為不可臣忝備諫列不敢不言况陛下慎恤刑獄朔望循省慮有寃濫以及生人儻事理稍乖則傷聖化今兹寵授物議囂然伏乞陛下速回成命以警列士則天下幸甚疏奏數日昌齡復改為洪州别駕二月辛未宰臣又奏諫官所論董昌齡不合為郡守陛下遽即聽從臣下無不感説九月壬辰以左驍衞將軍兼揚州大都督府司馬雲朝霞為潤州司馬依前教坊副使朝霞以善吹笛進帝為新聲雅樂朝霞能承意變聲頻符帝㫖繇是有寵初授揚州司馬諫官上言曰此官品第尚書郎刺史皆為之非樂工所宜處也疏奏之後帝於延英又稱朝霞之能宰臣召諫官諭以帝㫖於是右補闕魏謩入疏再論浹旬後降授此官三年八月壬寅帝御紫宸殿百寮班定左拾遺竇洵直奏云仙韶樂官尉遲璋不合授三府率臣已兩狀未蒙允許樂官自有本分官不合輙更侵清秩帝謂宰臣曰此事至小不必當衙論之李珏宣云續有處分洵直不退再宣乃拜舞而退帝又曰洵直所論如何鄭覃曰三府率是六品雜官今若謂之清秩此為近名楊嗣復曰夫聞泃直之論一樂官則有之亦不足怪陳夷行曰諫官當衙只合論宰相得失不合論樂官然臣以為向外聞諫官當衙論事須與處置今請樂官七八年一度與官不然更與一二數手力帝曰别與一官遂除光州長史十一月庚午帝於麟徳殿召翰林學士柳公權丁居晦對因便授居晦御史中丞翼日制下是日帝問公權向外人情所論如何公權奏曰昨陛下除郭旼為邠寧節度使向外人情頗生異論帝曰郭旼是尚父之姪太皇太后之叔在官無過犯自執金吾與小鎮有何議論公權奏曰陛下數日前取郭旼二女入内有之乎帝曰然入參太后公權曰外議云郭旼二女有殊色故令入侍遂領藩方不言郭旼有他能而蒙聖奬帝俛首良久謂公權曰為之奈何公權曰昔廬江王妃入侍太宗王珪切諫太宗遂還其本家今陛下若令自南内送歸郭旼之家内外必信非陛下所納郭旼之女授邠寕自無異論是日太皇太后遣南宫留后張華送郭旼二女歸其家各與錦綵五十匹武宗㑹昌二年十一月幸涇陽校獵白鹿原諫議大夫髙少逸鄭朗等於閣内論陛下校獵太頻出城稍逺萬幾廢弛晨出夜歸方用兵師且宜停止帝優勞之諫官出謂宰臣曰諫官甚要朕時聞其言庶幾減過宣宗大中十一年正月車駕將幸華清宫兩省官進狀論奏詔曰朕以驪山近宮貞聖廟貌未嘗修謁自謂闕然今屬陽和氣清中外事簡聽政之暇或議一行盖崇禮敬之心非以盤逰為事雖申初令兼慮勞人卿等職備禁闈志勤奉上援經據古列狀獻章載陳懇至之辭深睹盡忠之節已允來請所奏咸知九月右補闕陳嘏左拾遺王譜右拾遺薛廷傑上疏諫遣中使往羅浮山迎軒轅先生詔曰朕以萬機事繁躬訪庶務聞羅浮山處士軒轅集善能攝生年齡亦夀乃遣使迎之或冀有少保理也朕每觀前史見秦皇漢武為方士所惑常以之為誡卿等位當論列職在諫司閱示来章深納誠意乃謂崔慎繇曰為吾言於諫官雖少君欒大復生不能相惑如聞軒轅生髙士欲與之一言耳後唐莊宗天祐十三年冬李存審破楊劉進營麻家口為都營使築壘以拒汴人時帝勇於接戰每以輕騎當賊遇窘數四存審凌旦度其必出叩馬泣諫曰王將復唐宗社宜為天下自愛搴旗挑戰一劒之任無益聖徳請責効於臣昔耿弇不以賊遺君父臣雖不武敢不代君之憂帝即時迴駕同光三年閏十二月兩省諫官上疏請車駕不廵幸汴州批荅曰忽披諫疏深沃朕心非因讜直以上聞豈致焦勞之外達卿以餽運不繼軍食有虧在京則廪食闕如支計則供頓莫備卿等若别陳意見動卟機宜儻得稍濟軍儲不移警蹕即當旁詢衆懇盡述良籌佇聞敷敭浣予宵旰戊申諌官上疏請不廵幸汴州批荅曰朕以四海雖寧五兵不可不訓聚之王室務壯神京其如人頼餱糧馬資藁秸飛輓動勞於四達經謀全繫于有司近以水潦為災賦租失額欲廵方岳貴便兵民卿等細察輿情備陳忠懇慮沸騰於物議俾鎮静於宸居載覽封章深識嘉畫時諫官言天子有四海之富何慮闕供當須節儉省費以濟六軍自古及今未有鑾輿就食今吳揚未滅示其虛實轉益兇驕三疏乃允明宗長興二年十月北京地震左補闕李祥上疏曰臣聞北京地震日數稍多臣曽覽國書見開元中秦州地震尋差官宣慰又降使致祭山川所損之家委随事制置陛下中興唐祚起自晉陽地既數震合思天誡臣思天意慮陛下忘剏業艱難之時有功成矜滿之意欲陛下有始有卒兢兢業業也望委親賢往彼宣慰問其疾苦俾議蠲除詔曰地道安静以動為異前文備載厯代不無因有災祥深加儆戒朕自登九五每念生靈樂聞忠正之言惡見驕奢之事嵗時豐稔中外和同近聞河南數數地動駭彼羣聽深軫予衷李祥居諫諍之官抱讜直之氣懇禆正道特上封章恐朕忘剏業艱難之時有功成矜滿之意不唯舉職備見為時况朕守聽政之勤如踐祚之始常持翼翼不忘兢兢今更體李祥之言以前代為鑒理不忘亂安不忘危臣下須進思盡忠退思補過日慎一日有始有終如此則何休祥之不臻何咎徴之不泯唯并州之地乃豐沛之鄉已命親賢往分憂寄必資鎮静專務輯綏刑獄之間不得令有寃滯凢關利濟并許奏聞事有不便於民皆須止絶其北京山川之神仍宜差官專往祭禱朝廷静可以恵四海侯伯静可以福一方冀安比室之人以鎮興王之地先是太原地震留守宻奏人不之知無敢言者及祥有是奏帝甚嘉之賜祥四品章服晉髙宗天福二年詔修西京大内諫議大夫薛融以鄴下用兵國用不足上疏請罷之優詔嘉許周世宗顯德三年世宗親征淮南四月丁亥車駕發自濠州迴幸渦口是時銳於攻取意欲親幸揚州宰臣范質等以師老泣誎乃止册府元龜卷一百一
