body:
  text: 册府元龜卷八百九十三宋王欽若等撰總錄部夢徵第二宋劉穆之為瑯邪府主簿嘗夢與高祖俱泛海忽值大風驚懼俯視船下見有二白龍挾舫既而至一山峯㠋聳秀林樹繁密意甚悅之及高祖尅京城問何無忌曰急須一府主簿何繇得之無忌曰無過劉道民高祖曰吾亦識之即馳信召焉後至左僕射何㸃累徵不起少時嘗患渴經嵗不愈後在吳中石佛寺僧建講晝寢夢一道人形貎非常授丸一掬夢中服之而差孔覬行會稽郡事起兵乃夢行宣陽門道上顧望皆邱陵覬寤私告人曰邱陵者弗平建康其殆難尅薛安都征關陜至臼口夢仰頭視天正見天門開謂左右曰汝見天門開不元凶弑逆世祖舉兵安都歎曰昔夢天開乃中興之象邪王元謨為寜朔將軍北征兵敗輔國將軍蕭斌將斬之夢人告之曰誦觀音經千遍則免既覺誦之得千遍明日將刑誦之不輟忽傳呼停刑沈慶之嘗夢引鹵薄入厠中慶之甚惡入厠之鄙時有善占者曰君必大富貴然未在旦夕問其故答云鹵薄故是富貴入厠中所謂後帝也知君不在今主後為侍中太尉年八十夢有人以兩疋絹與之謂曰此絹足度因謂人曰老子今年不免兩疋八十尺也足度無盈餘矣是年果為廢帝所害前廢帝太后疾篤呼帝帝不行及太后崩後數日帝夢太后謂之曰汝不孝不仁本無人君之相子尚愚悖如此亦非運祚所及孝武險虐滅道怨結人神兒子雖多竝無天命大運所歸應還文帝之子其後湘東王紹位果文帝子也袁粲為海陵太守廢帝即位粲在郡夢日墮其胷上因驚覺尋被徵管機密歴吏部尚書侍中驍衛將軍南齊紀僧真自寒官事太祖後為冠軍府㕘軍僧真夢蒿艾生滿江驚而白之太祖曰詩人採蕭蕭即艾也蕭生斷流卿勿廣言其見親如此荀伯玉初為太祖鎮軍中兵叅軍太祖在淮南伯玉假還廣陵夢上廣陵城南樓上有二青衣小兒語伯玉云草中肅九五相追逐伯玉視城下人頭上皆有草㤗始七年伯玉又夢太祖乗船在廣陵北渚見上兩腋下有翅不舒伯玉問何當舒上曰却後三年伯玉夢中自謂是咒師上向唾咒凡六咒有六龍出兩腋下翅皆舒還而復歛元徽二年而太祖破桂陽威名大震五年而廢蒼梧太祖謂伯玉曰卿時乗之夢今且效矣張敬兒為車騎將軍心疑以世祖不勞問及垣崇祖死愈恐懼妻謂敬兒曰昔時夢手熱如火而君得南陽郡元徽中夢半身熱而君得本州今復夢舉體熱矣有閹人聞其説之事逹世祖伏誅徐孝嗣領太子左衛率在率府晝卧齋北壁下夢兩童子遽云移公床孝嗣驚起聞壁有聲行數歩而壁摧壓床禇淵為司徒錄尚書事少時嘗病篤夢人以卜蓍一具與之遂差其一以年四十八嵗初更寢疾表遜位不許曹武為右衛尉將軍卒武雖武士頗有知人鑒梁武及崔慧景之在㐮陽于時崔方貴盛武性儉嗇無所餉遺獨饋梁武謂曰卿必大貴我當不及見今以弱子相託每密送錢物并好馬時帝在戎多乏錢就武換借未嘗不得遂至十七萬及帝即位忘其惠天監二年帝或夢如田塍下行兩邉水深無底夢中甚懼忽見武來負武帝得過曰卿今為天下主乃爾忘我顧託之言耶我兒饑寒無依昔所換十萬可還其市宅帝覺即使主書送錢還之使用市宅子世澄世宗竝蒙抽擢二三年間遷為大郡南康王子夏字雲廣世祖第二十三子帝春秋高子夏最㓜寵愛過諸子初世祖夢金翅鳥下殿庭摶食小龍無數乃飛上天明帝初世祖諸子多誅死其夢乃驗永㤗元年子夏誅年七嵗梁陶宏景字通明初齊高帝作相引為諸王侍讀建武中齊宜都王鏗為明帝所害其夜宏景夢鏗告别因訪其函中多説祕異因著夢記焉宏景母夢青龍無尾自已升天宏景果不妻無子從兄以子松喬嗣沈約夢齊和帝劍斷其舌召巫視之巫言如夢乃呼道士奏赤章於天稱禪代之事不繇已出高祖遣上省醫徐裝視約疾還具以狀聞先是約嘗侍讌值豫州獻栗徑寸半帝竒之問曰栗事多少與約各䟽所億少帝三事出謂人曰此公前譲不譲即羞死帝以其言不遜欲抵其罪徐勉固諌乃止及聞赤章事大怒中使譴責者數焉約懼遂卒江淹為金紫光禄大夫卒少以文章顯晚節才思㣲退云為宣城太守時罷歸始泊禪靈寺渚夜夢一人自稱張景陽謂曰前以一疋錦相寄今可見還淹探懐中得數尺與之此人大恚曰那得割截都盡顧見邱遲謂曰餘此數尺既無所用以遺君自爾淹文章躓矣又嘗宿於治亭夢一丈夫自稱郭朴謂淹曰吾有筆在卿處多年可以見還淹乃探懐中得五色筆一以授之爾後為詩絶無美句時人謂之才盡紀少瑜嘗夢陸倕以一束青鏤管筆授之云我以此筆猶可用卿自擇其善者其文因此遂進後至武陵王記室叅軍王茂初以元勲賜以鐘磬之樂及茂在江州夢鐘磬在格無故自墮心惡之及覺命奏樂既成列鐘磬在格果無故編皆絶墮地茂謂長史江詮曰此樂天子所以惠勞臣也樂既極矣能無憂乎俄而病少日卒沈瑀齊末為選曹郎梁高祖起兵瑀説陳伯之舉衆降瑀從在高祖軍中初瑀在竟陵王家素與范雲善齊末嘗就雲宿夢坐屋梁柱上仰見天中有字曰范氏宅至是瑀謂高祖曰雲得不死此夢可驗及高祖即位雲深薦瑀自暨陽令擢兼尚書右丞吉士瞻夢一積鹿皮從而數之有十一領及覺思之而喜後士瞻任官至九政忽除梁秦二州甚惡之果卒桞慶遠從父兄衛將軍世隆嘗謂慶逺曰吾昔夢太尉以褥席見賜吾遂亞台司適又夢以吾褥席與汝汝必光我公族至是慶逺為雍州刺史卒贈侍中開府儀同三司亦繼世隆焉元帝初在尋陽賀革西上意甚不悦過别御史丞江革以情告之革曰吾嘗夢主上遍見諸子至湘東王手脱㡌授之此人後必當璧卿其行乎革志之及太清之難乃能克復故遐邇樂推遂應寳命矣始興王憺未薨前夢改封中山王䇿授如他日意頗惡之數旬而卒鮑泉之為南討都督友人夢泉之得罪於世祖覺而告之後未旬果見囚執頃之又夢泉之著朱衣行水上又告泉之曰君勿憂尋得免矣因説其夢泉之密記之俄而見復任皆如其夢傅昭為安城内史安城自宋來兵亂郡舍號凶及昭為郡郡内人夜夢見兵馬鎧甲甚盛又聞有人云當避善人軍衆相與騰虚而逝夢者驚起俄而疾風暴雨倐忽便至數間屋俱倒即夢者所見軍馬蹈踐之所也自後郡舍遂安咸以貞正所致劉霽母明氏寢疾霽年已五十衣不解𢃄者七旬誦觀世音經數至萬遍夜因感夢見一僧謂曰夫人筭盡君精誠所至當相為申延後六十餘日乃亡江紑字合㓗㓜有孝性年十三父蒨患眼紑侍疾將朞月衣不解𢃄夜夢一僧云患眼者飲慧眼水必差及覺説之莫能解者紑第三叔禄與草堂寺智者法師善徃訪之智者曰無量壽經云慧服見真能渡彼岸蒨乃因智者啟捨同夏縣界牛屯里舍為寺乞賜嘉名勑答云純臣孝子徃徃感應晉世顔含遂見𡨕中送藥近見智者知卿第二息感夢云飲慧眼水慧眼則是五眼之一號若欲造寺可以慧眼為名及就創造泄故井井水清洌異於嘗泉依夢取水洗眼及煑藥稍覺有瘳因此遂差時人謂之孝感焉劉之遴初在荆府嘗寄居南郡廨忽夢前太子袁彖謂曰卿後當為折臂太守即居此中之遴後損臂遂臨此郡何𦙍不仕疾妻江氏夢神人告之曰汝夫壽盡既有至徳應獲延期爾當代之妻覺説焉俄得患而卒何疾反瘳其後𦙍夢一神女并八十許人並衣祫行列至前俱拜牀下覺又見之便命營凶具既而疾困不復瘳朱躭為太醫令嘗直禁省無何夜夢犬羊各一在御坐覺而思之告人曰犬羊者非佳物也今據御坐將有變乎既而高祖蒙塵侯景登正殿焉侯景反簡文帝乆見幽縶朝士莫得接覲慮禍將及嘗不自安惟舍人殷不害後稍得入太宗指所居殿謂之曰龎涓當死此下又曰吾昨夜夢吞土卿試為思之不害曰昔重耳饋塊卒反晉國陛下所夢將符是乎太宗曰儻幽冥有徵兾斯言之不妄爾至是見弑實以紈盛土加於腹焉沈初明為御史中丞元帝江陵平遷長安元魏太祖授儀同三司甚禮待之初明恐元魏愛其文才乃閉門却掃無所交游時有文章隨即毁棄不令流布嘗獨行經漢武通天臺為表奏之陳已思歸之意奏訖其夜初明夢見有官禁之所兵衛甚嚴初明更以情事陳訴聞有人言甚不惜放卿幾日可至若一月内見關出此恐不復繇我寤而異之當時以為怳忽十餘日便有命放還與王克等竝得東歸隂子春嘗為東莞太守時青州刺史王神念毁壊臨海神廟當神座上有一大蛇入於海水爾夜子春夢見一人詣其府云有人見苦破壊宅舎既無所託欲憩此境子春心宻記之經二日方知神念毁廟因辦牲醑立宇祠之數日夢一朱衣人謝曰得君厚惠當以相報經月餘魏軍欲襲朐山子春預知設伏摧破之梁武以為南青州刺史王僧辯為征討都督討侯景進師潯陽軍人多夢周何二廟神云吾已助天子討賊自稱征討大將軍竝乗朱舫俄而反曰已殺景同夢者數十百焉陳章昭逹以功授鎮軍將軍初世祖嘗夢昭逹升於台鉉及旦以夢告之至是侍醼世祖顧昭逹曰卿憶夢不如何以償昭逹對曰當効犬馬之用以盡臣節自餘無以奉償徐陵母臧氏嘗夢五色雲化而為鳯集左肩上已而誕陵焉陵至太子少傅鄭灼勵志儒學少受業于皇侃灼性精勤尤明三禮少時嘗夢與皇侃遇於途侃謂灼曰鄭郎開口侃因唾灼口中自後義禮愈進後魏秦明王翰曽孫禎為都牧尚書禎子瑞初瑞母尹氏有娠致傷後晝寢夢一老翁具衣冠告之曰吾賜汝一子汝勿憂之寤而私喜又問筮者曰大吉未幾而生瑞禎以為恊夢故名瑞字天賜位大中大夫卒贈太常卿濟隂王鬱長子弼以世嫡應襲為季父所奪初弼嘗夢人謂已曰君身不得傳世封其紹先爵者君長子紹逺也果如其言任城王澄為吏部尚書兼右僕射高祖至北邙遂幸洪池命澄侍昇龍舟因賦詩以述懐高祖曰朕昨夜夢一老翁頭鬚皓白正理冠服拜立路左朕恠而問之自云晉侍中嵇紹故此奉迎神爽卑懼似有求焉澄對曰晉世之亂嵇紹以身衛主殞命御側亦是晉之忠臣比干遭紂兇虐忠諌剖心可謂殷之良士二人俱死於王事墳塋竝在於道周然陛下徙御瀍雒經殷墟而弔比干至洛陽而遺嵇紹當是希恩而感夢高祖曰朕何徳能幽感逹士也然實思追禮先賢樹揚忠懿比干嵇紹皆是古之誠烈朕務濃比干禮畧嵇紹情亦有愧然既有此夢或如任城所言於是求其兆域遣使弔祭焉中山王熙未誅前夢人告之曰任城王當死死後二日外君亦不免若其不信試㸔任城家熙夢中顧瞻任城第舍四靣墻水無遺堵焉熙惡之覺而以告所親及熙之死也果如斯夢李憲為揚州刺史於肅宗孝昌二年十月表云門下督周伏興以去七月患假還家至十一日夜夢渡淝水行至草堂壽南遥見七人一人乗馬著朱衣籠冠六人從後興路左而立至便再拜問興何人興對曰李公門下督蹔使硤石其人語興君可廻我是孝文皇帝中書舍人遣語李憲勿憂賊堰此日破矣興行兩歩録興姓字令興速白興寤曉遂還城具言夢狀七月二十七日堰破元順為左僕射爾朱榮之奉莊帝召百官悉至可隂素聞順數諌諍惜其亮直謂朱端曰可語元僕射但在省不湏來順不逹其言聞害衣冠遂便出走為陵戸鮮于康奴所害家徒四壁無物歛尸止有書數千巻而已門下通事令史王才逹裂裳覆之莊帝還宫遣黄門侍郎山偉廵喻京邑偉臨順䘮悲慟無已既還莊帝恠其聲散偉以狀對莊帝勑侍中元祉曰宗室䘮亡非一不可周贍元僕射清高之節死乃益彰特贈絹百疋餘不得為例贈尚書令司徒公謚曰文烈初莊帝在藩順夢一叚黒雲從西北直來觸東南上日月俱破復目諸星天地盡闇俄而雲消霧解便有日出自西南隅甚明淨云長樂王曰尋見莊帝從閶闔門入登太極殿唱萬嵗者三百官咸加朝服謁帝唯順集書省歩廊西槐樹下脫衣冠卧既寤告元暉業曰吾昨夜夢於我殊自不佳説夢因解之曰黒雲氣惡者是北方之色終當必有北敵以亂京師二宫殘毁百寮何者日君象也月后象也衆星百官象以此言之京邑其當禍乎昔劉曜破晉室以為髑髏臺前途之事得無此乎雖然彭城王勰有文徳於天下今夢其兒為天子積徳必報此必然矣但恨其得之不久所以然者出自西南以時易年不過三載但恨我不見之向者我夢卧槐樹下槐字木傍鬼身與鬼并復解冠冕此寧不死乎然亡後乃得三公贈爾皆如其夢酈範幼為青州刺史加冠軍將軍還為尚書右丞後除平東將軍青州刺史假范陽公範前解州還京口夜夢隂毛拂踝他日説之時齊人有占夢者曰史武進云豪盛於齊下矣使君臨撫東秦道光海岱必當重牧全齊再禄營邱矣範笑而答曰吾將為卿必驗此夢果如其言崔浩為司徒真君十一年被誅浩初搆害李順基萠已成夜夢秉火爇順寢室火作而順死浩與室家羣立而觀之俄而順弟息號哭而出曰此軰吾賊也以戈撃之悉投於河寤而惡之以告館客馮景仁景仁曰此真不善也非復虚事夫以火爇人暴之極也階亂兆禍復之招也商書曰惡之易也如火之燎於原不可嚮爾其猶可撲滅乎且兆始惡者有終殃積不善者無餘慶厲階成矣公其圗之浩曰吾方思之而不能悛至是而已李元忠為侍中領衛尉卒元忠將仕夢手執炬入其父墓中夜驚起甚惡之旦告其受師占大吉此可謂光炤先人也竟如其言馬敬徳天綂初除國丁愽士太武為後主擇師傅趙彦深進之入為侍講其妻夢猛獸將來向之敬徳走超叢棘妻伏地不敢動敬徳占之曰吾當得大官超級過九卿也爾伏地夫人也北齊崔季舒為左光禄大夫妻晝魘寤云見人長一丈遍體黒毛欲來逼已巫曰此是五道將軍入宅者不祥俄被誅張亮字伯徳拜大中大夫薛琡嘗夢於山上掛絲以告亮且占之曰山上絲幽字也君其幽州刺史乎果然竇泰母初夢風雷暴起若有雨狀出庭觀之見電光奪目驟雨霑洒寤而驚汗遂有娠朞而不産大懼有巫曰渡河湔裙産子必易便向水所忽見一人曰當生貴子可從而南泰母從之俄而生泰後主夜夢黒衣貴人迭相驅逐乃向之拜後築西鄙諸城為羌兵鼓譟凌之多作黑衣人共缺内叅臨拒或實彎弓射人自晉陽東廵軍馬馳騖前不得有人解髮散而歸後周高琳母嘗祓禊泗濵遇見一石光彩朗潤遂持以歸是夜夢一人衣冠有若仙者謂其母曰夫人向所將來之石是浮磬之精若能寳持必生令子其母夢寤便舉身流汗已而有娠乃生琳因以名字焉及長有大度知略從文帝累有戰功後位至大將軍開府儀同三司隋衛王爽討突厥明年徵為納言高祖甚重之未幾寤疾上使巫者薛榮宗視之云衆鬼為厲爽令左右驅逐之居數日有鬼物來撃榮宗榮宗走下階而斃其日爽薨元徳太子昭煬帝長子也初文帝以開皇三年四月庚午夢神自天而降云是天將生降寤召納言蘇威以告之及聞蕭妃在并州有娠迎置大興宫之客省明年正月戊辰而生昭養於宫中號大曹王唐裴寂字元真蒲州人初仕隋為左親衛家貧無以自業每徒歩詣京師經華岳廟祭而祝曰窮困至此敢修誠謁神神之有靈鑒其運命若富貴可期當降吉夢再拜而去夜夢白頭翁謂寂曰卿年三十已後方可得志終當位極人臣爾至武徳中為司空徐慶太宗時為征遼判官有一典不得姓名慶在軍忽夢已化為羊為典所殺覺懼流汗至曉典判案慶問曰汝夜有夢否典云夢公為羊某屠之繇是慶不食羊則天時慶至司農少卿雍州司馬時典已任大理獄丞後慶被誣與内史令裴炎通謀慶應接英公徐敬業揚州反被執送大理忽見丞押獄慶流涕謂曰征遼之夢今當應之及被戮竟丞引之李嶠趙州贊皇人為兒童時夢有神人遺之䨇筆自是漸有學業弱冠舉進士後歴中書令兵部尚書同中書門下三品崔湜為中書令景雲中坐事徙嶺外與尚書左丞盧藏用同配流俱行湜謂藏用曰家弟承恩或兾寛宥因遲留不速進行至荆州夢於講堂照鏡自以為鏡者明象吾當為人主所明也以告占夢人張申申退曰講堂者受法之所鏡者於文為立見金此非吉徵其日追使至縊於驛中賀知章絳州翼城人少勤學嘗夢神人以大鑿開其心以藥内之自是日益開朗盡通諸經義未幾而諸師友北靣受業焉後至國子博士張鷟字文成聦警絶倫書無不覧為兒童時夢紫色大鳥五彩成文降于家庭其母謂之曰五色赤文鳳也紫文鸑鸑也為鳳之佐吾兒當以文章瑞於朝廷因以為名字後終於司門員外郎偉温為宣歙觀察使瘍生於首謂愛聓張復魯曰予任挍書郎時夢二黄衣人賫符來追及滻將渡一人續至曰彼墳至大功須萬日遂不渉而窹計今萬日矣與公决矣明日卒史思明叛逆將為其下所殺其夜思明夢而覺據案惆悵思明好伶人寢食嘗置左右以其殘忍皆怨之及此問其故思明曰吾見夢向水中沙上有羣鹿吾逐鹿及渡水而至沙上鹿死水盡言畢如厠伶人相謂曰鹿者禄也水者命也胡禄與命俱盡矣是夕思明為朝義所殺劉沔初為中武小校從李光顏討淮西為捉生將前後遇賊血戰鋒刅所傷幾死者數四嘗傷重卧草中日黒不知歸路昬然而睡夢人授之雙燭曰子方大貴此行無患可持此而還既行朗然有雙光在前後歴振武河東義成鄭滑節度使以太子太保致仕卒杜牧為中書舍人得病嘗夢告曰爾改名畢又夢書片紙曰皎皎白駒在彼空谷寤而歎曰此過隙也其年以疾終劉仁恭為幽州節度使仁恭㣲時曽夢佛幡於七指飛出或占曰君年四十九必有旌幡之貴後如其夢晉李專美字翊商京兆人後唐末帝鎮鳯翔專美為記室在岐下曽夢具裳簡立嵩山之頂及為端明殿學士與李崧同列而班在其上以所夢告崧且曰某非徳非勲安可久在此秩居吾子之首乎因懇求他官尋移宣徽使馬重繢為司天監夢游崑崙山與上仙語其言覺具述其事夜未央無病而卒趙瑩字元暉華隂人解褐為康延孝從事後唐同光中延孝鎮陜州㑹莊宗伐蜀命延孝騎將將行留瑩監修金天神祠功既集忽夢神召於前亭待以優禮乃謂瑩曰公富有前程所宜自愛因遺一劒一笏覺而駭異後為中書令出為晉昌節度移鎮華州入為開府尹復相位加宏文館大學士崔棁為太常卿嘗自語於知友云某少時夢二人前引行路一人計地理曰一舍矣可以止一人曰此君當更進三十有八里復行如所言二人偕止之俄而驚覺梲嘗識是夢以為定命之限故六十有七請退明年果終焉李郁為光禄卿一日晝寢夢食豆棗覺而有疾謂其親友曰嘗聞棗字重來呼䰟之象也余神氣逼抑將不免乎天福五年夏卒李周為權開封五將卒夢焚旌旗與鎧甲繇是歎息有歸休之意三上章不得謝年七十四卒帝聞其忠慎亷㓗無積財歎息久之馬𦙍孫後唐明宗朝為潞王河中從事天成中嘗計事赴闕宿於邏店其地有上邏神祠夜夢神人見召待以優禮手授二筆其筆一大一小覺而異焉及潞王即位以𦙍孫為翰林學士𦙍孫以為契鴻筆之兆旋知貢舉私自謂曰此二筆之畢應也及拜平章事上事中堂吏奉二筆熟視大小如昔時夢中所授者𦙍孫始悟冥數有定分也周和年十七舉明經至京師忽夢人以五色筆一束與之謂曰子有如此才何不舉進士自是才思敏贍後至宰相罷為太子太傅卒王仁裕字徳輦天水人少孤不從師訓年二十五一夕夢割其腸胃引西江水以浣之又睹水中沙石皆有篆文因取吞之及寤心意豁然自是文性甚高後為兵部尚書太子少保卒徐台符為兵部尚書翰林學士承㫖與太子太傅李崧為執友崧為蘇逄吉史宏肇所搆乾祐三年秋夢崧謂曰予之寃横得請於帝矣及蘇史誅竝梟首於市當崧所誅之地趙上交仕晉為御史中丞天福九年少帝禦契丹於澶淵上交從行忽中夜夢有一女子為人設筮上交問曰此行主上櫛風沐雨百官暴露營野契丹幾時當北去也女子曰十二日五日也俄見女子袒衣身有金甲類將軍之狀上交駭而寤以告同列咸曰此真異夢不可輕為占測當共志之時虜去駕還俱不以是日及十二年正月朔日契丹至浚北郊百官素服序列以朝之虜長被狐裘跨馬駐層阜之上令百官去縞具常服謂曰爾軰無懼吾亦人也因開襟示所擐之甲具云我昨來特製此為南討也葢虜情多忌當欲明其有備爾時上交為御史中丞首引百官見其事具省前夢退謂舊同列曰虜生北方禀隂氣女子象通卜筮者以多筭也此日乃明其應異乎及契丹北還果以十七日也李濤為中書侍郎兼戸尚書平章事漢隠帝乾祐元年三月免歸私第初濤於是月中書閤内晝寢夢㕔事如新嚴餙張陳供具郡吏趍走言迎新宰相𢃄諸司使既寤心異之題記於柱至二十八日罷免尋除楊邠為相𢃄樞宻使冊府元龜卷八百九十三
