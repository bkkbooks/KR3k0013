body:
  text: 册府元龜卷一百五十九宋王欽若等撰帝王部革弊春秋傳曰上思利民忠也董仲舒有言譬之琴瑟不調甚者必解而更張之乃可鼓也為政而不行甚者必變而更化之乃可理也若夫堯舜禹之相繼也守一道而政和平逮三統更千載祀彌乆夏之忠商之質周之文若循環然迭舉以救其弊豈不以繼治世者其道同繼亂世者其道變禮樂之㳂襲有損益之殊刑法之制作有貪凉之異自非酌之以隨時之義㫁之以大中之計固將流蕩忘返驅斯民於塗炭矣故易曰革之時義大矣哉聖人所以開物成務由斯道也漢元帝元初五年四月詔罷角抵成帝建始二年三月罷六廐技巧官巧藝之技也後漢明帝永平十二年五月詔車服制度恣極耳目田荒不耕㳺食者衆有司其申明科禁宜於今者宣下郡國和帝永元十一年秋七月辛卯詔曰使民踰僣厚死傷生是以舊令節之制度頃者貴戚近親百僚師尹莫肯率從有司不舉怠於日甚又商賈小民或忘法禁竒巧靡貨流積公行其在位犯者當先舉正市道小民但申明憲綱勿因科令加虐羸弱孝殤定平中罷魚龍曼延百戲漢官典職曰作九賓樂一利之獸從西方來獻于庭入前殿激水化比目魚潄水作霧化成黄龍長八丈出水遨戲炫耀日光曼延獸名也張衡西京賦所云巨獸百尋是為曼延音以戰反安帝永初二年七月庚午詔三公申明舊令禁奢侈無作浮巧之物殫財厚葬順帝陽嘉中大司農劉據以職事被譴詔詣尚書傳呼促歩又加捶撲尚書令左雄上言九卿位亞三事班在大臣行有佩玉之節動有庠序之儀孝明皇帝始有撲罰皆非古典帝從而改之其後九卿無復捶撲者桓帝延熹八年四月丁巳壞郡國諸房祀房祠堂也王渙傳曰時唯宻縣存卓茂廟洛陽留令王渙祠魏文帝黄初五年十二月詔曰先王制禮所以昭孝事祖大則郊祀其次宗廟三神五行名山大川非此族也不在祀典叔世衰亂崇信巫史至乃宫殿之内户牖之間無不沃酹甚矣其惑也自今其敢設非祀之祭巫祝之言皆以執左道論著于令典明帝青龍元年五月丁酉詔諸郡國山川不在祀典者勿祠晉武帝泰始元年十二月詔曰昔聖帝明王修五嶽四瀆名山川澤各有定制所以報隂陽之功故也然以道莅天下者其鬼不神其神不傷人故祝史薦而無媿辭是以其人敬愼幽𡨕而淫祀不作末世信道不篤僣禮黷神縱欲祈請曽不敬而逺之徒偷以求幸妖妄相煽舎正為邪故魏朝疾之其按舊禮具為之制使功著於人者必有其報而妖淫之鬼不亂其間二年正月有司奏春分祠厲殃及禳祠詔曰不在祀典除之又遣使兼侍中侯史光等持節四方循省風俗除禳祀之不在祀典者又罷鳴鷄歌又除漢宗室禁錮八年二月乙亥禁雕文綺組非法之物成帝咸康七年除樂府雜伎從中散侍騎郎顧臻之議除髙絙紫鹿跛鼈行食及齊王捲衣笮兒等樂又减其廪其後復髙絙紫鹿焉孝武寧康元年三月癸丑詔除丹陽竹路等四桁稅後魏太武太平真君九年十月癸卯以婚姻奢靡喪葬過度詔有司更為科限孝文太和六年三月庚辰行幸虎圏詔曰虎狼猛暴食肉殘生取捕之日每多傷害既無所益損費良多從今勿復捕貢七年十有二月癸丑詔曰淳風行於上古禮化用乎近葉是以夏殷不嫌一族之婚周世始絶同姓之娶斯皆教隨時設法因事改者也皇運初基中原未遑釐改後遂因循迄兹莫變朕屬百年之期當後仁之政思易其舊式昭惟新自今悉禁絶之有犯以不道論九年正月戊寅詔曰圖䜟之興起於五季旣非經國之典徒為妖邪所憑自今圖䜟秘緯及名為孔方閉房記者一皆禁之留者以大辟論巫覡假稱神鬼妄說吉㓙及委巷諸卜非墳典所載者嚴加禁㫁帝以諸有禁忌禳厭之方非典籍所載一皆除罷十三載四月丁卯詔曰昇樓散物以賚百姓至使人馬騰踐多有毁傷今可㫁之以本所費之物賜窮獨貧者孝明神龜二年十二月庚申詔除滛祀禁諸雜神正光三年十二月丁亥以牧守妄立碑頌輙興寺塔第宅豐侈貼肆商販詔中尉端衡肅厲威風以見事紏七品六品禄足代耕亦不聽錮貼肆爭利城市也後周武帝建徳六年六月丁卯詔曰同姓百世婚姻不通盖惟重别周道然也而娶妻買妾有納母之族雖曰異宗猶為混雜自今已後悉不得娶母同姓以為妾其已定未成者卽令改聘隋髙祖開皇元年四月戊戌詔太常散樂竝放為百姓禁雜百戲十八年正月辛卯詔曰呉越之人徃承弊俗所在之處私造大船因相聚結致有侵害其江南諸州人間有船長三丈已上悉括入官仁壽元年正月辛丑詔曰君子立身雖云百行唯誠與孝㝡為其首故投生徇節自古稱難至於殞身王事禮加二等而世俗之徒不逹大義至有致命戎旅不入兆域虧孝子之義傷人臣之心興言念此每深愍歎且入廟祭祀竝不廢闕何至墳塋却在其外自今以後戰亡之徒宜入墓域煬帝大業六年四月乙卯詔曰夫帝圖草創王業艱難咸仗股肱叶心同徳用能拯厥頽運克膺大寳然後疇庸懋賞開國承家是以山河傳之不朽近代喪亂四海未一茅土妄假名實相乖厯兹永乆莫能懲革皇運之初百度伊始猶循舊貫未暇改作今天下交泰文軌攸同宜率遵先典永埀大訓自今已後唯有功勲乃得賜封仍令子孫承襲唐太宗武徳九年八月甲子即位九月壬子詔民家不得輙立妖神妄設淫祀非禮所禱一皆禁絶其龜易五兆之外諸雜占卜亦宜停㫁十月庚子詔曰立人之道曰仁與義為國之基徳歸於厚自有隋馭宇政刻刑煩上懷猜阻之心下無和暢之志遂使朋友㳺好慶弔不通鄉土聨官請問㫁絶至有里門相接致秦越之乖患難在身忘救恤之義風頽俗弊一至於此化民以徳豈斯之謂朕纂厯膺期思𢎞至道因兆民之所賴求萬國之歡心凡厥庶僚咸使輯睦君臣之際期於無隱永言前失特宜敦勵自今内外官人須相存問勿致疑阻有遇疚疾逓加訊問為營醫療知其増損不幸物故及遭憂䘏隨事慰省以申情好務從篤實各存周厚朝廷無拘忌之節交逰有乆要之歡遵道而行率禮不越斯則上下交泰品物咸亨惠政所加逹於四表布告天下咸知朕意貞觀十六年六月己酉詔曰氏族之盛實繫於冠冕婚姻之道莫先於仁義自有魏失御齊氏云亡市朝既遷風俗陵替燕趙右姓多失衣冠之緒齊韓舊族或乖徳義之風名雖著於州閭身未免於貧賤自號膏梁之胄不敦匹敵之儀問名雖在於竊貲結䄜必歸於富室乃有新官之輩豐財之家慕其祖宗競乎婚媾多納財貨有如販鬻或貶其家門受屈於姻婭或矜其舊望無禮於舅姑積習成俗迄今未己既紊人倫實虧名教朕夙夜兢惕憂勤政道徃代蠧害咸已懲革唯此弊風未能盡變自今已後明加告示使識嫁娶之序務合典禮稱朕意焉七月庚申制曰自此已後自刑害人據法加罪仍從賦役初自隋季政亂徴役繁多人不聊生或自折支體以避征戍無賴之輩尚習俗未除故立此制十月庚申詔曰盗賊之作為害實深州縣官人多求虗譽苟有盗發不欲陳告鄉村長正知其此情逓相勸止十不言一假有披論先劾物主爰及隣伍乆嬰縲絏有一於斯甚虧政化自今已後勿使更然所司明加深察隨事紏繩十七年三月壬子詔曰朕聞死者終也欲物之反於眞也𦵏者藏也欲人之不得見也上古垂風未聞於封樹後聖貽範始備於棺椁譏僭侈者非愛其厚費美儉薄者實貴於無危是以唐堯聖帝也榖林有通樹之說秦穆明君也橐泉無丘隴之處仲尼孝子也防墓不墳延陵慈父也贏博可隱洎乎闔廬違禮珠玉為鳬鴈始皇無度水銀為江海因多藏以速禍繇有利以招辱朕居四海之尊承百王之弊未明求衣中宵載惕雖送徃之典詳諸儀制失禮之敬著在刑書而勲戚之家多流遁於習俗閭閻之内或侈靡而傷風以厚𦵏為奉終以髙墳為孝行遂使衣衾棺椁極雕刻之華靈輀明器窮金玉之餙富者越法度以相髙貧者破資産而不逮徒傷教義無益泉壤為害既深宜有懲革其王公以下爰及黎庶送終之具有乖令式者明加撿察隨狀科罪在京五品以上及勲戚之家録狀聞奏十九年六月丁未車駕發自遼東丙辰次於安市城列營進兵以攻之詔曰自莫離支為主官以賄成單貧之家困於稅斂一馬疋布隻菟纎鱗或進域主或輸耨䔖其有自給類加箠楚編戸饑寒莫知告訴至斯責罰即用夷刑反接鞭笞下手無數瘡深快意然後乃已所以陳兵伐罪兼暢皇風使懷附之徒同霑聲教息彼貪殘除其弊俗今遼東之野各置州縣或有舊法餘風未殄宜即禁㫁令遵國憲髙宗顯慶元年正月丙辰御安福門樓觀大酺蕃人欲持刀自刺以為幻戲帝不許之乃下詔曰如聞在外有婆羅門胡等每於戲處乃將劍刺肚以刀割舌幻惑百姓極非道理宜竝發遣還蕃勿令乆住仍約束邊州若更有此色竝不須遣入朝二年夏四月丙子詔曰朕撫育黎庶思求政道欲儉以訓俗禮以移風菲食卑宫庶㡬前軌比至五月五日及寒食等諸節日并有歡慶事諸王妃主及諸親等營造衣服雕鏤雞子競作竒巧以將進獻巧麗過度糜費極多皆繇不識朕心遂至於此又貞觀年中已有約束自今已去竝宜停㫁所司明加禁察隨事紏正龍朔元年五月庚申禁婦人雜戲二年夏四月甲戌詔曰如聞父母初亡臨喪嫁娶積習日久遂以為常亦有送𦵏之時共為燕飲逓相酬勸酣醉而歸或寒食上墓復為歡樂坐對松檟曽無戚容既玷風猷竝宜禁㫁仍令州縣捉搦勿使更然麟徳二年三月丙午禁不因大禮輙獻食者帝因謂侍臣曰吾聞隋煬帝廵逰無度志在華侈不憂人力供頓之外獻食者多州縣官人更相誇尚所進之餘埋之於地此事虛費煬帝亦頗知乎許敬宗奏曰隋時李安期家有一孔雀卯遂貴買以充獻食自此競覔珍竒無所愛惜咸亨二年九月丁酉詔曰百官家口咸預士流至於衢路之間豈可全無障蔽比來多著帷㡌遂棄羃䍦曾不乘車别坐檐子逓相傚倣浸成風俗過為輕率深失禮容前者已令漸改如聞猶未止息又命婦朝謁或將馳馬車乘既入禁門有虧肅敬此竝乖於儀式理須禁斷自今已後勿使更然永隆二年正月丁亥帝以頻年饑饉百姓匱乏召雍州長使李義琛及萬年等四縣令謂曰朕每念還淳返樸示天下以質素必欲化行於上事成於下如聞㳺手惰業此類極多時稍不熟便致饑饉須加勸勵使免困乏異色綾錦并䜿間裙衣等靡費既廣俱害女工天后我之匹敵嘗著七破間裙豈不知更有靡麗服飾務遵節儉耳紫服赤衣以辨貴賤遂有閭閻僮僕公然服用又庶人之徒商賈雜類競為厚𦵏違越禮度但雍州列郡之首四方取則卿等即嚴加捉搦勿使然也中宗神龍元年九月壬午制曰在外百官婚娶之家百兩未行二親俄殞停哀之際更即成婚遂輟苴絰之容敢申牢卺之禮寧戚之心安寄罔極之志闕如敗俗傷風莫過於此自今已後宜即懲革睿宗景雲元年八月罷斜封官先是中宗時官爵踰濫因依妃主墨敕而授官者時謂之斜封至是竝令罷免𤣥宗開元元年十二月己亥禁乞寒之戲以殊中國之儀也二年正月丙寅紫㣲令姚崇上言請檢責天下僧尼以偽濫還俗二萬餘人四月丁酉詔曰朕聞鵞鴨坊比供米粟恨不早知乆令虗費今百姓饑阻未能周給鳥享人食是何理焉其料宜即停并鷄坊亦准此七月戊申制曰如聞百官家多以僧尼道士等為門徒徃還妻子等無所避忌或詭託禪觀妄陳禍福事渉左道深斁大猷自今已後百官家不得輙容僧尼道士等至家縁吉㐫要須設齋皆於州縣陳牒寺觀然後依數聽去仍令御史金吾明加捉搦壬子詔曰佛教者在於清淨存乎利益今兩京城内寺宇相望凡欲歸依足申禮敬下人淺近不悟精㣲覩菜希金逐燄思水浸以流蕩頗成蠧弊如聞坊巷之内開舖寫經公然鑄佛口食酒肉手漫羶􅧍尊敬之道既虧慢狎之心斯起百姓等或縁求福因致饑寒言念愚䝉深用嗟悼殊不知佛非在外法本居心近取諸身道則不逺溺於積習實藉申明自今已後林坊市等不得輙更鑄佛寫經為業須瞻仰尊容者任就寺禮拜須經典讀誦者勒於寺贖取如經本少僧為寫供諸州寺觀竝准此八月壬戌詔曰朕聞樂者起於心心者動於物物不正則不可為樂樂不正則不能理人况天生黎蒸區别男女外則導之以禮中則申之以樂苟或不臧孰云致理自有隋頽靡庶政雕缺徴聲違於鄭衛衒色矜於燕趙廣塲角抵長袖從風聚而觀之浸以為俗所以戎王奪志夫子遂行朕方大變澆訛用清淄蠧眷兹女樂事切驕淫傷風害政莫斯為甚既為令式尤宜禁㫁自今已後不得更然仍令御史金吾嚴切捉搦如有犯者先罪長官務令杜絶以稱朕意九月甲寅詔曰自古帝王皆以厚𦵏為戒以其無益亡者有損於生業故也近代以來共行奢靡逓相倣傚浸成風俗既竭家産多至彫弊然則魂魄歸天明精識之已逺卜宅於地蓋思慕之所存古者不封未為非逹且墓為眞宅自有便房今乃别造田園名為下帳又明器等物比競驕侈失禮違令殊非所宜戮屍暴骸實繇於此承前雖有約束所司曾未申明喪𦵏之家無所依准宜令所司據品命髙下明為節制明器等物仍定色數長短大小園宅衣帳竝宜禁絶墳墓塋域務遵簡儉凡諸送終之其竝不得以金銀為餙如有違犯者先决杖一百州縣長官不能舉察竝貶逺官三年二月丙辰制曰帝王之政必厚風俗男女不别深蠧禮經至如别宅婦人乆未悛革近今撿括配入掖庭將示小懲使及知禁朕愍其愚惑尚在含𢎞思屈常憲許其遷善特放出令府縣即配嫁不得影認更為藏匿畜别宅人容其自新竝宜放免自今已後更有犯者竝准法科㫁五品以上仍貶授逺惡處官婦人配入掖庭縱是媵妾亦不得别處安置即為常式十一月乙未詔釋氏及引本歸正法仁王䕶持先去邪道失其宗㫖乃般若之罪人成其詭恠豈湼槃之信士不存懲革遂廢津梁養彼愚蒙將入坑穽比者白衣青髪假託彌勒下生因為妖訛廣集徒侣稱解禪觀妄說災祥别作小經詐云佛說或輙云弟子號為和尚多不婚娶眩惑閭閻觸類寔繁蠧政為甚刺史縣令職在親人拙於撫馭是容姦宄自今已後宜嚴加捉搦仍令按察司採訪如州縣不能舉察所繇長官竝從貶降六年七月丙寅詔曰兩京來去乃是尋常縁頓所須皆用官物至於百姓縱暫祗承處置有條不合辛苦其中侵擾莫非横干或漁獵畜飬以將進獻觸途使役以徇聲名實由綱紀未樹教令不明去年從京向都嘗亦處分蒲州刺史程行諶同州刺史李朝隱陜州刺史姜師度至其州界咸有進奉惜其能官善政故乃屈法攸情懷之於今豈能無恠冬中西幸不可踵前其有輙進送及餉遺從官并别有煩擾者必科以法御史仍明加紏察隨事奏聞九年三月庚午濮州聖佛寺僧多摩持畫誑惑百姓大聚財物勒其僧還俗納其財四月壬寅詔曰内典幽㣲惟宗一相大乘妙理寧啟二門聞化度寺及福先寺三陛僧創無盡藏每年正月四日天下士女施錢名為䕶法稱濟貧弱多肆姦欺事非眞正即宜禁㫁其藏錢付御史臺京兆河南府勾㑹知數明為文簿待後處分六月丁亥詔化度寺無盡藏財物田宅六畜竝宜散施京城觀寺先用修理破壞尊像堂殿橋梁有餘入常住不得分與私房從貧觀寺給仍令御史張樽與禮部侍郎崔據京兆尹孟温禮取元奏數揀京城大徳戒行灼然者共檢校量事均融處置訖奏聞諸州長官及按察司所察獲錢物以委州使准此共勾當散配處分訖申所司十年二月庚寅詔曰釋道二門施其戒律緇黄法服衆亦崇尚苟有踰濫是無憲章如聞道士僧尼多有虗挂名籍或權隸他寺或侍飬私門託以為詞避其所管互相掩匿共成姦詐甚非清淨之意也自今已後更不得於州縣權隸侍飬師主父母此色者竝宜括還本寺觀八月庚戌詔曰如聞百官及庶人家殯𦵏頗違古則無復哀戚逓相誇尚富者踰於禮法貧者殫其資産無益於死徒損於生傷風敗化斯斁尤甚自今已後送終之儀一依令式至墳墓所仍不得聚飲肉食宜令所由嚴加禁㫁更有違者科違勑罪十四年四月壬戌詔曰如聞道俗之間妄有占筮誑惑士庶假託災祥兼託符呪遂行左道先令禁㫁不合更然仍慮愚下未能悛改宜令所司申明格勑嚴加訪察七月丁卯勑雕文刻鏤傷農事錦繡纂組害女工粟帛之本或虧饑寒之患斯及朕故編諸格令具列刑章冀以還淳庶皆知禁如聞三公以下爰及百姓等罕聞節儉尚縱驕奢器玩猶擅珍華車服未損珠翠此非法之不著皆由吏之不舉也宜令所司申明格令禁㫁十六年二月癸未詔曰飬人施惠患在不均裒多益寡務資適中比來公私舉放取利頗深有損貧下事須釐革自今已後天下私舉質宜四分收利官本五分收利十七年三月己巳詔曰違様綾錦等頻有處分如聞尚未懲革宜令府縣申明前勑一切禁㫁所由長官不存捉搦量事貶降十九年四月癸未詔曰釋迦設教出自外方漢主中年漸於東土說兹因果廣樹筌蹄事渉虗𤣥𣺌同河漢故三皇作乂五帝乘時未聞方便之門自有雝熙之化朕念彼流俗深迷至理盡軀命以求縁竭資財而作福未來之勝因莫效見在之家業已空事等繫風猶無所悔愚人寡識屢䧟刑科近日僧徒此風尤甚因縁講說眩惑州閭谿壑無厭唯財是斂津梁自壞其教安施無益於人有蠧於俗或出入州縣假託威權或廵歴鄉村恣行教化因其聚㑹便有宿宵左道不常異端斯起自今已後僧尼除講律之外一切禁㫁六時禮懴須依律儀午後不行宜守俗制如犯者先㫁還俗仍依法科罪所在州縣不能捉搦并官吏輙與徃還各量事科貶六月己未詔曰夫釋氏之㫖義歸眞寂爰置僧徒以奉法教而趨末忘本摭華棄實假託權便之門以為利飬之府徒蠲賦役積有姦訛至於浮俗奔馳左道穿鑿言念靜域浸成逋藪非所以叶和至理𢎞振王猷宜有澄清以正風俗朕先知此弊故預塞其源不度人來尚二十餘載訪聞在外有三十已下小僧尼宜令所司及州府括責處分又曰惟彼釋道同歸凝寂各有寺觀自合住持或寓跡幽閒濳行閭里䧟於非辟有足傷嗟如聞逺就山林别為蘭若兼亦聚衆公然徃來或妄託生縁輙有俗家居止即宜一切禁㫁二十年四月丙申詔曰寒食上墓禮經無文近代相傳浸以成俗士庶有不合廟享何以用展孝思宜許上墓拜掃申禮於塋南門外奠祭撤饌訖泣辭食饌任於他處不得作樂仍編入五禮永為常式二十五年五月庚子詔曰道釋二教必在䕶持須置威儀令自整肅徒衆既廣統攝尤難互相是非却成煩弊自今已後京都檢校道僧威儀事竝停或恐先有猜嫌因此妄相紏告所由不煩為理二十六年春正月丁丑親迎氣於東郊畢制曰書不云乎不作無益害有益語不云乎奢則不遜儉則固緬懷前古嘗所在心將㫁彫以為樸斯上行而下效自今已後王公竝不得以珍物進獻所司應緣宫室修造務從節儉但蔽風雨勿為華飾至如金玉器物諸色雕鏤朕縁蕃客所要將充宴賞今流俗之間逓相倣傚既損財於無益仍作巧以相矜敗俗傷農莫斯為甚竝一切禁㫁以絶浮華二十七年夏四月癸酉詔曰古之聖王先禁左道為其蠧政犯必加刑至如占相吉㓙妄談休咎假託卜筮幻惑閭閻矜彼愚蒙多受欺誑宜申明法令使有懲革自今已後縁婚禮喪𦵏卜擇者聽自餘一切禁㫁二十八年秋七月庚子詔曰頃縁諸州寺觀僧道闕人所以精選行業用塡其數如聞因此之際私度者多接脚冒名觸類非一遂使是非齊列眞偽難分若不澄其源流何以革兹頽弊天下諸州寺觀有此色者聽勑到陳首免罪還俗二十九年正月丁酉詔曰古之送終所尚乎儉比來習俗漸至於奢苟炫燿於衢路復何益於泉壤又凡庶之中情理多闕每因送𦵏或酣飲而歸及寒食上墓之時亦便為宴樂在於風俗豈成禮教自今已後其縁𦵏事有不依禮法者委所由州縣并左右街使嚴加捉搦一切禁斷其有犯者官人殿黜白身人所在决一頓凡是庶人不兼二業或有衣冠之内寡於亷隅專以貨殖為心商賈為利須革其弊以清品流有犯者委京都御史臺及諸道採訪使具以狀聞當則處分宣布中外咸使知聞六月丙辰詔曰先置陸驛以通使命苟無闕事雅適其宜如聞河南江淮兼有水驛損人之費馬甚覺勞也且使臣受命速赴程期豈有自求閒安故為勞擾其應置水驛宜竝停是歲京兆府奏兩京之間多有百姓僦驢俗謂之驛驢徃來甚速有同驛騎犯罪之人因兹奔竄臣請禁絶從之尋又不行天寳元年三月甲寅詔曰移風易俗王化之大猷掩酪埋胔時令之通典如聞江左百姓之間或家遭疾疫因而致死皆棄之中野無復安𦵏情禮都闕一至於斯習以為常乃成其弊自今已後宜委郡縣長吏嚴加誡約俾其知禁勿使更然其先未𦵏者即勒本家收𦵏如或無親族及行客身亡者仰所在村隣相共埋瘞無使暴露庶叶禮經諸道有此同者亦宜准此九載十月戊辰詔曰南北衛百官等如聞昭應縣兩市及近塲處廣造店舖出賃與人干利商賈莫甚於此自今已後其所賃店舖每間月估不得過五百文其清資官准法不可置者容其出賣如有違犯具名録奏肅宗乾元二年三月丁亥詔曰比者不急之務尋已詔停如聞所司未全省减載求人瘼實切朕懷固當革弊息人勵精為理自今已後内外不得輙别徴求妄為進奉諸色力役造作非軍國灼然要急及諸色率稅亦一切竝停太常音聲除禮用雅樂外并教坊音聲人等竝仰所司疏理使敦生業非祠祭大祀及宴蕃客更不得輙有追呼其内依將作少監及諸供司丁匠等各仰長官逐要量留餘者竝委御史臺專加紏察如有違犯具録奏彈宜示中外令知朕意册府元龜卷一百五十九
