body:
  text: 册府元龜卷七百六十六宋王欽若等撰總録部攀附第二後周赫連達初姓杜字朔周魏末從清水公賀㧞岳征討有功及岳為侯莫陳悦所害軍中大擾趙貴建議迎太祖諸將猶豫未决達曰宇文夏州昔為左丞明略過人一時之傑今日之事非此公不濟趙將軍議是也達請輕騎告哀仍迎之諸將或欲南追賀㧞勝或云東告朝廷達又曰此皆逺水不救近火何足道哉貴於是謀遂定令達馳往太祖見達慟哭問故達以實對太祖遂以數百騎南赴平凉引軍向髙平及悦平加平東將軍冦雒初從賀㧞岳西征万俟醜奴為右都督後侯莫陳悦既害岳欲并其衆時初䘮元帥軍中惶擾雒於諸將之中最為舊齒素為衆所信乃收集將士志在復讎共相糾合遂全衆而返既至原州衆咸推雒為盟主統岳之衆雒與趙貴等議迎太祖後至侍中趙善初仕魏為行臺賀㧞岳長史岳為侯莫陳悦所害善共諸將翊戴太祖乃從平悦吕思禮為行臺賀㧞岳所重岳為侯莫陳悦所害趙貴等議遣赫連達迎太祖思禮預其謀及太祖為闗西大都督以思禮為府長史梁禦為鎭西將軍從賀㧞岳鎭長安及岳被害禦與諸將同謀翊戴太祖若干惠為中堅將軍從賀㧞岳西征万俟醜奴及岳為侯莫陳悦所害惠與諸將翊戴太祖乃從平悦後至司空梁臺為假節衛將軍賀㧞岳引為心膂岳為侯莫陳悦所害臺與諸將議翊戴太祖從討悦破之後至鄜州刺史庫狄昌初從賀㧞岳西征及岳為侯莫陳悦所害昌與諸將議翊太祖從平侯莫陳悦後為東夏州刺史王德字天恩從賀㧞岳平隴右為龍驤將軍岳為侯莫陳悦所害德與諸將定議迎太祖從平悦後至涇州刺史裴果字戎昭仕魏太昌中為陽平郡丞太祖曽使并州與果遇果知非常人宻託附焉後為眉復州刺史申徽初仕東魏為大尉府行叅軍孝武初徽以雒陽兵難未已遂間行入闗見太祖與語竒之薦之於賀㧞岳岳亦雅相敬待引為賓客太祖臨夏州以徽為記室叅軍兼府主簿文帝察徽沉宻有度量每事信委之乃為大行臺郎中王羆初為後魏車騎大將軍涇州刺史未及之部屬太祖徵兵為勤王之舉請前驅効命遂為大都督鎭華州田𢎞初從爾朱天光為都督及太祖統衆宏求謁見乃論世事深被引納即處以爪牙之任太祖嘗以所著鐵甲賜𢎞云天下若定還將此甲示孤也後為少保襄州刺史梁昕字元明安定烏氏人少溫恭見稱州里太祖之迎孝武軍次雍州昕以三輔望族上謁太祖見昕容貌瓌偉深賞異之即授右府長流叅軍周惠達自太祖在魏時即用為秦州司馬安輯隴右及太祖為大都督總管兵起雍復以惠達為府司馬便委任焉魏孝武詔太祖尚馮翊長公主以惠達為長史赴雒陽奉迎至潼闗遇孝武已西即令惠達先見太祖謂惠達曰昔周之東遷晋鄭是依今乗輿播越降臨闗右吾雖猥當其任而才愧昔人卿宜勠力共成功業以取富貴也對曰惠達宦遊有年屬明公一匡之運富貴之事非所敢望但願明公威德加於天下惠達得效其尺寸則志願畢矣王思政自太祖為魏丞相中軍大將軍思政雖被任委自以非相府之舊每不自安太祖曽在同州與羣公宴集出錦罽及雜綾絹數段命諸將摴蒱取之物既盡太祖又觧所服金帶令諸人遍擲曰先得盧者即與之羣公將遍莫有得者次至思政乃斂容跪坐而自誓曰王思政覊旅歸朝蒙宰相國士之遇方願盡心效命上報知已若此誠有實令宰相賜知者願擲即為盧若内懐不盡神靈亦當明之使不作也便當殺身以謝所奉辭氣慷慨一坐盡驚即㧞所佩刀横於膝上攬摴蒱拊髀擲之比太祖止之已擲為盧矣徐乃拜而受帶自此之後太祖寄賞更深轉驃騎將軍栁虬初為獨孤信開府從事中郎信出鎭隴右因為秦州刺史以虬為二府司馬雖處元僚不綜府事唯在信左右談論而已因使見太祖被留為相府記室追論歸朝功封美陽縣男邑二百户隋崔仲方年十五與後周太祖諸子同就學時髙祖亦在其中由是與髙祖少相欵宻後以明經累遷為少内史奉使淮南而還髙祖為丞相與仲方相見握手極懽仲方亦歸心焉其夜上便宜十八事髙祖竝嘉納之又見衆望有歸隂勸髙祖應天受命髙祖從之後至太常卿信都太守龎晃仕周為衛王直侍時髙祖出為隨州刺史路經襄陽衛王令晃詣髙祖晃知髙祖非常人深自結納及髙祖去官歸京師晃迎見髙祖於襄邑髙祖甚懽晃因白髙祖曰公相貌非常名在圖籙九五之日希願不忘髙祖笑曰何妄言也頃之有一雄雉鳴於庭髙祖命晃射之曰中則有賞然富貴之日持以為驗晃既射而中髙祖撫掌大笑曰此是天意公能感之而中也因以二婢賜之情契甚宻晃為常山太守髙祖為定州總管屢相往來俄而髙祖轉亳州總管將行意甚不悦晃隂白髙祖曰燕代精兵之處今若動衆天下不足圖也髙祖握晃手曰時未可也及髙祖為揚州總管奏晃同行既而髙祖為丞相進晃位開府命督左右甚見親待尉遲崇仕周為儀同大將軍以兵鎭常山時髙祖為定州總管崇知髙祖相貌非常毎自結納髙祖甚親待之及為丞相尉遲逈作亂崇以宗族之故自囚於獄遣使請罪髙祖下書慰諭之即令馳驛入朝常置左右盧賁仕周為司武上士時髙祖為大司武賁知髙祖非常人深自推結宣帝嗣位加開府及髙祖初被顧托羣情未一乃引賁置於左右髙祖將之東第百官皆不知所去髙祖濳令賁部伍仗衛因召公卿而謂曰欲求富貴者當相隨來往往偶語欲有去就賁嚴兵而至衆莫敢動出崇陽門至東宫門者拒不内賁諭之不去瞋目叱之門者遂却既而髙祖得入賁常典宿衛後至懐州刺史郎茂仕周為陳州户曹屬髙祖為亳州總管見而悦之命掌書記時周武帝為象經髙祖從容謂茂曰人主之所為也感天地動鬼神而象經多糾法將何以致茂竊歎曰此言豈常人所及也乃隂自結納髙祖亦親禮之後還家為州主簿髙祖為丞相以書召之言及疇昔甚歡後至尚書左丞晉陽宫留守李諤自北齊歸周為天官都上士諤見髙祖有竒表深自結納及髙祖為丞相甚見親待後至治書侍御史出為通州刺史郭榮仕周為司水大夫少與髙祖相親狎情契極歡嘗與髙祖夜坐月下因從容謂榮曰吾仰觀𤣥象俯察人事周厯已盡我其代之榮深自結納未幾髙祖總百揆召榮撫其背而笑曰吾言驗矣即拜相府樂曹叅軍後至左光禄大夫栁裘仕周為御節大夫宣帝不豫留侍禁中與劉昉韋謩皇甫績同謀引髙祖入總萬機髙祖固讓不許裘進曰時不可再機不可失今事已終宜早定計天與不取反受其咎如更遷延恐貽後悔髙祖從之進位上開府拜内史大夫委以機宻竇榮定仕周為佽飛中大夫其妻則髙祖姊安城長公主也髙祖少小與之情契甚厚榮定亦知髙祖有人君之表尤相推結及髙祖作相領左右宫伯使鎭守天臺總統露門内兩廂仗衛嘗宿禁中後拜右武衛大將軍李禮成仕周為民部中大夫妻竇氏早没知髙祖有非常之表遂聘髙祖妺為繼室情契甚歡及髙祖為丞相進位上大將軍遷司武上大夫委以心膂陳荗河東猗氏人髙祖為隋國公引為寮佐遇待與李圓通等每令典家事未嘗不稱㫖髙祖善之後遷上士委以心膂及受禪拜給事黄門侍郎長孫平仕周為小司寇髙祖龍濳時與平情好欵洽及為丞相恩禮彌厚後至太常卿判吏部尚書事李德林仕周為御正下大夫髙祖初授顧命令邢國公楊惠謂德林曰朝廷賜令總文武事經國任重非羣才輔佐無以克成大業今欲與公共事必不得辭德林聞之甚喜乃答云德林雖庸懦㣲誠亦有所在若曲相提㩦必望以死奉公髙祖大悦即召與語劉昉鄭譯初矯詔召髙祖受顧命輔少主總知内外兵事諸衛既奉勑竝受髙祖節度鄭譯劉昉議欲授髙祖冡宰鄭譯自攝大司馬劉昉又求小冡宰髙祖私問德林曰欲何以見處德林曰即宜作大丞相假黄鉞都督内外諸軍事不爾無壓衆心及發䘮便即依此以譯為相府長史内史上大夫昉但為相府司馬譯昉由是不平以德林為丞相府屬加儀同大將軍未幾而三方搆亂指授兵略皆與之叅詳後為内史令張煚仕周為儀同髙祖為丞相煚深自推結髙祖以其有幹用甚親遇之及受禪拜尚書左丞趙芬仕周為東京小宗伯鎭雒陽髙祖為丞相尉遲逈與司馬消難隂謀往來芬察知之密白髙祖由是深見親委遷東京左僕射庾季才仕周為開府儀同三司及髙祖為丞相嘗夜召季才而問曰吾以庸虚受兹顧命天時人事卿以為何如季才曰天道精㣲難可意察竊以人事卜之符兆已定季才縱言不可公豈復得為箕潁之事乎髙祖黙然乆之因舉首曰吾今譬猶騎虎誠不得下也因賜雜綵五十疋絹二百段曰愧公此意宜善為思之後至通直散騎常侍均州刺史于翼仕周為幽州總管髙祖為丞相尉遲逈作亂遣人誘翼翼鏁其使送之長安髙祖甚悦及髙祖受禪翼入朝帝為之降榻握手極歡數日拜為大尉李訽仕周為司衛大將軍髙祖為丞相尉遲逈作亂遣韋孝寛擊之以詢為元帥長史委以心膂軍至永橋諸將不一詢密啟髙祖請重臣監䕶髙祖遂令髙熲監軍與熲同心協力唯詢而已及平尉遲逈進位上柱國改封隴西郡公賜帛千疋段文振仕周為天官都上士從韋孝寛經略淮南俄而尉遲逈作亂時文振老母妻子俱在鄴城逈遣人誘之文振不顧歸於髙祖髙祖引為丞相掾領宿衛驃騎宇文慶仕周為寧州總管髙祖為丞相復以行軍總管南征江表師次白帝徵還以勞進位上大將軍髙祖與慶有舊甚見親待令督丞相軍事委以心腹尋加柱國開皇初拜左武衛將軍進位上柱國數年出除涼州總管歳餘徵還不任以職初帝龍濳時嘗從容與慶言及天下事帝謂慶曰天元實無積德臣欽若等曰天元後周宣帝尊號視其相貌夀亦不長加以法令繁苛耽恣聲色以吾觀之殆將不乆又復諸侯㣲弱各令就國曽無深根固夲之計羽翮既翦何能及逺哉尉遲逈貴戚早著聲望國家有釁必為亂階然智量庸淺子弟輕佻貪而少惠終致亡滅司馬消難反覆之虜亦非池内之物變在俄頃但輕薄無謀未能為害不過自竄江南耳庸蜀險隘易生難阻王謙愚惷素無籌略但恐為人所誤不足為虞未幾上言皆騐及此慶恐帝遺忘不復收用欲見舊恩顧具録前言為表而奏之曰臣聞知侔造化二儀無以隐其靈明同日月萬象不能藏其狀先天弗違實聖人之體道未萌見兆諒達節之神祗伏惟陛下特挺生知狥齊誕御懐五岳而猶輕吞八荒而不梗蘊妙見於胸襟運竒謨於掌握臣以㣲賤早逢天睠不以庸下親蒙推赤所奉成規纎亳弗舛尋惟聖慮妙出蓍龜騐一人之慶有徵實天子之言無戯臣親聞親見實榮實喜帝省表大悦下詔曰朕之與公夲來親密懐抱委曲無所不盡話言歲乆尚能記憶今覧表奏方悟昔談何謂此言遂成實録古人之先知禍福明可信也朕言之驗自是偶然公乃不忘彌表誠節深感至意嘉尚無已自是帝每加優禮楊素仕周為車騎大將軍及髙祖為丞相素深自結納髙祖甚器之以素為汴州刺史元景山仕周為亳州總管髙祖為丞相尉遲逈稱兵作亂榮州刺史宇文胄與逈通謀隂以書諷景山景山執其使封書詣相府髙祖甚嘉之進位上大將軍李穆仕周為大佐輔總管髙祖作相尉遲逈之亂也遣使招穆穆鎻其使上其書穆子士榮以穆所居天下精兵處隂勸穆反穆深拒之乃奉十三環金𢃄於髙祖盖天子之服也李渾穆第十子仕周為左侍上士尉遲逈反於鄴時穆在并州髙祖慮其為逈所誘遣渾乗驛往布腹心穆遽令渾入京奉熨斗於髙祖曰願執威柄以尉安天下也髙祖大悦又遣渾詣韋孝寛所而述穆意焉栁昻仕周為大内史致位開府髙祖為丞相深自結納髙祖大悦之以為大宗伯昻受拜之日遂得偏風不能視事髙祖受禪昻疾愈加上開府拜潞州刺史李安字𤣥德髙祖作相引之左右遷職方中大夫復拜安弟烲為儀同安叔父梁州刺史璋時在京師與周趙王謀害髙祖誘烲為内應烲謂安曰寢之則不忠言之則不義失忠與義何以立身安曰丞相父也其可背乎遂隂白之及趙王等伏誅將加官賞安頓首而言曰兄弟無汗馬之勞過蒙奬擢合門竭節無以酬謝不意叔父無狀為兇黨之所熒惑覆宗絶嗣其甘若薺蒙全首領為幸實多豈可將叔父之命以求官賞於是俯伏流涕悲不自勝髙祖為之改容曰我為汝特存璋子乃命有司罪止璋身髙祖亦為安隐其事而不言尋授安開府唐崔善為隋仁夀中為樓煩郡司戸書佐髙祖時為太守甚禮遇之善為以政傾頺乃密勸進髙祖深納之武士彠并州文水人家富於財頗好交結髙祖初行軍於汾晉休止其家因蒙顧接後為晉陽宫畱守府司鎧叅軍事既而隋政日亂盜賊蜂起士彠每歎息以夷難為心而恨未遇眞主及髙祖為太原留守甚見接待數訪以時事士彠嘗詰朝於街内獨行聞空中有言曰唐公是天子士彠尋聲不見有人仍以此言白髙祖并進兵書髙祖悦之曰勿多言兵書禁物尚能將來深識好心當同富貴耳其夜士彠夢髙祖乗馬上天旦以狀聞髙祖大悦於是入卧内委以心腹後至荆州都督任瓌仕隋仁夀中為韓城尉髙祖討捕於汾晉瓌謁髙祖於轅門承制為河東縣户曹髙祖將之晉陽留隐太子建成以託於瓌義師起瓌至龍門謁見髙祖謂之曰隋氏失馭天下沸騰吾忝以外戚屬當重寄不可坐觀時變晉陽是用武之地士馬精强今率驍雄以匡國難卿將家子深有智謀觀吾此舉將為濟否瓌曰後主殘酷無道征役不息天下恟恟思聞拯亂天縱神武親舉義師所下城邑秋毫無犯軍令嚴明將士用命闗中所在蜂起唯待義兵仗大順從衆欲何憂不濟環在馮翊積年人情諳練願為一介之使銜命入闗同州已東必當欵伏於梁山舩濟直指韓城進逼郃陽分取朝邑且蕭造文吏夲無武略仰懼威靈理當自下孫華諸賊未有適從必當相率而至然後鼔行整衆入據永豐雖未得京城闗中故已定矣髙祖曰是吾心也乃授銀青光禄大夫遣陳演夀史大柰領歩騎六千趨梁山渡河使瓌及薛獻為招慰大使髙祖謂演夀曰閫外之事宜與任瓌籌之孫華白𤣥度等聞兵且至果競來降并具舟于河師遂利渉環説下韓城縣與諸將進擊飲馬泉破之拜左光禄大夫留守永豐倉宇文士及仕隋為尚輦奉御時髙祖為殿内少監士及深自結託及隨兄化及至黎陽髙祖手詔召之士及亦濳遣家僮間道詣長安申赤心又因使密貢金環髙祖大悦謂侍臣曰我與士及素經共事今貢金環是其來意也化及至魏縣兵威日蹙士及勸之西歸長安化及不從士及乃與封倫求於濟北徵督軍糧俄而化及為竇建德所擒濟北豪右多勸士及發青齊之衆北擊建德收河北之地以觀形勢士及不納遂與封倫等來降髙祖數之曰汝兄弟率思歸之卒為入闗之計當此之時若得我父子豈肯相存今欲何地自處士及謝曰臣之罪誠不容誅但臣早奉龍顔乆存心腹往在涿郡嘗夜中密論時事後於汾隂宫復進丹赤自陛下龍飛九五臣實乃心西歸所以密申貢獻冀此贖罪耳髙祖笑謂裴寂曰此人與我言天下事至今已六七年矣公輩皆在其後時士及妹為昭儀有寵由是漸見親待授上儀同唐儉父鑒與髙祖有舊同領禁衛髙祖於太原留守儉與太宗周密從容進説以隋室昏亂天下可圖太宗以白髙祖乃詔入密訪時事對曰明公日角龍庭李氏又在圖牒天下屬望非是一朝若開府庫南嘯豪傑北招戎狄東收燕趙長驅濟河據有秦雍海内之權指麾可取願引達節以順羣望則湯武之業於公不遠負鼎投竿亦先㣲願髙祖曰湯武之事非所庻幾今天下已亂言私則圖存語公則拯溺抑宜自愛吾將思之後拜大將軍府檢較記室叅軍劉義節太原人髙祖之作鎭也甚接以恩意又出入王威髙君雅之門然獨歸心於髙祖義兵將起威與君雅内懷疑貳義節輙探得其計以白髙祖及誅威等頗用其力劉文静隋末為晉陽令時髙祖鎭太原文静初觀太宗謂裴寂曰非常人也大度類於漢髙神武同於魏帝其年雖少乃天縱也寂未然之於後文静為李密親戚被煬帝勑禁太宗隂有異心以文静可與語遂入禁所看之文静大喜而感賀亦覺太宗有非常之意因歎曰天下大亂非有湯武高光之才不能定也太宗知其意濳相感動報之曰卿安知無但恐常人不别耳文静起而謝曰乆知郎君乃龍濳也今既時事如此正是騰躍之秋素禀膺籙之資仍懷撥亂之道此乃生人有息肩之望文静知攀附之所矣太宗曰今入禁所相看非兒女之情相憂而已時事如此知君若可與言故來與君圖舉大計君能如此深副僕懷卿志識大佳宜籌其事文静對曰今李密長圍雒邑主上流播淮南大賊連州郡小盗阻山澤者以千萬數矣但須真主驅駕取之誠能應天順人舉旗大呼則四海不足定也今并州百姓避盜賊者入此城文静為令數年知其豪傑一朝嘯集立地可數萬人尊公所領之兵復且數萬一言出口誰敢不從乗虚入闗號令天下不盈半歲帝業可成帝笑曰卿言善合人意於是部署賓客隂圖起義計議既定候機當發欲白髙祖慮必不從欲竊發之又恐驚於髙祖於是訃無所决沉吟者乆之既見髙祖厚於裴寂欲因寂開説於是引寂交於太宗得通議謀及髙祖被拘太宗又遣文静共寂進説曰易稱知幾其神乎今大亂已作公處嫌疑之地當不賞之功何以圖全晉陽之土士馬精鋭宫監之中府庫盈積以兹舉事可立大功闗中天府代王沖幼權豪並起未有適從願公興兵西入以圖大事何乃拘於一介之使乎髙祖然之太宗濳結死士與文静等協議尅日舉兵㑹髙祖得釋而止乃命文靜詐為煬帝勅發太原西河雁門馬邑數郡人二十以上五十以下悉為兵以歲暮集涿郡將伐遼東由是人情大擾思亂者益衆文静與裴寂偽作符􅎁出宫監庫物以供留守資用募兵集衆及義兵起以文静為司馬勸改旗幟以章義舉後至兵部尚書唐憲仕隋東宫左勲衛太子廢歸太原髙祖之鎭太原也頗蒙親遇因與弟儉預義謀及大將軍府建拜正議大夫引置左右為恩信從平宋老生破京城時隐太子為左鎭大都督以憲為長史累遷光禄大夫封安富縣公武德初拜為太子右虞侯卒于百億仕隋為左翊衛髙祖義旗之舉仗劔歸順授朝請大夫盧赤松隋末為河東令與髙祖有舊聞義師至霍棄縣迎接拜行臺兵部郎中厯位率更令封范陽郡公盧士叡髙祖與之有舊及義兵起士叡率數百人謁髙祖於汾隂令其兄子師洽諭賊帥孫華應時歸附又與劉宏基敗隋將桑顯和於飲馬泉累加右光禄大夫竇抗與髙祖少相親狎楊𤣥感之反也髙祖統兵隴右言於髙祖曰𤣥感抑為發蹤耳李氏當膺圖録可見機而作也髙祖不許隋末令於靈武巡長城伺盗及聞髙祖定京師抗對衆而忭曰此吾家妹壻也豁達有大度眞撥亂之主也因歸長安後至左武威大將軍田德平太原晉陽人隋末補鷹揚府正髙祖留守太原引為兵大蒙任寄義師起拜銀青光禄大夫厯大將軍兵曹叅軍封漁陽縣公蘭謨仕隋為膺揚郎將留守臨汾髙祖義旗建帥所部來降授銀青光禄大夫姜確字行夲父謩從起太原官至秦隴二州刺史確自髙祖義旗初舉以典籖從後厯通事舎人尚書水部二曹郎中封通川縣男溫大雅仕隋為長安縣尉以父憂去職後以天下方亂不求仕進及義兵起髙祖引為記室叅軍專掌文翰禪代之際與竇威參定朝儀後至禮部尚書栢季纂隋末為祁縣長有能名及義兵起厯大將軍府騎曹叅軍從平京城累以軍功位至上柱國段綸仕隋為左親衞隐太子見而悦之妻以琅琊長公主舎髙祖之舊第數聞鼓吹之音視之無所覩綸謂主曰聞圖䜟李氏當王今於第内有此禎祥必而家應籙之徵也及義兵西邁綸於藍田聚結兵馬得萬餘人迎接大軍拜金紫光禄大夫領親信左右從平京城封龍岡郡公黨仁𢎞仕隋為武勇郎將髙祖起義軍次蒲坂仁𢎞招率鄉曲得二千餘兵迎謁拜銀青光禄大夫長孫敞隋末為左衞郎將義旗入闗敞率子弟以新豐縣來迎髙祖大悦授銀青光禄大夫尋加上柱國喬軌隋末為右武侍及義師渡河軌乃迎謁授通議大夫從平京城頻以戰功累加上柱國秦王府車騎將軍顔師古仕隋為襄州安養尉坐事免歸長安家貧以教授自業及髙祖義兵入闗師古於長春宫上謁授朝請大夫從平京城補秦府文學後至秘書監𢎞文館學士崔幹略隋末為醴泉縣令髙祖義兵入闗以縣來降授丞相府主簿及受禪遷黄門侍郎靳孝謨仕隋朝邑縣法曹及義兵濟河以蒲津中潬二城歸義授正議大夫竇軌隋末為資陽郡東曹掾去官歸於家及義兵入闗軌聚衆千餘人迎於同州髙祖見之大悦降席起迎握手歡笑賞錫優厚尋令收兵於渭南得衆一萬拜丞相諮議參軍從平京師累加光禄大夫孫華隋末坐事逃歸山賊郭伏願侵掠馮翊及義師起髙祖見華貌寢初輕之及與語大悦握手引與同坐謂之曰吾昨夜夢乗白龍以濟黄河卿將白𤣥度來又具舟檝何與吾夢之相符也因拜為光禄大夫前軍總管常達隋末為隴州刺史為降人忤仕政所劫擁城中二千人叛入薛仁杲達性剛烈有武藝髙祖龍濳時數從征伐甚蒙深待及義兵起達在霍邑從宋老生來拒戰既斬老生高祖謂達已死令人閲屍以求及達奉見髙祖大悦因蒙任使屢有軍功梁朱珍徐州豐人太祖起兵珍與龎師古許唐李暉丁㑹氐叔琮鄧季筠王武等八十餘人以中㳙從摧堅䧟陳所向盪决後署諸軍都指揮使龎師古曹州南華人以中㳙從太祖性端愿未嘗離左右及太祖鎭汴樹置戎伍始得馬五百匹即以師古為偏將援陳破蔡累有戰功後至徐州節度使謝瞳唐末舉進士不中第遂投跡於太祖泊居門下未嘗一日不在左右及太祖據同州遂署右職後為宣義軍兩使留守李振字興緒唐末為台州刺史不克莅事因而歸過汴求謁見太祖太祖與語大竒之辟為從事以講武政於是陳耕戰之計進鳩合之䇿尊王室以圖諸侯奬帝道以雜覇業嫉閹寺敦儒術尚名器審刑罰於是禮遇彌篤後至户部尚書崇政院使牛存節唐末勅事河陽節度使諸葛爽爽卒存節謂同輩曰天下汹汹當擇英主事之以圖富貴遂歸於太祖授宣義軍小將後至鄆州節度使後唐康君立蔚州興唐人世為邊豪唐乾符中為雲州牙校事防禦使段文楚時羣盜起河南天下將亂代北仍歲阻饑諸部豪傑咸有嘯聚邀功之志㑹文楚稍削軍人儲給戍兵咨怨君立與薛鐵山程懷信王行審李存璋謀曰段公儒人難與共事方今四方雲擾皇威不振丈夫不能於此時立功立事非人豪也吾等雖權部衆然以雄勁聞於時者莫若沙陁部落又李振武父子勇冠諸軍吾等合勢推之則代北之地旬月可定功名富貴事無不濟也君立等乃夜謁武皇言曰方今天下大亂天子付將臣以邊事歲遭荒饑便削儲給我等邊人焉能守死公家父子素以威惠及五部當共除虐帥以謝邊人孰敢異議者武皇曰明天子在上舉事當有朝典公等勿輕議予家尊遠在振武萬一相迫候予禀命君立等曰事機已泄遲則變生曷候千里咨稟衆因聚譟擁武皇比及雲州衆且萬人師營鬭雞臺城中械文楚以應武皇之軍既收城推武皇為大同軍防禦留後衆狀以聞後武皇授鴈門節度以君立為左都押衙後至昭義軍節度使蓋寓蔚州人世為牙挍武皇起雲中寓與康君立等推轂佐佑之因為腹心武皇節制鴈門署職為都押衙領嵐州刺史洎移鎭太原改左都押衙武皇與之决事言無不從凡出征行靡不衞從後至容館經略使劉彦琮雲中人唐末武皇作鎭晉陽有撥亂夷兇之志彦琮乃謁於軍門致之麾下自是從征興復王室後至邠州節度使李承約為山後八軍巡檢使屬劉守光因殺兄名儒宿將嘗事其父兄者多無辜被戮承約自以握兵在外心不自安時武皇召募英豪方開王業乃以所部二千騎歸於弁州即補定覇都指揮使檢較右僕射兼貝州刺史張遵誨父為宗城令羅紹威殺衙軍之歲為梁軍所害遵誨奔太原武皇以為牙門將時朱溫簒逆據有兩京武皇與邠鳯同謀興復命遵誨知岐州留務在岐下累年莊宗平定山東遵誨以典客從厯幽鎭二府馬歩都虞侯張廷裕代北人幼事武皇於雲中從平黄巢討王行瑜自行間漸升為小將莊宗定魏補天雄軍左廂馬歩都虞侯厯蔚兹隰三州刺史曹廷隐本魏州人為本州典謁虞侯賀德綸西迎莊宗於晉陽莊宗既得鄴城擢為馬歩都虞侯軍中號為稱職何瓉閩人唐天祐三年登進士第謁莊宗於晉陽一見受知辟河東推官轉留府判官段凝開封人唐末為澠池主簿脱荷衣以事梁祖梁祖漸器之開平三年十月自東頭供奉官授右威衞大將軍充左軍巡使兼水北巡簡使賈馥在鎭州幕府張文禮殺王鎔時莊宗未即尊位文禮遣馥至鄴都勸進自留鄴下棲遲郵舎莊宗即位授鴻臚少卿王鎔唐末為鎭州節度莊宗征劉守光廻鎔至承天軍與莊宗合宴同盟奉觴獻夀以申感慨莊宗以鎔父友曲加敬異為之聲歌鎔亦報之謂莊宗為四十六舅飲中莊宗抽佩刀斷衿為盟許以女妻鎔子昭誨因兹堅附於莊宗矣孔循同光末權知汴州事㑹明宗自鄴都至循致餼勞軍供備充至明宗悦及定京師為樞密使兼秘書監晉髙漢筠初仕梁為衞州衙校後唐莊宗入魏分兵諭其屬郡漢筠以利病説衞之牧守俾送欵於莊宗以漢筠為功尋移雒州都校後至左驍衞大將軍内省客使皇甫立代北人後唐明宗刺代州署為衙校從厯藩鎭性純謹明宗深委信之王建丘安誨䇿名委質皆在立後明宗踐阼以立為忻州刺史萇從簡初仕後唐為潁州團練使髙祖舉義清泰末詔赴闕充副招討使隨駕至孟津除河陽節度使時趙延夀軍敗偽王斷浮橋歸雒從簡守河陽南城髙祖自北而至從簡察軍情離散遂渡河迎謁焉後至左金吾衛將軍桑維翰性明慧善詞賦後唐同光中登進士第髙祖領河陽辟為掌書記厯數鎭皆從之後至中書令曹國珍髙祖在藩時嘗通私謁以兄事之及即位國珍自比於嚴陵上表叙舊由是自吏部郎中拜左諫議大夫給事中孟承誨大名人始為本州衙校遇髙祖臨其地升為客將後奏為宗城常山槀城三令皆有善政髙祖有天下擢為閣門副使周環晉陽人自髙祖厯鎭藩翰用為腹心累職至衙門都挍凡帑廪出納咸以委環經十餘年未嘗以㣲累見誤髙祖甚重之及即位命權判三司事後至安州節度使李承福初為髙祖家臣髙祖登極厯皇城武德宣徽使左千牛大將軍劉處讓後唐末為左驍衞大將軍河北都轉運使髙祖舉義兵於太原處讓從至雒陽乃授宣徽北院使劉繼勲衞州人髙祖鎭鄴都時繼勲為客將髙祖愛其端謹籍其名於帳下從厯數鎭及即位擢為閣門使漢王景崇邢州人後唐明宗之鎭邢州景崇為牙將明宗以其明敏憐之自後累鎭皆致麾下明宗踐阼擢為通事舎人厯引進閣門使晉末遷左金吾大將軍充街使嘗以人主用才不盡憤然不樂契丹蕭翰立許王李從益知軍國事署為宣徽使監左藏庫蕭翰歸蕃景崇聞髙祖起河東西陜幸滿乃私取庫金請行迎奉從益不能制遇髙祖于河雒駕至汴削其偽官授右衞大將軍任庭浩并州人業術數風雲之事晉髙祖在太原重圍時髙祖最為親要庭浩以本業請見髙祖甚加禮遇晉天福初庭浩授太原掾尋改交城文水令皆髙祖奬薦之力也後為殿中監翟光鄴晉末為宣徽使時寇犯闕以後唐明宗少子許王從益為曹州節度使從益母淑妃王氏白於寇長以從益未諳政術請以光鄴代知州事寇從之及蕭翰推從益僣位以光鄴為樞密使寇去光鄴以髙祖進兵汾水請從益去號稱梁王仍馳表稱臣論者賞之髙祖入汴加右領衞大將軍趙暉晉開運末為軍校以部兵屯於陜屬北戎入寇慨然有憤激之意及聞髙祖建義於并門乃與部將王晏侯章戮力恊謀戮契丹偽命官屬據有陜州即時馳騎聞於髙祖髙祖乃命暉為保義軍節度陜虢等州觀察處置等使髙祖之幸東京出於陜暉戎服朝於路左手控六龍達于行宫君臣之義如舊結焉李守貞河陽人事本郡為牙將晉髙祖鎭河陽用為典客從數鎭皆從之及即位累遷至省客使聶文進并州人少給事於髙祖帳下髙祖鎭太原甚見委用職至兵馬押司官髙祖入汴授樞密院承旨厯領軍屯衞大將軍遷右領軍大將軍并仍舊職閻晉卿忻州人少仕并州厯職至客將髙祖在鎭頗見信用後厯閣門使判四方館事郭允明父徽柔為河東制置使徽柔被誅允明遂為髙祖厮養服勤既乆頗得髙祖之歡心髙祖鎭太原稍厯牙職及即位累遷至翰林茶酒使兼鞍轡庫使周史彦超漢末為龍棲都指揮使太祖之赴内難彦超以本軍從後至鄭州防禦使李彦碩字德修本以商賈為業太祖鎭鄴寘之左右及即位厯綾綿副使㩁埸使陳光穗為鄴都副留守廣順中髙祖賜詔書曰汝澶淵倅職之時値漢室釁生之際濳齎密㫖將陷朕躬神色不祐於苞藏機事尋當於發露汝禀勲賢之指使效奔走之勤勞徑自河壖報於鄴下忠孝之規逈著旌酧之道未𢎞毎慊朕懷仍宣公論宜膺列郡用賞前功今授汝博州刺史册府元龜卷七百六十六
