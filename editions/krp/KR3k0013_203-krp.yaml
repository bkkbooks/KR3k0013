body:
  text: 冊府元龜卷二百三宋王欽若等撰閏位部徴應自古帝王世之季豪傑竝起雖雄視一方而靈徴不絶者盖天意諄諄賛明羣衆之所嚮也若夫肇自載育𤣥感特異寤兹吉夣神貺彌昭或應䜟自許軌迹有開或物色紛紜符節斯合豈獨觀竒表命于元龜而後知其享國保民也蜀先主涿郡縣人也少孤與母販履織席為業舍東南角籬上有桑樹生高五丈餘遥望見童童如小車盖往來者皆怪此樹非凡或謂當出貴人先主少時與宗中諸小兒於樹下戱言吾必當乘此羽葆盖車叔父子敬謂曰汝勿妄語㓕吾門也又漢靈帝時董扶為侍中私謂太常劉焉曰京師将亂益州分野有天子氣焉信之遂求出為益州牧扶亦求為蜀郡蜀國都尉其後先主稱天子於蜀皆如扶言吳大帝權母吳夫人初孕而夢月入其懐既而生䇿及權在孕又夢日入其懐以告其夫堅曰昔妊䇿夢月入懐今也又夢日入我懐何也堅曰日月者隂陽之精極貴之象吾子孫其興乎初堅世仕吳家于富春𦵏於城東冡上數有光怪雲氣五色上属于天曼延數里衆皆往觀視父老相謂曰是非凡氣孫氏其興矣及母懐妊堅夢腸出繞盈昌門寤而懼之以告鄰母鄰母曰安知非吉徴也廢帝亮母潘夫人既得幸有娠夢有龍頭授已者己以蔽膝受之遂生亮景帝休初封琅琊王居㑹稽夢乘龍上天顧不見尾覺而異之及亮廢帝休立七年薨孫皓悉誅其子宋高祖生夕甘露降于墓樹微時伐荻新洲見大蛇長數丈射之傷明日復至洲裏聞有杵臼之聲往覘之見童子數人皆青衣於榛中𢷬藥問其故答曰我王為劉寄奴所射合散傅之臣欽若等日寄奴帝之字帝曰王神何不殺之答曰寄奴王者不死不可殺帝叱之皆散乃收藥而反又遇一沙門于逆旅沙門言中原事故因云江表尋當喪亂高祖曰當有拯之者不沙門曰能拯之者其唯君乎其意甚至初帝先患手創積年未療沙門曰此瘡難治先有良藥當以相與因出懐中黄散治瘡一傅而愈餘散寳録之被金瘡輙用有騐又嘗逰京口竹林寺獨卧􅊰堂前上有五色龍章衆僧見之驚以白帝帝獨喜曰上人無妄言帝皇考墓在丹徒之侯山其地秦史所謂曲阿丹徒間有天子氣者也時有孔恭者妙善占墓帝嘗與經墓問之曰此墓如何孔恭曰非常地也帝繇是益自負行止時見二小龍附翼樵漁山澤同侣或亦覩焉及貴龍形更大帝東征孫恩至㑹稽過孔季恭宅季恭正晝卧有神人衣服非常謂曰起天子在門既而失之遽出適見武帝延入結交執手曰卿後當大顯貴願以身為託於是曲意禮接甚厚及将受晋禪太史令駱逹陳天文符瑞數十條文帝初為荆州刺史廢帝景平中有龍見西方半天騰上廕五綵雲京都逺近聚觀太史奏曰西方有天子氣帝入奉大統帝及議者皆疑不敢下鎮西長史王曇首與到彦之從兄華固勸帝猶未許曇首又固陳并言天人符應帝乃下率府州文武嚴兵自衛臺所遣百官衆力不得近部伍中兵叅軍朱容子抱刃在平乘户外不觧帶者累旬既下在道有黄龍出負上所乘舟左右皆失色帝謂曇首曰此乃夏禹所以受天命我何堪之孝武帝初封武陵王為北中郎将以顔峻為府主簿沙門徳合粗有學義謂顔峻曰貧道粗見䜟記當有真人應符名稱次第属在殿下峻在彭城常向親人叙之其言遂宣布聞於太祖時元凶巫蠱事已發故帝不加推治南齊太祖生二嵗乳人乏乳皇妣孝皇后夢人以兩甌麻粥與之覺而乳大出異而説之帝舊宅在武進縣宅南有一桑樹高三丈横生四枝狀似華蓋帝年數嵗好戯其下從兄敬宗曰此樹為汝生也帝年十七夢乘青龍西行逐日日將薄山乃止覺而恐懼家人問占者云至貴之象也蘓侃云青者木色日暮者宋氏末運也宋泰始二年明帝遣前淮南太守孫奉伯往淮隂監元㑹奉伯舊與帝欵是行也帝與奉伯同室卧奉伯夢帝乘龍上天于下捉龍脚不得及覺叙夢因謂曰兖州當大庇生靈而弟不得與也奉伯竟卒於宋世帝在日隂治城得一錫跌大數尺下有篆文莫能識者紀僧真曰何湏辨此文字此自久逺之物九錫之徴也帝曰卿勿妄言又宋世苪國相希利賈觧星筭數術通胡漢語嘗言南方有姓名齊者其人當興又宋朝初議封帝為梁公輔國主簿崔祖思啟帝曰䜟書云金刀利刃齊割之今冝稱齊實應天命從之帝居武進彭山岡阜相属數百里不絶其上常有五色雲氣有龍出焉帝時已貴矣明帝甚惡之遣善占墓者高靈文往墓所占相靈文先結事太祖還詭答曰不過出方伯耳宻白太祖曰貴不可言明帝意猶不已遣人踐藉以左道厭之後於所樹華表柱忽龍鳴震響山谷及明帝寢疾為身後之慮多翦功臣帝亦見疑每云蕭道成有不臣相帝鎮淮隂每懐憂懼忽見神人謂帝曰無所憂子孫當昌盛元徽四年太祖從南郊望相氣者陳安寳見太祖身上黄紫氣属天安寳謂親人王洪軌曰我少來未嘗見君上有如此氣也又叅軍崔靈建夣天謂已蕭道成是我第十九子我去年已使授其天子位考自三皇五帝已降受命之次至帝為十九也又所居武進縣有一道相傳云天子路或謂秦皇所㳺或云孫氏舊迹時訛言東城天子出其後建安王休仁鎮東府明帝懼殺休仁而嘗閉東府不居明帝又屢幸以厭王氣又使子安成王居之及蒼梧王敗安成王代立時咸言為騐術數者推之帝舊居武進東城村東城之言其在此也昇明二年冬延陵縣季子廟沸井之北忽聞金石聲疑其異鑿深三尺沸井奔湧若浪其地又響即復鑿之復得一井湧沸亦然井中得一木簡長一尺廣二分上有隠起字曰廬山道士張陵再拜詣闕起居簡大堅白字色乃黄㑹稽􅗄縣有山名刻石父老相傳云山雖名刻石而不知名字所在昇明末縣人倪襲祖行獵忽見石上有文字凡三處苔生其上字不可識乃去苔視之其大石文曰此齊者黄公之化氣也立石文曰黄天星姓蕭字道成得賢師天下太平小石文曰刻石者誰㑹稽南山李斯刻秦望之峯也河雒䜟曰歴年七七水㓕緒風雲俱起龍鱗舉又曰肅草成道徳盡備宋水徳也義熙元年宋武帝王業之始至齊受命七十七年又䜟曰蕭為一土天下樂一土王字也郭文舉金雄記曰當後有作肅入草也王子年歌曰金刀治世後遂苦帝王昏亂天神怒災異屢見戒人主三分二叛失州土三王九江一在吳餘悉稚小早少孤一國二主天所驅金刀劉也三分二叛宋明帝世也三王九江孝武於九江興晋安王子勛雖不終亦稱大號後世祖又於九江基覇迹此三王也一在吳謂齊氏桑梓亦寄治南吳也一國二主謂大祖符運潜興為宋氏驅除㓂難歌又曰三木慘惨林茂孳金刀利刃齊刈之金刀劉也刈剪也欲知其姓草肅肅榖中最細低頭熟鱗身甲體永興福榖中精細者稻也即道也熟猶成也孔子河雒䜟曰竭河梁塞龍泉消除水災泄山川水即宋也宋氏為災害故曰水災梁亦水也竭河梁則行路成矣路猶道也消除水災除宋氏之災害也河圖䜟又曰上参南斗第一星下立草屋為紫庭龍神之岡梧桐生鳯鳥舒翼翔旦鳴南斗吳分野也草屋蕭字象也又簫管之器像鳳鳥翼也䜟又曰天子何在草中宿宿肅也又曰先是益州有山故老相傳曰齊后山昇明三年四月二十三日有沙門𤣥暢者於此山立精舍其日上登尊位其月二十四日滎陽郡人尹午於嵩山東南隅見雨石墜地石開有玉璽在其中璽方三寸文曰戊丁之人與道俱肅然入草應天符掃平河雒清魏都又曰皇帝運興午奉璽詣雍州刺史蕭赤斧以獻乂宋武帝於嵩高山得玉璧三十二枚神人云此是宋卜世之數三十二者二世也宋自受命至禪齊凡六十年然則帝之符應也武帝小字龍兒以宋元嘉十七年六月己未夜生於建康青溪宅其夜陳孝后劉昭后同夢龍據屋上故字帝焉又其夕無火婢吹灰而火燃年十三夢人以筆畵身左右為兩趐又着孔雀羽衣裳空中飛舉體生毛髪長至足有人指上所踐地曰周文王之田又于所住堂内得璽一枚文曰皇帝行璽又得異錢文為北斗星䨇刀䨇貝及有人形帶劍焉仕宋為贑令江州刺史晋安王子勛反帝不從命南康相沈肅之縶帝郡獄族人蕭欣祖門客桓康䓁破郡迎出帝帝遂率部曲百餘人起義避難揭陽山有白雀来集聞山中有清聲傳漏響又於山累石為佛圗其側忽生一樹狀若華蓋清翠扶疎有殊羣木帝将討戴凱之大饗士卒是日大熱帝各令折荆枝自蔽言未終而有雲垂䕃正當㑹所㑹罷乃散及為廣興相嶺南積旱連水阻涸商旅不通帝部伍既至無雨而川流暴起遂得利渉後為左衛将軍於盆城禦沈攸之盆城掘塹得一大錢文曰太平百嵗于時城内乏水欲引水入城始鑿城内遇伏泉湧出如此者九處用之不竭和帝即位江陵建武中荆州大風雨龍入栢齋中挂壁上有爪足處刺史蕭遥欣恐畏不敢居至是以為嘉福殿梁髙祖母張皇后嘗於室内忽見庭前菖蒲生華光采昭灼非世中所有后驚視謂侍者曰汝見不對曰不見后曰嘗聞見者富貴因遽取吞之又嘗夢抱日已而有娠遂産帝将産之夜后見庭内若有衣冠陪列焉生而頴異兩骻駢骨頂上隆起有文在右手曰武帝所居室常若雲氣人或過者體輙肅然嘗行經牛渚逢風入泊龍瀆有一老人謂帝曰君龍行虎歩相不可言天下方亂安之者其在君乎問其名氏忽然不見隂智伯與帝隣居少相友善嘗入帝卧内見有異氣成五色因握帝手曰公後必太貴非人臣也天下方亂安蒼生者在君乎帝曰幸勿多言於是情好轉宻帝每有求索如外府焉帝在襄陽住齋嘗有五色廻轉狀若蟠龍其上紫雲騰起形如繖蓋初齊高帝夢履而登殿顧見武明二帝後一人手張地天圗而不識問之答曰順子後及崔恵景之逼長沙宣武王入援至越城夢乘馬飛半天而墜帝所馭化為赤龍騰虚獨上時臺内有宿衛士為覡嘗見太極殿有六龍各守一柱末忽失其二後在宣武王宅時宣武為益州覡乃往蜀伏事及宣武在郢此覡還都乃見六龍俱在帝所寢齋遂去郢之雍中途遇病且死謂同侣曰蕭雍州必作天子具以前事語之推此而言盖天命也齊中興二年正月始為梁公南兖州隊主陳文興于桓城内鑿井得玉鏤麒麟金鏤玉璧水晶環各二枚又建康令羊瞻觧稱鳯凰見縣之桐下里齊宣徳皇后稱羙符瑞歸於相國府又延陵縣華陽邏主戴車牒稱去年十二月乙酉甘露降茅山彌漫數里正月己酉邏将潘道盖于山石穴中得毛龜一二月辛酉邏將徐靈符乂于山東見白麞一丙寅平旦山上有雲霧四合須㬰有𤣥黄五色狀如龍形長十餘丈乍隠乍顯久乃從西北升天丁邜兖州刺史馬元和籖所領東平郡夀張縣見騶虞元帝高祖第七子初高祖夢𦕈目僧執香爐稱托王宫既而帝母在采女次侍始褰户幔有風廻裾高祖意感幸之采女夢月堕懐中遂孕天監七年八月丁巳生帝舉室中非常香有紫肥之異高祖竒之因賜采女姓阮進為脩容帝在尋陽夢人曰天下將亂王必維之又背生黒子巫媪見曰此大貴不可言時賀革為帝府諮議使講三禮革西上意甚不悦過别御史中丞江革江革告之曰吾嘗夢主上遍見諸子至湘東王脱㡌授之此人後必當璧卿其行乎革領之大寳元年帝在江陵正月辛亥朔左衛將軍王僧辯獲橘三十子共蔕以獻二月甲戌衡陽内史周孔直表言鳯凰見郡界二年十月辛丑朔有紫雲如車盖臨江陵城三年遂即帝位陳高祖漢太丘長寔之後世居潁川寔六世孫逹出為長城令悦其山水遂家焉嘗謂所親曰此地山川秀麗當有王者興二百年後我子孫必鍾斯運帝嘗遊義興館於許氏夜夢天開數丈有四人朱衣捧日而至令帝開口納焉及覺腹中猶熱帝心獨負之梁大寳初侯景冦京師帝起義發兵自南康南康灨石舊有二十四灘灘多巨石行旅者以為難帝之發也水暴起數丈二百里間巨石皆沒進軍頓西昌有龍見於水濵高五丈許文采鮮耀軍民觀者數萬人既次蔡州侯景登石頭城觀望形勢意甚不悦謂左右曰此軍上有紫氣不易可當嘗夢梁武帝以寳刀授己又嘗獨坐胡床於閣下忽有神光滿閣廊廡之間竝得相見趙知禮侍側怪而問帝帝笑不答梁敬帝紹泰二年二月寜逺石城公外兵叅軍王位於石頭沙際獲玉璽四紐七月大府卿何敳新州刺史華志各上玉璽一高祖表以送臺詔蹄之髙祖太平元年九月中散大夫王彭牋稱今月五日平旦於御路見龍迹自太社至象闕亘三四里帝既即位于南郊柴燎告天先是氛霧晝夜晦㝠至於是日景氣清晏識者知有天道焉文帝㣲時嘗詣劉仲舉時天隂雨仲舉獨坐齋内聞城外簫鼓之聲俄而帝至仲舉異之乃深結託帝又嘗因飲夜宿仲舉帳中忽有神光五彩照於室内繇是祗承益恭梁太清初夢兩日鬭一大一小大者光滅墜地色正黄其大如斗帝因而懐之宣帝梁大通二年七月辛酉生有赤光滿堂室事梁元帝為中書侍郎時有馬軍主李悤與帝有舊每同逰處帝嘗夜被酒張燈而寐總適出尋反乃見帝身是大龍北齊神武帝皇考樹性通率不事家業居住白道南數有赤光紫氣之異鄰人以為怪帝欲徙居以避之皇考曰安知非吉居之自若後神武自隊主轉為函使嘗乘驛過建興雲霧晝晦雷聲隨之半日乃絶若有神應者每行道路往來無風塵之色又嘗夢履衆星而行覺而内喜又與懐朔省事雲中司馬子如及秀容人劉貴中山人賈顯智為奔走之友懐朔户曹史孫騰外兵史侯景亦相友結劉貴嘗得一白鷹與神武及尉景蔡雋司馬子如賈顯智等獵於沃野見一赤兎每摶輙逸遂至逈澤澤中有茅屋將奔入有狗自屋中出噬之鷹兎俱死神武怒以鳴鏑射之狗斃屋中有二人出持神武襟其母兩目肓曵杖謂其二子曰何故觸大家出甕中酒烹羊以飯客因言暗相諸人皆曰貴而指揮俱繇神武又曰子如歴位顯智不善終飯竟出行數里還更訪之則本無人居乃向非人也繇是諸人益加敬異後抵揚州邑人龎蒼鷹止團焦中每從外蹄主人遥聞行響動地蒼鷹母數見團焦赤氣赫然屬天又蒼鷹嘗夜欲入有青衣人㧞刀叱曰何故觸王言訖不見始以為異宻覘之唯見赤蛇蟠床上乃益驚異因殺牛分肉厚以相奉蒼鷹母求以神武為義子及得志以其宅為第號為南宅雖門巷開廣堂宇崇麗其本所住團焦以石堊塗之留而不毁至文宣時遂為宫初魏真君中内學者奏言上黨有天子氣云在壼闗大王山太武於是南廵以厭當之累石為三封斬其北鳯凰山以毁其形後上黨人居晋陽者號上黨坊神武實居之普㤗初嵗星熒惑鎮星太白聚於觜参色甚明太史占云當有王者興是時神武起於信都破爾朱兆等天平元年二月永寜寺九層浮圗災既而人有從東萊至云及海上人咸見之於海中俄而霧起乃滅説者以為天意若曰氷寧見災魏不寜矣飛入東海渤海應矣三年六月壬申神武如天池獲瑞石隠起成文曰六王三川于時楊休之為行臺郎中帝獨在帳中問之此文字何義對曰六者是大王之字王者當有天下此乃大王符瑞命之徴既於天池中得此石可謂天意王命也吉不可言帝又問三川何義休之曰河雒伊為三川亦謂涇渭雒為三川河雒伊雒陽也涇渭雒若雍州也大王今受天命終應統有闗右帝曰世人無事嘗道我欲反今聞此更致紛紜慎莫妄言也初帝從父弟岳家于雒邑帝每奉使入雒岳母山氏常夜起見帝室中有光宻往覘之乃無燈即移帝於别室如前所見怪其神異詣卜筮之遇乾之大有占之曰吉稱飛龍在天大人造也飛龍九五大人之卦貴不可言山氏歸報帝後帝起兵於信都山氏聞之喜謂岳曰赤光之瑞今當驗矣汝可間行從之共圗大計岳遂往信都帝見之大悦文襄帝高祖長子母婁太后初夢一斷龍遂孕帝文宣帝文襄母弟太后夢大龍首尾屬天地張口動目勢狀驚人因孕帝每夜有赤光照室后私嘗怪之初神武之歸爾朱榮時經危亂家徒壁立后與親姻相對共憂寒餒帝時尚未能言歘然應曰得活太后及左右大驚而不敢言及長鱗身重踝不好戱㺯深沈有大度晋陽曽有沙門乍愚乍智時人不測呼為阿秃師帝曽與諸童共見之歴問禄位至帝舉手再三指天而已口無所言見者異之神武帝從諸子過鳯陽門有龍在上唯神武與帝見之後從文襄行過遼陽山獨見天門開餘人無見者東魏武定七年赴晋陽摠庶政八年進封齊王自居晋陽寢室夜有光如晝既為王夢人以筆㸃已額旦以告舘客王曇哲曰吾其退乎曇哲再拜賀曰王上加㸃便成主字乃當進也乾明二年二月文襄終時訛言上黨出聖人帝聞之將徙一郡郡人張思進上言殿下生於南宫坊名上黨出聖人帝悦而止先是童謡曰一束藁兩頭然河邉羖䍽飛上天蒿然兩頭於文為高河邉羖䍽為水邉羊指帝名也於是徐之才盛陳冝受禅且䜟云羊飲盟津角駐天盟津水也羊飲水王名也角駐天天位也又陽平郡界廻呈驛傍有大水土人常見羣羊數百立卧其中就視不見事與䜟合願王勿疑帝以問高徳正徳正又賛成之於是始决乃使李宻卜之遇大横曰大吉漢文帝之卦也帝乃鑄像以卜之一冩而成及將受禅是年四月夜禾生魏帝銅研旦長數寸有穂孝昭帝文宣母弟太后夢蠕龍于地遂孕帝武成帝孝昭母弟太后夢龍浴於海遂孕帝後主武成帝長子母曰胡皇后夢於海上坐玉盆日入裠下遂有娠天保七年五月五日生帝於并州邸梁太祖以唐大中六年歳在壬申十月二十一日夜生於碭山縣十溝里是夕所居廬舍之上有赤氣上騰里人望之皆驚奔而來曰朱家火發矣及至則廬舍儼然既而隣人以誕辰告衆咸異之帝仲昆三人俱未冠而孤母王氏携養寄於蕭縣人劉崇之家帝既壯不事生業以雄勇自負里人多厭之崇以其慵惰每加譴杖唯崇母自㓜憐之親為櫛髪嘗戒家人曰朱三非常人也汝輩當善待之家人問其故答曰我嘗見其熟寐之次為一赤蛇然衆亦未之信也唐乾符中木星入南斗數夕不退諸道都統晋國公王鐸觀之問諸知星者吉凶安在咸曰金火土犯斗即為災唯木當應為福耳或亦然之時有術士邉岡者洞暁天文博通隂陽厯數之妙窮天下之竒秘有先見之明雖京房管輅不能過也鐸召而質之岡曰惟木為福神當以帝王占之然則非福於今必當有驗於後未敢言之請他日證其所驗一日又宻召岡因堅請語其詳至于三四岡辭不獲鐸乃屛去左右岡曰木星入斗帝王之兆也木在斗中朱字也以此觀之將來當有朱氏為君者也天戒之矣且木之數三其禎也應在三紀之内乎鐸聞之不復有言及為梁王迎駕於鳯翔天復二年九月甲辰帝以敵寨聫絡稍盛躬統千騎乘高診之時秋空澄霽四絶纎靄望者見龍旌上紫雲如繖逺邇同矚或曰馬氣上騰往往若是或曰前後騎士屯集豈一二乎曷無是耶兹固竒瑞非常人所當也三年十月甲午有大聲出於梁邸之聼事帝甚驚駭占者曰當有大慶後封魏王天祐四年正月自河北還壬寅至梁是日有五彩雲覆于府署之上士庶靡不覩者又軍庫前有苦井嘗以備灑滌之用一旦其味忽變甘羙若飴冠於他井今見在焉二月戊申朔家廟主者言廟之左棟産五色芝狀如芙蓉紫烟䝉䕶數日不散是日福建帥遣吏持箋幣通好仍以白鸚鵡一同至自是旬朔之内諸州郡繼以白烏白雀白兎洎白蓮之竝蔕者相次來獻上覩之謙畏彌極咸命具表歸天朝四月帝將受禅宋州刺史王臯進赤烏一䨇又宰臣張文蔚正押傳國寳玉冊金寳及文武羣官諸司儀仗法物及金吾左右三軍離鄭州丙辰逹上源驛是日慶雲見冊府元龜卷二百三
