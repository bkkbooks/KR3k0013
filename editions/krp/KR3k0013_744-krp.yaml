body:
  text: 册府元龜卷七百四十四宋王欽若等撰陪臣部有詞夫言者樞機務乎發而必中辭比林藪有以多為貴者通其變則靡俟乎終日順其理則無過於天下春秋之世辯士間出雖枝葉之蔓衍而雌黄之斯在則有奉命霸王委質與國當干戈之日尋戰不以義見爼豆之失序動罔循理而能獨運寸舌不持尺柄開談敏贍引事慷慨或應對於㑹盟之所或折衝於朝聘之際大者尊王而紓國難小者保家而全身計至於博通前志備率嘉話彈射臧否折𠂻長短俾强盛傾聽剛狡易慮豈咄咄而是廹在便便而唯謹斯實得君子之正道可尚者哉屈完楚大夫齊桓公伐楚楚屈完如師魯僖公四年齊侯陳諸侯之師與屈完乗而觀之乘共載齊侯曰豈不糓是為先君之好是繼與不糓同好如何言諸侯之附從非為已乃尋先君之好謙而自廣因求與楚同好孤寡不榖諸侯謙稱對曰君惠徼福於敝邑之社稷辱收寡君寡君之願也齊侯曰以此衆戰誰能禦之以此攻城何城不克對曰君若以德綏諸侯誰敢不服君若以力楚國方城以為城漢水以為池方城山在南陽葉縣南以言境土之逺漢水出武都至江夏南入江言其險固以當城池雖衆無所用之郤芮晉人與惠公逃驪姫之難走於梁晉獻公卒齊隰朋帥師㑹秦師納惠公隰朋齊大夫也魯僖公九年問於郤芮曰公子誰恃於晉國苪對曰臣聞亡人無黨有黨必有讎有與為黨必有與為讎無黨則必無讎夷吾之少也夷吾惠公也不好弄戲不過所復不過差也怒不及色無過色也及其長也弗改是故出亡亦無惡於國而衆安之不然夷吾不佞其誰能恃佞才也言無恃則恃秦君子曰善以㣲勸陰飴甥晉大夫秦伐晉獲晉侯魯僖公十五年陰飴甥㑹秦伯盟於王城陰飴甥即呂甥也食采於陰故曰陰飴甥王城秦地馮翊臨晉縣東有王城今名武鄉秦伯曰晉國和乎對曰不和小人耻失其君而悼䘮其親痛其親為秦所殺不憚征繕以立圉也曰必報讎寜事戎狄君子愛其君而知其罪不憚征繕以待秦命曰必報德有死無二以此不和秦伯曰國謂君何曰小人慼謂之不免君子恕以為必歸小人曰我毒秦秦豈歸君毒謂二施不報君子曰我知罪矣秦必歸君貳而執之服而舍之德莫厚焉刑莫威焉服者懐德貳者畏刑此一役也言還惠公使諸侯威服復可當一事之功秦可以覇納而不定廢而不立以德為怨秦不其然秦伯曰是吾心也改館晉侯饋七牢焉展喜魯大夫齊伐魯西鄙魯僖公二十六年僖公使展喜犒師勞齊師使受命於展禽柳下惠齊侯未入境展喜從之曰寡君聞君親舉玉趾將辱於敝邑使下臣犒執事言執事不敢斥尊齊侯曰魯人恐乎對曰小人恐矣君子則否齊侯曰室如縣罄野無青草何恃而不恐如而也時夏四月今之二月野物未成故言居室而資糧縣盡在野則無蔬食之物所以當恐對曰恃先王之命昔周公太公股肱周室夾輔成王成王勞之而賜之盟曰世世子孫無相害也載在盟府載載書也太師職之職主也太公為太師兼主司盟之官桓公是以糾合諸侯而謀其不協彌縫其闕而匡救其災昭舊職也及君即位諸侯之望曰其率桓之功率循也我敝邑用不敢保聚用此舊盟故不聚衆保守曰豈其嗣世九年而棄命廢職其若先君何君必不然恃此以不恐齊侯乃還孟明秦大夫晉敗秦師魯僖公三十三年獲孟明西乞白乙文嬴請而釋之文嬴晉襄公嫡母使陽處父追之及諸河則在舟中矣釋左驂以公命贈孟明欲使還拜謝因而執之孟明稽首曰君之惠不以纍臣釁鼓纍囚繫也殺人以血塗鼓謂之釁鼓使歸就戮於秦寡君之以為戮死且不朽若從君惠而免之三年將拜君賜西乞術秦大夫秦伯使西乞術聘於魯文公十二年且言將伐晉㐮仲辭玉㐮仲魯大夫曰君不忘先君之好炤臨魯國鎭撫其社稷重之以大器寡君敢辭玉大器圭璋也不欲與秦為好故辭玉對曰不腆敝器不足辭也腆厚也主人三辭賓答曰寡君願徼福於周公魯公以事君徼要也魯公伯禽也言願事君以并䝉先君之福不腆先君之敝器使下臣致諸執事以為瑞節節信也出聘必告廟故稱先君之器要結好命所以藉寡君之命結二國之好藉薦也是以敢致之㐮仲曰不有君子其能國乎國無陋矣厚賄之子家鄭大夫晉侯合諸侯於扈魯文公十七年晉侯不見鄭伯以為貳於楚也鄭子家使執訊而與之書以告趙宣子執訊通訊問之官為書與宣子曰寡君即位三年魯文公二年召蔡侯而與之事君九月蔡侯入於敝邑以行行朝晉也敝邑以侯宣多之難寡君是以不得與蔡侯偕宣多既立穆公恃寵専權十一月克减侯宣多而隨蔡侯以朝於執事减損也難未盡而行言汲汲於朝晉十二年六月歸生佐寡君之嫡夷歸生子家名夷太子名以請陳侯於楚而朝諸君請陳於楚與俱朝晉十四年七月寡君又朝以􅟹陳事􅟹勑也勑陳前好十五年五月陳侯自敝邑徃朝於君徃年正月燭之武徃朝夷也將夷徃朝晉八月寡君又徃朝以陳蔡之宻邇於楚而不敢貳焉則敝邑之故也宻邇比近也雖敝邑之事君何以不免免免罪也在位之中一朝於㐮而再見於君君靈公也夷與孤之二三臣相及於絳孤之二三臣謂燭之武歸生自謂也絳晉國都雖我小國則蔑以過之矣今大國曰爾未逞吾志敝邑有亡無以加焉古人有言曰畏首畏尾身其餘㡬言首尾有畏則身中不畏者少又曰鹿死不擇音音所茠䕃之處古字聲同皆相假借小國之事大國也德則其人也以德加已則以人道相事不德則其鹿也鋌而走險急何能擇鋌疾走貌言急則欲蔭茠於楚如鹿赴險命之罔極亦知亡矣言晉命無極將悉敝賦以待於儵唯執事命之儵晉鄭之境言欲以兵距晉文公二年六月壬申朝於齊鄭文二年六月壬申魯莊二十三年六月二十四日四年二月壬戍為齊侵蔡魯莊二十五年二月無壬戌壬戌三月二十日亦獲成於楚鄭與楚成居大國之間而從於强令豈其罪也令號令也大國若弗圗無所逃命晉使鞏朔行成於鄭趙穿公壻池晉侯女壻為質焉使二子質鄭以示信莒僕弑紀公紀公生僕又生季佗愛佗而黜僕且多行無禮于國僕因國人弑之以其寳玉來奔魯文公十八年納諸宣公公命與之邑曰今日必授季文子使司㓂出諸境曰今日必達公問其故季文子使太史克對曰先大夫臧文仲教行父事君之禮行父奉以周旋弗敢失隊曰見有禮於其君者事之如孝子之養父母也見無禮於其君者誅之如鷹鸇之逐鳥雀也先君周公制周禮曰則以觀德則法也合法則為吉德德以處事處猶制也事以度功度量也功以食民食養也作誓命曰毁則為賊誓要信也毁則壊法也掩賊為藏掩匿也竊賄為盗賄財也盗器為姦器國用也主藏之名以掩賊為名頼姦之用用姦器也為大㐫德有常無赦刑有常在九刑不忘誓命以下皆九刑之書九刑之書今無行父還觀莒僕莫可則也還猶周旋孝敬忠信為吉德盗賊藏姦為㐫德夫莒僕則其孝敬則弑君父矣則其忠信則竊寳玉矣其人則盗賊也其器則姦兆也兆域也保而利之則主藏也以訓則昏民無則焉不度於善度居也而皆在於㓙德是以去之昔髙陽氏有才子八人髙陽帝顓頊之號八人其苖裔蒼舒隤敳檮戭大臨尨降庭堅仲容叔達陶之字齊聖廣淵明允篤誠天下之民謂之八愷齊中也淵深也允信也篤厚也愷和也髙辛氏有才子八人髙辛帝嚳之號八人亦其苖裔伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍此即稷契朱虎熊羆之倫忠肅共懿宣慈惠和天下之民謂之八元肅敬也懿美也宣徧也元善也此十六族也世濟其美不隕其名濟成也隕隊也以至於堯堯不能舉舜臣堯舉八愷使主后土后土地官禹作司空平水土即主地之官以揆百事莫不時序地平天成揆度也成亦平也舉八元使布五教于四方契作司徒五教在寛故知契在八元之中父義母慈兄友弟共子孝内平外成内諸夏外夷狄昔帝鴻氏有不才子帝鴻黄帝掩義隱賊好行㓙德醜類惡物頑嚚不友是與比周醜亦惡也比近也周宻也天下之民謂之渾敦謂驩兠渾敦不開通之貌少皥氏有不才子少皥金天氏之號次黄帝毁信廢忠崇飾惡言靖譛庸回服讒蒐慝以誣盛德崇取也靖安也庸用也回邪也蒐隐也慝惡也盛德賢人也天下之民謂之窮竒謂共工其行窮其好竒顓頊氏有不才子不可教訓不知話言話善也告之則頑德義不入心舍之則嚚不道忠信傲狠明德以亂天常天下之民謂之檮杌謂鯀檮杌頑㓙無儔匹之貌此三族也世濟其㓙増其惡名以至於堯堯不能去方以宣公比堯行父比舜故言堯亦不能去湏賢臣而除之縉雲氏有不才子縉雲黄帝時官名貪於飲食冒於貨賄侵欲崇侈不可盈厭聚歛積實不知紀極不分孤寡不恤窮匱冒亦貪也盈滿也實財也天下之民以比三㓙非帝子孫故别以比三㓙謂之饕餮貪財為饕貪食為餮舜臣堯為堯臣賔於四門闢四門達四聰以賔禮衆賢流四㓙族案四㓙罪狀而流放之渾敦窮竒檮杌饕餮投諸四裔以禦魑魅投棄也裔逺也放之四逺使當魑魅之災魑魅山林異氣所生為人害者是以堯終而天下如一同心戴舜以為天子以其舉十六相去四㓙也故虞書數舜之功曰慎徽五典五典克從無違教也徽美也典常也此八元之功也曰納於百揆百揆時序無廢事也此八愷之功曰賔於四門四門穆穆無㓙人也流四㓙功舜有大功二十而為天子舉十六相去四㓙也今行父雖未獲一吉人去一㓙矣於舜之功二十之一也庻㡬免於戾乎知罃晉大夫邲之戰魯宣公十二年楚獲知罃晉人歸楚公子糓臣與連尹㐮老之尸於楚以求知罃於是荀首佐中軍矣荀首知罃父故楚人許之王送知罃曰子其怨我乎對曰二國治戎臣不才不勝其任以為俘馘執事不以釁鼓使歸即戮君之惠也臣實不才又誰敢怨王曰然則德我乎對曰二國圖其社稷而求紓其民紓綏也各懲其忿以相宥也宥赦也兩釋纍囚以成其好纍繋也二國有好臣不與及其誰敢德言二國本不為已王曰子歸何以報我對曰臣不任受怨君亦不任受德無怨無德不知所報王曰雖然必報不糓對曰以君之靈纍臣得歸骨於晉寡君之以為戮死且不朽戮其不勝任若從君之惠而免之以賜君之外臣首稱於異國君曰外臣首其請於寡君而以戮於宗亦死且不朽若不獲命君不許戮而使嗣宗職嗣其祖宗之位職次及於事而帥偏師以脩封疆雖遇執事遇楚將帥其弗敢違違辟也其竭力致死無有二心以盡臣禮所以報也王曰晉未可與争重為之禮而歸之國佐齊大夫晉師從齊師入自丘輿擊馬陘魯成公二年丘輿馬陘皆齊邑齊侯使賔媚人賂以紀甗玉磬與地媚人國佐也甗玉磬皆滅紀所得不可則聽客之所為賔媚人致賂晉人不可曰必以蕭同叔子為質同叔蕭君之字齊侯外祖父子女也難斥言其母故逺言之而使齊之封内盡東其畆使壟畆東西行對曰蕭同叔子非他寡君之母也若以匹敵則亦晉君之母也吾子布大命於諸侯而曰必質其母以為信其若王命何言違王命且是以不孝令也詩曰孝子不匱永錫爾類詩大雅言孝子不乏者又能以孝道長賜其同類若以不孝令於諸侯其無乃非德類也乎不以孝德賜同類先王疆理天下物土之宜而布其利疆界也理正也物土之宜播殖之物各從土宜故詩曰我疆我理南東其畆詩小雅或南或東從其土宜今吾子疆理諸侯而曰盡東其畝而已唯吾子戎車是利晉之伐齊循壟東行易無顧土宜其無乃非先王之命也乎反先王則不義何以為盟主其晉實有闕闕失四王之王也禹湯文武樹德而濟同欲焉樹立也濟成也五伯之覇也夏伯昆吾啇伯大彭豕韋周伯齊桓晉文勤而撫之以役王命役事也今吾子求合諸侯以逞無疆之欲疆竟也詩曰布政優優百祿是遒詩頌殷湯布政優和故百祿來聚遒聚也子實不優而棄百禄諸侯何害焉言不能為諸侯害不然不見許寡君之命使臣則有辭矣曰子以君師辱於敝邑不腆敝賦以犒從者戰而曰犒為孫辭畏君之震師徒撓敗震動撓屈也吾子惠徼齊國之福不冺其社稷使繼舊好唯是先君之敝器土地不敢愛子又不許請收合餘燼燼火餘木背城借一欲於城下復借一戰敝邑之幸亦云從也况其不幸敢不唯命是聽言完全之時尚不敢違晉命若不幸則從命郤至晉大夫如楚聘且莅盟魯成公十二年楚子饗之子反相為地室而縣焉縣鐘鼓也郤至將登登堂金奏作於下擊鐘而奏樂驚而走出子反曰日云莫矣寡君湏矣吾子其入也賔曰君不忘先君之好施及下臣貺之以大禮重之以備樂貺賜也如天之福兩君相見何以代此下臣不敢言此兩君相見之禮子反曰如天之福兩君相見無亦唯是一矢以相加遺焉用樂言兩君戰乃相見無用此樂寡君湏矣吾子其入也賔曰傳諸交譲得賔主辭者多曰賔主以明之若譲之以一矢禍之大者其何福之為世之治也諸侯間於天子之事則相朝也王事間缺則修私好於是乎有享宴之禮享以訓共儉享有體薦設儿而不倚爵盈而不飲肴乾而不食所以訓共儉宴以示慈惠宴則折爼相與共食共儉以行禮而慈惠以布政政以禮成民是以息百官承事朝而不夕不夕言無事此公侯之所以干城其民也干蔽也言享宴結好鄰國所以蔽干其民故詩曰赳赳武夫公侯干城赳赳武貌干扞也言公侯之與武夫止於扞難而已及其亂也諸侯貪冒侵欲不忌争尋常以盡其民八尺曰尋倍尋曰常言爭尺丈之地以相攻伐畧其武夫以為巳腹心股肱爪牙略聚也言世亂則公侯制禦武夫以從巳志使侵害鄰國為摶噬之用故詩曰赳赳武夫公侯腹心舉詩之正以駮亂義詩言治世則武夫能合德公侯外為扞城内制其腹心天下有道則公侯能為民干城而制其腹心亂則反之略其武夫以為巳腹心爪牙今吾子之言亂之道也不可以為法然吾子主也至敢不從遂入卒事呂相晉大夫魏錡之子晉侯伐秦魯成公十三年使呂相絕秦盖口宣巳命曰昔逮我獻公及穆公晉獻公秦穆公相好戮力同心申之以盟誓重之以婚姻穆公夫人獻公之女天禍晉國文公如齊惠公如秦辟驪姬也不言狄梁舉所恃大國無禄獻公即世穆公不忘舊德俾我惠公用能奉祀于晉僖十年秦納惠公又不能成大勲而為韓之師僖十五年秦伐晉獲惠公亦悔于厥心用集我文公集成也是穆之成也成功於晉文公躬擐甲胄䟦履山川草行為䟦踰越險阻征東之諸侯虞夏商周之𦙍而朝諸秦則亦既報舊德矣鄭人怒君之疆埸我文公帥諸侯及秦圍鄭晉自以鄭貳於楚故圍之鄭非侵秦也晉以此誣秦事在僖三十年秦大夫不詢於我寡君擅及鄭盟詢謀也盟者秦伯謙言大夫諸侯疾之將致命於秦致死命而討秦時無諸侯盖諸侯遥致此意文公恐懼綏靜諸侯秦師克還無害則是我有大造於西也造成也言晉有成功於秦無祿文公即世穆為不弔不見弔傷蔑死我君寡我㐮公寡弱也迭我殽地奸絕我好伐我保城殄滅我費滑伐保城誣之費滑滑國都於費今緱氏縣散離我兄弟撓亂我同盟滑晉同姓傾覆我國家我㐮公未忘君之舊勲納文公之勲而懼社稷之隕是以有殽之師在僖三十三年猶願赦罪於穆公晉欲求解於秦穆公弗聼而即楚謀我天誘其𠂻成王隕命秦使鬭克歸楚求成事見文十四年文元年楚弑成王穆公是以不克逞志于我逞快穆㐮即世康靈即位文六年晉㐮秦穆皆卒康公我之自出晉外甥又欲闕剪我公室傾覆我社稷帥我蟊賊以來蕩揺我邉疆蟊賊食禾稼蟲名謂秦納公子雍我是以有令狐之役在文七年康猶不悛入我河曲悛改也伐我洓川俘我王官洓水出河東聞喜縣西南至蒲坂縣入河剪我羈馬我是以有河曲之戰在文十二年東道之不通則是康公絶我好也言康公自絶故不復東通晉及君之嗣也君秦桓公我君景公引領西望曰庻撫我乎望秦撫恤晉君亦不惠稱盟不肯稱晉望而惠盟利吾有狄難謂晉滅潞氏時入我河縣焚我箕郜芟夷我農功夷傷也䖍劉我邉垂䖍劉皆殺也我是以有輔氏之聚聚衆也在宣十五年君亦悔禍之延延長也而欲徼福于先君獻穆晉獻秦穆使伯車來命我景公伯車秦桓公子曰吾與汝同好棄惡復修舊德以追念前勲言誓未就景公即世我寡君是以有令狐之㑹令狐㑹在十一年申厲公之命宜言寡人稱君誤也君又不祥祥善也背棄盟誓白狄及君同州及與也君之仇讎而我之婚姻也季隗廧咎如赤狄之女也白狄伐而獲之納諸文公君來賜命曰吾與女伐狄寡君不敢顧婚姻畏君之威而受命于使君有二心於狄曰晉將伐女狄應且憎是用告我言狄雖應答秦而心實憎秦無信楚人惡君之二三其德也亦來告我曰秦背令狐之盟而來求盟于我昭告昊天上帝秦三公楚三王三公穆康共三王成穆莊曰余雖與晉出入出入猶徃來余惟利是視不榖惡其無成德是用宣之以懲不一諸侯備聞此言斯是用痛心疾首暱就寡人疾亦痛也暱親也寡人帥以聽命唯好是求君若惠顧諸侯矜哀寡人而賜之盟則寡人之願也其承寜諸侯以退承君之意以寕静諸侯豈敢徼亂徼要也君若不施大惠寡人不佞其不能以諸侯退矣敢盡布之執事俾執事實圖利之俾使也秦桓公既與厲公為令狐之盟而又召狄與楚欲道以伐晉諸侯是以睦於晉晉辭多誣秦故傳據此三事以正秦罪子叔聲伯魯大夫季文子㑹諸侯伐鄭魯成公十六年宣伯使告郤犨曰魯之有季孟猶晉之有欒范也政令於是乎成今其謀曰晉政多門不可從也政不由君寜事齊楚有亡而已蔑從晉矣蔑無也若欲得志於魯請止行父而殺之行父季文子也我斃蔑也蔑孟獻子時留守公宮而事晉蔑有貳矣魯不貳小國必睦不然歸必叛矣九月晉人執季文子于苕丘公還待於鄆鄆魯西邑東郡廪丘縣東有鄆城使子叔聲伯請季孫於晉郤犨曰茍去仲孫蔑而止季孫行父吾與子國親於公室親魯甚於晉公室對曰僑如之情子必聞之矣聞其滛慝情若去蔑與行父是大棄魯國而罪寡君也若猶不棄而惠徼周公之福使寡君得事晉君則夫二人者魯國社稷之臣也若朝亡之魯必夕亡以魯之宻邇仇讐仇讐謂齊楚亡而為讐治之何及言魯屬齊楚則還為晉讐郤犨曰吾為子請邑對曰嬰齊魯之常𨽻也𨽻賤官敢介大國以求厚焉介因也承寡君之命以請承奉也若得所請吾子之賜多矣又何求范文子謂欒武子曰季孫於魯相二君矣二君宣成妾不衣帛馬不食粟可不謂忠乎信讒慝而棄忠良若諸侯何子叔嬰齊奉君命無私不受郤犨請邑謀國家不貳謂四日不食以堅事晉圖其身不忘其君辭邑不食皆先君而後身若虚其請是棄善人也子其圖之乃許魯平赦季孫孟獻子魯大夫㐮公如晉四年聽政受貢賦多少之政晉侯享公公請屬鄫鄫小國也欲得使屬魯如須句顓臾之比使助魯出貢賦公時年七歳盖相者為之言鄫今琅邪鄫縣晉侯不許孟獻子曰以寡君之宻邇於仇讐而願固事君無失官命晉官徴發之命鄫無賦於司馬晉司馬又掌諸侯之賦為執事朝夕之命敝邑敝邑褊小闕而為罪寡君是以願借助焉借鄫以自助晉侯許之季武子魯大夫魯㐮公㑹晉人伐鄭九年次於陰口而還公送晉侯晉侯以公享于河上問公年季武子對曰㑹於沙隨之嵗寡君以生沙隨在成十六年晉侯曰十二年矣是謂一終一星終也嵗星十二歳而一周天國君十五而生子冠而生子禮也冠成人之服故必冠而後生子君可以冠矣大夫盍為冠具武子對曰君冠必以祼享之禮行之祼謂灌鬯酒也享祭先君也以金石之樂節之以鐘磬為舉動之節以先君之祧處之諸侯以始祖之廟為祧今寡君在行未可具也請及兄弟之國而假借焉晉侯曰諾公還及衛冠於成公之廟成公今衛獻公之曽祖從衛所處假鐘磬焉禮也臧孫紇魯大夫晉伐鄭鄭人聽命晉與鄭盟魯㐮公十一年晉侯使叔肹告于諸侯叔肹叔向也告諸侯亦使赦鄭囚公使臧孫紇對曰凡我同盟小國有罪大國致討茍有以藉手鮮不赦宥寡君聞命矣言晉討小國有藉手之功則赦其罪人德義如是不敢不承命晏桓子齊大夫周靈王求后于齊魯襄公十二年齊侯問對於晏桓子桓子對曰先王之禮辭有之天子求后於諸侯諸侯對曰夫婦所生若而人不敢譽亦不敢毁故曰若人妾婦之子若而人言非適也無女而有姊妹及姑姊妹則曰先守某公之遺女若而人齊侯許婚王使陰里結之陰里周大夫結成也石􅎢為太宰與大夫良霄為楚所執言於子􅌩魯㐮公十三年曰先王卜征五年先征五年而卜吉㓙也征謂廵守征行而嵗習其祥祥習則行五年五卜皆同吉乃廵守不習則増修德而改卜不習謂卜不吉今楚實不競行人何罪不能修德與晉競止鄭一卿以除其偪一卿良霄使睦而疾楚以固於晉焉用之位不偪則大臣睦怨疾楚則事晉固使歸而廢其使行而見執於楚鄭又遂堅事晉是廢鄭本見使之意怨其君以疾其大夫而相牽引也不猶愈乎楚人歸之太叔儀衛大夫衛侯出奔齊魯㐮公十四年公使厚成叔弔于衛曰寡君使瘠聞君不撫社稷而越在他竟越逺也瘠厚成叔名若之何不弔以同盟之故使瘠敢私於執事執事衞諸大夫曰有君不弔弔恤也有臣不敏敏達也君不赦宥臣亦不帥職増滛發洩其若之何衛人使太叔儀對曰羣臣不佞得罪於寡君寡君不以即刑而悼棄之以為君憂君不忘先君之好辱弔羣臣又重恤之重恤謂愍其不逹也敢拜君命之辱重拜大貺謝重恤之賜厚孫歸復命語臧武仲曰衛君其必歸乎有太叔儀以守守於國有母弟鱄以出或撫其内或營其外能無歸乎穆叔魯大夫如晉聘魯㐮公十六年且言齊故言齊再伐魯晉人曰以寡君之未禘祀禘祀三年䘮畢之吉祭與民之未息新伐許及楚不然不敢忘穆叔曰以齊之朝夕釋憾於敝邑之地是以大請敝邑之急朝不及夕引領西望曰庻㡬乎庻㡬晉來救比執事之間恐無及也見中行獻子賦圻父圻父詩小雅周司馬掌封畿之兵甲故謂之圻父詩人責圻父為王爪牙不修其職使百姓受困苦之憂而無所止居獻子曰偃知罪矣敢不從執事以同恤社稷而使魯及此及此憂見范宣子賦鴻雁之卒章鴻雁卒章曰鴻雁于飛哀鳴嗸嗸惟此哲人謂我劬勞言魯憂困嗸嗸然若鴻雁之失所大曰鴻小曰雁宣子曰匄在此敢使魯無鳩乎鳩集欒盈晉大夫出奔楚魯㐮公二十一年過於周周西鄙掠之刼掠財物辭於行人王行人也曰天子陪臣盈諸侯之臣稱於天子曰陪臣得罪於王之守臣范宣子為王所命故曰守臣將逃罪罪重於郊甸重得罪於郊甸謂為郊甸所侵掠也郭外曰郊郊外曰甸無所伏竄敢布其死布陳也昔陪臣書能輸力於王室王施惠焉輸力謂輔相晉國翼戴天子其子黶不能保任其父之勞大君若不棄書之力亡臣猶有所逃大君謂天王若棄書之力而思黶之罪臣戮餘也罪戮之餘將歸死於尉氏尉氏討姦之官不敢還矣敢布四體唯大君命焉布四體言無所隐王曰尤而效之其又甚焉尤晉逐盈而自掠之是效尤使司徒禁掠欒氏者歸所取焉使候出諸轘轅候送迎賔客之官也轘轅關在緱氏縣東南子産為鄭少正少正鄭卿官也晉人徵朝于鄭召鄭使朝魯㐮公二十二年鄭人使子産對曰在晉先君悼公九年我寡君於是即位魯㐮八年即位八月即位年之八月而我先大夫子駟從寡君以朝於執事執事不禮於寡君言朝於執事謙不敢斥晉侯寡君懼因是行也我二年六月朝於楚因朝晉不見禮生朝楚心晉是以有戲之役在九年楚人猶競而申禮於敝邑敝邑欲從執事而懼為大尤曰晉其謂我不共有禮是以不敢擕貳於楚我四年三月先大夫子蟜又從寡君以觀釁於楚實朝言觀釁飾辭言欲徃觀楚知可去否晉於是乎有蕭魚之役在十一年謂我敝邑邇在晉國譬諸草木吾臭味也晉鄭同姓故而何敢差池差池不齊一楚亦不競寡君盡其土實土地所有重之以宗器宗廟禮樂之器鐘磬之屬以受齊盟齊同也遂帥羣臣隨於執事以㑹嵗終朝正貳於楚者子侯石孟歸而討之石孟石􅎢溴梁之明年溴梁在十六年子蟜老矣公孫夏從寡君以朝於君見於嘗酎酒之新熟重者為酎嘗新飲酒為嘗酎與執膰焉間二年聞君將靖東夏謂二十年澶淵盟四月又朝以聽事期先澶淵二月徃朝以聽㑹期不朝之間無嵗不聘無役不從以大國政令之無常國家罷病不虞薦至薦仍也無日不惕豈敢忘職惕懼也大國若安定之其朝夕在庭何辱命焉言自將徃不須來召若不恤其患而以為口實口實但有其言而已其無乃不堪任命而翦為仇讐翦削也謂見剥削不堪命則成仇讐敝邑是懼其敢忘君命委諸執事執事實重圗之子産有辭所以免大國之討是時晉范宣子為政諸侯之幣重鄭人病之鄭伯如晉魯㐮公二十四年子産寓書於子西以告宣子寓寄也曰子為晉國四鄰諸侯不聞令德而聞重幣僑也惑之僑聞君子長國家者非無賄之患而無令名之難夫諸侯之賄聚於公室則諸侯貳貳離若吾子頼之則晉國貳頼恃用之諸侯貳則晉國壊晉國貳則子之家壊何没没也没没沉滅之意將焉用賄夫令名德之輿也德須令名以逺聞德國家之基也有基無壊無亦是務乎有德則樂樂則能乆詩云樂只君子邦家之基有令德也夫言君子樂美其道為邦家之基所以濟令德上帝臨女無貳爾心有令名也夫言武王為天所臨不敢懐貳心所以濟令名恕思以明德則令名載而行之是以逺至邇安無寜使人謂子子實生我無寜寜也而謂子浚我以生乎浚取也言取我財以自生象有齒以焚其身賄也焚斃也宣子説乃輕幣明年子産伐陳遂入之獻捷于晉獻入陳之功而不獻其俘戎服將事戎服軍旅之衣異於朝服晉人問陳之罪對曰昔虞閼父為周陶正以服事我先王閼父舜之後當周之興閼父為武王陶正我先王頼其利器用也與其神明之後也舜聖故謂之神明庸以元女大姬配胡公庸用也元女武王之長女胡公閼父之子滿也而封諸陳以備三恪周得天下封夏殷二王後又封舜後謂之恪并二王後為三國其禮轉降示敬而已故曰三恪則我周之自出至於今是頼言陳周之甥至今頼周徳桓公之亂蔡人欲立其出陳桓公鮑卒於是陳亂事在魯桓公五年蔡出桓公之子厲公也我先君莊公奉五父而立之五父佗桓公弟殺太子免而代之鄭莊公因就定其位蔡人殺之欲立其出故我又與蔡人奉戴厲公奉戴猶奉事至於莊宣皆我之自立陳莊公宣公皆厲公子夏氏之亂成公播蕩又我之自入君所知也播蕩流移失所宣十一年陳夏徴舒弑靈公靈公之子成公奔晉自晉因鄭而入也今陳忘周之大德蔑我大惠棄我姻親介恃楚衆以馮陵我敝邑不可億逞億度也逞盡也我是以有徃年之告謂鄭伯稽首告晉請伐陳未獲成命未得伐陳命則有我東門之役前年陳從楚伐鄭東門當陳隧者井堙木刋敝邑大懼不競而耻大姬上辱大姬之靈天誘其𠂻啓敝邑心啟開也開道其心故得勝陳知其罪授手於我用敢獻功晉人曰何故侵小對曰先王之命唯罪所在各致其辟辟誅也且昔天子之地一圻方千里列國一同方百里自是以衰衰降也今大國多數圻矣若無侵小何以至焉晉人曰何故戎服對曰我先君武莊為平桓卿士武公莊公為周平王桓王卿士城濮之役文公布命曰各復厥職晉文公命我文公戎服輔王以授楚捷不敢廢王命故也城濮在僖二十八年士莊伯不能詰士莊伯士弱也復於趙文子文子曰其辭順犯順不祥乃受之其後子産相鄭伯以如晉魯襄公三十一年晉侯以魯䘮故未之見也子産使盡壊其館之垣而納車馬焉士文伯譲之曰敝邑以政刑之不修㓂盗充斥充滿斥見言其多無若諸侯之屬辱在寡君者何是以令吏人完客所館館舍也髙其閈閎閎門也厚其墻垣以無憂客使無令客使憂㓂盗今吾子壞之雖從者能戒其若異客何以敝邑之為盟主繕完葺墻葺覆也以待賔客若皆毁之其何以共命寡君使匄請命謂問毁垣之命對曰以敝邑褊小介於大國介間也誅求無時誅責也是以不敢寜居悉索敝賦以來㑹時事隨時來朝㑹逢執事之不閒而未得見又不獲聞命未知見時不敢輸幣亦不敢暴露其輸之則君之府實也非薦陳之不敢輸也薦陳猶獻見也其暴露之則恐燥濕之不時而朽蠧以重敝邑之罪僑聞文公之為盟主也僑子産名文公晉重耳宮室卑庳無觀臺榭以崇大諸侯之館館如公寢庫廐繕修司空以時平易道路易治也圬人以時塓館宮室圬人塗者塓塗也諸侯賔至甸設庭燎庭燎設火於庭僕人廵宮廵宮行夜車馬有所有所處賔從有代代客役巾車脂轄巾車主車之官𨽻人牧圉各瞻其事瞻視客所當得百官之屬各展其物展陳也謂羣官各陳其物以待賔公不留賔而亦無廢事賔得速去則事不廢憂樂同之事則廵之廵行也教其不知而恤其不足賔至如歸無寜菑患言見遇如此寜當復有菑患耶無寜寜也不畏㓂盗而亦不患燥濕今銅鞮之宮數里銅鞮晉離宮而諸侯舍於𨽻人舍如𨽻人舍門不容車而不可踰越門庭之内廹迮又有墻垣之限盗賊公行而夭癘不戒癘猶災也言水潦無時賔見無時命不可知若又勿壞是無所藏幣以重罪也敢請執事將何所命之問晉命已所止之宜雖君之有魯䘮亦敝邑之憂也言鄭與魯亦有同姓之憂若獲薦幣薦進也修垣而行行去也君之惠也敢憚勤勞文伯復命反命於晉君趙文子曰信信如子産言我實不德而以𨽻人之垣以贏諸侯贏受也是吾罪也使士文伯謝不敏焉晉侯見鄭伯有加禮禮加敬厚其宴好而歸之乃築諸侯之館叔向曰辭之不可以己也如是夫子産有辭諸侯頼之若之何其釋辭也詩曰辭之輯矣民之恊矣辭之繹矣民之莫矣言辭輯睦則民恊同辭說繹則民安定莫猶定也其知之矣晉㑹諸侯於平丘魯昭公十三年及盟子産争承承貢賦之次曰昔天子班貢輕重以列列位也列尊貢重周之制也公侯地廣故所貢者多卑而貢重者甸服也甸服謂天子畿内共職貢者鄭伯男也而使從公侯之貢言鄭國在甸服外爵列伯子男不應出公侯之貢懼弗給也敢以為請諸侯靖兵好以為事靖息也行理之命行理使人通聘問者無月不至貢之無藝藝法制小國有闕所以得罪也諸侯修盟存小國也貢獻無極亡可待也存亡之制將在今矣自日中以争至於昏晉人許之其後鄭災魯昭公十八年子産授兵登陴晉之邉吏譲鄭曰鄭國有災晉君大夫不敢寜居卜筮走望不愛牲玉鄭之有災寡君之憂也今執事􅏌然授兵登陴􅏌然勁忿貌將以誰罪邊人恐懼不敢不告子産對曰若吾子之言敝邑之災君之憂也敝邑失政天降之災又懼讒慝之間謀之以啓貪人薦為敝邑不利薦重也以重君之憂幸而不亡猶可說也說解也不幸而亡君雖憂之亦無及也鄭有他竟望走在晉言鄭雖與他國接境每瞻望晉歸赴之既事晉矣其敢有二心明年駟偃卒駟偃鄭大夫子游娶於晉大夫生絲弱子游駟偃也弱㓜小其父兄立子瑕子瑕子游叔父駟乞子産憎其為人也憎子瑕且以為不順舍子立叔不順禮也弗許亦弗止許之為違禮止之為違衆故中立駟氏聳聳懼也他日絲以告其舅冬晉人使以幣如鄭問駟乞之立故駟氏懼駟乞欲逃子産弗遣請龜以卜亦弗予大夫謀對子産不待而對客曰鄭國不天不獲天福寡君之二三臣札瘥夭昏夭死曰札小疫曰瘥短折曰夭未名曰昏今又䘮我先大夫偃其子㓜弱其二三父兄懼隊宗主私族於謀而立長親於私族之謀宜立親之長者寡君與其二三老曰抑天實剝亂是吾何知焉言天自欲亂駟氏非國所知諺曰無過亂門民有兵亂猶憚過之而况敢知天之所亂今大夫將問其故抑寡君實不敢知其誰實知之平丘之㑹在十三年君尋舊盟曰無或失職若寡君之二三臣其即世者晉大夫而專制其位是晉之縣鄙也何國之為辭客幣而報其使晉人舍之遣人報晉使冊府元龜卷七百四十四
