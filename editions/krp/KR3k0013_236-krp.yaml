body:
  text: 册府元龜卷二百三十六宋王欽若等撰列國君部嗣襲昔三五之際封建列國而年祀茫昧墳典殘缺故其世系嗣襲不可得而詳也降及姬周史官謹職諸侯晉楚皆有記籍故孔子約魯史而脩春秋丘明爲之傳司馬遷又祖述其事列之以世家故其苖裔之嗣續子弟之繼及皆可得而徵矣至於以德以長之制年鈞義鈞之說或越次而承世嫡或自外而紹大宗或勸讓以興邦或承亂而纘緒自吳太伯而下以訖於六國咸有條而不紊云吳太伯武王追封為吳伯故曰吳太伯太伯弟仲雍周太王之子而王季歴之兄也季歴賢而有聖子昌太王欲立季歴以及昌於是太伯仲雍二人乃犇荆蠻文身斷髪示不可用常在水中故斷其髪文其身以象龍子故不見傷害以避季歴季歴果立是為王季而昌為文王太伯之犇于荆蠻自號勾吳勾吳太伯始所居也荆蠻義之從而歸之千餘家立為吳太伯太伯卒無子弟仲雍立是為吳仲雍仲雍卒子季簡立季簡卒子叔逹立叔逹卒子周章立是時周武王克殷求太伯仲雍之後得周章周章已君吳因而封之乃封周章弟虞仲於周之北故夏虗在河東太陽縣是為虞仲列為諸俟周章卒子熊遂立熊遂卒子柯相立柯相卒子强鳩夷立强鳩夷卒子餘橋疑吾立餘橋疑吾卒子柯盧立柯盧卒子周繇立周繇卒子屈羽立屈羽卒子夷吾立夷吾卒子禽處立禽處卒子轉立轉卒子頗高立頗高卒子句卑立是時晉獻公滅北虞公句卑卒子去齊立去齊卒子壽夢立而吳始益大稱王自太伯作吳五世而武王克殷封其後為二其一虞在中國其一吳在夷蠻十五世而晉滅中國之虞中國之虞滅二世而夷蠻之吳興大凡從太伯至壽夢十九世壽夢二十五年卒壽夢有四子長曰諸樊次曰餘祭次曰餘昧次曰季札壽夢知季札賢欲立之季札讓於是乃立長子諸樊攝行事當國諸樊立十三年卒有命授弟餘祭欲以次傳季札餘祭立十七年卒弟餘昧立餘昧立四年卒欲授弟季札季札逃去吳人乃立餘昧子僚為王諸樊之子公子光常以為吾父兄弟四人當傳至季子季子即不受國光當立隂納賢士欲以襲王僚十三年光弑僚自立為王是為闔閭十九年與越戰傷而死子夫差立二十三年越敗吳夫差自剄死吳遂滅齊太公望呂尚者東海上人吕氏春秋曰東夷之士其先祖嘗為四嶽佐禹平水土甚有功虞夏之際封於吕吕在南陽宛縣西或封於申姓姜氏夏商之時申吕或封枝庶子孫或為庶人尚其後苖裔也本姓姜氏從其封姓故曰吕尚佐武王伐紂謀居多武王王天下封於齊尚卒子丁公伋伋作及立丁公卒子乙公得立乙公卒子癸公慈母立癸公卒子哀公不辰立哀公紀侯譛之周周烹哀公立其弟静是為胡公當周夷王之時哀公同母少弟山襲殺胡公而自立是為獻公獻公立九年卒子武公壽立武公立二十六年卒子厲公無忌立九年厲公暴虐故胡公子復入齊攻殺厲公胡公子亦戰死齊人立厲公子赤是為文公文公十二年卒子成公脫立成公九年卒子莊公購立莊公六十四年卒子釐公祿甫立釐公三十三年卒子襄公諸兒立襄公十二年釐公弟子公孫無知弑襄公而自立雍林人襲殺無知襄公次弟小白自莒入高傒立之是為桓公桓公立四十三年卒桓公子十餘人長衛姬生無詭少衛姬生惠公元鄭姬生孝公昭葛嬴生昭公潘密姬生懿公商人宋華子生公子雍桓公與管仲屬孝公於宋襄公以為太子桓公卒易牙與竪刁立公子無詭無詭立三月宋襄公率諸侯兵伐齊立公子昭是為孝公孝公十年卒孝公弟潘殺孝公子而立是為昭公十九年卒子舍立昭公之弟商人殺舍而自立是為懿公四年齊人殺懿公迎公子元於衛立之是為惠公惠公十年卒子頃公無野立頃公十七年卒子靈公環立靈公娶于魯曰顔懿姬無子其姪鬷聲姬生光以為太子兄子曰姪顔鬷皆二姬母姓因以為號懿聲皆諡諸子仲子戎子戎子嬖諸子諸妾姓子者二子皆宋女仲子生牙屬諸戎子屬託之戎子請以為太子許之齊侯許之仲子曰不可廢常不祥廢立嫡之常間諸侯難事難成也光之立也列於諸侯矣列諸侯之㑹今無故而廢之是專黜諸侯謂光已有諸侯之尊而以難犯不祥也君必悔之公曰在我而已遂東太子光徙之東陲也使高厚傳牙以為太子夙沙衛為少傳二十八年靈公疾崔杼迎公子光而立之是為莊公莊公六年崔杼弑莊公而立莊公異母弟杵臼是為景公五十八年夏景公夫人燕姬適子死景公寵妾芮姬生子荼荼少母賤無行諸大夫恐其為嗣乃言擇諸子長者賢者為太子景公老惡言嗣事又愛荼母欲立之憚發之口乃謂諸大夫曰為樂耳國何患無君乎秋景公病命國惠子高昭子立少子荼為太子逐諸子遷萊萊齊東鄙邑景公卒太子荼立是為晏孺子景公子陽生奔魯晏孺子元年八月田乞召公子陽生於魯而立之是為悼公悼公四年鮑子弑悼公齊人共立悼公子壬是為簡公一云簡公壬者景公之子也簡公四年田常弑簡公立簡公之弟驁是為平公平公二十五年卒子宣公積立宣公五十一年卒子康公貸立康公十九年田常魯孫田和始為諸侯遷康公海濱二十六年康公卒呂氏遂絶其祀魯周公旦者周武王弟也以太王所居周地為其采邑故為周公自文王在時旦為子孝篤仁異於羣子及武王即位旦常輔翼武王用事甚多武王九年東伐至盟津周公輔行十一年伐紂至牧野周公佐武王作牧誓破殷入商宫已殺紂武王徧封功臣同姓戚者封周公旦於少昊之虚曲阜是為魯公周公不就封留佐武王子伯禽受封之魯是為魯公伯禽卒子考公酋立考公四年卒立弟熈是為焬公焬公六年卒子幽公宰立幽公十四年幽公弟㵒殺幽公而自立是為魏公世本作微公魏公五十年卒子厲公擢立厲公三十七年卒魯人立其弟具是為獻公獻公三十二年卒子真公濞立眞公三十年卒弟敖立是為武公武公九年春武公與長子括少子戲西朝周宣王宣王愛戲欲立戲為魯太子周之樊仲山父諫宣王曰廢長立少不順不順必犯王命犯王命必誅故出令不可不順也令之不行政之不立令不行則政不立行而不順民將棄上使長事少故民將棄上夫下事上少事長所以為順今天子建諸侯立其少是教民逆也言不教之順而教之逆若魯從之諸侯效之王命將有所壅言先王立長之命將壅塞不行也若弗從而誅之是自誅王命也先王之命立長今魯亦立長若誅之是自誅王命誅之亦失不誅亦失誅之誅王命不誅則王命廢王其圖之宣王弗聽卒立戲為魯太子夏武公歸而卒戲立是為懿公懿公九年括之子伯御與魯人殺懿公而立伯御為君伯御立十一年周宣王伐魯殺伯御而問魯公子能道順一作訓諸侯者以為魯後樊穆仲曰穆仲仲山父之諡也魯懿公弟稱肅恭明神敬事耆老賦事行刑必問於遺訓而咨於固實固一作故不干所問不犯所知宣王曰然能訓治其民矣乃立稱於夷宫夷宫者宣王祖夷王之廟古者爵命必於祖廟是為孝公孝公二十七年卒子弗湟一云弗生立是為惠公惠公四十六年卒惠公元妃孟子卒繼室以聲子生子息宋武公生仲子仲子生而有文在其手曰為魯夫人故仲子歸於我生子允而惠公薨是以息攝當國行君事是為隱公隱公十一年公子翬殺隱公而立公弟允是為桓公桓公十八年公如齊齊襄公饗公公醉使公子彭生摺其脅公死于車立太子同是為莊公莊公立三十二年卒子班立莊公弟慶父使人殺班立莊公子開是為湣公湣公二年慶父使卜齮襲殺湣公莊公弟季友奉莊公子申立之是為釐公釐公立三十三年卒子興立是為文公文公十八年卒文公有二妃齊女哀姜生子惡及視次妃敬嬴嬖愛生子倭一作綏文公卒公子遂殺子惡及視而立倭是為宣公十八年卒子成公黑肱立十八年卒子襄公午立襄公年三歲而立三十一年襄公卒其九月太子毁卒魯人立齊歸之子稠一名袑是為昭公昭公年十九猶有童心穆叔不欲曰稠非適嗣且又居喪不戚而有喜色若果立必為季氏憂季武子弗聽卒立之二十五年九月昭公伐季氏弗勝奔於齊齊伐魯取鄆而居昭公二十八年晉止昭公於乾侯三十二年而昭公卒於乾侯魯人立其弟宋是為定公十五年卒子蔣立是為哀公二十七年哀公患三桓欲因諸侯以刼之公如陘氏三桓攻公公奔于衛去如鄒遂如越國人迎哀公復國卒於有山氏子悼公寧立魯如小侯卑於三桓之家三十七年悼公卒子元公嘉立二十一年卒子穆公顯立三十三年卒子共公奮立二十二年卒子康公屯立九年卒子景公匽立二十九年卒子平公叔立是時六國皆稱王二十二年平公卒子文公賈立二十三年卒子傾公讐立二十四年楚考烈王伐滅魯傾公亡遷於卞邑一作下為家人魯絶祀傾公卒于柯魯起周公至傾公凡三十四世燕召公奭與周同姓姬氏周之支子食邑於召謂之召公周武王滅紂封於北燕有南燕故云北燕自召公以下九世至惠侯惠侯卒子釐侯立三十六年釐侯卒子頃侯立頃侯二十四年卒子哀侯立哀侯二年卒子鄭侯立鄭侯三十六年卒子繆侯立繆侯十八年卒子宣侯立宣侯十三年卒子桓侯立古史考曰世家自宣侯以下不説其屬以其難明故也桓侯七年卒子莊公立莊公三十三年卒子襄公立襄公四十年卒桓公立桓公十六年卒宣公立宣公十五年卒昭公立昭公十三年卒武公立武公十九年卒文公立文公六年卒懿公立懿公四年卒子惠公立六年惠公多寵姬欲去諸大夫而立寵姬宋大夫共誅姬宋惠公懼奔齊四年齊高偃如晉請共伐燕入其君晉平公許與齊伐燕入惠公年表公欲立幸臣公卿誅幸臣公恐出奔齊惠公至燕而死左氏云燕君多嬖寵欲去諸大夫而立其寵人燕大夫比以殺公之外嬖公懼奔齊燕人立悼公悼公七年卒共公立共公五年卒平公立平公十九年卒簡公立簡公十二年卒獻公立獻公二十八年卒孝公立孝公十五年卒成公立成公十六年卒湣公立湣公三十一年卒釐公立釐公三十年卒桓公立桓公十一年卒文公立文公二十九年卒太子立是為易王易王立十二年卒子燕噲立噲立五年以國讓其臣子之三年國大亂將軍市被與太子平謀攻子之不克市被死因搆難數月死者數萬衆齊王令章子將兵伐燕燕君噲死子之亡二年燕人共立太子平是為燕昭王昭王三十三年卒子惠王立惠王七年卒武成王立武成王十四年卒子孝王立孝王三年卒子今王喜立二十三年太子丹質於秦亡歸燕二十五年秦滅韓王二十七年秦虜趙王遷滅趙燕見秦且滅六國秦兵臨易水禍且至燕太子丹陰養壯士二十人使荆軻獻督亢地圖於秦因襲刺秦王秦王覺殺軻使將軍王翦擊燕二十九年秦拔我薊燕王亡徙居遼東斬丹以獻秦三十三年秦㧞遼東虜燕王喜卒滅燕蔡叔度者周文王子而武王同母弟也武王已克殷紂封叔度於蔡世本曰居上蔡後成王少周公旦專王室管叔蔡叔挾紂子武庚作亂周公誅武庚而放蔡叔遷之蔡叔既遷而死其子曰胡胡乃改行率德馴善周公聞之而舉胡以為魯卿士魯國治於是周公言於成王復封胡於蔡以奉蔡叔之祀是為蔡仲蔡仲卒子蔡伯荒立荒卒子宫侯立宫侯卒子厲侯立厲侯卒子武侯立武侯卒子夷侯立夷侯二十八年卒子釐侯所事立四十八年卒子共侯興立二年卒子戴侯立十年卒子宣侯措父立三十五年卒子桓侯封人立二十年卒弟哀侯獻舞立哀侯十一年楚文王擊蔡虜哀侯留九歲死於楚凡立二十年卒蔡人立其子肹是為繆侯二十九年卒子莊侯甲午立三十四年卒子文侯申立二十年卒子景侯同立二十九年太子般殺景侯而自立是為靈侯靈侯十二年楚靈王誘蔡靈侯於申伏甲飲之醉而殺之令公子棄疾滅蔡三歲楚公子棄疾立為楚平王乃求蔡景侯少子廬立之是為平侯平侯九年卒靈侯般之孫東國攻平侯子而自立是為悼侯悼侯三年卒弟昭侯申立二十六年吳遷蔡于州來二十八年昭侯將朝於吳大夫恐其復遷乃令賊殺昭侯而立昭侯子朔是為成侯十九年成侯卒子聲侯産立聲侯十五年卒子元侯立元侯六年卒子侯齊立侯齊四年楚惠王滅蔡侯齊卒蔡遂絶祀曹叔振鐸者周武王弟也武王克殷紂封叔振鐸於曹叔振鐸卒子太伯脾立太伯卒子仲君平立仲君平卒子宫伯侯立宫伯侯卒子孝伯雲立雲卒子夷伯喜立夷伯三十年卒弟幽伯强立幽伯九年弟蘇殺幽伯代立是為戴伯戴伯三十年卒子惠伯兕立三十六年卒子石甫立其弟武殺之代立是為繆公繆公三年卒子桓公終生立一作終湦湦音生五十五年卒子莊公夕姑立三十一年卒子釐公夷立九年卒子昭公班立九年卒子共公襄立三十五年卒子文公壽立文公二十三年卒子宣公疆立宣公十七年卒弟成公負芻立二十三年卒子武公勝立二十七年卒子平公頃立平公四年卒子悼公午立九年悼公朝於宋宋囚之曹立其弟野是為聲公悼公死於宋歸葬聲公五年平公弟通弑聲公代立是為隱公隱公四年聲公弟露弑隱公代立是為靖公靖公四年卒子伯陽立十五年宋滅曹執曹伯陽以歸曹遂絶祀陳胡公滿者虞帝舜之後也昔舜為庶人時堯妻之以二女居于媯汭其後因為氏姓姓媯氏舜傳禹天下而舜子商均為封國夏后時或失或續至於周武王克殷紂復求舜後乃得媯滿封之於陳以奉帝舜祀是為胡公胡公卒子申公犀侯立申公卒弟相公臯羊立相公卒立申公子突是為孝公孝公卒子慎公圉戎立慎公卒子幽公寧立二十三年卒子釐公孝立釐公三十六年卒子武公靈立十五年卒子夷公說立三年卒弟平公燮立二十三年卒子文公圉立文公元年取蔡女生子佗十年文公卒長子桓公鮑立三十八年桓公卒桓公弟佗其母蔡女故蔡人為佗殺五父及桓公太子免而立佗是為厲公厲公二年生子敬仲完厲公取蔡女蔡女與蔡人亂厲公數如蔡滛七年厲公所殺桓公太子免之三弟長曰躍中曰林少曰杵臼共令蔡人誘厲公以好女與蔡人共殺厲公而立躍是為利公利公立五月卒立中弟林是為莊公七年卒少弟杵臼立是為宣公二十一年宣公後有嬖姬生子款欲立之乃殺其太子禦㓂禦㓂素愛厲公子完完乃奔齊四十五年宣公卒子款立是為穆公十六年卒子共公朔立十八年卒子靈公平國立十四年靈公與其大夫孔寧儀行父皆通於夏姬十五年靈公與二子飲於夏氏公戲二子曰徵舒似汝二子曰亦似公徵舒怒靈公罷酒出徵舒伏弩廐門射殺靈公孔寧儀行父皆奔楚靈公太子午奔晉徵舒自立為陳侯楚莊王為夏徵舒殺靈公率諸侯伐陳謂陳曰無驚吾誅徵舒而已已誅徵舒因縣陳而有之羣臣畢賀申叔時使於齊來還獨不賀莊王問其故對曰語有之牽牛蹊人田田主奪之牛蹊則有罪矣奪之牛不亦甚乎今王以徵舒為賊弑君故徵兵諸侯以義伐之已而取之以利其地則後何以令於天下是以不賀莊王曰善乃迎陳靈公太子午於晉而立之復君陳如故是為成公成公卒子哀公弱立初哀公娶鄭長姬生悼太子師少姬生偃二嬖妾長妾生留少妾生勝留有寵哀公屬之弟司徒招三十四年哀公病三月招殺悼太子立留為太子哀公怒欲誅招招發兵圍守哀公哀公自經殺徐廣曰三十五年也招卒立留為陳君四月陳使使赴楚楚靈王聞陳亂乃殺陳使者使公子棄疾發兵伐陳陳君留奔鄭九月楚圍陳十一月滅陳使棄疾為陳公招之殺悼太子也太子之子名吳出奔晉晉平公問太史趙曰陳遂亡乎對曰陳顓頊之族陳氏得政於齊乃卒亡自幕至于瞽䏂無違命舜重之以明德至於遂世守之及胡公周賜之姓使祀虞帝且盛德之後必百世祀虞之世未也其在齊乎楚靈王滅陳五歲楚公子棄疾弑靈王代立是為平王平王初立欲得和諸侯乃求故陳悼太子師之子吳立為陳侯是為惠公惠公立探續哀公卒時年而為元空籍五年矣二十八年惠公卒子懐公柳立懐公元年吳破楚在郢召陳侯陳侯欲往大夫曰吳新得意楚王雖亡與陳有故不可背懐公乃以疾謝吳四年吳復召懐公懐公如吳怒其前不往留之因卒吳陳乃立懐公之子越是為湣公二十四年楚惠王以兵北伐殺陳湣公遂滅陳而有之杞東樓公者夏后禹之後苖裔也殷時或封或絕周武王克殷紂求禹之後得東樓公封之於杞杞今陳留雍丘縣也以奉夏后氏祀東樓生西樓公西樓公生題公題公生謀娶公謀一作謨謀娶公生武公武公立四十七年卒子靖公立二十三年卒子共公立八年卒子德公立世本曰惠公德公十八年卒弟桓公姑容立世本曰惠公立十八年生成公及桓公成公立十八年桓公立十七年桓公十七年卒子孝公匄立十七年卒弟文公益姑立十四年卒弟平公鬱立十八年卒子悼公成立十二年卒子隱公乞立七月隱公弟遂弑隱公自立是為釐公十九年卒子湣公維立十六年湣公弟閼路弑湣公代立是為哀公哀公十年卒湣公子欶立欶作速是為出公十二年卒子簡公春立一年楚惠王滅杞衛康叔名封周武王同母少弟也武王已克殷復以殷餘民封紂子武庚祿父周公旦代成王治當國管叔蔡叔與武庚祿父作亂欲攻成周周公旦以成王命興師伐殷殺武庚祿父以殷餘民封康叔為衛君居河淇間故商墟康叔卒子康伯代立康伯卒子考伯立考伯卒子嗣伯立嗣伯卒子􅂒伯立􅂒伯卒子靖伯立靖伯卒子貞伯立貞伯卒子頃侯立頃侯厚賂周夷王王命衛為侯頃侯十二年卒子釐侯立四十二年卒太子共伯餘立為君共伯弟和有寵於釐侯多予之賂和以其賂賂王以襲攻共伯於墓上共伯入釐侯羨自殺衛人因葬之釐侯旁諡曰共伯而立和為衛侯是為武公武公即位修康叔之政百姓和集四十二年犬戎殺周幽王武公將兵往佐周平戎甚有功周平王命武公為公五十五年卒子莊公揚立五年娶齊女為夫人好而無子又取陳女為夫人有子蚤死陳女娣亦幸於莊公而生子完完母死莊公令夫人齊女子之立為太子莊公有寵妾生子州吁二十三年莊公卒太子完立是為桓公十六年弟州吁收聚衛亡人以襲殺桓公州吁自立為衛君石碏衛上卿與陳侯共謀使右宰醜進食因殺州吁于濮而迎桓公弟晉於邢而立之是為宣公宣公夫人夷姜生子伋以為太子而令右公子傅之右公子為太子取齊女未入室而宣公見所欲為太子婦者好説而自取之更為太子娶佗女宣公得齊女生子壽子朔令左公子傅之太子伋母死齊女與朔共讒惡太子宣公自以其奪太子妻也心惡太子欲廢之及聞其惡大怒乃使太子伋於齊而令盗遮界上殺之與太子白旄而告界盗見持白旄者殺之且行子朔之兄壽太子異母弟也知朔之惡太子而君欲殺之乃謂太子曰界盜見太子白旄即殺太子可毋行太子曰逆父命不可遂行壽見太子不止乃盜其白旄而先馳至界盜見其驗即殺之壽已死而太子伋又至曰所當殺乃我也盜并殺之宣公乃以子朔為太子十九年宣公卒太子朔立是為惠公左右公子不平朔之立也惠公四年左右公子作亂攻惠公立太子伋之弟黔牟為君惠公犇齊衛君黔牟立八年齊襄公率諸侯奉王命共伐衛納惠公立三年出亡八年復入與前通年惠公凡十三年矣三十一年卒子懿公赤立九年翟伐衛殺懿公懿公之立也百姓大臣皆不服自懿公父惠公朔之讒殺太子伋代立至於懿公嘗欲敗之卒滅惠公之後而更立黔牟之弟昭伯頑之子申為君是為戴公元年卒齊桓公立戴公弟燬為衛君是為文公二十五年卒子成公鄭立三十五年成公卒子穆公遫立十一年卒其子定公臧立定公十二年卒定公有疾使孔成子寗惠子立敬姒之子衎以為太子成子孔達之孫敬姒定公妾衎獻公是為獻公獻公立十八年孫林父文子也攻出獻公奔齊孫文子寗殖惠子也共立定公弟秋為衛君是為殤公一云獻公弟焱殤公立寗喜與孫林父爭寵相惡殤公使寗喜攻孫林父林父犇晉復求入故衛獻公齊景公聞之與衛獻公如晉求入晉為伐衛誘與盟衛殤公㑹平公平公執殤公與寗喜復入衛獻公獻公亡在外十二年而復入三年卒子襄公惡立九年卒子靈公元立初襄公夫人姜氏無子姜氏宣姜嬖人婤姶生孟縶孔成子夢康叔謂已立元成子衛卿孔蒸鉏也元孟縶弟夢時元未生余使羈之孫圉與史茍相之羈烝鉏子茍史朝子史朝亦夢康叔謂已余將命而子茍與孔烝鉏之曾孫圉相元史朝見成子告之夢夢協協合也晉韓宣子為政聘于諸侯之歲昭二年婤姶生子成子以周易筮之曰元尚享衛國主其社稷令蓍辭遇屯震下坎上屯又曰余尚立縶尚克嘉之嘉善也遇屯之比坤下坎上比屯初九爻變比以示史朝史朝曰元亨又何疑焉周易曰屯元亨成子曰非長之謂乎言屯之元亨謂年長非謂名元對曰康叔名之可謂長矣善之長也孟非人也將不列於宗不可謂長足跛非全人不可列為宗主且其繇曰利建侯繇卦辭嗣吉何建建非嗣也嗣子有常位故無所卜無所建今以位不定卜嗣得吉則當從吉而建之也二卦皆云謂兩得屯卦皆有建侯之文子其建之康叔命之二卦告之筮襲於夢武王所用也弗從何為外傳云太誓曰朕夢協朕卜襲於休祥戎商必克此武王辭弱足者居跛則偏弱居其家不能行侯主社稷臨祭祀奉人民事鬼神從㑹朝又焉得居各以所利不亦可乎孟跛利居元吉利建故孔成子立靈公一云襄公有賤妾幸之有身夢有人謂曰我康叔也令若子必有衛名而子曰元妾怪之問孔成子成子曰康叔衛祖也及生子男也以告襄公襄公曰天所置也名之曰元夫人無子於是立元為嗣靈公三十九年太子蒯聵與靈公夫人南子有惡太子犇宋四十二年靈公卒衛乃以蒯聵之子輒為君是為出公初孔圉取太子蒯聵之姊生悝出公十二年悝母使孔氏之䜿渾良夫使於太子良夫與太子入舍孔氏之外圃遂入適伯姬氏出公輒犇魯孔悝立太子蒯聵是為莊公莊公三年晉趙簡子圍衛莊公出犇衛人立子班師為衛君左傳云班師襄公之孫齊伐衛虜班師更立公子起為衛君起靈公子起元年衛石曼專逐其君起起奔齊衛出公輒自齊復歸立初出公立十二年亡在外四年復入二十一年卒出公季父黔攻出公子而自立是為悼公悼公五年卒子敬公弗一云敬公費立敬公十九年卒子昭公糾立昭公六年公子亹弑之代立是為懐公懐公十一年公子頽弑懐公而代立是為慎公慎公父公子適適父敬公也慎公四十二年卒子聲公訓立聲公十一年卒子成侯速立十六年衛貶號曰侯二十九年成侯卒子平侯立平侯八年卒子嗣君立更貶號曰君四十二年卒子懐君立懐君三十一年朝魏魏因殺懐君更立嗣君弟是為元君一云元君懐君之弟二十五年元君卒子君角立九年秦并天下立為始皇帝二十一年二世廢君角為庶人衛絶祀宋㣲子啟者㣲畿内國名子爵也為紂卿士殷帝乙之首子而紂之庶兄也紂既立不明㣲子度紂終不可諫乃去武王伐紂㣲子持其祭器造於軍門武王乃釋㣲子復位如故成王少武庚作亂周公既承王命誅武庚乃命㣲子啟代殷後奉其先祀啟卒立其弟衍是為㣲仲㣲子舍其孫腯而立衍鄭𤣥曰㣲子適子死立弟殷道也㣲仲卒子宋公稽立稽卒子丁公申立申卒子涽公共立共卒弟煬公熈立煬公即位涽公子鮒祀鮒一作魴弑煬公而自立曰我當立是為厲公厲公卒子釐公舉立二十八年卒子惠公覸立三十年卒子哀公立哀公元年卒子戴公立三十四年卒子武公司空立十八年卒子宣公力立宣公有太子與夷十九年宣公病讓其弟和曰父死子繼兄死弟及天下通義也我其立和和亦三讓而受之宣公卒弟和立是為穆公九年病召大司馬孔父而屬殤公曰先君舍與夷而立寡人先君穆公兄宣公與夷宣公子即所屬殤公寡人弗敢忘若以大夫之靈得保首領以沒先君若問與夷其將何辭以對請子奉之以主社稷寡人雖死亦無悔焉對曰羣臣願奉馮也馮穆公子莊公也公曰不可先君以寡人為賢使主社稷若棄德不讓是廢先君之舉也豈曰能賢言不讓則不足稱賢光昭先君之令德可不務乎吾子其無廢先君之功先君以舉賢為功我若不賢是廢之使公子馮出居於鄭辟殤公也穆公卒殤公即位君子曰宋宣公可謂知人矣立穆公其子饗之命以義夫殤之十年太宰華督弑殤公而迎公子馮於鄭而立之是為莊公十九年卒子涽公捷立十一年南宫萬殺涽公于蒙澤更立公子游為君宋之諸公子共擊殺南宫牛弑宋新君游而立涽公弟禦説是為桓公宋人醢南宫萬三十一年桓公卒太子兹甫立是為襄公十三年與楚成王戰于泓大敗傷股十四年病傷於泓而竟卒子成公王臣立十七年卒成公弟禦殺太子而自立為君宋人共殺君禦而立成公少子杵臼是為昭公九年昭公無道國人不附昭公出獵襄公夫人王姬使衛伯攻殺昭公杵臼弟鮑革一無革字立是為文公二十二年卒子共公瑕立十三年卒司馬唐山攻殺太子肥右師誅唐山乃立共公少子成是為平公四十四年平公卒子元公佐立公佐立十五年魯昭公避季氏居外為之求入魯行道卒子景公頭曼立六十四年卒宋公子特攻殺太子而自立是為昭公昭公者元公之曾庶孫也昭父公孫糾糾父公子褍音瑞秦褍秦即元公少子也景公殺昭公父糾故昭公怨殺太子而自立昭公四十七年卒子悼公購繇立一云四十九年八年卒子休公田立二十三年卒子辟公辟兵立一云辟公兵三年卒子剔成立剔成四十一年剔成弟偃攻襲剔成剔成敗犇齊偃自立為宋君十一年自立為王四十七年齊涽王與魏楚伐宋殺王偃遂滅宋而三分其地册府元龜卷二百三十六
