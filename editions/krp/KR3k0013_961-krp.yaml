body:
  text: 册府元龜卷九百六十一宋王欽若等撰外臣部土風第三天竺國一名身毒在月氐東南數千里俗與月氐同而卑溼暑熱其國臨大水乗象而戰其人弱於月氐修浮圖道不殺伐遂以成俗浮圖佛也土出象犀瑇瑁金銀銅鐵鈆錫西與大秦通有大秦珍物又細布好毾㲪諸香石蜜胡椒薑黒鹽一說其俗佛道所興也人民敦龎土地饒沃其王號茂論所都城郭水泉分流繞于渠塹下注江其宫殿皆雕文鏤刻街曲市里屋舎樓觀鐘鼓音樂服飾香華水陸通流百賈交㑹竒玩珍瑋恣心所欲左右喜維舎衛葉波等十六大國去天竺或二三千里共尊奉之以為在天地之中也南天竺國有伏醜城出摩尼珠珊瑚城東有抜頼城出黄金白旃檀石蜜葡桃土宜五糓中天竺國其俗土著與月支同而地卑溼暑熱稲嵗四熟苗甚長茂没於駞馬出獅子豹䝍槖駞犀象有火齊如雲母而色紫精者薄如蟬翼焉有金剛似紫石英百鍊不銷可以切玉又有旃檀欎金等香甘蔗諸果出石蜜黒鹽通於大秦故其寳或至扶南交趾貿易焉俗無簿籍以龜貝為貨尤能幻化禁咒或能咒龍以致雲雨丈夫致敬極者䑛足摩踵而致其辭家有竒樂倡伎其王與大臣多服錦罽王為螺髻於頂餘髮剪之使拳大夫剪髮穿耳垂璫或以金龍懸於耳耳緩者為上俗皆徒跣衣重白色婦人以金銀真珠瓔珞挂頭項死者或焚屍取灰以為浮圖或委之中野以施禽獸或流之於河以餉魚鼈無服制之差䘮紀之數謀反者幽殺之小犯罰錢贖罪不孝則㫁手刖足截耳割鼻放流邊外其人柔弱怯於戰闘有弓箭甲矟亦有飛梯地道木牛馬之法有文字善天文算歴之術人皆學悉曇章云是梵天法書於貝多樹葉以記事然尤脩浮圖道不殺生飲酒修戒數百特信盟誓國中徃徃有佛舊迹存焉康居國在天竺東南三千里其土氣物類與天竺同男女皆長八尺而怯弱乗象駱駝往来隣國有㓂乗象以戰粟弋國屬康居出名馬牛羊葡萄衆果其土水美故葡萄酒特有名焉嚴國在奄蔡北屬康居出䑕皮以輸之阿蘭聊國前漢奄蔡國也地屬康居土氣温和多楨松白草民俗衣服與康居同蒲類國居天山西䟽榆谷廬帳而居逐水草頗知田作畜有牛馬駱駞羊能作弓矢出好馬移支國居蒲類地其人勇猛敢戰以㓂鈔為事皆被髮随畜逐水草不知田作所出皆與蒲類同東且彌國其俗廬帳居逐水草頗知田作其所出亦與蒲類同所居無常白馬氐地險阻有麻田出名馬牛羊漆蜜氐人勇戇抵冐貪貨死利居於河池一名仇池方百頃四面斗絶仇池山在今成州上禄縣南仇池縣界本名仇維山上有池故曰仇池山在倉雒二谷之間常為水所衝激故下石而上土形似覆壺仇池記曰仇池百頃周囘九千四十步天形四方壁立千仞自然樓櫓郤敵分置調均竦起數丈有踰人工仇池凡二十三道可手縁而上東西二門盤道下至上凡有七里上則岡阜低昻泉流交灌酈道元注水經云羊腸盤道三十六回開山圖謂之仇夷所謂積石嵯峨嶔岑隐阿者也上有平田百頃煮土成鹽因以百頃為號也數為邊㓂郡縣討之則依固自守無貴賤皆為板屋土墻所治處名格谷蠻俗衣布徒跣或椎髻或剪髮兵器以金銀為飾虎皮衣楯便弩射皆暴悍好㓂賊焉滑國車師之别種也土地温暖多山川樹木五穀國人以麪及羊肉為糧其獸有獅子兩脚駱駝野驢有角人皆善騎射著小袖長身袍用金玉為帯女人被裘頭上刻木為角長六寸以金銀飾之少女子兄弟共妻無城郭氈屋為居東向開户其王坐金牀随太嵗轉與妻並坐接客無文字以木為契與旁國胡為胡書革皮為紙無職官事天神火神每日則出户祀神而後食其跪一拜而起塟以木為槨父母死其子截一耳塟訖即吉其言語待河南人譯然後通古柯國胡宻丹國檀國皆滑旁小國也衣服容貎皆與滑同白題國在滑國東去滑六日行西極波斯土地出粟麥𤓰果食物畧與滑同烏萇國在中天竺南一名烏仗那百姓殷實人性愞弱頗詭詐尤攻禁咒之術篤信佛法言語文字禮義法式畧同天竺而弗之及也一説多觧天文吉凶之數其王動則訪决焉土多林果引水灌田豐稻麥事佛多諸寺塔事極華麗人有争訴服之以藥曲者發狂直者無恙為法不殺犯死者唯徙於靈山西南有檀特山山上立寺以驢數頭運食山下無人控御自知往来乾陁國在烏萇西本名業波有闘象七百頭十人乗一象皆執兵仗象鼻縛刀以戰獅子國天竺旁國也其地和適無冬夏之異五糓随人所種不湏時莭國中有王以一善化人其樓閣皆以七寳􅏻晃耀街巷人衆熾盛每于晨朝警皷曉羣迷常勸念佛破諸衆生無明黒闇常說空理離於物外以清净學道為務不著於聲不著於香無量得道之處一説在西海之中延袤二千餘里多出竒寳本鬼神居之商人到則不見但置寳物價於洲上商人依價買之而去其後鄰國人居之䏻馴養獅子遂以名國風俗與婆羅門同而尤敬佛法吐谷渾在青海西其國西有黄沙洲南北一百二十里東西七十里不生草木沙洲因此為號屈真川有鹽地甘谷嶺北有雀䑕同穴或在山嶺或在平地雀色白䑕色黄地生黄紫花草便有雀䑕穴白蘭土出黄金銅鐵其國雖随水草大抵治慕賀川以肉酪為糧頗識文字其男子通服長裙㡌或戴羃羅婦人以金花為首飾辮髪縈後綴以珠貝其婚姻富家厚出聘財竊女而去父卒妻其羣母兄亡妻其諸嫂䘮服制𦵏訖而除國無常稅調用不給輙歛富室商人取足而止殺人及盗馬者罪至死他犯則徵物以贖地宜大麥而多蔓菁頗有菽粟出蜀馬氂牛西北有流沙數百里夏日有熱風為行旅之患風之所至唯老駝豫知之即鳴而聚立埋其口鼻於沙中人每以為候即将氈擁蔽鼻口其風迅駛斯湏過盡若不防者必致危斃党項羌三苗之後東接臨洮西平西拒葉䕶處山谷間其俗服裘褐被氈以為上飾俗尚武力無法令各為生業有戰陣則相屯聚無徭賦不相往来牧養氂牛羊猪以供食不知稼穡其俗淫穢烝報於諸夷中最為甚無文字但候草木以記嵗時三年一聚㑹殺牛羊以祭天人年八十以上死者以為令終親戚不哭少而死者則云夭札共悲哭之有琵琶横吹擊缶為節高昌國葢車師之故地也南接河東連燉煌西次龜兹北鄰勑勒置四十六鎮交河田地高寕臨川横截栁婆洿林新興繇寕始昌篤進白刀等皆其鎮名國人言語與中國畧同有五經歴代史諸子集面類髙麗辮髮垂之於背着長身小袖袍縵襠袴女子頭髮辮而不垂著錦襭瓔珞環釧婚姻有六禮其地髙燥築土為城架木為屋土覆其上寒暑與益州相似備植九糓人多噉麪及牛羊肉出良馬葡萄酒石鹽多草木草實如繭繭中絲如細纑名為白氈子國人多取織以為布甚軟白交市用焉有朝烏者旦旦集王殿前為行不畏人日出然後散去一説男子胡服婦人裙襦頭上作髻其風俗政令與華夏略同地多磧氣候温暖糓麥再熟宜蠶多五果有草名為羊刺其上生蜜而味甚佳出赤鹽如朱白鹽如玉多葡萄酒俗事天神兼信佛法國中羊馬牧於隐僻之處以避外冦非貴人不知其所北有赤石山山北七十里有貪汙山下有積雪此山之北鐵勒界也従武威西北有㨗路渡沙磧千餘里四面茫然無有蹊逕欲往者尋有人畜骸骨而去路中或聞歌哭之聲行人尋之多致亡失葢魑魅魍魎也故商客往来多取伊吾路康國者康居之後遷徙不常其地有胡律置於祅祠决罰則取而斷之重罪者族次重者死賊盗截其足人皆深目髙鼻多鬚髯有大小皷琵琶五絃箜篌笛婚姻䘮制與突厥同國立祖廟以六月祭之諸侯皆来助祭俗奉佛為胡書氣候温宜五糓勤修園𬞞樹木滋茂出馬駝驢封牛黄金鐃沙􅀈香阿薩那香瑟瑟麖皮氍毹錦氈多葡萄酒富家或致千石連年不敗丈夫剪髪或辮髪其王冠氊㡌飾以金寳婦人盤髻幪以皂巾飾以金花人多嗜酒好歌舞於道路生子必以石蜜内口中以膠置掌内欲其成長口常甘言持錢如膠之黏物俗習胡書善商賈争分銖之利男子年二十即逺之旁國来適中夏利之所在無所不到以十二月為嵗首有婆羅門為其占星候氣以定吉凶頗有佛法至十一月皷舞乞寒以水相潑盛為戯樂似盤國與康國隣出好馬瑟匿國北接石國其俗不好商賈風俗並畧與康國同焉安國風俗同於康國唯妻其姊妹及母子逓相禽獸此為異也石國其俗正月六日七月十五日以王父母焼餘之骨金瓮盛之置于牀上巡遶而行散以花香雜果王率臣下設祭焉禮終王與夫人出就别帳臣下以次列坐享宴而罷有粟麥多良馬其俗善戰女國在葱嶺之南以女為王每居層樓侍女數百王日一聴政其王死若無女嗣位國人請歛金錢得數百萬還死王之族買女而立之其地五男三女俗貴女子賤丈夫婦人為吏職男子為士女子貴者則多有侍男男子不得有侍女雖賤庶之女盡為家長猶有數夫焉生子皆従母姓男子被髪以青緑塗面婦人辮髪而縈之以皮為鞋課稅無常氣候多寒以狩獵為業出鍮石朱砂麝香氂牛駿馬蜀馬尤多鹽常將鹽向天竺興販其利數倍鏺汗國古渠搜國也其王坐金羊牀妻戴金花俗多朱砂金鐵吐火羅國在葱嶺西與悒怛雜居勝兵共五萬其國土多男子少婦人故兄弟通室婦人五夫則角飾戴五角十夫則戴十角男子無兄弟者則與他人結為昆季方始得妻不然者終身無婦矣被服文字與于闐略同城北有屋數頗梨山南崖穴中有神馬國人每牧牝馬於其側時産名駒皆汗血多善馬有屋宇雜以穹廬著小袖袍小口袴大頭長裙㡌女子被髮為辮其地與益州隣嘗通同商賈民慕其利多往従之教其書記為之辭譯稍桀黠矣一說多畜逐水草無城郭後稍為宫室而人民猶以氈廬百子帳為行屋地常風寒人行平沙中沙礫飛起行迹皆滅肥地則有雀䑕同穴生黄紫花痩地輙有瘴氣使人斷氣牛馬得之疲汗不䏻行宕昌國在河南國東本西羌種也俗皆土著居有棟宇其屋織氂牛尾及羖羊毛覆之國無法令又無徭賦唯征伐之時乃相屯聚不然則各生業不相往来皆衣裘褐牧養氂牛羊豕以供其食父子伯叔兄弟死者即以其繼母世叔母及兄弟婦子婦為妻俗無文字但候草木榮落以記嵗時三年一聚殺牛羊以祭天鄧至國居西凉州界羌别種也其俗呼㡌曰突何其衣服與宕昌同武興國本仇池其國東連秦嶺西接宕昌去宕昌八百里南去漢中四百里北去岐州三百里去長安九百里本有十萬户世世分减其大姓有苻氏姜氏言語與中國同著烏皂突騎㡌長身小袖袍小口袴皮鞾地植九糓婚姻備六禮知書疏種桑麻出紬絹精紈漆蠟椒等山出銅鐵西戎踈勒國在姑墨西白山之南百餘里漢時舊國也其王戴金獅子冠土多稻粟麻麥銅鐵錦綿人手足皆六指産子非六指者即不育俗事祅神有胡書文字者至㧞國在踈勒西其國東有潘賀那山出美鐵及獅子悉宻國在者至西其國東有山名郁悉滿山出金玉多鐵悉萬斤國在悉宻西其國南有山名伽邑那山出獅子吐呼羅國在悉萬斤東土冝五糓有好馬駝騾伽不單國在悉萬斤西北土平宜稲麥有五果色知顯國在悉萬斤西北土平多果伽色尼國在悉萬斤南土出赤鹽多五果薄知國在伽色尼南多五果牟知國在忸宻西南忸宻無土風土平禽獸草木類中國諾色波羅國在忸宻南土平宜稲麥多五果旱伽至國在忸宻西平土少田殖取稲麥於隣國有五果阿弗大汗國在忸宻西土平多五果呼似宻國在阿弗大汗西土平出銀琥珀有獅子多五果疊伏羅國有勿悉城城北有鹽竒水西流有白象并有阿未黎波波中織作布土冝五榖拔豆國出金銀雜寳白象水牛氂牛葡萄五果副貨國在沒随國東没随無土風宜五榖葡萄唯有馬駞騾波斯國大月氐之别種都宿利城其王姓波斯氏坐金羊牀戴金花冠衣錦袍織成帔飾以真珠寳物其俗丈夫剪髪戴白皮㡌貫頭衫兩肩近下開之并有巾帔縁以織成婦人服大衫披大㡌帔其髪前為髻後被之飾以金花仍貫五色珠絡之於膊王於其國内别有小牙十餘所猶中國之離宫也每年四月出遊處之十月乃還王即位以後擇諸子内賢者宻書其名封之於庫諸子及大臣皆莫之知也王死乃衆共發書視之其封内有名者即以為王餘子各出就邊任兄弟更不相見也兵器有甲矟圓排劔弩弓箭戰並乗象百人随之其刑法重罪懸諸竿上射而殺之次則繋獄新王立乃釋之輕罪則劓刖若髠或剪半鬢及繋排於項以為恥辱犯强盗者禁之終身姦貴人妻者男子流婦人割其耳鼻賦税准地輸銀錢俗事火天神婚合亦不擇尊卑諸夷之中最為醜穢矣民女年十嵗以上有姿貌者王收養之有功勲人即分賜死者多棄屍於山一月治服城外有人别居唯知䘮𦵏之事號為不净人若入城市揺鈴自别以六月為嵗首尤重七月十七日十二月一日民庶以上各相命召設㑹作樂以極歡娱又以每年正月二十日各祭其先者氣候暑熱家自藏氷地多沙磧引水溉灌其五糓及禽獸等與中夏畧同唯無稲及黍秫土出名馬及駝富室至有數千頭者又出白象獅子大鳥卵真珠玻瓈珊瑚琥珀瑠璃瑪瑙水精瑟瑟金銀䃋石金剛火齊鑌鐵銅錫朱砂銀綾錦氈毼氍毹毾㲪𤣥麞皮及薫陸欎金蘇合青木香等胡椒畢撥石蜜千年棗香附子訶梨勒無食子鹽緑雌黄等物一説西去城十五里有土山山中有鷲鳥噉羊土人極以為患國中有優鉢曇華鮮華可愛出龍駒馬鹹池生珊瑚樹長一二尺亦有琥珀瑪瑙真珠玫瑰等國内不以為珍市買用金銀婚姻法下聘訖女壻将數十人迎婦壻著金線錦袍師子錦袴戴天冠婦亦如之婦兄弟便来捉手付託夫婦之禮於兹永畢伏盧尼國在波斯國北東有大河南流中有鳥其形似人亦有如槖駝馬者皆有翼常居水中出水便死城北有云尼山出銀珊瑚琥珀多獅子附國在党項西南數千里重罪者死輕罪者罰牛人皆輕㨗便撃劔漆皮為牟甲弓長六尺以竹為弦妻其羣母及嫂兒弟死父兄亦納其妻好歌舞鼓簧吹長笛有死者無服制置屍髙牀之上沐浴衣服被以牟甲覆以獸皮子孫不哭帯甲舞劔而呼云我父為鬼所取我欲報寃殺鬼自餘親戚哭三聲而止婦人哭必以兩手掩面死家殺牛親屬以猪酒相遺共飲噉而瘞之死後十年而火𦵏其𦵏必集親賔殺馬動至數十匹立其祖父神而事之其俗以皮為㡌形圓如鉢或戴羃䍦衣多毛毼皮裘全剥牛脚皮為靴項繋鐵鏁手貫鐵釧王與酋帥金為首飾胷前懸一金花徑三寸其土髙氣候凉多風少雨土宜小麥青科山出金銀多白雉水有嘉魚長四尺而鱗細朱俱波國在葱嶺北二百里漢之舊地也其俗盛崇佛法文字同於婆羅門吐蕃國本漢西𦍑之地雷雨風雹霰雪每隔日有之夏節氣如中土暮春之月山有積雪其草細不過三寸牛馬皆食之地有冷瘴令人氣急不甚為􅊣其俗重漢繒而貴男女用為首飾而白蘭等並臣焉其君長或居䟦布川或居邏些有小城而不居坐大氊帳連帳號大拂廬其拂可坐數百人兵衛極嚴而衙府甚狭西南通泥婆羅門國卑實兹焉其百姓皆居小拂廬而無分别俗養牛羊取乳酪用供食兼取毛為褐而衣焉不食驢馬肉以麥為麪家不全給人死殺牛馬以殉取牛馬頭周壘於墓上其墓正方累石為之状若平頭屋焉其臣與君自為友號曰共命人其數不過五人君死之日共命人皆日夜縦酒葬日於脚下針血盡乃死便以殉𦵏復有親信人用刀當腦縫鋸或有将四尺木大如指刺兩肋下死者十有四五亦殉葬焉其設官父死子代絶嗣近則親襲焉非其種類輙不相伏大畧其冠章飾有五等一謂瑟瑟二謂金三謂金飾銀上四謂銀五謂熟銅各以方圓三寸褐上装之安膊前以别貴賤其戰必下馬列行陣死則逓收之終不肯退槍細而長於漢者弓矢弱堅人皆用劔不戰負劒而行俗重戰死戰死者其墓周廻白土泥之不與諸墓連接其驛以鐵箭為契其箭長七寸若急驛膊前加著一銀鶻更急其鶻至十二三每驛百餘里随水草而居不常厥所有草名蓮古芒葉長二寸状若斜蒿每莖不過三四葉其莖蔓其花黄其根連珠如麥門冬味酸性㣲冷有䑕尾長於常䑕每三二十同一穴至秋後衆䑕收此草根為蔵多者至數石俗常掘草根而食而留給䑕糧其國禁殺䑕殺䑕者輙加其罪俗亦愛而不殺有鹿服泉諸山川亦遍出泉其泉口大者丈餘小者一二尺水深尺餘其馬歴泉口行止之勇不失脚與漢戰輙引入此地漢馬顛躓因而敗績有青海去城五百里周廻四百里傍土平沃多植麥在吐谷渾西南其春夏軍糧資海魚以給有可䟦海去赤嶺百里方圓七百里水苦不可飲有氂牛河濶一里岸峻流入蠻西洱河合流東號為漾鼻水又東南出㑹川為瀘水焉有蔵河去邏些三百里東南流衆水湊焉南入崑崙國其中有魚似鱒而無鱗州渚法之有水栁及攝木生焉其流不急自赤嶺至邏些川無樹木唯鉢川三十里縁山有栝樹邏些川三百里有栁栝樹酸棲等皆蟠屈不條茂有雪厚三尺周廻三十里山下有水湧其俗云山下有人居未嘗輙見有鑠河去長安五千里其水有石號曰温湯其石狀如肝方圓數尺河水冷石面有穴六寸湯水湧出其中流入河其石熱其湯沸輙不可近所留處名並爛湯中有蟲状如馬尾色赤長半寸有鶻莽山去長安六千里餘其國因險而為防焉其山西八里狀若三峡其中水流聲若雷霆人語不相聞其山逺而望之色黄而白無草木兩岸有石壁一處瀑流自山顛飛下可百餘尺激一縣石似飄粉焉其俗刻木結繩其兵以金為鏃寇至舉烽而應之重戰没者為甲門奔敗者加狐尾于首以示終身之恥自其王棄宗弄賛唐太宗貞觀後吞併諸蕃地方千里每十節度置一上相統之自號吐蕃為寳髻爵位則以寳珠大瑟瑟小瑟瑟大銀小銀大䃋石小䃋石大銅小銅等為告身以别髙下重君臣之義輕父子之道用政嚴酷人無敢違事無大小必出於宰相便宜従事故國風大理而飲酒者不得及亂女子無敢干政然緇徒之間或有専柄者好咒誓而多疑忌敬信釋氏諂鬼神貴壮賤老倨父傲母惟以淬礪為業罕務耕耘不喜病疾尤惡瘡痏出疆之費亦無定給而臨陣所得便為己有所以戰伐吞併往必成功北狄匈奴居于北邊随草畜牧而轉移其畜之所多則牛馬羊其竒畜則槖駝驢驘駃騠騊駼驒奚駃騠駿馬騊駼馬類生北海驒奚騾驢類也駝音徒何切駃音决騠音提騊音桃駼音徒驒音顛逐水草遷徙無城郭常居耘田之業然亦各有分地分音扶問切無文書以言語為約束兒䏻騎羊引弓射鳥䑕言其幼小䏻射少長則射狐兎少長言漸大肉食言無米粟唯食肉士力䏻彎弓盡為甲騎其俗寛則随畜因射獵禽獸為生業急則人習戰攻以侵伐人人皆習之其天性也其長兵則弓矢短兵則刀鋋音蟬鐵把小矛利則進不利則退不羞遁走茍利所在不知禮義自君王以下咸食畜肉衣其皮革被旃裘壮者食肥美老者飲食其餘貴壮健賤老弱父死妻其後母兄弟死皆取其妻妻之其俗有名不諱而無字嵗正月諸長少㑹單于庭祠五月大龍城祭其先天地鬼神秋馬肥大㑹蹛林課較人畜計蹛音帯繞林木而祭也鮮卑之俗自古相傳秋冬之祭無林木者尚𥪡栁枝衆騎祭遶三周乃止此其遺法計者人畜之數其法㧞刃尺者死坐盗者没入其家有罪小者軋軋謂輾轢其骨節若今之厭踝者也軋音於㸃切輾音女展切大者死獄乆者不滿十日一國之囚不過數人而單于朝出營拜日之始生夕拜月其坐長左而北向左者以左為尊日上戊巳其送死有棺槨金銀衣裳而無封樹䘮服近幸臣妾従死者多至数十百人或數十人或百人舉事常随月盛壮以攻戰月虧則退兵其攻戰斬首虜賜一巵酒而所得鹵獲因以予之得人以為奴婢故其戰人人自為趍利趍讀曰趨趍向也善為誘兵以包敵包裹取之故其逐利如烏之集其困敗瓦觧雲散矣戰而扶轝死者盡得死者家財烏桓國夲東胡也俗善騎射弋獵禽獸為事随水草放牧居無常處以穹廬為舎東開向日食肉飲酪以毛毳為衣毛之縟細者為毳貴少而賤老其性悍塞悍勇也塞謂不開怒則殺父兄而終不􅊣其母以母有族類父兄無相仇報故也有勇健䏻理决闘訟者推為大人無世業相繼邑落各有小帥數百千落自為一部大人有所召呼則刻木為信雖無文字而部衆不敢違犯氏姓無常以大人健者名字為姓大人以下各自畜牧營産不相徭役其嫁娶則先畧女通情不以道娶為畧或半嵗百日然後送牛馬羊畜以為聘幣婿随妻還妻家無尊卑旦旦拜之而不拜其父母為妻家僕役一二年間妻家乃厚遣送女居處財物一皆為辦其俗妻後母報寡嫂死則歸其故夫計謀従用婦人唯鬬戰之事乃自决之父子男女相對踞蹲以髠頭為輕便婦人至嫁時乃養髪分為髻著句决飾以金碧猶中國有簂歩揺簂音吉悔切或為幗婦人首飾也皇后首飾有垂珠步則揺之婦人䏻刺韋作文繡織氀毼氀音力干切毼音曷罽也男女䏻作弓矢鞍勒鍛金鐵為兵器其土地宜穄及東穡東穡似蓬草實如穄子至十月而熟見禽獸孕乳以别四節俗貴兵死歛屍以棺有哭泣之哀至𦵏則歌舞相送肥養一犬以綵纓牽并取死者所乗馬衣服皆焼而送之言以屬累音蜀類猶付託也犬使護死者神靈歸赤山赤山在遼東西北數千里如中國人死者魂神歸岱山也敬鬼神祠天地日月星辰山川及先大人有健名者祠用牛羊畢皆焼之其約法違大人言者罪至死若相賊殺者令部落自相報不止詣大人告之聴出馬牛羊以贖死其自殺父兄則無罪若亾畔為大人所捕者邑落不得受之皆徙逐於雍狂之地地無山有沙漠流水草木多蝮蛇鮮卑者東胡之支也其言語習俗與烏桓同唯婚姻先髠頭以季春月大㑹於饒樂水上在今營州北飲宴畢然後配合又禽獸異於中國者野馬羱羊角端牛以角為弓俗之角端弓者羱羊似呉羊而大角出西方又有貂豽鼲子皮毛柔輭豽音女骨切鼲音胡昆切貂鼲並䑕屬豽猴屬也故天下以為名裘突厥世居金山其俗畜物為事兵器有弓矢鳴鏑甲矟刀劍其佩則兼有伏突旗纛之上施金狼頭侍衛之士謂之附離夏言亦狼也葢本狼生志不忘舊其徴彂兵馬及科稅雜畜輒刻木為数并一金鏃箭蠟封印之為信契其刑法反叛殺人及姦人之婦盗馬絆者皆死奸人女者重責財物即以其女妻之鬬傷人者随輕重輸物盗馬及財物者各十餘倍徵之死者停屍於帳子孫及諸親屬男女各殺羊馬陳于帳前祭之繞帳赱馬七匝一詣帳門以刀𠢐面且哭血淚俱流如此者七度乃止擇日取亡者所乗馬及經服用之物并屍俱焚之收其餘灰待時而𦵏春夏死者候草木黄落秋冬死者候華葉榮茂然始坎而瘞之塟之日親屬設祭及走馬𠢐面如初死之儀塟訖於墓所立石建標其石多少依平生所殺人數以祭之羊馬頭盡懸挂於標上是日也男子咸盛服飾㑹於塟所男有恱愛於女者歸即遣人聘問父母多不違也父兄伯叔死者子弟及姪等妻其後母世母嫂唯尊者不得下滛雖遷徙無常而各有分地可汗常處於都斤山牙帳東開盖敬日之所出也每嵗率諸貴人祭其先窟以五月中旬集他人水拜祭天神於都斤西五百里有高山逈出上無草木謂為勃外凝黎夏言地神也其書字類胡而不知年歴唯以草青為記其主初立近侍重臣等與之以氈随日轉九廻每一廻臣下皆拜訖乃扶令乗馬以帛絞其頸使纔不至絶然後釋而急問之曰你能作㡬年可汗其主既神情瞀亂不能詳定多少臣下等随其所言以騐修短之數一説男子好樗蒲女子蹴踘飲馬酪取醉歌呼相對敬鬼神信巫覡重兵死而恥病終大抵與匈奴同俗西突厥居無常處多在烏孫故地其俗每五月八月相聚祭神嵗遣重臣向其先世所居之窟致祭焉稽胡一曰歩落稽盖匈奴之别種其俗土著亦知種田地少桑蠶多衣麻布其丈夫衣服及𦵏殯與中夏略同婦人則多貫蜃貝以為耳頸飾又與華民錯居其渠帥頗識文字然語類夷狄因譯乃通蹲踞無禮貪而忍􅊣俗好淫穢處女尤甚将嫁之夕方與淫者叙離夫氏聞之以多為貴既嫁之後頗有防閑有犯奸者随事懲罰又兄弟死者納其妻雖分統部郡縣列於編户然輕其徭賦有異齊民山谷阻深者又未盡役屬而㓙悍恃險數為寇亂駮馬國其地在突厥之北漸近北海土地嚴寒至冬積雪樹木不没者一二尺比暖雪消以馬犁種取魚鹿獺貂灰䑕等肉充食以其皮為衣少鐵器用陶瓦釜及樺木根為盤盌随水草而居累木似井䦨樺皮盖以為屋土牀草蓐而寝處之草盡則移居無定所馬色並駮故以為名一說舉國悉留騮駮馬不乗但取其湩酪充食而已因山而居與結骨不敦相侵伐貌類結骨而言語不相通其俗随逐水草無王立小君長以聽焉結骨部在駮馬國南其人並依水而居身悉長大赤髪緑睛有黒髪者以為不祥人皆勁勇鄰國憚之其俗大率與突厥同而婚姻無財聘性多淫泆與外人通者不忌其壻死𦵏䘮刀𠢐其面火𦵏收其骨踰年而為墳墓有哭泣之禮冬以木為室覆以木皮土宜粟麥穄豆之屬無果菜有馬出貂天每雨鐵收而用之以為刀劔甚銛利其國獵蒐皆乗木馬升降山險追赴若飛鹽漠念咄六闕俟斤部落及史檐部落並在駮馬東其兩部土多松樺每年税貂獺青白三䑕皮以為貢賦流鬼國邊於北海多沮澤有魚鹽之利地氣沍寒早霜雪每堅氷之後以木廣六尺長七尺施系其上以踐層氷逐其赱獸俗多狗以其皮毛為裘褐㧞野古在僕骨東其地豐草人皆殷富土多霜雪東北一千里曰康干河有松木一二年乃化為石其色青有國人皆居住其人謂之康千石為石以後仍松文人皆著木脚氷上逐鹿以耕種射獵為業國多好馬又出鐵風俗與鐵勒同而言語稍别焉鞠國在㧞野古東北有樹無草但有地苔無羊馬家畜有鹿如中國牛馬使鹿牽車可勝三四人衣鹿皮食地苔其人取木枝為屋尊卑共居其中俞折國在鞠國東土地廣大百姓衆多風俗與㧞野古同少牛馬地多貂䑕大漢國在鞠國北地饒羊馬其人極長大長者至一丈三四尺芮國亦名芮芮國無城郭随水草畜牧以穹廬為居辮髮衣錦小袖袍小口袴深雍鞾其地苦寒七月流澌亘河國人能以術祭天而致風雪前對皎日後則泥潦横流故其戰敗莫能追及或於中夏為之則曀而不雨問其故葢以㬉云鐵勒匈奴之苗裔無君長分屬東西兩突厥居無常所随水草移人性㐫忍善於騎射貪婪尤甚以寇抄為生近西邊者頗為藝植多牛羊而少馬其俗大抵與突厥同唯丈夫婚畢便就妻家待産乳男女然後歸舎死者埋殯之此其異也奚本名厙莫奚俗甚為不潔而善射獵好為寇鈔每與契丹相攻擊虜獲財畜因而得賞死者以葦薄裹尸懸之樹上風俗同於突厥毎随逐水草以畜牧為業遷徙無常居有氈帳兼用車為營牙中常五百人持兵自衛此外部落皆散居山谷無賦稅契丹之先與庫莫奚異種而同類居黄龍之北數百里其俗與靺鞨同好為寇盗父母死而悲哭者以為不壮但以其屍置於山樹之上經三年之後乃收其骨而焚之因酹而祝曰冬月特向陽食若我射獵時使我多得猪鹿其無禮頑嚚於諸夷最甚南室韋契丹别部也在契丹北三千里土地卑濕至夏則移向西北貸勃欠對二山多草木饒禽獸又多蚊蚋人皆巢居以避其患俗丈夫皆被髪婦人盤髪衣服與契丹同乗牛車籧篨為屋如突厥氈車之状渡水則束薪為筏或有以皮為舟者馬則織草為韉結繩為轡寝則屈木為屋以籧篨覆上移則載行以猪皮為席婦人抱膝而坐氣候多寒田收甚薄無羊少馬多猪牛造酒食噉與靺鞨同俗婚嫁之法二家相許壻輙盗婦将去然後送牛馬為聘更将婦家待有娠乃相随還舎婦人不再嫁以為死人之妻難以共居部落共為大棚人死則置屍其上居䘮三年唯四哭其國無鐵取給於高麗多貂兵器有弓楛矢尤善射時聚弋獵事畢而散其人土著無賦斂或為小室以皮覆上相聚而居至數十百家剡木為犁不加金刃人牽以種不觧用牛夏多霧雨冬多霜霰畜宜犬豕養豢而噉之其皮用以為韋男子女人通以為服被髪左袵其家富者項著五色雜珠婚嫁之法男先就女舎三年役力因得親迎其婦役日既滿女家分其財物夫婦同車而載皷舞共歸北室韋亦契丹别部也氣候最寒雪深沒馬冬則入山居土穴中牛畜多凍死饒麞鹿射獵為務食肉衣皮鑿氷没水中而網射魚鼈地多積雪懼陷坑穽騎木而行俗皆捕貂為業冠以狐貉衣以魚皮霫匈奴之别種亦鮮卑故地也人多善射獵好以赤皮為衣縁婦人貴銅釧衣襟上下懸小銅鈴風俗畧與契丹同沙陁突厥在甘州習俗左老右壯溷雜男女畧與吐蕃同其悍㨗便弓馬勝之昆彌國土地宜稲其俗辮髪左衽被服與突厥畧同相傳云匈奴本兄弟之國也随逐水草夏居山冬入深谷俗尚戰惡疾終都播者鐵勒之别種也其俗結草為廬無牛羊不知稼穡土多百合草取其根以為糧骨利幹居廻紇澣海之北草多百合地出名馬其馬頭類槖駞筋骨麤壮好者日行四百里其國北又距大海晝長而夕短日没後天色正曛煮一羊脾纔熟而東方曙盖近日出入之處也掃刺部落本在琵琶川幽州東北數百里出古北口是焉地宜羊馬羊則純黒馬􅦇前蹄堅善走以狩獵為務逐獸高山自上而下弓弧縱鏑其勢若飛鮮有覆壓鬼田國在駮馬國西夜逰晝伏以鹿皮為衣眼鼻耳與中國人同口在頂上土無米粟噉鹿及蛇册府元龜卷九百六十一
