body:
  text: 册府元龜卷九十九宋王欽若等撰帝王部推誠親信推誠夫挺清明之徳包豁達之量虛其心而待物一其志以使能坦然而不疑曠然而獨運者哲王之懿範也故任賢而勿貳下得以罄其精忠招㩦而克誠人得以安其反側蓋敦慤之至通於神明感激之深淪於骨髓用能康多難而成大業揉非類而革野心丕冒羣倫納扵軌物中孚所浃其利博哉自漢祖以大度知人善御雄傑光武之後訖於五代宅民上者固有擅髙世之識立非常之功莫不正慮而閑邪善任而靡惑以得士之死力而為世之美談者焉漢髙祖初封漢王還定三秦時陳平自楚降漢漢王與語而大説之問曰子居楚何官平曰為都尉是日拜平為都尉使參乗典護軍諸將盡讙讙囂而議也曰大王一日得楚之亡卒未知髙下而即與共載使監䕶長者漢王聞之愈益幸平後漢光武初為蕭王與銅馬餘衆大戰於蒲陽悉破降之封其渠帥為列侯降者猶不自安光武知其意勅令各歸營勒兵乃自乗輕騎案行部陳降者更相語曰蕭王推赤心置人腹中安得不投死乎繇是皆服悉將降人分配諸將衆遂數十萬故關西號光武為銅馬帝光武親征赤眉赤眉忽遇大軍驚震不知所為乃遣劉恭乞降曰盆子將百萬衆降陛下何以待之帝曰待汝以不死耳建武四年冬隗囂使馬援上書雒陽援至引見於宣徳殿帝笑謂援曰卿遨逰二帝間今見卿使人大慙援頓首辭謝曰當今之世非獨君擇臣也臣亦擇君矣臣與公孫述同縣少相善臣前至蜀述陛㦸而後進臣臣今逺來陛下何知非刺客姦人而簡易若是帝復笑曰卿非刺客顧説客耳援曰天下反覆盜名字者不可勝數今見陛下恢廓大度同符髙祖乃知帝王自有真也帝甚壯之馮異為征西大將軍既平關中自以久在外不自安上書思慕闕庭願親帷幄帝不許後人有章言異専制關中斬長安令威權至重百姓歸心號為咸陽王帝使以章示異惶懼上書謝曰臣本諸生遭遇受命之㑹充備行伍過蒙恩私位大將爵通侯受任方面以立微功皆自國家謀慮愚臣無所能及臣伏自思惟以詔勅戰功每輒如意時以私心斷決未嘗不有悔國家獨見之明久而益逺乃知惟性與天道不可得而聞也當兵革始擾攘之時豪傑競逐迷惑千數臣以遭遇託身聖明在傾危溷殽之中尚不敢過差而况天下平定上尊下卑而臣爵位所蒙巍巍不測乎誠兾以謹勅遂自終始見所示臣章戰慄怖懼伏念明主知臣愚性固敢因縁自陳詔報曰將軍之於國家義為君臣恩猶父子何嫌何疑而有懼意後隗囂死其將王元宗周等復立囂子純猶總兵據冀公孫述遣將趙匡等救之帝復令異行天水太守事攻匡等且一年皆斬之時賜馮異璽書曰聞吏士精鋭水火不避購賞之賜必不令將軍負丹青失斷金也魏太祖初為曹公平呂布泰山臧霸孫觀吳敦尹禮昌狶各聚衆布之破劉備也霸等悉從布布敗獲霸等公厚納待遂割青徐二州附于海以委焉後攻袁譚於兾州時李孚為譚主簿東還平原及譚戰死孚還城城中雖必降尚擾亂未寧孚權宜欲得見太祖乃騎詣牙門稱兾州主簿李孚欲口白宻事太祖見之孚叩頭謝太祖問其所白孚言今城中彊弱相凌心皆不定以為宜令新降為内所識信者宣𫝊明教公謂孚曰卿便還宣之孚跪請教公曰便以卿意宣也孚還入城宣教各安故業不得相侵陵城中以安乃還報命公以李孚為良足用也文帝時蜀孟達與劉封忿争不和達率所領降魏帝善達之姿才容觀以為散騎常侍建武將軍封平陽亭侯合房陵上庸西城三郡以達領新城太守遣征南將軍夏侯尚右將軍徐晃與達共襲封帝時近出乗小輦執達手撫其背戲之曰卿得無為劉備刺客邪遂與同載又加拜散騎常侍領新城太守委以西南之任時衆臣或以為待之太猥又不宜委以方任帝聞之曰吾保其無他亦譬以蒿箭射蒿中耳晉文帝初為魏晉公以相國總百揆荀朂為從事中郎時鍾㑹謀反於蜀主簿郭奕參軍王深以朂是㑹從甥少長舅氏勸帝斥出之帝不納而使朂陪乗待之如初元帝稱尊號後劉隗用事王敦之反也隗勸帝悉誅王氏論者為之危心王導率羣從昆弟子姪二十餘人每旦詣臺待罪帝以導忠節有素特還朝服召見之導稽手謝曰逆臣賊子何世無之豈意今者近出臣族帝跣而執之曰茂𢎞導之字也方託百里之命於卿是何言也乃詔曰導以大義滅親可以吾為安東時節假之後魏孝文時李冲為僕射仍領少傅及太子恂廢冲罷少傅後宣武為太子帝醼於清徽堂帝曰皇儲所以纂立三才光昭七祖斯乃億兆咸説天人同泰故延卿就此一醼以暢忻情帝又曰天地之道一盈一虛豈有常泰天道猶爾况人事乎故有升有黜自古而然悼往忻今良用深嘆冲對曰東輝承儲蒼生咸幸但臣忝前師傅弗能弼諧仰慙天日兹遇寛舍得預此醼慶慰交深帝曰朕尚弗革其昏師傅何勞愧謝也宣武時東昬母弟蕭寶寅梁武既克建業殺其兄弟將害寶寅乃歸誠宣武伏訴闕下請兵南伐雖遇暴風大雨終不暫移是年冬梁江州刺史陳伯之與其長史褚胄等自夀春歸降請軍立效宣武以寶寅誠懇及伯之所陳時不可失四年二月乃引八座門下入議部分之方四月除使持節都督東揚南徐兖三州諸軍事鎮東將軍揚州刺史丹陽郡開國公齊王配兵一萬令且據東城待秋冬大舉寶寅明當拜命其夜痛哭至晨備禮䇿授賜車馬什物及虎賁五人事從豐厚又任其募天下壯勇得數千人以文智三人等為積弩將軍文榮等三人為强弩將軍並為軍主後周太祖能駕馭英豪一見之間咸思用命沙苑所獲囚俘釋而用之河橋之役率以撃戰皆得其死力史寜仕魏為涼甘𤓰等三州諸軍事遣使詣太祖請事太祖即以所服冠履衣被及弓箭甲矟等賜寧謂其使人曰為我謝涼州孤觧衣以衣公推心以委公公其善始令終無損功名也庾季才梁元帝時領太史江陵陥太祖一見深加優禮令參掌太史每有征討常預侍從賜宅一區水田十頃奴婢牛羊什物等因謂季才曰卿是南人未安北土故有此賜者欲絶卿南望之心宜盡誠事我當以富貴相答隋髙祖初為周相即委髙熲以心膂開皇九年晉王大舉伐陳以熲為元帥長史軍還以功授上柱國帝因勞之曰公伐陳後人言公反朕已斬之君臣道合非青蠅所間也是後右衛將軍龎晃及將軍盧賁等前後短熲扵帝帝怒之皆被疎黜因謂熲曰孤度公猶鏡也每被磨瑩皎然益明煬帝即位以長孫晟為左領軍漢王諒作逆勅以本官為相州刺史發山東兵馬與李雄等共經畧之晟辭曰有男行本今在逆地忽䝉此任情所不安帝曰公著勤誠朕之所悉今相州之地本是齊都人俗澆浮易可搔擾儻生變動賊勢即張思所以鎮之非公莫可體國之深終不可以兒害義故用相委公其勿辭於是遣赴相州唐髙祖武徳元年十一月遣光禄卿李宻往瀍雒收其餘衆帝謂宻曰公卿皆有疑扵公唯朕扵公赤心相委勉立功名李靖為馬邑郡丞屬髙祖起義靖上變髙祖惡之後破開州蠻賊髙祖甚悦手詔勅靖曰既往不咎何憂何懼今日已去心中疑更不須憶舊事吾久忘之矣太宗自髫齓多大志大業末左親衛竇軌弟琮犯法亡命奔太原依扵髙祖與帝有宿憾每自疑帝方捜羅英傑降禮納之出入臥内其意乃安封同人為韓州刺史太宗即位引諸衛驍兵統將等習射於顯徳殿朝臣多有諫者曰先王制法有以兵刃至御所者絞刑所以防萌杜漸備不虞也今引卑碎之人彎弧縦矢於軒陛之側陛下親在其間正恐禍出不意非所以為社稷計也同人矯乗驛馬入朝切諫帝皆不納謂之曰我以天下為家率土之内盡為臣子所恨不能將我心徧置天下豈當有相疑之道也自是後人人自勵一二年間兵士盡便弓馬皆為鋭卒尉遲敬徳仕劉武周為大將太宗為秦王時来降授秦府統軍從太宗擊王世充於東都既而武周降將尋相蘇筠等皆叛諸將疑敬徳亦當必走乃禁於軍中行臺左僕射屈突通等咸言敬徳初歸國家忠志未附此人勇健非常縶之又久既被猜貳狠怨必生留之恐貽後悔請殺之太宗曰寡人所見有異扵公敬徳若懐翻背之計豈在尋相之後乃命釋之引入行宮賜以金寶而謂之曰丈夫以意氣相期勿以小疑介意寡人終不聽讒言以害良善公宜體之必應欲去今以此物相資表一時共事之情也因從獵於榆窠王世充出步騎數萬來戰賊將單雄信恃其驍悍領騎直入以趨太宗敬徳乃躍馬大呼横刺單雄信中之賊徒稍却敬徳翼太宗以出圍因率騎兵與王世充交戰數合其衆大潰擒偽將陳智略等獲排矟兵六千人太宗憇扵古丘謂敬徳曰昨衆人證公必叛走天誘吾意獨保明之福善有徵何相報之速也賜金銀各一箧此後恩眄日隆劉師立初為王世充騎將武徳中雒陽既平師立罪當誅太宗惜其勇力保䕶得免引為左親衛特蒙委接任以心膂貞觀六年十二月辛未太宗親録囚徒多所原宥見死罪者憫之放歸於家限至來秋即戮乃勅天下死囚皆放令入京並依期而集扵是天下死囚三百九十九人皆釋禁自至朝堂不勞督領一無逃者太宗感其奉法竟盡赦之薛萬徹為右衛大將軍出青丘道伐髙麗萬徹在軍仗氣凌物人或奏之及還謁見太宗謂曰上書者論卿與諸將不協朕録功棄過不罪卿也因取書焚之侯君集既與太子承乾謀逆時張亮以太子詹事出為潞州刺史君集激怒亮曰何為見排也亮曰是公所排更欲誰寃君集曰我平一國而来遂逢屋許大􅀈何能仰排因攘袂曰鬱鬱不可活公能反乎當與公反耳亮奏之太宗曰君集怨望則有之何至扵反我意在兩全公慎勿言太宗待君集如初穆宗長慶元年劉總為幽州節度頻獻表章請分割當管土地及進征馬以明忠懇朝廷自宰臣公卿以下皆疑其詐帝獨推納之總思有以寛濟乃舉張𢎞靖自代文宗太和元年五月詔曰元首股肱君象臣類義深同體理在坦懐夫任則不疑疑則不任自魏晉以降參用霸制虛儀捜索因習尚存朕方推表大信實人心腹庶使諸侯方岳鼔洽道化夷貊飛走暢泳性分况吾台宰又何間焉自今以後紫宸坐朝衆寮既退宰臣復進奏事其監捜宜停後唐莊宗以天祐十二年平鄴城斬張彦及同惡者七人軍中股慄帝親加撫慰而退翌日帝輕裘緩榮而進令張彦部下軍士披甲持兵環馬而從因命為帳前銀槍衆心大服同光元年帝入雒宴扵崇元殿明宗及偽庭大將軍預焉帝酒酣顧明宗曰今辰宴客皆吾前日之勍敵也一旦與吾同筵蓋卿前鋒之功也偽將霍彦威戴恩逺伏堦叩頭帝曰與卿話舊無足畏也因賜御衣酒器盡歡而罷帝之營徳勝也彦威思逺皆為軍帥屯楊村寨日與帝挑戰交兵故有是言張全義為雒京留守莊宗平定汴州全義辭歸奏曰請大駕便幸雒陽臣已備郊天法物儀仗請謁廟之後便行大禮同光二年二月郊天禮畢加太尉中書令河陽三城節度使仍賜保忠歸正安國功臣進封齊王河南尹如故初全義自雒朝覲汴州泥首待罪帝撫勞釋之以其老羸令人掖之升殿陳敘帝謂曰卿兒姪無恙尚在河南吾誅滅偽庭正為卿家爾慰勞甚歡華温琪為耀州觀察使留後莊宗入雒温琪入覲賞曩嵗守平陽之功且無貳於梁所賜甚厚詔改耀州威勝軍為順義軍復以溫琪鎮之加推忠尚義功臣周知裕少事劉仁恭歸款扵梁為歸化軍指揮使同光初莊宗入汴知裕隨段凝軍觧甲扵封丘明宗時為總管受降扵郊外見知裕甚喜遙相謂曰周歸化今為吾人何樂如之因令諸子以兄事之莊宗撫憐甚異而諸校心妬之有壯士唐從益者因獵射之知裕遁而獲免莊宗遂誅從益出知裕為房州刺史劉玘初仕梁為晉州觀察使留後莊宗復收汴州玘来朝玘在平陽八年日與上黨太原之師交鬭境上莊宗見而勞之曰劉侯無恙爾控吾晉陽之南鄙嵗時久矣不早相聞今日見訪不其晏歟玘頓首謝之郊天後令歸鎮正授旌節尋有詔授封安逺軍晉髙祖天福四年春正月詔太子太師致仕范延光賜宴便殿以延光常為偽主帥師拒我義旌識量幽狭不體大觀乃至嬰城叛命及降雖著以信誓委之方任而又表乞致仕常内疚其心狐疑怏怏故休假之内賜其款宻謂之曰無忿疾以傷厥神無憂思以勞厥衷朕將忱裕四方豈有食言扵汝也延光俯伏拜謝其心遂安漢隐帝賜前昭義軍節度使張從思衣一襲金帶鞍馬綵帛等物時有投無名文字誣告從思者故特有是賜以安其心親信虞書有臣鄰之言周雅有疏附之義蓋謂乎親之以道信之以徳故其應也若心手之相視其順也若臂指之相隨出䖏不疑語黙無間簡在上意克濟時用者矣若夫肇自里閈即敦情好雅同黌序備識器幹幽贊艱難之際協奉亨嘉之㑹其有頗資謀勇數從征伐深藴忠慎常列左右謹肅無過質直有守内則規正其事外則將順其美俾之入侍帷幄出陪輦蹕大得以諮詢國事小得以參備宿衛寵待侔扵宰執愛厚等於公族至有周旋禁闥多歴年所躬調御膳専司侍醫祇奉清問過䝉賞賚雖同職而莫望何外庭之能比哉漢髙祖與盧綰同里又同日生及帝起沛綰以客從入漢為將軍常侍中從東撃項籍以太尉常從出入卧内雖蕭曹等特以事見禮至其親幸莫過綰者武帝時石建為郎中令奏事於帝前即有可言屏人乃言極切有可言謂有事當奏陳至廷見如不能言者廷見謂當朝而見時帝以是親而禮之霍光武帝時為奉車都尉光禄大夫出則奉車入侍左右出入禁闥二十餘年宮中小門謂之闥小心謹慎未嘗有過甚見親信金日磾為侍中光禄大夫日磾既親近未嘗有過失帝甚信愛之賞賜累千金出則驂乗入侍左右貴戚多竊怨曰陛下得一亡胡而反重貴之帝聞之愈厚焉昭帝時右衛將軍光禄勲張安世與大將軍霍光同輔政帝甚尊憚大將軍然而内親安世心宻扵光焉宣帝時太僕杜延年久典朝政帝任信之出即奉駕入給事中居九卿位十餘年賞賜賂遺貲數千萬夏侯勝宣帝時為諫議大夫給事中為人質樸平正簡易無威儀見見謂見扵天子時謂帝為君誤稱字於前前天子之前也君前臣名不當相呼字也宣帝以是親信之後漢光武時丁恭拜侍中祭酒散騎都尉與侍中劉昆俱在左右每事諮訪焉和帝永元中賈逵為侍中領騎都尉内備帷幄兼領秘書近署甚見信用靈帝時蓋勲為京兆尹勲雖在外每軍國大事帝常手詔問之數加賞賜甚見親信在朝臣之右魏太祖初起史渙以客從行中軍校尉從征伐常監諸將益見親信轉中領軍韓浩為護軍從帝討張魯魯降議者以浩知畧足以綏邉欲留使都督諸軍鎮漢中帝曰吾安可以無護軍乃與太祖俱還其見親任如此晉元帝時劉隗為丹陽尹尚書令刁協並為帝所寵欲排抑豪彊諸刻碎之政皆云隗協所建隗雖在外萬機祕宻皆預聞之孝武帝時殷仲堪為太子中庶子甚見親愛領黄門郎寵任轉隆帝以㑹稽王非社稷之臣擢所親幸以為藩垣仍授仲堪都督荆益寧三州軍事震威將軍荆州刺史假節鎮江陵將之任又詔曰卿去有日使人酸然常謂永為廊廟之寶而忽為荆楚之珍良以慨恨其恩狎如此王雅仕孝武歴右衛將軍丹陽尹領太子左衛率雅性好接下敬慎奉公帝深加禮遇雖在外職侍見甚數朝廷大事多參謀議帝每置酒宴集雅未至不先舉觴其見重如此帝起清暑殿扵後宮開北閣出華林園與美人張氏同㳺止惟雅豫焉後魏道武初在賀蘭部時長孫肥常侍從禦侮左右帝深信仗之長孫道生忠厚謙謹帝愛其慎重使掌機宻與賀毗等四人内侍左右出入詔命奚攸代人重厚有智謀帝寵遇之稱曰仲尼使敷奏政事參與計謀崔𤣥伯道武時為周兵將軍與舊功臣庾嶽奚斤等同班而信寵過之李栗少有才能兼有將畧初隨道武幸賀蘭部在元從二十一人中道武愛其藝能時王業草創腹心爪牙多任親近惟栗介逺寄兼戚舊當世榮之明帝即位以内侍獵郎叔孫俊與元磨渾等拾遺左右俊性平正柔和未嘗有喜怒之色忠篤愛厚不謟上抑下每奉詔宣外必告示殷勤受事者皆飽之而退事宻者倍至蒸仍蒸猶孜孜仍猶殷勤是以上下嘉歎太武為太子時盧魯元初以忠謹給事東宮及即位以為中書侍郎拾遺左右寵待彌渥而魯元益加謹肅帝益親信之内外大臣莫不敬憚焉後以征平凉功拜征北大將軍加侍中後遷太保録尚書事帝貴異之常從征伐出入臥内李孝伯太武時為光禄大夫掌軍國機宻甚見親寵謀謨切祕時人莫能知也伊馥為殿中尚書常典宿衛帝親任之毛修之為前將軍光禄大夫修之能為南人飲食手自煎調多所適意太武親待之進太官尚書賜爵南郡公加冠軍將軍常在太官主進御膳許彦為散騎常侍與人言不及内事太武以是益親待之羅結為侍中外都太官總三十六曹事年一百七嵗精爽不衰太武以其忠慤甚見信待監典後宮出入臥内因除長秋卿文帝時韓彦為光武將軍帝稱其聰敏清辨才任喉舌遂命出納王言並掌機宻行幸逰獵隨侍左右獻文天安初李安世為中散以温敏敬慎帝親愛之累遷主客令陸定國自襁抱與帝同處及踐祚為殿中尚書前後大駕征廵每擢為行臺録都曹事乞伏龜獻文時為散騎常侍領牧曹尚書賜爵寧國侯以忠謹慎宻常侍左右孝文時李波為户部尚書帝深相仗信親敬彌甚君臣之間情義莫二楊椿性寛謹孝文時為侍御中散典御廐曹以端慎小心専司醫藥遷内給事與兄播並侍禁闈王翔少以聰敏循良詔充内使自太和初與李冲等奏決庶事迄乎十六年賜賞前後累千萬宣武時甄琛為散騎常侍領給事黄門侍郎定州大中正大見親寵委以門下庶事出參尚書入厠帷幄趙修本初給事東宮為白衣左右頗有膂力帝踐祚乃充近侍受遇日隆旬月之間頻有轉授每受除設宴帝親幸其宅咸陽王禧家貨多賜髙肇及修孝莊帝建義初在河陽楊逸獨往謁帝特除給事黄門侍郎領中書舍人及朝士濫禍帝益憂怖詔晝夜陪侍數日之内常寢宿扵御床前帝曽夜中謂逸曰昨來舉目惟見異人頼得卿差以自慰後周太子既平侯莫陳崇見髙平郡守李逺與語悦之令居麾下甚見親遇後為左僕射帝又以第十一子代王達令逺子之其見親待如此蔡祐為平東將軍從太祖拒齊獻武王扵河橋是戰也我軍不利帝已還祐至𢎞農帝引見祐至字之曰承先爾來吾無憂矣帝心驚不得寢枕祐股上乃安伊婁穆弱冠為太祖所親信以機辯見知授奉朝請常侍左右李穆為并州總管少明敏有度量太祖入關便給事左右深被親遇穆亦小心謹宻未嘗懈怠太祖嘉之遂䖏以腹心之任出入卧内當時莫與為比陸通為太祖帳内督頗見親禮晝夜陪侍家人罕見其面通雖䖏機宻愈自恭謹太祖心向重之武帝與宇文孝伯同日生又與同學武成初拜宗師上士遷小宗師常侍左右出入臥内朝之機務皆得預焉孝伯亦竭心盡力無所迥避至扵時政得失及外間細事皆以聞奏帝深委信之當時莫與為比及帝將誅晉公護宻與衛王直圖之唯孝伯及王軌宇文神舉等頗得參預護誅授開府儀同三司為右宮正隋髙祖初總百揆劉昉以定䇿之功封黄國公沛國公鄭譯皆為心膂前後賞賜鉅萬出入以甲士自衛朝野傾矚稱為黄沛時人為之語曰劉昉牽前鄭譯推後李徳林為内史令自帝有天下每贊平陳之計及帝幸同州以疾不從勅書追之後御筆註云伐陳事意宜自隨也時髙熲因使入京帝語熲曰徳林若患未堪行宜自至宅取其方略崔彭開皇初為驃騎將軍典宿衛性謹宻在省闈二十餘年每當上在仗危坐終日未嘗有怠惰之容帝甚嘉之每謂彭曰卿當上日我寢䖏自安煬帝令李景營遼東戰具扵北平㑹幽州賊楊仲緒率衆萬餘人来攻北平景督兵撃破之斬仲緒于時盜賊蜂起道路隔絶景遂召募以備不虞虎賁郎將羅藝與景有隙遂誣景將反帝遣其子慰諭之曰縱人言公闚天闕據京都吾無疑也斛斯政明悟有器幹大業中為尚書兵部郎政有風神每奏事未嘗不稱㫖帝悦之漸見委信裴矩為虎賁郎將大業十一年從帝北廵狩始畢率騎數十萬圍帝扵鴈門詔令矩與虞世基每宿朝堂以待顧問唐髙祖武徳初竇威為内史令帝甚重之每引入臥内相見帝為膝席朝廷疑議多取決扵威太宗為秦王時劉師立為左親衛㑹建成元吉等潛謀禍亂帝與謀自安之道或至登閤去人通宵達旦師立每進忠規多䝉嘉納及建成死超拜右衛率張亮帝為秦王時為車騎將軍委以心膂㑹隐太子與帝搆怨帝深懐危懼以雒州形勝之地一朝有變將出保之乃遣亮之雒統左右王保等千餘人隂引山東豪傑以候變及建成死除右衛將軍周範為秦王庫旦車騎帝既踐祚累遷右屯衛將軍宿衛扵𤣥武門以忠節見知故特䝉親委俄遷左衛將軍李太亮為左衛大將軍貞觀十七年為東宮太子寮屬皆盛選重臣以太亮兼領太子右衛率俄兼工部尚書身居三職宿衛兩宮名為親信太亮每當宿直必通宵假寢帝常勞之曰至公宿直我便通宵安臥其見信如此帝每有廵幸多令居守武士稜性恭順勤扵稼穡從起義官至司農少卿封宣城縣公帝居苑中委以農囿之事肅宗初李泌觧褐拜銀青光禄大夫俾掌樞務至扵四方文狀將相遷除皆與泌參議位非宰相實輔臣也初泌以博涉經史善屬文𤣥宗時常獻書論當世務為執政者不便乃潛遁自適天寶末禄山搆難帝即位泌自汝州冐難奔赴行在時帝興師靈武注意求賢一見固辭不就官秩特以散官寵之徳宗建中末陸贄為翰林學士艱難中贄為内職行止輒隨從精潔小心未嘗有過誤帝特所親信待之不以嚴侍見從容言笑至或脱御衣以衣之或以姓第呼為陸九同職莫敢望之初帝自奉天適梁州山路危險往往與從官相失夜至驛求贄不得驚悲涕泣募扵衆曰有能得贄者吾與千金久之贄乃至帝喜皇太子以下皆賀齊映興元初為給事中白晳長大言音髙朗帝自興元還京師常令映侍或前馬至城邑鎮守輒令映宣詔令帝益親信之王紹貞元中為户部尚書判度支時帝臨御嵗久機務不繇台司自竇參陸贄已後宰臣備位而已惟以紹謹宻恩遇特異凢主重務八年政之大小多所訪決紹未嘗洩漏亦不矜衒後唐武皇初鎮撫太原時牙將蓋寓最為親信中外將吏無不景附朝廷藩隣信使結託先及武皇次入寓門既總軍中大柄其名震主梁祖亦使奸人離間暴揚扵天下言蓋寓已代李克用聞者寒心武皇略無疑間每家事珍膳窮極海陸精扵㕑饌武皇非寓家所獻不食每幸寓第其往如歸恩寵之洽時無與比及其卒也哭之甚慟張敬詢武皇時専掌甲坊十五年以稱職聞復以女為皇子存霸妻益見親信莊宗時張建為帳下小校及帝救上黨戰柏鄉攻薊門下邢魏皆從之後戰扵華縣及胡栁阪繼為流矢所中金瘡之痕盈扵面前莊宗寵之統御營黄甲軍常在左右畧加檢校兵部尚書帳前步軍都虞候明宗在藩邸時安重誨得給事左右年尚㓜而勤恪頴悟出扵時軰漸得帝意帝之鎮邢臺也俾職閽司隨從征討垂十餘年親信無間厯數鎮咸委心腹之任及鄴城之變也天下之心知所歸矣佐命之功獨居其右安彦威善射少隷并州為騎士及長尤涉兵法莊宗與梁軍戰扵河上彦威累從帝擒敵有功帝在藩邸用為腹心厯鄆汴常等州牙帳親校彦威性謹厚甚見委任康義誠時為侍衛親軍馬步軍都指揮使帝寵而倚之每乗輿出幸近甸多遣義誠次馬首而行問以外事翟光鄴年十嵗為軍所俘帝以其頴悟俾侍左右既冠沉毅有謀莅事寡過帝踐祚特深委遇累更内職至皇城使檢校司空末帝即位初以前興州刺史劉遂清為西京副留守其兄遂雍先為西京副留守帝自鳳翔始憂王思同藥彦稠合力固城至岐山聞遂雍不内思同甚喜遣人宣撫遂雍乃盡出庫蔵於軍士前至者便賞給令過比軍前賞遍並不入城帝至奉迎仍括率都民刑捶嚴酷而軍獲濟帝見握手流涕自是相隨事無巨細必與遂雍謀而後行帝即位以遂雍為淄州刺史仍以遂清代其任漢髙祖時李彦從少習武藝出行伍間帝典禁軍以鄉里之舊任為親信國初用為左飛龍使檢校司空册府元龜卷九十九
