body:
  text: 册府元龜巻九百八十二宋王欽若等撰外臣部征討夫中國之於夷狄覊縻勿絶而已其或申威攘之令舉攻伐之兵亦所以討不惠遏内侮震耀王靈攘除民患誠不得已而用之也自帝軒之世降及三代蠢兹荒獷嘗聞猾夏盖亦陳師薄伐殱夷驅逐流乎雅頌紀乎春秋秦漢之後邊患繼作曷嘗不厲兵鞠旅賦車籍馬徂征爕伐以見武節或頻出而無寧歲或畧地而極遐徼以至宣威固圉庶民頼其保障解紛救患殊俗被乎恩信原夫要荒之外聲教罕暨鷙猛以成性貪惏而無厭自非内敦乎德義外施乎武怒亦何以革其禍心而靖其亂畧哉嚴尤所謂戎狄之侵譬猶蟁蝱之螫毆之而已真知言者歟黄帝北逐葷粥匃奴傳曰唐虞以上有山戎獫狁葷粥居于北蠻夏后相二年征黄夷先是太康失國四夷背叛及后相即位乃征畎夷七年然後來賓商成湯即位征畎夷先是后桀之亂畎夷入居邠岐之間成湯既興伐而攘之高宗伐鬼方三年乃克鬼方西羌也武乙三十五年周王季伐西落鬼戎俘二十翟王也太丁二年周人伐燕京之戎四年周人伐余無之戎克之周王季命為殷牧帥也七年周人伐始呼之戎克之十一年周人伐翳徒之戎㨗其三大夫周文王時西有昆夷之患北有玁狁之難遂攘戎狄西戎之國莫不賓服成王時東伐淮夷踐奄奄國在淮夷之北遷其君薄姑齊地穆王時戎狄不貢王行大戎獲其五王夷王時荒服不朝乃命虢公伐太原之戎至于俞泉獲馬千匹宣王時命秦仲伐戎為戎所殺乃召秦仲子莊公與兵七千人伐戎破亡又命召穆公虎平淮夷先是懿王時戎侵中國宣王興國命將以征伐之詩人羙大其功曰薄伐獫狁至于太原小雅六月之詩也薄伐言逐出之出車彭彭城彼朔方小雅出車之詩也彭彭盛也朔方地也言獫狁既去北方安静乃築城以守又命方叔為將南征荆州之蠻作采芑詩曰方叔涖止其車三千師干之試師衆干扞試用也又曰蠢爾蠻荆大邦為讎方叔元老克壯其猶猶道也又曰顯允方叔征伐獫狁蠻荆來威方叔先與吉甫征伐獫狁今特往伐蠻荆皆使其來服于宣王之威襄王十五年以翟王女為后十六年復絀翟后王子帶開翟人翟人遂入周襄王出奔温居外四年乃使使告急于晉晉文公初立欲修覇業乃興師伐戎翟誅子帶迎内襄王于雒邑當是時秦晉為强國晉文公攘戎狄居于西河圁雒之間圁音嚚地理志圁水出上郡白土縣西東流入于河圁水即今銀州銀水是也雒水今亦謂之漆沮也號曰赤翟白翟二十四年狄伐晉晉侯敗狄于箕郤缺獲白翟子頃王時魯叔孫得臣敗翟于鹹魯地也獲長翟僑如冨父終甥舂其喉以戈殺之冨父終甥魯大夫也舂猶衝也埋其首于子駒之門子駒魯郭門名以命宣伯宣伯叔孫得臣子僑如也臣獲僑如以名其子使後世旌識其功初宋武公之世鄋瞞伐宋武公周平王時在春秋前二十五年鄋瞞長翟國名司徒禦之以敗翟于長丘宋地名獲長翟縁斯僑如之祖也晉之滅潞在魯宣公十五年獲喬如弟棼如然後終其事定王六年鄋瞞伐齊王子城父獲其弟榮如埋其首于北門按年表齊惠公二年魯宣公之二年衛人獲其弟簡如獲與僑如同時鄋瞞由是遂亡長翟之種絶又定王時荀林父敗赤狄于曲梁乃滅潞曲梁今廣平曲梁縣也酆舒奔衛衛人歸諸晉晉人殺之景王時楚子聞蠻氏之亂也與蠻子之無質也質信也使然丹誘戎蠻子嘉殺之遂取蠻氏既而復立其子焉禮也誘之非也立其子禮也河南新城縣束南有蠻城敬王時楚人既克夷虎夷虎蠻夷叛楚者乃謀北方左司馬眅申公壽餘葉公諸梁致蔡于負凾三子楚大夫也此蔡之故地人民楚因以為邑致之者㑹其衆也致方城之外于繪關負凾繪關皆楚地曰吳將泝江入郢逆流曰泝將奔命焉為一昔之期襲梁及霍偽辭當備吳夜結期明日便襲梁霍使不知之梁河南梁縣西南故城也梁南有霍陽山皆蠻子之邑也單浮餘圍蠻氏蠻氏潰浮餘楚大夫蠻子赤奔晉隂地隂地河南山北洎上雒以東至陸渾司馬起豐析與戎狄楚司馬取也析縣屬南鄉郡析南有豐鄉皆楚邑發此二邑人及戎狄以臨上雒左師軍于莬和莬和山在二雒東也右師軍于倉野倉野在上雒縣使謂隂地之命大夫士蔑命大夫刷縣監尹曰晉楚有盟好惡同之若將不廢寡君之願也不然將通於少習以聽命少習商縣武關也將大開其武關道以伐晉者也士蔑請諸趙孟趙孟曰晉國未寧安能惡於楚必速與之未寧時有范中行之難士蔑乃致九州之戎九州戎在晉隂地陸渾者將裂田以與蠻子而城之以詐蠻子且將為之卜卜城蠻子聽卜遂執之與其五大夫以畀楚師于三戸今丹水縣北有三戸亭司馬致邑立宗焉以誘其遺民楚復詐為蠻子作邑立其宗主而盡俘以歸元王元年楚沈諸梁伐東夷報越三夷男女及楚師盟于敖從越之夷三種敖東夷地秦始皇三十二年燕人盧生使入海還以鬼神事因奏録圖書曰亡秦者胡也胡胡亥秦二世名也秦見圖書不知此為人胡反備北胡始皇乃使將軍蒙恬發兵三十萬人北擊胡畧取河南地三十三年發諸嘗逋亡人贅壻贅謂居窮有子使就其婦家為贅壻賈人畧取河南陜西地為桂林今鬰林是象郡今日南南海以適遣戍五十萬人守五嶺西北斥逐匃奴自榆中在金城並河以東並音傍依傍也屬之隂山在五原北以為三十四縣城河上為塞又使蒙恬渡河取高關陶山北假口王莽傳曰五原北假膏壤殖榖北假地名也築亭障以逐戎人徙謫實之漢高帝七年匃奴大攻圍馬邑代王信即韓王信也降匃奴匃奴得信因引兵南踰句注攻太原至晉陽下帝自將往擊之會冬大寒雨雪卒之墮指者十二三文帝三年五月匃奴入居北地河南為寇北地郡之北黄河之南即白羊所居帝幸甘泉天子車駕所至民臣為僥幸故曰幸見令長三老官屬親臨軒作樂賜以酒食帛葛越巾佩帶之屬民爵有級數或賜田租之半故因謂之幸也甘泉在雲陽本秦林光宮遣丞相灌嬰擊匃奴匃奴去十四年冬匃奴寇邊殺北地都尉邛功臣表云鉼侯孫單以父北地都尉卭力戰死事文帝十四年封與此正合然則卭姓孫而徐廣乃云姓段説者因曰叚㑹宗即卭之元孫無所據也㑹宗漢書有傳班固不云是卭後何從而知之乎遣三將軍軍隴西北地上郡中尉周舎為衛軍郎中令張武車騎將軍軍渭北車千乗騎卒十萬人帝親勞軍勒兵申教令申謂約束之賜吏卒自欲征匃奴群臣諫不聽皇太后固要帝乃止要欲也哀痛呪誓之言於是以東陽侯張相如為大將軍建成侯董赫内史欒布皆為將軍擊匃奴匃奴走武帝建元三年七月越圍東甌東甌告急遣中大夫嚴助持節發㑹稽兵浮海救之未至閩越兵走六年八月閩越王郢攻南越遣大行王恢將兵出豫章大司農韓安國出㑹稽擊之未至越人殺郢降兵還初閩粤擊南粤南粤守以天子約不敢擅發兵而以聞帝遣恢及安國皆為將軍兵未隃隃與踰同嶺閩越王郢發兵距險其弟餘善與宗族謀曰王以擅發兵不請故天子兵來誅漢兵衆强即幸勝之後來益多言漢地廣大兵衆盛强今雖勝之後更來也滅國乃止今殺王以謝天子天子罷兵固國完不聽乃力戰不勝即亡入海皆曰善即鏦殺王鏦音初江切使使奉其頭致大行大行曰所為來者誅王王頭至不戰而殞利莫大焉乃以便宜案兵告大司農軍而使使奉王頭馳報天子詔罷兩將軍兵元光六年春匃奴入上谷殺畧吏民遣車騎將軍衛青出上谷騎將軍公孫敖出代輕車將軍公孫賀出雲中驍騎將軍李廣出鴈門青至龍城匃奴單于祭天大會諸國名其處為龍城獲首虜七百級廣敖失師而還元朔元年秋匃奴入遼西殺太守入漁陽雁門敗都尉殺畧三千餘人遣將軍衛青出雁門將軍李息出代獲首虜數千級二年正月匃奴入上谷漁陽殺畧吏民千餘人遣將軍衛青李息出雲中至高闕山名也一曰塞名也在南朔方之北遂西至符離幕北塞名也獲首虜數千級收河南地置朔方五原郡四年夏匃奴入代定襄上郡殺數千人明年春大將軍衛青將六將軍兵十餘萬出朔方高闕獲首虜萬五千級五年秋匃奴入代殺都尉明年二月大将軍衛青将六將軍兵十餘萬騎出定襄斬首三千餘級還休士馬于定襄雲中雁門四月青復將六將軍絶漠漠沙漢匃奴之南界也沙土曰漠直度曰絶或云是塞外地名非也漠者即今之突厥中磧耳李陵歌曰經千里兮渡沙漠大克獲前將軍趙信軍敗降匃奴右將軍蘇建亡軍獨身脱還贖為庶人元狩二年三月遣驃騎將軍霍去病出隴西至臯蘭臯蘭山名也霍去病傳曰過焉攴山千有餘里合短兵鏖臯蘭下則此山是也鏖音烏高切斬首八千餘級是月將軍去病公孫敖出北地千餘里過居延居延匃奴中地名韋昭以張掖所置居延縣者以要安處所獲居延人置此縣斬首虜三萬餘級匃奴入雁門殺畧數百人遣衛尉張騫郎中令李廣皆出右北平廣殺匃奴三千餘人盡亡其軍四千人獨身脱還及公孫敖張騫皆後期當斬贖為庶人四年春將軍衛青將四將軍出定襄將軍去病出代各將五萬騎歩兵踵軍後數十萬人踵接也猶言躡其踵青至漠北圍單于斬首萬九千級至闐顔山乃還闐音塡塞之塡去病與左賢王戰斬獲首虜七萬餘級封狼居胥山乃還登山祭天築土為封刻石紀事以彰漢功兩軍戰士死者數萬人前將軍廣後將軍食其皆後期廣自殺食其贖死李廣傳云引兵與右將軍食其合軍出東道又曰廣自剄右將軍下吏當死贖為庶人霍去病傳亦云趙食其為右將軍平陽侯襄為後將軍此紀為誤也傳寫者誤以右為後食其音異基元鼎五年四月南越王相臣呂嘉等反殺漢使者及其王王太后以衛尉路博德為伏波將軍出桂陽下湟水湟音皇主爵都尉楊僕為樓船將軍出豫章下横浦一云下湞水故歸義越侯二人為戈船下瀬將軍從粤來歸義而漢封之戈船名嚴下瀬名申出零陵或下灕水或抵蒼梧使馳義侯名遺因巴蜀罪人發夜郎兵下牂牁江咸㑹番禺六年十月遂定越地九月先零羌與封養牢姐種解仇結盟與匃奴通合兵十餘萬共攻令居故安遂圍枹罕明年十月發隴西天水安定騎士及中尉河南河北卒十萬人遣將軍李息郎中令徐自為擊平之始置䕶羌校尉持節綂領焉是年南夷且蘭君殺漢使者反帝廼發巴蜀罪人常擊南越者八校尉擊之㑹越已破漢八校尉不下中郎將郭昌衛廣引兵還行誅隔滇道者且蘭言因軍行而使誅之也斬首數萬遂平南夷為牂牁郡六年秋閩粤王餘善刻武帝璽自立詐其民為妄言妄自尊大也帝遣横海將軍韓説出句章説讀為悦句章㑹稽之縣浮海從東方往樓船將軍僕出武林楊僕也中尉王温舒出梅嶺粤侯王為戈船下瀬將軍出如邪白沙明年冬咸入東粤東粤素發兵距險使狥北將軍守武林敗樓船軍數校尉殺長史樓船軍卒錢塘榬終古斬狥北將軍錢塘㑹稽縣也榬姓終古名也榬音袁為語兒侯越中地也今吳南亭是語字或作篽或作禦其音同竟平閩粤元封二年四月朝鮮王攻殺遼東都尉乃募天下死罪擊之先是朝鮮王右渠誘漢亡人滋多又未嘗入見不朝見天子也漢使涉何譙諭右渠終不肯奉詔譙責讓也何去至界臨浿水使馭刺殺送何者朝鮮禆王長長者禆王名也送何至浿水上何因刺殺之遂歸報天子曰殺朝鮮將帝為其名羙弗詰拜何為遼東東部都尉朝鮮怨何發兵襲攻殺何天子募罪人擊朝鮮其秋遣樓船將軍楊僕從濟浮渤海兵五萬左將軍荀彘出遼東誅右渠二年夏朝鮮相尼谿相叅使人殺其王右渠來降初左將軍荀彘樓船將軍楊僕擊朝鮮二將不和右將軍與使者執樓船將軍左將軍已并兩軍即急擊朝鮮朝鮮相路人相韓陶尼谿相叅將軍王唊音頰相與謀曰始欲降樓船樓船今執獨左將軍并將戰益急恐不能與不能與猶言不如也王又不肯降陶唊路人皆亡降漢路人道死尼谿相叅乃使人殺朝鮮王右渠來降王險城未下故右渠之大臣成已又反復攻吏左將軍使右渠子長右渠之子名長降相路人子最相路人前已降漢而死于道故謂之降相最者其子名告諭其民誅成已故遂定朝鮮太初元年八月遣貳師將軍李廣利發天下謫民西征大宛初貳師起燉煌西為人多道上國不能食起發也道上國近道諸國也食讀曰飤分為數軍從南北道校尉王申生故鴻臚壺充國等千餘人别至郁成成守不肯給食申生去大軍二百里負而輕之負恃也恃大軍之威而輕敵人攻郁成急郁成窺知申生軍少晨用三千人攻殺申生等人脱亡走貳師走音奏貳師令搜粟都尉上官桀往攻破郁成郁成降其王亡走康居桀追至康居康居聞漢已破宛出郁成王與桀桀令四騎士縛守詣大將軍時多别將故謂貳師為大將軍四人相謂郁成漢所毒言毒恨今生將卒卒讀曰猝失大事欲殺莫適先擊適往也無有主意先擊者也音丁歴切上邽騎士趙第㧞劍擊斬郁成王桀等遂追及大將軍四年春斬大宛王首二年秋遣浚稽將軍趙破奴浚稽山在武威塞北匃奴常所以為障蔽浚音俊稽音雞二萬騎出朔方擊匃奴天漢二年五月貳師將軍李廣利三萬騎出酒泉與右賢王戰于天山在西域近蒲類國去長安八千餘里即祁連山也匃奴謂天為祁連音匡夷切今鮮卑語尚然斬首虜萬餘級又遣因扞將軍出西河騎都尉李陵將歩兵五千人出居延與單于戰斬首虜萬餘級陵兵敗降匃奴四年正月發天下七科謫吏有罪一亡命二贅壻三賈人四故有市籍五父母有市籍六大父母有市籍七凡七科也及勇敢士遣貳師將軍李廣利將六萬騎歩兵七萬人出師朔方因扞將軍公孫敖萬騎歩兵三萬人出雁門㳺擊將軍韓説説讀曰悦歩兵三萬人出五原强弩都尉路博徳歩兵萬餘人與貳師㑹廣利與單于戰余吾水上連日敖與左賢王戰不利皆引還征和三年正月匃奴入五原酒泉殺兩都尉遣貳師將軍廣利將七萬人出五原御史大夫商丘成三萬人出西河重合侯馬通四萬騎入酒泉成至浚稽山上音俊下音雞與虜戰多斬首通至天山虜引去因降車師皆引兵還廣利敗降匃奴昭帝始元元年夏益州廉頭姑繒民反殺長吏牂牁談指同並等二十四邑凡三萬餘人皆反皆西南夷别種名也並音伴遣水衡都尉呂破胡募吏民及發蜀郡犍為犇命萬餘人犇古奔字擊牂牁大破之四年姑繒葉榆復反遣水衡都尉呂辟胡將郡兵擊之辟音必辟胡不進蠻夷遂殺益州太守乗勝與辟胡戰士戰及溺死者四千餘人明年復遣軍正王平與大鴻臚田廣明等並進大破益州斬首捕虜五萬餘級獲畜産十餘萬元鳳元年三月武都氐人反遣執金吾馬適建姓馬適名建龍額侯韓增與大鴻臚廣明將三輔太常徒皆免刑擊之是時太常主諸陵縣治民三年匃奴東擊破烏桓大將軍霍光聞之因遣使度遼將軍范明友將二萬騎出遼東邀匃奴而虜已引兵明友乗烏桓新敗遂進擊之斬首六千餘人獲其三王首而還六年夏烏桓復犯塞遣度遼將軍范明友擊之宣帝本始二年匃奴數侵邊又西伐烏孫烏孫昆彌及公主國使者上書昆彌烏孫王之號也國使者漢朝之使也言昆彌願發國精兵擊匃奴惟天子哀憐出兵以救公主秋大發兵調關東輕車鋭卒調亦選也鋭利言其勇利也調音徒釣切選郡國吏三百石伉徤習騎射者皆從軍伉强也音口浪切御史大夫田廣明為祁連將軍祁連匃奴中山名也諸將分部廣明值此山因以為號也後將軍趙充國為蒲類將軍蒲類匃奴中海名也在燉煌北匃奴傳有蒲類澤雲中太守田順為虎牙將軍及度遼將軍范明友前將軍韓増凡五將軍兵十五萬騎校尉常惠持節䕶烏孫兵咸擊匃奴又云昭帝時烏孫公主上言匈奴發騎田車師車師與匃奴為一共侵烏孫天子幸救之漢養士馬議欲擊匃奴宣帝初㑹公主及昆彌皆遣使上書言匃奴復連發大兵侵擊烏孫取車延惡師地収人民去使使謂烏孫趣持公主來趣讀曰促欲隔絶漢昆彌願發國半精兵自給人馬五萬騎盡力擊匃奴惟天子出兵以救公主昆彌漢兵大發十五萬騎五將軍分道並出遣校尉常惠使持節䕶烏孫兵昆彌自將翕侯以下五萬騎從西方入至右谷蠡王庭獲單于父行及嫂居次王黎汗都尉千長騎將以下四萬級馬牛羊驢橐駝凡獲千餘萬頭烏孫皆自取其所虜獲焉兵乃止地節二年車師王烏貴立與匃奴結婚姻漢遣侍郎鄭吉校尉司馬憙憙音許吏切將免刑罪人田渠犁積榖欲以攻車師至秋收榖吉憙發城郭諸國兵萬餘人自與所將田士千五百人共擊車師攻交河城破之王尚在其北石城中未得㑹軍食盡吉等且罷兵歸渠犁田收秋畢復發兵攻車師王於石城王聞漢兵且至北走匃奴求救未為發兵王來還與貴人蘇猶議欲降漢恐不見信蘇猶教王擊匃奴邊國小蒲類斬首畧其人民以降吉車師旁小金附國隨漢軍後盜車師車師王復自請擊破金附匃奴聞車師降漢發兵攻車師吉憙引兵北逢之匃奴不敢前吉憙即留一候與卒二千人留守王吉等引兵歸渠犁車師王恐匃奴兵復至而見殺也乃輕騎奔烏孫吉即迎其妻子置渠犁東奏事至酒泉有詔還田渠犁及車師益積榖以安西國侵匃奴吉還傳送車師王妻子詣長安賞賜甚厚每朝㑹四夷常尊顯以示之於是吉始使吏卒三百人别田居車師得降者言單于大臣皆曰車師地肥羙近匃奴使漢得之多田積榖必害人國不可不爭也果遣騎來擊田者吉乃與校尉盡將渠犁田士千五百人往田匃奴復益遣騎來漢田卒少不能當保車師城中匃奴將即其城下謂吉曰即就也單于必爭此地不可田也圍城數日乃解後常數千騎往來守車師吉上言車師去渠犁千餘里間以山河間隔也音居莧切北近匃奴漢兵在渠犁者勢不能相救願益田卒公卿議以為道遠煩費可且罷車師田者遣詔長羅侯常惠也將張掖酒泉騎出車師北千餘里揚威武車師旁胡騎引兵去吉乃得出歸元康三年先零與諸羌共盟誓將欲寇邊帝聞使光禄大夫義渠安國義渠姓也將兵觀之安國至召先零豪四十餘人斬之因放兵擊其種斬首千餘級於是諸羌怨怒遂寇金城乃遣趙充國與諸將將兵六萬人擊破平之神爵元年三月西羌反發三輔中都官徒弛刑及應募佽飛射士羽林孤兒胡越騎三河潁川沛郡淮陽汝南材官金城隴西天水安定北地上郡騎士羌騎詣金城遣後將軍趙充國强弩將軍許延壽擊之甘露二年四月遣䕶軍都尉禄將兵擊珠崖元帝建昭三年秋使䕶西城騎都尉甘延壽副校尉陳湯言延夀及湯本充西域之使故先言使而後序其官職及姓名也橋發戊己校尉屯田吏士及西域胡兵攻郅支單于橋與矯同矯詐也實不奉詔詐以上命發兵故言矯發也戊己校尉者鎮安西域無主治處也亦猶甲乙等名有方位而戊與己四季寄王故以名官也時有戊校尉又有己校尉位在中央今所置校尉處三十六國之中故曰戊己也郅音質各斬其首傳詣京師縣蠻夷邸門成帝時陳立為牂牁太守立臨卭人前為連然長不韋令皆益州縣也蠻夷畏之及至牂牁諭告夜郎王興興不從命立請誅之未報乃從吏數十人出行縣行音下更切至興國且同亭且音子余切召興興將數千人往至亭從邑君數十人入見立數責因斷頭數音所具切邑君曰將軍誅亡狀為民除害願出曉士衆以興頭示之皆釋兵降釋解也鉤町王禹漏卧侯俞震恐入粟千斛牛羊勞吏士還歸郡興妻父翁指與興子邪務収餘兵廹脅旁二十二邑反至冬立奏募諸夷與都尉長史分將攻翁指等翁指據阸為壘立使竒兵絶其糧道縱反間以誘其衆間音居見切都尉萬年曰兵久不决費不可共共供也引兵獨進敗走趨立營趨讀曰趣趣向也立怒叱戲下令格之戲音許宜切又音麾都尉復還戰立引兵救之時天大旱立攻絶其水道蠻夷共斬翁指持首出降立已平定西夷徵詣京師平帝元始中車師後王國有新道出五船北通玉門關往來差近戊己校尉徐普欲開以省道里半避白龍堆之阨車師後王姑句音鈎以道當為拄置拄者支柱也言有所置立而支拄於己故心不便也拄音竹羽切又竹具切其字從手而讀之者或不曉以拄為梁拄反分破其句言置拄于心皆失之矣心不便也地又頗與匃奴南將軍地接普欲分明其界然後奏之召姑句使證之不肯繫之姑句數以牛羊賕吏求出不得姑句家矛端生火其妻脱紫陬陬音子侯切謂姑句曰矛端生火此兵氣也利以用兵前車師前王為都䕶司馬所殺今久繫必死不如降匃奴即馳突出高昌壁入匃奴又去胡來王唐兠國比大種赤水羗比近也音皮寐切數相寇不勝告急都䕶都䕶但欽不以時救助唐兠困急怨欽東守玉門關玉門關不内即將妻子人民千餘人亡降匃奴匃奴受之而遣使上書言狀是時新都侯王莽秉政遣中郎將王昌等使匃奴告單于西域内屬不當得受單于謝罪執二王以付使者莽使中郎將王萌待西域惡都奴界上逢受逢受謂先至待之逢見即受取也單于遣使送因請其罪請免其罪使者以聞莽不聽詔下㑹西域諸國王陳軍斬姑句唐兠以示之册府元龜卷九百八十二
