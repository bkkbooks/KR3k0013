body:
  text: 册府元龜卷五百十五宋王欽若等撰憲官部剛正第二後魏高謐獻文時為治書掌攝内外彈糾非法當官而行無所畏避甚見稱賞李彪為御史中尉彪既為孝文所寵性又剛直遂多所劾糾逺近畏之豪右屛氣帝常呼彪為李生於是從容謂羣臣曰吾之有李生猶漢之有汲黯高道恱拜治書御史正己當官不憚强禦奏舉任城王澄等免官孝文詔褒美之王顯為御史中尉多所彈劾百僚肅然陽固為治書侍御史宣武末中尉王顯起宅既成集寮屬饗宴酒酣問固曰此宅何如固對曰晏嬰湫隘流稱于今豐屋生災著於周易此蓋同傳舍耳唯有德能卒公勉之顯嘿然他日人謂固曰作大府卿庫藏充實卿以為何如固對曰公収百官之禄四分之一州郡贓贖悉入京藏以此充府未足為多且有聚歛之臣寧有盜臣豈不戒哉顯大不恱以此衘固又有人間於顯顯因奏固剰請米麥免固官山偉為内行長孝明初御史中丞元匡以偉兼侍御史入臺五日便遇正㑹偉司神武門其妻從叔為羽林隊主撾直長於殿門偉即劾奏匡善之俄然奏正綦雋為御史中尉於路與僕射賈顯度相逢顯度恃勲貴排雋騶列雋忿見於色自入奏之封回孝明時為七兵尚書領御史中尉尚書右僕射元欽與從父兄麗妻崔氏姦通回乃劾奏時人稱之崔亮為御史中尉侍中廣平王懷以母弟之親左右不遵憲法勅亮推治孝明禁懷不通賔客者乆之後因宴集懷恃親使忿欲陵突亮亮乃正色責之即起於帝前脫冠請罪遂拜辭欲出帝曰廣平麤疎向來又醉卿之所悉何乃如此也遂詔亮復坐令懷謝焉酈道元為御史中尉道元素有嚴猛之稱司州牧汝南王悅嬖近左右丘念常與卧起及選州官多繇於念匿於悅第時還其家道元收念付獄悅啓靈太后請全之勅赦之道元遂盡其命因以劾悅高恭之字道穆御史中尉元匡引為御史其所糾擿不避權豪臺中事物多為匡所顧問道穆曾進說於匡曰古人有言罰一人則千萬人懼豺狼當道不問狐狸明公荷國重寄宜使天下知法匡深然之後道穆為御史中尉莊帝姊壽陽公主行犯清路執赤棒卒呵之不止道穆令卒棒破其車公主深以為恨泣以訴帝帝謂公主曰高中尉清直之人彼所行者公事豈可私恨責之也道穆後見帝帝曰一日家姊行路相犯極以為愧道穆免冠謝曰臣蒙陛下恩守陛下法不敢獨於公主虧朝廷典章以此負陛下帝曰朕以愧卿卿反謝朕時僕射爾朱世隆當朝權盛因見衣冠失儀道穆便即彈糾又云恭之為御史中尉兼黄門侍郎外秉直繩内叅機宻諫諍極言無所顧憚北齊趙郡王琛魏天平中除御史中尉正色糾彈無所迴避逺近肅然司馬子瑞為御史中丞正色舉察為朝廷所許後周王誼閔帝時為左中侍上士時大冡宰宇文護執政帝拱黙無所關預有朝士於側㣲不恭誼勃然而進將擊之其人惶懼請罪乃止自是朝臣無敢不肅遷御正大夫隋桞彧開皇中為治書侍御史當朝正色文帝嘉其婞直謂彧曰大丈夫當立名於世無容容而已賜錢十萬米百石右僕射楊素當途顯貴百寮慴憚無敢忤者嘗以小譴勅送南臺素恃貴坐彧牀彧從外來見素如此於階下端笏整容謂素曰奉勅治公之罪素遽下彧據案而坐立素於庭辯詰事狀素繇是衘之彧時方為帝所信任故素未有以中之梁毗煬帝即位為刑部尚書并攝御史大夫事奏劾宇文述私役部兵帝議免述罪毗固諍因忤㫖遂令張衡代為大夫毗憂憤數月而卒房彦謙煬帝世徴為司𨽻刺史慨然有澄清天下之志凡所薦舉皆人倫表式其彈射當之者曾無怨言司𨽻别駕劉灹陵上侮下訐以為直刺史憚之皆為之拜唯彦謙執志不撓亢禮長揖有識嘉之灹亦不敢為恨游元大業中為朝請大夫兼侍御史宇文述九軍敗績帝令元案其獄述時貴倖其子士及又尚南陽公主勢傾朝廷遣家僮造元有所請囑元不之見他日數述曰公任屬親賢腹心是寄當咎身責己以勸事君乃遣人相造欲何所道案之愈急仍以狀劾之帝嘉其公正賜朝服一襲李德饒大業中為監察御史糾正不避貴戚陸知命初為普寧鎮將人或言其正直者繇是待詔於御史臺拜治書侍御史侃然正色為百寮所憚帝甚敬之後坐事免歳餘復職時齊王暕頗驕縱䁥近小人知命奏劾之暕竟得罪百寮震慄唐孫伏伽為治書侍御史武德九年十月民部尚書裴矩奏突厥殘暴之處户請給絹一疋太宗曰朕於天下唯誠與信不欲空有存恤之名而無其實但户有大小各須存濟給物雷同豈公思之至也伏伽進曰裴矩受國恩賞未聞陳讓救恤百姓則欲茍釣虛名用心若是豈當朝寄請鞠其罪太宗從之其後計口為率貧人賴焉柳範為侍御史奏彈吳王恪好田獵損居人田苗太宗因謂侍臣曰權萬紀事我兒不能輔正其罪合死範進曰房𤣥齡事陛下猶不能諫止畋獵豈可獨罪萬紀乎唐臨為殿中侍御史大夫韋待價責臨以朝列不整臨曰比以小事不足介意今日以後為之明日江夏王道宗共大夫離立私談臨趨進曰王亂班道宗曰共大夫語何至於是臨曰大夫亦亂班韋失色而退李乾祐貞觀初為殿中侍御史時有鄃令裴仁軌私役門夫太宗欲斬之乾祐奏曰法令者陛下制之於上率土遵之於下與天下共之非陛下獨有也仁軌犯輕罪而致極刑是乖畫一之理刑罰不中則民無所措手足臣忝憲司不敢奉制太宗意解仁軌竟免張行成為殿中侍御史糾劾不避權戚王義方高宗朝為侍御史以彈李義府貶為萊州司戸叅軍義方將赴萊州義府謂之曰王學士得御史是義府所舉今日之事豈無愧乎對曰義方為公不為私昔孔子為魯司冦七日誅少正卯於兩觀之下今義方任御史旬有六日不能除姦臣於雙闕之前實以為愧義府大怒義方至萊州又為義府中傷竟坐免官王本立為侍御史乾封中御史遭長官於塗皆免帽降乗長官戢轡辭而上馬本立意氣頗高塗逢長官端揖而已魏貞宰為監察御史深為高宗所委信嘗從容問曰外間以朕方自古何天子也對曰周之成康漢之文景帝曰有遺恨乎曰有之王義方一代英傑時人以為臯陶稷禹之流而使不免貧賤死於草澤議者謂陛下不能用賢也帝曰我適欲用義方為著作郎聞其已死既往不諫追悔無及貞宰曰比部員外郎劉藏器才行相副陛下所知今年尚七十始為尚書郎陛下徒歎王義方已殂藏器見在何為棄之馮唐所謂雖得頗牧不能用也帝黙然王無競為殿中侍御史正班於閣門外宰相團立於班北無競前曰去上不遠公雖大臣自須肅敬以笏揮之請齊班時朝議是非參半蕭至忠為監察御史彈鳯閣侍郎同鳯閣鸞臺三品蘇味道贓汚貶官御史大夫李承嘉嘗召諸御史責之曰近日彈事不諮大夫禮乎衆不敢對至忠進曰故事臺中無長官御史人君耳目比肩事主得各自彈事不相關或先白大夫而許彈事如彈大夫不知白誰也承嘉黙然而憚其剛正韋思謙為監察御史時中書令禇遂良賤市中書譯語人地思謙奏劾其事大理丞張山壽斷遂良徴銅二十斤少卿張叡册以為價當官估罪宜從輕思謙奏曰官市依估私但兩和且園宅及田不在市肆豈應用估叡册侮弄文法附下罔上罪在當誅高宗曰獄刑至重人命所懸叡册由憑估價斷為無罪大理之職豈可使此人處之遂良左授同州刺史叡册亦貶官及遂良復用思謙不得進出為清水令謂人曰吾狂鄙之性假以雄權觸機便發固宜為身災也大丈夫當正色之地必明目張膽以報國恩終不能為碌碌之臣保妻子耳乾封中除侍御史與公卿相見未嘗行拜禮或勉之思謙曰鵰鶚鷹鸇豈衆禽之偶奈何設拜以狎之且耳目之官故當特立乃曰御史衘命出使不能動揺山嶽震懾州縣誠曠官耳永淳初歴尚書左丞御史大夫時武侯將軍田仁㑹與侍御史張仁禕不恊而誣奏之髙宗臨軒問仁禕仁禕惶懼應對失次思謙歴階而進曰臣與仁禕連曹頗知事繇仁禕懦而不能自理若仁㑹眩惑聖聰致仁禕非常之罪即臣亦事君不盡矣請專對其狀詞辯縱横音㫖朗暢高宗深納之後為右肅政大夫大夫舊與御史抗禮思謙獨坐受其拜或以為詞思謙曰國家班列自有差等奈何姑息為事耶張仁愿少有文武材幹累遷殿中侍御史時有御史郭霸上表稱則天是彌勒佛身鳯閣舍人張嘉福與雒州人王慶之等請立武承之為皇太子皆請仁愿連名署表仁愿正色拒之甚為有識所重蘇珦垂拱初拜右臺監察御史時則天將誅韓魯等諸王使珦按其宻狀珦訊問皆無徴騐或誣告珦與韓魯等同情則天召見詰問珦抗議不回則天不恱曰卿大雅之士朕當别有驅使此獄不假卿也遂令珦於河西監軍後為右肅政臺御史大夫神龍初武三思擅權雍州人韋月將告三思將有逆謀返為三思所搆中宗令斬之珦奏非時不可行刑繇是忤三思㫖轉為右御史大夫尋出為岐州刺史馬懷素為左臺監察御史長安中御史大夫魏元忠為張易之所搆配徙嶺表太子僕射崔貞慎東宫率獨孤禕等送之郊外易之大怒後使人誣告貞慎與元忠謀反則天令懷素按鞠又遣中使促迫諷令搆成其事懷素執正不受則天怒召懷素親加詰問懷素奏曰元忠犯罪配流貞慎等以親故相送誠為可責若以為謀反臣豈誣罔神明昔彭越以反伏誅欒布奏事於其屍下漢朝不坐况元忠罪非彭越陛下豈加追送之罪陛下當生殺之柄欲加之罪取决聖衷可矣若付臣推鞫臣敢不守陛下之法則天意解貞慎等繇是獲免宋璟為御史中丞張昌宗恩幸之盛歴代無比長安四年秋有許州人楊元嗣上言昌宗去年九月遣方術人李孔泰卜相孔泰謂昌宗面有天子相勸於定州造佛寺即天下歸心則天令鳯閣侍郎韋承慶司刑卿崖慶與璟推鞫之承慶奏言昌宗欵稱所得李孔泰占相之語既已聞奏准法狀當首露孔泰輙出妖詞請付法科罪璟與大理丞封全禎奏曰昌宗既位列九卿爵窮五等榮貴之極理絶覬覦召問卜祝之流已是心懷悖亂况孔泰卜得純乾卦云是天子卦如知狂妄之詞何因不即擒送近雖自奏終是包藏日乆准法合處斬破家請收付制獄更窮理其罪則天久而不答璟又奏曰臣聞天無私覆地無私載若不禁身推勘臣恐天下歸心於昌宗伏乞陛下以義斷恩允臣此奏則天曰卿且停推勘待更詳簡文狀璟退左拾遺李邕進曰向觀宋璟所奏事緣社稷不為身謀願陛下可其所請竟不許又載易之與弟昌宗縱恣益横傾朝附之昌宗私引相工李泰泰占吉凶言涉不順為飛書所告璟廷奏請窮究其狀則天曰易之等已自奏聞不可加罪璟曰易之等事露自陳情在難恕且謀反大逆無容首免請勒就御史臺推勘以明國法易之等久蒙驅使分外承恩臣必知言出禍從然義激於心雖死不恨則天不悅内史姚璹恐忤㫖遽宣勅令璟出璟曰天顔咫尺親奉德音不煩宰臣擅宣王命則天意稍解乃收易之等就臺將加鞫問俄有特勅原之仍命易之等詣璟辭謝竟拒而不見曰公事當公言之若私見則法無私自是易之等常欲因事中傷之則天察其情竟以獲免魏傅弓神龍中為監察御史時監門左大將軍薛簡内常侍輔信義尤稱縱暴傅弓將奏請誅之御史大夫竇從一既黨附宦豎乃謂傅弓曰信義之徒深為安樂公主所眷威勢甚高言成禍福何輙請殺之傅弓曰今王綱漸壞君子道消正繇此輩弄權耳若得今日殺之明日受誅無所恨也從一無以答但固止之傅弓又劾奏銀青光禄大夫西明寺主惠範姦贓四十餘萬請置於極法帝召傅弓傅弓進曰刑賞者國之大事陛下賞己妄加豈宜刑所不及帝乃削惠範銀青光禄大夫寺主放歸于家惠範者長安胡僧也常好游權門與易之兄弟相善後張易之等伏誅又妄稱預謀遂賜爵上庸郡公加銀青光禄大夫俸禄同于職事又常表稱先聖功德留付貧道固請於東都創造聖善佛寺及帝幸長安又勸請於長樂坡造大像凡所縻費巨億萬計府為之虚竭海内寃之俄又制授簡校聖善中天及上都西明三寺主帝又御行親送之惠範既權震外内當時莫敢言者一朝遽為傅弓所奏朝野莫不稱慶袁從之為左御史臺侍御史景龍中長寧及安樂安定等公主多縱奴僕刼掠百姓子女以為奴婢從之悉収主家奴僕繫獄將窮竟其罪主遂訴之於帝制令放免從之又執奏曰陛下今若曲受主言而縱奴掠良人何以理天下臣知放則免罪於私門劾則得罪於公主終不忍全身逺害屈法偷生惟陛下垂炤察帝竟不納薛謙光景雲中擢拜御史大夫時僧惠範恃太平公主權勢逼奪百姓店肆州縣不能理謙光録狀彈奏或請寢之謙光曰憲臺理寃滯何所迴避朝彈暮黜可矣遂與侍御史慕容珣奏彈之反為太平公主所搆出為岐州刺史惠範既誅遷太子賔客轉刑部尚書加金紫光禄大夫昭文館學士崖日用為監察御史神龍中為秘書監鄭普思納女後宫潛謀左道日用知之遽奏于中宗時普思承恩中宗不之省日用廷争懇至詞甚抗直普思竟伏其罪王志愔神龍中為左臺御史執法剛正百寮畏憚韋虚心為御史神龍年推按大獄時僕射竇懷忠侍中劉幽求意欲寛假虛心執法令有不可奪之志楊㻛為侍御史開元初崔日知為京兆尹貪暴犯法御史大夫李傑糾劾之反為日知所搆瑒廷奏曰糾彈之司若遭恐脇以成姦人謀御史臺固可廢也𤣥宗以其言切直遽令傑依舊視事貶日知黝縣丞崔隱甫為御史大夫臺中一切督責之事無大小悉令諮决稍有忤意列上其罪前後貶黜者過半羣僚側目𤣥宗謂曰卿為大夫深副所委翟璋為監察御史裏行㑹殿中侍御史出使盡璋知班乃牒中書省勘侍郎王琚及太子左庶子竇希瓘入晩遂為所擠出為岐陽令韋陟為御史大夫拾遺杜甫上表論房琯有大臣度真宰相器聖朝不容詞㫖迂誕肅宗令崔光逺與陟及憲部尚書顔真卿同訊之陟因入奏曰杜甫所論房琯事雖被貶黜不失諫臣大體上繇此疎陟張鎰為殿中侍御史肅宗乾元初華原令盧樅以公事呵責邑人内侍齊令詵詵衘之搆誣外發鎰按驗擬當降官及下有司擬當杖死鎰具公服白其母曰上疏理樅必免死某必坐貶若以私則鎰負於當官貶則以太夫人為憂敢問所安母曰爾無累於道吾所安也執奏止樅罪故樅得配流鎰貶撫州司户嚴郢為監察御史道士申泰芝託使鬼物却老之術得幸於肅宗因使往湖南宣慰受姦贓鉅萬又以訛言惑衆潭州刺史龎承鼎按其事以聞肅宗不之信召泰芝赴京師下承鼎於江陵獄詔郢窮理之郢具以泰芝姦狀聞帝又令中使與觀察使吕諲同驗理諲亦執奏泰芝姦狀帝皆不納時御史中丞敬羽希㫖附㑹泰芝郢堅爭其事帝大怒叱郢令去郢進而言曰龎承鼎所奏申泰芝贓得贓狀按為妖言皆泰芝書跡而泰芝所論承鼎捕魚放生池國忌日殺羊事皆㣲細又無證驗陛下奈何欲罪承鼎而宥泰芝臣雖殺身不敢順㫖收繫泰芝引支證廷辯曲直帝曰卿且罷去郢復上䟽理承鼎且言泰芝妖逆罪在不捨臣縱殺身尚當尸諫况今未死豈敢求生詞甚切直帝大怒竟杖殺承鼎流郢於建州頃之泰芝妖妄不道伏誅乃追還承鼎本官召郢復為監察御史顔真卿為御史大夫軍國之事知無不言為宰相所忌出為同州刺史李勉為監察御史屬朝廷右武勲臣恃寵多不知禮大將管崇嗣於行在朝堂背闕而坐言笑自若勉劾之拘於有司肅宗特原之歎曰吾有李勉始知朝廷尊矣李衎為殿中侍御史代宗永泰元年正月壬子章敬皇太后忌辰百寮於興唐寺行香内侍魚朝恩置齋饌於寺外之商販軍坊延宰相及臺省官就食朝恩恣口談時政公卿惕息衎與户部郎中相理造以正言折之衎詞直而强突頗忤朝恩遂罷㑹李栖筠為御史大夫時元載專政栖筠正身守道無所顧憚以酬任遇之恩華原尉侯莫陳怤以主郵傳優改長安尉臺叅栖筠面詰其勞考怤恐懼不敢隱諱乃以詐冒成優問其故即吏部侍郎徐浩私戚京兆尹杜濟吏部侍郎薛邕因緣請託共成罔冒三人皆宰臣相厚遂劾奏之帝依違未决栖筠陳請之際屬日蝕帝問其故對曰臣聞日蝕修德月蝕修刑今誣上行私之罪未理此天所以敬戒於明堂帝繇是感悟坐怤者皆貶謫自此朝綱益振百度肅然中朝選用帝皆密訪於栖筠栖筠盡心知無不為四五年間載充位而已王翊為御史大夫貞亮鯁直名於當代竇叅德宗初為刑部郎中侍御史知雜事無幾遷御史中丞不避權貴理獄以嚴稱數䝉召見言天下事又與執政議多異常帝器之或叅决大政時宰相頗忌之多所排抑亦無以傷叅貞元三年十月擒獲謀逆賊李廣孔等六人令中官王希遷鞫之於内侍詔獄皆欵伏叅請令三司覆驗詔從之宰相李泌亦有所請與叅同穆賛為御史中丞以強直不附權倖卒為裴延齡譛毁罷官無幾又貶饒州别駕武元衡為御史中丞順宗初即位王叔文專政以其黨數人為御史在臺元衡薄其為人待之莽鹵皆有所憾而叔文又以元衡在風憲欲使其黨誘以權利元衡不為之動時奉德宗山陵元衡為儀仗使監察御史劉禹錫叔文所厚也求儀仗使判官元衡不與其黨滋不悅數日罷為右庶子盧坦為御史中丞舉奏前山南西道節度使柳晟前浙東觀察使閻濟美違詔貢獻二人皆得罪於朝堂憲宗召坦對褒慰久之曰晟等所獻皆以家財朕已許原不可失信坦曰敕令陛下之大信也天下皆知之今二臣違令是不畏法陛下奈何愛小信而失大信乎帝曰朕已受之如何坦曰歸之有司不入内藏使四方知之以昭明德帝深善其言右僕射裴均交結權倖得貴位在班列嘗踰位而立坦請退之均不受坦曰姚南仲為僕射例如此均曰南仲何人坦曰南仲是守正而不交權倖者也尋罷坦為右庶子時人歸咎於均李元素為侍御史元和中東都留守杜亞素惡大將令狐運㑹盜發雒成之北運適與其部下畋于北邙亞意其為盜遂執訊之逮繫者四十餘人監察御史楊寧按其事亞以為不直表陳之寧遂得罪命元素就覆亞迎路以獄成告元素驗之元素盡釋其囚以還亞大驚且怒親追送馬上責之元素不答又上疏論元素元素還奏言未畢上怒曰出俟命元素曰臣未盡詞帝又曰且去元素復奏曰臣一出不復得見陛下乞容盡詞帝意稍緩元素盡言運寃狀明白帝乃悟曰非卿孰能辯之後數月竟得真賊薛存誠為御史中丞時有僧鑒虚盜為姦濫積財巨萬事發獄成中外掌權者更欲揺動之帝初令釋其罪存誠不受詔明日帝又宣㫖曰吾要此僧面詰其事非赦之也存誠又奏曰鑒虛罪狀已具陛下將召之請先貶臣然後可取帝嘉其有守遂令杖殺之李夷簡為御史中丞時京兆尹楊憑驕倨矜大班列惡之夷簡疏憑前後四犯彈奏之憑坐貶臨賀尉賜夷簡金紫當時翕然謂紀綱復振裴度為監察御史宻疏論權倖詞切忤㫖出為河南功曹柳公綽遷御史大夫韓𢎞病自河中入朝以𢎞守司徒中書令詔百寮問疾𢎞遣其子達情言不能接見公綽謂其子曰聖上以公官重令百寮省問異禮也如拜君賜宜力疾公見安有卧令子弟傳言耶𢎞懼扶牀而出人皆聳然崔從為侍御史知雜遷御史中丞正色立朝彈奏不避權倖事關臺閣或付仗内者必抗章疏論列請歸有司孔戢為殿中侍御史分司時昭義節度使盧從史判官徐玫以狡慝助成從史之姦逆從史既擒孟元陽按節至軍復欲署玫為從事戢遂牒澤潞収玫以候詔命然後列狀上聞竟流玫於播州獨孤朗為御史中丞故事憲府選御史多因其長有請然後除授崔晃鄭居中同時除監察皆出於丞相朗即拒而不納晃改授太常愽士居中分司東都丁居晦為御史中丞頗銳志當官不畏强禦然而措置或乖中道執政請移易遂復舊官帝疑與當軸者不叶故復舊職居晦前為中書舍人翰林學士李景讓為御史大夫慷慨有大志正色立朝言無避忌時宣宗皇帝舅鄭光卒詔罷朝三日景讓上言朝典有素無容過越優詔報之乃罷朝兩日王華為侍御史乾符末右散騎常侍李損有子凝吉武寧軍節度使支詳辟為判官及廣明中徐之偏將時溥逐支詳擅稱留後中和中朝廷加節制溥奏本州幕下賔客一切舊貫至是欲以腹心代之咸誣其寘毒然後聞奏仍表凝吉父損密通其情乞下御史臺鞫理時軍容使田令孜與溥賄賂交結乃遣御史中丞盧渥鍛而成之華執理雪焉令孜怒乃遣人傳宣取歸本軍華拒而不遣乃白宰臣蕭遘云李損與凝吉雖是父子相去數千里誣以知情實曰非辜乃非時請開延英面奏帝遂然之以時溥有勲令孜抗奏遂有詔罷時溥蕭遘王華盧渥襄亂之後未失朝廷大綱深為處當也册府元龜巻五百十五
