body:
  text: 册府元龜卷四百六十九宋王欽若等撰臺省部封駁漢制羣臣上書凢品有四駁議其一也蓋以號令之出風化攸係或愆治典乃傷國體繇是執奏抗論正辭理奪封還詔命追救缺失者有矣中代而下政歸臺閣機事紛委典章盡在夙夜出納周旋慎重其或上之所舉或違於道乃至官人之非稱法制之繆戾壅求賢之路失任刑之極禮文差僭德義隳廢撓賞罰之柄興寃滯之歎權寵交構災謫創見利非均濟信或未孚莫不罄竭忠懇敷陳要道謇諤持正激切指事冀感悟於時王用杜塞於未然無害於成不逺而復詩曰匪懈于位傳云彌縫其闕其斯之謂歟後漢虞詡順帝時為尚書僕射先是寧陽主簿詣闕訴其縣令之枉積六七歲不省主簿乃上書曰臣為陛下子陛下為臣父臣章百上終不見省臣豈可北詣單于以告怨乎帝大怒持章示尚書尚書遂劾以大逆詡駁之曰主簿所訟乃君父之怨百上不達是有司之過愚憃之人不足多誅帝納詡言笞之而已詡因謂諸尚書曰小人有怨不逺千里斷髮刻肌詣闕告訴而不為理豈臣下之義君與濁長吏何親而與怨人何仇乎聞者皆慙胡廣順帝時為尚書僕射尚書令左雄議改察舉之制限年四十以上儒者試經學文吏試章奏廣駁之曰臣聞君以兼覽博照為德臣以獻可替否為忠書載稽疑謀及卿士詩美先人詢于芻蕘國有大政必議之於前訓諮之於故老是以慮無失策舉無過事竊見尚書令左雄議郡舉孝亷皆限年四十以上諸生試章句文吏試牋奏明詔既許復令臣等得與相參竊惟王命之重載在篇典當令縣於日月固於金石遺則百王施之萬世詩云天難諶斯不易惟王可不慎與蓋選舉因才無拘定制六竒之策不出經學鄭阿之政非必章奏甘竒顯用年乖彊仕終賈揚聲亦在弱冠漢承周秦兼覽殷夏祖德師經參雜霸軌聖主賢臣世以致理貢舉之制莫或囘革今以一臣之言剗戾舊章便利未明衆心不厭矯枉變常政之所重而不訪台司不博卿士若事下之後議者剥異異之則朝失其政同之則王言已行臣愚以為可宣下百官參其同異然後覽擇勝否詳採厥衷敢以瞽言冒干天禁惟陛下納焉帝不從陳蕃桓帝時為尚書零陵桂陽山賊為害公卿議遣討之又詔下州郡一切皆得舉孝亷茂才蕃上疏駁之曰昔髙祖創業萬邦息肩撫養百姓同之赤子今二郡之民亦陛下赤子也致令赤子為害豈非所在貪虐使其然乎宜嚴敕三府隐覈牧守令長其有在政失和侵㬥百姓者即便舉奏更選清賢奉公之人能班宣法令情在愛惠者可不勞王師而羣賊弭息矣又三署郎吏二千餘人三府掾屬過限未除但當擇善而授之簡惡而去之豈煩一切之詔以長請屬之路乎以此忤左右故出為豫章太守周景桓帝時為尚書令河南尹楊秉坐事論作左校以久旱赦出㑹日食太山太守皇甫規等訟秉忠直不宜久抑不用有詔公車徵秉及處士韋著二人各稱疾不至有司並劾秉著大不敬請下所屬正其罪景與尚書邉韶議奏秉儒學侍講嘗在謙虚著隐居行義以退讓為節俱徵不至誠違側席之望然逶迤退食足抑茍進之風夫明王之世必有不召之臣聖朝𢎞養宜用優游之禮可告所在屬喻以朝廷恩意如遂不至詳議其罰於是重徵及到拜太常魏韋誕齊王時為侍中先是驃騎將軍趙儼尚書黃休郭彝散騎常侍荀顗鍾毓太僕庾嶷𢎞農太守何楨遞薦胡昭曰天貞髙潔老而彌篤𤣥虚静素有夷皓之節宜蒙徵命以厲風俗朝廷以戎車未息徵命之事且須從後以故不即徵後顗休復與庾嶷薦昭有詔訪於本州評議誕駁曰禮賢徵士王政之所重也古考行於鄉今顗等位皆常伯納言嶷為卿士足以取信附下罔上忠臣之所不行也昭宿德耆艾遺逸山林誠宜加異乃從議晉李重為尚書郎時司隸校尉石鑒奏鬱林太守介登役使所監求召還尚書荀愷以為逺郡非人情所樂奏登貶秩居官重駁曰臣聞立法垂制所以齊衆簡邪非必曲尋事情而理無所遺也故所滯者寡而所濟者衆今如登比者多若聽其貶秩居官動為準例懼庸才負逺必有黷貨之累非所以肅清王化輯寧殊域也臣愚以為宜聽鑒所上先召登還且使體例有常不為逺近異制詔從之劉毅為諫議大夫趙王倫坐使散騎將劉緝買工所將盜御裘廷尉杜友正緝棄市倫當與緝同罪有司奏倫爵重屬親不可坐毅駁曰王法賞罰不阿貴賤然後可以齊禮制而明典刑也倫知裘非常蔽不語吏與緝同罪當以親貴議減不得闕而不論宜自於一時法中如友所正帝是毅駁然以倫親故下詔赦之溫羨為吏部尚書先是司空張華為趙王倫所誅議者追理其事欲復其爵侍中嵇紹駁之曰臣之事君當除煩去惑華歴位内外雖粗有善事然闔棺之責著于逺近兆禍始亂華實為之故鄭討幽公之亂斵子家之棺魯戮隐罪終篇貶翬未忍重戮事已𢎞矣不宜復其爵位理其無罪羨又駁之曰自天子以下争臣各有差不得歸罪於一人也故晏子曰為已死亡非其親暱誰能任之里克之殺二庶陳乞之立陽生漢朝之誅諸呂皆積年之後乃得立事未有主見存而得行其志於數月之内者也式乾之㑹張華獨諫上宰不和不能乘風贊善望其指麾從命不亦難乎况今皇后譖害其子内難不預禮非所任且后體齊於帝尊同皇極罪在枉子事不為逆義非所討今以華不能廢枉子之后與趙盾不討弑君之賊同而貶責之於義不經通也華竟得追復爵位摯虞為尚書郎將作大匠陳勰掘地得古尺尚書奏今尺長於古尺宜以古為正潘岳以為習用已久不宜復改虞駁曰昔聖人有以見天下之賾而擬其形容象物制器以存時用故參天兩地以正筭數之紀依律計分以定長短之度其作之也有故用之也有徵考步兩儀則天地無所隐其情準正三辰懸象無所容其繆施之金石則音韻和諧措之規矩則器用合宜一本不差而萬物皆正及其差也事皆反是今尺長於古尺幾於半寸樂府用之律吕不合史官用之厯象失占醫署用之孔穴乖錯此三者度量之所繇生得失之所取徴皆絓閡而不得通故宜改今而從古也唐虞之制同律度量衡仲尼之訓謹權審度今兩尺竝用不可謂之同知失而行不可謂之謹不同不謹是謂謬法非所以軌物垂則示人之極凡物有多而易改亦有少而難變亦有改而致煩亦有變而之簡度量是人所常用而長短非人所戀惜是多而易改者也正失於得反邪於正一時之變永世無二是變而之簡者也憲章成式不失舊物季末茍合之制異端雜亂之用當以時釐改貞夫一者也臣以為宜如所奏郄鑒為尚書令王敦平王遵議欲贈周札官鑒以為不合遵不從鑒於是駁之曰敦之逆謀履霜日久縁札閉門令王師不振若敦前者之舉義同桓文則先帝可謂幽厲邪朝臣雖無以難而不能從荀奕為散騎常侍侍中時將繕營宮城尚書符下陳留王使出城夫奕駁曰昔虞賓在位書稱其美詩詠有客載在雅頌今陳留王位在二公之上坐在天子之右故答表曰書賜物曰與此古今之所崇體國之髙議也謂宜除夫役時尚書張闓僕射孔愉難奕以為昔宋不城周春秋所譏特蠲非體宜應減夫奕重駁以為春秋之末文武之道將墜于地新有子朝之亂于時諸侯逋替莫肯率職宋之於周實有列國之權且同已勤王而主之者晉客而辭役責之可也今之陳留無列國之勢此之作否何益有無臣以為宜除於國體為全詔從之范堅為尚書右丞相廷尉奏殿中帳吏邵廣盜官幔三張合布三十匹有司正刑棄市廣二子宗年十三雲年十一黃幡撾登聞皷乞恩辭求自沒為奚官奴以贖父命尚書郎朱映議以為天下之人父無子者少一事遂行便成永制懼死罪之刑於此而弛堅亦同映議時議者以廣為鉗徒二兒沒入旣足以懲又使百姓知父子之道聖朝有垂恩之仁可特聽減廣死罪為五嵗刑宗等付奚官為奴而不為永制堅駁之曰自淳朴澆散刑辟乃作刑之所以止刑殺之所以止殺雖時有赦過宥罪議獄緩死未有行小不忍而輕易典制者也且既許宗等宥廣以死若復有宗比而不求贖父者豈得不擯絶人倫同之禽獸邪按今奏云惟特聽宗等而不為永制臣以為王者之作動關盛衰嚬笑之間尚慎所加况於國典可以徒虧今之所以宥廣正以宗等耳人之愛父誰不如宗今既居然許宗之請將來訴者何獨匪民特聽之意未見其益不以為例交興怨讟此為施一恩於今而開萬怨於後也成帝從之正廣死刑顔含為侍中咸和中左光祿大夫開府儀同三司陸曄求歸鄉里拜墳墓有司奏舊制假六十日含與黃門侍郎馮懐駁曰曄内蘊至德清一其心受託付之重居台司之位既蒙詔許歸省墳塋大臣之義本在忘已豈容有期而反無期必違愚謂宜還自還不須制日帝從之韋䛕為後趙黃門侍郎時㬥風大雨震電雹起西河介山大如雞子平地三尺洿下丈餘行人禽獸死者萬數石勒問徐光曰歴代以来有斯災幾也光對曰周漢魏晉皆有之雖天地常事然明主未始不為變所以敬天之怒也去年禁寒食介推帝郷之神也歴代所尊或者以為未宜替也一人吁嗟王道尚為之虧况羣臣怨憾而不怒動上帝乎介山左右宜任百姓奉之勒下書曰寒食既并州之舊風朕生其俗不能異也前者外議為子推諸侯之臣王者不應為忌故從其議倘或繇之而致斯災乎子推雖朕郷之神非法食也亦不得亂也尚書其從簡舊典定議以聞有司奏以子推歴代攸尊請普復寒食更為殖嘉樹立祠堂給户奉祀䛕駁曰按春秋藏冰失道隂氣發泄為雹自子推以前雹者復何所致此自陰陽乖錯所為耳且子推賢者曷為㬥害如此求之冥趣必不然矣今雖為冰室懼所藏之冰不在固陰沍寒之地多皆川池之側氣泄為雹也以子推忠賢令緜介之間奉之為允於天下則不通矣勒從之于是遷冰室於重陰凝寒之所并州復寒食如初宋王韶之為黃門侍郎駁員外散騎侍郎王實之請假事曰伏尋舊制羣臣家有情事聽併給六十日太元中改制年賜假百日又居在千里外聽併請来年限合為二百日此蓋一時之令非經通之旨會稽雖塗盈千里未足為難百日歸休於事自足若私理不同便應自表陳解豈宜名班朝列而久淹私門臣等參議謂不合間許或家在河雒及嶺南沔漢者道阻且長尤宜別有條品請付尚書詳為其制從之後魏邢虬為尚書左丞時有人害母者八座奏斬之而瀦其室宥其二子虬駁奏云君親無將將而必誅今謀反者戮及朞親害親者全不及子既逆其梟獍禽獸之不若而使禋祀不絶遺育永傳非所以勸忠孝之道存三綱之義若聖教含容不加孥戮使父子罪不相及惡止於其身者則宜投之四裔敕所在不聽配匹盤庚言無令易種于新邑漢法五月食梟羹皆欲絶其類也奏入宣武從之李奬為吏部郎中先是李神雋行荆州事引御史溫子昇兼録事參軍子昇被徵赴省神雋表留不遣奬退表不許曰昔伯瑜之不應留王朗所以發嘆宜速遣赴無踵彦雲前失於是還員隋劉行本為諫議大夫時有雍州別駕元肇言於髙祖曰有一州吏受人饋錢二百文律合杖一百然臣下車之始與其為約此吏故違請加徒一年行本駁之曰律令之行蓋發明詔今肇乃敢乖其教命輕忽憲章虧法取威非人臣之禮帝嘉之唐徐有功為秋官郎中時鳯閣侍郎任知古冬官尚書裴行本等七人被搆陷當死則天謂公卿曰古人以殺止殺我今以恩止殺就郡公乞知古等錫以再生各授以官佇重申來效來俊臣張知黙等又抗表請申大法則天不許之俊臣乃獨引行本重驗前罪奏曰行本潛行悖逆謀告張知蹇與廬陵王反不實罪當處斬有功駁奏曰俊臣乖明主再生之錫虧聖人恩信之道為臣雖當嫉惡然事君必將順其美行本竟免死盧粲為給事中神龍中兼太子賓客攝左衛將軍武崇訓為節愍太子所殺優制贈開府儀同三司追封魯王諡曰忠令司農少卿趙履溫監議𦵏事及將𦵏履溫遂諷安樂公主奏請依永泰公主為崇訓造陵中宗制許之粲駁奏曰伏尋陵之稱謂本屬皇王及儲君等自有家有國以来諸王及公主墓無稱陵者唯永泰公主承恩特𦵏事越常塗不合引以為名春秋左氏傳云衛孫桓子與齊戰敗新築大夫仲叔于奚救桓子桓子已免衛人賞之以邑于奚辭請曲縣繁纓以朝許之仲尼聞之曰惜也不如多與之邑惟器與名不可以假人若以假人與之政也政亡則國家從之聖人知微知章不可不慎魯王哀塋之典誠別承恩然國之名器豈可妄假又塋兆之稱不應假永泰公主為名請比貞觀以来諸王舊例足得豐厚手敕答曰安樂公主與永泰無異同穴之議今古不殊魯王縁此特為陵制不煩固執粲又奏曰臣聞陵之稱謂施於尊極不屬王公以下且魯王若欲論親等第則不親於雍王守禮之父雍王之墓尚不稱陵魯王則不可因尚主而加號且君之舉事載在方策或稽之往典或考自前朝臣歴檢貞觀已来駙馬墓無得稱陵者且君人之禮服絶於朞葢不獨親其親不獨子其子陛下以膝下之恩愛施及其賻賵之儀褒塋之備豈得使上下無辨君臣一貫者哉又永康公主承兩儀之澤履福禄之基指南山以錫年仰北辰而為壽上皇之𦵏車服有章加等之儀備有常數塋兆之稱不應假永泰公主為名非所謂垂範將來作則百辟者也帝無以答竟依粲所奏宋璟神龍中為黃門侍郎時武三思恃寵執權俄有京兆人韋月將上書訟三思潛通宮掖將為禍患之漸三思諷有司奏月將大逆不道中宗特令誅之璟執奏請按其罪狀然後申明典憲月將竟免極刑配流嶺南而死韓思復唐隆初為給事中右散騎常侍嚴善思坐譙王重福事下制獄有司言善思昔任汝州刺史素與重福交遊及被詔至京師竟不言其謀逆唯奏云東都有兵氣㨿狀正當匿反請從絞刑思復駁奏曰議獄緩死列聖明規刑疑從輕有國大典嚴善思任在先朝屬韋氏擅内恃寵宮掖謀危宗社善思此時遂能先覺因詣相府有所發明進論聖躬必登宸極雖交遊重福盖陷韋氏及其謁見猶不奏聞將此行藏即從極法且敕追善思書至便發向懷逆詐事即奔命一面疎網誠合順生三驅取禽来而可宥惟刑是恤事可昭詳請付刑部集官議定奏裁以符慎獄是時議者多言善思合從原宥有司乃執前議請誅之思復又駁奏曰臣聞刑人於市爵人於朝必僉謀攸同始行之無惑謹案諸司所議善思十纔一人云抵罪唯輕夫帝閽九重塗逺千里故借天下耳以聽聽無不聰借天下目以視視無不浹今羣言上聞採擇宜審若棄多就少臣實懼焉輿誦一乖下情不達雖欲從衆其可及乎凡百京司逢時之泰設官分職有賢有親親及列藩諸王陛下愛子賢則胙茅開國陛下名臣既親既賢寧肯雷同不異今措詞多出法合從輕帝納其奏竟免善思死配流静州盧懷慎為黃門侍郎開元二年詔追贈崔湜亡父挹為吏部尚書詔出懷慎與姚崇魏知古等奏曰臣等謹重商量不敢奉詔崔湜位忝大臣身犯惡逆汙官滅族國有常刑其父挹特承恩渙免其誅戮蒙兹大造得盡餘年若更追榮恐招物議唯刑與賞天下共之發號施令國之所重舉而不法後代何觀望不贈官但厚給𦵏事從之四年隴右節度郭䖍瓘奏奴石良才等八人皆立戰功請各授游撃將軍敕下紫微懷慎等奏曰郭䖍瓘雖有邉功酬勞已厚不知厭極妄有干祈前奏奴石請與五品恃以微効輙侮彞章此而若依實亂綱紀望停從之許景先為給事中開元八年九月制賜百官九日射景先駁奏曰近以三九之辰頻賜宴射已著格令猶降綸言但古制雖存禮章多闕官員累倍帑藏未充水旱相仍繼之師旅既不足以觀德又未足以威邉耗國損人且為不急夫古之天子以射選諸侯以射飾禮樂以射觀容志故有騶虞貍首之奏采蘩采蘋之樂天子則以備官為節諸侯則以時㑹為節卿大夫以修法為節士以不失職為節皆審志固行德美事成陰陽克和㬥亂不作故諸侯貢士亦試於射宮容體有虧則絀其地是以諸侯君臣皆盡志於射射之禮也大矣哉今則不然衆官既多鳴鏑亂下以茍獲為利以偶中為能素無五善之容頗失三侯之禮冗官厚秩禁衛崇班動盈累千其算無數近河北水澇處多林胡小蕃見寇郊壘軍書日至河朔騷然命將除兇未圗克㨗興師十萬日費千金去歲豫亳兩州微遭旱損庸賦不辦以致流亡聖人憂勤降使招恤雖經歲月猶未能安人之困窮以至於此今一箭偶中是一丁庸調用之既無惻隐獲之固無恥慙考古循今則為未可且禁衛武官隨番許射能中的者必有賞焉此則訓武習戎時亦不闕待寇寧歲稔率繇舊章則愛禮養人幸甚疏奏遂罷之夏侯銛為給事中開元二十一年二月安定公主初降王同皎後降韋濯又降崔銑銑卒及是公主薨其子駙馬王繇請與其父合𦵏敕旨依議銛駁之曰公主初昔降婚梧桐半死逮乎再醮琴瑟兩亡生存之時已與前夫義絶殂謝之日合從後夫禮𦵏今若依繇所請却祔舊姻恐魂而有知同皎不納於幽壤死而可作崔銑必訴於𤣥天國有典章事難逾越原繇此意雖申罔極之情求禮而行或致不稽之誚謬膺駁正敢曠司存請旁移禮官并求指定下太常請議公主合與同皎合𦵏以否報之賈至為中書舍人至德二年六月將軍王元榮殺本縣令杜徽罪合死肅宗以其能修守備之器特放免令於河東承光軍効力至上封事執之敕㫖百僚議咸與至同帝以寇逆未平藉其殊藝竟捨之韓滉為給事中大厯中盜殺富平令韋當縣吏捕獲賊黨而名隸北軍監軍魚朝恩以有武材上請詔原其罪滉密疏駁奏賊遂伏辜袁髙為給事中貞元元年正月癸丑以吉州長史盧杞為饒州刺史髙宿直當草杞制遂執以謁宰相盧瀚劉從一曰盧杞作相三年奸邪為志矯誣陰賊退斥忠良朋附者咳唾立至青雲睚眦者顧盼已擠溝壑傲很明德反易天常播越鑾輿瘡痍天下皆杞之為也幸免族戮唯示貶黜尋以稍遷近地若更授大郡恐大失天下望唯相公執奏之事尚可救瀚從一皆不恱遂改命舍人草制乙卯詔出髙又執之不下仍上奏曰盧杞為政極惡窮兇三軍將校願食其肉百辟卿士嫉之若讎至丁巳補闕拾遺陳京趙需裴佶宇文炫盧景亮張薦等上疏曰伏以吉州長史盧杞外矯儉簡内藏奸邪三年擅權百揆失叙惡直醜正亂國殄人天地神祇所知蠻夷華夏同棄伏惟故事皆得上聞自杞為相要官大臣動踰旬月不敢奏聞百僚懍懍嘗懼顚危及京邑傾淪皇輿播越陛下炳然覺悟黜棄遐荒制曰忠讜壅於上聞朝野為之側目繇是忠良激勸内外歡忻今復擢為饒州刺史衆情失望皆謂非宜臣聞君之所以臨萬姓者政也萬姓之所以戴君者心也儻加巨奸之寵必失萬姓之心乞廻聖旨速輟新命臣等忝備諫職昧死上陳戊午補闕拾遺又上疏曰伏以盧杞蒙蔽天聰隳紊朝典致亂危國職杞之繇可謂公私巨蠧中外棄物自聞擢授饒州刺史忠良痛骨士庶寒心臣昨者瀝肝上聞冒死不恐冀迴宸睠用快羣情至今拳拳未奉聖㫖物議騰沸行路驚嗟人之無良一至於此伏乞俯從衆望永棄奸臣幸免誅夷足明恩貸特加榮寵實造禍階臣等忝列諫司無以上答鴻造再陳狂瞽倍萬兢惶丁卯髙又於正殿奏云陛下用盧杞獨秉均軸前後三年棄斥忠良附下罔上使陛下越在草莽皆杞之過且漢時三光失序雨旱不時皆宰相請罪小者免官大者刑戮盧杞罪合至死陛下好生惡殺赦杞萬死唯貶新州司馬旋復遷移今除刺史是失天下之望伏惟聖意裁擇帝謂曰盧杞有不逮是朕之過髙復奏曰盧杞姦臣嘗懐詭詐非是不逮帝曰朕已有再赦髙曰恩赦乃赦其罪不宜授刺史且赦文至憂黎民今饒州大郡若命奸臣司牧是一州蒼生獨受其弊望引常參官顧問并擇謹厚中官令就街衢衆訊億兆一人異臣言臣當萬死於是補闕拾遺又前諫與髙不異帝良久謂曰若與盧杞刺史太優與上佐可否皆云可遂追饒州刺史翼日遣中使宣慰髙云朕徐思卿言深覺愜當依卿所奏戊午太子少保韋倫太府卿張獻恭復於紫宸殿前奏髙所奏稱至當臣恐煩聖聽不敢縷陳其事獻恭奏曰袁髙是陛下一良臣望特加優異帝謂宰相李勉等曰朕欲授杞一小州刺史可乎勉曰陛下授大州亦可其如兆庶失望何帝曰衆人奏盧杞奸邪朕何不知之勉曰盧杞奸邪天下之人皆知之唯陛下不知此所以為奸邪也帝黙然良久左常侍李泌復對見帝曰盧杞之事朕已可袁髙奏如何泌奏曰外人竊議以陛下同漢之桓靈臣今親承聖㫖乃知堯舜之不逮也帝恱慰勉之二年二月戊寅詔曰諸道節度觀察使所進牛委京兆府勘責有地無牛百姓量其產業以所進牛均平給賜其有田五十畝已下人不在給限髙駁奏曰聖慈所憂切在貧下百姓有田不滿五十畝者猶是貧人請量三兩户共給牛一頭以濟農事從之崔仁師為給事中貞元十六年刑部奏請反叛者兄弟並坐仁師駁之曰誅其父子足累其心此而不恤何憂兄弟議遂寢許孟容為給事中貞元十七年五月京兆上言好畤縣風雨雷雹傷夏麥輻員二十餘里德宗命縣吏與品官同覆視不實詔罰京兆尹顧少連以降有差孟容執敕奏曰府縣上事不實罪止奪俸停官其於𢎞宥已是殊澤但陛下使品官覆視後更擇憲官法官等一人再令參騐則察視轉審隐欺益明事可觀聽法歸綱紀臣受官中謝日伏請詔敕有須詳議者則乞停留晷刻得以奏陳此敕既非急宣可以少駐詔不許十八年三月以前攝浙江東道團練副使試大理評事兼監察御史齊總為衢州刺史總前為裴肅判官横賦以進奉人頗苦之及肅死總司其後務復剥下以諂上人益不堪及授刺史羣議以為超奬過當詔至門下孟容上表封還曰臣伏見今日恩制除衢州刺史齊總臣竊有所慮恐驚物聽不敢關下陛下比者以兵戎之地或有不得已非次擢授者今衢州無他虞齊總無殊績忽此超授羣情震駭又齊總是浙東判官今詔敕稱權知浙東觀察留後攝都團練副使向前未有敕命今便用此下詔尤恐不可齊總若可選㧞不假此事若未可選拔假此益使人疑陛下臨御已來凢所選用皆為至公既非聖情所難改移即臣下安得不動有論諍若齊總必有可録陛下必須酬能即明書勞課超一兩資與改今四海舉朝之人不知齊總功能衢州浙東大郡自大理評事兼御史授之使遐邇不甘兇惡騰口伏乞聖慈少廻聖覽臣所請陛下若謂臣為不切不懇伏乞陛下試停慈詔密使人於外聽察必賀聖明開納必賀聖明無私禽魚草木亦知感恱歡聲必山呼雷動聖德必一日萬里臣授官中謝日具以面奏詔敕有不便者伏請封取進止今齊總詔謹隨封進時左補闕王武陵右補闕劉伯芻復上疏言之繇是詔書留中不出明日雨不視事特開延英門召孟容對德宗慰諭開納曰使百執事皆如卿朕何憂也給事中袁髙論盧杞後来未嘗有可否是時齊總竭浙東進奉超授踰等江淮之間人頗困匱無不罪總及是四方聞者皆感上聖明虚己之德嘉孟容之當官不回其年八月以嶺南節度掌書記事大理評事張正元為邕州刺史兼御史中丞邕管經略使孟容上疏論張正元非次遷授右補闕張正元劉伯芻繼有封章帝遣中使宣諭孟容詔書遂行呂元膺為給事中元和四年以淮南節度判官孔戡為衛尉寺丞分司東都戡嘗佐昭義軍節度使盧從史數以事爭論不從因謝病去從史强以禮遣而隂衘之居東都久之為淮南節度使李吉甫所辟而從史忿嫉累請貶降始貞元中姑息節將其從事有不合意或知其邪心欲免去則誣以他罪論奏不更驗理或黜或徙迄貞元軍府化之至是憲宗雖不許猶授以散員制既下元膺封還上奏曰孔戡以公為盧從史所忌且離職已久李吉甫以宰相出鎮辟請非涉嫌疑推類言之河陽節度行軍司馬楊同慈史官崔國楨或處近職或倅戎府皆為吉甫奏在幕庭從史以嫌忿干黷朝典豈可曲徇其志且孔戡官序雖非黜退但因此改易則長姦邪之心臣恐忠正之士各懷疑慮事不可許帝令中使宣諭元膺制書乃下元膺後為尚書左丞十五年太府少卿王遂與户部侍郎判度支潘孟陽以私忿各移職遂為鄧州刺史又敕王遂令私屬吏人請兩池課料有乖慎守合示薄懲但縁頃年出軍南北置使頗聞約身奉國省費相懸每念前勞特寛常憲已從別敕處分其韋從素柳季常各宜決四十其所請錢物委度支使准法據數徵納初遂除鄧州刺史元膺以遂補吏犯贓法當從坐其除官詔云清能業官不當有清字又鄧州古號大郡出守為優封上詔書及敕下唯罪吏人而遂命如初元膺復請罪之不報又江西觀察使裴堪奏䖍州刺史李將順贓狀朝廷不覆按遽貶將順道州司戸元膺曰亷使奏刺史贓罪不覆騐即謫去縱堪之詞足信亦不可為天下法又封還詔書請發御史按問宰臣不能奪鄭餘慶為吏部尚書元和六年有毉工崔環自淮南小將為黃州司馬敕至南省餘慶執之封還以為諸道散將無故受正員五品官是開徼幸之路且無闕可供言或過理繇是稍忤時宰改太子少傅薛存誠元和中為給事中瓊林庫使奏占工徒太廣存誠以為此皆姦人竄名以避征徭不可許又咸陽縣尉袁儋為鎮軍相競軍人無理遂肆侵誣儋反受罰二敕繼至存誠皆執之憲宗聞甚悅命中使嘉勞繇是遷御史中丞張仲方為度支郎中元和十二年太常諡李吉甫為敬憲仲方以為不當駮之曰徵發傷殘之弊以為因吉甫而生既忤於時又不中其病而辭亦非工故識者奬其直而訝其稍過遂貶為遂州司馬崔植為給事中元和十四年二月以撫州司馬司正令狐通為右衛將軍植封詔上言通嘗刺壽州用兵失律前罪未塞不宜遽加奬用憲宗命宰臣諭植以通父彰有功不忍棄其子詔遂行時皇甫鎛以宰相判度支請減内外官俸禄植封還敕書極諫而止鎛重奏諸道州府監院每年送上都兩稅搉酒鹽利度支米價等匹段加估定數詔許之其先下州府監院連四月二十五日敕牒更不在行用之限鎛急於掊聚先是奏近年天下所納鹽酒等利擡估者一切追徵詔既可植抗論以為用兵歲久百姓凋弊往者雖估踰其實今固不可復追疏奏命宰臣召植宣㫖嘉諭許輟已行之詔物議大罪鎛而美植鎛懼至是乃更前過且重條奏請申敕以示之韋𢎞景為給事中長慶元年正月以檢校大理少卿駙馬都尉劉士涇為太僕卿𢎞景與薛存慶封還詔書上疏曰臣等伏覩制書授前件太僕卿者伏以司僕正卿位居九列在周之命伯冏其人所以惟月膺名象河稱重漢朝亦以石慶之謹厚陳萬年之行潔皆踐斯職謂之大僚今士涇戚里常人班叙散秩徒以父任將帥家富貲財名聲不在於士林行義無聞於朝野忽長卿寺有瀆官常况以親則人物未賢以勲則寵侍嘗厚今更顯任誠謂謬官傳曰惟名與器不可以假人葢士涇之謂臣等職司違失實在官守其劉士涇新除太僕卿敕不敢行下謹隨狀封進穆宗遣宰臣宣諭𢎞景等曰詔命已行可放下𢎞景等固執如前宰臣不得已請改授衛尉少卿帝復諭𢎞景曰士涇父昌嘗為涇帥有邊功士涇為少列十餘年又尚雲安公主宜有加恩朕思賞勞睦親之意竟行前命焉韋顗為給事中長慶二年以絳州刺史崔𢎞禮為河南尹兼御史大夫充東都畿汝州都防禦副使詔至門下顗以𢎞禮位望素輕未嘗在班列不宜尹正都邑乃抗表封還詔書詔諭韋顗放崔𢎞禮敕下盧載為給事中太和中諫議大夫崔承嘏頻上章言時政得失尋以鄭注為太僕卿論諫激切注不敢出轉給事中改華州刺史兼御史中丞詔下之後公卿迭詣中書求承嘏出麾之故載封還詔書即日文宗御紫宸殿顧謂宰臣曰華州闕人以承嘏可任故命之今諫官給事中皆疑其去旣不能户曉莫若俯從衆望遂追制罷之李固言為給事中太和五年將作監王堪修奉太廟弛慢罰俸仍改官為太子賓客制出固言封還曰東宮調䕶之地不可令被罰弛慢之人處之乃改均王傅狄兼謩為給事中開成元年十一月文宗御紫宸殿宰臣李固言奏所請檢勘左藏庫匹段所繇剩破漬汚聖恩以赦前事不罪兼謩已封敕却進帝召兼謩問封敕如何兼謩曰官典犯贓不在免限况在藏庫不同諸司以臣管見不合赦罪所以封進帝曰所司請檢之初先以赦前事請赦官典朕旣許之矣與其失信寧失罪人卿能舉職朕深嘉之茍有除授不當無以封還詔敕為難是年五月以駙馬都尉韋處仁為左散騎常侍衆以為不可給事中封駁乃除右金吾大將軍盧𢎞宣為給事中開成二年七月制贈司徒郭釗嫡男殿中少監仲文襲封太原郡開國公𢎞宣奏曰臣近訪知郭釗妻沈氏公主之女代宗皇帝外孫有男仲詞已選尚主仲文不合假冒自稱嫡子若仲文承嫡即沈氏須黜居別室仲詞不合配尚貴主伏以郭仲文尚父子儀之孫太皇太后之姪戚里勲門無與儔比婚姻嫡庶朝野具瞻奪宗之配實黜風教且仲文仲詞旣非同出襲封尚主不可竝行伏請付御史臺追勘詔令萬年縣尉仲詞襲封其仲文落下以仲文尚父之孫太皇太后之姪故免其罪韋溫為給事中開成三年六月詔以康州流人王晏平為永州司户參軍員外置同正員晏平為靈武節度使去任日取征馬四百餘匹及借兵器千餘事遂隱沒妄為申破臺司推勘獄狀悉具計贓七千餘貫以晏平之父智興嘗有戰功故特免死從流未至流所魏博鎮州幽州三節使有表請雪遂除撫州司馬溫與薛廷光盧𢎞宣等封敕改授永州司戸溫等又封還文宗命中人宣諭溫等制命始行時晏平在縗麻之中未至流所廣以金帛交結中外旣免死旋又除官復假三鎮之勢以迫朝廷而執事者但務姑息河北不守法理時論深惜之溫為尚書右丞開成四年以鹽鐵推官檢校禮部員外姚朂為鹽鐵推官河隂縣有黠吏詐欺久繫狴牢莫得其情至勗鞠問得實故有是命溫上疏以郎官朝廷之清選不可以賞能吏翼日命中人就溫私第宣令許姚勗於本司上溫又堅執前議勗竟改授檢校禮部郎中依前鹽鐵推官裴㤗章為給事中開成四年九月詔以京兆尹鄭復為檢校禮部尚書兼梓州刺史充劒南東川節度副大使知節度事管内觀察戎軍等使詔下泰章封駁以復不歴丞郎命鎮為優時議以泰章封駁不當翼日復行前制崔璪為給事中開成四年十一月詔以前靑州節度使陳君賞為右金吾衛大將軍知衛事璪封駁遂除右羽林軍統軍先時君賞在青州以貪殘不理故也李湯為給事中咸通中懿宗除后母楚國夫人聓為夏州刺史湯封還制書詔曰朕少失所親若非楚國夫人鞠養則無朕此身雖迃朝典望卿放下仍令後不得援以為例湯乃奉詔册府元龜卷四百六十九
