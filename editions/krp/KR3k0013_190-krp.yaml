body:
  text: 冊府元龜卷一百九十宋王欽若等撰閏位部姿表智識聰察器度才藝姿表洪範五事一曰貌貌曰恭是以八彩重瞳表唐堯虞舜之異龍顔日角彰漢髙光武之竒大勲既協於天人純粹必形於體貌自繼統之外代有其君至若姿表端莊神明爽邁方頤大口龍顙鐘聲或貴兆已形致異人之黙識或天光峻發使外國以仰觀亦有瞻顧非常眉目如畫挺神仙之骨格儼鸞鳯之儀容若加之以才智辯明器度雄逺皆可亞真人之竒表紹有國之基局也秦始皇蜂凖蜂一作隆長目鷙膺豺聲蜀先主身長七尺五寸垂手下膝顧視見其耳吳武烈帝孫堅容貌竒絶大帝方頤大口紫髯長上短下漢末劉琬能相人見大帝兄弟曰孫氏兄弟雖各才智明達然禄祚不終唯中弟孝亷形貌竒偉骨體不常有大貴之表年又最夀爾試識之宋髙祖身長七尺六寸風骨竒特晉世桓𤣥篡位從兄撫軍將軍循在京口以髙祖為中兵叅軍從循入朝至建業𤣥宿憚髙祖威名又恱髙祖之風儀姿貌謂司徒王謐曰昨見劉裕卿乃不得獨擅其清或說𤣥曰劉裕龍行虎歩瞻顧不凡恐不為人下宜早為其所𤣥曰我方欲平蕩中原非裕莫可付大事待關隴平定然後當别議之耳桓𤣥謂王謐曰昨見劉裕風骨不常盖人傑也文帝年十四身長七尺五寸孝武帝少機穎神明爽發前廢帝蜂目鳥喙長頸銳下順帝姿貌端華眉目如畫見者以為神人南齊髙帝姿表英異龍顙鐘聲長七尺五寸鱗文遍體梁武帝狀貌殊特日角龍顔重嶽虎顧舌文八字項有浮光身映日無影兩骻駢骨項上隆起有文在右手曰武初為司州刺史有沙門自稱僧惲謂帝曰君項有伏龍非人臣也復求莫知所之簡文帝方頤豐下鬚鬢如畫直髪委地䨇眉翠色項毛左旋連錢入背手執玉如意不相分辨盼睐則目光燭人元帝背生黒子巫媪見曰此大貴兆當不可言又云帝初生患眼髙祖自以意治之遂盲一目陳武帝身長七尺五寸日角龍顔垂手過膝文帝美容儀舉動方雅造次必遵禮法宣帝美容儀身長八尺三寸手垂過膝有勇力北齊神武帝目有精光長頭髙顱齒白如玉文襄帝年十三神清雋爽便若成人文宣帝黑色大頬鋭下鱗身重踝孝昭帝身長八尺腰帶十圍儀望風表逈然獨秀武成帝儀表瓌傑神武為帝聘蠕蠕太子菴羅辰女號隣和公主帝時年八嵗冠服端嚴神情閑逺華戎歎異後主美容儀梁太祖山庭月角舜目堯眉鸞鳯之姿自然也末帝美容儀智識真人未興雄才間出雖統乎舊物尚閟於皇階而式遏横流頗關於䜟象其或智參妙有識亮機先變而能通謀無遺策稽成敗於度内權禍福於彀中燦書史而可觀騰風徽於無際豈惟人謀允協俾黎獻之宅心将亦天險未夷假雋賢而授手取其成算著之於篇蜀先主與龎統從容宴語問曰卿為周公瑾周瑜字功曹孤到吳聞此人宻有白事勸仲謀孫權字相留有之乎在君為君卿其無隠統對曰有之先主歎息曰孤時急危當有所求故不得不徃殆不免周瑜之手天下智謀之士所見畧同耳時孔明諸葛亮字諌孤莫行其意獨篤亦慮此也孤以仲謀所防在北當頼孤為援故决意不疑此誠出於險途非萬全之計也吳孫堅漢靈帝末為别部司馬時邉章韓遂作亂涼州中郎將董卓拒討無功中平三年遣司空張温行車騎將軍西討章等温表請堅與叅軍事屯長安温以詔書召卓卓良久乃詣温温責讓卓卓應對不順堅時在坐前耳語謂温曰卓不悔罪而鴟張大語宜以召不時至陳軍法斬之温曰卓素著威名於隴蜀之間今日殺之西行無依堅曰明公親率王兵威震天下何頼於卓觀卓所言不假明公輕上無禮一罪也章遂跋扈經年當以時進討而卓云未可沮軍疑衆二罪也卓受任無功應召稽留而軒昻自髙三罪也古之名將仗鉞臨衆未有不斷斬以示威者也是以穰苴斬莊賈魏絳戮揚干今明公垂意於卓不即加誅虧損威刑於是在矣温不忍發舉乃曰君且還卓將疑人堅因起出章遂聞大兵至黨衆離散皆乞降軍還議者以軍未臨敵不斷功賞然聞堅數卓三罪勸温斬之無不歎息拜堅議郎後靈帝晏駕卓擅朝政横恣堅聞之拊膺歎曰張公昔從吾言朝廷今無此難也大帝父堅亡兄䇿起事大帝嘗隨從毎參同計謀䇿甚竒之自以為不及也先主定蜀大帝以彼已得益州令諸葛瑾從求荆州諸郡先主不許曰吾方圖涼州涼州定乃盡以荆州與吳耳大帝曰此假而不反而欲以虚辭引耶遂置三郡長史分荆州東西嘉禾四年魏文帝遣使求雀頭香大貝眀珠象牙犀角瑇瑁孔雀翡翠鬭鴨長鳴鷄羣臣奏曰荆揚二州貢有常典魏所求珍玩之物非禮也宜勿與大帝曰昔恵施尊齊為王客難之曰公之學去尊今王齊何其倒也恵子曰有人於此欲擊其愛子之頭而石可以代之子頭所重而石所輕也以輕代重何為不可予方有事於西北江表元元恃主為命非我愛子邪彼所求者於我瓦石耳孤何惜焉彼在諒闇之中而所求若此寧可與言禮哉皆具以與之赤烏七年歩隲朱然等上疏曰自蜀還者咸言欲背盟與魏交通多作舟船繕治城郭又蔣琬守漢中聞司馬懿南向不出兵乗虚以犄角之反委漢中還近成都事已彰灼無所復疑宜為之備大帝揆其不然曰吾待蜀不薄聘享盟誓無所負之何以致此又司馬懿前来入舒旬日便退蜀在萬里何知緩急而便出兵乎昔魏欲入漢川此間始嚴亦未舉動會聞魏還而止蜀寧可復以此有疑邪又人家治國舟舩城郭何得不䕶今此間治軍寧復欲以禦蜀耶人言甚不可信朕為諸君破家保之蜀竟自無謀如大帝所籌朱異為揚武將軍得魏將文欽詐降宻書與異欲令自迎異表呈欽書因陳其偽不可便迎大帝詔曰方今北土未一欽云欲歸命宜且迎之若嫌其有譎者但當設計網以羅之盛重兵以防之耳乃遣吕㨿督二萬人與異并力至北界欽果不降景帝時諸葛恪為孫峻所殺後朝臣有乞為恪立碑以銘其勲績者博士盛沖以為不應帝曰盛夏出軍士卒傷損無尺寸之功不可謂能王欽若等按諸葛恪傳違衆出軍無功而還受托孤之任死於䜿子之手不可謂智沖議為是遂寝宋髙祖時毛循之父瑾為梁州刺史為譙縱所殺循之西討不克後遣朱齡石伐蜀循之固求行髙祖慮循之至蜀必多所誅殘土人既與毛氏有嫌亦當以死自固故不許梁簡文帝年十一便能親庶務歴試藩政所在著美特為髙祖所愛焉北齊神武帝以杜弼為大行臺郎中弼以文武在位罕有亷潔言之於帝帝曰弼来我語爾天下濁亂習俗已久今督將家属多在關西黑獺常相招誘黑獺後周文帝也人情去留未定江東復有一吳兒老翁蕭衍者専事衣冠禮樂中原士大夫望之以為正朔所在我若急作網法不相饒借恐督將盡投黒獺士子悉奔蕭衍則人物流散何以為國爾宜少待吾不忘之文襄帝為渤海王世子時年十二神情雋爽便若成人神武試問以時事得失辨析無不中禮自是軍國籌策皆預之文宣帝少有大度志識沈敏外柔内剛果敢能斷雅好吏事測始知終理劇處繁終日不倦初踐大位留心政術以法馭下公道為先或有違犯憲章雖宻戚舊勲必無容舎外内清浄莫不祗肅至於軍國幾務獨決懐抱規模宏逺有人君大畧廢帝為皇太子時年六嵗性敏慧初學反語於跡字下注云自反時侍者未逹其故太子曰跡字足傍亦為跡豈非自反耶嘗宴北宫獨令河間王勿入左右問其故太子曰世宗遇賊處河間王復何宜在此孝昭帝自居臺留心政術嫻明簿領吏所不逮及正位宸居彌所尅勵輕徭薄賦勤恤人隠内無私寵外收人物雖后父位尊亦待遇無别日昃臨朝務知人之善惡聰察夫表微之監禮經實著於嘉猷辨惑之辭先聖嘗形於善荅茍甄明之或爽將邪正以罔分是以南面之君嚮明而治必資睿哲以懋丕圖厯數或屯餘閏斯作逖觀敏識咸契言機知臣者有則哲之明擿伏者無非辜之舉雖謳謡獄訟顧寳命之未融而博達聰明諒簡書而可挹蜀先主定益州以李恢為功曹書佐主簿後為己虜所誣引恢謀反有司執送先主明其不然更遷恢為别駕從事吳大帝年少時兄䇿使吕範典主財計帝時私從有求範必關白不敢専許當時以此見望大帝守陽羡長有所私用䇿或料覆功曹周谷輙為傳著簿書使無譴問大帝臨時悦之及後統事以範忠誠厚見信任以谷能欺更簿書不用也後範為揚州牧性好威儀時人有白範與賀齊奢麗夸綺服餙僣擬王者大帝曰昔管仲踰禮桓公優而容之無損於覇今子衡公苗子衡吕範字公苗賀齊字身無夷吾之失但其器械精好舟車嚴整耳此適足作軍容何損於治哉告者乃不敢復言廢帝出西苑方食生梅使黄門至中藏取蜜漬梅蜜中有䑕矢召問藏吏藏吏叩頭帝問吏曰黄門從汝求蜜耶吏曰向求實不敢與黄門不服侍中刁𤣥張邠啟黄門藏吏辭語不同請付獄推盡帝曰此易知耳令破䑕矢矢裏燥帝大笑謂𤣥邠曰若矢先在蜜中中外當俱濕今外濕裏燥必是黄門所為黄門首服左右莫不驚悚一云廢帝使黄門以銀椀并盖就中藏吏取交州所獻甘蔗餳黄門先恨藏吏以䑕矢投餳中啟言藏吏不謹帝呼吏持餳器入問曰此器既盖之且有掩覆無緣有此黄門將有恨扵汝邪吏叩頭曰嘗從某求宫中莞席宫蓆有數不敢與亮曰必是此也復問黄門具首伏即扵目前加秃鞭斥付外署宋文帝時孟顗為會稽太守謝靈運以侍中退居郡中頗輕顗所為遂搆讐隙顗因靈運横恣百姓驚擾乃表其異志發兵自防露板上言靈運馳至京都詣闕上表帝知其見誣不罪也不欲使東歸以為臨川内史加秩中二千石孝武帝時王𤣥謨為雍州刺史民間訛言𤣥謨欲反時栁元景當權元景弟僧景為新城太守以元景之勢制令南陽順陽上庸新城諸郡並發兵討𤣥謨𤣥謨令内外晏然以解衆惑馳啟帝具陳本末帝知其虚馳遣主書吳喜公撫慰之南齊太祖初為齊公時四貴輔政員外郎卞彬謂太祖曰外間有童謡云可憐可念尸著服孝子不在日代哭列管蹔鳴死滅族尸著服禇字邉衣也孝除子以日代者謂褚淵也列管簫也彬退太祖笑曰彬自作此武帝永明元年謝超宗既賜死明年超宗門生王永先又告超宗子才卿死罪二十餘條世祖疑其虚妄以才卿付廷尉辨之不實見原永先於獄盡之梁髙祖時劉之亨為湘東王行臺丞常督衆大致克復軍士有功皆録唯之亨為蘭欽所訟執政因而䧟之故封賞不行但復本位而已久之帝讀陳湯傳恨其立功絶域而為文吏所抵宦者强僧裔曰外聞論者竊謂劉之亨似之帝感悟乃封為臨江子固辭不拜北齊神武為東魏大將軍時李密為襄州刺史侯景外叛誘密執之授以官爵景敗歸朝帝以密從景非本心不之罪也文襄帝為東魏大將軍時宋逰道為髙隆之等所誣是時朝士皆忿謂逰道不濟而帝聞其與隆之相抗之言謂楊遵彦曰此真是鯁直大剛惡人遵彦曰譬之畜狗本取其吠今以數吠殺之恐將来無復吠狗詔付廷尉逰道坐除名帝使元景康謂曰卿蚤逐我向并州不爾他經畧殺卿逰道從至晉陽以為大行臺吏部梁太祖開平中晉州汾西縣百姓蔡奉言論本州㳺奕將李建不法一十二事帝覽奏曰李建職司防察事極重難若狥愛憎便罹刑網則何以委用邉吏因命奉言移貫内地器度夫所享厚者其量必大所圖廣者其志必逺况㨿偏方而鼎峙承間邑而𤓰分建元改號開國承家故有英異之姿發扵經綸之際宏逺之度存扵聽斷之間不為疑駭而變常不為喜怒而改色使仇敵不能以計撓臣下不得以智闚厭服賢豪容畜民衆所以能成其基業者其繇是矣蜀先主微時舎籬上有桑樹生髙五丈餘遥望見童童如小車盖先主與宗中諸小兒於樹下戲言吾必當乗此羽葆盖車先主不甚樂讀書喜狗馬音樂喜怒不形於色好交結豪侠年少争附之既為益州牧時馬超来降先主待之厚超嘗呼先主字關侯怒請殺之先主曰人窮来歸我卿等怒以呼我字故而殺之何以示於天下也張飛曰如是當示之以禮明日大會請超入闗張並杖刀立超顧坐席不見闗張見其立也乃大驚遂止不復呼字明日歎曰我今乃知其所以敗為呼人主字幾為關張二將所殺自後乃尊事先主吳大帝性度𢎞朗仁而多斷好侠養士始有知名侔扵父兄矣南齊太祖少沉深有大量寛嚴清儉喜怒無色從諫察謀以威嚴得重一云少有大量喜怒不形扵色深沉静黙嘗有四海之心梁簡文帝器宇寛𢎞未嘗見喜愠色陳髙祖少俶儻有大志不治生産既長讀書多武藝明達果斷為當時所推服宣帝少器度𢎞厚有人君之量北齊神武深沉有大度輕財重士為豪侠所宗文宣帝不好戲弄深沉有大度神武嘗試觀諸子意識各使治亂絲帝獨抽刀斬之曰亂者須斬神武是之又各配兵四出而使甲妓偽攻之文襄等怖撓帝乃勒衆與彭樂敵樂免胄言情猶擒之以獻幼時師事范陽盧景裕黙識過人景裕不能測也神武為東魏相國既薨猶秘凶事衆情疑駭帝雖内嬰巨痛外若平常人情頗安及文襄遇害事出倉卒内外震駭帝神色不變指麾部分自若臠斬羣賊而漆其頭徐宣言曰奴反大將軍被傷無大苦也當時内外莫不驚異焉乃赴晉陽親總庶政務從寛厚有不便者咸蠲損焉孝昭帝聰敏有識度深沉能斷不可窺測梁太祖多大畧恢𢎞逺度合於覇王之道才藝夫以宣尼將聖之資不忘於鄙事姬旦事神之㫖自謂於多才挹遺籍之芳風亦先民之懿範矧或彌綸百揆總制萬機而能濬發清衷旁精曲藝雖人君之度豈獨在兹然天縱之能盖其餘力傳諸汗簡有助徽音宋髙祖初不能書劉穆之謂曰但縱筆為大字一字徑尺無嫌大既足有所包且其名亦美髙祖從之所書一紙不過六七字文帝善𨽻書孝武帝雄决愛武長於騎射後廢帝凡諸鄙事過目即能鍜金銀裁衣作帽莫不精絶未嘗吹箎執管便韻南齊太祖工草𨽻書奕棊第二品鬱林王好𨽻書武帝特所鍾愛勅皇孫手書不得妄出以貴之梁髙祖有文武才幹六藝備嫻棊登逸品隂陽緯候卜筮占决並悉稱善又撰金䇿三十卷草𨽻尺牘騎射弓馬莫不竒妙元帝於技術無所不該嘗不得南信筮之遇剥之艮曰南信已至今當遣左右李心徃看果如所說賓客咸驚其妙凡所占决皆然後梁後主善弓馬遣人伏地著帖琮馳馬射之十發十中持帖者亦不懼陳髙祖渉獵史籍好讀兵書明緯候孤虗遁甲之術多武藝明達果斷為當時所推服宣帝有勇力善騎射東魏孝静帝能挟石獅子以踰墻射無不中册府元龜卷一百九十
