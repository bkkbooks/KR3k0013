body:
  text: 册府元龜卷一百八十宋王欽若等撰帝王部失政濫賞失政粤若居大寳之位守富有之業莫不議道自已制法於民政令繇我而行風教從我而立億兆繋於舒慘宗社屬於安危本或先顛道之斯廢若乃驕非期而自至欲敗度以攸縱喻于五音也宫亂則荒著於六籍也禮失則奢徳之下衰天或是厭唐虞以前禮俗樸素詩書之簡䇿無越厥猷夏商而降物儀明備役志于享衮職或闕故有徵求往訓以著乎深戒敷陳前說以志其失徳及乎小雅興刺近臣獻規所以交修彌縫之深切者也夏太康尸位以逸豫滅厥徳黎民咸貳在位二十九年失政而亡孔甲立性好方鬼神事淫亂夏后氏徳衰諸侯叛之桀不務徳而虐傷百姓百姓不堪乃召湯而囚之夏臺已而釋之湯修徳諸侯皆歸湯湯遂率兵以伐桀走鳴條遂放而死桀謂人曰吾悔不遂殺湯於夏臺使至此也商太甲立三年不明暴虐不遵湯法紂厚賦税以實鹿臺之財而盈鉅橋之粟以西伯昌鬼侯邢侯為三公鬼侯有女入之紂鬼侯女不喜淫紂殺之而醢鬼侯邢侯爭之并脯之西伯聞之竊歎崇侯虎知之以告紂紂囚西伯羑里既而釋之周厲王即位三十年好利近榮夷公以為卿士用事王行暴虐侈傲國人謗王王怒得衞巫衞國之巫使監謗者以告則殺之國人莫敢言道路以目三年相與叛襲厲王出奔於彘彘晉地漢縣屬河東宣王不脩藉於千畝虢文公諫曰不可王弗聽宣王既亡南國之師敗于姜戎時所亡也乃料民於太原料數也仲山甫諫曰民不可料也王弗聽幽王以虢石父為卿用事國人皆怨曰石父為人佞巧善䛕好利而王用之桓王失於信禮義陵遲男女淫奔讒偽並作諸侯背叛搆怨連禍九族不親故詩人刺之僖王自即位以来變文武之制作𤣥黄華麗之飾宫室崇峻奢侈故孔子譏焉恵王即位奪其大臣蒍國之田以為圃大夫邊伯等五人作亂五人者蒍國邊伯詹父子禽祝蹉也靈王二十五年穀洛鬭將毁王宫王欲壅之太子晉諫不聽卒壅之亂於是始漢元帝被疾不親政事方隆好于音樂以中書令石顯久典事中人無外黨精専可信任遂委以政事無大小因顯白決貴幸傾朝百僚皆敬事顯成帝耽于酒色飛鷰亂内外家擅朝哀帝即位待詔夏賀良等言赤精子之䜟漢家歴運中衰當再受命今宜改元易號乃以建平三年為太初元年號曰陳聖劉太平皇帝漏刻以百二十為度又大司馬董賢見幸武庫禁兵尚方珍寳選物上第盡在董氏乘輿乃其副也後漢安帝之初委政太后十有餘年及親萬幾佞邪始進閹宦用事寵加私愛阿母王聖勢傾朝廷遂樹姦黨揺動儲副山陵未乾蕭墻作難兵交禁省社稷殆危桓帝惡大將軍梁冀輔政縱横為亂與中常侍單超等五人共謀誅之於是封超等為五侯五侯暴恣日甚毒流天下白馬令李雲坐直諫誅名惡少府李膺等並為閹人所譛誣為黨人下獄死又云桓帝封殖宦䜿羣妖滿側諸姦彌興賢良被辜政荒民散亡徴漸積靈帝收天下田畝十錢以治宫殿發太原河東豫章材木黄門常侍斷截州郡送材文石掌主吏譴呼不中度賣之貴戚因縁賤買十倍入官其貴戚所入者然後得中宫室連年不成州郡因増加調發刺史二千石遷除皆責助治宫錢大郡至二千百詔所徴皆令西園騶密約初號曰中使恐動州郡多受財賂天下騷動起為盜賊矣一云靈帝不恤宗緒不祗天命爵服横流官以賂成自公侯卿士降于皁𨽻百官下級無不以貨刑戮無辜元忠被黜佞䛕在側直言不聞是以賢智困窮忠良擯于下位遂至姦邪蜂起法防隳廢夷狄並侵盜賊方􅕽小者帶城邑大者連州郡編户騷動人人思亂矣魏明帝於芳林園北立八坊諸才人以次序處其中其秩石擬百官之數帝嘗遊宴在内乃選女子知書可付信者六人以為女尚書使典省外奏事處當畫可晉武帝平呉之後天下乂安遂怠於政術躭遊宴寵愛后黨臣貴當權舊臣不得専任彞章紊廢請謁大行矣又云武帝平孫皓納吴妓五千是同皓之弊婦人之封失國亂政追贈外曽祖母違古之道凡此非事並見前書誠有玷於徽猷史氏所不敢蔽也惠帝在位政出羣下紀綱大壞貨賂公行勢位之家以貴陵物忠賢絶路讒邪得志更相薦舉天下謂之互市焉孝武帝初耽酒色末年始為長夜之飲醒日既少多居内殿留連於盤樽之間時張貴人寵冠後宫威行閫内後周宣帝大象元年二月傳位與皇太子自稱天元皇帝所居三天臺冕二十有四旒車服旗章皆以二十四為節内史御正皆置上大夫皇帝稱正陽宫置納言御正諸衞等官皆准天臺尊皇太后為天元皇太后十二月行幸雒陽帝親御驛馬日行三百里皇后及文武侍衞數百人並乘驛以從令四后方駕齊驅或有先後便加譴責人馬頓仆相屬於道二年正月造二扆畫日月象以置左右二月改制詔為天詔勑為天勑三月詔天臺侍御之官皆著五色及紅紫雲衣以雜色縁名曰品色衣有大事與公服間服之是月詔内外命婦皆執笏共拜宗廟及天臺皆俛伏帝自禪位之後彌服驕奢躭酗於後宫或旬日不出公卿近臣請事者皆附門官奏之唯自尊崇無所顧憚國典朝位率情變改後宫位號莫能詳録每對臣下自稱為天以五色土塗所御天殿各隨方色羣臣朝天臺者致齋三日清身一日車旗章服倍於前王之數既自比上帝不欲令人同已嘗自帶綬及冠通天冠加金附蟬顧見侍臣武弁上有金蟬及王公有綬者並令去之又不聽人有髙大之稱諸姓髙者改為姜九族稱髙祖者為長祖曾祖為次祖官稱名位謂上及大者改為長又禁天下婦人皆不得施粉黛惟宫人得焉又恐羣臣規諫不得行已之志嘗遣左右密伺察之動止所為莫不抄録少有乖違輒加其罪自公卿以下皆被楚撻其間誅戮黜免者不可勝言每捶人皆以百二十為度名曰天杖宫人内職亦如之又令拜者皆以三拜成禮隋髙帝仁夀中用法益峻帝既喜怒不常不復依凖科律時越國公楊素素被委任素又禀性髙傲公卿股栗不敢參言素與鴻臚少卿陳延不平經蕃客館庭中有馬屎又庻僕氊上摴蒱旋以白帝帝怒曰主客令不灑掃庭内掌固以私戲汙敗官氊罪狀何以加此者令西市棒殺榜箠陳延殆至於死煬帝大業末軍國多務日不暇給帝方驕怠惡聞政事寃屈不治奏請罕決唐髙宗永徽六年十月廢皇后王氏為庻人立昭儀武氏為皇后乾封元年正月己巳封泰山庚午禪於社首以皇后武氏為亞獻越國太妃燕氏為終獻上元二年三月帝風疹不能聽朝政事皆決於皇后自誅上官儀之後帝每視朝皇后垂簾於御座後政事大小皆預聞之内外稱為二聖帝欲下詔令皇后攝國政中書侍郎郝處俊諫止之中宗神龍初立妃韋氏為后時昭容上官氏嘗勸后行則天故事乃上表請天下士庻為出母喪服又請百姓以年二十三為丁五十九而免役改易制度以收時望制皆許之又左右内職時許出禁中上官氏及宫人貴幸者皆立外宅出入不節朝官邪佞者候之恣為狎遊祈共賞㧞以至要官時侍中敬暉謀去諸武武三思患之乃結上官氏以為援因得幸於韋后潜入宫中謀之乃挾百官上帝尊號為應天皇帝韋后為順天皇后三年九月帝與后親謁太廟告謝受尊號之意是月改元景龍三思之入用事敬暉王同皎相次夷滅天下咸歸咎於韋后景龍三年十一月乙丑親祀南郊皇后發壇亞獻左僕射舒國公韋巨源為終獻皇后又欲寵樹安樂公主乃制公主開府置官屬下比親王長寧安樂二府不置長史而已宜城公主以非后所生請各減太平之半安樂恃寵驕恣賣官鬻獄勢傾朝廷嘗自草制勑掩其文而請帝畫焉帝笑而從之竟不省視又上官昭容與其母鄭氏及尚宫柴氏賀婁氏樹用親黨廣納貨賂别降墨勑斜封授官臧獲屠販之類累居榮秩𤣥宗天寳四載册太真妃楊氏為貴妃范陽節度使安禄山請為貴妃養兒入對皆先拜太真遂命楊雲已下並約為兄弟十一載十一月以貴妃從祖兄御史大夫國忠為右相十三載正月禄山謁於華清宫請為閑廄三十羣牧等都使又請知總監事帝筋脚馬皆隂令擇之三月人從范陽来言反者帝必大怒至送與之十四載十一月禄山果叛三稱奉命以兵討逆人楊國忠是時天下承平日久人不知戰聞其兵起朝廷恟懼十二月禄山渡河遂入陳留郡又入東京十五載六月潼關不守帝乃幸蜀憲宗元和末謂宰臣曰朕讀𤣥宗實録見開元初鋭意求理至十六年已後稍似懈倦開元末又不及中年何也崔羣對曰𤣥宗久歴民間身經屯難故即位之初知人疾苦躬勤庻政加之姚崇宋璟蘇頲盧懷慎等守正之輔孜孜獻納故致治平及後承平日久安於逸樂漸逺端士而近小人宇文融以聚斂媚上心李林甫以耳目獲上意終之以國忠故及於亂肅宗至徳二年六月將軍王𤣥榮殺本縣令杜徽罪合死帝以其能脩守備之器特放逸令於河東承天軍効力中書舎人賈至上封事執之百寮咸與至同帝以寇逆未平藉其殊藝竟赦之徳宗建中三年以户部侍郎趙贊判度支括率富商錢以給軍京兆少尹督責頗峻長安尉荷校乘車捜人財貨意其不實即行榜箠人不勝寃痛或有自縊而死者京師囂然如被賊盜長安為之罷市又令神䇿軍使白志貞募致禁軍皆以京城沽販之徒充之具問其人皆在市廛及涇師犯闕詔神䇿軍拒賊無一人至者貞元三年八月辛巳朔日有蝕之有司凖禮將伐鼔於大社不許太常卿董晉奏曰伐皷于社所以責羣隂助陽光可特宣詔㫖以合經義寢不報十六年六月令三司使推鞫永州刺史楊履時觀察使吕渭奏履犯贓履又表自言當州營備錢物上獻為上使所鞫案因令中使王文凑就州取履至京師三司使訊其所妄破用履云市馬進訖及訊其馬於何人處買及價值齒嵗履答狀馬主東西南北貴公子也今不知所在言馬齒嵗案禮經齒路馬者當誅今不敢言其他狀欵多如此類帝悦其進奉之言不責也但令免官而已十八年七月嘉王諮議髙𢎞本正衙奏事自理逋債詔曰朕方勵精庻政博求嘉言比者百官正衙奏事至有多時者公卿庻僚屬當寒暑為弊亦深在於朕懐豈謂今日自今勿正衙奏事如陳奏者宜延英門請對正衙奏事不易之典也武徳貞觀之間孜孜論道君臣講陳政事謁見無時不容疎矣其後正朝奏御凡在列位無不上逹髙𢎞本黷禮罪之可也因人而廢其事不可也帝自貞元八年貶竇參十年陸贄免相之後躬親庻政不復委成宰相廟堂備員行文書而已除守宰御史皆自選擇然居深宫所押而取信者裴延齡李齊運王召李實韋执誼韋渠牟皆權傾相府延齡李實姦欺多譎甚傷國體名無所發明而渠年名素輕頗張聲勢以超趨嚮者帝既偏有所聽浮薄者卒皆進用不復藏器藴徳皆奔走請謁刓蹄甘辭以附渠牟憲宗元和十三年九月以户部侍郎判度支皇甫鏄衞尉卿充諸道鹽鐵轉運使程异同平章事並依前判使是時帝切於財賦故用聚斂之臣居相位詔書既下物情駭異至於賈販無識亦相嗤誚宰相崔羣裴度以物議上聞帝怒而不聽度上疏論之是時帝以世道漸平欲肆意娯樂池臺館宇稍增崇飾异鏄探知上㫖數貢羨餘以備經構故帝獨排物議相之見度疏以為朋黨竟不省覽敬宗以長慶四年正月丙子即位三月甲寅始對宰臣等於延英殿戊辰百寮入閣日絶髙未坐帝即位以来坐朝皆晚此日尤甚羣臣候立紫宸門外有不任其久幾欲頓踣者諫議大夫李渤出次白宰相曰昨日已有疏論坐晩今日又益晩今不能回上意是渤之罪請出閣赴金吾仗待罪有頃既坐百官班退左拾遺劉栖楚獨留帝前進諫曰臣厯觀前王嗣位之初莫不躬勤庻政坐以待旦陛下即位以來放情嗜寢樂色忘憂安臥宫闈日晏方起西宫密邇未過山陵鼓吹之聲日喧於外伏以憲宗皇帝大行皇帝皆是長君恪勤庻政四方猶有叛亂陛下運當少主即位未幾惡徳布聞臣恐福祚之不長也臣忝諫官致陛下有此請碎首以謝遂以額叩龍墀久之不已宰相李逢吉出位宣曰劉栖楚休叩頭候進止栖楚捧首而起因更陳論搕額見血帝為之動容以袖連揮令出栖楚又云不可臣奏臣即碎首而死中書侍郎牛僧孺復宣示栖楚曰所奏知門外待進止栖楚即拜舞而出待罪於金吾仗然後宰臣更贊其事於帝前命中人就仗宣諭并李渤並令各且歸第寳厯元年七月拾遺李漢舒元褒薛廷老於閣内論近日除授往往不由中書進擬多是内中宣出臣恐紀綱寖壊姦邪恣行伏希察詳帝然之是嵗詔度支進銅鏡三千斤金薄十萬畨脩精思院新殿及歸徳殿圗障帝性本好土木自春至冬興作相繼嘗幸凝碧池令兵士千餘人於池中取大魚送入新池又好深夜自捕狐狸宫中謂之打夜文宗開成元年三月皇城留守郭畋奏以城内諸司所管羽儀法物内鎗刀利器等納入軍器使如本司要立仗行事請給儀刀從之凡朝廷法物各有司存而以訓注之祻懼内官猜阻而輕廢舊典上位者不能持正論之後唐莊宗同光二年五月以教坊使陳俊為景州刺史内園使儲徳源為憲州刺史皆梁之伶人也初帝平梁俊與徳源皆為寵伶周匝所薦帝因許除郡樞密院郭崇韜以為不可伶官言之者衆帝密召崇韜謂之曰予已許除郡經年未行我慙見二人卿當屈意從之故有是命十一月癸卯帝畋於伊闕命從官拜梁祖之陵物議非之十二月庚午帝與皇后劉氏幸河南尹張全義第酒酣帝命皇后拜全義為養父全義皇恐致謝復出珍貨貢獻翌日皇后傳㫖令學士草謝全義書趙鳳密疏陳國后無拜人臣為父之禮帝雖嘉之竟不能已其事是月以教坊使王承顔為興州刺史末年誅郭崇韜朱友謙之後閹䜿伶官交相讒諂邦國大事皆聽其謀繇是漸多猜惑及魏博軍變宰臣豆盧革率百官上表請出内府金帛優給將士不報時知星者上言客星犯天庫宜散府藏又云流星犯天踣主御前有急兵帝召宰臣於便殿皇后出宫中粧奩銀盆各二并皇子滿哥三人謂宰臣曰外人謂内府金寳無數向者諸侯貢獻旋供賜與今宫中有者粧奩嬰孺而已可鬻之給軍革等皇恐而退明宗天成元年九月北京奏准宣㫖於係省賣麴錢上每貫割留二百文充本府公使初以朱守殷為河南尹守殷位兼平章事與諸貴要近臣宰執交歡宴㑹時集於府第復又妓侍盈室每見安重誨任圜言府司無利潤支費不充執政計無從出即以分割麴錢議聞奏從之諸道州使因以為例長興三年七月邠州奏丹山縣令張浩為新平縣令昨進奏院逓到正授告身欲給之時再問行止乃稱丹山縣令名銜是亡兄承禋浩即曽有三處攝牒恐礙格條不敢給授其告身却進納中書引驗其前告身名承禋勑㫖並令焚毁赦浩冒名之罪凡中書除官堂吏必依格條追前任名銜而將承禋為浩偽濫顯然盖藏其姦有此除授而又特赦冒名不罪堂吏則賄賂囊橐之弊無時能革時有田審回者論冐名得官人遂城縣令魏欽緒事下御史臺推勘欽緒棄市今赦承禋而罪欽緒法令如此可謂大衰矣濫賞夫慶賜之行貴於至當禄秩之設戒乎虗授故才罔稱職彼其之刺興賞靡酬功不祥之説著允矣哉太宰之八柄其為御下之要也周室之後王綱或紊以至饗宥之數不協於禮文賞賚之典或私於嬖倖以官爵為市靡思於任賢行姑息之政頻加於横賜其或以宴樂為務奬優笑之流専耳目之翫喜竒巧之技或讐其詆訐之用啓乎偷薄之源或録其纎微之勞紊乎經常之制傳曰古之善為國者賞不僣僣則懼及滛人斯可戒矣周惠王時虢公晉侯朝王王饗醴命之侑皆賜玉五㲄馬三匹非禮也雙玉為㲄王命諸侯名位不同禮亦異數侯而與公同賜是借人禮漢文帝時鄧通櫂船為黄頭郎帝尊幸之賞賜通鉅萬以十數每賜輒鉅萬如此者十數官至上大夫十五年趙人新垣平以望氣見帝於是貴平至上大夫賜累千金武帝即位明年齊人少翁以方見帝乃拜少翁為文成將軍賞賜甚多以客禮之元狩元年春樂成侯登上書言欒大膠東宫人王家人言黄金可成而河決可塞不死之藥可得僊人可致廼拜大為五利將軍居月餘得四印封為樂通侯賜列侯甲第童千人乘輿斥車馬帷帳器物以充其家斥不用者又以衛長公主妻之齎金十萬斤又韓嫣帝為膠東王時嫣與帝學書相愛及即位欲事伐胡而嫣先習兵以故益尊貴官至上大夫賞賜擬鄧通成帝時淳于長遷水衡都尉侍中至衛尉九卿久之趙飛燕貴幸帝欲立以為皇后太后以其所出微難之長主往來通語東宫主猶専嵗餘趙皇后得立帝甚徳之廼追顯長前功下詔曰前將作大匠解萬年奏請營作昌陵罷弊海内罷讀曰疲侍中衛尉長數白宜止徙家反故處陵置邑徙人以實之長奏令止所徙之家各還本家朕以長言下公卿議者皆合長計首建至䇿民以康寧康是安也其賜長爵關内侯後遂封為定陵侯大見信用貴傾公卿外交諸侯公卿牧守賂遺賞賜亦絫鉅萬絫古累字下同張放襲富平侯臨子也母敬武公主元帝妹也鴻嘉中成帝欲遵武帝故事與近臣遊宴放以公主子開敏得幸放取皇后弟平恩侯許嘉女帝為放供帳賜甲第充以乘輿服飾號為天子取婦皇后嫁女太官私官並供其第私官皇后之官也賞賜以千萬數哀帝為太子時董賢為舍人哀帝立拜為黄門郎旬月間賞賜累鉅萬貴震朝廷為賢起大第北闕下重殿洞門土木之功窮極技巧柱檻以綈錦下至賢家僮僕皆受上賜及武庫禁兵上方珍寳其選物上第盡在董氏而乘輿所服廼其副也帝欲侯賢而未有縁㑹待詔孫寵息夫躬等告東平王雲右謁祠祀呪詛下有司治皆伏其辜帝於是令躬寵為因賢告東平事者廼以其功下詔封為髙安侯後漢桓帝延熹中連嵗征伐府帑空虚乃假百官俸禄王侯租税中常侍侯覽亦上縑五千疋賜爵關内侯又託以與議誅梁冀功進髙鄉侯靈帝初中常侍曹節與長樂五府史朱瑀從官史龔普張亮中黄門王尊長樂謁者徐騰等一十七人矯詔以長樂食監王甫為黄門令將兵誅竇武陳蕃武等已誅節遷長樂衛尉封育陽侯増邑三千户甫遷中常侍黄門令如故瑀封都鄉侯千五百户普亮等五人各三百户十一人皆為關内侯嵗食租二千斛先是瑀等隂於明堂中禱皇天曰竇氏無道請皇天輔皇帝誅之令事必成天下得寧既誅武等詔令太官給賽具賽報祠也音蘇代切賜瑀等錢五千萬餘各有差後更封華容侯二年節病因詔拜為車騎將軍有頃疾瘳上印綬罷復為中常侍位特進秩中二千石尋轉大長秋節又與王甫等誣奏桓帝弟渤海王悝謀反誅之以功封者十二人甫封冠軍侯節舊封育陽侯亦増邑四千六百戸并前七千六百戸後魏宣武時左中郎將王仲興值咸陽王之出奔也當時上下㣲為駭震宣武於乾脯山遣仲興馳入金墉城安慰後參機要殆與有功者等唐穆宗以元和十五年正月即位賜左右神䇿軍兵士錢每人五十貫六軍威逺每人三十貫左右金吾每人五十貫非故事也自憲宗御宇至穆宗登祚及長慶二年十八年矣凡朔方吴蜀洎山東西河累興問罪之師其間兵戈少息者無一嵗故帝自幼細聞軍旅之事謂戎臣武卒常宜姑息繼統之始財以恣行給資神策禁旅洎左右三軍兵健號長行者其名最末人尚𫉬五萬至於非時賜與不可勝紀驕横難戢其𫝑己甚令又降優假之詔俾其蕃大復有工賈胥吏窺昇朝籍者厚持緡貨納于方鎮大鎮嗜利者即以大將文符給之偽其職秩年月未幾則薦聞必曰某以嵗久宜遷某以殊勲合奬宰臣奏擬下得王官欲望兵復于農官清其序難矣敬宗以長慶四年正月即位二月辛卯召家令寺典張鍨入内賜緋魚袋甲午以鍨為家令寺小吏賜緋之後又連有是命人頗異之三月壬子帝幸内園賜優人康赫赤金紫丁卯帝幸神䇿軍賜力士韓筯􅪚錦綵三十疋銀器二事庚午賜教坊錢一萬貫以備行幸樂官一十三人並賜緋乙亥帝幸教坊賜俳優綾絹三千五百疋十一月丁未賜教坊樂人李臻緋并賜翊善坊宅一區時穆宗攅宫已啓五日矣龍輴動軔期在旦夕而甲第朱衣之賜逓及倡優衆皆竊議寳厯元年七月癸酉賜善奕待詔王倚緋及綵絹銀器閏七月壬申賜教坊樂官任自逹大寧坊宅一區二年十一月己卯賜翰林僧惟真絹五十疋惟真以異術出入禁署故横及焉文宗太和五年三月辛卯以右神策軍散兵馬使檢校太子賓客豆盧著守本官兼殿中侍御史讐告宋申錫謀反故也後唐莊宗同光元年十月入汴州賜樂人周匝幣帛周匝者帝之寵伶也胡栁之役陷於賊帝素喜優笑每思之至是復得欣然慰接周匝叙其違奉契闊因言偶獲全者皆偽廷教坊使陳俊之恩也垂泣保薦請除郡守即時許之議者憤其佞倖明宗天成元年七月庚辰賜諫議大夫蕭希甫衣段二十疋銀器五十兩以訟豆盧革韋説之罪非賞典也八月癸巳賜攝湯隂縣令王延禧主簿栁承翰等緋魚以帝今春赴難時經過供頓之勞也然主簿賜緋賞典太過安重霸初為蜀守秦州聞明宗起河北即時遣使以秦城等州來降天成初用為閬州團練使未幾召還為左衛大將軍常懐姦佞探人主意明宗尤愛之長興末明宗謂侍臣曰安重霸朕之故人以秦州歸國其功不細酬以團練防禦恐非懐來之道范延光曰將校内有自河東河北從陛下龍飛故人尚有未及團防者今若遽授重霸方鎮恐為竊議明宗不悦未幾竟以同州節鉞授之晉少帝開運三年詔宋州節度使李守貞近以援送軍儲殺戮蕃賊繼聞克捷宜示頒宣䕶聖奉國興順宗順興國諸軍都指揮使各絹十疋餘自都虞候至散卒七疋至十疋其隨行人員與諸州本城將士亦有等第賜賚史官曰昔衛青霍去病深入虜磧以斬首加級用為定規故謂首級此其義也守貞前引大軍往取瀛州境獲一刺史以退此時言攻幽薊賴張彦澤勦蕃較而回徴師五萬運糧千里行扈所過卷團一空將吏醉飽百草皆除遂使河北生民無措足之所而又軍去有賜謂之挂甲錢来則賞之謂之卸甲錢或微有功名日皆次第優給緡帛動計三十萬數田力其何以濟良可痛矣良可駭矣漢髙祖以晉天福十二年即位時司天監趙延乂冬官正呉正已徐延浩等進來年厯日賜器皿繒帛有差星官有禄給進厯日職也前代太史預言氣象水旱災變使國有備可賞之矣至於中秋老人星見日月薄蝕皆常事也賜賞非其時況厯日乎册府元龜卷一百八十
