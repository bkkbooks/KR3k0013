body:
  text: 册府元龜卷九百九十宋王欽若等撰外臣部偹禦第三魏文帝黄初三年二月鄯善等王各遣使奉獻西域遂通置戊己校尉明帝即位務欲綏和戎狄以息征伐覊縻兩部而已先是黄初五年歩度根赴闕貢献厚加賞賜後一心守邉不為冦害而軻比能衆遂彊盛晉武帝時關隴屢為氐羌所擾孟觀西討日擒氐帥齊萬年山隂令江統深惟四夷亂華冝杜其萌乃作徙戎論其辭曰夫夷蠻戎狄謂之四夷九服之制地在要荒春秋之義内諸夏而外夷狄以其言語不通贄幣不同風俗詭異種類乖殊或居絶域之外山河之表﨑嶇山谷險阻之地與中國壌㫁土隔不相侵渉賦役不及正朔不加故曰天子有道守在四夷禹平九土而西戎即叙其性氣貪婪凶悍不仁四夷之中戎狄為甚弱則畏服彊則侵叛雖有賢聖之世大徳之君咸未能通化率導而以恩徳柔懷也當其彊也以殷之髙宗而憊於鬼方有周文王而患昆夷高祖困於白豋孝文軍於覇上及其弱也周公來九譯之貢中宗納單于之朝以元成之㣲而猶四夷賓服此其已然之効也故匈奴求守邉塞而侯應陳其不可單于屈膝未央望之議以不臣是以有道之君牧夷狄也惟以待之有備禦之有常雖稽顙執贄而邉城不弛固守雖冦賊強暴而兵甲不加逺征期令境内獲安疆埸不侵而已及至周室失統諸侯專征以大兼小轉相誅滅封疆不固而利害異心戎狄乗間得入中國或招誘安撫以為巳用故申繒之禍顛覆宗周㐮公要秦遽興姜戎當春秋時義渠大荔居秦晋之域陸渾隂戎處伊雒之間鄋瞞之屬害及濟東侵入齊宋陵虐邢衛南夷北狄交侵中國不絶若綫齊桓攘之存亡繼絶北伐山戎以開燕路故仲尼稱管仲之力嘉左袵之功逮至春秋之末戰國方盛楚吞蠻氏晋弱陸渾趙武胡服開榆中之地秦雄咸陽滅義渠之等始皇之并天下也南兼百越北走匈奴五嶺長城戎卒億計雖師役煩殷冦賊横暴然一世之功戎虜奔却當時中國無復四夷也漢興而都長安關中之郡號曰三輔禹貢雍州宗周豐鎬之舊也及至王莾之敗赤眉因之西都荒毁百姓流亡建武中以馬援領隴西太守討叛羌徙其餘種於關中居馮翊河東空地而與華人雜處數嵗之後族類蕃息既恃其肥彊且苦漢人侵之永初之元騎都尉王𢎞使西域發調羌氐以為行衛於是羣羌奔駭互相扇動二州之戎一時俱發覆沒將守屠破城邑鄧隲之征棄甲委兵輿尸䘮師前後相繼諸戎遂熾至於南入蜀漢東掠趙魏唐突軹關侵其河内及遣北軍中侯宋寵將五營士於孟津距羌十年之中夷夏俱斃任尚馬賢僅乃克之此所以為害深重累年不定者雖繇禦者之無方將非其才亦豈不以冦發心腹害起肘腋疢篤難療瘡大遲愈之故哉自此之後餘燼不盡小有際會輙復侵叛馬賢狃􅏸終於覆敗段熲臨衝自西阻東雍州之戎常為國患中世之冦惟此為大漢末之亂關中殘滅魏興之初與蜀分隔疆場之戎一彼一此魏武皇帝令將軍夏侯妙才討叛氐阿貴千萬等後因㧞棄漢中遂徙武都之種於秦川欲以弱冦彊國扞禦蜀虜此葢權宜之計一時之勢非所以為萬世之利也今者當之已受其弊矣夫關中土沃物豐厥田上上加以涇渭之流溉其舄鹵鄭國白渠灌浸相通黍稷之饒畆號一鍾百姓謡詠其殷實帝王之都每以為居未聞戎狄宜在此土也非我族類其心必異戎狄志態不與華同而因其衰弊遷之畿服士庶翫習侮其輕弱使其怨恨之氣毒於骨髓至蕃育衆盛則坐生其心以其貪悍之性挾憤怒之情候隙乗便輙為横逆而居封域之内無障塞之隔掩不備之人收散野之積故能為禍滋蔓暴害不測此必然之勢已驗之事也當今之計宜及兵威方盛衆事未罷從馮翊北地新平安定界内諸羌著先零䍐开析支之地徙扶風始平京兆之氐出還隴右著隂平武都之界廪其道路之粮令足自致各附本種反其舊土使屬國撫夷就安集之戎晋不雜竝得其所上合徃古即叙之義下為盛世永乆之規縱有猾夏之心風塵之警則絶逺中國隔閡山河雖為冦暴所害不廣是以充國子明能以數萬之衆制群羌之命有征無戰全軍獨尅雖有謀謨深計廟勝逺圖豈不以華夷異處戎夏區别要害易定之故得成其功也哉難者曰方今關中之禍暴兵二載征戍之勞老師十萬水旱之害薦饑累荒疫癘之災扎差昏夭㐫逆既戮悔惡初附且欵且畏咸懷危懼百姓愁苦異人同慮望寧息之有期若枯旱之思雨露誠冝鎮之以安豫而子方欲作後起徒興功造事使疲悴之衆徙自猜之冦以無榖之人遷乏食之虜恐勢盡力屈緒業不卒羌戎離散心不可一前害未及弭而後變復横出矣荅曰羌戎狡猾擅相號署攻城野戰傷害牧守連兵聚衆載離寒暑矣而今異類瓦解同種土崩老㓜繫虜丁壯降散禽離獸迸不能相一子以此等為尚挾餘資悔惡反善懷我徳惠而來柔附乎將勢窮道盡智力俱困懼我兵誅以至於此乎曰無有餘力勢窮道盡故也然則我能制其短長之命而令其進退繇已矣夫樂其業者不易事安其居者無遷志方其自疑危懼畏怖促遽故可制以兵威使之左右無違也迨其死亡散離流逷未鳩關中之人戸皆為讎故可遐遷逺處令其心不懷土也夫聖賢之謀事也為之於未有理之於未亂道不著而平徳不顯而成其次則能轉禍為福因敗為功值困必濟遇否能通今予遭弊事之終而不圖更制之始愛易轍之勤而得覆車之軌何哉且關中之人百餘萬口率其少多戎狄居半處之與遷必湏口實若有窮乏糁粒不繼者故當傾關中之榖以全其生生之計必無擠於溝壑而不為侵掠之害也今我遷之傳食而至其種族自使相贍而秦地之人得其半榖此為濟行者以廩糧遺居者以積倉寛關中之逼去賊盗之原除旦夕之損建終年之益若憚蹔舉之小勞而忘永逸之𢎞䇿惜日月之煩苦而遺累世之冦敵非所為能開物成務創業垂統崇基拓跡謀及子孫者也并州之胡本實匈奴桀惡之冦也漢宣之世凍餒殘破國内五裂後合為二呼韓邪遂衰弱孤危不能自存阻塞下委質柔服建武中南單于復求降附遂令入塞居於漠南數世之後亦輙叛戾故何熈梁覲戎車屢征中平中以黄巾賊起發調其兵部衆不從而殺羌渠繇是於彌扶羅求助於漢以討其賊仍值世䘮亂遂乗釁而作鹵掠趙魏冦至河南建安中又使右賢王去卑誘質呼厨泉聼其部落散居六郡咸熈之際以一部太彊分為三率㤗始之初又増為四於是劉猛内叛連結外虜近者郝散之變發於榖逺今五部之衆戸至數萬人口之盛過於西戎然其天性驍勇弓馬便利倍於氐羌若有不虞風塵之慮則并州之域可為寒心榮陽句􅌐本居遼東塞外正始中幽州刺史母丘儉伐其叛者徙其餘種始徙之時戸落百數子孫孶息今以千計數世之後必至殷熾今百姓失職猶或忘叛犬馬肥充則有噬齧况於夷狄能不為變但顧其㣲弱勢力不停耳夫為邦者患不在貧而在不均憂不在寡而在不安以四海之廣士庶之冨豈湏夷虜在内然後取足哉此等皆可申諭發遣還其本域慰彼覊旅懷土之恩釋我華夏纎介之憂惠此中國以綏四方徳施永世於計為長帝不能用未及十年而夷狄亂華時人服其深識西凉李暠脩燉煌舊塞東西二圍以防北虜之患築燉煌舊塞西南二圍以威南虜後趙石季龍謀伐昌黎遣渡遼曹伏將青州之衆渡海戍蹋頓城無水而還因戍于海島運榖三百萬斛以給之又以船三百艘運榖三十萬斛詣髙句䴡後凉呂光時羣議以髙昌雖在西陲地居形勝外接胡虜易生翻覆冝遣子弟鎮之光以子覆為使持節鎮西將軍都督玉門已西諸軍事西域大都護鎮髙昌命大臣子弟隨之南齊太祖建元二年又置巴州以威靜之後魏眀元太常八年正月蠕蠕犯塞二月築長城自長川之南起自赤城西至五原延袤二千餘里備置戍衛太祖始光初詔問公卿赫連蠕蠕征討先後北平王長孫嵩平陽侯長孫翰司空奚斤等曰赫連屈丐未能為患蠕蠕世為邉害宜先討大檀及則收其畜産足以富國不及則校獵隂山多殺禽獸皮肉筋角以充軍實亦愈於破一小國太常崔浩曰大檀遷徙鳥逝疾追則不足經久大衆則不能及之赫連屈丐土宇不過千里其形性殘虐人神所棄冝先討之尚書劉潔武京侯安原請先平馮䟦帝黙然遂西廵狩延和元年六月庚寅車駕伐和龍詔尚書左僕射安原等屯于漢南以備蠕蠕大延二年八月詔廣平公張黎發定州七郡一萬二千人通沙泉道五年六月甲辰車駕西討沮渠牧犍侍中宜都王穆壽輔皇太子决留臺事大將軍長樂嵇敬輔國大將軍建寧王崇二萬人屯漢南以備蠕蠕太平真君五年帝蒐于河西詔司徒崔浩詣行在議軍事浩表曰昔漢武帝患匃奴彊盛故開凉州五郡通西域勸農積榖為滅賊之資東西迭擊故漢未疲而匈奴已弊後遂入朝昔平凉州臣愚以為北賊未平征役不息可不徙其民案前世故事計之長者若遷民人則土地空虚雖有鎮戎適可禦邉而已至於大舉軍資必乏陛下以此事濶逺竟不施用如臣愚意猶如前議募徙豪強大家充實凉土軍舉之日東西齊勢此計之得者六年八月徙諸種雜人五千餘家於北邉令人北徙畜牧至廣漢以餌蠕蠕七年五月發司幽定冀四州十萬人築城上塞圍起上谷西至河廣袤延千里九年十二月北討受降城不見蠕蠕因積糧城内留守而還孝文延興五年六月典赦京師死罪遣備蠕蠕太和中尚書中書監髙閭上表曰臣聞為國之道其要有五一曰文徳二曰武功三曰法度四曰防固五曰刑賞故逺人不服則脩文徳以來之荒狡放命則播武功以威之民未知戰則制法度以齊之暴敵輕侵則設防固以禦之臨事制勝則明刑賞以勸之用能闢國寧方征伐四尅北狄悍愚同於禽獸所長者野戰所短者攻城若以狄之所短奪其所長則雖衆不能成患雖來不能内逼又狄居野澤随逐水草戰則與家産並至奔則與畜牧俱逃不賫資粮而飲食自足是以古人伐北方攘其侵掠而已歴代為邊患者良以倐忽無常故也六鎮勢分部衆不鬪互相圍逼難以制之昔周命南仲城彼朔方趙靈秦始長城是築漢之孝武踵其前事此四代之君皆帝王之雄傑所以同此役者非智術之不長兵衆之不足乃防狄之要事其理宜然故也易稱天險不可升地險山川丘陵王公設險以守其國長城之謂歟今冝依六鎮之北築長城以禦北虜雖有暫勞之勤乃有永逸之益如其一成惠乃百世即於要害徃徃開門造小城於側因施却敵多置弓弩狄來有城可守有兵可捍既不攻城野掠無獲草盡則走終無往至宜發近州武勇四萬人及京師二萬人合六萬人為武士於苑内立征北大將軍府選忠勇有志幹者以充其選下置官屬分為三軍二萬人專習弓射二萬專習戈楯二萬專習騎矟脩立戰場十月一習採諸葛亮八陣之法為平地禦冦之方使其觧兵革之宜識旌旗之節兵器精堅必堪禦冦使將有定兵兵有當主上下相信晝夜如一七月發六郡兵萬人各備戎作之具勑臺北諸屯倉庫隨近往來俱送北鎮至八月征北部率所領與六鎮之兵直至磧南揚威漠北狄若來拒與之决戰若其不來然後散分其地以築長城計六鎮東西不過千里若一夫一月之功當三歩之地三百人三里三千人三十里三萬人三百里則千里之地彊弱相兼計十萬人一月必就餽糧一月不足為多人懐永逸勞而無怨計築長城其利有五罷游防之苦其利一也北部放牧無抄掠之患其利二也發城觀敵以逸待勞其利三也省境防之虞息無時之備其利四也嵗常游運永得不遣其利五也又任將之道特湏委信遂之以禮怒之以情閫外之事有利輙决赦其小過要其大功兵力資其給用君臣相軆若身之使臂然後忠勇可立制勝可果是以忠臣盡其心征將竭其力雖三敗而逾榮雖三背而彌寵詔曰覽表具卿安邉之策此當與卿面論一二帝又引見群臣議伐蠕蠕前後再擾朔邉近有投化人云𠡠勒渠帥興兵叛之蠕蠕主身率徒衆追至西漢今為應乗弊致討為應休兵息民左僕射穆亮對曰自古以來有國有家莫不以戎事為首蠕蠕子孫襲其凶業頻為冦擾為惡不悛自相違叛如臣愚見宜興軍討之雖不頓除巢宂且以挫其醜勢閭曰昔漢時天下一統故得窮追北狄今南有吳冦不宜懸軍深入帝曰先朝屡興征伐者以有未賔之虜朕承太平之基何為揺動兵革夫兵者㓙器聖人不得已而用之便可停也帝又曰今欲追蠕蠕使還應有書問以不得臣以為宜有乃詔閭為書於時蠕蠕國有䘮而書不叙㓙事帝曰卿為中書監職典文詞所造音書不論彼之㓙事若知而不作罪在灼然若情思不至應謝所在閭對曰昔蠕蠕主敦崇和親其子不遵父志屢犯邉境如臣愚見謂不宜弔帝曰敬其父則子悦敬其君則臣悦卿云不合弔慰是何言歟閭遂引愆免冠謝罪帝謂閭曰蠕蠕使牟提小心恭慎甚有使人之禮同行疾其敦厚每至凌辱恐其還化必被謗誣昔劉准使殷靈誕每下人不為非禮之事及其還國果被譛愬以致極刑今為㫖書可明牟提忠於其國使蠕蠕主知之宣武延昌三年十月庚辰詔驍騎將軍馬義舒喻蠕蠕孝明熈平中蠕蠕主醜奴遣使來朝抗敵國之書不脩臣敬朝議將依漢荅匈奴事遣使報之司農少卿張子倫表曰古之聖王彊理物土辨章要甸荒遐之俗政使不及故禮有壹見之文書著覊縻之事太祖以神武之姿聖明之略經啟帝圗日有不暇遂令豎子遊魂一方亦繇中國多虞急諸華而緩夷狄也髙祖光宅土中業隆不世赫雷霆之威震熊羆之旅方役南轅未遑北伐昔舊京烽起虜使在郊主上案劔璽書不出世宗運籌帷幄開境揚旌衣裳所及舟車萬里於時醜類送欵關上亦述遵遺志念大明臨朝澤及行葦國富兵強能言率職何憚而為之何求而行此徃日梁通敬求和以誠肅未絶抑而不許先帝棄戎於前陛下交夷於後無乃上乖髙祖之心下違世宗之意且虜雖慕徳亦來觀我懼之以強儻即歸附示之以弱窺覦或起春秋所謂以我卜也又小人難近夷狄無親踈之則怨狎之則侮其所繇來久矣是以髙祖世宗知其若此來既莫逆去又不追不一之義於是乎在必其委贄玉帛之辰屈膝藩方之禮則可豐其勞賄藉其珍物至於王人逺役衘命虜庭優以疋敵之尊加之相望之寵恐徒生虜慢無益聖朝假令選衆而舉使乎稱職資酈生之辯騁終軍之辭馮軾下齊長纓繫越茍異曩時猶為不願而况極之以隆崇申之以宴好臣雖下愚輙敢固執若事不獲已應出制詔示其上下之儀宰臣致書諷以歸順之道若聽受忠誨明我話言則萬乗之盛不失位於域中天子之聲必籠罩於無外脱或未從焉能損除舞干戚以招之敷文徳而懷逺如迷心不已或肆犬羊則當命辛李之將勒衛霍之師蕩定雲沙掃清逋孽飲馬瀚海之濵鏤石燕然之上開都䕶置戊己斯亦陛下之髙功不世之盛事如思案甲飬民務農安邉之術經國之防豈可以戎夷兼并而遽虧典制將取笑於當時貽醜於來葉昔文公請隧㐮后有言荆莊問鼎王孫是抑以古方今竊為陛下不取又陛下方欲禮神岷瀆致祀衡山登稽嶺窺蒼梧而反與邊徼之君酋渠之長結昆弟之懽抗分庭之義將何以瞰文命之景業迹重華之髙風者哉臣以為報使甚失如彼不報甚得如此願留湏臾之聼察愚臣之言不從正光四年二月己卯以蠕蠕主阿那瓌率衆犯塞遣尚書左丞元孚兼尚書為北道行臺持節喻之時帝以沃野􅀈薄骨律武川撫冝柔逺懐方禦夷諸鎮至改為州其郡縣戍各令淮古城邑詔河南尹􅐱道元持節兼黄門侍郎與都督李崇且置立裁减去留諸兵積粟以為邉偹東魏孝静帝興和元年六月以尚書左僕射司馬子如東北道行臺差選勇士前頴州刺史奚思業為河南大使簡發勇士北齊神武為東魏丞相武定元年八月於肆州北山築城西自馬陵成東至士隥四十日罷文宣帝天保元年受魏禪多所創革六坊之内徙者更加簡練毎一人必當百人任其臨陣必死然後取之謂之百保時鮮卑又簡羌人之勇力絶倫謂之勇士以備邉要三年十月乙未幸離石至黄櫨嶺仍起長城北至社于成百四餘里立三十六戍時揚裴為都水使者帝親御六軍北攘突厥仍詔裴監築長城作罷行南譙州事六年發夫一百八十萬人築長城自幽州北夏口西至恒州九百餘里七年十二月先是自西河總秦戍築長城東至於海前後所築東西凡三十餘里率十里一戍其要害置州鎮几二十五所八年於長城内築重城自渾雒扶而東至於塢紇戍凡四百餘里武成帝清河二年三月詔司空斛律光督氐營軍士築戍於軹關後主武平元年十二月詔左丞相斛律光出晋州道脩城戍後周宣帝大象初徴拜于翼為大司徒詔翼廵長城立亭障西自鴈門東至碣石創新改舊咸得其要害隋髙祖開皇元年四月發稽胡脩築長城二旬而罷又云開皇初遣司農少卿崔仲方發丁三萬于朔方靈武築長城東至黄河西距綏州南出勃嶺綿亘七百里明年帝復令仲方發丁十五萬於朔方已東緣邉險要築數十城以遏胡冦又黄門侍郎劉行本以党項羌宻邇封域最為難服上表劾其使者曰臣聞南蠻遵校尉之統西域仰都䕶之威比見西羌䑕竊狗盗不父不子無君無臣異類殊方於斯為下不悟覊縻之惠詎知含飬之㤙狼戾為心獨乖正朔使人近至請付推科帝竒其志二年十月癸酉皇太子勇屯兵咸陽以備胡十二月乙酉遣泌源公虞慶則屯𢎞化備胡六年二月丁亥發丁男十萬脩築長城二旬而罷七年二月發丁男十萬餘脩築長城二旬而罷日前周宣帝時突厥攝圖請婚于周帝遣長孫晟副汝南公宇文神慶送千金公主于其牙攝圗弟處羅侯號突利設尤得衆心而為攝圗所忌宻托心腹隂與晟盟晟與之逰因察山川形勢部衆強弱皆盡知之時髙祖作相晟以狀白髙祖髙祖大喜遷車都尉開皇元年攝圗曰我周家親也今隋公自立而不能制復何靣目見可賀敦乎因與寳寜攻䧟臨渝鎮約諸面部落謀共南侵髙祖新立繇是大懼脩築長城發兵屯北境命隂壽鎮幽州虞慶則鎮并州屯兵數萬人以為之偹晟先知攝圗玷厥阿波突利等叔侄兄弟各統強兵俱號可汗分居四靣内懐猜忌外示和同難以力征易可離間因上表髙祖大悦因召與語晟口陳形勢手畫山川冩其虚實皆如指掌帝深嗟異皆納用焉因遣大僕元暉出伊吾道使詣玷厥賜以狼頭纛謬為欽敬禮數甚優玷厥使表引居攝圗使上反間旣行果相猜貳晟車騎將軍出黄龍道齎幣賜奚霫契丹等遣為鄉導得至䖏羅侯所深布心腹誘令内附二年攝圖四十萬騎自蘭州入至于周盤破達奚長孺軍更欲南入玷厥不從引兵而去時晟亦説染干詐告攝圖曰鐵勒等反欲襲其牙攝圖乃懼回兵出塞七年攝圖死遣長孫晟持節拜其弟處羅侯為莫何可汗以其子雍閭為葉䕶可汗處羅侯因晟奏曰阿波為天所滅與五六千騎在山谷間伏聼詔㫖當取之以献乃召文武議焉安樂公元諧曰請就彼梟首以懲其惡武陽公李充曰請生將入朝顕戮以示百姓帝謂晟曰於卿何如晟對曰若突厥背誕湏齊之以刑今其昆弟自相夷滅阿波之惡非負國家因其困窮取而為戮恐非柔逺之道不如両存之帝曰善煬帝大業初右光禄大夫段文振以髙祖容納突厥啟民居于塞内妻以公主賞賜重疊及煬帝即位恩澤彌厚狼子野心恐為國患乃上表曰臣聞古者逺不間近夷不亂華周宣外攘戎狄秦帝築城萬里葢逺圖良筭弗可忘也竊見國家容納啟民資其兵食假以地利如臣愚計竊有未安何則夷狄之性無親而貪弱則歸投強則反噬葢其本心臣學非博覽不能逺見且聞晋朝劉曜梁代侯景近事之驗衆所共知以臣量之必為國患如臣之計以時喻遣令還塞外然後明設烽候緣邉鎮防務令嚴重此乃萬嵗之長策也又西域諸藩多至張掖與中國交市帝令吏部侍郎裴矩掌其事矩知帝方勤逺略諸商胡至者矩誘令言其國俗山川險易撰西域圖三卷入朝奏之帝大悦毎日引矩至御座親問西方之事矩盛言胡中多諸寳物吐谷渾易可并吞帝繇是甘心通西域四夷經略咸以委之遷黄門侍郎帝復令矩徃張掖引致西番至者十餘國後帝遣將軍薛世雄城伊吾令矩共徃經略矩諷諭西域諸國曰天子為番人交易懸逺所以城伊吾耳咸以為然不復來競及還賜錢四十萬三年七月丙子發丁男百餘萬築長城西拒榆林東至紫河二旬而罷死者十五六八月帝廵于塞北幸啟民帳時髙麗遣使先通于突厥啟民不敢隠引之見帝内使侍郎裴矩因奏狀曰髙麗之地本孤竹國也周代以之封于箕子漢世分為三郡晋氏亦統遼東今乃不臣别為外域故先帝疾焉欲征之乆矣但以楊諒不肖師出無功當陛下之時安得不事使此冠帶之境仍為蠻貊之鄉乎今其使者朝於突厥親見啟民合國從化必懼皇靈之逺暢慮後伏之先亡脅令自朝當可致也帝曰如何矩曰請面詔其使放還本國遣語其王令速朝覲不然者當率突厥即日誅之帝納焉其王髙元不用命始建征遼之策四年七月辛巳發丁男二十餘萬築長城自榆谷而東詔嵐州刺史衞𤣥監督之六年遣侍御史韋節召突厥處羅令與車駕㑹於大斗㧞谷其國人不從䖏羅謝使者辭以他故帝大怒無如之何適㑹其酋長射匱遣使來求婚黄門侍郎裴矩因奏曰䖏羅不朝恃強大耳臣請以計弱之分裂其國即易制也射匱者都六之子達頭之孫世為可汗君臨西面今聞其失職附𨽻於處羅故遣使來以結援耳願厚禮其使拜為大可汗則突厥分為両而從我矣帝曰公言是也因遣裴矩朝夕至舘㣲諷諭之帝於仁風殿召其使者言䖏羅不順之意稱射匱有好心吾立為大可汗令發兵誅䖏羅然後當為婚也帝取桃竹白羽箭一枝以賜射匱因謂之曰此重宜速疾如箭也使者返路經處羅處羅愛箭將留之使者譎而得免射匱聞而大喜興兵襲處羅處羅大敗棄妻子將左右數千騎東走在路又被刼掠遁於髙昌東保時羅漫山髙昌王麴伯雅上狀帝遣裝矩將向氏親要左右馳至玉門關晋昌城矩遣向氏使詣處羅所諭朝廷𢎞飬之義丁寧曉諭之遂入朝然毎有怏怏之色又云裴矩縱反間於突厥酋長射匱使潜攻處羅後處羅為射匱所逼竟隨使者入朝帝甚悦賜矩貂裘及西域珍異十一年八月帝至鴈門為突厥所圍内史侍郎蕭瑀進謀曰如聞始畢託較獵至此義成公主初不知其有違背之心且北番夷俗可賀敦知兵馬事昔漢髙祖解平城乃是閼氏之力况義成以帝女為妻必恃大國之援若發一軍使以告義成假使無益事亦無損臣又切聴輿人之誦乃慮陛下平突厥後更事遼東所以人心不一或致挫敗請下明詔告軍中赦髙麗而專攻突厥則百姓心安人自為戰煬帝從之於是發使詣可賀敦即義成公主也諭㫖俄而突厥解圍去於後獲其諜人云義成主遣使告急於始畢稱北方有警繇是突厥解圍葢義成主之助也帝又將伐遼東謂群臣曰突厥狂悖為冦勢何能為以其少時未敢蕭瑀遂相恐動情不可恕因出為河池郡守唐髙祖武徳初以豐州絶逺先屬突厥交相徃來吏不能禁隠太子建成議廢豐州虛其城郭權徙百姓寄居于靈州割并五原榆平之地於是突厥遣處羅之子都射設率所部萬餘家入處河南之地以靈州為境二年二月癸酉令州縣脩治堡同以偹胡三年七月甲戍遣皇太子建成鎮蒲州以備胡四年正月辛巳詔曰稽胡部類居近北邉習悪之徒未悉從化潜竄山谷切懐首鼠冦抄居民侵擾守候可令太子建成揔統諸軍以時致討分命驍勇方軌齊驅跨谷彌山窮其巢穴元惡大憝即就誅夷驅略之民復其本業行軍節度期會進止皆委建成處分五年六月辛亥劉黒闥引宊厥之衆冦山東遣車騎將軍元韶為𤓰州道行軍搃管以偹邉八月甲戍吐谷渾冦岷州總管李長卿拒之反為所敗遣益州行臺右僕射竇軌滑州刺史且雒生援之乙卯突厥頡利可汗冦邉遣左武將軍段徳操雲州管李和等率兵以拒之丙辰頡利可汗率騎十五萬人入鴈門巳未突厥進冦并州以左監門將軍李勣為齊州總管太子左衞率藺謩為亳州搃管驃騎將軍張徳政為鄆州搃管庚申皇太子建成出幽州道命太宗出秦州道以禦之突厥冦原州又令雲州總管李子和兵越雲中以掩可汗左武衞將軍段徳操趍夏州邀其歸路辛酉帝謂群臣曰突厥入冦而復請和和之與戰其䇿安在太常卿鄭元璹對曰若擊之則怨深難以和緝中書令封徳彛進曰若不戰而和夷狄必謂中國畏懼未若擊之尅㨗而後和親此則威恩兼舉帝然之戊辰吐谷渾䧟洮州還武州刺史賀㧞亮防禦之六年七月癸未突厥冦原州乙酉冦朔州右武侯大將軍李髙遷不能禦率衆而遁為賊所敗行軍總管尉遅敬徳率師援之七年六月遣邉州修堡城警烽候以備胡八年正月己酉帝與羣臣言備邉之事將作大匠于筠進曰未若多造舩艦於五原靈武置舟師於黄河之中足以斷其八冦之中路中書侍郎温彦博又進曰昔魏文帝掘長塹以遏匈奴亦因循其事帝並從之於是遣將軍桑顯和塹斷北邉要路又徵江南習水之士更發卒於靈州造戰船五月己酉帝謂羣臣曰名實之間理湏相副髙麗稱臣於隋始拒煬帝此亦何臣之有朕敬於萬物不欲驕貴但據此土宇務共安民何必令其稱臣以自尊大可為詔述朕此懐也侍中裴矩中書侍郎温彦博進對曰遼東之地周為箕子之國漢家之𤣥莵郡耳魏晉前立於提封之内不可許以不臣若與髙麗抗禮四夷必當輕漢且中國之於四夷猶太陽之與列星理無降尊俯同藩服帝乃止初帝以天下大定將偃武事遂罷十二軍大敷文徳至是突厥頻為冦掠帝志在㓕之復置十二軍以太常卿竇誕為叅旗將軍吏部尚書楊恭仁為鼓旗將軍淮安王神通為𤣥戈將軍右驍衛將軍劉𢎞基為井鉞將軍又衞大將軍張瑾為羽林將軍左驍衛大將軍長孫順徳為竒官將軍右監門將軍樊世興為天節將軍右武侯將軍安脩仁為招揺將軍右監門衞大將軍楊毛為折威將軍左武侯將軍王長諧為天紀將軍岐州刺史柴紹為平道將軍錢九隴為苑㳺將軍簡練士馬將圖大舉焉六月丙子遣燕郡王李藝屯兵於華亭縣及彈筝硤水部郎中姜行本築斷石嶺之道以備胡七月甲辰帝謂侍臣曰徃以中原未定突厥方強吾慮其擾邉禮同敵國今既包藏禍心不顧盟誓方為攻取之計無容更事姑息其後書改為勅詔乙酉頡利可汗冦相州叛胡睦伽陁攻武興丙辰代州都督藺謩與突厥戰於新城不能尅復命行軍總管張瑾與突厥戰于大谷丁巳命秦王出蒲州以備胡冦八月壬戍突厥踰石嶺冦并州癸亥突厥冦靈州丁卯突厥冦潞泌韓三州左武衞將軍安修仁擊胡睦伽陁於旦渠州破之遣李靖出潞州道又令行軍總管任環屯太行九月癸丑突厥冦藺州十月壬申吐谷渾冦疊州遣扶州刺史蔣善合師援之戊寅突厥冦鄯州霍國公柴紹帥師援之九月正月辛亥突厥聲言入冦勑州縣修城堡謹烽候二月丁亥突厥冦原州遣折威將軍楊毛擊之又徵兵屯于太谷遣秦王及皇太子建成勒兵以備胡後竟不行六月丁巳突厥數萬騎圍烏城遣齊王元吉右武衞大將軍李藝天紀將軍張瑾率兵援之辛未突厥冦渭州遣左衞將軍柴紹率兵禦之册府元龜卷九百九十
