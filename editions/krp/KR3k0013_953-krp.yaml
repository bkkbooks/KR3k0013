body:
  text: 册府元龜卷九百五十三宋王欽若等撰總録部傷感不遇困辱傷感禀於命而静者人之性感於物而動者性之欲故所感者深則悲憤之氣應而噍殺之聲作矣觸類而長其徒實繁若乃周覽故墟追懐古道惜賢者之轗軻痛嘉㑹之齟齬思色養而親不待冀忠事而君靡察以至流離世故契闊家難惨袪遠别之始覩物舊游之地莫不含酸茹恨託辭流詠潺湲而出涕慷慨以興歎斯亦志士仁人之所爲者已周箕子武王時以商太師封扵朝鮮而不臣其後箕子朝周過故殷墟城毁壊生禾黍箕子傷之欲哭則不可欲泣爲其近婦人乃爲麥秀之詩以歌詠之孔子爲魯大夫與於蜡賓蜡者索也嵗十二月合聚萬物而索享之亦祭宗廟時孔子仕魯在助祭之中事畢出㳺扵觀之上喟然而歎觀闕也孔子見魯君扵祭禮有不備於此又觀象魏舊章之䖏感而歎之仲尼之歎盖歎魯也言偃在側曰君子何歎言偃孔子弟子子游孔子曰大道之行也與三代之英丘未之逮也而有志焉大道謂五帝時也英俊選之尤者逮及也言不及見志謂識古文不言魯事為其大功廣言之又伯牛有疾伯牛弟子冉耕子問之自牖執其手牛有惡疾不欲見人故孔子従牖執其手曰亡之命矣夫斯人也而有斯疾也斯人也而有斯疾也再言之者痛惜之甚孔子又曰鳳鳥不至河不出圖吾已矣夫聖人受命河出圖今天無此瑞吾已矣夫者傷其不得見也河圖八卦是也顔淵死子曰噫天喪予子路死子曰天祝予祝斷也天生顔淵子路為夫子輔佐皆死者天将亡夫子之證西狩獲麟孔子曰吾道窮矣加姓者重終也麟者太平之符聖人之類時得麟而死此亦天告夫子将沒之徵故悲之耳又曰孰爲来哉孰爲来哉反袂拭面涕霑袍又孔子蚤作作起也負手曵杖消揺於門欲人之怪已歌曰㤗山其頺乎㤗山衆山所仰梁木其壊乎梁木衆木所放哲人其萎乎哲人亦衆人所仰放也以上二句喻之萎病也詩云無木不萎既歌而入當戸而坐蚤坐急見人也子貢聞之曰㤗山其頺則吾将安仰梁木其壊哲人其萎則吾将安放夫子殆将病也覺孔子歌意殆㡬也遂趨而入夫子曰賜爾来何遲也坐則望之夏后氏殯於東階之上則猶在阼也殷人殯扵兩楹之間則與賓主夹之也周人殯扵西階之上則猶賓之也以三王之禮占巳夢而丘也殷人也予疇昔之夜夢坐奠扵兩楹之間是夢坐兩楹之間而見饋食也言奠者以為凶象疇發聲也昔猶前也夫眀王不興而天下其孰䏻宗予予殆将死也孰誰也宗尊也兩楹之間南面郷眀人君聽治正坐之處今無眀王誰䏻尊我以爲人君乎是我殷家奠殯之象以此自知将死盖寝疾七日而沒眀聖人知命臯魚不知何許人也孔子行聞哭聲甚悲孔子曰驅之前有賢者至則臯魚也被褐擁鎌哭于道傍孔子避車而與之言曰子非有喪何哭悲也臯魚曰吾失之三也少而好學周流諸侯以後吾親失之一也髙吾志簡吾事不事庸君失之二也少擇交㳺寡扵親友老而無托失之三也樹欲静而風不止子欲養而親不待往而不可追者年也去而不可見者親也吾請從此辭矣立槁而死吴起仕魏爲西河守治西河之外王錯譛扵魏武侯使人召之起至扵岸門岸門邑名止車而望西河泣數行而下其僕謂起曰竊觀公之意視舍天下若舍屣今去西河而泣何也起雪泣應之曰子不識也君始知我而使我畢能秦必可亡西河可以王今君聽讒人之言而不知我西河之為秦不久矣魏國從此削乎起果去入楚有間西河入秦漢賈誼雒陽人楚屈原沉汨羅後百有餘年誼爲長沙王太傅過湘水投書以弔屈原司馬遷爲太史令遷曰余讀離騷天問招魂哀郢悲其志適長沙觀屈原所自沉淵未嘗不垂涕想見其爲人李陵爲騎都尉降匃奴昭帝時蘇武歸漢陵與武别置酒起舞歌曰徑萬里兮渡沙漠為君将兮奮匃奴路窮絶兮矢刅摧士衆滅兮名已頺老母已死雖欲報恩将安歸陵泣下數行因與武訣揚雄蜀郡成都人少而好學雄怪屈原文過相如至不容作離騷自投江而死悲其文讀之未嘗不流涕也後至侍郎劉向本名更生元帝時為給事中宦者石顯誣譛大中大夫給事中張猛令自殺扵公車更生傷之乃著疾讒擿要救危及世頌凡八篇擿謂指發之也依興古事悼已及同類也興謂比喻也後漢梁竦字叔敬兄松為太僕免官懐怨望飛書誹謗下獄死竦坐松事與弟恭俱徙九真既徂南土歴江湖濟沅湘感悼子胥屈原以非辜沉身乃作悼騷賦繋𤣥石而沉之楊終蜀郡成都人永平中為校書郎坐事徙扵北地望松縣而母扵蜀物故終自傷被罪充邊乃作晨風之詩以舒其憤也許慶字子伯家貧爲郡督郵慶嘗與友人談論漢無統嗣幸臣専執世俗衰薄賢者放退慨然據地悲哭時稱許子伯哭世蜀廖理救切立為長水校尉諸葛亮表立疵毁衆臣廢立為民徙汶山郡躬率妻子耕植自守聞諸葛亮卒垂涕歎曰吾終為左衽矣李平本名嚴為前将軍建興九年諸葛亮軍祁山平督運事運糧不繼平遣叅軍狐忠喻指呼亮来還亮承以退軍平聞軍退乃更陽驚說糧饒足何以便歸欲以解已不辦之責顯亮不進之愆也亮表廢平為民徙梓潼郡十二年平聞亮卒發病死平嘗望亮當自補復策後人不能故以激憤也晉嵇康仕魏為中散大夫恬静寡欲寛簡有大量與吕安友善後安爲兄所枉訴以事繋獄辭相證引遂復收康康性慎言行一旦縲紲乃作幽憤詩後将刑東市太學生三千人請以爲師弗許康顧視日影索琴彈之曰昔袁孝尼嘗従吾學廣陵散吾每靳與之廣陵散扵今絶矣時年四十海内之士莫不痛之帝尋悟而恨焉阮籍為歩兵校尉任性不覊時率意獨駕不繇徑路車迹所窮輙痛哭而反嘗登廣武觀楚漢戰䖏歎曰時無英雄使竪子成名登武牢山望京邑而嘆扵是賦豪傑詩王戎為司徒嘗經黄公酒壚下過顧謂後車客曰昔魏嵇叔夜阮嗣宗酣暢扵此竹林之遊亦預其末自嵇阮云亡吾便爲時之所覊紲今日視之雖近邈若山河庾敳字子嵩爲陳留相永嘉末見王室多難終知嬰禍乃著鷾賦以豁情猶賈誼之鵩鳥也周顗字伯仁元帝鎮江左請爲軍諮祭酒王導初過江每至暇日與人士相要出新亭飲宴顗中坐而歎曰風景不殊舉目有江河之異衆皆相視流涕羊祜鎮荆州祜樂山水每風景必造峴山置酒言詠終日不倦嘗慨然歎息顧謂從事中郎鄒湛等曰自有宇宙便有此山繇来賢達勝士登此遠望如我與卿者多矣皆湮滅無聞使人悲傷如百嵗後有知魂魄猶應登此也湛曰公徳冠四海道嗣前哲令聞令望必與此山俱𫝊至若湛軰乃當如公言爾愍懐太子既爲賈后所害其後立愍懐太子子臧爲太孫之東宫太孫自西掖門出車服侍從皆愍懐之舊也到銅駝街宫人哭侍從者皆哽咽路人收泪焉王承爲東海太守尋去官東渡江既至下邳登山北望歎曰人言愁我始欲愁矣殷浩爲中軍将軍以軍亂廢爲庶人徙扵信安縣浩甥韓伯浩素賞愛之隨至徙所經嵗還都浩送至渚側詠曹顏遠詩曰富貴他人合貧賤親戚離因而泣下羊曇太山人知名士也爲謝安所愛重安薨後輟樂彌年行不繇西州路嘗因石頭大醉扶歸唱樂不覺至州門左右白之曰此西州門曇悲感不已以馬䇿扣扉誦曹子建詩曰生存華屋處零落歸山丘因慟哭而去習鑿齒爲大司馬桓温别駕忤温㫖左遷戸曹叅軍初鑿齒與其二舅羅崇羅友俱爲州從事及遷别駕以坐越舅右屢經陳請温後激怒既盛乃超㧞其二舅相繼為襄陽都督出鑿齒為滎陽太守温弟秘亦有才氣素與鑿齒相親善鑿齒既罷郡歸與秘書曰吾以去五月三日達襄陽觸目悲感畧無歡情痛惻之事故非書言所能具也每定省家舅從北門入西望隆中想臥龍之吟東眺白沙思鳳雛之聲北臨樊墟存鄧老之髙南眷城邑懐羊公之風縱目檀溪念崔徐之友肆睇魚梁追二徳之逺未嘗不徘徊移日惆悵極多撫乘躊躇慨爾而泣曰若乃魏武之所置酒孫堅之所隕斃裴杜之故居繁王之舊宅遺事猶存星列滿目璅璅常流碌碌凡士焉足以感其方寸哉夫芬芳起扵椒蘭清響生扵琳琅命世而作佐者必垂可大之餘風髙尚而邁徳者必有眀勝之遺事若向八君子者千載猶使我想其為人况相去之不逺乎彼一時也此一時也焉知今日之才不如疇辰百年之後吾與足下不並為景升乎其風期俊邁如此桓溫爲征討大都督自江陵北伐行經金城見少爲瑯琊時所種栁皆已十圍慨然曰木猶如此人何以堪攀枝執條泫然流涕後趙石韜季龍子也封秦公韜素知天文覩黄黒雲貫日惡之顧謂左右曰此變不卜當有刺客起扵京師不知誰實當之是夜韜讌其僚属扵東觀樂奏酒酣愀然長歎曰人居世無常别易㑹難各付一杯開意為吾飲令必醉知後㑹復何期而不飲乎因泫然流涕左右莫不歔欷宋毛脩之爲安西司馬沒于後魏爲尚書後朱脩之繼沒亦爲太武所寵脩之相得甚懽問脩之南國當權者爲誰脩之答曰殷景仁脩之笑曰吾昔在南殷尚㓜我得歸罪之日便應巾鞲到門耶經年不忍問家消息久之乃訊訪脩之具答并云賢子亢矯甚䏻自處爲時人所稱脩之悲不得言直視良久乃長歎曰嗚呼自此一不復反沈璞為旴𣅿太守元嘉三十年元凶之立璞乃號泣曰一門蒙殊常之恩而逄若斯之運悠悠上天此何人哉日夜憂歎以至動疾㑹元凶逼令送老弱還都璞性篤孝尋聞尊老應幽執輙哽咽不自勝梁沈約初仕齊爲文恵太子家令武帝時為尚書令領太子少傅嘗侍讌有奴婢師是齊文恵宫人帝問識座中客不曰惟識沈家令約伏座流涕帝亦悲焉爲之罷酒何裔累遷左民尚書後辭職去初何氏過江自晉司空充並葬吳西山裔家世年皆不永惟祖尚之至七十二裔居扵秦望山年登祖夀乃移還吴作别山詩一首言甚悽愴陳江總為尚書僕射與鄱陽王伯山長子君範友善國亡君範與宗室王侯從後主入闗至長安隋文帝並配扵隴右及河西諸州各給田業以䖏之至是總贈範書五言詩以叙他鄉離别之意辭甚酸切當世文士咸諷誦之後魏劉昶宋文帝之子也前廢帝子業立懼禍来奔尚平陽長公主拜侍中昶陳奏本國事故語及征役則皆歛容涕泗悲動左右後太和中孝文遣諸将南征路經徐州哭拜母墓舊堂哀感從者乃遍循故居處隕涕左右亦莫不辛酸及至軍所将欲臨陣四面拜諸将士自陳家國滅亡䝉朝廷慈覆辭理切至聲氣激揚涕泗横流三軍感歎太和十七年春孝文臨經武殿大議南伐語及劉蕭簒奪之事昶毎悲涕不已因奏曰本朝淪喪艱毒備罹冀恃國靈釋臣私恥頓首拜謝孝文亦為之流涕禮之彌崇蕭綜梁武帝之子也梁封豫章王自徐州奔魏不得志嘗作聽鳴鍾悲落葉辭以申其志當時見者莫不悲之董紹為賀㧞岳開府諮議叅軍永熈中岳携紹髙平牧馬紹悲而賦詩曰走馬山之阿渴飲出黄河寜謂胡闗下復聞楚客歌後爲宇文黒獺所殺元暉業景皇帝之𤣥孫孝静帝時以時運漸謝不欲圗全又嘗賦詩云昔居王道泰濟濟富羣英今逄世路阻狐兎鬱縦横宋道璵爲京兆王愉法曹行叅軍愉反逼道璵為官臨死作詩及挽歌詞寄之親朋以見怨痛道璵又曽贈著作佐郎張始均詩其末章云子深懐璧憂余有當門病道璵既不免難始均亦遇世禍時咸怪之北齊廣寜王孝珩國亡至長安為開府縣侯後周武帝在雲陽宴齊君臣自彈胡琵琶命孝珩吹笛辭曰亡國之音不足聽也固命之舉笛裁至口淚下嗚咽武帝乃止後周薛憕夲河東汾隂人也文帝即位初拜中書侍郎自以流離世故不聽音樂雖幽室獨䖏嘗有戚容隋爾朱敞榮之族子也齊神武盡誅爾朱氏敞小隨母養宫中年十二自竇中走因詐為道士變姓名隐嵩山畧渉經史數年之間人頗異之獨坐巖石之下泫然而嘆曰吾豈終扵此乎伍子胥獨何人也遂西歸扵周後至徐州總管裴肅仕周為御正下大夫屬髙祖為丞相肅聞而嘆曰武帝以雄才定六合墳土未乾而一朝遷革天道歟髙祖聞之甚不恱繇是廢扵家常得志京兆人博學善屬文官至秦王記室及王薨過故宫爲五言詩辭理悲壮甚為時人所重盧思道為太子舍人司徒録事每居官多被辱後免歸于家嘗扵薊北悵然感慨為五言詩以見意人以爲工庾自直大業中知起居舍人事化及作逆以之北上自載露車中感激發病卒唐唐衢鄭人應進士久而不第能爲歌詩意多感發見人文章有所傷嘆者讀訖必哭涕泗不能已毎與人言論既相别發聲一號音詞哀切聞之者莫不悽然泣下嘗客遊太原屬戎帥軍宴衢得預㑹酒酣言事抗音而哭一席不樂為之罷㑹故世稱唐衢善哭終不登一命而卒後唐馬郁在莊皇幕寄寓他土年老思鄉每對莊宗歔欷言家在范陽乞骸歸國以塟舊山莊宗謂之曰自卿去國已来同舍孰在守光尚不能容父能容卿乎孤不惜卿行卿不得死爾郁既無歸路衷懐嗚悒竟卒扵太原晉趙瑩為中書令虜陥京城虜主遷少帝扵北塞瑩與馮玉李彦韜俱從契丹永康王代立偽授瑩太子太保周廣順初遣尚書左丞田敏報命于契丹遇瑩於幽州瑩得見華人悲悵不已謂田敏曰老身漂零寄命扵此近聞室家喪逝弱子無恙䝉中朝皇帝倍加存恤東京舊第本屬公家亦聞優恩特給善價老夫至死無以報效扵是南望稽首涕泗横流不遇春秋之際禮樂喪壊列國争覇賢者不遇故宣父之言曰鳳鳥不至河圖不出吾已矣夫葢困扵歷聘不得行其道也若乃望庶㡬而出晝謂濡滯而見譏初學少年被毁扵豪貴不脩威儀多爲於排抵矧復坐衣冠之不整為饑寒之所斃者哉孔子適齊齊景公欲見孔子不問其禮異日景公止孔子曰奉子以季氏吾不能以季孟之間待之魯三卿季氏為上卿最貴孟氏為下卿不用事言待之以二者之間齊大夫欲害孔子孔子聞之景公曰吾老矣不能用也孔子遂行以聖道難成故云吾老不能用孔子去陳適衛衛靈公老怠於政不用孔子孔子喟然嘆曰茍有用我者期月已可三年有成言誠有用我扵政事者期月而可以行其政教必三年乃有成又靈公問陣於孔子軍陣行列之法孔子對曰爼豆之事則嘗聞之矣爼豆禮器軍旅之事未之學也萬二千五百人為軍五百人為旅軍旅末事本未立不可以教末事又公山不狃以費畔季氏使人召孔子孔子循道彌久温温無所試莫能已用曰盖周文武起豐鎬而王今費雖小儻庶㡬乎欲往子路不恱止孔子孔子曰夫召我者豈徒哉如用我其爲東周乎興周道扵東方故曰東周然亦卒不行孟軻鄒人也受業子思之門人道既通游事齊宣王宣王不能用適梁惠王不果所言則見以爲迂遠而闊於事情後去齊尹士語人曰不識王之不可以為湯武則是不眀也識其不可然且至則是干澤也千里而見王不遇故去三宿而後出晝晝齊西南近邑是何濡滯也士則茲不恱尹士齊人也干求也澤禄也尹士與論者言之云孟子不知則為求禄濡滯久也既去近留扵晝三日怪其淹久故云士扵此事不恱者髙子以告髙子亦齊人孟子弟子以尹士之言告孟子曰夫尹士安知予哉千里而見王是予所欲也不遇故去豈予所欲哉予不得已也孟子曰夫尹士安能知我哉我不得已而去爾何汲汲而驅馳予三宿而出晝於予心猶以爲速王庶㡬改之王如改諸則必反予我自謂行速疾矣冀王庶㡬䏻改復招還我矣夫出晝而不予追也予然後浩然有歸志漢馮唐景帝時為楚相武帝即位求賢良舉唐時年九十餘不䏻官乃以子遂為郎賈誼年少頗通諸家之書文帝召以為博士時諸法令所更定及列侯就國其説皆誼發之於是帝議以誼任公卿之位絳灌東陽侯馮敬之屬盡害絳周勃也灌灌嬰也東陽侯張相如也馮敬時為御史大夫乃毁誼曰雒陽之人年少初學専欲擅權紛亂諸事扵是天子後亦疎之不用其議以誼為長沙王太傅後漢桓譚沛國相人也簡易不修威儀而喜非毁俗儒繇是多見排抵哀平間位不過郎光武即位徵待詔上書言事失㫖不用其後㑹議臺所處帝謂譚曰吾欲䜟决之如何譚黙然良久曰臣不讀䜟復極言䜟之非經帝大怒出為六安郡丞道病卒馮衍京兆杜陵人也為曲陽令誅斬劇賊郭勝等降五千餘人論功當封以讒毁故賞不行建武六年日食衍上書陳八事書奏帝将召見初衍為狼孟長以罪摧䧟大姓令狐畧是時畧為司空長史讒之扵尚書令王䕶尚書周生豐曰衍所以求見者欲毁君也䕶等懼之即共排間衍遂不得入晉王沉字彦伯髙平人也少有俊才出扵寒素不能隨俗沉浮為時豪所抑仕郡文學掾鬱鬱不得志乃作釋時論是時王政陵遲官才失實君子多退而窮處遂終于里閭任旭為郎中州郡舉中正固辭歸家元帝中興遣公車徵會遭母憂扵時司空王導唘立學校選天下眀經之士旭與㑹稽虞喜俱以隐學被召事未行㑹有王敦之難尋而事遂寝眀帝即位又徵拜給事中旭稱疾篤經年不到尚書以稽留除名僕射荀崧議以為不可大寕末眀帝復下詔備禮徵旭始下而止咸和二年卒太守馮懐上疏謂宜贈九列值蘇峻作亂事竟不行梁張齊字子享馮翊都人世居横桑或云横桑人也少有膽氣初事荆府司馬常歴生厯生酗酒遇下嚴酷不甚禮之厯生罷官歸吳郡後魏沈嵩依宋王劉昶昶遇之無禮憂愧饑寒未㡬而卒隋敬釗為繁畤令漢王諒據并州反釗不從爲賊所䧟釗抗節不撓大業三年煬帝避暑汾陽宫代州長史栁詮司馬崔保山上其狀付司將加褒賞㑹虞世基奏格而止孫萬夀髙祖時為滕穆王文學坐衣冠不整又為宇文述典軍書鬰鬰不得志後歸鄉里十餘年不得調仁壽初徵拜豫章王長史非其好也王轉封於齊即為齊王文學當時諸王官屬多被夷滅繇是彌不自安因謝病免為五言詩贈京邑知友詩成至京盛為當時之所吟誦天下好事者書壁而翫之唐杜甫本襄陽人也爲右拾遺房琯罷相甫上疏言琯有才不宜罷免肅宗怒貶琯為刺史出甫爲華州司功参軍時闗畿亂離榖食踴貴甫寓居成州同谷縣自負薪採樵兒女餓莩者數人久之後依嚴武扵成都武卒郭英乂代武鎮成都英乂武人麄暴無能刺謁乃遊東蜀依髙適既至而適卒及蜀中大亂甫以其家避難荆楚扁舟下峡未維舟而江陵亂因游衡山寓居耒陽卒崔敬嗣好樗蒲飲酒則天初為房州刺史中宗為廬陵王安置在州官吏多無禮敬嗣獨申禮敬又供給豐贍中宗嘗徳之及登位有益州長史崔敬嗣既同姓名每進擬官皆御筆超拜之者數四後引與語知誤訪敬嗣已卒乃遣中書令韋安石授其子官趙驊為倉部郎中早擅髙名在宦途五十年累經貶謫蹇躓備至入仕三十年方霑省官身在郎署出常徒步官既多在𣪚曹俸禄單寡衣食不充識者為之歎息徳宗建中四年涇原兵叛驊竄于山谷尋以疾終贈華州刺史後唐司空頲貝州青陽人舉進士不第退之中條山依司空圗圖以宗姓指授為文刀尺薦托扵朝屬三輔大亂乃還郷里竇受徴初登進士第謁孔勍扵襄州䖏之賓席然薄於禮遇無正䘖鬱鬱不得志無㡬離職困辱夫鷙獸罹乎網罟則不䏻奮攫噬之威應龍潜于汚潢則不䏻效神靈之用乃有負王覇之畧躬眀哲之屬命不我與時無已知困於石而若愚辱在塗而無告阽危顛躓殆無所容及夫遇眀哲之君丁好賢之世奮庸廊廟之上預議搢紳之列銘勲於鍾鼎垂譽扵簡册則蹇剝之患庸何傷乎是知處困而亨先賤後貴者士君子之常也管仲字夷吾齊大夫也初與子紏奔魯齊桓公之入齊也使鮑叔為宰鮑叔曰臣不若管夷吾桓公使請諸魯如鮑叔之言莊公以問施伯伯對曰此非欲戮之也欲用其為政也夫管子天下之才也才冠天下所在之國則必得志扵天下今彼在齊則必長為魯國患矣荘公曰若何施伯對曰殺而以其屍授之授與齊使荘公将殺管仲齊使者請曰寡君欲親以為戮欲得生自戮之以逞射已之忿若不生得以戮扵羣臣猶未得請也猶未得所請請生之於是莊公使束縳以予齊使齊使受之而退比至三釁三沐之董叔晉大夫也将娶扵范氏叔向曰范氏富盍已乎曰欲為繫援焉他日董祁愬之于范獻子曰不吾敬也獻子執而維扵庭之槐叔向過之曰子盍為我請乎叔向曰求繫既繫矣求援既援矣欲而得之又何請焉張儀者魏人也吕氏春秋曰儀魏氏餘子始嘗與蘇秦俱事鬼谷先生學術秦自以不及儀而學成㳺說諸侯嘗從楚相飲已而楚相亡璧門下意張儀曰儀貧無行必此盜相君之璧共執儀掠笞數百不服醳音釋之其妻曰嘻子毋讀書遊說安得此辱乎儀謂其妻曰視吾舌尚在不其妻笑曰舌在也儀曰是矣孔伋魯人字子思嘗困扵宋范雎者魏人也字叔游說諸侯欲事魏王家貧無以自資乃先事魏中大夫須賈賈為魏昭王使於齊范睢從留數月未得報齊襄王聞睢辯口乃使人賜雎金十斤及牛酒雎辭謝不敢受須賈知之大怒以爲睢持魏國隂事告齊故得此饋令睢受其牛酒還其金既歸心怒睢以告魏相魏之諸公子曰魏齊魏齊大怒使舍人笞擊睢折脅摺齒睢佯死即卷以簀置厠中賓客飲者醉更溺睢故僇辱以懲後令無妄言者睢從簀中謂守者曰公能出我我必厚謝公守者乃請出棄簀中死人魏齊醉曰可矣范睢得出漢韓信淮隂人家貧無行不得推擇為吏又不能治生為商賈從下鄉南昌亭長妻苦之苦厭也乃晨炊蓐食未起而床蓐中食食時信往不為具食信亦知意自絶去淮隂少年又侮信曰雖長大好帶刀劎怯爾衆辱信曰能死刺我不䏻出跨下於是信熟視俛出跨下一市皆笑信以以為怯季布楚中人也項籍使将兵數窘漢王項籍滅髙祖購求布千金敢有舍匿罪三族布匿濮陽周氏周氏曰漢求将軍急廹且至臣家䏻聽臣臣敢進計即否願先自剄布許之乃髠鉗布衣褐置廣栁車中廣栁車喪車也并與其家僮數十人之魯朱家賣之朱家魯人後至河東太守後漢度尚山陽湖陸人也家貧不修學行不為郷里所推舉積困窮乃為宦者同郡侯覧視田得為郡上計吏後至荆州刺史李充陳㽜人家貧立精舍講授太守魯平請署功曹不就平怒乃援充以捐溝中因讁署縣都亭長不得已起親職役後至侍中蜀張裔為司金中郎将典作農戰之器先是益州郡殺太守正昻耆率雍闓恩信著於南士使命周旋逺通吴大帝乃以裔為益州郡太守徑往至郡闓遂趦趄不賔假鬼教曰張府君如瓠壺外雖澤而内實麄不足殺令縳與吳於是遂送裔扵吴彭羕字永年仕州不過書佐後又為衆人所謗毁於州牧劉璋璋髠鉗羕為徒𨽻後至江陽太守晉王育字伯春京兆人也少孤貧為人傭牧羊每過小學必歔欷流涕時有暇即折蒲學書忘而失羊為羊主所責育将鬻已以償之同郡許子章敏達之士也聞而嘉之代育償羊給其衣食使與子同學遂博通經史劉琨元帝時為太尉既為段疋磾所拘自知必死神色怡如也為五言詩贈其别駕盧諶託意非常攄暢幽憤逺想張陳感鴻門白登之事用以激諶諶素無竒畧以常詞酬和殊乖琨心重以詩贈之乃謂琨曰前篇帝王大志非人臣所言矣張天錫為凉州刺史歸晉為㪚騎常侍形神昏喪雖䖏列位不復被齒遇隆安中㑹稽世子元顯用事嘗延致之以爲戯弄梁吉士瞻爲鎮軍司馬少時嘗於南蠻國中擲塼無􅀈褰露為儕軰所侮後魏隂世隆初在凉州之日與鄉人索敞文學相友世隆至京師被罪徙和龍届上谷困不前逹土人徐能抑掠爲奴北齊髙昻初在鄉里隂養壮士爾朱榮聞而惡之密令刺史元仲宗誘執昻送於晉陽永安末榮入雒以昻自隨禁扵駞牛署後至司徒公魏收初仕後魏為兼通直散騎常侍司馬子如薦收召赴晉陽以爲中外府主簿以受㫖乖忤頻被嫌責加以箠楚久不得志唐馬周字賔王武徳中補博州助教日飲醇酒不以講授為心刺史達奚恕屢加咎責乃拂衣游扵曹汴復為浚儀令崔賢所辱周遂感激西游長安後至中書令李進代宗初為工部侍郎寶應元年五月徳宗為天下兵馬元帥平河雒以進為㕘佐時元帥在陕兼統蕃兵囬紇恃功而驕恣狠戾進與中書舍人韋少華皆爲皮鞭所辱進數月病瘡僅以全生後唐李茂貞為鳳翔節度使茂貞本姓宋名文通深州博野人少去郷里客奉天為市吏數爲鎮将所辱晉趙在禮為永興軍節度使契丹亂華自鎮赴闕時契丹首領奚王拽刺等在雒下在禮望塵致敬蕃酋等倨受其禮加之凌辱邀索貨財在禮不勝其憤行至鄆州泊於逆旅聞同州劉繼勲為虜所鏁大驚夜以衣帶就馬櫪自絞而卒册府元龜卷九百五十三
