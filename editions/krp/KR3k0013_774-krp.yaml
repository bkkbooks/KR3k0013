body:
  text: 册府元龜卷七百七十四宋王欽若等撰總錄部幼敏第二晉荀顗魏太尉彧之第六子幼爲妺婿陳羣所賞性至孝總角知名博學洽聞理思周密位至侍中太尉行太子太傅荀朂漢司空爽曽孫祖棐射聲校尉父盻早亡朂依於舅氏岐嶷夙年十餘歲能屬文從外祖魏太傅鍾繇曰此兒當及其曽祖及長遂博學達於政事後爲守中書監侍中卒羅憲年十三能屬文早知名師事譙周周門人稱爲子貢終於陵江將軍節度領武陵太守裴秀魏尚書令潛之子也少好學有風操八歲能屬文叔父徽有盛名賓客甚衆秀年十餘歲有詣徽出則過秀時人爲之語曰後進領袖有裴秀位至司空潘岳少以才頴見稱鄉邑號爲竒童謂終賈之儔後官至給事黄門侍郎王戎年六七歲嘗與羣兒戲於道側見李樹多實等輩竟趨之戎獨不往或問其故戎曰樹在道邊而多子必苦李也取之信然終於司徒王衍父乂爲平北將軍嘗有公事使行人列上不時報衍年十四在京師造僕射羊祜申陳事狀辭甚辯祜名德貴重而衍幼年無屈下之色衆咸異之位至太尉尚書令王澄生而警悟雖未能言見人舉動便識其意終於軍諮祭酒盛彦少有異才年八歲詣吳太尉戴昌昌贈詩以觀之彦於坐答之辭甚慷慨彦仕吳至中書侍郎吳平劉頌舉爲小中正卒陸雲六歲能屬文吳尚書廣陵閔鴻見而竒之曰此兒若非龍駒當是鳯雛後舉雲賢良時年十六後官至太尉都督前鋒周光少有父風年十一見王敦敦謂曰貴郡未有將誰可用者光曰明公不恥下問竊謂無復見勝敦笑以爲寧逺將軍尋陽太守高崧少好學善史書總角時司空何充稱其明慧充爲揚州引崧爲主簿益相欽重范宣年十歲能誦詩書嘗以刀傷手捧手改容人問痛否答曰不足爲痛但受全之體而致毁傷不可處耳家人以其年幼而異焉後詔徵太學博士散騎郎並不就王允之總角時從從伯敦敦與錢鳯謀逆而允之時飲酒醉帳中臥悉聞其言慮敦疑之便於臥處吐涕狼藉敦果疑遣看之見吐唾以爲醉不復疑之允之爲衛將軍㑹稽内史卒王儉字元衡内史下邳陳邵擅名徐州邵聞儉年十四善屬文請作祝文邵請郡客曰此生爲文有可觀採命爲督郵主簿邵遷給事中儉每爲定表禇陶弱不好弄少而聰慧清淡閒黙以墳典自娛年十三作鷗鳥水磑二賦見者竒之位至中尉庾闡好學九歲能屬文後爲著佐吳國内史卒李矩童齓時與羣兒聚戲便爲其率計畫指授有成人之量矩終於安西將軍司州刺史孔衍少好學年十二能誦詩書位至廣陵太守賀循㑹稽山隂人吳中書令邵之子邵爲孫皓所殺徙家屬邊郡循少嬰家難流放海隅吳平乃還本郡操尚高厲童齓不羣言行進止必以禮讓相國丁乂請爲五官掾成公綏㓜而聰敏博渉經傳性寡欲不營資産家貧歲饑晏如也少有俊才詞賦甚麗後爲中書郎卒韓康伯母殷氏高明有行家貧寠伯年數歲至大寒母方爲作襦令伯捉熨斗而謂之曰且著襦尋當作複褌伯曰不復須母問其故對曰火在斗中而柄尚熱今既著襦下亦當煖母甚異之位至丹陽尹吏部尚書領軍將軍張憑祖鎭爲蒼梧太守憑年數歲鎭謂其父曰我不如汝有佳兒憑曰阿翁詎宜以子戲父耶憑後爲吏部郎御史中丞卒荀羨清和有準纔年七歲遇蘇峻難隨父在石頭峻甚愛之嘗置膝上羨隂白其母曰得一利刀子足以殺賊母掩其口曰無妄言羨終於右軍將軍王珉珣之弟也有外國沙門名提婆妙解法理爲珣兄弟講毗曇經珉時尚幼講未半便云已解即於别室與沙門法綱等數人自講法綱歎曰大義皆是但小未精耳謝尚鯤之子八歲神悟夙成鯤嘗擕之送客或曰此兒一坐之顔回也尚應聲答曰坐無尼父焉别顔回席賓莫不歎異年十餘歲遭父憂丹陽尹溫嶠弔之尚號咷極哀既而收涕告謝舉止有異常童嶠甚竒之謝安總角神識沉敏風宇條暢善行書父奕爲剡令有老人犯法奕以醇酒飲之醉猶未已安時年七八歲在奕膝邊諫止奕爲改容遣之安位至太保謝𤣥安之兄子少頴悟與從兄朗俱爲安所器安嘗戒約子姪因曰子弟亦何預人而正欲使其佳諸人莫有言者𤣥答曰譬如芝蘭玉樹欲使其生於堦庭耳安悦𤣥終於散騎常侍左將軍㑹稽内史謝朗安之兄子善言𤣥理文義艶發名亞於元總角時病新起體甚羸未堪勞於安前與沙門支遁講論遂至相苦其母王氏再遣信令還安欲留使竟論王氏因出云新婦少遭難一生所寄惟在此兒流涕携朗去郎後位至東陽太守王獻之年數歲嘗觀門生摴蒱曰南風不競門生曰此郎亦管中窺豹特見一斑獻之怒曰逺慙荀奉倩近愧劉眞長遂拂衣而去獻之官至建威將軍吳興太守孫放字齊莊盛之次子幼稱令慧年七八歲在荆州與父俱從庾亮獵亮謂曰君亦來邪應聲答曰無小無大從公于邁亮又問欲齊何莊邪放曰欲齊莊周亮曰不慕仲尼邪答曰仲尼生而知之非希企所及亮大竒之曰輔嗣弗過也庾翼子爰客嘗候盛見放而問曰安國何在放答曰庾稚恭家爰客大笑曰諸孫大盛有兒如此也放又曰未若諸庾翼翼既而語人曰我故得重呼奴父也放終於長沙相戴逵總角以雞卵汁溲白瓦屑作鄭元碑又爲文而自鐫之詞麗器妙時人莫不驚歎逵武帝時以太學博士給事中累徵不起王修明秀有美稱善𨽻書號曰流奕清舉年十二作賢全論父濛以示劉惔曰此論便足以參微言修終於著作郎范喬年二歲時祖馨臨終撫喬首曰恨不見汝成人因以所用硯與之至五歲祖母以告喬喬便執硯涕泣九歲詣學在同輩之中言無媟辭喬後除樂安令辭疾不拜宋謝瞻六歲能屬文爲紫石英讚果然果然獸名詩當時才士莫不歎異後爲䕶南蠻校尉荆州刺史蔡興宗幼爲父廓所重廓與親故書曰小兒四歲神氣似可不入非類室不與小人遊故以興宗為之名興宗年十歲失父哀毁有異凡童父廓罷豫章郡還起二宅先成東宅與弟軌廓亡而舘宇未立軌罷長沙郡還送錢五十萬以補宅直興宗年十歲白母曰一家由來豐儉必共今日宅價不宜受也母悦而從焉軌有愧色謂其子談曰我年六十行事不及十歲小兒興宗終於光祿大夫謝宏徵童幼時精神端審時然後言所繼叔父混名知人見而異之謂宏徵父思曰此兒深中夙敏方成佳器有子如此足矣年十歲出係從叔峻所係父於宏徵本緦麻親戚中表素不相識率意承接皆合禮衷後爲右衛將軍卒謝莊年七歲能屬文通論語位至金紫光祿大夫沈林子字敬士少有大度年數歲隨王父在京口王恭見而竒之曰此兒王子師之流也與衆人共見遺寳咸爭趨之林子直去不顧徐湛之年數歲與弟淳之共車行牛奔車壞左右人馳來赴之湛之先令取弟衆咸歎其幼而有識後終於尚書僕射領䕶軍將軍沈璞童孺時神意閒審有異於衆太祖問其父林子曰聞君小兒器質不凡甚欲相識林子令璞進見太祖竒璞應對謂林子曰此非常兒年十許歲智度便有大成之姿王絢彧之子年七歲讀論語至周監於二代外祖何尚之戲之曰耶耶乎文哉絢即答曰草翁之風必偃位至祕書丞相卒王曽綽左光祿大夫曇首之子幼有大成之度弱年衆以國器許之好學有理思練悉朝典年十三䘮父太祖引見下拜便流涕哽咽帝亦悲不自勝襲封豫章縣侯尚太祖長女東陽獻公主官至吏部尚書袁叔少有風氣年數歲伯湛謂家人曰此非凡兒至十餘歲爲姑夫王宏所賞不爲章句之學而博渉多通好屬文辭采遒艶縱横才辯終於太子左衛率王僧達太保宏少子幼聰敏宏爲州時僧達年七歲遇有通訟者竊覽其辭謂爲有理及人訟者亦進宏意其小留左右僧達爲申理闇誦不失一句文帝聞其早慧召見於德陽殿問其書學及家事應對閒敏帝甚知之妻以臨川王義慶女位至中書令謝靈運晉車騎將軍𤣥之孫幼便頴悟元甚異之官至臨川内史謝惠連幼而聰敏年十歲能屬文族兄靈運深相知賞後爲彭城王法曹後參軍卒何承天五歲失父其母徐氏廣之姊也聰明博學故承天幼漸訓義儒史百家莫不該覽位至廷尉裴松之年八歲學通論語毛詩博覽墳籍立身簡素後爲大中大夫卒南齊顧歡年六七歲書甲子有簡三篇歡析計遂知六甲家貧父使驅田中雀歡作黃雀賦而歸雀食稻過半父怒欲撻之見賦乃止永明元年詔徵爲太學博士不就謝卄瀹年七歲王彧見而異之言於宋孝武詔見於稠人廣衆之中卄瀹舉動閒詳應對合㫖帝甚悦詔尚公主値景和敗事寢後終於太子詹事王慈僧虔之子年十歲與蔡興宗子約入寺禮佛遇沙門懴約戲慈曰衆僧今可謂虔慈應聲曰卿如此何以興蔡氏之宗劉瓛篤志好學博通訓義年五歲聞舅孔氏熈先讀管寧傳欣然欲讀舅更爲之説精意聽受曰此可及也嘗爲會稽郡丞後除歩兵校尉不拜卒虞愿祖賚給事中監利侯中庭橘樹冬熟子孫竟來取之愿數歲獨不取賚及家人皆異之位至廷尉東觀祭酒禇淵字彦回幼有清譽宋元嘉末魏軍逼爪歩百姓咸負擔而立時淵父湛之爲丹陽尹使其子弟並著芒屩於齋前習行或譏之湛之曰安不忘危也彦回時年十餘歲甚有慙色湛之有一牛至所愛無故墮聽事前湛之率左右躬自營救之郡中喧擾彦回下簾不視又有門生盜其衣彦回遇見謂曰可密藏之勿使人見此門生慙而去不敢復還淵位至司徒江厥字偉卿祐弟子也厥年十二祐被誅聞報至謂家人曰伯既如此無心獨存赴井死張欣泰少有志節不以武業自居好𨽻書讀子史年十餘歲詣吏部尚書褚淵淵問之曰張長弓馬多少欣泰答曰性怯畏馬無力牽弓淵甚異之官至雍州刺史劉懷珍幼隨伯父奉伯至壽陽豫州刺史趙伯符出獵百姓聚觀懷珍獨避不視奉伯異之曰此兒方興吾家後位至光祿大夫梁范雲年八歲遇宋豫州刺史殷琰於塗琰異之要就席雲風姿應對旁若無人琰令賦詩操筆便就坐者歎焉謝朏莊之子幼聰慧莊器之嘗置左右年十歲能屬文莊遊土山賦詩使朏命篇朏攬筆便就瑯琊王景文謂莊曰賢子足稱神童復爲後來特達莊笑因撫朏背曰眞吾家千金孝武帝遊姑熟勅莊携朏從駕詔使爲涸井贊於坐奏之起家撫軍法曹行㕘軍樂藹晉尚書令廣之六世孫世居江夏其舅雍州刺史宗慤嘗陳器物試諸甥姪藹時尚幼而所取惟書慤由此竒之又取史傳各一卷授藹等使讀畢言所記藹畧讀具舉慤益善之終於平越中郎將廣州刺史江蒨幼聰慧敏警讀書過目便能諷誦選爲國子生通尚書舉高第起家祕書郎王泰㓜敏悟年數歲時祖母集諸孫姪散棗栗於牀上羣兒競之泰獨不取問其故對曰不取自當得賜由是中表異之位至吏部尚書王承字安期七歲通周易選補國子生年十五射䇿高第位至東陽太守柳惲少子偃字彦游年十二引見詔問讀何書對曰尚書又曰何爲美句對曰德爲善政政在養民衆咸異之詔尚長城公主拜駙馬都尉鄱陽内史卒陸雲公字子龍五歲誦論語毛詩九歲讀漢書畧能記憶從祖倕沛國劉顯質問十事雲公對無所失倕顯歎異之終於中書黄門郎徐勉幼孤貧早勵清節年六歲時屬霖雨家人祈霽率爾爲文見稱耆宿後位至右光祿大夫侍中衛將軍陸纘早慧七歲通經爲童子奉車郎裴䆳十歲能屬文善左氏春秋後爲豫州刺史明山賓七歲能言名理十三博通經傳位至散騎常侍兼國子祭酒假節攝北兖州事卒王僧孺幼聰慧年五歲讀孝經問授者此書所載述曰論忠孝二事僧孺曰若爾常願讀之有餽其父東李先以一與之僧孺不受曰大人不見不容先嘗六歳能屬文既長好學家貧嘗傭書以養母所寫既畢諷詠亦通七歲能讀千萬言後爲北中郎咨議㕘軍入直西省知撰譜事卒任昉幼而聰敏早稱神悟七歲誦詩數十篇八歲能屬文自制月儀辭義甚美禇彦回嘗謂昉父遥曰聞卿有令子百不爲多一不爲少由是聞聲藉甚年十二從叔咎有知人之量見而稱其小名曰阿堆吾家千里駒也終於西安太守張率年十二能屬文嘗日限爲詩一篇稍進作賦頌至年十六向二千許首齊始安王蕭遥光爲揚州召迎主簿不就後厯位黄門侍郎出爲新安太守卒劉顯幼而聰敏六歲能誦吕相絶秦賈誼過秦論瑯琊王思逺吳國張融見而稱賞號曰神童族伯瓛儒學有重名卒無嗣齊武帝詔顯爲後時年八歲終於西平府諮議㕘軍劉孝綽幼聰敏七歲能屬文舅中書郎王遇深賞異之嘗與同載識親友號曰神童融每言曰天下文章若無我當歸阿士阿士孝綽小字也時父繪掌詔誥孝綽年未志學繪常使代草之父黨沈約任昉范雲等聞其名並命駕先造焉昉尤相賞好范雲年長繪十餘歲其子孝才與孝綽年十四五及雲通孝綽便申伯季乃命孝才拜之孝綽官至袐書監卒陳慶之子昕七歲能騎射十二隨父入雒於路遇疾還京師詣鴻臚卿朱异訪北間形勢昕聚土畫地指麾分别异甚竒之昕終於雲旗將軍王筠字元禮幼警悟七歲能屬文年十六爲芍藥賦甚美官至太子詹事蕭乾年九歲補國子周易主祭酒袁昂深敬之張𬗟字元長父宏䇿從高祖義師入伐留𬗟襄陽年始十歲每聞軍有勝負憂喜形於顔色後爲御史丞遷侍中未拜而卒王觀年十二五經大義並畧能通既長好學有口辯位至左户尚書禇玠七歲而孤爲叔父驃騎從事中郎隨所養早有令譽先達多以才器許之終於御史中丞宗懔少聰敏好學晝夜不倦鄉里號爲童子學士仕梁官至吏部尚書禇向年數歲父母相繼亡没向哀毁若成人者親表咸異之官至北齊郎廬陵王長史卒劉霽年九歲能誦左氏傳宗黨咸異之霽官至建康正劉褒年七歲能屬文外祖司空袁昂愛之謂賓客曰此兒當成吾宅相褒仕梁官左僕射劉孺幼聰敏七歲能屬文後位至吏部尚書劉覽字孝智十六通老易終於左丞蕭洽㓜敏悟年七歲誦楚辭畧能上口官至司徒左長史卒蕭修局力貞固威儀嚴整九歲通論語十一能屬文鴻臚卿裴子野見而賞之初封宜豐侯官至太保謝舉年十四嘗贈沈約五言詩爲約稱賞終尚書令何遜八歲能賦詩嘗爲尚書水部郎卒於仁威廬陵王記室謝幾卿幼清辯當世號曰神童官至左光祿長史卒蕭密字士機幼聰敏博學有文詞王籍七歲能屬文後爲唐侯相卒傅昭六歲而孤哀毁如成人爲外祖所養十歲於朱雀航賣厯日雍州刺史袁顗見而竒之顗嘗來昭讀書自若神色不改顗歎曰此兒神情不凡必成佳器位至散騎常侍金紫光祿大夫顧協幼孤隨母養於外從祖右光祿大夫張永永嘗携内外孫姪遊武立山協年數歲永撫之曰兒欲何戲協曰兒正欲枕石潄流永歎息曰顧氏興於此子及長好學以精力稱後拜通直散騎侍郎兼中書通事舍人守鴻臚卿卒劉敲幼有識慧四歲䘮父與羣兒同處獨不戲弄六歲誦論語毛詩意所不解便能問難十二讀莊子逍遥篇曰此易解耳客因問之隨問而答皆有情理家人每異之敲終不娶不仕卒於家伏挺幼敏悟十歲通孝經論語挺後客遊吳興卒庾子輿幼而岐嶷五歲讀孝經手不釋卷或曰此書文句不多何用自苦答曰孝德之本何謂不多後除巴陵内史卒劉昭幼清警七歲通老莊義卒於剡令庾於陵七歲能言元理弟肩吾八歲能賦詩特爲於陵所友悌後於陵終於鴻臚卿肩吾位至江州刺史領義陽太守許懋字昭哲少孤好學爲州里所稱十四入太學受毛詩且領師説覆講座下聽者常數十百人官至中庶子到沆幼聰敏五歲時父於屏風抄古詩沆請讀一遍便能諷誦無所遺失終於北中郎諮議㕘軍到鏡溉之子也五歲便口授爲詩婉有辭况位至太子舍人卒丘遲八歲能屬文父靈鞫嘗謂氣骨似我黄門侍郎謝起宗徵士何㸃並見而異之終於司空從事中郎陶季直早慧祖愍祖甚愛異之愍祖嘗以四函銀列置於前令諸孫各取季直時甫四歲獨不取人問其故季直曰若有賜當先父伯不應度及諸孫是故不取愍祖益竒之季直官至大中大夫江革幼而聰敏早有才思六歲便解屬文父柔之深加賞器曰此兒必興吾門革子從簡少有文情年十七作採荷調以刺何敬容爲當時所賞後爲度支尚書謝病還家除光祿大夫卒劉之遴八歲能屬文十五舉茂才對䇿沈約任昉見而異之位至都官尚書太常卿陳袁憲字德章武帝撰孔子正言章句詔下國學宣制㫖義憲時年十四被召爲國子生博士周宏正謂憲父君正曰賢子今兹䇿試不數日君正遣門下客岑文豪與憲候宏正會宏正將登講坐弟子畢集乃延憲入室授以麈尾令憲樹義時謝收何晏在座宏正謂曰二賢雖窮奥賾得無憚此後生耶何謝於是遞起義端深極理致相與往復數畨讐對閒敏宏正謂宴曰恣卿所問勿以童稚相期時學衆滿堂觀者重沓而憲神色自若辯論有餘宏正亦起數難終不能屈因告文豪曰卿還咨袁吳郡此即已堪見代爲博士矣時生徒對䇿多行賄賂文豪請具束脩君正曰我豈得用錢爲兒買第耶學司銜之及憲試爭起剝難憲隨問抗答剖析如流到溉顧憲曰袁君正其有後矣及君正將之吳郡溉祖道於征虜亭謂君正曰昨䇿生蕭孫徐孝克非不解義至於風神氣局去賢子逺矣憲厯官至昌州刺史復授晉王長史卒姚察幼有至性事親以孝聞六歲誦書萬餘言若不好弄博奕雜戲初不經心勤苦精厲以夜繼日十二便能屬文十三梁簡文帝時在東宫盛修文義即引於宣猷堂聽講論難爲儒者所稱後爲太子内舍人卒陸瓊父雲公梁給事中黄門侍郎掌著作瓊幼聰慧有詞理六歲爲五言詩頗有詞采大同末雲公受梁武帝詔校定棊品到溉朱异以下並集瓊時年八歲於客前覆局由是京兆號曰神童异言之武帝有敕召見瓊風神警亮進退詳審帝甚異之瓊位至吏部尚書領大著作顧野王幼學七歲讀五經知大㫖九歲能屬文嘗製日賦梁領軍朱异見而竒之年十二隨父之建安撰建安地記二篇後爲黄門侍郎光祿卿卒陸從典瓊之第三子幼而聰敏年八歲讀沈約集見有廻文硯銘從典援筆擬之便有佳致十三作栁賦其詞甚羙瓊時爲東宫管記官寮並一時俊偉瓊示以此賦咸竒其異才從父瑜特所賞愛及瑜將命終家中墳籍皆付從典乃集瑜文爲十卷仍製集序其文甚工後爲南陽縣主簿卒陸辯惠侍中繕之子年數歲詔引入殿内辯惠應對進止有父風高宗因賜名辯字敬仁張正見㓜好學有才梁簡文在東宫正見年十三獻頌簡文深贊賞之簡文雅尚學業每自昇座説經正見常預講筵請決疑義吐納和韻進退詳雅四座咸屬目焉終於尚書度支郎岑之敬年五歲讀孝經每燒香正坐親戚咸加歎異十六䇿春秋左氏制㫖孝經義擢爲高第御史奏曰皇朝多士例止明經若顔閔之流乃應高第梁武帝曰何妨我復有顔閔耶因召入靣試令之敬昇講座敕中書舍人朱异執孝經唱士章武帝親自論難之敬剖釋縱横應對如嚮左右莫不嗟服乃除童子奉車郎賞賜優厚後爲侍御史征南府諮議㕘軍卒杜之偉㓜精敏有逸才七歲授尚書稍習詩禮畧通其學十五遍觀文史禮儀故事時輩伏其早成僕射徐勉嘗見其文重其有筆力位至大中大夫徐敬成幼敏慧好讀書少機警善占對結交文義之士以識鑒知名位至安州刺史馬樞四歲而父母俱䘮爲其姑所養六歲能誦孝經論語老子後邵陵王綸引爲學士虞寄少聰敏年數歲客有造其父者遇寄於門因嘲之曰郎君姓虞必當無智寄應聲答曰文字不辨豈得非愚客大慚入謂其父曰此子非常人文學之對不足過也終於大中大夫卒虞荔幼聰敏有志操年九歲隨從伯闡候太常陸倕問五經凡有十事荔隨問輒應無有遺失倕甚異之又嘗詣徵士何治時太守衡陽王亦造焉治言之於王王欲見荔荔辭曰未有板刺無容拜謁王以荔有高尚之志雅相欽重還郡即辟爲主簿荔又辭以年少不就後爲太子中庶子領大著作卒韋載梁黄門侍郎正之子少聰慧篤志好學年十一叔父稜見沛國劉顯問漢書十事載隨問應答曽無疑滯及長博渉書史流敏有器局位至散騎常侍太子右衛卒謝貞年七歲母王氏授論語孝經讀訖便誦八歲嘗爲春日閒居五言詩從舅尚書王筠竒其有佳致謂所親曰此兒方可大成至如風定花猶落乃追歩謝惠連矣由是名輩知之年十三畧通五經大㫖尤善左氏傳工章𨽻蟲篆終於南平王友掌記室事徐凌八歲能屬文十二通莊老義既長博渉史籍縱横有口辯凌子份少有父風年九歲爲夢賦凌見之謂所親曰吾㓜屬文亦不如此後爲左光祿大夫太子少傅卒裴忌少聰敏有識量頗渉史傳為當時所稱解褐豫章王法曹㕘軍終於上開府周宏正幼孤及弟宏讓宏直俱爲叔父捨所養年十歲通老子周易捨每與談論輒異之曰觀汝神情頴悟清理警發後世知名當出吾右十五召補國子生仍於國學講周易諸生博習其義以季春入學孟冬應舉學司以其日淺勿之許焉博士到洽議曰周郎年未弱冠便自講一經雖曰諸生實堪師表無俟䇿試起梁家大學博士傅縡幼聰敏七歲誦古詩賦至十餘萬言長好學能屬文後爲祕書監右衛將軍兼中書通事舍人掌詔誥蔡徵幼聰敏精識强記年六歲詣吏部尚書河南禇祤祤嗟其頴悟位至給事郎張譏幼聰俊有思理年十四通孝經論語篤好元言受學於汝南周宏正每有新意爲先輩推伏終於國子博士東宫學士隂鏗幼聰慧五歲能誦詩賦日千言後官至晉陵太守員外散騎常侍王元規八歲而孤兄弟三人隨母依舅氏往臨海郡時年十二郡土豪劉塡者資財巨萬欲妻以女母以其兄弟幼弱欲結强援元規泣請曰因不失其親古人所重豈得茍安異壤輒婚於非類母感其言而止終於秦王東閣祭酒册府元龜卷七百七十四
