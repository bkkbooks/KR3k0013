body:
  text: 册府元龜卷六百宋王欽若等撰學校部師道夫師嚴道尊民乃貴學束修受業人知向方是故傳先聖之訓有在三之重焉若乃列徒著籍而博喻不倦升堂窺奥而請益彌堅心志既通行業增廣道之所在義亦至焉故有廬墓盡哀去官行服或詠歎其至德或撰集其緒言或罔避嚴刑上章以訟其枉或不敢受爵讓封以歸其功或藐是孤遺竄身以全受或罹於刑辟冐禁以收瘞是皆誠發於衷義形於外足以報師資之徳敦風教之本誠士大夫之懿行哉孔子之䘮門人疑所服無喪師之禮子貢曰昔者夫子之䘮顔淵若䘮子而無服䘮子路亦然請䘮夫子若䘮父而無服二三子皆絰而出尊師也岀謂有所之適然則凡吊服加麻者岀則變服群居則絰岀則否群謂七十二弟子相為朋友服子夏曰吾離群而索居孔子葬魯城北泗上孔子冡去城一里冡塋百畆冢南北廣十歩東西十三步髙一丈二尺冢前以瓦甓為祠壇方六尺與地平本無祠堂冢塋中樹以百數皆異種魯人世世莫能名其樹者民傳言孔子弟子異國人各持其方樹來種之孔子塋中不生荆棘及刺人草弟子皆服三年三年心䘮畢相訣而去則哭各復盡哀或復留唯子貢廬於冢凡六年然後去弟子及魯人徃從冢而家者百有餘室因命曰孔里世世相傳以嵗時奉祀孔子冢而諸儒亦講禮鄉飲大射於孔子冢顔淵字子淵魯人孔子弟子也淵喟然嘆曰喟嘆聲仰之彌高鑽之彌堅言不可窮盡瞻之在前忽焉在後言恍惚不可為象夫子循循然善誘人循循次序貎誘進也言夫子正以此道進勸人有次序博我以文約我以禮欲罷不能旣竭吾才如有所立卓爾雖欲從之末繇也已言夫子旣以文章開博我又以禮節節約我使欲罷而不能已極我才矣其有所立則又卓然不可及言已蒙夫子之善誘猶不能及夫子之所冉求魯人孔子弟子為季氏宰將師與齊戰於郎克之季康子曰子之於軍旅學之乎性之乎冉有曰學之於孔子季康子曰孔子何如人哉對曰用之有名播之百姓質諸鬼神而不惑求之至於此道雖累千社夫子不利也康子曰我欲召之可乎對曰欲召之則毋以小人間之則可矣端木賜字子貢衞人孔子弟子也子貢曰夫子之文章可得而聞也章明也文彩形質見可以耳目聞夫子之言性與天道不可得而聞也性者人之所受以生也天道者元亨日新之道深奥故不可得而聞也公孫朝公孫朝衞大夫問於子貢曰仲尼焉學子貢曰文武之道未墜於地在人賢者識其大者不賢者識其小者莫不有文武之道焉夫子焉不學文武之道未墜落於地賢與不賢各有所識夫子無所不從學而亦何常師之有無師不從故無常師叔孫武叔語大夫於朝魯大夫叔孫州讎武謚曰子貢賢於仲尼子服景伯以告子貢子貢曰譬之宮墻賜之墻也及肩窺見室家之好夫子之墻數仭不得其門而入不見宗廟之美百官之富得其門者或寡矣七尺曰仭夫子之云不亦宜乎夫子謂武叔叔孫武叔毁仲尼子貢曰無以爲也仲尼不可毁也他人之賢者邱陵也猶可踰也仲尼日月也無得而踰焉人雖欲自絶其何傷於日月乎多見其不知量也言人雖自絶棄於日月其何能可傷之乎適足自見其不知量也陳子禽謂子貢曰子爲恭也仲尼豈賢於子乎子貢曰君子一言以爲知一言以爲不知言不可不愼也夫子之不可及也猶天之不可階而升也夫子之得邦家者謂爲諸侯若卿大夫所謂立之斯立道之斯行綏之斯來動之斯和其生也榮其死也哀如之何其可及也綏安也言孔子爲政故其立教則無不立道之則莫不興行安之則遠者來至動之則莫不和睦故能生則榮顯死則哀慟孟嘗君請學於閔子使車徃迎閔子曰禮有來學無徃教致師而學則不能禮徃教則不能化君所謂不能化君也臣所謂不能化臣也於是孟嘗君曰敬聞命矣明日袪衣請受業漢于定國爲廷尉乃迎師學春秋身執經北靣備弟子禮孫寶字子嚴潁川鄢陵人也鄢音偃以明經爲郡吏御史大夫張忠辟寶爲属欲令授子經更爲除舍除謂修飾掃除也設儲偫謂豫備器物也偫音丈紀反寶自劾去忠固還之固者謂再三留之心内不平恨其去也後署寶主簿寶徙入舍祭竈請比隣忠陰察恠之使所親問寶前大夫爲君設除大舍子自劾去者欲爲高節也今兩府高士俗不爲主簿子旣爲之徙舍甚悅何前後不相副也寶曰高士不爲主簿而大夫君以寶爲可一府莫言非言大夫以爲寶適可爲主簿其府中之人不以爲不當也士安得獨自高前日君男欲學文而移寶自近文謂書也禮有來學義無徃教道不可詘身詘何傷且不遭者可無不爲况主簿乎言士不遇知己則當屈辱無所不爲也忠聞之甚慚揚雄字子雲蜀郡成都人爲郎乆次轉爲大夫雄少從嚴君平游學成而仕京師顯名數爲朝廷在位賢者稱君平徳侯芭鉅鹿人嘗從揚雄居受其太𤣥法言雄卒芭爲起墳䘮之三年許商從周堪受尚書四至九卿號其門人沛唐林子高爲徳行平陵吳章偉君爲言語重泉王吉少音爲政事齊炔欽㓜卿爲文學依孔子弟子顔回以下爲四科也炔音桂王莽時林吉爲九卿自表上師冡大夫博士郎吏爲許氏學者各從門人會車數百兩儒者榮之欽章皆爲博士徒衆尤盛云敞平陵人師事同縣吳章治尚書博士章坐王莽子宇腰斬初章爲當世名儒教授尤盛弟子千餘人莽以爲惡人黨皆當禁錮不得仕宦門人盡更名他師敞時爲大司徒掾自劾吳章弟子收抱章尸歸棺斂之京師稱焉車騎將軍王舜高其志節比之欒布表奏以爲掾薦爲中郎諫大夫後漢孔奮字君魚少從劉歆受春秋左氏傳歆稱之謂門人曰吾已從君魚受道矣言君魚之道已過於己也位至武都太守杜林扶風茂陵人初爲郡吏光武徵拜侍御史林少好學時稱通儒京師士大夫咸推其博洽河南鄭興東海衞宏等皆長於古學興嘗師事劉歆林旣遇之欣然言曰林得興等固諧矣使宏得林且有以益之及宏見林闇然而服濟南徐廵始師事宏後皆更受林學林前於西州得漆書古文尚書一卷嘗寶愛之雖遭艱困握持不離身出示宏等曰林流離兵亂嘗恐斯經將絶何意東海衞子濟南徐生復能傳之是道竟不墜於地也古文雖不合時務然願諸生無悔所學宏廵益重之於是古文遂行又曰衞宏少與河南鄭興俱好古學初九江謝曼卿善毛詩乃爲其訓宏從曼卿受學因作毛詩序善得風雅之㫖今傳於世後從大司空杜林更受古文尚書爲作訓㫖時濟南徐廵師事宏後從林受學亦以儒顯繇是古學大興于世桓榮少習歐陽尚書事博士朱普至王莽篡位乃歸會朱普卒榮奔䘮九江負土成墳榮門徒嘗四百餘人何湯爲高弟明帝始立爲皇太子選求明經乃擢榮弟子豫章何湯爲虎賁中郎將以尚書授太子光武從容問湯從音七容反本師爲誰湯對曰事沛國桓榮帝即召榮令說尚書甚善之拜爲議郎桓榮門徒何湯字仲弓以明經嘗授太子推薦榮榮拜五更封關内侯榮嘗言曰此何仲弓之力也歐陽歙字正思傳伏生尚書爲汝南太守在郡教數百人徴爲司徒坐贓千萬下獄汝南高獲字敬公與光武有素舊師事歙歙下獄當斷獲冠鐵冠𢃄鈇鑕詣闕請歙又諸生守闕爲歙求哀者千餘人至有自髠剔者平原震禮年十七聞獄當斷馳之京師行到河内獲嘉縣自繫上書求代歙死書奏而歙已死楊政字子行京兆人從博士范升受易光武時升嘗爲出婦所告坐繫獄政乃肉袒以箭貫耳抱升子濳伏道傍候車駕而持章叩頭大言曰范升三娶惟有一子今適三歳孤之可哀武騎虎賁懼驚乘輿引弓射之猶不肯去旄頭又以㦸义政傷胷政猶不退哀泣辭請有感帝心詔曰乞生師乞讀曰氣卽尺一出升政繇是顯名鍾興汝南人少從丁恭受嚴氏春秋爲左中郎將光武詔定春秋章句以授皇太子及宗室諸侯從興受章句封關内侯興自以爲無功不敢受爵光武曰生教訓太子及諸王侯非大功邪興曰臣師丁恭於是復封恭而興遂固辭不受爵任末蜀郡繁人少習齊詩爲郡功曹後奔師䘮於道物故臨命勑兄子造曰必致我尸於師門使死而有知魂靈不慚如其無知得土而已造從之鄭𢎞㑹稽人爲郡督郵舉孝廉𢎞師同郡河東太守焦貺楚王英謀反發覺以疏引貺疏書也貺被收捕疾病於道亡没妻子閉繫詔獄掠考連年諸生故人懼相連及皆改變姓名以逃其禍𢎞髠頭負鉄鎻詣闕上章爲貺訟罪明帝覺悟卽赦其家属𢎞躬送貺䘮及妻子還鄉里𢎞繇是顯名拜爲騶令樂恢字伯竒京兆人爲尚書僕射數上疏言竇憲兄弟稱疾乞骸骨歸鄉里憲風厲州郡迫脅恢飲藥死弟子縗絰輓者數百人庶衆痛傷之趙康字叔盛南陽人隱于武當山清静不仕以經傳敎授同郡朱穆爲侍御史時年五十乃奉書稱弟子及康没䘮之如師穆尊徳重道爲當時所服延篤字叔堅南陽人爲平陽侯相以師䘮棄官奔赴五府並辟不就姜肱字伯淮博通五經兼明星緯士之遠來就學者三千餘人再徴不就及終弟子陳留劉操追慕肱徳共刋石頌之張霸字伯饒蜀郡人就長水校尉樊儵受嚴氏公羊春秋遂博覽五經諸生孫林劉固段著等慕之各市宅其傍以就學焉廉范京兆人受業事博士薛漢後辟公府會漢坐楚王英事誅故人門生莫敢視獨范徃收歛之吏以聞明帝大怒詔范入詰責曰薛漢與楚王同謀亂天下范公府掾不與朝廷同心而反收歛罪人何也范叩頭曰臣無狀愚戅以爲漢等皆已伏誅不勝師資之情罪當萬坐帝怒稍解問范曰卿廉頗後邪與右將軍褒大司馬丹有親属乎范對曰褒臣之曾祖丹臣之祖也帝曰恠卿志膽敢爾因貰之繇是顯名孫期少爲諸生習京氏易古文尚書遠人從其學者皆執經隴畔以追之司徒黃琬特辟不行終於家謝夷吾爲會稽督郵太守第五倫甚重其道徳轉署主簿使子從受春秋夷吾待之如師弟子之禮時或游戲不肯讀書便白倫行罰遂成其業廖扶汝南平輿人習韓詩歐陽尚書教授數百人公府辟召皆不應太守謁煥先爲諸生從扶學後臨郡未到先遣吏修門人之禮又欲擢扶子弟固不肯當人因號爲北郭先生李郃字孟節爲司空卒門人上黨馮胄獨制服心䘮三年時人異之孔昱字元世魯國人爲議郎補雒陽令以師䘮棄官卒於家劉祐字伯祖中山人學嚴氏春秋小戴禮古文尚書仕郡爲主簿郡將少子嘗出錢付之令市買果實祐悉以買筆書具與之因白郡將言郎君年㓜可入小學而但傲狠遠近謂明府無過庭之教請出授書郡將爲使子就祐受經五日一試不滿呈限白决罰遂成學業李固字子堅官至太尉爲梁冀所誅露尸於四衢令有敢臨者加其罪固弟子汝南郭亮年始成童游學雒陽乃左提章鉞章謂所上章也鉞斧也右秉鈇鑕詣闕上書乞收固屍不許因徃臨哭陳辭於前遂守䘮不去夏門亭長呵之曰李杜二公爲大臣不能安上納忠而興造無端卿曹何等腐生公犯詔書干試有司乎亮曰亮含陰陽以生戴乾履坤義之所動豈知性命何爲以死相懼亭長嘆曰居非命之世天高不敢不跼地厚不敢不蹐耳目適宜視聽口不可以妄言也梁太后聞而不誅董班南陽人少游太學宗事固聞固死乃星行奔赴哭泣盡哀遂守尸積十日不去梁太后桓帝憐其義烈聽許送䘮到漢中赴葬畢而還二人繇此顯名三公並辟班遂隱身莫知所歸又弟子趙承等悲嘆不已乃共論固言迹以爲徳行一篇固所授弟子潁川杜訪汝南鄭遂河内趙承等七十二人相與哀歎悲憤以爲眼不復瞻固形容耳不復聞固嘉訓乃共論集徳行一篇王成爲李固門生固誅下郡收固二子皆受害少子燮年十三其姊文姬乃告成曰君執義先公有古人之節今委君以六尺之孤李氏存滅其在君矣成感其義乃將燮乗江東下入徐州界内令變名姓爲酒家傭而成賣卜於市各爲異人陰相徃來燮從受學酒家異之意非常人以女妻燮燮專精經學十餘年聞梁冀旣誅而災𤯝屢見明年史官上書宜有赦令又當存錄大臣寃死者子孫於是大赦天下並求固後嗣燮乃以本末告酒家酒家具車重遣之皆不受遂還鄉里追服後成卒燮以禮葬之感傷舊恩每四節爲設上賔之位而祠焉荀淑字季和潁川人爲當塗長去職還鄉里當世名賢李固李膺等皆師宗之淑卒李膺時爲尚書自表師䘮二縣皆爲立祠又云淑有高才王易李膺皆以爲師劉焉江夏竟陵人也魯恭王後也少任州郡以宗室拜郎中以師祝公䘮去官司徒祝恬也羊弼爲博士何休師之先是博士李育作難左氏四十事又以公羊義難賈逵徃返皆有理證育卒休與弼追述育意以難二傳作公羊墨守左氏膏肓榖梁廢疾又休注公羊云何氏學有不解者或曰休辭受於師乃宣此義不出於已此言爲允也包咸會稽人習魯詩論語太守黃讜署户曹史欲召咸入授其子咸曰禮有來學而無徃教禮聞來學不聞徃教也讜遂遣子師之樓望字次子少習嚴氏春秋爲左中郎將諸生著錄九千餘人及卒門生會葬者數千人儒家以爲榮鄭𤣥字康成北海人西入關因涿郡盧植事扶風馬融融門徒四百餘人升堂進者五十餘生融素驕貴𤣥在門下三年不得見乃使高業弟子傳受於𤣥𤣥日夜尋誦未嘗怠倦會融集諸生考論圖緯聞𤣥善籌乃召見於樓上𤣥因從質諸疑義問畢辭歸融喟然謂門人曰鄭生今去吾道東矣𤣥自游學十餘年乃歸鄉里家貧傭耕東萊學徒相隨已數千人黨錮解時𤣥年六十弟子河内趙商等自遠方至者數千及卒遺令薄葬自郡守以下嘗受業者縗絰赴會千餘人門人相與撰𤣥荅諸弟子問五經依論語作鄭志八篇其門人山陽郄慮至御史大夫東萊王基淸河崔琰並著名於世𤣥位大司徒魏王朗字景興東海郯人以通經拜郎中除菑邱長師太尉楊賜賜薨棄官行服夏侯惇沛國人年十四就師學人有辱其師者惇殺之繇是以烈氣聞後終大將軍王肅字子雍爲中領軍散騎常侍薨門生縗絰至者以百數蜀譙周字允南巴西人以門人文立爲顔囘陳壽李密爲游夏羅憲爲子貢至晉文王爲魏相國封周爲陽城亭侯晉室踐祚拜騎都尉晉王裒字偉元咸陽人隱居教授三徴七辟皆不就門人爲本縣所役吿裒求属令裒曰卿學不足以庇身吾徳薄不足以蔭卿属之何益且吾不執筆已四十年矣乃歩擔乾飯兒負鹽豉草履送所役生到縣門徒隨從者千餘人安邱令以爲詣已整衣出迎之裒乃下道至土牛傍罄折而立云門生爲縣所役故來送别因執手涕泣而去令即放之一縣以爲耻霍原字休明燕國人以賢良徴不到山居積年門徒百數後爲王浚所害懸其首諸生悲哭夜竊尸共埋殯之遠近駭愕莫不寃痛之孔冲會稽人爲豫章太守東陽人許孜年二十師事冲受詩書禮易及孝經論語學竟還鄉里冲在郡䘮亡孜聞問盡哀負擔奔赴送䘮還會稽蔬食執役制服三年祁嘉酒泉人博通經傳精究大義西游海渚教授門生千餘人張重華徴爲儒林祭酒性和裕教授不倦依孝經作二九神經在朝卿士郡縣守令彭和正等受業獨拜牀下者二千餘人張天錫謂爲先生而不名之竟以壽終郭瑀字元瑜敦煌人少有超俗之操東游張掖師事郭荷盡傳其業精通經義雅辯談論多才藝善属文荷卒瑀以爲父生之師成之君爵之而五服之制師不服重蓋聖人謙也遂服斬衰廬墓三年瑀隱于臨松薤谷太守辛章遣書生三百人就受業焉南齊劉瓛字子珪沛國人少篤學聚徒教授除歩兵校尉不拜姿狀纎小儒學冠于當時京師士子貴游莫不下席受業性謙率不以高名自居之詣於人惟一門生持胡牀隨後主人未通便坐問荅住在檀橋瓦屋數間上皆穿漏學徒敬慕不敢指斥呼爲靑谿焉竟陵王子良親徃修謁表武帝爲瓛立舘以楊烈橋故主第給之生徒皆賀瓛曰室美豈爲人哉此華宇豈吾宅邪幸可詔作講堂猶恐見害也未及徙居遇病子良遣從瓛學者彭城劉繪順陽范縝將厨于瓛宅營齋及卒門人受學並弔服臨送梁張充武帝時爲國子祭酒長於義理登堂講說皇太子以下皆至時王侯多在學執經以拜充朝服而立不敢當也諸葛璩字㓜玫琅邪陽都人世居京口璩㓜事徵士關康之博渉經史復師徵士臧榮緒著書稱璩有發摘功方之壺遂後舉秀才不就嚴植之爲騎兵参軍事高祖天監四年初置五經博士各開館教授以植之爲五經博士植之館在潮溝生徒嘗百數植之講五館生必至聽者千餘人六年遷中撫軍記室参軍猶兼博士七年卒於館植之自疾後不受廪俸妻子困乏旣卒䘮無所寄生徒爲市宅得成䘮焉後魏劉獻之博陵饒陽人善春秋毛詩每講左氏盡隱公八年便云義例已了不復湏解繇是弟子不能究竟其說孝文詔以典内校書徴之固以疾辭時中山張吾貴與獻之齊名海内皆曰儒宗吾貴每一講唱門徒千數其行業可稱者寡獻之著録數百而已皆通經之士於是有識者辨其優劣嘗爽字仕明河内人宣武時戎車屢駕征伐爲事貴游子弟未遑學術爽置館温泉之右教授門徒七百餘人京師學業翕然復興爽立訓甚有勸罰之科弟子事若嚴君焉尚書左僕射元贊平原太守司馬眞安著作郎程靈虬皆是爽教所就崔浩高允並穪爽之嚴教奬厲有方允曰文翁柔勝先生剛克立教雖殊成人一也其爲通識歎服如此爽不仕時人號爲儒林先生徐遵明字子判講孝經論語毛詩尚書三禮不出門凡經六年又撰春秋義章是後教授門徒蓋寡乆之爲盛每臨講坐必持經執疏然後敷陳其學徒至今寖以成俗遵明講學於外二十餘年海内莫不宗仰孝莊永安中遵明爲亂兵所害出帝永熙二年遵明弟子通直散騎常侍李業興表曰臣聞行道樹徳非求利於當年服義履仁豈邀恩於没世但天爵所存果致式閭之禮民望攸属終有祠墓之榮伏見故處士兖州徐遵明生在衡泌弗因世族之基長於原野匪乘雕鏤之地而託心淵曠置情恬雅處靜無悶居約不憂故能垂簾自精下帷獨得鑽經緯之微言研聖賢之妙㫖莫不入其門戸踐其堂奥信以稱大儒於海内擅明師於日下矣是故𦕈𦕈四方知音之類延首慕徳跂踵依風每精廬暫闢杖策不遠千里束修受業編錄將踰萬人固已企盛烈於西河擬高蹤於北海慕竒好古愛客尊賢罷吏游梁紛而成列遵明以碩徳重名首蒙禮命曵裾雅歩飬同置醴黄門李郁具所知明方申薦奏之恩遽全守壑之志濳居樂道遂徃不歸故北海王入雒之初率土風靡遵明確然守志忠㓗不渝遂與太守李湛將誅叛逆時有邂逅受斃㓙險至誠高節湮没無聞朝野之士相與嗟悼伏惟陛下遠應龍序俯執天𠂻每端聽而忘昃嘗坐思而候曉雖微功小善片言一行莫不衣裳加室玉帛在門况遵明冠蓋一時師表當世溘焉㝠没旌紀寂寥逝者長辭無論榮價文明叙物敦厲斯在臣託迹諸生親承顧盻惟伏膺之義感在三之重是以越分陳愚上諠幄座特乞加以顯諡追以好爵仰申朝廷尚徳之風下示學徒稽古之利若宸鑒昭囘曲垂矜採則荒墳千載式貢生平卒無贈諡李謐涿郡人博通諸經周覽百氏初師事小學博士孔璠數年後璠還就謐請業門生爲之語曰青成藍藍謝靑師何常在明經隋蕭該蘭陵人尤精漢書撰漢書音義包愷東海人兄愉明五經愷傳其業又從王仲通受史記漢書尤穪精究大業中爲國子助教于時漢書學者以蕭包二人爲宗匠聚徒教授著錄者數千人愷卒門人爲起墳立碣焉唐王義方泗州漣水人博通五經爲侍御史坐彈中書侍郎李義府左遷萊州司戸秩滿家于昌樂聚徒教授母終遂不復求仕及卒門人何彦先員半千制師服三年䘮畢而去陽城爲國子司業有薛約者嘗學於城狂躁以言事得罪竄連州客無根蔕吏蹤跡求得之城家城坐吏於門與約飲食訣别涕泣送上郊外徳宗聞之以城爲黨罪人出爲道州刺史太學生魯郡李賞等二百七十人詣闕乞留經數日吏遮止之疏不得上册府元龜卷六百
