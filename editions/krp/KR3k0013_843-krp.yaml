body:
  text: 册府元龜卷八百四十三宋王欽若等撰總録部知人第二晉劉寔初為宣帝相國㕘軍時鍾㑹鄧艾之伐蜀也有客問寔曰二将其平蜀乎寔曰破蜀必矣而皆不還客問其故笑而不答竟如其言寔之先見多此類也懐帝時為太尉趙元儒名為知人為鄴市長石苞少為吏被使到鄴事久未決乃販鐵於鄴市元儒見苞異之因與結交歎苞逺量當至公輔繇是知名許允為吏部郎石苞嘗見允求為小縣允謂苞曰卿是我輩人當相引在朝廷何欲小縣乎苞還歎息不意允之知己乃如此孫登髙尚不仕嵇康從之游登謂康曰子才多識寡難乎免於今之世矣一云君性烈而才雋其能免乎子無求乎康不能用果遭非命仍作幽憤詩曰昔慙栁下今愧孫登潘岳為黄門郎熊翹嘗為石崇蒼頭而性亷直有士風岳見而稱異勸崇免之乃還鄉里胡母輔之字彦國為湘州刺史初光逸為門亭長迎新令至京師輔之與荀邃共詣令家望見逸輔之謂邃曰彼似竒才便呼上車與談良久果俊器阮修字宣子梁國張偉志趣不常自隠於屠釣修愛其才美而知其不眞偉後為黄門郎陳留内史果以世事受累修為太子洗馬郭奕字大業為野王令羊祜字叔子祜嘗過之奕歎曰羊叔子何必減郭大業少選復往又歎曰羊叔子去人逺矣遂送祜出界數百里坐此免官一云羊祜舉上計吏州四辟從事秀才五府交命皆不就奕見之曰此今之顔子者也奕後為雍州刺史亭長李含有俊才而門寒為豪族所排奕用為别駕含後果有名位時以奕為知人奕遷尚書名重當世朝臣皆出其下時帝委任楊駿奕表駿小器不可任以社稷帝不聽駿後果誅鄭袤為儀同三司初年十七在鄉里時濟陰魏諷為相國掾名重當世袤同郡任覽與結交袤以諷姦雄終必為禍勸覽逺之及諷敗論者稱焉張華為司空初陶侃至雒陽數詣華華初以逺人不甚接遇侃每往神無忤色華後與語異之除郎中伏波将軍裴楷字叔則為開府儀同三司有知人之鑒初在河南樂廣僑居郭界未知名楷一見而竒之致之於宰府裴頠魚毁切字逸民王接性簡率不修俗操鄉里大族多不能善之惟頠雅知焉頠為左僕射嵇紹為汝陰太守頠深器之每曰使延祖為吏部尚書可使天下無復遺才矣頠後為侍中李憙薦樂安孫璞亦以道徳顯時人稱為知人憙官至特進閻徳東海人也唐彬初受學於徳門徒甚多獨目彬有廊廟才後拜使持節前将軍領西戎校尉雍州刺史及彬官成而徳已卒乃為之立碑左乂太原人也魏舒少質樸性好騎射著韋衣入山澤以漁獵為事惟乂謂舒曰卿終當為台輔然未能令妻子免饑寒吾當助卿營之嘗賑其匱乏舒受而不辭果位至儀同三司禄賜如前几杖不朝賜錢百萬山濤字巨源為尚書僕射初王衍總角造濤濤嗟歎良久既去目而送之曰何物老嫗生寧馨兒然誤天下蒼生者未必非此人也王戎為司徒衍從兄也初孫秀為瑯琊郡吏求品於鄉議衍将不許戎勸品之及得志朝士有宿怨者皆被誅而戎衍獲免焉范晷為少府鄉人郭舒幼請其母從師嵗餘便歸精識大義晷及舒宗人武陵太守郭景咸稱舒當為後来之秀終成國器盧欽范陽涿人也為尚書僕射初同郡人張華少孤貧自牧欽見而器之鄉人劉放亦竒其才以女妻焉嵇紹為侍中初沛國戴晞少有才知與紹從子含相友善時人許以逺至紹以為必不成器晞後為司州主簿以無行被斥州黨稱紹有知人之明又元帝初封瑯琊王幼有令聞及惠皇之際王室多故帝每恭儉退讓以免於禍沈敏有度量不顯灼然之迹故時人未之識焉惟紹異之謂人曰瑯琊王毛骨非常殆非人臣之相也劉公榮濟陰人也有知人之鑒范喬弱冠受業於樂安蔣國明公榮見喬深相器重喬父沒足不出邑里供養衡門至於白首元康中除樂安令辭疾不拜喬凡一舉孝亷八薦公府再舉清白又舉寒素一無所就又同郡武陔字元夏父周魏衛尉陔沈敏有器量早獲時譽與二弟紹字叔夏茂字季夏並總角知名雖諸父兄弟及鄊閭宿望莫能決其優劣公榮有知人之鑒嘗造周周見三子焉公榮曰皆國士也元夏最優有輔佐之才陳力就列可為亞公叔夏季夏不減常伯納言也江統有才識東海王越為兖州牧以統為别駕委以州事與統書曰昔王子師為豫州未下車辟荀慈明下車辟孔文舉貴州人士有堪應此者不統舉髙平郄鑒為賢良陳留阮修為直言濟北程收為方正時以為知人統累遷至黄門侍郎散騎常侍領國子博士山簡河内人為征南将軍鎮襄陽初蔡充未仕時簡嘗與瑯琊王衍書曰蔡子尼今之正人衍以書示衆曰山子以一字拔人然未易可稱後衍聞充在選官曰山子正人之言驗於今矣潘京武陵漢夀人也為泉陵令初同郡人戴若思除沁水令不就遂往武陵省父時京素有理鑒名知人其父遣若思就京與語既而稱若思有公輔之才顧榮字彦先嘗見吴伏波将軍孫秀之曾孫晷為兒童未嘗被呵怒謂其外祖薛兼曰此兒神明清審志氣貞立非常童也榮位至散騎常侍安東軍司周浚字開林為安東将軍有人倫鑒識鄊人史曜素㣲賤衆所未知浚獨引之為友遂以妹妻之曜竟有名於世張公陳留髙士也王遵少有風鑒識量清逺年十四張公見而竒之謂其從兄敦曰此兒容貌志氣将相之器也賀循㑹稽山陰人也為奉常雅有知人之鑒拔同郡楊方於卑陋卒成名於世周顗為僕射初顧和幼為王導揚州從事月旦當朝未入停車門外顗遇之和方擇蝨夷然不動顗既過顧指和心曰此中何所有和徐應曰此中最是難測地顗入謂導曰卿州吏中有一令僕才導亦以為然王澄為荆州刺史范汪父稚早卒汪少孤貧六嵗過江依外家新野庾氏澄見而竒之曰興范族者必是子也王應王敦兄含子也敦養應為子敦從弟彬為江州刺史舒為荆州刺史敦死含欲投舒應勸含投彬含曰大将軍平素與江州云何為敦嘗欲殺彬故也汝欲歸之應曰此乃所以宜往也江州當人强盛時能立同異及人危厄必興愍惻荆州守文豈能意外行事含不從遂共投舒舒果沈含父子於江彬聞應来宻具船以待之既不至深以為憾王導字茂𢎞為丞相初諸葛恢弱冠知名值天下大亂避地江左名亞王導庾亮導嘗謂曰明府當為黑頭公及導拜司空恢在坐導指冠謂曰君當復著此恢後累遷尚書右僕射尚書令加侍中金紫光禄大夫又劉惔少清逺有竒操與母任氏寓居京口家貧織芒屩以為養雖蓽門陋巷晏如也人未之識惟導深器之後稍知名論者比之袁羊惔喜還告其母其母聰明婦人也謂之曰此非汝比勿受之又有方之范汪者惔復喜母又不聽及惔年徳轉升論者遂比之荀粲劉惔為丹陽尹嘗薦吳郡張憑憑卒為美士衆以此服其知人又桓溫豪爽有風槩姿貌甚偉面有七星少與惔善惔嘗稱之曰溫眼如紫石稜鬚作蝟毛磔孫仲謀晉宣王之流亞也潘淊為洗馬見王敦而目之曰處仲敦字蜂目已露但豺聲未振若不噬人亦當為人噬東海王越以敦為揚州刺史淊説越曰今樹處仲於江外使其肆豪強之心是見賊也越不從元帝以為都督江揚荆湘交廣六州軍事明帝即位敦遂叛庾亮領江州孟嘉少知名亮辟補廬陵從事嘉還都亮引問風俗得失對曰還轉當問吏亮舉麈尾掩口而笑謂弟曰孟嘉故是盛徳人轉勸學從事禇裒為豫章太守正旦朝庾亮以裒有器識亮大㑹州府人士孟嘉坐次甚逺裒問亮聞江州有孟嘉其人何在亮曰在坐卿但自覔裒歴觀指嘉謂亮曰此君小異将無是乎亮欣然而笑喜裒得嘉謝安字安石為太傅初褚爽少有令稱安甚重之嘗曰若期生爽之小字不佳吾不復論士矣萬嗣為長沙太守時陶侃為廬江太守張䕫督郵領摐陽令有能名遷主簿嗣過廬江見侃虚心敬悦曰君終當有大名命其子與之結友而去䕫察侃為孝亷楊晫為豫章國郎中令晫陶侃州里也為鄉論所歸侃詣之晫曰易稱貞固足以幹事陶士行是也與同乗見中書郎顧榮榮甚竒之吏部郎温雅謂晫曰奈何與小人共載晫曰此人非凡器也黄慶為武庫令尚書樂廣欲㑹荆揚士慶進陶侃於廣人或非之慶曰此子終當逺至復何疑也慶後為吏舉侃補武岡令劉𢎞為荆州刺史将之官辟陶侃為南蠻長史遣先向襄陽討賊張昌破之𢎞既至謂侃曰吾昔為羊公㕘軍謂吾其後當居身處今相觀察必繼老夫矣後以軍功封東鄉侯桓􅉓字茂倫為西陽太守性通朗早獲盛名有人倫識鑒拔才取士或出於無聞或得之孩抱時人方之許郭初見謝安始四嵗􅉓歎曰此兒風神秀徹後當不減王東海溫嶠為驃騎将軍鎮武昌初桓溫生未朞而嶠見之曰此兒有竒骨可試使啼及聞其聲曰真英物也􅉓以嶠所賞故遂名之曰溫嶠笑曰果爾後将易吾姓也王藴為㑹稽内史時王悦来拜墓藴子恭往省之素相善遂留十餘日方還藴問其故恭曰與阿大語蟬連不得歸藴曰恐阿大非爾之友阿大悦小字也後竟乖初好時以為知人庾翼字稚恭為征南将軍少有經綸大略京兆杜乂陳郡殷浩並才名冠世而翼弗之重也語人曰此輩冝束之髙閣候天下太平然後議其任矣見桓溫總角之中便期之以逺畧因言于成帝曰桓温有英雄之才願陛下勿以常人遇之常壻畜之宜委以方召之任必有𢎞濟艱難之勲王濛為司徒左長史初謝安弱冠詣濛清言良久既去濛子修曰向客何如大人濛曰此客亹亹来逼人王導亦深器之繇是少有重名郄超為桓温㕘軍事聞謝安以苻堅之侵舉兄子𤣥為将超雖素與𤣥不善聞而歎之曰安違衆舉親明也𤣥必不負舉才也時咸以為不然超曰吾嘗與𤣥共在桓公府見其使才雖履屐間亦得其任所以知之桓温字元子王珣弱冠與陳郡謝𤣥為温掾俱為温所敬重嘗謂之曰謝掾年四十必擁旄杖節王掾當作黑頭公温後為丞相大司馬王雅為太子少傅孝武世時帝以㑹稽王道子無社稷器幹慮晏駕之後皇室傾危乃選時望以為藩屛将擢王恭殷仲堪等先以訪雅雅以恭等無當世之才不可大任乃從容曰王恭風神簡貴志氣方嚴既居外戚之重當親賢之寄然其秉性峻隘無所包容執自是之操無守節之志仲堪雖謹于細行以文義著稱亦無𢎞量且幹畧不長若委以連率之重據形勝之地令四海無事足䏻守職若道不當隆必為亂階矣帝以恭等為當時秀望謂雅疾其勝已故不從二人皆被升用其後竟敗有識之士稱其知人王胡之為郡太守時南平車武子父育為郡主簿胡之名知人見武子於童幼之中謂武子父曰此兒當大興卿門可使專學王謐見劉裕在布衣衆未之識也惟謐獨竒貴之嘗謂裕曰卿當為一代英雄及裕破桓𤣥謐以本官加侍中領揚州刺史録尚書事桓𤣥字敬道為大司馬初京兆覇城人王修南渡見𤣥𤣥知之謂曰君平世吏部郎才又謝景仁以不附㑹司馬元顯年三十方為著作郎𤣥誅元顯見景仁甚知之謂四坐司馬庻人父子云何不敗遂令謝景仁方作著作郎楊珧駿之弟也魏咸熈中劉元海為任子在雒陽晉文帝深待之泰始之後王渾又屡言之於武帝帝召與語大悦之謂王濟曰劉元海容儀機鑒雖繇余日磾無以加也濟對曰元海容儀機識實如聖㫖然其文武才幹賢於二子逺矣陛下若任之以東南之事吳㑹不足平也帝稱善珧及孔恂進曰臣觀元海之才當今懼無其比陛下若輕其衆不足以成事若假之威權平吳之後恐其不復北渡也非我族類其心必異任之以本部臣竊為陛下寒心若舉天阻之固以資之無乃不可乎帝黙然後秦涼覆沒帝疇咨将帥上黨李憙曰陛下誠能發匈奴五部之衆假元海一将軍之號鼓行而西可指期而定恂曰李公之言未盡殄患之理也憙勃然曰以匈奴之勁悍元海之曉兵奉宣聖威何不盡之有恂曰元海若能平涼州漸樹機能恐涼州方有難耳蛟龍得雲雨非復池中物也帝乃止珧官終太僕董仲道隠者也王彌有才幹博涉書記少游侠京都仲道見而謂之曰君豺聲豹視好亂樂禍若天下騷擾不作士大夫矣彌後事劉元海劉曜為石勒所殺張華仕前燕為安北将軍雅有知人之鑒慕容廆童冠時往謁之華甚歎異謂曰君至長必為命世之器扶難濟時者也因以所服簮幘遺廆結殷勤而别張載灌津人也同郡韓嘗少能屬文師事載載竒之曰王佐才也嘗後仕慕容儁為揚烈将軍與李産俱傅東宫從太子暐入朝儁顧謂左右曰此二傅一代偉人未易繼也其見重如此苻宏前秦苻堅之太子也堅以士馬強盛有圗西域之志乃授吕光使持節都督西討諸軍事率将軍姜飛彭馬杜進康盛等總兵十萬鐵騎五千以討西域以隴西董方馮翊郭抱武威賈䖍𢎞農楊穎為四府佐将宏執光手曰君器相非常必有大福宜深保愛毛興仕前秦鎮上邽時苻登兄同成為興長史以登為司馬後姚萇作亂遣其弟碩徳率衆伐興相持久之興将死告同成曰與卿累年共擊逆羌事終不尅何憾之深可以後事付卿少弟司馬殄碩徳者必此人也卿可總攝司馬事徐統見王猛於鄴都竒之召為功曹遁而不應王猛字景畧為苻堅丞相吕光沈毅凝重寛簡有大量喜怒不形於色時人莫之識也惟猛異之曰此非常人也劉化者道術之士也見李特第三子雄化每謂人曰闗隴之士皆當南移李氏子中惟仲雋有竒表終為人主仲雋雄字也趙廞後蜀人也李庠特第三弟也為威寇将軍封陽泉亭侯初至蜀廞深器之與論兵法無不稱善每謂所親曰李𤣥序蓋亦一時之闗張也𤣥序庠字王齊北燕人初馮素弗跋之長弟任侠放蕩不修小節故時人未之竒惟齊異焉曰撥亂才也及為宰輔謙虛恭慎非禮勿動成藻為南宫令馮素弗弱冠自詣慕容熙尚書左丞韓業請婚業怒而距之復求尚書郎髙邵女邵亦弗許時藻豪俊有髙名素弗造焉藻命門者勿納素弗逕入與藻對坐旁若無人談飲連日藻始竒之曰吾逺求騏驥不知近在東鄰何識子之晚也當世侠士莫不歸之宋謝景仁為桓𤣥黃門侍郎時髙祖為桓循撫中兵㕘軍嘗詣景仁諮事景仁與語悦之因留髙祖共食未辦而景仁為𤣥所召𤣥性促急俄頃之間騎詔續至髙祖屡求去景仁不許曰主上見待要應有方我欲與客共食豈當不得待竟安坐飽食然後應召髙祖甚感之江敳為建武将軍初劉穆之世居京口少好書傳博覽多通為敳所知及敳為将軍以穆之為府主簿謝混字叔源髙祖義旗初建以徐羨之為鎮軍㕘軍尚書庫部郎領軍司馬與混共事混甚知之混官終左僕射蔡堪之見謝宻兄弟謂人曰𢎞㣲貌類中郎而性似文靖𢎞㣲謝宻字也沈慶之為建威将軍元嘉三十年元凶弑立孝武入謝義興太守王僧逹歸孝武孝武命為長史初發潯陽慶之謂人曰王僧達必来赴義人問其所以慶之曰虜馬飲江王出赴難見其議論開張執意明決以此言之其至必也僧達果来桓序為輔國将軍劉敬宣父牢之為鎮北将軍敬宣八嵗䘮母晝夜號泣中表異之序鎮蕪湖牢之㕘序軍事四月八日敬宣見衆人灌佛乃下頭上金鏡以為母灌像因悲泣不自勝序歎息謂牢之曰卿此兒既為家之孝子必為國之忠臣劉敬宣以劉毅為寧朔㕘軍時人或以雄傑許之敬宣曰非常人之才當别有調度豈得便謂此君為人豪耶然其性外寛而内忌自伐而尚人若一旦遭逢亦當以陵上取禍耳韓伯為豫章太守胡藩少孤居䘮以毁稱伯見謂藩叔尚書少廣曰卿此姪當以義烈成名雷次宗字仲倫豫章南昌人元嘉二十五年徵至京師開館車駕数幸除給事中不就南齊衡陽元王道度太子長兄也與太祖俱受學於次宗宣弟問二兒學業次宗答曰其兄外朗其弟内潤皆良璞也張邵拜征虜将軍領寧蠻校尉雍州刺史加都督時王華為侍中䕶軍初華與邵有隙及華㕘要親舊為之危心邵曰子陵華之字也方𢎞至公必不以私讐害正義是任也華實舉之劉栁為尚書僕射沈演之年十一栁見而知之曰此童終為令器王韶之為吳興太守郡人王道隆兄道迄涉學善書形貌又美韶之謂人曰有子弟如王道迄無所少荀伯子潁川人卒於東陽太守王惠素不與謝靈運相識嘗得交言靈運辨博辭義鋒起惠時然後言時伯子在座退而告人曰靈運固自蕭散直上王郎有如萬頃波焉劉穆之為丹陽尹謝方明性嚴恪與從兄混俱有重名惟嵗節朝宗而已穆之權重當時朝野輻輳不與穆之相識者惟有混方明郄僧施蔡廓四人而已穆之甚以為憾方明廓後往造之大悦白髙祖曰謝方明可謂名家駒直置便自是台鼎人無論復有才用南齊蕭摹之為丹陽尹時髙帝父承之少有大志才力過人摹之及宗人北兗州刺史源之並見知重張緒為㑹稽内史陸慧曉清介正立不雜交逰緒見慧曉童幼便嘉異之稱之曰江東裴樂也張環為吳郡太守郡人顧暠陸閑並少年未知名環並引為綱紀後並立名世以為知人虞悰㑹稽餘姚人初見武帝帝始為從官家尚貧薄悰數相分遺每行必呼帝同載帝甚徳之卒於光禄大夫加正員常侍曹武為散騎常侍武雖武士頗有知人鑒梁武及崔惠景之在襄陽於時崔方貴盛武性儉嗇無所餉遺獨謂梁武曰卿必大貴我當不及見今以弱子相托每密送錢物并好馬時帝在戎多乏就武換借未嘗不得遂至十七萬及帝即位㤀其惠天監二年帝忽夢如田塍下行兩邉水深無底夢中甚懼忽見曹武来負武帝得過曰卿今為天下主乃爾㤀我顧托之言耶我兒饑寒無依昔所換十萬可還其市宅帝覺即使主書送錢還之使用市宅子世澄世宗並蒙抽擢三二年間迭為大郡明諧之為衛尉領中庻子諧之有識計每朝廷官缺及應遷代密量上所用人皆如言褚淵為録尚書事從弟炫少清簡為從舅王景文所知淵謂人曰從弟廣信獨立乃十倍於我也張融吳郡錢塘人與杜栖同郡栖徵士京産之子也融與京産相友每相造言論栖嘗在側融指栖曰昔陳太丘之名元方比之為劣今方古人何貴融後終於司徒左長史殷濔為尚書右丞沈瑀嘗詣濔濔與語及政事甚器之謂曰觀卿才幹當居吾此職蕭惠開征西将軍思話之子也丹陽建康人紀僧真少隨思話及惠開皆被賞遇惠開性苛僧真以㣲過見罸既而委任如舊及惠開罷益州還都不得志而僧真事之愈謹惠開臨終歎曰紀僧真方當冨貴我不見也沈寅之為領軍丘靈鞠吳興烏程人也靈鞠少好學善屬文州辟從事寅之寅之曰身昔為州職詣領軍謝晦賓主坐處正如今日卿将来或復此劉藏為尚書左丞徐孝嗣始適藏弟舎孝嗣往詣藏藏退語舎曰徐郎是令僕人三十餘可知矣汝宜善自結陸修静與張融同郡融弱冠修静以白鷺羽扇麈尾遺融曰此既異物以奉異人融後為黄門郎太子中庶子王儉為衛軍武帝起家巴陵王南中郎法曹行㕘軍遷儉東閣祭酒儉一見深相器異謂廬江何憲曰此蕭郎三十内當作侍中出此則貴不可言又稱徐勉有宰輔之量王融為中書郎劉孝綽之舅也孝綽幼聰敏七嵗能屬文融深賞異之嘗與同載適親友號曰神童融每言曰天下文章若無我當歸阿士阿士孝綽小字也梁劉孝綽父繪齊世掌詔誥孝綽年未志學繪嘗使代草之父黨沈約任昉范雲等聞其名並命駕先造焉昉尤相賞好范雲年長繪十餘嵗其子孝才與孝綽年十四五及雲遇孝綽便申伯季乃命孝才拜之後累遷秘書監紀少瑜早孤幼有志節嘗慕王安期之為人年十三能屬文初為京華樂王僧孺見而賞之曰此子才藻新拔方有髙名後為武陵王記室㕘軍吕道惠餘杭人范述曾幼好學從道惠受五經略通章句道惠學徒嘗有百數獨稱述曾曰此子必為王者師齊文惠太子竟陵文宣王幼時髙帝引述曽為之師友蔡樽為侍中武帝嘗問曰卿門舊尚有堪事者多少樽曰臣門客沈約范岫久已被升擢此外無人約時為太子少傅岫為右将軍張永顧協之外從祖也協字正禮吳郡吴人幼孤隨母養於永永嘗攜内外甥姪逰虎丘山協年數嵗永撫之曰兒何戲協對曰正欲枕石潄流永歎息曰顧氏興於此子後為散騎常侍鴻臚卿顧歡朱异外祖也异年數嵗歡撫之謂异祖昭之曰此兒非常器當成卿門戸後為中領軍贈侍中尚書右僕射梁仲徳張緬外祖也緬字元長車騎将軍𢎞䇿子也年數嵗仲徳異之嘗曰此兒非常器非止為張氏寳方為海内令名也仕至侍中裴子野河東人為鴻臚卿張纉為太尉諮議㕘軍尚書吏部俄為長史兼侍中時人以為早達子野曰張吏部有喉脣之任已憾其晚矣阮孝緒謝藺舅也藺晉太傅安八世孫孝緒以其有至性謂之曾子稍授以經史過目便能諷誦孝緒每曰吾家元陽也藺後遷散騎常侍張岱陸倕外祖也倕少勤學為岱所異岱嘗謂諸子曰此兒汝家之元陽也終於太常卿陸閑字遐業有風槩與人交不苟合少為同郡張緒所知仕至揚州别駕袁炤范雲之親人也雲字彦龍嘗就炤學晝夜不怠炤撫其背曰卿精神秀朗而勤於學卿相才也雲後為尚書右僕射袁粲為衛将軍謝朏為粲長史粲性簡峻罕通賓客時人方之李膺朏謁既退粲曰謝令不死朏莊之子也韋叡以齊末多故不欲遠鄉里求為上庸太守加建威将軍俄而太尉陳顯達䕶軍将軍崔慧景頻迫京師民心惶駭未有所定西土人謀之於叡叡曰陳雖舊将非命世才崔頗更事懦而不武其取赤族也宜哉天下真人殆興於吾州矣乃遣其二子自結於髙祖沈約為左衛将軍張率為太子舎人與同郡陸倕幼相友狎嘗同載詣約適值任昉在焉約乃謂昉曰此二子後進才秀皆南金也卿可與定交繇此與昉友善袁顗為雍州刺史傅昭幼孤為外祖所養十嵗於朱雀航賣歴日顗嘗来昭所昭讀書自若神色不改顗歎曰此兒神情不凡必成佳器昭後為散騎常侍金紫光祿大夫謝朓文章盛於一時到洽清警有學行朓見洽深相賞好日引與談論每謂洽曰君非直名人亦乃兼資文武朓後為吏部洽去職朓欲薦之洽覩世亂深相拒絶任昉樂安人時到洽除晉安王國左常侍不就遂築室巖阿幽居者積嵗昉有知人鑒與洽兄沼溉並㳺嘗訪洽於田舎見之歎曰此子日下無雙遂申拜親之禮又伏珽有才思好屬文為五言詩善效謝康樂體昉深相歎異嘗曰此子日下無雙何㸃字子晳徵侍中不就杜栖有學業能清言㸃見栖歎曰卿風韻如此雖獲嘉譽不永年矣栖果早卒又知丘遲於幼童稱江淹於寒素悉如其言徐勉為中兵郎領軍長史瑯琊王元長才名甚盛嘗欲與勉相識每託人召之勉謂人曰王郎名髙望促難可輕敝衣裙俄而元長及禍時人莫不服其識鑒後勉為僕射時蔡大寶濟陽考陽人少孤而篤學不倦善屬文初以明經對䇿第一解褐武陵王國左常侍嘗以書干勉大為勉所賞異乃令與其子㳺處所有墳籍盡以給之遂博覽羣書學無不綜諸葛璩瑯琊人臧盾幼從璩受五經通章句璩學徒常有数十百人盾處其間無所狎比璩異之歎曰此生重器王佐才也盾後為領軍将軍明僧紹徵士也劉杳字仲深年數嵗僧紹見之撫而言曰此兒實千里之駒杳後遷尚書左丞趙伯符孫謙親人也謙字長遜東筦莒人也少為伯符所知謙年十七伯符為豫州刺史引為左軍以幹稱周顒汝南人何𦙍縱情誕節時人未知之也惟劉瓛顒深器異之後累遷左丞尚書領驍騎中書令拜表辭職居若耶山髙祖踐祚詔為特進右光禄大夫不拜蔡大寳有重名於江左栁莊初為太府卿少有遠量博覽墳籍兼善辭令大寳時為岳陽王蕭詧諮議見莊便歎曰襄陽水鏡復在於兹矣大寳遂以女妻之王僧辨為申隨都督司馬申為鎮西外兵記室㕘軍及侯景寇郢州僧辨據巴陵每進籌䇿皆見行用僧辨歎曰此生腰鞬汗馬或非所長若使撫衆守城必有竒績陳孔奐為中書令虞世基幼沈静喜慍不形於色博學有髙才兼善草𨽻奐見而歎曰南金之貴屬在斯人及煬帝即位㕘掌朝政蕭暎為吳興太守梁大同初嘗目髙祖謂僚佐曰此人方将逺大鄧顯沛國人也孔奐㑹稽山陰人也奐數嵗而孤為叔父䖍孫所養好學善屬文經史百家莫不通涉顯時稱學府每共奐討論深相歎服乃執奐手曰昔伯喈墳索悉與仲宣吾當希彼蔡君足下無愧王氏所保書籍尋以相付卒為散騎常侍金紫光禄大夫領前軍将軍蕭勵江總之舅也總七嵗而孤依於外氏幼聰敏有志性勵名重當時特所鍾愛嘗謂總曰爾行殊異神采英拔後之知名當出吾右後為尚書令給鼓吹一部王筠為尚書謝貞從舅也貞年七嵗母王氏授論語孝經讀訖便誦八嵗嘗為春日閒居五言詩筠竒其有佳致謂所親曰此兒方可大成至如風定花猶落乃追步謝惠連矣繇是名輩知之遷南平王友掌記室事加招逺将軍張纉為吏部尚書杜之偉補邵陵王田曹㕘軍之偉年位甚卑特以彊識俊才頗有名當世纉深知之以為廊廟器也徐陵為少傅聞虞世基名召之世基不往後因公㑹陵一見而竒之顧謂朝士曰當今潘陸也因以弟女妻焉後魏劉庫仁初見道武嶷然不羣嘗謂其子曰有圗天下之志興復洪業光揚祖宗者必此主也劉羅辰代人宣穆皇后之兄也父春為北部大人帥部落歸國羅辰有智謀謂春曰從兄顯忍人也願早圖之春不以為意後顯果殺春而代立王猛北海人為苻堅相薛强字威明幼有大志懐軍國籌畧與猛同志友善及桓温入闗中猛以巾褐謁之温曰江東無卿比也秦國定多竒士如生輩尚有㡬人吾欲與之俱南猛曰公求可與撥亂濟時者友人薛威明其人也温曰聞之久矣方致朝命强聞之自南山来謁與猛皆署軍祭酒强察温有大志而無成功乃勸猛止俄而温敗及苻堅立猛見委任其平陽公融為書将以車馬聘强猛以為不可屈乃止崔光為司徒元子孝字季業早有令譽年八嵗光見而異之曰後生領袖必此人也又濟南王彧臨淮王之孫也彧字文若少有才學當時甚美光見而謂之曰黒頭三公當此人也又元顯和少有節操歴司徒記室㕘軍光每見之曰元㕘軍風流清秀容止閑雅乃宰相之器又趙彦深年十嵗曾候光光謂賓客古人觀眸子以知人此人當必逺至㳺肇為侍中臨淮王昌弟孚少有令譽肇及并州刺史髙聰司徒崔光等見孚咸曰此子當進退人物憾吾徒衰暮不及見耳李孝伯為尚書宋孝武鎮彭城魏使孝伯至帝遣長史張暢與語而帝改服觀之孝伯目帝不輟及出謂人曰張侯側有人風骨視瞻非常士也郝軒太原人世名知人崔𤣥伯為著作佐郎苻丕牧冀州為征東功曹軒稱𤣥伯有王佐之才近代所未有也李彪為御史中尉以李煥有幹用少與酈道元俱為彪所知崔浩為司徒薛拔沈毅有器識年始弱冠浩見而竒之張讜為平夀侯李訢為相州刺史以罪免配為厮役讜見與語竒之謂人曰此佳士也終不久屈未㡬而復為太倉尚書攝南部事崔𤣥伯清河人卒贈司空初髙允少孤夙成有竒度𤣥伯見而異之歎曰髙子黄中内潤文明外炤必一代偉器但吾恐不見耳崔挺為北海王司馬初崔光之在貧賤也挺贍遺衣食嘗親敬焉又識邢巒宋弁於童稚之中並謂終當逺至世稱其知人後光位至司徒侍中李沖為尚書宋弁才學雋贍少有美名髙祖初曾至京師見沖因言論移日沖竦然異之退而言曰此人一日千里王佐才也又崔亮年十嵗嘗依季父幼孫家貧傭書自業時沖當朝任事亮從兄光往依之言亮於沖沖迎為館客沖謂其兄子彦曰大崔生寛和篤雅汝宜友之小崔生峭整清徹汝宜敬之二人終将逺至李崇為尚書令宋維字伯緒諂事元乂為時所忿崇與尚書左僕射郭祚右僕射游肇每云伯緒凶疎終敗宋氏幸得殺身耳論者以為有徴後除營州刺史仍以本将軍靈太后反政以乂黨除名遂還鄉里尋追其前誣告清河王事於鄴賜死清河王懌為太傅劉懋性沈雅厚重懌愛其風雅嘗目送之曰劉生堂堂縉紳領袖若天假之年必為魏朝宰輔任城王澄為吏部尚書裴夙為主客郎時澄有知人鑒每歎美夙以逺大許之李苗為員外散騎常侍太保城陽王徽司徒臨淮王彧重之二王頗或不睦苗諌之及徽寵勢隆極猜忌彌甚苗謂人曰城陽蜂目先見豺聲今轉彰矣崔衡嘗舉李元愷程駿等終為名器世以是稱之髙允為中書監祖瑩年十二為中書學生尤好屬文允每曰此子才器非諸生所及終當逺至後為中書侍郎李神雋為吏部尚書崔彦穆幼明悟神采卓然神雋有知人之鑒見而歎曰王佐才也後位至侍中崔亮為吏部侍郎邢邵字子才少時有避遂稱子才焉年五嵗亮見而竒之曰此子後當大成位望通顯常景河内人為儀同三司車騎将軍蘇亮字景順武功人少通敏博學好屬文善章奏初舉秀才至雒陽遇景景深器之退而謂人曰秦中才學可以抗山東将此人乎又温子昇博覽百家文章清婉為廣陽王深賤客在馬坊教諸奴子書作侯山祠堂碑文常景見而善之故詣深謝之景曰頃見温生深怪問之景曰温生是大才士深繇是稍知之北齊段長遼西人神武素家貧及聘武明皇后始有馬得給鎮将長嘗竒神武貌謂曰君有康濟才終不徒然便以子孫為托及貴追贈長司空擢其子寧而用之蔡雋廣寧石門人髙爽有膽畧髙祖㣲時深相親附與遼西段長太原龎蒼鷹俱有先知之鑒甄琛為定州長史同郡杜弼幼聰敏琛簡試諸生見而䇿問義解閑明應答如響大為琛所歎異其子寛與弼為友州牧任城王澄聞而召問深相嗟賞許以王佐之才澄琛還雒稱之於朝丞相髙陽王等多相召命彭樂以斛律光初為侯景部下樂謂髙敖曹曰斛律家小兒不可三度将行後奪人名後至大将軍加太傅邢邵河間人李繪儀貌端偉神情朗雋邵繪舅也與繪清言歎其髙逺每稱曰若披雲霧如對珠玉宅相之寄良在此生後位至特進太常卿任城王湝以李徳林器量沈深時人未能測惟湝及趙彦深魏収陸卭大相欽重延譽之言無所不及後位至内史令元嶷為刺史郎基任瀛州騎兵時陳康元為司馬畢義雲為屬與基竝有聲譽元嶷目曰三賢俱有當世才後来皆當逺至惟郎騎兵任真過甚恐不足自達陳畢後並貴顯而基位止郡守邢子良與王晞逰處晞小名沙彌幼而孝謹淹雅有器度好學不倦美容儀有風則隨母兄東適海隅邢子良愛其清悟與其在雒兩兄書曰賢弟彌郎意識深逺曠達不羣簡於造次言必詣理吟詠性情必臻麗絶恐足下方難為兄不暇慮其不進也崔昂謂盧潛及弟士邃云此昆季足為後生之俊但憾其俱不讀書耳劉仁之為彭城王韶定州長史孟業家本寒㣲為州小吏性亷謹韶拜定州除典籖仁之謂業曰我處其外君居其内同心戮力庶有濟乎未幾仁之徵入為中書令臨路啓韶云殿下左右可信任者惟有孟業願專任之餘人不可信也又與業别執手曰今我出都君便失援恐君在後不自保全惟正與直願君自勉徐遵明為國子博士楊慶字伯悦美姿儀性辨慧年十六遵明見而異之楊遵彦為尚書右僕射見奉朝請薛道衡嗟賞吏部尚書隴西辛術與語歎曰鄭公業不亡矣河東裴讞之曰自鼎遷河朔吾謂闗西孔子罕值其人今復遇薛君矣後周齊王憲嘗遇栁謇之於途異而與語大竒之謇時為童兒因奏入國子以明經擢第拜宗師中士謝舉為僕射栁霞為邵陵王府功曹頗協時論舉引霞與語甚嘉之顧謂人曰江漢英靈見於此矣李賢幼有志節不妄舉動嘗出逰遇老人鬚眉皓白謂之曰我年八十觀士多矣未有如卿者必為台牧賢其勉之賢後至洮州總管裴侠為郢州刺史梁竟陵守孫暠鄼城守張建並以郡来附侠見之宻謂人曰暠目動言肆輕於去就者也建神情審定當無異心乃馳唘其状文帝曰裴侠有鑒深得之矣遣大都督苻貴鎮竟陵而鄼城竟不遣監統及栁仲禮軍至暠迺以郢叛卒如侠言于翼為司㑹中大夫文帝以翼有人倫之鑒皇太子及諸王等相傅以下並委翼選置其所擢用皆民譽也時論僉謂得人隋劉臻為左僕射初楊汪問禮於沈重受漢書於臻二人推許之曰吾弗如也繇是知名汪仕至吏部尚書牛𢎞為吏部尚書所有進用皆稱職吏部侍郎髙孝基鑒賞機悟清慎絶倫然爽俊有餘迄似輕薄文帝多以此疑之惟𢎞深識其才推心委任隋之選舉於斯為最時論彌服𢎞識度之逺又見李靖為殿内直長重之曰李生王佐才也顧言河東人也博學有才罕所推仰與虞世基相見歎曰海内當共推此一人非吾儕所及也世基後至金紫光禄大夫髙構字孝基為吏部侍郎見杜如晦少聰悟美風調精彩絶人深器重之每謂人曰此子有應變之材棟梁之用又房𤣥齡年十八射䇿甲科授羽騎尉校讐秘書省孝基見𤣥齡嗟悒不已謂河東裴矩曰僕閲人多矣未見此賢必成偉器但憾不覩其縱壑凌霄耳劉炫為太學博士定州義豐人張行成少師事炫勤學不倦炫謂門人曰張子體局方正廊廟材也張弼大業末為賊帥李大亮隴西狄道人也好讀書有文武才幹為賊所獲同輩百餘人皆就死弼見而異之獨識與語遂定交於幕下盧思道為散騎侍郎封倫舅也封倫少時思道每言曰此子智識過人必能致位卿相薛道衡為司諌大夫溫彦博之父友也彦博幼聰悟有口辯渉獵書記初道衡及李綱嘗見彦博兄弟三人咸歎異曰皆有卿相才也唐劉曇輝孔穎達邑人也穎達年八嵗日讀千言未嘗嬉戲曇輝有知人之鑒深竒之穎達後仕為國子祭酒岑文本為中書侍郎馬周為中書舎人周有機辯善敷奏文本謂所親曰吾見馬周論事多矣援引事類商確古今舉要刪蕪㑹文切理竒鋒間出髙論横飛聽之靡靡令人忘倦昔之蘇張終賈徒聞斯語今見其人然鳶肩火色騰上必速恐不能久耳李勣隋末事李宻初得黎陽倉就食者數十萬人魏徵髙季輔杜正倫郭恪皆客逰其所一見於衆人之中即加禮敬引之内卧談謔㤀倦及平武牢獲偽鄭州長史戴胄知其所行能尋即釋放更加推薦咸至顯達當時稱其有知人之鑒勣後位至司空李文博有知人之鑒張河幼而警悟文博見而竒之與共結友河後為相州都督范陽郡公盧承業為揚州長史婁師徳弱冠進士擢第授江都尉承業竒其才嘗謂之曰吾子台輔之器當以子孫相託豈可以官屬常禮行也師徳後為相朱敬則為正諫大夫同鳯閣鸞䑓平章事雅有知人之鑒凡在品論者後皆如其言及知政事以用人為先桂州蠻叛薦裴懐左鳳閣舎人缺薦魏知古右史缺薦張思敬則天以為知人裴行儉為吏部侍郎時賞拔蘇味道王劇謂曰二公後當相次掌知鈞衡之任時李敬𤣥盛稱王勃楊烱盧炤隣駱賓王等以示行儉行儉曰士之致逺先器識而後文藝也勃等雖有才名而浮躁炫露豈享爵禄者哉楊稍似沈静應至令長餘並鮮能令終其後皆如其言李義琛為雍州長史蘇珦為鄠縣尉義琛謂曰鄠縣本多訴公近日遂絶訪聞其繇明公為其疎理因顧指㕔事曰此即明公座也但憾遲暮所見耳珦後至吏部尚書桓彦範為雒州刺史蕭嵩調雒州㕘軍彦範見之雅重待以殊禮姚崇為紫㣲令蕭嵩為中書舎人與崔琳王丘齊幹同列咸未之異而崇許其致逺眷之特深獨孤信為雒州總管孫思邈弱冠善談莊老及百家之説兼好釋典信見而歎之曰此聖童也但憾其器大識小難為用也吳競仕至相州長史初張鎬風儀魁㟁廓落有大志涉獵經史好談王霸大畧少時師事競競甚重之李華栖筠之族子也栖筠趙郡賛皇人幼孤貧而器度雄逺體貌瓌傑博覽墳籍無所不通屬文勁迅然本於理道教化性嚴重寡言造次不妄交接故當時髙名之士皆敬慕之華有知人之鑒每稱其王佐才初自負器業恥從賓貢隠居於郡共城山下華固勉其應舉一試登進士第程楚賓者吕諲鄉人也諲蒲州河東人少修整勵志於學早孤家貧不能自賑楚賓家富於財遂娶其女楚賓與子震重其才給其所欲至天寶初舉進士調寧陵尉杜鴻漸為宰相杜黄裳升進士宏辭科鴻漸深器重之黄裳後亦為相于邵為禮部侍郎雅知人初山南東道樊澤嘗舉賢良方正至京師一見之謂人曰将相之材也五年澤為節将又北部郎中崔元幹年近五十始舉進士邵異其文學擢首甲科且曰不十年當掌誥命竟如邵言裴儆為金吾將軍時邵説遷吏部侍郎以才幹稱談者或以宰相許之儆語諌議大夫栁載曰以鄙夫所度説得禍不久矣且説與史思明父子定君臣之分居劇官掌兵柄亡軀犯順前後百戰於賊庭掠名家子女以為婢僕者數十人剽盜寳貨不知紀極力屈然後降朝廷宥以不死獲齒班序曾無厚顔而又遑遑求財崇飾第宅附託貴倖以求大用不知愧懼而有徳色其可久乎説竟卒於歸州刺史梁肅為翰林學士初崔羣年未冠舉進士陸贄知貢舉訪於梁肅議其登第有才行者肅曰崔羣雖少年他日必至公輔果如其言韋夏卿為東都留守留心辟士務得才彦其後位至卿相髙郢為僕射張仲方之父友也初仲方為兒童時郢見而竒之曰此子非常必為國器吾獲髙位必振發之後郢為御史大夫首請仲方為御史後唐盧質為張承業管記承業辟馮道為本院巡官承業重其文章履行甚見待遇時有周𤣥豹者善人倫鑒與道不洽謂承業曰馮生無前程公不可過用質聞之曰我曾見杜黄裳司空寫真圖道之状貌酷類焉将来必副大用𤣥豹之言不足信也承業尋薦為霸府從事趙徳均明宗鄉人也髙行周事明宗嘗與清泰主分率牙兵明宗所征無不拱從徳均謂明宗曰行周心好謹厚必享貴位陳紹光驍将也鄭仁誨幼事紹光紹光恃勇使酒嘗乗醉抽佩劍将剸刃於仁誨左右無不奔避惟仁誨端立以俟畧無懼色紹光因擲劍於地謂仁誨曰汝有此器度必當享人間冨貴及紹光典郡仁誨累為右職晉盧岳明厯象善知人唐末嘗謂李周曰子竒表方頥隆凖眉目疎朗身長七尺乃将相之材也河東李氏将有天下子宜事之以求冨貴周辭以母老而歸既而梁將葛從周拔邢雒唐武皇麾兵南下築壘於青山口周向背莫決因思岳言乃拔青山寨将張沔落武皇賞之補萬黄領軍使司空圖為兵部侍郎姚顗少惷敦厚靡事容貌任其自然流輩未之重惟圖深器之以女妻焉册府元龜卷八百四十三
