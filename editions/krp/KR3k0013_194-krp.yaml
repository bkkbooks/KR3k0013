body:
  text: 冊府元龜巻一百九十四宋王欽若等撰閏位部崇儒崇釋老崇儒昔魯哀公聞仲尼之對終身不敢戲儒言加信行加義故以區區小國與周升降葢能重聖人之教而保世延祚者也彼孫劉而下咸裂壤分王歴世綿乆非獨山川之阻甲兵之利誠亦典刑不忘風教可尚也至若崇建學館紹封聖緒増嚴祀奠申禁丘隴以至詳延國胄優其課試精選鴻儒職兹講授其或親臨閲聽推之宴賜皆所以敦尚素業潤色政典考之遺籍斯可舉矣蜀先主初定成都于時䘮亂歴紀學業衰廢乃鳩合典籍沙汰衆學以許慈胡潜竝為愽士與孟光來敏等典掌舊文呉大帝權黄龍二年正月詔立都講祭酒以教諸子景帝休永安元年十二月詔曰古者建國教學為先所以道世治性為時養器也自建興以來時事多故吏民可以目前趨務去本就末不循古道夫所尚不淳則傷化敗俗其按古置學官立五經博士核取應選加其寵禄科見吏之中及將吏子弟有志好者各令就業一歲課試差其品等加以位賞使見之者樂其榮聞之者羡其譽以敦王化以隆風俗宋髙祖初鎮京口與鎮南將軍臧燾書曰頃學尚廢弛後進頺業衡門之内清風輟響良繇戎車屢警禮樂中息滛夫恣志情與事染豈可不敷崇墳籍敦勵風尚此境人士子姪如林明發捜訪想聞令軌然荆玉含寳要俟開瑩幽蘭懐馨事資扇發獨習寡悟義著周典今京師不逺而赴業無聞非唯志學者鮮或是勸誘未至耶想復𢎞之永初三年正月詔曰古之建國教學為先𢎞風訓世莫尚於此發蒙啟滯咸必繇之故爰自盛王迄於近代莫不敦崇學藝修建庠序自昔多故戎馬在郊旍旗巻舒日不暇給遂令學校荒廢講誦蔑聞軍旅日陳爼豆藏器訓誘之風將墮于地後生大懼於牆面故老竊歎於子衿此國風所以永思小雅所以懐古今王略逺届華域載清仰風之士日月以冀便宜愽延胄子陶奬童䝉選偹儒官𢎞振國學主者考詳舊典以時施行文帝元嘉十五年徴雷次宗至京師開舘於雞籠山聚徒教授置生百餘人㑹稽朱膺之潁川庾蔚之竝以儒學監總諸生時國學未立帝留心藝術使丹陽何尚之立𤣥素學太子率更令何承天立史學司徒叅軍謝元立文學凡四學竝建各聚門徒多就業者江左風俗於斯為美後言政化稱元嘉焉又車駕數幸次宗學舘資給甚厚十九年正月詔曰夫所因者本聖哲之逺教本立化成教學之為貴故詔以三徳崇以四術用能納諸義方致之軌度盛王祖世咸必繇之永初受命憲章𢎞逺將陶均庶品混一殊風有詔典司大啟庠序而頻遘屯夷未及修建永瞻前猷思敷鴻烈今方隅乂寧戎夏慕嚮廣訓胄子實維時務便可式遵成規闡揚景業十二月丙申詔曰胄子始集學業方興自㣲言冺絶逝將千祀感事思人意有慨然奉聖之後可速議繼襲於先廟地特為營造依舊給祠直令四時饗祀闕里徃經冦亂黌校殘毁并下魯郡修學舎採召生徒昔之賢哲及一介之善猶或衛其丘壠禁其芻牧况尼父徳表生民功被百代而墳塋荒蕪荆棘弗翦可蠲墓側數戸以掌灑掃魯郡上民孔景等五戸居近孔子墓側蠲其課役供給灑掃并種松栢六百株二十三年九月車駕幸國子學䇿試諸生荅問凡五十九人十月詔曰庠序興立累載胄子肄業有成近親䇿試覩濟濟之美緬想洙泗永懐在昔諸生答問多可採覧教授之官竝宜沾賚賜帛各有差孝武帝孝建元年十月詔曰仲尼體天降徳維周興漢經緯三極冠冕百王爰自前代咸加褒述典司失人用闕宗祀先朝逺存遺範有詔繕立世故妨道事未克就國難頻深忠勇奮厲實馮聖義大教所敦永惟兼懐無㤀待旦可開建廟制同諸侯之禮詳擇爽塏厚給祭秩大明五年八月詔曰自靈命初基聖圖重逺藻正樂職感神明之應崇殖禮囿奮至徳之光聲實同和文以均節化調其俗物惟其情故臨經釋奠煥乎炳發道䘮世屯學落年永獄訟㣲衰息之術百姓㤀退素之方今息警夷嶂恬波河渚棧山航海嚮風慕義化民成俗兹焉時矣來歲可修葺庠序旌延國胄是歲豫章王子尚領㑹稽太守帝使子尚上表立左學召生徒置儒林祭酒一人學生即敬位比州治中文學祭酒一人比西曹勸學從事二人比祭酒從事明帝好讀書愛文義才學之士多蒙引進叅侍文集應對左右於華林園講周易嘗自臨聽泰始六年九月立總明觀徴學士以充之置東觀祭酒訪舉各一人學士二十人分為儒道文史隂陽五部學言五部隂陽者遂無其人南齊太祖建元四年正月詔曰夫膠庠之典彛倫攸先所以招振才端啟發性緒𢎞字氓庶納之軌儀是故五禮之迹可傳六樂之容不泯朕自膺厯受圖志闡經訓且有司羣僚奏議咸集葢以戎車時警文教未宣思樂泮宫永言多慨今闗燧無虞時和歲稔逺邇同風華夷慕義便可式遵前准修建學斆精選儒官廣延國胄時立國學置學生百五十人其有位樂入者五十生年十五以上二十以下還取王公以下至三將著作即廷尉正太子舎人領䕶諸府司馬諮議經除勑者諸州别駕治中等見居官及罷散者子孫悉取家去都三千里為限武帝永明三年正月詔曰春秋國語云生民之有學斆猶樹木之有枝葉果行育徳咸必繇兹在昔開運光宅華夏方𢎞典謨克隆教思命彼有司崇建庠塾甫就經始仍罹屯故仰瞻徽猷歲月彌逺今遐邇一體車軌同文宜髙選學官廣延胄子四年三月國子學講孝經車駕幸學賜祭酒博士助教絹各有差七年正月詔宣尼誕敷文徳峻極自天發揮七代陶鈞萬品英風獨舉素王誰匹功𨼆於當年道深於日月感麟厭世緬邈千祀川竭谷虛丘夷淵塞非但洙泗湮淪至乃響嘗乏主前王敬仰崇修寝廟歲月亟流鞠為茂草今學斆興立實禀洪規撫事懐人彌増欽屬可改築宗祊務在爽塏量給祭秩禮同諸侯奉聖之爵以時紹繼明帝建武四年正月詔曰嘉肴停爼定芳㫖於必甘良玉在攻表珪璋於既就是以陶鈞萬品務本為先經緯九區學斆為大徃因時康崇建庠序屯虞薦有權從省廢謳誦寂寥倐移年稔永言古昔無忘旰昃今華夏乂安要荒慕嚮締修東序寔允適時便可式依舊章廣延國胄𢎞敷景業光被後昆永泰元年三月詔曰仲尼明聖在躬允光上哲𢎞厥雅道大訓生民師範百王軌儀千載立人斯仰忠孝攸出𤣥功潜被至徳彌闡雖春秋遐曠而祧薦靡闕時祭舊品秩比諸侯頃歲以來祀典陵替爼豆寂寥牲奠莫舉豈所以克昭盛烈永隆風教者哉可式循舊典詳覆祭秩使牢餼備禮欽饗兼申梁髙祖天監四年六月立孔子廟又詔曰二漢登賢莫非經術服膺雅道名行立成魏晋浮蕩儒教淪歇風節罔樹職此之繇朕日昃罷朝思聞俊異收士得人實惟酬奬可置五經愽士各一人廣開館宇招納後進乃以平原明山賔呉興沈峻建平嚴植之㑹稽賀㻛補愽士各主一館館有數百生給其餼稟其射䇿通明者即除為吏十數年間懐經負笈者雲㑹京師又選遣學生如㑹稽雲門山受業於廬江何裔分遣愽士祭酒到州郡立學初𦙍退居東山帝以右光禄大夫徴之不就乃詔之曰頃者學業淪廢儒術將盡閭閻縉紳尠聞好事吾每思𢎞奬其風興言為嘆本欲屈卿蹔出開導後生既屬廢業此懐未遂延佇之勞載盈夢想理舟虚席湏候來秋所望賁然申其宿抱耳卿門徒中經明行修厥數有㡬且欲瞻彼堂堂寘此周行便可具名以聞副其勞望又曰比議學者殊為寡少良繇無復聚徒故明經斯廢毎一念此為之慨然卿居儒宗加以徳素當勅後進有意向者就卿受業想深思誨誘使斯文載興於是遣𦙍子朗孔夀等六人於東山受學七年正月詔曰建國君民立教為首不學將落嘉植靡繇朕肇基明命光宅區宇雖耕耘雅業傍闡藝文而成器未廣志本猶闕非所以鎔範貴遊納諸軌度思欲式敦讓齒自家刑國今聲訓所漸戎夏同風宜大啟庠教愽延胄子務彼十倫𢎞此三徳使陶鈞逺被微言載表又云是年詔皇太子宗室王侯始就學受業武帝屈輿駕奠於先師先聖申之以謙語勞之以束帛濟濟焉洋洋焉大道之行也如此九年三月車駕幸國子學臨講賜祭酒已下帛各有差十二月再幸國子學䇿試胄子大同七年十二月於宫城西立士林館領軍朱异太府卿賀琛舎人孔子祛等遞相講述皇太子宣城王亦於東宫宣猷堂及揚州廨開講於是四方郡國趨學向風雲集於京師元帝初為荆州刺史起州學宣尼廟嘗置儒林叅軍一人勸學從事二人生三十人加稟餼帝工書善畵自圖宣尼像為之賛而書之時人謂之三絶敬帝太平二年正月詔曰夫子降靈體喆經仁緯義允光素業載闡𤣥功仰之者彌髙誨之者不倦立忠立孝徳被蒸民制禮作樂道冠羣后雖泰山頺峻一簣不遺而泗水餘波千載猶在自國圖屯阻祀薦不修奉聖之門嗣續殱滅敬神之寢簠簋寂寥永言聲烈寔兼欽愴可捜舉魯國之族以為奉聖侯并繕廟堂備祀典四時薦秩一皆遵守陳廢帝光大元年十二月以兼從事中郎孔英為奉聖亭侯奉孔子祀後主至徳三年十一月詔曰宣尼誕膺上哲體資至聖祖述憲章之典竝天地而合徳樂正雅頌之奥與日月而偕明垂後昆之訓範開生民之耳目而梁季湮㣲靈寢忘處鞠為茂草三十餘年敬仰如在永惟愾息今雅道雍熈繇庚得所斷琴故履零落不追閲笥開書無因修復可詳之禮典改築舊廟葯房桂棟咸使維新芳蘩潔潦以時饗奠十二月辛丑釋奠於先師禮畢設金石之樂㑹宴王公卿士東魏孝静帝武定四年八月移雒陽漢魏石經于鄴北齊文宣帝天保元年六月詔封崇聖侯邑一百户以奉孔子之祀并下魯郡以時修治廟宇務盡褒崇之至八月詔郡國修立黌序廣延髦雋敦述儒風其國子學生亦仰依舊銓補服膺師説研習禮經徃者文襄皇帝所運蔡邕石經五十二板即宜移置學館依次修立孝昭帝皇建元年八月詔國子寺可備立官屬依舊置生講習經典歲時考試其文襄帝所運石經宜即施立於學館外州太學亦仰典司勤加督課梁太祖開平元年十月山南東道節度楊師厚進納趙匡凝東第書籍先是收復襄漢帝閲其圖書至是命師厚進焉三年十二月國子監奏創造文宣王廟仍請率在朝及天下見任官僚俸錢每貫每月尅一十五文充土木之直允之是歲以所率官僚俸錢修文宣王廟崇釋老司馬遷之序六家談大道之要其論詳矣自竺乾之典流于中夏述苦空之㫖顯悲濟之用奏其教者又豈勝道哉江表之世崇尚斯篤乃至増建浄刹講求梵譯度桑門之衆申血食之業營齋造像極其信向而𤣥元之訓亦資演暢東魏北齊暨于朱氏何莫繇斯也已其或𡨕符𤣥感神期脗合肹蠁之應非可度思若乃殖衆徳之本以濟於仁恕洞無為之妙以臻于清净斯固有助於治者也呉大帝赤烏十年西域康僧㑹入境置經行所朝夕禮念有司以聞帝曰昔漢明感夢金人使徃西方求之得摩騰空竺法蘭來中國立經行教今無乃是遺類乎因引見僧㑹具言佛教滅度已乆唯有舎利可以求請遂於大内立壇結静三七日得之帝崇佛道於是江東初有佛法宋文帝元嘉十二年丹陽尹蕭摹之奏曰佛化被于中國已歴四代而自頃以來更以奢競為重請自今以後有欲鑄銅像者悉詣臺自聞興造塔寺精舎皆先列言湏許報然後就功詔可又沙汰沙門罷道者數百人孝武帝孝建元年率羣臣於中興寺八闗齋中食㑹侍中袁愍孫即袁粲舊名與黄門郎張淹更進魚肉尚書令何尚之奉法素謹宻以白帝帝使御史中丞王謙之糺奏竝免官大明二年有曇標道人與羌人髙闍謀反帝因是下詔所在精加沙汰後有違犯嚴其誅坐於是設諸條禁自非戒行精苦竝使還俗而諸寺尼出入宫掖交闗妃后此制竟不能行明帝以宅起湘宫寺費極奢侈以孝武帝莊嚴刹七層帝欲起十層不可分立為兩刹各五層新安太守巢尚之罷郡還見帝曰卿至湘宫寺未我起此寺是大功徳通直散騎侍郎虞愿在側曰陛下起此寺皆是百姓賣兒貼婦錢佛若有知當悲哭哀愍有何功徳尚書令袁粲在坐為之失色帝大怒使人驅下殿愿徐去無異容以舊恩俄復召入帝頗好𤣥理以周顒有辭義引入殿内親近宿直帝所為惨毒之事顒不敢顯諫輒誦經中因縁罪福事帝亦為之小止南齊武帝時王奐為將軍欲請車駕幸府帝晩信佛法御膳不宰牲使王晏謂奐曰吾前去年為斷殺事不復幸詣大臣已判無容欻爾也梁髙祖天監十六年四月初去宗廟牲詔曰夫神無常饗饗于克誠所以西鄰禴祭實受其福宗廟祭祀猶存牲牢無益至誠有累𡨕道自今四時烝嘗外可量代八座議以脯代一元大武八座又奏既停宰殺無復省牲之事請立省饌儀其衆官陪列竝同省牲帝從之十月詔曰今雖無復牲腥猶有脯脩之類即之幽明義為未盡可更詳定悉薦時蔬左丞司馬鈞等叅議大餅代大脯餘悉用蔬菜帝從之又舎人朱异議二廟祀相承止有一餅羮葢祭祀之禮應有兩羮相承止於一餅即禮為乖請加熬油蓴羮一餅帝從之於是起至敬殿景陽臺立七廟座月中再設清浄饌自是訖於臺城諸廟遂不血食中大通元年九月癸巳輿駕幸同泰寺設四部無遮大㑹上釋御服披法衣行清浄大捨以便省為房素牀瓦器乘小車私人執役甲午升講堂法座為四部大衆開涅槃經題十月己酉設四部無遮大㑹僧道五萬餘人㑹畢帝御金輅還宫二年四月幸同泰寺設平等㑹三年冬十月己酉行幸同泰寺髙祖升法座為四部衆説大涅槃經義迄于乙卯十一月乙未行幸同泰寺髙祖升法座為四部衆說摩訶般若波羅宻經義迄于十二月辛丑五年二月癸未幸同泰寺設四部大㑹升法座發金字般若經題迄于己丑大同元年三月丙寅幸同泰寺設無遮大㑹四月幸同泰寺鑄十方銀像并設無碍㑹二年三月戊寅幸同泰寺設平等法㑹九月辛亥幸同泰寺設四部無碍法㑹十月壬午幸同泰寺設無碍大㑹三年五月癸未幸同泰寺鑄十方金像設無碍大㑹八月辛卯輿駕幸阿育王寺大赦天下四年五月癸亥詔以東治徒李裔之降如來真形舎利大赦天下五年扶南國王遣使貢獻又言其國有佛髪長一丈二尺詔遣沙門釋雲寳隨使徃迎之先是三年八月髙祖改造阿育王寺塔出舊塔下舎利及佛爪髪髪青紺色衆僧以手伸之隨手長短放之則旋屈為蠡形按僧伽經云佛髪青而細猶如藕莖絲佛三時經云我昔在宫沐頭以尺量髪長一丈二尺故能右旋還成蠡文則與髙祖所得同也阿育王即鉄輪王王閻浮提一天下佛滅度後一日一夜役鬼神造八萬四千塔此即其一也呉時有尼居其地為小精舎孫綝尋毁除之塔亦同冺呉平俊諸道人復於舊處建立焉晋中宗初渡江更脩餙之至簡文咸安中使沙門安法師程造小塔未及成而亡弟子僧顯繼而脩立至孝武太元九年上金相輪及承露其後西河離石縣有胡人劉薩何遇疾暴亡而心下猶暖其家未敢便殯經七日更蘇說云有兩吏見錄向西北行不測逺近至十八重地獄隨報重輕受諸楚毒見觀世音語云汝縁未盡第得活可作沙門雒下齊城丹陽㑹稽竝有阿育王塔可徃禮拜若夀終則不墮地獄語竟如墮髙嵓忽然醒寤因此出家名惠邃遊行禮塔次至丹陽未知塔處乃登越城四望見長千里有異氣色因就禮拜果是育王塔所屢放光明繇是定知必有舎利乃集衆就掘入一丈得三石碑竝長六尺中有一碑有鉄函函中又有銀函函中有金函盛三舎利及爪髪各一枝髪長數尺即遷舎利近北對簡文所造塔西造一層塔十六年又使沙門僧尚伽為三層即髙祖所開者也初穿土四尺得龍骨及昔人所捨金銀環釧釵鑷等諸雜寳物可深九尺許方至石碑碑下有石函函内有鉄壺以盛銀坩坩内有金鏤罌盛三舎利如粟粒大圓正光潔函内又有琉璃碗碗内得四舎利及髪爪爪有四枚竝為沉香色至其月二十七日髙祖到寺禮拜設無遮大㑹大赦天下是日以金鉢盛水泛舎利其最小者𨼆鉢不出髙祖禮數十拜舎利乃於鉢内放光旋廽乆之乃當鉢中止髙祖問大僧正惠令曰見不可思議事不惠令荅曰法身常住湛然不動髙祖曰弟子欲請一舎利歸臺供養至九月五日又於寺設無遮大㑹遣皇太子王侯朝貴等奉迎是日風景明和京師傾矚觀者百數十萬人所設金銀供具等物竝留寺供養并施錢一千萬為寺基業至四年九月十五日髙祖又至寺設無遮大㑹竪二舎利塔各以金罌次玉罌重盛舎利及爪髪内七寳塔中又以石函盛寳塔分下兩塔下及王侯妃主百姓富室所捨金銀釧等珍寳充積十一年十一月二日寺僧又請髙祖於寺發般若經題爾夕二塔俱放光明勑鎮東將軍邵陵王綸製寺大功徳碑文先是二年改造㑹稽鄞縣塔開舊塔出舎利遣光宅寺釋敬脫等四僧及舎人孫賑蹔迎還臺髙祖禮拜竟即送還縣入新塔下此縣塔亦是劉薩何所得也晋咸和中丹陽尹髙悝行至張侯橋見浦中五色光長數尺不知何恠令人於光處愔視之得金像未有光趺悝乃下車載像還至長千巷首牛不肯進悝乃令馭人任牛所之牛竟牽車至寺悝因留像至寺付寺僧每至中夜常放光明又聞空中有金石之響經一歲臨海漁人張係世於海口忽見有銅花趺浮出水上係世取送縣縣以送臺乃施像足宛然㑹合簡文咸安元年交州合浦人董宗之採珠没水於底得佛光艶交州押送臺以施像又合焉自咸和中得像至咸安歴二十餘年光趺始具初髙悝得像後有西域胡僧五人來詣悝曰昔於天竺得阿育王造像來至鄴下值胡亂埋像於河邉今尋覔失所在五人當其夜俱夢見像已出江東為悝所得乃送此五僧至寺惠邃欲模冩像形寺主僧尚慮虧損金色謂惠邃曰若能令像放光逥身西向乃可相許惠邃便懇禱拜請其夜像即轉座放光廽身西向且便許模之邉跌光有外國書莫有識者後有三藏郍永䟦摩識之云是育王為第四女所造也及大同中出舊塔舎利勑市寺側數百家以廣寺域造諸堂殿并瑞像周廽閣等窮於輪奐焉其圖諸經變竝呉人張僧繇運手繇丹青之工一時冠冕中大同元年三月庚戌法駕出同泰寺省講金字三㑹經夏四月丙戌於同泰寺解講設㑹太清元年三月庚子帝幸同泰寺設無遮大㑹帝升光嚴殿講堂坐師子座講金字三㑹經帝素歸心釋教每發誓願嘗云若有衆生應受諸苦悉朕身代當帝尤長釋典製涅槃大品浄名惠㑹諸義記復數百巻聽覽餘閒即於重雲殿及同泰寺講說名僧願學四部聴衆嘗萬餘人元帝承聖三年九月辛卯於龍光殿述老子義尚書左僕射王褒為執經後梁宣帝詧好學善屬文尤長於佛義著内典華嚴般若法華金光明義疏三十六卷遂行於世初詧以岳陽王鎮荆州甄𤣥成為詧中記室叅軍掌書記頗叅政事後以江陵甲兵殷盛遂懐二心宻與元帝具申誠欵或有得其書者送之於詧詧深信佛法嘗願不殺誦法華經人云𤣥成素誦法華遂以此獲免詧復見之嘗曰甄公得法華經力陳髙祖永定元年十月詔出佛牙於杜姥宅集四部設無遮大㑹髙祖親出闕前禮拜初齊故僧統法獻於烏纒國得佛牙嘗在定林上寺梁天監末為攝山慶雲寺沙門惠興所得惠興將終以屬弟惠志及承聖末惠志宻送于帝至是乃出二年十月輿駕幸莊嚴寺發金光明經題十二月甲子輿駕幸莊嚴寺設無遮大㑹捨乘輿法物羣臣備法駕奉迎即日還宫文帝天嘉四年四月設無遮大㑹於太極前殿後主太建十四年九月丙午設無遮大㑹東魏孝静帝時杜弼為通直散騎常侍從髙歡于晋陽歡命弼奉使詣闕帝見之於九龍殿曰朕始讀莊子便值奏名定是體道得真𤣥同齊物聞卿釋學聊有所問經中佛性法性為一為二弼對曰佛性法性止是一理詔又問曰佛性既非法性何得為一對曰性無不在故不說二詔又問曰說者皆言法性寛佛性愜寛愜既别非二而何弼又對曰在寛成寛在愜成愜若論性體非寛非愜詔又問曰既言成寛成愜何得非寛非愜若定是愜亦不能成寛對曰以非寛愜故能成寛愜所成雖異能成常一帝悅稱善乃引入經書庫賜地持經一部帛一百匹後四月八日帝集名僧於顯楊殿講說佛理弼與吏部尚書楊愔中書令邢邵秘書監魏收等竝侍法筵勑弼升師子座當衆敷演詔𤣥都僧逹及僧道順竝緇林之英問難鋒至徃復數十畨莫有能屈帝曰此賢若生孔門則何如之興和二年春詔以鄴城舊宫為天下平寺世宗以來至武定末沙門知名者有惠猛惠辨惠深僧暹道銀僧獻道晞僧深惠光惠顒法宫道長竝見重於當世自魏有天下至於禪讓佛經流通大集中國凡有四百一十五部合一千九百一十九卷正光已後天下多虞工役猶甚於是所在編民相與入道假慕沙門實避調役猥濫之極自中興之有佛法未之有也略而計之僧尼大衆二百餘萬矣其寺三萬有餘北齊文宣帝天保九年起大莊嚴寺武成帝河清二年五月詔以城南雙堂之菀建造大總持寺八月詔以三臺宫為大興聖寺後主天統二年太上皇帝詔以三臺施興聖寺以赦降囚徒五年正月詔以金鳳等三臺未入寺者施大興聖寺四月詔以并州尚書省為大基聖寺晋祠為大崇皇寺梁太祖開平元年五月廢雍州太清宫改西都太㣲宫亳州太清宫皆為觀諸州紫極宫皆為老君廟又泉州寺僧智宣自西域回進辟支佛骨及梵甲經律此僧自壯歲西遊及還已耄矣既遇新朝又傳佛教亦聖徳之所感契六月改耀州報恩禪院為興國寺九月浙西奏道門威儀鄭章道士夏𨼆言焚修精志妙逹希夷推諸軰流實有道業鄭章宜賜號貞一大師仍名𤣥章𨼆言賜紫衣二年六月邕州奏鏌鎁山僧法通道璘有道行各賜紫衣八月兩浙錢鏐奏改管内紫極宫為真聖觀三年福建節度使王審知奏捨錢造寺一所請賜寺額勑名大梁萬歲之寺仍許度僧四十九人四年正月賜湖南開元寺禪長老可復號惠光大師仍賜紫衣五年二月泌州置善䕶寺乾化元年六月詔修天宫佛寺又湖南奏潭州僧法思桂州僧歸真竝乞賜紫衣可之二年夏文武官竝詣佛寺為皇帝設齋命閤門使李元持香合賜之又中書奏為皇帝於長夀寺啟消災道塲末帝龍徳初祠部員外郎李樞上言請禁天下私度僧尼及不許妄求師號紫衣如願出家受戒者皆湏赴闕比試藝術施行願歸俗者一聽自便詔曰兩都左右街賜紫衣及師號僧委功徳使具名奏聞今後有闕方得奏薦仍湏道行精至夏臈髙深方得補填每遇明聖節兩街各許官壇度七人諸道如要度僧亦仰就京官壇仍令祠部給牒今後只兩街置僧録諸道僧正竝廢冊府元龜卷一百九十四
