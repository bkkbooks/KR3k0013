用所費不多隨處等力之名皆有定數多是擅放甚為貪汚時望降以嚴條除其宿弊伏慮州縣官逐月所給正俸皆無見錢使府給配之時皆是虚額計算伏請州縣官所給料錢雜物准折一依逐處時估者臣等叅詳凡闗課户皆是強名縣宰將治凋疲不合别生差配據兹條件請賜改更所給料錢難議條理勑㫖冝並施行六年二月甲午詔諸衞上將軍月増俸錢二萬少帝天福八年二月權知開封府事邊蔚逐月支錢七十貫米五石麵十石傔人十人日食十匹馬草料别支公用米二十石麵五十石羊二十口每年麵三十斤錢四百貫漢少帝乾祐三年七月勑節文諸道州府令録判司主簿冝並等第支與俸户每月納錢五百文與除二稅外免放雜差遣不得更種職田所定俸户於中等無色役人户内差置不得令當直及赴衙叅如有闕額及不逹明申州府差填不得裏私替換若是令録判司主簿除本分人數外剰占一人俸户及今當直手力更納課錢並許百姓陳告事若不虚其陳告人與免户下諸雜差徭所犯人追毁告身配遽力役如令佐録事叅軍内有員闕州府差攝亦依例支與俸錢其差攝曹官不得援例供破内三千以上縣令逐月一十貫文主簿六貫文一千户已上至三千户縣令八貫文主簿五貫文一千户以下縣令六貫文主簿四貫文録事叅軍判司依本部内户口取最多縣分例支破其録事叅軍依縣令例判司即依主簿例周太祖廣順元年四月勑牧守之任委遇非輕分憂之務既同制禄之數冝等自前者冨庶之郡請給則優或邉逺之州俸料素薄以至遷除之際擬議亦難既論資叙之高低又患禄秩之昇降所宜分多益寡均利同恩兾無黨偏以勸勲効今重定則例者州防禦使料錢二百貫禄粟百石食塩五石馬十匹草粟元隨三十人衣糧團練使料錢一百五十貫禄粟七十石食塩五石馬十匹草粟元隨三十人衣糧刺史料錢一百貫禄粟五十石食塩五石馬五匹草粟元隨二十人衣糧仍取今年五月一日後到任者依新定例支其已前在任者所請如故世宗顯徳三年十二月謂侍臣曰文武百寮所請俸給支遣之時非唯後於諸軍抑亦又多折估豈均飬之理邪如其有過朕不敢私責重俸薄甚無謂也此後並冝支與實錢五年十二月中書奏諸道州府縣官及軍事判官一例逐月各據逐處主户等第依下項例别定料錢及米麥等取顯徳六年三月一日後起支其俸户並停廢一萬户已上縣縣令逐月料錢二十貫米麥共五石主簿料錢一十二貫米麥共三石七千户已上縣縣令每月料錢一十八貫米麥共五石主簿料錢一十貫米麥共三石五千户已上縣縣令逐月料錢一十五貫米麥共四石主簿料錢八貫米麥共三石三千户已上縣縣令逐月料錢一十二貫米麥共四石主簿料錢七貫文米麥共二石不滿三千户縣縣令逐月料錢一十貫米麥共三石主簿料錢六貫米麥共二石五萬户已上州司録録事叅軍及兩京司録每月料錢二十貫米麥共五石司户司法每月料錢一十貫米麥共三石三萬户已上州司録録事叅軍每月料錢一十八貫米麥共五石司户司法料錢八貫米麥共三石一萬户已上州司録録事叅軍每月料錢一十五貫米麥共四石司户司法每月料錢七貫米麥共三石五千户已上州司録録事叅軍每月料錢十二貫米麥共四石司户司法每月料錢六貫米麥共二石不滿五千户州録事叅軍每月料錢一十貫米麥共三石司户司法每月料錢五貫米麥共二石諸州軍事判官一例每月料錢一十貫米麥共二石其諸州府京百司内諸司州縣官課户莊户俸户柴炭紙筆户等望令本州及簡田使臣依前項指揮勒歸州縣侯施行畢具户數聞奏仍差本判官精細㸃簡如他後差使臣㸃簡及有人論訴稱其漏落祗罪在本判官及行繫官典如今後更有人户願充此等户者便仰本州勒充軍户配本州牢城執役從之六年十二月詔諸道州府攝官起今後支給本官所請俸錢之半冊府元龜卷五百八
