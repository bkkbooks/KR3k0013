  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_508-1a}
body:
  text: 册府元龜卷五百八宋王欽若等撰邦計部俸禄第四唐武宗以開成五年正月即位二月制曰諸道承乏官等雖云假攝當責課程但霑一半料錢不獲雜給料例自此手力紙筆特委中書門下條流貴在酌中共為均濟三月中書門下奏准今年二月八日赦節文應京諸司勒留官令本處尅留手力雜給錢與攝官者臣等檢詳諸道正官料錢絶少雜給手力即多今正勒留亦管公事俸入多少事未得中臣等商量其料錢雜給等錢望毎貫割留二百文典攝官其職田禄米全還正官從之五月中書奏准今年二月八日赦節文應諸色勾留官令尅下手力雜給等與本道州府充攝官課料無本司起請者臣等詳檢諸道官員俸料不一或正官料錢絶少雜給雜料過多若准赦文手力紙筆並令尅下則正官勾留亦領公事所請俸料不如攝官既未得中亦恐難守本司既無起請中書門下須與條流臣等商量應諸色勾留官正料及手力課雜職課雜給雜料紙筆等錢望各委本州都計錢數每貫剋二百文充攝官俸料其職田禄粟米望令全還正官不在計入諸色錢數之限臣等又以諸州長馬本是散員判司簿尉或須假攝其所剋留錢望委州司酌量閑劇差署均融多少支給亦不要各占本色錢數及填滿缺貟仍令每至歲終分析申報户部從之㑹昌元年二月中書奏河東隴右諸州或興王舊都或陪京近地州縣之職人合樂為祗縁禄俸寡薄官同北逺元和六年閏十二月十二日及元和七年十二月二十四日勑河東鳯翔鄜坊邠州易定等道令户部加給課料錢共六萬二千五百貫文曹省出得平留官數百員時議以為至當自後訪聞户部所給零碎兼不及時觀察使以其虚折皆别將破用徒有加給不及官人近地好官依前北逺伏望今日已後令户部却興實物仍及時支遣諸道並委觀察判官專判此案隨月加給官人不得别將破用如有違越觀察判官逺貶觀察使奏取進止有選人官成後皆于城中舉債到任填還致其貪求罔不繇此其今年河東隴州鄜坊邠州新授北逺官等許連狀相保户部各借兩月加給料錢至支給時尅下所兾初官到任不滯息債衣食稍足可責清亷從之四月河南府奏當府食利本錢出舉與人勑㫖河南府所置本錢用有名額既無别賜所闕則多宜令改正名額依舊收利充用六月河中晉絳慈隰等州觀察使孫簡奏准赦書節文量縣大小各置本錢逐月四分收利供給不乗驛前觀察使刺史前任臺省官等晉慈隰三州各置本錢訖得絳州申稱無錢置本令使司量貸錢二百貫充置本以當州合送使錢充勑㫖冝依仍付所司是月户部奏准正月九日勑文放免諸司食利錢每年别賜錢三萬貫文充諸司公用今准赦文酌量閑劇率配如後准長慶三年十二月九日勑賜諸司食利本錢共八萬四千五百貫文四分收利一年祗當四萬九百九十二貫文今據赦文所賜錢三萬貫文若據舊數率配即欠一萬九百九十二貫不足今請落下徴錢驅使官每貫二百文課並更請於合給錢内四分中落一分均攤分配長慶三年得新賜錢三十二司外更有剰錢五百四貫八百文便將此錢均給東都臺省等一十四司祗用新賜錢三萬貫文並得充足諸司雖落下一分錢縁置驅使官員於人户上徴錢皆被延引或人逃散失落常不得足雖有四分收利之名而無三分得利之實今新賜錢入日便請更無懸欠用即可足繁劇司比有官錢出放欠亦侵用本錢今既無本錢支料須足伏縁中書門下公事不同諸司恐不可落下一分及徴錢人課今請每月並舊錢添至三百貫文其御史臺頻得報牒稱本錢數多支用處廣雖有諸道贓罰錢公用常不充足今請每月合得利錢數外每月更添至三百貫文内侍省據自司報牒稱省内公用稍廣利錢比於諸司最多今請於合得錢外亦添至三百貫文兵部吏部尚書等銓一十一司縁有舊本錢准勑放免又有公事今請每月共與一百五十貫文并中書門下御史臺及兵吏部諸銓每年共當六千八百二十九貫六百文伏縁三萬貫文均給諸司已盡臣今於新賜外更請添賜上件錢所費不廣所利至多則内外諸司永得優足伏望聖恩允臣所奏其諸司分配賜錢若據諸司牒報見收利多少分配或以人户逃散經恩放免見在本錢所存無幾其間有三五司自方圎致本數即稍多事例不同難於均一人吏得以欺隱實數不可交尋今請依長慶三年十二月九日均賜錢勑額分配新賜錢三萬貫事有根抵亦得均平酌量閑劇皆有所據其逐日錢數多少續具子細分析聞奏勑旨宜依二年正月勑去年赦書所放食利祗是外百司食錢令户部共賜錢訖若先假以食利為先將充公用者並不在放免如聞内諸司息利錢皆以食利為名百姓因此亦求蠲免冝各委所司不在放免限六年二月詔以諸道鑄錢已有次第須令舊錢流布絹價稍増文武百寮俸料起三月一日並給見錢其一半先給虚匹段對估時價支給三月户部奏百官俸料一半匹段給見錢則例勑㫖其一半先給元估匹段者冝令户部准元和十二年四月十三日勑例每貫給見錢四百文使起四月以後支給八月勑夏州等四道土無絲蠶地絶征賦自節度使以下俸料賞設皆尅官徤衣糧所以兵占虚名軍無戰士緩急㓂至無以支敵將欲責課又皆有詞須有商量用革前弊夏州靈武振武節度使冝每月各給料錢厨錢共三百貫文監軍每月一百五十貫文别勑判官每月五十貫文節度副使每月七十貫文判官掌書記觀察判官每月各五十貫文推官四十貫文賞設每道每年給五千貫文修器械每道給二千貫文天徳軍使料錢厨錢每月共給二百貫文監軍每月二百貫文都防禦副使每月五十貫文判官每月四十貫文廵官每月三十貫文賞設每年給三千貫文修器仗每年一千貫文如以後依前兵額不實器仗不修其本判官重加貶降王師别舉處分其所給料錢等並以户部錢物充起十月支給一年以後仍每秋一度差御史一人㸃簡兵士器仗聞奏十月京兆府奏諸縣徴納京百司官秋職田斛斗等伏請從今已後却准㑹昌三年已前舊例上司官斛斗勒人户使自送納所兾輸納簡便百官各得本分職田縣司所由無因隱欺者並從之十二月中書門下奏應諸州刺史既欲責其潔已須令俸禄稍充但以厚薄不同等給無制致使俸薄處無人願去禄厚處終日争先應諸中下州司馬軍事俸料共不滿一百千者諸添至一百千其緊上州不滿一百五十千者請添至一百五十千其雄望州不滿二百千者請添至二百千其先已過者即得仍舊並任於軍事雜錢中方圎置本收利充給如别帶使額者並仍舊不在添限勑旨依准奏宣宗大中元年十月屯田奏應内外官請職田陸田限三月三十日水田限四月三十日麥田限九月三十日已前上者入後人已後上者入前人伏以令式之中並不該閏月每遇閏月交替者即公牒紛紜有司即無定條莫知所守伏以公田給使須准期程時限未明實恐遺闕今請至前件月遇閏即以十五日為定式十五日已前上者入後人已後上者入前人據今條其元闕職田並限六月三十日春麥限三月三十日宿麥限十二月三十日已前上者入新人已後上者並入舊人今亦請至前件月遇閏即以十五日為定式所兾給受有制永無訴論勑曰五歲再閏固在不刋二稔職田須有定制自此已後冝依屯田所奏永為常式三年九月勑秦州刺史並秦成兩州經略天雄軍使職田夏小麥共八十石秋粟一百二十石原威州刺史職田夏小麥各二十三石秋粟各六十六石七斗又勑秦州刺史禄粟每月給五十一石原州威州刺史禄粟每月各給四十一石四年正月勑設官分局各有主張其於在公責辦斯切諸州府及縣官到任已後多請逺假或稱周親疾病或言將赴婚姻令式既有假名長吏難為止遏遂使本曹公事併委北廳手力俸錢盡為己有勤勞責罰則在他人須有條流俾其兼濟其諸州府縣官如請公廨假故一月已下即任權差諸廳判官一月已下即任權差諸廳判官一月已上即准勾留例其課料等據數每尅二百文與見判案官添給九月賜張直方簡校工部尚書料錢直方仲武之子以其全家歸闕故優假之哀帝天祐元年八月四鎭節度使朱全忠進汴滑監軍使俸料絹四千匹充百官八月九日俸錢九月勑奉太后慈㫖以兩司綱運未來百官事力多闕旦夕霜冷深軫所懷令於内庫方圓銀二千一百七十二兩充見任文武嘗參官救接委御史臺依品秩分俵二年四月勑文武二柄國家大綱東西兩班官職同體咸禆聖運共列朝廷品秩相對於高卑禄俸皆均於厚薄不論前代祗考本朝太宗皇帝以中外臣寮文武叅用或自軍衞而居臺省亦繇衣冠而秉節旄足可明武列文班不合分清濁優劣近代浮薄相尚凌蔑舊章假偃武以修文競棄本而逐末雖藍衫魚章簡一見而便許昇堂縱拖紫腰金若非類而無繇接席以是顯揚榮辱分别重輕遽失人心盡隳朝體致其今日實此之由須議更改漸期通濟文武百官自一品已下逐日所給料錢並須均勻數目多少一般支給兼差使諸道亦依輪次既就公平必期開㤗凡百臣庶宜體朕懷三年三月詔曰所有百官俸料實繋國用盈虚昨自去冬令給全俸及支遣之後公帑不充蓋道途初通綱運未集徒挂憂勤之念尚牽經費之資若不議均分則必至懸絶量其物用須有指揮其百官逐月料錢宜令左藏庫自今年正月支半俸梁太祖開平三年正月詔曰秩俸所以飬賢而勵奉公也兵車未戢貢賦莫充朝謁甚勤禄廪盖寡朕今啓建都市已畢郊禋職采至多費用差少其百官逐月俸料委左藏庫依前例全給後唐莊宗同光元年十月勅如聞京百官俸錢至薄骨肉數多支贍不充朝夕難遣為庭時刻削嚴急不敢披陳今既混同是行優恤下御史臺在班行有欲求外職或要分司各許於中書門下投狀奏聞三年二月租庸院奏諸道州縣官並防禦團練副使判官等俸料各據逐處供到事例文帳内㸃簡舊來支遣則例錢數不等所折給物色又加擡錢數不定難為勘㑹合除東京管内州縣官見支手力課錢且依舊外其三京並諸州約舊日支遣料錢等重定則例兼切循本朝事體防禦團練除副使判官外其餘推廵已下職員皆是本使自要辟請圓融月俸贍給亦乞依舊規繩省司更不給支錢物其防禦團練副使判官副使逐月料錢三十貫文實判官逐月二十貫文實刺史州元無副使若有請廢其軍事判官所有月俸亦是刺史俸内支贍三京少尹料錢逐月三十貫文實赤縣令每月正授料錢二十五貫文實主簿每月料錢一十二貫文實畿縣令每月料錢二十貫文實主簿每月料錢一十貫文實司録叅軍每月料錢二十貫文實諸曹判司每月料錢一十二貫文實文學參軍每月料錢五貫文實諸州府録事參軍各依逐州上縣令支州司判司各依逐州上縣主簿支一萬户已上縣縣令每月料錢二十三貫文實主簿每月料錢一十二貫五百文實九千户已上縣縣令每月料錢二十二貫文實主簿每月料錢一十二貫文實八千户已上縣縣令每月料錢二十一貫文實主簿每月支一十貫五百文實七千户已上縣縣令每月支二十貫文實主簿每月支一十一貫文實六千户已上縣縣令每月支一十九貫文實主簿每月支一十貫五百文實五千户已上縣縣令每月支一十八貫文實主簿每月支一十貫文實四千户已上縣縣令每月支一十七貫文實主簿每月支九貫五百文實三千户已上縣縣令每月支一十六貫文實主簿每月支九貫文實二千五百户已上縣縣令每月支一十五貫文實主簿每月支八貫五百文實二千户已上縣縣令每月支一十四貫文實主簿每月