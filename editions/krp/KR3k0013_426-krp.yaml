body:
  text: 册府元龜卷四百二十六宋王欽若等撰將帥部招降夫舞干之義載於虞書前禽之訓昭回羲易自大道之䘮佳兵是用勝者類封豕之荐食敗者同困獸之猶闘是以肝腦塗地城郭為墟斯豈明王來蘇之意先賢節奏之舉乎其有授鉞於廟建牙作藩董兹戎服共行天罰乃能宣布德澤招來携貳結之以恩信格之以誠明先聲以奪其心大義以回其志使其奔走而獻欵俯伏而求全斯亦善師不陣之謂矣至或孤壘危急士衆離析閔以窮困釋其怨疾俾夫洗滌以更始感激而效忠雖云仁者之志抑亦兵家之竒焉漢項羽為楚懐王上將軍救趙秦將章邯軍棘原羽軍漳南相持未戰秦軍數却二世使人譲章邯邯恐使長史欣請事至咸陽留司馬門三日趙高不見欣恐還走至軍門曰事亡可為者言不可復為軍旅之事陳餘亦遺章邯書曰將軍何不還兵與諸侯為從言欲如六國時共敵秦南面稱孤孰與身伏斧質妻子為戮乎章邯狐疑陰使候始成使羽欲約軍候姓始名成約未成羽使蒲將軍軍漳南與秦戰再破之羽悉引軍擊秦軍汙水上大破之邯使使見羽欲約羽召軍吏謀曰糧少欲聴其約軍吏曰善羽乃與盟洹水南殷墟上已盟邯見羽流涕為言趙高魏豹傳云項羽破秦軍降章邯韓信擊破趙軍用廣武君李左車䇿發使燕燕從風而靡後漢趙憙字伯陽南陽宛平人也更始卽位武隂大姓李氏擁城不下更始遣柱天將軍李寶降之不肯云聞宛之趙氏有孤孫憙信義著名願得降之更始乃徴憙憙年未二十旣引見更始笑曰繭栗犢豈能負重致遠乎卽除為郎中行偏將軍事使詣舞隂而李氏遂降憙因進入潁川擊諸不下者歴汝南界還宛更始大悦謂憙曰卿名家駒努力勉之武帝謂劉德為千里之駒故以憙比之以戰勞拜中郎將封勇功侯時江南未賔道路不通以憙守簡陽侯相憙不肯受兵單車馳之簡陽吏民不欲内憙憙乃告譬呼城中大小示以國家威信其帥卽開門靣縛自歸繇是諸營壁悉降荆州牧奏憙才任理劇詔以為平林侯相攻擊羣賊安集已降者縣邑平定吳漢為大司馬既擊破五校賊時鬲縣五姓共遂守長據城而反諸將爭欲攻之漢不聽曰使鬲反者皆守長罪也敢輕冒進兵者斬乃移檄告郡使收守長而使人謝城中五姓皆喜卽相率降諸將乃服曰不戰而下城非衆所及也又更始尚書令謝躬留魏郡太守陳康守鄴大率諸將擊菜賊世祖因躬在外乃使漢襲其城漢先令辨士説陳康曰盖聞上智不處危以僥倖中智能因危以為功下愚安於危以自亡危亡之至在人所繇不可不察今東師敗亂四方雲擾公所聞也蕭王兵强士附河北歸命公所見也謝躬内背蕭王外失衆心公所見也公今據孤危之城待滅亡之禍義無所立節無所成不若閉門内軍轉禍為福免下愚之敗收中智之功此計之上者也康然之於是收劉慶及躬妻子開門内漢等馮異為孟津將軍統魏郡河内二郡軍河上與河内太守冦恂合勢以拒更始將朱鮪等異乃遺李軼書曰愚聞明鏡所以照形徃事所以知今昔㣲子去殷而入周項伯畔楚而歸漢周勃迎代王而黜少帝霍光尊孝宣而廢昌邑彼皆畏天知命覩存亡之符見廢興之事故能成功於一時垂業於萬世也茍令長安尚可扶助延期嵗月疏不間親遠不踰近季文豈能居一隅哉今長安壊亂赤眉臨郊王侯搆難大臣乖離綱紀已絶四方分散異姓並起蕭王䟦渉霜雪經營河北方今英俊雲集百姓風靡雖邠岐慕周不足以踰季文誠能覺悟成敗亟定大計論功古人轉禍為福在此時矣如猛將長驅嚴兵圍城雖有悔恨亦無及已初軼與光武首結謀約加相親愛及更始立反䧟戮伯升雖知長安已危欲降又不自安乃報異書曰軼本與蕭王首謀造漢結死生之約同勞苦之計今軼守雒陽將軍鎭孟津俱據機軸千載一㑹思成斷金唯深逹蕭王願進愚䇿以佐國安人軼自通書之後不復與異爭鋒故異因此得北攻天井關㧞上黨兩城又南下河南成臯巴東十三縣及諸屯聚皆平之降者十餘萬岑彭為廷尉行大將軍事與大司馬呉漢等圍雒陽數月更始將朱鮪堅不下光武以彭嘗為鮪校尉令徃説鮪鮪在城上彭在城下相勞苦如平生鮪因曰大司徒被害鮪預其謀大司徒光武兄伯升為更始所殺又諫更始無遣蕭王北伐自知罪深彭還具言於帝帝曰夫建大事者不念小怨鮪今若降官爵可保况誅罰乎彭復告鮪鮪從城上下索曰必信可乘此上彭趣索欲上鮪見其誠卽許降後五日鮪將輕騎詣彭乃靣縛與彭俱詣河陽帝卽解其縛與見之復令彭夜送鮪歸城明旦悉其衆出降彭後為征南大將軍伐蜀以夾川谷少水險難漕運留威虜將軍馮駿軍江州都尉田鴻軍夷陵領軍李𤣥軍夷道自引兵還屯津鄉當荆州要會喻告諸蠻夷降者奏封其君長初彭與交阯牧鄧讓厚善與讓書陳國家威德又遣偏將軍屈充移檄江南頒行詔命於是讓與江夏太守侯登武陵太守王堂長沙相韓福桂陽太守張隆零陵太守田翕蒼梧太守杜穆交阯太守錫光等相率遣使貢獻悉封為列侯或遣子將兵助彭征伐於是江南之珍始流通焉又自率臧宫劉歆長驅入江關令軍中無得虜掠所過百姓皆奉牛酒迎勞彭見耆老為言大漢哀愍巴蜀乆見虜役故興師遠伐以討有罪為人除害讓不受其牛酒百姓大喜悦争開門降馬援為隴西太守遣羗豪楊封譬説塞外羗皆來和親又武都氐人背公孫述來降者援皆上復其侯王君長賜印綬光武喜悉從之來歙為中郎將建武七年帝使歙至沂歙以書招隗囂大將軍王遵遵乃與家屬東詣京師王遵隗囂將也後去囂詣京師拜大中大夫封尚義侯光武率諸將上隴使遵持節監大司馬呉漢留營於長安時囂將牛邯軍瓦亭遵知囂必敗滅而與牛邯舊故知其有歸義意以書喻之曰遵與隗王㰱盟為漢自經歴虎口踐履死地已十數矣于時周雒以西周雒謂東都也無所統壹故為王䇿欲東收關中北取上郡進以奉天人之用退以懲外夷之亂數年之間兾聖漢復存當挈河隴奉舊都以歸本朝生民以來臣人之勢未有便於此時者也而王之將吏羣居宂處之徒宂處言所識不逺也人人抵掌説文抵掌擊也戰國䇿云蘇秦與趙王抵掌而談也欲為不善之計遵與孺卿日夜所爭害幾及身者豈一事哉前計抑絶後䇿不從所以吟嘯扼腕垂涕登車扼持也史記云天下之士莫不扼腕以言之幸蒙封拜得延論議遵為大中大夫在議論之職每及西州之事未嘗敢忘孺卿之言今車駕大衆已在道路呉耿驍將雲集四境而孺卿以奔離之卒拒要扼當軍衝視其形勢何如哉夫智者覩危思變賢者泥而不滓在泥塗之中而不滓汚也是以功名終申䇿畫復得故夷吾束縛而相齊新序日桓公與管仲鮑叔寗戚飲桓公謂鮑叔曰姑為寡人祝乎鮑叔奉酒而起祝曰吾君無忘在莒也使管子無忘束縛從魯也使寗戚無忘其飲牛于車下也黔布仗劔以歸漢黥布為楚淮南王高祖使隨何説布乃仗劔歸漢王去愚就義功名并著今孺卿當成敗之際遇嚴兵之鋒可為怖慄宜斷之心胷參之有識邯得書沉吟十數日乃謝士衆歸命雒陽拜為大中大夫於是囂大將十三人屬縣十六衆十餘萬皆降應奏為武陵太守奉詔誘叛蠻降之祝良為九真太守與交阯刺史張喬慰誘日南叛蠻降之嶺外乃平曹宗為燉煌太守時北匈奴與諸國共為邊冦宗患其暴害遣行長史索班將千餘人屯伊吾以招撫之於是車師前王及鄯善王來降龎參為䕶羗校尉時燒當羗種號多還斷隴道參以恩信招誘之號多等率衆七千人詣參降馮緄為度遼將軍詔緄招降叛虜於是右賢王部抑鞮等萬三千口詣緄降夏方為交阯刺史時南蠻夷攻燒城邑方招誘降之馮續為隴西太守鮮卑冦邊以續為遼東太守曉諭降集虜皆彌散又遷車騎將軍討長沙零陵蠻賊軍至長沙賊悉詣營道乞降營道今道州縣也進擊武陵蠻夷斬首四千餘級受降十餘萬人荆州平定劉表鎭荆州張濟引兵至荆州賈詡隨之歸表襄陽城守不受濟因攻之為流矢所中濟從子繡収衆而進表自責以為已無賔禮遣使招繡繡遂屯襄陽為表比藩劉虞字伯安初為幽州刺史恩信流著戎狄附之公孫瓉討羌有功進屯屬國與胡相擊五六年丘力居等鈔畧青徐幽冀四州被其害瓉不能禦朝議以虞旣有德義若使鎭撫可不勞衆而定乃以虞為幽州牧虞到遣使至胡中告以利害責使送張純首丘力居等聞虞至喜各遣譯自歸瓉害虞有功乃陰使人邀殺胡使胡知其情間行詣虞虞上罷諸屯兵但留瓚將歩騎萬人屯右北平純乃棄妻子迯入鮮卑為其客王政所殺送首詣虞封政為列侯以功即拜虞大司馬封襄賁侯吕布為徐州牧在下邳東海蕭建為琅邪相治莒保城自守不與布通與建書曰天下舉兵本以誅董卓耳布殺卓來詣關東欲求兵西迎大駕光復雒京諸將自還相攻莫肯念國布五原人也去徐州五千餘里乃在天西北角今不來共爭天東南之地莒與下邳相去不遠宜當共通君如自遂以為郡郡作帝縣縣自王也昔樂毅攻齊呼吸下齊七十餘城唯莒卽墨二城不下所以然者中有田單故也布雖非樂毅君亦非田單可取布書與智者詳共議之建得書卽遣主簿齎牋上禮貢良馬五匹魏鍾繇漢末為尚書僕射時關中諸將馬騰韓遂等各擁强兵相與爭太祖方有事山東以關右為憂乃表繇以侍中守司𨽻校尉持節都督關中諸軍委之以後事特使不拘科制至長安移書騰遂等為陳禍福騰遂遣子入侍董昭漢末為河南尹時張楊為其將楊醜所殺楊長史薛𢎞河内太守繆尚城守待袁紹救太祖令昭單身入城告喻𢎞尚等即日舉衆降以昭為冀州牧時袁紹遣將領顔良攻東郡又徙昭為魏郡太守從討良良死後進圍鄴城袁紹同族春卿為魏郡太守在城中其父元長在揚州太祖遣人迎之昭書與春卿曰盖聞孝者不背親以要利仁者不忘君以狥私志士不探亂以徼幸智者不詭道以自危足下大君昔避内難南游百越非疏骨肉樂彼呉㑹智者深識獨或宜然曹公愍其守志清恪離羣寡儔故特遣使江東或迎或送今將至矣就令足下處偏平之地依德義之主居有太山之固身為喬松之偶以義言之猶宜背彼向此舎民趣父也且邾儀父始與隠公盟魯人喜之而不書爵然則王所未命爵尊不成春秋之義也况足下今日之所託者乃危亂之國所受者乃矯誣之命乎茍不逞之與羣而厥父之不恤不可以言孝忘祖宗所居之本朝安非正之奸職難可以言忠孝忠並替難以言智又足下昔者為曹公所禮辟夫戚族人而疎所生内所寓而外王室懐邪禄而叛知已遠福祚而近危亡棄明義而收大耻不亦可惜耶若能翻然易節奉帝養父委身曹公忠孝不墜榮名彰矣宜深留計早决良圖鄴既定以昭為建義大夫徐晃為偏將軍太祖圍鄴破邯鄲易陽令韓範偽以城降而拒守太祖遣晃攻之晃至飛矢城中為陳成敗範悔晃輙降之既而言於太祖曰二袁未破諸城未下者傾耳而聽今日滅易陽明日皆以死守恐河北無定時也願公降易陽以示諸城則莫不望風太祖善之又為横野將軍後征張魯别遣晃討攻櫝仇夷諸山氐皆降之遷平冦將軍張遼遷裨將軍太祖遣定魯國諸縣與夏侯淵圍昌豨於東海數月糧盡議引軍還遼謂淵曰數日已來每行諸圍豨輙屬目視遼又其射矢更稀此必豨計猶豫故不力戰遼欲挑與語儻可誘也乃使謂豨曰公有命使遼傳之豨果下與遼語遼為説太祖神武方以德懐四方先附者受大賞豨乃許降遼遂單身上三公山入豨家拜其妻豨歡喜隨詣太祖太祖遣豨還責遼曰此非大將法也遼謝曰以明公威信著於四海遼奉聖㫖豨必不敢害故也呉全琮為安東太守明賞罰招誘降附數年中得萬餘人吕蒙為偏將軍領尋陽令魏使廬江謝竒為蘄春典農屯晥田鄉數為邊冦蒙使人誘之不從則伺隙襲擊竒遂縮退其部伍孫子才宋豪等皆携負老弱詣蒙降又劉備令關羽鎮守專有荆土大帝令蒙西取長沙零桂三郡蒙移書二郡望風歸服乂關羽討樊蒙浮江襲其空虗蜀將軍傅士仁在公安拒守蒙令虞翻説之翻至城門謂守者曰吾欲與汝將軍語仁不肯相見乃為書曰明者防禍於未萌知者圖患於將來知得知失可與為人知存知亡足别吉㓙大軍之行斥候不及施𤇺火不及舉此非天命必有内應將軍不先見時時至又不應之獨守縈帶之城而不降死戰則毁宗滅祀為天下譏笑吕虎威欲到南郡斷絶陸道生路一塞案其地形將軍為在箕舌上耳奔走不得免降則失義竊為將軍不安幸熟思焉仁得書流涕而降翻謂蒙曰此譎兵也當將仁行留兵備城遂將仁至南郡南郡太守糜芳城守蒙以仁示之遂降呉録云初南郡城中失火頗焚燒軍噐羽以責芳芳内畏懼呉聞而誘之芳潜相和及䝉攻之乃以牛酒出降焉蒙入據城盡得羽及將士家屬皆撫慰令軍中不得干歴人家有所求取蒙麾下士是汝南人取民家一笠以覆官鎧官鎧雖公蒙猶以為犯軍令不可以鄉里故而廢法遂垂涕斬之於是軍中震慄道不拾遺蒙旦暮使親近存恤耆老問所不足疾病者給醫藥饑寒者賜衣糧羽府藏財寳皆封閉以待大帝至羽還在道路數使人與蒙相聞蒙輙厚遇其使周㳺城中家家致問或手書示信羽人還私相參訊咸知家門無恙見待過於平時故羽吏士無闘心㑹大帝尋至羽自知孤窮乃走麥城西至漳鄉衆皆委羽而降大帝使朱然潘璋斷其徑路即父子俱獲荆州遂平陸𦙍為交州刺史安南校尉時交阯九真夷賊攻沒城邑交阯騷動𦙍入南界喻以恩信務從招納高凉渠帥黄呉等支黨三千餘皆出降引軍而南重宣至誠遺以財幣賊帥百餘人民五萬餘家深幽不覊莫不稽顙交域清㤗就加安南將軍復討蒼梧建陵賊破之前後出兵八千餘人以充軍用諸葛恪為左輔都尉大帝令恪守節度掌軍糧穀非其好也恪以丹陽山險民多果勁雖前發兵徒得外縣平民而已其餘深逺未能擒盡屢自求乞為官出之三年可得甲士四萬衆議咸以丹陽地勢險阻與呉郡㑹稽新都鄱陽四郡鄰接周旋數千里山谷萬重其幽䆳民人未嘗入城邑對長吏皆仗兵野逸白首於林莽逋亡宿惡咸共逃竄山出銅鐵自鑄甲兵俗好武習戰高尚氣力其升山赴險抵突叢棘若魚之走淵猨􅀈之騰木也時觀間隙出為冦盜毎致兵征伐尋其窟藏其戰勝則蠭至敗則鳥竄自前世以來不能覊也皆以為難恪父瑾聞之亦以事終不逮恪盛陳其必㨗大帝拜恪撫越將軍領丹陽太守授棨㦸武騎三百拜畢命恪備威儀作皷吹導引歸家時年三十二恪到府乃移書四郡屬城長吏令保其疆界明立部位其從化平民悉令屯居乃分内諸將羅兵幽阻但繕藩籬不與交鋒候其榖稼將熟輙縱兵芟刈使無遺種舊穀既盡新田不收平民屯居畧無所入於是山民饑窮漸出降首恪乃復勅下曰山民去惡從化皆當撫慰徙出外縣不得嫌疑有所執拘臼陽長胡伉得降民周遺遺舊惡民困廹暫出内圖叛逆伉縛送詣府恪以伉違教遂斬以狥以狀表上氐聞伉坐執人被戮知官惟欲出之而已於是老㓜相携而出嵗期人數皆如本規恪自領萬人餘分給諸將蜀諸葛亮為丞相録尚書事建興三年亮南征歸至漢陽縣降人李鴻來詣亮亮見鴻時蔣琬與費詩在坐鴻曰聞過孟逹許適見王冲從南來言徃者逹之去就明公切齒欲誅逹妻子頼先主不聽耳逹曰諸葛亮見願有本末終不爾也盡不信冲言委仰明公無復已已亮謂琬詩曰還都當有書與子度相聞詩進曰孟逹小子昔事振威不忠後又背叛先主反覆之人何足與書耶亮黙然不荅亮欲誘逹以為外援竟與逹書曰徃年南征嵗未及還適與李鴻㑹於漢陽承知消息慨然永嘆以存足下平素之志豈徒空託名榮貴為華離乎嗚呼孟子斯實劉封侵陵足下以傷先主待士之義又鴻道王冲造作虗語云足下量度吾心不受冲説尋表明之言追平生之好依依東望故遣有書逹得亮書數相交通辭欲叛魏魏遣司馬宣王征之即斬滅逹亮以逹無欵誠之心故不救助也晉祖逖為豫州刺史樊雅據醮郡反逖使桓宣説之雅與宣置酒結友遣子隨宣詣逖少日雅便自詣逖逖遣雅還撫其衆僉謂前數罵辱逖懼罪不敢降雅閉城自守逖徃攻之復遣宣入説雅雅即斬異已者遂出降陶侃為龍驤將軍征杜弢弢將王貢精卒三千出武陵江誘五谿夷以舟師斷官運徑向武昌侃使鄭攀及伏波將軍陶延夜趨巴陵濳師掩其不備大破之斬千餘級降萬餘口貢遁還湘城賊中離阻杜弢遂疑張奕而殺之衆情益懼降者滋多王貢復挑戰侃遥謂之曰杜弢為益州吏盜用庫錢父死不奔䘮卿本佳人何為隨之也天下寧有白頭賊乎貢初横脚馬上侃言訖貢歛容下脚辭色甚順侃知其可動復令諭之截髪為信貢遂來降而弢敗走進尅長沙獲其將毛寳高寳梁堪而還又為廣州刺史先是廣州人迎長沙人王機為刺史機復遣使詣王敦乞為交州刺史敦從之㑹杜𢎞據臨賀因機乞降勸𢎞取廣州𢎞遂與温邵及交州秀才劉沉俱謀反侃追擊破之執劉沉又遣部將討機斬之諸將皆請乘勝擊温邵侃笑曰吾威名已著何事遣兵但以凾紙自足耳於是下書諭之邵懼而走追獲於始興王導為都督諸軍事蘇峻之亂路永康術賈寧等皆峻心腹聞祖約奔敗懼事不立迭説峻誅大臣峻既不納永等慮必敗隂結于導導使參軍袁耽濳説路永使歸順南齊始興王鑑鎮益州刼帥韓武方嘗聚黨千餘人斷流為暴郡縣不能禁行旅斷絶鑑行至上明武方乃出降長史虞悰藏宗切等咸請殺之鑑曰武方為暴積年所不能制今降而被殺失信且無以勸善於是啓臺果被宥自是巴西蠻夷㓙惡皆望風降附梁蕭景高祖初為寧朔將軍行南兖州事天下未定沔北傖楚各據塢壁景示以威信渠帥相率面縛請罪旬日境内皆平衡山侯恭監南徐州事時衡州刺史武㑹超在州子姪縱暴州人朱朗聚黨反武帝以恭為刺史時朗已圍始興恭至緩服徇賊示以恩信羣賊伏其勇是夜退三舎以避兵軍吏請追恭曰賊以政苛致叛非有陳呉之心緩之則自潰急之則併力諸君置之明日朗遣使請降恭仗節受之一無所問後魏江陽王繼為平北將軍鎮攝舊都高車酋帥樹擁部民反叛詔繼都督北討諸軍事自懐朔已東悉禀繼節度繼表高車頑黨不識威憲輕相合集背役逃歸計其兇戾事合窮極若悉追戮恐遂擾亂請遣使甄别推驗誓首斬一人其餘加以慰喻若悔悟從役者即令赴軍詔從之於是叛徒徃徃歸順孝文善之顧謂侍臣曰江陽足大任也源子恭為尚書主客郎中攝南主客事時河州羗却鐵忽反殺害長吏詔子恭持節為行臺率諸將討之子恭嚴勒州郡及諸軍不得犯民一物輕與賊戰然後示以恩威兩旬間悉皆降欵朝廷嘉之韋珍孝文初蠻首桓誕歸欵朝廷思安邊之畧以誕為東荆州刺史令珍為使與誕招慰諸蠻珍自懸瓠西入三百餘里至桐栢山窮臨淮源宣揚恩澤莫不降附刁遵為龍驤將軍雒州刺史遵招誘有方梁新化太守杜性新化令杜龍振平陽令杜臺定等率户三千據地内附竇瑾為殿中都官尚書從征盖呉先駈慰喻自平巴西氐羗酋領降下數千家慕容白曜為右僕射都督諸軍事征南大將軍攻宋斗城宋將房崇吉夜遁獲崇吉母妻待之以禮崇吉與從弟法壽盜宋槃陽城以贖母妻白曜自瑕丘遣將軍長孫觀等率騎入自馬耳闗赴之觀至槃陽諸郡悉降又宋幽州刺史劉休賔鎮梁鄒及白曜軍至斗城遣人説之令降休賔不從宋龍驤將軍崔靈延行渤海郡房靈建等數十家皆入梁鄒同舉休賔為征虜守兖州㑹宋遣使授休賔輔國將軍兖州刺史休賔妻崔邪利女也生一男字文曅崔氏先歸寧在魯郡邪利之降也文曅母子遂與俱入國至是白曜表請崔與文曅既至白曜以報休賔又於北海執其弟劉延和妻子送至梁鄒廵視城下休賔荅白曜許厯城降當歸順宻遣主簿尹文逹向歴城觀魏國形勢文逹詣白曜詐言聞王臨境故來袛候私謂白曜曰劉休賔父子兄弟累郡連州今若識運知機束手歸化不審明王如何賞叙白曜曰休賔仕南爵寵如此今若不勞兵甲望風自降者非直處卿富貴兼還其婦兒休賔縱令不畏攻圍豈不憐其妻子也今在斗城卿自往見文逹乃至斗城見休賓妻子文曄攀援文逹哭泣號咷以爪髪為信文逹回還復經白曜誓約而去白曜曰卿是休賔耳目腹心親見其妻子又知我衆旅少多善共識量自求多福文逹還見休賔出其妻兒爪髪兼宣白曜所言及國軍形勢謂休賔曰斗城已敗歴城非朝則夕公可早圖之休賔撫爪髪泣涕曰妻子幽隔誰不愍乎吾荷南朝厚恩受寄邊任今顧妻子而降於臣節足乎然而宻與其兄子聞慰議為降計聞慰曰此故當文逹誑計耳年常抄掠豈有多軍也但可撫强兵勒肅衛方城狹嶮何為便生憂怯示人以弱也休賔又謂文逹曰卿勿憚危苦更為吾作一返音畨善觀形勢於是遣文逹偷道而出令與白曜為期尅日許送降文白曜嘆曰非直休賔父子荷榮城内賢豪亦隨人補授卿便即為梁鄒城主以酒灌地啓告山河曰若負休賔使我三軍沒覆初白曜之表取休賔妻子也獻文以道固既叛詔授休賓持節平南將軍冀州刺史平原公至是付文逹詔䇿文逹還謂休賔曰白曜信誓如此公可早為决計恐攻逼之後降悔無繇休賔於是告兄子聞慰曰事勢可知汝早作降書聞慰沉疑固執不作遂差本契白曜尋遣著作佐郎許赤虎夜至梁鄒南門下告城上人曰汝語劉休賔既遣文逹頻造僕射許送降文歸誠大化何得違期不來於是門人唱告城内悉知遂相維持欲降不得皆云劉休賓父子欲以我城内人易榮位也尋被攻逼經冬至春歴城降白曜遣崔道固子景業與文曅至城下休賔知道固降乃出請命白曜送休賔及宿有名望者十餘人俱入代邸為客尉元為鎮南大將軍援徐州宋東徐州刺史張讜據團城徐州刺史王𤣥載守下邳兖州刺史王整蘭陵太守桓欣驅掠近民保險自固元遣慰喻張讜及青州刺史沈文秀等皆遣使通誠王整桓欣相與歸命吕羅漢為羽林中郎上邽休官吕豐屠各王飛龍等八千餘家據險為逆詔羅漢與司馬楚之駕前招慰降者九千餘户比至盱眙頻破賊軍擒其將顧儼李觀之等以功遷羽林牧郎幢將加建威將軍楊椿孝文時為寧朔將軍梁州刺史初武興王楊集始為楊靈珍所破降於齊至是率賊萬餘自漢中而北規復舊土椿領歩騎五千出頓下辯貽書集始開以利害集始執書對使者曰楊使君此書除我心腹之疾遂領其部曲千餘人來降後孝昌中爾朱榮既據并肆與汾州胡逆表加椿征虜將軍都督慰勞汾胡汾胡與椿比州服其聲望所在降下盧㫤為鎮東將軍徐州刺史宣武永平四年夏㫤表曰梁琅琊郡民王萬壽等欵城内結濳來詣臣云胊山戌今將交換有可圖之機臣即許以旌賞遣其還入至三月二十四夜萬壽等奬率同盟攻掩胊城斬梁輔國將軍琅琊東莞二郡太守帶胊山戌主劉昕并將士四十餘人傳首至州臣即遣兼郯城戍副張天惠率驍勇二百徑徃赴之琅琊諸戌駱驛繼援而梁郁州已遣二將軍以拒天惠天惠與萬壽等内外齊擊俘斬數百便即據城詔㫤曰彭宋地接邊疆勢連淮海威禦之術功在不易朐山險塞冦之要防水陸交湊揚郁路衝畜聚凶徒䖍留邊鄙青光齊兖每離其患卿妙筭既敷克城殄衆展疆辟土何善如之庸勲之懋朕用嘉止故遣左右直長閻遵業具宣徃懐北齊薛脩義為安北將軍蜀賊陳雙熾等聚汾曲詔脩義為大都督與行臺長孫稚共討之脩義以雙熾是其鄉人遂輕詣壘下曉以利害熾等還降拜脩義龍門鎮將脩義又為闗右行臺自龍門濟河西魏北華州刺史薛崇禮屯楊氏壁脩義以書招之崇禮率萬餘人降復拜晉州刺史在州擒西魏正北平太守段榮顯招降胡酋胡垂黎等部落數千人口表置五原郡以安處之趙彦深為安國縣伯從文襄征潁川時引水灌城城雉將沒西魏將王思政猶欲死戰文襄令彦深單身入城告喻即日降之便手牽思政上城文㐮謂彦深曰吾昨夜夢遇一群豕吾射盡獲之獨一大豕不可得卿言當為吾取湏臾獲豕而進至是文㐮笑曰夣驗矣即解思政佩刀與彦深曰使卿當獲此利後周于謹初仕後魏為元纂鎧曹参軍事北討茹茹為賊所圍乃奔入塞時魏末䘮亂羣盜蜂起謹兼解諸國語乃單身入賊中示以恩信於是西部鐵勒酋長乜列河等三萬餘户並欵附魏帝嘉之除積射將軍權景宣為驃騎大將軍安州刺史燕公于謹征江陵景宣别破梁司空陸法和司馬羊亮於溳水又遣别帥攻拔魯山多造舟艦益張旗幟臨江欲度以懼梁人梁將王琳在湘州景宣遺之書諭以禍福琳遂遣長史席壑因景宣請舉城欵附史寧為征東將軍賀㧞勝為荆州刺史寧以本官為勝軍司率歩騎一千隨勝之部值荆蠻騷動三鴉路絶寧先駈平之因撫慰蠻户翕然降附隨税得馬一千五百匹供軍王悦為大行臺尚書從逹奚武征梁漢軍出武令悦説其城主楊賢悦乃遺之書賢於是遂降又白武云白馬衝要是必爭之地今城守寡弱易可圖也若蜀兵更至攻之實難武然之即令悦輕騎徑趨白馬悦示以禍福其將梁深遂以城降梁禦為鎮西將軍太祖既平秦隴方欲引兵東下雍州刺史賈顯持兩端通使於齊太祖以禦為大都督雍州刺史領前軍先行既與顯相見因説之曰魏室陵遲天下鼎沸高歡志在兇逆島夷非逺宇文夏州英姿不世筭畧無方方欲扶危定傾興復京雒公不於此時立功效乃懐猶豫恐禍不旋踵矣顯即出迎太祖禦遂入鎮雍州齊王憲從武帝伐齊為前鋒進克鄴城齊任城王湝廣寧王孝珩據信都有衆數萬武帝復詔憲討之仍令齊王手書與湝曰朝廷遇緯甚厚諸王無恙叔若釋甲則無不優待湝不納乃大開賞募多出金帛沙門求為戰士者亦數千人憲軍過趙州湝令間諜一人覘視形勢候騎執以白憲乃集齊之舊將徧示二人又謂之曰吾所爭者大不在汝等今放汝還可即充我使乃與一書書具傳檄門其末云交兵命使古今通典不俟終日所望知幾也俄而湝領軍尉相願以衆降相願湝之腹心也衆駭懼因破之擒湝隋李雄字毘盧初仕後周為上儀同從行軍總管韋孝寛畧定淮南雄以輕騎數百至硤口説下十餘城拜濠州刺史元諧為上大將軍總兵討吐谷渾俘斬萬餘於是移書諭以禍福其名王十七人公侯十三人各率其所部來降劉權大業中為南海太守行至鄱陽㑹羣盜起不得進詔令權召募討之權率兵與賊相遇不與戰先乘單舸詣賊營説以利害而羣盜感悦一時盡降附帝聞而嘉之唐河間王孝恭為南山道招慰大使自金州出於巴蜀招撫以禮降附者三十餘州遷襄陽道招慰大使自行臺尚書左僕射出時荆襄雖定嶺表尚未悉平孝恭分遣使人撫慰嶺南四十餘州皆來欵附薛萬淑為右領軍鎮黄龍時突厥之亂也萬淑遣契丹渠帥貪沒折諷諭北狄東國威靈奚霫室韋等十餘部皆來降附太宗下書褒美劉師立為岐州都督上書請討吐谷渾書奏未報便遣使間其部落諭以利害多有降附列其地為開橋二州又有党項首領拓㧞赤辭感悟率其種落内屬太宗嘉之拜赤辭為西戎州都督侯君集為交河道行軍總管擊高昌麴智盛頓軍城下諭以禍福智盛致書於君集曰有罪於天子者先王既咎深譴積身已䘮亡智盛襲位未有愆闕所冀尚書赦之君集報曰若能悔禍宜東手軍門智盛猶不出後計無所出遂開門出降薛萬備為阿史那杜爾行軍長史杜爾破龜兹于闐王伏闍信大懼使其子以駝馬三百匹餽軍及將旋師萬備謂杜爾曰今者既破龜兹國威已振請因此機願以輕騎覊取于闐之王杜爾乃遣萬備率五十騎抵于闐之國萬備陳國威靈勸其入見天子伏闍信於是隨萬備來朝李勉為汴宋滑豪河陽等道節度使德宗建中三年淄青李納叛使勉誘説之納許降乃遣其判官檢校户部郎中房説以其母弟經男成務朝於京師嗣曹王皋為江南西道觀察使時李希烈反皋乃遣伊慎王鍔將兵進圍安州州城阻溳水為固攻之累日不下希烈遣其甥劉戒虛將歩騎八千來援皋乃遣李伯濳分兵迎擊之戰於應山獲戒虗及大將二人裨將二十人斬首千餘級遂面縛戒虗等示於城下皋使人説之賊曰得大將及賔佐一二人為信當以城降皋乃遣王鍔馬彛䋲城而入城中皆大呼乃出降希烈又遣將將兵援隨州皋又令伊慎邀擊於厲鄉大破之乃復平静白鴈等關希烈甚畏之伊慎建中末為安州刺史時李希烈死李惠登為賊守隨州慎飛書招諭惠登隨以城降因宻奏惠登可用詔授隨州刺史馬燧為奉誠軍及晉絳慈隰節度并管内諸軍行營副元帥與侍中渾瑊及鎮國軍節度駱元光等合軍河中李懐光次於長春宫懐光將徐庭光以兵六千守宫城禦備甚嚴燧度長春不下則懐光自固攻之曠日持久所傷必甚乃挺身至城下呼庭光庭光素憚燧威名拜於城上燧度庭光心已屈乃徐謂之曰我來自朝廷可西面受命庭光復拜燧乃喻之曰公等皆朔方將士禄山已來首建大勲四十餘年功伐最高奈何棄祖父之勲力背君上為滅族之計耶從吾非止免禍冨貴可圖也賊徒皆不對燧又曰爾以吾言不誠今相去不逺數歩爾當射我乃披襟示之庭光感泣俯伏軍士亦泣下先一日賊焦籬堡守將尉珪以兵三千因堡降燧庭光東道既絶乃率衆出降燧以數騎徑入城處之不疑莫不畏服衆大呼曰吾軰復得為王人矣渾瑊繇是服燧私謂參佐曰予嘗謂馬公用兵與予不相逺但驚怪累敗田悦今觀其行兵料敵吾不迨逺矣范希朝為朔方靈鹽節度使突厥别部有沙陀者北方推其勇勁希朝誘致之自丼州舉族來朝歸衆且萬人其後以之討賊所至有功李光顔討淮西敗呉元濟之衆三萬於郾城其將張伯良奔於蔡州殺其賊十二三獲馬千匹噐甲三萬聫皆畵雷公符仍書云速破城北軍尋而郾城守將鄧懐金請以城降光顔許之而收郾城初鄧懐金以官軍圍青陵城絶其歸路懐金懼謀於郾城令董昌齡昌齡母素誡昌齡因此勸懐金歸欵於光顔且曰城中之人父母妻子皆質於蔡州如不屈而降則家盡屠矣請來攻城我則舉𤇺求救救兵將至官軍逆擊之必敗此時當以城降光顔從之賊果敗走於是昌齡執印帥吏列於門外懐金諸將素衣倒戈列於門内光顔受降乃入羅城其城自壊五十餘歩李愬為唐鄧節度使討淮西呉少誠子壻董重質性勇悍識軍機善用兵及元濟拒命重質又為謀主領大軍當王師連嵗不㧞皆重質之謀也元和十二年宰相裴度督兵至郾城元濟懼乃悉發左右及守城之卒委重質而拒度愬乘虗入蔡既擒元濟重質之家在蔡愬乃安䘏之仍使其子持書禮以招重質見其子知城已䧟及元濟囚窘之狀乃慨然以單騎歸愬白衣叩伏愬揖登堦待以賓禮與之食憲宗欲殺之愬奏許以不死而來降請免之且乞於本軍駈使嚴綬為荆南節度有叙州蠻酋張伯請殺長史據辰錦諸州連九洞以自固詔綬出兵討之綬遣部將李志烈齎書曉諭盡招降之後唐李嚴為客省使隨郭崇韜征蜀為三川招撫使嚴與先鋒使康延孝將兵五千先驅閣道或馳以詞説或威以兵鋒大軍未及所在降下延孝在漢川王衍與書曰可請司空先來餘即舉城納欵衆咸以討蜀之謀始於嚴衍以丼言將誘而殺之欲不令徃嚴聞之喜即馳騎入益州衍見嚴於母前以妻母為託即日引蜀使歐陽彬迎謁魏王繼岌晉劉處讓為左監門衛上將軍充宣徽南院使天福二年范延光據城反高祖命宣武軍節度使楊光逺領兵討之處讓詔與光逺同參議軍政四年冬范延光將謀納降尚或遲留處讓首入其城以禍福諭之延光乃降周曹英為侍衛親軍馬歩軍指揮使兖州行營廣順二年正月上言十八日至任城喚得縣令胡延禧分付勅牓招安百姓其山寨民尋時下山歸業見更令招安次又上言按問得降人及兖州副都指揮使康海超來投俱説賊城人心離散慮慕容彦招迯竄已牒鄰道防備掩殺其康海超且留於城下説誘賊黨俟三五日遣赴京師册府元龜卷四百二十六
