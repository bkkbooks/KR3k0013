body:
  text: 册府元龜卷六百十六宋王欽若等撰刑法部議讞第三隋許善心爲禮部侍郎左衛大將軍宇文述每旦借本部兵數十人以供私役常半日而罷攝御史大夫梁毗奏劾之煬帝方以腹心委述初付法推千餘人皆稱被役經二十餘日法官候伺帝意乃云役不滿日其數雖多不合通計縱令有實亦當無罪諸兵士聞之更云初不被役帝欲釋之付議虗實百寮咸議爲虗善心以爲述於仗衛之所抽兵私役雖不滿日闕於宿衛與常役所部情狀乃殊又兵多下畨㪚還本府分道追至不謀同辭今殆一月方始翻覆姦狀分明此何可捨蘇威楊汪等二十餘人同善心之議其餘皆議免罪帝可免罪之奏唐徐有功爲司刑丞時故左相蘇良嗣亾後被告反男踐言踐忠踐義等推事吏金吾將軍丘神勣奏稱請准法絞刑者奉勅依頃又有勑蘇良嗣往者頻被言告指驗非虗朕以其年廹桑榆情敦簮履掩其惡迹竟不發揚洎乎歸壤之辰爰備飾終之禮不謂因子重發逆蹤所司執法論科請申毁柩之罰朕念勞志切惟庸舊情深是矜因赦之科特降非常之霈式延恩於朽骼俾流渥於幽䰟特免斵棺之刑寛其籍沒之典者少卿郭奉一等所奏蘇良嗣作逆先死准勑免斵棺矜其籍沒其男踐言等緣坐既在勅無文請准法處絞刑奏依者有功執奏曰踐言踐忠良嗣之子緣其父逆並合絞刑但爲勑稱屈法申恩特降非常之霈又言念勞志切惟舊情深特免斵棺之刑寛其籍沒之典兩節皆具特字信知恩是非常父免斵棺之刑子無緣坐之死既寛籍沒之典理絶收錄其家按名例律云因罪人以致罪若罪人遇恩原减亦推罪人原减法又云即緣坐家口雖以配沒罪人得免者亦免斵棺爲其父逆因父致其絞刑父既特遇殊恩子便不拘常律踐言等並即不合緣坐處盡錄奏言奉勑踐言等緣坐合死朕好生惡殺不忍加刑宜特免死配流又逆人丘神勣弟神鼎并男晙被奴羊羔告反司刑司直劉志素推案奏稱丘鼎身居文職黒襖子即是武夫之衣若不夙懐叛心擬投荆河州無故不合輙造又燒却反狀分明請付法者曹斷丘鼎處斬家口籍沒有功批丘勣之弟兄反弟合沒官憑狀以推事迹可驗在於斷結理固難逾羊羔稱投荆河并作兩箇皂襖假令事實終在赦前况乃渉虗何以爲據往時縱犯今日方告准赦㨿勑不合更推使人爲鼎著皂衣將爲叛逆曹司以燒却文狀處以叛謀竊尋此塗頗傷苛酷且衣之五彩隨人好尚武夫一著豈限𤣥黄燒書雖匪赦前推勘湏窮窟宂或言周易作道卜書既元抛諸厠中又云鼎自裂破書既著摽便非反書必是反書論何事爲是簿帳爲是䜟圖竟不甄明遂無承疑即處以斬乃沒其家請更審詳務令允當者劉志素又批丘鼎反逆夙藴包藏非只一塗豈唯今日虺貞荆河作逆之歳于時秩滿神泉准其家在西京旋即合歸本舎爲與虺貞相應汙道水下嘉州更至荆襄路過淹留遂經一歳當聞荆河州起逆星夜即向唐州接荆河界首於懸泉舘遂共男晙俱作黒褐襖子擬充戰服即明事相應接及聞貞敗星夜走來神都即將襖子布施天宫寺明知元來所造緣反近以兄勣反彰之後復燒却反逆文書此反不誅誰反合殺况又聖澤哀矜重令來中丞推覆追奴問鼎勘案逾明論其本愆辜當萬死徐丞内縱姦慝外詐平反奉勑令推反人得實寜敢隱黙者曹又依前斷舉申秋官詳議者下貟外鄭思齊判凡斷刑名湏得指實朦朧作狀斟酌結刑司刑比申過爲非理欲令集議湏審議由狀未止歸遣議何事仰尋所推之案取堪慿㨿之由處分訖申者曹斷又依前者有功又批赦前縱實合免恩後謀狀未誠不反何爲燒書法家無文臆度使人的知是反鞫案何不具言當時撫狀朦朧奏後方便􅬷畧人命至重一死不可再生王法湏平居輕無宜入重恐乖泣辜之惠方虧祝網之慈在愚所窺請更商度者劉志素又批丘鼎謀反與虺族同謀包藏日深又共逆黨連結有功舞文巧法黨逆不忠批退欲縱反人每有唯希僥倖不尋案狀孟浪即批卽不㨿科條法外豈得依允請㨿志素所批之狀與有功意故縱逆人之平即請申秋官及臺集衆官議奉勑依得春官員外郎楊思雅等一百一十七人依有功議依緣坐爲允得夏官楊執柔等百二十二人等議並無反狀更羌明使推准議狀奏請羌五品使杜無二奏無反狀准赦例處分並釋放汾州司馬李思順臨川公徳懋子也被韋秀告稱思順共秀竊語云汾州五萬戸管千一管人多尚宿宵好設齋戒大雲經上道禮復思順好李三五年少唱唐唐思順捨第三兄弟五箇者監察御史李嘗等稱㨿思順潜謀逆節苞藏禍心研覈始引唐興辯占復承應䜟請從極法奉勑依奏者司直裴談斷處斬刑家口籍沒者主簿程仁正批合從妖處絞只向韋秀一人道狀當不滿衆合斷流三千里者裴談又判請依前斷錄奏者焦元亶判退司寺即議者有功議曰謀危社稷罪人反條自述休徴坐當妖例反依斬法妖從絞論言著成文犯標定狀狀在事難越狀文存理無棄文若違狀以結刑捨文而斷獄則乗馬何俟銜勒遏流豈用隄防今判官處以反謀句司批從妖説不耻下問竊欲當仁李思順解大雲經韋秀稱共竊語私觧明非衆説竊語不合人知處實唯出秀辭是非更無佗証縱觧三五年少只是自述休徴既異結謀之蹤元非背叛之事即從叛逆籍沒其家便是狀外棄文豈曰文中㨿狀請依程仁正批妖不衆處流三千里者正焦元亶判具申秋官請議者右臺中丞李嗣等二十一人議稱請依王行感例流二千里庶存畫一者守司府卿于思言等六十三人議稱依徐有功議者錄奏勑思順志懐姦慝妄說圖䜟准其犯狀合寘嚴刑爲其已死特免籍沒者緣有功議遂免破家推事使顧仲琰奏稱韓純孝受逆賊徐敬業偽官同反其身先死家口合緣坐奉勑依曹斷家口籍沒有功議案律謀反者斬處斬本爲身存身亾即無斬法緣坐元因處斬無斬豈合相緣緣者是緣罪人因者爲因佗犯法已法例是因所緣之人先亾所因之罪合减合减止於徒坐徒坐頻㑹鴻恩今日却斷沒官未知㨿何條例若情狀難捨勑遣戮屍除非此塗理絶言象伏准逆人獨孤敬同柳明肅之軰身先殞歿不許推尋未敢比附勑文但欲見其成例勘當尚猶不許家口寜容沒官申覆依有功所議斷放此後援例皆免沒官者三數百家推事使奏瀛州人李仁里等三十七人被告稱謀反曹斷並處斬父母妻子流三千里有功執曰𤣥淑里正無得人戸緣祖紛爭因相言告或以反逆相喚或將奔叛相牽反逆湏有同謀奔叛寜無叶契無謀天契口語口陳即以實論頗亦以苛酷搶擀元無影響星文李自參差縱使實有反言只恨換其宗姓因恨稱有正是口陳徒侣絶無明非實反賊盗律云口陳欲反之言心無眞實之計流三千里䟽云口陳欲叛者杕八十准依告狀並是口陳之言原究犯情皆非心實之計忝居商度用此當宜如是使推請從鄙見如將未允終湏重推錄奏勑依得使宗君哲狀稱無反可尋請依徐丞見流三千里奏勑依㑹勑免御史郭𢎞覇奏宕州刺史皇甫懐節爲芳刑司倉薛璟所告稱共當州刺史李思徴謀反曹斷斬籍沒者有功批執曰思徴芳部宣條懐節宕州分竹爰因羌叛奉使討除暫見思徴屏人共語即疑懐節與徴同謀同謀湏述謀由共語當論語狀語既無狀謀又無由思徴伏誅一無牽引薛璟䧟辟方始告言璟元共徴同情節復與徴連結節當共徴私語語狀在璟合知徵在不知語由徵死誰明反狀寜有比州刺史奉勑討羌白日入州官人參謁暫與思徵相見遂即平章反謀察獄以情未聞此理羌走出界無賊可撃所領之兵更留何用爲此放㪚例將爲反節實擬反更湏發兵成集之兵何湏却放非謀之狀於此更明懐節據狀無反請差使推鞫無反爲發兵遲斷爲官當赦總免推事使左臺監察御史盧偡奏稱告事人問趙推之得疑唐子産與推之手書狀遣告長孫仲宣實不知事由者依問唐子産得疑與推之手狀令告仲宣宅中私置爐擬打搶頭謀反是實其長孫仲宣是子産親舅爲子産先與三舅庶㡬妾成蹊私通仲宣既知即罵辱子産爲此誣告者曹斷准律誣告謀反大逆者斬從者絞又條云告令人告事虗應反坐得實應賞皆以告者爲首推之告宻因得引見遂訴枉屈武太后曰趙推之得唐子産手狀即告於子産引虗自是子産之罪何得枉斷殺推之宜令停决正斷奏聞者有功重執曰推之所告反由元於子産處得奉勅勘當且狀是誣付法科䋲已斷處斬奏盡臨决恩㫖遣停聖上爲子産引虗則將奏之枉死但令教告事律者正文告者爲首教者爲從若其事虗受責推之合當重科如其反實論功子産纔霑薄賞律開此制本防避罪爭功在於憲司固當守文奉法奉勑依奏唐臨高宗永徽初爲御史大夫華州刺史蕭齡之坐前任廣州都督受贓詔文武百官議其罪皆請處置以勵貪汙帝將從之臨奏曰齡之受委大藩贓罪狼藉原情取事死有餘辜然既遣詳議終湏近法臣竊惟議事之官未盡議刑本意律有八議並依周禮舊文矜其異於衆臣所以制特議法王族刑於隱者所以議親刑不上大夫所以議貴明知重其親貴議欲緩刑非爲嫉其賢能謀致深法今議官多於刑法之外議令入重正與堯舜相反不可爲萬代法臣既處法官敢不以聞乃下詔曰華州刺史蕭齡之粤以常才累叨非據入參九列出總六條畨禺重鎭控攝遐遠心如谿壑聚斂無厭不憚典章唯利是視豪門富室必與交通受納金銀二千餘兩乞取奴婢一十九人赦後之贓數猶極廣群僚議罪請處極刑奏决再三即合從戮但人命至重每存審愼又其驅䇿自乆桑榆漸廹諸子號呌伏闕求恩哀矜之心發自懐抱宜免腰領之誅投身瘴癘之地可除名配流嶺南遠處庶存鑒誡頒示天下李乾祜永徽初爲御史大夫奏言鄭州人鄭宣道先娉少府監主簿李𤣥乂妹爲妻𤣥乂妹即宣道堂姨𤣥乂先雖許其姻媾後以法無此禁判許成親何則同堂姨坐雖無服紀既稱從母何得爲婚名教所非人倫共棄古人正名遠别後代違道任情將恐平人浸以成俗然後屬無服而尊卑不可婚者非止一條請付羣官詳議可否左衛大將軍紀王愼等議父之姨及堂姨母之姑姨及堂姑姨父母之姑舅姊妹女壻姊妹堂外甥雖並外姻無服請不爲婚詔從之仍令著於律令杜景佺則天聖厯中爲鳯閣侍郎同鳯閣鸞臺平章事時契丹入冦河北諸州多䧟賊中及事定河内王武懿宗將盡論其罪景佺以爲皆是驅逼非其本心請悉原之則天竟從景佺議桓彦範長安末爲司刑少卿時内史李嶠等奏稱往蜀革命之時人多逆節鞫訊决斷刑獄至嚴刻薄之吏恣行酷法其周興丘勣來俊臣所劾破家者並請雪免彦範又奏請自文明元年已後得罪人除楊豫博三州及諸謀逆魁首一切赦之表䟽前後十奏辭㫖激切至是方見允納韓思復睿宗景雲中爲給事中大理奏汝州刺史嚴善思與逆人重福通謀君親無將合從極法㑹赦免又勑召善思旋即應命陛下見之日遂不具陳唯奏望有兵氣其狀正當匿反請從絞刑思復駮議曰嚴善思往在先朝屬韋氏擅内恃寵宫掖謀危宗社善思此時遂能先見因請相府有所發明進論聖躬必登宸極雖交重福謀䧟韋氏及其謁見猶不奏聞將此包藏行從極法且勑追善思書至便發向懐逆節寜即奔命而來此而可宥惟刑是恤制付議者多請寛之有司猶不從奏斷絞刑思復又駮奏請從衆議帝從之放于嶺表初帝在藩善思爲相府長史姚元之曰相王必有天下公善保䕶及譙王重福自隨州移于均州有命便於汝州入謁善心時爲刺史又言重福當爲天子因得通謀洎元之入輔奏前事召見將拜官焉而重福敗善思乃下獄王脧爲殿中侍御史朔方軍元帥魏元忠討賊失利歸罪於副將韓思忠奏請誅之脧以思忠既是偏禆制不由己又勇智可惜不可獨殺非辜乃庭議爭之思忠竟免張說爲兵部尚書𤣥宗開元十年十月前廣州都督裴伷先下獄中書令張嘉貞奏請决杖説進曰臣聞刑不上大夫以其近於君也故曰士可殺不可辱臣今秋廵邉中途聞姜皎朝堂决杖流皎是三品亦有㣲功不宜决杖廷辱以卒伍待之且律有八議勲貴在焉今伷先既不可輕豈可决罰帝然其言嘉貞不説退而謂説曰何言事之深也説曰宰相者時來即爲豈能長㨿君貴臣盡當可杖但恐吾等行當及之此言非爲伷先乃爲天下士君子也李峴肅宗至徳中爲御史大夫時中丞崔器性刻樂禍隂忍寘恩又希㫖深文奏䧟賊官云反逆從者㨿律並合處死帝初收復欲懲勸天下以爲器議是峴執之曰夫事有首從情有輕重若一槩處死恐非陛下含洪之義又失國家惟新之典且胡羯亂常狂冦凌㨿二京全䧟萬乘南廵各顧其生衣冠蕩覆或陛下親戚勲舊子孫責之以死恐乖仁恕昔者明王用刑殱厥渠魁脅從罔治况河北殘冦今尚未平茍容漏網適開自新之路若盡行誅是堅叛逆之心誰人更肯歸順困獸猶闘况數萬人乎崔器吕諲皆守文之吏不識大體殊無變通廷議累日方從峴奏陳希烈已下定六等科罪斬於獨桞樹次杖刑决殺於京兆府門自盡於大理寺流於嶺南遠惡處及貶有三等後蕭華自相州賊中歸順闕廷授尚書右丞亦奏賊仕賊官等重爲安慶緒所驅至相州初聞廣平王奉宣恩命陳希烈下並放之皆相顧曰我等國家見待如此悔恨至此其何可言及聞器議刑衆恨乃息帝曰朕幾爲崔器所誤嚴郢爲京兆尹兼御史中丞時御史臺奏天下斷獄一切謂待讞報以正刑名唯除殺人罪當自徒已下結竟者並徙置邉州郢駮奏曰臣伏以徙置邉州者流之異名流罪者有三等一例移配或恐未當其死罪除殺人之外有十惡重罪造僞刻印并主典僞印及強盗光火等若一切免死徙邉即於法太輕不足懲戒其徒罪條目至多或鬪毆爭競小有傷損或夫妻離異不犯義絶或養男别姓或立嫡違式或私行度闗或相冐合戸如此之類不可悉數令一切徙邉與十惡造僞同等即輕重懸殊又准刑部格京城縣雜愆犯百端觸網䧟刑徒罪偏廣若皆送覆繫滯實多其徒已下罪非除免官當及勑杖者宜准外州例州縣量事處分今若天下徒罪悉申所司皆從讞報法司斷結准式有程州縣禁囚動盈千百計天下每月徒配必不啻五六千人此則百姓動摇刑章紊撓又邉州及近邉犯死及徒流者復何以處之伏請下删定使詳覆然後施行從之王播爲刑部侍郎憲宗元和八年正月奏天徳軍五城及諸邉城配流人等臣竊見配流人每逢赦恩悉得歸還唯前件流人皆被本道重奏稱要防邉遂令歿身終無歸日臣又見比年邉城所配流者多是胥徒小吏或是闘毆輕刑㨿罪可原在邉無益伏請自今已後流人及先流人等准長流格例滿六年後並許放還所兾抵法者足以悛懲滿歳者絶其愁怨從之十一月又奏准本年九月十七日勑自今已後兩京及關内河東河南河北淮南河東西等道州府犯罪繫囚除大逆及下手殺人外其餘應入死罪者委所任官長審量事狀但情非巨蠧並免死配流天徳五城諸鎮臣謹言勑文除大逆下手殺人外餘入死罪科目至多若不舉其條流或慮中外處斷不一今請犯十惡及故殺鬪謀刼私鑄錢造僞并京兆界持杖強盗不論並依律文及前後格勑處分自餘死刑即請准今勑减死配𨽻天徳伍城有妻者仍准式勒隨流人其父祖子孫欲隨去者任去從之自九月减死配流之令而京師多盗府縣不能督捕及有是奏而盗稍定韓愈元和中爲職方員外郎時富平縣人梁悦爲父報仇斫殺秦果自投縣請罪勑復讐之人固有彛典以其申寃請罪視死如歸自詣公門發於天性志在狥節本無求生之心寜失不經特從减死之法宜决一百配流循州愈獻議曰伏奉今月五日勑復讐㨿禮經則義不同天徴法令則殺人者死禮法二事皆王教之端有此異同固資論辯宜令督省集議聞奏者伏以子復父讐見於春秋見於禮記又見於周官又見於諸子史不可勝數未有非而罪之者也最宜詳於律而律無其條非闕文也盖以爲不許復讐則傷孝子之心而乖先王之訓許復讐則人將倚法專殺無以禁止其端矣律雖本於聖人然執而行之者有司也經之所明者制有司者也丁寜其義於經而深設其文於律者其意將使法吏一斷於律而經術之士得引經而議也周官曰凡殺人而義者令勿讐讐之則死義宜也明殺人而不得其宜者子得復讐也此百姓之相讐也公羊傳曰父不受誅子復讐可也不受誅者罪不當誅者也誅者上施於下之辭非百姓之相殺者也又周官曰凡報仇讐者書於士殺之無罪言將復讐必先言於官則無罪也今陛下垂意典章思立定制惜有司之守憐孝子之心示不自專訪議群下臣愚以爲復讐之名雖同而其事各異或百姓相讐如周官所稱可議於今者或爲官吏所誅如公羊所稱不可行於今者又周官所稱將復讐先告於士則無罪者若孤稚羸弱抱㣲志而伺敵人之便恐不能自言於官未可以爲斷於今也然則殺之與赦不可一例宜定其制曰凡有復父讐者事發具其事申尚書省尚書集議奏聞酌其宜而處之則經律無失其指矣䟽奏不從盧坦爲庫部員外郎兼侍御史知雜事㑹李錡反有司請毁錡祖父廟墓坦嘗爲錡從事乃上言曰淮安王神通有功於草昧且古之父子兄弟罪不相及以錡叛可累五代祖乎乃不毁因賜神通墓五户以備洒掃蔣乂元和中爲兵部郎中時李錡既誅詔削一房屬籍宰臣召乂問曰一房自大功可乎乂曰大功者錡從父之昆弟其祖神通高又陪陵配享今以裔孫之惡而忘其崇勲不可復問曰自朞可乎對曰朞者錡之昆弟其父若幽身死王事今以錡故連坐亦未可也宰相盡用其言故錡之罪唯及息室女而已孫革穆宗長慶初爲刑部員外郎時京兆府雲陽縣力人張莅欠羽林官騎康憲錢米憲徴之莅乘醉拉憲氣息將絶憲男買徳年十四將救其父以莅角觝力人不敢撝觧遂持木鍾擊莅之首見血後三日致死者准律父爲人所毆子往救擊其人折傷减凡闘三等至死者依常律即買徳救父雖是性孝非暴擊張莅是切非兇以髫丱之歳正父子之親若非聖化所加童子安能及此王制稱五刑之理必原父子之親以權之測淺深之量以别之春秋之義原心定罪周書所訓諸罰有權今買徳生被皇風㓜符至孝哀矜之宥伏在聖慈職當讞刑合分善惡先具事由陳奏伏兾賜下中書門下商量勑㫖康買徳尚在童年得知子道雖殺人當死而爲父可哀從沉命之科失原情之義宜付法司减死罪一等處分楊嗣復長慶中爲中書舍人時東川觀察使奏遂寜縣令龎驥犯贓事大理以法論嗣復等叅酌曰龎驥贓貨之數爲錢肆百餘千其間大半是枉法㨿職定罪合處極刑雖經赦恩不在原免伏以近日贓吏皆䝉小有矜寛類例之間慮湏貸死勑長史犯贓其數不少縱寛刑曲難免鞭笞但以近逄鴻恩人思减等雖節文不在免於情理亦要哀矜龎驥量除名流溪州其贓付所司准法裴潾長慶中爲刑部郎中有前率府倉曹曲元衡杖殺百姓柏公成母法官以公成母死在辜外元衡父任軍便以父䕃贖罪徴銅公成私受元衡資貨母死不聞公府法官等以經恩免罪潾議曰典刑者公柄也在官得施於部屬之内若非在官又非部屬雖有私罪必告於官爲之理以明不得擅行鞭捶於齊人也元衡身非在官公成母非部屬而擅慿威力横此殘虐豈合均於常典柏公成取貨於讐利母之死悖逆天性犯則必誅奏下元衡杖六十配流公成以法論至死公議稱之栁公綽長慶中爲刑部尚書京兆人有姑以小過鞭其婦至死府上其獄郎中竇某史失其名斷以償死公綽曰尊毆卑非闘也且其子在以妻而戮其母非教也竟從公綽所議張丹爲愛州刺史太和中刑部奏㨿大理寺申准詳斷安南經畧使韓約奏丹犯贓并欲謀惡事已准法處置訖者伏以追攝禁勘即是制因不合專擅處置奉三月十九日勑宜付所司速詳斷聞奏今㨿寺申㨿律文反逆謀叛各有本條並無欲謀惡事之科又准律以贓入罪者除正贓見在流死勿徴㨿罪先勒張丹通款估納家資然後就刑慮渉情故又張丹男宗禮宗智等年皆㓜弱張丹雖徴愛州雖遠且常領郡則謂御思縱合重䋲湏候勑命既歸法寺必在正名茍輕荒服之刑是棄遠人之命伏以聖朝以慎恤爲理以惠澤愛人每議典刑必行寛宥豈使一夫不獲吞恨九泉伏請聞奏推覆方可詳斷所冀事狀明白法令施行勑詳覆格律既在疑文其張丹男宗禮宗智等並釋放贓錢已别有處分其江陵莊宅等勒却還張宗禮等宇文鼎太和中爲御史中丞奏當司前後推覆造僞出身文書賣官并造僞印行用等因張璹劉建胡伯忠犯罪並在太和三年十一月十八日恩赦前准刑部大理寺詳斷悉處極刑准斷獄律赦前斷罪不當者若處輕爲重宜改從輕處重爲輕即依輕法者臣以前件因等雖抵極法悉經殊恩或自赦文全生或因起請减等伏緣俱引霈澤累陳訴詞若非得中恐未服罪昨者一與一奪事關起請既生又死稍覺二三如臣所見伏請赦書以前犯者特許减論赦書以後所犯者不得援例庶使後無僥倖令絶披陳勑張璹胡伯忠劉建等宜准元勑處分殷侑爲鄆州觀察使時濮州録事叅軍崔元武坐贓决六十配流賀州侑以元武或託公事被罰取於五縣人吏率歛州縣官科錢或以私馬擡估納官計絹一百二十疋大理寺斷三犯以重者論抵以中私馬爲重止合削官三任侑復奏以官法不及法律三犯不同即坐其所重元武所犯枉法取受准律枉法十五匹以上絞律䟽云即以贓致罪頻犯者並累科㨿元武所犯合當入處絞刑䟽奏崔元武遂依刑部元斷先是御史大夫温造彈奏侑居天下不由勑㫖賦歛百姓即詔庾承宣代之及奏論崔元武文宗嘉侑之守法翌日詔徴侑爲刑部尚書陳商武宗㑹昌中爲刑部郎中勑以劉從諌妻裴氏合誅與不誅商議曰臣等徴諸古典周禮司㓂之職男子入于罪𨽻女子入于舂藁漢律云妻子沒爲奴婢鍾繇曰自古帝王罪及妻子又晉朝議在室之女從父母之誅既醮之婦隨夫家之罰謹按奴婢舂藁罪罰之類名則爲重而非罪刑故法律明文古今通議夫子有罪母妻無誅死之制然事出一時法由情斷帝王刑辟豈在一途昔少卿降敵漢武誅其母𤣥宗時安慶宗妻榮義郡主夫以逆誅主亦賜死此則是夫子有罪母妻不捨之例臣等伏以從諌犬羊狼戾蛇豕兇殘抱逆節於明時遺禍胎於孽子裴氏爲惡有素爲姦已成分衣以固其入心申令以安其逆志在於國典情實難容臣等參議宜從重典從之劉三復爲刑部侍郎時朝議以從諫妻裴氏裴問之妹欲原之法司定罪以劉稹之叛裴以酒食㑹潞州將挍妻子泣告以固逆謀三復覆奏曰劉從諫包藏逆謀比雖已露今推窮僕妾尤得事情㨿其圗謀言語制度服物人臣僣亂一至於斯雖生前幸免於顯誅而死後已從於追戮凡在朝野同深慶快且自古人臣叛逆合有三族之誅尚書曰乃有顛越不恭我則劓殄滅之無遺育無俾易種于兹新邑如此則阿裴已不得免於極法矣又况從諫死後主張狂謀罪狀非一劉稹年既㓜小逆節未深裴爲母氏固宜誡誘若廣説忠孝之道深陳禍福之原必兾梟音全革而乃激厲兇黨膠固叛心廣招將校之妻適有酒食之宴號哭激其衆意贈遺結其群情遂使叛黨稽不捨之誅孽童延必死之命以至周歳方就誅夷此阿裴之罪也雖以裴問之功或希减等而國家有法難議從輕伏以管叔周公親弟也有罪而且除之以周公之賢尚不捨兄弟之罪况裴問之功効安能破朝廷之法耶㨿阿裴廢臣妾之道懐逆亂之謀裴問如周公之功尚合行周公之戮况於朝典固在不疑阿裴請准法從之李朋爲刑部員外郎宣宗大中六年閏七月奉勑應犯贓人其平贓定估等准名律例諸平贓者皆㨿犯處當時物價及土絹估律䟽議曰贓謂罪人所取之贓皆平其價直准犯處當時土絹之價依令每月旬别立三等估其贓平所犯旬估定罪所取犯月旬土絹之價假有蒲州盗鹽雋州事發鹽已費使依令懸平即取蒲州中估之鹽准蒲州土絹之價於雋州决斷之縱有賣價貴賤所估不同亦依估爲定從之十月中書門下奏准勑應犯贓人宜平贓定估等奉閏七月三日勑㫖刑部奏頗叶中道宜依仍編入令格者臣等今商量伏以京邑元無土絹市中所貨皆是外州將到若㨿律處當處絹價定贓平估即京師當處之絹若取河南一千一百價絹即見在市肆又無此實估將行新勑湏立定規今京中市肆所貨諸府絹估各有等差但㨿罪人所犯贓如是見在絹及金銀雜物等一事已上並請取京時價估定如結贓即在京諸府土絹上價實估結計如罪人所取已費使及不記得當時州土色目即請便取雜州土絹市肆所貨實價中估平結計贓准前取諸州府土絹上估實價定罪伏以京中諸州府絹價逐旬移改貴賤不定前使推獄每度臨時估定贓絹即罪人性命所繫抄忽挍吏因兹得以上下令責兩市絹牙人侯建武等狀京城元不出土絹所貨者諸州土縣果閬州絹最貴每疋九百五十文上至五十尺下至四十五尺其次宋亳州土絹估每疋九百文實估價其河南土絹價亦無一千實估今以果閬州絹尺每與尋常絹不同已次校貴于宋亳州上縣伏請永爲定例其外州府比者雖准律文取當處上估絹或有不出土絹縱有出處亦慮結獄之時湏有勘估因其貴賤便生異端兼以諸州府絹價除果閬州絹外别無貴於宋亳州上估絹者則外州府不計有土絹及無土絹處並請一例取宋亳州土絹估毎疋九百文結計如所取得絹以費使及不記得色目即請取犯處市肆見貨當取中估絹價平之如不出絹處亦請以當處見貨雜州中估價平之庶使推劾有准斷讞無疑官吏既難舞文中外自湏畫一從之十二月又奏准名例律在官犯罪去官事發或事發去官犯公罪流已下各勿論䟽云謂在本任犯罪去官事發或事發去官者謂事發未結斷問便即去任職此三事犯公罪流已下勿論又准㑹昌五年正月三日勑文㨿律文已去任者公罪流以下勿論公罪之條情有輕重茍渉欺詐豈得勿論向後公罪有情狀難恕並不在勿論之限今伏詳勿論之理者實啓倖門勑律所標科條未具伏見近日已來頻有長吏在官無政被人吿論醜迹已逹於聖聰苛政又布于人口降制使案劾並已伏愆下法司參詳即云去任縱有重罪盡得勿論此乃徒致推窮何懲姦濫且當官犯罪事迹已彰既令推勘自合停替前同去任實有等差伏請自今已後應在官犯罪事發因而去任不論公罪私罪一切准勑律科刑不在勿論之限其去任事發者公罪流已下即望許引勿論之科其有事渉欺詐情理難恕者請法司詳斷之時審詳事狀如渉此色准㑹昌元年正月三日勑文並不在勿論之限從之後唐李愚仕梁爲崇政院學士貞明中通事舍人李霄傭夫毆僦舍人致死法司按律罪在李霄愚曰李霄手不闘毆傭夫毆之致死安得坐其主耶以是忤㫖李殷夢爲刑部員外郎天成二年七月洺州平恩縣百姓高𢎞超其父暉爲鄉人王感所殺後挾刃以報之遂携其首自陳大理寺以故殺論殷夢覆曰伏以挾刃殺人按律處死投獄自首降罪垂文高𢎞超既遂復讐固不迯法戴天㒺愧視死如歸歴代已來事多貸命長慶二年有康買徳父憲爲力人張莅乘醉拉憲氣息將絶買徳年十四以木錚擊莅後三日致死勑㫖康買徳尚在童年能知子道雖殺人當死而爲父可哀若從沉命之科恐失度情之義宜减死處分又元和六年富平人梁悦殺父之讐投縣請罪勑㫖復讐殺人固有彛典以其申寃請罪自詣公門發於天性本無求生寜失不經特從减死方今明時有此孝子其高𢎞超若使湏歸極法實慮未契鴻慈奉勑忠孝之道乃治國之大柄典刑之要在誅意之深文差若毫釐繫之理道昔紀信替主赴難何青史之永刋今高𢎞超爲報父寃即丹書之不尚人倫至孝法網宜矜减死一等晉天福三年七月晉州民曹繼勲訴男滿籍與王興哥因里俗戲擲塼子誤觸破頭上辜限内因風致卒准律合决重杖處死者刑部詳奏云王興哥情非巨蠧年乃童蒙滿籍死既因風本州勘湏有㨿雖執毆傷之律自有常刑當逢欽恤之朝寜無宥過尋有勑减死一等徴銅一百斤漢張仁瑑爲左庶子乾祐二年十二月鄧州節度判官史在徳棄市以其誤斷民崔彦等八人犯牛皮禁罪皆至死刑故也時朝廷方務積甲故牛革之禁甚峻先是潞州長子縣民犯鞵底二殺數人在徳援例以斷之節度使劉重進以崔彦將牛皮漢高廟冐皷曽於本鎮申明其與故犯不同改杖放之在徳固争因而上言朝廷命使案覆在徳以失入伏辜時樞宻使楊邠以法寺覺縱乃召仁瑑讞之仁瑑讞上以大理寺所斷即依律文凡斷罪合取最後勑爲定詳編勑云宫典鞫獄枉濫或經臺授軌勘問不虗元推官典並當誅罰又常有忻州法椽郭業故入張仁安一人死罪合當誅罰處分今在徳故入八人罪法寺不援後勑准㨿律文今以郭業比附在徳合處極典大理聞是讞又引晉朝後勑云今後不得以斷郭業勑内誅罰二字爲用並湏依格律斷獄時宰臣蘇逢吉見之言於楊頒不能正竟决杖死之册府元龜卷六百十六
