body:
  text: 册府元龜卷二百九十二宋王欽若等撰宗室部禮士書曰位不期驕傳稱寵而能降者鮮矣葢夫承榮天緒長於宫闥猒飫輕煖宴安富䝿非明誠異禀卓爾不羣者其孰能折節下士流譽於方來者哉自姬文好賢逮兩漢而下或優禮髦彦降志通逸置之於幕府待之以師友資以遺餉厚其供儗詢之政務接其游宴乃至列邸圖像以極於欽崇講學論文以申於博約原其尊賢好士之意其於進徳隆道不亦多乎哉詩云彼交匪敖萬福來求又曰宗子維城懷徳維寧是之謂矣周公旦曰我文王之子武王之弟成王之叔父我於天下亦不賤矣然我一沐三握髪一飯三吐哺起以待士猶恐失天下之賢人漢楚元王交少時嘗與穆生白生申公俱受詩於浮丘伯既至楚以穆生白生申公為中大夫王敬禮申公等穆生不耆酒耆讀曰嗜王每置酒常為穆生設醴龔舍楚人也好學明經楚王入朝聞舍髙名聘為常侍梁孝王武貴盛待士於是鄒陽枚乗嚴忌從孝王游焦延夀字贛梁人也贛貧賤以好學得幸梁王梁王共其資用令極意學後漢趙節王栩光武叔父趙王良之子聞樓望少習嚴氏春秋有稱鄉閭遣使齎玉帛請以為師望不受東平王蒼聞吴良名辟之署為西曹蒼甚相敬愛之北海王睦光武兄齊武王縯孫中興初禁網尚闊而睦性謙恭好士千里交結自名儒宿徳莫不造門由是聲價益廣魏陳思王植初封臨菑侯時邯鄲淳愽學有才章太祖召見甚敬異之植求淳太祖遣淳詣植植初得淳甚喜白馬王彪雅好文學相賈洪善能談戯彪常師宗之過於三卿沛穆王林初封謙王黄初中隗禧為王郎中王宿聞其儒者嘗虚心從學禧亦敬恭以授王繇是大得賜遺晉成都王頴推功不居勞謙下士陸機在雒感全濟之恩又見朝廷屢有變難謂頴必能康隆晉室遂委身焉頴以機參大將軍軍事河間王顒武帝時平吴徐聳為顒相聳清虚無欲進退以禮在吴厯清要官顒素聞聳名厚敬禮之東海王越討汲桑命茍晞為前鋒晞破汲桑定鄴而還越以晞復其讐耻甚徳之引升堂結為兄弟江統陳留人為司徒左長史東海王越為兖州牧以統為别駕委以州事與統書曰昔王子師為豫州未下車辟荀慈明下車辟孔文舉貴州人士有堪應此者不綂舉髙平郗鑒為賢良陳留阮脩為直言濟北程收為方正時以為知人王承字安期東海王越鎮許以為記室參軍雅相知重勅其子毗曰夫學之所益者淺體之所安者深閑習禮度不如式瞻儀刑諷味遺言不若親承音㫖王參軍人倫之表汝其師之在府數年見朝政漸替辭以母老求出越不許譙王承為湘州刺史長沙人虞悝與弟望並有士操承臨州知其名檄悝為長史未到遭母䘮㑹王敦作逆承往弔悝因留與語曰吾前被詔遣鎮此州正以王敦專擅防其為禍今敦果為逆謀吾受任一方欲率所領馳赴朝廷而衆少糧乏且始到貴州恩信未著卿兄弟南夏之翹雋而智勇逺聞古人墨絰即戎况今鯨鯢塞路王室危急安得遂罔極之情忘忠義之節乎如今起事將士器械可以濟不悝望對曰王敦居分陜之任一旦搆逆圖危社稷此天地所不容人神所忿疾大王不以猥劣枉駕訪及悝兄弟並受國恩敢不自奮今天朝中興人思晉徳大王以宗子之親奉信順而誅有罪孰不荷戈致命但鄙州荒弊糧器空竭舟艦寡少難以進討冝且收衆固守專檄四方其勢必分然後圖之事可㨗也承以為然乃命悝為長史望為司馬司馬楚之東武侯馗八世孫也楚之年十七值劉裕誅夷司馬戚屬楚之乃亡於汝潁之間楚之少有英氣能折節待士馬順明道恭等所在聚黨及劉裕自立楚之規欲報復收衆據長社歸之者常萬餘人劉裕深憚之遣刺客沭謙圖害楚之楚之待謙甚厚謙夜詐疾知楚之必自來因欲殺之楚之聞謙病果自賫湯藥徃省之謙感其意乃出匕首於席下以狀告之曰將軍為裕所忌憚願勿輕率以保全為先楚之嘆曰若如來言雖有所防恐有所失謙遂委身以事之其推誠信物得士之心皆此類也宋臨川王道規為征西將軍王敬𢎞為諮議參軍時府主簿宗恊亦有志趣道規並以事外相期嘗共酣飲致醉敬𢎞因醉失禮為外司所白道規更引還重甲初讌道規子義慶嗣爵臨川王招聚文學之士逺近必至太尉袁淑文冠當時義慶在江州請為衛軍諮議參軍其餘吳郡陸展東海何長瑜鮑昭等並為辭章義慶引為佐史國臣太祖與義慶書嘗加意斟酌彭城王義康為司徒録尚書事府門每日常有數百乘車雖復位卑人㣲㫮被引接衡陽王義季為衡州宗炳高尚有志操義季親至炳室與之歡讌命為諮議不起戴顒字仲若性高尚居于吳義季鎮口長史張劭與顒姻通迎来止黄鵠山山北有竹林精舍林澗甚美顒憇于此間義季亟從之遊顒服其野服不改常度劉凝之隱居不仕時荆州年飢義季慮凝之餒餉錢十萬江夏王義恭出鎮旴𣅿平原人劉懷珍為本州主簿義恭道遇懐珍以應對見重取為驃騎長始興王濬為揚州雖日親覽州事一以委沈璞太祖從容謂濬曰沈璞奉時無纎芥之失居家有孝友之稱學優才贍文義可觀而沈深守静不求名譽甚佳汝但應委之以事更宜引與晤對濬既素加賞遇又敬奉此㫖璞嘗作舊宫賦乆而未畢濬與璞䟽曰卿嘗有述舊宫賦何其淹邪想行就耳璞因事陳答辭義可觀濬重敎曰向聊相敦問還白斐然遂兼紙翰昔曹植有言下筆成章良謂逸才吾逺慙楚元門盈申白之賔近愧梁孝庭列枚馬之客薄因末牘以代一面建平王景素為征北將軍南徐州刺史以劉璡為征北主簿深見禮遇又以何昌㝢為府主簿以風素見重景素好文章書籍招集才義之士傾身禮接以收名譽由是朝野翕然莫不屬意焉南齊豫章王嶷為中書監司空時陸慧曉為武陵王曄征虜功曹廬江何㸃薦慧曉于嶷補司空掾加以恩禮劉繪為豫章王驃騎主簿繪聰警有文義善𨽻書數被賞召進對華敏僚吏之中見遇莫及琅邪王詡為功曹以吏能自進嶷謂僚佐曰吾雖不能得應嗣陳蕃然閣下自有二驥也何㸃永明元年徴中書郎豫章王命駕造門㸃從後門逃去竟陵王子良聞之曰豫章王尚不能屈非吾所議遺㸃嵇叔夜酒杯徐景山酒鎗以通意潁川庾銑善屬文見賞於豫章王仕至大司馬記室参軍劉虬字靈預南陽人宋太始中仕至晉平王驃騎記室當陽令罷官歸家静處斷榖餌术及胡麻建元初豫章王為荆州牧辟虬為别駕與同郡宗測司空庾易並遣書禮請虬等各脩牋荅而不應辟命永明三年刺史廬陵王子卿表虬及同郡宗測宗尚之庾易劉昭五人請加蒲車束帛之命詔徴為通直郎不就竟陵王子良致書通意虬荅曰虬四節臥病三時營灌暢餘隂於山澤託暮情於魚鳥寧非唐虞重恩周召宏施虬進不研幾入𤣥無洙泗稷館之辨退不凝心出累非冡間樹下之節逺澤既灑仁規先著謹收樵牧之嫌敬加軾鼃之義庾易志性恬隠不交外物建元元年豫章王辟為驃騎參軍不就臨川王映獨重易上表薦之餉麥百斛易謂使人曰民樵採麋鹿之伍終其觧毛之衣馳騁日月之車得保自耕之祿於大王之恩亦已深矣辭不受宗測字敬㣲南陽人宋徴士炳孫也世居江陵測少静退不樂人間豫章王復遣書請之辟為參軍測荅曰性同鱗羽愛止山壑眷戀松筠輕迷人路縱宕巖流有若狂者忽不知老至而今鬢髪已白豈容課虚責有限魚慕鳥哉杜栖吴郡錢塘人有志行能言刺史豫章王聞其名辟議曹從事仍轉西曹佐竟陵王子良數致禮接竟陵王子良以劉瓛儒學冠於當時子良親徃脩謁表為瓛立館以揚烈橋故主第給之生徒皆賀瓛曰室美為人災此華宇豈吾宅耶幸可詔作講堂猶恐見害也未及徙居遇病子良遣從瓛學者彭城劉繪順陽范縝將厨於瓛宅營齋王融為中書郎㑹魏軍動子良於東府募人拔融寧朔將軍軍主融文辭辨㨗尤善屬綴有所造作援筆可待子良特相友好情分殊常謝璟少與從叔朓俱知名子良開西邸招文學璟亦預焉子良有清尚禮才好士居不疑之地傾意賔客天下才士好學者遊集焉善立勝事夏月客至為設忽飲及甘果著之文教士子文章及朝貴辭翰皆發敎撰錄時梁髙祖與沈約謝朓王融蕭琛范雲任昉陸倕等並逰焉號曰八友江革舉髙第耽學不勌王聞其名引為西邸學士王瞻授太子舍人初為南海王友尋轉司徒竟陵王從事中郎王甚相賔禮范縝為尚書殿中郎于時竟陵盛招賔客縝亦預焉沈約為黄門侍郎與蘭陵蕭琛琅邪王融陳郡謝朓南鄉范雲樂安任昉等皆逰焉當世號為得人范雲字彦龍建元初子良為㑹稽太守雲始隨王王未之知也㑹遊秦望使人視刻石文時莫能識雲獨誦之王悦自是寵冠府朝王為丹陽尹召為主簿深相親任王亮時為桂陽王文學南郡王友宗史少勤學有局幹厯臨川王常侍驃騎參軍竟陵王集學士於西邸使工圖畫其像亮史亦預焉晉安王子懋戍石頭以張率為雲麾中記室王遷南兖州轉宣毅諮議參軍並兼記室王還都率除中書侍郎王為荆州復以率為宣惠諮議領江陵令府遷江州以諮議領記室出監豫章臨川郡率在府十年恩禮甚篤劉遵為晉安王宣惠雲麾二府記室甚見賔禮隨王子隆以謝朓為文學子隆在荆州好辭賦數集僚友朓以才文尤被賞愛流連晤對不捨日夕梁建平王宏禮賢接士始興忠武王憺性勞謙常隆意接士與賔客連榻而坐時論稱之安成王秀為江州刺史將發主者求堅船以為齋舫秀曰吾豈愛財而不愛士乃教所由以牢者給參佐下者載齋物既而遭風齋舫遂破時諸王並不下士建安安城二王雅好人物以二方重士方之四豪及至州秀聞前刺史取徴士陶潛曾孫為里司秀歎曰陶潛之徳豈可不及後世即日辟為西曹掾秀遷荆州刺史進號安州將軍下車立學校招隠逸下敎曰夫鶉火之禽不匿影於丹穴昭華之寳乍耀采於藍田是以江漢有濯纓之歌空谷著來思之詠𢎞風闡道靡不繇茲處士河東韓懷明南平韓望南郡庾承先河東郭麻並脱落風塵髙蹈之士兩韓之孝友純深庾郭之形骸枯槁或橡飯菁羮惟日不足或葭牆艾席樂在其中昔伯武貞堅就仕河内史雲孤劭屈志陳留豈曰塲苖實惟攻玉可加引辟並遣喻意既同魏侯致禮之請庶無辟彊三緘之嘆南平王偉初封建安王偉篤誠通恕趨賢重士嘗如弗及由是四方遊士當世知名者莫不畢至齊世青溪宫改為芳林苑天監初賜偉為第偉又加穿築增植嘉樹珍果窮一時之彫麗每與賔客遊其中命從事中郎蕭子軌為之記何遜天監中起家奉朝請遷中衛建安王水曹行參軍兼記室王愛文學之士日與遊宴及遷江州遜猶掌書記鄱陽王恢為益州刺史以羅研為别駕其後西昌嗣王範將西行恢謂曰吾昔在蜀每事委羅研汝遵而勿失範至復以為别駕升堂拜毋蜀人榮之廬陵王續為荆州刺史以天門太守歐陽頠伐蠻左有功續深嘉之引為賔客邵陵王綸出為江州刺史以太史叔明少善莊老兼治孝經禮記㩦叔明之鎮王遷郢州又隨府所至輙講授江外人士皆傳其學孫㻛少倜儻好謀略博涉經史為邵陵王水曹中兵參軍時王出鎮郢州盡室隨府甚被賞遇皇侃為國子助敎丁母憂解職還鄉里邵陵王欽其學厚禮迎之武陵王紀出鎮江州時江革為都官尚書紀乃曰我得江革文華清麗豈能一日忘之當與其同飽乃表革同行除明威將軍南中郎長史尋陽太守衡陽王元簡為㑹稽太守時何𦙍居秦望山元簡甚加禮敬及元簡去郡入山與𦙍别送至都賜埭去郡三里因曰僕自棄人事交遊路斷自非降貴山藪豈容復望城邑此埭之逰於今絶矣執手涕零臨城公大連出牧東揚州張彪率所領客馬始為防閑後為中兵參軍禮遇甚厚陳永陽王伯智為吴郡太守本郡陸慶少好學遍通五經天嘉初徴為通直散騎侍郎不就伯智聞其名欲與相見慶固辭以疾時宗人陸榮為郡五官慶嘗詣焉王乃㣲服往榮穿壁以觀之王謂榮曰觀陸慶風神凝峻殆不可測嚴君平鄭子真何以尚兹鄱陽王伯山為江州刺史時徐伯陽為新安王室伯陽嘗奉使造焉王率府僚與伯陽登匡嶺置宴酒酣命筆賦劇韻二十伯陽與祖孫登前成王賜以奴婢雜物始興郡王伯茂謙恭下士建安王叔卿以虞寄為東中郎諮議寄辭以疾不任旦夕陪列王於是特令停王府公事其有疑議就以決之但朔望牋修而已後魏衛王儀初封平原公先是上谷侯岌張衮代郡許謙等有名于時初來入國聞儀待士先就儀儀並禮之共談當世之務謙等相謂曰平原公有大才不世之略吾等宜附其尾江陽王繼次子羅字仲綱為青州刺史羅兄义當朝專政羅望傾四海於時才名之士王元景邢子才李奬等咸為其賔客從遊青土義陽王子孝愛士縉紳歸之賔客嘗滿終日無倦京兆王愉好文章頗著詩賦時引才人宋世景李神儁祖瑩邢晏王遵業張始均等共中晏喜招四方儒學賓客嚴懐真等數十人館而禮之所得榖帛率多散施任城王澄以髙徽聰敏有氣幹深所知賞杜弼中山曲陽人任城王澄為定州牧長史甄琛簡試諸生而弼義解開明應荅如響琛所歎伏澄聞而召問深相嗟賞許以王佐之才澄還雒稱之於朝髙陽王等更相招命崔接放邁自髙不拘常檢為中書博士樂陵内史雅為任城王澄所禮待及澄為定州刺史接了無民敬王忻然容下之張普惠為澄所知及轉諌議大夫澄謂普惠曰不喜君得諌議惟喜諌議得君北海王詳為司􅑫以前光州刺史崔挺為府司馬後詳攝選衆人競稱考第以求遷叙挺獨無言詳大相稱歎自挺為司馬詳未曽呼名常稱為崔光州以示優禮平原王叡雅有志業娶東徐州刺史博陵崔鑒女路繇冀相聞李彪名而詣之脩師友之禮稱之於郡舉孝亷至京師館而受業焉清河王懌以韓子熈少自脩整頗有學識引為常侍父亡居喪有禮子熈為懌所眷遇遂闕位待其畢䘮後復引用又以劉懋性沉雅厚重尤禮重懋令諸子師之辛纂為太尉騎兵參軍每為懌所賞及欲定考懌曰幸騎兵有學有才宜為上第轉越騎校尉廣陽王淵以賀拔勝因父遇害與弟岳俱奔于淵勝岳便弓馬有武幹淵厚待之俱表為强弩將軍充帳内軍主中山王英平義陽獲馮亮亮南陽人博覽諸書又篤好佛理英素聞其名以禮待接亮至雒隠居嵩山感英之徳以時展覲及英亡亮奔赴盡其哀慟彭城王勰以鹿愈好兵書隂陽釋氏之學召為館客宋世景遷勰府法曹參軍勰愛其才學雅相器敬東陽王榮為𤓰州刺史州人令狐整字保延㓜聰敏沉深有識量學藝騎射竝為河右所推榮辟為主簿加盪㓂將軍整進趣詳雅對揚辨暢謁見之際州府傾目榮器整徳望嘗謂僚屬曰令狐保延西州令望方成重器豈州郡之職所可縶維但一日千里必基武步寡人當委以庻務畫諾而已北齊襄城王淯弱年有器望齊氏諸王選國臣府佐多取富商羣小鷹犬少年唯襄城廣寧蘭陵王等頗引文藝清識之士當時以此稱之趙郡王琛出鎮定州聞馮偉節聰敏無所不通以禮迎接命書三至縣令親至其門猶辭疾不起王將命駕致請佐史前後星馳報之縣令又自為其整冠履不得已而出王下㕔事迎之止其拜伏分階而上留之賔館甚見禮重王將舉充秀才固辭不就歳餘請還王知其不願拘束以禮發遣贈遺甚厚一無所納唯受時服而已後周齊王憲引樊叔略為園苑監時憲素有吞闗東之志叔略因事數進兵謀憲甚竒之賀若弼少慷慨有大志驍勇便弓馬解屬文愽涉書記有重名於當世憲聞而敬之引為記室冀王通楊注為侍讀王甚重之毎曰楊侍讀徳業優深孤之穆生也隋秦王俊為并州總管二十四州諸軍事河東人栁靖自廣徳守退居鄉里閉門自守時論方之王烈前後總管到官皆親至靖家問疾遂以為故事秦王俊臨州賚以几杖並致衣物靖唯受几杖餘並固辭其為當時所重如此齊王暕初封豫章王時崔賾為河南豫章二王侍讀每更日來往二王之第及河南為晉王轉書記室參軍自此去豫章王重之不已遺賾書曰昔漢氏西京梁王建國平䑓東苑慕義如林馬卿辭武騎之官枚乗罷𢎞農之守每覽史傳嘗竊恠之何乃脱略官䇿棲遲藩邸以今望古方知雅志彼二子者豈徒然哉足下愽聞强記鈎深致逺視漢臣之三篋似陟䝉山對梁相之五車若吞雲夢吾兄欽賢重士敬愛㤀疲先築郭隗之宫常置穆生之醴今者重開土宇更誓山河地方二百里平籠曲阜城兼七十包舉臨淄大啟南陽方開東閣想得奉飛葢曵長裾藉玳筵躡珠履歌山桂之偃蹇賦池竹之檀欒其崇貴也如彼其風流也如此幸甚幸甚何樂如之髙視上京有懷祖徳才謝天人多慙子建書不盡意寧俟繁辭賾荅曰一昨伏奉敎書榮貺非常心靈自失若乃理髙象繫管輅思而不觧事富山海郭璞注而未詳至於五色相宣八音繁㑹鳳鳴不足為諭龍章莫之能此吴札之論周頌詎盡揄揚郢客之奏陽春誰堪赴節伏惟令王殿下禀潤天潢承輝日觀雅道貴於東平文藝髙於北海漢則馬遷蕭望晉則裴楷張華鷄樹騰聲鵷池播美望我清塵悠然路絶祖濬祖濬賾字燕南贅客河朔墮逰本無意於希顔豈有心於慕藺未嘗聚螢映雪懸頭刺股讀論唯取一篇披莊不過盈尺况復桑榆漸暮藜藿屢空舉燭無成穿楊盡棄但以燕求馬骨薛養鷄鳴謬齒鴻儀虚班驥皁挾太山以超海比報徳而非難堙崑崙以為池匹酬恩而反易忽屬周桐錫瑞唐水承家門有將相樹冝桃李真龍將下誰好有名濫吹先逃何須别聽但慈音抑揚損上益下江海所以稱王丘陵為之不讓曹植儻豫聞髙論則不損令名楊脩若竊在下風亦詎虧淳徳無任荷戴之至謹奉啟以聞豫章王得書賫米五十石并衣服錢帛王貞字孝逸梁郡人善屬文不事産業齊王暕鎮江都聞貞名以書召之曰夫山藏美玉光炤廊廡之間地藴神劍氣凌星漢之表是知毛遂脱頴義感平原孫慧文詞來于東海顧循寡薄有懐髦彦藉甚清風為日久矣未獲被覿良深佇遲比天高流火早應凉颷凌雲仙掌方承清露想攝衛攸冝與時休適前園後圃從容丘壑之情左琴右書蕭散烟霞之外茂陵謝病非無封禪之文彭澤辭榮先有歸來之作優逰儒雅何樂如之余屬當藩屏宣條楊越坐棠聼訟事絶詠謌扳桂摛詞眷言髙遁至於揚旌北渚飛葢西園託乗乏應劉置醴闕申穆背淮之賔徒聞其語趨燕之客罕值其人卿道冠鷹楊聲高鳳舉儒墨泉海詞章苑囿棲遲衡泌懐寳迷邦洵茲獨善良以於邑今遣行人具宣往意側望起予甚於饑渴想便輕舉副此虚心無信投石之談虚慕鑿坏之逸書不盡言更慙詞費及貞至王以客禮待之朝夕遣問安不又索文集貞啟謝曰屬賀徳仁宣敎須少來所有拙文昔公旦之才藝能事鬼神夫子之文章性與天道雅志傳於游夏餘波鼔於屈宋雕龍之跡具在風騷而前賢後聖代相師祖賞逐時移出門分路變清音於正始體髙致於元康咸言坐握虵珠誰許獨為麟角孝逸生於戰争之季長於風塵之世學無半古才不逮人往屬休明寸隂已誤雖居可封之屋每懐貧賤之耻適鄢郢而迷途入邯鄲而失步歸來反覆心灰遂寒豈謂横議過實虚塵叡覽枉髙車以載鼷費明珠以彈雀遂得裹糧三月重髙門之餘地背淮千里望章䑓之後塵與懸黎而並肆將駿驥而同皁終朝擊缶匪黄鍾之所諧日暮却行何前人之能及顧想平生觸塗多慰但以積年沉痼遺㤀日久拙思所存纔成二十三卷仰而不至方見學仙之逺窺而不覩始知遊聖之難咫尺天人周章不暇怖甚真龍之降慙過白豕之歸伏紙陳情形神悚越齊王覽所上集善之賜良馬四匹貞復上江都賦王賜錢十萬馬二匹未幾以疾甚還郷里終于家楊子崇髙祖族弟子愛賢好士蔡玉智積為同州刺史在州未嘗嬉戯逰獵聼政之暇端然讀書門無私謁有侍讀公孫尚儀山東儒士府佐楊君英蕭徳言並有文學時延於座唐鄧王元裕髙祖子元裕好學善談明理與典籖盧炤隣為布衣之交及薨炤隣為千字詩以傷之霍王元䡄時定州新樂人郎餘令為府參軍數上詞賦元䡄深禮之先是餘令從父知年為霍王友亦見推仰元䡄謂人曰郎氏兩賢人之望也相次入府不竟培塿而松柏成林濮王㤗太宗子太宗特令秦府中别置文學館任自引召學士官給酒饌㤗扵是奏引著作郎蕭徳言秘書郎顧𦙍記室參軍蔣亞卿功曹參軍謝偃等就府撰括地志五百五十卷奏上之岐王範雅愛文章之士無貴賤盡以禮接時閻朝隠劉延琦張諤鄭繇皆以文詞友善飲酒賦詩更唱迭和册府元龜卷二百九十二
