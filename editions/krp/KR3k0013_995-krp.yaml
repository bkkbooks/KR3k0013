body:
  text: 冊府元龜巻九百九十五宋王欽若等撰外臣部交侵昔鼂錯有言曰以蠻夷攻蠻夷中國之形也蓋言其同類自相攻擊不煩華夏之兵亦禦戎之良䇿而雜覇之善利也蓋夫裔夷殊俗天性忿鷙氣類不一嗜欲靡同故先王不以臣畜之而置於度外然其種族斯衆區落實繁恃氣力以相髙專戰闘而為務以至強陵弱大侵小稱兵搆亂迭為㓂掠侮亡攻昧更相吞噬雖復保塞内附參於屬國守約求援聞于有司然亦荒忽之無常但可覊縻而不絶又豈足煩王師之赴救漢髙祖初匈奴冐頓單于立東胡強聞冐頓殺父自立廼使使謂冐頓曰欲得頭曼時號千里馬冐頓問羣臣皆曰此匈奴寳馬也勿予冐頓曰柰何與人鄰國愛一馬乎遂與之頃之東胡以為冐頓畏之使使謂冐頓曰欲得單于一閼氏冐頓復問左右左右皆怒曰東胡無道廼求閼氏請擊之冐頓曰柰何與人鄰國愛一女子乎遂取所愛閼氏予東胡東胡王愈驕西侵與匈奴中間有棄地莫居千餘里各居其邊為甌脱甌脱作土室以伺也境上候望之處若今之伏宿舍也東胡使使謂冐頓曰匈奴所與我界甌脱外棄地匈奴不能至也吾欲有之冐頓問羣臣或曰此棄地予之於是冐頓大怒曰地者國之本也柰何予人諸言與者斬之於是冐頓上馬令國中有後者斬遂東襲擊東胡東胡初輕冐頓不為備及冐頓以大兵破㓕東胡王又攻破月氏王以其頭為飲噐韋昭日飲噐椑榼也晉灼曰飲噐虎子屬也或曰飲酒之噐也匈奴傳云以所破月氏王飲血盟然則飲酒之噐是也韋云椑榼晉云獸子皆非也椑榼即今褊榼所以盛酒爾非用飲者也獸子䙝噐所以溲便者也月支乃逺去過大宛西擊大夏而臣之武帝建元三年閩越舉兵圍東甌東甌使人告急於時帝年未二十以問太尉田蚡蚡以為越人相攻擊其常事又數反覆不足煩中國往救也自秦時棄不屬言不臣屬於中華於是嚴助詰蚡曰特患力不能救德不能覆誠能何故棄之且秦舉咸陽而棄之何但越也舉總也言總天下乃至京師皆棄也今小國以窮困來告急天子不振尚安所愬振舉也起也安焉也又何以子萬國乎子謂畜為臣子也帝曰太尉不足與計遂令嚴助發兵浮海救東甌未至閩越罷去閩越王郢興兵擊南粤邊邑粤使人上書曰兩粤俱為蕃臣毋擅興兵相攻擊今東粤擅興兵侵臣臣不敢興兵唯天子詔之於是天子多南粤義多猶與也守職約守蕃臣之職而不踰約制為興師遣兩将軍討閩粤兵未踰嶺閩越王弟餘善殺郢以降於是罷兵昭帝時烏桓漸強乃發匈奴先單于冢墓以報冐頓之怨於是壺衍朐鞮單于大怒發二萬騎東擊破烏桓至宣帝時西域城郭共擊匈奴車師國城郭謂諸國為城居者得其王及人衆而去單于復以車師王昆弟兠莫為車師王牧其餘民東徙不敢居故地時匈奴虚閭權渠單于怨諸國共擊車師遣左右将軍各萬餘騎屯田右地欲以侵廹烏孫西域後丁令比三嵗入盗匈奴殺畧人民數千驅馬畜匈奴遣萬餘騎往擊之無所得平帝時漢既班四條後䕶烏桓使者告烏桓民毋得復與匈奴皮布税匈奴以故事遣使者責烏桓税故時常税是以求之匈奴人民婦女欲賈販者皆隨往焉烏桓距曰奉天子詔條不當予匈奴税匈奴使怒収烏桓酋豪縳倒懸之酋豪昆弟怒共殺匈奴使及其官屬収畧婦女馬牛單于聞之遣使發左賢王兵入烏桓責殺使者因攻擊之烏桓分散或走上山或東保塞匈奴頗殺人民敺婦女弱小且千人去敺與驅同置左地告烏桓曰持馬畜皮布來贖之烏桓見畧者親屬二千餘人持財畜往贖匈奴受留不遣宣帝時烏孫上書言連為匈奴所侵削昆彌願發國半精兵人馬萬匹盡力擊匈奴唯天子垂哀本始二年漢發五将軍兵十餘萬騎出塞及校尉常惠使䕶發兵烏孫西域昆彌自将翕侯以下五萬餘騎從西方入五将軍皆無功惠與烏孫兵至右谷蠡庭獲單于父行及嫂居次名犂汗都尉千長将以下三萬九千餘級虜馬牛羊驢騾槖駝七十餘萬於是匈奴遂衰耗怨烏孫其冬單于自将數萬餘騎擊烏孫頗得老弱欲還㑹天大雨雪一日深丈餘人户畜産凍死還者不能什一於是丁令乗弱攻其北烏桓入其東烏孫擊其西凡三國所殺數萬級馬數萬匹牛羊甚衆成帝河平中夜郎王興與鈎町王禹漏卧侯俞漏卧夷邑名後為縣更舉兵相攻更迭也䍧牱太守請發兵誅興等議者以為道逺不可擊乃遣大中大夫蜀郡張正持節和觧興等不從命哀帝建平二年烏孫庶子卑援㚄翕侯人等入匈奴西界冦盗牛畜頗殺其民單于聞之遣左大當户烏夷冷将五千騎擊烏孫殺數百人畧千餘人敺牛畜去後漢光武建武二十一年車師鄯善焉耆等十八國俱遣子入侍願得都䕶漢還其侍子是時莎車王賢欲併兼西域攻擊益甚諸國聞都䕶不出而侍子皆還大憂恐乃與燉煌太守檄願留侍子以示莎車言侍子見留都䕶尋出冀且息其兵太守裴遵以状聞天子許之二十二年賢知都䕶不至遂遺鄯善王安書令絶通漢道安不納而殺其使賢大怒發兵攻鄯善安迎戰兵敗亡入山中賢殺畧千餘人而去其冬賢復攻殺龜兹王遂兼其國鄯善焉耆諸國侍子久留燉煌愁思皆亡歸賢見漢不出都䕶益横媯塞王自以國逺遂殺賢使者賢擊㓕之立其國貴人駟鞬為媯塞王賢又自立其太子則羅為龜兹王賢以則羅年少乃分龜茲為烏壘國徙駟鞬為烏壘王又更以貴人為媯塞王數嵗龜兹國人共殺則羅駟鞬而遣使匈奴更請立王匈奴立龜兹貴人身毒為龜兹王龜兹繇是屬匈奴賢以大宛貢税減少自将諸國兵數萬人攻大宛大宛王延留迎降賢因将還國徙拘彌王橋塞提為大宛王而康居數攻之橋塞提在國嵗餘亡歸賢復以為拘彌王而遣延留還大宛使貢獻如常賢又徙于闐王俞林為驪歸王立其弟位侍為于闐王嵗餘賢疑諸國欲畔召位侍及拘彌姑墨子合王盡殺之不復置王但遣将軍鎮守其國明帝永平中于闐将休莫霸反莎車自立為于闐王休莫霸死兄子廣德立後遂㓕莎車其國轉盛從兵精絶西北至疏勒十三國皆服從二十二年匈奴國亂烏桓乗弱擊破之匈奴轉北徙數千里漠南地空二十三年哀牢夷王賢栗遣兵乗箄舩南下江漢擊附塞夷鹿茤鹿茤人弱為所擒獲於是震雷疾雨南風飄起水為逆流飜涌二百餘里箄舩沉沒哀牢之衆溺死數千人賢栗復遣其六王将萬人以攻鹿茤鹿茤王與戰殺其六王哀牢耆老共埋六王夜虎復出其尸而食之餘衆驚怖引去二十四年遣其左賢王擊破北匈奴却地千餘里二十六年南匈奴前畔五骨都侯子復将其衆三千人歸南部北單于使騎追擊悉獲其衆南單于遣兵拒之逆戰不利燒當王滇良世居河北大允谷種小人貧而先零卑湳竝皆強富數侵犯之滇良父子積見陵易憤怒而素有恩信於種中於是集㑹附落及諸雜種乃從大榆入掩擊先零卑湳大破之殺三千人掠取財畜奪居其地大榆中繇是始強明帝永平十六年北匈奴聞漢通西域車師始復内屬乃遣兵擊之順帝陽嘉四年春北匈奴呼衍王率兵侵後部以車師六國接近北虜為西域蔽扞乃令燉煌太守發諸國兵及玉門闗候伊吾司馬合六千三百騎救之掩擊北虜於動山漢軍不利秋呼衍王復将三千人攻後部破之章帝元和元年北匈奴單于復願與吏人合市乃驅牛馬萬餘頭來與漢賈客交易南單于聞乃遣輕騎出上郡遮畧生口鈔掠牛馬驅還入塞二年南匈奴單于遣兵千餘人獵至涿邪山卒與北匈奴温犢王遇戰獲其首級而還又云時北虜衰耗黨衆離畔南部攻其前丁零㓂其後鮮卑擊其左西域侵其右不復自立乃逺引而去章和元年鮮卑入左地擊北匈奴大破之斬優留單于取其匈奴皮而還北庭大亂和帝永元八年戊己校尉索頵欲廢車師後部王涿鞮而立破虜侯細致涿鞮忿前部王尉卑大賣已因反擊尉卑大獲其妻子安帝元初四年遼西鮮卑休連等燒塞門冦百姓烏桓大人於秩居等與休連有宿怨共郡兵奔擊大破之斬首千三百級悉獲其生口牛馬財物延光二年鮮卑王其至鞬自将萬餘騎入東嶺候分為數道攻南匈奴於蔓柏縣名屬五原左薁鞬日逐王戰死殺千餘人三年秋復㓂髙柳擊破南匈奴殺漸将王靈帝熹平四年于闐王安國攻拘彌大破之殺其王死者甚衆戊己校尉西域長史各發兵輔立拘彌侍子定興為王魏文帝黄初中鮮卑軻比能與東部鮮卑大人素利及歩度根三部爭闘更相攻擊烏丸校尉田豫和合使不得相侵五年比能復擊素利豫帥輕騎徑進犄其後比能使别小帥𤨏奴拒豫豫進討破走之繇是懐貳乃與輔國将軍鮮于輔書曰夷狄不識文字故校尉閻柔保我於天子我與素利為讎往年攻擊之而田校尉助素利我臨陣使𤨏奴往聞使君來即便引軍退歩度根數數鈔盗又殺我弟而誣我以鈔盗我夷狄雖不知禮義兄弟子孫受天子印綬牛馬尚知美水草况我有人心邪将軍當保明我於天子輔得書以聞帝帝復使豫招納安慰南齊扶南國自晉宋世通職貢宋末扶南王姓憍陳如名闍邪跋摩遣商貨至廣州天竺道人那伽仙附載欲歸國遭風至林邑掠其財物皆盡那伽仙間道得逹梁天監中苪苪國破丁零復其舊土先是齊永明中苪苪為丁零所破更為小國而南移其居至是復焉滑國車師之别種元魏之居桑乾也滑猶為小國屬苪苪後稍強大征其旁國波斯盤盤罽賓焉耆龜兹疎勒姑墨于闐句般等國開地千餘里後魏車伊雒焉耆胡也世為東境部落帥常修職貢伊雒又率部衆二千餘人伐髙昌討破焉耆東闗七城虜獲男女二百人駝千頭馬千匹以金一百斤奉獻北齊文宣天保三年二月突厥破茹王阿那瓌瓌自殺其太子菴羅辰及瓌從弟登注侯利登注子庫提竝擁衆奔茹茹餘衆立注次子鐵伐為主四年二月送登注及子庫提還北鐵伐尋為契丹所殺國人復立登注為主仍為其大人阿當提等所殺國人復立庫提為主十二月突厥復攻茹茹茹茹舉國南奔帝自晉陽北討突厥納茹茹乃廢其主庫提立阿那瓌子菴羅辰為主置之馬邑川給其廪餼繒帛親追突厥朔州突厥請降許之而還於是貢獻相繼隋髙祖時突厥沙鉢畧與阿波相攻先是後魏末突厥伊利可汗以兵擊鐵勒大敗之降五萬餘家遂求婚於茹茹茹茹王阿那瓌大怒遣使罵之伊利斬其使率衆襲茹茹破之弟乙息記可汗立又擊破茹茹弟木杆可汗立又擊㓕茹茹沙鉢可汗忌弟二阿波可汗驍悍忌之因其先歸襲擊其部大破之殺阿波之母阿波還無所歸西奔逹頭可汗逹頭者名玷突厥沙鉢畧之從父也舊為西南可汗既而大怒遣阿波率兵而東其部落歸之者将十萬騎遂與沙鉢畧相攻又有貪汗可汗素睦於阿波沙鉢畧奪其衆而廢之貪汗亡奔逹頭沙鉢畧從弟地勤察别統部落與沙鉢畧有隙復以衆叛歸阿波至是連兵不已開皇六年契丹與突厥相侵先是契丹當後魏時為髙麗所侵部落萬餘口求内附止于白貔河其後為突厥所逼又以萬家寄於髙麗至是與諸部相攻擊久不止仁夀元年西突厥泥利可汗及葉䕶俱被鐵勒所敗歩迦尋亦大亂奚霫五部内徙歩迦奔吐谷渾煬帝大業元年西突厥處羅可汗擊鐵勒諸部厚税斂其物又猜忌薛延陀等恐為變遂集其魁帥數百人盡誅之繇是一時反叛拒處羅遂立俟利發俟斤契弊歌楞為易勿真莫何可汗居貪汗山復立薛延陀内俟斤字也咥為小可汗處羅侯毎從廵幸江都之亂隨化及至河北化及将敗奔歸京師為北藩突厥所害十二年真臘國遣使貢獻其國與參半朱江二國和親數與林邑陀桓二國戰爭其人行止皆持甲仗若有征伐因而用之唐髙祖武德末突厥阿史那社爾入侵中國歸而遇延陀廻紇等部皆叛攻破欲谷設社爾擊之復為延陀所敗遂率其餘衆保于西偏依可汗浮圖後遇頡利㓕而西蕃葉䕶又死奚利邲吐陸可汗兄弟爭國社爾陽言降之引兵西上因襲破西蕃半有其國得衆十餘萬自稱都富可汗謂其諸部曰首為背叛破我國者延陀之罪也今我據有西方大得兵馬不平延陀而自取安樂是忘先可汗為不孝也何以為突厥之主乎必先平延陀然後安居爾若天命不㨗死亦無恨其酋長咸諫曰今新得西方須留鎮壓若即棄去逺擊延陀祗恐葉䕶子孫必來復國社爾不從親率五萬餘騎討延陀於磧北連兵百餘日遇我行人劉善因立同娥設為咥利始可汗社爾部又苦兵役多委之逃去延陀因縱擊敗之復保髙昌國其舊兵在者纔萬餘家又與西蕃結隙不能復振繇是率衆入貢處其部落于靈州之北西突厥賀魯者成曵歩利設射匱特勒越之子也初阿使那歩真既來歸國咄陸可汗乃立賀魯為葉䕶以繼歩真居於多邏斯水南去西州十五日行統處因處密始蘇歌羅禄卑失五姓之衆咄陸西走乃呼賀魯欲立之以為可汗遣兵逼逐賀魯二三年間遂相侵掠不常厥居執舍地處木昆婆鼻二姓以賀魯無罪往請射匱射匱怒欲討執舍地繇是三姓率部落隨賀魯有數千人太宗貞觀十五年十一月癸酉薛延陀盡其甲騎并發同羅僕骨回紇靺鞨奚霫等衆各二十萬率一人馬四匹度漢屯白道川據善陽嶺以擊思摩之部思摩引其種落走朔州留精騎以戰延陁乗之及塞詔營州都督張儉統所部騎兵及奚霫契丹等壓其東境是年突厥咄陸可汗與沙鉢羅葉䕶可汗頻相攻擊咄陸于時兵衆漸強西域諸國復來歸附未㡬咄陸遣石國吐屯攻葉䕶擒之送於咄陸尋為所殺咄陸可汗既并其國弩矢畢諸姓心不服咄陸皆叛之咄陸復率兵擊吐火羅破之初咄陸以泥孰啜自擅取部物斬之以狥尋為泥孰啜部将胡禄屋所襲衆多亡逸其國大亂十七年新羅王遣使上言髙麗百濟累相攻襲亡失數十城乞偏師救助詔遣司農丞相里元奨齎璽書往諭賜髙麗曰新羅委命國家不闕朝獻爾與百濟宐即戢兵新羅蓋蘇文謂元奨曰髙麗新羅怨隙已久往者隋室相侵新羅乗釁奪髙麗五百里之地城邑新羅皆據有之自非反地還城此兵恐未能已元奨曰既往之事焉可追論蘇文竟不從二十年六月乙亥鐵勒僕骨同羅共擊薛延陀多彌可汗大敗之二十一年五月西蕃咄陸可汗為郭葛吐鴟俟利發所破奔于波斯二十二年六月乙卯吐蕃來獻天竺之㨗九月己丑新羅為百濟所攻破其一十三城髙宗永徽元年六月新羅王金真德大破百濟之衆遣使以聞五年五月大食引兵擊波斯及米國皆破之波斯五伊嗣侯為大食兵所殺伊嗣侯之子卑路期走投吐火羅遣使來告難上以路逺不能救之尋而大食兵退吐火羅遣兵援立之而還十月髙麗遣其将安固率髙麗靺鞨兵侵契丹松漠都督李窟哥發騎禦之戰于新城適㑹大風髙麗放箭風吹竝廻因而陳亂契丹乗之斬首五百級獲馬七百餘匹髙麗敗走草乾風勁契丹又縱火廹之飈熖飛起燒殺人馬甚衆契丹聚其屍築為京觀遣使來告㨗帝使宣其露布於朝以示百僚六年二月乙丑遣營州都督程元振左衛中郎将蘇定方等發兵以討髙麗以侵掠新羅故也時新羅王金春秋表言髙麗與百濟靺鞨相連侵其北境已奪三十三城乞兵救援故遣元振等經畧之顯慶元年三月先是百濟發兵伐新羅新羅拒戰破之殺三千餘人至是新羅王金春秋遣使來告㨗十二月吐蕃大将禄東賛率兵一十二萬擊白蘭氏苦戰三日吐蕃初敗後勝殺白蘭千餘人屯軍境上以侵掠之龍朔中吐蕃欽陵與吐谷渾不和逓相表奏各論曲直國家依違未為與奪吐蕃怨怒遂叛以兵臨吐谷渾告急髙宗令将薛仁貴郭待封等率衆十餘萬伐之軍至大非川為欽陵等所敗遂㓕吐谷渾麟德二年閏三月疎勒弓月兩國共引吐蕃之兵以侵于闐詔西川都督崔知辯及左武衛将軍曹繼叔率兵救之𤣥宗開元八年七月南天竺國王尸利那羅僧伽摩請以戰象兵馬討大食及吐蕃仍求有以名其軍制𤣥宗嘉之名為懐德軍十四年契丹落刺史普固都及将軍顒哥皆獻戎㨗授固都将軍顒哥郎将各賜帛百疋放還蕃德宗貞元七年九月回鶻遣使獻敗吐蕃葛禄於北庭所㨗及其俘畜先是吐蕃入靈州及為回鶻所敗夜焚攻城之械而退十二月甲午回鶻遣殺支将軍獻得吐蕃俘大首領尚結心帝御延喜門觀之十年正月南詔蠻異牟尋大破吐蕃於神川使來獻㨗初吐蕃因北庭與回鶻大戰死傷頗衆乃徴兵於牟尋須萬人牟尋既定計歸我因其徴兵以襲之乃陽示寡弱謂吐蕃曰蠻軍素少僅可發三千人吐蕃少之請益至五千乃許牟尋遽遣兵五千人戍吐蕃乃自将數萬踵其後晝夜兼行乗其無備大破吐蕃於神川鐵橋遣使告㨗且請韋臯使閲其所虜獲及城堡以取信焉三月西川節度使韋臯奏南詔異牟尋擊破吐蕃収鐵橋已來城壘一十六擒其王五人降其衆十萬餘口憲宗元和四年九月豐州奏吐蕃萬騎至大石谷掠奪廻鶻之還國者文宗太和五年九月豐州刺史李公政奏黨項於黒山刦掠歸國廻鶻差兵馬使僕固全等七人為賊射殺七年三月己酉安南奏蠻去年十二月三十日於界内金龍洲下營當管生獠國出兵殺賊千餘騎赤珠落國亦出兵助討開成三年八月甲辰安南奏得驩州状申水真臘國差王子領兵馬攻伐環王國今差兵士赴驩州防遏後唐荘宗同光二年七月幽州奏偵得阿保機東攻渤海九月庚戍有自契丹部降者上言女真廻鶻黄頭室韋合勢侵契丹召北部酋長禦捍四年正月北靣招討使李紹真奏北來奚首領云契丹阿保機冦渤海國明宗天成元年十一月青州霍彦威奏得登州状申契丹先發諸部攻逼渤海國自阿保機身死雖已抽退尚留兵馬在渤海扶餘城今渤海王弟部領兵士攻圍扶餘城契丹長興元年正月青州奏羗人押渤海王憲一行歸本國被黒水剽刼今得黒水兀兒状及将印紙一張進呈晉髙祖天福二年二月新州翟璋奏契丹㸃發新毅蔚等州軍馬與契丹討奚族逹刺于今已歸服五年四月辛亥北京奏契丹于越王進寜掠山後諸蕃退止於青塜冊府元龜卷九百九十五
