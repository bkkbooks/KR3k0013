body:
  text: 册府元龜卷二百八十三宋王欽若等撰宗室部承襲第二後漢齊哀王章光武長兄縯長子建武二年立為太原王十一年徙為齊王立二十一年薨子殤王石嗣立二十四年薨子晃嗣晃立十七年以罪貶爵為蕪湖侯晃卒子無忌嗣章帝以伯升首創大業而後嗣罪廢心常愍之時北海亦絶無後遺詔令復二國永元二年乃復封無忌為齊王是為惠王立五十二年薨子頃王喜嗣立五年薨子承嗣下博侯張齊殤王子建中初卒子它人奉其祀北海靖王興光武長兄縯次子建武二年封為魯王嗣光武兄仲立三十九年薨子敬王睦嗣立十年薨子哀王基嗣基立十四年薨無子章帝憐之不除其國和帝永元二年封睦庶子斟鄉侯威為北海王奉睦後立七年威以非睦子又坐誹謗檻車徴詣廷尉道自殺永初元年鄧太后復封睦孫夀光侯普為北海王是為頃王普立七年薨子恭王翼嗣立十四年薨子康王嗣無後趙孝王良光武叔父立十六年薨子節王栩嗣栩立四十年薨子頃王商立二十三年薨子靖王宏立十二年薨子惠王乾嗣乾立四十八年薨子懐王豫嗣豫薨子獻王赦嗣赦薨子珪嗣建安十八年徙封博陵王魏初以為崇德侯城陽恭王祉光武族兄舂陵康侯敞之子建武十一年薨十三年封祉子平為蔡陽侯以奉祉祀平卒子真嗣真卒子禹嗣禹卒子嘉嗣泗水王歙光武族父建武十年薨封小子燀為堂谿侯奉歙後淄川王終泗水王歙子歙薨終居䘮思慕哭泣三十餘日亦薨封長子柱為邔侯以奉終祀冝春侯匡泗水王歙從父弟建武二年封子浮嗣封朝陽侯浮傳國至孫䕶無子封絶延光中䕶從兄瓌娶安帝乳母王聖女伯榮為妻得紹䕶封為朝陽侯王聖敗貶爵為亭侯安城孝侯賜光武族兄建武二十八年卒子閔嗣閔卒子商嗣徙封為白牛侯商卒子昌嗣成武孝侯順光武族兄建武十一年卒子遵嗣以罪降為端氏侯遵卒子弇嗣順陽懐侯嘉光武族兄建武十五年卒子参嗣有罪削為南鄉侯永平中参為城門校尉参卒子循嗣循卒子章嗣東海恭王彊光武子立十八年薨子靖王政嗣政立四十四年薨子頃王肅嗣二十三年薨子孝王臻嗣臻立三十一年薨子懿王祗嗣祗立四十四年薨子羡嗣沛獻王輔光武子立四十六年薨子釐王定嗣定立十一年薨子節王正嗣立十四年薨子孝王廣嗣廣立三十五年薨子幽王榮嗣榮立二十年薨子孝王琮嗣琮薨子共王曜嗣曜薨子契嗣楚王英光武子立三十三年以罪自殺元和三年追謚楚厲侯子楚侯种嗣後徙封六侯六縣名属廬江郡种卒子度嗣度卒子拘嗣𫝊國于後濟南安王康光武子立五十九年薨子簡王錯嗣錯立六年薨子孝王香嗣香立二十年薨無子國絶永建元年順帝立錯子阜陽侯顯為嗣是為釐王立三年薨子悼王廣嗣東平憲王蒼立四十五年薨子懐王忠嗣忠立十一年薨子孝王敞嗣敞立四十八年薨子頃王端嗣端立四十七年薨子凱嗣任城孝王尙東平憲王子立十八年薨子貞王安嗣安立十九年薨子節王崇嗣崇立三十一年薨無子國絶延熹四年桓帝立河間孝王子博為任城王以奉其祀博立十三年薨無子國絶熹平四年靈帝復立河間貞王子新昌侯佗為任城王奉孝王後阜陵質王延光武子立五十一年薨子殤王冲嗣冲立二年薨無嗣和帝復封冲兄魴是爲頃王魴立三十年薨子懐王恢嗣恢立十年薨子節王代嗣代立十四年薨無子國絶建和元年桓帝立勃遒亭侯便親為恢嗣是為恭王立十三年薨子孝王統嗣立八年薨子赦嗣廣陵思王荆光武子立二十九年以罪自殺封荆子元夀為廣陵侯服王璽綬食荆故國六縣元夀卒子商嗣商卒子條嗣傳國於後中山簡王焉光武子立五十二年薨子夷王憲嗣憲立二十二年薨子孝王𢎞嗣𢎞立二十八年薨子穆王暢嗣暢立三十四年薨子節王稚嗣琅琊孝王京光武子立三十一年薨子夷王宇嗣宇立二十年薨子恭王夀嗣夀立十七年薨子貞王尊嗣尊立十八年薨子安王據嗣據立四十七年薨子順王容嗣容立八年薨建安十一年復立容子熈為王陳敬王羡明帝子立三十七年薨子思王鈞嗣鈞立二十一年薨子懐王竦嗣竦立二年薨無子國絶永寕元年立敬王子安壽亭侯崇為陳王是為頃王立五年薨子孝王承嗣承薨子愍王寵嗣彭城靖王恭明帝子立四十六年薨子考王道嗣道立二十八年薨子頃王定嗣立四年薨子孝王和嗣和立六十四年薨孫祗嗣魏以為崇徳侯樂城靖王黨明帝子立二十五年薨子哀王崇嗣崇立二月薨無子國絶明年和帝立崇兄修侯廵為樂城王是為釐王立十五年薨子隐王賔嗣立八年薨無子國絶明年復立濟北惠王子萇為樂成王後萇到國驕淫不法安帝貶萇爵為臨湖侯延光元年以河間孝王子得嗣靖王後以樂成比廢絶故改國曰安平是為安平孝王立三十年薨子續嗣下邳惠王衍明帝子建初四年就國衍後病荒忽而太子卭有罪廢諸姬争欲立子為嗣連上書相告言和帝憐之使彭城靖王恭至下邳正其嫡庶賜恭詔曰皇帝問彭城王盖聞堯親九族萬國恊和書典之所羙也下邳王被病沉滯之疾昏亂不明家用不寕姬妾嫡庶諸子分争紛紛至今前太子卭頑㓙失道䧟于大辟是後諸子更相誣告迄今嫡嗣未知所定朕甚傷之惟王與下邳王恩義至親正此國嗣非王而誰禮重適庶之序春秋之義大居正孔子曰惟仁者能好人能惡人貴仁者所好惡得其中也太子國之儲嗣可不慎歟王其差次下邳諸子可為太子者上名将及景風拜授印綬焉立五十四年薨子貞王成嗣成立二年薨子愍王意嗣意立五十七年薨子哀王冝嗣梁節王暢明帝子立二十七年薨子恭王堅嗣堅立二十六年薨子懐王匡嗣匡立十一年薨無子順帝封其弟孝陽亭侯成為梁王是為夷王立二十九年薨子敬王元嗣立十六年薨子彌嗣立四十年魏受禪以為崇徳侯淮陽頃王昞明帝子永平五年封常山王建初四年徙封淮陽立十六年薨未及立嗣永元二年和帝立昞小子惻復為常山王奉昞後是為殤王立十三年薨無子立兄防子侯章為常山王立二十五年薨是為靖王子頃王儀嗣儀立十七年薨子節王豹嗣豹立八年薨子暠嗣千乗貞王伉章帝子立十五年薨子寵嗣永元七年改國名樂安立二十八年薨是為夷王子鴻嗣鴻生質帝質帝立梁太后下詔以樂安國土卑濕租委鮮薄委謂委輸也改鴻封勃海王立二十六年薨是為孝王無子太后立桓帝弟蠡吾侯悝為勃海王奉鴻嗣悝蠡吾侯翼子河間王開孫也清河孝王慶章帝子立二十五年薨子愍王虎威嗣虎威三年薨亦無子鄧太后復立樂安王寵子延平為清河王是為恭王寵即千乗王伉之子立三十五年薨子蒜立三年以罪貶尉氏侯自殺國絶明年梁太后立安平孝王子經侯理為甘陵王梁冀惡清河名改為甘陵奉孝徳皇祀初孝王慶子祐為鄧太后所立是為安帝帝乃追尊孝王為孝徳皇是為威王理立二十五年薨子貞王定嗣定立四年薨子獻王忠嗣濟北惠王壽章帝子立三十一年薨子節王登嗣登立十五年薨子哀王多嗣多立三年薨無子永和四年立戰鄉侯安國為濟北王臣欽若等曰節王登弟五人皆為鄉侯安國疑其一也是為釐王安國立十年薨子孝王次嗣次立七年薨子鸞嗣鸞薨子政嗣河間孝王開章帝子立四十二年薨子惠王政嗣政立十年薨子貞王建嗣建立十年薨子安王利嗣利立二十八年薨子陔嗣陔立四十一年魏受禪以為崇德侯蠡吾侯翼河間孝王子翼卒子志嗣後為大將軍梁翼所立是為桓帝梁太后詔追尊蠡吾先侯曰孝崇皇建和二年封帝兄都鄉侯碩為平原王奉翼後觧瀆亭侯淑河間孝王子淑卒子長嗣長卒子宏嗣為大將軍竇武所立是為靈帝竇太后詔追尊皇祖淑為孝元皇皇考長為孝仁皇熹平三年拜河間安王利子康為濟南王奉孝仁皇祀康薨子贇嗣贇為黄巾賊所害子開嗣魏受禪以為崇德侯平原懐王勝和帝長子立八年薨無子鄧太后立樂安夷王寵子得為平原王奉勝後是為哀王得立六年薨無子永寧元年太后又立河間王開子都鄉侯翼為平原王嗣魏陳忠侯仁太祖從弟黄初四年薨子㤗嗣轉封寗陵侯㤗薨子初嗣髙陵亭威侯純陳忠侯弟建安十五年薨子演嗣正元中進封平樂鄉侯演薨子亮嗣樂城恭侯洪太祖從弟太和六年薨子馥嗣長平壮侯休太祖族子太和二年薨子肇嗣肇正始中薨子興嗣邵陵元侯真太祖族子明帝時薨子爽嗣爽誅嘉平中紹功臣世封真族孫熈為新昌亭侯邑三百户以奉真後任城威王彰太祖子黄初四年薨子楷嗣徙封中牟五年改封任城縣太和六年復改封任城國陳思王植太祖子植薨子志嗣徙封濟北王蕭懐王熊太祖子早薨青龍二年子哀王炳嗣豐愍王昂太祖子隨太祖南征為張繡所害無子黃初二年追封謚曰豐悼公三年以樊安公均子琬奉昂後封中都公其年徙封長子公五年追加昂號曰豐悼王太和三年改昂謚曰愍王嘉平六年以琬襲昂爵為豊王琬薨謚曰恭王子㢘嗣相殤王鑠太祖子早薨太和三年追封謚青龍元年子愍王潜嗣其年薨二年子懐王偃嗣四年薨無子國除正元二年以樂陵王茂子陽都鄉公竦繼鑠後鄧哀王冲太祖子建安十三年薨命宛侯據子琮奉冲後二十二年封琮鄧侯黄初三年進琮爵徙封冠軍公四年徙封巳氏公沛穆王林太祖子林薨子緯嗣中山恭王衮太祖子青龍三年薨子孚嗣濟陽懐王玹太祖子建安十六年封西鄉侯早薨無子二十年以沛王林子賛襲玹爵邑賛早薨無子文帝復以賛弟壹紹玹後黃初二年改封濟陽侯四年進爵為公太和四年追進玹爵謚曰懐公六年又進號曰懐王追謚賛曰西鄉哀侯壹薨謚曰悼公子恒嗣陳留㳟王峻太祖子甘露四年薨子澳嗣范陽閔王矩太祖子早薨無子建安二十二年以樊安公均子敏奉矩後太和六年改封敏琅邪王景元中敏薨謚曰原王子焜嗣楚王彪太祖子嘉平元年以罪自殺封彪子嘉為常山真定王郿戴公整太祖子奉從叔父郎中紹後建安二十二年封郿侯二十三年薨無子黄初二年追進爵謚曰戴公以彭城王據子範奉整後三年封平氏侯四年徙封成武太和三年進爵為公青龍三年薨謚曰悼公無後四年詔以範弟東安鄉公闡為郿公奉整後樊安公均太祖子奉叔父薊恭公彬後建安二十二年封樊侯二十四年薨子抗嗣黃初二年追進公爵謚曰樊安公三年徙封抗薊公四年徙封屯留公景初元年薨謚曰定公子諶嗣東平靈王徽太祖子奉叔父朗陵哀侯王後正始三年薨子翕嗣賛哀王恊文帝子早薨太和五年追封謚曰經殤公青龍二年更追改號謚三年子殤王尋嗣北海悼王㽔文帝子青龍元年薨二年以琅邪王子贊奉㽔後封昌鄉公景初二年立為饒安王東海定王霖文帝子嘉平元年薨子啓嗣元城哀王禮文帝子太和三年薨五年以任城王楷子悌嗣禮後六年改封梁王邯鄲懐王邕文帝子太和三年薨五年以任城王楷子温嗣邕後六年改封魯陽蜀安平悼王理後主庻弟延熈七年卒子哀王𦙍嗣十九年卒子殤王承嗣二十年卒景耀四年詔曰安平王先帝所命三世早夭國嗣頺絶朕用傷悼其以武邑侯輯襲王位輯理子也吳沙羡侯奐堅弟静之子嘉禾三年卒子承嗣以昭武中郎将代統兵領郡赤烏六年卒無子封承庶弟壹奉奐後丹陽侯𦙍奐兄皎之子皎為征虜将軍建安二十四年卒追録其功封𦙍𦙍卒無子弟晞嗣都亭侯賁堅兄子為征虜将軍豫章太守在官十一年卒子鄰年九嵗代領豫章進封都鄉侯鄰字公達雅性精敏㓜有令譽赤烏十二年卒子苖嗣晋安平獻王孚宣帝次弟也世子邕先孚卒邕子崇為世孫又早夭泰始九年立崇弟平陽亭侯隆為安平王義陽成王望安平獻王子出繼伯父朗泰始七年薨子奕早亡以奕子竒襲爵竒好蓄聚太康九年貶為三縱亭侯更以章武王威河間平王洪子為望嗣後威誅復立竒為棘陽王以嗣望河間平王洪義陽成王子出繼叔父昌武亭侯遺仕魏歴位典農中郎将原武太守封襄賁男武帝受禪封河間王立十二年咸寕二年薨子威嗣徙封章武威既繼義陽王望更立威弟混為洪嗣混小子滔初嗣新蔡王確與新蔡太妃不協太興二年上䟽以兄弟並沒在遼東章武國絶冝還所生太妃訟之事下太常太常賀循議章武新蔡俱承一國不絶之統義不得替其本宗而先後傍親案滔既已被命為人後矣必須無復兄弟本國永絶然後得還所生今兄弟在逺不得言無道里雖阻復非絶域且鮮卑恭命信使不絶自冝詔下遼東依劉羣盧諶等例發遣令還繼嗣本封謂滔今未得便委離所後也元帝詔曰滔雖出養自有所生母新蔡太妃相待甚薄滔執意如此如其不聼終當紛紜更為不可今便順其所執還襲章武滔歴位散騎常侍薨子休嗣休與彭城王雄俱奔蘇峻蘇峻平休已戰死弟珍時年八嵗以小弗坐咸和六年襲爵位至大宗正薨無嗣河間王欽以子範之繼位至遊擊大將軍薨子秀嗣隨穆王整義陽成王子兄奕卒以整為世子歴南中郎将封清泉侯先父望薨武帝以義陽國一縣追封為隨縣王子邁嗣太康九年以義陽之平林益邁為隨郡王太原成王輔安平獻王子輔薨子鑠立南宫縣王翼安平獻王子武帝末受禪而卒以兄邕之支子承為嗣封南宮縣王承薨子祐嗣下邳獻王晃安平獻王子咸寕六年薨二子褒綽褒卒綽有篤疾别封良城縣王以太原王輔第三子韡為嗣官至侍中尚書早薨子韶立太原烈王瓌安平獻王子泰始十年薨子顒立徙封河間王河間王顒太原烈王子永嘉初為南陽王模所害詔以彭城元王植子融為顒嗣改封樂城縣王薨無子建興中元帝又以彭城康王釋子欽為融嗣髙陽王珪安平獻王子泰始十年薨珪有美譽於世而帝甚悼惜之無子詔以太原王輔子緝襲爵緝立五年咸寜四年薨諡曰哀無子太康二年詔以太原王瓌世子顒子訟為緝後常山孝王衡安平獻王子泰始二年薨無子以安平世子邕第四子敦為嗣沛順王景安平獻王子咸寕元年薨子韜立彭城穆王權宣帝弟馗之子咸寕二年薨子元王植立植薨子康王釋立釋薨子雄立坐奔蘇峻伏誅更以釋子紘嗣紘薨子𤣥嗣𤣥薨子𢎞之立位至散騎常侍薨子邵立邵薨子崇之立崇之薨子緝之立髙宻文獻王泰宣帝弟馗之子元康九年薨子略立永嘉三年薨子據立薨無子以彭城康王子紘為嗣其後紘歸本宗立紘子俊以奉其嗣俊薨子敬王純之立純之薨子恢之立東海孝獻王越髙宻文獻王子元帝時以越世子毗没於石勒不知存亡帝乃以第三子冲繼毗後稱東海世子以毗陵郡増本封邑萬户又改食下邳蘭陵以越妃裴氏為太妃薨因發毗䘮冲即王位以滎陽益東海國轉車騎将軍徙驃騎将軍咸康七年薨年三十一贈侍中驃騎大将軍儀同三司無子成帝詔曰哀王無嗣國統将絶朕所哀怛其以小晩生奕繼哀王為東海王以道逺罷滎陽更以臨川郡益東海及哀帝以琅邪王即尊位徙奕為琅邪王東海國闕無嗣奕後入纂大業桓温廢之復為東海王既而貶為海西公東海國又闕嗣隆安三年安帝詔以㑹稽忠王次子彦璋為東海王繼哀王為曽孫改食吳興郡為桓𤣥所害國除新蔡武哀王騰髙宻文獻王子騰以戰死庶子確立是為荘王確無子初以章武王混子㴞奉其祀其後復以汝南威王祐子弼為確後太興元年薨無子又以弼弟邈嗣確位至侍中薨子晃立拜散騎侍郎桓温廢武陵王免晃為庶人徙衡陽孝武帝立晃弟崇繼邈後范陽康王綏宣帝弟馗之子咸寕五年薨子虓立虓薨無子養南陽王模子黎為嗣濟南惠王遂宣帝弟恂之子泰始二年薨二子眈緝眈嗣濟南惠王立咸寕三年徙為中山王是年薨無子緝繼譙剛王遜字子悌宣帝弟進之子㤗始二年薨子定王隨立隨薨子䆳立没於石勒元帝以遜次子承嗣是為閔王承為王廙所害子無忌立是為烈王無忌永和六年薨二子恬愔恬立是為敬王太元十五年薨子尚之立是為忠王為桓𤣥所害𤣥上䟽以閔王不冝絶祀乃更封尚之從弟康之為譙縣王安帝反正追贈尚之衛将軍以尚之弟休之長子文思為尚之嗣襲封譙郡王廣晋伯愔譙烈王子早卒無子兄恬以子允之嗣髙陽王睦譙剛王弟元康元年薨世子蔚早卒孫毅立永嘉中没於石勒隆安元年詔以譙敬王恬次子恢之子文深繼毅後立五年薨無嗣復以髙宻王純之子法連繼之任城景王陵字子山宣帝弟通之子咸寕五年薨子濟立西河繆王斌任城景王子咸寕四年薨子隠立隠薨子孴音煟多貌立平原王幹字子良宣帝子永嘉五年薨有二子世子廣早卒次子永以太熈中封安徳縣公琅琊武王伷宣帝子太康四年薨子恭王覲立覲拜冗從僕射太熈元年薨時年三十五子睿立是為元帝太興初帝以皇子裒為琅琊王奉恭王祀裒早薨子哀王安國立未踰年薨更以皇子煥為琅邪王初煥封顯義亭侯尚書令刁恊奏昔魏臨菑侯以邢顒為家丞劉禎為庶子今侯㓜弱冝選明徳帝令曰臨菑萬户封又植少有美才能同遊田蘇者今晩生朦弱何論於此間封此兒不以寵稚子也亡弟當應繼嗣不獲已耳家丞庶子足以攝祀而已豈宜屈賢才以受無用乎及煥疾篤乃下詔封為琅琊王嗣恭王後俄而薨年二嵗以皇子昱為琅邪王咸和之初既徙封㑹稽成帝又以康帝為琅邪王康帝即位封成帝長子哀帝為琅邪王哀帝即位以廢帝為琅邪王廢帝即位以㑹稽王攝行琅邪國祀簡文帝登祚琅邪王無嗣帝封少子道子為琅邪王道子後為㑹稽王更以恭帝為琅邪王帝既即位琅邪國除武陵荘王澹琅邪武王子永嘉末為石勒所害子哀王喆立喆無子其後元帝立皇子晞為武陵王以奉澹祀晞為桓温所廢太元六年卒十二年追封武陵王子忠敬王遵嗣義熈四年薨子定王季度立拜散騎侍郎薨子球之立東安王繇琅邪武王子永康中為成都王頴所害後立琅邪王覲子長樂亭侯渾為東安王以奉繇祀淮陵元王漼琅邪武王子為宗正薨子貞王融立融薨無子安帝時立武陵威王孫藴為淮陵王以奉元王之祀位至散騎常侍薨無子以臨川王寳子安之為嗣清恵亭侯京宣帝子年二十四薨以文帝子機為嗣㤗始元年封燕王機無子齊王冏表以子幾嗣扶風武王駿宣帝子駿薨子暢嗣改封順陽王新野荘王歆扶風武王子為張昌所害無子以兄子劭為後汝南文成王亮宣帝子惠帝時趙王瑋矯詔誅亮及其世子矩俱為亂兵所害瑋誅追復亮爵謚矩為懐王子祐立是為威王祐咸和元年薨子恭王統立以南頓王宗謀反被廢其後成帝哀亮一門殄絶詔統復封統薨子義立義薨子遵之立以罪伏誅弟楷之子蓮扶立梁孝王彤宣帝子永康二年薨無子以武陵王澹子禧為後是為懐王沒於石勒元帝時以西陽王羕子悝為彤嗣悝早薨是為殤王至是懐王子翹自石氏歸國得立是為聲王官至散騎常侍薨無子詔以武陵威王子㻱為翹嗣歴永安太僕與父晞俱廢徙新安薨太元中復國子􅀈立薨子珍之立齊獻王攸文帝子景帝無子命攸為嗣徙封武陽侯後改安昌武帝踐祚封齊王攸薨子冏嗣冏誅永興初詔以齊王冏輕䧟重刑前勲不宜堙沒乃赦其三子超􅖅英還第封超為縣王以繼冏祀及雒陽傾覆超兄弟皆沒于劉聰冏遂無後太元中詔以故南頓王宗子柔之襲封齊王紹攸冏之祀城陽哀王兆文帝子年十嵗而夭武帝踐祚詔曰亡弟千秋少聰慧有夙成之質不幸早亡先帝先后特所哀愍先后欲紹立其後而竟未遂每追遺意情懐感傷其以皇子景度為千秋後雖非典禮亦近世之所行且以述先后本㫖也於是追加兆封謚景度以泰始六年薨復以第五子憲繼哀王後薨復以第六子祗為東海王繼哀王後薨咸寕初又封第十三子遐為清河王以繼兆後遼東悼恵王定國文帝子年三嵗薨咸寕初追加封謚齊王攸以長子㽔為嗣㽔薨子遵嗣廣漢殤王廣徳文帝子年二嵗薨咸寕初追加封謚齊王攸以子賛紹封賛薨攸更以子實嗣廣徳後樂安平王鍳文帝子元康七年薨子殤王籍立籍薨無子齊王冏以子冰紹鍳後以濟隂萬一千二百一十九户改為廣陽國立冰為廣陽王楚隠王瑋武帝子以罪誅永寜元年封其子範為襄陽王長沙厲王乂武帝子後被誅永安元年詔長沙王乂輕䧟重刑封其子紹為樂平縣王以奉其嗣永嘉中懐帝以乂子碩嗣成都王頴字章度武帝子以罪縊永嘉中立東萊主㽔子遵為頴嗣封華容縣王毗陵悼王軌武帝子二嵗而夭太康十年追加封謚以楚王瑋子義嗣秦獻王柬武帝子元康元年薨無子以淮南王允子郁為嗣郁與允俱被害永寕二年追謚曰悼又以呉王晏子鄴嗣始平哀王裕武帝子咸寕三年薨年七嵗無子以淮南王允子廸為嗣太康十年改封漢王淮南忠壯王允武帝子為趙王倫子䖍所害允三子皆被害齊王冏上表以息超繼允後冏敗超被幽金墉城後更以呉王晏子祥為嗣代哀王演武帝子演薨無子以成都王頴子廓為嗣改封中都王清河康王遐武帝子永康元年薨子覃嗣覃為皇太子以弟新蔡王籥還封清河王㑹稽思世子道生字延長簡文之子也以幽廢卒無後及孝武帝即位嘗晝見道生及臨川獻王郁郁曰大郎饑乏辛苦言竟不見帝傷感因以西陽王羕𤣥孫珣之為後臨川獻王郁簡文子年十七薨寕康初追封郡王以武陵威王曽孫寳為嗣㑹稽文孝王道子簡文子出後瑯邪孝王及恭帝為瑯邪王道子受封㑹稽國後為桓𤣥所害義熈元年以臨川王寳子修之為道子嗣是為悼王册府元龜卷二百八十三
