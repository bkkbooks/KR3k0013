body:
  text: 册府元龜巻八百九十八宋王欽若等撰總錄部治命古人有言曰死者士之終又曰人之將死其言也善故其治命可得而徴矣至有屬纊忍死反席正容精爽不亂教誡周悉顧託後事申論素志亦有願上爵土悉還賜賚固免贈謚預為終制或景慕前哲因卜其宅兆或愛樂俗化止窆於治所以至折劵以狥義操牘以寫心啟手歸全揚名後世書曰惟人萬物之靈自非有道之士亦安能溘然死生之際汨而無擾哉魏武子為晉大夫有嬖妾無子武子疾命顆曰必嫁是武子魏犨顆之父疾病則曰必以為殉及卒顆嫁之曰疾病則亂吾從其治也及輔氏之役顆見老人結草以亢杜回亢禦也杜回躓而顛故獲之夜夢之曰余而所嫁婦人之父也而女也爾用先人之治命余是以報寗惠子為衛大夫有疾召悼子悼子寗喜曰吾得罪於君悔而無及也名藏在諸侯之䇿曰孫林父寗殖出其君君入則掩之掩惡也若能掩之則吾子也若不能猶有鬼神吾有餧而已不來食矣餧餓也悼子許諾惠子遂卒孫叔敖楚大夫將死戒其子曰王數封我矣吾不受也我死王則封汝必無受利地楚越之間有寢邱者此其地不利而名甚惡可長有者唯此也叔敖死王以美地封其子其子辭請寢丘至今不失葉公之顧命曰毋以小謀敗大作毋以嬖御人疾莊后毋以嬖御士疾莊士大夫卿士葉公楚縣公葉公子高也臨死遺書曰顧命小謀小臣之謀也大作大臣之所為也嬖御人愛妾人疾亦作也莊后適夫人齊莊得禮者嬖御士愛臣也莊士亦謂士之齊莊得禮者今為大夫卿士魯季孫有疾命正常曰無死正常桓子之寵臣欲付以後事故勑令勿從已死南孺子之子男也則以告而立之南孺子季桓子之妻言若生男告公而立之女也則肥也可肥康子也季孫卒康子即位既葬康子在朝在公朝也南氏生男正常載治如朝告曰夫子有遺言命其圉臣曰南氏生男則以告於君與大夫而立之今生矣男也敢告遂奔衛康子請退退辭位也襄公使共劉視之共劉大夫則或殺之矣乃討之討殺者召正常正常不反孟釐子為魯大夫病且死誡其嗣懿子曰今孔邱年少好禮其逹者歟吾即没若必師之及釐子卒懿子與魯人南宮敬叔往學禮焉季桓子魯大夫病輦而見魯城喟然歎曰昔此國幾興矣以吾獲罪於孔子故不興也顧謂其嗣康子曰我即死若必相魯相魯必召仲尼後數日桓子卒康子代立已葬欲召仲尼公子魚曰昔吾先公用之不終終為諸侯笑今又用之不能終是再為諸侯笑康子曰誰召而可曰必召冉求於是使使召冉求漢司馬談為太史公掌天官不治民有子曰遷仕為郎中奉使巴蜀是嵗天子始建漢家之封而太史公留滯周南古之周南今之洛陽不得與從事故發憤且卒而遷適使及見父於河雒之間太史公執遷手而泣曰余先周室之太史也自上世嘗顯功名於虞夏典天官事後世中衰絶於予乎汝復為太史則續吾祖矣今天子接千嵗之綂封泰山而余不得從行是命也夫余死汝必為太史為太史無忘吾所欲論著矣且夫孝始於事親中於事君終於立身揚名於後世以顯父母此孝之大也夫天下稱誦周公言能論歌文武之德宣周召之風逹太王王季之思慮爰及公劉以尊后稷也幽厲之後王道缺禮樂衰孔子修舊起廢論詩書作春秋則學者至今則之自獲麟以來四百有餘載案年表魯哀公十四年獲麟至漢元封元年三百七十一年而諸侯相兼史記放絶今漢興海内一綂明主賢君忠臣死義之士余為太史而弗論載廢天下之史文余甚懼焉汝其念哉遷俯首流涕曰小子不敏請悉論先人所以舊聞弗敢闕卒三載而遷為太史令抽繹史記石室金匱之書以成史記歐陽地餘元帝時侍中貴幸至少府戒其子曰我死官屬即送汝財物愼毋受汝九卿儒者子孫以亷潔著可以自成及地餘死少府官屬共送百萬其子不受天子聞而嘉之賜錢百萬後漢樊重南陽湖陽人營理産業資至鉅萬為三老年八十餘終其素所假貸人間數百萬遺令焚削文契債家聞者皆慙爭往償之諸子從勑竟不肯受羊續為南陽太守徴為太常未及行㑹病卒遺言薄歛不受賵遺舊典二千石卒官賻百萬府丞焦儉遵續先意一無所受張純為大司空臨終勑家臣曰司空無功於時猥蒙爵土身死之後勿議傳國崔瑗為濟北相病卒臨終顧命子寔曰夫人禀天地之氣以生及其終也歸精於天還骨於地何地不可藏形體勿歸鄉里其賵贈之物羊豕之奠一不得受寔奉遺令留葬雒陽蓋勲為潁川太守徴還勲强直不屈内厭於董卓不得意强疽發背卒遺令勿受卓賻贈趙岐初名嘉京兆長陵人年三十餘有重疾臥蓐七年自慮奄忽乃為遺令勑兄子曰大丈夫生世遯無箕山之操仕無伊呂之勲天不我與復何言哉可立一員石於吾墓前刻之曰漢有逸人姓趙名嘉有志無時命也奈何其後疾瘳位至太常卒先自為壽藏勑其子曰我死之日墓中聚沙為床布簟白衣散髪其上覆以單被即日便下下訖便掩任末蜀郡繁人為郡功曹辭以病免後奔師䘮於道物故臨命勑兄子造曰必致我尸於師門使死而有知魂靈不慙如其無知得土而已造從之孔僖為臨晉令卒官遺令即葬二子長彦季彦並十餘嵗蒲坂令許君然勸令反魯對曰今載柩而歸則違父令舍墓而去心所不忍遂留華隂梁鴻字伯鸞至呉依大家臯伯通疾且困告主人曰昔延陵季子葬子於嬴博之間不歸鄉里愼勿令我子持䘮歸去及卒伯通等為求葬地於呉要離冡傍咸曰要離烈士而伯鸞清高可令相近葬畢妻子歸扶風魏賈逵文帝時為豫州刺史建武將軍與曹休等伐呉㑹病篤令左右曰受國厚恩恨不斬孫權以下見先帝䘮事一不得有所修作呉呂蒙以定荆州功拜南郡太守封孱陵侯封爵未下疾卒蒙未死時所得金寶諸賜盡付府藏勑主者命絶之日皆上還中山王衮以明帝青龍二年疾困勑令官屬曰吾寡德黍寵大命將盡吾既好儉而聖朝著終誥之制為天下法吾氣絶之日自殯及葬務奉詔書昔衛大夫蘧瑗葬濮陽吾望其墓嘗想其遺風願託賢靈以弊髪齒營吾兆域必往從之禮男子不卒婦人之手亟以時成東堂堂成名之曰遂志之堂輿疾往居之又令世子曰汝㓜小未聞義方早為人君但知樂不知苦必將以驕奢為失也接大臣務以禮雖非大臣老者猶宜答拜事兄以敬恤弟以慈兄弟有不良之行當造膝諫之諫之不從流涕喻之喻之不改乃白其母若猶不改當以奏聞并辭國土與其守寵罹禍不若貧賤全身也此亦謂大罪惡耳其㣲過細故當掩覆之嗟爾小子愼修乃身奉聖朝以忠貞事太妃以孝敬閨闈之内奉令於太妃閫閾之外受教於沛王無怠乃心以慰予靈田豫齊王時為大中大夫食卿祿病亡戒其妻子曰葬我必於西門豹邉妻子難之言西門豹古之神人那可葬於其邉乎豫言豹所履行與我敵等爾使死而有靈必與我善妻子從之晉杜預為司𨽻校尉加位特進卒先為遺令曰古不合葬明終始之理同於無有也中古聖人改而合之蓋以别合無在更緣生示教也自此以來大人君子或全或否未能知生安能知死故各以己意所欲也吾往為臺郎嘗以公事使過宻縣之邢山山上有冡問耕父云是鄭大夫祭仲或云子産之冡也遂率從者祭而觀焉其造冡居山之頂四望周逹連山體南北之正而東北向新鄭城意不忘本也其隧道唯塞後而空其前不塡之示藏無珍寶不取于重深也其山多美石而不用必集洧水自然之石以為冡藏貴不勞工巧而此石不入世用也君子尚其有情小人無利可動歴千載無毁儉之致也吾去春入朝因郭氏䘮亡緣陪陵舊義自表營雒陽城東首陽之南為將來兆域而所得地中有小山上無舊冡其高顯雖未足比邢山然東奉一陵西瞻宮闕南觀伊雒北望夷齊曠然遠覽情之所安也故遂表樹開道為一定之制至時皆用雒水圓石開隧道南向儀制取法於鄭大夫欲以儉自完爾棺器小歛之事皆當稱此子孫一以遵之羊祐為征南大將軍南城侯及卒遺令不得以南城侯入柩從弟琇等述祐素志求葬於先人墓次武帝不許賜去城十里外近陵葬地一頃謚曰成祜䘮既引帝於大司馬門南臨送祜甥齊王攸表祜妻不以侯歛之意帝乃詔曰祜固讓歴年志不可奪身沒讓存遺操益厲此夷叔所以稱賢季子所以全節也今聽復本封以彰高美南齊豫章王嶷臨終召子子亷子恪曰人生在世本非常也吾年已老前路幾何居今之地亦非心期所不貪聚自㓜所懷正以汝兄弟累多損吾暮志爾吾無後當共相勉厲篤睦為先才有優劣位有通塞運有富貧此自然理無足以相凌侮若天道有知汝等各修立灼然之分無失也勤學守基業治閨庭尚閑素如此足無憂患聖主儲皇及諸親賢亦當不以吾沒易情也三日施靈帷香火盤水干飯酒脯㯽榔而已朔望菜食一盤加以甘果此外悉省葬後除靈可施吾常所乘轝扇繖朔望時節席地香火盤水酒脯干飯㯽榔便足雖才愧古人意懷粗亦有在不以遺財為累主衣所餘小弟未婚諸妹未嫁凡應此用本自茫然當稱力及時率有為辦事事甚多不復甲乙棺器及墓中勿用餘物為後患也朝服之外唯下鐵鐶刀一口作塜勿令深一一依格莫過度也後堂樓可安佛供養外國二僧餘皆如舊與汝遊戲後堂船乘吾所乘牛馬送二宮及司徒服餙衣裘悉為功德子亷等號泣奉行張岱為南兖州刺史未拜卒岱初作遺命分張家財封置箱中家業張减隨復改易如此十數年張東呉郡人輔國將軍冲之父也東初卒遺命祭我必以鄉土所産無用牲物冲兼青冀二州刺史事在鎭四時還呉國中取果菜流涕薦焉蕭景先武帝時為征虜將軍假節司州諸軍事至鎭遇疾遺言曰比愍疾病暴於前後自省必無起理但夙荷深恩今謬充戎寄暗弱每事不稱上慙慈㫖便長違聖世悲哽不知所言可為作啟事上謝至尊粗申愚心毅雖成長素闕訓範貞等㓜稚未有所識方以仰累聖明非殘息所能陳謝自丁荼毒以來妓已多分張所餘醜猥數人皆不似事可以明月佛女桂枝佛兒玉女美玉上臺美滿豔華奉東宮私馬有二十餘匹牛數頭可簡好者十匹二頭上臺馬五匹牛一頭奉東宮大司馬司徒各奉二匹驃騎鎮軍各奉一匹經私仗器亦悉輸臺六親多未得料理可隨宜温䘏以申素意所賜宅曠大恐非毅等所居須䘮服竟可輸還臺劉家前宅九間其貨可合率市之直若短少啟官乞足三處田勤作自足供衣食力少更隨宜買麄猥婢充使不須餘營生周施部曲還都理應分張其久舊勞勤者應料理隨宜啟聞乞恩毅貞皆其子名孔融為司徒左長史病卒遺令建白旐無旐不設祭令人捉麈尾登屋復魂曰吾生平所善自當凌雲一笑三千買棺無製新衣左手執孝經右手執小品法華妾二人䘮事畢各遣還家曰吾以生平之風調何至使婦人行哭失聲不須暫停閨閣江斆武帝時為侍中遺令不受䘏贈詔贈錢三萬布百疋子蒨啟遵斆令讓不受詔曰斆貽厥之訓送終以儉立言歸善益有嘉傷可從所請梁陶宏景居茅山自號華陽隱居武帝大同三年卒遺令既沒不須沐浴不須施牀止兩重席於地用所着舊衣上加生祴裙及臂衣靺冠巾法服左肘籙鈴右肘藥佩符絡左腋下繞腰穿環結於前釵符於髻上通以大袈裟覆衾蒙手足明器有車馬道人道士並在門中道人左道士右百日内夜常燃燈旦常香火弟子遵而行之詔贈太中大夫謚曰貞白先生袁昂為侍中左光祿大夫司空大同六年薨臨終遺疏不受贈謚勑諸子不得言上行狀及立誌銘凡有所須悉皆停著復曰吾釋褐從仕不期富貴但官序不失等倫衣食粗知榮辱以此闔棺無慙鄉里往忝呉興屬在昏明之際既闇於前覺無識於聖朝不知天命甘貽顯戮幸遇殊恩遂得全門户自念罪私門階榮望絶保存性命以為幸甚不謂叨竊寵靈一至於此常欲竭誠酬報申吾乃心所以朝廷每興師北伐吾輙啟求行誓之丹欵實非矯言既庸懦無施皆不蒙許雖欲罄命其議莫從今日瞑目畢志泉壤若魂而有知方期結草聖朝遵古知吾名品或有違遠之恩雖是經國常典在吾無應致此脱有贈官愼勿祗奉諸子累表陳奏詔不許册謚曰穆正公陳袁泌為宣帝司徒左長史臨終戒其子曼華曰吾於朝廷素無功績瞑目之後歛手足旋葬無得輙受贈謚其子遵泌遺意表請之朝廷不許贈金紫光祿大夫姚察入隋至煬帝時為太子舍人終于東都遺命曰比吾在梁世當時年四十就鍾山明慶寺尚禪師受菩薩戒自爾深悟苦空頗知回向矣當得留連山寺一去忘歸及仕梁代諸名流遂許與聲價兼時主恩遇宦途遂至通顯自入朝來又蒙恩渥既牽纒人世素念弗從且吾習蔬菲五十餘年既歴嵗時循守不失瞑目之後不須立靈置一小床每日設清水六齋食果菜任家裏有無不須别經營也後魏崔光孝明帝時為車騎大將軍儀同三司疾甚勑子姪等曰諦聽吾言聞曽子有云人之將死其言也善啟予足啟予手而今而後吾知免夫吾荷先帝厚恩位至於此大功不成没有遺恨汝等以吾之故並得名位勉之以死報國修短命也夫復何言速可送我還宅氣力雖微神明不亂至第而薨李䕶為齊州刺史將亡謂左右曰吾嘗為方伯蒞青州彼中士女屬目若䘮過東陽不可不好設儀衛哭泣盡哀令觀者改容也家人遵其誡陽固為前軍將軍著終制一篇務從儉約臨終又勑諸子一遵先制張烈累徴不赴臨終勑子姪不聽求贈但勒家誡立碣而已其子質奉行焉裴佗為荆州刺史卒遺令不聽請謚不受贈禭諸子皆遵行之崔孝直為直閣將軍去職歸鄉里卒顧命諸子曰吾才疎效薄於國無功若朝廷復加贈謚宜循吾意不得祗受若致干求則非吾子又云孝直顧命諸子歛以時服祭勿殺生其子皆遵行之宋隱被徴不就臨終謂其子姪等曰茍能入順父兄出悌鄉黨仕郡幸而至功曹吏以忠清奉之則足矣不勞遠詣臺閣恐汝不能富貴而徒延門户之累爾若忘吾言是為欺死父也使死鬼而有知吾不歸食矣姚僧坦為太醫下大夫卒遺戒衣衾入棺朝服勿歛靈上唯置香奩每日設清水而已隋李穆為太師以老致政開皇六年薨于第遺令曰吾荷國恩年宦已極啟足歸全無所復恨竟不得陪玉鑾於岱宗預金泥於梁甫脊脊光景其在斯乎唐傳奕為太史令年八十五卒臨終誡其子曰老莊𤣥一之篇周孔六經之説是為名教汝宜習之妖胡亂華舉時皆惑唯獨竊欲衆不我從悲夫汝等勿學也李勣為司空遇疾謂弟弼曰我似得小差可置酒申宴樂於是堂上奏女妓簷下列子孫宴將罷謂弼曰我自量必死欲共汝一别爾恐汝悲泣誑言似差可未須啼泣聽我約束我見房𤣥齡杜如晦辛苦作得門户亦望埀裕後昆並遭癡兒破家蕩盡我有如許㹠犬將以付汝汝可防察有操行不倫交㳺非類急撾殺後奏知嫗嫗已下有兒而願往自養者聽之餘並放出事畢即移入我堂撫䘏小弱違我言者同於戮屍此後畧不復言弼等並遵行遺令郝處俊則天時為太子少保卒其子秘書郎北叟上表辭所贈賜及葬送之事上不許侍中裴炎曰處俊臨亡臣往見之囑臣曰生既無益明時死後何宜煩費瞑目之後儻有恩賜物及歸鄉逓送營造並不欲勞官司供給帝深嘉歎之從其遺意唯給加賜物而已姚元崇𤣥宗時為司空遺令誡子孫其畧曰古人云富貴者人之怨也貴則神忌其滿人惡其上富則鬼瞰其室虜利其財自開闢已來書籍所載德薄任重而能壽考無咎者未之有也故范蠡疎廣之軰知止足之分前史多之况吾才不逮若人而久竊榮寵位逾高而益懼恩彌厚而増憂往在中書遘疾虚憊雖終匪懈而諸務多闕薦賢自代屢有誠祈人欲天從竟蒙哀允優游園沼放浪形骸人生一代期亦足矣田巴云百年之期未有能至王逸少云俛仰之間已為陳迹誠哉此言比見諸逹官身亡以後子孫既失覆䕃多至貧寒斗尺之間參商是競豈唯自玷仍更辱先無論曲直俱受嗤毁莊田水碾既衆有之逓相推倚或致荒廢陸賈石苞皆古之賢逹也所以預為定分將以絶其後爭吾每静思深所歎服昔孔子亞聖母墓毁而不修梁鴻至賢父亡席卷而葬昔楊震趙咨盧植張奐皆當代英逹通識今古咸有遺言屬以薄葬或濯衣時服或單帛幅巾知其魄去身貴於速朽子孫皆遵成命迄今以為美譚凡厚葬之家例非明哲或溺於流俗不察幽明咸以奢厚為忠孝以儉薄為恡惜至今亡者致戮尸暴骸之酷存者䧟不忠不孝之誚可為痛哉可為痛哉死者無知自同糞土何煩厚葬使傷素業若也有知神不在柩復何用違君父之令破衣食之資吾身亡後可殮以常服四時衣服各一副而已吾性甚不愛冠衣必不得將入棺墓紫衣玉帶足便於身念爾等勿復違之且神道惡奢㝠塗尚質若違吾處分使吾受戮於地下於汝心安乎念而思之今之佛經羅什所譯姚興執本與什對翻姚興造浮圖於永貴里傾竭府庫廣事莊嚴而與命不得延國亦隨滅又齊跨山東周據關右周則多除佛法而修繕兵威齊則廣置僧徒而依慿佛力及至交戰齊氏滅亡國既不存寺復何有修福之報何其蔑如梁武帝以萬乘為奴胡太后以六宮入道豈特身戮名辱皆以亡國破家近日孝和皇帝發使贖生傾國造寺太平公主武三思悖逆庻人張夫人等皆度人造寺竟術彌街咸不免受戮破家為天下所笑經云求長命得長命求富貴得富貴刀尋叚叚壊火坑變成池比來緣精進得富貴長命者為誰生前易知尚覺無應身後難䆒誰見有徴且五帝之時父不葬子兄不哭弟言其致仁壽無夭横也三王之代國祚延長人用休息其人臣則彭祖老𣆀之類皆享遐齡當此之時未有佛教豈抄經鑄像之力設齋施佛之功耶宋書西域傳有名僧為白黒論理證明白足解沈凝宜觀而行之且佛者覺也在乎方寸假有萬像之廣不出五藴之中但平等慈悲行善不行惡則佛道備矣何必溺於小説惑於凢僧仍將喻品用為實錄抄經寫像破業傾家乃至施身亦無所恡可謂大惑也亦有緣亡人造像名為追福方便之教雖則多揣功徳須自發心旁助寧應獲報逓相欺誑浸成風俗損耗生人無益亡者假有通才逹識亦為時俗所拘如來普慈意存利物損衆生之不足厚豪僧之有餘必不然矣且死者是常古來不免所造經像何所施為夫釋迦之本法為蒼生之大弊汝等各宜警䇿正法在心勿效兒女子曹終身不悟也吾亡後必不得為此弊法若未能全依正道須順俗情從初七至終七任設七僧齋若隨齋須布施宜以吾縁身衣物充不得輕用餘財為無益之枉事亦不得妄出私物狥追福之虚談道士者本以𤣥牝為宗初無趨競之教而無識者慕僧家之有利約佛教而為業敬尋老君之説亦無過齋之文抑同僧例失之彌遠汝等勿拘鄙俗輙屈於家汝等身沒之後亦教子孫依吾此法王維為尚書左丞臨終之際弟縉在鳳翔忽索筆作别縉書又與平生親故作别書三數紙多敦勸朋友修習之意舍筆而絶令狐彰為義成軍節度使臨終手疏辭表誡子以忠孝守節辛祕為昭義軍節度使及歸道病先自誌其墓將殁又為書一通命緘致几上其家發之皆送終遵儉之㫖王紹懿鎭州王景崇季父也紹懿疾篤召景崇謂之曰亡兄以軍政託予比俟汝成立今危惙如此殆將不救汝雖少年勉自負荷下禮藩鄰上奉朝㫖俾吾兄家業不墜唯汝之才也言已而卒時監軍在席且奏其治命宣宗嘉之晉陸思鐸典陳郡甚有惠政誡諸子曰我死則藏骨於宛邱使我棲魂於所理之地及卒乃葬於陳從其志也周翟光鄴權知京兆尹疾甚召判官張粲及廵簡使臣以軍府事囑付之又召親隨於卧内誡之曰氣絶之後以屍歸雒不得於此停留慮煩軍府言訖而終趙温珪判司天監延乂之父也温珪臨終謂延乂曰技術雖是世業吾仕蜀已來幾由技術而死爾軰能以佗途致身良圖也册府元龜卷八百九十八
