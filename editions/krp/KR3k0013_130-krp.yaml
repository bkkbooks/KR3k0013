body:
  text: 冊府元龜卷一百三十宋王欽若等撰帝王部延賞虞書曰賞延於世春秋傳曰善善及子孫斯道徳之政也三代而上靡得以記漢氏之後乃或錄元功之胄褒宗臣之裔賔禮賢者奬勸能吏旌揚忠烈甄叙舊故賞勤職之効采死政之孤繇是加其爵秩申之錫予俾奉其嗣世而髙其門閥使簪纓之不墜宗奠之有寄焉其或因旅愷之慶乗肆𤯝之澤大叙前世之勲籍並分三公之封邑乃至漏澤流根上延於祖考脂田析壤俯逹於閨闈渥惠所覃息系咸及斯固霈恩紀於臣下集光寵於私門所以勸有位之盡心著為邦之令典者也漢髙祖八年九月封紀成子通為襄平侯初成以將軍從擊破秦入漢定三秦戰好畤死事子侯十年九月封周苛子成為髙景侯初苛以内史從擊破秦為御史大夫入漢圍取諸侯守滎陽功比辟陽侯罵項籍死事子侯十二年二月髙梁侯酈疥父食其以客從破秦還定諸侯常使使約和諸侯説齊王死事子侯孝景中元年四月封故御史大夫周苛周昌孫子為列侯二年九月封故楚趙傅相内史前死事者四人子皆為列侯初趙王遂與吳楚合謀起兵其相建徳史失其姓内史王悍諫不聴遂燒殺之遂自殺帝憐趙相内史守正死封建徳子横遂侯悍子棄之新市侯又楚相張尚太傅趙夷吾諫其王戊勿反不聴皆殺之故封夷吾子固為髙陵侯尚之子當居為山陽侯武帝即位求賢良舉馮唐唐時年九十餘不能為官廼以子遂為郎元朔五年拜衛青為大將軍帝曰青躬率戎士師大㨗獲匈奴王其封青子伉為宜春侯不疑為隂安侯子登為隂發侯元狩中復詔御史以酇二千四百戸封蕭何曾孫慶為酇侯布告天下令明知朕報蕭相國徳厚也元鼎五年三月封故校尉韓千秋摎樂子二人為列侯初南粤王興與毋摎太后欲内屬相吕嘉有畔心漢遣千秋與樂將二千人往嘉擊滅之於是天子曰韓千秋雖無成功亦軍鋒之冠封其子延年為成安侯摎樂其姊為王太后首領願屬漢封其子廣徳為龒龒古襲字侯汲黯為淮陽守卒後武帝以黯故官其弟仁至九卿子偃至諸侯相宣帝本始元年正月詔曰故丞相安平侯敞等居位守職與大將軍光車騎將軍安世建議定䇿以安宗廟功賞未加而薨其益封敞嗣子忠敞楊敞也是年復下詔曰宣成侯光霍光宿衛忠正勤勞國家善善及後世善善者謂褒寵善人也其封光兄弟中郎將雲為冠陽侯又以車騎將軍光禄勲張安世子千秋延夀彭祖皆中郎將侍中地節二年大將軍大司馬霍光病篤帝自臨問即日拜光子禹為右將軍四年二月封故酇侯蕭何曾孫建世為侯蘇武為右曹典屬國以其前發匈奴時胡婦産一子通國為郎又以武弟子為右曹元康三年三月詔曰朕㣲𦕈時故掖庭令張賀輔導朕躬修文學經術恩惠卓異厥功茂焉詩不云乎無徳不報封賀所子弟子侍中中郎將彭祖為陽都侯所子者言養弟子以為子平帝元始二年詔曰漢興以来股肱在位身行儉約輕財重義未有若公孫𢎞者也其賜𢎞後子孫之次見為適者爵闗内侯食邑三百戸四年詔書追錄忠臣封王嘉子崇為新甫侯後漢光武以鄧禹功髙封弟寛為明親侯李通南陽宛城人也自光武起兵以士君子之學且言讖文事及光武即位有司奏請封諸皇子帝感通首創大謀即日封通少子雄為召陵侯卓茂初為宻令及更始政亂以年老乞骸骨歸光武即位下詔曰前宻令卓茂束身自修執節淳固誠能為人所不能為以茂長子戎為大中大夫次子崇為中郎給事黄門王閎王莽時為牧守莽敗乃去官光武下詔曰武王克殷表商容之閭閎修善謹勑兵起吏民獨不爭其頭首今以閎子補吏至墨綬建武中錄舊徳臣以孫寶孫伉為諸長伉音抗諸琅琊之縣也宣秉為大司徒司直所得禄俸輒以収養親族其孤弱者分與田地自無擔石之儲齊人名小嬰為擔今江淮人謂一石為擔卒於官帝愍惜之除子彪為郎來歙為中郎將討公孫述為刺客所殺帝賜䇿書曰中郎將來歙攻戰連年平定羗隴憂國忘家忠孝彰著遭命遇害嗚呼哀哉子褒嗣帝嘉歙忠節復封歙弟田為宜西侯杜林為大司空薨光武親自臨喪既𦵏除子喬為郎詔曰公侯子孫必復其始賢者之後宜宰城邑以喬為丹水長馮異與諸將攻落門未拔落門聚石在冀縣病發薨于軍諡曰節侯長子彰嗣明年帝思異功復封彰弟沂為祈鄉侯建武十三年更封彰東緡侯食三縣吳漢兄尉為將軍從征戰死封尉子彤為安陽侯帝以漢功大復封弟翕褒親侯吳氏侯者凡五國岑彭征蜀為刺客所殺子遵嗣帝思彭功封遵弟淮為榖陽侯郭涼既平盧芳帝擢涼為中郎宿衛左右明帝以鄧禹先帝元功拜為太傅居嵗餘寢疾帝數自臨問以子男二人為郎及薨帝分禹封為三國長子震為髙宻侯襲為昌安侯珍為夷安侯趙孝為衛尉弟禮為御史中丞帝嘉其兄弟篤行後卒孝無子拜禮兩子為郎司空袁隗薨子屯嗣帝追思隗忠擢屯為步兵校尉徙封西陽侯宋均為河内太守政化大行以疾上書乞免詔除子條為太子舍人章帝即位追賜朱勃子榖二千斛東觀記曰帝下詔曰告平陵令丞縣人故雲陽令朱勃建武中以伏波將軍爵土不傳伏闕陳狀不顧罪戾懐旌善之志有烈士之風詩云無言不讎無徳不報其以縣見穀二千斛賜勃子若孫勿令逺詣闕謝趙憙為太傅錄尚書事帝擢諸子為郎吏者七人長子代給事黄門憙自明帝時内典宿衛外幹宰職正身立朝未嘗懈惰傅育為武威太守䕶羗校尉擊叛羗戰死帝下詔追褒美之封其子毅為明進侯七百戸和帝時魯恭為光禄勲選舉清平京師貴戚莫能撓其正後代吕葢為司徒及從巡狩南陽除子撫為中郎賜駙馬從駕駙副也非正所乗皆為副説文曰駙馬副馬也安帝元初中鮮卑寇漁陽太守張顯率兵馬掾嚴授主簿衛福功曹徐咸赴之授福等並為虜所殺詔書褒歎各除子一人為郎中鄧𢎞元初二年卒詔大鴻臚持節即𢎞殯封子廣徳為西平侯後以帝師之重𢎞少治歐陽尚書授帝禁中分西平之都鄉封廣徳弟甫徳為都鄉侯又封𢎞兄黄門侍郎京子珍為陽安侯邑三千五百戸建光元年二月大赦天下以公卿校尉尚書子弟一人為郎舍人順帝即位以鄭安世子亮為郎初安帝廢太子為濟陰王安世與太常桓焉大僕來歴等共正議諫爭及帝立安世已卒追賜錢帛除亮為郎張綱漢安中為廣陵守卒詔曰綱大臣之苗剖符統務正身道下班宣徳信降集劇賊張嬰等萬人息干戈之役濟蒸庶之困未升顯爵不幸且卒嬰等縗杖若喪考妣朕甚愍焉拜綱子續為郎中賜錢百萬冲帝永嘉元年封武威太守趙冲子愷義陽亭侯冲順帝時追叛羗戰殁至是故侯桓帝時羊續父儒為太常續以忠臣子孫拜郎中叚熲為中郎將擊琅琊賊東郭竇公孫舉等大破斬之獲首萬餘級除一子為郎中後以討先零東羗功詔以家一人為郎中胡爽為南郡太守李肅主簿時武陵蠻寇江陵肅奔走爽諫止肅肅遂殺爽而走帝聞之徴肅棄市拜爽家一人為郎靈帝時陸康為議郎會廬江賊黄穰等與江夏蠻連結十餘萬人攻没四縣拜康廬江太守康申明賞罰擊破穰等餘黨悉降帝嘉其功拜康孫尚為郎中張酺曾孫濟好儒學初揚賜薦濟明習典訓為侍講至司空病罷及卒帝以舊恩贈車騎將軍闗内侯印綬追濟侍講有勞封子根為蔡陽鄉侯臧洪父旻為揚州刺史擊破妖賊許昭遷為使匈奴中郎將洪年十五以父功拜童子郎獻帝初袁術屯兵夀春遣其將孫䇿攻廬江太守陸康圍城數重受敵二年城陷月餘發病卒年七十宗族百餘遭離饑戹死者將半朝廷愍其守節拜子為郎中桓典為羽林郎獻帝即位三公奏典前與大將軍何進謀誅閹官功雖不遂忠義炳著詔拜家一人為郎元尚為兖州刺史袁術將僭號欲以尚為太尉尚拒之為術所害帝嘉尚忠烈拜其子瑋為郎中孫瑞為大司農為三老後為亂兵所害獻帝都許追論瑞功封子明澹津侯魏文帝踐阼以程昱復為衛尉昱自太祖建國為衛尉與中尉邢貞爭威儀免進封安鄉侯增邑三百戸并前八百戸分封少子延及孫曉列侯董昭自太祖受魏公魏王之號皆昭所創及文帝踐阼拜大鴻臚進封右鄉侯二年分邑百戸賜昭弟訪爵闗内侯又分邑百戸賜一子爵闗内侯黄初二年分三公戸邑封弟子各一人為列侯賈詡自文帝為五官將勸帝朝夕孜孜不違子道帝深自砥礪及即位以詡為太尉進爵夀鄉侯增邑三百并前八百戸又分邑二百戸封少子訪為列侯以長子穆為駙馬都尉荀攸長子緝有攸風早没次子適嗣無子絶黄初中紹封攸孫彪為陵樹亭侯邑三百戸後轉封丘陽亭侯正始中追諡攸曰敬侯黄初四年涼州刺史張既薨詔曰昔荀桓子立􅈴翟土晉侯賞以千室之邑馮異輸力漢朝光武封其二子故涼州刺史張既能容民畜衆使羣羗歸土可謂國之良臣不幸薨隕朕甚愍之其賜少子翁歸爵闗内侯華歆薨子表嗣初文帝分歆户邑封歆弟緝列侯鍾繇薨子毓嗣初文帝分毓户邑封繇弟演及子邵孫豫列侯文聘自太祖時為江夏太守使典北兵及帝踐阼以禦賊有功遷後將軍封新野侯分聘戸邑封聘子岱為列侯又賜聘從子厚爵闗内侯張遼與李典嘗破孫權後遼薨子虎嗣帝追念遼典在合肥之功詔曰合肥之役遼典以步卒八百破賊十萬自古用兵未之有也使賊至今奪氣可謂國之爪牙矣其分遼典邑各百戸賜一子爵闗内侯虎為偏將軍明帝青龍四年司空陳羣薨諡曰靖侯子泰嗣帝追思羣功徳分羣戸邑封一子列侯張郃薨子雄嗣郃前後征伐有功帝分郃戸封郃四子列侯賜少子爵闗内侯齊王即位孫資劉訪掌機宻帝以訪資决定大謀增邑三百訪升前千二百資千戸封愛子一人亭侯次子騎都尉餘子皆郎中王昶嘉平中為征南大將軍時文欽母丘儉作亂引兵拒儉欽有功封二子亭侯闗内侯髙貴鄉公甘露二年八月詔曰昔燕刺王謀反韓誼等諫而死漢朝顯登其子諸葛誕創造凶亂主簿宣隆部曲督秦絜秉節守義臨事固爭為誕所殺所謂無比干之親而受其戮者其以隆絜子為騎都尉加以賜贈光示逺近以殊忠義三年大將軍錄尚書事司馬昭奏錄先世名臣元功大勲之子孫隨才叙用陳泰前後以功增邑二千六百戸賜子弟一人亭侯二人闗内侯陳留王即位封征南將軍督荆州諸軍事王基子二人亭侯闗内侯咸熙二年二月庚戌以虎賁張修昔扵成都馳馬三詣營言鍾會反逆以至没身賜修弟倚爵闗内侯晉杜預為征南大將軍既平吳振旅凱入以功封子耽為亭侯千戸索綝為衛將軍領太尉時劉曜侵逼王城以綝為都督征南大將軍持節討之破曜呼日逐王呼延莫以功賜子弟二人鄉亭侯明帝征王敦以諸葛忮為侍中加奉車都尉討王含有功進封建安伯以先爵賜次子讜為闗内侯穆帝升平中改封大都督臨賀郡公桓温為南郡公降臨賀為縣公以封其次子濟毛穆之為桓温參軍從温平蜀以功賜次子都鄉侯哀帝興寧中冠軍長史沈勁守洛陽為慕容恪攻陷神氣自若遂遇害朝廷聞而嘉之贈東陽太守子赤黔為大長秋後魏明帝以許謙自太祖時有功其子洛陽從征慕容寶為冠軍司馬後為祁令帝追錄謙功以洛陽為鴈門太守太武以宿石父沓千自明元時從討蠕蠕戰殁悼惜之詔求沓千子時石年甫十一引見以㓜聴歸年十三襲爵為中散谷渾為儀曹尚書在官亷直為太武所器重詔以渾子孫十五已上悉補中書學生屈拔垣之孫道賜之子拔少好隂陽學太武追思其父祖年十四以為南部大夫文成初以李靈學優選授經及踐阼為洛州刺史卒子恢以師傅之子拜員外散騎常侍安西將軍長安鎮副將進爵為侯鉅鹿公源賀長子延性謹厚好學以功臣子拜侍御中散賜爵武城子西治都將陸俟為外都大官帝踐阼以子麗有䇿立之勲拜俟征西大將軍進爵東平王孝文太和十四年尚書李冲奏劉昞河右碩儒今子孫沉屈未有錄聞賢者子孫宜蒙顯異於是除其一子為郢州雲陽令陸叡簡王麗之子為北部尚書太和十六年隆五等之爵以麗勲著前朝封叡鉅鹿郡開國公食邑三百戸宣武以張彛先朝勲舊不幸疹廢特除其子始均長兼左民郎中髙顯族道悦之長子也道悦孝文時為太子詢中庶子詢以道悦數規諫殺之宣武追錄忠槩拜顯族給事中源懐為車騎大將軍隴西王賀之子景明二年上表曰昔世祖昇遐南安在位出拜東廟為賊臣宗愛所弑時髙宗避難龍潛苑中宗愛異圗神位未定臣亡父先臣賀與長孫渴侯陸麗等奉迎髙宗纂承寶命麗以扶負聖躬親所見識蒙授撫軍大將軍司徒公平原王興安二年追論定䇿之􅈴進先臣爵西平王皇興季年顯祖將傳大位先臣時都督諸將屯扵武川被徵詣京特見顧問先臣固執不可顯祖久乃許之遂命先臣持節授皇帝璽綬於髙祖至太和十六年麗息叡狀私書稱其亡父與先臣授立髙宗朝廷録封叡鉅鹿郡開國公臣時丁艱草土不容及例至二十年除臣雍州刺史臨發奉辭面奏先帝申先臣舊勲時蒙敕㫖但赴所臨尋當别判至二十一年車駕幸雍臣復陳聞時蒙敕㫖征還當授自宫車晏駕遂爾不申竊惟先臣逺則援立髙宗寶厯不墜近則陳力髙祖神器有歸如斯之勲超世之事麗以父功而獲山河之賞臣有家勲不霑茅社之錫得否相懸請垂裁處詔曰宿老元丕云如所訴訪之史官頗亦言此可依比授馮翊開國公邑百戸孝明正光中髙諒為驍騎將軍徐州行䑓屬元法僧反叛逼諒同之諒不許為法僧所害朝廷痛惜之下詔曰諒臨危授命誠節可重復贈使持節平北將軍幽州刺史贈帛二百疋優一子出身諡曰忠侯明亮為陽平汲郡二太守有惠政孝昌二年詔追前功重贈平東將軍濟州刺史拜其子逸逺奉朝請崔光為車騎大將軍儀同三司領著作光年耆老雖疾病稍增而強不已嘗在著作疾篤不歸孝明親臨省疾詔斷賔客中使相望為止聲樂罷諸逰眺拜長子勵為齊州刺史孝莊以原文宗學涉機警少有名譽永安中以父功賜爵臨穎縣伯羊敦字元禮太山平陽人梁州刺史禮弟子也性尚閒素學涉書史以父靈引死王事除給事中楊偘為北中郎將以河橋之功除其長子師為秘書郎前廢帝以符寶郎王神貴子彦鴻為奉朝請房景先為太學愽士作五經疑問百餘篇神貴答之名為辨疑奏上之帝親自執卷與神貴往復嘉其用心特除彦鴻為奉朝請帶方侯羅伊利卒子何奴亦忠實寡言有志度以勲臣之子除侍御中散襲爵爾朱文殊榮之子也帝以榮有破葛賊之勲進文殊爵為王增邑千戸超授散騎常侍撫軍將軍西魏文帝以于義太師謹之子少矜嚴有操尚篤志好學以父功賜爵平昌縣伯賀若誼字道機父統為右衛將軍誼性剛果有幹略以功臣子賜爵容城縣男恭帝元年以車騎大將軍劉雄從于謹平江陵進驃騎大將軍開府儀同三司賜奴婢一百口别封一子汧源縣伯又以從平并州拜上大將軍進爵趙郡公邑二千戸舊封回授一子後周尉遲運少强濟志在立功魏大統十六年以父􅈴封安喜縣侯豆盧勣聰悟有器局少授業國子學畧涉文藝文帝以勣勲臣子封義安縣侯李穆為都督河橋之戰太祖馬中流矢墜穆以馬授文帝遂得俱免擢授武衛將軍賜穆子惇安樂郡公姊一人為郡君自餘姊妹並為縣君兄弟子姪及緦麻以上親并舅氏皆霑厚賜其見褒崇如此尉遲端兄運為驃騎大將軍從楊志攻齊之并州以功别封端保城縣侯邑一千戸閔帝時獨孤信進位柱國大將軍錄前後功増封聴迴授諸子於是第二子善封魏寧縣公第三子穆必安縣侯第四子藏義寧縣侯邑各一千戸第五子順武城縣伯第六子陁建忠伯邑各五百戸明帝武成初驃騎大將軍髙琳從賀蘭祥征吐谷渾以􅈴别封一子許昌縣公邑一千戸宇文盛為驃騎大將軍從賀蘭祥平洮陽共和二城封一子甘棠縣公武帝保定三年二月詔魏大統九年以前都督以上身亡而子孫未齒叙者節級授官建徳六年伐齊平鄴詔曰自晉州大陳至於平鄴身殞戰傷者其子即授父本官韋孝寛為徐州總管詔以平淮南之功别封一子滑國公韋夀為京兆尹以父鄖國公孝寛軍功賜爵永安縣侯邑八百戸魏文思左僕射寛之子年十一拜車騎大將軍儀同三司散騎常侍尋以父功封新豐縣子邑五百戸宇文愷字安樂杞國公忻之弟也以功臣子年三嵗賜爵雙泉伯七嵗進封安平郡公邑二千戸權武襲慶之子也父為開府以力戰死武以忠臣起家拜開府襲爵齊郡公邑千二百戸隋文帝以李穆為并州總管帝以穆勞効同破鄴第一勲加三轉聴分授其二子榮才及兄賢子孝軌榮及才並儀同大將軍孝軌進開府儀同大將軍又别封子雄為宻國公邑三千戸開皇十七年詔曰周厯告終羣㓙作亂釁起藩服毒被生人朕受命上𤣥廓清區宇靈聖垂祐文武同心申明公穆鄖哀公孝寛廣平王雄蔣國公睿楚國公勣齊國公頴越國公素魯國公慶則新寧公長乂宜陽公代積趙國公羅雲隴西公詢廣業公景真昌公振沛國公譯項城公子相鉅鹿公子幹等登庸納揆之時草昩經綸之日丹誠大節心奉帝圗茂績殊功力宣王府宜𢎞其門緒與國同休其世子世孫未經州任者宜量才昇用庶享榮位世祿無窮楊素為内史令以平江南賊功拜素子𤣥奬為儀同又以討江南李稜等賊帝以素久勞於外詔令馳傳入朝加子𤣥感官為上開府後為僕射又以破突厥功進子𤣥感位為柱國𤣥縱為淮南郡公又以破逹頭可汗加子𤣥感位大將軍𤣥奬𤣥縱積善上儀同又以獻皇后山陵制度多出於素上善之别封一子義康公郡邑萬戸子子孫孫承襲不絶又以討平漢王諒功拜其子萬石民行姪𤣥挺皆儀同三司韋恊字欽人廣州總管洸之子其父在廣州有功帝令恊齎詔書勞問未至而父卒上以其父身死王事拜恊柱國趙元淑父世模初事髙寶寧後以衆歸國授上開府寓居京兆之雲陽文帝踐阼嘗典宿衛後從晉王伐陳先鋒遇賊力戰而死朝廷以其身死王事以元淑襲父本官賜物二千叚來䕶兒為上開府破髙智惠盛道延進位柱國仍留長子楷為千牛備身王猛為將經略嶺表仍討平山越馳驛奏聞文帝以其長子績為開府儀同三司猛子尋卒於廣州帝聞而痛之命其子善襲仍授普州刺史楊義臣父崇開皇初封泰興公擊突厥力戰而死贈大將軍豫州刺史以義臣襲崇官爵義臣尚㓜養於宫中年未弱冠奉詔宿衛千牛者數年賞賜甚厚煬帝大業初皇甫誕為漢王諒并州司馬諒反誕抗節而死帝封𢎞義公子無逸嗣大業令行舊爵例除以無逸誠義之後賜爵平興侯麥孟才鐵杖之子字智稜果烈有父風帝以孟才節將子恩賜殊厚拜虎賁郎馮慈明為尚書兵曹郎時李宻逼東都慈明抗節為其所害梁通郡守楊江上狀帝歎息之贈銀青光禄大夫拜其二子惇怦俱為尚書承務郎唐髙祖武徳二年四月伊州總管張善相為王世充兵所攻陷賊執善相送於世充善相辭色不撓世充怒令斬之善相罵世充極口而死髙祖聞而歎曰吾負善相善相不負吾也封其子為襄城郡公張孝珉為驃騎將軍經略王世充為賊所殺髙祖聞而傷之拜其弟度脱為大將軍封郡公賜帛二百疋高蒲政為朔州總管右虞候杜士逺所殺髙祖以其子𤣥積為上柱國榮國公食邑三千戸張長遜為五原太守會處羅可汗解兵去髙祖大悦封其父暉為遂安郡公太宗貞觀五年九月癸亥詔曰惟王建國厚禮被於元勲惟帝念功茂賞隆於延世是以親賢作屏著在周經支庶畢侯義存漢典開府儀同三司齊國公無忌尚書左僕射邢國公𤣥齡故尚書右僕射蔡國公如晦靈州都督吳國公尉遲敬徳左光祿大夫吏部尚書許國公髙士亷兵部尚書潞國公侯君集右衛大將軍郢國公宇文士及左武衛大將軍翼國公秦叔寶瀘州都督宿國公程知節等或宇量凝深地兼賢戚或風鑒𢎞逺功參帳幕或志懐強正便繁左右幹略宏舉契濶戎旃或委質藩朝陳力王室誠著出納節表屯夷經文緯武忠勤懇至固已契叶風雲寄深舟楫雖褒賢之道已紀於旂常而推恩之令未洽扵胄緒宜賜寵章式遵故實無忌𤣥齡如晦敬徳各封一子郡公士亷君集士及叔寶知節各封一子縣公俾夫拜前拜後比蹤曩烈如帶如礪垂裕後昆屈突通貞觀中為洛州都督卒太宗幸洛陽宫思通忠節拜其少子詮果毅都尉宇文士及貞觀中檢校涼州都督涼土服其威惠入為衛大將軍錄其功封一子為新城縣公李勣為右武侯大將軍封其父盖為濟隂王盖固辭王爵乃封舒國公授散騎常侍陵州刺史勣貞觀中為遼東道行軍大總管攻破蓋牟遼東白崖等數城又從太宗摧殄駐蹕以功封一子為郡王王珪貞觀中為禮部尚書與諸儒正定五禮書成封一子為縣男叚志𤣥為鎮軍大將軍寢疾太宗親自臨視顧謂曰當與卿子五品志𤣥頓首固請迴授母弟志感太宗遂授志感左衛郎將髙宗永徽三年五月詔隋儀同三司豆盧毓御史中丞㳺楚客齊侍中崔季舒給事黄門侍郎裴澤並門標忠鯁風烈可尚其子孫等並令所司量才處分九月以周司沐大夫裴融尚書左丞封孝琰有忠節於前代制擢其子孫以旌介烈總章元年三月詔曰西漢元勲縟禮崇於末嗣東京列將茂賞覃於後昆繼絶興亡同歸一貫皇家受命蒼旻肇膺𤣥籙恢張宇宙蕩一寰區御乾立極之圗諒資天啟撥亂經邦之略實頼人謀締想初基有足言者或委質唐郊首參一旅勤著荆棘勞宣草創或䇿名代邸先騁六飛誠備艱虞志踰金石咸以攀鱗上漢捧日登山氣叶風雲情均魚水其太原元從西府舊僚今親詳覽具為等級贈司徒并州都督忠孝公士彠贈司馬淮安郡王神通贈開府儀同三司并州都督䕫國公劉𢎞基贈并州都督渝國公劉政會贈開府儀同三司并州都督莒國公唐儉贈左衛大將軍特進譙國公竇琮贈荆州都督邳國公長孫順徳贈䕶國大將軍涼州都督竇國公史大業贈幽州都督濮國公龎卿運贈左武衛大將軍潭州都督巢國公錢九隴贈華州刺史霍國公柴紹贈潭州都督羅國公張平髙贈相州刺史工部尚書河東郡公裴寂贈洪州都督樂安郡公李思行贈洪州都督廬陵郡公秦行師贈靈州都督貞定郡公許緒贈涼州都督江夏郡公李髙遷贈齊州刺史劉義節贈太尉申國公士亷贈司空蔣國公通贈太尉并州都督梁國公𤣥齡贈司空蔡國公如晦贈司徒并州都督鄂國公敬徳贈輔國公大將軍楊州都督褒國公叚志𤣥贈驃騎大將軍益州都督宿國公程知節贈徐州刺史胡國公秦叔寶贈左衛大將軍涼州都督郢國公宇文士及贈左驍騎大將軍荆州都督郯國公張公謹贈荆州都督懐寧縣公杜公綽贈荆州都督沔陽公公孫武達贈荆州都督遂安郡公李安逺贈代州都督同安郡公鄭仁泰贈荆州都督漢東郡公李孟嘗贈幽州都督厯陽縣公獨孤彦雲故始州刺史襄武郡公劉師等並立為第一等功臣其家見在朝無五品已上官者子孫及曾孫擢一人授五品官若先有四品五品官者加授子孫第一人兩階若三品已上加爵三等其第二等功臣見在朝無五品已上官者子孫及曾孫擢一人授從六品已上官若先有五品已上官加一階六品官者加兩階三品已上官者加爵一等咸亨五年劉仁軌為鷄林道大總管東伐新羅以功子姪三人並授上柱國州黨榮之號其所居為樂城鄉三柱里蘇定方前後滅三國皆一擒其主賞賜珍寶不可勝紀仍拜其子慶節為尚輦奉御及定方為左驍衛大將軍封邢國公又别封子慶節為武邑縣公中宗神龍元年贈故大理卿徐有功越州刺史授一子官二年中書令齊國公魏元忠與武三思等撰則天皇后實錄二十巻編次文集一百二十巻中宗稱善封元忠子衛王府諮議參軍昇為任城縣男是年韋安石為中書令子陟始十嵗拜温王府祭酒睿宗太極元年五月親祀北郊詔桓彦範敬暉崔𤣥暐袁恕己張柬之等其子孫並實封二百戸冊府元龜巻一百三十
