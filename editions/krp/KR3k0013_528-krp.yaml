body:
  text: 册府元龜卷五百二十八宋王欽若等撰諌諍部規諌第五晉叚灼泰始中為議郎上書陳時宜曰臣聞天時不如地利地利不如人和三里之城五里之郭環圍而攻之有不克者此天時不如地利城非不高池非不深穀非不多兵非不利委而去之此地利不如人和然古之王者三里之城五里之郭不可攻也人心不和雖金城湯池不能守也臣推此以廣其義舜彈五絃之琴詠南風之詩而天下自理由堯人可比屋而封也昔者多難姦雄屢起擾亂衆心刀鋸相乘流死之孤哀聲未絶故臣以為陛下當深思逺念杜漸防萌彈琴詠詩垂拱而已其要莫若推恩以恊和黎庶故推恩足以保四海不推恩不足以保妻子是故唐堯以親睦九族為先周文以刑于寡妻為急明王聖主莫不先親後疎自近及逺臣以為太宰司徒衞將軍三王宜留洛中鎮守其餘諸王自州征足任者年十五以上悉遣之國為選中郎傅相才兼文武以輔佐之聴于其國繕修兵馬廣布恩信必撫下如子愛國如家君臣分定百世不遷連城開地為晉魯衞所謂磐石之宗天下服其强矣雖云割地譬猶囊漏貯中亦一家之有耳若慮後世强大自可預為制度使得推恩以分子弟如此則枝分葉布稍有削小漸使轉至萬國亦後世之利非所患也昔在漢世諸呂自疑内有朱虛東牟之親外有諸侯九國之强故不敢動揺于今之宜諸侯强大是為太山之固非我族類其心必異而魏法禁錮諸王親戚隔絶不祥莫大焉間者無故又𤓰分天下立五等諸侯上不象賢下不議功而是非雜揉例受茅土似權時之宜非經乆之制將遂不改此亦煩擾之人漸亂之階也夫國之興也由于九族親睦黎庻恊和其衰也由于骨肉疏絶百姓離心故夏邦不安伊尹歸殷殷邦不和呂氏入周殷鑒在于夏后去事之誡誠來事之鑒也又陳曰昔伐蜀募取涼州兵馬羗中徤兒許以重報五千餘人隨鄧艾討賊功皆第一而乙亥詔書州郡將督不與中外軍同雖在上功無應封者惟金城太守楊欣所謂領兵以逼江由之勢得封三十人自金城以西非在欣部無一人封者茍在中軍之例雖下功必侯如州郡雖功髙不封非所謂近不重施遠不遺恩之謂也臣聞魚懸由于甘餌勇夫死于重報故荆軻慕燕丹之義專諸感闔閭之愛七首振于秦庭吳刀耀于魚腹視死如歸豈不有由也哉夫功名重賞士之所競不平致怨由來乆矣詩云尸鳩在桑其子七兮淑人君子其儀一兮臣以為此等宜蒙爵封灼前後陳事輒見省覽然身微官孤不見進序乃取長假還鄉里臨去遣息上表曰臣受恩三世剖符守境試用無績沉伏有年犬馬之力無所復堪陛下𢎞廣納之聴採狂夫之言原臣侵官之罪不問干忤之愆天地厚恩於臣足矣臣聞忠臣之於其君猶孝子之於其親進則有欣然之慶非貪官也退則有慼然之憂非懐祿也其意在于不忘光君榮親情所不能已已者也臣伏自悼私懐至憾生長荒裔而乆在外任自還抱疾未嘗覲見陛下竟不知臣何人此臣之憾一也遭運㑹之世値有事之時而不能垂功名于竹帛此臣之憾二也逮事聖明之君而尫瘁羸劣陳力又不能當歸死地下此臣之憾三也哀二親早亡隕兄弟並凋喪孝敬無復施于家門此臣之憾四也夏之日忽以過冬之夜尋復來人生百歳尚以為不足而臣中年嬰災此臣之憾五也慙日月之所養愧昊蒼而無報此臣之所以懐五憾而歎息臨歸路而自悼者也語有之曰華言虛也至言實也苦言藥也甘言疾也臣欲言天下太平而靈龜神狐未見仙芝萐莆未生麒麟未游乎靈禽之囿鳯凰未儀于太極之庭此臣之所不敢華言而為佞者也昔漢高祖初定天下于時戍卒婁敬上書諌曰陛下取天下不與成周同而欲比隆成周臣竊以為不侔于是漢祖感悟深納其言賜姓為劉氏又顧謂陸賈曰為我著秦所以亡而吾所以得之者賈乃作新語之書述敘前世成敗以為勸戒又田肯建一言之計非親子弟莫可使王齊者而受千金之賜故世稱漢祖之寛明博納所以能成帝業也今之言世者皆曰堯舜復興天下已太平矣臣猶以為未亦竊有所勸焉且百王垂制聖賢吐言來事之明鑒也孟子曰堯不能以天下與舜則舜之有天下也天與之也昔舜為相堯三年之喪畢舜避堯之子于南河天下諸侯朝覲者訟獄者不之堯之子而之舜舜曰天也乃之中國踐天子位焉若居堯之宫逼堯之子非天所與者也曩昔西有不臣之蜀東有僣號之吳三主鼎足並稱天子魏文帝率萬乘之衆受禪于靡陂而自以德同唐虞以為漢獻即是古之堯自謂即是今之舜乃謂孟軻荀卿不通禪代之變遂作禪代之文刻石垂誡班示天下傳之後世亦安能使將來君子皆曉然心服其義乎然魏文徒希慕堯舜之名推新集之魏欲以同于唐虞之盛忽骨肉之恩忘藩屏之固竟不能使四海賔服混一皇化而于時羣臣莫有諌者不其過矣哉荀卿曰堯舜禪讓是不然矣天下者至重也非至强莫之能任至大也非至辨莫之能分至衆也非至明莫之能治此三至者非聖人莫之能盡者也由此言之荀卿孟軻亦各有所不取焉陛下受禪從東府入西宫兵刃耀天旌旗翳日雖應天順天同符唐虞然法度損益則亦不異于魏文矣故宜資三至以彊制之而今諸王有立國之名而無襟帶之實又蜀地有自然之險是歴代姦雄之所闚𨵦逋逃之所聚也而無親戚子弟守此豈深思逺慮杜漸防萌者乎昔漢文帝據已成之業六合同風天下一家而賈誼上疏陳當時之勢猶以為譬如抱火厝于積薪之下而寢其上火未及然因謂之安此言誠存不忘亡安不忘亂者也然臣之慺慺亦願陛下居安思危無曰高高在上常念臨深之義不忘履氷之戒盡除魏世之弊法綏以新政之大化使萬邦欣欣喜戴洪恩昆蟲草木咸蒙恩潤朝廷詠康哉之歌山藪無伐檀之人此固天下所視望者也陛下自初踐阼發無諱之詔置箴諌之官赫然寵異諤諤之臣以明好直言之信恐陳事者知直之不用皆杜口結舌祥瑞亦何由來哉臣無陸生之才不在顧問之地盖聞主聖臣直義在于有犯無隱臣不惟疏逺未信而言敢歴論前代隆名之君及亡敗之主廢興所由又博陳舉賢之路廣開養老之制崇必信之道又張設義者之難凡五事以聞臣之所言皆直陳古今所行故事非新聲異端也辭議實淺不足採納然臣私心誠謂有可發起覺悟遺忘願陛下察臣愚忠愍臣狂直無使天下以言者為戒疾痛増篤退念桑梓之詩惟狐死之義輒長取休歸近墳墓顧瞻宫闕繫情皇極不勝丹欵遣息頴表言其一曰臣聞善有章也著在經典惡有罰也戒在刑書上自逺古下洎秦漢其聖王覇主及亡國闇君故可得而稱至于忠蹇賢相及謟佞姦臣亦可得而言故朝有諤諤盡規之臣無不昌也任用諛阿唯唯之士無不亡也是有國者皆欲求忠以自輔舉賢以自佐而亡國破家者相繼皆由任失其人所謂賢者不賢忠者不忠也臣謹言前任賢所由興任不肖所以亡者堯之末年四凶在朝而不去八元在家而不舉然終至天地平寧四門穆穆其功固在重華之為相夏癸放于鳴條商辛梟于牧野此俱萬乘之主國滅身擒由不能屬任賢相用婦人之言荒淫無道肆志沉宴作靡靡之樂長夜之飲于是登糟丘臨酒池觀牛飲望肉林龍逢忠而被害比干諌而剖心天下之所以歸惡者也太甲暴虐顚覆湯之典刑於是伊尹放之桐宫而能改悔反善三年而後歸于亳既已放而復還殷道微而復興諸侯咸服號稱太宗實頼阿衡之盡忠也周室既衰諸侯並爭天王微弱政遂陵遲齊桓公淫亂之主耳然所以能九合一匡之功有尊周之名誠管夷吾之力及其死也虫流出門豈非任豎刁之過乎但一桓公之身得管仲其功如彼任豎刁其亂如此夫榮辱存亡實在所任可不審哉秦穆伯翳之後微微小邑至秦仲始大有車馬禮樂侍御之好焉自穆公至于始皇皆能留心侍賢逺求異士招由余于西戎致五羖于宛市取丕豹于晉卿迎蹇叔于宋里由是四方雄俊繼踵而至故能世為彊國吞滅諸侯奄有天下兼稱皇帝由謀臣之助也道化未淳死于沙丘胡亥乘虐用詐自立不能𢎞濟綂緒克成堂搆而乃殘賊仁義毒流黔首故陳勝吳廣奮臂大呼而天下響應于是趙高逆亂閻樂承指二世窮迫自戮望夷子嬰雖立去帝為王孤危無輔四旬而亡此由邪臣擅命指鹿為馬所以速秦之禍也秦失其鹿豪傑競逐項羽既得而失之其咎在烹韓生而范増之謀不用假令羽既距項伯之邪説斬沛公于鴻門都咸陽以號令諸侯則天下無敵矣而羽距韓生之忠諌背范増之深計自謂覇王之業已定都彭城還故鄉為晝被文繡此盖世俗兒女之情耳而羽榮之是故五載為漢所擒至死尚不知覺悟乃曰天亡我非戰之罪甚痛矣哉且夫士之歸仁猶水之歸下禽之走曠野故曰為川驅魚者獺也為藪驅雀者鸇也為湯武驅人者桀紂也漢高祖起于布衣提三尺之刄而有天下用六國之資無唐虞之禪豈徒頼良平之竒謀盡英雄之智力而已乎亦由項氏為驅人也子孫承基三百餘年逮成帝委政舅家使權勢外移安昌侯張禹者漢之三公成帝保傅也帝親幸其家拜禹牀下深問天災人事禹當推大臣之節為社稷深慮忠言嘉謀陳其災患則王氏不得專權寵王莽無緣乘勢位遂託雲龍而登天衢令漢祚中絶也禹謟佞不忠挾懐私計徒低昂于五侯之間茍取容媚而已是以朱雲抗節求尚方斬馬劔欲以斬禹以戒其餘可謂至忠矣而成帝尚復不悟乃以為居下訕上廷辱保傅罪死無赦詔御史將雲下欲急烹之雲攀殿折檻幸頼左將軍辛慶忌叩頭流血以死爭之若不然則雲已摧碎矣後雖釋檻不修欲以彰明直臣誠足以為後世之戒亦何益于漢室之所由亡也哉然世之論者以為亂臣賊子無道之甚莫過于莽此亦猶紂之不善不如是之甚也傳稱莽始起外戚折節力行以要名譽宗族稱孝朋友歸仁及其輔成哀之際勤勞國家動見稱述然于時人士詣闕上書薦莽者不可勝紀内外羣臣莫不歸莽功德遭遇漢室中微國嗣三絶而太后壽考為之宗主故莽得遂策命孺子而奪其位也昔湯武之興亦逆取而順守之耳向莽深惟殷周取守之術崇道德務仁義履信實去華偽施惠天下十有八年恩足以感百姓義足以結英雄人懐其徳豪傑並用如此宗廟社稷宜未滅也光武雖復賢才大業詎可冀哉莽即位之後自謂天人之助以為功廣三王德茂唐虞乃自驕矜奮其威詐班宣符䜟震暴殘酷窮凶極惡人怨神怒冬雷霆以警其耳目夏地動以愓其心腹而莽猶不知覺悟方復重興不順時之命竟連伍之刑媚佞者親幸忠諌者誅夷由是天下忿懥外内俱發四海分離城池不守身死于匹夫之手為天下笑豈不異哉其所由然者非取之過而守之非道也莽既屠㓕六合雲擾劉聖公已立而不辯盆子承之而復敗公孫述又稱帝于蜀漢如此數子固非所謂應天順人者徒為光武之驅除者耳夫天下者盖亦天下之天下非一人之天下也殷商之旅其㑹如林矢于牧野維予侯興又曰侯服于周天命靡常由此言之主非常人也有徳則天下歸之無徳則天下叛之故古之明王勞心逺慮常如臨川無津涯于是法天地象四時隆恩徳敬大臣近忠直逺佞人仁孝著乎宮牆𢎞化洽于兆庶平直如砥矢信義感人神雖有椒房外戚之寵不受其委曲之言雖有近習愛幸之豎不聴其姑息之辭四門穆穆闢而不闔待諌者而無忌常戰戰慄慄不忘戒懼所以欲永終天禄恐為將來聖賢之驅除也且臣聞之懼危者常安者也憂亡者常存者也使夫有國之君能安不忘危存不忘亡則本支百世長保榮祚名位與天地無窮亦何慮乎為來者之驅除哉傳有之曰狂夫之言明主察焉其二曰士之立業行非一槩呉起貪官母死不歸殺妻求將不孝之甚然在魏使秦人不敢東向在楚則三晉不敢南謀曽參閔騫誠孝子也不能宿夕離其親豈肯出身致死渉危險之地哉今大晉應期運之所受齊聖羙于有虞而呉人不臣稱帝私附此亦國之羞也陛下誠欲致熊羆之士不二心之臣使奮威淮浦震服蠻荆者故宜疇咨博採廣開貢士之路薦巖穴舉賢才徴命考試匪俊莫用今臺閣選舉塗塞耳目九品訪人誰問中正故據上品者非公侯之子孫則當塗之昆弟也二者茍然則蓽門蓬户之俊安得不有陸沉者哉其三曰昔田子方養老馬而窮士知所歸況居天下之廣土立天下之正位行天下之大化乎昔明王聖主無不養老老人衆多未必皆賢不可悉養故父事三老所以明孝宗事五更所以明敬孟子曰老吾老以及人之老㓜吾㓜以及人之㓜今天下雖定而華山之陽無放馬之羣桃林之下未有休息之牛故以呉人尚未臣服故也夫饑者易為食渴者易為飲天下元元瞻望新政願陛下思子方之仁念犬馬之勞思帷盖之報發仁惠之詔廣開養老之制其四曰法令賞罰莫大乎信古人有言曰人而無信不知其可況有養人以惠使民以義而可以不信行之哉臣前為西郡太守被州所下己未詔書羗人道逺其但募取樂行不樂勿彊臣被詔書輒宣廣募示以賞信所得人名即條言征西其晉人自可差簡丁彊如法調取至于羗人非恩義告喻則無欲度金城河西者也自往歳興軍渡河未曽有變故刺史郭綏勸帥有方深加奬勵要許重報是以所募感恩利賞遂立績效功在第一今州郡督將並已受封羗中徤兒或王或侯不蒙論敘也晉文猶不貪原而失信齊桓不肯惜地而背盟況聖主乎其五曰昔周漢之興樹親建徳周因五等之爵漢有河山之誓及其衰也神器奪于重臣國祚移于他人故滅周者秦非姬姓也代漢者魏非劉氏也于今國家大計使異姓無裂土專封之邑同姓並據有連城之地縱復令諸王後世子孫還自相并盖亦楚人失繁弱于雲夢尚為未亡其弓也其于神器不移他族則始祖不遷之廟萬年億兆不改其名矣大晉諸王二十餘人而公侯伯子男五百餘國若言其國皆小乎則漢祖之起俱無尺土之地況有國者哉將謂大晉世世聖賢而諸侯之裔常不肖邪則放勲欽明而有丹朱瞽叟頑凶而有虞舜天下有事無不由兵而無故多樹兵本廣開亂原臣故曰五等不便也臣以為可如前表諸王宜大其國増益其兵悉遣守藩使形勢足以相接則陛下可髙枕而卧矣臣以為諸侯伯子男名號皆宜更易之使封爵之制禄奉禮秩並同天下諸侯之例臣聞與覆車同軌者未嘗安也與死人同病者未嘗存也與亡國同法者未甞存也況乎巍巍大晉方將登太山禪梁父刻石書勲垂示無窮宜逺鑒徃代興廢深為嚴防使著事奮筆必有紀焉昔伊尹恥其君不為堯舜此臣所以私懐慷愾自忘輕賤者也灼書奏帝覽而異焉擢為明威將軍魏興太守卒于官嵇紹為侍中惠帝初反正紹上疏曰臣聞改前轍者則車不傾革徃弊者則政不爽太一綂于元首百司役于多士故文武興于上成康穆于下也存不忘亡易之義善願陛下無忘金城大司馬無忘潁上大將軍無忘黄橋則禍亂之名無由兆矣索綝為衞將軍三秦人尹桓解武等數千家盗發漢覇杜二陵多獲珍寶愍帝問綝曰漢陵中物何乃多耶綝對曰漢天子即位一年而為陵天下貢賦三分之一供宗廟一待賔客一充山陵漢武帝享年乆長兆葬而茂陵不復容物其樹皆已可拱赤眉取陵中物不能減半于今猶朽帛委積珠玉未盡此二陵是儉者耳亦百世之誡也應詹為後軍將軍元帝大興中三吳大饑詔百官各上封事詹表曰夫一人不耕天下必有受其饑者而軍興以來征戰運漕朝廷宗廟百官用度既已殷廣下及工商流寓僮僕不親農桑而游食者以十萬計不思開立美利而望足國給人豈不難哉古人言曰饑寒並至堯舜不能使野無盗宼貧富並兼雖臯陶不能使强不陵弱故有國家者何嘗不務農穀近魏武皇帝用棗祗韓浩之議廣建屯田又于征伐之中分帶甲之士隨宜開墾故下不甚勞而大功克舉也間者流人奔東吳東吳今檢皆已還江及西良田曠廢未乆火耕水耨為功尤易宜簡易流人興復農官功勞報賞皆如魏氏故事一年中與百姓二年分税三年計賦税以使之公私兼濟則倉盈庾億可計日而待也又曰昔高祖使蕭何鎮關中光武令宼恂守河内魏武委鍾繇以西事故能使八表夷蕩區内緝寧今中州蕭條未蒙彊理此兆庻所以企望壽春一方之㑹去此不逺宜選都督有文武經畧者逺以振江洛之形勢近以作徐豫之藩鎮綏集流散使人有攸依專任農功令事有所寄趙充國農于金城以平西零諸葛亮耕于渭濵規抗上國今諸軍自不對敵皆宜齊課虞預除佐著作郎大興二年大旱詔求讜言直諌之士預上書諌曰大晉受命于今五十餘載自元康以來王德始缺戎翟及于中國宗廟焚為灰燼千里無煙㸑之氣中華無冠帶之人自天地開闢書籍所載大亂之極未有若兹者也陛下聖德先覺超然逺鑒作鎮東南聲教遐被上天眷顧人神賛謀雖云中興其實受命少康宣王誠未足喻然南風之歌不著而陵遲之俗未改者何也臣愚謂為國之要在于得才得才之術在于抽引茍其可用讎敵必舉高宗文王思佐發夢傅巖拔以為相載釣老而師之下至列國亦有斯事故燕重郭隗而三士競至魏式干木而秦兵退舍今天下雖弊人士雖寡十室之邑必有忠信世不乏驥求則可致而束帛未賁于丘園蒲輪頓轂而不駕所以大化不洽而雍熈有闕者也預以宼賊未平當須良將又上疏曰臣聞承平之世其教先文撥亂之運非武不克故牧野之戰呂望杖鉞淮夷作難召伯專征獫狁為暴衞霍長驅故陰陽不和擢士為相三軍不勝拔卒為將漢帝既定天下猶思猛士以守四方孝文志在鉅鹿馮唐進説魏尚復守詩稱﨣﨣武夫公侯干城折衝之佐豈可忽哉況今中州荒弊百無一存牧守官長非戎貊之族類即宼竊之幸脱陛下登阼威暢四方故令此等反善向化然狼子獸心輕薄易動羯衆未殄益使難安周撫陳州相係背叛徐龕驕黠無所拘忌放兵侵掠罪已彰灼昔葛伯違道湯獻之牛呉濞失禮錫以几杖惡成罪著方復加戮龕之小醜何足不滅然預備不虞古之善教矧乃有虞可不為防為防之術宜得良將將不素簡難以應敵壽春無鎮祖逖孤立前有勁虜後無係援雖有智力非可持乆願陛下咨之羣公博舉于衆若當局之才必允其任則宜奬勵使不顧命旁料冗猥或有可者厚加寵待足令忘身昔英布見慢恚欲自裁出觀供置然後致力禮遇之恩可不隆哉誠知山河之量非塵露可益神鑒之慮非愚淺所測然匹夫婺婦猶有憂國之言況臣得厠朝堂之末蒙冠帶之榮者乎後為著作郎咸和初夏旱詔衆官各陳致雨之意預議曰臣聞天道貴信地道貴誠誠信者盖二儀之所以生植萬物人君之所以保乂黎蒸是以殺伐擬于震雷推恩象于雲雨刑罰在于必信慶賞在于平均臣聞間者以來刑獄轉繁多力者則廣牽連逮以稽年月無援者則嚴其檟楚期于入重是以百姓嗷然感傷和氣臣愚以為輕刑耐罪宜速决遣殊死重囚加以請寛徭息役務遵節儉砥礪朝臣使各知禁盖老牛不犧禮有常制而自頃衆官拜受祖贈轉相誇尚屠殺牛犢動有十數醉酒沉湎無復限度傷財敗俗所虧不少昔殷宗修德以消桑林之異宋景善言以退熒惑之變楚國無災莊王是懼盛德之君未嘗無𤯝應以順信天佑乃隆臣學見淺闇言不足採周嵩為御史中丞元帝以王敦勢盛漸疎忌王導等嵩上疏曰臣聞明君恩隆其道故賢智之士樂在其朝忠臣將明其節故量時而後仕思隆其道故無過任之議將明其節故無過寵之謗是以君臣並隆功格天地近代以來德廢道衰君懷術以御臣臣挾利以事君君臣交利而禍亂相尋故得失之迹難可詳言臣請較而明之夫傅説之相高宗申召之輔宣王管仲之佐齊桓衰范之翼晉文或宗師其道垂拱受成委以重權終致尊主未有憂其逼已還為國蠧者也始田氏擅齊王莾簒漢皆藉封土之强假累世之寵因闇弱之主資母后之權樹比周之黨階絶滅之勢然後乃能行其私謀以成簒奪之禍耳豈遇立功之主為天人所相而能運其姦計以濟其不軌者哉光武以王族奮于閭閻因時之望收攬英竒遂續漢業以美中興之功及天下既定頗廢黜功臣者何哉武力之士不達國體以立一時之功不可乆假以權勢其興廢之事亦可見矣近者三國鼎峙並以雄畧之才命世之能皆委頼俊哲終成功業貽之後嗣未有愆失遺將來之憾者也今王導王􅘙等方之前賢猶有所後至于忠索竭誠義以輔上共隆洪基翼成大業亦昔之亮也雖陛下乘奕世之德有天人之㑹割據江東奄有南極龍飛海隅興復舊物此亦羣才之明豈徒陛下之力也哉今王業雖建羯宼未梟天下蕩蕩不賔者衆公私匱竭倉庾未充梓宮沉淪妃后不反正委能任賢推轂之日也功業垂就晉祚方隆而一旦聴孤臣之言惑疑似之説乃更以危為安以疎易親放逐舊德以佞伍賢逺虧既徃之明顧傷伊管之效傾巍巍之望喪如山之功將令賢智杜心義士喪志近招當時之患逺遺來世之笑夫安危在號令存亡在寄任以古推今豈可不寒心而哀歎者哉臣兄弟受遇無彼此之嫌而臣干犯時諱觸忤龍鱗者何誠念社稷之憂欲報之于陛下也古之明王思聞其過悟逆耳之言以明成敗之由故採納愚言以考虛實上為宗廟無窮之計下收億兆元元之命臣不勝憂憤竭愚以聞疏奏帝感悟故導等獲全熊逺自元帝為丞相引為主簿時朝廷草創議斷不循法律人立異議高下無狀逺奏曰禮以崇善法以閑非故禮有常典法有常防人知惡而無邪心是以周建象魏之制漢創畫一之法故能𢎞大道以至刑厝律令之作由來尚矣經賢智歴夷險隨時斟酌最為周備自軍興以來法度陵替至于處事不用律令競作屬命人立異議曲適物情虧傷大例府立節度復不奉用臨事改制朝作夕更至于主者不敢任法每輒關咨委之大官非為政之體若本曹處事不合法令監司當以法彈違不得動用開塞以壊成事按法盖麤術非妙道也矯割物情以成法耳若每隨物情輒改法制此為以情壊法法之不一是謂多門開人事之路廣私請之端非先王立法之本意也凡為較議者若違律令節度當合經傳及前此故事不得任情以破成法愚謂宜令錄事更立條制諸立議者皆當引律令經傳不得直以情言無所依凖以虧舊典也若開塞隨宜以權道物此是人君之所得行非臣子所宜專用王者常徵文據法以是為斷耳是時帝以權宜從事尚未能從郭璞為著作侍郎于時陰陽錯謬而刑獄繁興璞上疏曰臣聞春秋之義貴元慎始故分至啓閉以觀雲物所以顯天人之説存休咎之徵臣不揆淺見輒依歲首有所占卦得解之既濟按爻論思方渉春木玊龍德之時而為廢氷之氣來見乘加外陽未布隆陰仍積坎為法象刑獄所麗變坎加離厥象不燭以義推之皆為刑獄殷煩理有壅濫又去年十二月二十九日太白蝕月月者屬坎羣陰之府所以炤察幽情以佐太陽者也太白金行之星而來犯之天意若曰刑理失中自壊其所以為法者也臣術學庸近不練内事卦理所及敢不盡言又去秋以來沉雨跨年雖為金家沙火之祥然亦是刑獄充溢怨歎之氣所致徃建興四年十二月中行丞相令史淳于伯刑于市而血逆流長漂泊者小人雖罪在未允何足感動靈變致若斯之恠耶明皇天所以保佑金家子愛陛下屢見災異勤動無已陛下宜側身思懼以應靈譴皇極之讁事不虛降不然恐將來必有愆陽苦雨之災摧震薄蝕之變狂狡蠢戾之妖以益陛下旰食之勞也臣謹尋按舊效所以緣咎而致慶因異而邁政故木不生庭太戊無以隆雉不鳴鼎武丁不為宗夫寅畏者所以享福怠傲者所以招患此自然之符應不可不察也按解卦繇云君子以赦過宥罪既濟云思患而豫防之臣愚以為宜發哀矜之詔引在予之責蕩除瑕釁賛陽布惠使幽弊之人應蒼生以悦育否滯之氣隨谷風而舒散此亦寄時事以制用藉開塞而曲成者也臣竊觀陛下心明仁恕體之自然天假其祚奄有區夏啓重光于已昧廓四祖之遐武祥靈表瑞人鬼獻謀應天順時殆不過此然陛下即位以來中興之化未闡雖躬綜萬機勞逾日昃𤣥澤未加于羣生聲教未被乎宇宙臣子未寧于上黔細未緝于下鴻雁之詠不興康哉之歌不作何也杖道之情未著而任刑之風先彰經國之畧未振而軌物之跡屢遷夫法令不一則人情惑職次數改則覬覦生官方不審則粃政作懲勸不明則善惡渾此有國者之所慎也臣竊為陛下惜之夫以區區之曹參猶能遵蓋公之一言倚清靜以鎮俗寄市獄以容非德音不忘流詠于今漢之中宗聰悟獨斷可謂令主然厲意刑名用虧純德老子以禮為忠信之薄況刑又是禮之糟粕者乎夫無為而為之不宰而宰之固陛下之所體者也恥其君不為堯舜者亦豈惟古人是以敢肆狂瞽不隱其懐若臣言可採或所以為塵露之益若不足採所以廣納聴之門願陛下少留神鑒賜察臣言疏奏優詔報之璞又覩日有黒氣上疏曰臣以頑昧近者冐陳所見陛下不遺狂言事蒙御省伏讀聖詔歡懼交戰臣前云三陽未布隆陰仍積坎為法象刑獄所麗變坎加離厥象不燭疑將來必有薄蝕之變也此月四日日出山六七丈精光潜抹而色都赤中有異物大如雞子又有青黒之氣共相摶擊良乆乃解按時在歲首純陽之月日在癸亥全陰之位而有此異殆元首供禦之義不顯消復之理不著之所致也計去秋所陳未及一月而更有此變益明皇天留情陛下懇懇之至也徃年歳末太白蝕月今年歲始日有咎讁曽未數旬大𤯝再見日月告釁見懼詩人無曰天髙其鑒不逺故宋景善言熒惑退次光武寧亂呼沲結冰此明天人之懸符有若形影之相應應之以德則休祥臻酬之以怠則咎徵作陛下宜恭承靈譴敬天之怒施沛然之恩諧𤣥同之化上所以充塞天意下所以弭息羣謗又上疏曰臣聞人多幸國之不幸赦不宜數實如聖㫖臣愚以為子產知鑄刑書非政之善然不得不作者須以救弊故也今之宜赦理亦如之隨時之宜亦聖人所善者此國家大信之要誠非微臣所得干預今聖朝明哲思𢎞謀猷方闢四門以亮采訪輿誦於羣心況臣蒙珥筆朝末敢不竭誠盡規范寗自中書侍郎出為豫章太守臨發上疏曰臣聞道尚虚簡政貴平靜坦公亮于幽顕流子愛于百姓然後可以經夷險而不憂乘休否而常夷先王所以致太平者如此而已今四境晏如烽燧不舉而倉庾虛耗帑藏空匱古者使人歳不過三日今之勞擾殆無三日休停至有殘形翦髪以要復除生兒不復舉養鰥寡不敢娶妻豈不結怨人鬼感傷和氣恐社稷之憂積薪不足以為喻臣乆欲粗啓所懐日復一日今當永離左右不欲令心有餘憾請出臣啓事付外詳擇帝詔公卿牧守普議得失寗又陳時政曰古者分土割境以益百姓之心聖王作制籍無黄白之别昔中原喪亂流寓江左庻有旋反之期故許其挾注本郡至于漸乆人安其業丘壟墳栢皆已成行雖無本邦之名而有安土之實今宜正其封彊以土斷人户明考課之科修閭伍之法難者必曰人各有桑梓俗自有南北一朝屬户長為人隸君子則有風土之慨小人則有懐下役之慮斯誠并兼者之所執而非通理者之篤論也古者失地之君猶臣所寓之主列國之臣亦有違適之禮隨㑹任秦致稱春秋樂毅官燕見褒良史且今普天下之人原其氏出皆隨世遷移何至于今而獨不見況荒郡之人星居東西逺者千餘近者數百而舉召役調皆相資須期㑹差違輒致嚴坐人不堪命叛為盗賊是以山湖日積刑獄愈滋今荒小郡縣皆宜并合不滿五千戸不得為郡不滿千户不得為縣守宰之任宜得清平之人頃者選舉惟以恤貧為先雖制有六年而富足便退又郡守長吏牽制無常或兼臺職或帶府官夫府以綂州州以監郡郡以蒞縣如令互相領帖則是下官反為上司賦役無復節限且牽曳百姓營起廨舍東西流遷人人易處文書簿籍少有存者先之室宇皆為私家後來新官復應修理其為弊也胡可勝言又方鎮去官皆割精兵器仗以為送故米布之屬不可稱計監司相容初無彈紏其中或有清白亦復不見甄異送兵多者至有千餘家少者數十户既力入私門復資官廪布兵役既竭枉服良人牽引無端以相充補若是功勲之臣則已享列土之祚豈應封外復置吏兵乎謂送故之格宜為節制以三年為斷夫人性無涯奢侈由勢今並兼之士亦多不贍非力不足以厚身非祿不足以富家是得之有由而用之無節蒱酒永日馳騖卒年一宴之饌費過十金麗服之美不可貲筭盛狗馬之飾營鄭衞之音南畆廢而不耕講誦闕而無聞凡庸競馳傲誕成俗謂宜驗其鄉黨考其業尚試其能否而後升進如此匪惟家給人足賢人豈不繼踵而至哉官制讁兵不相襲代頃者小事便以補役一愆之違辱及累世親戚傍支罹其禍毒户口減耗亦由于此皆宜料遣以全國信禮十九為長殤以其未成人也十五為中殤以為尚童㓜也今以十六為全丁則備成人之役矣以十三為半丁所任非復童㓜之事矣豈可傷天理違經典困苦萬姓乃至此乎今宜修禮文以二十為全丁十六至十九為半丁則人無夭折生長滋繁矣帝善之初寗之出非帝之意故所啓多合㫖周祗為國子博士義熈三年劉裕表遣劉敬宣率衆五千伐蜀祗書諌裕曰自義旗之戰所征無不克此可謂天人交助信順之徵也今大難已夷君臣俱泰頃五穀轉豐民無饑苦劫盗之患亦為弭息此誠漸足無事宜大寧治本蜀賊宜平六合宜一非為不爾也古人有言天時不如地利地利不如人和今徃伐蜀萬有餘里泝流天險動經時歳若此軍直指成都徑擒譙氏者復是將帥奮威一快之舉耳然益士殘荒野無青草成都之内殆無孑遺計彼得利與今行軍之費不足相補也而今徃艱險雨雪方䧏驅三州三吳之人投之三邑三蜀之士其中疾病死亡豈可勝計此一疑也賊必不守窮城將決力戰今我徃勞困彼來甚逸若使師行不利人情波駭大勢挫衂此二疑也且千里饋糧士有饑色況今泝險萬里所在無儲若兵不解運漕不繼雖韓白之將何以成功此三疑也今云可征者云彼親離衆叛愚謂不然彼以一匹夫而能致今日之事若衆力離散亦可以至此官所遣兵皆烏合受募之人亦必無千人一心有前無退者矣夫為治者固先定其内而理其外先安其近而懐其逺自頃狂狡不息誅戮相繼未可謂人和也天險如彼未可謂地利也毛修之家儲不虐正應以得死為限劉敬宣蒙生存之恩亦宜性命仰報將軍欲驅二死之甘心而忘國家之重計愚謂竊所未安闕門之外非所宜豫茍有其心不覺披盡不從敬宣遂無功而還殁死者大半宋沈懐文武帝大明二年遷尚書吏部郎時朝議欲依古制置王畿揚州移治㑹稽猶以星變也懐文曰周制封畿漢司隸各因時宜非存相反安民寜國其揆一也茍民心所安天亦從之未必改今追古乃致平一神州舊壤歴代相承異于邊州或罷或置既物情不悦容虧化本帝不從謝莊為侍中領前軍將軍大明中世祖出行夜還勅開門莊居守以棨信或虚報不奉㫖須墨詔乃開帝後因酒讌從容曰卿欲效郅君章耶對曰臣聞蒐廵有度郊祀有節盤于游田著之前誡陛下今蒙犯塵露晨徃宵歸切恐不逞之徒忘生矯詐臣是以伏須神筆乃敢開門耳范泰文帝時以散騎常侍致仕元嘉二年表賀元正并陳旱災曰元正改律品物惟新陛下蘊日新以蓄德仰乾元以履祚吉祥集室百福來庭頃旱魃為虐亢陽愆度通川燥流異井同竭老弱不堪逺汲貧家殫于負水租輸既重賦税無䧏百姓怨咨臣年過七十未見此旱陰陽并革則和氣不交豈惟凶荒必生疾疫其為憂虞不可備序雩禜之典以誠㑹事巫祝常祚罕能有感上天之譴不可不察漢東海枉殺孝婦及祭其墓澍雨立降歳以有年是以衞人伐邢師興而雨伏願陛下式遵逺猷思隆高構推忠恕之愛矜寃枉之獄逰心下民之瘼厝思幽㝠之紀令謗木竪闕諌皷鳴朝察芻牧之言總綂御之要如此則苞桑可繫危幾無兆斯而災害不消未之有也故夏禹引百姓之罪殷湯甘萬方之過太戊資桑穀以進德宋景藉熒惑以修善斯皆因敗以轉成徃事之昭晰也修末俗者難為風就正路者易為雅臣疾患日篤夕不謀朝㑹及歳慶得以聞達微誠少亮無恨泉壤永違聖顔拜表悲咽三年秋旱蝗又上表曰陛下昧旦丕顯求民之瘼明斷庶獄無倦政事理出羣心澤謡民口百姓翕然皆以為遇其時也災變雖小要有以致之守宰之失臣所不能究上天之譴臣所不敢誣有蝗之處縣官多課民捕之無益于枯苗有傷于殺害臣聞桑穀時亡無假斤斧楚昭仁愛不禜自瘳卓茂去無知之蟲宋均囚有異之虎蝗生有由非所宜殺石不能言星不自隕春秋之㫖所宜詳察禮婦人有三從之義而無自專之道周書父子兄弟罪不相及女人被宥由來尚矣謝誨婦人猶在尚方始貴後賤物情之所甚苦匹婦一室亦能有所感激臣於謝氏不容有情蒙國重恩寢處思報伏度聖心已當有在禮春秋教詩無一而闕也臣近侍坐聞立學當在入年陛下經畧粗建意存民食入年則農功興農功興則田里闢入秋治庠序入冬集逺生二途並行事不相害夫事多以淹稽為戒不逺為患任臣學官竟無微績徒墜天施無情自處臣之區區不望目覩聖化竊慕子囊城郢之心庶免荀偃不暝之恨臣比陳愚見便是都無可採徒煩天聴愧作反側書奏帝乃原謝誨婦女時災旱未已加以疾疫又上表曰頃亢旱歴載疾疫未已方之常災實為過差古以為王澤不流之徵陛下昧旦臨朝無懈治道躬自菲薄勞心民庶以理而言不應致此意以為上天之於賢君正自殷勤無已陛下同規禹湯引百姓之過言動于心道敷自逺桑穀生朝而殞熒惑犯心而退非惟消災弭患乃所以大啓聖明靈雨立降百姓改瞻應感之來有同影響陛下近當仰推天意俯察人謀升平之化尚存舊典顧思與不思行與不行耳宋雖揖讓受終未積有虞之道先帝登遐之日便是道消之初至乃嗣主被殺哲藩嬰禍九服徘徊有心喪氣佐命託孤之臣俄為戎首天下蕩蕩王道已淪自非神英撥亂反正則宗社非復宋有革命之與隨時其義尤大是以古今異用修方必壅大道隱于小成欲速或未必達深根固蔕之術未洽于愚心是用猖狂妄作而不能緘黙者也臣頑且鄙不達治宜加之以篤疾重之以惽耄言或非是而復不能無言陛下錄其一毫之誠則臣不知厝身之所册府元龜卷五百二十八
