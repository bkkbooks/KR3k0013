body:
  text: 册府元龜卷七百八十五宋王欽若等撰總録部守道知足守道孔子曰士志於道而恥惡衣惡食者未足與議也然則卷懐昏亂養素丘樊不為利回不為物忤杜門謝絶陋巷晏然或琴書以自娛或樵蘇而不爨鱎餌不可誘汙君莫能臣安貞居嘗誓志終老者良足多矣亦有逃榮避地篤學俟時不厯當塗之門獨樂先王之道時主欽慕風聲自逺至或濯纓仕籍忘懐得喪託庇彊宗棲心恬薄端黙以自守耿介而不渝確乎之操於兹可尚盖聞其風者足使貪夫亷懦夫有立志者焉孔子為魯大夫公山弗擾以費畔召子欲往弗擾為季氏宰與陽虎共執季桓子而召孔子子路不悦曰末之也已何必公山氏之之也之適也無可之則止何必公山氏之適子曰夫召我者而豈徒哉如有用我者吾其為東周乎興周道於東方故曰東周又佛肸以中牟畔子之欲往也如之何子曰然有是言也不曰堅乎磨而不磷不曰白乎湼而不緇磷薄也湼可以染皂言至堅者磨之而不薄至白者染之於湼而不黒喻君子雖在濁亂濁亂不能汙吾豈匏瓜也哉焉能繫而不食匏瓠也言匏瓜得係一處者不食故也吾自食物當東西南北不得如不食者物係滯一處又楚聞孔子在陳蔡之間使人聘之蔡大夫謀曰孔子賢者今楚大國也孔子用於楚陳蔡用事大夫危矣於是乃相與發徒役圍孔子於野孔子講誦弦歌不衰子路愠見曰君子亦有窮乎孔子曰君子固窮小人窮斯濫矣濫溢也君子固亦有窮時但不如小人窮則濫溢為非孔子知弟子有愠心召子路而問曰詩云匪兕匪虎率彼曠野率循也言非兕虎而循曠也吾道非邪吾何為於此子路曰意者吾未仁耶人之不我信也言人之不信吾豈以未仁故乎意者吾未知耶人之不我行也言人不使通行而困窮者豈以吾未智乎孔子曰有是乎由譬使仁者而必信安有伯夷叔齊使智者而必信安有王子比干子路出子貢入見孔子曰賜詩云匪兕匪虎率彼曠野吾道非耶吾何為於此子貢曰夫子之道至大故天下莫能容夫子夫子盍少貶焉孔子曰賜良農能稼而不能為穡種之為稼歛之為穡言良農能播種之未必能歛穫之良工能巧而不能為順言良工能巧而已不能每順人之意君子能修其道綱而紀之統而理之而不能為容今爾不修爾道而求為容賜而志不逺矣子貢出顔回入見孔子曰回詩云匪兕匪虎率彼曠野吾道非耶吾何為於此顔回曰夫子之道至大故天下莫能容雖然夫子推而行之不容何病不容然後見君子夫道之不修也是吾醜也夫道既已大修而不用是有國者之醜也不容何病不容然後見君子孔子欣然而笑曰有是哉顔氏之子使爾多財吾為爾宰宰主財者也為汝主財言志之同也孔子在衛王孫賈問曰與其媚於奥寜媚於竈何謂也王孫賈衛大夫奥内也以喻近臣竈以喻執政賈執政者欲使孔子求昵之微以世俗之言感動之子曰不然獲罪於天無所禱也天以喻君孔子拒之曰如獲罪於天無所禱於衆神又曰富而可求也雖執鞭之士吾亦為之富貴不可求而得之當修德以得之若於道可求者雖執鞭賤職我亦為之如不可求從吾所好所好者古人之道又子貢曰有美玉於斯韞匵而藏諸求善賈而沽諸韞藏也匵匱也謂藏諸匱中沽賣也得善賈寕肯賣之耶子曰沽之哉沽之哉我待賈者也又冉有謂子貢曰夫子為衞君乎為猶助也衞君者謂輒也衛靈公逐太子蒯聵公薨而立孫輙後晉趙鞅納蒯瞶於戚衞石曼姑帥師圍之故問其意助輙否乎子貢曰諾吾將問之入曰伯夷叔齊何人也曰古之賢人也曰怨乎曰求仁而得仁又何怨夷齊讓國逺去終於餓死故問怨邪以讓為仁豈有怨乎出曰夫子不為也父子争國惡行孔子以伯夷叔齊為賢且仁故知不助衞君明矣又孔子疾病子路使門人為臣孔子嘗為大夫故子路欲使弟子行其臣之禮病間曰久矣哉由之行詐也無臣而為有臣吾誰欺欺天乎少差曰間言子路久有是心非今日也且予與其死於臣之手也無寕死於二三子之手乎無寕寕也二三子門人也就使我有臣而死其手我寕死於弟子之手乎且予縱不得大葬君臣禮葬予死於道路乎就使我不得此君臣禮葬有二三子在我寕當憂弃於道路乎又孟子曰孔子之去齊接淅而行去魯曰遲遲吾行也去父母國之道也可以速而速可以久而久可以處而處可以仕而仕孔子也蘧伯玉衞大夫邦有道則仕邦無道則可卷而懐之卷而懐之謂不與時政柔順不忤於人顔子名回魯人也當世亂居於陋巷一簞食一瓢飲人不堪其憂回也不改其樂孔子賢之當亂世安陋巷者不用於世窮而樂道也故孔子賢之也曾㸃字晳晳曽參父侍孔子孔子曰言爾志㸃曰春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸莫春者季春三月也春服既成衣單祫之時我欲得冠者五六人童子六七人浴於沂水之上風凉於舞雩之下歌詠先生之道歸於夫子之門孔子喟然嘆曰吾與㸃也善㸃之能知時也曽子名參寢疾病疾謂疾困樂正子春坐於牀下子春曽參弟子曽元曽申坐於足元申曽參之子童子隅坐而執燭隅坐不與成人並童子曰華而睆大夫之簀與華畫也簀謂牀下也説者以睆為刮節目子春曰止以病困不可動曽子聞之瞿然曰呼呼虐憊之聲曰華而睆大夫之簀與曽子曰然斯季孫之賜也我未之能易也元起易簀未之能易已病故也曽元曰夫子之病革矣不可以變幸而至於旦請敬易之言夫子者曽子親没之後齊嘗聘以為卿而不為也革急也變動也幸覬也曽子曰爾之愛我也不如彼彼童子君子之愛人也以德成已之德細人之愛人也以姑息息猶安也言苟容取安也吾何求哉吾得正而斃焉斯已矣斃休也舉扶而易之反席未安而没言病雖困猶勤於禮澹䑓滅明字子羽武城人孔子弟子也既已受業退而修行行不由徑非公事不見卿大夫公晳哀字季次齊人也孔子曰天下無行多為家臣仕於都唯季次未嘗仕漆雕開字子開孔子使開仕對曰吾斯之未能信仕進之道未能信者未能究習孔子説善其志道深柳下惠魯人為士師士師典獄之官魯士師也三黜人曰子未可以去乎曰直道而事人焉往而不三黜苟直道以事人至之國俱當復三黜枉道而事人何必去父母之邦墨子宋人名翟弟子公上過語墨子之義於越王悦之謂公上過曰子之師苟肯至於越請以故吳之地隂江之浦書社三百以封夫子二十五家為社七千四百家也公上過往於墨子墨子曰子觀越王能聽吾言用吾道乎公上過曰殆未能也墨子曰不唯越王不知翟之意雖子亦不知翟也若越王聽吾言用吾道翟度身而衣量腹而食比於賔萌未敢言士賔客萌民越王不聽吾言不用吾道雖全越以予我吾無所用之不聽不用而受其國是非義翟也何必越雖中國可矣孔伋字子思孔子孫也魯繆公亟見於子思曰古千乘之國以友士何如子思不恱曰古之人有言曰事之云乎豈曰友之云乎孟子曰子思之不恱也豈不曰以位則子君也我臣也何敢與君友也以德則子事我者也奚可以與我友千乘之君求與之友而不可得也而況可召與孟子為卿於齊出弔於滕王使蓋大夫王驩為輔行王驩朝暮見反齊滕之路未嘗與之言行事孟子嘗為齊卿出弔滕君蓋齊下邑也王以治蓋之大夫王驩輔行輔副使也王驩齊之諂人也有寵於王後為右師孟子不恱其為人雖與同使而行未嘗與之言行事不願與之相比也公孫丑曰齊卿之位不為小矣齊滕之路不為近矣反之未嘗與之言行事何也曰夫既或治之予何言哉孟子曰夫人既有自謂治行事我將復何言哉顔斶齊人也見齊宣王王曰斶前使之就已斶亦曰王前宣王不恱左右曰王人君也斶人臣也王曰斶前斶亦曰王前可乎斶對曰夫斶前為慕勢王前為趨士欲使斶為趨勢不如使王為趨士王忿然作色曰王者貴乎士貴乎對曰士貴耳王者不貴王曰有說乎斶曰有昔者秦王攻齊令有敢去柳下季壟五十歩而樵采者死不赦令曰有能得齊王頭者封萬户侯賜金千斤由是觀之齊王之頭㑹不若死士之壟也齊王黙然不說左右皆曰斶來斶來大王據千乘之地而建千石鐘萬石簴天下之士仁義皆來役處辯知並進莫不來語東西南北莫敢不來服萬物無不備具而百姓無不親附今夫士之髙者乃稱匹夫徒歩而處農畆下則鄙野監門閭里士之賤也亦甚矣斶對曰不然斶聞古大禹之時諸侯萬國何則徳厚之道得貴士之力也故虞舜起農畝出於野鄙而為天子及至商湯之時諸侯三千當今之世南靣稱寡人者乃二十四由此觀之非得失之䇿與稍稍誅滅滅亡無族之時欲為監門閭里安可得而有乎哉是故易傳不云乎居上位未得其實以喜其為名者必以驕奢為行倨慢驕奢則凶必從之是故無其實而喜其名者削無徳而望其福者約無功而受其禄者辱禍必渥故曰矜功不立虚願不至此皆幸樂其名而無其實徳者也是以堯有九佐舜有七友禹有五丞湯有三士自古及今而能虚成名於天下者無有也是以君王無羞亟問不愧下學士故成其道徳而揚功名於後世者堯舜禹湯周文王是也故曰無形者形之君也無端者事之本也夫上見其源下通其流至聖明學何不吉之有哉老子曰雖貴必以賤為本雖髙必以下為基是以侯王稱孤寡不榖是其賤之本與夫孤寡者人之困賤下位也而侯王以自謂豈非下人而尊貴士與夫堯傳舜舜傳禹周成王任周公旦而世世稱曰明王是以明乎士之貴也宣王曰嗟乎君子焉可侮哉寡人自取病耳及今聞君子之言乃今聞細人之行願請受為弟子漢申公魯人也少與楚元王交俱事齊人浮邱伯受詩元王薨子郢嗣立申公傳太子戊戊不好學病申公申公媿之歸魯退居家教終身不出門復謝賔客獨王命召之乃徃嚴彭祖字公子東海下邳人也為宣帝博士至河南東郡太守以髙第入為左馮翊亷直不事權貴或說曰天時不勝人事君以不修小禮曲義亡貴人左右之助經義雖髙不至宰相願少自勉强彭祖曰凡通經術固當修行先王之道何可委曲從俗苟求冨貴乎翼奉字少君東海下邳人治齊詩與蕭望之等同師望之施之政事而奉惇學不仕好律厯隂陽之説元帝徵待詔宦者署時平昌侯王臨以宣帝外屬侍中稱詔欲從奉學其術奉不肯與言後為諫大夫孫寳字子嚴以經明為郡吏御史大夫張忠辟寳為屬欲令授子經更為除舍除為修飾掃除也設儲崻謂豫備器物也音又紀切寳自劾去忠固還之心内不平後署寳主簿寳徙入舍祭竈請比鄰忠隂察怪之使所親問寳前大夫為君設除大舎子自劾去者欲為髙節也今兩府髙士俗不為主簿子既為之徙舎甚説説讀曰悦何前後不相副也寳曰髙士不為主簿而大夫君以寳為可一府莫言非言大夫以為寳通可為主簿耳府中之人又不以為不當也士安得獨自髙前日君男欲學文而移寳自近文禮書也禮有來學義無徃教道不可詘身詘何傷且不遭者可無不為況主簿乎言士不遭遇知已則當屈辱無所不為也忠聞之甚慙後終於大司農揚雄哀帝時為郎待詔時丁傅董賢用事諸附離之者或起家至二千石時雄方草太元有以自守泊如也桓譚當王莽居攝簒弑之際天下之士莫不競褒稱德美作符命以求媚譚獨自守黙無言後終於六安郡丞後漢孔子建魯國人也少遊長安與崔篆友善及篆仕王莽為建新大尹莽改千乘國曰建新郡守曰大尹嘗勸子建仕對曰吾有布衣之心子有衮冕之志各從所好不亦善乎道既乖矣請從此辭遂歸終於家包咸字子良㑹稽曲阿人也習魯詩論語王莽末去歸鄉里於東界為赤眉賊所得遂見俘執十餘日咸晨夜誦經自若賊異而遣之後終於騎都尉杜撫字叔和犍為武陽人也少有才受業於薛漢後歸鄉里教授沈靜樂道舉動必以禮後為公車令馮衍更始時為立威將軍更始使鮑永安集河北永以衍領狼孟長屯太原光武即位遣使者招永衍不肯降審知更始已殁乃共罷兵幅巾降於河内帝怨衍等不時至永以立功得贖罪遂任用之而衍獨見黜永謂衍曰昔髙祖賞季布之罪誅丁固之功今遭明主亦何憂哉衍曰記有之人有挑其隣人之妻者挑其長者長者詈之挑其少者少者報之後其夫死而取其長者或謂之曰夫非罵爾者耶曰夫在人欲其報我在我欲其罵人也夫天命難知人道易守守道之臣何患死亡衍後為曲陽令仇覽字季智陳留考城人也入太學時諸生同郡符融有髙名與覽此宇賔客盈室覽嘗自守不與融言融觀其容止心獨竒之乃謂曰與先生同郡壤鄰房牖今京師英雄四集志士交結之秋雖務經學守之何固覽乃正色曰天子修設太學豈但使人㳺談其中髙揖而去不復與言後融以告郭林宗因與融齎刺就房謁宿林宗嗟嘆下牀為拜覽初為本縣主簿後歸鄉里卒楊賜常退居隠約不答州郡禮命後辟大將軍梁冀府非其好也出除陳倉令因病不行公車徴不至連辭三公之命後拜尚書令數日出為廷尉賜自以代非家法言曰三后成功惟殷于民臯陶不與焉盖吝之也尚書曰伯夷降典折民惟刑禹平水土主名山川稷降播種農殖嘉榖三后成功惟殷于民言臯陶不預其數者盖恥之遂固辭以特進就第魏邴原自遼東歸曹公辟為司空掾原女早亡時太祖愛子蒼舒亦没太祖欲求合葬原辭曰合葬非禮也原之所以自容於明公公之所以待原者以能守訓典而不易也若聽明公之命則是凡庸也明公焉以為哉太祖乃止魏太子為五官中郎將天下向慕賔客如歸而原獨守道持常自非公事不妄舉動太祖㣲使人從容問之原曰吾聞國危不事冡宰君老不奉世子此典制也於是乃轉五官長史晉庾敳字子嵩為吏部郎是時天下多故機變屡起敳嘗靜黙無為陳袁樞字踐言家世顯貴資産充足而樞獨處率素傍無交徃端坐一室非公事未嘗出逰榮利之懐淡如也王僧辯平侯景鎮京城衣冠争徃造請樞獨杜門靜居不求聞逹後為丹陽尹後魏胡方回為中書侍郎司徒崔浩及當時朝賢並愛重之清貧守道以夀終崔模字叔軌長者篤厚不營榮利頗為崔浩輕侮而守志確然不為浩屈後位至征東將軍北齊盧熈裕襲兄爵為固安伯虚淡守道有古人之風為親表所敬重後周于謹字思敬河南雒陽人性沉深有識量略窺經史尤好孫子兵書屏居閭里未有仕進之志或有勸之者謹曰州郡之職昔人所鄙台鼎之位須待時來吾所以優游鄉邑聊以卒歳耳太宰元天穆見之嘆曰王佐才也後為太傅大宗伯隋房彦謙為司𨽻刺史時隋政漸亂朝廷靡然莫不變節彦謙直道守常介然孤立為執政者之所嫉出為涇陽令李禮成字孝諧年七歲與姑之子蘭陵太守滎陽鄭顥隨魏武帝入關顥母每謂所親曰此兒平生未嘗回頭當為重器耳及長深沉有行檢不妄通賓客釋褐著作郎周受禪拜平東將軍散騎常侍于時貴公子皆競習弓馬被服多為軍容禮成雖善騎射而從容儒服不失素望裴矩煬帝時為右光禄大夫于時皇綱不振人皆變節左翊衞大將軍字文述内史侍郎虞世基等用事文武多以賄聞唯矩守常無贓穢之響以是為世所傳李文博為薛道衡所奏為司𨽻從事于時朝政浸壊人多贓賄唯文博不改其操論者以此貴之遭離亂播遷不知所終唐虞世南於隋大業初累授祕書郎遷起居舎人時兄世基當朝貴盛妻子被服擬於王者世南雖同居而躬履勤儉不失素業竇威字文尉扶風平陵人隋太傅熾之子也沉深有器局博覽群言多所通渉家風尚武諸兄並以武功致位通顯皆哂威所為而終不改也隋内史令李德林舉其有文學釋褐袐書郎趙宗儒自中書侍郎平章事罷授右庶子退居守道奉朝請而已德宗聞而嘉之遷吏部侍郎召見勞之曰知卿閒六年故有此拜曩者與先臣並命尚念之耶因俯伏流涕盧紹廣明初遷給事中大宼犯邉避地江左雖生計屡空而端黙自守未嘗以事干侯伯人所難者紹力行之後唐李愚昭宗在鳯翔汴軍攻蒲華愚避難東歸雒陽時衞公李德裕孫道古在平泉舊墅愚徃依焉子弟親採梠負薪以給朝夕未嘗干人知足夫知足不辱知止不殆老氏之訓也故大雅明哲之士乃能察盈虗之理蹈卑約之戒使其任不踰量居常逺禍克保身吉而終無祗侮焉至乃辭婚當途移疾避位用清白為家法故不益田廬謂贏餘為自苦故不須富貴逮乎妨賢竊禄之媿發於話言懐田述志之樂形於賦詠斯皆究易象知退之㫖識天道虧盈之意寡欲易足不忮不求内全節而無苟世聞風而競勸其淑人之令範歟漢張良封留侯為太子少傅良言天下事甚衆乃稱曰家世相韓及韓滅不愛萬金之資為韓報仇彊秦天下震動今以三寸舌為帝者師封萬户位列侯此布衣之極於良足矣願棄人間事欲從赤松子㳺耳赤松子仙人也劉德為宗正嘗持老子知足之計妻死大將軍光欲以女妻之德不娶畏盛滿焉疏廣宣帝時為太傅廣兄子受為少傅在位五歲皇太子年十二通論語孝經廣謂受曰吾聞知足不辱知止不殆功遂身退天之道也今仕宦至二千石宦成名立不去懼有後悔豈如父子相隨出關歸老故鄉以夀命終不亦善乎受叩頭曰從大人議即日父子俱移病移病謂移書言病也滿三月賜告廣遂稱篤上䟽乞骸骨宣帝以其年老皆許之詔賜黄金二十斤皇太子贈五十斤踈廣踈受既歸鄉里日令家共具設酒食日日設之也共讀曰供請族人故舊賔客相娛樂數問其家金餘尚有幾所趨賣以共具幾所猶言幾許也趣讀曰足居歲餘廣子孫竊謂其昆弟老人廣所愛信者曰子孫㡬及君時頗立産業基址㡬讀曰兾今日飲食費且盡宜從丈人所勸説君買田宅丈人嚴莊之稱也故親而老老者皆稱焉老人即以閒暇迺為廣言此計廣曰吾豈老詩不念子孫哉誖惑也音布内切顧自有舊田廬顧思念也令子孫勤力其中足以共食與凢人齊今復増益之以為贏餘但教子孫怠惰耳賢而多財則損其志愚而多財則益其過且夫富者衆之怨也吾既無以教化子孫不欲益其過而生怨又此金者聖主所以惠養老臣也故樂與鄉黨宗族共饗其賜以盡吾餘日不亦可乎於是族人説服説讀曰悦皆以夀終邴曼容養志自修為官不肯過六百石輒自免去後漢馬援為伏波將軍封新息侯食邑三千户援乃撃牛釃酒勞享軍士釃猶濾也音所宜反從容謂官屬曰吾從弟少㳺嘗哀吾慷慨多大志曰士生一世但取衣食裁足乘下澤車車行澤者欲短轂御欵段馬欵猶綏也言形段遲緩為郡掾吏守墳墓鄉里稱善人斯可矣致求盈餘但自苦耳當吾在浪泊西里間虜未滅之時下潦上霧毒氣熏蒸仰視飛鳶跕跕墮水中鳶鴟也跕跕墮貎跕音都泰二切卧念少㳺平生時語何可得也今頼士大夫之力被蒙大恩猥先諸君紆佩金紫且喜且慙吏士皆伏稱萬歲及軍還將至故人多迎勞之平陵人孟兾名有計謀於坐賀援援謂之曰吾望子有善言反同衆人邪昔伏波將軍路博德開置七郡裁封數百户今我㣲勞猥享大縣功薄賞厚何以能常久乎先生奚用相濟兾曰愚不及張霸為㑹稽太守視事三年謂掾吏曰太守起自孤生致位郡守盖日終則移月滿則虧老氏有言知止不辱遂移病魏程昱為奮武將軍從太祖屢立功及天下漸平昱宗人奉牛酒大㑹昱曰知足不辱吾可以退矣乃自表歸兵闔門不出晉羊祜為征南大將軍開府儀同三司嘗與弟琇書曰既定邉事當角巾東路歸故里為容棺之墟以白士而居重位何能不以盛滿受責乎疏廣是吾師也南齊王秀之為晉平太守至郡朞年謂人曰此郡豐壤禄俸常充吾山資已足豈可久留以妨賢路上表請代時人謂王晉平恐富求歸丘靈鞠為尚書左丞世祖即位轉通直常侍領東觀祭酒靈鞠曰人居官願數遷使我終身為祭酒不恨也梁陶季直初仕齊為尚書左丞遷建安太守為政清靜百姓便之梁臺建為給事黄門侍郎嘗稱仕至二千石始願畢矣無為久預人間事江淹為散騎常侍左衞將軍嘗謂子弟曰吾本寒素不求富貴今之忝竊遂至於此平生言止足之事亦以備矣人生行樂雖富貴何時吾功名既立正欲歸身草萊耳陳虞寄字次安官至戎昭將軍大中大夫卒前後所居官未嘗至秩滿裁朞年數月便自求觧退嘗曰知足不辱吾知足矣後魏裴宣為益州刺史家世以儒學為業嘗慕亷退每嘆曰以賈誼之才仕漢文之世不厯公卿將非運也乃謂親賔曰吾本閭閻之士素無當世之志直隨牒推移遂至於此禄厚養親效不光國瞻言徃哲可以言歸矣因奉表求觧世宗不許乃作懐田賦以叙心焉北齊鄭述祖文宣天保初累遷太子少師儀同三司兖州刺史病篤乃自言之且曰吾今老矣一生富貴足矣以清白之名遺子孫死無所恨遂卒於州後周蕭太圜梁簡文帝子也國亡於周為麟趾殿學士太圜深信因果心安閒放嘗言之曰拂衣褰裳無吞舟之漏網挂符懸節慮我志之未從儻獲展禽之免有美慈明之進如蒙北叟之放實勝濟南之徵其故何哉夫閭閻者有優㳺之美朝廷者有簮珮之累盖由来久矣留侯追蹤於松子陶朱成術於辛文良有以焉況乎智不逸群行不髙物而欲辛苦一生何其僻也豈如知止蕭然無累北山之北棄絶人間南山之南超踰世網靣川原而𢃄流水倚郊甸而抗平臯築蝸舎於踈林搆環堵於幽薄近瞻煙霧逺睇風雲藉纎草以䕃長松結幽蘭而援芳桂仰翔禽於百仞俯泳魚於千尋果園在後開牕牖以臨花卉蔬圃居前坐簷楹而看灌甽二頃以供饘粥十畆以給絲麻侍兒五三可充絍織家僮數四足代耕耘沽酪牧羊協潘生之志畜雞種黍應莊叟之言穫菽尋汜氏之書露葵徵尹君之録烹羔豚而分春酒迎伏臘而候歳時披良書採至賾歌纂纂唱烏烏可以娛神可以㪚慮有朋自逺揚㩁古今田畯近至劇談稼穡斯亦足矣樂不可支永保性命何畏憂責豈若蹙足入絆申頸就覊逰帝王之門趨宰衡之勢不慮飄塵之少選寜覺年祀之斯須萬物營營靡存其意天道昧昧安可問哉嗟乎人生若浮朝露寧俟長䋲繫景實所願言執燭夜㳺驚其迅速耳百年幾何擎忌曲拳四時如流俛眉躡足出處無成語黙奚當非直邱明所恥抑亦宣尼恥之隋梁睿字恃德初仕後周為柱國益州總管髙祖受襌自以周代舊臣久居重鎮内不自安屡請入朝於是徵還京師及引見帝為之興命睿上殿握手極懽睿退謂所親曰功遂身退今其時也遂謝病闔門自守不友當時韋世康以髙祖開皇初為絳州刺史性恬素好古不以得喪干懐在州嘗慨然有止足之志與子弟書曰吾生因緒餘夙霑纓弁驅馳不已四紀於兹亟登衮命頻蒞方岳志除三惑心慎四知以不貪而為寳處脂膏而莫潤如斯之事頗為時悉今耄雖未及壯年已謝霜早梧楸風先蒲柳眼闇更劇不見細書足疾彌増非可趨走禄豈須多防滿則退年不待暮有疾便辭况孃春秋已髙温清宜奉晨昏有闕罪在我躬今世穆世文並從戎役吾與世沖復嬰逺任陟岵瞻望此情彌切桓山之悲倍深嘗戀意欲上聞乞終養禮未訪汝等故遣此及興言逺慕感咽難勝弟報以事恐難遂於是乃止于宣敏為奉車都尉嘗以滿盛之誡昔賢所重每懐靜退著述志賦以見其志焉唐岑本文字景仁為中書令有勸其營産業者文本歎曰南方一布衣徒歩入關疇昔之望不過祕書郎一縣令耳而無汗馬之勞徒以文墨致位中書令斯亦極矣荷俸禄之重為懼已多何得更言産業乎言者太息而退李日知以𤣥宗先天元年轉刑部尚書罷知政事頻請致仕許之初日知將有陳請而不與妻謀歸家而使左右飭裝將出居别業妻驚曰家産屡空子弟名宦未立何為遽辭職也日知曰書生至此已過本分人情無厭若恣其心是止足之日及歸田園不事産業但緝構池亭多引後進與之談宴册府元龜卷七百八十五
