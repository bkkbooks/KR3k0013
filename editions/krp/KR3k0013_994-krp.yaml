body:
  text: 册府元龜巻九百九十四宋王欽若等撰外臣部備禦第七唐穆宗長慶元年正月夏州奏浙東湖南等道防秋兵不習邉事准詔留其器甲歸其人敬宗以長慶四年正月即位三月甲戌夏州節度使奏於蘆子關北木𤓰嶺剙築堡柵以捍黨項之衝其壁壘屋室竝出當軍材力於塞外凡築五城烏延宥州臨塞隂河陶子而宥州烏延皆方廣數里尤居要害蕃戎畏之寶歴元年十月靈武上言保靜縣界常渠置保一所差兵鎭守文宗開成元年二月丙戍詔荆州添置䕫州雲安縣鎮兵五百人以黔中上言西南蠻動擾故也武宗㑹昌二年二月回鶻為黠戞斯所攻戰敗部族離散烏介可汗奉太和公主南來遣使求助兵糧收復本國權借天德軍以安公主時天徳軍使田牟請以沙陁退渾諸部落兵擊之帝意未决下百寮商議議者多云如牟之奏李徳裕曰頃者國家艱難之際廻鶻繼立大功今國破家亡竄投無所自居塞上未至侵滛以窮來歸遽行殺伐非漢宣待呼韓邪之道也不如聊濟資糧徐觀其變宰相陳夷行曰此借冦兵而資盗糧非計也不如擊之便徳裕曰田牟韋仲平言沙陁退渾竝願擊賊此緩急不可恃也夫見利則進遇敵則㪚是雜虜之常態必不肯為國家扞禦邉境天德一城戍兵寡弱而欲與勁虜結讎䧟之必矣不如以理卹之俟其越軼用兵為便帝以為然許助米三萬石俄而回鶻宰相嗢沒斯殺赤心宰相以其衆來降赤心部族又投幽州烏介勢孤而不與之米其衆饑乏漸近振武保大柵杷頭峯突入朔州州界沙陁退渾皆以其家保山險雲州張獻節嬰城自固虜大縱掠卒無拒者帝憂之與宰臣計事德裕曰杷頭峯北便是沙磧彼中野戰須用騎兵若以歩卒敵之理難必勝今烏介所恃者公主如令勇士出竒奪得公主虜自敗矣帝然之即令德裕草制處分代北諸軍固關防以出竒形勢授劉沔沔令大將石雄急擊可汗于殺狐山敗之四月天德軍使田牟奏以回鶻犯界出軍三千人拒之中書條奏再請制置邉上其一曰請速降中使宣諭生熟退渾党項待天德交鋒後任隨便出軍討逐如有所獲一任自收仍據殺戮别行優賞二曰自古出師皆有副二以防主將有故便湏得人石雄驍勇善戰當代無敵望授天徳軍都防禦副使助田牟攻討三曰田牟都以不曉兵機㨿奏狀已出三千人必是全軍盡出忽有不利豈免空虛馬上馳突是戎虜所長攻城圍守是戎虜所短田牟祗合堅守城壘以俟救兵望速詔田牟輙不得出兵野戰四曰回鶻馬軍難於支敵依林守險須用勁弩手望於浙西取四百人宣州取三百人令取河西路赴天徳取田牟指使五曰嗢沒斯所通誠欵未知真偽然早要别加官爵奬其忠義令逺近諸蕃知朝廷祗責可汗犯順非是要㓕回鶻六曰回鶻潰散乏糧二年勞苦人心易動必可招降望且遣田牟㨿歸降者許與優賞旋給食送太原安置並從之八月回鶻介可汗過天徳至杷頭峯北俘掠雲朔北川詔劉沔出師守鴈門諸關回鶻首領屈武降幽州授左武衛將軍同正詔以回紇犯邉漸侵内地或攻或守於理何安令少師牛僧孺陳夷行與公卿集議可否以聞僧孺曰令百僚議狀以固守關防俟其可擊則用兵宰相李徳裕議以回紇所恃者嗢沒赤心爾今已離叛其強弱之勢可見戎人獷悍不顧成敗以失二將乗忿入侵出師急擊破之必矣守險示弱虜無繇退擊之便天子以為然乃徴發許蔡汴滑等六鎮之師以太原節度使劉沔為回紇南面招討使以張仲武為幽州盧龍節度使檢校工部尚書封蘭陵郡王充回紇東南招討使以李思忠為河西党項都將回紇西南靣招討使皆㑹軍於太原十月丁夘回鶻頻刼東涇已北賜并州劉沔幽州張仲武宻詔曰自回鶻本國殘破寄命北邉朕以其艱難之時曾有勲力平寜之後繼以姻親義在懷柔情深兼愛以既轉粟賑救降使撫循示信推恩朕無所媿而狼顧塞上鼠首雲中聞有備雖暫移營稍乘隙復來近塞察其情計殊未還歸朕祗荷丕圖撫臨萬㝢守祖宗之法制思黎庶之乂安豈可畜虺穴於塞垣養蠆毒於懷袖乗其馳突必能驅除昔晉侯報楚之功避莊王於三舍答秦之惠復孟明於二崤安國庇人大義斯在卿宜遣使告諭明示朕懷如或遲留尚為巧詐即湏犄角相應臨以兵威勉務良圖副兹委遇時回鶻可汗宰相相次上表請國家借兵十萬助其收復故地入借天徳一城與公主居止及再請米糒羊馬朝廷皆拒而不許自是可汗或近振武保大柵或入朔州杷頭峯來徃不常情計難測尋突入太原部落掠牛羊人口轉戰至雲州城門刺史張獻節嬰城自守議者以回鶻嘗質公主以行深入漢界至是宻詔諸將遣􅌽奪公主及擒致可汗故有是詔又授劉沔招撫回紇詔曰昔東漢中夏既寜匃奴饑饉邉將請命出塞欲圖刻石之功光武曰柔能制剛弱能制強雖㓕大冦不如息人朕每覧前史為之興歎又以大禹修徳有苖歸心周穆徂征荒服不至固存取亂在擇良圖回鶻頃以本國荐饑種落擕貳紇干斯乗其危亂遂覆危巢既焚老上之廷盡翦名王之族可汗地逺來附塞垣朕言念姻親不忘勲力喻以呼韓美志漢氏舊章戎不亂華國之大典宜分兵食救彼疲人令歸漢南方議贍恤屬可汗乆嬰沉痼首長異心雖隨畜所行而控強深入頗已渝盟邉將戍臣屢抗其疏䇿蕃渾部落咸請其驅除朕以王者之師以全取勝匃奴見短嘉婁敬之善籌馬邑設權戒王恢之兵首推誠含垢亦已踰時况朔塞沍寒有皸瘃之患隂山逕路多曲折之難宜以徳綏豈勞兵卒惟爾乆臨沙漠頗識虜情既啓十乗之行必致六臝之遁咨之告諭方俟成功可本官兼充招撫回鶻使如不自改悔終湏驅逐其諸道兵馬行營兵馬使權令指揮又授張仲武東靣招撫回鶻使制曰古人云兵者所以明徳除害也舉徳於外則福生於内朕每念戎事務安生靈既示逺圖宜恢長算回鶻可汗寄託塞上未歸虜廷近者遣使薊門懇陳誠欵宋人病告於子反朝鮮心附於樓船我之信臣實得要領幽州盧龍軍節度副大使知節度事觀察處置押奚契丹两蕃經略盧龍軍等使銀青光祿大夫檢校工部尚書兼幽州大都督府長史兼御史大夫蘭陵郡王食邑三千戸張仲武風雲感契鳬藻恊誠自升將壇首翦狂虜戈鋋亟聞彗掃牛馬殆至谷量故能望影揣情已深致虜之術豈止聞風破膽益監慕義之心遽奏封章頗申告諭既彼率服寜忘懐柔况虜騎徃來疾於風電沙場夐逺介以山川臨敵應機固難統一比衛霍之襲葷狁異道而行辛趙之擊罕𦍑两從其志成子廟勝之䇿在舉旄傑之臣俾爾鷹揚挫其狼顧將服蠻夷之叛固在七擒勉思將帥之風無忘五利崇以夏官之秩委其統制之權當一乃心敬兹休命可檢校兵部尚書兼充東靣招撫回鶻使其當道行營兵馬使及契丹室韋等並自指揮餘如故主者施行三年二月趙蕃奏㸃戞斯攻安西北庭都䕶府宜出師應援李徳裕奏曰據地安西去京七千一百里北庭去京五千二百里承平時向西路自河西隴右出玉門關迤邐是國家州縣所在皆有重兵其安西北庭要兵便於側近徴發自艱難已後河隴盡䧟吐蕃若通安西北庭須取回紇路去今回紇破滅又不知的屬黠戞斯否縱令救得便湏却置都䕶湏以漢兵鎮守每處不下萬人萬人從何徴發饋運取何道路今天徳振武去京至近兵力常苦不足無事時貯糧不支得三年朝廷力猶不及况保七千里安西哉臣所以謂縱令得之實無用也昔漢宣帝時魏相請罷車師之田漢元帝時賈捐之請棄珠崖郡國朝賢相狄仁傑亦請棄四鎮立斛瑟羅為可汗又請棄安東却立高氏蓋不欲貪外虗内耗竭生靈此三臣者當自有之時尚欲棄之以肥中國况隔越萬里安能救之哉臣恐蕃戎多計知國力不及偽且許之邀求中國金帛陛下不可中悔此則將實費以換虚事即是㓕一回紇而又生之恐計非便乃止九月丁亥賜黠戞斯勑書曰皇帝敬問黠戞斯可汗將軍諦徳伊斯難珠至覧書并白馬二疋具悉可汗降精斗極雄朔漠以為君禀耀旄頭分天街而建國特負英豪之氣夙推驍馭之才眷想嘉猷載深寤歎來書云温仲令將軍歸國後漢使不來温仲令去日朕書具云速遣報章此當遣重臣册命自是可汗未諭此意報答稍遲來信又云道路隔絶蓋為山川悠逺未得與可汗封壤接連非是兩國之情猶有阻隔想可汗明識無復致疑又云两地致書彼此不㑹且書不可以盡言言不可以盡意况蕃漢文字傳譯不同祗在共推赤心永保盟好豈必緣餙辭語以此交歡想每欲思惟先相好意不更疑惑便是明誠又云欲除兩楹間惡刺如此之事最為嘉言緣回鶻雄據北方為一代君長諸蕃臣伏百有餘年今可汗掃除窮居大雪讐恥功業既高於前古威聲已振於北荒固當深務逺圗豈可更留餘孽黒車子不度徳量力敢保冦讐則是侮可汗獨力向化此而可忍孰不可容况可汗前來訪送公主云上天入地必須覔得今若捨而不問何以取信朕懐想可汗乗彼盛秋長驅精騎問回鶻逋逃之罪行黒車子後服之誅取若拾遺役無再舉從兹盪定豈不美歟來書又云送公主到彼無一語來緣公主纔離可汗五日便被回鶻刼奪所遣來使盡被殺傷公主二年之中流離沙漠事已隔逺所以不再叙言然趙蕃去日已具感悦之心足表殷勤之意又聞今秋欲移徃回紇牙帳㓕其大國便保舊居是使諸蕃畏威回鶻絶望稍近漢境頗謂良圖所云請發遣兵馬期集公處緣黑車子猶去漢界一千餘里在沙漠之中從前漢兵未嘗到彼比聞回鶻深意常欲投竄安西待至今秋朕當令幽州太原振武天徳緣邉四鎮要路出兵料可汗攻討之時回紇必當潜遁各令邀截便可梟擒此是軍期湏如符契想可汗必全大信用叶一心諦徳伊斯難珠朕已於前殿靣對兼賜宴樂並依來表更不滯留朕續遣重臣便申册命故先逹此㫖令彼國明知册命之禮並依回紇故事可汗爰始立國臨長諸蕃湏示隣壤情深宗盟義重以此鎮撫誰敢不從宜體至懐共宏逺略春暖想可汗休泰將相已下並存問之黠戞斯者亦名紇吃斯本前代堅昆國在回紇西北自稱李陵之後初破回紇國之時得太和公主以天家貴種又與國同姓令達干十人送公主至塞上中路為烏介可汗所得盡殺黠戞斯使人乃質公主同行及黠戞斯上表問公主所在及所遣使者十人帝顧問宰臣議者奏以黠戞斯是回紇深讎今烏介可汗尚須與通和令自將兵馬求殺使者罪人兼討黒車子容納可汗之罪帝心未决以回紇故事自平禄山之後歳賜絹三萬匹以為定制又黠戞斯有可汗之名慮不修臣禮宰臣又奏云今黠戞斯與回紇故事不同未有大功安敢邀利如肯同回紇稱臣即加册命不爾便停無傷國體兼許為宗盟可以尊卑諭之令展子孫之禮帝意乃定故降此書五年七月勑改單于都護為安北置都䕶初宰臣奏曰塞北諸蕃皆為振武是單于故地不可存其名號以啓戎心臣等謹詳國史武徳四年平突厥後於振武置雲州都督武徳五年改為單于大都督聖歴元年改為安北都䕶開元八年復為單于都䕶其安北都䕶本在天徳自貞觀二十年已後移在甘州遷徙不定今單于都䕶改為安北置都䕶如此制置並循故事乃有勑從之懿宗咸通十年十二月勑荆南節度使杜悰據司天奏有小孛星氣經歴分野恐有外夷兵水之患緣邉藩鎮最要隄防宜訓習師徒增築城堡凡闗制置具事以聞後唐莊宗天祐十四年二月莊宗未即位尚稱昭宗年號契丹阿保機攻幽州城中困弊士卒恼懼周德威使人間行以聞帝憂形於色召諸將議發兵之䇿帝曰鮮卑百萬踐暴漁陽德威獨坐孤城計無生路羣情忷忷日望援軍今若出師深虞衆寡不敵且欲伺其機便又虞失彼一隅今日諸君計將安出李審進曰戎狄無厭唯利是視從古已來常為邉患古公避狄於岐下高祖受困於平城然周垂定鼎之基漢享卜年之慶其後宣王薄伐孝武窮征垂基七百餘里凡夷狄之侵中國皆乗間隙而來或以天子政衰諸侯侵伐兵連禍結樹黨分朋畿甸邦域之中自相矛盾遂有獯戎入為邉患晉之烏丸鮮卑是也或聖主創業之初方誅暴亂正弭中原之難未遑邉備之師遂有獯戎入為邉患漢高之冐頓太宗之突厥是也獯鬻之人昧於聽受或因姦臣亡命交搆虜庭扇誘禍源指陳利害召戎而至擾犯邉城漢之中行説代宗之僕固懐恩是也擾犯之端其來異勢禦備之道蓋亦隨時夏之即序古公避狄宣王薄伐秦起長城文景和親漢武窮討皆一時也戎不亂華著於前載王基帝迹皆順天時今大王為國除兇仗順討逆前無堅陣所向摧鋒阿保機背約渝盟惑盧文進之姦䇿逺驅戎卒㓂我漁陽周徳威社稷重臣控兹要害重圍之内唯望援師我若猶豫不前竊恐城中生事如失人䘮地敵勢難支湏興攘逐之師以决安危之計天命有在阿保機無能為也如其世道未平我亦不孤於宗社安民保㤗在此一行明宗時為邢州節度使曰樊將軍願以十萬之師横行絶漠傅介子欲奉單車之師獨制兇酋逺阻山川猶希萬一今阿保機親擕衆類犯我疆塲原其立心本窺貨利雖名百萬之衆勝兵都有幾何止無斥堠之方戰無行陣之法交兵合鬪惟恃騎軍如其長㦸交鋒短兵接戰纔聞鼔譟即已敗亡臣乆在雲中備知能否從前料度毎在彀中願假臣突騎五千蠕蠕獯戎即時平盪閻寶又曰去病忘家思平冐頓陳湯奮命願斬郅支豈獨幸於功名實欲傾其臣節古人效一夫之命尚㓕獯戎當今聚萬旅之師何憂患難臣雖愚懦請以命先凡戎狄之心見利忘義以為玉帛子女可持箠而驅之以為堅甲利刃可斬木而當之今但蒐選鋭兵控制山險良弓勁弩設伏待之敵騎輕佻度險不整一人敗走衆不敢支我但犄角陳兵偃旗卧皷餌以羸卒嘗以孤軍追奔巖險之中遇我伏藏之卒萬弩齊發則醜類無遺仇敵之頭坐見懸於蠻邸願假臣精卒一萬庶幾成殄掃之功帝曰茍如其言吾當高枕矣昔太宗得一李靖卒平突厥况予今有三人吾無憂矣諸將奉觴為壽讌樂而罷四月命明宗率師赴援次于淶音來水扼祁溝諸關伺其賊勢自是敵騎不過祁溝帝又遣閻寶帥師合鎮定之兵以附既而分領騎軍夜過祁溝入賊部伍俘擒而還又有燕人自賊中來言阿保機見在幽州南稍住攻城其軍無營舍皆聚氊帳以處其衆軍分頭剽掠全無警備馬千百為羣夜牧邉地枕戈而睡不虞奔逸所獲我人皆以長紲聨頭繫之於樹中夜㫁紲皆得逃去周徳威遣人宻書告於明宗言契丹約三十萬人馬牛不知其數賊以羊馬為資近聞所食數已大半阿保機譴讓盧文進已悔其來契丹勝兵㪚布射獵保機帳前不滿萬人宜夜出竒兵掩其不備明宗具其事聞八月明宗破敵於幽州同光二年三月鎮州奏契丹將犯塞乃令李紹斌李從珂部署馬軍分道備之蕃漢内外馬歩軍副總官李嗣源領諸軍屯於邢州三年二月己夘文思殿宴罷召郭崇韜於文明殿後議邉事言契丹部族方彊幽州寡弱威名宿將相繼殂落如非勲望難伏夷人崇韜曰臣未奉聖謨已有私畫敢不上陳因曰李紹斌雖忠勤盡瘁洞悉燕薊事情然向來名位未高蕃情恐未賓伏此時弹壓宜委重臣上曰正吾意也明宗天成二年九月癸酉北靣招討副使王晏球奏准宣差兵士築城於閻溝店初詔城良鄉復詔壁於此蓋取幽涿之中塗以備鮮卑之抄掠也四年四月丙辰宣歩軍指揮使楊漢章將歩騎五千徃雲朔廵邉長興元年正月定州奏於易州界簡行到竒峯嶺北黒兒口修置砦柵已分兵士守把備契丹侵軼故也七月北京留守馮贇奏諸蕃部三千餘帳近振武請添兵控禦三年二月引進使劉處譲奏相度西路事請修葺故武州以備邉四月庚申契丹朝貢使鐵葛羅卿辭歸本部帝顧謂侍臣曰契丹遣使求歸萴刺其事如何侍臣對曰萴刺之來此為我患到今邉患弭息蓋緣此輩受擒若縱其歸則復生吾敵固不可從其請也帝曰茍欲和戎修好不可慮及此也帝意欲歸之㑹冀州刺史楊檀罷郡檀素部落人尤諳邉事帝召檀以萴刺事謀之奏曰此輩初附王都謀危社稷陛下寛慈貸其生命茍若歸之必復正南放箭既知中國事情為患深矣帝曰其實如此非卿吾幾誤計矣十月戊午帝御廣壽殿謂范延光秦王從榮等曰契丹欲謀犯塞邉上宜得嚴重帥臣卿等商量誰為可者以聞甲戍秦王從榮奏曰伏見北靣奏報契丹族帳近塞吐渾突厥已侵邉地北靣戍卒雖多未有統率早宜命大將帝曰卿等商量定未俱奏曰將校之中唯石諱康義誠二人可行諱素不欲為禁軍之副即奏曰臣願北行帝曰卿為吾行事無不濟即令宣㫖施行及受詔不樂六軍副使諱却遷延辭遜帝曰召義誠來遂令宣徽使朱宏昭知襄州事代義誠還京師十一月庚辰帝謂近臣曰北靣頻奏蕃㓂宜令河東節度使李從温且將兵士至鴈門已來廵撫因令各省副使劉處讓往太原與從温同出兵師庚寅帝謂新除河東節度使石諱曰卿至河東禦虜之要但有塞斷鶻谷凡諸闗防禦守備設法以待之慎勿與之孤鬪四年三月延州節度使安從進奏夏州李仁福卒其子彛殷自為留後先是河西諸鎮皆言仁福連結契丹嘗約虜使朝廷以虜勢方盛恐與仁福往來若使深入河西可以南侵闗輔為社稷之憂無有控制之術㑹仁福死欲移其嗣别鎮命廷帥安從進鎮之恐其不從命令邠州節度使藥彦稠宫苑使安重益為監軍同率師援送安從進之鎮帝又命安重益收聚諸軍先配契丹及親從契丹直两都並隨重益先是幽州捕送契丹楊隐已下六百人及相次投來者㪚配諸軍選其尤壯勁者立為契丹寘其酋長皆賜姓吉而言事者以為胡虜悍戾不可狎於君側至是契丹首領吉趙實自京欲遁歸奪船過河至深州所繇捕送斬之是日命重益部而出征固所以斥之於外也四月己亥隰州刺史劉遂凝至帝問所陳宻事奏曰臣所部與綏銀二州接境二州漢戸約五千自聞國家攻討夏州皆藏竄山險請除二州刺史各與二三百人為衙隊令其到郡招撫則不戰而下兩州矣帝問左右其言如何范延光奏曰綏銀戸民朝廷常加撫育緣與部落雜處其心翻覆多端昨聞安從進初至盧闗蕃酋望風歸附尋加存撫各令放歸及上馬登山未行百歩反襲從進騎從士十餘人幾至不濟奈何以刺史衙隊一二百人制彼狡虜適足為虜嗤也况國家之患正在夏州夏州即平綏銀自然景附如夏州未㧞王師自當退舍何以能守綏銀遂凝之説非也遂凝不能對良乆又奏曰臣聞李仁福有二子彛超乃次子也長子彛殷為夏州留後彛超徴詔赴闕則諸蕃歸心矣臣請以百騎自入夏州延光心知其不可以遂凝恃内助之恩恐併沮其謀則生怨望乃止翼日帝又謂延光曰遂凝之行可乎延光奏曰王師進取之謀計度已定遂凝請立彛殷兼將百騎入夏州事固不可設令虜執吾使一遂凝不足惜所惜朝廷事體也臣等商量不許遂凝輕行乃止六月新州節度使王景戡奏契丹國左右相牙盧衮與臣書稱被都要鎮偷竊馬三匹速宜送來不然則出兵剽掠范延光奏曰北虜以我夏州未平欲詭文相窺時向初秋所宜防備緣邉戍兵合交畨者宜留候秋穫訖令還帝從之末帝清㤗元年十一月辛丑詔諭涇原頒寜岐隴戍兵常選練備秦州邉事二年六月樞宻宣徽使劉延皓進添都馬二十匹河南馬百匹時偵知北虜冦邉日促騎軍故有此獻欲表率藩鎮也晉高祖時桑維翰鎮兖州吐渾都督白承福為契丹所迫舉衆内附帝方通好於契丹拒而不納鎮州節度使安重榮患契丹之彊欲謀攻襲戎使徃返路出於真定者皆潜害之宻與吐谷渾相結至是納焉而致於朝既而安重榮抗表請討契丹且言吐渾之請是時安重榮握彊兵據重鎮恃其驍勇有飛揚䟦扈之志帝覧表猶豫未决維翰知重榮已畜姦謀且懼朝廷拂于其意乃宻上疏曰竊以防未萌之禍亂立不㧞之基局上繫聖謀動符天意非臣淺陋所可窺量然臣逄世休明致位通顕無功報國省已愧心其或事擊安危理干家國茍猶緘黙實負君親是以區區之心不能自己近者相次得進奏院状報吐渾首領白承福已下舉衆内附鎮州節度使安重榮上表請討契丹臣方遥隔朝闕未測端倪思陛下頃在幷汾初罹屯種師少糧匱援絶計窮勢若綴旒困同懸磬契丹控弦玉塞躍馬龍城直度隂山徑絶大漠萬里赴難一戰夷兇救陛下累卵之危成陛下覆盂之業皇朝受命扵此六年夷夏通歡亭障無事雖卑詞䧏節屈萬乗之尊而庇國息民實數世之利今者安重榮表契丹之罪方恃勇以請行白承福畏契丹之彊將假手以報怨恐非逺慮有惑聖聰方今契丹未可與争者其有七馬契丹自數年來最為彊盛侵伐鄰國吞㓕諸蕃救援河東功成師克山後之名藩大郡盡入封疆中華之精甲利兵悉歸虜北即今土地廣人民衆戎器備而戰馬多此未可與争者一也契丹自克㨗之後鋒鋭氣雄南軍因敗衂以來心沮膽怯况今秋夏雖稔而帑廪無餘黎庻雖安而貧弊益甚戈甲雖備而鍛礪未精士馬雖多而訓練未至此未可與争者二也契丹與國家㤙義非輕信誓甚篤雖多求取未至侵凌豈可先發釁端自為戎首縦使因茲大克則後患仍存其或偶失沉機則追悔何及兵者凶器也戰者危事也茍議輕舉安得萬全此未可與争者三也王者用兵觀釁而動是以漢宣帝得志於匈奴因單于之争立唐太宗立功於突厥繇頡利之不道方今契丹正抱雄武之量有戰伐之機部族輯睦蕃國畏伏土地無災孶畜繁庶蕃漢雜用國無釁隙此未可與争者四也引弓之民遷徙鳥舉行逐水草軍無饋運居無竈幕住無營栅便苦澁任勞役不畏風霜不顧饑渇皆華人之所不能此未可與争者五也戎人皆騎士利在坦途中國用徒兵喜於走險趙魏之北燕薊之南千里之間地平如砥歩騎之便較然可知國家若與契丹相持則必屯軍邉上少則懼夷狄之衆固湏堅壁以自全多則患飛輓之勞則必逐冦而速反我歸而彼至我出而彼廻則禁衛之驍雄疲於奔命鎮定之封境略無遺民此未可與争者六也議者以陛下於契丹有所供億謂之耗蠧有所卑遜謂之屈辱㣲臣所見則曰不然且以漢祖英雄猶輸貨於冐頓神堯武略尚稱臣於可汗此謂達於權變善於屈伸所捐者㣲所利者大必若因兹交搆遂成釁隙自此則歳歳徴發日日轉輸困天下之生靈空國家之府藏此為耗蠧不亦甚乎兵戈既起將帥擅權武吏功臣過求姑息邉藩逺郡得以驕矜外剛内柔上凌下僣此為屈辱又非多乎此未可與爭者七也願陛下思社稷之大計采將相之善謀勿聽樊噲之空言宜納婁敬之逆耳然後訓撫士卒飬育黔黎積穀聚人勸農習戰以俟國有九年之積兵有十倍之彊主無内憂民有餘力便可以觀彼之變待彼之衰用已之長攻彼之短舉無不克動必成功計之上者也惟陛下熟思之臣又以鄴都襟𢃄山河表裏形勝原田沃衍户賦殷繁乃河朔之名藩寔國家之巨屏即今主帥赴闕軍府無人臣竊思慢藏誨盗之言恐非勇夫重閉之意願迴深慮免啓姦謀欲希陛下暫整和鑾略謀廵幸雖櫛風沐雨上勞於聖躬而杜禍防㣲實資於睿略省方展義今也其時臣受主㤙深憂國情切智小謀大理淺辭繁俯伏惟懼於僣踰禆補或希於萬一謹冐死以聞疏奏留中不出帝召使人於内寢傳宻㫖於維翰曰朕比日於南面之事煩懣不决今省卿所奏釋然如醒朕計已决卿無憂也周世宗顯德二年三月庚午朔辛未改李晏口為静安軍先是河朔生靈自晉漢已來常為契丹所困每胡兵入冦洞無藩籬帝甚憫之而言事者以為深兾之間有胡蘆河東西横亘數百里然其堤岸非峻不能扼胡騎之奔突帝乃按圖定䇿於是詔許州節度使王彦超曹州節度使韓通等領兵夫徒濬其堤而增其岸仍於河上築壘以屯戍兵是時工未畢而虜至彦超等迎擊退之李晏口者即河上之要津也故賜以軍額自是以後虜騎雖至終不敢渉河以肆掠繇是河朔生民稍安其居矣册府元龜卷九百九十四
