body:
  text: 冊府元龜卷五百五十八宋王欽若等撰國史部論議自左丘明受經於仲尼而為之傳其後太史公易編年之舊式明述作之微㫖揚㩁而論文辭炳焉班氏父子專心載籍亦復斟酌前史譏正得失爾後當筆削之任者盖不乏其人焉至於考正先民之異同論次一時之類例斷以年紀裁以體範深述懲勸之本極談書法之事或列於封疏或形於奏記至乃立言以垂制移書以布懷罕不磅礴今古講求奥蹟緒言佳話藹乎前聞足以見作者之志矣漢司馬談為太史公談仕於建元元封之間愍學者不達其意而師誖誖惑也各習師法惑於初見誖布内切乃論六家之要指曰易大傳天下一致而百慮同歸而殊塗大傳謂易繫辭夫隂陽儒墨名法道徳此務為治者也直所從言之異路有省不省耳言發跡雖殊同歸於治但學者不能省察昧其端緒耳直猶但也嘗竊觀隂陽之術大詳而衆忌諱使人拘而多畏隂陽之術月令星官是其枝葉也拘曲礙也然其叙四時之大順不可失也儒者博而寡要勞而少功是以事難盡從然其叙君臣父子之禮列夫婦長㓜之别不可易也易變也墨者儉而難遵是以其事不可徧循言難盡用然其彊本節用不可廢也法家嚴而少恩然其正君臣上下之分不可改也名家使人儉而善失真劉向别録云名家者流出於禮官古者名位不同禮亦異數孔子曰必也正名乎然其正名實不可不察也道家使人精神專一動合無形澹足萬物澹古瞻字其為術也因隂陽之大順采儒墨之善撮名法之要撮揔取也千活切與時遷移應物變化立俗施事無所不宜指約而易操事少而功多操執持也千高切儒者則不然以為人主天下之儀表也君倡臣和主先臣隨如此則主勞而臣佚佚樂也與逸同至於大道之要去徤羡絀聦明絀聦棄明倚依太素反本歸貞則理得而海内均也黜廢也釋此而任術夫神大用則竭形大勞則敝神形蚤衰欲與天地長乆非所聞也蚤古早字夫隂陽四時八位十二度二十四節各有教令八位八卦位也十二度十二次也二十四節就中氣也各有禁謂月令者順之者昌逆之者亡未必然也故曰使人拘而多畏夫春生夏長秋收冬藏此天道之大經也經常也弗順則無以為天下紀綱故曰四時之大順不可失也夫儒者以六藝為法六藝經傳以千萬數累世不能通其學當年不能究其理究盡也故曰博而寡要勞而少功若夫列君臣父子之禮序夫婦長㓜之别雖百家弗能易也墨者亦尚堯舜言其徳行曰堂高三尺土階三等茅茨不翦採椽不刮屋蓋曰茨以茅覆屋也採柞木也茨疾兹切採音采飯土簋歠土刑簋所以盛飯也刑以盛羹也土謂燒土為之即瓦噐也飯扶晩切簋音軌歠尺悦切糲粱之食糲粗米也一斛粟七㪷米為糲音頼藜藿之羹藜草似蓬也藿豆葉也夏日葛衣冬日鹿裘其送死桐棺三寸舉音不盡其哀教䘮禮必以此為萬民率故天下法若此則尊卑無别也夫世異時移事業不必同故曰儉而難遵也要曰彊本節用則人給家足之道也給亦足也人人家家皆得足也此墨子之所長雖百家不能廢也法家不别親疏不殊貴賤壹斷於法則親親尊尊之恩絶矣可以行一時之計而不可長用也故曰嚴而少恩若尊主卑臣明分職不得相踰越雖百家不能改也分扶問切名家苛察繳繞繳繞猶纒繞也繳功鳥切使人不得反其意剸决於名時失人情剸讀與專同故曰使人儉而善失真若夫控名責實參伍不失引名責實参錯交伍明知事情者此不可不察也道家無為又曰無不為無為者守静一也無不為者功利大也其實易行其辭難知言指趣幽逺其術以虚無為本以因循為用任自然也無成勢無常形故能究萬物之情不為物先後故能為萬物主有法無法因時為業有度無度因物興舍興起也舍廢也故曰聖人不巧時變是守無機巧之心但順時也虚者道之常也因者君之綱也言因百姓之心以為教但執其綱而已羣臣並至使各自明也其實中其聲者謂之端實不中其聲者謂之欵欵空也空則明也中當也充也中竹仲切欵言不聽姦廼不生賢不肖自分白黒廼形形見也在所欲用耳何事不成廼合大道混混冥冥元氣之貎也混故本切光燿天下復反無名返還也凡人所生者神也所託者形也神太用則竭形太勞則敝形神離則死死者不可復生離者不可復合故聖人重之繇此觀之神者生之本形者生之具不先定其神而曰我有以治天下何繇哉又謂其子遷曰幽厲之後王道缺禮樂衰孔子修舊起廢論詩書作春秋則學者至今則之自獲麟以來四百有餘嵗諸侯相兼史記放絶今漢興海内一統明主賢君忠臣義士予為太史而論載廢天下之文予甚懼焉爾其念哉又太史公曰先人有言自周公卒五百嵗而有孔子孔子至於今五百嵗有能紹而明之正易傳繼春秋本詩書禮樂之際意在斯乎意在斯乎小子何敢讓焉言當已述成先人之業何敢自嫌當五百嵗而讓之也上大夫壺遂曰昔孔子為何作春秋哉太史公曰余聞之董生仲舒也周道廢孔子為魯司冦諸侯害之大夫壅之孔子知言之不用道之不行也是非二百四十二年之中是非謂本其得失以為天下儀表貶諸侯討大夫以達王事而已矣以諸侯僣侈大夫擅權故貶討之也貶退也討治也子曰我欲載之空言不如見之於行事之深切著明也春秋上明三王之道下辨人事之紀别嫌疑明是非定猶與與讀曰豫善善惡惡賢賢賤不肖存亡國繼絶世補弊起廢王道之大者也易著天地隂陽四時五行故長於變化以變化之道為長也長讀如本字一曰長謂崇長之也竹兩切禮綱紀人倫故長於行書記先王之事故長於政詩記山川谿谷禽獸草木牝牡雌雄故長於風詠樂所以立故長於和春秋是非故長於治人是故禮以節人樂以發和書以道事詩以達意易以道化春秋以道義道言也撥亂世反之正莫近於春秋春秋文成數萬其指數千萬物之散聚皆在春秋春秋之中弑君三十六亡國五十二諸侯奔走不得保社稷者不可勝數察其所以皆失其本已己者語終之辭故易曰差以毫釐謬以千里今之易經及彖象繫辭皆無此語所稱易緯者則有之言斯盖易象之别記者也故臣弑君子弑父非一朝一夕之故其漸乆矣易坤卦爻之辭有國者不可以不知春秋前有讒而不見後有賊而不知為人臣者不可以不知春秋守經事而不知其宜遭變事而不知其權經常也為人君父者而不通於春秋之義者必蒙首惡之名蒙猶被也為人臣子不通於春秋之義者必䧟簒弑誅死之罪其實皆以善為之而不知其義其心雖善以不知義理之故則䧟於惡也被之空言不敢辭趙盾不知討賊而不敢辭弑君之罪夫不通禮義之㫖至於君不君臣不臣父不父子不子夫君不君則犯為臣下所干犯也一曰違法禮義也臣不臣則誅父不父則無道子不子則不孝此四行者天下之大過也以天下大過予之受而不敢辭故春秋者禮義之大宗也夫禮禁未然之前法施已然之後法之所為用者易見而禮之所禁者難知壺遂曰孔子之時上無明君下不得任用故作春秋垂空文以斷禮義斷决也决之於禮義也當一王之法今夫子上遇明天子下得守職萬事既具咸各序其宜夫子所論欲以何明太史公曰唯唯否否唯唯謙應也否否不通也唯戈癸切不然余聞之先人曰虙羲至純厚作易八卦虙讀與伏同堯舜之盛尚書載之禮樂作焉湯武之隆詩人歌之春秋采善貶惡推三代之徳褒周室非獨刺譏而已也漢興已來至明天子獲符瑞建封禪改正朔易服色受命於穆清於歎辭也穆美也言天子有美徳而政化清也於讀曰烏澤流罔極罔無也極止也海外殊俗重譯欵塞欵叩也請來獻見者不可勝道也道言也臣下百官力誦聖徳猶不能宣盡其意力勤也且士賢能矣而不用有國者耻也主明聖徳不布聞有司之過也且余掌其官廢明聖盛徳不載滅功臣世家賢大夫之業不述堕先人所言墮毁也謂不修之也音火規切罪莫大焉余所謂述故事整齊其傳非所謂作也而君比之春秋謬矣後漢班彪為徐令以病免彪既才高而好著述遂專心史籍之間武帝時司馬遷著史記太初已後闕而不録彪乃繼採前史遺事傍貫異聞作後傳數十篇因斟酌前史而譏正得失其畧論曰唐虞三代詩書所及世有史官以司典籍見於史籍者夏太史終古殷太史向摯周太史儋也暨於諸侯國自有史魯季孫召外史掌惡臣衞史華龍滑曰我太史也楚有左史倚相故孟子曰晉之乘楚之檮杌魯之春秋一也乘者興於田賦乘馬之事檮杌者嚚凶之類興於記惡之誡春秋以二始四時以記萬事遂各以為名其記事一也見趙岐孟子注定哀之間魯定公哀公也魯君子左丘明論集其文作左氏傳三十篇又撰異同號曰國語二十篇繇是乘檮杌之事遂闇不行於時為闇也其書今亡而左氏國語獨章又有記録黄帝以來至春秋時帝王公侯卿大夫號曰世本一十五篇春秋之後七國並争秦并諸侯則有戰國䇿三十三篇漢興定天下大中大夫陸賈記録時政作楚漢春秋九篇孝武之世太史令司馬遷採左氏國語刪世本戰國䇿據楚漢列國時事上自黄帝下訖獲麟武帝大始三年登隴首獲白麟遷作史記絶筆於此年也作本紀世家列傳書表凡百三十篇而十篇缺焉十篇謂文景紀武紀禮書樂書兵書將相表日者傳三王世家龜䇿傳傳靳列傳遷之所記從漢元至武則絶其功也至於採經摭傳分散百家之事甚多踈畧不如其本務欲以多聞廣載為功論議淺而不篤其論術學則崇黄老而薄五經黄帝老子道家也五經儒家也遷序傳曰道家使人精神專一動合無形贍足萬物此謂崇黄老也又曰儒者博而寡要勞而少功此謂薄五經也序貨殖則輕仁義而羞貧窮史記貨殖傳序曰家貧親老妻子寡弱嵗時無以祭祀飲食被服不足以自適如此不慙耻則無所比矣無嵓處竒士之行而長貧賤稽仁義亦足羞也道游俠則賤守節而貴俗功史記游俠傳序曰季次原憲行君子之徳義不茍合當世當世亦笑之終身空室蓬户褐衣疏食不饜今游俠其行雖不軌於仁義然其言必信其行必果已諾必誠不愛其軀赴士之戹盖有足多者今拘學或抱咫尺之義乆孤於世豈若卑論儕俗與世浮沉而取榮名哉此其大敝傷道所以遇極刑之咎也極刑謂遷被腐刑也遷與任安書曰最下腐刑極矣然善述序事理辯而不華質而不野文質相稱盖良史之才也誠令遷依五經之法言同聖人之是非意亦庶㡬矣易曰顔氏之子其殆庶㡬乎夫百家之書猶可法也若左氏國語世本戰國䇿楚漢春秋太史公書今之所以知古後之所繇觀前聖人之耳目也司馬遷序帝王則曰本紀公侯傳國則曰世家卿士特起則曰列傳又進項羽陳渉而黜淮南衡山謂遷著項羽本紀又陳渉起於隴畆數月被殺無子孫相繼著為世家淮南衡山漢室之裔當世家而編之列傳進退之失也細意委曲條例不經若遷之著作採獲古今貫穿經傳至廣博也一人之精文重思煩故有其書刋落不盡尚有盈辭多不齊一刋落者謂削落繁蕪所有不善若序司馬相如舉郡縣著其字至蕭曹陳平之屬及董仲舒並時之人不記其字或縣而不郡者盖不暇也史記衛青平陽人也張釋之之堵陽人並不顯郡之類也今此後篇慎覈其事整齊其文不為世家唯紀傳而已傳曰殺史見極平易正直春秋之義也張衡字平子為太史令安帝永初中謁者僕射劉珍校書郎劉騊駼等著作東觀撰集漢紀因定漢家禮儀上言請衡參論其事㑹並卒而衡嘗歎息欲終成之及為侍中上疏請得專事東觀收檢遺文畢力補綴表曰臣仰幹史職敢徼官守竊貪成訓自忘頑愚顧得專於東觀畢力於紀記竭思於補闕俾有漢休烈比長乆於天地並光明於日月昭示萬嗣永永不朽也又條上司馬遷班固所叙與典籍不合者十餘事其畧曰易稱虙戲氏王天下虙戲氏没神農氏作神農氏没黄帝堯舜氏作史遷獨載五帝不記三皇今宜并録又一事曰帝系黄帝產青陽昌意周書曰乃命少皥清清即青陽也今宜實定之又以為王莽本傳但應載簒事而已至於編年月紀災祥宜為元后本紀又更始居位人無異望光武初為其將然後即真宜以更始之號建於光武之初書數上竟不聼及後之著述多不許典時人追恨之劉千秋為越騎校尉校書東觀好事樊長孫與書曰漢家禮儀叔孫通等所草創皆隨律令在理官藏於几閣無紀録者乆令二代之業闇而不彰誠宜撰次依擬周禮定位分職各有條序今人無愚智入朝不惑君以公族元老正丁其任焉可以己劉君甚然其言與邑子通人郎中張平子參議未定而劉君遷為宗正衛尉平子為尚書郎太史令各務其職未暇恤也至順帝時平子為侍中典校書方作周官觧説乃欲次述漢事㑹復遷河間相遂莫能立也述作之功猶不易矣既感和言顧見故新汲令王文山小學為漢官篇畧道公卿内外之職旁及四夷博物條暢多所發明足知舊制儀品晉賈謐為秘書監掌國史朝廷議立晉書限斷中書監荀朂謂宜以魏正始起年著作郎王謨欲引嘉平已下朝臣盡入晉史於時依違未有所决惠帝立更使議之謐上議請從㤗始為斷於是事下三府司徒王戎司空張華領軍將軍王衍侍中樂廣黄門侍郎嵇紹國子博士謝衡皆從謐議騎都尉濟北侯荀畯侍中荀藩黄門侍郎華混以為宜用正始開元博士荀熈刁恊謂宜嘉平起年謐重執奏戎華之議事遂施行宋徐爰為太常丞初元嘉中著作郎何承天草創國史孝武初又使奉朝請山謙之南臺御史蘇寳生踵成之六年又以爰領著作郎使終其業爰雖因前作而専為一家之書上表曰臣聞虞史炳圖原光被之美夏載昭䇿先隨山之勤天飛雖王徳所至終陟固有資田躍神宗始於俾乂上日兆於納揆其在殷頌長發𤣥王受命作周實維雍伯考行之盛則振古之𢎞軌降逮二漢亦同兹義基帝業乎豐郊紹祚本於昆邑魏以武命國志晉以宣啟陽秋明黄初非更姓之本㤗始為造物之末又近代之令逺史鴻規典謨緬邈紀傳成凖善惡具書成敗畢記伏惟皇宋承金行之澆季鍾經綸之屯極擁𤣥光以鳯翔秉神符而龍舉剿定鯨鯢天人佇屬晉禄數終上帝臨宋便應奄膺統㝢對越神工而恭服勤於三分讓徳邁於不嗣其為巍巍蕩蕩赫赫明明歴觀逖聞莫或斯等宜依銜書改文登册變號起元義熈為王業之始載序宣力為功臣之斷其偽𤣥簒竊同於新莾雖靈武克殄自詳之晉録及犯命干紀受戮覇朝雖揖禪之前皆著之宋䇿國典體大方垂不朽請外詳議於是外内博議太宰江夏王義恭等三十五人同爰宜以義熈元年為斷散騎常侍巴陵王休若尚書金部郎檀道鸞二人謂宜以元興三年為始太學博士虞龢謂宜以開國為宋公元年詔曰項籍聖公編録二漢前史已有成例桓𤣥傳宜在宋典餘如爰議范曄為太子詹事撰後漢書以為司馬遷班固父子其言史官載籍之作大義粲然著矣議者咸稱二子有良史之才遷文直而事覈固文贍而事詳若固之序事不激詭不抑抗贍而不穢詳而有體使讀之者亹亹而不厭信哉其能成名也彪固譏遷以為是非頗謬於聖人然其議論嘗排死節否正直而不叙殺身成仁之為美則輕仁義賤守節愈矣固傷博物洽聞不能以智免極刑然亦身䧟大戮智及之仁不能守之嗚呼古人所以致論於目睫也南齊袁彖為秘書丞議駮國史檀超以天文志紀緯序位度五行志載當時祥沴二篇所記事用相懸日蝕為災宜居五行超欲立處士傳彖曰夫事闗業用方得列其名行今栖遁之士排斥皇王陵轢將相此偏介之行不可長風移俗故遷書未傳班史莫編一介之善無縁頓畧宜列其性業附出他篇後魏高祐孝文時為秘書令後與丞李彪等奏曰臣等聞典謨垂文話言所以光著載籍作戒行事所以昭揚然則尚書者記言之體春秋者録事之辭尋覽前志斯皆言動之實録也夏殷以前其文弗具自周以降典章備舉史官之體文質不同立書之㫖隨時有異至若左氏屬詞比事兩至並書可謂存史意而非史體逮司馬遷班固皆博識大才論叙古今曲有條章雖周達未兼斯實前史之可言者也至於後漢魏晉咸以放焉惟聖朝剏制上古開基長發自始均以後至於成帝其間世數乆逺是以史弗能傳臣等疎陋忝當史職披覽國史竊有志焉愚謂自王業始基庶事草剏皇始以降光宅中土宜依遷固大體用事類相從紀傳區别表志殊貫如此修綴事可備盡伏惟陛下先天開物洪宣帝命皇太后淳曜二儀惠和王度聲教之所洽風譯之所覃固已義振前王矣加以太和已降年未一紀然嘉符禎瑞備臻於往時洪功茂徳事萃於曩世㑹稽佇玉牒之章岱宗想石記之列而秘府䇿勲述美未盡將令皇風大猷或闕而不載功臣懿績或遺而弗傳著作郎已下請取有才用者參造國書如得其人三年有成矣然後大明之功徳光於帝篇聖后之勲業顯於皇䇿佐命忠貞之倫納言司直之士咸以備著載籍矣孝文從之時李彪專統著作祐為令時相闗預而已李彪為度支尚書除名及宣武踐阼彪求復舊職修史官之事乃上表曰臣聞龍圖出而皇道明龜書見而帝徳昶斯實㝠中之書契也自瑞官立而卑高陳民師建而貴賤序此乃人間之䋲式也是以唐典篆欽明之䇿虞書銘慎徽之篇傳著夏氏之箴詩録商家之頌斯皆國史明乎得失之迹也逮於周姬鑒於二代文王開之以兩經公旦申之以六聨郁乎其文典章大畧也故觀雅頌識文武之丕烈察歌音辯周公之至孝是以季札聼風而知始基聽頌而識盛徳至若尼父之刪魯籍丘明之辨孔志可謂婉而成章盡而不朽者矣自餘乘志之比其亦有趣焉暨史班之録乃文窮於秦漢事盡於哀平懲勸兩書華實兼載文質彬彬富哉言也令大漢之風美類三代降及華馬陳于咸有放焉而敷贊弗逺不可力致豈虗也哉其餘率見而書覩事而作者多矣尋其本末亦可往來焉惟我皇魏之奄有中華也嵗越百餘年㡬十紀太祖以弗違開基武皇以奉時創業虎嘯域中龍飛宇外小往大來品物咸亨自兹以降世濟其光史官叙録未充其盛加以東觀中圮冊勲有闕美隨日落善因月稀故諺曰一日不書百事荒蕪至於太和之十一年先帝先后逺惟景業緜緜休烈若不恢史闡録懼上業茂功殆有缺矣於是召名儒博達之士充麟閣之選於是忘臣衆短采臣片志令臣出納授臣丞職猥屬斯事無所與讓高祖時詔臣曰平爾雅志正爾筆端書而不法後世何觀臣奉以周旋不敢失墜與著作等鳩集遺文并取前記撰為國書假有新進時賢製作於此者恐閨門既異出入生疑絃柱既易善者或謬自十五年以來臣使國遷頻有南轅之事故載筆遂寢簡牘弗張其於書功録美不其闕歟伏惟孝文皇帝承天地之寳崇祖宗之業景功未就奄焉殂落凡百黎氓若無天地頼遇陛下體明叡之貞應保合之量恢大明以燭物履静恭以和邦天清其氣地樂其静不愆不忘率繇舊章可謂重明疊聖元首康哉惟先皇之開創造物經綸浩曠加以魏典流製藻繢垂篇窮理於有象盡性於衆變可謂日月出矣無幽不燭也記曰善迹者欲人繼其行善歌者欲人繼其聲故傳曰文王基之周公成之又曰無周公之才不得行周公之事今之親王可謂當之矣然先皇之茂猷聖逺今王之懿美洞鑒准之前代其徳靡悔也時哉時哉可不光炤哉合徳二儀者先皇之陶鈞也齊明日月者先皇之洞炤也慮周四時者先皇之茂功也合契鬼神者先皇之𤣥燭也遷都改邑者先皇之鑒也思同書軌者先皇之逺也守在四夷者先皇之畧也海外有截者先皇之威也禮繇岐陽者先皇之義也張藻岱郊者先皇之仁也鑾幸豳漠者先皇之智也燮伐南京者先皇之禮也升中告成者先皇之肅也親䖍宗社者先皇之敬也衮實無闕者先皇之徳也開物成務者先皇之貞也觀乎人文者先皇之藴也革弊創新者先皇之志也孝慈道洽者先皇之衷也先皇有大功二十加以謙尊而光為而弗有可謂四三皇而六五帝矣誠宜功書於竹素聲播於金石臣竊謂史官之達者大則與日月齊明小則與四時並茂其大者孔子左丘是也小者史遷班固是也故能聲流於無窮義昭於來裔是以金石可滅而風流不冺者其唯載籍乎諺曰相門有相將門有將斯不唯其性盖言習之所得也竊謂天文之官太史之職如有其人宜其世矣故尚書稱羲和世掌天地之官張衡賦曰學乎舊史氏斯盖世傳之義也若夫良冶之子善知為裘良弓之子善知為箕物豈有定習貫則知耳所以言及此者史職不修事多淪曠天人之際不可須臾闕載也是以談遷世而功立彪固世而事成此乃前鑒之軌轍後鏡之蓍龜也然前代史官之不終業者有之皆陵遲之世不能容善是以平子去史而成賦伯喈連閣而就志近僣晉之世有佐郎王隱為著作虞預所毁亡官在家晝則樵薪供㸑夜則觀文屬綴集成晉書存一代之事司馬紹勑尚書唯給筆札而已國之大籍成於私家末世之弊乃至如此此史官之不遇時也今大魏之史職則身貴禄則親榮優哉游哉式榖休矣而典謨弗恢者皆有以也而故著作漁陽傅玭北平陽尼河間邢產廣平宋弁昌黎韓顯宗等並以文才見舉著述是同皆登年不永弗終茂績前著作程靈虬同時應舉共掌此務今從他職官非所司唯崔光一人雖不移任然侍官兩兼故載述致闕臣聞載籍之興繇於大業雅頌垂薦起於徳美雖時有文質史有備畧然歴世相仍不改此度也昔史談誡其子遷曰當世有美而不書汝之罪也是以乆而見美孔明在蜀不以史官㽞意是以乆而受譏取之深衷史談之志賢亮逺矣書稱無曠庶官詩有職思其憂臣雖今非所司然昔忝斯任故不以草茅自疎敢言及於此語曰患為之者不必知知之者不得為臣誠不知强欲為知耳竊尋先朝賜臣名彪者逺則擬漢史之叔皮近則凖晉史之紹統推名求義欲罷不能佩荷恩澤死而後己今所求者乞一静處綜理國籍以終前志官給事力以充所須雖不能光啟大録庶不為飽食終日耳近則期月可就逺也三年有成正本藴之麟閣副貳藏之名山時司空北海王祥尚書令王肅以其無禄頗相賑餉遂在秘書省同王隠故事白衣修史嵗餘史業竟未及就然區分書體皆彪之功張彛宣武時為光禄大夫表曰竊惟皇王統天必以窮幽為美盡理作聖亦假廣採成明故詢於芻蕘著之周什輿人獻箴流於夏典不然則美刺無以得彰善惡有時不逹逮於兩漢魏晉雖道有汚隆而被繡傳檄未始闕也及惠帝失御中夏分離劉苻專據秦西燕趙迭制闗左姚夏繼起五凉競立致使九服揺揺民無定主禮儀典制此焉堙滅暨大魏應厯撥亂登皇翦彼鯨鯢龕靖神縣數紀之間天下寜一傳輝七帝積聖如神高祖遷鼎成周永兹八百偃武修文憲章斯改實所謂加五帝登三王民無徳而名焉猶且慮獨見之不明欲廣訪於得失乃命四使觀察風謡臣時忝常伯充一使之列遂得仗節輝金宣恩東夏周歴於齊魯之間徧馳於梁宋之域詢採詩頌研檢獄情庶片言之不遺兾美刺之俱顯而才輕任重多不遂心所採之詩並始申白而值鑾輿南討問罪宛鄧臣復忝行軍樞機是務及輦駕之返膳御未和續以大諱奄臻四海摧慕遂爾推遷不及聞徹未㡬叨牧秦藩違離闕下繼以譴疾相纒寜丁八嵗嘗恐所採之詩永淪丘壑是臣夙夜所懷以為深憂者也陛下垂日月之明行雲雨之施察臣往罪之濫矜臣貧病之切既蒙崇以禄養復得拜掃丘墳明目友朋無所負愧且臣一二年來所患不劇尋省本書粗有髣髴凡有七卷令冩上呈伏願昭覽勑付有司使魏代所採之詩不湮於丘井臣之願也陽尼為著作郎好學博通羣籍奏佛道宜在史録後冊府元龜卷五百五十八
