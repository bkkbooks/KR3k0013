body:
  text: 册府元龜巻五百十九宋王欽若等撰憲官部彈劾第二南齊任遐為左丞太祖建元元年驃騎諮議沈憲等坐家奴客為刼子弟被劾憲等晏然御史中丞陸澄不糺遐奏請免澄官澄上表自理曰周稱舊章漢言故事爰自河雒降逮淮海朝之憲度動尚先准若乃任情違古率意專造豈謂酌諸故實擇其茂典案遐啟彈新除諮議叅驃騎大將軍軍事沈憲太子庶子沈曠并弟息勑付建康而憲被使曠受假俱無歸罪事状臣以不糾憲等為失伏尋晉宋左丞案奏不乏於時其及中丞者從來殆無王獻之習逹朝章近代之宗其為左丞彈司徒属王濛憚罰自解属疾游行初不及中丞桓秘不奔山陵左丞鄭襲不彈秘直彈中丞孔欣時又云别攝蘭臺簡校此徑彈中丞之謂唯左丞庾登之奏鎭北檀道濟北伐不進致虎牢陷沒蕃岳宰臣引咎謝諐而責帥之劾曽莫奏聞議収治道濟免中丞何萬嵗夫山陵情敬之極北伐專征之大秘覇季之貴道濟元勲之盛所以咎及南司事非常憲然秘事猶非及中丞也今若以此為例恐人之貴賤事之輕重物有其倫不可相方左丞江奥彈段景文又彈裴方明左丞甄法崇彈蕭珍又彈杜驥又彈段國又彈范文伯左丞羊𤣥保弹蕭注左丞殷景熙弹張仲仁史遺一弹左丞何承天弹呂萬齡並不歸罪皆為重劾凡兹十彈差是憲曠之比悉無及中丞之文左丞荀萬秋劉藏江謐彈王僧朗王雲之陶寶度不及中丞最是近例之明者謐彈在今龕黎之後事行聖炤逺取十奏近徴二案自宜依以為體豈得捨而不遵臣竊膺承乏謬奉國憲今遐所糾既行一時若黙而不言則向為来准後人被䋲方當追誚素飡之責貽塵千載所以偹舉顯例𢎞通國典雖有愚心不在㣲躬請出臣表付外詳議若所陳非謬裁邀天鑒詔委外詳尚書令禇淵奏宋世左丞荀伯子彈彭城令張道欣等坐界刼累發不禽免道欣等官中丞王淮不糾亦免官左丞羊𤣥保彈豫州刺史管義之譙梁羣咨免義之官中丞傳隆不糾亦免隆官左丞羊𤣥保又彈兖州刺史鄭從之濫上布及加課租綿免從之中丞傅隆不糾免隆官左丞陸展彈建康令丘珍孫丹陽尹孔山士刼發不禽免珍孫山士官中丞何朂不糾亦免朂官左丞劉矇彈青州刺史劉道隆失火燒府庫免道隆官中丞蕭恵開不糾免恵開官左丞徐爰彈左衛將軍薛安都属疾不直免安都官中丞張永結不糾亦免永結官澄謏聞庸見貽撓後昆上掩皇眀下籠朝識請以見事免澄所居官詔曰澄表㨿多謬不足深劾可白衣領職孔稚珪為御史中丞武帝永明十一年王奐為鎭北將軍雍州刺史輙殺寧蠻長史劉興袓帝大怒稚珪奏其事曰雍州刺史王奐啟録小府長史劉興袓虛稱興袓扇動山蠻䂓生逆謀誑言誹謗言辭不遜勅使送興袓下都奐慮所啟欺妄於獄打殺興祖詐啟稱自經死止今體傷楗蒼黑敢事暴聞聽攝興祖門生劉倪到臺辨問列興祖與奐共事不能相和自去年朱公恩領軍征蠻失利興祖啟聞不啟呈奐奐因此便相嫌恨若云興袓有罪便應事在民間民間恬然都無事迹去十年九月十八日奐使仗身三十人来稱勑錄興袓付獄安定郡蠻先在郡贓私興袓既知其取與即牒啟奐不問興祖後執錄奐仍令蠻領仗身於獄守視興袓未死之前於獄以物畫漆柈子中出宻報家道無罪令啟乞出都一辨萬死無恨又云奐驅興袓嚴禁信使欲作方便殺以除口舌又云奐意乃可奐第三息彪隨奐在州凡事是非皆干豫扇搆密害興祖又云興袓家餉麋中下藥食兩口便覺廻乞獄子食者皆大利興袓大呌道麋中有藥近獄之家無人不聞又云奐治著興袓日急判無濟理十一月二十一日奐使獄吏來報興袓家道興祖於獄自經死尸出家人共洗浴之見興袓頸下有傷肩脾烏黑敢隂下破碎實非興袓自經死家人及門義共見非是一人重攝簡雍州都留田文喜列與倪符同狀興袓在獄嗛苦望間既䝉降㫖欣願始通豈容於此方復自經勑以十九日至興袓以二十一日死推理簡迹灼然矯假尋勑使送下奐輙拒詔所謗諸條悉出奐意毁故丞相陳顯達誹訕朝事莫此之甚彪私隨父之鎭敢亂王法罪合並窮戮從之沈昭略為左丞永眀中建康令蕭誕與秣陵令司馬迪之同乘行車前導四卒昭略奏凡有鹵簿官共乗不得兼列騶等請免誕等官詔贖論徐孝嗣為御史中丞永眀中富陽人唐㝢之聚黨攻陷郡縣守宰多奔敗㝢之既平孝嗣劾奏曰風聞山東羣盜剽掠列城雖不日而殄要蹔干王略郡縣闕攻守之宜倉府多侵耗之弊舉善懲惡應有攸歸吴郡所領塩官令蕭元蔚桐盧令王天愍新城令陸赤奮等縣為白刼破掠並不經格戰委職散走元蔚天愍還臺赤奮不知所在又錢唐令劉彪富陽令何珣乃率領吏民拒戰不敵未委歸臺餘建徳夀昌在刼㫁上流不知被刼掠不吳興所領餘杭縣被刼令樂琰乃率吏民斷戰不敵委走出都㑹稽所領諸暨縣為刼所破令陵居之不經格戰委城奔走不知所在案元蔚等妄藉天私作司近服昧斯隐慝職啟䖍劉會稽郡丞張思祖謬因承乏總任是尸涓誠芻效終焉無紀平東將軍呉郡太守文季征虜將軍吳興太守西昌侯鸞任属關河威懐是寄輙下禁止彪琰珣思袓文季視事如故鸞等結贖論詔元蔚等免思袓鸞文季原孫緬為左丞儀曺郎張融請假奔叔父䘮道中罸幹錢敬道鞭杖五十寄繫延陵獄大明五年制二品清官行僮幹杖不得出十融為緬所奏免官梁江淹齊少帝初為御史中丞時明帝作相因謂淹曰君昔在尚書中非公事不妄行在官寛猛能折𠂻今為南司足以震肅百寮淹答曰今日之事可謂當官而行便恐才劣志薄不足以仰稱明㫖耳於是彈中書令謝朏司徒左長史王績䕶軍長史庾𢎞逺並以久病不預山陵公事又奏収益州刺史劉悛梁州刺史隂智伯並贓貨巨萬収付廷尉治罪臨海太守沈昭畧永嘉太守庾曇隆及諸郡二千石并大縣官長多被劾治内外肅然任昉為御史中丞天監四年夏髙祖讌於華光殿謂羣臣曰朕日昃聽政思聞得失卿等可謂多士宜各盡獻替尚書左丞范縝起曰司徒謝朏本有虛名陛下擢之如此前尚書令王亮頗有治實陛下棄之如彼是愚臣所不知帝變色曰卿可更餘言縝固執不已帝不恱昉因奏曰風聞尚書左丞臣范縝自晉安還語人云我不詣餘人唯詣王亮不餉餘人唯餉王亮輙收縝自從左右萬休到臺辨問與風聞符同又今月十日御餞梁州刺史臣珍國宴私既洽羣臣並已謁退時詔留侍中臣昻等十人訪以政道縝不答所問而横議沸騰遂貶裁司徒臣朏舉庶人王亮臣于時預奉恩留並耳目所接差非風聞竊尋王有遊豫親御軒陛義深推轂情優湛露酒闌宴罷當扆正立記事在前記言在後貽早朝之念深求瘼之情而縝言不遜妄陳褒貶傷濟濟之風缺側席之望不有嚴裁憲准將缺縝即主臣謹案尚書左丞臣范縝衣冠緒餘言行舛駁誇諧里落喧詬周行曲學諛聞未知去代弄口鳴舌衹足飾非乃者義師近次縝丁離艱棘曽不呼問墨縗景附頗同先覺實奉龍顔而今黨恊釁餘飜為矛楯人亦無常成兹奸詖且飲至䇿勲功㣲賞厚出守名邦入司管轄苞篚罔遺而假稱折轅衣裾所弊而讒激失所許與疵廢廷辱民宗自居樞憲䋲奏寂寞顧望縱容無至公之議惡直醜正有私訐之談所宜寘之徽纆肅正國典臣等叅議請以見事免縝所居官輙勒外收付廷尉法獄治罪應諸連逮委之獄官以法制從事縝位應黃紙臣輙奉白簡以聞璽書語縝曰亮少乏才能無聞時軰昔經冐入羣英相與嗤薄晩節諂事江祏為吏部末又協附梅蟲兒茹法珍遂執昏政比屋離禍盡家塗炭四海沸騰天下橫潰此誰之咎食亂君之祿不死於治世亮協固凶黨作威作福靡衣玊食女樂盈房勢危事逼自相吞噬建凾首題靡曽請罪朕録其白旗之来貰其既徃之咎亮反覆不忠奸賄彰暴有何可論妄相談述具以狀對所訐十條縝答支離而已又征虜將軍蕭頴達乞魚軍稅昉奏彈曰臣聞貧觀所取窮視不為在於布衣窮居能敦此行尚可激貪厲俗惇此薄夫况乎伐冰之家爭雞豚之利衣繡之士受賈人之服風聞征虜將軍臣蕭頴達啟乞魚軍稅輙攝頴達宅督彭難當到臺辨問列稱尋生魚典稅先本是鄧僧琰啟乞限訖今年五月十四日主人頴達于時謂非新立仍啟乞接代僧琰即蒙降許登稅與史法輪一年收直五十萬如其列狀則與風聞符同頴逹即主臣謹案征虜將軍太子左衛率作唐縣開國侯臣頴逹備位大臣預聞執憲私謁亟陳至公寂寞屠中之志異乎鮑肆之求魚飱之資不侔潜有之數遂復申兹文二追彼十一風體若兹凖䋲斯在陛下𢎞惜勲良每為曲法臣當官執憲敢不直䋲臣等叅議請以見事免頴逹所居官以侯還第有詔原之元魏圍司州刺史蔡道恭城中負版而汲郢州刺史曹景宗望門不出但縱軍㳺獵而已司州城陷昉奏劾之髙祖以功臣寢而不治虞㬭為治書侍郎御史伏暅為永陽内史在郡清㓗徙為新安太守清恪如永陽時徴為國子博士領長水校尉時始興内史何逺累著清績髙祖詔擢為黃門侍郎俄遷信武將軍監吳郡暅自以名軰素在逺前為吏俱稱亷白逺累見擢晅遷階而已意望不滿多託疾居家尋求假到東陽迎妺䘮因留㑹稽築宅自表解帝詔以為豫章内史暅乃拜㬭奏曰臣聞失忠與信一心之道以虧貌是情非兩觀之誅宜及豈有凌犯名教要脅君親而可緯俗經邦者也風聞豫章内史伏暅去嵗啟假以迎妹䘮為辭因停㑹稽不去入東之始貨宅賣車以此而推則是本無還意暅厯典二邦少免貪濁此自為政之本豈得稱功嘗謂人才品望居何逺之右而逺以清公見擢名位轉隆暅深誹怨形於辭色興居歎咤寤寐失圖天髙聽卑無私不照去年十二月二十一日詔曰國子博士領長水校尉伏暅為政亷平宜加將養無使恚望致虧士風可豫章内史豈有人臣奉如此之詔而不亾魂破膽歸罪有司擢髮抽腸少自論謝而循奉慠然了無異色暅識所到足逹此㫖而冐寵不辭吝斯茍得故以士流解體行路沸騰辨跡求心無一可恕竊以暅踉蹡落魄三十餘年皇運勃興咸與維始除舊布新濯之江漢一紀之間三世隆顯曽不能少懐感激仰答萬分反覆拙謀成茲巧罪不忠不敬於斯已極請以暅大不敬論以事詳法應弃市刑輙收付所司近獄如法所稱暅即主臣謹案豫章内史臣伏暅含疪表行籍悖成心語嘿一違資敬兼盡幸属昌時擢以不次溪壑可盈志欲無滿要君東走豈曰止足之歸負志解巾異乎激處之致甘此脂膏孰非荼苦佩茲龜組豈殊縲絏宜明風憲肅此簡書臣等叅議請以見事免暅所居官凡諸位任一皆削除有詔勿治暅遂得就郡袁昻仕齊為御史中丞時尚書令王晏弟詡為廣州多納財貨昻依事劾奏不憚權豪陸杲為御史中丞性婞直無所顧望時山隂令虞肩一名眉在任贓汙數百萬杲奏收劾之到洽為御史中丞時劉孝綽為廷尉携妾入官府其母猶停私宅洽遣令史案其事遂奏之孝綽免官劉賢為尚書左丞時從兄孝綽為吏部郎在職頗通贓貨賢劾奏免官陳徐陵為御史中丞時安成王為司空以帝弟之尊勢傾朝野直兵鮑叔叡假王威權抑塞辭訟大臣莫敢言者陵聞之乃為奏彈導從南臺官属引奏案而入世祖見陵服重嚴肅若不可犯為歛容正色陵進讀奏狀時安成王殿上侍立仰視帝流汗失色陵遣殿中御史引王下殿遂劾免侍中中書監自此朝廷肅然徐君敷為御史中丞南康嗣王方㤗為寧逺將軍直殿省尋加都督常侍量置佐吏大建十一年髙宗幸大壯觀因大閱武命都督任忠領步騎十萬陣於𤣥武湖都督陳景領樓檻五百岀于𤓰步江帝登𤣥武門宴羣臣以觀之因幸樂游苑設絲竹㑹仍重幸大壯觀集衆振旅而還是時方㤗當從啟稱所生母疾不行因與亡命楊忠期等二十人微服徃民間淫人妻為州所錄又率人杖抗拒傷損禁司為有司所奏帝大怒下方㤗獄方㤗初但承行淫不承拒格禁司上曰不承則上刑方㤗乃投列承引於是君敷駁奏曰臣聞王者之來匪漏網而私物至治之本無屈法而申慈謹案南康王陳方泰宗属雖逺慿託葭莩刺舉莫成共理罕績聖上引以悔徃許其録用宫闈寄切宿衞是尸豈有金門旦啟玉輿曉蹕百司馳騖千隊騰驤憚此翼從之勞妄興晨昏之請飜以危冠淇上袨服桑中臣子之諐莫斯為大宜從霜簡允寘秋官臣等叅議請依見事解方泰所居官下宗正削爵土謹以白簡奏聞帝可武陵王伯禮為吳興太守在郡恣行暴掠大建十一年被代徴還伯禮遂遷延不發君敷奏曰臣聞車屦不俟君命之通規夙夜匪懈臣子之常節謹案雲旗將軍持節都督吴興諸軍事吳興太守武陵王伯禮早擅英猷久馳令聞惟良寄重枌鄉是属聖上愛育黔黎留情政本共化求瘼早赴皇心遂復稽緩歸驂取移凉燠遲迴去鷁空淹載路淑慎未彰違惰斯在䋲諐簡迹以為懲誡臣等叅議以見事免伯禮所居官以王還第謹以白簡奏聞詔曰可宗元饒為御史中丞時蔡景歴為散騎常侍中書通事舍人太建五年髙宗銳意河南景歴諌稱師老將驕不宜過窮逺畧帝大怒出為豫章内史未行為飛章所劾以在省之日贓汙狼籍帝令有司案問景歴但承其半于是元饒奏曰臣聞忠以事上㢘以持身茍違斯道刑茲罔赦謹案宣逺將軍豫章内史新豐縣開國侯景歴因籍多幸豫奉興王皇運初隆頗叅締搆天嘉之世贓賄狼籍聖恩録用許以更鳴裂壌崇階不逺斯復不能改節自勵以報曲成遂乃專擅貪汙彰於逺近一則已甚其可再乎宜寘刑書以眀秋憲臣等叅議以見事免景歴所居官下鴻臚削爵土謹奉白簡以聞詔曰可於是徙居㑹稽合州刺史陳裒贓汙狼籍遣使就渚歛魚又於六郡乞米百姓甚苦之元饒劾奏曰臣聞建旟求瘼寔寄㢘平褰帷恤隠本資仁恕如或貪汙是肆徴賦無厭天網雖疎兹焉弗漏謹案鍾陵縣開國侯合州刺史臣裒因籍多幸豫逢抽擢爵由恩被官以私加曽無功能坐尸榮貴譙肥之地久淪非所皇威尅復物仰仁風新邦用輕彌俟寛恵應斯作收其寄尤重爰降曲恩祖行宣室親承規誨事等言提雖亷潔之懐誠無素蓄稟茲嚴訓可以厲精遂乃擅行賦歛專肆貪取求粟不厭愧王沈之岀賑徴魚無限異羊續之懸枯寘以嚴科寔惟明憲臣等叅議請依㫖免裒所應覆除官其應禁錮及後選在降本資悉依免官之法遂可其奏吴興太守武陵王伯禮豫章内史南康嗣王方㤗并驕蹇放橫元饒案奏之皆見削黜袁憲為御史中丞時豫章王叔英不奉法度逼取人馬憲依事劾奏叔英由是坐免黜徐儉為御史中丞性公平無所阿附尚書令江聦望重一時為儉所糾劾後魏髙道恱為治書侍御史孝文車駕南征徴兵秦雍大期秋季閱集雒陽道恱以使者治書御史薛聰中散元志等稽違期㑹奏舉其罪又奏兼左僕射吏部尚書任城王澄位總朝政任属戎機兵使㑹否曽不檢奏尚書左丞公孫良職維樞轄矇目莫舉請以見事免良等所居官李彪為御史中丞趙郡王幹為司州牧車駕南討詔幹都督中外諸軍事幹貪滛不遵治典彪將糺劾之㑹遇幹於尚書下舍因屏左右而謂幹曰殿下比有風聞即欲起彈恐損聖眀委託之㫖若改徃修来彪當不言脫不悛改夕聞旦發而幹悠然不以為意彪乃表彈之孝文省表以忿惋詔幹與北海王祥俱隨太子詣行在所既至祥獨得朝見幹不蒙引接密令左右察其意色知無憂悔乃親數其過杖之一百免所居官以王還第李冲為尚書僕射孝文南伐散騎常侍李彪兼度支尚書與冲及任城王等叅理留臺事彪素性剛豪與冲等議意乖異遂形於聲色殊無降下之心自謂身為法官莫能糺劾己者遂多専恣冲積其前後罪過乃於尚書省禁止彪上表曰臣聞範國庇人光化昇治輿服典章理無蹔失故晉文功建九合猶見抑於請隧季氏藉政三世尚受譏於璵璠固知名器之重不可以妄假先王既憲章於古陛下又經綸於今用能車服有叙禮物無墜按臣彪昔於凡品特以才㧞等望清華司文東觀綢繆恩眷䋲直憲臺左加金璫右珥蟬冕東省宜感恩勵節忠以報德而竊名忝職身為違傲負勢髙亢公行僣逸坐於禁省私取官財輙駕乗黄無所憚懾肆志傲然愚聾視聽此而可忍誰不可懐臣輙集尚書已下令史已上并治書御史臣酈道元等於尚書都座以彪所犯罪狀告彪訊其虗實若或不知湏訊部下彪答臣言事見在目實如所劾皆彪所知何湏復召部下臣今請以見事免彪所居職付廷尉治獄冲又表曰臣與彪相識以来垂二十載彪始南使之時見其色厲辭辨才優學博臣之愚識謂是拔萃之一人及彪位官升達叅與言宴聞彪評章古今商略人物興言於侍筵之次啟論於衆英之中賞忠識正發言懇惻惟直是語辭無隠避雖復諸王之尊侍近之要至有是非多面抗折酷疾矯詐毒諐非違厲色正辭如鷹鸇之逐雀懍懍然實似公清之慘臣雖復下才輙亦尚其梗概欽其正直微識其褊急之性而不以為瑕及其初登憲臺始居司直首復騶唱之儀肇正直䋲之體當時識者僉以為難而彪秉志信行不避豪勢其所彈劾應弦而倒赫赫之威振於下國肅肅之稱著自京師天下改目貪暴歛手臣時見其所行信謂言行相符忠清内發然時有私於臣云其威暴者臣以直䋲之官人所忌疾風謗之際易生音謡往年以河陽事曽與彪在領軍府共太尉司空及領軍諸卿等集閱廷尉所問囚徒時有人訴枉者二公及臣少欲聽採語理未盡彪便振怒東坐攘袂揮赫口稱賊奴吒叱左右髙聲大呼云南臺中取我木手去搭奴肋折雖有此言終竟不取即言南臺所問惟恐枉活終無枉死但可依此時諸人以所枉至重有首寔者多又心難彪遂各嘿爾因縁此事臣遂心疑有濫審加情察知其威虐猶未體其採訪之由訊簡之狀商略而言錯急小罪肅禁為大㑹而言之猶謂益多損少故懐寝所疑不以申徹實失為臣知無不聞之義及去年大駕南行叅典留務是已非人專恣忌􅊣尊身忽物安已凌上身作之過深劾他人已不事人好人侫已聽其言同振古忠恕之賢校其行是天下侫暴之賊臣與任城卑躬克己若順弟之奉暴兄其所欲者事雖非禮無不屈從依事求實悉有成驗如臣列得實宜殛彪於有北以除奸矯之亂政如臣引無證宜投臣於四裔以息青蝇之白黒孝文在懸瓠覽表歎愕曰不意留京如此也有司處彪大辟孝文恕之除名而已王顯為御史中尉宣武委政於尚書令高肇宗室傾憚惟度攴尚書元匡與肇抗衡先自造棺置於㕔事意欲輿棺詣闕論肇罪惡而自殺肇聞而惡之後因與太常劉芳議争權量遂與肇聲色顯奏元曰自金行失御羣偽競興禮壊樂隳彛倫攸斁髙祖孝文皇帝以睿聖統天克復舊典乃命故中書監髙閭廣旌儒林推尋樂府以黍裁寸將均周漢舊章属雲搆中遷尚未云就髙祖睿思𤣥深叅考經記以一黍之大用成分體准之為尺宣布施行暨正始中太樂令孫公崇輙自立意以黍十二為寸别造尺度定律刋鍾皆向成訖表求觀試時勑太常卿臣劉芳以崇造既成請集朝英議其得否芳疑崇尺度與先朝不同察其作者於經史復異推造勘㨿非所宜行時尚書令臣肇清河王懌等以崇造乖謬與周禮不同遂奏臣芳依周禮更造成訖量較從其善者而芳以先朝尺度事合古典乃依前詔書以黍刋寸並呈朝廷用裁金石於時議者多云芳是准黃門侍郎臣孫恵蔚與崇扶同二途叅差頻經考議而尚書令臣肇以芳崇造物之後而恵蔚亦造一尺仍云以比崇尺自相乖背量省二三謂芳為得而尚書令匡表公劉孫二尺長短相傾稽考兩律所容殊異言取中黍較比二家云並叅差仰中無所自立一途請求議判當時議者或是於匡兩途舛駁未即時定肇又云權斛斗尺頒行已久今者所論豈踰先㫖宜仰依先朝故尺為定自爾以後而匡與肇厲言都座聲色相加髙下失其常倫争競無復尋序匡更表列據已十是云芳十非又云肇前被勑㫖令共營督規立鍾石之名希播製作之譽乃慿樞衡之尊籍舅氏之勢與奪任心臧否自己阿黨劉芳遏絶臣事望勢雷同者接以恩言依經案古者即被怒責雖未指鹿作馬移天徙日實使藴藉之士聳氣坐端懐道之夫結舌筵次又言芳昔與崇競常言自作今共臣論忽稱先朝豈不前謂可行輙欲自取後知錯謬便推先朝殊非大臣之體深失為下之義復考較勢臣之前量度偏頗之手臣必刖足内朝抱璞人外囂言肆意彰於朝野然匡職當岀納獻替所在斗尺權度正是所司若已有所見能練臧否宜應首唱義端早辨諸惑何故嘿心隨從不關一言見芳成事方為此語計芳才學與匡懸殊所見淺深應不相匹今乃始發恐此由心借智於人規成虗譽况匡表云所據銅權形如古誌眀是漢作非莽别造及案權銘云黄帝始袓德布於新若莽佐漢時事寧有銘偽新之號哉又尋莽傳云莽居攝即變漢制度考校二證非漢權眀矣芳之所造又短先朝之尺臣既比之權然相合更云芳尺與千金㙺不同臣覆量比因見其異二三浮濫難可㨿准又云共搆虛端妄比疑似託以先朝云非已製臣按此欺詐乃在於匡不在於芳何以言之芳先被勑專造鍾律管籥優劣是其所裁權斛尺度本非其事比前門下索芳尺度而芳牒報云依先朝所班新尺復應下黍更不増損為造鍾律調正分寸而已簡匡造時在牒後一嵗芳於爾日匡未共爭已有此牒豈為欺也計崇造寸積黍十二羣情共知而芳造寸唯止十黍亦俱見先朝詔書以成黍寸首尾厯然寧有輙欲自取之理肇任居端右百寮是望言行動静必副具瞻若恃權阿黨詐託先朝將指鹿作馬徙日移天即是魏之趙髙何以宰物肇若無此匡既誣毁宰相訕謗時政阻惑朝聽不敬至甚請以肇匡並禁尚書推窮其原付廷尉定罪詔曰可有司奏匡誣肇處匡死刑宣武恕死降為光祿大夫顯又奏前荆州刺史元志在州日抑買良人為婢㑹赫免又秦梁二州刺史羊杜掠州人為奴婢為顯所彈免甄琛為御史中丞宣武時張彜為侍中親政罷六輔彜與兼尚書邢巒聞處分非常岀京奔走為琛所彈云非兕非虎率彼曠野詔書切責之任城王澄孝眀時為尚書令奏髙陽王雍曰臣聞賞必以道用防小人之奸罰不濫及以戒良士之困刑者侀也每垂三宥秉律執請不得已而用之是故小吏之獄察之以情一人吁嗟或虧王道刑罰得失乃興廢之所由也竊聞司州牧髙陽王臣雍栲殺奉朝請韓元昭前門下録事姚敬賢雖因公事理實未盡何者太平之世草不橫伐行葦之感事驗隆周若昭元等死罪以定應刑於都市與衆棄之如其疑似不分情理未究不宜以三清九流之官杖下便死輕絶民命傷理敗法徃年州於大市鞭殺五人及簡狀全無寸尺今復酷害一至於此朝野云云咸懐驚愕若殺生在下虐專於臣人君之權安所復用此開古以来眀眀之世未聞斯比也武王曰吾不以一人之命而易天下盖重民命也請以見事付廷尉推究驗其為劫之狀察其栲殺之理使是非分眀幽魂獲雪詔從之元匡為御史中尉孝眀初侍中領軍于忠侍中崔光等同在門下皆加封邑及靈太后臨朝岀忠冀州刺史匡奏曰臣聞事主不以幽貞革心奉上不以趣捨虧節是以倚秦宫而慟哭復楚之功誠多陟盧龍而樹勤廣魏之勲不淺而申包避賞君子於是義之田疇拒命良史所以稱美竊以宫車宴駕天人位易正是忠臣孝子致節之秋前領軍將軍臣忠不能砥礪名行自求多福方因矯制擅相除假清官顯職嵗月隆崇臣守藩之時乃心家國書誚徃来憤氣成疚傷禮敗德臣忠即主臣謹案臣忠世以鴻勲盛德受遇累朝岀入承眀左右機近幸國大災肆其愚戅專擅朝命無人臣之心裴郭受寃於既徃宰輔黜辱於眀世又自矯㫖為儀同三司尚書令領崇訓衞尉原其此意便欲無上自處既事在恩後宜加顯戮請御史一人令史二人就州行决崔光與忠雖同受詔而謂光既儒望朝之禮宗攝心虛逺不關世務但忠以光聲望崇重故逼光為助光若不同又有危祸伏度二聖欽眀深垂昭恕而自去嵗正月十三日世宗宴駕以後八月一日皇后未親覧以前諸有不由階級而權臣用命或發門下詔書或由中書宣勑擅相拜受者已經恩宥正可免其叨竊之罪即非時望朝野所知冐階而進者並求追奪靈太后令曰直臣所糺實允朝憲但忠事經肆𤯝又蒙特原無宜追罪餘如奏陽固為治書侍御史劾奏廣平王懐汝南王恱南陽長公主又劾𢎞農太守裴粲免官李平為御史中尉時南兖州刺史崔暹盜官凡贓汚狼籍為平所糺免官酈道元為御史中尉司州牧汝南王恱嬖近左右丘念及選州官多由於念念匿於恱第時還其家道元收念付獄恱啟靈太后請全之勑赦之道元遂盡其命因以劾恱册府元龜卷五百十九
