body:
  text: 冊府元龜卷四百九十三宋王欽若等撰邦計部山澤昔禹别九州貢金三品成周之制名山大澤不以封者葢與民同財但賦稅之而已至漢武幹山海之貨隆鹽鐵之利制官府作為刑辟繇是言事者析毫犯法者連袂矣其後因時立法或暫罷而尋復出令生姦益繁文而密網㳂革之制於兹可見貪涼之弊莫之能救矧又茗荈科禁源於唐室詔條既舉𣙜課彌廣稽夫元始之論策書攸紀方此之時英俊咸集仁智勇辯各明其趣及桑大夫據當世合時變上權利之畧鉅儒宿學不能自解良史以博物通達目之然而權萬物之輕重以佐公家之用度以代有司之徵斂斯亦安邊境制四夷國之大業不可廢也若乃防禁彌峻蚳蝝盡取姦臣恣其聚斂細民困於浸漁此固在上之所慎焉管仲為齊相謂桓公曰海王之國海王者言以負海之利而王其業者王于況切謹正鹽筴正稅也音征十口之家十人食鹽百口之家百人食鹽每終月大男食鹽五升少半少半猶劣薄也大女食鹽三升少半吾子食鹽二升少半吾子猶言小男小女也此其大歴也歴數也鹽百升而釜鹽十二兩七銖一黍十分之一為升當米六合四勺也百升之鹽七十六斤十二兩十九銖二累為釜當米六斗四升者是已合鹽之重升加分彊釜五十也分彊半彊也令使鹽官稅其鹽之重每一升加半合為彊而取之則一釜之鹽得五十合而為之彊升加一彊釜一百也升加二彊釜二百也鍾二千十釜之鹽七百六十八斤為鍾當米六斛四斗是也十鍾二萬百鍾二十萬千鍾二百萬萬乘之國人數開口千萬也舉其大數而言之也開口謂大男小女之所食鹽也禺筴之商日二百萬禺讀為偶對也商計也對其大男小女食鹽之口數而立筴以計所稅之鹽一日計二百萬合為二百鍾也十日二千萬一月六千萬萬乘之國正九百萬也萬乘之國大男大女食鹽者千萬人而稅之鹽一日二百鍾十日二千鍾一月六千鍾今又施其稅數以千萬人如九百萬人之數則所稅之鹽一日百八十鍾十日千八百鍾一月五千四百鍾月人三十錢之籍為錢三千萬又變其五千四百鍾之鹽而籍其錢計一月每人籍錢三十凡千萬人為錢三萬矣以此籍之數比其常籍則當一國而有三千萬人矣今吾非籍之諸君吾子而有二國之籍者六千萬諸君謂老男老女也六十以上為老男五十以上為老女既不籍於老男老女又不籍於小男小女乃能以千萬人當三千萬者葢鹽官之利耳鹽官之利既然則鐵官之利可知也鹽官之利當一國而三萬人鐵官利當一國三萬人焉故能有二國之籍者六千萬人耳常籍人之數猶在此外使君施令曰吾將籍於諸君吾子則必囂號今夫給之鹽筴則百倍歸於上人無以避此者數也今鐵官之數曰一女必有一鍼一刀若其事立耕者必有一耒一耜一銚若其事立大鋤謂之銚行服連輦名所以載作器人挽者也軺輦者軺音羊昭切輦音居玉切大車駕馬者也必有一斤一鋸一錐一鑿若其事立不爾而成事者天下無有今鍼之重加一也三十鍼一人之籍鍼之重每十分加一分以為强而取之則一女之籍得三十鍼刀之重加六五六三十五刀一人之籍也刀之重每十分加六分以為强而取之五六為三十則一女之籍得五刀也耜鐵之重加七三耜鐵一人之籍也耜鐵之重每十分加七分以為强而取之則一農之籍得三耜其餘輕重皆准此而行其器彌重其加彌多然則舉臂勝音升事無不服籍者桓公曰然則國無山海不王乎管仲對曰因人之山海假之名有山海之國雖無海假名有海雖無山假名有山售鹽於吾國彼國有鹽而糶於吾國為售耳釜十五吾受而官出之以百受取也假令彼鹽平價釜當十錢者吾又加五錢取之所以來之也既得於鹽則令吾國鹽官出而糶之釜一百錢也我未與其本事也與用也本事本鹽也受人之事以重相推以重相推謂加五錢之類也此人用之數也彼人所有而皆為我用之又曰齊有渠展之鹽渠展齊地也沛水出流入海之處可煑鹽之所也古曰渠展之鹽請君伐蒩薪使國人煑水為鹽煑海水也正音征而積之十月始生至於正月成三萬鍾下令曰孟春既至農事且起大夫無得繕冡墓理宫室立臺榭築墻垣北海之衆無得聚庸庸功而煑鹽北海之衆謂北海煑鹽之人本意禁人煑鹽下令託以農事慮有妨奪先自大夫起欲人不知其機斯為權術若此則坐長十倍以令糴之梁趙宋衞濮陽彼盡饋食之國本國自無鹽逺饋而食之無鹽則腫守圉之國用鹽獨甚桓公乃使糴之得成金萬斤一云萬一千餘斤韓厥為晉大夫晉人謀去故絳諸大夫皆曰必居郇瑕氏之地郇瑕古國名河東解縣西北有郇縣沃饒而近鹽鹽鹽池猗氏縣鹽池是國利君樂不可失厥曰不可不如新田今平陽降邑縣是夫山澤林鹽國之寳也國饒則民驕佚財易致則民驕佚近寳公室乃貧不可謂樂近寳則民不務本公說從之漢髙祖封兄仲之子濞為吳王會孝惠髙帝時天下初定郡國諸侯各務自拊循其民吳有豫章郡銅山濞招致天下亡命者盜鑄錢東煑海水為鹽以故無賦國用饒足鑄錢煑海收其利以足國用故無賦於民也武帝時大農上鹽鐵丞孔僅東郭咸陽言東郭姓咸陽名奏上其言也山海天地之藏宜屬少府陛下弗私以屬大農佐賦願募民自給費因官器作鬻鹽官與牢盆牢價直也今世言僱手牢又曰牢禀食也古者名禀為牢盆鬻鹽盆也浮食奇民欲擅幹山海之貨幹謂主領也以致富羡役利細民羡饒也其沮事之議不可勝聽敢私鑄鐵器鬻鹽者􅎂左趾􅎂足鉗也没入其器物郡不出鐵者置小鐵官便屬在所縣使覲咸陽乘傳舉行天下鹽鐵舉皆也普天下皆行之也作官府主鬻鑄其出納之處也除故鹽鐵家富者為吏益多賈人矣昭帝始元六年二月詔有司問郡國舉賢良文學民所疾苦議罷鹽鐵𣙜酤武帝時以國用不足縣官悉自賣鹽鐵酤酒昭帝却未務本不與天下爭利故罷之也治粟都尉領大農桑𢎞羊難難諸議者之言也以為國家大業所以制四夷安邊足用之本不可廢也廼與丞相田千秋共奏罷𣙜酤宣帝地節四年九月詔曰今郡國頗被水災已賑貸鹽民之食而價咸貴衆庶重困其減天下鹽價元帝時嘗罷鹽鐵官三年而復之一云宣元成哀年五世無所變改王莽時羲和魯正言名山大澤鹽鐵錢布帛五均賖貸幹在縣官幹謂主領也於是置命士督五均六幹郡有數人皆用富貴雒陽薛子仲張長叔臨菑姓偉等姓姓名偉也乘傳求利交錯天下因與郡縣通姦多張空簿簿計簿也府藏不實百姓俞病莽知民苦之復下詔曰夫鹽食肴之將將大也一說為食肴之將帥酒百樂之長嘉會之好鐵田農之本名山大澤饒衍之藏五均賖貸百姓所取平卬以給澹鐵布銅冶通行有無備民用也此六者非編户齊民所能家作家謂家家自作也必仰於市雖貴數倍不得不買豪民富賈即要貧弱先聖知其然也故幹之每一幹為設科條防禁犯者辠至死姦吏滑民並侵衆庶各不安生後漢光武建武初彭寵為漁陽太守有舊鐵鹽官寵轉以貿榖積珍寳益富彊衞颯建武中為桂陽太守郡内來陽縣山鐵鑄石佗郡民庶嘗因依聚會私為冶鑄遂招來亡命多致姦盜颯乃上起鐵官罷斥私鑄歲所增入五百餘萬章帝時鄭衆為大司農帝議復鹽鐵官衆諫以為不可詔數切責至被奏劾衆執之不移帝不從時尚書張林曰鹽者食之急也縣官可自賣鹽武帝時施行之名曰均輸於是事下尚書通議尚書朱暉議曰王制天子不言有無諸侯不言多少食禄者不與百姓爭利均輸之法與賈販無異以布帛為租則吏多姦官自賣鹽與下爭利非明主所宜行帝本以林言為是得暉議因發怒遂用林言少時復止和帝以章和二年二月即位四月戊寅詔曰昔孝武皇帝致誅胡越故權收鹽鐵之利以奉師旅之費自中興以來匈奴未賓永平末年復修征伐先帝即位務休力役然猶深思逺慮安不忘危探觀舊典復收鹽鐵欲以防備不虞寧安邊境而吏多不良動失其便以違上意先帝恨之故遺戒郡國罷鹽鐵之禁縱民煑鑄入稅縣官如故事縣官為天子其申敕刺史二千石奉順聖㫖勉𢎞徳化布告天下使明知朕意永元十五年復置涿郡故鹽鐵官其郡縣有鹽官鐵官者隨事廣狹置令長及丞秩次皆如縣官魏太祖為漢大將軍建安初治書侍御史衞覬鎮關中時四方大有還民關中諸將多引為部曲覬書與荀彧曰關中膏腴之地頃遭荒亂人民流入荆州者十萬餘家聞本土亦寧皆企望思歸而歸者無以自業諸將各競招懐以為部曲郡縣貧弱不能與爭兵甲遂彊一旦變動必有後憂夫鹽國之大寳也自亂來放散今宜如舊制使者監賣以其直益市犂牛若有歸民以供給之勸耕積粟以豐殖關中逺民聞之必日夜競還又使司𨽻校尉留治關中以為之主則諸將日削官民日盛此彊本弱敵之利也彧以白太祖太祖從之始遣謁者僕射監鹽官領校尉治𢎞農流人果還關中豐實齊王嘉平四年關中饑司馬宣王表興京兆天水南安鹽池以益軍實蜀先主定益州置鹽府校尉鹽鐵之利利之甚多有裨國用晉武帝泰始末交州牧陶璜上言以合浦郡土地磽硧無有田農百姓唯以採珠為業商賈去來以珠貿易而吳時珠禁甚嚴慮百姓私散好珠禁絶去來人以饑困又所調猥多恨每不充今請上珠三分輸二次者輸一麤者蠲除自十月訖二月非採上珠之時聽商旅往來如舊並從之元帝建武元年初弛山澤之禁南燕慕容徳立冶於商山置鹽官於鳥嘗澤以廣軍國之用陳文帝天嘉二年十二月甲申太子中庶子虞荔御史中丞孔奐以國用不足奏立煑海鹽傳及𣙜酤之科詔並施行後魏獻文皇興四年十一月詔弛山澤之禁孝文太和六年八月罷山澤之禁十九年崔挺為光州刺史先是州内少鐵器用皆求之他境挺表復鐵官公私有賴二十年十二月開鹽池之禁與民共之宣武景明四年七月詔還收鹽池利以入公正始三年四月詔罷鹽池禁先是河東郡有鹽池嘗立官司以收稅既而罷之民有富强者専擅其用貧弱者不得資益延興末復立鹽司量其貴賤節其賦入於是公私兼利宣武政存寛簡復罷其禁延昌三年有司奏長安驪山有銀鑛二石得銀七兩鎮州上言曰劉山有銀鑛八石得銀七兩錫二百餘斤其色潔白有踰上品詔並置銀官常令採鑄又漢中舊有金户千餘家常於溪水沙金年終總輸後臨淮田彧為州刺史奏罷之孝明神龜元年閏七月開常州銀山之禁與民共之是時太師髙陽王雍太傅清河王懌等奏鹽池天藏資育群生仰惟先朝限者亦不茍與細民競兹嬴利但利起天地取用無法或豪貴封䕶或近者恡守卑賤逺來貿然絶望是以因置主司令其裁察强弱相兼務令得所且什一之稅自古及今所濟為廣自爾霑洽逺近齊平公私兩宜儲益不少乃至鼔吹主簿王俊興等辭稱請供百官食鹽二萬斛之外歲求輸馬千匹牛五百頭以此而推非可稍計其後通直散騎常侍兼中尉甄琛表曰王者道同天壤地齊造化濟民拯物為民父母故年榖不登為民祈祀乹災所惠天子順之山川祕利天子通之茍益生民損躬無恡如或所取唯為賑恤是以月令稱山林澤藪有能取蔬食禽獸者皆野虞教導之其迭相侵奪者罪之無赦此明導民而弗禁通有無以相濟也周禮雖有川澤之禁正所以防其殘盡必令取之有時斯所謂鄣䕶雖在公更所以為民守之爾且一家之長惠及子孫一運之君澤周天下皆所以厚其所養以為國家之富未有尊居父母而醯醢是恡富有萬品而一物是規今者天為黔首生鹽國與黔首鄣䕶其利猶是富専口斷不及四體也且天下夫婦歲貢粟帛四海之有備奉一人軍國之資取給百姓天子亦何患乎貧而茍禁一池也古之王者世育其民或水火以濟其用或巢宇以誨其居或教農以去其饑或訓衣以除其弊故周詩稱教之誨之飲之食之皆所以撫覆導養為之求利者也臣性昧𤣥理識無逺尚每觀上古愛民之迹時讀中華驟稅之書未嘗不歎彼逺大惜此近狹今偽弊相承仍崇闕匣之稅大魏恢博唯受榖帛之輸是使逺方聞者罔不歌徳昔亶甫以棄寳得民碩䑕以愛財失衆君王之義宜其髙矣魏之簡稅惠實逺矣語稱出納之吝有司之福施惠之難人君之禍夫以府藏之物以不施而為災况府外之利而可恡之於黔首且善藏者藏於民不善藏者藏於府藏於民者民懽而君富藏於府者國怨而民貧國怨則示化有虧民貧則君無所取願㢮此鹽禁使沛然逺及依周禮置水衡之法使之監導而已詔曰民利在斯深如所陳付八座議可否以聞司徒録尚書事彭城王勰兼尚書邢巒等奏琛之所列當乎有言首尾大備或無可貶但恐坐談則理髙行之則事闕是用遲迴未謂為可竊惟古之善為治者莫若昭其勝途悟其逺理及於救世升降稱時欲令豐無過溢險不致弊役養消息備在厥中節約取足成其性命如不爾者焉用君為任其生産隨其啄食便是芻狗萬物不相由矣自大道既往恩惠生焉下奉上施卑髙理睦然恩重既交思極之術廣嘗恐財不賙國澤不厚民故多方以達其情立法以行其志至乃取貨山川輕在民之貢立稅關市裨十一之儲收此與彼非利己也廻彼就此非為身也所謂集天地之産惠天地之民藉造化之富賑造化之貧徹商賈給戎戰賦四民贍軍國取乎用乎各有宜也久以禁此淵池不専大官之御斂此匹帛豈為後宫之資既潤不在己彼我理一猶積而散之將焉所恡且稅之本意事有可求固以布濟生民非為富賄藏貨不爾者昔之君子何為然哉是以後來經圖末之或改故先朝商較小大以情降鑒之流興復鹽禁然自行以來典司多怠出入之間事不如法隨令細民怨嗟商販輕議此乃用之者無方非興之者有謬至使朝廷明識興議其間今則罷之懼失前㫖一行一改法若弈碁㕘論理要宜依前式詔曰司鹽之稅乃自古通典然興利制民亦代或不同茍可以富民益化唯理所在甄琛之表實所謂助政毗治者也可從其前計使公私並宜川利無擁尚書嚴為禁豪強之制也孝昌三年雍州刺史蕭寳寅反以尚書右僕射長孫稚為行臺討之時薛鳳賢反於正平薛修義屯聚河東分據鹽河攻圍蒲坂東西連結以應寳寅稚乃據河東時有詔廢鹽池鹽稅稚上表曰鹽池天資賄貨密邇京圻惟須寳而䕶之均贍以理今四境多虞府庫整竭然兾定二州且亡且亂常調之絹不復可收仰惟府庫有出無入必須經綸出入相補畧論鹽稅一年之中准絹帛猶不應減三十萬疋也便是移冀定二州置於畿甸今若廢之事用同失前臣仰違嚴㫖而先討關賊徑解河東者非是閒長安而急蒲坂蒲坂一䧟没失鹽池三軍口命濟贍理絶天助大魏兹計不爽昔髙祖昇平之年無所乏少猶創置鹽官而加典制非為物競利恐由利而亂俗也况今王公素飱百官尸禄租稅六年之粟調折來歲之資此皆出人私財奪人旅力豈是願言事不獲已臣輙符司監將尉還率所部依常收稅更聽後勑前廢帝初即位詔稅鹽之官可廢之東魏孝靜天平初於滄瀛幽青四州之境傍海置竈以煑鹽滄州置竈千四百八十四瀛州置竈四百五十二幽州置竈八十青州置竈五百四十六又於邯鄲置竈四計終歲合收鹽二十萬九千七百八斛四斗軍國所資得以周贍後周太祖初為魏相創制六官掌鹽掌四鹽之政令一曰散鹽煑海以成之二曰監鹽引池以化之三曰形鹽掘地以出之四曰飴鹽於戎以取之凡監鹽形鹽每地為之禁百姓取之皆稅焉隋髙祖開皇元年三月戊子弛山澤之禁三年髙祖以周末之弊收利鹽池鹽井皆禁百姓採用於是通鹽池鹽井與百姓共之逺近大恱唐𤣥宗開元元年十一月河中尹姜師度以安邑鹽池漸涸師度開拓疏决水道置為鹽池公私大收其利是月左拾遺劉彤上表曰臣聞漢孝武為政廐馬三十萬後宫數萬人外討戎夷内興宫室殫費之甚實百當今而古費多而貨有餘今用少而財不足何也豈非古取山澤而今取貧民哉取山澤則公利厚而人歸於農取貧民則公利薄而人去其業故先王作法也山海有官虞衡有職輕重有術禁發有時一則専農二則饒國夫煮海為鹽採山鑄錢伐木為室農餘之輩寒而無衣饑而無食傭賃自資者窮苦之流也若能取山海厚利奪農餘之人調斂重徭免窮苦之子所謂損有餘而益不足帝王之道可不謂然乎臣願陛下詔鹽鐵木等官收其利貿遷於人則不及數年府有餘儲矣然後下寛大之令蠲窮獨之徭可以惠羣生可以柔荒服雖戎狄降伏堯湯水災無足虞也奉天適變唯陛下行之帝令宰臣議可否咸以鹽鐵之利甚益國用遂令將作大匠姜師度户部侍郎强循俱攝御史中丞與諸道按察使簡校海内鹽鐵之課比令使人勾當除此更無别求在外不細委知如聞稱有侵刻宜令本州刺史上佐一人簡校依令式收稅如有落帳欺没仍委按察紏覺奏聞其姜師度除蒲州鹽池以外自餘處更不須巡撿二十五年判倉部格蒲州鹽池令州司監當租分與有力之家營種之課收鹽每年上中下畦通融取一萬石仍差官人簡校若陂渠穿穴所須功力先以營種之家人丁充若破壊過多量力不齊者聽役隨近人夫又屯田格幽州鹽屯每屯配丁五十人一年收率滿二千八百石以上准營田第二等二千四百石以上准第三等二千石以上准第四等大同横野軍鹽屯配丁五十人每屯一年收率千五百石以上准第二等千二百石以上准第四等成州長道縣鹽井一所並節級有賞罰蜀道等十州鹽井總九十所每年課鹽都當錢八千七百九貫陵州井一所課都當錢二千六十一貫綿州井四所都當錢二百九十四貫資州井六十八所都當錢千八十三貫瀘州井五所都當錢千八百八十貫滎州井十二所都當錢四百貫梓州七百二十貫遂州四百十二貫閬州千七百貫普州二百七貫果州二十六貫若閏月計加一月課隨月徴納任以錢銀兼納其銀兩别常以二百價為估其課依都數納官欠即均徵竈户肅宗乾元元年司金郎中第五琦為河南等五道度支使創立鹽法就山海井竈收𣙜其鹽官置鹽院官吏出糶其舊業户并浮人願為業者免其雜徭𨽻鹽鐵使盜煮私市罪有差百姓除租庸外無得横賦人不益稅而上用以饒代宗大歴八年六月癸亥户部侍郎判度支韓滉上言安邑縣鹽池生乳鹽其狀鮮麗七月乙亥解縣安邑兩池生乳鹽戸部侍郎判度支韓滉上言曰臣頃進漫生鹽故老相傳已稱霛瑞今乳鹽新出特表非常伏請薦於清廟編之史冊從之仍頒賜宰相以下有差時鹽池為潦水所入滉詐奏為瑞初𣙜鹽起於第五琦及劉晏代其任法術精密官無遺利初歲入錢六十萬貫季歲十倍而人無厭苦大歴末通計一歲征賦所入總一千三百萬貫而鹽利過半徳宗以大歴十四年五月即位七月庚午詔曰朕聞王者不貴逺物所寳惟賢故堯設茅茨禹卑宫室光武捨去寳劍順帝封還大珠朕仰止前王思齊大素邕州所奏金坑誠為潤國語人於利非朕素懐方以不貪為寳惟徳其物豈尚此難得之貨生可欲之心耶其金坑任人開採官不得占建中三年五月詔𣙜鹽每一斗更加百文興元元年十月丁巳詔諸道𣙜鹽宜令中書門下及度支裁減估價兼條疏利害奏聞貞元二年四月陜虢觀察使李泌奏虢州盧氏縣山治近出瑟瑟請充貢獻禁人開採詔曰瑟瑟之寳中土所無今産於近甸實為靈貺朕不飾器玩不尚珍奇常思返樸之風用明恭儉之節其出瑟瑟處任百姓求採不宜禁止九年正月癸卯初稅茶先是諸道鹽鐵使張滂奏曰伏以去秋水災詔令減稅今之國用須有供備伏請出茶州縣及茶山外商人要路委所由定三等時估毎十稅一價錢充所放兩稅其明年已後所得稅外收貯若諸州遭水旱賦稅不辦以此代之詔曰可仍委張滂具處置條奏自是每歲得錢四十萬貫茶之有稅自此始也然稅茶無虚歲遭水旱未嘗以稅茶錢拯贍十四年李若初為諸道鹽鐵轉運使整理鹽法頗有次敘會遇疾卒十六年二月𣙜鹽使史牟奏澤潞鄭等州多食末鹽請切禁斷從之憲宗以永貞元年八月乙巳即位九月癸酉度支使奏江淮鹽每斗減錢一百二十𣙜二百五十其河中兩池鹽請斗減錢二十六𣙜三百十一月度支奏久雨車輦不通京師鹽貴請糶出貯庫鹽二萬石元和元年五月鹽鐵使奏請每州所貯鹽若遇價貴斗至二百二十減十文出糶以便貧人公私不缺其鹽倉每州各以留州錢造一十二間委知院官及州縣官一人同知所糶錢送院市輕貨送上都從之三年七月復以度支安邑解縣兩池留後為𣙜鹽使先是兩池鹽務𨽻度支其職視諸道巡院貞元十六年史牟以金部郎中主池務遂奏置使額二十一年鹽鐵度支合為一使以杜佑兼領佑遂奏院屬度支亦有使名則鹽務不合有使號遂與東渭橋給納使同奏罷之至是判度支裴均以其事益繁遂奏置使焉十月乙亥重申採銀之禁應輙採一兩已上者笞二十遞出本界州縣官吏節級科罰四年二月諸道鹽鐵轉運使李選奏江淮河南河内兖鄆嶺南諸監院元和三年糶鹽都收價錢七百二十七萬八千一百六十貫比量未改法已前舊鹽利總約時價四倍加擡計成虚錢一千七百八十一萬五千八百七貫貞元二年收糶鹽虚錢六百五十九萬六千貫永貞元年收糶鹽虚錢七百五十三萬一百貫元和元年收糶鹽虛錢一千一百二十八萬貫二年收糶鹽虚錢一千三百五萬七千三百貫三年收糶鹽虚錢一千七百八十一萬五千一百貫謹具累年糶鹽比類錢數具所收錢除准舊例充鹽本外伏請付度支收管從之六月勑五嶺已北所有銀坑依前任百姓開採禁錢不出嶺南五年四月甲午諸道鹽鐵使奏元和元年鹽利錢虛估一千八百五萬三千六百貫五月度支奏鄜坊邠寧涇源諸軍將士等請同當處百姓例食烏白兩池鹽從之六年四月鹽鐵轉運使刑部侍郎王播奏江淮河南峽内嶺南兖鄆等鹽院元和十五年糶鹽都收價錢六百九十八萬五千五百貫比量未改法已前舊鹽利總約時價四倍加擡計成虚錢一千七百四十六萬三千七百貫除充鹽本外請付度支收管從之閏十二月户部侍郎判度支盧坦奏河中兩池課鹽勑文只許於京圻鳳翔陜虢河中澤潞河南許汝等二十五州界内糴貨比來因循兼越入興元府及洋興鳳文成等六州臣移牒勘責得山南西道觀察使報其果閬兩川鹽本土户人及邑南諸郡市人又供當軍士馬尚有懸欠若兼數州自然闕絶又得興元諸府耆老狀申訴臣今商量河中鹽請放入六州界糴貨從之七年四月鹽鐵轉運使刑部侍郎王播奏元和六年糴鹽除峽内鹽井外計收鹽價錢六百八十五萬九千二百貫比量未改法已前舊鹽利總約時價四倍加擡計成虚錢一千七百一十二萬七千一百貫改法實估也八年四月鹽鐵使刑部侍郎王播奏應管江淮兖鄆等鹽院元和七年計收鹽錢六百七十八萬四千四百貫比未改法已前舊鹽利總約時價四倍加擡計成虚錢一千二百一十七萬九十貫其二百一十八萬六千三百貫充糶鹽本其一千四百九十九萬二千六百貫充𣙜利請以利付度支收管從之十年七月度支使皇甫鎛奏加峽内四監劍南東西兩川山東西道鹽估以利供軍從之十一年討吳元濟二月詔夀州以兵三千保其境内茶園十二年五月出内庫茶三十萬斤付度支進其直十三年三月鹽鐵使程异奏應諸道州府先請置茶鹽店收稅伏准今年正月一日赦文其諸道州府因用兵以來或慮有權置職名及擅加科配事非常制一切禁斷者伏以𣙜稅茶鹽本資財賦贍濟軍鎮葢是從權兵罷自合便停事久實為重斂其諸道先所置店及收諸色錢物等雖非擅加且異常制伏請准赦文勒停從之十四年三月鄆州青州兖州各置𣙜鹽院八月歸光州茶園於百姓從刺史房克讓之請也穆宗以元和十五年正月即位二月詔𣙜稅之法雖合同遵瘡痍之餘姑欲寛假其河北稅鹽宜委度支與𣙜鹽使審細商量具條疏聞奏長慶元年正月制度支鹽鐵使户部應納稅茶兼糶鹽中須納見錢者亦與時估匹段及斛㪷如情愿納見錢亦任穏便仍永為常式三月勑烏池在鹽州每年糶鹽收博𣙜米以一十五萬石為定額又詔河朔初平人希徳澤且務寛大使之獲安其河北𣙜鹽法宜權停仍令度支與鎮冀魏博等道節度審酌商量如能約計課利錢數分付𣙜鹽院亦任穏便自天保兵興以來河北鹽法覊縻而已暨憲宗用皇甫鎛奏置稅鹽使同江淮兩地𣙜利人苦擾禁戎鎮亦頻上訴故有是命是月鹽鐵使王播奏揚州白池兩處納𣙜塲請依舊為院又奏請諸道監院糶鹽付商人每斗加五十文通舊三百文價請諸處煎鹽塲停置小舖糶鹽每斗加三十文通舊一百九十文價又奏應管煎鹽户鹽商並諸鹽院停塲官吏所繇等前後勑制除兩稅不許差役追擾今請更有違越縣令奏聞貶黜刺史罰一季俸科再犯者奏聽進止並從之五月鹽鐵使王播奏應諸道𣙜茶約舊額一百文加稅五十文詔從之拾遺李珏等上疏曰伏以𣙜率救弊起自干戈天下無虞所宜蠲省况稅茶之事尤出近代貞元中不得不爾今四海鏡靜八方砥平厚斂於人殊傷國體其不可一也而又茶為食物無異米鹽人之所資逺近同俗既蠲渴乏難舍斯須至於田閭嗜好尤切今收稅既重時估必增流弊於人先及貧弱其不可二也且山澤之饒出無定數量斤論稅所貴集多若價髙則市者稀價賤則市者廣歲終上計其利幾何未見阜財徒聞斂怨其不可三也臣不敢逺徴故事直以目前所見陳之伏惟陛下暫留聰明稍垂念慮特追成命更賜商量則嗷嗷萬姓皆荷福利臣又竊見陛下愛人育物動感神明即位之初已懲聚斂外官抽貫旋有詔停洋洋徳音千古不朽今者𣙜茶加稅頗失人情臣忝職諫司豈敢緘黙塵黷旒扆戰越伏深疏奏不報十二月鹽鐵使奏請應江淮糶鹽加價有差以助軍用至軍罷日停從之二年三月張平叔為户部侍郎判度支上言度支所管𣙜鹽舊法為弊年深臣今請官中自糶鹽法可以富國強兵勸農積貨疏其利害十八條詔下其奏令公卿議中書舍人韋處厚抗論不可以平叔條制不周經慮未盡以為利者反害以為簡者至煩乃即其條目隨以設難平叔一條云應簡得公私鹽當日具都數申度支便任府縣差人勾當出糶多少逐月申報糶價之内所得見錢去上都一千里者任市當土布絹處厚駁曰竊以禹貢甸服五百里近者納草逺者納米是量逺近而制輕重也今言千里外市絹則是千里内須送見錢興元洋州並是八百里内駱谷道路險阻非常若送見錢實為不可又一條云州縣所要糶鹽人委所在長吏於當州當縣倉督録事佐吏以下本所繇中揀選不得差配百姓如有鄉村去州縣路逺處即州縣揀定所繇將鹽就鄉村糶易處厚駁曰臣曾任刺史所繇入鄉村是為政之大弊一吏到門百家納貨今陛下方以清靜簡易休息蒼生宜去其冗負除其蟊賊今山劍州縣境土至濶其令若行煩擾至甚又一條云臣今欲獻鹽法歸於簡易但委州縣則無不濟伏縁所務至重須以廟堂宰臣充關内河東山劍等道鹽鐵使處厚駁曰臣竊以度支使四方禀奉不殊宰相權柄已重不假台司台司者三公論道之地雜以鹺務實非所宜三十年來竇叅程异皇甫鎛並以錢榖居台鉉非惟國體不可抑亦名利難兼所以叅輩不受國誅必有天禍又一條云據每道每州糶鹽不少今所在戸口都不申明實數臣請令長吏有不親公事信任所繇浮詞云當界無入糶鹽交恐不濟臣即請差清彊巡官往所訴州簡責實户口數團保處厚駁曰臣曾為外州刺史備諳此事自兵興以來垂二十載百姓粗能支濟免至流離者實賴所存浮户相倚兩稅得充縱遇水旱蟲霜亦得相全相補若捜索悉盡立至流亡宇文融當開元全盛之時捜丁出户猶以殘人斂怨瘁國害身此策若行則甚於彼臣前月二十四日思政殿面奉徳音深䘏疲人且不配户聖慮周悉繇見事情臣等退而抃躍以為昇平坐致若據此節即與配户無殊平叔所陳未副聖徳又一條云諸州府縣簡得鹽便於當處官倉收貯其京城兩縣簡責得鹽於度支兩常平院貯當日各據數勒留依所定估出糶從敕下後諸巡院便計料般鹽分付府縣供糶常令所貯有剰不得令闕如有違闕知院官聞奏貶逺惡處官典所繇節級重科决停解如府縣不存公心課利減耗及所送官鹽價匹段濫弱并送納不時妄有申訴其京兆亦令司録及觀察使停見任改散慢官其専判鹽案及刺史請貶與上佐本州専判案官録事㕘軍縣令亦請逺貶處厚駁曰臣竊以古人云人愛其狐裘反而負芻皮既不存毛將安傅皮喻百姓毛喻國家百姓不存國家不立今兩稅編戸是國根本擇忠信之長命慈惠之師推赤子之仁布愷悌之化猶懼不及而有傷痍今為鹽鐵不登便須貶黜雖龔黄召杜之政卓魯蒲密之能無所施於聖代矣其末條云以設法之初沮議者衆聖斷先定則成績可期令出之後輦轂之下尤要隄防恐爾兩軍市人鹽商大賈或行財貨邀截喧訴臨時必有此色姦人伏乞聖慈委兩軍中尉兼京令尹切加把捉如有此色捉獲頭首所在决殺連狀聚衆人各加脊杖二十處厚駁曰臣竊以古人云利不百不變法工不十不易器改更之事自古所難故云謀不欲多决之欲獨臣於平叔無親故無讎嫌所陳者非挾情所議者歸利害唯聖上獨斷推於至公然彊人之所不能事必不立禁人之所必犯法必不行臣嘗為開州刺史當時被鹽監吏人横攪官政亦欲鹽歸州縣總領其權嘗試硏求事有不可葢以設法施行須順風俗或東州便則西州害或南州易則北州難且據山南一道明之興元巡管不用見錢山谷貧人隨土交易布帛既少食物隨時市鹽者或一斤麻或一兩絲或蠟或漆或魚或雞璅細叢雜者皆因所便今逼之使出布帛則俗且不堪其弊官中貨之以易絹勞而無功伏惟聖明裁擇時平叔傾巧有恩自謂言無不允及處厚駁奏帝稱善令示平叔詞屈其法遂罷五月詔曰兵革初寧方資𣙜筦閭閻重困可議蠲除如聞淄青鄆三道往年糶鹽價錢近收七十萬貫供給資費優贍有餘自鹽鐵使管事已來軍府頓絶其利遂使經行陣者有停糧之怨服壠畝者興加稅之嗟犯鹽禁者困鞭撻之刑理生業者乏蠶將之具雖縣官受利而郡府益空俾人獲安寧我節用其鹽鐵先於淄青兖鄆等道管内置小舖糶鹽巡院納𣙜起今年五月一日已後一切並停仍各委本道納較比年節度使自收管充軍府逐急用度及均減管内貧下百姓兩稅錢數至年終各具糶鹽數所得錢并均減兩稅聞奏是時王承元為平盧軍節度均輸鹽法未嘗行於兩河承元悉歸之有司冊府元龜卷四百九十三
