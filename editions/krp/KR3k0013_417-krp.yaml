body:
  text: 冊府元龜卷四百十七宋王欽若等撰将帥部强明徳義引咎不顧親受命忘家强明易曰自强不息書曰明作哲蓋强者臨機而有斷明者遭事而不惑况夫折衝邊圉濯清冦戎軍政貴平事機尚速故有負英果之略懷讁發之材周知敵情詳辨疑謬俾姦偽之黨畏其聰明貔虎之師伏其雄毅克貞師律用集茂勲者焉漢項梁舉兵吳中部署豪傑有一人不得官自言梁曰某時喪使公主某事不能辦以故不任公衆乃皆服吳孫韶字公禮為廣陵太守遷鎮北将軍在邊數十年自大帝西征還都武昌韶不進見者十餘年大帝還建業乃得朝覲大帝問青徐諸屯要害逺近人馬衆寡魏将帥姓名盡具識之所問咸對身長八尺儀貌都雅大帝歡悦曰吾久不見公禮不圖進益乃爾加領幽州牧假節顧譚代諸葛恪為左節度每省簿書未嘗下籌徒屈指心計盡發疑謬下吏以此服之晉陶侃為荆州刺史都督七州軍事侃在軍四十一載雄毅有權明悟善决斷自南陵迄於白帝數千里中路不拾遺後魏賀狄干為北部大人登國初與長孫崇為對明干聴察為人愛敬孟表為南兖州刺史領馬頭太守鎮渦陽齊遣其豫州刺史裴叔業攻圍城中食盡表戮力固守初有一南人自云姓邊字叔珍攜妻息從夀春投表云慕化歸國未及送闕便值叔業圍城表後察叔珍言色頗疑有異即加推覈乃云是叔業姑兒為叔業所遣規為内應所攜妻子並亦假妄表出叔珍於北門外斬之於是人情乃安髙祖嘉其誠績封汶陽縣開國伯邑五百户遷征虜将軍濟州刺史唐王忠嗣為河東節度採訪使忠嗣少以勇敢自負及居節制訓練士馬每軍出給士卒軍器必題其姓名於上遺失驗其名以罪之人皆自勸李晟為隴右副元帥臨下明察每理軍必曰某有某勞某能某事雖厮養小善必記主名王鍔為淮南節度使明習薄領善小數以持下吏或有奸惡鍔必究之嘗聴理有遺匿名書於前者左右取以授鍔鍔内之鞾中先有他書以雜之及吏退鍔探取他書焚之人信其所以匿名者焚也既歸省所告者異日乃以他事連其所告自因按驗之以譎衆下吏以為神明王沛為海沂密節度使邦實新造人多獷驚沛明法制董師旅軍鎮大理栁公綽為邠寧節度使先時神䇿諸鎮列屯要地未嘗肯受節制每窺間為患公綽疏上其弊即詔神䇿諸鎮在其部者邊上有警盡得聴節度使指揮梁謝彦章臨敵御衆則肅然有上将之威每敦陣整旅左旋右抽雖風馳雨驟亦無以喻其迅捷也故當時騎士咸樂為用及其遇害衆皆惜之晉劉處讓授章徳軍節度使處讓勤於公務孜孜求理撫馭吏民不致苛察人甚便之徳義夫徳以施惠義以服人君子之道也然而處将兵之任當授鉞之寄甲胄斯擐山立而玉色桴鼓既急有進而無退必出奇而尚詐亦示威而鬭力乃有器識宏逺性質醇茂動不踰禮言必有信體寛仁之度崇㢘讓之風開懷而不疑臨事而必斷用能貞師經武翼主庇民樹厥風聲垂之不朽豈孟子所謂仁義無敵於天下者其是之謂乎楚大夫司馬子反魯宣公十五年夏五月宋人及楚人平外平不書此何以書據上楚鄭平不書大其平乎已也已二大夫何大乎其平乎已據大夫無遂事莊王圍宋軍有七日之糧爾盡此不勝将去而歸爾於是使司馬子反乗堙而闚宋城宋華元亦乗堙而出見之堙距堙上下城具司馬子反曰子之國何如華元曰憊矣曰何如問憊意也曰易子而食之析骸而炊之析破人骸骨也司馬子反曰嘻甚矣憊雖然雖如所言吾聞之也圍者古有見圍者柑馬而秣之秣者以粟置馬口中柑者以木銜其口不使令食粟示有積蓄使肥者應客示飽食也是何子之情也猶曰何太露情華元曰吾聞之君子見人之厄則矜之矜閔也小人見人之厄則幸之幸僥也吾見子之君子也是以吿情於子也司馬子反曰諾諾者受語辭勉之矣勉猶努力使努力堅守之吾軍亦有七日之糧爾盡此不勝将去而歸爾揖而去之反於莊王反報於莊王莊王曰何如司馬子反曰憊矣曰何如曰易子而食之析骸而炊之莊王曰嘻甚矣憊雖然雖已憊吾今取此然後而歸爾意未足也司馬子反曰不可臣已告之矣軍有七日之糧爾莊王怒曰吾使子往視之子曷為告之司馬子反曰以區區之宋區區小貌猶有不欺人之臣可以楚而無乎是以告之也莊王曰諾先以諾受絶子反語舍而止更命築舍而止示無去計雖然雖宋已知我糧短吾猶取此然後歸爾欲徵糧待勝也司馬子反曰然則君請處於此臣請歸爾莊王曰子去我而歸吾孰與處於此吾亦從子而歸爾引師而去之故君子大其平乎已也晉大夫郤獻子将中軍魯成公二年春晉伐齊及衛地韓獻子将斬人郤獻子馳将救之既至則斬之矣郤子使速以徇告其僕曰吾以分謗也六月獻子追及齊君逢丑父使公下如華泉取飲鄭周父御左車宛茷為右載齊侯以免左軍副車韓厥獻丑父郤獻子将戮之呼曰自今無有代其君任患者有一於此將為戮乎郤子曰人不難以死免其君我戮之不祥赦之以勸事君者乃免之荀吳帥師伐鮮虞圍鼓荀吳穆子也鼓白狄之别鉅鹿下曲陽縣有鼓聚鼔人或請以城叛穆子弗許左右曰師徒不勤而可以獲城何故不為穆子曰吾聞諸叔向曰好惡不愆民知所適事無不濟愆過也適歸也或以吾城叛吾所甚惡也人以城來吾獨何好焉賞所甚惡若所好何無以復加所好若其弗賞是失信也何以庇民力能則進否則退量力而行吾不可以欲城而邇姦所喪滋多使鼔人殺叛人而繕守備圍鼓三月鼓人或請降使其民見曰猶有食色姑修而城軍吏曰獲城而弗取勤民而頓兵何以事君穆子曰吾以事君也獲一邑而教民怠将焉用邑邑以賈怠不如完舊完猶保守賈怠無卒卒盡也棄舊不祥鼓人能事其君我亦能事吾君率義不爽爽差也好惡不愆城可獲而民知義所知義所在也荀吳必其能獲故因以示義有死命而無二心不亦可乎鼓人告食竭力盡而後取之克鼓而反不戮一人以鼔子鳶鞮歸鳶鞮鼓君名也趙襄子率師伐中牟圍未合而城自壞者十堵襄子擊金而退士軍吏曰君誅中牟之罪而城自壞者是天助也君曷為去之襄子曰吾聞之於叔向曰君子乗人於利不迫人於險使之城成而後攻中牟聞其義乃請降後漢馮異為偏将軍每勅力士非交戰受敵常行諸營之後相逢引車避由是無争道變鬭馬騰為前将軍北備胡寇東備白騎待士進賢矜救民命三輔甚安愛之蜀諸葛亮為丞相出師祁山隴西南安二郡應時降圍天水拔冀城虜姜維驅略士女數千人還蜀人皆賀亮顔色愀然有慽容謝曰普天之下莫非漢民國家威力未舉使百姓困於豺狼之吻一夫有死皆亮之罪以此相賀能不為愧趙雲為偏将軍領桂陽太守伐趙範範寡嫂曰樊氏有國色範欲以配雲雲辭曰相與同姓卿兄猶我兄固辭不許時有人勸雲納之雲曰範迫降耳心未可測天下女不少遂不取範果逃走雲無纎介吳陸抗為立節中郎将與諸葛恪換屯柴桑抗臨去皆更繕完城圍葺其牆屋居廬桑果不得妄敗恪入屯儼然若新而恪柴桑故屯頗有毁壞深以為慚抗後為大将軍領益州牧都督信陜西陵夷道樂鄉公安諸軍事與晉羊祜推僑札之好抗嘗遺祜酒祜飲之不疑抗有疾祜饋之藥抗亦推心服之於時以為華元子反復見於今一曰羊祜既歸増修徳信以懷吳人抗每告其邊戍曰彼専為徳我専為暴是不戰而自服也各保分界無求細益而已於是吳晉之間餘糧棲畝而不犯牛馬逸而入境可宣告而取也沔上獵吳獲晉人先傷者皆送而相還抗嘗疾求藥于祜祜以成合與之曰此上藥也近始自作未及服以君疾急故相致抗得而服之諸将或諫抗不答孫皓聞二境交和以詰於抗抗曰夫一邑一鄉不可以無信義之人而况大國乎臣不如是正足以彰其徳耳於祜無傷也或以祜抗為失臣節兩譏之程普為裨将軍先主諸将普最年長時人皆呼程公性好施與喜士大夫孫皎為征虜将軍督夏口兵候常獲魏邊将吏美女以進皎皎更其衣服送還之下令曰今欲所誅者曹氏其百姓何罪自今以往不得擊其老弱吕蒙為偏将軍與成當宋定徐顧屯次比近三将死子弟幼弱大帝悉以兵并䝉固辭陳啓顧等皆勤勞國事子弟雖小不可廢也書三上帝乃聴蒙於是又為擇師使輔導之其操心率直如此吾粲字孔休為叅軍校尉黄武元年與吕範賀齊等俱以舟師拒魏将曹休於洞口值天大風諸船綆紲斷絶漂沒渚岸為魏軍所獲或覆沒沈溺其大船尚存者水中生人皆攀縁號呼他吏士恐船傾沒皆以戈矛撞擊不受粲與黄淵獨令船人以承取之左右以為船重必敗粲曰船敗當俱死耳人窮奈何棄之粲淵所活者百餘人凌統為偏将軍時有薦同郡盛暹於大帝者以為梗槩大節有過於統帝曰且令如統足矣後召暹夜至時統已卧聞之攝衣出門執其手以入其愛善不害如此雖在軍旅親賢接士輕財重義有國士之風晉羊祜為衛将軍時武帝将有滅吳之志以祜為都督荆州諸軍事假節散騎常侍衛将軍如故祜率營兵出鎮南夏開設庠序綏懷逺近甚得江漢之心與吳人開布大信降者欲去皆聴之祜以孟獻營虎牢而鄭人懼晏弱城東陽而萊子服乃進據險要開建五城收膏腴之地奪吳人資石城以西盡為晉有吳自是前後降者不絶乃増修徳信以懷柔初附慨然有吞吳之心每與吳人交兵尅日方戰不為掩襲之計将帥有欲進譎詐之䇿者輒飲以醇酒使不得言人有掠吳二兒為俘者祜遣送還其家後吳将夏祥邵顗等來降二兒之父亦率其屬與俱吳将陳尚藩景來寇祜追斬之美其死節而厚加殯斂景尚子弟迎喪祜以禮遣還吳将鄧香掠夏口祜募生縳香既至宥之香感其恩率部曲而降祜出軍行吳境刈穀為糧皆計所侵送絹償之每會衆江沔遊獵常止晉地若禽獸先為吳人所傷而為晉兵所得者皆封還之於是吳人翕然悦服稱為羊公不之名也祜與陸抗相對使命交通抗稱祜之徳量雖樂毅諸葛孔明不能過也杜預為鎮南大将軍身不跨馬射不穿札而每任大事輒居将率之列結交接物恭而有禮問無所隠誨人不倦敏於事而慎於言劉𢎞為鎮南大将軍荆州刺史時天下大亂𢎞専督江漢河間王顒使張光為順陽太守衛展説𢎞曰彭城王前東奔有不善之言張光太宰腹心宜斬光以明向背𢎞曰宰輔得失豈張光之罪危人自安君子弗為也展深恨之陶侃為都督荆江雍梁交廣益寧八州諸軍事荆州刺史季年懷止足之分不與朝權未亡一年欲遜位歸國佐吏等苦留之及疾篤将歸長沙軍資器仗牛馬舟船皆有定簿封印倉庫自加管鑰以付王愆期然後登舟朝野以為美談将出府門顧謂愆期曰老子婆娑正坐諸君輩宋蒯恩行叅軍龍驤将軍時髙祖北伐留恩侍衛世子命朝士與之交恩益自謙損與人語嘗呼位官而自稱為鄙人撫待士卒甚有紀綱衆咸親附之劉懷慎為中領軍征虜将軍雖名位轉優而恭恪愈至每所之造位任不踰已者皆束帶門外下車其謹退類如此黄回為龍驤将軍後廢帝元徽初桂陽王休範為逆回以屯騎校尉領軍𨽻蕭道成於新亭創詐降之計回見休範可乗謂張敬兒曰卿可取之我誓不殺諸王敬兒即日斬休範事平轉回驍騎将軍加輔師将軍進爵為侯梁鄧元起為左将軍益州刺史時劉季連拒守元起尅之城内財寳無所私勤䘏民事口不論財色性本能飲酒至一斛不亂及是絶之蜀士翕然稱之韋叡為輔國将軍所至頓舍修立館宇籓籬牆壁皆應準繩陳魯悉達為安左将軍江州刺史悉達雖仗氣任俠不以富貴驕人後魏慕容白曜為征南大将軍攻宋無鹽等戍一旬之内頻拔四城威震齊土斗城不降白曜忿之縱兵凌城殺數百人宋将房崇吉夜遁白曜撫慰其民無所殺戮百姓懷之獲崇吉母妻待之以禮白曜雖在軍旅而接待人物寛和有禮所獲崇言母妻申纂婦女皆别營安置不令士卒喧雜張讜為平逺将軍東徐州刺史讜性通開篤於撫恤青齊之士雖疏族末姻咸相敬視李敷李訢等寵要勢家亦推懷陳欵無所顧避畢衆敬等皆敬重之髙允之徒亦相器待陳忻為驃騎大将軍與韓雄里門姻婭少相親昵俱總兵境上三十餘載每有禦捍二人相赴常若影響故得數對勍敵而常保功名雖並有武力至於攙强射中忻不如雄散財施惠得士衆心則雄不如忻王羆為驃騎大将軍鎮華州時闗中大饑徵税民間穀食以供軍費或隠匿者令遞相告多被篣捶以是人有逃散唯羆信著於人莫有隠者得粟不少諸州而無怨讟唐李靖為行軍總管既尅江陵降蕭銑時諸軍咸云銑之将帥與官軍拒戰罪狀既重請籍沒其家以賞将士靖曰王者之師義存弔伐百姓既受驅迫拒戰豈有所願且犬吠非其主無容同叛逆之科此蒯通所以免大戮於漢祖也今新定荆郢宜𢎞寛大以慰逺近之心降而籍之恐非救焚拯溺之義但恐自此以南城鎮各堅守不下非計之善於是遂止江漢之城聞之莫不爭下契苾何力太宗征遼時為前軍總管次白崖城為賊所圍被矟中腰瘡重疾甚太宗自為傅藥及拔賊城勅求傷之者髙突勃付何力令自殺之何力奏言犬馬猶為其主况於人乎彼為其主致命冒白刃而刺臣者是義勇也本不相識豈是仇讐遂捨之劉昌為涇原節度使初至平凉劫盟之所收亡歿将士骸骨令聚而埋瘞之因感夢於昌有媿謝之意梁劉鄩唐末刺淄州署行軍司馬及韓全誨矯詔徵天下兵鄩以偏師陷兖州一夕而定軍城晏然市民無擾太祖命大将葛從周攻之時從周為節度使領兵在外州城為鄩所據家屬悉在城中鄩善撫其家移就外第供給有禮升堂拜從周之母及從周攻城鄩以板輿請母登城母告從周曰劉将軍待我甚至不異于兒新婦已下並不失所劉将軍與爾各為其主爾其察之從周歔欷而退晉張希崇自小校正授節旄官至開府儀同三司檢校太尉素樸厚尤嗜書莅事餘手不釋卷不好酒樂不畜姬僕祁寒盛暑必儼其衣冠厮養之輩未嘗聞褻慢之言引咎虎兕出匣守者之過師律否臧咎将誰執其有處萬夫之長當閫外之寄失先人之志貽脱輻之凶或督攝過嚴頗致攜畔或號令不振動為糾紛或固守而靡終或屢動而無狀謀慮非逺悔吝斯至而能露章自劾素服請吏乞還旄節願上印綬不尤人而求免惟責已以負媿復有庭辯主帥之直獨當偏伍之罪不以讒口而怨上不以私憾而害公靡蠆芥於厥心但感歎而内訟至或夙負英略克集元勲猶恨夫昧過之未能致國之有難非忠義慷慨同體盡節之士疇能議論至此哉晉大夫荀林父魯宣公十二年夏六月乙夘林父帥師及楚子戰于邲晉師敗績師歸桓子請死桓子林父諡晉侯使復其位秦蒙恬始皇時為内史始皇使恬将三十萬衆北伐戎狄收河南築長城因地形用制險塞起臨洮屬隴西至遼東延袤萬餘里及二世立遣使者令恬曰君之過多矣而卿弟毅有大罪法及内史恬曰自吾先人及至子孫積功信於秦三世矣今臣将兵三十餘萬身雖囚繫其勢足以倍叛能自知必死而守義者不敢辱先人之教以不忘先王也凡臣之言非以求免于咎也将以諫而死願陛下為萬民思從道也使者曰臣受詔行法于将軍不敢以将軍言聞上也恬喟然太息曰我何罪於天無過而死乎良久徐曰恬罪固當死矣起臨洮屬之遼東城壍萬餘里此其中不能無絶地脈哉此乃恬之罪也後漢鄧禹光武時為大司徒與車騎将軍鄧宏擊赤眉遂為所敗衆皆死散禹獨與二十四騎還詣宜陽謝上大司徒梁侯印綬魏朱靈字文博太祖既平冀州遣靈将新兵五千人騎千匹守許南太祖戒之曰冀州新兵數承寛緩暫見齊整意尚怏怏卿名先有威嚴善以道寛之不然即有變靈至陽翟中郎将程昂等果反即斬昂以狀聞太祖手書曰兵中所以為危險者外對敵國内有奸謀不測之變昔鄧禹中分光武軍西行而有宗歆馮愔之難後将二十四騎還雒陽禹豈以是減損哉來書懇惻多引咎過未必如所云也鍾繇為侍中守司隸校尉持節督關中諸軍時詔徴河東太守王邑邑以天下未定心不願徵而吏民亦戀邑郡掾衛固及中郎将范先等各詣繇求乞邑而詔已下拜杜畿為太守畿已入界繇不聴先等促邑交符邑佩印綬徑從河北詣許自歸繇時治在雒陽自以威禁失督司之法乃上書自劾曰臣前上言故鎮北将軍領河東太守安陽亭侯王邑巧辟治官犯突科條事當推劾檢實奸詐被詔書當如所糾以其歸罪故加寛赦又臣上言吏民大小各懐顧望謂邑當還拒太守杜畿今皆反悔共迎畿之官謹按文書臣以空虚被蒙拔擢入充近侍兼典機衡忝膺重任總統偏方既無徳以惠民物又無威刑以檢不恪至使邑違犯詔書郡掾衛固誑迫吏民訴訟之言交驛道路漸失其禮不䖍王命今雖反悔醜聲流聞咎皆由繇威刑不攝今臣疾病前後歴年氣力日微尸素重禄曠廢職任罪明法正謹按侍中守司隸校尉東武亭侯鍾繇幸得蒙恩以斗筲之才仍見拔擢顯從近密銜命督使明知詔書深疾長吏政教寛弱檢下無刑久病淹滯衆職荒頓法令失張邑雖違科當必繩正法既舉文書操彈失理至乃使邑逺詣闕庭隳忝使命挫傷爪牙而固誑迫吏民拒畿連月今雖反悔犯順失正海内兇赫罪一由繇威刑闇弱又繇久病不任所職非繇大臣所當宜為繇輕慢憲度不畏詔令不與國同心為臣不忠無所畏忌大為不敬又不承用詔書奉詔不謹又聰明蔽塞為下所欺弱不勝任數罪謹以劾臣請法車徵詣廷尉治繇罪大鴻臚削爵土臣久嬰篤疾涉夏盛劇命縣呼吸不任部官輒以文書付功曹從事焉適議免冠徒跣伏須罪誅詔不聴蜀諸葛亮後主時為丞相率軍出祁山使叅軍馬謖督諸軍在前與魏将張郃戰於街亭謖違亮節度大為郃所破亮戮謖以謝衆上疏曰臣以弱才叨竊非據親秉旄鉞以屬三軍不能訓章明法臨事而懼至有街亭違命之闕箕谷不戒之失咎皆在臣授任無方臣明不知人恤事多闇春秋責帥臣職是當請自貶三等以督厥咎於是以亮為右将軍行丞相事所總統如前是時或勸亮更發兵者亮曰大軍在祁山箕谷皆多於賊而不能破賊為賊所破者則此病不在兵少也在一人耳今欲減兵省将明罰思過校變通之道於将來若不能然者雖兵多何益自今已後請有忠慮於國但勤攻吾之闕則事可定賊可死而功可蹻足而待矣於是考微勞甄烈壯引咎責躬布所失於天下厲兵講武以為後圖戎士練簡民忘其敗矣晉虞潭成帝時為吳興太守蘇峻叛加潭督三吳晉陵宣城義興五部軍事會王師敗績大駕逼遷潭勢弱不能獨振乃固守以俟四方之舉會陶侃等下潭與郄鑒王舒協同義舉侃等假潭節監揚州浙江西軍事潭率衆與諸軍并勢東西掎角遣督䕶沈伊距管商于吳縣為商所敗潭自貶還節尋而峻平王章為将軍當蘇峻之役庾亮輕進失利司馬殷融詣陶侃謝曰将軍為此非融等所裁章至曰章自為之将軍不知也侃曰昔殷融為君子王章為小人今王章為君子殷融為小人庾亮為中書令蘇峻叛詔假亮節都督征討諸軍事戰敗乗小船西奔陶侃至尋陽既有憾于亮議者咸謂侃欲誅執政以謝天下亮甚懼及見侃引咎自責風止可觀侃不覺釋然峻平成帝幸温嶠舟亮得進稽顙鯁噎詔羣臣與亮俱外御坐亮明日又泥首謝罪乞骸骨欲闔門投竄山海帝遣尚書侍中手詔慰諭曰此社稷之難非舅之責也後為都督江荆豫益梁雍六州諸軍事亮以石勒新死有平中原之志乃上疏請行而便欲遷鎮會寇陷邾城毛寳赴水而死亮陳謝自貶三等行安西将軍有詔復位褚裒康帝時為征討大都督遣徐龕伐沛龕為石遵将李菟所敗死傷大半裒以春秋責帥授任失所威略虧損上疏自貶以征北将軍行事求留鎮廣陵詔以偏師之責不應引咎逋寇未殄方鎮任重不宜貶降使還鎮京口解征討都督桓冲孝武時為車騎将軍鎮江陵時苻堅遣其将苻融寇樊鄧石越寇魯陽姚萇寇南鄉韋鍾寇魏興所在陷沒冲遣江夏相劉奭南中郎将朱序擊之而奭畏懦不進序又為賊所擒冲深自咎責上疏送章節請解職不許桓豁為征西大将軍及苻堅陷仇池豁以新行魏興太守督䕶梁州五郡軍事戍梁州堅陷涪城梁州刺史楊亮益州刺史周仲孫並委戍奔潰豁以威略不振所在覆敗上疏陳謝固辭不拜開府謝𤣥為都督徐兖青司冀幽并七州軍事𤣥破苻堅後威振河北所至皆降𤣥欲令豫州刺史朱序鎮梁國𤣥住彭城北固河上西援洛陽内藩朝廷朝議以征役既久宜置戍而還使𤣥還鎮淮隂序鎮夀陽會翟遼據黎陽叛執滕恬之又太守張願舉郡叛河北騷動𤣥自以處分失所上疏送節盡求解所職詔慰勞令且還鎮淮隂以朱序代鎮彭城𤣥既還遇疾上疏解職詔書不許𤣥又自陳既不堪攝職慮有曠廢詔又使移鎮東陽軍宋張永前廢帝時為都督會稽東陽臨海永嘉新安五郡諸軍事永以北討失律固求自貶降號左将軍南齊王洪範為青冀二州刺史啓求侵魏得黄郭鹽倉等數戍後遇敗覆死傷塗地深自咎責乃於謝禄山南除地廣設茵席殺三牲招戰亡者魂祭之人人呼名躬自沃酬仍慟哭不自勝因發病而亡梁王茂從髙祖義師平建康為領軍将軍羣盜之燒神虎門也茂率所領到東掖門應赴為盜所射茂躍馬而進羣盜反走茂以不能式遏奸盜自表解職優詔不許王國珍為征虜将軍南秦梁二州刺史會梁州長史夏侯道遷以江州降魏國珍步道出魏興将襲之不果遂留鎮焉以無功累表請解髙祖弗許改封宜陽縣侯後魏江陽王繼為平北将軍鎮攝舊都髙車酋帥樹者擁部民叛詔繼都督北討諸軍事自懷朔已東悉稟繼節度孝文車駕北巡至鄴而髙車悉降常朔清定繼以髙車擾叛頻表請罪孝文優詔諭之穆羆為征東将軍時西河胡叛羆欲討之而離石都将郭雒頭拒違不從羆遂上表自劾以威不攝下請就刑戮孝文乃免雒頭官劉昶為都督吳越楚彭城諸軍事義陽拒守不克昶乃班師太和九年孝文在彭城昶至入見昶曰臣奉勑専征尅殄凶醜徒勞士馬久淹嵗時有損威靈伏聴斧鉞孝文曰朕之此行本無攻守之意正欲伐罪弔民宣威布徳二事既暢不失其本朕亦無尅而還豈但卿也夏侯道遷初為齊輔國将軍歸國拜驍騎将軍隨王肅至夀春棄戍南叛入梁為征虜将軍莊丘黑長史及黑死隂圖歸順自南鄭來朝京師引見于太極東堂免冠徒跣謝曰臣往日歸誠誓盡心力超蒙奨擢灰殞匪報但比在夀春遭韋瓚之酷申控無所致此猖狂是段之來希酬昔遇勲微恩重有靦心顔宣武曰卿建為山之功一蕢之玷何足謝也辛纂為荆州司馬東道行臺孝莊永安二年元顥乗勝卒至城下爾朱世隆狼狽退還城内空虚遂為顥擒及莊帝還宫纂謝不守之罪帝曰於時朕亦北巡東中不守豈卿之過後周于謹初仕後魏為積射将軍隨廣陽王元深征鮮于修禮停軍中山侍中元晏言于靈太后曰廣陽王以宗室之重受律専征今乃盤桓不進坐圖非望又有于謹者智略過人為其謀主風塵之隙恐非陛下純臣矣靈太后詔于尚書省門外立榜募能獲謹者許重賞謹聞之乃謂廣陽王曰今女主臨朝取信讒佞脱不明白殿下素心便恐禍至謹請束身詣闕歸罪有司披露心腹深遂許之謹遂到榜下曰吾知此人衆共詰之謹曰我即是也有司以聞靈后引見之大怒謹備述廣陽忠欵兼陳停車之狀靈后意解捨之唐李靖為定襄道行軍總管擒頡利可汗來獻御史大夫温彦博害其功譖靖軍無紀綱致令虜中奇寶散於亂兵之手太宗大加責讓靖頓首謝久之李勉徳宗時為河南汴宋滑亳河南等道都統鎮汴州李希烈叛悉為冦勉城守累月救援莫至遂潛師潰圍南奔宋州詔以司徒平章事徵之既至朝廷素服請罪優詔復其位勉引過備位而已李晟為京畿副元帥平朱泚徳宗自興元還宫晟以戎服謁見於三橋帝駐馬勞之晟再拜稽首初賀元惡殄滅宗廟再清宫闈咸肅復跪而言曰臣忝備爪牙之任不能早誅妖逆致鑾輅再遷及師于城隅累月方殄賊冦皆臣庸懦不任職之責敢請死罪伏于路左帝為之掩涕命給事中齊暎宣㫖令左右起晟于馬前渾瑊鎮河中詔授平凉盟會使至盟所吐蕃背盟瑊偶得他馬跨而奔馳副使崔漢衡已下並為所執瑊入朝素服待罪詔釋之而後見梁劉鄩末帝初為開封尹遙領鎮南軍節度使旋屬晉人攻河朔鄩自華縣引軍襲魏州與晉王戰于故元城王師敗績鄩脱身南奔自黎陽濟河至魏州鄩授渭州節度使詔屯黎陽貞明三年二月晉王悉衆來攻黎陽鄩拒之而退及鄩歸闕再授開封尹領鎮南軍節度使其年河朔失守朝廷歸咎于鄩鄩亦不自安上表避位九月落平章事授亳州團練使不顧親威以克愛良将所以有功義以滅親忠臣所以徇節蓋夫授鉞而出固敵是求師律尚嚴軍事貴斷故有忘家徇國以義掩恩九族陷于冦讐攻之而弗顧六親干於約束殺之而無赦三軍感義而心奮萬夫畏威而股栗故能排禍難於社稷戮鯨鯢於邊圉宜乎錫以茅土紀之旂常者矣魏将樂羊攻中山其子在中山中山君烹其子而遺之羊啜之盡一杯魯将吳起齊人伐魯魯欲将起起取齊女為妻而魯疑之起遂殺其妻以明不與齊魯乃以為将而大破齊後漢李忠字仲都更始立拜為信都都尉與太守任光同奉光武以為右大将軍從至苦陘苦陘縣名屬中山王郎遣将攻信都大姓馬寵等開城納之收太守宗廣及忠母妻而令親屬招呼忠先是寵弟從忠為校尉忠即時召見責數以背恩反城因格殺之諸将皆驚曰家屬在人手中殺其弟何猛忠曰若縱賊不誅則二心也光武聞而美之謂忠曰今吾兵已成矣将軍可歸救老母妻子宜自募吏民能得家屬者賜錢千萬來從我取忠曰蒙明公大恩思得報效誠不敢内顧宗親會更始遣将攻破信都忠家屬得全邳彤為後大将軍從光武於河北時王郎所置信都王捕繫彤父弟及妻子使為手書呼彤曰降者封爵不降者族滅彤涕泣報曰事君者不得顧家彤親屬所以至今得于信都者劉公之恩也公方争國事彤不得復念私也會更始所遣将攻拔信都郎兵敗走彤家屬得免趙苞字威豪為遼西太守遣使迎母及妻子垂當到郡道經栁城值鮮卑萬餘人入塞冦鈔苞母妻子遂為所劫質載以繫郡苞率騎二萬與賊對陣賊出母示苞苞悲號謂母曰為子無狀欲以微禄奉養朝夕不圖為母作禍昔為母子今為王臣義不得顧私恩毁忠節惟當萬死無以塞罪母遥謂曰威豪人各有命何得相顧以虧忠義昔王陵母對漢使仗劍以固其志爾其勉之苞即進戰賊摧敗其母妻皆為所害苞殯斂母畢自上歸𦵏靈帝遣䇿弔慰封鄃侯苞𦵏訖謂鄉人曰食禄而避難非忠也殺母以全義非孝也如是有何面目立天下遂嘔血而死朱靈為袁紹将清河季雍以鄃叛紹而降公孫瓚瓚遣兵衛之紹遣靈攻之靈家在城中瓚将靈母弟置城上誘呼靈靈望城涕泣曰丈夫一出身與人豈復顧家遂力戰拔之生擒雍而靈家皆死魏陳登漢末為廣陵太守時太祖討吕布軍到下邳登率郡兵為軍先驅時登諸弟在下邳城中布乃質執登三弟欲求和同登執意不撓進圍日急布刺奸張宏懼于後累夜将登三弟就登布既伏誅登以功加拜伏波将軍鍾繇為司隸校尉時袁譚遣郭援略取河東太祖使繇率諸将討之龎徳為軍鋒徳手斬一級不知是援戰罷之後衆人皆言援死而不得其首援繇之甥也徳晩後於鞬中出一頭繇見之而哭徳謝繇繇曰援雖吾甥乃國賊也卿何謝之晉郭黙河南人事太守裴整為督将永嘉之亂黙率遣衆自為塢主撫循将士甚得歡心黙婦兄同郡陸嘉取官米數石餉妹黙以為違制使殺嘉嘉懼奔石勒黙乃自射殺婦以明無私宋劉粹為征虜将軍初與謝晦厚善晦以粹子曠之為參軍晦叛粹受命南討一無所顧太祖以此嘉之晦遣送還粹亦不害也蔡那為建安王休仁司徒中兵參軍明帝即位四方叛亂那受任南討那子弟皆在襄陽為劉胡所執胡每戰輒懸之城外那進戰愈猛梁羊侃為都官尚書侯景叛逼城侃長子鷟為景所獲執來城下示侃侃曰我傾宗報主猶恨不足豈復計此一子幸汝早能殺之數日復持來侃謂鷟曰久以汝為死猶復在邪吾以身許國誓死行之終不以爾而生進退因引弓射之賊感其忠義亦弗之害也隋崔𢎞度仕周為上大将軍尉遲逈作亂以𢎞度為行軍總管從韋孝寛討之𢎞度妹先適逈子為妻及破鄴城逈窘迫昇樓𢎞度直上龍尾追之逈彎弓将射𢎞度𢎞度脱兠鍪謂逈曰相識不今日各圖國事不得顧私以親戚之情謹遏亂兵不許侵辱事勢如此早為身計何所待也逈擲弓於地罵大丞相極口而自殺𢎞度顧其弟𢎞丹曰汝可取逈頭𢎞丹遂斬之堯君素煬帝大業末為河東守唐公義兵攻之不尅仍賜全小幼待以不死君素卒無降心其妻又至城下謂之曰隋室已亡天命有屬君何自苦身取禍敗君素曰天下事非婦人所知引弓射之應弦而倒唐屈突通隋末為左驍騎大将軍煬帝辛江都令通鎮長安義師起代王遣通屯河東髙祖遣其家僮召之通遽命斬之後聞京師平家屬盡沒率兵東下将如雒陽劉文静遣竇琮段志𤣥等追之琮縱通子夀令往諭之通大呼曰昔與汝為父子今與汝為仇讐命左右射之衆知京師陷皆釋仗通乃降後為兵部尚書判東道行臺僕射從太宗下王世充時通有二子並在雒陽髙祖謂通曰東征之事今以相屬其如兩子何通對曰臣以朽老誠不足以當重任但自惟疇昔執就軍門至尊釋其縲囚加之恩禮既不能死實荷再生當自此之時心口相視暗以身命奉許國家久矣今此行也臣願先驅兩兒若死自是其命終不以私害義髙祖歎息曰徇義之夫一至於此僕固懷恩為金微都督肅宗即位于靈武懷恩從郭子儀赴行在時同羅部落自西京叛賊北冦朔方子儀與懷恩擊之懷恩子玢領徒擊賊兵敗而降尋又自拔而歸懷恩叱而斬之将士懾駭無不一當百遂破同羅千餘騎于河上李晟為神䇿軍使討朱泚屯兵渭橋神䇿軍家族多陷于泚晟家亦百口在城中左右或有言及家者晟泣下曰乗輿何在而敢恤家乎泚又使晟小吏王無忌之壻詣晟軍且曰公家無恙城中有書問晟曰爾敢與賊為間遽命斬之梁王彦章太祖開平中為先鋒馬軍使澶州刺史晉人攻陷澶州彦章舉家陷沒晉王遷其家於晉陽待之甚厚遣細人間行誘之彦章即斬其使以絶之後數年其家被害周劉仁贍仕江南為夀州節度使法令嚴肅世宗顯徳中征淮南重圍之中其子崇讓犯軍禁即令斬之故能以一成之衆連年拒守受命忘家𫝊曰将受命之日則忘其家臨軍約束則忘其親蓋軍旅之事安危攸司将帥之任社稷是毗固當以孝而資忠以義而割愛受詔引道初無辦嚴憂國忘家靡顧私室聳英烈之風槩為忠義之模楷宜乎錫以土宇紀之旂常者哉漢霍去病武帝時為驃騎将軍帝為治第令視之對曰匈奴不滅無以家為也由此益重愛之後漢吳漢為大司馬每出師朝受詔夕即引道初無辦嚴之日梁吕僧珍為太祖領軍主簿袄賊唐瑀冦東陽太祖率衆東討使僧珍知行軍衆局事僧珍宅在建陽門東自受命當行每日由建陽門道不過私室太祖益以此知之胡僧祐事元帝為鎮西録事參軍因諫忤㫖下獄大寶二年侯景寇荆陜圍王僧辯于巴陵帝乃引僧祐於獄拜為假節武猛将軍封新市縣侯令赴援僧祐將發謂其子曰汝可開朱白二門吾不捷則死吉則由朱凶則由白也帝聞而壯之北齊庫狄干為太傅及髙仲斌以武城叛神武討之以干為大都督前驅干上道不過家見侯景不遑食景使騎追饋之後周李弼初仕後魏為柱國大将軍弼每率兵征討朝受命夕便引路略不問私事亦未嘗宿於家其憂國忘身類如此唐李光弼為大原尹肅宗至徳二年史思明蔡希徳髙秀巖牛庭玠四偽帥衆十餘萬來寇大原圍城三月光弼自賊圍城城中遷一小幕止宿有急即往救之行至府門未嘗回頭不復省視妻子賊退後收拾器械處置公事經三日然後歸家髙崇文憲宗元和初以長武城使統神䇿兵討劉闢崇文在長武練卒五千常若寇至及是中使至長武夘時宣命而辰出師冊府元龜卷四百十七
