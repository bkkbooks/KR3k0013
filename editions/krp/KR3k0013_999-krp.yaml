body:
  text: 册府元龜巻九百九十九宋王欽若等撰外臣部入覲請求互市入覲春秋之義王者無外所以域四海而宅天下也若夫被髮左衽之君旃裘胡貉之長忿鷙怙力荒忽無常正朔所不加政教所不及乃能慕恩信被威徳叩闗而請命欵塞而願朝扶服奔走至于闕下稽顙樹領拜于王庭斯盖中國有道太平之嘉運也是以王㑹著篇知周室之隆正㑹為圗覩唐祚之盛雖或迎送煩扵傳置賜與糜扵府帑比夫勞師逺攻其費相萬又烏足稱道哉漢武帝時夜郎侯始倚南越南越已滅還誅反者謂軍還而誅且蘭夜郎遂入朝帝以為夜郎王滇王者其衆萬人南越破後及漢誅且蘭使使者王然于以越破及誅南夷兵威風風讀曰諷諭滇王入朝滇王其旁東北勞深靡莫皆同姓相杖未肯聽杖猶倚也相依倚為援不聽滇王入朝也勞莫數侵犯使者元封二年天子發巴蜀兵擊滅勞深靡莫以兵臨滇滇舉國降請置吏入朝宣帝時烏孫公主遣女來至京師學鼓瑟漢遣侍郎樂奉送主女過龜兹龜兹前遣人至烏孫求公主女未還㑹女過龜兹龜兹王留不遣復使使報公主主許之後公主上書願令女比宗室入朝而龜兹王絳賔亦愛其夫人上書言得尚漢外孫為昆弟願與公主女俱入朝元康元年遂來朝賀王及夫人皆賜印綬夫人號稱公主賜以車騎旗鼔歌吹數十人綺繡雜繒琦珍凡數千萬琦音竒留且一年厚贈送之後數来朝賀絳賔死其子丞徳自謂漢外孫成哀帝時往來尤數漢遇之亦甚親宻匈奴呼韓邪單于當宣帝時匈奴衰亂呼韓邪之敗也左伊秩訾王為呼韓邪計勸令稱臣入朝事漢從漢求助如此匈奴乃定呼韓邪議問諸大臣皆曰不可匈奴之俗本上氣力而下服後以服後扵人為下以馬上戰鬭為國故有威名扵百蠻戰死壯士所有也言人皆有此事耳今兄弟爭國不在兄則在弟雖死猶有威名子孫常長諸國為諸國之長帥也漢雖強猶不能兼并匈奴奈何亂先古之制臣事扵漢卑辱先單于言忝辱之更令卑下也為諸國所笑雖如是而安何以復長百蠻左伊秩訾曰不然強弱有時今漢方盛烏孫城郭諸國皆為臣妾謂西域諸國為城郭而居也自且鞮侯單于以來匈奴日削不能取復且音子予切復音扶目切雖屈強扵此未嘗一日安也屈音其勿切今事漢則安存不事則危亡計何以過此諸大人相難久之呼韓邪從其計引衆南近塞甘露二年呼韓邪單于欵五原塞欵叩也願朝三年正月㑹正旦之朝賀也漢遣車騎都尉韓昌迎發過所七郡郡二千騎為陳道上單于正月朝天子於甘泉宫漢寵以殊禮位在諸侯王上贊謁稱藩臣而不名賜以璽綬冠帶衣裳安車駟馬黄金錦綉繒絮使有司道單于先行就邸長安宿長平帝自甘泉宿池陽宫帝登長平阪詔單于毋謁其左右當户之羣臣皆得列觀蠻夷君長王侯數萬咸迎扵渭橋下夾道而陳帝登渭橋咸稱萬嵗單于就邸置酒建章宫饗賜單于觀以珍寳詔有司議咸曰聖王之制施徳行禮先京師而後諸夏先諸夏而後夷狄詩云率禮不越遂視既發相士烈烈海外有截陛下聖徳充塞天地光被四表匈奴單于鄉風慕義舉國同心奉琛朝貢自古未之有也單于非正朔所加王者所客也禮儀宜如諸侯王稱臣昧死再拜次諸侯王下詔曰盖聞五帝三王禮所不施不及以政今匈奴單于稱北藩臣朝正月朔朕之不逮徳不能宏覆其以客禮待之位在諸侯王上二月單于罷歸遣長樂衛尉髙昌侯忠車騎都尉昌騎都尉虎將萬六千騎送單于單于居幕南保光禄城詔北邊賑榖食郅支單于逺遁匈奴遂定黄龍元年匈奴呼韓邪單于來朝禮賜如初加衣百一十襲錦帛九千疋絮八千斤二月單于歸國以有屯兵故不復發騎為送元帝時郅支單于既誅呼韓邪單于且喜且懼上書言曰常願謁見天子誠以郅支在西方恐其與烏孫俱來擊臣以故未得至漢今郅支伏誅願入朝見竟寧元年春正月匈奴呼韓邪單于來朝詔曰匈奴郅支單于背叛禮義既伏其辜呼韓邪單于不忘恩徳鄉慕禮義鄉讀曰嚮復修朝賀之禮願保塞傳之無窮邊陲長無兵革之事其改元為竟寧成帝河平三年匈奴復株絫若鞮單于上書願朝河平四年正月遂朝加賜錦綉繒帛二萬疋絮二萬餘斤它如竟寧時元延元年匈奴捜諧若鞮單于為朝二年發行欲㑹二年嵗首之朝禮故豫發其國而行未入塞病死哀帝建平四年匈奴烏珠留若鞮單于復遣使上書願朝五年時哀帝被疾或言匈奴從上游來厭人㳺猶流也河水從西北來故曰上游也又曰上游亦總謂地形耳不必係于水也厭音一渉切自黄龍竟寧時單于朝中國輙有大故大故謂國之大䘮帝繇是難之以問公卿亦以為虚費府帑帑它莾切又音奴可且勿許單于使辭去未發黄門郎揚雄上書諫天子寤焉召還匈奴使者更報單于書而許之賜繒帛五十疋黄金十斤單于未發㑹病復遣使願朝明年故事單于朝從名王以下及從者二百餘人單于又上書言䝉天子神靈人民盛壯願從五百人入朝以明天子盛徳帝皆許之元夀二年單于來朝帝以太嵗厭勝所在厭音一渉切舍之上林苑葡萄宫舍止宿告之以加敬扵單于云以敬扵單于故令止上林單于知之加賜衣三百七十襲錦繡繒帛三萬疋絮三萬斤它如河平時既罷遣中郎將韓况送單于出塞元夀二年正月烏孫大昆彌伊秩靡與單于並入朝後漢光武建武二十年韓人亷斯人蘓馬諟等詣樂浪貢獻光武封蘇馬諟為漢亷斯邑君使屬樂浪郡四時朝謁二十五年烏桓大人率衆内屬詣闕朝貢是年大人來朝大人謂渠帥也二十七年封哀牢夷賢栗等為夷長自是嵗嵗朝貢三十年鮮卑大人於仇賁滿頭等率種人詣闕朝賀安帝永初中鮮卑大人燕荔陽詣闕朝賀鄧太后賜燕荔陽王印綬赤車参駕順帝永和元年春正月扶餘王來朝京師帝作黄門鼔吹角抵戲以遣之獻帝建安二十一年匈奴南單于呼厨泉將其名王來朝待以客禮遂留内侍使右賢王去卑撫其國而匈奴折節過扵漢舊是時曹公破三郡烏丸還至易水代郡烏丸行單于普富盧上郡烏丸行單于那樓將其名王來賀魏齊王正始六年濊不耐侯舉邑降八年詣闕朝貢詔更拜不耐濊王居處雜在民間四時詣郡朝謁一郡有軍征賦調供給役使遇之如民晉武帝咸寧中馬韓王來朝太康二年辰韓王復來朝貢七年又來後魏太武太平真君三年五月行幸隂山北六月仇池楊難當朝扵行宫先是起殿扵隂山北殿成而難當至因曰廣徳焉正平元年伊吾王唐和詣闕太武優寵之待以上客和兄契子元達性果毅有父風與叔父和歸闕俱為上客拜安西將軍晉昌公二年焉耆前部王伊雒朝京師賜以妻妾奴婢田宅牛羊拜上將軍王如故隋煬帝大業三年六月啓民可汗來朝帝遣鴻臚卿史祥迎接之五年六月髙昌王麴伯雅來朝七年十二月西面突厥處羅多利可汗來朝上大恱接以殊禮十年突厥啓民可汗率其子咄言立來朝扵東都唐太宗貞觀二年東謝蠻主元深入朝冠烏熊皮冠若今之旄頭以金銀絡額身被毛帔韋皮行縢而着履中書侍郎顔師古奏言昔周武王之時天下太平逺國歸欵周史乃集其事為王㑹篇今萬國來朝至如此軰章服實可圗寫今請撰為王㑹圗從之四年九月伊吾城主來朝十二月髙昌王麴文泰來朝禮之甚厚十年十二月吐谷渾河源王來朝十三年十二月吐谷渾主河源郡王慕容諾曷鉢來朝以宗女為宏化郡主以妻之二十二年二月以結骨部置堅昆都督府𨽻燕然都䕶以其侯利發失鉢屈阿棧為左屯衛大將軍堅昆都督初結骨未嘗通中國聞鐵勒等咸来内附即遣使頓顙稱臣并獻方物至是其君長遂自入朝見太宗扵天成殿宴之謂羣臣曰往日渭橋斬獲三突厥自謂多功今致此人扵席飜更不以為怪可謂日用而不知邪結骨酣醉歡甚因謂曰臣既一心歸國願授國家官職執笏而還故授以此任幷賚錦帛二十三年正月制蕃王分為三蕃以次朝集髙宗以貞觀二十三年五月即位七月于闐王伏闍信來朝顯慶元年八月龜兹王白軻黎布失畢來朝咸亨四年波斯卑路斯自來入朝五年十二月于闐王伏闍雄率其子弟及首領七十餘人來朝并獻方物辛卯波斯王卑路斯來朝則天垂拱三年正月于闐王伏闍雄來朝天授三年女國王俄琰兒爾來朝𤣥宗開元二年二月癸巳奚王李大輔等來朝上謂之曰卿等為朕外藩欵誠夙著爰初州屬職貢相仍往縁寄任非才拙扵綏撫因使卿等猜貳頗成阻絶而能不忘本飜然改圗覽所獻書具知至懇大輔將尚縣主失活又遣近親並自邊隅同臻雒邑朕今與卿等相見喜慰良深五年奚王李大輔入朝封饒樂郡王七年十一月契丹松漠郡王莎固與永樂公主來朝十一年松漠郡王鬱于入朝仍請婚十三年契丹王邵固來朝從封東嶽詔授左羽林大將軍改封廣化郡王代宗大歴六年十一月文單國王來朝并獻馴象一十有一宰臣等上言曰臣聞春秋二百四十年不紀祥瑞而載異國之朝其在周書亦美西旅之獻盖重其徳化及逺天下大同也伏惟寳應元聖文武皇帝陛下以至敬事天地以至孝奉宗祀武功以定大難文徳以懐逺人故舊史未載之邦前王不賔之長聲教所隔言語莫通悠颺南𬈑㡬千萬里瞻望中國知有聖人踰海而來歴年方至綿邈重阻奔波載馳黄金飾冠白璫充耳服柔羣象牽致闕前低迴馴擾稽顙屈膝隨萬國而來庭與百獸而率舞如知禮樂之節益盛羽儀之容有以彰仁化元通醇源溥暢至和大順以兆昌期事軼扵軒皇跡超扵漢代矣臣等謬塵樞近獲覩洪休伏請宣付史官光昭簡冊手詔荅曰文單逺國自古未賔能瞻八律之風來申重譯之貢君臣入覲嬪御偕朝越海踰山輸琛獻象顧慚薄徳有邁前王此皆宗社効靈上𤣥幽贊卿等寅亮台鼎爕和神人翼致感通無逺不届永言輔弼慶賀良深所請付史官者依請求王者内阜黔首外撫四夷雖蒐狩訓兵體不殺扵神武而梯航獻欵嘉來逺而施恵必接以恩信乃得其要領其或告饑饉之灾追和親之好故可示羈縻之義伸賜與之恩至扵借書籍請音樂或假壤土或希援兵盖典制之靡存在撫御而斯得俾夫桀驁以息奢僣不萌有懐感之心無過望之意則可以稽魏絳和戎之利賈誼五餌之術徹三邊之烽警廣函夏之亭毒矣漢武帝時單于遣使遺漢書云南有大漢北有強胡胡者天之驕子也不為小禮以自煩今欲與漢闓與開同大闗嵗給遺我米酒萬石稷米五千斛雜繒萬疋則邊不相盜矣元帝初即位呼韓邪單于復上書言民衆困乏詔雲中五原郡轉榖二萬斛以給焉郅支單于自以道逺恐漢擁呼韓邪遣使上書來求侍子後漢光武建武二十六年北匈奴復遣使詣闕貢馬及裘更求和親并請音樂晉元帝大興三年建平夷王向宏向瓂等詣臺求拜除尚書郎張亮議夷貊不可假以軍號元帝詔特以宏為折衝將軍瓂平鄉侯並賜以朝服宋文帝元嘉二十七年吐谷渾慕延遣使上表求牽車獻烏丸帽女國金酒器胡王金釧等物太祖賜以牽車南齊武帝永明六年宕昌王使求軍儀及雜伎書詔報曰知須軍儀等九種並非所愛但軍器種甚多致之未易内伎不堪渉逺秘閣圗書例不外出五經集註論語今特勑賜王各一部扶南王姓僑一作橋音驕陳如名闍邪跋摩啓曰臣有奴名鳩酬羅委臣逸走别在餘處搆結㓙逆遂破林邑仍自立為王永不恭從違恩負義叛主之奴天不容載伏尋林邑者昔為檀和所破久已歸化天威所被四海彌伏而今鳩酬羅守執奴㓙自專狼強且林邑扶南隣界相接親人是臣奴猶尚逆去朝廷遥逺豈復遵奉此國屬陛下故謹具上啓伏聞林邑頃年表獻間絶便欲永隔朝廷豈有師子坐而安大鼠伏願遣軍將伐㓙逆臣亦自効微誠助朝廷翦撲使邊海諸國一時歸伏陛下若欲别立餘人為彼王者伏聽勑旨脫未欲灼然興兵伐林邑者伏願特賜勑在所隨宜以少軍助臣乗天之威殄滅小賊伐惡從善平蕩之日上表獻金五婆羅今輕此使送臣丹誠表所陳啓不盡下情謹附那伽仙并其伴口具啓聞伏願愍所啓河東王拾寅子易度侯好星文嘗求星書朝議不給芮芮主求醫工等物武帝詔報曰知須醫及織成錦工指南車漏刻並非所愛南方治疾與北土不同織成錦工並女人不堪渉逺指南車漏刻此雖有其器工匠久不復存不副為恨梁武帝大同七年百濟王遣使請湼槃等經義毛詩博士并工匠畫師等勑並給之後魏太武太平真君十一年車師王車夷落遣使琢進薛直上書曰臣亡父僻處塞外仰慕天子威徳遣使奉獻不空於嵗天子降念賜遺甚厚及臣繼立亦不闕常貢天子垂矜亦不異前世敢緣至恩輒陳私懇臣國自無諱所攻擊經今八年人庶饑荒無以存活賊今攻臣甚急臣不能自全遂捨國東奔三分免一即日已到焉耆東界思歸天闕幸垂賑救扵是下詔撫慰之開焉耆倉賑給之孝文延興二年八月丙辰百濟國遣使奉表請師伐髙麗太和十七年九月乙亥鄧至王象舒彭遣子舊詣闕表求以位授舊詔許之宣武永平元年十月髙昌國王麴嘉遣其兄子私署左衛將軍孝亮奉表來朝仍求内徙乞軍迎援隋文帝開皇中突厥沙鉢畧既為藩附因請獵扵常代之間許之仍遣人賜其酒食沙鉢畧率部落再拜受賜唐髙祖武徳二年九月突厥遣使者莅殺曷薩那可汗扵中書門下省初曷薩那與始畢王欽若等曰突厥始畢可汗也有隙至是聞在長安遣使請殺之髙祖以為疑羣臣諌曰今若不與則是存一人而讐一國也後必為患不得已乃從之八年髙麗遣人來學道佛法詔許之太宗貞觀十七年林邑王遣使云為扶南所攻乞師救援太宗曰山有猛獸藜藿為之不採爾為我隣國扶南安敢侵逼此是爾懼自來將無事矣後有使至悉如太宗言髙宗麟徳二年正月丁夘吐蕃遣使來朝請與吐谷渾復修和好并請赤水地以為牧野帝不許之則天垂拱二年二月新羅王金政眀遣使請禮記一部并新文章令所司冩吉㓙要禮并於文館詞林採其詞渉規誡者勒成五十卷賜之𤣥宗開元四年奚使乞扵寺觀禮拜及向兩市貨易許之六年十一月丁未阿史特勒僕羅上書訴曰僕羅克吐火羅葉䕶部下管諸國王都督刺史總二百一十二人謝颺國王統領兵馬二十萬衆罽賔國王統領兵馬二十萬衆骨吐國王石汗那國王解蘓國王石匿國王悒達國王䕶宻國王䕶時健國王范延國王久越徳建國王勃特山王各領五萬衆僕羅祖父已来並是上件諸國之王蕃望尊重僕羅兄般都泥利承嫡繼襲先蒙恩勑差使持節就本國册立為王然火羅葉䕶積代以來扵大唐忠赤朝貢不絶本國緣接近大食吐蕃東界又是西鎮僕羅兄每徴發部落下兵馬討論擊諸賊與漢軍相知聲援應接在扵邊境所以免有侵漁僕羅兄前後屢蒙聖澤媿荷國恩遂發遣僕羅入朝侍衛玉階至願獻忠殉命以為臣妾僕羅至此為不解漢法鴻臚寺不委蕃望大小有不比類流例髙下相懸即奏擬授官竊見石國龜兹并余小國王子首領等入朝元無功効並緣蕃望授三品將軍况僕羅身恃勤本蕃位望與親王一種北䫫大小與諸國王子懸殊却授僕羅四品中郎但在蕃王子弟娑羅門瞿曇金剛龜兹王子白孝順等皆數改轉位至諸衛將軍唯僕羅最是大蕃去神龍元年蒙恩勑授左領軍衛翊府中郎將至今經一十四年久被淪屈不蒙准例授職不勝苦屈之甚勑鴻臚卿准例定品秩勿令稱屈七年二月安國王篤薩波提遣使上表論事曰臣篤薩波提言臣是從天主領普天下賢聖皇帝下百萬重草類奴在逺义手胡跪禮拜天恩威相如拜諸天自有安國巳來臣種族相繼作王不絶并軍兵等並赤心奉國從比年來被大食賊每年侵擾國土不寧伏乞天恩滋澤救臣苦難仍請勑下突厥施令救臣等臣即統領本國兵馬計㑹翻破大食伏乞天恩依臣所請今奉獻波斯䮫二佛菻繡氍毺一鬱金香三十斤生石蜜一百斤臣今借紫訖伏乞天恩賜一員三品官又臣妻可敦奉進柘必大氍毺二繡氍毺一上皇后如䝉天恩滋澤請賜臣鞍轡器仗袍帶及賜臣妻可敦衣裳粧粉其月戊辰俱宻國王那羅延上表曰臣曽祖父叔兄弟等舊來赤心向大國今大食來侵吐火羅及安國石國㧞汗那國並屬大食臣國内庫藏珍寳及部落百姓物並被大食徴稅將去伏望天恩處分大食令免臣國徴稅臣等即得久長守把大國西門伏乞炤臨臣之願也其月庚午康國王烏勒伽遣使上表曰臣烏勒伽言臣是從天主普天皇帝下百萬里馬蹄下草土類奴臣種族及諸胡國舊來赤心向大國不曽反叛亦不侵損大國為大國行禆益士從三十五年來每共大食賊鬬戰每年大發兵馬不蒙天恩送兵救助經今六年被大食元率將異宻屈底波領衆軍兵來此共臣等鬭戰臣等大破賊徒臣等兵士亦大死損為大食兵馬極多臣等力不敵也臣入城自固乃被大食圍城以三百抛車傍城三穿大坑欲破臣等城國伏乞天恩知委送多少漢兵來此救助臣苦難其大食只合一百年强盛今年合滿如有漢兵來此臣等必是破得大食今謹獻好馬一波斯駱駞一䮫二如天恩慈澤將賜臣物謂付臣下使人將來冀無侵奪八年南天竺國王右武衛大將軍尸利那羅僧伽寳多枝摩為國造寺上表乞寺額勑以歸化為名又上表乞袍帶曰蕃人無識惟將衣帶為重既不賜及豈知優寵勑中書門下南天竺王逺遣朝貢其使却還並湏周旋發遣滿望乃以錦袍金帶魚袋七事賜其使遣之十年三月庚戌波斯國王勃善活遣使獻表乞授一員漢官許之十五年吐火羅葉䕶遣使上言曰奴身罪逆不孝慈父身被大食統押應徹天聰頌奉天可汗進旨云大食欺侵我即與你氣力奴身今被大食重稅欺苦實深若不得天可汗救活奴身自活不得國土必遭破散求防守天可汗西門不得伏望天可汗慈憫與奴身多少氣力使得活路又承天可汗處分突厥施可汗云西頭事委你即須發兵除却大食其事若實望天可汗却垂處分奴身緣大食稅急不救得好物奉進望天可汗炤之所欲驅遣奴身及須已西方物並請處分奴身一一頭戴不敢怠慢十八年七月癸未命有司寫毛詩禮記左傳文選各一部賜金城公主從其請也十九年康國王烏勒上表請封其子咄曷為曹國王黙啜為米國王許之十九年十一月突厥遣其大臣葛阿黙察之來朝獻馬五十匹謝恩也初突厥苾伽可汗之弟闕特勒死苾伽來請巧匠寫其眞詔遣畫工六人往焉既畫工妙絶倫突厥國内未之見者苾伽每觀畫處噓欷如弟再生悲涕不自勝遂遣察之謝恩且送畫人也二十三年閏十一月日本國遣其臣名代來朝獻表懇求老子經本及天尊像以歸于國發揚聖教許之二十六年六月甲子渤海遣使求寫唐禮及三國志晉書三十六國春秋許之二十九年㧞汗那王阿悉爛逹干上表請改國名𠡠改為寧逺國天寳元年五月石國王遣使上表乞授長男那居車鼻施官詔拜大將軍賜一年俸料八載吐火羅葉䕶夫里嘗伽羅遣使來朝獻表曰臣隣境有一胡號曰朅帥居在深山恃其險阻違背聖化親輔吐蕃知勃律地狹人稠無多田種鎮軍在彼糧食不充扵箇失宻市易鹽米然得支濟商旅來往皆著朅帥國過其王遂受吐蕃貨求扵國内置吐蕃城堡捉勃律要路自髙仙芝開勃律之後更益兵二千人勃律因之朅帥王與吐蕃乗此虛危將兵擬入臣每憂思一破兇徒若開得大勃律己東直至闐焉耆卧凉𤓰肅已來吐蕃更不敢停住望安西兵馬來載五月到小勃律六月到大勃律伏乞天恩允臣所奏若不成請斬臣為七段緣箇失宻王向漢忠赤兵馬復多土廣人稠糧食豐足特望天恩賜箇失宻王勑書宣慰賜衣物并寳鈿腰帶使感荷聖恩更加忠赤帝覽表許之十二載四月甲戌骨咄國人史難之康丁真表乞度為僧許之徳宗貞元二十年日本國留住學生橘免勢學問僧空海至元和元年正月日本國使判官髙階真入奏前件學士等藝業稍成願歸本國便請與臣同共歸國從之憲宗元和二年正月庚子囘鶻使者請於河南府太原府置摩尼寺三所許之穆宗長慶四年九月甲子靈武節度使李進誠奏吐蕃遣使求五臺山圗山在代州多浮圗之跡西戎尚此教故來求之敬宗寳歴元年五月庚辰新羅國王金彦昇奏先在太學生崔利貞金叔貞朴季業四人請放還蕃其新赴朝貢金允夫金立之朴亮之等一十二人請留在宿衛仍請配國子監習業鴻臚寺給資糧從之二年十二月新羅質子金允夫請准舊例中使入蕃便充副使同到本國譯詔書不許但随告使充副使文宗太和七年春正月己亥銀青光禄大夫檢校秘書監忽汗都督國王大彛震奏遣學士解楚卿趙孝明劉寳俊三人附謝恩使同中書右平章事髙賞英赴上都學問先遣學生李居正朱承朝髙夀海等三人事業稍成請准例遞乗歸本國許之武宗㑹昌元年八月囘鶻廹於饑求糧食閏九月丁酉詔許賑救囘鶻米二萬石時帝開延英復召宰臣問之陳夷行謂李徳裕曰此借宼兵而資盜糧耳徳裕曰今徴兵未集天徳至危若不救此饑人且令三數月安静忽陷却天徳公能獨當其咎否夷行遂黙然而止及徳裕延英從容論奏帝心乃定梁太祖建號契丹阿保機遣使送名馬女口貂皮等求封册梁祖與之書曰朕今天下皆平惟有太原未服卿能長驅精甲徑至新莊為我翦彼仇讐與爾便行封冊後唐莊宗同光二年十一月己丑幽州李存賢奏契丹林牙求茶藥明宗天成二年十月幽州奏契丹王差人持書求碑石欲為其父表其𦵏所三年四月幽州奏得契丹書求覔藥器云要蕃中所有即亦遵副帝曰招懐之道且宜依隨四年十月吐渾首領薛糞堆進狀乞授嵐州刺史上欲許之安重誨諫乃止長興三年二月雲州上言契丹遣使來求果子帝曰契丹雖闕此物亦非彼實然盖當面偵謀宜阻其求但報云遣使入朝當有處分三月甲午禮賔使梁進徳自契丹使囘稱契丹王請放前剌舍利還本國七月幽州奏契丹國差梅老乾捺鋪都到州求果子晉王廷裔移鎮定州先是契丹欲以王處直之子威為節度使處直則廷裔之叔祖也處直為養子都所簒時威北走蕃廷蕃納之至是乃遣使諭髙祖云欲使王威襲先人土地如我蕃中之制髙祖荅以中國將校自刺史團練防禦使序遷方授旄節請遣威至此任用漸令外進乃合中土舊規王威深怒其見拒使人復報曰爾自諸侯為天子有何階級耶髙祖畏其滋蔓則厚賂力拒其命敵忿稍息遂連升廷裔鎮中山且欲塞其意也互市夫王者之牧四夷也有懐柔之道焉有羈縻之義焉盖所以底寧邊鄙休息中夏者也則互市之設其懐柔羈縻之旨與爰自漢初始建斯議繇是擇走集之地行闗市之法通彼貨賄敦其信義歴代遵守斯亦和戎之一術也漢髙祖立趙佗為南粤王使和輯百越輯與集同至髙后時有司請禁闗市鐵器佗上書言髙后令曰毋予蠻夷外越金鐵田器馬牛羊即予予牡毋與牝文帝時匈奴和親與通闗市景帝時復與匈奴和親通闗市武帝時明和親約束厚遇闗市饒給之匈奴自單于以下皆親往來長城下匈奴貪尚樂闗市耆漢財物耆讀曰嗜亦通闗市不絶以中之以闗市中其意中竹仲切宣帝時北匈奴見南單于來附懼謀其國故數乞和親又逺驅牛馬與漢合市後漢光武建武中置烏桓校尉於上谷寗城縣名亦作寧城嵗時互市焉明帝永平中北單于欲合市遣使求和親帝冀其交通不復為㓂乃許之章帝元和元年武威太守孟雲上言北單于復願與吏人合市詔書聽雲遣驛使迎呼慰納之北單于乃遣太且渠伊莫訾王等驅牛馬萬餘頭來與漢賔客交易諸王大人或前至所在郡縣為設官邸賞賜待遇之安帝永初中鮮卑大人燕荔陽詣闗朝賀鄧太后令止烏丸校尉所居寗城下通胡市獻帝建安中鮮卑素利彌加厥機因烏丸校尉閻柔上貢獻通市是時梁習為并州刺史鮮卑大人育延嘗為州所畏而一旦將其部落五千餘騎詣習求互市習念不聽則恐其怨若聽到州下又恐為所畧於是乃許之往與㑹空城中交市遂𠡠郡縣自將治中以下軍往就之魏文帝黄初三年鮮卑軻比能帥落部大人小子代郡烏丸修武盧等三千餘騎驅牛馬七萬餘口交市北燕馮跋時庫莫奚虞出庫真率三千餘落請交市獻馬千疋許之處之於營丘梁髙祖天監中河南王休運籌遣使貢獻其地與益州隣常通商賈後魏宣武時西域東域貢其珍物充扵王府又於南垂立互市以致南貨羽毛齒革之屬無逺不至隋煬帝時西域諸蕃多至張掖與中國交市帝令吏部侍郎裴矩掌其事唐髙祖武徳八年吐谷渾欵承風戍各請互市並許之𤣥宗開元二年九月太常少卿姜晦上封請以空名告身於六胡州市馬率三十匹馬酬一游擊將軍時廐馬尚少深以為然遂命齎告身三百道往市焉四年奚使乞扵西市貨易許之十五年吐蕃與突厥小殺書將計議同時入㓂小殺并獻其書帝嘉其誠引梅録啜宴扵紫宸殿厚加賞賚仍許於朔方軍西受降城為互市之所肅宗乾元中囘鶻仍嵗來市以馬一匹易絹四十疋動至數萬馬代宗大歴八年囘鶻遣赤心領馬一萬疋來求市帝以馬價出扵租賦不欲重困扵民命有司量入計許市六千疋徳宗貞元三年十二月初禁商賈以口馬器械扵党項貨易六年六月囘紇使移職伽達干歸蕃賜馬價絹三十萬疋八年七月給囘紇市馬絹七萬疋憲宗元和十年八月以絹十萬疋償囘紇之馬直十一月吐蕃使欵隴州塞請互市許之十二月以絹九萬七千疋償囘紇馬直十一年二月以内庫繒絹六萬疋償囘紇馬直四月以絹二萬五千疋償囘紇馬直穆宗長慶二年二月以絹五萬疋賜囘紇充馬價四月又賜囘紇馬價絹七萬疋十二月以絹八萬疋償囘紇馬直文宗太和元年三月内出絹二十六萬疋賜囘紇充馬價六月命中使以絹二十萬疋付鴻臚寺宣賜囘紇充馬價五年六月貶右龍武大將軍李甚為宣州别駕甚子貸囘紇錢一萬一千四百貫不償為囘紇所訴故貶甚因下詔曰如聞頃來京城内衣冠子弟及諸軍使并商人百姓等多有舉諸蕃客本錢嵗月稍深徴索不得致蕃客停滯市易不獲及時方務撫安須除舊弊免令受屈要與改更自今以後應諸色人宜除准勑互市外並不得輒與蕃客錢物交闗委御史臺及京兆府切加捉搦仍即作條件聞奏其今日已前所欠負委府縣速與徴理處分開成元年六月淄青節度使奏新羅渤海將到熟銅請不禁斷是月京兆府奏准建中元年十月六日勅諸錦罽綾羅縠繡織成細紬絲布氂牛尾真珠銀銅鐵奴婢等並不得與諸蕃互市又准令式中國人不合私與外國人交通買賣婚娶來往又舉取蕃客錢以産業奴婢為質者重請禁之後唐莊宗同光三年八月青州市到黑水蕃馬三十疋明宗天成二年八月新州奏得契丹書乞置互市翼日付中書宣示百官四年四月𠡠㳂邊置塲買馬不許蕃部直至闕下帝自臨馭欲来逺人党項之衆競赴都下賞賜酒食於禁庭醉則連袂歌土風以出凡將到馬無駑良並云上進國家雖約其價以給之并計其館糓錫賚每嵗不下五六十萬貫侍臣以為耗蠧中華無出扵此因止之是年散騎常侍蕭希甫條奏諸蕃貢馬稍多酬賞價倍戎夷無厭競思興販請却扵邊上置互市只許首領入貢長興二年五月青州奏黑水瓦兒部至登州賣馬三年七月飛龍使奏囘紇所賣馬瘦弱不堪估價帝曰逺夷交市不可輕阻可以中等估之愍帝應順元年正月雲州張温言契丹在州境互市閏正月雲州上言契丹至州界市易二月雲州上言韃靼胡禄末族帳到州界市易末帝清泰元年七月登州言髙麗船一艘至岸管押將盧肵而下七十人入州市易是月雲州言契丹首領述律梅里求互市從之十月青州言髙麗遣人市易二年北面總管言契丹遣人欲為互市其吐渾部族歸舊地從之是年雲州言總管報扵州西北野固口與契丹互市從之十二月雲州沙彦珣奏十年前與契丹互市則例三年雲州言契丹石禄牧部族近城市易晉少帝天福八年西京奏契丹遣前青白軍使王從益到京出餘貨斛斗宜破省錢收糴是時馮暉移鎮靈武河西羊馬所産易為交易朞年得馬五千疋而蕃部歸心朝議患之周太祖廣順元年二月命囘紇來者一聽私便交易官不禁詰先是囘紇間嵗入貢每行李至闗禁民不得扵蕃人處市易寳貨犯者有刑太祖以為不可至是聽之繇是玉之價直十損七八矣十月涇州言招到蕃部野龍十九族有馬赴市私貨賣冊府元龜卷九百九十九
