body:
  text: 册府元龜卷二百五十宋王欽若等撰列國君部攻伐第三定公二年四月桐叛楚桐小國廬江舒縣西南有桐鄉吳子使舒鳩氏誘楚人舒鳩楚屬曰以師臨我教舒鳩誘楚使以師臨吳我伐桐為我使之無忌吳伐桐也偽若畏楚師之臨已而為伐其叛國以取媚者也欲使楚不忌吳所謂多方以誤之秋楚嚢瓦伐吳師于豫章從舒鳩言吳人見舟于豫章偽將為楚伐桐而潛師于巢實欲以擊楚冬十月吳軍楚師于豫章敗之楚不忘故遂圍巢克之獲楚公子繁繁守巢大夫三年秋九月鮮虞人敗晉師于平中平中晉地獲晉觀虎恃其勇也為五年士鞅圍鮮虞張本四年春三月公㑹劉子晉侯宋公蔡侯衛侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯杞伯小邾子齊國夏于召陵侵楚於召陵先行㑹禮入楚境夏四月庚辰蔡公孫姓帥師滅沈以沈子嘉歸殺之沈人不㑹于召陵晉人使蔡伐之秋楚圍蔡爲沈故晉士鞅衛孔圉帥師伐鮮虞孔圉孔覊孫士鞅即范鞅冬十一月庚午蔡侯以吳子及楚人戰于栢舉楚地庚辰吳入郢初伍貟爲吳行人以謀楚楚之殺郤宛也在昭二十七年伯氏之族出郤宛黨伯州犂之孫嚭爲吳太宰以謀楚楚自昭王即位無歲不有吳師蔡侯因之以其子乾與其大夫之子爲質於吳冬蔡侯吳子唐侯伐楚舎舟于淮汭吳乘舟從淮來過蔡而舎之自豫章與楚夾漢豫章漢東江北地名左司馬戍謂子常曰子㳂漢而與之上下㳂緣也緣漢上下遮使勿渡我悉方城外以毁其舟以方城外人毁吳所舎舟還塞大隧直轅𡨕阨二者漢東之隘道子濟漢而伐之我自後擊之必大敗之既謀而行武城黑謂子常黑楚武城大夫日吳用木也我用革也不可久也不如速戰史皇謂子常楚人惡子而好司馬史皇楚大夫司馬沈尹戍若司馬毁吳舟于淮塞城口而入城口三隘道之搃名是獨克吳也子必速戰不然不免乃濟漢而陳自小別至于大别二別在江夏界三戰子常知不可欲奔知吳不可勝史皇曰安求其事求知政事難而逃之將何所入子必死之初罪必盡説十一月庚午二師陳于栢舉闔廬之弟夫槩王晨請於闔廬曰楚瓦不仁瓦子常名其臣莫有死志先伐之其卒必奔而後大師繼之必克弗許夫槩王曰所謂臣義而行不待命者其此之謂也今日我死楚可入也以其屬五千先擊子常之卒子常之卒奔楚師亂吳師大敗之子常奔鄭史皇以其乘廣死史皇以戰死吳從楚師及清發水名將擊之夫㮣王曰困獸猶鬭况人乎若知不免而致死必敗我若使先濟者知免後者慕之蔑有鬬心矣半濟而後可擊也從之又敗之楚人爲食吳人及之奔食而從之敗諸雍澨五戰及郢奔食食者走不陳故不在戰數己卯楚子取其妹季芈畀我以出渉睢睢水出新城昌魏縣東南至枝江縣入江鍼尹固與王同舟王使執燧象以奔吳師燒火燧擊象尾使赴吳師驚却之庚辰吳入郢以班處宫以尊卑班次處楚王宫室子山處令尹之宮子山吳王子夫槩王欲攻之懼而去之夫槩王入之入令尹宮也言吳無禮所以不能遂克左司馬戍及息而還息汝南新息縣聞楚敗故還敗吳師于雍澨傷司馬先敗吳師而身被創初司馬臣闔廬故耻爲禽焉司馬嘗在吳爲闔閭臣謂其臣曰誰能免吾首吳句卑曰臣賤可乎司馬曰我實失子可哉失不知子賢三戰皆傷曰吾不可用也已句卑布裳剄而裹之司馬已死剄取其首藏其身而以其首免傳言司馬之忠壯楚子渉雎濟江入于雲中入雲夢澤中王寢盗攻之以戈擊王王孫由余以背受之中肩王奔鄖鍾建負季芊以從由余徐蘇而從以背受戈故當時悶絶鬭辛與其弟巢以王奔隨吳人從之謂隨人曰周之子孫在漢川者楚實盡之天誘其𠂻致罰於楚而君又竄之竄匿也周室何罪君若願報周室施及寡人以奬天𠂻奬成也君之惠也漢陽之田君實有之楚子在公宫之北隨公宫也吳人在其南子期似王子期昭王兄公子結也逃王而已為王曰以我與之王必免隨人卜與之不吉乃辭吳曰以隨之辟小而宻邇於楚楚實存之世有盟誓至于今未改若難而棄之何以事君執事之患不唯一人一人楚王若鳩楚竟敢不聼命吳人乃退鳩安集也鑪金初宦於子期氏實與隨人要言要言無以楚王與吳并欲脫子期王使見辭曰不敢以約爲利此約爲要言也王割子期之心以與隨人盟當心前割取血以盟示其志也五年六月申包胥楚大夫以秦師至秦子蒲子虎帥車五百乘以救楚五百乘三萬七千五百人子蒲曰吾未知吳道道猶法術使楚人先與吳人戰而自稷㑹之大敗夫㮣王于沂稷沂皆楚地吳人獲薳射于栢舉薳射楚大夫其子帥奔徒奔徒楚散卒以從子西敗吳師于軍祥楚地秋七月子期子蒲滅唐從吳伐楚故九月夫㮣王歸自立也以與王戰而敗自立爲吳王號夫㮣奔楚爲堂谿氏傳終言之吳師敗楚師于雍澨秦師又敗吳師吳師居麇麇地名子期將焚之子西曰父兄親暴骨焉不能收又焚之不可前年楚人與吳戰多死麇中言不可并焚子期曰國亡矣死者若有知也可以歆舊祀言焚吳復楚則祭祀不廢豈憚焚之焚之而又戰吳師敗又戰于公壻之谿楚地名吳師大敗吳子乃歸囚闉輿罷闉輿罷請先遂逃歸輿罷楚大夫請先至吳而逃歸言吳唯得楚一大夫復失之所以不克楚子入于郢吳師已歸冬晉士鞅圍鮮虞報觀虎之敗也三年鮮虞獲晉觀虎六年正月癸亥鄭游速帥師滅許以許男斯歸游速太叔子因楚敗也二月公侵鄭取長垣鄭地名爲晉討鄭之伐胥靡也胥靡周地也周儋翩因鄭人以作亂鄭爲之伐胥靡故晉使魯討之四月己丑吳大子終纍敗楚舟師終纍闔廬子夫差兄舟師水戰獲潘子臣小惟子二子楚舟師之帥及大夫七人楚國大惕懼亡子期又以陵師敗于繁揚陵師陸軍冬季孫斯仲孫忌帥師圍鄆何忌不言何闕文鄆貳于齊故圍之七年秋齊人執衛行人北宮結以侵衛初齊侯鄭伯盟于鹹徴㑹于衛衛侯欲叛晉屬齊鄭也諸大夫不可使北宮結如齊而私于齊侯曰執結以侵我欲以齊師懼諸大夫齊侯從之乃盟于𤨏𤨏即沙也是秋齊國夏帥師伐我西鄙夏國佐孫陽虎御季桓子公歛處父御孟懿子處父孟氏家臣成宰公歛陽將宵軍齊師齊師聞之墮伏而待之墮毁其軍以誘敵而設伏兵處父曰虎不圖禍而必死而汝也苫夷曰虎䧟二子于難苫夷季氏家臣二子季孟不待有司余必殺汝虎懼乃還不敗八年春王正月公侵齊報前年伐我西鄙門于陽州攻具門士皆坐列言無鬭志曰顔髙之弓六鈞皆取而傳觀之陽州人出顔髙奪人弱弓籍丘子鉏擊之與一人俱斃子鉏齊人斃仆也偃且射子鉏中頰殪子鉏死顔息射人中眉顔息魯人退曰我無勇吾志其目也以自矜師退冉猛僞傷足而先猛魯人欲先歸其兄㑹乃呼曰猛也殿㑹見師退而猛不在列乃詐言殿也二月公侵齊未得志故攻廩丘之郛郛郭也主人焚衝衝戰車或濡馬褐以救之馬褐馬衣遂毁之毁郛主人出師奔攻郛人少故遣後師走往助陽虎僞不見冉猛者曰猛在此必敗陽州之役猛先歸言若在此必復敗猛逐之顧而無繼僞顚逐廪丘人虎曰盡客氣也言皆客氣非勇夏齊國夏髙張伐我西鄙報上二侵晉士鞅趙鞅荀寅救我公㑹晉師于瓦瓦衛地東郡燕縣東北有瓦亭九年六月伐陽關討陽虎也陽虎使焚萊門陽闗邑門師驚犯之而出奔齊秋齊侯伐晉夷儀爲衛討也敝無存之父將室之辭以與其弟無存齊人室之爲取婦曰此役也不死反必娶于髙國髙氏國氏齊貴族也先登求自門出死于霤下既入城夷儀人不服故鬭死于門屋霤下東郭書讓登登城非人所樂故讓衆使後而已先登也犂彌從之曰子讓而左我讓而右使登者絶而後下恐書先下故又譎以讓之下入城也書左彌先下書從彌言左彌遂自先下亦讓也書與王猛息戰訖共止息猛曰我先登書歛甲曰曩者之難今又難焉歛甲起欲擊猛猛笑曰吾從子如驂之靳靳車中馬也言已從書如驂馬之随靳傳言齊師和所以能克晉車千乘在中牟救夷儀也今滎陽有中牟縣廻逺疑非也衛侯將如五氏齊侯在五氏將往助之卜過之龜焦衛至五氏道過中牟畏晉故卜龜焦兆不成不可以行事也衛侯曰可也衛車當其半寡人當其半敵矣衛侯怒晉甚不復顧卜欲以身當五百乘乃過中牟中牟人欲伐之衞褚師圃亡在中牟曰衛雖小其君在焉未可勝也齊師克城而驕其帥又賤城謂夷儀也帥謂東郭也遇必敗之不如從齊乃伐齊師敗之獲齊車五百乘齊侯致禚媚杏于衛三邑皆齊西界以答謝衛意齊侯賞犂彌辭曰有先登者臣從之晳幘而衣貍製晳白也幘齒上下相值製裘也公使視東郭書曰乃夫子也吾貺子公賞東郭書辭曰彼賓旅也言彼與我若賓主相讓旅俱進退乃賞犂彌十年夏晉趙鞅圍衛報夷儀也初衛侯伐邯鄲午于寒氏邯鄲廣平縣也午晉邯鄲大夫寒氏即五氏也前年衛人助齊伐五氏城其西北而守之宵熸午衆霄散及晉圍衛午以徒七十人門于衛西門殺人于門中曰請報寒氏之役衛開門與午鬭渉佗曰夫子則勇矣然我徃必不敢啟門亦以徒七十人旦門焉歩左右皆至而立如植至其門下歩行門左右然後立待如木不動以示整日中不啟門乃退十二年夏衛公孟彄帥師伐曹克郊郊曹邑還滑羅殿羅衛大夫未出不退于列未出曹境羅不退在行列之後其御曰殿而在列其爲無勇乎羅曰與其素厲寧爲無勇素空也厲猛也言伐小國當如畏者以誘致之十二月公圍成成彊若列國興動大衆故出入皆告廟初仲由爲季氏宰仲由子路將墮三都三都費郈成也彊盛將爲國害故仲由欲毁之於是叔孫氏墮郈季氏將墮費公山不狃叔孫輒帥費人以襲魯不狃費宰也輒不得志于叔孫氏公與三子入于季氏之宮登武子之臺費人攻之弗克入及公側至臺下仲尼命申句須樂頎下伐之二子魯大夫仲尼時爲司㓂費人北國人追之敗諸姑蔑二子奔齊二子不狃叔孫輒遂墮費將墮成公歛處父謂孟孫墮成齊人必至于北門成在魯北境故且成孟氏之保障也無成是無孟氏也子僞不知佯不知我將不墮公圍之弗克十三年春齊侯衛侯次于垂葭實郥氏垂葭改名郥氏髙平鉅野縣西南有郥亭使師伐晉將濟河諸大夫皆曰不可邴意兹曰可意兹齊大夫鋭師伐河内今河内汲郡傳必數日而後及絳傳告晉絳不三月不能出河則我既濟水矣乃伐河内夏衛公孟彄帥師伐曹十一月荀躒韓不信魏曼多奉公以伐范氏中行氏弗克十四年二月辛巳楚公子結陳公孫佗人帥師滅頓以頓子牂歸頓子牂欲事晉背楚而絶陳好也夏吳伐越報五年越入吳越子勾踐禦之陳于檇李勾踐越王允常子勾踐患吳之整也使死士再禽焉不動使敢死之士徃輒爲吳所禽欲使吳師亂取之而吳不動使罪人三行屬劔于頸以劔注頸而辭曰二君有治治軍旅臣奸旗皷死軍令不敏于君之行前不敢逃刑敢歸死遂自剄也師屬之目越子因而伐之大敗之靈姑浮以戈擊闔廬姑浮越大夫闔廬傷將指取其一屨其足大指見斬遂失屨姑浮取之還卒於陘去㰎李七里十五年二月辛丑楚子滅胡以胡子豹歸吴之入楚也在四年胡子盡俘楚邑之近胡者俘取也楚旣定胡子豹又不事楚曰存亡有命事楚何爲多取費焉傳言小不事大所以亡五月鄭罕逹帥師伐宋敗宋師于老丘罕逹子􅀢之子老丘宋地宋公子地奔鄭鄭人爲之伐宋欲取地以處之哀公元年春楚子陳侯隨侯許男圍蔡報柏舉也在定四年里而栽栽設板築爲圍壘周匝去蔡城一里廣丈高倍壘厚一丈髙二丈夫屯晝夜九日夫猶兵也壘未成故令人在壘裏屯守蔡如子西之素子西本許爲壘當用九日而成蔡人男女辨辨别也男女各别係纍而出降使疆于江汝之間而還楚欲使蔡徙國在江水之北汝水之南求田以自安也蔡權聽命故楚師還蔡于是乎請遷于吳楚既還蔡人更叛就吳是春吳王夫差敗越于夫椒報檇李也檇李在定十四年夫椒吳郡吳縣西南大湖中椒山遂入越越子以甲楯五千保于㑹稽上㑹稽山也在㑹稽山隂縣南使大夫種因吳太宰嚭以行成吳子將許之伍貟曰不可臣聞之樹德莫如滋去疾莫如盡昔有過澆殺斟灌以伐斟鄩澆寒浞子封於過者二斟夏同姓諸侯襄四年傳曰澆用師滅斟灌滅夏后相夏后相啓孫也后相失國依于二斟復爲澆所滅后緍方娠逃出自竇后緍相妻娠懐身也歸于有仍后緍有仍氏女生少康焉爲仍牧正牧官之長惎澆能戒之惎毒也戒備也澆使椒求之椒澆臣逃奔有虞爲之庖正以除其害虞舜後諸侯也梁國有虞縣庖正掌膳饈之官賴此以得除其害虞思於是妻之以二姚思有虞君也虞思自以二女妻少康姚虞姓而邑諸綸綸虞邑有田一成有衆一旅方十里爲成五百人爲旅能布其德而兆其謀兆始以收夏衆撫其官職襄四年傳曰靡自有鬲氏收二國之燼以滅浞而立少康使女艾諜澆女艾少康臣諜侯也使季杼誘豷豷澆弟也季杼少康子后杼也遂滅過戈復禹之績過澆國戈豷國祀夏配天不失舊物物事也今吳不如過而越大于少康或將豐之不亦難乎言與越成是使越豐大必爲吳難勾踐能親而務施施不失人所加惠賜皆得其人親不棄勞推親愛之誠則不遺小勞與我同壤而世爲仇讎于是乎克而弗取將又存之違天而長㓂讎猶言天與不取後雖悔之不可食已食消也已止也姫之衰也日可俟也姬吳姓言可計日而待介在蠻夷而長㓂讎以是求伯必不行矣弗聽退而告人曰越十年生聚而十年教訓生民聚財富而後敎之二十年之外吳其爲沼乎謂吳宮室廢壞當爲汙地爲二十二年越入吳起本三月越及吳平夏四月齊侯衛侯救邯鄲圍五鹿趙稷以邯鄲叛范中行氏之黨也五鹿晉邑秋八月吳侵陳修舊怨也初吳之入楚也在定四年使召陳懷公懷公朝國人而問焉曰欲與楚者右欲與吳者左陳人從田無田從黨都邑之人無田者隨黨而立不知所與故直從所居在西者居右在東者居左逢滑當公而進當公不左不右曰臣聞國之興也以福其亡也以禍今吳未有福楚未有禍楚未可棄吴未可從及夫差克越乃修先君之怨以晉辭吴若何陳侯從之是秋師及齊師衛孔圉鮮虞人伐晉取棘蒲孔圉孔烝鉏曽孫鮮虞狄帥冬仲孫何忌帥師伐邾二年春季孫斯叔孫州仇仲孫何忌帥師伐邾將伐絞絞邾邑邾人愛其土故賂以漷沂之田而受盟三年春齊國夏衛石曼姑帥師圍戚曼姑爲子圍父知其不義故推齊爲兵首求援于中山中山鮮虞夏宋樂髠帥師伐曹冬叔孫州仇仲孫何忌帥師圍邾四年夏楚人既克夷虎夷虎蠻夷叛楚者乃謀北方左司馬昄申公壽餘葉公諸梁致蔡于負函三子楚大夫也此蔡之故地人民楚因以爲邑致之者㑹其衆也致方城之外於繒闗負函繒闗皆楚地曰吳將泝江入郢逆流曰泝將奔命焉爲一昔之期襲梁及霍僞辭當備吳夜結其旅明日便襲梁霍使不知之梁河南梁縣西南故城也梁南有霍陽山皆蠻子之邑也單浮餘圍蠻氏蠻氏潰浮餘楚大夫蠻子赤奔晉陰地隂地河南山北自上雒以東至陸渾司馬起豐析與狄戎楚司馬昄也析縣屬南郷郡析南有豐鄉皆楚邑發此二邑人及戎狄以臨上雒左師軍于莬和莬和山在上雒東也右師軍于倉野倉野在上雒縣使謂隂地之命大夫士蔑命大大别縣監尹曰晉楚有盟好惡同之若將不廢寡君之願也不然將通于少習以聽命少習商縣武關也將大開武關道以伐晉士篾請諸趙孟趙孟曰晉國未寧安能惡於楚必速與之未寧時有范中行之難士蔑乃致九州之戎九州戎在晉陰地陸渾者將裂田以與蠻子而城之以詐蠻子且將爲之卜卜城蠻子聽卜遂執之與其五大夫以畀楚師于三户今丹水縣北三户亭司馬致邑立宗焉以誘其遺民楚復詐爲蠻子作邑立其宗主而盡俘以歸五年夏齊侯伐宋晉趙鞅伐衛范氏之故也遂圍中矣衛助范氏故也六年春晉趙鞅帥師伐鮮虞治范氏之亂也四年鮮虞納荀寅于栢人吳伐陳復修舊怨也元年未得志故楚子曰吾先君與陳有盟不可以不救乃救陳師于城父卜戰不吉卜退不吉王曰然則死也再敗楚師不如死前已敗于栢舉今若退還亦是敗棄盟逃讎亦不如死死一也其死讎乎將戰王有疾攻大㝠卒于城父大㝠陳地吳師所在仲孫何忌帥師伐邾宋向巢帥師伐曹七年春宋皇瑗帥師侵鄭叛晉故也定八年鄭始叛晉衛曼多帥師侵衛衛不服也五年晉伐衛至今未服秋公伐邾初季康子欲伐邾乃饗大夫以謀之子服景伯曰小所以事大信也大所以保小仁也背大國不信大國吳也伐小國不仁民保于城城保于德失二德者危將焉保二德信與仁也孟孫曰二三子以爲何如怪諸大夫不言故指問之惡賢而逆之孟孫賢景伯欲使大夫不逆其言惡猶安也對曰禹合諸侯於塗山執玉帛者萬國諸大夫對也諸侯執玉附庸執帛塗山在壽春東北今其存者無數十焉唯大不字小小不事大也言諸侯相伐古來以然知必危何故不言知伐邾必危自當言今不言者不危故也大夫以荅孟孫所怪且阿附季孫魯德如邾而以衆加之可乎孟孫忿答大夫今魯德無以勝邾但欲恃衆可乎言不可不樂而出季孟意異佞直不同故罷饗秋伐邾及范門邾郭門也猶聞鐘聲邾不禦㓂大夫諫不聽茅成子請告于吳成子邾大夫茅夷鴻不許曰魯擊柝聞于邾言以諫近吳二千里不三月不至何及于我且國内豈不足言足以距魯成子以茅叛髙平西南有茅鄉亭師遂入邾處其公宮衆師晝掠虜掠取財物也邾衆保于繹繹邾山也在鄒縣北師宵掠以邾子益來益邾隱公也晝夜掠傳言康子無法獻于毫社以其亡國與殷同囚諸負瑕負瑕故有繹負瑕魯邑髙平南平陽縣西北有瑕丘城前者魯得邾之繹民使在負瑕故使相就以辱之是秋宋人圍曹鄭桓子思曰宋人有曹鄭之患也不可以不救冬鄭師救曹侵宋八年春宋公伐曹將還褚師子肥殿子肥宋大夫曹人詬之不行詬詈辱也不行殿兵止也師待之公聞之怒命反之遂滅曹伯及司城疆以歸是春吳伐我初吳爲邾故將伐魯問于叔孫輒問可伐不輒故魯人叔孫輒對曰魯有名而無情有大國名無情實伐之必得志焉退而告公山不狃不狃亦故魯人公山不狃曰非禮也君子違不適讎國違奔亡也未臣而有伐之奔命焉死之可也未臣所適之國若有伐本國者則可還奔命死其難所託也則隱魯所因託則爲之隱惡且夫人之行也不以所惡廢鄉不以其私怨惡廢棄其郷黨之好今子以小惡而欲覆宗國不亦難乎輒魯公族故謂之宗國若使子率子必辭王將使我子張病之子張輒也王問于子洩子洩不狃對曰魯雖無與立緩時若無能自立必有與斃急則人人知懼皆將同死戰諸侯將救之未可以得志焉晉與齊楚輔之是四讎也與齊而四夫魯齊晉之唇唇亡齒寒君所知也不救何爲三月吳伐我子洩率故道險從武城故由險道欲使魯成備初武城或有因于吳竟田焉僑田吳界拘鄫人之漚菅者曰何故使吾水滋鄫人亦僑田吳滋濁也及吳師至拘者道之以伐武城克之鄫人敎吳必可克王犯嘗爲之宰澹臺子羽之父好焉國人懼王犯吳大夫故嘗奔魯爲武城宰澹臺子羽武城人孔子弟子也其父與王犯相善國人懼其爲内應懿子謂景伯若之何對曰吳師來斯與之戰何患焉且召之而至又何求焉言犯盟伐邾所以召吳吳師克東陽而進舍于五梧明日舎于蠶室三邑魯地公賓庚公甲叔子與戰于夷獲叔子與析朱鉏公賓庚公甲叔子并析邾鉏爲三人皆同車傳互言之獻于王王曰此同車必使能國未可望也同車能俱死是國能使人故不可望得明日舍于庚宗遂次于泗上微虎欲宵攻王舎微虎魯大夫私屬徒七百人三踊於幕庭于帳前設格令士試躍之卒三百人有若與焉卒終也終得三百人任行有若孔子弟子與在三百人中及稷門之内三百人行至稷門或謂季孫曰不足以害吳而多殺國士不如已也乃止之吳子聞之一夕三遷畏微虎吳人行成求與魯成將盟景伯曰楚人圍宋易子而食析骸而㸑在宣十五年猶無城下之盟我未及虧而有城下之盟是棄國也吳輕而逺不能乆將歸矣請少待之弗從景伯負載造于萊門以言不見從故負載書將欲出盟乃請釋子服何于吳吳人許之以王子姑曹當之而後止釋舎也魯人不以盟爲了欲因留景伯爲質既得吳之許復求吳王之子以交質吳不欲留王子遂兩止吳人盟而還夏五月齊人取讓及闡宣元年傳曰内不言取言取授之也以是爲賂齊言取葢亦賂也魯前年伐邾以邾益來葢齊之甥畏齊故賂之惡内也初齊悼公之來也在五年季康子以其妹妻之即位而逆之季魴侯通焉魴侯康子叔父女言其情弗敢與也齊侯怒鮑牧帥師伐我取讙及闡六月齊使如吳請師將以伐我乃歸邾子齊未得季姬故請師也吳前爲邾討魯懼二國同心故歸邾子邾子又無道吳子使大宰子餘討之子餘大宰嚭囚諸樓臺栫之以棘栫雍也使諸大夫奉太子革以爲政革邾太子桓公也册府元龜卷二百五十
