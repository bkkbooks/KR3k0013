  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_192-1a}
body:
  text: 册府元龜卷一百九十二宋王欽若等撰閏位部文學好文頌美文學夫文以成天下之化學以通聖人之業是故有國者知教所繇興文足昭也執之以為要道行之以為大政炳然煥乎信可觀矣自三國既分六朝更王純粹攸鍾賢明間作乃有耽玩墳史奮揚藻翰或賦詠傳扵一時或著譔流扵冊府乃至博通異學深究𤣥理専精靡懈成乎素業盖江左文物之盛繇乎上之所好也其或溺雕蟲之巧昧經國之圖屑屑然縁情是勤属詞以亟君臣相尚寖以成風波流頺靡宕而忘返斯其弊也東魏北齊頗有章句之學亦并紀焉吳大帝嘗謂吕蒙及蔣欽曰卿今竝當塗掌事宜學問以自開益䝉曰在軍中常苦多務恐不容復讀書帝曰孤豈欲卿治經為博士邪但當令渉獵見徃事耳卿言多務孰若孤孤少時歴詩書禮記左傳國語惟不讀易至統事以来省三史諸家兵書自以為大有所益如卿二人意性朗悟學必得之寧當不為乎宜急讀孫子六韜左傳國語及三史孔子言終日不食終夜不寝以思無益不如學也光武當兵馬之務手不釋卷孟徳亦自謂老而好學不自勉朂邪景帝休年十三從中書郎謝慈郎中盛冲受學休銳意於典籍欲畢覽百家之言又好射雉春夏之間嘗辰出夜還宋文帝好儒雅博渉經史善𨽻書孝武帝少機穎神明爽發讀書七行俱下才藻甚美前廢帝少好讀書頗識古事自造世祖誄及雜篇徃徃有辭采明帝好讀書愛文義在藩時撰江左以来文章志又續衛瓘所注論語一卷行於世帝寛仁待物才學之士多䝉引進叅侍文籍應對左右於華林園含芳堂講周易嘗自臨聽又嘗造皇業頌通國風辭天符頌明徳頌帝圖頌治兵大雅白紵篇大雅南齊太祖年十三受業於雷次宗治禮及左氏春秋其後關康之尤善左氏春秋帝為領軍素好此學送春秋五經康之手自㸃定并得論禮記十餘條帝甚恱寳愛之在位所著文詔中書侍郎江淹撰次之又詔東觀學士撰史林三十篇魏文帝皇覽之流也梁髙祖文思欽明能事畢究少而篤學洞達儒𤣥雖萬機多務猶卷不輟手燃燭側光嘗至戊夜造制㫖孝經義周易講疏及六十四卦二擊文言序卦等義樂社義毛詩春秋荅問尚書大義中庸講疏孔子正言老子講疏凡二百餘卷竝正先儒之迷開古聖之㫖王侯朝臣皆奉表質疑帝皆為解釋天監初勅何佟之賀瑒嚴植之明山賓等覆述制㫖并撰吉凶賓軍嘉五禮凡一千餘卷帝稱制斷疑又造通史躬製賛序凡六百卷天性睿敏下筆成章千賦百詩直疏便就皆文質彬彬超邁古今詔誥銘誄箴頌牋奏爰初在田洎登寳厯凡諸文集又百二十卷六藝備嫻又撰金䇿三十卷草𨽻尺牘莫不竒妙劉孺為太子中書舎人常侍宴夀光殿詔羣臣賦詩時孺與張率竝醉未及賦帝取孺手板題戲之曰張率東南美劉孺雒陽才攬筆便應就何事久遲廻簡文帝幼而敏睿識悟過人六嵗便屬文髙祖驚其早就弗之信也乃於御前面試辭采甚美髙祖歎曰此子吾家之東阿讀書則十行俱下九流百氏經目必記章篇辭賦操筆立成博綜羣書善言𤣥理雅好題詩其序曰余七嵗有詩癖長而不倦然傷於輕豔當時號曰宫體所著昭明太子傳五卷諸王傳三十卷禮大義二十卷老子義二十卷莊子義二十卷長春義記一百卷法寳連璧三百卷文集百卷竝傳於代太清中侯景謀反合州刺史鄱陽王範司州刺史羊鴉仁竝累有啟聞而中領軍朱异阿諛承㫖以景立孤寄命必應不爾朝廷不為之備及冦城門内外文武咸尤之太子制圍城賦其末云彼髙冠及厚履竝鼎食而乘肥升紫霄之丹地排玉殿之金扉賛謀謨之啟沃宣政刑之福威四郊以之多壘萬邦以之未綏問豺狼其何者訪虺蜴之為誰盖以指朱异异因慙憤發病卒先是文士王融謝朓沈約文章始用四聲以為新變至是轉拘聲韻彌尚麗靡復踰於徃時帝初為太子時與湘東王書論之曰吾輩亦無所㳺賞止是披閲性既好文時復短詠雖是庸音不能閣筆有慙伎癢更同故態比見京師文體懦鈍殊常競學浮疎争為闡緩𤣥冬脩夜思所不得既殊比興正背風騷若夫六典三禮所施則有所未聞吟情詠性反擬内則之篇操筆冩志更摹酒誥之作遲遲春日飜學歸藏湛湛江水遂同大傳吾既拙於文不敢輕有掎摭但以當世之作厯萬古之才人逺則揚馬曹王近則潘陸顔謝而觀其遣辭用心了不相似若以今文為是則昔人為非昔賢可稱則今體宜棄俱為盡格則未之敢許又時有效謝康樂裴鴻臚文者亦頗有惑焉何者謝客吐言天授出於自然時有不拘是其糟粕裴氏乃是良史之才了無篇什之美是謂學謝則不届其精華但得其冗長師裴則蔑絶其所長唯得其所短謝故巧不可階裴亦質不宜慕故胸馳臆斷之侣好名忘實之類方六駁於仁獸逞郤克於邯鄲入鮑忘臭效尤致禍决羽謝生豈三千之可及伏膺裴氏懼兩唐之不傳故玉徽金銑反為拙目所嗤巴人下里更合郢中之聽陽春髙而不和妙聲絶而不尋竟不精討錙銖覆量文質有異巧心終愧妍手是以握瑜懐玉之士瞻鄭邦而知退章甫翠履之人望闕鄉而歎息詩既若此筆又如之徒以烟墨不言受其驅染紙札無情任其揺襞甚矣哉文之横流一至於此近如謝朓沈約之詩任昉陸倕之筆斯實文章之冠冕述作之楷模張士簡之賦周斗逸之辨亦成佳手難可復遇文章未墜必有英絶領袖之者非弟而誰毎欲論之無可與語吾之子建一共商㩁辨茲清濁使如涇渭論兹月旦類彼汝南朱丹既定雌黄有别使夫懐䑕知恧濫竽自恥譬斯袁紹畏見子将同彼盗牛遥羞王烈相思不見我勞如何元帝聰悟俊朗天才英發年五嵗髙祖問汝讀何書對云能誦曲禮髙祖曰汝試言之即誦上篇左右莫不驚異帝好學博總羣書下筆成章出言為論才辨敏速冠絶一時著述詞章多行於世所著孝徳傳三十卷忠臣傳三十卷丹陽尹傳十卷注漢書一百一十五卷周易講數十卷内典博要一百卷連山三十卷洞林三卷玉韜金樓子十卷老子講疏四卷全徳志懐舊志江州記貢職圖古今同姓名録各一卷筮經十二卷式賛三卷文集五十卷性愛書籍既患目多不自執卷置讀書左右番次上直晝夜為常畧無休已雖睡卷猶不釋五人各伺一更常至達曉嘗眠熟大鼾左右又睡讀失次第或偷卷度紙帝必驚覺更令追讀加以夏楚雖戎畧殷凑機務繁多軍書羽檄文章詔誥㸃毫便就殆不逰手嘗曰我韜於文士愧於武夫論者以為得言初劉孝綽為廷尉卿坐携妾入官府免官時帝出為荆州與孝綽書曰君屏居多暇差得肆意典墳吟咏性情比復稀數古人不以委約而能不伎癢且虞卿史遷繇斯而作想摛屬之興益當不少雒地紙貴京師彼此一時何其盛也近在道務閒微得㸃翰雖紀行之作頗有懐舊之篇至此以来衆諸屑役小生之詆恐取辱於廬江遮道之姦慮興謀於從事方且褰帷自厲坐幙不休筆墨之功曽何暇豫至扵心乎愛矣未嘗有歇思樂恵音清風靡竟譬夫夢想温玉饑得明珠雖愧卞隋猶為好事新有所製想能示之忽等清慮徒虚其情無繇賞悉遣此代懐數路計行遲還芳禮遲音雉待也孝綽荅曰伏承自辭皇邑爰至荆臺未勞刺舉且摛髙麗近雖預觀尺錦而不覩全玉昔臨淄詞賦悉與楊脩未殫寳笥顧慙先哲渚宫舊俗朝衣多故李固之薦二賢楊厚賀純也李固為荆州聞厚純以病免歸薦扵天子有詔徴用徐璆之奏五郡徐璆為荆州奏五郡守有盛汚者案罪威懐之道兼而有之當欲使金石流功恥用翰墨垂迹雖乖知二偶達聖心爰有退居素里却投窮閈類楊倫之不出譬張摯之杜門趙卿窮愁肆言得失漢臣鬱志廣叙盛衰彼此一時擬非其匹竊以文豹何辜以文為罪繇此而談又何容易故韜翰吮墨多歴寒暑既闕子幼南山之歌又微敬通渭水之賦無以自通獻笑少酬褒誘且才乖體物不擬作於𤣥根事殊宿諾寧貽懼於朱亥顧已反躬載懐累息但瞻言漢廣邈若天涯區區一心分宵九逝殿下降情白屋存問相尋食椹懐音矧伊人矣後梁宣帝詧幼而好學善屬文篤好文義所著文集十五卷華嚴般若法華金光明義疏三十六卷遂行於世明帝巋機辨有文學所著文集及孝經周易義記及大小乘幽微竝行於世陳後主所製文筆卷軸甚多乃别冩一本付姚察有疑悉令刋定後又善作詩及隋兵渡江猶作詩不輟及朝隋文帝東廵登芒山侍飲賦詩東魏孝静帝好文毎嘉辰宴會多命羣臣賦詩從容沉雅有孝文風北齊廢帝為太子時文宣召朝臣文學者及禮學官於宫宴會令以經義相質親自臨聽太子手筆措問在坐莫不歎美孝昭帝所覽文籍源其指歸而不好文綵篤志讀漢書後主幼而念善及長頗學綴文置文林館引諸文士焉好文夫率性異禀雅意好文服勤先聖之道潤色偏方之業聞諸國史真可尚也或加禮上庠廣集儒雅或會文華觀妙著聲詩偃素風於人上流徽猷於域中與夫樂在畋逰勤於宴喜量徳比義我無慙焉吳後主建衡中薛瑩領太子少傅後主追歎瑩父綜遺文且命瑩繼作瑩獻四言詩三百餘言宋文帝好儒雅命丹陽尹何尚之立𤣥素學著作郎何承天立史學司徒㕘軍謝𤣥立文學各聚門徒多就業者江左風俗於斯為美後言政化稱元嘉焉孝武孝建初檀超坐事徙梁州牧宣威府參軍帝聞超有文章勅還直東宫除驃騎參軍丘靈鞠為員外郎孝武殷貴妃亡靈鞠獻挽歌詩三首云雲横廣堦闇霜深髙殿寒帝擿句嗟賞明僧暠僧紹之弟亦好學孝武見文吟誦其名時人以為榮明帝時丘巨源以文學為時所知使參詔誥引在左右南齊武帝時顧歡卒帝詔歡諸子撰歡文義三十卷梁髙祖即位引後進文學之士劉苞及從兄孝綽從弟沆吳郡陸倕張率竝以文藻見知多預讌坐雖仕進有前後其賞賜不殊帝雅好辭賦時獻文於南闕者相望其藻麗可觀或見賞擢袁峻天監初為鄱陽王恢都曹參軍擬揚雄官箴奏之髙祖嘉焉賜束帛除員外散騎侍郎直文徳學士省奉勅與陸倕各製新闕銘張率為祕書丞天監四年三月禊飲光華殿其日河南國獻舞馬詔率賦之率時又與到沆周興嗣同奉詔為賦髙祖以率及興嗣為工周興嗣善屬文髙祖革命奏休平賦其文甚美帝嘉之擢直文徳夀光省是時帝以三橋舊宅為光宅寺勅興嗣陸倕各製寺碑及成俱奏帝用興嗣所製者興嗣為文毎奏帝輒稱善到洽與從弟沆齊名洽為太子舎人髙祖御幸華光殿詔洽及沆蕭琛任昉侍讌賦二十韻詩洽辭為工賜絹二十疋髙祖謂昉曰諸到可謂才子昉對曰臣嘗竊議宋得其武梁得其文丘遲字希範髙祖時待詔文徳殿帝著連珠詔遲與群臣繼作者數十人劉孝綽為水部郎中髙祖雅好蟲篆時因宴幸命沈約任昉等言志賦詩到沆為太子洗馬時文徳殿置學士省召髙才碩學者待詔其中使校墳史詔沆通籍焉盧柔初為後魏賀抜勝荆州大行臺郎中勝敗南奔于梁柔亦從之勝頻表梁求歸髙祖覽表嘉其辭彩既知柔所製因遣舎人勞問并遺縑錦元帝時何遜文章與劉孝綽並見重於世世謂之何劉帝著論論之云詩多而能者沈約少而能者謝朓何遜陳後主時姚察為吏部尚書後主所製文筆卷軸甚多乃别寫一本付察有疑悉令刋定察亦雅心奉上事在無隠後主嘗從容謂朝士曰姚察達學洽聞手筆典裁求之於古猶難輩匹在於今世足為師範且訪對不休聽之使人忘倦察毎製文筆勅便索本嘗曰我姚察文章非唯玩味無已故是哲匠北齊文宣帝天保八年三臺成帝曰臺成湏有賦楊愔先以告魏收收上皇居新殿臺賦其文壯麗作者咸不逮焉後主頗好諷詠幼穉時曽讀詩賦語人云終有解作此理否及長亦少留意初因畫屏風勅通直郎蘭陵蕭放及晉陵王孝武録古名賢烈士及近代輕豔諸詩以充圖畵帝彌重之後復進齊州録事參軍蕭慤趙州功曹參軍顔之推同入撰猶依覇朝謂之館客放及之推意欲更廣其事又祖珽輔政愛重之推又託鄧長顒漸說後主屬意斯文三年祖珽奏立文林館於是更召𢎞文學士謂之待詔文林館焉之推後為黄門侍郎與中書侍郎李徳林同判文林館事頌美夫善則稱君人臣之道也頌以揚徳有司之職也自王澤下流詩人攸作莫不述宣盛烈褒賛耿光使休徳清英久而彌劭繇是道也秦氏以降迨于六朝或以威武旁暢或以逰廵博覽或景命之始集或嘉瑞之薦臻繇是羣臣文士思揚懿範亦乃將順徳美追蹤雅頌俾茂功徽烈清明不冺淑聲餘裕彬蔚可觀斯亦風雅之亞也是皆推愛君之分竭為臣之忠拳拳而不能自已者焉秦始皇二十八年東行郡縣上鄒嶧山鄒魯縣山在其北立石與魯諸儒生議刻石頌秦徳議封禪望祭山川之事乃遂上泰山立石封祠祀増天之髙歸功於天天髙不可及於泰山上立封禪而祭之冀近神靈也積土為封謂負土於泰山上為壇而祭之禪梁父禪闡廣土地也古者聖王封泰山禪亭亭或梁父皆泰山下除地為墠祭於梁父後改墠曰禪刻所立石其辭曰皇帝臨位作制明法臣下修飭二十六年初并天下罔不賓服親廵逺方黎民登兹泰山周覽東極從臣思迹本原事業祗誦功徳治道運行諸産得宜皆有法式大義休明垂于後世順承勿革皇帝躬聖既平天下不懈為治夙興夜寐建設長吏専隆教誨訓經宣達逺近畢理咸承聖志貴賤分明男女禮順慎遵職事昭隔内外隔一作融靡不清浄施于後嗣化及無窮遵奉遺詔永承重戒於是乃竝渤海以東過黄腄窮成山登之罘立石頌秦徳焉而去南登琅邪作瑯邪臺立石刻頌秦徳明徳意曰維二十六年皇帝作始端平法度萬物之紀以明人事合同父子聖智仁義顯白道理東撫東土以省卒士事已大畢乃臨于海皇帝之功勤勞本事上農除末黔首是富普天之下摶心揖志器械一量同書文字日月所照舟車所載皆終其命莫不得意應時動事是維皇帝匡飭異俗陵水經地憂恤黔首朝夕不懈除疑定法咸知所辟方伯分職諸治經易舉錯必當莫不如畫皇帝之明臨察四方尊卑貴賤不踰次行姦邪不容皆務貞良細大盡力莫敢怠荒逺邇辟隱専務肅莊端直敦忠事業有常皇帝之徳存定四極誅亂除害興利致福節事以時諸産繁殖黔首安寧不用兵革六親相保終無冦賊驩欣奉教盡知法式六合之内皇帝之土西渉流沙南盡北戸東有東海北過大夏人迹所至無不臣者功盖五帝澤及牛馬莫不受徳各安其宇維秦王兼有天下立名為皇帝乃撫東土至于琅邪列侯武城侯王離列侯通武侯王賁倫侯建城侯趙亥倫侯昌武侯成倫侯武信侯馮毋擇丞相隗狀丞相王綰卿李斯卿王戊五大夫楊樛從與議扵海上曰古之帝者地不過千里諸侯各守其封域或朝或否相侵暴亂殘伐不止猶刻金石以自為紀古之五帝三王知教不同法度不明假威鬼神以欺逺方實不稱名故不久長其身未歿諸侯倍叛法令不行今皇帝竝一海内以為郡縣天下和平昭明宗廟體道行徳尊號大成羣臣相與誦皇帝功徳刻于金石以為表經二十九年始皇東㳺登之罘刻石其辭曰維二十九年時在中春陽和方起皇帝東㳺廵登之罘臨照于海從臣嘉觀原念休烈追誦本始大聖作治建定法度顯著綱紀外教諸侯光施文恵明以義理六國回辟貪利無厭虐殺不已皇帝哀衆遂發討師奮揚武徳義誅信行威燀旁達莫不賓服烹滅强暴振救黔首周定四極普施明法經緯天下永為儀則大矣哉宇縣之中宇宇宙縣赤縣承順聖意羣臣誦功請刻于石表垂于常式其東觀曰維二十九年皇帝春㳺覽省逺方逮于海隅遂登之罘昭臨朝陽觀望廣麗從臣咸念原道至明聖法初興清理疆内外誅暴强武威旁暢振動四極擒滅六王闡并天下菑害絶息永偃戎兵皇帝明徳經理宇内視聽不怠作立大義昭設備器咸有章旗職臣遵分各知所行事無嫌疑黔首改化逺邇同度臨古絶尤常職既定後嗣循業長承聖治羣臣嘉徳祗誦聖烈請刻之罘三十二年始皇之碣石刻碣石門其辭曰遂興師旅誅戮無道為逆滅息武殄暴逆文復無罪復一作優庶心咸服恵論功勞賞及牛馬恩服土域皇帝奮威徳并諸侯初一太平墮壊城郭决通川防夷去險阻地勢既定黎庶無繇天下咸撫男樂其疇女修其業事各有序恵彼諸産久竝来田久一作分莫不安所羣臣誦烈請刻此石垂著儀矩三十四年始皇置酒咸陽宫僕射周青臣進頌曰佗時秦地不過千里賴陛下神靈明聖定平海内放逐蠻夷日月所照莫不賓服以諸侯為郡縣人人自安樂無戰争之患傳之萬世自上古不及陛下威徳始皇恱三十七年始皇上會稽立石刻頌秦徳其文曰皇帝休烈平一宇内徳恵修長三十有七年親廵天下周覽逺方遂登會稽宣省習俗黔首齋莊羣臣誦功本原事迹追首髙明秦聖臨國詳定刑名顯陳舊章初平法式審别職任以立典常六王專倍貪戾慠猛率衆自强暴虐恣行負力而驕數動甲兵隂通間使以合衡縱行為辟方内飾詐謀外來侵邊遂起禍殃義威誅之殄熄暴悖亂賊滅亡聖徳廣宻六合之中被澤無疆皇帝并宇兼聽萬事逺近畢清運理羣物考驗事實各載其名貴賤竝通善否陳前靡有隠情餙省宣義省一作非有子而嫁倍死不貞防隔内外禁止滛泆男女潔誠夫為寄豭殺之無罪男秉義程妻為逃嫁子不得母咸化亷清大治濯俗天下承風䝉被休經皆遵度軌和安敦勉莫不順令黔首修潔人樂同則嘉保太平後敬奉法常治無極輿舟不傾從臣誦烈請刻此石光垂休銘吳大帝黄武八年夏黄龍見遂稱尊號因瑞改元又作黄龍牙在中軍胡綜作賦上焉宋文帝元嘉十八年八月庚午會稽山隂商世寳獲白鳩眼足竝赤揚州刺史始興王濬以獻太子率更令何承天上表曰謹考尋先典稽之前志王徳所覃物以應顯是以𤣥扈之鳯昭帝軒之鴻烈鄷宫之雀徴姬文之徽祚伏惟陛下重光嗣服永言祖武洽恵和於地給燭皇明於天區故能九服混心萬邦含愛員神降祥方祗薦裕休徴雜㳫景瑞畢臻去七月上旬時在昧旦黄輝洞照宇宙開朗徽風協律甘液灑津雖朱晃瑰瑋於運衡榮光圖靈於河紀蔑以尚兹臣不量卑懵竊慕擊壤有作相杵成謳近又預白鳩之觀目玩竒偉心歡盛烈謹獻頌一篇野思古拙意極庸陋不足發揮清英敷讃幽㫖瞻前顧後亦各其志謹冒以聞其白鳩頌曰三極協清五靈會性理感㝠符道實𤣥聖於赫有皇先天配命朝景升躔八維同暎休祥輻凑榮光載慶星辰昭爛日月光華陶山練澤是生柔嘉回龍表粹離穂合柯翻翩者鳩亦晈其暉理翮台嶺揚鮮帝畿匪仁莫集匪徳莫歸慕從儀鳯栖閣䕃闈蒸哉明后昧旦乾乾惟徳之崇其峻如山惟澤之瞻其潤如淵禮樂四達頌聲遐宣窮髪納貢九譯𨗳言伊昔唐萌愛逢慶祚余生既辰而年之暮提心命耋式歌王度晨晞永風夕潄甘露思樂靈臺不遐有固二十四年七月嘉禾旅生華林園及景陽山園丞梅道念以聞太尉江夏王義恭上表曰臣聞天髙聽卑上帝之功天且弗違聖王之故能影響二儀甄陶萬有鑒觀今古採驗圖緯未有道闕化虧而禎物著明者也自皇運受終辰曜交和是以卉木表靈山淵効寳伏惟陛下體乾統極休符襲建若乃鳯儀西郊龍見東邑海酋獻改緇之羽河祗開俟清之源三代象徳不能過也有幽必闡無逺弗屇重譯嵗至符瑞月臻前者躬藉南畆嘉榖乃植神明之應在斯允盛四海既穆五民樂業思述汾陽經始靈囿蘭林甫樹嘉露頻流版築初就祥穂如積太平之符於是乎在臣以寡立承乏槐鉉沐浴芳津預覩㝠慶不勝抃舞之情謹上嘉禾甘露頌一篇不足稱揚美烈追用悚汗其頌曰二象攸分三靈樂主齊應合從在今猶古天道無親唯仁斯輔皇功帝績理冠區宇四民均極我后體兹惟機惟神敬昭文思九族既睦萬邦允釐徳以位叙道致雍熙於穆不已顯允東儲王知夙叡嶽茂淵虚因心則哲令問𢎞敷繼徽下武儷景宸居軒制合宫漢興未央矧伊聖朝九有已康率由舊典思燭前王乃造凌霄遂作景陽有藹景陽天淵之涘清暑爽立雲堂時起動物斯生植類斯止極望江波徧對岳峙化徳惟達休瑞惟懋誕降嘉種呈祥初搆甘露春凝禎穂秋秀含滋匪烈嗣嵗仍富昔在放勲厯荚數朝降及重華何扇清庖鑠矣皇慶比物競昭倫攸典䇿被此風謡咨臣六蔽任兼兩司既恧仲衮又慙鄭緇豈忘衡泌樂道明時敢述休祉愧闕令辭又中領軍吉陽縣侯沈演之奏上嘉禾頌曰煥炳禎圖昭晰瑞典運傾方閟時亨始顯綈狀既章鳥文斯辨於皇聖辟承物既逺明兩辰麗昌輝天衍理妙位崇事神業盛淵渥徳澤虚寂道政協化安心調樂移性玉衡徙體瑶光徳正巨星垂采景徳立慶極仁所被㒺幽不攘至和所感靡貺弗彰鳯明丹穴鸚起西湘白鹿踰海素鳥越江結響窮隂儀刑鍾陽治人奉天乃勤乃格黛米俶載髙廪已積嘉禾重穋甘露流液擢秀辰畦揚穎角澤離穂合毫榮區䕃斥盈箱徴殷貫桑表周今我大宋靈貺繆綢帝終撝謙繹思揚休躬薦宗廟温恭率由降福以誠孝享䖍羞頌祉推功登徽叡詔恩覃隠賦賞延荒徼河順溓夷山華嶽曜憬琮夐賮兼澤委效日表地外改服請教茂對咸時綏萬屢豐厭厭歸素秩秩大同上藏諸用下知化工式我王度俯歌南風鴻名稱首永保無窮九月白鳩又見中領軍沈演之上表曰臣聞貞裕之美介於盛王休瑞之臻罔違哲后故鳴鳯表垂衣之化翔鷦徴解網之仁陛下道徳嗣基聖明纉世教清鳥紀治昌雲官禮漸同川澤浃朱徼天嘉明懿民樂薫風星辰以之炳煥日月以之光華神圖祗緯盈觀閟序白質黒章充牣靈囿應感之符畢臻而因心之祥未屬以素鳩自逺毨翰歸飛姿性嫻淑羽貌鮮麗既聞之先說又親覩嘉祥不勝藻忭上頌一首辭不稽典文乏采章愧不足式昭皇慶崇讃盛美盖率輿誦備之篇末其頌曰有哲其儀時惟皓鳩性勰五教名編素丘殷厯方昌婉翅来逰漢録克韡爰降爰休於顯盛烈叡慶遐傳聖皇在上道昭鴻軒稱施既平孝思永言人押於地神豫於天禮樂孔秩靈物咸昭白雀集苞丹鳯栖郊文騶儷跡同穎擢苗灼灼縞羽從化馴朝豈伊赴林必周之栩豈伊歸義必商之所惟徳是依惟仁是處育景陽嶽濯姿帝圉刑厯頌興理感迭通雉飛越裳鷺起西雍蒸然戾止實兼斯容一兹民聽穆是王風梁武帝天監元年既受齊禪周興嗣奏休平賦其文甚美十二年改構太極殿功畢太子洗馬王規獻新殿賦其辭甚美大通九年白雀集東宫太子率更劉孝威上頌其辭甚美大同中嘗驟雨殿前徃徃有雜色寳珠帝觀之甚有喜色宣城同左常侍虞寄上瑞雨頌後甘露降于士林館中褚脩獻甘露頌帝嘉之太清元年四月神馬出皇太子獻寳馬頌陳髙祖永定二年幸大莊嚴寺其夜甘露降宣毅府録事兼記室參軍顔光獻甘露頌辭義該典髙祖甚竒之册府元龜巻一百九十二
