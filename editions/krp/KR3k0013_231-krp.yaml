body:
  text: 冊府元龜卷二百三十一宋王欽若等撰僣偽部征伐昔晉室不造中原多故秦雒之郊左衽為孽各矜雄盛競事甲兵或偏據一方或開地千里僭大號以踰度率無名以出師交相侵凌逓搆傷殺以強威弱以衆暴寡生民塗炭宇縣分離雖人不聊生咸嬰多難而天將悔禍終亦自亡盖異時雨之行奉辭之義矣垂於是也可不鍳哉前凉張茂嗣其兄實為凉州牧㑹前趙劉曜遣其将劉咸攻茂將韓璞於冀城呼延實攻寧羌䕶軍隂鍳於桑壁臨洮人翟楷石琮等逐令長以縣應曜河西大震茂以参軍陳珍為平虜䕶軍率卒騎一千八百救韓璞曜隂欲引歸聲言要先取隴西後廻滅桑壁珍募發氐羌之衆撃曜走之尅復南安永昌初復命将軍韓璞率衆取隴西南安之地以攻秦州張駿嗣其季父茂為凉州牧咸和初秦州諸郡既屬劉曜駿遣武威太守竇濤金城太守張閬武興太守辛巗揚烈將軍宋輯等率衆東㑹韓璞攻討之曜遣其将劉𦙍来距屯於狄道城韓璞進渡沃干嶺為𦙍所敗事具僣偽兵敗門張重華嗣其父駿為凉州牧自稱凉王㑹後趙石季龍使王擢麻秋孫伏都等侵冦不輟金城太守張沖降於秋於是梁州振動重華以主簿謝艾為中堅将軍配歩騎五千撃秋大破之斬首五千級俄而麻秋進攻枹䍐不㧞退保大夏重華以謝艾為使持節軍師将軍率歩騎三萬進軍臨河秋以萬衆距之艾奔撃大敗之秋匹馬奔大夏其後麻秋又據枹䍐有衆十二萬進屯河内遣王擢略地晉興廣武越洪池嶺至扵曲栁姑臧大震於是以艾為使持節都督征討諸軍事行衛将軍以索遐為軍正将軍率歩騎二萬距王擢等擢與前鋒戰敗遁還河南還討叛虜斯骨真萬餘落破之斬首千餘級俘擒三千八百張天錫僣嗣凉州牧時羌㢘岐自稱益州刺史率略陽四千家背苻堅就李儼天錫自往討之以别駕楊遹為監前鋒軍事前将軍趨金城晉興相常據為使持節征東將軍向左南㳺撃将軍張統出白土天錫自率三萬人次倉松伐儼儼大敗入城固守前趙劉曜僣即帝位時黄石屠各路松多起兵於新平扶風聚衆數千附於南陽王保保以其将楊曼為雍州刺史王連為扶風太守據陳倉張顗為新平太守周庸為安定太守據隂宻松多下草壁秦隴氐羌多歸之曜遣其車騎劉雅平西劉厚攻楊曼于陳倉二旬不尅曜率中外精銳以赴之行次雍城太史令弁廣明言於曜曰昨夜妖星犯月師不宜行乃止勑雅等攝圍固壘以待大将軍三年曜發雍攻陳倉曼連謀曰諜者適還云其五牛旗建多言胡主自来其鋒恐不可當也吾粮廪既少無以支久若頓軍城下圍人百日不待兵刃而吾自䘮滅不如率見衆以一戰如其勝也闗中不待檄而至如其敗也一等死早晚無在遂盡衆背城而陣為曜所敗王連死之楊曼奔於南氐曜進攻草壁又陷之松多奔隴城進陷安定保懼遷於桑城氐羌悉從之曜振旅歸於長安其後曜親征氐羌仇池楊難敵率衆来距前鋒撃敗之難敵退保仇池仇池諸氐羌多䧏於曜曜後復西討楊韜於南安韜懼與隴西太守梁勛等降於曜皆封列侯使侍中喬豫率甲士五千遷韜等及隴右萬餘戸於長安曜又進攻仇池時曜寢疾兼厲疫甚議欲班師恐難敵躡其後乃以其尚書郎王獷為光國中郎将使於仇池以說難敵難敵於是遣使稱藩㑹陳安叛於隴上自稱梁王曜親征之圍於隴城安頻出挑戰累撃敗之斬獲八千餘級右軍劉幹攻平襄尅之隴上諸縣悉降曲赦隴右殊死以下惟陳安趙募不在其列安留楊伯支姜冲兒等守隴城率騎數百突圍而出欲引上邽平襄之衆還解隴城之圍安既出知上邽被圍平襄已敗乃南走陕中曜使其将軍平先丘中伯率劲騎追安頻戰敗之俘斬四百餘級安與壯士十餘騎於陕中格戰安左手奮七尺大刀右手執丈八蛇矛近交則刀矛俱發輒害五六逺則雙帶鞬服左右馳射而走平先亦壮健絶人勇㨗如飛與安搏戰三交奪其蛇矛而退㑹日暮雨甚安棄馬與左右五六人歩踰山嶺匿於溪澗翌日尋之遂不知所在㑹連雨始霽輔威呼延清尋其径迹斬安於澗曲曜大恱曜遣其武衛劉朗率騎三萬襲楊難敵於仇池弗尅掠三千餘戸而歸張駿聞曜軍為石氏所敗乃去曜官號復稱晉大将軍凉州牧遣金城太守張閬及𫀆䍐護軍辛晏韓璞等率衆數萬人自大夏攻掠秦州諸郡曜遣劉𦙍率歩騎四萬撃之夹洮相持七十餘日冠軍呼延那雞率親御郎三千騎絶其運路𦙍濟師逼之璞軍大潰奔還凉州𦙍追之及於令居斬級二萬張閬辛晏率衆數萬降於曜皆拜将軍封列侯石勒遣石季龍率衆四萬自軹闗西入伐曜河東應之者五十餘縣進攻蒲坂曜将東救蒲坂懼張駿楊難敵承虚襲長安遣其河間王述發氐羌之衆屯於秦州曜盡中外精銳水陸赴之自衛闗北濟季龍懼引師而退追之及於髙侯大戰敗之斬其将軍石瞻枕尸二百餘里收其資仗億計季龍奔于朝歌後趙石勒僣稱趙王使石季龍撃託候部掘咄哪於研北大破之俘獲牛馬二十餘萬尋署季龍為車騎将軍率騎三萬討鮮卑鬱粥於離石俘獲牛馬十餘萬鬱粥奔烏丸悉降其衆城又遣季龍統中外精卒四萬討徐龕龕堅守不戰於是築室反耕列長圍以守之其後季龍攻陷龕送之襄國又遣季龍統中外歩騎四萬討曺嶷降之劉曜於熈等去長安奔於上邽遣季龍討尅之石季龍僭稱居攝趙天王時羗簿句大猶保險未賓季龍遣其子章武王斌帥精騎二萬并秦雍二州兵以討之其後季龍又僣稱大趙天王将伐遼西鮮卑段遼募有勇力者三萬人皆拜龍驤中郎遼遣從弟屈雲襲幽州刺史李孟退奔易京季龍以桃豹為横海将軍王華為渡遼将軍統舟師十萬出漂渝津支雄為龍驤大將軍姚弋仲為冠軍将軍統歩騎十萬為前鋒以伐段遼季龍衆次金臺支雄長驅入薊遼漁陽太守馬鮑代相張牧北平相楊裕上谷相侯龕等四十餘城竝率衆降於季龍支雄攻安次斬其部大夫那樓竒遼懼棄令支奔於宻雲山遼左右長史劉羣盧諶司馬崔恱等封其府庫遣使請降季龍遣将軍郭太等輕騎二萬追遼及之戰於宻雲獲其母妻斬級三千遼單馬竄險遣子乞特真送表及名馬季龍納之乃遷其戸二萬餘於雍司兖豫四州之地諸有才行者皆擢敘之先是北單于乙回為鮮卑敦那所逐既平遼西遣其將李穆撃那破之復立乙回而還又遣石宣率歩騎二萬撃朔方鮮卑斛摩頭破之斬首四萬餘級季龍将討慕容皝令司冀青徐幽并雍兼復之家五丁取三四丁取二合鄴城舊軍滿五十萬具船萬艘自河適海運榖豆千一百萬斛於安樂城以備征軍之調徙遼西北平漁陽萬餘戸於兖豫雍雒四州之地又遣征北張舉自鴈門討索頭郁鞠尅之其後又遣麻秋討張重華以中書監石寧為征西將軍率并司州兵二萬餘人為麻秋等後繼張重華將宋秦等率戸二萬餘人来降河湟間氐羌十餘萬落與張璩相首尾麻秋憚之不進重華金城太守張沖又以郡降石寧麻秋尋次曲栁劉寧王擢進攻始興武街重華將楊康等與寧戰於沙阜寧敗績乃引還金城王擢尅武街執重華護軍曹權胡宣徙七千餘戸于雍州其後麻秋又襲重華將張瑁於河陕敗之斬首三千餘級枹䍐護軍李逵率衆七千降於季龍自河已南氐羌皆降前燕慕容雋僣即帝位先是後趙段龕因冉閔之亂擁衆東屯廣固自號齊王稱藩於建業遣書抗中表之儀非雋正位雋遣慕容恪慕容塵討之恪遇龕於濟水之南與戰大敗之遂斬其弟欽盡俘其衆恪進圍廣固尅之初冉閔之僣號也石季龍将李歴張平髙昌等竝率所部稱藩於雋遣子入侍既而投欵建業結援苻堅竝受爵位覊縻自固雖貢使不絶而誠節未盡吕䕶之走野王也遣弟奉表謝罪於雋拜寧南将軍河内太守又上黨馮鴦自稱太守附于張平平屢言之雋以平故赦其罪以為京兆太守䕶鴦亦隂通京師張平跨有新興鴈門西河太原上黨上郡之地壘壁三百餘胡晉十餘萬戸遂拜置征鎮為鼎峙之勢雋遣其司徒慕容評討平領軍慕容根討鴦司空陽騖討昌撫軍慕容臧攻歴并州壘壁降者百餘所以尚書右僕射恱綰為安西将軍領護匈奴中郎将并州刺史以撫之平所署征西諸葛驤鎮北蘇象寧東喬庶鎮南石賢等率壘壁百三十人降于雋雋大恱皆復其官爵既而平率衆三千奔于平陽鴦奔于野王歴走滎陽昌奔邵陵悉降其衆前秦苻健僭帝位時杜洪屯宜秋為其将張琚所殺琚自立為秦王置百官健率歩騎二萬攻琚斬其首健至自宜秋遣雄菁率衆掠關東并援石季龍豫州刺史張遇於許昌與晉鎮西將軍謝尚戰於潁水之上王師敗績苻堅僭稱天王時羌斂岐叛堅自稱益州刺史率部落四千餘家西依張天錫叛將李儼堅遣京兆尹王猛與隴西太守姜衡南安太守邵羌討斂岐於略陽攻破之斂岐奔白馬邵羌擒之㑹苻雙據上邽苻柳據蒲坂叛於堅苻庾據陜城苻武據安定並應之將兵伐長安堅遣使諭之各齧梨以為信皆不受堅命阻兵自守堅遣後禁將軍楊成世左將軍毛嵩等討雙武王猛鄧羌攻蒲坂楊安張蚝攻陜城成世毛嵩為雙武所敗堅又遣其武衞王鍳寧朔吕光等率中外精鋭以討之左衞苻雄左禁竇衝率羽林騎七千繼發雙武乘勝至於榆眉鑒等擊敗之斬獲萬五千人武棄安定隨雙奔上邽鑒等攻之苻柳出挑戰猛閉壘不應柳以猛為憚已留其世子良守蒲坂率衆二萬將攻長安長安去蒲坂百餘里鄧羌率勁騎七千夜襲敗之柳引軍還猛又盡衆邀撃悉俘其卒栁與數百騎入於蒲坂鑒等攻上邽尅之斬雙武猛又尋破蒲坂斬栁及其妻子傳首長安猛屯蒲坂遣鄧羌與王鑒等攻陥陕城尅之送庾於長安殺之慕容暐為晉所伐乞師於堅請割武牢以西之地王師既旋暐遣使謂堅曰頃者割地行人失辭有國有家分災救患理之常也堅大怒遣王猛與建威梁成鄧羌率歩騎三萬署慕容垂為冠軍将軍以為郷導攻暐雒州刺史慕容筑於雒陽暐遣其将慕容臧率精卒十萬將解筑圍猛使梁成等以精銳萬人卷甲赴之大破臧於榮陽筑懼而請降猛陳師以受之太和五年又遣猛率楊安張蚝鄧羌等十將率歩騎六萬伐暐既圍鄴堅躬率精銳十萬攻陷之暐出奔髙陽堅将郭慶執而送之初仇池氐楊世以地降扵堅堅署為平南将軍秦州刺史仇池公既而歸順於晉世死子纂代立遂受天子爵命而絶於堅世弟統驍武得衆起兵武都與纂分爭堅遣其将苻雅楊安與益州刺史王統率歩騎七萬先取仇池進圖寧益雅等次於鷲陕纂率衆五萬距雅晉梁州刺史楊亮遣督䕶郭寳率騎千餘人攻之戰於陕中為雅等所敗纂収衆奔還雅進攻仇池楊統率武都之衆降於雅纂将楊佗遣子碩宻降於雅請為内應纂懼面縳出降雅釋其縳送之長安以楊統為平逺将軍南秦州刺史加楊安都督鎮仇池時蜀人張育楊光等起兵與巴獠相應以叛于堅晉益州刺史竺瑶威逺将軍桓石䖍率衆三萬據墊江育乃自號蜀王遣使歸順與巴獠酋帥張重尹萬等五萬餘人進圖成都尋而育與萬争權舉兵相持堅遣鄧羌與楊安等撃敗之育光退屯緜竹安又敗張重尹萬於成都南重死之及首級二萬三千鄧羌復撃張育楊光於緜竹皆害之其後堅又遣其武衛将軍茍萇左将軍毛盛中書令梁熈歩兵校尉姚萇等率騎十三萬伐張天錫於姑臧又遣其秦州刺史茍池河州刺史李辯凉州刺史王統率三州之衆以繼之天錫遣將軍馬建掌據司兵趙充哲與萇等戰犬敗懼而奔還致牋請降堅既平凉州又遣其安北将軍幽州刺史苻雒為北討大都督率幽州兵十萬討代王渉翼犍又遣後将軍俱難與鄧羌等率歩騎二十萬東出和龍西出上郡與雒㑹於渉翼犍庭翼犍戰敗遁於弱水苻雒逐之勢窘廹退還隂山其子翼圭縛父請降雒等振旅而還後秦姚萇僣即帝位以弟征虜緒為司𨽻校尉鎮長安萇如安定撃平凉胡金熈鮮卑沒奕于大破之遂如秦州與苻堅秦州刺史王統相持天水屠各畧陽羌胡應萇者二萬餘戸統懼乃降其時苻登僣即帝位遣使拜苻纂為太師領大司馬纂敗萇將姚碩徳於涇陽萇自隂宻距纂纂退屯敷陸登將竇衝攻萇汧雍二城尅之又與萇戰於汧東為萇所敗登次於瓦亭萇攻彭沛榖堡陥之沛榖奔杏城萇遷隂宻登将征虜馮翊太守蘭犢率衆二萬自頻陽入於和寧與苻纂首尾将圖長安皆為萇所敗登進據胡空堡萇遣其将軍姚方城攻陥徐嵩堡嵩被殺悉坑戎士登率衆下隴入朝那萇據武都相持累戰互有勝負其後登進據茍頭原以逼安定萇率騎三萬夜襲大界營陥之殺登妻毛氏及其子弁尚擒名將數十人驅掠男女五萬餘口而去登收合餘兵退據胡空堡遣竇衝率見衆為先驅自繁川趣長安登率衆從新平径據新豐之千戸因使楊定率隴上諸軍為其後繼楊壁留守仇池又命其并州刺史楊政冀州刺史楊楷率所統大㑹長安萇遣其將軍王破虜略地秦州楊定及破虜戰于清水之格奴坂大敗之萇退歸還安定登就食新平留其大軍於胡空堡率騎萬餘圍萇營四面大哭哀聲動人萇惡之乃命三軍哭以應登乃引退萇又陥登新羅堡萇扶風太守齊益男奔登登将軍路柴强武等竝以衆降於萇登攻萇将張業生於隴東萇救之不尅而退姚興僭即帝位安南强熈鎮逺楊多叛推竇衝為盟主所在擾亂興率諸将討之軍次武功多兄子良國殺多而降衝弟彰武與衝離貳衝奔強熈熈聞興将至率戸二千奔秦州衝走汧川汧川氐仇髙執送之衝從弟統率其衆降於興興將姚碩徳討平凉胡金豹於雒城尅之慕容永既為慕容垂所滅河東太守栁恭等各阻兵自守興遣姚緒討降之鮮卑薛㪍叛奔嶺北上郡貳川雑胡皆應之遂圍安逺將軍姚詳於金城遣姚崇尹緯討之㪍自三交趨金城興率歩騎二萬親討之㪍懼棄其衆奔於髙平公沒奕于于執而送之武都氐屠飛啖鐡等殺隴東太守姚廽畧三千餘家據方山以叛興遣姚紹等討之斬飛鐵遣狄伯支迎流人曹㑹牛夀萬餘戸于漢中又使姚碩徳率隴右諸軍伐乞伏乾歸興潜軍赴之乾歸敗走降其部衆三萬六千乾歸以窮促来降姚碩徳姚穆率歩騎六萬伐吕隆於姑臧大敗之俘斬一萬隆将吕佗等率衆二萬五千以東苑来降興又遣姚碩徳姚歛成姚夀都等率衆三萬伐楊盛於仇池夀都等入自宕昌斂成從下辯而進盛遣其弟夀距成從子斌距都都逆撃擒之盡俘其衆楊夀等懼率衆請降其後赫連勃勃殺髙平公沒奕于收其衆以叛秃髮傉檀沮渠蒙遜迭相攻撃傉檀遂東招河州刺史西羌彭奚念阻河以叛興使中軍姚弼後軍歛成鎮逺乞伏乾歸等率歩騎三萬伐傉檀左僕射齊難等率騎二萬討勃勃退保河曲弼濟自金城進㧞昌松長驅至姑臧傉檀嬰城固守出其兵撃弼弼敗退據西苑興又遣衛大将軍姚顯率騎二萬為諸軍節度至髙平聞弼敗績兼道赴之撫慰河外率衆而還興又遣平北姚冲征虜狄伯支輔國歛曼嵬鎮東楊佛嵩率騎四萬討勃勃冲次于嶺北欲廻師襲長安伯支不從乃止興自平凉如朝那聞冲謀逆乃下書賜冲死興如貳城而勃勃騎大至興遣左将軍姚文宗率禁兵距戰中壘齊莫統氐兵以繼之勃勃乃退留禁兵五千配姚詳守貳城興還長安其後勃勃遣其将胡金纂将萬餘騎攻平凉興如貳城因救平凉纂衆大潰生擒纂勃勃遣兄子提攻陥定陽執北中郎将姚廣都興将曹熾曹雲王肆佛等各将數千戸避勃勃内徙興處佛於湟山澤熾雲於陳倉勃勃冦隴右攻白崖堡破之遂趣清水畧陽太守姚夀都委守奔秦州勃勃又收其衆而歸興自安定追之至夀渠川不及而還仇池公楊盛叛擾祁山遣建威趙琨率騎五千為前鋒立節楊伯夀統歩卒繼之前將軍姚恢左将軍姚文宗入自鷲陕鎮西秦州刺史姚嵩入羊頭陕右衛胡翼度從隂宻出自汧城討盛興將輕騎五千自雍赴之與諸将軍㑹於隴口盛與琨相持伯夀畏愞弗進為盛所敗興斬伯夀而還興寢疾妖賊李𢎞反於貳原貳原氐仇常起兵應𢎞興輿疾討之斬常執𢎞而還徙常部人五百餘戸扵許昌姚泓嗣其父興即偽位初興徙李閏羌三千家於安定尋徙新支至是羌酋党容率所部叛還遣撫軍姚讃討之容降徙其豪右數百戸於長安餘遣還李閏并州定陽貳城胡數萬落叛泓入于平陽攻立義姚成都於匈奴堡推曹𢎞為大單于所在殘掠征東姚懿自蒲坂討𢎞戰於平陽大破之執𢎞送於長安徙其豪右萬五千落於雍州仇池公楊盛攻陷祁山執建節王總遂逼秦州泓遣後將軍姚平救之盛引退赫連勃勃攻陷隂宻進兵侵雍嶺北雜戸悉奔五將山征北姚恢棄安定率戸五千奔新平安定人胡儼華韜等率衆距恢恢單騎歸長安立節彌姐成建武裴岐為儼所殺鎮西姚諶委鎮東走勃勃遂據雍抄掠郿城姚紹及征虜尹昭鎮軍姚洽等率歩騎五萬討勃勃姚恢以精騎一萬繼之軍次横水勃勃退保安定胡儼閉門距之殺鮮卑數千人據安定以降紹進兵躡勃勃戰於馬鞍坂敗之追至朝那不及而還平陽氐茍渴聚衆千餘據五丈原以叛遣鎮逺姚萬恢武姚難討之為渴所敗姚諶討渴擒之楊盛遣兄子倦入冦長蛇泓使輔國歛曼嵬前將軍姚光兒討之於陳倉倦奔於散闗勃勃遣兄子提南侵池陽車騎姚裕前将軍彭白狼建義蛇𤣥距却之後蜀李雄僭即帝位仇池氐楊難敵初為劉曜所破奔於葭萌遣子入質其後恃險多為不法雄安北李穉請討之雄遣中領軍李琀及将軍樂次費佗李乾等由白水橋攻下辯征東李夀督琀弟玝攻隂平難敵遣軍距之雄又遣太子班討平寧州夷以班為撫軍後凉呂光僭即三河王位遣其子左将軍佗武賁中郎将纂討北虜匹勒於三嚴山大破之南羌彭奚念入攻白土都尉孫峙退奔興城光遣其南中郎将吕方及其弟右將軍吕寳振威楊範強弩竇茍討乞伏乾歸於金城方屯河北寶進師濟河為乾歸所敗光親討乾歸奚念遣揚武楊軌建忠沮渠羅仇建武梁恭軍於左南奚念大懼於白土津累石為隄以水自固遣精兵一萬距守河津光遣将軍王寳潜趣上津夜渡湟河濟自石堤攻尅枹罕奚念單騎奔甘松光振旅而還呂纂僭即天王位伐秃髮利鹿孤圍張掖略地建康聞傉檀冦姑臧乃還後燕慕容垂僭即帝位遣其征西慕容楷衛軍慕容麟鎮南慕容紹征虜慕容宙等攻苻堅冀州牧苻定鎮州牧苻紹幽州牧苻謨鎮北苻亮楷與定等書喻以禍福定等悉降慕容盛既襲偽位討庫莫奚大虜獲而還嘗率衆三萬伐髙句驪襲其新城南蘇皆尅之散其積聚徙其五千餘戸於遼西西秦乞伏乾歸僭稱河南王楊定之死也天水姜乳襲據上邽乾歸遣乞伏益州討之其後又使益州攻尅支陽鸇武允吾三城俘獲萬餘人而還又遣益州與武衛慕容允冠軍翟瑥率騎二萬伐吐谷渾視羆至于度周川大破之乞伏熾磐襲其父乾歸偽位遣其龍驤乞伏智達平東王松夀討吐谷渾樹雒于於澆河大破之獲其將呼那烏提虜三千餘戸而還又遣其鎮東郎吕破胡于白石川虜其男女萬餘口進據白石城休官降者萬餘人又遣安北烏地延冠軍翟紹討吐谷渾别統句旁於泣勤川大破之俘獲甚衆熾磐率諸將討吐谷渾别統支旁於長栁川掘達於渇渾川皆破之前後俘獲男女二萬八千聞秃髪傉檀西征乙弗投袂而起曰可以行矣率歩騎二萬襲樂都秃髮武臺憑城距守熾磐攻之一旬而尅遂入樂都遣平逺犍䖍率騎五千追傉檀徙武臺與其文武及百姓萬餘戸於枹䍐傉檀遂降又遣其將曇達王松夀等討南羌彌姐康薄於赤水降之又遣曇達王松夀等率騎一萬伐姚艾於上邽曇達進據蒲水艾距戰大敗之艾奔上邽曇達進屯大利破黄石大羌二戍徙五千餘戸於枹䍐令其安東木奕于率騎七千討吐谷渾樹雒干于塞上破其弟阿柴於堯扞川俘獲五千餘口而還雒干奔保白蘭山而死又遣曇達元基東討姚艾降之又使征西他子討吐谷渾覔地於弱水南大破之覔地率衆六千降於熾磐南凉秃髪烏孤僭稱大單于西平王曜兵廣武攻尅金城吕光遣将軍竇茍来伐戰於街亭大敗之降光樂都湟河澆河三郡秃髮利鹿孤襲其兄烏孤偽位吕纂来伐使弟傉檀距之與纂戰敗之斬首二千餘級纂西撃段業傉檀率騎一萬乗虛襲姑臧纂弟緯守南北城以自固傉檀耀兵於青陽門虜八千餘戸而歸其後僭稱河西王率師伐吕隆大敗之又遣傉檀攻吕隆昌松太守孟禕於顯美尅之秃髮傉檀嗣其兄利鹿孤位僭稱凉王遣其将文支討南羌西虜大破之傉檀於是率師伐沮渠蒙遜次於氐池蒙遜嬰城固守芟其禾苗至于赤泉而還傉檀偽㳺澆河襲徙西平湟河諸羌三萬餘戸於武興畨禾武威昌松四郡姚興遣其將姚弼及歛成等率歩騎三萬来伐又使其將姚顯為弼等後繼遺傉檀書云遣尚書左僕射齊難討赫連勃勃懼其西逸故令弼等於河西邀之傉檀以為然遂不設備弼至姑臧屯於西苑傉檀命諸郡縣悉驅牛羊於野歛成縱兵虜掠傉檀遣其鎮北俱延鎮軍敬歸等十將率騎分撃大破之斬首七千餘級姚弼固壘不出傉檀攻之未尅乃斷水上流欲以持乆斃之㑹雨甚堰壊弼軍乃振姚顯聞弼敗兼道赴之軍勢甚盛遣射将孟欽等五人挑戰於凉風門弦未及發材官将軍宋益等馳撃斬之顯乃委罪歛成遣使謝傉檀引師而歸又遣其左将軍枯木駙馬都尉胡康伐沮渠蒙遜掠臨松人千餘戸而還蒙遜大怒率騎五千至於顯美方亭破車盖鮮卑而退南燕慕容超僭即帝位時慕容法鎮梁父與超有隙因與慕容鍾段宏等謀反超知而徴之鍾稱疾不赴於是取其黨侍中慕容統右衛慕容根散騎常侍段封誅之車裂僕射封嵩於東門之外西中郎将封融奔於魏超尋遣慕容鎮等攻青州慕容昱等攻徐州慕容凝韓範攻梁父昱等攻莒城㧞之徐州刺史段宏奔於魏封融又集羣盗襲石塞城殺鎮西大将軍餘鬰青土振恐人懐異議慕容凝謀殺韓範将襲廣固範知而攻之凝奔梁父範并其衆攻梁父尅之凝奔姚興慕容法出奔於魏慕容鎮尅青州鍾殺其妻子為地道而出單馬奔姚興西凉李暠僭稱凉王遣折衝将軍宋繇東伐凉興并撃玉門已西諸城皆下之遂屯玉門陽闗廣田積榖為東伐之資其後暠親率騎二萬畧地至於建東沮渠蒙遜来侵至於建康掠三千餘戸而歸暠大怒率騎追之及於彌安大敗之盡收所掠之尸李歆嗣其父暠為凉公沮渠蒙遜遣其張掖太守沮渠廣宗詐降誘歆歆遣武衛温宜等赴之親勒大軍為之後繼蒙遜率衆三萬設伏於蓼泉歆聞引兵還為遜所逼歆親貫甲先登大敗之追奔百餘里俘斬七千餘級北凉沮渠蒙遜僭稱河西王秃髮傉檀来伐蒙遜敗之於若厚塢傉檀湟河太守文支據湟川護軍成宜侯率衆降之蒙遜西如苕藋遣冠軍伏恩率騎三萬襲卑和烏啼二虜大破之俘二千餘落而還蒙遜遣其将運糧於湟河自率衆攻尅乞伏熾磐廣武郡以運粮不繼自廣武如湟河度浩亹熾磐遣將乞伏魋尼寅拒蒙遜蒙遜撃斬之熾磐又遣将王衡折斐麹景等率騎一萬據勒姐嶺蒙遜且戰且前大破之擒折斐等七百餘人麹景奔還蒙遜以弟漢平為折衝将軍湟河太守乃引還蒙遜伐西凉李歆歆将出距之左長史張體順固諌乃止蒙遜大芟秋稼而還其後太史令張衍言於蒙遜曰今嵗臨澤城西當有破兵蒙遜乃遣其世子政徳屯兵若厚塢蒙遜西至白岸遂攻浩亹還次川巖聞李歆徴兵欲攻張掖蒙遜潜軍逆之敗歆於壊城遂進尅酒泉前蜀王建僭即帝位初汴将劉知俊奔鳳翔李茂貞以為大将稍侵建之興鳳皆沒焉後知俊自岐奔蜀建厚禮之任為上将令撃茂貞復収興鳳二州茂貞登陴自守知俊修兵攻其屬郡茂貞之秦隴階涇皆陷於蜀前漢劉晟襲其父渉偽位㑹湖南馬氏昆弟尋戈晟因其釁遣兵攻桂林管内諸郡及栁連梧賀等州皆尅之自此全有南越之地唐李景襲其父昪偽位遣其将邉鎬帥師攻閩王延政於建安延政乞降鎬使人送于金陵㑹湖南馬希蕚為牙將陸孟俊所廢送於衡陽三軍立馬希崇為帥希萼至衡陽月餘衡州都指揮使廖偃招合蠻獠復立希萼為楚王於縣署行府據湘川上㳺乃令人求援扵景景遣邉鎬率衆東入希萼乗湘流而下合勢攻長沙陥之希萼望吴人復立為潭帥潭人同恚希萼請邉鎬為帥鎬既稱帥乃令希萼希崇入於金陵馬氏諸族千餘人及豪族皆徙焉冊府元龜卷二百三十一
