body:
  text: 册府元龜卷六百七十七宋王欽若等撰牧守部能政自秦氏罷侯置守漢室之興率循無改垂及中葉品式備具故有與我共此之嘆而二千石之著治効者率加褒賞以申勉勵史氏所述循吏為盛焉東京而下咸可徵也自非厲精為治正身率下遵道徳齊禮之訓以變風美俗推務本明利之術以厚生阜財措枉而擊强興廉而崇讓先之以條教濟之以仁恵居之以寛簡輔之以强明又曷能致政治之清夷吏人之歡愛所居民富所去見思生有榮號死見奉祀斯仲尼所謂既富而教三年有成者為不誣矣漢韓延夀為淮陽太守治甚有名徙潁川潁川多豪彊難治國家嘗為選良二千石延夀在郡數年徙為東郡太守以黄霸代居潁川霸因其迹而大治延夀為政事迹並見牧守教化門黄霸為潁川太守前後八年郡中愈治天子以霸治行詔賜爵闗内侯黄金百斤秩中二千石自漢興言治民吏以霸為首入守京兆尹趙廣漢為京兆尹奏請令長安游徼獄吏秩百石特増其秩以厲其行其後百石吏皆差自重不敢枉法妄繫留人京兆政清吏民稱之不容口長老傳以為自漢興治京兆者莫能及王成為膠東相治甚有聲宣帝最先褒之賜爵闗内侯秩中二千石翟方進為朔方刺史居官不煩苛所察應條輙舉甚有威名再三奏事刺史嵗盡輙奏事京師也召信臣為南陽太守為民興利戸口増倍賊盗訟獄衰止吏民親愛信臣號之曰召父薛宣為臨淮太守政教大行入守左馮翊宣為吏賞罰明用法平而必行所居皆有條教可紀多仁恕愛利愛人而安利也馮野王為隴西太守以治行髙入為馮翊京師稱其威徳又為上郡太守馮逡野王弟也為清河都尉隴西太守治行廉平馮立逡弟也為五原太守徙西河上郡立居職公廉治行畧與野王相似而多知有恩貸好為條教吏民嘉美立更歴五郡所居有迹後漢宋均為河内太守政化大行均嘗寢病百姓耆老為禱請旦夕問起居其為民愛若此馮豹為武威太守親事二年河西稱之杜詩為南陽太守性節儉而政治清平以誅暴立威善於計畧省愛民役視事七年政化大行慶鴻為瑯琊㑹稽二郡太守所在有異迹曹褒為河内太守時春夏大旱糧榖踊貴褒到乃省吏并職退去姦殘澍雨數降其秋大熟百姓給足流冗皆還郭伋為并州刺史所過問民病苦聘求耆徳雄俊設几杖之禮朝夕與叅政事謝夷吾遷鉅鹿太守所在愛育人物有善績歐陽歙為揚州牧遷汝南太守推用賢俊政稱異迹魯王興齊武王縯之子為𢎞農太守有善政王堂為巴郡太守吏民生為立祠永建中為魯相政存簡一至數年無辭訟遷汝南太守郡内稱治陸康為武陵太守轉守桂陽樂安二郡所在稱治陳寵為廣漢太守西川豪右并兼吏多姦貪訴訟日百數寵到顯用良吏王渙鐔顯等以為腹心訟者日減郡中清肅衛颯為桂陽太守先是含汪湞陽曲江三縣越之故地武帝平之内屬桂陽民居深山濵溪谷習其風土不出田租去郡逺者或且千里吏事往來輙發民乗船名曰傳役每一吏出徭及數家百姓苦之颯乃鑿山通道五百餘里列亭傳置郵驛於是役省勞息姦吏杜絶流民稍還漸成聚邑使輸租賦同之平民凡理䘏民事居官如家其所施政莫不合於物宜視事十年郡内清理宋登為潁川太守市無二價道不拾遺李膺為蜀郡太守修庠序設教條明法令恩威並行蜀之珍玩不入於門陳蕃為樂安太守時李膺為青州刺史各有威政屬城聞風皆自引去蕃獨以清績留焉延篤為左馮翊徙京兆尹其政用寛仁憂恤民黎擢用長者與叅政事郡中歡愛三輔咨嗟焉先是陳留邊鳳為京兆尹亦有能名郡人為之語曰前有趙張二王後有邊延二君景毅為益州太守討定叛夷毅初到郡米斛萬錢漸以仁恩少年間米至數十少年未多年也徐璆歴任城汝南東海三郡所在化行公沙穆為遼東屬國都尉善得吏人歡心史敞為京兆尹化有能名尤善條教見稱於三輔也王商益州牧劉焉以為蜀郡太守有治聲駱俊字孝逺有文武才幹為陳相值袁術僣號兄弟忿爭天下鼎沸羣賊並起陳與比界姦慝四布俊厲威武保疆境賊不敢犯養濟百姓災害不生嵗獲豐稔魏劉靖為河南尹散騎常侍應璩書與靖曰入作納言出臨京任富民之術日引月長藩落髙峻絶穿窬之心五種别出逺水旱之災農噐必具無失時之闕蠶麥充備無雨濕之虞封符指期無流連之吏鰥寡孤獨蒙廩賑之實加之以明擿幽微重之以秉憲不撓有司供承王命百里垂拱仰辦雖昔趙張二王之治未足以方也靖為政類如此初雖似碎密終於百姓便之司馬朗為兖州刺史政化大行百姓稱之杜畿為河東太守太祖征漢中遣五千人運運者自率勉曰人生有一死不可負我府君終無一人逃亡其得人心如此梁習為并州刺史邊境肅清百姓布野勤勸農桑令行禁止貢達名士咸顯於世太祖嘉之賜爵闗内侯更拜為真長老稱詠以為自所聞識刺史未有及習者張既為雍州刺史後轉梁州既臨二州十餘年政恵著聞倉慈為燉煌太守民夷稱其徳恵後皇甫隆為太守燉煌人以為隆剛斷嚴毅不及於慈至於勤恪愛恵為下興利可以亞之楊阜為武都太守㑹蜀先主取漢中以逼下辯太祖以武都孤逺欲移之恐吏民戀上阜威信素著前後徙民氐使居京兆扶風天水界者萬餘戸徙郡小槐里百姓襁負而隨之為政舉大綱而已下不忍欺蜀馬忠為牂牁太守郡丞朱褒反叛亂之後忠撫育䘏理甚有威恵王祗為犍為太守後有廣漢王離代祗為太守亦有美績雖聰明不及祗而文采過之也呉謝景為豫章太守在郡有治迹吏民稱之以為前有顧邵其次即景周魴為鄱陽太守在郡十三年賞善罰惡威恩並行呉彦為交州刺史在鎮二十餘年威恩宣著南州寧靖晉鄭袤為廣平太守以徳化為先善作條教郡中愛之司馬芝為河南尹居官十一年自魏迄今為河南尹者莫及之劉𢎞為荆州刺史假節都督荆交廣州諸軍事其在江漢值王室多難得專命一方盡其器能推誠羣下勵以公義簡刑獄務農桑每有興發手書郡國丁寧欵密故莫不感悦顛倒奔赴咸曰得劉公一紙書賢於十部從事也劉殷為新興太守明刑旌善甚有政能范晷為馮翊太守甚有政能善於綏撫百姓愛悦之鄧攸為呉郡太守攸在郡刑政清明百姓歡悦為中興良守王况為豫州刺史探尋善政案賈逵已來法制禁令諸所施行擇善者而從之丁紹字叔倫為廣平太守政平訟理道化大行于時河北騷擾靡有完邑而廣平一郡四境乂安是以皆悦其法而從其令宋劉義欣髙祖弟道隣子也為豫州刺史鎮夀陽于時土境荒毁人民凋散城郭頽敗盗賊分行義欣綱維補緝隨宜經理刼盗所經立討誅之境内畏服道不拾遺城府庫藏並皆完實遂為盛藩强鎮孔季恭為㑹稽相務存治實勑止浮華翦罰遊惰繇是冦盗衰止境内肅清杜慧度為交州刺史布衣蔬食儉約質素能彈琴頗好莊老禁斷淫祀崇修學校嵗荒民饑則以私禄賑給為政纎密有如治家繇是威恵沾洽姦盗不起乃至城門不夜閉道不拾遺王僧䖍初監呉郡太守後為湘州刺史所在以寛恵稱裴松之為永嘉太守勤䘏百姓吏民便之陸徽為益州刺史隠䘏有方威恵兼著冦盗靜息民物殷阜蜀土安悦阮長之歴東莞武昌臨海太守皆有風政為後人所思宋世言善治者咸稱之吉翰為益州刺史著美績甚得方伯之體論者稱之臧質為建平太守甚得蠻楚心南蠻校尉劉湛還朝稱為良守遷寧逺将軍申恬為山陽太守善於治民所蒞有績為太山太守威恵兼著吏民便之杜驥為青冀二州刺史在任八年恵化著於齊土自義熙至于宋末刺史唯羊穆之及驥為吏民所稱詠張岱為益州刺史數年益土安其政劉損為義興太守時東土殘饑太祖遣揚州治中沈演之東入賑䘏以損綏撫有方稱為良守南齊虞愿宋末為晉平太守有異政後王秀之為郡與朝士書曰此郡承虞公之後善政猶存遺風易遵差得無事安陸王緬為呉郡太守少時大著風績竟陵王子良與緬書曰竊承下風數十年來未有此政世祖嘉其能轉郢州刺史張環為雍州刺史加都督徵拜左戸尚書後安陸王緬臨雍州行部登蔓山有野老來乞緬問何不事産而行乞耶答曰張使君臨州理物百姓家得相保後人政嚴故至行乞緬繇是深加嗟賞傅琰為南郡内史行荆州事時長沙太守王沈新蔡太守劉聞慰晉平太守丘仲起長城縣令何敬叔故彰縣令丘寂之皆有能名而不及琰也梁永陽王敷少有學業仕齊為隨郡内史招懐逺近士庶安之以為前後之政莫及齊明帝謂徐孝嗣曰學士舊例不改理官聞蕭隨郡唯置酒清言而路不拾遺行何風化以至於此對曰古者修文徳以來逺人况止郡境而已帝稱善長沙王懿為晉陵太守曾未期月訟理人和稱為善政襲吳平侯勵為淮南太守以善政稱遷豫章内史道不拾遺男女異路孔休源為南郡太守行州府事甚有治績平心决斷請託不行髙祖深嘉之衡山縣侯恭為雍州刺史簡文少與恭遊特被賞狎至是手令朂以政事恭至州政績有聲百姓請於城南立碑頌徳詔許焉名為徳政碑夏侯詳為湘州刺史詳善吏事在州四載為百姓所稱王志為宣城内史清謹有恩恵郡民張倪呉慶爭田經年不决志到官父老乃相謂曰王府君有徳政吾曹鄉里乃有此爭倪因相擕請罪所訟地遂為閑田夏侯亶為呉興太守有恵政遷司州刺史又為邊人所悦服何敬容為建安内史清公有美績吏民稱之遷呉郡太守為政勤恤民隠辯訟如神視事四年治為天下第一世稱為何吳郡後謝舉為呉郡太守聲跡畧相比劉之亨代兄之遴為南郡太守有異政荆土懐之惡斥其名號為大南郡小南郡王瑩為東陽太守居郡有恵政遷呉興太守頻處二郡皆有能名謝覽為呉興太守初齊明帝及覽父㵸東海徐孝嗣並為呉興號稱名守覽皆欲過之劉潛字孝儀為臨海太守是時政網疎濶百姓多不遵禁孝儀下車宣布條制勵精綏撫境内翕然風俗大革何逺為宣城太守郡經冦抄盡心綏理復著名迹后為始興内史在官好開途巷修葺牆屋民居市里城隍廐庫所過若營家焉陳王勵為晉陵太守在郡甚有威恵郡人表請立碑頌勵政績許之陸子隆為荆州刺史時新置治于公安城池未固子隆修建城郭綏集夷夏甚得民和當時號為稱職三年吏民詣都上表請立碑頌美功績詔許之後魏長孫肥道武時為兖州刺史撫綏河南得吏民心威信著於淮泗張恂為廣平太守招集離散開建學校優顯儒士吏民歌詠之於時喪亂之後罕能克厲唯恂當官清白仁恕臨下百姓親愛之其治為當時第一陳留王䖍子崇為并州刺史有政績淮南王世遵為北平将軍定州刺史百姓安之為豳州刺史性清和推誠化導百姓樂之臨淮王昌弟孚為冀州刺史勸課農桑境内稱為慈父隣州號曰神君任城王澄為徐州刺史甚有聲績任城王雲為冀州刺史留心政事甚得下情淮陽王孝友為滄州刺史在郡積年以法自守甚著聲稱元子英為梁州刺史在仇池六載甚有威恵之稱安豐王猛子延明為豫州刺史甚有政績崔寛為鎮西将軍陜城鎮将𢎞農土出漆蠟竹木之饒路與南通販貿來往家産豐富而百姓樂之諸鎮之中號為能政穆羆為汾州刺史前刺史劉升在郡甚有威恵前定陽令呉平仁亦有恩信羆並為表請之羆既頻薦升等所部守令咸自砥礪威化大行百姓安之元欣為荆州刺史轉齊州刺史欣在二州頻得人和張彛為秦州刺史彛敷政隴右多所制立宣布新風革其舊俗民庶愛仰之張蒲為相州刺史扶弱抑强進善黜惡教化大行李韶為冀州刺史清簡愛民甚收名譽後轉定州刺史二州既連接百姓素聞風徳州内大治陸昕之為兖州刺史尋進號安東将軍治有名績仍除青州刺史在州著寛平之稱轉安北将軍相州刺史陸凱為正平太守在郡七年號為良吏源懐為長安鎮将雍州刺史清儉有恵政善於撫恤刼盗息止流民皆相率來還薛虎子為徐州刺史孝文曾從容問秘書丞李彪曰卿頻使江南徐州刺史政績何如彪曰綏邊布化甚得其和孝文曰朕亦知之竇瑾為長安鎮将都督秦雍二州諸軍事在鎮八年甚著威恵李安世為相州刺史敦勸農桑禁斷淫祀崔挺為光州刺史威恩並著風化大行及散騎常侍張彛兼侍中廵行風俗見挺政化之美謂挺曰彛受使省方採示謡訟入境觀政實愧清吏之名畢元賔為兖州刺史為政清平善撫民物百姓愛樂之崔亮為雍州刺史性公清敏于斷决三輔服其徳政蘇椿為武功郡守既為本邑以清儉自居小大之政必盡忠恕裴宣為司州别駕明敏有器幹總攝州府事無疑滯逺近稱之崔休遷安東将軍青州刺史青州九郡民單􅋆李伯徽劉通等一千人上書頌休徳政靈太后善之張普恵為東豫州刺史時淮南九戍十三郡猶有梁氏前弊别郡異縣之民錯雜居止普恵乃依次括比省減郡縣上表陳狀詔許之宰守因此綰攝有方姦盗不起民以為便竇瑗為廣宗太守治有清白之稱廣宗民情㓙戾前後累政咸見告訟唯瑗一人終始全潔轉中山太守聲譽甚美為吏民所懐及北齊神武輔政班書州郡誡約牧守令長稱瑗政績以為勸勵北齊永安王浚為青州刺史聰明矜恕上下畏服之趙郡王子叡為定州刺史加撫軍将軍六州大都督時年七十留心庶事糾摘姦非勸課農桑接禮名雋所部大治稱為良牧裴讓之為清河太守至郡未幾楊愔謂讓之諸弟曰我與賢兄交欵企聞善政適有人從清河來云姦吏歛迹盗賊清靜期月之期翻然更速宋世良為清河太守天保中大赦郡先無一囚率羣吏拜詔而已獄内櫓生桃樹蓬蒿亦滿每日衙門虚寂無復訴訟封子繪為鄭州刺史子繪曉達政事長於綏撫歴宰州郡所在安之房謨為兖州刺史先是當州兵皆寮佐驅使饑寒死病動至千數謨至皆加簡勒不令煩擾以休假畨代洗沐督察主司親自簡視又使傭賃令作衣服終嵗還家無不温飽全濟甚多時梁魏和好使人入其界者咸稱歎之轉徐州刺史始謨在兖州彭城慕其徳化及為刺史合境欣悦神武與諸州刺史書敘謨及廣平太守羊敦廣宗太守許季良等清能以為勸勵許惇為陽平太守時遷都於鄴陽平為畿郡軍國責辦賦歛無准又勲貴屬請朝夕徵求惇並御之以道上下無怨政為天下第一特加賞異圗形於閣詔頒天下厯魏尹齊梁二州刺史政並有治聲遷大司農蕭祗字敬式梁武弟南平王偉之子也在梁為東揚州刺史于時江左承平政寛人慢祗獨蒞以嚴切梁武悦之遷北兖州刺史袁聿修為信州刺史即其本鄉也時人榮之為政清靜不言而治長吏以下爰逮鰥寡孤㓜皆得其歡心武平初御史普出過詣諸州梁鄭兖疆境連接州之四面悉有舉劾御史竟不到信州其見知如此又為博陵太守數年大有聲績逺近稱之後周獨孤信為㤗州刺史先是守宰闇弱政令乖方民有寃訟厯年不能决信在州事無擁滯示以禮教勸以農桑數年之中公私富實流民願附者數萬家太祖以其信著遐邇故賜名為信張軌為河北郡守在郡三年功績甚著臨民治術有循吏之美大統間言宰民者多推尚之揚雄為洵州刺史俗雜賨渝民多輕猾雄威恵相濟夷夏安之竇熾為大都督原州刺史抑挫豪右申理幽滯每親廵壟畝勸民耕桑在州十載甚有政績令狐整為豐州刺史廣布恩威傾身撫綏數月之間化洽州府豐州舊治不居民中賦役叅集勞逸不均整請移居武當詔可其奏奨勵撫導遷者如歸旬月之間城府周備席固之遷也其部曲多願留為整左右整諭以朝制弗之許焉莫不流涕而去及整秩滿代至人吏戀之老㓜送整逺近畢集數日停留方得出界其得人心如此唐瑾為蔡州刺史厯柘州硤州所在皆有徳化人吏稱之梁臺為鄜州刺史性疏通恕已待物至於蒞民處政尤以仁愛為心韋孝寛除浙陽郡守時獨孤信為新野郡守同荆州與孝寛情好欵密政術俱美荆部吏人號為連璧宇文神舉為并州刺史州既齊氏别都控帶要重平定甫爾民俗澆訛豪右之家多為姦猾神舉勵精為治示以威恩旬月之間逺邇悦服留璠為同和郡守先羌降附洮陽共和二郡羌民嘗越境詣璠訟理焉其徳化為他界所歸仰如此蔡公廣時鎮隴右嘉璠善政及遷鎮陜州欲啟璠自隨羌人樂從者七百人聞者莫不歎異韓盛為新平郡守居官清淨嚴而不殘矜恤孤貧抑挫豪右賊盗止息郡境肅然豳公廣太祖姪孫為梁州總管秦州刺史性明察善綏撫民庶畏而悦之席固厯豐湖昌三州刺史蒞官之處頗有聲績權景宣為南陽郡守冦盗歛迹民得肄業百姓稱之立碑頌徳辛昻為龍州長史領龍安郡事州帶山谷舊俗生梗昻威恵洽著吏民畏而愛之梁睿為敷州刺史凉安二州總管俱有恵政隋豆盧勣仕周為渭州刺史甚有恵政華夷悦服徳澤流行于璽為汴州刺史甚有能名髙祖聞而善之優詔褒揚賜帛百疋後厯邢洛熊州刺史並有恵政梁彦光為岐州刺史甚有恵政轉相州刺史下車發摘姦隠有若神明又以徳化人吏人感悦略無爭訟令狐熙為滄州刺史在職數年風教大洽稱良二千石開皇四年髙祖幸雒陽熙來朝吏人恐其遷悲泣於道及還百姓出境迎謁歡呌盈路及為汴州刺史下車禁遊食抑工商人有向街開門者杜之船客停於郭外星居者勒為聚落僑人遂令歸本其有滯獄並决遣之令行禁止髙祖聞而嘉之辛彦之為隨州刺史遷潞州刺史前後俱有恵政慕容三藏為廓州刺史民歌頌之髙祖聞其能屢有勞問又為和州刺史轉淮南郡太守所在有恵政柳儉為廣漢太守甚有能名髙祖以儉仁明著稱擢拜蓬州刺史獄無繫囚遷汴州刺史在職十餘年荆夷悦服韋協字欽仁厯定息秦三州刺史皆有能名河間王𢎞每晉王廣入朝𢎞輙領揚州總管及晉王歸𢎞復還蒲州在官十餘年風教大洽韋夀字世齡為常毛二州刺史頗有治名蘇孝慈為浙州刺史遷洪州總管俱有恵政李諤為通州刺史甚有恵政民夷悦服辛公義為岷州刺史合境之内呼為慈母後遷牟州刺史時東山霖潦自陳汝至于滄海皆苦水災境内犬牙獨無所損敬肅為幽州長史遷衛州司馬俱有異績公孫景茂為汝南太守息州刺史法令清靜徳化大行又厯伊道淄三州刺史皆有徳政論者稱為良牧侯莫陳潁為桂州總管十七州諸軍事至官大崇恩信人夷悦服煬帝即位徵還京師後拜常山太守其年嶺南閩越多不附帝以潁前在桂州有恵政為南方所信復拜南海太守丘和為代州刺史在郡善撫吏士甚得歡心宇文㢸厯翔代呉三州刺史皆有能名除泉州刺史薛道衡為簡校襄州總管在任清簡吏民懐其恵張􅔿厯撫顯齊三州刺史俱有能名段文振為石河二州刺史甚有威恵遷蘭州總管房彦謙為鄀州司馬時鄀州久無刺史州務皆歸彦謙多有異政柳機為華州刺史厯冀州前後作牧俱稱寛恵賀若誼厯靈邵二州刺史原信二州總管俱有能名柳旦厯羅浙魯三州刺史並有能名柳謇之為肅州刺史轉息州俱有恵政楊屏為寧都太守厯呉州總管甚有能名張炤為冀州刺史進位上開府吏民悦服稱為良二千石長孫平厯許貝二州俱有善政鄴都俗薄舊號難治前後刺史多不稱職朝廷以平所在有善政轉相州刺史甚有能名趙賢通為冀州刺史甚有威徳嘗有疾百姓奔馳爭為祈禱其得民情如此唐權萬紀武徳中為西韓州刺史在州以清幹著稱韋仁夀武徳中為雋州都督府長史時南寧州内附髙祖令仁夀檢校南寧都督既聽政於越雋法令清肅人懐懽悦張元濟為髙陽郡丞時無郡將元濟獨統大郡吏人畏悦武士彠武徳末為揚州都督府長史開闢田疇示以刑禮數月之間歌謡載路李桐客太宗貞觀初累遷通鎮二州刺史所在清平流譽百姓呼為慈父崔幹厯宋幽二州刺史為下所懐劉徳威為綿州刺史以廉平著稱百姓為之立碑盧祖尚為蒋州刺史轉夀州都督又轉瀛州所在之職皆稱政理薛大鼎貞觀中為滄州刺史大鼎與瀛州刺史賈敦頤冀州刺史鄭徳本俱有美政河北號鐺脚刺史黨仁𢎞為廣州都督有方略所在皆有稱績時有扶風强竇質亦以幹能致位尚書郎刺史議者以仁𢎞為羌中之絶竇質為巴中之絶繇是厯居藩要李君球為興州刺史遷揚州大都督府長史政尚嚴肅人吏憚之盗賊屏跡髙宗頻降書勞勉髙智周總章中為夀州刺史政存寛慰百姓安之田仁㑹為平州刺史勸學務農稱為善政蒋儼為幽州司馬以善政為廵察使劉祥道所薦擢為㑹州刺史改為蒲州刺史蒲州戸口殷劇前後刺史多不稱職儼下車未幾令行禁止稱為良牧薛謙光則天時為常州刺史先是李嶠等奏人情重内官輕外職乃命韋嗣立及楊再思等二十人各以本官檢校刺史其後政績可稱者唯謙光徐州刺史司馬鍠二人而已狄仁傑為寧州刺史撫和戎夏人得歡心郡人勒碑頌徳御史郭翰廵察隴右所至多所按劾及入寧州境内耆老歌刺史徳美者盈路翰既授館召州吏謂之曰入其境其政可知也願成使君之美無為久留州人方散翰薦名於朝徵為冬官侍郎薛季昶為雍州長史威名甚著前後京尹無及之者又為魏陜二州刺史雒州長史所在皆以嚴肅為政楊元琰厯蘄蒲晉魏宣許六州刺史凉梁二郡都督荆府長史前後九度以清白昇進再降璽書褒美李濬為潤虢潞三州刺史又拜益州長史劒南節度所厯皆以誠信待物稱為良吏姚元之為揚州長史淮南按察使為政簡肅人吏立碑紀徳俄除同州刺史嗣呉王琨厯淄衛宋鄭梁幽六州刺史皆有能名李傑為河南尹勤於聽理每有訴别雖衢路當食無廢處斷繇是官無留事人吏愛之苖晉卿為安康郡太守嵗餘郡中稱理遷魏郡太守河北採訪使居職三年政化大行崔隠甫為太原尹人吏刋石頌其美政後為東都留守為政嚴肅甚為吏人之所憚崔琳有幹局𤣥宗開元中厯典數州皆知名李峴為河南少尹魏郡太守入為金吾将軍遷京兆尹所蒞皆著聲績第五琦為朗州刺史甚有能名王翃自折衝授辰州刺史遷朗州皆有政術嚴郢為京兆尹專以文學叅朝廷論議前後請減諸色丁匠數千百人號為稱職張延賞為北都副留守河南尹江陵尹成都尹連統四鎮所至稱理其去也皆刻石紀焉吕諲肅宗上元元年罷相授太子賔客尋為荆州節度諲初在廟堂無異稱及理江陵三年號為良牧蕭復大厯中為歙州池州刺史以理化著聞遷常州刺史李泌為澧州杭州刺史並以理行稱李恵登為隋州刺史恵登樸素不知學居官無枝葉率心為政皆與理順利人者因行之病人者因去之二十年間田疇闢戸口加諸州奏吏入其境無不謌謡其能及于頔為山東道節度以其績上聞加御史大夫升其州為上閻濟美自婺州刺史為福建觀察復為潤州刺史浙西觀察所至以簡澹為理兩地之人常賦之外不知其他令狐彰為滑州節度使在職風化大行初滑州瘡痍未復城邑為墟彰以身勵下一志農戰内簡軍戎外牧黎庶法令嚴酷人不敢犯數年間田疇大闢廪庫充積嵗奉王税及修貢獻未嘗暫闕李復徳宗建中貞元間為江陵少尹厯容州廣州刺史曉於政道所在稱理張萬福貞元中厯典九郡皆有恵愛于頔為蘇州刺史護溝瀆整街衢至今頼之張敬則為鳳翔尹撫戎理俗人甚便之穆贊為䖍常二州刺史宣州觀察使所蒞皆有政聲渾鎬太師瑊第二子性謙謹多與士大夫游厯延鄧唐等州刺史軍政吏職有可稱者薛華為汝州刺史有能名又為浙江西道觀察使廉風俗守法度人甚安之王紹為武寧軍節度使時承張愔之後兵驕難理紹修緝軍政人甚安之武元衡代髙崇文為劒南西川節度使髙崇文既發城盡載其軍資金帛器幕伎樂工巧以行元衡至則庶事節約務以便人比三年公私稍濟薛戎為衢湖常三州刺史遷浙東觀察使所蒞皆以政績聞楊於陵為浙江東道都團練觀察等使政聲大聞入拜戸部侍郎令狐楚為北都留守兼太原尹楚久在并州練其風俗因人之利而利之故封内晏然梁王師範自昭宗龍紀中為青州節度使十五年甚有殊政縣令刺史皆奏儒雅之士為之野無閑田路無拾遺髙途唐末為汴宋亳觀察判官僖宗文徳初監宋州軍州事時螟潦之後編戸初復途克己為政始定履畆之税以抑兼并太祖乃命管内如其制於是賦無虚額民無逋負公庾實而軍食羡矣改天平宣義兩府從事趙昶唐末為陳州節度使昶以大冦削平之後益留心於政事勸課農桑大布恩恵景福元年秋陳許将吏耆老録其功詣闕以聞天子嘉之命文臣撰徳政碑植於通衢以旌厥功趙凝為襄州節度使作鎮數州甚有威恵李珽監曹州事曹去京數舍吏民豪猾前後十餘政未有善罷者珽在任期嵗民庶以寧後唐何瓉唐末代張承業知河東軍府處事明敏胥吏畏其清而服其能好㑹賔友飲饌精簡談笑婉洽外疎内密事有所執往復不回李存賢權泌州刺史先是州當賊境不能保守乃於州南五十里據險立栅為治所已厯十餘年矣存賢至郡乃移復舊郡剗闢荆棘特立廨舍州民完集莊宗嘉之轉檢校司空直拜刺史李嗣昭為昭義軍節度使時大兵之後城中士庶饑死者半鄽里蕭然嗣昭緩法寛租勸農務穡一二年間軍城完輯三面隣敵軍抄縱横昭設法枝梧邊鄙不聳烏震為深州刺史嘗交儒者以講誦為樂其性純質以清直御下河北諸郡獨有政聲周知裕厯房絳淄三州刺史宿州團練使知裕老於軍旅勤於稼穡凡為郡勸課皆有政聲朝廷嘉之遷安州留後孫岳明宗天成初為潁州刺史潁久不治賦歛煩碎民不聊生岳至州召屬邑長吏里閭胥吏親問疾苦除正條賦率職務外其餘苛賦名目一切罷之潁人以狀上聞加檢校太保後為耀州刺史閬州團練使所至稱治晉劉遂清初仕後唐天成長興中厯典淄興登三郡咸有善政王傳極為寧州刺史境接蕃部以前政滋章民甚苦之傳極自下車除去弊政數十件百姓便之不數月移刺虢州為理清靜蒸民愛戴如寧州焉李承約為黔南節度使數年之間巴卭蠻蛋不敢犯境外勸農桑内興學校㓙邪盡去民皆感之故父老數輩重蠒詣闕言其政化又聽留周嵗徵為左衛上将軍符令謙為趙州刺史下車布政務從安靜廷無訟獄無囚厮養之徒皆贍於己無擾於下不周嵗而部内大理馮揮為靈州節度使清崗土橋之間皆是氐羌帳族從來剽掠行旅須發援兵揮加以恩恵質以義信自是人不帶劒道不拾遺境無冦盗市無游惰獄無枉撓吏無緇蠧四民道釋咸得其所髙祖優詔褒之劉處讓為相澶衛等州觀察等使勤於公務孜孜求理撫馭吏民不至苛察人甚便之周邊蔚初仕晉開運初為亳州防禦使為政清肅亳民感其恵咸設齋以報之白延遇廣順中為兖州防禦使在兖二年為政有聞人甚安之州民數百詣闕乞立徳政碑以頌其美册府元龜卷六百七十七
