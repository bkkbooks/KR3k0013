body:
  text: 冊府元龜卷六百三十五宋王欽若等撰銓選部考課設官分職以序上下程能黜否以正賞罰王者之大柄也故周禮太宰之職三歳大計羣吏之理而誅賞之又曰廢置以馭其吏斯皆考課之謂也是知明試以稽其功循名以覈其實使較比之典不可得而踰賢愚之分不可得而亂斯二帝所以端拱而治三代所以直道而行者也漢魏而下制度詳究或斟酌前訓将以適時或講求通議於焉垂範至於總裁理要澄汰流品詢事底績咸可明徵稽古憲章於是乎在盖夫乂衆職熈百志使官修其方而上無虚授者莫不由兹道也帝舜曰咨汝二十有二人禹垂益伯夷䕫龍六人申命舊職四岳十二牧凡二十二人特勅命之欽哉惟時亮天工各敬其職以相天事能信立天下之功三載考績三考黜陟幽明三年有成故以考功九嵗則能否幽明有别黜退其幽者升進其明者也庶績咸熈分北三苗考績法明衆功皆廣三苗幽闇君臣善否分北流之不令相從善惡明也漢元帝建昭中京房為郎時西羗反日蝕又久青無光數召見問房對曰古帝王以功舉賢則萬化成而瑞應著末世以毁譽取人故功業廢而致災異宜令百官各試其功災異可息詔使房作其事房奏考功課吏法令丞尉治一縣崇教化無犯法者輒遷有盗賊滿三日不覺者則尉事也令覺之自除二尉負其二率相准如此法帝令公卿朝臣與房㑹議温室皆以房言為煩碎令上下相司不可許帝意鄉之鄉讀曰嚮時部刺史奏事京師帝召見諸刺史令房曉以課事刺史復以為不可惟御史大夫鄭𢎞光祿大夫周湛初言不可後善之後帝令房上弟子曉知考功課吏事者欲試用之房上中郎任良姚平願以為刺史試考功法臣得通籍殿中為奏事以防雍讀壅塞石顯五鹿充宗皆疾房欲逺之建言宜試以房為郡守立議云然也帝於是以房為魏郡太守秩八百石居得以考功法治郡房自請願無属刺史得除用他郡人自第吏千石以下令長属縣自課第殿最歳竟乗傳奏事傳張戀切天子許焉房至郡坐與淮陽王舅張博通謀誅後漢明帝永平九年四月詔令司𨽻校尉部刺史歳上墨綬長吏視事三歳已上理状尤異者各一人與計偕上偕俱也所徵之人令與計吏俱上及尤不正理者亦以聞順帝時梁國陳令華義數上書陳宜依古典考功黜陟徵集名儒大定其制魏太祖建安中為丞相倉曹属劉廙書論治道曰昔者周有亂臣十人有婦人焉九人而已孔子稱才難不其然乎明賢者難得也况亂弊之後百姓凋盡士之存者盖亦無幾股肱大職及州都督司邊方重任雖備其官亦未得人也此非選者之不用意盖才匱使之然耳况於長吏以下羣職小任能皆簡練備得其人也其計莫如督之以法不爾而數轉易往来不已送迎之煩不可勝計轉易之間輙有姦巧既於其事不省而為政者亦以其不得久安之故知惠益不得成於已而茍且之可免於患皆将不念盡心於䘏民而夣想於聲譽此非所以為政之夲意也今之所以為黜陟者近頗以州郡之毁譽聽往來之浮言耳亦皆得其事實而課其能否也長吏之所以為佳者奉法也憂公也䘏民也此三事者或州郡有所不便往來者有所不安而長吏執之不已於治雖得計其聲譽未為美屈而從人於治雖失計其聲譽必集也長吏皆知黜陟之在於此也亦何能不去本而就末哉以為長吏皆宜使少久足自展歳課之能三年總計乃加黜陟課之皆當以事不得依名事者皆以户口率其墾田之多少及盗賊發興民之亡叛者為得負之計如此行之則無能之吏修名無益有能之人無名無損法之一行雖無部司之監姦譽妄毁可得而盡事上太祖甚善之文帝黄初初為尚書陳羣制九品格登用皆由於中正考之簿世然後授任明帝青龍中以盧毓為吏部尚書前此諸葛誕鄧颺等馳名譽有四窓八逹之誚帝疾之時舉中書郎詔曰得其人與否在盧生耳選舉莫取有名名如畫地作餅不可啖也毓對曰名不足以致異人而可以得常士常士畏教慕善然後有名非所當疾也愚臣既不足以識異人又主者正以循名按實為識但當有以騐其後故古者敷奏以言明試以功今考績之法廢而以毁譽相進退故眞偽混雜虗實相蒙帝納其言即詔作考課法景初中散騎常侍劉劭以士人毁稱是非混雜莫辨邵受詔作都官考課劭上疏曰百官考課王政之大較然而歴代弗務是以治典闕而未補能否混而相蒙陛下以上聖之宏畧愍王綱之弛頽神慮内鍳明詔外發臣奉㤙曠然得以啓蒙輙作都官考課七十二條又作説畧一篇臣學寡識淺誠不足以宣暢聖㫖著定典制事下三府司空掾傅嘏難劭曰盖聞帝制宏深聖道奥逺茍非其才則道不虚行神而明之存乎其人暨乎王畧虧頽而曠載罔綴微言既没六籍泯玷何則道𢎞致逺而衆才莫晞也按劭考課論雖欲尋前代黜陟之文然其制度畧以闕亡書之存者惟有周典外建侯伯藩屛九服内立列司筦齊六職士有常貴官有定則百揆均任四民殊業故考績可理而黜陟易通也大魏繼百王之末承秦漢之烈制度之流靡所修采自建安以来至於青龍神武撥亂肇基皇祚掃除凶逆芟夷遺宼旌旗卷舒日不暇給及經邦治戎權法竝用百官羣司軍國通任隨時之宜以應政機以古施今事雜義殊難得而通也所以然者制宜經逺或不切近法應時務不足垂後夫建官均職清理民物所以立本也循名考實糾勵成規所以治末也本綱未舉而造制未呈國畧不崇而考課是先懼不足以料賢愚之分精幽明之理也昔先王之擇才必本行於州閭講道於庠序行具而謂之賢道修則謂之能鄉老獻賢能於王王拜受之舉其賢者出使長之科其能者入使治之此先王収才之義也方今九州之民爰及京城未有六卿之舉其選才之職専任吏部案品状則實才未必當任簿法則徳行未為敘如此則殿最之課未盡人才述綜王度敷賛國式體深義廣難得而詳也又司𨽻校尉崔林議曰按周官考課其文備矣自康王以下遂以陵遲此即考課之法存乎其人也及漢之季其失又在乎佐吏之職不宻哉方今軍旅或猥或卒備之以科條申之以内外増減無常固難一矣且萬目不張舉其綱衆毛不整振其領臯陶仕虞伊尹臣殷不仁者逺矣五帝三王未必如一而各以治亂易曰易簡而天下之理得矣太祖隨宜設辟以遺來今不患不法古也以為今之制度不惟疏濶惟在守一勿失而已若朝臣能任仲山甫之重式是百辟則孰敢不肅乂散騎黄門侍郎杜恕以為用不盡其人雖才且無益所存非所務所務非世要上疏曰書稱明試以功三考黜陟誠帝王之盛制使有能者當其官有功者受其祿譬猶烏獲之舉千鈞良樂之選驥足也雖歴六代而考績之法不著閲七聖而課試之文不垂臣誠以為其法可粗依其詳難備舉故也語曰世有亂人而無亂法若使法可専任則唐虞可不湏稷契之佐殷周無貴伊吕之輔矣今奏考功者陳周漢之法為綴京房之本㫖可謂明考課之要矣於以崇揖讓之風興濟濟之治臣以為未盡善也其欲使州郡考士必由四科皆有事効然後察舉試辟公府為親民長吏輔以功次補郡守者或就増秩賜爵此最考課之急務也臣以為便當顯其身用其言使其為課州郡之法法具施行立必信之賞施必行之罰至於公卿及内職大臣亦當俱以其職考課之也古之三公坐而論道内職大臣納言補闕無善不糾無過不舉且天下至大萬機至衆誠非一明所能徧照故君為元首臣作股肱明其一體相湏而成也是以古人稱廊廟之材非一木之支帝王之業非一士之畧由是言之焉有大臣守職辨課可以致雍熈者哉且布衣之交猶務信誓而蹈水火感知已而披肝膽狥聲名而立節義者况於束帶立朝致位卿相所務者非特匹夫之信所感者非徒知已之惠所狥者豈聲名而已乎諸蒙寵祿受重任者不徒欲舉明主於唐虞之上而已身亦欲厠稷契之列是以古人不患於念治之心不盡患於自任之意不足此誠人主使之然也唐虞之君委任稷契䕫龍而責成功及其罪也殛鯀而放四凶今大臣親奉明詔給事目下其有夙夜在公恪勤特立當官不撓貴勢執平不阿所私危行危言以處朝廷者自明主所察也若尸祿以為高拱嘿以為智當官茍在於免負立朝不忘於容身潔行遜言以䖏朝廷者亦明主所察也誠使容身保位無放退之辜而盡節在公抱見疑之勢公義不修而私議成俗雖仲尼為謀猶不能盡一才又况於世俗之人乎今之學者師商韓而上法術競以儒家為迂濶不周世用此最風俗之流弊創業之所致謹也後考課竟不行晉武帝泰始中河南尹杜預以京師王化之始自近及逺凡所施論務崇大體受詔為黜陟之課其畧曰臣聞上古之政因循自然虗已委誠而信順之道應神感心通而天下之理得逮至淳樸漸散彰美顯惡設官分職以頒爵祿𢎞宣六典以詳考察然猶倚明哲之輔建忠貞之司使名不得越功而獨美功不得後名而獨隠皆疇咨博詢敷奏以言及至末世不能紀逺而求於宻微疑諸心而信耳目疑耳目而信簡書簡書愈繁官方愈偽法令滋彰巧飾彌多昔漢之刺史亦歳終奏事不制算課而清濁粗舉魏氏考課即京房之遺意其文可謂至宻然由於累歳以違其體故歴代不能通也豈若申唐堯之舊去宻就簡則簡而易從也夫宣盡物理神而明之存乎其人去人而任法則以傷理今科舉優劣莫若委任逹官各考所統在官一年以後每歳言優者一人為上第劣者一人為下第因計偕以名聞如此六載主者總集採按其六載處優舉者超用之六載處劣舉者奏免之其優多劣少者敘用之劣多優少者左遷之考課之品所對不均誠有難易若以難取優以易而否主者固當凖量輕重微加降殺不足復曲以法盡也己丑詔書以考課難成聽通薦例薦例之理即亦取於風聲六年頓薦黜陟無漸又非古者三考之意也今每歳一考則積優以成陟累劣以取黜以士君子之心相處未有官故六年六黜清能六進否劣者也監司将亦隨而彈之若令上下公相容過此為清議大頽亦無取於黜陟也五年詔曰古者歳書羣吏之能否三年而誅賞之諸令史前後但簡遣疎劣而無有勸進非黜陟之謂也其條勤能有稱尤異者歳以為常吾将議其功勞惠帝元康中吏部尚書劉頌建九班之制欲令百官居職逓遷考課能否明其賞罰賈郭專朝仕者欲速竟不施行南齊東昏侯永元元年考課百司後魏太武太延元年詔曰操持六柄王者所以統攝平政理訟公卿之所司存勸農平賦宰民之所專急盡力三時黔首之所克濟各修其分課之有序今更不然何以為治越職侵局綱紀紛亂上無定令民知何從自今以後亡匿避難羈旅他鄉皆當歸還舊居不問前罪民相殺害牧守依法平決不聼私輙報復敢有報者誅及宗族鄰伍相助與同罪州郡不得妄遣吏卒煩擾民庶若有發調縣宰集鄉邑三考計貲定課裒多益寡九品混通不得縱富督貧避強侵弱覆簡能否覈其殿最列言属州刺史明考優劣抑退奸吏升進貞良歳盡舉課上臺牧守荷治民之任當宣揚㤙化奉順憲典與國同優直道正身肅居官次不亦善乎孝文延興二年十二月詔曰書云三載考績三考黜陟幽明頃者以來官以勞昇未久而代牧守無恤民之心競為聚歛送故迎新相属於路非所以固民志隆治道也自今牧守温仁清儉克己奉公者可久於其任歳積有成遷位一級其有貧賤非道侵削黎庻者雖在官逋邇必加黜罰著之於令永為彛准五年二月詔定考課明黜陟太和十五年十一月考諸牧守十八年春太子太保錄尚書事廣陵王羽奏外考令文每歳終州鎭列牧守治状及至再考隨其品第以彰黜陟去十五年終在京百僚盡已經考為三等此年便是三載雖外有成令而内令未班内外考察理應同等臣輙推准外考以定京官治行詔曰雖内考未宣績已久著故明堂月令載公卿大夫論考属官之典台職區分著三公尚書三載殿最之義此之考内已為明矣但論考之事理在不輕問績之方應關朕聽輙爾輕發殊為躁也每考之義應在年終既云此年何得春初也今始維夏且待至秋帝顧謂羽曰考課之法上下二等可為三品中等但為一品所以然者上下是黜陟之科故旌絲髪之美中等守本事可大通帝又謂尚書等曰卿等在任年垂二周未嘗進一賢退一不肖此二事罪之大者謂羽曰汝居樞端之任在職以來功勤之績不聞於朝阿黨之音頻干朕聽今黜汝錄尚書廷尉但居特進太保自尚書令僕以下凡黜退三十餘人皆舉遺闕諸如此比黜官者令一年之後任官如初九月壬申詔曰三載考績自古通經三考黜陟以彰能否今若待三考然後黜陟可黜者不足為遲可進者大成賖緩是以朕今三載一考考即黜陟欲令過滯無妨於賢者才能不壅於下位各令當曹考其優劣為三等六品以下尚書重問五品已上朕将親與公卿論其善惡上上者選之下下者黜之中中者守其本任壬午帝臨朝親加黜陟十九年十月詔諸州牧精品属官考其得失為三等之科以聞将親覽而昇降焉宣武初尚書令王肅奏考以顯能陟由績著昇明退闇於是乎在自百僚曠察四稔于兹請依舊式考簡能否從之景明二年六月考諸州刺史加以黜陟永平四年十二月詔曰進善退惡治之通規三載考察政之明典正始二年以來於今未考功過難齊寧無昇降從景明三年至永平四年通考以聞時員外常侍鎭逺将軍劉摠立考課之科明黜降之法甚有條貫大保領太尉侍中高陽王雍以帝頒考陟之法上表曰竊惟三載考績百王通典今任事上中者三年昇一階散官上第者四載登一級閑冗之官本非虗置或以賢能而進或因累勤而舉如其無能不應忝兹高選或任官外戍逺使絶域或催督逋縣察簡州鎭皆是散官以充劇使及於考陟排同閑伍竊據散官之人非是皆劣稱事之軰未必皆賢而考閑以多年課煩以少歳上乖天澤之均下生不等之苦又尋景明之格無折考之文正始之奏有與奪之級明参差之考非聖慈之心改典易常乃有司之意又尋考級之奏委於任事之手渉議科勤絶於散官之筆遂使在事者得展自勤之能散軰者獨絶披襟之所抑以上下之閑限以㫖格之判致使近侍禁職抱槃屈之辭禁衞武夫懷不申之恨欲克平四海何以獲諸又散官在直一玷成尤衘使愆失差毫即坐徽纆所逮未以事閑優之節慶之賚不以祿位加賞罰殿之犯未殊任事考陟之機推年不等臣聞君舉必書書而不法後代何觀詩云王事靡盬不遑啓處又曰豈不懷歸畏此簡書依依楊栁以敘治兵之役霏霏雨雪又申振旅之勤若折往來日月便是採薇之詩廢枤杜之歌罷又任事之官吉凶請假定省掃拜動歴十旬或因患重請告動輙經歳征役在途勤泰百倍苦樂之勢非任事之倫在家私閑非理務之日論優語劇先宜折之武人攙上格者為羽林次格者為虎賁下格者為直從或累紀征戍靡所不渉或帶甲連年負重千里或經戰損傷或年老衰竭今試以本格責其如初有爽於先退階奪級此便責以不衰理未通也又蕃使之人必抽朝彦或歴嶮千餘或履危萬里發有死亡之憂咸懷不返之戚魂骨奉忠以尸将命先朝賞格酬以爵品今朝改式止及階勞折以代考有乖使望非所以奨勵皇華而敦崇四牡者也復尋正始之格汎後任事上中者三年昇一階汎前任事上中者六年進一級三年一考自古通經今以汎前六年昇一階簡無愆犯倍年成級以此推之明以汎代考新除一日同霑階榮下第之人因汎上渉上第之士由汎而退臣又見簿尉資品本官流外刋諸明令行之已久然近為里巷多盗以其威輕不肅欲進品清流以厭姦宄甄琛啓云為法者施而觀之不便則改竊謂斯言有可採用聖慈昭鑒更高宰尉之秩今考格始宣懷怨者臣竊觀之亦謂不可有光國典改之何難帝乃引雍共論時務徐州刺史蕭寳寅又論曰方今守令厥任非輕及考課悉以六載為程既而限滿代選復經六年而敘是則歳周十二年始得一階於東西兩省文武閑職公府散佐無事冗官或數旬方應一直或弦朔止於蹔朝及其考日更得四年為限是則一紀之内便登三級彼以實勞劇任而遷貴之路至難此以散位虗名而昇陟之方甚易何内外之相懸令厚薄之如是其後尚書右僕射郭祚又奏曰謹按前後考格雖班天下如臣愚短猶有未悟今頓定職人遷轉由復超越階級者即湏量折景明初考格五年者得一階半正始中故尚書中山王英奏考格被㫖但可止滿三周為限不得計殘年之勤又去年中以前二制不同奏請裁决㫖云黜陟之體自依舊來常斷今未審舊來之㫖為從景明之斷為從正始之限景明考法東西兩省文武閑官悉為三等考同任事而前尚書盧昶奏上第之人三年轉半階今之考格復分為九等前後不同參差無准詔曰考在上中者得汎以前有六年以上遷一階三年已上遷半階殘年悉除考在上下者得汎以前六年已上遷半階不滿者除其得汎以後考在上下者三年遷一階散官從盧昶所奏祚又奏言考察令公清獨著徳績超倫而無負殿者為上上一殿為上中二殿為上下累計八殿品降至九未審今諸曹府寺凡考在事公清然才非獨著績行稱務而德非超倫幹能粗可而守平堪任或人用小劣處官濟事并全無負殿之徒為依何第景明三年以來至今十有一載准限而判三應昇退今既通考未審為十年之中通其殿最積以為第隨前後年斷各自除其善惡而為昇降且負注之章數成殿為差此條以寡愆為最多戾為殿未審取何行是寡愆何坐為多戾結累品次復有㡬等諸文按失裏應杖十者為一負罪依律愆過隨負計十年之中三經四𤯝赦前之罪不問輕重皆蒙宥免或為御史所彈案驗未周遇赦復任者未審記殿復除與不詔曰獨著超倫及才備寡咎皆謂文武兼上上之極言耳自此已降猶有八等隨才為次今文已具其積負累殿及守平得濟皆含在其中何容别疑也所云通考者據聽多年之言至於黜陟之體自依舊來年斷何足復請其罰贖已決之殿固非免限遇赦免罪唯記其殿者除之延昌二年将大考百僚員外常侍領三公郎崔鴻以考令於體例不通乃建議曰竊惟王者為官求才使人以器黜陟幽明揚清激濁故績效能官才必稱位者朝昇夕進年歳數遷豈拘一階半級關以常僚等位者哉二漢已降大和已前茍必官湏此人人稱此職或超騰峻陟數歳而至公卿或長兼試守稱允而不遷進者披卷則人人如是舉目則朝貴皆然故能時收名士之譽國號豐賢之美竊見景明以来考格三年成一考一考轉一階貴賤内外萬有餘人自非犯罪不問賢愚莫不上中才與不肖比肩同轉雖有善政如龔黄儒學如王鄭才史如班馬文章如張蔡得一分一寸必為常流所攀選曹亦抑為一槩不曽甄别琴瑟不調改而更張雖明㫖已行猶宜消息宣武不從孝明孝昌元年二月詔曰勸善黜惡經國茂典其令每歳一終郡守列令長刺史列守相以定考課辨其能否若有濫謬以考功失衷論隋文帝開皇六年二月制刺史二佐每歳暮更入朝上考課盧昌衡為徐州總管長史甚有能名吏部尚書蘇威考之曰德為人表行為士則論者以為美談仁夀中秦州總管錄事叅軍房彦謙嘗因朝集時左僕射高熲定考課彦謙謂熲曰書稱三載考績黜陟幽明唐虞以降代有其法黜陟合理褒貶無虧便是進必得賢退皆不肖如或舛謬法乃虗設比見諸州考挍執見不同進退多少参差不類况復愛憎肆意致乖平坦清介孤直未必高第卑謟巧官翻居上等直為眞偽混淆是非瞀亂宰貴既不精練斟酌取捨曽經驅使者多以蒙職復成未歴臺省者皆為不知被退而又四方懸逺難可詳悉唯量人數半破半成徒計官員之少多莫顧善惡之衆寡欲求允當其道無由明公鑒逹幽微平心遇物今所考較必無阿枉脱有前件數事未審何以裁之惟願逺布耳目精加採訪褒秋毫之善貶纎介之惡非直有光至治亦足標奨賢能詞氣侃然觀者属目熲為之動容深見嗟賞因歴問河西隴右官人景行彦謙對之如響熲顧謂諸州總管刺史曰與公言不如獨與秦州考使語後數日熲言於帝帝弗能用煬帝大業二年七月制百官不得計考增級必有德行功能顯著者擢之五年正月詔曰太守每歳上属官景迹是年為潁川郡丞敬肅朝東都帝令司𨽻大夫薛道衡為天下郡官之状肅曰心如鐡石老而彌篤唐高祖武德二年二月帝親閲羣臣考績以李綱孫伏伽為上帝初受禪以舞人安叱奴為散騎侍郎綱上疏論諫伏伽亦諫賞獻琵琶弓箭者及請擇正人為太子諸王師友皆言詞激切故皆陟其考第以旌賞之太宗貞觀元年二月詔刺史縣令已下官人若能使婚姻及時鰥寡數少量准户口增多以進考第如其勸導乖方失於配耦准户口減少以附殿失三年尚書右僕射房𤣥齡及侍中王珪掌内外官考治書侍御史權萬紀奏其不平追按勘問王珪不伏舉按帝付侯君集推問秘書監魏徵奏稱必不可推鞫且𤣥齡王珪國家重臣俱以忠直任使其所考者既多或一人兩人不當終非有阿私若即推繩此事更不可信任何以堪當重委假令錯繆有實未足虧損國家窮鞫若虗失委大臣之體且萬紀比來常在考堂必有乖違足得論正當時鑒見切無陳説身不得考方始糾彈徒發在上瞋怒非是誠心為國無益於上有損於下所惜傷於理體不敢有所阿為遂釋不問六年監察御史馬周上疏曰臣切見流内九品已上令有等第而自比年入多者不過中上未有得上上以上考者臣謂令設九等正考當今之官必不施之於異代也縱朝廷實無好人猶應於見任之内比較其尤善者以為上第豈容朝廷之士遂無堪上上之考者朝廷獨知貶一惡人可以懲惡不知褒一善人足以勸善臣謂宜每年選天下政術尤最者一二人為上上其次為上中其次為上下則中人以上可以自勸十一年正月十三日勅散位一切以門䕃結階品然後依勞進敘凡入仕之後遷代則以四考為限四考中中進年勞一階每一考中上進一階一考上下進二階五品已上非特恩刺史無進階之令唐制考課之法有德義清慎公平恪勤各一善自近侍至於鎮防并據一事目為之最凡二十七焉一最以上有四善為上上一最以上有三善或無最而有四善為上中一最以上有三善或無最而有二善為上下一最以上有一善或無最而有二善為中上一最以上或無最而有一善為中中職事粗理善最弗聞為中下愛憎任情處斷乖理為下上背公向私職務廢闕為下中居官謟詐及貪濁有状為下下若於善最之外别有可嘉尚及罪雖成殿情状可矜或雖不成殿而情状可責者省較之日皆聽考官臨事量定諸州縣官人撫育有方户口增益者各准見户為十分論每加一分刺史縣令各進考一等增户口謂課丁率一丁同一户法增不課口者每五口同一丁例其有破除者得相折其郡户不滿六千縣户不滿五百者各准五千五百户法為分若撫飬乖方户口减損者各准增户法亦每减一分降一等課謂及不課竝准上文其勸課田農能使豐阻者亦准見地分為十分論每加二分各進考一等此謂永業口分之外别能墾起公私荒田者其有不加勸課以致减損者課為永業口分之内有荒廢者每損一分降考一等若數處有功竝應進考者竝聽累加如此處分從之高宗上元二年大理寺丞狄仁傑考中上考使尚書左僕射劉仁軌以新任不錄大理卿張文瓘稱獨知理司之要仁軌大驚問公斷幾何獄文瓘曰歳竟凡斷一萬七千八百人仁軌乃擢為上下考三年金州刺史滕王元嬰頗縱驕逸動作無度高宗與書戒之極為至切又勅之曰朕以王骨肉至親不能致王於理今書王下下考以媿王心開耀元年十一月二十三日詔縣令有聲績可稱先進考員外郎侍御史京兆河南判司及自餘清望官先於縣令簡擇中宗神龍中御史中丞盧懐愼上疏曰臣聞孔子曰為邦百年可以勝殘去殺又曰茍有用我者朞月已可三年有成故書云三載考績較其功也子産賢者也其為政尚累年而化成况其常材乎切見比來州縣官佐下車布政在任多者一二年少者三五月遽即遷除不論考課或歴時未改便傾耳而聽企踵而覩争求冐進不顧亷恥亦何暇宣風布化求瘼恤人哉户口流散百姓凋敝職為此也何則人知吏之不久則不從其吏吏知遷之不遥又不盡其能偷安茍且脂韋而已又古之為吏者長子孫倉氏庾氏即其後也臣請都督刺史上佐兩畿縣令等在任未經四考不許言遷除察其課効尤異或錫以車裘或就加祿秩或降使臨問并璽書慰勉若公卿有闕則擢以勸能政績無聞祗犯貪暴者放歸田里以明賞罰致理救弊莫過於此劉秩為左監門錄事叅軍論曰昔周公使伯禽治魯三年而後報政周公曰何遲伯禽曰變其禮易其俗難所以遲太公治於齊三月而後報政周公曰何疾曰因其俗簡其禮易所以疾故孔子論之曰齊一變至於魯魯一變至於道由是而言勞不甚者理不極功不積者澤不深故堯舜三年而考績三考而黜陟所以能盡其智術也近古人情敦龎未淳乎堯舜禮正樂和未愈於虞夏官賢吏能未稱於殷周或一年而考或四考黜陟或比年而廵狩或歳時更遷或旬月升擢令長今日既上明日部内有犯名義者即坐之不其謬歟𤣥宗開元三年正月五日勅内外官考未滿所司預補替人名為守闕特宜禁斷縱後有闕所由不得令上六月制每年十月委當道按察使校量理行殿最從第一等至五等奏聞校考使乃吏部長官總詳覆諸州亦比類定為五等奏聞上等為最下等為殿中間三等以次定優劣改轉日慿為昇降縣令每年選舉人内准前條訪擇補置在任有術一任申使状有兩請兼户口復業帶上考者選日優與内官其使状有一請兼帶上考者滿日不限選數聽集優與處分刺史第一等量與京官若要在州未可除改者紫㣲黄門簡勘聞奏當加優賞京官不曽任州縣官者不得擬為臺省官吏部銓選委任尤重比雖守職務在循常既限之以選勞或失之於求事選日㧞擢一二千人不湏限以資次必湏究其聲實不得妄相汲引自古鄉舉里選實課人之淑慝其明經進士擢第者每年委州長官訪察行業修謹書判可觀者三選聽集并諸色選人者若有鄉閭無景行及書判全弱選數縱深亦不在送限崇化致理必在得人奨善勸能義資師古皆有煩濫未聞釐革循名責實其道不行為人擇官人蠧猶在既復政理不可因循湏加簡勘以正頽弊四年四月七日制選人既得比銓注過謝了皆不及考遂使每一年選人即虚破一年闕在於公私俱不利便自今已後官人初上年宜聽通計年終已來滿二百日許其成考仍進遷考例至來年考時併較永為常式十一月制曰撫字之道在於縣令不許出使多不得上考每年選補皆不就此官若不優矜何以勸奨其縣令在任户口增益界内豐稔清勤著稱賦役均平者先與上考不在當州考額之限也五年正月行幸東都勅行幸所經州宜令紫微黄門察訪刺史上佐政術定作三等奏聞仍令於具負内簡上中下刺史上佐有稱職者條錄奏聞将隨才錄用六年二月制曰與我共理惟良二千石久於其政然後化成承前以來頗多僥倖但因入考即有改轉自今已後非灼然應黜陟者更無遷易敦此風俗革其茍且又舊例别駕皆是諸親近年以來頗多餘色先授者未能頓輟已後自循舊制去冬有因計入朝不可更令却往過考事了竝量事敘用十一年二月勅朱紫貴品皆據考勞人臣事君忠無二節至如泛階溥及義取半分豈獨清官徧得減考自今已後泛加階應入五品以十六考為定入三品以三十考為定其有明賢宿徳及異迹殊状雖不逄泛階或因遷改之次年考與節限同者咸以名聞仍為永例十四年御史大夫崔隠甫充較外官考事舊例皆委叅問經春未定隠甫召天下朝集使一時集省中一日較考便畢時人伏其敏斷十七年三月左丞相張説知京官考特注其子中書舎人垍曰父教子忠古之善訓祁奚舉午義不務私至如潤色王言章施帝道載叅墳典例絶常功恭聞前烈尤難以任豈以嫌疑敢撓綱紀考以上下十八年勅京官考滿帶祿選有本司要籍奏留請不用闕者選數不湏與成勞二十二年八月制曰朕憂於理人委在牧宰雖已分命仍未盡誠如聞刺史新除所蒞不過數月即營入計無心在州政教闕如朝寄安在自今已後刺史到任皆不得當年入考若聲績稍著奨㧞未遲何處不安自彰汲汲其縣令差使先亦禁斷比聞在逺猶自故違宜委諸道採訪申明處分勿使如此二十五年十二月命諸道採訪使考課官人善績三年一奏永為常式其兩任聲實相副者為昇進名聞二十七年二月制曰古者三載考績黜陟幽明允叶大猷以勸天下比來諸道所通善状但優仕進之軰與為選調之資責實循名或乖古義自今日已後諸道使更不湏通善状每至三年朕當自擇使臣觀察風俗有清白政理著聞者當别擇用二十八年三月一日制曰先是内外六品已下應補授官四考滿待替為滿是日制令以歳為滿不待替縣令知倉庫供奉伎術及充綱領等不在此限至其年十二月十六日詔内外六品已下官依舊待替其無替者五考滿後停天寳二年八月五日考功奏准考課令考前釐事不滿二百日不合成考者釐事謂都論在任日至考時有二百日即成考請假停務竝不合破日比來多不㑹令文以為不入曹局即不為釐事因此破考臣等叅量但請俸祿即同釐事請假不滿百日停務不至觧免事雪却上其考竝不合破若有停務逾年不可更請祿料兼與成考勅㫖從之三年正月制曰凡諸郡縣仍令太守縣令勸課農桑先處分太守縣令在任有增減户口成分者所由司量為殿最自今已後太守縣令亷能勾當租庸每年加數成分者特賜一中上考如二載之内皆有成分所司錄奏超資與處分八年正月二十三日勅所較内外官考准令京官正月三十日進單數二月三十日進挟名外官二月三十日進單數三月三十日進挟名自今已後竝了日一時挟名奏不湏更進單數六月七日吏部侍郎李彭年奏准例出身已來竝合簡覆中間已敘五品勘責皆有所慿今重簡尋恐為煩擾如曽經勘責敘成者請從五品已後勘簡其五品已前但勘考數足即為進敘勅㫖依十二年十月制曰循名責實所以激羣吏也懲惡勸善所以務至公也茍黜陟之非當何考課之足徵其内外文武官員外同正員并判試不釐務者既無别效兼有多年比年因循或與進考據額既標節限縁此遂多踰越致令課最者見棄無功者獲昇奨勸之門殊非允當自今已後竝不在進考之例其内外官初効亦不在與限臺省官考各委長官比類才能功課褒昇不得一例申送俾僥競息心功能勵節十三載二月制曰三載黜陟百王令典殿最之迹亷問攸歸欲更别遣使臣慮有煩擾今載宜委本道採訪使具官人善惡奏聞以申勸沮肅宗乾元二年二月御製郭子儀李光弼苗晉卿李麟李輔國考辭代宗寳應元年十月吏部奏准今年五月詔州縣官自今已後宜令三考一替者今數州申觧疑三考後為復待替到為復便勒停請處分者今望令已校三考官待替到如替人不到請校四考後停三年正月考功奏請立京外察按京察連御史臺分察使外察連諸道觀察使各訪察官吏善惡其功過稍大事當奏聞者使司按成便奏每年九月三十日以前具状報考功其功過雖小理堪懲勸者按成即報考功至考較日叅驗事迹以為殿最閏月考功奏内外員外官等除合在定數外准勅竝任其所適既不入曹無慿簡考比來或有申者即與見在同奏簡勘之時成破不一文案混雜條流未明臣等商量望請自今已後内外文武員外同正及試官除合在任外一切不在申較之限并聽從授日計考准中中例敘用從之永泰元年正月制曰刺史縣令與朕分憂凋瘵之人切湏撫字一夫不獲情甚納隍有能招緝逃亡平均賦税增多户口廣闢田疇清節有聞課效尤著者宜委所在節度觀察具名聞奏即令按覆超資擢授其有理無能政迹渉贓私必當重加貶奪永為殿累中外寮吏各揚其職無或曠官克副朕意大厯元年十一月制曰國以人為本人以農為業頃由師旅征税殷繁編户流離田疇荒廢永言牧宰政切親人其刺史縣令宜以招緝户口墾田多少用為殿最每年終委本道觀察節度等使按覆奏聞如課績尤異當加超擢或政理無聞必寘科貶八年十月勅中書舎人常衮諫議大夫杜亞起居郎劉灣左補闕李翰考吏部選人判十三年正月制曰捉獲造偽及光火強盗等賊合上考者本州府當申刑部冊府元龜卷六百三十五
