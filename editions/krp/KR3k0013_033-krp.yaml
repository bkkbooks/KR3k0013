body:
  text: 冊府元龜卷三十三宋王欽若等撰帝王部崇祭祀第二後周閔帝元年正月辛丑即天王位柴燎告天壬寅祠圜丘詔曰予本自神農其於二丘宜作厥主始祖獻侯啓土遼海肇有中國其配南北郊文考德符五運受天明命祖於明堂以配上帝廟為太祖癸卯祠方丘甲辰祠太社辛亥祠南郊二月癸酉朝日于東郊戊寅祠太社八月戊辰祠太社明帝元年十月乙酉祠圜丘丙辰祠方丘甲午祠太社十一月丁未祠圜丘武帝保定元年正月庚戌祠圜丘壬子祠方丘甲寅祠感帝於南郊乙夘祠太社二月甲午朝日於東郊太和元年三月丙午祠南郊二年三月初立郊丘壇壝制度三年正月辛丑祠南郊建徳二年正月辛丑祠南郊六年五月己丑祠方丘宣帝宣政元年六月即位七月丙午祠圜丘戊申祠方丘八月丙寅夕月于西郊隋髙祖開皇元年二月甲子即位設壇於南郊天使柴燎告天丙寅詔修社廟三年四月癸巳親雩五月辛酉有事於方澤八月戊子有事於大社四年正月辛未有事於南郊七年二月丁巳朝日於東郊十年十一月辛丑有事於南郊十二年十一月辛亥有事於南郊十四年閏十月詔東鎮沂山南鎮㑹稽山北鎮醫無閭山冀州鎮霍山竝就山立祠東海於㑹稽縣界南海於南海鎮南竝近海立祠及四瀆吳山竝取側近巫一人主知灑掃竝命多蒔松柏其霍山雩祠日遣使就焉甲戌年正月詔北鎮於冀州龍山立祠東鎮晋州霍山鎮若修造竝准西鎮吳山造神像十五年正月東廵狩次齊州丙寅旅玊符山三月己未至自東廵狩望祭五嶽海瀆六月辛丑詔名山大川未在祀典者悉祭之十八年十一月癸未有事於南郊仁夀元年十一月己丑有事於南郊煬帝大業元年孟春祀感帝孟冬祀神州改以髙祖文帝配其餘竝用舊禮四年八月辛酉親祀恒嶽河北道郡守畢集十一年十一月乙巳有事於南郊唐髙祖武徳元年五月甲子即位遣兼太尉禮部尚書蕭造告於南郊二年十月幸華隂甲子親祀華山三年四月親祠華山四年十一月甲子有事於南郊七年六月幸仁智宫以少牢祭宫所山川九年正月丙子詔曰厚地載物社主其祭嘉糓飬民稷惟元祀列聖垂範昔王通訓建邦正位莫此為先爰暨都邑建于州里率土之濵咸極荘敬所以勸農務夲修始報功敦序教義整宻風俗末代澆浮祀典虧替時逢䘮亂仁惠弛薄壇壝闕昭備之禮鄉閭無紀合之訓朕握圖受歴菲食卑宫奉珪璧以尊嚴潔粢盛而禋燎尚想躬稼厲精治本永言享祀宜存億紀是以吉日惟戊親祀大社率從百僚以祈九糓今既南畝俶載東作方興州縣致祀宜盡祗肅四方之民咸勤殖藝隨其性類命為宗社京邑庶士臺省羣官里閈相從共尊社法以時供祀各申祈報兼存宴醑之義用洽鄉黨之歡且立節文明為典制進退俯仰登降折旋明加誨厲逓相勸奨齊之以禮有恥且格布告天下即宜遵用戊寅親祀稷太宗以武徳九年八月甲子即位遣兼太尉司空裴寂柴燎告天於南郊貞觀五年十一月丙子帝有事於南郊十四年十一月甲子朔旦冬至親祠南郊十七年十月甲寅詔曰朕聞上靈之應疾於影響茂祉之興積於年代朕嗣膺寳歴君臨區宇憑宗社之介福賴文武之同心時無風塵之警野有京坻之積厚地降祉貞石表祥營翠色而流光發素質而成字前紀厥初之徳次陳卜年之永後述儲貳之羙竝名字昭然楷則相次曠代之所未聞故老之所未覩猥以寡徳處奉成命緬惟徃載良増兢惕自天之佑豈惟一人無疆之福方覃九土自非大報泰壇稽首上帝則靡申奉天之志寕副臨下之心今年冬至有事南郊所司率繇舊典十一月己卯有事於南郊太宗升壇皇太子從奠於時累日隂雪是旦猶雲霧晦冥及太宗升壇煙氛四散風景清朗文物昭映禮畢祝官讀謝天瑞文曰嗣天子臣諱敢昭告于昊天上帝諱纂承鴻基君臨宇縣夙興旰食無忘於政道導徳齊禮良愧于前聖爰有成命表瑞貞石文字昭然歴数惟永既旌髙廟之業又錫眇身之祚逮于皇太子某亦降禎符竝具紀姓氏兼列名字仰瞻雲漢寔銘大造俯惟寡薄彌増寅懼敢因大禮重薦玉帛上謝明靈之貺以申祗慄之誠皇太子某亦恭至泰壇䖍拜於蒼昊庶憑眷祐之徳永膺無疆之休初十六年太宗遣刻受命𤣥玉璽白玉為螭首其文云皇天景命有徳者昌竝神筆𨽻書然後鎸勒是日侍中負之以從十九年征遼三月丁丑幸定州經北嶽帝自為文祭之髙宗永徽三年三月甲子詔升先蠶為中祀乾封二年十二月甲午詔曰夫受命承天崇至敬於明祀膺圖纂籙昭大教於嚴配是以薦鮪鱨於清廟集振鷺於西雍宣雅頌於太師明肅恭於祖考用能紀配天之盛業嗣積徳之鴻基永播英聲長為稱首自周京道䘮秦室政乖禮樂淪亡典經殘滅遂使漢朝博士空説六宗之文晋代鴻儒争陳七祀之議或同昊天于五帝或分感帝于五行自此以降逓相祖述異論紛紛是非莫定朕以寡薄嗣膺丕緖肅承禋祀明發載懐䖍奉宗祧寤寐興感每惟宗廟之重尊配之儀思革舊章以申誠敬禮曰化人之道莫急於禮禮有五經莫重於祭祭者非物自外至也自内生於心也是以惟賢者乃能盡祭之義况祖功宗徳道冠百王盡聖窮神義髙千古自今已後祭圜丘方丘明堂感帝神州等祖髙祖太武皇帝太宗文皇帝崇配仍縂祭昊天上帝及五天帝於明堂庶因心致敬獲展䖍誠宗祀配天永光鴻烈上元三年二月詔以今冬有事於嵩嶽命所司修撰儀注務從典故閏三月詔以吐蕃犯塞停嵩嶽封禪之禮永淳二年春正月甲午朔車駕發東都庚子至奉天宫遣使祭嵩嶽及少室箕山具茨等山西王母啓母廟中宗神龍元年五月改先農為帝社壇西帝稷壇禮同大社大稷壇不備方色所以異於大社也九月壬午親祀昊天上帝皇地祗于明堂髙祖天皇大帝配景龍三年十一月乙丑親祀南郊十二月甲午幸新豐溫湯境内有自古帝王陵致祭睿宗太極元年正月辛巳有事於南郊五月戊寅有事於北郊𤣥宗先天二年八月癸丑封華嶽神為金天王開元四年二月甲子命有司以少牢致祭驪山仍禁樵採時大旱應禱而雨報之也五年正月命右散騎常侍禇無量攝黄門監致祭于帝堯祠吏部尚書兼黄門監宋璟致祭于帝舜祠紫微侍郎同紫微黄門平章事蘇頲致祭于夏禹祠各令當州刺史上佐為亞獻終獻十二月戊寅詔曰國之大事在祀神之所歆惟敬潔誠而齊精意以享則可臻介福致休祥深慮有司未副厥㫖所緣宗廟社稷嶽瀆等祭宜令禮官博士斟酌古今務加䖍肅合於典禮即詳定奏聞八年三月勑頃嵗未登水旱不節今春事方起農桑是憂祈於上𤣥福兹下土式展郊禋之禮以申誠請之心宜令左常侍元行冲攝侍中祠南郊太常長官分祭華嶽溫湯十年十二月壬寅将北廵詔曰王者承事天地以為主郊享泰尊以通神盖燔柴太壇定天位也瘞埋太折就隂位也将以昭報靈祗克崇嚴配爰迨秦漢稽諸祀典立甘泉於雍畤祠后土於汾隂遺廟巋然靈光可燭朕觀風唐晋秩望山川肅恭明神思致禋敬為人求福以輔升平今此神符應於嘉徳宜以來年正月北廵狩行幸至汾隂以二月祠后土所司准式先是脽上有后土祠嘗為婦人塑像則天時移河西梁山神塑像就祠中配焉至是有司送梁山神像於祠外之别室内出錦繡衣服以上后土之神乃更加装飾焉又於祠堂院外設壇如皇地祗之制及所司起作獲寳鼎三枚以獻十一年正月行幸北都二月壬子祠后土於汾隂之脽上四月庚申勑曰河東冀方其鎮惟霍神為天吏山有嶽靈在昔皇業初興肇蒙嘉祉今者省方旋軫重獲休徵同受三神之貺獨忘百邑之禮其霍山宜崇飭祠廟秩視諸侯蠲山下十戸以為灑掃晋州刺史春秋致祠九月癸未制曰帝王承天必崇告類之典文武尊祖是遵嚴訓之義所以克荷成命昭升前烈盖王者之子道乃聖人之神教朕以寡昧猥承丕緒獲主祭祀一紀于兹輔相之宜下不足以被物馨香之徳上不足以動天故嵗咸不登刑且未恤内省為媿大禮猶鬱星晷驟遷夙夜祗懼今四夷内附諸侯率職羣生和洽百物阜蕃猶恐教或未孚求之皇極誠有不逹觀於國風故親廵河東祈糓脽上神歆有答嵗物以冀此皆先聖無疆之休上𤣥啟祐之貺冀因報謁式展誠敬宜以迎日之至允備郊天之禮所司詳擇舊典以聞十一月戊寅親祠南郊十二年十一月庚午幸東都勑有司所經名山大川自古帝王陵忠臣烈士墓精意致祭以酒脯時菓用代牲牢丙寅至華隂上制岳廟文命刺史徐知仁與信安王禕勒石於華嶽祠南之通衢十三年十一月壬辰詔封太山神為齊天王禮秩加三公一等宜令所管崇飾祠廟近山十里禁樵採十六年六月丁亥詔曰爰自首春有愆時雨朕憂勤黎獻精禱靈祗遂蒙九𤣥垂福百神效祉膏澤頻降嘉生繁育睠彼山川能興雲雨報功享徳祀典存焉諸州所管名山大川宜令當處長官設祭務盡誠敬以昭典禮庚寅詔曰宗社垂祐隂陽順成甘澤應時庶物繁育祗奉靈慶寅畏載深宜令中書門下肅事昭報仍令所司擇日奏聞十八年正月丁巳親迎氣於東郊禮畢詔其海内五嶽四瀆及諸鎮名山大川及靈跡各令郡縣逐處設祭八月丁酉詔曰祭主於敬神歆惟徳黍稷非馨蘋藻可薦宣尼闡訓以仁爱為先句龍業官以生植為夲普天率土崇徳報功饗祀惟殷封割滋廣非所以全惠飬之道叶靈祗之心其春秋二祀及釋奠天下諸州府縣等竝停牲牢唯用酒脯務在修潔足展誠敬自今已後以為常式十九年四月壬辰兩京及天下諸州各置太公廟一所制曰乾坤冲用隂陽所以運行帝王大業文武所以垂範故四序在乎平分五材資於竝用式稽乾坤之意載明文武之道永言舊章斯典未洽自我而始爰偹闕文昔羲皇立弧矢之象黄帝有甲兵之事将以定祸亂濟生靈分二柄而齊設配兩儀而共乆至若用之以仁義行之以禮樂龍豹卷舒而莫測星辰應變而無方誰其尸之則齊太公之道也故宣尼大聖立文以化成尚父惟師仗武而𢎞訓齊魯之道列親賢之教興鬱為政源崇我王業遂使金石之奏永播於蹲龍之庭烝嘗之享不行於非熊之室文武竝設斯不然矣豈王風云季禮没於前修将帥是尊慶彰於今日式崇大典垂裕後昆宜令兩京及天下諸州各置太公尚父廟一所以張良配享春秋二時取仲月上戊日祭諸州賓貢武舉人准明經進士行鄕飲酒禮每出師命将辭訖發日便就廟引辭仍簡取自古為将功業顯著康濟生人者十人准十哲例預享甲辰命有司祭五嶽四瀆以尚書省諸曹郎分徃諸州祭焉二十年四月戊申命有司擇日就祭五嶽四瀆十一月庚午祀后土於脽上命有司陳禮帝質明而享是日大赦制五嶽四瀆名山大川各令致祭務盡誠潔二十二年四月詔曰春秋祈報郡縣常禮比不用牲豈云血祭隂祀貴臭神何以歆自今已後州縣祭社特牢宜依常式六月詔曰春來多雨嵗事有妨朕自誠祈靈祗降福以時開霽迄用登成永惟休徵敢忘昭報宜令所司擇日享九廟仍令髙品官祭五嶽四瀆其天下名山大川各令所在長官致祭務盡誠潔用申精意二十三年正月乙亥藉田祀先農禮畢詔五嶽四瀆名山大川竝令所在長官以禮致祭己夘勑曰自今已後有大祭宜令丞相特進少保少傅尚書賓客御史大夫攝行事二十四年七月庚子有上封事者言月令云八月日月㑹于夀星居列宿之長五者土之数以生為大臣竊以夀者聖人之長也土者皇家之徳也陛下首出夀星之次旅于土徳之数示五運開元之期萬夀無疆之應伏請兩京各改一殿以萬夀為名至千秋節㑹百僚於此殿如受元之禮每至八月社日配夀星祠至於大社壇享之詔曰徳莫大於生成福莫先於夀考苟有所主得無祀之今有上事者言仲秋日月㑹於夀星以為朕生於是月欲以配社而祭於義不倫且夀星角亢也既為列宿之長復有福夀之名豈惟朕躬獨享其應天下萬姓寕不是懐盖秦時已有夀星祠亦云舊矣宜令所司特置夀星壇常以千秋節日修其祀典申勑夀星壇宜祭老人星及角亢七宿著之常式二十五年十月戊申勑曰時和年豐神所福也精意備物祭之義也朕每為蒼生嘗祈稔嵗微誠有感丕應乃彰今宗社降靈神祗効祉三時不害百糓用成遂使京坻遍于天下和平之氣既無逺而不通禋祀之典亦有期而必報宜令兵部尚書兼中書令晋國公李林甫工部尚書同中書門下三品豳國公牛仙客即分祭郊廟社稷尚書左丞相裴耀卿祭中嶽禮部尚書杜暹祭東嶽御史大夫李適之祭西嶽太子賓客王丘祭北嶽國子祭酒張説祭南嶽其四瀆四海四鎮及諸名山靈跡等各委所繇州長官祭仍令所司即擇日聞奏務修蠲潔之禮以致精明之徳冀申誠懇如朕意焉二十六年正月丁丑親迎氣於東郊祀青帝天寳元年正月丁未改元制曰前王重典在乎祭祀况屬惟新事宜昭告五嶽四瀆名山大川諸靈跡及自古帝王忠臣義士竝令所繇州縣致祭是月甲寅得靈符于尹喜䑓西百官請崇徽號壬申詔曰神仙所緘造化同固爰初有待經韞櫝而多時濳應改元若符契之相合景福修介祗畏良深而羣官宗室抗疏於外元良諸子屢請於中逮夫緇黄兼彼耆老以至懇誠不已前後相仍願加天寳之名用益開元之號顧惟菲薄曷以當之然則𤣥貺在乎欽承人心難以固拒順天從衆義叶至公敬依所請實用多愧斯盖上𤣥厚載爰自百神孚佑效靈通於睿祖幽賛惟新之歴克彰永代之祥宜遵祀典式陳昭報可以來月十五日祔𤣥元皇帝廟十八日享太廟二十日有事於南郊宜令中書門下與禮官等即詳定禮儀具錄聞奏應緣行事及檢校官等各委有司不湏别差人執當其北郊宜差公卿擇日祭五嶽四瀆及名山大川各令所在長官備禮陳祭務申誠敬副朕意焉二月丙戌詔曰凡所祭享必在躬親朕不親祭禮将有闕其皇地祗宜就南郊乾坤合祭三月丙申合祭天地於南郊十月戊寅詔曰社為九土之尊稷乃五糓之長春祈秋報祀典是尊而天下郡邑所置社稷等如聞祭事或不備禮苟崇敬有虧豈靈祗所降欲望和氣豐年焉可致也朕永惟典故務在潔誠俾官吏盡心庶蒼生蒙福自今已後應祭官等庶事宜倍加精潔以副朕意其社壇側近仍禁樵牧至如百姓私社宜與官社同日致祭十二月乙亥詔曰嵗之豐儉雖繋於常數天之感應實在於精誠頃者按以隂陽求諸推歩至於今嵗不合有年朕所以齋心妙門懇其𤣥徳靈徵不逺丕應乃彰果獲西成頗為善熟盖至道儲祉惠於蒸人亦羣神叶賛錫以昭報詩不云乎無徳不報宜令光禄卿嗣鄭王希言祭東嶽太子詹事嗣許王瓘祭中嶽太常卿韋縚祭北嶽所司即擇日錄奏其四瀆及諸名山大川或逺近不同各委所繇郡長官便擇吉日致祭務崇豐潔以稱朕懐三載三月戊寅并社稷五星為大祀詔曰祭之為典以陳至敬名或不正是相奪倫况社稷孚祐百代蒙其福日月炤臨五星叶其紀兆庶允殖下土式瞻既超言象之外湏極尊嚴之禮列為中祀頗紊大猷自今已後社稷及日月五星竝升為大祀仍以四時致祭諸星升為中祀庶昭報之誠格于上下欽崇之稱合于典則四月丙辰遣使分祀嶽瀆詔曰務農勸穡雖用天道人和嵗稔實賴休徵頃者春夏之交稍愆時雨收穫之際復屬秋霖慮害農功每祈孚佑遂得百神降福羣望效靈既不為災仍多善熟幽賛之徳普洽於生人昭報之儀式遵於祀典宜令太子詹事嗣許王瓘祭東嶽光祿卿嗣鄭王希言祭中嶽宗正卿濮陽郡王徹祭西嶽少府監李知柔祭南嶽衛尉卿嗣吳王祗祭淮瀆光祿少卿彭果祭河瀆所司擇日錄奏其名山大川有路近處亦合便祭僻逺處委所繇長官備禮致祭務陳蠲潔以逹精誠十一月癸亥勑曰王者父事天母事地所以昭孝敬之道通神祗之徳朕䖍奉明命備稽大猷實在緣情不惟相襲伏以昊天上帝義在尊嚴恭惟祀典每用冬至既於是日有事於圜丘更受朝賀實深兢惕自今已後冬至宜取以次日受朝仍永為常式壬申勑曰敬惟明神普存於祀典咸秩羣望式重於邦畿頃者分命使臣致誠嶽瀆山川便近亦已有處分其闗輔之内屢有陳祈王者所都禮亦異數應闗内名山大川各委所繇郡長官稍優於常禮致祭於京兆府界宜委蕭炤同與少尹分祭倍崇精潔以副誠祈十二月癸巳制曰惟神之主必恭禋祀率先之訓義在躬親朕欽若昊穹子育黎庶思通明靈之徳以洽和平之理是修闕典咸秩無文如在之誠乆陳於郊廟懐柔之至亦徧於山川况九宫所主百神之貴上分天極下統坤維隂隲生靈功深亭育故式昭新典肇建明祠将以為人載祈孚佑宜叶元辰之吉用申大祭之禮可以今月立春朕親祀九宫壇仍令中書門下與禮官等即詳定儀注奏聞癸丑親祠九宫貴神於東郊時有術士蘇嘉慶上言請於京城東朝日壇東置九宫貴神壇三成成三尺四階其上依位置九壇壇尺五寸東南曰招揺正東曰軒轅東北曰太隂正南曰天一中央曰天符正北曰太一西南曰攝提正西曰咸池西北曰青龍五為中戴九履一左三右七二四為上六八為下符於遁甲四孟月祭尊為九宫貴神禮次昊天上帝而在太清宫太廟之上用牲牢璧幣類於天地神祗帝親祀之如有司行事即宰相為之四載勑風伯雨師竝依升入中祀乃令諸郡各置一壇因春秋祭社之日同申享祀至九月勑諸郡風伯壇置在社壇之東雨師壇之西各稍北三十歩其壇卑小於社壇其祭官准祭社例取太守以下充五載正月乙亥詔曰五方定位嶽鎮總其靈萬物阜成雲雨施其潤上帝攸叙寰區是仰且岱宗西華先已封崇其中嶽等三方典禮所尊未齊名秩永言光被用叶靈心其中嶽神宜封為中天王南嶽神為司天王北嶽神為安天王應湏告祭仍令所司擇日聞奏四月乙亥詔曰皇天之典聿循於百代郊祭之儀允屬於三靈聖人既因時以制宜王者亦緣情以革禮朕丕承寳運肅遵明禋曷嘗不克已齋心䖍恭夙夜猶慮舊章或闕誠敬未孚有一於此良深祗畏且尊莫大於天地祭莫大於祖宗嚴配昭升豈宜異類今烝嘗之獻既著於常式南北之郊未展於時享粢盛且略對越何申自今已後每在四時孟月先擇吉日祭上帝其以皇地祗合祭以次日祭九宫壇皆令宰臣行禮奠祭務從蠲潔稱朕意焉祭神如在傳諸古訓以多為貴著自禮經膟膋之儀盖昔賢之尚質甘㫖之品亦孝子之盡誠既切因心方資變禮其已後享太廟宜料外每室加嘗食一牙盤仍令所司務盡豐潔發生振蟄雷為其始畫卦陳象威物效靈氣實夲於隂陽功乃施於動植今雨師風伯乆列常祠唯此震雷未登羣望其已後每祀雨師宜以雷神同祭朕承宗廟之福為人神之主事有未暢義在得中庶寅畏之誠上逹於郊廟祈禳之典載收于闕遺凡在有司各揚所職倍宜恭肅以叶靈心十二月辛酉詔曰孝享宗廟所以逹思誠也格於神祗所以崇嚴敬也則祈糓上帝春祀先王永惟因心敢忘如在朕承累聖之丕業應上𤣥之福佑聿脩柴瘞䖍奉烝嘗常慮備物未豐馨香莫逹頃已詳諸舊典創以新儀清廟陳牲特加於常餼昊天冬祭重増以時享庶乎罄齊敬之勤叶殷薦之義况履兹霜露載感惟深瞻彼郊壇有懐昭事念禮歸通變諒期乎逹誠教在率先必貴乎親奠宜以來載正月朕親謁太廟便於南郊合祭仍令中書門下即與禮官詳定儀注擇日奏聞興言拜獻先深祗感凡百有司各供爾職六載正月戊子親祀南郊遂祀皇地祗詔曰四瀆五嶽雖差秩序興雲播潤盖同利物崇號所及錫命宜均其五嶽既已封王四瀆當升公位逓從加等以答靈心其河瀆宜封靈源公濟瀆封清源公江瀆封廣源公淮瀆封長源公仍令所司擇日差使告祭并五嶽及名山大川竝令所在長官致祭又諸州武舉人上省先謁太公廟拜将帥及行師尅㨗亦宜告獻七載五月壬午帝加尊號詔五嶽四瀆名山大川各令夲郡長官致祭八載六月詔曰九州之鎮實著禮經三代之典必崇望秩事既屬於報功義有符於錫命其九州鎮山除入諸嶽外宜竝封公仍各置祠守者量更増修儲慶發祥當申昭報宜令所在長官各陳祭禮名山大川亦量事致祭九月命宗正卿褒郡信王璆祭西嶽太僕少卿兼單于安北副大都䕶張齊丘祭北海蜀郡長史鮮于仲通祭江瀆太子詹事李旭祭北嶽尚書右丞李通遷祭河瀆詔曰朕肅恭明祀祈福上𤣥冀敷佑於黎蒸将昭報於靈應頃蠻夷欵附萬里廓清稼穡豐穣羣方樂業豈惟菲徳以致元和實賴神休永綏景貺思崇望秩用展䖍誠宜令宗正卿褒信郡王璆等即分徃五嶽四瀆及四海致祭所經道次者名山大川亦便致祭務令精意以稱朕懐九載四月詔曰五材竝用時表上靈八水分流實稱善利京師奥壌秦甸王畿灞滻通於涇渭澇潏滙於灃滈蓄洩雷雨滋育稼穡雖惠澤已及於蒸民而䖍誠猶闕於祀典聿崇精享庶逹明神其涇渭灞滻等分水宜令禮儀使左庶子韋述取今月二十九日一時備禮致祭務陳蠲潔稱朕意焉十載正月甲子有事於南郊合祭天地大赦天下制曰禮者所以訓導人俗昭事明祗有因増修以㑹其本况國之大典在於精禋必資備禮以章遵奉自今已後攝祭南郊薦獻太清宫薦享太廟其太尉行事前一日於致齊所具羽儀鹵簿公服引入朕親受祝板乃赴清齋以展誠敬夫子孝奉親極敬惟爱殁有思戚霜露之感逾深祭以吉蠲烝嘗之敬如在且廟者貌也取象存焉是禮繇於情因心則感太廟宜置内官以備嚴奉仍於廟外造一院安置庶申罔極之思無忘事生之禮嶽瀆山川蘊靈毓粹雲雨之澤利及生人春秋之義存乎祀典况正其運序式遵咸秩其五嶽四瀆及諸鎮山宜令專使分徃致祭其名山大川及諸靈跡先有祠廟者各令郡長官逐便致祭是月丁未封東海為廣徳王南海為廣利王西海為廣潤王北海為廣澤王二月己亥分遣嗣吳王祗祭東嶽齊天王嗣魯王宇祭南嶽司天王秘書監崔秀祭中嶽中天王國子祭酒班景倩祭西嶽金天王宗正少卿李成裕祭北嶽安天王衛尉少卿李澣祭江瀆廣源公京兆少尹章恒祭河瀆靈源公太子左諭徳栁偡祭淮瀆長源公河南少尹豆盧回祭濟瀆清源公嗣道王鍊祭沂山東安公江東道採訪使吳郡太守趙居貞祭㑹稽山永興公大理少卿李禎祭吳嶽山成徳公頴王府長史甘守黙祭霍山應靈公范陽郡司馬畢炕祭醫無閭山廣寕公竝取三月十七日庚子一時致祭申命太子中允李隨祭東海儀王府長史張九章祭南海太子中允栁奕祭西海太子洗馬李齊榮祭北海加王位且行冊禮也四月辛巳制曰王者臨馭萬國莫不尊奉五嶽至於迎氣致祭必在辨方正位朕丕承眷命肅事嚴禮庶有合於乾坤用永垂於典實加以厚徳載物莫先於土推誠導氣必叶於時在歴数之有徵諒國家之所感含𢎞廣大利用豐功隨王雖布於四方歸本且闕於中位朕式明統緒用答元符爰創新儀再修墜典頃者每祝黄帝乃就南郊義實有乖禮亦非便稽諸體式理固不然宜於皇城内西南就坤地改置黄帝壇朕當親祠以昭誠敬仍令中書門下與禮官更審叅詳奏聞十一月壬午詔曰禮神以玉者盖取其精潔表心温潤合徳為噐有象正辭孚尹以逹馨香其在珪璧頃來禮神六噐及宗廟奠玉自馮紹正奏後有司竝用珉禮所謂君子貴玉而賤珉不可用也朕精禋郊壇嚴敬宗廟奉惟新之祚庇太平之人則人力普存備物以享安可以珉代玉惜費事神况國家之祈福有萬方之助祭闕典必修無文咸秩豈於天地宗廟奠玉有虧自今已後乾坤六噐宗廟奠玉竝用真玉諸祀用珉如以玉難得大者寕小其制度以取其真十二載二月制五嶽四瀆及名山大川并靈迹之處各委郡縣長官致祭其祠宇頽毁者量事修葺十四載八月辛卯制曰書云咸秩羣望詩曰懐柔百神永惟明徵豈忘昭報今秋稼穡頗勝常年實賴靈祗福臻稔嵗其五嶽四瀆所在山川及得道昇仙靈跡之處宜委郡縣長官至秋後各令醮祭務崇嚴潔式展誠享是月癸未詔曰朕永念蒸人祈糓上帝而隂陽式序風雨不愆今獲稼穡阜成允賴神明幽賛也頃者䖍心精享己申昭告其五嶽四瀆及天下諸郡山川近令秋後展祭收穫既就農畝事隙報功咸秩抑惟其時宜令所在郡縣長官即擇良辰以崇明祀冊府元龜卷三十三
