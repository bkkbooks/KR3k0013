body:
  text: 冊府元龜卷一百十五宋王欽若等撰帝王部藉田蒐狩藉田古之帝王躬耕帝藉以供宗廟之粢盛所以敦孝致恭懋力務本且以訓化天下使民厚生而勤業也繇是修先農之祀示有所宗謹神倉之藏罔敢不飭稽述古訓克己以躬率正萬邦馴致於富庶列辟遵行斯為令典其或禮有廢墜先儒載其規諫事從振舉舊史著其嘉頌而况六府允治所寳惟榖四民異業大事在農上之化下如偃草之易令出惟行比流水之順故稽古憂勤之后未嘗不垂意于此然後能致治興化者也若乃前修議論之深切歴代禮文之損益皆周旋論次俾有條而不紊焉周成王藉田而祈榖作載芟之詩周禮曰師氏掌帥其屬而耕耨王藉以時入之以供粢盛宣王即位不藉千畆藉借也借民力以為之天子藉千畆諸侯百畆自厲王之流藉田禮廢宣王即位不復古也虢文公諫曰夫民之大事在農上帝之粢盛於是乎出器實曰粢在器曰盛民之蕃庶於是乎生事之供給於是乎在和協輯睦於是乎興財用蕃殖於是乎始敦厖純固於是乎成敦厚厖大是故稷為大官民之大事在農故稷之職為大官古者太史順時瓜見音脉視也土陽癉憤盈土氣震發癉厚憤積盈滿震動發起也農祥晨正農祥房星也晨正謂立春之日晨中於午也農事攸闗故曰農祥也日月底于天廟底至也天廟營室也孟春之月日月皆在營室土乃脉發脉理農書曰春土冐橛陳根可拔耕者急發先時九日先立春日太史告稷曰自今至于初吉二月朔日也詩云二月初吉陽氣俱蒸土膏其動弗震弗渝脉其滿眚榖乃不殖震動渝變眚災也言陽氣俱升土膏欲動變冩其氣不然則脉滿氣結更為災病榖乃不殖也曰距今九日土其俱動距去王其祗祓監農不易祗敬也祓齊戒也祓除也不易不易物生之宜使司徒咸戒公卿百吏庶民百吏百官庶民甸師氏所掌之民也主耕耨王藉田者司空除壇于藉司空掌地命農大夫咸戒農用先時五日先耕時也瞽告有協風至瞽樂太師知風聲者協和也風氣和氣候至也立春日融風王即齊宫百官御事各即其齊三日御治王乃淳濯饗醴淳沃濯溉饗飲也謂王沐浴飲醴酒及期鬱人薦鬯鬱鬱金香草宜以和鬯酒也犧人薦醴犧人司樽掌供酒醴王祼鬯饗醴乃行祼灌也灌鬯飲酒皆所以自香也百吏庶民畢從及藉后稷監之監察膳夫農正陳藉禮膳夫上士也掌飲食膳羞農正田大夫也主敷藉禮而祭其神為農祈也太史贊王贊導王敬從之王耕一墢一墢耕之墢也王無耦以一耜耕也班三之班三次也三之下各三其上也王一墢公三卿九大夫二十七庶人終于千畆終盡耕之是日也瞽帥音官以省風土也音官樂官也風土以音律省土風風氣和則土氣養廪于藉東南鍾而藏之廪御廪一名神倉東南生長之處鍾聚也謂為廪以藏王所藉田以奉粢盛也而時布之于農布賦稷則徧戒百姓紀農協功曰隂陽分布震雷出滯分日夜同也滯蟄蟲也月令曰日夜分雷乃發聲土不備墾辟在司冦乃命其旅曰徇依農徇行農師一之農正再之后稷三之司空四之司徒五之太保六之太師七之太史八之宗伯九之王則大徇耨穫亦如之如耕時也是時也王事惟農是務無有求利於其官以干農功求利謂變易役使干亂農功也三時務農而一時講武三時春夏秋也一時冬也講武講習武事故征則有威守則有財若是乃能媚於神而和於民矣則享祀時至而布施裕也今天子欲脩先王之緒而棄其大功匱神之祀而困民之財匱神之祀不耕藉也困民之財取於民也何以求福用民上弗聽漢孝文二年正月丁亥詔曰夫農天下之本也其開藉田朕親率耕以給宗廟粢盛十三年二月甲寅詔曰朕親率天下農耕以供粢盛皇后親桑以奉祭服其具禮儀令立耕桑之禮制也景帝後二年四月詔曰雕文刻鏤傷農事者也錦繡纂組害女紅者也紅讀曰功農事傷則饑之本也女紅害則寒之原也夫饑寒並至而能亡為非者寡矣朕親耕后親桑以供宗廟粢盛祭服為天下先不受獻減大官省繇賦省音所領切繇讀曰徭欲天下務農桑素有蓄積以備災害武帝征和四年正月行幸東萊三月上耕於巨淀齊國縣也昭帝始元元年二月耕於鈎盾弄田帝時年九歲鈎盾宦者署西京故事弄田在未央宫中弄田謂宴遊之田天子所戲弄耳非為昭帝年幼創有此名六年正月耕于上林後漢明帝永平四年二月辛亥詔曰朕親耕藉田以祈農事十三年二月帝耕於藉田禮畢賜觀者食十五年二月癸亥帝耕於下邳章帝元和二年二月乙丑帝耕於定陶詔曰三老尊年也孝悌淑行也力田勤勞也國家甚體之其賜帛人一疋勉率農功三年正月辛丑帝耕於懐順帝即位以後不行藉田之禮黄瓊為尚書僕射瓊以國之大典不宜乆廢上疏奏曰自古聖帝哲王莫不恭敬明祀增致福祥故必躬郊廟之禮親藉田之勤以先羣萌率勸農功昔周宣王不藉千畆虢文公以為大譏卒有姜戎之難終損中興之名竊見陛下尊稽古之鴻業體䖍肅以應天順時奉天懷柔百神朝夕觸塵埃於道路晝暮聆庶政以恤人雖詩咏成湯之不怠荒書美文王之不暇食誠不能加今廟祀適闋而祈榖潔齊之事近在明日臣恐左右之心不欲屢動聖躬以為親耕之禮可得而廢臣聞先王制典藉田有日司徒咸戒司空除壇先時五日有協風之應王即齋宫饗醴載耒誠重之也自癸巳以來仍西北風甘澤不集寒凉尚結迎春東郊既不躬親先農之禮所宜自勉以迎和氣以致時風易曰君子自强不息斯其道也書奏帝從之獻帝興平元年二月丁亥帝耕於藉田魏太祖既建魏國漢建安十九年正月始耕藉田二十一年三月壬寅親耕藉田明帝太和元年二月辛未帝耕於藉田晉武帝太始四年正月丁亥親耕藉田先事詔曰夫民之大事在農是以古之聖王躬耕帝藉以共郊廟之粢盛且以化訓天下近代以來耕藉於數歩中空有慕古之名曾無供祀訓農之實而有百官車徒之費今循千畆之制當與羣公卿士躬稼穡之艱難以帥天下王者詳具其制並下河南處田地於東郊之南雒水之北平良中水者若無官田隨宜便換不得侵民人也八年正月癸亥帝耕於藉田十年正月辛亥帝耕於藉田哀帝興寧二年二月癸卯帝親耕藉田初元帝將修耕藉問藉田應躬祠先農不賀循答漢儀無有至尊應有制之周禮王者祭四望則毳冕祭社稷五祀則絺冕以此不為無親祭之義也所上儀注又未詳允事竟不行是復欲行其典亦不能遂後魏道武天興三年二月丁亥詔有司祀日於東郊始耕藉田孝文延興二年三月庚午耕於藉田太和十六年二月丙午詔有司刻吉亥備小駕躬臨千畆十七年二月己亥藉田於南都宣武景明三年十二月詔曰民本農桑國重蠶藉粢盛所憑冕服攸寄比京邑初基耕桑蹔缺遺規徃旨宜必祗循今寢殿顯成移御維始春郊無逺拂羽有辰便可表營千畆開設官壇秉耒援箱躬勸億兆四年正月乙亥車駕藉田於千畆孝明帝正光三年正月辛亥親耕藉田後周閔帝元年正月辛丑即天王位癸亥親耕藉田明帝二年正月辛亥親耕藉田武帝保定元年正月乙亥親耕藉田天和元年正月己亥親耕藉田二年正月己亥親耕藉田建徳三年正月乙亥親耕藉田唐太宗貞觀三年正月十八日詔曰周宣王在位以墜兹禮近代以來彌所多闕朕祗承大寳憲章典故今將履千畆於近郊復三推於舊制宜令有司式遵典禮二十一日親祭先農藉于千畆之甸自晉氏南遷此禮乆廢今始行之觀者莫不駭躍秘書郎岑文本獻藉田頌以美之初議藉田方面所在給事中孔穎逹曰禮天子藉田于南郊諸侯于東郊晉武帝猶於南郊今於城東不合古禮帝曰禮緣人情亦何常之有且虞書云平秩東作則是堯舜敬授人時已在東矣又乗清輅載黛耜者所以順其春氣故知合在東方且朕見居少陽之地田于東郊蓋其宜也于是遂定自後每歲常令有司行事也髙宗永徽三年正月丁亥親享先農御耒耜率公卿耕於藉田賜羣官帛各有差乾封二年正月十八日行藉田之禮躬秉耒耜而九推焉禮官奏陛下合三推上曰朕以身率下自當過之恨不終於千畆耳禮畢降雪盈尺初將耕藉先至于先農之壇因閱耒耜有雕刻文飾者謂左右曰田器農人執之在于朴素豈貴文飾乎乃命換之儀鳳二年正月乙亥帝親耕藉田於東郊禮畢作藉田賦以示羣臣三年五月幸藉田所觀區種手種數區睿宗景雲三年正月戊子幸滻東親耕藉田祀先農太極元年正月戊子親耕藉田𤣥宗開元十九年正月丙子親耕於興慶宫龍池二月癸未皇太子鴻等奏曰一昨正月二十七日伏見陛下於興慶宫親耕三百餘歩既而青光紫氣覆地臣等聞舜在歴山之下人微之事也漢有鈎盾之間兒童戲之猶正經所尚良史稱多况陛下運徳協靈聖情逮物上為宗廟下預黔黎躬耕藉田天下幸甚較其盛禮百倍於三推考其嘉瑞獨髙于千古而九霄四逺中外阻絶冡司莫繇見直筆所未聞使帝跡不激揚聖美不昭晰皆臣子之過也是以臣等冒昧上陳伏乞恩慈令宣示朝廷錄付史館則罄天率土殊情同幸帝曰人之大事實在於農故務其三時播諸百榖是用仰遵千畆之藉躬閱三推之禮所以供祀宗廟率先下人亦何足光乎史冊布諸中外也然汝等固請宜付史臣初開元二年十月監察御史席建侯上書曰臣聞古先哲王躬親藉田者所以供粢盛勸稼穡俾夫海内元元相謂曰天子至尊也猶行三推之禮况乎田野農圃之人乎于是父勸其子兄率其弟躬耘力耕不避霜露故畆稅流衍國倉峨嶬帝堯之洪流包山天乙之巨旱爍石人無菜色用此道也自陛下允陟皇階未親帝藉伏願命有司具儀禮以來年春耕于公田躬執耒耜使黍稷豐備然後享天于南郊宗祀先聖于明堂大孝烝嘗于兹為盛豈止年登歲稔如坻如京而已哉二十三年正月十八日親祀先農禮畢降至耕位侍中執耒大僕秉轡帝謂左右曰帝藉之禮古則三推朕今九推庶九榖之報也讚導者跪而奏曰先王制禮不可踰越帝曰夫禮豈不在濟人治國勤事務功乎朕發乎至誠深惟嘉殖將以勸南畆供粢盛豈非禮意也於是九推而止公卿以下終其田畆制曰昔者受命為君體元立極未有不謹於禮而能見教於人朕且庶乎有慙作者方冊存而可舉典章絶而復尋自古所行無一而廢將以上乞靈於宗社下蒙福於黎元朕兹精誠天實降鑒今嗣歲初吉農事將起禮先本于耕藉義緣奉於粢盛是所嚴祗敢不敬事故躬載耒耜親率公卿以先萬姓遂千畆謂敦本之為耳何布澤之更深宜有順於發生俾無偏於行惠可大赦天下十一月十六日親祀神農於東郊以后稷配親執耒耜而九推焉臣欽若等曰據㑹要是一年再耕肅宗乾元元年十二月癸亥勅來年正月十月拜九宫壇十一日藉田二年正月丁丑帝將有事於九宫之神兼行藉田之禮自明鳳門出至通化門釋軷而之壇所宿齊于宮戊寅禮畢將耕藉田先至於先農之壇因耒耜有雕刻文飾者謂左右曰田器農人執之在于朴素豈貴文飾乎乃命徹之下詔曰古之聖王臨御天下莫不務農敦本保儉為先蓋用勤身率下也屬東耕啓候爰事藉田將欲勸彼蒸人所以執兹耒耜如聞有司所造農器妄加雕飾殊非典章况組轅縹軌前王有制崇奢尚靡諒為所疵靜言思之良用歎息豈朕法堯舜重茅茨之意耶其所造雕飾者宜停仍令有司依農用常式即别改造庶萬方黎獻知朕意焉翌日己卯致祭神農氏以后稷配享帝冕而朱紘躬秉耜而九推焉禮官奏陛下合三推今過禮帝曰朕以身率下自當過之恨不終於千畆耳既而佇立乆之觀公卿諸侯王公已下耕畢然後自春明門入至東陽門起居聖皇乃還大明宫自前年旱冬又無雪禮畢降雪盈尺司天臺奏初藉田樂作有南風應律以協時令年豐之兆晝則黄雲捧日夜則紫氣抱樞憲宗元和五年十月丁亥制來年正月十四日朝獻太清宫十五日謁太廟十六日藉田于東郊宜令所司准式十一月丙午制曰朕以東郊藉田禮之重者爰擇吉亥用祀先農上以供粢盛下以勸稼穡式展三推之義敢辭四體之勤亦既草儀方將肅事載思理本旁采衆詞以江淮水旱之餘河朔師旅之後宜寛物力以濟元元况當三農休息之時百司供具之費道塗灑掃暴露勤勞惕然在懐是用中止雖前有成命皆已施行而重煩吾民則無固必其來年正月十六日藉田禮宜停於戲夫聖人無心以徇百姓朕亦虛已用圖大中苟事有未宜則改而求當凡百卿士期悉予懐是時太常修撰韋公肅奏曰伏惟元和五年十一月勅將行藉田令有司詳定儀注伏緣藉田禮廢已五十餘年有司案牘無可檢尋今據禮經兼採開元乾元故事並徵前代㳂革參酌詳定勅付所司未及施行而罷蒐狩夫春蒐夏苗秋獮冬狩是謂禮之大者非徒順四時之令除五榖之害蓋所以為宗廟而習軍旅焉其事歌於詩列於書載於易著於戴記載於左氏論於公榖而取詳於周禮王者奉而行之簡車徒脩卒伍命肆師以表貉俾田僕而馭路然後三驅乎中軌塵馬候蹄既戒其馳騁不合圍不殫物又禁其暴殄故曰以戰則克以祭則受福此其義也然而太康無度五子之怨興文王以時騶虞之詠作去彼取此乃可以為萬代法周文王出獵遇太公于渭之陽成王歸自奄大蒐於岐山之陽岐山在扶風美陽縣西北宣王内修政事外攘夷狄復文武之境土脩車馬備器械復㑹諸侯於東都因田獵而選車徒漢武帝建元三年南獵長楊元帝永光五年冬幸長楊射熊館布車騎大獵成帝元延二年冬行幸長楊宫從胡客大校獵校謂以木自相貫穿為蘭校耳校人職云六廐既校則以遮欄為義也校獵者大為蘭校以遮禽獸而獵取也軍之幡旗雖有校名本因部校此無豫也宿萯陽宫賜從官揚雄稱成帝將大誇胡人以多禽獸秋命右扶風發民入南山西自褒斜東至𢎞農南敺漢中張網羅置罘捕熊羆􅸉猪虎豹狖狐玃兎麋鹿載以檻車輸長揚射熊館以網為周阹縱禽獸其中令胡人手搏之自取其獲上親臨觀焉後漢明帝永平十五年冬車騎校獵上林苑安帝延光二年十一月甲辰校獵上林苑順帝永和四年十月戊午校獵上林苑歴函谷闗而還桓帝永興二年十一月甲辰校獵上林苑遂至函谷闗而還賜所過道旁年九十以上錢各有差延熹元年十月校獵廣成遂幸上林苑六年十月丙辰校獵廣成遂幸函谷闗上林苑靈帝光和五年十月校獵上林苑歴函谷闗遂廵狩于廣成苑十二月還宫魏文帝黄初二年正月甲戌校獵至原陵四年八月辛未校獵于滎陽後魏道武皇始元年春正月大蒐于定襄之虎山因東幸善無北陂天興六年七月戊子北廵築離宫于􅀈山縱士校獵東北踰罽嶺出合代谷天賜三年正月甲申北廵幸􅀈山宫校獵至孤山明帝永興四年七月東廵己卯大獮于石㑹山戊子臨去畿陂觀漁庚寅至于濡源西廵幸北部諸落賜以繒帛八月庚戌還宫壬子幸西宫臨版殿大饗羣臣將吏以田獵所獲賜之五年六月西幸五原校獵于骨羅山獲獸十萬神瑞二年四月北廵五月丁亥次於參合東幸大甯丁未田于四碑山六月戊午幸去畿陂觀漁辛酉次于濡源築立蚌臺射白熊於頽牛山獲之泰常元年六月北廵七月自白鹿陂西行大獮於牛川二年五月西廵至於雲中遂濟河田於大漠十二月庚申田於西山癸亥還宫四年正月壬辰朔臨河大蒐于犢渚癸卯還宫四月庚寅朔觀漁于灅水己亥還宫復一年租賦十二月癸亥西廵至雲中踰白道北獵野馬於辱孤山至于黄河從君子津西渡大狩於薛林山六年七月西廵獵于柞山親射虎獲之遂至於河八月庚子大獮于犢渚大武神䴥元年四月壬子西廵戊午田於河西大赦十一月行幸河西大校獵十有二月甲申還宫二年十一月西廵田于河西至柞山而還三年春正月庚子還宫三年八月行幸南宫獵于南山四年十月幸漠南十一月丙辰北部勅勒莫弗庫若于率其部數萬騎驅鹿數百萬詣行在所帝因而大狩以賜從者勒石漠南以記功徳十二月丁丑還宫太延元年七月田稠陽十一月乙丑行幸冀州己巳校獵於廣州二年八月校獵於河西太平真君五年八月田於河西九年二月幸長安存問父老丁亥幸昆明池遂田於岐山之陽十年三月蒐于河西庚寅還宫十一年二月大蒐於梁川六月北廵隂山八月辛丑田于河西文成太安元年六月戊寅畋於犢倪山甲申還宫三年正月壬戌畋於崞山戊辰還宫五月庚申畋於松山己巳還宫四年二月幸信都畋游於廣川三月丁未觀馬射於中山六月丙申畋於松山八月丙寅遂畋于河西獻文皇興元年十月田于郍男池二年二月癸未田于西山親射虎豹五月乙卯田于崞山遂幸繁畤辛酉還宫十月田於冷泉三年四月丁酉田于崞山後周武帝保定元年十一月丁巳狩于岐陽十二月壬午至自岐陽建徳五年正月癸未幸同州辛卯行幸河東洓川集闗河東諸軍校獵甲午還同州隋煬帝大業三年六月辛巳獵於連谷隋制軍人每年孟秋閱戎具仲冬教戰法是年冬煬帝在榆林突厥啓民及西域東胡軍長並來朝貢帝欲誇以兵甲之盛乃命有司陳冬狩之禮詔虞部近出南北周圍二百里並立表記前狩二日兵部建旗于表所五里一旗分為四十軍軍萬人騎五千匹前一日諸將各率其軍集旗下鳴鼔後至者斬詔四十道並揚旌建節分號申令即留軍所監獵布圍圍厥南西方行而前帝服紫袴褶黑介幘乗闟猪車其飾如木輅重輞繩輪蚪龍繞轂漢東京鹵簿所謂獵車者也駕六黑駵太常陳鼓笳鐃簫角于帝左右各百二十官戎服騎從鼓行入圍諸軍並鼓行赴圍乃設驅逆騎千有二百闟猪停軔有司斂大綏王公以下皆整弓矢陳于駕前有司又斂小綏乃驅獸出過帝前初驅過有司整御弓矢以前待詔再驅過備身將軍奉進弓矢三驅過帝乃從禽鼔吹皆振左而射之每驅必三獸以帝發抗大綏次王公發則抗小綏次諸將發射之無鼔驅逆之騎乃止然後三軍四夷百姓皆獵凡射獸自左而射之逹于右脾為上等逹右耳本為次等自左脾逹于右䯚為下羣獸相從不得盡殺已傷之獸不得重射又逆向人者不射其面出表者不逐之田將止虞部建者旗于圍内從駕之鼔及諸軍鼔俱振卒徒皆噪諸獲禽出獻于旗所致其左耳大獸公之以供宗廟使歸薦腊于京師小獸私之五年四月己亥大獵於隴西唐髙祖武徳元年十二月乙酉幸周氏陂過故莊丙戌校獵置酒髙㑹極歡而罷賜錢絹各有差二年十月幸華隂十二月狩於華山三年正月校獵於渭汭十二月甲辰臘校獵於渭北即日還宫四年閏十月壬戌校獵於好畤乙丑校獵於九嵕山丁卯校獵於仲山戊辰校獵於清水谷遂逹三原十二月丙辰臘校獵於杜陵原即日還宫五年十一月癸卯校獵於富平之北原十二月丙辰校獵於華池之萬夀原白鹿見帝親御弧矢射而獲之六年二月戊午校獵於驪山獲白鹿十月己未幸華隂庚申校獵於白鹿原十一月丁亥校獵於華山之隂十二月甲寅至自華隂七年十二月丁卯幸躍龍宫戊辰校獵於髙陵八年四月甲申幸鄠縣獵於甘谷丙戌至自鄠縣十月辛巳如周氏陂校獵於北原壬午幸躍龍宫十一月辛卯幸宜州校獵於西原癸未校獵於華池之北原十二月庚辰臘帝曰臘獵以供宗廟朕當躬其事以申孝享之誠於是車駕出廵狩於鳴犢泉之野是日宴從官賚物綵帛各有差太宗貞觀四年十月辛丑校獵於貴泉谷賜將士帛有差甲辰校獵於魚龍川親自射鹿獻於太安宫十二月甲辰臘狩於鹿苑見野人多藍縷遣侍中王珪賑賜貧人焉乙巳至自鹿苑五年正月癸酉大蒐於昆明池蕃夷君長咸從帝謂吕王麴文泰曰丈夫在世樂事有三耳天下太平家給人足一樂也草淺獸肥以禮田狩弓不虛發箭不妄中二樂也六合大同萬方咸慶張樂髙宴上下歡洽三樂也今日王可從禽明當歡讌耳丙子至自昆明池親獻禽于太安宫十二月幸温湯癸夘校獵於驪山七年十一月丙辰狩於少陵原戊午至自少陵原十一年二月壬午校獵於鹿臺嶺三月辛亥大蒐于廣成澤十一月乙未狩於濟源之山親御弧矢帝曰古者先驅以供宗廟今所獲鹿宜令有司造脯醢以充薦享十二年十月狩于始平十三年二月幸長春宫乙亥蒐于河濱十二月壬辰臘狩於咸陽癸巳至自咸陽十四年閏十月乙未幸同州甲辰狩於堯山庚戌輿駕還宫十二月壬辰臘校獵於樊川遇大雪其夜解圍乙巳輿駕還宫十五年十月辛卯校獵於伊闕辛丑輿駕還宫十六年十一月丙辰輿駕西狩于武功壬戌大校獵于岐山之陽十二月甲辰狩于驪山帝登山頂見圍斷顧謂從官曰此山險絶馬蹄不通緣危越澗人亦勞止若依軍令闕圍有罪朕為萬乗主不可登髙就下察人之過乃廻馬避之十八年十月甲寅輿駕幸雒陽宫己巳狩于澠池縣天池十一月壬申至雒陽宫二十二年二月己卯蒐于華原髙宗顯慶二年十一月幸許州狩於滍水之南行三驅之禮設次於尚書臺以觀之許州長史封道𢎞奏言尚書臺本因漢南郡太守馬融講尚書於此因以為名今陛下親降此臺以觀較習請改為講武臺從之五年十一月甲寅幸許州十二月辛未校獵於長社之安樂川龍朔元年冬十月狩于陸渾縣戊辰校獵於非山上自射禽獸獲鹿及雉兎數十令代官厨應烹之羊盡放令長生焉總章二年九月己亥幸九成宫壬寅停華林頓大蒐于岐山咸亨二年十二月車駕幸許州癸酉陳冬狩之禮因校獵于許州華縣昆水之陽上元元年十一月丙午朔車駕發京師幸東都己酉畋于華山之曲武原中宗神龍元年十月乙丑幸新安畋游而還𤣥宗先天元年十月癸卯太上皇幸新豐獵於驪山之下命從官宴設樗蒱焉賜帛各有差十二月辛卯帝幸新豐之温湯便獵於渭川二年十月甲辰畋于渭川開元三年十月制曰昔周有岐陽之蒐漢有扶風之命或講師習武跨胡曜威故王者狩必以時虞人招之以禮時則逺矣朕自祗膺圖籙于今四年每廵幸郊畿不出百里且愛力而節用豈盤遊而好樂間者四方無事百榖有成因孟冬之月臨右輔之地戒兹五校爰備三驅非謂獲多庶以除害一昨長圍已合大綏未舉而夜間朔風天降微雪狐裘且御未免祁寒鶉衣不充寧堪凍露朕便截狡獸要輕禽以此游娛孰云矜恤况為之父母育彼黎元中宵耿然明發增惕其圍兵並放散各賜布一端綿一屯圍將賜物三十叚副使二十叚押官十叚岐州兵馬於此給付餘兵馬至京請受八年十月辛巳幸長春宫壬午畋于下邽十年冬十月甲寅幸夀安之故興泰宫畋于宣州庚申至自故興泰宫十四年幸夀安十二月丁巳獵于方秀川十七年十二月乙丑校獵渭濱代宗大厯七年冬十月壬子畋于禁苑一發連中二兎遣使出示宰臣仍賜之宰臣等拜舞稱慶徳宗貞元八年十二月甲辰臘畋于城南十年十二月臘令諸衛將軍畋于南城十一年十二月戊辰臘畋於苑中止多殺行三驅之禮軍士無不知感畢事幸左神策軍營勞軍饗士而還穆宗元和十五年十二月庚辰臘畋于城南左右中尉策六軍等使並扈駕長慶二年十月己卯帝繇複道出城狩于咸陽即日還宫十一月癸酉幸華清宫遂狩于驪山即日還宫武帝㑹昌六年十一月幸涇陽校獵白鹿原後唐莊宗天祐十一年平燕薊還正月至衡唐己亥帝與趙王王鎔畋於衡唐之西至界而别同光元年十月庚子帝畋於汴水之陽際夜還宫二年八月庚午車駕幸西苑試鷹以畋甲申畋於西苑九月癸卯畋於西北近畿癸亥畋於石橋十一月癸亥畋於石橋戊申畋於西北近甸至暝還宫十二月戊辰幸西苑校獵庚申輿駕出開化門校獵至夕還宫己丑輿駕幸龍門校獵於彭婆店癸卯大畋於伊闕侍衛金搶馬萬餘騎從帝一發中大鹿從臣稱慶是夜駐蹕於張全義之别墅甲辰涉歴山川六軍衛士獲禽者衆帝皆勞以繒帛或錦袍銀𢃄是夜駐蹕伊闕縣乙巳自伊闕分環衛諸軍騎士馳鹿山谷間暮未合圍夜二鼓駐御營於湛澗是夜騎士有顛墜崖谷而斃及折傷手足者甚衆丙午復分衛兵分獵殺獲數萬計是夜二鼓一籌歸京城街市火炬如晝丁未百官赴中興殿問起居賜羣臣鹿肉三年車駕在鄴辛酉帝出崇明門試鷹犬日暮還宫癸亥帝出北門至王莽河射鴈日晚還宫丁亥帝出北門校獵至夜還宫乙亥駕出北門至王莽河射鴈乙酉帝出北門射鴨於郭洎至夜還宫庚寅帝出北門射雁九月丁巳帝出師子門射鴈於尖山至晚還宫十二月庚辰大雪帝以臘辰狩於白沙四年二月帝出西師子門至冷泉校獵至晚還宫明宗天成元年十二月壬辰帝出畋自定鼎門供頓於甘水亭晡晚還宫臘辰也二年十二月甲辰臘狩於東郊圍合萬騎賜宰臣學弓矢為從禽之樂迨暮歸内三年十二月甲辰臘狩於近郊一鼓歸内四年十一月甲戌車駕出近郊試夏州所進白鷹十二月甲辰車駕畋於龍門南至夜還宫臘辰故也長興元年十月車駕出師子門畋於近郊十二月丙辰車駕出金耀門獵於西山下臘辰故也至晚還宮二年十二月乙卯帝出金耀門獵于西郊三年十二月戊辰帝獵于京西南圍合親射中走鹿從臣皆賀宴於梁村申時還宫晉少帝天福八年十二月臘詔陜府節度使畋於近郊開運元年十二月己亥朔幸臯門射中白鹿二年十月戊寅帝幸硯臺射中伏兎隨行節度使進馬慶之至暮還宫己巳帝出京城廵幸西北至臯門村射中二兎幸沙臺賜從官酒食至晚還宫周世宗顯徳五年十月壬辰帝出長慶門獵於近郊宰臣及江南兩浙進奉使皆從焉十一月甲子出迎秋門薄狩於近郊十二月甲午出迎春門薄狩於近郊上親射雉兎共三隻冊府元龜卷一百十五
