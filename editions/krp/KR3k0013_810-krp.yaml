body:
  text: 冊府元龜卷八百十宋王欽若等撰總録部隱逸第二南齊宗測字敬㣲南陽人宋徵士炳孫也世居江陵測少靜不樂人間歎曰家貧親老不擇官而仕先哲以為羙談余竊有感誠不能潜感地靈㝠致江鯉但能用天道分地利孰能食人厚禄而憂人重乎州舉秀才主簿不就驃騎豫章王徵為參軍測答府召云何為謬傷海鳥横斤山木豫章王復遣書請之辟為參軍測答日性同鱗羽愛止山壑眷戀松筠輕迷人路縱宕巖流有若狂者忽不知老至而今鬚鬢已白豈容課虚責有限魚慕烏哉世祖永明三年詔徴太子舎人不就欲遊名山乃冩祖炳所畫尚子平圖於壁上測長子官任京師知父此㫖便求禄還為南郡丞付以家事刺史安隆王子敬長史劉夤以下皆贈逆之逆迎也測無所受賫老子莊子二書自隨子孫拜辭悲泣測長嘯不視遂在廬山止祖炳舊宅魚復侯子響為江州厚遣贈遺測曰少有狂疾尋山採藥逺來至此量腹而進松术度形而衣薜蘿澹然已足豈容當此横施子響命駕造之測避不見後子響不告而來奄至所住測不得已巾褐對之竟不交言子響不悅而退尚書令王儉餉測蒲褥頃之測送弟喪還西仍留舊宅永業寺絶賔友惟與同志庾易劉虬宗人尚之等徃來講說刺史隋王子隆至鎮遣别駕宗哲致䇿問測笑曰貴賤理隔何以及此竟不答明帝建武二年徵為司徒主簿不就卒臧榮緒東筦人少孤窮自灌園以供祭祀隱居京口教授南徐州辟西曹舉秀才不就太守初鎮揚州徵為主簿不到自號被褐先生與闗康之俱隱在京口世號為二隱顧歡字景怡吳郡人幼聰敏及長篤志好學年二十餘母亡廬于墓次遂隱遁不仕開館聚徒受業者甞近百人太祖輔政而悅歡風教徵為揚州主簿遣中使迎歡及踐阼乃至歡稱山谷臣顧歡上表曰臣聞舉網提綱振裘持領綱領既理毛目自張然則道徳綱也物勢目也上理其綱則萬機其序下張其目則庶官不曠是以湯武得勢師道則祚延秦項忽道任勢則身戮矣天門開闔自古有之四氣相新絺裘代進今火澤易位三靈改憲天樹明徳對時育物搜揚仄陋野無伏賢是以窮谷愚夫敢露編管謹刪撰老氏獻治綱一卷伏願稽古百王不以芻蕘棄言不以人微廢道率土之賜也微臣之幸也幸賜一覽則上下交泰雖不求民而民悅不祈天而天應應天悅民則皇基固矣臣志盡幽深無求榮勢自足雲霞不須禄飬陛下既逺見尋求敢不盡言言既盡矣請從此退武帝永明元年詔徵歡為太學博士同郡顧黯為散騎郎黯字長孺有隱操與歡俱不就徵沈驎士字雲禎吳興武康人少勤於學宋文帝令尚書僕射何尚之抄撰五經訪舉學士縣以驎士應選尚之謂子偃曰山東故有竒士也少時驎士稱疾歸鄉更不與人物通飬孤兄子義著鄉曲或勸驎士仕答曰魚縣獸檻天下一契聖人𤣥悟所以每履吉先吾誠未能景行坐忘何為不希企日損乃作𤣥散賦以絶世太守孔山士辟不應宗人徐州刺史曇侍中懐文左率勃來候之驎士未嘗答也隱居餘不悞差山講經教授從學者千人征北張永為吳興請驎士入郡驎士聞郡後嘗有好山水乃徃停數月永欲請為功曹使人致意驎士曰明府徳履素冲留心山谷是以被褐負杖忘其疲病而必欲飾渾沌以蛾眉冠越客於文冕走雖不敏請附高節永乃止順帝昇明末徵為奉朝請不就世祖永明中中書郎沈約表薦詔徵為太學博士明帝建武二年徵為著作郎東昏永元二年徵為太子舎人並不就守操終老杜京產吳郡人少恬靜閉意榮官郡命主簿州辟從事皆稱疾去除奉朝請亦不就始平東山開舍授學孔稚珪及光禄大夫陸澄祠部尚書虞悰太子右率沈約司徒右長史張融表薦京產曰竊見吳郡杜京產潔靜為心謙虚成性通和發於天挺敏逹表於自然學遍𤣥儒博通史子流連文藝沉吟道奥泰初之朝掛冠辭世遁捨家業隱於太平葺宇窮巖採芝幽澗耦耕自足薪歌有餘確爾不羣淡然寡欲麻衣藿食二十餘載雖古之志士何以加之謂宜釋巾幽谷結組登朝則巖谷含懽薜蘿起抃矣不報建武初徵為員外散騎常侍京產曰莊生持約豈為白璧所回辭疾不就年六十四永元元年㑹稽孔道徽守志業不仕京產與之友善徐伯琛東陽太末人有儒學好釋氏老莊明道術宅居九里有高山班固謂之九巖山後漢龍岳長隱處也山多龍鬚栢望之五采世呼為婦人巖二年伯琛移居之門前生梓樹一年便合抱館東石壁夜忽有赤光洞炤俄爾而滅白雀一隻棲其戶牖論者以為隱德之感焉永明中刺史豫章王辟議曹從事不就㑹稽鍾山有人姓蔡不知名山中飬䑕數千頭呼來即來遣去便去言語狂易時謂之謫仙不知所終樓惠東陽人有道術居金華山禽獸毒螫者皆避之宋明帝聞之勑出住華林園除奉朝請固乞不受求東歸忽乗白驢向臨安縣衆不知所以尋而唐寓之賊破郡文惠太子忽出住蔣山求歸見許武帝勑為立館盧度有道術隱居西昌三顧山鳥獸隨之夜有鹿觸其壁度曰汝壊我壁應聲去屋前有池飬魚魚次第來取食乃去逆知死年月與親友别永明末以夀終褚伯玉吳郡錢塘人隱居剡之瀑布山在山三十餘年隔絶人事王僧逹為吳郡苦禮致之伯玉不得已停郡信宿才交數言而退寕朔將軍丘彌孫與僧逹書曰聞褚先生出居貴館此子滅影雲棲不事王侯抗高木食有年載矣自非折節好士何以致之望其還䇿之日蹔紆清塵亦願助為譬說答曰褚先生從白雲遊舊矣此子索然惟朋松石介於孤峯絶嶺者積數十載近故要其來此冀慰日夜比談討芝桂借訪荔蘿若已窺煙波臨滄洲矣如君欲見之當為申譬太祖即位手詔吳㑹二郡以禮迎遣又辭疾上不欲違其志勅於剡白石山立太平館居之劉虬字靈預南陽湼陽人也舊族徙居江陵虬少而抗節好學太祖建元初豫章王為荆州教教令也辟虬為别駕與同郡宗測新野庾易並遣書禮請虬等各倄牋答而不應辟命武帝永明三年刺史廬陵王子卿表虬及同郡宗測宗尚之庾易劉昭五人請加蒲車束帛之命詔徵為通直郎不就竟陵王子良致書通意虬答曰虬四節卧病三時營灌暢餘隂於山澤託暮情於魚鳥寕非唐虞重恩周召宏施虬進不研機入𤣥無洙泗稷館之辨退不擬心出累非冡間樹下之節逺澤既灑仁規先著謹收樵牧之嫌敬加軾蝇之義劉昭與虬同宗州辟祭酒從事不就隱居山中孔道徽少厲高行隱居南山終身不窺都邑豫章王嶷為揚州辟西曹書佐不至鄉里宗親慕之道徽兄弟持心操行遇饑寒不可得衣食縣令吳興丘仲薦之除竟陵王侍郎不至明僧紹字承烈平原鬲人也祖玩州治中父略給事中僧紹宋文帝元嘉中再舉秀才明經有儒術廢帝永光中鎮北府辟功曹並不就隱長廣郡嶗山聚徒立學淮北沒虜乃南渡江明帝泰始六年徵通直郎不就太祖為太傅徵為記室叅軍不至武帝永明初世祖勅召稱疾不肯見詔徵國子博士不就卒梁陶宏景字淵明丹陽秣陵人齊武帝永明中除奉朝請既辭禄止于句容之勾曲山嘗曰此山下是第八洞宮名金陽華陽之天周廻一百五十里昔漢有咸陽三茅君得道來掌此山故謂之茅山乃中山立館自號華陽隱君始從東陽孫逰岳受圗經符法遍歴名山尋訪仙藥每經澗谷必坐卧其間吟詠盤桓不能已巳時沈約為東陽郡守高其志節累書要之不至東昏永元初更築三層樓宏景處其上弟子居其中賓客至其下與物遂絶唯一家僮得侍其所特愛松風每聞其響欣然為樂有時獨遊泉石望見者以為仙人宏景既得神符秘訣以為神丹可成而苦無藥物武帝給黄金朱砂曽青雄黄等後合飛丹色如霜雪服之體輕及帝服飛丹有驗益敬重之每得其書燒香䖍受帝使造年歴至己巳嵗而加朱㸃實武帝太清三年帝手勑詔之賜以鹿皮巾後屢加禮聘並不一至唯畫作兩牛一牛散放水草之間一牛著金籠頭有人執䋲以杖驅之帝笑曰此人無所不作欲效曳尾之龜豈有可致之理國家每有吉凶征討大事無不前以咨詢月中常有數信時人謂山中宰相二宮公王貴要參候相繼贈遺未嘗脫時多不納受縱留者即作功徳阮孝緒陳留尉氏人所居惟有一鹿牀竹樹環繞天監初御史中丞任昉尋其兄履之欲造而不敢望而歎曰其室雖邇其人甚遥為名流所欽尚如此何㸃字子晳廬江灊人博通琴書善談論家本素族親戚多貴仕㸃不入城府而遨遊人世不簪不𢃄或駕柴車躡草履恣心所適致醉而歸與陳郡謝㵸吳國張融㑹稽孔稚珪為莫逆友從弟遁以東籬門園居之稚圭為築室焉園内有卞忠貞冢㸃植花卉於冢側每飲必舉酒酹之豫章王命駕造㸃㸃從後門遁去司徒竟陵王子良欲就見之㸃時在法輪寺子良乃徃請㸃角巾登席何𦙍㸃之弟也為左民尚書嘗懐止足齊建武初築室郊外號曰小山常與學徒遊處其内至遂賣園宅欲入東山未及發聞謝朏罷吳郡不還𦙍恐後之乃拜表辭職不待報輒去明帝大怒使御史中丞袁昂奏收𦙍尋有詔許之𦙍以㑹稽山多靈異徃遊焉居若耶山雲門寺初𦙍二兄求㸃並棲遁求先卒至是𦙍又隱世號㸃為大山𦙍為小山亦曰東山東昏永元中徴太常太子詹事並不就高祖覇府建引𦙍為軍謀祭酒與書曰想常清豫縱情林壑致足歡也既内絶心戰外勞物役以道飬和履後無爽若耶擅羙東區山川相屬前世嘉賓是為樂土僕推遷薄宦自東徂西晤言素對用成暌濶傾首東顧曷日無懐疇昔歡遇曵裾儒肆實欲卧遊千載畋漁百氏一行為吏此事遂乖屬以世道威夷離屯故投袂數十免出釁禍思得矚眷諮疑遇情古昔夫豈不懐事與願謝君清襟素懐栖寄不近中居人世殆同隱淪既俯拾青組又脫屣朱黻但禮存用舍義貴隨時徃識禍萌實為先覺超然獨善有識欽嗟今者為邦貧賤咸恥好仁由己幸無凝滯比别具白此未盡言今遣候承音息矯首還翰慰其引領𦙍不至高祖踐阼詔為特進右光禄大夫手勑曰吾猥當期運膺此樂推而顧已蔽昧於理道雖復劬勞日昃思致隆平而先王遺範尚藴方䇿自舉之用存乎其人兼以世道澆暮爭詐繁起改俗遷風良有未易自非以儒雅引朝高尚軌物則泊流所至莫知其限治人之與治身獨善之與兼濟得失去取為用孰多吾雖不學頗好博古尚想高塵每懐擊節今世務紛亂憂責是當不得屈道巖阿共成羙世必望深逹徃懐不吝濡足今遣領軍司馬王果宣㫖諭意遲面在近果至𦙍單衣鹿巾執經卷下牀跪受詔書就席伏讀𦙍因謂果曰吾昔於齊朝欲陳兩三條事一者欲正郊丘二者欲更鑄九鼎三者欲樹雙闕世傳晉室欲立闕王丞相指牛頭山云此天闕也是則未明立闕之意闕者謂之象魏懸法於其上浹日而收之象者法也魏者當塗而高大貌也鼎者神器有國所先故王孫滿斥言楚子頓盡圜丘南郊舊典不同南郊祠五帝靈威仰之類圜丘祠天皇大帝北極大星是也徃代合之郊丘先儒之巨失今而梁徳告始不宜遂因前謬卿宜詣闕陳之果曰僕之鄙劣豈敢輕議國典此當敬候叔孫通耳𦙍曰卿詎不遣傳詔還朝拜表留與我同遊耶果愕然曰古今不聞此例𦙍曰檀弓兩卷皆言物始自卿而始何必有例果曰今君遂當邈然絶世猶有致身理不𦙍曰卿但以事見推吾年已五十有七月食四斗米不盡何容復有宦情昔荷聖主盼識今又蒙旌賁甚願詣闕請恩但比腰脚大惡此心不遂耳果還以𦙍意奏聞有勑給白衣尚書禄𦙍固辭又勑山隂庫錢月給五萬𦙍又不受張孝秀字文逸南陽宛人性通率不好浮華常冠榖皮巾躡蒲履手栟櫚皮塵尾服寒食散盛冬能卧於石上庾承先潁川人少沉靜有志操強記敏識郡辟功曹不就乃與道士王僧鎮同遊衡嶽晩以弟疾還鄉里遂居于七臺山鄱陽忠烈王尤加欽重徵州主簿湘東王亦板為法曹叅軍並不赴劉訏平原人也本州刺史張謖辟為主簿不就主者檄召訏訏乃掛檄於樹而逃曽與族兄劉歊聴講於鍾山諸寺因共卜築宋熈寺東澗有終焉之志及卒宗人至友相與刋石立銘諡曰𤣥貞處士劉歊博學有文才不娶不仕與族弟訏並隱居求志以山水書籍相娛而已卒時年三十二親故誄其行節諡曰貞節處士陳馬樞扶風郿人也初在梁遇侯景之亂邵陵王綸舉兵援臺乃留書二萬卷付樞樞肆志尋覽殆將周徧乃喟然歎曰吾聞貴爵位者以巢由為桎梏愛山林者以伊呂為管庫束名實則芻芥柱下之言翫清虚則糠粃席上之說稽之篤論亦各從其好也比求志之士望塗而息豈天之不惠高尚何山林之無聞甚乎乃隱于茅山有終焉之志孝文天嘉元年帝徵為度支尚書辭不應命時樞親故並居京口每秋冬之際時徃遊焉及鄱陽王為南徐州刺史欽其高尚鄙不能致乃卑辭厚意令使邀之樞固辭以疾門人勸請不得已乃行至王别築室以處之樞惡其崇麗乃于竹林間自營茅茨而居每以王公餽餉辭不獲已者率十分受一樞少屬亂離凡所居處盗賊不入依託者常數百家目睛洞黄能視暗中物以宣帝大建十三年卒後魏鄭修北海人也少隱於岐南九谷中依巖結宇獨處淡然屏迹人事不交世俗耕食水飲皮冠草服雅好經史專意𤣥門前後州將每徵不至岐州刺史魏蘭根頻遣致命修不得已暫出見蘭根尋還山舍胡叟字倫許安定臨涇人也家於宻雲蓬室草庭唯以酒自適謂友人金城宗舒曰我此生活似勝焦先志意所棲謝其高矣叟不治產業常苦饑貧然不以為恥飬子字螟蛉以自給飬每至貴勝之門常乗一牸牛弊韋袴褶而已作布嚢容三四斛飲噉醉飽便盛肉餅以付螟蛉見車馬榮華者視之蔑如也尚書李敷嘗遺之以財都無所取及高閭曽造其家値叟短褐曳柴從田歸舍為閭設濁酒蔬食皆手自辦案其館宇卑陋園疇褊局而飯菜精㓗醢醬調羙見其二妾並年衰跛眇衣布穿弊閭見其貧約以衣服直十餘匹贈之亦無辭媿北齊王晞淹雅有器度好學不倦魏孝莊永安初其兄暉聘梁啓晞釋褐除員外散騎侍郎徵署廣平王開府功曹史晞願飬母竟不受署母終後乃屬遷鄴遊遨鞏洛悅其山水與范陽盧元明鉅鹿魏季景結侶同契徃天陵山浩然有終焉之志及西魏將獨孤信入洛署為開府記室晞稱先被大傷困篤不赴隋崔郭博陵安平人也初為里佐屢逢屈辱於是感激逃入山中遂博覽書籍多所通涉山東學者時宗之不應辟命徐則東海郯人也幼沉靜寡嗜慾受業於周宏正善三𤣥精於論議聲擅都邑則歎曰名者實之賔吾其為賔乎遂還栖隱之操策杖入縉雲山後學數百人苦請教授則謝而遣之不娶妻常服布褐陳大建時應召來憇於至貞觀朞月又辭入天台山因絶粒飬性所資惟松术而已雖隆冬沍寒不服綿絮太傅徐陵為之開山立頌盧太翼河間人也閒居味道不求榮利隱於白鹿山數年徙居林慮山茱茰𡼏請業者自逺而至初無所拒後憚其煩逃於五臺山地多藥物與弟子數人廬於巖下蕭然絶世以為神仙可致楊伯醜馮翊武鄉人也好讀易隱於華山開皇初徵入朝見公卿不為禮無貴賤皆汝之人不能測也召與語竟無所答帝賜之衣服至朝堂捨之而去於是被髪陽狂逰行市里形體垢穢未嘗櫛沐時有張永樂者賣卜京師伯醜每從之逰永樂為卦有未能决者伯醜輒為分析爻象尋幽入微永樂嗟服自以為非及也唐孫思邈京兆華原人也七嵗就學日誦千言弱冠善談莊老及百家之說兼好釋典雒州總管獨孤信見而歎曰此聖童也但恨其器大適小難為用也周宣帝時思邈以王室多故乃隱居太白山隋文帝輔政徴為國子博士稱疾不起嘗謂所親曰過是五十年當有聖人出吾方助之以濟人及太宗即位召詣京師嗟其容色甚少謂曰故知有道者誠可尊重羡門廣成豈虛語哉將授以爵位固辭不受朱桃椎者蜀人也澹泊為事隱居披裘帶索沉浮人間竇軌之鎮益州也聞而召之遺以衣服逼為鄉正桃椎口竟無言棄衣於地逃入山中結菴澗曲夏則祼形冬則樹皮自覆人有贈遺一無所受每為屫致之於路人見之者曰朱居士之屫也為鬻米置於本處桃椎至夕而取之終不與人相見議者以為焦先之流高士亷為益州都督府長史下車以禮致之及至降階與語桃椎不答直視而去士亷高之差人存問桃椎見使者輒入林自匿近代以來多輕隱逸之士士亷獨加褒禮蜀中以為羙談田逰巖京兆三原人也高祖永徽初補太學生後罷歸遊於太白山每有林泉㑹意輒留連不能去其母其妻有方外之志與逰巖周逰山水二十餘年後自巴蜀將逰荆楚行至夷陵之青溪館有終焉之志遂結廬溪側荆州長史李安期薦之制追赴京至汝州便辭疾入箕山於許由廟東築室而居自稱許由東鄰頻召辟不受史徳義者蘇州崑山人也咸亨中隱居武丘山鹿裘葛巾琴書自適或騎牛帶瓢出入郊郭高宗聞其名徵赴洛陽尋而稱疾歸公卿已下皆賦詩餞别徳義亦以詩留贈其文甚羙王希夷徐州滕人也孤貧好道父母終為人牧羊以收庸供𦵏𦵏畢隱于嵩山後竟居兖州徂徠山與道士劉𤣥博為棲遁之友盧鴻乙范陽人也徙家洛陽少有學業頗善籒篆楷𨽻隱於嵩山開元初遣使備禮再徵不至六年𤣥宗至東都謁見不拜拜諫議大夫放還山又賜隱居之服并其草堂一所白履忠陳留浚儀人也博涉文史嘗隱居於古大梁城時人號為梁丘子崔覲梁州城固人為儒不樂仕進以耕稼為業老而無子乃以田宅財產分給奴婢令各為生業覲夫妻遂隱於城固南山家事一不問約奴婢逓過其舍至則供給酒食而已夫婦林泉相對以嘯咏自娛鄭餘慶為山南西道節度使聞其風辟為節度叅謀覲至府亦若不逹人事餘慶容之文宗太和八年左補闕王直方上疏論事帝嘉之屢召便殿語及時務直方與覲城固山為鄰居因薦焉特詔以起居郎徵之竟不奉詔許寂字閑閑祖秘名聞㑹稽寂少有山水之好泛覽經史窮三式尤明易象久棲四明山不干時務昭宗聞其名徵赴闕召對於内殿㑹昭宗方與伶人調品篳篥事訖方命坐賜湯果問易義既退寂謂人曰君在淫聲不在政矣寂聞君人者將昭徳塞違以臨照百官百官象之今不厭賤事自求其工君道替矣尋請還山寓居於江陵以茹芝絶粒自適其世天祐末節度使趙凝昆季深禮遇之師授保飬之道唐末除諌議不起漢南謂之徵君晉鄭雲叟白馬人也少好學耿介不屈為文敏速道麗昭宗朝嘗應進士不第拂衣歎曰天命之謂性率性之謂道性與道在乎已而不能取焉用浮名之攖我心使欝欝然若是耶因欲携妻子隱於林壑其妻非而不行雲叟乃薄遊諸郡獲數百緡以贍其家辭訣而去尋入少室山著擬峯詩三十六章以道其趣人多傳之後妻以書逹意勸其還家雲叟未嘗一覽悉投於火其絶累如此俄聞西嶽有五鬛松淪脂千年能去三尸因居於華隂與李道殷羅隱之友善時人目為三高士道殷有釣魚之術鈎而不餌又能化易金石無所不至雲叟嘗目觀其事信而不求雲叟與梁室權臣李振善振欲禄之拒而不諾及振南遷雲叟千里徒步以省之識者高焉後妻兒繼謝世每聞凶訃一哭而止時唯青衿二童一琴一鶴從其逰䖏好碁塞之戲遇同侶則以晝繼夜雖寒風大雪臨簷對局手足皸裂亦無倦焉唐天成中召拜左拾遺不起嘗與羅隱之朝夕逰處隱之以藥術取利雲叟以山田自給俱好酒吟詩善長嘯有大瓠云可辟寒置酒於其中經時味不壊日携就花木水石之間一酌一詠嘗因酒酣聨詩鄭曰一壺天上有名物兩箇世間無事人羅曰醉却隱之雲叟外不知何䖏是天真高祖即位聞其名遣齎書致禮徵為右諫議大夫雲叟稱疾不赴上表陳謝高祖覽表嘉之賜近臣傳觀尋賜號逍遥先生以諫議大夫致仕月給俸禄雲叟好酒嘗為詠酒詩千二百言海内好名者書於縑緗以為贈祝復有越千里之外使畫工潛冩其形容列於屏障者焉其為世重也如此天福末以夀終時年七十四冊府元龜卷八百十
