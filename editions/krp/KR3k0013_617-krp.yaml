body:
  text: 册府元龜卷六百十七宋王欽若等撰刑法部守法正直守法刑不可變天下之平也守之勿失有司之職也自非探情而閲寔舉要以蔽罪又何以致刑無頗類而人皆厭伏哉若乃時主之意有所輕重不循三尺之制將紊一代之訓而能辯析是非究論曲直確然固守毅然無撓南面之貴為霽於嚴威金科之文克遵於中典法當其罪下以不寃兹所謂能守其官不觧於位者矣至有知過而引咎縱父以受刑斯又積忠恕於心術著明慎於官次舍生取義守死無茍者焉李離晋人文公時為理過聼殺人自拘當死文公曰官有貴賤罰有輕重下吏有過非子之罪也李離曰臣居官為長不與吏讓位受禄為多不與下分利今過聼殺人傳其罪下吏非所聞也辭不受令文公曰子則自以為有罪寡人亦有罪耶李離曰理有法失刑則刑失死則死公以臣能聼㣲决疑故使為理今過聼殺人罪當死遂不受令伏劒而死石奢楚人為人公正好直昭王使為理於是廷有殺人者石奢追之則其父也還反於廷曰殺人者臣之父也以父成政非孝也不行君法非忠也施罪廢法而伏其辜臣之所守也遂伏鈇鑕曰命在君君曰追而不及庸有罪乎子其治事矣石奢曰不然不私其父非孝也不行君法不忠也以死罪生不亷也君赦之上之恵也臣不敢失法下之義也遂不去鈇鑕刎頸而死於廷中漢張釋之文帝時為廷尉帝行出中渭橋在渭橋中路有一人從橋下走乗輿馬驚於是使騎捕之屬廷尉屬委也釋之治問曰縣人來長安縣人也聞蹕匿橋下乆以為行過言天子過既出見車騎即走耳釋之奏當此人犯蹕凢令蹕先至而犯者罰金四両當謂處其罪也當罰金帝怒曰此人親驚吾馬馬頼和柔令佗馬固不敗傷我乎而廷尉乃當之罰金釋之曰法者天子所與天下共公也公謂不私也今法如是更重之是法不信於民也且方其時上使使誅之則已言初執獲此人天子即令誅之其事即畢今已下廷尉廷尉天下之平也一傾天下用法皆為之輕重民安所錯其手足安焉也錯置也惟陛下察之帝良乆曰廷尉當是也其後人有盗高廟座前玉環得得者盗環之人為吏所捕得也帝怒下廷尉治案盗宗廟服御物者為奏當弃市帝大怒曰人亡道廼盗先帝器吾屬廷尉者欲致之族而君以法奏之法謂常法非吾所以共承宗廟意也釋之免冠頓首謝曰法如是足也且罪等俱死罪也盗玉環不若盗長陵土之逆然以逆順為基今盗宗廟器而族之有如萬分一假令愚民取長陵一抔土不欲指言故以取土喻也抔謂手掬之也不忍言毁徹故止云取土耳陛下其何以加其法乎文帝與太后言之乃許廷尉張湯武帝時為廷尉伍被與淮南王謀反後詣吏自告蹤跡如此天子以伍被雅辭多引漢美欲勿誅湯進曰被首為王畫反計罪無赦遂誅被又嚴助與淮南王相結後淮南王來朝厚賂遺助交私論議及淮南王反事與助相連帝薄其罪欲勿誅以其過為輕小湯争以為助出入禁闥腹心之臣而外與諸侯交私如此不誅後不可治助因弃市後漢郭躬明帝時辟公府以明法律召入議法有兄弟共殺人者而罪未有所歸帝以兄不訓弟故報兄重而减弟死中常侍孫章宣詔誤言兩報重尚書奏章矯制罪當腰斬帝復召躬問之躬對章應罰金帝曰章矯詔殺人何謂罰金躬曰法令有故誤章傳命之謬於事為誤誤者其文則輕帝曰章與囚同縣疑其故也躬曰周道如砥其直如矢君子不逆詐君王法天刑不可以委曲生意帝曰善遷躬廷尉正魏高柔文帝時為廷尉時帝以宿嫌欲枉法誅治書執法鮑勛而柔固執不從詔命帝怒甚遂召柔詣臺遣使者承指至廷尉考掠勛勛死乃遣柔還寺又時獵法甚峻宜陽典農劉龜竊於禁内射兎其功曹張京詣校事言之帝匿京名收龜付獄柔上請告者名帝大怒曰劉龜當死乃敢獵吾禁地送龜廷尉便當考掠何復請吿者主名吾豈妄收龜耶柔曰廷尉天下之平也安得以至尊喜怒毁法乎重復為奏辭指深切帝意寤乃下京名即還訊各當其罪又公孫淵兄晃為叔父恭任内侍先淵未反數陳其變及淵謀逆帝不忍市斬欲就獄殺之柔上䟽曰書稱用罪伐厥死用德彰厥善此王制之眀典也晃及妻子叛逆之類誠應梟縣勿使遺育而臣竊聞晃先數自歸陳淵禍萌雖為㓙族原心可恕夫仲尼寛司馬牛之憂祁奚眀叔向之過在昔之美義也臣以為晃信有言宜貸其死茍自無言便當市斬今進不赦其命退不彰其罪閉著囹圄使自引分四方觀國或疑此舉也帝不聼因遣使齎金屑飲晃及其妻不坐賜以棺衣殯殮於宅王觀明帝時為治書侍御史帝幸許昌觀典行臺獄時多有倉卒喜怒而觀不阿意順㫖晉杜友為廷尉時趙王倫坐使散騎將劉緝買工所將盗御裘友正緝弃市倫當與緝同罪有司奏倫爵重屬親不可坐諫議大夫劉毅駁曰王法賞罰不阿貴賤然後可以齊禮制而眀典刑也倫知裘非常蔽不語吏與緝同罪當以親貴議减不得闕而不論宜自於一時法中如友所正帝是毅駁然以論親故下詔赦之王彪之為廷尉時永嘉太守謝毅赦後殺郡人周矯矯從兄球詣州訢寃揚州刺史殷浩遣從事收毅付廷尉彪之以球為獄主身無王爵非廷尉所科不肯受與州相反覆穆帝發詔令受之彪之又上疏執據時人比之張釋之後魏㳺肇為廷尉宣武嘗私勅肇有所降恕肇執而不從曰陛下自能恕之豈足令臣曲筆也執其意如此袁翻為廷尉少卿時侯剛為左衛將軍尚衣典御坐掠殺試射羽林為御史中尉元正所彈廷尉處剛大辟尚書令任城王澄為之言於靈太后侯剛厯仕前朝事有可取纎芥之疵未宜便致於法靈太后乃引見廷尉卿裴延雋及翻於宣光殿問曰剛因公事掠人邂逅致死律文不坐卿處其大辟竟何所依翻對曰按律邂逅不坐者謂情理已露而隱避不引必須箠撻取其欵言謂撾撻以理之類至於此人問則具首正宜依犯結案不應横加箠撲兼剛口唱打殺撾築非理本有殺心事非邂逅處之大辟未乖憲典太后曰卿等且還當别有判於是令曰廷尉執處侯剛於法加猛剛既意在為公未宜便依所執但輕勦人命無理全捨可削封三百户觧尚衣典御隋劉行本開皇中為黄門侍郎領治書侍御史雍州别駕元肇言於高祖曰有一州吏受人饋錢二百文依律合杖一百然臣下車之始與為約此吏故違請加徒一年行本駁之曰律令之行並發眀詔與民約束今肇乃敢重其教命輕忽憲章欲申巳言之必行忘朝廷之大信虧法取信非人臣之禮帝嘉之賜絹百疋趙綽為大理少卿故陳將蕭摩訶其子世略在江南作亂摩訶當從坐帝曰世略年未二十亦何能為以其名將之子為人所逼耳因赦摩訶綽固諌不可帝不能奪欲綽去而赦因命綽退食綽曰臣奏獄未决不敢退朝帝曰大理其為朕特放摩訶也因命左右釋之刑部侍郎辛亶嘗衣緋褌俗云利於官帝以為厭蠱將斬之綽曰㨿法不當死臣不敢奉詔帝怒甚謂綽曰卿惜辛亶而不自惜也命左僕射髙潁將綽斬之綽曰陛下寧可殺臣不得殺辛亶至朝堂觧衣當斬帝使人謂綽曰竟何如對曰執法一心不敢惜死帝拂衣而入良乆乃釋之明日綽謝勞勉之賜物三百叚時帝禁行惡錢有二人在市以惡錢易好者武侯執以聞帝令悉斬之綽進諌曰此人坐當杖殺之非法帝曰不關卿事綽曰陛下不以臣愚暗置在法司欲妄殺人豈得不闗臣事帝曰撼大木不動者當退對曰臣望感天心何論動木帝復曰啜羮者熱則置之天子之威欲相挫耶綽拜而益前訶之不肯退帝遂入治書侍御史栁彧復上奏切諫帝乃止陳孝意焬帝大業初為魯郡司法書佐郡内號為亷平太守蘇威嘗欲殺一囚孝意固諫至於再三威不許孝意因觧衣請先受死良久威意乃觧謝而遣之源師為大理少卿焬帝在顯仁宫勅宫外衛士不得輙離所守有一主帥私令衛士出外帝付大理繩之師㨿律奏徒帝令斬之師奏曰此人罪誠難恕若陛下初便殺之自可不闗文墨既付有司義歸常典脱宿衛近侍者更有此犯將何以加之帝乃止唐李素立武德初為監察御史時有犯法不至死高祖特令殺之素立諫曰三尺之法與天下共之一法動揺則人無所措手足陛下甫創洪業遐荒尚阻奈何輦轂之下便弃刑書臣忝法司不敢奉㫖高帝從之蕭鈞為諌議大夫時太常樂工宋四通等為宫人通傳信物高祖特令處盡仍遣附律鈞上䟽言四通等犯在未附律前不合至死手詔曰朕聞防祸未萌先賢所重宫闈之禁豈可漸歟昔如姬竊符朕用為永鍳不欲今茲自彰其過所搦憲章想非濫也但朕翹心紫禁思覿引裾側席朱楹兾旌折檻今乃喜得其言特免四通等死逺處配流戴胄太宗貞觀初為大理少卿時吏部尚書長孫無忌不觧佩刀入於東上閣尚書左僕射封德彛議以監門校尉不覺罪當死無忌為誤罰銅二十斤胄駁之曰挍尉不覺與無忌帶入同為誤耳准律云供御湯藥飲食舟舩誤不如法者皆死良以尊極之所不容有誤陛下若録其功非憲司所决若當㨿法罰銅未為得中帝曰法者非朕一人之法乃天下之法也何得以無忌國之親戚便欲阿之更令定議德彛執議如初帝初從德彛之議胄又曰校尉緣無忌以致罪於法當輕若論其過誤則為情一也而生死頓懸敢以固請帝嘉之因免校尉之罪時朝廷盛開選舉或有詐偽者事洩胄㨿法斷流以奏之帝曰朕下勅不首者死今從流是示天下以不信矣胄曰陛下當即殺之非臣所及也既付所司臣不敢虧法帝曰卿欲守法而令朕失信胄固争曰法者國家所以布大信於天下也言者當喜怒之所發陛下發一朝之忿而許殺之既知不可而寘之於法此乃忍小忿而存大信也帝悦而言曰法有不可公能正之朕何憂也李乾祐為殿中侍御史時有鄃令裴仁軌私役門夫太宗欲斬之乾祐奏曰法令者陛下判之於上率土遵之於下與天下共之仁軌犯輕罪而致極刑便乖畫一之理刑罰不中則人無所措手足臣忝憲司不敢奉制帝意觧仁軌竟免罪韋挺為太常卿攝刑部尚書時茂州童子張仲文忽自稱天子口署其流軰數人為官司大理以為指斥乗輿雖㑹赦猶斬挺奏稱仲文所犯正當妖言今既會赦准法免死大宗怒挺曰去十五年懐州吳法良亦浪入先置鉤陳口稱天子大理刑部皆言指斥乗輿咸斷處斬今仲文稱妖乃同罪異罰卿作福於下歸虐於上邪挺拜謝趨退自是憲司不敢以聞數日刑部尚書張亮復奏仲文請依前以妖言論太宗謂亮曰日者韋挺不識刑典以重為輕朕時恠其所執不為處斷卿今日復為執奏不過欲自取剛正之名耳曲法要名朕所不尚亮黙然再拜就列太宗目之曰爾無恨色我無猜心夫人君含容屈在於我可申君所請屈我所見其仲文宜處以妖言崔敦禮為兵部侍郎高宗永徽四年二月司徒荆王元景司徒吳王恪房州刺史駙馬都尉房遺愛寧州刺史駙馬都尉柴令武等坐謀反遺愛萬徹令武並斬元景及恪遺愛妻高陽公主令武妻巴陵公主並賜死上引遺愛謂曰與卿親故何恨遂欲謀反遺愛奏曰臣包藏姦匿誠合誅夷但臣告吳王恪冀以贖罪竊見貞觀中紇干承基㳺文芝並與侯君集劉蘭同謀不軌於後承基告君集文芝吿劉蘭並全首領更加官爵帝曰卿承藉緒餘身尚公主豈比承基等且吿吳王反事無乃晚乎遺愛遂伏罪帝因泣謂侍臣曰朕兄弟不多荆王是朕長叔吳王是朕兄雖犯國經欲就公等乞叔及兄姊等命敦禮進曰昔周公誅管蔡漢景夷七國至於孝昭之時燕王盖主謀逆皆正刑典此乃前事不遠陛下豈可屈法申恩乃從之叚寳元為大理卿永徽四年十二月代州都督劉文器坐妄説圖䜟情有窺窬特免死流配峯州高宗手詔示百僚曰窺窬圖䜟必以亾身㓕族斯皆先賢設教歴代舊章今文器乃與妖人徃還虗占祸福矯託天命包藏逆心非意自彰以歸嚴憲今屈法免死者由朕寡德所致故也去春遺愛等逆起於前今冬文器禍彰於後一歲之内再有此釁朕宵興自思非無深愧御史大夫長孫祥與寳元奏言劉文器包藏禍心罪合極法天恩寛貸特免其罪臣聞君親無將將而必誅此法厯代常行文器不可縱捨臣等忝是法司敢以死請帝曰卿等執奏誠知守法朕恕其性命不敢二三竟赦之狄仁傑為大理丞上元二年九月左威衛大將軍權善才右監門中郎將范懐義並為斫昭陵栢木大理奏官减死外並除名帝特令殺之仁傑執奏稱罪不當死帝引入謂曰善才斫陵上栢是我不孝必須殺之仁傑又執奏帝作色令出仁傑進曰臣聞逆龍鱗忤人主自古以為難臣愚以為不然居桀紂之時則難堯舜之時則易臣今幸逄堯舜不懼比干之誅昔漢文時有盗高廟玉環張釋之廷諍罪止弃市魏文將徙其人辛毗引裾而諌亦見納用且眀主可以理奪忠臣不可以威懼今陛下不納臣言臣恐瞑目之後羞見釋之辛毗於地下陛下作法懸之象魏徒流死罪且有等差豈有犯非極刑即令賜死法既無常則萬姓何所措其手足陛下必欲變法請從今日為始古人云假使盗長陵一抔土陛下何以加之今陛下以昭陵一株栢殺二將軍千載之後謂陛下為何主此臣所以不敢奉詔殺善才恐䧟陛下於不道帝意稍觧皇太子又抗䟽善才等嘗預藩僚先經驅策期於矜貸帝從之善才竟免死除名懐義配流桂州昭陵令孔禎以不能檢察免官經數日擢仁傑為侍御史徐宏敏字有功延載初為司刑寺丞時魏州人馮敬同告貴郷縣尉徐餘慶與慱州刺史虺冲同反餘慶愽州人冲先放粟債於貴鄉百姓遣鄉人歛索訖餘慶為徴所徴得錢冲家人自買弓箭餘慶兼修唘䟽於冲直叙寒溫并言債負不可徴得敬同遂以此状論告武太后令殿中侍御史來俊臣就推俊臣所推徴債是寔其弓箭非餘慶為市遂奏慶共冲同謀反曹斷縁㑹永昌赦稱其與虺貞同惡魁首並以伏誅其支黨未發者特從原放遂准律改斷流三千里侍御史魏文忠奏徐餘慶為冲徴債叶契兇謀又通書啓即非支黨請處斬家口籍沒奉勅依有功執奏曰謀反大逆罪極誅夷殄其族未足以謝愆汚其宫寧可以塞責今據餘慶罪狀頗共虺冲交渉為冲理債違勑是情於冲致書在反為驗既屬永昌恩赦在慶罪即合原狀據永昌元年赦曰其與虺貞等同惡徒黨魁首既並伏誅其支黨事未發者特從赦原謹詳魁首兩文在制非無所屬尚書曰殱厥渠魁名例律曰造意為魁首即其帥首乃元謀魁帥首謀己露者既並伏法支𣲖黨與未發者特從原宥伏誅既標並字足明魁首無遺餘慶赦後被言發覺即為支黨必其慶是魁首當時尋已伏誅若從魁首逃亡亦應登時追捕進則不入伏誅之例退則又異追捕之流將同魁首結刑何人更為支黨况非常之恩千載罕遇莫大之罪萬死蒙生豈令支黨之人翻同魁首應坐之伍更入死條嫉惡雖臣子之心好生乃聖人之德今赦而復罪即不如無赦生而又殺則不如無生竊惟聖朝伏當不爾餘慶請依後斷為支黨處流有功具奏太后大怒按聲謂有功曰若為與作魁首有功對曰魁是大帥首是元謀太后又曰餘慶可不是魁首有功又對曰若是魁首虺冲敗日並合伏誅今赦後事彰只是支黨太后又謂曰違勑徴債與虺冲買弓買箭何為不是魁首有功又對曰違勑徴債誠如聖㫖所買弓箭慶不相闗太后又謂曰二月内與徴債八月又通書此豈不是同謀有功又對曰所通之書據狀是寒溫其書搜簡不獲餘慶先經奏訖通書徴債只是支黨太后怒少觧乃謂曰卿更子細勘問是支黨不是支黨奏來當時百寮供奉及仗衛有二三百人莫不股慄而有功神色不動奏對無差人皆伏其膽力之不撓時酷吏周興來俊臣邱神勣王宏等搆䧟無辜皆抵極法公卿震恐莫敢正言有功獨存平恕詔下大理者有功皆議出之前後濟活數十百家嘗於殿庭論奏曲直武后厲色詰之左右莫不悚慄有功神色不撓争之彌切後為侍御史潤州刺史竇孝諶妻龎氏為奴誣告云夜觧髪祈福武后令給事中薛季昶鞫之斷成其罪龎氏坐斬有功執論龎氏坐不至死季昶又劾有功黨惡逆法同結刑有功當弃市方視事令史垂泣以告有功曰豈吾獨死諸人長不死耶乃徐起而歸李朝隠元宗開元中為大理卿冀州武強縣令裴景仙犯乞取贓積五千疋事發帝大怒令集衆殺之朝隠奏曰景仙縁是乞贓罪不至死又景仙曽祖故司空寂徃屬締搆首叅元勲載初中家䧟非罪凡其兄弟皆被誅夷惟景仙獨存今見承嫡據贓未當死坐准犯猶入請條十代宥賢功實宜錄一門絶祀情或可哀願寛暴市之刑俾就投荒之役則舊勲不棄平典斯允手詔不許朝隠又奏曰輕重有條臣下當守枉法者枉理而取十五疋便抵死刑乞取者因乞為贓數千疋止當流坐今若乞取得罪便處斬刑後有枉法當科欲加何辟所以為國惜法期守律文非敢以法隨人曲矜仙命射兎魏苑驚馬漢橋初震皇赫竟從廷議豈威不能制而法貴有常又景仙曾祖寂寔為元勲恩倍常數若寂勲都棄仙罪特加則叔向之賢何足稱者若敖之鬼不其餒而捨罪念功乞垂天聼遂决一百配流竇參代宗時為大理司直時婺州刺史鄧侹坐贓八十貫侹與執政有舊以㑹赦欲免徴贓詔百寮於尚書省雜議議者多希執政意參獨堅執正之於法竟徴贓牛僧孺為御史中丞穆宗長慶中宿州刺史李直臣坐贓當死直臣賂中貴人為之申理僧孺堅執不囬帝面喻之曰直臣事雖愆失然此人有經度才可委之邊任朕欲貸其法僧孺對曰凡人不才止於持祿取容耳帝王立法束縛姦雄正為才多者禄山朱泚以才過人濁亂天下况直臣小才又何屈法哉上嘉其守法面賜金章紫綬晋張仁愿開運初再為大理卿嘗以開州刺史王澈犯贓朝廷以澈功臣之子欲宥之仁愿累執奏不移竟遣伏法議者賞之正直詩曰靖㳟爾位好是正直况夫簡孚庶獄審克九刑成震曜之威當明慎之職固宜謹奉彛憲舉正爰書絶去兩端循用三尺靡放於寵㒺私於親犯逆鱗而不囘蹈危機而弗顧使丹筆絶誤書之罪棘木無夜哭之寃傳曰舉直錯諸枉能使枉者直其是之謂乎晋叔向邢侯與雍子争鄐田邢侯楚申公巫臣之子也雍子亦故楚人乆而無成士景伯如楚士景伯晋理官叔魚攝理攝代景伯韓宣子命斷舊獄罪在雍子雍子納其女於叔魚叔魚蔽罪邢侯蔽斷也邢侯怒殺叔魚與雍子於朝宣子問其罪於叔向叔向曰三人同罪施生戮死可也施行罪也雍子自知其罪而賂以買直鲋也鬻獄邢侯專殺其罪一也已惡而掠美為昏掠取也昏亂也貪以敗官為墨墨不潔之稱也殺人不忌為賊忌畏也夏書曰昏墨賊殺逸書三者皆死刑臯陶之刑也請從之乃施邢侯而尸雍子與叔魚於市後漢傅賢為廷尉素亷正自掌法官門無賔客公卿宴㑹要請不徃魏滿寵山陽人太祖辟署西曹屬為許令故太尉楊彪收赴縣獄尚書令荀彧少府孔融等並屬寵但當受辭勿加考掠寵一無所報司馬岐為廷尉時大將軍曹爽專權尚書何晏鄧颺等為之輔翼南陽圭㤗嘗以言迕㫖考繫廷尉颺訊獄將致㤗重刑岐數颺曰夫樞機大臣王室之佐既不能輔化成德齊美古人而乃肆其私忿枉論無辜使百姓危心非此焉在颺於是慚怒而退岐終恐乆獲罪以疾去官居家未朞而卒晋顧榮字彦先遷廷尉平時趙王倫誅淮南王允允官屬下廷尉議罪榮具眀刑理不宜廣濫倫意觧頼榮濟者甚衆後魏崔振為廷尉少卿河内太守陸琇與咸陽王禧同謀為逆禧敗事發振窮治之時琇内外親黨及當朝貴要咸為之言振研覆切至終無縱緩遂斃之於獄其奉法如此崔光韶為廷尉卿時秘書監祖瑩以贓罪被劾光韶必欲致之重法太尉城陽王徽尚書令臨濮王彧吏部尚書李神擕侍中李彧並勢望當時為瑩求寛光韶正色曰朝賢執事於舜之功未聞有一如何反為罪人言乎其執意不囬如此張蒲為内都大官參决庶獄私謁不行號為公正隋薛胄為刑部尚書時左僕射高頴稍被踈忌及王世勣之誅也穎事與相連文帝因此欲成頴罪胄眀雪之正議其獄由是忤㫖械繫之乆而得免唐戴胄為大理少卿前後犯顔執法者數矣劉德威授大理卿太宗嘗問之曰近來刑網稍宻其故安在徳威奏言誠在主上不由臣下人主好寛則寛好急則急律文失入减三等失出减五等今則反是失入則無辜失出獲大罪所以吏各自愛競執深文非有教使之然畏罪之所致耳陛下但捨所急則寧失不經復行於今日矣太宗深然之桓彦範為司刑少卿凢所奏議若逄人主詰責則辭色無渝争之逾厲又嘗謂所親曰今既躬為大理人命所懸必不能順㫖詭辭以求茍免崔日昇元暐之弟元暐為鸞臺侍郎平章事日昇為司刑少卿則天季年宋景劾奏張昌宗謀為不軌元暐亦屢有讜言則天乃令法司正斷其罪日昇元暐請寘以大辟其兄弟守正如此李日知天授中為司刑丞時用法嚴急日知獨寛平無寃濫嘗免一死囚少卿胡元禮斷請殺之與日知徃復至於數四元禮怒曰元禮不離刑曹此囚終無生路日知答曰日知不離刑曹此囚終無死法竟以兩状列上日知果直徐有功為司刑丞嘗於殿庭論奏曲直則天厲色詰之左右莫不悚慄有功神色不撓争之彌切後為司刑少卿嘗謂所親曰今既躬為大理人命所懸必不能順㫖詭辭以求茍免故前後為獄官以諌奏枉誅者三經斷死而堅志不渝以殺身成仁不以夷險易操故天下聞之者欣欣然談之不容於口或曰若獄官皆然刑措何遠王正雅文宗時為大理卿㑹宋申賜事起獄自内出無支證可驗當是時王守澄之威權鄭注之勢在庭雖宰相已下無能以顯言辨其事者惟正雅與京兆尹崔琯上䟽言宜得告事者考驗其辭状以聞由是獄稍辯以琯與正雅挺然申理也中外翕然推重及卒時論惜之後唐李愚仕梁為左拾遺晉州莭度使華温琪在任違法籍民家財入已其家訟於朝制使劾之伏罪梁主以先朝草昧之臣不忍加法愚按其罪晉吕琦為駕部員外郎兼侍御史知雜事㑹河陽帑吏竊財事發詔軍廵院鞫之時軍廵使尹訓怙勢納賂枉直相反俄有訴寃於闕下者詔琦按之既驗其姦乃上言請送尹訓之臺時權臣庇訓阻而不行琦連奏不已訓知其不免自殺於家其獄遂眀蒙活者甚衆自是朝廷多琦之公直李象遷文昌外郎詳刑定罪毎不畏豪强人甚重之周李濤初仕晋為刑部郎中少帝開運中抗表請理涇師張彦澤殺掌書記張式事忤㫖左遷雒陽令劉延為刑部郎中廣順三年九月同州莭度使薛懐譲并子有光受夏陽縣民張廷徽獻送廹促判官劉震斷殺里人康重等其親屬訴寃臺司奏薛懐讓并子有光及隨幕判官軍將等並合追攝勘問太祖以懐讓武臣位兼使相不欲責辱只令臺司據見勘到欵占結案獄成上付大理寺詳斷劉震王廷誨並處死延祥覆稱節度使薛懐讓已下未曾勘對劉震等各是偏詞伏候勅裁太祖覧之謂侍臣曰劉延所奏甚是公正懐讓既然不問劉震等宜與减等故劉震王廷誨得以不死但决配焉册府元龜卷六百十七
