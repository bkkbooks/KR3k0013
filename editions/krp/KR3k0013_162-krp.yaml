body:
  text: 册府元龜卷一百六十二宋王欽若等撰帝王部命使第二唐中宗神龍二年二月遣十使廵察風俗下制曰古之御天下者以大寳為公器以崇髙為外物仰則乾行順性命之理俛思坤載成博厚之徳將以財成至道保邦靜人用清三微臣欽若等曰三微者天地人三正之始萬物皆微故王者法焉以齊七政能臻夫此者豈一人之力哉實頼羣方共康庶績自季葉淪替湎棄公道官匪其人教無所習懐才修潔者則依違以自容通方宏偉者則放蕩以求利繇是淳化日消澆風歳長典章訛弊甿俗凋殘逶迤陵頽莫能振理朕以薄徳丕承寳命夙夜惟寅憂勞無怠昧旦端冕心被寰瀛日晏罷朝念周黎庶頃者勵精推擇傍求牧宰冀聞善政惠康乃乂虛己勵勤美化猶怠貪官傲吏屢黷於爰書失職流亡幾淪於板籍豈刑賞之柄不協其中將仁恩之誠未孚於下永言國本良深軫悼古者天子廵狩省方觀俗而錫鑾備駕或以為煩故分命輶軒博採謡頌將以彰善癉惡激濁揚清散皇明以燭幽揚仁風以被物實資令徳允屬通才惟懐永圖式鑒成憲宜於左右臺及内外五品以上官識理通明立性堅白無所詘撓志在澄清者二十人分為十道廵察使二周年一替以亷案州部俾其董政郡吏觀撫兆人議獄緩刑扶危拯滯若能抗詞直筆不憚權豪仁恕為懐黜陟咸當别加奨擢優以名器如脂韋苟全蘧蒢戚施髙下在心顧望依附者將遷削屏棄肅以憲章咸竭廼心以副朕意遂命易州刺史姜師度攝右御史以充此使景龍三年八月遣十使廵察天下睿宗唐隆元年六月庚子平韋庶人壬寅䧏十道使齎璽書宣撫景雲元年八月制出十道使持節廵撫天下二年二月降十道使按察七月分遣都督刺史十道按察十一月出十道使廵撫太極元年二月出十道使廵撫𤣥宗先天元年太上皇詔曰朕恭己無為留神𤣥黙俯順厯數僉謀公卿式命元子祗膺寳位今庶政逌新光華肇啟但恐天下至廣未達朕心故臨遣使臣宣揚朝典宜以膳部郎中蕭瑗為河南道宣勞使諫議大夫楊虛受為河北道宣勞使賛善大夫薛植為淮南道宣勞使殿中丞薛麟為隴右道宣勞使宗正卿姜晞為河東道宣勞使司門郎中李誠為關内道宣勞使工部郎中高紹為劒南道宣勞使太子右諭徳蕭憲為山南道宣勞使宋王府司馬裴綱為江南道宣勞使諫議大夫寗悌原為嶺南道宣勞使二年七月壬申命益州長史畢搆宣撫劒南及山南道少府監齊景冑宣撫關内及河東道太子右庶子陸餘慶宣撫河北道宗正少卿韋璆宣撫江南及淮南道光禄少卿杜元逞宣撫隴右道廣州都督周利貞宣撫嶺南道制曰昔者明王之御天下也内有公卿允釐庶績外有方伯司牧羣黎猶懼至道未孚淳風或替故有廵狩之典黜幽陟明行人之官省方察俗用能遐邇咸乂情偽無遺於變時雍率其道也朕祗膺嗣徳恭守帝圖上禀過庭之謨下憑衆庶之立竭精思理兩載于兹兾逮小康漸躋至化而區宇遐曠風教未同負扆長懐責深在己近者姦回搆釁竊起蕭墻宗社降靈應時殱殄今又恭承聖訓總統大猷率彼百官齊兹七政恐倉廪不實禮節未興吏靡息於貪殘人或滯於幽枉永言於此明發疚懐今卜征未習時邁仍逺宜分命輶軒慰撫黎庶畢搆等竝操履公清識見明允茂績彰於厯試嘉譽沛於周行宜膺行李載光原隰所至之處申諭朕心竝令屏絶浮華敦崇仁厚務修孝悌勤事農桑耆老鰥惸征人家口不自存者咸加恤問徳舉言揚唯賢是急若有良材異行藏器下僚哲人竒士隠淪屠釣審知才行灼然者各以名聞凡百牧宰洎乎吏人咸悉朕心各敬廼事勤則不匱仁逺乎哉勉矣朂之以副朕心開元二年四月己巳勅曰淮海維揚是稱谿險山川重復水陸殷凑去歳田收稍乖豊稔今兹人庶頗致饑乏朕為之父母深用惕然近聞雨澤應節秔稻有望目前之困餬口猶切思從蠲省用救荒弊宜令給事中楊虗受往江東道安撫存問觀察疾苦詳理寃滯百姓間有偉才異行藏鱗戢羽隠淪屠博栖遲閻閭官人内有貪冐苟得背公徇私或修己自守飬望充位者還日各以名聞所至之州具令宣布求瘼恤隠稱朕意焉五年二月詔曰伊昔明王奉若天道所寳惟榖所仗惟賢故能務穡勸農興利除害朕以薄徳纂承洪緒政期克己誠不動天頃歳河南河北諸州蝗蟲為患雖當道遣使除瘞恐今又生育天戒若此朕甚懼焉罪實在予殃豈移歳且牧宰之任朝廷所委苟得良才式敷惠訓古有夀張飛逝中牟不入者斯其效也刺史縣令等當各竭乃心用攘厥患方考休咎大明黜陟惟爾凡百可不勉哉宜令户部郎中蔡容往河北道侍御史崔喬往河南道觀察風俗問利害便與州縣籌度随事處置還日奏聞六年八月辛巳詔曰朕自臨御天下介于人上萬邦在念百姓為心慎日以兢因時載惕眷兹茂育寜忘監寐今歳河南諸州頗多水潦稼穡不稔閭閻阻饑方屬西廵更深東顧不加存問孰副憂軫宜令工部尚書劉知柔馳驛充使往河南道廵厯簡問應免租庸及賑恤竝量事便處分兼察人民寃苦官吏善惡還日奏聞宋亳陳許之間遭澇尤甚其應緣賑恤宜倍優賞八年五月置十道按察使八月以御史大夫王晙充關内道按察使揚州長史王怡充淮南道按察使右庶子齊澣充河南道按察使少府監楊孚充劒南道按察使秦州都督張守潔充隴右道按察使荆州長史盧逸充山南道按察使鴻臚少卿蕭嵩充河南道按察使襄州刺史裴觀為梁州都督山南道按察使潤州刺史趙升卿充江南東道按察使宣州刺史霍廷玉充淮南西道按察使仍下制曰苛慝不作民斯無怨寛猛相濟政是以和故周禮以官刑糾邦理以官敘正羣吏允廸前烈式惟舊章且夫寰宇至大不可以周覽黎甿至殷不可以獨化熈我庶政實惟舊寮苟非其才罔以親理朕惟是夙夜不遑安寜開元之初分遣案部糾擿姦犯頗聞懲息以其辜乆則煩尋亦從其停廢緜以歳月寖成寛弛今聞在外官寮多違憲法牧守則寄任兹重令長則祿秩且優亟聞侵竊屢有章奏雖賜金為惠未愧張武之心還珠表德罕見孟嘗之政豈敦諭之意未孚於就列将貞高之節有謝於前修永懐於此良用沉歎且政寛而慢法弊則通弛而張之其可致理御史大夫王晙等竝識通政要位以才達茂其聲實𢎞此憲章宜分遣廵案以時糾察廵内有長吏貪擾獄訟寃滯暗懦尸禄苛虐在官即宜随事案舉所犯狀竝推勘准格斷覆訖奏聞仍便覆囚夫牧宰之職教導是先録曹之任紀綱斯在其有政理殊尤清直獨立者咸以名薦餘官有清白者稱及諸色不善各别為科目同狀奏聞其尋常平狀竝不須通俾夫善取其尤罰無所濫疎而不漏察而不苛必將正其源流宏彼綱目不可總此煩碎擾其吏人應是州縣常務事非損益者使人更不必干預其百姓有不支濟應須處置事狀不便於釐革者與州縣商量處分訖奏聞以副虗佇之心以光澄清之舉九年八月詔曰朕身居九重心在萬姓恐情未達下政或乖方頃者故命近臣分道廵撫為屬農月且停使車今秋稼方收時亦將隙命中書舍人何鸞等宜所到之處宣慰百姓令悉朕懐其有水旱之州或須貸給不可逺更奏聞宜便量事處置征鎮之家各令州縣檢校優賞其中無兼丁存濟者仍加賑恤十一年五月命左拾遺徐楚璧大理丞王琇大理評事宋詞班景倩河南府法曹參軍元將茂大原府司録叅軍張珦大原府兵曹叅軍宋希玉長安縣主簿韋利渉長安縣尉王氷雒陽主簿劉日正長安縣尉裴寛萬年縣尉崔希逸三原縣尉喬夢松告成縣尉徐鍔汜水縣尉薛侃同州司法叅軍邉冲寂分州錄事叅軍韋洽榆次縣尉郭庭等攝監察御史分廵諸道詔曰國之三典令于四方歳終則廵聽其獄訟頃因水旱貨食不足或徭税徵逸多不折𠂻或租調蠲除事渉欺隠皆吏之不稱政之不修是用命兹使臣委其詳覆徐楚璧等竝清白自立茂有政聲必使事合權宜刑無寃濫不損於物有益於公往敷厥休副兹推擇竝可攝監察御史勾當租庸地税兼覆囚十三年正月制天下見禁囚徒死罪降至流流已下悉原之都城内委中書門下當日疏决處分京城委劉守制到日處分仍令中丞蔣欽緖往河南大理少卿明珪往關内刑部郞中張樽往河東兵部郞中崔珣往山南東道右庶子髙仲舒往江西道軄方郞鄭續之往劒南道秘書丞張履氷往淮南道殿中侍御史孫濟往隴右道賛善大夫張景幽往河西道右諭徳李林甫往山南西道主客郞中張烈往江南東道竝即馳驛發遣所至之處疏决囚徒宣慰百姓其有窮乏者不自存濟及侍老征人之家有疾苦者各令州縣量加醫療及賑恤其嶺南五府磧西四鎮非流配効力等見禁囚徒各委節度使及本管都督府處分布告遐邇知朕意焉十四年七月詔曰朕撫有天下寅畏上𤣥思保太和用康庶類頃秋夏之際水潦不時懐鄭許滑衛等州皆遭泛溢苗稼潦漬屋宇傾摧有切納隍之憂良深在予之責宜令右監門衛將軍知内侍省事黎敬仁速往宣慰如有遭損之處應須營助賑給竝委使與州縣相知量事處置及所在堤堰不穏便者簡行具利害奏聞九月詔曰頃秋夏之間水潦方降閭閻損壊稼穡漂淪常恐一物之違況乃數州之弊故發中使循于外臺章奏屢聞州鄉稍輯朕視之如子若納諸隍于再于三情猶馭朽審求人瘼更遣信臣中丞兼户部侍中宇文融忠義竭誠夙夜匪懈當安人之任有利簡之能眷彼使乎宜膺其選可往河南河北道遭水諸州宣撫仍審察有不支濟者宜更量加賑貸若屋宇損壊牛畜俱盡及征人之家不能自存立者量事助其脩葺其有官吏縱捨賑給不均亦須糾正囘日奏聞十五年三月制曰河北遭水處城旁及諸蕃殺䧏人先令安置及編州縣被差征行人家口等去年水澇漂損田苗頻遣使人所在廵撫兼令州縣倍加矜恤不知竝得安存否以今舊榖既沒新麥未登丁壯既差逺行老少慮不支濟朕居黄屋念在蒼生每思優飬無忘鑒寐今故遣中使左監門衛將軍李善才重此宣慰宜令州縣即時簡責有乏絶者准例給糧俾令安堵以副朕心七月詔曰同州鄜州近屬霖雨稍多水潦為害念彼黎人載懐憂惕宜令侍御史劉彦回乗傳宣慰其有百姓屋宇田苗被漂損者量事賑恤八月制曰河北州縣水灾尤甚言念蒸人何以自給朕當宁興想有勞旰昃在予之責用軫于懐宜令所司量支東都租米二十萬石賑給乃令魏州刺史宇文融充宣撫使便廵撫水損應須憂恤及合折免并存閭舍一事已上與州縣相知逐穏便處置務從簡易勿致勞擾十六年九月詔曰河南道宋亳許仙徐鄆濮兖州奏旱損田宜令右監門衛大將軍黎敬仁往彼廵問如有不支濟戸應須賑恤與州縣長官相知量事處置訖囘日具狀奏聞二十一年二月以檢校尚書右丞相皇甫翼充河南淮南道宣慰使檢校尚書吏部侍郞劉彤充江東江西道宣慰使尚書兵部侍郎李鎮充山南道宣慰使制曰去年江南淮南有微遭旱處河南數州亦有水損百姓等皇甫翼等咸謂能賢式將朕命其間乏絶應須賑貸便量事處置回日奏聞四月以乆旱命太子少保陸象先户部尚書杜暹等七人往諸道宣慰賑給及令黜陟官吏疎决囚徒二十三年二月壬寅詔曰秦州地震謫見后土朕每克念何以臻兹仲尼有云丘禱久矣而精意以吿或通神明徐國公蕭嵩地在輔弼朝之端右欲重將命暫為此行宜往秦州致祭山川凡縁所損百姓間事皆委嵩随事處置回日以聞辛亥初置十道採訪處置使命御史中丞盧絢為都畿採訪使御史中丞裴曠為京畿採訪使國子祭酒汴州刺史嗣魯王道堅為河南道採訪使華州刺史李尚隠為關内道採訪使太原尹崔隠甫為河東道採訪使禮部侍郞兼魏州刺史宋瑤為河北道採訪使太常卿廣州事嶺南經畧使李朝隠為嶺南道採訪使揚州長史韋虛心為淮南採訪使太僕卿兼判凉州都督持節河西節度等副大使牛仙客為河西道採訪使益州長史持節劒南節度副大使王昱為劍南道採訪使荆州長史韓朝宗為山南道採訪使潤州刺史劉日正為江南道採訪使秦州刺史裴敦復為隴右道採訪使梁州刺史宋詢為山南西道採訪使宣州刺史班景倩為江南道採訪使詔曰言念蒼生心必徧於天下自古良牧福猶潤於京師所以厯選列城聿求連率豈徒刺察將委輯寜朝散大夫檢校御史中丞關内宣諭賑給使上柱國盧絢等任寄已深聲實兼茂咸貫通於理道益純固於公心或華髪不衰或白珪無玷可以軌儀郡國康濟黎元間嵗已來數州失稔頗致流冗能勿軫懐而吏或不畏不仁或不安不便誠須矯過必任仗賢而前此使輦下無殷鍳事皆制時務欲總權小有舉於毫髪大莫振於綱領本命條舉却用煩苛永言所期豈云自弊今既各膺重寄允於通才以蠲疾苦之源當協大中之義若今行一道利及萬人朕所設官以俟能者朝之優秩上歸令譽言可復也宜副朕懐十一月詔令給事中韋常廵關内道中書舍人李彭年廵河南道竝與本道採訪使及所繇長官商量囘日奏聞二十九年五月命大理卿崔翹尚書右丞席豫工部侍郞郭虛己御史中丞張倚中書舍人孫逖給事中趙安貞太常卿韋常班景倩分行天下詔曰三載考績以鍳吏能八使觀風因求民瘼茲事體大致理之繇朕受命昊穹臨御寰夏慮乎一物有所不安偏於萬方無忘軫念而宇宙之内官吏至多倘有政失其宜即萬人受弊崔翹等或文學有稱或貞白流譽通於理道勵是公心俾爾澄清或當委寄至於陟黜之道國之所務苟有不當将何勸人頃年使例皆通狀其盡善者多有請求為選調之資不善者以煩碎見輕貴奏課之數若此衘命豈副虛懐卿等所到之州宜具宣朕意其百姓間事或有須釐革者宜與所繇長官商量處置囘日奏聞其官吏中有貪冐贓私其犯名教或衰老疾病無政理者刺史已下宜停務奏聞其守職公清為政尤異事堪激勸逺近知者具以名聞其諸道有遭損下人應須賑給先頻有處分猶慮艱弊豈忘矜恤亦宜審與州縣商量務令周濟又聞河堤穿决致有漂流諒繇州縣寛疎不時修塞亦便簡行處置勿使更然其天下道學固已有置者并鄉學等此竝切於生人比來興置盖為教導各宜敦勸使有成益其征鎮之間或有单貧老弱不自存濟者宜令所繇倍加優賞其浮寄迯户等亦頻處分頃來招携未有長策又江淮之間有深居山洞多不屬州縣自謂莫徭何得因循致使如此竝與州縣商量處置一時錄奏卿等既當廵按受委非輕是宜勉爾良圖以副朝選無或致有廻避不竭公忠朕之責成深宜自効天寳五載正月命禮部尚書席豫御史中丞王鉷蕭隠之諫議大夫韋見素李麟尚書左丞崔翹鴻臚少卿源光譽分道廵按天下風俗及黜陟官吏詔曰黜幽陟明所以察風俗求瘼恤隠所以慰黎庶不有其人孰可將命禮部尚書席豫等亮直清節其經通大才多識前言往行時政或乆應任使嘗參八政之列或夙藴忠公必副四方之委永懐兆庶用寄澄清豫廵河北道鉷廵京畿關内及河東道隠之廵東畿及河南道見素廵山南東道江南西道黔中嶺南等道麟廵河西隴西磧西等道翹廵劒南及山南西道光譽廵淮南及江南東道其百姓之間及官吏之軰如事或未該須有釐革者仍委量事處置囘日奏聞其嶺南黔中磧西途路遥逺若使臣一一自到慮有稽遲任各精擇判官准舊例分往十四載三月給事中裴士淹禮部侍郞楊浚太常少卿姚子彦往河南河北江淮宣慰肅宗至徳二年十二月大赦令中書門下檢使即分道宣慰所至郡縣審問百姓間有利害有須釐革處置者一一奏聞代宗廣徳二年三月庚戌詔曰歳之不易征賦繁興河南蕭然江外尤劇供上都之國用給諸道之軍頒庶務徵求未遑小息火耕水耨夏葛冬裘充饋運而屢空支戎衣而不足農人少而轉困編户流而罕歸自北之化未淳大東之詞方切君為心也朕甚痛然今區宇漸寜凋殘已甚惕然恭已姑務息人懼惸嫠之無吿思省方以親問時邁未可日昃増勞載懐鴻鴈之詩用解吾人之恤必資循行悉以周爰皇皇者華申諭朕志宜令太子賔客兼御史大夫劉晏往諸道宣慰應百姓有徵科煩重人户迯亡及水旱所損不能支濟者竝與本道節度使計會蠲削安存遂便處置訖具狀聞奏官吏之政在邦必聞知無不為公道斯在其租庸使及刺史縣令錄事參軍有精於政理及賦役均平州縣之間稱為良吏者具名奏聞别有甄異如或殘忍慢法貪汚敗官有害於人不應時務者亦具状以聞仍與本道觀察節度使㑹計舉按四海至廣九重至深思使下情上通常令上㫖下達務以審慎稱朕意焉大厯二年八月以潭衡水灾命給事中賀若察使於湖南宣慰九月命比部員外郞莫藏用使於嶺南宣慰十二年八月以京畿水旱分命御史廵苗徳宗即位初湖南山洞中王國良者聚衆為盜都官員外郞關播往宣慰之臨行召對於别殿播奏曰臣自今奉詔撫國良如不受命臣請便宣恩命詰鄰州速出兵翦除帝曰卿言深合朕意建中元年二月發黜陟使分往天下以右司郞中兼侍御史庾何廵京畿職方郞中劉灣往關内刑部員外郞裴伯言往河東澤潞磁邢等道司勲郞中韋禎往山南西道劒南東西川禮部郞中趙賛往山東荆南黔中湖南等道諫議大夫吳經綸往魏博成徳幽州等道給事中盧翰往河南淄青東都畿等道吏部郞中李承往淮西淮南等道諫議大夫桞載往浙江東西道刑部郞中鄭叔則往江南江西福建等道禮部員外衛晏往嶺南五管詔曰朕聞唐虞聖人之理三載考績黜陟幽明兩漢施教之君亦命八使澄清天下朕纂承大業思服訓謩雖王公卿士内勤夙夜藩岳守將外盡公忠而兵革未寜戎狄未盡紀綱未振法令未敷封圻郡縣賦税不一師旅上下勞逸不均所以終宵積憂寤寐増惕爰命羣士往代予言行乎四方以聽于理舉其百事以歸于正朕之深顧可不勤副也興元元年正月帝在奉天詔曰古者天子有廵狩之義以考國典以觀人風在時多虞良或未暇乃命卿士使于四方問人疾苦亷吏善惡苟副所任則如親臨在理平之時尚資勤恤况流散之後得無省憂朕以不敏不明肆于人上撫育失道誠信未孚冦盜繁興阻兵拒命哀我臣庶䧟于匪人顧兹田疇鞠為茂草不念柔服遂命徂征徵發甲兵暴露營壘冐干鋒刃繼以死傷農工廢棄其生業商賈咨嗟於道路軍戎日益閭巷日空凋瘵愈窮費用愈衆以財力之有限供求取之無涯怨氣上騰咎徵斯應疫厲薦至水旱相乗人罹于灾誰任其責朕自嗣位殆今六年連兵不解已逾四稔雖本非獲已義在濟人而事有重勞良深罪已皆以朕之寡昧居安忘危致冦之繇實在於此予則不徳人亦何辜媿恨積哀痛心疾首昨者改元施令悔往布新將使反側獲安干戈自息猶懼思慮不周於庶務誠感未達於遐方一理失中一夫不獲則何以謝天譴致人和俾代予言其在良弼宜令門下侍郞平章事蕭復充山南東西荆湖淮南江西鄂岳浙江東西福建嶺南等道宣慰安撫使嗚呼往率乃職敬敷朕命慰勉征戍勞來困窮訪其所安察其所弊滯淹必達寃濫必申無憚幽逺而不備無畧細微而不恤其諸道將士准前制嚴備疆界勿使侵擾仍各令本御史具名衘聞奏悉與甄敘殊功勁節别條狀迹當特優奨百姓兩税外徵率一切竝停諸道事緣急切交須處分即與長史商度務合便宜其餘利害竝還日條奏朕當詳察以擇厥中宣布逺近咸令知悉是月給事中杜黄裳兼御史中丞江淮宣慰使十月辛丑詔工部尚書賈耽往河陽魏博道宣慰兵部侍郞李紓往河東宣慰十一月丁丑以秘書監崔漢衡為兵部尚書東都河陽魏博宋亳淄青賑給宣慰使工部侍郞劉太真為河東澤潞鎮冀易定賑給宣慰使貞元元年二月遣工部尚書賈耽工部侍郞劉太真宣慰於東都河南是時東都米每斗値一千錢飢饉塞道前年蝗虫大起自山而東竟千海浮天被野草木無遺河北諸州米斗値錢九百餓死者壓道路八年八月詔曰朕以薄徳託於人上勵精庶政思致雍熈而誠不動天政或多闕隂氣作沴暴雨薦臻自江淮而及於荆襄厯陳宋而施於河朔其間郡邑連有水灾城郭多傷公私為害損壊廬舍浸敗田苗或親戚漂淪或資産沉溺為之父母所不忍聞興言疾疚良深惻憫夙夜祗畏悼于厥心是用寢不獲安食而忘味時且賑恤庶洽幽明宜令中書舍人奚陟往江陵襄郢随鄂申光蔡等州左庶子姚齊梧往陳許宋亳徐泗等州秘書少監雷咸往鎮冀徳棣深趙等州京兆少尹韋武往揚楚廬夀徐潤蘇常湖等州宣撫應諸州百姓因水不能自存者委宣撫使賑給死者各加賜物所在官為斂收埋瘞其田苗所損委宣撫使與所在長吏具奏於戲一夫不獲一物失所刑法不中賦斂不均皆可以失隂陽之和致水旱之沴其繫囚及獄訟乆未决者委所在長吏即與疎辨務從寛簡俾伸寃滯貪官暴吏倚法害公特加懲肅用明典憲灾傷之後切在撫綏咨爾方鎮之臣洎于守宰咸宜悉乃心力以恤㐫灾宣布朕懐使各知悉是秋河南河北山南江淮凡四十餘州大水漂溺死者二萬餘人帝召見奚陟等於延英殿臨遣憲宗以永貞元年八月即位詔曰理天下者先脩其國國命之重寄在方鎮方鎮共理實惟列城列城為政繫乎屬縣然則匹夫之耕匹婦之織積微成著以供國計永念蒸庶厥惟艱哉頃年以江淮租賦爰及𣙜税委在藩服使其平均太上皇君臨之初務從省便遂令使府歸在中朝或恐廵院既多職因交替新制未立舊綱已紊况河汴而東瀕海之右名都奥壤疆理接連如或征賦不均徵輸難濟物輕貨重法弊人勞又聞江淮數道比愆時雨深憂黎庶之不足軍國之闕供政有所不宣事有所未便牧宰有課績官吏有否臧爰遣使臣申我休命宜令度支及諸道鹽鐵轉運副使户部侍郞兼御史大夫潘孟陽專往宣諭慰安疲甿詢訪便宜蠲除疾苦安人利國稱朕意焉元和四年正月以灾旱命左司郞中鄭敬使淮南宣歙吏部郞中崔芃使浙西浙東司封郞中孟簡使山南東道荆南京兆少尹裴武使江西鄂岳等道宣撫帝召對告之曰卿等賑恤灾旱當勤於奉職勿如潘孟陽所到務飲酒游山寺而已仍許卿等以便宜從事穆宗長慶元年八月丁亥以殿中侍御史温造為起居舍人充鎮州四面諸軍宣慰使造前以京兆府司錄宣慰兩河衆推其材故有是命遷起居舍人無何范陽以其將朱克融為師鎮州殺節度使田𢎞正奏呈又以造為鎮州四面河東魏博澤潞横海深冀易定等軍宣慰使文宗太和三年正月癸丑諫議大夫柏耆以奉使召對於延英九月命監察御史孟琯往淮南浙右廵察米價五年七月甲申詔曰蓋天人之際相應如響祥祲之來各惟厥事乃者兵革始罷黎庶甫寜而蜀土載罹震驚方務綏輯今又水潦為沴沉溺實多載省奏章益深惕慮諒以朕澤不逮下誠無感通五事致咎此方何罪夙夜兢媿憫歎良深宜令户部郞中李踐方充兩川安撫使開成元年二月庚寅中書門下奏准赦文諸道黜陟使以給事中盧均司農卿李玘吏部郞中薛廷光太常少卿盧貞刑部郞中房直温分命之二年八月丁酉詔曰大河而南幅圓千里楚澤之北連亘數州近以水潦暴至隄防潰溢既壊廬舍復損田苗言念黎元罹此灾沴或生業蕩盡或農收索然困餒凋殘豈能自濟是用勤約疚于中懐今故臨遣使臣詳問病害紓其墊溺之苦申以勞來之方勉諭師徒安存孤老將我惠澤兾蘇疲人宜令給事中盧𢎞宣往許鄭滑鄆曹濮等道宣慰刑部郞中崔瑨往山南等道鄂岳等道宣慰於戯朕自君臨勵求理道常恐一物失所每以萬姓為心誠無感通時有灾害夙夜媿悼不知所然宣示藩方喻兹詔命使寛其徭役禁其侵漁多方輯綏俾速完復布吿甿庶知朕意焉昭宗天復二年三月詔遣諫議大夫張顗示喻太原汴州使息兵通和太原後唐太祖也汴州梁太祖也後晉髙祖天福六年冬十月丁亥朔遣鴻臚少卿魏玭將作少監霍廷讓左領軍衛將軍安渗右驍衛將軍田峻于滑濮鄆澶四州察河水害稼處并安撫百姓周世宗顯徳元年八月以諸州編户皆以雨水害稼上訴遣兵部郎中麻麟等二十三人分按之册府元龜卷一百六十二
