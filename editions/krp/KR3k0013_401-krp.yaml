body:
  text: 冊府元龜卷四百一宋王欽若等撰將帥部行軍法夏書曰威克厥愛允濟𫝊曰戎昭果毅易之戮也蓋夫戢兵禁暴者武之德眀罰飭法者戰之器未有捨兹道而能貞夫師律者也自春秋以來典司軍政而能申嚴卒乗一其志力聳動羣聼克壯其猷者曷嘗不出令必信奉法無撓干紀者罔赦踰矩者必誅靡私於貴倖無憚於彊禦繇是塞其橫議去其亂羣破驕卒之膽激懦夫之氣齊斧一用威聲載路揚我武以清不諱震茂烈以垂無窮勲伐並建光寵咸集真得夫經武御衆之略哉子玉為楚令尹楚子將圍宋使子文治兵於暌子文時不為令尹故云使治兵習號令也暌楚邑終朝而畢不戮一人終朝自旦及食時也子文欲委重於子玉故畧其事子玉復治兵於為子玉為令尹蒍故楚邑終日而畢鞭七人貫三人耳魏絳為晉司馬悼公與魯襄公㑹單頃公及諸侯同盟於雞澤單頃公王卿士晉侯之弟揚干亂行於曲梁行陳次魏絳戮其僕僕御也公怒謂羊舌赤曰合諸侯以為榮也揚干為戮何辱如之必殺魏絳無失也對曰綘無貳志事君不避難有罪不逃刑其將來辭何辱命焉言終魏絳至授僕人書僕人晉侯御僕將伏劍士魴張老止之公讀其書曰日君乏使使臣斯司馬斯此也臣聞師衆以順為武順莫敢違軍事有死無犯為敬守官行法雖死不敢有違君合諸侯臣敢不敬君師不武執事不敬罪莫大焉臣懼其死以及揚干無所逃罪懼自犯不武不敬之罪也不能致訓至於用鉞用鉞斬揚干之僕臣之罪重敢有不從以怒君心言不敢不從戮請歸死於司宼致屍於司宼使戮之公跣而出曰寡人之言親愛也吾子之討軍禮也寡人有弟弗能敎訓使干大命寡人之過也子無重寡人之過聼絳死為重過敢以為請請使無死晉侯以魏絳為能以刑佐民矣反役與之禮食使佐新軍羣臣旅㑹今欲顯綘故特為設禮食晉中行穆子晉大夫敗無終子及羣狄於太原崇卒也崇聚也將戰魏舒曰彼徒我車所遇又阨地險不便以什共車必克更増十人以當一車之用困諸阨又克車必困於阨道今去車故為必克請皆卒去車為歩卒自我始乃毁車以為行魏舒先自毁其屬車以為歩陳五乗為三伍乗車者車三人五乗十五人今改去其車更以五人為伍分為三伍荀吳之嬖人不肯即卒斬以徇魏舒輙斬之荀吳不恨所以能立功為五陳以相離两於前伍於後專為右角參為左角偏為前拒皆臨時處置之名以誘之翟人笑之笑其失常未陳而薄之大敗之韓獻子為晉大夫趙宣子言於靈公以為司馬河曲之役趙孟使人以其乗車干行獻子執而誅之司馬穰苴齊田完之苖裔也齊景公時晉伐阿甄而燕侵河上齊師敗績景公患之晏嬰薦田穰苴曰穰苴雖田氏庶孽然其人文能附衆武能威敵願君試之景公召穰苴與語兵事大恱之以為將軍將兵扞燕晉之師穰苴曰臣素卑賤君擢之閭伍之中加之大夫之上士卒未附百姓不信人㣲權輕願得君之寵臣國之所尊以監軍乃可於是景公許之使莊賈往穰苴既辭與莊賈約曰旦日日中㑹於軍門穰苴先馳至軍立表下漏待賈賈素驕貴以為將已之軍而已為監不甚急親戚左右送之留飲日中而賈不至穰苴則仆表決漏入軍行勒兵申眀約束約束既定夕時莊賈乃至穰苴曰何後期為賈謝曰不佞大夫親戚送之故留穰苴曰將受命之日則忘其家臨軍約束則忘其親援枹鼓之急則忘其身今敵國深侵邦内騷動士卒暴露於境君寢不安席食不甘味百姓之命皆懸於君何謂相送乎召軍正問曰軍法期而後至者云何對曰當斬莊賈懼使人馳報景公請救既往未及反於是遂斬莊賈以徇三軍三軍之士皆振慄乆之景公遣使者持節赦賈馳入軍中穰苴曰將在軍君命有所不受魏武帝曰茍便於事不拘君命問軍正曰軍中不馳今使者馳云何正曰斬使者大懼穰苴曰君之使不可殺之乃斬其僕車之左駙馬之左驂以徇三軍遣使者還報然後行孫武子者齊人也以兵法見於吳王闔廬闔廬曰子之十三篇吾盡觀之矣可以小試勒兵乎對曰可闔廬曰可試以婦人乎曰可於是許之出宫中美人得八百十人孫子分為二隊以王之寵姬二人各為隊長皆令持㦸令之曰汝知而心與左右手背乎婦人曰知之孫子曰前則視心左視左手右視右手後即視背婦人曰諾約束既布乃設鈇鉞即三令五申之於是鼓之右婦人大笑孫子曰約束不眀申令不熟將之罪也復三令五申而鼓之左婦人復大笑孫子曰約束不眀申令不熟將之罪也既已眀而不如法者吏士之罪也乃欲斬左右隊長吳王從臺上觀見且斬愛姬大駭趣使使下令曰寡人已知將軍能用兵矣寡人非此二姬食不甘味願勿斬也孫子曰臣既已受命為將將在軍君命有所不受遂斬隊長二人以徇用其次為隊長於是復鼓之婦人左右前後跪起皆中規矩繩墨無敢出聲於是孫子使使報王曰兵既整齊王可試下觀之唯王所欲用之雖赴水火猶可也吳王曰將軍罷休就舍寡人不願下觀孫子曰王徒好其言不能用其實於是闔廬知孫子能用兵卒以為將趙奢為趙將秦伐韓軍於閼與趙王令奢將救之兵去邯鄲三十里而令軍中曰有以軍事諌者死秦軍軍武安西屬魏郡在邯鄲西秦軍鼓譟勒兵武安屋瓦盡振軍中侯有一人言急救武安奢立斬之漢胡建武帝天漢中守軍正丞南北軍各有正又置丞而建未得真官兼守之貧亡車馬常歩與走卒起居所以尉薦走卒甚得其心尉者自上安下也薦者舉籍也時監軍御史為姦穿北軍壘垣以為賈區坐賣曰賈為賣物之區也區者小室之名若今小菴屋之類耳故衛士之屋謂之區廬宿衛宫外士稱為區士也賈音古建欲誅之乃約其走卒約束也曰我欲與公有所誅吾言取之則取斬之則斬於是當選士馬日監御史與䕶軍諸校列坐堂皇上校者軍之諸部校也室無四壁曰皇建從走卒趨至堂皇下拜謁因上堂皇走卒皆上建指監御史曰取彼走卒前曵下堂皇建曰斬之遂斬御史䕶軍諸校皆愕驚不知所以建亦已有成奏在其懐中遂上奏曰臣聞軍法立武以威衆誅惡以禁邪今監御史公穿軍垣以求賈利公謂顯然為之私買賣以與士市不立剛毅之心勇猛之節亡以帥先士大夫尤失理不公用文吏議不至重法黃帝李法曰李者法官之號也總主征伐刑戮之事故稱其書曰李法壁壘已定穿窬不繇路是謂姦人姦人者殺窬小竇也臣謹按軍法曰正亡屬將軍將軍有罪以聞言軍正不屬將軍將軍有罪過得表奏之二千石以下行法焉二千石謂軍中校尉都尉之屬丞於用法疑丞屬軍正斬御史於法有疑執事不諉上諉累也言執事者當見法即行不可以事累於上也諉音女瑞切臣謹以斬昧死以聞制曰司馬法曰國容不入軍軍容不入國何文吏也司馬法兵書之名也解在主父偃𫝊詔言在軍中何用文吏之議也三王或誓於軍中欲民先成其慮也或誓於軍門之外欲民先意以待事也慮謂計念也先意謂先為之意也或將交刃而誓致民志也欲致民勇志使不奔北建又何疑焉建繇是顯名後漢鄧禹為大司馬與公孫述將延岑戰於藍田不克復就榖雲陽漢中王劉嘉詣禹䧏嘉相李寳倨慢無禮禹斬之祭遵從光武征河北為軍市令舍中兒犯法遵格殺之光武怒命收遵時主簿陳副諌曰眀公常欲衆軍整齊今遵奉法不避是敎令所行也光武乃貰之以為刺奸將軍謂諸將曰當避祭遵吾舍中兒犯法尚殺之必不私諸卿也魏鍾㑹為大將軍伐蜀命牙門將許儀在前治道會在後行而橋穿馬足䧟於是斬儀儀許禇之子有功王室猶不原貸諸軍聞之莫不震竦于禁為偏將軍兾州平昌豨復叛遣禁征之禁急進攻豨豨與禁有舊詣禁降諸將皆以為豨已降當送詣太祖禁曰諸君不知公常令乎圍而後䧏者不赦夫奉法行令事上之節也豨雖舊友禁可失節乎自臨與豨决隕涕而斬之是時太祖軍淳于聞而嘆曰豨降不詣吾而歸禁豈非命邪益重禁蜀諸葛亮為大將軍出軍向祁山馬謖統大衆在前與魏將張郃戰於街亭謖違亮節度大為郃所破亮戮謖以謝衆蔣琬後詣漢中謂亮曰昔楚殺得臣然後文公喜可知也天下未定而戮智計之士豈不惜乎亮流涕曰孫武所以能制勝於天下者用法眀也是以揚干亂行魏綘戮其僕四方分裂兵交方始若復廢法何用討賊邪吳潘濬為太常時五溪蠻夷叛亂假濬節督諸軍討之信賞必罰法不可干中即將豫章徐宗有名士也嘗到京師與孔融交結延儒生談議部曲寛縱不奉節度為衆作殿濬遂斬之其奉法不憚私議皆此類也吕蒙為漢昌太守襲荆州定南郡盡得蜀將士家屬撫慰之約令軍中不得干歴人家有所求取蒙麾下士汝南人取民家一笠以覆官鎧雖公物䝉猶以為犯軍令不可以鄉里廢法遂垂涕斬之晉張光為材官將軍梁州刺史先是秦州人鄧定等二十餘家饑餓流入漢中保於城固漸為抄盜梁州刺史張殷遣巴西太守張燕討之定窘急僞乞䧏於燕併饋燕金銀燕喜為之緩師定宻結李雄雄遣衆救定燕退遂進逼漢中太守杜正冲東奔魏興殷亦棄官而遁光不得赴州止於魏興乃結諸郡守共謀進取燕唱言曰漢中荒敗廹近大賊克復之事當俟英雄正冲曰張燕受賊金銀不時進討阻兵緩宼致䘮漢中實燕之罪也光於是發怒呵燕令出斬之以徇綏撫荒殘百姓恱服周訪為揚烈將軍領兵一千二百屯尋陽鄂陵與甘卓趙誘討華軼所統厲武將軍丁乾與軼所統武昌太守馮逸交通訪收斬之陶侃為龍驤將軍武昌太守時天下饑荒山夷多斷江刼掠侃令諸將詐作商船以誘之刼果至生獲數人是西陽王羕之左右侃即遣兵逼羕令出向賊侃整陣於釣臺為後繼羕縛送帳下二十人侃即斬之自是水路肅清庾亮為征西將軍鎮武昌以建威將軍陶稱為監江夏隨義陽三郡軍事南中即將江夏相以本所領二千人自隨到夏口徑將二百人下見亮亮大㑹吏佐責稱前後罪惡稱拜謝因罷出亮使人於閣外收之棄市亮上疏曰按稱大司馬侃之孽子父亡不居䘮位荒耽於酒昧利偷榮擅攝五郡自謂監軍輙召王官聚之軍府故車騎將軍劉𢎞曽孫安寓居江夏及將楊恭趙韶並以言色有忤放聲當殺安恭懼自赴水而死韶於獄自盡將軍郭開從稱往長沙赴䘮稱疑開附其兄弟乃反縛懸頭於㠶檣仰靣彈之鼓棹渡江二十餘里觀者數千莫不震駭又多藏匿府兵收坐應死臣猶未忍直上且免其司馬稱肆縱醜言無所顧忌要結諸將欲阻兵搆難諸將惶懼莫敢酧答繇是奸謀未即發露臣以侃勲勞王室是以依違容掩故表為南中即將與臣相近思欲有以規救之而稱豺狼愈甚發言激切不忠不孝莫此之甚茍利社稷義有專斷輙收稱伏法後蜀李庠特之弟也益州刺史趙廞以為威宼將軍使斷北道庠本東羌良將曉軍法不用麾幟舉矛為行伍斬部下不用命者三人部陣肅然南齊李安民行南徐州事城局叅軍王迴素為安民所親盗絹二疋安民流涕謂之曰我與卿契濶備嘗今日犯王法此乃卿負我也於軍門斬之厚為歛祭軍府皆震後魏宋弁為散騎侍即孝文南征以弁為司徒司馬曜武將軍東道副將軍人有盗馬靽者斬而徇之於是三軍震懼莫敢犯法安定王休孝文南征領大司馬孝文親行諸軍遇休以三盗人徇六軍將斬之有詔赦之休執曰不斬何以息盗詔曰王者之體亦非常之澤雖違軍法可特原之休乃奉詔帝謂司馬馮誕曰大司馬嚴而執法諸軍不可不慎於是六軍肅然後周于翼為安州總管時髙祖東伐詔翼率荆楚兵二萬自宛葉趨襄城大將軍張光雒鄭恪等並𨽻焉旬日下齊一十九城所部都督輙入民村即斬以徇繇是百姓欣悅赴者如歸隋樊子蓋為東都留守屬楊元感作逆來逼土城子蓋遣河南賛治裴宏䇿擊之為所敗遂斬宏䇿以徇唐竇軌隋末從髙祖入關拜光禄大夫時胡賊掠宜君令軌討之初不利軌斬其部將十四人拔隊中小帥以代之軌率數百騎殿於後令衆曰聞鼔聲有不進者自後斬之既鼓士卒爭進擊賊破之斬首千餘級虜男女二萬餘口王行敏武徳初為屯衛將軍劉武州之入并州也遣兵宼上黨陷長子壺關二縣潞州刺史郭子威以兵自禦益州刺史張貴上言子威怯懦無統領之才恐終失上黨之地髙祖令行敏馳鎮潞州時既外逼彊宼内乏糧積大懐危懼往來偶語行敏患之人有言子威將叛者行敏斬子威以徇城中股慄上下肅然嗣邠王守禮以睿宗延和元年為單于大都䕶中受降城守將王忠觀犯令守禮對衆斬之哥舒翰開元中為河西節度使王忠嗣衛將忠嗣使翰别為將討吐蕃於新城以周對為副使不為翰用頗沮之翰怒甚不脫甲撾殺之投其屍於坑中軍中股慄馬承光以肅宗至徳二年為河東節度使河東兵馬盡發於渭北屯馮翊太守王鳯輙執異見沮軍不發承光斬之張鎬為河南道節度使都統河南淮南等諸軍事鎬既發㑹張廵宋州圍急倍道兼進傳檄濠州刺史閭邱曉引兵出救曉素愎戾馭下少恩好獨任及鎬信至略無稟命之意又慮兵敗禍及於已遂逗遛不進鎬至淮口宋州已陷鎬怒即日杖殺李光弼自河東節度入覲時郭子儀攻安慶緒於相州失利詔以光弼代子儀為朔方節度兵馬副元帥先是子儀政寛朔方將士多不奉法及聞光弼至皆懼光弼屯汜水朔方左廂兵馬使張用濟後至斬於纛下時僕固懐恩為右廂兵馬使甚憚之不敢惕息時史思眀逼雒光弼引兵入河陽光弼自將中潬兵大破賊衆賊將周摯復整軍壓北城而下將攻之光弼遽領衆入北城登城望曰彼雖衆而囂不足懼也當為公等日午而破之命將出戰及期不决謂諸將曰向來戰何處最堅而難犯或曰西北角遽命郝廷玉曰爾擊之玉曰玉歩卒也請騎軍五百翼之光弼與三百又問何處最堅曰東南隅即命倫惟真以所部往擊之對曰蕃將也不知歩戰請鐵騎三百與之百光弼出賜馬四十匹分給之令之曰爾等望吾旗而戰若麾旗緩任爾觀望便宜吾旗連麾三至地則萬衆齊入生死以之少退者斬無赦玉䇿馬赴賊有一將援槍刺賊洞馬腹連刺數人一人逢賊不戰而退光弼召不戰者斬賞援槍者絹五百疋郭子儀為關外副元帥代宗廣徳元年十月吐蕃犯長安既平手詔子儀勞來内外子儀宣恩慰撫旌别邪正誅賞之射生軍將趙璘不禁暴人甚怨苦子儀集衆杖殺士庶悦服王縉以大歴四年為河東節度使縉以大將王無縱張奉璋失律並按軍令斬之以聞初縉奉詔發兵赴監州防秋無縱奉璋並為兵馬使與馬軍使舍利割旃同領馬歩三千人赴援割旃先濟河無縱奉璋逗遛不進將謀為亂無縱詐以他故回入太原城縉不覺㑹其謀泄城内官吏多潜為備乃有聞於縉者縉宻令召潜伏甲士待之無縱等不虞事泄既至縉以義責之遂與監軍及軍將等靣闕再拜陳無縱等悖亂軍有常刑乃斬之其連謀王希藝蘓延福等七人並同受戮自是太原兇將殆盡軍府稍寕路嗣恭為郭子儀靈武留後嗣恭披荆榛以守之大將御史中丞孫守亮握重兵倔彊不受制嗣恭稱疾召至因殺之威信大行李晟為神䇿將建中末徳宗幸奉天晟東討自莫州繇白石山雲蔚之路來赴難軍於渭橋時汝鄭應援使劉徳信以子孫軍敗於襄城還於渭上晟將收復宫闕數其自關東縁路剽刼之罪斬之而兼其衆晟既收復都城遣京兆尹李齊運告諭於衆百姓安堵秋毫無犯尚可孤軍人有擅取馬者晟大將髙眀曜虜賊女妓一人司馬佃取賊馬二匹晟立斬之軍士皆脅息莫敢忤視晟將赴鳳翔乃宻奏曰中原兵禍皆起涇州且其地逼西戎易為反覆田希鍳兇徒將校驕逆若不懲革終為後患帝初難之晟復陳方略再三乃許及至鳳翔涇州有使至晟㣲謂之曰吐蕃至涇州宻近有不虞捍禦得否或欲兵相援尚書意復如何使者歸報鑒鑒果請濟師晟將與之僞不許曰涇州頃似反側今請効勤此若遣援兵彼將士或致疑阻使者固請晟乃曰尚書所請固不可違乃遣腹心將彭令英二人赴涇州田希鑒無疑而納之涇州欲為令英等求宅晟曰兵馬防遏不乆當迴將之所居合在營内焉用宅為及是晟託廵撫遂往涇州至百里城涇州將佐來謁晟皆頒以錦綵銀器未至涇州數十里希鑒迎於路左晟不受禮與之並轡結歡話舊以希鑒娶李氏呼之曰田即遂入涇州令具三日熟食曰廵撫既畢即還鳳翔希鑒不復有疑翌日希鑒大具宴晟並受之謂曰禮尚往來主人如此客當有所答也又翌日晟請希鑒與將吏赴㑹希鑒恱大集將士來赴希鑒等既入晟使精卒於外廊且伏甲士彭令英於軍中戒嚴伺察食畢方飲晟遣彭令英與涇州校下堂謂曰與公等濶别久請各言姓字遂得石竒等三十餘人數之曰爾等累為叛殘害忠良天地不容何顔相見並斬之希鑒尚在座晟顧之曰田即負恩如此國有常刑然平生親知不令身首異處應曰唯於是壯士持之而出遂縊殺之其子蕚亦皆就戮餘衆股慄無敢動者因入營號令然後獻狀曰田希鑒悖逆成性怙亂作奸頃因兇徒遂搆邪計昨者蕃衆効義左右官軍馮河祗供將期收復而涇原惡黨醜正害賢陷翻軍城殘賊忠義眀班奔竄纔得全生河清忠勤終見肆毒職繇希鑒扇動逆類猖狂負國家之深恩受朱泚之節制包藏狡逆莫甚於斯臣昨者廵邊將欲安撫而希鑒潛勒歩騎或在要衝名為迎臣實欲拒捍臣先令精鋭以奪其勢次遣宣諭以慰其心雖云鴟張未腵設施跡其前後實不可容男蕚等罪惡既同謹並按軍令訖臣幸當重寄累受寵榮除惡之義思去本根報國之誠敢誅無禮况俯臨邊境湏用忠良若用此人無以懲革晟遂安輯其士衆而後歸鳳翔焉馬燧為河東節度興元元年討李懐光大將谷秀以犯令虜士女遂斬之以狥劉昌為宣武軍兵馬使貞元三年節度使劉元佐朝京師徳宗因以宣武士衆八千委昌北出五原軍期有前却沮事昌斷斬三百人遂行樊澤以貞元八年為山南東道節度初嗣曹王臯之卒也軍士皆亂澤至部因宴集將從為亂謀泄皆捕殺之乃理首亂不禁士卒者放列將鄧方琦王倩楊進等於屬城人皆恱服韓𢎞貞元中為宣武軍節度使先於汴州比年繼亂號為難理自劉士寕之後有李迺鄧惟恭馬英幹相次擒赴殺軍司馬陸長源及從事孟叔度輩凡造惡者數十百人常混然而隱於衆𢎞視事未㡬捜録其黨皆得之而族誅焉有部將劉鍔亦兇黨也𢎞欲因此大振軍聲一旦列短兵於牙門召鍔並其下三百人數其前罪斬之以徇血流道中宏宴笑自若其後訖𢎞入朝凡二十一年兵衆五萬不敢有謀亂者髙崇文以憲宗元和初為右神䇿行營節度使統諸鎮兵討西川劉闢至興元軍中有折逆旅之匕箸者斬之以徇初闢陷東川擒節度使李康及崇文克梓州乃歸康求雪已罪崇文以康敗軍失守遂斬之郗士美元和中為昭義節度使號令甚肅及討王承宗士美以兵馬使王獻領勁卒一萬為前鋒獻兇惡怙亂逗撓不進遽使召至數其罪而斬之且令曰敢後出者斬士美親鼓之兵既合而賊大敗下三營還栢鄉以吉語聞憲宗大恱曰吾固知士美之能辦吾事王鍔為河東節度使元和中河東防秋之卒殺豐州刺史燕重旰而歸初鍔奉詔以兵二千助天徳軍理中受降城役罷將歸屬有命留戍之其將劉甫者素易重旰而恥為之屬士卒思歸因重旰不虞而縱殺之并屠其家而去既歸太原鍔論殺劉甫并從亂者八十四人斬之王智興為徐州牙將元和中王師誅吳元濟青帥李師道與蔡賊謀撓沮王師頻出軍侵徐徐帥李愿以所部歩騎悉委智興以抗之鄆將王朝晏以兵攻沛智興逆擊敗之賊又令姚海率勁兵二萬圍豐攻城甚急智興擊敗之於賊壁獲美妾智興懼軍士争之乃曰軍中有女子安得不敗此雖無罪違軍法也即斬之以徇張煦為夏州節度元和八年十二月振武軍士逐出節度使李進賢命煦以夏州兵二千代進賢許以便宜擊斷九年正月煦入單于都䕶府誅作亂者蘇國珍二百五十三人乃定曹華元和末為棣州刺史及李師道誅分所管十二州為三鎮王遂為沂海節度使偏刻不能馭衆為牙將王弁所害朝廷遂授華左散騎常侍沂州刺史充沂海觀察使華至鎮視事三日宴將吏伏甲士千人於幕下羣校既集華喻之曰吾受命兼奉聖㫖以鄆州將士分割三處有道途之勞今有頒給北州兵稍厚鄆州士卒處左翼易以區别分定并令州兵出外既出闔門乃謂鄆州卒曰天子深知鄆人之勞然前害主帥者不能免罪甲士自幕中出周環之凡鄆卒一千二百人立斬於庭血流成渠是日門屏之間有赤霧髙丈餘久之方散自是沂海之人重足股慄無敢為盗者吳仲方為荆南監軍小使文宗太和四年仲方奏先赴西川行營兵馬一千人令本道到續得官吏狀稱副兵馬李元直等先在西川搆扇軍情已於衙門外處斬訖温造太和中為山南西道節度使先是興元軍亂殺節度使李綘造至褒城㑹興元都將衛志忠征蠻迴謁見造即留以自衛宻與志忠謀又召亞將張丕李少直各諭其㫖下車置宴詰以殺綘之狀志忠及丕夾階立拔劍呼曰殺圍兵齊奮其賊首敎練使􅉌鑄并官徤千人皆斬首於地血流四注監軍楊叔元在坐遽使求哀擁造靴以請命遣兵衛出以俟朝㫖王式以懿宗咸通中為武寕軍節度使先是王智興得徐州召募兇豪之卒二千人號曰銀刀鵰旗門搶扶馬等軍番宿衙城自後寖驕節度使姑息不暇用弁鎮徐日毎與驕卒雜坐酒酣撫背時把板為之唱歌其徒日費萬計每賔宴必先饜飫祁寒暑雨巵酒盈前然諠譟邀求動謀逐帥及温璋為節度使士卒素知璋嚴深負憂疑璋開懐撫諭終為猜二給與酒食未嘗瀝口不期月而逐璋乃以式代璋式以忠武義成之師三千平定浙東賊仇甫便詔式帥二鎮之師渡淮徐卒聞之懼其勢無如之何至大彭舘方來迎謁居三日犒勞两鎮兵令還既擐甲執兵即命環驕卒殺之徐卒三千餘人是日盡誅繇是兇徒悉殄後唐陶玘者同光末從元行欽軍於魏愽充行營寨主及人情有歸玘以所部兵從眀宗至臨黃署許州留後兼行營馬歩使至白臯渡安重誨之從人争舟玘斬之以徇軍士畏之房知温為兖州節度使上言指揮使郭令威擅離本軍處斬訖張延朗為陜州節度使上言右都押衙楊洪賔不伏指揮已處斬訖安重霸為同州節度使長興末上言斬都頭張璠使酒訛言故晉張廷藴初仕後唐為魏博三城廵檢使時劉皇后在鄴毎縱其下擾人廷藴立斬之聞者壯焉史𢎞肇為侍衛歩軍都指揮使自晉赴雒將抵河内左右軍校持楯争道候者馳告及頓軍召而詰之乃獲其首為亂者既伏罪親以鐵撾擊而斃之梟首示衆見者為之惕息凡騎士自河渉雒有犯田繫馬於樹者咸戮之繇是軍衆肅然無敢犯其令周向訓顯徳中為淮南節度使先是王師乆駐維楊都將趙鼂白延遇等驕恣橫暴不相禀命競以子女玉帛至有刼人之父夫彊取人之妻子者繇是人情大懼及訓到鎮戮其不奉法者數人方稍整肅冊府元龜卷四百一
