body:
  text: 册府元龜卷六十五宋王欽若等撰帝王部發號令第四唐穆宗以元和十五年正月即位閏正月癸亥詔曰御樓勅下逺近已知如聞奸人覬望恩赦城外道路刼奪稍多從御樓勅下至来月五日已前京畿應有姦非盜賊等希恩故犯情不可原並依法處斷不在赦宥之限其犯罪人縱屬諸軍諸使亦委府縣依法科斷二月御丹鳯樓大赦詔天下諸州不得擅有閉糴禁錢務令通濟長慶元年五月辛丑赦書其中使及郎官御史奉使所在並不得與人事物其諸道或閉糴禁錢自為條約切宜禁斷七月丁酉詔御樓勅下逺近已知切慮奸人覬望恩赦從御樓勅下日至今月十八日已前京畿應有奸盜希恩故犯並宜准法處分使犯罪人縱屬諸軍諸使亦任府縣依法科㫁十八日大赦制停諸道年終勾并不許刺史上使并録事參軍不得擅離本所委御史臺切加糾舉二年三月詔近者師旅屯集饋餉頗多不免於諸道留州使錢内毎貫抽二百文以充軍用幽鎮既以洗雪供費亦漸有常其河北諸州道及河東兖鄆淄青汴宋陳許徐泗澤潞河陽鄭滑等道并邊上諸鎮並不用抽縁邊鎮戍烽子並委所管量與優賞應縁山東行營兵馬未歸本道以来進退事機並宜専委節度使除事闗迫切須遣専人外其餘書詔文牒一切分付度支入遞發遣制使中使到中道行營不得輒受人事錢帛及行非理鞭扑當加察訪義不矜容其河南北鹽法亦委鹽鐵使與本道審計㑹務以便人為法八月誅李㝏汴州平下詔以官軍陣亡將士幷㝏為亂以来有潛謀効順誠節可嘉并因此遇害者並委本軍審勘其姓名事跡申奏當與甄奬及加褒贈仍令本軍優賞其家三年不停衣糧并委所在州縣為收𦵏量事致祭及將士有因戰陣傷損尤甚以至殘廢者各委本軍厚加優恤仍勿停解其經戰陣處所有賊中遺骸并委所在州縣隨事收埋勿令暴露三年正月詔曰寒食省墓著在令文其塋域在京畿者自今任寒食假内往来不限日數若在外州任准式年限請假四年三月赦書應天下所貢竒綾異錦彫文刻鏤一事已上有涉踰制者悉皆禁㫁至於喪𦵏嫁娶車馬衣服事闗制度不合踰越委中書門下明立科條頒示天下有不守者御史臺及出使郎官御史嚴加訪察節級科處所在淫祀不合禮經者並委長吏禁㫁敬宗寶歴二年十一月詔朝官及方鎮人家不得置私白身文宗太和元年五月詔曰衣服車乗器用宫室侈儉之制近日頗差宜付所司並准儀制令依品秩勲勞仍約今時所宜撰等級送中書門下參酌奏聞踰侈之成俗法令之不行其来久矣雖有是命訖無一人行之者六月詔百司庶務有不便於人者各委長吏悉心陳列無使壅於上聞十一月京兆尹奏伏縁畿甸頻有賊徒應官健子弟若要習射並請令本司各制射垜敎試不得將弓箭出城假託習射從之三年八月詔曰凡制命頒行事有不可給事中職合封進省察既畢宣布百司稽停晷刻皆著律令自尚書省御史臺所有制勅及官屬累授不當宜封章上論其事狀分明亦任舉按湏指事據實不放上如郎官御史臺出使訪聞按舉自准前後赦文不在此限十一月癸未朔勅應中書門下尚書省二十四司制勅及勅甲等近日撿報多稱斷裂無慿勘覆以此之故踰濫大行應從前制勅甲等所有斷裂者宜各委本司並重粘背其中書門下仍取本押舍人給事中及甲庫官本司令史尚書省委本司郎中甲庫官本行令史同署名印所斷裂縫扶尾後云某甲勘卷若干縫斷裂亦同印署新舊背縫並具年月卷第印署如庫官令史考滿日湏據實交㸃已後撿報稱有斷裂甲庫官及本行令史節級處分四年十二月詔曰如聞近日京城頻有寇賊府縣所繇至少防制實難湏假軍司共為捕察宜令左右神䇿各差人與府縣計㑹如有盗賊同力追擒仍具所差人數姓名并所配防界牒報京兆府應捕獲賊並先送府縣推問如有諸軍諸使勘驗知情狀如實是殺人及强盗罪跡分明不計贓之多少聞奏訖牒報本司便付京兆府决殺其餘即各牒送本司令准百姓例之罪科决待府司添補所繇人力稍足即别條流其外縣有軍鎮處亦准此處分議者非之五年正月己未詔曰方面大臣皆吾股肱心膂思與相見無時蹔忘想其戀闕之心願奉修覲之禮其于忠懇悉亦可知但縁兵革初停務先安輯或地隣戎寇湏有防慮或鎮重軍雄切於綏撫臨機處分要合便宜自今已後諸道節度團練防禦經畧等使有朝覲者但先獻表章後得詔㫖允許即任進發務使行止之際臨時不失事機故此宣示想各知悉四月勅鹽鐵判官尚書刑部郎中諸司諸使更不得奏請充職七年三月辛巳御史臺奏切王𫝊王堪男禎國忌日於私第科决作人臋杖六十詔曰准令國忌禁飲酒舉樂科罰人吏都無明文但以不合釐務故不得决斷刑獄起今縱有此類臺府不得舉奏其王禎宜釋放閏七月己未詔曰前後制勅應諸道違法徴科及刑政寃濫皆委出使郎官御史訪察聞奏雖有此文未嘗舉職向外生人勞弊朝廷莫得盡知自今已後應出使郎官御史所歴州縣其長吏政績閭閻疾苦及水旱災傷並一一條録聞奏郎官宜委左右丞勾當法官委大理卿勾當限朝見後五日内聞奏並申中書門下如訪知所奏事不實必加懲責其奏舉稱職者則議優奬八月詔曰卿大夫者下人之所視逺方之所倣若非恭儉克巳亷貞化人而望其服從固不可得况朕不寳珠玉不御纎華逮于六宫皆務儉薄卿大夫得不叶朕此志率先兆人比年所頒制度皆約國家令式去其甚者稍謂得中而士大夫苟自便身安于習俗因循未革以至于今百官士族起今年十月服冬裘已後其衣服輿馬並宜准太和六年六月十七日勅處分如故違制度九品以上量加黜責其布衣五年不得舉選百姓軍人各委州府長吏漸施敎化使自遵行不要便為禁制令其驚擾又易譏豐屋𫝊美卑宫彫刻礱磨先賢所誡近者官纔升于郎署位始至於郡符莫不髙其閈閎廣以池榭非惟僭侈踰制實亦耗蠧傷財其百官第宅已造成者并許仍舊今日後如更有創立新宅及屋室髙大者并委御史臺彈紏必嚴加黜責九年七月勅右銀臺門自今不得與諸縣主簿進文狀九月癸卯朔詔曰朕承天之序燭理未明勞虛襟以求賢勵寛徳以容衆頃者或台輔乖弼亮之道而具寮扇朋附之風翕然相從實斁彞憲致使薫蕕共器賢不肖並馳退跡者成後時之失登門者有迎吠之容繆盭之氣堙鬱和平而望隂陽順時疵癘不作朝廷清肅班列和安自古及今未嘗有也今既再申朝典一變澆風掃清朋比之徒整飭貞亷之俗凡百卿士惟新令猷如聞當行之中尚蓄疑懼或有妄相指目令不自安今斯曠然明諭朕意應與宗敏徳裕或親或故及門生舊吏等除今日已前黜逺之外一切不問各安職業勿復為嫌布告中外令其知悉時李訓鄭注竊弄威權不附己者隂以事中之人人恐慄皆不自保姦臣懼其反為所揺故有此詔十二月庚寅勅先是元和十年六月十三日勅以内庫弓箭陌刀賜左右街使俟宰相入朝以為翼衞及建福門而退至是因訓注之亂悉罷之其所賜兩街軍器盡歸於弓箭庫開成元年正月勑天下戍鎮文武帶憲官者觧補進退並湏奏聞又禁坊市百姓衣緋皂衣以雜軍人者十月禁天藏等府採獵侵暴百姓者三年正月癸未詔曰輦轂之下法在肅清奸盗竊發理難容捨親仁坊今月五日賊依前委京兆府左右街使鳯翔邠涇金商同華等州切加捕逐如獲頭首准法科斷其餘支黨一切不問於戲唯此凶災是彰非徳情敢忘於罪巳恵所貴於及人施令布和期於蘓息凡厥臣庶宜體朕懐主者施行五月詔曰朕以菲徳祗膺大寳深求理本將致時雍以慈恵恭儉為休徴以人和年豐為上瑞夙夜思省無以過之至於嘉穎連理之祥飛禽走獸之異出於邦家来獻闕庭虛美推功非予所尚嵗宴奏陳于清廟元正列上于大朝探討古今亦無明據恭惟靈聖豈俟薦聞事匪經通理當釐正庶使溥天之下知予務實之心其諸應有三等祥瑞並不得更有聞奏亦不要申牒所司其臘饗太廟薦獻太清宫并元日受朝奏祥瑞儀注宜停初帝謂宰臣曰嵗豐人安豈非上瑞何必以連理嘉禾為祥宰臣因言春秋二百四十年不書祥瑞帝深然之遂有此詔武宗以開成五年即位四月勅匭函所設貴逹下情近者所投文書煩碎或論列祖曽功業或進獻自己文章無補國經有紊時政極言不諱豈假匿名從今後如知朝廷得失軍國利害實負寃屈有司不為申明者任投匭進狀所繇畫時引進不得壅滯餘不在投限宜委匭使准此㑹昌元年六月勅自今已後應有朝官及上封事人進章表論人罪惡並湏證驗明白狀中仍言請付御史臺按問不得更云請留中不出如軍國要機事闗宻切者不在此例推勘後如得事實必奬奉公苟渉加誣當令反坐如此即人知畏法事免搆虛告示中外令知朕意宣宗以㑹昌六年即位十一月議有事于南郊勅曰聖人嚴配圜丘將以孝理天下而歴代因之務行大赦寃滯者可從昭洗險慝者宜示澄清所有大禮前據有罪已結者亦在速令詳議無至恵姦大中二年九月詔曰比来多有無良之徒妄于街衢投置無名文狀及箭上并旗幡上肆為奸言欲以惑聴自今已後如有此色宜准寶應二年正月十八日勅令所在地界于當處焚毁埋藏不要聞奏三年四月勅兩軍及諸軍廵捉得刼賊京兆府先牓懸賞近日捉獲得賊都不給付既違公勸何以勵人宜令京兆府所有軍廵捉獲刼賊便湏支給賞錢五年八月詔曰如聞近日多有閒人不務家業常懐兇惡肆意行非専於坊市之間恐脅取人財物又其中亦有曽為趨吏依倚門欄自恐愆尤遂致停觧不思巳過却務怨讐妄搆虛辭恣行恐嚇要懲此弊以静奸源自今已後宜委京兆府切加訪察如有此色便捉獲痛加刑斷懿宗咸通四年正月詔曰建中元年已有明勅常叅官上後舉一人自代編諸令式實廣聞見既開推讓之途將致雍熈之化聞其近者多廢舊規從今後百官凡有除移切遵典故無取掩賢之誚當明舉直之心我得其人國無不理昭宗乾寜二年十月詔邠州行營都統曰邠州節度副使崔鋋破城之時勿令漏網鋋與崔昭緯去年朋黨交結王行瑜搆合禍胎原繇此賊付四面行營知委哀帝天祐三年六月壬辰詔曰朝廷命官量能授職中書奏擬旋已施行掄材既備于班員立政兼伸於沉滯况遷都之後制度聿興新授官者翔於外藩不議赴闕前資任者蟄於列屏自謂安時矧爾代受國恩身榮朝請養髙保性既不能觧印掛冠論級嗜名又不能擘肌分理况新羅渤海外國逺戎奔程以至新都入貢不虧于舊典復于朝士有愧夷人既除官者尚不歸班則前任者良難戀主宜令諸道節度觀察防禦刺史等如部内有新除朝官前資朝官勅到後三日内發遣赴闕仍差人監送所在州縣不得停住苟或稽違必議貶黜付所司後唐莊宗初為晉王天祐五年四月下令曰兵亂以来生靈凋耗豈止賦租煩重加之寇盗侵漁又聞市井之中多有兇豪之軰晝則聚徒蒱博夜則結黨穿窬若不示以嚴科何以懲其巨蠧仰法司顯行條令峻設隄防八年正月敗梁軍於栢鄉史建塘周徳威前軍狥地邢洺魏博衞滑諸郡縣曰王室搆屯七廟被凌夷之酷昊天不弔萬民罹塗炭之災必有英主奮庸忠臣仗順斬長鯨而清四海廓妖祲以泰三靈予位忝維城任當分閫念兹顛覆詎可晏安故仗桓文節制之規問羿浞兇狂之罪逆温碭山傭𨽻巢孽餘兇當僖宗奔播之初我太祖掃平之際束身泥首請命牙門包蔵姦詐之心惟示婦人之態我太祖俯憐窮鳥曲為開懐特發表章請師梁汴纔出萑蒲之澤便居茅社之尊殊不感恩遽行猜忍我國家祚隆周漢迹盛伊唐二十聖之鎡基三百年之文物外則五侯九伯内則百辟千官或代襲簮纓或門𫝊忠孝皆遭陥害永抱沉寃且鎮定兩藩國家巨鎮兾安民而保族咸屈節以稱藩逆温唯仗隂謀専行不義欲全吞噬先據屬州趙王特發使車来求援助予情惟盪寇義切親仁躬率賦輿赴兹盟約賊將王景仁將兵十萬屯據栢鄉遂驅三鎮之師授以七擒之畧鸛鵝纔列梟獍大奔易如走坂之丸勢若燎原之火僵屍仆地流血成川組甲彫戈皆投草莽謀夫猛將盡作俘囚羣兇既快於天誅大憝湏懸於鬼録今則選蒐兵甲簡練車徒乗勝長驅剪除元惡凢爾魏博邢洺之衆感恩懐義之人乃祖乃孫為聖唐赤子豈狥梟狼之黨遂忘覆載之恩盖以封豕長蛇慿陵荐食無方逃難遂被脅從空嘗膽以銜寃竟無門而雪憤既聞告捷想所慰懐今義旅徂征止于招撫昔耿純焚廬而向順蕭何舉族以從軍皆審料興亡能圖富貴殊勲茂業翼子貽孫轉禍見機决在今日如能詣轅門而効順開城堡以迎降長吏則斷補官資百姓則優加賞賜所經詿誤更不推窮三鎮諸軍己申嚴令不得焚燒廬舍剽掠馬牛但仰所在生靈各安耕織予恭行天伐罪止元兇已外居民一切不問凢爾士衆咸諒予懐十二年六月平魏博令軍中曰我國家列爵疏封皆循舊制建藩維而命宗子錫茅社以報功臣惟兹魏邦纉乃舊服自逆温肇亂天下分離謀害忠良窺覦藩翰遂使公侯之國鞠為蛇虺之場朱友貞蕞陋餘妖人神共棄不量其力謂秦無人尚為貽厥之謀巧設兼并之計改張節制分割山河連甍皆弊於誅求編户不安於閭井且人為邦本君乃民天既興虐我之謀湏起徯予之嘆遂至桓桓列校擾擾齊甿奮白梃以捐生潔壺漿而望主予叨居閫政誓復聖唐永念生靈常生軫惻覩兹殘弊尤切疚懐昨百姓三軍請予兼領姦兇在近鎮撫尤難頼爾衆多共宣忠力切以軍府變更之後人情易動難安將務輯寜湏嚴法令凡訛言謗議殘物害人結黨連朋抵刑犯禁如當紏告法固難容凡爾蒸人勉其自勵布告中外咸使聞知令下於是中外肅然浹辰之間郡里完集人無異議市無忿争一錢强怙必處極法繇是奸豪屏息靡然向風時有帳下將李存進質性勤恪當官無避為軍城使法令必行人皆畏憚帝亦推心示物無所阿私鄴人繇是大伏所以克成霸業帝即位初制曰儻兵銷患息何湏有丹鳯白麟若嵗稔人和何必有紫芝赤鴈今後諸道應有祥瑞並不要奏聞同光元年閏四月癸未詔曰自古聖帝明王創業垂統九州共貫五運相承未有不始於憂勤終於逸樂故苖人不作不能成舜伐之功葛伯不生無以立湯征之事理亂有常數文質為大綱秦不道而漢室興隋無徳而皇朝王連二十葉垂三百年自釁起河南災纒海内朕自提戎律切為國讐毎親統師徒欲早寜乎寰宇近者諸方侯伯疊貢牋章勸即位以皆堅讓體元而不獲爰新鳯厯尋掲鷄竿顯造丕圖倍慙凉徳盖自文班武列抱義懐忠共傾忻戴之心遂應紹開之運以正君臣之位以安宗社之基未偃武以脩文倍宵衣而旰食不以萬乗自尊為樂以八紘未静為憂更賴上下一心内外同力誡嚴朕軍旋撫恤朕黎甿務禆賛以為常期清平而可待注屬繄倚不捨斯湏十一月壬子勅朕猥以寡徳謬荷丕基順天行誅因衆除亂雪宗祧之大恥快億兆之歡心車書將致於混同寰海漸從於開泰所宜樂䖍清廟禮答圜丘已定良辰率遵舊典朕取今月二十四日幸雒京十二月二十三日朝獻太㣲宫二十四日朝獻太廟二十五日有事於南郊經過州縣随事供備不得妄有侵擾百姓應諸處節度防禦刺史等不得逺赴京都擅離治所務從簡儉以稱朕心十二月己卯勅聞諸軍無良之輩多盜牛宰殺公然貨賣累行止約尚未斷除宜令總管司及毛璋李存義河南府兩街廵使嚴加捉搦二年二月南郊制曰被服錦繡貴賤有倫裁制衣装短長有制苟無彝則必害女工近年以来婦女服飾異常寛博倍費縑綾有力之家不計卑賤悉衣錦繡念蠶織之匪易顧法制之不行湏示條流兾漸遵守委所司散下文牓曉示御史臺及諸觀察使紏舉違勅又喪葬之典令式具言使貧者足以備其儀富者不得踰其制自此淳風漸散薄俗相承不守等威競為僭侈生則不能盡其養殁則廣費飾其終自今後仰所司舉明條制勿令踰越若故違犯嚴加責罰三月勅朕自雀臺創業兎苑平兇救生聚之倒懸俾衆區之反正凡云機宻深繫憂勤毎事多委宻司權令决遣貴無停滯要速施行今則四海一家萬邦同徳中土之宸居顯定圜丘之祀禮方終既整皇綱合依舊制使百官各舉其職庶事不失其宜貴合通規以成永例此後應有公事何色件合歸樞宻院何色件合付京百司至於軍幕之中並在精詳分擘内外免侵其職分髙低貴叶其規程其或百姓軍人事闗争訟先經州縣都將湏依次第披論或致淹停可詣臺省至若懐寃抑要逹禁庭即許投狀匭函别議申雪此情或非的確理渉僭踰推詰有聞必行朝典兼有衣冠士族參選官寮或獻所業文章或述從前行止因依駕幸抵冒乗輿希望恩榮随張物體更有軍人百姓亦敢將狀衝突湏各示條章絶其容易宜令御史各下諸司河南府及諸道分明曉示訖奏其本朝百官有司所行公事仍令御史臺各取狀申中書門下四月勅朕祗應大寳䖍奉鴻名勉承夷夏之心以副天人之望雖徳音尋降赦宥近行猶恐恩有所未孚徳有所未洽則自朱温刼遷昭宗至雒京已来内外臣寮有無名妄遭刑戮者更宜廣令捜訪各與次第贈官如有子孫並委敘録五月中書奏凡有進狀乞官及諸州府初奏請判官薦舉前資自詣中書求官等竊聞所稱頭銜多有踰越中書既無舊案除授何以為慿起今後凡有諸色前資若命官者除近曽任朝官及有科第外清資官為衆所知並湏追到前任告勅中書㸃檢後方可進擬貴絶虛授以杜僥求從之九月先有勅闗防道路捉搦詐偽之人如聞諸道有詐稱天使者嚴加辨認又勅如聞藩方入奏使臣多有於京内私買衣甲宜令總管司指揮諸軍宻加覺察明宗天成元年八月丁未樞宻院條流已前州使錢榖並係省司昨徧降徳音特指揮除省元本利潤物色並與撥充公使兼月支俸料足以豐盈訪聞州府節度使刺史内尚有不守詔條公行科歛湏議止絶且如條件州使所納軍糧據元納石斗不得更要加耗節度刺史所置牙隊許於軍都内抽取便給省司衣糧况己人數極多如聞更有招置轉生騷擾速議勘窮諸色人多因抵罪藏竄便於州府投為使下元随邀求職務凌壓平人兼聞有力户人於諸處行賂希求事務主持此後許人陳告州使妄稱脩繕城池廨宇科賦于人及興私宅自此州使凡有興脩湏先奏取進止諸縣鎮禀州文符如事理歸公即宜遵禀如渉科配人户不得私狥文符此後如有訪得餘聞先罪本處官吏州府既有利潤兼請俸錢凢事合遵條憲不得賒買行人物色兼行科率刑獄繫囚如闗贓賂則可追引文證如有小小争鬭登時量事决遣不得輙有禁繫已前條件州使如敢違犯許人陳告勘詰不虛即量行奬賞者又勅曰昨帝室纒灾生民受弊方兹纉紹務切撫寜尋降徳音復宣明勅貴先求瘼務在推恩其或長吏因循公方撓雜何繇致理徒有怨咨是宜再諭賞刑納言利病事或違於條制法必振于紀綱宜令三京諸州府並准此處分十一月丁巳雒陽縣令駱明舉奏請止絶坊市息利典質其軍家子弟都外興販侵擾縁路旅舍勅㫖從之又詔曰今年四月一日已前私債所降徳音節文仰三京諸道分明宣布于要害道路牓壁不得漏落今則尚違犯其後来相次條理諸色事件皆闗念及生聚布以優恩多因州使倖門淹留勅命或公然隐匿全不施行官吏但習舊風百姓㒺知新命宜令遍加告諭二年正月勅曰設官分職有國宏圖授才任能前王重事凢繫惟行之命湏遵不易之規朕以猥紹丕基務𢎞至理臨萬國則毎勤聴政任庶官則切在得人貴内外之叶和俾華夷之帖泰頃自本朝多難雅道中㣲皆尚浮華罕持亷譲其有除官蘭省命秩栢臺或以人事相踈或以私讎見訝稍乖敬奉遽致棄捐盖司長之振威處君恩於何地緬思積弊深所疚懐方當大定之期特示維新之制今後應新授官員朝謝後可准列随處上事司長不得輙以私事阻滯其所授官仍不得因遭抑挫託故請假庶使孤弱遂昇遷之路朝廷無滯壅之端凡爾羣官體予深㫖三月勅訪聞京城坊市軍營有故犯條流殺牛賣肉者仰府縣軍廵嚴加紏察如得所犯人准條科斷如自死牛即令貨賣其肉斤不得過五文鄉村死牛但報本村節級然後准例納皮曉示天下州府准此處分八月勅㫖刑故無小義絶恵姦罪疑惟輕事全誅意聖賢明訓今古通規非法無以振其威非恩無以流其澤故有功不奬何以激盡忠有罪不刑何以戒為惡二者無失庶務有成朕統華夷不求奢侈臨食慮兵師之餒授衣思黎庶之寒仗中外勲賢壯國家基址熒惑應犯而自退太陽蹔蝕而復圓百果無不熟之方五榖無不豐之處顧唯寡徳何稱嘉祥况保義軍節度使石敬塘晉州留後安崇阮洺州刺史張進耀州團練使孫岳寜州刺史髙允瓌等杜絶誅求尋加奬諭陶玘輒為聚歛自掇愆尤功過既分黜陟有異在朝備見列國皆知不貪者轉更無私有過者必應自省四方侯伯皆朕忠臣萬國人民皆朕愛子慘舒是繫賞罰齊行務徳者雅合古賢效尤者自干朝典除鄧州見取責情罪諸色官員及豪州李鄴外其諸道州府如八月已前或有偶違條制干於國章者諸色人並不得更有託訴若或此後有違許人上告當勘情罪必舉刑書九月勅諸司官寮職員軍將出使嚴加指揮不得帶挾逃走軍人如失于覺察官員等必行朝典十月詔人户因有納稅入州便值更變或散失車牛其車許本主識認勤王之節雖自於勲賢入貢之勞抑繇於使介其有諸道進奉使或已入汴州陥失土貢宜與收破無勞重有貢輸𫝊人經刼奪者宜與優給不軌之徒已加顯戮無辜之士當慰幽寃馬彦超宋敬殷等宜與追贈随人有子及弟姪者並量材奬録諸州縣或有曽受逆人文字者仰随處焚毁一切不問輦輅之下姦逆遽興既不忍於戈鋋固莫分於玉石昨王師攻下汴州之時剪除兇逆之際恐其士庶偶陥鋒鋩言念傷殂良多嗟憫宜令石敬塘遍加存問兼勘在城殺傷人口奏聞量加給䘏衞主亡軀摧㐫效命偶狥脅從之勢終懐忠藎之誠首議向明理宜行賞昨車駕初到城下之時有將士率先開門及下城朝見宜令石敬塘奏聞當與甄酬三年四月勅設官分職比委仗于公才詢事考言務恢𢎞於理道朕自祗膺大寳俯育羣生四門無塞其聰明百辟咸専于諌諍凡閱事務各有職司儻踰越于規繩必申明于典憲其有兇頑之軰遊惰之夫藝不度於荒唐心毎懐于僥倖或妄陳條䇿覽尋而多是訛言或但務訟論按騐而却招情罪不遵格令輙冒乗輿若無止絶之文何戒因循之弊今後凡有詞狀并湏各于所司部據理陳論如未盡情或有阿曲即許經御史臺臺司不理則詣匭投狀然若有進獻䇿條則湏審明利害有益公私然後投匭朕當選擇施行不得容易接駕如敢故違當行嚴典七月齊州防禦使曹廷隐曹州刺史成景𢎞弓髙縣令王廷果金鄉縣令夏侯景坐贓伏法之後恐論告不止勅八月一日已前罪犯一切不問十一月閤門使馮知兆奏内外臣寮多有僭呼官號下令禁之四年五月勅以諸州典史與縣官同謀聚斂發覺之後便各逃竄宜令嚴加捕捉如不獲罪在長吏及同居親切骨肉又勅大壯之規標於易象不莊之戒著在禮經况乎地列山河貴為侯伯至于邑宰皆肅公庭湏整臣之威儀以重民之父母頃當世亂固無暇于脩新今既時安誰不思於補故况一日畢葺三年有成凡居禄位之流聞此聖賢之語今後諸州諸吏凡於廨宇並湏専切増脩不得信令摧毁凡所置辦亦令勒其年月編于帳籍受代之際各明交領亦不得託於廨署接便擾人六月勅諸道節度行軍司馬名位雖髙或帥臣不在其軍州事委節度副使權知又勅州牧侯伯所請賔從及主事元随並令奏其姓名或參佐道虧並當加罪是月左散騎常侍蕭希甫以四方刑獄動皆上聞不獨有紊於公朝兼且淹延其獄訟伏乞條流縣令凡死罪以下得専之刺史部内有一吏一民犯罪得専之觀察使部内有犯罪五人已下得専之如此則朝廷事簡見萬乗之尊矣奉勅刺史既為屬郡不可自専案牘既成湏申亷使餘依所奏七月勅諸道州府不得奏薦將校職員乞行恩命如顯有功勞即據功効列奏又勅諸司寺監凢有文簿施行奏覆司長湏與逐司官員同籖署申發不得司長獨有指揮其主印官或請假差使印湏依輪次主掌不得踰越冊府元龜卷六十五
