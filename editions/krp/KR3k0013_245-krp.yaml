body:
  text: 册府元龜卷二百四十五宋王欽若等撰列國君部朝聘姻好朝聘傳曰諸侯三嵗而聘五嵗而朝又曰嵗聘以志業間朝以講禮繇是評貢賦之職講班爵之義宴享以示惠采章而慎儀葢小所以事大大所以字小乃周室之舊制列國之遺範也原夫竝建之始胙土相繼著之典法納於軌物其後力政專命強弱異勢以至獻物薦賄旅百而有加共職歸事駿奔而不暇當夫鄰國之繼好霸令之不煩固宜講信修睦謀事補闕其流風話言可觀也已魯隱公元年十二月祭伯來祭伯諸侯為王卿士者祭國伯爵傳曰非王命也七年夏齊侯使夷仲年來聘十一年春滕侯薛侯來朝爭長薛魯國薛縣薛侯曰我先封薛祖奚仲夏所封在周之前滕侯曰我周之卜正也卜正卜官之長薛庶姓也我不可以後之庶姓非周之同姓公使羽父請於薛侯曰君與滕君辱在寡人周諺有之曰山有木工則度之賓有禮主則擇之擇所冝而行之周之宗盟異姓為後盟載書皆先同姓例在定四年寡君若朝于薛不敢與諸任齒薛任姓齒列也君若辱貺寡人則願以滕君為請薛侯許之乃長滕侯桓公二年春正月滕子來朝隱十一年稱侯今稱子者葢時王所黜七月杞侯來朝公即位而來朝三年冬齊侯使其弟年來聘五年夏齊侯鄭伯如紀外相朝皆言如六年冬紀侯來朝請王命以求成於齊公告不能紀微弱不能通於天子欲因公以請王命公無寵於王故告不能九年秋七月曹伯使其子射姑來朝曹伯有疾故使其子來朝賓之以上卿禮也十有五年夏邾人牟人葛人來朝三人皆附庸之世子也其君應稱名故其子降稱人荘公五年秋郳犂來來朝附庸國也東海昌慮縣東北有郳城犁來名二十三年夏荆人來聘不書荆子使某來聘君臣同辭者葢楚之始通未成其禮二十五年春陳侯使女叔來聘女叔陳卿女氏叔字始結陳好也二十七年冬杞伯來朝杞稱伯者時王所黜閔公元年冬齊仲孫湫來省難僖公七年夏小邾子來朝郳犂來始得王命而來朝也邾之别封故曰小邾秋七月公子友如齊公會齊侯盟于寗母罷盟而聘謝不敏也十年春正月公如齊十有三年冬公子友如齊十有四年六月季姬及鄫子遇于防使鄫子來朝季姬魯女鄫夫人也鄫子本無朝志為季姬所召而來故言使鄫子來朝鄫國今琅邪鄫縣十有五年正月公如齊諸侯五年再相朝禮也二十年夏郜子來朝二十二年三月鄭伯如楚二十四年宋及楚平宋成公如楚二十七年春杞子來朝杞桓公也用夷禮故曰子杞先代之後而迫於東夷風俗雜壞言語衣服有時而夷今稱朝者始用周禮終而不全故貶其爵公卑杞杞不共也二十八年秋公子遂如齊聘也二十九年春介葛盧來朝舍于昌衍之上魯縣東南有昌平城公在會饋之芻米禮也嫌公行不當致饋故曰禮也冬介葛盧來以未見公故復來朝禮之加燕好三十年冬東門襄仲公子遂也将聘于周遂初聘于晉公既命襄仲聘周未行故曰将又命自周聘晉故曰遂魯始聘晉故曰初三十一年春取濟西田分曹地也晉文討曹分其地以賜諸侯公子遂如晉拜曹田也三十二年春楚鬭章請平于晉晉陽處父報之晉楚始通陽處父晉大夫晉楚自春秋以來始交使命為和同三十三年齊國荘子來聘自郊勞至于贈賄禮成而加之以敏迎來曰郊勞送去曰贈賄敏審當于事臧文仲言於公曰國子為政齊猶有禮君其朝焉臣聞之服於有禮社稷之衛也冬公如齊朝且弔有狄師也狄侵齊也文公元年冬十月穆伯如齊始聘焉禮也穆伯公孫敖凡君即位卿出竝聘踐修舊好要結外援踐猶履行也好事鄰國以衛社稷忠信卑讓之道也忠徳之正也信徳之固也卑徳之基也三年春衛侯如陳拜晉成也二年陳侯如衛請成于晉冬公如晉四年春晉人歸孔逹于衛以為衛之良故免之三年衛執孔逹以說晉夏衛侯如晉拜謝歸孔逹曹伯如晉會正㑹授貢賦之政也傳言襄公能繼文之業而諸侯服從秋衛侯使寗俞來聘五年夏公孫敖如晉冬晉陽處父聘于衛六年春臧文仲以陳衛之睦也欲求好于陳夏季文子聘于陳秋季文子如晉九年冬楚子使椒來聘椒子越椒也椒不書姓史畧文十一年秋曹文公來朝即位而來見也襄仲聘于宋且言司城蕩意諸而復之八年意諸來奔因賀楚師之不害往年楚次厥貉将以伐宋十二年春杞桓公來朝始朝公也秋滕昭公來朝亦始朝公也秋秦伯使西乞術來聘且言将伐晉十四年冬公如晉朝禮也諸侯五年再相朝以修王命古之制也十七年冬襄仲如齊拜榖之盟六月公及齊侯盟于穀十八年秋襄仲荘叔如齊惠公立故且拜𦵏也襄仲賀惠公立荘叔謝齊來會𦵏宣公元年夏東門襄仲如齊拜成齊侯與公會于平州以定公位故襄仲如齊謝得會也四年秋公如齊五年春公如齊九年春公如齊十年春公如齊齊侯以我服故歸我濟西之田公比年朝齊故夏齊惠公卒公如齊奔䘮公親奔䘮非禮也公出朝會奔䘮會𦵏皆書如不言其事史之常也秋季文子初聘齊齊侯初即位冬子家如齊伐邾故也魯侵小恐為齊所討故往謝國武子來報聘十四年秋楚子圍宋孟獻子言於公曰臣聞小國之免於大國也聘而獻物物玉帛皮幣也於是有庭實旅百主人亦設籩豆百品實于庭以答賓朝而獻功獻其治國若征伐之功於牧伯於是有容貎采章嘉淑而有加貨容貎威儀容顔也采章車服文章也嘉淑令辭稱賛也加貨命宥幣帛也言往共則來報亦備謀其不免也誅而薦賄則無及也薦進也見責而往則不足解罪今楚在宋君其圖之公説明年春公孫歸父㑹楚子于宋成公三年夏公如晉拜汶陽之田前年晉使齊歸魯汶陽田故冬十一月晉侯使荀庚來聘衛侯使孫良夫來聘十二月齊侯朝於晉将授玉行朝禮郤克趨進曰此行也君為婦人之笑辱也寡君未之敢任言齊侯之來以謝婦人之笑非為修好故云晉公不任當此惠一云齊頃公朝晉欲尊上晉景公晉景公不敢受乃歸四年春宋公使華元來聘通嗣君也宋共公即位三月杞伯來朝夏公如晉晉侯見公不敬秋公至自晉欲求成於楚而叛晉季文子曰不可乃止五年春孟獻子仲孫蔑也如宋報華元也六年春鄭伯如晉拜成謝前年再盟夏邾子來朝魯公孫嬰齊如晉冬季文子如晉賀遷也四月晉去故綘遷于新田七年夏曹宣公來朝冬衛侯如晉晉反戚焉戚衛孫林父邑林父去奔晉戚隨屬晉八年春公孫嬰齊如莒宋公使華元來聘九年冬楚子使公子辰如晉請修好結成十年春晉使糴茷如楚報太宰子商之使也子商楚公子辰秋公如晉十一年春晉侯使郤犨來聘夏季文子如晉報聘秋叔孫僑如宣伯也聘于齊以修前好鞍以前之好十二年秋晉郤至如楚聘冬楚公子罷如晉聘報郤至十八年春晉悼公即位公如晉朝嗣君也夏公至自晉晉范宣子來聘且拜朝也拜謝公朝君子謂晉於是乎有禮有卑讓之禮秋杞桓公來朝勞公且問晉故公以晉君語之語其徳政杞伯於是驟朝于晉而請為婚八月邾宣公來朝即位而來見也襄公元年九月邾子來朝禮也邾宣公冬衛子叔晉知武子來聘禮也凡諸侯即位小國朝之大國聘焉以繼好結信謀事補闕禮之大者也二年七月穆叔聘於宋通嗣君也三年春公如晉始朝也公即位而朝孟獻子相公稽首相儀也稽首首至地也知武子曰天子在而君辱稽首寡君懼矣稽首事天子之禮孟獻子曰以敝邑介在東表密邇仇讐仇讐謂齊楚與晉爭寡君将君是望敢不稽首傳言獻子能固事盟主四年三月穆叔如晉報知武子之聘也武子聘在元年冬公如晉聼政受貢賦多少之政晉侯享公公請屬鄫鄫小國也欲得使屬魯如須句顓臾之比使助魯出貢賦公時年七嵗葢相者為之言鄫今琅邪鄫縣晉侯不許孟獻子曰以寡君之密邇於仇讐而願固事君無失官命晉侯徴發之命鄫無賦於司馬晉司馬又掌諸侯之賦為執事朝夕之命敝邑敝邑𥚹小闕而為罪闕不共也寡君是以願借助焉借鄫以自助晉侯許之五年夏穆叔覿鄫太子于晉以成属鄫覿見也前年請屬鄫故鄫太子巫如晉以成之書曰叔孫豹鄫太子巫如晉言比諸魯大夫也豹與巫俱受命於魯經不書及比之魯大夫五年夏鄭子國來聘通嗣君也鄭僖公初即位六年秋滕成公來朝始朝公也冬穆叔如邾聘且修平平四年狐駘戰七年春郯子來朝始朝公也夏小邾穆公來朝亦始朝公也亦郯子也秋季武子如衛報子叔之聘且辭緩報非貳也子叔聘在元年言國家多難故不時報冬衛孫文子來聘且拜武子之言緩報非貳之言八年春公如晉朝且聼朝聘之數晉悼復修伯業故朝而禀其多少冬晉范宣子來聘且拜公之辱謝公春朝告将用師于鄭九年夏季武子如晉報宣子之聘也宣子聘在八年十二年夏晉士魴來聘且拜師謝前年伐鄭師冬公如晉朝且拜士魴之辱禮也士魴聘在此年夏嫌君臣不敵故禮之十三年春公至自晉孟獻子書勞于廟禮也十五年春宋公使向戌來聘十六年冬穆叔如晉聘且言齊故言齊伐魯十八年春白狄始來白狄狄之别名未嘗與魯接故曰始十九年二月季武子如晉拜師謝討齊二十年秋齊子叔老也初聘于齊禮也齊魯有怨朝聘禮絶今始復通故曰初繼好息民故曰禮冬季武子如宋報向戌之聘也聘在十五年二十一年春公如晉拜師及取邾田也謝十八年伐齊之師漷水之田冬曹伯來朝始見也即位三年始來見公二十有四年春叔孫豹如晉賀克欒氏二月鄭伯朝晉且請伐陳也鄭伯稽首宣子辭子西相曰陳國之介恃大國而陵虐於敝邑介因也大國楚也寡君是以請罪焉謂得罪于陳也敢不稽首為明年鄭入陳傳夏齊侯既伐晉而懼欲見楚子楚子使薳啓疆如齊聘且請期請㑹期冬鄭行人公孫揮如晉聘二十五年十月鄭子展相鄭伯如晉拜陳之功謝晉受其功六月公孫舍之帥師入陳子産獻陳捷于晉晉受之二十有六年夏晉侯使荀吳來聘荀吳偃子召公也召公㑹澶淵也六月衛侯如晉晉人執之鄭伯為衛侯故如晉晉侯許歸衛侯秋七月鄭伯歸自晉請衛侯歸使子西如晉聘辭曰寡君來煩執事懼不免於戾言自懼失敬於大國而得罪使夏謝不敏夏子西名君子曰善事大國将求於人必先下之言鄭所以能自安二十七年春齊侯使慶封來聘景公即位通嗣君也二十八年夏齊侯陳侯蔡侯北燕伯杞伯胡子沈子白狄朝于晉宋之盟故也二十七年晉楚同盟于宋曰晉楚之從交相見也故楚屬陳蔡胡沈朝晉齊侯将行慶封曰我不與盟何為如晉陳文子曰先事後賄禮也事大國當先從其政事而後薦賄以副己心小事大未獲事焉從之如志禮也言當從大國請事以順其志雖不與盟敢叛晉乎重丘之盟未可忘也子其勸行邾悼公來朝時事也來朝非宋盟宋盟唯施於朝晉楚秋孟孝伯仲孫羯也如晉告将為宋之盟故如楚也九月鄭游吉如晉告朝于楚以從宋之盟子産相鄭伯如楚舍不為壇至敵國郊除地封土為壇以受郊勞外僕言曰昔先大夫相先君適四國未嘗不為壇外僕掌次舍者自是至今亦皆循之今子草舍無乃不可乎子産曰大適小則為壇小適大茍舍而已焉用壇僑聞之大適小有五羙宥其罪戾赦其過失救其菑患賞其徳刑刑法也教其不及小國不困懷服如歸是故作壇以昭其功宣告後人無怠於徳怠懈也小適大有五惡説其罪戾自觧説也請其不足行其政事奉行大國之政供其職貢從其時命從朝會之命不然則重其幣帛以賀其福而弔其㐫皆小國之祸也焉用作壇以昭其禍所以告子孫無昭禍焉可也無昭禍以告子孫十二月魯襄公為宋之盟故公及宋公陳侯鄭伯許男如楚及漢楚康王卒公欲反叔仲昭伯曰我楚國之為豈為一人行也昭伯叔仲帶子服惠伯曰君子有逺慮小人從邇邇近也饑寒之不恤誰遑其後遑暇也不如姑歸也叔孫穆子曰叔仲子專之矣言足專任子服子始學者也言未識逺榮成伯曰逺圖者忠也成伯榮駕鵝公遂行從昭伯謀宋向戌曰我一人之為非為楚也饑寒之不恤誰能恤楚姑歸而息民待其立君而為之備宋公遂反二十九年五月晉范獻子來聘士鞅也拜城杞也謝魯為城杞吳子使公子季札來聘通嗣君也吳子餘祭嗣立故遂聘齊鄭適衛自衛適晉冬孟孝伯如晉報范叔也范叔士鞅也此年夏來聘三十年春王正月楚子使薳罷來聘通嗣君也郟敖即位三十一年十月鄭子産相鄭伯以如晉子皮使印叚如楚以適晉告禮也得事大國之禮十一月吳子使屈狐庸聘于晉通路也通吳晉之路十二月衛北宮文子相衛襄公以如楚文子北宮佗襄公獻公子宋之盟故也晉楚之從交相見也過鄭印段迋勞于棐林如聘禮而以勞辭文子入聘報印段子羽為行人馮簡子與子太叔逆客事畢而出言于衛侯曰鄭有禮其數世之福也其無大國之討乎昭公元年春楚公子圍聘于鄭伍舉為介冬楚公子圍将聘于鄭伍舉為介未出境聞王有疾而還伍舉遂聘十一月鄭游吉如楚𦵏郟敖且聘立君郟敖楚子麇二年春晉侯使韓起來聘公即位故且告為政而來見禮也遂如齊自齊聘于衛四月叔弓聘于晉報韓宣子也宣子韓起也秋晉少姜卒公如晉及河晉侯使士文伯來辭曰非伉儷也晉侯溺於所幸為少姜行夫人之服故諸侯弔不敢以私煩諸侯故止之請君無辱公還季孫宿遂致服焉致少姜之襚服十一月鄭印段如晉弔少姜三年正月鄭游吉如晉送少姜之𦵏梁丙與張趯見之二子皆大夫梁丙曰甚矣哉子之為此來也卿共妾𦵏過禮甚子太叔曰将得已乎言不得止昔文襄之霸也晉文公襄公其務不煩諸侯三嵗而聘五嵗而朝有事而會不恊而盟明王之制嵗聘間朝在十三年今簡之君薨大夫弔卿共𦵏事夫人士弔大夫送𦵏先王之制諸侯之䘮士弔大夫送𦵏在三十年葢時俗過制故文襄雖節之猶過於古足以昭禮命事謀闕而已朝㑹以昭禮盟會以謀闕無加命矣命有常今嬖寵之䘮不敢擇位而數於守適不敢以其位卑而令禮数如守適夫人然則時適夫人之䘮弔送之禮已過文襄之制唯懼獲戾豈敢憚煩少姜有寵而死齊必繼室繼室復薦女今兹吾又将來賀不唯此行也夏四月鄭伯如晉公孫段相甚敬而卑禮無違者秋七月鄭罕虎如晉賀夫人且告曰楚人日徴敝邑以不朝立王故楚靈王新立敝邑之往則畏執事其謂寡君而固有外心其不往則宋之盟云云交相見進退罪也寡君使虎布之布陳也宣子使叔向對曰君若辱有寡君在楚何害修宋盟也君茍思盟寡君乃知免於戾矣君若不有寡君雖朝夕辱於敝邑寡君猜焉猜疑也君實有心何辱命焉言若有事晉心至楚可不須告君其往也茍有寡君在楚猶在晉也小邾穆公來朝季武子欲卑之不欲以諸侯待之穆叔曰不可曹滕二邾實不忘我好敬以逆之猶懼其二又卑一睦焉一睦謂小邾逆群好也其如舊而加敬焉志曰能敬無灾又曰敬逆來者天所福也季孫從之五年春公如晉即位而往見自郊勞至于贈賄往有郊勞去有贈賄無失禮揖讓之禮晉侯謂女叔齊曰魯侯不亦善於禮乎六年夏季孫宿如晉拜莒田也六月楚公子棄疾如晉報韓子也報前年韓起送女九月徐儀楚儀楚徐大夫聘于楚冬叔弓如楚聘且弔敗也弔為吴所敗十一月齊侯如晉請伐北燕也告盟主士匄相士鞅逆諸河禮也士匄晉大夫相為介得敬逆來者之禮七年春三月公如楚楚子成章華之臺願與諸侯落之宮室始成祭之為落臺今在華容城内太宰薳啓疆曰臣能得魯侯薳啓疆來召公辭曰昔先君成公命我先大夫嬰齊曰吾不忘先君之好将使衡父炤臨楚國鎮撫其社稷以輯寧爾民嬰齊受命于蜀蜀盟在成二年衡父公衡奉承以來弗敢失隕而致諸宗祧言奉成公此語以告宗廟曰我先君共王引領北望日月以兾兾魯朝傳序相授於今四王矣四王共康郟敖靈王嘉惠未至唯襄公之辱臨我䘮襄公二十八年如楚臨康王䘮孤與其二三臣悼心失圖在哀䘮故社稷之不遑况能懐思君徳遑暇也言有大䘮多不暇今君若步玉趾辱見寡君趾足也寵靈楚國以信蜀之役致君之嘉惠是寡君既受貺矣何蜀之敢望言但欲使君來不敢望如蜀復有質子其先君鬼神實嘉頼之豈唯寡君君若不來使臣請問行期問魯見伐之期寡君将奉質幣而見于蜀以請先君之貺請問也公将往夢襄公祖祖祭道神梓慎曰君不果行襄公之適楚也夢周公祖而行今襄公實祖君其不行子服惠伯曰行先君未嘗適楚故周公祖以道之襄公適楚矣而祖以道君不行何之三月公如楚四月鄭子産聘于晉八年夏叔弓如晉賀虒祁也賀宮成游吉相鄭伯如晉亦賀虒祁也史趙見子太叔曰甚哉其相蒙也蒙欺也可弔也而又賀之子太叔曰若何弔之其非唯我賀将天下實賀言諸侯畏晉非獨鄭九年八月孟僖子如齊殷聘禮也自叔老聘齊至今二十年禮意乆曠今修盛聘以無忘舊好故曰禮十年秋七月晉平公卒鄭伯如晉及河晉人辭之游吉遂如晉禮諸侯不相弔故辭九月叔孫婼齊國弱宋華定衛北宮喜鄭罕虎許人曹人莒人邾人滕人薛人杞人小邾人如晉𦵏平公也經不書諸侯大夫者非盟會十一年春王正月叔弓如宋𦵏平公也十二年夏宋公使華定来聘通嗣君也宋元公新即位齊侯衛侯鄭伯如晉朝嗣君也晉昭公新立十三年楚平王使枝如子躬聘于鄭且致犨櫟之田冬公如晉荀吳謂韓宣子曰諸侯相朝講舊好也執其卿八月平丘之㑹公不與盟晉人執季孫意如而朝其君有不好焉不如辭之乃使士景伯辭公于河十五年冬公如晉平丘之會故也平丘會公不與盟季孫見執今既得免故往謝之十六年三月晉韓起聘于鄭冬季平子如晉𦵏昭公十七年春小邾穆公來朝秋郯子來朝十九年五月楚令尹子瑕聘于秦二十年齊侯使公孫青聘于衛二十有一年夏晉侯使士鞅來聘晉頃公即位通嗣君冬公如晉及河鼔叛晉叛晉属鮮虞晉将伐鮮虞故辭公将有軍事無暇于待賓且懼洩軍謀二十二年晉執叔孫婼公為叔孫故如晉及河有疾而復此年春晉為邾人執叔孫故公如晉謝之二十四年六月鄭伯如晉子太叔相二十五年春叔孫婼聘于宋二十七年吳子使延州來季子聘于上國季子本封延陵後復封州來故曰延州來遂聘于晉以觀諸侯觀强弱定公十年冬叔孫武叔名州仇聘于齊十五年春正月邾子來朝隱公也哀公二年四月滕子來朝二十一年五月越人始來越既勝吳欲霸中國始遣使適魯二十三年秋八月叔青如越始使越也越諸鞅來聘報叔青也二十四年閏月公如越二十七年越子使后庸來聘魏惠王十五年魯衛宋鄭來朝哀王十二年太子朝于秦趙武靈王元年梁襄王與太子嗣韓宣王與太子倉來朝信宮韓襄王十年太子嬰朝秦而還徐廣曰與秦會臨晉因至咸陽而還十二年齊魏王來朝秦成公元年梁伯芮伯來朝惠文君元年楚韓趙蜀人來朝後三年韓魏太子來朝昭襄王五年魏王來朝楚考烈王十二年春昭王卒楚王使春申君弔祠于秦姻好夫婚姻者合二姓之好上以為宗廟下以為繼後世者也則有受分器之重居秉圭之位修先君之好結大國之援因其嘉會申以同盟玉帛之用斯備榛栗之贄是修以奉其粢盛以章乎物采成冕迎之重崇廟見之儀所以篤其惠好為之與國至於不由禮以加伐止其君而強求貽後世之譏非好逑之義禮之失者其在兹乎魯惠公元妃孟子言元妃明始適夫人也子宋姓孟子卒繼室以聲子葢孟子之姪娣也諸侯始娶則同姓之國以姪娣媵元妃死則次妃攝治内事不得稱夫人故謂之繼室宋武公生仲子仲子生而有文在其手曰為魯夫人故仲子歸于我婦人謂嫁曰歸以手理自然成字有若天命故嫁之於魯十四年衛荘公娶于齊東宫得臣之妹曰荘姜得臣齊太子也太子不敢居上位故常處東宫羙而無子衛人所為賦碩人也碩人詩義取荘姜羙于色賢于徳而不見答終以無子國人憂之又娶于陳曰厲媯生孝伯早死陳今陳國陳縣隱公二年九月紀裂繻來逆女裂繻紀大夫卿為君逆也冬十月伯姬歸于紀伯姬魯女裂繻所逆者七年陳鄭平鄭公子忽在王所故陳侯請妻之以怱有王寵故也鄭伯許之乃成婚八年四月甲辰鄭公子忽如陳逆婦媯辛亥以媯氏歸甲寅入于鄭陳鍼子送女先配而後祖鍼子曰是不為夫婦誣其祖矣非禮也何以能育鍼子陳大夫禮逆婦必先告祖廟而後行鄭忽先逆婦而後告廟故曰先配而後祖桓公三年春公㑹齊侯于嬴成婚於齊也公不由媒介自與齊侯㑹而成婚非禮也秋公子翬如齊逆女修先君之好故曰公子婚禮雖奉時君之命其言必稱先君以為禮辭故公子翬逆女傳稱修先君之好公子遂逆女𫝊稱尊君命互舉其義齊侯送姜氏非禮也凡公女嫁於敵國姊妹則上卿送之以禮于先君公子則下卿送之於大國雖公子亦上卿送之於天子則諸卿皆行公不自送於小國則上大夫送之冬齊仲年來聘致夫人也古者女出嫁又使大夫隨加聘問存謙敬序殷勤也在魯而出則曰致女在他國而來則總曰聘故𫝊以致夫人釋之十年冬十有二月丙午齊侯衛侯鄭伯來戰于郎公之未昏於齊也齊侯欲以文姜妻鄭太子忽太子忽辭人問其故太子曰人各有耦齊大非吾耦也詩云自求多福詩大雅文王言求福繇已非繇人在我而已大國何為君子曰善自為謀言獨潔其身謀不及國及其敗戎師也齊侯又請妻之欲以他女妻之固辭人問其故太子曰無事於齊吾猶不敢今以君命奔齊之急而受室以歸是以師昏也民其謂我何言民見怪於我遂辭諸鄭伯假父之命以為辭荘公十年夏六月蔡哀侯娶于陳息侯亦娶焉息媯将歸過蔡蔡侯曰吾姨也妻之姊妹曰姨止而見之弗賔不禮敬也息侯聞之怒使謂楚文王曰伐我吾求救於蔡而伐之楚子從之十一年冬王姬歸于齊魯主婚也齊侯逆不見公十二年三月紀叔姬歸于酅紀侯去國而死叔姬歸魯紀季自定于齊而後歸之二十四年夏公如齊逆女秋哀姜至公使宗婦覿用幣非禮也御孫曰男贄大者玉帛公侯伯子男執玉諸侯世子附庸孤卿執帛小者禽鳥卿執羔大夫執鴈士執雉以章物也章所執之物别貴賤女贄不過榛栗棗修以告䖍也榛小栗修脯䖍敬也皆取其名以示敬今男女同贄是無别也男女之别國之大節也而繇夫人亂之無乃不可乎僖公二十四年三月晉侯迎夫人嬴氏以歸秦穆公女文嬴也初晉懐公自秦逃歸秦伯召晉公子重耳于楚楚子厚幣以送公子于秦秦伯歸女五人懐嬴與焉公子使沃盥既而揮之嬴怒曰秦晉匹也何以卑我公子懼降服囚命囚命自囚以聼命秦伯見公子曰寡人之嫡此為才子圉之辱備嬪嬙焉欲以成昏而懼離其惡名非此則無故不敢以禮致之歡之故也公子有辱寡人之罪也唯命是聼公子欲辭司空季子曰同姓為兄弟黄帝之子二十五人其同姓者二人而已唯青陽與夷鼓皆為己姓昔少典娶于有蟜氏生黄帝炎帝黄帝以姬水成炎帝以姜水成成而異徳故黄帝為姬炎帝為姜二帝用師以相濟也異徳之故也異姓則異徳異徳則異類異類雖近男女相及以生民也同姓則同徳同徳則同心同心則同志同志雖逺男女不相及畏黷敬也黷則生怨怨亂毓災災毓滅姓是故娶妻避其同姓畏亂災也故異徳合姓同徳合義今子于子圉道路之人也言徳姓不同也取其所棄以濟大事不亦可乎公子謂子犯曰何如對曰将奪其國何有於妻唯秦所命從也謂子餘曰何如對曰禮志有之曰将有請於人必先有入焉欲人之愛己也必先愛人欲人之從己也必先從人今将昏媾以從秦受好以愛之聼從以徳之懼其未可也又何疑焉乃歸女而納幣且逆歸女納幣更主昏禮逆親迎也至是重耳返國故逆以歸焉二十五年夏四月宋蕩伯姬來逆婦伯姬魯女為宋大夫蕩氏妻也自為其子來逆稱婦姑存之辭婦人越境逆女非禮三十有一年冬杞伯姬來求婦自為其子成昏文公二年冬襄仲如齊納幣禮也凡君即位好舅甥修昏姻娶元妃以奉粢盛孝也謂諒闇既終嘉好之事通于外内外内之禮始備此除凶即位也於是遣卿申好舅甥之國修禮以昏姻也元妃敵夫人奉粢盛共祭也孝禮之始也四年夏逆婦姜于齊稱婦有姑之辭卿不行非禮也禮諸侯有故則使卿逆宣公元年春正月公子遂如齊逆女尊君命也諸侯之卿出入稱名氏所以尊君命也𫝊於此發者與還文不同故釋之三月遂以夫人婦姜至自齊尊夫人也遂不言公子替其尊稱所以成小君之尊也公子當時之寵號非族也故傳不言舍族五年春公如齊高固使齊侯止公請叔姬焉留公彊成昏成公八年冬衛人來媵共姬禮也凡諸侯嫁女同姓媵之異姓則否必以同姓者參骨肉至親所以息陰訟九年夏季文子如宋致女女嫁三月又使大夫隨加聘問謂之致女所以致成婦禮篤昏姻之好十一年春聲伯之母不聘聲伯之母叔肸之妻不聘無媒禮穆姜曰吾不以妾為姒昆弟之妻相謂為姒穆姜宣公夫人宣公叔肸同母昆弟生聲伯聲伯以其外弟為大夫外弟管于奚之子為魯大夫而嫁其外妹於施孝叔孝叔魯惠公五世孫郤犨來聘求婦於聲伯聲伯奪施氏婦以與之婦人曰鳥獸猶不失儷儷耦也子将若何曰吾不能死亡言不與郤犨婦懼能忿致禍婦人遂行生二子於郤氏十四年秋宣伯如齊逆女稱族尊君命也九月僑如以夫人婦姜氏至自齊舍族尊夫人也舍族謂不稱叔孫昭公二年春晉侯使韓宣子如齊納幣為平公納少姜夏韓須如齊逆女逆少姜齊陳無宇送女致少姜少姜有寵於晉侯晉侯謂之少齊秋少姜卒三年正月齊侯使晏嬰請繼室於晉復以女繼少姜曰寡人願事君朝夕不倦将奉質幣以無失時則國家多難是以不獲不得自來不腆先君之適謂少姜以備内官焜燿寡人之望則又無禄早世隕命寡人失望君若不忘先君之好惠顧齊國辱收寡人徼福於太公丁公徼要也二公齊先君言收恤寡人則先君與之福也照臨敝邑鎮撫其社稷則猶有先君之適適夫人之女及遺姑姊妹遺餘也若而人言如常人不敢譽君若不棄敝邑而辱使董振擇之以備嬪嬙寡人之望也董正也振整也嬪嬙婦宫韓宣子使叔向對曰寡君之望也寡君不能獨任其社稷之事未有伉儷在縗絰之中是以未敢請制夫人服則𦵏訖君臣乃釋服君有辱命惠莫大焉若惠顧敝邑撫有晉國賜之内主豈唯寡君舉國群臣實受其貺其自唐叔以下實寵嘉之唐叔晉之祖既成昏許昏成晏子受禮受賓享之禮叔向從之宴五月晉韓起如齊逆女為平公公孫蠆為少姜之有寵也以其子更公女而嫁公子更嫁公女人謂宣子子尾欺晉晉胡受之宣子曰我欲得齊而逺其寵寵将來乎寵謂子尾五年正月楚子以屈生為莫敖生屈建子使與令尹子蕩如晉逆女過鄭鄭伯勞子蕩于汜勞屈生于莵氏汜莵氏皆鄭地晉侯送女于邢丘子産相鄭伯會晉侯于邢丘言楚強諸侯畏敬其使秦厲共公二十八年越人來迎女楚惠王七年迎婦於秦頃襄王六年秦使白起伐韓於伊闕斬首二十四萬秦乃遺楚王書曰楚倍秦秦且率諸侯伐楚楚王患之乃謀復與秦平七年楚迎婦於秦秦楚復平十四年頃襄王與秦昭王好㑹于宛結和親懐王二十四年秦來迎婦齊湣王四年迎婦于秦趙武靈王五年娶韓女為夫人册府元龜卷二百四十五
