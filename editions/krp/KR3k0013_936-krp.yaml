body:
  text: 册府元龜卷九百三十六宋王欽若等撰總録部吝嗇躁競私愛吝嗇先聖垂戒靡容於驕吝詩人興詠亦刺於儉嗇乃有躬褊介之性兼封執之見以専利為務以多積為急繇是競錐刀之末如㓂盗之至雖復悖入之無算尚若屢空之不足故自奉之具益增於菲薄周急之義固從於杜絶以至闕所親之飬拒縣官之求斯乃名教之不容人倫之所擯者也曹氏邴氏魯人也魯俗儉嗇曹氏邴氏尤甚以鐵冶起富至巨萬然家自父兄子孫約俛有拾仰有取魏曹洪為驃騎將軍封都陽侯始家富而性吝嗇文帝少時假求不稱嘗恨之遂以舍客犯法下獄當死羣臣並救莫能得卞太后謂郭后曰令曹洪今日死吾明日勑帝廢后矣於是泣涕屢請乃得免官削爵土魏畧曰文帝收洪時曹真在左右請之曰今誅洪洪必以真為譛也帝曰朕自治之卿何預也㑹卞太后責怒帝言梁沛之間非子亷無有今日詔乃釋猶尚没入其財産太后又以為言後乃還之張緝為東筦太守領兵數千人緝性吝於財而矜於勢晉王戎為司徒性好興利廣收八方田園水碓周徧天下積實聚錢不知紀極每自執牙籖晝夜算記常若不足而又儉嗇不自奉飬天下人謂之膏肓之疾女適裴頠貸錢數萬久而未還女後歸寧戎色不悦女遽還直然後乃悦從子將婚戎遺其一單衣婚訖更責取家有好李常出貨之恐人得種嘗鑚其核以此獲譏於世和嶠家産豐富擬於王者然性至吝以是獲譏於世杜預以為嶠有錢癖王導為丞相性儉節帳下甘果爛敗令棄之云勿使大郎知大郎即導子悦也為中書侍郎先導卒郗愔為冠軍將軍好聚斂積錢數千萬子超嘗開庫取施一日中散與親故都盡超官至散騎侍郎宋宗慤為左衛將軍有佳牛堪進御官買不肯賣坐免官朱修之為領軍性儉刻少恩情姊在鄉里饑寒不立修之貴為刺史未嘗供贍常徃視姊姊欲激之為設菜羮麤飯修之曰此乃貧家好食致飽而去南齊曹虎為右衛將軍貨賄吝嗇在雍州得見錢五千萬伎女食醬菜為重肴每好風景輙開庫招拍張向之帝疑虎舊將兼利其財新除未及拜見殺時年六十餘王琨為侍中性既謹慎而儉嗇過人家人雜事皆手自摻執設酒不過兩杯輙云此酒難遇鹽豉薑蒜之属並挂屏風酒漿悉置牀下内外有求琨手自賦之梁朱异為侍中四方饋遺財貨充積性吝嗇未嘗有散施厨下珍羞腐爛每月嘗棄十數車雖諸子别房亦不分贍王筠家累千金性儉嗇外服麤弊所乗車馬常飼以青草後為太子詹事陳沈衆為左民尚書家累財帛以億計無所分遺其自奉飬甚薄每於朝㑹之中衣裳破裂或躬提冠履永定二年兼起部尚書監起太極殿常服布袍芒屨以麻繩為帶又携乾魚蔬菜飰獨噉之朝士咸共誚其所為後魏崔和為正昌太守家巨富而性恡嗇埋錢數百斛其母季春思堇惜錢不買鄭羲為安東將軍西兖州刺史假南陽公羲多所受納政以賄成性又嗇恡民有禮餉者皆不與杯酒臠肉西門受羊酒東門酤賣之崔光韶家足於財而性儉恡衣馬弊痩食味麤薄始光韶在都同里人王蔓於夜遇盗害其二子孝莊詔黄門髙道穆令加撿捕一方之内家别搜索至光韶宅綾絹財帛籄篋充積議者譏其矯嗇北齊叚韶為武衛將軍左丞相尤嗇於財雖親戚故舊畧無施焉其子深尚公主并省丞郎在家佐事十餘日事畢辭還唯賜一杯酒庫狄伏連為開府領軍大將軍與瑯琊王儼矯殺和士開伏誅伏連家口百數夏至之日料以倉米二斛不給鹽菜常有饑色冬至之日親表稱賀其妻為設豆餅伏連問此因何而得妻對向於馬豆中分减充用伏連大怒典馬掌食之人並加杖罰積年賜物藏在别庫遣侍奴一人専掌管鑰每入庫檢閲必語妻子云此是官物不得輙用至是簿録並歸天府崔瞻為銀青光禄大夫瞻性簡傲以才地自矜所與周旋皆一時名望在御史臺常於宅中送食備盡珍羞别室獨飡處之自若有一河東人士姓裴亦為御史伺瞻食便徃造焉瞻不與交言又不命七筯裴坐觀瞻食罷而退明日裴自携匕筯恣情飲噉瞻方謂裴云我初不喚君食亦不共君語君遂能不拘小節昔劉毅在京口冐請鵞炙豈亦異於是乎君定名士於是每與之同食焉封述為殿中尚書厚積財産一無饋遺雖至親密友貧病困篤亦絶於拯濟朝野物論甚鄙之外貎方整而不免請謁回避進趨頗致嗤駭前妻河内司馬氏一息為娶隴西李士元女大輸財聘及將成禮猶競懸違述忽取供飬像對士元打像作誓士元笑曰封公何處常得應急像須誓便用一息娶范陽盧莊之女還又經府訴云送驢乃嫌脚跛評田則云鹹薄銅器又嫌古廢皆為吝嗇所及每致紛紜後周王羆為驃騎大將軍每至享㑹親自秤量酒肉分給將士時人尚其均平嗤其鄙碎隋劉焯以儒學知名天下名儒後進質疑受業不逺千里而至然懐抱不廣又嗇於財不行束修者未嘗有所教誨時人以此少之唐徐岱貞元中為給事中恡嗇頗甚倉庫管鑰皆自執掌獲譏於時梁張衍為右諫議大夫衍巧生業樂積聚太祖將北伐頗以扈從間麋耗力用繋意屢干託宰相求免行事帝微聞之又属應召稽晩遂及禍晉張籙家雖厚積性實鄙吝未嘗與士大夫游處及令市馬利在私門不省舅以輸其直鬱鬱將至死愚之甚邪符蒙素浮薄每效秦洛間語識者笑之復性鄙嗇與人交不過於觴酒豆肉未嘗以賑急為心赴兄之䘮謂人曰夫量腸而食則延其壽兄之此夭是枉費也及清泰末常山有秘瓊之亂蒙百口悉在其中而財貨掃地無餘家遂一空後至禮部侍郎卒陳保極為倉部員外郎無時才有傲人之名而性復鄙恡所得利禄未嘗奉身但蔬食而已每與人奕棊敗則以手亂其局盖拒所賭金錢不欲償也及卒無妻兒囊中貯白金數千鋌為他人所有時甚嗤之袁正辭為左監門衛大將軍無他才善治生雖承父舊基亦自能營構故其家益富嘗於積鏹之室有吼聲聞於外人勸其散施以禳其兆正辭曰此必謁其同軰宜便增之其庸暗多此類也及清泰天福開運之際厚貢求郡止得虚名而已三朝不遂其志以至馬堕折足而終漢張允隠帝即位之年授吏部侍郎自誅史宏肇之後連薨恐悚晨不保夕先是允曾使湖南錢塘得財萬計雖妻未嘗委之以衣帶連管鑰而行衣之下常如環珮之音既覩時危乃深藏密貯每朝退即宿於相國寺僧舍是夜允與數十人匿于佛殿藻井之上登者既多覆壓墜地為軍士盡取其衣而凍卒周常思為昭義節度使思性鄙恡未嘗與賓佐有酒肴之㑹躁競王制曰凡官民材必先論之論辯然後使之任事然後爵之又曰上賢以崇徳簡不肖以黜惡以至屏之逺方終不齒此盖審名實之分甄善惡之宜使無奔競奉浮偽者也暨叔世道䘮宵人在列造請而不避寒暑交結而罔顧名節求進無已至怨詈而賜死乞丐無厭終恡鄙而没代希貴仕而改志喜嚴召而促程年過桑榆奏牘而干柄用器非鍾鼎舉目而求章綬甚則棄彼母妻易其姓字越洪河之險假初筵之名若此之類良可醜也司馬耕字子牛宋人孔子弟子也子牛多言而躁宋劉瑀為右衛將軍年位本在何偃前孝武初偃為吏部尚書瑀圖侍中不得謂所親曰人仕宦不出當入不入當出安能長居户限上因求益州帝知其意許之王靖之為司徒左長史靖之為劉穆之所厚就穆之求侍中如此非一穆之曰卿若不求久自得也遂不果何衍明帝初為建安王休仁司徒從事中郎仍除黄門郎未拜衍性躁動競求轉司徒司馬得司馬復求太子右率拜右率一二日復求侍中旬日之間求進無已不得侍中以怨詈賜死劉遐者長沙景王道憐之後也後廢帝時遐兄彦節為中書令與齊髙帝分决機事及順帝即位齊髙帝輔政彦節知運祚將遷密懐異圖共攻髙帝帝使擒殺之遐時為呉郡太守亦見誅初彦節當權遐累求方伯彦節曰我在事而用汝作州於徳望不足遐曰富貴則言不可相闗從坐之日得免不至是果死梁江淹為建平王景素鎮軍參軍事領南東海郡丞㑹南東郡太守陸澄丁艱淹自謂郡丞應行軍事景素用司馬柳世隆淹固求之景素大怒言於選部黜為建安呉興令伏晅為豫章内史晅性儉素衣服麤惡外雖退静内不免心競故見譏於時伏挺為晉陵武康令罷縣還東郊築室不復仕挺少有盛名又善處當世朝中勢素多與交游故不能久事隠靖時僕射徐勉以疾假還宅挺致書以觀其意曰昔士徳懐顧戀興數日輔嗣思友情勞一旬故知深心所係貴賤一也况復恩隆親故義重知己道庇生人徳𢎞覆盖而朝野縣隔山川邈舒雖咳唾時沾而顔色不遘東山之歎豈云旋復西風可懐孰能無思加之以静居廓處顧影莫酧秋風四起園林易色凉野寂寞寒蟲呌吟懐抱不可直置情慮不能無託時因吟詠動輒盈篇揚生沉鬱且猶覆盎惠子五車彌多蹐駁一日聊呈小文不期過賞還逮隆渥累牘兼翰紙縟字磨誦復無已徒恨許與過當有傷凖的昔子建不欲妄讃陳琳恐見嗤後代今之過奢餘論將不有累清談挺竄迹草萊事絶聞見藉以謳謡得之與收仰承有事砭石仍成簡通娛腸悦耳稍從擯落宴處榮觀豫在滌除綺羅絲竹二列頓遣方丈員案三代僅存故以道變區中情冲域外操彼絃誦賁兹觀損追留侯之却粒念韓卿之辭榮睠想東郡属懐南岳鑚仰來貺有符下風雖云幸甚然則未喻雖復帝道安康走馬行却由庚得所寅亮有歸悠悠之人展氏猶且攘𬒮浩浩白水寗叟方欲褰裳是知君子拯物義非狥已思與赤松子游誰其克遂願驅之仁壽綏此多福雖則不言四時行矣然後黔首有庇薦紳靡奪白駒不在空谷屠羊預蒙其頼豈不休哉豈不休哉昔杜真自閉深室郎宗絶迹幽野難矣誠非所希井丹髙潔相如慢世尚復游渉權門雍容鄉邑常謂此道為泰每竊慕之方念擁箒延思以陳侍者請至農隙無待邀求挺誠好属文不㑹今世不能促節局歩以應流俗事等昌菹謬被偏嗜是用不羞固陋無憚龍門昔敬通之賞景卿孟公之知仲蔚止乎通人猶稱美盛况在時宗彌為未易近以蒲槧勿用箋素多闕聊效東方獻書丞相須得繕寫更請潤訶儻逢子侯比復削牘勉報曰復覽來書累牘兼翰事苞出處言兼語黙事義周悉意致深逺發函伸紙倍增憤歎卿雄州擢秀弱冠升朝穿綜百家佃漁六學觀眸表其韶慧視色見其英朗若魯國之名駒邁雲中之白鶴及占顯邑試吏腴壤將有武城絃歌桐鄉謡詠豈與卓魯斷斷同年而語耶方當見賞長者良能有加寵授餙兹簮帶寘彼周行而欲逺慕卷舒用懐愚智既知益之為累爰悟滿則辭多髙蹈風塵良所欽挹况以金商戒節素秋御序蕭條林野無人共樂偃卧墳籍游浪儒𤣥物我兼忘寵辱誰滯誠乃求美用有求同今逖聽傍求興懐寤宿白駒空谷幽人引領貧賤為恥鳥獸難羣故當捐此薜蘿出從鵷鷺無乖隠顯不亦休哉吾智乏佐時才慚濟世禀承朝則不敢荒寧力弱途遥愧心非一天下有道堯人何事得因疲病念從閒逸若使車書混合尉候無警作樂制禮紀石封山然後乃反服衡門實為多幸但夙有風欬遘強虚眩瘠類士安羸同長孺簿領沉廢臺閣未理娱耳爛腸因事而息非闗欲追松子逺慕留侯天假之年自當靖恭所職擬非倫匹良覺辭費覽復循環爽焉如失清塵獨逺白雲飄蕩依然何極猥降書札示之文翰覽後成誦流連縟紙昔仲宣才敏藉中郎而表譽正平頴悟頼北海以騰聲望古料今吾有慙徳儻成卷帙力為稱首無令獨耀随掌空使辭人扼腕式閭願見宜事掃門亦有來思赴其懸榻經苔魚網别當以薦城闕之歎曷日無懐所遲萱蘇書不盡意挺後遂出仕尋除南臺治書後魏酈約為司徒諮議參軍性多造請好以榮利干謁乞丐不已多為人所笑㺯坎壈於世不免饑寒唐李敬𤣥為勤州都督雖風格髙峻有不可犯之色然於造請不避寒暑杜亞為江南觀察使徳宗登極勵精求賢以為理令中使召亞亞自揣必以宰輔徴仍促程而進累路與人言議多話及行宰相政事所在方面或以公事諮析亞皆納之既至帝微知之不悦又奏對辭㫖踈濶出為陜州長史于方穆宗長慶中為和王傅以戚里勲家為諸貴所引用家富於財方交結遊俠務於速進後唐胡裴為魏州節度推官撿挍員外郎時四鎮幕賓皆金紫裴獨耻銀艾莊宗自魏州之徳勝與賓僚城樓餞别既而羣僚離席裴獨留獻詩三篇意在章服莊宗舉大鍾属裴曰員外能釂此乎裴飲酒素少畧無難色日惟一舉而釂莊宗即解紫袍賜之解元龜太白山道士也明宗天成三年自西川至對於便殿稱年一百一歲既而上疏乞西都留守兼西川制置使要修西京宫闕帝謂侍臣曰此人老耄自逺來朝比期别有異見反為身名甚可怪也賜號知白先生賜紫衣放歸山蕭希甫初在梁登進士第初依開封尹逺象先典書奏象先移鎮青州希甫從行求為管記象先未之許署為廵官憤憤不樂俄而象先出軍於河上希甫棄其母妻夜渡河入於貝郡易姓名為皇甫校書遂之鎮州至王鎔置參軍希甫時稱青州君記前進士既至欲居賓席一旦失望屢有流言鎮州惡之居朞年從鎔游王母觀希甫復遁於易州百丈山落髪為僧晉何澤為太僕寺卿仕退居河陽澤嘗畜女僕十餘公私請託令出入自是七十餘鬱鬱不得志有求進之心時後唐明宗皇子秦王從榮位望隆盛明宗多不豫澤令婢宜子詣匭進狀請立秦王為皇太子某其末云臣前在班行不求致仕乃宰臣柳臣屏退所以不盡臣才梁漢顒鎮揚州後唐長興四年夏以眼疾授太子少師致仕髙祖素與漢顒有舊及即位之初漢顒朝謁再希任使除左夙衛上將軍薛可言隠帝乾祐元年自徽宣北院使為右金吾上將軍可言為内史與掌機事大臣言議多越職喋喋人惡之故有是拜周武廷翰太祖廣順元年九月甲子自前耀州團練使為太子少保致仕廷翰有武幹晉朝前後征伐嘗佐統帥有功久歴大郡意在節鉞雖居符竹之任心嘗不足初破安從進定襄漢别將有除鎮者廷翰謂宰臣和凝曰主上年㓜嗣襲萬機百揆悉委大臣廷翰麄走大歩三十年不離數百户郡將在廷翰麾下鳴鍾列鼎者多矣相公獨無故人之情耶凝致謝而已侯贊者密州民也顯徳三年十二月稱草澤臣冐闕獻䇿詞理甚鄙且兼乞召對帝因問之語多不遜復有自薦之意帝怒令引出杖脊配役私愛石碏曰愛子教之以義方陳亢曰君子之逺其子聖人制禮以防人猶有薄於孝而厚於慈者盖有無教之父溺於私愛底亂彞倫不孝之子恃其驕寵狎侮典常小則敗其家大則亂其國始雖愛之終則禍之古今非一焉瞽叟盲而舜母死瞽叟更娶妻而生象傲瞽叟愛後妻子常欲殺舜卜商為魏文侯師其子死哭之䘮明漢公孫賀為丞相賀子敬聲為太僕以皇后姊子驕奢不奉法征和中擅用北軍錢千九百萬發覺下獄是時詔捕陽陵朱安世不能得武帝求之急賀自請逐捕安世以贖敬聲罪帝許之後漢第五倫為司空或問倫曰公有私乎對曰吾兄子常病一夜十徃退而安寢吾子有疾雖不省視而竟夕不眠若是者豈可謂無私乎袁紹為冀州牧有二子譚長而惠尚少而美紹妻劉氏愛尚數稱其才紹亦奇其貎欲以為後未顯而紹死劉表為荆州牧初以長子琦貌類於己甚愛之後為㓜子琮娶其後妻蔡氏之姪蔡氏遂愛琮而惡琦毁譽之言日聞於表寵昵後妻每信愛焉欲以琮為後而蔡瑁張允為之友黨乃出長子琦為江夏太守衆遂奉琮為嗣楊彪為太尉見漢祚將終遂稱脚攣不復行積十年後子修為曹公所殺公見彪問曰公何痩之甚對曰媿無日磾先見之明猶懐老牛䑛犢之愛公為之改容魏公孫琙為𤣥菟太守其子豹年十八歲早死有公孫慶本遼東襄陽人也其父延避吏居𤣥菟慶少時名豹又與琙子同年琙見而親愛之遣就師學為娶妻任為郡吏晉王衍為太尉嘗䘮㓜子山簡弔之衍悲不自勝簡曰孩抱中物何至於此衍曰聖人忘情最下不及於情然則情之所愛正在我軰簡服其言更為之慟王導為司徒其子悦弱冠有髙名導甚愛之導嘗共悦奕棋爭道導笑曰相與有𤓰葛那得為爾耶及悦疾篤導憂念特至不食積日悦與導語常以慎密為端導還臺及行悦未嘗不送至車後悦亡後導還臺自悦常所送處哭至臺門陸納為吏部尚書以愛子長生有疾求解官營視兄子禽又犯法應刑乞免官謝罪詔特許輕降頃之長生小佳喻還攝職宋張暢為南譙王義宣丞相長史暢愛弟子輯臨終遺命與輯合墳張永為南兖州刺史都督北討兵既敗失其第四子永痛悼之有兼常哀服制雖除猶立靈坐飲食衣服待之如生每出行常别具名車好馬號曰侍從有事輙語左右報郎君知也梁徐勉為中書令第二子俳卒痛悼甚不欲生久廢王務乃為答喻後魏畢衆敬為兖州刺史其子元賓復為刺史父子相代當代榮之時衆敬以老還鄉嘗呼元賓為使君每於元賓聽政之時乗輿出至元賓所先遣左右勑不聽起觀其斷决欣然喜見顔色穆夀世祖時與崔浩等輔政謂其子師曰但令吾兒及我亦足勝人不須苦教之北齊楊休之為中書監其子辟彊怳無文藝休之亦引之入文林館為時人嗤鄙焉册府元龜卷九百三十六
