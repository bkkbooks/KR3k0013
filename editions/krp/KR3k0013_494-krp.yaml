body:
  text: 冊府元龜卷四百九十四宋王欽若等撰邦計部山澤唐文宗太和二年三月丁巳朔度支奏京兆府奉先縣鹵池側近陂泊池井應有水栢柴燒作灰煎鹽等臣勘案先據兩池𣙜鹽使申長慶三年二月十五日於奉先縣界捉獲水栢柴灰四十石六斗二升數内取一石煎得鹽一十二斤一兩使司恐是盜刮鹻土妄稱是水栢柴灰重收採水栢柴三十斤燒得灰二斗二升煎得鹽二斤一十二兩縁從前未有明勑禁斷所以百姓故有抵犯伏以栢柴灰比曾煎試據所獲灰准舊試例約得鹽一斗八升比類鹻土煎鹽所收鹽分數較多其鹻土亦有勑條禁止其水栢柴灰亂法甚於鹻土不可因循臣今商量從今已後捉獲盜採水柏柴灰重一十二斤即計鹽一斤犯灰一斗即計鹽一斤四兩竝准兩池例八斤計折同犯刮鹻土煎鹽勑條節級科罰所冀鹽法齊一𣙜課免虧從之三年四月勑安邑解縣兩池𣙜課以實錢一百萬貫為定額五年六月鹽鐵使王涯奏當使應管諸州府坑冶伏准建中元年九月七日勑山澤之利今歸於管坑冶所出並委鹽鐵使勾當者今兖鄆淄青曹濮等三道并齊州界已收管開冶及訪聞本道私自占採坑冶等臣伏以山川産物泉貨濟時茍有利宜不忘經度兖海等道銅鐵甚多或開採未成州府私占物無自效須俟變興國有常征宜歸董屬前件坑冶昨使簡量審見滋饒已令開發其三道觀察使相承收採將備軍須久以為利恐違常典伏請勒還當使准例稅納又以興功動作法貴均勞坑冶州府人難并役其應採鍊人戸伏請准元勑免雜差遣兾其便安伏乞天恩允臣所請臣即於當使差請強官與兖海等道勘會已開者便令交領未開者别具條疏從之唐自兵興已來始追用漢氏衰耗之政算山澤之利征賦於人非哲王致理之令典也葢其初以經費殫弊薄其取而約其法故國用旁滋而人不告困故大歴中劉宴之法適於中道後代推其能其後姦邪之臣務為多門之用使局額月蠲門類滋侈收天下之徒為彰占避徭之户於是農畝益去人趨其末以為活狡吏黠胥因縁侵恣公利遺散物貨敗濫乃變增𣙜酤之法茍助應嘗之數域内因以困削管子曰天下不患無財患無人以分之執事者誠宜䟽條其源俾漸歸於本以阜厚齊人農桑之業今則異焉貪豐利幹劇柄置勢迎㫖者於是招權怙寵者於是通邪門致顯爵者於是望天下稍復理平之盛焉可得也涯之此奏識者鄙之九年九月鹽鐵轉運使王涯奏請變江淮嶺南茶法并請加稅以贍邦計史臣曰自兵興以來山澤淮湖𣙜筦之利無遺逸矣利益歸於上民益窘於下涯尚欲希恩加稅重用其法以窮其人然而竄身於姦邪之間與其謀而危其國豈非鬼瞰神奪駕斯禍以徴之十二月諸道鹽鐵轉運𣙜茶等使左僕射令狐楚奏新置𣙜茶使額伏以江淮間數年以來水旱疾疫彫傷頗甚愁歎未平今夏及秋稍較豐稔方須惠䘏各使安存昨者忽奏𣙜茶實為蠧政葢是王涯破滅將至怨怒合歸豈有令百姓移茶樹就官塲中栽摘茶葉於官塲中造有同兒戲不近人情方有恩權無敢沮議朝班相顧而失色道路仄目而吞聲今宗社降靈姦兇盡戮聖明垂祐黎庶合安微臣伏蒙天恩兼授使務官銜之内猶帶此名俯仰若驚夙宵知愧伏乞特迴聖聽下鑒愚誠速委宰臣除此使額縁軍國之用或闕山澤之利有遺許臣條疏續具聞奏採造欲及妨廢為虞前月二十一日内殿奏封之次鄭覃與臣同陳論訖伏望聖慈早賜處分一依舊法不用新條唯納𣙜之時須節級加價商人轉賣必較稍貴即是錢出萬國利歸有司既無害茶商又不擾茶戸上以彰陛下愛人之徳下以竭微臣憂國之心逺近傳聞必當感恱詔可之開成元年五月詔以鹽鐵諸道應管銀山二十五所悉歸州縣其鹽鐵使所補人吏並停罷仍歸州縣色役六月鹽州奏請移置𣙜院於宥州二年三月乙酉鹽鐵使奏得蘇州刺史盧商狀分鹽塲三所𨽻屬本州元糶鹽七萬石加至十三萬石倍收稅額直送價錢五月以蘇州刺史盧商為潤州刺史攝御史大夫充浙江西道都團練觀察等使商在蘇州變鹽法獲利倍多時宰臣為鹽鐵使以課績上聞故有是命九月浙江觀察使盧商奏常州自開成元年七月二十六日勑以茶務委州縣至年終所收以溢額五千六百六十九貫比類鹽鐵塲院正額元數加數倍已上伏請增加正額詔户部鹽鐵商量並請依州司所奏從之三年三月以浙西監軍判官王士玫充湖州造茶使時湖州刺史裴充卒官吏不謹進獻新茶不及常年故特置使以専其事宰臣上言造茶乃州縣之常務若别立使額即人户不屬州縣差役偏併諫官上疏切為不可詔罷之六月度支奏請廢晉州平陽院停官吏工匠四百餘户并所管􅈨山兩所並歸州縣從之四年二月丁巳安南都䕶馬植奏管内六州界海北廢珠池今有珠生是月宣州觀察使崔鄲奏茶法非便於人請兩稅錢上隨貫紐率詔曰𣙜茶本率商旅紐貫涉於加稅東省曾有駁正鹽鐵又經奏論法貴大同事難獨改武宗以開成五年正月四日即位十月詔復茶稅鹽鐵司奏曰伏以江南百姓營生多以種茶為業官司量事設法惟稅賣茶商人但於店舖交關自得公私通濟今則事須私賣茍務隠欺皆是主人互郎中裏誘引又被販茶姦黨分外勾牽所繇因此為姦利皆追收攪擾一人犯罪數戸破殘必在屏除使安法理其園户私賣茶犯十斤至一百斤徴錢一百文决脊杖二十至三百斤决脊杖二十錢亦如上累犯累科三犯已後委本州上歴收管重加徭役以戒鄉閭此則法不虚施人安本業既懼當辜之苦自無犯法之心條令既行公私皆泰若州縣不加把捉縱令私賣園茶其有被人告論則又砍園失業當司察訪别具奏聞請准放私鹽例處分又云伏以興販私茶羣黨頗衆塲舖人吏皆與通連舊法雖嚴終難行使須别置法以革姦徒輕重既有等差節級易為遵守今既特許陳首所在招收勑令己行皇恩普洽宜從變法使各自新若又抵違須重科斷自今後應輕行販私茶無得杖伴侣者從十斤至一百斤决脊杖十五其茶并隨身物並没納給糾告及捕捉所繇其囚牒送本州縣置歴收管使别營生再犯不問多少准法處分三百斤已上即是恣行兇狡不懼敗亡誘扇愚人悉皆屏絶並准法處分其所没納亦如上例從之宣宗大中元年閏三月鹽鐵奏據兩池𣙜鹽使狀應舊鹽法勑條内有事節未該及准去年赦文合再論理事件等一曰准貞元元和年勑如有姦人損壊壕籬及放火延燒收賊不獲本令合當殿罰皆已有條制今見施行但未該地界所繇及無捉賊期限伏以鹽池提禁只仰壕籬如有放火延燒故損壊本縣分一周年内十月度同捉得五斗已上私鹽先准元和十二年六月三日勑與減一選即所酬殊寡難使盡心若必遣縣令須令賞罰相稱伏請從今以後其縣令本界内若五度捉得私鹽每度捉得一斗已上兼賊同得者不限歲内歲外但數足後即與減一選如累捉得亦請累減減至三選即止如是别色見任正官員前官差攝縣令亦准正縣令處分如是散試官差攝縣令無選可減者亦得年五度捉得私鹽并賊同得者即請别賞見錢五十貫累捉得亦請累賞如兩畿令及赤縣令無選可減者在任之日但界内捉得私鹽件數與勑文相當簡勘别無異同即請申中書門下秩滿後便與依資除官如此則必悉心奉法不失罪人其餘即請各准元勑處分一曰應捉獲越界私鹽并刮鹻盜兩池鹽賊與刼奪犯鹽囚徒頭首關連人等推勘是合抵死刑者承前並各准元勑極法處分者伏以本制鹽法束勒甚嚴近年以來稍加寛令又准會昌六年五月五日赦文靈武振武天徳三城封部之内皆有良田縁無居人遂絶耕種自今已後天下囚徒各處死刑情非巨蠧者特許全生并家口配流强盜鹽賊蹤入界各許本州界一月内捉賊送使如過限不到即是私存慢易捜索未精其元勑内所罰縣令課科便請准勑文牒本州府當日據數徴尅送使又弓矢射所繇等晝夜只于池内簡巡其壕籬外面山林掩映村柵相次每有姦人興心結搆必須與村人相熟乃敢下手若或無人勾致即逺賊不敢自來亦縁從來未立科條以此沿池所繇都無禀束伏請從今後如有姦人損動壕籬及放火延燒并有盜竊蹤跡其地界保社所繇村正居停主人等如有自擒捉得賊每捉得賊一人推勘得實所捉人當日以官中諸色見錢一十貫文充賞如漏網及不覺察到並請追就便各决脊杖十五如推勘與賊知情即請准所犯人條例處分如是所繇及别色人等捉得亦請准前給賞其餘並請各准元勑處分一曰諸州府應捉搦販賣私鹽及刮鹻煎賊等伏請前後勑節文本界縣令如一周年内十度同捉獲私鹽五斗已上者本縣令減一選如每年如此即與累減者伏以私鹽厚利煎竊者多巡院弓矢力徵州縣人煙遼夐若非本界縣令同立隄防煎販之徒無繇止絶其縣令本界漏網私鹽據石斗各有元勑並請依舊條處分如縣令若侍本此三道者當時應縁鹽法捉獲前件賊等並是固違勑文挾持弓刀棒杖皆作殺人調致巨蠧兇惡情狀難原如或詐有生全則必欺偷轉甚别無其法可以畏之今伏請捉獲此色賊推勘得實合寘極刑者並請各准奏處分以前户部侍郎判度支盧宏正奏臣又得兩池𣙜茶使簡校司封郎中兼侍御史司空輿狀自領職以來披尋捉鹽條制其間有此三節須重奏論伏以鹽法條制須是嚴刑稍似寛容則姦人無懼招收𣙜課數闕伏望聖慈許依司空輿所請即兾私鹽杜絶𣙜課增加從之二年正月勑安邑解縣兩池𣙜課先以實錢一百萬貫為定額今但取匹段精好不必計舊額錢數三年七月命開殖三州七關之地廣鹽鹵之利以贍邊人四年三月因收復河隴勑令度支收管温池鹽仍差靈州分巡院官専勾當先是湖落地在豐州界河東供軍使收管每年採鹽約一萬四千餘石供振武天徳兩軍及營田水運官健是年党差叛擾饋運不通供軍使請𣙜市河東白池鹽供食其白池屬河東節度使不繫度支六年二月勑温池令割屬威州置𣙜稅使縁新制置未立𣙜課定額五月鹽鐵轉運使户部侍郎裴休立稅茶之法凡十二條陳奏之宣宗大恱下詔曰裴休興利除害深見奉公盡可其奏是年度支收納安邑解縣池𣙜利一百二十一萬五千餘貫女鹽池在解縣朝邑小池在同州鹵池在京兆府奉先縣並禁斷不為𣙜懿宗咸通四年七月詔廉州珠池與人共利近聞本道禁斷遂絶通商宜令本州任百姓採取不得止約僖宗光啓元年三月詔曰近京贍國之資𣙜鹽為本法禁久廢姦蠧實繁陷誤藩方依憑城社須知根抵乃可改張委本司選周術通財庶期革弊其江淮食貨利害亦須詳究指揮㳂路占留遺使親諭兵革之後銅鉛至多折納鑄錢尚資興利亦要議其可否不令旁撓農商昭宗天復元年三月梁太祖兼領河中節度使奏歲貢課鹽三千車臣今代領池塲請加二千車歲貢五千車候五池完葺則依平時貢額從之梁太祖開平三年制斷曹州煎小鹽糶貨末帝龍徳初鹽鐵轉運使敬翔奏請於雍州河陽徐州三處重置場院稅茶從之後唐莊宗同光三年二月勑會計之重鹹鹺是先矧彼兩池實有豐利頃自兵戈擾攘民庶流離既場務以隳殘致程課之虧失重兹葺理須仗規模將立事以成功在從長而就便宜令李繼麟兼兖州節度度支安邑解縣兩池𣙜鹽使便可制置一一條貫所有合制官吏等亦委自使選差三年二月勑其逐年俵賣蠶鹽食鹽大鹽甜次冷鹽每斗與減五十文欒鹽伏准本勑文辛巳鄜延髙萬興奏河中於僖州開場賣課鹽伏准本朝規制元食青鹽請止絶明宗天成元年五月商州奏當管水銀五窟乞依舊管係二年十一月貝州刺史竇廷琬上便宜狀請制置鹽州烏白兩池逐年出絹十萬疋米五萬石奉勑昇慶州為防禦使便除廷琬為使三年正月庚申宰臣以鹽麴價髙請議減價以便生民帝曰若便於民不失國計便可以行殿中丞杜璟又以汴州鹽價倍於雒陽奏表請減二月以蔚州銀冶無裨國費虚占人戸命廢之長興四年五月七日諸道鹽鐵轉運使奏應食課鹽州府省司各置𣙜糶折博塲院應是鄉村並通私商興販所有折博并每年人户蠶鹽並不許將帶一斤一兩入城侵奪𣙜糶課利如違犯者一兩已上至一斤買賣人各决臀杖一十三放一斤已上至三斤買賣人各决臀杖十五放三斤已上至五斤買賣人各决脊杖十三放五斤已上至十斤買賣人各决脊杖十七放十斤已上不計多少買賣人各决脊杖二十處死有犯鹽人隨行錢物驢畜等並納入官所有元本家業田庄如是全家逃走者即行典納仍許般載脚戸經過店主人脚下人力等糾告等第支與優給如知情不告與買賣人同罪其犯鹽人經過處地分門司廂界巡簡節級所繇并諸色關連人等不専覺察即據所犯鹽數委本州臨時科斷乞報省如是門司關津口舖捉獲私鹽即依下項等第支給一半賞錢一斤已上至十斤支賞錢二十貫文五十斤已上至一百斤支賞錢三十貫文一百斤已上支賞錢五十貫文應食末鹽地界州府縣分並有𣙜糶場院久來内外禁法即未有一槩條流應刮鹻煎鹽不計多少斤兩並處極法兼許四鄰及諸色人等陳告等第支與賞錢欲指揮此後犯一兩已上至一斤買賣人各决臀杖十三放一斤已上至二斤買賣人各决臀杖十五放二斤已上至三斤買賣人各决脊杖十六放三斤以上至五斤買賣人各决脊杖十七放五斤已上買賣人各决脊杖二十處死如是收到鹻土鹽水即委本處煎煉鹽數准條流科斷或有已曾違犯不至死刑經斷後公然不懼條流再犯者不計斤兩多少所犯人並處極法其有𣙜糶塲院員寮節級人力煎鹽池各竈户般鹽舡綱押綱將軍衙官稍工等具知鹽法如有公然偷盜官鹽或將貨賣其買賣人及窩般主人知情不告並依前項刮鹻例五斤已上處死者其諸色關連人等並各支賞錢即准雒京邢鎮州條流事例指揮顆末青黄等鹽元不許界分㕘雜其顆鹽先許通商之時指揮不得將帶入末鹽地界如有違犯一斤一兩並處極法所有隨行色物除鹽外一半納官一半與捉事人充優賞其餘鹽色未有畫一條流其雒京并鎮定邢州管内多有北京末鹽入界捉獲並依雒京條流科斷欲指揮此後但是顆末青白諸色鹽侵界㕘雜捉獲並准雒京條例施行慶州青白𣙜稅元有透稅條流所有隨行驢畜物色一半支與捉事人充優賞其餘一半并鹽並納入官欲並且依舊一斗已上至三斗决臀杖十五放三斗已上至五斗决脊杖十三放五斗已上處死安邑解縣兩池𣙜鹽院河府節度使兼判之時申到畫一事件條流等准勑牒兩池所出鹽舊日若無榜文如擅將一斤一兩准元制條並處極法其犯鹽人應有錢物並與捉事人充優賞者切以兩池禁棘峻阻不通人行四面各置塲門弓射分擘鹽池地分居住並在棘圍内更不别有遣差祇令巡䕶鹽法如此後有人偷盜官鹽一斤一兩出池其犯鹽人並准元勑條流處分應有隨行錢物並納入官其捉事人依下項定支優給若是巡簡弓射池塲門子自不専切巡察致有透漏到棘圍外被别人捉獲及有糾告兼同行反告官中更不坐罪陳告人亦以捉事人支賞應知情偷盜官鹽之人一依犯鹽人一例處斷其不知情關連人臨時酌情定罪所有透漏地分弓射及池塲門子如是透漏出鹽十斤已下决脊杖五十放一十斤已上與犯鹽人同罪科斷一斤已上至十斤支賞錢一十貫文十斤已上至五十斤支賞錢二十貫文五十斤已上至一百斤支賞錢三十貫文一百斤已上支賞錢五十貫文前項所定奪到鹽法條流其應屬州府捉獲抵犯之人便委本州府簡條流科斷訖申奏别報省司其屬省院捉到犯鹽之人干死刑者即勘情申上候省司指揮不至極刑者便委務司准條流决放訖申報奏勑宜依末帝清泰元年新州銀冶務使承珪言自今年正月得銀三百五十兩自八月後採山無銀别尋弦道二年河中言三司干民添徴蠶鹽錢晉髙祖天福元年十一月九日即位制曰鹽麴之利軍府所資儻不便於人戸宜别從於條制所期濟衆無患妨公在京鹽價元是官塲出糶自今後並不禁斷一任人户取便糶易仍下泰原府更不得開塲糶貨閏十一月壬午勑覆車難襲弊政宜遷恤鄉邑之瘡痍救民人之苦疾其北京管内鹽鐺戸合納逐年鹽利昨者偽命指揮每斗須令人戸折納白米一斗五升極知百姓艱苦自今後宜令人戸以元納食鹽石斗數目每斗依時價計定錢數以錢數取人戸便穏折納斛㪷一人湯沐之奉實在王畿兆民凋弊之風宜行仁恕其雒京管内逐年所配人戸食鹽起從來年每斤特與量減價錢十文二年九月左補闕李知損上章曰臣以前承御札許進言者直書其闕况在諫司不敢避事臣近聞衆議云國家將變鹽法有司即欲宣行竊知以諸道所糶賣鹽令逐處更添一倍委州司量其屋宇均配城内戸人每歲勒兩限俵鹽隨二稅納價言之雖易作之極難此法若行甚非穏便然則歴代變法先取其益國利人前王開基本在于安時恤物設國無所益人不聊生斯乃害時之理昭然變法之功何有今添配鹽貨資困弊者有二作敗亂者有三何則念寰海烝民屬梁朝季運困之以兵革重之以科徭畿經宗社改更刑法變換地經百戰往年之事力都無室告九空到處之鄉村未復止於州城衆戸所在貧乏者多臣頻曾守職藩方莫不詳觀利病且常年城内居戸例于屋稅請鹽比其徵納之時備見艱難之狀以至須勞鞭朴尚有逋懸况所請之數甚微應督之期猶失若以逐州塲院鹽貨於合賣數增倍俵之以稅錢均攤則貧富髙低而不等以屋宇紐配則盈虚剰少以難齊於功罕全與物為病其資困弊者一也逐處州府必委官吏行之官雖强明而吏藏姦倖斯葢必然之理可得而知儻官乏能名吏多欺詐則力不足者重傷於增配家已給者却獲其輕均是則率百姓而因國家虐貧窮而繇胥吏其資困弊者二也且諸州糶鹽收利省司差官置塲所掌者國家之利權安得假厚薄而輙廢所立者國家之法制豈可沿輕重而濫施使四方之人何以取則聞一朝之令孰不見疑散利權於諸州變鹽法於天下俵給不均而民弊徴催不便而民逃國無利而喪權民積困而失業其作敗亂者一也所在之處多有土鹽或煎而食之或藏而貨之流行既深紊亂非細如無告訐莫得追尋若配俵之權憑於官吏誡嚴之法委自藩方則民漸困以何辜國轉虚而何利其作敗亂者二也天下鹽鐵國家大權嘗重慎于施張助國家之輕費喻河流之不竭同嶽鎮以無傾葢轉運所引行之如水禁嚴其固挺之若山豈可縁支用而絶本源為迫切而摧重大權衡一失整頓甚難利害再思辯明極易是則民有害而可救國無利而何圖其作敗亂者三也困弊敗亂願陛下細而思之審而行之恐不宜以為常事而不軫聖慮也大凡錢穀之利祇以聚斂為能至於度支之司唯以濟辦為効殊不知人心小失所憂之事非常王道大行所恱之方葢逺臣竊慮有司以配鹽事件敷奏聖聰必云百姓賖得食鹽半年然後納價國家隨其二稅頭段徴得鹽錢塲院既免遷延官典更無逋欠民獲其濟國有所資臣請詰之以解前說且百姓窮困十八九焉或市肆經營取錐刀宜利至於日食鹽酪辦即買之偶或無錢不妨淡食今以半年鹽味配給貧民請歸其家殆非所濟當俵鹽之日已不欣歡及納價之時可量困躓復有稅租甚大舍屋頗多骨肉替令家事牢落官中以戸門而須配本人懼條法以難辭剰請官鹽莫之為用都徴省債無足可償以此通民何州不有以此編戸何處不空是則百姓因之逃亡鹽錢固所虧失省司指本州本使不管流移州司追鄰人保人須令攤配如此則已傷殘而重困未波逃而復驅益國濟民其利安在蠧時害政不亦多乎所司或對云自古理民有利則有害當今贍國不斂則不充諫官祇以憂民為詞不知經國之務臣請再詰以證斯言夫國家取利之方王者安民之道雖或甚利於國微損於民聖君尚以割股啗腹而為言本固邦寧而垂誡何况有甚害于物而小益于時者乎必欲糶賣鹽錢須要倍於往日唯宜減落鹽價慎選塲官示諭諸州峻整公法凡經半課利但令逐處較量比及周正必期集事如糶壹倍於元數課租濟於朝廷則必授以殊資别委主之重務如或所賣不及于元數所資不濟於朝廷則必顯示斷懲永更不令任使既鹽價極輕而鹽法甚重則民間不犯而貨易自通州府以公家在心塲院以貞幹為事自然國有其利民無所傷與夫配百姓而失經費之資其利害懸於天壤矣伏惟皇帝陛下每憂勤庶政嘗諮訪羣臣當明君求諫之秋是微列得言之日尋有㫖寢其事少帝以天福六年六月即位十一月詔州郡稅鹽課稅斤七分住稅斤十分州府鹽院差省司差人勾當先是諸州府除蠶鹽外每斗海鹽界分約收鹽價錢一十七萬貫髙祖以所在禁法祇犯者衆遂開鹽禁許通商令州郡配徵人戸食鹽錢上户千文下户二百分為五等時亦便之至是掌賦者欲增財利難於驟變前法乃重其關市之征葢欲絶其興販歸利於官也其後鹽禁如故鹽錢亦徵至今為弊焉漢髙祖入汴之年屬外敵稱兵之後國用尤窘故鹽鐵之禁甚峻明年李守貞叛於河中傳檄於鄰藩以疏漢之不道云鹹鹺不通從銖兩者遭刑農器不行務耕耘者束手則漢之立法可知矣周太祖廣順元年九月詔改鹽法凡犯五斤已上者處死煎鹻鹽者犯一斤已上處死先是漢法不計斤兩多少並處極刑至是始革之二年九月十八日勑條流禁私鹽麴法如後一諸色犯鹽麴所犯一斤已下至一兩决臀杖十七配役一年五斤已下一斤已上决脊杖二十配役三年五斤已上並决重杖一頓處死應所犯鹽麴關津門司廂巡村保如有透漏並行勘斷一刮鹻煎鍊私鹽所犯一斤已下决脊杖二十配役三年一斤已上並决重杖一頓處死所犯私鹽若捉到鹻土鹻水祇煎成鹽稱盤定罪逐處凡有鹻鹵之地所在官吏節級所繇常須巡簡村坊鄰保遞相覺察若有所犯他處彰露並行勘斷一所犯私鹽捉事告事人各支賞錢以係省錢充至死刑者賞錢五十貫文不及死刑者三十貫文一顆鹽末鹽各有界分若將本地分鹽侵越疆界同諸色犯鹽例科斷一鄉村人戸所謂蠶鹽祇得將歸裛繭供鹽不得别將博易貨賣投托與人如違並同諸色犯鹽例科斷若是所請蠶鹽道路津濟須經過州府縣鎮委三司明行指揮一凡賣鹽麴須並於官塲官務内買若衷私投托興販其買賣人並同諸色犯鹽麴例科斷一諸官塲務如有羡餘出利鹽麴並許盡底報官如衷私貨賣者買賣人並同諸色犯鹽麴例科斷若鹽舖酒店戸及諸色人與塲院衷私貨賣者並同罪科斷一所犯鹽麴有同情共犯者若是骨肉卑幼奴婢同犯抵罪家長主首如家長主首不知情抵罪造意者其餘減等科斷若是他人同犯並同罪斷遣若與他人同犯據逐人脚下所犯斤兩依輕重斷遣一州城縣鎮郭下人戸係屋稅合請鹽者若是州府並於城内請給若是外縣鎮郭下人戸亦許將鹽歸家供食仍仰本縣預取逐戸合請鹽數目攢定文帳部領人戸請抜勒本官吏及所在塲務同㸃簡入城若縣鎮郭下人戸城外别有庄田亦仰本縣預前分擘開坐勿令一處請給供使勑令應諸道今後若捉獲犯私鹽麴人罪犯分明正該條法便即斷遣訖奏若稍設疑誤抵須申奏取裁十月戊申解州刺史兼兩池𣙜鹽使張崇訓言兩鹽池周圍極逺以棘為籬别無城壁其巡警牙官數百步一人向未立法猶有犯禁近奉九月十日條流雖不該制置鹽塲務司亦已曉諭今來未審依舊法用新條詔依新勑先是漢法犯鹽一斤一兩死之太祖以其用法太峻兼不足以懲姦乃改法加至五斤處死主者但欲嚴酷以集事不顧治道之可否故張崇訓有是奏三年三月詔曰青白池務素有定規祇自近年頗乖循守比來青鹽一石抽稅錢八百鹽一斗白鹽一石抽稅五百鹽五升其後青鹽一石抽錢一千鹽一斗訪聞改法已來不便商販蕃人入界本州務及諸巡鎮倍加安撫不得侵欺如蕃人將羊馬貨價須平和交易不得縱任牙人通同脫畧故為抑凌訪聞邊上鎮舖於蕃漢戸人市易糶餘衷私抽稅今後一切止絶如違必加深罪各令知悉青白鹽池在鹽州北唐朝元管四池曰烏池白池瓦窑池細項池今出稅置吏准烏白二池而已寧慶諸州民有自池務買鹽經過處皆定稅利十二月三司使奏諸道州府逐年俵散戸人顆鹽除俵鄉村外有州城縣鎮郭下舊請屋稅蠶鹽處自前元不敢入城門以廣順二年勑却許放入縁州城縣鎮郭下各有糶塲切慮放入稅鹽紊亂條法難為簡校其州城府縣鎮郭下所俵年約六千餘石徵錢萬五千八百貫起來年欲住俵其元徵錢未審徵否勑諸州府并外縣鎮城内其居人屋稅鹽今後不俵其鹽錢亦不徵納所有鄉村人戸合請蠶鹽州城縣鎮嚴切簡校不得放入城門世宗顯徳元年十二月帝謂侍臣曰朕覽食末鹽州郡犯私鹽者多於食顆鹽界分葢卑濕之地易為刮鹻煎造豈唯違我𣙜法兼又以我好鹽况末鹽煎鍊般運費用倍於顆鹽今宜分割十餘州令食顆鹽不唯沿流輦運省力兼且少人犯禁時論便之自是曹宋已西十餘州皆食顆鹽焉二年八月二十四日宣節頭文改立鹽法如後一贍國軍堂陽務邢洺州鹽務應有見垜貯鹽貨處並煎鹽塲竈及應是鹻池並須四面修置墻壍如是地里均逺難為修置墻壍即是壕籬為規隔如是人於壕籬内偷鹽夾嘗官鹽兼於壕籬外煎造鹽貨便仰收捉及許諸色人陳告所犯不計多少斤兩並决重杖一頓處死其經歴地分及門司節級人員並當勘斷所有捉事告事人賞錢一兩已上至一斤賞錢二十貫文一斤已上至一十斤賞錢三十貫文一十斤已上賞錢五十貫文一應有不係官中煎鹽處鹻池並須立標標出委本州府差公幹職員與巡鹽節級村保地主鄰人同共巡簡若諸色人偷刮鹻地便仰收捉及諸色人陳告若勘逐不虚捉事告事人每獲一人賞絹一十疋獲二人賞絹二十疋獲三人已上不計人數賞絹五十疋刮鹻煎鹽人并知情人所犯不計多少斤兩並决重杖一頓處死其刮鹻處地分並刮鹻人住處巡簡節級所繇村保等各决脊杖十八令衆一月放依舊勾當刮鹻處地主不切簡校决脊杖十七令衆一月放一課鹽池分界内有刮鹻煎錬鹽貨所犯並依前項一今縁改價賣鹽慮有别界分鹽貨遞相侵犯及將鹽入城諸色犯鹽人令下三司依下項條流科斷其犯鹽人隨行物色給與本家其鹽没納入官所經歴地分節級人員並行勘斷一兩至一斤决臀杖十五令衆半月捉事告事人賞錢五貫文一斤已上至十斤决脊杖十五令衆一月捉事告事人賞錢七貫文二十斤已上不計多少决脊杖十七配發運務役一年捉事告事人賞錢一十貫文一諸州府人戸所請蠶鹽不得於鄉村里私貨賣及信團頭脚戸鹽司請鹽節級所繇等尅折糶賣如有犯者依諸色犯鹽例科斷一如有人於河東界將鹽過來及自家界内有人往彼興販鹽貨所犯者並處斬其犯鹽人隨行驢畜資財並與捉事人充賞十月詔曰漳河以北州府管界元是官塲糶鹽今除城郭等市内仍舊禁約其鄉村並許鹽貨通商逐處有鹻鹵之地一任人戸煎鍊興販即不得踰越漳河入不通商地界冊府元龜卷四百九十四
