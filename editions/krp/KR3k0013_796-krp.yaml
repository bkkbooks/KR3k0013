body:
  text: 册府元龜卷七百九十六宋王欽若等撰總錄部先見第二女叔寛晉大夫也魏舒合諸侯之大夫城成周三旬而畢乃歸諸侯之戍齊高張後不從諸侯後期不及諸侯之役晉女叔寛曰周萇𢎞齊高張皆將不免叔寛女寛也萇叔違天高子違人天既厭周德萇𢎞欲遷都以延其祚故曰違天諸侯相帥以崇天子而高子後期故曰違人也天之所壞不可支也衆之所為不可奸也為哀三年周人殺萇𢎞六年高張來奔起地彪傒衞大夫也魯定公元年晉魏舒合諸侯之大夫于狄泉將以城成周魏子涖政涖臨也代天子大夫為政傒曰將建天子立天子之居而易位以令非義也大事奸義必有大咎晉不失諸侯魏子其不免乎是行也魏獻子屬役於韓簡子及原壽過簡子韓起孫不信也原壽過周大夫而田於大陸焚焉禹貢大陸在鉅鹿北絶逺疑荒蕪之地火田并見燒也疑此田在汲郡廣平曰原還卒於甯甯今脩武縣近吳澤陳寅宋大夫也定公六年秋宋樂祁使於晉趙簡子逆而飲之酒於緜上獻楊楯六十於簡子楊木名陳寅曰昔吾主范氏今子主趙氏又有納焉以楊楯賈禍弗可為也已知范氏必怨將歸禍然子死晉國子孫必得志於宋以其為國死史鰌衞大夫也公叔文子朝而請饗靈公欲令公臨其家退見史鰌而告之史鰌史魚史鰌曰子必禍矣子富而君貪罪其及乎文子曰然吾不先告子是吾罪也君既許我矣其若之何史鰌曰無害乎臣可以免言能知臣禮富而能臣必免於難上下同之言尊卑皆然戍也驕其亡乎戍文子之子富而不驕者鮮吾唯子見之驕而不亡者未之有也戍必與焉與禍難及文子卒衞侯始惡於公叔戍以其富也公叔戍又將去夫人之黨靈公夫人南子黨宋朝之徒夫人愬之曰戍將為亂為明年戍來奔鬬辛楚大夫也魯定公四年冬十有一月庚辰吳入郢弗地曰入吳不稱子史畧文五年冬楚子入于郢吴師已歸初鬬辛聞吳人之爭宫也曰吾聞之不讓則不和不和不可以逺征吳爭於楚必有亂有亂則必歸焉能定楚魯子貢衞人定公十五年春邾隠公來朝邾子益子貢觀焉邾子執玉高其容仰公受玉卑其容俯玉朝者之贄子貢曰以禮觀之二君者皆有死亡焉夫禮死生存亡之體也將左右周旋進退俯仰於是乎取之朝祀䘮戎於是乎觀之今正月相朝而皆不度不合法度心已亡矣嘉事不體何以能久嘉事朝禮高仰驕也卑俯替也驕近亂替近疾君為主其先亡乎為此年公薨哀七年邾子益歸𫝊仲尼卒魯哀公誄之曰旻天不弔不憖遺一老俾屏余一人以在位㷀㷀余在疚嗚呼哀哉尼父無自律子貢曰君其不没于魯乎夫子之言曰禮失則昏名失則愆失志為昏失所為愆生不能用死而誄之非禮也稱余一人非名也服䖍曰天子自謂一人非諸侯所當名也君兩失之亡國之風伍員字子胥呉大夫也哀元年吴王夫差敗越于夫椒報檇李也越子使大夫種因伯嚭以行成吳子將許之伍員曰不可臣聞之樹德莫如滋去疾莫如盡昔有過澆殺斟灌以伐斟鄩澆寒浞子封于過者二斟夏同姓諸侯襄四年傅曰澆用師滅斟灌滅夏后相夏后相啓孫也后相失國依于二斟後為澆所滅后緍方娠逃出自竇后緍相妻娠懷孕也歸于有仍后緍有仍氏女生少康焉為仍牧正牧官之長惎澆能戒之惎毒也戒備也澆使椒求之椒澆臣逃奔有虞為之庖正以除其害虞舜后諸侯也梁國有虞縣庖正掌膳羞之官頼此以得除其害虞思於是妻之以二姚思有虞君也虞君自以二女妻少康姚虞姓而邑諸綸有田一成有衆一旅方十里為成五百人為旅能布其德而兆其謀兆始以收夏衆撫其官職襄四年傳曰靡自有鬲氏收二國之燼以滅浞而立少康使女艾諜澆女艾少康臣諜候也使季杼誘豷豷澆弟也季杼少康子后杼也遂滅過戈復禹之績過澆國戈豷國祀夏配天不失舊物物事也今吴不如過而越大於少康或將豐之不亦難乎言與越成是使越豐大必為吴難勾踐能親而務施施不失人所加厚賜皆得其人親不棄勞推親愛之誠則不遺小勞與我同壤而世為仇讎於是乎克而弗取將又存之違天而長寇讎猶言天與不取後雖悔之不可食已食消也已止也姬之衰也日可俟也姬吳姓言可訃日而待介在蠻夷而長冦讎以是求伯必不行矣弗聽退而告人曰越十年生聚而十年教訓生民聚財富而後教之二十年之外吳其為沼乎謂吴宫室廢壞當為汙池二十二年越入吴十一年呉將伐齊越子率其衆以朝焉王及列士皆有饋賂吴人皆喜唯子胥懼曰是豢吴也夫豢養也若人養犧牲非愛之將殺之也諌弗聽使於齊屬其子於鮑氏為王孫氏反役王聞之賜钃鏤以死艾陵役也屬鏤劒名將死曰樹吾墓檟檟可材也呉其亡乎三年其始弱矣盈必毁天之道也越人朝之伐齊勝之盈之極也為十三年越伐吳起公孫彌牟衞人哀公十二年衞侯會吳吳人藩衞侯之舍既歸效夷言子之尚㓜子之公孫彌牟曰君必不免其死於夷乎執焉而又説其言從之固矣出公輒后卒死於越智伯晉大夫伯氏之族智襄子伐鄭還自衞三卿宴于藍臺三卿智襄子韓康子魏桓子智襄子戲韓康子而侮段規段規魏桓子相也智伯國聞之諫曰主不備難必至曰難將由我我不為難誰敢興之對曰異於是夫郄氏有車轅之難郄犨與長魚蟜争田執而梏之與其父母妻子同一轅蟜既嬖於厲公而滅三郄在魯成十年趙有孟姬之讒趙同趙括孟姬趙文子母莊姬通於趙嬰二兄同括欲殺之孟姬慙怨讒於景公公殺之魯成十八年欒有叔祁之難欒欒盈也叔祈范宣子女盈之母也與其老州賔通盈患之祁愬於宣子遂滅欒氏范中行有函冶之難函冶范臯夷之兄也臯夷無寵於范吉射欲為亂於范氏中行寅與范氏相睦故臯夷謀逐二子卒滅之在魯定十三年皆主之所知也夏書有之曰一人三失怨豈在明不見是圖周書有之怨不在大亦不在小夫君子能勤小物故無大患物事也今主一宴而恥人之君相君康子相段規又弗備曰不敢與難無乃不可乎蚋蛾蜂蠆皆能害人况君相乎弗聽自是五年乃有晉陽之難段規乃首難而殺智伯于師言段規首為策作難反智伯者遂滅智氏智果智氏之族也智宣子將以瑶為後智果曰不如宵也宣子曰宵也狠對曰宵之狠在面瑶之狠在心心狠敗國面狠不害瑶之賢於人者五其不逮者一美鬢長大則賢射御足力則賢伎藝必給則賢巧文辨慧則賢强毅果敢則賢如是而甚不仁以其五賢凌人而以不仁行之其誰能待之若果立瑶也智宗必滅弗聽智果别族于太史為輔氏及智氏之亡也唯輔果在太史屠黍晉大夫也見晉之亂以其圖法歸周周威王見而問曰天下國孰先亡對曰晉也臣嘗不敢直言示晉公以天妖日月星辰之行多以不當公曰是何害為又示以人事多不義百姓皆鬰怨公曰是何傷又示以鄰國不服賢良不舉公曰是何害如是是不知所以亡也故臣曰晉先亡居三年晉果亡滅王又見屠黍而問曰孰次之對曰中山次之威王問其故對曰天生民而令有别有别人之義也所以異於禽獸也君臣上下所以立也中山之俗以晝為夜男女切倚固無休息康樂歌謡好悲其主不知惡此亡國之風也臣故曰中山次之居二年中山果亡威王又見屠黍而問曰孰次之屠黍嘿而不對威王固問對曰君次之威王乃懼求之長者得義疇田色而禮之二賢人得史驎趙駢以為諫臣去苛政之三十九以告屠黍屠黍曰其尚終君之身乎曰臣聞之國之興也天遺之賢人與格言格至也國之亡也天與之亂人與善諛之言威王薨肂九月不得𦵏周乃分為二棺柩置地上謂之肂白圭之中山中山之王欲留之白圭固辭乘輿而去又之齊齊王欲留之圭又辭而去人問其故曰二國者皆將亡所舉有五盡矣何謂五盡曰莫之必忠則言盡矣莫之必譽則名盡矣莫之必愛則親盡矣行者無糧居者無食則財盡矣不能用人不能自用則功盡矣國有此五者無倖必亡中山齊皆當此孟子齊人盆成括仕於齊孟子曰死矣盆成括盆成姓括名也嘗欲學於孟子問達未道而去後仕於齊孟子聞而嗟嘆曰死吳盆成括言其必死盆成括見殺門人問曰夫子何以知其將見殺門人問孟子何以知之也曰其為人也小有才未聞君子之大道也則足以殺其軀而已矣淳于髠齊人説鄒忌子必趨出過門而面其僕曰是人者吾語之㣲言且其應我若響之應聲是人必封不久矣齊稷下先生喜議政事鄒忌既為齊相稷下先生淳于髠之属七十二人皆輕鄒忌以為設以為辭鄒忌必不能及相與俱徃見鄒忌淳于髠之徒禮踞鄒忌之禮卑淳于髠等稱辭響忌知之如應響淳于髠等辭詘而去鄒忌之禮踞淳于髠之禮卑故所以尚干將莫邪者貴其立斷也所以尚騏驥者為其立至也必且厯日曠乆則絲釐能挈石駑馬亦能致逺是以聰明㨗敏人之美才也居朞年封以下邳號曰成侯徐子外黄人魏太子申為大將軍過外黄徐子劉叔别錄曰徐子外黄人也外黄時屬朱謂太子曰有百戰百勝之術太子曰可得聞乎客曰固願効之曰太子自將攻齊大勝並莒則富不過有魏貴不益為王若戰不勝齊則萬世無魏矣此臣之百戰百勝之術也太子曰諾請必從公之言而還矣客曰太子雖欲還不得矣彼勸太子戰攻欲啜汁者衆太子雖欲還恐不得矣太子因欲還其御曰將出而還與北同太子果與齊人戰敗於馬陵徐廣曰左元城齊虜魏太子申殺將軍㳙軍遂大敗吴起衞人仕魏治西河之外王錯譛之魏武侯吴起衞人也為魏將善用兵故能治西河之外謂北邊也武侯文侯之子也武侯使人召之吴起至於岸門岸門邑名也上車而望西河泣數行而下其僕謂吴起曰竊觀公之意視釋天下若釋躧釋棄也今去西河而泣何也吳起拭泣而應之曰子不識識知君知我能而使我畢能西河可以王能力也盡力為之可以致君於王也今君聽讒人之議讒人王錯也議言也而不知我西河之為秦不久矣魏國從此削矣秦將取之不復久也魏失西河故從此削弱也吴起果去魏入楚有間西河果入秦秦日益大果猶盡也此吴起之所先見而泣也屈宜臼楚大夫也韓昭侯二十五年旱作高門屈宜臼曰昭侯不出此門何也不時吾所謂時者非時日也人固有利不利時昭侯嘗利矣不作高門徃年秦㧞宜陽今年旱昭侯不以此時䘏民之急而顧益奢此時絀舉贏二十六年高門成昭侯卒果不出此門也秦趙良孝公時商君作相十年宗室貴戚多怨望者趙良見商君商君曰鞅之得見也從孟蘭臯今鞅請得交可乎趙良曰僕弗敢願也孔丘有言曰推賢而戴者進聚不肖而王者退僕不肖故不敢受命僕聞之曰非其位而居之曰貪位非其名而有之曰貪名僕聽君之義則恐僕貪位貪名也故不敢聞命商君曰子不說吾治秦與趙良曰反聽之謂聰内視之謂明自勝之謂彊虞舜有言曰自卑也尚矣君若不道虞舜之道無為問僕矣商君曰始秦戎翟之教父子無别同室而居今我更制其教而為其男女之别大築冀闕營如魯衛矣子觀我治秦也孰與五羖大夫賢趙良曰千羊之皮不如一狐之掖千人諾諾不如一士之諤諤武王諤諤以昌殷紂墨墨以亡君若不非武王乎則僕請終日正言而無誅可乎商君曰語有之矣貌言華也至言實也苦言藥也甘言疾也夫子果肯終日正言鞅之藥也鞅將事子子又何辭焉趙良曰夫五羖大夫荆之鄙人也聞秦繆公之賢而願望見行而無資自鬻於秦客披褐食牛期年穆公知之舉之牛口之下而加之百姓之上秦國莫敢望焉相秦六七年而東征鄭三置晉國之君一救荆國之禍發教封内而巴人致貢施德諸侯而八戎來服繇餘聞之欵關請見韋昭曰欵叩也五羖大夫之相秦也勞不坐乗暑不張盖行於國中不從車乘不操干戈功名藏於府庫德行施於後世五羖大夫死秦國男女流涕童子不歌謡舂者不相杵鄭𤣥曰相謂送杵聲以音聲自勸之也此五羖大夫之德也今君之見秦王也因嬖人景監以為主非所以為名也相秦不以百姓為事而大築冀關非所以為功也刑黥太子之師傅殘傷民以駿刑是積惡蓄禍也教之化民也深於命民之效上也㨗於令今君又左建外易非所以為教也君又南面而稱寡人日繩秦之貴公子詩曰相鼠有體人而無禮人而無禮胡不遄死以詩觀之非所以為壽也公子䖍杜門不出已八年矣君又殺祝懽而黥公孫賈詩曰得人者興失人者崩此數事者非所以得人也君之出也後車數乘從車載甲多力而駢脅者為驂乘持矛而操闟許及切㦸者徐廣曰一作尞屈盧之徑矛干將之雄㦸旁車而趨此一物不具君固不出書曰恃德者昌恃力者亡君之危若朝露尚將欲延年益壽乎則何不歸十五都灌園於鄙勸秦王顯巖穴之士養老存孤敬父兄序有功尊有德可以少安君尚將貪商於之富寵秦國之教畜百姓之怨秦王一旦捐賔客而不立朝秦國所以収君者豈其微哉亡可翹足而待商君弗從後五月而秦孝公卒太子立公子䖍之徒告商君欲反發吏捕商君商君亡至關下欲舍客舍客人不知其是商君也曰商君之法舍人無驗者坐之商君喟然歎曰嗟乎為法之敝一至此哉去之魏魏人怨其敗公子卬而破魏師弗受商君欲之他國魏人曰商君秦之賊秦彊而賊入魏弗歸不可遂内秦商君既復入秦走商邑與其徒屬發邑兵北出擊鄭徐廣曰京兆鄭縣也秦發兵攻商君殺之於鄭黽池徐廣曰黽或作彭秦惠王車裂商君以狥曰莫如商鞅反者遂滅商君之家樗里子卒葬於渭南章臺之東曰後百嵗是當有天子之宫夾我墓樗里子疾室在於昭王廟西渭南陰鄉樗里故俗謂之樗里子至漢興長樂宫在其東未央宫在其西武庫正直其墓秦人諺曰力則任鄙智則樗里宋義楚將也頃梁數破秦軍有驕色宋義諫曰戰勝而將驕卒惰者敗今少惰矣秦兵日益臣為君畏之梁不聽乃使宋義於齊道遇齊使者高陵君顯高陵君名顯琅邪有高陵縣曰公將見武信君乎曰然義曰臣論武信君軍必敗公徐行則免疾行則及禍秦果悉起兵益章邯夜銜枚擊楚大破之定陶梁死范増楚西人鴻門曾勸項羽擊沛公項羽不忍沛公脫去使張良留謝獻璧項羽羽受之又獻玉斗范増増怒撞其斗起曰吾屬今為沛公虜矣漢賈誼文帝時上疏曰今陛下所以為藩扞及皇太子之所恃者惟淮陽王武代王叅二國爾臣願奉淮南地以益淮陽割淮陽北邊二三列城與東郡以益梁從代王而都睢陽於是文帝從誼徙封淮陽王武為梁王又封淮南厲王四子為列侯誼知上將復王之也上疏諫曰此謂假賊兵為虎翼也後文帝末景帝立三年而吴楚趙與四齊王合從舉兵四齊王膠東膠西菑州濟南也西鄉京師郷讀曰嚮梁王扞之卒破七國至武帝時淮南厲王子為王者兩國亦反誅誼至大中大夫穆生楚元王敬禮申公白生穆生穆生不嗜酒元王常為設醴及王戊即位常設後忘設焉穆生退曰可以逝矣醴酒不設王之意怠不去楚人將鉗我於市鉗以鉄束頸也音其炎切稱病臥申公白生彊起之曰獨不念先王之德與與讀曰歟今王一旦失小禮何至此穆生曰易稱知幾其神乎幾者動之微吉㐫之先見者也君子見幾而作不俟終日先王之所以禮吾三子者為道之存故也今而忽之是忘道也忘道之人胡可與久處豈為區區之禮哉遂病去申公白生獨留王戊稍淫暴二十年為薄太后服私姦削東海薛郡乃與吳通謀二人諫不聽胥靡之聨繫相隨而服役之故謂之胥靡猶今之役囚徒以鎻聫綴耳衣之赭衣使杵臼椎舂於市霍光為大將軍張千秋與霍光子禹俱為中郎將將兵隨渡遼將軍范明友擊烏桓還謁大將軍光問千秋與戰鬭方畧山川形勢千秋口對兵事畫地成圖無所忘失光復問禹禹不能記曰皆有文書光由是賢千秋以禹為不材歎曰霍氏世衰張氏興矣及禹誅滅而安世子孫相繼自宣元以來為侍中中常侍諸曹散騎列校尉者凡十餘人徐生茂陵人宣帝時霍氏奢侈徐生上書曰霍氏必亡夫奢則不遜不遜必侮上侮上者逆道也在人之右衆必害之右上也害傷也霍氏乘權日久害之者多矣天下害之而又行以逆道不亡何待乃上疏言霍氏太盛陛下即愛厚之宜以時抑制無使至亡書三上輒報聞其後霍氏誅滅而告霍氏者皆封人為徐生上書曰臣聞客有過主人者見其竈直突傍有積薪客謂主人更為曲突逺徙其薪不者且有火患主人嘿然不應俄而家果失火鄰里共救之幸而得息於是殺牛置酒謝其鄰人灼爛者在於上行行音胡郎切餘各以功次坐而不録言曲突者人謂主人曰郷使聽客之言不費牛酒終亡火患郷讀曰向次下亦同今論功而請賞曲突徙薪亡恩澤焦頭爛額為上客耶主人乃寤而請之今茂陵徐福數上書言霍氏且有變宜防絶之鄉使福說得行則國亡裂土出爵之費臣無逆亂誅滅之敗徃事既亡而福獨不蒙其功唯陛下察之貴徙薪曲突之策使居焦髪灼爛之右帝迺賜福帛十疋後以為郎劉向為宗正王氏專政向數工書言祿去公室權在外家非所以保社稷固後嗣也向卒後十三年王氏果代漢蕭咸前將軍望之子也乆為郡守病免為中郎將兄弟並列董賢父恭慕之欲與結婚姻中常侍王閎為賢弟駙馬都尉寛信求咸女為婦咸惶恐不敢當私謂閎曰董公為大司馬册文言允其中此廼堯禪舜之文非三公故事長老見者莫不心懼此豈家人子所能堪邪閎性有智畧聞咸言亦悟廼還報恭深達咸自謙薄之意恭歎曰我家何用負天下而為人所畏如是哀帝末賢果誅死逢萌北海都昌人為縣亭長去之長安時王莽殺其子宇萌謂友人曰三綱絶矣不去禍將及人即解冠挂東都城門歸將家屬浮海客於遼東萌素明陰陽知莽將敗有頃乃首戴瓦盎哭於市曰新乎新乎因遂潜藏後漢樊宏光武初起破王莽將王尋王邑於昆陽光武兄伯升又抜宛自是兄弟威名益甚更始君臣不自安遂共謀誅伯升乃大會諸將以成其計更始取伯升寶劍視之繡衣御史申徒建隨獻玉玦玦决也令早决斷也更始竟不能發及罷會宏謂伯升曰昔鴻門之會范增舉玦以示項羽今建此意得無不善乎伯升笑而不應後果遇害馬援為伏波將軍卒初兄子壻王磐字子石王莽從兄平陽侯仁之子也莽敗磐推富貲居故國為人尚氣節而愛士好施有名江淮間後㳺京師與衞尉陰興大司空朱浮齊王章共相友善援謂姊子曹訓曰王氏廢姓也子石當屏居自守而反㳺京師長者用氣自行多所陵折其敗必也後嵗餘磐果與司隸校尉蘇鄴丁鴻事相連坐死雒陽獄而磐子肅出入北官及王侯邸第援謂司馬吕种曰建武之元名為天下重開自今以徃海内日當安耳但憂國家諸子並壯而舊防未立若多通賔客則大獄起矣卿曹戒懼之及郭后薨有上書者以為肅等受誅之家客因事生亂慮致貫高任章之變帝怒及下郡縣収捕諸王賔客更相牽引死者以千數吕种亦預其禍臨命嘆曰馬將軍神人也又援初出屯襄國詔百官祖道援謂黄門郎梁松竇固曰凡人為貴當使可賤如卿等不可復賤居髙堅自持勉思鄙言松後果以貴滿致災禍亦幾不免杜安清高絶俗雒陽令周紓數候安安嘗逃避不見時貴戚慕安高行多有與書輒不發以慮後患嘗鑿壁藏書後諸與書者果有大罪推捕所交者吏至門安乃發出書印封如故當時皆嘉其慮逺李邰為漢中戸曹史時大將軍竇憲納妻天下郡國皆有禮慶郡亦遣使邰進諫曰竇將軍椒房之親不修禮德而專權驕恣危亡之禍可翹足而待願明府一心王室勿與交通太守固遣之邰不能止請求自行許之邰遂所在留遲以觀其變行至扶風而憲就國自殺支黨悉伏其誅凡交通憲者皆為免官唯漢中太守不豫焉皇甫規安定朝郡人也永和六年西羌大冦三輔圍安定西征將軍馬賢將諸郡兵擊之不能克規雖在布衣見賢不䘏軍事審其必敗乃上書言狀尋而賢果為羌所没周舉為梁商從事中郎將三月上巳日商大會賔客讌于雒水舉時稱疾不徃商與親暱酣飲極歡及酒䦨唱罷繼以薤露之歌坐中聞者皆為淹涕太僕張种時亦在焉會還以事告舉歎曰此所謂哀樂失時非其所也殃將及乎商至秋果薨申屠蟠游大學先是京師㳺士汝南范滂等非訐朝政自公卿以下皆折節下之太學生爭慕其風以為文學將興處士復用蟠獨歎曰昔戰國之世處士横議列國之王至為擁篲先驅卒有坑儒焚書之禍今之謂矣乃絶迹於梁碭之間因樹為屋自同傭人居二年滂等果罹黨錮或死或刑者數百人蟠超然免於評論劉寛為光禄􅈴以先策黄巾逆謀以事上聞封逯鄉侯六百戸逯音錄陳寔靈帝時竇武辟為掾屬時中常侍張讓權傾天下讓父死歸葬潁川雖一郡畢至而名士無往者讓甚耻之寔乃獨弔焉及後大誅黨人讓感寔故多所全宥華歆平原高唐人與同郡陶丘洪皆知名自以明見過歆時王芬與高傑謀廢靈帝芬呼歆洪共定計洪欲行歆止之曰夫廢立大事伊霍所難芬性踈而不武此必無成而禍將及族子其無往洪從歆言而後芬果敗洪乃服歆後仕魏至司徒盧植為尚書靈帝崩大將軍何進謀誅中官乃召并州牧董卓以懼太后植知卓凶悍難制必生後患固止之進不從及卓至果陵虐朝廷荀彧永漢元年舉孝廉拜守宫令董卓之亂求出捕吏除亢父令遂棄官歸謂父老曰潁川四戰之地也天下有變嘗為兵衝宜避之無久留鄉人多懷土猶豫會冀州牧同郡韓馥遣騎迎之莫有隨者後卓遣李傕等出關東所過虜掠至潁川陳留而還鄉人留者多見殺掠田豐為袁紹謀主紹之南征也豐止之紹不從豐懇諫紹怒甚以為沮衆械繫之紹軍既敗或謂豐曰君必見重豐曰若君有利吾必全今軍敗吾其死矣紹還謂左右曰吾不用田豐言果為所笑遂殺之劉曄淮南成德人廬江太守劉勲兵彊於江淮之間孫策惡之遣使卑辭厚幣以書說勲曰上繚宗民數欺下國忿之有年矣柰道路不便願因大國伐之上繚甚實得之可以富國請出兵為外援勲信之又得策珠寶葛越喜恱外内盡賀曄獨不勲問其故對曰上繚雖小城堅池深攻難守易不可旬日而舉則兵疲於外而國内虚策乘虚而襲我則後不能獨守是將軍進屈於敵退無所歸若軍必出禍今至矣勲不從興兵伐上繚策果襲其後勲窮蹙遂奔曹曄後至大鴻臚魏郭嘉字奉孝潁川陽翟人初北見袁紹為紹謀臣辛評郭圖曰夫智者審於量主故百舉百全而功名可立也袁公徒欲效周公之下士而未知用人之機多端寡要好謀無决欲與共濟天下大難定霸王之業難矣於是遂去之孫策轉鬭千里盡有江東聞太祖與袁紹相持於官渡江北襲許衆聞皆懼嘉料之曰策新并江東所録皆豪傑英雄能得人死力者也然策輕而無備雖有百萬之衆無異於獨行中原也若刺客復起一人之敵耳以吾觀之必死於匹夫之手策臨江未濟果為許貢客所殺嘉為軍祭酒卒裴潜為代郡太守三年還為丞相理曹掾太祖褒稱治代之功潜曰潜於百姓雖寛於諸胡為峻今計者必以潜為理過嚴而事加寛惠彼素驕恣過寛必弛又將攝之以法此怨讟之所由生也以勢料之代必復叛於是太祖深悔還潜之速後數十日三單于反問至乃遣鄢陵侯彰為驍騎將軍征之程昱事太祖為東中郎將時劉備失徐州來歸太祖昱說太祖殺備太祖不聽後又遣備至徐州要擊袁術昱與郭嘉說太祖曰公前日不圖備昱等誠不及也今借之以兵必有異心太祖悔追之不及會術病死備至徐州遂殺車胄舉兵背太祖管寧避地遼東時公孫康已死嫡子不立而立弟恭恭懦弱而康孽子淵有雋才寧曰廢嫡立庻下有異心亂之所由起也乃將家屬乘海即受徵寜在遼東積二十七年乃歸其後淵果襲奪恭位叛國家而南連吴僣稱王明帝使相國宣王徃滅之遼東之死者以萬計如寧所籌周瑜初見袁術術欲以瑜為將瑜觀術終無所成故求為居巢長欲假塗東歸術聽之遂自居巢還吴後至偏將軍晉何曾為太宰侍中薨嘗侍武帝宴退而告子遵等曰國家應天受禪創業垂統吾每宴見未嘗聞經國逺圖惟說平生常事非貽厥孫謀之兆也及身而已後嗣其殆乎此子孫之憂汝等猶可獲沒指諸孫曰此軰必遇亂亡也及孫綏誅死兄嵩哭之曰我祖其大聖乎韋忠有節操家貧藜藿不充人不堪其憂而忠不改其樂裴頠為僕射數言之於司空張華華辟之辭疾不起人問其故忠曰吾茅簷賤士本無宦情且茂先華而不實裴頠貪慾而無厭棄典禮而附賊后若此豈丈夫之所宜行耶裴嘗有心託我嘗恐洪濤蕩嶽餘波見漂况可臨尾閭而闞沃焦哉劉寔為太常妻盧氏生子濟而卒華氏將以女妻之寔弟智諫曰華家類貪必破門戸辭之不得竟婚華氏而生子夏寔竟坐夏賂免官頃之為大司農又以夏罪免山濤年四十始為郡主簿功曹上計掾舉孝廉州辟部河南從事與石鍳共宿濤夜起蹴鑒曰今為何等時而眠耶知大𫝊卧何意鑒曰宰相三不朝與尺一令歸第卿何慮也濤曰咄石生無事馬蹄間耶投傳而去未二年果有曹爽之事羊祐初與王沉俱被曹爽辟沉勸就徵祐曰委質事人復何容易與爽敗沉以故吏免因謂祐曰嘗識卿前語祐曰此非知慮所及其先識不逮如此杜預初為魏鍾會鎮西長史鄧艾平蜀以過檻車以徵及鍾會作亂艾復還將入成都衞瓘遣田續計艾初艾之下江繇也以續不進欲斬既而舍之及瓘遣續謂曰可以報江繇之辱矣杜預言於衆曰伯玉衞瓘字其不免乎身為名士位居摠帥既無德音又不御下以正是小人而乘君子之器將何以堪其責乎瓘聞之不俟駕而謝終如預言蒯欽為引訓少府欽楊駿之姑子也少而相昵直亮不回駿輔政大失人望欽屢以正言犯駿駿之弟珧濟為之寒心欽曰楊文長雖闇猶知人之無罪不可妄殺必當踈我我得踈外可以不與俱死不然傾宗覆族其能久乎董養字仲道陳留浚儀人泰始初到雒陽不干祿求榮及楊后廢養因㳺太學升堂歎曰建斯堂也將何為乎每覽國家赦書謀反大逆皆赦至於殺祖父母父母不敢赦者以為王法所不容也柰何公卿處議文飾禮典以至於此乎天人之理既滅大亂作矣因著無禮論以非之馬隆泰始中稍遷司馬督郵初凉州刺史楊欣失羌戎之和隆陳其必敗俄而欣為虜所滅索靖拜酒泉太守有先識逺量惠帝即位知天下將亂指雒陽宫門銅駝歎曰會見汝在荆棘中耳何綏字伯蔚位至侍中尚書自以繼世名貴奢侈過度性既輕物廢禮簡傲城陽王尼上綏書疏謂人曰伯蔚居亂而矜豪乃爾豈其免乎人曰伯蔚聞言必相危害尼曰伯蔚未聞我已死矣未幾綏果為東海王越所殺江統為山陰令時關隴屢為氐羌所擾孟觀西討日擒氐帥齊萬年統深恨四夷亂華宜杜其萌乃作徙戎論上之惠帝不能用未及十年而夷狄亂華時人服其深識王敦為中書監時東海王越自滎陽來朝敦謂所親曰今威權悉在太傅而選用表請尚書猶以舊制裁之太傅今至必有誅罰俄而越収中書令繆播等十餘人殺之郭璞以母憂去職未朞王敦起璞為記室參軍是時潁川陳述為大將軍掾有美名為敦所重未幾而没璞哭之哀甚呼曰嗣祖嗣祖焉知非福未幾而敦作難孔坦為尚書左丞蘇峻反坦謂人曰觀峻之勢必破䑓城自非戰士不須戎服既而臺城䧟戎服者多死白衣者無他時人稱其先見劉琰為丹陽尹毎竒桓温才而知其有不臣之迹及温為荆州還琰言於簡文曰温不可使居形勝地其位號常宜抑之勸簡文自鎮上流而已為軍司帝不納又請自行復不聽及温伐蜀時咸謂未易可制惟琰以為必尅或問其故琰云以蒱博驗之其不必得則不為也恐温終專制朝廷及後竟如言前凉張寔平麴儒徙元惡六百餘家治中令狐劉曰夫除惡人猶農夫之去草令絶其本勿使能滋今宜悉徙以絶後患寔不納儒黨果叛寔討平之後趙石勒年四十隨邑人行販雒陽倚嘯上東門王衍見而異之顧謂左右曰向者胡雛吾觀其身視有竒志恐將為天下之患馳遣収之會勒已去前燕慕容雋終慕容輿慕容根與皇甫真慕容恪等俱受顧托輿根將謀為亂真陰察知之乃言於恪請除之恪未忍顯其事俄而根誅發伏謀恪謝真曰不從君言幾成禍敗南燕慕容盛字道運寶之庶長于少沉敏多謀畧苻堅誅慕容氏盛潛奔于冲及冲稱尊號有自得之志賞罰不均政令不明盛年十二謂叔父柔曰今中山王智不先衆才不出下恩未施人先自驕大以盛觀之鮮不覆敗俄而冲為叚未延所殺中山冲所封也後蜀李雄將立兄蕩子班為太子李驤諫不從竟立班驤退而流涕曰亂自此始矣雄死班立為雄子越所殺宋蔡興宗為吏部侍郎時廢帝即位興宗親奉璽綬廢帝容色自若了無哀貌興宗出謂親故曰魯昭在戚而有嘉容終之少禮結大臣昭子請死國家之禍其在此乎南齊垣崇祖下邳人宋孝建中州辟主簿後軍伯父豫州刺史䕶之子襲祖為淮陽太守宋孝武以事徙之嶺南䕶之不食而死帝疾篤又遣使殺襲祖臨死與崇祖書曰弟嘗勸我危行言遜今果敗矣王思逺為司徒左長史初明帝廢立之際思逺謂兄晏曰兄荷武帝厚恩今一旦賛人如此事彼可以權計相須未知兄將何以自立及此引决猶可保全門戸不失後名晏曰方噉粥未暇此事及拜驃騎㑹子弟謂思逺兄思徵曰阿戎勸吾自裁若用其語豈有今日思逺遽應曰如阿戎所見猶未晚也晏既不能謙退位處朝端事多專斷内外要職並用門生帝外迹甚美内相疑異思逺謂曰時事稍異兄弟覺不凡人多拙於自謀而巧於謀人晏黙不答思逺退後晏方歎曰天下人遂勸人自殺旬日晏及禍明帝後知思逺有此言謂江祐曰王晏早用思逺語當不至此乃遷侍中阮孝緒屏居一室家人莫見其面親友因呼為居士外兄王晏貴顯屢至其門孝緒度之必至顛覆嘗逃匿不與相見曾食醬美問之云是王家所得便吐飱覆醢及晏誅其親戚咸為之懼孝緒曰親而不黨何坐之及竟獲免江淹為秘書丞齊永元中崔崇景舉兵圍京城衣冠悉投名刺淹稱疾不徃及事平世服其先見梁昌義之為北徐州刺史武帝崇佛道至於祭祖禰不設牲牢義之聞之曰雖僭同王者然其宗廟實不血食祭上祖須血食古禮百王不易時武帝祖父墓前一旦失石鹿義之告有職者曰蕭祚將盡乎後果為侯景所滅王侯妃主及裔胄子弟為景軍所掠漂流入他國者盖數十萬義之亦歸于陳何敬容為侍中侯景於渦陽退敗未得審實傳者乃云其將慕顯及景身與衆共没朝廷以為憂敬容等見東宫太子謂曰淮此始更有信侯景定得身免不如所得敬容對曰得景遂死深是朝廷之福太子失色問其故敬容曰景翻覆亂臣終當亂國陳虞寄家閩中陳寳應據有閩中寄寳應所留及寶應起兵作逆有沙門惠標作五言詩以送之曰送馬猶臨水離旗稍引風好㸔今夜月當入紫薇宫寳應得之甚悦惠標齎以示寄寄一覽便止正色無言惠標退寄謂所親曰標公既以此始必以此終標後竟坐是終寄至昭戎將軍加大中大夫後魏高允為中書侍郎領著作與司徒崔浩述成國記時著作令史閔湛勸浩刋所撰國史于石以彰直筆允聞之謂著作郎朱欽曰聞湛所營分寸之間恐為崔門萬世之禍吾徒無噍類矣未幾而難作浩竟族滅餘皆身死宋欽臨刑歎曰高允其殆聖乎穆多侯為司衞監孝文宋乙渾專權時司徒陸麗在代郡温湯療病渾忌之遣多使追麗多侯謂麗曰渾有無君之心大王衆所望也去必危宜徐歸而圖之麗不從遂為渾所害多侯亦見殺諡曰烈北齊陽休之右北平為州主簿後魏孝昌中杜雒周破城休之與宗室及鄉人數千家南奔章武轉至青州是時葛冦亂河北流民多凑青部休之知將有變乃請其族叔伯彦等曰客主勢異競相凌侮禍難將作如鄙情所見宜潛歸京師避之諸人多不從休之垂涕别去俄而邢杲作亂伯彦等咸為士民所殺一時遇害諸陽死者十人唯休之兄弟獲免後周薛整為大將軍晉公䕶之初執政也欲委整以腹心整知亂辭不敢當頗忤其意䕶以此踈之及䕶誅附㑹者咸伏法而整獨保全時人稱其先覺姚僧垣仕梁為晉安王府諮議其時雖克平大亂而任用非才朝政混淆無復紀綱僧垣深憂謂親故曰吾觀此形勢禍敗不久今時上策莫若杜門聞者皆揜口竊笑及大軍克荆州僧垣侍元帝不離左右為軍人所止涕泣而去入仍為上開府儀同大將軍隋韋鼎初仕陳為大府卿後主至德初鼎盡貨田宅寓居僧寺友人大匠卿毛彪問其故答曰江東王氣盡於此矣吾與爾當葬長安期運將及故破産耳源師字踐言初仕齊為外兵郎中又攝祠部後屬孟夏以龍見請雩時高阿那肱為相謂真龍出見大驚喜問龍所在師整容報曰此是龍星初見依禮當雩祭郊壇非謂真龍别有所降阿那肱忿然作色曰何乃先知星宿祭竟不行師出而竊歎曰國家大事在祀與戎禮既廢也其能久乎齊亡無日矣唐劉幽求初為朝邑尉桓彦範敬暉等雖誅張易之兄弟而不及武三思幽求謂桓敬等曰莽操雖去産祿猶存噬臍無及桓敬不能從後果為三思誣搆死于嶺外田庭玠為相州刺史建中初族弟恱代承嗣為魏博節度志圖兇逆慮庭玠不從召為節度副悅奸謀頗露庭玠謂悦曰爾藉祖父遺業可禀受朝廷法度坐享富貴何若與鎮鄆同為叛臣耶自兵亂以來謀叛國家者可以厯數鮮有保完宗族者爾若狂志不悛可先殺我無令我見田氏之赤族也乃謝病不出恱過其第而謝之庭玠杜門不納將吏請謁建中三年鬱憤而卒皇甫鏞為河南少尹時兄弟為宰相領度支恩寵殊異鏞惡其太盛毎兄弟讌語即極言之鏄頗不悦乃求分司除右庶子及鏄獲罪朝廷素知鏞有先見之明不之罪徴為國子祭酒梁趙犨唐末為忠武軍節度使雖盡忠唐室保全陳州然黙識太祖雄傑毎降心託跡為子孫之計故因解圍之後以愛子結親又請為太祖立生祠於陳朝夕謁拜數年之間悉力委輸凡所徵調無不率先故能保其功名後唐許寂字閑閑久棲四明山不干時譽唐昭宗聞其名徵赴闕召對於内殿昭宗方與伶人調品篳篥事訖方命坐賜湯果問易義既退寂謂人曰君在淫聲不在政矣寂聞君人者將昭德塞違以臨炤百官百官或象之今不厭賤事自求其工君道替矣尋請還山晉安元信唐清泰三年遷雄義都指揮使授詔屯於代州代守張郎遇之甚厚元信亦以兄事之是嵗五月高祖建義於太原俄聞北敵有約赴難元信入說郎曰張敬逹雖圍晉陽而兵尚未合代郡當雁門之衝虜至其何以禦僕觀石令公素長者舉必成事若使人道意歸欵示其兩端亦永全之上策也郎不納張礪為戎王翰林學士開運末與虜居南松門之内軒轡交織多繼燭接洽無厭倦色因密言曰此胡用法如此豈能久處漢地及北去道路有觴酒豆肉必遺故客屬僚死之日囊裝惟酒食器皿而已識者無不高之册府元龜卷七百九十六
