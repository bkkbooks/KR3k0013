body:
  text: 册府元龜卷七百八十三宋王欽若等撰總録部世德兄弟齊名世德詩曰維其有之是以似之傳曰世濟其美不隕其名斯皆錫羨餘慶象賢秉哲奕世載德克篤前烈之謂也中代已降宗冑𣲖别家聲系譜叅諸簡册乃有學古從政繼志隆業貞固以幹事端謹而植操篤守忠孝敦尚儒雅方正無撓謙恭不競奉身以約處衆以亷行能傑出知用周逹義風英烈耀映前後以至爵秩通貴名望充塞無忝爾祖能世其家業素彌邵淑聲載路為論者之歎服增士倫之景行信可以懲激㐫族而敦厲衰緒者矣隰叔子違周難於晉國生子輿為大理士蒍也以正於朝朝無姦官為司空以正於國國無敗績世及武子佐文襄於諸侯諸侯無二心士蒍生成伯缺缺生士㑹漢石奮孝文時官至大夫恭謹學無與比長子建次乙次慶皆以馴行孝謹至二千石金日磾武帝時為侍中著忠孝節日磾子安上少亦為侍中惇篤有智安上子敞元帝時為中郎將侍中帝晏駕故事近貴隨陵為園郎敞以世名忠孝太后詔留侍成帝為奉車水衡都尉敞為人正直敞子渉明經節儉諸儒稱之官至長信少府王崇為大司空御史大夫駿之子昌邑中尉吉之孫也自吉至崇世名清亷然材噐名稱稍不能及父而禄位彌隆翟方進經學明習内行脩飾成帝時為丞相子宣亦明經篤行君子人也及方進在為關都尉南郡太守言方進未死之時宣己為此官方進少子義所居著名有父風烈後漢亷范曾祖父褒成哀間為右將軍祖父丹王莽時為大司馬庸部牧皆有名前世陸康字季寕吳郡吳人父褒有志操連徵不至康少仕郡以義烈稱桓榮子郁郁孫鸞曾孫彬郁中子焉孫典鸞孫曄郁孫麟並有名行自榮至典父子兄弟代作帝師爰延清苦好學能通經教質慤少言桓帝時位大鴻臚子驥白馬令亦稱善士郭賀字喬卿雒陽人祖父堅伯父游君並脩清節不仕王莽周舉子勰曾祖父楊至勰孫恂六世一身皆知名舉官終光禄大夫仇覽五子皆有文史才少子元最知名覽嘗為考城主簿陳球厯世著名為永樂少府球子瑀吳郡太守瑀弟琮汝隂太守弟子珪沛相珪子登廣陵太守並知名謝承後漢書陳瑀舉孝亷辟公府雒陽市長後辟太尉府未到永漢元年就拜議郎遷吳郡太守不之官球兄子珪字漢瑜舉孝亷劇令去官舉茂才濟北相珪子登字元龍學通今古處身循理非法不行性兼文武有雄姿異畧領廣陵太守魏志曰珪在廣陵有威名有功加伏波將軍年四十卒楊震少子奉奉子敷篤志慱聞議者以為能世其家震中子秉秉子賜賜子彪自震至彪四世太尉德業相繼與袁氏俱為東京名族華嶠書曰東京楊氏袁氏累世宰相為漢名族然袁氏車馬衣服極為奢僣能守家風為世所貴不及楊氏也伏湛瑯琊東武人九世祖勝所謂濟南伏生者也湛光武時為大司徒封陽侯卒二子隆翕嗣爵卒子光嗣光卒子晨嗣晨卒子無忌嗣無忌卒子質嗣質卒子完嗣自伏生以後世傳經學清靜無競故東州號為伏不鬬徐穉字孺子豫章南昌人恭儉義讓所居服其德屢辟公府不起卒子裔篤行孝弟亦隠居不仕陳禪巴郡安漢人仕郡功曹舉善黜惡為邦内所畏至順帝時為司𨽻校尉子澄有清名官至漢中太守曾孫寳亦剛壯有禪風為州别駕從事顯名州里李固漢中南鄭人父邰為司徒邰通五經外質朴人莫識固究覽墳籍結交英賢四方有志之士多慕其風而來學京師咸歎曰是復為李公矣言繼其父為公沖帝即位以固為太尉與梁冀㕘録尚書事及帝晏駕固以清河王蒜年長有德欲立之冀不從乃立樂安王子纉年八嵗號為質帝固子燮為安平嵗相先是安平王續在國無政為妖賊角所畧國家贖王得還朝廷議復其國燮上奏曰續在國無政為妖賊所虜守藩不稱損辱聖朝不宜復國時議者不同而續竟歸藩燮以謗毁宗室輸作左較未滿嵗王果坐不道被誅乃以燮為議郎京師語曰父不肯立帝子不肯立王吳祐長子鳯官至樂浪太守少子愷新息令鳯子馮鮦陽侯伯鮦陽縣屬汝南郡皆有名於世陳留耆舊傳曰鳯字君雅馮字子高陳寔為太丘長子紀為大鴻臚紀子羣魏司空羣子秦為左僕射四世於漢魏二朝並有重名而其德漸漸小減時人為之語曰公慙卿卿慙長紀弟諶字季方與紀齊德同行父子並著高名時號三君每宰府辟召嘗同時旌命羔㕍成羣當世者靡不榮之諶早終先賢行狀曰豫州百城圖畫實紀諶形像焉荀淑字季和潁川潁隂人少有高行愽學而不好章句鄉里知名有子八人號曰八龍緄生衍衍子紹位至太僕紹子融字伯雅與王弼鍾㑹俱知名為雒陽令參大將軍軍事與弼㑹論易著義傳於世荀氏家傳曰懌字長倩俁字叔靖詵字曼倩俁子寓字景伯世語曰寓少與裴楷王戎杜黙俱有名京邑仕晋位至尚書名甚顯著子嗣位至尚書魏鮑勛漢司𨽻校尉宣之九世孫勛父信靈帝時為騎都尉信父丹官至少府侍中世以儒雅顯袁渙陳郡扶樂人漢司徒滂之子滂素寡慾終不言人之短渙清净舉動必以禮太祖時為郎中令行御史大夫事渙子侃亦清粹閑素有父風厯位郡守尚書袁氏世紀曰渙有四子侃寓奥準侃字公然論議清當柔而不犯善與人交在廢興之間人之所趣務者嘗謙退不為也時人以是稱之厯位黄門選部郎考為清平稍遷至尚書早卒寓字宣厚精辯有機理好道家之言少被病求官而卒奥字公榮行足以厲俗言約而理當終於光禄勲準字孝尼忠信公正不恥下問唯恐人之不勝已以世事多險政常恬退而不敢求進著書十餘萬言論治世之務為易周官詩傳於世此準之自序也荀綽九州記稱準有雋才泰始中為給事中袁氏子孫世有名位貴達至今劉馥沛國相人漢末為揚州刺史子靖文帝黄初中為鎮北將軍靖子熈嗣建成鄉侯熈弟宏晉武帝為車騎大將軍自馥至宏世不曠名而有政事才劉邠本名炎犯晉太子諱改邠位至太子僕子粹字純嘏至侍中次宏字終嘏至太常次漢字仲嘏至光禄大夫漢清沖有貴識名亞樂廣宏子咸徐州刺史次耽晉陵内史耽子惔字真長尹丹陽中興名士也管寕北海朱虛人齊相管仲之後其先田氏有齊而管氏去之或適魯或適楚漢興而管少卿為燕令始家朱虛世有名節九世而生寕正始中特具安車蒲輪束帛加璧聘焉㑹寕卒鄭渾字文公河南開封人髙祖父衆為漢太師衆父興為諫議皆為名儒渾官至侍御史加駙馬都尉為陽平沛郡二太守蜀張翼犍為武陽人髙祖父司空浩曾祖父廣陵太守綱皆有名迹翼位至左車騎將軍領冀州刺史譙周巴西西充國人也貎體專朴椎誠不飾潛識内敏晉泰始中拜騎都尉少子同亦以忠篤質素為行舉孝亷謝炤幼以仁孝為行明達有才令弟貞履蹈法度篤學尚義舉孝亷吳虞翻㑹稽餘姚人官至騎都尉子氾最知名為散騎常侍氾弟忠貞固幹事為宜都太守忠子潭字思奥清身有簡操外如退弱内堅正有膽幹仕晉厯位内外終於衞將軍賀齊為將子達及景皆有令名為佳將陸遜吳郡吳人為上大將軍祖紆字叔盤敏淑有思學守城門校尉父駿字季才淳懿信厚為邦族所懐官至九江都尉晉華表平原高唐人父歆清德高行為魏太尉表以苦節埀名官至太常卿子廙宏敏有才義廙位光禄大夫開府儀同三司弟嶠才學深博少有令問為内䑓中書散騎著作廙子混清真簡正位至侍中尚書羊祜字叔子泰山南城人世吏二千石至祜九世並以清德聞祖續仕漢南陽太守父衜上黨太守祜位征南大將軍胡威父質以忠清著稱仕魏至荆州刺史威早厲志尚質之為荆州也威自京定省十餘日告歸父賜絹一疋為裝威曰大人清髙不審於何得此質曰是吾俸禄之餘威受之其父子清慎如此盧欽范陽涿人位尚書僕射祖植性剛毅有大節為漢侍中父毓魏司空少居名位不顧財利清虛淡泊動循禮典欽清澹有遠識范粲字承明陳留外黄人漢萊蕪長丹之孫也髙亮貞正有丹風束晳字廣㣲祖混隴西太守父龕馮翊太守並有譽名韓夀魏司徒曁之孫侍御史洪之子自曁以下世治素業夀能敦尚家風龔元之武陵漢夀人也好學潛黙州舉秀才公府辟不就武帝詔徵散騎常侍領國子祭酒不行弟子元夀亦有德操高尚不仕舉秀才及州辟召並稱疾不就帝以太學博士散騎侍郎給事中累徵遂不起許竒字子泰弟猛子豹魏尚書允之子也並有治理才學竒為司𨽻校尉猛為幽州刺史竒子遐字思祖以清尚稱位至侍中猛子式字儀祖有才幹至濮陽内史平原太守裴秀河東聞喜人時稱後進領袖位僕射秀子頠雅有遠識為僕射頠子嵩有父祖風庾峻潁州鄢陵人也祖乘才學洽聞漢司徒辟有道徵皆不就伯父嶷中正簡素仕魏為太僕父道亷退貞固養志不仕牛馬有踶齧者恐傷人不貨於市及諸子貴賜拜大中大夫峻少好學有才思嘗㳺京師魏散騎常侍蘓林老疾在家往候之林嘗就乘學見峻流涕良乆曰尊祖高才而性退讓慈和汎愛清靜寡慾不營當世惟脩德行而已鄢陵舊五六萬户聞今裁有數百君二父孩抱經亂獨至今日尊伯為當世令器君兄弟復俊茂此尊祖積德之所由也位至常侍潘尼位太常卿祖曰助漢東海相父滿平原内史並以學行稱郭荷字承休雒陽人六世祖整漢安順之世公府八辟公車五徵皆不就自整及荷世以經學致位荷明究羣籍特善史書不應州郡之命楊佺期宏農華隂人漢太尉震之後曾祖準為太常自震至準七世有名德祖林少有才望值亂没胡父亮少仕偽朝後歸國終於梁州刺史以貞幹知名袁質陳郡陽夏人五世祖渙魏郎中令自渙至質並以道素繼業惟其父耽以雄豪著質又以孝行稱厯瑯琊内史東陽太守劉邁琨之祖也有經國之才為相國叅軍散騎常侍琨父蕃清高沖儉位至光禄大夫滿奮寵之孫也寵仕魏為太尉奮官至尚書令司𨽻校尉性清平有識簡體量通雅有寵風吳隠之為廣州刺史清操踰厲常食不過菜及乾魚而已子延之復厲清操為鄱陽太守延之弟及子為郡縣者常以亷慎為門法雖才學不逮隠之而孝悌㓗敬猶為不替王承字安期父湛祖昶自昶至承世有髙名論者以為祖不及孫孫不如父承為元帝鎮東府從事中郎而卒孔愉字敬康㑹稽山陰人其先世居梁國曾祖潛太子少傳漢末避地㑹稽因家焉祖竺吳豫章太守父恬湘東太守從兄侃大司農俱有名江左瞿陽潯陽人也篤行純素仁讓亷潔康帝以散騎常侍徵不至莊公車徵不至莊子矯亦有髙操屢辭辟命矯子法賜孝武帝以散騎郎徴亦不至世有隠行戴逵累徵散騎常侍不就逵卒長子勃有父風安帝義熈初以散騎侍郎徵不起范宣髙潔不就徵嘗以講誦為業子輯厯守國子博士大將軍從事中郎自免歸亦以講授為事義熈中連徴不至宋袁湛字士深陳郡陽夏人也祖耽厯陽太守父質瑯琊内史並知名南齊劉瓛沛國相人也晉丹陽尹惔六世孫惔少清遠有標寄為政清整瓛舉秀才丹陽尹袁粲於後堂夜集瓛在坐粲指庭中栁樹謂瓛曰人謂此是劉尹時樹每想髙風今復見卿清德可謂不衰矣潘詞為髙平太守有清節子亮為昌慮令亦著亷名郭原平有孝行為鄉里所宗父世道亦以至行旌表門閭原平三子一弟並著門行長子伯林舉孝亷次子靈馥舉儒林祭酒皆不就王秀之祖裕性貞正徐羨之傳亮當朝裕不與來徃及致仕隠吳興與秀之父瓉之書曰吾欲使汝處不競之地瓉之厯官至五兵尚書未嘗一詣朝貴江湛謂何偃曰王瓉之今便是朝隠及桞元景顔師伯令僕貴要瓉之竟不候之至秀之為尚書又不與令王儉欵接三世不事權貴時人稱之梁劉敞字士光祖乘民宋冀州刺史父懐慰齊正員郎世為二千石皆有清名王志字次道瑯琊臨沂人祖曇首宋左光禄大夫豫寕文侯父僧䖍齊司空簡穆公並有重名謝朏字敬沖陳郡陽夏人也祖宏㣲宋太常卿父莊右光禄大夫並有名前代傅岐字景平北地靈州人祖琰齊世為山隂令有治能自縣擢為益州刺史翽武帝時厯山隂建康令亦有能名官至驃騎諮議陳張稚才少孤介特立為太常卿子周還為司農廷尉卿所厯並以清白稱蕭𢎞宗族子弟多以德行知名弟彤以悟靜好學官至太子中庶子南康王長史宻字士機幼而聰敏博學有文詞祖琛梁特進少而朗悟有縱横才宏為吏部郎中後魏穆夀父觀封宜都王明元時縂攝朝政事無巨細皆關決焉夀明敏有父風太武愛重之擢為下大夫張蒲字元則河内脩武人父攀慕容埀御史中丞兵部尚書以清方稱蒲少有父風頗渉文史以端謹見知為相州刺史卒盧度世寕朔將軍兼散騎常侍元之子也少以學行為時流所重子淵昶等並循父風遠親踈屬叙為尊行長者莫不異拜致敬閨門之禮為世所推度世為青州刺史卒後周張元字孝始河北芮城人祖成假平陽郡守父廷雋仕州郡累為功曹主簿並以純至為鄉里所推元性謙謹有孝行不仕而卒王褒字子淵曾祖儉齊侍中太尉南昌文尉公祖騫梁侍中金紫光禄大夫南昌安侯父規梁侍中左民尚書南昌章侯並有重名於江左褒位至宜州刺史唐蕭德言曾祖思話齊尚書右僕射祖介梁都官尚書父宏陳吏部侍郎並有名當代德言官終銀青光禄大夫虞世南字伯施越州餘姚人祖簡梁始興王諮議父荔陳太子中庶子俱有重名世南終秘書監禇亮字休明為銀青光禄大夫宏文舘學士曾祖湮梁御史中丞祖蒙太子中書舍人父玢陳祕書監並著名前史韋虗心父維為左庶子伯湊河南尹皆以忠正聞虗心舉孝亷累至侍御史中宗時推按太尉時僕射竇懐忠侍中劉幽求意欲寛假虗心堅執法令有不可奪之志于休烈官至工部尚書卒嗣子益次子肅相繼為翰林學士父子儒行著聞肅子敖以家世文史盛名志行二為列曹侍郎崔渙博陵人祖元暉父􅟛並先朝名臣渙少以士聞博綜經籍尤善談論累遷尚書司門員外郎楊綰字公權華隂人祖温玉則天朝為户部侍郎國子祭酒父侃開元中醴泉令皆以儒行稱綰終於相位穆贊河南人父寕有名節贊雅嗣其門風終於宣州觀察使李藩少恬淡脩簡雅容儀好學祖奢及曾祖至遠皆以志行名重一時父承為湖南觀察使亦有名藩為相終高霞寓范陽人祖先父栖鶴皆以孝聞凡五代同爨德宗朝採訪使洪經綸奏旌表其門至今鄉里共稱其事霞寓位至右金吾衛大將軍蕭俛官至左僕射致仕家代有忠節祖父國初宋國公瑀肅宗朝徐國公華德宗門下侍郎平章事復悉以剛鯁不附權倖載名國史至俛之行止當澆末囂競之俗可謂冠被當時比肩於前代名臣薛廷老故給事中存誠之子存誠憲宗時有重名廷老少有令譽頗得父風文宗初為右拾遺後唐崔協曾祖邠為太常卿祖瓘吏部尚書咸有名德朝議稱仰協終相位晉鄭受益唐宰相餘慶之曾孫也餘慶生澣澣生從讜從讜兄處誨汴州節度使家襲清儉深有士風中朝禮法以鄭氏為甲處誨生受益受益亦以文學身累厯䑓閣兄弟齊名天以剛健純粹之氣賦于人者幾希而昆弟競爽益為希矣乃有善慶之胄髦英間出同氣至親馳聲並騖或以行義著或以才藻聞或以吏幹俱仕或以武經偕用或孝友藹於宗黨或風規邁於儕伍詵詵之盛幾至於七八者焉詩曰原隰裒矣兄弟求矣盖原隰相聚而能定高下之名兄弟相求亦能立榮顯之譽三代而下咸用詮次焉周有八士伯達伯适仲突仲忽叔夜叔夏季隨季騧周時四乳生八子皆為顯士蘓秦弟蘓代蘓厲兄弟三人皆㳺說諸侯以顯秦終於齊相漢季布楚人為任俠有名弟季心氣盖關中遇人恭謹為任俠當是時季心勇布以諾聞關中布位河東守馮立與兄野王相代為西河上郡太守民歌之曰大馮君小馮君兄弟繼踵相因循聰明賢知惠吏民政如魯衞德化鈞周公康叔猶二君鄭昌字次卿弟宏字穉卿俱明經通法律政事昌為太原涿郡太守宏為南陽太守皆著治迹條教法度為後所述後漢馬嚴字威卿援之子仕郡督郵援嘗與計議委以家事嚴弟敦字孺卿亦知名援卒後嚴乃與敦俱歸安陵居鉅下三輔稱其義行號曰鉅下二卿韋義字季卿京兆杜陵人兄順字叔文為平輿令有高名次兄豹字季明累辟公府最以事去義少與二兄齊名賈彪字偉節兄弟三人並有高名而彪最優故天下稱曰賈氏三虎偉節最怒彪位新息長劉才寵之弟為山陽太守有二子岱字公山繇字正禮兄弟齊名稱平原陶丘洪薦繇欲令舉茂才刺史曰前年舉公山今何復舉正禮洪曰若使明君用公山於前擢正禮於后所謂御二龍於長途騁騏驥於千里不亦可乎荀淑字季和為朗陵令有子八人儉緄靖燾注爽肅專並有名稱時人謂八龍或問汝南許章曰爽與靖孰賢章曰皆玉也慈明外朗叔慈内潤慈明爽字叔慈靖字許劭字子將潁川平輿人與兄䖍並知名汝南人稱平輿淵有二龍馬平輿故城今潁川汝陽縣東北有二龍鄉月旦里又劭與從兄靖少俱知名並有人倫臧否之稱劭司空楊彪辟舉方正敦樸皆不就陳紀及弟諶皆有盛名冠當時位大鴻臚魏司馬朗字伯達懿字仲達孚字叔達馗字季達恂字顯達進字惠達通字雅達敏字要達俱知名故時號為八達焉朗位兖州刺史應劭弟恂子瑒瑒弟璩咸以文章顯劭位袁紹軍謀校尉蜀諸葛喬字伯松亮兄瑾之第二子也本字仲愼與兄元遜俱有名於時論者以謂喬才不及兄而學業過之喬後拜駙馬都尉李朝字偉南弟邵字永南又一弟早亡各有才望時人號之李氏三龍馬良字季常襄陽宜城人兄弟五人並有才名鄉里為之諺曰馬氏五常白睂最良良睂中有白毛故以稱之良位侍中晉繆休祖安平獻王外孫也與從兄播名譽略齊休祖位太僕卿張載字孟陽弟協字景陽亢字季陽皆有重名亢才藻不逮二昆亦有屬綴又解音樂伎術時人謂之三張載位中書侍郎陸機字士衡弟雲字士龍吳丞相抗之子兄弟齊名雲雖文章不及機而持論過之號曰二陸太康末與弟雲俱入雒造太常張素重其名如舊相識曰伐吳之役利獲二俊機位平原内史武陵字元夏沛國竹邑人沉敏有識量早獲時譽與二弟韶叔夏茂季夏並總角知名雖諸父兄弟及鄉閭宿望莫能覺其優劣同郡劉公榮有知人之鍳嘗造周周見其三子焉公榮曰皆國士也元夏最優有輔國之才陳力就列可為亞公叔夏季夏不減常伯納言也陵位開府儀同三司束晳字廣㣲博學多聞與兄璆俱知名晳位尚書郎王導二弟頴敞少與導俱知名時人以頴方温太真以敞比鄧伯道導位至丞相胡奮兄弟六人兄廣弟烈並知名廣字宣祖位至散騎常侍少府温羨字長卿兄弟六人並知名於世號曰六龍羨位至司徒劉宏字終嘏為光禄勲兄粹字純嘏為侍中弟潢字仲嘏為吏部尚書並有名中朝時人語曰雒中雅雅有三嘏桓嗣字恭祖征西大將軍豁弟沖之子少有清譽與豁子石秀並為桓氏子姪之冠嗣位江夏相顔含三子髦為侍中光禄勲謙至安成太守約零陵太守並有聲譽荀闓荀䆳大寜中過江明帝嘗從容問王廙曰二荀兄弟孰賢廙荅以闓才明過䆳帝以語庾亮曰䆳眞粹之地亦闓所不及繇是議者莫能定其兄弟優劣卞粹字元仁以清辨鑒察稱兄弟六人並登宰相府世稱卞氏六龍元仁無雙觧系及二弟結育並清身潔已甚得聲譽系至雍州刺史王珣小字法䕶弟珉小字僧彌少有才藝善行書名出珣右時人為之語曰法䕶非不佳僧彌難為兄珣位散騎常侍孔安國廣州刺史注之弟年少諸兄三十餘歲群從諸兄並乏才名以富彊自立唯安國與注少厲孤貧之操注既以直亮稱安國亦以儒素顯安國位至左僕射宋王球字倩王瑯琊臨沂人太常惠從父弟與惠齊名球位尚書僕射張暢字少㣲吳郡人少與從兄敷齊名為後進之秀暢位㑹稽太守張岱吳郡人少與兄太子中書舍人演新安太守鏡征北將軍永弟廣州刺史辨俱知名謂之張氏五龍演鏡名最高永辨岱不及也劉善明為青冀二州刺史弟僧副與善明俱知名於州里戴法興二兄延夀延興並脩立延夀善書法興好學山隂有陳戴者家富有錢三千萬鄉人咸云戴碩子二兒敵陳戴三千萬錢法興位越騎校尉南齊沈沖與兄淡淵名譽有優劣世號為腰鼓兄弟沖位五兵尚書陸惠曉三子僚任倕並有美名時人謂之三陸初授惠曉兖州三子依次第各作一讓辭並雅麗時人歎服梁張稷性䟱率朗悟有子路風與族兄充融卷等俱知名時稱之曰充融卷稷是為四張稷位鎮北將軍樂法才字元簡幼與弟藏俱有美名法才位江夏太守到漑少孤貧與弟洽俱聰敏有才學早為任昉所知繇是聲名益廣漑位散騎常侍事韋叡與兄纂闡並早知名叡位䕶軍王筠字元禮清净好學與從兄泰齊名陳郡謝覽覽弟舉亦有重譽時人為之語曰謝有覽舉王有養炬炬是泰養即筠並小字也位太子詹事謝舉字言揚中書令覽之弟也幼好學能清言與覽齊名覽嘗侍宴華林園高祖問舉於覽覽對曰識藝過臣甚逺唯飲酒不及於臣高祖大恱江淹一見並相欽挹曰所謂馭二龍於長途者也舉位尚書令劉孝綽之弟孝勝與兄孝儀弟孝威孝先並善五言詩見重於世孝綽嘗云三筆六詩三即孝儀六謂孝威也孝綽又與從弟孺苞齊名苞早卒孺亦貴顯孝綽位秘書監蕭子範少與弟子顯子雲才名略相比而風彩容止不逮故宦途有優劣每讀漢書杜綬兄弟五人至大官唯中弟欽官不至而最知名嘗吟諷之況已也子範位光禄大夫江革為征北記室叅軍弟觀為行叅軍兼記室時吳興沈約樂安任昉並相賞重昉與革書云此段雍府妙選英才文房之職總卿昆季可謂馭二龍於長途騁騏驥於千里栁惔世隆之子少與長兄恱齊名王儉謂人曰栁氏二龍可謂一日千里儉為尚書左僕射嘗造世隆宅世隆謂為詣已徘徊乆之及至門唯求恱及見惔遣謂世隆曰賢子俱有盛才一日見顧今故報禮若仍相造似非本意恐年少窺人惔位祕書監裴子野字幾原河東聞喜人兄黎弟楷綽並有盛名所謂四裴也子野位鴻臚卿徐嗣徽及弟宗並有武用王銓雖學業不及弟錫而孝行齊焉時人以為銓錫二王可謂玉昆金友錫位至吏部郎中顧協二子之儀之推並早知名之推承聖中仕中書舍人薛暉為領軍將軍有六子子建子尚知名岑善方為起部尚書有七子並有操行之元之利之象最知名陳陸瑜字幹玉少篤學美詞藻為東宫學士兄琰時為管記並以才學娛侍左右時人比之二應杜崱兄弟五人兄嵩岑嶷巘岸及弟㓜安並知名當世崱位江州刺史後魏高湖字大淵渤海蓨人少機敏有噐度與兄韜俱知名於時雅為鄉人崔逞所敬異湖位至寕西將軍尉地干為侍輦郎奉上忠謹弟侯頭襲地干職為庫部尚書侯頭弟力斤亦以忠謹聞厯位御史中尉李順與從兄靈從弟孝伯並以學識器業見重於時故能砥礪宗族競各脩尚順位安西將軍陸偉字道暉與弟恭之並有時譽雒陽令賈禎見其兄弟嘆曰僕以年老更覩雙璧又兄弟共候黄門郎孫惠蔚謂諸賔曰不意二陸復在坐隅吾德謝張公無以延譽劉休賔字處幹北海人少好學有文才兄弟六人秉民延和等皆有時譽休賔位懐寜令陽鳴鵠與弟季智俱有名於時前後並為幽州司馬崔勵為中書侍郎與從兄鴻俱知名於世崔亮字敬儒為散騎常侍有三子士安士和士泰並以彊幹善於當世士安位諫議大夫尹循為太原太守弟家遼西太守兄弟皆有政事才楊大眼有三子長甑生次領軍次征南皆潘氏所生氣幹咸有父風大眼位荆州刺史高崇為雒陽令子謙之為河隂令損益治體名為故事謙之弟道穆為御史亦有能名北齊李瑾六子彦之情之夀之禮之行之凝之並有氣望行之與兄弟深相友愛又風素夷簡為士友所稱范陽盧思道是其舅子嘗贈詩云水衡稱逸人潘楊有世親形骸預冠盖心思出風塵時人以為實録瑾位至光禄大夫司馬子結兄弟三人皆渉文學陽休之收西兖子亷子尚子結與諸朝士各有詩言贈陽搃為一篇酬答即詩云三馬俱白睂者子結為南陽王管記王昕兄弟九人並風流藴藉世號王氏九龍位銀青光禄大夫盧叔武與兩兄觀仲並以文章顯於雒下叔武為散騎常侍韋道遜與兄道宻道建道儒並以文章知名位右光禄大夫宋世良與弟世軌俱有孝友之譽後周裴寛儀貎瓌偉博渉群書弱冠為州里所稱與二弟漢尼並知名寛位渉州刺史冦雋字祖雋上谷昌平人性寛雅㓜有識量好學强記兄祖訓祖禮及雋並有志行雋位驃騎將軍蘓亮少與從弟綽俱知名然綽文章稍不逮亮至於經書進趣亮又減之故世稱二蘓亮弟湛字景雋少有志行與亮俱著名西土亮位衞將軍南汾州刺史隋杜正元字慎徽鄴人聰敏博渉多通弟正臧字為善好學善屬文兄弟數人俱未弱冠並以文章才辯籍甚三河之間大業中應詔舉秀才兄弟三人一時詣闕論者榮之正元位豫章王記室尹正卿弟彦卿河間人俱有雋才名德顯於世賀德仁越州人少與兄德基俱事國子祭酒周宏正咸以詞學見稱時人語曰學行可師賀德基文質彬彬賀德仁兄弟八人時人方之荀氏德仁弟子紀敳亦以博學知名德仁為趙王友盧昌衡字子均小字龍子風神澹雅容止可法博渉經史工行草書從弟思道小字釋奴宗中俱稱英妙故幽州為之語曰盧家千里釋奴龍子昌衡位太子左庶子唐虞世南初仕陳為西陽王友陳滅與兄世基同入長安俱有重名時人方之二陸郎餘令祖楚之少與兄蔚之俱重名隋大業中蔚之為左丞楚之為尚書民曹郎煬帝重其兄弟稱為二郎温彦博兄弟三人父友薛道衡李綱見之曰皆卿相才也彦博位至中書侍郎薛萬徹父世雄大業末卒於涿郡太守萬徹少與兄萬均隨父幽州俱以武略為羅藝所親待位寕州刺史杜正倫相州洹水人隋仁夀中與兄正元正藏俱以秀才擢第才總十人正倫一家有三秀才甚為當時稱美仕至中書令張昌宗冀州南宫人少與兄昌齡俱以文詞知名昌宗位至春官侍郎温大雅性至孝少好學以才辯知名季弟大有字彦將聰明好古幼有令譽才學亞於二昆而篤行過之大雅位右僕射唐臨與兄皎俱有令名皎厯位吏部侍郎臨亦以文史著稱為吏部尚書王勃與兄勔勮俱稱少俊父友考功員外郎杜易簡嘗稱曰此王氏三珠樹也勃位虢州參軍賈敦實為雒州長史初敦實兄敦頥為雒州刺史甚有惠政百姓共樹碑于大市通衢及敦實去職復刻石頌其德政立於兄碑之側故時人呼為棠棣碑焉韋斌郇國公安石之子早脩整逰心文藝與兄陟齊名斌位至臨安太守楊慎矜父崇禮太府卿二十餘年時議稱職及崇禮罷太府元宗訪堪委其父任者宰臣稱慎矜愼餘慎名三人皆勤恪清白有父風時愼矜汝陽令有能名因召拜監察御史知太府出納慎餘授太子舍人監倉尋丁父憂服闋累遷侍御史仍知太府出納慎名授大理評事攝監察御史充含嘉倉出納使甚承恩顧慎矜在䑓数年風格甚髙遷擢判御史中丞充京畿採訪使太府出納如故盧奕黄門監懐慎之少子也與其兄奐齊名謹愿寡慾不尚輿馬克己自勵開元中任京兆司録參軍天寳初為鄠縣令兵部郎中所厯有聲皆如奐之所厯王之咸為長安縣尉與昆弟之濆之渙皆善屬文王維與弟縉皆才秀以詞學齊名維位尚書右丞張知騫家于岐與兄知立知晦弟知泰知黙勵志讀書皆明經擢第位大理卿致仕辛雲京河西之大族代掌戎族兄弟數人並以將帥知名雲京仕至河東節度使蔣沅為監察御史與兄演溶弟清俱以幹局吏事擅能名於天寳中長吏韓明宗裴逈咸以推覆簡勾之任委之處事平允割斷精當動為群僚楷式路敬淳與弟敬潛俱早知名敬淳位太子司議郎陸象先為太子少保弟景倩為監察御史景融厯左右丞工部尚書景獻屯田員外郎景裔庫部郎中皆有美譽僧一行少時嘗與象先昆弟相善嘗謂人曰陸氏兄弟皆有才行古之荀陳無以加也其為當時所稱如此孫成幼渉學兄宿絳早知名位至桂州刺史桞渾初名載少孤志學工為文章與兄識齊名位至兵部侍郎平章事吳通元與兄通㣲俱博學善屬文詞彩綺麗通元幼應神童舉建中初策賢良方正等科通元應文詞清麗登乙第皆以文章知名同為翰林學士蘓弁與兄冕皆以友悌儒學稱弁位杭州刺史楊憑字虗受宏農人工文詞少負氣節與母弟凝凌相友愛皆有時名位京兆尹韋綬為翰林學士其弟纁有精識奥學為士林所器故其兄弟令稱推於一時桞登字成伯右司郎中集賢學士芳之子少嗜學其弟福建觀察使晃咸以該博著稱位右散騎常侍致仕崔郾與兄邠等皆有令譽而郾䟱財恢廓弟兄所不及位為浙西觀察使馮定與兄宿皆有文學而定過之貞元中皆舉進士時人比以漢朝二馮君定位至工部尚書致仕李景儉弟景儒景信景仁皆有藝學知名於時景信景仁皆登進士第穆寕子贊質員賞質兄弟俱有令譽而和粹世以滋味目之贊俗而有裕為酪質美而多文為酥員為醍醐賞為乳腐近世士大夫言家法者以穆氏為高寕位祕書監致仕崔琯弟珙琮璪琠球珦璵兄弟八人皆至達官時人以比漢之荀氏號曰八龍後唐李琪十三為賦頌舉進士擢第琪兄珽亦登進士第才藻富贍兄弟齊名琪位太子少傅致仕劉晌字輝達涿州歸義人也兄晅弟皥俱有鄉曲之譽晌位平章事趙光裔光逢之弟俱以詞藝知名登進士第光裔仕梁厯清顯官伯仲之間咸以方雅自高北人聞其名者皆望風欽重光裔位至平章事任圜京兆三原人祖清成都省父茂宏避地太原奏授西河令有子五人曰圖回圜團風彩俱異圜位平章事周竇禹鈞有子五人儀儼侃偁僖皆擢進士第禹鈞任澶州亷判時馮道贈詩云澶察竇中郎於家有義方靈椿一樹老仙桂五枝芳册府元龜卷七百八十三
