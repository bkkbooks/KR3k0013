body:
  text: 冊府元龜卷八百二十九宋王欽若等撰總錄部論議夫考今古之得失評道之臧否稽合衆說以歸於至當發明大訓用垂於可久使其文質兼備綱條不紊遣辭夲乎閎達析理暢乎精微斯議論之為難矣鄭𤣥所謂論者倫也使其有倫次也賈逵亦曰論釋也言釋其凝滯也漢氏而下名儒繼作其有内富學術多識前典或時議之未决或俗尚之異端事有愆於古義政未契於中道因相譏短形於駁難以至品題先賢之勝劣揚確所習之乖戾詮述性命以達乎幾深講求名理用臻乎奥妙莫不發為嘉論垂之美談其布在所籍莫不悉舉者矣後漢班彪字叔皮年二十遭王莽敗光武即位於冀州時隗囂據壟擁衆招輯英俊輯與集同而公孫述稱帝於蜀漢天下雲擾言盜賊擾亂如雲而起大者連州郡小者據縣邑囂問彪曰往者周亡戰國並爭天下分裂數世然後乃定其抑者從横之事復起於今乎抑語辭將承運迭興在於一人也迭互也音大結反願先生論之對曰周之廢興與漢殊異昔周立爵五等諸侯從政言諸侯之國各别為政本根既微枝葉强大本根謂王室也枝葉謂諸侯故其末流有從横之事其埶然也漢家承秦之制並立郡縣主有專已之威臣無百年之柄至於成帝假借外家假音工暇反借音子夜反哀平短祚國祀三絶危自上起傷不及下故王氏之貴傾擅朝廷能竊尊位而不根於民言無據援是以即真之後天下莫不引領而歎十餘年間外内騷擾遠近俱發假號雲合咸稱劉氏不謀同辭方今雄傑帶州城者皆無七國世業之資詩云皇矣上帝臨下有赫鑒觀四方求民之瘼皇大也上帝天也莫定也言大矣天之視下赫然甚明監察衆國求人所定而受之今民皆謳吟思漢鄉仰劉氏已可知矣鄉讀為嚮囂曰先生言周漢之埶可也至於但見愚民習識劉氏姓號之故而謂漢家復興疏矣昔秦失其鹿劉季逐而掎之掎偏持其足也音居蟻反時民復知漢虖既感囂言又愍狂狡之不息迺著王命論以救時難其辭曰昔在帝堯之禪曰咨爾舜天之厯數在爾躬舜亦以命禹暨于稷契咸佐唐虞契讀與卨同字本作契光濟四海奕世載徳載乘也言相因不絶至於湯武而有天下雖其遭遇異時禪代不同至乎應天順民其揆一也言堯舜以文德相禪湯武以征伐代興各上應天命下順人心是故劉氏承堯之祚氏族之世著乎春秋謂士㑹歸晉其處者為劉氏唐據火德而漢紹之始起沛澤則神母夜呼以彰赤帝之符繇是言之帝王之祚必有明聖顯懿之德豐功厚利積絫之業絫古累字然後精誠通於神明流澤加於生民故能為鬼神所福饗天下所歸往未見運世無本功德不紀不紀不為人所記而得崛起在此位者也崛起特起也崛音其勿反世俗見髙祖興於布衣不達其故以為適遭暴亂得奮其劔游說之士至比天下於逐鹿幸捷而得之不知神器有命不可以智力求也帝王賞罰之柄也悲夫此世所以多亂臣賊子也若然者豈徒闇於天道哉又不覩之於人事矣夫餓饉流𨽻饑寒道路隷賤𨽻思有短褐之䙝儋石之畜䙝謂親身之衣也音先列反一說云衣破壞之餘曰䙝儋音丁濫反畜讀曰蓄所願不過一金然終於轉死溝壑何則貧窮亦有命也况虖天子之貴四海之富神明之祚可得而妄處哉故雖遭罹阨㑹竊其權柄罹亦遭也音離勇如信布彊如梁籍威如王莽然卒潤鑊伏鑕烹醢分裂鑕鍖也伏於鍖上而斬之也鍖音竹林反又况么䯢尚不及數子䯢音麽小也么麽皆微小之稱也么音一堯反䯢音莫可反而欲闇奸天位者虖奸音干是故駑蹇之乘不騁千里之塗燕雀之疇不奮六翮之用楶梲之材不荷棟梁之任楶即所謂欂櫨也梲梁上短柱也楶音節字亦或作節棁音之說反斗筲之子不秉帝王之重斗筲言小器也筲音山交反易曰鼎折足覆公餗餘食也音速不勝其任也當秦之末豪傑共推陳嬰而王之嬰母止之曰自吾為子家婦而世貧賤而汝也卒富貴不祥不如以兵屬人屬委也音之欲反事成少有其利不成禍有所歸嬰從其言而陳氏以寧王陵之母亦見項氏之必亡而劉氏之將興也是時陵為漢將而母獲於楚有漢使來陵母見之謂曰願告吾子漢王長者必得天下子謹事之無有二心遂對漢使伏劔而死以固勉陵其後果定於漢陵為宰相封侯夫以匹婦之明凡言匹夫匹婦謂凡庶之夫一夫一婦當相配匹猶能推事理之致探禍福之機而全宗祀於無窮垂策書於春秋春秋史書記事之總稱而况大丈夫之事虖是故窮達有命吉凶繇人嬰母知廢陵母知興審此四者帝王之分决矣分音扶問反蓋在髙祖其興也有五一曰帝堯之苗裔二曰體貌多竒異三曰神武有徵應四曰寛明而仁恕五曰知人善任使加之以信誠好謀達於聽受見善如不及用人如繇已從諫如順流趣時如嚮赴嚮讀曰響如響之赴聲也當食吐哺納子房之策拔足揮洗揖酈生之說寤戍卒之言斷懷土之情雒陽近沛髙祖來都關中故云斷懷土之情也斷音丁喚反高四皓之名割肌膚之愛不立戚夫人子舉韓信於行陳收陳平於亡命英雄陳力羣策畢舉此髙祖之大畧所以成帝業也若迺靈瑞符應又可畧聞矣初劉媪任髙祖而夢與神遇任謂懷孕也震電晦㝠有龍蛇之怪及其長而多靈有異於衆是以王武感物而折劵呂公覩形而進女秦皇東游以厭其氣呂后望雲而知所處厭音一葉反始受命則白蛇分西入關則五星聚故淮隂留侯謂之天授非人力也歴古今之得失驗行事之成敗稽帝王之世運考五者之所謂取捨不厭斯位符瑞不同斯度厭當也厭音一涉反而茍昧於權利越次妄據昧貪也外不量力内不知命則必喪保家之主失天年之壽遇折足之凶伏鈇鉞之誅鈇音方于反英雄誠知覺寤畏若禍戒若順也超然逺覽淵然深識收陵嬰之明分絶信布之覬覦分音扶問反覬音冀覦音踰距逐鹿之瞽說審神器之有授毋貪不可幾為二母之所笑不可幾謂不可庶幾而望也一説幾讀曰冀則福祚流於子孫天祿其永終矣知隗囂終不寤迺避墬於河西墬古地字後為徐令以病免延篤南陽犫人也犫音昌猶反桓帝時為京兆尹免歸教授家巷時人或疑仁孝前後之證篤乃論之曰觀夫仁孝之辯辯爭也紛然異端互引典文代取事據代更也可謂篤論矣篤厚也夫人二致同源總率百行非復銖兩輕重必定前後之數也而如欲分其大較較猶畧也體而名之則孝在事親仁施品物施物則功濟於時事親則德歸於已歸已則事寡濟時則功多推此以言仁則逺矣然物有出微而著事有繇隱而章近取諸身則耳有聽受之用目有察見之明足有致逺之勞手有飾衛之功功雖顯外本之者心也逺取諸物則草木之生始於萌芽終於彌蔓枝葉扶疏榮華紛縟末雖繁蔚致之者根也夫仁人之有孝猶四體之有心腹枝葉之有本根也聖人知之故曰夫孝天之經也地之義也人之行也君子務本本立而道生孝悌也者其為仁之本與然體大難備物性好偏故所施不同事少兩兼者也如必對其優劣則仁以枝葉扶疏為大孝以心體本根為先可無訟也或謂先孝後仁非仲尼序回參之意蓋以為仁孝同質而生純體之者則互以為稱虞舜顔回是也若偏而體之則各有其目公劉曾參是也夫曾閔以孝悌為至德管仲以九合為仁功未有論德不先回參考功不大夷吾以此而言各從其稱者也郭泰字林宗太原人以世亂不仕而名震京師先是蘇不韋父為司𨽻校尉李暠以昔怨收掠死獄中又刑其屍不韋年十八變姓名夜入暠寢室值暠在厠因殺其妾并小兒乃掘暠父阜冢斷取阜頭以祭父墳士大夫多譏其發掘冡墓歸罪枯骨不合古義唯任城何休方之伍員林宗聞而論之曰子胥雖云逃命而見用强吳憑闔閭之威因輕悍之衆雪怨舊郢曽不終朝而但鞭墓戮屍以舒其憤竟無手刅後主之報豈如蘇子單持孑立靡因靡資强讎豪援據位九卿城闕天阻宫府幽絶埃塵所不能過霧露所不能沾不韋毁身燋慮出於百死冐觸嚴禁陷族禍門雖不獲逞為報已深况復分骸斷首以毒生者使暠懷忿結不得其命猶假手神靈以斃之也力唯匹夫功隆千乘比之於員不以優乎議者於是貴之朱穆字公叔舉髙第為侍御史嘗感時澆薄慕尚敦篤乃作崇厚論其辭曰夫俗之薄也有自來矣故仲尼歎曰大道之行也而丘不與焉蓋傷之也夫道者以天下為一在彼猶在已也故行違於道則愧生於心非畏義也事違於理則負結於意非憚禮也故率性而行謂之道得其天性謂之德德性失然後貴仁義是以仁義起而道德遷禮法興而淳樸散故道德以仁義為薄淳樸以禮法為賊也夫中世之所敦已為上世之所薄况又薄於此乎故夫天不崇大則覆幬不廣地不深厚則載物不博人不敦龎則道數不逺昔在仲尼不失舊於原壤楚莊不忍章於絶纓繇此觀之聖賢之德敦矣老氏之經曰大丈夫處其厚不處其薄居其實不居其華故去彼取此夫時有薄而厚施行有失而惠用故覆人之過者敦之道也救人之失者厚之行也往者馬援深昭此道可以為德誡其兄子曰吾欲汝曹聞人之過如聞父母之名耳可得聞口不得言斯言要矣遠則聖賢履之上世近則丙吉張子孺行之漢廷故能振英聲於百世播不滅之遺風不亦美哉然而時俗或異風化不敦而尚相誹謗謂之臧否記短則兼折其長貶惡則并伐其善悠悠者皆是其可稱乎凡此之類豈徒乖為君子之道哉將有危身累家之禍焉悲夫行之者不知憂其然故害興而莫之及也斯既然矣又有異焉人皆見之而不能自遷何則務進者趨前而不顧後榮貴者矜已而不待人智不接愚富不賑貧貞士孤而不恤賢者戹而不存故田蚡以尊顯致安國之金淳于以貴埶引方進之言夫以韓翟之操為漢之名宰然猶不能賑一貧賢薦一孤士乂况其下者乎此禽息史魚所以專名於前而莫繼於後者也故時敦俗美則小人守正利不能誘也時否俗薄雖君子為邪義不能止也何則先進者既往而不反後來者復習俗而追之是以虛華盛而忠信微刻薄稠而純篤稀斯蓋谷風有棄予之歎伐木有鳥鳴之悲矣嗟乎世士誠躬師孔聖之崇則嘉楚莊之美行希李老之雅誨思馬援之所尚鄙二宰之失度美韓稜之抗正貴丙張之𢎞裕賤時俗之誹謗則道豐績盛名顯身榮載不刋之德播不滅之聲然後知薄者之不足厚者之有餘也彼與草木俱朽此與金石相傾豈得同年而語並日而談哉穆又著絶交論亦矯時之作其畧曰或曰子絶存問不見客亦不答也何故曰古者進退趨業無私逰之交相見以公朝享㑹以禮紀否則朋徒受習而已曰人將疾子如何曰寧受疾曰受疾可乎曰世之務交游也久矣敦千乘不忌于君犯禮以追之背公以從之其愈者則孺子之愛也其甚者則求蔽過竊譽以贍其私事替義退公輕私重居勞於聽也或於道而求其私贍矣是故遂往不反而莫敢止焉是川瀆並决而莫敢之塞㳺豶蹂稼而莫之禁也詩云威儀棣棣不可選也後生將復何述而吾不才焉能規此實悼無行子道多闕臣事多尤思復白圭重考古言以補往過時無孔堂思兼則滯匪有廢也則亦焉興是以敢受疾也不亦可乎文士傳曰世無絶交又與劉伯宗絶交書及詩曰昔我為豐令足下不遭母憂乎親解縗絰來入豐寺及我為侍書御史足下親來入臺足下今為二千石我下為郎乃反因計吏以謁相與足下豈丞尉之徒我豈足下部民欲以此謁為榮寵乎咄劉伯宗於仁義道何其薄哉其詩曰北山有鴟不潔其翼飛不正向寢不定息饑則木攬飽則泥伏饕餮貪汚臭腐是食填腸滿嗉嗜欲無極長鳴呼鳳謂鳳無德鳳之所趣與子異域永從此訣各自努力蓋因此而著論也蔡邕以為穆身而孤又作正交而廣其致焉邕論畧曰聞之前訓曰君子以朋友講習而正人無有淫朋是以古之交者其義敦以正其誓信以固逮夫周德始衰頌聲既寢伐木有鳥鳴之刺谷風有棄予之怨其所繇來政之失也自此以降彌以陵遲或間其始終或彊其比周是以縉紳患其然而論者諄諄如也疾淺薄而攜貳者有之惡朋黨而絶交㳺者有之其論交也曰富貴則人爭趨之貧賤則人爭去之是以君子慎人所以交已審已所以交人富貴則無暴集之客貧賤則無棄舊之賔矣故原其所以來則知其所以去見其所以始則睹其所以終彼貞士者貧賤不傲于富貴富貴不驕乎貧賤故可貴也蓋朋友之道有義則合無義則離善則久要不忘平生之言惡則忠告善誨之否則止無自辱焉故君子不為可棄之行不患人之遺已也信有可歸之德不病人之逺已也不幸或然則躬自厚而薄責於人怨其逺矣求諸已而不求諸人咎其稀矣夫逺怨稀咎之機咸則乎躬莫之能改也子夏之門人問交於子張而二子各有聞乎夫子然則以交誨也商也寛故告之以距人師也偏故訓之以容衆各從其行而矯之至於仲尼之正教則汎愛衆而親仁故非善不善非人不親交㳺以方㑹友以文可無貶也榖梁子亦曰心志既通名譽不聞友之罪也今將患其流而塞其源病其末而刈其本無乃未若擇其正而黜其邪與其彼農皆黍而獨稷焉夫黍亦神農之嘉穀與稷並為粢盛也使交而可廢則黍其愆矣括二論而言之則刺薄者博而治斷交者身而孤孤有羔羊之節與不獲已而矯時也走將從夫孤焉魏荀粲字奉倩粲太尉顗之弟也諸兄並以儒術論議而粲獨好言道嘗以為子貢稱夫子之言性與天道不可得聞然則六籍雖存固聖人之糠粃粲兄俁難曰易亦云聖人立象以盡意繫辭焉以盡言則微言胡為不可得而聞見哉粲答曰蓋理之微者非物象之所舉也今稱立象以盡意此非通於意外者也繫辭焉以盡言此非言乎繫表者也斯則象外之意繫表之言固藴而不出矣俁及當時能言者不能屈也荀閎字仲茂為太子文學掾時有甲乙疑論閎與鍾繇王朗袁渙議各不同文帝與繇書曰𡊮王國士更為唇齒荀閎勁悍往來銳師真君侯之勍敵左右之深憂也孫炎字叔然授學鄭𤣥之門人稱東州一大儒徵為秘書監不就王肅集聖證論以譏短𤣥叔然駁而釋之司馬朗字伯達為兖州刺史朗雅好人倫時鍾繇王粲著論云非聖人不能致太平朗以為伊顔之徒雖非聖人使得數世相承太平可致文帝善朗論命秘書録其文孫盛曰繇既失之朗亦未為得也昔湯舉伊尹而不仁者逺矣易稱顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行繇此而言聖人之與大賢行藏道一舒卷斯同御世垂風理無降異升泰之美豈俟積世哉善人為邦百年亦可以勝殘去殺又曰不踐迹亦不入於室數世之倫其在斯乎方之大賢固有間矣傅嘏為尚書嘗論才性同異鍾㑹集而論之嘏既達治好正而有清理識要好論才性原本精微尠能及之夏侯𤣥為散騎常侍時晉宣帝為太傅問以時事𤣥議以為夫官才用人國之柄也故詮衡專於臺閣上之分也孝行存乎閭巷優劣任之鄉人下之叙也夫欲清教審選在明其分叙不使相涉而已何者上過其分則恐所繇之不大而干勢馳騖之路開下踰其叙則恐天爵之外通而機權之門多矣夫天爵下通是庶人議柄也機權多門是紛亂之原也自州郡中正品度官才之來有年載矣緬緬紛紛未聞整齊豈非分叙參錯各失其要之所繇哉若令中正但考行倫輩倫輩當行均斯可官矣何者夫孝行著於家門豈不忠恪於在官乎仁恕稱於九族豈不達於為政乎義斷行於鄉黨豈不堪於事任乎三者之類取於中正雖不處其官名斯任官可知矣行有大小比有髙下則所任之流亦煥然明别矣奚必使中正干銓衡之機於下而執機柄者有所委仗於上上下交侵以生紛錯哉且臺閣臨下考功校否衆職之屬各有官長旦夕相考莫究於此閭閻之議以意裁處而使匠宰失位衆人驅駭欲風俗清靜其可得乎天臺縣逺衆所絶意所得至者更在側近孰不修飾以要所求所求有路則脩己家門者己不如自達於鄉黨自達鄉黨者已不如自求之於州邦矣苟開之有路而患其飾真離本雖復嚴責中正督以刑罰猶無益也豈若使各帥其分官長則各以其屬能否獻之臺閣臺閣則據官長能否之第參以鄉閭德行之次擬其倫比勿使偏頗中正則唯考其行迹别其髙下審定輩類勿使升降臺閣總之如其所簡或有參錯則其責負自在有司官長所苐中正輩擬比隨次率而用之如其不稱責負在外然則内外相參得失有所互相形檢孰能相飾斯則人心定而事理得庶可以靜風俗而審官才矣又以為古之建官所以濟育羣生統理民物也故為君長以司牧之司牧之主欲一而專一則官任定而上下安專則職業脩而事不煩夫事簡業修上下相安而不治者未之有也先王建萬國雖其詳未可得而究然分疆畫界各守土境則非重累羈絆之體也下考殷周五等之叙徒有小大貴賤之差亦無君官臣民而有二統互相牽制者也夫官統不一則職業不脩職業不脩則事何得而簡事之不簡則民何得而靜民之不靜則邪惡並興而姦偽滋長矣先王達其如此故專其職司而一其統業始自秦世不師聖道私以御職姦以待下懼宰官之不脩立監牧以董之畏督監之容曲設司察以糾之宰牧相累監察相司人懷異心上下殊務漢承其緒莫能規改魏室之隆日不暇及五等之典雖難卒復可粗立儀凖以一治制今之長吏皆君吏民横重以郡守累以刺史若郡所攝唯在大較則與州同無為再重宜省郡守但任刺史刺史職存則監察不廢郡吏萬數還親農業以省煩費豐財殖穀一也大縣之才皆堪郡守是非之訟每生意異順從則安直已則爭夫和羮之美在於合異上下之益在能相濟順從乃安此琴瑟一聲也蕩而除之則官省事簡二也又幹郡之吏職監諸縣營䕶黨親鄉邑舊故如有不副而因公掣頓民之困弊咎生於此若皆并合則亂原自塞三也今承衰弊民人彫落賢才鮮少任事者寡郡縣良吏往往非一郡受縣成其劇在下而吏之上選郡當先足此為親民之吏專得底下吏者民命而常頑鄙今如并之吏多選清良者造職大化宣流民物獲寧四也制使萬户之縣名之郡守五千以上名之都尉千户以下令長如故自長以上考課遷用轉以能升所牧亦増此進才効功之叙也若經制一定則官才有次治功齊明五也若省郡守縣皆徑達事不擁隔官無留滯三代之風雖未可必簡一之化庶幾可致便民省費在於此矣又以為文質之更用猶四時之迭興也王者體天理物必因弊而濟通之時彌質則文之以禮時泰侈則救之以質今承百王之末秦漢餘流世俗彌文宜大改之以易民望今科制自公列侯以下位從大將軍以上皆得服綾錦羅綺紈素金銀飾鏤之物自是以下雜綵之服通於賤人雖上下等級各示有差然朝臣之制已得侔至尊矣𤣥黄之采已得通於下矣欲使市不鬻華麗之色商不通難得之貨工不作雕刻之物不可得也是故宜大理其本凖度古法文質之宜取其中則以為禮度車輿服章皆從質朴禁除末俗華麗之事使幹朝之家有位之室不復有錦綺之飾無兼采之服纎巧之物自上以下至於樸素之差示有等級而已勿使過一二之覺若夫功德之賜上恩所特加皆表之有司然後服用之夫上之化下猶風之靡草樸素之教興於本朝則彌侈之心自消於下矣宣王報書曰審官擇人除重官改服制皆大善禮鄉閭本行朝廷考事大指如所示而中間一相承習卒不能改秦時無刺史但有郡守長吏漢家雖有刺史奉六條而已故刺史稱𫝊車其吏言從事居無常治吏不成臣其後轉更為官司耳昔賈誼亦患服制漢文雖身服弋綈猶不能使上下如意恐此三事當待賢能然後了耳𤣥又書曰漢文雖身衣弋綈而不革正法度内外有僭儗之服寵臣受無限之賜繇是觀之似指立在身之名非篤齊治制之意也今公侯命世作宰追踪上古將隆至治抑末正本若制定於上則化行於衆矣夫當宜改之時留殷勤之心令發之日下之應也猶響尋聲耳猶垂謙謙曰待賢能此伊周不正殷姬之典也竊未喻焉𤣥又著樂毅論曰觀樂生遺燕惠王書其殆庶乎知機合道以禮始終者與又其喻昭王曰伊尹放太甲而不疑太甲受放而不怨是存大業於至公而以天下為心者也夫欲極道德之量務以天下為心者必致其主於盛隆合其趣於先王茍君臣同符則大業定矣于斯時也樂生之志千載一遇之世亦將行千載一隆之道豈其局迹當時止於兼并而已哉夫兼并者非樂生之所屑彊燕而廢道又非樂生之所求不屑茍利心無近事不求小成斯意兼天下者也則舉齊之事所以運其機而動四海也夫討齊以明燕主之義此兵不興於為利矣圍城而害不加於百姓此仁心著於遐邇矣舉國不謨其功除暴不以威力此至德全於天下矣邁全德以率列國則幾於湯武之事矣樂生方恢大綱以縱二城牧民明信以待其弊將使即墨莒人顧仇其上願釋干戈頼我猶親善守之智無所施之然則求仁得仁即墨大夫之義仕窮則從微子適周之道開彌廣之路以待田單之徒長容善之風以申齊士之志使夫忠者遂節勇者義著昭之東海屬之華裔我澤如春民應如草道光宇宙賢智託心鄰國傾慕四海延頸思戴燕主仰望風聲二城必從則王業隆矣雖淹留兩邑乃致速於天下也不幸之變世所不圖敗於垂成時運固然若乃逼之以威刼之以兵則攻取之事求欲速之功使燕齊之士流血於二城之下多殺傷之殘以示四海之人縱暴易亂以成其私鄰國望之其猶豺虎既大墮稱兵之義而喪濟溺之仁且虧齊士之節廢廉善之風掩宏通之度棄王德之隆雖二城幾於可拔霸王之事攸其逺矣然則燕雖兼齊其與世主何以殊哉與其鄰國何以相傾樂生豈不知拔二城之速了哉顧城拔而業乖也豈不慮不速之致變哉顧業乖與變同繇是觀之樂生之不屠二城未可量也蜀秦宓為大司農初李權從宓借戰國策宓曰戰國從横用之何為權曰仲尼嚴平兼聚衆書以成春秋指歸之文故海以合流為大君子以博識為𢎞宓報曰書非史記周圖仲尼不采道非虛無自然嚴平不演海以受淤歲一蕩清君子博識非禮不視今戰國反覆儀秦之術殺人自生亡人自存經之所疾故孔子發憤作春秋大乎居正復制孝經廣陳德行杜漸防萌預有所抑是以老氏絶禍於未萌豈不信邪成湯大聖覩野魚而有獵逐之失定公賢者見女樂而棄朝事若此輩類焉可勝陳道家法曰不見所欲使心不亂是故天地貞觀日月貞明其直如矢君子所履洪範記災發於言貌何戰國之譎權乎哉費禕為大將軍錄尚書事禕聞司馬懿誅曹爽設甲乙論平其是非甲以為曹爽兄弟凡品庸人茍以宗子枝屬得蒙顧命之任而驕奢僭逸交非其人私樹朋黨謀以亂國懿奮誅討一朝殄盡此所以稱其任副士民之望也乙以為懿感曹仲附已不一豈爽與相干事勢不專以此隂成疵瑕初無忠告侃爾之訓一朝屠戮讒其不意豈大人經國篤本之事乎若爽信有謀主之心大逆已搆而發兵之日更以芳委爽兄弟懿父子從後閉門舉兵蹙而向芳必無悉寧忠臣為君深慮之謂乎以此推之爽無大惡明矣若懿以爽奢僭廢之刑之可也滅其七口被以不義絶子丹血食及何晏子魏之親甥亦與同戮哉為僭濫不當矣吳韋曜為太子中庶子蔡頴亦在東宮性好博奕太子和以為無益使曜作博奕論其辭曰蓋聞君子恥當年而功不立疾沒世而名不稱故曰學如不及猶恐失之是以古之志士悼年齒之流邁而懼名稱之不立也故勉精厲操晨興夜寐不遑寧息經之以歲月累之以日力若寗越之勤董生之篤漸漬德義之淵棲遲道藝之域且以西伯之聖姬公之才猶有日昃待旦之勞故能隆興周道垂名億載况在臣庶而可以已乎歴觀古今立功名之士皆有累積殊異之迹勞身苦體契濶勤思平居不墮其業窮困不易其素是以卜式立志於耕牧而黄霸受道於囹圄終有榮顯之福以成不朽之名故山甫勤於夙夜而吳漢不離公門豈有游墮哉今世之人多不務經術好翫博奕廢事棄業忘寢與食窮日盡明繼以脂燭當其臨局交爭雌雄未决專精鋭意心勞體倦人事曠而不脩賔旅闕而不接雖有太牢之饌韶夏之樂不暇存也至或賭及衣物徙棊易行亷恥之意弛而忿戾之色發然其所志不出一枰之上所務不過方罫之間勝敵無封爵之賞獲地無兼土之實技非六藝用非經國立身者不階其術徵選者不繇其道求之於戰陣則非孫吳之倫也考之於道藝則非孔氏之門也以變詐為務則非忠信之事也以刼殺為名則非仁者之意也而空妨日廢業終無補益是何異設木而擊之置石而投之哉且君子之居室也勤身以致養其在朝也竭命以納忠臨事且猶旰食而何博奕之足躭夫然故孝友之行立貞純之名彰也方今大吳受命海内未平聖朝乾乾務在得人勇畧之士則受熊虎之任儒雅之徒則處龍鳳之署百行兼包文武並騖博選良才旌簡髦俊設程試之科垂金爵之賞誠千載之嘉㑹百世之良遇也當世之士宜勉思至道愛功惜力以佐明時使名書史籍勲在盟府乃君子之上務當今之先急也夫一木之枰孰與方國之封枯棊三百孰與萬人之將衮龍之服金石之樂足以兼棊局而貿博奕矣假令世士移博奕之力而用之於詩書是有顔閔之志也用之於智計是有良平之思也用之於資貨是有猗頓之富也用之於射御是有將帥之備也如此則功名立而鄙賤逺矣裴𤣥字彦黄有學行官至大中大夫問子欽齊桓晉文夷惠四人優劣欽答所見與𤣥相反覆各有文理晉陸喜初仕吳累遷吏部尚書有才思好著述有校論格品篇曰或問予薛瑩最是國士之第一者乎答曰以理推之在乎四五之間問者愕然請問答曰夫孫皓無道肆其暴虐若龍蛇其身沈黙其體潛而勿用趣不可測此第一人也避尊居卑祿代耕養𤣥靜守約冲退澹然此第二人也侃然體國思治心不辭貴以方見憚執政不懼此第三人也斟酌時宜在亂猶顯意不忘忠時獻微益此第四人也温恭脩慎不為諂首無所云補從容保寵此第五人也過此已往不足復數故第二已上多淪没而逺悔吝第三已下有聲位而近咎累是以深識君子晦其明而履柔順也問者曰始聞髙論終年啟寤矣裴頠為尚書左僕射深患時俗放蕩不尊儒術何晏阮籍素有髙名於世口談浮虛不遵禮法尸祿躭寵仕不事事至王衍之徒聲譽大盛位髙勢重不以物務自嬰遂相倣效風教陵遲乃著崇有之論以釋其蔽王衍之徒攻難交至並莫能屈又著辨才論古今精義皆辯釋焉未成而遇禍傅𤣥泰始中為司𨽻校尉𤣥少時專心誦學後雖顯貴而著述不廢撰傅子為内外中篇時何曾有清德𤣥著論稱曽及荀顗曰以文王之道事其親者其頴昌何侯乎其荀侯乎古稱曽閔今曰荀何内盡其心以事其親外崇禮讓以接天下孝子百世之宗仁人天下之命有能行孝之道君子之儀表也詩云髙山仰止景行行止令德不遵二夫子之景行者非樂中正之道也又曰荀何君子之宗也又曰頴昌侯之事親其盡孝子之道乎存盡其和事盡其敬亡盡其哀予於頴昌侯見之矣又曰見其親之黨如見其親六十而孺慕予於頴昌侯見之矣先是馬均扶風人有巧思絶世有裴子者上國之士也精通見理聞而哂之乃難先生先生口屈不對裴子自以為難得其要言之不已傅子謂裴子曰子所長者言也所短者巧也馬氏所長者巧也所短者言也以子所長擊彼所短則不得不屈以子所短難彼所長則必有所不解者矣夫巧天下之微事也有所不解而難之不已其相擊刺必已逺矣心乖於内口屈於外此馬氏所以不對也傅子見安鄉侯言及裴子之論安鄉侯又與裴子同傅子曰聖人具體備物取人不以一揆也有以神取之者有以言取之者有以事取之者有以神取之者不言而誠心先達德行顔淵之倫是也以言取之者以變辯是非言語宰我子貢是也以事取之者若政事冉有季路文學子㳺子夏雖聖人之明盡物如有所用必有所試然則試冉季以政試游夏以學矣㳺夏猶然况自此而降者乎何者懸言物理不可以言盡也施之於事言之難盡而試之易知也今若馬氏所欲作者國之精器軍之要用也費十尋之木勞二人之力不經時而是非定難試易驗之事而輕以言抑人異能此猶以已智任天下之事不易其道以御難盡之物此所多廢也馬氏所作因變而得是則初所言者不皆是矣其不皆是因不用之是不世之巧無繇出也夫同情者相妬同事者相害中人所不能免也故君子不以人害人必以考試為衡石廢衡石而不用此美玉所以見誣為石荆和所以抱璞而哭之也於是安鄉侯悟遂言之武安侯武安侯忽之不果試也此既易試之事又馬氏巧名已定猶忽而不察况幽深之才無名之璞乎後之君子其鑒之哉馬先生之巧雖古公輸般墨翟王爾近漢氏張平子不能過也公輸般墨翟皆見於時乃有益於世平子雖為侍中馬先生雖給事省中俱不典工官巧無益於世用人不當其才聞賢不試以事良可恨也裴子者裴秀安鄉侯者曹羲武安侯者曹爽也李秉字元胄有雋才為時人所貴官至秦州刺史秉嘗答司馬文王問因以為家誡曰昔侍坐於先帝時有三長吏俱見臨辭出上曰為官長當清慎當勤脩此三者何患不治乎並受詔既出上顧語吾等曰相誡勑正當爾不侍坐衆賢莫不贊善上又問曰必不得已於斯三者何先或對曰清固為本次復問吾吾對曰清慎之道相須而成必不得已慎乃為大夫清者不必慎慎者必自清亦繇仁者必有勇勇者不必有仁是以易稱括囊无咎藉用白茅皆慎之至也上曰卿言得之耳可舉近世能慎者誰乎諸人各未知所對吾乃舉故太尉荀景倩尚書董仲連僕射王公仲並可謂為慎上曰此諸人者温恭朝夕執事有恪亦各其慎也然天下之至慎其惟阮嗣宗乎毎與之言言及𤣥逺而未曽評論時事臧否人物真可謂至慎矣吾每思此言亦足以為明誡凡人行事年少立身不可不慎勿輕論人勿輕說事如此則悔吝何繇而生患禍無從而至矣虞溥髙平人補尚書都令史尚書令衛瓘尚書褚䂮音畧並器重之溥謂瓘曰往者金馬啟符大晉應天宜復先王五等之制以綏長久不可承暴秦之法遂漢魏之失也瓘曰歴代歎此而終未能改華譚字令思廣陵人為州從事太康中刺史嵇紹舉譚秀才將行别駕陳總餞之因問曰思賢之主以求才為務進取之士以功名為先何仲舒不仕武帝之朝賈誼失分漢文之時此吳晉之滯論可辯此理而後别譚曰夫聖人在上物無不理百揆之職非賢弗居故山林無匿景衡門不栖遲至承統之主或復凡人居聖人之器處臣庶之上是以其教日頽風俗漸弊又中才之君所資者偏物以類感必於其黨黨言雖非彼以為是以所授有顔冉之賢所用有廊廟之器居官者日冀元凱之功在上者日度堯舜之義彼豈知其政漸毁哉朝雖有求賢之名而無知才之實言雖當彼以為誣策雖竒彼以為妄誣則毁已之言入妄則不忠之責生豈故為哉淺明不見深理近才不著逺體也是以言不用計不施恐死亡之不暇何論功名之立哉故上官昵而屈原放宰嚭寵而伍員戮豈不哀哉若仲舒抑於孝武賈誼失於漢文蓋復是其輕者耳故白起有云非得賢之難用之難非用人之難信之難得賢而不能用用而不能信功業豈可得而成哉潘岳為懷令時以逆旅逐末廢農奸淫亡命多所依湊敗亂法度勅當除之十里一官㰚使老小貧户守之又差吏掌主依客舍收錢岳議曰謹按逆旅久矣其所繇來也行者頼以頓止居者薄收其直交者貿遷各得其所官無役賦因人成利惠加百姓而公無末費語曰許由辭帝堯之命而舍於逆旅外傳曰晉陽處父過寗舍於逆旅魏武皇帝亦以為宜詩曰逆旅整設以通商賈然則自堯至今未有不得客舍之法唯商鞅尤之固非聖世之所言也方今四海㑹同九服納貢八方翼翼公私滿路近畿輻輳客舍亦稠冬有温廬夏有涼䕃芻秣成行器用取給疲牛必投乘涼近進發槅冩鞍皆有所憩又諸刼盜皆起於迥絶止乎人衆十里蕭條則姦宄生心連陌接館則㓂情震懾且聞聲有救已發有追不救有罪不追有戮禁暴捕亡常有司存凡此皆客舍之益而官㰚之所乏也又行者貪路告糴炊㸑皆以昏晨盛夏晝熱又兼星夜既限早閉不及㰚門或避晚闗迸逐路隅衹是慢藏誨盜之原茍以客舍多敗法教官守棘㰚獨復何人彼河橋孟津解劵輸錢髙第督察數入校出品郎兩岸相檢猶懼或失之故懸以祿利許以功報今賤吏疲人獨專㰚稅管開閉之權藉不校之勢此道路之蠧姦利所殖也率歴代之舊俗獲行留之懽心使客舍灑掃以待征旅擇家而息豈非衆庶顒顒之望請曹列上朝廷從之王接為征虜將軍司馬蕩隂之役侍中嵇紹為亂兵所害接議曰夫謀人之軍軍敗則死之謀人之國國危則亡之古之道也蕩隂之役百官奔北唯嵇紹守職以遇不道可謂臣矣又可稱痛矣今山東方欲大舉宜明髙節以號令天下依春秋褒三累之義加紹致命之賞則遐邇向風莫敢不肅矣朝廷從之阮裕居㑹稽剡縣後除東陽太守徵侍中不就還剡山有肥遁之志裕雖不博學論難甚精嘗問謝萬云未見四本論君試為言之萬叙説既畢裕以傅嘏為長於是搆辭數百言精義入微聞者皆嗟異之江惇字思俊孝友淳粹髙節邁俗性好學儒𤣥並綜每以為君子立行應依禮而動雖隱顯殊途未有不傍禮教者也若乃放達不羈以肆縱為貴者非但動違禮法道之所棄也乃著通𤣥道崇簡論世咸稱之康帝時徵拜博士著作郎皆不就虞預為散騎常侍雅好經史憎疾𤣥虛其論阮籍裸袒比之伊川被髮所以荒服入於中國以為過衰周之時孫盛博學善言名理于時殷浩擅名一時與抗論者惟盛而已盛嘗詣浩談論對食奮擲麈尾毛悉落飯中食冷而復暖者數四至暮忘飡浩竟無以難之繇是遂知名起家著作郎謝萬工言論善屬文叙漁父屈原季主賈誼楚老龔勝孫登嵇康四隱四顯為八賢論其㫖以處者為優出者為劣以示孫綽綽與往反以體公識逺者則出處同歸萬終於散騎常侍王坦之為北中郎將有風格尤非時俗放蕩不敦儒教頗尚刑名學著廢莊論與殷康子書論公謙之義曰夫天道以無私成名二儀以至公立德立德存乎至公故無親而非理成名在乎無私故在當而忘我此天地所以成功聖人所以濟化繇斯言之公道體於自然故理泰而愈降謙義生於不足故時弊而義著故大禹咎繇稱功言惠而成名於彼孟反范燮殿軍後入而全身於此從此觀之則謙公之義固以殊矣夫物之所美已不可收人之所貴我不可取誠患人惡其上衆不可蓋故君子居之而每加損焉隆名在於矯伐而不在於期當匿迹在於違顯而不在於求是於是謙光之義與矜競而俱生卑挹之義與夸伐而並進由親譽生於不足未若不知之有餘良藥效於瘳疾未若無病之為貴也夫乾道確然示人易矣坤道隤然示人簡矣二象顯於萬物兩德彰於羣生豈矯枉過直而失其所哉繇此觀之則大通之道公坦於天地謙伐之義險巇於人事今存公而廢謙則自伐者託至公以生嫌自美者因存黨以致惑此王生所謂同貌而實異不可不察者也然理必有源教亦有主茍探其根則𤣥指自顯若尋其末弊無不至豈可以嫌似而疑至公弊貪而忘於諒哉康子及袁宏並有疑難坦之標章摘句一一申而釋之莫不厭服又孔嚴著通葛論坦之與書贊美之其忠公慷慨標名賢勝皆此類也又云坦之著公論袁宏作論以難之韓伯覽而美其辭㫖以為是非既辯誰與正之遂作辯謙以折中范寗少篤學多所通覽時以浮虛相扇儒雅日替寗以為其源始於王弼何晏二人之罪深於桀紂乃著論曰或曰黄唐緬邈至道淪翳濠濮輟咏風流靡託爭奪兆於仁義是非成於儒墨平叔神懷超絶輔嗣妙思通微振千載之頽綱落周孔之塵網斯蓋軒冕之龍門膏粱之宗匠嘗聞夫子之論以為罪過桀紂何哉答曰子信有聖人之言乎夫聖人者德侔二儀道冠三才雖帝王殊號質文異制而統天成務曠代齊趣王何蔑棄典文不遵禮度游辭浮說波蕩後生飾華言以翳實騁繁文以惑世縉紳之徒翻然改轍洙泗之風緬焉將墜遂令仁義幽淪儒雅蒙塵禮壞樂隳中原傾覆古之所謂言偽而辯行僻而堅者其斯人之徒歟昔夫子斬少正卯於魯太公戮華士於齊豈非曠世而同誅乎桀紂暴虐正足以滅身覆國為後世鑒戒耳豈能迴百姓之視聽哉王何叨海内之浮譽資膏粱之傲誕畫魑魅以為巧扇無檢以為俗鄭聲之亂樂利口之覆邦信矣哉吾固以為一世之禍輕歴代之罪重自喪之釁小迷衆之愆大也寗崇儒抑俗率皆如此寗位至中書侍郎張輔為馮翊太守嘗著論云管仲不若鮑叔鮑叔知所奉知所投管仲奉主而不能濟所奔又非濟事之國三歸反坫皆鮑不為又論班固司馬遷云遷之著述辭約而事舉叙三千年事唯五十萬言班固叙三百年事乃八十萬言煩省不同不如遷一也良史述事善足以奬勸惡足以監誡人道之常中流小事亦無取焉而班皆書之不如二也毁貶晁錯傷忠臣之道不如三也遷既造創固有因循難易蓋不同矣又遷為蘇秦張儀范雎蔡澤作傳逞辭流離亦足以明其大才故述辯士則辭藻華靡叙實錄則隱核名檢此所以遷稱良史也又論魏武帝不及劉備樂毅减於諸葛亮辭多不載殷仲堪為荆州刺史時桓𤣥在南郡論四皓來儀漢庭孝惠以立而惠帝柔弱呂后凶忌此數公者觸彼埃塵欲以救弊二家之中各有其黨奪彼與此其讎必興不知匹夫之志四公何以逃其患素履終吉隱以保生者其若是乎以其文贈仲堪仲堪乃答之曰隱顯黙語非賢達之心蓋所遇之時不同所乘之塗必異道無所屈而天下以之獲寧仁者之心未能無感若夫四公者養志巖阿道髙天下秦網雖虐遊之而莫懼漢祖雖雄請之而弗顧徒以一理有感汎然而應事同賔客之禮言無是非之對孝惠以之獲安莫繇報其德如意以之定藩無所容其怨且爭奪滋生主非一姓則百姓生心祚無常人則人皆自賢况夫漢以劍起人未知義式遏姦邪特宜以正順為寳天下大噐也茍亂亡見懼則滄海横流原夫若人之振策豈為一人之廢興哉苟可以暢其仁義與夫伏節委質可榮可辱者道跡懸殊理勢不同君何疑之哉又謂諸吕彊盛幾危劉氏如意若立必無此患夫禍福同門倚伏萬端又未可斷也于時天下新定權繇上制髙祖分王子弟有磐石之固社稷深謀之臣森然比肩豈瑣瑣之禄産所能傾奪之哉此或四公所預予今亦無以辯之但求古賢之心宜存之逺大耳端本正源者雖不能無危其危易持茍啟競津者雖未必不安而其安難保此最有國之要道古今賢哲所同惜也𤣥屈之戴逵性髙潔常以禮度自處深以放達為非道乃著論曰夫親沒而採藥不反者不仁之子也君危而屢出近闗者茍免之臣也古之人未始以彼害名教之體者何達其㫖故也達其㫖故不惑其跡若元康之人可謂好遯跡而不求其本故有徇本徇末之弊舍實逐聲之行是猶美西施而學其顰眉慕有德而折其巾角所以為慕者非其所以為美徒貴貌似而已矣夫紫之亂朱以其似朱也故鄉原似中和所以亂德放達似惠連所以亂道然竹林之為放有疾而為顰者也元康之為放無德而折巾者也可無察乎且儒家尚譽者本以興賢也既失其本則有色取之行懷情喪真以容貌相欺其弊必至於末偽道家去名者欲以篤實也茍失其本又有越檢之行情禮俱虧則仰詠兼忘其弊必至於本薄夫偽薄者非二本之失而為弊者必託二本以自通夫道有常經而弊無常情是以六經有失二政有弊茍乖其本固聖賢所無奈何也嗟夫行道之人自非性足體備闇蹈而當者亦曷能不棲情古烈擬規前修茍迷擬之然後動議之然後言固當先辯其趨舍之極求其用心之本識其枉尺直尋之㫖採其被褐懷玉之繇若斯塗雖殊而其歸可觀也跡雖亂而其絜不乖也不然則流蕩忘反為風波之行自驅以物自誑以偽外眩囂華内喪道實以矜尚奪其真主以塵垢翳其大正貽笑千載可不慎歟逵徵散騎常侍不至袁豹為劉毅撫軍諮議㕘軍領記室毅時建議大田豹上議曰國以民而為本民資食以為天循其業則教興崇其本則末理寔為治之要道致化之所階也不敦其本則末業滋章饑寒交湊則亷恥不立當今接簒偽之末值凶荒之餘爭源既開彫薄彌啟榮利蕩其正性賦斂罄其所資良疇無側趾之耕比屋有困餒之患中間多故日不暇給自卷甲却馬甫及三年積弊之黎難用克振實仁懷之所矜恤明教之所爰發也然斯業不脩有自來矣司牧之官莫或為務俗吏庸近猶秉常科依勸督之故典迷民庶之屢變譬猶脩堤以防川忘淵丘之改易即膠柱於昔絃忽宮商之乖調徒有考課之條而無毫分之益不悟清流在於澄源止輪繇乎髙閣患生於本治之於末故也夫設位以崇賢疏爵以命士上量能以審官不取人於浮譽則比周息遊者既歸則南畝闢矣分職以任務置吏以周役職不以無任立吏必以非用省冗散者廢則萊荒墾矣器以應用商以通財勦靡麗之巧棄難得之貨則彫偽者賤榖稼重矣耕耨勤悴力殷收寡工商逸豫用淺利深增賈販之税薄疇畝之賦則末技抑而田畯喜矣居位無義從之徒在野靡并兼之黨給賜非可恩致力役不入私門則遊食者反本肆勤者自勸遊食省而肆勤衆則東作繁矣密勿者甄異怠慢者顯罰明勸課之令峻糾違之官則懶惰無所容力田有所望力者欣而惰者懼則嗇人勸矣凡此數事亦務田之端趣也蒞之以清心鎮之以無欲朂之以弗倦翼之以亷謹舍日計之小成期逺致於暮歲則澆薄自淳心化有漸矣徐邈安帝時為驍騎將軍邈論議精密時多諮稟之觸類辯釋問則有對舊疑歲辰在卯此宅之左則彼宅之右何得拘忌於東邈以為太歲之屬自是遊神譬如日出之時向東皆逆非為藏體地中也冊府元龜卷八百二十九
