body:
  text: 册府元龜卷六百八十四宋王欽若等撰牧守部條教課最條教易臨之象曰君子以教思無窮容保民無疆語云既富矣又何加焉盖居長人之任興教為本令下禁止風行草偃其所繇來尚矣漢氏而下良吏繼出乃能推本俗尚講求治要思所懲革樹之風聲繇是奬善防非置之表率遏强撫弱為之約束尊賢興學禁滛起廢除律令之不便祛風軌之因習至於樹藝之便利蠶績之程品布帛之度舂汲之宜靡不為立科條以杜紛競眞得夫善人為邦之㫖哉詩曰愷悌君子民之父母異乎不戒視成者已漢黄霸為潁川太守為條教置父老師帥伍長班行之於民間勸以為善防姦之意及務耕桑節用殖財種樹畜養去食穀馬米鹽靡密初若煩碎米鹽言雜而且細然霸精力能推行之王尊為安定太守到官出教告屬縣曰令長丞尉奉法守城為民父母城謂縣城也抑彊扶弱宣恩廣澤甚勞苦矣太守以今日至府願諸君卿勉力正身以率下故行貪鄙能變更者與為治更改也有如此者太守乃共為治者也明愼所職毋以身試法又出教敕掾功曹各自砥礪助太守為治其不中用趣自避退毋乆妨賢趣讀曰促夫羽翮不修則不可以致千里闑内不理無以整外闑門橛之屬府丞悉署吏行能分别白之賢為上毋以富賈人百萬不足與計事昔孔子治魯七日誅少正卯今太守視事巳一月矣五官掾張輔懷虎狼之心貪汚不軌汙濁不軌不修法制也一郡之錢盡入輔家然適足以葬矣今将輔送獄直符史詣閣下從太守受其事直符史若今之當直佐史也丞戒之戒之相隨入獄矣意丞教戒張輔令其避罪故以此言豫勑之輔繫獄數日死盡得其狡猾不道百萬姦臧威震郡中盗賊分散入傍郡界豪彊多誅傷伏辜者何武為揚州刺史行部入傳舎出記問墾田頃畝五榖美惡記謂教命之書已迺見二千石以為常後漢任延為九眞太守駱越之民無嫁娶禮法各因滛好無適對匹不識父子之姓夫婦之道延乃移書屬縣為使男年二十五至五十女年十五至四十皆以年齒相配其貧無禮聘令長吏已下各省俸禄以振助之同時相娶者二千餘人張湛為左馮翊在郡設條教政化大行楊球為髙唐令以嚴苛過理郡守牧舉㑹赦原後遷平原相出教曰相前蒞髙唐志掃姦鄙遂為貴郡所見枉舉昔桓公釋管仲射鈎之讎髙祖赦季布逃亡之罪雖以不德敢忘前義况君臣分定而可懷夙昔哉今一蠲往愆期諸求効若受教之後而不改姦狀者不得復有所容矣郡中咸畏服焉秦彭為山陽太守興起稻田數千頃每於農月親度頃畝分别肥瘠差為三品各立文簿藏之鄉縣於是姦吏跼蹐無所容詐彭乃上言宜令天下齊同其制詔書以其所立條式班令三府竝下州郡王景為廬江太守驅率吏民修起蕪廢遂銘石刻誓令民知常禁又訓令蠶織為作法制皆著于鄉亭廬江傳其文辭魏司馬芝漢末為河南尹為教與羣下曰盖君能設教不能使吏必不犯也吏能犯教而不能使君必不聞也夫設教而犯君之劣也犯教而聞吏之禍也君劣於上吏禍於下此政事所以不理也可不各勉之哉於是下吏自勵蘇則為金城太守旬月之間流民皆歸得數千家乃明為禁令有干犯者輙戮其從者必賞晉王沉魏末為婺州刺史至鎮乃下教曰自古聖賢樂聞誹謗之言聽輿人之誦芻蕘有可録之事負薪有廊廟之語故也自至今日未聞逆耳之言豈未明虚心故令言者有疑其宣下屬城及士庶若能舉遺逸於林藪黜奸佞於州國陳長吏之可否説百姓之所患興利除害損益昭然者給榖五百斛若逹一至之言説刺史得失朝政寛猛令剛柔得中者給榖千斛謂予不信明如皎日主簿陳廞褚䂮曰奉省教㫖伏周感歎勞謙日昃思聞苦言愚謂上之所好下無不應而近未有極諌之辭逺無傳言之箴者誠得失之事將未有也今使教命班下示以賞勸將恐拘介之士或憚賞不言貪昧之人将慕利而妄舉茍不合宜賞不虛行則逺聴者未知當否之所在徒見言之不用謂設有而不行愚以告下之事可小須後沉又教曰夫德薄而位厚功輕而禄重貪夫之所徇髙士之所不處也若陳至言於刺史興利益於本州逹幽隠之賢去祝鮀之佞立德於上受分於下斯乃君子之操何不言之有直言至理忠也惠加一州仁也功成辭賞亷也兼斯而行仁智之事何故懷其道而迷其國哉褚䂮復白曰堯舜周公所以能致忠諌者以其欵誠之心著也氷炭不言而冷熱之質自明者以其有實也若好忠直如氷炭之自然則諤諤之臣将濟濟而盈庭逆耳之言不求而自至若德不足以配唐虞明不足以竝周公實不可以同氷炭雖懸重賞忠諌之言未可致也昔魏絳繇和戎之功蒙女樂之賜管仲有興齊之勲而加上卿之禮功勲明著然後賞勸隨之未聞張重賞以待諫臣懸榖帛以求盡言也沉無以奪之遂從䂮議沉探尋善政按賈逵已來法制禁令諸所施行擇善者而從之乃教曰後生不聞先王之教而望政道日興不可得也文武竝用長乆之道也俗化凌遲不可不革革俗之要實在敦學昔原伯魯不悦學閔馬父知其必亡将吏子弟優閑家門若不教之必致游戲傷毁風俗矣於是九郡之士咸悦道教移風易俗華軼永嘉中為江州刺史雖逢喪亂每崇典禮置儒林祭酒以宏道訓乃下教曰今大義頽替禮典無宗朝廷滯議莫能攸正嘗以慨然宜特立此官以宏其事軍諮祭酒杜夷棲情𤣥逺確然絶俗才學精博道行優備其以為儒林祭酒虞溥為鄱陽内史大修庠序廣招學徒移告屬縣曰學所以定情理性而積衆善者也情定於内而行成於外善積於心而名顯於教故中人之性隨教而移善積則習與性成唐虞之時皆比屋而可封及其廢也而云可誅豈非化以成俗教移人心者哉自漢氏失御天下分離江表冦隔乆替王教庠序之訓廢而莫脩今四海一統萬里同軌熈熈兆庶咸休息乎太和之中宜崇尚道素廣開學業以恊贊時雍光揚盛化乃具為條制於是至者七百餘人溥乃作誥以奬訓之曰文學諸生皆冠𢃄之流年盛質美始渉學庭講修典訓此大成之業立德之基也夫聖人之道淡而寡味欲始學者不好也及至期月所觀彌慱所習彌多日聞所不聞日見所不見然後心開意朗敬業樂羣忽然不覺大化之陶已至道之入神也故學之染人甚於丹青丹青吾見其乆而渝矣未見乆學而渝者也夫工人之染先修其質後事其色質修色積而染工畢矣學亦有質孝弟忠信是也君子内正其心外修其行行有餘力則以學文文質彬彬然後為德夫學者不患才不及而患志不立故曰希驥之馬亦驥之乘希顔之徒亦顔之倫也又曰㓶而舎之朽木不知㓶而不舎金石可虧斯非其效乎今諸生口誦聖人之典體閑庠序之訓比及三年可以小成而令名宣流雅譽日新朋友欽而樂之朝士敬而歎之於是州府交命擇官而仕不亦美乎若乃含章舒藻揮翰流離稱述世務探賾究竒使揚班韜筆仲舒結舌亦惟才所居固無常人也然積一勺以成江河累微塵以崇峻極匪志匪勤理無繇濟也諸生若絶人間之務心專親學累一以貫之積漸以進之則亦或遲或速或先或後耳何滯而不通何逺而不至耶時祭酒求更起屋行禮溥曰君子行禮無常處也故孔子射於矍相之圃而行禮於大樹之下况今學庭庠序髙堂顯敞乎庾亮為征西将軍鎮武昌下教曰人情重交而輕財好逸而惡勞學業至苦而禄答未厚繇㨗徑者多故莫肯用心洙泗邈逺風雅彌替後生放任不復憲章典謨臨官宰政者務目前之治不能閑以典誥遂令詩書荒廢頌聲寂寞仰瞻俯省能不歎慨自胡夷交侵殆三十年矣而未革面嚮風者豈威武之用盡抑文教未洽不足綏之邪昔魯秉周禮齊不敢侮范㑹崇典晉國以治楚魏之君皆阻帶山河慿城據漢國富民殷而不能保其强大吳起屈完所以為歎也繇此言之禮義之固孰與金城湯池季路稱攝乎大國之間加之以師旅因之以饑饉為之三年猶欲行其義方况今江表晏然王道聿隆而不能宏敷禮樂敦明庠序其何以訓彛倫而來逺人乎魏武帝於馳騖之時以馬上為家逮於建安之末風塵未弭然猶留心逺覽太學興業所謂顚沛必於是眞通才也今使三時既務五教竝修軍旅已整爼豆無廢豈非兼善者哉便處分安學校處所籌量起立講舎叅佐大將子弟悉令入學吾家子弟亦令受業四府博學識義通渉文學經綸者建儒林祭酒使班同三署厚其供給皆妙選邦彦必有其宜者以充此舉近臨川臨賀二郡竝求脩復學校可下聴之若非束脩之流禮教所不及而欲階緣免役者不得為生明為條制令法清而人貴又繕造禮器爼豆之屬將行大射之禮亮薨又廢劉宏為荆州刺史每有興廢手書守相丁寧欵密所以人皆感悦争赴之咸曰得劉公一紙書賢於十部從事又舊制峴方二山澤中不聴百姓捕魚宏下教曰禮名山大川不封與共其利今公私竝兼百姓無復厝手地當何謂邪速改此法殷仲堪領晉陵太守居郡禁産子不舉乆喪不葬録父母以質亡叛者所下條教甚有義理唐彬為雍州刺史下教曰此州名都士人林藪處士皇甫申叔嚴舒龍姜茂時梁子逺等竝志節清妙履行髙潔踐境望風虛心饑渴思加延致待以不臣之典幅巾相見論道而已豈以吏職屈染髙規郡國備禮發遣以副都邑之望於是四人皆到彬敬而待之劉秀之為梁南秦二州刺史時漢川饑儉境内騷然秀之限令用錢百姓受其利後魏髙祐為西兖州刺史令一家之中自立一碓五家之外共造一井以供行客不聴婦人寄舂取水北齊蘇瓊為清河太守每蠶月豫下綿絹度様於部内其兵賦次第竝立明式至於調役事必先辦郡縣長史嘗無十杖稽失當時州郡無不遣人至境訪其政術隋令狐熈為鴻臚卿開皇中文帝祠太山還次汴州惡其殷盛多有姦俠於是以熈為刺史下車禁遊食抑工商民有向街開門者杜之船客停於郭外星居者勒為聚落僑人逐令歸本其有滯獄竝决遣之令行禁止稱為良政帝聞而嘉之趙賢通為冀州刺史冀俗薄市井多奸詐乃為銅㪷鐡斛置之於肆百姓便之帝聞而喜頒告天下以為常法唐張文琮髙宗永徽中為建州刺史州境素尚滛祀不修社稷文琮下教書曰春秋二社盖本為農唯獨此州廢而不立祀典既闕風俗何觀近年已來田多不熟抑不祭先農所致乎神在於敬何以邀福於是示其節限條制百姓欣而行之課最繇漢以來重長人之寄有㑹課之法稽勞底績以功多者為最焉盖取乎治行殊等閥閱彰著乃處乎上第或申之懋賞所以旌勸良吏聳厲當世者也若夫考績之典紀於虞書大計之法著於周制所以揆勞而責實奬能而褒善載於前籍斯為懿範然而牧守之重吏民之本患於數易罔克成化儻善人為邦復乆於其道亦未有不邁德敦教厚生美俗而致尤異之課者矣漢兒寛兒音奚武帝時為左内史收租税時裁闊狹與民相假貸謂有貧弱及農要之時不即徴收也以故租多不入後有軍發左内史以負租課殿當免民聞當免皆恐失之大家牛車小家擔負輸租繦屬不絶繦索也言輸者接連不絶於道若繩索之相屬也猶今言續索矣屬之欲切課更以最帝繇此愈竒寛朱邑為北海太守以治行第一入為大司農召信臣為南陽太守遷河南太守治行常為第一陳立為天水太守勸民農桑為天下最尹翁歸為右扶風盗賊課嘗為三輔最韓延夀守東郡三嵗令行禁止斷獄大减為天下最入守左馮翊毋將隆為潁川太守以髙第入為京兆尹黄霸為揚州刺史以髙第為潁川太守以外寛内明得吏民心户口嵗增治為天下第一徴守京兆尹秩二千石自漢興言治民更以霸為首馮野王為隴西太守以治行髙入為左馮翊班况舉孝亷為郎積功勞至上河農都尉上河地名農都尉者典農事大司農奏課連最入為左曹越騎校尉後漢馬魴建武中遷魏郡太守二十七年以髙第入代趙熹為太僕鄧晨好樂郡職繇是拜為中山太守吏民稱之常為冀州髙第中山屬冀州冀州所部郡課常為第一也崔實為五原太守整厲士馬嚴𤇺候虜不敢犯嘗為邊最賈琮為交趾刺史在事三年為十三州最黄琬為豫州牧時寇賊陸梁州境彫殘琬討擊平之威聲大震政績為天下表張奐為武威太守平均徭賦率厲散敗常為諸郡最河西繇是而全魏朗為河南太守政稱三河表三河謂河東河内河南也劉祐為河東太守時屬縣令長率多中官子弟百姓患之祐到抑其權强平理寃結政為三河表魏杜畿為河東太守在任十六年嘗為天下最鄭渾為京兆尹太祖征張魯大軍入漢中運轉軍糧為最梁習再為并州刺史政治常為天下最顔斐為京兆尹與馮翊扶風接界二郡道路既穢塞田疇又荒萊人民饑凍京兆皆整頓開荒人民豐富嘗為雍州十郡最晉解脩初為魏瑯琊太守梁州刺史考績為天下第一武帝受禪封梁鄒侯諸葛恢為㑹稽内史大興初以政績第一詔秩中二千石梁何敬容為吳郡太守為政勤恤民隐辨訟如神視事四年治為天下第一世稱何吳郡後謝舉為吳郡太守聲跡畧相比後魏陸俟為冀州刺史時考州郡治功唯俟與河内太守􅉌陳為天下第一源賀為冀州刺史賀之臨州鞫獄以情徭役簡省時考殿最賀治為第一賜衣馬器物班宣天下賀上表請代朝議以賀得民情不許在州七年乃徴拜太尉裴延雋為幽州刺史在州五年考績為天下最張恂為廣平太守其治為當時第一北齊赫連子悦為鄭州刺史于時新經河清大水民多逃散子悦親加恤惠户口益增治為天下之最許惇為陽平太守當時遷都鄴陽平即是畿郡軍國責辦賦斂無准又勲貴屬請朝夕徴求惇竝御之以道上下無怨治為天下第一後周鄭孝穆西魏大統中行岐州刺史在任未幾有能名王羆時為雍州刺史欽其善政貽書盛相稱述先是所部百姓乆遭離亂逃散殆盡孝穆下車之日户止三千留情撫綏逺近咸至數年之内百四萬家嵗考績為天下最文帝賜書美之徴拜京兆尹王德為平涼郡守雖不知書至於斷文處分良吏無以過涇州所部五郡德常為最崔謙為鉅鹿太守在郡七年獄無停囚每有大使巡察常處上第徴拜銀青光禄大夫隋樊叔略開皇初為相州刺史政為當時第一梁彦光開皇中為岐州刺史其俗頗質以靜鎮之合境大化奏課連最為天下第一劉仁恩為亳州刺史治績號天下第一擢拜刑部尚書韋世康為絳州刺史在任數年有惠政奏課連最擢為禮部尚書楊逹為鄯鄭趙三州刺史俱有能名平陳後髙祖差品天下牧宰逹為第一擢拜工部尚書加上開府令狐熈為汴州刺史下車禁遊食抑工商民有向街開門者杜之船客停於郭外星居者勒為聚落僑人逐令歸本其有獄滯竝決遣之令行禁止稱為良政文帝聞而嘉之顧謂侍臣曰鄴都天下難理處也勑相州刺史豆盧通令習熈之法其年來朝考績為天下之最賜帛三百疋頒告天下房恭懿開皇中為澤州司馬遷德州在職嵗餘盧愷復奏恭懿政為天下之最趙軌開皇中為齊州别駕在州四年考績連最時使者卻陽公梁子恭狀上髙祖嘉之賜物三百段米三百石侯莫陳頴為邢州刺史仁夀中吏部尚書牛宏持節巡撫山東以頴理行為第一髙祖嘉歎優詔褒揚公孫景茂開皇中為息州刺史詔以景茂年終考較獨為稱首昇上儀同伊州刺史裴藴厯洋直棣三州刺史俱有能名大業初考績連最煬帝聞其善政徴為太常少卿唐皇甫無逸隋大業中為淯陽太守甚有能政名差品為天下第一鄭善果隋大業中為魯郡太守克己為治號為清吏煬帝遣御史大夫張衡勞之考為天下最梁文謙隋大業中為饒州刺史嵗餘為鄱陽太守稱為天下之最盧從愿𤣥宗開元四年為蔡州刺史為政嚴簡按察使奏課為天下第一降璽書勞問賜絹百疋無幾入為工部侍郎楊承仙代宗大厯初為懷州刺史當四戰之地邑野荒廢人無全家承仙到官苦心積力以慈愛理之同其甘苦流人自占嵗盈數萬表課第一蕭定累為袁信湖安睦潤六州刺史所蒞皆有聲大厯中有司條天下牧守課績唯定與常州刺史蕭復濠州刺史張鎰為理行第一其勸農桑均賦税逋亡歸復戸口增加定又冠焉尋遷户部侍郎李承為撫州江州刺史課績連最張延賞大厯三年為河南尹充諸道營田副使河雒乆當兵衝閭井丘墟延賞勤身率下政尚簡約疏導河渠脩築宮廟數年間流庸歸附邦畿復完詔書褒美之時罷河南淮西山南副元帥以其兵鎮東都延賞又權知東都留守以領之理河南五年理化第一徴拜御史大夫嚴震為鳯州刺史德宗建中初司勲郎中韋禎為山劔黜陟使薦震理行為山南第一時賜上下考封鄖國公在鳯州十四年能政不替李惠登為隋州刺史在州二十年田疇闢户口加于頎為山南東道節度使以其績上聞加御史大夫升其州為上貞元二十年贈洪州都督薛苹少以吏事進累官至長安令拜虢州刺史朝廷以九課擢為湖南觀察使盧元輔為杭常絳三州刺史以課髙徴為吏部郎中盧商為蘇州刺史在蘇州變鹽法獲利倍多文宗開成二年宰臣為鹽鐡使以課績上聞乃以商為潤州觀察使册府元龜卷六百八十四
