body:
  text: 册府元龜卷六百十一宋王欽若等撰刑法部定律令第三陳髙祖永定元年十月詔曰朕聞唐虞道盛設象畫而不犯夏商德衰雖孥戮其備有洎乎末代綱目滋繁矧屬亂離憲章遺紊朕始膺寳厯思廣政樞外可搜舉良才删改科令群僚博議務存平簡于是稍求得梁時眀法吏令與尚書删定郎范泉叅定律令又勑尚書僕射沈欽吏部尚書徐陵兼尚書左丞宗元饒兼尚書右丞賀朗叅知其事制律三十卷令科四十卷採酌前代條流雜件綱目雖多博而非要其制惟重清議禁錮之科若縉紳之族犯虧名教不孝及内亂者發詔棄之終身不齒先與士人為婚者許妻家奪之其獲賊帥及士人惡逆免死付治聽將妻入役不為年數又存贖罪律復父母緣坐之刑自餘篇目條綱輕重煩簡一用梁法贓驗顯然而不欵則上測立立測者以土為垜髙一尺上圓劣容囚两足立鞭二十笞三十訖著两械及杻上垜一上測七刻日再上三七日上測七日一行鞭杖合一百五十得度不承者免死其髠鞭五嵗刑降死一等鎻二重其五嵗刑已下並鎻一重五嵗四嵗刑若有官准當二年餘並居作其三嵗刑有官准當二年餘一年贖若公坐過誤罰金其二嵗刑有官者贖論一嵗刑無官亦贖論寒庶人准决鞭杖囚並著械徒並著鎻不計階品死罪將决乘露車著三械加壺手至市脱手械及壺手焉當刑于市者夜須眀雨須晴晦朔八節六齋月在張心日並不得行刑廷尉寺為北獄建康縣為南獄並置正監平宣帝大建十一年五月甲寅詔曰舊律以枉法受財為坐雖重直法容賄其制甚輕豈不長彼貪殘生其舞弄才渉貨賄寧不尤切今可改不枉法受財者科同正盗後魏昭成建國二年當死者聽其家獻金馬以贖死犯大逆者親族男女無少長皆斬男女不以禮交皆死民相殺者聽與死家馬牛四十九頭及送葬器物以平之無繫訊連逮之坐盗官物一物備五私則備十法令眀白百姓晏然道武即位躬行仁厚恊和民庶既定中原患前代刑網峻密乃命三公郎王徳除其法之酷切于民者約定科令大崇簡易是時天下人民久苦兵亂畏法樂安帝知其若此乃鎮之以𤣥黙罰必從輕兆庶欣戴焉太武神䴥中以刑禁重詔司徒崔浩定律令除五嵗四嵗刑増一年刑分大辟為二科死斬死入絞大逆不道腰斬誅其同籍年十四以下腐刑女子没縣官害其親者轘之蠱毒者男女皆斬女焚其家巫蠱者負羖羊抱犬沉諸淵當刑者贖貧則加鞭二百畿内民富者燒炭于山貧者役于圊溷女子入舂藁其痼疾不逮于人守苑囿王官階九品得以官爵除刑婦人當刑而孕産後百日乃决年十四以下降刑之半八十及九十非殺人不坐拷訊不踰四十九論刑者部主具狀公車鞫辭而三都决之當死者定案奏聞以死不可復生懼監官不能平獄成皆呈帝親臨問無異辭怨言乃絶之諸州國之大辟皆先讞報乃施行闕左懸登聞鼔人有窮寃則撾鼓公車上奏太平眞君六年春以有司斷法不平詔諸疑獄皆付中書依古經義論决之初盗律贓四十疋致大辟民多慢政峻其法贓三疋皆死正平元年詔曰刑網太宻犯者更衆朕甚愍之其詳按律令務求厥中有不便于民者増損之于是㳺雅與中書侍郎胡方回等改定律制盗律復舊加故縱通情止舎之法及他罪九千三百九十一條門誅四大辟百四十五刑二百二十一條有司雖増損條章猶未能闡眀刑典文成太安四年制法司官贓二丈皆斬又増律七十九章門房之誅十有三大辟三十五刑六十二十月帝北廵至隂山有故塜毁廢詔曰昔姬文𦵏枯骨天下歸仁自今有穿毁墳壠者斬之和平二年正月乙酉詔曰刺史牧民為萬里之表自頃每因發調逼民假貸大商富賈要射時利旬日之間増贏十倍上下通同分以潤屋故編戸之家困于凍餒豪富之門日有兼積為政之弊莫過于此其一切禁犯者十疋以上皆死布告天下咸令知禁四年三月詔曰朕憲章舊典分職設官欲令敷揚治化緝熈庶績然在職之人皆蒙顕擢委以事任當勵已竭誠務省徭役使兵民優逸家給人贍今内外諸司州鎮守宰侵使民兵勞役非一自今擅有召役逼僱不程皆論同枉法是時冀州刺史源賀上言自非大逆手殺人者請原其命謫守邉戍從之獻文以和平六年五月即位除口誤律先是諸曹奏事多有疑請又口傳詔勅或致矯擅于是事無大小皆令據律正名不得疑奏合則制可失𠂻則彈詰之盡從中墨詔自是事咸精練群下莫敢相㒺皇興中以理官鞫囚杖限五十而有司欲免之則用細捶欲䧟之則先大杖民多不勝而誣引或絶命于杖下獻文知其若此乃為之制其捶用荆平其節訊囚者其本大三分杖背者二分撻脛者一分拷悉依今皆從輕簡孝文延興四年六月乙卯詔曰朕膺厯數開一之期屬千載光熈之運雖仰嚴誨猶懼徳化不寛至有門房之誅然下民兇戾不顧親戚一人為惡殃及合門朕為民父母深所悼愍自今以後非謀反大逆干紀外奔罪止其身而已今德被殊方文軌將一宥刑寛禁不亦善乎太和元年詔曰刑罰所以禁暴息姦絶其命不在裸形故事斬者祼形伏鑕入死者絞絞雖有律未之行也其叅詳舊典務從寛仁司徒元丕等奏言聖心垂仁恕之惠使受戮者免裸骸之苦普天感徳莫不幸甚臣等謹議大逆及賊各棄市袒斬盗及吏受賕各絞刑踣諸甸師又詔曰民繇化穆非嚴刑所防制之雖峻䧟者彌甚今犯法至死同入斬刑去衣裸體男女媟見豈齊之以法示之以禮者也今具為之制五年冬中書令髙閭集中祕官等修改律令舊文隨例増減又勅群官叅議厥中經御刋定凡八百三十二章門房之誅十有六大辟之罪二百三十五刑三百三十七除群行剽劫首謀門誅律重者止梟首時法官及州郡縣不能以情折獄乃為重枷大幾圍復以縋石懸于囚頸傷害至骨更使壯卒迭搏之囚率不堪因以誣服吏持此以為能帝聞而傷之乃制非大逆有眀證而不欵辟者不得大枷八年更定義贓一百疋枉法無多少皆死律枉法十疋義贓二百疋大辟是年始班祿制乃更其法九年正月詔自今圖䜟秘緯及名為孔子門房記者一皆禁之留者以大辟論十一年春詔曰三千之罪莫大于不孝而律不遜父母罪止髠刑於理未𠂻可更詳改又詔曰前命公卿論定刑典而門房之誅猶在律䇿違失周書父子異罪推古求情意甚無取可更議之删除繁酷八月詔曰律文刑限三年便入極黙坐無大半之校罪有生死之誅可詳按律條諸有此類更一刋定十二年正月乙未詔曰鎮戍流徙之人年滿七十孤單窮獨雖有妻妾而無子孫諸如此等聽解名還本諸犯死刑者父母祖父母年老更無成人子孫旁無期親者具狀以聞十五年五月己亥議改律令十六年四月丁亥朔班新律令十七年二月詔賜議律令之官五更大鴻臚卿游眀根布帛一千疋穀一千石典屬國下大夫崔挺布帛八百疋榖八百石馬牛各二中書侍郎邵封琳布帛六百疋穀六百石馬牛各一宋王傅高祐秘書令李彪各帛五百疋粟五百石馬一牛二宣武正始元年十二月己卯詔群臣議定律令時尚書殿中郎袁翻門下録事常景孫紹廷尉監張彪律博士侯堅固治書侍御史髙綽前軍將軍邢苖奉車都尉程靈虬羽林監王元龜尚書郎祖瑩宋世景貟外郎李琰之太樂令公孫崇等並在議限永平元年七月乙未詔尚書檢枷杖大小違制之由科其罪失尚書令髙肇尚書僕射清河王懌尚書邢巒尚書李平尚書江陽王繼等奏曰臣等聞王者繼天子物為民父母導之以徳化齊之以刑法大小必以情哀矜而勿喜務于三訊五聽不以木石定獄伏惟陛下子爱蒼生恩侔天地䟽網改祝仁過商后以枷杖之非度愍民命之或傷爰降慈㫖廣垂昭䘏雖有虞慎獄之深漢文惻隱之至亦未可共日而語矣謹案獄官令諸察獄先備五聽之理盡求情之意又驗諸證信事多疑似猶不首實者然後加以拷掠諸犯年刑以上枷鎻流徙以上増以杻械迭用不俱非大逆外叛之罪皆不大枷髙杻重械又無用石之文而法官州縣因緣増加遂為常法進乖五聽退違令文誠宜案劾依㫖科處但踵行已久計不推坐檢杖之大小鞭之長短令有定式但枷之虛實輕重先無成制臣等叅量造大枷長一丈三尺喉下長一丈通頰木各方五寸以擬大逆外叛杻枷以掌流刑已上諸䑓寺州郡大枷請悉焚之枷本掌囚非拷訊所用從今㫁獄皆依令盡聽訊之理量人強弱加之拷掠不聽非法拷人兼以枷石自是枷杖之制頗有定凖未幾獄官肆虐稍復重大延昌二年尚書邢巒疏奏以法制五等列爵及在官品令從第五以上皆當刑二嵗免官者三載之後聽仕降先階一等竊詳王公以下或析體宸極或勲著當時咸胙土授民維城盤石至於五等之爵亦以功錫雖爵秩有異而號擬河山得之至難失之永墜刑典既同名復殊絶請議所宜附為永制詔議律之制與八座門下叅論皆以為官若有罪本除名以職當刑猶有餘資得降階而叙至于五等分爵除刑若盡永即甄削便同之除名於例實爽愚謂自王公以下有封邑罪除名三年之後宜各降本爵一等王及郡公降為縣公公為侯侯為伯伯為子子為男縣男則降為鄉男五等爵亦依此而降至于散男其鄉男無可降授者三年之後聽依其本品之資出身詔從之三年宗士元顕富犯罪須鞫宗正約以舊制皇族有譴皆不訊鞫尚書李平奏以帝宗盤固周布于天下其屬籍疏逺䕃官卑末無良犯憲理須推究請立限㫁以為定式詔曰雲來綿逺繁衍世滋指藉宗氏而為不善者量亦多矣先朝既無不訊之格而空相矯恃以長違暴諸在議請之外可悉依常法孝眀熈平二年五月重申天文之禁犯者以大辟論是時廷尉卿元志監王靖等上言檢除名之例依律文獄成謂處罪案成者是為犯罪逕彈後使覆檢鞫證定刑罪狀彰露案署分眀獄理是成若使案雖成解以申省事下廷尉或寺以情狀未盡或邀駕撾皷或門下立疑更付别使者可從未成之條其家人陳訴信其專辭而阻成㫁便是曲遂于私有乖公體何者五詐既窮六備已立僥倖之軰更起異端進求延罪于漏刻退希不測之恩宥辯以惑正曲以亂直長民姦于下隳國法於上竊所未安大理正崔纂平楊機丞申休律博士劉安元以為律文獄已成及决竟經所綰而疑有姦欺不直于法及訴寃枉者得攝訊覆治之檢使處罪者雖已案成或御史風彈以痛誣伏或拷不成引依證而科或有私嫌強逼成罪家人訴枉辭案相背刑憲不輕理狀須訊既為公正豈疑于私如謂規不測之澤抑絶訟端則枉滯之徒終無申理若從其案成便乖覆治之律然未判經赦及覆治理狀真偽未分承前以來如此例皆得復職愚謂經奏遇赦及已覆治得為獄成尚書李韶奏使雖結案處上廷尉解送至省及家人訴枉尚書納辭連解下鞫未檢遇赦者不得為案成之獄推之情理謂崔纂等議為允從之又尚書令任城王澄奏案諸州中正亦非品令所載又無祿䘏先朝以來皆得當刑直閣等禁直上下有宿衛之勤理不應異靈太后令准中正出帝太昌元年丁未詔曰理有一准則民無覬覦法啟二門則吏多威福前主為律後主為令歴世永久寔用滋章非所以准的庶品隄防萬物可令執事之官四品以上集於都省取諸條格議定一塗其不可施用者當局停記新定之格勿與舊制相連務在約通無致繁惑文帝大綂十三年二月詔自今應宫刑者直没官勿刑亡奴婢應黥者止科亡罪東魏孝静天平三年正月詔百官舉士舉不稱才者两免之興和三年十月班麟趾格於天下先是詔群官於麟趾閣增損舊事為麟趾新格其名法科條皆討述刪定北齊文宣帝天保元年始命群官刻定魏朝麟趾格是時軍國多事政刑不一决獄定罪罕依律文相承謂之變法從事清河房超為黎陽郡守有趙道德者使以書屬超超不發書棒殺其使帝於是令守宰各設棒以誅屬請之使後都官郎中宋軌奏曰昔曹操棒威於亂時今施之太平未見其可若受使請賕猶致大戮身為枉法何以加罪於是罷之既而司徒功曹張老上書稱大齊受命以來律令未改非所以創制垂法革人視聽于是始命群官議造齊律積年不成其决獄猶依魏舊是時刑政尚新吏皆奉法武成帝河清三年尚書令趙郡王叡等奏上齊律十二篇一曰名例二曰禁衛三曰婚户四曰擅興五曰違制六曰詐偽七曰鬬訟八曰盗賊九曰捕㫁十曰毁損十一曰廐牧十二曰雜其定罪九百四十九條又上新令四十卷大抵採魏晋故事其制名五一曰死重者轘之其次梟首並陳尸三日無市者列於鄉亭顕處其次斬刑殊身首其次絞刑死而不殊凡四等二曰流刑謂論法可死原情可降鞭笞各一百髠之投于邉裔以為兵卒未有道里之差其不合逺配者男子長徒女子配舂並六年三曰刑罪即耐罪也有五嵗四嵗三嵗二嵗一嵗之差凡五等各加鞭一百其五嵗者又加笞八十四嵗者六十三嵗者四十二嵗者二十一嵗者無笞並鎻輸左校而不髠無保者鉗之女人配舂及掖庭織四曰鞭有一百八十六十五十四十之差凡五等五曰杖有三十二十一十之差凡三等大凡為十等當加者上就次當減者下就次贖罪舊以金皆代以中絹死一百疋流九十二疋刑五嵗七十八疋四嵗六十四疋三嵗五十疋二嵗三十六疋各通鞭笞論一嵗無笞則通鞭二十四疋鞭杖每十贖絹一疋至鞭百則絹十疋無絹之鄉皆准絹収錢自贖笞十已上至死又為十五等之差當加減次如正决法合贖者謂流内官及爵秩比視老小閹癡并過失之屬犯罰絹一疋及杖十以上皆名為罪人盗及殺人而亡者即懸名注籍甄其一房配驛户宗室則不注盗不入奚官不加宫刑自犯流罪以下合贖者及婦人犯刑以下侏儒篤疾癃殘非犯死罪皆頌繫之罪刑年者鏁無鏁以枷流罪已上加杻械死罪者桁之决流刑鞭笞者鞭其背五十一易執鞭人鞭鞘皆用熟皮削去亷棱鞭瘡長一尺笞者笞背而不中易人杖長三尺五寸大頭徑二分半小頭徑一分半决三十以下杖者長四尺大頭徑三分小頭徑二分在官犯罪鞭杖十為一負閑局六負為一殿平局八負為一殿繁局十負為一殿加于殿者復計為負焉赦日則武庫令設金雞及鼓于閶闔門外之右勒集囚徒于闕前撾鼔千聲釋枷鏁焉又列重罪十條一曰反逆二曰大逆三曰叛四曰降五曰惡逆六曰不道七曰不敬八曰不孝九曰不義十曰内亂其犯此十者不在八議論贖之限是後法令眀審科條簡要又勅仕門之子弟常講習之齊人多曉律法皆由此也其不可為定法者别制權令二卷與之幷行後主天統五年詔應宫刑者普免刑為官口後周太祖為魏丞相文帝大統元年命有司斟酌古今通變可以益時者為二十四條之制奏之七年又下十二條制十年魏帝命尚書蘇綽總三十六條更損益為五卷班于天下武帝保定三年二月初頒新律初太祖為西魏丞相以河南趙肅為廷尉卿撰定律法肅積思累年遂感心疾而死乃命司憲大夫拓跋廸掌之至是乃就謂之大律凡二十五篇一曰刑名二曰法例三曰祀享四曰朝㑹五曰婚姻六曰户禁七曰水火八曰興繕九曰衛宫十曰市㕓十一曰闘競十二曰劫盗十三曰賊叛十四曰毁亡十五曰違制十六曰闗津十七曰諸侯十八曰廐牧十九曰雜犯二十曰詐偽二十一曰請求二十二曰告言二十三曰逃亡二十四曰繫訊二十五曰㫁獄大凡定罪一千五百三十七條其制罪一曰杖刑五自十至五十二曰鞭刑五自六十至于百三曰徒刑五徒一年者鞭六十笞十徒二年者鞭七十笞二十徒三年者鞭八十笞三十徒匹年者鞭九十笞四十徒五年者鞭一百笞五十四曰流刑五流衛服去皇畿二千五百里者鞭一百笞六十流要服去皇畿三千里者鞭一百笞七十流荒服去皇畿三千五百里者鞭一百笞八十流鎮服去皇畿匹千里者鞭一百笞九十流蕃服去皇畿四千五百里者鞭一百笞一百五曰死刑五一曰罄二曰絞三曰斬四曰梟五曰裂五刑之屬各有五合二十五等不立十惡之目而重惡逆不道大不敬不孝不義内亂之罪凡惡逆肆之三日盗賊群攻鄉邑及入人家者殺之無罪若報仇者造于法而自殺之不坐經為盗者注其籍惟皇宗則否凡死罪枷而拲流罪枷而梏徒罪枷鞭罪桎杖罪散以侍㫁皇族及有爵者死罪以下鏁之徒以下散之獄成將殺者書其姓名及其罪于拲而殺之市惟皇族與有爵者隱獄其贖杖刑五金一两至五兩贖鞭刑五金六兩至十兩贖徒刑五一年金十二兩二年十五兩三年一斤二両四年一斤五兩五年一斤八兩贖流刑一斤十二兩俱役六年不以逺近為差等贖死刑金二斤鞭者以一百為限加笞者合二百止應加鞭笞者皆先笞後鞭婦人當笞者聽其贖論徒輸作者皆任其所能而役使之杖十已上當加者上就次數滿乃坐當减者死罪流蕃服蕃服已下俱至徒五年五年已下各以一等為差盗賊及謀反大逆降叛惡逆罪當流者皆甄一房配為雜户其為盗賊事發逃亡者懸名注配若再犯徒三犯鞭者一身永配下役應贖金者鞭杖十収中絹一疋流徒者依限嵗収絹十二疋死罪者一百疋其贖刑死罪五旬流罪四旬徒刑三旬鞭刑二旬杖刑一旬限外不贖者歸于法貧者請而免之大凡定法一千五百三十七條班之天下四月初禁天下報讎犯者以殺人論建徳六年八月詔曰以刑止刑世輕世重罪不及嗣皆有定科雜役之徒獨異常憲一從罪配百世不免罰既無窮刑何以措道有㳂革宜從寛典凡諸雜戸悉放為民配雜之科因之永削十二月初行刑書要制持杖群强盗一疋以上不持杖群强盗五疋以上監臨主掌自盗二十疋以上小盗及詐請官物三十疋以上正長隱五戸及十丁以上隱地三頃以上皆至死刑書所不載者自依律科宣帝大象元年以髙祖所作刑書要制用法嚴重及帝即位以海内初平恐物情未附乃除之至是大醮于正武殿告天而行焉隋高祖開皇元年既受周禪詔尚書左僕射渤海公髙熲上柱國沛公鄭譯上柱國清河郡公楊素大理前少卿平原縣公常眀刑部侍郎保城縣公韓濬比部侍郎李諤兼考功侍郎栁雄亮等更定新律奏上之其刑名有五一曰死刑二有絞有斬二曰流刑三有一千里一千五百里二千里應配者一千里居作二年一千五百里居作二年半二千里居作三年應住居作者三流俱役三年近流加杖一百一等加三十三曰徒刑五有一年一年半二年二年半三年四曰杖刑五自六十至于百五曰笞刑五自十至于五十而蠲除前代鞭刑及梟首轘裂之法其流徒之罪皆減從輕惟大逆謀反叛者父子兄弟皆斬家口没官又置十惡之條多採後齊之制而頗有損益一曰謀反二曰謀大逆三曰謀叛四曰惡逆五曰不道六曰大不敬七曰不孝八曰不睦九曰不義十曰内亂犯十惡及故殺人獄成者雖㑹赦猶除名其在八議之科及官品第七已上犯罪皆例減一等其品第九以上犯者聽贖應贖者皆以銅代絹贖銅一斤為負負十為殿笞十者銅一斤加至杖一百則十斤徒一年贖銅二十斤每等則加銅十斤三年則六十斤矣流一千里贖銅八十斤每等則加銅十斤三千里則百斤矣二死皆贖銅百二十斤犯私罪以官當徒者五品以上一官當徒二年九品以上一官當徒一年當流者三流同比徒三年若犯公罪者徒各加一年當流者各加一等其累徒過九年者流二千里定訖詔頒之曰帝王作法㳂革不同取適於時故有損益夫絞以致弊斬則殊刑除惡之體于斯已極梟首轘身義無所取不益懲肅之理徒表安忍之懐鞭之為用殘剝膚體徹骨侵肌酷均臠切雖云逺古之式有乖仁者之刑梟轘及鞭并令去也貴礪帶之書不當徒法廣軒冕之䕃旁及諸親流役六年改為五載刑徒五嵗變從三祀其餘以輕代重化死為生條目甚多備於簡䇿宜頒諸海内為時作範雜格嚴科並宜除削先施法令欲人無犯之心國有常刑誅而不怒之義措而不用庶或非逺萬方百辟知吾此懐自前代相承有司訊考皆以法外或有用大棒束杖車輻鞵底壓踝拔挄之屬楚毒備至多所誣伏雖文致于法而每有枉濫莫能自理至是盡除苛慘之法訊囚不得過二百枷杖大小咸為之程品行杖者不得易人帝又以律令初行人未知禁故犯法者衆下吏承苛政之後務鍜錬以致人罪乃詔申勅四方敦理辭訟有枉屈縣不理者令以次經郡及州至省仍不理乃詣闕申訴有所未愜聽撾登聞皷有司録狀奏之三年帝因覽刑部奏㫁獄數猶至萬條以為律尚嚴宻故人多䧟罪又勅蘇威牛𢎞等更定新律除死罪八十一條流罪一百五十四條徒杖等千餘條定留惟五百條凡一十二卷一曰名例二曰衛禁三曰職制四曰戸婚五曰廐庫六曰擅興七曰盗賊八曰鬪訟九曰詐偽十曰雜律十一曰捕亡十二曰㫁獄自是刑網簡要疎而不失于是置律博士弟子貟㫁決大獄皆先牒眀法定其罪名然後依㫁五年侍官慕容天逺糾都督田元冒請義倉事實而始平縣律生輔恩舞文䧟天逺遂更反坐帝聞之乃下詔大理律博士尚書刑部眀法州縣律生並停廢自是諸曹決事皆令具寫律文㫁之六年除孥戮相坐之令又命諸州囚有處死不得馳驛行決十三年二月制坐事去官者配流一年是年制私家不得隱藏緯候圖䜟是年改徒及流並為配防十五年二月収天下兵器敢有私造者坐之闗中縁邉不在其例十二月勅盗邉糧一升已上皆斬幷籍没其家十六年八月詔決死罪者三奏而後行刑十七年三月詔曰分職設官共理時務班位髙下各有等差若所在官人不相敬憚多自寛縱事難克舉諸有殿失雖備科條或據律乃輕論情則重不即決罰無以懲肅其諸司論屬官若有愆犯聽于律外斟酌決杖十八年五月詔畜猫鬼蠱毒厭魅野道之家投於四裔九月勅舎客無公驗者坐及刺史縣令焬帝大業三年四月頒律令初帝即位以髙祖禁網深刻又勅修律令除十惡之條時斗稱皆小舊二倍其贖銅亦加二倍為差杖百則三十斤矣徒一年者六十斤毎等加三十斤為差三年則一百八十斤矣流無異等贖二百四十斤二死同贖三百六十斤其實不異開皇舊制舋門子弟不得居宿衛近侍之官先是蕭巗以叛誅崔君綽坐連庶人勇事家口籍没巗以中宫故君綽以女入宫愛幸帝乃下詔曰罪不及嗣既𢎞至公之道恩由義㫁以勸事君之節故羊鲋從戮彌見叔向之誠季布立勲無預丁公之禍用能樹聲徃代貽範將來朕虛已為政思遵舊典推心待物毎從寛政六位成象美厥含𢎞一𤯝掩徳甚非謂也諸犯罪被戮之門期以下親仍令合仕聽預宿衛近侍之官至是新律成凡五百條為十八篇詔施行之謂之大業律一曰名例二曰衛官三曰違制四曰請求五曰尸六曰婚七曰擅興八曰告劾九曰賊十曰盗十一曰鬪十二曰捕亡十三曰倉庫十四曰廐牧十五曰闗市十六曰雜十七曰詐偽十八曰㫁獄其五刑之内降從輕典者二百餘條其枷杖決罰訊囚之制並輕於舊是時百姓久厭嚴劾喜于刑寛四年十月乙夘頒新式于天下九年八月制盗賊籍没其家册府元龜卷六百十一
