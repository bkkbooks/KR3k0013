body:
  text: 册府元龜卷二十二宋王欽若等撰帝王部符瑞傳曰麟鳳五靈王者之嘉瑞也夫德之休明天降茂祉則必百神幽贊庻物效靈故有非人力之所能致而自至焉者先民有言曰人主和德於上百姓和合於下則天下之和應矣故嘉禾興朱草生記曰天不愛其道地不愛其寶蓋珍符之應以應有德故王者重之是以書載歸禾詩咏鳴鳳芝房寶鼎升於樂府神雀丼露標爲年紀皆所以發揚景貺光昭丕烈者也然而洪覆在上其道𤣥逺坤厚載物其德沉潛人靈歆乎至和昆蟲蒙乎利澤非布於偉兆震乎珍物又安能發輝眷祐而覺悟黎蒸者哉太昊伏羲氏受龍圖畫八卦有景龍之瑞炎帝神農氏致大火之瑞嘉禾生醴泉出黄帝軒轅氏有土德之瑞故號黄帝天下旣定聖德光被羣瑞畢臻有屈軼之草生於庭佞人入朝則草指之是以佞人不敢進有景雲之瑞有赤方氣與靑方氣相連赤方中有兩星靑方中一星凡三星皆黄色以天晴明時見於攝提名曰景星一云景星見形如半月可以夜作黄帝黄服齊于中宮坐于𤣥扈雒水之上有鳳凰集於東園或巢於阿閣或鳴於庭其雄自歌其雌自舞麒麟在囿神鳥來儀有大螻如羊大螾如虹黄帝以土氣勝遂以土德王五十年七月庚申天霧三日三夜晝昏黄帝問天老力牧容成曰於公何如天老曰臣聞之國安其主好文則鳳凰居之國亂其主好武則鳳凰去之今鳳凰翔於東郊而樂之其鳴音中夷則與天相副以是觀之天有嚴敎以賜帝帝勿犯也乃召史卜之龜燋史曰臣不能占也其問之聖人帝曰已問天老力牧容成矣史北面再拜曰龜不違聖智故燋霧除游于雒水之上見大魚殺五牲以醮之天乃甚雨七日十夜魚流於海得圖書焉龍圖出河龜書出雒赤文篆字以授軒轅軒轅接萬神於明庭今寒門谷口是也又獲寶鼎帝南巡狩至於東濵澤獸出能言逹萬物之情少昊金天氏登帝位有鳳凰之瑞帝嚳髙辛氏代髙陽氏王天下使鼓人拊鞞擊鐘鳳凰鼓翼而舞帝堯在位七十年景星出翼鳳凰在庭朱草生嘉禾秀丼露潤醴泉出日月如合璧五星如連珠厨中自生肉其薄如箑搖動則風生食物寒而不臭名曰箑脯又有草夾階而生月朔始生一莢月半而生十五莢十六日已後日落一莢及晦而盡月小則一莢焦而不落名曰蓂莢一曰歴莢帝舜卽位蓂莢生於階鳳凰巢於庭擊石拊石百獸率舞景星出房地出乘黄之馬西王母獻白環玉玦舜命禹平水土四海之内咸戴帝舜之功於是禹乃興九韶之樂致異物鳳凰來翔天下明德自虞帝始夏禹卽天子之位雒出龜書六十五字是爲洪範此謂雒出書者也禹南廵狩濟江中流有二黄龍負舟舟人皆懼禹笑曰吾受命於天屈力以養人生寄也死命也奚懼龍哉龍於是曵尾而逃禹卑宮室盡力溝洫百谷用成龍女降湯有神牽白狼啣鈎而入商朝金德將盛銀山自溢周武王卽位天下歸之周德旣隆草木茂盛蒿堪爲室因居蒿宮成王時周公旦攝政七年制禮作樂祥烏鳳凰見蓂莢生乃與成王觀於河雒沈璧禮畢王退俟至于日昧榮光並出黄河淸慶雲至靑龍臨壇啣𤣥甲之圖坐之而去禮于雒亦如之𤣥龜靑龍蒼兕至于壇背甲刻書赤文成字周公援筆以世文寫之書成文消龜墮甲而去其言自周訖于秦漢盛衰之符麒麟遊苑鳳凰翔庭成王援琴而歌曰鳳凰翔兮於紫庭余何德兮以感靈頼先王兮恩澤深于胥樂兮民以寧周公東征諸侯咸服宗周天降祉福唐叔得禾異畝同穎一作穗穎卽穗也獻之成王成王命唐叔以餽周公於東土作歸禾周公旣受命禾旅天子之命作嘉禾後魏書靈徵志曰成王時治政太平黒狐見穆王征西戎得四白狼白鹿漢文帝十五年春黄龍見於成紀又日中有王字景帝時㑹稽人朱仲獻三寸四寸珠明月珠王者不殺鱗介之物則出武帝元狩元年十月郊雍獲一角獸若麃然麃鹿属也形似麞牛尾一角有司曰陛下肅祗郊祀上帝報享錫一角獸蓋麟云於是以薦五畤畤加一牛以燎賜諸侯白金以風符應合於天也元鼎元年汾陰巫錦錦巫名爲民祠魏脽后土營旁魏故魏國也汾脽本魏地之境故云魏睢也营謂祠之兆域也見地如鉤狀掊視得鼎掊謂手把土也鼎大異於衆鼎文縷無欵識欵刻也識記也恠之言吏吏告河東太守勝勝以聞天子使驗問巫得鼎無姦詐廼以禮祠迎鼎至丼泉從上行薦之以鼎從行丼泉將薦之天至中山宴温有黄雲焉三輔謂日晴霽爲宴宴而温乃有黄雲故爲異也中讀曰仲卽今雲陽之中山也下雲合兹中山亦同也有鹿過帝自射之因之以祭云至長安公卿大夫皆議尊寶鼎天子曰間者河溢歲數不登故廵祭后土祈爲百姓育穀今年豐楙未報鼎曷爲出哉楙美也稼穡美也未報者獲年豐而未賽也一曰雖祈穀而未獲年豐之報也張敞引此詔文云穀嗛失報嗛者少也有司皆言聞昔㤗帝興神鼎一泰帝者卽太昊伏羲氏也一者一統天地萬物所繫象也黄帝作寶鼎三象天地人禹收九牧之金九牧九州之牧也鑄九鼎象九州皆嘗觴享上帝鬼神以享祀上帝也觴享者一也觴享鬻而祀也韓詩采蘋曰予以觴之惟錡及釡其空足曰鬲足中空不實者名之曰鬲也以象三德三德一曰正直二曰剛克三曰柔克事見周書洪範饗承天祐祐福也夏德衰鼎遷于殷殷德衰鼎遷于周周德衰鼎遷於秦秦德衰宋之社亡鼎廼淪胥而不見周頌曰自堂徂基自羊徂牛鼐鼎及鼒不吳不敖胡考之休周絲衣之詩基門塾之基鼎絶大者謂之鼐圓弇上謂之鼒吳驩譁也考夀也休美也言報祭祀者或升堂室或升門墊視牛羊之牲及舉大小之鼎告其致絜神降之福故獲壽考之美曰何壽之美者嘆之言也今鼎至丼泉以光潤龍變承休無疆合兹中山有黄白雲降言鼎至廿泉之後光潤變見若龍之神能幽明能小大乘此休福無窮竟也有黄白雲降與初至中山黄雲之瑞相合也蓋若獸之爲符言丼泉之雲又若獸形以爲符瑞也路弓乗矢集獲壇下路大也四矢曰乗又於壇下獲弓矢之應報祀大享惟受命而帝者心知其意而合德焉高祖受命知之宜見鼎於其廟也合德謂與天合德鼎宜視宗禰廟臧於帝庭以合明應視讀曰示宗謂先帝有德可尊者也禰父廟也帝庭丼泉天子之庭制曰可時又有芝草生丼泉殿房中天子爲塞河興通天臺若有光云爲塞河及造通天臺而有神光之應欲赦天下也廼下詔甘泉房中生芝九莖赦天下毋令復作元封二年六月詔曰丼泉宮内中産芝九莖連葉上帝慱臨不異下房言天廣臨不以下房爲幽側而隔異之賜以此芝賜朕𢎞休其赦天下賜雲陽都百户牛酒作芝房之歌四年三月祠后土詔曰朕躬祭后土地祗見光集于靈壇一夜三燭燭謂炤也幸中都宫殿上見光其赦汾陰夏陽中都死罪以下六年三月詔曰朕禮首山昆田出珍物化或爲黄金祭后土神光三燭其赦汾隂殊死以下太初三年二月行幸東海獲赤鴈後元元年二月詔曰朕郊見上帝廵守北邊見羣鶴留止以不羅罔靡所獲獻時春也非用罔羅時故無所獲也薦于㤗畤光景並見其赦天下昭帝始元元年二月黄鵠下建章宮太液池中黄鵠大鳥舉千里者公卿上壽三年十月鳳凰集東海遣使者祠其處三年中鳳凰北下東海海西樂鄉宣帝本始元年五月鳳凰集膠東千乗二年六月尊孝武廟爲世宗告祠世宗廟日有白鶴集後庭以立世宗廟告祠孝昭寢有雁五色集殿前西河築世宗廟神光興於殿旁有鳥如白鶴前赤後靑神光又興於房中如燭狀廣川國世宗廟殿上有鐘音房戸大開夜有光殿上盡明四年五月鳳凰集北海安丘淳于二縣皆属北海地節二年四月鳳凰集魯郡羣烏從之元康元年三月以鳳凰集㤗山陳留丼露降未央宮赦天下徒四年三月神爵五彩以萬數集長樂未央北宮髙寢丼泉㤗畤殿中及上林苑神爵元年三月幸河東祠后土有神爵集詔曰廼元康四年嘉榖𤣥稷降于郡國𤣥稷黑粟也神爵仍集金芝九莖産于函德殿銅池中函德殿名也銅池承霤也以銅爲之九眞獻竒獸駒形鱗色牛角仁而愛人南郡獲白虎威鳳爲寶朕之不明震于珍物飭躬齋精祈爲百姓東濟太河天氣淸淨神魚舞河幸萬歲宮神爵翔集汾陰有萬歲宮其以五年爲神爵元年二年正月乙丑鳳凰神爵丼露降集京師羣鳥從以萬數四年二月詔曰廼者鳳凰丼露降集京師嘉瑞並見修興㤗一五帝后土之祠祈爲百姓蒙祉福鸞鳳萬舉飛覧翺翔集止於旁齋戒之暮神光顯著薦鬯之夕神光交錯或見于天或登于地或從四方來集于壇上帝嘉嚮海内承福其赦天下十月鳳凰十一集杜陵十二月鳳凰集上林五鳳三年三月行幸河東祠后土詔曰朕飭躬齋戒郊上帝祠后土神光並見或興于谷燭燿齋宮十有餘刻丼露降神爵集鸞鳳又集長樂宮東闕中樹上門外闕樹行馬之裏樹也飛下止地文章五色留十餘刻吏民並觀其赦殊死以下丼露元年四月黄龍見新豐二年正月詔曰乃者鳳凰丼露降集黄龍登興醴泉滂流枯槁榮茂神光並見咸受禎祥其赦天下三年二月鳳凰集新蔡羣鳥四面行列皆向鳳凰立以萬數黄龍元年二月黄龍見廣漢郡成帝鴻嘉元年冬黄龍見真定永始二年二月龍見於東萊四年正月行幸丼泉郊㤗畤神光降集紫殿元延四年三月丼露降京師平帝元始元年正月越裳重譯獻白雉一黑雉二後漢光武建武二年野谷旅生麻菽尤盛野蠶成蠒於山阜人收其利焉先是王莽末天下旱蝗黄金一斤易米一斛十二年夏丼露降南行唐縣名属常山郡六月黄龍見東阿今濟州縣十三年九月南越獻白兎白雉十七年十月有五鳳凰見於潁川之郟縣郊今郟城縣也東觀記曰鳳高八尺五彩羣鳥並從行列蓋地數頃停一十七日中元元年五月京師醴泉湧出飲之者痼疾皆愈惟𦕈蹇者不瘳又有赤草生於水崖赤草朱草也朱草日生一葉至十五日以後日落一葉周而復始郡國頻上丼露羣臣奏言地祗靈應而朱草萌生孝宣帝毎有嘉瑞輙以改元神爵五鳳丼露黄龍列爲年紀蓋以感致神祗表彰德信是以化致昇平稱爲中興今天下淸寧靈物仍降陛下情存損挹推而不居豈可使祥符顯慶没而無聞宜令太史撰集以傳來世帝不納嘗自謙無德毎郡國所上輙抑而不宣故史官罕得記焉明帝永平六年二月王雒山出寶鼎雒或作雄廬江太守獻之四月甲子詔曰昔禹收九牧之金鑄鼎以象物使人知神姦不逢惡氣夏禹之時令逺方圖畵山川竒異之物使九州之牧貢金鑄鼎以象之令人知鬼神百物之形狀而備之故人入山林川澤魑魅魍魎莫能逢之惡氣謂魍魎之類事見左傳遭德則興遷於商周周德旣衰鼎乃淪亡史記曰周鼎亡入泗水中秦始皇過彭城欲出周鼎於泗水使千人没水求之不得祥瑞之降以應有德方今政化多僻何以致茲易曰鼎象三公易曰鼎折足覆公餗豈公卿奉職得其理邪太常其以礿祭之日禮記曰夏祭周以礿薄也夏物未成祭尚薄陳鼎於廟以備器用十一年漅湖出黄金廬江太守以獻漅湖湖名今在廬州合肥縣東南時麒麟白雉醴泉嘉禾所在出焉十七年正月丼露降於丼陵是嵗丼露仍降樹枝内附芝草生殿前神雀五色翔集京師章帝建初四年丼露降泉陵洮陽二縣二縣属零陵郡五年零陵獻芝草有八黄龍見於泉陵見零陵泉陵湘水中相與戲其二火如馬有角六枚火如駒無角七年十月幸槐里岐山得銅器形似酒鐏獻之又獲白鹿於臨平觀元和二年二月丙辰東廵狩己未鳳凰集肥城縣今属太山郡辛未幸太山柴告岱宗有黄鵠三十從西南來經祠壇上東北過於宮屋翺翔升降五月詔曰乃者鳳凰黄龍鸞鳥比集七郡或一郡再見及白烏神雀丼露屢臻祖宗舊事或班