body:
  text: 册府元龜卷二百七十八宋王欽若等撰宗室部領鎮第一自成周之世並建宗室漢有天下分王子弟皆受分噐列為戚藩曹魏革命無改前制西晉之後崇樹征鎮重方靣之寄總師兵之重繇是逺監前古内選於親出膺督䕶之選以尸牧伯之任長人為政奉宣教條訓戎經武式遏㓂虐斯可以籍眀茂之望聳懐柔之美夾輔京室克固於維城大庇本根以期於長世者已晉太原成王輔宣王弟安平王孚第三子也咸寜三年監并州諸軍事下邳獻王晃孚第五子也泰始九年詔曰南中郎將下邳王晃清亮中正體行眀潔才周政理有文武䇿識其以晃為使持節都督寜益二州諸軍事安西將軍領益州刺史晃以疾不行更拜尚書遷右僕射乆之出為鎮東將軍都督青徐二州諸軍事髙陽元王珪孚第七子也泰始初為北中郎將都督鄴城守諸軍事竟陵王楙義陽王望子也齊王冏輔政以楙為平東將軍都督徐州諸軍事鎮下邳彭城穆王權宣帝弟東武城侯馗之子泰始初出為北中郎將都督鄴城守諸軍事權子元王植自侍中尚書出為安東將軍都督揚州諸軍事代淮南王允鎮壽春未發或云植助允攻趙王倫遂以憂薨權弟高宻文獻王泰泰始初拜逰擊將軍出為兖州刺史加鷹揚將軍遷使持節都督寜益二州諸軍事安西將軍領益州刺史稱疾不行轉安北將軍代權督鄴城守事遷安西將軍都督關中事後為鎮西將軍領䕶西戎校尉假節代扶風王駿都督關中軍事以疾還京師泰子孝王略自秘書監出為安南將軍持節都督沔南諸軍事遷安北將軍都督青州諸軍事懐帝即位遷使持節都督荆州諸軍事征南大將軍開府儀同三司略第南陽王模初封平昌公為北中郎將鎮鄴永興初成都王頴故帳下督公師藩樓權郝昌等攻鄴模左右謀應之廣平太守丁邵率衆救模范陽王虓又遣兖州刺史茍晞援之藩等散走遷鎮東大將軍鎮許昌進爵南陽王永嘉初轉征西大將軍開府都督秦雍梁益諸軍事代河間王顒鎮關中新蔡武哀王騰高宻王泰第二子出繼叔父悌自太常轉持節寜北將軍都督并州諸軍事并州刺史永嘉初遷車騎將軍都督鄴城守諸軍事鎮鄴范陽王虓康王綏之子累遷尚書出為安南將軍都督豫州諸軍事持節鎮許昌進位征南將軍譙閔王承剛王遜之子元帝欲樹藩屏㑹王敦表以宣城内史沈充為湘州帝謂承曰湘州南楚險固在上流之要控三州之㑹是用武之國也今以叔父居之何如承曰臣幸托末屬身當宿衛未有驅馳之勞頻受過厚之遇夙夜自勵思報天德君之所命惟力是視敢有辭焉然湘州蜀㓂之餘人物凋盡若上慿天威得之所莅比及三年請從戎役若未及此雖復灰身亦無益也於是詔曰夫王者體天理物非羣才不足濟其務外建賢哲以樹風聲内睦親親以廣藩屏是以太公封齊伯禽居魯此先王之令典古今之通議也我晉開基列國相望乃授琅邪武王鎮統東夏汝南文武揔一淮許扶風梁王迭據闗右爰暨東嬴作司并州今公族雖寡不逮曩時豈得替舊章乎散騎常侍左將軍譙王承貞素欵亮志存忠恪便蕃左右恭肅彌著今以承監湘州諸軍事南中郎將湘州刺史初劉隗以王敦威權太盛終不可制勸帝出諸心腹以鎮方隅故先以承為湘州承孫敬王恬為侍中左衛將軍恬既宗室有勲望孝武帝時深仗之以為都督兖青冀幽并揚州之晉陵徐州之南北郡軍事領鎮北將軍兖青二州刺史假節恬子休之少仕清塗以平王恭庾楷功拜龍驤將軍襄城太守鎮歴陽桓𤣥攻歴陽休之嬰城固守及兄尚之為桓𤣥所敗休之以五百人出城力戰不㨗乃還城携子姪奔於慕容超聞義軍起復還京師大將軍武陵王令曰前龍驤將軍休之才幹貞審功業既成歴陽之戰事在幾㨗及至勢乖力屈奉身出奔猶鳩集義徒﨑嶇險阻既應親賢之舉宜委分陜之重可監荆益梁寜秦雍六州軍事領護南蠻校尉荆州刺史假節汝南文成王亮宣帝子初封扶風郡王持節都督關中雍涼諸軍事呉將歩闡來降假亮節都督諸軍事以納之後為大司馬假黄鉞大都督督豫州諸軍事出鎮許昌琅邪武王伷宣帝子魏末為撫軍將軍南皮伯出為鎮東大將軍假節徐州諸軍事代衛瓘鎮下邳伷鎮撫有方得將士死力呉人憚之加開府儀同三司改封琅邪王以東莞益其國頃之并督青州諸軍事扶風武王駿宣帝子初封汝陰王都督豫州諸軍事呉將丁奉㓂芍陂駿督諸軍事拒退之遷使持節都督揚州諸軍事代石苞鎮壽春尋復都督豫州還鎮許昌遷鎮西大將軍使持節都督雍梁等州諸軍事代汝南王亮鎮關中駿子新野莊王歆初封新野縣公齊王囧入雒歆躬貫甲胄率所領導囧以勲進封新野郡王邑二萬戸遷使持節都督荆州諸軍事鎮南大將軍開府儀同三司梁孝王肜宣帝子泰始中為北中郎將督鄴城守事太康中代孔洵監豫州軍事加平東將軍鎮許昌頃之又以本官代下邳王晃監青徐州軍事進號安東將軍元康初轉征西將軍代秦王柬都督關中軍事領護西戎校尉加侍中進督梁州復為征西大將軍代趙王倫鎮關中都督凉雍諸軍事又領西戎校尉屯好畤趙王倫宣帝子咸寜中為平北將軍督鄴城守事元康初遷征西將軍開府儀同三司鎮關中齊獻王攸文帝子太康三年詔曰古者九命作伯或入毗朝政或出御方嶽周之吕望五侯九伯實得征之侍中司空齊王攸明徳清暢忠允篤誠以母弟之親受台輔之任佐命立勲劬勞王室宜登顯位以稱具瞻其以為大司馬都督青州諸軍事侍中如故假節將本營千人親騎帳下司馬大車皆如舊増皷吹一部官騎滿二十人置騎司馬五人餘主者詳案舊制施行攸子武閔王冏為翊軍校尉趙王倫宻與相結廢賈后以功轉游擊將軍冏以位不滿意有恨色孫秀微覺之且憚其在内出為平東將軍假節鎮許昌冏弟實永寜初為東平將軍假節加散騎常侍代齊王冏鎮許昌尋進安南將軍都督豫州軍事燕王機文帝子咸寜初徴為歩兵校尉以漁陽郡益其國加侍中之服拜青州都督鎮東將軍假節以北平上谷廣寧郡增燕國樂安平王鑒文帝子元康中以大將軍使持節都督豫州軍事安南將軍代清河王遐鎮許昌楚𨼆王壽武帝子太康末之國都督荆州諸軍事平南將軍轉鎮南將軍淮南忠壯王允武帝子太康十年之國都督揚江二州諸軍事鎮東大將軍假節清河康王遐武帝子自散騎常侍平南將軍都督江州諸軍事成都王穎武帝子為散騎常侍車騎將軍賈謐甞與皇太子博争道穎在坐厲聲呵謐曰皇太子國之儲君賈謐何得無禮謐懼繇此出頴為平北將軍鎮鄴河間王顒太原烈王瓌之子元康初為北中郎將監鄴城九年代梁王肜為平西將軍鎮闗中石函之制非親親不得都督闗中顒於諸王為踈特以賢舉東海孝獻王越高宻王泰子初以世子為騎都尉太安初惠帝北征鄴以越為大都督六軍敗越奔下邳徐州都督東平王楙不納越徑還東海懐帝即位委政於越帝始親萬幾留心庻事越不恱求出藩帝不許越遂出鎮許昌尋詔越為丞相領兖州牧都督兖豫司冀幽并六州越辭丞相不受自許遷於鄄城琅邪孝王裒元帝子自後將軍拜散騎常侍使持節都督青徐兖三州諸軍事車騎將軍㑹稽文孝王道子簡文帝子為開府司徒及謝安薨詔曰新䘮哲輔華戎未一自非朝賢懋德莫能綏御内外司徒琅邪王道子體道自然神識頴逺實當旦奭之重宜總二南之任可領揚州刺史録尚書假節鉞都督中外諸軍事衛府文武一以配驃騎府讓不受數年領徐州刺史道子世子元顯為司徒録尚書事求領徐州刺史加侍中後將軍開府儀同三司都督十六州諸軍事宋長沙景王道憐高祖中弟也晉末高祖鎮京口以道憐為龍驤將軍領堂邑太守戍石頭㑹鮮卑侵逼自彭城以南民皆保聚山陽淮陰諸戍並不復立道憐請據彭城以漸修創朝議以彭城懸逺使鎮山陽進號征虜將軍督淮北軍事北東海太守并州刺史加北徐州刺史移鎮彭城又徴為都督兖青二州晉陵京口淮南諸軍郡事兖青二州刺史還鎮京口及江陵平以為都督荆湘益秦寜梁雍七州諸軍驃騎將軍開府儀同三司鎮護南蠻校尉荆州刺史北府文武皆配之高祖平定三秦方思外略徴道憐還為侍中都督徐兖青三州揚之晉陵諸軍事守尚書令徐兖二州刺史持節將軍如故元興元年解尚書令進位司空出鎮京口長沙成王義欣道憐長子也初為征虜將軍青州刺史魏郡太守戍石頭文帝元嘉三年為南兖州刺史七年遷使持節監豫司雍幷四州諸軍事豫州刺史給皷吹一部鎮壽陽十年進號鎮軍將軍進監為都督義欣子祗眀帝初為南兖州刺史祗弟韞自太子中庻子侍中加荆湘南兖州刺史呉興太守侍中領左軍將軍又改領驍騎將軍撫軍雍州刺史新渝侯義宗義欣弟也元嘉中為征虜將軍南兖州刺史當陽侯秉義宗子也泰始中為左衛將軍丹陽尹五年出為前將軍淮南宣城太守不拜還復本任遷使持節都督南徐徐兖豫青冀六州諸軍事後將軍南徐州刺史廢帝即位改都督郢州豫州之西陽司州之義陽二郡諸軍事郢州刺史未拜留為尚書左僕射㕘選二年加散騎常侍丹陽尹興安侯義賓義宗弟也元嘉中位至輔國將軍徐州刺史營道侯義綦義賔弟也元嘉中歴右衛將軍湘州刺史臨澧侯襲為安成太守晉安王子勛為逆襲據郡拒之子勛遣軍攻圍不下眀帝嘉之以為郢州刺史臨川烈武王道規高祖少弟晉末為振武將軍義昌太守累戰功進號輔國將軍督淮北諸軍事并州刺史時荆州湘江豫猶多桓氏餘燼徃徃屯結復以本官進督江州之武昌荆州之江夏隨郡義陽綏安豫州之西陽汝南潁川新蔡九郡諸軍事隨宜翦撲皆悉平之遷使持節都督荆寧秦梁雍等州司州之河南諸軍事領䕶南蠻校尉荆州刺史進號西征大將軍開府儀同三司加散騎常侍固辭俄而寢疾改授都督豫章江州揚州之宣城淮南廬江歴陽安豐堂邑六郡諸軍事豫州刺史持節常侍如故以疾不拜臨川康王義慶晉末從髙祖征長安還拜輔國將軍北青州刺史未之任徙督豫州諸軍事豫州刺史復督淮北諸軍事遷丹陽尹在京尹九年出為使持節都督荆雍益寧梁南北秦七州諸軍事平西將軍荆州刺史荆州居上流之重地廣兵强資實兵甲居朝廷之半故髙祖使諸子居之義慶以宗室令羙故特有此授十六年改授散騎常侍都督江州之西陽晉熙新蔡三州諸軍事衛將軍江州刺史持節如故十七年即本號都督南兖州徐兖青冀幽六州諸軍事南兖州刺史營浦侯遵考髙祖族弟也晉末自建威將軍彭城内史隨高祖北伐時高祖諸子並弱宗室唯有遵考長安平定以督幷州司州之北河東北平陽北雍州之新平安定五郡諸軍事輔國將軍并州刺史領河東太守鎮蒲坂關中失守南還元嘉三年出為使持節都督雍梁南北秦四州荆州之竟陵順陽襄陽新野隨六郡諸軍事征虜將軍寜蠻校尉雍州刺史襄陽新野二郡太守八年督南徐兖州之江北淮南諸軍事征虜將軍南兖州刺史領廣陵太守十五年監徐兖二州豫州之梁郡諸軍事前將軍徐兖二州刺史未之鎮留為侍中領左衛將軍眀年出為使持節監豫司雍并四州南豫州之梁郡弋陽馬頭荆州之義陽四郡諸軍事豫州刺史領南梁郡太守遷呉興太守秩中二千石二十七年魏軍南至𤓰歩率軍出江上假節葢三十年復出為使持節監豫州刺史元兇立遣外監徐安期仰捷祖防守之遵考斬安期等起義兵應南譙王義宣加遵考鎮西將軍孝建元年除呉興太守明年徴為湘州刺史三年轉丹陽尹六年領徐州刺史景和元年出督南豫州諸軍事安西將軍南豫州刺史遵考從弟思考為豫章㑹稽太守益徐州刺史凡經十郡三州廬陵孝獻王義真武帝第二子晉末從高祖北征及關中平定高祖議欲東還而諸將行役既乆咸有歸願止留偏將不足鎮固人心乃以義真行都督雍梁秦三州之河東平陽河北三郡諸軍事安西將軍領䕶西戎校尉雍州刺史太尉諮議叅軍京兆王修為長史委以關中任髙祖將還三秦父老詣門流涕訴曰殘民不沾王化於今百年矣始覩衣冠方仰聖澤長安十陵是公家墳墓咸陽宫殿數千間是公家屋宅捨此欲何之高祖為之愍然慰辭曰受命朝廷不得擅留感諸君戀本之意今留第二兒令文武賢才共鎮此境臨還自執義真手以授王修令修執其子孝孫手以授高祖義真尋除正加節又進督并東秦二州司州之東安定新平二郡諸軍事領東秦州刺史次復都督司雍秦并梁五州諸軍事建武將軍司州刺史持節如故時義真將鎮雒陽而河南蕭條未及修理改除揚州刺史鎮石頭永初元年移鎮東城高祖不豫以為使持節侍中都督南豫豫雍司秦并六州諸軍事車騎將軍開府儀同三司南豫州刺史出鎮歴陽襲廬陵王紹文帝第五子元嘉二十年出為南中郎將江州刺史時年十二二十二年入朝加棨㦸進都督江州豫州之西陽晉熙新蔡三郡諸軍事在任七年改授左將軍南徐州刺史給皷吹一部未之鎮乃遷揚州刺史彭城王義康武帝第四子晉末年十二宋䑓除都督豫司雍并四州諸軍事冠軍將軍豫州刺史時高祖自壽陽被徴入輔留義康代鎮壽陽又領司州刺史進督徐州之鍾離荆州之義陽諸軍事永初二年徙監南豫司雍并五州諸軍事南豫州刺史三年遷使持節都督南徐兖二州揚州之晉陵諸軍事南徐州刺史太祖即位元嘉三年改授都督荆湘雍梁益寜南北秦八州諸軍事荆州刺史班劒三十人六年司徒王𢎞表義康宜還入輔徴侍中都督揚南徐兖三州諸軍事司徒録尚書事領平北將軍南徐州刺史持節如故九年又領揚州刺史江夏文獻王義恭武帝第五子景平二年監南豫豫司雍秦幷六州諸軍事冠軍將軍南豫州刺史代廬陵王義真鎮歴陽時年十二元嘉元年加使持節進號撫軍將軍給皷吹一部三年監南徐兖二州揚州之晉陵諸軍事徐州刺史進監為都督未之任太祖征謝晦義恭還鎮京口六年改都督荆湘雍益梁寜南北秦八州諸軍事荆州刺史九年徴為都督南兖徐兖青冀幽六州豫州之梁郡諸軍事征北將軍開府儀同三司南兖州刺史鎮廣陵十七年大將軍彭城王義康有罪出藩徴義恭為侍中都督揚南徐兖三州諸軍事給班劒二十人置仗加兵二十七年春後魏㓂豫州太祖因此欲開定河雒其秋以義恭總統羣帥出鎮彭城後以本官領南兖州刺史增督南兖豫徐兖青冀司雍秦幽并十一州諸軍事并前十三州移鎮盱眙修治館宇擬制東城二十九年遭太妃憂改授大將軍都督揚南徐二州諸軍事南徐州刺史還鎮東府世祖踐祚授使持節侍中都督揚南徐二州諸軍事太尉録尚書六條事南徐徐二州刺史孝建元年十一月還鎮京口二年春進督東南兖二州其冬徴為揚州刺史南豐縣王朗字元眀義恭長子為湘州刺史持節侍中領射聲校尉襲江夏王子綏為都督郢州諸軍事冠軍將軍郢州刺史進號後軍將軍加持節襲江夏王躋後廢帝即位督㑹稽東陽新安臨海永嘉五郡諸軍事東中郎將㑹稽太守進號左將軍襲江夏王伯禽官至輔國將軍湘州刺史南郡王義宣武帝第六子元嘉元年年十二拜左將軍鎮石頭七年遷使持節都督徐兖青冀幽五州諸軍事徐州刺史猶戍石頭八年改都督南兖兖州刺史當鎮山陽未行眀年遷中書監進號中軍將軍又領石頭戍事十三年出都督江州豫州之西陵晉熙新蔡三郡諸軍事鎮南將軍江州刺史初高祖以荆州上流形勝地廣兵强遺詔諸子次第居之謝晦平後以授彭城王義康義康入相次江夏王義恭又以臨川王義慶宗室令望且臨川武烈王有大功於社稷義慶又居之其後應在義宣帝以義宣人才素短不堪居上流十六年以衡陽王義季代義慶而以義宣代義季為南徐州刺史都督南徐州軍事征北將軍加散騎常侍而㑹稽公主每以為言帝遲囘乆之二十一年乃以義宣都督荆雍益梁寜南北秦七州諸軍事車騎將軍荆州刺史進位司空改侍中領南蠻校尉三十年遷司徒中軍將軍揚州刺史世祖即位以義宣為中書監都督揚豫二州丞相録尚書六條事揚州刺史加羽葆皷吹給班劒四十人持節侍中如故封次子宜陽侯愷為南譙王義宣固辭内任及愷王爵於是改授都督荆湘雍益梁寜南北秦八州諸軍事荆湘二州刺史持節侍中丞相如故衡陽文王義季武帝第七子元嘉八年領石頭戍事九年遷使持節都督南徐州諸軍事右將軍南徐州刺史十六年代臨川王義慶都督荆湘雍益梁寜南北秦八州諸軍事安西將軍荆州刺史二十一年為都督南兖徐青冀幽六州諸軍事征北大將軍開府儀同三司南兖州刺史二十二年進督豫州之梁郡遷徐州刺史始興王濬文帝第二子初鎮京口後求鎮江陵尚書令何尚之等咸謂濬太子次弟不應逺出文帝以上流之重宜有至親故以濬為衛將軍開府儀同三司荆州刺史加都督領䕶南蠻校尉南平穆王鑠文帝第四子元嘉十七年都督湘州諸軍事冠軍將軍湘州刺史不之鎮戍石頭事二十二年遷使持節都督南豫豫司雍秦并六州諸軍事南豫州刺史時太祖方事外畧乃罷南豫併壽陽郡鑠為豫州刺史竟陵王誕文帝第六子元嘉二十二年監南兖州諸軍事北中郎將南兖州刺史出鎮廣陵尋以本號徙南徐州刺史二十六年出為都督雍梁南北秦四州荆州之竟陵隨二郡諸軍事後將軍雍州刺史遷都督廣交二州諸軍事安南將軍廣州刺史當鎮始興未行改授都督㑹稽東陽新安臨海永嘉五郡諸軍事安東將軍㑹稽太守給皷吹一部孝武即位徴為持節都督荆湘雍益梁寜南北秦八州諸軍事衛將軍開府儀同三司荆州刺史南譙王義宣不肯就徴以誕為侍中驃騎大將軍揚州刺史建平二年出為使持節都督南兖徐二州諸軍事太子太傅南徐州刺史大眀元年又出為都督南兖南徐兖青冀幽六州諸軍事南兖州刺史建平宣簡王宏文帝第七子元嘉二十四年為中䕶軍領石頭戍事出為征虜將軍江州刺史宏子景素初為寧朔將軍監南豫豫二州諸軍事輔國將軍南豫州刺史不拜太宗初加冠軍將軍南兖州刺史丹陽尹吳興太守使持節監湘州諸軍事湘州刺史泰始六年都督荆湘雍益梁寜南北秦八州諸軍事為散騎常侍後將軍太常未拜授使持節都督南徐兖青冀六州諸軍鎮軍將軍南徐州刺史廬江王禕文帝第八子元嘉二十六年以為侍中後軍將軍領石頭戍事出為㑹稽太守二十九年遷使持節都督廣交二州荆州之始興臨安二郡諸軍事車騎將軍平越中郎將廣州刺史孝武踐祚復為㑹稽太守加撫軍將軍眀年徴為秘書監加散騎常侍尋出為撫軍將軍江州刺史進號平南將軍置吏大眀二年徴為散騎常侍中書令領驍騎將軍給皷吹一部又出為南豫州刺史晉熙王昶文帝第九子世祖踐祚自太常出為東中郎將㑹稽太守監㑹稽柬陽臨海永嘉新安五郡諸軍事孝建元年立東陽州拜昶為刺史大眀中都督江州郢州之西陽豫州之新蔡晉熙二郡諸軍事前將軍江州刺史前廢帝即位出為使持節都督徐兖南兖青冀幽六州豫州之梁郡諸軍事征北將軍徐州刺史武昌王渾文帝第十子孝武即位授征虜將軍南彭城東海二郡太守出鎮京口孝建元年遷持節監雍梁南北秦四州荆州之竟陵隨二郡諸軍事寜蠻校尉雍州刺史册府元龜卷二百七十八
