body:
  text: 册府元龜卷六十四宋王欽若等撰帝王部發號令第三唐肅宗至徳元年十月癸未車駕至彭原郡詔中官不得侵暴百姓開諌諍之路依貞觀故事御史彈事不湏大夫同署諌官論事不湏宰相先知二年二月詔軍人有侵掠平人子女者令聚衆斬之十月詔曰聖人有作弧矢爰興歴代以来征伐靡廢自逆胡已死餘孽猶存所在蕃人多以利合亦有因事便被脅從朕誓雪國耻餘無所問中夜痛憤志安蒼生其假息偷生據城自守池魚幕鷰何以喻兹廣平王及諸將分隊夾攻迎軍破敗横屍遍野積甲如山二十里内可知多少其中逼廹同被殺傷言念於兹良深憫悼今兵馬乗勝便取東京平盧節度使兼領奚契丹五萬又收河北天下之事計日可平縁京城初收要在安百姓又掃灑宫闕奉迎上皇以今月十九日還京應縁供頓務湏减省豈忘艱弊當别優賞宣示百姓令知朕意十一月壬申御丹鳯樓下詔曰我國家出震乗乾立極開統謳歌歴數啟聖千齡文物聲名握圖六葉安禄山夷羯賤類頑兇殘愎頃以捍邉有功専制方面同人者貌謂報効恩私異人者心乃包蔵逆亂以為中原無備干戈可動而毒深流禍變起倉卒塗炭萬姓興言痛憤朝市之内忽肆兇殘衣冠之中咸被㸃汙朕作人父母志雪國讎是用中夜奮發提戈問罪自靈武聚一旅之衆至鳯翔合百萬之師親摠元戎掃清羣孽出師之日仍下寛令殱厥渠魁餘無所問有能翻然歸順自縳軍門復其官爵仍加優賞將士等以大軍一舉玉石俱焚元惡就誅兇殘並戮僵屍遍野匹馬不遺今西土罷兵咸以寜輯河雒氛祲一朝剪除廣平王俶受委元帥能振天聲左僕射子儀决勝無前克成大業復有回紇葉䕶及雲南子弟並諸蕃兵馬等皆竭誠向化力戰賈勇事同破竹易若摧枯朕入城之日百姓咸思戴商復喜睹漢烟風雲景皆是祥光里巷懽呼惟聞相慶朕早承聖訓嘗讀禮經義切奉先恐不負荷今復宗廟於函雒迎上皇於巴蜀導鑾輿而反正朝寢門而問安寰宇載寜朕願畢矣且復人將有主敢當天地之心興豈在予實憑社稷之祐京城僧道耆老百姓等比者時榖翔貴薪蒭不給困窮之極朕常繫心縁初收京城倉庫未積待國用稍足豈忘施恵其諸色行人因陣没并坊市百姓及諸色蕃胡召募并元惡兇黨昨因破敗所在潛藏并仰於府縣及御史臺陳首一切原其罪如有被人言告捉獲者並從軍令其京城内外文武官有受賊補署罄其心腹自祖及父皆承國恩就逆背順頓忘臣節或有守舊官者請俸料為賊判官或判官之際中間得替并有攝賊偽官兼知職掌其中有京官及私白身皆受擢用其中有隐迹不出固辭疾病色類既廣人數又多宜令御史臺憲部大理三司據狀勘責條件聞奏其外官充使及先有職掌并事故及隔絶未赴任在京者亦委三司勘責奏聞又賊中臺府坊市所繇人等比與逆賊追捕造事之端損害忠良仍奪財物為蠧尤甚情不可容宜令崔光逺禁身切加推勘一一狀奏勿令漏網其内侍省及左右龍武羽林軍并閑廐飛龍諸武官應先合從駕人等其中臨行潛避遂受賊驅使並各委本司使括責量情狀輕重奏聞其隐盜倉庫及偷刼逆賊家錢物或受賊寄附并與賊請料禄等因此隐没者並限勅到十日内各於所繇陳首其物便准數送納本色并還不湏科罪慮已有破用徴納艱辛仍十分放三以示𢎞貸其近日逆人及隔絶人莊宅宜即括責一切官收又聞人家子女多被侵逼且非本情宜一切不湏尋問或與逆賊居住鄰近及作義故往来情非切害一時之事有殊逆黨亦宜釋放其有受賊偽度人宜令所司括責並勒還俗其僧及道士各收本色所在寺觀勿許居止今兩京無虞三靈通慶何以昭事宜在覃恩待上皇到日當更處分咨爾有衆知朕意焉三年正月詔京城之人久陥兇醜亦既底定莫非王臣比屋可封唐之人闔境皆戴商之舊復以宗廟之器府庫之資散在閭閻紊於綱紀主守者缺以供事竊取者冒其常刑所以遣其檢括必使詳實如聞小臣失所遂使流言寇攘資財驚擾士庶官吏不修其法豪强横有縱暴或得一官物則破人家産或捕一奸吏則傍累親鄰仍有不逞之徒因此恐嚇大為侵暴百姓寃苦永言哀念良深歎息委京兆尹兼御史大夫李峴勾當諸使檢括一切並停妄有欺奪宜即推捕奏聞仍牓坊市務令安輯副朕意焉乾元二年三月詔曰百姓之間務在優恤前詔已有處置訖其或事妨於政法害於人尚有因循理資改革前後詔命非不叮嚀至於頒行多有掩蔽盖縁賞罰未著所以恩信或稽自今已後如有奸吏弄法割剥黎元因公循私害物傷政委御史臺訪察具狀彈奏當議刑章比縁軍國務殷或宣口勅處分諸色取索及决配囚徒雖務從權實為亂政自今已後一切並停如非正宣並不得行用中外諸務各歸有司英武軍虞候及六軍諸使諸司等比来或因論競懸白進攝既紊綱紀復擾甿黎自今已後一切湏經臺府如所繇處斷不平即任具狀奏聞京城諸色所繇先縁與逆賊追捕比今招捉矜其迫脅一切並放其受賊偽官人莊宅不合收納者一切並還如有已將借賜即准估量還價直仍委所繇勘㑹處分賞罰二柄國之大綱令在必行人則無濫自今已後朝廷及軍府疇庸議罪宜各精詳如舉或因情事有不當所繇長吏必寘嚴典王師所往為人除害必使秋毫不犯信義俱明如聞比者諸軍有乖於此或干戈之下殺戮無辜或營壘所經恣行暴虐乃貽怨毒豈曰安人自今已後各委本將嚴加訓誓明申賞罰儻師徒不擾則兇醜自平如有違犯悉從軍令其御史臺所欲彈事不湏更進狀仍服豸冠所被彈劾有稱讎嫌者皆兾遷延以求苟免但所舉當罪則讎亦不嫌如憲官不舉所職降資出臺儻渉阿容仍重貶責今殘妖未殄國歩猶艱共體至公以康庶政朕推誠御物與衆共之四海之人皆朕耳目則何功不就何化不成思與蒼生臻夫至道下詔之後百司及諸州府事有非便文有不該仰各條件奏聞即當釐革宣示中外知朕意焉八月乙卯詔曰刑政之本皇王大要政事或失於厥中帝道則乖於御下王者持平慎恤盖在於此朕纘服洪緒躬臨庶政何嘗不内軫泣辜之念外覃觧網之恩詔書所下期於必當往以衣冠之伍受職賊中量其重輕俾申貶黜比聞三司處置未甚均平或同科之中升降有異或謫任之所風宜不一頗招情故殊匪至公是以縉紳之間不無竊議有司奉法其若是邪又流降量移乆申詔令省司類例事亦稽遅遂使嶺嶂踰時積流荒之嘆雨露凝澤壅如絲之㫖逖聴遐邇頗聞咨嗟斯乃主者怠官甚無謂也宜令中書門下類例三司先所貶官各據科目均平改擬仍審勘前後制勅應合霑恩并速處分准制合量移人亦令吏部速比類聞奏又縁頃經逆亂中夏不寜士子之流多投江外或扶老攜㓜久寓他鄉失職無儲難歸京邑眷言憫念實惻於懐宜令中書門下牒本道責取名品應五品以上官並即與進取六品以下官合序用名品可收者亦量才叙用仍據中外員闕均融授官其授京官者仰本道勾當裝束即令赴京授外官者各令之任餘不合授官是士流者所在州縣一切安存無害公私勿令干擾上元元年閏四月詔曰車服以庸有虞盛典威儀以等周禮舊章往屬承平多歴年所至於公卿列位中外在官多以奢僭為心流弊成俗宜命所司定王公以下車服産業各詳古制及令式作節限聞奏自頃戎車未息殘孽猶虞軍吏獻功務陳首級且四海之内孰非王人豈以苟從昏迷陥在夷戮一朝授首懸彼藁街朕志存好生憫其驅脅其諸軍所獲首級除元惡之外一切不得傳送代宗寳應元年七月庚寅詔不許匭使閱投匭人文狀庚子詔曰推薦之道必務於至公賞罰之間亦資於不濫其諸色舉人等湏有處分令薦所知實佇才能用施政理自宜慎擇以副虛懐古者効官三嵗考績善惡既著褒貶斯存舉之得人必受旌能之賞舉之失選亦加懲過之罰賞罰之典期於必行凡百具僚宜知朕意廣徳二年二月禁王公百官家及百姓著皂衫及厭耳㡌子異諸軍官健也五月禁鈿作珠翠等委御史一切加捉搦即令禁斷永泰元年正月制曰刺史縣令與朕分憂彫瘵之人切湏撫字一夫不獲情甚納隍有能招緝逃亡平均賦稅増多户口廣闢田疇清節有聞課効尤著者宜委所在節度觀察具名聞奏即令案覆超資擢授其有理無能政迹渉贓私必當重加貶奪永為殿累四月詔曰如聞自東都至淮泗縁汴河州縣自經寇難百姓彫殘地濶人稀多有盜賊漕運商旅不免艱虞宜委王縉各與本道節度計㑹商量夾河兩岸毎兩驛置防援三百人給側近良沃田令其營種分界捉搦十二月詔曰如聞諸州承本道觀察節度使牒徴科百姓人户彫弊職此之繇自今以後切宜禁斷仍委轉運使察訪以聞大歴二年正月詔曰天文著象職在於疇人䜟緯不經蠧深於疑衆盖有國之禁非私家所藏雖裨竈明徴子産尚推之人事王彫必驗景畧猶寘以典刑况動皆訛謬率是矯誣者乎故聖人以經籍之義資理化之本仄言曲學實紊大猷去左道之亂政俾彞倫之有叙自四方多故一紀於兹或有妄庸輒陳休咎假造符命私習星歴共肆窮鄉之辨相傳委巷之談詐偽多端順非而澤熒惑州縣詿誤閭閻壊紀挾邪莫逾於此其𤣥象器局天文圖書七曜歴太一雷公式等私家並不合輒有自今已後宜令天下諸州府切加禁斷各委本道觀察節度使與刺史縣令同為捉搦仍令分明牓示村坊要路並勒鄰伍逓相為保如先有藏畜者限勑到十日齎送官司委本州刺史等對衆焚毁如外隐藏有人糾告者其隐藏人先决一百仍禁身聞奏其紏告人先有官及無官者毎告得一人超資授正員官其不願任官者給賞錢五百貫文仍取當處諸色官錢三日内分付訖具狀聞奏告得兩人已上累酬官賞其州府長吏縣令本判官等不能捉搦委本道使具名彈奏當科貶黜兩京委御史臺切加訪察聞奏准前處分咨爾方面勲臣洎十連庶尹㒺不誠亮王室簡於朕心無近宵人慎乃有位端本清末其誡之哉又禁王宗公子及郡縣主之子不得與軍將結親及定交遊委御史臺訪察彈奏六年四月詔曰王制命市納價以觀民之好惡布帛精粗不中數廣狹不中量不鬻於市漢詔亦云纂組文繡害女工也朕思以恭儉克己惇朴化人毎尚素𤣥之服庶齊金土之價而風俗不一踰侈相髙浸弊於時其来自久耗縑繒之本資錦綺之奢異彩竒文恣其誇競今師旅未戢黎元不康豈使淫巧之工更虧常制在外所織造大張錦硬軟瑞錦透背及大􅰃錦竭鑿六破已上錦獨窠文紗四尺幅及獨窠吴綾獨窠司馬綾等並宜禁斷其常行髙麗白錦雜色錦及嘗行小文字綾錦等任依舊例造其錦綾錦文花所織蟠龍對鳯麒麟獅子天馬辟邪孔雀仙鶴芝草萬字雙勝及諸織造差様文字等亦宜禁斷兩都委御史臺諸州府委大道節度觀察使切加覺察如違犯具狀奏聞六月詔曰自今已後所在不得閉糴及隔截𣙜稅如輒違犯所繇官節級科貶仍委御史臺及出使郎官御史訪察聞奏十二年四月詔曰自頃軍嚴未觧政或随時多逐權宜未歸理本宜委中書門下郎與諸司長官各舉所司内外遺闕商量釐革處置作條件聞奏俾昭宣軌度永備彞倫便俗安人典章式叙宣示中外咸使知聞十三年十月禁京畿内持兵器捕獵十四年六月赦書自今已後更不奏置寺觀及請度人又諸使及州府有湏改革處置事一切先申尚書省委僕射已下衆官商量聞奏外使及州府不得輙自奏請徳宗建中三年二月詔曰在昔聖王之御㝢也常修文徳以勝威武故能協和神人撫寜方夏盖有國之令圖也朕自君臨萬邦於兹三載明發求理中夜靡遑常懼祖宗之威靈顧惟黎元之未洽是用君臣之際推以腹心賞罰之道俾無僭濫毎發一詔施一令㒺不本之以徳義後之以威刑期戢五兵思𢎞七敎庶乎勝殘去殺之理有耻且格之道而渺身薄徳肺腑未親四方諸侯義信猶阻近聞曹濮數州知加兵籍司馬採聴飛語容納奸謀交質往来邀結外援雖各在封畧言備寇攘而汴郊士庶頗聞驚擾閭井奔散如避寇讐迨兹春中首種未入朕為人君父不能以誠明感逹股肱之佐不能以慈恵覆育黔黎之類使其骨肉相去情義不通終宵咎責心用震悼亦以社稷之計億兆之命防㣲慮逺不得不然至於君臣之道進退之理雖以造次顛沛常所不忘也是以分命節制及集諸軍於汴宋懐鄭之間使屯守發令之日且常言誡非有侵軼不令議戰但田里服業農桑及時下無愁怨外絶師旅偃旗卧鼓朕願斯畢於戲惟天地日月實鑒我心山川鬼神尚弼予志布告中外咸令知悉興元元年七月詔曰被逆賊除官固節不出事迹分明先經聞奏者續加甄奨九月詔應京百司及府縣去冬見任職事及常參官陥賊潛藏並諸色前資官在城為逆賊偽署官爵頻遭迫脅首末不出事跡昭著衆所明知者並委御史臺勘覆事實勿容虛濫仍限今月内具名銜狀跡聞奏五品已上委中書門下即與處分六品已下减三選不拘考例聽得資者非時放選仍優與處分如巳身死者並與追贈貞元元年三月甲寅宰相召諌官御史宣諭帝㫖曰自今上封與彈劾宜人人自陳論不得羣署章奏若渉朋黨初京兆尹李齊運以公事詬萬年縣丞源邃左右猝犯不以道遂死於庭京兆不直其妻鄭氏告寃闕下御史大夫崔縱請窮竟死狀帝不聴邃妻訴不已縱奏如初御史中丞張彧㫁論御史連章彈齊運乃奏云臣孤立為朋黨所擠故命宰臣宣諭焉三年三月詔今年州府朝集使宜停六年九月詔以十一月八日有事於南郊廟行從官吏將士等一切並令自備食物其諸司先無公厨者以本司闕職物充其王府官度支糧廪給其儀仗禮物等並仰御史樽節處置八年六月詔曰鎗甲之屬不畜私家令式有聞宜當遵守如聞京城士庶之家所藏器械宜令京兆府宣示俾納官司他如律令十四年正月詔曰比来朝官或有諸處過從皆畏金吾上聞其間如素是親故或曽同僚伏臘嵗序時有還往乃是常禮人情所通自今已後金吾更不湏聞奏時金吾將軍李翰伺察城中細事加之以奏聞兾求恩寵人畏忌之徐州節度使張建封朝京師具奏之故有是詔十五年九月詔自今已後二月一日九月九日毎節前放開屠一日十六年二月詔應是功臣先有明勅或有抵犯令送本司不令府縣官吏擅有笞撻自今已後有諸軍功臣官健或因買賣諸色逋欠官錢延時不納宜牒送本軍徴收送納如不疏理收索即具狀奏聞憲宗元和元年二月詔京城内無故有人於街衢帶戎伎及聚射委吏執送府縣科决其𨽻諸軍者禁身奏聴進止十月以西川平下制曰朕聞去天下之害者受天下之利故陳諸原野非為樂戰法彼震曜本於愛人五材不可以去兵七徳必先於禁暴皇王之道豈不然歟逆賊劉闢時之妖孽處肖形之内㒺識君親同人代之間别為梟獍因元臣之蓄聚恃庸蜀之江山誘誤生靈扇為桀逆朕荷祖宗之丕業執邦國之大經人之亂常法所不捨乗兹衆憤爰戒徂征興戈矛於闗西發介馬於兵部五營禁旅七萃神兵合貔武之雄援鷹揚之帥守無絶險進靡堅營麾城而壁壘皆空接刅而欃槍盡殪瓦觧氷泮漼焉無餘㣲瀘彭濮從兹底定蕩三蜀之流患除一方之大殘豈予寡徳能致於此斯皆宗社降佑啟無疆之休將士叶謀成永康之福祗若靈睠嘉乃衆心予懐惕然若蹈氷谷其收復成都諸大將擒獲劉闢軍將委崇文與都監軍使俱文珍條疏等第聞奏即有甄升其賞物等節級分賜務令優厚投降將士亦委崇文文珍條次聞奏官軍陣亡將士等並委崇文與監軍審勘具名銜事跡申奏即與褒贈其家口等並委本軍優賞五年一停衣糧並委所在州縣速為收葬仍量事致祭陥在賊中官吏百姓等應有節義著明無辜受戮者並委節度使具名跡奏聞當與追贈仍優給其家又分疆設都盖資共理形疎壤制亦在稍均將懲難以銷萌在立防而不紊故賈生之議以楚益梁宋氏之規割荆為郢酌於前事宜有變通其西川資簡陵榮昌瀘等六州宜割屬東川於戲制理經邦必垂意於未亂而養灾蓄患固難禁於已然撲彼燎原至於用滅永言迷復載軫俱焚咨爾多方體予深意布告天下咸使聞知二年正月南郊赦書禁郵驛假託乗劵天下百姓不得冒為僧尼道士以避徭役其創造寺觀廣興土木者舉前勅處分之三年正月詔自今已後應諸道有除官赴闕受代至京不得取本道錢妄稱進賀四年七月詔東都諸軍不得擅有追百姓及輒禁於本司並湏牒府縣仍委東臺糾察六年五月戊申御史臺奏諸司諸使應有捉利錢户請准臺省例如有過犯差遣並任府縣處置從之十年六月辛丑盜殺宰相武元衡戊申詔曰朕以不徳君臨萬邦不敢自逸毎懐兢惕而兇狡竊發殱我股肱是用當宁廢朝通宵忘寐永懐良輔何痛如之宜極捜擒以攄憤毒天下之惡天下共誅念兹臣庶固同憤嘆宜令京城及諸道所在同捕逐有能獲賊者賜錢一萬貫仍與五品官有官超授如本雖同謀或曽停止但能糾告當舍其罪仍同此科敢有藏匿全家誅戮布告逺近使明知之於是京師大索坊市居人團保又載錢二萬貫分積東西市以明必賞自是索賊頗急公卿家有複壁重轑者畢察之九月詔近縁東都盜賊事連僧徒因此所繇遂有覺察今既各有名籍不得恐動其已出城者所在安存其外國僧亦任随便居止先是諸處獲賊牒者多是蕃僧因物色捕之其在京城近闕寺僧無親識者亦捜逐焉繇是恟恟皆已還俗充役或搆訛言動京邑帝察之故有是命十二年二月詔京城居人五家為保命朝官及中官條疏家人部曲及在宅參從人數送府縣其寺觀委兩街功徳使團保虞二方之奸謀也時鎮州王承宗蔡州呉元濟叛四月詔曰列位選能切于守土分憂求瘼諒在親人言念疲黎載深注意自今已後刺史如有利病可言者不限時節任自表奏聞不湏時節申報節度觀察使是月中使劉奉禮宣應左降官及流人不得補職及流連宴㑹如擅離州具名聞奏十四年二月詔曰寇孽背恩自取誅剪黎元不幸久䧟兇殘王師有征義先拯物苟加殘暴諒匪予懐況諸軍討伐已来百姓歸投相繼既是嘉恤尤宜撫存時屬春陽各務農業陶我恵化當令便安其淄青四面諸道兵馬應入賊界收城邑所至百姓明加曉諭任其營生輙不得妄行傷殺及有拘繫焚燒廬舍掠奪資産開發墳墓等事並宜禁斷詔下之後已有處分今更申勅切在遵行册府元龜卷六十四
