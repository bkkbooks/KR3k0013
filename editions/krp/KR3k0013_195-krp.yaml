body:
  text: 冊府元龜卷一百九十五宋王欽若等撰閏位部恵民仁愛恤征役恵民書稱先王之徳曰保恵於庶民又曰子恵困窮又曰恵鮮鰥寡葢恤艱周急資無賑乏歴代之令典也漢道既衰方國列峙咸能撫養萌庶救其窮絶發倉廩之積弛山澤之禁給糧種以資其用廢林苑以還其主用能消弭災沴保集流徙使下無菜色而安於土著者由兹道也然而秦號富强蜀稱天府施恵濟衆史無其傳故今之詮次始於江左終於朱氏云吴大帝赤烏三年十一月民饑詔開倉廩以賑貧窮十三年八月丹陽句容及故鄣寧國諸山摧鴻水溢詔原逋債給貸種食宋髙祖永初三年三月秦雍流戸悉南入梁州送紵絹萬疋荆雍州運米委州刺史随宜給賦文帝元嘉五年正月京邑大火遣使廵慰賑賜六月以京師大水遣使檢行賑贍十二年六月丹陽淮南吳興義興大水京邑乗船以徐豫南兖三州㑹稽宣城二郡米榖百萬斛賜五郡遭水民十八年五月沔水汎濫六月戊辰遣使廵行賑贍十九年閏五月京邑雨水遣使廵行賑贍二十年諸州郡水旱傷稼民大饑遣使開倉賑䘏給賜糧種二十一年正月大赦詔諸逋債在十九年以前一切原除去嵗失收者疇量申减尤弊之處遣使就郡縣随冝賑恤凡欲附農而糧種匱乏者竝加給貸六月連雨水丁亥詔曰霪雨彌月水淹為患百姓積儉致兹乏匱二縣官長及營署部司各隨統檢實給其柴米必使周悉二十五年正月詔曰比冰雪經旬薪粒踊貴貧弊之室多有窘罄可檢行京邑二縣及營署賜以柴米二十九年正月詔曰經宼六州居業未立仍值災澇饑困薦臻可速符諸鎮優量救䘏今農事行興務盡地利若湏田種宜隨給之六月以京邑雨水詔部司廵幸賜樵米給船三十年正月青徐州饑二月壬子遣運部賑䘏孝武孝建二年八月癸酉以三吳民饑詔所在賑貸丙子詔曰諸苑禁制綿逺有妨肆業可詳所開弛假與貧民大明元年正月京邑雨水辛未遣使檢行賜以樵米五月吳興義興大水民饑乙卯遣使開倉賑恤二年正月詔曰去嵗東土多經水災春務已及宜加優課糧種所須以時貸給二月詔曰政道未著俗弊尚深豪侈兼併貧弱困窘存闕衣裳沒無歛槥朕甚傷之其明勑守宰勤加存恤賻贈之科速為條品九月襄陽大水遣使廵行賑贍四年八月雍州水甲寅遣使運部賑恤五年七月詔曰雨水猥降街衢泛溢可遣使廵行窮弊之家賜以薪粟七年八月以嵗不稔詔尤弊之家開倉賑給九月詔曰近炎精亢序苖稼多傷今三麥未晚甘澤頻降可下東境郡勤課墾殖尤弊之家量貸麥種十月南廵豫州詔曰雖秋澤頻降奈夏旱嬰弊可即開倉竝加賑賜八年二月詔曰去嵗東境偏旱田畆失收使命來者多至乏絶或下窮流冗頓伏街巷朕甚憫之可出倉米付建康秣陵二縣隨宜贍恤若濟拯不時以至捐棄者嚴加糾劾前廢帝大明八年閏五月即位八月以京師雨水遣御史與官長隨宜賑恤明帝泰始二年六月京師雨水遣殿中將軍檢行賜䘏三年閏正月京師大雨雪遣使廵行賑賜各有差後廢帝以泰豫元年四月即位六月京師雨水詔賑䘏二縣貧民元徽元年六月壽陽大水遣殿中將軍賑䘏慰勞三年三月以京師大水遣尚書郎官長檢行賑賜四年正月躬耕籍田貸貧民種糧南齊太祖建元二年二月遣大使廵慰淮肥徐豫邉民尤貧遘難者刺史二千石量加賑䘏武帝以建元四年即位三月庚辰詔曰比來未稔貧窮不少京師二岸多有其弊遣中書舍人優量賑䘏五月癸未詔曰頃水雨頻降潮流薦滿二岸居民多所淹浸遣中書舍人與兩縣官長優量賑䘏永明五年正月詔曰朕昧爽丕顯思康民瘼雖年榖亟登而饑饉代有今履端肇運陽和告始宜協時休覃兹黎庶諸孤老貧病竝賜糧餼遣使親賑每存均普六月詔曰比霖雨過度水潦洊溢京師居民多罹其弊遣中書舍人二縣官長等随宜賑賜八年八月詔曰京師霖雨既過居民汎濫遣中書舍人二縣官長賑䘏十月丁丑詔吳興水潦過度開所在倉賑賜十年十一月詔曰頃來霖雨樵糧稍貴京邑居民多罹其弊遣中書舍人二縣官長賑賜十一年六月壬午詔霖雨既過遣中書舍人二縣官長賑賜京邑居民七月丁巳詔曰頃風水為災二岸居民多罹其患加以貧病六疾孤老稚弱彌足矜念遣中書舍人履行沾䘏明帝建武元年十一月詔省新林苑先是民地悉以還主原責本直東昏侯永元三年六月京邑雨水遣中書舍人二縣官長賑賜有差梁髙祖天監七年九月丁亥詔曰芻牧必往姬文垂則雉兎有刑姜宣致貶藪澤山林毓材是出斤斧之用比屋所資而頃世相承竝加封國豈所謂與民同利惠兹黔首凡公家諸屯戍世見封熂者可悉開常禁十六年正月南郊詔曰朕當扆思治政道未明昧旦劬勞亟移星紀今太皥御氣勾芒首節升中就陽禋敬克展務承天休布兹利澤尤貧之家勿収今年之調其無田業者所在量宜賦給若民有產子即依格優蠲孤老鰥寡不能自存咸加賑䘏普通元年正月乙亥改元大赦詔曰鰥寡孤獨竝加賑䘏陳髙祖永定三年閏四月庚寅詔曰開廪贍絶育民之大恵廵方䘏患前王之令典朕當斯季俗膺此樂推君徳未孚民瘼猶甚重兹多壘彌疚納隍良繇四聰弗達千里勿應博施之仁何其有爽殘弊之軌致此未康吳州晋州去嵗蝗旱郢田雖祝鄭渠終涸室靡盈積之望家有填壑之嗟百姓不足兆民何賴近已遣中書舍人江徳藻衘命東陽與令長二千石問民疾苦仍以入臺倉見米分恤雖徳非既飽庻微慰阻饑東魏孝静天平元年十月遷都於鄴出粟一百三十萬以賑貧人是時六坊之衆從武帝而西者不能萬餘人皆北從竝給常廪春秋二時賜帛以供衣服之費北齊神武為東魏大將軍天平三年四月乙酉并肆汾建晋東雍南汾秦陜九州霜旱人饑流散請所在開倉賑給廢帝乾明元年四月詔河南定冀趙瀛南膠光青九州徃因蟲水頗傷時稼遣分途贍䘏武成帝河清二年四月并汾景東雍南汾五州蟲旱傷稼遣使賑䘏梁太祖開平四年十二月己巳詔曰滑宋輝亳等州水澇敗傷人户愁嘆朕為民父母良用痛心其令本州各等級賑貸所在長吏監臨周給務令存濟壬辰賑貸東都畿内如宋滑制仁愛傳曰上思利民忠也書曰民㒺常懐懐于有仁是知仁之為徳本乎惻隠恤患推恩濟衆誠在上者之所急也故有軫其札瘥之殃救其㐫荒之沴夭窮是念道殣斯掩弛悼耄之憲釋兵騶之役優蠲孕育疏廸幽閟皆愛人之深㫖為邦之要道也至於禁燎原之暴罷竭澤之取閉屠肆以順時訓逸鷙禽以育生物斯又恵逹於飛潜仁被於品物者矣蓋􅉃怛之愛好生之徳聖人之所先載籍之攸述可不務乎宋文帝元嘉四年五月京師疾疫遣使存問給衣藥死者若無家屬賜以棺器十年正月大赦詔孤老六疾不能存者人賜榖五斛二十四年六月京邑疫癘丙戌使郡縣及營署部司普加履行給以醫藥二十六年三月行幸丹徒詔遣使廵行百姓問所疾苦孤老鰥寡六疾不能自存者人賜榖五斛孝武大明四年詔曰都邑節氣未調疾癘猶衆言念民瘼情有矜傷可遣使存問并給醫藥其死亾者随冝賑䘏後廢帝元徽二年五月討平桂陽王休範詔建康秣陵二縣埋藏所殺賊屍南齊太祖初為齊公平袁燦等屯新亭中興堂教曰河南稱慈諒繇掩胔廣漢流仁實存殯朽近袤製兹營崇溝浚壍古墟曩𡑞時有湮移深松蔑草或至刋薙臨軒動懐廵隍増愴宜竝為收𦵏并設薄祀建元元年六月乙亥詔曰宋末頻年戎寇兼災疾彫損或枯骸不收毁櫬莫掩宜速宣下埋藏營恤若標題猶存姓字可識可即運載致還本鄉有司奏遣外監典事四人周行離門外三十五里為限其餘班下州郡無棺器標題者所屬以臺錢供市武帝永明二年八月甲子詔曰窆枯掩骼義重前誥䘏老哀癃寔為令典朕永思民瘼弗忘鑒寐聲恵未敷物多乖所京師二縣或有乆墳毁廢可随宜掩埋遺骸未櫬竝加歛瘞病疾窮困不能自存者詳為條格竝加沾賚四年閏正月辛丑籍田詔孤老窮貧賜榖十石五年正月辛卯賜孤寡老疾各有差六年八月詔吳興水潦被水之鄉賑賜痼疾篤癃口二斛老口一斛小口五㪷十年正月詔賜孤老六疾人榖五斛鬱林王即位詔曰近北掠餘口悉充軍實刑故無小㒺或攸赦撫孤興仁事深睿範宜從蕩宥許以自新可一同放遣還復民籍已賞賜者亦皆為贖明帝建武二年正月辛未詔京師二縣有毁發墳壠随宜修理東昏侯永元九年七月丁亥京師大水死者衆詔賜死者棺器并賑䘏梁髙祖初為大司馬承制下令以朱雀之㨗逆徒送死者特許家人殯塟若無親屬或有貧苦二縣長尉即為埋掩建康城内不逹天命自取淪滅亦同此科天監元年四月丙寅即位詔曰宋氏以來竝恣滛侈傾宫之富遂盈數千推算五都愁窮四海竝嬰罹寃横拘逼不一撫絃命管良家不被蠲織室繡房幽厄猶見役弊國傷和莫斯為甚凡後宫樂府西廨暴室諸如此例一皆放遣若衰老不能自存官給廩食十一年正月壬辰詔曰夫刑法悼耄罪不收孥禮著明文史彰前事蓋所以申其哀矜故罰有弗及近代相因厥網彌峻髫年華髮同坐入諐雖懲惡勸善宜窮其制而老㓜流離良亦可愍自今逋讁之家及罪應質作若年有老小可停將送四月戊午詔曰去載朐山大殱醜類宜為京觀用旌武功但伐罪弔民皇王盛軌掩骼埋胔仁者用心可下青州悉使藏殯十二年二月丙寅詔曰掩骼埋胔義重周經槥櫝有加事美漢䇿朕向隅載懐每勤造次收藏之命亟下哀矜而㝢縣遐深遵奉未洽髐然路隅徃徃而有言愍沉枯彌勞傷惻可明示逺近各廵境界若委骼不𦵏或蒢衣莫改即就収歛量給棺具庶夜哭之魂斯慰霑霜之骨有歸十六年正月南郊詔民有産子依格優蠲孤老鰥寡不能自存咸加賑恤十七年八月詔以兵騶奴婢男年登六十六女年登六十免為平民普通二年正月南郊詔曰春司御氣䖍恭報祀陶匏克誠蒼璧禮偹㤙随乾覆布兹亭育凡民有单孤老稚不能自存者郡縣咸加收養贍給衣食每令周足以終其身又於京師置孤獨園孤獨有歸華髪不匱若終年命厚加料理尤貧之家勿收租賦四年正月詔應諸窮病咸加賑䘏大同七年十一月詔停在所役使女子丁十年四月乙卯詔鰥寡孤獨尤貧者贍䘏各有差陳文帝天嘉元年正月大赦詔鰥寡孤獨不能自存者賜榖人五斛三年三月詔侯景以來遭亂移在建安晋安義安郡竝許還本土其被畧為奴婢者釋為良民宣帝大建五年四月癸亥詔北伐衆軍所殺齊兵竝令埋掩東魏孝静天平二年三月以旱故詔京邑及諸州郡縣收瘞骸骨二年五月賜鰥寡孤獨貧窮衣物各有差四年六月詔尚書掩骸埋胔北齊文宣帝天保七年五月以肉為斷慈遂不復食八年四月詔諸取蝦蠏蜆蛤之類悉令停斷唯聴捕魚又詔公私鷹鷂俱亦禁絶九年三月己丑詔限仲冬一月燎野不得他時行火損昆虫草木廢帝乾明元年詔諸良口配沒宫内及賜人者竝免放孝昭帝皇建元年八月乙酉詔宫奴婢年六十以上免為庶人武成帝清河元年正月詔竝斷屠殺以順春令後主天統四年十二月甲申詔掖廷晋陽中山宫人等及鄴下并州大清宫官口二處其年六十以上及有病患者仰所司簡放五年二月乙丑詔應宫刑者竝免為官口又詔禁網捕鷹鷂及畜飬籠放之物武平七年正月壬辰詔去秋已來水潦人饑不自立者所在付大寺及諸富户濟其性命梁太祖開平元年九月辛丑西京大内放出兩宫内人及前朝宫人任其所適十一月壬寅帝以征討未罷調補為先遂命盡赦逃亡背役髠黥之人各許歸鄉里是髠黥也皆四方赤子二十年以來兵戈之地擒俘蒸人為將中子弟遂黥之以記軍號兾絶其逋逸逮于年月寢逺倦于征役或懐鄉土遂多奔叛所在關防察而執之皆謂之背軍復送本所無不誅者近年尤多此色洎潜竄之後鄉里不容乃皆結黨羣集山藪之間以求生因之為盗實州縣之大患今乃許歸鄉里無問從來各得安便營生故􅂒􅀈之徒十去八九焉斯亦甚關政化也二年七月癸巳勑禁屠宰兩月八月辛亥勑應有暴露骸骨各委差人埋瘞乾化二年五月丁亥詔曰生育之人爰當暑月乳哺之愛方及薫風儻肆意於刲屠豈推㤙於自養俾無殄暴以助發生宜令兩京及諸州府夏季内禁斷屠宰及採捕天民之窮諒由賦分國章所載亦務興仁所在鰥寡孤獨廢疾不濟者委長吏量加賑䘏史載𦵏枯用彰軫惻禮稱掩骼將致和平應兵戈之地有暴露骸骨委所在長吏差人専功収瘞國癘之文尚標七祀良藥之郊亦載三醫用憐無告之人宜徴有嘉之術凡有疫之處委長吏檢尋醫方於要路暁示如有家無骨肉兼困窮不濟者即仰長吏差醫給藥救療之恤征役周公東山之詩所以閔征役之勞也故曰說以使民民㤀其勞其是之謂矣始於孫氏逮於朱梁屬正閏之迭興實金革之靡息人嗟于役之苦户掩其空之詠繇是下寛大之詔敦休息之義恵澤洽於存沒仁風動於邇遐斯所以得為國之體叶養民之道也吳大帝黄武五年春令曰軍興日乆民離農畔父子夫婦不能相䘏孤甚愍之今北虜縮竄方外無事其下州郡有以寛息景帝永安元年詔曰諸吏家有五人三人兼重為役父兄在都子弟給郡縣吏既出限米軍出又從至於家事無經護者朕甚愍之有五人三人為役聴其父兄所欲㽞為㽞一人除其米限軍出不從宋髙祖初為晋太尉凡南北征伐戰亾者竝列上賻贈尸䘮未及遣主帥迎接到還本土永初元年七月詔從征關雒隕身戰塲幽沒不反者贍賜其家文帝元嘉四年二月行幸丹徒詔登城三戰及大將家随宜周䘏二十六年三月幸丹徒詔登城三戰及大將戰亾堕沒之家老病单弱者竝加贍䘏孝武帝以元嘉三十年五月即位八月詔武皇帝舊役軍身嘗在齋内人身猶存者竝賜觧户又以新亭戰亾者復同京城大明三年八月詔曰近北討文武於軍亾沒或殞身矢石或厲疾死亾竝盡勤王事而歛槥卑薄可竝更賻給務令豐厚明帝太始三年二月為戰亾將士舉哀後廢帝即位初詔縁戍兵老疾者悉聴還元徽二年五月討平桂陽王休範詔建康秣陵二縣收諸軍死者南齊太祖建元四年詔曰比嵗申威西北義勇争先殞氣冦塲命盡王事戰亾蠲復雖有常典主者遵用每傷簡簿建元以來戰亾賞蠲租市二十年雜役十年其不得收屍王軍保押亦同此例武帝時王奐為鎮北將軍雍州刺史帝以行北諸戍士卒多襤縷送袴褶三千具令奐分賦之明帝建武元年十一月詔細作中署材官軍府凡諸工可借開畨假遞令休息三年詔去嵗索虜冦邊縁邉諸州郡將士有臨陣及疾病死亾者竝送還本土東昏侯即位初詔雍州將士與虜戰死者復除其差永元元年太尉陳顯逹救幽州敗績於馬圏詔為戰亾將舉哀梁髙祖初為大司馬承制下令以義師臨陣致命及病疾死亾者竝加𦵏歛收䘏遺孤陳文帝天嘉四年詔贈討周廸將士死王事者五年十二月曲赦建安晋安二郡討陳寳應將士死王事者竝給棺槥送還本鄉竝復其家瘡痍未瘳者給其醫藥少帝光太二年正月庚子詔討華皎軍人死王事者竝給棺槥送還本鄉仍復其家宣帝太建二年二月丙午詔曰自討周廸華皎以來兵交之所有死亾者竝令收歛并給棺槥送還本鄉瘡痍未瘳者各給醫藥七年六月丙戌為北討將士死王事者尅日舉哀十年四月庚戌詔曰懋賞之言明於訓誥挾纊之羙著在撫廵近嵗薄伐廓清淮泗摧鋒致果文武畢力櫛風沐雨寒暑亟離念功在兹無㤀終食宜班榮貴用讎厥力絓在軍者可竝賜爵三級竝加賚䘏付選即便量處北齊文宣帝天保二年九月壬申詔免諸伎作屯收雜色役𨽻之徒為白户孝昭帝即位詔軍人戰亾死王事者以時申聞當加榮贈梁太祖開平元年十二月辛亥詔曰潞寇未平王師在野攻戰之勢難緩於冦圍飛輓之勤實勞於人力永言輟耒深用軫懐宜令長吏丁寜布告期以兵罷之日給復賦租於是户人聞之皆㤀其倦二年三月幸澤州下詔以去年六月後昭義行營陣歿都將吏卒死於王事追念忠赤乃錄其名氏各下本軍令給飬妻孥三年内官給糧賜三年七月乙丑勑行宫將士陣歿者咸令所在給槥櫝津置歸鄉里戰卒聞之悉感涕八月辛亥制諸郡如有陣歿將士仰逐都安存家屬如有弟兄兒姪便給與衣糧充役册府元龜卷一百九十五
