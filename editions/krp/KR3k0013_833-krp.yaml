body:
  text: 冊府元龜卷八百三十三宋王欽若等撰總録部詞辯夫辭不可已言必有中先民之所稱也而中代之後遂有枝葉流宕忘返至於列國禦人以口給排難以舌端七雄之世變詐相尚於是有離堅合異之辯矯尾厲角之談當是之時訥言寡辭之士葢泥於進取矣漢氏而下亦曷嘗無其人哉原夫樞機之發榮辱之主美言可市伯陽之所稱利口惟賢周書之攸戒自非商確得失彈射臧否發揮治道宣暢徳義華實之兼茂枝柱之靡窮使聽之者忘倦聞之者信服又惡足以稱哉端木賜字子貢衞人明辯巧辭孔子嘗黜其辯宰予字子我魯人敏給辯辭鄒衍齊人其術迂大而閎辯齊使鄒衍過趙平原君見公孫龍及其徒綦母子之屬論白馬非馬之辯以問鄒子鄒子曰不可彼天下之辯有五勝三至而辭正為下辯者别殊類使不相害序異端使不相亂抒意通指明其所謂使人與知焉不務相迷也故勝者不失其所守不勝者得其所求若是故辯可為也及至煩文以相假飾辭以相悖巧譬以相移引人聲使不得及其意如此害大道夫繳紛爭言而競後息不能無害君子坐皆稱善初平原君厚待公孫龍以其善為堅白之辯及鄒衍過趙言至道乃絀公孫龍淳于髠齊人長不滿七尺滑稽滑音國亂也稽者同也多辯數使諸侯未嘗詘辱威王八年楚大發兵加齊齊王使淳于髠之趙求救兵齎金百斤車馬十駟淳于髠仰天大笑冠纓索絶王曰先生少之乎髠曰何敢王曰笑豈有説乎髠曰今者臣從東方來見道旁有禳田者操一㹠蹄酒一盂而祝曰甌窶滿篝篝籠也音溝甌窶猶杯樓也言豐年收掇易可滿篝汙邪滿車汙邪下地田也言下田之中有薪可滿車也五穀蕃熟穰穰滿家臣見其所持者狹而所欲者奢故笑之於是齊王乃益齎黄金千鎰白璧十雙車馬百駟髠辭而行至趙趙王與之精兵十萬革車千乗楚聞之夜引兵而去威王大悦是時鄒衍之術迂大而閎辯騶奭文具難施淳于髠乆與處時有得善言故齊人頌曰談天衍雕龍奭炙轂過髠劉向别録曰鄒衍之所言五徳終始天地廣大書言天事故曰談天騶奭修衍之文飾若雕鏤龍文故曰雕龍别録曰過字作輠輠者車之盛膏器也炙之雖盡尤有餘流者言淳于髠智不盡如炙輠也楚丘先生被蓑帶索徃見孟嘗君孟嘗君曰先生老矣春秋髙矣多遺忘矣何以教文楚丘先生曰惡将使我老意者将使我投石超距乎追車赴馬乎逐麋鹿摶虎豹乎吾則死矣何暇老哉将使我深計遠謀乎設精神而决嫌疑乎出正辭而尚諸侯乎吾乃始壮耳何老之有孟嘗君勃然汗出至踵曰文過矣文過矣孫卿趙人也秦昭王問卿曰儒無益於人之國卿曰儒者法先王隆禮義謹乎臣子而能致貴其上者也人主用之則進在本朝而宜不用則退編百姓而慤必為順下矣雖窮困凍餒必不以邪道為貪無置錐之地而明於持社稷之大義呌呼而莫之能應然而通乎裁萬物養百姓之經紀勢在人上則王公之才也在人下則社稷之臣國君之寶也雖隱於窮閻漏屋人莫不貴之道誠存也仲尼為魯司冦沈猶氏不敢朝飲其羊公慎氏出其妻慎潰氏踰境而徙魯之鬻牛馬者不豫賈必早正以待之者也居於闕黨闕黨之子弟罔不分有親者取多孝悌以化之也儒者在本朝則美政在下位則美俗儒之為人下如是矣王曰然則其為人上何如孫卿對曰其為人上也廣大矣志意定乎内禮節修乎朝法則度量正乎官忠信愛利形乎下行一不義殺一無辜而得天下不為也此君義信乎人矣通於四海則天下應之如讙是何也則貴明白而天下治也故近者謳歌而樂之遠者竭蹶而趨之四海之内若一家通逹之屬莫不服從夫是之謂人師詩曰自西自東自南自北無思不服此之謂也夫其為人下也如彼其為人上也如此何謂其無益人之國乎昭王曰善陳軫者游説之士與張儀俱事秦惠王皆貴重爭寵張儀惡陳軫於秦王曰軫重幣輕使秦楚之間将為國交也今楚不加善於秦而善軫者軫自為厚而為王薄也且軫欲去秦而之楚王胡不聽乎王謂陳軫曰吾聞子欲去秦之楚有之乎軫曰然王曰儀之言果信矣軫曰非獨儀知之也行道之士盡知之矣昔子胥忠於其君而天下爭以為臣曽參孝於其親而天下願以為子故賣僕妾不出閭巷而售者良僕妾也出婦嫁於鄉曲者良婦也今軫不忠其君楚亦何以軫為忠乎忠且見棄軫不之楚何歸乎王以其言為然遂善待之居秦期年秦惠王終相張儀而陳軫奔楚楚使軫於秦秦王曰子去寡人之楚亦思寡人不陳軫對曰王聞夫越人荘舄乎王曰不聞曰越人荘舄仕楚執珪有頃而病楚王曰舄故越之鄙細人也今仕楚執珪貴富矣亦思越不中謝對曰凡人之思故在其病也彼思越則越聲不思越則楚聲使人徃聽之猶尚越聲也今臣雖奔逐之楚豈能無秦聲哉惠王曰善漢司馬季主者楚人也卜於長安東市宋忠為中大夫賈誼為博士同日俱出洗沐相從論議誦易先王聖人之道術究徧人情相視而嘆賈誼曰吾聞古之聖人不居朝廷必在醫卜之中今吾已見三公九卿朝士大夫皆可知矣試之卜數中以觀采二人即同輿而之市游於卜肆中天新雨道少人司馬季主間坐弟子三四人侍方辯天地之道日月之運隂陽吉凶之本二大夫再拜謁司馬季主視其状貌如類有知者即禮之使弟子延坐坐定司馬季主復理前語分别天地之終始日月星辰之紀差次仁義之際列吉凶之符語數千言莫不順理宋忠賈誼矍然而悟獵纓正襟危坐曰吾望先生之状聽先生之辭小子竊觀於世未嘗見也今何居之卑何行之汙司馬季主捧腹大笑曰觀大夫類有道術者今何言之陋也何辭之野也今夫子所賢者何也所髙者誰也今何以卑汙長者誼曰尊官厚禄世之所髙也賢才處之今所處非其地故謂之卑言不信行不驗取不當故謂之汙夫卜筮者世俗之所賤簡也世皆言曰夫卜筮者多言誇嚴以得人情虚髙人禄命以説人志擅言禍災以傷人心矯言鬼神以盡人財厚求拜謝以私於已此吾之所恥故謂之卑汙也司馬季主曰公且安坐公見夫被髮童子乎日月照之則行不照則止問之日月疵瑕吉凶則不能理由是觀之能知别賢與不肖者寡矣賢之行也直道以正諌三諌不聽則退其譽人也不望其報惡人也不顧其怨以便國家利衆為務故官非其任不處也禄非其功不受也見人不正雖貴不敬也見人有汙雖尊不下也得不為喜去不為恨非其罪也雖累辱而不愧也今公所謂賢者皆可為羞矣卑疵而前孅趨而言相引以勢相導以利比周賔正客旅謂之賔人求長官謂之正以求尊譽以受公奉事私利枉王法獵農民以官為威以法為機求利逆暴譬無異於操白刅刼人者也初試官時倍力為巧詐飾虚功執空文以誷主上用居上為右試官不讓賢陳功見偽増實以無為有以少為多以求便勢尊位食飲驅馳從姬歌兒不顧於親犯法害民虚耗公家此夫為盗不操矛弧者也攻而不用弦刅者也欺父母未有罪而弑君未伐者也何以為髙賢才乎盗賊發不能禁夷貊不服不能攝姦邪起不能塞官耗亂不能治四時不和不能調歳榖不熟不能適才賢不為是不忠也不才不賢而託官位利上奉妨賢者是竊位也有人者進有財者禮是偽也子獨不見鴟梟之與鳳凰翔乎蘭芷芎藭棄於廣野蒿蕭成林使君子退而不顯衆公等是也述而不作君子義也今夫卜者必法天地象四時順於仁義分策定卦旋式正棊然後言天地之利害事之成敗昔先王之定國家必先龜策日月而後乃敢代正時日乃敢入家産子必先占吉凶後乃有之自伏羲作八卦周文演三百八十四爻而天下治越王句踐倣文王八卦以破敵國覇天下由是言之卜筮有何負哉且夫卜筮者掃除設坐正其冠帶然後乃言事此有禮也言而鬼神或以饗忠臣以事其上孝子以養其親慈父以畜其子此有徳者也而以義置數十百錢病者或以愈且死或以生患或以免事或以成嫁子娶婦或以養生此之為徳豈直數十百錢哉此夫老子所謂上徳不徳是以有徳今夫卜筮者利大而謝少老子之云豈異於是乎荘子曰君子内無饑寒之患外無刼奪之憂居上而敬居下不為害君子之道也今夫卜筮者之為業也積之無委聚藏之不用府庫徙之不用輜車負装之不重止而用之無盡索之時持不盡索之物游於無窮之世雖荘氏之行未能増於是也子果何故而云不可卜哉天不足西北星辰西北移地不足東南以海為池日中必移月滿必虧先王之道乍存乍亡公責卜者言必信不亦惑乎公見夫談士辯人乎慮事定計必是人也然不能以一言説人主意故言必稱先王語必道上古慮事定計飾先王之成功語其敗害以恐喜人主之志以求其欲多言誇嚴一作險莫大於此矣然欲彊國成功盡忠於上非此不立今夫卜者導惑教愚也夫愚惑之人豈能以一言而知之哉言不厭多故騏驥不能與罷驢為駟而鳳凰不與燕雀為羣而賢者亦不與不肖者同列故君子處卑隱以辟衆自匿以辟倫㣲見徳順以除羣害以明天性助上養下多其功利不求尊譽公之等喁喁者也何知長者之道乎宋忠賈誼忽而自失芒乎無色悵然噤口不能言於是攝衣而起再拜而辭行洋洋也出市門僅能自上車伏軾低頭卒不能出氣居三日宋忠見賈誼於殿門外乃相引屏語相謂自歎曰道髙益安勢髙益危居赫赫之勢失身且有日矣夫卜而有不審不見奪糈音所離騷經曰懷椒糈而要之注云糈精米所以享神也為人主計而不審身無所處此相去遠矣猶天冠地履也此老子之所謂無名者萬物之始也天地曠曠物之熈熈或安或危莫知居之我與若何足預彼哉彼久而愈安雖曽氏之義曽一作荘未有以異也久之宋忠使匈奴不至而還抵罪而賈誼為梁懷王傅王堕馬薨誼不食恚恨而死此務華絶根者也曹丘生辯士也時季布為河東守曹丘生數招權顧金錢言招求貴人威權因以請託故得他人顧金錢事貴人趙同等宦者趙談與竇長君善景帝舅布聞寄書諫長君曰吾聞曹丘生非長者勿與通及曹丘生歸欲得書詣布欲得竇長君書與布為巳紹介也竇長君曰季将軍不説足下説讀曰悦足下無徃固請書遂行使人先發書使人先致書於布發視也布果大怒待曹丘曹丘至則揖布曰楚人諺曰得黄金百斤不如得季布一諾諺傳也足下何以得此聲於梁楚之間哉且僕與足下俱楚人使僕游揚足下名於天下顧不美乎顧念也何足下距僕之深也布乃大説説音悦引入留數月為上客厚送之布名所以益聞者曹丘揚之也袁盎文帝時為中郎將淮南厲王謀反有司請誅之帝弗聽遷之蜀盎諫曰淮南王為人剛有如遇霜露行道死陛下有殺弟名奈何王至雍死帝輟食哭甚哀盎入帝曰以不用公言至此盎曰帝自寛此徃事豈可悔哉且陛下有髙世之行三此不足以毁名帝曰吾髙世三者何事盎曰陛下居代時太后常病三年陛下不交睫不觧衣睫目旁毛也交睫謂睡寐也睫音接湯藥非陛下口所嘗弗進夫曽參以布衣猶難之今陛下親以王者修之過曽參遠矣諸吕用事大臣顓制顓與専同然陛下從代乗六乗𫝊馳不測淵大臣亂乗傳而赴之故曰不測淵雖賁育之勇不及陛下孟賁夏育皆古之勇士也陛下至代邸西鄉讓天子者三南鄉讓天子者再鄉讀曰嚮夫許由一讓許由古髙士也堯讓天下於由由不受也陛下五以天下讓過許由四矣且陛下遷淮南王欲以苦其志使改過有司宿衛不謹故病死於是帝乃觧盎由此名重朝廷吾丘壽王為光禄大夫侍中武帝時汾隂得寶鼎帝嘉之薦見宗廟藏於甘泉宮羣臣皆上壽賀曰陛下得周鼎壽王獨曰非周鼎上聞之召而問之曰今朕得周鼎羣臣皆以為然壽王獨以為非何也有説則可無説則死壽王對曰臣安敢無説臣聞周徳始乎后稷長於公劉大於太王公劉后稷曽孫也太王文王之祖則古公亶父也成於文武顯於周公徳澤上昭天下漏泉昭明也漏言潤澤下沾如屋之漏無所不通上天報應鼎為周出故名曰周鼎今漢自髙祖繼周亦昭徳顯行布施恩惠六合和同至於陛下恢廓祖業功徳愈盛天瑞並至珍祥畢見昔秦始皇親出鼎於彭城而不能得天祚有徳而寶鼎自出此天之所以與漢廼漢寶非周寶也帝曰善羣臣皆稱萬歳是日賜壽王黄金十斤後漢馬援為虎賁中郎将閑於進對尤善述前世行事每言及三輔長者下至閭里少年皆可觀聽自皇太子諸王侍聞者莫不屬耳忘倦荀恁光武徴以病不至明帝永平初東平王蒼為驃騎将軍開東閣招賢俊辟而應焉及後朝㑹顯宗戲之曰先帝徴君不至驃騎辟君而來何也對曰先帝秉徳以惠下故臣可得不來驃騎執法以簡下故臣不敢不至班超有口辯而渉獵書傳後至西域都䕶射聲校尉朱穆南陽宛人也少有英才年二十為郡督郵迎新太守見穆曰君年少為督郵因族勢為有令徳穆答曰郡中瞻望明府謂如仲尼非顔囘不敢以迎孔子更問風俗人物太守甚竒之曰僕非仲尼督郵可謂顔囘也遂歴職股肱舉孝亷至尚書郭𢎞為潁川郡上計吏正月朝覲𢎞進殿上謝祖宗受恩言辭辯麗専對移時天子曰潁川乃有此辯士耶子貢晏嬰何以加之羣公屬目卿士歎服又朝廷問𢎞潁川風俗所尚地土所出先賢将相儒林文學之士𢎞援經以對陳事答問出言如浮引義如流苻融遊太學師事少府李膺膺風性髙簡毎見融輒絶它賔客聽其言論融幅巾奮褏談辭如雲膺毎捧手嘆息公府連辟不應鄭𤣥字康成初袁紹總兵冀州遣使要𤣥大㑹賔客𤣥最後至乃延升上坐紹客多豪俊並有才説見𤣥儒者未以通人許之競設異端百家互起𤣥依方辯對咸出問表皆得所未聞莫不嗟服時汝南應劭亦歸於紹因自贊曰故太山太守應仲遠北面稱弟子何如𤣥笑曰仲尼之門考以四科囘賜之徒不稱官閥劭有慙色後徴大司農酈炎言論給捷多服其能理州郡辟命不就董扶字茂安廣漢緜竹人發辭抗論益部少雙故號曰至止言人莫能當所至而談止也後至侍中鄭泰字公業為侍御史董卓作亂公業與侍中伍瓊卓長史何顒共説卓以袁紹為渤海太守以發山東之謀及義兵起卓乃㑹公卿議大發卒討之羣僚莫敢忤㫖公業恐其衆多益横兇强難制獨曰夫政在徳不在衆也卓不悦曰如卿此言兵為無用邪公業懼乃詭詞更對曰非謂無用以為山東不足加大兵耳如有不信試為明公畧陳其要今山東合謀州郡連給人庶相動非不强盛然光武以來中國無驚百姓優逸忘戰日久仲尼有言不教民戰是謂棄之其衆雖多不能為害一也明公出自西州少為國将嫻習軍事數踐戰塲名振當世人懷懾服二也袁本初公卿子弟生處京師張孟卓東平長者坐不闚堂孔公緒清談髙論嘘枯吹生並無軍旅之才執鋭之幹臨鋒决敵非公之儔三也山東之士素乏精悍未有孟賁之勇慶忌之捷聊城之守良平之謀可任偏師責以成功四也就有其人而尊卑無序王爵不加若恃衆怙力将各棊峙以觀成敗不肯同心共膽與齊進退五也關西諸郡頗習兵事自頃以來數與羌戰婦人猶戴㦸操矛挾弓負矢况其壮勇之士以當忘戰之人乎其勝可必六也且天下强勇百姓所畏者有并凉之人及匈奴屠各湟中義從西羌八種而明公擁之以為爪牙譬驅虎兕以赴犬羊七也又明公将帥皆中表腹心周旋日久恩信淳著忠誠可任智謀可恃以膠固之衆當觧合之勢猶以勁風掃彼枯葉八也夫戰有三亡以亂攻理者亡以邪攻正者亡以逆攻順者亡今明公秉國平正討滅宦豎忠義克立以此三徳待彼三亡奉辭伐罪誰敢禦之九也東州鄭𤣥學該古今北海邴原清髙直亮皆儒生所仰羣士楷式彼諸将若詢其計畫足知强弱且燕趙齊梁非不盛也終滅於秦呉楚七國非不衆也卒敗於滎陽况今徳政赫赫股肱惟良彼豈讃成其謀造亂長冦哉其不然十也若其所陳少有可採無事徴兵以驚天下使患役之民相聚為非棄徳恃衆自虧威重卓乃悦以公業為将軍使統諸軍討擊關東戴𢎞年二十二為郡督郵曽以職事見詰府君欲撻之𢎞曰今鄙郡遭明府咸以為仲尼之君國小人少以𢎞為顔囘豈聞仲尼有撻顔囘之義府君異其對即日教署主簿魏郭淮為鎮西長史行征羌䕶軍黄初元年奉使賀文帝踐祚而道路得疾故計遠近為稽留及羣臣歡㑹帝正色責之曰昔禹㑹諸侯於塗山防風後至便行大戮今普天同慶而卿最留遲何也淮對曰臣聞五帝先教導民以徳夏后政衰始用刑辟今臣遭唐虞之世是以自知免於防風之誅也帝説之擢領雍州刺史封射陽亭侯韓宣字景然為人短小建安中丞相召署軍謀掾在鄴嘗於東掖門内與臨菑侯植相遇時天新雨地有泥潦宣欲避之閡潦不得去乃以扇自障住於道邊植嫌宣既不去又不為禮乃駐車使其嘗從問宣何官宣云丞相軍謀掾也植又問曰應得唐突列侯否宣曰春秋之義王人雖微列於諸侯之上未聞宰士而為下土諸侯禮也植又曰即如所言為人父吏見其子應有禮否宣又曰於禮臣子一例也而宣年又長植知其枝柱難窮乃釋去具為太子言以為辯管輅字公明平原人館陶令諸葛原遷新興太守管輅徃祖餞之賓客並㑹原字景春亦學士好卜筮數與輅共射覆不能窮之景春與輅有榮辱之分因輅餞之大有髙談之客知人多聞其善卜仰觀不知其有大異之才於是先與輅共論聖人著作之源又叙五帝三王受命之符輅觧景春微㫖遂開張戰地示以不固藏匿孤虚以待來攻景春奔北軍師摧䘐自言吾覩卿旌旗城池已壞也其欲戰之士於此鳴鼓角舉雲梯弓弩大起牙旗雨集然後登城耀威開門受敵上論五帝如江如漢下論三王如翮如翰其英者若春花之俱發其攻者若秋風之落葉聽者眩惑不逹其義言者收聲莫不心服雖白起之坑趙卒項羽之塞濉水無以尚之於時客皆欲面縳銜璧求束手於軍鼓之下輅猶總干山立未便許之至明日離别之際然後有服心始終一時海内俊士八九人矣蔡元才在朋友中最有滑才在衆人中言本聞卿作狗何意為龍輅言潜陽未變非卿所知焉有狗耳得聞龍聲乎景春言今當遠别後㑹何期且復共一射覆輅占既皆中景春大笑卿為我論此卦意紓我心懷輅為開爻散理分賦形象言徴辭合妙不可述景春及衆客莫不言聽後論之美勝於射覆之樂又鄴典農石苞與輅相見問曰聞君鄉里翟文耀能隱形其事可信乎輅言此但隂陽蔽匿之數茍得其數則山嶽可藏河海可逃况以七尺之軀游變化之内散雲霧以幽身布金水以滅跡術足數成不足為難苞曰欲聞其妙君且善論其數也輅言夫物不精不為神數不妙不為術故精者神之所合玅者智之所遇合之幾微可以性通難以言論是故魯班不能説其手離朱不能説其目非言之難孔子曰書不盡言言之細也言不盡意意之微也斯皆神玅之謂也請舉其大體以驗之夫白日登天運景萬里無物不炤及其入地一炭之光不可得見三五盈月清耀燭夜可以遠望及其在晝明不如鏡今逃日月者必隂陽之數隂陽之數通於萬類鳥獸猶化况於人乎夫得數者玅得神者靈非徒生者有驗死亦有徴是以杜伯乗火氣以流精彭生託水變以立形是故生者能出亦能入死者能顯亦能幽此物之精氣化之游魂人鬼相感數使之然也苞曰目見隂陽之理不過於君君何以不隱輅曰夫凌虚之鳥愛其清髙不願江漢之魚淵沼之魚樂其濡濕不易騰風之鳥由性異而分不同也僕自欲正身以明道直已以親義見數不以為異知術不以為竒夙夜研幾孶孶温故而索隱行怪未暇斯務也輅為少府丞卒蜀秦宓緜竹人也州郡辟命輒稱疾不徃或謂宓曰足下欲自比於巢許四皓何故揚文藻見瓌潁乎宓答曰僕聞書不能盡言言不能盡意何文藻之有揚乎昔孔子三見哀公言成七篇事葢有不可黙黙也孔子三見哀公作三朝記七篇今在大戴禮中經部有孔子三朝八卷一卷目録餘者所謂七篇接輿行且歌論家以光篇漁父詠滄浪賢者以燿章此二人者非有欲於時者也夫虎生而文炳鳳生而五色豈以五采自飾畫哉天性自然也葢河雒由文興六經由文起君子懿文徳采藻其何傷以僕之愚猶恥棘子成之誤况賢於已者乎論語棘子成曰君子質而已矣何以文為先主既定益州廣漢太守夏侯纂請宓為師友祭酒領五官掾稱曰仲父宓稱疾臥在茅舎纂将功曹古朴主簿王普厨膳即宓第宴談宓臥如故纂問朴曰至於貴州養生之具實絶餘州矣不知士人何如餘州也朴對曰乃自先漢已來其爵位者或不如餘州耳至於著作為世師式不負於餘州也嚴君平見黄老作指歸揚雄見易作太𤣥見論語作法言司馬相如為武帝制封禪之文于今天下所共聞也纂曰仲父何如宓以簿擊頰曰願明府勿以仲父之言假於小草民請為明府陳其本紀蜀有汶阜之山江出其腹帝以㑹昌神以建福故能沃野千里淮濟四瀆江為其首此其一也禹生石紐今之汶山郡是也昔堯遭洪水鯀所不治禹疏江決河東注於海為民除害生民已來功莫先者此其二也天帝布治房心决正參伐參伐則益州分野三皇乗祗車出谷口今之斜谷是也此便鄙州之阡陌明府以雅意論之何若於天下乎於是纂逡廵無以復答宓後為長水校尉呉遣使張温來聘百官皆徃餞焉衆人皆集而宓未徃丞相亮累遣使促之温曰彼何人也亮曰益州學士也及至温問曰君學乎宓曰五尺童子皆學何必小人温復問曰天有頭乎宓曰有之温曰在何方也宓曰在西方詩曰乃眷西顧以此推之頭在西方温曰天有耳乎宓曰有天處髙而聽卑詩云鶴鳴于九臯聲聞于天若其無耳何以聽之温曰天有足乎宓曰有詩云天歩艱難之子不猶若其無足何以歩之温曰天有姓乎宓曰有温曰何姓宓曰姓劉温曰何以知之答曰天子姓劉故以此知之温曰日生於東乎宓曰雖生於東而沒於西答問如嚮應聲而出於是温大敬服宓之文辯皆此類也呉諸葛恪瑾之子也為左輔都尉叔父亮為蜀丞相大帝問恪曰卿父與叔父孰賢對曰父知所事叔父不知以是為優帝又大噱命恪行酒至張昭前昭先有酒色不肯飲曰此非養老之禮也帝曰卿其能令公辭屈乃當飲之耳恪難昭曰師尚父九十秉髦仗鉞猶未告老也今軍旅之事将軍在後飲酒之事将軍在先何謂不養老也昭卒無辭遂為盡爵後至太傅朱育山隂人仕郡門下書佐太守濮陽興正旦宴見掾史言次問太守昔聞朱潁川問士於鄭召公韓呉郡問士於劉聖博王景興問士於虞仲翔嘗見鄭劉二答而未覩仲翔對也欽聞國賢思覩盛美有日矣書佐寕識之乎育對曰徃過習之昔初平末年王府君以淵妙之才超遷臨郡思賢嘉善樂采名俊問功曹虞翻曰聞玉出崑山珠生南海遠方異域各生珍寶且曽聞士人嘆美貴邦舊多英俊徒以遠於京畿含香未越耳功曹雅好博古寕識其人邪翻對曰夫㑹稽上應牽牛之宿下當少陽之位東漸巨海西通五湖南暢無垠北渚浙江南山攸居實為州鎮昔禹㑹羣臣因以命之山有金木鳥獸之殷水有魚鹽珠蚌之饒海嶽精液善生俊異是以忠臣繼踵孝子連閭下及賢女靡不育焉王府君笑曰地勢然矣士女之名可悉聞乎翻對曰不敢及遠畧言其近者耳徃者孝子句章董黯盡心色養喪致其哀單身林野鳥獸歸懷怨親之辱白日報讎海内聞名昭然光著大中大夫山隂陳囂漁則化盗居則讓鄰感侵退藩遂成義里攝養車嫗行足厲俗自揚子雲等上書薦之粲然傳世太尉山隂鄭公清亮質直不畏强禦魯相山隂鍾離意禀殊特之姿孝家忠朝宰縣相國所在遺惠故取養有君子之謨魯國有丹書之信及陳宫費齊皆上契天心功徳治状記在漢籍有道山隂趙曄徴士上虞王充各洪才淵懿學究道源著書垂藻絡繹百篇釋經傳之宿疑觧當世之盤結或上窮隂陽之奥秘下攄人情之歸極交阯刺史上虞綦母俊拔濟一郡讓爵土之封決曹掾上虞孟英三世死義主簿句章梁宏功曹史餘姚駟勲主簿勾章鄭雲皆敦終始之義引罪免居門下督盗賊餘姚伍隆鄮莫侯反主簿任光章安小吏黄他身當白刃濟君於難揚州從事勾章王脩委身授命垂聲來世河内太守上虞魏少英遭世屯蹇忘家憂國列在八俊為世英彦尚書烏傷楊喬桓帝妻以公主辭疾不納近故太尉上虞朱公天姿聰亮欽明神武策無失謨征無遺慮是以天下義兵思以為首上虞女子曹娥父溺江流投水而死立石碑紀炳然著顯王府君曰是既然矣潁川有巢許之逸軌呉有太伯之三讓貴郡雖士人紛紜於此足矣翻對曰先言其近者故耳若乃引上世之事及抗節之士亦有其人昔越王翳讓位逃於巫山之穴越人薫而出之斯非太伯之儔耶且太伯外來之君非其地人也若以外來言之則大禹亦廵於此而𦵏之矣鄞大里黄公潔已暴秦之世髙祖即祚不能一致惠帝恭讓出則濟難徴士餘姚嚴遵王莽數聘抗節不行光武中興然後俯就矯手不拜志凌雲日皆著於𫝊籍較然彰明豈如巢許流俗遺譚不見經傳者哉王府君笑曰善哉話言也賢矣非君不著太守未之前聞也濮陽府君曰御史所云既聞其人亞斯已下書佐寕識之乎育曰瞻仰景行敢不識之近者太守上虞陳業潔身清行志懷霜雪貞諒之信同操柳下遭漢中微委官棄禄遁迹黟歙以求其志髙邈玅蹤天下所聞故桓文遺之尺牘之書比竟三髙其聰明大畧忠直蹇諤則侍御史餘姚虞翻偏将軍烏傷駱統其淵懿純徳則太子少傅山隂闞澤學通行茂作帝師儒其雄姿武毅立功當世則後将軍賀齊勲成績著其探極祕術言合神明則太史令上虞呉範其文章之士立言粲盛則御史中丞勾章任奕鄱陽太守章安虞翔各馳文檄曄若春榮處士鄧盧叙弟犯公憲自殺乞代呉寕斯敦山隂祁庚上虞樊正咸代父死罪其女則松陽柳朱永寕瞿素或一醮守節喪身不顧或遭冦刼賊死不虧行皆近世之事尚在耳目府君曰皆海内之英也吾聞秦始皇二十五年以呉越地為會稽郡治呉漢封諸侯王以何年復為郡而分治於此育對曰劉賈為荆王為英布所殺又以劉濞為呉王景帝四年濞反誅乃復為郡治於呉元鼎五年除東越因以其地為治并屬於此而立東部都尉後徙章安陽朔元年又徙治鄞或有冦害復徙勾章到永建四年劉府君上書浙江之北以為呉郡會稽還治山隂自永建四年歳在己巳以至今年積百二十九歳府君稱善是歳呉之太平三年歳在丁丑育復為東觀令遥拜清河太守加位侍中沈友字子正善屬文有口辯毎所至衆人皆黙因號曰謐衆咸言其筆之玅刀之玅舌之玅皆絶於人册府元龜卷八百三十三
