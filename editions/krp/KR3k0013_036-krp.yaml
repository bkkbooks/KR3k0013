body:
  text: 册府元龜卷三十六宋王欽若等撰帝王部封禪第二唐高宗即位後公卿數請封禪龍朔一年十月癸丒詔宜以四年正月有事於泰山所司詳求故實務從折衷仍以來年二月幸東都十二月戊申詔曰海東二蕃久愆職貢近者命帥薄伐軍務事殷縁河州縣勞於征役比雖多有蠲免庶事優矜萬邦俱㑹恐致煩擾勞逸二途理無兼遂介丘大禮及幸都並宜且停麟徳元年七月丁未朔詔宜以三年正月式遵故實有事於岱宗所司詳求茂典以從折衷其諸州都督刺史以二年十二月便集嶽下諸王十月集東都縁邊州府襟要之處不在集限天下諸州明揚才彦或銷聲幽藪或藏器下僚並隨嶽牧舉送九月乙丒詔曰來年行幸岱宗州縣不得浪有煩擾其水淺可涉不可繕造橋梁所行之處亦勿開道路諸州及寺觀并百姓不得輒獻食二年十月丁卯帝發東都赴東嶽從駕文武兵士及儀仗法物相繼數百里列營置幕彌亘郊原突厥于闐波斯天竺國罽賓烏萇崑崙倭國及新羅百濟高麗等諸蕃酋長各率其屬扈從穹廬氈帳及牛羊駞馬填候道路是時頻嵗豐稔斗米至五錢豆麥不列於市議者以為古來帝王封禪未有若斯之盛者也十二月丙午至齊州停十日丙辰發靈巖頓至於太嶽之下庚申帝御行宫牙帳以朝羣臣乾封元年正月戊辰朔有事於泰山親祠昊天上帝於封祀之壇己巳帝登於泰山封玉牒於介丘庚午降禪於社首山皇后為亞獻越國太妃燕氏為終獻先是李勣許敬宗等議封禪儀注請以高祖太宗二座俱配昊天上帝表曰臣聞殷薦上帝事有明文祖宗並列抑惟通軌雖三五以降損益不同漢魏以還㳂革殊致至於帝郊嚴配之儀尊祖敬宗之典固以因心𢎞範縁情作則孝思聖敬迥冠往初茂實宏規遂高終古伏惟高祖太武皇帝改物創業撥亂反正受終明三統之厯執競隆七百之基御極垂衣稱物平施隨山靜稽天之浸授首撲燎原之災𤣥功暢於六虛聖績覃於四海巍巍蕩蕩無得而稱太宗文皇帝鑿乾履度括地提衡翦修蛇於洞庭戮蚩尤於中冀戡召雨追風之孽軼斷鼇練石之勤微禹之功用軫宣尼之歎曰文之徳實符姬旦之時叡智神武含𢎞光大深居高視懷日月以炤臨剛徤柔明體乾坤之博厚求賢勞於宵夢拜善急於朝飡摠宇宙以彌綸運隂陽而陶鑄變澆偽於華胥之俗還淳朴於大庭之辰九譯同文八荒順軌人神以合祥瑞畢臻巢鳳下窺遊麟易擾山車澤馬逺服瑶池之駕醴泉甘露近充上夀之尊優逰垂拱制禮作樂逺鏡百王獨為稱首再造區夏重安宸極昊天成命二帝受之升降節文不宜差别而肅恭禋祀綴兆分位升中告禪天地别饗乖嚴父配天之文失尊親加隆之數今歸功宗嶽請以二帝並配竊以太穆皇后造舟備禮爰定厥祥處人倫之經居風化之始追蹤文母播美周嫄文徳皇后俔天作合曾沙表慶功侔十亂化被二南兩聖既已配封則二后應須配禪申宸思淳深之極𢎞聖朝敬愛之㫖自我作古聞之往策周制所定夫何足云斯乃振揚休烈昭宣懿範請存乎不刋永貽來葉詔從之又皇后武氏上表曰伏以封禪舊儀祭皇地祗以太后昭配皆以公卿行事以妾愚誠恐未周備何則乾坤定位剛柔之義已殊經禮載陳中外之儀斯别豈有推尊先后而以宰臣參祭詳求至理有紊徽章妾望以展禮之日摠率六宫内外命婦親臨奠獻以申如在之敬詔許之壬申御朝覲壇受朝賀大赦癸酉帝謂羣官曰升中大禮不行來數千載近代帝王雖稱封禪其間事有不同或為求仙克禋或以廵逰望拜皆非尊崇祖業近在隋朝䘮亂最甚老小填溝壑少壯染兵鋒高祖發自晉陽撥亂反正先朝躬擐甲胄贊成大業掃除氛祲廓清區宇遂得四海宅心萬方仰徳朕丕承寶厯十有七年終日孜孜夙夜無怠屬國家無事天下太平華夷乂安逺近輯睦所以躬親展禮褒贊先勲情在歸功固非為己遂得上應天心下允人望今大禮既畢深以為慰公等休戚是同故應共有此慶欲與公等飲􅀈盡歡各宜在外更衣即求相見仍勅所司撤幄帳施玊床三品已上升壇四品已下縱列坐壇下從酒設樂羣臣及諸嶽牧競來上夀起舞日晏方止戊寅詔兖州置寺觀各三所觀以紫雲仙鶴萬嵗為稱寺以封巒非烟重輪為名丙戌發自泰山改號封祀壇為舞鶴臺介丘壇為萬嵗臺降禪壇為景雲臺以祀日各有靈鶴及山呼萬嵗之瑞故也上元三年二月詔以今冬有事於嵩嶽令所司草儀注務從典故閏二月詔以吐蕃犯塞停封嶽調露元年七月詔以今年冬至有事嵩嶽宜令禮官學士等詳定儀注十月庚申詔以突厥背誕其冬至於嵩山封禪宜權停永淳二年七月庚申詔以今年十月有事於嵩嶽宜令禮官學士等審定儀注務展誠敬仍令天下嶽牧及京官五品以上各舉所知有孝行儒學文武之士於是詔禮官議射牛之事太常博士裴守真奏議曰據周禮及國語郊祀天地天子自射其牲漢武唯封泰山令侍中儒者射牛行事至於餘祀亦無射牲之文但親舂射牲雖是古禮久從廢省不可復行據封禪祀禮日未明十五刻宰人以鑾刀割牲質明而行事比鑾駕至祠所牢牲總畢天皇唯奠玊酌獻而已若今祀前一日射牲事即傷早祀日方始射牲事又傷晩若依漢武故事即非親射之儀事貴隨時不可行用神功破陣樂及功臣慶善樂二舞每奏上皆立對守真又議曰竊惟二舞肇興謳吟攸屬贊九功之茂烈叶萬國之歡心義均韶夏用兼賓祭皆祖宗聖徳而子孫享之詳覽傳記未有皇王立觀之禮况升中大事華夷畢集九服仰垂拱之安百蠻懷率舞之慶陶甄化育莫匪神功豈於樂舞别申嚴禁臣等詳擬奏二舞時天皇不合起立詔並從之尋以帝不豫改用來年正月行封禪之禮十月癸亥車駕奉天宫十一月丙戌詔曰朕聞仁者徳之本叶亭育之至途禮者道之末乃帝王之餘事厯選往初詳觀曩躅惻隠以孚其化變通以㑹其神朕以虛薄祗膺寳位旰食宵衣懼忝於宗社如傷若厲佇濟於黎元每以皇基肇闢範圍覆載遺恵所覃昭格區宇䖍荷靈命嘗慮下虧鴻業遍刋羣嶽不足上報𤣥功已升聞於日觀思欵謁於天臺志在告成諒非為己屬今兹豐稔方有事於嵩丘崇累聖之丕績祈兆人之嘉佑頃者分使出廵存問風俗河南河北尚有十餘州旱澇加以朔方冦盜時或侵邊關内流離未能復業一物失所獨甚納隍數郡不寧豈宜備禮前欲以來年正月封中嶽者宜停高宗自東封之後天后盛勸行中嶽之禮頻下詔皆屬年飢又蕃夷寇邊而輟於嵩山之下營奉高宫以為有事之漸𤣥宗開元十二年閏十二月辛酉文武百官吏部尚書裴漼等上請封東嶽曰臣聞道協乾坤聖人之𤣥徳功存禮樂王者之能事故旁徵前載博考鴻名躬厯數之期遇天人之應莫不發號施令升中合符澤浸黎元以茂聲實者矣伏惟開元神武皇帝陛下握符提象出震乗圖英威邁於百王至徳加於四海梯航接武畢盡戎夷之獻耕鑿終歡不知堯舜之力惡除氛沴増日月之光輝慶襲休榮雜烟雲之氣色靈物紹至休祥沓委江茅将鄗黍均芳雙觡與一莖齊烈固可以稽典訓設壇場悉符瑞之羙答神祗之貺謙而不發雖在於聖心理則難辭孰違於天意臣幸遭昌運謬齒周行咸申就日之誠願覩封巒之慶無任勤懇之至謹於朝堂奉表陳情以聞帝手詔報曰自中朝有故國步艱難天祚我唐大命集於聖真皇帝朕承奉丕業十有餘年徳未加於百姓化未覃於四海将何以擬洪烈於先帝報成功於上𤣥至若堯舜禹湯之茂躅軒后周文之懿範非朕之能逮也其有日月之瑞風雲之祥則宗廟社稷之餘慶也天平地成人和嵗稔則羣公卿士之任職也撫躬内省朕何有焉難違兆庶之情未議封崇之禮甲子侍中臣乾曜中書令臣説等奏臣聞自古受天命居大寶者必登崇高之丘行封禪之事所以展誠敬報神祗三五迄今未之闕也是以高宗因武文之業盛岱亭之禮方册所記虞夏同風聖移三朝年經五紀封崇之典缺而未修山川望幸屬在今日陛下靖多難尊先朝天所啓也承大統臨萬邦天所命也焉可不陟東岱禪云亭報上𤣥之靈恩紹高宗之洪烈則天地之意宗廟之心将何以克厭哉且陛下即位以來十有四載創九廟禮三郊大舜之孝敬也敦九族友弟兄文王之慈恵也卑宫室菲飲食夏禹之恭儉也道稽古徳日新帝堯之文思也憐黔首恵蒼生成湯之深仁也化𤣥漠風太和軒皇之至理也至如日月星辰山河草木羽毛鱗介窮祥極瑞盖以薦至而為常衆多而不録正以天平地成人和嵗稔可以報於神明矣鴻生碩儒上章奏而請封禪者前後千百聖情撝揖天鑒未回臣等仰考神心傍採衆望封巒展禮時不可抑陛下縱不欲以成功告天豈不可以天休報徳臣等昧死上請以聞帝手詔報曰夫登封之禮告禪之儀盖聖人之能事明王之盛業也朕以𦕈身託王公之上夙夜祗懼恐不克勝幸賴羣公以保宗社至於休徵符瑞皆先帝遺慶朕何賴焉豈可以禮百神覲羣后備岱亭之禮展封祀之儀者哉雖誠請是違而宿心未暇臣乾矅説等又上言曰臣等考天人之際稽億兆之情以為治定功成登封告禪鴻名盛則屬在聖明陛下讓徳冲深未允羣議神祗缺望臣等懼焉且今四海和平百蠻率職莫不含道徳之甘實咀仁義之馨香是以上帝聿懷名山望幸珍符薦至年穀屢登開闢以來未之有也臣聞自古受命而封禪者七十二君安有殊風絶業足以方今也然猶躡梁父登泰山飛英聲騰茂實而陛下功徳之美符瑞之富固以孕虞夏含殷周矣有何退譲逡廵於大禮哉夫昭報天地至敬也嚴配祖宗大孝也厚福蒼生博恵也祭榮紀號丕業也陛下安可以闕哉况天地之符彰矣祖考之靈著矣蒼生之望勤矣禮樂之文備矣陛下安可以辭哉故臣等願因神祗之叶贊順華夏之懇誠早稽舊章特垂新詔庶幾仲夏乗農之隙以展廵狩肆覲之儀則天下幸甚臣等昧死重請以聞帝又詔報曰夫治定然後制禮功成然後作樂朕承奉宗廟恐不克勝未能使四海乂安此治未定也未能使百蠻效職此功未成也焉可以揚景化告成功雖欲答於神祗終候安於兆庶再省誠懇惻怵良深乾矅説等又再上言曰臣聞聖人者與天地合徳故珍符休命不可得而辭鴻名盛典不可得而讓陛下功格上天澤流厚載三五之盛莫能比崇登封告成理叶幽贊故符瑞異臻天意也書軌大同人事也菽粟屢登和平也刑罰不用至理也今陛下稽天意以固辭違人事以久讓是和平而不崇昭報至理而闕薦祖宗億兆之情猶知不可况上帝臨炤神宗顧諟其可止乎願納王公卿士列嶽縉紳之望迴命有司速定大典臣等不勝懇切敢昧死再拜上請以聞時儒生墨客獻賦頌者數百計帝不得已而從之丁卯下詔曰自古受命而王者曷嘗不封泰山禪梁父答厚徳告成功三代之前率繇斯義自魏晉已降迄至周隋帝典闕而大道隠王綱弛而舊章缺千載寂寥封崇莫嗣物極而復天祚我唐武文二后應圖受籙洎于高宗重光累盛承至理登介丘懷百神震六合紹殷周之統接虞夏之風中宗𢎞懿鑠之休睿宗穆粹清之道巍巍蕩蕩無得而稱者也朕昔戡多難禀略先朝䖍奉慈㫖嗣膺丕業是用創九廟以申孝敬禮二郊以展嚴禋寳菽粟於水火捐珠玊於山谷兢兢業業非敢追美前王日慎一日實以奉遵遺訓至於廵狩大典封禪鴻名顧惟寡薄未遑時邁十四載於兹矣今百穀有年五材無眚刑罰不用禮義興行和氣氤氲淳風淡泊蠻夷戎狄殊方異類重譯而至者日月於闕庭竒獸神禽甘露醴泉窮祥極瑞者朝夕於林籞王公卿士罄廼誠於中鴻生碩儒獻其書於外莫不以神祗合契億兆同心斯皆烈祖聖考垂裕餘慶故朕得荷皇天之景祐賴祖廟之介福敢以𦕈身而顓其讓是以敬承羣議𢎞此大猷以光我高祖之丕圖以紹我太宗之鴻業永言陟配祗感載深可以開元十三年十一月十日式遵故實有事泰山所司與公卿諸儒詳擇典禮預為備具勿廣勞人務存節約以稱朕意所縁封禪儀注兵馬陪集並皆條奏布告遐邇十三年四月乙丒撫州三脊茅生有上封者言曰昔齊桓公九合諸侯一正天下将欲封禪問於夷吾夷吾對曰江淮間三脊茅生用以縮酒乃可封禪其時無茅桓公大慙而罷自厯千古今始一生昔宣王南征責楚包茅不入王祭不供則是其地其茅今高一尺至上八月長足方堪縮酒特望聖恩至時令采用祭太山并掘根於苑内植之時宰臣已遣使於岳州探沅江茅乃奏曰管夷吾為桓公是諸侯不合封禪故稱茅以拒之及伐楚之日尊周室行覇道乃責楚云包茅不入王祭不供若以茅為瑞是不知經義臣等厯任荆楚博訪貢茅沅江最勝臣已牒岳州取訖今稱撫州有茅請移根入苑且貉不踰汶橘不過江移根苑中信是虛語望勅撫州且進六束與沅江相比用之帝曰可癸酉詔朝集使各奉所部孝悌文武集於泰山之下八月己未以封禪之故詔中書令張説右散騎常侍徐堅太常卿韋縚秘書少監康子元國子博士侯行果等與禮官於集賢書院刋撰儀注張説謂徐堅韋縚等曰乾封舊儀禪社首享皇地祗以先后配饗王者父天神而母地祗雖當今皇母位亦當往帝之母也子配母饗亦有何嫌而以皇后配地祗非古之制也天鑒孔明福善如響乾封之禮文徳皇后配皇地祗天后為亞獻越國太妃為終獻宫闈接神有乖舊典上𤣥不祐遂有天授易姓之事宗社中圯公族誅夷皆由此也景龍之季有事圜丘韋氏為亞獻皆有婦人升壇執籩豆渫黷穹蒼享祀不潔未及踰年國有内難終獻皆受其咎掌座齋郎及女人執祭者多亦夭卒今主上尊天敬神事須革正斯禮請以睿宗大聖真皇帝配皇地祗侑神作主及定儀奏聞帝從之張説徐堅康子元等又建議曰臣等謹按顯慶年禮部尚書許敬宗因修禮奏改燔柴在於祭前狀稱祭祀之禮必先降神周人尚臭祭天則燔柴者臣等按禮迎神之義樂六變而天神降八變而地祇出九變則人鬼可得而禮矣則降神以樂周禮正文非謂燔柴以降神也按尚臭之義不為燔之先後假如周人尚臭祭天則燔柴則殷人尚聲何聲可燔先迎神乎又按顯慶中無忌等奏晉氏之前猶遵古禮周魏以降妄為損益者今按郭璞晉南郊賦及注爾雅祭後方燔又按宋志所論亦祭後方燔又撿南齊北齊及梁郊祀亦飲福酒訖燔又撿後周及隋郊祀亦先祭後燔據此周遵後燔晉不先燔無忌之言事乃相乖又按周禮大宗伯職以玊作六器以禮天地四方注云禮謂始告神時薦於神座也下文云以蒼璧禮天以黄琮禮地皆有牲幣各放其器之色又禮器云有以少為貴者祭天特牲是知蒼璧之與蒼牲俱合奠之神座理即不惑又云四圭有邸以祀天旅上帝即明祀昊天上帝之時以旅五方天帝明矣其青圭赤璋白琥𤣥璜以立春立夏立秋立冬日各於其方迎氣所用自分别矣今按顯慶所改新禮以蒼璧與蒼牲幣俱用先燔蒼璧既已燔矣所以遂加四圭有邸奠之神座蒼牲既燔矣所以更加騂牲充其實爼混昊天於五帝同用四圭失特牲之明文加為二犢深乖禮意事乃無憑考功員外郎趙冬曦太學博士侯行果又曰先焚者本以降神行之已久中書令張説又執奏曰徐堅等所議燔柴前後議有不同據祭意及貞觀顯慶已後即先燔若欲正失禮求祭意請從貞觀禮如且因循不改請從顯慶禮凡祭者本以心為主心至則通於天地逹於神祗既有先燔後燔自可斷於聖意聖意所至則同於神燔之先後臣等不敢裁定帝令依後燔及先奠牲璧之議是後太常卿寧王憲奏請諸郊壇時祭並依此先奠璧而後燔柴瘞埋帝從之時又以四門助教施敬本駁奏舊封禪禮八條其畧曰舊禮侍中跪取匜沃盥非禮也夫盥手洗爵人君将致潔而尊神故小臣為之今侍中大臣也而沃盥於人君太祝小臣也反詔祝於天神是接天神以小臣奉人君以大臣故非禮按周禮大宗伯曰鬱人下士二人祼事則沃盥此職也漢承秦制則無鬱人之職故使近臣為之魏晉至今因而不改然則漢禮侍中行之則可矣今以侍中為之則非也漢侍中其始也微高帝時籍儒為之恵帝時閎儒為之留侯子辟彊年十五為之至後漢樓堅以議郎拜侍中邵闔自侍中遷步兵校尉其秩千石少府卿之官屬也少府卿秩中二千石丞秩千石侍中與少府丞班同魏代蘇則為之舊侍中親省起居故謂之執獸子吉茂見則嘲之曰仕進不止執獸子是言其為䙝臣也今侍中名則古宦人非昔任掌同燮理寄實鹽梅非復漢魏執獸子之班異乎周禮鬱人之職行舟不息墜劍方遥驗刻而求可謂謬矣夫祝以傳命通主人之意以薦於神明非賤職也故兩君相見則卿為上儐况天人之際其肅恭之禮以兩君為喻不亦大哉今太宰太祝下士也非所以重命而尊神之義也然則漢太祝是禮矣何者按周禮大宗伯曰太祝下大夫二人上士四人掌六祝之祠大宗伯為上卿今禮部尚書太常卿比也小宗伯中大夫今侍郎少卿比也太祝下大夫今郎中太常丞比也上士四人今員外郎太常博士比也故可以處天人之際致尊極之祠矣又漢太祝令秩六百石與太常博士同班梁太祝令與南臺御史同班今太祝下士之卑而居古下大夫之職斯又刻舟之論不殊於前矣又曰舊禮謁者引太尉升壇亞獻非禮也謁者已賤升壇已重是徵名用之欲合於古而不知戾於古而變於今也按漢官儀尚書御史臺官屬有謁者僕射一人秩六百石銅印青綬謁者三十五人以郎中滿嵗稱給事未滿嵗稱權謁者又按漢百官公卿表光禄勲官屬有郎中員秩比二千石有謁者掌賓贊受事員七十人秩比六百石則古之謁者秩異等今謁者班微以之從事可謂疎矣又曰舊禮尚書令奉玊牒今無其官請以中書令從事又按漢武帝時張安世為尚書令逰宴後宫以宦者一人出入帝命改為中書謁者令至成帝罷宦者用士人魏黄初改秘書置中書監令舊尚書幷掌制誥既置中書官而制誥樞密皆掌焉則自魏以來中書是漢朝尚書之職今尚書令奉玊牒是用漢禮其官既闕故以中書令主之議奏𤣥宗令張説徐堅召敬本與之對議詳定説等奏曰敬本所議其中四條先已改定有不同者望臨時量事改攝制從之癸亥以東封鹵簿人少召外州音聲人助之隨駕警衛十月己未勅曰自古明皇仁及萬物今助天孳育方欲告成其縁祭祀及在路供頓犧牲餼牢禮不可闕除此外天下諸州並令斷屠及漁獵採捕駕迴至京任依常式辛酉帝發東都廵狩庚午至濮州河南百五里内父老皆獻牛酒還其牛各賜帛一疋遣之丁丒白鵲見于行宫十一月丙戌至泰山之下去山趾五里丁亥帝衮冕服於行宫致齋戊子勅曰封祀告成為萬姓祈福必資清潔以副朕心其行事官及齋郎應致齋者宜令御史行齋切勿容疎怠有雄野雞飛入齋宫馴而不去久之飛入仗衛忽不見邠王守禮等賀曰臣謹按舊典雌來者伯雄來者王又聖誕酉年雞主於酉斯盖王道遐被天命休禎臣請宣付史官以彰靈貺從之己丒日南至帝備法駕登山旌旗天仗雲屯百餘里環衛於嶽之下列千廬於碞谷文武百僚二王後孔子後諸方朝集使及蕃夷君長咸從是日有詔應行從羣臣並留於谷口帝獨與宰臣及升壇行事之官登於嶽上齋宫之所初帝以靈山清潔不欲諠繁将令初獻於山上壇行事亞獻於山下壇行事召禮官學士賀知章等入講儀注因問之知章等奏曰昊天上帝君位五方精帝臣位帝號雖同而君臣異位陛下享君位於山上羣臣禮臣位於山下誠足垂範來葉為變禮之大者也然禮成於三初獻亞終合於一處帝曰朕正欲如是故問卿耳於是勅三獻於山上行事其五方帝及諸臣座於山下壇行事帝因問玊牒之文前代帝王何故秘之知章對曰玉牒本是通於明神之意前代帝王所求各異或禱年筭或思神仙其事微密是故外人莫知之帝曰朕今此行皆為蒼生祈福更無私請宜将玊牒出示百僚使知朕意其詞曰有唐嗣天子臣某敢昭告于昊天上帝天啓李氏運興土徳高祖太宗受命立極高宗升中六合殷盛中宗紹復繼體不定上帝眷祐錫臣忠武底綏内難推戴聖父恭承大寳十有三年敬若天意四海晏然封祀岱宗謝成于天子孫百禄蒼生受福庚寅祀昊天上帝于山上高祖神堯皇帝配享帝冕裘升壇奉珪璧奠獻以邠王守禮亞獻寧王憲終獻命有司享五帝百神於山下壇禮畢帝乃飲福酒中書令張説進稱賜皇帝太一神策周而復始永綏兆人帝拜稽首山上作圓臺四階謂之封祀壇臺上有方石再累謂之石䃭玉牒玉册刻玊填金為字各盛以玊匱緘以金繩封以金泥皇帝以受命寳印之納玊匱二於䃭中金泥䃭際以天下同文之印封之然後焚柴燎祭羣臣稱萬嵗傳呼從山頂至於山下振動天地於是整鑾輅還山下之齋宫有慶雲隨馬祥風繞輅中書令張説等蹈舞拜賀帝曰朕以薄徳恭膺大寳雲物休祐皆是卿等輔弼之力君臣相保勉副天心長如今日不敢怠矜説等又奏曰聖心誠懇昨夜致齋則息風収雨今朝封祀則天清日暖復有祥風助樂卿雲引燎靈迹盛事自古未聞陛下又思慎終如初長福萬姓天下幸甚辛卯祀皇地祗於社首之泰折壇睿宗大聖真皇帝配享藏玊策於石䃭如封祀壇之儀初帝登山至齋宫其夕隂雲慘冽勁風四起裂幕折柱寒氣切骨帝露立祈請仰天自誓曰某身有過請即降罰萬人無福亦請某為當罪應時風止天地清晏日氣和煦及升壇休氣四塞登歌奏樂有祥風自南而至絲竹之聲飄若天外及禪社首五色雲現見日重輪壬辰帝御朝覲壇之帳殿朝羣臣大赦天下詔曰朕躬陟天門宿齋日觀時屬嚴冬雪後初夜風寒朕因露立祈恩誓欲代人當咎俯仰之際頓息霜飈奠獻之晨變同韶景誠荷上天垂祐亦賴靈山吐祥詩云無徳不報宜封泰山神為天齊王禮秩加三公一等宜令所管崇飾祠廟去十里禁其樵採給近山二十户以奉祠神天下賜酺七月帝製紀泰山銘親書勒於山頂之石壁其詞曰朕宅位十有四載顧惟不徳懵于至道任夫難任安夫難安兹朕未知獲戾于上下心之浩盪若涉于大川賴上帝垂休先后儲慶宰衡庶尹交修皇極四海㑹同伍典敷暢嵗云嘉熟人用大和百辟僉謀唱余封禪謂孝莫大於嚴父謂禮莫尊於告天天符既至人望既積固請不已固辭不獲肆余與夫二三臣稽虞典繹漢制張皇六師震疊九㝢旌旗有列士馬無譁肅肅邕邕翼翼溶溶以至於岱宗順也爾雅曰泰山為東嶽周官曰兖州之鎮山實惟天帝之孫羣靈之府其方處萬物之始故稱岱焉其位居五嶽之伯故稱宗焉自昔王者受命易姓於是乎啓天地薦成功序圖録紀氏號朕統承先王兹率厥典實欲報𤣥天之眷命為蒼生而祈福豈敢高視千古自比九皇哉故設壇場答休命則亦與百執事尚綏兆人将多于前功而毖彼後患一夫不獲萬方其罪余一心有終上天其知我朕惟實行三徳曰慈儉謙慈者覆無疆之言儉者崇将來之訓自滿者人損自謙者天益如是則軌迹易循基搆易守磨石壁刻金字冀後之人聽詞而見心觀末而知本銘曰維天生民立君以理維君受命奉天為子代去不留人來無巳徳涼者滅道高斯起赫赫高祖明明太宗爰革隋政奄有萬邦罄天張宇盡地開封武稱有截文表時邕高宗稽古徳施周溥茫茫九夷削平一鼓禮備封禪功齊舜禹巖巖岱宗衎我神主中宗紹運舊邦惟新恭已南面氤氲化淳告成之禮留諸後人緬予小子重基五聖匪功伐高匪徳矜盛欽若祀典丕承永命至誠動天福我萬姓古封泰山七十二君或禪亭亭或禪云云其迹不見其名可聞祗遹文祖光昭舊勲方士虛誕儒書不足秩后求仙巫神撿玊秦災風雨漢汚編録徳未合天或承之辱道在觀政名非從欲銘之絶巖播告羣牧於是中書令張説撰封祀壇頌侍中源乾矅撰社首壇頌禮部尚書蘇頲撰朝覲壇頌以紀聖徳是日以侍中源乾矅為尚書左丞相兼侍中中書令張説為尚書右丞相兼中書令盖以宰相之任佐于王化勒成岱宗特有寵也二十三年九月丁卯文武百官尚書左丞相蕭嵩等累表請封嵩華二嶽表曰臣聞封巒之運王者告成當休明而闕典乃臣子之深過伏惟開元神武皇帝陛下受命繼天應期光宅垂慶雲而覆露暢和氣以生成物荷深仁時惟天道文明之化洽矣穆清之風被矣淳源既泳福應咸臻盈於天壤昭於方䇿盖非愚下所能頌美且天之在上日監在兹嘉大聖之神功降元符以表徳恭伸昭報祗事升中古昔大猷孰先兹道臣等覩休徵以上請陛下崇謙讓以固辭事恐勞人抑其勤願徳音所逮自古未聞昔虞廵四嶽周在一嵗書稱其美不以為煩寧彼華嵩皆列近甸復兹豐稔又倍他年嵗熟則餘糧地近則易給况費務盖寡咸有司存儲峙無多豈煩黎庶吏當首路以望屬車陛下往封㤗山不秘玉牒嚴禋上帝本為蒼生今其如何而闕斯禮伏願發揮盛事差擇元辰先檢玉於嵩山次泥金於華嶽天休既答人望見從上下交歡生靈幸甚臣等昧死敢此竭誠理在至公祈於俯遂無任悃欵之至謹詣朝堂陳請以聞帝固讓不從手詔報曰升中于天帝王盛禮盖謂臻兹淳化告厥成功今兆庶雖安尚竭豐年之慶邊彊則靜猶有踐更之勞况自愧於隆周敢追跡於大舜頃年迫於萬方之請難違多士之心東封㤗山於今愓厲豈可更議嵩華自貽慙恧雖藉公卿共康庶政永惟菲薄何以克堪朕意必誠宜斷來表也二十八年九月己丒邠王守禮率宗子左丞相裴耀卿率百官僧道父老皆於朝堂抗表以時和年豐請封嵩華二山帝抑而不許天寳九載正月文武百寮禮部尚書崔翹等累上表請封西嶽刻石紀榮號帝固拒不許翹等又奉表懇請曰自今月辛亥至於癸丒累表誠祈請紀榮號聖心恭黙冲讓再三臣等伏讀綸言退増祗慄敢重瀝愚懇期諸必遂臣聞聖人之言與春秋而同信上天之宰将影響而合符昭報不可以久稽成命不可以固拒今靈山警蹕望玉鑾之升中儒林展儀思金匱之盛禮發祥儲祉喻以封山人事天時不可失也伏惟開元天地大寳聖文神武應道皇帝陛下祖武宗文重熙累洽霑風化而祗礪在動植而昭蘇外户不扃餘糧栖畝其神功至道廣瑞殊祥前表縷陳安敢浮説夫修徳以俟命勒功以告成将欲竭􅍁神祗雍熙帝載未為過越也伏惟覽公卿之議考封禪之禮陟華盖於翠微轉鈞陳於雲路泥金於菡萏之上刻玉於明星之前使三五六經復再聞於唐典七十二姓不獨紀於夷吾敷景福以浸黎元錫大慶而後天地蒼生之望也朝廷之幸也無任誠懇悃欵之至謹詣朝堂奉表陳請以聞帝手詔不許曰輕修大典所不願為時或傳中㫖請紀榮號何如空云請封西嶽乙卯羣臣又奉表請封西嶽曰臣翹等伏稽古訓上請増封再奉明㫖未蒙允諾臣等承詔惶駭失圖臣聞省方展義君人之大典登封告成王者之丕業是以古先哲后道洽則封所以答神祗之功増兆庶之福無私於己故行之者不思必順於天故言之者難奪敢昧萬責竭誠終請伏惟開元天地大寳聖文神武應道皇帝陛下紹文武之丕烈合君臣於昌運均雨露和隂陽西海無波而靜黙羣生自樂而仁夀繇是徳懷蠻貊澤洎昆蟲宗廟祀典罔不祗肅要荒殊俗亦莫不庭自皇王已來載籍所記未有混區宇窮禎祥地平天成徳茂道洽若今日之盛者與固可告太平之功展封崇之禮故臣與王公侯伯黎老緇黄累陳白奏備竭丹懇豈謂聖恩猶阻皇鑒未迴伏奉癸丒詔書曰輕修大典所不願為臣等戰慄匪遑寧處實以陛下功成道洽理實升中且夫龜龍咸格天意也夷夏大同人事也時和年豐太平也無為清淨至理也允應大典豈謂輕修乎奉若靈命安可不為乎臣等敢冒宸極重明其義竊以西嶽華山實鎮京國皇虞之所循省靈仙之所依憑固可封也况金方正位合陛下本命之符白帝臨壇告陛下長生之籙發祥作聖抑有明徵又可封也昔周成王以翦桐為戲唐叔因是而定封盖人君之言動有成憲斯事至細猶不忽也况陛下眷言封祀宿著神明道已洽於升平事未符於琬琰豈可抑至公於私讓棄誠信於神明乎固不可得而辭也日者封章累奉嘉應必臻一獻而甘雨流再陳而瑞雪降則知人天之意影響合符若然者陛下安得稽天命以固辭違人事以久讓太平不告其若休祥何至理不答其若神祗何伏願仰答天心允祗靈貺上以揚祖宗之盛烈下以副億兆之懇誠克崇上報永光大典臣等幸甚宗子又上表曰臣徹等伏見禎祥委積河海澄清長瞻北極之尊屢獻西封之疏誠懇不逹天鑒未從徘徊闕庭隕越無地陛下再造區㝢肇康生人與天合符與道合契故得靈芝表瑞玉版呈文九穀嵗衍於京坻百蠻盡習其冠帶能事備於典䇿盛徳光於祖宗升中告成是屬今日惟夫太華高冠羣山當其少隂鎮此西土自有虞廵狩厯祀三千夏殷以還罕能肆覲陛下雖加進寵號増崇廟宇而大禮未施精意空潔又陛下頃嵗建碑曰嘗勤報徳之願未暇封崇之禮萬姓瞻予言可復也臣以為天地之主豈徒言哉神祗候望故已久矣伏願俯順百辟兆人之請明徵刻石銘山之記蹔遷萬乗降被三峯奠珪壁於中壇奏笙鏞於上帝使普天蒙福重賜無疆頻冒宸嚴並期必遂無任懇切屏營之至謹詣朝堂奉表陳請以聞凡三上表上乃許之丁巳詔曰以今載十一月有事華山中書門下及禮官詳儀注奏聞務從省便是載三月西嶽祠廟災時關中久旱詔曰自春以來頗愆時雨登封告禪情所未遑所封西嶽宜停册府元龜卷三十六
