body:
  text: 册府元龜卷二十一宋王欽若等撰帝王部徵應自古受命而王者莫不有徵應焉歲起攝提肇生天皇書契而下益章章矣故曰黄河淸而聖人生里社鳴而聖人出羣龍見而聖人用生旣異禀則文王之在母不憂出旣殊感則漢高以斬蛇自負用旣響合則光武應白水之䜟而中興矣傳曰天降時雨山川出雲嗜欲將至有開必先易曰雲從龍風從虎聖人作而萬物覩上自日月星辰下及昆蟲草木以時荐祉者何可勝道哉是知天人合契靈祗幽贊運之斯啟感而遂通乘時建事大勲以集蓋帝者之興未有不休徵先兆以表眷命之符者也帝堯初爲唐侯嘗夢攀天而上之帝舜耕於歴山夢眉長與鬚等夏禹初爲司空觀於河有長人白面魚身出曰吾河精也呼禹曰文命治滛授禹河圖言治水之事乃退入于淵周文王父季歴之十年飛龍盈於殷之牧野此蓋聖人在下位將起之符也及爲西伯作邑于豐文王之妃曰太姒夢商庭生棘太子發植梓樹於闕間化爲松栢柞棫以告文王文王幣告羣臣與發並拜吉夢季秋之甲子赤雀啣書及豐止于昌戸昌拜稽首授之其文要曰姬昌蒼帝子亡殷者紂武王伐紂度孟津中流白魚躍入王舟王俯取魚長三尺目下有赤文成字言紂可伐王寫以吉字魚文消燔魚以告天有火自天止于王屋流爲赤烏烏啣穀焉穀者紀后稷之徳火者燔魚以告天天火流下應以吉也遂東伐紂勝於牧野兵不血刅而天下歸之漢高祖初從王媪武負貰酒時飲醉臥武負王媪見其上嘗有恠高祖每酟留飲讎數倍及見恠歲竟此兩家常折券棄負後高祖以亭長爲縣送徒驪山徒多道亡自度比至皆亡之到豐西澤中亭止飲夜皆解縱所送徒曰公等皆去吾亦從此逝矣徒中壯士願從者十餘人高祖被酒夜逕澤中令一人行前行前者還報曰前有大蛇當徑願還高祖醉曰壯士行何畏乃前拔劍斬蛇蛇分爲兩道開行數里醉因臥後人來至蛇所有一老嫗夜哭人問嫗何哭嫗曰人殺吾子人曰嫗子何爲見殺嫗曰吾子白帝子也化爲蛇當道今者赤帝子斬之故哭人乃以嫗爲不誠欲苦之嫗因忽不見後人至高祖覺告高祖高祖乃心獨喜自負諸從者日益畏之高祖隱於芒碭山澤間呂后與人俱求嘗得之高祖恠問呂后后曰季所居上嘗有雲氣故從徃嘗得季高祖又喜沛中子弟或聞之多欲附者高祖旣入咸陽范増令人望其氣皆爲龍成五色此天子氣故勸項籍急擊之勿失沛公用項伯張良謀來謝得免高祖旣爲漢王二年項籍擊漢睢水上大破漢軍多殺士卒睢水爲之不流圍漢王三匝大風從西北起折木發屋揚沙石書晦楚軍大亂而漢王得與數十騎遁去陳餘襲破常山王耳耳敗走曰漢王與我有故而項王彊立我我欲之楚丼公曰善説星者丼氏也齊人漢王之入關五星聚東井東井者秦分也先至必王楚雖彊後必屬漢耳遂走漢又漢書載漢元年十月五星聚晋東井以歴推之從歲星也此高皇帝受命之符故客謂張耳曰東井秦地漢王入秦五星從歲星聚當以義取天下秦王子嬰降漢王於軹道漢王以屬吏寳器婦女亡所取幷封公門還軍次于覇上以候諸侯與秦民約法三章民亡不歸心者可謂能行義矣天之所予也五年遂定天下卽帝位此明歲星之聚東井爲秦地明效也文帝初爲代王㑹丞相大尉共誅諸呂使行迎代王代王報太后計猶豫未定卜之兆得大横龜曰兆筮曰卦卜以荆灼龜文正横也占曰大横庚庚余爲天王夏啟以光庚庚横貌其繇文也占謂其繇也先是五帝官天下堯則䄠賢至夏啟始傳嗣能光先君之業文帝亦襲父迹言似啟也繇音文救切本作籀籀書也謂讀卜辭代王曰寡人固已爲王又何王乎卜人曰所謂天王者乃天子也昭帝武帝少子也母曰趙偼伃本以有竒異得幸謂望氣者言有竒女子氣及召見手指拳上自披之卽時伸及生帝亦竒異十四月乃生宣帝武帝曽孫在襁褓坐戾太子繫郡邸獄望氣者言長安獄中有天子氣帝遣使者分條中都官獄繫者輕重皆殺之内謁者令郭穰夜至郡邸獄丙吉拒閉使者不得入曾孫頼吉得以全㓜時居數有光耀毎買餅所從家輒大讎與售同亦以是恠初昭帝元鳳三年正月㤗山萊蕪山南匈匈有數千人聲民視之有大石自立高丈五尺大四十八圍入地深八尺三石爲足石立後有白鳥數千下集其旁昌邑有枯社木卧復生又上林苑中大柳樹斷枯卧地亦自立生有蟲食樹葉成文字曰公孫病已立時眭孟推春秋之意以爲石柳皆陰類下民之象㤗山者岱宗之嶽王者易姓告代之處今大石自立僵柳復起非人力所爲此當有從匹夫爲天子者枯社木復生故廢之家復生明公孫氏當復興者也孟意亦不知所在卽說曰先師董仲舒有言雖有繼體守文之君不害聖人之受命漢家堯後有傳國之運漢帝宜誰差天下求索賢人誰問差擇也問擇天下賢人䄠以帝位䄠古禪字而退自封百里如殷周二王後以承順天命孟使友人内官長賜上此書内官署名百官表云内官長丞初属少府中属主爵後属宗正賜者其長之名也時昭帝㓜大將軍霍光秉政惡之下其書廷尉奏眭孟妄設妖言惑衆大逆不道皆伏誅後五年孝宣帝興於民間卽位徵孟子爲郎宣帝初名病已後漢光武皇考南頓君欽初爲濟陽令以建平元年十二月甲子夜生光武於縣舍有赤光炤室中欽異焉使卜者王長占之長辟左右曰此兆吉不可言是歲縣界有嘉禾生一莖九穗因名光武曰秀明年方士有夏賀良者上言哀帝云漢家歴運中衰當再受命於是改號爲㤗初元年稱陳聖劉太平皇帝以厭勝之及王莽簒位忌惡劉氏以錢文有金刀故改爲貨泉或以貨泉字文爲白水真人後望氣者蘇伯阿爲王莽使至南陽遙望見舂陵郭唶曰氣佳哉鬱鬱匆匆然及始起兵還舂陵逺望舍南火光赫然屬天有頃不見道士西門君惠李守等亦云劉秀當爲天子更始立光武爲大司馬狥河北以王郎新盛乃北狥薊晨夜兼行蒙犯霜雪天時寒面皆破裂至滹沱河無船適遇氷合得過未畢數車而䧟又王覇傳曰光武狥薊王郎起兵光武卽南馳至下曲陽傳聞王郎兵在後從者恐及至滹沱河候吏還白河水流澌無船不可濟官属大懼光武令王覇徃視之覇恐驚衆欲且前阻水還卽詭曰氷堅可渡官属皆喜光武笑曰候吏果妄語也遂前北至河河氷亦合乃令覇䕶渡未畢數騎而氷解光武謂覇曰安吾衆得濟免者卿之力也覇謝曰此明公至德神靈之祐雖武王白魚之應無以加此光武謂官属曰王覇權以濟事殆天瑞也惶惑不知所之有白衣老父在道旁指曰努力信都郡爲長安守此去八十里光武卽馳赴之信都太守任光開門出迎光武安帝自在邸第數有神光炤室又有赤蛇盤於牀第間獻帝母王美人姙娠畏何后服藥欲除之胎安不動又數夢負日而行魏太祖之爲魏王也先是熹平五年黄龍見譙光禄大夫橋𤣥問太史令單颺此何祥也颺曰其國後當有王者興不及五十年亦當復見天事恒象此其應也内黄殷登黙而記之至四十五年太祖爲魏王登尚在文帝初爲魏王延康元年三月黄龍見譙登聞之曰單颺之言其驗兹乎魏書曰王召見登謂之曰昔成風聞楚丘之繇而敬事季友鄧晨信少公之言而自納光武登以篤老服膺占術記識天道豈有是乎賜登穀一百斛遣歸家四月饒安縣言白雉見賜饒安田租渤海郡百户牛酒大酺三日太常以太牢祠宗廟八月石邑縣言鳳凰集又郡國十三言鳳凰見二十七言白虎見是年麒麟十見郡國晉武帝初爲中撫軍魏咸熈元年六月鎮西將軍衞􅗕至於成都得璧玉印各一枚文似成信字魏人宣示百官藏于相國府賈充聞之曰吾聞譙周之言先帝諱備其訓具也後主諱禪其訓授也如言劉已具矣當授與人也今中撫軍名炎而漢年極於炎興瑞出成都而藏之于相國府此殆天意矣是歲拜充爲梓潼太守明年八月嗣相國晋王位是月長人見於襄武長三丈告縣人王始曰今當太平初張掖郡删丹縣金山𤣥川溢涌寶石負圖狀象靈龜廣一丈六尺長一丈七尺一寸圍五丈八寸立于川西有石馬七其一仙人騎之其一覊絆其五有形而不善成有玉匣關蓋於其前上有玉字玉玦二璜一麒麟在東鳳鳥在南白虎在西犧牛在北馬自中布列四面色皆蒼白其南有五字曰上上三天王又曰述大金大討曹金但取之金立中大金馬一匹在中大吉開壽此馬甲寅述水凢中字六金字十又有若八卦及列宿孛彗之象焉捜神記曰初漢元成之世先識之士有言曰魏年有和當有開石於西三千餘里繫五馬文曰大討曺及魏之初興也張掖之柳谷有開石始見於建安形成於黄麟初丈偹於太和周圍七尋中髙一仞蒼質素章龍馬鹿鳳凰仙人之象燦然咸著此一事者魏晋大興之符也至晋太始三年張掖太守焦勝上言以留郡本國圖較今石文文字多少不同謹具圖上按其文有五馬象其一有人平上幘執㦸而乘之其一有若馬形而不成其字有金有合有中有大司馬有王有大吉有正又有開壽其一成行曰金當取之漢晋春秋曰氐池縣大柳谷口夜激波湧溢其聲如雷曉而有蒼石立水中長一丈六尺高八尺白石畫文爲十三馬一牛一鳥八卦玉玦之象皆隆起其文曰大討曹適水中甲寅帝惡其討也使鑿去爲計以蒼石窒之宿昔而白石滿焉至晋初其文愈明象皆煥徹如玉焉懷帝初誕有嘉禾生於豫章之南昌先是望氣者云豫章有天子氣其後竟以豫章王爲皇太弟元帝以晋王卽位始秦時望氣者云五百年後金陵有天子故始皇東遊以厭之改其地曰秣陵壍北山以絶其勢及孫權之稱號自謂當之孫盛以爲始皇逮於孫氏四百三十七載考其歴數猶爲未及帝之渡江也乃五百二十六年眞人之應在於此矣初有𤣥石圖有牛繼馬故宣帝初忌牛氏遂爲二榼共一口以貯酒焉帝先飲者佳而以毒酒鴆其將牛金而恭王妃夏侯氏竟通小吏牛氏而生元帝咸寧初風吹大社樹折社中有靑氣占者以爲東莞有帝者之祥繇是徙封東莞王於瑯琊卽帝祖武王也及吳之亡王濬實先至建鄴而皓之䧏款逺歸璽於瑯琊天意人事又符中興之兆帝初鎮建業郭璞爲王導叅軍導令璞筮之遇咸之井璞曰東北郡縣有武名者當出鐸以著受命之符西南郡縣有陽名者井當沸其後晋陵武進縣人於田中得銅鐸五枚柄口皆有龍虎形又有將雛諸雀集其前皆驅去復還至於再三又有鵝三四頭高飛且鳴周廻東西晝夜不下如此者六七日豫章有大樟樹大三十五圍枯死積乆永嘉中忽更榮茂又歴陽縣中井沸經日乃止及帝爲晋王又使璞筮遇豫之暌璞曰㑹稽當出鐘以告成功上有勒銘應在人家井泥中得之繇辭所謂先王以作樂崇德殷薦之上帝者也及帝卽位大興初㑹稽郯縣人果於井中得一棧鐘長七寸二分口徑四寸半上有古文竒書十八字云㑹稽徽命餘字時人莫識之璞曰蓋王者之作必有靈符塞天人之心與神物合契然後可以言受命矣觀五鐸啟號於晋陵棧鐘告成於㑹稽瑞不失類出皆有方豈不偉哉若夫鐸發其響應徵其象器以數臻事以實應天人之際不可不察初武帝伐吳琅琊武王伸率衆出塗中而王渾逼歴陽王濬已次近路孫皓欲䧏送天子璽綬近越二將而逺送詣伸識者咸恠之吳之未亡也吳郡臨平湖一旦自開湖邊得石函中有小靑石刻作皇帝字舊言臨平湖塞天下亂開則天下太平吳人以爲美祥俄而吳滅後帝興於江左康帝初爲吳王成帝咸和六年五月曲阿有柳樹倒地六載是月忽復起生九年五月甲戌吳雄家有死榆樹是日因風雨起生與漢上林斷柳起生同象時雖改封琅琊而猶食吳郡爲邑是帝起體饗國之象也曲阿先亦吳地象見吳皆天意也孝武帝始四歲時哀帝興寧三年五月廬陵西昌縣修明家有死栗樹是日忽起生及得位垂統識者竊曰西昌修明之祥帝諱實應之矣孝武諱曜字昌明是與漢宣帝頗同象也後魏道武初生于參合陂明年有榆生于埋胞之坎後遂成林帝旣爲代王登國六年十二月出獵親獲鹿一角召問羣臣皆曰鹿當二角今一角是諸國將并之應也天興元年遂卽皇帝位初聖武帝諱詰汾嘗率數萬騎田於山澤歘見輜軿自天而下旣至見美婦人侍衞甚盛帝異而問之對曰我天女也受命相偶遂同寢宿旦請還曰明年同時復㑹此處言終而别去如風雨及期帝至先所田處果復相見天女以所生男授帝曰此君之子也善養視之子孫相承當世爲帝王語訖而去子卽始祖神元帝諱力㣲也故時人諺曰詰汾皇帝無婦家力㣲皇帝無舅家天興四年新興太守上言晋昌民賈相昔年二十二爲雁門郡吏入句注西陘見一老父謂相曰自今以後四十二年當有聖人出於北方時當太平子孫永長吾不及見之言終而過相顧視之父老化爲石人相今七十下檢石人見存至帝破慕容寳之歲四十二年後周太祖其先普廻因狩得玉璽三紐有文曰皇帝璽普廻異之以爲天授後太祖爲夏州刺史嘗從數騎於野忽聞簫鼓之音以問從人莫之聞也賀拔岳爲侯莫陳恱所殺太祖遂奄有其衆初岳營於河曲有軍吏獨行忽見一老翁鬚眉皓素謂之曰賀拔雖復㨿有此衆然無所成當有一宇文家從東北來後必大盛言訖不見此吏嘗與所親言之至是方驗隋高祖初生有尼來自河東謂皇妣曰此兒所從來甚異不可俗間處之將高祖舍於别舘躬自撫養皇妣嘗抱高祖忽見頭上角出徧體鱗起皇妣大駭墜髙祖於地尼自外入見曰已驚我兒致令晚得天下至周武帝時定州城西門乆閉不開齊文宣帝時或謂開之以便行路帝不許曰當有聖人來啟之及隋高祖至而開焉莫不驚異唐髙祖初仕隋爲譙隴刺史善相者史世良言於高祖曰公骨法非常必爲人主至於命也非所敢知乆之世良復遇高祖乃大驚曰骨法如舊年壽之相頓異昔時勿㤀鄙言願深自愛高祖心益自負及爲殿内少監時尚食奉御郭𢎞道善相高祖善之𢎞道因言曰公天中伏犀下接於睂此非人臣之相宜深自愛高祖取𢎞道銀盆置之於地引弓射之謂𢎞道曰向言有驗當一發中之旣發應弦而中𢎞道曰願公事驗之日賜賞金盆高祖大恱後爲太原留守鎮并州時武士彠爲司鎧叅軍事詰朝嘗於街内獨行聞空中有人言曰唐公是天子士彠尋聲不見有人乃以此白高祖并進兵書高祖恱之曰幸勿多言兵書禁物尚能將來深識好心當同富貴耳其夜士彠夢高祖乗馬上天旦以狀聞高祖大恱於是出入卧内委以心腹大業十三年起義兵於太原五月甲子慶雲見甲戌有白烏飛入高祖之懷七月丙辰師次霍邑隋武牙郎將宋老生陳兵拒險義師不得進屯軍於賈胡堡㑹霖雨積旬餽運不給高祖患之忽有白衣老父詣軍門請見曰予霍山神遣語大唐皇帝若向霍邑當東南傍山取路八月雨止我當助爾破之高祖初哂之遣人東南視地果有㣲道高祖笑曰此神不欺趙襄子豈當負吾耶時有訛言云突厥將襲太原又軍糧且盡高祖命旋師太宗切諫乃止八月己卯雨果霽高祖大恱以太牢祭霍山庚寅次古堆去綘郡二十餘里有紫雲如華盖樓闕之形正臨高祖之上癸巳次龍門縣河水變淸白狐見十一月丙辰入京師尊代王爲天子改元義寧元年高祖爲唐王義寧二年二月辛卯安邑白鹿見甲午河池言慶雲見三月丙辰高祖汎舟於後池有魚二躍入舟乙丑趙郡公孝恭獻神龜背上有文曰萬國付某代代樂武德六年七月車騎將軍劉山濤上書高祖龍潛時數徃來雒交之莊舍踐二石靴迹見於石中至今猶在高祖令鑿之深寸餘其迹愈明乃止初隋大業中有謡云桃李子洪水繞揚山煬帝疑李氏有受命之符故誅李金及李宻㨿雒口倉欲其應䜟隋文時自長安故城東南移於唐興村置新都令西内承天門正當唐興村門今有大槐樹柯葉森欝卽村門樹也有司以行列不正將去之帝曰高熲嘗坐其下不可去也太宗文皇帝以隋開皇十八年歲次戊午生於武功之别舘初太宗在孕而語聲逹於外后心異之將誕育后不之覺而太宗已生時有慶雲見瀰漫數里上屬於天二龍戲於門外水中經三日乃冲天而去見者驚焉大業十三年望氣者云龍門有天子氣連太原甚盛故煬帝置離宮數遊汾陽宮以厭之至是太宗稱述此事以白高祖旣舉義師旦日太宗所居處有紫雲當其上俄變爲五色狀如飛龍武德八年拜中書令嘗夜於嘉猷門側見一神人長數丈素衣冠呼太宗進而言曰我當令汝作天子太宗再拜忽因不見所居𢎞義宮中有一大池嘗作佳氣欝然高數百尺太宗心獨異之至九年其氣轉盛上屬於天六月癸未克定内難立爲皇太子萬機巨細皆令取决初太宗爲秦王高祖制詩云聖德合天地五宿連珠見和風拂世民上下同歡宴帝於宮西造宅初成高祖送玉璽以至帝所縉紳先生相謂曰詩及玉璽蓋奉國之祥瑞者歟又有方士喬伏仁善言符命見建成元吉俱有爭心因謂所親曰秦王應天上録當爲元君此二人乃驅除耳果如其言鄎隱海陵之未發也太史奏云太白入南斗秦王得天下其鋒不可當自非皇天眷顧何以臻此高宗初爲晉王貞觀十七年太子承乾得罪廢爲庻人次當立者濮王太宗以晋王仁孝又以太原瑞石文云李治萬吉乃與長孫無忌房𤣥齡李勣褚遂良等定計立爲皇太子􅌖宗初生於含凉殿則天乃於殿内造佛事有玉象焉及長遊觀其側玉象忽言爾後當爲天子𤣥宗初爲臨淄郡王景龍三年出爲潞州别駕境有黄龍白日上升天又視事之際吏咸見赤龍㨿案嘗出畋有紫雲在其上從者望而竒之四年來朝京師將行使術士韓禮筮有一蓍孑然獨立禮驚曰䇿立其瑞非常之事也貴不可言旣行所過之處大人迹見州人皆異之先是帝所居宅外有池水浸溢頃餘望氣者以爲龍氣是年四月中宗幸其第因遊其池結綵爲樓船令巨象踏之及平内難日寅時潞州聞空中語曰臨淄王誅韋庻人相王得天下吏驚走遽白于刺史以掾吏狂妄留繫旬日㑹制到乃捨之帝自至潞州日抱戴月重輪嘉禾合穗李樹連理等凡十有九瑞開元二年六月左拾遺蔡孚獻龍池集王公卿士以下凡百二十篇請付太常寺其辭合音律者爲龍池樂章以歌聖德從之初帝在藩與宋王等居于興慶里時人謂爲五王子宅及景龍末宅外池水湧出汎灧淸瑩流之不竭中有龜龍遊焉故羣臣歌之八年鄭州人元承徵上封事曰謹按魏典及北齊至後魏太平真君年中内學者奏言上黨有天子氣在壺關大王山于時太武南巡親幸上黨掘山封石將以厭之亦猶秦始皇東遊望氣者云五百年後金陵有天子氣始皇乃改金陵爲秣陵塹北山以絶其勢孫權僭號吳人以爲當之孫盛晋陽秋云從始皇東遊之歲至孫權僣號之時中間四百三十七年數權未當應及晋元帝南渡始有五百二十六年以彼金行奄居四海金陵之瑞其在兹乎又按太武之後百有餘年高歡以内學之言復欲妄干符命因勒兵馬來在晋陽舍於壺關六旬而去更有上黨百姓從在晋陽因名上黨之坊實曰晋陽之地歡又居此僞以應之論其僣應則高歡不異於孫權語以虗攘則太武有同於嬴政暗于時運豈不惜哉臣等恭尋符命壺關天子之氣正是陛下當焉𤣥穹上睠符命下鍾故使歴試潞州所以用當其應此天意也豈人事乎然而一幸潞州三移灰琯壺關之地嵗時爲蒐狩之塲大王之山朝夕卽豫遊之所始能龍潛上黨尋乃鳳舉咸寧内學之言果合符契又按内學所奏符應年月太平真君太平則叶今辰真君則更明陛下自唐至魏三百餘年觸類而推無不驗應伏願陛下上承天意下諭人心昭告寰瀛編列國史從之肅宗初爲皇太子天寶十三載觀安禄山有悖逆之狀恐危宗廟遂精誠祈夢其夜夢故内侍普寂等二人舁一紫案覆以黄帕自天而下直至帝前素版丹書文字甚多旣寤所記者維四句曰厥不云乎其惟其時上天所保福禄不虧十五載六月𤣥宗幸蜀帝幸靈武次永壽縣雲氣見西北長數丈成樓閣之狀識者以爲天子氣自是紫雲擁帝所乗馬聚散不時至平凉都路傍遇一伏兎命左右索弓箭因謂左右曰吾若破賊射則中之不然則否一發而斃左右咸稱萬歲帝初發平原有雲彩見空白鶴前引出軍之後有黄龍自帝所憇屋騰空而去後於彭原郡受册太上皇下誥曰間者日抱帶赤雀白狼之瑞接武薦臻此皆皇帝聖敬之符孝友之感也憲宗自廣陵郡王册爲皇太子時順宗卽位已乆而臣下未有親奏對者内外咸言王伾王叔文專行斷决日有異說又屬頻隂雨皆以爲羣小用事之應及將行册禮之夕雨乃止至行事之時天景晴朗有慶雲見識者以爲天意有所歸宣宗初封光王十餘歲時遇重疾沈惙忽有光曜燭身蹶然而興正身拱揖如對臣僚乳媪以疾聞穆宗徃視之撫其手曰此吾家英物非心憊也賜以玉如意御馬金帶嘗夢乗龍升天言之於鄭太后乃曰此不宜人知幸勿復言懿宗初封鄆王嘗經重疾郭淑妃侍醫藥見黄龍出入卧内旣間妃以異告帝曰慎勿復言又嘗大雪數尺而帝寢室之上獨無人皆異之大中末年京城小兒摺布蘸水向日張之謂之捩暈又宣宗曾製奏邊陲曲撰詞云海岳宴咸通至是帝以鄆王卽位改元咸通卒皆驗昭宗卽位前一日於宅所居之邸東垣有紫氣二條若成文字俄於氣生之處發其垣獲金龍子一枚諸王及左右咸共觀見及聽政頒示百官後唐武皇初爲太原節度使以昭宗景福二年十二月狩於近郊獲白兎有角長三寸莊宗初嗣晋王時長柳巷田家有桃樹伐已經年舊坎仍在其仆木一朝屹然而起行數十歩復於舊坎其家驚駭蒼黄散走議者以漢昭帝時上林仆木起立生枝蟲蠧成文而宣帝興今木理成文仆而重起亦李氏中興之符也又天祐十七年幽州人於田中得金印文曰關中龜印李紹宏使人送於行臺議者曰關中列聖所都龜者卜年之物符璽傳授之器湮落在田乃今復見蓋王者受命之符也十八年正月魏州開元寺僧傳真獲傳國璽一送於行臺傳真之師於廣明中遇京師䘮亂得之緘秘已四十年篆文古體人不識之唯以珍物秘藏非以爲國璽也興建初法物司收市寶玉傳真將鬻之玉人識而嘆曰國寶之一也何至於斯傳真且喜送於行臺帝出之以示諸將驗其文卽受命八字也光彩瑩曜希世罕有羣僚諸將奉觴稱賀帝曰天祚有德錫之神器顧于𦕈末何敢當之止於緘藏俟其真人耳二十年正月丙子朔五臺山僧獻銅鼎二枚毎容二斗言於山中石崖陊裂得之形器古異識者以爲中興之瑞按西漢哀平之間扶風王延年獲銅鼎二枚赤色有光後光武誅新莽中興漢室鼎者帝王重器以異爲瑞不必貢金九牧質重萬鈞以爲異也明宗初在太宗左右嘗廵邊宿於鴈門逆旅逆旅媪方娠帝至媪慢不時具食腹中兒謂母曰大家至速宜具食聲聞於外媪異之遽起親奉㸑敬事尤謹帝曰媪前倨後恭詰之曰公貴不可言也問其故具道娠子腹語事帝曰慢嫗遜言懼千辱耳同光末自鄴㢠廻趨白臯渡將濟以渡船甚少帝方憂之忽有木栰數隻沿流而至卽用以濟師故無留滯焉末帝初在太原嘗與晋高祖因擊毬同入趙襄子之廟見其塑像屹然起立帝私心自負及爲䕶國軍節度使一日夢明宗召至寢門與宋王各剃頭而退及寤以問賔吏皆無對者時雨池擢塩推官李專美在坐屏人謂帝曰將來嗣主必明公也帝心喜之又帝在岐陽日有前爲判獄吏何叟者失其名年踰七十暴卒於家見一人謂何曰陰府召君何隨之至一公宇甚宏敞有吏慿几戒何曰召汝無他事爲吾言於潞王來年三月當爲天子善自愛也及蘇宻告帝親要慮其妄誕不敢言月餘復卒陰官見而叱曰汝安得違吾㫖不逹其事何具陳爲左右所阻陰官曰且放汝還可速言之何退見廊廡下有簿書狼籍以問主者曰此朝代將改升降人爵之籍也及再蘇謁劉延朗宻道其事帝屏人召何入問謂曰爾雖有慿吾無以信何曰某衰耄若此唯有一子請大王質之如無驗可殺之又張濛岐州之瞽者自言知術數不龜不蓍言是太白山神其神祠元魏時崔浩廟時事否㤗人之休咎濛告於神卽傳吉凶之言房暠昵於事神酷信之帝在岐陽暠引濛謁見聞帝語聲駭然曰非人臣也令暠詢其事卽傳神語曰三珠併一珠驢馬没人驅嵗月甲庚午中興戊巳土暠請曰神言予不知也長興四年五月府廨諸門無故自動人頗駭異遣暠問濛濛見暠來未交言先問暠衙署小異勿恠不出三日有恩命其夜報至封潞王及帝被疑除鎮甚恐再三質濛初濛曰且爲備王保無患及王恩同兵將至又召濛謂之曰爾言無患今天下兵來萃我城下内無兵食外無援助得無患乎濛曰王有天下不能獨立朝廷兵來迎王也王若疑臣臣惟一子未及冠請王致之麾下以質臣心及帝入雒受太后册其日御明堂宰相讀册文維應順元年嵗次甲午四月庚午朔帝㢠廻視房暠曰張濛神言甲庚事不亦異乎帝令暠共術士解三珠一珠事言三珠三帝也驢馬無人驅失主也又帝在岐時有人已死復生言帝必登大位二十三年好事者附其意言帝小字二十三又云潞字一足入雒時石􅀈人胡呆通會天文帝亦召問之曰王至貴不可言若有舉動宜以乙未年及舉兵又問曰今嵗歴法名陰部首王者不宜建功立事王且挾今主俟來嵗入朝則福祚永逺帝姓王氏真定房山人也邑南三里里墅名曰王子則所生之地地稱王子亦有符焉旣卽位以族兄爲令訪名未獲守先舊廬植松檟以爲墳園其側有古佛刹刹有石像忽揺動不已人駭而告令令趣之復爾時甚異焉晋高祖初爲河東節度後唐末帝出師重圍晋陽帝遣心腹何福單騎求援北蕃蕃王自將諸部赴之不以繒帛不以珠金若響應聲謂福曰吾已兆於夢皆上帝命我非我意也時援兵未至唐將張敬逹引軍逼城設栅栅將成忽有大風雨暴起栅無以立後築長連城城欲就又爲水潦所壞城竟不能合晋陽有北宮宮城之上有祠曰毗沙門天王帝曾焚修黙而禱之經數日城西北闉正受敵處軍候報稱夜來有一人長丈餘介金執殳行於城乆方不見帝心異之又牙城有僧坊曰崇福坊之廡下西北隅有泥神神之首忽一日有煙生其騰郁如曲突之狀坊僧奔赴以爲人火所延及俯而視之無所有焉事尋逹帝帝召僧之臈高者問焉僧曰貧道見莊宗將得天下曽有此煙觀其噴湧甚於當時可知矣自此日傍多有五色雲氣如蓮芰之狀帝召占者視之謂曰此驗應誰占者曰見處爲瑞更應何人又帝毎詰旦使人慰撫守陴者率以爲常忽一夕已瞑城上有號令之聲聲不絶者三帝使人問之將吏云從上傳來人皆知其神助時城中忽有數處井泉暴溢不止及蕃軍大至合埶破唐師之衆如拉朽焉斯天運使然非人力也先是朱梁改元之始卽天祐之四年也潞州行營使李思安奏壺關縣庻穰鄉鄉人伐樹樹倒自分兩片内有六字如左書云天十四載石進梁主藏於武庫時遣詞臣李琪答詔嘉其瑞焉然莫詳其義至帝卽位人以爲雖有國姓計其甲子則二十年有竒矣議者曰天字取四字中兩畫加之於旁則丙字也四字去中之兩畫加十字則申字也帝卽位之年乃丙申也又易云晋者進也國號大晋皆符契焉又卽位之前一年年在乙未鄴西有栅曰李固淸淇合流在其側栅有橋橋下大鼠與蛇鬭鬬及日之中蛇不勝而死行人觀者數百識者志之後唐末帝果滅於申少帝初爲金吾上將軍天福三年從高祖幸大名其年天旱高祖遣祈雨白龍潭焚請未罷有白龍見於潭心是日澍雨尺餘人甚異之漢高祖初仕爲河東兵馬使嘗因事至代北遮虜軍路側有唐衞公李靖祠遇戍卒乗酒以索戲繫其神之頸卒尋致殞時戍長邑老𤣥陳祈禱以解之而了無應驗帝乃爲祝曰公本朝名將精爽在天雖庸輩䙝凟誠當其責而人旣有請良可恕焉因焚香致拜卒者俄蘇傳其神語曰此非大貴人救不可免也聞者神其事後爲河東節度使天福十一年天下水太原葭蘆茂盛最上一葉如旗狀皆南指焉明年遂卽帝位隱帝始高祖鎮太原周太祖握蕃漢兵要嘗侍帳中參决戎政時令少帝監符璽頗相戲狎曁從征鄴城旦夕同侍一日詰旦語太祖曰我夜來夢爾爲驢負我昇天旣捨爾乗俄變爲龍捨我南去何祥也笑而言曰公爲驢作少意智勿空見玩撫掌而罷爲左衞大將軍高祖欲改年號中書進擬乾和二字高祖改爲乾祐與帝名相符乾祐帝名帝微有風痰毎連唾不止目多閃掣卽位之始遽無恙周太祖微時嘗晝寢有如小虺五色出入顴鼻之間柴后遽見愕然始竒特之傾資無惜后恐人騰口貽患毎寢戒左右俾於屏蔽之所在太原時有神尼同姓見太祖謂李瓊曰我宗天上大仙當爲世界主瓊詰其故曰頂上有肉角也後唐淸㤗末時所居官舍之鄰吳氏有靑衣佳娘者爲山魈所魅鬼能人言而投瓦石隣伍恐悚無敢過吳氏之舍而性剛者強詣必瓦石交下太祖聞而過之言笑侮戲移時寂然如是者再太祖去鬼言如故或謂鬼曰爾旣神聖向者客來又何寂然鬼曰向來者大人也繇是軍中大異之及爲樞宻使北征率師如澶淵旭旦日邊有紫氣來當太祖馬首之上高不及百尺從官視而異之至鄴都一夕在山亭院齋忽有黄氣起於前繚繞而上遽際于天太祖於黄氣中仰見星文紫㣲文昌燦然在目駭曰子在室中而見天象不其異乎宻告知星者乃拜賀曰坐見天衢物不能隔至貴之祥也異日又於衙署中紫氣起於幡竿龍頭之上凡二日觀者異之及討李守貞於河中帝嘗於東砦大陳師旅鉦鼓錚鞫旗幟光耀守貞豋陴下瞰氣色不懌獨言曰是何妖變後城中人言見太祖軍上有紫氣如樓閣華蓋之狀故也册府元龜卷二十一
