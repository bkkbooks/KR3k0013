  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_055-1a}
body:
  text: 册府元龜卷五十五宋王欽若等撰帝王部養老禮曰年之貴乎天下乆矣故有虞氏養老以燕禮夏后氏以饗禮商人以食禮周人脩而兼用之必以八月諸物老成順其時氣以助養育天子袒而割牲侯王設醬公卿饌珍所以老窮不遺彊不犯弱衆不暴寡明長㓜之序興揖讓之風習鄉上齒之義備矣降及後世廵省風俗則先問髙年時臨舊都乃宴衎故老或賜飲於端闕或迴輿於私室而又因靈休之集畢嘉祀之禮則錫以鳩杖賁之束帛登板授之職開石窌之封此皆介于景福終之以仁斯教化之大本盛王之令典也流於惇史豈不羙歟帝舜養國老於上庠養庶老於下庠夏后氏養國老於東序養庶老於西序殷湯養國老於右學養庶老於左學周文王為西伯制其田里教之樹畜導其妻子使養其老五十非帛不煖七十非肉不飽不煖不飽謂之凍餒文王之民無凍餒之老者此之謂也漢文帝元年三月詔曰老者非帛不煖非肉不飽今歲首不時使人存問老㓜存省視也又無布帛酒肉之賜將何以使天下子孫孝養其親今聞吏禀當受粥者或以陳粟禀給也粥淖糜也給米使為糜粥也陳乆舊也小雅甫田之詩曰我取其陳豈稱養老之意哉具為令使其偹為條制有司請令縣道或縣或道皆用此制也有蠻夷曰道年八十以上賜米人月一石肉二十斤酒五㪷其九十以上人賜帛二疋絮三斤絮綿也賜物及當禀粥米者長吏閱視丞若尉致長吏縣之令長也若者豫及之詞致者送至也或丞或尉自致之也不滿九十嗇夫令史致二千石遣都吏循行都吏今督郵是也不稱者督之循行有不如詔㫖者二千石察視責罰之刑者及罪有耐以上不用此令一歳為罰作二歳刑以上為耐之能任其罪也又曰刑為先被刑也有罪在吏未决者言八十九十之人雖合加賜其中有被刑罪者不在此賜物令條中也武帝建元元年二月赦天下民年八十復二等九十復甲卒二等復二口之等也復甲卒不預革車之賦也四月詔曰古之立教鄉里以齒朝廷以爵扶世道民莫善於德然即於鄉里先耆艾奉髙年古之道也今天下孝子順孫願自竭盡以承其親外廹公事内乏資財是以孝心闕焉朕甚哀之民年九十以上以有受粥法給米粟以為糜粥為復子若孫令得身帥妻妾遂其供養之事若者豫及之詞也有子即復子無子即復孫也遂申也元狩元年四月赦天下賜民年九十以上帛人二疋絮三斤八十以上米人三石元封元年登封太山還詔行所廵至七十以上帛人二疋宣帝地節三年三月詔賜髙年帛元康元年三月以鳯凰集泰山賜三老帛二年三月以鳯凰丼露降集賜天下髙年帛三年春以神爵集泰山賜天下髙年帛四年三月詔以廼者神爵嘉祥賜三老帛人各二疋神爵元年三月祠后圡賜天下髙年帛四年二月詔以廼者鳯凰丼露降及神爵集賜天下髙年帛五鳯二年三月鸞鳯集賜髙年帛丼露二年正月赦天下賜髙年帛三年詔以廼者鳯凰集新蔡賜新蔡三老帛元帝初元元年四月賜三老帛四年祠后土赦汾陽賜髙年帛五年四月賜三老帛人五疋永光元年正月郊泰畤賜雲陽髙年帛三月赦天下賜髙年帛二年二月赦天下賜天下三老帛建昭五年二月賜三老帛成帝建始元年賜三老錢帛鴻嘉元年二月賜天下髙年帛永始四年正月行幸丼泉賜髙年帛哀帝以綏和二年四月即位赦天下賜三老帛平帝元始元年詔天下吏比二千石已上年老致仕者參分故禄以一與之終其身四年二月大赦賜天下髙年帛後漢明帝永平二年十月壬子幸辟雍初行養老之禮詔曰光武皇帝建三朝之禮而未及臨饗三朝謂明堂辟雍靈臺也𦕈眇小子屬當聖業眇眇猶㣲㣲也間暮春吉辰初行大射今月元日復踐辟雍尊事三老兄事五更安車輭輪供綏執授侯王設醬公卿饌珍朕親袒割執爵而潄字本作酉從𦙍與太祖廟諱下字音同祝哽在前祝噎在後老人食多哽咽故置人於前後祝之令其不哽噎也升歌鹿鳴下管新宫八佾具儀萬舞於庭朕固薄德何以克當易陳負乘詩刺彼已永念慙疚無忘厥心三老李躳年耆學明五更桓榮授朕尚書詩曰無德不報無言不酬其賜榮爵闗内侯食邑五千户三老五更皆以二千石禄養終厥身其賜天下三老酒人一石肉四十斤有司其存耆耋䘏㓜孤惠鰥寡稱朕意焉三年二月立皇太子賜三老爵三級八年十月臨辟雍養三老五更十二年五月賜天下三老爵人三級十七年五月賜天下三老爵人三級章帝建初二年冬行饗禮以故司空伏恭為三老侍中騎都尉周澤為五更三年立皇后賜三老爵人三級四年四月立皇太子賜三老爵人三級七年九月幸鄴賜三老錢元和二年二月耕於定陶詔曰三老尊年也其賜帛人一疋五月詔賜天下髙年爵三級章和元年七月詔曰秋令是月養衰老授几杖行糜粥飲食月令中秋之令其賜髙年二人共布帛各一疋以為醴酪和帝永元三年十月幸長安詔賜行所過三老錢帛四年八月賜三老爵人三級十二年三月賜三老爵人三級十五年九月南廵賜所過三老官屬及民百年者錢帛元興元年十二月賜天下三老爵人三級安帝永初三年正月加元服賜三老爵人二級元初四年七月詔曰月令仲秋養衰老授几杖行糜粥方今案比之時郡縣不奉行雖有糜粥糠粃相半長吏怠事莫有躬親甚違詔書養老之意其務崇仁恕賑䕶寡獨稱朕意焉延光元年三月改元赦賜三老爵二級李充為左中郎將年八十以為國三老帝常特進見賜以几杖順帝永建元年正月大赦賜三老爵三級四年帝加元服賜三老爵人二級陽嘉元年正月立皇后賜三老爵人三級三年五月大赦賜民間年八十以上米一斛肉二十斤酒五斗九十以上加賜帛人二疋絮三斤桓帝建和元年正月大赦賜三老爵三級二年正月甲子加元服大赦年八十以上米酒肉九十以上加帛二疋綿三斤永興二年十一月校獵賜所過道傍年九十以上錢各有差靈帝光和元年冬行辟雍禮以光禄大夫楊賜為三老魏文帝黄初中蘇林為博士給事中帝作典論所稱蘇林者是也以老歸第國家每遣人就問之數加賜遺年八十餘卒髙貴鄉公丼露三年八月詔曰夫養老興教三代所以樹風化垂不朽也必有三老五更以崇至敬乞言納誨著在惇史然後六合承流下觀而化宜妙簡德行以充其選闗内侯王祥履仁秉義雅志淳固闗内侯鄭小同温恭孝友帥禮不忒其以祥為三老小同為五更車駕親率羣司躬行古禮焉漢晉春秋曰帝乞言於祥祥對曰昔者明王禮樂既備化之以忠誠忠誠之發形於言行夫大人者言行動乎天地天且弗違况於人乎臣欽若等曰按晉書志二年行養老禮晉惠帝永平元年五月賜髙年帛人三疋永興元年三月大赦賜髙年帛三疋明帝太寧三年閏二月即位賜孤老帛人二疋成帝咸和元年二月大赦改元賜孤老米人二斛孝武太元五年六月賜孤老不能自存者米人五斛後魏太武時居虵侯羅結年百七歳為長秋卿後年一百一十詔聽歸老賜大寗東川以為居業并築城即號曰羅侯城朝廷每有大事騎馬詢訪焉文成和平二年三月幸中山至於鄴遂幸信都輿駕所過皆親封髙年問民疾苦民年八十以上一子不從役四年三月賜京師民年七十以上太官厨食以終其年孝文延興三年十一月賜髙年布帛太和元年十月詔七十以上一子不從役又宴京邑耆老於太華殿賜以衣服三年五月詔曰昔四代養老問道乞言朕雖冲昧每尚其美今賜國老各衣一襲綿五斤絹布各五疋四年七月改作東明觀詔會京師耆老賜錦綵衣服几杖稻米蜜麵復家人不徭役六年三月幸武州山石窟寺賜貧老者衣服十五年八月議養老十六年二月賜京邑老人鳩杖八月司徒尉元以老遜位以元為三老以前鴻臚卿游明根為五更詔曰夫大道凝虛至德冲挹故后王法𤣥猷以御世聖人崇謙光而隆美是以天子父事三老兄事五更所以明孝悌於萬國垂教本於天下自非道髙識博孰能處之是以五帝憲德三王乞言若求僃一人同之古哲叔世之老孰能克堪師上聖則難為其舉傅中庸則易為其選朕既虛寡德謝曩哲老更之選差可有之前司徒山陽郡公尉元前大鴻臚卿新太伯游明根並元亨利貞明允誠素少著英風老敷雅迹位顯台宿終歸私第可謂知始知卒希世之賢也公以八十之年宜處三老之重卿以七十之齡可充五更之選於是養三老五更於明堂國老庶老於階下帝再拜三老親袒割牲執爵而饋於五更行肅拜之禮賜國老庶老衣服有差既而元言曰自天地分判五行施則人之所崇莫重於孝順然五孝六順天地之所先願陛下重之以化四方臣既年衰不究逺趣心耳所及敢不盡誠帝曰孝順之道天地之經今承三老明言銘之於懷明根言曰夫至孝通靈至順感幽孝順之道無所不格願陛下念之以濟黎庶臣年志朽弊識見昧然在心之慮不敢不盡帝曰五更助三老以言至範敷展徳音當克巳復禮以遵所授禮畢乃賜歩輓一乘詔曰夫尊老尚更列聖同致欽年敬德綿哲齊軌朕雖道謝𤣥風識昧睿則然仰禀先誨全遵猷㫖故推老以德立更以元父焉斯彰兄焉斯顯矣前司徒公元前鴻臚卿明根並以充德懸車懿量歸老故尊公以三事更以五雖老更非官耋耄罔禄然禀事既髙宜加殊養三老可給上公之禄五更可食元卿之俸供養之味亦同其列其後車駕幸鄴明根朝於行宫詔曰游五更養素蓬簷歸終衡里可謂朝之碩德國之老成可賜帛五百疋糓五百斛勅大官僃送珍羞後車駕幸鄴又朝行宫賜糓帛如前為造甲第國有大事常璽書訪之舊疹發動手詔問疾太醫送藥時奚䕶為外都大官詔以䕶年邁既未致仕令依舊養老之例十七年八月帝南伐至泗州民年七十以上賜爵一級九月濟河詔雒懷并泗所過四州之民百年以上假縣令九十以上賜爵三級八十以上賜爵二級七十以上賜爵一級十八年正月帝南廵詔相兖豫三州百年以上假縣令九十以上賜爵二級七十以上賜爵一級孤老不能自存者賜粟五石帛二疋八月丙寅詔六鎮及禦夷城人年八十以上而無子孫兄弟終身給其廩粟七十以上家貧者各賜粟十斛十一月辛未詔冀定二州民百年以上假以縣令九十以上賜爵三級八十以上賜爵二級七十以上賜爵一級十二月丁卯詔郢豫二州之民百齡以上假縣令九十以上賜爵三級八十以上賜爵二級七十以上賜爵一級鰥老不能自存賜以糓帛十九年四月幸彭城賜百歳以上假縣令九十以上賜爵三級八十以上賜爵二級七十以上賜爵一級老疾不能自存者賜糓帛六月帝自伐齊迴車駕所經百年以上賜假縣令九十以上賜爵三級八十以上賜爵二級七十以上賜爵一級孤老不能自存者賜以糓帛十月曲赦相州民百年以上假郡守九十以上假縣令八十以上賜爵三級七十以上賜爵二級孤老不能自存者賜以糓帛二十年二月詔畿内七十以上暮春赴京師將行養老之禮三月宴羣臣及國老庶老於華林園詔曰國老黄耈以上假中散大夫郡守耆年以上假給事中縣令庶老直假郡縣名賜鳩杖衣裳二十一年二月詔并州士人年六十以上假以郡守三月詔汾州民百年以上假縣令九十以上賜爵三級八十以上賜爵二級七十以上賜爵一級五月泛渭入河詔雍州士人百年以上假華郡太守九十以上假荒郡八十以上假華縣七十以上假荒縣庶老以年各减一等七十以上賜爵三級時裴安祖為河東州主管後閒居養志不出城邑帝幸長安至河東存訪故老安祖朝於蒲坂帝與語甚悦仍拜安邑令安祖以老病固辭詔給一時俸以供湯藥焉宣武景明三年八月以前大傅平陽公丕為三老孝明熙平二年四月詔京尹所統百年以上賜大郡板九十以上賜小郡板神龜元年正月詔京畿百年以上給大郡板九十以上給小郡板八十以上給大縣板七十以上給小縣板諸州百姓百歳以上給小郡板九十以上給上縣板八十以上給中縣板正光四年七月詔曰達尊斯在齒預一焉崇敬黄耈先代通訓故方叔以元老處位充國縁自強見留雖七十致仕明乎典故然以德尚壯許其縶維今庶寮之中或年廹懸車循禮宜退但少收其力老棄其身言念勲舊眷然未忍或戴白在朝未嘗外任或停私歴紀甫授考級如此之徒雖滿七十聽其蒞民以終常限或新觧縣吏或外任私停已滿七十方求更叙者吏部可依令聞奏其有髙名峻德老成髦士灼然顯達為時所知者不拘斯例若才非秀異見在朝官依令合觧者可給本官半禄以終其身使辭朝之叟不恨歸於閭巷矣孝莊建義元年五月詔上黨百年以下九十以上板三品郡八十以上四品郡七十以上五品郡後周明帝武成二年六月己巳板授髙年刺史守令各有差武帝保定元年正月甲戌詔先經有職官年六十以上及民年七十以上節級板授官三年四月幸太學以太傅燕國公于謹為三老以食之三老入門帝迎拜門屏之閒三老答拜有司設三老席於中楹南向大師晉公䕶升陛設几於席三老升席南面慿几而坐以師道自居大司冦楚公寧升陛正舄帝升立於斧扆之間西面有司進饌帝跪設醬豆親袒割三老食訖帝又親跪受爵以潄有司撤訖帝北面立訪道三老乃起立於帝後帝曰猥當天下重任自惟不才不知正治之要公其誨之三老答曰木受䋲則正后從諌則聖自古明王聖主皆虛心納諌以知得失天下乃安惟陛下念之又曰為國之本在乎忠信是以古人云去食去兵信不可失國家興廢莫不繇之願陛下守而勿失又曰治國之道必須有法法者國之綱紀綱紀不可不正正之之道在於賞罰而已若有功不賞有罪不罰則天下善惡不分人無所措手足矣三老言畢帝再拜受答拜焉禮成而出七月丁丑幸津門問百年賜錢帛又賜板授有差建德二年詔曰尊年尚齒列代𢎞規序舊酧勞哲王明範朕嗣承洪業君臨萬邦驅彼兆庶寘諸仁夀軍民之間年多耆耋眷言衰暮宜有優崇可頒受老職使榮沾邑里宣帝時柱國閻慶於武帝朝抗表致仕慶既衰老常嬰沉痼帝以其先朝耆舊特異常倫乃詔靜帝至第問疾賜布帛千段醫藥所須令有司供給大象二年拜上柱國隋文帝踐極令皇太子就周致仕柱國閻慶第問疾仍供醫藥之費煬帝大業五年二月丙辰宴耆舊四百人於武徳殿頒賜各有差十月癸亥詔曰優徳尚齒載之典訓尊事乞言義彰昭序鬻熊為乘取非筋力方叔元老克壯其猷朕永言稽古用求至治是以龎睂黄髪更令收序務簡優秩無虧藥膳庶其臥治佇其𢎞益今歳耆老赴集者可於近郡處置年七十以上疾患沉滯不堪居職即給賜帛送還本郡其官至七品以上者量給禄廩以終厥身六年四月帝在江都宫宴江淮以南父老頒賜有差七年二月詔曰今往涿郡廵撫民俗其河北諸郡及山西山北年九十以上者板授太守八十者授縣令唐髙祖武徳三年幸稷州召父老置酒髙會賜帛五年三月宴京城父老賜帛太宗貞觀三年四月詔髙年八十以上粟二石九十以上三石百歳加絹二疋十月幸隴州詔岐隴二州八十以上賜物百歳以上尤加優恤五年十二月幸温湯新豐賜髙年帛六年三月幸九成宫八十以上賜粟帛五月宴岐州父老賜帛九月幸慶善宫賜故老帛十一年正月宴長安父老於𤣥武門賜以糓帛三月幸洛陽宫宴父老於乾元殿賜以粟帛是年車駕在雒陽幸甄權宅禮髙年也權潁州人精曉藥術為天下之最時年一百三歳拜朝散大夫賜以粟帛被褥几杖因詔百歳以上者給侍五人十二年二月宴雒陽父老賜帛有差十三年正月朝於獻陵三原縣人年八十以上賜物有差十四年正月幸魏王宅賜同里老人物有差十五年正月如雒陽所過州賜髙年糓帛五月并州父老請臨幸帝賜宴於武成殿仍賜物遣之十一月蒐於伊闕詔所經之縣遣使存問髙年賜帛各有差十七年六月并州父老詣闕賀皇太子䟽爵晉藩賜宴及物以遣之十一月以貞石表瑞制男子年七十以上量給酒米十八年正月癸卯將以征髙麗宴雍州父老百歳以上氊被袍各一帛十疋粟十石九十以上物五段粟五石八十以上物三段粟一石十一月壬申至雒州遣使齎璽書詣鄭汝懐澤四州問髙年宴賜各有差壬午宴雒州父老一百九十人於儀鸞殿班賜有差十九年二月發雒陽征遼所經州縣髙年賜粟帛幸行次河陽女子吕年百歳太宗幸其宅存問之賜氊帛袍各一綿帛十段次汲縣女子翟張並年百歳太宗幸其宅存問之賜物如河陽三月次平棘張道鴻之廬賜以衣服道鴻性鄙野無他事行少時嘗遊名山得服食之訣居人間每餌金膏時年百四十六歳十月次營州召父老年七十以上賜繒帛綾錦等二十年幸并州引太原父老宴之賜物有差二月發并州賜所過髙年粟有差七月幸靈州賜髙年粟帛有差八月丁卯見京城父老於北闕賜食及粟帛二十二年三月至玉華宫賜所過髙年粟帛二十三年五月以丼雨賜天下八十以上粟帛髙宗永徽六年十月立武氏為皇后赦天下八十以上老人各賜粟二石帛三段百歳以上各賜粟五石帛十段顯慶元年正月辛未立皇太子赦諸年八十以上各賜粟帛己卯宴京城老人八十以上賜物各有差二年二月幸雒陽父老百歳以上賜氊被一具袍一領絲絹十段粟二十石仍遣使就家存問九十以上各賜絲絹五段十月幸鄭州賜八十以上老人粟帛有差閠十二月以駕幸東都詔所經處八十以上老人賜氊袍綿及粟有差五年三月幸并州老人年八十以上板授刺史縣令并賜氊被粟帛各有差龍朔元年九月駕幸河南縣婦人張氏年一百三歳遂賜絹三十疋氊被一具皇后太子亦親問賜以衣物及繒綵乾封元年正月改元詔諸老人八十以上者假授刺史司馬量賜粟帛總章二年九月幸岐州賜髙年衣服粟帛咸亨元年十一月將幸東都宴京城父老有不能行者仍許子弟扶至殿庭仍節級賜物及黄帔而遣之上元三年三月自汝州温陽還賜八十以上老人帛𢎞道元年二月大赦天下老人百歳以上者板授下州刺史婦人板授郡君九十以上者板授上州司馬婦人板授縣君八十以上者板授縣令婦人量賜粟帛睿宗太極元年正月藉田大赦賜老人年九十以上板授下州刺史緋衫牙笏八十以上板授上州司馬緑衫木笏𤣥宗開元二年九月引京師侍老宴於含元殿庭詔曰古之為政先於尚老居則致養禮傳三代行則就見制問百年蓋皇王之勸人教黎庶之為子朕寅奉休厯祗膺聖謨因秋歸而歳成屬星見於郊祀念其將至尤重乞言俾伸恩於几杖期布惠於鄉國九十以上宜賜几杖八十以上宜賜鳩杖所司準式天下諸州侍老宜令州縣遂穏便設酒食一准京城賜几杖其婦人則送几杖於其家三年十月詔古者親問百年義在養老其侍年老九十以上并篤疾各賜物四段綿帛各一疋十一年正月車駕幸北都詔太原府父老八十以上賜物五段板授上縣令賜緋婦人板授上縣君九十以上賜物七段板授上州長史賜緋婦人板授郡君百歳以上賜物十段板授上州刺史賜紫婦人板授郡君夫人十一月親祠南郊禮畢大赦詔百歳老人賜帛五段粟五石縣令至其家存問給付十三年十月東廵至濮州河南河北五百里内父老各賜帛二疋十一月封禪禮畢徐曹亳汴許仙豫等州父老各賜帛二疋十二月至東都京兆父老拜賀各賜帛以遣之十五年詔曰吏部選人有衰老不堪釐務者優其資致仕量賜多少粟帛十七年十一月詔諸州侍老百歳以上賜綿帛十段九十以上賜五段八十以上賜三段二十年十月祠后土畢詔天下侍老百歳以上賜粟五石八十以上三石二十三年正月藉田禮畢詔天下侍老百歳以上板授上州刺史九十中州刺史八十上州司馬七十以上所繇量給酒肉各令存問二十四年八月千秋節召京兆父老宴敕並宜坐食訖樂飲兼賜物二十六年七月册皇太子大赦詔天下侍老八十以上賜粟三石帛三疋百歳以上賜粟五石綿帛五段並假板授二十七年二月加尊號大赦詔天下侍老百歳以上板授下州刺史婦人板授郡君賜粟五石絹帛五段九十以上板授州司馬婦人板授縣君粟三石絹帛三段八十以上板授鄉君粟二石綿帛二段天寳元年正月改元詔天下侍老八十以上者宜委縣官每加存問仍量賜粟帛侍丁者令其養母孝假者矜其在䘮此王政優容俾伸情理而官吏不依令式多雜役使自今已後更不得然三載十二月祀九宫貴神禮畢詔天下侍老百歳以上賜綿帛五段粟三石八十以上三段粟二石六載正月親祠南郊禮畢詔天下侍老百年以上賜綿帛五段粟三石八十以上綿帛三段粟二石仍令長官存問七載五月加尊號詔京城父老各賜物十段七十以上板授本縣令其妻板授縣君六十以上板授本縣丞天下侍老百歳以上板授下郡太守婦人板授郡君九十以上板授上郡司馬婦人板授縣君八十以上板授縣令婦人板授鄉君仍賜酒麵八載閏六月册尊號禮畢詔髙年給屬存養因時定式務廣仁恩其天下百姓丈夫七十五以上婦人七十以上宜各給一人充侍仍自簡擇至八十以上依常式處分十載正月親祠南郊禮畢詔天下侍老百歳以上賜綿帛五段粟五石八十以上綿帛三段粟三石丈夫七十五以上婦人七十以上絹帛五段粟二石十三載二月册尊號禮畢詔天下侍老百歳以上板授本郡太守婦人板授郡夫人各賜綿帛五段粟三石八十以上板授本縣令婦人板授縣君各賜綿帛二段粟二石肅宗至德元年即位於靈武詔曰天下耆夀各賜物五段侍老板授太守縣令仍各賜物五段二年十二月赦詔天下侍老八十以上板授有差並賜緋魚袋授太守縣令上元二年赦詔天下侍老未板授者與板授代宗廣德二年二月親祠南郊禮畢大赦詔天下侍老九十以上板授刺史七十以上板授上佐縣令德宗興元元年六月發興元詔本府耆老與板授本縣令仍賜緋貞元五年四月以太子少傅兼禮部尚書蕭昕為工部尚書前太子少詹事韋建為秘書並致仕仍給半禄料後受致仕官者並宜准此舊例給半禄及賜帛其俸料悉絶帝念歸老之臣特命賜其半焉致仕官給半禄自昕等始也順宗即位初大赦百姓九十以上板授及賜各有差仍令官吏就家存問憲宗元和元年正月詔天下百姓髙年賜米帛羊酒十四年七月册尊號大赦委中書門下選黜陟使分廵天下百姓髙年者頒賜有差穆宗以元和十五年正月即位十一月令鄭覃往鎮州宣慰其四州之内有髙年不能自存者就給粟帛長慶元年正月郊祀禮畢赦制天下百姓髙年者賜粟及綿絹有差三月以盧龍軍節度使劉總歸詔管内髙年不能自存差官就問給賜粟帛臣欽若等曰唐自武宗已後無實録故事多闕後唐莊宗同光元年四月即位制曰應諸道管内有髙年踰百歳者便與給復永俾除名自八十至九十者與免一子免役州縣不得差徭十月德音有年過八十者免一子從征明宗天成二年十月辛丑詔曰敬老之規前王所重養親之道為子居先應有年八十以上及家長有廢疾者宜免一丁差役俾遂奉養晉髙祖天福二年四月丁亥制曰洪荒之内鄉黨之中宜𢎞養老之規式表問年之道天下百姓有年八十以上者與免一丁差徭仍令逐處簡署上佐官六年八月帝幸鄴都制管内耆老八十以上者並與板授上佐周太祖廣順二年十一月左監門衞上將軍李建崇石神武大將軍安伸左領軍將軍慕容業右領衞將軍劉彦章各賜紫敧正錦袍金塗銀束帶建崇等皆年七十餘太祖以舊將累為刺史留後老居班列故有是賜仍令每日内殿起居退就公食冊府元龜卷五十五
