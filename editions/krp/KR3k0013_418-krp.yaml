body:
  text: 冊府元龜卷四百十八宋王欽若等撰將帥部嚴整古之論將者既兼有智信仁勇而後加之以嚴其故何哉蓋夫推轂受命成師以出非威克則失政非衆整則喪列故善用兵者未嘗不以嚴整而制勝焉乃有正身以表率齊衆以進退出令必信行罰必當紀律素足恩威靡瀆戰或不利而軍無亂行居常戒嚴而出必致捷以至長驅敵境路不拾遺克平城壘市靡改肆盖武之有七徳其戢兵禁暴之為急矣陳成子齊大夫也帥師救鄭及留舒違榖七里榖人不知言其整也留舒齊地違去也漢周亞夫為河内太守文帝六年匈奴大入邊以宗正劉禮為將軍軍霸上祝兹侯徐厲為將軍軍棘門又以亞夫為將軍軍細柳以備胡帝自勞軍至霸上及棘門軍直馳入將以下騎出入送迎已而之細柳軍軍士吏被甲銳兵刃彀弓弩持滿彀張也天子先驅至不得入先驅導駕者也先驅曰天子且至軍門都尉曰軍中聞將軍之令不聞天子之詔有頃上至又不得入於是帝使使持節詔將軍曰吾欲勞軍亞夫乃傳言開壁門壁門士請車騎曰將軍約軍中不得馳驅于是天子乃按轡徐行至中營將軍亞夫揖曰介胄之士不拜請以軍禮見禮介者不拜天子為動改容式車古者立乗凡言式車者謂俛身撫式以禮敬人式車前横木者也使人稱謝皇帝敬勞將軍成禮而去既出軍門羣臣皆驚帝曰嗟乎此真將軍矣鄉者霸上棘門如兒戲耳其將固可襲而虜也至于亞夫可得而犯耶稱善者久之月餘三軍皆罷迺拜亞夫為中尉程不識為長樂衛尉武帝時以邊太守將屯正部曲行伍營陳擊刁斗吏計治軍簿虜不得犯後漢鄧禹為大司徒征闗中是時三輔連覆敗赤眉所過殘賊百姓不知所歸聞禹乗勝獨尅而師行有紀綱紀也言有條貫而不下失皆望風相攜負以迎軍降者以千數銚期重於信義自為將有所降下未嘗虜掠陳俊為琅邪太守行大將軍事得專征青徐俊撫貧弱表有義檢制軍吏不得與郡縣相干百姓歌之岑彭為征南大將軍與蓋延耿弇圍隗囂於西城彭壅谷水灌西城城未沒丈餘囂將巡行周宗將蜀兵救到囂得出還冀漢軍食盡燒輜重引兵下隴延弇亦相隨而退囂出兵尾擊諸營彭殿為後拒尾謂尋其後而擊之凡軍在前曰啓在後曰殿東觀記曰彭東入𢎞農界百姓持酒肉迎軍曰蒙將軍為後拒全子弟得生還也故諸將能全師東歸又與諸將伐公孫述彭首破荆門長驅武陽持軍整齊秋毫無犯朱祐為建義大將軍將兵率衆多受降以克定城邑為本不存首級之功禁制士卒不得虜掠百姓軍人樂放縱多以此怨之馮異為掾史光武使異别收河間兵還拜偏將軍從破王郎封應侯異為人謙退不伐行與諸將相逢輒引車避道進止皆可表識軍中號為整齊髙順為吕布督將清白有威嚴少言辭將衆整齊每戰必尅魏于禁為平虜校尉從至宛陵張繡與角復叛太祖與戰不利軍敗還舞陰是時軍亂各間行求太祖禁獨勒所將數百人且戰且引雖有死傷不相離虜追稍緩禁徐整行隊鳴鼓而還未至太祖所道見十餘人被鎗裸走禁問其故曰為青州兵所刼初黄巾降號青州兵太祖寛之故敢因緣為畧禁怒令其衆曰青州兵同屬曹公而還為賊乎乃討之數之以罪青州兵遽走詣太祖自訴禁既至先立營壘未謁太祖或謂禁青州兵已訴公矣宜促詣公辨之禁曰今賊在後追至無時不先為備何以待敵且公聰明譖訴何緣徐鑿塹安營訖乃入謁且陳其狀太祖悅謂禁曰淯水之難吾其急也將軍在亂能整討暴堅壘有不可動之節雖古名將何以加之時于禁與張遼樂進張郃徐晃俱為名將太祖每征伐咸遞行為軍鋒還為後拒而禁持軍嚴整徐晃為平寇將軍既破闗侯時諸將皆集太祖按行諸營士卒咸離陣觀而晃軍營整齊將士駐陣不動太祖歎曰徐將軍可謂有周亞夫之風矣曹仁為征南將軍仁少不修行檢及長為將嚴整奉法令常置科於左右案裴潛為兖州刺史太祖次摩陂歎其軍陣齊整特加賞賜蜀諸葛亮悉大衆據武功五丈原分兵屯田為久駐之基耕者雜於渭濱居民之間而百姓安堵軍無私焉趙雲為偏將軍從先主鎮荆州先主入益州雲領留營司馬此時孫夫人以權妹驕豪多將吴吏兵縱横不法先主以雲嚴重必能整齊特任掌内事權聞先主西征大遣舟船迎妹而夫人内欲將後主還吴雲與張飛勒兵截江乃得後主還雲後與鄧芝馬謖將兵拒魏軍謖敗於街亭雲芝敗於箕谷諸葛亮曰街亭軍退兵將不復相錄箕谷軍退兵將初不相失何故芝荅曰雲身自斷後軍資什物畧無所棄兵將無緣相失王平為禆將軍屬馬謖先鋒謖大敗於街亭衆盡星散惟平所領千人鳴鼓自持魏將張郃疑其伏兵不往逼也於是平徐徐收合諸營遺卒率將士而還丞相亮既誅馬謖等及奪將軍黄襲等兵平特見崇顯吴魯肅為人方嚴治軍整頓禁令必行肅遺腹子淑永安中為武昌督假節遷夏口督所在嚴整有方幹賀齊為將黄武初魏使曹休來伐齊以道逺後至因住新市為拒㑹洞口諸軍遭風流溺所亡中分將士失色賴齊未濟偏軍獨全諸將倚以為勢齊性奢綺尤好軍事兵甲器械極為精好所乗船雕刻丹鏤青蓋絳襜干櫓戈矛葩爪文畫弓弩矢箭咸取上材蒙衝鬭艦之屬望之若山休等憚之遂引軍還遷後將軍假節為徐州牧步隲為驃騎將軍領冀州牧都督西陵十二年鄰敵敬其威信惟寛𢎞得衆喜怒不形於聲色而外内肅然潘璋為右將軍為人麄猛禁令肅然好立功名所領兵馬不過數千而其所在常如萬人征伐每止頓立軍市他軍所無皆仰取足朱然為左司馬右軍師雖世無事每朝夕嚴鼔兵在營者咸行裝就隊以此玩敵使不知所備故出恒有功孫奐為揚武中郎將領江夏太守黄武中大帝攻石陽奐以地主使所部將軍鮮于丹帥五千人先斷淮道自帥吴碩張梁五千人為軍前鋒降髙城得三將大軍引還帝詔使在前住駕過其軍見奐軍隊整齊帝歎曰初吾憂其遲鈍今治軍諸將少能及者吾無憂矣賀景為滅賊校尉禦衆嚴而有恩兵器精飾為當時冠絶晉薛翊為將軍持節南征軍容甚盛劉毅為冠軍將軍持節兖州節度使號令嚴整行經墟邑百姓安悅前秦王猛為輔國將軍率諸軍討慕容暐軍禁嚴明師無私犯猛未至鄴刼盜公行及猛之至逺近怡然燕人安之後秦姚碩徳為鎮西將軍率兵伐吕隆法令齊整秋毫無犯祭先賢禮儒哲西土悅之宋蒯恩為龍驤將軍髙祖伐魯宗之恩與建威將軍徐達之前進達之敗汲恩陣於堤下宗之子軌乗勝擊恩矢下如雨呼聲震地恩整厲將士置陣堅嚴軌屢衝之不動知不可攻乃退髙祖善其能將王鎮惡隨髙祖北伐既入長安姚泓率妻子歸降城内夷晉六萬餘户鎮惡宣揚國恩撫慰初附號令嚴肅百姓安堵劉勔為寧朔將軍㑹豫州刺史殷琰反假勔輔國將軍討之及琰開門請降勔約令三軍不得妄動城内士民秋毫無所失百姓感悅咸曰來蘇沈攸之為冠軍將軍雍州刺史破薛常寶劉胡于赭浙濃湖賊軍委棄資財珍貨殷積諸軍各競收歛以强弱為多少惟攸之張興世約勒所部不犯秋毫諸將以此多之蕭惠開為桂陽王征北長史南東海太守惠開先與㑹稽太守蔡興宗名位畧同又結情欵自以負釁摧屈慮興宗不能詣已戒勒部下曰蔡㑹稽部伍若借問慎不得答惠開素嚴部下莫敢違犯興宗見惠開舟力甚盛不知為誰遣人歴船訊惠開有舫十餘事幹力二三百人皆低頭直去無一人答者梁柳慶逺為征東長史髙祖義兵起雍州慶逺從軍下身先士卒髙祖行營壘見慶逺頓舍嚴整每歎曰人人若是吾又何憂楊公則為左衞將軍髙祖起義下郢州定江州號令嚴明秋毫不犯所在莫不賴焉及平建康城内出者或被剝奪公則親率麾下列陣東掖門衞送公卿士庶故出者多繇公則營焉裴邃為宣義將軍鎮合淝居身方正有威重將吏憚之少敢犯法張𢎞䇿為輔國將軍從髙祖義師平建康𢎞䇿與吕僧珍先入清宫禁封驗府庫時城内珍寶委積𢎞䇿申勒部曲秋毫無犯後魏樂平王丕為車騎大將軍督河西髙平諸軍南討秦王楊難當軍至雒陽禁令齊肅所過無私百姓爭致牛酒安定王休領大司馬孝文車駕南伐親行諸軍遇休以三盜入狥於六軍將斬之有詔赦之休執曰陛下將逺清衡霍故親御六師跋涉野次軍行始再已有姦竊如其不斬何以息盜請必行刑以肅姦慝詔曰大司馬執憲誠應如是但因緣㑹朕聞王者之體亦時有非常之澤雖違軍法可特原之休乃奉詔孝文謂司徒馮誕曰大司馬嚴而秉法諸軍不可不慎於是六軍肅然來大千為内幢將典宿衞禁旅大千用法嚴明上下齊肅叔孫建為平原鎮大將封丹陽王加征南大將軍都督冀青徐濟四州軍事建沈敏多智東征西伐常為謀主治軍清整號令嚴明宇文福為武衛將軍從孝文征南陽與右衞將軍楊播為前軍至鄧城福選兵簡將為攻圍之勢帝望福兵軍法齊整將士閑習大被褒歎元英為南安將軍領䕶西戎校尉孝文南伐為梁漢别道都將圍南鄭禁止三軍一無所犯逺近皆供租運劉潔以數從征討有功進爵㑹稽公與樂平王丕督諸軍取上邽軍至啓陽百姓爭致牛酒潔至上邽諸將咸欲斬其豪帥以示王威潔不聽撫慰秦隴秋毫無犯人皆安業源子恭為尚書主客郎中攝南主客事時河州羌却鐵忽反殺害長吏詔子恭持節為行臺率諸將討之子恭嚴勒州郡及諸軍不犯民一物北齊斛律羨為幽安平南北營東燕六州都督突厥衆十餘萬來寇州境羨總率諸將禦之突厥望見軍威甚整遂不敢戰即遣使求款附後周李賢為大將軍魏帝西遷太祖令賢率騎兵迎衞時山東之衆多欲逃歸帝乃令賢以精騎三百為殿衆皆憚之莫敢亡叛權景宣為大都督豫州刺史鎮樂口時東魏來寇潁川陷後太祖以樂口等諸城道路阻截悉令拔還襄州刺史范秀以狼狽得罪景宣號令嚴明戎旅整肅所部全濟獨被優賞齊王憲為大司馬遷上柱國武帝東伐為前鋒齊人夙聞威聲無不憚其勇畧及并州之捷長驅敵境芻牧不擾兵無私焉尉遲迥為大將軍平蜀蜀主蕭紀子宜都王肅與其文武官屬詣軍門請見迥以禮接之其吏人合營等各令復業惟收僮隸及儲積以賞將士號令嚴肅軍無私焉扶猛為汝州刺史從衞公直援陳將華皎時大軍不利惟猛所部獨全隋李雄仕周為驃騎大將軍遷小賓部從達奚武與齊人戰于芒山諸軍大敗雄所領獨全賀若弼為吴郡總管開皇九年大舉伐陳弼襲陳南徐州拔之執其刺史黄恪軍令嚴肅秋毫不犯有軍士於民間酤酒者弼立斬之楊素為靈州道行軍總管討突厥大破之素馭戎嚴整有犯軍令者立斬之無所寛貸由是戰無不勝稱為名將宇文忻為右領軍大將軍馭戎整齊閻毗為車騎宿衞東宫髙祖嘗遣髙熲大閱于龍臺澤諸軍部伍多不齊整惟毗一軍法制肅然熲言之于帝特蒙賜帛劉方為交州道總管法令嚴肅軍容齊整有犯禁者造次斬之薛世雄為右監門郎將從煬帝征吐谷渾進位通議大夫世雄性㢘謹凡所行軍破敵之處秋毫無犯帝繇是嘉之衞𤣥為刑部尚書遼東之役檢校右禦衞大將軍率師出增地道時諸軍多不利𤣥獨全衆而退堯君素為鷹揚郎將大業之末盜賊蜂起人多流亡君素所部獨全唐闞稜為越州都督時杜伏威據有江淮之地其部皆出自羣賊類多放縱有相侵奪者稜必殺之雖親故無捨令行禁止路不拾遺李靖武徳中為行軍總管征荆州降蕭銑入據其城號令嚴肅軍無私焉獨孤開逺貞觀初詔典屯兵突厥初降諸蕃逺至太宗較獵於昆明池以示威武令開逺總統左廂六衞兵馬軍令嚴肅太宗大悅賜雜綵二百段後出為蒲州刺史薛訥為左衞大將軍𤣥宗即位于新豐講武以訥為左軍節度時元帥與禮官得罪諸部領亦失序惟訥及解琬之軍中不動令輕騎詔訥至軍門皆不得入禮畢帝甚加慰勞王思禮為河東節度使善於支計拙於征伐然用法嚴整士卒不敢犯時議稱之長孫全緒為右羽林大將軍吐蕃犯長安既平中書令郭子儀率六軍將士自商州還師長安命全緒為先鋒全緒既進隊伍嚴整京城士庶迎拜歡呼令狐彰為滑亳等六州節度時犬戎犯邊徴兵防狄彰遣屬吏部統營伍自滑至京之西郊尚一千餘里甲士三千人率自齎糧所過州縣路次供億皆辭而不受所經閭里不犯秋毫識者稱之尚可孤為神䇿大將軍魚朝恩之統禁軍愛其勇力甚委遇之俾為養子奏改姓魚氏名智徳以禁兵三千鎮于扶風縣後徙武功可孤在扶風武功凡十餘年士伍整肅郡縣安之興元初與李晟同收京城賊平之後營于白華亭統衆公平號令嚴整時人稱焉李晟甚親重之段秀實為涇州刺史邠寧節度白孝徳奏秀實試太常卿支度營田二副使大軍西遷所過掠奪又以邠境乏食難於饋運乃請軍於奉天是時公廪亦竭縣吏憂恐多逃匿郡行剽盜孝徳不能禁秀實私曰使我為軍候當不如是軍司馬言之遂以秀實為都虞候權知奉天行營事號令嚴一軍府安泰代宗聞而嗟賞久之兵還于邠寧復為都虞候張孝忠為髙陽軍使統易州田承嗣之寇冀州成徳軍節度李寶臣使以精騎四千禦之承嗣覩其嚴肅歎曰張阿勞在焉冀州未易圖也乃焚營宵遁阿勞孝忠小字也李懷光為朔方節度郭子儀軍都虞候性清勤嚴猛而敢誅殺雖親戚犯法皆不撓避子儀性寛厚不親軍事紀綱任懷光軍中尤畏之亦稱為理李觀為右龍武大將軍涇帥叛觀時上直領衞兵千餘人扈從奉天詔都巡警訓練諸軍戍帥三數日間加召五千餘兵列之通衢整肅鼙鼓城内因之增氣辛雲京為太原節度使質性沈毅部下有犯令者不貸絲毫其賞功効亦如之故三軍整肅李晟興元初為神䇿行營節度使與李懷光同討朱泚晟軍舍於朔方軍之北每晟軍與懷光軍同至城下懷光軍輒虜掠驅牛馬百姓苦之晟軍無所侵犯懷光軍惡其獨善乃分所虜獲與之晟軍不敢受晟又收復京城遣京兆尹李齊運告諭於衆百姓安堵秋毫無犯初勒兵屯於含元殿前舍於右金吾仗號令三軍曰晟不佞上憑睿算次順人心今得尅滅兇渠肅清天禁皆三軍之力也長安士庶久陷賊庭若小有震驚則非伐罪弔人之義晟與公等各有家累離别數年今已成事相見非晚五日内不得輒通家信違命者斬嗣曹王皋為相州節度市迴紇馬以益騎兵每大畋獵以教士卒軍令嚴肅路無拾遺髙崇文元和初為左神䇿行營節度使統兵討劉闢于西川軍至興元軍中有折逆旅之匕箸者斬之以狗王師既入成都介士屯于大逵軍令嚴肅珍貨山積市井不移無秋毫之犯李愿為夏州節度使威令簡肅甚得綏懷之術客有亡馬者投狀告愿愿以狀牓于路懸金以購之不二日所亡馬并一良馬並繋於牓下而置書一緘曰馬逸及郡不時告罪當死敢以良馬一贖罪并亡馬謹納於路愿付客亡馬而解良馬以放之境内嚴肅多如此類李抱玉為山南西道副元帥鎮鳳翔十餘年雖無破虜之功而禁暴安人頗為時所稱劉澭盧龍軍節度使怦之次子怦卒子濟代任濟表為瀛州刺史澭性輕財愛士得人之死力濟疑忌頗甚人多間之因召澭不至發兵攻之澭嬰城自守以事上聞城數月不拔濟令引滹沱水灌之城中益急會有詔許澭朝京師澭乃拔瀛州軍士及男女萬餘口歴恒魏數軍直趨京師人無離叛者澭號令嚴肅所過芻蕘無所犯其諸軍雖甚惡之卒不能阻敗李愬為唐鄧節度使平蔡州初愬父晟克復京城市不改肆而愬平淮蔡復踵其美梁牛存節為遏後都指揮使唐乾寧四年秋大舉以伐淮南至濠州東聞前軍失利於青口諸軍退至渒河無復隊伍存節尾其後與諸軍釋騎步鬭諸軍退得濟收合所部并敗兵共八千餘人至於淮浚時不食已四日矣存節訓勵部分以禦追寇得旋歸黄文靖初為太祖牙職遷諸軍指揮使唐大順中佐葛從周送朱崇節入潞㑹晉軍十餘萬附外垣寨焉文靖慮諸軍難守乃與葛從周啓闉出師文靖為殿命矢刃皆外向持重而還晉人不敢逼後唐王瓚初仕梁諸衞大將軍貞明五年代賀瓌統軍駐于河上時李存審築壘於徳勝渡秋八月瓚率汴軍五萬自黎陽渡河將掩擊魏州明宗出師拒之瓚至頓丘而旋於楊村夾河築壘架浮航自滑餽運相繼瓚嚴於軍法令行禁止李存璋為河東馬步都虞候初武皇稍寵軍士蕃部人多干擾廛市肆其侵奪法司不能禁莊宗初嗣位銳於求理存璋得行其志抑强扶弱誅其豪首朞月之間紀綱大振羣盜務耕稼姦宄息倖門當時稱其材幹李存進為沁州刺史天祐十三年從定魏州授天雄軍都部署時鄴初歸我人情離貳銀鎗效節諸軍强桀難制訛言竊議揺扇羣情存進沉厚果斷犯令者梟首於市强右豪奪暴掠人物者必磔裂暴屍於路鄴人視之無不惕息由是軍民靡然從化郭崇韜為樞密使從魏王平蜀大軍入西川城戒諸軍剽掠法令嚴峻軍士强估一錢必論之法市不改肆晉史翰為義成軍節度使性剛毅有謀畧御軍嚴整漢史𢎞肇為侍衞使嚴毅寡言部轄軍衆有過無捨兵士所至秋毫不犯部下有指揮使嘗因指使少不從命𢎞肇立撾殺之將吏股慄至平定兩京無敢干忤周安審琦為中書令鎮襄江僅餘一紀嚴明御下政不暴俗而南邦之民甚懷其惠韓令坤為侍御馬軍都指揮使顯徳三年領兵襲揚州揚州將吏聞王師至開門以迎之令坤整衆而入市不易肆人甚悅之冊府元龜卷四百十八
