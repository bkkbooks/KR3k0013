body:
  text: 册府元龜卷五百五十五宋王欽若等撰國史部採撰史氏之職舊矣自周衰失官舊章隳紊仲尼因魯史記之文考其眞偽刋而正之以勸戒蓋諸侯之國史也逮司馬遷承重世之業受成書之託繇三五已來上下數千載論次其事為一家之言班范繼踵述遵無廢信乎得良史之體為作者之雄也爾後或被詔著撰或私為記述乃有特出新意裁成義類追法春秋繫以時月皆研精極慮各自名家至若煥然垂法著為國典藏在册府是謂信史者咸不越子長之矩矱矣其有述雋賢耆舊之美詮髙逸貞烈之行第職官之儀秩捃記載之遺逸叙天官五行之占候紀輶軒木鐸之方言著為紀傳參於志錄者亦史臣之一體也咸附出焉周孔子明王道七十餘君莫能用故西觀周室論史記舊聞興於魯而次春秋上記隱下至哀之獲麟約辭文去其煩重以制義法王道備人事浹七十子之徒口受其傳指為有所譏刺褒諱挹損之文辭不可以書見也魯君子左丘明懼弟子人人異端各安其意失其眞故因孔子史記具論其語成左氏春秋述子貢撰越絶書十六卷尹喜為函關令撰髙士老君内傳三卷鬼谷先生撰老子傳一卷關令尹喜傳一卷已上竝傳記漢陸賈為大中大夫撰楚漢春秋五卷司馬遷生龍門龍門山其東則在今秦州龍門縣北其西則在今同州韓城縣北西河從其中下流耕牧河山之陽河之北山之南也年十歲則誦古文二十而南遊江淮上㑹稽探禹穴窺九疑浮沅湘北涉汶泗講業齊魯之都觀夫子遺風鄉射鄒嶧鄒縣名也嶧山也於此行鄉射之禮困阨鄱薛彭城鄱縣名也過梁楚以歸反為太史令以為漢繼五帝末流接三代絶業周道旣廢秦廢去古文焚滅詩書故明堂石室金櫃玉板圖籍散亂漢興蕭何次律令韓信申軍法張蒼為章程叔孫通定禮儀則文學彬彬稍進詩書往徃間出自曹參薦蓋公言黄老而賈誼晁錯明申韓公孫𢎞以儒顯百年之間天下遺文古事靡不畢集太史公仍父子繼纂其職曰於戲於戲嘆聲余維先人嘗掌斯事顯於唐虞至於周復典之故司馬氏世主天官至于余乎欽念哉欽敬也罔羅天下放失舊聞王迹所興原始察終見盛觀衰論考之行事略三代錄秦漢上記軒轅下至于茲著十二本紀旣科條之矣竝時異世年差不明作十表禮樂損益律歴改易兵權山川鬼神天人之際承敝通變作八書二十八宿環北辰三十輻共一轂運行無窮言衆星共繞北辰諸輻咸歸車轂若文武之臣尊輔天子也輔弼股肱之臣配焉忠信行道以奉主上作三十世家扶義俶儻不令已失時立功名於天下作七十列傳凡百三十篇五十二萬六千五百字為太史公書序略以拾遺補闕藝成一家言藝六藝也協六經異傳齊百家雜語藏之名山副在京師藏于山者備亡失也其副二本乃留京師也以竢後聖君子遷旣死後其書稍出宣帝時遷外孫平通侯楊惲祖述其書遂宣布焉又按史記司馬遷自叙云遷父談且卒執遷手而泣曰今漢興海内一統明主賢君忠臣死義之士余為太史而弗論載余甚懼焉汝其念哉談卒三歲而遷為太史令故述陶唐以來至于麟止作史記東方朔為侍郎撰十洲記一卷神異經一卷劉向為中壘校尉撰戰國策三十卷楊雄為郎給事黄門撰蜀王本記一卷後漢班彪為司徒掾才髙而好述作遂專心史籍之間武帝時司馬遷著作史記自太初以後闕而不錄後好事者頗或綴集時事然多鄙俗不足以踵繼其書好事者謂楊雄劉歆陽域衡禇少孫史孝山之徒彪乃繼採前史遺事傍貫異聞作後傳數十篇班彪卒子固歸鄉里固以彪所續前史未詳乃潜精研思欲就其業旣而有人上書顯宗告固私改作國史者有詔下郡收繫京兆獄盡取其家書先是扶風人蘇郎偽言圖䜟事下獄死固弟超恐固為郡所覈考不能自明乃馳詣闕上書得召見具言固所著述意而郡亦上其書顯宗甚奇之召詣校書郎除蘭臺令史與前睢陽令陳宗長陵令尹敏司𨽻從事孟異共成世祖本紀遷為郎典校秘書固又撰功臣平林新市公孫述事作列傳載記二十八篇奏之帝乃復使終成前所著書固謂自古書契之作而有史官其載籍博矣至孔氏纂之斷唐堯下訖秦穆唐虞以前雖遺文其語不經非經典所說故言黄帝顓頊之事未可明也及孔子因魯史記而作春秋而左丘明論輯其本是以為之傳又纂異同為國語又有世本錄黄帝以來至春秋時帝王公侯卿大夫祖世所出春秋之後七國竝爭秦兼諸侯有戰國策漢興代秦定天下有楚漢春秋故司馬遷據左氏國語采世本戰國策述楚漢春秋接其後事訖于大漢漢紹堯運以建帝業至於六世史臣乃追述功徳私作本紀編於百王之末厠於秦項之列太初以後闕而不錄故採纂前記綴輯所聞以述漢書起元髙祖終於孝平王莽之誅十有二世二百三十年綜其行事旁貫五經上下治道為春秋考紀春秋考紀謂帝紀也表志傳凡百篇固自永平中始受詔濳精積思二十餘年至建初中乃成當世甚重其書學者莫不諷誦焉又固記諸國風土人俗皆已詳備前書撰建武以後其事異於先者以為西域傳皆安帝命班勇所記云蔡邕靈帝時為議郎在東觀與盧植韓說等撰補後漢記㑹遭事流離不及得成及徙朔方居五原因上書自陳奏其所著十意曰朔方髠鉗徒臣邕稽首再拜上書皇帝陛下臣邕被受陛下尤懇異大恩初繇宰府備數典域以叔父故衛尉質時為尚書召拜郎中受詔詣東觀著作遂與群儒竝拜議郎沭浴恩澤承答聖問前後六年質奉機密趨走目下遂竟端右出相好藩還尹輦轂旬日之間登躡上列父子一門兼受恩寵不能輸冩心力以効絲髮之功一旦被章陷沒辜戮陛下天地之徳不忍刀鋸裁臣首領得就于罪父子家屬徙充邊方完全軀命喘息相隨非臣無狀所敢復望非臣罪惡所當復蒙非臣辭筆所能復陳臣初決罪洛陽詔獄生出宇戸顧念元初中故尚書郎張俊坐漏泄事當伏重刑已出榖門復聽讀鞫詔書馳救一等輸作左校俊上書謝恩以轉徙郡縣促遣徧於吏手不得頓息含辭抱悲無由上逹旣到徙所乗塞守烽職在候望憂怖焦灼無心復能操筆成章致草闕庭誠知聖朝不責臣謝但愚心有所不竟臣自在布衣嘗以為漢書十志下盡王莽而世祖以來唯有紀傳無續志者臣所事師故太傅胡廣知臣頗識其門户略以所有舊事雖未備悉粗見首尾積累思惟二十餘年不在其位非外史庻人所得擅述天誘其衷得備著作郎建言十志皆當撰錄遂與議郎張華分受之所使元順難者皆以付臣先治律歴以籌䇿為本天文為騐請太師舊注考校連年徃徃頗有差舛當須增損乃有施行為無窮法道至深微不敢獨議郎中劉洪密於用策故臣表上與洪共參思圖牒尋繹適有頭角㑹臣被罪遂放邊野臣竊自痛一為不善使史籍所闕胡廣所校二十年之思中道廢絶不得䆒竟慺慺之情猶以結心不能違望臣初欲須刑竟乃因縣道具以狀聞今年七月九日匈奴始攻郡監馳縣其時鮮卑連犯雲中五原一月之中烽火不絶不言四夷相與合謀所圖廣遠恐遂為變不知所濟郡縣咸懼不守朝旦臣所在孤危懸命鋒鏑湮滅灰燼呼吸無期誠恐所懐隨軀腐朽抱恨黃泉遂下設施謹先斃踣刪科條諸志臣所定者一所當接續者四前志所無臣欲著者三及經典群書所宜捃摭本奏詔書所當依據分别首自并書章左臣初被考妻子迸竄亡失文書無所按請加惶怖愁恐思念荒散十分不能識一所識者又恐謬誤觸冐死罪披散愚情願下東觀推求諸奏參以璽書以補綴遺闕昭國體章聞之後雖肝腦流離白骨剖破無所復恨唯陛下省察謹因臨戎長霍園封上臣頓首死罪稽首再拜以聞列傳又載邕撰集漢事未見錄以繼後史適作零紀及十意又補諸列傳四十二篇因李傕之亂湮滅多不存十意有律厯意第一禮意第二樂意第三郊祀意第四車服意第五車書意第六臣欽若曰餘四意史不載名荀悅為黄門侍郎獻帝好典籍嘗以班固漢書文繁難省乃令悅依左氏傳體以為漢紀三十篇詔尚書給筆札辭約事詳論辨多美劉艾為侍中撰漢靈獻二帝紀三卷蔡質為衛尉撰典職式侯瑾公車徴不至案漢書紀撰中興以後行事為皇徳傳三十篇行於世劉珍為謁者安帝永平元年詔珍與校書劉騊駼作建武已來名臣傳遷侍中越騎校尉李尤為諫議大夫受詔與謁者僕射劉珍等俱撰漢記應奉官至司𨽻校尉著漢書後述多所述載袁崧書曰事天刪史記漢書及漢記三百六十餘年自漢後至其時凡七十卷名曰漢書述趙畢㑹稽人舉有道不就著呉越春秋十卷趙岐為太常著呉越春秋郭憲為光禄勲撰漢武洞冥記一卷楊孚為議郎撰交州異物志一卷魏張璠撰後漢紀雖似未成辭藻可觀孫該字公逹彊志好學著魏書王粲為侍中撰漢末英雄記八卷魚蒙為郎中撰典略十九卷袁曄撰獻帝春秋一卷隂澹為左將軍撰魏紀十二卷毛范撰吕布本事一卷孫舒元撰漢魏春秋九卷蜀譙周入魏封陽城亭侯撰三巴記一卷呉謝承字偉平權謝夫人弟為武陵太守撰後漢書百餘卷㑹稽先賢傳伍卷韋曜為黃門侍郎孫亮即位諸葛恪輔政表曜為太史令撰呉書華覈薛瑩等皆與同後為侍中領左國史孫皓忿怒收付獄曜因獄吏上辭曰囚昔見世間有古歴注其所紀載既多虗無在書籍者亦復錯謬囚尋按傳記考合異同采耳目所及以作洞紀起自庖犧至于秦漢凡為三卷當起黃武以來别作卷事尚未成又見劉熈所作釋名信多佳者然物類衆多雖得詳䆒故特有得失而爵位之事又有非是愚以官爵今之急不宜乖誤因自志至微又作官職訓又辨釋名各一卷欲上之繕冩始畢㑹以無狀幽囚待命泯没之日恨不上聞謹以先死列狀乞上言秘府於外科取呈内以聞追懼淺蔽不合天聽抱怖省息乞垂哀省曜冀以此求免而皓更怪其書之紕謬竟身死於囹圄周昭字恭逺與韋曜薛瑩華覈竝述呉書萬震為丹陽太守撰荆州異物志一卷陸凱為左丞相撰雜傳十九卷胡冲撰呉朝人士品秩狀八卷呉歴六卷虞禹撰呉士人行狀名品三卷呉人撰曹瞞傳一卷晉華嶠遷尚書以博聞多識屬書典實有良史之志轉秘書監加散騎常侍班同中書寺為内臺中書散騎著作及治禮音律天文數術南省文章門下撰集皆典統之初嶠以漢紀煩穢慨然有改作之意㑹為臺郎典官制事繇是得徧觀秘籍遂就其緒起于光武終孝獻一百九十五年為帝紀十二卷皇后紀二卷十典十卷傳七十卷譜及三序傳目錄凡九十七卷嶠以皇后配天作合前史作外戚傳以繼末編非其義也故易為皇后紀以次帝紀又改志為典以有堯典故也而改名後漢書奏之詔朝臣㑹議時中書監荀朂令和嶠太常張華侍中王濟咸以嶠文質事核有遷固之規實錄之風藏之秘府後太尉汝南王亮司空衛瓘為東宫傅列上通講事獲施行又撰紫陽眞人周君傳一卷張華撰列異傳三卷束晳為佐著作郎撰晉書帝紀十志并所著三魏人士傳七代通記竝行於世皇甫謐累徴不起撰帝王世紀年厯髙士逸士列女等傳𤣥晏春秋竝重於世又撰韋氏傳三卷王接為臨汾公相國撰列女後傳七十二人周處為御史中丞撰集吳書袁崧為呉郡太守博學有文章著後漢書百篇祖台之字元辰為侍中光祿大夫撰志怪書行於世陳術字申伯著益部耆舊傳及志楊方為髙梁太守撰呉越春秋司馬彪泰始中為秘書郎轉丞作九州春秋以為先王立史官以書時事載善惡以為沮勸最敎世之要也是以春秋不修則仲尼理之關雎既亂則師摰修之前哲豈好煩哉蓋不得已故也漢氏中興訖于建安忠臣義士亦以昭著而時無良史記述煩雜譙周雖已刪除然猶未盡安順以下亡缺者多彪乃討論衆書綴其所聞起于世祖終于孝獻編年二百錄世十二通綜上下旁貫庻事為紀志傳凡八十篇號曰續漢書陳壽為御史治書撰蜀相諸葛亮集奏之除著作郎撰魏吳蜀三國志凡六十五篇時人稱其善叙事有良史之才夏侯湛時著魏書見壽所作便壞已書而罷張華深善之謂壽曰當以晉書相付耳其為時所重如此元康七年卒梁州大中正尚書郎范頵等上表曰昔漢武帝詔曰司馬相如病甚可遣悉取其書使者得其遺書言封禪事天子異焉臣等按故治書侍御史陳壽作三國志辭多勸誡明乎得失有益風化雖文豔不及相如而質直過之願垂採錄於是詔下河南尹雒陽令就家冩其書壽又撰古國志五十篇益部耆舊傳十篇又壽國志云從荆揚來者得陸凱所諌孫皓二十事博問呉人多云不聞凱有此表又按其文殊甚切直恐非皓之所能容忍也或以為凱藏之篋笥未敢宣行病困皓遣重朝省問欲言因以付之虗實難明故不著于篇然愛其指擿皓事足為後戒故鈔列于凱傳左云虞溥為鄱陽内史撰江表傳卒于洛子渤過江上江表傳於元帝詔藏于秘書虞預為散騎常侍領著作著晉書七十餘卷㑹稽日錄二十篇諸虞傳十二篇皆行於世王隱字處叔世寒素父銓歴陽令少好學有著述之志每私錄晉事及功臣行狀未就而卒隱以儒素自守不交勢援博學多聞受父遺業西都舊事多所諳䆒建興中過江丞相軍諮祭酒涿郡祖納雅相知重納好博奕每諫止之納曰聊用忘憂耳隱曰蓋古人遭時則以功逹其道不遇則以言逹其才故否㤗不窮也當今晉未有書天下大亂舊事蕩滅非凡才所能立君少長王都游宦四方華夷成敗皆在耳目何不述而裁之應仲遠作風俗通崔子眞作政論蔡伯喈作勸學篇史游作急就章猶行於世便為没而不朽當其同時人豈少哉而了無聞皆繇無所述作也故君子疾没世而無聞易稱自强不息况國史明乎得失之跡何必博奕而後忘憂哉納喟然歎曰非不悅子之道力不足也乃上疏薦隱元帝以草創務殷未遑史官遂寢不報大興初典章稍備乃召隱及郭璞俱為著作郎令撰晉史著作郎虞預私撰晉書而生長東南不知中朝事數訪於隱并所著書竊冩之所聞漸廣是後更疾隱形於言色預既豪族交結權貴共為朋黨以斥隱竟以謗免黜于家貧無資用書不成乃依征西將軍庾亮於武昌亮供其紙筆書乃得成詣闕上之隱雖好著述而文辭鄙拙蕪舛不倫其書次第可觀者皆人所撰文體混漫義不可解者隱之作也孫盛為秘書監給事中著魏氏春秋晉陽秋詞直而理正咸稱良史焉既而桓温見之怒謂盛子曰枋頭誠為失利何至乃如尊君所說若此史遂行自是關君門戸事其子遽拜謝因請刪改之時盛年老還家性方嚴有軌憲雖子孫斑白而庭訓愈峻至此諸子乃共號泣稽顙請為百口切計盛大怒諸子遂爾改之盛冩兩定本寄於慕容雋太元中孝武帝博求異聞始於遼東得之以相考校多有不同書遂兩存焉干寳為著作郎始領國史累遷散騎常侍著晉紀自宣帝起至愍帝五十三年凡二十卷奏之其書簡畧直而能婉咸稱良史性好隂陽術數留思京房夏侯勝等寳父先有所寵侍婢母甚妬忌及父亡母乃生推婢於墓中寳兄弟年小不之審也後十餘年母䘮開墓而婢伏棺如生載還經日乃蘇言其父常取飲食與之恩情如生在家中吉凶輒語之考校悉驗地中亦不覺為惡既而嫁之生子又寳兄嘗病氣絶積日不冷後遂寤云見天地間鬼神事如夢覺不自知死寳以此遂撰集古今神祗靈異人物變化名為捜神記凡三十卷以示劉惔惔曰卿可謂鬼之董狐寳既博採異同遂混虛實因作序以陳其志曰雖考先志於載籍収遺逸於當時盖非一耳一目之所親聞覩也亦安敢謂無失實者哉衛朔失國二傳互其所聞吕望事周子長存其兩說若此類徃徃有焉從此觀之聞見之難一繇來尚矣夫書赴告之定辭據國史之方䇿猶尚若茲况仰述千載之前記殊俗之表綴片言於殘缺訪行事於故老將使事不二迹言無異塗然後為信者固亦前史之所病然而國家不廢注記之官學士不絶誦覽之業豈不以其所失者小所存者大乎今之所集設有承於前載者則非余之罪也若使采訪近世之事茍有虗錯願與先賢前儒分其譏謗及其著述亦足以明神道之不誣也群言百家不可勝覽耳目所受不可勝載今粗取足以演八畧之旨成其微說而已幸將來好事之士錄其根體有以游心寓目而無尤焉謝沉除尚書度支郎何充庾氷竝稱沉有史才選為著作郎撰晉書三十餘卷後漢書百卷及漢書外傳習鑿齒為桓温荆州别駕出為榮陽太守是時温覬覦非望鑿齒在郡著漢晉春秋以裁正之始起漢光武終晉愍帝於三國之時蜀以宗室為正魏武雖受漢禪晉尚為簒逆至文帝平蜀乃為漢亡而晉始興焉引世祖諱炎興而為禪授明天心不可以勢力彊也凡五十四卷又撰襄陽耆舊傳五卷韋謏集為石季龍太子太傅記世事數十萬言袁宏為吏部郎遷東陽太守撰後漢紀三十卷及竹林名士傳三卷薛榮為散騎常侍撰漢記六十五卷張瑩為江州從事撰後漢南紀四十五卷王沈為司空撰魏書四十八卷環濟為太學博士撰呉紀九卷張勃撰吳錄三卷朱鳳為中書郎撰晉書十卷已元帝庾銑撰東晉書七卷嵇康為中散大夫撰髙士傳三卷陸機為平原内史撰晉紀四卷晉惠帝百官名三卷樂資為著作郎撰春秋後傳三十卷山陽公載言十卷荀綽為下邳太守撰晉後略記五卷王羲之為右將軍㑹稽内史撰許先生傳一卷王慶為北中郎將撰二石傳二卷二石偽治時事二卷杜預為鎭南大將軍撰女記十卷喩歸為侍御史撰西河記記張軌事孔預為㑹稽内史撰晉咸和咸康故事四卷一云名喩盧綝為廷尉撰晉四王起事四卷八王故事十二卷范瑗撰交州先賢傳三卷潘岳為給事黃門郎撰關中記一卷葛洪選為散騎常侍領大著作固辭不就撰神仙傳十卷西京雜記一卷蕭廣濟為輔國將軍撰孝子傳五卷戴祚為西戎太守撰甄異傳三卷西征記一卷王愆期為散騎常侍撰救襄陽上都督府事一卷孔衍為廣陵太守撰魏尚書八卷春秋時國語十卷春秋後國語十卷漢尚書十卷漢春秋十卷後漢尚書二卷後漢春秋九卷後魏尚書十四卷後魏春秋九卷國志歷五卷賀循為太常撰㑹稽記一卷鄧粲為荆州别駕以父騫有忠信言而世無知者乃著晉元明紀十篇顧夷撰呉郡記五卷張氏撰晉書鴻烈六卷左明楷為石勒記室與程機撰上黨國記石㤗為石勒參軍與石同石謙孔隆撰大單于志和苞撰漢趙記十卷田融撰趙石記二十卷周融撰趙義一卷一曰石集記云石勒事范亨撰燕書二十卷張詮撰南燕錄五卷記慕容徳事游覽先生撰南燕書七卷張諮撰凉記八卷記張軌事王景暉撰南燕錄六卷蓋泓撰珠崖傳一卷王子年撰拾遺錄二卷隱士無官何伸燕撰秦書八卷記符健等事劉景撰燉煌實錄十卷凉書十卷記張軌事叚龜龍為著作郎撰西河記二卷凉記十卷記名光事宋徐廣為員外散騎常侍領著作尚書奏左史述言右官書事乘志顯於晉鄭春秋著乎魯史自聖代有造中興記者道風帝典煥乎史策而太和以降世歴三朝𤣥風聖迹儵為疇古臣等參詳宐勑著作郎徐廣撰成國史於是勑廣撰集焉累遷正員常侍大司農仍領著作如故十二年勒成晉紀凡四十六卷表上之因乞解史任不許又撰孝子傳三卷荀伯子少好學博覽經傳為員外散騎侍郎著作郎徐廣重其才學舉伯子及王韶之竝為佐郎助撰晉史乃著桓元等傳又撰薛常侍傳二卷王儉為秘書丞元徽初儉表上所撰七志三十卷王韶之好史籍博渉多聞父偉之少有志㤗元隆安時事小大悉撰錄之韶之因此私撰晉安帝陽秋既成時人謂宜居史職即除著作佐郎使續後事記義熈九年善叙事辭論可觀為後代佳史又撰孝子傳十卷續咸著遠遊志異物志皆十卷行於世范曄左遷宣城太守不得志乃刪衆家後漢書為一家之作曄所撰十志一皆託謝儼捜撰垂畢遇曄敗悉蠟以覆車宋文帝令丹陽尹徐湛之就儼尋求已不復得一代以為恨其志今闕謝靈運為秘書監太祖以晉氏一代自始至終竟無一家之史令靈運撰晉書粗立條流書竟不就裴景仁為殿中員外將軍時沈曇慶為徐州刺史景仁助戍彭城本傖人多悉戎荒事曇慶使撰秦記十卷叙苻氏僭偽本末其書傳於世劉謙之好學撰晉紀二十卷袁炳字叔明有文學為袁粲所知著晉書未成卒何法盛為湘東太守初郗紹作晉中興書數以示法盛法盛有意圖之謂紹曰卿名位貴逹不復俟此延譽我寒士無聞於時如袁宏干寳之徒頼有著述流聲於後宜以為惠紹不與至書成在齋内厨子法盛詣紹紹不在直入竊書紹還失之無復兼本於是遂行何書徐爰為中散大夫撰宋書六十五卷臨川王義慶撰續漢書五十八卷宣驗記十三卷幽明錄二十卷江右名士傳一卷檀道鸞為永嘉太守撰續晉陽秋二十卷郭季彥為新興太守撰續晉紀五卷何承天為廷尉撰春秋前傳十卷春秋前雜傳九卷叚國為新亭侯撰吐谷渾記二卷劉通㑹為北徐州主簿撰先朝故事二十卷郭緣生為天門太守撰武昌先賢志二卷述征記二卷鄭緝之為員外郎撰孝子傳五卷東陽記一卷范晏撰陰徳傳二卷袁生壽撰古異傳三卷劉敬叔為給事撰異苑十卷陶濳為彭澤令撰捜神後記十卷東陽無疑為散騎常侍為齊諧記七卷劉損為太常卿撰京口記二卷盛宏之為臨川王侍郎撰荆州記三卷袁淑為太子左率撰眞隱二卷雷次宗以散騎侍郎徴詣宋邑撰豫章記一卷南齊臧榮緒為徐州主簿純篤好學括東西晉為一書記錄志傳一百一十卷又撰續洞記四卷陸澄為光祿大夫給事中撰雜傳檀超為司徒右長史建元二年初置史官以超與驃騎記室江淹掌史職上表立條例開元紀號不取宋年封爵各詳本傳無假年表立十志律歴禮樂天文五行郊祀刑法藝文依班固朝㑹輿服依蔡邕馬彪州郡依徐爰百官依范曄合州郡班固五星載天文日蝕載五行改日蝕入天文志以建元為始帝女自皇宋立傳以備甥舅之重又立處士列女傳詔内外詳議左僕射王儉議金粟之重八政所先食貨通則國富民實宜加編錄以崇務本朝㑹志前史不書蔡邕稱先師胡廣說漢舊儀此乃伯喈一家之意曲碎小儀無煩錄宜立食貨省朝㑹洪範九疇一曰五行五行之本先乎水水之精是為月月五行之宗也今宜憲章前軌無所改革又立帝女傳亦非淺識所安若有髙徳異行自當載在列女若止於常美則仍舊不書詔曰月災𨽻天文餘如條議超史功未就卒官江淹撰成之猶不備也時豫章熊襄著齊典上超十代其序云尚書堯典謂之虞書則附所述故通為齊名為河洛金匱者王智深遷太學博士豫章王大司馬叅軍兼記室世祖勑智深撰宋紀召見芙蓉堂賜衣服給宅智深告貧於豫章王王曰須卿書成當相詶以祿書成三十卷世祖後召見智深於濬明殿令拜表奏上劉渉撰齊紀十卷孔稚珪為散騎常侍卒贈金紫光祿大夫撰陸先生傳一卷祖冲之為長水校尉撰述異記十卷王巾撰法師傳十卷梁沈約為尚書令以晉氏一代竟無全書年二十許便有撰述之意太始初征西將軍蔡興宗為啓明帝有勑賜許二十餘年所撰之書凡一百三十卷條流雖舉而採綴未周永明初遇亂失第五卷齊建元四年被勑撰國史永明二年又領著作撰次起居注五年春又被勑撰宋書百卷齊紀高祖記十一卷任昉為新安太守著雜傳二百四十七卷江淹為金紫光祿大夫撰齊史十志行於世李􅈾為益州從事著益州記三卷行於世裴子野為鴻臚卿初曽祖松之宋元嘉中受詔續修何承天宋史未及成而卒子野嘗欲繼成先業及齊永明末沈約所撰宋書既行子野更刪撰為宋畧二十卷其叙事評論多善約見而歎曰吾弗逮也蘭陵蕭琛北地傅昭汝南周捨咸稱重之子野又撰衆僧傳二十卷一云撰名僧錄二十卷又欲撰齊梁春秋始草創未就而卒顧協為荆州記室撰晉仙傳五篇𤨏語十卷陸昭學渉有思理歷中書侍郎尚書左丞撰晉書未就又著陸史十五卷陸氏驪泉志一卷竝行於世王僧孺為南康王諮議參軍撰東宫新記蕭子顯為呉興太守好學屬文採衆家後漢考正同異為一家之書又啓撰齊史書成表奏之詔付秘閣所著後漢書一百卷齊書六十卷普通北伐記五卷貴儉傳三卷蕭子雲為侍中㓜有文彩既長勤學以晉代竟無全書弱冠便留心撰著至年二十六書成表奏之詔付秘閣及為太子舎人撰東宫新記奏之勑賜束帛著晉書一百一十卷東宫新記二十卷呉均為奉朝請著齊春秋三十卷呉郡錢塘先賢傳五卷續齊諧記一卷鍾岏字長邱官至建康令著良史傳十卷劉沓累官至尚書左丞自少至長多所著述撰髙士傳二卷東宮新舊記四十卷竝行於世庾詵詔徴中書侍郎不起撰帝歴二十卷邱仲孚為左丞撰皇典二十卷南宫故事百卷江奮為光祿大夫好學尤悉朝儀故事撰江左遺典三十卷未就卒劉之遴為南郡太守撰神錄五卷劉昭為中軍臨川王記室撰㓜童傳十卷臧儼為鎮南諮議撰棲鳳春秋五卷陶𢎞景為諸王侍讀後辭祿自號華陽隱居撰帝代年厯五卷周氏冥通記一卷草法師傳一卷梁暠撰梁武帝大捨三卷鄭忠撰晉書七卷謝呉為中書郎撰梁書四十九卷梁皇帝錄五卷王琰為呉令撰春秋二十卷冥祥記十卷蕭韶為長沙王撰梁太清紀十卷蕭世怡一云大圜封樂浪王仕隋位内史侍郎撰淮海亂離志四卷叙梁末侯景之亂謝綽為少府卿撰宋拾遺十卷王逸撰齊典五卷周興嗣為散騎員外侍郎給事中撰梁皇帝實錄三卷并皇徳紀記武帝故事又云謝旻撰五卷劉仲撰梁帝聖中興畧十卷後梁安成王欣博學善屬文著梁史百卷遭亂失其本陸雲公為黃門郎兼掌著作奏武帝勑撰嘉瑞記瓊述其旨而續焉自永定訖于至徳勒成一家之言陳顧野王為光祿卿撰續洞冥記一卷國史傳三百卷何之元為始興王叔陵諮議參軍及叔陵之誅元乃屏絶人事銳精著述以為梁氏肇自武皇終于敬帝其興亡之運盛衰之跡足以垂鑒戒定褒貶䆒其始終起齊永元元年逮于王琳遇獲七十五年行事草創為三十卷號曰梁典其序曰記之與史其流不一編年之作無若春秋則魯史之書非帝皇之籍也三皇之簡為三墳五帝之策為五典此典義所繇生也至乃尚書述唐帝為堯典虞帝為舜典斯又經文明據是以典之為義乆矣哉若夫馬史班漢述帝稱紀自茲厥後因相祖習及陳壽所撰名之曰志總其三國分路揚鑣唯何法盛晉書變帝紀為帝典既云師古在理為優故今之所作稱為梁典梁有天下自大同以前區㝢寧晏太清已後寇盜交侵首尾而言未為盡美故開此一書分為六意以髙祖創基因乎齊末尋宗討本起自永元今以前若干卷為追述髙祖生自布衣長於弊俗知風敎之臧否識民黎之情偽爰逮君臨𢎞斯政術四紀之内寔云殷阜今以若干卷為太平世不常夷時無常治非自我後仍屬横流今以若干卷為叙亂洎髙祖晏駕之年太宗幽辱之歳謳歌獄訟唯向西陜而不向東都不庭之民流逸之士征伐禮樂歸世祖而不歸太宗撥亂反正厥庸斯在治定功成其勳有屬今以若干卷為世祖至於四海困窮五德舛替則敬皇紹立仍以禪陳今以若干卷為敬帝驃騎王琳崇立後嗣雖不逹天命是其忠節今以若干卷為後嗣主至在太宗雖加美謚而大寳之號世所不遵蓋以扼於賊景故也承聖紀厯自接太清神筆詔書非宜輒改詳之後論茲有理焉夫事有始終人有業行本末之間頗宜叙述案臧榮緒稱史無裁斷猶起居注繇此而言實資詳悉又編年而舉其歲次者蓋取分明而易尋也若夫獫狁孔熾鯁我中原始自一君終為二主事有相渉言成混漫今以未分之前為北魏旣分之後高氏所輔為東魏宇文所挾為西魏所以相分别也重以蓋彰殊體繁省異文其關損益頗有凡例許亨為衛尉卿撰齊書并志五十卷遇亂之後撰梁史成者五十八卷陸從典入隋為給事郎兼東宫學士又除著作佐郎右僕射楊素奏從典續司馬遷史記迄于隋其書未就值隋末䘮亂姚察入隋授秘書丞别勑成陳梁二代史所撰雖未畢功文帝開皇之時遣中書舎人虞世基索本具進今在内殿梁陳二史多是察之所撰其中序論及紀傳有所闕者臨亡之時仍以體例誡㓜子思廉博訪撰續思亷流涕奏行思廉初補漢王府行參軍掌記室尋除河間郡司法大業初中書侍郎虞世基奏思亷踵梁陳二代史自是以來稍就補續又撰傳國志十卷許懋為著作郎著述行記四卷撰齊記二十卷趙齊旦為中郎將撰陳王業厯一卷冊府元龜卷五百五十五
