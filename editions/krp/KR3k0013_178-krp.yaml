body:
  text: 册府元龜卷一百七十八宋王欽若等撰帝王部姑息第三唐宣宗大中四年幽州戎帥周臣欽若等曰史失名寢疾表乞都知兵馬使張伸為留後朝廷可其奏加右散騎常侍其年冬詔賜旌節遷檢校工部尚書僖宗廣明元年以巢賊陷闕帝巡狩於褒斜四川節度使陳敬瑄迎扈至蜀行闕之事一以委焉以功加開府儀同三司檢校太尉同中書門下平章事封潁川郡王及駕囘賜鐵券捨其十死中和四年正月制授鹿晏洪山南西道興元節度管内觀察處置使興元尹晏洪本許州郡校中和初從中武軍監護楊復光討賊京師賊平復光卒軍無所綂乃以本軍并徐宋之兵西入射胡闗陷襄鄧及下金州洋州路直抵興元初則云西赴行在及所厯封壌悉皆屠之軍士驕猾晏洪不得制因進逼興元其帥牛朂不能拒奔赴成都朝廷以京邑初平議其姑息詔授留後至是加節制焉光啟元年三月以徐州節度使時溥為鉅鹿郡王制曰天用日月司之以晦明帝賴股肱寄之以休戚念其功則報無所恡厚其賞則誡在可危爾勿狥於驕盈吾靡勞於姑息也時溥為時傑出臨難慨然用禮樂為身基知徳刑為戰器文惟附衆武足取威萬旅無譁一方底定朕以彭門人兼滄楚地控淮河因命專征果聞善訓公忠所化氣俗自平極將相之崇髙作藩宣之軌則噫成功未易持禄尤難倚伏相循安危是繫朕嘗覽祖宗之紀每欽兼濟之圖尚父汾陽王太尉武穆王皆道合中興勲髙徃烈然子儀以恢𢎞體國保富貴於永年而光弼雖剛正奉公積猜嫌於晩節盖坦懐未至則全美或虧言念大臣足為前鑒惟爾竭誠保奉著節始終疇咨雖顯於上台制爵宜加於異姓彼邦遺事故老當傳勿勞銘鼎之恭用永紳河之誓服兹休寵慎乃令圖庶俾君臣永於竹帛昭宗大順元年制以徳州刺史權知滄州兵馬留後盧彦威檢校尚書右僕射兼滄州御史大夫充義昌軍節度滄徳觀察處置等使彦威光啟末逐其帥楊全玖求旄節朝廷以扈蹕都將曹誠為滄徳節度誠雖不至任而彦威之請不行至是王鎔羅𢎞信因張璿用兵為彦威論請故有斯授二年三月制以青州留後王師範加檢校兵部尚書平盧軍節度使是嵗鎮州王鎔曽有表薦曰臣聞推亡固存古有明義興滅繼絶書著前文盖聖王𢎞延賞之恩哲后開勸能之道故呉君録舊育凌統之孤兒漢帝追功舉張良之愛子臣伏見故淄青節度使檢校司空同中書門下平章事王敬武將星發彩金匱傳符推心皆務於政經戮力每勤於王室自艱難變運鑾輅省方海嶽一隅不驚刁斗關畿數路嘗走梯航加以淪落衣冠流亡民庶皆能賑䘏盡致昭蘇可謂輔國藎臣佐時良牧而不幸秋蘭敗葉朝露晞光俄成就木之悲不盡登壇之寄其男檢校工部尚書權知留後事師範親為嫡長才實瑰竒早綰父兵夙知軍志張飛之敵每說無前魏萬之名咸言必大頃以元戎物故外府事殷體人情懐騷動之虞俟朝奏有關河之隔以是連營義旅比屋蒸黎追欒社以増哀思召棠而瀝懇爰從苫塊抑主兵戎分少拊寒盡同赤子望雲就日頗罄丹誠今則戈㦸罷尋光隂已變險夷一致首尾二年雄稜真是其將門造次不渝於臣節雖皇華紫誥慰安相繼於道途而舊斾油幢承寵未聞其擬議將何以寛諸衆望塞彼羣情光成季之髙勲表臧孫之後嗣伏望皇帝陛下信敷九有仁覆萬方當惟新革故之時思就俗理人之道克全修偃早委節旄俾其户户披雲皆瞻白日人人棄管盡觀青天覃四時不宰之功救五郡倒懸之苦則豈獨自夷及夏咸知嫗煦之恩誠亦在存與亡俱荷生成之施初師範父敬武本青州無棣人少為牙將㑹安師儒乾符中為帥遣平賊有功尤寵之及巢冦犯長安逐師儒自為留後時朝廷多故因授正命累加至檢校司空平章事去年敬武卒三軍以師範為留後表請旌節朝廷不允制以前陳許節度使崔安濳為帥棣州刺史張蟾迎之師範遣將盧𢎞攻蟾𢎞復叛回軍以攻青州師範雖年小多智數乃遣人重賂迎𢎞請避賢路乞守先人墳墓全首領而已𢎞然之既入師範伏壯士搤而殺焉安濳乃歸闕如此二年朝廷未降節鉞至是以恒山表薦為名乃加是命景福二年正月鳳翔李茂貞奏以興元知軍府事李維密率本軍越授梓州從之初梓州顧彦暉兄彦朗以大順初卒三軍以彦暉為留後茂貞表薦遂加正命及降旄節為興元楊守亮所滯後茂貞敗守亮收復興元曾有表請再降東川制命詞曰臣聞鏤鼎書旂必歸於勲徳分茅建秩允屬於賢良明朝無濫賞之文聖代絶且侯之論其有功標峴首業著燕然殊恩尋降於虎符睿渥已頒於龍節旋遇蛇蟠劒棧棘植銅梁遮日月之迴光阻山河而倒浪今則初開九折漸涸長鯨宜宣既徃之恩合舉已行之命臣熟稽通論方敢上聞倘無棄於瞽言庶有禆於𤣥鑒臣伏見東川節度使顧彦暉門傳將畧代襲軍功佩董卓之雙鞬撚由基之一鏃南金鍊質經大冶而彌堅東箭推心遇繁霜而轉勁伏自頃嵗蚊雷聚響螗斧稱威風搖而海嶽將傾火烘而薫蘭不辨顧彦暉與亡兄彦朗提戈鴈塞奮臂龍沙同驅韅靷之師入奉紀綱之僕青黄杵下辛勤果建於勲庸赤白囊中動靜罔違於禁制伏以先皇帝鸞旌反正鳳輦初安爰置酒以論功遂圖儀而表徳顧彦暉亡兄彦朗由是榮頒劒履顯誓山河飾金之象猶新垂露之文未滅豈謂憂時積疹奉國勞神三秋而大樹忽凋半夜而將星濳殞是致人皆罷市里為輟舂淚碑雖没於蒿萊畫象但喧於簫鼓顧彦暉以三軍擁路百姓排闗感羊祜之遺心請馮君之繼踵伏自暫持紀律權總貔貅謝𤣥用才雖履屐而有任句踐撫士從觴豆而皆均伏䝉皇帝陛下俯念羣情仍憐異政降旌幢而示寵宣雨露以酧功風行而天下皆聞日照而人間竝見不謂綿州刺史楊守亮鴟張要路蟻聚通津擅抑芝泥强㽞瑞節召兵戈於武定阻琛賮於褒梁大肆䖍劉將營統制臣與邠州節度使王行瑜同興義旅共伐奸謀一揮而梟鵩離巢再戰而猿猱失木既通劒路尋達刀州顧彦暉屢捧詔書曽頒旌鉞非是剪桐之戲已承裂地之封濡涵而難滯舊恩錫賚而願加新節猶希進秩用表優賢臣謬竊臨戎嘗思舉善敢覷先茅之賞庶遵連茹之文時朝廷遂命使再降旌節皆茂貞保薦之力也是月彦暉與西川王建爭田疆理相失遂戰鬬不絶既乞援茂貞乃以兵赴焉三月制以捧日都頭陳珮為廣州刺史嶺南東道節度使扈蹕都頭曹誠為黔州刺史黔中節度使耀徳都頭李鋋為潤州刺史鎮海軍節度使宣武都頭孫惟晟為江陵尹荆南節度使竝加特進同平章事各令赴鎮竝落軍權時朝議以李茂貞傲侮王命武臣難制欲用杜譲能及親王典禁兵故罷五將之權兼以平章事悦其心六月制以鳳翔隴州節度使檢校太尉中書令鳳翔尹上柱國岐王食邑四千五百户李茂貞為興元尹山南西道節度使十月詔雷州司户參軍杜譲能賜自盡於臨臯驛初譲能為太尉與李茂貞不協景徳初楊守亮為茂貞所敗以朝廷欲割果閬州姑息之茂貞怒陳言譲能曰宰弼外鎮四夷内安百姓隂陽不順猶資燮理之功宇宙將傾尚假扶持之力即萬靈舒慘四海安危盡係朝綱咸繇廟算既為重任方屬元臣况國步多艱皇居未壯曩日九衢三市草擁荒丘當時萬户千門霜凝白骨大厦傾欹而未已沉疴綿息以無餘皆曰非賢臣無以拯社稷之危非真宰無以革寰區之弊令公捨築入夢投竿為師踐履中台制臨外閫不究興亡之理罕聞決斷之機蓋意有所不平心有所未悟輒思上問願審臧謀竊見楊守亮擅舉干戈阻難西道將圖割據吞併東川據巴賨為萬窟恣豺狼於梁漢致十年荆棘果聞敗衂尋挫兇狂既前去而不諧思却歸而無地當道與邠州見為阻隔綱運方舉問罪師徒忽朝廷授武定之雙旌割果閬之兩郡未審是何名目酬何功勞紊大國之紀綱蠧天子之州縣非惟取笑於童稚抑且包羞於馬牛儻謂竒謀信為獨見伏慮明公賞逆黨無君之子憤忠臣奉國之心要助奸邪須摧正直又聞公切於保位利在安家商量不自於中書剸割全通於内地雖知淵奥罕測津涯亦聞駭異羣情頗是諠騰衆口未敢便陳章表明述是非伏冀明知特加宻示用袪疑惑稍決指歸時譲能抗答之茂貞繇是轉怒焉後以茂貞䟦扈既深帝謂譲能曰春秋之義將而必誅安有甸服之間顯違朝㫖而悖慢如此我若不討四方其謂我何譲能奏曰艱難已來行貞元故事姑息戎臣乆矣根牢蔓織附之者衆一旦難驟革之京師去岐咫尺人心易以危懼設有陵犯損威愈甚願陛下稍解雷霆之怒而熟計之昔漢文以呉濞不朝賜之几杖正為此也帝曰政刑弛紊詔令不出都門斯乃賈生慟哭之秋也書不云乎藥不瞑眩厥疾不瘳朕不欲孱孱守活坐取凌削因除宰臣徐彦若鎮鳳翔以茂貞為興元尹以嗣潭王率禁軍送彦若或茂貞遷延不受代即攻之軍旅所決一委譲能譲能因上言曰陛下憤藩臣倔强必欲彊幹弱枝以隆王室則請宣召中外大臣與臣同心戮力以成陛下之志不宜獨任微臣也帝曰卿位居元輔與朕均休共戚勿以此為辭爾譲能曰臣待罪台司所未乞骸者思有以報陛下也安敢愛身以避事况陛下之志憲宗之志也但時有所不便埶有所必然他日臣雖受晁錯之辜不足以弭七國之患敢不奉詔繼之以死及禁兵將出憸人奸黨咸聲言此一舉也非朝廷之謀譲能報私怨也王師既敗茂貞向闕帝御樓斬軍容使西門重遂斬樞密使李周童以徇茂貞茂貞進兵臨臯驛抗表曰無辜加罪杜譲能之始謀也非中使之罪請殺譲能譲能奏曰臣固預言之矣今獨有歸罪於臣可紓國難帝不得已貶雷州司户叅軍仍詔送茂貞軍前茂貞具禮出迎至驛復表請行朝典如此徃來者竟遣中使害譲能於驛内十二月制以鳳翔節度使李茂貞守中書令進封秦王兼興元尹山南西道節度使王行瑜賜號尚父賜鐵券乾寧三年鳳翔李茂貞逼京師諸王率禁兵奉車駕將幸太原次渭北華州韓建遣子充奉表請蹕駐華州乃詔曰鎮國軍節度使韓建忠貫雪霜義堅金石十陳章表備竭憂國之誠一詣行宫愈驗愛君之志况華州城壘牢固糧儲贍豐兵士又免逺行車輿且絶他慮時詔下之後信宿而至華以華之公署為行宫八月又付韓建詔曰卿武抱七徳瑞應四靈挺生徳門佐我丕祚綵衣就養深知百行之原布被奉家不以三公之貴朕聞卿髙節奬卿崇勲遷幸已來社稷是託卿宜每闗朝政莫惜揣摩既位列大臣亦不為越分至於道路警候晨夜隄防皆佇良籌用致髙枕無令奔軼以慰焦勞諸道節度使知卿至忠服卿威望卿宜各移書檄告以安危使有兵者陳勤王赴難之謀豐財者展急病上供之効合成忠孝同濟艱難啓我中興允屬上將山河為誓不在他人初帝在富平以人情阻撓召建議之建即至跣露首罪言發涕流帝亦為之色動竟未知其心也及入華公卿近侍皆與建膠固不敢專行制令故下詔使建揣摩時政得失及告諭藩鎮時建乃上言云昔先皇帝幸蜀都之日陳敬瑄守鎮錦城過恃寵私多所叅預所以逺方觀聽物論諠然臣豈敢遵彼覆車同其濫吹至於隄防道路拱衛乗輿夙夜在心是臣之職四年三月丙子制以韓建資忠靖國功臣封昌黎郡王五月乙亥以建八表譲昌黎郡王詔曰卿始以勤儉鎮闗輔為列嶽凖繩近以忠赤扈和鑾立大朝綱紀誠款備盡豐省中規下有慰於孝思上無累於供億創行廟之功也羣后在廷盛典咸舉復累朝之廢墜崇萬代之本根建儲宫之効也而又請散兵甲大斥奸邪忠言屢聞成績可數以身許國其心動天雖仲尼興微管之言漢祖有必勃之謂方用經濟殊曰寂寥永言茂恩詎非異數但念成人之美君子所先執徳不囘格言斯尚是用寢美號重封之澤就謙光崇譲之規足以警勵貪夫教化疲俗已議依允尤切歎嘉九月癸酉詔以太子太師盧知猷撰韓建徳政碑文前户部侍郎司空圖為頌建累表堅譲從之初是歲春華人表請為建立碑時建上第三表譲至是知猷與圖詞成帝令琢其二碑建又面奏堅乞寢勅其碑竟不立十月癸卯制韓建兼輔國軍節度使長春宫使初李瑭領同州瑭茂貞之養子也時帝自播遷已來怒茂貞未巳將遣宰臣孫偓理駕下軍及率諸鎮討之韓建累諫故未果行瑭知之故逃鳳翔至是命建兼之時建亦陳譲詔曰卿才本濟時道惟師古致君不期於辱市憂國每至於忘家自朕薄狩近闗倐逾週嵗備見忠勤之効莫非傾盡之心允謂良臣宜膺重寄㑹同州元戎失職軍旅不安况接行朝尤思得帥是用資爾兼領鎮乎危邦冀疲瘵之漸蘇而煙塵之徹警何乃遽陳章表過有撝冲方藉當仁豈宜多譲固難依允無至再三尋遣供奉官祁彦祥宣賜旌節官告至建理所尋授焉建巳兼判京兆尹有䟦扈之志而致瑭之去鎮人亦意建所搖動也光化元年九月戊辰制加韓建守太傅兼中書令興徳尹潁川郡王并賜鐵券仍令所司擇日備禮冊命十月丁酉改封潁川郡王韓建為許國公又賜鐵券是月魏博節度使羅𢎞信卒三軍立其子副大使紹威知兵馬事尋賜之節鉞天復三年五月辛丑下制以兩收宫闕扶危保國功臣鳳翔隴右兼四鎮北庭行軍彰義軍節度涇原渭武等州觀察營田押蕃落等使開府儀同三司守尚書令兼侍中鳳翔尹李茂貞可檢校太師守中書令茂貞自天復初反正之後朝廷多故盡并河西四鎮及秦隴四州山南八府父子兄弟方牧十餘人朝廷姑息不暇遂加尚書令進封岐王至是失勢以朱全忠官纔至中書令心不自安乃累上表乞罷尚書令有詔允之改授太師後唐莊宗天祐十八年鎮州大將張文禮殺其帥王鎔文禮請旄節於帝帝曰文禮之罪期於不赦適當斬首以謝寃魂詎敢邀干旄節賔友曰王氏之寃實繇文禮方事之殷且須含垢不欲與人生事但假之以五命徐為後圖帝不得已從之四月乃遣上介盧質承制授文禮為鎮州兵馬留後文禮既殺王鎔父子舉族灰㓕鎔子及其妻朱氏以通梁人尋間道告於梁曰王氏喪於亂軍普寧公主無恙文禮徇賊張友順所請因為留後於渾城視事以俟上疏兼要節旄尋亦奉牋勸進莊宗姑示含容而可其請明宗天成元年九月制扶天輔國翊佐功臣天策上將軍武安等軍節度湖南鄂岳等道管内觀察處置兼三司水陸發運等使開府儀同三司守太師兼尚書令潭州大都督府長史使持節都督鄂州諸軍事守鄂州刺史上柱國楚王食邑一萬七千户食實封一千五百户馬殷可檢校太師守尚書令餘竝如故天策上將軍之號舊無此官名偽梁時馬殷驕僣求尚書令偽梁以唐太宗為此官厯朝不置今既革命隨請與之殷又以太宗為天策上將遣紀綱求之梁宣於制册内又加軍字馬殷以謬論請數四且云人臣舊無此號將來更處何官梁人不聽殷黽勉不能辭至今為號也十月壬子制叶盟輔國功臣靜江軍節度使使桂管内觀察處置等使開府儀同三司檢校太師兼中書令使持節桂州諸軍事守桂州刺史上柱國扶風郡王食邑六千户馬賨可加食邑一千户食實封一百户制云爾已名尊四輔位冠三師既無品秩陞遷准以井田増益此要語也名器假人如此賈誼所以長歎息者無如之何二年四月兖州節度使充北面招討使房知温奏盧臺屯兵殺冀州刺史招討副使烏震初詔震代知温帥鎮知温怒震遽至有怨言因縱博誘牙兵殺震於席上㑹次將安審通保騎軍隔河按兵不動知温懼其不濟乃束身渡水復結審通逐其亂軍以奏朝廷姑息知温下詔鄴盡殺軍兵家口老幼數萬清淇為之變色尋詔遣知温就便之鎮以安反側十月青州節度使霍彦威差人走馬進箭一對稱賀殺逆黨帝却賜彦威箭一對傳箭者蕃家之符信也起兵令衆即傳之今霍彦威以蕃將為人臣下而傳箭於君上不典之甚也四年七月荆南行軍節度司馬髙從誨遣都押衙劉謙已進贖罪銀三千兩從誨父季興自偽梁時為荆帥據有其地莊宗平中原季興懼自請入覲復令歸鎮及帝嗣位季興表請峽内諸州仍舊圖𨽻屬朝議纔允季興即謀彊取時魏王繼岌平兩川舟運竒貨數艘下峽為季興所掠繕城自守帝命襄帥劉訓率師討之遇水退季興臣於楊溥受偽爵命洎季興死從誨歸國謙已至帝御中興殿陳荆州之貢於庭顧謂侍臣曰父子罪不相及季興負恩殁身於地從誨悔禍乃心本朝予以恩信待人有何不可安重誨拜而言曰陛下以徳和人不俟舞干革心從化臣等敢賀長興元年正月荆南奏峽州刺史髙季雍歸州刺史孫文乞且依舊任從之四月河中楊彦温叛遣殿直都知范氲押金鞍轡馬金帶散馬衣一襲及綘州刺史官告勅牒往河中賜彦温十二月戊午制荆南節度使髙從誨亡父扶天輔國翊佐功臣荆南節度歸峽等州觀察處置等使開府儀同三司檢校太尉尚書令江陵尹上柱國南平王食邑八千户食實封五百户髙季興可贈太尉從誨母趙國夫人朱氏可贈吳國夫人二年正月勅故保邦崇徳忠畧康濟功臣天策上將軍開府儀同三司守太師尚書令上柱國楚王食邑一萬八千户食實封一千六百户馬殷品位俱髙封崇已極無官可贈宜賜諡兼神道碑文仍以王禮𦵏是月靜江軍節度馬賨卒廢朝贈尚書令賨楚王殷之弟也三年五月東川董璋為孟知祥所殺樞密使范延光等奏曰荆南所奏兩川事宜雖未有興元奏報此事必不慿虛臣等料孟知祥若兼有兩川雖除心腹之患然其軍衆皆吾將士寧不思歸知祥縱若專制劒南仍憂此軰謀變料其籌筭必欲外恃朝廷形勢以制諸軍然陛下茍不能屈意招攜彼亦無繇革面帝曰知祥予故人也以賊臣間諜致兹阻隔撫吾故人何屈意之有即令供奉官李環使西川賜知祥詔曰省洋州及興元奏探聞得董璋把截劒門闗路不通利州與西川徃來兼稱董璋自領徒黨侵逼西川管界西川已出兵士禦備其利州人情不安未知兩川的實音耗等事朕聞天惟福善神必禍淫𤣥鑒昭然㝠符定矣故積功累仁者無所不濟窮兵黷武者未或不亡是以齊國尊周終全霸業吳王伐越自取喪亡畧驗古今足分成敗卿時推間傑世仰全才知治亂於未萌測安危於未兆首叅締搆再復宗祧英謀逈掩於耿吳茂業遐超於申甫論功為最錫壌居先自居守於北門往鎮臨於西蜀安民有術撫衆多恩方靜治於龜城期永扶於鳳闕董璋比膺朝寄薦領戎㫋曾無犬馬之勞但縱豺狼之性頃嵗濳懐逆節密設奸機志欲兼并懇謀間諜始奏卿之得失知朕不容後説朝廷之短長圖卿相信只慿詭詐便欲侵吞欲西犯於蜀川遂東窺於閬郡不煩覼縷可驗包藏亂常之罪惡既彰伐叛之刑書難赦朕乃睠求良帥殄滅兇渠此際尋委卿兼都川行營供饋應接使方倚仗於戚藩俄阻艱於冦境路岐雖隔情好如初中間令進奏官蘇愿及進奉軍杜紹本等相次歸還令傳詔㫖想其到彼備達予懐卿禦敵多方折衝有備雖深嫉惡猶示睦鄰尚抑驍雄觀其釁隙而董璋果然顛蹶盡露奸邪初控扼於劒門遽侵騷於錦里為臣若此滅族非遥卿可嚴誡師徒妙絶籌畫按兹良便速殄元兇朕亦尋遣軍前徑臨境上為卿犄角扼賊咽喉佇掃蕩於氛霾復流通於信使當覃異渥式奬殊功卿宜慎固逺圖秉扶大節保君臣之重義成家世之美名况卿骨月至多丘園在此自來存問竝得安全可表朕之倚卿所頼卿之為朕佇觀英斷定集大勲豈惟只委於節旄長居貴盛兼俟别頒於綸綍更廣封崇奸醜自分始終可鑒其為眷注無忘寐興今遣卿外甥李環齎詔慰諭想當知悉九月乙未供奉官李環自西川使迴進呈西川節度孟知祥表三封并信物先賜金盤盞注子紗羅盂子等又奏福慶長公主以今年正月十二日薨兩川因環而通也環太祖弟忻州刺史克寧子也克寧事見莊宗實録克寧妻孟氏知祥之妺克寧既誅歸孟氏時隨知祥在蜀朝廷既聞知祥殺董璋收復東川無人通信乃令李環省母因齎詔慰諭環具陳朝廷相厚之意知祥復稱藩如初自此驕倨不法矣甲辰先遣供奉官陳延矩徃遂合等州值董璋叛隔在西川至是延矩李環同來齎到孟知祥表三道一謝昭雪請酬奬破董璋立功將校趙季良等五人乞加節鉞一部内刺史令録官員乞許行墨制乙巳遣閤門使劉思政充西川宣諭使與知祥詔曰省所奏東川董璋爰自為鄰從初不睦嘗厚誣於表疏每深間於朝廷欲竊兵權來併土宇忽去年四月二十八日暴興兵士至五月一日驟入漢州尋差馬步都指揮使兼知武信軍節度留後李仁罕右廂馬步都指揮使兼知寧江軍節度兵馬留後張知鄴衙内都指揮使兼知昭武軍留後李肇等各於界分警備又令副使權知武泰軍節度留後趙季良在府巡守其左廂馬步都指揮使兼知保寧軍節度留後趙廷隱先次部領兵士三萬人出次新都鄉自統領衙隊二萬人騎繼進至三日交戰殺敗董璋斬首萬餘級執八千人擒賊將校八千餘人甲馬七百匹收衣甲器械十萬事其董璋與男光嗣四日巳時走入東川前陵州刺史王暉斬璋父子首級來獻軍門尋收下東川城又奏今夏方議賞功其文武將吏等衆意難違已取六月十一日權兼東川指揮公事具悉朕以董璋位列山河名兼將相全昩輸忠事主以禮睦鄰輒恣兇狂擬謀吞噬譖卿則妄呈章奏誑朕則欲竊兵權奸計未成賊機尋露旣無間於搆惑唯有志以攻侵卿雖認包藏乆從含忍但務戢兵而靜治只期應敵以禦衝俟落彀中即加翦撲若居度外且示協和而董璋果出妖巢暴興叛黨忽犯成都之境驟踰漢郡之疆蟻聚蜂屯鴟張豕突謂錦川而可取謂天網而可逃及卿密運戎機大張軍埶劒㦸川排而亘野旌旗雲布以蔽天鵝鸛纔交豺狼已殄棄甲者追擒既盡投羅者剿戮無遺尋迫元兇遁歸孤壘不暇守陴而慟哭便當傳首以迎降惡蔓頓除禍胎全拔永肅潼江之波浪盡收郪道之封疆不有賢良誰分憂寄儻非英特孰靜方隅紀功而煥耀旂常載徳而輝華簡册捷音初至慶快良深嘉歎之餘旌醻是切况聞衆懇已請兼權實契朕懐即加真命其為睠矚無忘寐興其立功將校權兼留務李仁罕張知鄴李肇趙季良已下咸著忠良亦須正授續行渥澤相次奬酬想宜知悉又詔曰朕猥以眇躬纉承丕構賴忠良之共理冀寰宇之永康矧念元勲早聨懿戚永保君臣之分足論終始之心卿出應貞期生符間氣洞曉圯橋之兵畧𤣥通渭水之戎韜重整漢儀首叅大計再隆周道逈立殊功實有令名載於良史是膺朝奬繼領藩宣外則覃聲教於百蠻内則効忠勤於雙闕交修職貢備竭臣誠方表率於諸侯永維持於景運不謂董璋夙懐蠆毒濳貯狼貪擬并吞於仁封詐傾輸於直節密飛章奏累述事機或敘卿之短長或報卿之動靜無非鬬激每欲攻侵朝廷貴要協和乆從隱忍表文具在事狀甚明及知不納其讒邪乃去反陳於離間仍於鄰道頓起釁端只慿誑惑之詞便作窺覦之暴既干紀律須舉憲章爰命帥臣共平冦孽此際遂委卿兼東川行營供饋應接使如斯倚注豈有猜嫌渥澤方行使車將發旋屬道途之阻塞復當邊境之沸騰繇是去意莫通來音亦絶偶致闗防之多事乆聞分野之延災蓋以朕至徳未孚純風未洽每自責躬罪已敢忘旰食宵衣况卿動稟箴規深懐鑒識從初料其操守豈敢徇彼狂迷只應屢中巧言偶生疑論遂且徐觀其向背終圖自别於妍媸其間但務訓兵止期應敵遐想勤王之力詎移許國之心所以中間先令進奏官蘇愿及進奉軍將杜紹本等相次歸還式明安慰朕又知董璋果謀鼠竊轉恣鴟張輒侵岷益之崇封俄越梓潼之末界茲察詭計究彼初心附皮毛脣齒之歡足明矯妄竊郡邑金湯之利可驗包藏朕乃尋遣近臣徑齎明詔示其犄角表此招懐仍許優恩别傳密㫖果聞卿意備體予懐即決逺圖亟囘英斷驅鋭旅而既殱冦黨取危城而方剿渠魁爰効至忠克全大節盡傾衷素疊貢封章併袪徃日之疑襟細述此時之戎事大朝正朔奉之不渝列鎮規程守之無易仍厚支其館穀濟隔過之王人載認恭勤益明尊奬尚未舛悞得以平持今後協和自然悠乆魚水之情宛在山河之任永居足保勲榮轉期富貴至於封賞固不食言凡在繫文更宜宣力嘉歎之外注矚斯深十月乙酉朔帝見羣臣於端明殿再遣李環奉使劒南初同光末魏王繼岌平定兩川及班師留兵五千人鎮守自後安重誨濳醸兵釁欲圖兩川每除授川中刺史必以兵從小郡不下五百人以牙隊為名先是夏魯竒所率兵三千人赴鎮遂州及董璋先留東川兵士我之精甲不下三萬人陷在蜀川孟知祥豐給厚賜將校與妻孥田宅邀其死力而趙廷隱李仁罕李肇等皆吾之將校也知祥自補授藩鎮知祥既敗董璋兼東川亦不遣復以聞洎李環徃宣詔㫖知祥驕矜自恃乃上章云臣當道先隔留川中兵士乞發遣家口骨肉來入川今再遣李環與知祥詔曰供奉官陳延矩囘覽所奏遂閬黔䕫等州自此差來所屯軍都將士等當府已厚給衣糧盡令優足其指揮都頭各隨職次悉以安排雖因事以在川固係籍而為國但念各有家口骨肉在本管軍營居此者已有生涯在彼者寧無離戀伏乞勅見在營幕放前件將士家口入川等事具悉切自釁起梓綿災延巴蜀繇兹奸賊累我藎臣阻渥澤以不通搆猜嫌而莫解果招神感自就天誅卿有勇有謀克忠克孝雖偶遭詿誤而每切推崇率師徒而繼殄鄰兇貢表章而尋輸臣節兼以諸方戍卒皆厚給於衣糧數道王人亦優加於供待周勤若是嘉歎良深并奏人名已係兵籍朕既推誠而待物卿方盡瘁以事君卿安即是朕安在彼何殊在此所謂家眷東地更乞發西行既覽奏陳固議俞允尋命宣兹表意採彼輿言皆以乆抱暌離極思團聚但以捨兹九族就彼一身雖絲蘿琴瑟之情分飛甚苦而松柏丘園之戀抛棄尤難又知已有生涯恐虞却相棄擲况聞兩川曾經戰鬬必有殺傷既難輕議於徃來兼恐不實其存殁切恐去不相見徃無所依轉令兩地之困空盡致一家之沉没聞兹哀訴又可憫懐其如口數頗多地里極遠如或正身自來般取即應此輩不貯憂疑卿可體彼人情詳兹物理妙加籌度貴協便宜故兹詔示想宜知悉知祥别表兩川部内將校州縣官員緣地里遥逺一時奏報不暇乞許臣權行墨制除補訖聞奏與知祥詔曰據所奏以文武之將僚希尺寸之官賞請卿自稱王爵權行制書卿以未經先奏於宸聰不欲便加於衆意却緣熊羆之武旅懐鐵石之壯心或立功勞須加爵賞難以具排官氏繁奏聖聪敢希顯降明文許行墨制亦自朝廷之成命委藩翰以奉宣凡有施行後當聞奏免憂迢逓庶從便宜等事具悉卿等最親最舊不溢不驕爰自中興夙叅佐命厭大權而不䖏守髙節以自全成兹令名標於信史洎總兹千乗鎮彼一隅不將富貴為心惟以邦家是念盡血誠而推戴竭土産以貢輸每念忠良正深繫賴忽被董璋之逼迫遽令蜀郡以攜離卿雖外合元兇而内全大節文翰每深於恭敬使臣盡厚於接延兼聞曾興議於東川欲拜章於北闕彼既他説此難獨行察卿此際之誠契朕從初之料今則詔書纔降章表繼來阻推勸之衆情髙辭王爵執變通之成見逺貢臣誠去假號而就真封抑異端而全大計非卿不能斷此意非朕不能悉此心載閲敷陳備詳披瀝自然可乆可大傳子傳孫長為一面之藩維永作四方之表式其文武將僚等或武有折衝之術文多經濟之材咸能贊助元戎削平大憝功勲顯著酬奬必行所請權行制書貴従宜便雖隨方設教恊逺藩衆庶之情而引古證今異本朝全盛之事切念道途乆絶人使纔通在朕方務於綏懐於卿固無於愛惜緬思盡節必認注心自今已後劒南諸道應節度使刺史并州縣官軍府文武將吏等或陞降賢愚或黜陟功過一切委卿逐便選擇差署施行訖奏朝廷更不除人豈惟協彼權宜抑亦表吾委任故兹詔示想宜知悉知祥别表又奏大将軍趙季良李仁罕趙廷隐張知鄴李肇等五人昨有破董璋之大功臣已權補充五鎮兵馬留後伏乞正授節旄者與知祥詔曰據所奏節度副使知武㤗軍節度兵馬留後趙季良馬歩諸軍都指揮使知武信軍節度兵馬留後李仁罕左廂馬歩都指揮使知保寕軍節度兵馬留後趙廷𨼆右廂馬歩都指揮使知寕江軍節度兵馬留後張知鄴衙内馬歩都指揮使知昭武軍節度兵馬留後李肇等臣各已簡署列藩委之共理伏乞特頒詔令各降真恩儻䝉委以節旄則望付臣宣賜仍希眷澤各轉官階等事具悉卿前鎮彼逺方廹以近患欲作婉成之計須為茍合之容果中含𢎞自貽誅戮趙季良等體卿忠孝感卿撫綏或獻謀於帷幄之間或効勇於鼔旗之下頼兹奮發致彼廓清今則纔翦兇徒尋輸忠節雖知祥之通變亦季良之贊成况彼皆是重藩並難虚位言念数子叅佐一心不惟功合奬酬兼亦材堪任使但能致理何爽從權所委留司悉諧朕意應希渥澤並可允俞但縁卿自建大功未加殊寵卽俟相次便與施行其旌節官告等更不差使頒宣亦便委卿分付所乞墨制已從别詔處分故兹詔示想宜知悉便令李環押賜晋國雍熈長公主祭贈絹三十疋及賜知祥玉帯等四年二月戊午帝對西川進奉使朱滉於中興殿因問知祥比日何如對訖百僚稱賀癸亥制推忠再造致理功臣劔南西川節度管内觀察處置統押近界諸蠻兼西山八國雲南安撫制置等使開府儀同三司檢校太尉兼中書令行成都尹上柱國清河郡開國公食邑一千五百户食實封一百户孟知祥可依前檢校太尉兼中書令行成都尹劒南東川西川節度管内觀察處置統押近界諸蠻兼西山八國雲南安撫制置等使仍封蜀王加食邑一千五百户賜忠貞佐國保大功臣四月庚午正衙命使册西川節度使孟知祥為蜀王八月夏州自署李彞殷為綏州刺史乞正授從之十月壬戍制權知夏州事起復雲麾將軍檢校司空兼御史大夫上柱國李彞超可依前起復檢校司空使持節都督夏州諸軍事夏州刺史兼御史大夫充定南軍節度夏銀綏宥等州押蕃落等使彞超仁福之次子仁福卒三軍立為帥矯仁福奏乞降真命帝聞之以彞超為延州留後以延州安從進為夏州留後朝廷慮不從命詔邠州藥彦稠等送從進赴鎮仍降詔諭之彞超奉詔三軍擁隔未放離任從進出軍攻之王師加討無功彞超遣使求雪因以授之册府元龜卷一百七十八
