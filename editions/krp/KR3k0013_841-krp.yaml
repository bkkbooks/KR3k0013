body:
  text: 册府元龜卷八百四十一宋王欽若等撰總録部文章第五唐李揆少聰敏好學善屬文開元末舉進士補陳留尉獻書闕下詔中書試文章擢拜右拾遺改右補闕起居郎並知宗正表奏髙適好學以詩知名濩落不事家産僑居梁宋間薄逰州縣求丐取給天寶中海内無事干進者注意文詞適賦詩以氣質自髙時得佳句每詩朝出夕遍人口李林甫奏授汴州封丘尉元德秀為魯山令秩滿居陸渾山琴觴之餘間以文詠牽情而書語無雕刻著季子聴樂論蹇士賦為髙人所稱李泌字長源聰敏好學博涉經史善屬文尤長於詩肅宗時為銀青光禄大夫掌樞務于休烈好學善屬文位至工部尚書有集十卷行於世李端登進士第工詩代宗大厯中與韓翃錢起盧綸等文詠唱和馳名都下號大厯十才子時郭尚父少子曖尚代宗女昇平公主賢明有才思尤喜詩而端等多在曖之門下每宴集詩賦公主坐視簾中詩之美者賞百縑曖因拜官㑹十子曰詩先成者賞時端先獻警句云薰香荀令偏憐小傅粉何郎不解愁主即以百縑賞之錢起曰李校書誠竒才此篇宿搆也願賦韻正之請以起姓為韻端即襞牋而獻曰方塘似鏡草芊芊初月如鈎未上弦新開金埒教調馬舊賜銅山許鑄錢曖曰此愈工也端自校書郎授杭州司馬卒吴通元為中書舍人翰林學士詞藻婉麗帝尤憐之貞元初李紓為昭徳皇后諡册文張延賞栁渾為廟樂章及進皆不稱㫖並詔通元重撰凡中㫖撰述非通元之筆無不慊然重之如此劉太眞渉學善為文少時師事詞人蕭穎士位至吏部侍郎李紓字仲舒少好學善屬文為吏部侍郎奉詔為興元紀功述及郊廟樂章諸所論著甚衆李益宰相揆之族子登進士第長於歌詩徳宗貞元末與宗人李賀齊名每作一篇必為教坊樂人以賂求取唱為供奉歌詞其征人歌早行篇好事者畫為屏障如迴樂峰前沙似雪受降城外月如霜之句天下以為歌詞位至禮部尚書盧景亮為中書舍人上西戎利害疏皆指切正要當時服其才有文集十卷張宏靖為東都留守從事獻賦美二京之制徳宗嘉其文擢授監察御史崔元翰性介直少交逰惟秉一操專業於文章其對策及奏記碑誌師法班固蔡邕致思精宻貞元中為職方員外郎知制誥于邵以博通宏詞昇甲科位至中書侍郎有文集四十卷行於時武元衡工於五言詩好事者傳之往往被於管絃元衡位至宰相竇叔向羣之父也以工詩稱官至拾遺栁渾志學有文集十卷位至宰輔渾之兄識篤意文章有重名於開元天寶間與蕭穎士元徳秀劉迅相亞其練理創端往往詣極當時作者咸服其簡拔而趣尚辯博渾亦善為文然趨時向功非沉思之所及韓愈幼孤刻苦學儒不俟奨勵大歴貞元之間文士多尚古學效揚雄董仲舒之述作而獨孤及梁肅最稱淵奧儒林推重愈從其徒逰鋭意鑚仰欲自振於一代嘗以為自魏晉已還為文者多拘偶對而經誥之指歸遷雄之氣格不復振起矣故愈所為文務反近體抒意立言自成一家新語後學之士取為師法當時作者甚衆無以過之故世稱韓文焉然時有才肆意亦有盭孔孟之㫖若南人妄以栁宗元為羅池神而愈譔碑以實之李賀父名晉不應進士而愈為賀作諱辯令舉進士又為毛穎傳譏戲不近人情此文章之甚謬者愈官至吏部侍郎薛盛河東人存誠之父也工為拔河賦當時稱之崔咸長於歌詩或風景晴明花朝月夕朗吟意惬必悽愴霑襟㫖趣髙竒名流嗟悒有文集一十卷權徳輿述作特盛六經百氏㳺泳漸漬其文雅正而宏博王侯將相洎當時名士薨殁以銘紀而請者十八九文士推為宗匠焉終禮部尚書有文集五十卷行于代袁滋字徳深嘗讀劉惲悲甘陵賦歎其褒善懲惡雖失春秋之㫖然其文不可廢因著甘陵賦後序滋位終湖南觀察使郄髙卿少以詞學見推有文集六十卷位至太子詹事致仕孟簡幼為五言詩有名於江淮終太子賓客元稹聰警絶人年少有才名與太原白居易友善工詩善狀詠風態物色當時言詩者稱元白焉自衣冠士子至閭閻下俚悉傳諷之號為元和體既以俊爽不容於朝流放荆蠻者僅十年俄而白居易亦貶江州司馬稹量移通州司馬雖通江懸邈而二人来往贈答凡所為詩句有三十五十韻乃至百韻者江南人士傳道諷誦流聞闕下里巷相傳為之紙貴觀其流離放逐之意靡不悽惋十四年自虢州長史徵還為膳部員外郎宰相令狐楚一代文宗雅知稹之詞學謂稹曰嘗覽足下製作所憾不多遲之久矣請出其所有以豁予懐稹因獻其文自叙曰稹初不好文徒以仕無他岐彊繇科試及有罪譴棄之後自以為廢滯潦倒不復為文字有聞於人矣曾不知好事者抉摘芻蕪塵瀆尊重竊承相公特於廊廟間道稹詩句昨又面奉教約令獻舊文戰汗悚踊慙忝無地稹自御史府謫官於今十餘年矣閒誕無事遂專力於詩章日益月滋有詩句千餘首其間感物寓意可備矇瞽之諷者有之詞直氣麄罪邱是懼固不敢陳露於人惟盃酒光景間屡為小碎篇章以自吟暢然以為律骨卑庳格力不揚茍無姿態則陷流俗嘗欲得思深語近韻律調新屬對無差而風情宛然而病未能也江湖間多新進小生不知天下文有宗主妄相倣效而又從而失之遂至於支離褊淺之詞皆目為元和詩體稹與同門生白居易友善居易雅能為詩就中愛驅駕文字窮極聲韻或為千言或為五百言律詩以相投寄小生自審不能過之往往戲排舊韻别創新詞名為次韻相酬蓋欲以難相排耳江湖間為詩者復相倣效力或不足則至於顛倒語言重複首尾韻同意等不異前篇亦目為元和詩體而司文者考變雅之由往往歸咎於稹甞以為雕蟲小事不足以自明始聞相公記憶累旬以来實慮糞土之牆庇之以大厦便不復破壊永為版築者之娛輒冩古體歌詩一百首百韻至兩韻律詩一百首合為五巻奉啟跪陳或希構厦之餘一賜觀覽知小生於章句中欒盧榱桷之材盡曾量度則十餘年之邅迴不為無用矣楚深稱賞以為今代之鮑謝也穆宗皇帝在東宫有妃嬪左右嘗誦稹歌詩以為樂曲者知稹所為嘗稱其善宫中呼為元才子荆南監軍崔潭峻甚禮接稹不以掾吏遇之嘗徵其詩什諷誦之長慶初潭峻居朝出稹連昌宫辭等百餘篇奏御穆宗大喜問稹安在對曰今為南宫散郎即日轉祠部郎中知制誥朝廷以書命不繇相府甚鄙之然詞誥所出夐然與古為侔遂盛傳於世繇是極承恩顧稹嘗為長慶宫詞数十百篇京師競相傳唱所著詩賦詔册銘誄論議等雜文一百卷號曰元氏長慶集又著古今刑政書三百卷號類集並行於世李紳六歳而孤母盧氏教以經義紳形眇小而精悍能為歌詩鄉賦之年諷誦多在人口位至宰相馮定字介夫累遷太子詹事定有文學長慶中源寂使新羅國見其國人傳冩諷念定所為黑水碑畫鶴記韋休符之使西蕃也見其國人冩定商山記以代屏障其文名馳於戎夷如此李徳裕於東都伊闕南置平泉别墅清流翠篠樹石幽竒初未仕時講學其中及從官藩服出將入相三十年不復重逰而題寄歌詩皆銘之於石今有花木記歌篇録二石存焉有文集二十卷記述舊事則有次栁氏舊聞御臣要略伐叛志獻替録行於世李商隠能為古文不喜偶對嘗為令狐楚從事慕楚章奏始為今體章奏博學彊記下筆不能自休尤善為誄奠之詞累為賓佐有表狀集四十卷溫庭筠苦心硯席尤長於詩賦初舉進士至京師人士翕然推重然士行塵雜不修邊幅能逐絃吹之音為側艷之詞公卿家無頼子弟相與酬飲繇是累年不第後為襄陽巡官失意歸江東庭筠著述頗多而詩賦韻格清拔文士稱之司空圗僖宗時為中書舍人未㡬以疾辭晚年為文尤事曠達嘗擬白居易醉吟傳為休休亭記有文集三十卷唐彦謙歴閬壁二郡刺史有詩数百篇吏部侍郎薛廷珪為之序號鹿門先生集梁杜荀鶴池州人善為詩詞句切理為時所許既擢第後還舊山時田頵在宣州甚重之頵將起兵乃陰令以牋辭至太祖遇之頗厚及頵遇禍太祖以其才表之尋授翰林學士主客員外郎羅隠有詩名於天下尤長於詠史然多譏諷以故不中第開平初太祖以右諫議大夫徵不至魏博節度使羅紹威宻表慰薦乃授給事中終於錢塘有文集十卷行於世後唐李愚初仕梁為右拾遺崇政殿學士忤㫖罷職歴許鄧觀察判官初在内職磁州舉子張礪依焉末帝貞明中礪自河陽北歸荘宗版授太原府掾出入崇達之門揄揚愚之節槩及愚所為文仲尼遇顔回夀夷齊非餓等篇北人望風稱之愚為文尚氣格效韓栁諸公之立意李琪字台秀唐昭宗時李谿父子以文學知名於時琪年十八九袖賦一軸謁谿谿覽賦驚異倒屣迎門因出琪啞鐘捧日等賦指示謂琪曰予嘗患近年文士詞賦皆数句之後未見賦題吾子八句見題偶屬典麗吁可畏也琪繇是益知名自琪為諫官憲職凡時政有所不便必封章論列文章秀麗覽之者忘倦琪在内署時所為制誥編為十卷目曰金門集大行於世竇夢徵少苦心為文隨計之秋文稱甚髙位終翰林學士尤長於牋啟編為十卷目曰東堂集行於世薛廷珪為中書舍人所著鳳閣書詞十卷克家志五卷並行於世初廷珪父逢著鑿混沌眞珠簾等賦大為時人所稱廷珪既壯亦著賦数十篇同為一集故目曰克家志晉李象為刑部員外郎髙祖天福末象上二舞賦帝覽而嘉之命編諸史册崔棁少好學博涉經史屬詞頗工流輩罕能及之閒居於滑二十餘年專以著述為事不逰里巷郡人罕識其面梁貞明中舉進士後為翰林學士苻蒙幼聰慧好學父習為常山偏校嘗遣與文士共處年十二逰佛寺見壁畫有盃渡道人因題其腹曰都緣心似水故以鉢為舟人稍推之繇是篤意吟詠經亭榭祠廟之間皆削秭音拂染翰題詩而去人愛其速成往往傳誦弱年漁獵子史不辨經書為文浮靡惡㣲婉之言好為宫體艷詩及嘲謔之語位終禮部侍郎周張沆記覽文史好徵求僻事公家應用時出一聯以炫竒筆位終刑部尚書王延少學為儒著詞賦欲從科舉㑹鄉里亂客浮陽屬滄帥戴思逺棄鎭歸梁延挈族從之以家人貧逰丐侯門嘗以所為賦謁侍郎李琪琪覽而欣然曰此道近難其人王生升我堂矣繇是人士稱之延後為太子少傅致仕馬裔孫字慶先初仕後唐為宰相以晉祖受命放歸後以賓客致仕又為太子詹事晉漢公卿以裔孫好為文章皆欣然待之太祖即位就加撿校禮部尚書馮道初仕後唐為相百寮上明宗徽號凡三章道自為之其文混然非流俗之體舉朝服焉道尤長於篇詠秉筆則成每成義含古道必為逺近傳冩故人漸畏其髙深繇是班行肅然無澆漓之態王仁裕有詩千餘首勒成一百卷目之曰西江集蓋以嘗夢吞西江文石遂以為名焉位至太子少保賈緯有文集三十卷目之為草堂集終青州行軍司馬扈載少好學善屬文賦頌碑賛尤其所長廣順初隨計於禮部文價為一時之最是嵗昇髙等位至翰林學士册府元龜卷八百四十一
