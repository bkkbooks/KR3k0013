  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_562-1a}
body:
  text: 册府元龜卷五百六十二宋王欽若等撰國史部疏繆不實非才疏繆廣記備言國史之職也章往考來春秋之義也夫司記言動紬繹編簡為一代之典流千秋之訓固宜書法不隠叙事可觀研思覃精間不容髪豈有脱落時事采述異端體蕪舛而不倫文混漫而難辨否臧非允論次乖方物議既喧訟牒斯集固知述作之際宜圗任於良士焉晉王沈初仕魏為侍中與荀顗阮籍共撰魏書多為時諱未若陳夀之實録也郭頒撰魏晋世語蹇乏全無宮商最為鄙劣以時有異事故頗行於世干寳孫盛等多采其言以為晉書王隠為著作郎後黜歸於家撰晋書成詣闕上之隠雖好著述而文辭鄙拙蕪舛不倫其書次第可觀者皆其父所撰文體混漫義不可解者隠之作也後魏鄧淵為尚書吏部郎道武詔淵撰國記淵造十餘卷唯次年月起居行事而已未有體例李彪為秘書丞奏著作事自文成帝已來至於太和崔浩髙允著作國書編年序録為春秋之體遺落時事三無一存崔鴻為散騎常侍齊州刺史撰十六國春秋鴻經綜既廣多有違謬至如太祖天興二年姚興改號鴻始而鴻以為改在元年太宗永興二年慕容超擒於廣固鴻又以為事在元年太常二年姚泓敗於長安而鴻亦以為㓕在元年如此之失多不考正山偉為祕書監遷侍中中書令皆領著作國史自鄧淵崔琛崔浩髙允李彪崔光以還諸人相繼撰録纂集及偉等謟説上黨王天穆及爾朱世隆以為國書正應代人修緝不宜委之餘人是以綦偉等更主大籍守舊而已初無述著故自崔鴻死後迄終偉身二十許載時事蕩然萬不記一後人執筆無慿致史之遺闕偉之由也北齊魏收為中書令兼著作郎詔撰魏史既成時論言收著史不平前後投訴百有餘人文宣重收才不欲加罪然猶以羣口沸騰勑魏史且勿施行令羣官博議聴有家事者入署不實者陳牒於是衆口諠然號為穢史楊休之為中書監魏收之卒也文宣命休之裁正其所撰魏書休之收叙其家事稍美且寡才學淺延嵗時竟不措手唯削去嫡庶一百餘人宋孝王為北平王文學求入文林館不遂因非毁朝士撰别録二十卷㑹周平齊改為闗東風俗傳更廣見聞勒成三十卷以上之事多妄繆篇第冗雜無著述體隋王邵為著作郎累遷秘書少監在著作将二十年専典國史撰隋書八十卷多録口勑又採迂怪不經之語委巷之言以類相從為其題目辭義繁雜無足稱者遂使隋代文武名臣烈将善惡之迹湮沒無聞初撰齊誌為編年體二十卷復為齊書紀傳一百卷及平賊記三卷或文詞鄙野或不軌不物駭人視聼大為有識所嗤鄙唐吳兢為左庶子史館修書撰唐書九十八卷唐春秋三十卷未就開元十七年𤣥宗令中使就取得五十餘卷其記事踈略不堪行用又云兢居史職凡三十年叙事簡要人用稱之末年傷於太簡出為荆州司馬累遷嘗王傳嘗以五代史繁雜及别撰梁齊周史各十卷陳史五卷隋史二十卷又傷踈略兢雖老耄猶希史職而行歩傴僂李林甫以其年老不用卒後其子進兢所撰唐書八十餘卷事多紕繆終不逮於壮年令狐峘為左庶子史館修撰在史館修𤣥宗實録百卷撰代宗實録四十卷雖勤苦然多遺漏不稱良史至元和二年其子丕為太僕寺丞進峘所撰代宗實録四十卷詔付史館贈峘工部尚書叙事用舎咸不當而又多於漏略名臣如房琯不立傳直䟽如顔真卿略而不載不實傳曰書法不隠又曰不刋之書盖聖人垂世立法懲惡勸善者也若乃因嫌而沮善瀆貨以隠惡或畏威而曲加文飾或徇時而蔑紀勛伐恣筆端而溢美擅胷臆以厚誣宜當穢史之名豈曰傳信之實垂於後也不其恧歟後漢靈帝時長水校尉劉琛等撰東觀漢記云中常侍孫程北新城人衛康叔之胄孫林父之後自程已下十九人與程同功者皆叙其所承本系盖當時史官懼程等威權故曲為文飾晉陳夀武帝時為著作郎撰三國志初夀父為蜀将馬謖参軍謖為諸葛亮所誅夀父亦坐被髠亮子瞻又輕夀故夀為亮立傳亮将略非長無應敵之才言瞻惟工書名過其實議者以此少之一説夀嘗為瞻吏為瞻所辱故云宦官黄皓竊弄權柄而瞻将䕶無能矯正也又魏志云曹公與袁紹相持於官渡時公兵不滿萬傷者十二三裴松之以為魏武初起兵已有衆五千自後百戰百勝敗者二十三而已矣但一破黄巾受降卒三十餘萬所吞并不可悉紀雖征戰損傷未應如此之少也夫結營相守異於摧鋒决戰本紀云紹衆十餘萬屯營東西數十里魏太祖雖機變無方略不出世安有數千之兵不得逾時相抗者哉以理而言竊謂不然紹為屯數十里公能分營與相當此兵不得甚少一也紹若有十倍之衆理應當悉力圍守使出入斷絶而公使徐晃等擊其運車公又自出擊淳于瓊等揚旌徃還曽無抵閡眀紹力不能制是不得甚少二也諸書云公坑紹衆八萬或云七萬夫八萬人奔散非八千人所能縳而紹之大衆皆拱手就戮何縁力能制之是不得甚少三也将記述者欲以見竒非實録也案鍾繇傳云公與紹相持繇為司𨽻送馬二千餘匹以給軍本紀及世語竝云公時有騎六百餘匹繇馬為安在哉王沉武帝時為侍中典著作與荀顗阮籍共撰魏書多為時諱未若陳夀之實録也梁沈約初仕南齊及武帝為太子家令撰宋書多載孝武眀帝諸鄙瀆事帝遣左右謂約曰孝武事迹不容頓稱我昔經事宋眀帝卿可思諱惡之義於是多所省除吳均天監中為奉朝請表求撰齊春秋之書成奏之髙祖以其書不實使中書舍人劉之遴詰問數條竟支離無對勑付省焚之坐免職蕭韶太清初為舍人城䧟奉詔西奔及至江陵人士多往尋覔令韶説城内事韶不能人人為説乃䟽一卷客問者便示之湘東王聞而取㸔謂曰昔王韶之為隆安紀十卷説晉末之亂離今之蕭韶亦可為太清紀十卷矣韶乃更為太清記其諸議論多謝昊為之韶既承㫖撰著多非實録北齊魏收天保中為中書令兼著作郎詔撰魏史引史官竝非史才修史諸人祖宗姻戚多被書録飾以美言收頗性急不甚能平夙有怨者多沒其善每言何物小子敢共魏收作占舉言之則使上天按之當使入地初收在神武時為太常少卿修國史得楊休之助因謝休之曰無以謝德當為卿作佳傳休之父固魏世為北平太守以貪虐為中尉李平所弹獲罪載在魏起居注收書云固為北平甚有惠政坐公事免官又云李平深相敬重爾朱榮於魏為賊收以高祖出自爾朱且納榮子金故减其惡而增其善論云若修德義之風則韓彭伊霍夫何足數史既成時論言收著史不平文宣詔收於尚書省與諸家子孫共議論討前後投訴百有餘人云遺其家世職位或云其家不見記録或云妄有非毁收皆隨狀荅之范陽盧裴父同附出族祖元傳下頓丘李庶家傳稱其本是梁國家人裴庶譏議云史書不直收性急不勝其憤啟誣其罪欲加屠害帝大怒親自詰責裴裴曰臣父仕魏位至儀同功業顯著名聞天下與收無親遂不立傳愽陵崔綽位止本郡功曹更無事迹是收外親乃為傳首收曰綽雖無位名義可嘉所以合傳帝曰卿何由知其好人收曰髙允曽為綽讃稱有道德帝曰司空才士為人作讃正應稱揚亦如卿為人作文章道其好者豈能皆實收無以對戰慄而已但帝先重收才不欲加罪時太原王松年亦謗史及裴庶竝獲罪各被鞭配甲坊或因以致死盧思道亦抵罪然猶以羣口沸騰勑魏史且勿施行令羣臣愽議聽有家事者入署不實者陳牒於是衆口喧然號為穢史投牒者相次無以抗之時左僕射楊愔右僕射高德正二人勢傾朝野與收皆親收遂為其家竝作傳二人不欲言史不實抑塞訴辭終文宣世更不重論又以尚書陸操嘗謂愔曰魏收魏書可謂博物宏才有大功於魏室其後羣臣多言魏史不實武成復勑更審收又廻換遂為盧仝立傳崔綽反更附出楊愔傳本云有魏以來一門而已至是改此八字又先云𢎞農華隂人乃改自云𢎞農以配王惠龍自云太原人此其失也收為左僕射武平三年卒既縁史筆多憾於人齊亡之嵗收塚被發棄其骨於外刁柔天保中為國子博士時魏收撰魏史啟柔等與同其事柔性頗専固自是所聞收嘗所嫌惮在史館未乆逢勒成之際志存偏黨魏書中與其内外通親者竝虚美過實深為時論所譏唐許敬宗顯慶中為太子少師仍東西臺三品依舊修國史先是國子祭酒令狐德棻依紀傳之體撰成國史八十卷其後敬宗續修増為一百卷敬宗自掌知國史記事不直論者尤之初虞世基與敬宗父善心同為宇文化及所害封德彛時為國史舎人備見其事因謂人曰世基被戮世南匍匐而請代善心之死敬宗舞蹈以求生敬宗聞而衘之及為德彛立傳盛加其罪惡左監門大将軍錢九隴皇家之𨽻也敬宗與之結婚乃為九隴曲叙門閥妄加其功績敬宗為子娶尉遲寳琳孫女為妻多得賂遺及作寳琳父敬德傳悉為隠諸過咎太宗作威鳯賦以賜長孫無忌敬宗改云賜敬德白州人龎孝泰蠻酋七品率兵從征髙麗賊知其懦襲破之敬宗又納其寳貨稱孝泰頻破賊徒斬獲數萬漢将驍徤者唯蘇定方與龎孝泰耳曹繼叔劉伯英皆出其下虚美隠惡如此初髙祖太宗兩朝實録其敬播所修者頗多詳直敬宗又輙以已愛憎曲事刪改論者尤之韓愈憲宗元和中為比部郎中史館修撰順宗實録五卷至太和五年勑宰臣監修國史路隋等重加刋正隋等奏曰臣自奉宣㫖尋取史本欲加筆削近伏見衛尉卿周君巢諌議大夫王彦威給事中李固言及史官蘇景裔等各上草䟽具陳刋改非宜又聞班行以此議論頗衆臣伏以史策之作勸誡所存事有當書理宜歸實匹夫美惡尚不可誣人君得失無容虚載聖恩以前實録記貞元末數事稍非摭實盖出傳聞審知差舛便使刋正頃因日屢形聖言通計前後至於數四臣及宗閔僧孺亦以永貞已來嵗月至近禁中行事在外固難詳知陛下所言皆是接於耳目既聞乖謬因述古今引前史直不疑盗嫂之言及第五倫撾婦公之説固多此比難盡信書所兾睿鑒詳於聴言深宫慎於行事持此比類上開聰眀特蒙降察稍恕前謬由是近垂宣命令有改修臣等伏以貞觀已來累朝實録有經重撰不敢固辭但欲粗刪深誤亦固盡存諸説宗閔僧孺相與啇量縁此書成於韓愈今史官李漢蔣係皆愈之子婿若遣参撰或致私嫌以臣既職監修盍令詳正及經奏請事遂施行今者寮庶競言不知本起表章交奏似有他疑臣雖至昧容非自請既進羣議輙冐上聞縱臣果獲修成必懼終為時累且韓所書亦出非已元和之後已是相循縱其宻親豈害公理使歸本職實謂正名其實録狀伏望條示舊記最錯者宜付史官委之修定則兾聖祖垂休永無慙於傳信下臣非據獲减戾於侵官彰清朝立政之方表公器不私之義流議自弭時論攸宜詔曰其録中所書德宗順宗朝禁中事尋訪根抵盖其謬傳諒非信史宜令史官詳正刋去其他不要更修餘依奏開元二年二月文宗御紫宸殿又謂宰臣鄭覃李固言李石曰順宗實録似未詳實史官韓愈不是當時屈人否石曰韓愈貞元末間為四門愽士帝曰司馬遷與任安書全是怨望所以漢武本紀事多不實覃曰漢武中年後大發戎馬拓土開邊生人耗竭糧饟不給本紀所述亦非過言䂖曰史筆不直率多無後鄭覃所陳志在譏諫欲陛下䆒竟盛德故言漢武不屈帝曰靡不有初鮮克有終此誠可為戒李綽㑹昌中為平章事監修國史武宗遣紳與修撰鄭亞重修憲宗實録紳亞取行状謚議将相之間過為増餙至宣宗中大中二年十一月勅憲宗實録宜施行舊本其新本委州府長史察訪如録得者竝送史館不得輙留周賈緯初仕漢為諫議大夫史館修撰判館事乾祐中受詔與王仲竇儼修晉高祖少帝漢高祖三朝實録緯以筆削為己任然而褒貶任情記注不實晉宰相桑維翰執政日薄緯之為人不甚見禮緯深啣之及叙維翰傳稱維翰身沒之後有白金八千挺他物稱是翰林學士徐台符緯邑人也與緯相善謂緯曰竊聞吾友書桑魏公白金之數不亦多乎但以十目所覩不可厚誣緯不得已改為白金數十挺非才夫史氏之職掌四方之志善惡不隠言動必書固宜妙選良材圗任眀職廣示懲勸之義備適詳略之體成大典於一代垂信辭於千祀若乃司載筆之官昧叙事之方徒淹嵗時空索編簡或紬繹之靡就或頒次之無文昧進曠官盖可懲也後魏李諧為長史兼中書侍郎崔光引為著作郎諧在史職無所歴意孫惠蔚為黄門郎代崔光為著作首尾五載無所撰著自披其傳注數行而已劉仁之為著作郎兼中書令既非其才在史未嘗執筆李琰之為著作郎黄門郎皆修國史每自誇文章從姨兄常景笑而不許前後再居史職無所編緝谷纂為著作郎監國史不能有所緝綴宋欽初仕沮渠蒙遜為中書郎入國拜著作郎欽在河西撰䝉遜記無足可稱㳺雅為祕書監委以國史之任不勤著述竟無所成北齊魏收為中書令兼著作郎詔撰魏史引史官恐其凌逼惟取學流先相依附者其房延祐辛元植睦仲讓雖夙渉朝位竝非史才刁柔裴昻之以儒業見知全不堪緝高季幹以左道求進唐李融為夀安丞開元中侍中𢎞文館學士裴光庭引融并拾遺張琪著作郎司馬利賔等直𢎞文館撰續春秋經傳上表請以經為御撰而光庭等相依左氏之體為之作傳𤣥宗又手制褒賞之光庭筆削於李融書竟不就栁玭為吏部侍郎昭宗詔修宣宗懿宗僖宗實録始丞相監修國史杜讓能以三朝實録未修乃奏玭及右補闕裴庭裕左拾遺孫泰駕部貟外郎李𦙍太常博士鄭光庭等十五人分修之踰年竟不能編録一字册府元龜卷五百六十二
