body:
  text: 冊府元龜卷六百四十六宋王欽若等撰貢舉部對䇿自西漢之世始詔有司詳求俊茂親臨䇿問受其條對故當時之論以晁董為稱首焉其後覊孤竝進賢能間出彬彬儒雅見稱前史得人之盛偕乎三代觀其奮發智慮講求理道仰稽於前訓俯流乎嘉話信魁偉博逹之士哉唐室全盛豪傑迭奮亦嘗當户牖之法皇躬旰昃而前席故其讜言輿論有可尚焉若乃授經義以斥時病貢忠規而箴王闕吐發憤懣宣導壅閼誠哲王之所樂聞者焉漢晁錯為太子家令孝文詔有司舉賢良文學士錯在選中帝親策詔之曰惟十有五年九月壬子皇帝曰昔者大禹勤求賢士施及方外施延也音弋䜴切四極之内舟車所至人迹所及靡不聞命以輔其不逮近者獻其明逺者通厥聰比善戮力以翼天子比音頻寐切是以大禹能亡失徳夏以長楙高皇帝親除大害去亂從從音子容切亂從謂禍亂之蹤跡也一曰亂謂作亂者從謂合從者若六國時為從者也今書本從下或有順字或有治字皆非也後人妄加之矣並建豪英以為官師字或作帥音所類切為諫諍輔天子之闕而翼戴漢宗也頼天之靈宗廟之福方内以安澤及四夷今朕獲執天子之正以承宗廟之祀朕既不徳又不敏明弗能燭而智不能治此大夫之所著聞也故詔有司諸侯王三公九卿及主郡吏各師其志以選賢良明於國家之大體通於人事之始終及能直言極諌者各有人數將以輔朕之不逮二三大臣之行當此三道三道國體人事直言也朕甚嘉之故登大夫於朝親諭朕志大夫其上三道之要及永惟朕之不徳吏之不平政之不宣民之不寧四者之闕悉陳其志毋有所隐上以薦先帝之宗廟下以興愚民之休利著之於篇朕親覽焉觀大夫所以佐朕至與不至書之周之宻之重之閉之興自朕躬大夫其正論毋枉執事嗚虖戒之二三大夫其帥志毋怠晁錯對曰平陽侯臣窋曹窋參子也汝隂侯臣竈夏侯嬰子也廷尉臣宜昌隴西太守臣昆公孫昆邪也昆讀曰混所選賢良太子家令臣錯昧死再拜言臣竊聞古之賢主莫不求賢以為輔翼故黄帝得力牧而為五帝先力牧黄帝之佐也大禹得咎繇而為三王祖齊桓得莞子而為五覇長今陛下講於大禹及高皇帝之建豪英也退託於不明以求賢良讓之至也臣竊觀上古之傳若高皇帝建功業陛下之徳厚而得賢佐皆有司之所覽刻於玉版藏於金匱歴之春秋紀之後世為帝者祖宗與天地相終今臣窋等廼以臣錯充職甚不稱明詔求賢之意錯草茅臣無識知昧死上愚對曰詔䇿曰明於國家大體愚臣竊以古之五帝明之臣聞五帝神聖其臣莫能及故自親事處于法宫之中明堂之上法宫路寢正殿也動静上配天下順地中得人故衆生之類亡不復也根著之徒亡不載也有根著地者皆載之也著音直畧切燭以光明亡偏異也徳上及飛鳥下至水蟲草木諸産皆被其澤然後隂陽調四時節日月光風雨時膏露降甘露凝如膏五榖熟妖孽滅賊氛息民不疾疫河出圗雒出書神龍至鳳鳥翔徳澤滿天下靈光施四海此謂天地治國大體之功也詔䇿曰通於人事之終始愚臣竊以古之三王明之臣聞三王臣主俱賢故合謀相輔計安天下莫不本於人情人情莫不欲夀三王生而不傷也人情莫不欲富三王厚而不困也人情莫不欲安三王扶而不危也人情莫不欲逸三王節其力而不盡也其為法令也合於人情而後行之其動衆使民也本於人事然後為之取人以己内恕及人情之所惡不以强人情之所欲不以禁民是以天下樂其政歸其徳望之若父母從之若流水百姓和親國家安寧名位不失施及後世此明於人情終始之功也詔䇿曰直言極諌愚臣竊以五霸之臣明之臣聞五霸不及其臣故屬之以國任之以事五霸之佐之為人臣也察身而不敢誣奉法令不容私盡心力不敢矜遭患難不避死見賢不居其上受禄不過其量不以亡能居尊顯之位自行若此可為方正之士矣其立法也非以苦民傷衆而為之機䧟也以之興利除害尊主安民而救暴亂也其行賞也非虚取民財妄予人也以勸天下之忠孝而明其功也故功多者賞厚功少者賞薄如此歛民財以顧其功顧酬也若今言僱賃也而民不恨者知與而安己也其行罰也非以忿怒妄誅而從暴心也以禁天下不忠不孝而害國者也故辜大者罰重辜小者罰輕如此民雖服罪至死而不怨者知罰之至自取之也立法若此可謂平正之吏矣主法之逆者請而更之不以傷民主行之暴者逆而復之不以傷國救主之失補主之過揚主之美明主之功使主内亡邪辟之行外亡騫汚之名事君若此可謂直言極諌之士矣此五霸之所以得安天下威正諸侯功業甚美名聲章明舉天下之賢主五霸與焉此身不及其臣而使得直言極諌補其不逮之功也今陛下人民之衆威武之重徳惠之厚令行禁止之埶萬萬於五霸而賜愚臣䇿曰輔朕之不逮愚臣何足以識陛下之高明而奉承之詔䇿曰吏之不平政之不宣民之不寧愚臣竊以秦事明之臣聞秦主并天下之時其主不及三王而臣不及其佐然功力不遲者何也地形便山川利財用足民利戰其所與並者六國六國者臣主皆不肖謀不輯民不用故當此之時秦最富彊夫國富彊而鄰國亂者帝王之資也故秦能兼六國立為天子當此之時三王之功不能進焉及其末塗之衰也任不肖而信讒賊宫室過度耆慾亡極耆讀曰嗜民力罷盡賦歛不節罷讀曰疲矜奮自賢羣臣謟䛕驕溢縱恣不顧禍患妄賞以隨喜意妄誅以快怒心法令煩憯刑罰暴酷輕絶人命身自射殺天下寒心莫安其處姦邪之吏乗其亂法以成其威獄官主斷生殺自恣上下瓦解各自為制秦始亂之時吏之所先侵者貧人賤民也至其中節所侵者富人吏家也及其末塗所侵者宗室大臣也是故親踈皆危外内咸怨離散逋迯人有走心陳勝先倡天下大潰倡讀曰唱絶祀亡世為異姓福此吏不平政不宣民不寧之禍也今陛下配天象地覆露萬民覆䕃也露膏澤也絶秦之迹除其亂法躬親本事廢去滛末除苛解嬈嬈煩繞也音如紹切寛大愛人肉刑不用辠人亡孥非謗不治非讀曰誹鑄錢者除通闗去塞不孽諸侯接之以禮不以庶孽蓄之賓禮長老愛䘏少孤􅓧人有期罪人各以輕重不逃亡有年而免滿其年免為庶人也後宫出嫁尊賜孝弟農民不租明詔軍師愛士大夫求進方正廢退姦邪除去隂刑害民者誅憂勞百姓列侯就都親耕節用視民不奢所為天下興利除害變法易故以安海内者大功數十皆上世之所難及陛下行之道純徳厚元元之民幸矣詔䇿曰永惟朕之不徳愚臣不足以當之詔䇿曰悉陳其志毋有所隐愚臣竊以五帝之賢臣明之臣聞五帝其臣莫能及則自親之三王臣主俱賢則共憂之五霸不及其臣則任使之此所以神明不遺而賢聖不廢也故各當其世而立功徳焉傳曰徃者不可及來者猶可待能明其世者謂之天子此之謂也竊聞戰不勝者易其地民貧窮者變其業今以陛下神明徳厚資財不下五帝臨制天下至今十有六年民不益富盗賊不衰邊境未安其所以然者意陛下未之躬親而待羣臣也今執事之臣皆天下之選己然莫能望陛下清光譬之猶五帝之佐也陛下不自躬親而待不望清光之臣臣竊恐神明之遺言天子虚棄神明之徳日損一日嵗亡一嵗日月益暮盛徳不及究於天下以傳萬世愚臣不自度量竊為陛下惜之昧死上狂惑草茅之愚臣言惟陛下財擇時賈誼已死對䇿者百餘人惟錯為高第董仲舒廣川人孝景時為博士武帝即位舉賢良文學之士前後百數仲舒以賢良對䇿制曰朕獲承至尊休徳傳之亡窮而施之罔極任大而守重是以夙夜不皇康寧永惟萬事之統猶懼有闕故廣延四方之豪雋郡國諸侯公選賢良修潔博習之士欲聞大道之要至論之極今子大夫褎然為舉首褎弋授切盛服貌也朕甚嘉之子大夫其精心致思朕垂聽而問焉蓋聞五帝三王之道改制作樂而天下洽和百王同之當虞氏之樂莫盛於韶於周莫盛於勺聖王已没鐘皷筦絃之聲未衰而大道微缺陵夷至虖桀紂之行王道大壊矣夫五百年之間守文之君當塗之士欲則先王之法以戴翼其世者甚衆然猶不能反日以仆滅至後王而後止豈其所持操或誖謬而失其統與固天降命不可復反必推之於大衰而後息與烏虖凡所為屑屑夙興夜寐務法上古者又將無補與三代受命其符安在灾異之變何縁而起性命之情或夭或夀或仁或鄙習聞其號未燭厥理伊欲風流而令行刑輕而姦改百姓和樂政事宣昭何修何飾而膏露降百榖登徳潤四海澤臻草木三光全寒暑平受天之祐享神鬼之靈徳澤洋溢施虖方外延及羣生子大夫明先聖之業習俗化之變終始之序講聞高誼之日乆矣其明以諭朕科别其條勿猥勿并猥積也并合也欲其一二疏理而言取之於術慎其所出廼其不正不直不忠不極枉于執事書之不泄興于朕躬毋悼後害子大夫其盡心靡有所隠朕將親覽焉仲舒對曰陛下發徳音下明詔求天命與性情皆非愚臣之所能及臣謹按春秋之中視前世已行之事以觀天人相與之際甚可畏也國家將有失道之敗而天乃先出灾害以譴告之不知自省又出怪異以警懼之尚不知變而傷敗廼至以此見天心之仁愛人君而欲止其亂也自非大亡道之世者天盡欲扶持而安全之事在彊勉而已矣彊其兩切此下並同彊勉學問則聞見博而知益明彊勉行道則徳日起而大有功此皆可使還至而立有效者也還讀曰旋速也詩曰夙夜匪懈書曰懋哉懋哉皆彊勉之謂也道者所繇適於治之路也繇讀與由同繇從也適徃也仁義禮樂皆其具也故聖王已没而子孫長乆安寧數百嵗此皆禮樂敎化之功也王者未作樂之時廼用先王之樂宜於世者而以深入敎化於民敎化之情不得雅頌之樂不成故王者功成作樂樂其徳也樂者所以變民風化民俗也其變民也易其化人也著著明也易音弋䜴切著音竹筯切故聲發於和而本於情接於肌膚藏於骨髓故王道雖微缺而筦絃之聲未衰也夫虞氏之不為政乆矣然而樂頌遺風猶有存者是以孔子在齊而聞韶也夫人君莫不欲安存而惡危亡然而政亂國危者甚衆所任者非其人而所繇者非其道繇讀與由同是以政日以仆滅也夫周道衰於幽厲非道亡也幽厲不繇也至於宣王思昔先王之徳興滯補弊明文武之功業周道粲然復興詩人美之而作上天祐之為生賢佐後世稱誦至今不絶此夙夜不懈行善之所致也孔子曰人能𢎞道非道𢎞人也故治亂廢興在於己非天降命不可得反其所操持誖謬失其統也臣聞天之所大奉使之王者必有非人力所能致而自至者此受命之符也天下之人同心歸之若歸父母故天瑞應誠而至書曰白魚入於王舟有火復於王屋流為烏此蓋受命之符也周公曰復哉復哉孔子曰徳不孤必有鄰皆積善絫徳之效也絫古累字及至後世滛佚衰微不能統理羣生諸侯背叛殘賊良民以争壤土廢徳敎而任刑罰刑罰不中則生邪氣邪氣積於下怨惡畜於上畜讀曰畜聚也上下不和則隂陽謬盭而妖孽生矣盭古戾字孽灾也此灾異所縁而起也臣聞命者天之令也性者生之質也情者人之欲也或夭或夀或仁或鄙陶冶而成之不能粹美有治亂之所生故不齊也孔子曰君子之徳風小人之徳草草上之風必偃故堯舜行徳則民仁夀桀紂行暴則民鄙夭夫上之化下下之從上猶泥之在鈞唯甄者之所為猶金之在鎔惟冶者之所鑄綏之斯來動之斯和此之謂也臣謹按春秋之文求王道之端得之於正正次王王次春春者天之所為也正者王之所為也其意曰上承天之所為而下以正其所為正王道之端云爾然則王者欲有所為宜求其端於天天道之大者在隂陽陽為徳隂為刑刑主殺而徳主生是故陽常居大夏而以生育養長為事隂常居大冬而積於空虚不用之處以此見天之任徳不任刑也天使陽出布施於上而主嵗功使隂入伏於下而時出佐陽陽不得隂之助亦不能獨成嵗終陽以成嵗為名卒以陽成嵗尚徳不尚刑也此天意也王者承天意以從事故任徳敎而不任刑刑者不可任以治世猶隂之不可任以成嵗也為政而任刑不順於天故先王莫之肯為也今廢先王徳敎之官而獨任執法之吏治民毋乃任刑之意歟孔子曰不敎而誅謂之虐虐政用於下而欲徳敎之被四海故難成也臣謹按春秋謂一元之意一者萬物之所從始也元者辭之所謂大也謂一為元者視大始而欲正本也春秋深探其本而反自貴者始故為人君者先正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方四方正逺近莫敢不一於正而無有邪氣奸其間者奸犯也音干是以隂陽調而風雨時羣生和而萬民殖五榖熟而草木茂天地之間被潤澤而大豐美四海之内聞盛徳而皆來臣諸福之物可致之祥莫不畢至而王道終矣孔子曰鳳鳥不至河不出圗吾已矣夫自悲可致此物而身卑賤不得致也今陛下貴為天子富有四海居得致之位操可致之勢乂有能致之資行高而恩厚知明而意美愛民而好士可謂誼主矣然天地未應美祥莫至者何也凡以教化不立而萬民不正也夫萬民之從利也如水之走下不以敎化隄防之不能止也是故教化立而姦邪皆止者其隄防完也教化廢而姦邪並出刑罰不能勝者其隄防壊也古之王者明於此是故南面而治天下莫不以敎化為大務立太學以敎於國設庠序以化於邑漸民以仁摩民以義節民以禮故其刑罰甚輕而禁不犯者敎化行而習俗美也聖王之繼亂世也掃除其迹而悉去之復修教化而崇起之敎化已明習俗已成子孫循之行五六百嵗尚未敗也至周之末世大為亡道以失天下秦繼其後獨不能改又益甚之重禁文學不得挾書棄捐禮誼而惡聞之其心欲盡滅先聖之道而顓為自恣茍簡之治茍謂茍於權利也簡謂簡於仁義也顓與端同故立為天子十四嵗而國破亡矣自古以來未嘗有以亂濟亂大敗天下之民如秦者也其遺毒餘烈至今未滅使習俗薄惡人民囂頑抵冐殊扞扞完熟爛如此之甚者也孔子曰腐朽之木不可雕也糞土之墻不可圬也今漢繼秦之後如朽木糞墻也雖欲善治之無可奈何法出而姦生令下而詐起如以湯止沸抱薪救火愈甚無益也竊譬之琴瑟不調甚者必觧而更張之乃可皷也為政而不行甚者必變而更化之乃可理也當更張而不更張雖有良工不能善調也當更化而不更化雖有大賢不能善治也故漢得天下以來常欲善治而至今不可善治者失之於當更化而不更化也古人有言曰臨淵羡魚不如退而結網今臨政而願治七十餘嵗矣不如退而更化更化則可善治善治則灾害日去福禄日來詩云宜民宜人受禄于天為政而宜於民者固當受禄于天夫仁義禮智信五常之道王者所當修飾也五者修飾故受天之祐而享鬼神之靈徳施於方外延及羣生也天子覽其對而異焉乃復䇿之制曰蓋聞虞舜之時游於巖廊之上垂拱無為而天下太平周文王至於日昃昃與昃同不暇食而宇内亦治夫帝王之道豈不同條共貫與何逸勞之殊也蓋儉者不造𤣥黄旌旗之飾及至周室設兩觀乗大路朱干玉戚八佾陳於庭而頌聲興夫帝王之道豈異指哉或曰良玉不琢琢謂刻為文音篆又曰非文亡以輔徳二端異焉殷人執五刑以督姦傷肌膚以懲惡成康不式式用也四十餘年天下不犯囹圄空虛秦國用之死者甚衆刑者相望耗矣哀哉烏虖虖讀曰呼朕夙寤晨興惟前帝王之憲永思所以奉至尊章洪業皆在立本任賢今朕親耕籍田以為農先勸孝悌崇有徳使者冠蓋相望問勤勞恤孤獨盡思極神功烈休徳未始云獲也今隂陽錯繆氛氣充塞羣生寡遂黎民未濟㢘恥貿亂賢不肖混淆未得其真故詳延特起之士意庶幾乎今子大夫待詔百有餘人或道世務而未濟稽諸上古之不同考之於今而難行毋乃牽於文繁而不得騁與將所繇異術所聞殊方與各悉對著於篇無諱有司明其指略切磋究之以稱朕意仲舒對曰臣聞堯受命以天下為憂而未以位為樂也故誅逐亂臣務求賢聖是以得舜禹稷卨咎繇衆聖輔徳賢能佐職敎化大行天下和洽萬民皆安仁樂義各得其宜動作應禮從容中道故孔子曰如有王者必世而後仁此之謂也堯在位七十載廼遜于位以禪虞舜堯殂天下不歸堯子丹朱而歸舜舜知不可辟辟讀曰避乃即天子之位以禹為相因堯之輔佐繼其統業是以垂拱無為而天下治孔子曰韶盡美矣又盡善也此之謂也至于殷紂逆天暴物殺戮賢能殘賊百姓伯夷太公皆當世賢者隠處而不為臣守職之人皆奔走逃亡入於河海天下耗亂萬民不安故天下去殷而從周文王順天理物師用賢聖是以閎夭太顛散宜生等亦聚於朝廷愛施萬民天下歸之故太公起海濱而即三公也當此之時紂尚在上尊卑昬亂百姓散亡故文王悼痛而欲安之是以日昃而不暇食也孔子作春秋先正王而繫萬事見素王之文焉繇此觀之帝王之條貫同然而勞逸異者所遇之時異也孔子曰武盡美矣未盡善也此之謂也臣聞制度文采𤣥黄之飾所以明尊卑異貴賤而勸有徳也故春秋受命而所先制者改正朔易服色所以應天也然則宫室旌旗之制有法而然者也故孔子曰奢則不孫儉則固儉非聖人之中制也臣聞良玉不琢資質潤美不待刻琢此亡異於逹巷黨人不學而自知也人項槖也然則良玊不琢不成文章君子不學不成其徳臣聞聖王之治天下也少則習之學長則材諸位爵禄以養其徳刑罰以威其惡故民曉於禮義而恥犯其上武王行大義平殘賊周公作禮樂以文之至於成康之隆囹圄空虚四十餘年此亦敎化之漸而仁義之流非獨傷肌膚之效也至秦則不然師申商之法行韓非之説憎帝王之道以貪狼為俗狼性皆貪故謂貪為貪狼也非有文徳以敎訓於天下也誅名而不察實為善者不必免而犯惡者未必刑也是以百官皆飾虚辭而不顧實外有事君之禮内有背上之心造偽飾詐趣利無恥又好用憯酷之吏憯痛也音千感切賦歛無度竭民財力百姓㪚亡不得從耕織之業羣盗並起是以刑者甚衆死者相望而姦不息俗化使然也故孔子曰導之以政齊之以刑民免而無恥此之謂也今陛下并有天下海内莫不率服廣覽兼聴極羣下之知盡天下之羙至徳昭然施於方外夜郎康居殊方萬里説徳歸義此太平之致也然而功不加於百姓者殆王心未加焉曽子曰尊其所聞則高明矣行其所知則光大矣高明光大不在於他在乎加之意而已願陛下因用所聞設誠於内而致行之則三王何異哉陛下親耕籍田以為農先夙寤晨興憂勞萬民思惟徃古而務以求賢此亦堯舜之用心也然而未云獲者士素不厲也夫不素養士而欲求賢譬如不琢玉而求文采也故養士之大者莫大乎太學太學者賢士之所闗也教化之本原也今以一郡一國之衆對亡應書者是王道徃徃而絶也臣願陛下興太學置明師以養天下之士數考問以盡其材則英俊宜可得矣今之郡守縣令民之師帥所使承流而宣化也故師帥不賢則主徳不宣恩澤不流今吏既亡教訓於下或不承用主上之法暴虐百姓與姦為市貧窮孤弱寃苦失職甚不稱陛下之意是以隂陽錯繆氛氣充塞羣生寡遂黎民未濟皆長吏不明使至於此也夫長吏多出於郎中中郎吏二千石子弟選郎吏乂以富訾未必賢也且古所謂功者以任官稱職為差非謂積日絫乆也故小材雖絫日不離於小官賢材雖未乆不害為輔佐是以有司竭力盡知務治其業而以赴功今則不然絫日以取貴積乆以致官是以亷恥貿亂賢不肖渾淆未得其真臣愚以為使諸列侯郡守二千石各擇其吏民之賢者嵗貢各二人以給宿衛且以觀大臣之能所貢賢者有賞所貢不肖者有罰夫如是諸侯吏二千石皆盡心於求賢天下之士可得而官使也徧得天下之賢人則三王之盛易為而堯舜之名可及也毋以日月為功實試賢能為上量材而授官録徳而定位則亷恥殊路賢不肖異處矣陛下加恵寛臣之罪令勿牽制於文使得切磋究之臣敢不盡愚於是天子復册之制曰蓋聞善言天者必有徴於人善言古者必有驗於今故朕垂問虖天人之應上嘉唐虞下悼桀紂寖微寖滅寖明寖昌之道虚心以改今子大夫明於隂陽所以造化習於先聖之道業然而文采未極豈惑虖當世之務哉條貫靡竟統紀未終意朕之不明與聴若眩與夫三王之敎所祖不同而皆有失或謂乆而不易者道也意豈異哉今子大夫既已著大道之極陳治亂之端矣其悉之究之熟之復之詩不云虖嗟爾君子毋恒安息神之聼之介爾景福朕將親覽焉子大夫其茂明之仲舒復對曰臣聞論語曰有始有卒者其惟聖人乎今陛下幸加恵留聴於承學之臣復下明冊以切其意而究盡聖徳非愚臣之所能具也前所上對條貫靡竟統紀不終辭不别白指不分明此臣淺陋之罪也冊曰善言天者必有徴於人善言古者必有驗於今臣聞天者羣物之祖也故徧覆包涵而無所殊建日月風雨以和之經隂陽寒暑以成之故聖人法天而立道亦溥愛而亡私布徳施仁以厚之設義立禮以導之春者天之所以生也仁者君之所以愛也夏者天之所以長也徳者君之所以養也霜者天之所以殺也刑者君之所以罰也繇此言之天人之徴古今之道也孔子作春秋上揆之天道下質諸人情參之於古考之於今故春秋之所譏灾害之所加也春秋之所惡恠異之所施也書邦家之過兼灾異之變以此見人之所為其美惡之極乃與天地流通而徃來相應此亦言天之一端古者修敎訓之官務以徳善化民民已大化之後天下常亡一人之獄今世廢而不修亡以化民民以故棄行義而死財利是以犯法而罪多一嵗之獄以萬千數以此見古之不可不用也故春秋變古則譏之天令之謂命命非聖人不行質樸之謂性性非教化不成人欲之謂情情非制度不節是故王者上謹於承天意以順命也下務明敎化民以成性也正法度之宜别上下之序以防欲也修此三者而大本舉矣人受命於天固超然異於羣生入則有父子兄弟之親出則有君臣上下之誼㑹聚相遇則有耆老長㓜之施粲然有文以相接驩然有恩以相愛此人之所以貴也生五榖以食之桑麻以衣之六畜以養之服牛乗馬圏豹檻虎是其得天之靈貴於物也故孔子曰天地之性人為貴明於天性知自貴於物知自貴於物然後知仁義知仁義然後重禮節重禮節然後安處善安處善然後樂循理樂循理然後謂之君子故孔子曰不知命亡以為君子此之謂也䇿曰上嘉唐虞下悼桀紂寖微寖滅寖明寖昌之道朕虚心以改臣聞之聚少成多積小致鉅故聖人莫不以腌致明以微致顯是以堯發於諸侯舜興虖深山非一日而顯也蓋有漸以致之矣言出於己不可塞也行發於身不可掩也言行治之大者君子之所以動天地也故盡小者大慎微者著詩云惟此文王小心翼翼故堯兢兢日行其道而舜業業日致其孝善積而名顯徳章而身尊此其寖明寖昌之道也積善在身猶長日加益而人不知也積惡在身猶火之銷膏而人不見也非明虖情性察虖流俗者孰能知之此唐虞之所以得令名而桀紂之可為悼懼者也夫善惡之相從如影響之應形聲也故桀紂暴慢殘賊並進賢知隠伏惡日顯國日亂晏然自以如日在天終陵夷而大壊夫暴逆不仁者非一日而亡也亦以漸至故桀紂雖亡道然猶享國十餘年此其寖微寖滅之道也冊曰三王之道教所祖不同而皆有失或謂乆而不易者道也意豈異哉臣聞夫樂而不亂復而不厭者謂之道道者萬世亡弊弊者道之失也先王之道必有偏而不起之處故政有眊而不行舉其偏者以補其弊而已矣三王之道所祖不同非其相反將以捄溢扶衰所遭之變然也捄古救字故孔子曰亡為而治者其舜乎改正朔易服色以順天命而已其餘盡循堯道何更為哉故王者有改制之名亡變道之實然夏上忠殷上敬周上文者所繼之捄當用此也孔子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世可知也此言百王之用以此三者矣夏因於虞而獨不言所損益者其道如一而所上同也道之大原出於天天不變道亦不變是以禹繼舜舜繼堯三聖相受而守一道亡救弊之政故不言其所損益也繇是觀之繼治世者其道同繼亂世者其道變今漢繼大亂之後若宜少損周之文致用夏之忠者陛下有明徳嘉道愍世俗之靡薄悼王道之不昭故舉賢良方正之士論誼考問將欲興仁義之休徳明帝王之法制建太平之道也臣愚不肖述所聞誦所學道師之言厪能勿失爾若乃論政事之得失察天下之息耗此大臣輔佐之職三公九卿之任非臣仲舒所能及也然而臣竊有怪者夫古之天下亦今之天下今之天下亦古之天下共是天下古亦大治上下和睦習俗美盛不令而行不禁而止吏亡姦邪民亡盜賊囹圄空虚徳潤草木澤被四海鳳凰來集麒麟來游以古準今一何不相逮之逺也安所繆盭而陵夷若是意者有所失於古之道與有所詭於天之理與試迹之古返之於天儻可得見乎夫天亦有所分予予之齒者去其角傳其翼者兩其足是所受大者不得取小也古之所予禄者不食於力不勤於末是亦受大者不得取小與天同意者也夫已受大又取小天不能足而况人虖此民之所以囂囂苦不足也囂讀與嗸同音敖嗸嗸衆怨愁之聲也身寵而載高位家温而食厚禄因乗富貴之資力以與民争利於下民安能知之哉是故衆其奴婢多其牛羊廣其田宅博其産業畜其積委務此而亡已以廹蹵民民日削月脧脧音楦謂轉寨踧也寖以大窮富者奢侈羡溢貧者窮急愁苦窮急愁苦而上不救則民不樂生民不樂生尚不避死安能避罪此刑罰之所以蕃而姦邪不可勝數也故受禄之家食禄而已不與民争業然後利可均布而民可家足此上天之理亦大古之道天子之所宜法以為制大夫之所當循以為行也故公儀子相魯之其家見織帛怒而出其妻食於舎而茹葵愠而㧞其葵曰吾已食禄又奪園夫紅女利虖紅讀曰工古之賢人君子在列位者皆如是是故下高其行而從其教民化其廉而不貪鄙及至周室之衰其卿大夫緩於誼而急於利亡推讓之風而有争田之誦故詩人疾而刺之曰節彼南山維石巖巖赫赫師尹民具爾瞻爾好義則民鄉仁而俗善爾好利則民好邪而俗敗繇是觀之天子大夫者下民之所視效逺方之所四面而内望也近者視而倣之逺者望而效之豈可以居賢人之位而為庶人行哉夫皇皇求財利常恐乏匱者庶人之意也皇皇求仁義常恐不能化民者士大夫之意也易曰負且乗致寇至乘車者君子之位也負檐者小人之事也此言居君子之位而為庶人之行者其患禍必至也若居君子之位當君子之行則舎公儀休之相魯亡可為者矣春秋大一統者天地之常經古今之通誼也今師異道人異論百家殊方指意不同是以上亡以持一統法制數變下不知所守臣愚以為諸不在六藝之科孔子之術者皆絶其道勿使並進邪辟之説滅息然後統紀可一而法度可明民知所從矣仲舒對既畢天子以仲舒為江都相自武帝初立魏其武安侯為相而隆儒矣及仲舒對䇿推明孔氏抑黜百家立學較之官較音校下敎切州郡舉茂材孝亷皆自仲舒發之公孫𢎞菑川人武帝初即位𢎞年六十以賢良徴為博士移病免歸元光五年徴賢良文學菑川國復推上𢎞𢎞謝曰前已嘗西用不能罷願更選國人固推𢎞𢎞至大常上䇿詔諸儒制曰蓋聞上古至治畫衣冠異章服而民不犯隂陽和五穀登六畜蕃甘露降風雨時嘉禾興朱草生山不童澤不涸童無草木也涸水竭也胡各切麟鳳在郊藪龜龍游於沼河雒出圗書父不喪子兄不哭弟北發渠捜南撫交趾舟車所至人迹所及跂行喙息咸得其宜跂行有足而行者也喙謂有口能息者也跂音岐喙音許穢切朕甚嘉之今何道而臻乎此子大夫修先聖之術明君臣之義講論洽聞有聲乎當世敢問子大夫天人之道何所本始吉㓙之效安所期焉禹湯水旱厥咎何繇仁義禮智四者之宜當安設施属統垂業物鬼變化天命之符廢興何如天文地理人事之紀子大夫習焉其悉意正議詳具其對著之於篇朕將親覽焉靡有所隠𢎞對曰臣聞上古堯舜之時不貴爵賞而民勸善不重刑罰而民不犯躬率以正而遇民信也末世貴爵厚賞而民不勸深刑重罰而姦不止其上不正遇民不信也夫厚賞重刑未足以勸善而禁非必信而已矣是故因能任官則分職治去無用之言則事情得不作無用之噐則賦歛省不奪民時不妨民力則百姓富有徳者進無徳者退則朝廷尊有功者上無功者下則羣臣逡言有次第也逡音七旬切其字從延罰當罪則姦邪止賞當賢則臣下勸凡此八者治民之本也故民者業之即不争理得則不怨有禮則不暴愛之則親上此有天下之急者也故法不逺義則民服而不離和不逺禮則民親而不暴故法之所罰義之所去也和之所賞禮之所取也禮義者民之所服也而賞罰順之則民不犯禁矣故畫衣冠異章服而民不犯者此道素行也臣聞之氣同則從聲比則應今人主和徳於上百姓和合於下故心和則氣和氣和則形和形和則聲和聲和則天地之和應矣故隂陽和風雨時甘露降五榖登六畜蕃嘉禾興朱草生山不童澤不涸此和之至也故形和而無疾無疾則不夭故父不喪子兄不哭弟徳配天地明並日月則麟鳳至龜龍在郊河出圗雒出書逺方之君莫不説義奉幣而來朝此和之極也臣聞之仁者愛也義者宜也禮者所履也智者術之原也致利除害兼愛無私謂之仁明是非立可否謂之義進退有度尊卑有分謂之禮擅生殺之柄通壅塞之塗權輕重之數論得失之道使逺近情偽必見於上謂之術凡此四者治之本道之用也皆當設施不可廢也得其要則天下安樂法設而不用不得其術則主蔽於上官亂於下此事之情属綂垂業之本也臣聞堯遭洪水使禹治之未聞禹之有水也若湯之旱則桀之餘孽也桀紂行惡受天之罰禹王積徳以王天下因此觀之天徳無私親順之和起逆之害生此天文地理人事之紀臣𢎞愚贛不足以奉大對大對大問之對也時對者百餘人大常奏𢎞第居下䇿奏天子擢𢎞對為第一召見容貎甚麗拜為博士𢎞復上疏曰陛下有先聖之位而無先聖之名有先聖之民而無先聖之吏是以勢同而治異先世之吏正故其民篤今世之吏邪故其民薄政弊而不行令倦而不聽夫使邪吏行弊政用倦令治薄民民不可得而化此治之所以異也臣聞周公旦治天下朞年而變三年而化五年而定惟陛下所志書奏天子以冊書答曰問𢎞稱周公之治𢎞之材能自視孰與周公賢與猶如也𢎞對曰愚臣淺薄安敢比材於周公雖然愚曉然見治道之可以然也夫虎豹馬牛禽獸之不可制者也及其教馴服習之馴順也至可牽持駕服惟人之從從人意臣聞揉曲木者不累日揉謂矯而正之也累積也揉音人九切銷金石者不累月夫人之於利害好惡豈比禽獸木石之類哉好音呼到切惡音一故切朞年而變臣𢎞尚切遲之帝異其言冊府元龜卷六百四十六
