body:
  text: 冊府元龜卷六百五十五宋王欽若等撰奉使部智識夫入國知教足以辯其興衰目擊道存可以察其禍福斯君子之表微哲人之先覺者也中古而下蓋有膺使乎之選當出疆之任或奉辭絶域或修聘鄰邦或慰勞軍戎或巡行郡邑以至接酬宴之好覿政治之範察言行而辯淑慝覽形勢而洞權變明其措置之損益識其事機之成敗詳䆒國體翼宣王度自非沉謀内藴遠慮兼至澄止水之鑒而不撓包周物之智而旁通又曷能見於未萌若符契而可騐斷夫大事䫫丹青之皎然哉仲孫湫為大夫齊侯使湫省魯難仲孫歸曰不去慶父魯難未已時慶父已還魯公曰若之何而去之對曰難不已將自斃君其待之公曰魯可取乎對曰不可猶秉周禮周禮所以本也臣聞之國將亡本必顛而後枝葉從之魯不棄周禮未可動也君其務寧魯難而親之親有禮因重固能重能固則當就成之間擕貳離而相欵者則當因而間之覆昏亂覆敗也覇王之噐也覇王所用以噐為喻叔興為周内史襄王使太宰文公及興賜晉文公命太宰文公王卿士王子虎也命服也諸侯七命冕服七章上卿逆于境逆迎晉侯郊勞郊迎用辭勞也館諸宗廟館舍也舍宗廟尊王命饋九牢牛羊豕為一牢上公饔餼九牢設庭燎設大燭於庭及期命于武宮期將事之日武宮文公之祖武公之廟命受王命設桑主布几筵主献公之主練主用粟虞主用桑禮既葬而献公死已久於此設之者文不次繼於惠懐虞故立献公之主自以子繼父之位行未踰年之禮筵席也太宰莅之晉侯端委以入説云衣𤣥端冠委貌諸侯祭服也韋昭謂此士服也諸侯之子未受爵命服士服太宰以王命命冕服冕大冠服鱉服内史贊之三命而後即冕服三以王命命文公文公三讓而後就既畢賔饗贈餞如公命侯伯之禮而加之以宴好賔者主人所以接賔致饗饔之屬也如公受王命以侯自待之禮太宰上卿而言公者尊之是也内史興歸以告王曰晉不可不善也其君必覇逆王命敬謂小卿逆於竟晉侯郊勞奉禮義成謂三讓賔饗之屬皆如禮敬王命順之道也成禮義徳之則也則徳以道諸侯諸侯必歸之道訓且禮所以觀忠信仁義也能行禮則有此四者忠所以分也心忠則不偏仁所以行也行仁則有思也信所以守也守信則不貳義所以節也制事之節忠分則均仁行則報信守則固義節則度得其度也分均無怨行報無匱守固不偷偷茍且也節度不擕其何事不濟臣入晉境四者亡失四者忠信仁義臣故曰晉侯其能禮矣王其善之樹於有禮艾人必豐樹種也艾報也豐厚也王從之使於晉者道相逮也逮及及惠后之難王出在鄭惠后周惠王之后襄王繼母陳媯也媯有寵生子𢃄將立之未及而卒子𢃄奔齊王復之又通襄王之后隗氏王廢隗氏周大夫頽叔桃子奉子𢃄以翟師伐周王適鄭處于泥事在魯僖公二十四年晉侯納之納王於周殺子𢃄在僖二十五年於是乎始覇劉康公為卿士定王八年使康公聘于魯劉畿内之國康公王卿士王季子發幣於大夫發其禮幣於魯大夫季文子孟獻子皆儉二子魯卿文子齊仲無扶之子季孫行父也獻子孟文伯歜之子仲孫蔑儉居處節儉也叔孫宣子東門子家皆侈二子魯大夫宣子莊叔得臣之子叔孫僑如子家東門襄仲之子公孫歸父也歸王問魯大夫孰賢對曰季孟其長處魯乎叔孫東門其亡乎若家不亡身必不免王曰何故對曰臣聞之為臣必臣為君必君寛肅宣惠君也肅整也宣徧也惠愛也敬恪恭儉臣也其何事不徹徹逹也其何任不堪上作事而徹下能堪其任所以為令聞長世也長世多厯年今夫二子者儉其能足用矣用足則族可以庇庇復也恭儉節用無取於民國人説之故其宗族可以覆䕃也二子者侈侈則不恤匱匱而不恤憂必及之志在奢侈不恤人之窮匱故憂患必及若是則必廣其身廣大務自矜大不顧其上且夫臣人而侈國家弗堪亡之道也王曰其幾何對曰東門之位不若叔孫而㤗侈不可以事二君東門大夫叔孫卿也位在人下而侈其上重而無基故不可以事二君叔孫之位不若季孟而亦㤗侈焉不可以事三君叔孫下卿季孟上卿若皆蚤世猶可蚤世即世也其家猶可以免若登年以載其毒必亡登年多厯年也載行也必亡家必亡也及魯宣公卒定公十六年赴者不反東門氏來告亂子家奔齊東門子家謀去三桓如晉未反宣公卒三桓逐其家遂奔齊簡王之十一年魯叔孫宣伯亦奔齊簡王定王之子者宣伯僑如也叔孫婼魯大夫昭子也聘于宋桐門右師見之右師樂大心居桐門語卑宋大夫而賤司城氏司城樂氏之大宗也卑賤謂其才徳薄昭子告其人曰右師其亡乎君子貴其身而後能及人是以有禮唯禮可以貴身貴身故尚禮今夫子卑其大夫而賤其宗是賤其身也賤人人亦賤矣能有禮乎無禮必亡為定十年樂大心出吳公子札聘于魯見叔孫穆子說之謂穆子曰子其不得死乎不得以夀死好善而不能擇人吾聞君子務在擇人吾子為魯宗卿而任其大政不慎所舉何以堪之禍必及子為昭四年竪牛亂起本聘于齊說晏平仲謂之曰子速納邑與政無邑無政乃免於難齊國之政將有所歸未獲所歸難未歇也故晏子因陳桓子以納政與邑是以免於欒高之難難在昭八年聘於鄭見子産如舊相識與之縞𢃄子産獻紵衣焉大𢃄也吴地貴縞鄭地貴紵故各獻已所貴示損己而不為彼貨利謂子産曰鄭之執政者侈難將至矣必及子子為政慎之以禮不然鄭國將敗侈謂伯有也韓宣子為晉大夫如楚送女叔向為介鄭子皮子太叔勞諸索氏太叔謂叔向曰楚王汰侈已甚子其戒之叔向曰汰侈已甚身之災也焉能及人若奉吾幣帛慎吾威儀守之以信行之以禮敬始而思終終無不復行而不失儀敬而不失威導之以訓詞奉之以舊法考之以先王度之以二國雖汰侈若我何范昭齊人晉平公欲伐齊使范昭徃觀焉景公賜之酒酣范昭曰願請君之樽酌景公曰酌寡人之樽進之於客范昭已飲晏子曰徹樽更之樽觯具矣范昭佯醉不説而起舞謂太師曰能為我調成周之樂乎吾為舞之太師曰愚臣不習范昭趨而出景公謂晏子曰晉大國也使人來觀政也今子怒大國之使者將柰何晏子曰夫范昭之為人非陋而不識禮也且欲試吾君臣故絶之也景公謂太師曰子何以不為客調成周之樂乎太師對曰夫成周之樂天子之樂也若調之必人主舞之今范昭人臣也而欲舞天子之樂臣故不為也范昭歸以告平公曰齊未可伐也臣欲試其君而晏子識之臣欲犯其禮而太師知之仲尼聞之曰夫不出於樽爼之間而知千里之外其晏子之謂也可謂折衝矣而太師其與焉漢劉敬為郎中號奉春君韓王信反高帝自徃擊至晉陽聞信與匈奴欲擊漢帝大怒使人使匈奴匿其壯士肥牛馬徒見其老弱及羸畜使者十軰來皆言匈奴易擊帝使劉敬復徃使匈奴還報曰両國相擊此宜夸矜見其所長今臣徃徒見羸胔老弱胔讀曰瘠瘠痩也此必欲見短伏竒兵以争利愚以為匈奴不可擊也是時漢兵以踰句注三十餘萬句注山名在鴈門兵已業行帝怒罵敬曰齊虜以口舌得官迺今妄言沮吾軍沮材汝切械繫敬廣武械謂桎梏也廣武縣名屬鴈門遂徃至平城匈奴果出奇兵圍高帝白登七日然後得解高帝至廣武赦敬曰吾不用公言以困平城吾已斬先使十軰言可擊者矣迺封敬三千户為關内侯號建信侯汲黯為謁者東越相攻武帝使黯徃視之不至吳而還報曰越人相攻固其俗不足以辱天子之使公孫𢎞待詔金馬武帝時方通西南夷巴蜀苦之詔使𢎞視焉還奏事盛毁西南夷無所用帝不聽後終以開西南夷為勤勞魏衛覬為尚書郎太祖征袁紹而劉表為紹援關中諸將又中立益州牧劉璋與表有隙覬以治書侍御史使益州令璋下兵以綴表軍至長安道路不通覬不得進遂留鎮關中時四方大有還民關中諸將多引為部曲覬書與尚書令荀彧曰關中膏膄之地頃遭荒亂人民流入荆州者十萬餘家聞本土安寧皆企望思歸而歸者無以自業諸將各競招懐以為部曲郡縣貧弱不能與争兵家遂彊一旦變動必有後憂夫監國之大寳也自亂來放散宜如舊置使者監賣以其直益市犂牛若有歸民以供給之勤耕積粟以豊殖關中遠民聞之必日夜競還又使司𨽻校尉留治關中以為之主則諸將日削日盛此彊本弱敵之利也或以白太祖太祖從之始遣謁者僕射監監官司𨽻校尉治𢎞農關中服從乃白召覬還吳沈珩大帝時為西曺掾使魏還言曰臣宻參侍中劉曄數為賊設姦計終不久慤臣聞兵家舊論不恃敵之不我犯恃我之不可犯今為朝廷慮之且當省息他役惟務農桑以廣軍資修繕舟車増作戰具令皆兼盈撫養兵民使各得其所挈延英雋奬勵將士則天下可圖矣以奉使有稱封永安鄉侯官至少府薛珝為五官中郎將遣至蜀求馬及還景帝問蜀政得失對曰主闇而不知其過臣下容身以求免罪入其朝不聞正言經其野民皆菜色臣聞燕雀處堂子母相樂自以為安也突决棟焚而燕雀怡然不知禍之將及其是之謂乎後梁柳莊為鴻臚卿及隋文帝輔政明帝令莊奉書入關時三方搆難隋文懼帝有異志及莊還謂曰孤昔以開府從役江陽深蒙梁主殊眷今主㓜時難猥蒙顧託梁主奕葉重光委誠朝廷而今已後方見松筠之節君還申孤此意於梁主也遂執莊手而别時梁將帥咸請與尉遲􅒯連衝進可盡節於周氏退可席卷南山唯帝疑不可㑹莊至自長安申隋文結託之意遂言於帝曰今尉遲逈雖曰舊將昏耄已甚消難王謙消難姓司馬常人之下者非有紏合之才况山東庸蜀從化日近周氏之恩未洽於朝廷臣料之逈等終當覆滅隋公必移周國未若保境息人以觀其變帝深以為然未㡬消難奔陳逈及謙相次就戮帝謂莊曰近若從衆言社稷已不守矣後魏秦王翰之子儀有筭畧道武將圖慕容垂遣儀觀釁及還報曰垂死乃可圖今則未可帝作色問之儀曰垂年已暮其子寳弱而無威謀不能决慕容德自負才氣非弱主之臣釁將内起是可計之帝以為然元洪超武邑公受洛之孫頗有學渉乗賊亂之後詔洪超持節兼黄門侍郎綏慰冀部還上言冀土寛廣界去州六七百里負海險遠宜分置一州鎮遏海曲朝議從之後遂立滄州李順為四部尚書使沮渠蒙遜還太武問與蒙遜徃復之辭及蒙遜政教得失順曰蒙遜專威河右三十許年經渉艱難粗識機變又綏集荒陬遠人頗亦畏服雖不能貽厥孫謀猶足以終其一世前嵗表許十月送曇無䜟及臣徃迎便乖本意不忠不信於是而甚禮者身之輿敬者行之本未有無禮不敬而能乆享福禄以臣觀之不復周嵗矣太武曰若如卿言則効在久遠其子必復襲世之後早晩當滅順對曰臣畧見其子並非才雋豈能保一隅如聞燉煌太守牧揵噐性粗立若繼蒙遜者必此人也然比之於父僉云不逮殆天所用資聖明也太武曰朕今方事于東未暇營西如卿所言五三年間不足為晩且停前計以為後圖既而蒙遜死問至太武謂順曰言蒙遜死今則驗矣又言揵立何其妙哉朕尅凉州亦當不遠源懐宣武時為車騎大將軍持節巡行北邉因上表曰景明以來北蕃連年災旱高原陸野不任營殖唯有水田少可菑畆然主將叅僚專擅膄美瘠土荒疇以給百姓因此困弊日月滋甚諸鎮水田請依地令分給細民先貧後富若分付不平令一人怨訟者鎮將已下連署之官各奪一時之禄四人已上奪禄一周北鎮邉蕃事異諸夏徃日置官全不差别沃野一鎮自將已下八百餘人黎庶怨咨僉曰煩猥邉隅事尠實少畿服請主帥吏佐五分減二詔曰省表具恤民之懐已勑有司一依所上下為永准如斯之比不便於民損化害政者其備列以聞時細民為豪彊陵壓積年枉滯一朝見申者日有百數所上事宜便於北邉者凡四十條皆見嘉納辛雄孝莊初為度支尚書兼侍郎中闗西慰勞大使將發請事五條一言逋懸租調宜悉不徴二言簡罷非時役徭以紓民命三言課調之際使豐儉有殊令州郡量檢不得均一四言兵起厯年死亡者衆或父或子辛酸未歇見存耆老請假板職悅生者之意慰死者之魂五言喪亂既久禮儀罕習如有閨門和穆孝悌卓然者宜表其門閭仍啟曰臣聞王者愛民之道有六一曰利之二曰成之三曰生之四曰與之五曰樂之六曰喜之民不失其時則成之也省刑罰則生之也薄賦歛則與之也無多徭役則樂之也吏静不苛則喜之也伏惟陛下道邁前王功超徃代敷春風而鼓俗旌至德以調民生之養之正當茲日悦近來遠亦是今時臣既忝將命宣揚聖澤前件六事謂所宜行若不除煩救疾惠孤恤寡便是徒乗官驛虗號王人徃還有費於郵亭皇恩無逮於民俗謹率愚管敢以陳聞乞垂覽許帝從之因詔民七十者授縣八十者授郡九十加四品將軍年百嵗從三品將軍北齊封隆之為東魏尚書右僕射孝静武定初北豫州刺史高仲宻將叛遣使隂通消息於冀州豪望使為内應輕薄之情頗相扇動詔隆之馳驛慰撫遂得安静文襄宻書與隆之云仲宻枝黨同惡向西者宜悉收其家累以懲將來隆之以恩㫖既行理無追改今若收治示民不信脱或驚擾所虧處大乃啟神武事遂得停後周張軌為都督從太祖征侯莫陳悦悦平使于雒陽見領軍斛斯椿曰高歡逆謀已傳行路人情西望以日為年未知宇文何如賀㧞也軌曰宇文公文足經國武可定亂至於高識遠度非愚所測椿曰誠如卿言真可恃也楊尚希為東京司憲中大夫宣帝時令尚希撫慰山東河北至相州聞國哀與相州總管尉遲逈發哀於館尚希出謂左右曰蜀公哭不哀而視不安將有他計吾不去將及於難遂夜中從㨗徑而遁遲明逈方覺令數十騎路追之不及遂歸京師隋高祖以尚希宗室之望又背逈而至待之甚厚隋薛道衝高祖時為内史舍人兼散騎常侍聘陳使因奏曰江東蕞爾一隅僭擅遂久實由永嘉已後華夏分離劉石符姚慕容赫連之軰妄竊名號尋亦滅亡魏氏自北徂南未遑遠畧周齊兩立務在兼并所以江表逋誅積有年紀陛下聖徳天挺光膺寳祚比隆三代平一九州豈容使區區之陳久在天網之外臣今奉使請責以稱藩高祖曰朕且含飬置之度外勿以言辭相折識朕意焉唐鄭元璹太宗時為鴻臚卿貞觀中使突厥還奏曰突厥興亡唯以羊馬為驗觀其六畜並已疲羸部落皆有菜色而牙内炊飯化為血咎徴如此不出三年必當覆滅俄授左武侯大將軍頃之突厥果敗賈言忠為侍御史高宗乾封中裨將薛仁貴既降扶餘川遂治海畧地與行軍總管李勣大軍相㑹時言忠受詔徃遼東支度軍粮使廻帝問以軍事言忠畫其山川地勢且言遼東可平之狀帝問曰卿何以知其可平也對曰昔隋主親率六軍覆於遼東左者人事然也煬帝無道軍政嚴酷舉國受殃天下離心𤣥感一唱狼狽而返身死國滅自取之也先帝親徃問罪其所以不得者高麗未有釁也諺曰賊無厯隄中道廻今高蔵久矣其政人心不附男生兄弟内離逓相攻擊脫來奔願為鄉導彼之情偽盡知之矣以國家富彊陛下明聖將士齊力滅之必矣且臣聞高麗秘記云不及九百年當有八十將來滅之自前漢之末高氏節有國事及今九百年矣李勣年登八十亦與其記符同又高麗頻嵗饑荒賣鬻男女無故地裂狼狐入城蚡䑕穴於國門之下夷俗信妖逓相驚駭天意如此人事如彼臣竊為以是行不再舉矣帝曰卿觀遼東諸將孰賢對曰李勣先朝舊臣聖鑒所悉龎同善雖非門將而持軍政嚴整薛仁貴勇冠三軍威名遠振高侃勤儉自處忠果有謀契苾何力沉毅持重有統御之才雖頗有忌前之癖而臨事能斷然諸將夙夜小心忘身憂國者莫及於李勣帝深然其言遽遣使齎重書以慰免勣等狄仁傑為冬官侍郎充江南廵撫使吴楚之俗多滛祠仁傑奏毁一千七百所留惟夏禹吳太伯季札伍員四祠田歸道為左衛郎將則天聖厯初黙啜將至單于都䕶府乃令歸道攝司賔卿迎勞之黙啜又奏請六胡州及單于都䕶府之地天后不許黙啜深怨望遂拘繫歸道將害之歸道辭色不撓更責以無厭之請並諭以禍福黙啜意稍觧㑹有制賜黙啜粟三萬石雜綵等并許結婚歸道乃得還長孫晟為奉車都督初突厥攝圖請婚于周以趙王招女妻之改封大義公主開皇七年攝圖死遣晟持節拜其弟處羅侯為莫何可汗以其子雍閭為葉䕶可汗八年處羅侯死遣晟徃弔仍齎陳國所獻寳噐以賜雍閭十三年流人楊欽亡入突厥詐言彭公劉昶共宇文氏女謀欲反隋稱遣其來宻告公主雍閭信之乃不修職貢又遣晟出使㣲觀察焉公主見晟言辭不遜又遣所私胡人安遂迦共欽計議扇惑雍閭晟至京師具以狀奏又遣晟徃索欽雍閭欲勿與謬荅曰檢校客内無此色人晟乃貨其達官知欽所在夜掩獲之以示雍閭因發公主私事國人大恥雍閭執遂迦等並以付晟高祖大喜加授開府仍遣入蕃拉殺大義公主唐唐儉為天䇿府長史撿校黄門侍郎貞觀初徃使頡利説誘之遂獲隋蕭后及楊正道以歸太宗謂儉曰卿觀頡利可圖否對曰衘國威恩亦望可獲遂令儉馳傳虜庭示之威信頡利部落欣然定歸欵之計因而兵衆弛懈李靖率輕齎掩破其牙帳頡利遂北走儉脱身而還郭元振為通泉尉則天聞其名召見與語甚奇之時吐蕃請和乃授元振左武衛鎧曺充使聘于吐蕃吐蕃將大論欽陵請去四鎮兵分十姓之地朝廷使元振因察其事元振還上䟽曰臣聞利或生害害亦生利國家難消息者唯吐蕃與黙啜耳今吐蕃請和黙啜受命是將大利於中國若圖之不審則害必隨之今欽陵欲分裂十姓四鎮兵此誠動静之機不可輕舉措也今若直塞其善意恐邉患之起必甚於前若以鎮不可救兵不可在則宜為計以綏之籍事以仍之使彼和望未絶則其惡意亦不得頓生且四鎮之患遠甘凉之患近取捨之計實宜深圖今國之外患者甘凉𤓰肅是也闗隴之人久事屯戍向三十年力用竭矣脱甘凉有不虞豈堪廣調發耶夫善為國者當先料内以敵外不貪外以害内然後夷夏晏安昇平可保如欽陵云四鎮諸部接界懼漢侵竊故有是請此吐蕃所要者然青海吐渾宻邇蘭鄯則北為漢患實在兹軰斯亦國家之要者令宜報欽陵云國家非恡四鎮本置此以扼蕃國之要分蕃國之力使不得併兵東侵今委之於蕃恐蕃力漸彊易為東擾必實無東侵意則還漢吐渾諸部及青海故地即俟斤部落亦還吐蕃如此則足塞欽陵之口而和事未全絶也如欽陵小有乖則曲在彼矣又西邉諸國欵附嵗久論其情義豈可與吐蕃同日而言今未知其利害未審其情實遥有分裂亦恐傷彼諸國之意非制馭之長筭也則天從之又上言曰臣揣吐蕃百姓倦徭戍久矣咸願早和其大論欽陵欲分鎮四境綂兵専制故不欲歸欵若國家毎嵗發和親使而欽陵儻不從命則彼蕃之人怨欽陵日深望國恩日甚設欲廣舉醜徒固亦難矣斯以離間之漸必可使其上下俱懐猜阻則天甚然之自是數年間吐蕃君臣果相猜貳遂誅大論欽陵其弟贊婆及兄子莾布支並來降則天仍令元振與河源軍大使夫蒙令卿率騎以接之後吐蕃將趨莾布支率兵入㓂凉州都督唐休璟勒兵破之元振參其謀以功拜主客郎中裴耀卿為戸部侍郎𤣥宗開元二十年禮部尚書信安王禕受詔封契丹詔以耀卿為副俄又令耀卿齎絹二十萬疋分賜立功奚官就部落以給之耀卿謂人曰夷虜貪殘見利忘義今齊持財帛深入㓂境不可不為備也乃令先期而徃分道互進一朝而給付並畢時突厥及室韋果勒兵邀險謀刦襲之比至而耀卿已還後唐李嚴為客省使奉使于蜀時王衍失政嚴知其可取使還具奏故平蜀之謀始於嚴晉桑維翰初為高祖太原掌書記高祖建義太原首預其謀遣為書求援於北主北主應之俄以趙徳鈞發使邊庭高祖懼其改謀命維翰詣其帳述以始終利害之義其心乃定冊府元龜卷六百五十五
