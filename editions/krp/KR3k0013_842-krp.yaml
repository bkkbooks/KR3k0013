body:
  text: 册府元龜卷八百四十二宋王欽若等撰總錄部知人書曰知人則哲惟帝其難之傳云舉爾所知蓋夫士之抱道秉哲訥言敏行純粹中積而靡耀流俗不偶而安卑盛徳若愚懐寶自若亦有服讒蒐慝深中厚貌順非而澤象恭淊天自非精識邁倫風鑒絶出孰能洞分之哉此其為歎能哲而惠放勲垂何憂哉言三代而下斯不乏其人矣若夫審器知量以識其遠大察辭觀行以辨其淑慝舉才任職以彰其能否率是三者而濟之以道亦人焉廋哉顔回魯人也孔子弟子也孔子曰回也如愚於孔子之言黙而識之如愚也退而省其私亦足以發回也不愚察其退還與二三子説繹道義發明大體知其不愚用之則行舎之則藏惟我與爾有是夫言可行則行可止則止惟我與顔淵同也欒肇曰用巳而後行不假隠以自髙不屈道以要名時人無知其實者惟我與爾有是行孔子窮於陳蔡之間藜羮不斟七日不嘗粒晝寢顔回索米得而来爨之㡬熟孔子望見顔回攫其甑中而飯之間食熟謁孔子而進食孔子起曰今者夢見先君食潔欲饋回曰不可嚮者炱煤甑中回以為棄之不祥因攫而食之孔子歎曰人所信者目也而目猶不可信所恃者心也而心猶不足恃弟子記之知人不易宓不齊字子賤魯人為單父令孔子謂子賤君子哉若人魯無君子者斯焉取斯若人者此人也如魯無君子子賤安得此行而學行之冉雍字仲弓魯人仲弓父賤人孔子曰犂牛之子騂且角雖欲勿用山川其舎諸犂雜文騂赤色角周正中犧牲雖欲以其所生犂而不用山川寧能舎之乎言父雖不善不害於子之美子路孔子弟子為衛大夫嘗侍於孔子行行如也孔子曰由也不得其死及聞衛亂曰嗟乎由死矣已而由果死管仲字夷吾齊大夫少時嘗與鮑叔牙㳺鮑叔知其賢管仲貧困嘗欺鮑叔鮑叔終善遇之不以為言已而鮑叔事公子小白管仲事公子糾及小白立為桓公而公子糾死管仲囚焉鮑叔遂進管仲於桓公管仲既用任政於齊齊桓公以霸九合諸侯一匡天下管仲之謀也管仲曰吾始困時嘗與鮑叔賈分財利多自與鮑叔不以我為貪知我貧也吾嘗為鮑叔謀事而更窮困鮑叔不以我為愚知我時有利不利也吾嘗三仕三見逐於君鮑叔不以我為不肖知我不遭時也吾嘗三戰三走鮑叔不以我為怯知我有老母也公子糾敗召忽死之吾幽囚受辱鮑叔不以我為無恥知我不羞小節而恥功名不顯於天下也生我者父母知我者鮑子也鮑叔既進管仲以身下之子孫世禄於齊有封邑者十餘世嘗為名大夫天下不多管仲之賢而多鮑叔能知人也又管仲病桓公問曰羣臣誰可相者管仲曰知臣莫如君公曰易牙何如對曰殺子以適君非人情不可公曰開方何如對曰倍親以適君非人情難近管子曰衞公子開方去其千乗之太子而臣事君也公曰豎刁何如對曰自宫以適君非人情難親管仲死而桓公不用管仲言卒近用三子三子專權一云管仲病桓公往問之曰仲父之病亟矣若不諱何以詔寡人管仲對曰㣲君之命臣也臣固且請之雖然君猶不能行也公曰仲父令寡人東寡人東令寡人西寡人西仲父之命於寡人寡人敢不從乎管仲攝衣冠起對曰臣願君之逺易牙豎刁堂巫公子開方夫易牙以調和事公公惟蒸嬰兒之味牙於是蒸其首子而獻之公人之情非不愛其子也於子之不愛将何有於公公喜宫而治豎刁自刑而為公治内人之情非不愛其身也於身之不愛将何有於公公子開方事公十五年不歸視其親愛齊衛之間不容数日之行臣聞之務為不久蓋虚不長其生不長者其死必不終公曰善管仲死已𦵏公憎四子者廢之官逐堂巫而疴病起兵逐易牙而味不至逐豎刁而宫中亂逐公子開方而朝不治桓公曰嗟聖人固有悖乎乃復四子官處期年四子作難圍公一室不得出有一婦人從竇而入得至公所公曰吾飢而欲食渴而欲飲不可得其故何也婦人對曰易牙豎刁堂巫公子開方四人四分齊國塗十日不通矣公子開方以書社七百下衛矣食将不可得矣公曰嗟乎兹聖人之言長乎哉死者無知則已若有知吾何面目以見仲父於地下公孫固為宋司馬晉公子重耳文公也過宋固言於襄公曰晉公子亡長幼矣而好善不厭父事狐偃師事趙衰長事賈它狐偃其舅也而惠以有謀趙衰其先君之戎御趙夙之弟也而文以忠貞賈它公族也多識以恭敬此三人者實左右之公子居則下之動則咨焉君其圗之襄公從之贈以馬二十乗叔向晉大夫欒盈出奔楚范宣子殺箕遺黃淵嘉父司空靖邴豫董叔邴師申書羊舌虎叔熊十子皆盈之黨羊舌虎叔向弟囚伯華叔向籍偃人謂叔向曰子離於罪其為不知乎譏其受囚而不能去叔向曰與其死亡若何言雖囚何若於死亡詩曰優哉游哉聊以卒嵗知也詩小雅言君子優㳺於衰世所以避害卒其夀是亦知也樂王鮒見叔向曰吾為子請叔向弗應出不拜樂王鮒晉大夫樂桓子其人皆咎叔向叔向曰必祁大夫祁大夫祁奚也食邑於祁因以為氏祁縣今屬太原室老聞之曰樂王鮒言於君無不行其言皆得行求赦吾子吾子不許謂不拜祁大夫所不能也不能動君而曰必繇之何也叔向曰樂王鮒從君者也何能行祁大夫外舉不棄讐内舉不失親其獨遺我乎詩曰有覺徳行四國順之詩大雅言徳行直則天下順之夫子覺者也覺較然正直晉侯問叔向之罪於樂王鮒對曰不棄其親其有焉言叔向篤親親必與叔虎同謀於是祁奚老矣聞之乗馹而見宣子曰詩曰惠我無疆子孫保之詩周頌也言文武有惠訓之徳加於百姓故子孫保頼之書曰聖有謨勲明徵定保逸書謨謀也勲功也言聖哲有功謀者當明信以安之夫謀而鮮過惠訓不倦者叔向有焉謀而鮮過有謨勲也惠訓不倦惠我無疆也社稷之固也猶將十世宥之以勸能者今一不免其身一以弟故以棄社稷不亦惑乎鯀殛而禹興言不以父罪廢其子伊尹放太甲而相之卒無怨色太甲湯孫也荒滛失度伊尹放之桐宫三年改悔而復之而無憾心言不以一怨妨大徳管蔡為戮周公右王言兄弟罪不相及若之何其以虎也棄社稷子為善誰敢不勉多殺何為宣子説與之乗以言諸公而免之共載入見公不見叔向而歸言為國非私叔向也叔向亦不告免焉而朝不告謝之明不為己又叔向適鄭鬷蔑惡惡貌醜欲觀叔向從使之物器者從隨也隨使人應歛俎豆者而使立於堂下一言而善叔向将飲酒聞之曰必鬷明也素聞其賢故聞其言而知之下執其手以上曰昔賈大夫惡賈國之大夫惡醜也娶妻而美三年不言不笑御以如臯為妻御之臯澤射雉獲之其妻始笑而言賈大夫曰才之不可以已我不能射女遂不言不笑夫今子少不颺顔貌不揚顯子若無言吾㡬失子矣趙文子晉大夫初齊烏餘以廩丘奔晉烏餘齊大夫廩丘今東郡廩丘縣故城是襲衛羊角取之今廩邱縣所治羊角城是遂襲魯髙魚髙魚城在廩邱縣東北有大雨自其竇入雨故水竇開介於其庫入髙魚庫而介其甲以登其城克而取之又取邑於宋於是范宣子卒宣子范匄諸侯弗能治也及趙文子為政乃卒治之文子言於晉侯曰晉為盟主諸侯或相侵也則討而使歸其地今烏餘之邑皆討類也言於此類宜見討而貪之是無以為盟主也請歸之公曰諾孰可使也對曰胥梁帶能無用師晉侯使往胥梁帶晉大夫能無用師言有權謀胥梁帶使諸䘮邑者具車徒以受地必周諸䘮邑謂齊魯宋也周宻也必宻来勿以受地為名使烏餘具車徒以受封烏餘以地来故詐許封之烏餘以其衆出出受封也使諸侯偽效烏餘之封者效致也使齊魯米偽若致邑封烏餘者而遂執之盡獲之皆獲其徒衆皆取其邑而歸諸侯是以睦於晉韓宣子晉大夫也聘魯遂如齊納幣為平公聘少姜見子雅子雅召子旗子旗子雅之子使見宣子宣子曰非保家之子也不臣見子尾子尾見彊彊子尾之子宣子謂之如子旗亦不臣大夫多笑之惟晏子信之曰夫子君子也夫子韓起君子有信其有以知之矣後欒施髙彊奔魯孟僖子魯大夫病且死誡其嗣懿子曰孔丘聖人之後聖人謂商湯滅於宋孔子六世祖孔父嘉為宋華督所殺其子奔魯也其祖弗父何始有米而嗣厲公弗父何孔父嘉之髙祖宋愍公之長子厲公之兄也何嫡嗣當立而讓厲公也及正考父佐戴武宣公正考父弗父何之曾孫三命兹益恭故鼎銘云三命上卿也考父廟之鼎一命而僂再命而傴三命而俯僂傴俯皆恭敬之貌也循牆而走言不敢安行亦莫敢余侮其恭如是人亦不敢侮慢饘於是粥於是以糊余口於是鼎中為饘粥饘粥糊屬言至儉也其恭如是吾聞聖人之後雖不當世必有達者謂若弗父何殷湯之後而不繼世為宋君杜預曰聖人之後有明徳而不當大位謂正考父也今孔丘年少時年十七好禮其達者歟吾即沒若必師之及僖子卒懿子與南官敬叔往學禮焉吳公子札聘於魯見叔孫穆子説之謂穆子曰子其不得死乎好善而不能擇人吾聞君子務在擇人吾子為魯宗卿而任其大政不愼所舉何以堪之禍必及子聘於齊説晏平仲謂之曰子速納邑與政無邑無政乃免於難齊國之政将有所歸未獲所歸難未歇也故晏子因陳桓子以納政與邑是以免於欒髙之難難在昭公八年聘於鄭見子産如舊相識與之縞帶子産獻紵衣焉大帶也吳地貴縞鄭地貴紵故各獻已所貴示積已而不為彼貨利謂子産曰鄭之執政侈難将至矣政必及子子為政愼之以禮不然鄭國将敗侈謂伯有適衛説蘧瑗蘧伯玉史狗史朝之子文子史鰌史魚公子荆公叔發公叔文子公子朝曰衛多君子未有患也適晉説趙文子韓宣子魏獻子曰晉國其萃於三族乎言晉國之政將集於三家説叔向将行謂叔向曰吾子勉之君侈而多良大夫皆富政将在家富必厚施故政在家吾子好直必思自免於難子濯孺子鄭大夫也鄭人使子濯孺子侵衛衛使庾公之斯追之子濯孺子曰今日我疾作不可以執弓吾死矣庾公衛大夫疾作瘧疾問其僕曰追我者誰也其僕曰庾公之斯也曰吾生也僕御也孺子曰吾必生其僕曰庾公之斯衛之善射者也夫子曰吾生何謂也曰庾公之斯學射於尹公之他尹公之他學射於我夫尹公之他端人也其取友必端矣端人用心不邪辟知我是其道本所必不害我也庾公之斯至曰夫子何為不執弓曰今日我疾作不可以執弓曰小人學射於尹公之他尹公之他學射於夫子我不忍以夫子之道反害於夫子雖然今日之事君事也我不敢廢抽矢扣輪去其金發乗矢而後反晏嬰字平仲齊大夫之晉見披髪負芻息於途牧者以為君子也使人問焉曰曷為而至此對曰齊人縲之吾名曰越石父晏子曰嘻遽解左驂以贖之載而與歸至舍不辭而入越石父怒而請絶晏子使人應之曰嬰未嘗得交也今免子於患吾於子猶未可耶越石父曰吾聞君子詘乎不知己而信乎知己者吾是以請絶也晏子乃出見之曰向也見客之容而今也見客之意嬰聞察實者不留聲觀行者不㡬辭嬰可以辭而無棄乎越石父曰夫子禮之敢不敬從晏子遂以為上客俗人有功則徳徳則驕晏子功免人於戹而反詘下之其去俗亦逺矣此全功之道也夫趙簡子晉大夫使尹鐸為晉陽請曰以為繭絲乎抑為保障乎簡子曰保障哉尹鐸損其戸数簡子誡襄子曰晉國有難而無以尹鐸為少無以晉陽為逺必以為歸孫叔敖為楚相嘗善待優孟及病且死屬其子曰我死汝必貧困若往見優孟言我叔敖之子也居数年其子窮困負薪逢優孟與言曰我孫叔敖子也父且死時屬我貧困往見優孟孟曰若無逺有所之即為孫叔敖衣冠抵掌談語一云蘇秦説趙王華屋之下抵掌而言張載曰談説之容則然嵗餘像孫叔敖楚王及左右不能别也荘王置酒優孟前為夀荘王大驚以為孫叔敖復生也欲以為相優孟曰請歸與婦計之三日而為相荘王許之三日後優孟復来王曰婦言謂何孟曰婦言愼無為楚相不足為也如孫叔敖之為楚相盡忠為亷以治楚王得以霸今死其子無立錐之地貧困負薪以自飲食必如孫叔敖不如自殺因歌曰山居耕田苦難以得食起而為吏身貪鄙者餘財不顧恥辱身死家室富又恐受財枉法為姦觸人罪身死而家滅貪吏安可為也念為亷吏奉法守職者死不敢為非亷吏安可為也楚相孫叔敖持亷至死方今妻子窮困負薪而食不足為也於是莊王謝優孟乃召孫叔敖子封寢丘四百戸以奉其祀後十世不絶漢王陵初從髙祖起沛中時張蒼為秦御史有罪亡歸及沛公畧地過陽武蒼以客從攻南陽蒼有罪當斬解衣伏鑕身長大肥白如瓠時陵見而怪其美士乃言沛公赦勿斬後為漢相滕公初從髙祖平闗中時韓信歸漢坐法當斬其儔十三人皆已斬至信信乃仰視適見滕公曰上不欲就天下乎而斬壯士滕公竒其言壯其貌釋弗斬與語大説之言於漢王漢王以為治粟都尉趙禹為少府時詔擇衛将軍舍人以為郎将軍取舍人中富給者令具鞍馬絳衣玉具劍欲入奏之㑹禹来過衛将軍将軍呼所舉舍人以示禹禹以次問之十餘人無一人習事有智略者禹曰吾聞之将門之下必有将類傳曰不知其君視其所使不知其子視其所友今有詔舉将軍舍人者欲以觀将軍能得賢者文武之士也今徒取富人子上之又無智略如木偶人衣之綺繡耳将奈之何於是趙禹悉召衛将軍舍人百餘人以次問之得田仁任安曰獨此兩人可耳餘無可用者衛将軍見此兩人貧意不平趙禹去謂兩人曰各自具鞍馬新絳衣兩人對曰家貧無用具也将軍怒曰今兩君家自為貧何為出此言鞅鞅如有移徳於我者何也移猶施也将軍不得已上籍以聞有詔召見衛将軍舍人此二人前見詔問能畧相推第也田仁對曰提桴鼓立軍門使士大夫樂死戰闘仁不及任安任安對曰夫决嫌疑定是非辨治官使百姓無怨心安不及仁也武帝大笑曰善使任安䕶北軍使田仁䕶邊田穀於河上此兩人立名天下袁盎為吳相病免雒陽劇孟嘗過盎善待之安陵富人有謂盎曰吾聞劇孟博徒博戲之徒也将軍何自通之盎曰劇孟雖博徒然母死客送喪車千餘乗此亦有過人者且緩急人所有凡人在世不能無緩急之事夫一旦叩門不以親為解凡人之於赴難濟危多以有父母為解而孟兼行之解者若今分䟽也不以在亡為辭或實在家而辭云不在天下所望者獨季心劇孟心季布弟也今公陽從数騎一旦有緩急寧足恃乎遂罵富人弗與通諸公聞之皆多盎于定國為廷尉時尹翁歸拜東海太守過辭定國定國家在東海欲屬託邑子兩人令坐後堂待見定國與翁歸語終日不敢見其邑子既去定國乃謂邑子曰此賢将汝不任事也不可干以私張禹經學精習有師法成就子弟尤著者淮陽彭宣至大司空沛郡戴崇至少府宣為人恭儉有法度而崇愷弟多智二人異行禹心親愛崇敬宣而䟽之崇每候禹嘗責師宜置酒設樂與弟子相娱禹将崇入後堂飲食婦女相對優人筦絃鏗鏘極樂昏夜乃罷而宣之来也禹見之於便坐講論經義日晏賜食不過一肉巵酒相對宣未嘗得至後堂及兩人聞知各自得也禹位至特進終焦延夀字贛善易為小黄令京房事贛贛嘗曰得我道以亡身者京生也後坐言災異棄市張勃嗣富平侯為散騎諫大夫元帝初即位詔列侯舉茂才勃舉太官獻丞陳湯湯有罪勃坐削戸二百會薨故賜諡曰繆侯後湯立功西域世以勃為知人揚雄字子雲李彊素善雄久之彊為益州牧喜謂雄曰吾眞得嚴君平矣雄曰君備禮以待之彼人可見而不可得詘也彊心以為不然及至蜀致禮與相見卒不敢言以為從事乃歎曰揚子雲誠知人雄官至侍郎嚴尤為王莽納言将軍光武微時為舂陵侯家訟逋租於嚴尤尤見而竒之舂陵侯敞即光武季父也東觀記曰光武為季父故㫪陵侯詣大司馬府訟地皇元年十二月壬寅前租二萬六千斛芻藁錢若干萬時犯人朱福亦為舅訟租於尤尤止車獨與光武語不視福光武後戲福曰嚴公寧視卿耶及尤圍昆陽城中出降尤者言光武不取財物但㑹兵計䇿尤笑曰是美鬚眉者耶何乃如是後漢安城侯賜初與更始俱到雒陽欲令親近大将徇河北未知所使賜言諸家子獨有文叔可用大司馬朱鮪等以為不可更始狐疑賜深勸之乃拜光武行大司馬持節過河李生舞陰人賈復少好學習尚書事李生李生竒之謂門人曰賈君之容貌志氣如此而勤於學将相之器也虞延為南陽太守永平初有新野功曹鄧衍以外戚小侯每豫朝㑹而容姿趨步有出於衆明帝目之顧左右曰朕之儀貌豈若此人特賜輿馬衣服延以衍雖有容儀而無實行未嘗加禮帝既異之乃詔衍令自稱南陽功曹詣闕謝承書曰帝賜輿馬衣服劍珮刀餞二萬南陽計吏歸具以啟延延知衍華不副實行不配容積三年不用於是帝乃自勅衍稱南陽功曹詣闕既到拜郎中遷元武司馬衍在職不服父喪帝聞之乃歎曰知人則哲惟帝難之信哉斯言衍慙而退繇是以延為明第五倫為宕渠令顯拔鄉佐𤣥賀後為九江沛二郡守以清潔稱所在化行終於大司農倫後為蜀郡太守所舉吏多至九卿二千石時以為知人倫後位至司空張堪南陽宛人也素有名稱嘗於太學見朱暉甚重之接以友道乃把暉臂曰欲以妻子託朱生暉以堪先達舉手未敢對自後不復相見堪後為漢陽太守卒暉聞其妻子貧困乃自往候視厚賑贍之暉少子頡怪而問曰大人不與堪為友平生未曾相聞子孫竊怪之暉曰堪嘗有知己之言吾以信於心也以其先托妻子心已許之故言信於心也朱穆為冀州刺史所辟用皆清徳長者多至公卿州郡州郡謂刺史太守王充字仲任㑹稽上虞人也為郡功曹諫諍不合自免居家初班固年十三充見之拊其背謂父彪曰此兒必記漢事馮敷為吳郡督郵郡人施延家貧母老周流傭賃嘗避地於廬江臨湖縣種𤓰後復到吴郡取卒月直賃作半路亭以飬其母是時吳㑹未分敷到縣延持帚往敷知其賢者下車謝使入亭請與飲食脱衣與之餉錢不受後至太尉法眞父雄為交阯太守胡廣父貢交阯都尉廣少孤貧親執家苦長大隨軰入郡為散吏眞從家来省其父眞頗知人㑹嵗終應舉士雄勅眞助求其才雄因大㑹諸吏眞自於牖間宻占察之乃指廣以白雄遂察孝亷既到京師試以奏章安帝以廣為天下第一又云眞年未弱冠父在南郡步往候父欲去父留之待正旦使觀朝吏㑹者数百人眞於窓中闚其與父語畢問眞孰賢眞曰戸曹掾胡廣有公卿之量其後廣果立九卿三公之位世以服眞之知人眞辟公府舉賢良皆不就王諶河南尹田歆外甥諶史不書其官科暠始為縣門下史時諶名知人歆謂之曰今當舉六孝亷多得貴戚書命不宜相違欲自用一名士以報國家爾助我求之明日諶送客於太陽郭遥見暠異之還白歆曰為尹得孝亷矣近雒陽門下史也歆笑曰當得山澤隠滯安用近雒陽吏耶諶曰山澤不必有異士異士不必在山澤歆即召暠于庭辯詰職事暠辭對有序歆甚知之召署主簿遂舉孝亷鍾皓潁川人同郡陳寔年不及皓皓引與為友皓為郡功曹㑹辟司徒府臨辭太守問誰可代卿者皓曰明府欲必得其人西門亭長陳寔可寔聞之曰鍾君似不察人不知何獨識我郭泰字林宗舉有道不應衛兹字子許弱冠與同郡圏文生俱稱盛徳林宗與二人共至市子許買物隨價酬直文生訾呵減價乃取林宗曰子許少欲文生多情此二人非徒兄弟乃父子也後文生以穢貨見損兹以烈節垂名又王允世仕州郡為冠蓋林宗嘗見允而竒之曰王生一日千里王佐才也又茅容年四十餘耕於野時與等輩避雨樹下皆夷踞相對容獨危坐愈恭林宗行見之而竒其異遂與共言因請寓宿旦日容殺雞為饌林宗謂為己設既而以供其母自以草蔬與客同飯林宗起拜之曰卿賢乎哉因勸令學卒以成徳泰之所名人品乃定先言後驗衆皆服之故適陳留則友苻偉明㳺太學則師仇季智之陳國則親魏徳公入汝南則交黄叔度又識張孝仲芻牧之中知范時祖郵置之役召公子許偉康並出屠酤司馬子威拔自卒伍及同郡郭長信王長文韓文布李子政曹子元定襄周康子西河王季然雲中邱季智郝禮真等六十人並以成名王柔王澤兄弟總角共候林宗以訪才行所宜林宗曰叔優當以仕進顯季道當以經術通然違方改務亦不能也後果如所言柔為䕶匈奴中郎将澤為代郡太守謝軌與陳留邊讓並善談論俱有成名每共候林宗未嘗不連日達夜林宗謂門人曰二子英才有餘而並不入道惜乎軌後不拘細行為時所毁讓以輕侮曹操殺之黄允以雋才知名林宗見而謂曰卿有絶人之才足成偉器然恐守道不篤将失之矣後司徒袁隗欲為從女求姻見允而歎曰得婿如是足矣允聞而黜遣其妻夏侯氏婦謂姑曰今當見棄方與黄氏長辭乞一㑹親屬以展離訣之情于是大集賓客三百餘人婦中坐攘袂數允隠慝穢惡十五事言畢登車而去允以此廢于時史叔賓少有盛名林宗見而告人曰牆髙基下雖得必失後果以論議阿枉敗名云庾乗少給事縣廷為門士林宗見而拔之勸遊學宫遂為諸生傭後能講論自以卑第每處下坐諸生博士皆就讐問繇是學中以下坐為貴後徵辟並不起號曰徵君荀淑字季和潁川人為朗陵侯相時黄憲世貧賤父為牛醫淑至慎陽遇憲於逆旅時年十四淑竦然異之揖與語移日不能去謂憲曰子吾之師表也既而前至袁閎所未及勞問逆曰子國有顔子寧識之乎閎曰見吾叔度耶淑又拔李昭于小吏李膺為烏桓校尉以公事免官還居綸氏教授嘗千人南陽樊陵求為門徒膺謝不受後陵以阿附宦官致位太尉為節志所羞又岑晊詣太學膺與王暢稱其有幹國器膺後為司隷校尉度尚除上虞長進善愛人坐以待旦擢門下書佐朱雋嘗歎美之以為有不凡之操雋後官至車騎将軍逺近竒尚有知人之鑒吳祐字季英郡舉孝亷将行郡中為祖道祐越壇共小吏雍邱黄真歡語移時與結友而别功曹以祐倨請黜之太守曰吳季英有知人之名卿且勿言真後亦舉孝亷除新蔡長世稱其清節祐官至河間相仲長統山陽髙平人年二十餘游學青徐并冀之間與交者多異之并州刺史髙幹素貴有名招致四方游士多歸焉統過幹幹善待遇之訪以世事統謂幹曰君有雄志而無雄才好士而不能擇人所以為君深戒也幹雅自多不納統言統去之無㡬而幹敗并冀之士以是異統後尚書令荀彧舉為尚書郎又㕘丞相曹操軍事符融陳留浚義人游太學郭林宗始入京師時人莫識融一見嗟服因以介於李膺繇是知名時漢中晉文經梁國黄子英並恃其才智炫曜上京卧託養疾無所通接雒中諸大夫好事者承其聲名坐門問疾猶不得見三公所辟召者輒以詢訪之隨所臧否以為與奪融察其非真乃到太學并見李膺曰二子行業無聞以豪傑自置遂使公卿問疾王臣坐問融恐其小道破義空譽違實特宜察焉膺然之二人自是名論漸衰賓從稍省旬日之間慙歎逃去後果為輕薄子並以罪廢棄融益以知名優㳺不仕以至於終鄭𤣥門人樂安國淵任嘏年並童幼𤣥稱淵為國器嘏有道徳其餘亦多所鑒拔皆如其言國淵字子尼少師事鄭𤣥淵始未知名𤣥稱之曰國子尼美才也吾觀其人必為國器後為大司農李瓉位至東平相初曹操㣲時瓉異其才将沒謂子宣等曰時将亂矣天下英雄無過曹操焉張孟卓與吾善袁本初汝外親雖爾勿休必歸曹氏諸子從之並免於亂世甘公丹陽縣人嘗為蒼梧太守陶謙少孤始以不羈聞於縣中年十四猶綴帛為幡乗竹馬而戲邑中兒童皆隨之甘公出遇見之其容貌異而呼之與語甚説許妻以女夫人怒曰陶家兒遨戲無度奈何以女許之甘公曰彼有竒表長必大成遂以妻之許邵字子将汝南平輿人也嘗為郡功曹邵少峻名節好人倫多所賞識若樊子昭和陽士者並顯名於世故天下言拔士者咸稱許郭林宗劉曄少有孝行避地揚州邵稱曄有佐世之才後為魏名臣又曹公㣲時嘗卑辭厚禮求為己目邵鄙其人而不肯對公乃伺隙脅邵邵不得已曰君清平之姦賊亂世之英雄公大悦而去又云魏太祖嘗問許子将我何如人子将不答固問之子将曰子治世之能臣亂世之姦雄太祖大笑蔡邕字伯喈為左中郎将獻帝西遷王粲徙長安邕見而竒之時邕才學顯著貴重朝廷嘗車騎填巷賓客盈坐聞粲在門倒屣迎之粲至年既幼弱容狀短小一座盡驚邕曰此王公孫也有異才吾不如也吾家書籍文章盡當與之邕初從朔方還嘗避怨於吳顧雍從學琴書雍專一清静敏而易教伯喈貴異之謂曰卿必成致今以吾名與卿故雍與伯喈同名孔融字文舉為北海相韋康字元将與弟仲将俱見融融與康父端書曰前日元将来淵才亮茂雅度𢎞毅偉世之器也昨日仲将又来懿性貞實文慤篤誠保家之主也不意雙珠近出老蚌甚珍貴之又召王修為主簿舉孝亷修以天下亂不行頃之郡中有反者修聞融有難夜往奔融賊初發融謂左右曰能冐難来惟修耳言終而修至復署功曹融嘗謂功曹孔邵廊廟才也邵後從劉繇於江東及吳大帝統事數陳便宜以為應納貢聘大帝即從之拜廬江太守遷車騎長史黄武初為丞相威遠将軍封陽羡侯橋𤣥梁國人為太尉初魏太祖少任侠放蕩世人未之竒也惟𤣥與南陽何顒異焉𤣥謂太祖曰天下将亂非命世之才不能濟也能安之者其在君乎操嘗感其知已後經𤣥墓輙悽愴致祭自為其文又云橋𤣥世名知人覩魏太祖而異之曰吾見天下名士多矣未有若君者也君善自持吾老矣願以妻子為托繇是身名益重於時何顒南陽襄鄉人辟司空府初見魏太祖歎曰漢家将亡安天下者必此人也顒嘗稱潁川荀彧王佐之器及彧為尚書令遣人西迎叔父爽喪并致顒屍而𦵏之冢傍陳寵為尚書皇后弟侍中竇憲薦真定令張林為尚書帝以問寵寵對林雖有才能而素行貪濁憲以此深憾寵林卒被用而以贓汚抵罪魏荀彧所舉者命世大才邦邑則荀攸鍾繇陳羣及引致當世知名郄憲華歆王朗荀悦杜襲辛毗趙儼之儔終為卿相以十数人取士不以一揆戲志才郭嘉等有負俗之譏杜畿簡傲少文皆以智䇿舉之終各稱職初曹公問彧誰能代卿為我謀者彧言攸繇又言䇿謀士初進志才志才卒又進郭嘉曹公以為知人彧為侍中光禄大夫持節㕘丞相軍事劉元起涿郡人蜀先主年十五母使行學與元起子徳然遼西公孫瓉俱事故九江太守同郡盧植元起嘗資給先主與徳然等元起妻曰各自一家何能嘗爾邪起曰吾宗中有此兒非常人也元起出蜀志不見官位張世平中山大商也蜀先主居涿時世平與蘇雙等皆累千金販馬周旋於涿郡見而異之乃多與金財先主繇是得合徒衆世平出蜀志不見官位魏兹陳留人臻之父也兹有大節不應三公之辟太祖之初至陳留兹曰平天下者必此人也太祖亦異之數詣兹議大事從討董卓戰於滎陽而卒太祖每涉郡境輙遣使祠焉魏兹出魏志不見官位王郎漢末為㑹稽太守為孫䇿所執後太祖徵之既至太祖問曰孫䇿何以得至此耶郎曰䇿勇冠一世有雋才大志張子布民之望也北面而相之周公瑾江淮之傑攘臂而為其将謀而有成所規不細終為天下大賊非徒狗盜而已王雋字子文汝南人少為范滂許章所識與南陽岑晊善曹公之為布衣特愛雋雋亦稱曹公有治世之具及袁紹與弟術喪母歸𦵏汝南雋與曹公㑹之㑹者三萬人曹公於外宻語雋曰天下将亂為魁者必此二人也欲濟天下為百姓請命不先誅此二子亂今作矣雋曰如卿之言濟天下者舍卿復誰相對而歎劉表見袁紹彊陰與紹通雋謂表曰曹公天下之雄也必能興霸道繼桓文之功者也今乃釋近而就逺如有一朝之急遥望漢北之救不亦難乎表不從賈詡為太尉初南見劉表表以客禮待之詡謂人曰表平世三公才也不見事變多疑無决無能為也劉琬漢末為使者使孫䇿加錫命時吳大帝舉孝亷琬語人曰吾觀孫氏兄弟雖各才秀明逹然皆禄胙不終惟中弟孝亷形貌竒偉骨體不常有大貴之表年又最夀爾試識之裴潛初為太祖倉曹屬太祖問潛曰卿前與劉備俱在荆州卿以備才畧何如潛曰使居中國能亂人而不能為治也若乗間守險足以為一方主楊俊字季才有風鑒仕為南陽太守漢末晉宣帝年十六七與俊相遇俊曰此非常人之人也又司馬朗早有聲名其族兄芝衆未之知惟俊言曰芝雖風望不及朗實理但有優甘俊自少及長以人倫自任同郡審固陳留衛恂本皆出自兵伍俊資拔奨致咸作佳士後固歴位郡守恂御史縣令其明鑒行義多此類也崔林字徳儒河東武城人也有清識拔同郡王經於民伍之中卒為名士世以此稱之後為司空薨傅巽字公悌文帝時為侍中巽瓌偉博達有知人鑒巽在荆州目龎統為半英雄謂裴潛終以清行顯統遂附劉備見待次於諸葛亮潛位至尚書令並有名徳及在魏朝魏諷以才智聞巽謂之必反卒如其言游殷為郡功曹時張既為兒童殷察而異之引既過家既敬諾先歸𠡠家具設賓饌及既至殷妻笑曰君其悖乎張徳容童昏小兒何異客哉殷曰卿勿怪乃方伯之器也殷遂與既論霸王之術饗訖以子楚託之既謙不受殷固託之既以殷邦之宿望難違其㫖乃許之後楚為蒲阪令太祖定闗中時漢興郡缺太祖以問既既稱楚才兼文武遂以為漢興太守後轉隴西夏侯𤣥世名知人為中䕶軍拔用武官㕘㦸牙門無非俊傑多牧州典郡立法垂教於今皆為後式司馬徳操潁川人也劉廙年十嵗戲於講堂上德操拊其頭曰孺子孺子黄中通理寧自知不廙文帝即王位為侍中賜爵闗内侯陳羣辟太祖司空西曹掾屬時有薦樂安王模下邳周逵者太祖辟之羣封還𠡠以為模逵穢徳終必敗太祖不聽後模逵皆坐姦軌誅太祖以謝羣羣薦廣陵陳矯丹陽戴乾太祖皆用之後吳人叛乾忠義死難矯遂為名臣世以羣為知人劉曄為侍中時魏諷有重名自卿相以下皆傾心交之其後孟達去劉備歸文帝論者多稱有樂毅之量曄一見諷達而皆云此二人必反卒如其言達有容止才觀文帝甚器愛之使達為新城太守加散騎常侍曄曰達有苟得之心恃才好術必不能感恩懐義新城與吴蜀接連者變態為國生患文帝竟不易後達終於叛敗張既為雍涼二州刺史十餘年其所禮辟扶風龎延天水楊阜安定胡遵酒泉龎涓燉煌張恭周生烈等皆終有名位荀攸字公達鄭袤髙祖衆為漢大司農父泰揚州刺史有髙名袤少孤早有識鑒攸見之曰鄭公業為不亾矣公業泰字也攸終於尚書令傅嘏為黄門侍郎時曹爽秉政何晏為吏部尚書嘏謂爽弟義曰何平叔外静而内銛巧好利不念務本吾恐必先惑子兄弟仁人将逺而朝政廢矣晏等遂與嘏不平因㣲事以免嘏官起家拜滎陽太守不行太傅司馬宣王請為從事中郎曹爽誅為河南尹李豐與嘏同州少有顯名早歴大官内外稱之嘏又不善也謂同志曰豐飾偽而多疑矜小失而昧於權利若處庸庸者可也自任機事而遭明者必死豐後為中書令與夏侯𤣥俱禍卒如嘏言先是何晏以才辯顯於貴戚之間鄧颺好變通合徒黨鬻聲名於閭閻而夏侯𤣥以貴臣子少有重名為之宗主求交於嘏而不納也嘏友人荀粲有清識逺心然猶怪之謂嘏曰夏侯泰初一時之傑虛心交子合則好成不合則怨至二賢不睦非國之利此藺相如所以下亷頗也嘏答之曰泰初志大其量能合虛聲而無實才何平叔言逺而情近好辯而無誠所謂利口覆邦國之人也鄧𤣥茂有為而無終外要名利内無闗鑰貴同惡異多言而妬前多言多釁妬前無親以吾觀此三人者皆敗徳也逺之猶恐禍及況昵之乎嘏為尚書僕射時司馬文王輔政鍾㑹為黄門侍郎㑹嘗有自矜色嘏戒之曰子志大而量小勲業難為也可不慎哉後果作亂被誅何禎明帝時為秘書丞時譙人胡康年十五以異才見選又陳損益求試劇縣詔特引見衆論翕然號為神童詔付秘書使博覽典籍帝以問禎康才何如禎答曰康雖有才性質不端必有負敗後果以過見譴夏侯霸為討蜀䕶軍右将軍後降蜀姜維問之曰司馬懿既得彼政當復有征伐之志否霸曰彼方營立家門未遑外事有鍾士季㑹者其人雖少終為吴蜀之憂然非常之人而不能用也後十五年而㑹果滅蜀司馬朗為兖州刺史朗雅好人倫鄉人李覿等盛得名譽朗嘗顯貶下之後覿等敗時人服焉崔琰為中尉琰初與司馬朗善晉宣王方壯琰謂朗曰子之弟聰哲明允剛㫁英特殆非子之所及也王修為奉常修初識髙柔於弱冠異王基於童幼終皆逺至世稱其知人郭𤣥陽翟人被刑在家鄧艾少為襄城典農部民與石苞皆年十二三𤣥從典農司馬求人御以艾苞與御行十餘里與語悅之謂二人皆當逺至為佐相艾從為典農功曹奉使詣宣王繇此見知遂被拔擢苞亦貴顯郭𤣥出魏志不見官位杜畿為尚書僕射畿初與太僕李恢東安太守郭智友好恢子豐交結英俊以才智顯於天下智子冲有内實而無外觀州里弗稱也二人各修子孫禮見畿既退畿歎曰孝懿無子非徒無子殆将無家君謀為不死也其子足繼其業時人皆以畿為誤恢死後豐為中書令父子兄弟皆誅冲為代郡太守卒繼父業世乃服畿知人魏畧曰李豐父名義與此不同義蓋恢之别名也蜀司馬徽潁川人有知人之鑒龎統少時樸鈍未有識者統弱冠往見徽徽採桑於樹上坐統在樹下共語自晝至夜徽甚異之稱統當為南州士之冠冕繇是漸顯徽出蜀志不見官位譙周字允南陳夀為觀閣令史宦人黄皓專㺯威權夀獨不為之屈繇是屡被譴黜遭父喪有疾使婢丸藥客往見之鄉黨以為貶議蜀平坐是沉廢者累年後為御史治書以母憂去職母遺言令𦵏雒陽夀遵其志又坐不以母歸𦵏竟被貶議初周嘗謂夀曰卿必以才學成名當被損折亦非不幸也宜深慎之夀至再致廢辱皆符周言周入魏時晉文王為相國以周有全國之功封陽城侯楊戲為射聲校尉戲性簡惰未嘗以甘言加人時人謂譙周無當世才少歸敬者戲重之嘗稱曰吾等後世終自不如此長兒也有識以此貴戲王連為司監校尉於是簡取良才以為官屬若吕乂杜棋劉幹等終皆至大官自連所拔也吳虞翻字仲翔初山陰丁覽太末徐陵或在縣吏之中或衆所未識翻一見之便與友善終成顯名翻嘗為騎都尉陸遜為太子太傅遜名知人初暨艷造營府之論遜諫戒之以為必禍又謂諸葛恪曰在我前者吾必奉之同升在我下者則扶持之今觀君氣陵其上意蔑乎下非安徳之基也及廣陵楊竺少獲聲名而遜謂之終敗勸竺兄穆令與别族後艷恪竺皆坐誅其先見如此胡綜為侍中時青州人隠蕃歸吳上書曰臣聞紂為無道㣲子先出髙祖寛明陳平先入臣年二十二委棄封城歸命有道頼蒙天靈得自全致臣至止有日而主者同之降人未見精别使臣㣲言妙㫖不得上達於邑三歎曷惟其已也謹詣闕拜章乞蒙引見大帝即召入蕃謝答及陳時務甚有辭觀綜時侍坐帝問如何對曰蕃上書大語有似東方朔巧捷詭辯有似禰衡而才皆不及大帝又問可堪何官綜對曰未可以治民且試以都輦小職大帝以蕃盛論刑獄用為廷尉監左将軍朱據廷尉郝普稱蕃有王佐之才普尤與之親善嘗怨歎其屈後蕃謀叛事覺伏誅普見責自殺據禁止歴時乃解拜綜偏将軍蕃以口辯為豪傑所善潘濬子翥亦與周旋饋餉之濬聞大怒疏責翥曰吾受國厚恩志報以命爾輩在都當念恭順親賢慕善何故與降虜交以糧餉之在逺聞此心震面熱惆悵累旬疏到急就往使受杖一百促責所餉當時人咸怪濬而蕃果圖叛誅夷衆乃歸服羊道為中庻子年二十時廷尉監隠蕃交結豪傑自衛将軍全琮等皆傾心敬待惟道及宣詔郎豫章楊迪拒絶不與通時人咸怪之而蕃後叛逆衆乃服之李肅南陽人也孟仁少從肅學讀書夙夜不懈肅竒之曰卿宰相器也後果為丞相習溫為荆州大公平大公平今之州都潘秘過辭於溫問曰先君昔許君侯當為州里議主今果如其言不審州里誰當復相代者溫曰無過於君也後秘為尚書僕射代溫為公平甚得州里之譽虞俊餘姚人也俊見張溫歎曰張惠恕温字才多智少華而不實怨之所聚有覆家之禍吾見其兆矣諸葛亮聞俊憂溫意未之信及溫放黜亮乃歎俊之有先見亮初聞溫敗未知其故思之数日曰吾已得之矣其人於清濁太明善惡太分溫出吴志無官位陸瑁吳郡吳人也為選曹尚書初同郡聞人敏見得國邑優扵崇修惟瑁以為不然後果如其言孫河為烏程縣長吳粲為小吏河深竒之河後為將軍得自選長吏表粲為曲阿丞遷為長史治有名迹雖起孤㣲與同郡陸遜卜靜等比肩齊聲矣虞忠字世方翻第五子為宜都太守貞固幹事好識人物造吴郡陸機於童齕之年稱上虞魏遷於無名之初終皆逺至為著聞之士交同縣王岐於孤宦之族仕進先至宜都太守忠乃代之闞澤字徳潤為太子太傅初丁固在襁褓中澤見而異之曰此兒後必致公輔終如其言季衡為威逺将軍衡本襄陽卒家子漢末入吳為武昌庻民聞羊衜有人物之鑒往干之衜曰多事之世尚書劇曹郎才也顧邵為豫章太守好樂人倫初錢塘丁諝出於役伍陽羡張秉生於庶民烏程吳粲雲陽殷禮起乎㣲賤邵皆拔而友之為立聲譽諝至典軍中郎秉雲陽太守禮零陵太守粲太子少傅世以邵為知人張承為奮威将軍承能甄識人物拔彭城蔡款南陽謝景於孤㣲童幼並為國士款至衛尉景豫章太守又諸葛恪字元遜年少時衆人竒其英才承言終敗諸葛氏者元遜也勤於長進篤於物類凡在庶幾之流無不造門册府元龜卷八百四十二
