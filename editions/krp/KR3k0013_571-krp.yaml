body:
  text: 冊府元龜卷五百七十一宋王欽若等撰掌禮部討論傳曰先王之制禮也不可多也不可寡也惟其稱也故有順有體有宜然後㳂革之道殊損益之文異是以博聞強識之士司局宿業之官憤悱於函丈之下戒懼乎委巷之失詢求用捨博訪遺逸稽合乎同異折中乎今昔蓋有意於化民成俗著誠去僞逹神明之德同天地之節者矣故其周旋裼襲之數吉㓙賓嘉之典弛張因襲之本法度經緯之義咸得而觀焉蓋先儒之嘉論作者之遺意於是乎在矣孔子為魯大夫哀公問曰大禮何如君子之言禮何其尊也孔子曰丘也小人不足以知禮謙不答也君曰否吾子言之也孔子曰丘聞之民之所繇生禮為大非禮無以節事天地之神也非禮無以辨君臣上下長㓜之位也非禮無以别男女父子兄弟之親昏姻疏數之交也君子以此之為尊敬然言君子以此故尊禮然後以其所能教百姓不廢其㑹節君子以其所能於禮教百姓使其不廢此上事之期節有成事然後治其雕鏤文章黼黻以嗣上事行於民有成功乃後續以治文飾以為尊卑之差其順之然後言其喪筭備其鼎爼設其豕腊修其宗廟歳時以敬祭祀以序宗族即安其居節醜其衣服卑其宫室車不雕幾噐不刻鏤食不貳味以與民同利昔之君子之行禮者如此言語也筭數也即就也醜類也㡬附纒之也言君子既尊禮民以為順乃復語以䘮祭之禮就安其居處正其衣服教之節儉與之同利者上下俱足也哀公又問曰寡人願有言然冕而親迎不已重乎已猶大也恠親迎乃服祭服孔子愀然作色而對曰合二姓之好以繼先聖之後以為天地宗廟社稷之主君何為己重乎先聖周公也公曰寡人固不固焉得聞此言也寡人欲問不得其辭請少進固不固言吾繇鄙故固也請少進欲其為言以曉已孔子曰天地不合萬物不生大婚萬世之嗣也君何謂己重焉孔子遂言曰内以治宗廟之禮足以配天地之神明出以治直言之禮足以立上下之敬物耻足以振之國耻足以興之為政先禮禮其政之本與宗廟之禮祭宗廟也夫婦配天地有日月之象焉禮噐曰君在阼夫人在房大明生於東月生於西此隂陽之分夫婦之位也直猶正也正言謂出政教有夫婦之禮焉皆義曰天子聽外治后聴内職敎順成俗外内和順國家理治此之謂盛德物猶事也事耻臣耻也振猶救也國耻君耻也君臣之行有可耻者禮足以興復之子張子貢言游侍坐於孔子縱言至於禮言游言偃子游也縱言汎說事子曰居女三人者吾語女禮使女以禮周流無不徧也居女三人坐也使之坐凡與尊者言更端則起子貢越席而對曰敢問何如對應也子曰敬而不中禮謂之野恭而不中禮謂之給勇而不中禮謂之逆子曰給奪慈仁奪猶亂也巧言足恭之人似慈仁實鮮仁特言是者感子貢也子貢辯近於給子曰師爾過而商也不及子産猶衆人之母也能食之不能敎也過與不及言敏鈍不同俱違禮也衆人之母言子産慈仁多不矜荘又與子張相反子産甞以其乗車濟冬渉者而車梁不成是慈仁以違禮子貢越席而對曰敢問将何以為此中者也子曰禮乎禮夫禮所以制中也禮乎禮唯有禮也子貢退言游進曰敢問禮也者領惡而全好者與子曰然領猶治也好善也然則何如子曰郊社之義所以仁鬼神也甞禘之禮所以仁昭穆也餽奠之禮所以仁死䘮也射鄉之禮所以仁鄉黨也食饗之禮所以仁賔客也仁猶存也凡存此者所以全善之道也郊社甞禘饋奠存死之善者也射鄉食饗存生之善者也郊有后稷社有勾龍子曰明乎郊社之義甞禘之禮治國其如指諸掌而已乎子張問政子曰師乎前吾語女乎君子明於禮樂舉而措之而已言禮樂足以為政也措猶施行也子張復問子曰師爾以為必鋪几筵升䧏酌獻酬酢然後謂之禮乎爾以為必行綴兆興羽籥作鐘皷然後謂之樂乎言而履之禮也行而樂之樂也君子力此二者以南靣而立夫是以天下太平也諸侯朝萬物服體而百官莫敢不承事矣禮之所興衆之所治也禮之所廢衆之所亂也目巧之室則有奥阼席則有上下車則有左右行則有隨立則有序古之義也室而無奥阼則亂於堂室也席而無上下則亂於席上也車而無左右則亂於車也行而無隨則亂於塗也立而無序則亂於位也昔聖帝明王諸侯辨貴賤長㓜逺近男女外内莫敢相踰越皆繇此塗出也服體體服也謂萬物之符長皆來為瑞應也衆之所治衆之所以治也衆之所亂衆之所以亂也目巧謂但用巧目善意作室不繇法度猶有奥阼賓主之處也自目巧以上下古今常事不可廢改也三子者既得聞此言也於夫子昭然若發蒙矣乃曉禮樂不可廢改之意也子夏問於孔子曰何謂三無孔子曰無聲之樂無體之禮無服之䘮此之謂三無子夏曰三無既得畧而聞之矣敢問何詩近之於意未察求其類於詩詩長人之情孔子曰夙夜其命宥宻無聲之樂也威儀棣棣不可選也無體之禮也凡民有䘮匍匐救之無服之䘮也詩讀其為基聲之誤也基謀也宻静也言君夙夜謀為政教以安民則民樂之此非有鐘皷之聲也棣棣安和之貌也言君之威儀安和棣棣然則民傚之此非有升䧏揖讓之禮也救之賙恤之言君於民有䘮有以賙恤之則民傚之此非有衰絰之服子夏曰言則大矣美矣盛矣言盡於此而已乎孔子曰何為其然也君子之服之也猶有五起焉言盡於此乎意以為未盡也服猶習也君子習讀此詩起此之義其說則有五也子夏曰何如孔子曰無聲之樂氣志不違無體之禮威儀遲遲無服之喪内恕孔悲無聲之樂氣志既得無體之禮威儀翼翼無服之喪施及四國無聲之樂氣志既從無體之禮上下和同無服之䘮以畜萬邦無聲之樂日聞四方無體之禮日就月将無服之喪純德孔明無聲之樂氣志既起無體之禮施及四海無服之喪施於孫子不違者只不違君之氣志也孔甚也施易也從順也畜孝也使萬邦之民競為孝就成也将大也使民之傚禮日有所成至月則大矣起猶行也宰我問三年之喪期已乆矣君子三年不為禮禮必壊三年不為樂樂必隳舊榖既沒新榖既升鑚燧改火期可已矣周書月令有更火之文春取榆柳之火夏取棗杏之火季夏取桑柘之火秋取柞楢之火冬取槐檀之火一年之中鑚火各異木故曰改火也子曰食夫稻衣夫錦於女安乎曰安女安則為之夫君子之居喪食㫖不甘聞樂不樂居處不安故不為也今女安則為之㫖美也責其無仁恩於親故冄言女安則為之宰我出子曰予之不仁也子生三年然後免於父母之懐子生未三嵗為父母所懐抱夫三年之喪天下之通喪也自天子逹於庻人予也有三年之愛於其父母乎言子於父母欲報之恩昊天罔極而予也有三年之愛乎子貢問喪子曰敬為上哀次之瘠為下顔色稱其情戚容稱其服問喪問居父母之喪也喪上哀言敬為上者疾時尚不能敬也容威儀也孝經曰容止可觀請問兄弟之喪子曰兄弟之喪則有乎書䇿矣言疏者如禮行之未有加也齊斬之喪哀容之體經不能載矣又子貢觀於蜡孔子曰賜也樂乎對曰一國之人皆若狂賜未知其樂也蜡也者索也嵗十二月合聚萬物而索享之也國索鬼神而祭祀則黨正以禮屬民而飲酒於序以正齒位於是時民無不醉者如狂矣曰未知其樂恠之也子曰百日之蜡一日之澤非爾所知也蜡之祭主先嗇也大飲烝勞農以休息之言民皆勤稼穡有百日之勞喻乆也今一日使之飲酒燕樂是君之恩澤非爾所知言其義大子游問喪具夫子曰稱家之有亡子游曰有無惡乎齊惡乎齊問豐省之比夫子曰有毋過禮茍亡矣歛首足形形體還葬還之言便也言已歛即葬不待三月縣棺而封不設碑綷不備禮封當為窆窆下棺也人豈有非之者哉又問於孔子曰喪慈母如母禮與如母謂父卒三年也子游意以為國君亦然禮所云者乃大夫以下父所使妾飬妻子孔子曰非禮也古者男子外有傅内有慈母君命所使敎子也何服之有言無服也此指謂國君之子也大夫士子為庻母慈已者服小功父卒乃不服昔者魯昭公少喪其母有慈母良及其死也公弗忍也欲喪之有司以聞曰古之禮慈母無服據國君也良善也謂之慈母故為其善國君之妾子於禮不服也昭公年三十乃䘮齊歸猶無慼容是不少又安能不忍於慈母此非昭公明矣未知何公也今也君為之服是逆古之禮而亂國法也若終行之則有司将書之以遺後世無乃不可乎公曰古者天子練冠以燕居公弗忍也遂練冠以䘮慈母自魯昭公始也公之言又非也天子練冠以燕居蓋謂庻子王為其母曾子問曰卿大夫将為尸於公受宿矣而有齊衰内䘮則如之何孔子曰出舍乎公館以待事禮也吉㓙不可以同處又問曰竝有䘮如之何何先何後竝謂父母若親同者同月死孔子曰葬先輕而後重其奠也先重而後輕禮也自啟及葬不奠不奠務於當葬者行葬不哀次不哀次輕於在殯者反葬奠而後辭於殯遂脩葬事殯當為賓聲之誤也辭於賓謂告将葬啟期也其虞也先重而後輕也孔子曰宗子雖七十無無主婦族人之婦不可無統非宗子雖無主婦可也又問曰将冠子冠者至揖讓而入聞齊衰大功之䘮如之何冠者賓及賛者孔子曰内䘮則廢外䘮則冠而不醴徹饌而埽即位而哭如冠者未至則廢内䘮同門也不醴不醴子也其廢者䘮以成服因䘮而冠如将冠子而未及期日而有齊衰大功小功之䘮則因䘮服而冠廢吉禮而因䘮冠俱成人之服及至也除䘮不改冠乎孔子曰天子賜諸侯大夫冕弁服於太廟歸設奠服賜服於斯乎有冠醮無冠醴酒為醮冠禮醴重而醮輕此服賜服酌用酒尊賜也不醴明不改冠改冠當醴也父沒而冠則已冠埽地而祭於禰已祭而見伯父叔父而後饗冠者饗謂禮之又問曰祭如之何則不行旅酬之事矣孔子曰聞之小祥者主人練祭而不旅奠酬於賓賓弗舉禮也奠無尸虞不致爵小祥不旅酬大祥無筭爵彌吉也昔者魯昭公練而舉酬行旅非禮也孝公大祥奠酬弗舉亦非禮也孝公隠公之祖父又問曰小功可以與於祭乎祭謂虞祭哭時孔子曰何必小功耳自斬衰以下與祭禮也曾子曰不以輕䘮而重祭乎恠使重者執事孔子曰天子諸侯之喪祭也不斬衰者不與大夫齊衰者與祭士祭不足則取於兄弟大功以下者又問曰相識有䘮服可以與於祭乎問已有䘮服可以助相識者祭否孔子曰緦不祭又何助於人又問曰廢䘮服可以與於饋奠之事乎謂新除䘮服也孔子曰說衰與奠非禮也執事於人之神為其忘哀疾也以擯相可也又問曰昏禮既納幣有吉日女之父母死則如之何吉日取女之吉日孔子曰壻使人弔如壻之父母死則女之家亦使人弔必使人弔者未成兄弟父䘮稱父母䘮稱母禮宜各以其敵者也父使人弔之辭云某子聞某之䘮某子使某如何不淑母則若云宋蕩伯姫聞姜氏之䘮伯姫使某如何不淑凡弔辭一耳父母不在則稱伯父母弔禮不可廢也伯父母又不在則稱叔父母壻已葬壻之伯父致命女氏曰某之子有父母之䘮不得嗣為兄弟使某致命女氏許諾而弗敢嫁禮也必致命者不敢以累年之䘮使人失嘉㑹之時壻免䘮女之父母使人請壻弗取而後嫁之禮也請請成昏女之父母死壻亦如之女免䘮壻之父母亦使人請其已葬時而致命又問曰親迎女在塗而壻之父母死如之何孔子曰女改服布深衣縞總以趨䘮布深衣縞總婦人始䘮未成服之服女在途而女之父母死則女反奔䘮服期如壻親迎女未至而有齊衰大功之䘮則如之何孔子曰男不入改服於外次女入改服於内次然後即位而哭不聞䘮即改服者昏禮重於齊衰以下又問曰除䘮則不復昏禮乎復猶償也孔子曰祭過時不祭禮也又何反於初重喻輕也同牢及饋享相飲食之道又問曰女未廟見而死則如之何孔子曰不遷於祖不附於皇姑壻不杖不菲不次歸葬於女氏之黨示未成婦也遷朝廟也壻雖不備䘮禮猶為之服齊衰也又問曰取女有吉日而女死如之何孔子曰壻齊衰而弔既葬而除之夫死亦如之未有期三年之恩也女服斬衰又問曰古者師行必以遷廟主行乎孔子曰天子廵守以遷廟主行載於齊車言必有尊也今也取七廟之主以行則失之矣齊車金路當七廟五廟無虛主虛主者惟諸侯薨與去其國與祫祭於祖為無主耳吾聞諸老𥅆曰國君薨則祝取羣廟之主而藏諸祖廟禮也卒哭成事而後主各反其廟老𥅆古夀老者之號也與孔子同時藏諸主於祖廟象有㓙者聚也卒哭成事先祔之祭名也君去其國太宰取羣廟之主以從禮也鬼神依人者也祫祭於祖則祝迎四廟之主祝接神者也主出廟入廟必蹕蹕止行者又問曰古者師行無遷主則何主孔子曰主命問曰何謂也孔子曰天子諸侯将出必以幣帛皮圭告於祖禰遂奉以出載於齊車以行毎舍奠焉而後就舍以脯醢禮神乃敢即安也所告而不以出即埋之反必告設奠卒歛幣玉藏諸両階之間乃出蓋貴命也又問曰諸侯旅見天子入門不得終禮廢者㡬旅衆孔子曰請問之曰太廟火日食后之䘮雨霑服失容則廢太廟始祖廟宗廟皆然主於始祖耳如諸侯皆在而日食則從天子救日各以其方色與其兵示奉時事有所討也方色者東方衣青南方衣赤西方衣白北方衣黒兵未聞也太廟火則從天子救火不以方色與兵又問曰當祭而日食大廟火其祭也如之何孔子曰接祭而已矣如牲至未殺則廢接祭而已不迎尸也又問曰三年之䘮弔乎孔子曰三年之䘮練不羣立不旅行為其茍語忘哀也君子禮以飾情三年之䘮而弔哭不亦虛乎為彼哀則不專於親也為親哀則是妄弔曽子問曰大夫有私䘮可以除之矣而君有服焉其除之也如之何孔子曰有君䘮服於身不敢私服又何除焉重喻輕也私䘮家之䘮也䘮服四制曰門外之治義斷恩於是乎有過時弗除也君之䘮服除而後殷祭禮也謂主人也支子則否又問曰父母之䘮弗除可乎以其有終身之憂孔子曰先王制禮過時弗舉禮也非弗能勿除也患其過於制也故君子過時不祭禮也言制禮以為民中過其時則不成禮也又問曰父母之䘮既引及塗聞君薨如之何孔子曰遂既封改服而往封當為窆改服括髮徒跣布深衣扱上衽不以私䘮包至尊又問曰宗子為士庻子為大夫其祭也如之何孔子曰以上牲祭於宗子之家貴禄重宗也上牲大夫少牢祝曰孝子某為介子某薦其甞事介副也不言庻使若可以祭然若宗子有罪居於他國庻子為大夫其祭也祝曰孝子某使介子某執其常事此之謂宗子攝大夫攝主不厭祭不旅不假不綏祭不配皆辟正主厭厭飫神也厭有隂有陽迎主之前祝酌奠奠之且饗是隂厭也尸祭之後徹薦爼敦設於西北隅是陽厭也此不厭者不陽厭也不旅不旅酬也假讀為嘏不嘏不嘏主人也不綏祭謂今主人也綏周禮作墮不配者祝辭不言以某妃配某氏布奠於賓賓奠而不舉布奠謂主人酧賓奠觶於薦北賓奠謂取觶奠於薦南也此酬之始也奠之不舉止旅不歸肉肉爼也謂與祭者留之共燕其辭於賓曰宗兄宗弟宗子在他國使某辭辭猶告也宿賓之辭與宗子為列則曰宗兄若宗弟昭穆異者曰宗子而已其辭若云宗兄某在他國使某執其常事使某告又問曰宗子在他國庻子無爵而居者可以祭之乎孔子曰祭有子孫存不可以乏先祖之祀請問其祭如之何孔子曰望墓而為壇以時祭不祭於廟無爵者賤逺辟正主若宗子死告於墓而後祭於家言祭於家若無廟也宗子死稱名不言孝孝宗子之稱不敢與之同其辭但言子某薦其常事身没而已至子可以稱孝子游之徒有庻子祭者以此以用也用此禮祭也若義也若順今之祭者不首其義故誣於祭也首本也誣猶妄也又問曰祭必有尸乎言無益無用為若厭祭亦可乎厭時無尸孔子曰祭成䘮者必有尸尸必以孫孫㓜則使人抱之無孫則取於同姓可也人以有子孫為成人子不殤父義繇此也祭殤必厭盖弗成也厭飫而已不成其為人祭成䘮而無尸是殤之也與不成人同孔子曰有隂厭有陽厭言祭殤之禮有於隂厭之者有於陽厭之者曾子問曰殤不祔祭何謂隂厭陽厭祔當為備聲之誤也言殤乃不成人祭之不備禮而云隂厭陽厭乎此失孔子之指也祭成人始設奠於奥迎尸于前謂之隂厭尸謖之後改饌於西北隅謂之陽厭殤則不備孔子曰宗子為殤而死庻子弗與後族人以其倫代之明不序昭穆立之廟其祭之就其祖而已代之者主其禮其吉祭特牲尊宗子從成人也凡殤則特豚自卒哭成事之後為吉祭祭殤不舉無肵爼無𤣥酒不告利成此其無尸及所䧏也其它如成人舉肺脊肵爼利成禮之始於尸者是謂隂厭是宗子而殤祭之於奥之禮小宗為殤其祭禮亦如之凡殤與無後者祭於宗子之家當室之白尊於東房是謂陽厭凡殤謂庻子之適也或昆弟之子或從父昆弟無後者如有昆弟及諸父此則今死者皆宗子大功之内親共祖禰者言祭於宗子之家者為有異居之道也無廟者為墠祭之親者共其牲物宗子皆主其禮當室之白尊於東房異於宗子之為殤當室之白謂西北隅得户明者曰陽凡祖廟在小宗之家小宗祭之亦然宗子之適亦為凡殤過此以往則不祭也祭適者天子下祭五諸侯下祭三大夫下祭二士以下祭子而止又問曰葬引至於堩日有食之則有變乎且不乎孔子曰昔者吾從老𣆀助葬於巷黨及堩日有食之老𥅆曰丘止柩就道右止哭以聽變既明反而後行曰禮也巷黨黨名也就道右者行相左變日食也反復也反葬而丘問之曰夫柩不可以反者也日有食之不知其已之遲數則豈如行哉已止也數讀為速老𥅆曰諸侯朝天子見日而行逮日而舍奠大夫使見日而行逮日而舍舍奠每将舍奠行主夫柩不蚤出不莫宿侵晨夜則近姦冦見星而行者唯罪人與奔父母之䘮者乎日有食之安知其不見星也為無日而慝作豫止也且君子行禮不以人之親痁患痁病也以人之父母行禮而恐懼其有患害不為也吾聞諸老𥅆云又問曰為君使而卒於舍禮曰公館復私館不復凡所使之國有司所授舍則公館已何謂私館不復復始死招魂孔子曰善乎何之也善其問難明也自卿大夫士之家曰私館公館與公所為曰公館公館復此之謂也公館若今縣官館也公所為君所命使舍己者又問曰下殤土周葬於園遂輿機而往塗邇故也土周堲周也周人以夏后氏之堲周葬下殤於園中以其去成人逺不就墓也機輿尸之牀也以䋲縳其中央又以䋲從両旁而鈎之以機舉尸輿之以就園而歛葬焉途近故耳今墓逺則其葬也如之何今人歛下殤於宫中而葬於墓與成人同墓乃途逺其葬堂與其棺乎載之也問禮之變也孔子曰吾聞諸老𥅆曰昔者史佚有子而死下殤也墓逺蓋欲葬墓如長殤從成人也長殤有送葬車者則棺載之矣史佚成王時贒史也贒猶有所不知召公謂之曰何以不棺歛於宫中欲其歛於宫中如成人也歛於宫中則葬猶當載之史佚曰吾敢乎哉畏知禮也召公言於周公為史佚問周公曰豈不可言是豈於禮不可不許也使佚行之失指以為許也遂用召公之言下殤用棺衣棺自史佚始棺謂歛於棺公儀仲子之䘮檀弓免焉故為非禮以非仲子也禮朋友皆在他邦乃袒免仲子舍其孫而立其子此其所立非也公儀蓋魯同姓同禮適子死立適孫為後檀弓曰何居我未之前聞也居讀為姫姓之姫齊魯之問語助也前猶故也趨而就子服伯子於門右曰仲子舍其孫而立其子何也去賓位就主人兄弟之贒者而問之子服伯子蓋仲孫蔑之𤣥孫子服景伯蔑魯大夫伯子曰仲子亦繇行古之道也昔者文王舍伯邑考而立武王㣲子舍其孫腯而立衍也夫仲子亦猶行古之道也伯子為親者隠耳立子非也文王立武王權也㣲子適子死立其弟衍殷禮也子游問諸孔子孔子曰否立孫據周禮言偃呉人字子游有子與子游立見孺子慕者有子謂子㳺曰予壹不知夫喪之踊也予欲去之乆矣情在於斯其是也夫䘮之踊猶孺子之號慕子游曰禮有㣲情者節哭踊有以故興物者衰絰之制有直情而徑行者戎狄之道也哭踊無節衣服無制禮道則不然與戎狄異人喜則斯陶陶欝陶也陶斯咏咏謳也咏斯猶猶當為揺聲之誤也揺謂身動揺也秦人猶揺聲相近猶斯舞手舞也舞斯愠愠怒也愠斯戚戚憤恚戚斯歎歎吟息歎斯辟辟拊心辟斯踊矣踊躍品節斯斯之謂禮舞踊皆有節乃成禮人死斯惡之矣無能也斯倍之矣無能謂心之無所復能是故制絞衾設蔞翣為使人勿惡也絞衾尸之飾蔞翣棺之墻飾周禮婁作柳始死脯醢之奠将行遣而行之既葬而食之将行将葬也葬有遣奠食反虞之祭未有見其饗之者也自上世以來未之有舍也為使人勿倍也舍廢也故子之所刺於禮者亦非禮之訾也訾病也又公叔木有同母異父之昆弟死問於子㳺木當為朱春秋作戍衞公叔文子之子定公十四年奔魯子游曰其大功乎疑所服也親者屬大功是卜商字子夏狄儀有同母異父之昆弟死問於子夏子夏曰我未之前聞也魯人則為之齊衰狄儀行齊衰今之齊衰狄儀之問也又孔子之䘮有自燕來觀者舍於子夏氏子夏曰聖人之葬人與人之䘮聖人也子何觀焉與及也昔者夫子言之曰吾見封之若堂者矣封築土為壟堂形四方而髙見若坊者矣坊形旁殺平上而長見若覆夏屋者矣覆謂茨瓦也夏屋今之門廡也其形旁廣而卑見若斧者矣斧形旁殺刃上而長從若斧者焉孔子以為刃上難登狹又易為功馬鬛封之謂也俗間名今一日而三斬板而已封板蓋廣二尺長六尺斬板謂斷莫縮也三斷止之旁殺蓋髙四尺其廣袤未聞也詩云縮板以載尚行夫子之志乎哉尚庻幾也衞司徒敬子死司徒官氏公子許之後子夏弔焉主人未小歛絰而往子游弔焉主人既小歛子游出絰反哭皆以朋友之禮往而二人異子夏曰聞之也與曰聞諸夫子主人未改服則不絰曽子名參南武城人也有子問於曽子曰問䘮於夫子乎有子孔子弟子有若也夫子卒後問此庻有異聞也䘮謂仕失位也魯昭公孫于齊曰䘮人其何稱曰聞之矣䘮欲速貧死欲速朽有子曰是非君子之言也貧朽非人所欲曽子曰參也聞諸夫子也有子又曰是非君子之言也曽子曰參也與子游聞之有子曰然然則夫子有為言之也曽子以斯言告於子游子游曰甚哉有子之言似夫子也昔者夫子居於宋見桓司馬自為石椁三年而不成桓司馬宋向戌之孫名魋夫子曰若是其靡也死不如速朽之愈也死之欲速朽為桓司馬言之也靡侈南宫敬叔反必載寳而朝敬叔魯孟僖子之子仲孫閲蓋甞失位去魯得反載寳來朝於其君夫子曰若是其貨也䘮不如速貧之愈也䘮之欲速貧為敬叔言之也曽子以子游之言告於有子有子曰然吾固曰非夫子之言也曽子曰子何以知之有子曰夫子制於中都四寸之棺五寸之椁以斯知不欲速朽也中都魯邑名也孔子甞為之宰為民作制孔子繇中都宰為司空繇司空為司㓂昔者夫子失魯司㓂将之荆将應聘於楚蓋先之以子夏又申之以冉有以斯知不欲速貧也言汲汲於仕得禄仲憲言於曽子曰夏后氏用明噐示民無知也所謂致死之仲憲孔子弟子原憲殷人用祭噐示民有知也所謂致生之周人兼用之示民疑也言使民疑於無知與有知曽子曰其不然乎其不然乎非其說之非也夫明噐鬼噐也祭噐人噐也夫古之人胡為而死其親乎言仲憲之言三者皆非此或用鬼噐或用人噐曽申問於曽子曰哭父母有常聲乎曰中路嬰兒失其母焉何常聲之有嬰猶鷖彌也言其若小兒亡母啼號安得常聲乎所謂哭不哀穆公之母卒穆公魯哀公之曽孫使人問於曽子曰如之何問居䘮之禮曽子曽參之子名申對曰申也聞之申之父曰哭泣之哀齊斬之情饘粥之食自天子逹子䘮父母尊卑同有子名若魯人曽子曰晏子可謂知禮也已恭敬之有焉言禮者敬而已矣有若曰晏子一狐裘三十年遣車一乗及墓而反國君七个遣車七乗大夫五个遣車五乗晏子焉知禮言其大儉偪下非之及墓而反言其既窆則歸不留賓有事也人臣賜車馬者乃得有遣車遣車之差大夫五諸侯七天子九諸侯不以命數䘮數畧也个謂所包遣奠牲體之數也雜記曰遣車示牢具仲梁子魯人也曽子曰尸未設飾故帷堂小歛而徹帷仲梁子曰夫婦方亂故帷堂小歛而徹帷歛者動揺尸帷堂為人褻之言方亂非也仲梁子魯人也或問於曽子曰夫既遣而包其餘猶既食而裹其餘與君子既食則裹其餘乎言遣既奠而又包之是與食於人已而裹其餘将去何異與君子寧為是乎言傷亷也曽子曰吾子不見大饗乎夫大饗既饗卷三牲之爼歸於賓館父母而賓客之所以為哀也子不見大饗乎既饗歸爼所以厚之也言父母家之主今賓客之是孝子哀親之去也又小歛之奠子游曰於東方曽子曰於西方歛斯席矣曽子以俗說非又大歛奠於堂乃有席小歛之奠在西方魯禮之末失也末世失禮之為縣子魯人也陳荘子死赴於魯魯人欲勿哭君無哭隣國大夫之禮陳荘子齊大夫陳恒之孫名伯繆公召縣子而問焉縣子曰古之大夫束脩之問不出境雖欲哭之安得而哭之以其不外交今之大夫交政於中國雖欲勿哭焉得而弗哭言時君弱臣強政在大夫專盟㑹以交接且臣聞之哭有二道有愛而哭之有畏而哭之以權㣲勸之公曰然然則如之何而可縣子曰請哭諸異姓之廟明不當哭於是與哭諸縣氏子思孔子孫伯魚之子也曽子謂子思曰伋五口執親之䘮也水漿不入於口者七日言己以疾時禮而不如子思曰先王之制禮也過之者俯而就之不至焉者跂而及之故君子之執親之䘮也水漿不入於口者三日杖而後能起為曽子言難繼以禮抑之柳若衞人也子思之母死於衞伯魚卒其妻嫁於衞柳若謂子思曰子聖人之後也四方於子乎觀禮子蓋慎諸見子思欲為嫁母服恐其失禮戒之嫁母齊衰期子思曰吾何慎哉吾聞之有其禮無其財君子弗行也謂時可行而財不足以備也有其禮有其財無其時君子弗行也謂財足以備禮而時不得行者吾何慎哉時所止則止時所行則行無所疑也䘮之禮如子贈禭之屬不踰主人冊府元龜卷五百七十一
