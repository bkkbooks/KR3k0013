body:
  text: 册府元龜卷九百七十四宋王欽若等撰外臣部襃異先王之御夷狄也接之以禮示之以信濡之以惠澤聳之以威德羈縻勿絶而已葢以其桀驁成性荒簡無常不可以臣畜之也三代而下因其慕嚮厚加恩紀以申撫納或優厥贈賄或被以冠帶賜印綬以異其數班幣帛以將其意以至殊館榖之待加優戲之娛紆車駕以臨㑹命公卿而祖道又復哀其淪䘮錄其勲伐恩及母妻賞逮臣僕用能綏懐遐阻窒其侵叛之原震耀威靈成乎率服之盛斯亦來逺之奇策也周成王既伐東夷肅慎來賀海東諸夷駒麗扶餘濊貊之屬武王克商皆通道焉成王即政而叛成王伐而服之故肅慎氏來賀王俾榮伯作賄肅慎之命榮國名同姓諸侯為卿大夫王使之為命書以幣賄賜肅慎之夷漢文帝元年以南粤王趙佗親冢在真定置守邑親謂父母也嵗時奉祀召其從昆弟尊官厚賜寵之武帝元鼎四年南粤王興上書請比内諸侯三嵗一朝帝許之賜其丞相吕嘉銀印及内史中尉太傅印餘得自置元封二年既平西南夷其君長以百數獨夜郎滇受王印滇小邑也最寵焉天漢二年以匈奴降者界和王為開陵侯昭帝元鳳四年平樂監傅介子刺殺樓蘭王漢乃立樓蘭王先降漢者弟尉屠耆為王更名其國為鄯善為刻印章賜以宫女為夫人備車騎輜重重直用切丞相將軍百官送至横門外横音光祖而遣之為設祖道之禮也宣帝夲始三年校尉常惠將烏孫兵入匈奴右地大克獲漢遣惠持金幣賜烏孫貴人有功者元康元年龜兹主絳賓來朝王及夫人皆賜印綬夫人號稱公主夫人即烏孫公主女也王上書言得尚漢外孫願與公主女俱入朝也賜以車騎旗鼓歌吹數十人綺繡雜繒琦珍凡數千萬琦音奇留且一年厚贈送之二年烏孫昆彌及太子左右大將都尉皆遣使凡二百餘人入漢迎公主天子自臨平樂觀㑹匈奴使者外國君長大角抵設樂而遣之甘露二年匈奴呼韓邪單于欵五原塞欵叩也願奉國珍朝三年正月詔曰葢聞五帝三王敎化所不施不及以政今匈奴單于稱北蕃朝正朔朕之不逮德不能𢎞覆其以客禮待之令單于位在諸侯王上贊謁稱臣而不名於是朝天子于甘泉宫漢寵以殊禮賜以冠帶衣裳黄金璽盭綬盭古戾字戾草名也以戾染綬亦諸侯王之制也玉具劍標首鐔衛用玉為之也鐔劍口旁横出者也衛劍鼻也鐔音淫衛字夲作彘其音同耳佩刀弓一張矢四發發猶今言箭一放兩放也今則以一矢為一放也棨㦸十棨㦸有衣之㦸也棨音啓安車一乗鞍勒一具勒馬轡也馬十五匹黄金二十斤錢二十萬衣被七十七襲一稱為一襲猶今人之言以副衣服也錦繡綺縠雜帛八千匹絮六千斤禮畢使使者道單于先行宿長平道讀曰導長平涇水上坂也帝自甘泉宿池陽宫登長平詔單于毋謁不令拜也其左右當户之羣臣皆得列觀及諸蠻夷君長王侯數萬咸迎於渭橋下夾道陳帝登渭橋咸稱萬嵗單于就邸留月餘遣歸國是時西域都䕶韓宣奏烏孫大史大祿大監皆可以賜金印紫綬以尊輔大昆彌漢許之黄龍元年呼韓邪單于復入朝禮賜如初加衣百一十襲錦帛九千疋絮八千斤元帝竟寜元年呼韓邪單于入朝禮賜如初加衣服錦帛絮皆倍於黃龍時成帝河平四年復株絫若鞮單于來朝復音服絫力追切加賜錦繡繒帛二萬匹絮二萬斤它如竟寜時哀帝元壽二年烏珠留單于來朝加賜衣三百七十襲錦繡繒帛三萬匹絮三萬斤它如河平時後漢光武建武十七年莎車王賢遣使奉獻請都䕶乃因其使賜賢西域都䕶印綬及車旗黄金錦繡二十五年烏桓大人來朝大人謂渠帥也南單于及扶餘王遣使詣闕貢獻扶餘國在海東去𤣥莵千餘里是時四夷朝貢絡繹而至天子乃命大㑹勞饗賜以珍寶二十六年南單于遣子入侍奉奏詣闕詔賜單于冠帶衣裳黃金璽盭緺綬盭音戾綠色緺古蛙切紫青色也安車羽葢華藻駕駟寳劍弓箭黒節三駙馬二黃金錦繡繒布萬匹絮萬斤樂器鼓車棨㦸甲兵飲食什器自是單于嵗盡輙遣奉奏送侍子入朝中郎將從事一人將領詣闕漢遣謁者送前侍子還單于庭交㑹道路元正朝賀拜祠陵廟畢漢乃遣單于使令謁者將送賜綵繒千匹錦四端金十斤大官御食醬及橙橘龍眼荔支賜單于母及諸閼氏單于子及左右賢王左右谷蠡王骨都侯有功善者綵繒合萬匹嵗以為常二十九年賜南單于羊數萬頭中元元年南單于弟左賢王莫立帝遣使者齎璽書鎮慰授璽綬遺冠幘絳單衣三襲童子佩刀緄帶各一又賜繒綵四千匹令賞賜諸王骨都侯已下其後單于薨弔祭慰以此為常明帝永平四年遼東太守祭彤誘賂鮮卑使斬叛烏丸歆志賁等首於是鮮卑自燉煌酒泉以東邑落大人皆詣遼東受賞賜青徐二州給錢嵗二億七千萬以為常和帝永元四年北匃奴右谷蠡王於除鞬自立為單于鞬九言切於除鞬其名也欵塞乞降遣大將軍左校尉耿䕫即授印仍賜玉具劍羽蓋車一駟中郎將持節衛䕶焉九年益州郡徼外蠻及撣音擅國王雍繇調遣重譯奉國珍寶帝賜金印紫綬小君長皆加印綬錢帛安帝永初元年鮮卑大人燕荔陽詣闕朝賀鄧太后賜以玉印綬赤車參駕元初三年南單于右鹿蠡王須沈撃零昌於靈州斬首八百餘級封須沈破虜侯金印紫綬賜金帛各有差永寜元年扶餘王遣嗣子尉仇台詣闕貢獻帝賜以印綬是年撣國王雍繇調遣使詣闕朝賀獻樂及幻人明年元會帝作樂於庭封雍繇調為漢大都尉賜印綬金銀綵繒各有差順帝永建六年日南徼外蠻調便遣使貢獻帝賜調便金印紫綬陽嘉二年南匈奴骨都侯夫沈從匈奴中郎将王稠出塞擊鮮卑破之詔賜夫沈金印紫綬及縑綵各有差永和元年抉餘王來朝帝作黄門鼔吹角抵戲以遣之漢安二年立呼蘭若尸逐就單于兠樓儲為南單于兠樓儲先在京師天子臨軒大鴻臚持節拜授璽綬引上殿賜青蓋駕駟鼔車安車駙馬騎玉具刀劍什物玉具標首鐔衛盡用玉為之給綵布二千匹賜單于閼氏以下金錦錯雜具駢車馬二乗遣行中郎将持節䕶送單于歸南庭詔太常大鴻臚與諸國侍子于廣陽城門外廣陽雒陽城西面南頭門祖㑹享賜作樂角抵百戲角抵之戲則龍魚爵馬之屬言兩兩相當亦角而為抵對即今之鬬角古之角抵也帝幸胡桃宫臨觀之魏文帝黄初元年更授匈奴南單于呼厨泉衛璽綬賜青葢車乘輿寶劍玉玦三年鮮卑王步度根詣闕貢獻厚加賞賜明帝景初二年倭女王卑彌呼遣大夫難升米牛利等朝獻詔以難升米為率善中郎将牛利為率善校尉假銀印青綬引見勞賜遣還并賜倭王金帛錦罽刀鏡等物事具外臣封册門齊王正始四年倭王遣使大夫伊聲耆掖邪拘等八人上獻拜率善中郎将印綬六年詔賜倭大夫難升米黄幢付郡假綬宋文帝元嘉七年天竺迦毘黎國王同愛遣使來奉獻金剛指環摩勒金環諸寶物赤白鸚鵡各一頭以其使主竺扶為建威將軍九年以吐谷渾慕容延為平東将軍吐谷渾拾䖍為平北将軍吐谷渾耀伐為鎮軍将軍南齊武帝永明二年扶南王遣使那伽仙來獻方物詔曰那伽仙屢銜邊譯頗悉中土闊狹令其具宣上報以絳紫地黄碧綠紋綾各五匹後魏孝文太和十五年髙麗王璉卒帝為璉舉哀于城東行宫宣武永平三年十二月詔于青州立髙麗廟孝莊達義元年詔蠕蠕主阿那瓌讃拜不名上書不稱臣後周武帝時突厥自俟斤以來其國富彊帝既與之和親嵗給繒絮綿綵十萬段突厥在京師者又待以優禮衣錦食肉常以千數隋髙祖開皇初突厥沙鉢略奉表稱臣帝下詔肅告郊廟傳頒天下自是詔答諸事並不稱名以異之其妻可賀敦周千金公主賜姓楊氏編之屬藉改封大義公主七年正月先是突厥沙鉢畧獵于常代之間還至紫河鎮其牙帳為火所燒沙鉢畧惡之月餘而卒至是帝為廢朝三日遣太常弔祭焉贈帛五千段其弟處羅俟立帝賜之鼔吹旗鼔十年突厥意利彌豆啓民可汗染千賜來朝射于武安殿選善射者十二人分為兩朋啓民曰臣繇長孫大使得見天子今日賜射願入其朋許給晟箭六隻發皆入鹿啓民朋竟勝時長孫晟持節䕶突厥也煬帝大業三年幸榆林突厥啓民可汗來朝賜帛三千段乃御千人大帳享啓民及其部落酋長三千五百人賜帛二十萬段其下各有差復下詔曰德合天地覆載所以弗遺功格區㝢聲敎所以咸洎至于梯山航海請受正朔襲冠觧辮同被臣民是故王㑹納貢義彰前册呼韓入臣待以殊禮突厥意利珍寳啓民可汗志懐沈毅世修藩職往者挺身違難拔足歸仁先朝嘉此欵誠授以徽號資其甲兵之衆收其破㓕之餘復祀于既亡之國繼絶于不存之地斯固施均亭育澤漸要荒者矣朕以薄德祗奉靈命思播逺猷光融令緒是以親廵朔野撫寜藩服啓民深委誠心入奉朝覲其種落拜首軒墀言念丹欵良以嘉尚宜隆榮數式優常典可賜路車乗馬鼓吹幡旗賛拜不名位在諸侯王上帝親廵雲内泝金河而東北幸啓民所居啓民奉觴上壽跪伏甚恭帝大悦賦詩曰鹿塞鴻旗駐龍庭翠輦廻氈帷望風舉穹廬向日開呼韓頓顙至屠耆接踵來索辮擎羶肉韋韝獻酒杯何如漢天子空上單于臺帝賜啓民及公主金甕各一及衣服被褥錦綵特勒以下各有差啓民仍扈從入塞至定襄詔令歸藩四年四月突厥啓民可汗朝于東都禮賜益厚又詔曰突厥意利珍豆啓民可汗率領部落保附關塞遵奉朝化思改戎俗頻入謁覲屬有陳請以氈牆毳幕事窮荒陋上棟下宇願同比屋誠心懇切朕之所重宜于萬壽戍置城屋具帷帳牀褥以上隨事量給務從優厚稱朕意焉是年疾終帝為廢朝三日二年六月髙昌王吐屯設來朝帝御觀風行殿盛陳文物奏九部樂魚龍曼延宴于殿上以寵異之其蠻夷陪列者三十餘國八年突厥處羅從征高麗賜號為曷薩那可汗賞賜甚厚唐髙祖武德元年十月戊寅讌突厥使者奏九部樂于庭引骨咄祿特勒升御坐以寵之十二月西突厥曷薩那可汗自宇文化及所來降帝為之興引升御坐賜以酒食二年六月己酉突厥始畢可汗卒遣使來告帝舉哀于長樂門賻物三萬段三年正月甲午宴突厥奏九部樂于庭賜綵有差五月庚午宴突厥使奏九部樂于庭賜帛各有差七年七月戊戍交州首領來朝奏九部樂以宴之賚物各有差八年四月己丑宴西藩突厥林邑使者奏九部樂于庭太宗貞觀元年西突厥統葉䕶為伯父所殺帝聞統葉䕶之死甚悼之遣賫玉帛至其死所祭而焚之㑹其國亂不果至而止三年正月辛亥契丹渠帥來朝賜之鼓纛五年十月己酉順州都督北平王阿史那什鉢苾卒帝舉哀于永安門賵贈甚厚詔中書侍郎岑文本為立碑什鉢苾始畢可汗之子初與頡利有隙故來奔帝禮之甚厚是月霫大酋俟斤多濫曷末率所部與廻紇俱來朝見拜右驍衛大将軍燕然都督六年八月賜西突厥莫賀設鼔纛綵萬段八年正月癸未右衛大將軍阿史那咄苾卒即頡利可汗也詔其國人葬之從其俗禮焚屍于灞水之東贈歸義郡王謚曰荒葬事所須隨用供給其舊臣胡祿達官吐渾邪自剄以殉渾邪者頡利之母婆施氏之媵臣也頡利初誕以付渾邪至是哀慟而死帝聞而異之贈中郎將仍葬于頡利墳側詔中書侍郎岑文本製頡利及渾邪之事以紀之六月戊午右衛大將軍懐德王阿史那蘇尼失卒帝舉哀于大猷門十四年十二月乙卯髙麗長子桓權來朝遣職方郎中陳大德迎勞于柳城十六年十月庚子宴諸蕃使于兩儀殿帝謂沙鉢羅俟斤曰延陁本一部落俟斤本我所立始十餘年自筭何如頡利之衆而侵我邊疆我纔發甲騎傾其部落爾欲與我為寃不過欲費我邊境十羊五馬耳今見爾遣使謝罪捨爾前過情好如初宴罷賜帛各有差十一月甲申帝為髙麗王髙武舉哀于苑中詔贈物三百段遣使持節往弔祭焉二十一年正月鐵勒囘紇侯利絃等諸姓並同詣闕朝見帝親賚其緋黄瑞錦及褾領袍鐵勒等覩而驚駭以為未嘗聞見捧戴拜謝盤呌于塵埃中及還蕃帝御天成殿陳十部樂而遣之二十二年四月西突厥賀魯以王師問罪龜兹固請前驅願為鄉導仍以數十騎馳來謁帝詔授以崑丘道行軍總管宴之于嘉壽殿文武三品畢景甚歡錫賀魯綾綵仍觧所服之衣以賜之八月以囘鶻忠武將軍兼大俟斤俱羅勃吞莫賀咄拔固折為右武衛大將軍十月甲戍以囘紇吐迷度子前左屯衛翊衛左郎將婆閏為左驍衛大將軍大俟斤利發使持節囘紇部落諸軍事澣海都督十二月新羅國遣其相伊贊子金春秋及其子文王來朝帝遣光祿卿栁亨持節郊勞之既至以春秋為特進文王為左武衛將軍春秋仍請改其章服以從中國製于是内出珍服賜春秋等令府給其將從二十三年二月癸巳特進新羅金春秋還國令三品已上宴餞之優禮甚備太宗貞觀二十三年六月即位七月于闐國王伏闍信來朝拜右衛大將軍又授其子葉䕶玷為右驍衛將軍並賜金帶錦袍布帛六千段并宅一區留數月而遣之因請留子弟以備宿衛太宗葬昭陵刻石像其形列于𤣥闕之下永徽元年五月寳王吐蕃贊府薨帝舉哀于光化門遣右武侯將軍鮮于濟賫璽書往弔祭之顯慶五年九月蘇定方降百濟王義慈以獻數日病卒贈金紫光祿大夫衛尉卿特許其舊臣赴䘮仍葬于孫皓陳叔寳墓之側官為立碑是年新羅王金真德卒帝為舉哀于永光門使太常丞張友收持節弔祭之賜開府儀同三司仍賜綾綵三百段龍朔元年九月特進新羅王金春秋薨帝于雒城門舉哀遣使持節往弔之則天聖歴二年十月吐蕃首領贊婆至遣羽林飛騎郊外迎之庚戌宴贊婆于武威殿極歡而罷中宗神龍元年七月吐蕃大首領贊普卒帝為之舉哀廢朝一日景龍二年十二月丙申宴堅昆使于兩儀殿就其家弔焉四月己亥右衛大將軍員外置同正員濛池都䕶十姓可汗阿史那懐道加特進祿料並依品給六月丙寅吐蕃使宰相尚欽藏及御史名悉獵來獻賜一書帝御承天門樓命有司引見置酒于殿内享之七月丙辰突厥䑕尼施首領參有及突騎施領賀勒哥羅來降命有司宴之各賜帛五十疋十月庚辰宴新羅使于内殿勑宰臣及四品已上清官預焉胡祿屋二萬帳詣北庭内屬勑郭䖍瓘存恤遣使賚紫𫀆金銀帶等二百餘事錦帛二萬段以賜之十二月壬戍沙陁金山等來朝宴于内殿三年正月戊申突厥葛邏祿下領裴達于來降授果毅兼葛州長史借紫金魚袋放還蕃三月已廿突厥攴匐忌等來朝帝親臨宴賜綵繡金銀器物錦等有差語之曰胡祿屋大首領軍衛將軍員外置支匐忌卿兩庭種落萬里歸降因變取通背逆從順既披誠節宜立功勲逺自邊隅來朝闕下言念忠欵朕甚嘉之卿等既欲還蕃令宜坐飲務盡歡暢六月丁巳林邑國遣使來朝授其使右領軍衛員外將放還蕃八月丙辰髙麗吐渾等諸蕃降附制曰天亡驕子胡運其終國有忠臣漢封斯在髙麗王莫離支髙文簡都督􅎤跌思大吐渾大首領刺史慕容道奴郁射施大首領鶻屈利斤大首領刺史苾悉頡力髙麗大首領拱毅等或遼海貴族或隂山寵子智則能永權而善謀從事本蕃頡頏髙位料􅊇順之道知變通之節或誓以沈族或翻然庇身共驗郅支之亡遂觀繇余之入將軍遇毅永罷射鵰使者迎降果聞乘傳棄寒苦之地就陽和之澤爾其誠哉朕實休之宜開土宇之封式盛壇場之制文禮文簡可封遼西郡王食邑三千户行左衛大將軍員外置同正員賜宅一區馬四匹物六百段􅎤跌思大可特進行右衛大將軍員外置兼􅎤跌都督封樓煩國公食邑三千户賜宅一區馬三匹物五百段道奴可左威衛將軍員外置兼刺史封雲中郡開國公食邑二千户賜宅一區物四百段馬二疋鶻屈頡斤可左驍衛將軍員外置兼刺史封隂山郡開國公食邑二千户賜馬兩疋物二百段苾悉頡力可左武衛将員外兼置刺史封鴈門郡開國公食邑二千户賜馬兩疋物四百段宅一區拱毅可左領軍衛將軍員外置兼刺史封平城郡開國公食邑二千户賜馬兩疋物四百段屈鶻頡川妻契苾賜物一百五十段手力二人各賜物五十段十月己未授北蕃投降九姓思結都督磨散為左威衛將軍大首領斛薛移利殊功為右領軍衛将軍契都督邪没施為右威衛将軍匐利羽都督莫賀突黙為右驍衛将軍首領延陁薛渾達都督為右威衛将軍奴賴大首領前自登州刺史奴賴孝為左領軍將軍􅎤跌首領刺史裴艾為右領軍並員外置依舊兼刺史賜紫袍金帶魚袋七事綵帛各三百段放還蕃四年三月丁亥新羅遣其臣金楓厚來賀正授員外郎放還蕃四月辛亥突厥俾失州大首領伊羅友闕頡斤十囊來降封其妻阿史那氏為鴈門郡夫人以向化寵之也七月戊子大食國黒密牟尼蘇於漫遣使獻金線織就寶裝玉灑地瓶各一授其使員外中郎將放還蕃九月甲戍蠻大首領洪光乘等五人來朝並授員外郎將特留宿衛閏十二月東蕃逺蕃靺鞨部落拂湼部落勃律國皆遣大首領來朝並賜物三十段放還蕃五年四月甲戍進封奚饒樂郡王李大酺妃固安縣主辛氏為固安公主五月壬子天竺國遣使來朝詔曰中天竺國大首領大野迷地羅梵摩寺殊邦慕德重譯來朝是加襃奬用益誠心可毅部尉賜緋袍銀帶放還蕃六月丙子文單國真臘國朝貢使還蕃並降璽書及帛五百疋賜國王文單真臘皆南方小國也常奉正朔職貢不絶帝嘉之故有是寵七月己亥突厥遣使獻馬授其使郎将放還蕃降書喻之曰皇帝敬問突厥可汗使人他滿達于至所言堅昆使來及吐蕃使不願入漢并奚契丹等俱知之朕于西夷亦信而已來無所拒去無所留可汗好心逺申委曲深知厚意今附銀胡瓶盤及雜綵七十匹至可領取十月丁卯日本國遣使朝貢戊辰勑曰本國逺在海外遣使來朝既渉滄波兼獻邦物其使真人莫問等宜以今月十六日于中書宴集乙酉鴻臚寺奏日本國使請謁孔子廟堂禮拜寺觀從之仍令州縣金吾相知檢校搦捉示之以整應須作市買非違禁入蕃者亦容之十一月丙申契丹李失活來朝詔勞之曰卿等累覃邦化多歴年所城池郡邑冠葢相望往緣邊牧非任遂令卿等失業念彼雄藩鞠為茂草今卿等削摧異俗歸誠本朝頻獻封章益明忠欵克復州鎮宛如平昔失活将尚公主永為藩臣入拜闕庭良深慰喜卿等涉路逺來得平安好否近屬節假不得早與卿相見且向曹司安置待後進止六年正月壬寅奚王李失活永樂公主還蕃命有司加等祖餞其私覿物六千段二月戊午契丹新羅米國石國靺鞨鐵利拂湼蕃守並遣使來朝各授守中郎將還蕃五月戊午契丹部落孫骨訥等十八人内屬並授㳺擊將軍賜緋袍銀帶留宿衛甲子以契丹松漠都督李失活卒帝深加憫悼親為舉哀使使弔祭乙酉追贈特進賻物二千段仍令左武衛將軍李玭持節充使弔祭營州都督宋慶禮檢校䘮葬七年正月乙未封遼西郡王髙文簡妻阿史那氏為遼西郡夫人文簡東蕃酋長率衆歸我故有是寵丙申波斯國遣使獻方物新羅遣使來賀正拂湼靺鞨越喜靺鞨並遣使來朝各賜帛五十疋二月丁未投降突厥延陁磨覽死贈中郎將依蕃法葬三月壬子帝御丹鳳樓宴九姓同羅及契丹各賜一百段小妻主友三十叚四月己卯訶毗施國王捺塞使吐火羅大首領摩婆羅獻獅子及五色鸚鵡帝以其逺來修貢加宴勞賜錦綵五百疋五月丁酉新羅遣使來朝卒于路贈太僕卿賻絹一百疋六月丁卯靺鞨渤海郡王大祚榮卒贈特進賜物五百叚遣左監門率上柱國吳思謙攝鴻臚卿持莭充使弔祭戊辰吐蕃遣使請和大享其使因賜其束帛用修前好以雜綵二千叚賜贊普五百叚賜贊普祖母四百叚賜贊普母二百叚賜可敦一百五十段賜坌達延一百三十叚賜論乞力徐一百段賜尚贊咄及大將軍大首領各有差皇后亦以雜綵一千叚賜贊普七百叚賜贊普祖母五百段賜贊普母二百段賜可敦七月甲申河西經略副大使兼赤水軍使左金吾衛大將軍員外置同正員囘紇伏帝匐卒贈特進賜物三百叚遣中使弔祭十一月壬申松漠郡王李娑固宴與公主俱來朝命有司借宅給食己未宴于内殿賜物一千五百段錦袍鈿帶魚袋七事八年正月己巳契丹遣蕃中郎將張少免俱等三百五十四人來朝並授㳺撃將軍果毅都尉賜緋袍銀帶物各二千段放還蕃二月乙卯䕶密國王羅施伊俱骨咄祿多比勒莫賀咄達磨薩爾為䕶宻王賜紫袍金帶七事並雜綵五十疋八月丁丑敇中書門下南天竺王逺遣朝貢其使却還並須周旋發遣令滿望乃以銀袍金帶魚袋七事賜其使遣之九年六月丁酉制曰念功之典書有明訓贈終之數禮著彝式党項大酋長故右監門衛將軍員外置同正員使持節達恤等一十二州諸軍事兼静邊州都督仍充防禦部落使拓跌思㤗頃者戎醜違命爰從討襲躬親矢石奮其忠勇方伸剪馘之勲俄軫䘮元之痛壯節彌亮美名可嘉宜崇寵章俾慰泉壤可贈特進兼左金吾衛大將軍賜物五百叚米粟五百石仍以其子守寂襲其官爵十一月己酉渤海郡靺鞨大首領鐵利大首領拂湼大首領契丹畨郎將俱來朝並拜折衝放還蕃册府元龜卷九百七十四
