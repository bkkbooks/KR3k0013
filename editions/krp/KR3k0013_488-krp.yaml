body:
  text: 册府元龜卷四百八十八宋王欽若等撰邦計部賦税第二唐德宗建中元年正月制自艱難已來徵賦名目繁雜委黜陟使與諸道觀察使刺史作年支兩税徵納比來新舊徵科色目一切停罷兩税外輙别率一錢四等官准擅興賦以枉法論其軍府支計等數准大歴十四年八月七日勅處分二月發黜陟使分往天下作兩税之法凡百役之費一錢之斂先度其數而賦於人量出以制入户無土客以見居為簿人無丁中以貧富為差行商者在所部郡縣税三十之一居人之税秋夏兩徵之俗有不便者二之餘徵賦悉罷而丁額不廢其田畝之稅率以大歴十四年墾數為准徵夏税無過六月秋税無過十一月違者進退長吏令黜陟使各量風土所宜人户多少均定其賦税尚書度支總統焉是年天下兩税之户凡三百八萬五千七十有六賦入一千三百五萬六千七十貫斛鹽利不在焉時宰相楊炎初定令式國家有租賦庸調之法開元中𤣥宗修道德以寛仁為理本故不為版籍之書人户寢溢隄防不禁丁口轉徙非舊名矣田畝移换非舊額矣貧富升降非舊第矣户部徒以空文總其故書葢不得當時之實舊制人丁戍邊者蠲其租庸六嵗免歸𤣥宗方事夷狄戍者多死不返邊將怙寵而諱敗不以死申故其貫籍之名不除至天寳中王鉷為户口使方務聚斂以丁籍具存則丁身焉往是隱課而不出耳遂案舊籍計除六年之外積徵其家三十年租庸天下之人無告則租庸之法弊乆矣迨至德之後天下兵起始以兵役因之饑厲徵求運輸百役並作人户彫耗版圖空虗軍國之用仰給於度支轉運二使四方大鎮又自給於節度都團練使賦斂之司數四而莫相統攝於是綱目大壊朝廷不能覆諸州四方貢獻悉入内庫權臣猾吏因縁為奸或公託進獻私為盗賦者動方萬計河南山東荆襄劍南有重兵處皆厚自奉養正賦所入無㡬吏之職名隨人署置俸給厚薄由其増損故科斂之名凡數百廢者不削重者不去新舊仍積不知其涯百姓受命而供之瀝膏血鬻親愛旬輸月送無有休息吏因其苛蠶食于人凡富人多丁者率為官僧以冀免役貧人無所入則丁存故課免於上而賦増于下是以天下殘瘁蕩為浮人鄉居地著者百不四五如是者殆三十年炎因奏懇言其弊乃請作兩税法德宗善而行之詔諭中外而掌賦者沮其非利言租庸之令四百餘年舊制不可輕改帝行之不疑天下便之人不土斷而地著賦不加歛而増入版籍不造而得其虗實貪吏不戒而奸無所取自是輕重之權始歸于朝廷炎救時之弊頗有嘉聲也三年五月淮南節度使陳少遊請於本道兩税錢每千増二百因詔他道悉如淮南貞元四年正月制天下兩税更審定等第仍加三年一定以為常式八年四月劍南西川節度使韋臯請加税十二以増給官吏從之五月初増税京兆青苗畝三錢以給掌閑彍騎十二年二月虢州刺史崔衍奏所部多是山田且當郵傳衝要屬嵗不稔頗有流離舊額賦租特乞蠲減虢居華陜之間而税重數倍青苗錢華陜之郊畝出十有八而虢之人畝徵七十衍乃上其事時裴延齡領度支方務聚斂乃詰衍以前後刺史無言者衍又上陳人困日久有司不宜以不訴為譴表辭切直有詔乃減虢州青苗錢十八年十月詔京畿諸縣百姓應今嵗青苗錢其中有便于納粟者計約時估價納之如便于納錢不便于納粟者宜聽委京兆府專督其務如縣令及主吏壅命者懲罰有差國家經計當有儲畜百姓徵賦深可優矜所期便人亦兾均濟咨爾長吏宜悉朕懐順宗以貞元二十一年正月即位制天下諸州府應須夫役車牛驢馬脚價之類并以兩税錢自備不得别有科配仍并依兩税元勅處分仍永為常式不得擅有諸色㩁税憲宗元和四年二月度支奏諸州府應上供受税疋叚及留使留州錢物等每年疋叚估價稍貴其留使留州錢即聞多是徵納見錢及賤價折納疋叚既非齊一有損疲人伏望起元和四年已後據州縣官正料錢數内一半任依京官例徵納見錢支給仍先以郭下兩税户合給見錢充如不足即于當州兩税内據貫均配支給其餘留使州雜給用錢即請各委州府竝依送省輕貨中估折納疋叚充如本户税錢較少不成端疋者竝任折納絲綿如舊例徴納雜物斛㪷支用者即任准舊例處分其折納疋叚定中估仍委州縣精加揀擇如有濫惡所由官并請准今年正月十五日㫖條處分應帶節度觀察使州府合送上都兩税錢既須差綱發遣其留使錢又配管内諸州供送事頗重叠其諸道留使錢伏請各委節度觀察使先以本州舊額留使及送上都兩税錢充如不足即於管内諸州兩税錢内據貫均配其諸州舊額供使錢即請隨夏税㫖限收送上都度支收入次年㫖符便為定制伏以諸道兩税徴歛不常閭井之間頗聞困弊臣今類㑹如前勅所納疋叚并依中估明知加價納物務在利及疲人若更徵剥實錢即是重傷百姓自今已後送省及留使疋叚不得剥徵折估錢但委刺史縣令分明告諭令加意織造不得濫惡故違節級科貶其供軍醬菜等價直合以留州使錢充者亦令見錢疋叚塲納仍具每州每使合納見錢數及州縣官俸料納一半見錢數同分折聞奏仍便納入今年㫖條以為常制餘依先是天下方鎮恣意誅求皆以實估斂于人虗估聞於上宰臣裴􅀈深知其弊俾有司奏請釐革江淮之人今受其賜五年正月度支奏諸州府見錢准勅宜於管内州據都徵錢數逐貫均配其先不徵見錢州郡不在分配限都配定一州見錢數任刺史着百姓隱便處置其勅文不加減者即准州府所申為定額如於勅額見錢外輙擅配一錢及納物不依送省中估刺史縣令録事參軍節級科貶六年二月制曰編戸之征既有藝極字甿之要當恤有無茍徵斂不時則困弊無日近縁諸州送使錢物囘充上供合送使者使司又立程限所以每至嵗首給用無資不免量抽夏税新陳未接營辦尤艱委觀察使且以供軍錢方員借使輙不得量抽百姓夏貢有差先乎任土周弊殊等實在便人近日所徵布帛竝先定物様一例作中估受納精粗不等退换者多轉將貨賣皆致損折其諸道留使留州錢數内綿帛等但有用處隨其髙下約中估物價優饒與納則私無棄物官靡逋財其所納見錢仍許五分之中量徵二分餘三分兼納實估疋叚六月命京兆府其兩税宜以粟麥絲絹折納十年三月京兆府奏恩勅蠲放百姓兩税及諸色逋懸等伏以聖慈憂軫疲氓屢蠲逋賦將行久逺實在均平有依倚權豪因循觀望忽逄恩貸全免征繇至于孤弱貧人里胥敦迫及期輸納不敢稽違曠蕩之㤙飜不霑及亦有奸猾之軰僥倖為心時雨稍愆已生覬望競相誘扇因致逋懸若無綱條實恐滋弊自今後忽逄不稔或有恩蕩伏請每貫每石内分數放免輸納已畢者准數折免來年租税則恩澤所加強弱普及人知分限自絶奸欺從之諸州府亦准此處分十一年六月京兆府奏今年諸縣夏税折納綾絹絁紬絲綿等竝請依本縣時價只定上中下等每疋加饒二百文綿每兩加饒十五文絲每兩加饒二十文其下等物不在納限小户本錢不足任納絲綿斛斗須是本户如非本户輙合集買成疋叚代納者所由决十五枷項令衆勅㫖依奏十三年正月勅天下諸州府百姓兩税之外輙不得更有差率已頻申勅尚恐因循宜委御史臺一切糺察其諸道州府因用兵以來或應有權置職名及擅加科配事非制者一切禁斷准西側近應縁資給軍用權宜𣙜税經奏請者各委條流停省十四年四月勅如聞諸道州府長吏等或有本任得替後遂于當處買百姓莊園舎宅或因替代請庇便破除正額兩税不出差科今後有此色竝須依額為定穆宗以元和十五年正月即位閏正月户部侍郎判度支崔俊奏淄青兖海鄆曹等三道及淮蔡申光等州勘定兩税錢物斛斗等奉今年正月二十二日勅前件州郡久䧟賊廷將定差科切在均一宜令度支郎中趙佶專往與所在觀察使刺史審實勘定聞奏伏以道路遥逺准㫖條夏税六月一日起徵若待使㢠廻覆奏即蚕桑已過徵税失時制使或臨又頗勞擾伏請各委本州刺史審量物力約舊配額比類隣州徵税輕重及土地物産厚薄定兩税錢物斛斗類竝具送上都及留州刺史等額分折聞奏務使平允不得令已後致有申論從之二月詔天下百姓等自属艱難棄其鄉井户部版籍虗繫姓名建中元年已來改革舊制悉歸兩税法乆則弊奸滋益生自今已後宜准例三年一定兩税非論土著客居但據資産率皆應屬諸軍諸使諸司人等在鄉村及坊市居舖經紀者宜與百姓一例差科不得妄有影占如有違越所司具所屬司并人名聞奏焉長慶元年正月制州縣應徵科兩税㩁酒錢内舊額須納見錢數者竝任百姓隨所有疋段及斛斗依當處時價送納不得邀索見錢七月制曰愛人本于省賦雖必在輕國用出于地財又安可闕今淮蔡并山東率三十餘州約數千里頒賜可踰于鉅萬給復有至于連年應河南河北等州給復限滿處置宜委所在長吏審詳墾田并桑見定數均輸税賦兼濟公私每定税訖具所増加賦申奏其諸道定户宜委觀察使刺史必加審實務使均平京兆府亦宜准此敬宗以長慶四年正月即位三月制曰自今已後州府所由户帳及墾田頃畝宜據見徵税案為定申省後户部類㑹具單數聞奏仍勅五年一定税如有逃亡死損州縣須隨事均補亦仰年終申户部如有隱漏委御史臺及所在廵院察訪聞奏天下兩税及諸色𣙜税等錢弊輕重須有損益亦委中書門下條流聞奏諸道除正勅率税外不得擅有諸色𣙜税事涉擾人并宜禁斷及軍屯營種有侵占丁田課役税户者宜委御史臺切加訪察仍限勅到一月内每道各具所還州縣頃畝分析聞奏寳歴元年四月制京畿百姓多屬諸軍諸使或户内一人在軍其父子兄弟皆不受府縣差役頃者頻有制勅處分如聞尚未遵行宜委京兆府亦舉明前後條流聞奏文宗太和二年二月興元尹王涯奏本府南鄭兩税錢額素髙每年徵科例多懸欠今請于管内四州均攤代納二千五百貫文配蓬州七百五十貫果州七百五十貫通州五百貫邑州五百貫勑㫖宜付所司四年五月劍南西川宣撫使諫議大夫崔戎奏准詔㫖制置劍南西川兩税舊納見錢今令一半納見錢一半納當土所在雜物仍于時估之外每貫加饒三百五文依元估充送省及留州留使支用者今臣與郭釗商量當道兩税竝納見錢軍中支用及將士官吏俸依賜竝以見錢給付今若一半折納則將士請受折損校多今請兩税錢數内三分二分納見錢一分納疋叚及雜物准詔每貫加饒五百文計優饒百姓一十三萬四千二百四十三貫文成都府及諸縣并邛雅黎等州蠻冦所經處賦税三分蠲放一分其不經賊處亦量減放共計減放一萬七千六百二十貫文其不經賊處伏縁兩税先徵見錢今三分已一分折納雜物計優饒百姓一十三萬餘貫文西川税科舊有苗青如茄子薑芋之類每畝或至七八百文徵斂不時煩擾頗甚今令竝省税名目一切勒停盡依諸處為兩限有青苖約立等第頒給户帖兩税之外餘名一切勒停今臣與郭釗商量得報稱已是徵夏税之時改法未得先已奏請以今年已後每年冬于本色苗本額税中並減一半訖計減放四萬二千五百四十四貫文臣奉使日伏蒙處置如前可之五年十一月詔曰鄆曹濮淄青登齊萊兖海沂密等十二州自頃年收復已來屬中外多故徵賦輕重或未均平今三道守臣無非循吏百姓安逸流亡盡歸須于此時立一經制宜令諫議大夫王彦威充勘定兩税使仍與令狐楚等審商量其兩税𣙜酒及徵物疋數虗實估價并留州留使上供等錢物斛斗比類諸道一一開項分析平均攤配立一定額使人知常數不可加減廻日具件聞奏六年九月淄青觀察使王承元奏准㫖定徵兩税五州共一十九萬三千九百八十九貫淄青自收復後未有兩税上供自此始徵是年天平軍奏請起天和七年嵗供兩税𣙜酒等錢十五萬貫粟五萬石自元和末勾復李師道十二州朝廷不安反側徴賦所入盡留贍軍至是方歸王府八年十月興元觀察使請減當府及洋州兩税錢八千六百貫文移加果閬渠開等四郡開成二年二月勅諸州府或遇水旱有欠税額合供錢物斛斗委州縣官長設法招携及招户承佃其錢陸續填納年終後具歸復填補錢物數聞奏并報度支四年十二月邕管經畧使唐𢎞實奏當管上供兩税錢一千四百七十三貫文其見錢請每年附廣州綱送納勅宜委嶺南西道觀察使每年與受領廻易輕貨附綱送省其僦運脚錢仍令數内抽折武宗㑹昌元年正月制曰租斂有常王制斯在徵率無藝齊民何依尚外諸州府百姓所種田苗率税斛斗素有定額如聞近年長吏不遵條法分外徵求致使力農之夫轉加困弊亦有每嵗差官廵簡勞擾頗深自今已後州縣每年所徵斛斗一切依元額為定不得隨年簡責數外如有陂澤山原百姓或力能墾闢耕種州縣不得輙問所收苗子五年不在收税限五年之外依例收税於一鄉之中先填貧户欠闕如無欠闕即均減衆户合徵斛斗但令不失元額不得隨田地頃畝加税仍委本道觀察使每年秋成之時具管内墾闢田地頃畝及合徵上供留州使斛斗數分析聞奏數外有剰納人户斛斗刺史以下并節級重加懲貶觀察使奏聽進止仍令出使郎官御史及度支鹽鐵知院官訪察聞奏四年七月中書奏諸道百姓所納二税并留州錢帛諸物多是虗擡價例其分數並乃不依朝廷須議科䋲當行懲責勅從之宣宗大中二年正月制諸州府縣等税納只合先差優長户車牛近者多是權要及富豪之家悉請留縣輸納致使單貧之人却須僱脚般載從今已後其留縣竝須先饒貧下不支濟户如有違越節級官吏重加科殿四月勅曰朕以俗未臻於富庶念每切於黎元衣食罕充旰昃興歎夫百姓田疇地有髙低嵗有善惡復有水澇即低田不稔稍遇亢旱即高處無苗近聞州縣長吏掩其水旱傷損務求辦集唯于熟苗上加徵將填欠數致使黎元重困惠養全乖自今後州縣百姓有遭水旱苗稼不收處簡騐不虗便准前後勅文破免不得加徵熟田人户令本配額外重出斛斗四年正月大赦節文食力之徒須令自濟天下倉塲所納斛斗如聞廣索耗物别置一倉斛斗又隨斗納耗物率以為常致疲人轉困職此之由自今委長吏切加提舉一切依倉部格如有違犯專知官停見任仍殿兩選所由决脊枤二十准法處分所貴利歸農畝耕者不饑其天下諸州府百姓兩税之外輙不許更有差率已頻申勅尚恐因循宜委御史臺切加紏察如有違犯縣令録事參軍判官節級科責長吏不存勾當亦委臺司察訪聞奏其諸道州府應所征兩税疋叚等物竝留使錢物納疋叚等虗實估價及見錢從來皆有定額如聞近日或有虗實於價數内徵實估物又其分數亦不盡依勅條宜委長吏切加遵守茍有違越必議科繩本判及專知官當重懲責懿宗咸通元年十二月制舊以天下賦租年終勾竝或刺史入府或縣令上州所科羣胥盡出百姓且官有理所安可擅離物犯贓條何須枉法從今委知彈御史出使郎官凡繫扺違明具論奏仍委預為條目各遣聞知梁太祖開平元年既受唐禪兩税之法咸因唐制後唐莊宗同光二年二月勅歴代以後除桑田正税外只有茶鹽銅鐵出山澤之利有商税之名其餘諸司竝無税額偽朝已來通言雜税有形之類無税不加為弊頗深興怨無已今則軍需尚重國力未充猶且權宜未能全去見簡天下桑田正税除三司上供旣能無漏則四方雜税必可盡除仰所司速簡勘天下州府户口正額墾田實數待憑條理以息煩苛三年二月勅魏府小菉豆税每畝與減放三升城内店宅園圃比來無税頃因偽命遂有配徵後來元將所徵物色添助軍人衣賜將令通濟宜示矜蠲今據𦂳慢去處於見輸税絲上每兩作三等酌量納錢貴與充本廻圖收市軍人衣賜其絲永與除放閏十二月吏部尚書李琪上疏請兩税不以折納為事不以紐配為名止以正税加納勅本朝徵科唯有兩税至于折紐比不施為宜依李琪所論應逐税合納錢物斛斗及鹽錢等宜令租庸司指揮竝准元徵本色輸納不得更改若有移改須具事由聞奏請下中書門下商量别候勅㫖明宗初為監國下教今年夏苗委人户自供通頃畝五家為保本州具帳送省州縣不得差人簡括如人户隱欺許人陳告其田倍徵其百姓合散蠶鹽每年抵二月内一度俵散依夏税限納錢夏秋苗畝税子除元徵石斗及地頭錢餘外不得紐天成元年四月勅應納夏秋税先有省耗每斗一升起今後只納正錢不得别量省耗其餘芻藁亦不得别加徵耗三年正月勅諸道秋夏苗只取天成二年舊額徵理長興元年二月制曰應天下州府各徵秋夏苗税土地節氣各有早晩訪聞天下州縣官吏于省限前預先徵促致百姓生持送納慱買供輸既不利其生民今特議其改革宜令所司更展期限於是户部奏三京鄴都諸道州府逐年所徵夏秋税租兼鹽麴折徵諸般錢榖等起徵條流内河南府華耀陜絳鄭孟懐陳齊棣延兖沂徐宿汶申安滑濮澶商襄均房雍許邢鄧雒磁唐隋郢蔡同鄆魏汴潁復曹鄜宋亳蒲等州四十七處節候常早大小麥麴麥豌豆取五月十五日起徵至八月一日納足正税疋叚錢鞋地頭𣙜麴蠶鹽及諸色折科取六月五日起徵至八月二十日納足幽定鎮滄晉隰慈密青登淄萊邠寧慶衍十六處節候校晩大小麥麴麥豌豆取六月一日起徵至八月十五日納足正税疋叚錢鞋地頭錢𣙜麴蠶鹽及諸色折科取六月十日起徵至八月二十五日納足并潞澤應威塞軍大同軍振武軍七處節候更晩大小麥豌豆取六月十日起徵至九月納足正税疋叚錢鞋𣙜麴錢等取六月二十日起徵至九月納足三月勑天下州府受納稈草每束納一文足陌每一百束納紐子四莖充積草供使棘針一莖充揨塲院其草并柴蒿一束只納一束其細絹絁布綾羅每疋納錢一十文足陌絲綿紬線麻布等每一十兩納耗半兩麻鞋每量納錢一文足陌見錢每貫納錢七文陌省庫受納諸處上供錢物元條流見錢每貫納二文足陌絲綿紬線子每一百兩納耗一兩其諸色疋叚竝無加耗此後竝須依上件則例受納二年閏五月勅今後諸州府所納稈草每二十束别納加耗一束充塲司耗折其每束上舊納盤纒錢一文仰官典同供繫署一一分明上歴至納遣了絶已來公使不得輙將出外分張破使六月詔曰務穡勸分前賢之令範裒多益寡往聖之格言比者諸道賦税一定數額廣種不編於帳案頻通恐撓于鄉村如聞不逮之家困於輸納爰議有餘之户共與均攤貴表一時之恩不作常年之例宜委諸道觀察使於屬縣每村定有力户一人充村長於村人議有力人户出剰田苗補下貧不迨頃畝自肯者即具狀徵收有詞者即排叚簡括便自今年起為定額三年三月三司使奏諸道上供税物充兵士衣賜不足其天下兩税所納斛斗及錢除支贍外請依時估折納綾羅綿絹從之末帝清泰三年鎮州董温琪以旱苗不迨舊籍欲於諸縣均攤從之晉高祖天福元年閏十一月勅應諸道州府所徵百姓正税斛斗錢帛等除闗係省司文帳外所在州府竝不得裏私増添紐配租物三年十一月晉昌軍節度使李周奏發長安縣主簿李珝齎表到闕以境内人户羣集簡苗不得欲只於見苗上増添可之四年二月詔曰朕自臨區夏每念蒸黎常夜思而晝行兾時康而俗阜其如干戈乍息瘡痏猶多由是疚懐不能安席復又車徒甚衆廪藏方虗雖賦租未暇於矜蠲而煩擾當行于禁止俾除暴斂式合羣心應郡守藩侯不得擅加賦役及縣邑别立監徵所納田租委人户自量自槩七年十一月禮部郎中李為光上封事為諸州府倉塲逐年所納百姓秋夏租加耗頗多乞行條理庶得逺近舒蘇勅曰朕自居藩邸每務躬親禀先帝之聖謨見萬方之庶政洎登宸極思致時康屬蝗旱為災耕桑失業顧惟寡昧深軫焦勞舉一食思稼穡之艱難行一事期黎民之蘇息為光清朝名士朱邸舊僚深窮蠧政之源備得養民之本況藩侯郡牧察俗觀風必能副冲人委仗之心駐疲俗逋逃之足明行條制俾絶侵漁使税額無虧户口獲濟斯為急務要在頒行便可散下諸州嚴誡主者盡令遵守無致因循徧繄惠養之功共致昇平之運仍付所司周太祖廣順元年七月勅秋夏徵賦素有常規茍或催督及時官吏奉法自然辦及不至愆期前後所行條流頗甚苛細殊虧大體且類空言宜有改更以示懲勸起今後秋夏徵賦省限滿後十分係欠三分者縣令主簿罰一百直勒停録事參軍本曹官罰七十直殿兩選孔目官罰七十直降職次本孔目勾押官典决停本判官罰七十直若係欠三分已上奏取進止係欠三分已下者等第科斷殿罰其州縣徵科節級所由委本州重行决責其本判官録事參軍本曹官孔目勾押官典取一州都徵上比校縣令主簿即本縣都徵上比校分數州縣官吏等各處員寮司分寄任所徵賦税乃是職司茍或慢公何以食禄將勸能吏仍立賞科應諸州縣令録佐官在任徵科依省限了絶者至參選日若是四選已上者減一選若不及四選者則與轉官其已前所行賞罰條流一切不行二年二月宣徽院言雒京留司奏莊宅等六司夏秋税額頃畝地土園林亭殿房室水磑什物係籍者莊宅司諸廵元額定夏秋税定是百姓係税户千三百五十七内侍省諸廵户四百六十三宫苑司三廵户二百九十七内園兩廵户三百二十七竝屬諸縣界廣德宫并苑昇平宫等勅莊宅司内侍省宫苑司内園等四司所管諸廵係税人户宜據逐縣界分割竝還本縣管屬依例賦税廵司所置節級所由名目竝停廢其諸司所有行從諸莊及園林亭殿房舎什物課利等仍令逐司依舊收管廣德昇平二宫竝廢宫額𨽻莊宅司管係十一月勅累朝已來用兵不息至於繕治甲胄未免配斂生靈取乃民資助成軍器就中皮革尤峻科刑稍犯嚴條皆抵極典鄉縣以之生事奸滑得以侵漁宜立新規用革前弊應天下所納牛皮今將逐年所納數三分内減放二分其一分於人户苗畝上配定每秋夏苗共十頃納連角牛皮一張其黄牛納乾筋四兩水牛半斤犢子不在納限其皮人户自詣本州送納所司不得邀難所有牛馬騾皮筋角今後官中更不禁斷並許私家供使買賣只不得將出化外敵境仍仰闗津界首仔細覺察捕捉所犯人必加深罪其州縣先置廵簡牛皮節級及朝廷先降條法一切停廢其合分擘納黄牛水牛皮筋處其間有未盡事件委所司取便處分庶免編民犯禁且使人户資家既便公私用除苛弊三年正月勅青州在城及諸縣鎮鄉村人戸等朕臨御已來安民是切務除疾苦俾逐蘇舒據知州閣門使張凝近奏陳八事於人不便積久相承宜降指揮竝從改正其一屬州營田後槽兩務所管課利斛斗錢物人户牛具屯官等宜竝割屬州縣官舊額税課其務及職員竝廢其課額内有紅花紫草菜淀麻等據時估納錢折絲絹亦不得其係官桑土牛具什物竝賜見佃人為永業其城郭内宅舎房店奏取進止其秋夏納税疋叚不成端疋者許人户合端疋不得以零尺納錢其疋並須本色不得邀納價錢改换色目如省司品配不在此限其二省司元納夏秋税疋叚每疋納十錢每貫七錢絲綿紬線每十兩納耗半兩糧食每石耗一斗八錢蒿草每十束耗一束錢五分鞋每兩一錢此外别無配率今後青州所管州縣竝依省司則例供輸如違罪無輕恕其三劉銖在任時於苗畝上每畝徵車脚錢每頃配柴炭今後竝止絶其四州司每年配和買稈草及苫營草今後竝止絶如有闗三司指揮及五所徵食鹽錢每貫别納脚錢今後止絶其六别徵進奏院糧課錢及逓舖錢鞋分配縣鎮今後竝止絶要即於州司公用錢内支遣其七州司配徵啖馬藥及汎配藥又縣鎮科配石炭紅花紫草今後竝止絶不得配率又州司于夏苗上配納麥麫今後據州合用多少量于近縣配納不得遍據諸縣其八舊例州縣供納夏秋租税皆畢頃追人吏到州勘㑹此後止絶税無欠少不得追集縣吏已前事件已降宣命處分其屬郡淄登萊等州如有前項舊弊亦依青州例施行是月昭羲言諸縣欠去年秋税乞折納錢絹從之世宗顯德三年十月勅曰齊州管内先于秋苗上俵配蠶鹽謂之察頭鹽每一石徵錢三千文苗畝雖減於舊時鹽數不侈於往日且聞黎庶頗亦艱辛其滄棣濵淄青五州管内所請蠶鹽每一石徵絹一疋地里相接苦樂頓殊輸輕者量與増添賦重者時宜蠲減庶無偏黨用示均平其齊州所納鹽價錢特與減放一半只徵一千五百文其滄棣濵淄青等州每鹽一石舊徵絹一疋起來年後加一疋是月宣三司指揮諸道州府今後夏税以六月一日起徵秋税以十月一日起徵永為定制五年十月命左散騎常侍艾頴等三十四人使于諸州簡定民租六年春諸道使臣廻總計簡到户二百三十萬九千八百一十二定墾田一百八萬五千八百三十四頃淮南郡縣不在此數册府元龜卷四百八十八
