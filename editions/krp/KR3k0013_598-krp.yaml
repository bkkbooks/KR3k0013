body:
  text: 册府元龜卷五百九十八宋王欽若等撰學校部教授自仲尼反魯刪定六藝然後學有所宗儒術以之振矣雖復哲人其萎微言遂絶而違者斯衆傳授寖廣漢氏而下師訓彌盛素業所守乃專門而靡雜禀教殊指或名家而别出岐分𣲖散增華竝騖葢有爵位通顯譽望克治風詠推美山林傾慕徒衆輻輳不遠乎千里名籍包舉或踰於萬數以至肥遯求志杜門却掃其於傳道誨人未嘗倦也茲所謂拳拳服膺循循善誘逹教學之㫖爲􅉌門之駕說者焉卜商字子夏衛人孔子旣没居西河教授爲魏文侯師澹臺滅明事孔子旣已受業南遊至江從弟子三百人設取予去就名施於諸侯商瞿字子木魯人受易孔子商瞿姓也瞿音衢以授子庸姓橋名庇字子庸庇音必寐反子庸授江東馯臂子弓馯姓也音韓子弓授燕周醜子家子家授東武孫虞子乘子乘授齊田何子裝及秦禁學易爲筮卜之書漢獨不禁故傳授者不絶漢田何以齊田徙杜陵號杜田生髙祖用婁敬之言徙闗東大族故何以舊齊田氏見徙時未爲杜陵葢史家本其地追言也授東武王同子中雒陽周王孫丁寛齊服生皆著易傳數篇田生授王同周王孫丁寛服生四人而四人皆著易傳也子中王同字也中讀曰仲同授淄川楊何字叔元元光中徴爲太中大夫齊即墨成至城陽相姓即墨名成廣川孟但爲太子門大夫魯周覇莒衡胡莒人姓衡名胡也臨淄主父偃皆以易至大官要言易者本之田何丁姓字子孫從魯榮廣受詩春秋爲中山傅申章昌字曼君楚人申章姓從丁姓受學爲長沙太傅丁寛字子襄梁人從田何受易授同郡碭田王孫王孫授施讎孟喜梁丘賀繇是易有施孟梁丘之學寛景帝時爲梁孝王將軍王臧蘭陵人從魯申公受詩已通事景帝爲太子少傅施讎字長卿沛人沛與碭相近讎爲童子從田王孫受易後讎從徙長陵田王孫爲博士復從卒業與孟喜梁邱賀竝爲門人謙讓嘗稱學廢不教授及梁邱賀爲少府事多乃遣子臨分將門人張禹等從讎問讎自匿不肯見賀固請不得已乃授臨等於是賀薦讎結髮事師數十年從結髮爲童子卽從師學著其早也賀不能及詔拜讎爲博士讎授張禹琅琊魯伯伯爲會稽太守禹至丞相授淮陽彭宣沛戴崇子平崇爲九卿宣大司空禹宣皆有傳魯伯授太山毛莫如少路姓毛名莫如字少路琅琊邴丹曼容著淸名莫如常山守此其知名者也繇是施家有張彭之學孟喜字長卿東海蘭陵人也父號孟卿時人以卿呼之若言公也善爲禮春秋授后蒼疏廣世所傳后氏禮疏氏春秋皆出孟卿孟卿以禮經多春秋煩雜乃使喜從田王孫受易喜授同郡白光少子沛翟牧子兄兄讀曰况皆爲博士繇是有瞿孟白之學梁丘賀字長翁琅琊諸人也以能心計爲武騎從太中大夫京房受易房淄川楊何弟子也自别一京房非焦延壽弟子爲課吏法者或書字誤耳不當爲京房房出爲齊郡太守賀更事田王孫賀傅子臨亦入說爲黄門郎甘露中奉使問諸儒於石渠臨學精熟專行京房法琅琊王吉通五經聞臨說喜之時帝選髙才郎十人從臨講吉乃使其子郎中駿上疏從臨受易五鹿充宗授平陵士孫張仲方士孫姓張名仲方字沛鄧彭祖子夏齊衡咸長賔張爲博士至揚州牧家世傳業彭祖眞定太傅咸王莽講學大夫繇是梁丘有士孫鄧衡之學京房受易梁人焦延壽延壽其字名贛延壽云嘗從孟喜問易㑹喜死房以爲延壽易卽孟氏學翟牧白生不肯皆曰非也至成帝時劉向校書考易說以諸易家說皆祖田何楊叔丁將軍大誼畧同惟京氏爲異黨焦延壽獨得隱士之說黨讀曰儻託之孟氏不相與同房授東海殷嘉河東姚平河南乘𢎞乘姓也音食證反皆爲郎博士繇是易有京氏之學位至魏郡太守費直東萊人也費扶味反治易爲郎長於卦筮亡章句徒以彖象繫辭十篇解說上下經琅琊王璜能傳之伏生名勝濟南人爲秦博士孝文時求能治尚書者天下亡有聞伏生治之欲召時伏生年九十餘老不能行於是詔太常使掌故朝錯往受之衞宏定古文尚書序云生老不能正言不可曉也使其女傳言教錯齊人語多與頴川異錯所不知者凢十二三畧以其意屬讀而已秦時禁書伏生壁藏之其後大兵起流亡漢定伏生求其書亡數十篇獨得二十九篇卽以教於齊魯之間齊學者繇此頗能言尚書山東大師亡不渉尚書以教伏生教濟南張生及歐陽生是後魯周覇雒陽賈嘉頗能言尚書嘉者賈誼之孫也孔安國有孔氏古文尚書以今文字讀之因以起其家逸書得十餘篇尚書兹多於是遭巫蠱未立於學官安國爲諫大夫授都尉朝朝名都尉姓而司馬遷亦從安國問故遷書載堯典禹貢洪範微子金縢諸篇多古文說都尉朝授膠東庸生庸生授淸河胡嘗少子少子嘗字歐陽生字和伯千乗人也事伏生授兒寛寛又授業孔安國歐陽大小夏侯氏學皆出於寛寛授歐陽生子世世相傳至曾孫髙爲博士繇是尚書世有歐陽氏學林尊字長賔濟南人也事歐陽髙爲博士授平陵平當梁陳翁生翁生家世傳業繇是歐陽有平陳之學翁生授琅琊殷崇楚國龔勝而平當授九江朱普公文上黨鮑宣宣爲司𨽻校尉徒衆尤盛知名者也髙相沛人也治易與費公同時其學亦亡章句專說陰陽災異自言出於丁將軍傳至相相授子康及蘭陵母將永康以明易爲郎永至豫章都尉夏侯勝其先夏侯都尉從濟南張生受尚書以傳族子始昌始昌傳勝勝又事同郡簡卿簡音姦簡卿者倪寛門人勝傳從兄子建又事歐陽髙繇是尚書有大小夏侯之學建位至太子太傅周堪字少卿齊人也與孔覇俱事大夏侯勝堪授牟卿及長安許商字長伯牟卿爲博士覇以帝師賜爵號褒成君傳子光亦事牟卿繇是大夏侯有孔許之學堪位至光祿勲張山拊字長賔平陵人也拊音膚事小夏侯建爲博士授同縣李尋鄭寛中少君山陽張無故子儒信都秦恭延君陳留假蒼子驕無故善脩章句小夏侯說文恭增師法至百萬言言小夏侯本所說之文不多而秦恭又增益故至百萬言也申公名培魯人也少與楚元王交俱事齊人浮丘伯受詩漢興高祖過魯申公以弟子從師入見於魯南宮呂太后時浮丘伯在長安楚元王遣子郢與申公俱卒學郢卽郢客也元王薨郢嗣位立爲楚王令申公傅太子戊戊不好學病申公病苦也及戊立爲王胥靡申公胥靡相係而作役申公愧之歸魯退居家教終身不出門復謝賔客身旣不出門非受業弟子其他賔客來者又謝遣之不相見也獨王命召之乃往弟子自遠至受業者千餘人申公獨以詩經爲訓故以教亡傳說其指不爲解說之傳疑者則闕弗傳蘭陵王臧從受詩申公弟子以百數申公以詩春秋授而瑕邱江公盡能傳之及魯許生免中徐公免中邑名也皆守學教授韋賢治詩事大江公及許生大江公卽瑕邱江公也以異下博士江公故稱大又治禮傳子𤣥成及兄子賞以詩授哀帝繇是魯詩有韋氏學王式東平新桃人事免中徐公及許生式爲昌邑王師山陽張長安長安名也先事式後東平唐長賔沛禇少孫亦來事式張生唐生禇生皆爲博士繇是魯詩有張唐禇氏學張生兄子游卿爲諫大夫以詩授元帝其門人琅琊王扶陳留許晏繇是張家有許氏學初薛廣徳亦事王式以博士論石渠授龔舍轅固齊人也以治詩孝景時爲博士諸齊以詩顯貴皆固之弟子也昌邑太傅夏侯始昌最知名后蒼字近君東海郯人也事夏侯始昌通五經蒼亦通詩禮授翼奉蕭望之匡衡衡授琅琊師丹伏理斿君頴川滿昌君都君都爲詹事治髙密太傅家世傳業繇是齊詩有翼匡師伏之學滿昌授九江張邯琅琊皮容皆至大官徒衆尤盛蒼說禮數萬言號曰后氏曲臺記授沛聞人通漢子方聞人姓也名通漢字子方也梁戴徳延君戴聖次君沛慶普孝公徳號大戴聖號小戴繇是禮有大戴小戴慶氏之學普授魯夏侯敬又傳族子咸大戴授琅琊徐良游卿家世傳業小戴授梁人橋仁季卿楊榮子孫子孫榮之字也家世傳業繇是大戴有徐氏小戴有橋楊氏之學蒼官至少府韓嬰燕人也景帝時爲常山王太傅韓生推詩人之意而爲内外傳數萬言其語頗與齊魯間殊然其歸一也淮南賁生受之賁音肥自是之後而趙燕間言詩者繇韓生韓生孫商爲武帝博士孝宣時涿郡韓生其後也以易徴待詔殿中曰所受易卽先太傅所傳也嘗受韓詩不如韓氏易深太傅故專傳之司𨽻校尉葢寛饒本受易於孟喜聞涿韓生說易而好之卽更從受焉趙子河内人也王欽若等曰趙子史不載其名事燕韓生授同郡蔡誼誼授同郡食子公與王吉食生授太山栗豐吉授淄川長孫順繇是韓詩有王食長孫之學豐授山陽張就東海髮福福皆至大官徒衆尤盛毛公趙人也治詩爲河間獻王博士授同國貫長卿長卿授解延年延年授徐敖敖授九江陳俠繇是言毛詩者本之徐敖胡母生字子都齊人也治公羊春秋爲景帝博士與董仲舒同業仲舒著書稱其徳年老歸教於齊齊之言春秋者宗事之公孫𢎞亦頗受焉而董生爲江都相弟子遂之者蘭陵禇大東平嬴公廣川叚仲温吕歩舒遂謂名位成達者大至梁相歩舒丞相長史唯嬴公守學不失師法爲昭帝諫大夫授東海孟卿魯眭孟孟爲符節令坐說災異誅嚴彭祖字公子東海下邳人也與顔安樂俱事眭孟孟弟子百餘人唯彭祖安樂爲明質問疑誼各持所見孟曰春秋之意在二子矣孟死彭祖安樂各顓門教授顓與專同門言各自名家繇是公羊春秋有嚴顔之學彭祖授琅琊王中爲元帝少府中讀爲仲家世傳業中授同郡公孫文東門雲顔安樂字公孫魯國薛人眭孟姊子也安樂授淮陽泠豐次君泠音零淄川任公繇是顔家有泠任之學始貢禹事嬴公成於眭孟疏廣事孟卿廣授琅琊筦路筦亦管字也禹授頴川堂谿惠姓堂谿也惠授太山㝠都都與路又事顔安樂故顔氏復有筦㝠之學路授孫寶爲大司農豐授馬宫琅琊左咸徒衆尤盛官至齊郡太守丞瑕邱江公受糓梁春秋及詩於魯申公傳子至孫爲博士武帝時江公與董仲舒竝仲舒通五經能持論善屬文江公呐於口屬之欲切呐古訥字上使與仲舒議不如仲舒而丞相公孫𢎞本爲公羊學比輯其議卒用董生比次也輯合也比頻寐反輯與集同於是上因尊公羊家詔太子受公羊春秋繇是公羊大興太子旣通復私問榖梁而善之其後浸微浸漸也唯魯榮廣王孫皓星公二人受焉廣能盡傳其詩春秋髙才捷敏與公羊大師晆孟等論數困之孟等窮屈也故好學者頗復授糓梁沛蔡千秋少君梁周慶幼君丁姓子孫姓丁名姓字子孫皆從廣受千秋又事皓星公爲學最篤千秋宣帝時說糓梁上善榖梁說擢千秋爲諫大夫給事中後有過左遷平陵令復求能爲榖梁者莫及千秋上愍其學且絶乃以千秋爲郎中戸將選郎十人從受汝南尹更始翁君本事千秋會千秋病死徵江公孫爲博士劉向以故諫大夫通達待詔受榖梁欲令助之江博士復死乃徴周慶丁姓待詔保宫保宫少府之屬官也本名居室使卒授十人自元康中始講至甘露元年積十餘歳皆明習乃召五經名儒太子太傅蕭望之等大議殿中平公羊糓梁同異各以經處是非時公羊博士嚴彭祖侍郎申輓輓音晩伊推宋顯榖梁議郎尹更始待詔劉向周慶丁姓竝論公羊家多不見從願請内侍郎許廣使者亦竝内榖梁家中郎王亥各五人使者謂當時詔遣監議者也内謂引入議所也公羊家旣請内許廣而使者因竝内王亥也議三十餘事望之等十一人各以經誼對多從榖梁繇是榖梁之學大盛慶姓皆爲博士周慶丁姓二人也姓授楚申章昌曼君姓申章名昌字曼君尹更始又受左氏傳取其變理合者以爲章句傳子咸及翟方進琅琊房鳯朱雲爲槐里令後不仕居鄠田教授擇諸生然後爲弟子九江嚴望及望兄子元子仲能傳雲學皆爲博士房鳯字子元不其人也琅琊之縣也其音基爲五官中郎將時光祿勲王龔以外屬内卿卭成太后兄也内卿光祿勲治宫中與奉車都尉劉歆共校書三人皆侍中歆曰左氏春秋可立哀帝納之以問諸儒皆不對歆於是數見丞相孔光爲言左氏以求助光卒不肯唯鳯龔許歆遂共移書責讓太常博士大司空師丹奏歆非毁先帝所立上於是以龔等補吏龔爲𢎞農歆河内鳳九江太守始江博士授胡嘗嘗授梁蕭秉君房繇是榖梁春秋有尹胡申章房氏之學張蒼爲北平侯及梁太傅賈誼京兆尹張敞太中大夫劉公子皆脩春秋左氏傳誼爲左氏傳訓故授趙人貫公爲河間獻王博士子長卿爲蕩陰令蕩陰河内縣也蕩音湯授淸河張禹長子非成帝師張禹也禹與蕭望之同時爲御史數爲望之言左氏望之善之上書數以稱說後望之爲太子太傅薦禹于宣帝徴禹待詔未及問會疾死授尹更始禹先授更始傳子咸及翟方進胡常常授黎陽賈護季君哀帝時待詔爲郎授蒼梧陳欽子佚以左氏授王莽至將軍而劉歆從尹咸及翟方進受繇是言左氏者本之賈護劉歆王吉兼通五經能爲騶氏春秋以詩論語教授好梁邱賀說易令子駿受焉漢興傳齊論者王吉少府宋畸居宜切御史大夫貢禹尚書令五鹿充宗膠東庸生唯王陽名家王吉字子陽故謂之王陽傳魯論詩者常山都尉龔奮長信少府夏侯勝丞相韋賢魯扶卿前將軍蕭望之安昌侯張禹皆名家張氏最後而行於世吉位至諫大夫董仲舒少治春秋孝景時爲博士下帷講誦弟子傳以乆次相授業或莫見其面葢三年不窺園其精如此位至膠西相薛廣徳以魯詩教授楚國龔勝舍師事焉位至御史大夫疏廣字仲翁少好學明春秋家居教授學者自遠方至位至太子太傅韋賢爲人質朴少欲篤志於學篤厚也兼通尚書以詩教授號鄒魯大儒位至丞相後漢劉昆少好習禮容平帝時受施氏易於沛人戴賔王莽世教授弟子嘗五百餘人每春秋享射嘗備列典儀以素木瓠葉爲爼豆桑弧蒿矢以射莵首詩小雅瓠葉詩序曰刺幽王棄禮而不能行故思古人之不微薄廢禮焉詩曰幡幡瓠葉采之亨之君子有酒酌言嘗之有莵斯首炰之燔之君子有酒酌言獻之昆懼禮之廢故引以瓠葉爲爼實射則歌莵首之詩而爲節也每有行禮縣宰輙率吏屬而觀之王莽以昆多聚徒衆私行大禮有僣上心乃繫昆及家屬於外黄獄尋莽敗得免旣而天下大亂昆避難河南負犢山中郡國志河南郡有負犢山建武五年舉孝廉不行遂逃教授於江陵光武聞之卽除爲江陵令子軼字君文傳昆業門徒亦盛洼音圭丹字子玉世傳孟氏易至王莽時嘗避世教授專志不仕徒衆數百人建武初爲博士作易通論七篇世號洼君通觟陽鴻姓觟陽名鴻也以孟氏易教授有名稱位少府任安字定祖廣漢綿竹人也少遊太學受孟氏易兼通數經又從同郡楊厚學圖䜟究極其術時人稱曰欲知仲桓問任安又曰居今行古任定祖學終還家教授諸生自遠而至除博士不就伏湛更始立爲平原太守時倉卒兵起天下驚擾而湛獨晏然教授不廢伏恭湛之兄子也太常試經第一拜博士遷常山太守敦修學校教授不輟繇是北州多爲伏氏學任末字叔本蜀郡繁人繁縣故城在今益州新繁縣北少習齊詩遊京師教授十餘年爲郡功曹以病免薛漢字公子淮陽人世習韓詩教授嘗數百人建武初爲博士當世言詩者推漢爲長杜撫字叔和犍爲武陽人也少有髙才受業於薛漢定韓詩章句後歸鄉里教授沉静樂道舉動必以禮弟子千餘人其所作詩題約義通學者傳之曰杜君法云位至公車令楊仁建武中詣師學習韓詩數年歸静居教授爲閬中令卒於官魯恭少習魯詩後拜魯詩博士繇是家法學者日盛魯丕性沉深好學孳孳不倦遂杜絶交遊不荅候問之禮士友嘗以此短之而丕欣然自得遂兼通五經以魯詩尚書教授爲當世名儒後歸郡爲督郵功曹所事之將無不師友待之曹褒父充持慶氏禮傳褒又傳禮記四十九篇教授諸生千餘人慶氏學遂行於世褒位至侍中鮑永少有志操習歐陽尚書子昱少傳父學客授於東平馮豹好儒學以詩春秋教麗山下鄉里爲之語曰道徳彬彬馮仲文位至尚書桓榮少習歐陽尚書事博士九江朱普普卒榮奔䘮九江因留教授徒衆數百人莽敗天下亂榮抱其經書與弟子逃匿山谷雖嘗飢困而講論不輟後復客授江淮間位至太常范升傳孟氏易以授楊政而陳元鄭衆皆傳費氏易其後馬融亦與其傳融授鄭𤣥𤣥作易注荀爽又作易傳自是費氏興而京氏遂衰位至聊城令楊政字子行京兆人也少好學從代郡范升受梁邱易善說經書京師爲之語曰說經鏗鏗楊子行教授數百人官至左中郎將張興習梁邱易以教授建武中舉孝廉爲郎謝病去復歸聚徒後辟司徒馮勤府勤舉爲孝廉稍遷博士永平初遷侍中祭酒十年拜太子少傅顯宗數訪問經術旣而聲稱著聞弟子自遠至者著錄且萬人爲梁邱家宗著於籍錄十四年卒於官子魴傳興業位至張掖屬國都尉魏滿字叔牙習京氏易教授位至𢎞農太守孫期字仲彧濟陰成武人也少爲諸生習京氏易古文尚書家貧事母至孝牧豕於大澤中以奉養焉遠人從其學者皆執經壟畔以追之司徒黃琬特辟不行牟融習大夏侯尚書東海王良習小夏侯尚書沛國桓榮習歐陽尚書榮世習相傳授東京最盛扶風杜林傳古文尚書林同郡賈逵爲之作訓馬融作傳鄭𤣥注解繇是古文尚書遂顯於世也歐陽歙字正思樂安千乘人也自歐陽生傳伏生尚書至歙八世皆爲博士歙爲汝南太守在郡教授數百人濟陰曹曾字伯山從歙受尚書門徒三千人位至諫議大夫子祉河南尹傳父業教授又陳留陳弇字叔明亦授歐陽尚書于司徒丁鴻牟長少習歐陽尚書拜博士稍遷河内太守免長自爲博士及在河内諸生講學者嘗有千餘人著錄前後萬人宋登少習歐陽尚書教授數千人位至潁川太守張馴少遊太學能講春秋左氏傳以大夏侯尚書教授位至司農孔僖字仲和自安國以下世傳古文尚書毛詩僖子季彥守其家業門徒數百人僖位至臨晉令鄭衆傳周官經後馬融作周官傳授鄭𤣥𤣥作周官注𤣥本習小戴禮後以古經校之取其義長者故爲鄭氏學𤣥又注小戴所傳禮記四十九篇通爲三禮焉位至大司農楊倫少爲諸生師事司徒丁鴻習古文尚書爲郡文學掾去職講授於大澤中弟子千餘人位至大中大夫楊寶習歐陽尚書哀平之世隱居教授包咸少爲諸生受業長安師事博士右師細君姓右師習魯詩論語王莽末去歸鄉里於東海界爲赤睂所得遂見拘執十餘日咸晨夜誦經自若賊異而遣之因住東海立精舍講授位至鴻臚寺卿魏應字君伯任城人也少好學建武初詣博士受業習魯詩閉門誦習不交僚黨京師稱之後歸爲郡吏舉明經除濟陰王文學以疾免官教授山澤中徒衆嘗數百人後拜五官中郎將應經明行修弟子自遠方至著錄數千人衛宏字敬仲東海人也少與河南鄭興俱好古學初九江謝曼卿善毛詩乃爲其訓宏從曼卿受學因作毛詩序善得風雅之㫖於今傳於世後從大司空杜林更受古文尚書爲作訓㫖時濟南徐廵師事宏後從林受學亦以儒顯繇是古學大興位至議郎董春少好學究極聖㫖後還歸立精舍遠方門徒學者嘗數百人諸生每升堂講鳴鼓三通橫經捧手請問百人追隨上堂難問者百餘人董鈞字文伯犍爲資中人也習慶氏禮事大鴻臚王臨累遷五官中郎將嘗教授百餘人丁鴻受歐陽尚書於桓榮嗣封陵陽侯開門教授後代成封爲少府門下繇是益盛遠方至者數千人彭城劉愷北海巴茂九江朱倀皆至公卿樊儵刪定公羊嚴氏春秋章句世號樊侯學教授門徒前後三千餘人弟子頴川李脩九江夏勤皆爲三公丁恭習公羊嚴氏春秋恭學義精明教授嘗數百人州郡請召不應後爲侍中祭酒周澤字穉都北海安邱人也少習公羊嚴氏春秋隱居教授門徒嘗數百人位至太常甄宇字長文北海安邱人也淸静少欲習嚴氏春秋教授嘗數百人宇傳業子普普傳子承承講授數百人諸儒以承三世傳業莫不歸服之宇位至太子少傅樓望少習嚴氏春秋爲左中郎將教授不倦世稱儒宗諸生著錄九千餘人程曾受業長安習嚴氏春秋積十餘年還家講授會稽顧奉等數百人嘗居門下著書百餘篇皆五經通難又作孟子章句爲海西令卒於官張𤣥字君夏河内河陽人也少習春秋顔氏兼通數家法建武初舉明經補𢎞農文學遷陳倉縣丞清浄無欲專心經書方其講問乃不食終日及有難者輒爲張數家之說令擇從所安諸儒皆伏其多通著錄千餘人李膺爲烏桓校尉以公事免官還居綸氏教授嘗千人綸氏縣屬潁川郡故城今陽城縣是也李育扶風人也少習公羊春秋州郡請召育到輒辭病去嘗避地教授門徒數百位尚書令頴容博學多通善春秋左氏傳師事太尉楊賜初平中避亂荆州聚徒千餘人劉表以爲武陵太守不肯起謝該字文儀南陽章陵人也善明春秋左氏傳為世名儒門徒數百千人位至議郎蔡𤣥字叔陵汝南南頓人也學通五經門徒嘗千人其著錄者萬六千人徴辟竝不就賈逵字景伯尤明左氏明帝令逵自選公羊嚴顔諸生髙才者二十人教以左氏嚴彭祖顔安樂俱受公羊春秋故曰嚴顔之學與簡紙經傳各一通竹簡及紙也逵遷衞士令建初八年乃詔諸儒選髙才生受左氏榖梁春秋古文尚書毛詩繇是四經遂行於世皆拜逵所選弟子及門生爲千乘王國郎朝夕受業黃門署學者皆欣欣美慕焉張酺永平九年明帝爲四姓小侯開學南宮置五經師酺以尚書教授位至司徒魯丕拜趙相門生就學者嘗百餘人關東號之曰五經復興魯叔陵李恂少習韓詩教授諸生嘗數百人位至武威太守楊康好學嘗在外黃大澤教授門徒郅憚理韓詩嚴氏春秋後客居江夏教授後爲芒長免官又避地教授寒朗好經學通書傳以尚書教授舉孝廉位至淸河太守李章習嚴氏春秋經明教授位至琅琊太守劉茂習禮經教授嘗數百人位至侍中索盧放以尚書教授千餘人位至諫議大夫夏恭習韓詩孟氏易講授門徒嘗千餘人舉孝廉早卒鍾皓世善刑律以詩律教授門徒千餘人爲郡功曹後公府辟召皆不就劉淑少好學明五經遂隱居立精舍講授諸生嘗數百人位至侍中虎賁中郎將檀敷舉孝廉連辟公府皆不就立精舍教授遠方至者嘗數百人桓帝時博士徵不就王良字仲子東海蘭陵人也少好學習小夏侯尚書王莽時寢病不仕教授諸生千餘人吳祐爲河間相自免歸家不復仕躬灌園蔬以經書教授郭林宗博通墳籍以黨事起遂閉門教授弟子以千數劉焉居陽城山積年教授舉賢良方正辟司徒府董扶字茂安少從師學兼通數經善歐陽尚書又事聘士楊厚究極圖䜟遂至京師遊覽太學還家講授廖扶博習韓詩歐陽尚書教授嘗數百人州郡公府辟召皆不應就摰恂以儒術教授隱于南山不應徴聘名重關西馬融從其遊學博通經籍馬融才髙博洽爲世通儒教養諸生嘗有千數涿郡盧植北海鄭𤣥皆其徒也弟子以次相傳鮮有入其室者融位議郎鄭𤣥北海人也造太學受業師事京兆第五元先始通京氏易公羊春秋又從東郡張恭祖受周官禮記左氏春秋韓詩古文尚書因涿郡盧植事扶風馬融融門徒四百餘人升堂進者五十餘生𤣥自遊學十餘年乃歸鄉里家貧耕於東萊學徒相隨已數百人靈帝末弟子河内趙商等自遠方至者數千徴大司農不就盧植少與鄭𤣥俱事馬融能通古今好學研精而不守章句學終辭歸闔門教授位至尚書皇甫規拜郎中託疾免歸以詩易教授門徒三百餘人積十四年賈洪字叔業京兆新豐人也好學有才而特精於春秋左氏傳建安初付郡舉計掾應州辟州中自叅軍以下百餘唯洪與馮翊嚴苞交通材學最髙洪歴守三縣令所在輒開除廐舍親授諸生蔡衍少明經講授以禮讓化鄉里仕至議郎張奐䧟黨罪禁錮時禁錮者不能守靜或死或徙奐閉門不出養徒千人著尚書記難三十餘萬言位至太常趙典少篤行隱約隱猶靜也約儉也博學經書弟子自遠方至典學孔子七經河圖雒書内外藝術靡不貫綜受業者百有餘人位至尚書令魏國淵字子尼師事鄭𤣥後與邴原管寧等避亂遼東淵篤學好古在遼東嘗講學於山巖士人多推慕之繇是知名邴原字根矩北海人黃巾之難避地遼東積十餘年自反國土於是講述禮樂吟詠詩書門徒數百服道數十時鄭𤣥以博學洽聞注解典籍故儒雅之士集焉原亦以髙遠淸白頥志澹泊口無擇言身無擇行故英偉之士向焉是時海内淸議云靑州有邴鄭之學吳虞飜爲騎都尉飜性疏直數有酒失坐徙交州雖處罪放而講學不倦門徒嘗數百人徴崇河南人隱於㑹稽躬耕以求其志好尚者從學所教不過數人輒止欲令其業必有成也闞澤州里先軰丹陽唐固亦修身積學稱爲儒者著國語公羊榖梁傳注講授嘗數十人位至中書令侍中太子太傅晉續咸字孝宗爲劉琨并州從事中郎性孝謹敦重履道貞素好學師事京兆杜預專以春秋鄭氏易教授嘗數十人博覽群言髙才善文論宋纎燉煌効榖人也隱居於酒泉南山明究圖緯弟子受業三千餘人後前凉張祚徴爲太子太傅杜夷博覽百家筭厯圖緯靡不畢究寓居汝潁之間十載足不出門年四十餘始還鄉里閉門教授生徒千人位至國子祭酒皇甫謐字士安博綜典籍沉靜寡欲有髙尚之志故終身不仕門人摯虞張軌牛綜席純皆爲晉名臣南齊劉瓛少篤學博通五經聚徒教授嘗有數十齊武陵王曄爲會稽太守太祖欲令瓛爲曄講除會稽郡丞學徒從之轉衆瓛姿狀纎小儒學冠於當時京師士子貴遊莫不下席受業性謙率通美不以髙名自居遊詣故人唯一門生持胡床隨後主人未通便坐問答住在檀橋瓦屋數間上皆穿漏學徒敬慕不敢指斥呼爲靑溪竟陵王子良親往修謁七年表世祖爲瓛立舘以楊烈橋故主第給之生徒皆賀瓛曰室美豈爲人哉此華宇豈吾宅哉幸可詔作講堂猶恐見害也未及徙居遇病子良遣從瓛學者彭城劉繪順陽范縝將厨於瓛宅營齋及卒門人受學竝弔服臨送樓㓜瑜字季玉亦聚徒教授不應徴辟吳苞字天蓋濮陽鄄城人也儒學善三禮及老莊宋㤗始中過江聚徒教學冠黃葛巾竹麈尾蔬食二十餘年隆昌元年詔曰處士濮陽吳苞棲志窮谷秉操貞固沉靜味古白首彌厲徵太學博士不就始安王遥光右衛江祏於蔣山南爲立舘學者咸歸之以壽終沈麟士字雲禎隱居餘不吳差山講經教授從學者數十百人各營屋宇依止其側麟士重陸機連珠每爲諸生講之梁周𢎞正累遷國子博士時於城西立士林舘𢎞正居以講授聽者傾朝野焉王承爲中書門下侍郎兼國子博士時膏腴貴遊咸以文學相尚罕以經術爲業唯承獨好之發言吐論造次儒者在學訓諸生述禮易義張綰爲豫章内史綰在郡述制㫖禮記正言義四姓衣冠士子聽者嘗數百人入爲御史中丞大同末城西開士林舘聚學者綰與右衞朱异太府卿賀琛遞述制㫖禮記中庸義賀瑾爲國子博士於學講授生徒嘗數百人沈峻博通五經傳峻業者有吳郡張及會稽孔子雲官皆至五經博士賀瑒爲歩兵校尉領五經博士瑒於禮尤精舘中生徒嘗數百弟子明經對策至數十人諸葛璩琅琊人也居京口璩性勤於訓誘後生就學者日至居宅狹陋無以容之太守張友爲起講舍虞僧誕會稽人以左氏教授聽者亦數百人其該通義例當時莫及伏曼容初爲宋中散大夫宅在瓦官寺東曼容施髙坐於㕔事有賔客輒升髙坐爲講說生徒數十百人卞華字昭邱爲安成王功曹叅軍兼五經博士聚徒教授華博渉有機辨說經析理爲當時之冠何佟之爲國子博士永元末京師兵亂佟之嘗集諸生講論孜孜不怠孔子袪初爲長沙嗣王侍郎兼國子助教講尚書四十九篇聽者嘗數百人皇侃爲國子助教於學講說聽者數百人許𢡟字昭哲少孤好學爲州閭所稱十四入太學受毛詩旦領師說晩而覆講坐下聽者嘗數百人仕至中庶子陳袁憲字徳章尚書左僕射樞之弟也㓜聰敏好學有雅量梁武帝修建庠序别開五舘其一舘在憲宅西憲嘗招引諸生與互談論每有新義出人意表同軰咸嗟服焉後入隋爲晉王府長史戚衮年十九梁武帝勅策孔子正言并周禮禮記義衮對髙第仍除揚州祭酒從事史就國子博士宋懷方質儀禮義懷方北人自魏攜儀禮禮記疏秘惜不傳及將亡謂家人曰吾死後戚生若赴便以儀禮禮記義本付之若不來卽宜隨屍而殯爲儒者推許如此沈徳威爲太學博士轉國子助教每自學還私室以講授道俗受業者數百人率皆如此王元規遷南平王府限内叅軍王爲江州元規隨府之鎮四方學徒不遠千里來請道者嘗數十百人爲國子助教東宮學士自梁代諸儒相傳爲左氏學者皆以賈逵服䖍之義難駁杜預凡一百八十條元規引証通析無復疑滯每國家議吉凶大禮常叅預焉孫瑒鎮郢州嘗於山齋設講肆集𤣥儒之士冬夏資奉爲學者所稱張譏性恬靜不求榮利嘗慕閒逸所居宅營山池植花果講周易老莊而教授焉吳郡陸元朗朱孟博一乘寺沙門法才法雲寺沙門惠休至貞觀道士姚緩皆傳其業位至東宮學士後魏劉模爲中書博士與李彪爲寮竝相愛好至於訓導國胄甄明風範遠不及彪也索敞字巨振以儒學見㧞爲中書博士篤勤訓授肅而有禮京師大族貴遊之子弟皆敬憚威嚴多所成益位至尚書牧守者數十人皆受業於敞敞遂講授十餘年馮元興魏郡肥鄉人學通禮傳有文才年三十三還鄉教授嘗數百人李郁爲國子博士自國學之建諸博士率不講說朝夕教授唯郁而已謙虚寛雅甚有儒者之風劉昞字延明燉煌人父寶以儒學稱昞年十四就博士郭瑀學瑀弟子五百餘人通經業者八十餘人髙允博通經史爲征南從事中郎府解還家教授受業者千餘人李曾趙郡人孝伯之父也曾少治鄭氏禮左氏春秋以教授爲業劉蘭武邑人性聰敏讀左氏五日一遍兼通五經先是張吾實以聰辯過人其所解說不本先儒之㫖唯蘭推經傳之繇本注者之意叅以緯候及先儒舊事甚爲精悉自後經義審博皆繇於蘭蘭又明隂陽博物多識故爲儒者宗瀛州刺史裴植徵蘭講書於州城南舘植爲學主故生徒甚盛海内稱焉又特爲中山王英所重英引在館令教其子熙誘畧等蘭學徒前後數千成業者衆北齊張思伯河間樂城人也善說左氏傳爲馬敬徳之次撰刋例十卷行於時亦治毛詩章句以二經教授齊安王廓武平初爲國子博士鮑季詳從弟長暄兼通禮傳武平末爲任城王湝丞相掾嘗在京教授貴遊子弟齊亡後歸鄉里講經卒於家張買奴平原人經義該博門徒千餘人諸儒咸推重之名聲甚盛歴太學博士國子助教後周樂遜爲太學博士治小師氏下大夫自譙王儉以下竝行束脩弟子之禮遜以經術教授甚有訓導之方武帝保定中頻加賞賜遷遂伯中大夫詔魯公與畢公賢等俱以束修之禮同受業焉天和中出爲湖州刺史秩滿還朝拜皇太子諫議復在露門教授皇子增邑一百戸樊深講習五經爲于謹府叅軍事令在舘教授子孫熊安生長樂阜城人專以三禮教授弟子自遠方至者千餘人乃討論圖緯捃摭異聞先儒所未悟者皆發明之齊河淸中陽休之特奏爲國子博士安生旣學爲儒宗當時受其業擅名于後者有馬榮伯張黑奴竇士榮孔籠劉焯劉炫等皆其門人焉隋何妥爲國子博士出爲龍州刺史時有負笈遊學者妥皆爲講說教授之房暉遠治三禮春秋三傳詩書周易嘗以教授爲務遠方負笈而從者動以千計南陽王綽爲定州刺史聞其名召爲博士蕭該篤學尤精漢書包愷兄愉明五經愷傳其業又從王仲通受史記漢書尤稱精究大業中爲國子助教于時漢書學者以蕭包二人爲宗聚徒教授著録者數千人卒門人爲起墳立碣焉馬光爲太學博士初教授瀛博間門徒千數至是多負笈從入長安劉焯信都昌亭人以儒學知名舉秀才射䇿甲科直門下省俄除員外將軍與楊素牛𢎞等於國子共論古今滯義後因國子釋奠與劉炫二人論議深挫諸儒諸儒或懷妬恨遂爲飛章所謗除名爲民於是優遊鄉里專以教授著述爲務孜孜不倦然懷抱不曠又嗇於財不行束修者未嘗有所教誨時人以此少之劉炫河間人與著作郎王邵同修國史俄直門下省兼於内史省考定群言炫雖遍直三省竟不得官後除殿内將軍坐事除名歸于家以教授爲務王孝籍以博覽群言徧治五經開皇中召入秘書助王邵脩國史邵不之禮在省多年而不免輸稅孝籍奏於吏部尚書牛𢎞𢎞亦知其學業而竟不得調後歸鄉里以教授爲業終于家唐秦暐字仁先晉陵無錫人也明尚書春秋兼通史傳隋煬帝召爲秘書直學士後還家以講授爲務王方慶年十六爲趙王府行叅軍嘗就記室任希古受史記漢書能盡其業册府元龜卷五百九十八
