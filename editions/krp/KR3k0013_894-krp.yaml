body:
  text: 册府元龜巻八百九十四宋王欽若等撰總録部謡言古者命輶軒之使巡萬國采異言靡不畢載以為奏籍王者所以觀風俗之得失以考政也國風雅頌繇是生焉春秋已來乃有婉孌總角之謡傳於閭巷皆成章恊律著禍福之先兆推尋叅驗信而有徵洪範傳曰言之不從時則有詩妖是之謂也晉獻公魯僖五年八月伐虢圍上陽問於卜偃曰吾其濟乎對曰克之公曰何時對曰童謡云丙之辰龍尾伏辰袀服振振取虢之旂袀音均又戈均反振音之人反龍尾尾星也日月之㑹曰辰日在尾星故尾伏不見鶉之賁賁天䇿焞焞火中成軍虢公其奔賁音奔焞音鶉火星也賁烏星之體也天䇿傳説星也星近日故焞焞無光曜也言丙子平旦鶉火中軍事有成功也其九月十月之交乎丙子旦日在尾月在策鶉火中必是時也冬十一月丙子滅虢虢公醜奔京師周十一月夏之九月晉惠公即位出共世子而改𦵏之臭逹於外共世子申生獻公時𦵏不如禮故改𦵏之惠公烝於獻公夫人賈君故申生臭逹於外不欲為無禮者所𦵏也國人誦之曰貞之無報也孰是人斯而有是臭也貞正也謂公欲以正禮改𦵏世子而不獲吉報也惟使是人有是臭者言惠公使之貞為不聽以正𦵏之而不見聽信為不誠國斯無刑偷居幸生刑法也言惠公偷竊居位微幸而生不更厥貞大命其傾不變更其正大命將傾傾危也威兮懐兮威畏也懐思也言國人畏惠公思重耳各聚爾有以待歸兮猗兮違兮必之哀兮猗歎也違去也言民心必欲去其上安上重遷故哀也嵗之二七其靡有微兮二七十四嵗後也靡無也無有微微者亦亡謂子圉也若翟公子吾是之依兮謂重耳鎮撫國家為王妃兮言重耳當霸諸侯王妃偶郭偃曰甚哉善之難也君改𦵏共公以為榮也而惡滋彰夫人美於中必播於外而越於民民實載之美善也播布也越揚也載於戴也惡亦如之故行不可不慎必也或知之十四年君之冡嗣其替乎冢嗣太子也替滅也其數告於民矣數謂二七公子重耳其入乎其魄兆於民矣魄形也若入必霸諸侯以見天子其耿光於民矣耿昭也數言之紀也誦言者紀其數魄意之術也意民之志也術道也䰟兆見而民志隨也光明之曜也紀言以叙之述意以導之明曜以炤之不至何待欲先導者行乎先導為重耳導引者可行將至矣時又童謡曰共太子更𦵏兮後十四年晉亦不昌昌乃在其兄其後惠公與秦戰為秦所獲立十四年而死晉人絶之更立其兄重耳是為文公遂霸諸侯魯文成之世童謡曰鸜之鵒之公出辱之鸜鵒之羽公在外野徃饋之馬鸜鵒跦跦公在乾侯跦音誅跳行貎乾音干乾侯在魏郡斥邱徵褰與襦徴求也褰袴也鸜鵒之巢逺哉揺揺揺揺不安之貎稠父䘮勞宋父以驕父讀曰甫甫者男子之通號也言昭公欲去季氏不遂而出故曰䘮勞定公無徳於下坐致君位故曰以驕鸜鵒鸜鵒徃歌來哭謂昭公生時出奔死乃以䘮歸之至昭公時有鸜鵒來巢公攻季氏敗出奔齊居外野次乾侯八年死于外歸𦵏魯昭公名稠公子宋立是為定公漢元帝時童謡曰井水溢滅竈烟灌玉堂流金門至成帝建始二年三月戊子北宫中井泉稍上溢出雨流象春秋時先有鸜鵒之謡而後有來巢之驗井水隂也竈烟陽也玉堂金門至尊之居象隂盛而滅陽竊有宫室之應也王莾生於元帝初元四年至成帝封侯為三公輔政因以簒之時又童謡曰燕燕尾涎涎涎涎光澤貎也音徒見反張公子時相見木門倉琅根燕飛來啄皇孫皇孫死燕啄矢其後帝為㣲行出逰嘗與富平候張放俱稱富平侯家過河陽主作樂見舞者趙飛燕而幸之故曰燕燕尾涎涎美好貎也張公子謂富平侯也木門倉琅根謂宫門銅鍰門之鋪首兩銅鍰也銅色青故曰倉琅鋪首御環故謂之根鍰讀與環同言將尊貴也後遂立為皇后弟昭儀賊害后宫皇子卒皆伏辜所謂燕飛來啄皇孫皇孫死燕啄矢者也是時歌謡又曰邪徑敗良田讒口亂善人桂樹華不實黄爵巢其顛古為人所羡今為人所憐桂赤色漢家象華不實無繼嗣也王莽自謂黄象爵巢其顛也翟方進成帝時為丞相奏罷汝南鴻隙陂後嘗枯旱郡中追怨方進童謡曰壊陂誰翟子威飯我豆食羮芋魁言田無溉灌不生秔稻又無麥稷但有豆及芋豆食者豆為飯也羹芋魁者以芋根為羮反乎覆陂當復誰云者兩黄鵠託言有神來告至後漢陂果復王莽末天水童謡曰出吳門望緹羣見一蹇人言欲上天令天可上地上安得人時隗囂初起兵於天水後意稍廣欲為天子遂破滅囂少病蹇吳門冀都門名也有緹羣山後漢更始時南陽有童謡曰諧不諧在赤睂得不得在河北是時更始在長安世祖為大司馬平定河北更始大臣竝專權故謡妖作也後更始遂為赤睂所殺世祖自河北興光武建武初蜀童謡曰黄牛白腹五銖當復是時公孫述僣號於蜀時人竊言王莽稱黄述欲繼之故稱白五銖漢家貨明當復漢也順帝之末京都童謡曰直如弦死道邉曲如鈎反封侯時順帝即位孝質短祚大將軍梁兾貪樹疏㓜以為已功專國號令以贍其私太尉李固以為清河王蒜性聰敏敦禮閱書加又屬親立長則順置善則固而兾建白太后䇿免固徵蠡吾侯遂即至尊固因是幽斃于獄暴屍道路而太尉胡廣封安鄉侯司徒趙戒廚亭侯司空袁湯安國亭侯桓帝之初天下童謡曰小麥青青大麥枯誰當穫者婦與姑丈人何在西撃胡吏買馬君具車請為諸君鼓嚨胡元嘉中凉州諸羌一時俱反南入蜀漢東抄三輔延及并兾大為民害命將出師每戰嘗負中國益發甲卒麥多委棄但有婦女穫割之也吏買馬君具車者言調發者及有秩者也請為諸君鼓嚨胡者不敢公言私咽語建和初京師童謡曰城上烏尾畢逋公為吏子為徒一徒死百乗車車班班入河間河間姹女工數錢以錢為室金為堂石上慊慊舂黄梁梁下有懸鼓我欲撃之丞卿怒案此皆謂為政者貪也城上烏尾畢逋者處高利獨食不與下共謂人主多聚歛也公為吏子為徒者蠻夷將叛逆父既為軍吏其子又為卒徒徃撃之者也一徒死百乗車者言前一人徃討胡既死後又遣百乗車徃車班班入河間者言乗輿班班入河間迎靈帝也河間姹女工數錢以錢為室金為堂者靈帝既立其母永樂太后好聚金以為堂也石上慊慊舂黄梁者言永樂雖横金錢慊慊嘗苦不足使人舂黄梁而食之也梁下有懸鼓我欲撃之丞卿怒者言永樂教靈帝使賣官受錢所禄非其人天下忠篤之士怨望欲撃懸鼔以求見丞卿主鼔者亦復謟順怒而止我也又京都童謡曰游平賣印自有平不辟豪賢及大姓按延熹末鄧皇后以譴自殺乃以竇貴人代之其父名武字游平拜城門校尉及太后攝政為大將軍與太傅陳蕃合心戮力惟徳是建印綬所加咸得其人豪賢大姓皆絶望矣至末年京都童謡曰茅田一頃中有井四方纎纎不可整嚼復嚼今年尚可後年饒風俗通云作説案易曰拔茅連茹以其彚征吉茅喻羣賢也井法也于時中常侍管霸蘇康憎疾海内英哲與長沙少府劉囂太常許詠尚書柳分袁山松書桞分權豪之黨為范滂所奏尋穆史佟佟後亦為司徒應劭曰佟馮賀方佐官偷進者也司𨽻唐珍等代作唇齒河内牢川詣闕上書汝潁南陽上采虚譽專作威福甘陵有南北二部三輔尤甚繇是傳考黄門北寺如見廢閤茅田一頃者言羣賢衆多也中有井者言雖阨窮不失其法度也四方纎纎不可整者言姦慝大熾不可整理嚼復嚼者京都飲酒相强之辭也言食肉者鄙不恤王政徒耽宴飲歌呼而已也今年尚可者言但禁錮也後年饒者陳竇被誅天下大壊又京都童謡曰白葢小車何延延河間來合諧案解瀆亭屬饒陽河間縣也劉昭案郡國志饒陽本屬涿後屬安平靈帝既是河間王曾孫謡言自是有徵無事河間之縣為儉也居無幾何而桓帝終使者迎解瀆侯皆白葢車從河間來延延衆貎也是時御史劉儵建議立靈帝以儵為侍中中常侍侯覽畏其親近必當間已自拜儵泰山太守因令司𨽻廹促殺之朝廷少長思其功効乃拔用其弟郤致位司徒此為合諧靈帝時京都歌曰承樂世董逃逰四郭董逃蒙天恩董逃𢃄金紫董逃行謝恩董逃整車騎董逃埀欲發董逃與中辭董逃出西門董逃瞻宫殿董逃望京城董逃日夜絶董逃必摧傷董逃案董謂董卓也言雖跋扈縱其殘暴終歸逃竄至滅族也末年京都童謡曰侯非侯王非王千乗萬騎上北邙案中平六年史侯登躡至尊未有爵號為中常侍段珪等數十人所執公卿百官尾隨其後到河上乃得來還此為非侯非王上北邙者也英雄記曰京師謡歌咸言河臘叢進獻帝臘日生也風俗通曰烏臘烏案逆臣董卓遥天虐門民窮㐫極惡關東舉兵共欲誅之轉相顧望莫肯先進處處停兵數十萬善烏臘虫相隨舞取之獻帝踐祚之初京都童謡曰千里草何青青十日一卜不得生案千里草為董十日一卜為卓凡别字之體皆從上起左右離合無有急召之乃乗追風車東渡河終如童謡之言魏齊王正始八年大將軍曹爽用何晏鄧颺丁謐之謀專擅朝政時人為之謡曰何鄧丁亂京城嘉平中謡曰白馬索覊西南馳其誰乗者朱虎騎朱虎者楚王彪小字也王陵令狐獨愚聞此謡謀立彪事發陵等伏誅彪賜死吳諸葛恪為太傅荆揚牧都督中外諸軍事及為孫峻所殺先是有童謡曰諸葛恪蘆葦單衣篾鈎落於何相求成子閤成子閤者反言石子岡也建業南有長陵名曰石子岡𦵏者依焉鈎落者較餙束𢃄也謂之鈎𢃄及恪死果以葦席褁其身而篾其腰投之此岡廢帝建興初公安有白鼉鳴童謡曰白鼉鳴龜背平南郡城中可長生守死不去義無成南郡城可長生者有急易以逃也明年諸葛恪敗弟融鎮公安亦見襲融刮金印龜服之而死鼉有鱗介甲兵之象又曰白祥也景帝永安二年將守質子羣聚嬉戯有異小兒忽來言曰三公鋤司馬如又曰我非人熒惑星也言畢上昇仰視若曵一匹練有頃沒後四年蜀亡六年魏廢二十一年而吳平於是九服歸晉魏與吳蜀竝戰國三公鋤司馬如之謂也後主將徙都武昌時有童謡云寧飲建業水不食武昌魚寧還建業死不止武昌居民泝流供給咸怨毒焉晉武帝將平吳童謡曰阿童復阿童御刀浮渡江不畏岸上虎但畏水中龍羊祜在荆州聞之曰此必水軍有功但當思應其名者爾㑹益州刺史王濬徵為大司農祐知其可任濬又小字阿童因表留濬監益州諸軍事加龍驤將軍宻令修舟檝為順流之役及征吳江西衆軍無過者而濬先定秣陵太康中平吳後江南童謡曰局縮肉數横目中國當敗吳當復又曰宫門柱且莫朽吳當復在三十年後又曰鷄鳴不拊翼吳復不用力於是吳人皆謂在孫氏子孫故竊發為亂者相繼案横目者四字自吳亡至元帝興幾四十年元帝興於江東皆如童謡之言焉元帝懦而少斷局縮肉者有所斥也武帝末年京雒為折楊栁之歌其曲始有兵革苦辛之辭終以擒獲斬截之事是時三楊貴盛而被族滅楊太后廢黜幽死宫中折楊桞之應也三楊謂楊駿兄弟為武帝楊后之父也惠帝永熙年童謡曰二月末三月初荆筆楊板行詔書宫中大馬幾作驢此時楊駿專權楚王用事故言荆筆楊板二人不誅則君臣禮悖故云幾作驢也元康中京雒童謡曰南風起吹白沙遥望魯國何嵯峨千嵗髑髏生齒牙又曰城東馬子莫嚨哅比至來年纒汝髮南風賈后字也白晋行沙門太子小名魯賈謐國也言賈后將與謐為亂以危太子而趙王乃因釁咀嚼豪賢以成篡奪不得其死之應也是時天下商農通着大鄣曰童謡曰屠蘇鄣曰覆兩耳當見瞎兒作天子及趙王倫簒位其目實眇焉趙王倫既簒雒中童謡曰獸從北來鼻頭汗龍從南來登城㸔水從西來河灌灌數月而齊王成都河間義兵同㑹誅倫案成都西籓在鄴故曰獸從北來齊東籓而在許故曰龍從南來河間河水源在關中故曰水從西來齊王輔政居於宫西又有無君心故言登城㸔也大安中童謡曰五馬逰渡江一馬化為龍後中原大亂宗籓多絶唯琅邪汝南西陽南頓彭城同至江東而琅邪嗣統是為元帝齊王冏為大司馬專朝政有童謡曰著布袙服為齋持服俄而冏誅長沙王乂武帝第六子既誅齊王方為大都督以執朝政時雒下謡曰草木萌芽殺長沙乂以三月二十五日廢二十七日為東海王所殺如謡言焉東海王越高宻王泰之次子也迎惠帝還都雒陽為太傅録尚書事時雒中有童謡曰雒中大䑕長丈二若不早去大狗至及茍晞將破汲桑又謡曰元超兄弟大落度上桑打椹為茍作繇是越惡晞奪其兖州隙難遂搆焉王浚字彭祖為幽州牧將僭號童謡曰十嚢五嚢入棗郎棗嵩浚之子婿也浚間責嵩而不能罪之又謡曰幽州城門似藏戸中伏尸王彭祖浚後為石勒所殺愍帝建興初有童謡曰天子何在豆田中時王浚在幽州以豆有藿殺隠士霍原以應之及帝降劉曜曜營實在城東豆田壁又江南謡曰訇如白坃破合集持作甒揚州破換敗吳興覆瓿甊案白者晉行坃噐有口屬瓮質剛亦金之類也訇如白坃破者言二都傾覆王室大壊也合集持作甒者元帝鳩集遺餘以主社稷未能克復中原但偏王江南故其諭也及王敦作逆石頭之事六軍大潰兵人抄掠京邑爰及二宫其後三年錢鳳復攻京邑阻水而守相持月餘日焚燒城邑井堙木刋矣鳳等敗退沈充將其黨還吳興官軍踵之蹈籍郡縣充父子授首黨與誅者以百數此所謂之揚州破換敗吳興覆瓿甊瓿甊瓦噐又小於甒也明帝大寧初童謡曰側側力力放馬山側大馬死小馬餓高山隳石自破及明帝終成帝㓜為蘇峻所逼遷於石頭御膳不足此大馬死小馬餓也高山峻也又言峻尋死石峻弟蘇石也峻死後石據石頭尋為諸公所破復是隳山石破之應也成帝咸康初河北謡云麥入土殺石虎是嵗虎為石閔所殺又童謡云􅐀􅐀何隆隆駕車入梓宫少日而宫車晏駕庾亮為征西將軍開府假節鎮武昌出至石頭百姓於岸上歌曰庾公上武昌翩翩如飛鳥庾公還揚州白馬牽旌旐又曰庾公初上時翩翩如飛鳥庾公還揚州白馬牽流蘇後連徵不入及薨於鎮以䘮還都𦵏皆如謡言穆帝升平中童兒軰忽歌於道曰阿子聞曲終輙云阿子汝聞不升平末俗間又忽作亷歌有扈謙者聞之曰亷者臨也歌云白門亷宫庭亷内外悉臨國家共大諱平少時而穆帝晏駕太后哭之曰阿子汝聞否哀帝隆和初童謡曰外平不滿斗隆和那得久桓公入石頭陛下徒跣走朝廷聞之而改年曰興寧而復歌曰雖復改興寧亦復無聊生至是升平五年而穆帝晏駕不滿斗謂不至十年也無聊生謂哀帝尋晏駕也後桓温入朝廢海西公海西公太和中百姓歌曰青青御路楊白馬紫絲韁汝非皇太子那得甘露漿識者曰白者金行馬者國族紫為奪正之色明以紫間朱也西公尋廢其三子竝非公之子縊以馬韁死之明日南方獻甘露焉太和末童謡曰犂牛耕御路白門種小麥及海西公被廢百姓耕田以種小麥遂如謡言又海西公初生皇子百姓歌云鳳凰生一雛天下莫不喜本言是馬駒今定成龍子其歌甚美其㫖甚㣲海西公不男使左右向龍與内侍接生子以為已子孝武帝大元末京口謡曰黄雌鷄莫作雄父啼一旦去毛衣衣被柆颯棲尋以王恭起兵誅王國寳族為劉牢之所敗故言柆颯棲也王恭為平北將軍青兖二州刺史假節鎮京口舉兵誅王國寶百姓謡云昔年食白飯今年食麥䴸天公誅讁汝教汝捻嚨喉嚨喉喝復喝京口敗復敗識者曰昔年食白飯言得志也今年食麥䴸䴸麄穢其精已去明將敗也天公將加譴謫而誅之也捻嚨喉氣不通死之祥也敗復敗丁寧之辭也恭尋死京都又大行欬疾而喉竝喝焉又恭在京口百姓間忽云黄頭小兒欲作賊阿公城下指縳得又云黄頭小兒人欲作亂賴得金刀作藩翰黄字上恭字頭也小人恭字下也尋如謡言者焉桓石民為西中郎將荆州刺史鎮水流百姓忽歌黄曇子其曲曰黄曇英楊州大佛來上明頃之而桓石民死王忱為荆州黄曇子乃是忱字也忱小字佛大是佛來上明也庾楷為西中郎將豫州刺史假節鎮歴陽百姓歌曰重羅黎重羅黎使君上南上無還時後楷南奔桓𤣥為𤣥所誅殷仲堪為振威將軍荆州刺史假節鎮江陵時童謡曰芒籠目繩縛腹殷當復未幾而仲堪敗桓𤣥遂有荆州桓𤣥初為輔國將軍南蠻較尉鎮荆州及將僭亂有童謡曰長干巷巷長干今年殺郎君後年斬諸桓其凶兆符㑹如此郎君謂元顯也又𤣥時民謡語云征鍾落地桓并征征鍾至穢之服桓四體之下稱𤣥自下居上猶征鍾之服歌謡下體之詠民口也而云落地墜地之祥迸走之言其驗明矣司馬元顯為侍中驃騎大將軍開府以總朝政時民謡詩云當有十一口當為兵所傷木亘當北渡走入浩浩鄉又云金刀既以尅亹亹金城中此時詩云缺陽道人竺曇林所作多行於世孟顗釋之曰十一口者元字象也木亘桓字也桓氏當悉走入關雒故云浩浩鄉也金刀劉也唱義諸公皆多姓劉亹亹美盛貎也安帝隆安中百姓忽作懊憹之歌其曲曰草土可攬結女兒可攬擷尋而桓𤣥簒位義旗以三月二十日掃定京都誅之宫女及逆黨之家子女妓妾悉為軍賞東及歐越北流淮泗人皆有獲故言時則草可結事則女可擷也桓𤣥既簒童謡曰草生及馬腹鳥啄桓𤣥目及𤣥敗走至江陵時正五月中誅於其湖焉義熙初童謡曰官家養蘆化成荻蘆生不正自成積其時官養盧龍寵以金紫奉以名州養之極也而龍不能懐我好音舉兵内伐遂成讐敵也蘆生不正自成積及盧龍之敗斬伐其黨猶如草木以成積也盧龍據廣州人為之謡曰蘆生漫漫竟天半後擁上流數州之地内逼京輦應天半之言又小兒相逄於道輙舉其兩手曰蘆徤徤次曰鬬歎末曰翁年老翁年老當時莫知所謂其後盧龍逼舟艦葢川徤徤之謂也既至查浦屢尅期欲與官鬬鬬歎之應也其時復有謡言曰盧橙橙逐水流東風如忽起那得入石頭盧龍果敗不得入石頭也盧循小名元龍也前凉張寔為荆州刺史時焦崧陳安冦隴右東與劉曜相持秦雍之人死者十八九永嘉中長安謡曰秦川中血沒腕唯有凉州倚柱觀至是謡言驗矣張茂為凉州牧州大姓賈摹實妻弟也勢傾西土先是謡曰手莫頭圗凉州茂以為佞誘而殺之於是豪右屏迹威行凉域張駿將立為凉王姑臧謡曰鴻從南來雀不驚誰謂孤雛尾翅生高舉六翮鳳凰鳴至是而復收河南之地前秦苻洪雒陽臨渭氏人父懐歸部落小帥先是隴右大雨百姓苦之謡曰雨若不止洪水必起故因名其子曰洪苻生初生夢大魚食石蒲又長安謡曰東海魚化為龍男便為王女為公問在何所雒門東東海符堅封也時為龍驤將軍第在雒門之東生不知是堅以謡夢之故誅其侍中太師録尚書事魚遵及七子十孫時又謡曰百里望空城欝鬱何青青瞎兒不知法仰不見天星於是悉壊諸空城以禳之苻堅初滅燕慕容冲之姊偽清河公主年十四有殊色堅納之寵冠後庭冲年十二亦有龍陽之姿堅又幸之姊弟專寵宫人莫進長安歌曰一雌復一雄䨇飛入紫宫咸懼為亂王猛切諌堅乃出冲長安又謡曰鳯凰鳳凰止阿房堅以鳯凰非梧桐不棲竹實不食乃植梧竹數十萬株于阿房城以待之冲小字鳯凰終為堅賊入止阿房城焉又謡曰長鞘馬鞭擊左股大嵗南行當復虜秦人呼鮮卑為白虜慕容垂之起於關東果嵗在癸未堅將南伐有謡云堅不出項聖南伐羣臣勸堅停項為六軍聲鎮堅不從為晉師所敗堅强盛時童謡曰阿堅連牽三十年後若欲敗時當在江淮間及堅在位凡三十年敗於淝􅖅又謡云河水清復清苻紹死新城及堅為姚萇所殺死於新城復謡歌云魚羊田升當滅秦識者以為魚羊鮮也田升卑也言滅秦者鮮卑也其羣臣諌堅令盡誅鮮卑堅不從及淮南敗還初為慕容冲所攻又為姚萇所殺身死國滅慕容氏鮮卑種也堅為冲所攻謡曰堅入五將山長得堅大信之告其太子宏曰脫如此言天或導余今留汝兼總戎政勿與賊争利吾當出隴收兵運糧以給汝天其或者正訓予也於是遣衛將軍楊定撃冲于城西為慕容冲所擒堅彌懼付宏以後事將中山公詵張夫人率騎數百出如五將竟為姚萇所害苻丕鎮鄴為慕容垂所攻垂軍人饑甚多奔中山幽冀人相食初關東謡曰幽州缺生當滅若不滅百姓絶缺埀之本名也與丕相持經年百姓死幾絶後凉吕光初徙西海郡人於諸郡至是謡曰朔馬心何悲念舊中心勞燕雀何徘徊意欲還故巢頃之遂相扇動復徙之于西河樂都後燕慕容熙將滅先有童謡曰一束藁兩頭燃秃頭小兒來滅燕藁字上有艸下有禾兩頭燃則禾草俱盡而成高字高雲父名拔小字禿頭拔三子而雲季也熙竟為雲所滅如謡言焉南燕慕容徳將自立先有謡言曰大風蓬勃揚塵埃八井三刀卒起來四海鼎沸中山頺惟有徳人據三臺及慕容詳僣號中山為後魏所沒徳自鄴徙滑臺八并三刀謂并州魏所都也宋文帝元嘉中謡言錢塘當出天子乃於錢塘置武軍以防之其後孝武帝即大位於新亭寺之禪堂禪之與錢音相近也後廢帝元徽中童謡曰襄陽白銅蹄郎殺荆州兒後沈攸之反雍州刺史張敬兒襲江陵殺沈攸之子元琰等南齊尚書令王儉造白紵歌周處風土記云吳黄龍中童謡云行白者君追汝句驪馬後孫權征公孫淵浮海乗舶舶白也今歌和聲猶云行白紵焉武帝永明初百姓歌白馬向城啼欲得城邉草後民間云陶郎來白者金色馬者兵事三年妖賊唐寓之起言唐來勞也又虜中童謡云黒水流北赤火入齊尋而京師人家忽生火赤於常火熱小㣲貴賤爭取以治病法以此火炎桃板七炷七日當差敕禁之不能斷京師有病癭者以炙數日而差鄰人笑曰病偶自差豈火能為此人便覺頥間癢明日癭還如故後梁以火徳興文惠太子在東宫作兩頭讖詩後句云磊磊落落玉山隳自此長王宰相相繼薨徂二宫晏駕文惠太子作七言後句輒云愁和諦後和帝果禪位於梁齊宋以來民間語云擾攘建武上明帝初誅害藩戚京師危駭建武明帝年號東昏永光元年童謡曰洋洋千里流翣翣東城頭烏馬烏皮袴三更相告訴脚跛不得起誤殺老姥子千里流者江祐也東城遥光也遥光夜舉事垣歴生著烏皮袴褶徃奔之跛脚亦遥光老姥子字之象徐孝嗣也永元中童謡曰野猪雖嗃嗃馬子空閭渠不知龍興虎飲食江南墟七九六十三廣大人無餘烏集傳舍頭令汝得寛休但㸔三八後摧拆景陽樓識者解云陳顯逹屬猪崔慧景屬馬非也東昏侯屬猪馬子未詳梁王屬龍蕭頴胄屬虎崔慧景攻臺城頓廣莫門死時年六十三烏集傳舍郎所謂瞻烏爰止于誰之屋三八二十四起建元元年至中興二年二十四年也摧折景陽樓亦高臺傾之意也言天下將去乃得休息齊宋際民間語云和起言以和顔而為變起也後和帝云梁武帝大通初陳慶之為飈勇將軍送後魏北海王元頴即魏帝位于雒陽宫慶之麾下悉著白袍所向披靡先是雒中童謡曰名師大將莫自牢千兵萬馬避白袍又普通中童謡云青絲白馬壽陽來其後侯景果乗白馬兵皆青衣所乗每戰將勝輒躑躅嘶鳴意氣駿迅其奔衂必低頭不前侯景未敗前江陵謡言苦竹町市南有好井荆州軍殺候景及景首至元帝付諮議叅軍李季長宅東即苦竹町也既加鼎鑊即用市南水焉梁末童謡云可憐也馬子一日行千里不見馬上郎但見黄塵起黄塵汚人衣皂莢相料理及王僧辯滅侯景羣臣以謡言奏聞曰僧辯乗肥馬以撃侯景馬上郎王字也塵謂陳也而不解皂莢之謂既而陳滅於隋說者以為江東謂羖羊角為皂莢隋氏姓楊楊羊也言終滅於隋然則興亡之葢有數云陳高祖未即位時與齊戰勝先是童謡云虜萬夫入五湖城南酒家使虜奴自晉宋以後經絓在魏境江淮以北南人皆謂為虜是時以賞俘貿酒者一人乃得一醉陳初有童謡曰黄班青驄馬發自壽陽涘來時冬氣末去日春風始其後陳主果為韓擒虎所敗擒虎本名豹黄斑之謂也破建康之始復乗青驄馬徃反時節皆相應至是方悟後主時江南盛歌王獻之桃葉之詞曰桃葉復桃葉渡江不用艥但渡無所苦我自迎接汝晉王伐陳之始置營桃葉山下及韓擒虎渡江大將任蠻奴自新林以導北軍之應後主造齊雲觀國人歌之曰齊雲觀㓂來無際畔功未畢而為隋師所虜後魏後廢帝時張歡等掩襲爾朱世隆及爾朱彦伯彦伯狼狽出走為人所執尋與世隆同斬於閶闔門外懸於斛斯椿門樹傳首於高歡先是雒中謡曰三月末四月初揚灰簸土覔真珠又曰頭去頂脚去根齊驅上樹不須梯至是竝驗東魏孝静武定中有童謡云百尺高竿摧折水底燃燈燈滅高者齊姓也燈文襄名五年神武薨摧折之應七年文襄遇盜所害燈滅之徵也北齊神武討爾朱兆破之先是孝明之時雒下以兩拔相撃謡言銅拔打鐡拔元家世將末好事者以拔謂拓拔言俱將衰敗之兆神武始移都于鄴時有童謡云可憐青雀子飛入鄴城裏作窠猶未成舉頭大鄉里寄書與婦母好㸔新婦子魏孝静帝清河王之子也后則神武之女鄴都宫室未備即逄禪代窠未成之効也文宣以后為太原長公主降於楊愔時婁后尚在故言寄書於婦母新婦子斥后也竇㤗為侍中京畿大都督神武西討㤗從行為周文帝所襲自殺初㤗將發鄴鄴有慧化尼謡云竇行臺去不廻河間王孝琬文宣世驕矜自負又怨執政因為和士開祖班所譛云魏世謡言河南種榖河北生白楊樹頭金鷄鳴說者曰河南河北河間也金鷄鳴孝琬將見金鷄而大赦帝頗惑遂殺之廢帝即文宣子濟南王也未被害前童謡云中興寺内白鳬公四方側聽聲雍雍道人聞之夜打鍾時丞相府在北中即舊中興寺也鳬翁葢指武成小字歩落稽也道人濟南王小名也打鍾言將被擊也孝昭帝之殺楊愔等廢㓜主而自立先是童謡曰白羊頭毛秃羖䍽頭生角又曰羊羊喫野草不喫野草逺我道道不逺打爾腦又曰阿𡡉姑禍也道人姑夫死也羊也角文為用刀道人謂廢帝小名太原公主嘗作尼故曰阿𡡉姑愔子獻天和皆尚帝姑武成帝大寧二年春武明太后病徐之才弟之範為尚藥典御敕令診候内史皆令呼太后為石婆葢有俗忌故改名以厭制之範出告之才曰童謡云周里跂求伽豹祠嫁石婆斬家作媒人唯得一量紫綖靴今太后或改名私所致怪之才曰跂求伽胡言去已豹祠嫁石婆豈有好事斬家作媒人但令合𦵏自斬家唯得紫綖靴者得至四月何者紫之為字此下糸綖者熟當在四月之中之範問靴是何義之才曰靴者革傍化寧是久兆至四月一日后果殂先是又有童謡曰九龍母死不作孝及婁太后䘮武成不改服緋袍如故又武成時謡言盧六十稚十四揵子拍頭三十二陽子術語人曰且四八天之大數太上之祚恐不過此既而武成年果三十二後主武平元年童謡曰狐截尾你欲除我我除你其年四月隴東王胡長仁謀遣刺客殺和士開事露反為士開所譛死二年童謡曰和士開七月三十日將你向南臺小兒唱訖一時拍手去殺却至七月二十五日御史中丞琅邪王儼執士開送於南臺而斬之是嵗又有童謡曰七月刈禾傷早九月喫餻正好十月洗蕩飯瓮十一月出却趙老七月和士開被誅九月琅邪王遇害十一月趙彥深出為西兖州刺史一云綦連猛趙彦深以猛武將之中頗疾姦佞言議時有可采故引知機事祖班奏言猛與彥深前推琅邪王事有意故於是出猛為定州刺史彦深為西兖州刺史即日就途先是謡曰七月刈禾大旱九月噉餻禾好本欲尋山射虎激箭旁中趙老至是其言乃驗武平末童謡曰黄花勢欲落清樽但滿酌後主穆后名邪利本斛律后從婢也小字黄花母子滛嬖干預朝政時人患之後主自立穆后以後昏飲無度故云清觴但滿酌尋逄齊亡欲落之應鄴中又有童謡曰金作掃箒玉作把淨殿屋迎西家未幾周師入鄴後周初有童謡曰白楊樹頭金鷄鳴秪有阿舅無外甥靜帝隋氏之甥既遜位諸舅强盛隋高祖仁壽四年七月煬帝即位并州總管漢王諒謀反并州謡言云一張紙兩張紙客量小兒作天子時偽署官告身一紙别授則二紙諒聞謡喜曰我㓜時字阿客量與諒同音吾於皇家最小以為應之俄而兵敗大業中童謡曰桃李子鴻鵠遶陽山宛轉花林裏莫浪語誰道許其後李宻坐楊𤣥感之逆為吏所拘在路逃叛潜結羣盗自陽城山而來襲破雒口倉後復屯兵苑内莫浪語宻也宇文化及自號許國尋亦破滅誰道許者葢驚疑之辭也唐太宗破竇建徳建徳中創竄於牛口渚車騎將軍白士譲揚武威生獲之先是軍中有童謡曰豆入牛口勢不得久建徳行至牛口渚甚惡之果敗於此高宗永徽末里歌有桑條韋也女韋也樂及神龍中韋后用事太常少卿鄭愔作桑條歌十篇上之龍朔中俗飲酒令曰子母去離連臺拗倒俗語盃盤為子母又名盤為臺及中宗廢於房州之應又里歌有突厥監及則天時遣尚書閻知㣲送武延秀使突厥突厥怒則天廢李氏乃囚延秀立知㣲為可汗挾以入㓂乾封之後天后盛勸行中嶽之禮頻下詔皆屬年饑及蕃夷冦邉而輟於是嵩山之下營奉天宫以為有事之漸時有童謡曰嵩山兀幾層不畏登不得所畏不得登及是禮物畢備竟以疾還武后如意初里歌黄麞草中藏彎弓射爾傷後契丹李萬榮叛䧟營州則天令總管曹仁師王孝傑等將兵百萬討之敗於黄麞契丹乗勝至於趙郡垂拱已後東都有挈苾兒歌皆淫艶之詞後張易之兄弟有内嬖易之小字挈苾憲宗元和十年六月辛丑盗殺宰相武元衡先是長安童謡曰打麥麥打三三三既而旋其袖曰舞了也識者謂打麥者葢言打麥時也麥打葢時暗中突撃也三三三謂六月三日也舞了也謂元衡之卒也僖宗廣明元年十二月巢賊䧟長安議者以舊有謡云金色蝦蟇争努眼飜却曹州天下反黄巢敗亡走入㤗山為其甥林言所殺言送于時溥溥函首送闕中中和初有謡云黄巢湏走泰山東死在翁家翁時巢死之處民家乃姓翁也後唐末帝始離岐下凡降附及本城將校皆兾不次之賞及從至京師累月延望署置不及始望相與為謡言去却生菩薩扶起一條䥫閩王王審知光州人兄潮威武軍節度福建觀察審知為副乾寧中潮卒審知遂繼兄位先是閩中有童謡云潮水來巖頭沒潮水去矢口出矢口知字也果陳巖死王潮代之潮死審知繼位冊府元龜巻八百九十四
