body:
  text: 册府元龜卷九百四十二宋王欽若等撰總録部黷貨禍敗黷貨書稱黷貨無厭詩惡貪人敗類是知冐于貨賂先賢所譏若乃彯纓入仕代耕受禄不能澡身而自潔乃復受財以逞欲至使外資敵國旁通絶塞求媚富室茍利私家繇是正吕刑之文加蕭斧之戮千載之下恥莫大焉伯封樂正后䕫之子實有豕心貪惏無厭漢項伯項羽兄也高祖為漢王王巴蜀賜張良金百鎰二十兩曰鎰秦以鎰名金若漢之論斤也珠二斗良俱以獻項伯漢王亦因令良厚遺項伯使請漢中地本不盡於漢中故請求之項王許之周意封汾陰侯孝文十二年坐行受財髠為城旦許元封宋子侯孝景中二年坐寄使匈奴買塞外禁物免衛侈封樂平侯孝武建元六年坐買田宅不法有請賕吏死薛歐封廣平侯元狩元年坐受淮南賂稱臣在赦前免楊毋害封赤泉侯坐許紿人贓六百免任當千嗣梁期侯宣帝太始四年坐買馬一疋價錢十五萬過平贓五百以上免陳湯為從事中郎時大司馬王商不善湯按驗湯諸所犯湯前為騎都尉王莽上書言父早死獨不封母明君共養皇太后尤勞苦莽傳言莽母渠今此云明君則明君者字也宜封竟為新都侯後皇太后同母弟茍叅為水衡都尉死子伋為侍中叅妻欲為伋求封湯受其金五十斤許為求比上奏比例也音必寐反𢎞農太守張匡坐贓百萬以上狡猾不道有詔即訊就其所居考問之恐下獄使人報湯湯為訟罪得踰冬月許謝錢二百萬後漢傅昌封蕪湖侯蕪湖縣名屬丹陽郡章帝建初中遭母憂因上書以國貧不願之封乞錢五十萬為闗内侯帝怒貶為闗内侯竟不賜錢魏丁斐初從太祖性好貨數請取犯法輒得原宥為典軍校尉晉桓𤣥既自署太尉性貪鄙好竒異尤愛寶物珠玉不離于手人士有法書好畵及佳園宅者悉欲歸已猶難逼奪之皆蒱博而取遣臣佐四出掘果移竹不逺數千里百姓佳果美竹無復遺餘殷仲文桓𤣥簒位時以佐命親貴厚自封崇輿馬器服窮極綺麗後房妓妾數十絲竹不絶音性貪吝多納貨賄家累千金常若不足宋王僧達為太子洗馬母憂去職與兄錫不協錫罷臨海郡還送故及奉禄百萬以上僧達一夕令奴輦取無復所餘阮佃夫既以弑廢帝及太宗即位論功行賞壽寂之封應城侯佃夫建城侯餘有封時佃夫及王道隆楊運長竝執權權亞人主大通貨賄凡事非賂不行人有餉佃夫絹二百疋嫌少不答後魏張僧晧明帝孝昌中徵為散騎侍郎不赴世號徵君僧晧好産業孜孜不已藏鏹巨萬他資亦稱是兄弟自供儉約車馬痩敝身服布裳而婢妾紈綺僧晧尤好蒱奕戲不擇人是以獲譏於世隋宇文述為太子左衞率時申國公李穆孫筠卒高祖議立嗣而穆第十子渾規欲紹之述即其妻兄也渾謂述曰若得襲封當以國賦之半每歲奉公述利之因入白皇太子曰立嗣以長不則以賢今申國公嗣絶徧觀其子孫皆無頼不足以當榮寵唯金才有勳於國謂非此人無可以襲封者太子許之竟奏高祖封渾為申國公奉穆嗣宇文化及自煬帝為太子時領干牛軍見人子女狗馬􅎇玩必請託求之嘗與屠販者遊以規其利累遷至太子僕射數以受納貨賄再三免官太子嬖昵之尋復職唐李慶逺睿宗景雲中為左帥府右郎將初慶逺從皇太子誅韋氏有功其後恃寵多受貨賄按問得實命杖一百放于嶺表于翬為奉天令時憲宗起山陵翬與山陵使親吏韋正收及陰陽官等同隱官錢十五萬貫不給工徒事發皆伏誅後唐盧汝弼客游上黨丁㑹薦武皇即代李襲吉為副使軍國政務委其參決莊宗嗣晉王位乃承制署吏又得汝弼有若符契繇是除補之命皆出於汝弼之手既而畿内官吏考課擬議奔走盈門頗以賄賂聞人士少之莊宗嘉其才不之詰李全暉乾祐中為禮賓使與副使高行進減刻蕃部買馬錢下開封府勘問皆伏罪竝决杖流房州周馬從斌世宗顯德中為殿中監初從斌有女適故晉國公霍彦成之子承諲後數歲俱亡有息女一人年五六歲從斌收而養之霍氏資業竝為從斌所據既而從斌令其女弟尼德堅私度霍氏為尼未幾而卒乃盡收其邸第復貿其資産乾没其直至是為霍氏近親所訟下御史府按之得實免官禍敗古人有言禍福無門惟人自召既有積善之慶豈無禍淫之責人事易辨陰隲難誣求而得之又何怨也觀夫蛇虺之行溪壑之心欺罔君親絶棄仁義殘忍不道貪冐無厭莫不十目所視衆怒難犯天肆惡盈之罰鬼得復讎而誅孽不可逭速如影響大則兵連禍結災延方域小則巢傾卵碎辱及宗親猶謂不幸豈非痛哉所以克己復禮謙謙君子囅然而笑矣秦衞鞅孝公時為左庶長定變法之令太子犯法刑其傅公子䖍復犯約劓之孝公卒太子立公子䖍之徒告商君欲反發吏捕商君商君亡至闗下欲舍客舍舍人不知其是商君也曰商君之法舍人無驗者坐之商君喟然歎曰嗟乎為法之弊一至此哉去之魏魏人怨其欺公子卬而破魏師弗受商君欲之他國魏人曰商君秦之賊秦之彊而賊入魏弗歸不可遂囚入秦商君既復入秦走商邑與其徒屬發邑兵北出撃鄭京兆鄭縣也秦發兵攻商君殺之於鄭黽池黽或作彭秦惠王車裂商君以狥曰莫如商鞅反者遂滅商君之家吕不韋為相國始皇九年有告嫪毐實非宦者嘗與太后私亂生子二人皆匿之與太后謀曰王即薨以子為後毐與侍中左右貴臣博飲酒醉争言而闘瞋目大叱曰吾乃皇帝假父也窶人子何敢乃與我亢所與鬪者走以白始皇於是秦王下吏治具得情實事連相國吕不韋九月夷嫪毐三族殺太后所生兩子而遂遷太后於雍諸嫪毐舍人皆没其家而遷之蜀王欲誅相國為其奉先王功大及賔客辯士為游說者衆王不忍致法秦王十年十月免相國吕不韋及齊人茅焦說秦王秦王乃迎太后於雍歸復咸陽入南宫而出文信侯就國河南歲餘諸侯賔客使者相望於道請文信侯秦王恐其為變乃賜文信侯書曰君何功於秦秦封君河南食十萬戸君何親於秦號稱仲父其與家屬徙處蜀吕不韋自度稍侵恐誅乃飲酖而死吕覽曰不韋冢在河南雒陽北邙道西大冢是也民傳言吕母冢不韋妻先葬故其冢名吕母也秦王所加怒吕不韋嫪毐皆已死皆復歸嫪毐舍人遷蜀者漢主父偃為齊相初尊立衛皇后及發燕王定國陰事偃有功焉大臣皆畏其口賂遺累千金或說偃曰大横横音胡孟反偃曰臣結髪游學四十餘年身不得遂遂猶達也親不以為子昆弟不收賔客棄我我阨日久矣丈夫生不五鼎食死則五鼎烹爾吾日暮故倒行逆施之日暮言年已老也倒行逆施謂不遵常理後以齊王自殺遂族偃王温舒為河内太守好殺行威遷為中尉坐以法免後拜為少府徙右内史治如其故姦邪少禁坐法失官復為右輔行中尉事如故操歲餘㑹宛軍發發兵伐大宛詔徵豪吏温舒匿其吏華成及人有變告温舒受員騎錢它姦利事罪至族自殺員騎騎之有正員也其時兩弟及兩婚家亦各自坐它罪而族光禄勳徐自為曰悲夫夫古有三族而王温舒坐罪至同時而五族乎温舒與弟同三族而兩妻家各一故為五也温舒死家累千金董賢為大司馬哀帝末太皇太后召賢引見東廂問以喪事調度賢内憂不能對免冠謝太后曰新都侯王莽前以大司馬奉送先帝大行曉習故事吾令莽佐君賢頓首幸甚太后遣使者召莽既至以太后指使尚書劾賢帝病不親醫藥禁止賢不得入出宫殿司馬中賢不知所為詣闕免冠徒跣謝莽使謁者以太后詔即闕下册賢即就也曰間者以來陰陽不調菑害竝臻菑古災字元元蒙辜蒙被也夫三公鼎足之輔也高安侯賢未更事理更厯也音工衡反為大司馬不合衆心非所以折衝綏逺也其收大司馬印綬罷歸第即日賢與妻皆自殺家惶恐夜葬莽疑其詐死有司奏請發賢棺至獄診視謂發冢取其棺柩也診驗也音軫莽復風大司徒光奏賢風讀曰諷光孔光也質性巧佞翼姦以獲封侯翼進也父子專朝兄弟竝寵多受賞賜治第宅造冢壙放效無極不異王制放依也音甫往反費以萬萬計國家為空虗父子驕蹇至不為使者禮言不敬天子之使受賜不拜辠惡暴著賢自殺伏辜死後父恭等不悔過乃復以砂畵棺以硃砂塗之而又雕畵也四時之色左蒼龍右白虎上著金銀日月玉衣珠璧以棺以此物棺斂也棺音工喚反至尊無以加恭等幸得免誅不宜在中土臣請收没入財物縣官諸以賢為官者皆免父恭弟寛信與家屬徙合浦母别歸故郡鉅鹿長安中小民讙譁鄉其弟哭幾獲盜之陽往哭之實欲竊盜也鄉讀曰嚮幾讀曰冀縣官斥賣董氏財凡四十三萬賢既見發臝診其尸臝露形也音郎果反因埋獄中原涉字巨先祖父武帝時以豪傑自陽翟徙茂陵涉性外温仁謙遜而内隱好殺睚眦於塵中觸死者甚多王莽末為鎭戎大尹莽敗更始西屏將軍申屠建請涉與相見大重之故茂陵令尹公壊涉冢舍者為建主簿涉本不怨也涉從建所出尹公故遮拜涉謂曰易世矣宜勿復相怨涉曰尹君何以魚肉涉也言以涉為魚肉不以人遇之涉用是怒使客刺殺主簿涉欲亡去申屠建内恨恥之陽言吾欲與原巨先共鎭三輔豈以一吏易之哉賔客通言令涉自繫獄謝建許之賔客車數十乘共送涉至獄建遣兵道徼取涉於車上徼要也音工堯反送車分散馳遂斬涉縣首長安市後漢牛輔為中郎將董卓子婿營中無故大驚輔懼乃齎金寶踰城走左右利其貨斬輔送首長安獻帝紀曰輔帳下支胡赤兒等素待之過急盡以家寶與之自帶二千餘餅金大白珠瓔胡謂輔曰城北已有馬可去也以繩繋輔腰踰城懸下之未及地支胡放之輔傷腰不能行諸胡共取其金并珠斬首詣長安公孫瓚獻帝時為奮武將軍因怒袁紹遂出軍屯槃河將以報紹即九河鉤槃之河也乃上疏疏紹罪紹懼以所佩渤海太守印綬授瓚從弟範遣之郡欲以相結範遂背紹領渤海兵以助瓚與紹大戰瓚軍敗還薊後保易京建安三年袁紹復大攻瓚瓚遣子續請救於黑山諸帥而欲自將突騎直出傍西山以斷紹後長史闗靖諫曰今將軍將士莫不懐瓦解之心所以猶能相守者顧戀其老小而恃將軍為主故爾堅守曠日或可使紹自退若舍之而出後無鎭重易京之危可立待也瓚乃止紹漸相攻逼瓚衆日䠞乃却築三重營以自固四年春黑山賊帥張燕與續率兵十萬三道來救瓚未及至瓚乃密使行人賫書告續曰昔周末喪亂殭屍蔽地以意而推猶為否也不圖今日親當其鋒袁氏之攻狀若鬼神梯衝舞吾樓上皷角鳴於地中日窮月急不遑啓處鳥戹歸人滀水陵高汝當碎首於張燕馳驟以告急父子天性不言而動且厲五千鐵騎於北隰之中起火為應吾當自内出奮揚威武決命於斯不然吾亡之後天下雖廣不容汝足矣紹候得其書如期舉火瓚以為救至遂便出戰紹設伏兵瓚遂大敗復還保中小城自計必無全乃悉縊其姊妹妻子然後引火自焚紹兵趣登臺斬之續為屠密所殺袁術既僭號而士卒凍餒江淮間空盡人民相食術前為吕布所破後為太祖所敗奔其部曲雷薄陳蘭於灊山復為所拒憂懼不知所出將歸帝號於從弟紹欲至青州從袁譚發病道死吳書曰術既為雷薄等所拒留住三日士衆絶糧乃還至江亭去壽春八十里問厨下尚有麥屑三十斛時盛暑欲得蜜漿又無蜜坐櫺牀上歎息良久乃大咤曰袁術至於此乎因頓伏牀下嘔血斗餘因而遂死袁譚紹之子也譚父為冀州牧曹公之在鄴譚畧取甘陵安平渤海河間攻弟袁尚於中山尚走固安從其兄袁熈譚悉收其衆㑹曹公將討之譚乃拔平原并南皮自屯龍湊譚欲出戰軍未合而破譚被髪驅馳追者意非常人趨奔之譚墮馬曰咄而過我我能富貴汝言未絶口頭已斷地曹公擊袁尚袁熈至遼西尚熈與烏丸逆軍戰敗走奔遼東公孫康誘斬之送其首尚為人有勇力欲奪取康衆與熈謀曰今到康必相見欲與兄手撃之有遼東猶可以自廣也康亦心計曰今不取熈尚無以為悦於國家乃先置其精勇於廐中然後請熈尚入康伏兵出皆縛之坐於凍地尚寒求席曰未死之間寒不可忍可相與席熈曰頭顱方行萬里何席之為遂斬首譚字顯思熈字顯雍晉石崇為衞尉諂事賈謐及謐誅崇以黨與免官時趙王倫專權崇甥歐陽建與倫有隙崇有妓曰緑珠美而艶善吹笛孫秀使人求之崇時在金谷别館方登凉臺臨清流婦人侍側使者以告崇盡出其婢妾數十人以示之皆藴蘭麝被羅縠曰在所擇使者曰君侯服御麗則麗矣然本受命指索緑珠不識孰是崇勃然曰緑珠吾所愛不可得也使者曰君侯博古知今察逺炤邇願加三思崇曰不然使者出而又反崇竟不許秀怒乃勸倫誅崇建亦濳知其計乃與黄門郎潘岳陰勸淮南王允齊王冏以圖倫秀秀覺之遂矯詔收崇及潘岳歐陽建等崇正宴於樓上介士到門崇謂緑珠曰我今為爾得罪緑珠泣曰當效死於官前因自投於樓下而死崇曰吾不過流徙交廣爾及車載詣東市崇乃歎曰奴軰利吾家財收者答曰知財致害何不早散之崇不能答崇母兄弟妻子無少長皆被害死者十五人崇時年五十二楊駿為太傅大都督假黄鉞録朝政百官總已多樹親黨皆領禁兵於是公室怨望天下憤然殿中中郎孟觀李肇與黄門董猛及汝南王亮楚王瑋謀誅之殿中兵出燒駿府又令弩士於閤上臨駿府而射之駿兵皆不得出駿逃于馬廐以㦸殺之觀等受賈后密旨誅駿親黨皆夷三族死者數十人賈謐為侍中領祕書監謐者賈充外孫韓壽之子也充養以為後與賈后共謀誣陷愍懐太子及趙王倫廢后以詔召謐於殿前將戮之走入西鐘下呼曰阿后救我乃就斬之韓壽少弟蔚及壽兄鞏令保弟散騎郎預吳王友鑒謐賈母賈午皆伏誅孫旂為平南將軍子弼及弟子髦輔琰四人與孫秀合族及趙王倫起事夜從秀開神武門下觀閱器仗兄弟旬日相次為公府掾尚書郎弼又為中堅將軍領尚書左丞輔為上將軍領射聲校尉髦為武衞將軍領太子詹事琰為武威將軍領太子左率皆賜爵開國郡侯推崇旂為車騎將軍開府旂初以弼等受署偽朝遣小息回責讓弼等以過差之事必為家禍弼等終不從旂制之不可但慟哭而已及齊王冏起義四子皆伏誅襄陽太守岱承冏檄誅旂夷三族杜曾自稱南中郎將及王廙為荆州刺史曾距之廙使將朱軌趙誘撃曾皆為曾所殺王敦遣周訪討之屢戰不能尅訪濳遣人縁山開道出曾不意以襲之曾衆潰其將馬雋蘇温等執曾詣訪降訪欲生致武昌而朱軌息昌趙誘息裔皆乞曾以復寃於是斬曾而昌裔臠其肉而噉之祖約為鎭西將軍蘇峻舉兵約從之既敗奔於石勒勒薄其為人不見者久之勒將程遐說勒曰天下粗定當顯明順逆此漢高祖所以斬丁公也今忠於事君者莫不顯擢背叛不臣者莫不夷戮此天下所以歸伏大王也祖約猶存臣竊惑之且約大引賓客又占奪鄉里先人田地地主多怨於是勒乃詐約曰祖侯遠來未得善歡可集子弟一時俱㑹至日勒辭之以疾令遐請約及其宗室約知禍及大飲醉既至于市抱其外孫而泣遂殺之并其親屬中外百餘人悉滅之婦女妓妾班賜諸胡後魏和跋為尚書性尤奢淫太祖戒之弗革將刑太祖命其諸弟毗等視訣跋謂毗曰灅北地瘠可居水南就耕良田廣為産業各相勉勵務自纂脩令之背已曰汝曹何忍視吾之死也毗等解其微意詐稱使者亡奔長安追之不及太祖怒遂誅其家崔逞初仕慕容燕以留臺尚書亡歸道武帝亦以為尚書後為御史中丞有罪賜死及其孫叡孝文帝初以交通境外伏誅自逞之死至叡之誅三世積五十餘年而在此一門盡矣費穆為武衞將軍爾朱榮向雒穆勸其大行誅罰榮心然之於是遂有河陰之事天下聞之莫不切齒及元顥内逼莊帝北幸穆遂降顥顥以河陰酷濫事起於穆引入詰讓出而殺之爾朱世隆兄弟各擁强兵割剥四海世隆既摠朝政生殺自繇及高歡起兵仲逺度律等愚戇恃强不以為慮而世隆獨深憂恐及天光戰敗世隆請出收兵節閔帝不許世隆令其外兵參軍陽叔淵單騎馳赴北中簡閱敗衆以次内之而斛斯椿未得入城詭說叔淵曰天光部下皆是西人聞其欲掠京邑遷都長安宜先内我以為其備叔淵信而内之椿既至橋盡殺世隆黨附令行臺長孫雅詣闕奏狀别使都督賈智張歡率騎掩執世隆與兄彦伯俱斬時年三十三北齊高乾為魏司空為莊帝所殺乾臨死神色不變見者莫不歎息焉時武衞將軍元整監刑謂乾曰頗有書及家人乎乾曰吾兄弟分張各在異處今日之事想無全者兒子既小未有所識亦恐巢傾卵破夫欲何言唐來俊臣則天朝厯雒陽令司農少卿恣行羅織多所陷害自侯王將相被其羅織受戮者不可勝計復自稱其才可比石勒朝野聞而彌懼又將誣告皇嗣及廬陵王與南北衙將相謀反兾因此傾動宗社自取國權俊臣與其黨衛遂忠飲醉自紏發繇是得罪制曰來俊臣閭巷小人奸險有素以其頗申糾摘將謂微効欵誠遂拔自泥塗齒于簮紱歳月滋久涓埃莫施專搆凶邪每相朋扇隱逆賊之妹尤深嬖寵逼良家之女以為妾媵作威作福無禮無義剝奪甚萑蒲之盜贓賄踰丘山之積諸王等磐石宗枝必期毁敗南北衙文武將相咸將傾危兾得竊弄機權方擬濳為悖逆無君之心已著不臣之迹顯然天下側目含靈切齒擢其髪不足以數罪粉其骨不足以塞愆棄市之刑嚴科未極汙宫之辟輿議所歸宜加赤族之誅以雪蒼生之憤可准法籍没其家時年四十七俊臣及伏誅讎人皆臠其肉噉之斯須而盡逺近莫不稱慶高駢鎭淮南為秦彦幽辱計口給食自五月至八月外圍益急供事遂闕庖人以道院欄檻及諸木像毁而為薪以續晨㸑時秦彦畢師鐸頻為楊行密所敗頗疑道院禳制使然又慮一旦府城不守或致竄逸有妖尼王奉仙者謂秦彦曰此間氣候當損一大貴人地方始安以此言故害之是日駢晨起啜粥左右走告云有兵馬來言未畢衆已及階駢謂其徒曰軍府之事有監軍使及大將軍在汝軰莫無禮因命左右召秦彦詞氣甚厲群兇憚焉久之有卒自後揮肱中之遂牽下階倉皇之際猶仰首顧望若有所伺及就刀斷而不殊明日外圍知之皆向城大慟競以紙錢奠而焚之先是駢嘗戒羣子曰汝等善自為謀吾必不學俗物死入四片板中以累於汝矣至是以諸姪同坎而瘞唯駢以舊氊包之正符所言及呂用之伏誅有軍人於中堂發得一石函内有銅人一枚長三尺餘身被桎梏口貫長釘胷上疏駢鄉貫甲子官品姓名為厭勝之事以是駢毎為用之所制如有助焉其後楊行密入城署駢諸孫愈為節度副使令主喪事愈乃發穴長幼凡六人皆斂棺柩自道院遷于愈家既月餘愈又暴終明年四月孫孺下廣陵勅其故吏曠師䖍等葬之後唐温韜初仕梁為許州節度使明宗即位流于德州俄賜死長子延濬清泰中為泥水闗使次延沼為父牙帳都校次延袤鄧州指揮使咸聚居許下晉天福初聞張從賔作亂於河陽咸往依之從賔慮其難制悉斬于帳下明宗自鄴初至雒陽霍彦威怒韜前事與叚凝同收下獄尋釋之下敎放歸田里天成二年竄於德州是歳秋九月詔曰德州流人温韜生為黔首起自緑林依慿中夏干戈刧盜本朝陵寢遼州流人叚凝豺狼類性梟獍為謀無辜而幾害平人得便而嘗懐逆節嵐州司戸陶玘曾司藩翰恣黷貨財自處竄流彌興怨望盧州司戸石知訥比居賔佐合務參揮當守殷閑據夷門發文字扇揺戎帥原州司馬聶隩擢從班列委出親賢不守條章强買店宅其後細詢行止頗駭聽聞喪妻未及於半年别成婚媾棄母動逾於千里不奉晨昏而皆自抵刑章各行竄逐都無省過但出怨詞在朕意雖欲含𢎞於物論固難容舍尚全大體只罪一身竝令本處賜死王鎔為鎭州節度使令其子昭祚與張文禮以兵圍李宏規及軍司馬李藹宅竝族誅之詿誤者凡數十家又殺蘇漢衡收部下偏將下獄窮其反狀親軍大恐時諸軍皆有給賜唯親軍不時與之衆心益懼張文禮因其反側密諭之曰王此夕將坑爾曹宜自圖之衆皆掩泣相謂曰王待我如是我等焉能效忠是夜親軍十餘人自子城西門尋垣而入鎔方焚香受籙軍士二人突入斷其首袖之而出遂焚府第煙焰亘天兵士大亂鎔姬妾數百皆赴水投火而死軍校有張支順者率軍人至張文禮第請為留後遂盡殺王氏之族張文禮為鎭州大將殺節度使王鎔盜其州比厮役小人驟居人上行步動息皆不自安出則千餘人露刃相隨日殺不辜道路反目嘗慮我師問罪奸心百變南通朱氏北結契丹往往擒獲其使莊宗遣人送還文禮繇是愈恐是歳八月莊宗遣閻寶史建瑭及趙將符習等率王鎔本軍進討師興文禮病疽於腹及聞史建瑭攻下趙州驚悸而卒子處瑾據鎭州李存審為北靣招討使以攻鎭州是時處瑾危䠞日甚昭義軍節度判官任圜馳至城下諭以禍福處瑾登陴以誠告乃遣牙將張彭送欵於行臺俄而李存審師至城下是夜趙將李再豐之子冲投縋以接王師諸軍登城遲明畢入獲處瑾處球處琪并其母及同惡人等皆折足送行臺鎭人請醢而食之入發文禮之尸磔之於市郭崇韜為樞密使嘗從容謂繼岌曰蜀平之後王為太子候主上千秋萬歳神器在手宜盡去宦官優禮士族不唯疎斥閽寺至於扇馬亦不可復乗繇是内則伶官巷伯怒目切齒外則舊寮宿將戰手痛心掇其族滅之禍有自來矣復以諸子驕縱不法既定蜀川輦運珍寶實於雒陽之第籍没之日泥封尚濕雖莊宗季年為羣小所惑致功臣不保其終亦崇韜自貽其禍安重誨為樞密使四五年間獨綰大任否臧自若環衛酋長貴戚近習無敢干政者弟牧鄭州子鎮懐孟身為中令任過其才議者謂必有覆餗之禍無何有吏人李䖍徽弟揚言於衆云相者言之狀今將統軍征淮南時有軍將密以是聞深駭上聽先是東川帥董璋恃險難制方多疑忌又以武䖍裕為綿州刺史董璋日設猜防遂縶之叛及王師討蜀峽路艱阻糧運不繼而重誨請行纔許便辭翌日領數騎而出日馳數百里西諸侯聞之莫不惶駭所在錢帛糧料星夜輦運齊赴利州人乗斃踣於山路者不可勝記百姓苦之重誨至鳳翔節度使朱宏昭延於寢室令妻子奉食器敬事尤謹重誨坐中言及昨被人讒搆幾不保全頼聖上保鑒茍獲全族因泣下重誨既辭宏昭遣人具奏重誨怨望出惡言不可令至行營恐奪石敬塘兵柄而宣徽使孟漢瓊自西廻亦奏重誨已至三泉復歸闕再過鳳翔朱宏昭拒而不納重誨懼急騎奔程未至京師制授河中帥既至鎭心不自安而請致仕制初下其子崇贊崇緒走歸河中二子初至重誨駭然曰二渠安得來家人欲問故里重誨曰吾知之矣非此渠意是他人教來吾但以一死報國家餘復何言翌日中使至見重誨號泣久之重誨曰公但言其故勿過相愍中使曰人言令公據城異志矣重誨曰吾一死未塞責已負君親安敢輒懐異志遽勞朝廷興師增聖上宵旰則僕之罪更萬萬矣時遣翟光鄴使河中如察重誨有異志則誅之既至李從璋自率甲士圍其第仍拜重誨於其庭重誨下階迎拜曰太傅過禮俛首方拜從璋以撾擊其首其妻驚走抱之曰令公死亦不遲太傅何遽如此并擊重誨妻首碎竝剥其衣服夫妻裸形踣於廊下流血盈庭翌日副使判官白從璋願以衣服覆其屍堅請方許及從璋疏重誨家財不及數千緡議者以重誨有經綸社稷之大功然志大才短不能廻避權寵親禮士大夫求周身輔國之逺圖而悉自恣胷襟果貽顚覆馮贇為樞密使明宗大漸聞秦王以兵入侍贇自第馳入皇城與朱宏昭康義誠等同誅秦王語在秦王傳明宗晏駕閔帝自鄴至京師内外制置皆出宏昭與贇及潞王至陜閔帝召宏昭不至俄聞自致安從進乃殺贇於其第贇母初喪棄屍於路妻子俱伏法朱宏昭為樞密使閔帝即位超加中書令宏昭素猜忌潞王致其背誕以潞王至陜閔帝懼欲奔馳自手詔宏昭圖之時將軍穆延暉在宏昭第曰罪我也其如之何吾兒婦君之女也可速迎歸無令受禍中使繼至宏昭拔劎大哭至後亭欲自殺家人力止之使捉之急宏昭曰窮至此耶乃自投於井安從進既殺馮贇斷宏昭首俱傳於陜州晉王瑜為太府少卿杜重威之鎭東平也瑜父欽祚為節度使及重威移帥崇山瑜乃僥求茍合代其父位後自常州一載再遷刑部郎中丙午歲欽祚刺舉義州瑜歸寜至郡㑹北戎盜據區夏何建以秦州歸蜀瑜說欽祚曰若不西走當為左衽矣厲色數諫怒而不從因其卧疾涉旬瑜仗劎而脅之曰老懦無謀欲趨炮烙不即為計則死于刃下父不得已而聽之時隴東屯兵新闗扼其川路將北趣蕃部假途而往乃與群盜酋長趙徽㰱血為約以兄事之謂之曰西至成都余身為相餘為將爾當領一大郡能遂行乎徽曰諾瑜慮為所賣先致其妻孥館於郡中行有期矣徽濳召其黨伺于郊林之外子夜瑜聚族而出輜重絡繹十有餘里徽之所親循溝澮而遁至馬峽路隅舉燧伏莽齊發斷欽祚之首貫諸長矛平生聚蓄金幣萬計皆為亂兵所掠少長百口殆將殄盡瑜尚獨戰千人矢不虚發手捍射其指流血及鞬箙罄空乃持弓擊人簫弣皆碎夜竄山谷落髪為僧月餘為樵人所獲縶送岐州為侯益所殺册府元龜卷九百四十二
