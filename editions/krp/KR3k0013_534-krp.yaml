body:
  text: 册府元龜卷五百三十四宋王欽若等撰諌諍部直諌夫極言切諌以弼違箴闕拂心逆耳而有犯無隱觸法靡悔守死不貳此忠臣之志也若夫南面萬乗之貴中堂千里之奥威福己任慘舒立致乃敢奮發於悃愊規切其過失面折廷諍以救其非露章封事以明其道斯張良喻之於苦口韓非比之於批鱗非徒戾一時之意且將蹈不測之禍自非誠心内藴精忠感厲冀一悟於人主而有利於國家者疇能若是哉兹所謂匪躬之臣仗節之士者也然而奪美顯惡非人臣之禮主文譎諌著風雅之義又何必以倖直詆訐為任哉夏關龍逢事桀桀為酒池足以運舟糟丘足以望七里一鼓之而牛飲者三千人關龍逢進諌曰為人君身行禮義愛人節財故國安而身夀也今君用財若毋盡用人若恐不能死不革天禍必降而誅必至矣君其革之立而不去朝桀因囚拘之君子聞之曰末之命矣夫周芮良夫為厲王好利近榮夷公良夫諌厲王曰王室其將卑乎夫榮公好專利而不知大難夫利百物之所生也天地之所載也而有專之其害多矣天地百物皆將取焉何可專也所怒甚多而不備大難以是教王王其能久乎夫王人者將導利而布之上下者也使神人百物無不得極極中也猶日怵惕懼怨之來也故頌曰思文后稷克配彼天立我蒸民莫匪爾極大雅曰陳錫載周言文王布錫施利以載成周道也是不布利而懼難乎故能載周以至於今今王學專利其可乎匹夫專利猶謂之盗王而行之其歸鮮矣榮公若用周必敗也厲王不聼卒以榮公為卿士諸侯不享王流于彘享獻也富辰為大夫襄王十三年鄭人伐􅉸王使游孫伯請􅉸游孫伯周大夫鄭人執之鄭人文公㨗也鄭怨惠王之入而不與厲公爵又怨襄王之與衛􅉸故不聼王命而執王使王怒將以翟伐鄭翟隗姓之國也富辰諌曰不可人有言曰兄弟䜛䦧侮人百里䦧恨也兄弟雖以讒言相違恨猶禁禦他人侵侮己者百里喻逺也周文公之詩曰兄弟䦧于墻外禦其侮文公之詩周公旦所作棠棣之篇禦禁也雖相與恨於墻室之内然能外禦異族侮慢己者若是則䦧乃内侮不敗親也雖内相恨外禦他人故不敗親在鄭天子兄弟也言與襄王有兄弟之親鄭武莊有大勲力于平桓武公桓公之子突也莊武公之子莊公寤生也王功曰勲平幽王之子平王宜臼也桓平王之孫文太子之子桓王林也幽王既㓕鄭武公以卿士夾輔平王東遷雒邑桓王即位鄭莊公為之卿士以王命討不庭伐宋入城凡我周之東遷晉鄭是依東遷謂平王也謂鄭武公與晉文侯戮力一心股肱周室夾輔平王也子頽之亂又鄭之繇定子頽周莊王之子惠王叔父簒惠王而立惠王出居鄭厲公殺子頽而立之事在周語上今以小忿棄之是以小怨置大徳也無乃不可乎置廢也詩云忘我大徳思我小怨也且夫兄弟之怨不徴召於他徴召也他謂翟也徴於他利乃外矣外利在翟章怨外利不義章明棄親即翟不祥祥善以怨報徳不仁義所以生利也祥所以事神也仁所以保民也保養不義則利不阜阜厚不祥則福不降不仁則民不至古之明王不失三徳者三仁義祥故能廣有天下而和寧百姓令聞不忘王其不可以棄之王不聼十七年王降翟師以伐鄭降下王徳翟人將以其女為后富辰諌曰不可夫婚姻禍福之階也利内則福繇之利外則禍今王外利矣樹利於翟其無乃階禍乎昔摯疇之國也繇大任摯疇二國任姓奚仲仲虺之後大任之家也大任王季之妃文王之母一云摯仲氏任又曰思齊大任文王之母也杞繒繇大姒杞繒二國姒姓夏禹之後大姒之家也大姒文王之妃武王之母齊許申吕繇大姜四國皆姜姓四岳之後大姜之家也大姜大王之妃王季之母也陳繇大姬陳媯姓舜後也大姬周武之女成王之娣傳曰以元女大姫配虞胡公而封之陳是皆能内利親親者也内利内行七徳親親以申固其家也昔嫣之亡也繇仲任嫣妘姓之國仲任氏之女為嫣夫人唐尚書云嫣為鄭武公所㓕非取任氏而亡也昭謂幽王為西戎所殺云言褒姒㓕之明禍有所繇也密須繇伯姞伯結密須之女世本云密須姞姓也鄶繇叔妘鄶妘姓之國叔妘同姓之女為鄶夫人唐尚書云亦鄭武公㓕之不繇女亡也昭為公羊傳曰先鄭伯有善乎鄶云者通乎夫人以取其國此之謂也𥅆繇鄭姬𥅆姫姓文王之子𥅆季之國鄭姬鄭女為𥅆夫人同姓相取猶魯昭公娶於呉氏亦其黷姓息繇陳媯息姬姓之國陳媯陳女為息侯夫人蔡哀侯亦娶於陳息媯將過蔡蔡哀侯止而見之弗賔媯以告息侯息侯導楚伐蔡侯怨因稱息媯之美於楚子遂㓕息以息媯歸也鄧繇楚曼鄧曼姓楚曼鄧女為楚武王夫人生文王文王過鄧而利其國遂㓕鄧而兼之羅繇季姬羅熊姓之國季姫季姬氏之女為羅夫人廬繇荆媯廬媯姓之國荆媯廬女為荆夫人荆楚也是皆外利離親者行淫僻小利於外不能親親以亡其國王曰利何如而内何如而外對曰尊貴明賢明顯庸勲長老庸用勲功也長老尙齒也愛親禮新親舊是利之内也若七徳離判民乃擕貳判分擕離也七徳謂尊貴至親舊各以利退退自營也上求不暨是其外利也暨至夫翟無列於王室列位次鄭伯南也主而卑之是不尊貴也南者在南服之侯伯也或云南南面君也按内傳鄭在南服禮畿外侯伯世位其見待重於采地之君故是不尊貴也翟豺狼之徳也鄭未失周典主而蔑之是不明賢也蔑小平桓莊惠皆受鄭勞王而棄之是不庸勲也平王東遷依鄭武公桓王即位鄭莊公佐之桓王之子莊王他也惠莊王之孫僖王之子惠王母倞也為子頽所簒出居於鄭鄭厲公納之自平王以來鄭世有功故曰皆受鄭勞公者也鄭伯捷之齒長矣王而弱之是不長老矣捷鄭文公名弱稚也翟隗姓也隗姓赤翟鄭出自宣王王而虐之是不愛親也鄭桓公文宣王之弟出者鄭國之封出於宣王夫禮新不間舊間代王以翟女間姜任非禮且棄舊姜氏任氏之女為王女嬪王一舉而棄七徳臣故曰利外矣書有之曰必有忍也若能有濟也逸書也若乃也濟成也言能有所忍乃能有成功也王不忍小忿而棄鄭又登叔隗以階翟陛階翟禍翟封豕豺狼也不可厭封大厭足王弗聼十八年王黜翟十年魯僖二十四年黜廢也翟后立通於王子帶故王廢之翟人來誅殺譚伯誅責也翟人奉子帶攻王而殺譚伯譚伯周大夫富辰曰昔吾驟諌王王弗從以及此難若我不出王其以我為懟乎乃以其屬死之帥其徒屬以死翟師州鳩為伶人景王二十四年鑄無射鍾成伶人告和王謂伶州鳩曰鍾果和矣對曰未可知也伶人媚王謂之和故曰未可知王曰何故對曰上作器民備樂之則為和言聲音之道與政通今財亡民罷莫不怨恨臣不知其和也亂世之音怨以怒故曰不知其和也且民所曹好鮮其不濟也曹羣其所曹惡鮮其不廢也故諺曰衆心成城衆心所好莫之能敗其固如城衆口鑠金鑠銷也衆口所毁雖金石猶可銷也今三年之中而害金再興焉害金害民之金謂錢鍾也懼一之廢也二金之中其一必廢王曰爾老耄矣何知八十曰耄老耄昏惑明年悼王立王室亂鍾不龢秦茅焦齊人也始皇初為秦王九年遷太后於雍焦説秦王曰秦方以天下為事而大王有遷母太后之名恐諸侯聞之繇此倍秦也一云茅焦諫曰陛下車裂假父有嫉妬之心嚢撲兩弟有不慈之名遷母咸陽有不孝之行臣竊為陛下危之言畢乃解衣趨鑊始皇下殿左手援之曰先生起矣假父嫪毒也二弟太后所生二子也秦王乃迎太后於雍而入咸陽一云秦王立茅焦為傅又爵之上卿太后大喜曰天下抗直使敗復成安秦社稷使妾母子復相見者茅君之力也復居甘泉宫咸陽南宫也淳于越齊人始皇三十四年置酒咸陽宫博士僕射周青臣等頌稱始皇威徳越進諌曰臣聞之殷周之王千餘嵗封子弟功臣自為友輔今陛下有海内而子弟為匹夫卒有田常六卿之患臣無輔弼何以相救哉事不師古而能長久者非所聞也今青臣等又面諛以重陛下過非忠臣也始皇下其議丞相謬其説絀其辭漢賈誼文帝時為梁王傅上疏曰臣竊惟事勢可為痛哭者一可為流涕者二可為長太息者六若其他背理而傷道者難徧以疏舉言不可盡條記也進言者皆曰天下已安已治矣進言者謂陳説於天子前者也臣獨以為未也曰安且治者非愚則諛實謂治安則是愚也知其不爾而假言之是謟諛也皆非實知治亂之體者也夫抱火厝之積薪之下而寢其上厝置也火未及燃因謂之安方今之勢何以異此本末舛逆首尾衝决國制搶攘搶攘亂貎非甚有紀紀理也胡可謂治陛下何不壹令臣得熟數之於前因陳治安之策試詳擇焉夫射獵之娯與安危之機孰急言二事之中何者為急使為治勞智慮苦身體乏鍾鼓之樂勿為可也樂與今同而加之諸侯軌道兵革不動軌道言遵法制也民保首領匈奴賓服四荒鄉風百姓素朴獄訟衰息大數既得則天下順治海内之氣清和咸理生為明帝没為明神名譽之美垂於無窮禮祖有功而宗有徳使顧成之廟稱為太宗上配太祖與漢亡極建久安之勢成長治之業以承祖廟以奉六親至孝也以幸天下以育羣生至仁也立經陳紀輕重同得後可以為萬世法程雖有愚㓜不肖之嗣猶得䝉業而安至明也以陛下之明達因使少知治體者得佐下風致此非難也其具可素陳於前願幸無忽臣謹念此至熟也雖使禹舜復生為陛下計亡以易此夫樹國固必相疑之勢今建立國泰大其勢必固相疑也下數被其殃上數爽其憂甚非所以安上而全下也今或親弟謀為東帝淮南厲王長親兄之子西鄉而撃謂齊悼惠王子興居而為齊比王反欲擊取滎陽也今呉又見告矣呉王之不脩漢法有告之者天子春秋鼎盛行義未過徳澤有加焉猶尚如是况莫大諸侯莫大謂無有大於其國者言最大也權力且十此者乎十倍於此然而天下少安何也大國之王幼弱未壯漢之所置傅相方握其事數年之後諸侯之王大抵皆冠大抵猶言大畧也血氣方剛漢之傅相稱病而賜罷彼自丞尉以上徧置私人如此有異淮南濟北之為邪此時而欲為治安雖堯舜不治黄帝曰日中必熭操刀必割太公六韜曰日中不熭是謂失時操刀不割失利之期言當及時也熭謂暴曬之也今令此道順而全安甚易不肯蚤為已廼墮骨肉之屬而抗剄之墮毁也抗舉也剄割剄也豈有異秦之季世乎夫以天子之位乗今之時因天之助尚憚以危為安以亂為治假設陛下居齊桓之處將不合諸侯而匡天下乎臣又知陛下有所必不能也假設天下如曩時淮隂侯尚王楚黥布王淮南彭越王梁韓信王韓張敖王趙貫髙為相盧綰王燕陳豨在代令此六七公者皆亡恙當是時而陛下即天子位能自安乎臣有以知陛下之不能也天下淆亂髙皇帝與諸公併起非有仄室之勢以豫席之也禮卿大夫之支子為仄室席藉也言非有仄室之勢為之資藉也諸公幸者乃為中涓其次厪得舍人厪言纔得舍人材之不逮至逺也髙皇帝以明聖威武即天子位割膏腴之地以王諸公多者百餘城少者乃三四十縣徳至渥也渥厚也然其後十年之間反者九起陛下與諸公非親角材而臣之也又非身封王之也自髙皇帝不能以是一嵗為安故臣知陛下之不能也然尚有可諉者曰疏諉者託也尚可託言信越等以疏故反其下句曰臣請試言其親者親者亦恃强為亂明信等不以疏也臣請試言其親者假令悼惠王王齊元王王楚中子王趙幽王王淮陽共王王梁靈王王燕厲王王淮南六七貴人皆亡恙當是時陛下即位能為治乎臣又知陛下之不能也若此諸王雖名為臣實皆有布衣昆弟之心慮亡不帝制而天子自為者慮大計也諸侯皆欲同皇帝之制度而為天子之事擅爵人赦死罪甚者或戴黄屋漢法令非不行也雖行不軌如厲王者令之不肯聼召之安可致乎幸而來至法安可得加動一親戚天下圜視而起圜睛正視言驚愕也陛下之臣雖有悍如馮敬者馮無擇子名忠直為御史大夫奏淮南厲王誅之適啓其口匕首已䧟其匈矣始欲設官節制諸侯王則為刺客所殺陛下雖賢誰與領此故疏者必危親者必亂已然之效也其異姓負强而動者漢已幸勝之矣又不易其所以然同姓襲是迹而動既有徴矣其埶盡又復然殃禍之變未知所移明帝處之尚不能以安後世將如之何屠牛坦一朝解十二牛坦屠牛者之名也事見管子而芒刅不頓者芒刅謂刅之利如毫芒也所排撃剥割皆衆理解也至於髖髀之所非斤則斧髀股骨也髖髀大也言其骨大故須斤斧也夫仁義恩厚人主之芒刅也權勢法制人主之斧斤也今諸侯王皆衆髖髀也釋斤斧之用而欲嬰以芒刅臣以為不缺則折胡不用之淮南濟北勢不可也臣竊迹前事大抵强者先反淮隂王楚最强則最先反韓信倚胡則又反貫髙因趙資則又反陳豨兵精則又反彭越用梁則又反黥布用淮南則又反盧綰最弱最後反長沙廼在二萬五千户耳功少而最完勢疎而最忠非獨性異人也亦形勢然也曩令樊酈綘灌據數十城而王今雖以殘亡可也令信越之倫列為徹侯而居雖至今存可也然則天下之大計可知己欲諸王之皆忠附則莫若令如長沙王欲臣子勿菹醢則莫若令如樊酈等欲天下之治安莫若衆建諸侯而少其力力少則易使以義國小則亡邪心令海内之勢如身之使臂臂之使指莫不制從諸侯之君不敢有異心輻輳並進而歸命天子雖在細民且知其安故天下咸知陛下之明割地定制令齊趙楚各若干國使悼惠王幽王元王之子孫畢以次各受祖之分地地盡而止及燕梁他國皆然其分地衆而子孫少者建以為國空而置之須其子孫生者舉使君之諸侯之地其削頗入漢者為徙其侯國及封其子孫也徙其侯國列侯國邑在諸侯王封内而犬牙相入者則正其疆界令其隔絶也封其子孫者分諸侯王之國邑各自封其子孫而受封之人若有罪黜其地皆入於漢故云頗入也所以數償之一寸之地一人之衆天子亡所利焉償者謂所正列侯疆界有侵諸侯王者則漢償之誠以定治而已故天下咸知陛下之廉地制一定宗室子孫莫慮不王慮計也下無倍畔之心上無誅伐之志故天下咸知陛下之仁法立而不犯令行而不逆貫髙利㡬之謀不生柴竒開章之計不萌柴竒開章皆與淮南王謀反者也細民鄉善大臣致順故天下咸知陛下之義卧赤子天下之上而安植遺服朝委裘而天下不亂置遺服朝委裘皆未有所知也委裘若容衣天子未坐朝事先帝裘衣也當時大治後世誦聖一動而五業附陛下誰憚而久不為此天下之勢方病大瘇腫足曰瘇一脛之大㡬如要一指之大㡬如股平居不可屈信一二指慉身慮亡聊慉謂動而痛也聊頼也失今不治必為錮疾錮疾堅久之疾後雖有扁鵲不能為己病非徒瘇也又苦􅏓盭足下曰􅏓今所呼脚掌是也言足􅏓反戾不可行也元王之子帝之從弟也楚元王髙帝之弟其子於文帝為從弟今之王者從弟之子也惠王親兄子也今之王者兄子之子也惠王齊悼惠王親者或亡分地以安天下疏者或制大權以偪天子臣故曰非徒病瘇也又苦􅏓盭可痛哭者此病是也天下之勢方倒縣凡天子者天下之首何也上也蠻夷者天下之足何也下也今匈奴嫚侮侵掠至不敬也為天下患至亡己也而漢嵗致金絮采繒以奉之夷狄徴令是主上之操也徴召也令號令也操謂主上之所操持也天子共貢是臣下之禮也足反居上首顧居下顧亦反也言如人反顧然倒縣如此莫之能解猶為國有人乎顛倒如此而不能解救豈謂國有明智之人乎非但倒縣而已又類辟且病痱辟足病痱風也夫辟者一面病痱者一方痛今西邊北邊之郡雖有長爵不輕得復長爵髙爵也雖受髙爵之賞猶將禦冦不得復除逸豫也不易得復除言難也五尺以上不輕得息五尺謂小兒也斥候望烽燧不得臥邊方備胡冦作髙櫓上作桔橰頭兠零以薪草置其中嘗抵之有㓂即火然舉之以相告曰烽又多積薪冦至即然之以望其煙曰燧晝則燔煙夜則舉烽將吏被介胄而睡臣故曰一方病矣醫能治之而上不使可為流涕者此也陛下何忍以皇帝之號為戎人諸侯勢既卑辱而禍不息長此安窮進謀者率以為是固不可解也亡具甚矣臣竊料匈奴之衆料量也音聊不過漢一大縣以天下之大困於一縣之衆甚為執事者羞之陛下何不試以臣為屬國之官以主匈奴行臣之計請必繫單于之頸而制其命伏中行説而笞其背説奄人也漢使送公主妻匈奴説不肯行强之因以漢事告匈奴也舉匈奴之衆唯上之令今不獵猛敵而獵田彘不摶反㓂而摶畜莬翫細娯而不圖大患非所以為安也徳可逺施威可逺加而直數百里外威令不信可為流涕者此也今民賣僮者僮謂𨽻妾也為之綉衣絲履偏諸縁偏諸若今之織成以為要襻及褾領者也古謂之車馬君言其上為乘車及騎從之象也内之閑中閑賣奴婢闌也是古天子后服所以廟而不宴者也入廟則服之宴處則不着葢貴之也而庻人得以衣婢妾白縠之表薄紈之裏緶以偏諸謂以偏諸緶之也美者黼繡黼者織為斧形繡者刺為衆文是古天子之服今富人大賈嘉㑹召客者以被墻古者以奉一帝一后而節適得其節而合宜今庻人屋壁得為帝服倡優下賤得為后餙然而天下不屈者殆未有也且帝之身自衣皂綈而富民墻屋被文繡天子之后以縁其領庻人嬖妾縁其履此臣所謂舛也夫百人作之不能衣一人欲天下亡寒胡可得也一人耕之十人聚而食之欲天下亡饑不可得也饑寒切於民之肌膚欲其亡為姦邪不可得也國已屈矣盗賊直須時耳然而獻計者曰毋動為大耳好為大語者夫俗至大不敬也至亡等也至冒上也進計者猶曰毋為可為長太息者此也商君遺禮義棄仁恩并心於進取行之二嵗俗日敗故秦人家富子壯則出分家貧子壯則出贅贅婿也其不出妻家猶人身體之有疣贅借父耰鉏慮有徳色耰摩田器也言以耰及鉏借與其父而容色自矜為恩徳也母取箕箒立而誶語誶責讓也抱哺其子與公併倨言婦抱子而哺之乃與其舅併倨無禮之甚也婦姑不相説則反唇而相稽稽計也相與計較也其慈子嗜利不同禽獸者亡㡬耳然并心而赴時猶日蹶六國兼天下蹶謂技而取之功成求得矣終不知反廉愧之節仁義之厚信併兼之法遂進取之業天下大敗衆掩寡智欺愚勇威怯壯陵衰其亂至矣是以大賢起之威震海内徳從天下大賢謂髙祖也徳從天下天下從其徳曩之為秦者今轉而漢矣然其遺風餘俗猶尚未改今世以侈靡相競而上亡制度棄禮義捐廉恥日甚可謂月異嵗不同矣逐利不耳慮非顧行也言其所追赴惟計利不耳念慮之中非顧行之善惡今其甚者殺父兄矣盗者剟寢戸之簾剟謂割求之也搴兩廟之器搴取也兩廟髙祖惠帝廟也白晝大都之中剽吏而奪之金矯偽者出㡬十萬石粟言詐為文書以出倉粟近十萬石耳賦六百餘萬錢乗傳而行郡國言矯偽之人詐為詔令妄作賦斂其數甚多又詐乗傳而行郡國此其亡行義之尤至者也而大臣特以簿書不報期㑹之間以為大故特徒也言公卿大夫徒以簿書期㑹而不知正風俗厲行義也至於俗流失世壊敗因恬而不知怪慮不動於耳目以為是適然耳夫移風易俗使天下回心而鄉道類非俗吏之所能為也俗吏之所務在於刀筆箱篋刀所以削書札箱篋所以盛書而不知大體竊為陛下惜之夫立君臣等上下使父子有禮六親有紀此非天之所為人之所設也夫人之所設不為不立不植則僵不修則壊管子曰禮義廉恥是謂四維四維不張國乃㓕亡使管子愚人也則可管子而少知治體則是豈可不為之寒心哉秦㓕四維而不張故君臣乖亂六親殃戮姦人並起萬民離叛凡十三嵗而社稷為虛虛謂丘墟今四維猶未備也故姦人㡬幸而衆心疑惑豈如今定經制令君君臣臣上下有差父子六親各得其宜姦人亡所㡬幸而羣臣衆信上不疑惑此業一定世世常安而後有所持循矣若夫經制不定是猶渡江河亡維楫中流而遇風波舩必覆矣可為長太息者此也夏為天子十有餘世而殷受之殷為天子二十餘世而周受之周為天子三十餘世而秦受之秦為天子二世而亡人性不甚相逺也何三代之君有道之長而秦無道之暴也其故可知也古之王者太子廼生固舉以禮廼始也使士負之有司齋肅端冕見之南郊見於天子過闕則下過廟則趨孝子之道也故自為赤子而教固已行矣昔者成王幼在襁褓之中召公為太保周公為太傅太公為太師保保其身體傅傅之徳義師道之教訓此三公之職也於是為置三少皆上大夫也曰少保少傅少師是與太子宴者也故廼孩提有識三公三少固明孝仁禮義以道習之逐去邪人不使見惡行於是皆選天下之端士孝悌博聞有道術者以衛翼之使與太子居處出入故太子廼生而見正事聞正言行正道左右前後皆正人也夫習與正人居之不能毋正猶生長於齊不能不齊言也習與不正人居之不能毋不正猶生長於楚之地不能不楚言也故擇其所嗜必先受業乃得嘗之擇其所樂必先有習廼得為之孔子曰少成若天性習貫如自然及太子少長知妃色妃色妃匹之色則入于學學者所學之官也官謂官舍學禮曰帝入東學上親而貴仁則親疎有序而恩相及矣帝入南學上齒而貴信則長幼有差而民不誣矣帝入西學上賢而貴徳則聖智在位而功不遺矣帝入北學上貴而尊爵則貴賤有等而下不踰矣帝入大學承師問道退習而考於太傅太傅罰其不則而救其不及則徳智長而治道得矣五學者既成於上則百姓黎民化輯於下矣及太子既冠成人免於保傅之嚴則有記過之史徹膳之宰進善之旌誹謗之木敢諌之鼓瞽史誦詩工誦箴諌大夫進謀士傳民語習與智長故切而不愧化與心成故中道若性三代之禮春朝朝日秋暮夕月所以明有敬也春秋入學坐國老執醬而親餽之所以明有孝也行以鸞和鸞和車上鈴也歩中采齊樂詩名趣中肆夏亦樂詩名趣疾歩也所以明有度也其於禽獸見其生不忍其死聞其聲不食其肉故逺庖厨所以長恩且明有仁也夫三代之所以長久者以其輔翼太子有此具也及秦而不然其俗固非貴辭讓也所上者告訐也訐謂互相斥罪也固非貴禮義也所上者刑罰也使趙髙𫝊胡亥而教之獄所習者非斬劓人則夷人之三族也故胡亥今日即位而明日射人忠諌者謂之誹謗深計者謂之妖言其視殺人若刈草菅然菅茅也豈惟胡亥之性惡哉彼其所以道之者非其理故也鄙諺曰不習為吏視已成事又曰前車覆後車誡夫三代之所以長久者其已事可知也然而不能從者是不法聖智也秦世之所以亟絶者其轍迹可見也然而不避是後車又將覆也夫存亡之變治亂之機其要在是矣天下之命縣於太子太子之善在於早諭教與選左右與猶及也夫心未濫而先諭教則化易成也開於道術智誼之指則教之力也若其服習積貫則左右而已夫胡粤之人生而同聲嗜欲不異及其長而成俗累數譯而不能相通行者有雖死而不相為者則教習然也臣故曰選左右早諭教最急夫教得而左右正則太子正矣太子正而天下定矣書曰一人有慶兆民賴之此時務也凡人之智能見已然不能見將然夫禮者禁於將然之前而法者禁於己然之後是故法之所用易見而禮之所為難知也若夫慶賞以勸善刑罰以懲惡先王執此之政堅如金石行此之令信如四時據此之公無私如天地耳豈顧不用哉顧猶反也然而曰禮云禮云者貴絶惡於未萌而起教於微𦕈使民日遷善逺罪而不自知也孔子曰聼訟吾猶人也必也使無訟乎為人主計者莫如先審取舍取舍之極定於内而安危之萌應於外矣安者非一日而安也危者非一日而危也皆以積漸然不可不察也人主之所積在其取舍以禮義治之者積禮義以刑罰治之者積刑罰刑罰積而民怨背禮義積而民和親故世主欲民之善同而所以使民善者或異或道之以徳教或敺之以法令道之以徳教者徳教洽而民氣樂敺之以法令者法令極而民風衰衰樂之感禍福之應也秦王之欲尊宗廟而安子孫與湯武同然而湯武廣大其徳行六七百嵗而弗失秦王治天下十餘嵗則大敗此無他故矣湯武之定取舍審而秦王之定取舍不審矣夫天下大器也今人之置器置諸安處則安置諸危處則危天下之情與器亡以異在天子之所置之湯武置天下於仁義禮樂而徳澤洽禽獸草木廣裕徳被蠻貊四夷累子孫數十世此天下所共聞也秦王置天下於法令刑罰徳澤亡一有而怨毒盈於世下曽惡之如仇讎禍㡬及身子孫誅絶此天下之所共見也是非其明效大驗邪人之言曰聼言之道必以其事觀之則言者莫敢妄言今或言禮義之不如法令教化之不如刑罰人主胡不引殷周秦事以觀之也人主之尊譬如堂羣臣如陛衆庻如地故陛九級上廉逺地則堂髙陛亡級廉近地則堂卑髙者難攀卑者易陵理勢然也故古者聖王制為等列内有公卿大夫士外有公侯伯子男然後有官師小吏官師一官之長延及庻人等級分明而天子加焉故其尊不可及也里諺曰欲投䑕而忌器此善諭也䑕近於器尚憚不投恐傷其器况於貴臣之近主乎廉恥節禮以治君子故有賜死而亡戮辱是以黥劓之罪不及大夫以其離主上不逺也禮不敢齒君之路馬蹴其芻者有罰見君之几杖則起遭君之乗車則下入正門則趨君之寵臣雖或有過刑罰之罪不加其身者尊君之故也此所以為主上豫逺不敬也逺離也所以體貎大臣而厲其節也體貌謂加禮容而敬之今自王侯三公之貴皆天子之所改容而禮之也古天子之所謂伯父伯舅也而令與衆庻同黥劓髠刖笞傌棄市之法然則堂不亡陛乎被戮辱者不泰迫乎迫迫天下也廉恥不行大臣無廼握重權大官而有徒𨽻亡恥之心乎夫望夷之事二世見當以重法者投䑕而不忌器之習也臣聞之履雖鮮不加於枕冠雖敝不以苴履苴者履中之藉也夫嘗已在貴寵之位天子改容而體貎之矣吏民嘗俯伏以敬畏之矣今而有過帝令廢之可也退之可也賜之死可也㓕之可也若夫束縛之繫緤之緤謂以長繩繫之也輸之司冦編之徒官司冦小吏詈罵而榜笞之殆非所以令衆庻見也夫卑賤者習知尊貴者之一旦言知其有一旦之刑吾亦廼可以加此也非所以習天下也非尊尊貴貴之化也夫天子之所嘗敬衆庻之所嘗寵死而死耳賤人安得如此而頓辱之哉豫讓事中行之君智伯伐而㓕之移事智伯及趙㓕智伯豫讓釁面吞炭釁熏也以毒藥熏之必報襄子五起而不中人問豫子豫子曰中行衆人畜我我故衆人事之智伯國士遇我我故國士報之故此一豫讓也反君事讎行若狗彘已而抗節致忠行出乎烈士人主使然也故主上遇其大臣如遇犬馬彼將犬馬自為也如遇官徒彼將官徒自為也頑頓亡恥呰詬亡節廉恥不立且不自好茍若而可若猶然也故見利則逝見便則奪逝徃也主上有敗則因而挺之矣主上有患則吾茍免而已立而觀之耳有便吾身者則欺賣而利之耳人主將何便於此羣下至衆而主上至少也所託財器職業者粹於羣下也粹純也言其勢悉在羣下俱亡恥俱茍妄則主上最病故古者禮不及庻人刑不至大夫所以厲寵臣之節也古者大臣有坐不廉而廢者不謂不廉曰簠簋不飾坐汚穢淫亂男女亡别者不曰汚穢曰帷簿不修坐罷軟不勝任者不謂罷軟曰下官不職故貴大臣定有其罪矣猶未斥然正以謼之也尚遷就而為之諱也故其在大譴大訶之域者訶問也聞譴訶則白冠氂纓以毛作纓白冠喪服也盤水加劒造請室而請罪耳請室請罪之室胡公漢官車駕出有請室令在前先驅比官有别獄也加劒當以自刎也或曰殺牲者以盤水眀頸血故示若此也上不執縛繫引而行也其有中罪者聞命而自弛中罪非大非小也弛廢也自廢而死上不使人頸盭而加也不戾其頸而親加刀鋸也其有大罪者聞命則北面再拜跪而自裁上不使捽抑而刑之也捽持頭髪也曰子大夫自有過耳吾遇子有禮矣遇之有禮故羣臣自憙嬰以廉恥故人矜節行上設廉恥禮義以遇其臣而臣不以節行報其上者則非人類也故化成俗定則為人臣者主耳忘身國耳亡家公耳忘私利不茍就害不茍去惟義所在上之化也故父兄之臣誠死宗廟法度之臣誠死社稷輔翼之臣誠死君上守圄捍敵之臣誠死城郭封疆故曰聖人有金城者比物比志也言聖人厲此節行以御羣下則人皆懐徳戮力同心國家安固不可毁狀若金城也彼且為我死故吾得與之俱生彼且為我亡故吾得與之俱存夫將為我危故吾得與之俱安顧行而忘利守節而仗義故可以託不御之權可以寄六尺之孤此厲廉恥行禮誼之所致也主上何喪焉此之不為而顧彼之久行顧反也言何不為投䑕忌器之法而反久行無陛級之事故曰可為長太息者此也是時丞相綘侯周勃免就國人有告勃謀反逮繫長安獄治卒亡事復爵邑故賈誼以此譏帝帝深納其言養臣下有節是後大臣有罪皆自殺不受刑初文帝自代王入即位後分代為兩國立皇子武為代王參為太原王小子勝則梁王矣後又徙代王武為淮陽王而太原王參為代王盡得故地居數年梁王勝死亡子誼復上疏曰陛下即不定制如今之勢不過一傳再傳一世再世也諸侯猶且人恣而不制豪植而大疆植立也漢法不得行矣陛下所以為藩扞及皇太子之所恃者惟淮陽代二國耳藩翰得宜則嗣主安國故云皇太子之所恃也伐北邊匈奴其彊敵為鄰能自完則定矣而淮南之比大僅能如黒子之著面黒子今所謂黶子也適足以餌大國耳餌謂為其所吞食不足以有所禁禦方今制在陛下制國而令子適足以為餌豈謂工哉人主之行異布衣布衣者飭小行競小廉以自託於鄉黨人主惟天下安社稷固不耳髙皇帝𤓰分天下以王功臣反者如蝟毛而起蝟蟲名也其毛為刺以為不可故蔪去不義諸侯而虛其國不義謂諸侯彭越黥布等蔪謂芟刈之擇良日立諸子雒陽上東門之外諸侯皆在闗東故於東門外立之也東面最北出門曰上東門畢以為王畢猶盡而天下安故大人者不牽小行以成大功今淮南地逺者或數千里越兩諸侯越過也兩諸侯梁及淮陽而縣屬於漢為縣而屬於漢其使民繇役徃來長安者自悉而補中道衣敝悉盡也錢用諸費稱此其若屬漢而欲得王至甚逋逃而歸諸侯者已不少矣其埶不可久臣之愚計願舉淮南地以益淮陽而為梁王立後割淮陽北邊二三列城列城縣也與東郡以益梁不可者可徙代王而都淮陽梁起於新郪以北著之河新郪潁川縣也淮陽包陳以南揵之江包取也揵謂立封界也則大諸侯之有異心者破膽而不敢謀梁足以扞齊趙淮陽足以禁呉楚陛下髙枕終亡山東之憂矣此二世之利也言帝享及太子嗣位之時當今恬然適遇諸侯之皆少恬安也少謂年少數嵗之後陛下且見之矣夫秦日夜苦心勞力以除六國之禍今陛下力制天下頥指如意但動頥指麾則所欲皆如其意也髙拱以成六國之禍難以言智茍身忘事畜亂宿禍孰視而不定萬年之後傳之老母弱子將使不寧不可謂仁臣聞聖主言問其臣而不自造事欲發言則問其臣故使人臣得畢其愚忠惟陛下財幸財與裁同裁擇而幸從其言文帝於是從誼計廼徙淮陽王武為梁王北界秦山西至髙陽得大縣四十餘城徙陽城王喜為淮南王撫其民時又封淮南厲王四子皆為列侯誼知上必將復王之也上疏諌曰竊恐陛下接王淮南諸子謂接今時當即王之言不久也接猶續也猶今人言續復爾曽不與如臣者熟計之也淮南王之悖逆無道天下孰不知其罪悖惑也陛下幸而赦遷之自疾而死天下孰以王死之不當今奉尊罪人之子適足以負謗於天下耳言若尊王其子則是厲王無罪漢枉殺之此人少壯豈能忘其父哉少壯猶言稍長大白公勝所為父報讐者大父與伯父叔父也白公是平王之孫太子建之子也大父即祖為平王也伯父叔父平王諸子也白公為亂非欲取國伐主發忿快志剡手以衝仇人之匈剡利也固為俱靡而已言與仇人俱㓕斃死靡也淮南雖小黥布嘗用之矣漢存特幸耳言漢之勝布得存此直天幸耳夫擅仇人足以為漢之資於䇿不便言假四子以資權則當危漢雖割而為四四子一心也予之衆積之財此非有子胥白公報於廣都之中即疑有剸諸荆軻起於兩社之間剸諸刺呉王荆軻刺秦王所謂假賊兵為虎翼者也周書云無為虎傳翼將飛入邑擇人而食之願陛下少留計册府元龜卷五百三十四
