body:
  text: 册府元龜卷九百二十四宋王欽若等撰總録部傾險詐偽飾非傾險言偽行僻色厲内荏傾險之謂也故不畏不義著之於前聞難養難近垂之於往典盖人禀五行之秀最萬物之靈守正不回去惡務夲斯可謂之君子矣乃有疾賢務進附勢取容乘隙以為姦掠羙以沽譽或縱其闗説之辯或極其諂諛之態或搆之飛語以害忠良或寘之深文以報仇怨以至飜覆靡定計數叵測為鬼為蜮如谿如壑歴代而下實繁有徒非聰明睿哲之主安能察而遠之哉漢主父偃為中大夫㑹遼東髙廟長陵髙園殿災董仲舒居家推説其意屮槀未上屮古草字謂初起草為槀也主父偃候仲舒私見嫉之竊其書而奏焉帝召視諸儒視讀曰示仲舒弟子吕歩舒不知其師書以為大愚於是下仲舒吏當死詔赦之仲舒遂不敢復言災異鄭朋㑹稽人元帝即位前将軍蕭望之光禄勲周堪輔政朋隂欲附望之上疏言車騎将軍史高遣客為姦利郡國及言許史子弟罪過章視周堪視讀曰示以朋所奏之章示堪也堪白令朋待詔金馬門朋奏記望之曰将軍體周召之徳秉公綽之質有卞荘之威周謂周公旦召謂召公奭公綽孟公綽也卞荘子魯卞邑大夫也至乎耳順之年履折衝之位號至将軍誠士之髙致也窟穴黎庶莫不懽喜咸曰将軍其人也國家委任誠得其人也今将軍規橅云若管晏而休遂行曰仄至周召乃留乎謂望之立意當趣如管晏而止為欲恢廓其道日仄不食追周召之蹟然後已乎橅讀曰模其字從木若管晏而休則下走将歸延陵之臯呉公子札食延陵薄呉王之行弃國而耕臯澤朋云望之所為若但如管晏則不䖏漢朝将歸㑹稽尋延陵之軌耕臯澤之中也下走者自謙言趋走之役也修農圃之疇畜鷄種黍竢見二子沒齒而已矣子路從孔子而後遇丈人以杖荷篠止子路宿殺鷄為黍而食之見其二子焉明日子路行以告子曰隐者也使子路反見之至則行矣朋之所云盖謂此也竢古俟待也沒齒終身也篠草器也音徒吊反如将軍昭然度行積思塞邪枉之險蹊宣中庸之常政度行度越常檢而為髙行也蹊徑謂道也音奚興周召之遺業親日仄之兼徳則下走其庶㡬願竭區區底厲鋒鍔奉萬分之一望之見納朋接待以意與之相見納其説也數稱述望之短車騎将軍史髙短謂毁其短惡也言許史過失後朋行傾邪望之絶不與通朋與大司農史李宫俱待詔堪獨白宫為黄門郎朋楚士怨恨朋㑹稽人㑹稽并屬楚楚人脆急也更求入許史推所言許史事曰皆周堪劉更生教我我闗東人何以知此於是侍中許章白見朋朋出揚言曰我見言前将軍小過五大罪一中書令在旁知我言状望之聞之以問𢎞恭石顯恭顯恐望之自訟下於它吏即挾朋及待詔華龍龍者宣帝時與張子蟜等待詔蟜巨繇反字或作僑以行汚濊不進濊與穢同欲入堪等不納故與朋相結恭顯令二人告望之等謀欲罷車騎将軍疏退許史状恭顯奏望之堪更生朋黨相稱舉收望之前将軍光禄勲印綬及堪更生皆免為庶人而朋為黄門郎後漢辛臣田戎之妻兄也初岑彭圍秦豐於黎丘時田戎擁衆夷陵聞秦豐被圍懼大兵方至欲降而妻兄辛臣諫戎曰今四方豪傑各據郡國雒地如掌耳不如按甲以觀其變戎曰以秦王之彊猶為征南所圍豈况吾邪降計决矣建武四年春戎乃留辛臣守夷陵自将兵㳂江泝沔止黎丘刻期曰當降而辛臣於後盗戎珍寳從間道先降於彭而書以招戎戎心疑賣已遂不敢降崔酺為侍中時尚書有缺詔将大夫六百石以上試對政事天文道術以髙第者補之酺自恃能髙而忌故太史令孫懿恐其先用乃往候懿既坐言無所及唯涕泣流漣懿恠而問之酺曰圖事有漢賊孫登将以才智為中官所害觀君表相似慮應之酺受㤙接悽愴君之禍耳懿憂懼移病不試繇是酺對第一拜尚書晋牽秀為司空張華長史㑹張昌作亂秀因奔成都王頴頴伐長沙王又以秀為冠軍将軍陸機王粹等共為河橋之役機戰敗秀證成其罪又諂事黄門孟玖故見親於頴虞預為著作郎私撰晋書而生長東南不知中朝事訪於著作郎王隠并借隐所著書竊寫之所聞漸廣是後更疾隐形于言色預既豪族交結權貴共為朋黨以斥隐竟以謗免黜歸于家袁悦之能長短説甚為㑹稽王道子所親愛每勸道子専攬朝權道子頗納其説俄而見誅王國寳累至侍中中書令太傅謝安之女壻也國寳専利無檢行安惡其為人每抑制之及孝武末年嗜酒好肉而㑹稽王道子昏醟尤甚惟狎昵諂邪於是國寳䜛諛之計稍行于主相之間而好利險詖之徒以安功名盛極而搆㑹之嫌隙遂成又云國寳大無士操不修亷隅妻父謝安惡其傾側每抑而不用周禮字宣季性矜儉好利外方内荏少以豪右自䖏後為㑹稽太守被殺宋王華為太祖鎮西主簿太祖未親政事悉委司馬張劭華性尚物不欲人在已前邵性豪每行嘗引采轂華出入乘牽車從者不過二三以矯之嘗於城内相逢華陽若不知是邵謂左右曰此鹵簿甚盛必是殿下出乃下牽車立於道側及邵至乃驚邵白服登城為華所紏坐被徴革代為司馬南郡太守行府州事劉湛為領軍将軍又領詹事時彭城王義康専秉朝政而湛昔為上佐遂委心自結而殷景仁獨歩當時初湛方謀傾景仁湛黨劉敬文父成未悟其機詣景仁求郡敬文遽往謝湛曰老父悖耄遂就殷鉄干禄由敬文闇淺上負生成合門慙懼無地自䖏敬文之姦諂如此劉瑀字茂琳初為始興王濬南徐州别駕從事史為濬所遇瑀性陵物䕶前不欲人居己上時濬征北府行叅軍呉郡顧邁輕薄而有才能濬待之甚厚深言宻事皆與叅之瑀乃折節事邁深布情欵家内婦人間事言語所不得至者莫不倒寫備説邁以瑀與之欵盡深相感信濬所言宻事悉以語瑀與邁共進射堂下瑀忽顧左右索衣幘邁問其所以瑀曰公以家人待卿相與言無所隐而卿於外宣泄致使人無不知我是公吏何不得不啟因而白之濬大怒啟文帝徙邁廣州後魏髙聦為散騎常侍黄門侍郎初趙修之任勢聦傾身事之及修之死言必毁惡茹皓之寵聦又媚附每相招命言笑擕撫公私託仗無所不至每稱皓才識明敏非趙修之儔乃因皓啟請青州鎮下治中公廨以為私宅又乞水田數十頃皆被遂許及皓見戮聦以為死之晚也其薄於情類皆如此聰善於去就知髙肇嫌之側身承奉肇遂待之如舊北齊温子昇為文襄大将軍諮議叅軍文襄疑子昇知元僅等作亂餓死晋陽獄子昇恬静與物無競言有凖的外不妄毁譽而内深險臨事之際好預其間所以終至禍敗鄭子黙史不載其官文宣怒臨漳令稽曄及舍人李文師以曄賜薛農浴文師賜崔士順為奴子黙私誘銀青光禄大夫王昕曰自古無朝士作奴昕曰箕子之為奴子黙遂以昕言啟帝乃曰王元景比陛下於殷紂楊愔㣲為之解謂愔曰元景是个博士爾語皆元景所教元景昕字也叚孝言為吏部尚書時祖珽執政将廢趙彦深引孝言為助除侍中入内省典機宻尋除中監加特進又託韓長鸞共搆祖珽之短及珽出後孝言除尚書右僕射魏蘭根為開府儀同三司雖以功名自立然善附㑹出䖏之際多以計數為先是以不為清論所許陳元康為相府功曹叅軍便辟善事人希顔候意多有進舉而不能平心處物後周蘓䕫納言威之子聰敏有口辯然性輕險無行位至通議大夫隋元敏頗才辨而輕險多詐擢守内史舍人而交通博徒數漏洩省中語諸葛頴自煬帝為太子時為藥藏及帝即位遷著作郎甚見親倖頴因閑隙多所譛毁是以時人謂之冶葛唐鄭愔則天時為臨武丞及來俊臣受制按獄志在屠害忠良每有羅織文状宻令愔草定深情致其罪取於俊臣崔湜中宗時為吏部員外郎桓敬之作相也愳武三思䜛間推湜為耳目使伺其動静俄而中宗踈忌功臣於三思㤙寵漸宻湜每得桓敬一言片議皆以報三思及諸公被流湜又説三思宜盡除之以絶歸望三思問誰可使者湜表兄周利貞先為桓敬所惡自侍御史出為嘉州司馬湜舉之既行桓敬等聞利貞至皆自殺三思擢利貞為御史中丞湜後為襄州刺史時譙王重福謫居均州隂懷異志贈湜黄金寳帯帝之為太子有郎李慶逺特承㤙寵頗弄權勢湜以帯餉之㑹慶逺以罪被録觀者怪金帯竒作非人間所有湜宻謂慶逺曰勿欵此帯所求我當使汝無事乃厚賂行笞者兾殺慶逺以㓕口其傾險如此湜謂人曰吾之入門及出身歴官未嘗不為第一丈夫當先據要路以制人豈能黙黙受制於人也是故進趣無已而不以令終顧繇呉人代宗時詣闕獻書稱㫖受京兆府華原縣令性踈狂恃封事可以奏兾有超拜及領華原骯髒音亢音葬不受詔乃訕時政發宰臣元載隂私載稽顙自陳代宗遂怒繇逐為綿州百姓陳少㳺代宗時為宣越揚三鎮觀察初結元載每年饋金帛約十萬貫又多納賄於用事中官賂奉先劉清潭呉承倩等繇是羙聲逹于中禁後見元載在相位年深以過犯漸見疑忌少㳺亦稍踈之無何載子伯和貶官揚州少㳺外與之深交結而隂使人伺其過失宻以上聞代宗以為忠待之益厚令孤峘徳宗時為禮部侍郎有杜封者故相鴻漸之子求補𢎞文生宰相楊炎嘗出杜氏門下託封於峘峘謂使者曰相公誠憐封欲成其名乞署封名下一字峘因得以記焉炎不意峘之賣已乃署名託峘明日流言宰相炎廹臣以私臣從之則負陛下不從則炎當害臣徳宗以問炎炎具道所以徳宗怒曰此奸人不可柰欲杖殺之炎救解乃出為衡州别駕竇羣憲宗時為吏部郎中宰相武元衡李吉甫皆愛重之未㡬拜御史中丞後與吕温羊士諤等黨比欲陷吉甫為客管經畧使在鎮二年詔遣至衡州病卒羣性險狠頗務㤙讐臨事不顧死生初詔徴将大用衆情駭及卒衆乃安方穆宗時為和王傅㑹元稹作相欲以竒策平河朔羣盗方以䇿畫干稹而李逢吉之黨欲傾裴度乃令人告稹欲結客刺度事下法司按鞫無状而方竟坐誅後唐孔謙荘宗同光初為租庸副使謙夲州之幹吏上自天祐十二年帝平定魏博㑹計皆委制置謙能曲事權要効其才力帝委以泉貨之務設法箕斂七八年間軍儲獲濟及帝即位於鄴城謙已當為租庸使物議以謙雖有經營濟贍之勞然人地尚卑不欲驟總重任樞宻使郭崇韜舉魏博觀察判官張憲為租庸使以謙為副謙悒然不樂者久之帝既平梁汴謙徑自魏州馳之行在因謂崇韜曰魏都重地湏大臣弹壓以謙籌之非張憲不可崇韜以為忠告即奏憲為鄴都留副守乃命宰臣豆盧革専判租庸謙彌失望乃尋革過失時革以手書便省庫錢數十萬謙以手書示崇韜㣲諷聞於革革懼上表請崇韜専其事崇韜亦辭避帝問當委何人為可崇韜曰孔謙雖久掌貨泉然物議未嘗居大任以臣所見却委張憲為便帝促徴之憲性精辨為趨時者所忌人不祐之謙乘間訴於豆盧革曰租庸錢榖悉在眼前委一小吏可辦鄴都夲根之地不可輕付於人與唐尹王正言無禆益之才徒有獨行詔書既徴張憲復以何人為代豆盧革言於崇韜崇韜曰鄴都分司列職皆主上舊人委王正言何慮不辦革曰俱是失也設不獲已以正言掌租庸取書於大臣或可辨矣若付之方靣必敗人事謙以正言非徳非勲懦而易制曰此議為便然非己志尋掎正言之失泣訊於崇韜厚賂閹伶以求進用人知奸諂沮之乃上章請退帝怒其規避将寘於法樂人景進於帝前解喻而止王正言風病恍惚不能綜三司事景進屢言於帝乃以正言守禮部尚書以謙為租庸使晋張彭常山九門人少不知書始為公府通贊遂假州縣後唐荘宗改鎮州為北都以任圜為真定尹兼知管内戎事則以彭為留守推官事無巨細悉訪於彭繇是趙之士大夫無得而進彭素貪黷利權所入圜多為所賣及廢都為方正朝廷命樞宻使郭崇韜為節度使遥領之崇韜素愛其地欲歸利私門而彭獻可於圜擇公籍所有多隐之以為他費崇韜深忿其事㑹荘宗平常山時獲趙王鎔家妓千餘使宦者選留百人及送聞有許氏尤色彭賂守者以廢疾匿於僧坊後宫中訪知急召彭赴雒欲害之彭将戒途以前與圜所隐泉貨使人封籍馳白崇韜崇韜乃徳彭而怒圜尋奏解許氏之罪授秘書丞知齊州管田事其險巧多此類也明宗即位以圜為相判三司事圜奏彭守秘書少監度支判官圜竟得罪死於塗陽議者以彭誤敗之所致也近臣安重誨亦云任之過盡繇張彭王瑜天福中為贊善大夫㑹濮陽郡秋稼豐秀税籍不均命乗使車按察定計既至郡謂校簿吏胡藴恵鶚曰余有䖏約之疾室無増貨為我致意縣尹且求假貸於是鄄城令劉承珪濮陽令王傳寳臨濮令曹光裔雷澤令張璿范陽令范臯聚錢五十萬私書而獻瑜以書上奏帝覽稱歎曰亷直清慎尚有如此者誠良臣也二吏五宰即時黜瑜則進位太尉少卿詔書褒羙詐偽先聖有言曰天下之惡有五盗竊不與焉一心逆而險二行僻而堅三言偽而富四記醜而博五順非而澤此皆謂姦宄之徒不免君子之誅也其或矯稱皇嗣虚畵戰圗對稠人而禍吏臨都街而自撻造偽書而取賞傚嘉遁而覬徴至於詐偽外戚則遽列藩宣假于靈草則爰剖符竹罪大而貽神怒惡盈而掛天網至有棄之于市而投之於荒汙彼簡編貽笑後世者矣公孫蠆齊大夫魯昭三年晋韓起如齊逆女為平公逆公孫蠆為少姜之有寵也以其子更公女而嫁公子更嫁公子人謂宣子子尾欺晋晋胡受之宣子曰我欲得齊而逺其寵寵将來乎寵謂子尾臧㑹魯大夫臧昭伯之族也初昭伯如晋臧㑹竊其寳龜僂句僂句龜所出地名以卜為信與僣僣吉僣不信也臧氏老将如晋問問昭伯起居㑹請往代家老行昭伯問家故盡對故事也及内子與母弟叔孫則不對内子昭伯妻一人對若有他故再三問不對及郊㑹逆問又如初又不對至次於外而察之皆無之執而戮之逸奔郈郈魴假使為賈正焉郈在東平無監縣郈魴假郈邑大夫賈正掌貨物使有常價若市利計於季氏送計簿於季氏臧氏五人以戈楯伏諸桐汝之閭桐汝里名㑹出逐之反奔執諸季氏中門之外平怒曰何故以兵入吾門拘臧氏老季臧有要相怨也及昭伯從公平子立臧㑹立以為臧氏後㑹曰僂句不余欺也傳語卜筮之驗善惡繇人漢新垣平趙人以望氣見文帝至上大夫使人持玉杯上書闕下獻之平言帝曰闕下有寳玉氣來者已視之果有獻玉杯者刻曰人主延夀平又言曰臣候日再中居頃之日卻復中於是始更以十七年為元年令天下大酺平言曰周鼎亡在泗水中今河決通於泗臣望東北汾隂有金寳氣汾隂直謂當汾隂也意周鼎其出乎兆見不迎則不至於是帝使使治廟汾隂南臨河欲祠出周鼎人有上書告平所言皆詐也下吏治誅夷平少翁齊人以方見武帝文成將軍言上即欲與神通宫室被服非象神神物不至廼作畵雲車及各㠯勝日甲乙五行相克之日如火勝金用丙丁日不用庚辛日駕車辟惡鬼又作甘泉宫中為臺室畵天地㤗一諸鬼神而置祭具以致天神居嵗餘其方益衰神不至乃帛書以飯牛謂雜草以食牛也音扶晚反陽不知言此牛腹中有竒書殺視得書書言甚怪天子識其手手謂就書手跡問之果偽書于是誅文成将軍欒大膠東人謂王家人也故嘗與文成将軍同師因樂成侯求見言方大為人長羙言多方畧而敢為大言處之不疑乃拜為五利将軍於是嘗夜祀其家欲以下神後治装行東入海求其師而不敢入海之㤗山祠帝使人随騐實無所見五利妄言見其方盡多不讐讐應驗也不讐無騐也帝乃誅五利韓釋之封襄城侯武帝元朔四年詐疾不從耐為𨽻臣陳拾嗣復暘侯卒子彊嗣元狩五年彊坐父拾非嘉子免公孫卿齊人也武帝時稱有禮書曰得寳鼎神册後仙登于天卿因所忠欲奏之所忠視其書不經疑其妄言謝曰寳鼎事已决矣尚何以為謂不湏要言之趙欽者營平侯充國之孫尚敬武公主主亡子主教欽良人習詐有身名他人子欽薨而子岑嗣後習為太夫人岑父母求錢財亡已忿恨相告岑坐非子免國除後漢尹敏為中郎光武令校圗䜟敏因其卦文增之曰君無口為漢輔帝見而怪之召敏問其故敏對曰臣見前人増損圖書敢不自量竊幸萬一帝深非之雖竟不罪而亦以此沉滯盧芳字君期安定三水人也居左谷中王莾時天下咸思漢徳芳繇是詐稱武帝曽孫劉文伯増祖母匈奴谷蠡渾邪王之姊為武帝皇后生三子遭江充之亂太子誅皇后坐死中子次卿亡之長陵小子回卿逃於左谷霍將軍立次卿迎回卿回卿不出因居左谷生子孫卿孫卿生子文伯嘗以是言誑惑安定間向栩性卓詭不倫後時徴拜趙相及之官時人謂其必當脱素従儉而栩更乘鮮車御良馬世疑其始偽魏李豐子韜以選尚公主雖外辭之内不甚惮也晋㑹稽王道子為桓𤣥所害安帝義熈中以臨川王寳子脩之為道子嗣尊妃王氏為太妃義熈中有稱元顯子秀熈避難欒中而至者太妃請以為嗣於是脩之歸於别第宋髙祖意其詐而按驗之果散騎郎滕羡奴勺藥也竟坐棄市太妃不悟哭之甚慟宋何法盛時何髙平郗紹亦作晋中興書數以示法盛法盛有意圗之謂紹曰卿名位貴逹不復俟此延譽我寒士無聞于時如袁宏干寳之徒頼有著述流聲於後宜以為恵紹不與至書成在齋内㕑中法盛詣紹紹不在直入竊書紹還已無復兼夲於是遂行何書王僧達為太子洗馬在東宫愛念軍人朱靈寳及出為宣城靈寳已長僧達詐列死亡寄宣城左求之籍注以為己子改名元序啟太祖以為武陵國典衛令又以補竟陵國典書令建平國中将軍孝建元年春事發加禁固上表陳謝言不能因依左右傾意權貴帝愈怒焉黄回竟陵郡軍人也初為臧質隊主随質於梁山敗走向豫章為臺主軍謝承祖所錄付江州作部卒遇赦得原回因下都於宣陽門與人相打詐稱江夏王義㳟馬客鞭二百付右尚方後魏崔光為車騎大将軍儀同三司光初為黄門則讓宋弁為中書監譲汝南王悦為太常譲劉芳為少傅譲元暉穆紹甄深為國子祭酒讓清河王懌任城王澄為車騎儀同讓江陽王繼又讓靈太后父胡國珍皆願望時清議者以為矯餙曹昇莊帝永安中為大學博士兼尚書郎而嘗徒歩上省以示清貧忽遇盗大失綾縑時人鄙其矯詐綦擕出帝時為左光禄大夫性多詐賀較勝出鎮荆州遇擕别因辭擕母擕故見敗氈弊被勝更遺之錢物山偉前廢帝時為秘書監仍著作郎爾朱兆之入雒官守奔散國史典書髙法顯宻埋史書我不遺落偉自以為仁詐求偉挾附爾朱世隆遂封東阿縣伯而法顯止獲男爵劉仁軌為著作郎兼中書令外示長者内懐矯詐其對賔客破弊席食糲冷菜衣服故敗乃過逼下善候當途能為詭激每於稠人廣衆之中或撾一姦吏縱一孤寡大言自爾炫已髙明矜物無知淺識皆稱其美公能之譽動過其實後周宗懔南陽人仕梁為元帝荆州記室累遷吏部尚書初父髙之先為南臺治書侍御史犯憲懔願父釋罪當終身菜食髙之理雪故懔菜食鄉里稱之元帝府中多言其矯至是大進魚肉國子祭酒沛國劉榖讓之曰夲知卿不忠猶謂卿孝今日便是忠孝並無懔不能對郭賢為車騎大将軍歴廣勲安陵四州刺史衣服飲食雖以儉約自處而居家豐麗室有餘貲時論譏其詐隋劉炫直門下省以待顧問時牛宏奏請購求天下遺逸之書炫遂造書百卷題為連山易魯史記等錄上送官取賞而去後有人訟之經赦免死坐除名歸于家唐杜淹弱冠有羙名與韋福嗣為莫逆之交隋開皇中相與謀曰上好謀遁蘓威以幽人見徴擢居羙職盍效之共入太白山中陽言隠逸隋文帝聞而惡之謫戍江表蘓世長㓜簡率嗜酒無威儀歴官踈猛正諫以直聞及為陜州不能馭㸃部内多犯法世長莫能禁乃責躬引咎自撻於都街五相嫉其詐鞭之見血世長不勝痛大呼而走觀者咸以為笑是後議者乃稱其詐孫承景為監察御史則天萬嵗通天二年承景監清邉軍戰還畵戰圗以奏每陣必畵承景躬當矢石先鋒禦賊之状則天歎曰御史乃能盡誠如此擢拜右肅政臺中丞令侍御史張仁愿叙録承景下立功人仁愿未發都先問承景對陣勝負之状承景身實不行問之皆不能對又虚増功状仁愿庭奏承景罔上之罪於是承景左遷崇令擢仁愿為右肅政臺中丞撿挍幽州都督李子矯𤣥宗開元十四年詐稱皇子入驛居止子矯云生於潞州母曰趙妃生一嵗舅嘗奴擕至雒陽以患目疾不得入門後數嵗遇楊駙馬舅挾出北逰靈夏因至太原今十七嵗太原尹張嵩以聞帝以為矯妄勑嵩杖殺囚下制曰如聞在外諸州多有矯稱勅使詐乘𫝊驛或托採藥物言将貢獻或妄云追人肆行威福如此等色尤湏禁斷若縁别使皆發中使以此叅察固易區分宜令州縣嚴加捉搦勿容漏網蕭文晟詐妄人也元和九年與其黨四人詐稱知内樞宻梁守謙語故涇原節度使蘓光榮子巨論云将拜為節度使許錢六萬貫文為人所告文晟俯伏内决重杖處死巨論流峽州栁泌夲姓楊名仁晝習方術後更姓名動作詐誕自言能致靈藥并黄白術時憲宗末年鋭於服餌詔天下搜訪竒士皇甫鎛李道古乃薦泌及僧大通等待詔翰林憲宗頗竒因盛言天台多霛草群仙所㑹臣嘗知之而力不能致願假郡縣之權以求之憲宗以為然乃授台州刺史賜服金紫或諫曰方士不當假以州郡之政憲宗怒曰煩一郡之力而致神僊不死之事臣下於吾何惜焉繇是不敢復諫泌到州驅使人於山谷間聲言採藥鞭撻惨急嵗餘一無所得懼詐發獲罪遂挈其家潜入山谷夲道觀察使捕之送京師鎛與道古保明其能又詔直翰林院憲宗服泌藥日益躁渴竟為所誤大通自云一百五十嵗有不死藥田佐元鳳翔虢縣人亦自言有竒術能變瓦礫為黄金自白衣授夲縣令其餘皆逓相薦引罔上惑衆故及於罪初栁泌繫於京兆府吏人或問曰何苦虚詐如此泌曰皆道古教我且令我自言四百嵗時人或謂将死自能隐化及解衣就刑訖無他異唯炙灼之痕浹體而已蕭洪者夲代北人父名榮初文宗母蕭太后有一弟在外求訪未獲洪十嵗随商人後為户部茶網賣羅錦於東市估人趙縝為引見於太后姊徐國夫人女壻吕璋因得見夫人云太后之弟夫人亦不能認識帝方穆親以皇太后一弟喜有所得洪以詐御遂見之命為金吾将軍河陽節度等使復為鄜坊節度使先是有自神策軍出為方鎮者軍中多資其行装至鎮三倍償之故有自左軍出為鄜坊者兹錢未償而卒乃徴於洪宰相李訓初知洪非真太后弟洪懼彌縫之乃奏訓兄仲京為從事故洪恃與訓通不與所償又徴於卒者之子洪俾其子以状投訓訓判絶之左軍中尉仇士良衘之有蕭夲者復稱皇太后之弟至是因士良以進遂發其事既而御史臺奏推勘前鄜坊節度使蕭洪詐冒稱皇太后親弟事詔曰蕭洪起自細㣲恣為狡妄假我外家之族冒居元舅之尊累忝重官再叨雄鎮作偽無状從古未聞不處極刑猶為寛典宜長流驩州百姓洪男恪女壻萬縝徐國夫人女壻吕璋竝决杖流嶺南崖象等州洪至中路賜自盡蕭夲故福建人太后有真異母弟孱弱不能自理夲知之就求得其内外族氏名諱上聞復有權倖交證之帝果不疑其詐以為贊善大夫又詔贈其亡曽祖倰太保亡祖聰太傅亡父俊太師曽祖母隴西李氏晋國太夫人亡祖母呉興姚氏楚國太夫人亡母隴西李氏凉國太夫人帝既斥蕭洪而又得蕭夲即謂其真旬月之内賜與巨萬蕭宏泉州晋江縣民也開成二年十月福建觀察使唐扶差人押送宏并男大資稱是國親詔付御史臺勘問御史臺奏蕭宏通欵状詐認太后與節目不同詔令逓歸夲貫仍不用錮身皇太后少離夲家不熟舊事故特宥宏之罪庶獲夲宗開成四年七月癸酉昭義節度使劉從諫上表其畧曰臣聞造偽以亂真者匹夫知之尚不可况天下皆知乎執踈以為親者在匹夫之家尚不可况處大國之朝乎臣受國㤙深奉公心切知有此危安敢不言伏惟皇帝陛下仁及萬方孝敦九族而推心無黨唯理是求㣲臣将以不避直詞切論深事伏見金吾将軍蕭夲稱是皇太后親弟受此官榮今諠然國都殆開藩府自上及下異口同音皆言蕭宏是真而蕭夲為偽臣傍聽衆論遍察羣情咸思發明以正名分今年二月蕭宏忽投臣夲道求臣上聞亦自言比者福建觀察使唐扶及監軍劉行立具審根源已曽論奏其時屬蕭夲得為外戚來自左軍臺司既不敢硏窮聖意遂勒還鄊里自兹議論轉益沸騰臣亦令賛問左軍推論大體而士良推至公之道發不黨之言盖蕭夲自度孤危妄者有憑恃伏以名居國舅位列朝行而真偽不分中外所耻切慮皇太后受此罔惑以有恩情若含垢于一時終取笑于千古伏乞陛下起蕭宏赴闕與夲對推細窮根源以正真偽詔以御史中丞髙元裕刑部侍郎孫簡大理卿崔郇為三司使鞫蕭夲蕭宏之獄十一月乙酉詔曰恭惟皇太后族望逺承齊梁之後僑寓流滯久在閩中慶靈鍾集早歸椒掖終鮮兄弟嘗懐咨嗟朕自臨御以來使遣尋訪冀得諸舅以慰慈顔而奸濫之徒探我情抱因縁州里之近附㑹祖先之名覬幸我國㤙假托我外戚蕭洪之惡跡未逺蕭夲之覆轍相尋宏之夲末尤更乖戾三司推鞫曽無似是之蹤宰臣叅騐甚見難容之状文欵繼入留中久之朕當侍膳之時頗有咨禀恭聞䖏分唯在真實丐沐墜桑旣無可騐鑿空作偽豈得更容㩀其罪状合當極法尚為含忍投之荒徼凡百庶士宜體朕懷蕭夲今宜除名配流愛州蕭𢎞配儋州蕭夲及弟姪男等凡六十並除名流於嶺外家資田産並令沒官前時蕭洪詐稱國舅凡十數年尚授旄鉞寵貴崇極天下之人皆知其偽蕭夲因中尉仇士良為之助遂告洪之詐洪既流殛夲驟歴榮顯曽未周嵗衆知夲亦詐偽蕭宏復告之帝命三司使對鞫得其情實故有是命夲之罪名止於流竄時議以為貸法陳文巨泉州晋江人應鄊貢明經偽稱官階哀帝二年招状罪欵付南河府决重杖一頓䖏死後唐許光義自言禮部侍郎孟容之孫也光義天祐初将同姓人譙縣主簿名銜選授亳州蒙城簿累歴州縣職官蕭康為考城縣令同光二年康偽作嘉禾合穗勒停見任張徳温陜州百姓也徳温詐稱官付河南府處死張演河北轉運司前行也明宗長興元年七月鎮州奏演偽出宣頭支錢三貫令外甥交領又搜得蠟印一靣周李知損為諌議大夫知損除名逓送沙門島知損将行謂所親曰余嘗遇善相者言我三逐之後當入居相位余自此而三矣子姑待我後嵗餘卒於海中其庸誕也如此髙紹基延州節度使髙允權子也允權卒紹基匿喪久之屢奏邉事以要承襲朝廷初聞其喪即令六宅使張仁謙往廵撿紹基不能匿以十五日卒聞丘珣稱前邢州觀察推官廣順二年珣經中書乞官宰臣以此來除任邢州職事無此姓名靣訊之占對失次送開封府鞫問所稱職名及緋魚並虚謬勅杖脊二十長流沙門島歴任官牒並毁之陳權前為㤗州清水縣令廣順二年追奪官牒仍長流房州以權居許州舞陽縣與隣里署争地詐埋石為記及揩改契内文字既伏其罪故有是責李圖廣順三年偽稱莱州别駕配北海縣重役餙非夫言偽而辨雖口給之為能欲盖而彰固心勞而愈拙况夫學古從政委質自公固宜徳以潤身言以顧行改過不吝擇善而從豈有毁信廢忠庸回蒐慝不式典禮怠棄官司任長惡而靡悛但詭辭而自餙君子所以惡利口王者所以逺佞人盖以是夫仲由字子路孔子弟子也子路使子羔為費宰孔子曰賊夫人之子子羔學未熟習而使為政所以為賊害子路曰有民人焉有社稷焉何必讀書然後為學言治民事神於是而習文也亦學子曰是故惡夫佞者疾其口給應遂已非而又無實冉求字子有為季氏宰季氏将伐顓㬰冉有季路見於孔子曰季氏将有事於顓㬰顓㬰伏羲之後風姓之國夲魯之當時臣屬魯季氏貪其土地将伐而取之冉有與季路為季氏臣來告孔子孔子曰求無乃爾是過與冉求為季氏宰相其室為之聚歛孔子疑求教之夫顓㬰昔者先王以為東蒙主使主内祭蒙且在邦域之中矣魯七百之封顓㬰為附庸在其域中是社稷之臣也何以伐為已属魯為社稷之臣何用伐之焉冉有曰夫子欲之吾二臣者謂冉有季路也皆不欲也歸咎於季氏孔子曰求周任有言曰陳力就列不能者止周任古之良史言當陳其才力度已所任以就其位不能則當止危而不持顛而不扶則将焉用彼相矣言輔相人者當能持危扶顛若不能則當止且爾言過矣虎兕出於柙龜玉毁於櫝中是誰之過與柙檻也櫝匱也失虎毁玉豈非典守之過邪冉有曰今夫顓㬰固而近於費固謂城郭完堅兵甲利也費季氏邑今不取後世必為子孫憂孔子曰求君子疾夫疾如汝之言舍曰欲之而必為之辭舍其貪利之説而更作他辭是所疾也季子臯孔子弟子也葬其妻犯人之禾髙子孟氏之邑成宰或氏季犯躓也申祥以告曰請庾之申祥子張子庾償也子臯曰孟氏不以是罪予時借侈朋友不以是棄予言非人故以吾為邑長於斯也買道而葬後難繼也恃寵虐民非也漢主父偃武帝時為中大夫尊立皇后及發燕王定國隂事偃有功焉大臣皆畏其口賂遺累千金或謂偃曰太横矣主父曰臣結髪㳺學四十餘年身不得遂遂猶逹也親不以為子昆弟不收賔客棄我我死日久矣丈夫生不五鼎食死則五鼎亨耳五鼎食牛羊豕魚麋也諸侯五卿大夫三五鼎亨之謂按金之亨殊吾日暮途逺故倒行逆施之莫言齒耳老也倒行逆施謂不遵常禮所行也楊惲丞相敞子也封平通侯為諸吏光禄勲坐事免為庶人惲既失爵位家居治産業起室宅以財自娯嵗餘其友人安定太守西河孫㑹宗知畧士也與惲書諫戒之為言大臣廢退當闔門惶懼為可憐之意闔閉也不當治産業通賔客有稱譽惲宰相子少顯朝廷一朝晻昧語言見廢内懷不服報㑹宗書曰惲材朽行穢文質無所底底致也音之禮反幸賴先人餘業得備宿衛遭遇時變以獲爵位終非其任卒與禍㑹足下哀其愚蒙賜書教督以所不及殷勤甚厚然切恨足下不深惟其終始而猥随俗之毁譽也言鄙陋之愚心若逆指而文過黙而息乎恐違孔氏各言爾志之義後㑹有日食變騶馬猥佐尚書告惲驕奢不悔過日食之咎此人所致章下尉按騐得所與㑹宗書宣帝見而惡之廷尉當惲大逆無道要斬嚴延年字次卿為河南太守與京兆尹張敞善敞治雖嚴然尚頗有縱舍聞延年用刑刻急廼以書諭之曰昔韓盧之取兎也上觀下獲書良犬之取兎仰觀人主之意而獲之諭不妄殺不甚多殺願次卿以緩誅罰思行此術延年報曰河南天下喉咽二周餘氓喉咽言其所在𦂳要猶人體之有喉咽也二周東西周君國也咽一千反莠盛苖穢何可不鋤也莠粃榖所生也苖粟苖也莠音誘自矜伐其能終不衰止原渉字巨先為谷口令後自劾去官郡國諸豪及長安五陵諸為氣節者皆歸慕之渉遂傾身與相待人無賢不肖闐門闐字與賔字同音大千反在所閭里盡滿客或譏渉曰子夲吏二千石之世結髮自修以行喪推財禮讓為名正復讐取仇得不失仁義何故遂自放縱為輕俠之徒應曰子獨不見家人寡婦邪始自約敇之時意乃慕宋伯姬及陳孝婦伯姬魯宣公女嫁於宋恭公恭公卒伯姬寡居至景公時伯姬之宫夜火左右曰夫人少避火伯姬曰婦人之義保傅不離夜不下堂遂見拾火而死陳孝婦者其夫當行戎属孝婦曰幸冇老母吾若不來汝善養我母孝婦曰諾夫果死孝婦養姑愈固其父母将取嫁故欲自殺父母惧而不取遂使養姑淮陽大守以聞朝廷髙其義賜黄金四十斤復之終身號曰孝婦不幸壹為盗賊所汚遂行滛失失讀曰泆知其非禮然不能自還吾猶此矣晋鄧粲長沙人少以髙潔著名南陽劉驎之南郡劉尚公同志友善並不應州郡辟命荆州刺史桓冲卑辭厚禮請粲為别駕粲嘉其好賢乃起應召驎之尚公謂粲曰卿道廣學深衆所推懷忽然改節誠失所望粲笑荅曰足下可謂有志於隠而未知隠夫隠之為道朝亦可隠市亦可隠初在我不在於物尚公等無以難之然粲亦於此名譽减半矣宋周郎孝武時為廬陵内史郡後荒蕪頗有野獸母薛氏欲見獵郎乃合圍縱火令母觀之火遶燒郡廨郎悉以秩米起屋償所燒之限稱疾去官追為州司所糾還都謝孝武曰州司舉臣愆失多有不允臣在郡虎食人䖝䑕犯稼以此二事上負陛下帝變色曰州司不允或可有之䖝虎之災寕闗卿小物王彧字景文明帝時為安南将軍江州刺史景文在江州不能潔已景文與帝幸臣王道隆書曰吾雖寡於行已庶不負心既愧殊效誓不上欺明主竊聞有為其貝錦者云營生乃至巨萬素無此能一旦忽致異術必非平理唯乞平心精撿若此言不虚便宜肆諸市朝以正風俗脱其妄作當賜思罔昧之繇吾踰忝轉深足以致謗念此驚懼何能自測區區所懷不願望風容貸吾自子不作偷猶如不作賊故以宻白想為申啟北齊杜弼為中書軍将軍儀同竇㤗搃戎西伐詔弼為㤗監事及㤗失利自殺弼與其從六人走還陜州刺史劉貴鎖返晋陽髙祖詰之曰竇中尉此行吾前具有法用乃違吾語自取敗亡爾何繇不一言諌争也弼對曰刀筆小生唯文墨薄技便宜之事議所不及髙祖益怒賴房謨諌而獲免焉左遷下灌鎮司馬册府元龜巻九百二十四
