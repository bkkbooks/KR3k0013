body:
  text: 冊府元龜卷五百六十宋王欽若等撰國史部記注譜諜地理記注古者有左右史之職以記人君之言動葢君舉必書善惡無隐所以申儆戒防逸豫斯注記之所繇作也非獨臨法坐按卿士而獨有載言書䇿之典至於歸宴寢對􅉏御亦著夫簡牘之記焉周漢而下篇籍可舉第其嵗祀多所闕如或但紀編帙而遂忘姓氏隨時隆廢與運休息至或慎簡方正之士典司筆削之任參侍軒墄備預應對故其流風嘉話在於前聽乃有藴良直之志膺記述之選克謹官守聿遵典訓俾職業之修舉而國書之信實兹可謂匪懈而無諂者矣周穆王時内史作穆天子傳體制與今起居注正同盖周時内史所記王命之副也得於汲冡書漢武帝有禁中起居注至後漢明徳馬皇后撰明帝起居注則漢時起居似在宫中為女史之職矣後漢劉毅為平望侯時和熹鄧太后臨朝元初五年毅以太后多徳政欲令早有注記上書安帝曰臣聞易載羲農而皇徳著書述唐虞而帝道崇故雖明聖必書功於竹帛流音於管絃伏惟皇太后膺大聖之姿體乾坤之徳齊蹤虞紀比跡任姒孝弟慈仁允恭節約杜絶奢盈之源防抑逸欲之兆正位内朝流化四海及元興延平之際國無儲副仰觀乾象參之人譽援立陛下為天下主永安漢室綏静四海又遭水潦東州饑荒垂恩元元冠盖交路菲薄衣食躬率羣下損膳觧驂以贍黎苖惻隐之恩猶視赤子克己引愆顯揚仄陋崇晏安之政敷在寛之教興滅國繼絶世録功臣復宗室追還從乂蠲除禁錮政非惠和不圖於心制非舊典不訪於朝𢎞徳洋溢充塞宇宙洪澤豐沛漫衍八方華夏樂化戎狄混并丕功著於大漢碩惠加於生人巍巍之業可聞而不可及蕩蕩之勲可誦而不可名古之帝王左右置史漢之舊典世有注記夫道有夷崇治有進退若善政不述細異輙書是為堯湯負洪水大旱之責而無咸熈假天之美高宗成王有雉雊迅風之變而無中興康寜之功也上考詩書有虞二妃周室三母修行佐徳思不踰國未有内遭家難外遇災害寛緫大麓經營天物功徳巍巍若兹者也宜令史官著長樂宫注聖徳頌以敷宣景燿勒勲金石懸之日月攄之罔極以崇陛下蒸蒸之孝帝從之獻帝起居注五卷史失所撰人名氏後皆同晉李軌撰㤗始起居注二十卷咸寕起居注十卷一云二十卷㤗康起居注二十一卷元康起居注三十一卷咸和起居注十六卷元康起居注一卷梁有永平元康永寜起居注六卷又有惠帝起居注二卷永嘉建興起居注十三卷已下本志失所撰人姓氏建武大興永昌起居注九卷咸康起居注五卷隆和興寜起居注五卷咸安起居注三卷㤗和起居注六卷寜康起居注六卷㤗元起居注二十五卷隆安起居注十卷元興起居注九卷義熈起居注十七卷元熈起居注二卷趙石勒時傳彪為大中大夫與賈滿江軌撰大將軍起居注南燕起居注一卷隋志失所撰人姓氏宋劉道㑹撰晉起居注三百一十七卷又永初起居注十卷已下本志失所撰姓氏景平起居注五十五卷孝建起居注十二卷大明起居注十五卷又有景和起居注四卷明帝在藩注三卷㤗始起居注十九卷㤗豫起居注四卷梁有永元起居注二十卷昇明起居注六卷南齊蘇偘初自太祖為太尉偘以諮議領録事除黄門郎後為上太尉諮議偘事上既乆備悉起居乃與邱巨源撰蕭太尉記載上征伐之功王逡之為國子博士兼著作撰永明起居注二十五卷梁又有建元起居注十二卷隆昌延興建武起居注四卷中興起居注四卷周顒為太子僕射兼著作撰起居注遷中書郎兼著作如故梁王僧孺為中書郎領著作撰起居注遷尚書左丞領著作如故又有大同起居注十卷隋書志失所撰人姓氏周興嗣撰起居注職儀等百餘卷徐勉為侍中嘗以起居注煩雜乃加刪為别起居注六百卷陳劉師知為中書舍人世祖勑師知撰起居注自永定二年秋至天嘉元年冬為十卷一云八卷天嘉起居注二十三卷本志失所撰人姓氏天康光大起居注十卷太建起居注五十六卷至徳起居注四卷後魏李伯尚高祖時為通直散騎侍郎勑撰太和起居注房景先撰世宗起居注隂道方李莊為尚書左士郎中修起居注崔鴻為員外郎兼尚書虞曺郎中勑撰起居注裴伯茂文藻富贍為散騎常侍典起居注邢昕好學為太尉記室叅軍吏部尚書李神雋奏昕修起居注封肅博渉經史位太學博士修起居注韋纉為侍御中散高祖每與徳沙門諮論徃復纘掌綴録無所遺漏頗見知賞轉散騎侍郎温子昇孝莊時為主客郎中修起居注北齊魏收後魏節閔時為散騎侍郎尋勑典起居注陳元康為威烈將軍天保元年修起居注後周薛寘仕後魏為中書侍郎修起居注李彥魏孝武入闗著作佐郎修起居注桺虬西魏大統十六年遷中書侍郎修起居注仍領丞事盧柔遷中書侍郎兼著作撰起居注王羆孫述襲封扶風郡公除中書舍人修起居注改封龍門郡公隋開皇起居注六十卷本志不書撰人姓氏王邵為散騎侍郎修起居注唐温大雅貞觀初為禮部尚書著創業起居注三卷杜正倫為給事兼知起居注太宗嘗謂侍臣曰朕每日坐朝欲出一言即思此言於百姓有利益否所以不敢多言正倫進曰君舉必書言存左史臣職當修起居注不敢不盡愚直陛下若一言乖於道理則千載累於聖徳非直當今有損於百姓願陛下慎之太宗大悦賜綵絹二百叚朱子奢為諌議大夫貞觀九年十月子奢上表曰今月十六日陛下出聖㫖發徳音以起居紀録書帝王臧否前代但藏之史官人主不見今欲親自觀覽用知得失愚以為聖徳在躬舉無過事史官所述義歸盡善陛下獨覽起居於事無失若以此法傳示子孫竊有未喻大唐雖七百之祚天命無改至於曾𤣥之後或非上智但中主庸君餙非䕶短見時史直辭極陳善惡必不省躬罪已唯當致怨史官但君上尊崇臣下卑賤有一於此何地逃刑既不能效朱雲庭折董狐無隐排霜觸電無顧死亡唯應希風順㫖全身逺害悠悠千載何所聞乎所以前代不觀盖為此也褚遂良為諌議大夫貞觀十六年四月二十八日太宗謂遂良曰卿知起居記録何事大抵人君得觀之否對曰今之起居古之左右史以記人君言行善惡必書庶㡬人主不為非法不聞帝王躬自觀史太宗曰朕有不善卿必記之耶遂良曰守道不如守官臣職當載筆君舉必書黄門侍郎劉洎曰設令遂良不記天下之人皆記之矣太宗謂房𤣥齡曰國史何因不令帝王觀見對曰國史既善惡必書恐有忤㫖故不得見也太宗曰朕意殊不同今欲自㸔國史若有善事固不須論若有惡事亦欲以為鑒誡卿可撰録進來房𤣥齡遂刪畧國史表上太宗見六月四日事語多㣲文乃謂𤣥齡曰昔周公誅管蔡而周室安季友鴆叔牙而魯國寜朕知所以安社稷利萬代耳史官執筆何煩有隐宜即改削直書其事至七月八日又謂遂良曰爾知起居記何事善惡朕今勤行三事望爾史官不書吾惡一則逺鑒前代敗事以為元龜二則進用善人共成政道三則斥棄羣小不聼䜛言吾能守之終不轉也鷹犬平生所好今亦罷之雖有順時冬狩不踰旬而返亦不曽絶域訪竒異逺方求珍羞比日已來食無兼饌自非膏雨有年師行尅㨗未嘗與公等舉杯酒奏管絃朕雖每日兢懼終藉公等輔翊各宜勉之二十二年二月七日太宗以鐡勒諸蕃歸國謂羣臣曰吾知勞逸不同者有二鐡勒觧辮歸國去危就安邉夷無事豈不逸樂而竆髪之地盡為齊人古昔已來書史不載今日起居記朕功業亦為勤勞蘇冕曰貞觀中每日朝退後太宗與宰臣叅議政事即令起居郎一人執簡記録繇是貞觀注記政事稱為畢備及高宗朝㑹端拱無言有司唯奏辭見二事其後許敬宗李義府用權多妄論奏恐史官直書其短遂奏令隨文便出不得備聞機務因為故事姚璹則天長夀初為文昌左丞同鳯閣鸞臺平章事舊制左右史唯得對仗承㫖仗下已後謀議皆不預聞以為帝王謨訓不可遂無紀述若不宣自宰相史官無從得書遂表請仗下所言軍國政要即宰相一人專知撰録號為時政記每月封送史館宰相之撰時政記自璹始也趙退翁與賈躭盧邁為相貞元十二年正月躭邁皆假故退翁獨對於延英徳宗問曰近日起居注所記何事退翁奏曰古左史記事右史記言人君動止有事言隨即記録今起居之職也國朝自永徽已後起居唯得對仗承㫖仗下後謀議皆不得聞其事注記但出於已制勑内採録更無他事所以長夀中姚璹知政事以為親承徳音謀訓若不宣自宰相史官無繇得書遂請仗下後所言軍國政要宰相專知撰録號為時政記每送史館無何此事又廢帝曰君舉必書義存勸誡既有時政記宰臣宜依故事為之庾敬休元和十二年為起居舍人上疏求復故事勑記事記言史官是職昭其法誡著在典常如聞近者難得詳實思有釐改用存舊章舉而必書朕所深望自今以後每坐日宰臣及諸司對後如有事可備勸誡合紀述者委其日承㫖宰相宣示左右起居令其綴録仍准舊例每季送史館以為常例自隋氏因前代史官起居注故置起居舍人以紀君舉國朝因之貞觀初置郎而省舍人顯慶中始兩立分侍左右仗下秉筆隨宰相入禁殿命令謨猷皆得詳録若仗在紫宸内閣則夾香案分立殿下直第二螭首和墨濡翰皆即螭首之坳處繇是諺傳謂螭頭有水官既宻侍號為清美永徽之後始與百官仗下俱退長夀年中姚璹為相以史官不聞獻替表請宰臣一人撰録軍國政要號為時政記隨月移之史官館及起居既録自宰臣事同銘述於是推美讓善之義行而信史直書之義闕既而嵗月稍乆樞務復繁注記漸簡未㡬皆廢其後執事者時或修綴百無一二而左史所守猶因於制勑時存筆削至於右史以職在記言但編集詔書繕冩而已至是敬休上疏累請於時宰臣皆樂復焉既陳奏而制行故事漸復公議稱美周墀開成二年二月為考功員外郎集賢殿直學士兼權知起居舍人事文宗每御紫宸殿與宰臣决事多召左右史問所宜施行墀屢承顧問既改尚書郎復兼左史其後左右史故有當轉官必令兼領自墀始也裴素為起居郎與起居舍人張次宗閣内召對時文宗復故事每入閣左右執筆立於螭頭下宰臣奏事得以備録或宰臣奏事罷召左右史顧問以决所疑故開成中帝與宰臣之言詳於史氏楊嗣復開成三年為宰相上言陛下躬勤庶政超邁百王每對宰臣日旰忘倦正衙决事二史在前便殿坐日全無紀録長夀初宰臣姚璹奏置時政記旋即不行貞元中宰臣趙退翁請行故事無何又廢恭惟聖政必在發明今請每致延英坐日對宰臣往復之詞闗徳化刑政之事委中書門下直日紀録月終送付史館所冀帝猷不墜國史有倫時同列多不便之事竟不行魏謩為起居舍人開成四年十月乙卯文宗於紫宸殿對百寮遣閤門使就謩取注記謩奏曰臣以自古置此以為聖王鑒誡陛下但為善事勿謂臣不書如陛下所行錯誤臣不書之天下之人皆得書之臣以陛下為太宗文皇帝乞陛下許臣比職禇遂良帝曰我向前亦曽取㸔謩曰自是向前起居不詳故事臣今豈得䧟陛下為非若陛下一覽之後自此文字須有廻避如此則善惡不直如何遺後取信帝遂止鄭朗開成中為起居郎初太和末風俗稍奢文宗恭勤節約冀革其風宰臣等言曰陛下躬儉節用風俗已移長裾大袂漸以减損若更令戚屬絶其侈靡不慮下不從教帝曰此事亦難戸曉但去其㤗甚自以儉徳化之朕聞前時内庫唯二錦袍餙以金烏一袍𤣥宗幸温湯時御之一與貴妃當時貴重如此今奢靡豈復貴之料今富家往往皆有左街副使張元昌便用金唾壺昨因李訓已誅之矣時朗執筆螭頭下宰臣退帝謂朗曰適所議論卿記録未吾試觀之朗對曰臣執筆所記便為名史伏准故事帝王不可取觀昔太宗欲覽國史諌議大夫朱子奢云史官所述不隐善惡或主非上智餙非䕶失見則致怨所以義不可觀又禇遂良曰今之起居郎古之左右史也記人君言行善惡必書庶㡬不為非法不聞帝王躬自觀史帝曰適來所記無下否臧見亦何爽乃宣謂宰臣曰鄭朗引故事不欲朕見起居注夫人君之言善惡必書朕恐有平常閑説不闗理體垂諸將來竊以為耻異日臨朝庶㡬稍改何妨一見以誡醜言朗遂進之後唐趙熈為起居郎明宗天成二年八月熈奏今後凡内中公事及詔書奏對應不到中書者伏乞委内臣一人旋具抄録月終闗送史館勑宜令樞宻院學士閻至録送長興二年三月二十八日史館奏當館應諸處及諸司闗送到合編録公事外伏准舊制國朝有時政記並起居注並合送館以備纂修近代已來闕行此事只以每遇入閤兼内殿起居朝臣待制轉對公事逐人抄送當館如有顯有頒行逐司闗報到者旋據逐件一一於日歴收記其有直下所司并行之事當館無繇得知若只慿本官供到所奏狀本未免簡編不備本末難窮已後待制轉對公事等除顯具頒行闗送到館外應有直下所司及不行未行之事伏乞宣付當館旋依次第編録其時政記起居注井内庭逐日合書日歴亦乞相次逐旋奉勑朝臣起居入閣奏對公事奏覆後宣付史館宜依其時政記起居注續候勑處分李崧為端明殿學士清㤗二年史館上言自明宗朝每見宰臣節度使為軍民政事有所敷陳或宸㫖宣揚此闗道理唯近臣聞聽外靣不知先朝時詔樞宻直學士閻至於奏對時記録逐季下史館以備纂修自今年四月後詔李專美記録今以改官其記録望别差官乃詔崧記録晉趙瑩為相監修國史瑩奏請循近例依唐明宗朝凡有内庭公事及言動之間委端明殿學士或樞宻院學士侍立冕旒繫日編録逐季送當館其百司公事亦望逐季送館旋要編修日厯從之天福四年十一月史館奏案唐長夀二年右丞姚璹奏帝王謨訓不可闕文然仗下所言軍國政事請令宰臣一人撰録號時政記至唐明宗朝又委端明殿學士撰録逐季付史館伏乞遵行者勑宜令宰臣一員撰述周李轂為宰臣監修國史顯徳元年十月奏曰竊以自古王者咸建史官君臣獻替之謀皆須備載家國安危之道得以直書歴代已來其名不一人君言動則起居注創自累朝輔相經綸時政記興於前代然後采其事實編作史書蓋縁聞見之間須有來處記録之際得以審詳今之左右起居郎古之左右史也唐文宗朝命其官執筆立於殿階螭頭之下以紀政事後則明宗朝命端明殿及樞宻直學士皆輪修日厯旋送史館以備纂修降及近朝此事皆廢今後欲望以諮詢之事裁制之規别命近臣旋具抄録毎當修撰日厯即令封送史臣從之因命樞宻院直學士起今後於樞宻使處逐月抄録事件送付史館先是太祖黜王峻為商州司馬既出之後慮其史筆不直因宣取開國已來日厯讀之史臣以不知禁宻機事恐成漏畧相與為憂及世宗嗣位亦㽞意於史傳因共起請為編修之備譜諜古者聖人吹律定姓以記其族而後之命氏其義有九盖號謚爵國官字君事職之謂也以至姓系蕃衍譜諜散逸繇是博雅君子圖而籍之紀其閥閲辨其流品使宗𣲖之不紊而人物之惟叙參於部録垂之軌範自世本起於漢氏昭穆著於晉家宋齊以還迄於唐室作者相繼實繁有徒皆能㳂波而討源因枝而振葉别生分類於是乎在若夫錫土之制著於夏書司商所掌表於周典斯乃稽古之大訓非可以忽焉漢劉向撰世本二卷晉摯虞為尚書郎以漢末䘮亂譜傳多亡失雖其子孫不能言其先祖撰族姓昭穆十卷上疏進之以為足以備物致用廣多聞之益賈弼為員外散騎常侍好簿狀大搜羣族所撰十八州一百一十六郡合七百二十卷士庶畧無遺缺其子孫代傳業又云宋王宏劉湛並好其書宏日對千客不犯一人諱郭須為襄陽令撰魏晉世譜十卷宋劉湛為選曺撰百家譜隋書有劉湛百家譜二卷何承天撰姓苑一卷南齊王儉撰百家譜十卷又云劉湛撰百家譜以助銓序傷於寡畧儉復加之得繁簡之衷賈淵撰氏族要狀及人名並行於世王逡之續王儉百家譜四卷南族譜二卷百家譜拾遺一卷賈希鏡昇明中高帝嘉希鏡世學取為驃騎將軍武陵王國郎中令歴大司馬司徒府叅軍竟陵王子良使希鏡撰見容譜出為句容令先是譜學未有名家希鏡祖弼之廣百氏譜記專心習業晉太元中朝廷給弼之令史書史撰定譜冩藏秘閣及左戸曺希鏡三世傳學凡十八州士族譜合百帙七百餘卷該究精悉皆如貫珠當時莫比永明中衛將軍王儉抄次百家譜與希鏡恭懷撰定建元初希鏡遷長水校尉傖人王秦寳買襲琅琊譜尚書令王晏以啟明帝希鏡被收當極法子樓長謝罪稽顙流血朝廷哀之免希鏡罪後為北中郎叅軍卒撰氏族要狀及人名書並行於時梁顧恊撰異姓苑五卷王僧孺為北中郎南康王諮議叅軍入直西省知撰譜事先是尚書令沈約以為晉咸和初蘇峻作亂文籍無遺後起咸和二年以至於宋所書並皆詳定並在省下左戸曺前廂謂之晉籍有東西二庫此籍既並精詳定可寳惜位官高卑皆可依案宋元嘉一十七年始以七條徴發既立此科人奸互起偽狀巧籍嵗月滋廣以至於齊患其不實於是東堂校籍置郎令史以掌之競行奸貨以新換故昨日卑細今日便成士流凡此奸巧並出愚下不辯年號不識官階或注隆安在元興之後或以義熈在寜康之前此時無此府此時無此國元興唯有三年而猥稱四五詔書甲子不與長厯相應校籍諸郎亦所不覺不才令史固自忘言臣謂宋齊二代士庶不分雜役减闕職繇於此竊以晉籍所餘宜加寳愛武帝以是㽞意譜籍州郡多罹其罪因詔僧孺改定百家譜始晉太元中員外散騎常侍郎平陽賈弼篤好簿狀乃廣集衆家大搜羣族所撰十八州一百一十六郡合七百一十二卷凡諸大品畧無遺闕藏在秘閣副在左右又云僧孺為譜八十卷東南一族别為一部不在百家之數傅昭為散騎常侍博洽古今尤善人物魏晉官宦簿伐姻通内外舉而論之無所遺失隋書有傅昭撰百家譜十五卷陳顧野王撰顧氏譜傳十卷後魏高諒為驍騎將軍造親表譜録四十許卷自五世已下内外曲盡覽者服其博記封偉伯撰封氏本録六卷宋㑹撰姓系譜録五十篇盧懷仁撰中表録二十卷元暉業撰後魏辯宗録二卷後周明帝集公卿已下捃採衆書目自羲農以來訖於魏末叙為世譜凡五百卷隋劉善修撰諸劉譜三十卷宋嘉撰世本四卷已下隋志不書朝代賈執撰百家譜二十卷又撰姓氏英賢譜一百卷按梁有王宣新集諸州譜十二卷又别有諸姓譜一百一十六卷益譜四十卷闗東闗北譜三卷梁武帝緫管境内十八州譜六百九十卷漢氏帝王譜三卷已下本志不書撰人姓氏齊帝譜十卷百家世譜十卷百家譜鈔五卷後魏皇帝宗族譜四卷魏孝文劉姓族牒一卷後齊宗譜一卷益州譜三十卷冀州姓族譜二卷洪州諸姓譜十一卷吉州諸姓譜八卷江州諸姓譜十一卷諸州雜譜八卷袁州諸姓譜八卷揚州譜鈔五卷京兆韋氏譜二卷謝氏譜一十卷楊氏血脉譜一卷楊氏家譜狀并墓記一卷楊氏枝分譜一卷楊氏譜一卷北地傅氏譜一卷蘇氏譜一卷氏族要狀十五卷復姓苑一卷齊永元中表簿五卷唐高士亷為禮部尚書貞觀十二年正月士亷與行黄門侍郎韋挺禮部侍郎令狐徳棻兼中書侍郎岑文本撰氏族志百卷合二百九十三姓千六百五十一家分為九等以甄士庶太宗稱善頒賞進級各有差時議以山東人士好自矜夸雖復累業陵遲猶恃其舊地女適佗族必多求聘財太宗惡之以為甚傷教義乃詔士亷與御史大夫韋挺中書侍郎岑文本禮部侍郎令狐徳棻等刋正姓氏於是譜牒仍慿據史傳考其真偽忠賢者褒進悖逆者貶黜撰為氏族志士亷乃類其等第以進太宗曰我與山東崔盧李鄭舊既無嫌為其世代衰㣲全無冠盖猶自云士大夫婚姻之間則多邀錢幣才識既下而偃仰自高販鬻松檟依託富貴我不觧人間何為重之只縁齊家唯據北梁陳僻在江南當時雖有人物偏僻小國不足可貴至今猶以崔盧王謝為重我平定天下四海一家凡在朝士皆功効顯著或忠孝可稱或學藝通博所以擢用見居三品以上欲共寒代舊門為親縱多輸錢帛猶被偃仰我今特定族姓譜者欲重崇今朝冠冕何因崔幹猶為第一等昔漢高祖是山東一匹夫以其平定天下主尊臣貴卿等讀書見其行迹至今以為美談心懷尊重卿等不貴我官爵耶不須論敷土已前止取今日官職高下作等級遂以崔幹為第三等及書成凡一百卷詔頒於天下賜士亷物千段李守素為天䇿府倉曺尤善譜學妙識人物自宋晉以降四海士流及周魏已來諸勲貴等華戎閥閲靡不詳究人有問者應若撞鐘繇是當時號為肉譜嘗與虞世南等六人同直學舘其夜七夕内出珍饌有教賦詩因共談人物初言江左東南猶相酬對及言北臺諸姓次第如流顯其歴葉皆有據證世南但撫掌而笑不復能答既而言曰肉譜定可畏許敬宗因謂世南曰李倉曺以善人物乃得此名雖為美事然非雅目君既言成凖的宜當有以改之答曰卿言是也昔任彥昇善談經籍前代稱為五經笥今日倉曺為人物志可乎杜如晦等咸以為佳焉吕才為太常丞高宗永徽初修姓氏録許敬宗撰姓氏譜二百卷路敬淳為太子司議郎兼知𢎞文館直學士自魏晉已來官品姓氏敬淳無不究其始末撰著姓畧二卷傳於代又撰衣冠系録六十卷柳冲為左散騎常侍中宗神龍三年五月冲上表曰臣聞乾元資始而庶物形焉人倫既肇而族類詳焉姓氏之初代本著其義昭穆之序周譜列其風漢晉之年應摯明宗系之説齊梁之際王賈述衣冠之源使夫士庶區分懲勸攸寄昭之後代實為盛典自魏太和已降作者彌繁或以八族品人倫或以九等量地胄爰洎今日年祀以淹冠冕之家興衰不一胥原欒郤有降夷品許史袁楊一時各盛豈可以曩時之褒貶為當今之軌模原始要終有所未允伏惟應天皇帝陛下誕膺靈命大庇蒼生道冠羲軒風踰韶夏損益前載垂範後昆帝緒皇源與天冲而比大良才人物掩姬漢而飛聲理當自我作古牢籠古昔豈可闕於著紀無示將來臣願得叙大唐之隆修氏族之譜使九圍仰止百代承風豈不大哉豈不盛哉帝從之遂命尚書左僕射魏元忠及修史官工部尚書張錫禮部侍郎蕭志忠岑羲兵部侍郎崔湜刑部侍郎徐堅工部侍郎劉憲左補闕呉兢等與桺冲依據氏族志重加修撰仍令取其高名盛徳素業門風國籍相傳士林標凖次復勲庸克懋榮絶當朝中外相輝譽兼時望者各為等列其諸蕃酋長曉襲冠𢃄者亦别為一品目為唐姓族系録二百卷竇懷貞𤣥宗先天中為左僕射與侍中魏知古中書令蕭志忠崔湜中書侍郎陸象先左散騎常侍柳冲太子詹事徐堅左庶子劉子𤣥等奏上所修姓族系録二百卷劉知㡬為太子中允修國史自負史才嘗慨時無知己乃委國史於著作郎呉兢别撰劉氏家史十五卷譜考三卷推漢氏為陸終苖裔非堯之後彭城叢城里諸劉出自宣帝子楚孝王囂曽孫司徒居巢侯劉愷之後不承楚元王交皆案據明白正前代所誤雖為流俗所譏學者服其該博賈至為著作郎肅宗乾元元年撰百家類例十卷桺芳為右金吾衛騎曺叅軍史館修撰代宗命芳撰皇室系圖譜又云永㤗二年太常博士桺芳撰皇室永泰譜二十卷上之王涯為兵部員外郎知制誥憲宗元和七年七月撰姓纂十卷成上之李衢為屯田郎中文宗開成三年四月與沔王府長史林贊進所撰皇唐玉籙一百五十卷四年為大理少卿又奉勑撰皇后譜諜桺璟為翰林學士開成四年閠正月奏今月十二日靣奉進止以臣先祖所撰皇室永㤗新譜事頗精詳令臣自徳宗皇帝至陛下御極已來依舊様修續伏請宣付宰臣詔宜令宗正寺與桺璟計㑹修撰仍令戸部量供紙筆地理周官大司徒掌邦之土地之圖以周知九州地域廣輪之數辯其五土之名物邦國都鄙畿疆之制又有土訓誦訓之職以詔地事以道方志備夾車之問焉自黄軒之世疆理方國唐虞所記頗為簡畧三代之後方䇿斯著遷固以來載籍彌廣盖夫史氏之所職司典之攸記或承制以論譔或守官而采綴或繼世善述乃至名家或驅傳經塗樂於稽古形之油素叅於部録制作之美燦然可觀昔蕭相入秦獨守圖書以知天下阨塞戸口彊弱而成大業信有㫖哉堯以伯禹為司空作禹貢一篇周孔子為魯大司冦述職方以除九邱漢東方朔為大中大夫撰十洲記一卷張騫為郎使月氐撰出闗志一卷司馬遷為太史令作河渠書其序曰維禹浚川九州攸寜爰及宣防决瀆通溝後漢班固為郎典校秘書撰漢書述地理志兩卷其序曰坤作墬勢高下九則墬古地字九則九州土田上中下九等也自黄唐經畧方國爕定東西彊理南北三代損益降及秦漢革剗五等制立郡縣剗音初限切畧表山川彰其剖判又述溝洫志一卷其叙曰夏乘四載百川是導唯河為囏災為後代商竭州移秦决南涯河竭而商亡秦始皇决河移灌大梁遂滅之自兹岠漢北亡八支本有九河今塞餘有一也文陻棗野武作瓠歌陻音因文帝塞河於酸棗也河决瓠子武帝親臨埠功不成而作歌成有平年後遂滂沱成帝治河已平改元曰河平爰及溝渠利我國家趙岐為衛尉多所述作著三輔史録傳於時序曰三輔者本雍州之地世世從公卿大夫吏二千石及高貲皆以陪諸陵五方之俗雜㑹非一國風不但繫於詩之秦豳也其為士好高尚義貴於名行其俗失則趨勢進權唯利是視余以不才生於西土耳能聽而聞故老之言目能視而見衣冠之疇心能識而觀其賢愚嘗以𤣥冬夢黄髪之士姓𤣥名明字子真與余寤言言必有中善否之間無所依違命操筆者書之近從建武已來暨於斯今其人既亡行乃可書玉石朱紫繇此定矣故謂之史録岐恐時人不盡其意故隠其書唯以示同郡嚴象蜀譙周為光禄大夫撰三巴記一卷呉顧啓期撰婁地記一卷晉裴秀為司空以禹貢山川地名從來乆逺多有變易後世説者或彊牽引漸以闇昧於是甄摘舊文疑者則闕古有名而今無者皆隨事注列作禹貢地域圖十八篇奏之藏於秘府其序曰圖書繇來尚矣自古立象垂制而頼其用三代置其官國史掌厥職暨漢屠咸陽丞相蕭何盡收秦之圖籍今秘書既無古之地圖又無蕭何所得惟有漢氏輿地及括地諸雜圖名不設分率又不考正凖望亦不備載名山大川雖有麄形皆不精審不可依據或荒外迂誕之言不合事實於義無取大晉龍興混一六合以清宇宙始於庸蜀深入其岨文皇帝乃命有司撰訪呉蜀地圖蜀土既定六軍所經地域近逺山川險易征路迂直較驗圖記罔或有差今上考禹貢山海川流原隰陂澤古之九州及今十六州郡國縣邑疆界鄉陬及古國盟㑹舊名水陸徑路為地圖十八靣制圖之體有六焉一曰分率所以辨廣輪之度也二曰凖望所以正彼此之謂也三曰道里所以定所繇之數也四曰高下五曰方邪六曰迂直此三者各因地而制宜所以較夷險之異也有圖象而無分率則無以審逺近之差有分率而無凖望則雖得之於一隅必失之於他方有凖望而無道里則施之於山海絶隔之地不能以相通有道里而無高下方邪迂直之較則徑路之數必與逺近之實相違失凖望之正矣故以此六者參而考之然逺近之實定於分率彼此之實定於道里度數之實定於高下方邪迂直之筭故雖有峻山鉅海之隔絶域殊方之廻登降詭曲之因皆可得舉而定者凖望之法既正則曲直逺近無所隠其形也秀又撰春秋土地名三卷一云裴秀容撰周處義興陽羡人著風土記三卷陸機為著作郎撰雒陽記一卷賀循為呉國内史撰㑹稽記一卷戴祚撰西征記一卷張渤撰呉地記一卷顧席撰呉郡記一卷盖泓撰朱崖傳一卷宋盛𢎞之為臨川王侍郎撰荆州記三卷沈懷逺為武康令撰南越志謝靈運為御史中丞免官東還永嘉撰遊名山志一卷居名山志一卷雷次宗豫章南昌人撰豫章記一卷范晦為宣城太守撰後漢書郡國志五卷其序曰漢書地理志記天下郡縣本末及山川奇異風俗所至矣今但録中興已來郡縣改易及春秋三史㑹同征伐地名以為郡國志凡前志有縣名今所不載者皆世祖所并省也前無今有者後置也凡縣名先書者郡所治也南齊宗測不就徴辟嘗遊衡山七嶺著衡廬山記乳逭為衛軍掾著三呉史録劉澄之為郎官尚書撰永初山川古今記二十卷梁沈約為尚書令撰宋書一百卷内郡州志四卷任昉為秘書監著地記二百五十二卷蕭子顯為太尉録事著齊書州郡志一卷裴子野為著作郎掌國史撰方國使圖一卷廣述懷來之盛自要服至於海表凡二十國呉均為奉朝請撰廟記一十二州記十六卷庾仲容為尚書左丞抄衆家地理書一十卷陶𢎞景丹陽秣陵人除奏朝請尤明山川地理方圖產物撰古今州郡記陳顧野王為大著作掌國史撰分野樞要一卷輿地志三十卷江徳藻為散騎常侍為中書郎劉師知使北齊徳藻撰聘北道里記三卷師知撰聘遊記三卷姚察為吏部尚書使隋著西聘道里一卷後魏闞駰撰十三州志劉芳為通直散騎常侍撰徐地録一卷楊衒之撰雒陽伽藍記五卷廟記一卷北齊魏收為中書令兼著作郎撰後魏書地形志三卷後周薛寘為御正大夫撰西京記三卷引據該洽世稱其博聞焉姚最案十㑹撰孝行記十卷隋庾季才高祖開皇初為通直散騎常侍詔季才與其子賢撰地形志八十七卷崔熈為起居舍人煬帝大業五年受詔與諸儒撰區宇圖志二百五十卷奏之帝不之善更令虞世基許善心衍為六百卷裴矩大業中為吏部侍郎時西域諸蕃多至張掖與中國交市帝令矩掌其事矩知帝方勤逺畧諸裔胡至者矩誘令言其國俗山川險易撰西域圖記三卷入朝奏之又撰髙麗風俗一卷郎茂大業中為尚書左丞撰隋州郡圖經一百卷許善心大業中為給事郎撰方物志二十卷諸葛頴大業中為著作郎撰鑾駕北廵記三卷幸江都道里記一卷雒陽古今記一卷唐姚思亷初仕隋為河間郡司法書佐煬帝令與崔祖濬修區宇圖志房𤣥齡太宗貞觀中為司空與中書令禇遂良等撰晉書地理志兩卷濮王㤗初封魏王太宗時令㤗府中别置文學館任自引召學士官給酒饌㤗於是奏引著作郎蕭徳言秘書郎顧裔記室叅軍蔣亞卿功曹叅軍謝偃等就府撰括地志五百五十卷奏上之顏師古高宗時為禮部侍郎監修國史永徽元年撰隋書地理志三卷許敬宗為中書令顯慶三年五月帝以西域盡平遣使分往康國及吐火羅等國訪其風俗物產及古今廢置畫圖以進因命史官撰西域圖志六十卷敬宗監領之書成學者稱其該博焉賈耽徳宗時為左僕射平章事貞元十四年十月進九州圖并别録六卷通録四卷共十卷表曰臣聞楚左史倚相能讀九丘晉司空裴秀創制六體則為圖之新意臣雖愚昧夙所師範累蒙㧞擢遂忝台司雖歴踐職任誠多曠闕而率土山川不忘寤寐其大圖外薄四海内别九州必藉精詳乃可摹冩見更纘集續兾畢功然而隴右一隅乆淪蕃冦職方失其圖記境土難以區分輙私課虛㣲採掇輿議畫闗中隴右及山南九等圖一軸伏以洮湟舊墟連接監牧甘凉右地控𢃄朔陲峽路之偵候交通軍鎮之守備衝要莫不近意就實依稀像真如聖恩遣將䕶邉新書授律則靈慶之設險在目原㑹之封畧可知其諸州諸軍須論里數人額諸山諸水須言首尾源流圖上不可備書慿據必資記注謹撰别録六卷又黄河為四瀆之宗西戎乃羣羗之帥臣并研尋史課剪棄浮詞罄所聞知編為四卷通録都成十卷文義鄙朴伏增慙悚謹隨表奉進答詔褒之十七年上海内華夷圖及古今郡國縣道四夷述四十卷表曰臣聞地以博厚載物萬國棊布海以委輸環外百蠻繡錯中夏則五服九州殊俗七戎六狄普天之下莫非王臣昔母邱出師東銘不耐甘英奉使西抵條枝奄菜乃大澤無涯罽賔則懸度作險或道里逈逺或名號改移古來通儒罕遍詳究臣弱冠之嵗好聞方言筮仕之辰注意地理究觀研考垂三十年絶域之比隣異蕃之習俗梯山獻琛之路乘舶來朝之人咸窮竟其源流訪求其居處闤闠之行賈戎舶之遺老莫不聽其言而掇其要閭閻之𤨏語風謡之小説亦皆收其是而芟其偽然商周以降封畧益明承厯數者八家渾區宇者五姓聲教所及惟唐為大秦皇罷侯置守長城起於臨洮孝武却地開邉障塞限於雞鹿東漢則哀牢諸吏西晉則俾離結轍隋室列四郡於卑和海西創三州於扶南江北遼陽失律因而棄之高祖神堯皇帝誕膺天命奄有四方太宗繼明重熈柔逺能邇踰大蹟通道北至仙娥於骨利幹置𤣥闕州高宗嗣守丕績克廣前烈遣單車齎詔西域惹山於波剌斯丘置疾陵府中宗復配天之業不失舊物睿宗含光大之量惟新永圖𤣥宗以大孝清内以無為理外大宛驥騄嵗充内廐與貳師之窮兵黷武豈同年哉肅宗掃平氛祲澤潤生人代宗剗除殘孽彛倫攸叙伏惟陛下以上聖之姿當太平之運敦信明義履徳包元惠養黎蒸懷柔遐裔故瀘南貢麗水之金漢北獻余吾之馬𤣥化洋溢率土霑濡臣㓜切磋於師友長趨侍於軒墀自揣孱愚叨榮非據鴻私莫答夙夜兢惶自興元元年伏奉進止令臣修撰國圖旋即充使魏川汴州幽鎮東雒東郡間以衆務不遂專門績用乆虧憂愧彌切近乃力衰朽竭思慮殫所聞見叢於丹青謹令工人畫海内華夷圖一軸廣三丈從三丈三尺率以一寸折成百里别章甫左袵奠高山大川縮四極於纎縞分百郡於作繪宇宙雖廣舒之不盈庭舟車所通覽之咸在目并撰古今郡國縣道四夷述四十卷中國之禹貢為首外夷以班史發源郡縣紀其増减蕃落叙其衰盛前地理書以黔州屬酉陽今則改入巴郡前西戎志以安國為安息今則改入康居凡諸舛謬悉從釐正隴西北地流播於永初之中遼東樂浪䧟屈於建安之際曺公棄陘北晉氏遷江南縁邉累經侵盗故墟日致堙毁舊史撰録十得二三今書搜捕所獲大半周禮職方以淄青為幽州之浸以華山為荆河之鎮既有乖於禹貢又不出於淹中多聞闕疑詎敢編次其古郡國題以墨今州縣題以朱今古殊文執翫簡易臣學謝小成才非博物伏波之聚米開示衆軍酇侯之圖書方知阨塞企慕前哲甞所寄心輙罄陋庸多慚紕畧無任戰惕之至帝覽而善之躭好地理學四方之使及自蕃虜來者必與之坐問其土地山川之所終始凡三十年所聞既備因撰海内華夷圖人有披圖以問其都邑者皆得其實事無虚詞袁滋貞元中為祠部郎中持節入南詔慰撫因使行著雲南記五卷李吉甫憲宗時為中書侍郎平章事分天下諸鎮紀山川險易故事各冩其圖於篇首為五十四卷號為元和郡國圖孔述睿宗元和中為史館修撰精於地理之學重修國史地理志時稱詳究田牟文宗時為入吐蕃使太和八年四月進宣索入蕃行記圖一軸并圖經八卷許康佐宣宗時為集賢學士撰九鼎記四卷周張昭仕晉為户部侍郎與起居郎賈縳等撰唐史地理志四卷册府元龜卷五百六十
