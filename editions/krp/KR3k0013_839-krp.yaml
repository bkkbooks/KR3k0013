body:
  text: 册府元龜卷八百三十九宋王欽若等撰總録部文章第三梁謝朏荘第二子初仕齊為呉興太守世祖嘗問王儉當今誰能為五言詩儉對曰謝朏得父膏腴江淹有所著文章並行於世位至金紫光禄大夫謝㵸朏弟也為侍中世祖起禪靈寺勅㵸撰碑文栁惔好學雅善製文初預齊武烽火樓宴帝善其詩謂豫章王嶷曰惔非徒風韻清爽亦屬文遒麗惔著仁政傳及諸詩賦粗有辭義位至尚書左僕射沈約博通墳集能屬文謝元暉善為詩任彦昇工於筆約兼而有之然不能過也立宅東田矚望郊阜嘗為郊居賦以見意著文章志三十卷文集一百卷以為在昔詞人累千載而不悟而獨得胸襟窮其妙趣自詣入神之作髙祖雅不好焉位至左光禄大夫侍中任昉雅善屬文尤長於筆才思無窮當世王公表奏莫不請焉昉起草即成不加㸃竄沈約一代詞宗深所推揖梁臺建禪讓文誥多昉所具也所著文章三十三卷數十萬言盛行於世位至寜朔將軍新安太守范雲善屬文位至尚書右僕射有集三十卷庾肩吾八嵗能賦詩時為兄於陵所友愛文集行於世位至度支尚書周興嗣髙祖革命興嗣奏休平賦其文甚美髙祖嘉之為散騎侍郎集直文徳夀光省是時髙祖以三橋舊宅為光澤寺勅興嗣與陸倕各製寺碑及成俱奏髙祖用興嗣所製者自是銅表銘柵塘碣北伐檄次韻王羲之書千字並使興嗣為文毎奏髙祖輙稱善加賜金帛呉均字叔庠呉興故鄣人也家世寒賤至均好學有俊才沈約嘗見均文頗賞嘆之均文體清拔有古氣好事者或效之謂為呉體建安王偉鎮揚州引為記室袁峻天監初為鄱陽王參軍髙祖雅好辭賦時獻文於南闕者相望其藻麗可觀或見賞擢峻乃擬揚雄官箴奏之髙祖嘉焉賜束帛除員外散騎侍郎直文徳學士省又奉勅與陸倕各製新闕銘髙爽於齊永明中贈衛軍王儉詩為儉所賞及領丹陽尹舉爽郡孝亷天監初為晉陽令坐事繋治作鑊魚賦以自况其文甚工後遇赦獲免頃之卒先是濟陽江洪㑹稽虞騫與爽並工屬文洪為建陽令坐事死騫官至王國侍郎並有文集栁惲天監初為相國長史兼侍中以貴公子早有令名少工篇什始為詩曰亭臯木葉下隴首秋雲飛瑯琊王元長見而嗟賞因書齋壁髙祖曲宴必被詔賦詩嘗奉和髙祖登景陽樓中篇云太液滄波起長楊宮樹秋翠華承漢逺雕輦逐風游深為髙祖所美陸倕少勤學善屬文文集二十卷行於世官至太常卿到洽天監中為國子博士奉勅撰太學碑張纉為湘州刺史述職經途乃作南征賦四千餘言著鴻寳一百卷文集二十卷傅映泛渉記傳有文才以篇什自命少時與劉繪蕭琛友善繪之為南康相映時為府丞文教多令具草王筠為殿中郎為文能壓彊韻毎公宴並作詞必妍美尚書令沈約深所推奨嘗啓髙祖曰晚來名家唯見王筠獨步約於郊居宅造閣齋筠為草木十詠書之於壁皆直寫文詞不加篇題約謂人云此詩指物呈形無假題署約製郊居賦搆思積時猶未都畢乃要筠示其草筠讀至雌霓五激切連踡約撫掌欣忭曰僕嘗恐人呼為霓五雞切次至墜石磓星及氷懸塪而帶坻筠皆擊節稱賛約曰知音者希真賞殆絶可以相要正在此數句耳筠又嘗為詩呈約即報書云覽所示詩實為麗則聲和被紙光影盈字䕫牙接響顧有餘慙孔翠羣翔豈不多愧古情拙目毎佇新竒爛然總至權輿已盡㑹昌昭發蘭揮玉振克諧之義寜止笙簧思力所該一至於此嘆服吟研周流忘念昔時幼壮頗愛斯文含咀之間倏焉疲暮不及後進誠非一人擅美推能實歸吾子遲比閑日清覯乃申為中書郎奏勅製開善寺寳誌大師碑文辭甚麗逸又勅撰中書表奏三十卷及所上賦頌都為一集昭明太子薨勅為哀策文復見嗟賞筠終光禄大夫司徒左長史筠自撰其文章以一官為一集自洗馬中書中庶吏部佐臨海太府各十卷尚書三十卷凡一百卷鮑行卿以博學大才稱位後軍臨川王録事兼中書舎人遷步兵校尉上玉璧銘武帝發詔褒之嘗好韻語及拜步兵校尉面謝帝曰作舎人不免貧得五校實大尉例皆如此有集二十卷撰皇室儀十三卷乗輿龍興記三卷王僧孺少篤志精力於書無所不覩其文麗逸多用新事人所未見者世重其富為御史中丞髙祖製春景明志詩五百字勅在朝之人沈約以下同作髙祖以僧孺詩為最遷少府卿張率少好屬文而七畧及藝文志所載詩賦今亡其文者並補作之所著文衡十五卷文集三十卷有虞訥者見而詆之率乃一旦焚毁更為詩示焉託云沈約訥便句句嗟稱無字不善率曰此吾作也訥慙而退率為司徒掾直文徳省作待詔賦奏之甚見稱賞髙祖手勅答曰省賦殊佳相如工而不敏枚臯速而不工卿可謂兼二子於金馬矣又侍宴賦詩髙祖乃别賜率詩曰東南有才子故能服官政余雖慙古昔得人今為盛率奉勅徃返數首謝覽天監初為中書侍郎掌吏部事頃之即真覽為人美風神善辭令髙祖深器之嘗侍座受勅與侍中王暕為詩答贈其文甚工髙祖善之仍使重作復合㫖乃賜詩云䨇文既後進二少實名家豈伊爾棟隆信乃俱國華江革舉秀才累遷度支尚書有文集二十卷行於世子行敏好學有才俊官至通直郎早卒有集五卷子從簡少有文情年十七作採荷調以刺何敬容為當時所賞官至司徒從事郎中劉孝綽為秘書監辭藻為後進所宗世重其文毎作一篇朝成暮遍好事者咸誦傳寫流聞絶域文集數十萬言行於世孝威孝儀皆其弟孝威為太子中舎人庶子率更令掌館記大通九年白雀集東宮孝威上頌其辭甚美孝儀幼孤與兄弟相勵勤學並工屬文兄孝綽嘗曰三筆六詩三即孝儀六即孝威孝儀為尚書殿中郎勅令製雍州平等金像碑文甚宏麗有文集二十卷行於世王規為太子洗馬天監十二年改搆太極殿功畢規獻新殿賦其辭甚工蕭介少穎悟有器識博渉經史兼善屬文位至都官尚書蕭洽字宏稱幼敏悟及長好學博渉亦善屬文髙祖令製同泰大愛敬二寺刹下銘其文甚美又勅撰當塗堰碑辭亦贍麗集二十卷行於世官至司徒左長史康㡬字徳𤣥齊曲江公遥欣之子湘州刺史楊公則是曲江之故吏也毎見㡬謂人曰康公此子謂桓靈寳復出靈寳桓𤣥小字及公則卒㡬為之誄時年十五沈約見而竒之謂其舅蔡樽曰昨見賢甥楊平南誄文不減希逸之作始騐康公積善之慶終新安太守江子一為中書侍郎卒有文筆數十篇行於世何遜弱冠州舉秀才南鄉范雲見其對策大相稱賞因結忘年交好自是一文一詠雲輙嗟賞謂所親曰頃觀文人質則過儒麗則傷俗其能含清濁中今古見之何生矣沈約亦愛其文嘗謂遜曰吾毎讀卿詩一日三復猶不能已其為名流所稱如此後為仁威廬陵王記室復随江州未㡬卒東海王僧孺集其文為八卷初遜文章與劉孝綽並見稱於世世謂之何劉世祖著論論之云詩多而能者沈約少而能者謝眺時有㑹稽虞騫工為五言詩名與遜相埒官至王國侍郎其後又有㑹稽孔翁歸濟陽江避並為南平王大司馬府記室翁歸亦工為詩避博學有思理二人並有文集禇修善尺牘頗解文章初為湘東王國侍郎謝藺累遷外兵記室參軍時甘露降士林館藺獻頌髙祖嘉之因有詔使製北兖州刺史蕭楷徳政碑又奉令製宣成王奉述中庸頌所製詩賦碑頌凡數十篇謝㡬卿好學博渉有文彩起家豫章王國常侍陸雲公好學有才思先製太伯廟碑呉興太守張纉罷郡經途讀其文歎曰今之蔡伯喈也纉至都掌選言之於髙祖召兼尚書儀曹郎王籍好學博渉有骨氣樂安任昉見而竒之嘗於沈約坐賦得詠燭甚為約賞後為湘東王諮議參軍随府㑹稽郡境有雲門天柱山籍嘗遊之或累月不反至若耶溪賦詩有云蟬噪林逾静鳥鳴山更幽當時以為文外獨絶為詩慕謝靈運至其合也殆無愧色時人咸謂康樂之有王籍如仲尼之有丘明老𣆀之有嚴周何思澄為安成王參軍兼記室随府江州游廬山詩沈約見之大相稱賞自以為弗逮遊郊居宅新搆閣齋因命工書人題此詩於壁傅昭嘗請思澄製釋奠辭辭文典麗思澄子助嘗為敗家賦擬荘周馬捶其文甚工世人記曰人中爽爽何子朗終國山令劉杳工屬文沈約郊居宅新搆閣齋杳為賛二首并以所撰文章示約即命工書人題其賛於壁仍報杳書曰平生愛惜不在人中林壑之懽多與事奪日暮塗殫此心徃矣猶復少存閒逺㣲懐清曠拓宇東郊匪云止息正復頗寄夙心時得休偃仲長游居之地休延所述之美望慕空深何敢髣髴君愛素情多惠以二賛辭采研富事義畢舉句韻之間光影相炤便以此地自然十倍故知麗辭之益其事宏多輙當置之閣上坐卧嗟覽别卷上篇並為名製又山寺既為警策贈言時復髙竒解頥愈疾兼乎此美遲此叙㑹更共申析其為約所賞如此著林廷賦王僧孺見之嘆曰郊居以後無復此作普通中遷尚書吏部郎署儀曹僕射徐勉以臺閣文議專委焉劉顯以五官掾兼吏部嘗為上朝詩沈約美之約郊居宅新成因令工書人題於壁謝徴為臨汝侯淵猷製放生文見賞於世大同二年卒友人瑯琊王籍集其文為二十卷終尚書左丞臧嚴初為安成王侍郎轉常侍從叔為江夏郡攜嚴之官於塗作屯游賦任昉見而稱之又作七算辭亦富麗伏挺有才思好屬文為五言詩善效謝康樂體父友樂安任昉相見歎異嘗曰此子目下無䨇著邇説十卷文集二十巻丘遲年八嵗便能屬文髙祖平京邑時引為驃騎主簿勸進梁王及殊禮皆遲文也遷中書侍郎髙祖著連珠詔羣臣繼作者數十人遲文最美所著詩賦行於世遲辭采麗逸時有鍾嶸乃著詩評云范雲婉轉清便如流風廻雪邱遲㸃綴映媚似落花依草其見稱如此到溉為建安太守任昉以詩贈之求二衫叚云鐡錢兩當一百易代名實為惠當及時無待凉秋日溉答云余衣夲百結閩中徒八蠶假令金如粟詎使亷夫貪劉昭勤學善屬文外兄江淹早稱賞起家奉朝請諸葛璩舉秀才不就所著文章二十卷門人劉皦集而録之劉之遴舉茂才為太學博士中丞樂藹即之遴舅憲臺奏弹皆之遴草焉朱異為太學博士有文集百餘篇司馬褧為晉安王長史卒王命記室庾肩吾集其文為十卷蕭子顯好學屬文嘗著鴻序賦尚書令沈約見而稱曰可謂得其明道之髙致盖幽通之流也有文集二十卷終仁威将軍呉興太守蕭子暉為員外散騎侍郎嘗預重雲殿聽制講三惠經退為講賦奏之甚見稱賞到藎左民尚書溉之孫早慧歴尚書殿中郎嘗從髙祖幸京口登北顧樓賦詩藎受詔便就帝覽以示溉曰藎定是才子翻恐卿從來文章假手於藎因賜溉連珠曰研磨墨以騰文筆飛毫以書信如飛蛾之赴火豈焚身之可吝必耄年其已及可假之於少藎王訓為侍中美容儀善進止文章之美為後進領袖劉苞字孝常少好學能屬文為太子洗馬掌書記侍講夀光殿自髙祖即位引後進文學之事苞及從兄孝綽從弟孺同郡到溉溉弟洽從弟沆呉郡陸倕張率並以文藻見知多預讌坐庾於陵清警博學有才思為荆州大中正卒有文集十卷鍾嶸字仲偉衡陽王元簡出守㑹稽引嶸為寧朔記室專掌文翰時居士何𦙍築室若耶山山發洪水漂拔樹石室獨存元簡命嶸作瑞室頌以旌表之辭甚典麗嶸嘗品古今五言詩論其優劣名為詩評劉峻字孝標安成王季好峻學季遷荆州引為戸曹參軍後以疾去因遊東陽紫巖山築室居焉為山棲志其文甚美髙祖招文學之士有髙才多被引進遷以不次峻率性而動不能随衆沉浮髙祖頗嫌之故不任用乃著知命論以寄其懐劉勰字彦和撰文心雕龍五十篇論古今文也勰自重其文欲取定於沈約約取讀大重之謂為深得文理勰為文長於佛理京師寺塔及名師碑誌必請勰制文終步兵校尉庾仲容精専篤學為黝縣令卒有文集二十卷行於世任孝恭為司文侍郎勅遣製建陵寺刹下銘又自撰髙祖集序文並富麗自是專掌公家筆翰蕭子範為秘書監有文集三十卷二子滂礭並少有文章簡文在東宮時嘗與郡王數詣蕭文士滂礭亦預焉大寳初𦵏簡皇后使子範與張纉俱制哀策文簡文覽讀之曰今𦵏禮雖闕此文猶不減於舊後梁蔡太寳自宣帝為岳陽王特署記室及即位以為侍中尚書令太寳文辭贍速帝之章表書記叙令詔册並太寳專掌之所著文集十卷行於世傅准有文才善辭賦官至度支尚書所著文集二十卷范廸順陽人少機辯善屬文歴中書黄門侍郎尚書右丞散騎常侍有文集十卷沈君游呉興人博學有辭采位至散騎常侍天保十二年卒有文集十卷陳沈衆起家梁鎮衛南平王法曹參軍太子舎人武帝製千字詩衆為之注解與陳郡謝景同時召見于文徳殿帝令衆為竹賦成奏帝善之尋除鎮南湘東王參軍何修之為尚書左丞卒所著文章禮義百餘篇虞寄少聰敏及長好學善屬文性冲静有棲遁之志弱冠舉秀才對策髙第起家梁宣城王國左常侍大同中嘗驟雨殿前徃徃有雜色寳珠武帝觀之甚有喜色寄因上瑞雨頌帝謂寄兄荔曰此頌典裁清拔卿之士龍也将如何擢用寄聞之歎曰美盛徳之形容以申撃壤之情吾豈買名求仕者乎乃閉門稱疾惟以書籍自娯杜之偉幼精敏有逸才為太學限内博士皇太子釋奠於國學時樂府無孔子顔子登歌詞尚書叅議令之偉製其文令人傳習以為故事劉陟等鈔撰羣書各為題目所撰富民政教二篇皆之偉序虞荔美風儀博覽墳籍善屬文釋褐梁西中郎行參軍尋署法曹外兵參軍兼丹陽詔獄正梁武帝於城西置士林館荔乃制碑奏上帝命勒之於館仍用荔為士林學士沈初明為呉令侯景将宋子仙據呉興使召初明委以書記之任初明固辭子仙怒命斬之或救獲免子仙愛其才終逼之令掌書記及子仙為王僧辯所敗僧辯素聞其名於軍中購得之酬所獲者鐡錢十萬自是羽檄軍事皆出於初明及簡文遇害四方岳牧皆上表於江陵勸進僧辯令初明製表甚工當時莫有逮者髙祖南下與僧辯㑹於白茅灣登壇設盟初明為其文徐陵八嵗能屬文既長博渉史籍縱横有才辯梁簡文在東宮掌長春殿義記使陵為序元帝遣使北齊累求復命終留不遣乃致書於齊僕射楊遵彦遵彦不報齊送貞陽侯淵明為梁嗣乃遣陵随還太尉王僧辯初拒境不納淵明徃復致書皆陵辭也入陳為侍中太子少傅自有陳創業文檄軍書及受禪詔策皆陵所製而九錫尤美為一代文宗亦不以此矜物未嘗詆訶作者其於後進文徒接引無倦世祖髙宗之世國家有大手筆皆陵草之其文頗變舊體緝裁巧宻多有新意毎一文出手好事者已傳寫成誦遂被之華夷家蔵其本後逢喪亂多散失存者僅三十卷徐儉陵之子勤學有志操侯景亂陵使魏未反儉時年二十一攜老幼避於江陵梁元帝聞名召為尚書金部郎中嘗侍宴賦詩元帝嘆賞曰徐氏之子復有文焉蔡景歴為度支尚書景歴屬文不尚雕靡而長於叙事應機敏速為當世所稱姚察武帝永定初為始興王府記室參軍吏部尚書徐陵領著作復引為史佐致仕等表並請察製焉陵見歎曰吾弗逮也察毎有製述多用新竒專志著書白首不倦徐陵名髙一代毎見察製述尤所推重嘗謂子儉曰姚學士徳學無前汝可師之也尚書令江揔與察尤篤厚毎有製作必先以簡察然後施用揔為詹事時嘗製登宮城五百字詩當時副君及徐陵已下諸名賢並同此作徐公後謂江曰我所和第五十韻當入弟集内及江編次文章無復察所和本江述徐此意謂察曰髙才碩學庶光拙文今湏公所和五百字用偶徐僕射也察謙遜未付江曰若不得公此製僕詩亦湏棄本復乖徐公所寄豈得見令兩失察不獲已乃寫本付之為通人推挹例皆如此顔晃少孤貧好學有詞采初為文帝記室參軍髙祖永定二年幸大荘嚴寺其夜甘露降晃獻甘露頌詞義該典髙祖大竒之陸琰字温玉累遷始興王外兵參軍直嘉徳殿學士文帝聴覽餘暇頗留心史籍以琰博學善占誦引置左右嘗使製刀銘琰援筆即成無所㸃竄世祖嗟賞乆之賜衣一襲傅繹在湘州王琳聞其名引為記室琳敗随琳将孫瑒還都時文帝使顔晃賜瑒雜物瑒託繹啓謝辭理優洽文無加㸃晃還言之文帝尋召為撰史學士除司空府記室參軍隂鏗幼聰慧五嵗能誦數千言及長博渉史傳尤善五言詩為當時所重為始興王府中録事參軍文帝嘗宴羣臣賦詩徐陵言之於帝即日召鏗預宴使賦新成安樂宮鏗援筆便就帝甚嘆賞之禇玠早有令譽先達多以才器許之及長美風儀善占對博學能屬文詞義典實不好麗靡玠所製章奏雜文二百餘篇皆切事理繇是見重於時位終御史中丞陸琛少警俊文帝為㑹稽太守琛年十八上善政頌甚有詞采繇此知名舉秀才赴京衡陽王主簿兼東宮管記徐伯陽為侯安都司空參軍宣帝大建初與中記室李爽記室張正見尚書郎賀徹學士阮卓黄門郎蕭詮三公郎王繇禮處士馬樞記室祖孫登比部賀循長史劉刪等為文㑹之友後有蔡凝劉助陳暄孔範亦預焉皆一時之士也游宴賦詩遂勒成卷軸伯陽為其集序盛傳於世伯陽為新安王記室時鄱陽王為江州刺史伯陽嘗奉使造焉王率府僚與伯陽登匡廬嶺置宴酒酣命筆賦雜韻二十伯陽與祖孫登共成王賜以奴婢及雜物皇太子幸太學詔新安王於辟雍發論語題仍命伯陽為辟雍頌甚見嗟賞陸瑜少篤學美詞藻為東宮學士宣帝大建二年太子釋奠於太學宮臣並賦詩命瑜為序文甚贍麗謝貞為南平王友加招逺将軍掌記室事府長史河南周礭新除都官尚書請貞為讓表後主覽而竒之嘗因宴席問礭曰卿表自製邪礭對曰臣表謝貞所作後主因勅舎人施文慶曰謝貞在王處未有禄秩可賜米百石江揔好學能屬文於五言七言尤善然傷於浮艶故為後主所愛幸多有艶篇有好事者相傳諷玩於今不絶至隋為上開府卒於江都有文集三十卷行於世陸從典為太子舎人後主賜僕射江揔并其父瓊詩揔令從典為謝啓俄頃便就文華理暢揔甚異焉蕭允為鄱陽王長史王出鎮㑹稽允行經延陵季子廟設蘋藻之薦託為異代之交為詩以叙意詞理清典後主嘗問蔡徴曰卿世與蕭允相知此公志操何如徴曰其清雲𤣥逺殆不可測至於文章可得而言因誦允詩以對後主嗟賞久之其年拜光禄大夫沈不害為通直散騎兼尚書左丞不害治經術善屬文雖博綜墳典而家無卷軸毎製文操筆立成曾無尋簡僕射汝南周宏正嘗稱之曰沈生可謂意聖人乎著文集十四卷初不害為衡陽王記室參軍兼嘉徳殿學士表改定樂章文帝詔使製三朝樂歌八首合二十八曲行之樂府張正見幼好學有才累遷通直散騎侍郎有集十四卷其五言詩尤善大行於世江徳操好學善屬文位終新渝令所著文章十五卷庾特篤志好學尤善書記毎屬辭好為竒字有集十卷位終步兵校尉後魏張衮好學有文才道武為代王選衮為左長史從太子破賀納遂命羣官登勿居山游宴終日從官及諸部大人請聚石為峰以記功徳命衮為文鄧穎為中書侍郎駕幸漠南髙車莫弗庫若干率騎數萬餘驅鹿百萬詣行在所詔穎為文銘於漠南以紀功徳袁躍字景騰博學有雋才為員外散騎常侍将立明堂躍乃上議當時稱其博洽蠕蠕主阿那瓌之破來奔朝廷矜之送復其國既而毎使朝貢辭㫖頗不盡禮躍為朝臣書與瓌陳以禍福言詞甚美後遷太傅清河王懌文學懌之文表多出於躍崔𤣥伯少有雋才因苻堅亂欲避地江南於泰山為張願所獲本圖不遂乃作詩以自傷而不行於時葢懼罪也及父浩誅中書侍郎髙允受勅収浩家始見此詩允知其意允孫綽録於允集𤣥伯位至天部大人𤣥伯自非朝廷文誥四方書檄初不染翰故世無遺文封軌為廷尉少卿沉謹好學博通經傳以務徳慎言修身之夲姦回䜛佞世之巨害乃為務徳慎言逺佞防姦四戒文多不載陸暐擬急就篇為悟蒙章及七誘十醉章表數十篇位至伏波将軍髙允作塞上公詩有混欣戚遺得喪之致為太常卿上代都賦因以諷規亦二京之流也初允太武神䴥中與盧𤣥等俱被徴拜中書博士再遷中書令獻文初以昔嵗同徴零落将盡感逝懐人作徴士頌葢止於應命者其有命而不至則闕焉羣賢之行舉其梗槩髙和仁為殿中侍御史少清簡有文才為五言詩贈太尉屬盧仲宣仲宣深所嘆重李籍之性謹正粗渉文史為大中大夫著忠誥一篇文多不載胡叟少聰慧好屬文既善為典雅之詞又工為鄙俗之句初入長安京兆韋祖思召而見之待叟不足叟拂衣而出至主人家賦韋杜二族一宿而成年十有八矣具述前載無違舊美叙中世有恊時事而末及鄙凟人皆竒其才畏其筆世猶傳誦之以為笑狎歸後為武威将軍家於宻雲被徴至謝㤙并獻詩一篇文成時召叟及金城宗舒並使作檄劉駿蠕蠕之文舒劣於叟舒尋歸家游雅為秘書監文成詔為太華殿賦髙閭為中書侍郎奉詔造鹿野苑頌北伐碑獻文善之位至光祿大夫好為文章軍國書檄詔令碑頌銘賛百有餘篇集為二卷其文亦髙允之流二髙為當時所服趙逸好學夙成為中書侍郎凡所著述詩賦銘頌五十篇盧道将秘書監淵子頗有文才為一家後來之冠位至司徒司馬卒所遺文筆數十篇劉懋字仲華博綜經史位至太尉司馬所著詩誄賦頌及諸文筆見稱於世游肇以文雅見稱為詩賦表啓凡七十五篇皆傳於世位至驃騎将軍崔纂字叔則博學有文才為散騎侍郎既不為時知乃著無談子論李彪為御史中尉所著詩賦誄頌章奏雜筆百餘篇别有集李諧博學有文辯當時俊才咸相欽賞所著文集别有集録行於世位至秘書監邢産字士寳好學善屬文少時作孤蓬賦為時所稱舉秀才除著作佐郎崔光夲名孝伯字長仁遷中書侍郎給事黄門侍郎甚為孝文所知待嘗曰孝伯之才浩浩如黄河東注固今日之文宗也太和中依宮商角徴羽本著而為五韻詩以贈李彪彪為十二次韻以報光光又為三百郡國詩以答之凡所為詩賦銘賛及表記啓數百篇五十餘卷甄宻字叔雍侍中琛從父弟也太和中為奉朝請宻疾世俗貪競乾沒榮寵曾作風賦以見意甄琛為侍中所著家誨二十篇篤學文一卷又著磔四聲姓族廢興㑹通緇素三論頗行於世袁飜少以才學擅美一時自廷尉少卿出為平陽太守頗有不平之論及之任不自得遂作惡歸賦累遷度支尚書所著文筆百餘篇行於世常景少聰敏長有才思為太常博士宣武季舅䕶軍将軍髙顯卒其兄右僕射肇私記景及尚書邢巒并州刺史髙聰通直郎徐紇各作碑銘並以呈御宣武悉付侍中崔光以景所造為最乃奏曰常景名位乃處諸人之下文出諸人之上遂以景文刻石正光中除景龍驤将軍孝明於國子寺行釋奠之禮並召百官作釋奠詩時以景作為美初平齊之後光禄大夫髙聰徙於北京中書髙允為之聘妻給其資宅聰後為允立碑毎云吾此文報徳足矣豫州刺史常綽以未盡其美景尚允才器先為遺徳頌司徒崔光聞而觀之尋味良久乃云髙光禄平日毎矜其文自許報允之徳今見常生此頌髙氏不得獨擅其美也尋進號冠軍将軍時尚書令季崇等追討蠕蠕不及詔景出塞經瓮山臨瀚海宣勅勒衆而返景經山水悵然懐古乃擬劉琨扶風歌十二首景性温和恭慎毎讀書見韋弦之事深薄之危乃圗古昔可以鑒戒指事為相讃而述之所著數百篇行於世邢臧字子良博學有藻思為太學博士孝明正光中議立明堂臧為裴頠一室之議當時稱其理博有文筆凡百餘篇裴景融雖才不稱學而敏綴無倦文辭泛溢理㑹處寡所作文章别有集録又造鄴都晉都賦云孝荘時為諌議大夫領著作栁𤣥逹曾著大夫論備陳裴叔業背逆歸順契闊危難之㫖又著喪服約而易尋官至司徒諮議叅軍楊固為治書侍御史尉王顯奏固剰請米麥免官既無事役遂闔門自守著演頥賦以眀幽㣲通塞之事張烈為家誡千餘言并自叙志行及所歴之官位至瀛州刺史髙謙之有學藝所著文章百餘篇别有集録官至御史馮元興博通禮傳有文才為中書舎人有文集百餘篇封肅字元邕早有文思博渉經史修起居注兼廷尉監為圜園賦其詞甚美孝眀正光中京兆王西征引為大行臺郎中委以書記撰古來文章并序作者氏族號曰文譜未就病卒時賢良惜之其文筆凡百餘篇邢虬為光禄少卿明經有文思所作碑頌雜筆三十餘篇梁祚為中書博士作代都賦頗行於世夏侯道遷為豫州刺史雖學不周洽而歴覽書史閑習尺牘札翰往來甚有意理裴敬憲學博才清為太學博士五言之作獨擅於時名聲甚重後進咸共宗慕之中山鎮部朝賢送於河梁賦詩言别皆以敬憲為最其文不能贍逸而有清麗之美温子昇博覽百家文章清婉為廣陽王淵賤客在馬坊教諸奴子書作侯山祠堂碑文給事中常景見而善之故詣淵謝之景曰頃見温生淵怪問之景曰温生是大才士淵由是稍知之累遷中書舎人散騎常侍領夲州大中正梁武使張臯寫子昇文筆傳於江外梁武稱之曰曹植陸機復生於北土恨我辭人數窮百六陽夏太守傅標使吐谷渾見其國主牀頭有書數卷乃是子昇文也濟隂王暉業嘗云江左文人宋有顔延之謝靈運梁有沈約任昉我子昇足以陵顔轢謝含任吐沈楊遵彦作文徳論以為古今辭人皆負才遺行澆薄險忌惟邢子才王元景温子昇彬彬有徳素梁祐為大中大夫從容風雅好為詩詠李仲尚儀貌甚美少以文學知名二十著前漢功臣序讃及季父司空冲誄時兼侍中髙聰尚書邢巒見而歎曰後生可畏非虗言也起家京兆王參軍祖瑩歴散騎黄門侍郎以文學見重嘗語人云文章湏自出機杼成一家風骨何能共人同生活也葢譏世人好竊他文以為己用而瑩之筆札亦無乏天才但不能均調玉石兼有製裁之體不減於袁常焉裴伯茂學渉羣書文藻富贍為中軍大将軍伯茂好飲酒頗渉踈傲久不徙官曾為豁情賦東魏天平初遷鄴又為遷都賦邢昕好學蚤有才情為平東将軍光禄大夫時言冒竊官級為中尉所劾免官乃為述躬賦北齊邢邵字子才臧之弟也十嵗能屬文文章典麗既贍且速年未二十名動衣冠後為著作佐郎深為領軍元乂所禮乂新除尚書令尚書李神儁與陳郡袁飜在席乂令邵作謝表湏臾便以示諸賓神儁曰邢邵此表足使袁公變色魏孝昌與黄門侍郎李琰之對典朝儀自孝明之後文雅大盛邵雕蟲之美獨歩當時毎有一文初出京師為之紙貴讀誦俄遍逺近荀士遜好學有思理為文清典為中書侍郎撰典言行於世祖珽字孝徴神情機悟詞藻遒逸嘗為冀州刺史万俟受雒製清徳頌其文典麗繇是神武聞之時文宣為州刺史署珽開府倉曹參軍神武送魏蘭陵公主出塞嫁蠕蠕魏収賦出塞及公主逺嫁詩二首珽皆和之大為時人傳詠珽後為秘書丞領舎人事文襄與令史等作晉州啓請粟二千石代功曹趙彦深宣神武教給城局叅軍事過典籖髙景畧疑其不實宻以問彦深彦深答都無此事遂被推簡珽即引伏神武大怒决鞭二百配甲坊加鉗其榖倍徴未及科㑹并州定國寺成神武謂陳元康温子昇曰昔作芒山寺碑文時稱妙絶今定國寺碑當使誰作辭也元康因薦珽才學并解鮮卑語乃給筆札就禁所具二日内成其文甚麗神武以其工而且速特恕不問然猶免官散參相府祖鴻勲涿郡范陽人神武曾徴至并州作晉祠記好事者玩其文位至髙陽太守顔之推博覽羣書辭情典麗有文三十卷並行於世曾撰觀我生賦文致清逺入隋為太子學士鄭元禮字文規少好學愛文藻名望文襄引為舘客歴太子舎人崔昂後妻即元禮之妹也魏収又昂之姊夫嘗持元禮數篇詩示盧思道乃謂思道云看元禮此來詩詠亦當不減魏収答云未覺元禮賢於魏収但知姊夫疎於婦弟終台州别駕楊愔字彦遵風度深敏所著詩賦表奏書論甚多及誅後散失門生鳩集所得者萬餘言位至驃騎大将軍開封王北齊裴諏之字士正少有儒學楊愔闔門葬記諏之頓作十餘墓誌文皆可觀入周為文帝大行臺倉曹郎中卒陸印字雲駒少機悟善屬文所著文章十四卷行於世齊之郊廟諸歌多印所製位終吏部郎中王昕字元景少篤學雅好清言有集二十卷位至銀青光禄大夫判祠部尚書王晞字叔朗好學不倦文宣天保初行太原郡事嘗詣晉祠賦詩曰日落應歸去魚鳥見留連劉逖字子長留心文藻頗工詩詠所制詩賦及雜文筆二十卷位至散騎常侍荀仲舉為義寜太守仲舉與趙郡李槩交遊槩死仲舉因至其宅為五言詩十六韻以傷之辭甚悲切世稱其美蕭慤工於詩詠曾秋夜賦詩兩句云芙蓉露下落楊栁月中疎為知音所賞官為田曹參軍李廣博渉羣書有才思文義之美少與趙郡李謇齊名為邢魏之亞兼侍御史南臺文奏多其辭也曾薦畢義雲於崔暹廣卒後雲集其文章十卷託魏収為之序其族人子道亦有文章樊遜寓居鄴中為臨漳小史縣令裴鑒莅官清苦致白雀等瑞上清徳頌十首鑒大加賞重擢為主簿册府元龜卷八百三十九
