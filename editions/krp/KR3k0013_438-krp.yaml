body:
  text: 冊府元龜卷四百三十八宋王欽若等撰將帥部無功奔亡無功夏書曰愛克厥威允罔功是知典國兵柄為人司命茍泥於膠柱之説必坐致輿尸之凶然而雄不竝立戰乃危事客主之勢勝負交變若乃中人之將僅呼兒戲謀不慮始事或過舉雖非敗乃大事抑以挫乎國威其有夙負能名克貞師律練攻守之術習鬭擊之技或以天時弗順地利非便强弱異態逺近不属而能按隊以退承詔而還始守重閉之方庶免䘮師之咎因是降黜亦無負於士衆焉亷頗為趙將奔魏楚聞之因使人迎頗頗一為楚將無功漢李息事景帝至武帝立八歳為材官將軍軍馬邑後六歳為將軍出代後三歳為將軍從大將軍出代後三歳為將軍從大將軍出朔方皆無功李廣元朔六年為將軍出定襄諸將多中首虜率為侯者中猶充也充本法得首若干封侯也率謂軍功封賞之科著在法令者也中音竹仲反其下率亦同而廣軍無功郭昌元封四年以大中大夫為㧞胡將軍屯朔方還擊昆明無功奪印公孫敖為因杅將軍天漢元年出河西與强弩都尉㑹涿邪山亡所得李廣利為貳師將軍天漢三年將六萬騎歩兵七萬出朔方强弩都尉路博德將萬餘人與貳師㑹游擊將軍韓悅歩兵三萬人出五原即韓説也因杅將軍敖將騎萬歩兵三萬人出鴈門匈奴聞悉逺其累重于余吾水北累重謂妻子資産也累力瑞切重音直用切而單于以十萬騎待水南與貳師接戰貳師解而引歸與單于連鬭十餘日游擊亡所得因杅與左賢王戰不利引歸至征和三年遣貳師將軍七萬人出五原御史大夫商丘成將三萬餘人出西河重合侯莽通將四萬騎出酒泉千餘里單于聞漢兵大出悉遣其輜重徙趙信城北邸郅居水邸音丁禮反郅音之日反左賢王驅其人民渡余吾水六七百里居兜銜山單于自將精兵左安侯渡姑且水御史大夫軍至追邪徑無所見還從疾道而追之不見虜而還也邪音似嗟反匈奴使大將與李陵將三萬餘騎追漢軍至浚稽山合轉戰九日漢兵陷陳郤敵殺傷虜甚衆至蒲奴水虜不利還去重合侯軍至天山匈奴使大將偃渠與左右呼知王將二萬餘騎要漢兵見漢兵強引去重合侯無所得失後漢王霸建武九年為討虜將軍與呉漢及横野大將軍王常建義大將軍朱祐破姦將軍侯進等五萬餘人擊盧芳將賈覽閔堪于高栁匈奴遣騎助芳漢軍遇雨戰不利呉漢還雒陽令朱祐屯常山王常屯涿郡侯進屯漁陽璽書拜覇上谷太守領屯兵如故霸又與驃騎大將軍杜茂㑹攻盧芳將尹繇于崞繁畤不尅馬援建武十九年將三千騎出高柳行鴈門代郡上谷障塞烏桓候者見漢軍至虜遂散去援無所得而還任尚為征西校尉安帝永初元年先零别種滇零與鍾羌諸種大為寇掠郡縣不能制遣車騎將軍鄧隲與尚擊之隲尚軍大敗遂寇抄三輔朝廷以鄧太后故迎拜隲為大將軍封尚樂亭侯食邑三百户三年春復遣其騎都尉任仁督諸郡屯兵救三輔仁戰每不利衆羌乗勝漢兵數挫當煎勒姐種攻没破羌縣鍾羌又没臨洮縣生得隴西南部都尉明年春滇零遣人寇褒中燔燒郵亭大掠百姓于是漢中太守鄭勤移屯褒中軍營久出無功有廢農桑又詔任尚將吏兵還屯長安罷遣南陽潁川汝南吏士五年春任尚坐無功徵免馮煥為幽州刺史建元元年正月率二郡太守討高句驪濊貊不尅任渉初為涼州從事順帝陽嘉三年刺史孟他遣渉將燉煌兵五百人與戊巳司馬曹寛西域長史張宴將焉耆龜兹車師前後部合三萬餘人討䟽勒攻楨中城四十餘日不能下引去其後䟽勒王連相殺害朝廷亦不能禁董卓靈帝時拜為東中郎將討先零羌竝不尅又與北中郎將盧植討張角竝無功而還魏曹真為大司馬以蜀連出侵邊境宜遂伐之數道竝入可大克也真發長安從子午道南入司馬宣王泝漢水當㑹南鄭諸軍或從斜谷道或從武威入㑹大霖雨三十餘日棧道斷絶明帝詔眞還軍蜀姜維為衛將軍後主延熙十六年夏率軍數萬人出石營經董亭圍南安魏雍州刺史陳泰解圍至雒門維糧盡退還十八年出狄道住鍾題十九年春就遷大將軍二十年魏征東大將軍諸葛誕反于淮南分關中兵東下維欲乗虛向秦川復率數萬人出駱谷徑至沈嶺時長城積穀甚多而守兵乃少聞維方到衆皆惶懼魏大將軍司馬望拒之鄧艾亦自隴右皆軍于長城維前駐亡水皆倚山為營望艾傍渭堅圍維數下挑戰望艾不應景耀元年維聞誕破敗乃還成都呉呂岱為昭信中郎將漢建安十六年岱督郎將尹異等以兵二千人西誘漢中賊帥張魯到漢興寋城魯嫌疑斷道事計不立大帝遂召岱還朱然為車騎將軍右䕶軍嘉禾三年大帝與蜀克期大舉大帝自向新城然與全琮各受斧鉞為左右督㑹吏士疾病故未攻而退諸葛恪為太傅荆揚州牧督中外諸兵大元二年三月率兵伐魏四月圍新城大疫兵卒死者大半秋八月恪引兵退初恪欲出兵諸大臣同辭諌恪恪不聽違衆出兵大發州郡二十餘萬衆百姓騷動恪圍新城攻守連月城不㧞士卒疲勞因暑飲水水泄下流病腫者大半死傷塗地魏知戰士罷病乃進救兵恪引兵而去士卒傷病流曳道路或頓仆坑壑或見略獲存亡忿痛大小嗟呼而恪晏然自若詔召相銜徐乃旋師陸抗為鎮軍將軍景帝永安七年三月與撫軍歩恊征西將軍劉平建平太守盛曼率衆圍蜀巴東守將羅憲魏使將軍胡烈歩騎二萬侵西陵以救憲抗等引軍還丁奉為右大司馬左軍師呉孫皓建衡元年帥衆治徐塘因攻晉穀陽穀陽民知之引去奉無所獲呉主怒斬奉導軍李朂為監軍建衡元年呉主遣監軍虞汜威南將軍薛珝蒼梧太守陶璜由荆州朂與督軍徐存從建安海道皆就合浦擊交趾二年春朂以建安道不通利殺導將馮斐引軍還晉叚匹磾為幽州刺史推并州刺史劉琨為大都督同討石勒㰱血載書檄諸防守俱集襄國琨匹磾進屯固安以俟衆軍匹磾從弟末杯納勒厚賂獨不進乃阻其計琨匹磾以勢弱而退毛穆之為右將軍西蠻校尉益州刺史領建平太守假節戍巴郡以子球為梓潼太守穆之與球伐苻堅至于巴西郡以糧運乏少退屯巴東病卒宋劉敬宣為冠軍將軍晉安帝義熙中高祖表遣敬宣率兵五千伐蜀既入峽分遣振武將軍巴東太守温祚以二千人揚聲外水自率益州刺史鮑陋輔國將軍文處茂龍驤將軍時延祖由墊江而進敬宣率先士卒轉戰而前達遂寧郡之黄虎去成都五百里偽輔國將軍譙道福等悉衆拒嶮相持六十餘日大小十餘戰賊固守不敢出敬宣不得進食糧盡軍中多疾疫死者大半引軍退張興世為逰擊將軍海道北伐假輔國將軍加節置佐無功而還劉道産為長沙王道憐驃騎將軍時廣州羣盜因刺史謝道欣死為㓂攻没州城道憐加道産振武將軍南討㑹叔父謙之已平廣州道産未至而反南齊垣崇祖初仕宋為輔國將軍行徐州事徙戍龍沮龍沮在朐山南崇祖啓斷水注平地以絶虜馬明帝以問劉懷珍云可立崇祖率將吏塞之未成魏主謂彭城鎮將平陽公曰龍沮若立國之耻也以死爭之數萬騎掩至崇祖馬槊陷陣不能抗乃築城自守㑹天雨十餘日魏兵乃退龍沮竟不立劉懐珍初仕宋為輔國將軍太始初青州刺史沈文秀拒命明帝遣其弟文炳宣諭使懷珍領馬歩三千人隨文炳俱行未至薛安都引虜入㓂徐兖已没張永沈攸之于彭城大敗勅懷珍歩從旴眙自淮隂濟淮救永等而官軍為虜所逐相繼奔歸懷珍乃還王廣之為左軍將軍太祖建元元年魏軍動詔假廣之節駐淮上廣之家在彭沛啟求招誘鄉里部曲北取彭城帝許之以廣之為使持節都督淮北軍事平北將軍徐州刺史廣之引軍過淮無所尅獲坐免官陳胡頴仕梁為豫章内史隋高祖鎮京口高祖圍廣陵齊人東方老據宿豫請降以穎為五原太守隨杜僧明援廣陵不尅退還除曲阿令陳詳為宣城太守王琳下據柵口詳隨呉明徹襲湓城取琳家口不尅因入南湖自鄱陽歩道而歸琳平詳與明徹竝無功蕭摩訶宣帝太建中自淮南徵還授右衛將軍十一年周兵冦壽陽詔摩訶與樊毅等衆軍赴援無功而還後魏李栗道武時為左將軍慕容寳棄中山東走栗以輕騎追之不及而還古弼為安西將軍與永昌王建等討馮文通文通嬰城固守弼芟禾而還羅伊利孝文時為安東將軍蠕蠕來冦詔伊利追擊之不及而反劉昶孝文時為南齊雍州刺史曹虎之詐降也詔昶以兵出義陽無功而還張滿為南中郎將南蠻校尉𨽻平南大將軍長孫嵩往禦晉師及宋武帝入長安乃還後從安平公叔孫建攻青州不克而還皮豹子為内都大官先是河西諸胡亡匿避命豹子及前涇州刺史封阿君督河西諸軍南趣石樓與衛大將軍樂安王良以討羣胡豹子等與賊相對不覺胡走無㨗而還坐免官楊椿為安東將軍宣武永平初徐州彭城人成景携以宿豫叛詔椿率衆四萬討之不尅而返淳于誕為伐蜀别部司馬領鄉導統軍師次晉壽蜀人大震屬宣武宴駕不果而還伊盆生孝明時為持節右將軍雒州刺史與荆州刺史淮南王世遵魯陽太守崔模俱討襄陽不尅而還坐免官穆紹孝莊時為尚書令司空公加侍中爾朱榮之討葛榮也詔上黨王天穆為前鋒次於懐縣司徒公楊椿為右軍紹為後繼未發㑹擒葛榮乃止元顥入雒以紹為兖州刺史行達東郡顥敗而返席法友為冠軍將軍梁將楊公則冦揚州假法友征虜將軍以討之法友未至而公則敗走後假法友前將軍持節為别將出淮南解朐山之圍法友始渡淮而朐山敗没遂停散十年後周董紹為御史中尉進策請圖梁漢以紹為行臺梁州刺史閣内都督趙剛以為不可而朝議已决遂出軍紹竟無功還免為庶人田𢎞為驃騎大將軍武帝天和二年陳湘州刺史華皎來附𢎞從衛公直赴援與陳人戰不利仍以𢎞為江陵總管及陳將呉明徹來冦𢎞與梁王蕭巋退保總南令副總管高琳拒守明徹退乃還江陵賀若敦為驃騎大將軍討陳將侯瑱侯安都于湘州相持歳餘瑱等不能制求借船送敦渡江敦慮其或詐拒而弗許瑱復遣使謂敦曰驃騎在此既久今欲給船相送何謂不去敦報云湘州是我國家之地為爾侵逼敦來之日欲相平殄既未得一决所以不去瑱後日復遣使來敦謂使者云必須我還可捨我百里當為汝去瑱等留船于江將兵去津路百里敦覘知非詐徐理舟檝勒衆而還隋閻毗為殿内少監從煬帝征遼東帝班師兵部郎中斛斯政奔遼東帝令毗率騎二千追之不及政據高麗栢崖城毗攻之二月有詔徵還周羅㬋當遼東之役徵為本軍總管自東莱汎海趣平壤城遭風船多飄没無功而還段文振為行軍總管率衆出廬州道以備胡虜無功而還杜整為左武衛將軍突厥犯塞詔遣衛王爽總戎北伐以整為行軍總管兼元帥長史至合川無虜而還唐蘇定方為左驍衛大將軍高宗龍朔三年二月定方頓兵于平壤城下高麗乆不送欵屬大雪泥濘遂解圍勒兵而退張敬則為鳯翔節度使嘗慨然有復河湟志大將野詩良輔潛發銳卒至隴西蕃戎大駭屬風雨暴至無功而還方更圖進取德宗慮其財力不足密詔止之馬燧德宗建中三年為魏州大都督府長史兼魏博澶相四州節度觀察招討等使田悦朱滔王武俊兵亦至魏縣與官兵隔江對壘三盜於魏縣軍中逓相推奨王號朱滔稱冀王田悦稱魏王王武俊稱趙王又遣使于李納納稱齊王四盜共推淮西李希烈為天下兵馬元帥太尉建興王皆偽署官號如國初行臺之制而名目頗有妖僻者然未敢偽稱年號而五盜合從圖傾社稷兩河鼎沸寇盜横行燧等雖志在勤王竟莫能劻勷患難四年十月涇師犯闕帝幸奉天燧引軍還太原嚴綬為荆南節度使憲宗元和九年呉元濟叛朝議加兵以綬有𢎞恕之稱可委以戎柄乃授山南東道節度使尋加淮西招撫使綬自帥師壓賊境無威略以制寇到軍日遽發公藏以賞士卒累年蓄積一旦而盡又厚賂中貴人以招聲援師徒萬餘閉壁而已經年無尺寸功裴度見帝屢言綬非將帥之才不可責以戎事乃拜太子少保范希朝元和中為河東節度等使太原尹北都留守率師討鎮州無功既耋且病事不治除左龍武軍統軍袁滋為彰義軍節度隋唐鄧申光觀察使逆賊呉元濟與官軍對壘數年滋竟以淹留無功貶撫州刺史後唐袁象先初仕梁為天平軍兩使留後梁祖北征以象先為鎮定東南行營都招討應接副使令兵攻蓨縣不克而還劉訓為襄州節度使明宗天成中荆南高季興叛詔訓為南面行營招討使知荆南行府事是時湖南馬殷請以舟師㑹及師至荆渚殷軍方到岳州仍專意于訓許助軍儲弓甲之類乆之略無至者荆渚地氣卑濕漸及霖潦糧運不繼人多疾疫訓本無將略人咸苦之及招討使孔循至得襄州小校竹龍之術乃造竹龍二道傳於城下竟無所濟遂罷兵領將士散略居民而廻詔訓赴闕尋責授澶州刺史安從進為延州節度使長興四年秋進攻夏州初王師既攻夏州州城即赫連勃勃之故城也父老相傳云勃勃蒸土築之王師數道攻擊從進穴地道至其城下如鐵石攻鑿不能入李彛超昆仲登城謂從進曰孤弱小鎮不勞王師攻取虛煩國家餉運得之不武為僕聞天乞容改圖而又党項部族萬餘騎薄我糧運而野無芻牧關輔之人運斗粟束槀動計數千窮民泣血無所控訴復為蕃部殺掠明宗聞其若此乃命班師周王峻為樞宻使廣順元年河東劉崇與契丹圍晉州命峻為行營都部署至陜駐留數夕劉崇攻晉州甚急太祖憂其不守及議親征取澤州路入與峻㑹合先令諭峻峻遣驛騎馳奏請不行幸時已降御札行有日矣㑹峻奏至乃止峻軍已過絳郡拒平陽一舍賊軍燔營狼狽而遁峻入晉州或請追賊必有大利峻猶豫久之翊日方遣騎軍襲賊信宿而還向使峻極力追躡則并汾之孽無噍類矣峻亦深耻無功計度城平陽而廻奔亡若夫膺棨㦸之賜叅爪牙之任值四方之多事當萬乗之注意或時危勢促計窘途窮潛假息於隣邦乃茍生於異域雖奔亡之一貫在心迹則各殊若乃合謀而兾扶宗室唱義而將除巨猾摧鋒陷陣致權貴之不平追叛失利為強敵之見廹此皆理或可哀事非獲已至如萌疑忌之心避誅夷之患兵折勢窘携妻子而去糧盡力殫與溝瀆為期此故為盡節之士所笑死難之夫攸耻其餘𤨏𤨏何足算哉後漢呂布為中郎將與王允既殺董卓允以布為奮威將軍假節儀同三司封温侯允既不赦凉州人由是李傕等還攻長安布不能拒乃將數百騎出武關奔南陽袁術待之甚厚布自恃殺卓有徳袁氏遂恣兵抄掠術患之布不安復去從張楊於河内時李傕等購募求布急楊部下諸將皆欲圖之布懼謂楊曰與卿州里今見殺其功未必多不如生賣布可大得催等爵寵楊以為然有頃布得走投袁紹紹與布擊破張燕布既恃其功更請兵于紹紹不許而將士多暴橫紹患之布不自安求還雒陽聽之承制使領司𨽻校尉遣壯士送布而隂使殺之布疑其圖已乃使人鼓箏于帳中潛自遁出夜中兵起而布已亡紹聞懼為患募遣追之皆莫敢逼遂歸張楊道經陳留太守張邈邈遣使迎之以為兖州牧據濮陽郡縣皆應唯鄄城東阿范為太祖守太祖引軍還與布戰于濮陽太祖軍不利相持百餘日是時歲旱蝗蟲少穀百姓相食布東屯山陽二年間太祖乃盡復收諸城擊破布于鉅野布東奔劉備布見備甚敬之謂備曰我與卿同邊地人也布見關東起兵欲誅董卓布殺卓東出關東諸將無安布者皆欲殺布耳請備于帳中生牀上令婦向拜酌酒飲食名備為弟備見布語言無常外然之而内不悦魏文欽為廬江太守冠軍將軍時司馬宣王已誅曹爽欽爽邑人乃進欽為前將軍以安其心後代諸葛誕為揚州刺史自曹爽之誅欽嘗内懼與諸葛誕相惡無所與謀㑹誕去郡毌丘儉往乃隂共結謀戰敗走晝夜間行追者不及遂得入呉呉以欽為都䕶假節鎮北大將軍幽州牧譙侯欽䧏呉表曰命禀不幸嘗𨽻魏國兩絶於天下側伏偶都自知無路司馬師滔天作逆廢害二主辛癸高莽惡不足踰欽累世受魏恩烏鳥之情竊懷憤踊在三之義期于斃仆前與毌丘儉郭淮等俱舉義兵當共帥師掃除㓙孽誠以慺慺愚管所執智慮淺薄㣲節不騁進無所依悲痛切心退惟不能扶翼本朝抱愧俛仰靡所自厝冐緣古義固有所歸庶假天威得展萬一僵仆之日亦所不恨輙相率將歸命聖化慙偷茍生非辭所陳謹上還所受魏使持節前將軍山桑侯印綬臨表惶惑伏須罪誅夏侯霸為征蜀䕶軍時征西將軍夏侯𤣥於霸為從子而𤣥于曹爽為外弟及司馬宣王誅爽遂召𤣥霸聞爽被誅而𤣥又徵以為禍必轉相及心既内恐又霸先與雍州刺史郭淮不和而淮代𤣥為征西霸尤不安故遂奔蜀南趣隂平而失道入窮谷中糧盡殺馬歩行足破卧巖石下使人求道未知何之蜀聞之乃使人迎霸晉牽秀司空張華請為長史後張昌作亂長沙王乂遣秀討昌秀出關因奔成都王頴孫惠為廣武將軍時元帝遣甘卓討周馥于壽陽惠乃率衆應卓馥敗走廬江何鋭為安豐太守惠權留郡境鋭以他事收惠下人推之惠既非南朝所授嘗慮讒間因此大懼遂攻殺鋭奔入蠻中劉隗為鎮北將軍督青徐幽平軍事時王敦作亂以討隗為名詔徵隗還京師百官迎之于道隗岸幘大言意氣自若及入見與刁恊奏請誅王氏不從有懼色率衆屯金城及敦尅石頭隗攻之不㧞入宮告辭帝雪涕與之别隗至淮隂為劉遐所襲擕妻子及親信二百餘人奔于石勒勒以為從事中郎太子太傅劉敬宣為輔國將軍與其父牢之謀襲桓𤣥不克牢之死敬宣奔䘮哭畢即渡江就司馬休之高雅之等懼奔雒陽徃來長安各以子弟為質求救于姚興興與之符信令關東募兵得數千人復還至彭城間收聚義故𤣥遣孫無終討冀州刺史劉軌軌要敬宣雅之等共據山攻之不克又進昌平澗戰不利衆各離散乃俱奔後燕袁䖍之為輔國將軍時桓𤣥輔政䖍之乃與寧朔將軍劉夀冠軍高長慶龍驤將軍郭恭等奔于後秦姚興臨東堂引見謂䖍之等曰桓𤣥雖名晉臣其實晉賊其才度定何如父也能辦成大事不䖍之曰𤣥藉世資雄據荆楚屬晉朝失政遂偷竊宰衡安忍無親多忌好殺位不才授爵以愛加無公平之度不如其父逺矣今既握朝權必行簒奪既非命世之才正可為他人驅除耳此天以機便授之陛下願速加經略廓清吳楚興大悦以䖍之為大司農餘皆有拜授䖍之固讓請疆塲自效改授假節寧南將軍廣州刺史桓謙𤣥之從兄也為西中郎將荆州刺史𤣥簒位封新安王及桓振作亂謙初勸振率軍下戰以守江陵振既輕謙用事故不從及振敗謙奔于姚興先是譙縱稱藩于姚興縱與盧循通使潛相影響乃表興請謙共順流東下興問謙謙曰臣門著恩荆楚從弟𤣥雖曽簒位皆是逼廹人神所明今臣與縱東下百姓自應駭動興曰小水不容大舟若縱才力足以濟事亦不假君為鱗翼宜自求多福遂遣之謙至蜀欲虛懷引士縱疑之乃置謙于龍格使人守之謙向諸弟泣曰姚王之言神矣後與縱弟譙道福俱下謙于道召募百姓感其父冲遺惠投者二萬人劉道規破謙斬之桓謐為左衞將軍時宋髙祖誅桓𤣥迎復安帝謐與臨原王桓怡雍州刺史桓蔚中書令桓裔將軍何澹之等奔于後秦姚興馬敬為寧朔將軍梁州刺史時荆州司馬休之襄州魯宗之為宋高祖所敗敬遂與譙王文思新蔡王道賜輔國將軍竟陵太守魯輔寧朔將軍南陽太守魯範奔于後秦魯宗之為竟陵太守自以非宋高祖舊𨽻屢建大功有自疑之心㑹司馬休之見討猜懼益甚遂與休之合軍敗還襄陽因與休之北奔善于撫御士民皆為盡力衞送出境盡室入後秦苻丕為前秦將鎮鄴為燕慕容垂攻之丕棄鄴城奔于并州慕容垂為前燕征南將軍大敗桓温等師既有大功威徳彌振慕容評素不平之垂又告其將孫盖等摧鋒陷鋭宜論功超授評寢而不錄垂數以為言頗與評廷爭後評謀殺垂垂懼奔于苻堅歛成為後秦後將軍時貳縣𦍑叛姚興遣成與鎮軍彭白狼北中郎將姚雒都討之成敗甚懼詣趙興太守姚穆歸罪穆欲殺之成怒奔赫連勃勃梁張綰高祖太清二年為左衛將軍㑹侯景冦至入守東掖門三年臺城陷綰出奔外轉至江陵湘東王承制授侍中左衛將軍相國長史王僧辯為衞將軍都督東土諸軍事陳侯瑱鎮豫章僧辯使其弟僧愔率兵與瑱共討蕭勃及高祖誅僧辯愔隂欲圖瑱而奪其軍瑱知之盡收僧愔徒黨僧愔奔齊樊毅為左衛將軍及西魏圍江陵毅率兵赴援㑹江陵陷為岳陽王所執乆之遁歸高祖受禪毅與弟猛舉兵應王琳琳敗毅奔齊後魏董巒滎陽人太武太平眞君末隨父南叛為南齊寧州刺史孝文時益州内附齊明帝遣巒追討之官軍進擊執巒并其子景曜送于行宫巒雖自長江外言語風氣猶同華夏性踈武不多識文字孝文引巒於廷問其南事巒怖不能對數顧景曜景曜進代父答申敘齊明簒襲始終辭理横出言斐而辨孝文異焉以巒為衛騎校尉景曜為員外郎謀欲南叛坐徙朔州及車駕南討漢陽召巒從軍景曜至雒陽宻啟其父必當奔叛軍次魯陽巒單騎南走過南陽新野歴告二城以魏軍當至戒之備防房伯玉劉忌並云無足可慮巒曰不然軍勢甚盛至境首北向哭呼景曜云吾百口在彼事理須還不得顧汝一子也景曜鏁詣行在數而斬之王神念為潁川太守宣武永平元年正月奔于梁賀㧞勝為驃騎大將軍荆州都督出帝末詔勝統衆北赴京師軍次汝水出帝入關勝率所部走荆州為侯景所敗率五百餘騎南奔梁史寧為荆州大都督東魏遣侯景率衆冦荆州寧遂奔梁梁武帝引寧至香磴前謂之曰觀卿風表終至富貴我當使卿衣錦還鄉寧答曰臣世荷魏恩位為列將天長䘮亂本朝傾覆不能北靣逆賊幸得息肩有道儻如明詔欣幸實多因涕泣橫流梁武為之動容賈顯度為兖州刺史初為爾朱榮所用及榮死度不自安南奔梁梁厚待之叱列延慶為定州刺史與爾朱兆等拒義旗于韓陵戰敗延慶與爾朱仲逺走渡口濟仲逺南竄延慶北降齊獻武王王與之入雒從王于并州北齊斛律平初仕後魏為襄威將軍正光末六鎮擾亂𨽻大將軍尉賔北討軍敗為賊所虜後走奔其弟金於雲州進號龍驤將軍與金擁衆南出至黄瓜堆為杜雒周所破部落離散乃歸爾朱榮待之甚厚王則為荆襄六州都督渭曲之役則為西師圍逼遂棄城奔梁梁尋放還神武恕而不責後周獨孤信為後魏荆州刺史東魏遣其將高敖曹侯景掩至信以衆寡遂率麾下奔梁蕭世怡梁元帝時為湘州刺史王琳率舟師襲世怡世怡以州輸時陳武帝執政徵為侍中世怡疑不就乃奔于齊梁朱瑾唐末為兖州節度使兄瑄在鄆州及龎師古陷鄆州與李承嗣方出兵求芻粟于豐沛間瑾之二子及大將康懷英判官辛綰小校閻寳以城降于師古瑾無歸路即與承嗣將麾下兵走沂州沂州刺史尹處賔拒關不納乃走海州為師古所廹遂擁州民渡淮依楊行宻表瑾領徐州節度使趙明唐末以軍功歴肅峽二州刺史其兄凝領襄州表明為荆南留後未至鎮而朗陵之兵先據其城矣明領兵逐之遂鎮于渚宮天祐二年秋太祖既平襄州遣楊師厚乗勝趨荆門明懼乃舉族去峽奔蜀王建待以賔禮及建稱帝用為大理卿工部尚書乆之卒于蜀劉知俊為同州節度使奔李茂貞茂貞署荆州節度使後為茂貞左右石簡顒等讒間其軍政茂貞猶子繼崇鎮秦州因來寧覲言知俊途窮至此不宜以讒嫉見疑茂貞乃誅簡顒等以安其心繼崇又請令知俊挈家居秦州以就豐給茂貞從之未幾邠州亂茂貞命知俊討之時邠州都校李保衡納欵于朝廷末帝遣霍彦威率衆先入于邠知俊遂圍其城半載不能下㑹李繼崇以秦州降于蜀知俊妻孥皆遷於成都遂解邠州之圍而歸岐陽知俊以舉家入蜀終慮猜忌因與親信百餘人夜斬關奔蜀王建待之甚至即授為武信軍節度使劉嗣彬知俊之族子㓜從知俊征行累遷為軍校及知俊叛以不預其謀得不坐貞明末大軍與晉王對壘於徳勝乆之嗣彬率數騎奔于晉具言朝廷軍機得失又以家世讎怨將以報之晉王深信之即厚給田宅仍賜錦衣玉帶軍中目為劉二哥居一年復來奔當時晉人謂是刺客以晉王恩澤之厚故不竊發龍徳三年冬從王彦章戰于中都軍敗為晉人所擒晉王見之笑謂嗣彬曰爾可還予玉帶嗣彬惶恐請死遂誅之後唐安元信字子元代北人㓜事太祖唐光啓中幽州軍與吐渾赫連鐸合從冦太原頗為憂患太祖征吐渾平之遂入居庸元信時為前鋒遇幽州軍少鬬之不勝太祖性嚴急元信不敢還遂奔定州定帥王處存待之甚厚用為突騎都校晉李金全為安州節度使有親吏左都押衙胡漢榮者貪詐殘忍軍府之政一以委之高祖聞其事遣亷吏賈仁沼往代其職且召漢榮漢榮内疚惶怖金全乃列狀稱疾以聞及仁沼至漢榮鴆而殺之天福五年夏高祖命馬全節為安州節度使以代金全漢榮自以昔嘗拒命復聞仁沼二子將訴寘毒之事居不自安乃紿謂金全曰邸吏劉珂使徤歩倍道兼行宻傳其意云受代之後朝廷將以仁沼之事詰公之罪金全大駭命從事張緯函表送欵於淮南與其黨數百人束身夜出曉至汝州引領北望泣下而去及至金陵李昪授以節鎮尹暉為右衛大將軍范延光據鄴謀叛以暉失意宻使人齎蠟彈以榮利啖之暉得延光文字懼而私竄欲㳂汴水奔於淮南高祖聞之尋䧏詔招喚未出王畿為人所殺皇甫暉少帝開運末為宻州刺史戎虜犯闕因掠其部民以奔至江南江南即遣使具舟檝以迓之行及秦淮暉心不自安因自投於水㳂流百餘歩而不没舟人拯之而免後人或訊之云初落水如履一大石欲求溺而不得故獲免焉及至金陵禮遇甚厚偽署為歙州刺史後遷偽奉化軍節度使冊府元龜卷四百三十八
