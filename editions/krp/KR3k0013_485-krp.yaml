body:
  text: 冊府元龜卷四百八十五宋王欽若等撰邦計部濟軍輸財濟軍兵法曰興師十萬日費千金又曰千里饋糧士有饑色盖挈畚合糧周官之制振廪同食左氏所述自昔兵車之㑹資扉之給曷嘗不以宿飽為念哉由漢以来或興戎整衆擊冦伐敵縣兵以深入堅壁而相持飛輓所須乏絶是慮乃有良臣受任忠公匪懈經營調法周濟用度俾無後㸑之患以助惟揚之武克贊茂勲輔成大業傳所為公家之利知無不為者也漢蕭何為丞相守關中時漢王與諸侯擊楚何輙以便宜施行關中事計戸口轉漕給軍後漢馮異為征西大將軍討赤眉屯軍上林苑中時百姓饑餓人相食黄金一斤易豆五升道路㫁隔委輸不至軍士悉以果實為糧光武詔拜南陽趙康為右扶風将兵助異并送縑榖軍中皆稱萬嵗異兵食漸盛冦恂為河内太守行大將軍事光武謂恂曰河内完富吾将因是而起昔髙祖留蕭何鎮關中吾今委公以河内堅守轉運給足軍糧率厲士馬防遏他兵勿令北渡而已光武於是復北征燕代恂移書屬縣講兵肄射伐淇園之竹為矢百餘萬淇園衛之苑多竹篠也養馬二千匹收租四百萬斛以給軍魏鍾繇漢末都督關中太祖在官渡與袁紹相持繇送馬二千餘匹給軍太祖與繇書曰得所送馬甚應其急關右平定朝廷無西顧之憂足下之勲也昔蕭何鎮守關中足食成軍亦適當爾夏侯淵為陳留潁川太守太祖與袁紹戰於官渡行管軍校尉紹破使都督兖豫徐州軍糧時軍食少淵傳饋相繼軍以復振杜畿為河東太守太祖西征至蒲坂與賊夾渭為軍軍食一仰河東及賊破餘畜二十餘萬斛太祖下令曰河東太守杜畿孔子所謂禹吾無間然矣増秩中二千石張既為雍州刺史太祖征張魯既别從散關入討叛氐收其麥以給軍食任峻為騎都尉太祖每征伐峻嘗居守以給軍是時嵗饑旱軍食不足羽林監潁川棗祗建置屯田太祖以峻為典農中郎將數年所在積粟倉廪皆滿官渡之戰太祖使峻典軍器糧運賊數冦鈔絶糧道乃使二乗為一部十道方行為複陳以營衛之賊不敢近軍國之饒起於棗祗而成於峻郭淮為雍州刺史明帝太和五年蜀出鹵城是時隴右無榖議欲關中大運淮以威恩撫循羌胡家使出榖平其輸調軍食用足轉揚武將軍于禁為虎威將軍時張遼等與陳蘭梅成相持軍食少禁運糧前後相屬遼遂斬蘭成増邑二百戸并前千二百戸蜀王嗣為西安圍督汶山太守時大將軍姜維每出北征羌胡出馬牛羊氊眊及義榖裨軍糧國頼其資遷鎮軍領郡晉劉𢎞惠帝時為南蠻校尉荆州刺史時益州刺史羅尚為季時所敗遣使告急請糧𢎞移書贍給而州府綱紀以運道懸逺文武匱乏欲以零陵一運米五十斛與尚𢎞曰諸軍未之思耳天下一家彼此無異吾今給之則無西顧之憂矣遂以零陵米三萬斛給之尚頼以自固袁眞為西中郎將哀帝隆和元年進次汝南運米五萬斛以饋洛陽朱序為龍驤將軍監兖青二州軍事求鎮淮隂拜征虜將軍未行求運江州米一萬斛布五千疋以資軍糧孝武詔聽之加都督司雍梁秦四州軍事帝遣廣威將軍河南太守楊佺期南陽太守趙睦各領兵千人𨽻序又表求故荆州刺史桓石生府田一百頃并榖八萬斛給之宋臧熹為建武将軍臨安太守孫李髙自海道襲廣州路繇臨海熹資給發遣得以無乏南齊蕭穎胄為冠軍将軍西中郎長史東昏永元二年與梁王同謀起義兵加穎胄右将軍都督行留諸軍置佐史先遣寧朔将軍王法度向巴陵穎胄獻錢二十萬米千斛鹽五百斛諮議宗塞别駕宗史獻榖二千斛牛二千頭換借富資以助軍費長沙寺僧業富沃鑄黄金為龍數千兩埋土中歴傳相付稱為下方黄鐵莫有見者乃取之以充軍食梁劉坦為長沙太守行湘州事時髙祖起義兵坦選堪事吏分詣十郡悉發人丁運租米三十餘萬斛致之義師資其用給陳孔奐為黄門侍郎時北齊遣東方老蕭軌等来冦軍至後湖都邑搔擾又四方壅隔糧運不繼三軍取給唯在京師乃除奐為貞威将軍建康令時累嵗兵荒戸口流散勍敵忽至徴求無所髙祖尅日決戰乃令奐多營麥飯以荷葉裹之一宿之間得數萬裹軍人旦食訖棄其餘因而決戰遂大破賊後魏韓麒麟為冀州刺史慕容白曜攻東陽麒麟上義租六十萬斛并攻戰器械于是軍資無乏北齊盧勇初為東魏揚州刺史孝靜武定二年卒年三十二勇有馬五百疋私造甲杖六車遺啓盡獻之朝廷後周周惠達為太祖行臺尚書大將軍府司馬太祖出鎮華州留惠達知後事于是既定喪亂庶事多闕惠達營造戎仗儲積倉糧簡閱士馬以濟軍國之務時甚頼焉崔猷為梁州都督時利州刺史崔士謙請援猷遣兵六千赴之信州糧盡猷為送米四千斛於是二鎮獲全唐宋王成器為絳州刺史獻馬牛羊等助軍𤣥宗報之曰塞草具腓秋風已勁張國容㑹軍實者孰先於此乎家國之情助其費用周旋省覧以慰所懐王難徳為左武衛大将軍安禄山反難徳從哥舒翰至潼關殺麾下叛胡數百人扈肅宗至靈武行在無絹給賜難徳進絹三千疋及金銀器李齊運徳宗時為京兆尹京師尚䧟賊李晟軍渭橋齊運在擾攘中募人版築輓芻輦粟以應晟頗有勤績韓滉為鎮海節度建中四年徳宗行幸及歸京師軍用既繁道路又阻關中饑饉加之以災蝗江南兩浙轉輸粟帛府無虚月朝廷頼焉田季安為魏博節度使時中官吐突承瓘領兵討王承宗季安亦出師以具餉運李鄘憲宗時為淮南節度使元和十一年以軍興進絹三萬疋金五百兩銀三千兩以助軍十二年又進助軍絹三萬匹時朝廷以兵興國用不足命鹽鐵副使程异乗驛諭江淮諸道俾助軍鄘以境内富貴乃大藉府庫一年所蓄之外咸貢於朝諸道以鄘為倡首悉索以獻自是王師無匱乏之憂又元和十二年至自江南得供軍錢一百八十五萬貫以進王遂為宣歙觀察使進助軍錢三萬四千二百貫皇甫鏄為戸部侍郎判度支元和十三年正月進錢三萬貫程异為衛尉卿鹽鐵使進絹十萬疋並號羡餘韓𢎞為汴州節度使元和十三年進絹五萬疋又十四年王師討淄青𢎞進助平淄青絹二十萬疋盧坦為劒南東川節度使在鎮三年後請收閏月軍吏糧料以助行營人多非之李遜為陳許節度穆宗初方銳意討賊諸道發兵例於度支貸借唯遜出兵率先諸道賞賜犒宴備於當軍朝論美之故加檢校吏部尚書元錫為宣州觀察使長慶元年進助軍綾絹一萬匹弓箭器械共五萬二千事楊元卿敬宗時為涇原節度使寳歴元年上言營田收禾粟二十萬斛請付度支充軍糧文宗時為河陽節度使奏請自出三月糧料自備行營又云楊元卿為河陽節度大和四年進粟四十萬以助有司經費杜元穎文宗時為西川節度使太和三年奏發助軍第一般匹段二萬匹到河隂縣張惟清為涇原節度使太和五年進助邊粟麥合二十萬王淮為鹽鐵使太和五年五月進羡餘綾絹二十萬匹凡十次殷侑為天平軍節度使觀察等使太和七年十月侑奏請起今年發遣當管鄆曹濮三州兩稅𣙜酒等上供錢千萬貫粟五萬石勅天平軍元和以前地本殷實自分為三道十五餘年雖班詔勅竟未入賦殷侑承兵戈之後當歉旱之餘勤力奉公謹身守法纔及周嵗已致阜安而又體國推忠率先入貢成三軍奉上之志陳一境樂輸之心循省表章深用嘉歎所奏依王濳為荆南節度使在任聚歛所至倉庫盈溢屬朝廷方討滄鎮以助軍為名常賦獻之外進錢七十萬貫張元仲為幽州留後時徐人作亂請以弟元臯領兵伐叛懿宗不允乃進助軍米五十萬石鹽二萬詔嘉之王鎔為鎮州節度使僖宗中和二年進助太原軍士家口糧光啓元年又進扈衛戰馬五百匹梁趙珝唐昭宗天復元年徴為同州節度留後時太祖統軍岐下珝在馮翊輸輓調發旁午道途俄而昭宗還長安詔徴入覲錫迎鑾功臣之號開平二年七月湖南節度使馬殷奏天軍先與本道兵士同收復明州進賞犒将士錢十萬貫七月魏博節度使羅紹威進絹三萬匹時敵入臨汾諸将征討曰聞其㨗紹威進以備犒師之用乾化元年十月北征密州奏助軍絹二千疋青州節度使進絹五千疋兖州進絹三千疋後唐張全義為河南尹莊宗同光二年五月進粟四萬石助軍末帝清泰二年六月癸未樞密宣徽使進添都馬一百三十疋河南尹百匹時偵知契丹冦邊一日促騎軍故有此獻欲表率藩鎮也三年七月丁酉青州房知温獻馬五千疋鄧州皇甫遇馬千匹錢千緡以助討伐辛丑鄆州王建立獻助軍錢千緡絹千疋粟五千斛馬二千疋八月丙寅宿州刺史武從諫獻助軍錢五百緡復州刺史郭延魯貢錢五百貫馬十匹助征晉髙祖天福二年四月汴州楊光逺進助國錢二萬貫宋州趙在禮進助國絹三千疋錢二千貫陜府進助國絹三千疋銀一千兩玉腰𢃄一條馬十匹五月丁卯許州萇從簡進助國錢五千貫絲五千兩甲戌徐州安彦威進助軍錢五千貫綿絲六萬己卯宋州趙在禮進助國茶三萬斤鄆州安審琦進助軍絹三千疋絲五千兩花絁五十匹銀器五百兩七月秦州康福進助國錢五千貫八月甲午邠州安叔千進助軍馬五千疋癸卯宋州趙在禮進大小麥一萬石同州符彦卿進助國銀一千兩舩五隻九月辛亥湖南馬希範進助大茶三萬斤丙辰荆南髙從誨進助國絹五千匹綿綺一百匹癸酉鎮州安重榮進馬三十疋乙亥雄州刺史袁正辭進助國錢三萬貫十一月甲寅前荆州節度李徳琉進馬三十匹丁巳襄州安從進獻馬二十疋絹一千疋十二月辛丑定州皇甫遇奏般軍糧八萬石赴魏州乙巳楊光逺進助國錢一萬貫三年正月壬戌昭義軍杜重威進助國馬二十疋銀五百兩玉𢃄五條戊辰鄆州安審琦進助國絲二萬兩絹二千匹二月戊寅徐州萇從簡進助國錢三千貫同州符彦卿進馬三十疋戊戌北京留守安彦威進助國馬二十五疋絹一千疋東京留守髙行周進助國錢五千貫又鎮州安重榮進助國絹六千疋綿一萬兩晉州相里金進銀一千兩錢一千貫三月庚戌安州李金全進助國錢一千貫茶三千斤四月戊戌楊光逺進草十萬束粟三千石大豆二千石白米三千石壬寅襄州安從進助國茶一萬斤五月西京留守李周進助國銀二千五百兩九月許州進馬五十疋劒五十口銀裝鎗五十條鎮州安重榮進添都馬五十疋十月鄜州安審暉晉州相里金定州皇甫遇進添都馬三十匹秦州康福邠州安叔千共進添軍馬七十疋十一月晉昌李周進添都馬三十疋河中安審信進助國錢一萬貫青州王建元進助國絹七千疋綿一萬兩銀三千五百兩金酒器一副滄州馬全節進助國絹三千疋綿三千兩絲八千兩添都馬二十疋兖州李從温進助國錢五千貫安州李金全進助國錢二千貫甲子襄州安從進助國絹三千疋茶一萬斤十二月陜府李從敏進絹二千疋綾五百疋小麥二千石同州符彥卿進助國錢一千貫絹一千疋戊戌湖南進助國銀一萬兩秦州康福進助國馬七千疋銀一千五百兩細布一千疋廷布五百疋七年閏三月湖南奏差人押軍運糧米一萬石徃襄州軍前進計四萬石少帝以天福七年六月即位八年七月京兆府奏軍食不充左金吾衛上將軍皇甫立進助國粟三千石許州李從温進粟一萬二千三十石開運二年尚食副使鄭延祚自邠州回齎新授節度使馮暉表進馬三千三百五十匹駱駞五百頭糧草一百萬束衣甲器械一萬事件其駞馬器械請供奉官蕭處鈞先押赴闕糧草在靈武道收貯是年鎮州杜重威進㕔頭小底牽攏官共三千四十四人馬軍七百七十二人歩軍一千七百七十二人馬八百疋衣甲器械旗槍共四十三萬事件並在本道晉州安叔千進㕔頭軍何彥温已下一百人鞍馬器仗全漢史𢎞肇為侍衛使乾祐元年獻錢萬緡馬二十疋以助供軍討叛也三年肇與鄴都留守各貢助軍絹萬匹宰臣三司使各有貢物助軍周符彦卿為青州節度使太祖廣順二年車駕平定兖州彦卿進錦綵三千匹軍糧萬石輸財邦家所急食貨為先雖屬之計臣亦成於民力焉西漢而下乃有迹在編民名叅著位屬戎車屢駕有蠲金之費嵗榖不登無九年之蓄天子為之旰食黎民由是阻饑于是乎發其私帑獻其井賦以助國用而歸之有司焉斯亦愛君憂國感於忠義者之所為也漢卜式齊人武帝時方事匈奴式上書願輸家財半助邊帝使使問式欲為官乎式曰自小牧羊不習仕宦不願也使者曰家豈有寃欲言事乎式曰臣生與人無所争邑人貧者貸之不善者教之所居皆從式式何故見寃使者曰茍子何欲言子茍如此輸財必有所欲式曰天子誅匈奴愚以賢者宜死節有財者宜輸之如此而匈奴可滅也式歸牧田嵗餘㑹渾邪等降縣官費衆倉府空倉粟所積也府錢所聚也貧民大徙皆仰給縣官無以盡贍式復持錢二十萬與河南太守以給徙民河南上富人助貧者帝識式姓名曰是固前欲輸其家半財助邊乃賜式外繇四百人外繇役之外得復除四百人也式又盡復於官是時富豪皆争匿財匿藏也惟式尤欲助費帝於是以式終長者乃召拜式為中郎賜爵左庶長田十頃布告天下尊顯以風百姓杜緩御史大夫延年之子緩為太常嗣建平侯元帝初即位榖貴民流永平中西羌反輙上書入錢數以助用前後數百萬後漢王丹京兆下邳人家累千金光武時前将軍鄧禹西征關中軍糧乏丹率宗族上麥二千斛禹表丹領左馮翊稱疾不視事免歸東海頃王肅安帝永初中以西羌未平上錢二千萬元初中復上縑萬匹以助國費張禹為太尉封安鄉侯後連嵗災荒府藏空虚禹上疏求入三嵗租稅以助郡國禀假詔許之任城王崇順帝時羌虜數反崇輙上錢帛征邊費冲帝初復上錢三百萬助山陵用度朝廷嘉而不受宋徐耕晉陵延陵人為平原令文帝元嘉二十一年大旱民饑耕詣縣陳辭曰今年亢旱禾稼不登氓黎饑餒採掇存命聖上哀矜已垂存拯但罄未久困殆者衆米榖轉貴糴索無所方渉春夏日月悠長不有㣲救永無濟理不惟凡瑣敢憂身外鹿鳴之求思同野草氣類之感能不傷心糴得少米資供朝夕志欲自竭義存分飱今以千斛助官賑貸此境連年不熟今嵗尤甚晉陵境内特為偏枯此郡雖弊猶有富室丞陂之家處處而是並皆保熟所失盖惟陳積之榖皆巨萬旱之所弊實鍾貧民溫富之家各有財寳謂此等並宜助官得過儉月所損至輕所濟甚重今敢自勵為勸造之端實願决水揚塵崇益山海為言上當時議者以耕比漢卜式詔書褒美以縣令嚴成東海人孝武帝大明八年東土饑旱成與東莞王道蓋各以榖五百斛助官賑恤梁髙祖天監七年以興師費用王公以下各上國租及田谷以助軍資後魏任城王澄為尚書孝文南伐留澄居守澄表請以國秩一嵗租帛助軍資詔受其髙平租彭城王劭襲父勰封孝明初梁武遣将犯邊劭上表曰偽監游魂闚覦邊境勞兵兼時日有千金之費臣仰藉先資叨享厚秩思以埃塵用裨山海臣國封徐州去軍差近謹奉粟九千斛資絹六百疋國吏二百人以充軍用靈太后嘉其至意而不許之城陽王徽為鎮軍将軍于時戎馬在郊王師屢敗徽以軍旅之費上助國絹二千疋粟一萬石以助軍用孝明不納侯綱初為太子中庶子迎孝明于東宫以功封武陽縣侯食邑二千戸後為軍騎大将軍啓曰軍旅稍興國用不足求以封邑俸粟賑給征人孝明許之隋王辯字警畧馮翊蒲城人祖訓以行商致富魏世出粟助給軍糧為假清河太守唐彭惠通安州人貞觀十八年太宗征遼東惠通請出布帛五千段以資征人太宗嘉之比于漢之卜式拜為宣義郎霍王元軌髙祖子髙宗調露二年二月率文武百官詣闕上表請各出一月俸料供軍以討突厥詔從之嚴震梓州鹽亭人祖父田農為業以財於鄉里肅宗至徳乾元以後震屢出家財以助邊軍授賜合州長史王府諮議叅軍郭子儀為邠寧節度使代宗大歴八年十二月廻紇赤心賣馬一萬匹有司以國計不充計市六千匹子儀以廻紇前後立功不可阻其意請自納一年俸物充廻紇馬價雖詔㫖不允内外稱之羅紹威為魏博節度使哀帝即位紹威進救接百官絹千疋綿三千兩後唐郭崇韜莊宗同光中為樞密使初在汴雒稍通諸侯賂遺親友密規之崇韜曰予備位将相禄賜巨萬不俟他財以致富但以朱氏之日以賂遺成風今之方面藩侯皆梁之舊将吾主射鈎斬袪之怨也一旦革面化為吾人堅拒其請寜先拒乎藏于私室無異公帑及莊宗将行郊禮有司計府庫闕勞軍錢崇韜首出積十萬貫以助郊祀安重誨為樞密使明宗三年五月以有事于中山進馬三十疋助戎事藩侯郡守遂相次進之張筠為左驍衛上将軍致仕長興元年十月進助軍粟五千石是月興元府奏軍府官共進助軍粟三萬三千石鄭師文絳州人清泰中末帝親征太原師文獻錢五千萬助西軍進討詔本州補教練使人晉袁正辭初仕梁乾化貞明中歴飛龍沂州副使後唐清泰中進錢五萬貫尋領衢州刺史及髙祖即位後獻錢五萬貫出典雄州辭以州在靈武西鄙處吐蕃部族之中不願適任進亦如前方免其行少帝開運元年加檢討司徒使與朝請二年助國錢三萬銀一萬兩馮暉為靈州節度使天福中官吏言朔方軍自康福張從賔張希崇相承三正市馬和糴入蕃客賞賜軍州俸禄供事戎仗三司嵗支錢六千萬自暉臨鎮已来皆以己物供用周彦儒平虜軍節度使知溫之子知溫積貨數百萬天福元年卒幕客顔衎勸彦儒進錢以助國用乃進錢三萬貫一云十萬貫絹二萬匹布一萬匹金一百兩銀一千兩茶一千五百斤絲綿十萬兩尋授彦儒沂州刺史皇甫立為金吾衛上将軍少帝天福八年進助國粟三千石周鄭陽前為潁川馬歩軍教練使家富于財顯徳三年世宗親征淮南至夀春陽進錢二萬以助軍用盖傚卜式之意也帝以陽為左監門衛将軍致仕賜襲衣銀𢃄册府元龜卷四百八十五
