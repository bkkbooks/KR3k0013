body:
  text: 册府元龜卷六百八十七宋王欽若等撰牧守部禮士旌表禮士夫見善如不及先儒之丕訓就賢體逺為政之要道自昔牧人守土之吏曷嘗不尊尚賢者詳延俊乂申以禮遇咨其道義然後能成化而美俗哉至若几杖之設以重於耆年書記之問以奬其髙行親詣閭巷靡辭於屈體召至郡閭欽聞其緒言或重其經術待以師友或接之恩紀同乎昆弟及至旌異其德推顯其材褒待越於常制延辟極其勤懇用能聳厲四封之内激昻中人之志使其靡然向風翕然遷善遵行禮讓臻乎恥格周書所謂庸庸祗祗者謂此物也夫漢曹參為齊相聞膠西有蓋公古盍反善治黄老言黄帝老子之書使人厚幣請之既見蓋公蓋公為言治道貴乎清静而民自定推此類具言之參於是避正堂舍蓋公焉吳公為河南守雒陽人賈誼年十八以能屬文稱於郡中呉公聞其秀材召置門下秀美也甚幸愛何夀為蜀郡太守時何武為郡吏事夀夀知武有宰相器以其同姓故厚之趙貢為瑯邪太守時薛宣為廷尉書佐都船獄吏後以大司農斗食屬察廉補不其丞斗食者禄少每歲不滿百石計日以斗為數也不其縣名也貢行縣見宣甚說其能從宣歴行屬縣還至府令妻子與相見戒曰薛君至丞相我兩子亦中丞相史後宣代張禹為丞相除趙貢兩子為史孫寶為京兆尹故吏侯文以剛直不茍合常稱疾不肯仕寶以恩禮請文欲為布衣友日設酒食妻子相對文求受署為掾進見如賓禮後漢杜詩為南陽太守穣人郭丹為更始諫議大夫更始敗歸鄉詩請為功曹丹薦鄉人長者自代而去詩乃歎曰昔明王興化卿士譲位今功曹推賢可謂至德勑以丹事編署黄堂以為後法黄堂太守之聴事郭伋為并州牧聘求耆德雄俊設几杖之禮朝夕與叅政事任延為會稽都尉時天下新定道路未通避亂江南者皆未還中土會稽頗稱多士延到皆聘請髙行如董子儀嚴子陵等敬待以師友之禮吳有龍邱萇者隠居太末縣属會稽志不降辱王莽時四輔三公連辟不到掾史白請召之延曰龍邱先生躬德履義有原憲伯夷之節都尉掃洒其門尤懼辱焉召之不可遣功曹奉謁脩書記致醫藥吏使相朢於道積一嵗萇乃乘輦詣府門願得先死備録延辭譲再三遂署議曹祭酒萇尋病卒延自臨殯不朝三日是以賢士大夫爭往宦焉鮮于褒為京兆尹郡人第五倫始以營長詣褒褒見而異之署為吏後褒坐事左轉髙堂令臨去握倫臂訣曰恨知晩訣别也東觀記曰倫步擔往候之留十餘日將倫上堂令妻子出相對以屬託焉朱暉為臨淮太守暉好節槩有所拔用皆厲行士朱穆為冀州刺史所辟用皆清德長者多至公卿州郡梁綂為姑臧太守姑臧稍為富邑時天下未定士多不脩節操而孔奮以議曹掾守姑臧力行清潔為衆人所笑或以為身處脂膏不能以自潤徒益苦辛耳奮既立節治貴仁平梁統深相敬待不以官屬禮之嘗迎於大門引入見母周景為河内太守好賢愛士其拔才薦善常恐不及每至歳時延請舉吏入上後堂與共宴會如此數四乃遣之賜送什物無不充備既而選其父兄子弟相優異嘗稱曰臣子同貫若之何不厚鮑昱為汝南太守新息人髙獲三公爭辟不應昱每行縣輒軾其閭第五倫為會稽太守郡人謝夷吾為督郵倫甚崇其道徳轉署主簿使子從受春秋夷吾待之如師弟子之禮徐蕭為右扶風時張元習春秋顔氏兼通數家法為陳倉縣丞嘗以職事對府不知官曹處吏白門下責之蕭亦大儒也聞元諸生試引見之與語大驚曰今日相遭真解朦矣遭逢也遂請上堂難問極日王龔為汝南太守政崇温和好才愛士引進郡人黄憲陳蕃等憲雖不屈蕃遂就吏蕃性氣髙初到龔不即召見之乃留記謝病去龔怒使除其録功曹袁閬請見言曰聞之傳曰人臣不見察於君不敢立於朝蕃既以賢見引不宜退以非禮龔改容謝曰是吾過也乃復厚遇待之繇是後進知名之士莫不歸心焉陳蕃為豫章太守在郡不接賓客惟徐稚來特設一榻去則懸之後為樂安太守郡人周璆字孟玉髙潔之士前後郡守招命莫肯至唯蕃能致焉字而不名特為置一榻去則懸之种拂為潁川太守潁陰人劉翊嘗守志卧疾不屈聘命拂臨郡引為功曹翊以拂名公之子乃為起焉拂以其擇時而仕甚敬任之復舉翊孝亷龎叅為漢陽太守郡人任棠者竒節𨼆居教授叅到先候之棠不與言但以薤一大本水一盂置户屏前自抱孫兒伏於户下主簿白以為倨叅思其微意良久曰棠是欲曉太守也水者欲吾清也拔大本薤者欲吾擊强宗也抱兒當户欲吾開門恤孤也於是歎息而還叅在職果能抑强助弱以惠政得民羊陟為河南尹時趙壹舉郡上計到京師往造陟陟延與語大奇之謂曰子出矣陟明旦大從車騎奉謁造壹時諸計吏多盛飾車馬帷幕而壹獨柴車草屏露宿其傍延陟坐於車下左右莫不歎愕陟遂與言談至曛夕極歡而去執其手曰良璞不剖必有泣血以相明者矣陟乃與袁逢共稱薦之名動京師士大夫想望其風采陶謙為徐州牧時公卿舉鄭元為趙相道斷不至㑹黄巾冦青郡乃避地徐州謙接以師友之禮孔融為北海相承黄巾殘破之後脩復城邑崇學校設庠序舉賢才顯儒士以彭璆為方正邴原為有道王脩為孝亷又以原為計佐是時漢朝陵遲政以賄成原乃將家人入鬱洲山中郡舉有道融書喻原曰脩性保真清虚守髙危邦不入久潛樂土王室多難西遷鎬京聖朝勞謙疇咨雋乂我祖來定䇿命懇惻國之將隕婺不恤緯家之將亡緹縈跋涉彼匹婦也猶執此義實朢根矩原字根矩仁為己任援手執溺振民於難乃或宴宴居息莫我肯顧謂之君子固如此乎根矩可以來矣原遂到遼東後原欲歸鄉里止於三山融書曰隨會在秦賈季在翟諮仰靡所歎息増懷頃知來至近在三山詩不云乎來歸自鎬我行永久今遣五官掾奉問榜人舟楫之勞禍福動静告慰亂階未巳阻兵之雄若棊奕爭梟原於是遂復反還積十餘年乃遁還南行已數日而公孫度甫覺知原之不可復追也因曰邴君所謂雲中白鶴非鶉鷃之網所羅矣又吾自遣之勿復來也遂免危難吳太史慈初避遼東融數遣人計問其母并致餉遺公孫度為遼東太守時王烈避地遼東度接以昆弟之禮訪以政事劉表為荆州牧時趙戩客於荆州表厚禮焉魏張邈漢末為陳留太守弟超與臧洪起義同至陳留邈問臧洪何人超曰洪才略智數優超超甚愛之海内竒士也邈即引見洪與語大異之致之於劉兖州公山孔豫州公緒皆與洪親善盧毓為上黨太守先是鉅鹿人張臶養志不仕移居上黨毓到官三日綱紀白承前致板謁臶毓教曰張先生所謂上不事天子下不友諸侯者也豈此板謁所可先飾哉但遣主簿奉書致羊酒之禮陳登為廣陵太守請郡人陳矯為功曹使矯詣許謂曰許下論議待吾不足足下相為觀察還以見誨矯還曰聞逺近之論頗謂明府驕而自矜登曰夫閨門雍穆有徳有行吾敬陳元方兄弟淵清玉潔有禮有法吾敬華子魚清脩疾惡有識有議吾敬趙元達博聞強記竒逸卓犖吾敬孔文舉雄姿傑出有王霸之略吾敬劉元徳所敬如此何驕之有餘子瑣瑣亦焉足録哉登雅意如此而深敬友矯裴徽為冀州刺史趙人孔曜薦清河文學管輅於徽徽即檄召輅為文學從事一相見清論終日不覺罷倦天時大熱移床在庭前樹下乃至雞向晨然後出再相見便轉為鉅鹿從事三見轉治中四見轉為别駕至十月舉為秀才王凌為青州刺史表請郎中王基為别駕後召為秘書郎凌復請還頃之司徒王朗辟基凌不遣朗書劾州曰凡家臣之良則升於公輔公臣之良則入於王職是故古者侯伯有貢士之禮今州取宿衛之臣留秘閣之吏所希聞也凌猶不遣凌流稱青土蓋亦繇基協和之輔也蜀夏侯纂為廣漢太守以緜竹人秦宓為師友祭酒領五官掾稱曰仲父宓稱疾卧在茅舍纂將功曹古朴主簿王普厨膳即宓第宴談宓卧如故吳士燮為交趾太守體器寛厚謙虚下士中國士人往依避難者以百數吳粲字孔休為會稽太守召處士謝譚為功曹譚以疾不詣粲教曰夫應龍以屈伸為神鳳凰以嘉鳴為貴何必隠形於天外潛鱗於重淵者哉顧邵為豫章太守初錢唐丁諝出於役伍陽羨張秉生於庶民烏程呉粲雲陽殷禮起乎微賤邵皆拔而友之邵當之豫章發在近路値秉疾病時送者百數邵辭賓客曰張仲節有疾苦不能來别恨不見之蹔還與訣諸君少時相待其留心下士唯善所在皆此類也晉陶侃為荆州刺史時皇甫方囘謐之子少尊父操辟亂荆州侃禮之甚厚侃每造之著素士服望門輒下而進周浚為揚州刺史廣陵人華譚好學不倦為隣里所重浚引為從事史愛其才品待以賓友之禮劉宏為荆州刺史時陳敏作亂順陽太守張光率步騎五千詣荆州討之宏雅敬重光稱為南楚之秀劉陶為揚州刺史先是杜夷為王敦所舉方正夷遁於夀陽鎭東將軍周馥傾心禮接引為叅軍夷辭之以疾馥知不可屈乃自詣夷為起宅宇供其醫藥馥敗夷歸舊居道遇兵冦陶告廬江郡曰昔魏文侯軾干木之閭齊相曹叅尊崇蓋公皆所以優賢表德敦勵末俗徵士杜君徳懋行潔髙尚其志頃流離道路聞其頓躓刺史忝任不能崇飾有道而使髙操之士有此難屯今遣吏宣慰郡可遣一吏縣五吏每每營恤之嘗以市租供給家人糧廩勿令闕乏尋以胡寇又移渡江王導遣吏周贍之許猛為幽州刺史素服霍原之名將詣之主簿當車諫不可出界猛歎恨而止原山居積年門徒百數燕王月致羊酒王敦為荆州牧以郭舒為叅軍轉從事中郎將敦重舒公亮給賜轉豐數詣其家乃表為梁州刺史謝尚為丹陽尹鎭牛渚秋夜乘月率爾與左右微服泛江會臨汝令袁勗子宏在舫中諷詠聲既清亮辭又藻拔遂駐聴久之遂問焉答曰是袁臨汝郎誦詩即宏詠史之作也尚傾率有勝致即迎升舟與之譚論申旦不寐自此名譽日茂鄧嶽為廣州刺史葛洪為句漏令將子姪俱行嶽留不聴去洪乃止羅浮山鍊丹嶽表補東莞太守又辭不就嶽乃以洪兄子望為記室叅軍王𢎞為江州刺史時彭澤令陶潛棄官閒居𢎞甚欽遲之後日造焉潛稱疾不見既而語人云我性不狎世因疾守閒幸非潔志慕聲豈敢以王公紆軫為榮邪夫謬以不賢此劉公幹所以招謗君子其罪不細也𢎞每令人候之宻知當往廬山乃遣其故人龎通之等齎酒先於半道要之潛既遇酒便引酌野亭欣然忘進𢎞乃出與相見遂歡讌窮日潛無履𢎞顧左右為之造履左右請履度潛便於坐申脚令度焉𢎞要之還州問其所乘答云素有脚疾向乘籃輿亦足自適乃令一門生二兒共輿之至州而言笑賞適不覺有羨於華軒也𢎞後欲見輒於林澤間候之至於酒米乏絶亦時相贍前涼陰澹為燉煌太守郡人索襲虚静好學不與當世交通或獨笑或長歎或涕泣先生碩徳名儒真可以諮大義澹欲行鄉射之禮請襲為三老曰今四表輯寧將行鄉射之禮先生年耆望重道冠一時養老之義實繫儒賢既樹非梧桐而希鸞鳳降翼器謝曹公而冀蓋公枉駕誠非所謂也然夫子至聖有召赴焉孟軻大德無聘不至葢欲宏闡大猷敷明道化故也今之相屈遵道崇教非有爵位意者或可黷乎會病卒後秦苻融為冀州刺史州人崔元伯少有雋才號曰冀州神童融虚心禮敬宋劉道産為雍州刺史柳元景有器質道産深愛其能元景居父憂未得加命會荆州刺史江夏王義恭召之道産謂曰久欲見屈今貴王有召難輒相留乖意以為惘惘袁粲為丹陽尹太原王延秀薦傅昭於粲深為所禮辟為郡主簿使諸子從昭定其所制每經昭户輒歎曰經其户寂若無人披其帷其人斯在豈得非名賢也張崇之為吳興太守烏程人吳達有孝行為鄉里所推崇之三加禮命其後太守王韶之擢補功曹史達以門寒固辭不就南齊張永為吳興太守郡人沈鱗士隠居教授從學者數十百人永請鱗士入郡鱗士聞郡後堂有好山水乃往停數月永欲請為功曹使人致意鱗士曰明府德履沖素留心山谷民是以被褐負杖忘其疲病必欲飾渾沌以蛾眉冠越客於文冕走雖不敏請附喬卿永乃止王曇生張淹並為東陽太守郡人徐伯珍積學十年䆒尋經史遊學者多依之曇生與淹並加禮辟伯珍應召便退如此者凡十二焉王僧達為吳郡太守錢塘人褚伯玉有髙世之行僧達苦禮致之伯玉不得已停郡信宿裁交數言而退寧朔將軍邱珍孫與僧達書曰聞褚先生出居貴館此子滅景雲棲不事王侯抗髙木食有年載矣自非折節好賢何以致之昔文覺棲冶城安道入昌門於兹而三焉却粒之士飡霞之人乃可蹔致不宜久覊君當思遂其髙步成其羽化望其還䇿之日蹔紆清塵亦願助為譬說僧達答曰禇先生從白雲遊舊矣古之逸民或留慮兒女或使華陰成市而此子索然唯服松石分於孤峯絶嶺者積數十載近故要其來此兾慰日夜比談討芝桂借訪荔蘿若已窺烟液滄州矣知君欲見之輒當申譬袁昻領丹陽尹辟徐之才為主簿人務事宜皆被顧訪郡廨遭火之才起望夜中不著衣披紅服帕出房映光為昻所見功曹白請免職昻重其才術仍特原之梁蔡興宗為鄭州刺史引沈約為記室嘗謂其諸子曰沈記室人倫師表宜善事之蕭琛為東海太守瑯邪人諸葛璩辟江祀府議曹不就琛與刺史安成王秀鄱陽王恢並禮異焉衡陽王元簡為會稽太守時何裔𨼆居東山元簡深加禮敬月中嘗命駕式閭談論竟日柳惲為吳興太守郡人沈顗幼清静有志行慕黄叔度徐孺子之為人累徵不赴天監四年大舉北伐訂民丁惲以顗從役揚州别駕陸任以書責之惲大慚厚禮而遣之王峻為桂陽太守時郡丞周興嗣博通紀傳善屬文峻素相賞好禮之甚厚陳侯安都為南徐州刺史先是湘東王主簿蕭允臺城陷居京口侯景平後髙祖鎮南徐州以書召之允又辭疾安都躬造其廬以申長幼之禮後魏陸馥為相州刺史州中有德宿老名望重者以友禮待之詢之政事咨以方略如此者十人號曰十善王誦為幽州刺史范陽涿人盧義僖為冠軍將軍中散大夫以母憂去職誦與義僖交欵每與舊故李神雋等書曰盧冠軍在此時復惠來輒留連數日得諮詢政道其見重若此劉模為潁州刺史王肅之歸闕路經懸瓠羇旅窮悴時人莫識獨模給所須弔待以禮肅臨豫州模猶在郡裴慶孫為邵郡太守在郡愛好文流與諸才學之士咸相交結輕財重義坐客常滿是以為時所稱崔休為渤海太守時大儒張吾貴有盛名於東山四方學士咸相宗慕弟子自逺而至者嘗千餘人生徒既衆所在多不見容休乃為設爼豆招延禮接使肄業而還儒者稱為口實北齊揚州公永樂為濟州刺史州人李系為廣陵王錄事叅軍府解還鄉里徵拜冠軍將軍中散大夫永樂聞而請與相見待以賓友之禮及永樂薨系送𦵏還都任城王湝為定州刺史李德林居貧轗軻湝重其才召入州館朝夕同遊殆均師友不為君臣禮數唐髙士亷太宗貞觀中為益州都督府長史蜀人朱桃椎者澹泊為事隠居披裘帶索沈浮人間竇軌之鎮益州也聞而召見遺以衣服逼為鄉正桃椎口竟無言棄衣於地逃入山中結菴澗曲夏則倮形冬則樹皮自覆人有贈遺一無所受每為屩致之於路人見之者曰朱居士之屩也為鬻米置於本處桃椎至夕而取之終不與人相見議者以為焦先之流士亷下車以禮致之及至降階與語桃椎不答直視而去士亷髙之每令存問桃椎見使者輒入林自匿近代以來多輕隠逸士亷獨加褒禮蜀中以為美談張嘉貞元宗開元中為益州長史判都督事性簡貴待管内刺史禮隔而引漢州刺史李擇言同榻坐談政理時人榮之盧齊卿為兖州刺史王希夷𨼆於徂徠山齊卿就謁致禮因訪以字人之術希夷曰孔子稱已所不欲勿施於人可以終身行之矣賀蘭進明天寶中為試信安太守其後第五琦貶為須江丞進明重其才畧遇之轉深李勉德宗貞元中為汴滑節度以名士李廵張叅為糧料官廵卒於幕三歲之内每遇宴飲必設虚位筵次陳膳執酧辭色悽惻論者美之李峴為魏郡太守時李栖筠為冠氏主簿峴待之如布衣交張建封為夀州刺史聞温造之名招以尺書造曰可人也挈家從之建封動静咨詢而不敢縻以爵禄及按節彭門造歸下邳有髙視天下之心建封恐一旦失造遂妻以兄之子李泌為陜虢觀察使時陽城隠於河東中條山下逺近慕其徳行來學者相繼有爭者不詣官府詣陽城決之泌數禮問之崔衍為宣歙池觀察使所擇從事多得名流時有土者得賓寮率輕傲衍獨加禮敬幕中之士後多顯達旌表夫追甄往烈申奬至行興亷而舉孝尚賢而崇徳乃為政之所先也況乎居岳牧之任為萬夫之長風化攸繫品庶式瞻自非敦朂名義旌别淑慝亦何以臻恥格之漸成懷音之美哉繇漢暨唐循吏間作乃有移書以褒直節置饋以禮先民至若貞操邁倫懿範絶俗或著之銘刻或加以辟署或表厥鄉里揚其淑聲或列之圖像形於善頌或枉顧於衡蓽或荐推於廩賜既優異於羣萃復升聞於王庭故能激勵頽弛聳動倫伍致民德之歸厚成政績之尤異焉漢薛宣為左馮翊池陽令舉亷吏獄掾王立府未及召聞立受囚家錢宣責譲縣縣案驗獄掾迺其妻獨受繫者錢萬六千受之再宿獄掾實不知掾慙恐自殺宣聞之移書池陽曰縣所舉亷吏獄掾王立家私受賕而立不知殺身以自明立誠亷士甚可憫惜其以府決曹掾書立之柩以顯其魂以此職追贈府掾史素與立相知者皆予送葬後漢任延年十九為會稽都尉及到静泊無為唯先遣饋禮祠延陵季子郅惲為長沙太守初長沙有孝子古初遭父喪未𦵏隣人失火初匍匐柩上以身扞火火為之滅惲甄異之以為首舉劉護為江夏太守郡人黄香年九歲失母思慕憔悴殆不勝哀免喪鄉人稱其至孝護聞而召之署門下孝子甚見愛敬賈琮為冀州刺史初白馬令李雲以直言死廷尉獄中琮使行部過雲祠墓刻石表之又已肅為議郎與竇武陳蕃等謀誅閹宦武等遇害肅亦坐黨禁錮中常侍曹節後聞其謀收之肅自載詣縣縣令見肅入閣解印綬與俱去肅曰為人臣者有謀不敢隠有罪不逃刑既不𨼆其謀矣又敢逃其刑乎遂被害琮刋石立銘以記之張酺為東郡太守郡吏王青者祖父翁與前太守翟義起兵攻王莽及義敗餘衆悉降翁獨守節力戰莽燔燒之父隆建武初為都尉功曹青為小吏與父俱從都尉行縣道遇賊隆以身衛全都尉遂死於難青亦被矢貫咽音聲流遏前郡守以青身有金痍竟不能舉酺見之歎息曰豈有一門忠義而爵賞不及乎遂擢用郡右曹韓崇為汝南太守郡人蔡順以至孝稱崇召為東閣祭酒順母平生畏雷自亡殁每有雷震順輒圜冡泣曰順在此崇聞之每雷輒為差軍馬到墓所孔融為北海相郡人甄子然臨孝存知名早卒融恨不及之乃命配食縣社髙宻人鄭元字康成融深敬之屣履造門告高宻縣為元特立一鄉曰昔齊置士鄉越有君子軍皆異賢之意也鄭君好學實懷明徳昔太史公廷尉吳公謁者僕射鄧公皆漢之名臣又商山四皓東園公夏黄公潛徳隠耀世嘉其髙皆悉稱公然則公者仁徳之正號不必三事大夫也今鄭君鄉宜曰鄭公鄉昔東海于公僅有一節猶或戒鄉人侈其門閭矧乃鄭公之徳而無駟牡之路可廣開門衢令容髙車號為通徳門魏王肅為廣平太守時有張臶學兼内外不應辟命卒肅教下縣曰前在京都聞張子明臶字子明來至問之會其已亡致痛惜之此君篤學隱居不與時競以道樂身昔絳縣老人屈在泥塗趙孟升之諸侯用睦愍其耄勤好道而不䝉榮寵書到遣使勞問其家顯題門户務加殊異以慰既徃以勸將來毋邱儉為幽州刺史討髙句驪王名宫將叛於魏其臣句驪沛者名得來數諫宫宫不從得來歎曰立見此地生蓬蒿不食而死及儉至令諸軍不壞其墓不伐其樹得其妻子皆放遣之蜀王裔為蜀郡太守成都禽堅有至孝之行裔表其墓追贈孝亷又與嚴君平李引立祠作銘以旌先賢董榮為益州刺史圖畫譙周像於州學命從事孝通誦之吳顧邵為豫章太守下車祀先賢徐孺子之墓優恤其後晉孔嚴為吳興太守餘杭婦人經年荒賣其子以活夫之兄弟武康有兄弟二人妻各有子弟逺行未反遇荒歲不能兩全棄其子而活弟子嚴並褒薦之温嶠鎮武昌甚有惠政甄異行能親祭徐孺子之墓隂澹為敦煌太守郡人索襲虚靖好學舉孝亷賢良方正皆以疾辭澹禮之襲卒澹素服會𦵏贈錢二萬澹曰世人之所有餘者富貴也目之所好者五色也耳之所玩者五音也而先生棄衆人之所收收衆人之所棄味無味於恍惚之際兼黄元於衆妙之内宅不彌畝而志忽九州形居塵俗而棲心天外雖黔婁之髙逺莊生之不顯蔑過也乃諡曰元居先生楊宣為敦煌太守郡人宋纎𨼆居於酒泉南山宣畫其像於閣上出入視之作頌曰為枕何石為漱何流身不可見名不可求馬岌為酒泉太守時宋纎隱於南山岌具威儀鳴鐘皷造焉纎髙樓重閣拒而不見岌歎曰名可聞而身不可見德可仰而形不可覩吾而今而後知先生人中之龍也銘詩於石壁曰丹崕百丈青壁萬尋竒木蓊鬱蔚若鄧林其人如玉維國之琛室邇人遐實勞我心劉宏為荆州刺史立諸葛孔明羊叔子碣使叅軍李興為之文前秦苻朗為晉州刺史桑虞五世同居閨門邕穆朗甚重之嘗詣虞家升堂拜其母時人以為榮宋張崇為吳興太守烏程人吳達經荒饑病合門死者十有三人達夫妻僅存家極貧窘朞年成七墓十三棺時人賻贈一無所受崇義之以羔鴈之禮禮焉劉悛為武陵内史漢夀人邵榮興六世同爨表其門閭劉損為吳郡太守至閶門便入泰伯廟時堂宇頺毁垣牆不脩損愴然曰清塵尚可髣髴衡宇一何摧頺即令脩葺南齊竟陵王子良為會稽太守郡民朱百年有至行先卒賜其妻米百斛蠲一人給其薪蘇王綸之為豫章太守下車祭徐孺子許子將墓圖畫陳蕃華歆謝鯤像於郡朝堂梁顧憲之為豫章太守有貞婦萬晞者少孀居無子事舅姑尤孝父母欲奪而嫁之誓死不許憲之賜以束帛表其節義謝朓為東海太守辟瑯邪人諸葛璩為議曹不就朓教曰昔長孫東徂降龍邱之節文舉北輜髙通徳之稱所以激貪立懦式揚風範處士諸葛璩髙風所漸結轍前脩豈懷珠被褐韜玉待價將幽貞獨往不事王侯者邪聞事親有啜菽之窶就養寡蒸棃之給豈得獨享萬鍾而忘茲五秉可餉穀百斛蔡興宗為會稽太守先是郡人郭原平有孝行為鄉里宗仰太守王僧朗察不就興宗臨郡深加貴異以私米饋原平友山隂朱百年妻下教曰秩年之貺著自圖書餼貧之典有聞甲令況髙柴窮老萊婦屯暮者哉水興郭原平世稟孝德洞業儲虛深仁絶操追風曠古棲眞處約華耉方嚴山隂朱百年道終物表妻孔耋齒孀居窶迫殘日欽風撫事嗟慨滿懷可以帳下米各餉百斛原平固譲不受後魏盧道將為燕郡太守下車表樂毅霍光之墓而為之立祠樂墓在良鄉霍墓在蠡州任城王澄為揚州刺史下車封孫叔敖之墓髙允為懷州刺史秋月巡境問民疾苦至郡縣見邵公廟廢毁不立乃歎曰邵公之德闕而不祀為善者何望乃表聞脩葺之李安世為相州刺史以西門豹史起有功於民者為之脩飾廟堂隋漢王諒為并州總管先是文水人郭雋家門雍睦七葉共居犬豕同乳烏鵲通巢時人義之諒聞嘉歎賜兄弟二十人衣各一襲唐許景先開元中為鶚州刺史閿鄉人梁文貞少從征役比囘而父母皆卒文貞恨不終養乃泣血廬墓三十餘年景先奏請宣付史官李栖筠為浙西觀察使時蘇州嘉興人徐岱少好學六籍諸子悉所探究栖筠厚遇之為改所居為復禮鄉冊府元龜卷六百八十七
