body:
  text: 冊府元龜卷八百六十七宋王欽若等撰總録部内舉自知内舉夫舉不避親儒者之至行立不爲比君子之格言蓋竭忠於公家非專私於我族惟善所在何嘗之有若乃挺生令嗣旁及支庶同氣昭乎競爽卑屬彰於燕翼繇是發於言薦列諸奏牘用副清問以塞嘉招紹光世濟之羙克膺寵任之大至乃施及外姻義敦恊比克副所舉固匪過言斯並可尚也已祁奚爲晉大夫請老老致仕晉侯問嗣焉嗣續其職者稱解狐其讐也將立之而卒解狐卒又問焉對曰午也可午祁奚子於是羊舌職死矣晉侯曰孰可以代之對曰赤也可赤職之子伯華於是使祁午爲中軍尉羊舌赤佐之各代其父君子謂祁奚於是能舉善矣稱其讐不爲謟立其子不爲比舉其偏不爲黨謟媚也偏屬也尚書曰無偏無黨王道蕩蕩尚書洪範也蕩蕩平正無私其祁奚之謂矣魏舒爲晉大夫獻子也謂賈辛有力於王室已爲祁大夫以魏戊爲梗陽大夫戊魏舒庶子魏子謂成鱄鱄晉大夫我與戊也縣人其以我爲黨乎對曰何也戊之爲人也遠不忘君遠疏遠也近不偪同不偪同位居利思義不茍得在約思純無濫心有守心而無淫行雖與之縣不亦可乎昔武王克商光有天下光大也其兄弟之國者十有五人姬姓之國者四十人皆舉親也夫舉無他惟善所在親疏一也詩曰惟此文王帝度其心莫其德音其德克明克明克類克長克君王此大邦克順克比比於文王其德靡悔既受帝祉施於孫子詩大雅羙文王能王大國受大福施其子孫心能制義曰度帝度其心德正應和曰莫莫然清靜炤臨四方曰明勤施無私曰類施而無私物得其所無失類也敎誨不倦曰長敎誨長人之道賞慶刑威曰君作威作福君之職也慈和徧服曰順惟順故天下徧服擇善而從之曰比比方善事使相從也經緯天地曰文經緯相錯故織成文九德不愆作事無悔九德上九事也皆無愆過則動無悔吝故襲天禄子孫賴之襲受也主之舉也近文德矣所及其遠哉舉魏戊等勤施無私心其四人者擇善而從故曰近文德所及遠也賈辛將適其縣見於魏子魏子曰今女有力於王室是以舉女因賈辛有功而後舉之言人不可無能行乎敬之哉母墮乃力墮損也仲尼聞魏子之舉也以爲義曰近不失親謂舉魏戊遠不失舉以賢舉可謂義矣又聞其命賈辛也以爲忠先賈王室之功故爲忠詩曰永言配命自求多福忠也詩大雅永長也言能長配天命致多福者惟忠魏子之舉也義其命也忠其長有後於晉國乎漢王鳯成帝時爲大將軍輔政凡十一歲陽朔三年秋鳯疾天子數自臨問親執其手涕泣曰將軍病如有不可言平阿侯譚鳯庶弟也次將軍矣不可言謂死也不欲斥言之鳯頓首泣曰譚等雖與臣至親行皆奢僭無以率𨗳百姓不如御史大夫音謹敕敕整也音鳯之從弟也臣敢以死保之及鳯且死上疏謝帝復固薦音自代言譚等五人必不可用譚庶弟商成都侯立紅陽侯根曲陽侯逢時高平侯天子然之初譚倨不肯事鳯倨慢也而音敬鳯卑恭如子故薦之後漢耿純爲高陽侯初從光武攻王郎墮馬折臂時疾發乃還詣懷宫懷宫河内縣名有離宫焉帝問卿兄弟誰可使者純舉從弟植於是使植將純營純猶以前將軍從晉周浚武帝時爲侍中帝問浚卿宗後生稱誰爲可答曰臣叔父子恢稱重臣宗從父子馥稱清臣宗帝並召用王𨗳元帝初爲丞相𨗳從弟稜少厯清官渡江爲帝丞相從事中郎𨗳以稜有政事宜守大郡乃出爲豫章太守郗鑒明帝時爲太尉既寢疾上疏曰臣亡兄息晉陵内史邁謙愛養士甚爲流亡所宗又是臣門戸子弟堪任兖州刺史公家之事知無不爲是以敢希祁奚之舉謝安孝武時爲侍中都督揚豫徐兖青五州幽州之燕國諸軍事假節時苻堅彊盛疆場多虞諸將敗退朝廷求文武良將可以鎮禦北方者安乃以兄子𤣥應舉中書侍郎超雖素與𤣥不善聞之而歎曰安違衆舉親明也𤣥應機征討所在尅捷桓沖爲車騎將軍荆州刺史符堅遣慕容垂毛當冦鄧城符熈石越冦新野沖既憚堅衆又以疾疫還鎮上明表以夏口江沔衝要宻邇彊冦兄子石民堪居此任輙版督荆江十郡軍事振武將軍襄城太守溫嶠字太真元帝初鎮江左嶠爲司空劉琨右司馬及琨爲并州都督琨爲段匹磾所害從事中郎盧諶等率餘衆奉其子羣依段末波嶠前後表稱姨弟劉羣内弟崔悦盧諶等皆在末波中翹首南望愚謂此等並有文思於人之中少可愍惜如䝉録召繼絶興亡則陛下更生之恩亘古無二宋王誕字茂世從弟惠恬靜不交遊高祖聞其名以問誕誕曰惠後來秀令鄙宗之羙也即以爲行太尉叅軍事王敬𢎞太祖初即位爲左僕射先是從弟𢎞之解職同行家在㑹稽上虞時敬𢎞爲吏部尚書奏徴𢎞之爲庶子不就及敬𢎞爲左僕射又陳𢎞之高行表於初業苦節彰於暮年今内外晏然當修太平之化宜招空谷以敦沖退之羙又徴爲通直散騎常侍不就栁元景孝武大明中爲尚書令弟子世隆㓜挺然自立不與衆同雖門勢子弟獨修布衣之業長好讀書折節涉獵文史元景獨賞愛之異於諸子言於帝得召見帝曰此兒將來復是三公一人南齊紀僧真明帝時爲游擊將軍兼司農帝欲令僧真治郡僧真啓進其弟僧猛爲鎮蠻䕶軍晉熈太守梁長沙宣武王懿初仕齊明帝時明帝作相内外多虞就懿求諸弟有可委以心腹者懿言恢焉明帝以恢爲寧遠將軍甲仗百人衛東府且引爲驃騎法曹行叅軍周捨外弟徐摛爲左衛司馬㑹晉安王綱出戍石頭高祖謂捨曰爲我求一人文學俱長兼有行者欲令與晉安游處捨曰臣外弟徐摛形質陋小若不勝衣而堪此選高祖曰必有仲宣之才亦不簡其容貌以摛爲侍讀庾詠爲都官尚書有族弟沙彌爲臨川王國中軍田曹行叅軍嫡母劉氏寢疾沙彌侍側衣不解帶及母亡水漿不入口終喪不解衰絰詠表言其狀應純孝之舉高祖召見嘉之以補歙令後魏李順爲四部尚書從弟孝伯羙風儀動有法度順言之於太武徴爲中散郎武帝見而異之謂曰真卿家千里駒也高允文成時爲秘書監加左將軍孝文即位叅決大政允族孫聰涉獵經史頗有文才允嘉之數稱其羙言之朝廷云青州蔣少遊與從孫僧智聰字僧智雖爲孤弱然皆有文情繇是與少遊同拜中書博士房堅字千秋爲司空諮議齊州大中正孝文臨軒令諸州中正各舉所知千秋與幽州中正陽尼各舉其子孝文曰昔有一祁名垂徃史今有二奚當聞來牒後周杜攢仕西魏出帝爲黄門侍郎兼度支尚書衛大將軍西道行臺尚帝妹新豐公主攢族子杲學涉經史有當世才略攢清真有識鑒深器重之嘗曰吾家千里駒也因薦之於朝廷永熈三年起家奉朝請蘓讓拜邠州刺史讓從弟綽少好學博鑒羣書猶善筭術太祖餞讓於東都門外臨别謂讓曰卿家子弟之中誰可任用者讓因薦綽太祖乃召爲行臺郎唐狄仁傑爲内史子光嗣則天聖厯初爲司府丞則天令宰相各舉尚書郎一人仁傑乃薦光嗣拜地官員外郎莅事稱職則天喜而言曰祁奚内舉果得其人蔣將明德宗朝爲國子司業集賢學士子乂弱冠該博羣籍將明在集賢日嘗以兵亂之後圖籍溷雜乃白執政請令乂入院編次於是宰相張鎰署乂爲集賢編録纔逾一年於散亂中整緝二萬餘卷勒成部秩韋賢之順宗永貞中除監察御史上書舉季弟纁自代時議不以爲私轉右補闕而纁竟代爲監察御史漢蘇悦逢吉父也悦爲高祖從事甚見禮遇因從容薦逢吉曰老夫髦矣才器無取男逢吉粗學援毫性復恭恪如公不以㹠犬之微願令事左右高祖召見以精神爽聰甚憐之有頃擢爲賓佐自知自知者明既標於前訓不能則止亦著於格言繇審已以惟艱爰修身而有待是以度德以處義量能而受任或不居於作者或竊比於前人既行之不疑亦事必有立蓋達識之共貫諒通人之攸許儻語吾誰不若則近於自矜如曰人各有能尚存乎揣分是故上則成天下之務次則敦自牧之風至於奮庸鮮有敗事斯所謂自知之難也范獻子名鞅晉大夫也獻子曰鞅也居處恭不敢安易敬學而好仁和於政而好行其道謀於衆不以賈好賈求和志雖衆不敢謂是也必長者之繇宣子曰庶可以免耳孔子曰吾十有五而志於學三十而立有所成立四十而不惑不疑惑五十而知天命知天命之始終六十而耳順直聞其言而知其微旨七十而從心所欲不踰矩矩法也從心所欲無餘法又曰十室之邑必有忠信如丘者焉不如丘之好學也又曰口力我數年五十以學易可以無大過矣易窮理盡性以至於命年五十而知天命以知天命之年讀至命之書故可以無大過矣又葉公問孔子於子路子路不對葉公名諸梁楚大夫食采於葉僭稱公不對者未知所以答子曰女奚不曰其爲人也發憤忘食樂以忘憂不知老之將至云爾又曰若聖與仁則吾豈敢抑爲之不厭誨人不倦則可謂云爾已矣又曰茍有用我者期月而已可也三年有成端木賜字子貢衛人孔子問曰汝與回也孰愈愈猶勝也對曰賜也何敢望回回也聞一以知十賜也聞一以知二又叔孫武叔語大夫於朝曰子貢賢於仲尼子服景伯以告子貢子貢曰譬之宫牆賜之牆也及肩窺見室家之好漆雕開孔子弟子孔子使開仕對曰吾斯之未能信開弟子漆雕姓開名仕進之道未能信者未能究也子説善其志道深孟子曰宰我子貢善爲説辭冉牛閔子騫顔淵善言德行孔子兼之曰我於辭命則不能也言人各有能我於辭言命教則不能如二子公孫丑曰然則夫子既聖矣乎丑見孔子但言不能辭命不言不能德行謂孟子欲自比孔子故曰夫子既已聖矣曰惡是何言也昔者子貢問於孔子曰夫子聖矣乎孔子曰聖則吾不能我學不厭而敎不倦也子貢曰學不厭智也敎不倦仁也仁且智夫子既聖矣夫聖孔子不居是何言也繇于爲楚大夫城麋於麋築城復命子西問高原弗知子西曰不能如辭言自知不能當辭勿行對曰固辭不能子使于也人各有能王遇盜於雲中于受其戈此于所能也脾洩之事于亦不能也初呉入郢昭王隨涉睢濟江入于雲中王寢盜攻之以戈擊王繇于以背受之中肩王奔鄖繇于徐蘇而從王之在隨也子西恐國人潰散爲王輿服以國于脾洩聞王所在而後從也孫叔敖者楚之處士也三得相而不喜知其材自得至也三去相而不悔知非已之罪也漢曹參爲齊相國及蕭何薨參聞之告舍人趣治行舍人私属乃主家事者趣音促速也治行謂修治行裝也吾且入相居無何使者果召參趙廣漢爲京兆尹先是雋不疑爲京兆尹京師紀之故廣漢言我禁姦止邪行於吏民至於朝廷事不及不疑遠甚後漢杜篤郡爲文學掾以目疾二十餘年不窺京師篤之外高祖破羗將軍辛武賢以武畧稱篤嘗歎曰杜氏文明善政而篤不任爲吏辛氏秉義經武而篤又怯於事外内五世至篤衰矣楊秉爲太尉性不飲酒又早喪夫人遂不復娶所在以淳白稱嘗從容言曰我有三不惑酒色財也魏杜畿京兆人少有大志京兆尹張時河東人也與畿有舊署爲功曹嘗嫌其濶達不甚畱意於諸事言此家疏誕不中功曹也畿竊云不中功曹中河東太守也後卒爲河東太守蜀諸葛亮居隆中躬耕身長八尺每自比於管仲樂毅時人莫之許也惟博陵崔州平潁川徐庶與亮友善謂爲信然後至丞相龎統字士元顧邵來就統宿因問統卿名知人吾與卿孰愈統曰陶冶世俗甄綜人物吾不及卿論帝王之秘䇿攬倚仗之要最吾似有一日之長邵安其言而親之位至軍師中郎將董允代費禕爲尚書令禕以朝晡聽事其間接納賔客飲食嬉戯加之博奕每盡人之懽事亦不廢允欲斆禕之所行旬日之中事多愆滯允乃嘆曰人才力相懸若此甚遠此非吾之所及也聽事終日猶有不暇爾晉何邵爲司徒優游自足不貪權勢嘗語鄉人王銓曰僕雖名位過幸少無可書之事惟與夏侯長容揀授博士可傳史冊耳胡威爲徐州刺史入朝武帝語及平生因嘆其父清謂威曰卿清孰與父清威對曰臣不如也帝曰何爲不如對曰臣父清恐人知臣清恐人不知是臣不如者遠也山濤少家貧謂妻韓氏曰忍寒苦我後當作三公但不知卿堪作夫人否耳後濤果至司徒袁甫嘗詣中領軍何朂自言能爲劇縣朂曰惟欲宰縣不爲臺閣職何也甫曰人各有能譬繒中之好莫過錦錦不可以爲幍榖中之羙莫過稲稲不可以爲虀是以聖王使人必先以器茍非周材何能悉長黄覇馳名於州郡而息譽於京邑廷尉之材不爲三公自昔然也朂善之除松滋令謝鯤爲王敦大將軍長史嘗使至都明帝在東宫見之甚相親問曰論者以君方庾亮自謂何如答曰端委廟堂使百僚準則鯤不如亮一丘一壑自謂過之張賔字孟孫少好學博渉經史不爲章句濶達有大節嘗謂昆弟曰吾自言智筭鑒識不後子房但不遇高祖耳後爲石勒所用謂之右侯陸玩爲司空既拜有人詣之索杯酒瀉置柱梁之間咒曰當今之材以爾爲柱石莫傾人梁棟耶玩笑曰感卿良箴既而嘆息謂客曰以我爲三公是天下爲無人談者以爲知言宋禇炫司徒淵之從弟少清簡淵嘗謂人曰從弟亷隅獨立乃十倍於我也後至散騎常侍袁粲爲中書監司徒侍中初粲孝武大明中與蕭惠開周朗同車行逢大桁惠開駐車共語惠開取鏡自炤曰無年可仕朗執鏡良久曰視死如歸粲最後曰當至三公而不終也後魏韋珍爲荆州刺史典尚書盧淵征赭陽爲齊將垣厯生蔡道恭所敗免歸鄉里臨别謂淵曰主上聖明志吞呉㑹用兵機要在於上流若有事荆楚恐老夫復不得停耳後車駕征楚復起珍爲中軍大將軍彭城王勰長史溫子昇爲中書郎嘗詣梁使館受國書自以不修容止謂人曰詩章易作通峭難爲大將軍高澄客元元姓也史失其名曰諸人當賀推子昇合陳辭子昇久忸怩乃推陸操焉北齊薛琡字曇珍形貌魁偉少以幹用仕魏稱爲典客令每引客見儀望甚羙魏帝召而謂之曰卿風度峻整姿貌秀異後當升進以處何官琡曰宗廟之禮不敢不敬朝廷之事不敢不忠自此以外非庸臣所及唐屈突通爲陝東大行臺右僕射鎮於雒陽數歲徴拜刑部尚書通自以不習文法固辭之轉工部尚書盧懷慎𤣥宗開元三年遷黄門監懷慎與紫微令姚崇對掌樞密懷慎自以爲吏道不及崇每事皆推讓之李夷簡爲門下侍郎平章事時裴度當國柄李師道未平度方以兵機爲任夷簡自揣敷奏之辯細畧之才不能踰度未數日復求出鎮遂拜簡較佐僕射平章事充淮南節度使李鄘爲淮南節度使徴拜門下侍郎平章事鄘雖出入顯重素不以公輔自許年侵勢過頗安外鎮登祖筵聞樂而泣且曰宰相之任非吾所長也行頗緩至京師又辭疾歸第既謁亦不領政事上章以疾辭罷爲戸部尚書鄭綮爲詩多侮劇刺時號鄭五歇後體累官散騎常侍昭宗見其詩什激訐謂有藴蓄就班簿側注云鄭綮可禮部侍郎平章事中書胥吏詣其家叅謁綮笑而謂之曰諸君大誤俾天下人並不識字宰相不及鄭五也制下親賔來賀搔首言曰歇後鄭五作宰相時事可知矣終以物望非宜自求引退後唐崔沂唐宰相𤣥之幼子昭宗時累遷至員外郎知制誥惟執厲守道而文彩非所長嘗與同舍顔蕘錢珝俱秉筆見蕘珝贍速草制數十如飛無妨談笑而沂久未成文頗自愧翌日謁國相訢曰沂疎淺不足供詞翰之職守官則敢不䇿厲以報掄選相輔然之移爲諫議晉薛融高祖天福三年自左諫議大夫遷中書舍人自以文學非優不敢拜命復爲諫議冊府元龜卷八百六十七
