body:
  text: 册府元龜卷三百三十六宋王欽若等撰宰輔部識闇依違强狠識闇夫銓宰所寄台輔之尊兼總萬機弼成九序安危所擊於是在焉寅亮之功可謂難矣至若絳侯見問無聞骨鯁之談平津秉成終負依阿之累以黄霸之治行而削牘之奏頗乖以王導之元勲而授鉞之謀或爽此數君者尚或失之况於中庸之才而荷阿衡之重乎是知注意之舉簡心實難苟授受之或愆将謨謀而曷補豈惟巖廊論道虧宰正之風固将㝢縣罹憂失具瞻之望矣漢劉屈氂武帝末為丞相戾太子為江充所譛殺充發兵入丞相府屈氂挺身逃亡其印綬挺引也獨引身而逃難故失印綬也是時帝避暑在甘泉宫丞相長史棄疾置以聞置謂所置驛也帝問丞相何為對曰丞相秘之未敢發兵帝怒曰事籍籍如此何謂秘也籍籍猶紛紛也丞相無周公之風矣周公不誅管蔡乎楊敞昭帝末為丞相昌邑王徴即位淫亂大将軍光與車騎将軍張安世謀欲廢王更立議既定使大司農田延年報敞敞驚懼不知所言汗出洽背徒唯唯而已唯唯恭應之辭也延年起至更衣古者延賓必有更衣之處也敞夫人遽從東箱遽速也謂敞曰此國大事今大将軍議已定使九卿来報君侯君侯不疾應與大将軍同心猶與無决先事誅矣與讀曰豫延年從更衣還敞夫人與延年参語許諾三人共言故云参語請奉大将軍教令黄霸宣帝五鳳中為丞相京兆尹張敞舍鶡雀飛集丞相府鶡音芬字本作鳻此通用耳鳻雀大而青出羌中霸以為神雀議欲以聞敞奏霸曰竊見丞相請與中二千石博士雜問郡國上計長吏守丞為民興利除害成大化條其對有耕者讓畔男女異路道不拾遺及舉孝子弟弟貞婦者為一軰先上殿丞相所坐屋也屋之髙通呼為殿舉而不知其人數者次之不為條教者在後叩頭謝丞相雖口不言而心欲其為之也長吏守丞對時臣敞舍有鶡雀飛止丞相府屋上丞相以下見者數百人邊吏多知鶡雀者問之皆陽不知丞相圖議上奏圖謀也曰臣聞上計長吏守丞以興化條凡言條者一一而舉之皇天報下神雀後知從臣敞舍来乃止郡國吏竊笑丞相仁厚有知畧微信竒怪也昔汲黯為淮陽守辭去之官謂大行李息曰御史大夫張湯懐詐阿意以傾朝廷公不早白與俱受戮矣息畏湯終不敢言後湯誅敗帝聞黯與息語乃抵息罪而秩黯諸侯相取其思竭忠也臣敞非敢毁丞相也誠恐羣臣莫白而長吏守丞畏丞相指歸舍法令各為私教舍廢也務相増加澆淳散樸不雜為淳以水澆之則味漓薄樸大質也割之散也並行偽貌有名無實傾揺懈怠甚者為妖假令京師先行讓畔異路道不拾遺其實亡益廉貪貞滛之行而以偽先天下固未可也即諸侯先行之偽聲軼於京師非細事也軼過也音逸漢家承敝通變造起律令即以勸善禁姦條貫詳備不可復加宜令貴臣眀飾長吏守丞飾讀為勅以下類此歸告二千石舉三老孝弟力田孝廉㢘吏務得其人郡事皆以義法令簡式簡局也毋得擅為條教敢挟詐偽以奸名譽者必先受戮奸求也音干用以正眀好惡天子嘉納敞言召上計吏使侍中臨飾如敞指意霸甚慙蕭望之為御史大夫宣帝五鳳中大司農中丞耿夀昌奏設常平倉帝善之望之非夀昌此望之不知權道後漢崔烈靈帝時為大司徒㑹西羌反邊章韓遂作亂隴右徴發天下役賦無已烈以為宜棄凉州詔㑹公卿百官烈堅執先議議郎傅燮厲言曰斬司徒天下乃安尚書郎楊賛奏爕廷辱大臣帝問爕爕對曰昔冐頓至逆也樊噲為上将願得十萬衆横行匈奴中憤激思奮未失人臣之節顧計當從與不耳季布猶曰噲可斬也今凉州天下要衝國家藩衛髙祖初興使酈商别定隴右世宗拓境列置四郡議者以為斷匈奴右臂今牧御失和使一州叛逆海内為之騷動陛下卧不安寝烈為宰相不念為國思所以弭之之䇿乃欲割棄一方萬里之土臣竊惑之若使左衽之虜得居此地士勁甲堅因以為亂此天下之至慮社稷之深憂也若烈不知之是極蔽也知而故言是不忠也帝從爕議王允獻帝初為司徒是時太師董卓既為吕布所殺允初議赦卓部曲吕布亦數勸之既而疑曰此軰無罪從其主耳今若名為惡逆而特赦之適足使其自疑非所以安之之道也吕布又欲以卓財物班賜公卿将校允又不從而素輕布以劍客遇之布亦負其功勞多自誇伐既失意望漸不相平允性剛稜疾惡初懼董卓豺狼故折節圖之卓既殱滅自謂無復患難及在際㑹每乏温潤之色仗正持重不循權冝之計是以羣下不甚附之董卓将校及在位者多凉州人允議罷其軍或説允曰凉州人素憚袁氏而畏關東今若一旦觧兵關東則必人人自危可以皇甫義真為将軍就領其衆因使留陜以安撫之而徐與關東通謀以觀其變允曰不然關東舉義兵者皆吾徒耳今若距險屯陜雖安凉州而疑關東之心甚不可也時百姓訛言當悉誅凉州人遂轉相恐動其在關中者皆擁兵自守更相謂曰丁彦思蔡伯喈但以董公親厚並尚從坐今既不赦我曹而欲觧兵眀日當復為魚肉矣卓部曲将李傕郭氾等先将兵在關東因不自安遂合謀為亂九州春秋曰胡文才楊整修皆凉州人王允素所不善也及李傕之叛乃召文才整修使来允諭之不假借温顔謂曰關東䑕子欲何為乎卿往之於是二人往實召兵而還乃先遣使詣長安求乞赦免允以為一嵗不可再赦不許之後傕等入城共表請允出問太師何罪允窮蹙乃下廷尉後數日見殺晉楊駿恵帝時為太傅皇后賈氏矯詔将誅駿駿時居曹爽故府在武庫南聞内有變召衆官議之太傅主簿朱振説駿曰今内有變其趣可知必是閹豎為賈后設謀不利於公冝燒雲龍門以示威索造事者首開萬春門引東宫及外營兵公自擁翼皇太子入宫取姦人殿内震懼必斬送之可以免難駿素怯懦不决乃曰魏眀帝造此大功奈何燒之侍中傅祗夜白駿請與武茂俱入雲龍門察事勢祗因謂羣寮宫中不宜空便起揖於是皆走尋而殿中兵出燒駿府駿死焉王導為司徒時徐龕反叛導以太子左衛率羊鍳是龕州里冠族必能制之請遣北討鍳深辭才非将帥太尉郄鍳亦表謂鍳非才不宜妄使導不納强啟授以征討都督果敗績庾亮成帝初為䕶軍輔政是時冠軍将軍歴陽内史蘇峻潛有異志亮欲徴之峻聞将徴遣司馬何仍詣亮曰討賊外任逺近從命至於内輔實非所堪不從遂優詔徵峻為大司農加散騎常侍位特進以弟逸代領部曲峻數疑亮欲害己表曰昔眀皇帝親執臣手使臣北討今中原未靖無用家為乞補青州界一荒郡以展鷹犬之用復不許峻嚴装将赴召而猶豫未决参軍任讓謂峻曰将軍求處荒郡而不見許事勢如此恐無生路不如勒兵自守峻從之遂不應命温嶠聞峻不受詔便欲下衛京都三吴又欲起義兵亮並不聴而報嶠書曰吾憂西陲過於歴陽足下無過雷池一歩也既而峻将韓晃冦宣城亮遣距之不能制峻乗勝至于京都詔假亮節都督征討諸軍事戰于建陽門外軍未及陣士衆棄甲而走亮乗小船西奔宋江夏王義恭録尚書事受孝武遺制輔政阿衡㓜主而引身避事政歸近習越騎校尉戴法興中書舍人巢尚之専制朝權威行近逺吏部蔡興宗職管九流銓衡所寄毎至上朝輙與令録以下陳欲登賢進士之意又箴規得失博論朝政義恭素性怯撓阿順法興甞慮失㫖聞興宗言輙戰懼無計南齊王敬則眀帝即位初為大司馬増邑千戸臺使拜授日雨大洪注敬則文武皆失色一客在傍曰公由来如此昔拜丹陽吴興時亦然敬則大悦曰我宿命應得雨乃列羽儀朝服道引出㕔事拜受意猶不自得吐舌久之至於事竟後魏劉潔太武時為尚書令勅勒新民以将吏侵奪咸出怨言期牛馬飽草當赴漠北潔與左僕射安原奏欲及河氷未觧徙之河西氷觧之後不得北遁太武曰不然此等習俗放散日久有似園中之鹿急則衝突緩之則定吾自處之有道不煩徙也潔等固執乃聴分徙三萬餘落於河西西至曲鹽池新民驚駭皆曰圏我於河西之中是将殺我也欲西走涼州潔與侍中古弼屯五原河北左僕射安原屯悦㧞城北備之既而新民數千騎北走潔追討之走者糧絶相枕而死隋裴藴煬帝大業末為御史大夫叅掌機務事司馬徳戡将為亂江陽長張恵紹夜馳告之藴共恵紹謀欲矯詔發郭下兵民盡取榮公䕶兒節度収在外逆黨宇文化及等仍發羽林殿脚遣范富婁等入自西苑取梁公蕭鉅及燕王處分扣門援帝謀議已定遣報虞世基世基疑反者不實抑其計須臾難作藴嘆曰謀及播郎竟悮人事遂見害子愔為尚輦直長亦同日死唐蕭瑀太宗時特進参預朝政瑀常稱房𤣥齡已下同中書門下内臣悉皆朋黨比周無忠心奉上累獨奏云此等相與執權有同膠漆陛下不細諳知但未反耳帝謂瑀曰為人君者驅駕英才推心待士公言不亦甚乎何至如此瑀又以為帝偏信臣下所言不誠帝數謂瑀曰知臣莫若君夫人不可求備自當捨其短而用其長朕雖才謝聰眀不應頓迷臧否數為瑀信誓瑀既不自得而帝積久銜之終以瑀忠貞居多而未廢也楊師道為侍中多所引薦而乏於知人所引者無君子小人之别敬暉中宗神龍初為侍中與桓彦範等誅張易之兄弟也雒州長史薛季昶謂暉曰二㓙雖除産禄猶在請因兵勢誅三思之屬正王室以安天下暉與東之屢陳不可乃止季昶歎曰吾不知死所矣翌日三思因韋后之助潛入宫中内行相事反易國政為天下所患時議以此歸咎於暉等暉既失政柄受制於三思矣暉每推床嗟惋或彈指出血柬之歎曰主上疇昔為英主時素稱勇烈吾留諸武兾自誅鋤耳今事勢已去知復何道楊國忠元宗天寳末為右相范陽節度使安禄山舉兵向闕以國忠為名及哥舒翰守潼關諸将皆以函關距京師三百里便在守險不利出攻國忠以翰持兵未决慮其於已不利欲其速戰自中督促之翰遂出關與賊戰於桃林王師敗績翰受擒國忠於朝堂命朝官報潼關之敗訪以救援安危之䇿刑部尚書張均御史大夫張倚已下百餘人唯唯無敢言者惟監察御史髙適請即日召募城中敢死之士及朝官各率家僮子弟出軍防遏國忠曰兵已入關事不及矣但垂泣良久乃言曰人上書言禄山反状已十年帝不信今日之事非宰臣之過常衮代宗大歴末為平章事既懲艾元載為政時公道梗澁賄賂朋黨大行不以財勢者無因入仕衮一切杜絶之中外百司奏請皆執不與勢與匹夫等尤排擯非詞科登第者雖窒賣官之路政事亦大致壅滯楊炎徳宗建中初平章事遽計議城平涼涇原節度使叚秀實以為方春未可請俟農隙炎怒其沮已召秀實為司農卿而以李懐光代之因此劉文喜涇州作亂朝廷震恐關播建中末為中書侍郎平章事乏於知人之鍳好大言虚誕者播必悦而親信之有李元平陶公達張愻劉承誡皆言談詭妄誇大可立功名亦有微材薄藝播累奏元平等皆可将相也請閲試用之徳宗以為然以元平為補闕㑹淮西節度使李希烈叛亂以汝州要鎮令選刺史播薦元平為汝州刺史元平至州旬日為希烈擒之而去州亦䧟賊中外嗤哂之由是公達等不克任用自建中已後方隅之起兵者皆天下劇賊而楊炎以路恕為懐州刺史使捍諸田關以李元平為汝州别駕圖李希烈談者以為笑鄭餘慶憲宗元和初為尚書左丞平章事属夏州将楊惠琳叛帝命宰臣等論奏多議兵事餘慶復以古義上言夏州軍士皆仰給縣官又有介馬萬蹄之語時議以餘慶雖好博雅而未達時事崔植杜元頴為相時幽州節度使劉總将歸朝慮其有變籍軍中素有異志者薦之闕下時朱克融亦在籍中植元穎不知兵且無逺畧謂兩河無虞遂奏勒歸鎮長慶初幽州軍亂囚其帥張𢎞靖衆推克融統軍務焉蕭俛穆宗即位初為平章事是時帝乗章武恢復之餘兩河廓定四鄙無虞而俛與宰相叚文昌屢獻太平之䇿以為兵以靖亂時已治矣不宜黷武勸帝休兵偃武又以兵不可頓去請密詔天下軍鎮有兵處每年百人之中限八人逃死謂之消兵帝既荒縱不能深料遂詔天下如其䇿而行之而落籍之卒合而為盗伏於山林眀年朱克融王廷溱復亂河朔一呼而遺卒皆至朝廷方徴兵諸藩籍既不充尋行招募烏合之徒動為賊敗由是復失河朔盖消兵之失也盧携僖宗乾符末為門下侍郎平章事聞黄巢起曹濮南犯荆襄致書與越州觀察使崔璆求天平軍節度朝議不允又乞除官時宰相鄭畋與樞宻使楊復恭奏欲請授同正貟軍將携駁其議請授率府率如其不受請以髙駢討之及巢見詔大詬執政又自表乞安南都䕶廣州節度亦不允然巢以士衆烏合欲據南海之地永為巢穴坐邀朝命是嵗自春及夏其衆大疫死者十三四衆勸請北歸以圖大利巢不得已乃北踰五嶺渡淮抵雒陽留守劉允章率分司官迎於上東門繼攻陜虢逼潼關䧟華州留将喬鈴守之河中節度使李都詐進表于賊朝廷使田令孜率神策博野等軍十萬守潼闗賊乃自潼闗禁谷路入遂䧟京師時前夏州節度使諸葛爽亦統禁軍聞賊盛退保櫟陽及黄巢至乃降初田令孜之起神䇿軍也衆號七萬皆長安豪民以貨賂求𨽻六軍不能負矛㦸甲鎧之重乃祈於官執事者厚以直傭兩市之負販者以備其行其實不過三萬人但飾其旌旄鉦鼓而已及守潼關賊已他道而入一時狼狽廻至輦下時百官欲散携在中書省止之曰此必博野軍私自還也博野軍有七千人成六軍之數時以後發故謂其自還携至是懼罪馳歸仰藥而死後唐郭崇韜荘宗同光中為侍中兼樞宻使議者以崇韜功力雖多事權太重不能處身量力而聴小人悮計欲取泰山之安如急行避跡其禍愈速性復剛戾遇事便發既不知前代之成敗又未體當時之物情以天下為己任孟浪之甚也及權傾四海車騎迎門士人謟奉漸學流品同列豆盧革謂崇韜曰汾陽王代北人徙家華陰侍中世在雁門得非祖徳歟崇韜應曰經亂失譜諜先人甞云去汾陽王四世革曰故祖徳也因是旌别流品援引薄徒委之心腹佐命勲舊一切鄙棄舊寮有干進者崇韜謂之曰公雖代邸之舊然家無門閥深知公才伎不敢輙進者慮名流嗤余故也及征蜀之行於興平拜尚父子儀之墓豆盧革荘宗時為平章事同光三年冬雒下饋運不充軍士乏食日致怨咨帝深憂問所司濟贍之術革與宰相韋説依阿狥時竟無竒説但云陛下威徳冠天下今西蜀平定珍貨甚多可以取之以給軍士水旱作沴天之常道不足聖憂崔恊眀宗時為平章事天成三年九月恊甞侍坐言於帝曰臣聞食醫心鏡極好不假藥餌足以安心神左右見其膚淺不覺哂之安重誨眀宗長興中為樞宻使兼侍中有工部尚書李鏻頗希大用切欲為宰相人望非允鏻乃引偽吴覘人見重誨云吴國執政徐知誥将舉國稱藩願得令公一信即来歸向重誨不察事機即以為實然因出玉帯與覘者令歸工估其值數千緡經嵗無所聞竟成虚語盧文紀末帝清泰初為平章事是時帝與閔帝兄弟㝷戈之後宗社甫寜虜冦内侵强臣在境文紀處經綸之地無輔弼之謀所論者愛憎朋黨之小瑕所糾者銓選擬倫之微纇三年夏移易大元帥晋祖引虜拒命既而大軍挫衂官寨受圍間道告急八月帝親征過徽陵拜於闕門休於仗舍文紀扈從帝顧謂之曰朕聞主憂臣辱予自鳳翔来首命卿為宰相聴人言語将為便致太平今冦孽紛紛萬乗自行戰賊於汝安乎文紀惶恐致謝時帝季年天奪其魄聲言救寨其實倦行初次河陽召文紀張延朗謀事文紀曰虜騎倐往忽来無利則去大寨牢固足以枝梧况臣有三處救兵可以一戰而觧使人督促責以成功輿駕且駐河橋詳觀事勢况地處舟車之要正當天下之心必若未能解圍去亦非晚㑹延朗與趙延夀欵宻旁奏曰文紀之言是也故令延夀北行馬𦙍孫清泰末為平章事三年末帝親征太原行在懐州𦙍孫自雒都来朝獻時大寨被圍息耗斷絶趙徳均父子已懐異志惟范延光盡心而援孤兵寡駐蹕懐州君臣智窮慮索遽聞𦙍孫至以救焚之謀特来朝謁數日之間寂無所説羣臣往謁因言時事龍敏言國之治亂由君之聴斷因引管夷吾辭害霸之説云既與君子謀之又與小人圖之害霸也馬以譏時乃曰君子小人則殊而愛君盡心一也即如今强胡内侮扈從之人誰不願破賊夷兇致君於千枝萬葉諸官哂之漢楊邠𨼆帝時為門下侍郎平章事帝委任甚至凡南衙奏事中書除命先委邠斟酌如不出邠意至於一簿一掾亦不聴從邠雖長於吏事不識大體甞言為國家者但得帑藏豐盈甲兵强盛至於文章禮樂並是虚事何足介意也邠既専國政而務苛細條理前資官不得外方居止自京師至諸州府行人往来並湏給公憑者朝夕填咽旬日之間民情大擾行路壅塞邠乃止其事每懲二蘇之失逢吉禹珪難於除拜事多壅滯士人怨咨邠比與二相不恊又深嫉儒士凡所有平章動多矛盾周行之内自漢受命以至滅不沾一命者十有六七焉諸司補吏與門胄出身一切停罷時論以邠之蔽固如是亦由逢吉與禹珪本不能至公於物之所致也王章為平章事與楊邠同郡尤相親愛其奨用進㧞者莫非鄉舊甞輕視文臣曰此等若與一把算子未知顛倒何益於事依違夫彌論道廣寅亮功髙乃膺注意之求允恊致君之業是為良弼以賛永圖若乃畏懼取名唯諾自守昧獻賛而忘大政固恩寵以持兩端唯署字以因循必鄙諺而致誚焉用彼相不其然乎知無不為蓋異於是漢韓安國為御史大夫武帝時丞相田蚡抵言魏其侯竇嬰灌夫事帝問朝臣兩人孰是安國曰魏其言灌夫父死事夫父孟吴楚反時為校尉甞䧟堅遂死吴軍中身荷㦸馳不測之吴軍身被數十創名冠三軍此天下壮士非有大惡争杯酒不足引他過以誅也魏其言是丞相言灌夫通姦猾侵細民家累巨萬横恣潁川輘轢宗室侵犯骨肉此所謂支大於榦脛大於股不折必披丞相言亦是惟眀主裁之孔光為大司徒王莽以光名儒相三主太后所敬天下信之於是盛尊事光引光女婿甄邯為侍中奉車都尉諸哀帝外戚及大臣居位素所不説者説讀曰悦莽皆傅致其罪傅讀曰附附益而引致之令入罪為請奏令邯持與光光素畏慎不敢不上之後漢胡廣為司徒與太尉李固司空趙戒議欲立清河王蒜時大将軍梁冀以蒜年長有徳恐為後患盛意立蠡吾侯志廣戒等懾憚不能與爭而固與杜喬堅守本議晋荀顗為侍中太尉卒無質直之操惟阿意茍合於荀朂賈充之間宋劉勔為右僕射中領軍與齊太祖同受遺詔掌機事初勔髙尚其意託造園宅名為東山頗忽世務太祖謂之曰将軍以顧命之重任兼内外主上春秋未㡬諸王並幼布流物議遐邇所聞此是将軍艱難之日而将軍深尚從容廢省羽翼一朝事至雖悔何追勔竟不納南齊禇淵初仕宋為中書令與尚書令袁粲受顧命輔幼主時王道隆阮佃夫用事姦賂公行淵不能禁也隋虞世基為僕射知煬帝不可諌正又以髙熲張衡等相繼誅戮懼禍及已雖居近侍唯諾取容不敢忤意盗賊日甚郡縣多没世基知帝惡數聞之後有告敗者乃抑損表状不以實聞是後外間有變帝弗之知也唐李勣為太尉髙宗欲廢王皇后立武昭儀韓瑗来濟諌皆不納勣宻奏曰此是陛下家事何須問外人上意乃定于志寜為太子太師同中書門下三品王庶人之廢也李勣許敬宗宻申勸請志寜獨無言以持兩端蘇味道則天延載長夀中再為鳳閣侍郎同鳳閣鸞臺三品味道善敷奏多識臺閣故事然而前後居相位數載不能有所發眀但脂韋其間苟度取容而已故時人號為模稜于今以為口實源乹曜元宗開元中為侍中任政事十年時張嘉貞張説相次為中書令乹曜不敢與之爭權事皆推讓之及李元紘杜暹知政事乹曜遂無所参議但唯諾署名而已初乹曜因姜皎所薦遂䝉擢用又皎得罪為張嘉貞所擠乹曜竟不救之議者以此譏焉裴耀卿為左丞相開元二十五年逸人姜撫獻長春酒方𤣥宗分賜年衰朝官兼與方法耀卿與文武百官上表賀曰伏承逸人姜撫獻同度山長生藥秘精英而日久候聖眀而乃彰伏惟陛下大聖撫運深仁濟俗和氣時若淳風穆然上帝式臧用分景福逸人斯至乃表長生藥薦長春酒和甘露天杯蹔御神䇿逾増益光眀於日月齊長久於天地臣子大慶開闢所無朝野多歡蹈舞相繼况自中外賜藥兼及逺方使人寰同昇夀域慶流渥澤馳景廻光凡在生靈不勝悦慶臣等望進禮食以稱夀觴歡寳祚之無疆樂微生之有遇許之時士庶競服長春酒多有暴卒者帝懼而止陳希烈為左相時右相楊國忠用事希烈畏其權寵凡事唯諾無敢發眀韋見素為武部尚書同平章事係楊國忠引用心徳之時禄山與國忠争寵兩相猜嫌見素無所是非署字而已劉滋為左散騎常侍平章事徳宗貞元中尚書右丞元琇為度支使韓滉所奏貶雷州司戸其責既重舉朝以為非罪多竊議者尚書左丞董晉謂滋及齊映曰元右丞忽有貶責未知罪名用刑一濫誰不畏懼假有權臣騁志相公何不奏請三司詳斷之去年關輔用兵時方蝗旱琇總國計夙夜憂勤以贍給師旅不增一賦軍用皆濟斯可謂國之勞臣也今此播逐恐失人心人心一揺則有聞鷄鳴起舞者矣竊為相公痛惜之滋映但引過而已董晉貞元五年為門下侍郎平章事與竇参同知政事而皆决在竇参晋但奉詔書唯諾而已賈躭在相位凡十三年不能以天下安危大事争於君前頗為知識之士所短權徳輿為禮部尚書平章事時李吉甫自淮南詔徴未一年憲宗又引用李絳時帝求治方切軍國無大小一付中書吉甫絳議政頗有異同或於上前争論形於言色其有詣於理者徳輿亦不能為之發眀竟以循黙而罷王涯為司空兼門下侍郎平章事初鄭注自謂有經濟之才文宗問以安人富國之術無以對因請𣙜茶涯知不可而不敢違孔緯為平章事時昭宗謁郊廟兩中尉内樞宻請朝服所司申前例中貴人例無朝服助祭之禮少府監亦無素製冠服中尉怒立令製造下太常禮官舉故事亦稱無中尉朝服助祭之文諌官亦論之緯奏曰中貴不衣朝服助祭國典也陛下欲以權道寵内臣則請依所兼之官而為之服天子召諌官謂之曰大禮日近無冝立異為朕容之於是内官朝服助祭後唐韋説拜平章事説性謹重奉職官常不造事端時郭崇韜秉政説等承順而已政事得失無所指言豆盧革為平章事荘宗同光三年宏文館奏請依六典故事改宏文館為崇文館敕崇文館比於宏文館並置今請改稱頗叶舊典從之樞宻使郭崇韜亡父名宏革希崇韜㫖奏而改之故云有宏文崇文並置之言也鄭珏為平章事眀宗延宰臣於元徳殿珏從容言曰近奉御札罷幸鄴都人情甚安咸仰聖徳其始議也珏亦賛之及罷行期珏又賛之大臣獻替若斯豈能責小臣之竊位邪强狠宰輔所以佐人君治天下調陰陽順元化者也必在乎中庸其徳平恕其心體貌温恭辭氣寛裕所以能通萬物之理副四海之瞻或其剛毅近仁木强率性忠言犯上直道異衆善則善矣恐非純和之徳焉矧訐以為直犯而必校以威勢而自處謂恭順而無益人所惡也禍必隨之漢周昌木强人也為御史大夫自蕭曹軰皆卑下之昌甞燕入奏事以帝宴時入奏事髙帝方擁戚姬昌還走帝逐得騎昌項帝問曰我何如主也昌仰曰陛下桀紂主也於是帝笑之然尤憚昌申屠嘉為丞相鼂錯為内史貴幸用事諸法令多所請變更議以適罰侵削諸侯適讀曰謫而丞相嘉自絀絀退也所言不用疾錯錯為内史門東出不便更穿一門南出南出者太上皇廟堧垣也嘉聞錯穿宗廟垣為奏請誅錯客有語錯錯恐夜入宫上謁自歸歸首於天子至朝嘉請誅内史錯帝曰錯所穿非真廟垣乃外堧垣故冗官居其中冗謂散軰也如今之散官且又我使為之錯無罪罷朝嘉謂長史曰吾悔不先斬錯乃請之言先斬而後奏為錯所賣至舍因歐血而死田蚡為丞相召客飲坐其兄盖侯北鄉自坐東鄉自處尊位鄉讀曰向以為漢相尊不可以兄故私撓撓曲也音汝教反由此滋驕滋益也後漢韓歆為大司徒好直言無𨼆諱光武每不能容甞因朝㑹聞帝讀隗囂公孫述相與書歆曰亡國之君皆有才桀紂亦有才帝大怒以為激發歆又證嵗将飢凶指天畫地言甚剛切坐免歸田里帝猶不釋復遣使召宣責之司𨽻校尉鮑永固請不能得歆及子嬰竟自殺晋楊駿為太傅輔政駿自知素無美望懼不能以輯和逺近乃依魏眀帝即位故事遂大開封賞欲以悦衆為政嚴碎愎諌自用不允衆心馮翊太守孫楚素與駿厚説之曰公以外戚居伊霍之重握大權輔弱主當仰思古人至公至誠謙順之道於周則周召為宰在漢則朱虚東牟未有庶姓専國而克終慶祚者也今宗室親重藩王方壮而公不與共参萬機内懐猜忌外樹私昵禍至無日矣駿不能從庾亮為中書令輔政専用威刑知蘇峻必為禍亂徴為大司農舉朝謂之不可平南将軍温嶠亦累止之皆不納峻果反後魏穆夀太武時恭宗監國夀與崔浩等輔政人皆敬浩夀獨凌之又自恃位任為人莫已及古弼為尚書令参政事欲入陳奏遇太武與給事中劉樹碁志不聴事弼侍坐良久不獲申聞乃起於太武前捽樹頭掣下牀以手摶其耳以拳毆其背曰朝廷不治實爾之罪髙肇為尚書令每事任已宣武延昌初遷司徒雖貴登台鼎猶以去要怏怏形乎辭色隋蘇威為宰相行已清儉以亷慎見稱然每至公議惡人異已雖或小事必固争之時人以為無大臣之體所修格令章程並行於當世頗傷煩碎論者以為非簡久之法楊素為右僕射與髙熲専掌朝政素性疎而辯髙下在心朝臣之内頗推髙熲敬牛宏厚接薛道衡視蘇威蔑如也自餘朝貴多被凌轢其才藝風調優於髙熲至於推誠體國處物平當有宰相識度不如熲逺矣唐蕭瑀為太常卿兼領御史大夫與宰相参議朝政瑀多詞辨每有評議房元齡等不能抗然心知其是所言殊不用瑀彌怏怏李義府遷右相入則諂言自媚出則肆其姦宄百寮畏之無敢言其過者髙宗頗知其罪失從容戒義府云聞卿兒子女婿皆不謹慎多作罪過我亦為卿掩覆未即公言卿可誡朂無令如此義府勃然變色顋頸俱起徐曰誰向陛下道此帝曰但我言如是何須問我所從得邪義府睕然殊不引咎緩歩而去帝亦優容之後長流巂州宗楚客中宗時為相御史崔琬劾楚客紀處訥宗晉卿等驕恣䟦扈人神同疾不加天誅詎清王度並請収禁差三司推鞫舊制大臣有被御史彈劾者即俯僂趨出立朝堂待罪楚客翻更咤顋作色而進自言執性忠鯁被琬誣奏帝性既寛仁竟不窮其事令釋之劉幽求𤣥宗先天元年拜尚書右僕射同中書門下三品監修國史幽求自謂功在朝臣之右而志求左僕射兼領中書令俄而竇懐貞為左僕射崔實為中書令幽求甚不平形於言色韓滉為左僕射同平章事然以前軰早達稍侮薄後進晚嵗至京師丞郎卿佐接之頗倨又元琇以纎芥微嫌䧟之重典衆不能平常衮為門下侍郎平章事其輕重任情不通時政又政事堂有後門盖宰相時過中書舍人院咨訪政事衮塞絶其門以示尊大不相往来後唐盧程荘宗同光初為中書侍郎平章事是時初下鄆州梁将王彦章䧟徳勝寨羣情恼恼内懐囂然帝於楊劉城躳厲士卒晝夜苦戰臣下皆憂之豆盧革與同列議上章規諌請不躳御士卒因言及漢髙臨廣武事楚人矢及於胸紿云虜中吾足程曰此劉季之失也㡬死老兵衆皆縮頸甞與羣官論士族或曰貟外孔龜眀善和之家宣聖之後公輔累世得非盛族歟程曰止於孔子之後盛則吾不知也親黨有假逓乗於程者程帖興唐府給付之府吏啟無例程怒鞭其背議者以浮薄之中凶狂為最時光禄卿任圜兼興唐少尹帝妺婿也馮其寵戚因詣程訴之程衣鶴氅華陽巾馮几决事盛怒見圜慢謂曰公是何蟲豸敢違吾命宰相取給於府縣公保惜胥吏圜不言而退夜急馳見帝面訴其事帝怒謂郭崇韜曰朕誤相此人凌辱於九卿促令自盡崇韜亦恐事将不測盧質横身觧之乃貶官右庶子豆盧革同光中平章事荘宗幸雒車駕次汜水翰林學士劉昫趙鳳于嶠等議髙祖太宗廟在雒北請帝親行拜薦庶天下知敬祖奉先之道革恥於失舉遂非不行識者譏之次偃師又議昭宗園陵不逺道周既除大憝車駕冝請告謁追思惋憤號慟寝園然後還宫始為得禮革與郭崇韜不達變禮又拒而不行孔循為東都留守帯平章事以孟夏等獻冝令攝太尉行事循稱使相有戎機不合當祠祭重事議者曰郊天祀地太尉之職無其人則宰相攝之循位同三事留守東平代掌武以供祀事而訴以戎機不自知貴强戾之甚也漢楊邠為左僕射兼門下侍郎平章事甞與三司使王章於御前論事隠帝曰事行之後勿俾有詞邠曰陛下但禁聲有臣等在左右聞者縮頸未㡬滅族其負氣寡識多此類也冊府元龜卷三百三十六
