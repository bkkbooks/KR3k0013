body:
  text: 冊府元龜卷二十七宋王欽若等撰帝王部孝徳夫徳教加於百姓刑於四海者天子之孝也若乃總制區宇尊居宸極至性内發𤣥化潜運率土之濱民徳歸厚矣其或在田處晦祗載之徳已隆膺期撫運奉養之誠彌竭至於逮事靡及追懐㒺極因心創鉅時思永感哀動左右風化天下傳曰君子篤於親則民興於仁盖聖人之教不肅而成不嚴而治繇兹道也帝舜側微堯聞其聰明將使嗣位乃曰咨四岳朕在位七十載汝能庸命巽朕位岳曰否徳忝帝位曰明明揚側陋師錫帝曰有鰥在下曰虞舜帝曰俞予聞如何岳曰瞽子父頑母嚚象傲克諧以孝烝烝乂不格姦帝曰我其試哉女於時觀厥刑于二女釐降二女于媯汭嬪于虞帝曰欽哉其後益賛于禹曰帝初于歴山徃于田日號泣于旻天于父母負罪引慝祗載見瞽瞍夔夔齊慄瞽瞍亦允若慝惡載事也夔夔慄懼之貌言舜負罪引慝敬以事見于父悚懼齊莊父亦信順之言能以至誠感頑父又按史記曰舜母死父瞽瞍更娶妻而生象瞽瞍頑母嚚弟象傲常欲殺舜舜避逃及有小過則受罪順事父及後母與弟象日以篤謹匪有懈順適不失子道兄弟孝慈欲殺不可得年二十而以孝聞三十而帝堯問可用者四嶽咸薦虞舜曰可於是堯乃以二女妻舜以觀其内九男與處以觀其外居媯汭内行稱謹堯二女不敢以貴驕事舜親戚甚有婦道堯九男皆益篤堯乃錫舜絺衣與琴為築倉廩予牛羊瞽瞍尚復欲殺之使舜上塗廩瞽瞍從下縱火焚廩舜乃以兩笠自扞而下得不死後瞽瞍又使舜穿井為匿空旁出舜既入深瞽瞍與象共下土實井舜從匿空旁出去瞽瞍象喜以舜為必死象曰本謀者象象與父母分於是曰舜妻堯二女與琴象取之牛羊倉廩予父母象乃止舜宫居鼔其琴舜徃見之象愕不懌曰我思君正鬰陶舜曰然爾其庻矣舜復事瞽瞍與象彌謹年五十攝行天子事六十一代堯踐帝位載天子旗徃朝父瞽瞍夔夔唯謹如子道封弟象為諸侯又按孟子曰人少則慕父母知好色則慕少艾有妻子則慕妻子仕則慕君不得於君則熱中大孝終身慕父母五十而慕者予於大舜見之矣熱中謂心熱恐懼又中庸篇載舜其大孝也與徳為聖人尊為天子富有四海之内宗廟饗之子孫保之劉向新序載昔者舜自耕稼陶漁而躬孝友父瞽瞍頑母嚚及弟象傲皆下愚不移舜盡孝道以供養瞽瞍與象為浚井塗廩之謀欲殺舜舜孝益篤出田則號泣年五十猶嬰兒慕可謂至孝矣故耕於歴山歴山之耕者譲畔陶於河濱而陶者噐不苦窳漁於雷澤雷澤之漁者均分及立為天子而蠻夷率服北發渠搜南撫交趾莫不慕義麟鳳在郊故孔子曰孝悌之至道通於神明光於四海舜之謂也商髙宗宅憂亮隂三祀隂黙也居憂信黙三年不言又按論語曰髙宗亮隂三年不言周文王之為世子朝於王季日三三皆日朝以其禮同雞初鳴而衣服至於寝門外問内豎之御者曰今日安否何如内豎小臣之屬掌内外之通命者御如今小使直日矣内豎曰安文王乃喜孝子當兢兢及日中又至亦如之及莫夜又至亦如之莫夕也其有不安節則内豎以告文王文王色憂行不能正履節謂居處故事履蹈地也王季復膳飲食安也然後亦復初觧憂食上必在視寒煖之節在察也食下問所膳問所食者命膳宰曰末有原應曰諾然後退末猶無也原再也勿有所再進謂其失飪臭味惡也退反其寝武王初為太子文王有疾武王不脱冠帶而養言常在側文王一飯亦一飯文王再飯亦再飯欲知氣力箴藥所勝旬有二日乃間間乃瘳也禮記中庸篇曰子曰武王周公其達孝矣乎夫孝者善繼人之志善述人之事者也漢髙祖居長安太上皇思欲歸豐髙祖乃更築城寺市里如豐縣號曰新豐乃徙民以充實之文帝居代時薄太后常病三年帝不交睫觧衣湯藥非口所嘗弗進後漢明帝永平七年皇太后隂氏喪帝性孝愛追慕無已十七年正月當謁原陵夜夢先帝太后如平生歡既寤悲不能寐即案歴明旦日吉遂率百官及故客上陵其日降甘露於陵樹帝令百官采取以薦會畢帝從席前伏御牀視太后鏡奩中物感動悲涕令易脂澤装具左右皆泣莫能仰視焉章帝母賈貴人明帝為太子以選入宫生帝而明徳馬太后無子明帝命太后養之謂曰人未必當自生子但患愛養不至耳后於是盡心撫育勞悴過於所生章帝亦孝性淳篤恩性天至母子慈愛始終無纎芥之間建初三年帝饗士於南宫因從太后周行掖庭池閣乃閲隂太后舊時器服愴然動容乃命留五時衣各一襲及常所御衣合五十箧餘悉分布諸王主及子孫在京師者各有差特賜東平王蒼及瑯琊王京書曰中大夫奉使親聞動静喜之何已歲月騖過山陵寖逺孤心悽愴如何如何間饗衛士於南宫因閱視舊時衣物聞於師曰其物存其人亡不言哀而哀自至信矣惟王孝友之徳亦豈不然今送光烈皇后假紒帛巾各一及衣一篋可時奉瞻以慰凱風寒泉之思又欲令後生子孫得見先后衣服之製今魯國孔氏尚有仲尼車輿冠履明徳盛者光靈逺也其光武皇帝器服中元二年已賜諸國不敢復送魏明帝追尊母文昭甄后初營宗廟掘地得玉璽方一寸九分其文曰天子羡思慈親明帝為之改容以太牢告廟又常夢見后於是差次舅氏親疎高下叙用各有差晉景帝居母宣穆張皇后喪以孝聞武帝泰始二年八月詔曰此上旬先帝棄天下日也便已周年吾㷀㷀當復何時一得叙人子之情邪思慕煩毒欲詣陵瞻侍以盡哀憤主者具行備太宰安平王孚尚書令裴秀尚書僕射武陔等奏陛下至孝蒸蒸哀思罔極衰麻雖除哀毁蔬食有損神和秋節尚有餘暑謁建山陵悲感摧傷羣下竊用竦息以為宜降抑聖情以慰萬國詔曰孤㷀忽爾日月已周痛慕摧感永無逮及欲奉瞻山陵以叙哀憤體氣自佳耳又已凉便當行不得如所奏也主者便具行備又詔曰漢文不使天下盡哀亦帝王至謙之志當見山陵何心而無服其禮以衰絰行秀等重奏曰臣聞上古喪期無數後世乃有年月之漸漢文帝隨時之義制為短喪傳之於後陛下社稷宗廟之重萬方億兆之故既從權制除衰麻羣臣百姓吉服今者謁陵以叙哀慕若加衰絰進退無當不敢奉詔詔曰亦知不在此麻布耳然人子情思為欲令哀喪之物在身盖近情也羣臣自當按舊制秀等又奏曰臣聞聖人制作必從時宜故五帝殊樂三王異禮此古今所以不同質文所以迭用也陛下隨時之宜既降心克已俯就權制已除衰麻而行心喪之禮今復制服義無所依若君服而臣不服亦未之敢安也叅議宜如前奏詔曰患情不能跂及耳衣服何在諸君勤勤之至豈苟相違四年帝母文明王皇后喪合𦵏崇陽陵將遷祔帝手疏后徳行命史官為哀䇿初居文帝喪帝雖從漢魏之制旣𦵏除服而深衣素冠除席撤膳哀敬如喪者有司奏改服進膳不許遂禮終而後復吉皇太后喪有司奏前代故事倚廬中施白縑帳蓐素牀以布巾裹革軺輦板輿細犢車皆施縑詔不聴但令以布衣車而已其餘居喪之制亦如禮文有司又奏大行皇太后當以四月二十五日安厝故事虞著哀服旣虞而除其内外官寮皆就朝晡臨位御服除訖各還所次除衰服詔曰夫三年之喪天下吉之達禮也受終身之愛而無數年之服奈何葬而便即情所不忍也有司又奏世有險易道有汙隆所遇之時異誠有繇然非忽禮也方今戎馬未散王事至殷更須聽斷以熙庶績昔周康王始登翊室猶戴冕臨朝降於漢魏旣葬除釋諒闇之禮自逺代而廢矣惟陛下割髙宗之制從當時之宜敢固以請詔曰攬省奏事益增感劇夫三年之喪所以盡情致禮𦵏已便除情所不堪豈當然乎且今思存草土卒然以吉奪之乃所以重傷至心非見念也每代禮典質文皆不同此身何為限以近制使達喪闕然乎羣臣又固請帝流涕久之乃許文帝崇陽陵先開一日遣侍梓宫又遣將軍校尉嘗直尉中監各一人將殿中將軍以下及帝時左右常給使詣陵宿衞明帝性至孝太寕元年二月𦵏元帝於建平陵帝徒跣至陵所康帝即位咸康八年七月丙辰𦵏成帝於興平陵帝親奉奠於西陛既發引徒行至閶闔門外素輿至於陵所建元元年四月有司奏成帝山陵已一周請改素服御進膳如舊壬寅詔曰禮之隆殺因時而寢興誠無常矣至於君親相凖名教之重莫之改也權制之作盖出近代雖曰適事實弊薄之始先王崇之後世猶怠而况因循又從輕降義弗可矣簡文帝為琅琊王年七嵗鄭夫人薨帝號慕泣血固請服重元帝哀而許之孝武帝將以散騎常侍領著作郎吳隠之為黄門郎以隱之貌類簡文帝乃止後魏明元道武長子也初封齊王帝母劉貴人賜死道武告帝曰吾逺同漢武為長久之計帝素純孝哀泣不能自勝道武怒之帝還宫哀亦不自止日夜號泣道武知而又召之帝欲入左右曰孝子事父小杖則受大杖避之今陛下怒甚入或不測䧟帝於不義不如且出待怒觧而進不晚也帝懼從之太武明元長子帝生不逮母宻太后及有識言則悲慟哀感傍人明元聞而喜及明元不豫衣不觧帶孝文㓜有至性年四嵗獻文曾患癕帝親吮膿五嵗受禪悲泣不能自勝獻文問之帝曰代親之感内切於心獻文甚嘆異之及居祖母文明太皇太后喪勺飲不入口五日毁慕過禮五日不食中部曹楊椿進諫曰陛下至性孝過有虞居哀五朝水漿不御羣下惶灼莫知所言陛下荷祖宗之業臨萬國之重豈可同匹夫之至節以取僵仆且聖人之禮毁不滅性縱陛下欲自賢於萬代其若宗廟何帝感其言乃進粥已過期月毁瘠猶甚司空穆亮表曰王者居極至尊至重父天母地懐柔百靈是以古先哲王制禮成務施政立治必順天而後動宣憲垂範必依典而後行用能四時不忒隂陽和暢若有過舉咎徴必集故大舜至慕事在納麓之前孔子至聖喪無過瘠之紀堯書稽古之美不録在服之痛禮備諸侯之喪而無天子之式雖有上達之言未見居喪之典然則位重者為世以屈巳居聖者達命以忘情伏惟陛下至徳參二儀恵澤覃河海宣禮明刑動遵古式以至孝之痛服期年之喪練事旣闋號慕如始統皇極之尊同衆庻之制廢越紼之大敬闕宗祀之舊軌誠繇文明太皇太后聖畧超古恵訓深至欲報之徳昊天罔極比之前代戚為過甚豈所謂順帝之則約躬随衆者也陛下旣為天地所子又為萬民父母子過哀父則為惨悴父過戚子則為憂傷近䝉接見咫尺旒冕聖容哀毁駭惑羣心書稱一人有慶兆民頼之一人過哀黎元焉繫羣官所以顛殞震懼率土所以危惶悚慄百姓何仰而不憂嘉禾何由而播植願陛下上承金冊遺訓下稱億兆之心時襲輕服数御常膳脩崇郊祠垂恵咸秩輿駕時動以釋憂煩博採廣諮以導性氣息無益之戀行利見之徳則休徴可致嘉應必臻禮教必宣孝慈兼備普天䝉頼含生幸甚詔曰苟孝悌之至無所不通今飄風亢旱時雨不降實繇誠慕未濃幽顯無感也所言過哀之咎諒為未𠂻省啟以增悲愧及再周忌日哭於陵前絶膳二日哭不輟聲先是太后𦵏於永固陵中反虞於鑒𤣥殿詔曰遵㫖從儉不申罔極之痛稱情允禮又損儉訓之徳進退思惟信用摧感又山陵之節亦有成命内則方丈外裁掩坎脱於孝子之心有所不盡者室中可二丈墳不得過三十餘歩今以山陵萬世所仰復廣為六十歩孤負遺㫖益以痛絶其幽房大小棺槨質約不設明器至於素帳幔茵瓷瓦之物亦皆不置此則遵先志從冊令奉遺事而有從有違未達者或以致怪梓宫之裏𤣥堂之内聖靈所止是以一一奉遵仰昭儉徳其餘外事有所不從以盡痛慕之情其宣示逺近著告羣司上明儉誨之徳下彰違命之失及卒哭孝文服縗近臣從服三品以下外臣衰服者變服就練七品以下盡除即吉設祔祭於太后殿公卿以下始親公事帝毁瘠絶酒肉不御者三年初帝孝於太后乃於永固陵東北里餘營夀宫遂有終焉瞻望之志及遷雒陽乃自表瀍西以為山園之所而方山虛宫號曰萬年堂云太和十六年九月辛未帝哭文明太后於陵左終日不絶聲幕越席為次侍臣侍哭壬申帝以忌日哭於陵左哀至則哭侍哭如昨帝二日不御膳癸酉朝中夕三時哭拜於陵前夜宿鑒𤣥殿是夜撤次甲戌帝拜哭辭陵還永樂宫前廢帝諱恭字脩業廣陵恵王羽之子少端謹有志度事祖母嫡母以孝聞後周武帝建徳三年三月帝居皇太后叱奴氏喪處倚廬朝夕共一溢米羣臣表請累旬乃止詔皇太子贇總釐庻政五月庚申𦵏文宣皇后於永固陵帝袒跣至陵所辛酉詔曰齊斬之情經籍彛訓近代沿革遂亡斯禮伏奉遺令既𦵏便除攀慕几筵情實未忍三年之喪達於天子古今無易之道王者之所常行但時有未諧不得全制軍國務重湏自聴朝縗麻之節苫廬之禮率遵前典以申罔極百寮以下宜依遺令公卿上表固請俯就權制過𦵏即吉帝不許引古禮答之羣臣乃止於是遂申三年之制五服内亦令依禮隋高祖初仕後周為大將軍遇皇妣寢疾三年晝夜不離左右代稱純孝開皇十七年九月謂侍臣曰禮主於敬皆當盡心黍稷非馨貴在祗肅廟廷設樂本以迎神齊祭之日觸目多感當此之際何可為心在路奏樂禮未為允羣公卿士宜更詳之遂下詔自今已後享廟日不湏備鼓吹殿廷勿設樂懸仁夀二年詔曰哀哀父母生我劬勞欲報之徳昊天罔極但風樹不静嚴敬莫追霜露既降感思空切六月十三日是朕生日宜令海内為武元皇帝元明皇后斷屠唐髙祖武徳八年七月羣臣食於御前果有蒲桃侍中陳叔達執而不食帝問其故對曰臣母患口乾永不能治欲歸以遺母帝曰卿有母可遺乎遂流涕嗚咽乆之乃止賜物百叚帝性至孝初𦵏元貞太后時遇祁寒跣行二十餘里足皆流血毁頓之極哀感行路言及二親未嘗不流涕有得時珍及諸方異膳必先薦享而已方食太宗貞觀二年八月帝以軍國無事每日視膳於西宫三年正月戊午帝有事於太廟至太穆皇后神主悲慟嗚咽伏地不能興侍衞者莫不歔欷先是帝在髫齔穆后於諸子之中獨所鍾愛自穆后寢疾朝夕侍側不觧衣冠所進湯藥必先嘗之及丁穆皇后憂毁瘠三年杖而能起即位後幸隴州經慶善宫歔欷謂侍臣曰此朕生處朕之胞見在宫裏慈顔緬邈無可復追生育之恩不知何以上報因舉聲號慟悲不自勝在位者莫不嗚咽及還至宫享后於正寢後數歲下詔為后建福佛寺於京師初起作之夜帝夢見后侍奉若平生既寤悲感流涕達旦因下詔薦福於寺盡京城僧尼設齋追福焉四年六月髙祖不豫帝廢朝視藥膳於大安宫如家人之禮辛卯有瘳百寮稱慶詔曰書不云乎一人有慶兆民頼之朕䖍奉大安愛敬崇極日嚴之養祗慄斯在近日聖躬違豫寢膳有虧憂懼有懐不遑寕處博求醫術備盡蠲療祈告明靈具陳懇篤上𤣥降福遂䝉昭祜應於康愈萬福咸宜慶幸之隆實兼家國思班愷樂洽於卿士然而尚齒興孝徳教所先饗餼是加義超常等諸州都督刺史及文武官老人八十以上并孝旌表門閭者並宜節級賜物以申饗宴庶使萬國之内同此歡心施於四海皆知朕意八年三月髙祖讌於兩儀殿顧長孫無忌曰當今蠻夷率服古未嘗有無忌對曰陛下以神武定天下付屬得人萬國乂安四夷賓服臣實不勝幸甚謹上千秋萬歲夀髙祖大悦以酒賜帝帝奏觴上夀流涕而言曰百姓獲安四夷咸服皆奉遵聖㫖豈臣之力也於是帝與文徳皇后互進御膳并上服御衣物皆珍寳竒異又上珍寳巾予皇后執櫛理鬢手自冠焉因言至尊年髙髪白都盡帝與皇后皆流涕蒸蒸就養一同家人常禮髙祖亦喜形於色羣臣瞻奉莫不内懐感悦十三年正月帝朝於獻陵至小次降輿號哭入闕門西面再拜慟絶不能興禮畢改服入於寝躬親執饌閲髙祖及先后服御之物匍匐牀前悲慟左右侍御者莫不歔欷㑹要又載初甲辰之夜大雨雪及帝入陵悲號哭咽百辟哀慟有蒼雲出於丘陵之上俄而流布天地晦㝠禮畢帝出自寢宫歩過司馬門泥行二百餘歩於是風静雪止天色開霽咸以為孝感之所致焉十四年五月丁酉帝追感髙祖先后同忌此月不御酒肉十六年十二月令左監門中郎將齊士員將兵衛獻陵帝召士員至望見而降殿自悲咽不已謂從官曰頃屬歲隂道暮情深罔極所備新衣珍饌欲以正旦奉薦園陵朕若親行便勞扈從三元告始家有吉凶慶慰之禮咸重兹日朕不欲勞人乃自抑止因命江夏王道宗代行所獻之物帝並跪授道宗焉十七年七月癸巳司空房𤣥齡給事中許敬宗著作佐郎敬播上所撰髙祖并當朝實録各二十卷帝遣諫議大夫禇遂良讀之於前始讀至帝初生祥瑞遂感動流涕曰朕於今日富有四海追思膝下不可復休因悲不息命令收卷二十年十二月癸未帝謂司徒長孫無忌等曰今日吾之生日俗云生日可嘉樂於吾之情翻成感思君臨天下富有四海而追求侍養永不可得仲由懐負米之恨則吾情也因泣下數行羣臣並皆掩淚髙宗為晉王年始九歲居長孫皇后喪哀慕不能自勝太宗常加慰撫繇是特深寵異貞觀十六年立為皇太子十九年太宗親征遼左命太子於定州監國將發太子悲啼數日因奏請飛驛逓表起居又請逓勑垂報並許之飛表奏事自兹始也每聞太宗親臨賊城不踰百歩中宵不寐達旦銜涕因上表曰願收雷霆之威駐矢石之外惴惴愚誠敢以死請及師旋太子従至并州時太宗患癰太子親吮之扶輦歩従者數日既至京師太宗氣疾發動乃於北闕餌藥令太子總攝機務每日聴政於東宫罷朝復謁寝門視膳不離左右二十三年従幸翠微宫太宗苦痢增劇太子侍疾旬日之間髪有變白者太宗泣曰吾聞古之孝者不過文王汝今数日不食晝夜不離吾側口嘗湯藥盛年鬢則變白汝之孝敬過文王矣吾雖殞没亦無所恨及太宗靈駕將引帝號呌自投於地扳輼車哽慟摧裂擗踴悲哭不能自勝永徽二年四月己丑以將忌月令有司進素食太常停教終於五月自三年喪畢朔望未御正殿百寮上表請乞九月辛邜始御太極殿自此每五日一御太極殿視事十一月辛酉親祀南郊黄門侍郎宇文節奏言依儀明日朝羣臣陳樂懸請奏九部樂帝曰被甲而舞者情不忍觀所司更不宜設言畢慘愴久之初太宗在藩樂工為秦王破陣樂舞以歌用兵之妙貞觀初以為武舞每讌享奏樂必陳之至是停所作於殿廷而所司依前習之三年正月丙子親祠太廟及布幣祼獻至太宗神座俯伏感慟悲不自勝侍衛者皆歔欷莫能仰視六年春正月壬申朔親謁昭陵文武百寮及宗室子孫並陪位帝降輦易服行哭就位再拜擗踴禮畢又改服奉謁寝宫其崇聖宫妃嬪太長公主以下及越趙二國太妃等先於神位左右侍列如平生帝入寝哭踴絶於地進至東階西面再拜號慟久之乃進太牢之饌加珍饈具品引太尉無忌司空勣趙王福曹王明左屯衛大將軍程知節並入執爵進爼帝至神座前拜哭奠饌閲先帝先后衣服拜辭訖行哭出寝北門乃御小輦還行宫中宗為皇太子大足元年從則天幸京師時属凝寒親捧天后足歩從一里餘天后大悦下制褒羙宣付史官二年正月欲躬侍則天皇后靈駕以赴山陵百官固諫乃止有司以則天皇后服滿三十六日請帝及百寮並從權制改服慘服帝不許竟服衰麻惟公卿以下聴服慘服帝自居諒闇令所司惟進倉米薄粥豆盧欽望以帝素有氣疾請少加一薑桂上表曰臣聞孝子居喪朝一溢米暮一溢米食之無筭或粥或飯不能食粥者飯羮以菜可也又曰五十不致毁又曰喪有疾食肉飲酒加以薑桂又曰若不勝喪乃比於不慈不孝孝經曰毁不滅性此聖人之教也竊以兩溢之米欲滿大升或為飯粥随性所嗜羮以助食年至五十不合致毁素有疾又加酒肉食味不羙調以薑桂此乃聖人制禮原父母之情不欲令孝子病毁不勝哀痛也自古聖人制禮如此殷勤大行則天遺制如此懇至今陛下三日視事聴覧萬機羣生性命仰陛下存活三聖基業待陛下興隆伏惟聖年已登五十陛下縁在房州先患脚氣今在衰苦舊患更發又自今月二日已来惟令進倉米薄粥臣下驚恐不勝惶懼但倉米陳臭天下共知食即動氣奈何陛下以五十之年抱積久之患奉累聖之緒承遺制之托上事宗廟社稷下養赤子蒼生故食動病之倉米不遵遺令之教訓陛下縦自輕性命其奈七廟何其奈萬姓何臣等痛切之至謹述先聖制禮大行遺制伏乞少進羙膳加以薑桂即望聖體稍和舊患漸損制不許𤣥宗開元五年十二月己丑勅今在遏宻又逼忌辰起今日後至来年正月上旬以来並進蔬食所司准式此限内仍令都城禁屠殺十七年十一月謁橋陵帝望陵涕泣哀感左右升奉先縣為赤縣以所管萬三百戸供奉陵寝肅宗至徳二年十二月丙午𤣥宗自蜀至帝至望賢宫奉迎𤣥宗御宫南樓以俟之帝望樓辟易下馬趨進樓前再拜蹈舞稱賀𤣥宗下樓帝匍匐捧𤣥宗足涕泗嗚咽不能自勝扶𤣥宗升殿尚食每進一味帝皆嘗膳然後進飛龍御馬帝親選試然後進御𤣥宗上馬秉轡帝攏馬行數歩𤣥宗止之而後退𤣥宗謂左右曰吾享國以来未知貴也今見吾子為天子乃知貴也左右皆呼萬歲帝嘗避馳道執鞭弭導引𤣥宗自開逺門至丹鳳門連棚夾道兵馬旗幟炤曜都邑耆老緇黄垂泣蹈舞皆曰不圖今日天下再安復覩二聖都人士女觀者萬億計繇丹鳳門入大明宫内外文武百寮先俟於含元殿前以班序立𤣥宗御殿扇開左相苖晉卿右僕射裴冕等奏賀蹈舞呼萬歲𤣥宗親慰百寮皆感咽帝累奏請辭位居東宫𤣥宗固不許又使髙力士再三諭㫖乃奉誥焉乾元元年四月戊辰帝進太上皇燒丹竈誥曰孝感之極通於神明傳於前史跡罕彰灼今日之事不其效歟吾比年服藥物比為金竈煮煉石英自經冦戎失其器用前日晚際思欲修營一昨早朝遽聞進奉有同符契若合神明此乃汝之因心測吾之本意豈惟此度前後非一則知惟睿作聖惟徳動天再闢寰區重㑹父子付托之際古今未聞色養之勤書册不載寤寐嘉歎深慰於懐宜頒示天下宣付史館帝上表謝曰臣伏奉恩命以臣所進藥器深合天心伏䝉特垂褒羙令頒示天下臣幸以菲才叨膺寳歴聖慈曲眷每事憂兢至於孝養之宜臣子常禮先意承㫖務達微誠不期進奉之時偶合聖㫖寕謂至誠能感事近前知以臣孝既繇衷物自冥應特加奬飾許載縑緗在臣下情彌增愧悚誥曰王者域中之尊孝者天下之本兼而成務厚莫重焉而應物以和奉親以愛繇𠂻而舉有感必通若不動於神明豈能比於符契且匹夫之績尚銘於鼎鼐况天子之孝不列於縑緗故欲昭宣示於中外垂芳於来葉光我國典也十一月𤣥宗幸華清宫還帝至灞上迎候下馬趨進百餘歩再拜舞蹈前抱𤣥宗足𤣥宗撫帝背帝又控轡行數十歩有命乃止上元元年七月殿中監李輔國矯詔自興慶宫移太上皇於大内帝更選擇後宫及上皇素所愛幸并妓樂百餘人令於西宫備灑掃又有詔令萬安咸宜二長主侍養上皇至於服御饌食窮極珍竒視膳問安加於常日異方進獻先到西宫國之大事咨之可否然帝從此怏怏成病常涕泣不樂每西宫朝見鳴咽不能自勝侍臣感動天下稱孝繇此常欲誅輔國㑹疾甚竟不行憲宗元和二年春正月庚寅朝享於太廟初次諸室帝皆盡於誠敬至徳宗順宗室流涕嗚咽若不自勝侍臣及舉冊官皆相顧感泣穆宗長慶元年正月庚子享太廟至順宗憲宗二室歔欷流涕侍臣從官皆感動文宗孝義天然太和中太皇太后居興慶宫寳歴太后居義安殿皇太后居大内太后憲宗懿安郭后也寳歴太后穆宗恭禧王后皇太后穆宗真獻蕭后也王后生敬宗蕭后生文宗時號三宫三太后帝五日叅拜四節獻賀皆繇複道至南内開成中正月望夜帝於咸泰殿陳銀燭奏仙韶樂三宫太后俱集奉觴獻夀如家人禮諸親王公主駙馬戚屬皆侍宴凡膳饈珍果蠻夷竒貢獻郊廟之後奉三宫而後進御帝常以宗廟祭器朽故不修丁寕言於宰臣因令郡縣有為漆器處精造以進既而江南諸道有以新祭器奏到有司遽將呈貢上歛容令陳於别殿具冠而閱之有頃歔欷而退後唐莊宗初嗣晉王居喪過制毁瘠不自勝將吏不得謁見監軍使張承業排闥至廬所言曰大孝在不墜家業不同匹夫之孝且君父厭世嗣主未立竊慮兇猾不逞之徒有懐覬望又汴冦壓境利我凶哀苟或揺動則倍張賊勢訛言不息懼有變生請依顧命墨縗聴政然後經畧南征保家安親此為大孝勿拘常制以敗逺圖於是聴斷大事乃平定趙魏雖萬事之殷在鄴城每一歲之内馳駕歸省太后者數四士民服其仁孝同光二年正月甲寅帝在雒京太常奏定皇太后到闕儀皇帝合於銀臺門内奉迎勅頃以未平國恥湏運戎機十年親統於驍雄千里久違於定省寕辭櫛沐常切晨昏今已翦蕩元兇宅居中土仰禀庭闈之訓獲寕宇宙之心恨不得躬詣汾川攀迎法駕况皇太后逺渉山阻將及近畿朕何以端坐闕庭為拘常禮雖云舊制未叶斯懐朕今親至懐州奉迎丙辰中書奏縁自二十三日後在散齋之内不合逺出勅㫖到河陽奉迎庚申幸河陽奉迎皇太后悲泣久之太后素與劉太妃善分决之後思心鬰陶雖娱玩充庭常悒然不樂俄聞太妃違豫日命尚醫中使問訊結轍使言有瘳即喜言加則不御飲膳自是終始無敢言加者既而謂帝曰吾與太妃恩如伯仲彼經年抱病但見吾面差足慰心吾驟歸晉陽旬朔與太妃復来帝曰時方暑毒山路﨑嶇無煩徃復且可令存屋軰迎侍太妃譬諌久之方止及凶問至太后慟哭累旬自是漸不豫帝朝夕甞藥視膳左右衣不觧帶請禱山川竟不效帝居喪哀毁殆至滅性皇族伏苫諫譬五日方食閔帝即位初御中興殿羣臣列位馮道升階進酒帝曰比於此物無愛除賓友之㑹不近樽斚况在沉痛之中安事飲啖命徹之周世宗初鎮鄆州太祖親征慕容彦超六月兖州平帝遣使奉表請車駕繇鄆濮路還京庻得一覩天顔太祖從之及太祖過澶淵帝迎謁於馬前悲咽流涕顯徳元年帝親征河東迎故淑妃喪還太祖一后三妃及嵩陵就掩皆議陪祔帝以妃喪在賊境未及遷窆乃詔有司於嵩陵之側預營一塜以虛之俟賊平即議襄事至是帝幸晉郊果成素志盖孝感之所致也册府元龜巻二十七
