body:
  text: 册府元龜卷三百八十宋王欽若等撰將帥部褒異第六梁王茂為寜朔將軍江夏内史宋順帝時魏軍圍司州茂從髙祖拒之大破魏將王肅等遷輔國將軍復為驃騎將軍都督江州諸軍事薨於州髙祖甚悼惜之賻錢三十萬布三百疋詔贈侍中太尉加班劔三十人皷吹一部曹景宗為屯騎校尉齊明帝時魏主拓䟦宏逼赭陽以景宗為偏將每衝堅䧟陣輙有斬獲以勲除㳺擊將軍髙祖即位景宗與冠軍王茂濟江圍郢城及髙祖入頓新城復與衆軍長圍六門城平拜散騎常侍右衛將軍封湘西縣侯食邑二千六百户仍遷持節都督郢司二州諸軍事左衛將軍郢州刺史天監元年進號征西將軍改封竟陵縣侯後為右將軍擊破魏大將楊大眼諸城獻㨗髙祖振旅凱入増封四百户并前為二千户進爵為公詔拜侍中領軍給皷吹一部七年遷侍中中衛將軍江州刺史赴任卒於道詔贈錢二十萬布三百疋追贈征北將軍雍州刺史開府儀同三司柳慶逺為冠軍將軍征東長史從髙祖軍東下身先士卒建康城平入為侍中領前軍將軍覇府建以為太尉從事中郎髙祖受禪遷散騎常侍右衛將軍加征虜將軍封重安侯食邑千户天監二年遷中領軍改封雲杜侯四年加使持節都督雍州南北秦四州諸軍事征虜將軍寜蠻校尉雍州刺史髙祖餞於新亭謂曰卿衣錦還鄉朕無西顧之憂矣十年遷侍中領軍將軍給鈇鉞并皷吹一部十二年遷安北將軍寜蠻校尉雍州刺史卒贈開府儀同三司喪還都武帝親出臨之蕭頴胄齊和帝時為鎭軍將軍荆州刺史及義師之起頴胄遣軍拒巴東太守蕭璝等而髙祖已平江郢圖建康穎胄卒和帝贈頴胄丞相及髙祖受禪詔追封巴東郡開國公食邑三千户蕭頴逹為冠軍將軍率師隨髙祖圍郢城髙祖已平江郢及建康城以頴逹為前將軍丹陽尹髙祖受禪頴逹遷散騎常侍及大論功賞封頴逹吳昌縣侯邑千五百户尋為侍中改封作唐侯縣邑如故遷征虜將軍後轉散騎常侍左衛將軍俄復為侍中衛尉卿出為信威將軍豫章内史秩中二千石頃之入遷信武將軍右衛將軍卒車駕臨哭給東園祕器朝服一襲錢二千萬布二百疋追贈侍中中衛將軍皷吹一部蔡道恭齊和帝時為右衛將軍巴西太守魯休烈等自巴蜀連兵冦上明以道恭持節督西討諸軍事破休烈等降於軍門以功遷中領軍固辭不受出為使持節右將軍司州刺史髙祖天監初論功封漢壽縣伯邑七百户號平北將軍楊公則齊世祖時為寜朔將軍扶風太守頃之荆州刺史巴東王子響搆亂公則率師進討事平遷武寜太守和帝即位授持節都督湘州諸軍事時髙祖平郢城公則東下湘部諸軍多未賔從及公則還州然後諸屯聚並散天監元年進號平南將軍封寜都縣侯邑一千五百户鄧元起初為齊𢎞農太守平西軍事時西陽馬榮率衆縁江冦抄刺史蕭遥欣使元起率衆討平之遷武寜太守後加冠軍將軍率衆與髙祖㑹于夏口髙祖命元起圍郢城擊敗張冲和帝即位授冠軍將軍平越中郎將廣州刺史遷給事黄門侍郎移鎮南堂西渚齊和帝中興元年七月郢城䧏以本號為益州刺史仍為前軍先定尋陽及大軍進至京邑元起築壘於建陽門與王茂曹景宗等合長圍建康城平進號征虜將軍天監初封當陽縣侯食邑一千二百户又進號左將軍張𢎞䇿為輔國將軍督後部軍事西䑓建為歩兵校尉遷車騎諮議參軍髙祖入頓石頭𢎞䇿屯門禁衛城平髙祖遣𢎞䇿先入清宫𢎞䇿申勒部曲秋毫無犯遷衛尉卿加給事中天監初加散騎常侍洮陽縣侯邑二千二百户庾域為寜朔將軍從髙祖平郢城覇府初開以為諮議參軍天監初封廣牧縣子後軍司馬出為寜朔將軍巴西梓潼二郡太守魏騎兵進襲巴西域固守百餘日魏軍退詔封二百户鄭紹叔為衛尉卿冠軍將軍時魏軍圍合肥紹叔以本號督衆軍鎭東闗事平復為衛尉移鎭闗南持節征虜將軍司州刺史後徵為左將軍加通直散騎常侍領司豫二州大中正紹叔至家疾篤詔於宅拜授輿載還府中使醫藥一日數至尋卒於府舍髙祖將臨其殯紹叔宅巷狹陋不容輿駕乃止詔贈散騎常侍䕶軍將軍給皷吹一部東園祕器衣一襲朝服一具凶事所須隨繇資給吕僧珍為輔國將軍歩兵校尉從髙祖平郢城進僧珍為前鋒既平建康城髙祖命僧珍率所領先入清宫即日以本官帶南彭城太守遷給事黄門侍郎領武賁中郎將髙祖受禪以為冠軍將軍前軍司封平固縣侯邑一千二百户天監四年大舉北伐五年命僧珍率羽林勁勇出梁城其年冬以左衛將軍領太子中庶子僧珍去家久表求拜墓髙祖欲榮之使為本州乃授使持節平北將軍南兖州刺史及疾病髙祖車駕臨幸中使醫藥日有數四既卒髙祖即日臨殯詔贈驃騎將軍開府儀同三司常侍皷吹侯如故給東園祕器朝服一具衣一襲喪事所須隨繇備辦髙祖痛惜之言為流涕柳惔齊和帝時為侍中領軍將軍髙祖之鎭襄陽為惔祖道帝解玉環贈之天監二年元㑹帝謂曰卿所佩玉環是新亭所贈耶對曰既而瑞感宸衷臣謹服之無斁帝因勸之酒惔時未卒爵帝曰吾嘗比卿劉越石近辭巵酒邪罷㑹封曲江縣侯邑千户後出為使持節安南將軍湘州刺史卒于州髙祖為素服舉哀贈侍中撫軍將軍給皷吹一部柳忱者惔之弟也齊和帝時為冠軍將軍南平太守從髙祖平郢州髙祖踐阼以忱為五兵尚書領驍騎將軍論建義功封州陵伯邑七百户韋叡為輔國將軍豫州刺史領歴陽太守髙祖詔率豫州之衆擊魏軍所獲軍實牛馬不可勝紀以功増封七百户進爵為侯天監十七年為散騎常侍䕶軍將軍尋給皷吹一部入直殿省及卒髙祖即日臨哭甚慟賜錢十萬布二百疋東園祕器朝服一具衣一襲喪事取給於官遣中書舍人監䕶贈侍中車騎將軍開府儀同三司王珍國齊明帝時為輔國將軍會稽太守王敬則反珍國率衆拒之敬則平遷寜朔將軍髙祖義師起以功授右衛將軍後遷䕶軍將軍通直散騎常侍丹陽尹卒詔贈車騎將軍給皷吹一部贈錢十萬布百疋馬仙琕為振逺將軍時胊山民殺琅邪太守劉所以城降魏髙祖詔仙琕討之魏徐州刺史盧昶以衆十餘萬赴焉仙琕與戰累破之振旅還京師遷太子左衛率進爵為侯増邑六百户馮道根為驍騎將軍封増城縣男南梁太守髙祖天監二年魏將黨徳宗率衆奄至城下道根戰敗之遷輔國將軍六年魏攻鍾離詔道根為前驅魏軍敗績進爵為伯改封魏寜縣八年拜豫州刺史領汝隂太守後徵為散騎常侍左軍將軍卒於官是日輿駕春祠二廟及出宫有司以聞帝問中書舍人朱异曰吉凶同日今可行乎對曰昔柳莊寢疾衛獻公當祭請尸曰有臣柳莊非寡人之臣社稷之臣也聞其死請往不釋祭服而往遂以禭之道根雖未為社稷臣亦有勞王室臨之禮也帝即駕幸其宅哭之甚慟裴䆳齊東昏時為輔國將軍廬江太守時魏將吕頗率衆五萬奄來攻郡䆳麾下距破之加右將軍又征邵陽洲擊魏衆大破之以功封夷陵縣子邑三百户遷將軍長史髙祖時累遷至宣毅將軍大軍北伐以䆳督征討諸軍事卒於軍中追贈侍中左衛將軍給皷吹一部進爵為侯増邑七百户裴之横為河東内史隨王僧辨拒侯景於巴陵景退遷持節平北將軍東徐州刺史中䕶軍封豫章侯邑二千户夏侯亶為中䕶軍與湛僧智襲破魏軍於淮肥以亶為使持節都督豫州縁淮南豫霍義定五州諸軍事雲麾將軍大通二年進號平北將軍三年卒髙祖聞之即日素服舉哀贈車騎將軍蘭欽為東宫直閣大通都督衡州三郡兵討平桂陽陽山始興叛蠻封安懐縣男邑五百户又以魏將托䟦滕冦襄陽仍勑赴援除持節督南梁南北秦沙四州軍事光烈將軍平西校尉梁南秦二州刺史増封五百户進爵為侯破䧏魏梁州刺史元羅梁漢底定進號智武將軍増封二千户後為安南將軍廣州刺史卒詔贈侍中中衛將軍皷吹一部王僧辯為征東將軍江州刺史大破侯景衆世祖加僧辯侍中尚書令征東大將軍給皷吹一部後既平湘州旋于江陵因被詔㑹衆軍西討督舟師二萬輿駕出天居寺餞行及為鎭軍將軍破北齊文宣衆振旅于建業承聖三年二月甲辰詔曰賛俊遂賢稱於秦典自上安下聞之漢制所以仰恊台曜俯佐𢎞圖使持節侍中司徒尚書令都督揚南徐東揚三州諸軍事鎭衛將軍揚州刺史永寜郡開國公僧辯器宇凝深風格詳逺行為士則言表身文學貫九流武該七畧頃嵗征討自西徂東師不疲勞民無怨讟王業艱難實兼夷險宜其爕此中台膺兹上將寄之經野賛我朝猷可授太尉車騎大將軍杜崱為武州刺史封枝江縣侯隨領軍王僧辯東討侯景至巴陵景遁加侍中進爵為公仍隨僧辯追景至石頭景敗崱入據䑓城景平加散騎常侍江州刺史卒詔曰崱京兆舊姓元凱苖裔家傳學業世載忠貞自驅傳江渚政號亷能推轂淺源實聞清静奄致殞喪惻愴于懐可贈車騎將軍加皷吹一部謚曰武杜龕崱第二兄岑之子也為忠武將軍大破侯景景遂東奔論功為最授平東將軍東揚州刺史益封一千户陳杜僧明梁元帝時為陵野將軍時侯景遣于慶等冦南江髙祖頓豫章命僧明為前驅所向克㨗髙祖表僧明為長史仍隨東討軍至蔡州僧明率麾下燒賊水門大艦及景平以功除員外散騎常侍明威將軍南兖州刺史進爵為侯増邑并前五百户領晉陵太守元帝承聖二年從髙祖北圍廣陵加使持節遷通直散騎常侍平北將軍餘如故荆州䧟髙祖使僧明率吳明徹等隨侯瑱西援於江州病卒贈散騎常侍世祖即位追贈開府儀同三司天嘉二年配享髙祖廟廷子晉嗣周文育為䧺信將軍時侯景將王伯醜據豫章文育擊走之遂據其城累前後功除㳺擊將軍員外散騎常侍封連遷縣侯邑五百户髙祖軍至白茅灣命文育與杜僧明常為軍鋒平南陵鵲頭諸城及至姑熟與景將侯子鍳戰破之景平授通直散騎常侍改封南移縣侯邑千户拜信義太守後除督南豫州諸軍事武威將軍率兵㑹髙祖拒齊兵與徐嗣徽戰於白城嗣徽等退加平西將軍進爵壽昌縣公并給皷吹一部侯安都為猛烈將軍隨髙祖鎭京口除蘭陵太守髙祖謀襲王僧辯諸將莫知者唯與安都定計安都既擒僧辯以功授使持節散騎常侍督南徐州諸軍事仁威將軍南徐州刺史及髙祖與齊軍戰於幕府山命安都領歩兵横擊齊軍大敗以功進爵為侯増邑五百户給皷吹一部又進號平南將軍改封曲江縣公仍督水軍討蕭勃頻戰克師還以功進號鎭北將軍加開府儀同三司至世祖時累封桂陽郡公及東陽太守留異叛奉詔東討異振旅而歸以功加侍中征北大將軍増邑并前五千户侯瑱梁元帝時為武臣將軍隨都督王僧辯討侯景大敗其軍以功除南豫州刺史鎭于姑熟大敗齊將郭元建於東闗除使持節鎭北將軍給皷吹一部増邑二千户髙祖永定二年進位司空與領軍將軍徐度討王琳輿駕幸石頭親送瑱及世祖即位進授太尉増邑千户又為西討都督敗周將獨孤盛軍以功授使持節都督湘桂郢巴武沅六州諸軍事湘州刺史改封零陵郡公邑七千户天嘉二年以疾表求還朝三月於道卒贈侍中驃騎大將軍大司馬加羽葆皷吹一部班劔二十人給東園祕器其年九月配享髙祖廟庭歐陽頠為始興内史髙祖之討蔡路飬李遷仕也頠率兵渡嶺以助髙祖及路養等平頠有功梁元帝承制以頠為持節通直散騎常侍都督東衡州諸軍事雲麾將軍東衡州刺史新豐縣伯邑四百户髙祖永定三年増都督衡州諸軍事開府儀同三司世祖嗣位進號征南將軍改封陽山郡公邑一千五百户又給皷吹一部天嘉四年薨贈侍中車騎大將軍司空廣州刺史吳明徹梁元帝時為戎昭將軍安州刺史敬宗時徹隨周文育討杜龕張彪等東道平授使持節散騎常侍安東將軍南兖州刺史封安吳縣侯髙祖受禪拜安南將軍世祖時累遷中領軍廢帝即位授領軍將軍尋遷丹陽尹及湘州刺史華皎隂有異志詔授明徹使持節都督湘桂武三州諸軍事安南將軍湘州刺史給皷吹一部率兵討平皎授開府儀同三司進爵為公孝宣太建元年授鎭南將軍四年徵為侍中㑹朝議北伐公卿互有異同明徹决䇿請行五年詔加侍中都督征討諸軍事仍賜女樂一部總綂衆軍十餘萬發自京師軍至秦郡尅其水栅齊遣大將軍尉破胡將兵為援明徹破走之秦郡乃䧏髙祖以秦郡明徹舊邑詔具太牢令拜祠上冡文武羽儀甚盛鄉里以為榮進尅仁州授征北大將軍進爵南平郡公増邑并前二千五百户次平峡石岸二城進逼壽陽生擒齊將王琳詔加都督豫合建光朔北徐六州諸軍事車騎大將軍豫州刺史増封并前三千五百户六年自壽陽入朝輿駕幸其第賜鍾磬一部米萬斛絹布二十疋七年進攻彭城軍又大破之八年進位司空周鐡虎梁元帝時為仁威將軍從王僧辯克定京邑平陸納於湘州以前後功進爵為侯増邑并前五百户程靈洗梁元帝時為雲麾將軍禽賊帥趙乘乾以功授持節散騎常侍都督青冀二州刺史増邑并前一千户敬帝時遷信武將軍助防京口及平徐嗣徽有功除南丹陽太守封遂安縣侯増邑并前一千五百户髙祖未討王琳於南陵破之以功授使持節都督南豫州縁江諸軍事信武將軍南豫州刺史世祖天嘉四年擊走周廸五年遷中䕶軍廢帝即位進號雲麾將軍華皎之叛也遣使招誘靈洗靈洗斬皎使以狀聞朝廷深嘉其忠増其守備給皷吹一部又進攻周沔州克之禽其刺史裴寛以功進號安西將軍改封重安縣公増邑并前二千户光大二年卒贈鎭西將軍開府儀同三司宣帝大建四年詔配享髙祖廟庭程文季者靈洗之子也世祖天嘉中為貞毅將軍鎭東府中兵參軍時陳寳應與劉異連結世祖遣文季為前鋒所向克㨗戰功居多還轉府諮議參軍領中直兵孝宣太建二年為豫章内史隨都督章昭達往荆州征蕭巋以功加通直散騎常侍安逺將軍増邑五百户五年隨都督吳明徹圍壽陽每戰常為前鋒齊人深憚之以功除散騎常侍明威將軍増邑五百户黄法氍為信武將軍髙祖永定二年王琳遣李欽樊猛余孝頃等攻周廸且謀取法氍法氍率兵援廸禽孝頃等三將進號宣毅將軍増邑并前一千户給皷吹一部又以拒王琳功授平南將軍開府儀同三司至孝宣大建五年為征南大將軍與北伐都督吳明徹出秦郡大破齊軍以功加侍中改封義陽郡公邑二千户其年遷都督合霍二州諸軍事増邑五百户七年徙都督豫建光朔合北徐州六州諸軍事八年薨贈侍中中權大將軍司空淳于量梁元帝時為信威將軍與都督王僧辯併力克平侯景承聖元年以功授左衛將軍謝沐縣侯邑五百户髙祖受禪授持節散騎常侍平西大將軍給皷吹一部少帝光大元年為持節征南大將軍西討大都督平華皎并䧏周將長胡公拓䟦定等以功授侍中中軍開府儀同三司進封醴陵縣公増邑一千户孝宣大建五年為中䕶大將軍吳明徹之西伐也量賛成其事遣第六子岑率所領從軍淮南克定改封始安郡公増邑千五百户章昭達吴興武康人也髙祖討王僧辯令世祖還長城僧辯既誅杜龕遣其將杜㤗來攻長城世祖拒之命昭達縂知城内兵事及㤗退走因從世祖東進軍吳興以討龕龕平又從世祖東討張彪於㑹稽克之累功除明威將軍定州刺史天嘉元年追褒長城之功封欣樂縣侯邑一千户尋隨侯安都等討平王琳昭達册勲第一二年除使持節散騎常侍都督郢巴武沅四州諸軍事智武將軍郢州刺史増邑并前五百户尋進號平西將軍又詔征周廸於臨川敗走之徵為䕶軍將軍給皷吹一部改封邵武縣侯増邑并前二千户四年陳寳應周廸復共冦臨川又以昭達為都督討廸至東興嶺而廸退又討禽寳應遂克定閩中以功授前將軍開府儀同三司少帝即位遷侍中征南將軍改封邵陵郡公華皎之反也昭達又平之進號征南將軍増邑并前二千五百户及歐陽紇據有嶺南詔昭逹都督衆軍討平之以功進車騎大將軍遷司空孝宣大建三年薨贈大將軍増邑五百户給班劔二十人四年配享世祖廟庭胡頴梁敬帝太平元年為仁威將軍兼丹陽尹髙祖受禪兼左衛將軍永定三年隨侯安都征王琳於宫亭破賊帥常衆愛世祖嗣位除散騎常侍吳興太守其年六月卒贈侍中中䕶軍配享髙祖廟庭徐度梁元帝時為寜朔將軍合州刺史侯景之亂每戰有功加通直散騎常侍封廣德縣侯邑五百戸遷散騎常侍髙祖鎭朱方除信武將軍蘭陵太守髙祖平王僧辯度與侯安都為水軍敬帝紹㤗元年髙祖東討杜龕奉敬帝幸京口以度領宿衛并知留府事徐嗣徽等引齊冦濟江度隨衆軍破之於郊壇以功除信威將軍郢州刺史兼領吳興太守尋遷鎭右將軍徐州縁江諸軍事鎭北將軍南徐州刺史給皷吹一部世祖天嘉元年増邑千户以平王琳功改封湘東郡公邑四千户徐敬成者度之子也世祖天嘉中為湘東郡公隨章昭逹征陳寳應晉安平除貞威將軍豫章太守敬帝時累遷貞威將軍吳興太守隨都督吳明徹北討以功加通直散騎常侍雲旗將軍増邑五百户又進號壯武將軍安州刺史卒贈散騎常侍杜稜梁元帝時為仁威將軍髙祖東征杜龕留稜居守綏撫士卒未嘗解甲帶賊平以功除通直散騎常侍右衛將軍丹陽尹世祖即位以預建立之功改封永城縣侯増邑五百户徐世譜梁元帝時為散騎常侍領水軍從司徒陸法和討侯景大敗景軍以功除使持節信武將軍信州刺史封魚復縣侯邑五百户仍隨王僧辯東下恒為軍鋒又破景將侯子鑒於湖熟侯景平後以功除衡州刺史増邑并前一千户髙祖永定二年遷䕶軍將軍世祖嗣位加特進號右將軍天嘉元年増邑百户周敷梁元帝時為武候將軍周祖受禪王琳據有上流熊曇朗殺周文育據豫章敷與周廸黄法氍等進兵圍曇朗屠之王琳平授散騎常侍平西將軍豫章太守世祖天嘉二年詣闕進安西將軍給皷吹一部賜以女妓金帛令還鎭豫章荀朗梁元帝時為安南將軍髙祖入輔朗與侯安都等大破齊軍髙祖即位賜爵興寧縣侯邑二千户世祖即位又與安都拒王琳琳平遷使持節安北將軍散騎常侍都督霍晉合三州諸軍事天嘉六年卒贈豫州刺史陳慧紀世祖時為明威將軍副司空章昭逹征安蜀成都督於荆州燒青泥船艫少帝即位以功除持節通直散騎常侍宣逺將軍豐州刺史増邑并前一千户韋載梁元帝時為建威將軍尋陽太守隨都督王僧辯東討侯景載率太原髙塘新蔡三郡兵與僧辯㑹于梁山景平除冠軍將軍琅邪太守韓子髙世祖元嘉二年為壯武將軍隨侯安都征留異平之除假節貞毅將軍東陽太守五年章昭達等自臨川征晉安子髙自安泉嶺㑹于建安晉安平以功遷通直散騎常侍進爵為伯増邑并前四百户陸子隆世祖時為明威將軍隨都督章昭達討周廸大破賊徒晉安平以功最多遷假節督武州諸軍事尋改封朝陽縣伯邑三百戸錢道戢為輕車將軍孝宣初以歩軍都督討歐陽紇之亂紇平除左衛將軍太建二年隨章昭達征蕭巋攻安蜀城䧏之以功加散騎常侍仁威將軍増邑并前九百户又授使持節都督郢巴武三州諸軍事王師北討道戢與儀同黄法氍圍歴陽城既平因以道戢鎭之以功加雲麾將軍増邑并前一千一百户裴忌髙祖時為左衛將軍世祖天嘉初出為持節南康内史時義安太守張紹賔據郡反世祖以忌為持節都督嶺北諸軍事率衆討平之除散騎常侍司徒左長史孫㻛吳郡人也為戎昭將軍梁元帝時從王僧辯討侯景力戰有功除員外散騎常侍封富陽縣侯邑一千户又遷衡州平南府司馬破黄洞蠻賊有功除東莞太守髙祖受禪遷安西將軍郢州刺史世祖即位授使持節散騎常侍安南將軍湘州刺史請入朝徵為侍中領軍未拜而世祖從容謂㻛曰昔朱買臣願為本郡卿豈有意乎仍改授持節安東將軍吳郡太守給皷吹一部及將之鎭乘輿幸近畿餞送鄉里榮之至後主時為五兵尚書領右軍以年老累乞骸骨優詔不許禎明元年卒官後主臨哭盡哀贈䕶軍將軍侍中如故給皷吹一部朝服一具衣一襲喪事量加資給司馬申梁元帝時為開逺將軍王僧辯之討陸納也申在軍中于時賊衆奄至左右披靡申躬蔽僧辯蒙楯而前賊乃退除散騎侍郎至髙祖天嘉中累遷員外散騎常侍後主時始興王叔陵之肆逆也事既不㨗出據東府申馳召右衛蕭摩訶帥兵先至追斬之因入城中收其府庫後主深嘉之以功除太子左衛率封文始伯邑四百户蕭摩訶世祖時為巴山太守至孝宣太建五年衆軍北伐摩訶隨都督吳明徹濟江攻秦郡仍擊退齊師以功授明毅將軍員外散騎常侍封亷平縣伯邑五百户尋進爵為侯轉太僕卿七年又隨明徹進圍宿豫擊走齊將王康徳以功除進熈太守九年明徹進圍宿軍吕梁與齊人大戰摩訶率七騎先入齊衆大潰以功授持節武毅將軍譙州刺史及後主時始興王叔陵為逆摩訶勒兵追斬之以功授散騎常侍車騎大將軍封綏逺郡公邑三千户叔陵素所蓄聚金帛累巨萬後主悉以賜之尋改授侍中驃騎大將軍加左光禄大夫舊制三公黄門閣聽事置鴟尾後主持詔摩訶開黄閣門施行馬聽事寢堂並置䲭尾樊毅梁末為假節威戎將軍右中郎將代兄俊為梁興太守領三州遊軍隨宜豐侯蕭循討陸納於三州力戰斬千餘級擊皷申令衆乃退以功授持節通直散騎常侍貞威將軍封夷道縣伯邑三百户樊猛者毅之弟也梁末為威戎將軍梁安南侯蕭方矩為湘州刺史以猛為司馬㑹武陵王蕭紀舉兵自江漢東下方矩遣猛率湘郢之卒隨都督陸法和進軍以拒之猛手擒斬紀父子三人以功授㳺騎將軍封安山縣伯邑一千戸仍遣軍撫定梁益蜀境悉平軍還遷持節散騎常侍輕車將軍司州刺史進爵為侯増邑并前二千户至孝宣太建初遷武毅將軍領長沙内史尋𨽻章昭達西討江陵以功封富川縣侯邑五百户魯廣達梁元帝時為壯武將軍晉州刺史隨王僧辯討平侯景加員外散騎常侍髙祖受禪授征逺將軍又除假節信武將軍北新蔡太守隨吳明徹討周廸於臨川每戰功最多仍代兄悉達為吳州刺史封中宿縣侯邑五百户少帝光大元年授通直散騎常侍都督南豫州諸軍事南豫州刺史時華皎稱兵上流詔司空淳于量率衆軍進討軍至夏口廣達首率驍勇直衝賊軍皎平授持節智武將軍都督巴州諸軍事巴州刺史孝宣大建初與儀同章昭逹入峡口拓定安蜀等諸州鎭以功増封并前二千户册府元龜卷三百八十
