body:
  text: 册府元龜卷一百九十七宋王欽若等撰閏位部朝㑹宴㑹慶賜納貢獻朝㑹朝㑹者禮之經也嬴秦罷侯守不越境歲時班制又匪經見吴蜀而下時時間作事之細者史或失傳至於聲名文物表著明數存諸類例此不復陳沿革在斯粗可綱舉儷於大國誠則多慙君彼一隅斯亦為政云爾吳景帝永安元年十二月戊辰臘百僚朝賀宋文帝元嘉三年正月乙亥朔㑹羣臣於太極前殿明帝泰始二年正月己丑朔以軍事不朝㑹南齊武帝永明六年十月庚申立冬初臨太極殿讀時令梁太祖開平元年十月癸酉御史司憲薛廷珪奏請文武百官仍舊朝叅先是帝欲親征北冦命朝臣先赴雒都至是緩其期乃允所奏宰臣請每月初入閣望日延英聽政永為常式二年正月癸酉帝御金祥殿受宰臣文武百官及諸藩屏陪臣稱賀諸道貢舉一百五十七人見于崇元門三年正月戊辰朔帝御金祥殿受宰臣翰林學士稱賀文武百官拜表於東上閤門八月甲午勅朕以干戈尚熾華夏未寧宜循卑菲之言用致雍熈之化起八月一日常朝不御金鑾崇勲兩殿只於便殿聽政四年正月壬辰朔帝御朝元殿受百官稱賀用禮樂也十一月己亥日南至帝被衮冕御朝元殿列細仗奏樂於庭群臣稱賀五年二月丙辰朔帝御文明殿群臣入閣乾化元年九月辛巳朔帝御文明殿群臣入閣刑法待制官各奏事十月乙未帝御朝元門以回鶻吐蕃二大國首領入覲故也宴㑹先王制合宴之禮著序賔之訓所以申飲賜之嘉好勸羣臣之盡心詩之鹿鳴湛露所為作也自嬴秦劉蜀以迄江左魏齊傳禪逮于朱梁曷嘗不乗時展豫置酒髙㑹或歴覽故邑或翺翔池禦班觴於講禮之隙宿設於考室之際因嘉慶以合飲議勲賞而舎爵征行所次慰勞攸及於是厚陪鼎之數舉酬奬之制賦詩以導其意既醉以畢其歡皆以考經義而稽古推慈惠而逮下者也秦始皇三十四年置酒咸陽宫愽士七十人前為夀蜀先主初入蜀於涪大㑹置酒作樂吴大帝初為呉王歡宴之末自起行酒又嘗大㑹羣臣後蜀使至羣臣並㑹嘗於武昌臨釣臺飲酒又嘗宴飲於船樓也後主每饗宴無不竟日宋文帝元嘉四年三月宴丹徒宫帝鄉父老咸與焉二十六年宴于丹徒宫南齊太祖建元元年九月戊申幸宣武堂宴㑹詔諸王公以下賦詩二年三月己亥幸樂遊苑宴㑹王公以下賦詩武帝永明二年七月詔曰夫樂所自生先哲垂誥禮不忘本積代同風是以漢明遲回於南陽魏文殷勤於譙國青溪宫體天含輝則地栖寳光定靈源允集符命在昔期運初開經綸方逺繕築之勞我則未暇時流事徃永惟哽咽朕以寡薄嗣奉鴻基思存締構式表王迹考星創制揆日興功子來告畢規模昭備宜申宴樂之禮以暢感慰之懐可尅日小㑹八月丙午車駕幸舊宫小㑹設金石樂在位者賦詩四年正月以籍田禮畢幸閲武堂勞酒小㑹詔賜王公以下在位者帛有差五年正月戊子幸芳林園褉飲戊申車駕幸芳林園宴九月詔九日出商颷舘登髙宴羣臣辛卯車駕幸商颷舘是舘帝所立在孫陵崗世呼為九日臺十二月戊子太子長子鬱林王昭業冠于東宫崇政殿其日小㑹賜王公以下帛各有差東昏侯永元二年六月庚寅車駕於樂遊苑内㑹如三元京邑女人放觀和帝中興元年五月車駕幸竹林寺禪房宴羣臣梁髙祖大同十年三月庚戌幸回賔亭宴帝鄉故老及所經近縣奉迎候者少長數千人各賚錢二千大清元年五月丁酉輿駕幸徳陽堂宴羣臣設絲竹樂陳髙祖永定二年十二月太極殿東堂宴羣臣設金石之樂以路寢告成也宣帝大建七年閏九月甘露降樂遊苑丁未車駕幸樂遊苑採甘露宴羣臣詔於苑龍舟山立甘露亭八年四月甲寅詔曰元戎凱旋羣師振旅旌功䇿賞宜有饗宴今月十七日幸樂遊苑設絲竹之樂大㑹文武後主至徳三年十二月辛丑釋奠于先師禮畢設金石之樂㑹王公卿士四年九月甲午輿駕幸𤣥武湖肆艣艦閲武宴羣臣賦詩東魏孝静帝天平三年正月癸卯朔饗羣臣於前殿北齊文宣帝天保元年七月詔曰古人鹿皮為衣書囊成帳有懐盛徳風流可想其魏朝御府所有珍竒雜綵常所不給人者徒為畜積宜命悉出送納後園以供七日宴賜九年十一月登三臺御乾象殿宴羣臣並命賦詩梁太祖開平元年五月丙申御𤣥徳殿宴犒諸軍使劉捍符道昭已下賜物有差是月青州許州定州三鎮節度使請開内宴各賜方物六月戊寅幸乾元院宴召宰臣學士及諸道入貢陪臣二年三月幸澤州辛巳以同州節度使劉知俊為潞州行營招討使壬午宴扈駕羣臣并勞知俊賜以金帶戰袍寳劍茶藥四月丁未自澤州還至懐州宴宰臣文武百官九月丁亥西幸陳州錫宴扈從官十月乙巳御内殿宴宰臣扈從官共四十五人丙午御毬塲殿宣夾馬都指揮使尹晧韓塘以下將士五百人賜酒食庚戌至西都御文思殿辛亥宰臣百寮起居於殿前遂宣赴内宴賜方物有差丁巳至東都壬戌御宣和殿宴宰臣文武百官十一月辛亥御宣和殿宴宰臣文武百官以大駕還京故也庚辰御宣和殿宴宰臣文武百官乙未又宴宰臣百官於宣和殿三年正月甲午御文思殿宴羣臣賜金帛有差二年丁酉宴羣臣於崇勲殿甲辰又宴羣臣於崇勲殿盖藩臣進賀勉而從之三月丙辰朔御崇勲殿視朝遂宴羣臣四月車駕在河中府己亥御前殿宴宰臣及冀王友謙扈從官甲寅宴宰臣及扈從官于内殿五月乙丑朔視朝遂命宰臣及文武百官宴于内殿己卯車駕至西京癸未御崇勲殿宴宰臣及文武百官四品已上己丑復御崇勲殿宴宰臣文武百官四品已上九月甲午宴百官於崇勲殿丙辰御崇勲殿召韓建楊渉薛貽矩趙光逢杜曉河南尹張宗奭襄州節度使楊師厚宣州節度使王景仁等賜食賜宰臣銀鞍轡馬方物銀器細茶等庚辰御崇勲殿宴宰臣及文武百官四年正月壬寅幸保寧毬塲賜宴宰臣及文武百官二月戊辰宴於金鑾殿甲戌以春時無事頻命宰臣及勲烈宴於河南府池亭辛巳楊師厚赴鎮于陜寒食假諸道節度使郡守勲臣競以春服賀又連清明宴以鞍轡馬及金銀器羅綿進者迨千萬乃御宣威殿宴宰臣及文武官四品已上三月壬辰幸崇政院宴勲臣己亥幸天驥院宴侍臣壬寅幸甘水亭宴宰臣勲烈翰林學士辛亥宴宰臣於内殿丙辰於興安毬塲大饗六軍樂春時也四月乙丑宴崇政院帝在藩及踐祚勵精求理深戒逸樂未常命堂上歌舞是日止令内妓昇階擊皷弄曲甚懽至午而罷七月壬子宴宰臣河南尹翰林學士兩街使于甘水亭丙辰宴羣臣於宣威殿八月西征庚午次陜府辛未宴本府節度使楊師厚及扈從官于行宫賜師厚帛千匹仍授西路行營招討使丙子宴文武從官軍使已下設龜兹樂九月甲午至西京乙卯宴㑹羣臣于宣威殿十月己卯以新修天驥院開宴落成内外并獻馬而魏愽進絹四萬疋為駔價壬午以冬設禁軍幸興安鞠埸召文武百官宴十一月辛卯宴文武四品已上于宣威殿庚戌幸左龍虎軍宴羣臣甲寅幸右龍虎軍宴羣臣十二月辛酉宴文武四品已上于宣威殿五年三月丙申幸甘水亭召宰臣翰林學士尚書侍郎孔續已下八人扈從宴樂甚歡戊戌幸右龍虎軍召文武官四品已上宴於新殿甲辰幸左龍虎軍新殿宴文武官四品已上四月丁卯幸龍虎門召宰臣學士金吾上將軍大將軍侍宴廣化寺丁丑幸宣威殿宴文武官四品已上及軍使蕃客己卯又幸左龍虎軍宴羣臣乾化元年五月甲申朔大赦改元宴於宣威殿壬辰宴河南尹翰林學士軍使於宣威殿八月癸亥詔宰臣文武百寮宴於河南府九月己丑宴羣臣於興安殿十月幸相州癸亥令諸軍指揮使及四畨將軍賜食於行宫之外廡戊辰幸邑西之白龍潭潭水亘千許歩南北五之一焉風瀾折岸遼然有江湖之狀潭之北立神祠前亭宇𢎞敞下植波際帝登臨凝覽宸㫖舒悦即命丞相與翰林大學士侍膳於方右又命魚艋數十以釣網進觀獻焉十一月甲申至黎陽縣乙酉命從官丞相已下宴於行次二年二月庚戌中和節御崇勲殿召丞相大學士河南尹略封訖於萬春門外廡賜以酒食是月庚申御宣威殿開宴丞相洎文武官屬咸被召列侍竟日而罷三月北廵還至貝州辛卯詔丞相翰林大學士文武從官都招討使及諸軍都指揮使等賜食於行殿壬辰命以羊酒等各賜從官己未次黎陽縣東都留守官吏奉表起居賜丞相從官酒食有差己巳至東都愽王友文以新創食殿上言并進准備内安錢三千貫銀器一千五百兩辛未宴于食殿召丞相及文武從官等侍焉慶賜傳曰行慶施惠罔有不當孟子有言曰推恩足以保四海古之令王何莫由兹道也自嬴氏力政并吞諸夏申詔爵之典弛羣飲之禁逮氣王南紀時更五代元魏之季髙齊嗣興莫不因事以大賚昭徳以行賞或進位以寵文武版授以尊耆艾恤民之隠則有糓帛之賜與人同樂則有牛酒之惠至於善人女子亦以霑及逮夫朱梁率由是矣其或折爼之宴有束帛之賚盖伐木之詩所謂將其厚意者也秦始皇二十五年五月天下大酺周禮族師掌春秋祭酺為人物灾害之神陳留俗三月上已臨水飲食為酺二十六年更名民曰黔首黔黎黒也大酺二十七年賜爵一級三十一年十二月更名臘曰嘉平賜黔首里六石米二羊三十六年徙民於北河榆中拜爵一級呉大帝黄龍元年四月即皇帝位是日將吏皆進爵加賞景帝永安元年十一月紹位詔曰諸將吏奉迎陪位在永昌亭者皆加位一級宋髙祖永初元年六月即位改元大赦賜民爵二級鰥寡孤獨不能自存者人糓五斛少帝景平元年正月己亥朔大赦改元文武進位二等文帝即位初文武賜位二等元嘉六年三月立皇太子劭為皇子賜文武位一等十四年南郊大赦文武賜位一等孤老六疾不能自存者人賜糓五斛十七年十月大赦天下文武賜爵一級二十四年春大赦文武賜位一等繫降宥諸逋負寛減各有差孤老六疾不能自存者賜糓五斛是年以林邑所獲金銀寳物班賚各有差二十六年幸丹徒詔二千石官長並勤勞王務宜有沾錫孝武孝建元年正月立皇子子業為皇太子賜天下為父後者爵一級孝子順孫義夫節婦粟帛各有差七月大赦賜文武爵一級大明二年詔曰先帝靈命初興龍飛西楚歲紀浸逺感徃纒心奉迎文武情深常𨽻思𢎞殊澤以申永懐吏身可賜爵一級軍戸免為平民三年七月大赦孝子順孫義夫節婦賜帛各有差四年車駕躬耕籍田大赦天下力田之民隨才叙用孝悌義順賜爵一級孤老貧疾人糓十斛籍田職司優沾重賚百姓之糧種隨宜貸給吏宣勸有章者詳加褒進六年正月祠南郊大赦天下孝子順孫義夫悌弟賜爵一級慈姑節婦及孤老六疾賜帛五疋糓十斛七年二月車駕廵南豫南兖二州賜民爵一級女子百戸牛酒刺守邑宰及民夫從蒐者普加沾賚又詔蠲歴陽郡租輸三年遣使廵慰問民疾苦鰥寡孤老六疾不能自存者厚賜粟帛十月壬寅太子冠賜王公以下帛各有差十二月行幸歴陽郡賜女子百戸牛酒髙年孤疾賜帛十疋前廢帝永光元年八月誅太宰江夏王義㳟等改元景和文武賜位二等景和元年皇子生少府劉勝之子也大赦天下賜為父後者爵一級明帝即位初大赦天下改泰始元年賜民爵二級鰥寡孤獨不能自存者人糓五斛二年既討平江郢荆雍湘五州六軍觧嚴大赦天下賜民爵一級五年車駕躬耕籍田大赦天下賜力田爵一級後廢帝元徽二年加元服大赦天下賜民男子爵一級為父後及三老孝悌力田爵二級鰥寡孤獨篤癃不能自存者糓五斛年八十以上加帛一疋大酺五日賜王公以下有差是年江州刺史桂陽王休範舉兵反討平之詔京邑二縣埋藏所殺賊并戰死者復同京城是日觧嚴大赦天下文武賜位一等四年正月車駕躬耕籍田大赦天下賜力田爵一級順帝元徽五年七月即位大赦天下賜文武位二等南齊太祖建元元年四月受禪大赦賜民爵二級文武位二等鰥寡孤獨不能自存者穀人五斛六月詔諸將及客戮力艱難盡勤直衛其從還宫者普賜位一階武帝永明二年八月幸舊宫領宫職司詳賜幣帛四年閏正月辛亥籍田詔孝悌力田詳授爵位孤老貧窮賜糓十石甲寅幸閱武堂勞酒小㑹詔賜王公以下在位者帛有差是年三月國子學講孝經車駕幸學賜國子祭酒慱士助教絹各有差五年十一月戊子皇孫冠於東宫崇政殿其日小㑹賜王公已下帛各有差十一年四月立皇太孫詔賜天下為父後者爵一級孝子順孫義夫節婦粟帛各有差明帝建武元年立皇太子寳卷詔天下孝子順孫義夫節婦普加甄賜明揚表其衡閭賚以束帛二年寢廟成詔監作長師可賜位一等役身遺假一年非役者蠲租同假三年皇太子冠賜王公已下帛各有差為父後者賜爵一級四年四月改元永泰文武加位二等梁武帝普通元年正月改元賜文武勞位孝弟力田爵一級尤貧之家勿収常調鰥寡孤獨并加贍䘏三年八月辛酉作二郊及籍田并畢班賜工匠各有差四年二月乙亥籍田詔孝弟力田賜爵一級預耕之司尅日勞酒三日大通元年正月辛未詔孝悌力田賜爵一級中大通元年正月辛酉輿駕親祠南郊大赦天下孝悌力田賜爵一級三年七月乙亥立晉安王綱為皇太子大赦天下為父後者及出處忠孝文武清勤并賜爵一級五年正月辛卯輿駕親祠南郊大赦天下孝悌力田賜爵一級六年二月癸亥輿駕親耕籍田大赦天下孝悌力田賜爵一級大同三年正月辛丑輿駕親祠南郊大赦天下孝悌力田賜爵一級五年正月辛未輿駕親祠南郊詔孝悌力田及州閭鄉黨稱孝為善人者各賜爵一級並勒所屬即時謄上十年三月駕幸蘭陵謁建寧陵至修陵壬寅詔故鄉老少接踵逺至情貌孜孜若歸於父冝有以慰其心此并可賜位一階并加頒賚内外從官軍主左右錢米各有差癸卯詔在園陵職司恭事勤勞并賜位一級并加沾賚是月幸回賔亭宴帝鄉故老及所經近縣奉迎候者少長數千人各賚錢二千中大通元年四月大赦改元孝悌力田為父後者賜爵一級賚宿衛文武各有差太清元年四月丁亥輿駕自同泰寺還宫大赦改元孝悌力田為父後者賜爵一級在朝羣臣宿衛文武并加班賚元帝承聖元年十一月即位大赦改元内外文武賜位一等敬帝太平元年九月壬子改元孝悌力田賜爵一級陳髙祖永定元年十月禪授大赦改元賜民爵二級文武二等鰥寡孤獨不能自存者人糓五斛文帝永定三年六月即位詔文武内外量加爵叙孝悌力田為父後者賜爵一級九月立皇太子伯宗王公已下賜帛各有差天嘉元年正月癸丑大赦改元孝悌力田殊行異等加爵一級辛丑輿駕祠南郊賜民爵一級三年正月初祠南郊詔曰朕負荷寳圖亟回星琯兢兢業業庶幾治定而徳化不孚俗弊滋甚永言念之無㤀日夜陽和布氣昭事上𤣥躬奉牲玉誠兼饗敬思與黎元被斯寛惠可普賜民爵一級其孝悌力田别加優恤七月己丑皇太子納妃王氏在位文武賜帛各有差孝悌力田為父後者賜爵二級六年正月甲午皇太子加元服王公以下賜帛各有差孝悌力田為父後者賜爵一級鰥寡孤獨不能自存者人糓五斛太康元年四月乙卯皇孫至澤生在位文武賜絹帛各有差為父後者賜爵一級廢帝光大元年正月大赦改元孝悌力田賜爵一級七月戊申立皇太子至澤為皇太子賜天下為父後者爵一級王公已下賚帛各有差宣帝大建元年正月甲午即位大赦改元在位文武賜爵一階孝悌力田及為父後者賜爵一級異等殊才幷加䇿序鰥寡孤獨不能自存者人賜糓五斛七月辛卯皇太子納妃王公已下賜帛有差五年二月己丑皇孫生詔曰皇孫載誕國祚方熈思與羣臣共同斯慶内外文武賜帛各有差為父後者賜爵一級後主大建十四年正月丁巳即位大赦在位文武及孝悌力田為父後者并賜爵一級鰥寡孤獨不能自存者賜糓人五斛帛二疋四月丙子立永康公為皇太子賜天下為父後者爵一級王公已下賚帛各有差至徳二年七月壬午太子加元服在位文武賜帛各有差孝悌力田為父後者各賜爵一級鰥寡癃老不能自存者人糓五斛東魏孝靜帝天平三年五月賜鰥寡孤獨貧窮者衣服各有差興和元年十月以新宫成大赦改元年八十以上賜綾㡌及杖七十已上賜帛及有廢疾者各賜帛粟二年正月徙新宫大赦内外百官普進一級營構主將别優一階北齊文宣帝天保元年五月受禪南郊禮畢大赦改元百官進階男子賜爵鰥寡六疾義夫節婦旌賞有差九年十一月以新宫成丁酉大赦内外文武竝進一大級廢帝天保十年十一月癸酉即位大赦内外百官普加進級孝昭帝皇建元年十一月立世子百年為太子賜天下為父後者爵一級武成帝河清元年正月以子緯為皇太子大赦内外百官并加進級諸為父後者賜爵一級後主天統三年二月帝加元服大赦九州職人各進四級内外百官并進二級武平元年六月以皇子生大赦内外百官并進二級九州職人并進四級梁太祖開平元年四月己未將受唐禪賜文武百官一百六十人本色衣一副丁卯大酺賞賜有差二年十一月戊子賜文武百官帛三年正月賜南郊行事官禮儀使趙光逢已下分物甲午上御文思殿宴羣臣賜金帛有差甲申賜文武官帛有差命宣徽使王殷押絹一萬疋并茵褥圖㡩二百六十件賜張宗奭九月御崇勲殿宴羣臣文武百官賜張宗奭楊師厚白綾各三百疋銀鞍轡馬丁酉上幸崇政院宴内臣賜院使敬翔直學士李班等繒綵有差四年正月壬寅幸保寕毬塲宴宰臣及文武百官賜宰臣張宗奭已下分物有加賜廣王分物七月丙辰宴羣臣於宣威殿賜物有差八月車駕西征次陜府丙子宴文武從官軍使已下設龜兹樂賜物有差五年三月丙申幸甘水亭召宰臣翰林學士尚書侍郎孔續已下八人扈從宴樂上甚歡賜物有差四月丁卯幸龍門召宰臣學士金吾上將軍大將軍侍宴于廣化寺賜物有差乾化元年五月甲申朔大赦改元詔方伯州牧近未加恩者并遷爵秩復大賚軍旅溥宴于宣威殿賜帛各有差三年四月幸魏州之金波亭賜宰臣文武官及大學士羊酒有差末帝龍徳元年正月改元詔曰郊禋大禮舊有渥恩御殿改元比無賞給今則不循舊例别示特恩其行營將士賞賚已給付本家宜令招討使霍彦威副招討使王彦章陳州行營都指揮使張漢傑曉示諸軍知悉納貢獻天子制貢職所以均財用諸侯歸時事所以陳藝極式明上下之序聿成經乆之法昔漢室淪覆三國鼎峙孫劉而下據有江呉北齊朱梁奄宅中土而皆懋宣法式寵綏遐邇故藩服之長中外之臣莫不遵時㑹之文修任土之貢亦有獻瑞物而贄寳器者咸用論次焉呉大帝漢建安末為呉侯安逺將軍領交趾太守士燮每遣使致雜香細葛輙以千數明珠大貝琉璃翡翠玳瑁犀象之珍竒物異果蕉椰龍眼之屬無歲不至燮弟合浦太守一時貢馬凡數百匹帝輙為書厚加寵賜以荅慰之嘉禾元年十月魏遼東太守公孫淵遣使稱藩并獻貂馬帝大悅加淵爵位宋明帝泰始四年二月丙申豫章望蔡獲古銅鐘髙一尺七寸太守張辯以獻南齊武帝永明五年益州刺史始興王鑑獻龍角一枝長九尺三寸紅色有文六年七月齊郡太守劉元寳於郡城塹得錢三十七萬徑一寸半以獻帝以為瑞班賜公卿崔惠景為南郡内史梁南秦二州刺史又為司州刺史惠景每罷州輙資獻奉動數百萬武帝以此嘉之梁武帝大通初陶𢎞景獻二丹於髙祖其一名嘉勝一名成勝並為佳寳陳宣帝大建七年四月郢州獻瑞鐘十二月南康郡獻瑞鐘北齊文宣帝天保七年梁湘州刺史王琳獻馴象梁太祖開平元年五月壬午保義軍節度使朱友謙進百官衣二百副其月廣州進竒寳名藥品類甚多河南尹張全義進開平元年已前羡餘錢十萬貫紬六千疋綿三十萬兩仍請每年上供定額每歲貢絹三萬疋以為常式荆南髙季昌進瑞橘數十顆質狀百味倍勝常貢且橘當冬熟今方仲夏時人咸異其事因稱為瑞十月廣州進獻助軍錢二十萬又進龍腦腰帶珍珠枕玳瑁香藥等十一月廣州進龍形通犀腰帶金托裏含稜玳瑁器百餘副香藥珍巧甚多二年正月幽州劉守文進海東鷹鶻蕃馬氊罽方物九月福州貢玳瑁琉璃犀象器并珍玩香藥竒品海味色類良多價累千萬十一月諸道節度刺史各進賀冬田器鞍馬綾羅等三年四月幽州節度使劉守光進蕃中生異馬一匹鞍後毛長五寸名烏龍兩浙節度使錢鏐進睦州大茶三百一十籠洞牙弩百枝桐木槍二千條賜進奉使紀君武銀帛有差是年冬諸道節度使刺史咸貢鞍馬銀絹羅綺賀正四年五月自朔旦至癸巳内外以午日奉獻巨萬計馬三千蹄餘稱是復相率助修内壘時南北征伐版籍未有定賦帝每議營造及節序無不咸獻而南方數鎮入相調外山澤魚塩之利罕籍於縣官矣七月福州貢方物獻桐皮扇廣州貢犀玉獻船上薔薇水十月己卯新修天驥院帝開宴落成内外并獻馬而魏愽進絹四萬疋以為駔價乾化元年兩浙進大方茶二萬觔琢畫宫衣五百副廣州貢犀象竒珍及金銀等其估數千萬安南兩使留後曲美進筒中蕉五百疋龍腦欝金各五瓶他海貨等有差又進南蠻通好金器六物銀器十二并乾陁綾花繓越􅀈等雜織竒巧者各三十件福建進户部多支𣙜課葛三萬五千疋二年四月廣州獻金銀犀牙雜寳貨及名香等合估數千萬是月客省引進使韋堅使廣州廻以銀茶上獻其估凡五百餘萬福建進供御金花銀器一百件各五千兩是年天下郡國各助郊天及賀正獻相次而至册府元龜卷一百九十七
