body:
  text: 册府元龜卷二百三十七宋王欽若等撰列國君部嗣襲第二晉唐叔虞者周武王子而成王弟成王封叔虞於唐故曰唐叔虞叔虞姓姬氏字子于唐叔子爕是為晉侯晉侯子寧族是為武侯武侯之子服人是為成侯成侯子福是為厲侯厲侯子宜臼是為靖侯靖侯已來年紀可推自唐叔至靖侯五世無其年數靖侯十八年卒子釐侯司徒立十八年卒子獻侯籍立十一年卒子穆侯費王立穆侯四年取齊女姜氏為夫人七年伐條生太子仇條晉地十年伐千畝有功西河界休縣南有地名千畝生少子名曰成師意取能成其衆也師服曰晉大夫異哉君之命子也太子曰仇仇者讐也少子曰成師成師大號成之者也名自命也物自定也今適庶名反逆此後晉其能無亂乎二十七年穆侯卒弟殤叔自立太子仇出奔殤叔四年穆侯太子仇率其徒襲殤叔而立是為文侯三十五年卒子昭侯伯立昭侯元年封文侯弟成師于曲沃曲沃邑大於翼翼晉君都邑也成師封曲沃號為桓叔靖侯庶孫欒賓相桓叔桓叔是時年五十八矣好德晉國之衆皆附焉君子曰晉之亂其在曲沃矣末大於本而得民心不亂何待七年晉大臣潘父弑其君昭侯而迎曲沃桓叔桓叔欲入晉晉人發兵攻桓叔桓叔敗歸還曲沃晉人共立昭侯子平為君是為孝侯誅潘父孝侯八年曲沃桓叔卒子鱓代桓叔是為曲沃莊伯孝侯十五年曲沃莊伯弑其君晉孝侯于翼晉人攻曲沃莊伯莊伯復入曲沃晉人復立孝侯子都為君是為鄂侯鄂侯六年卒曲沃莊伯聞晉鄂侯卒乃興兵伐晉周平王使虢公將兵伐曲沃莊伯莊伯走保曲沃晉人共立鄂侯子光為哀侯二年曲沃莊伯卒子稱代莊伯立是為曲沃武公哀侯八年晉侵陘廷翼南鄙邑名陘廷與曲沃武公謀九年伐晉于汾旁虜哀侯晉人乃立哀侯子小子為君是為小子侯小子元年曲沃武公使韓萬殺所虜晉哀侯韓萬曲沃桓叔之子莊伯弟曲沃益疆晉無如之何晉小子之四年曲沃武公誘召晉小子殺之周桓王使虢仲伐曲沃武公武公入于曲沃乃立晉哀侯弟緡為晉侯晉侯二十八年曲沃武公伐晉侯緡滅之盡以其寶器賂獻于周釐王釐王命曲沃武公為晉君列為諸侯盡併晉地而有之曲沃武公已即位三十七年矣更號曰晉武公晉武公始都晉國前即位曲沃通三十八年武公稱者先穆侯曾孫也曲沃桓叔孫也桓叔者始封曲沃武公莊伯子也自桓叔初封曲沃以至武公滅晉凡六十七歲而卒代晉為諸侯武公代晉二歲卒與曲沃通年即位凡三十九年而卒子獻公詭立獻公五年伐驪戎得驪姬西戎之别在驪山也驪姬弟俱愛幸之八年士蒍說公曰士蒍晉大夫故晉之羣公子多不誅亂且起乃使盡殺諸公子而城聚都之聚晉邑命曰綘始都綘十二年驪姬生奚齊獻公有意廢太子乃曰曲沃吾先祖宗廟所在而蒲邊秦屈邊翟蒲今蒲坂屈北屈皆在河東一曰蒲今平陽蒲子縣是不使諸子居之我懼焉於是使太子申生居曲沃公子重耳居蒲公子夷吾居屈獻公與驪姬子奚齊居綘晉國以此知太子不立也太子申生其母齊桓公女也曰齊姜早死申生同母女弟為秦繆公夫人重耳母翟之狐氏女也夷吾母重耳母女弟也獻公子八人而太子申生重耳夷吾皆有賢行及得驪姬乃遠此三子十九年獻公私謂驪姬曰吾欲廢太子以奚齊代之驪姬泣曰太子之立諸侯皆已知之而數將兵百姓附之奈何以賤妾之故廢適立庶君必行之妾自殺也驪姬徉譽太子而隂令人譛惡太子而欲立其子二十一年驪姬謂太子曰君夢見齊姜太子速祭曲沃齊姜廟所在歸釐於君太子於是祭其母齊姜於曲沃上其薦胙於獻公獻公時出獵置胙於宫中驪姬使人置毒藥胙中居二日獻公從獵來還宰人上胙獻公獻公欲饗之驪姬從旁止之曰胙所從來遠宐試之祭地地墳將飲先祭示有先也墳起也與犬犬死與小臣小臣死小臣官名掌隂事今閹士也驪姬泣曰太子何忍也其父而欲弑代之况他人乎且君老矣旦暮之人曾不能待而欲弑之謂獻公曰太子所以然者不過以妾及奚齊之故妾願母子辟之他國若早自殺毋徒使母子為太子所魚肉也始君欲廢之妾猶恨之至於今妾殊自失於此太子聞之奔新城新城曲沃也新為太子城獻公怒乃誅其傅杜原欵或謂太子曰為此藥者乃驪姬也太子何不自辭明之可也太子曰吾君老矣非驪姬寢不安食不甘即辭之君且怒之不可或謂太子曰可奔他國太子曰被此惡名以出人誰内我我自殺耳十二月戊申申生自殺於新城此時重耳夷吾來朝人或告驪姬曰二公子怨驪姬譛殺太子驪姬恐因譛二公子申生之藥胙二公子知之二子聞之恐重耳走蒲夷吾走屈保其城自備守二十二年獻公怒二子不辭而去果有謀矣乃使兵伐蒲重耳遂奔翟使人伐屈屈城守不可下二十三年獻公遂發賈華等伐屈賈逵曰賈華晉右行大夫屈潰夷吾將奔翟冀芮曰不可韋昭曰冀芮晉大夫重耳已在矣今往晉必移兵伐翟翟畏晉禍且及不如走梁梁近於秦秦彊吾君百歲後可以求入焉遂奔梁二十五年驪姬娣生卓子二十六年獻公病甚乃謂荀息曰吾以奚齊為後年少諸大夫不服恐亂起子能立之乎荀息曰能獻公曰何以為騐對曰使死者復生生者不慙為之騐於是遂屬奚齊於荀息荀息為相主國政獻公卒里克㔻鄭欲内重耳以三公子之徒作亂㔻鄭晉大夫三公子申生重耳夷吾謂荀息曰三怨將起秦晉輔之子將何如荀息曰吾不負先君言十月里克殺奚齊於喪次獻公未塟也荀息將死之或曰不如立奚齊弟卓子而傅之荀息立卓子而塟公十一月里克弑卓子于朝列女傳曰鞭殺驪姬於市荀息死之里克使迎夷吾於梁郤芮使夷吾重賂秦以求入郤芮郤克祖父從夷吾者曰人實有國我何愛焉言國非己有何愛而不以賂秦入而能民土於何有從之能得民不患無土齊隰朋帥師㑹秦師納晉惠公惠公立十四年卒太子圉立是為懐公懐公初質於秦惠公病亡歸秦怨之乃求公子重耳欲納之秦穆公乃發兵送重耳使人告欒郤之黨為内應殺懐公於高梁入重耳重耳立是為文公秦穆公乃發兵與重耳歸晉晉聞秦兵來亦發兵拒之然皆隂知公子重耳入也唯惠公之故貴臣呂郤之屬不欲立重耳重耳出亡凡十九歲而得入時年六十二矣晉人多附焉文公立九年卒子襄公歡立七年八月襄公卒太子夷臯少晉人以難故晉國數有患難欲立長君趙盾曰立襄公弟雍好善而長先君愛之且近於秦秦故好也立善則固事長則順奉愛則孝結舊好則安賈季曰不如其弟樂辰嬴嬖於二君辰嬴懐嬴也二君懐公文公立其子民必安之趙盾曰辰嬴賤班在九人下班次也其子何震之有震威也且為二君嬖滛也為先君子不能求大而出在小國賤也母滛子僻無威陳小而遠無援將何可乎使士㑹如秦迎公子雍賈季亦使人召公子樂於陳趙盾廢賈季殺陽處父此時賈佗為大師陽處父為太傅十月葬襄公十一月賈季奔翟是歲秦穆公亦卒靈公元年四月秦康公曰昔文公之入也無衛故有呂郤之患乃多與公子雍衛太子母繆嬴日夜抱太子以號泣於朝曰先君何罪其嗣亦何罪舍適而外求君將安置此此太子出朝則抱以適趙盾所頓首曰先君奉此子而屬之子曰此子材吾受其賜不材吾怨子怨其教導不至今君卒言猶在耳在宣子之耳而棄之若何趙盾與諸大夫皆患穆嬴且畏偪乃背所迎而立太子夷臯是為靈公十四年靈公壯厚歛以雕墻將軍趙穿襲殺靈公於桃園趙盾使趙穿迎襄公弟黑臋于周而立是為成公成公者文公少子其母周女也七年成公卒子景公據立十九年夏景公病立其太子壽曼為君是為厲公後月餘景公卒厲公多外嬖姬欲盡去羣大夫而立諸姬兄弟八年欒書中行偃弑厲公使人迎公子周一曰作糾而立之是為悼公悼公周者其大父捷晉襄公少子也不得立號為桓叔桓叔最愛桓叔生惠伯談談生悼公周周之立年十四矣初欒武子既弑厲公使智武子彘恭子如周迎悼公庚午大夫迎于清原公言於諸大夫曰孤始願不及此孤之及此天也且人之有元君將禀命焉若禀而棄之是焚穀也其禀而不材是穀不成也穀之不成孤之咎也成而焚之二三子之虐也孤之不元廢也其誰怨也元而以虐奉之二三子之制也若欲奉元以濟大義將在今日若欲暴虐以離百姓反易民常亦在今日圖之進退願繇今日大夫對曰君鎮撫羣臣而大庇廕之無乃不堪君訓而䧟於大戮以煩刑吏辱君之允令敢不承業乃盟而入即位十五年卒子平公彪立二十六年卒子昭公夷立六年卒子頃公去疾立十四年卒子定公午立三十七年卒子出公鑿立出公立十七年年表云十八年或云二十年知伯與韓趙魏共分范仲行地以為邑出公怒告齊魯欲以伐四卿四卿恐遂反攻出公出公奔齊道病死故知伯乃立昭公曾孫驕為晉君是為哀公哀公大父雍晉昭公少子也號為戴子戴子生忌忌生哀公哀公十八年卒子幽公柳立十八年盜殺幽公魏文侯以兵誅晉亂立幽公子止是為烈公二十七年卒子孝公頎立十七年卒子靜公俱酒立静公二年魏武侯韓哀侯趙敬侯滅晉而三分其地秦之先帝顓瑞之苗裔孫曰女修女修織𤣥鳥隕卵女修吞之生子大業大業取少典之子曰女華女華生大費與禹平水土已成帝錫𤣥圭禹受曰非予能成亦大費為輔帝舜曰咨爾費賛禹功其錫爾皁游爾後嗣將大出乃妻之姚姓之玉女賜之𤣥圭妻以姚姓之女也大費拜受佐舜調馴鳥獸鳥獸多馴服是為柏翳舜賜姓嬴氏大費生子二人一曰大亷實鳥俗氏二曰若木實費氏其𤣥孫曰費昌子孫或在中國或在夷狄費昌當夏桀之時去夏歸商為湯御以敗桀於鳴條大亷𤣥孫曰孟戲中衍鳥身人言帝太戊聞而卜之使御吉遂致使御而妻之自太戊以下中衍之後遂世有功以佐殷國故嬴姓多顯遂為諸侯其𤣥孫曰中潏一作滑在西戎保西埀生蜚亷蜚亷生惡來惡來有力手掣虎兕蜚亷善走父子俱以材力事紂惡來革早死有子曰女防女防生旁臯旁臯生大几大几生大駱大駱生非子以造父之寵皆蒙趙城姓趙氏非子居犬丘居槐里也好馬及畜善養息之犬丘人言之周孝王孝王召使主馬于汧渭之間馬大蕃息孝王欲以為大駱適嗣申侯之女為大駱妻生子成為適申侯乃言孝王曰昔我先酈山之女為戎胥軒妻生中潏以親故歸周保西埀以其故和睦今我復與大駱妻生適子成申駱重婚西戎皆服所以為王王其圖之於是孝王曰昔柏翳為舜主畜畜多息故有土賜嬴姓今其後世亦為朕息馬朕其分土為附庸邑之秦今天水隴西縣秦亭也使復續嬴氏祀號曰秦嬴亦不廢申侯之女子為駱適者以和西戎秦嬴生秦侯秦侯立十年卒生公伯公伯立三年卒生秦仲秦仲立三年周厲王無道諸侯或叛之西戎反王室滅大駱犬丘之族周宣王即位秦仲之十八年也乃以秦仲為大夫誅西戎西戎殺秦仲秦仲立二十二年死於戎秦仲始大冇車馬禮樂侍御之好也有子五人其長者曰莊公周宣王乃召莊公昆弟五人與兵七千人使伐西戎破之於是復予秦仲後及其先大駱地犬丘并有之為西埀大夫莊公居其故西犬丘生子三人其長男世父世父曰戎殺我大父仲我非殺戎王則不敢入邑遂將擊戎讓其弟襄公襄公為太子莊公立四十四年卒太子襄公代立西戎犬戎與申侯伐周殺幽王驪山下而秦襄公將兵救周戰甚力有功周避犬戎難東徙雒邑襄公以兵送周平王平王封襄公為諸侯十二年卒子文公立四十八年文公太子卒賜諡為竫公竫公之長子為太子是文公孫也五十年文公卒竫公子立是為寧公十二年卒生子三人長男武公為太子武公弟德公同母魯姬子生出子寧公卒大庶長弗忌威壘三父廢太子而立出子為君出子六年三父等復共令人賊殺出子出子生五歲立六歲卒三父等乃復立故太子武公二十年武公卒立其弟德公德公生三十三歲而立立二年卒子三人長子宣公中子成公少子穆公宣公立十二年卒立其弟成公成公立四年卒立其弟穆公任好三十九年穆公卒太子罃代立是為康公康公立十二年卒子共公立共公立五年卒子桓公立桓公二十七年卒子景公立景公四十年卒子哀公立三十六年卒太子夷公早死不得立立夷公子是為惠公惠公十年卒子悼公立十四年卒子厲共公立三十四年卒子躁公立十四年躁公卒立其弟懐公懐公四年庶長鼂與大臣圍懐公懐公自殺懐公太子曰昭子蚤死大臣乃立太子昭子之子是為靈公十三年卒立子獻公不得立立靈公季父悼子是為簡公十六年卒子惠公立十三年卒子出子立出子二年庶長改迎靈公之子獻公于河西而立之殺出子二十四年獻公卒子孝公立二十四年卒子惠文君立二十八年卒子武王立四年武王死立異母弟是為昭襄王即昭王也昭王四十年太子死四十二年以次子安國君為太子安國君有子二十餘人安國君有所甚愛姬立以為正夫人號曰華陽夫人華陽夫人無子安國君中男名子楚子楚母曰夏姬母愛子楚為秦質子於趙秦數攻趙趙不甚禮子楚子楚秦諸庶孽孫質於諸侯車乘進用不饒居處困不得意呂不韋賈邯鄲見而憐之曰此竒貨可居以此子楚方財貨也乃往見子楚説曰吾能大子之門子楚笑曰且自大君之門而乃大吾門呂不韋曰子不知也吾門待子門而大子楚心知所謂乃引與坐深語呂不韋曰秦王老矣安國君得為太子竊聞安國君愛幸華陽夫人華陽夫人蕪子能立適嗣者獨華陽夫人耳今子兄弟二十餘人子又居中不甚見幸久質諸侯即大王薨安國君立為王則子無幾得與長子諸子旦暮在前者爭為太子矣子楚曰然為之奈何呂不韋曰子貧客於此非有以奉獻於親及結賓客也不韋雖貧請以千金為子西遊事安國君及華陽夫人立子為適嗣子楚乃頓首曰必如君䇿請得分秦國與君共之呂不韋乃以五百金與子楚進用結賓客而復以五百金買竒物玩好自奉而西遊秦求見華陽夫人姊而皆以其物獻華陽夫人因言子楚賢智結諸侯賓客徧天下常曰楚也以夫人為天日夜泣思太子及夫人夫人大喜不韋因使其姊説夫人曰吾聞之以色事人者色衰而愛弛今夫人事太子甚愛而無子不以此時蚤自結於諸子中賢孝者舉立以為適而子之夫在則重尊夫百歲之後所子者為王終不失勢此所謂一言而萬世之利也不以繁華時樹本即色衰愛弛後雖欲開一語尚可得乎今子楚賢而自知中男也次不得為適其母又不得幸自附夫人夫人誠以此時拔以為適夫人則竟世有寵於秦矣華陽夫人以為然乘太子間從容言子楚質於趙者絶賢來往者皆稱譽之乃因涕泣曰妾幸得充後宫不幸無子願得子楚立為適嗣以托妾身安國君許之乃與夫人刻玉符約以為適嗣安國君及夫人因厚饋遺子楚而請呂不韋傅之子楚以此名譽益盛於諸侯呂不韋取邯鄲諸姬絶好善舞者與居知有身子楚從不韋飲見而說之因起為壽請之不韋怒念業已破家為子楚欲以釣竒乃遂獻其姬姬自匿有身至大期時徐廣曰十二月也生子政子楚遂立姬為夫人秦昭王五十年使王齮圍邯鄲急趙欲殺子楚子楚與呂不韋謀行金六百斤予守者吏得脱亡赴秦軍遂以得歸趙欲殺子楚妻子子楚夫人趙豪家女也得匿以故母子竟得活秦昭王五十六年卒太子安國君立是為孝文王即位三日卒子莊襄王立四年卒子政立是為秦始皇帝楚之先祖出自帝顓頊高陽高陽者黄帝之孫昌意之子也高陽生稱稱生卷章卷章生重黎世本云老童生重黎及吳回譙周曰老童即卷章也重黎為帝嚳高辛居火正甚有功能光融天下帝嚳命曰祝融祝大融明也一曰祝始也共工氏作亂帝嚳使重黎誅之而不盡帝乃以庚寅日誅重黎而以其弟吳囘為重黎後復居火正為祝融吳囘生陸終陸終生子六人坼剖而生焉干寳曰先儒學士多疑此事譙允南通才達學情該數理者也作古史考以為作者妄記廢而不論余亦尤其生之異也然案六子之世子孫有國升降六代數千年間迭至霸王天將興之必有尤物乎若夫前志所傅修已背坼而生禹簡狄胷剖而生契厯代久逺莫足相證近魏黄初五年汝南屈雍妻王氏生男兒從右胳下小腹上出而平和自若數月創合母子無恙斯蓋近事之信也以今况古固知傳記者之不妄也天地紜為隂陽變化安可守之一端槩以常理乎詩云不坼不副無災無害原詩人之㫖明古之婦人常有坼腹而産者矣又有因産而遇災害者故美其無害也其一曰昆吾昆吾名樊為己姓封昆吾世本曰昆吾者衛是也二曰參胡世本曰參胡者韓是也三曰彭祖名翦為彭姓封於大彭世本曰彭祖者彭城是也四曰㑹人世本曰㑹人者鄭是也五曰曹姓世本曰曹姓者邾是也六曰季連芈姓楚其後也昆吾氏夏之時嘗為侯伯桀之時湯滅之彭祖氏殷之時嘗為侯伯殷之末世滅彭祖氏季連生附沮孫檢曰一作祖附沮生宂熊其後中㣲或在中國或在蠻夷弗能紀其世周文王之時季連之苖裔曰鬻熊鬻熊子事文王蚤卒其子曰熊麗熊麗生熊狂熊狂生熊繹熊繹當周成王之時舉文武勤勞之後嗣封熊繹於楚蠻封以子男之田姓芈氏居丹陽楚子熊繹生熊艾熊艾生熊䵣熊䵣生熊勝熊勝以弟熊楊為後熊楊生熊渠熊渠生子三人當周夷王時王室㣲諸侯或不朝相伐熊渠甚得江漢間民和乃興兵伐庸庸今上庸地楊粤至於鄂熊渠曰我蠻夷也不與中國之號諡乃立其長子康為句亶王今江陵也中子紅為鄂王九州記曰鄂今武昌少子執疵為越章王皆在江上楚蠻之地及周厲王之時暴虐熊渠畏其伐楚亦去其王後為熊母康即渠之長子母康早死熊渠卒子熊摯紅立摯紅卒其弟弑而代立曰熊延熊延生熊勇熊勇十年卒弟熊嚴為後熊嚴十年卒有子四人長子伯霜中子仲雪次子叔堪少子季徇熊嚴卒長子伯霜代立是為熊霜熊霜六年卒三弟爭立仲雪死叔堪亡避難於濮建寧郡南有濮夷而少弟季徇立是為熊徇二十二年卒子熊咢立熊咢九年卒子熊儀立是為若敖二十七年卒子熊坎立是為霄敖六年卒子熊眴立眴音舜是為蚡冒十七年卒蚡冒弟熊通弑蚡冒子而代立是為楚武王五十一年卒子文王熊貲立始都郢十三年卒子熊囏立囏古艱字是為杜敖杜敖五年欲殺其弟熊惲惲奔隨與隨襲殺杜敖代立是為成王立四十六年欲立公子職絀公子商臣商臣以宫衛兵圍成王成王自絞殺商臣代立是為穆王十二年卒子莊王侣立二十三年卒子共王審立三十一年卒子康王招立十五年卒子員立是為郟敖康王寵弟公子圍子比子晳棄疾郟敖三年以其季父康王弟公子圍為令尹主兵事四年圍使鄭道聞王疾而還圍入問王疾絞而弑之圍立是為靈王靈王自殺兄之子員即位為王十一年使蕩侯等圍徐以恐吳靈王次於乾谿以待之十二年春王樂乾谿不能去也公子比公子棄疾作亂入殺太子祿立子比為王子晳為令尹棄疾為司馬靈王獨徬徨山中野人莫敢入王遂死於芉尹申亥家是時楚國雖立比為王畏靈王復來又不聞靈王死國人每夜驚曰靈王入矣五月乙卯夜棄疾使舩人從江上走呼曰靈王至矣國人愈驚又使曼成然告初王比及令尹子晳曰王至矣君蚤自圖無取辱焉初王及子晳遂自殺棄疾即位改名熊居是為平王平王二年使費無忌如秦為太子建娶婦婦好來未至無忌先歸説平王曰秦女好可自娶王聽之自娶秦女生熊珍更為太子娶無忌又讒太子建建奔宋十三年卒太子珍立是為昭王二十七年昭王病甚乃召諸公子大夫曰孤不佞再辱楚國之師今乃得以天壽終孤之幸也讓其弟公子申為王不可又讓次弟公子結亦不可又讓次弟公子閭五讓乃後許為王將戰庚寅昭王卒於軍中子閭曰王病甚舍其子讓羣臣臣所以許王以廣王意也今君王卒臣豈敢忘君王之意乎乃與子西子綦謀伏師閉塗一作壁迎越女之子章立之閉塗不通外使也越女昭王之妾是為惠王然後罷兵歸葬昭王惠王五十七年卒子簡王中立二十四年卒子聲王當立六年盜殺聲王子悼王熊疑立二十一年卒子肅王臧立十一年卒無子立其弟熊良夫是為宣王三十年卒子威王熊商立十一年卒子懐王熊槐立三十年秦昭王遺楚王書曰願與君王㑹武闗面相約結盟而去寡人之願也懐王往㑹秦昭王昭王詐令一將軍伏兵武關號為秦王楚王至則閉武關遂與至咸陽秦因留之楚大臣患之乃相與謀立太子横是為頃襄王頃襄王三年懐王發病卒於秦三十六年頃襄王卒太子熊元代立是為考烈王二十五年卒子幽王悍立十年卒同母弟猶代立是為哀王哀王二月餘哀王庶兄負芻之徒襲殺哀王而自立負芻為王五年秦將王翦蒙武遂破楚國虜楚王負芻滅楚名為楚郡云越王句踐其先禹之苖裔而夏后帝少康之庶子也封於㑹稽以奉守禹之祀文身斷髪披草萊而邑焉後二十餘世至於允常允常之時與吳王闔閭戰而相怨伐允常卒子句踐立是為越王句踐句踐卒子王鼫與立王鼫與卒子王不壽立王不壽卒子王翁立王翁卒子王翳立王翳卒子王之侯立王之侯卒子王無彊立王無彊伐楚楚威王興兵而伐之大敗越殺王無彊而越以此散諸族子爭立或為王或為君濱於江南海上服朝於楚後七世至閩君揺佐諸侯平秦漢高帝復以揺為越王以奉越後東越閩君皆其後也鄭桓公友者周厲王世子而宣王之庶弟也年表云母弟宣王立二十二年友初封於鄭封三十三歲百姓皆便愛之幽王以為司徒幽王八年為司徒和集周民周民皆説幽王時王室多難桓公問太史伯曰予安逃死乎太史伯曰獨雒之東土河濟之南可居桓公於是卒言王東徙其民雒東而虢鄶果獻十邑竟國之十邑謂虢鄶鄢蔽補丹依㽥厯莘也二歲犬戎殺桓公鄭人共立其子掘突是為武公二十七年卒子寤生立是為莊公四十三年卒太子忽立是為昭公初祭仲有寵於莊公莊公使為卿公使娶鄧女生昭公忽故祭仲立之莊公又娶宋雍氏女生突雍氏有寵於宋為宋正卿故曰有寵宋莊公聞祭仲立忽乃使人誘召祭仲而執之曰不立突將死亦執突以求賂焉祭仲許宋與宋盟以突歸立之昭公出奔衛突立是為厲公厲公四年祭仲專國政公患之隂使其壻雍糾欲殺祭仲糾妻祭仲女也告祭仲祭仲乃殺雍糾戮之於市厲公無奈祭仲何出居邊邑曰櫟遂居之祭仲迎昭公忽復入鄭即位自昭公為太子時惡高渠彌及昭公即位渠彌懼其殺己三年冬渠彌與昭公出獵射殺昭公於野祭仲與渠彌不敢入厲公乃更立昭公弟子亹為君子亹無諡號子亹元年齊襄公㑹諸侯於首止子亹往㑹子亹自齊襄公為公子時嘗㑹鬭相仇子亹至不謝齊侯齊侯怒遂伏甲而殺子亹高渠彌與祭仲謀召子亹弟公子嬰於陳而立之是為鄭子鄭子十四年厲公在櫟使人誘刼鄭大夫傅瑕要以求入瑕殺鄭子而迎厲公厲公自櫟復入即位厲公初立四歲亡居櫟居櫟十七歲復入立七歲卒子文公踕立初文公子蘭出奔晉蘭鄭穆公從晉文公伐鄭請無與圍鄭許之使待命於東晉東界鄭䂖甲父侯宣多迎以為太子以求成于晉晉文公欲入蘭為太子以告鄭鄭大夫石癸曰吾聞姞姓乃后稷之元妃姞姓之女為后稷妃其後當有興者子蘭母其後也且夫人子盡已死餘庶子無如蘭賢今圍急晉以為請利孰大焉遂許晉與盟卒而立子蘭為太子晉兵乃罷去子蘭立是為繆公二十二年卒子夷立是為靈公元年子公弑靈公鄭人立靈公庶弟公子堅是為襄公十八年卒子悼公㵒立二年卒立其弟睔是為成公十四年卒子惲立是為釐公釐公五年鄭相子駟使厨人藥殺釐公年表云子駟使賊夜弑僖公立釐公子嘉嘉時年五歲是為簡公三十六年卒子定公寧立十三年卒子獻公蠆立十三年卒子聲公勝立三十七年聲公卒子哀公易立八年鄭人弑哀公而立聲公弟丑是為共公三十年卒子幽公已立幽公元年韓武子伐鄭殺幽公鄭人立幽公弟駘是為繻公年表云鄭人立幽公子駘繻或作繚鄭君殺其相子陽二十七年子陽之黨共弑繻公駘而立幽公弟乙為君是為鄭君二十一年韓哀侯滅鄭併其國趙氏之先與秦共祖至中衍為帝大戊御其後世蜚亷有子二人而命其一子曰惡來事紂為周所殺其後為秦惡來弟曰季勝其後為趙季勝生孟增孟増幸於周成王是為宅臯狼或云臯狼地名在西河臯狼生衡父衡父生造父造父見幸於周繆王造父取驥之乘匹與桃林盜驪驊騮騄耳獻之繆王繆王使造父御西巡狩見西王母樂之忘歸而徐偃王反繆王日馳千里馬攻徐偃王大破之乃賜造父以趙城繇此為趙氏自造父而下六世至奄父曰公仲公仲為宣王御奄父生叔帶幽王無道叔帶去周如晉始建趙氏于晉自叔帶以下趙宗益興五世而生趙夙夙生共孟共孟生趙衰趙衰生盾盾生朔朔生武武生景叔景叔生趙鞅是為簡子簡子生毋䘏毋䘏母賤翟婢也簡子盡召諸子與語毋䘏最賢簡子乃告諸子曰吾藏寶符於常山上先得者賞諸子馳之常山上求無所得母䘏還曰已得符矣簡子曰奏之毋䘏曰從常山上臨代代可取也簡子於是知毋䘏果賢乃廢太子伯魯而以毋䘏為太子是為趙襄子趙襄子以為伯魯之不立也不肯立子且必欲傳位與伯魯子代成君成君先死乃取成君子浣立為太子是為獻侯十五年獻侯卒子烈侯籍立烈侯六年魏韓趙皆相立為諸侯九年烈侯卒弟武公立十三年卒趙復立烈侯太子章是為敬侯十二年卒子成侯種立二十五年卒太子肅侯立二十四年卒子武靈王立十六年王遊大陵他日王夢見處女鼓瑟而歌異日王飲酒樂數言所夢想見其狀吳廣聞之因夫人而内其女娃嬴孟姚也甚有寵生子何二十七年大朝於東宮傳國立王子何以為王是為惠文王武靈王自號為主父封長子章為代安陽君惠文王立三年主父死三十三年惠文王卒太子丹立是為孝成王二十一年王卒子偃立是為悼襄王九年卒子幽繆王遷立遷其母倡也嬖於悼襄王悼襄王廢適子嘉而立遷遷立七年秦人攻趙趙王遷降流於房陵秦既虜遷趙之亡大夫共立嘉為王王代六歲秦進兵破嘉遂滅趙魏之先畢公高之後也畢公高與周同姓武王之伐紂而高封於畢畢在長安縣西北於是為畢姓其後絶封為庶人或在中國或在夷狄其苖裔曰畢萬事晉獻公獻公之十六年趙夙為御畢萬為右以伐霍耿魏滅之以耿封趙夙以魏封畢萬為大夫而畢萬之世彌大從其國名為魏氏生武子武子生悼子魏悼子徙居霍悼子生綘綘生嬴嬴生獻子獻子生魏侈侈之孫曰魏桓子桓子之孫曰文侯都世本作斯文侯二十二年魏趙韓列為諸侯三十八年文侯卒子擊立是為武侯十六年卒子罃立是為惠王三十年以太子申為上將與齊人戰齊人虜太子申三十一年以公子赫為太子三十六年惠王卒子襄王立十六年卒子哀王立二十三年卒子昭王立十九年卒子安釐王立三十四年卒太子増立是為景湣王十五年卒子王假立王假三年秦灌大梁虜王假遂滅以為郡縣韓之先與周同姓其後苖裔事晉得封於韓原曰韓武子武子後三世有韓厥從封姓為韓氏韓厥卒子宣子代立宣子卒子貞子代立貞子卒子簡子代立史記無簡子莊子云貞子生康子班氏亦同簡子卒子莊子代莊子卒子康子代康子卒子武子代武子卒子景侯䖍立景侯六年與趙魏俱列為諸侯九年景侯卒子列侯取立十三年卒子文侯立十年卒子哀侯立六年韓嚴弑其君哀侯而子懿侯立十二年卒子昭侯立二十六年卒子宣惠王立二十一年卒太子倉立是為襄王十二年太子嬰死公子咎公子蟣虱爭為太子時蟣虱質於楚蘇代謂韓咎曰蟣虱亡在楚楚王欲内之甚今楚兵十餘萬在方城之外公何不令楚王築萬室之都雍氏之旁在陽翟韓必起兵以救之公必將矣公因以韓楚之兵奉蟣虱而内之其聽公必矣必以楚韓封公也韓咎從其計楚圍雍氏秦本紀惠王後元十三年周赧王三年楚懐王十七年齊湣王十二年皆云楚圍雍氏紀年於此亦説楚景翠圍雍氏韓宣王卒秦助韓共敗楚屈丐又云齊宋圍煑棗皆與史記年表及田完世家符同然則此卷所云襄王十二年韓咎從其計以上是楚後圍雍氏赧王之十五年事也又説楚圍雍氏以下是楚前圍雍氏赧王之三年事也韓求救於秦秦未為發使公孫昧入韓公仲曰子以秦為且救韓乎對曰秦王之言曰請道南鄭藍田出兵於楚以待公仲殆不合矣公仲曰子以為果乎對曰秦王必祖張儀之故智祖者宗之習之謂也故智猶前時謀計也楚威王攻梁也張儀謂秦王曰與楚攻魏魏折而入於楚韓固其與國也是秦孤也不如出兵以待之魏楚大戰秦取西河之外以歸今其狀陽言與韓其實隂善楚公待秦而至必輕與楚戰楚隂得秦之不用也必易與公相支也公戰而勝楚秦遂與公乘楚施三川而歸公戰不勝楚楚塞三川守之公不能救也竊為公患之司馬庚一作唐三反於郢甘茂與昭魚楚相國遇於商於其言收璽實類有約也公仲恐曰然則奈何曰公必先韓而後秦先身而後張儀公不如亟以國合於齊楚齊楚必委國於公公之所惡者張儀也其實猶不無秦也於是楚解雍氏圍甘茂傳曰楚懐王以兵圍韓雍氏韓使公仲告急於秦秦昭王新立不肯救甘茂為韓言之乃下師於殽以救韓也又曰周赧王十五年韓襄王十二年秦擊楚斬首二萬敗楚襄城殺景缺周本紀赧八年之後云楚圍雍氏此當韓襄王十二年魏哀王十九年紀年於此亦説楚入雍氏楚人敗然其時張儀已死十年矣蘇代又謂秦太后弟芊戎號新城君曰公叔伯嬰恐秦楚之内蟣虱也公何不為韓求質於楚楚王聽入質子於韓則公叔伯嬰知秦楚之不以蟣虱為事必以韓合於秦楚秦楚挾韓以窘魏魏氏不敢合於齊是齊孤也公又為秦求質子於楚楚不聽結怨於韓韓挾齊魏以圍楚楚必重公公挾秦楚之重以積德於韓公叔伯嬰必以國待公於是蟣虱竟不得歸韓韓立咎為太子十六年襄王卒太子咎立是為釐王二十三年卒子桓惠王立三十四年卒子王安立九年秦虜王安盡入其地為潁川郡齊陳完者陳厲公佗之子也完生周太史過陳陳厲公使卜完卦得觀之否是為觀國之光利用賓於王此其代陳有國乎不在此而在異國乎非此其身也在其子孫若在異國必姜姓姜姓四嶽之後物莫能兩大陳衰此其昌乎厲公者陳文公少子也其母蔡女文公卒厲公兄鮑立是為桓公桓公與佗異母及桓公病蔡人為佗殺桓公鮑及太子免而立佗為厲公厲公既立娶蔡女蔡女淫於蔡人數歸厲公亦數如蔡桓公之少子林怨厲公殺其父與兄乃令蔡人誘厲公而殺之林自立是為莊公故陳完不得立為陳大夫莊公卒弟宣公立宣公十一年殺其太子禦冦禦冦與完相愛恐禍及己完故奔齊齊桓公使為工正完卒諡為敬仲仲生穉孟夷敬仲之如齊以陳字為田始食采地繇是改姓田氏田穉孟夷生湣孟莊一作芷湣孟莊生文子須無須無生桓子無宇無宇生武子開與釐子乞乞為齊相專齊政乞生常是為成子成子卒子襄子盤一作塈代相齊襄子卒子莊子白立莊子卒子太公和立和遷齊於海上食一城以奉其先祀三年和與魏文侯㑹濁澤康公之十六年求為諸侯魏文侯乃使使言周天子及諸侯請立齊相田和為諸侯周天子許之康公之十九年和立為齊侯列於周室二年和卒子桓公午立六年卒子威王因齊立三十六年卒子宣王辟疆立十九年卒子湣王地立四十年湣王為相淖齒所弑子法章變名姓為莒太史敫家庸淖齒既以去莒莒人及齊亡臣相聚求湣王子欲立之法章懼其誅己也久之乃敢自言我湣王子也於是莒人共立法章是為襄王十九年卒子建立四十四年秦兵擊齊齊王聽相后勝計不戰以兵降秦秦虜王建遷之共河南有共縣册府元龜卷二百三十七
