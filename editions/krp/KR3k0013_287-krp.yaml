body:
  text: 册府元龜卷二百八十七宋王欽若等撰宗室部忠諌古人有言曰忠臣雖在畎畆猶不忘君惓惓之義也矧骨肉之親本根攸庇若乃朝政有闕君道或愆賞罰無章衆言並用而能諌之以德竭其誠心務進讜言期於開悟蓋情兼家國義在君親者也與夫信而後諌不聽則去者異矣詩曰雖有他人不如我同姓其是之謂歟殷王子比干紂之親戚也見箕子諌不聽而為奴則曰君有過而不以死争則百姓何辜乃直言諌紂紂怒曰吾聞聖人之心有七竅信有諸乎乃遂殺夫王子比干刳視其心紂作炮烙之刑王子比干曰王暴不諌非忠臣也畏死而不信非勇士也見過則諌不用則死忠之至也遂進諌三日不去朝紂因而殺之秦公子扶蘇始皇長子始皇益發謫徙邉扶蘇諌曰天下初定逺方黔首未集諸生皆誦法孔子今上皆重法繩之臣恐天下不安惟上察之始皇怒使扶蘇北監蒙恬於上郡子嬰二世兄子二世時趙髙親近日夜毁惡蒙氏求其罪過舉劾之子嬰進諌曰臣聞故趙王遷殺其良臣李牧而用顔聚燕王喜隂用荆軻之謀而背秦之約齊王建殺其故世忠臣而用后勝之議此三君者皆各以變古者失其國而殃及其身今蒙氏秦之大臣謀士也而主欲一旦棄去之臣竊以為不可臣聞輕慮者不可以治國獨智者不可以存君誅殺忠臣而立無節行之人是内使羣臣不相信而外使鬭士之意離也臣竊以為不可二世不聽漢淮南王安厲王長子也武帝建元六年閩越復舉兵擊南越南越守天子約不敢擅發兵而上書以聞帝多其義大為發兵遣兩將軍將兵誅閩越安上書諌曰陛下臨天下布德施惠緩刑罰薄賦歛哀鰥寡恤孤獨養耆老賑匱之盛德上隆和澤下洽近者親附逺者懷德天下攝然攝安也奴恊切人安其生自以沒身不見兵革今聞有司舉兵將以誅越臣安竊為陛下重之越方外之地􅗴髪文身之民􅗴古剪字不可以冠帶之國法度理也自三代之盛胡越不與受正朔與讀曰豫非彊不能服威弗能制也以為不居之地不牧之民不足以煩中國也故古者封内甸服封内謂封圻千里之内也甸服主治王田以供祭祀也封外侯服封外千里之外也侯候也王者斥堠侯衛賔服侯服之外又有衛服賔賔見於王也侯衛二服同為賔也蠻夷要服要以遥切言以文徳求之耳戎狄荒服此在九州之外者也荒言其荒忽絶逺來去無常者也逺近勢異也自漢初定已來七十二年呉越人相攻擊者不可勝數然天子未嘗舉兵而入其地也臣聞越非有城郭邑里也處谿谷之間篁竹之中竹田曰篁習於水鬪便於用舟地深昧而多水險中國之人不知其勢阻而入其地雖百不當其一得其地不可郡縣也攻之不可暴取也以地圖察其山川要塞相去不過寸數而間獨數百千里間中間也或八九百或千里也阻險林叢弗能盡著視之若易行之甚難天下頼宗廟之靈方内大寧戴白之老不見兵革民得夫婦相守父子相保陛下之德也越人名為藩臣貢酎之奉不輸大内言其國僻逺於宗廟之貢祭皆不與也大内都内也國家寳藏也治粟官属有都内令丞也一卒之用不給上事自相攻擊而陛下發兵救之是反以中國勞蠻夷也且越人愚戅輕薄負約反覆其不用天子之法度非一日之積也一不奉詔舉兵誅之臣恐後兵革無時得息也間者數年嵗比不登民待賣爵贅子以接衣食贅子者謂令子出就婦家為贅壻耳頼陛下德澤賑救之得毋轉死溝壑四年不登五年復蝗民生未復今發兵行數千里資衣糧入越地輿轎而踰嶺轎今竹輿車也言以轎過嶺耳拕舟而入水行數百千里夾以深林叢竹水道上下擊石林中多蝮蛇猛獸夏月暑時嘔泄霍亂之病相隨属也曽未施兵接刃死傷者必衆矣前時南海王反陛下先臣使將軍間忌將兵擊之先臣淮南厲王長間忌人姓名以其軍降處之上淦後復反㑹天暑多雨樓船卒水居擊櫂未戰而疾死者過半親老涕泣孤子謕號破家散業迎尸千里之外裹骸骨而歸悲哀之氣數年不息長老至今以為記曽未入其地而禍已至此矣臣聞軍旅之後必有㓙年言民之各以其愁苦之氣薄隂陽之和感天地之精而災氣為之生也陛下德配天地明象日月恩至禽獸澤及草木一人有饑寒不終其天年而死者為之悽愴於心今方内無狗吠之警而使陛下甲卒死亡暴露中原霑漬山谷邉境之民為之早閉晏開鼂朝字不及夕臣安竊為陛下重之不習南方地形者多以越為人衆兵彊能難邉城淮南全國之時多為邉吏全國謂未分為三之時也淮南人於邉為吏與越相境故知其地形臣竊聞之與中國異限以髙山人迹所絶車道不通天地所以隔外内也其入中國必下領水領水之山峭峻漂石破舟不可以大船載食糧下也越人欲為變必先繇餘干界中越邑今鄱陽縣也積食糧廼入伐材治船邉城守候誠謹越人有入伐材者輙收捕焚其積聚雖百越奈邉城何且越人緜力薄材緜弱也不能陸戰又無車騎弓弩之用然而不可入者以保地險而中國之人不能其水土也臣聞越甲卒不下數十萬所以入之五倍廼足輓車奉饟者不在其中饟亦餉也南方暑濕近夏癉熱癉黄病也暴露水居蝮蛇蠚毒也生疾疢多作兵未血刄而病死者什二三雖舉越國而虜之不足以償所亡臣聞道路言閩越王弟甲弑而殺之甲者閩王弟名甲巳誅死其民未有所属陛下若欲來内處之中國使重臣臨存施德垂賞以招致之此必攜㓜扶老以歸聖德若陛下無所用之則繼其絶世存其亡國建其王侯以為畜越畜養之也此必委質為藩臣世共貢職陛下以方寸之印丈二之組填撫方外組者印之綬不勞一卒不頓一㦸而威德並行今以兵入其地此必震恐以有司為欲屠㓕之也必雉兎逃入山林險阻如雉兎之逃竄而入山林險阻之中背而去之則復相羣聚留而守之歴嵗經年則士卒罷勌食糧乏絶男子不得耕稼樹種婦人不得紡績織絍丁壯從軍老弱轉餉居者無食行者無糧民苦兵事逃亡者必衆隨而誅之不可勝盡盗賊必起臣聞長老言秦之時嘗使尉屠睢擊越郡都尉姓屠名睢也又使監禄鑿渠通道監郡御史也名禄越人逃入深山林叢不可得攻留軍屯守空地曠日持乆士卒勞倦越乃出擊之秦兵大破廼發適戍以偹之當此之時外内騷動百姓靡敝靡散也音縻行者不還徃者莫反皆不聊生亡逃相從羣為盗賊於是山東之難始興此老子所謂師之所處荆棘生之者也兵者㐫事一方有急四面皆從臣恐變故之生奸邪之作繇此始也周易曰髙宗伐鬼方三年而克之鬼方小蠻夷髙宗殷之盛天子也以盛天子伐小蠻夷三年而後克言用兵不可不重也臣聞天子之兵有征而無戰言莫敢較也如使越人蒙死徼幸以逆執事之顔行顔行猶鴈行在前行故曰顔行胡郎切厮輿之卒有一不備而歸者雖得越王之首臣竊為大漢羞之陛下以四海為境九州為家八藪為囿江漢為池生民之属皆為臣妾人徒之衆足以奉千官之共租稅之收足以給乗輿之御而玩心神明秉執聖道負黼依依形如屏風而曲之畫以黼文張於牖間依讀曰扆也慿玉几南面而聽斷號令天下四海之内莫不嚮應陛下垂德惠以覆露之露謂使之霑潤澤也或露或覆言養育也使元元之民安生樂業則澤被萬世傳之子孫施之無窮天下之安猶泰山而四維之也夷狄之地何足以為一日之間而煩汗馬之勞乎詩云王猶允塞徐方既來言王道甚大而逺方懷之也臣聞之農夫勞而君子養焉愚者言而智者擇焉臣安幸得為陛下守藩以身為鄣蔽人臣之任也邉境有警愛身之死而不畢其愚非忠臣也安竊恐將吏之以十萬之師為一使之任也言漢發一使鎮撫之則越人賓服不煩兵徃是時漢兵遂出踰領適㑹閩越王弟餘善殺王以降漢兵罷帝嘉淮南之意劉向初名更生為諌議大夫給事中元帝初即位太傅蕭望之為前將軍少傅周堪為諸吏光禄大夫加官也百官公卿表云諸吏所加或列侯將軍卿大夫得舉不法也皆領尚書事甚見尊任更生年少於望之堪然二人重之薦更生宗室忠直明經有行擢為散騎宗正給事中與侍中金敞拾遺於左右四人同心輔政患苦外戚許史在位放縱而中書宦官𢎞恭石顯弄權望之堪更生議欲白罷退之未白而語泄遂為許史及恭顯所譛愬堪更生下獄及望之皆免官其春地震夏客星見昴卷舌間見於昴與卷舌之間也上感悟下詔賜望之爵關内侯奉朝請秋徵堪向欲以為諫大夫恭顯白皆為中郎冬地復震時恭顯許史子弟侍中諸曹皆側目於望之等更生懼焉乃使其外親上變事非常之事故謂之變也言竊聞故前將軍蕭望之等皆中正無私欲致大治忤於貴戚尚書忤猶逆也今道路人聞望之等復進以為且復見毁䜛必曰嘗有過之臣不宜復用是大不然言不宜用有過之臣者此議非也臣聞春秋地震為在位執政太盛也不為三獨夫動亦已明矣為蕭望之周堪及向獨夫猶言匹夫也且徃者髙皇帝時季布有罪至於夷滅後赦以為將軍髙后孝文間卒為名臣卒終也孝武帝時兒寛有重罪繫按道侯韓說諫曰說讀悦前吾丘夀王死陛下至今恨之恨悔也今殺寛後將復大恨矣上感其言遂貰寛貰謂緩恕其罪復用之位至御史大夫御史大夫未有及寛者也又董仲舒坐私為災異書主父偃取奏之下吏罪至不道幸蒙不誅復為太中大夫膠西相以老病免歸漢有所欲興常有詔問興謂改作憲章仲舒為世儒宗定議有益天下孝宣皇帝時夏侯勝坐誹謗繫獄三年免為庶人宣帝復用勝至長信少府太子太𫝊名敢直言天下羙之若乃羣臣多此比類難一二記有過之臣無負國家有益天下此四臣者足以觀矣前𢎞恭奏望之等獄决三月地大震恭移病出移病者移書言病一曰言以病移出不居官府後復視事天隂雨雪繇是言之地動殆為恭等殆近也臣愚以為宜退恭顯以章蔽善之罰章明也進望之等以通賢者之路如此太平之門開災異之原塞矣書奏㳟顯疑其更生所為白請考姦詐辭果服遂逮更生繫獄下太傅韋𤣥成諌大夫貢禹與廷尉雜考劾更生前為九卿坐與望之堪謀排車騎將軍高許史氏侍中者毁離親戚欲退去之而獨專權為臣不忠幸不伏誅復蒙恩徴用不悔前過而教令人言變事誣㒺不道更生坐免為庶人而望之亦坐使子上書白寃前事㳟顯白令詣獄置對置對者立其罪辭望之自殺天子甚悼恨之乃擢周堪為光禄勲堪弟子張猛光禄大夫給事中大見信任恭顯憚之數譛焉更生見堪猛在位㡬已得復進㡬讀曰冀懼其傾危乃上封事諌曰臣前幸得以骨肉備九卿奉法不謹乃復蒙恩竊見災異並起天地失常徴表為國徵證也欲終不言念忠臣雖在甽畆猶不忘君惓惓之義甽者田中之溝也甽音舌犬切惓惓忠謹之意况重以骨肉之親又加以舊恩未報乎欲竭愚誠又恐越職然惟二恩未報惟思也忠臣之義一抒愚意退就農畆死無所恨抒謂發泄之也臣聞舜命九官禹作司空棄后稷契司徒咎繇作士垂共工益朕虞伯夷祀宗廟夔典樂龍納言濟濟相讓和之至也衆賢和於朝則萬物和於野故簫韶九成鳳凰來儀擊石拊石百獸率舞韶舜樂名舉簫管之属示其偹也於韶樂九奏則鳳凰見其容儀擊鍾鳴磬而百獸相率來舞言感至和也四海之内靡不和寧及至周文開基西郊言文王始受命作周也雜遝衆賢罔不肅和崇推讓之風以銷分爭之訟文王既没周公思慕歌詠文王之徳其詩曰於穆清廟肅雍顯相濟濟多士秉文之徳周頌祀文王清廟之詩也於嘆辭穆肅敬也雍和也顯明相助也濟濟盛也言文王有清静之化敬而且和光明著見故濟濟之衆士皆執行文王之徳也於讀曰烏當此之時武王周公繼政朝臣和於内萬國驩於外故盡得其驩心以事其先祖其詩曰有來雍雍至止肅肅相維辟公天子穆穆周頌禘太祖之詩也相助也辟百辟也公諸侯也言有此賓客以和而來至止而敬者乃助王祭之人百辟與諸侯耳於是時天子則穆穆然也言四方皆以和來也諸侯和於下天應報於上故周頌曰降福穰穰此執競之篇祀武王之詩也穰穰多也又曰飴我釐麰此思文之篇以后稷配天之詩也飴遺也言天遺此物也飴讀與遺同釐麰麥也始自天降此皆以和致和獲天助也下至幽厲之際朝廷不和轉相非怨厲王夷王之子厲王生宣王宣王生幽王詩人疾而憂之曰民之無良相怨一方此小雅角弓之篇刺幽王之詩也良善也言人各為不善其意乖離而相怨也一方謂自守一方所向異之衆小在位而從邪議歙歙相是而背君子故其詩曰歙歙訿訿亦孔之哀謀之其臧則具是違謀之不臧則具是依此小雅小旻篇刺幽王之詩也言在位卿士歙歙然患其上訿訿然不供職各失臣節甚可哀痛謀之善者則背之不善之謀依而施用所以為刺也君子獨處守正不撓衆枉撓屈也不為衆曲而自屈也勉強以從王事則及見憎毒讒愬故其詩曰密勿從事不敢告勞無罪無辜讒口嗸嗸此小雅十月之交篇刺幽王之詩也宻勿黽勉從事也嗸嗸衆聲也言已黽勉行事不敢自陳勞苦已實無罪辜而被讒愬嗷嗷然也當是之時日月薄蝕而無光薄迫也謂被掩迫也其詩曰朔日辛卯日有蝕之亦孔之醜自此以下至百川沸騰皆十月之交詩也孔甚也醜惡也周之十月夏之八月朔日有辛卯日月交㑹而日見蝕隂侵於陽辛金日也卯木辰也以卯侵金則臣侵君故甚悪之又曰彼月而微此日而微今此下民亦孔之哀微虧㣲也言彼月者當有虧耳而今此日乃復徽也言君臣失道是為災異故今人哀也又曰日月鞠㐫不用其行四國無政不用其良鞠告也言日月不用其常行之道以告㐫災者繇四方之國無政理不能用善人也天變見於上地變動於下水泉沸騰山谷異處其詩曰百川沸騰山冡卒崩髙岸為谷深谷為陵哀今之人胡􅉃莫懲沸涌出也騰乘也冡山頂也卒盡也胡何也􅉃曾也懲艾也言百川沸涌而相乘陵山頂隆髙而盡摧壊陵谷易處尊卑失序災異大矣誠可畏懼哀哉今人何為曾莫創艾也霜降失節不以其時其詩曰正月繁霜我心憂傷民之訛言亦孔之將言民以是為非甚衆大也正月夏之四月正陽之月謂之正月繁多也訛偽也孔甚也將大也言王政乖舛陽月多霜害於生物故已心為憂傷而衆庻之人共為偽言以是為非排斥賢雋禍甚大也此皆不和賢不肖易位之所致也賢人在下不肖居上故云易位也自此之後天下大亂簒殺殃禍並作厲王奔彘厲王無道民不堪命乃與相畔襲厲王厲王出奔彘幽王見殺為犬戎所攻殺至乎平王末年魯隠之始即位也平王幽王之子周大夫祭伯乖離不和出奔於魯隠元年祭伯來穀梁𫝊曰奔也而春秋為諱不言來奔傷其禍殃自此始也是後尹氏世卿而専恣春秋公羊經隠公三年四月尹氏卒傳曰尹氏者何天子之大夫其稱尹氏何貶也曷為貶譏繼卿繼卿非禮也又詩小雅節南山云尹氏大師赫赫師尹不平謂何刺之也諸侯背畔而不朝周室卑微二百四十二年之間謂從隠公元年至哀公十四年獲麟也隠公十一年桓公十八年莊公三十二年閔公二年僖公二十三年文公十八年宣公十八年成公十八年襄公三十一年昭公三十二年定公十五年哀公十四年凡二百四十二年也日食三十六謂隱三年二月己巳桓三年七月壬辰朔十七年十月朔莊十八年三月二十五年六月辛未朔二十六年十二月癸亥朔三十年九月庚午朔僖五年九月戊申朔十二年三月庚午十五年五月文元年二月癸亥朔十五年六月辛丑朔宣八年七月甲子十年四月丙辰十七年六月癸卯成十六年六月丙寅朔十七年十二月丁巳朔襄十四年二月乙未朔十五年秋八月丁巳二十年冬十月丙辰朔二十一年九月庚戌朔冬十月庚辰朔二十三年二月癸酉朔二十四年秋七月甲子朔八月癸巳朔二十七年冬十二月乙亥朔昭七年夏四月甲辰朔十五年六月丁巳朔十七年夏六月甲戌朔二十一年秋七月壬午朔二十二年十二月癸酉朔二十四年夏五月乙未朔三十一年十二月辛亥朔定五年正月辛亥朔十二年十一月丙寅朔十五年八月庚辰朔凡三十六也地震五謂文九年九月癸酉襄十六年五月甲子昭十九年五月己卯二十三年八月乙未哀三年四月甲午凡五山陵崩阤二僖十四年八月辛卯沙鹿壊成五年夏梁山壞凡二也阤下頺彗星三見謂文十四年秋七月有星孛入于北斗昭十七年冬有星孛于大辰哀十三年冬十一月有星孛東方凡三見夜常星不見夜中星隕如雨一事在荘七年四月辛卯火災十四桓十四年秋八月壬申御廪災莊二十年夏齊大災僖二十年五月乙巳西宮災成三年二月甲子新宮災襄九年春宋災三十年五月甲午宋災昭九年夏四月陳災十八年夏五月壬午宋衞陳鄭災定二年夏五月壬辰雉門及兩觀災哀三年五月辛卯桓宫僖宫災四年六月辛丑亳社災凡十四長狄入三國謂春秋文十一年經書冬十月甲午叔孫得臣敗狄于鹹公羊傳曰狄者何長狄也兄弟三人一者之齊一者之魯一者之晉之齊榮如之魯喬如之晉焚如長狄鄋䐽之種五石隕墜六鷁退飛多麋有蜮蜚鸜鵒來巢者皆一見謂僖十六年正月戊申朔隕石于宋五是月六鷁退飛過宋都莊十七年冬多麋十八年秋有蜮二十九年秋有蜚昭二十五年夏有鸜鵒來巢蜮短尾狐也鷁水鳥也蜚負蠜也晝冥晦僖十五年九月己卯晦震夷伯之廟穀梁傳日晦也雨木氷事在成十六年正月雨木氷者氣著樹木結為氷也今俗呼為間樹雨李梅冬實七月霜降草木不死僖三十三年經書冬隕霜不殺草李梅實未知在何月也而此言李梅冬實又云七月降霜草木不死與今春秋不同未見義所出八月殺菽謂定公元年十月隕霜殺菽周之十月夏之八月菽謂豆也大雨雹事在僖二十九年秋及昭三年冬四年正月雨雪靁霆失序相乗隱九年三月癸酉大雨震電庚辰大雨雪莊六年冬十月雨雪僖十年冬大雨雪皆是也靁古雷字霆雷之急者也水旱饑蝝螽螟並起並起猶雜沓也謂桓元年秋大水十三年夏大水莊七年秋大水十一年秋宋大水二十四年秋大水二十五年秋大水宣十年秋大水成五年秋大水襄二十四年秋七月大水僖二十一年夏大旱宣七年秋大旱宣十年冬饑十五年冬蝝生饑襄二十四年冬大饑桓五年秋螽僖十五年八月螽文二年秋雨螽於宋八年冬螽宣六年八月螽十三年秋螽十五年秋螽襄七年八月螽哀十二年十二月螽十三年九月螽十二月螽隱五年九月螟八年九月螟莊六年秋螟皆是也螽即螟也蟲之食苖心者也螽音終螟音㝠也當是時禍亂輒應弑君三十六謂隱四年衞州吁弑其君完十一年羽父使賊弑公于寪氏桓二年宋督弑其君與夷七年曲沃伯誘晉小子侯殺之十七年鄭髙梁彌弑昭公莊八年齊無知弑其君諸兒十二年宋萬弑其君㨗十四年傅瑕弑其君鄭子三十二年共仲使圉人犖賊子般閔二年共仲使卜齮賊公于武闈僖十年晉克里弑其君卓二十四年晉弑懐公于高梁文元年楚世子商臣弑其君頵十四年齊公子商人弑其君舍十六年宋人弑其君杵臼十八年齊人弑其君商人魯襄仲殺子惡莒弑其君庶其宣二年晉趙盾弑其君夷臯四年鄭公子歸生弑其君夷十年陳夏徵舒弑其君平國成十八年晉弑其君州蒲襄七年鄭子驅使賊弑僖公二十五年齊崔杼弑其君光二十六年衛甯喜弑其君剽二十九年閽弑吳子餘祭三十年蔡世子般弑其君固三十一年莒人弑其君宻州昭元年楚公子圍問王疾縊而弑之十三年楚公子比弑其君䖍于乾谿十九年許世子止弑其君買二十七年吳弑其君僚定十三年薛弑其君比哀四年盗殺蔡侯申六年齊陳乞弑其君茶十年齊人弑悼公凡三十六亡國五十二謂桓五年州公如曹莊四年紀侯大去其國十年齊師㓕譚十三年齊人㓕遂十四年楚子滅息十六年楚滅鄧閔元年晉滅耿滅霍滅魏僖五年楚滅弦晉滅虢滅虞十二年楚人滅黄十七年楚滅項十九年秦人取梁二十五年衞侯毁滅邢二十六年楚人滅夔三十三年秦減滑文四年楚滅江五年楚人滅六十六年楚人秦人巴人㓕庸宣八年楚㓕舒蓼九年取根牟十二年楚子㓕蕭十五年晉師㓕赤狄潞氏成六年取鄟十七年楚㓕舒庸襄六年莒人㓕鄫齊侯㓕萊十年諸侯㓕偪陽十三年取邿二十五年楚㓕舒鳩昭四年楚子滅賴十二年晉滅肥十六年楚子取戎蠻氏十七年晉滅陸渾戎二十一年晉滅鼓三十年吴滅徐定公四年蔡滅沈五年楚滅唐六年鄭滅許十四年楚人滅頓十五年楚人滅胡哀八年宋滅曹又邾滅須句楚滅權晉滅焦楊楚滅道房申凡五十二諸侯奔走不得保其社稷者不可勝數也謂桓十五年鄭伯突出奔蔡襄十四年衛侯出奔齊昭三年北燕伯款出奔齊二十三年莒子庚輿來奔之類是也周室多禍晉敗其師於貿戎貿戎地名也公羊成元年秋王師敗績于貿戎傳曰孰敗之盖晉敗之也伐其郊郊周邑也昭二十三年正月經書晉人圍郊也鄭傷桓王王以諸侯伐鄭鄭伯禦之射王中肩事在桓五年秋戎執其使隠七年冬經書天王使凡伯来聘戎伐凡伯于楚丘以師衛侯朔召不往齊逆命而助朔春秋桓十六年書衛侯朔出奔齊穀梁傳曰天子召不往五大夫争權三君更立莫能正理周景王終單穆公劉文公鞏簡公甘平公召荘公五大夫相與争奪更立王子猛子朝及敬王是為三君也遂至陵夷不能復興陵夷謂卑替也繇此觀之和氣致祥乖氣致異祥多者其國安異衆者其國危天地之常經古今之通義也今陛下開三代之業招文學之士優㳺寛容使得並進今賢不肖渾淆言雜亂也白黑不分邪正雜糅忠䜛並進糅和也章交公車人滿北軍漢儀注中壘校尉主北軍壘門内尉一人主上書者獄上章於公車有不如法者以付北軍尉北軍尉以法治之也朝臣舛午繆戾乖刺言志不和各相違背也更相䜛愬轉相是非𫝊授增加文書紛糾前後錯繆毁譽渾亂言各任私情不得其實所以營惑耳目感移心意不可勝載言其誣罔天子也營謂回繞之分曹為黨徃徃羣朋曹輩也將同心以䧟正臣正臣進者治之表也正臣䧟者亂之機也乗治亂之機未知孰任而災異數見此臣所以寒心者也夫乗權藉勢之人子弟鱗集於朝言其相次如魚鱗羽翼隂附者衆輻湊於前輻湊言如車輻之歸于轂也毁譽將必用以終乖離之咎言纔佞之人毁譽得進則忠賢被斥日以乖離也是以日月無光雪霜夏隕海水沸出陵谷易處列星失行皆怨氣之所致也夫遵衰周之軌迹循詩人之所刺而欲以成太平致雅頌猶郤行而求及前人也初元以來六年矣按春秋六年之中災異未有稠如今者也稠多也夫有春秋之異無孔子之救猶不解紛况甚於春秋乎原其所以然者䜛邪並進也䜛邪之所以並進者繇上多疑心既已用賢人而行善政如或譛之則賢人退而善政還還謂収還也夫執狐疑之心者來䜛賊之口持不斷之意者開羣枉之門䜛邪進則衆賢退羣枉盛則正士消故易有否泰小人道長君子道消君子道消則政日亂故為否否者閉而亂也君子道長小人道消小人道消則政日治故為泰泰者通而治也詩又云雨雪瀌瀌見晛聿消此小雅角弓篇刺幽王好䜛佞之詩也瀌瀌盛也見無雲也晛日氣也聿辭也言雨雪之盛瀌瀌然至於無雲日氣始出而雨雪皆消釋矣喻小人雖多王若欲與善政則賢者升用而小人㓕矣與易同義昔者鯀共工驩兠與舜禹雜處堯朝鯀崇伯之名即檮杌也共工少皥氏之後即窮竒也驩兠帝鴻氏之後即渾敦也周公管蔡並居周位當是時迭進相毁迭互也流言相謗豈可勝道哉帝堯成王能賢舜禹周公而消共工管蔡故以大治榮華至今孔子與季孟偕仕於魯季孟謂季孫孟孫皆桓公之後代執國權而卑公室也李斯與叔孫俱宦於秦叔孫者叔孫通也定公始皇賢季孟李斯而消孔子叔孫故以大亂汚辱至今故治亂榮辱之端在所信任信任既賢在於堅固而不移詩云我心匪石不可轉也此弼栢舟之詩也言石性雖堅尚有可移轉已志貞確執徳不傾過於石也言守善篤也易曰渙汗其大號此易渙卦九五爻也言王者渙然大發號令如汗之出也言號令如汗汗出而不反者也今出善令未能踰時而反是反汗也踰時三月也用賢未能三旬而退是轉石也論語曰見不善如探湯論語載孔子之言探湯言其除難無所避也今二府奏佞讇不當在位歴年而不去二府丞相御史也讇古謟字故出令則如反汗用賢則如轉石去佞則如㧞山如此望隂陽之調不亦難乎是以羣小窺見間隙縁餙文字巧言醜詆詆毁也流言飛文譁於民間譁諠也故詩云憂心悄悄愠於羣小此弼栢舟言仁而不遇之詩悄悄憂貎愠怒也小人成羣誠足愠也昔孔子與顔淵子貢更相稱譽不為朋黨事俱見論語禹稷臯陶𫝊相汲引不為比周事具尚書舜典何則忠於為國無邪心也故賢人在上位則引其類而聚之於朝易曰飛龍在天大人造也乾卦九五象辭言聖王正位臨馭萬方則賢人君子皆來朝也在下位則思與其類俱進易曰㧞茅連茹以其彚征吉彚類也茹牽引也茅喻君有潔白之徳臣下引其類而仕之此泰卦初九爻征行也在上則引其類在下則推其類故湯用伊尹不仁者逺而衆賢至類相致也今佞邪與賢臣並在交㦸之内合黨共謀違善依惡歙歙訿訿數設危險之言欲以傾移主上如忽然而用之此天地之所以先戒災異之所以重至也自古明聖未有無誅而治者也故舜有四放之罰流共工於幽州放驩兠於崇山竄三苖於三危殛鯀於羽山而孔子有兩觀之誅少正卯姦人之䧺孔子攝司㓂七日誅之於兩觀之下兩觀謂闕也然後聖化可得而行也今以陛下明知誠深思天地之心迹察兩觀之誅尋其心迹而察之覽否泰之卦觀雨雪之詩厯周唐之所進以為法原秦魯之所消以為戒厯謂厯觀之原謂思其本考祥應之福省災異之禍以揆當世之變省視也揆度也放逺佞邪之黨壞散險詖之聚險言曰陂杜閉羣枉之門廣開衆正之路杜塞也决斷狐疑分别猶豫使是非炳然可知則百異消㓕而衆祥並致太平之基萬世之利也臣幸得託肺附舊解云肺附謂肝肺相附著猶言心膂也一説肺謂斫木之肺札也自言於帝室猶肺札附于大材木也誠見隂陽不調不敢不通所聞竊推春秋災異以救今事一二條其所以以繇也不宜宣泄臣謹重封昧死上㳟顯見其書愈與許史比而怨更生等成帝即位顯等伏辜更生乃復進用更名向時帝元舅陽平侯王鳯秉政倚太后專國權數有大異向見尚書洪範箕子為武王陳五行隂陽休咎之應休羙也向乃集合上古以來歴春秋六國至秦漢符瑞災異之記推迹行事連傳禍福著其占驗比類相從各有條目凢一十篇號曰洪範五行傳論奏之天子心知向忠精故為鳯兄弟起此論也然終不能奪王氏權乆之營起昌陵數年不成復還歸延陵制度泰奢向上疏諌曰臣聞易曰安不忘危存不忘亡是以身安而國家可保也易下繫之辭故聖賢之君博觀終始窮極事情而是非分明王者必通三統二王之後與巳為三統天地人之始也一曰天統謂周十一月建子為正天始施之端也二曰地統言殷以十二月建丑為正地始化之端也三曰人統言夏以十三月建寅為正人始成之端也言王者象地天人之三統故有三代也明天命所授者博非獨一姓也孔子論詩至於殷士膚敏裸將于京此大雅文王篇殷士卿士也膚美也敏疾也裸灌鬯將行也京周京也言殷之臣有美徳而敏疾乃來助祭于周行裸鬯之事是天命無常歸于有徳也喟然嘆曰喟然嘆息大哉天命善不可不傳於子孫是以富貴無常不如是則王公其何以戒慎民萌何以勸勉萌與甿同無知之貎蓋傷㣲子之事周而痛殷之亡也雖有堯舜之聖不能化丹朱之子雖有禹湯之徳不能訓末孫之桀紂自古及今未有不亡之國也昔髙皇帝既滅秦將都雒陽感悟劉敬之言自以徳不及周而賢於秦遂徙都關中依周之徳因秦之阻世之長短以徳為效效謂徴驗也故常戰栗不敢諱亡孔子所謂富貴無常蓋謂此也孝文皇帝居覇陵北臨厠厠近水也覇陵山北頭厠近覇水帝登其上以逺望也意悽愴悲懷顧謂羣臣曰嗟乎以北山石為椁用紵絮斮陳漆其間斮斬也陳施也斮絮以漆著其間也美石出京師北紵今宜州石是也故云以北山石為椁紵絮者可以衣絮也斮而陳其間又從而漆之也豈可動哉張釋之進曰使其中有可欲雖錮南山猶有隙使其中無可欲雖無石椁又何戚焉有可欲謂多藏金玉而厚葬之人皆欲取之是有間隙也無可欲謂不寘器偹而薄葬人而無欲攻掘取之故無憂戚也錮謂鑄塞也云錮南山者取其深大假喻夫死者無終極而國家有廢興故釋之之言為無窮計也孝文寤焉遂薄葬不起山墳易曰古之葬者厚衣之以薪藏之中野不封不樹厚衣之以薪言積薪以覆之也不封謂不聚土為墳也不樹不種後世聖人易之以棺椁棺椁之作自黄帝始黄帝𦵏於橋山在上郡陽周縣堯葬濟隂丘壠皆小葬具甚微丘壠冡也舜葬蒼梧二妃不從二妃堯之二女禹葬㑹稽不改其列不改樹木百物之列也殷湯無葬處謂不見傳記也文武周公葬于畢畢陌在長安北四十里也秦穆公葬於雍槖泉宫祈年館下樗里子葬於武庫樗里子秦惠王異母弟也樗里子且死曰葬我必於渭南章臺東後百年當有天子宮夾我墓及漢興長樂宫在其東未央宮在其西武庫正直其上也皆無丘壠之處此聖帝明王賢君智士逺覽獨慮無窮之計也其賢臣孝子承命順意而薄葬之此誠奉安君父忠孝之至也夫周公武王弟也葬兄甚㣲孔子葬母於防防魯邑名也穪古墓而不墳墓謂壙穴也墳謂積土也曰丘東西南北之人也不可不識也東西南北言周逰以行其道不得専在本邦故墓須表識為四尺墳遇雨而摧弟子修之以告孔子孔子流涕曰吾聞之古者不修墓蓋非之也事見禮記延陵季子適齊而反其子死於嬴博之間二邑並在太山其子死於其間穿不及泉歛以時服封墳掩坎其髙可隠謂人立可隠肘也而號曰號謂哭而且言也骨肉歸復於土命也魂氣則無不之也夫嬴博去吳千有餘里季子不歸葬孔子徃觀曰延陵季子於禮合矣事見禮記故仲尼孝子而延陵慈父舜禹忠臣周公弟弟弟弟者言能順理也其葬君親骨肉皆微薄矣非茍為儉誠便於體也宋桓司馬為石槨仲尼曰不如速朽宋桓魋為石槨奢泰故激此言秦相吕不韋集知略之士而造春秋亦言薄葬之義皆明於事情者也逮至吳王闔閭違禮厚葬十有餘年越人發之及秦惠文武昭嚴襄五王嚴襄者謂莊襄始皇父也皆大作丘壠多其瘞藏瘞埋咸盡發掘暴露甚足悲也秦始皇帝葬於驪山之阿阿謂山曲也下錮三泉上崇山墳其髙五十餘丈周囘五里有餘石槨為㳺館多累石作槨於壙穴中以為離宫别館也人膏為燈燭水銀為江海黄金為鳬鴈珍寳之藏機械之變作機發木人之属盡其巧變也始輒皇本紀令匠作機弩矢有所穿近射之又言工匠為機咸皆知之已下閉羡門皆殺工匠也椁棺之麗宫館之盛不可勝原言不能盡其本數又多殺宫人生薶工匠計以萬數天下苦其役而反之驪山之作未成而周章百萬之師至其下矣周章陳勝之將項籍焚其宫室營宇徃者咸見發掘言至其墓所者掘之而求財物其後牧兒亡羊羊入其鑿鑿謂所穿冡藏也牧者持火炤求羊失火燒其藏椁自古至今葬未有盛如始皇也數年之間外被項籍之災内罹牧竪之禍罹遭也豈不哀哉是故德彌厚者葬彌薄知愈深者葬愈㣲無德寡知其葬愈厚丘壠彌髙宫廟甚麗發掘必速繇是觀之明暗之效葬之吉㐫昭然可見矣周德既衰而奢侈宣王賢而中興更為儉宫室小寢廟詩人美之斯干之詩是也詩小雅篇名美宣王考室其首章曰秩秩斯干秩秩流行也干澗也喻宣王之徳如澗水源秩秩流出無極已也上章道宫室之如制下章言子孫之衆多也宫室如制謂殖殖其庭有覺其楹君子攸寧也子孫衆多謂維熊維羆男子之祥維虺維蛇女子之祥也及魯嚴公即莊公也刻飾宗廟多築臺囿後嗣再絶謂子般閔公皆殺死也春秋刺焉周宣如彼而昌魯秦如此而絶是則奢儉之得失也陛下即位躬親節儉始營初陵其制約小天下莫不稱賢明及徙昌陵增埤為髙埤下也積土為山發民墳墓積以萬數營起邑居期日廹卒卒讀曰猝功費大萬大萬億也大巨也死者恨於下生者愁於上怨氣感動隂陽因之饑饉物故流離以十萬數物故謂死也流離謂亡其居處臣甚惽焉惽謂不了言惑于此事也惽音昬一古惛古閔字憂病也以死者為有知發人之墓其害多矣若其無知又安用大安焉也謀之賢知則不説以示衆庻則苦之説讀曰悦其下亦同若茍以説愚夫滛侈之人又何為哉陛下仁慈篤美甚厚聰明疏達蓋世宜𢎞漢家之德崇劉氏之美光昭五帝三王而顧與暴秦亂君競為奢侈比方丘壠顧猶反也説愚夫之目隆一時之觀違賢知之心亡萬世之安臣竊為陛下羞之唯陛下上覽明聖黄帝堯舜禹湯文武周公仲尼之制下觀賢知穆公延陵樗里張釋之之意孝文皇帝去墳薄葬以儉安神可以為則秦昭始皇増山厚藏以侈生害足以為戒初陵之橅宜從公卿大臣之議橅音規摹之摹謂規度墓地也其字從木以息衆庶書奏上甚感向言而不能從其計向睹俗彌奢滛而趙衛之属起微賤踰禮制趙皇后昭儀衞媫好也向以為王教繇内及外自近者始故採取詩書所載賢妃貞婦興國顯家可法則及孽嬖亂亡者孽庶也嬖愛也序次為列女傳凡八篇以戒天子及採傳記行事著新序説苑凡五十篇奏之數上疏言得失陳法戒書數十上以助觀覽補遺闕帝雖不能盡用然内嘉其言常嗟嘆之時帝無繼嗣政繇王氏出災異浸甚浸猶漸也向雅竒陳湯智謀與相親友獨謂湯曰災異如此而外家日盛其漸必危劉氏吾幸得同姓末属累世蒙漢厚恩身為宗室遺老厯事三主上以我先帝舊臣每進見常加優禮吾而不言孰當言者向遂上封事極諫曰臣聞人君莫不欲安然而常危莫不欲存然而常亡失御臣之術也夫大臣操權柄持國政操執也未有不為害者也昔晉有六卿齊有田崔衛有孫寗魯有季孟常掌國事世執朝柄終後田氏取齊六卿分晉崔杼弑其君光孫林父寗殖出其君衎弑其君剽季氏八佾舞於庭三家者以雍徹並專國政卒逐昭公周大夫尹氏筦朝事濁亂王室子朝子猛更立連年乃定故經曰王室亂又曰尹氏殺王子克甚之也言其惡大甚也春秋舉成敗録禍福如此類甚衆皆隂盛而陽微下失臣道之所致也故書曰臣之有作威作福害於而家㓙於而國也而汝也孔子曰禄去公室政逮大夫危亡之兆秦昭王舅穰侯及涇陽葉陽君穰侯魏冉也涇陽葉陽皆其弟也專國擅勢上假太后之威三人者權重於昭王家富於秦國國甚危殆賴寤范雎之言而秦復存二世委任趙髙專權自恣壅蔽大臣終有閻樂望夷之禍二世齋於望夷之宫閻樂以兵殺之秦遂以亡近事不逺即漢所代也漢興諸吕無道擅相尊王吕産吕禄席太后之寵據將相之位席猶因言若人之坐於席兼南北軍之衆擁梁趙王之尊驕盈無厭欲危劉氏賴忠正大臣絳侯朱虛侯等竭誠盡節以誅滅之然後劉氏復安今王氏一姓乘朱輪華轂者三十三人青紫貂蟬充盈幄内魚鱗左右言在帝之左右相次若魚鱗也大將軍秉事用權五侯驕奢僣盛並作威福擊斷自恣行汙而寄治身私而託公寄託也内為汙私之行而外託治公之道也依東宫之尊假甥舅之親以為威重東宫太后所居也尚書九卿州牧郡守皆出其門言為僚吏者皆居顯要之職筦執樞機朋黨比周稱譽者登進忤恨者誅傷㳺設者助之説執政者為之言排擯宗室孤弱公族其有智能者尤非毁而不進逺絶宗室之任不令得給事朝省恐其與已分權數稱燕王蓋主以疑上心示宗室親近而反逆也避諱吕霍而弗肯稱吕后霍后二家皆坐擅僣誅滅故為王后諱而不言也内有管蔡之萌外假周公之論兄弟㨿重宗族盤互盤結而交互也厯上古至秦漢外戚僣貴未有如王氏者也雖周皇甫秦穰侯漢武安吕霍上官之属皆不及也皇甫周卿士字也周后寵之故處於盛位權黨於朝詩人刺之武安侯田蚡也物盛必有非常之變先見為其人徵象孝昭帝時冠石立於泰山冠山下有石自立三石為足一石在上故曰冠石仆柳起於上林其抑已死僵仆於地而更起生而孝宣帝即位今王氏先祖墳墓在濟南者其梓柱生枝葉扶疎上出屋根垂地中雖立石起栁無以過此之明也事勢不兩大王氏與劉氏亦且不並立如下有泰山之安則上有累卵之危陛下為人子孫守持宗廟而令國祚移於外親降為皂𨽻縱不為身奈宗廟何婦人内夫家外父母家此亦非皇太后之福也孝宣皇帝不與舅平昌樂昌侯權所以全安之也夫明者起福於無形銷患於未然宜發明詔吐德音援近宗室親而納信援引也黜逺外戚毋授以政皆罷令就第以則效先帝之所行厚安外戚全其宗族誠東宫之意外家之福也王氏永存保其爵禄劉氏長安不失社稷所以褒睦外内之姓子子孫孫無疆之計也如不行此策田氏復見於今六卿必起於漢為後嗣憂昭昭甚明不可不深圖不可不蚤慮易曰君不宻則失臣臣不宻則失身㡬事不宻則害成唯陛下深留聖思審固㡬宻覽徃事之戒以折中取信居萬安之實用保宗廟乆承皇太后言社稷不安帝身亦不得久事皇太后也天下幸甚書奏天子召見向歎息悲傷其意謂曰君且休矣吾將思之且令出外休息以向為中壘校尉元延中星孛東井蜀岷山崩雍江向惡此異懷不能已復上奏曰臣聞帝舜戒伯禹毋若丹朱傲周公戒成王毋若殷王紂詩曰殷監不逺在夏后之世亦言湯以桀為戒也聖帝明王常以敗亂自戒不諱廢興故臣敢極陳其愚惟陛下留神察焉謹按春秋二百四十二年日蝕三十六襄公尤數率三歳五月有竒而一食竒謂成數之餘不滿者也漢興訖竟寧孝景帝尤數率三歳一月而一食臣向前數言日當食今連三年比食比頻也自建始以來二十歳間而八食率二歳六月而一發古今罕有異有大小希稠占有舒疾緩急而聖人所以斷疑也易曰觀乎天文以察時變昔孔子對魯哀公並言夏桀殷紂暴虐天下故厯失則攝提失方孟陬無紀攝提星名也隨斗柄建十二月厯不正則失其所建首時為孟正月為陬也此皆易姓之變也秦始皇之末至二世時日月薄食山陵淪亡辰星出於四孟四時之孟月也當兄四仲也太白經天而行太白隂星出東當伏東出西當伏西過午為經天也無雲而雷雷當託雲猶君之託臣也二世不恤天下人有叛心象獨號令而無臣也枉矢夜光流星也其射如矢蛇行不正故曰枉矢流以亂伐亂熒惑襲月熒惑主内亂月主刑故趙髙殺二世也㜸火燒宫㜸災也野禽戲庭野烏入處主人將去都門内壞長人見臨洮石隕于東郡星孛大角大角以亡流星犯大角大角因伏不見觀孔子之言考暴秦之異天命信可畏也及項籍之敗亦孛大角漢之入秦五星聚于東井得天下之象也孝惠時有雨血日食於衝滅光星見之異日月行交道之衝也孝昭時有泰山卧石自立上林僵柳復起大星如月西行衆星隨之此為特異孝宣興起之表天狗夾漢而西流星也墮地為天狗皆妖星久隂不雨者二十餘日昌邑不終之異皆著于漢紀觀秦漢之易世覧惠昭之無後察昌邑之不終視孝宣之紹起天之去就豈不昭昭然哉髙宗成王亦有雊雉㧞木之變能思其故故髙宗有百年之福成王有復風之報神明之應應若影響世所同聞也臣幸得託末屬誠見陛下寛明之徳兾銷大異而興髙宗成王之聲以崇劉氏故豤豤數奸死亡之誅今日食尤屢星孛東井攝提炎及紫宫有識長老莫不震動此變之大者也其事難一一記故易曰書不盡言言不盡意是以設卦指爻而復說義書曰伻來以圖伻使也使人以圖來示成王明口説不了指圖乃了也天文難以相曉臣雖圖上猶須口説然後可知願賜清燕之閒指圖陳狀帝輙入之謂召入也然終不能用也向每召見數言公族者國之枝葉枝葉落則本根無所庇廕方今同姓疏逺毋黨専政禄去公室權在外家非所以彊漢宗卑私門保守社稷安固後嗣也向自見得信於帝故常顯訟宗室譏刺王氏及在位大臣其言多痛切發於至誠劉輔河間宗室也成帝時擢為諫大夫帝欲立趙媫妤為皇后先下詔封媫妤父臨為列侯輔上書言臣聞天之所與必先賜以符瑞天之所違必先降以災變此神明之徴應自然之占驗也昔武王周公承順天地以饗魚烏之瑞謂伐紂有白魚赤烏之瑞也然猶君臣祗懼動色相戒况於季世不蒙繼嗣之福屢受威怒之異者乎雖夙夜自責改過易行畏天命念祖業妙選有德之世考卜窈窕之女窈窕幽閑也以承宗廟順神祗心塞天下望塞滿也子孫之祥猶恐晩暮今廼觸情縱欲傾於卑賤之女欲以母天下上不畏於天下不媿於人惑莫大焉里語曰腐木不可以為柱卑人不可以為主天人之所不予必有禍而無福市道皆共知之市道市中之道也朝廷莫肯一言臣竊傷心自念得以同姓㧞擢尸禄不忠汚辱諌争之官不敢不盡死惟陛下深察書奏帝使侍御史收繫掖庭秘獄減死罪一等論為鬼薪册府元龜卷二百八十七
