body:
  text: 册府元龜卷七百三十二宋王欽若等撰陪臣部智識古人有言曰智者心之符又曰識洞機先則知智識之爲用也德必有鄰道無不在奉國之主當爲政之先經濟之有成故動静而無爽言以見志可威强敵之兵默以成謀乃挫鄰國之勢至於立功遂事出言有章爲當時之規範埀後世之鑒戒信爲覇者之佐焉士蔿晉大夫也莊公二十七年晉侯將伐虢士蔿曰不可虢公驕若驟得勝於我必棄其民棄民不養之無衆而後伐之欲禦我誰與夫禮樂慈愛衆所畜也夫民譲事樂和愛親哀䘮而後可用也止之使民以義譲不可哀樂爲本言力彊虢弗畜也亟戰將饑言虢而不畜譲而力戰荀息晉大夫也晉獻公欲伐虢荀息曰君何不以屈產之乘埀棘之璧而借道乎虞也屈邑產駿馬垂棘出良璧公曰此晉國之寳也如受吾幣而不借吾道則如之何荀息曰此小國之所以事大國也此謂璧馬之屬彼不借吾道必不敢受吾幣如受吾幣而借吾道則是我取之中府而藏之外府取之中廐而置之外廐也公曰宮之奇存焉宮之奇虞之賢大夫必不使受也荀息曰宮之奇之爲人也達心而懦懦弱又少長於君達心則其言略明達之人言則舉綱領要不言提其耳則愚者不悟懦則不能彊諌少長於君則君輕之且夫玩好在耳目之前而患在一國之後此中知以上乃能慮之臣料虞君中知以下也公遂借道而伐虢宮之奇諫曰晉國之使者其辭卑而幣重必不便於虞虞公弗聽遂受其幣而借之道宫之奇諫曰語曰唇亡則齒寒其斯之謂歟語諺言也挈其妻子以奔曹獻公亡虢五年而後舉虞荀息牽馬操璧而前曰璧則猶是也而馬齒加長矣郄叔虎晉大夫也晉獻公田見翟祖之氛田獵名祖國名氛灾氣凶象也凶曰氛吉曰祥歸寢不寐欲伐翟祖寐瞑也郄叔虎朝公語之語以寢不寐郄叔父晉大夫郤芮之父郤豹對曰床第之不安邪笫簀抑驪姬之不在側邪公辭焉出遇士蔿曰今夕君寢不寐必爲翟祖君意在翟祖夫翟祖之君好專利而不忌忌難也其臣競謟以求媚其進者壅塞其臣競諂故進者則壅塞其上使不聞過也其退者距違其退去者則距違其君其上貪以忍忍爲不義也其下偷以幸偷茍也幸是徼倖有縱君而無諫臣縱放也有冒上而無忠下冒怯冒言貪以是處國不亦難乎君若伐之可克也吾不言子必言之不言譲其上士蔿以告公說乃伐翟祖史蘇晉大夫獻公卜伐驪戎史蘇占之曰勝而不吉公曰何謂也遇兆挾以衘骨齒牙爲猾遇見也挾㑹也骨所以鯁刺人猾㺯也齒牙謂兆端左右亹坼有似齒牙中有從畫故曰衘骨骨在口中齒牙弄之以象讒口之爲害也禮卜師作龜大夫占色史占墨戎夏交捽兆有二畫外象戎内象諸夏夏謂晉也兆端㑹齒牙有似捽交對也交捽是交勝也臣故云且懼有口擕人國移公焉公曰何口之有口在寡人寡人弗受誰敢興之對曰茍可以擕其人也必甘逞而不知胡可壅也公不聼遂伐驪戎尅之獲驪姬以歸有寵立爲夫人公飲大夫酒令司正實爵與史蘇曰飲而無肴夫驪之役女曰勝而不吉故賞女以爵罰女以無肴克國得妃其有吉孰大焉史蘇卒爵再拜稽首曰兆之有臣不敢蔽蔽兆之紀失臣之官有二罪焉何以事君大罰將及不惟無肴抑君亦樂其吉而備其凶凶之無有備之何害若其有之備之爲瘳臣之不信國之福也何敢憚罰飲酒出史蘇告大夫曰有男戎必有女戎若晉以男戎勝戎而戎亦必以女戎勝晋其若之何里克曰何如史蘇曰昔夏桀伐有施氏有施人以妹喜女焉妹喜有寵於是乎與伊尹比而亡夏殷辛伐有蘇氏有蘇氏以妲己女焉妲己有寵於是乎與膠鬲比而亡殷周幽王伐有褒人有褒人以褒姒女焉褒姒有寵生伯服於是乎與虢叔甫比逐太子宜臼而立伯服太子出奔申申人繒人召西戎以伐周周於是乎亡今晉寡德而安俘女又増其寵雖當三季之王不亦可乎且其兆云挾以衘骨齒牙爲猾我卜伐驪龜徃離散以應我夫若是賊之兆也非吾宅也離則有之不跨其國可謂挾乎不得其君能衘骨乎若跨其國而得其君雖逢齒牙以猾其中誰云弗從諸夏從戎非敗而何從政者不可以不戒亡無日矣郭偃曰夫三季王之亡也宜民之主也縱惑不疚肆侈不違流志而行無所不疚是以其亡而不獲追鑒今晉國之方偏侯也其土又小大國在側雖欲縱惑未獲專也且夫口三五之門也是以讒口之辭不過三五且大家隣國將師保之多而驟立不其集亡雖驟立不過五矣夫挾小鯁也可以小戕而不能䘮國當之者戕焉於晋何害雖謂之挾而猾以齒牙口弗堪也其與㡬何晋國懼則甚矣亡猶未也商之衰也其銘有之曰嗛嗛之德不足就也不可以矜而祗取憂也嗛嗛之食不足狃也不能爲膏而祗離舍也雖驪之亂其離咎而已其何服吾聞之以亂得聚者非謀不卒時非人不免難非禮不終年非義不盡齒非德不及世非天不離數今不據其安不可謂能謀行之以齒牙不可謂得人廢國而向己不可謂禮不度而過求不可謂義以寵賈怨不可謂德少族而多敵不可謂天吾觀君夫人也若爲亂其猶𨽻農也雖獲沃田而勤易之將弗克饗爲人而己士蔿曰戒莫如豫豫而後給夫子戒之抑二大夫之言其皆有焉既而驪姬不克晉正於秦五立而後平正者爲秦所輔正謂以兵納惠公文公殺呂郄之属也五立謂奚齊卓子惠公懷公至文公乃平里克晉大夫驪姬生奚齊其娣生卓子公將黜太子申生而立奚齊里克丕鄭荀息相見里克曰夫史蘇之言將及矣其若之何荀息曰吾聞事君者竭力以役事不聞違命君立臣從何貳之有丕鄭曰吾聞事君者從其義不阿其惑也惑則誤民民誤失德是棄民也民之有君以治義也義以生利利以豐民若之何其民之與處而棄之也必立太子里克曰我不佞雖不識義亦不阿惑吾其静也獻公使太子伐東山里克諌曰君行太子居以監國也君行太子從以撫軍也今君居太子行未有此也公曰非子之所知也寡人聞之立太子之道三身鈞以年年同以愛愛疑决之以卜筮子無謀吾父子之間吾以此觀之公不說里克退見太子太子曰君賜我以偏衣金玦何也里克曰孺子懼乎衣躬之偏而握金玦令不偷矣孺子何懼夫爲人子者懼不孝不懼不得立且吾聞之敬賢於請孺子勉之乎君子曰善處父子之間矣卜偃晉大夫也僖公二十三年晉懷公殺狐突偃稱疾不出曰周書有之乃大明服周書康誥言君能大明則民服己則不明而殺人以逞不亦難乎民不見德而惟戮是聞其何後之有舅犯晉大夫也與公子重耳同奔重耳自翟適齊過五鹿乞食於野人野人舉塊以與之公子怒將鞭之子犯曰天賜也民以土服又何求焉天事必象十有二年必獲此土二三子志之嵗在壽星及鶉尾其有此土乎天以命矣復於壽星必獲諸侯天之道也由是始之有此其以戊申乎所以申土也再拜稽首受而載之獻公之䘮秦穆公使人弔重耳獻公殺其世子申生重耳辟難出奔是時在翟就弔之且曰寡人聞之亡國恒於斯得國恒於斯言在䘮代之際雖吾子儼然在憂服之中䘮亦不可乆也時亦不可失也孺子其圖之勸其反國意欲納之䘮謂亡失位孺稺也以告舅犯舅犯重耳之舅犯偃也字子犯舅犯曰孺子其辭焉䘮人無寳仁親以爲寳寳謂善道可守者仁親親行仁義父死之謂何又因以為利欲反國求爲後是利父死而天下其孰能說之孺子其辭焉說謂解也公子重耳對客曰君惠弔亡臣重耳身䘮父死不得與於哭泣之哀以爲君憂謝之父死之謂何或敢有他志以辱君義稽顙而不拜哭而起起而不私他志謂私心子顯以致命於穆公使者公子縶也盧氏云古者名字相配顯當作韅穆公曰仁夫公子重耳夫稽顙而不拜則未爲後也故不成拜哭而起則愛父也起而不私則逺利也里克殺奚齊卓子丕鄭使屠岸夷告公子重耳於翟曰國亂民擾得國在亂治民在擾子盍入乎吾請爲子鉥重耳告舅犯曰里克欲納我舅犯曰不可夫堅樹在始始不固本終必槁落夫長國者唯知哀樂喜怒之節是以導民不哀䘮而求國難因亂以入殆以䘮得國則必樂䘮樂䘮必哀生因亂以入則必喜亂喜亂必怠德是哀樂喜怒之節易也何以導民民不我導誰長重耳曰非䘮誰代我非亂誰納我舅犯曰偃也聞之䘮亂有小大大䘮大亂之剡也不可犯也父母死爲大䘮讒在兄弟爲大亂今適當之是故難公子重耳出見使者曰子惠顧亡人重耳父生不得供備洒掃之臣死又不敢蒞䘮以重其罪且辱大夫敢辭夫固國者在親衆而善鄰在因民而順之茍衆所利鄰國所立大夫其從之重耳不敢違重耳在翟十二年狐偃曰自吾來此也非以翟爲榮可以成事也吾日奔而易達因而有資資以擇利可以戾也今戾乆矣戾乆將底底著滯淫誰能興之盍速行乎吾不適齊楚避其遠也蓄力一紀可以遠矣齊侯長矣而欲親晉管仲沒矣多讒在側謀而無正𠂻而思始夫必追擇前言求善以終饜邇逐逺逺人入服不爲郵矣㑹其季年可也兹可以親皆以爲然乃行又僖公二十七年楚子及諸侯圍宋宋公孫固如晉告急公孫固莊公孫先軫曰報施救患取威定覇於是乎在矣先軫晉下軍之佐原軫也報宋贈馬之施狐偃曰楚始得曹而新昏於衛若伐曹衛楚必救之則齊宋免矣又云楚圍宋宋復告急晉文公欲救宋則攻楚爲楚嘗有德不欲伐也欲釋宋宋又嘗有德於晉晉患之先軫曰執曹伯分曹衛地以與宋楚急曹衛其勢宜釋宋於是文公從之而楚成王乃引兵歸胥臣晉大夫也文公問于胥臣曰吾欲使陽䖏父傅讙也而教誨之其能善之乎對曰是在讙也蘧除不可使俯戚施不可使仰僬僥不可使舉侏儒不可使援矇瞍不可使視嚚瘖不可使言聾瞶不可使聽童昏不可使謀質將善而賢良贊之則濟可竢也若有違質教將不入其何善之爲臣聞昔者太任娠文王不變少溲于豕牢而文王不加病焉文王在母不憂在傅弗懃處師弗煩事王不怒敬友二虢而惠慈二蔡刑于太姒比于諸弟詩云刑于寡妻至于兄弟以御于家邦于是乎用四方之賢良及其即位也詢于八虞而咨于二虢度于閎天而謀於南宮諏于蔡原而訪於辛尹重之以周召畢榮億寧百神而和柔萬民故詩曰惠于宗公神罔時恫若是則文王非專教誨之力也公曰然則教無益乎對曰胡爲文益其質故人生而學非學不入公曰奈夫八疾何對曰官師之所材也戚施直鎛蘧蒢蒙璆侏儒扶盧矇瞍修聲聾瞶司火僮昏嚚瘖僬僥官師之所不材也以實裔土夫教者因體能質而利之者也若川然有原以卬浦而後大卬迎也言川己有原因開利迎之以浦後能大也原軫晉大夫僖公三十三年初秦使孟明西乞白乙襲鄭不克而還原軫曰秦違蹇叔而以貪勤民天奉我也奉不可失敵不可縱縱敵患生違天不祥必伐秦師欒枝曰未報秦施而伐其師其爲死君乎言以君死故忘秦施先軫曰秦不哀吾䘮而伐吾同姓秦則無禮何施之爲言秦以無禮加已施不足顧吾聞之一日縱敵數世之患也謀及子孫可謂死君乎言不可謂背君遂發命敗秦師趙衰晉大夫也文公二年秦孟明視敗於彭衙秦伯猶用孟明孟明増修國政重施於民趙成子言於諸大夫曰成子趙衰秦師又至將必辟之懼而増德不可當也詩曰毋念爾祖聿修厥德詩大雅言念其祖考則宜述修其德以顯之毋念念也孟明念之矣念德不怠其可敵乎荀林父晉大夫也文公七年晉襄子卒靈公少趙孟使先蔑迎公子雍於秦穆嬴日抱太子以啼于朝趙孟患之乃背先蔑立靈公而敗秦師先蔑奔秦士㑹從之先蔑之使也荀林父止之曰夫人太子猶在而外求君此必不行子以疾辭若何不然將及禍將及己攝卿以徃可也何必子同官爲寮吾嘗同寮敢不盡心乎弗聼爲賊板之三章板詩大雅其三章義取蒭蕘之言猶不可忽况同寮乎僖二十八年林父將中行先蔑將左行又弗聽及亡荀伯盡送其孥及其器用財賄於秦曰爲同寮故也中行桓子晉大夫也赤狄伐晉圍懷及邢邱邢邱今河西平臯縣晉侯欲伐之中行桓子曰使疾其民驕則數戰爲民使疾以盈其貫將可殪也殪盡也貫猶習也周書曰殪戎殷周書康誥也義取周武王以兵伐殷盡滅之此類之謂也荀首晉大夫楚圍鄭晉救鄭及河聞鄭楚平晉荀林父欲還士㑹曰善先縠曰不可以中軍佐濟知莊子曰此師殆哉莊子荀首周易有之在師坎下坤上師之臨兊下坤上臨師初六變而之臨曰師出以律否臧凶此師卦初六爻辭律法否不也執事順成爲臧逆爲否今彘子逆命不順故應否臧之凶衆散爲弱坎爲衆今變爲兊兊柔弱川壅爲澤坎爲川今變爲兊兊爲澤是川見壅有律以如己也如從也法行則人從法法敗則法從人坎爲法象今爲衆則散爲川則壅是失法之用從人之象故曰律否臧且律竭也竭敗也坎變爲兊是法敗盈而以竭夭且不整所以凶也水過天塞不得整流則竭涸也不行之謂臨水變爲澤乃成臨卦澤不行之物有帥而不從臨孰甚焉此之謂矣譬彘子之違命亦不可行果遇必敗遇敵必敗彘子尸之主此禍雖免而歸必有大咎晉師果敗明年晉殺先縠伯宗晉大夫也宣公十五年楚子圍宋宋使樂嬰齊告急于晉晉侯欲救之伯宗曰古人有言曰雖鞭之長不及馬腹言非所當擊天方授楚未可與争雖晉之强能違天乎諺曰髙下在心度時制宜川澤納汙山藪藏疾山之有林藪毒害者居之瑾瑜匿瑕言雖美玉之質亦或居藏瑕穢國君含垢忍垢恥天之道也晋侯恥不救宋故伯宗說小惡不損大德之喻君其待之待楚衰乃止又晉侯將伐潞諸大夫皆曰不可鄷舒有三雋才鄷舒潞相雋絶異也言有才藝勝人者三不如待後之人伯宗曰必伐之狄有五罪雋才雖多何補焉不祀一也嗜酒二也棄仲章而奪黎民地三也仲章潞賢人也黎民黎侯國上黨壺關縣有黎亭虐我伯姬四也傷其君目五也怙其雋才而不以茂德兹益罪也後之人將敬奉德義以事神人而申其固命審其政令若之何待之不討有罪曰將待後後有辭而討焉毋乃不可乎夫恃才與衆亡之道也商紂繇之故滅繇用也天反時爲灾寒暑易節地反物爲妖羣物失性民反德爲亂亂則妖灾生故文反正爲乏文字反其正字即爲乏字伐果克之又與夏陽說衛孫良夫寗相鄭人伊雒之戎陸渾蠻氏侵宋夏陽說晋大夫蠻氏戎别種也河南新城縣東南有蠻城經唯書孫良夫獨衛吉也以其辭㑹也師于鍼衛人不保不守備說欲襲衞曰雖不可入多俘而歸有罪不及死伯宗曰不可衞唯信晉故師其在郊而不設備若襲之是棄信也雖多衞俘而晉無信何以求諸侯乃止師還衛人登陴又梁山崩晉侯以傳召伯宗傳驛也伯宗辭重曰辟傳重載之軰重人曰待我不如㨗之速也㨗邪出也問其所曰絳人也問絳事焉曰梁山崩將召伯宗謀之問將若之何曰山有朽壤而崩可若何國主山川主謂所主祭故山崩川竭君爲之不舉去盛饌降服捐盛服乘縵車無文徹樂息音聲出次舍於郊祝幣陳圭帛史辭自罪責以禮焉禮山川其如此而已雖伯宗若之何伯宗請見之見之於晋君不可不肯見遂以告而從之從重人言范武子晉大夫也郄獻子聘于齊齊頃公使婦人觀而笑之郄獻子怒歸請伐齊范武子退自朝謂其子曰爕乎吾聞之千人之怒必獲毒焉夫郄子之怒甚矣不逞於齊必發諸晉國不得政何以逞怒余將致政焉以成其怒無易内以外也爾勉從二三子以承君命唯敬乃老乃告老范文子晉大夫也秦晉爲成將㑹于令狐晉侯先至焉秦伯不肯渉河次于王城使史顆盟晉侯于河東史顆秦大夫晉郄犫盟秦伯于河西記盟二城范文子曰是盟也何益齊盟所以質信也齊一心質成也㑹所以信之始也始之不從其可質乎秦伯歸而背晋成晉人執魯季文子魯使叔聲伯請于晉文子謂欒武子曰季孫於魯相二君矣二君宣成妾不衣帛馬不食粟可不謂忠乎信讒慝而棄忠良若諸侯何子叔嬰齊奉君命無私不受郄犫清邑謀國家不貳謂四日不食以堅事晉圖其身不忘其君辭邑不食皆先君而後身若虚其請是棄善人也子其圖之乃許魯平赦季孫又鄢陵之役晉伐鄭荆救之欒武子將上軍范文子將下軍欒武子將戰范文子不欲曰吾聞之惟厚德者能受多福無德而服者衆必自傷也今我戰又勝荆與鄭吾君將伐智而多力怠教而重歛大其私暱而益婦人用戰若勝亂地之秩者也其產將害大盍姑無戰乎武子曰昔韓之役惠公不復舍邲之役三軍不振旅箕之役先軫不復命晉國固有大恥三今我任晉國之政不損晉恥又以違蠻夷重之雖有後患非吾所知也范文子曰擇福莫若重擇禍莫若輕福無所用輕禍無所用重晉國固有大恥與其君臣不相聽以爲諸侯笑也盍姑以違蠻夷爲恥乎欒武子不聽遂與荆人戰於鄢陵大勝之於是乎君伐智而多力怠教而重歛大其私暱殺三郄而尸諸朝納其室而分婦人於是乎國人弗蠲遂弑諸翼𦵏之翼東門之外以車一乘厲公之所以死者唯無德而功烈多服者衆也一說鄢陵之役晉伐鄭荆救之大夫欲死戰范文子不欲曰吾聞君人者刑其民成而後振武於外是以内和而外威今吾司寇之刀鋸日弊而斧鉞不行也内猶不刑而况外乎夫戰刑也刑之過也過由大而怨由細故以惠誅怨以忍去過細無怨而大不過而後可以武刑外之不服者今吾刑外乎大夫而忍於小民將誰行武武不行而勝幸也幸以爲政必有内憂且惟聖人能無外患又無内憂詎非聖人必偏而後可偏而在外猶可救也疾自中起是難盍姑釋荆與鄭以爲外患乎釋置也又厲公將伐鄭范文子不欲曰若以吾意諸侯皆畔則晉可爲也唯有諸侯故擾擾焉凡諸侯難之本也得鄭憂滋長安用鄭郄至曰然則王者多憂乎文子曰我王者之功也乎哉夫王者成其德而遠人以其方賄歸之故無憂今我寡德而求王者之功故多憂子見無土而欲富者樂乎哉無土求富厲公敗荆師於鄢將歸范文子立於戎馬之前曰君幼弱諸臣不佞吾何福以及此吾聞天道無親惟德是授晋且以勸荆乎君與二三臣其戒也夫德福之基也無德而福隆猶無基而厚墉也其壞也無日矣又厲公敗荆於鄢而反范文子謂其宗祝曰君驕泰而有烈夫以德勝者猶懼失之而况驕泰乎君多私令以勝歸私必昭昭私難必作吾恐及焉凡吾宗祝謂我析死先難爲免七年夏范文子卒冬難作始於三郄卒及於公范宣子晉大夫也㐮公五年楚子囊為令尹公子貞范宣子曰我䘮陳矣楚人討貳而立子囊必改行改子辛所行而疾討陳疾急也陳近於楚民朝夕急能無徃乎有陳非吾事也無之而後可言晋力不能及陳故七年陳侯逃歸也韓獻子晉大夫也成公十五年楚子侵鄭及暴隧隧侵衞及首止鄭子罕侵楚取新石新石楚邑晉欒武子欲報楚韓獻子曰無庸庸用也使重其罪民將叛之背盟數戰罪也無民孰戰遂止又楚子重救彭城伐宋使偏師與鄭人侵宋子重爲後鎮宋華元如晉告急韓獻子爲政於是欒書卒韓厥代將中軍曰欲求得人必先勤之勤恤其急成覇安强自宋始矣晉侯師於台谷以救宋台谷地闕遇楚師於靡角之谷楚師還畏晋强也靡角宋地又楚司馬何忌魯襄公三年侵陳四年春楚師爲陳叛故猶在繁陽前年何忌之師侵陳猶未還繁陽楚地在汝南鮦陽縣南韓獻子患之言於朝曰文王帥殷之叛國以事紂唯知時也時未可争今我易之難哉晋力未能服楚受陳爲非時中行獻子晉大夫也諸侯伐鄭鄭人恐乃行成與晋成也中行獻子曰遂圍之以待楚人之救也而與之戰不然無成獻子荀偃也恐楚救鄭鄭復属之知武子曰許之盟而還師以敝楚人敝罷也吾三分四軍分四軍爲三部與諸侯之鋭以逆來者來者楚也於我未病楚不能矣晋各一動而楚三來故曰不能猶愈於戰勝聚戰暴骨以逞不可以争言争當以謀不可以暴骨大勞未艾君子勞心小人勞力先王之制也艾息也言當從勞心之勞諸侯皆不欲戰乃許鄭成又襄公十四年衞侯出奔衞人立公孫剽晉侯問衛故於中行獻子問衞逐君當討否對曰不如因而定之衞有君矣謂剽己立伐之未可以得志而勤諸侯史佚有言曰因重而撫之重不可移就撫安之仲虺有言曰亡者侮之亂者取之推亡固存國之道也仲虺湯左相君其定衞以待時乎待其昏亂之時乃伐之冬㑹于戚謀定位也謀定立剽荀罃晉大夫也哀公十年宋公享晉侯于楚邱請以桑林桑林殷天子之樂名荀罃辭辭譲之荀偃士匄曰諸侯宋魯於是觀禮宋王者後魯以周公故皆用天子禮樂故可觀魯有禘樂賓祭用之禘三年大祭則作四代之樂別祭羣公則用諸侯之樂宋以桑林享君不亦可乎言其天子樂也舞師題以旌夏師帥也旌夏大旌也題識也以大旌表識其行列晉侯懼而退入于房旌夏非常卒見之人心偶有所畏去旌卒享而還及著雍疾晉侯疾也著雍晋地卜桑林見祟見於卜兆荀偃士匄欲奔請禱焉奔走還宋禱荀罃不可曰我辭禮矣彼則以之以用也猶有鬼神於彼加之言自當加罪于宋韓宣子晉大夫襄公二十七年初宋向戍善於趙文子又善於令尹子木欲弭諸侯之兵以爲名欲獲息民之名如晉告趙孟趙孟謀於諸大夫韓宣子曰兵民之殘也財用之蠧蠧害物之蟲小國之大菑也將或弭之雖曰不可必將許之言雖知兵不得乆弭今不可不許弗許楚將許之以召諸侯則我失爲盟主矣晋人許之如楚楚亦許之如齊齊人難之陳文子曰晉楚許之我焉得已且人曰弭兵而我弗許則固擕吾民矣將焉用之齊人許之告秦秦亦許之皆告於小國爲㑹於宋叔向晉大夫也襄公二十一年諸侯㑹於商任齊侯衛侯不敬叔向曰二君者必不免㑹朝禮之經也禮政之輿也政身之守也怠禮失政失政不立是以亂也又宋向戍如晉請弭諸侯之兵爲㑹於宋楚人𠂻甲趙孟患楚𠂻甲以告叔向叔向曰何害也匹夫一爲不信猶不可單斃其死單盡也斃踣也若合諸侯之卿以爲不信必不㨗矣食言者不病不病者單斃於死非子之患也楚食言當死晋不食言故無患夫以信召人而以僣濟之濟成也必莫之與也安能害我且吾因宋以守病爲楚所病則欲入宋城則夫能致死與宋致死雖倍楚可也宋爲地主致死助我則力可倍楚子何懼焉又不及是曰弭兵以召諸侯而稱兵以害我稱舉也吾庸多矣非所患也晋獨取信故其功多宋之盟弭兵之盟楚人固請先㰱叔向謂趙文子曰夫覇王之勢在德不在先㰱子若能以忠信質君而禆諸侯之闕㰱雖後諸侯將載之何争於先若違於德而以賄成事今雖先諸侯將棄之何欲以先昔成王盟諸侯於岐陽楚爲荆蠻置茅蕝設望表與鮮牟守燎故不與盟置立也蕝束茅而立所以縮酒也望祭山川立木爲表其位也鮮牟東夷國也今將與狎主諸侯之盟唯有德也子務德無争先務德所以服楚也乃先楚人譲使楚先又昭公五年韓宣子如楚逆女叔向爲介鄭子皮子太叔勞諸索氏河南成臯縣東有大索城太叔謂叔向曰楚王汰侈己甚子其戒之叔向曰汰侈己甚身之灾也焉能及人若奉吾幣帛慎吾威儀守之以信行之以禮敬始而思終終無不復事皆可復行從而不失儀敬而不失威道之以訓辭奉之以舊法考之以先王以先王之禮成其好度之以二國度晋楚之勢雖汰侈若我何及楚楚子朝其大夫將以韓宣子爲閽叔向爲司宮薳啓疆曰不可乃厚爲其禮又昭十三年諸侯㑹于平丘晉侯使叔向告劉獻公獻公王卿士劉子曰抑齊人不盟若之何對曰盟以底信底致也君茍有信諸侯不貳何患焉告之以文辭董之以武師雖齊不許君庸多矣董督也庸功也討之有辭故功多也天子之老請帥王賦元戎十乘以先啓行天子大夫稱老元戎戎車在前者啓開也行道也遲速惟君欲佐晋討齊叔向告於齊曰諸侯求盟己在此矣今君弗利寡君以爲請對曰諸侯討貳則有尋盟若皆用命何盟之尋托用命以拒叔向曰國家之敗有事而無業事則不經業貢賦之業有業而無禮經則不序行禮而有次序有禮而無威序則不共禮湏威嚴而後共有威而不昭共則不明威湏昭告神明而後信義著不明棄共百事不終所繇傾覆也信義不明則棄威不威棄禮無禮無威無經無業故百事不成是故明王之制使諸侯嵗聘以志業志識也嵗聘以修其職業間朝以講禮二年而一朝正班爵之義率長幼之序再朝而㑹以示威六年而一㑹以訓土下之則制財用之節再㑹而盟以顯昭明十二年而一盟所以昭信義也凡八聘四朝再㑹王一廵狩盟于方嶽之下志業於好䀻也講禮於等朝也示威於衆㑹也昭明於神盟也自古以來未之或失也存亡之道常繇是興晉禮主盟依先王先公舊禮主諸侯盟懼有不治奉承齊犧齊盟之犧牲而布諸君求終事也終竟也君曰余必廢之何齊之有唯君圖之寡君聞命矣齊人懼對曰小國言之大國制之敢不聼從既聞命矣敬共以徃遲速惟君叔向曰諸侯有間矣間隙也不可以不示衆八月辛未治兵習戰建而不斾建立旌旗不曵其斾斾游也壬申復斾之諸侯畏之軍將戰則斾故曵斾以恐之昭公十五年荀躒如周塟穆后籍談爲介既塟除䘮以文伯宴樽以魯壺且求彛器籍談歸以告叔向叔向曰王其不終乎吾聞之所樂必卒焉今王樂憂若卒以憂不可謂終王一嵗而有三年之䘮二焉天子絶期惟服三年故后雖期通謂之三年䘮於是乎以䘮賓宴又求彛器樂憂甚矣且非禮也彛器之來嘉功之繇非繇䘮也三年之䘮雖貴遂服禮也王雖弗遂宴樂以早亦非禮也言今雖不能遂服猶當静嘿而便宴樂又失禮也禮王之大經也一動而失二禮無大經矣失二禮謂既不遂服又設宴樂言以考典考成也典以志經忘經而多言舉典將焉用之昭公十三年楚靈王之弑也子干自晉歸楚人立爲君韓宣子問於叔向曰子干其濟乎對曰難宣子曰同惡相求如市賈焉何難宣子謂棄疾親恃子干共同好惡故言如市賈同利以相求對曰無與同好誰與同惡言棄疾不與子干同好則亦不得同惡取國有五難有寵而無人一也寵湏賢人而固有人而無主二也雖有賢人當湏内主爲應有主而無謀三也謀策謀也有謀而無民四也衆有民而無德五也四者既備當以德成子干在晉十二年矣晉楚之從不聞達者可謂無人晉楚之士從子干游皆非達人族盡親叛可謂無主無親族在楚無釁而動可謂無謀召子干時楚未有大釁爲羈終世可謂無民終身羈客在晋楚是謂無民亡無愛徵可謂無德楚人無愛念之者王虐而不忌靈王暴虐無所畏忌將自亡楚君子干渉五難以弑舊君誰能濟之言楚借君子干以弑靈王終無能成有楚國者其棄疾乎君陳蔡城外属焉城方城也時穿封戍既死棄疾并領陳事苛慝不作盜賊伏隠私欲不違不以私欲違民事民無怨心先神命之先神謂羣望國民信之芈姓有亂必季實立楚之常也獲神一也當璧拜有民二也民信之令德三也無苛慝寵貴四也貴妃子居常五也棄疾季有五利以去五難誰能害之子干之官則右尹也數其貴寵則庶子也以神所命則又遠之其貴亡矣位不尊其寵棄矣父既殁故民無懷焉非令德國無與焉無内主將何以立宣子曰齊桓晉文不亦是乎皆言賤對曰齊桓衞姬之子也有寵於僖衛姬齊僖公有鮑叔牙賓須無隰朋以爲輔佐有莒衞以爲外主齊桓出奔莒衞有舅氏之助有國髙以爲内主國氏髙氏齊上卿從善如流言其疾也下善齊肅齊嚴也肅敬也不藏賄清也不從欲儉也施舍不倦施舍猶言布恩德求善不厭是以有國不亦宜乎我先君文公狐季姬之子也有寵於獻好學而不貳言篤志生十七年有士五人狐偃趙衰顚頡魏武子司空季子五士從出有先大夫子餘子犯以爲腹心子餘趙衰子犯狐偃有魏犫賈佗以爲股肱魏犫魏武子也稱五人而説四士賈佗又不在本數内盖叔向所賢有齊宋秦楚以爲外主齊妻以女宋贈以馬楚王享之秦伯納之有欒郤狐先以爲内主謂欒枝卻縠狐突先軫也亡十九年守志彌篤惠懷棄民惠公懷公不恤民也民從而與之獻無異親民無異望獻公之子六人惟文公在天方相晉將何以代文此二君者異於子干共有寵子國有奥主謂棄疾也無施於民無援於外去晉而不送歸楚而不逆何以冀國言子干所以蒙弑君之名棄疾所以得國又昭公十一年周單子歸韓宣子于戚單子單成公視下言徐叔向曰單子其將死乎朝有著定著定朝内列位常處謂之表著㑹有表野㑹設表以爲位衣有襘𢃄有結襘領㑹結𢃄結也㑹朝之言必聞於表著之位所以昭事序也視不過結襘之中所以道容貌也言以命之容貌以明之失則有闕今單子爲王官伯而命事於㑹視不登帯言不過歩貌不道容而言不昭矣不道不共不昭不從貌正曰容言順曰從無守氣矣爲此年冬單子卒起本又叔向見司馬侯之子撫而泣之曰自其父之死吾蔑與北面而事君矣昔者其父始之我終之我始之夫子終之無不可者籍偃在側曰君子有比乎叔向曰君子比而不别比德以贊事比也引黨以封己利己而忘君别也又楚令尹享趙孟事畢趙孟謂叔向曰令尹自以爲王矣何如問將能成否對曰王弱令尹彊其可哉言可成雖可不終趙孟曰何故對曰强以克弱而安之彊不義也安於勝君是彊而不義不義而彊其斃必速詩曰赫赫宗周褒姒滅之彊不義也詩小雅褒姒周幽王后幽王惑焉而行不義是以滅之令尹爲王必求諸侯晉少懦矣懦弱也諸侯將徃若獲諸侯其虐滋甚滋益也民弗堪也將何以終夫以彊取取不以道不義而克必以爲道以不義爲道道以虐淫弗可乆也矣女叔侯晉大夫也襄二十九年晉侯使司馬女叔侯來魯治杞田使魯歸前侵杞田所歸少故不書弗盡歸也晉悼夫人慍曰齊也取貨夫人平公母杞女也謂叔侯取貨於魯故不盡歸杞田先君若有知也不尚取之不尚叔侯之取貨公告叔侯叔侯曰虞虢焦滑霍楊韓魏皆姬姓也八國皆晉所滅焦在陜縣楊属平陽縣晉是以大若非侵小將何所取武獻以下兼國多矣武公獻公晋始盛之君誰得治之杞夏餘也而即東夷行夷禮魯周公之後也而睦於晉以杞封魯猶可而何有焉何有盡歸魯之於晉也職貢不乏玩好時至公卿大夫相繼於朝史不絶書書魯之朝聘府無虚月無月不受朝貢如是可矣何必瘠魯以肥杞且先君而有知也毋寧夫人而焉用老臣先君毋寕怪夫人之所爲毋用責我士文伯晉大夫魯昭公六年三月鄭人鑄刑書士文伯曰火見鄭其火乎火心星也周五月昏見火未出而作火以鑄刑器刑器鼎也藏争辟焉火如象之不火何爲象類也同氣相求火未出而用火相感以致灾六月丙戍鄭灾終文伯之言祁午晉大夫也昭公元年諸侯盟於虢祁午謂趙文子曰宋之盟楚人得志於晉得志謂先㰱午祁奚子今令尹之不信諸侯之所聞也子弗戒懼又如宋恐楚復得志子木之信稱於諸侯猶詐晉而駕焉駕猶陵也詐謂衷甲况不信之尤者乎尤甚也楚重得志於晉晉之恥也子相晉國以爲盟主於今七年矣㐮二十五年始爲政以春言故云七年再合諸侯㐮二十五年㑹夷儀二十六年㑹澶淵三合大夫㐮二十七年㑹於宋三十年㑹澶淵及二㑹虢也服齊狄寧東夏㐮二十八年齊侯白狄朝晋平秦亂㐮二十九年秦晋爲成城淳于㐮二十九年城杞之淳于杞遷都師徒不頓國家不罷民無謗讟讟誹也諸侯無怨天無大灾子之力也有令名矣而終之以耻午也是懼吾子其不可以不戒文子曰武受賜矣受午言然宋之盟子木有禍人之心武有仁人之心是楚所以駕於晉也今武猶是心也楚又行僭僭不信非所害也武將信以爲本循而行之譬如農夫是穮是蓘穮耘也壅苗爲蓘雖有饑饉必有豐年言耕耘不以水旱息必獲豐年之収也且吾聞之能信不爲人下吾未能也自恐未能信詩曰不僭不賊鮮不爲則信也詩大雅僭不信賊害人也能爲人則者不爲人下矣吾不能是難楚不爲患史趙晉大夫也昭公八年楚師滅陳晉侯問於史趙曰陳其遂亡乎對曰未也公曰何故對曰陳顓頊之族也陳祖舜舜出顓頊嵗在鶉火是以卒滅陳將如之顓頊氏以嵗在鶉火而滅火盛而水滅也今在析木之津猶將復繇箕斗之間有天漢故謂之析木之津繇用也且陳氏得政于齊而後陳卒亡物莫能兩盛自幕至于瞽瞍無違命幕舜之先瞽瞍舜父從幕至瞽瞍間無違天命廢絶者舜重之以明德寘德於遂遂舜後盖殷興存舜之後而封遂言舜德乃至于後遂世守之及胡公不淫故周賜之姓使祀虞帝胡公滿遂之後也事周武王賜姓曰嬀封諸陳繼舜後臣聞盛德必百世祀虞之世數未也繼守將在齊其兆既存矣後陳滅而陳完之後復代齊荀吳晉大夫也昭公十一年楚師在蔡荀吳謂韓宣子曰不能救蔡物以無親物事也晉之不能亦可知也己為盟主而不恤亡國將焉用之遂救蔡晉侯以齊侯宴中行穆子相穆子荀吳投壺晉侯先穆子曰有酒如淮有肉如坻淮水名坻山名寡君中此爲諸侯師中之齊侯舉矢曰有酒如澠有肉如陵澠水出齊國臨淄縣北入時水陵大阜也寡人中此與君代興代更也亦中之伯瑕謂穆子曰伯瑕士文伯曰子失辭吾固師諸侯矣壺何為焉其以中雋也言投壺中不足爲雋異齊君弱吾君歸弗來矣欲與晋君代興是弱之穆子曰吾軍師彊禦卒乘競勸今猶古也齊將何事言晋德不衰於古齊不事晋將無所事公孫傁趨進曰日旰君勤可以出矣以齊侯出傁齊大夫傳言晋之衰司馬寅晉大夫也初哀公十三年魯哀公㑹單平公晉定公吳夫差于潢池吳晉争先争㰱血先後吳人曰於周室我爲長吳爲太伯後故爲長晉人曰於姬姓我爲伯爲侯伯趙鞅呼司馬寅曰日旰矣旰晚也大事未成二臣之罪也大事盟也二臣鞅與寅建鼔整列二臣死之長幼必可知也對曰請姑視之反曰肉食者無墨墨黒色下也肉食之人氣色下今吳王有墨國勝乎國爲敵所勝太子死乎且夷德輕不忍乆請少待之少待無與争乃先晋人盟不書諸侯恥之故士鞅晉大夫也定公八年趙鞅言於晉侯曰諸侯惟宋事晋好逆其使猶懼不至今又執之是絕諸侯也將歸樂祁士鞅曰三年止之無故而歸之宋必叛晋執樂祁在六年獻子私謂子梁曰獻子范鞅子梁樂祁寡君懼不得事宋君是以止子子姑使溷代子溷樂祁子子梁以告陳寅陳寅曰宋將叛晉是棄溷也不如待之留待勿以子自代樂祁歸卒于大行大行晉東南山士鞅曰宋必叛不如止其尸以求成焉乃止諸州州晋地訾祐范宣子家臣也范宣子與龢大夫争田乆而無成宣子欲攻之問於伯華伯華曰外有軍内有事赤也外事也不敢侵官且吾子之心有出焉可徵訊也問於孫林父林父曰魯人所以事子也惟事是待問於張老張老曰老也以軍事承子非戎則非吾所知也問於祈奚祈奚曰公族之不恭公室之有囘内事之邪大夫之取是吾罪也若以軍官從子之私懼子之應且憎也問於籍偃籍偃曰偃也以斧鉞從於張孟日聽命焉若夫子之命也何二之有釋夫子而舉是反吾子也問於叔魚叔魚曰待吾爲子戮之叔向聞之范宣子曰聞子與龢未寧徧問於大夫又無决盍訪之於訾祐訾祐質直而博直能端辯之博能上下比之且吾子之家老也吾聞國家有大事必順於典刑而訪咨於耉老而後行之宣子問於訾祐訾祐對曰昔隰叔子違周難於晋國生子輿爲貪理以正於朝朝無姦官爲司空以正於國國無敗績世及武子佐文襄爲諸侯諸侯無二心後之人可則是以受隨范及文子成晋荆之盟豐兄弟之國今吾子嗣位於朝無姦行於國無邪民無四方之患無内外之憂頼三子之功而享其䘵位今既無事矣而非龢於是加寵將何治爲宣子說乃益龢田而與之和訾祐死范宣子謂獻子曰鞅乎昔者吾有訾祐也吾朝夕顧焉以相晉國且爲吾家今吾觀女也專則不能謀則無與也將若之何對曰鞅也居處恭不敢安易敬學而好仁和於政而好其道謀於衆不以賈好和志雖𠂻不取謂是也必長者之繇宣子曰可以免耳趙簡子晉大夫也昭二十五年諸侯㑹於黄父簡子令諸侯之大夫輸王粟具戍人曰明年將納王宋樂大心曰我不輸粟我於周爲客二王後爲賓客若之何使客晉士伯曰自踐土以來踐土在僖二十八年宋何役之不㑹而何盟之不同曰同恤王室子焉得辟之子奉君命以㑹大事而宋背盟無乃不可乎右師不敢對受牒而退右師樂大心士伯告簡子曰宋右師必亡奉君命以使而欲背盟以干盟主無不祥大焉言不善無大於此者定十年宋樂大心出奔又簡子有兩白驪而甚愛之陽城胥渠疾陽城姓胥渠名疾猶病廣門之官夜欵門而謁曰主君之臣胥渠有疾廣門邑之官小臣欵叩趙簡子門簡子晋大夫稱主君醫教曰得白驪之肝病則止止愈也不得則死謁者入董安于御于側慍曰譆胥渠胥渠也欺吾君請即刑焉安于簡子家臣也慍怒也即刑請就胥渠而刑之簡子曰夫殺人以活畜不仁乎殺畜以活人不亦仁乎於是召庖人殺白驪取其肝以予陽城胥渠處無幾何病愈趙興兵而攻習廣門之官左七百人右七百人皆先登而獲甲首衣甲者之首也傅傁晉趙簡子屬也晋趙鞅與鄭師戰鄭師大敗獲齊粟干車趙孟喜曰可矣傅傁曰雖克鄭猶有知在憂未艾也言知氏將爲難後竟有晉陽之患趙襄子晉大夫也智伯攻趙襄子趙襄子出曰吾何走乎從者曰長子近且城厚完襄子曰罷民力以困之又斃死以守之其誰與我從者曰邯鄲之倉庫實襄子曰浚民之膏澤以實之又因而殺之其誰與我其晉陽乎先主之所屬也尹鐸之所寛也民必和矣乃走晉陽晉師圍而灌之沉竈產蛙民無畔意趙㐮子攻翟而勝之尤人終人尤人終人翟之二邑也使者來謁之襄子方將食而有憂色左右曰一朝而兩城下此人之所喜也今君有憂色何也襄子曰江河之大也不過三日三日而滅也飄風暴雨日中不須臾言其不能終日今趙氏之德行無所積今一朝兩城下亡及其我乎孔子聞之曰趙氏其昌乎夫憂所以爲昌也而喜所以爲亡也勝非其所難者也賢主以此持勝故其福及後世絺疵晉大夫也初智伯從韓魏兵以攻趙圍晉陽而水之城下不沉者三版絺疵謂智伯曰韓魏之君必反矣智伯曰何以知之絺疵曰以其事知之夫從韓魏之君而攻趙趙亡難必及韓魏矣今約勝趙而三分其地今城不浸者三版臼竈生鼃人馬相食城降有日而韓魏之君無喜志而有憂色是非反如何明日智伯以告韓魏之君曰疵言君之且反也韓魏之君曰夫勝趙而三分其地城今且將㧞矣夫二家雖愚不棄美利於首背信盟之約而爲危難不可成之事其勢可見也是疵爲趙計矣使君疑二主之心而解於攻趙也今君聽謂臣之言而離二主之交爲君惜之趨而出絺疵謂智伯曰君又何以疵言吿韓魏之君爲智伯曰子安知之對曰韓魏之君視疵端而趨疾絺疵知其言之不聽請使於齊智伯遣之韓魏之君果反矣册府元龜卷七百三十二
