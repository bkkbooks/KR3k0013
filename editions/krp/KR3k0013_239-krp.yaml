body:
  text: 册府元龜卷二百三十九宋王欽若等撰列國君部政令任賢有禮政令書曰徳惟善政政在養民則千乘之君五等之制忠為令徳而夾輔王室道在濟時而寛明政理至於興利除害務財訓農救災患而振滯淹薄賦歛而省徭役懲惡以勸善繼好以息民作周孚先為諸侯率不亦美哉周初封康叔于衛周公旦懼康叔齒少乃申告康叔曰必求殷之賢人君子長者問其先殷所以興所以亡而務愛民告以紂所以亡者以淫酗於酒之失婦人是用故紂之亂自此始為梓材示君子可法則故謂之康誥酒誥梓材以命之康叔之國既以此命能和集其民民大説魯公伯禽之初受封之魯三年而後報政周公周公曰何遲也伯禽曰變其俗革其禮喪三年然後除之故遲太公亦封於齊五月而報政周公周公曰何疾也曰吾簡其君臣禮從其俗為也後聞伯禽報政遲乃歎曰嗚呼魯後世其北面事齊矣夫政不簡不易民不有近平易近民民乃歸之徐廣曰一本云政不簡不行不行不樂不樂則不平易平易近民民必歸之又一本云夫民不簡不易有近乎簡易民必歸之衛武公即位脩康叔之政百姓和集齊桓公既得管仲與鮑叔隰朋髙傒脩齊國政連五家之兵國語曰管仲制國五家為軌十軌為里四里為連十連為鄉以為軍令設輕重魚鹽之利以贍貧窮禄賢能齊人皆説正月之朝五屬大夫復事公擇其寡功者而譙之曰列地分民者若一何故獨寡功何以不及人教訓不善政事不治一再則宥三則不赦公又問焉曰於子之屬有居處為義好學聰明質仁慈孝於父母長弟聞於鄉里者有則以告有而不以告謂之蔽賢其罪五有司已於事而竣公又問焉曰於子之属有拳勇股肱之力秀出於衆者有則以告有而不以告謂之蔽才其罪五有司已事而竣公又問焉曰於子之屬有不慈不孝於父母不長弟於鄉里驕躁淫暴不用上令者有則以告有而不以告謂之下比其罪五有司已事而竣於是乎五屬大夫退而脩屬屬退而脩連連退而脩鄉鄉退而脩卒卒退而脩邑邑退而脩家是故匹夫有善而可舉有不善而可誅政成國安以守則固以戰則彊封内治百姓親可以出征四方立一霸王矣可立一霸王之功桓公曰卒伍定矣事已成矣吾從事於諸侯其可乎管子對曰未可若軍令則吾既寄諸内政矣夫齊國寡甲兵吾欲輕重罪而移之於甲兵公曰為之奈何管子對曰制重罪入以兵甲犀甲二㦸輕罪入蘭盾鞈革二㦸蘭即所謂蘭錡兵架也鞈革重革當心著之所以禦矢也小罪入以金鈞三十斤曰鈞分宥薄罪入以半鈞分宥謂從坐者分其首犯而寛宥之無坐抑而訟獄者正三禁之而不直則入一束矢以罰之謂其人自無所坐而被抑屈為獄訟者正當禁之三日得其不直者則令入束矢也美金以鑄戈劍矛㦸試諸狗馬惡金以鑄斤斧鉏夷居􅠁試諸木土夷鉏類也居􅠁钁類桓公曰甲兵大足矣吾欲從事於諸侯可乎管仲對曰未可治内者未具也為外者未傋也故使鮑叔牙為大諌所以諫正君王子城父為将弦子旗為理理獄官寗戚為田教以農事自此已上理内已下理外隰朋為行行謂行人也使以通使諸侯曹宿孫處楚商客處宋季勞處魯徐開封處衛匽尚處燕審友處晉令此諸賢各處諸侯之國者所以諷勸之令歸齊又游士八十人奉之以車馬衣裘多其資糧財幣足之使出周游於四方以號召収求天下之賢士飾玩好使出周游於四方鬻之諸侯以觀其上下之所貴好擇其沈亂者而先政之以政正之公曰外内定矣可乎管子對曰未可鄰國未吾親也公曰親之奈何管子對曰審吾疆埸反其侵地正其封界毋受其貨財而美為皮幣以極聘頫頫見於諸侯以安鄰國則鄰國親我矣桓公曰甲兵大足矣吾欲南伐何主謂以何國為征伐之主管子對曰以魯為主反其侵地堂潛堂潛地名使海於有弊或遇水災教令泄水於海使有弊盡渠彌於有渚復教之穿渠彌亘於河渚綱山於有牢教之立國城必依山以為綱紀而有牢固桓公曰吾欲西伐何主對曰以衛為主反其侵地吉臺原姑與㭍里皆地名使海於有弊渠彌於有渚綱山於有牢桓公曰吾欲北伐何主管子對曰以燕為主反其侵地柴夫吠狗亦地名使海於有弊渠彌於有渚綱山於有牢四鄰大親既反其侵地正其封疆南至於岱隂謂岱山北西至於濟北至於海東至於紀随紀随地名地方三百六十里三嵗治定四嵗教成五歳兵出有教士三萬人革車八百乘諸侯多沉亂不服於天子於是乎桓公東救徐州分吳半分吳地之半存魯蔡陵蔡陵地名割越地南據宋鄭既割越地又據宋鄭之國以為親援征伐楚濟汝水伐楚時渡汝水踰方城謂方城之地望汶山楚山使貢絲於周室使楚貢絲即所謂檿絲者也堪為琴瑟絃南成周反胙於絳嶽荆州諸侯莫不來服中救晉公禽狄王敗胡貉破屠何屠何東胡之先也而騎冦始服北地以騎為冦北伐山戎制令支斬孤竹而九夷始聼海濱諸侯莫不來服西征攘白狄之地遂至於西河謂龍門之西河方舟設泭乘桴濟河至於石沉石沉地名縣車束馬踰太行與卑耳之貉拘秦夏與卑耳之貉共拘秦夏之不服者西服流沙西虞西虞國名而秦戎始從故兵一出而大功十二自救徐州已下有十二故東夷西戎南蠻北狄中國諸侯莫不賔服與諸侯飾牲為載書書謂要盟之辭載之於册以誓要於上下薦神謂以上下之神祗為盟誓又以其牲薦之於神然後率天下定周室大朝諸侯於陽穀故兵車之㑹六乘車之㑹三九合諸侯一匡天下甲不解壘兵不解翳翳所以蔽兵謂脅盾之屬不解甲於壘不解兵於翳言不用也弢無弓服無矢弢弓衣也無弓無矢亦言不用寝武事行文道以朝天子又云桓公憂天下諸侯魯有夫人慶父之亂二君弑死國絶無後公聞之使高子存之男女不淫馬牛選具執玉以見請為闗内之諸侯而桓公不使也狄人攻邢桓公築夷儀以封之男女不淫馬牛選具執玉以見請為闗内之諸侯而桓公不使也狄人攻衛衛人出旅於曹桓公城楚丘封之其畜以散亡故桓公予之繫馬三百匹天下諸侯稱仁焉於是天下諸侯知桓公之為己勤也桓公知諸侯之歸己也故使輕其幣而重其禮故使天下諸侯以罷馬犬羊為幣齊以良馬報諸侯以縷帛布鹿皮四分以為幣齊以文錦虎豹皮報諸侯之使垂櫜而入攟載而歸故鈞之以愛致之以利結之以信示之以武是故天下小國諸侯既服桓公莫之敢倍而歸之喜其愛而貪其利信其仁而畏其武桓公知天下小國諸侯之多與己也於是又大施忠焉可為憂者為之憂可為謀者為之謀可為動者為之動軍譚遂而不有也諸侯稱仁焉通諸齊國之魚鹽於東萊使闗市譏而不征廛而不税以為侯之利諸侯稱寛焉衛文公公子頑之子也魯閔公二年狄攻衞懿公㓕衞立文公齊桓公封於楚丘文公大布之衣大帛之冠大布麄布大帛厚繒葢用諸侯諒闇之服務材訓農通商惠工加惠於百工賞其利器用敬教勸學授方任能方百事之宜也元年革車三十乘季年乃三百乘文公初立輕賦平罪身自勞與百姓同勞苦以救衞民文公能以道化其民淫奔之恥國人不齒也不齒者不與相長稚秦穆公十六年為河東置官司齊頃公弛苑囿薄賦歛振孤問疾虗積聚以救民民亦大說厚禮諸侯竟頃公卒百姓附諸侯不犯晉文公自始入教其民二年欲用之子犯曰民未知義未安其居無義則茍生於是乎出定襄王二十五年定襄王以示事君之義入務利民民懐生矣欲用之子犯曰民未知信未宣其用宣明也未明於見用之信於是乎伐原以示之信伐原在二十五年民易資者不求豐焉不詐以求多明徴其辭重言信公曰可矣乎子犯曰民未知禮未生其共於是乎大蒐以示之禮蒐順少長明貴賤作執秩以正其官執秩主爵秩之官民聽不惑而後用之出穀戍釋宋圍楚子使申叔去穀子玉去宋一戰而覇文之教也楚共王救齊将起師子重曰君弱傳曰寡人生十年而喪先君共王即位至是三年盖年十三矣羣臣不如先大夫師衆而後可詩曰濟濟多士文王以寧詩大雅言文王以衆士安夫文王猶用衆況吾儕乎儕衆且先君荘王屬之曰無徳以及逺方莫如惠恤其民而善用之乃大户閲民户口已責棄逋責逮鰥施及老鰥救乏赦罪悉師王卒盡行晉景公作六軍為六軍僣王也萬二千五百人為軍韓厥趙括鞏朔韓穿荀騅趙旃皆為卿賞鞍之㓛也韓厥為新中軍趙括佐之鞏朔為新上軍韓穿佐之荀騅為新下軍趙旃佐之晉舊自有三軍今增此故為六軍悼公元年二月乙酉朔即位於朝朝廟五日而即位也厲公殺子絶故悼公不以嗣子居䘮始命百官始為政施舍己責施恩惠舍勞役止逋責逮鰥寡惠及微振廢滯起舊徳匡乏困救災患匡亦救也禁淫慝薄賦歛宥罪戾宥寛也節器用節省時用民使民以時欲無犯時不縱私欲使魏相士魴魏頡趙武為卿相魏錡子魴士㑹子頡魏顆子武趙朔子此四人其父祖皆有勞於晉國荀㑹欒黶韓無忌為公族大夫使訓卿之子弟共儉孝弟無忌韓厥子使士渥濁為太傅使脩范武子之法渥濁士貞子武子為景公太傅右行辛為司空使脩士蒍之法辛将右行因以為氏士蒍獻公司空也弁糾御戎挍正屬焉弁糾欒糾也挍正主馬官使訓諸御知義戎士尚節義荀賔為右司士屬焉司士車右之官使訓勇力之士時使勇力皆車右士勇力多不順命訓之共時之使卿無共御立軍尉以攝之省卿戎御令軍尉攝御而已祁奚為中軍尉羊舌職佐之魏綘為司馬魏犨子也張老為候奄鐸遏冦為上軍尉籍偃為之司馬籍偃談父為上軍司馬使訓卒乘親以聽命相親以聽上命程鄭為乘馬御六騶屬焉使訓羣騶知禮程鄭荀氏别族乘馬御乘車之僕也六騶六閑之騶周禮諸侯有六閑馬乘車尚禮容故訓羣騶使知禮凡六官之長皆民譽也大國三卿晉時置六卿為軍帥故總舉六官則知羣官無非其人舉不失職官不易方官守其業無相踰易爵不踰徳量徳授爵師不陵正旅不偪師正軍将命卿也師二千五百人之師也旅五百人之旅也言上下有禮不相陵偪民無謗言所以復覇也此以上通言悼公所行未必皆在即位之年八年春魯襄公來朝且聴朝聘之數晉悼復修覇業故朝而稟其多少五月甲辰㑹於邢丘以命朝聘之數使諸侯之大夫聽命季孫宿齊髙厚宋向戍衛寗殖邾大夫㑹之晉難重煩諸侯故使大夫聴命又蒐於綿上以治兵使趙武将上軍武自新軍超四等代荀偃韓起佐之位如故欒黶将下軍魏綘佐之黶亦如故綘自新軍佐超一等代士魴新軍無帥将佐皆遷晉侯難其人使其什吏率其卒乘官屬以從於下軍禮也得慎舉之禮又悼公歸自伐秦晉侯舍新軍禮也成國不過半天子之軍成國大國周為六軍諸侯之大者三軍可也於是知朔生盈而死朔知罃之長子盈朔弟也盈生而朔死盈生六年而武子卒彘裘亦㓜皆未可立也新軍無帥故舍之裘士魴子也十三年荀罃士魴卒其子皆㓜未任為卿故新軍無帥遂舍之初悼公既立悼公曰大父父皆不得立而避難於周客死焉寡人自以疎逺毋㡬為君今大夫不忘文襄之意而惠立桓叔之後頼宗廟大夫之靈得奉晉祀豈敢不戰戰乎大夫其亦佐寡人於是逐不臣者七人脩舊功施徳惠収文公入時功臣後既立定百事立百官育門子選賢良興舊族出滯賞畢故刑赦囚繫宥閒罪薦積德逮鰥寡振廢淹飬老㓜恤孤疾年過七十公親見之稱曰王父王父不敢不承稱曰王父尊而親之所以盡其心故王父不敢不承命平公即位平公悼公子彪羊舌肹為傅肹叔向也代士渥濁張君臣為中軍司馬張老子代其父祁奚韓襄欒盈士鞅為公族大夫祁奚去中軍尉為公族大夫去劇職就閒官韓襄無忌子虞丘書為乗馬御代程鄭改服修官烝於曲沃既葬改䘮服脩官選賢能曲沃晋祖廟烝冬祭也諸侯五月而葬既葬卒哭作主然後烝嘗於廟今晉踰月葬作主而烝祭傳言晉將有溴梁之㑹故速葬警守而下㑹於溴梁順河東行故曰下命歸侵田諸侯相侵取之田楚成王惲元年初即位布徳施惠結舊好於諸侯使人獻天子天子賜胙曰鎭爾南方夷越之亂無侵中國於是楚地千里平王即位封陳蔡復遷邑復九年所遷邑致羣賂始舉事時所貨賂施舍寛民宥罪舉職舉職脩廢官初平王以詐弑兩王而自立恐國人及諸侯叛之乃施惠百姓復陳蔡之地而立其後如故歸鄭之侵地存䘏國中脩政教及吳㓕州來令尹子旗請伐吳王弗許曰吾未撫民人未事鬼神未脩守偹未定國家而用民力敗不可悔州來在吳猶在楚也子姑待之言平王所以能有國二年平王使然丹簡上國之兵於宗丘且撫其民上國在國都之西西方居上流故謂之上國宗丘楚地分貧振窮分與也振救也長孤㓜養老疾収介特介特单身民也収養不使流散救災患宥孤寡寛其賦税赦罪戾詰姦慝詰責問也舉淹滯有才徳而未敘者曰淹滯禮新敘舊新羇旅也禄勲合親勲功也親九族任良物官物事也使屈罷簡東國之兵於召陵兵在國都之東亦如之如然丹好於邊疆結好四隣息民五年而後用師禮也宋元公時華氏之亂諸侯之戌謀請出華氏宋人從之宋公使公孫忌為大司馬代華費遂邊卬為大司徒卬平公曽孫代華定樂祁為司城祁子罕孫樂祁黎仲㡬為左師仲幾江孫代向寕樂大心為右師代華亥樂輓為大司冦輓子罕孫以靖國人楚昭王時吳師在陳楚大夫皆懼曰闔廬惟能用其民以敗我於栢舉今聞其嗣又甚焉將若之何子西曰二三子恤不能睦無患吳矣昔闔廬食不二味居不重席室不崇壇平地作室不起壇也器不雕鏤雕篆也鏤刻也宮室不觀觀臺榭舟車不飾衣服財用擇不取費選取堅厚不尚細靡在國天有菑厲厲疾疫也親廵孤寡而供其乏困在軍熟食者分而後敢食必須軍士皆分熟食不敢先食分猶徧也其所甞者卒乘與焉所甞甘珍非常食勤恤其民而與之勞逸是以民不罷勞死知不曠知身死不見曠棄吾先大夫子常易之所以敗我也越王勾踐與吳戰敗吳赦之勾踐反國乃苦身焦思置膽於坐坐卧仰飲膽曰女忘㑹稽之恥邪身自耕作夫人自織食不加肉衣不重采折節下賢人厚遇賓客振貧弔死徐廣曰弔或作葬與百姓同其勞秦簡公六年初令吏帶劍獻公元年止從死齊威王初即位以來不治委政卿大夫九年之間諸侯竝伐國人不治於是威王召即墨大夫而語之曰自子之居即墨也毁言日至然吾使人視即墨田野闢民人給官無留事東方以寧是子不事吾左右以求譽也封之萬家召阿大夫語之曰自子之守阿譽言日聞然使人視阿田野不闢民貧苦甚趙攻甄子弗能救衛取薛陵子弗知是子以幣厚吾左右以求譽也是日烹阿大夫及左右嘗譽者皆竝烹之遂起兵西擊趙衛敗魏於濁澤而圍惠王惠王請獻觀以和解趙人歸我長城於是齊國震懼人人不敢飾非務盡其誠齊國大治諸侯聞之莫敢致兵於齊二十餘年秦孝公元年庚申也河山以東彊國六與齊威楚宣魏惠燕悼韓哀趙成侯竝淮泗之間小國十餘楚魏與秦接界魏築長城自鄭濱雒以北有上郡楚自漢中南有巴黔中周室微諸侯力政争相併秦僻在雍州不與中國諸侯之㑹盟夷翟遇之孝公於是布惠振孤寡招戰士明功賞下令國中曰昔我穆公自岐雍之間脩徳行武東平晉亂以河為界西覇戎翟廣地千里天子致伯諸侯畢賀為後世開業甚光美㑹往者厲躁簡公出子之不寧國家内憂未遑外事三晉攻奪我先君河西地諸侯卑秦醜莫大焉獻公即位鎭撫邊境徙治櫟陽且欲東伐復穆公之故地脩穆公之政令寡人思念先君之意嘗痛於心賓客羣臣有能出竒計彊秦者吾且尊官與之分土於是乃出兵東圍陜城西斬戎之獂王地理志天水有獂道縣應邵曰獂戎邑音桓衛鞅聞是令下西入秦因景監求見孝公二年天子致胙三年衛鞅説孝公變法脩刑内務耕稼外勸戰死之賞罰孝公善之甘龍杜摰等怫然相與之争卒用鞅法百姓苦之居三年百姓便乃拜鞅為左庻長二年天子致胙十二年并諸小鄉聚集為大縣縣一令漢書百官表曰縣令長皆秦官萬户以上為令秩千石至六百減萬户為長秩五百䂖至三百䂖皆有丞尉四十一縣為田開阡陌東地渡雒十三年初為有秩史十九年天子致伯二十年諸侯畢賀初孝公令商鞅為法於秦戰斬一首賜爵一級欲為官者五千䂖其爵名一為公士二上造三簮䮍四不更五大夫六公大夫七官大夫八公乘九五大夫十左庻長十一右庻長十二左更十三中更十四右更十五少上造十六太上造十七駟車庻長十八大庻長十九闗内侯二十徹侯孝公既任商鞅乃令民父子兄弟同室内息者為禁集小都鄉邑聚為縣置令丞凡三十一縣為田開阡陌封疆而賦税平平斗桶今之斛也權衡丈尺惠王十二年初臘孝文王元年赦罪人修先王功臣褒厚親戚弛苑囿韓昭侯時申子請仕其從兄官昭侯不許也申子有怨色昭侯曰非所謂學於子者也聽之子之謁而廢子之道乎又亡其行子之術而廢子之請乎子嘗教寡人循功勞視次第今有所求此我将奚聽乎申子乃辟舍請罪曰君眞其人也燕昭王立弔死問孤與百姓同甘苦二十八年燕國殷富士卒樂軼輕戰趙武靈王少未能聽政博聞師三人左右司過三人及聽政先問先王貴臣肥義加其秩國三老年八十月致其禮二十五年使周祒胡服傅王子何秦荘襄王元年大赦罪人脩先王功臣施徳厚骨肉而布惠於民任賢東周之後諸侯力政大以圖覇業小以保封畧禮樂征伐既繇已而出佐佑輔弼必得士而彊乃能咨求髦俊申之委任極尊禮之數推倚属之重授之以政而一二必循其謀待之以誠而疎戚莫間其寵繇是淪感於骨髓竭智於精明磨勵以須彌縫其闕用能康事典而經邦政輯武經而暢戎畧庇民以成化闢國而矢謀集臣伐以奮庸垂令聞而長世任能之效不其偉歟魯閔公即位公及齊侯盟于落姑請復季友閔公初立國家多難以季友忠賢故請霸主而復之齊侯許之使召諸陳公次於郎以待之春秋書曰季子來歸嘉之也齊桓公歸國管子束縳在魯鮑叔曰君若欲覇王則臣不若管夷吾桓公曰夷吾寡人之賊也射我者也不可鮑叔曰夷吾為其君射人君若得之則彼亦将為君射人公不聽鮑叔固讓果聽之於是使人告魯曰管仲寡人讐也願得之親加手焉魯許諾乃使吏鞟其拳膠其目盛之以鴟夷置之甲中至齊境桓公使人以朝車迎之祓以爟火釁以犧猳謂之仲父使與鮑叔隰朋髙傒脩齊國政連五家之兵管子制國五家為軌十軌為里四里為連十連為鄉以為軍令設輕重魚鹽之利以贍貧窮禄賢能齊人皆說有司請事於齊桓公公曰以告仲父有司又請桓公公又曰以告仲父若是者三其近習者曰一則仲父二則仲父易哉為君桓公曰吾未得仲父則難已得仲父之後何為而不易也又寗戚見桓公説以合境内明日復見説桓公以為天下桓公大恱將任之羣臣争之曰客衛人去齊五百里不逺不若使人問之而固賢者也用之未晚也桓公曰不然問之恐其有小惡以其小惡忘人之大美此人主所以失天下之士也且人固難全權用其長者遂舉大用之而授之以為卿桓公定三革隐五刄定奠隐藏也三革甲胃盾五刄刀劍矛㦸矢朝服以濟河而無怵惕焉西行渡河以平晉是故大國慙媿小國附協唯能用管夷吾寗戚隰朋賓胥無鮑叔牙之屬而伯功立五子皆齊卿大夫一云齊桓公得管仲隰朋南靣而立桓公曰吾得三子也吾目加明吾耳加聰不敢獨擅進之先祖此聞天下至言而恐不能行者也又晉平公問於叔向曰昔者齊桓公九合諸侯一匡天下不識其君之力乎其臣之力乎叔向對曰管仲善制割隰朋善削縫賓胥無善純緣桓公知衣而已以其臣之力也師曠侍曰臣請譬之以五味管仲善斷割之隰朋善煎熬之賓胥無善濟和之羮已熟矣奉而進之而君不食誰能强之亦君之力也又管仲言於桓公曰夫墾田弗已闢土殖穀盡地之利則臣不若寗戚請置以為田官登降揖譲進退閑習則臣不若隰朋請置以為大行早入晏出犯君顔色進諫必忠不重富貴不避死亡則臣不若東郭牙請置以為諫臣决獄折中不誣無罪不殺無辜則臣不若弦寜請置以為大理平原廣囿車不結軌事不旋踵鼓之而三軍之士視死若歸則臣不若王子成甫請置以為大司馬如欲治國强兵則此五子者足矣如欲覇王則夷吾在威王與魏王㑹田於郊魏王問曰王亦有寳乎威王曰無有梁惠王曰若寡人國小也尚有徑寸之珠炤車前後各十二乘者十枚奈何以萬乘之國而無寳乎威王曰寡人之所以為寳與王異吾臣有檀子者使守南城則楚人不敢冦東取泗上十二諸侯皆来朝吾臣有盼子者使守髙唐則趙人不敢東漁於河吾吏有黔夫者使守徐州則燕人祭北門趙人祭西門齊之北門西門也言燕趙之人畏見侵伐故祭以求福徙而從者七千餘家吾臣有種首者使備盜賊則道不拾遺将以炤千乘豈特十二乘哉梁惠王慚不懌而去宣王為太子威王令成侯鄒忌及田忌將以救韓伐魏成侯與田忌争寵成侯責田忌田忌懼襲齊之邉邑不勝亡走㑹威王卒宣王立知成侯責田忌乃復召田忌以為將晉文公蒐于被廬晉常以春蒐禮改政令敬其始也被廬晉地作三軍晉獻公作三軍今復大國之禮謀元帥中軍帥趙衰曰郤縠可臣亟聞其言矣説禮樂而敦詩書詩書義之府也禮樂徳之則也徳義利之本也夏書曰敷納以言明試以功車服以庸尚書虞夏書也敷納以言觀其志也明試以功考其事也車服以庸報其勞也試猶攷也庸功也君其試之乃使郤縠将中軍郤溱佐之使狐偃将上軍譲於狐毛而佐之狐毛偃之兄命趙衰為卿讓於欒枝先軫欒枝貞子也欒賓之孫使欒枝將下軍先軫佐之荀林父御戎魏犨為右明年郤縠卒又以原軫將中軍胥臣佐下軍上徳也先軫以下軍佐超将中軍故曰上徳胥臣司空季子襄公蒐于夷舍二軍魯僖公三十一年晉蒐清原作五軍今舍二軍復三軍之制夷晉地前年四卿卒故蒐以謀軍帥使狐射姑將中軍代先且居趙盾佐之代趙衰也盾趙衰子陽處父至自温往年聘衛過温今始至改蒐於董易中軍易以趙盾為帥射姑佐之河東汾隂縣有董亭陽子成季之屬也處父嘗為趙衰屬大夫故黨於趙氏且謂趙盾能曰使能國之利也是以上之宣子於是乎始為國政宣趙盾諡制事典典常也正法罪輕重當辟獄刑辟猶理也董逋逃董督也繇質要繇用也質要劵也治舊洿治理汚穢本秩禮貴賤不失其本續常職脩廢官出滯淹㧞賢能也既成以授太傅陽子與太師賈佗使行諸晉國以為常法悼公即位於朝使魏相士魴魏頡趙武為卿相魏錡子魴士㑹子頡魏顆子武趙朔子此四人其父皆有勞於晉國荀家荀㑹欒黶韓無忌為公族大夫使訓卿之子弟共儉孝弟無忌韓厥子使士渥濁為太傅使脩范武子之法渥濁士貞子武子為景公太傅右行辛為司空使脩士蒍之法辛将右行因以為氏士蒍獻公司空也弁糾御戎挍正屬焉弁糾欒糾也挍正主馬官使訓諸御知義戎事尚義荀賓為右司士屬焉司士車右之官使訓勇力之士時使勇力皆車右士勇力多不順命訓之共時之使卿無共御立軍尉以攝之省卿戎御令軍尉攝御而已祁奚為中軍尉羊舌職佐之魏綘為司馬魏犨子也張老為侯奄鐸遏寇為上軍尉籍偃為之司馬籍偃談父為上軍司馬使訓卒乘親以聽命相親以聽上命程鄭為乘馬御六騶屬焉使訓羣騶知禮程鄭荀氏别族乘馬御乘車之僕也六閑之騶周禮諸侯有六閑馬乘車尚禮容故訓羣騶使知禮凡六官之長皆民譽也大國三卿晉時置六卿為軍帥故總舉六官則知羣官無非其人舉不失職官不易方官守其職無相踰易爵不踰徳量徳授爵師不陵正旅不偪師正軍將命卿也師二千五百人之師也旅五百人之旅也言上下有禮不相陵偪民無謗言所以覇也國語載悼公即位使吕宣子佐下軍曰邲之役吕錡佐智莊子於上軍獲楚公子榖臣與連尹襄老以免子羽鄢之役親射楚王而敗楚師以定晉國而無後其子孫不可不崇使彘恭子将新軍曰武子之季文子之母弟也武子宣法以定晉國至於今是用文子勤身以定諸侯至於今是頼夫二三子之徳其可忘乎故以彘季屛其宗使令狐文子佐之昔克潞之役秦來圖敗晉魏顆以其身却退秦師於輔氏親止杜回其勲銘於景鍾至於今不育其子不可不興也欒伯請公族大夫公曰荀家惇惠荀㑹文敏黶也果敢無忌鎭靖使茲四人者為之夫膏梁之性難正也故使惇惠者教之則徧而不倦使文敏者道之則婉而入使果敢者諗之則過不隐使鎭靖者修之則一使兹四人者為公族大夫公知祁奚之果而不滛也使為元尉知羊舌職之聰敏肅給也使為佐士知魏絳之勇而不亂也使為元司馬知張老之智而不詐也使爲元侯知鐸遏寇之恭敬而信彊也使為輿尉知籍偃之且惇率舊職而共給也使為輿司馬以程鄭為端而不淫好諫而不隐使為賛僕始合諸侯於虗朾以救宋使張老延君譽於四方且觀道逆者公以趙文子為文而能恤大事使佐新軍宣子吕錡之子也彘恭子士魴也荀㑹荀家之族也悼公方㑹諸侯悼公弟揚干亂行行陳也魏綘為司馬戮其僕僕御也悼公怒或諫公公卒賢綘任之政使和戎戎大親附秦繆公既得百里奚與語國事謝曰臣亡國之臣何足問繆公曰虞君不用子故亡非子罪也固問語三日繆公大悦授之國政號曰五羖大夫百里奚譲曰臣不及臣友蹇叔賢而世莫知臣嘗游困於齊而乞食䬹人䬹一作至蹇叔収臣臣因而欲事齊君無知蹇叔止臣臣得脱齊難遂之周周王子頽好牛臣以飬牛干之及頽欲用臣蹇叔止臣臣去得不誅事虞君蹇叔止臣臣知虞君不用臣臣誠私利禄爵且畱再用其言得脱一不用及虞公難是以知其賢於是繆公使人厚幣迎蹇叔以為上大夫繆公使孟明襲鄭師敗於殽晉人歸秦師秦大夫及左右皆曰是敗也孟明之罪也必殺之繆公曰是孤之罪也周芮良夫之詩曰大風有隧貪人敗類詩大雅隧蹊徑也周大夫芮伯刺厲王言貪人之敗善類若大風之行毁壊衆物所在成蹊徑聽言則對誦言如醉言昏亂之君不好典誦之言聞之若醉得道聽塗説之言則喜而答對匪用其良覆俾我悖覆反也俾使也不用良臣之言反使我為悖亂是貪故也孤之謂矣孤實貪以禍夫子夫子何罪復使為政又使帥師伐晉敗於彭衙秦伯猶用孟明孟明増修國政重施於民又伐晉濟河焚舟示必死也取王官及郊王官郊晉地晉人不出遂自茅津濟封殽尸而還茅津在河東大陽縣西封埋蔵之遂覇西戎用孟明也楚荘王好周遊田獵馳騁弋射觀樂無遺遺廢也盡付其境内之勞與諸侯之憂於孫叔敖事㓛曰勞盡付孫叔敖使憂之孫叔敖日夜不休不得以便主為故休息也不以欲得便利為主故日夜不休息也故莊王功迹著乎竹帛傳乎後世莊王之覇功傳聞於後世乃孫叔敖日夜不休以廣其君徳之所成也康王時公子午為令尹代子囊公子罷戎為右尹蒍子馮為大司馬子馮叔敖從子公子橐師為右司馬公子成為左司馬屈到為莫敖屈到屈蕩子公子追舒為箴尹追舒莊王子子南屈蕩為連尹飬繇基為廐尹以靖國人君子謂楚於是乎能官人是時齊崔氏之亂申鮮虞來奔僕賃於野以䘮莊公為齊荘公服䘮康王又召之為右尹傳言楚能用賢昭王聞秦欲伐楚使使者往觀楚之寳器王召令尹子西而問焉曰秦欲觀楚之寳器吾和氏之璧隋侯之珠可以示諸令尹子西對曰不知也召昭奚恤而問焉昭奚恤對曰此欲觀國得失而圖之不在寳器在賢臣珠玉玩好之物非寳重者王遂使昭奚恤應之昭奚恤發精兵三百人陳於西門之内為東靣之壇二為南靣之壇四為西靣之壇一秦使者至昭奚恤曰君客也請就上位東靣令尹子西南靣大宗子敖次之葉公子高次之司馬子反次之昭奚恤自居西靣之壇稱曰客欲觀楚之寳器楚國之所寳者賢臣理百姓實倉廪使民各得其所令尹子西在此奉珪璧使諸侯解忿狷之難交兩國之歡使無兵革之憂大宗子敖在此守封疆謹境界不侵鄰國鄰國亦不見侵葉公子高在此理師旅整兵戎以當彊敵提枹鼔以動百萬之衆使皆趨湯火蹈白刄出萬死不顧一生之難司馬子反在此懐覇王之餘議酌治亂之遺風昭奚恤在此唯大國之觀秦使者戄然無以對昭奚恤遂揖而去秦使者反言於秦君曰楚多賢臣未可謀遂不伐楚惠王初卜右司馬子國觀瞻曰如志子國未為令尹時卜為右司馬得吉兆如其志觀瞻楚開卜大夫故命之命以為右司馬及巴師伐楚圍鄾鄾楚邑將卜帥王曰寧如志何卜焉寧子國也使帥師而行請承承佐王曰寢尹工尹勤先君者也柏舉之役寢尹吳由于以背受戈工尹固執燧象奔吳皆為先君勤勞敗巴師於鄾故封子國於析君子曰惠王知志知用其志夏書曰官占唯先蔽志昆命於元龜官占卜筮之官蔽斷也昆後也言當先斷意後用龜也其是之謂乎志曰聖人不煩卜筮惠王其有焉不疑故不卜又白公之亂陳人恃其衆而侵楚衆多也楚既寧將取陳麥楚子問帥於大師子穀與葉公諸梁子穀曰右領差車與左史老皆相令尹司馬以伐陳其可使也言此二人皆嘗輔相子西子期伐陳今復可使子髙曰率賤民慢之懼不可命焉右領左史皆楚賤官子穀曰觀丁父鄀俘也武王以為軍帥楚武王是以克州蓼服隨唐大啓羣蠻彭仲爽申俘也文王以為令尹實縣申息楚文王㓕申息以為縣朝陳蔡封畛於汝封畛北至汝水惟其任也何賤之有子高曰天命不謟謟疑也令尹有憾於陳十五年子西伐吳陳使貞子弔吳以此為恨天若亡之其必令尹之子是與君盍舍焉謂舍右領與左史臣懼右領與左史有二俘之賤而無其令徳也王卜之武城尹吉武城尹子西子公孫朝使帥師取陳麥陳人禦之敗遂圍陳㓕之悼王素聞吳起賢及起為魏西河守武侯疑之吳起懼罪遂去即之楚至則相楚明法審令捐不急之官廢公族疏遠者以撫飬戰鬪之士要在强兵破馳說之言縱横者於是南平百越北并陳蔡却三晉西伐秦宋襄公即位以公子目夷為仁使為左師以聽政於是宋治故魚氏世為左師衛懿公與狄戰公與石祁子玦與甯莊子矢使守莊子寗速也玦玉玦曰以此賛國擇利而為之賛助也玦示以當决斷矢示以禦難與夫人繡衣曰聽於二子靈公無道季康子問於孔子曰夫如是奚而不䘮孔子曰仲叔圉治賓客祝鮀治宗廟王孫賈治軍旅夫如是奚其䘮言雖無道所任者各當其才何為䘮亡鄭簡公為命禆諶草創之禆諶鄭大夫名氏也謀於野則獲於國則否鄭國將有諸侯之事使乘車以適野而謀作㑹盟之辭世叔討論之行人子羽脩飾之東里子産潤色之世叔鄭大夫游吉也討治也禆諶既造謀世叔復因而論之詳而審之行人掌使之官子羽公孫揮子産居東里因以為號更此四賢而成故鮮有敗事吳王闔廬時孫武以兵法見吳王吳人出宮中美人令武試之武斬其二寵姫吳王不説武曰王徒好其言不能用其實於是闔廬知武能用兵法卒以為將西破强楚入郢北威齊晉顯名諸侯孫子有力焉越王勾踐棲於㑹稽之上乃號令三軍曰凡我父兄昆弟及國子姓有能助寡人謀而退吳者吾與之共知越國之政大夫種進對曰臣聞之賈人夏則資皮冬則資絺旱則資舟水則資車以待乏也雖無四方之憂然謀臣與爪牙之士不可不飬而擇之也譬如簔笠時雨至必求之今者君既棲於㑹稽之上然後乃求謀臣無乃後乎勾踐曰茍得聞子大夫之言何後之有執其手而與之謀遂使之行成於吳勾踐自㑹稽歸欲使范蠡治國政蠡對曰兵甲之事種不如蠡鎭撫國家親附百姓蠡不如種於是舉國政屬大夫種而使范蠡與大夫拓稽行成為質於吳二嵗而吳歸趙烈侯籍好音謂相國公仲連曰寡人有愛可以貴之乎公仲曰富之可貴之則否烈侯曰然夫鄭歌者槍石二人吾賜之田人萬畝公仲曰諾不與居一月烈侯從代來問歌者田公仲曰求未有可者有頃烈侯復問公仲終不與乃稱疾不朝畨吾君徐廣曰畨音盤常山有畨吾縣自代來謂公仲曰君實知好善而未知所持今公仲相趙於今四年亦有進士乎公仲曰未也畨吾君曰牛畜荀欣徐越皆可公仲乃進三人及朝烈侯復問歌者田何如公仲曰方使擇其善者牛畜侍烈侯以仁義約以王道烈侯逌然明日荀欣侍以選練舉賢任官使能明日徐越侍以節財儉用察度功徳所與無不充君説烈侯使使謂相國曰歌者之田且止官牛畜為師荀欣為中尉徐越為内史賜相國衣二襲单復具為一襲孝成王時趙奢者趙之田部吏也平原君以為賢言之於王王用之治國賦國賦大平民富而府庫實魏文侯聞吳起賢而欲事之文侯問李克曰吳起何如人哉李克曰起貪而好色然用兵司馬穰苴不能過也於是以為將文侯又使西門豹守鄴而河内稱治又使樂羊將而攻中山三年而㧞之樂羊返而論功文侯示之謗書一篋樂羊再拜稽首曰此非臣之功也主君之力也文侯謂李克曰先生常教寡人曰家貧則思良妻國亂則思良臣今所置非成則璜文侯弟名成二子何如李克對曰臣聞之卑不謀尊疎不謀戚臣在闕門之外不敢當命文侯曰先生臨事勿讓李克曰君不察故也居視其所親富視其所與逹視其所舉窮視其所不為貧視其所不取五者足以定之矣何待克哉文侯曰先生就舍寡人之相定矣李克趨而出過翟璜之家翟璜曰今者聞君召先生而卜相果誰為之李克曰魏成子為相翟璜忿然作色曰以耳目之所覩記臣何負於魏成子西河守臣之所進也君内以鄴為憂臣進西門豹君謀伐中山臣進樂羊中山已拔無使守之臣進先生君之子無傅臣進屈侯鮒臣何負於魏成子李克曰且子之言克於子之君也豈將比周以求大官哉君問而置相非成則璜二子何如克對曰君不察故也居視其所親富視其所與逹視其所舉窮視其所不為貧視其所不取五者足以定之矣何待克哉是以知君之相魏成者成食祿千鍾什九在外什一在内是以東得卜子夏田子方段干木此三人者君皆師之子之所進五人者君皆臣之子惡得與魏成子比也翟璜逡廵再拜曰璜鄙人也失對願卒為弟子又云魏文侯弟曰季成友曰翟璜文侯欲相之而未能决問李克李克對曰君欲卜相則問樂商與王孫圉荀端孰賢文侯曰善以王孫圉荀端為賢翟璜進之以樂商為賢季成進之故相季成故知人則哲進賢受王賞季成以為知賢故文侯以為相季成翟璜皆近臣親屬也以所進者賢别之之故李克之言是也安釐王見公子無忌自趙而歸相與泣而以上將軍印授公子公子遂将公子使使遍告諸侯諸侯聞公子將各遣將將兵救魏公子率五國之兵破秦軍於河外走蒙驁遂乘勝逐秦軍至函谷闗抑秦兵秦兵不敢出當是時公子威振天下有禮夫禮者國之經也故曰有禮則安無禮則危若乃受裂地之封膺析珪之位有人民焉有社稷焉所以班朝治軍講信脩睦和邦國統百官莫大於禮者也至於重王者之命恤鄰國之災唁其奔亡安其降附雖軍旅之際郊野之間造次不違進退有度使其隄防不失手足有措勤於斯者皆幾於覇焉魯隐公六年冬京師來告饑公為之請糴於宋衛齊鄭禮也告饑不以王命故言京師公以己國不足旁請鄰國故曰禮也傳見隐公之賢八年齊人平宋衛於鄭㑹盟於瓦屋使來告成三國齊侯来告和三國魯隐公使衆仲對曰君釋三國之圍以鳩其民君之惠也寡君聞命矣敢不承受君之明徳鄭莊公與魯隐公㑹齊侯伐許許荘公奔衛齊侯以許讓魯魯弗取乃與鄭鄭使許大夫百里奉許叔以居許東偏君子謂鄭荘公於是乎有禮宋閔公九年大水魯荘公使弔焉曰天作淫雨害於粢盛若之何不弔不為天所愍弔對曰孤實不恭天降之災又以為君憂拜命之辱謝辱厚命臧文仲曰宋其興乎臧文仲魯大夫禹湯罪己其興也浡焉浡盛貌桀紂罪人其亡也忽焉忽速貌且列國有凶稱孤禮也言懼而名禮其庻乎既而聞之公子御説之辭也宋荘公子楚成王十八年秋圍許以救鄭魯僖公六年諸侯救許乃還冬蔡穆侯将許僖公以見楚子於武城楚子退舍武城猶有忿志而諸侯各罷故蔡将許君歸楚武城地在南陽宛縣北許男靣縳䘖璧大夫衰絰士輿櫬縳手於後唯見其靣以璧為贄手縳故䘖之櫬棺也受死故衰絰楚子問諸逢伯逢伯楚大夫對曰昔武王克殷微子啓如是微子啓封宋紂之庻兄也武王親釋其縳受其璧而祓之祓除凶之禮焚其櫬禮而命之使復其所楚子從之齊桓公二十三年山戎伐燕燕告急於齊桓公救燕遂伐山戎至於孤竹而還燕莊公遂送桓公入齊境桓公曰非天子諸侯相送不出境吾不可以無禮於燕於是分溝割燕君所至與燕君復修召公之政納貢於周如成康之時諸侯聞之皆從齊三十五年桓公㑹諸侯於葵丘王使宰孔賜齊侯胙曰天子有事於文武有祭事也使孔賜伯舅胙天子謂異姓諸侯曰伯舅齊侯將下拜孔曰且有後命天子使孔曰以伯舅耋老加勞賜一級無下拜七十曰耋級等也對曰天威不違顔咫尺言天鍳察不逺威嚴嘗在顔靣之前八寸曰咫小白余敢貪天子之命無下拜小白齊侯名余身也恐殞越於下殞越顛墜也天王居上故言恐顛墜於下以遺天子羞敢不下拜下拜登受拜堂下受胙於堂上晉文公重耳獻公子也獻公之䘮秦穆公使人弔公子重耳獻公殺其世子申生重耳辟難出奔是時在翟就弔之且曰寡人聞之亡國恒於斯得國恒於斯言在䘮代之際雖吾子儼然在憂服之中䘮亦不可久也時亦不可失也孺子其圖之勸其反國意欲納之䘮謂亡失位孺稚也以告舅犯舅犯重耳之舅狐偃也字子犯舅犯曰孺子其辭焉䘮人無寳仁親以為寳寳謂善道可守者仁親親行仁義父死之謂何又因以為利欲反國求為後是利父死而天下其孰能說之孺子其辭焉說猶觧也公子重耳對客曰君惠弔亡臣重耳身䘮父亡不得與於哭泣之哀以為君憂謝之父死之謂何或敢有他志以辱君義稽顙而不拜哭而起起而不私他志謂私心子顯以致命於穆公使者文子縶也盧氏云古者名字相配顯當作韅穆公曰仁夫公子重耳夫稽顙而不拜則未為後也故不成拜哭而起則愛父也起而不私則遠利也魯僖公二十七年齊孝公卒魯有齊怨前年齊伐魯也不廢䘮紀禮也秦穆公三十七年楚人㓕江魯文公四年秦伯為之降服出次不舉過數降服素服也出次辟正寢不舉去成饌鄰國之禮有數今秦伯過之大夫諫公曰同盟㓕雖不能救敢不矜乎吾自懼也楚莊王伐鄭克之魯宣公十二年鄭伯肉袒左執旄旌右執鸞刀以逆荘王曰寡人無良邊垂之臣以干天禍是以使君王沛焉辱到敝邑君如憐此䘮人錫之不毛之地唯君王之命莊王曰君之不令臣交易為言是以使寡人得見君之玉靣也而微至乎此莊王親自手旌左右麾軍退舍七里將軍子重進諫曰夫南郢之與鄭伯相去數千里諸大夫死者數人厮役死者數百人今尅而不有無乃失民力乎莊王曰吾聞古者杅不穿皮不蠧不出四方以是見君子之重禮而賤利也要其人不要其土人告從而不赦不祥也吾以不祥立乎天下災之及吾身何日之有矣既而晉之救鄭者至日請戰荘王許之將軍子重進諫曰晉彊國也道近力新楚師勞罷君請勿許荘王曰不可彊者我避之弱者我威之是寡人無以立乎天下也遂還師以迎晉冦荘王援枹而鼓之晉師大敗晉人来渡河而南及敗奔走欲渡而北士卒争舟舟重以刃擊引舟中之指可掬也莊王曰嘻吾兩君之不相能也百姓何罪乃退師以軼晉冦晉悼公即位魯成公朝晉公至自晉晉范宣子来聘且拜朝也拜謝公朝君子謂晉於是乎有禮有卑讓之禮楚共王二十二年陳成公卒魯襄四年楚人將伐陳聞䘮乃止軍禮不伐䘮陳人不聽命臧武仲聞之曰陳不服於楚必亡大國行禮焉而不服在大猶有咎而况小乎夏楚彭名侵陳陳無禮故也魯襄公十二年吳子夀夢卒公臨於周廟禮也周廟文王廟也周公出文王故魯立其廟吳始通故曰禮衛獻公出奔齊魯襄公使厚成叔弔於衛曰寡君使瘠聞君不撫社稷而越在他境越逺也瘠厚成叔名若之何不弔以同盟之故使瘠敢私於執事執事謂諸大夫曰有君不弔弔恤也有臣不敏敏逹也君不赦宥臣亦不帥職増淫發洩其若之何衛人使大叔儀對曰大叔儀衛大夫羣臣不佞得罪於寡君寡君不以即刑而悼棄之以為君憂君不忘先君之好辱弔羣臣又重恤之重恤謂愍其不逹也敢拜君命之辱重拜大貺謝重恤之賜厚孫歸復命語臧武仲曰衛君其必歸乎有大叔儀以守守於國有母弟鱄以出或撫其内或營其外能無歸乎魯昭公六年杞文公卒弔如同盟禮也魯怨杞因晉取其田而今不廢䘮紀故禮之十五年正月有事於武宮叔弓涖事籥入而卒去樂卒事禮也大臣卒故為之去樂穀梁云有事武宮籥入叔弓卒去樂卒事君在祭樂之中聞大夫之䘮事則去樂卒事禮也二十五年公孫於齊次於陽州齊侯唁公於野井曰奈何君去魯國之社稷昭公曰䘮人自謂亡人不佞不善失守魯國之社稷執事以羞謙自比齊下執事言以羞及君再拜顙顙猶今叩頭矣謝見唁也慶子家駒慶賀曰慶子免君於大難矣子家駒曰臣不佞䧟君於大難君不忍加之以鈇鑕賜之以死鈇鑕腰斬之罪即所賜之以死再拜顙謝為齊侯所慶髙子執簞食簞竹器圓曰簞方曰笥食即所致粮也與四脡脯屈曰朐伸曰脡國子執壺漿壺禮器腹方口圓曰壺反之曰方壺有爵飾曰吾寡君聞君在外餕饔未就餕饔熟食未就未成者解所以致糗意敢致糗於從者糗糒也謙不敢斥魯侯故言從者昭公曰君不忘吾先君延及䘮人錫之以大禮再拜稽首以袵受袵衣下裳當前者乏器謙不敢求索也高子曰有夫不祥猶云人皆有夫不善者君無所辱大禮禮臣受君賜答拜謂之拜命之辱高子見昭公拜辱太卑故曰君無所辱大禮昭公盖祭而不嘗食必祭者謙不敢便嘗示有所先不嘗者待禮譲也景公曰寡人有不腆先君之服未之敢服腆厚也服謂齊侯所著衣服也言未敢服者見魯侯乃敢服之謙辭也禮天子朝皮弁夕𤣥端朝服以聽朝𤣥端以燕皮弁以征不義取禽獸行射諸侯朝朝服夕深衣𤣥端以燕禆冕以朝天子以祭其祖禰卿大夫冕服而助君祭朝服祭其祖禰士爵弁黻衣裳以助君祭𤣥端以祭其祖禰有不腆先君之器器謂上所執簞壺未之敢用敢以請請行禮昭公曰䘮人不佞失守魯國之社稷執事以羞敢辱大禮敢辭不敢當大禮故敢辭景公曰寡人有不腆先君之服未之敢服有不腆先君之器未之敢用固以請昭公曰以吾宗廟之在魯也以守我宗廟在魯時有先君之服未之能以服有先君之器未之能以出敢固辭己有時未能以事人今己無有義不可以受人之禮景公曰寡人有不腆先君之服未之敢服有不腆先君之器未之敢用請以饗於從者欲令受之故益謙言從者昭公曰䘮人其何稱行禮賓主當各有所稱時齊侯以諸侯遇禮接昭公昭公自嫌失國不敢以故稱自稱故執謙問之公於是乎噭然而哭噭然哭聲貌感景公言而自傷諸大夫皆哭魯諸大夫從昭公者既哭以人為菑菑周埓垣也所以分别内外衛威儀今大學辟雍作側字以幦為席幦車覆笭以鞌為几以遇禮相見以諸侯出相遇之禮相見孔子曰禮與其辭足觀矣言昭公素能若此禍不至是主書者喜為大國所唁也吳王夫差伐齊南鄙師于鄎鄎齊地邾郯不書兵并屬吳不列於諸侯齊人殺悼公赴於師以説吳吳子三日哭於軍門之外册府元龜卷二百三十九
