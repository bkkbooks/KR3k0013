body:
  text: 冊府元龜卷五百三十六宋王欽若等撰諫諍部直諌第三漢王章成帝時為京兆尹章素剛直敢言以為大将軍王鳯建遣定陶興王之國非是廼奏封事言日蝕之咎天子召見章延問以事章對曰天道聰明佐善而菑惡以瑞異為符效今陛下以未有繼嗣引近定陶王所以承宗廟重社稷上順天心下安百姓此正議善事當有祥瑞何故致菑異菑異之發為大臣顓政者也今聞大将軍猥歸日蝕之咎於定陶王建遣之國茍欲使天子孤立於上顓擅朝事以便其私非忠臣也且日蝕隂侵陽臣顓君之咎今政事大小皆自鳯出天子曽不一舉手鳯不内省責反歸咎善人推逺定陶王且鳯誣罔不忠非一事也前丞相樂昌矦商本以先帝外屬内行篤有威重位歴将相國家柱石臣也其人守正不肯詘節随鳯委曲卒用閨門之事為鳯所罷身以憂死衆庶愍之又鳯知其小婦弟張美人已嘗適人於禮不宜配御至尊託以為宜子内之後宫茍以私其妻弟聞張美人未嘗任身就館也且羌胡尚殺首子以盪賜正世況於天子而近已出之女也此三者皆大事陛下所自見足以知其餘及它所不見者鳯不可令久典事宜退使就第選忠賢以代之自罷商後遣定陶王也上不能平及聞章言天子感悟納之謂章曰㣲京兆尹直言吾不聞社稷計且唯賢知賢君試為朕求可以自輔者於是章奏封事薦中山孝王舅瑯琊太守馮野王以王舅出以賢復入明堂主樂賢也上自為太子時數聞野王先帝名卿聲譽出鳯逺甚方欲倚以代鳯而上以皇太后故章竟下獄而死梅福成帝時為昌尉帝委任大将軍王鳯鳯専勢擅朝而京兆尹王章素忠直譏刺鳯為所誅王氏浸盛菑異數見羣下莫敢正言福上書曰臣聞箕子徉狂於殷而為周陳洪範叔孫通遁秦歸漢制作儀品夫叔孫先非不忠也箕子非䟽其家而畔親也不可為言也昔髙祖納善若不及從諫若轉圜聽言不求其能舉功不考其素陳平起於亡命而為謀主韓信拔於行陳而建上将故天下之士雲合歸漢争進其異智者竭其䇿愚者盡其慮勇士極其節怯夫勉其死合天下之知并天下之威是以舉秦如鴻毛取楚若拾遺此髙祖所以亡敵於天下也孝文帝起於代谷非有周召之師伊吕之佐也循髙祖之法加以恭儉當此之時天下㡬平繇是言之循髙祖之法則治不循則亂何者秦為亡道削仲尼之迹滅周公之軌壊井田除五等禮廢樂隳王道不通故欲行王道者莫能致其功也孝武皇帝好忠諌說至言出爵不待亷茂慶賜不湏顯功是以天下布衣各厲志竭精以赴闕廷自衒鬻者不可勝數漢家得賢於此為盛使孝武皇帝聽用其計昇平可致於是積尸暴骨快心胡越故淮南王安縁間而起所以計慮不成而謀議泄者以衆賢聚於本朝故以大臣勢陵不敢和議也方今布衣廼窺國家之隙見間而起者蜀郡是也成帝鴻嘉中廣漢男子鄭躬等反是也及山陽亡徒蘓令之羣蹈藉名都大郡求黨與索随和而亡逃匿之意此皆輕量大臣無所畏忌國家之權輕故匹夫欲與上争衡也是士者國之重噐得士則重失士則輕詩云濟濟多士文王以寜廟堂之議非草茅所當言也臣誠恐身塗野草尸并卒伍故數上書求見輙報罷臣聞齊桓之時有以九九見者桓公不逆欲以致大也今臣所言非特九九也陛下距臣者三矣此天下士所以不至也昔秦武王好力任鄙叩關自鬻繆公行伯繇余歸徳今欲致天下之士民有上書求見者輙使詣尚書問其所言言可採取者秩以升斗之禄賜以一束之帛若此則天下之士發憤吐懣忠言嘉謀日聞於上天下條貫國家表裏爛然可睹矣夫以四海之廣士民之數能言之類至衆多矣然其雋傑指陳世政言成文章質之先聖而不繆施之當世合時務若此者亦亡㡬人故爵禄束帛者天下之底石髙祖所以厲世摩鈍也孔子曰工欲善其事必先利其器至秦則不然張無道之罔以為漢敺除倒持泰阿授楚其柄故誠能勿失其柄羣下雖有不順莫敢觸其鋒此孝武皇帝所以辟地建功為漢世宗也今不循伯者之道廼欲以三代選舉之法取當世之士猶察伯樂之圗求騏驥於市而不可得亦已明矣故髙祖棄陳平之過而獲其謀晉文召天王齊桓用其讎亡益於時不顧逆順此所謂伯道者一色成體謂之醇白黒雜合謂之駁欲以承平之法治暴秦之緒猶以鄉飲酒之禮理軍市也今陛下既不納天下之言又加戮焉夫䳒鵲遭害則仁鳥增逝愚者蒙戮則知士深退間者愚民上䟽多觸不急之法或下廷尉而死者衆自陽朔以来天下以言為諱朝廷尤甚羣臣皆承順上指莫有執正何以明其然也取民所上書陛下之所善試下之廷尉廷尉必曰非所宜言大不敬以此下之一也故京兆尹王章資質忠直敢面引廷争孝元皇帝擢之以厲具臣而矯曲朝及至陛下戮其妻子且惡惡止其身王章非有反叛之辜而殃及家折直士之節結諫臣之舌羣臣皆知其非然不敢争天下以言為戒最國家之大患也願陛下循髙祖之軌杜亡秦之路數御十月之歌留意亡逸之戒除不急之法下亡諱之詔博覽兼聽謀及䟽賤令深者不隠逺者不塞所謂闢四門明四目也且不急之法誹謗之微者也徃者不可及来者猶可追方今君命犯而主威奪外戚之權日以益隆陛下不見其形願察其景建始以来日蝕地震以率言之三倍春秋水菑亡與此數隂盛陽衰金鐵為飛此何景也漢興以来社稷三危吕霍上官皆母后之家也親親之道全之為右當與之賢師良傅教以忠孝之道今廼尊寵其位授以魁柄使之驕逆至於夷滅此失親親之大者也自霍光之賢不能為子孫慮故權臣易世則危書曰毋若火始燄燄勢陵於君權隆於上然後防之亦亡及已上遂不納成帝久立繼嗣福以為宜建三統封孔子之世以為殷後復上書曰臣聞不在其位不謀其政政者職也位卑而言髙者罪也越職觸罪危言世患雖伏質横分臣之願也守職不言沒齒身全死之日尸未腐而名滅雖有景公之位伏歴千駟臣不貪也故願一登文石之陛赤墀之塗當户牖之法坐盡平生之愚慮亡益於時有遺於世此臣寝所以不安食所以忘味也願陛下深省臣言臣聞存人所以自立也壅人所以自塞也善惡之報各如其事昔者秦滅二周夷六國隱士不顯佚民不舉絶三統滅天道是以身危子殺厥孫不嗣所謂壅人以自塞者也故武王克殷未下車存五帝之後封殷於宋紹夏於杞明著三統示不獨有也是以姬姓半天下遷廟之主流出於戸所謂存人以自立者也今成湯不祀殷人亡後陛下繼嗣久微殆為此也春秋經曰宋殺其大夫榖梁傳曰其不稱名姓以其在祖謂尊之也此言孔子故殷後也雖不正統封其子孫以為殷後禮亦宜之何者諸侯奪宗聖庶奪嫡傳曰賢者子孫宜有土而况聖人又殷之後哉昔成王以諸侯禮𦵏周公而皇天動威雷風著菑今仲尼之廟不出闕里孔氏子孫不免編户以聖人而歆匹夫之祀非皇天之意也今陛下誠能據仲尼之素功以封其子孫則國家必獲其福又陛下之名與天亡極何者追聖人素功封其子孫未有法也後聖必以為則不滅之名可不勉哉福孤逺又譏切王氏故終不見納杜業封建平侯哀帝即位業上書言王氏世權日久朝無骨鯁之臣宗室諸侯微弱與繫囚無異自佐史以上至於大吏皆權臣之黨曲陽侯根前為三公輔政知趙昭儀殺皇子不輙白奏反與趙氏比周恣意妄行讚愬故許后被加以非罪誅破諸許族敗元帝外家内族妬同産兄姉紅陽矦立及淳于氏皆老被放棄新喋血京師威權可畏髙陽侯薛宣有不養母之名安昌侯張禹姦人之雄惑亂朝廷使先帝負謗於海内尤不可不慎陛下初即謙讓未皇孤獨特立莫可據扙權臣易是意若探湯宜蚤以義割恩安百姓心竊見諸博忠信勇猛材畧不世出誠國家雄俊之賢臣也宜徴博置左右以鎮天下此人在朝則陛下可髙枕而卧矣昔諸吕欲危劉氏頼有髙祖遺臣周勃陳平尚存不者㡬為姦臣笑也毋将隆哀帝時為執金吾侍中董賢方貴帝使中黄門發武庫兵前後十軰送董賢及上乳母王阿舎将隆奏曰武庫兵噐天下公用國家武備繕治造作皆度大司農錢大司農錢自乗輿不以給供養勞賜一出少府蓋不以本藏給末用不以民力共浮費别公私示正路也古言諸侯方伯得顓征伐廼賜斧鉞漢家邉吏職在距宼亦賜武庫兵皆任其事然後蒙之春秋之誼家不藏甲所以抑臣威損私力也今賢等便僻弄臣私恩微妾而以天下之公用給其私門棄國威噐共其家備民力分於弄臣武兵設於微妾建立非宜以廣驕僭非所以示四方也孔子曰奚取於三家之堂臣請收還武庫帝不恱鮑宣為諫議大夫時哀帝祖母傅太后欲與成帝母俱稱尊號封爵親屬丞相孔光大司空師丹何武大司馬傅喜始執正議失傅太后指皆免官丁傅子弟並進董賢貴幸宣上書諫曰竊見孝成皇帝時外親持權人人牽引所私以充塞朝廷妨賢人路濁亂天下奢泰亡度窮困百姓是以日蝕且十彗星四起危亡之徴陛下所親見也今奈何反復劇於前乎朝臣亡有大儒骨鯁白首耆艾魁壘之士論議通古今喟然動心憂國如饑渴者臣未見也敦外親小童及幸臣董賢等在公門省户下陛下欲與此共承天地安海内甚難今世俗謂不智者為能謂智者為不能昔堯放四凶而天下服今除一吏而衆皆惑古刑人尚服今賞人反惑請寄為姦羣小日進國家空虚用度不足民流亡去城郭盜賊並起吏為殘賊嵗増於前凡民有七亡隂陽不和水旱為菑一亡也縣官重責更賦租稅二亡也貪私亡公受取不已三亡也豪彊大姓蠶食亡厭四亡也苛吏繇役失農桑時五亡也部落鼔鳴男女遮迣六亡也盜賊刧掠取民財物七亡也七亡尚可又有七死酷吏毆殺一死也治獄深刻二死也寃䧟無辜三死也盜賊横發四死也怨讎相殘五死也嵗惡饑饉六死也時氣疾疫七死也民有七亡而無一得欲望國安誠難民有七死而無一生欲望刑措誠難此非公卿守相貪殘成化之所致邪羣臣等幸得居尊官食重禄豈有肯加惻隱於細民助陛下流教化者邪志但在營私家稱賔客為姦利而已以茍容曲從為賢以拱默尸禄為智謂如臣宣等為愚陛下擢臣巖穴誠兾有益毫毛豈徒欲使臣美食大官重髙門之地哉天下乃皇天之天下也陛下上為皇天子下為黎庶父母為天牧養元元視之當如一合鳲鳩之詩今貧民菜食不厭衣又穿空父子夫婦不能相保誠可為酸鼻陛下不救将安所歸命乎奈何獨私養外親與幸臣董賢多賞賜以千萬數奴從賔客漿酒藿肉視酒如漿視肉如藿也蒼頭廬兒皆用致富非天意也及汝昌矦傅商亡功而封夫官爵非陛下之官爵也陛下取非其官官非其人而望天說民服豈不難哉方陽矦孫寵宜陵矦息夫躬辨足以移衆彊可用獨立姦人之雄惑世尤劇者也宜以時罷退及外親幼童未通經術者皆宜令休就師傅急徴故大司馬傅喜使領外親故大司空何武師丹故丞相孔光故左將軍彭宣經皆更博士位皆歴三公知謀威信可與建教化圗安危龔勝為司直郡國皆慎選舉三輔委輸官不敢為奸可大委任也陛下前以小不忍退武等海内失望陛下尚能容亡功徳者甚衆曽不能忍武等邪治天下者當用天下之心為心不得自専快意而已也上之皇天見譴下之庶黎怨恨次有諌諍之臣陛下茍欲自薄而厚惡臣天下猶不聼臣雖愚戅獨不知多受禄賜美食大官廣田宅厚妻子不與惡人結仇怨以安身邪誠迫大義官以諫諍為職不敢不竭愚惟陛下少留神明覽五經之文原聖人之至意深思天地之戒臣宣呐鈍於辭不勝惓惓盡死節而已帝以宣明儒優容之是時郡國地震民訛言行籌是時民驚走持藁或麻榦一枝相傳日行詔明年正月朔日蝕帝乃徴孔光免孫寵息夫躬罷侍中諸曺黄門郎數十人宣又上書曰陛下父事天母事地子養黎民即位已来父虧明母震動子訛言相驚恐今日蝕於三始正月一日為嵗之朝月之朝日之朝始曰朝也誠可畏懼小民正月朔日尚恐毁敗噐物何況於日虧乎陛下深内自責避正殿舉直言求過失罷退外親及旁庂素餐之人徴拜孔光為光禄大夫發覺孫寵息夫躬過惡免官遣就國衆庶歙然莫不說喜天人同心人心說則天意觧矣乃二月丙戌白虹虷日連隂不雨此天有憂結未觧民有怨望未塞者也侍中駙馬都尉董賢本無葭莩之親葭莩喻輕薄而附著也但以令色諛言自進令善也䛕謟也賞賜無度竭盡府藏并合三第尚以為小復壊暴室時以三第捴為一第賜賢猶嫌陋小復取暴室之地以增益之也賢父子坐使天子使者将作治第行夜吏卒皆得賞賜為賢第上時時行夜者上冡有㑹輙大官為供海内貢獻當養一君今反盡之賢家豈天意與民意邪天不可久負厚之如此反所以害之也誠欲哀賢宜為謝過天地觧讎海内免遣就國收乗輿噐物還之縣官如此可以父子終其性命不者海内之所仇未有得久安者也孫寵息夫躬不宜居國可皆免以視天下復徴何武師丹彭宣傅喜曠然使民易視以應天心易改也建立大政以興太平之端髙門去省戸數十歩求見出入二年未省不被省視也欲使海瀕庂陋自通逺矣瀕涯也願賜數刻之間刻漏刻也間空隙也極竭毣毣之思毣毣猶蒙蒙也如淳曰謹厚之貌也退入三泉死亡所恨三重之泉言其深也帝大感異納宣奏鄭崇字子游哀帝擢為尚書僕射數求見諫諍帝初納用之每見曳革履帝笑曰我識鄭尚書履聲久之帝欲封祖母傅太后從弟商崇諫曰孝成皇帝封親舅五矦天為赤黄晝昏日中有黒氣今祖母從昆弟二人已矦孔卿皇后父為髙武侯以三公封尚有因縁今無故欲復封商壊亂制度逆天人心非傅氏之福也臣聞師曰逆陽者厥極凶短折犯人者有亂亡之患犯神者有疾夭之禍故周公著戒曰惟王不知艱難唯耽樂是從時亦罔有克夀周書亡逸之篇也故衰世之夭折蚤沒此皆犯隂之害也臣願以身命當國咎崇因持詔書案起案即冩詔之文傅太后大怒曰何有為天子乃反為一臣所顓制邪帝竟封焉崇又以董賢事貴寵過度諫繇是重得罪數以職事見責後漢譙𤣥巴郡人成帝時為議郎帝始作期門數為微行立趙飛燕為皇后后専寵懐忌皇子多横夭折𤣥上書諫曰臣聞王者承天繼宗統極保業延祚莫急裔嗣故易有幹蠱之義詩詠衆多之福今陛下聖嗣未立天下屬望而不惟社稷之計専於微行之事愛幸用於所惑曲意留於非正竊聞後宫皇太子産而不育臣聞之怛然痛心傷剥竊懐憂國不忘湏㬰夫警衛不修則患生非常忽有醉酒狂夫分争道路既無尊嚴之儀豈識上下之别此為胡狄起於轂下而賊亂發於左右也願陛下念天下之至重愛金玉之身均九女之施存無窮之福天下幸甚銚期為衛尉光武嘗輕輿期門近出期頓首車前曰臣聞古今之戒變生不意誠不願陛下微行數出帝為之回輿而還郅惲為上東城門矦光武嘗出獵車駕夜還惲拒關不䦕乃從東門入明日惲上書諫曰昔文王不敢槃于游田以萬人為憂而陛下逺獵上林夜以繼晝其如社稷宗廟何暴虎馮河未至之戒誠小臣所竊憂也書奏賜布百匹貶東中門矦為參封尉蔡茂為廣漢太守時雒陽令董宣舉糾湖陽主光武始怒收宣既而赦之茂喜宣剛正欲令朝廷禁制貴戚乃上書曰臣聞興化致教必繇進善康國寧人莫大理惡陛下聖徳係興再隆大命即位以来四海晏然誠宜夙興夜寐雖休勿休然頃者貴戚椒房之家數因恩勢干犯吏禁殺人不死傷人不論臣恐繩墨棄而不用斧斤廢而不舉近湖陽公主奴殺人西市而與主共輿出入宫省逋罪積日寃魂不報雒陽令董宣直道不顧于主討姦陛下不先證審詔欲加箠當宣受怒之初京師側耳及其蒙宥天下拭目今者外戚憍逸賔客放濫宜勅有司案理姦罪使執平之吏永申其用以厭逺近不緝之情光武納之鄭興為大中大夫建武七年三月晦日蝕興上䟽曰春秋以天反時為菑地反物為妖人反徳為亂亂則妖菑生往年以来讁咎連見意者執事頗有闕焉案春秋昭公十七年夏六月甲戌朔日有食之傳曰日過分而未至三辰有菑於是百官降物君不舉避移時避正寝過日食時也樂用鼔祝用幣史用辭今孟夏純乾用事隂氣未作其菑尤重夫國無善政則讁見日月變咎之来不可不慎其要在因人之心擇人䖏位也堯知鯀不可用而用者是屈己之明因人之心也齊桓反政而相管仲晉文歸國而任郤榖者是不私其私擇人䖏位也今公卿大夫多舉漁陽太守郭伋可大司空者而不以時定道路流言或曰朝廷欲用功臣功臣用則人位繆矣願陛下上師唐虞下覽齊晉以成屈己從衆之徳以濟羣臣讓善之功夫日月交㑹數應在朔而頃年日蝕每多在晦先時而合皆月行疾也日君象而月臣象君亢急則臣下促廹故行疾也今年正月繁霜自爾以来率多寒日此亦急咎之罰天於賢聖之君猶慈父之於孝子也丁寧申戒欲其反政故菑變仍見此乃國之福也今陛下髙明而羣臣惶促宜留思柔克之政埀意洪範之法博採廣諫羣下之策書奏多有所納桓譚為議郎給事中時光武信䜟多以決定嫌疑又醻賞少薄天下不時安定譚上䟽曰前獻瞽言未蒙詔報臣欽若等曰譚先上䟽陳時政所宜事具規諫門不勝憤懣冒死復陳愚夫策謀有益於正道者以合人心而得事理也凡人情忽於見事而貴於異聞觀先王之所記述咸以仁義正道為本非有竒怪虚誕之事盖天道性命聖人所難言也自子貢以下不得而聞況後世淺儒能通之乎今諸巧慧小才伎數之人増益圗書矯稱䜟記以欺惑貪邪詿誤人主焉可不抑逺之哉臣譚伏聞陛下窮折方士黄白之術甚為明矣而乃欲聽納䜟記又何誤也其事雖有時合譬猶卜數隻偶之類陛下宜垂明聽發聖意屏羣小之曲說述五經之正義畧靁同之俗語觧通人之雅謀又臣聞安平則尊道術之士有難則貴介胄之臣今聖朝興復祖統為人臣主而四方盜賊未盡歸伏者此權謀者未得也臣譚伏觀陛下用兵諸所降下既無重賞以相恩誘或至虜掠奪其財物是以兵長渠率各生狐疑黨軰連結嵗月不觧古人有言曰天下皆知取之為取而莫知與之為取陛下誠能輕爵重賞與士共之則何招而不至何說而不釋何向而不開何征而不尅如此則能以狭為廣以遲為速亡者復存失者復得矣帝省奏愈不恱陳元以才髙著名辟司空李通府時大司農江馮上言宜令司𨽻校尉督察三公事下三府元上䟽曰臣聞師臣者帝賔臣者覇故武王以太公為師齊桓以夷吾為仲父孔子曰百官摠已聽冡宰近則髙帝優相國之禮太宗假宰輔之權及亡新王莽遭漢中衰専操國柄以偷天下況已自喻不信羣臣奪公輔之任損宰相之威以刺舉為明徼訐為直至乃陪僕告其君長子弟變其父兄罔宻法峻大臣無所措手足然不能禁董忠之謀身為世戮故人君患在自驕臣失在自任不在任人是以文王有日昃之勞周公執吐握之恭不聞其崇刺舉務篤察也方今四方尚擾天下未一百姓觀聽或張耳目陛下宜修文武之聖典襲祖宗之遺徳勞心下士屈節待賢誠不宜使有司察公輔之名帝從之宣下其議楊終為蘭臺校書章帝建初元年大旱穀貴終以為廣陵楚淮陽濟南之獄徒者萬數又逺屯絶域吏民怨曠乃上䟽曰臣聞善善及子孫惡惡止其身百王帝典不易之道也秦政酷烈違誤天心一人有罪延及三族髙祖平亂約法三章太宗至仁除去收孥萬姓廓然蒙被更生澤及昆蟲功埀萬世陛下聖明徳被四表今以比年久旱菑疫未息躬自菲薄廣訪失得三代之隆無以加焉臣切按春秋水旱之變皆應暴急惠不下流自永平以来仍連大獄有司窮考轉相牽引掠拷寃濫家屬徙邉加以北征匈奴西開三十六國頻年服役轉輸煩費又逺屯夷吾樓蘭車師戊巳民懐土思歸怨結邉域傳曰安土重居謂之衆庶昔殷民近遷雒邑且猶怨望何況去中國之肥饒寄不毛之荒極乎且南方暑濕瘴毒互生愁困之民足以感動天地移變隂陽矣陛下留念省察以濟元元書奏帝下其章司空第五倫亦同終議太尉牟融司徒鮑昱校書郎班固等難論以施行既久孝子無改父之道先帝所建不宜回異終復上書曰秦築長城功役繁興胡亥不革卒亡四海故孝元棄珠崖之郡光武絶西域之國不以介鱗易我衣裳魯文公毁泉䑓春秋譏之曰先祖為之而已毁之不如勿居而已以其無妨害於民也襄公作三軍昭公舎之君子大其復古以為不舎則有害於民也今夷吾之役樓蘭之屯久而未還非天意也帝從之聽還徙者悉罷邉屯宋意為尚書章帝性寛仁而親親之恩篤故叔父濟南中山二王每數入朝特加恩寵及諸昆弟並留京師不遣就國意以為人臣有節不宜踰禮過恩乃上䟽諫曰陛下至孝烝烝恩愛隆深以濟南王康中山王焉先帝昆弟特蒙禮寵聖情戀戀不忍逺離比年朝見久留京師崇以叔父之尊同之家人之禮車入殿門即席不拜分甘損膳賞賜優渥昔周公懐聖人之徳有致太平之功然後王曰叔父加以錫幣今康焉幸以支庶享食大國陛下即位蠲除前過還所削黜衍食屯縣男女少長並受爵邑恩寵踰制禮敬過度春秋之義諸父昆弟無所不臣所以尊尊卑卑彊榦弱枝者也陛下徳業隆盛當為萬世典法不宜以私恩損上下之序失君臣之正又西平三羡等六王皆妻子成家官屬備具當早就藩國為子孫基趾而室第相望久盤京邑婚姻之盛過於本朝僕馬之衆充塞城郭驕奢僭擬寵禄隆過今諸國之封並皆膏腴風氣平調道路夷近朝聘有期行李不難且割情不忍以義斷恩發遣康焉各歸藩國令羡等速就便時以塞衆望帝納之魯恭為侍御史和帝初立議遣車騎将軍竇憲與征西将軍耿秉擊匈奴恭上䟽諫曰陛下親勞聖恩日昃不食愛在軍役誠欲以安定兆庶為人除患定萬世之計也臣伏獨思之未見其便社稷之計萬人之命在於一舉數年以来秋稼不熟人食不足倉庫空虚國無畜積㑹新遭大憂人懐恐懼陛下躬大聖之徳履至孝之行盡諒隂三年聽於冡宰百姓闕然三時不聞警蹕之音莫不懐思皇皇若有求而不得今乃以盛春之月興發軍役擾動天下以事戎夷誠非所以垂恩中國改元正時繇内及外也萬民者天之所生天愛其所生猶父母愛其子一物有不得所者則天氣為之舛錯況於人乎故愛人者必有天報昔大王重人命而去邠故獲上天之佑夫戎狄者四方之異氣也蹲夷踞肆與鳥獸無别若雜居中國則錯亂天氣汙辱善人是以聖王之制覊縻不絶而已今邉境無事宜當修仁行義尚於無為令家給人足安業樂産夫人道乂於下則隂陽和於上祥風時雨覆被逺方夷狄重譯而至矣易曰有孚盈缶終来有它吉言甘雨滿我之缶誠来有我而吉已夫以徳勝人者昌以力勝人者亡今凶奴為鮮卑所殺逺蔵於史侯河南去塞數千里而欲乗其虚耗利其微弱是非義之所出也前太僕蔡彤逺出塞外卒不見一胡而兵已困矣白山之難不絶如繼都䕶䧟沒士卒死者如積迄今被其辜毒孤寡哀思之心未弭仁者念之以為累恩奈何復欲襲其迹不顧患難乎今始徴發而大司農調度不足所以使者在道分部督趣上下相迫民間之急亦已甚矣三輔並涼州少雨麥根枯燋牛死日甚此其不合天心之效也羣僚百官咸曰不可陛下獨奈何以一人之計棄萬人之命不䘏其言乎上觀天心下察人志足以知事之得失臣恐中國不為中國豈徒匈奴而已哉惟陛下留聖恩休罷士卒以順天心書奏不從何敞為侍御史時車騎将軍竇憲大發軍擊匈奴而詔使者為憲弟篤景並起邸第興造勞役百姓愁苦敞上䟽諫曰臣聞匈奴之為桀逆久矣平城之圍慢書之恥此二辱者臣子所為捐軀而必死髙祖吕后忍怒還忿舍而不誅伏惟皇太后秉文母之操陛下履晏晏之姿匈奴無逆節之罪漢朝無可慙之恥而盛春東作興動大役元元怨恨咸懐不恱而猥復為衛尉篤奉車都尉景繕修館第彌街絶里臣雖㪷筲之人誠竊懐怪以為篤景親近貴臣當為百僚表儀今衆軍在道朝廷焦脣百姓愁苦縣官無用而遽起大第崇飾玩好非所以垂令徳示無窮也宜且罷工匠専憂北邉恤人之困書奏不省後拜為尚書復上封事曰夫忠臣憂世犯主嚴言譏刺貴臣至以殺身滅家而猶為之者何邪君臣義重有不得已也臣伏見往事國之危亂家之将凶皆有所由較然易知昔鄭武姜之幸叔叚衛荘公之寵州吁愛而不教終至凶戾由是觀之愛子若此猶饑而食之以毒適所以害之也伏見大将軍憲始遭大憂公卿比奏欲令典幹國事憲深執謙退固辭盛位懇懇勤勤言之深至天下聞之莫不恱喜今踰年無㡬大禮未終卒然中改兄弟尃朝憲秉三軍之重篤景捴宫衛之權而虐用百姓奢侈僭偪誅戮無罪肆心自快今者論議凶凶咸謂叔叚州吁復生於漢臣觀公卿懐持兩端不肯極言者以為憲等若有匪懈之志則已受吉甫褒申伯之功如憲等䧟於罪辜則自取陳平周勃順吕后之權終不以憲等吉凶為憂也臣敞區區誠欲計策兩安絶其綿綿塞其㳙㳙上不欲令皇太后損文母之號陛下有誓泉之譏下使憲等得長保其福祐然臧獲之謀上安主父下存主母猶不免於嚴怒臣伏惟累祖蒙恩迄臣八世復以愚陋旬年之間歴顯位備機近每念厚徳忽然忘生雖知言必夷滅而冒死自盡者誠不忍目見其禍而懐默茍全駙馬都尉瓌雖在弱冠有不隱之忠比請退身願抑家權可與參謀聽順其意誠宗廟至計竇氏之福也樂恢為尚書僕射竇憲兄弟放縱恢上䟽諫曰臣聞百王之失皆繇權移於下大臣持國嘗以執盛為咎伏念先帝聖徳未永早棄萬國陛下富於春秋纂承大業諸舅不宜幹正王室以示天下之私經曰天地乖𤣥衆物夭傷君臣失序萬人受殃政失不救其極不測方今之宜上以義自割下以謙自引四舅可長保爵土之榮皇太后永無慙負宗廟之憂誠策之上者也書奏不省時竇太后臨朝和帝未親萬機恢以意不得行乃稱疾乞骸骨詔賜錢太醫視疾恢薦任城郭城均陽髙鳯而遂稱篤拜騎都尉上書辭謝曰臣受厚恩無以報效夫政在大夫孔子所疾世卿持權春秋以戒聖人懇惻不虚言也近世外戚富貴必有驕溢之敗今陛下思慕山陵未遑政事諸舅寵盛權行四方若不能自損誅罰必加臣夀命垂盡臨死竭愚惟留神詔聽上印綬乃歸鄉里唐羗和帝時為臨武長交州舊以龍眼荔支及生鮮獻之驛馬晝夜傳送之至有遭虎狼毒害頓仆死亡不絶道經臨武羗上書諫曰臣聞上不以滋味為徳下不以貢膳為功故天子食大牢為尊不以果實為珍伏見交趾七郡獻生龍眼等馬驚風發南州土地惡蟲猛獸不絶於路至於觸犯死亡之害死者則不可復生来者猶可救也此二物升殿未必延年益夀帝從其奏而罷之翟酺為尚書安帝始親政事追感祖母宋貴人悉封其家又元舅耿寳及皇后兄弟閻顯等並用威權酺上䟽諫曰臣聞微子佯狂而去殷叔孫通背秦而歸漢彼非自踈其君時不可也臣荷殊絶之恩蒙值不諱之政豈敢雷同受寵而以戴天履地伏惟陛下應天履祚歴值中興當建太平之功而未聞致化之道盖逺者難明請以近事徴之昔竇鄧之寵傾動四方兼官重紱盈金積貨至使議弄神噐改更社稷豈不以勢尊威廣以致斯患乎及其破壊頭顙堕地願為孤豚豈可得哉夫致貴無漸失必暴受爵非道殃必疾今外戚寵幸功均造化漢元以来未有等比陛下誠仁恩周洽以親九族然禄去公室政移私門覆車重尋寜無摧折而朝臣在位莫肯正議翕翕訾訾更相佐附臣恐威權外假歸之良難虎翼一奮卒不可制故孔子曰珠吐於澤誰能不舎老子稱國之利噐不可以示人此最安危之極戒社稷之深計也夫儉徳之恭政存約節故文帝愛百金於露䑓飾帷帳於皂􅌩或有譏其儉者上曰朕為天下守財耳豈得妄用之哉至倉榖腐而不可食錢貫朽而不可較今自初政已来日月未久費用賞賜已不可算歛天下之財積無功之家帑藏單盡民物彫傷卒有不虞復當重賦百姓怨叛既生危亂可待也昔成王立政周公在前召公在後畢公在左史佚在右四子挟而維之目見正容耳聞正言一日即位天下曠然言其法度素定也今陛下有成王之尊而無四子之佐雖欲崇雍熙致太平其可得乎自去年以来菑譴頻數地拆天隳髙岸為谷修身恐懼則轉禍為福輕慢天戒則其害彌深願陛下親自勞䘏研精致思勉求忠貞之臣誅逺佞諂之黨損玉堂之盛尊天爵之重割情欲之歡罷晏私之好帝王圖籍陳列左右心存亡國所以失之鑒觀興王所以得之庶菑害可息豐年可招矣書奏不省而外戚寵臣咸惡之陳忠為尚書僕射安帝數遣黄門常侍及中使伯榮伯榮帝乳母王煙女往来甘陵而伯榮負寵驕蹇所經郡國莫不迎為禮謁又霖雨積時河水涌溢百姓騷動忠上䟽曰臣聞位非其人則庶事不叙庶事不叙則政有得失政有得失則感動隂陽妖變為應陛下每引菑自厚不責臣司臣司狃恩莫以為負故天心未得隔并屢臻青冀之域淫雨漏河徐岱之濵海水坌溢兖豫蝗蝝滋生蝝蟲子也荆揚稻収儉薄并涼二州羌戎叛戾加以百姓不足府帑虚匱自西徂東杼柚将空臣聞洪範五事一曰貎貎以恭恭作肅貎傷則狂而致常雨春秋大水皆為君上威儀不穆臨蒞不嚴臣下輕慢貴倖擅權隂氣盛彊陽不能禁故為淫雨陛下以不得親奉孝徳皇園廟比遣中使致敬甘陵朱軒軿馬相望道路可謂孝至矣然臣竊聞使者所過威權翕赫震動郡縣王矦二千石至為伯榮獨拜車下儀體上僭侔於人主長吏惶怖譴責或邪諂自媚發人修道繕理亭傳多設儲跱徴役無度老弱相随動有萬計賂遺僕從人數百匹頓踣吁嗟莫不叩心河間託叔父之屬清河有陵廟之尊及剖符大臣皆猥為伯榮屈節車下陛下不問必以陛下欲其然也伯榮之威重於陛下陛下之柄在於臣妾水菑之發必起於此昔韓嫣託副車之乗受馳視之使江都誤為一拜而嫣受歐刀之誅臣願明主嚴天元之尊正乾剛之位職事巨細皆任賢能不宜復令女使干錯萬機重察左右得無石顯泄漏之姦尚書納言得無趙昌譖崇之詐公卿大臣得無朱博阿傳之援外屬近戚得無王鳯害商之謀若國政一繇帝命王事每决於己則下不得偪上臣不得干君常雨大水必當霽止四方衆異不能為害書奏不省時三府任輕機事専委尚書而菑𤯝變咎動輙免公台忠以為非國舊體上䟽諌曰臣聞君使臣以禮臣事君以忠故三公稱曰冡宰王者待以殊敬在輿為下御坐為起入則參對而議政事出則監察而董是非漢典舊事丞相所請靡有不聽今之三公雖當其名而無其實選舉誅賞一繇尚書尚書見任重於三公陵遲以来其漸久矣臣忠常獨不安是故臨事戰懼不敢冗見有所興造冗見言不廣也又不敢希意同僚以謬平典而謗讟日聞罪足萬死近以地震策免司空陳褒今者菑異復欲切譲三公昔孝成皇帝以妖星守心移咎丞相使賁麗納說方進方進自引卒不蒙上天之福徒乖宋景之誠故知是非之分較然有歸矣又尚書决事多違故典罪法無例詆欺為先文㠁言醜有乖章憲宜責求其意剖而勿聽上順國典下防威福置方圎於規矩審輕重於衡石誠國家之典萬世之法也冊府元龜卷五百三十六
