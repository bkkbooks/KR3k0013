body:
  text: 册府元龜卷六百九宋王欽若等撰刑法部總序折獄致刑著於羲易維明克允載於虞書斯則制治在乎勅去勅法在乎得人之義也舜以臯陶作士故尚書云臯陶作士明於五刑以弼五教又謂之大理故文子曰臯陶喑而為大理天下無虐刑夏商之制無聞周制大司冦掌建邦之三典以佐王刑邦國詰四方小司冦以五刑聽萬民之獄訟士師掌五禁之法以左右刑罰鄉士遂士縣士方士各聽其所治獄訟司刑掌五刑之法以麗萬民之罪司刺掌三刺三宥三赦之法以賛司冦聽獄訟掌囚掌守囚及刑殺掌戮掌斬殺司𨽻掌囚執人布憲掌邦之刑禁皆治刑之官也列國有士師論語所謂孟氏使陽膚為士師也亦謂之理韓詩外傳所謂李離為晉文公大理也秦制廷尉掌刑辟秩二千石古者兵獄同制故謂之尉漢制尚書三公曹主斷獄二千石曹掌中都官盗賊辭訟罪法亦謂之賊曹又御史屬官有法令曹掌律令廷尉秩中二千石有正及左右監秩皆千石景帝中六年更名大理武帝建元四年復為廷尉宣帝地節三年初置左右平秩皆六百石掌平詔獄冠法冠哀帝元夀二年復為大理自孝武而下置中都官獄三十六所各有令長之名如宗正領都司空令丞主置罪人少府領若盧令丞主詔獄治將相大臣之類也又置繡衣直指出討姦猾治大獄不常置其有大獄則令雜治如王嘉致都船詔獄使將軍以下與二千石雜治之類也其次即令就問如廷尉請捕衡山王遣中尉大行即問之類也其當罪又令雜議如淮南王所犯不軌丞相御史宗正廷尉雜奏又詔列侯吏二千石議是也後漢置治書侍御史選髙第明法律者為之天下讞疑事則以法律當其是非廷尉卿中二千石掌平獄刑罰奏當所應凡郡國讞疑罪皆處當以報員吏百四十人又省右平尚存左平又罷中都官以下諸詔獄獨廷尉及雒陽縣有焉魏武初建國改廷尉為大理又置律博士又置定科郎主定法令都官郎主軍事刑獄黄初元年復以大理為廷尉晉制初以三公尚書掌刑獄太康中省之以吏部尚書領刑獄又廷尉主刑罰獄訟屬官有正監平通視南臺治書為尚書郎下遷又有律學博士又置黄沙獄治書侍御史秩與中丞同掌詔獄及廷尉不當者皆治之後省去咸寧中又置廷尉丞宋増置都官尚書掌京師非違兼掌刑獄又増置刪定郎如魏之定科郎齊廷尉置丞正監平律博士各一人梁初曰大理天監元年復為廷尉廷尉視秘書監丞視皇子行佐正視正王佐正監平三人比舊選少重服獬豸冠綘幘皂衣銅印墨綬又置建康縣獄三官視給事中以尚書郎為之冠服同廷尉三官元㑹廷尉三官與建康三官皆法官皂衣朝服以監東西中華門手執方木長三尺方一寸謂之執方器又置律博士視員外郎後魏孝文太和中廷尉卿品第二上少卿品第三上正監評丞品第五中獄掾品從第七下二十三年復次職令廷尉品第三少卿品第四正監評品第六丞品第七永安二年復置司直十人視五品上不署曹事覆治御史簡劾事北齊大理寺决正刑獄卿屬官正監平各一人律博士四人明法掾二十四人捉事督二十四人掾十人獄丞掾各二人司直明法掾各二人後周依周禮建六官有司冦卿領秋官府司冦等衆職又有刑部中大夫掌五刑之法附萬人之罪隋文帝改周六官依前代之法復置都官尚書侍郎後改為刑部復置大理寺卿少卿正監平各一人司直十人律博士八人明法二十人獄掾八人卿正三品少卿正四品正監評正六品律博士正九品煬帝又改丞為勾檢官増置十六人分判獄事唐制御史大夫中丞掌邦國刑憲典章其屬侍御史掌推鞫獄訟謂之東西推凡有别勅付推者則按其實狀以奏尋常之獄推訖斷於大理興元元年又詔殿中侍御史同知東西推分日受事謂之四推置刑部尚書一人侍郎一人掌天下刑法及徒𨽻勾覆關禁之政其屬刑部郎中員外各二人掌貳尚書侍郎舉其典憲而辨其輕重都官郎中員外各二人掌配𨽻簿錄俘囚以給衣糧藥瘡以理訴競雪寃尚書正三品侍郎正四品郎中竝正五品員外竝正六品龍朔三年改刑部尚書曰司刑大常伯侍郎曰少常伯郎中為大夫都官為司僕咸亨元年復為刑部光宅元年改為秋官神龍元年復舊又置大理卿一人少卿二人掌邦國折獄詳刑之事明慎以讞疑獄哀矜以雪寃獄公平以鞫庶獄正二人掌叅議刑獄正科條之事六丞斷罪不當則駁正之丞六人掌分判寺事凡有犯皆據其本狀以正刑名凡六丞判尚書六曹所統百司及諸州之務其刑部丞常押獄每一丞斷事五丞同押若有異見則各言之主簿二人掌勾檢稽失凡官吏之負犯并雪寃者則據所由文牒而立簿焉獄丞三人掌率獄史知囚徒司直六人評事十二人掌出使卿從三品少卿從四品正從五品丞從六品主簿從七品獄丞從九品司直從六品評事從八品龍朔二年改為詳刑寺卿為正卿正為大夫咸亨元年復為大理光宅元年改為司刑神龍元年復故凡吏曹補署法官則與刑部尚書侍郎議其人可否然後主擬若存制使覆囚徒則御史大夫中丞與刑部尚書叅擇之凡天下之人有稱寃而無告者御史大夫與中書門下為三司以鞫之大事奏裁小事專達三司雖按而非其長官則侍御史與刑部郎中員外大理司直評事往訊之五代因之厯代丞相三公刺史守相令長之從事掾屬其孚刑獄則有决曹辭曹賊曹法曹司法長流刑獄之類焉夫律令者國之衡石刑辟者人之銜轡故王者慎其事擇其官以成欽恤之心以致平反之治然後上靡苛政下無寃民庶獄清而善氣應其由兹乎故類其善政自成一編凡刑罰部九門定律令古先哲王即天論緣民情為之刑罰威獄以類其震曜殺戮焉盖所以防邪辟御奸宄禁其踰矩以佐乎治者也唐虞而下制事典以為律度作法令而一民志隨世輕重沿革斯在然而周設三典施用既殊漢増九章條目寖廣晉魏之後或損益殊制繁簡異宜載之討論有所刋定救時之弊乃至於申嚴濟民之殘式從乎寛裕杜周所謂三尺法亦何常之有哉若夫令出惟行周書之攸慎用刑不中仲尼之所譏自非協於大中而較若畫一又曷能御下而濟衆者乎堯命伯夷降典折民維刑伯夷下典禮教民而斷以法舜既攝政象以典刑象法也法用常刑用不越法流宥五刑宥寛也以流放之法寛五刑鞭作官刑以鞭為治官事之刑扑作教刑扑夏楚也不勤道業則撻也金作贖刑金黄金誤而入刑出金以贖罪𤯝灾肆赦怙終賊刑𤯝過災害肆緩賊殺也過而有害當緩赦之怙姦自然當刑殺之欽哉欽哉惟刑之恤哉舜陳典刑之義勅天下使敬之憂欲得衆耳周成王時周公旦作周禮述大司冦之職掌建邦之三典以佐王刑邦國詰四方典法也詰謹也書曰王髦荒度作祥刑以詰四方一曰刑新國用輕典新國者新辟地立君之國用輕法者為其民未習於教二曰刑平國用中典平國承平守成之國也用中典者常行之法三曰刑亂國用重典亂國簒弑叛逆之國用重典者以其化惡伐滅之以五刑糾萬民刑亦法也糾猶察異之一曰野刑上功糾力功農功力勤力二曰軍刑上命糾守命将命也守不失部伍三曰鄉刑上德糾孝德六德也善事父母為孝四曰官刑上能糾職能能其事也職職事修理五曰國刑上愿糾暴愿慤順也暴當為恭字之誤也以圜土聚教罷民圜土獄城也聚罷民其中困苦以教之為善也民不愍作勞有似於罷凡害人者寘之圜土而施職事焉以明刑恥之害人謂為邪惡已有過失麗於法者以其無故犯法寘之圜土繫教之庶其困悔而能改也寘置也施職事以所能役之明刑書其罪惡於大方版著其背其能改者反於中國不齒三年反於中國謂舍之還故鄉里也司圜職曰上罪三年而舍中罪二年而舍下罪一年而舍不齒者不得以年次列於平民其不能改而出圜土者殺出謂逃亡其屬小司冦掌外朝之政凡命夫命婦不躬坐獄訟為治獄吏䙝尊者也躬身也不身坐必使其屬若子弟也凡王之同族有罪不即市鄭司農云刑諸甸師氏禮記曰刑於隠者不與國人慮兄弟以五聲聽獄訟求民情一曰辭聽觀其出言不直則煩二曰色聽觀其顔色不直則赧然三曰氣聽觀其氣息不直則喘四曰耳聽觀其聽聆不直則惑五曰目聽觀其眸子視不直則眊然以八辟麗邦法附刑罰辟法也麗附也一曰議親之辟若今時宗室有罪先請是也二曰議故之辟故謂舊知也三曰議賢之辟若今時㢘吏有罪先請是也鄭𤣥謂賢有德行者四曰議能之辟能謂有道藝者五曰議功之辟謂有大勲力立功者六曰議貴之辟爵位髙者七曰議勤之辟謂憔悴以事國八曰議賔之辟謂所不臣者三恪二代之後司刺掌三刺三宥三赦之法以贊司冦聽獄訟刺殺也訊而有罪則殺之宥寛也赦舍也一刺曰訊羣臣再刺曰訊羣吏三刺曰訊萬民訊言也一宥曰不識再宥曰過失三宥曰遺忘不識謂愚民無所識則宥之過失若今律過以失殺人不坐死遺忘若間帷簿忘有在焉而兵矢投射之一赦曰幼弱再赦曰老耄三赦曰蠢愚蠢愚生而癡騃童昬者㓜弱老髦若今時律年未滿八嵗八十以上非手殺人佗皆不坐以此三法者求民情斷民中而施上服下服之罪然後刑殺上服殺與墨劓下服宫刖也掌囚掌守盗賊凡囚上罪梏拲而桎中罪梏桎下罪梏王之同族拲有爵者桎以待弊罪械在手曰梏兩手同械曰拲在足曰桎弊猶斷也司刑掌五刑之法以麗萬民之罪墨罪五百劓罪五百宫罪五百刖罪五百殺罪五百墨黥也先刻其面以墨窒之劓截其鼻也宫者丈夫去勢女子閉扵宫中刖斷足也周改臏作刖殺死刑也書傳曰决關梁踰城郭而畧盗者其刑臏男女不以義交者其刑宮觸易君命革輿服制度姦軌盗攘傷人者其刑劓非事而事之出入不以道義而誦不祥之辭者其刑墨降叛冦賊刼略奪攘矯䖍者其刑死此二千五百罪之目略也其刑書則亡掌戮掌斬殺賊諜而搏之搏當為膊去衣磔之也凡殺其親者焚之殺王之親者辜之焚燒也辜之言枯也謂磔也凡殺人者踣諸市踣謂斃之也音妨付切墨者使守門黥面之罪不妨禁衛也劓者便守關以其貌毁故遠之宫者使守内人道既絶於事便刖者使守囿驅御禽獸無足可完者使守積完謂不虧其體但居作也積謂聚之物也司厲其奴男子入於罪𨽻男女徒總名為奴女子入於舂槁舂舂人槁槁人也此二官之役槁音口好切凡有爵者與七十者與未齓者皆不為奴有爵命士以上也齓毀齒也男子八嵗女子七嵗而毁齒矣孔子家語大罪有五而殺人為下逆天地者罪及五代誣鬼神者罪及四代逆人倫者罪及三代亂教化者罪及二代手殺人者罪止及身又曰析言破律亂名改作執左道以亂衆者殺作淫聲造異服設怪伎竒器以蕩上心者殺行偽而固言偽而辯學非而博順非而澤以惑衆者殺假於鬼神時日卜筮以疑人者殺此四誅者不待時以聽穆王時吕侯為司冦作吕刑後為甫侯故或稱甫刑惟呂命王享國百年耄荒言呂侯見命為卿時穆王以享國百年耄亂荒忽穆王即位年過四十矣言百年大期雖老而能用賢以揚名度作刑以詰四方度時世所宜訓作贖刑以治天下四方之民王曰若古有訓蚩尤惟始作亂延及於平民訓古有遺訓言蚩尤造始作亂惡化相易延及於平善之人九黎之君號曰蚩尤罔不冦賊鴟義奸宄奪攘矯䖍平民化之無不相冦賊為鴟梟之義以相奪攘矯稱上命若固有亂之甚苗民弗用靈制以刑惟作五虐之刑曰法三苗之君習蚩尤之惡不用善化民而將以重刑惟為五虐之刑自謂得法蚩尤黄帝所滅三苗帝堯所誅言異世而同惡殺戮無辜爰始淫為劓刵㭬黥三苗之主頑兇苦民敢行虐刑以殺戮無罪於是始大為截人耳鼻㭬隂黥面以加無辜故曰五虐越兹麗刑并制罔差有辭苗民於此施刑并制無罪無差有直辭者言淫濫民興胥漸泯泯棼棼罔中于信以覆詛盟三苗之民凟於亂政起相漸化泯泯為亂棼棼同惡皆無中於信義以反背詛盟之約虐威庶戮方告無辜于上上帝監民罔有馨香德刑發聞惟腥三苗虐政作威衆被戮者萬方各告無罪于天天視苗民無有馨香之行其所以為德刑發聞惟其腥臭皇帝哀矜庶戮之不辜報虐以威遏絶苗民無世在下皇帝堯也哀矜衆被戮者之不辜乃報為虐者以威誅遏絶苗民使無世位在下國也乃命重黎絶地天通罔有降格重即羲黎即和堯命羲和世掌天地四時之官使人神不擾各得其序是謂絶地天通言天神無有降地地祇不至扵天民不相干羣后之逮在下明明棐常鰥寡無盖諸侯之逮在下國家以明明大道輔行常法故使鰥寡得所無有掩盖皇帝清問下民鰥寡有辭于苗帝堯詳問民患皆有辭怨于苗民德威惟畏德明惟明言堯監苗民之見怨則又増修其德行威則民畏服明賢則德明人之所以無能名焉乃命三后恤功于民伯夷降典折民惟刑禹平水土主名山川稷降播種農殖嘉榖伯夷下典禮教民而㫁以法禹治洪水山川無名者主名之后稷下教民播種農畆生善榖所謂堯命三后憂功扵民三后成功惟殷于民各成其功惟所以殷盛於民言禮教備衣食足士制百姓于刑之中以教祗德言伯夷道民典禮斷之以法臯陶作士制百姓于刑之中助成道化以教民為敬德穆穆在上明明在下灼于四方罔不惟德之勤堯行恭敬在上三后之徒秉明德明君道扵下灼然彰著四方故天下之士無不惟德之勤故乃明于刑之中率乂于民棐彛天下皆勤立徳教乃能明扵用刑之中正循道以治扵民輔成常教典獄非訖于威惟訖于富言堯時主獄有威有德有恕非絶於威惟絶扵富世治貨賂不行敬忌罔有擇言在身堯時典獄皆能敬其職忌其過故無有可擇之言在其身惟克天德自作元命配享在下凡明扵刑之中無擇言在身必是惟能天德自為天命配享天意在扵天下王曰嗟四方司政典獄非爾惟作天牧主政典獄謂諸侯也非汝為天牧民乎言任重是汝今爾何監非時伯夷播刑之廸言當視伯夷布刑之道而法之其今爾何懲惟時苗民匪察于獄之麗其今汝何懲戒乎所懲戒惟是苗民非察扵獄之施刑以取滅亡罔擇吉人觀于五刑之中惟時庶威奪貨言苗無肯選擇善人使觀視五刑之中正惟是衆為威虐者任之奪取人貨所以為亂斷制五刑以亂無辜上帝不蠲降咎于苖苗民任貨奪姦人斷制五刑以亂加無罪天不潔其所為故下咎罪謂誅之苗民無辭于罰乃絶厥世言罪重無以辭扵天罰故堯絶其世申言之為至戒王曰嗚呼念之哉念以伯夷為法苗民為戒伯父伯兄仲叔季弟幼子童孫皆聽朕言庶有格命皆王同姓有父兄弟子孫列者伯仲叔季順少長也舉同姓包異姓言不殊也聽從我言庶幾有至命今爾罔不由慰日勤爾罔或戒不勤今汝無不用安自居日當勤之汝無有徒念戒而不勤天齊于民俾我一日非終惟終在人天整齊扵下民使我一日所行非為天所終惟為天所終在人所行爾尚敬逆天命以奉我一人雖畏勿畏雖休勿休汝當庶㡬敬逆天命以奉我一人之行事雖見畏勿自謂可敬畏雖見美勿自謂有德美惟敬五刑以成三德一人有慶兆民頼之其寧惟永先戒以勞謙之德次教以惟敬五刑所以成剛柔正直之三德也天子有善則兆民賴之其乃安寕長久之道王曰吁來有邦有土告爾祥刑吁嘆也有國土諸侯告汝以善用刑之道在今爾安百姓何擇非人何敬非刑何度非及在今汝安百姓兆民之道當何所擇非惟吉人乎當何所敬非惟五刑乎當何所度非惟及時輕重所宜乎兩造具備師聽五辭両謂両證造至也両至具備則獄官其聽其人五刑之辭五辭簡孚正于五刑五辭簡核信有罪驗則正之於五刑五刑不簡正于五罰不簡核謂不應五刑當正五罰出金贖罪五罰不服正于五過不服不應罰也正于五過從赦免五過之疵惟官惟反惟内惟貨惟來五過之所病或嘗同官位或詐反囚辭或内親用事或行貨枉法或舊相往來皆病所在其罪惟均其審克之以病所在出入人罪使在五過罪與犯五法者同其當清察能使之不行五刑之疑有赦五罰之疑有赦其審克之刑疑赦從罰罰疑赦從免其當清察能得其理簡孚有衆惟貌有稽簡核誠信有合衆心惟察其貌有所考合重刑之至無簡不聽具嚴天威無簡核誠信不聽理其獄皆當嚴天威無輕用刑墨辟疑赦其罰百鍰閲實其罪刻其額而湼之曰墨刑疑則赦從罰六兩曰鍰鍰黄鐵也閲實其罪使與罰各相當劓辟疑赦其罰惟倍閲實其罪截鼻曰劓刑倍百為二百鍰剕辟疑赦其罰倍差閲實其罪刖足曰剕倍差謂倍差之又半為五百鍰宫辟疑赦其罰六百鍰閲實其罪宮淫刑也男子割勢婦人幽閉次死之刑序五刑先輕轉至重者事之宜大辟疑赦其罰千鍰閲實其罪死刑也五刑疑各入罰不降相因古之制也墨罰之屬千劓罰之屬千剕罰之屬五百宫罰之屬三百大辟之罰其屬二百五刑之屬三千别言罰屬合言刑屬明刑罰同屬互見其義以相備上下比罪無僭亂辭勿用不行上下比方其罪無聽僭亂之辭以自疑勿用折獄不可行惟察惟法其審克之惟當清察罪人之辭附以法理其當詳審能之上刑適輕下服重刑有可以虧減則之輕服下罪下刑適重上服輕重諸罰有權一人有二罪則之重而輕并數輕重諸刑罰各有權宜刑罰世輕世重惟齊非齊有倫有要言刑罰隨世輕重也刑新國用輕典刑亂國用重典刑平國用中典凡刑所以齊非齊各有倫理有要害罰懲非死人極于病刑罰所以懲過非殺人欲使惡人極于病苦莫敢犯者非佞折獄惟良折獄罔非在中非口才可以折獄惟平良可以折獄無不在中正察辭于差非從惟從察囚辭其難在于差錯非從其偽辭惟從其本情哀敬折獄明啟刑書胥占咸庶中正當憐下人之犯法敬斷獄之害人明開刑書相與占之使刑當其罪皆庶幾必得中正之道其刑其罰其審克之其所刑其所罰其當詳審能之無失中正獄成而孚輸而孚斷獄成辭而信當輸汝信扵王謂上其鞫劾文辭其刑上備有并兩刑其斷獄文書上王府皆當備具有并兩刑亦具上之王曰嗚呼敬之哉官伯族姓朕言多懼敬之哉告使敬刑官長諸侯族同族姓異姓我言多可戒懼以敬之朕敬于刑有德惟刑我敬于刑當使有德者為典刑今天相民作配在下明清于單辭今天治民人君為配天在下當承天意聽訟當清審單辭單辭特難聽故言之民之亂罔不中聽獄之兩辭民之所以治由典獄之無不以中正聽獄之兩辭兩辭棄虚從實刑獄清則民治無或私家于獄之兩辭典獄無敢有受貨聽詐成私家扵獄之兩辭獄貨非寶惟府辜功報以庶尤受獄貨非家寶也惟聚罪之事其報則以衆人見罪永畏惟罰非天不中惟人在命當長畏懼惟為天所罰非天道不中惟人在教命使不中不中則天罰之矣天罰不極庶民罔有令政在于天下天道罰不中令衆民無有善政在於天下由人主不中將亦罰之王曰嗚呼嗣孫今往何監非德于民之中尚明聽之哉嗣孫諸侯嗣世世子孫非一自今已往當何監視非當立德於民為之中正乎庶㡬明聽我言而行之哉哲人惟刑無疆之辭屬于五極咸中有慶言智人惟用刑乃有無窮之善辭名聞於後世以其折獄屬五常之中正皆中有善所以然也受王嘉師監于兹祥刑有邦有土受王之善衆而治之者視扵此善刑欲其勤而法之為無疆之辭楚文王作僕區之法曰盗所隠器與盗同罪鄭簡公時子産相鄭鑄刑書鑄刑法於鼎也其後大夫鄧析改鄭所鑄舊制造刑法書之扵竹簡晉趙鞅荀寅帥師城汝濵遂賦晉國一鼔鐵以鑄刑鼎令晉國各出功力共鼓石為鐵計令一鼓而足因軍役而為之著范宣子所為刑書焉秦文公二十年法初有三族之罪父母兄弟妻子也一云父族母族妻族也孝公初衛鞅請變法令令人為什伍而相牧司連坐不告姦者腰斬告姦者與斬敵首同賞匿姦者與降敵同罰為私闘者各以輕重被刑始皇三十四年適治獄吏不直者築長城及南越地漢髙祖初為沛公入咸陽召諸縣豪傑曰父老苦秦苛法久矣誹謗者族偶語者棄市吾與諸侯約先入關者王之吾當王關中與父老約法三章殺人者死傷人及盗抵罪傷人有曲直盗賊有多少故言抵抵者至也當也蠲削秦法兆人大悦然大辟尚有三族之誅先黥劓斬左右趾笞殺之梟其首葅其骨肉於市葅謂醢其誹謗詈詛又先斷舌故謂之具五刑其後四夷未附兵革未息三章之法不足以禦姦禦止也於是相國蕭何攈摭秦法攈音九問切摭音之石切謂収拾也取其宜於時者作律九章七年春令郎中有罪耐以上請之輕罪不至於髠完其鬚鬂故曰耐古耐字從彡髮膚之意也音若能又音而又音乃代切是年制詔御史獄疑者吏或不敢决有罪者久而不論無罪者久繋不决自今已來縣道官獄疑者各讞所屬二千石官二千石官以其罪名當報之當謂處斷也所不能決者皆移廷尉亦當報之廷尉所不能决謹具為奏傅所當比律令以聞傅讀曰附惠帝元年制曰爵五大夫吏六百石以上及宦皇帝而知名者有罪當盗械者皆頌繋宦皇帝而知名者謂雖非五大夫爵六百石吏而蚤事惠帝特為所知者盗械凡有罪著械皆得稱焉山海經貳負之臣相柳之尸皆云盗械其義是也頌與容同上造以上及内外公孫耳孫有罪當刑其當城旦舂者皆耐為鬼薪白粲上造爵滿十六者也内外公孫謂王侯内外孫也耳孫者𤣥孫之子言已遠但耳聞也今已上造有功勞内外孫有骨肉屬施德布惠故事從其輕也城旦者朝起行理城舂者婦人不叅外徭但舂作米皆四嵗刑也今皆就鬼薪白粲鬼薪取薪給宗廟白粲坐擇米使正白皆三嵗刑也人年七十以上若不滿十嵗有罪當刑者免之不加肉刑髠􅚎也􅚎音佗計切謂七十以上及不滿十嵗以下皆免之也四年三月省法令妨吏民者除挾書律挾藏也秦敢有挾書者族呂后元年正月詔曰前者孝惠皇帝言欲除三族罪妖言令議未决今除之文帝元年十二月詔曰丞相太尉御史法者治之正所以禁暴而衞善人今犯法者已論而使無罪之父母妻子同産坐之及為收孥朕甚弗取其議左右丞相周勃陳平奏言父母妻子同産相坐及收所以累其心使重犯法重難也累音力瑞切収之之道所由來久矣臣之愚計以為如其故便帝復曰朕聞之法正則民慤罪當則民從慤謹也音邱角切且夫牧民而道之以善者吏也道讀曰導以善道之也既不能道又以不正之法罪之是法反害於民為暴者也法害於人是法為暴朕未見其便宜熟計之平勃乃曰陛下幸加大惠於天下使有罪不收無罪不相坐甚盛德臣等所不及也臣等謹奉詔盡除收律相坐法後新垣平謀為逆復行三族之誅二年五月詔曰古之治天下朝有進善之旌旌旛也堯設五逹之道令民進善也誹謗之木橋梁邊板所以書政治之愆失也所以通治道而來諫者也今法有誹謗訞言之罪訞與妖同髙后元年詔除妖言之令今此又言訞言之罪是則中間曽重復設此條也是使衆臣不敢盡情而上無繇聞過失也将何以來遠方之賢良其除之民或呪詛上以相約而後相謾謾欺也初為要約共行呪詛後相欺誑中道止無實事也謾音慢又音莫連切吏以為大逆其有他言吏又以為誹謗此細民之愚無知抵死朕甚不取自今已來有犯此者勿聽治五年四月除盗鑄令聽民放鑄也十三年太倉公淳于意以刑罰當傳西之長安意有五女隨而泣意怒罵曰生子不生男緩急無可使者少女緹縈傷父之言乃隨父西上書曰妾父為吏齊中稱其㢘平今坐法當刑妾切痛死者不可復生而刑者不可復續一作贖欲改過自新其道莫由終不可得妾願入身為官婢以贖父刑罪使改行自新也書聞帝悲其意嵗中下令曰制詔御史盖聞有虞氏之時畫衣冠異章服以為戮而民弗犯何治之至也今法有肉刑三黥劓二刖左右趾合一凡三也而姦不止其咎安在非乃朕德之薄而教不明與與讀曰歟吾甚自愧故夫訓道不純而愚民陷焉道讀曰導詩曰愷悌君子民之父母今人有過教未施而刑已加焉或欲改行為善而道亡繇至繇與由同朕甚憐之夫刑至斷支體刻肌膚終身不息息生也何其刑之痛而不德也豈為民父母之意哉其除肉刑有以易之及令罪人各以輕重不亡逃有年而免其不亡逃者滿其年數得免為庶人也具為令使更為條制丞相張蒼御史大夫馮敬奏言肉刑所以禁奸所由來者久矣陛下下明詔憐萬民之一有過被刑者終身不息及罪人欲改行為善而道亡繇至為盛德臣等所不及也臣謹議請定律曰諸當完者完為城旦舂文帝除肉刑皆有以易之故以完易髠以笞代劓以􅎂左右趾代刖今髠曰完矣不復云以完代完也此當言髠者完也當黥者髠鉗為城旦舂當劓者笞三百當斬左趾者笞五百當斬右趾及殺人先自告及吏坐受賕枉法守縣官財物而即盗之已論命復有籍笞罪者皆棄市趾足也當斬右足者以其辠次重故從棄市也罪人獄已决完為城旦舂滿三嵗為鬼薪白粲一嵗為隸臣妾隸臣妾一嵗免為庶人男子為隸臣女子為隸妾鬼薪白粲滿三嵗為隸臣隸臣一嵗免為庶人隸妾亦然也隸臣妾滿二嵗為司㓂一嵗及作如司冦二嵗皆免為庶人罪降為司冦故一嵗正司冦故二嵗也其逃亡及有罪耐以上不用此令於本罪中又重犯者也前令之刑謂文帝作此令之前有刑者城旦舂嵗而非禁錮者如完為城旦舂嵗數以免臣昧死請制曰可是後外有輕刑之名内實殺人斬右趾者又當死斬左趾者笞五百劓者笞三百率多死斬右趾者棄市故人多死以笞五百代斬左趾笞三百代劓笞數既多亦不活也景帝元年七月詔曰吏受所監臨以飲食免重受財物賤買貴賣論輕帝以為當時律條吏受所監臨賂遺飲食即坐免官爵扵法太重而受所監臨財物及賤買貴賣者論决太輕故令更議改之廷尉與丞相更議著令著音著作之著音竹筯切廷尉信謹與丞相議曰丞相申屠嘉信未詳吏及諸有秩受其官屬所監所治所行所将行謂按察也音下更切其與飲食計償費勿論佗物若買故賤賣故貴皆坐贓為盗没入贓縣官吏遷徙免罷受其故官屬所将監治送財物奪爵為士伍免之無爵罰金二斤令没入所受有能捕告畀其所受贓是年詔曰加笞與重罪無異重罪謂死刑幸而不死不可為人其定律笞五百曰三百笞三百曰二百中二年二月改磔曰棄市先此諸死刑皆磔於市今改曰棄市自非妖逆不復磔也磔謂張其尸也棄市斬之扵市也謂之棄市者取刑人扵市與衆棄之也磔音竹客切勿復磔五年九月詔曰法令度量所以禁暴止邪也獄人之大命死者不可復生吏或不奉法令以貨賂為市朋黨比周比音頻寐切以苛為察以刻為明令亡罪者失職朕甚憐之職常也失其常理也有罪者不伏罪奸法為暴甚亡謂也詔諸獄疑若雖文致於法而扵人心不厭者輙讞之厭服也音一贍切讞平議也音魚列切六年十二月定鑄錢偽金棄市律文帝五年聽民放鑄律尚未除先時多作偽金偽金終不可成而徒損費轉相誑燿窮則起為盗賊故定其律也五月詔曰維酷吏奉憲失中加笞者或至死而笞未畢朕甚憐之其减笞三百曰二百笞二百曰一百又笞者所以教之也其定箠令箠䇿也所以擊者也音止蘂切丞相劉舍御史大夫衞綰請笞者箠長五尺其本大一寸其竹也末薄半寸皆平其節當笞者笞臀然則先時笞背也臀音徒門切毋得更人謂行笞者不更易人也畢一罪乃更人自是笞者得全然酷吏猶以為威死刑既重而生刑又輕民易犯之後元年正月詔曰獄重事也人有智愚官有上下獄疑者讞有司有司所不能决移廷尉有令讞而後不當讞者不為失假令讞訖其理不當所讞之人不為罪失三年詔曰髙年老長人所尊敬也鰥寡不屬健人者人所哀憐也屬音之欲切其著令年八十以上八嵗以下及孕者未乳乳産也音人喻切師朱儒師樂師盲瞽者朱儒短人不能走者當鞫繋者頌繋之頌讀曰容寛容之不桎梏死罪欲腐者許之武帝元朔初令大中大夫張湯中大夫趙禹條定法令作見知故縱監臨部主之法見知人犯法不告為故縱而所監臨部主有罪並連坐緩深故之罪故入人罪者皆寛緩之急縱出之誅吏釋罪人疑以為縱出則急深之律令凡三百五十九章大辟四百九條千八百八十二事死罪决事比萬三千四百七十二事比以例相比况宣帝地節四年五月詔曰父子之親夫婦之道天性也雖有患禍猶䝉死而存之誠愛結於心仁厚之至也豈能違之哉自今子首匿父母妻匿夫孫匿大父母皆勿坐其父母匿子夫匿妻大父母匿孫罪殊死皆上請廷尉以聞元康四年正月詔曰朕惟耆老之人髮齒墮落血氣衰微亦亡暴虐之心今或罹文法拘執囹圄不終天命朕甚憐之自今以來諸年八十以上非誣告殺傷人佗皆勿坐元帝初即位下詔曰夫法令者所以抑暴扶弱欲其難犯而易避也今律煩多而不約自典文者不能分明而欲羅元元之不逮羅網也不逮言意識所不及斯豈刑中之意哉其議律令可蠲除輕減者條奏惟在便安萬姓而已初元五年省刑罰七十餘事又除光禄大夫以下至郎中保父母同産之令舊時相保一人有過皆當坐之時為郎中以上除此令者所以全之也同産謂兄弟也成帝河平中詔曰甫刑云五刑之屬三千大辟之罰其屬二百今大辟之刑千有餘條律令煩多百有餘萬言竒請佗比日以益滋竒請謂常文之外主者别有所請以定罪也佗比謂引佗類以比附之稍増律條也竒音居宜切自明習者不知所由由從也欲以曉喻衆庶不亦難乎於以羅元元之民夭絶亡辜豈不哀哉其與中二千石博士及明習律令者議減死刑及可蠲除約省者令較然易知條奏書不云乎惟刑之恤哉其審核之務準古法朕將盡心覽焉時有司不能立明制為一代之法但舉毫毛數事以塞詔而已鴻嘉元年定令年未滿七嵗賊鬬殺人及犯殊死者上請廷尉以聞得減死哀帝以綏和二年四月即位六月詔除誹謗詆欺法詆音丁禮切建平元年盡四年輕殊死者刑八十一事其四十二事手殺人皆减死罪一等著為常法平帝以元夀二年六月即位九月詔曰夫赦令者将與天下更始誠欲令百姓改行潔己全其性命也往者有司多舉奏赦前事累増罪過誅䧟亡辜殆非重信慎刑灑心自新之意也灑滌也音先禮切及選舉者其厯職更事有名之士則以為難保更音工衡切廢而弗舉甚謬於赦小過舉賢才之義諸有贓及内惡未發而薦舉者皆勿按騐有贓謂以贓貨致罪令士厲精鄉進郷讀曰嚮不以小疵妨大材自今以來有司無得陳赦前事置奏上有不如詔書為虧恩以不道論定著令布告天下使明知之元始四年詔曰盖夫婦正則父子親人倫定矣前詔有司復貞婦歸女徒復音方目切誠欲以防邪辟辟謂曰僻全貞信及眊悼之人眊音莫報切刑罰所不加聖王之所制也惟苛暴吏多拘繋犯法者親屬婦女老弱搆怨傷化百姓苦之其明敕百僚婦女非身犯法及男子年八十以上七嵗以下家非坐不道詔所名捕它皆無得繋其當騐者即騐問就其所居而問定著令後漢光武建武三年詔曰吏不滿六百石下至墨綬長相有罪先請續漢志曰縣大者置令一人千石其次置長四百石小者三百石侯國之相亦如之皆掌理人竝秦制男子八十以上十嵗以下及婦女從坐者自非不道詔所名捕皆不得繫詔書有名而特捕者當驗問者即就驗女徒雇山歸家前書音義曰令甲女子犯徒遣歸家每月出錢雇人於山伐木名曰雇山十一年二月己卯詔曰天地之性人為貴其殺奴婢不得减罪八月癸亥詔曰敢炙灼奴婢論如律免所炙灼者為庶民十月壬午詔除奴婢射傷人棄市律十二年十二月詔邉吏力不足戰則守追虜料敵不拘以逗遛法逗是曲行避敵也漢法軍行逗遛畏懦者斬追虜或近或遠量敵進退不拘以軍法直取勝為務也逗古住字十八年四月詔曰今邊郡盗榖五十斛罪至於死開殘吏妄殺之路其蠲除此法同之内郡二十四年七月詔有司申明舊制阿附蕃王法武帝時有淮南衡山之謀作左官之律設附益之法前書音義曰人道尚右言捨天子仕諸侯為左官左僻也阿曲附益王侯者将有重法是為舊制令更申明之章帝建初元年鮑昱為司徒是時辭訟久者至十數年比例輕重非其事類錯雜難知昱奏定辭訟七卷决事都目八卷齊同法令息遏人訟七年九月詔天下繋囚减死一等勿笞詣邊戍妻子自隨占著所在父母同産欲相從者恣聽之有不到者皆以乏軍興論元和元年七月丁未詔曰律云掠者唯得榜笞立榜擊也音彭笞擊也立謂立而考訊之又令丙箠長短有數令丙為篇之次也令有先後有令甲令乙令丙箠長五尺本大一寸其竹也末薄半寸其平去節故云長短有數也自往者大獄以來掠考多酷鉆鑚之屬慘苦無極念其痛毒怵然動心書曰鞭作官刑豈云若此宜及秋冬理獄明為其禁帝初即位尚書陳寵上疏乞改前世苛俗輕薄箠楚以濟羣生全廣至德以奉天心帝納寵言每事務於寛厚至是遂詔有司絶鉆鑚諸慘酷之科蒼頡篇曰鉆持也説文曰鉆鐵鋷也其炎切鋷音陟葉切鑚鑌刑謂鑚去其髕骨也鑚音作喚切解妖惡之禁除文致之請讞五十餘事定著於令十二月詔曰書云父不慈子不祗兄不友弟不恭不相及也往者妖言大獄所及廣遠一人犯罪禁至三屬莫得垂纓仕宦王朝如有賢才而没齒無用朕甚憐之非所謂與之更始也諸以前妖惡禁錮者一皆蠲除之以明棄咎之路但不得在宿衞而已二年七月庚子詔曰春秋扵春每月書王者重三正慎三微也律十二月立春不以報囚報猶論也立春陽氣至可以施生故不論囚月令冬至之後有順陽助生之文月令仲冬是月也日短至陰陽爭諸生蕩君子身欲寧事欲静以待隂陽之所定也而無鞫獄斷刑之政朕咨訪儒雅稽之典籍以為王者生殺宜順時氣其定律無以十一月十二月報囚册府元龜卷六百九
