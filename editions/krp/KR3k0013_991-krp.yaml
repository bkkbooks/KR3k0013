body:
  text: 册府元龜卷九百九十一宋王欽若等撰外臣部偹禦第四唐太宗以武徳九年八月甲子即位是月突厥入冦涇州乙亥突厥冦武功京師戒嚴丙子檢校戸部尚書裴矩等二十餘人各陳禦冦之䇿帝曰朕受天命子育黔首豈使凶徒虐我黎庶朕将禦戎躬親剪撲先事㓕之然後施行公軰不湏為慮也巳邜突厥冦髙陵辛巳行總管尉遅敬徳與突厥戰於涇陽大破之獲其俟斤阿史徳烏沒啜斬首千餘級癸未突厥遣其腹心執失思力入朝為覘自張形勢云二可汗總兵百萬今已至矣乃請反命帝謂之曰我與突厥靣自和親汝則背之我無所愧又義軍入京之初爾父子竝親從我賜爾玉帛前後極多何輙将兵入我畿縣爾雖突厥亦頗有人心何得全忘大㤙自誇強盛我當先戮爾矣思力懼而請命蕭瑀封徳彛等請禮遣之帝曰不然今若放還當謂我懼遂縶思力於門下省于時兵將大集遣瑀徳彛分出慰勞帝出自𤣥武門與侍中髙士亷中書令房𤣥齡將軍周範馳六騎幸渭水之上與可汗隔津而語責以負約其酋帥大驚皆下馬羅拜俄而衆軍繼至精甲曜日連旗蔽野頡利見軍容大盛又知思力就拘相顧色動由是大懼帝獨與頡利臨水交言麾諸軍却而陣焉蕭瑀又以輕敵固諫於馬前帝曰吾已籌之非卿所知也突厥所以掃其境内直入渭濱蓋以我國家初有内難朕又新登九五將謂不敢拒之朕若閉門虜必大掠強弱之勢在今一䇿朕故獨出以示輕之又曜軍容使知必戰事出不意乖其本圖虜入既深理當自懼與戰則必尅與和則必固朕服匈奴自兹始矣公等宜記之是日頡利請和詔許焉瑀等方嘆曰非所測也乙酉又幸城西刑白馬與頡利同盟于便橋之上突厥引兵而退蕭瑀進曰初頡利之未和也謀臣猛將多請戰而陛下不納臣以為疑既而虜自退其䇿安在帝曰我觀突厥之兵雖衆而不整君臣之計唯財利是視可汗獨在水西達官皆來謁我我醉而縳之因而襲擊其衆勢同拉朽何徃不勝我已令無忌李靖設伏於豳州以待之虜若奔還伏兵邀其前大軍躡其後覆之如反掌矣我所以不戰者我即位日淺為國之道安静為務一與虜戰必有死傷我所不能忘懐也又凶虜一敗或當懼而修徳結怨於我為患不細我今卷甲韜戈㗖以玉帛彼既得所欲固知其退也然頑虜驕恣必自是始亡破之漸其在兹乎將欲取之必固與之此之謂也卿等寧知之乎瑀再拜曰聖略宏逺誠非愚臣所能及也九月丙戍遣殿中監盧寛將軍趙綽送突厥還蕃頡利獻馬三千匹羊萬口帝不受詔頡利所掠中國户口者令歸之壬辰修緣邉障塞以備胡冦下詔曰城彼朔方周朝盛典繕治河上漢室宏規所以作固京畿設險邉塞式遏冦虐隔礙華戎自隋氏季年中夏喪亂黔黎凋盡周州城空虛突厥因之侵犯疆塲乗間幸釁深入長驅冦暴滋甚莫能禦制皇運以來東西征伐兵車屢出未遑北討遂令胡馬再入至于涇渭蹂踐禾稼駭懼居民䘮失既多虧廢生業朕分命師旅挫其鋒鋭頻獲名王毎夷渠帥然而凶狡不息驅侵未已御以長算利在修邉其北道諸州所置城寨粗已周遍未能備悉今約以和通雖云疲冦然蕃情難測更事修葺僉曰宜之朕以板築之功方資力役畚鍤之用興發且多念彼劬勞用深怵惕加以普給優復詔書始下旋即科召有若食言百姓將疑謂予不信但民惟邦本本固邦寧醜虜馮陵寔為民患其城寨鎮戎湏有修補審量逺近計度功力所在軍民且共營辦所司具為條式務使成功宣示閭里明知此意十二月己巳益州大都督竇軌奏獠反請兵討之帝曰獠依山險蓋是其常當撫以㤙信自然知感何乃不𢎞徳化先縱兵威豈為民父母之意也竟不許貞觀元年長孫無忌為尚書右僕射時突厥頡利可汗新與中國和盟政教紊亂言事者多陳攻取之䇿帝召蕭瑀及無忌問曰北藩君臣昏亂殺戮無辜國家不違舊好便失攻昧之機今欲取亂侮亡復爽同盟之義二途未决孰為勝耶蕭瑀曰兼弱攻昧古之所善無忌曰今國家務在戢兵待其冦邉方可討擊彼既已弱必不能來若深入虜庭臣未見其可且按甲存信臣以為宜帝從無忌之議突厥尋而䘮㓕二年四月丁亥突厥可汗為頡利可汗所攻遣使來乞師帝謂近臣朕與突厥頡利結為弟兄不可以不救又頡利與國通和不可失信其計安在兵部尚書杜如晦進曰夷狄無信其來自乆國家雖為守信彼必背之不若因其亂而取之所謂取亂侮亡之道也帝然之因令將軍周範屯太原以圖進取四年三月定㐮道行軍總管李靖擒突厥頡利可汗以獻其部落或走薛延陁或走西域而來降者甚衆詔議安邉之術朝士多言突厥恃強擾亂中國為日乆矣今天實䘮之窮來歸我本非慕義之心因其歸命分其種落俘之河南兖豫之地散屬州縣各使耕織百萬胡虜可得化為百姓則中國有加戸之利塞北可常空矣唯中書令温彦博議講准漢武時置䧏匈奴於五原塞下全其部落得為捍蔽又不離其土俗因而撫之一則實空虛之地二則示無猜之心若遣向河南兖豫則乖物性故非含育之道帝將從之秘書監魏徵奏言突厥自古至今未有如斯之破敗者也此是上天勦絶宗廟神武且其世冦中國百姓寃讐陛下以其降伏不能誅㓕即宜遣還河北居其故土匈奴人靣獸心非我族類強必冦盗弱則卑服不顧㤙義其天性也秦漢患其若是故發猛將以擊之收河南以為郡縣陛下奈何以内地居之且今降者㡬至十萬數年之間孳息日倍居我肘腋偪邇王畿心腹之疾將為後患尤不可河南處也彦博奏曰天子之於物也天覆地載有歸我者則必飬之今突厥破㓕之餘歸心降附陛下不加憐愍棄而不納非天地之道阻四夷之意臣愚甚謂不可遣居河南所謂死而生之亡而存之懐我徳惠終無叛逆魏徵又曰晋代有魏時胡落分居近都平吳已後郭欽江統勸武帝逐出塞外不用欽等言數年之後遂傾瀍雒前代覆車殷鍳不逺陛下必用彦博之言遣居河南所謂飬獸自遺患也彦博又曰臣聞聖人之道無所不通故先哲王有教無類突厥餘魂以命歸我我援䕶之收居内地禀我指麾教以禮法數載之後盡為農民選其酋首遣居宿衞畏威懐徳何患之有且光武居南單于於内郡為漢蕃翰終乎一代不有叛逆彦博既口給引類百端帝遂用其計於朔方之地自幽州至靈州置順祐化長四州都督府又分頡利之地六州左置定㐮都督府右置雲中都督府以統其部衆其酋首至者皆拜為將軍中郎將等官布列朝廷五品已上百餘人因而入居長安者數千家十四年九月置安西都䕶府居交河城十一月置寧朔大使以䕶突厥十七年閠六月戊辰帝曰蓋蘓文殺其王而奪國政誠不可忍今日國家兵力取之不難朕不欲勞費故未動衆也朕將勑契丹靺鞨以擾之何如司空房𤣥齡曰臣觀古之列國無不以強凌弱以衆暴寡今陛下撫飬蒼生将士勇鋭力有餘而不用之所謂止戈為武者也司徒長孫無忌曰蓋蘓文自知殺君罪大懼恐大國且聖王之來四夷使曲在彼又髙麗王未有表疏告難陛下且賜璽書以隠之其既獲自安必當順以聼命更恣無君之心後而責之未晩也帝曰善九月庚辰新羅遣使言髙麗百濟侵凌臣國累遭攻襲數十城兩國連兵期之必取將以今兹九月大舉臣社稷必不獲全謹遣陪臣歸命大國願乞偏師以存救援帝謂使人曰我實哀爾為三國所侵所以頻遣使人和爾三國髙麗百濟旋踵翻悔意在吞㓕而分爾土宇爾國設何竒謀以免顛越使人曰臣王事窮計盡唯告急大國冀以全之帝曰我少發邉兵總契丹靺鞨直入遼東爾國自鮮可緩爾一年之圍此後知無繼兵還肆侵侮然四國俱擾於爾未安此為一䇿我又能給爾數千朱袍丹幟二國兵至逮而陳之彼見者以為我兵必皆奔走此為二䇿百濟國負海之險不修兵械男女分雜相好宴聚我以數十百船載以甲卒銜枚汎海直襲其地爾國以婦人為主為隣國輕侮失主延冦靡歳休寧我遣一宗枝以為爾國主而自不可獨徃當遣兵營䕶待爾國安任爾自守此為四䇿爾宜思之將從何事使人但唯而無對帝難其庸鄙非乞師告急之才也於是遣司農丞相里𤣥奬齎璽書賜髙麗曰新羅委命國家朝貢不闕爾與百濟宜即戢兵若更攻之明年當出師撃爾國矣十八年九月乙巳相里𤣥奨使髙麗還𤣥奨初至平壤蓋蘓文破新羅兩城帝顧謂侍臣曰髙麗莫離支賊殺其主盡誅大臣用刑有同坑穽百姓動轉輙死怨痛在心道路以目天子出師吊伐湏有其名因其弑君虐下取之為易諫議大夫禇遂良進曰陛下兵機神算人莫能知昔隋末亂離手平冦難及北狄侵邉西蕃失禮陛下欲命將撃之群臣莫不苦諫唯陛下明略獨斷卒竝誅夷海内之人徼外之國畏威讋服為此也今聞陛下將伐髙麗意皆熒惑然陛下神武英聲不比周隋之主兵若渡遼事湏克㨗萬一不獲無以威示逺方更發怒再興衆兵若至於此安危難測帝然之兵部尚書李勣曰近者延陁犯邉陛下必欲追撃但為魏徵苦諫所以遂用其言此之失機亦由徵之誤計而若仰中聖䇿延陁無一人生還可五十餘年間邉境無事矣帝曰魏徵此諫良為失中然一計不當随而尤之後有良算安肯更發我亦隨知事誤而竟不能渉言耳六月詔曰百濟髙麗恃其僻逺每動兵甲便逼新羅新羅日蹙百姓塗炭遣使請援道路相望朕情深愍念爰命使者詔彼兩蕃戢兵敦好而髙麗姦惑攻撃未已若不拯救豈濟倒懸宜令營州都督張儉守左宗衛率髙履行等率幽營二都督府兵馬及契丹奚靺鞨徃遼東問罪屬遼水泛溢儉等兵不得濟十九年七月帝征遼東於安市城使李勣攻安市時從行文武亦以為摧髙延壽拾餘萬軍髙麗膽碎乗破竹之勢今乃其時張亮水軍在卑渉城召之信宿相㑹直取烏骨渡鴨淥水迫其離心安有機變掃清夷貊在此行耳獨司徒長孫無忌以為天子行師與諸將有異事非萬全不可徼幸今建安新城賊酋十萬若向烏骨皆在吾後不如先破安市次取建安獲其兩城然後長驅而進萬全之計也十二月詔禮部尚書江夏王道宗發朔并汾箕嵐代忻蔚雲九州兵馬鎮朔州又命守衛大將軍代州都督薛萬徹左驍衞大將軍阿史那杜宗等發勝夏寧綏丹延鄜坊石隰等十州兵馬鎮勝州又令勝州都督宋君明左武侯將軍薛孤吳仁等發靈原寧塩慶等五州兵馬鎮靈州又令執失思力發靈勝三州突厥兵馬與道宗等相應虜至塞下知有備不敢進先是又領軍人將軍執失思力引兵伐延陁虜其駞馬數千口葉䕶犯邉二十年六月乙亥鐵勒僕骨同羅共撃薛延陁多彌可汗大敗之帝以延陁破亡遣江夏王道宗左衞大將軍阿史那杜介為瀚海安撫大使又遣右領軍衞大將軍執失思力領突厥兵代州都督薛萬徹營州都督張儉各統所部兵分道竝進又令右驍衞大將軍契苾何力領凉州及胡兵同入以為聲援初薛延陁真珠毗伽可汗遣使請婚太宗許以女妻之徵可汗備迎親之禮帝志懐逺人於是發詔幸靈州與之會可汗大悦謂其國中曰我本鐡勒之小師也蒙大國聖人樹立我為可汗今復嫁我以公主車駕親至靈州斯以足矣於是税部諸羊馬以為聘財或説可汗曰我薛延陁可汗與大唐天子俱為一國主何有自徃朝謁如或拘晋悔之無及可汗曰吾聞大唐天子聖徳逺被日月所照皆來賓服我歸心委質冀得一覩天顔無所復恨然磧北之地必啚有主舎我别求固非大國之計我志决矣勿復多言於是言者遂止太宗令三道發使受其羊馬然延陁先無府藏調歛其國徃返且萬里既渉磧無草羊馬多死遂後期帝於是停幸靈州徵還三道之使既而其聘羊馬至所耗將半議者以為戎狄不可以禮義畜若聘財未備而與之婚或輕中國要令備禮以加重如是反其使者群臣或勸帝云既許以公主妻延陁邉境得以休息納其獻聘不可失信於蕃人宜在速成帝謂之曰君等進計皆非也君等知古而不知今昔漢家匈奴強而中國弱所以厚餙子女嫁與單于今時中國強而北狄弱漢兵一千堪撃其數萬延陁所以匍匐稽顙恣我所為不敢驕慢者以新得立為長雜姓非其本屬將倚大國用服其衆彼同羅僕骨等拾餘部落兵數萬并力足制延陁所以不敢發者延陁為我所立懼中國也今若以女妻之大國子婿增崇其禮深結黨援雜姓部落屈膝低首更遵服之夷狄之人豈無恩義微不得意勒兵南下如君所言可謂飬獸以自噬也吾今不與其女頗簡使命諸姓部落知吾弃之其争撃延陁必矣君其志之既而李思摩數遣兵侵掠之延陁復遣突利失撃思摩志定襄掠百姓而去帝遣英國公李勣援之遽已出塞而還帝以其數與思摩交兵乃璽書責讓之又謂其使人曰語爾可汗我天子竝東征髙麗汝若能冦邉者但當來也可汗遣使致謝復請發兵助軍帝答以優詔而止其兵及太宗㧞遼東諸城破駐驛之陣䧏髙延壽聲振戎狄而莫離支潛令粟靺鞨誑惑延陁㗖以厚利延陁氣懾不敢動髙宗永徽二年十一月丁丑以髙昌故地置安西都䕶府以尚舎奉御天山縣公麴智湛為左驍衛大將軍兼安西都䕶府州刺史徃鎮撫焉三年六月戊申詔兵部尚書崔敦禮并州都督府長史張緒發并汾歩騎萬人徃戍州發遣延陁餘衆渡河置祁連州以處之顯慶二年十二月伊麗道行軍摠管蘓定方討阿史那賀魯于金牙山收其所㨿之地三年分其種落列置州縣以處木昆部落為匐延都督府以突騎施索葛莫賀部為塭鹿都督府以突騎施阿剌施部為挈都督府以胡祿屋闕啜部為監伯都督府以攝舍提瞰啜部為雙阿都督府以䑕尼施處半部為鷹婆都督府其所役屬諸胡之國皆置州府竝𨽻安西都䕶府三年正月立龜兹王布失畢之子白素稽為龜兹王初布失畢妻阿史那氏與其國相那利私通布失畢知而不能禁布失畢左右頻請討之由是國内不和逓相猜阻各遣使來告難帝聞而盡召之既而京師囚那利而遣左領軍郎將雷文成送布失畢歸國行至龜兹東由分泥師城而龜兹大將羯獵顛發衆拒之仍通使䧏於賀魯布失畢㨿城自守不敢進於是詔左屯衛大將軍楊胃發兵討之㑹布失畢病死胃與羯獵顛决戰大破之擒羯獵顛及其黨盡殺之乃以其地為龜兹都督府又拜白素稽為都督以統其衆又移安西都䕶府於龜兹國舊安西復為西州都督府左驍衞大將軍兼安西都䕶天山縣公麴智湛為西州都督以統髙昌之故地總章二年九月詔吐谷渾慕容諾曷鉢部落移税凉州南近山安置時議者恐吐蕃以舊怨更撃之帝詔左相姜恪右相閻立本左衞大將軍契苾何力司戎少常伯崔餘慶左衞將軍郭待封司元少常伯許圉等議之謀發兵先擊土蕃閻立本曰自去嵗以來微少甘澤粟價騰踴倍於常年閭閻之間大有饑乏今又逺興師旅將轉益憂勞如臣愚見以為未可契苾何力又曰吐蕃在西經途稍逺又與諸羗連接臣恐大軍纔到便即西走且山路險阻逺逐甚難軍糧雖繼未易深入慮其開春以後必來侵逼吐渾如其更來臣請不湏救援蠻夷無識便謂國力已疲遂自驕矜無所懼憚然後命將出師一舉可㓕之矣姜恪曰何力言非也吐谷渾歸附日乆吐蕃乗勝逼之必不能禦儻若不救坐見㓕亡此則邉境憂虞無所控告既虧聖徳又沮國威臣之愚慮謂宜拯恤且使小蕃得存然後更圖大舉議竟不定谷渾竟不移而止運上元三年二月帝以髙麗餘衆反叛移安東都䕶府於遼東故城先有華人任官者悉罷之其百濟百姓先從在涂河及徐兖等州者權移熊津都督府於建安故城以處之儀鳳二年十二月勑曰朕君臨宇宙司牧黎元普天之下罔不率服蕞爾吐蕃僻居遐裔吐渾是其隣國是乃奪其土宇徃者暫遣偏裨欲復渾王故地義存拯救事匪稱兵輙肆昏迷潜相掩襲既無備預頗䘮師徒因此鴟張每思狼顧除凶伐叛王者所急前嵗將發六軍問其罪戾復以小冦無勞大舉按甲息兵庶其改過不思惠愛更起回邪敢縱狂惑專為冦盗或攻圍鎮戍或驅抄羊馬烽燧頻舉煙塵不息候隙乗間倐來忽徃比止令鎮遏未能即事翦除莫懐寛大之㤙遂長􅊶藏之計禍盈惡稔當自覆㓕今欲分命將帥窮其巢穴尅清荒服必寄英竒但秦雍之部俗稱勁勇汾晉之壤人擅驍雄宜令關内河東諸州廣求猛士在京者令中書門下於廟堂選試外州委使人與州縣相知㨂練有膂力雄果弓馬灼然者盛宜甄採即以猛士為名三年九月帝以吐蕃為患召侍臣問吐蕃小醜屢犯邉塞我比務在安輯未即誅夷而戎狄豺狼不識㤙造置之則疆塲日駭圖之又未聞上䇿宜論得失各盡所懐給事中劉景先奏曰攻之則兵威未足鎮之則國力有餘宜撫飬士卒守禦邉境中書舍人郭正一曰吐蕃作梗年嵗已㴱興師不絶非無勞費近討則徒損兵威深入則未傾巢穴臣望少發兵募且遣備邉明立烽候勿令侵掠待國用豐足即一舉而㓕之矣給事中皇甫文亮曰且令大將鎮撫蓄飬將士良吏營田以救糧儲必待足食方可一舉而取之帝曰朕生於深宫未嘗躬擐甲胄親踐戎行宿將舊人多從物故自非授戈俊傑安能克㓕兇渠海東二蕃徃雖旅拒髙麗不敢渡遼水百濟未敢越滄波往者頻歳遣兵糜費中國事雖已往我亦悔之今吐蕃侵我邉境事不得已湏善謀之中書舍人劉禕之對曰臣觀自古聖主明君皆有夷狄為梗吐蕃時擾邉隅有同禽獸得其土地不可攸居被其馮陵未足為恥願戢萬乗之威寛萬姓之役給事中楊思徴曰聖人御物貴在從時今凶奴陸梁邉夷桀黠弗能懷徳未肯畏威和好之謀臣謂非便帝曰此賊驕狠未識㤙威罪跡貫盈方當就擒和好灼然未可中書侍郎薛元起曰臣以為敵不可縱縱敵則患生防邉則卒老不如料㨂士卒一舉㓕之帝顧謂黄門侍郎來嘗曰自李勣亡後實無好將當今唯以張䖍助等差為優耳嘗奏曰昨者洮河兵馬足堪制敵但為諸將等失於部分遂無成功當今更無好將誠如聖㫖竟議不定乃賜食而遣之是年以吐蕃犯塞选州人魏真宰詣闕上封事曰臣聞理天下之柄有二事焉文與武也然則文武之道雖有二門至於制勝御人其歸一揆然論武者則弓馬為先而不稽之以權略談文者則以篇章為首而不考之以經綸奔競相誇遂成浮俗臣嘗讀魏晋史每鄙何宴王衍終日談空近觀齊梁書才流亦復不少竝何益於理亂哉從此而言則陸士衡著辨亡論而不救河橋之敗飬由基射能穿扎而不止鄢陵之奔斷可知矣昔趙岐撰禦冦之論山濤陳用兵之本皆坐運帷幄暗合孫吳抑又聞帝王之道務崇經略之術必仗英竒自國家良將可得言矣李靖破突厥侯君集戍髙昌蘓定方開西域李勣平遼東雖國之英靈亦其才力所至古語有之人無常俗政有理亂兵無强弱將有能否是知大將之臨戎也以至為本漢髙祖之英雄大度尚曰吾寧鬪智魏武之神機冠絕猶倣法孫吳有項籍之氣袁紹之基而背智任情終以破㓕何况復出其下哉當今朝廷用人類取將門子弟亦有死事之家而䝉抽擢者此等本非幹力見知雖竭力盡誠亦不免於傾敗如何使當閫外之任哉後漢馬賢討西羌皇甫規陳其必敗宋文帝使王𤣥謨修復河南沈慶之知不能尅謝𤣥以書生之資拒苻堅百萬之衆郗超言其必勝雖復時有古今求之人事皆可推之取驗大體觀其氣鋭之與識畧耳昔李左車陳湯吕蒙馬隆孟觀竝出自貧賤勲效甚髙未嘗聞其家代為將以四海之廣兆庶之衆其中豈無卓越之士臣恐未之思也夫何逺之有臣又聞之賞者禮之源罸者刑之本故禮崇則謀夫竭其能賞厚則義士輕其死刑正君子朂其心罰重小人懲其過然則賞罰者君國之紀綱古人云國無紀綱雖堯舜不能為化今罷不能行則賞以難信故人間議者皆云近日征行虗有賞格而無其事良由小才之人不識大體恐賜勲庸漸傾倉庫晋意錐刀將此益國狥目前之近利忘經乆之逺圖所謂錯之毫釐失之千里者也且黔首雖微湏應以實豈得懸不信之令設虗賞之科比者師出無功未必不由於此文子曰同言而信信在言前同令而行誠在令外故商君移木而表信曹公割髪以明法豈禮也哉有由然也自蘓定方征遼東李勣破平壤賞紀不行動仍淹滯臣以吏不奉法主司之過不聞斬一臺郎戮一令史如秦懐恪使天下知聞皇天何能炤逺而不炤近哉臣識不稽古請以近事言之貞觀中萬年縣尉司馬𤣥景舞文餙智以邀乾沒太宗審其姦詐棄之都市及征髙麗總管張君乂撃賊不進斬之旗下臣以偽勲之罪多於𤣥景仁貴等敗重於君乂向使早誅薛仁貴郭待封則自餘諸將豈敢失利於後哉臣恐吐蕃之平未在旦夕且凡人識不經逺類皆隨時生言吐蕃戰時前隊死盡後隊方進衣甲堅厚人馬甚多又止有瘴氣不宜士馬官軍逺入利鈍難知前無克獲取斃之道不積百萬米無為大舉之資臣以吐蕃之對中國猶孤星之對太陽有自然之大小自然之明暗論其智也則我明而彼暗論其敵也則我大而彼小夫夷狄雖同之禽獸亦知憂其性命豈肯前隊皆死後隊方進曰彼國虐用其人殘迫使然非心之所願必云戰不顧死則兵法許敵能鬪當以致筭取之何憂於不克也向令邉將能殺吐蕃使伏屍蔽野流血成河歛其頭顱聚為京觀臣恐此虜聞官軍鐘皷之聲望風塵而走何暇前隊皆死後隊方進哉由薛仁貴郭待封覆我師徒軍人䘮氣至今不振故虜得其便跳梁於山谷臣又聞興師拾萬日費千金國家之兵可得而有供軍之糧不可得而濟又今秋之行仰籍馬力不得數十萬匹無以成大舉之資臣請不用太府之錢太倉之粟辦二十萬衆二年資糧馬五十萬匹北㓕吐蕃使往還足用若天皇逰意經年之外此功可得而成自國家太平五十餘載百姓富饒四海安樂計當今之戸口其數即倍少於隋時料當今之資財其資還倍富於隋日卜式有言天子誅匈奴愚以為賢者宜死節有財者宜輸之如此匈奴可㓕臣之所願不至於此臣税天下上至王公下及兆庶但是挂籍之戸口别稅錢一百文臣子之心孰不甘税又請放天下禁馬州縣百姓得乗大馬不限牝牡匹數嚴勑州縣明立簿帳不得使其隠漏不過三年則人間精壯之馬可括得五十餘萬匹委州縣長官以所税之錢加價為市取若官軍大舉一朝可得而用議者以禁馬既乆忽然聞許恐百姓因馬遂生罪過臣上觀秦漢下至周隋中原變故皆不由馬陳勝項籍之亂秦黄巾赤眉之擾漢竝徒歩而起亦無聞駿騎其後劉石亂華到籍馬匹肆其吞噬有隋禁馬科格甚嚴楊𤣥感奮臂大呼天下因之䘮亂夫故虜以馬為彊若放人乗馬則市取其彊以益中國設不能乆行之猶可五六年間通計乗騎使得漸㓕胡虜之盛私馬既多還是官有臣進退思惟終是國家之利且理有變通事無常准臣之所陳權以濟事必將不可乆行後禁亦為未失帝覧而善之授秘書省正字令直中書省仗内供奉則天神功元年鸞臺侍郎同鳯閣鸞臺平章事狄仁傑以百姓西戎疎勒等四鎮極為凋弊遂上疏曰臣聞天生四夷皆在先王封域之外故東距滄海西隔流沙北横大漢南阻五嶺此天所以限夷狄而隔中外也自典籍所記聲教所及三代不能至者我國兼之矣今日之四境已逾於夏殷昔詩人矜薄伐於太原美化行於江漢是則代之逺裔而國家之域中至前漢時匈奴無歳不犯邉殺掠吏人後漢則西羗侵軼漢中東冦三輔入河東上黨幾至雒陽由此言之則陛下今日之土宇過於漢朝逺矣若其用武荒外邀功絕域竭府庫之實以争磽确不毛之地得其人不足以增賦獲其土不足以耕織茍求冠帶逺夷之稱不務固本安人之術此秦皇漢武之所行非五帝三皇之事業也若使荒徼外以為限窮貨財以騁欲非但不愛人力亦所以失天心也昔始皇窮兵極武以求廣地男不得耕於野女不得蠶於室長城之下死者如亂麻於是天下潰叛漢武追髙文之宿憤籍四帝之儲實於是定朝鮮討西域平南越撃匈奴庫帑空虗盗賊蠭起百姓嫁妻賣子流離於道路者萬計末年覺悟息兵罷役封丞相為富民侯故能為天祐也昔人有言與覆車同軌者未嘗獲安此言雖小可以喻大近者國家頻歳出師所費滋廣西戎四鎮東戍安東調發日加百姓虗弊開守異域事等石田費用不支有損無益轉輸靡絕杼軸殆空越磧踰海分兵防守行役既乆怨曠亦多詩人云王事靡盬不能藝稷黍豈不懐歸畏此罪罟念彼恭人涕零如雨此則前代怨畏之詞也上不見恤則政不行而邪氣作邪氣作則蟲螟生而水旱起若此雖禱祠百神不能調隂陽矣方今關東饑饉蜀漢逃亡江淮已南徵求不息人不復業則相聚為盗本根一揺憂患不淺其所以然者皆為逺戍方外以竭中國争蠻貊不毛之地乖子育蒼生之道也昔漢元納賈捐之謀而罷朱崖之郡宣帝納魏相之䇿而弃車師之田豈不欲慕尚虗名蓋憚勞人力也近貞觀年中克平九姓册李思摩為可汗使統諸部者蓋以夷狄叛則伐之降則撫之得推亡固存之義無逺戍勞人之役此則近日之令典綏邉之故事竊見阿史那斛瑟羅隂山貴種代雄沙漠若委之四鎮使統諸蕃封為可汗遣其禦冦則國家有繼絶之美荒外無轉輸之役如臣所見請捐四鎮以肥中國罷安東以實遼西省軍費於逺方并甲兵於塞上則常代之鎮重而邉州之備實矣况撫綏夷狄蓋防其越境茍無侵侮之患則已何必窮其窟穴與螻蟻計較長短哉且王者外寧必有内憂蓋為不勤修政故也伏願陛下弃之度外無以絶域未平為念但當勅邉兵謹守備蓄鋭以待敵待其所自致然後撃之此李牧所以破匈奴也當今所要者若令邉域警守備逺斥候聚軍實蓄威武以逸待勞則戰士力倍以主禦客則我得其便堅壁清野則冦無所得自然賊深入必有顛躓之慮淺入必無擄獲之益如此數年可使二虜不擊而服矣仁傑又請廢安東復髙氏為君長停江南之轉輸慰河北之勞弊數年之後可以安人富國事雖不行識者是之册府元龜卷九百九十一
