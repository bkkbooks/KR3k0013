body:
  text: 冊府元龜卷三百二十三宋王欽若等撰僣偽部勲伐第三後燕慕容垂慕容皝子也以滅宇文之功封都鄉侯石季龍來伐既還猶有兼并之志遣將鄧恆率衆數萬屯于樂安營攻取之備垂戍徒河與恆相持恆憚而不敢侵石季龍之死也趙魏亂垂説慕容雋伐之雋以垂為前鋒都督雋僣稱尊號封垂吳王徙鎮信都以侍中右禁將軍錄留臺事大收東北之利乂為征南將軍荆兖二州牧有聲于梁楚之南再為司𨽻偽王公已下莫不累迹及慕容暐嗣位垂敗晉將桓温于枋頭威名大振慕容評深忌惡之乃謀誅垂垂懼禍及己與世子金奔于苻堅堅以垂為冠軍將軍封賔都侯食華陰之五百户垂在堅朝歴京兆尹進封泉州侯所在征伐皆有大功堅之敗於淮南也垂軍獨全堅以萬餘騎奔垂垂以兵屬堅至澠池垂請至鄴展拜陵墓因張國威刑以安戎狄堅許之遣其將李蠻閔亮尹國率衆三千送垂又遣石越戍鄴張蚝戍并州時堅子丕先在鄴及垂至丕舘之於鄴西垂具説淮南敗狀㑹堅將符揮告丁零翟斌聚衆謀逼雒陽丕配垂兵二千遣其將符飛龍率氐騎一千為垂之副以討之垂請入鄴城拜廟丕不許乃潜服而入亭吏禁之垂怒斬吏燒亭而去至河内殺飛龍悉誅氐兵召募逺近衆至三萬濟河焚橋令曰吾本外假秦聲内規興復亂法者軍有常刑奉命者賞不踰日天下既定封爵有差不相負也翟斌聞垂之將濟河也遣使推垂為盟主及至雒陽率衆㑹垂勸稱尊號垂謀于衆曰雒陽四面受敵北阻大河至於控馭燕趙非形勝之便不如北取鄴都據之而制天下衆咸以為然乃引師而東至滎陽以晉孝武太元八年自稱大將軍都督燕王承制行事攻㧞鄴郛丕固守中城垂塹而圍之擁漳水以灌之翟斌宻應符丕决防潰水事洩垂誅之於是引師去鄴北屯新城開其西奔之路垂將有北都中山之意慕容農率衆數萬迎之羣僚聞慕容暐為苻堅所殺勸垂僣位垂以慕容冲稱號闗中不許其後苻丕棄鄴城奔于并州垂定都中山以太元十一年僣即位遣其征西慕容楷衞軍慕容麟鎮南慕容紹征虜慕容宙等攻苻堅冀州牧苻定鎮東苻紹幽州牧苻謨鎮北苻亮等悉降慕容盛初以慕容寳庶長子封長樂王寳如龍城盛留在後寳為蘭汗所殺盛馳進赴京因斬蘭汗以長樂王稱制先是慕容竒聚衆于建安亦將討汗百姓翕然從之汗遣兄子金討竒竒擊滅之進屯乙連盛既斬汗命竒罷兵竒遂與丁零嚴生烏丸王龍之阻兵叛盛引軍至横溝去龍城十里盛出兵撃敗之執竒而還斬龍生等百餘人盛于是僣即尊位西秦乞伏國仁代其父司繁為苻堅鎮西將軍鎮勇士川及堅興夀春之役徴為將軍領先鋒騎㑹國仁叔父歩頺叛於隴西堅遣國仁還討之歩頺聞而大悦迎國仁於路國仁置酒髙㑹攘袂大言曰苻氏往因趙石之亂遂妄竊名號窮兵極武跨僣八州疆宇既寧宜綏以徳方虗廣威聲勤心逺略騷動蒼生疲弊中國違天怒人將何以濟且物極則虧禍盈而覆者天之道也以吾量之是役也難以免矣當與諸君成一方之業及堅敗歸國仁乃招集諸部有不附者討而并之衆至十餘萬及堅為姚萇所殺國仁謂其豪帥曰苻氏以髙世之姿而困於烏合之衆可謂天也夫守常迷運先逹恥之見機而作英豪之舉吾雖簿徳藉累世之資豈可覩時來之運而不作乎以太元十年自稱大都督大將軍大單于領秦河二州牧置武城武陽安固武始漢陽天水畧陽漒川甘松匡朋白馬菀川十二郡築勇士城以居之南燕慕容徳初以慕容雋之弟封范陽王後從慕容垂如鄴及垂稱王以徳為車騎大將軍遷司徒垂臨終勅其子寳以鄴城委徳寳既嗣位以徳為冀州牧領南蠻校尉鎮鄴魏將拓㧞章攻鄴徳遣南安王慕容青等夜撃敗之魏師退次新城又遣遼西公賀頼盧率騎與章圍鄴徳遣將追破章軍時魏師入中山慕容寳出奔於薊慕容詳又僣號中山寳以徳為丞相領冀州牧承制南夏隆安二年乃率户四萬車二萬七千乘自鄴徙于滑臺依燕元故事稱元年北凉沮渠蒙遜雄傑有英略㑹伯叔羅仇麴粥從吕光征河西光前軍大敗麴粥言於兄羅仇曰主上荒耄驕縱諸子朋黨相傾䜛人側目今軍敗將死正是智勇見猜之日可不懼乎吾兄弟素為所憚與其輕死溝瀆豈若勒衆向西平出苕藋奮臂大呼凉州不足定也羅仇曰理如汝言但吾家累世忠孝為一方所歸寧人負我無我負人俄而皆為光所殺宗姻諸部㑹葬者萬餘人蒙遜哭謂衆曰昔漢祚中微吾之乃祖翼奬竇融保寧河右吕王昬耄荒虐無道豈可不上繼先祖安世之志使二父有恨黄泉衆咸稱萬歲遂斬光中田䕶軍馬邃臨松令井祥以盟一旬之間衆至萬餘屯據金山與從兄男成推光建康太守叚業為使持節大都督龍驤大將軍凉州牧建康公改吕光龍飛二年為神璽元年業以蒙遜為張掖太守男成為輔國將軍委以軍國之任業僣稱凉王以蒙遜為尚書左承業憚蒙遜雄武微欲逺之乃以䝉遜從叔益生為酒泉太守蒙遜為臨池太守業既殺門下侍郎馬權蒙遜不自安請為西安太守業亦以蒙遜有大志懼為朝夕之變乃許焉蒙遜期與男成同祭蘭門山宻遣司馬許成告業曰男成欲謀叛許以取假日作逆若求祭蘭門山神言驗矣至期果然業收男成令自殺蒙遜聞男成死泣告衆曰男成忠於叚公枉見屠害諸君能為報仇乎且州土兵亂似非業所能濟吾所以初奉之者以之為陳吳耳而信䜛多忌枉害忠良豈可安枕卧觀使百姓罹於塗炭男成素有恩信衆皆憤泣而從之北至氐池衆逾一萬鎮軍臧莫孩率部衆附之羗胡多起兵響應蒙遜壁于侯塢業先疑其右將軍田昂幽之於内至是謝而赦之使與武衞梁中庸等攻蒙遜昂至侯塢率騎五百歸于蒙遜蒙遜至張掖昂元子承爰斬闗内之業左右皆散蒙遜大呼曰鎮西何在軍人曰在此蒙遜斬之晉安帝隆安五年梁中庸田昂等推蒙遜為大都督大將軍凉州牧張掖公義熈八年僣即西河王位夏赫連勃勃初以西單于子為後魏所敗奔於叱干部叱干他斗伏送勃勃於姚興髙平公没奕于奕于以女妻之姚興以為安逺將軍封陽川侯遷持節安北將軍五原公配以三交五部鮮卑及雜虜二萬餘落鎮朔方時河西鮮卑杜崙獻馬八千匹于姚興濟河至大城勃勃留之召其衆三萬餘人偽獵髙平川襲殺没奕于而并其衆衆至數萬義熈二年僣稱天王大單于自以匈奴夏后氏苗裔也國稱大夏其年討鮮卑薛于等三部破之降衆數萬進討姚興三城已北諸戍斬其將楊丕姚石生等勃勃初僣號求婚于秃髮搙擅搙擅弗許勃勃怒率騎二萬餘衆伐之殺傷萬餘人掠二萬七千口牛馬羊數十萬而還搙擅追之勃勃逆擊大敗之追奔八千里殺傷萬計斬其大將十餘人又與姚興將張佛生戰于青石原又敗之俘斬五千七百人興遣將齊難率衆二萬來伐勃勃退如河曲難以去勃勃既逺縱兵掠野勃勃潜軍覆之俘獲七千餘人收其戎馬兵杖難引軍而退勃勃復追擊于木城㧞之擒難俘其將士萬有三千戎馬萬匹嶺北夷夏降附者數萬計於是拜置守宰以撫之勃勃又率騎二萬入髙崗及于五井掠平凉雜胡七千餘户以配後軍進屯依力川姚興來伐至三城勃勃候興諸軍未集率騎擊之興大懼遣其將姚文宗距戰勃勃設伏擒之興將王奚聚羗胡三千餘户于勅奇堡勃勃進攻之堡人窮迫執奚出降勃勃又攻興將金雒生于黄石固彌姐豪地于我羅城悉皆㧞之徙七千餘家於大城以其丞相石地代領幽州牧以鎮之勃勃兄子左將軍羅提率歩騎一萬攻興將姚廣都于定陽尅之勃勃又攻興將姚夀都于清水城夀都奔上邽徙其人萬六千家於大城勃勃率騎三萬攻安定與姚興將楊佛嵩戰于青石北原降其衆四萬五千戎馬二萬匹進攻興將党知隆于東鄉降之徙其三千餘户于二城姚興鎮北參軍王買徳來奔勃勃以為軍師中郎將又攻興將姚逵于杏城二旬尅之執逵及其將姚大用姚安和姚利僕尹敵等姚興死子泓立泓將姚嵩與氐王楊盛相持率騎四萬襲上邽未至而嵩為盛所殺勃勃攻上邽二旬尅之殺泓秦州刺史姚平都及將士五千人毁城而去進攻陰宻又殺其將姚良子及將士萬餘人泓將姚恢棄安定奔于長安安定胡儼華韜率户五萬據安定降于勃勃其後姚泓為宋髙祖所滅髙祖留子義貞鎮長安勃勃以子璝都督前鋒諸軍事領撫軍大將軍率騎二萬南伐闗中郡縣悉降宋髙祖召義真東鎮雒陽以朱齡石守長安百姓遂逐齡石而迎勃勃入于長安為壇于㶚上僣即皇帝位吳楊行宻盧州人唐僖宗廣明之亂天子幸蜀郡將遣行宻徒歩奏事如期而復光啟初秦宗權擾淮右頻㓂廬夀郡將募能致戰擒賊者計級賞之行宻以膽力應募往必有獲得補為隊長行宻乃自募百餘人皆虓勇無行者殺都將自權州兵郡將即以符印付之而去朝廷因正授行宻廬州刺史光啟三年揚州節度使髙駢失政委任祅人吕用之之軰牙將畢師鐸懼為用之所譖自髙郵起兵襲廣陵為用之所却乃乞師於宣州秦彦且言事克之日願以揚州帥之彦先遣將秦稠以兵三千助師鐸攻陷廣陵髙駢遂署師鐸為行軍司馬未幾秦彦率大衆并家屬渡江入據揚州自稱節度使初揚州未陷吕用之詐為髙駢檄徵兵於廬州及城陷行宻以軍萬人奄至畢師鐸之入廣陵也吕用之出於外至是委質於行宻行宻攻廣陵營於大明寺秦畢出兵以攻行宻之營短兵纔接行宻偽遁秦畢之兵争入其柵以取金帛行宻發伏兵以擊之秦畢大敗退走其壁自是不復出戰其年九月秦畢害髙駢於幽州少長皆死同坎瘞於道院北垣下行宻攻圍彌急城中食盡米斗四十千居人相啗畧盡十月城陷秦畢走東塘行宻入廣陵輦外寨之粟以食饑民即日米價减至三千十一月蔡賊孫儒以衆萬人自淮西奄至還據外寨行宻輜重牛羊軍食未入城者皆為儒所有時秦畢來自東塘與儒軍合自是西門之外復為敵境矣初吕用之遇行宻於長給行宻曰用之有白金五千挺瘞於所居之廡下冦平日願備將士倡樓一醉之資至是行宻閱兵用之在側謂用之曰僕射許此軰銀何負心也據命斬於三橋之下夷其族行宻既有廣陵遣使至太梁陳歸附之意是自梁太祖兼領淮南乃遣牙將張廷範使于淮南與行宻結盟尋遣行軍司馬李璠權知淮南留後令都將郭信以兵援送行宻初則厚禮廷範及聞李璠之來浡然有拒命之意梁祖乃追李璠等還即表行宻為淮南留後文徳元年正月孫儒殺秦彦畢師鐸於髙郵引軍襲廣陵下之儒自稱節度使行宻收其衆歸於廬江龍紀元年孫儒出攻宣州行宻乘虗襲據揚州孫儒引軍復攻行宻大順元年行宻危蹙率衆夜遁出據宣州儒復入揚州一年乃蒐練兵甲以攻行宻屬江淮疾疫師人多死儒亦卧病為部下所執送於行宻殺之行宻自宣城長驅入于廣陵盡得孫儒之衆乾寧二年行宻盡有淮南之地昭宗乃降制授淮南節度副大使知節度事管内營田觀察處置等使同中書門下平章事封𢎞農郡王至子渭乃僣號漢劉隐唐末為廣州右都押衙領賀水鎮將兼封州刺史用法清肅威望頗振昭宗以嗣薛王知柔石門扈蹕功授清海軍節度使詔下廣州牙將盧琚譚玘謀不禀朝命隐舉部兵誅琚玘以聞知柔至深德之辟為行軍司馬委以兵賦昭宗命宰相徐彦若代知柔復署前職彦若在鎮二年臨薨手表奏隐為兩使留後昭宗未之許命宰相崔逺為節度使逺行及江陵聞嶺表多盗懼隐違詔遲留不進㑹逺復入相乃詔以隐為留後然乆未即真及梁祖為元帥隐遣使持重賂以求保薦梁祖即表其事遂降旄節梁開平初恩寵殊厚遷檢校太尉兼侍中封大彭郡王梁祖郊禋禮畢加檢校太師兼中書令又命兼領安南郡䕶充清海静海兩軍節度使進封南海王蜀王建陳州項城人唐末𨽻名於忠武軍秦宗權據蔡州懸重賞以募之建始自行間得補軍侯廣明中黄巢陷長安僖宗幸蜀時梁祖為巢將領衆攻襄鄧宗權遣小校鹿晏𢎞從監軍楊復光率師攻之建亦預行是歳復光入援京師明年破賊收京城初復光以忠武軍八千人立為八都晏𢎞與建各一都頭也復光死晏𢎞率八都迎扈行在至山南乃攻剽金商諸郡縣得兵數萬進逼興元節度使牛叢棄城而去晏𢎞因自為留後以建等領屬部刺史不令之任俄而晏𢎞正授節旄恐部下謀已多行忍虐繇是部衆離心建與别將韓建友善晏𢎞益猜二建偽待之厚引入卧内二建懼夜登城慰守陴者因月下共謀所向謂韓建曰僕射甘言厚徳意疑我也禍難無日矣早宜擇利而行韓曰善因率三千人趨行在僖宗嘉之賜與巨萬分其兵為五都仍以舊校主之即晉暉李師泰張造與二建也因號曰隨駕五都田令孜皆錄為假子及僖宗還宫建等分典神策軍皆遥領刺史光啓初從僖宗再幸興元令孜懼逼求為西川監軍楊復恭代為觀軍容使建等素為令孜所厚復㳟懼不附已乃出五將為郡守以建為璧州刺史天子還京復㳟以楊守亮鎮興元尤畏建侵已屢召之建不安其郡因招合谿洞豪猾有衆八千冦閬州陷之復攻利州刺史王珙棄城而去建攻剽二郡所至殺掠守亮不能制東川節度使顧彦朗初於闗輔破賊時與建相聞毎遣人勞問分貨幣軍食以給之故建不侵梓遂西川節度使陳敬瑄憂其膠固謀於監軍田令孜曰王八吾子也彼無他腸作賊山南實進退無歸故也吾馳咫尺之書可以坐置麾下即飛書招建建大喜遣使謂彦朗曰十軍阿父遣信見招僕欲詣成都省阿父因依陳太師求一大郡是所願也即之梓州見彦朗留家寄東川選精甲三千之成都行次鹿頭或謂敬瑄曰建今之劇賊鴟視狼顧専謀人國邑儻其即至公以何等處之彼建雄心終不居人之下公如以將校遇之是養虎自貽其患也敬瑄懼乃遣人止建遽脩城守建怒遂據漢川領輕兵至成都敬瑄讓之曰彼何為者而犯吾疆理建軍吏報曰閬州司徒北寄東川而軍容太師使者繼召今復拒絶何也司徒不惜改轅而東但不省太師反為拒絶慮顧梓州復相嫌間謂我何心故也使我來報且欲寄食漢川公勿復疑時光啓三年居浹旬建盡取東川之衆設梯衝攻成都三日不尅而退復保漢川月餘大剽蜀士進逼彭州百道攻之敬宣出兵來援建觧圍縱兵大掠十一州皆罹其毒民不聊生建軍勢日盛復攻成都敬宣患之顧彦郎亦懼侵已昭宗即位彦郎表請雪建擇大臣為蜀帥移敬瑄他鎮乃紹宰臣韋昭度鎮蜀以代敬瑄敬瑄不受代天子怒命顧彦郎楊守亮討之時昭度以建為牙内都校董其部兵及王師無功建謂昭度曰相公興數萬之衆討賊未効餉運久不相屬近聞雒陽以來藩鎮相噬朝廷姑息不暇與其勞師以事蠻方不如從而赦之且以兵威靖中原是國之本也相公盍歸朝覲面與主上畫之昭度持疑未决一日建陰令軍士於行府門外擒昭度親吏臠而食之建徐啟昭度曰盖軍士乏食以至於是耶昭度大懼遂留符節與建即日東還纔出劒門建即嚴兵守門不納東師月餘建攻西川管内八州所至響應遂急攻成都田令孜登城謂建曰老夫與八哥相厚太師乆已知聞有何嫌恨如是困我之甚耶建曰軍容父子之恩心何敢忘但天子付以兵柄太師孤絶朝廷故也茍太師悉心改圖何福如之又曰吾欲與八哥軍中相欵如何曰父子之義何嫌也是夜令孜擕蜀帥符印入建軍授建建泣謝曰太師初心太過致有今日相戾既此推心一切如舊翌日敬瑄啓闗迎建以蜀帥讓之建乃自稱留後表陳其事明年春制授檢校太傅成都尹西川節度副大使知節度事管内觀察處置雲南八國招撫等使時龍紀元年也移敬瑄於雅州安置仍以其子為刺史既行建令人殺之於路令孜仍舊監軍事數月或告令孜通鳯翔書問下獄餓死建雄猜多機畧意嘗難測既有蜀土復欲窺伺東川又以彦朗婚姻之舊未果行㑹彦朗卒弟彦暉代為梓帥交情稍怠李茂貞乗其有間宻搆彦暉因與茂貞連盟闗征疆吏之間與蜀人得失大順末建出師攻梓州彦暉求援於鳯翔李茂貞出師援之建即圍解自是兩川交惡者累年後建大起蜀軍敗岐梓之兵於利州彦暉懼乞和請與岐人絶許之景福中山南之師冦東川彦暉求援於建建出兵赴之大敗興元之衆泊軍旋建乘虗掩襲梓州虜彦暉置於成都遂兼有兩川自此軍鋒益熾天福初李茂貞韓全誨刼遷車駕在鳯翔梁祖攻圍厯年建外脩好於汴指茂貞罪狀又陰與茂貞間使往來且言堅壁勿和許以出師赴援因分命諸軍攻取興元比及梁祖解圍茂貞山南諸州皆為建所有因自置守將及茂貞垂翅天子遷雒陽建復攻茂貞之秦隴等州茂貞削弱不能守或勸建因取鳯翔建曰此言失策吾所得已多不俟復増岐下茂貞雖常才然名望宿素與朱公力争不足僅守有餘韓生所謂入為扞蔽出為席藉是也適宜援而固之為吾盾鹵耳及梁祖將謀強禪建與諸藩同謀興復乃令其將康晏率兵三萬㑹於鳯翔數與汴將王重師戰不利而還趙凝之失荆襄也弟明以其奴奔蜀建因得䕫峽忠萬等州及梁祖開國蜀人請建行劉備故事建自帝於成都閩王審知光州固始人唐廣明中黄巢犯闕江淮盗賊蜂起有賊率王緒者自稱將軍陷固始縣審知兄潮時為縣佐緒署為軍正蔡賊秦宗權以緒為光州刺史尋遣兵攻緒率衆渡江所在剽掠自南康轉至閩中入臨汀自稱刺史緒多疑忌部將有出己之右者皆誅之潮與豪首數軰共殺緒其衆求帥乃刑牲㰱血為盟植劒於前祝曰拜此劒動者為將軍至潮拜劒躍於地衆以為神異即奉潮為帥時泉州刺史廖彦若為政貪暴軍民苦之聞潮軍行整肅耆老乃奉牛酒遮道請留潮因引兵圍彦若歳餘克之又平狼山賊帥薛藴兵鋒日盛唐光啓二年福建觀察使陳巖表潮為泉州刺史大順中巖卒子婿范暉自稱留後潮遣審知將兵攻之踰年城中食盡乃斬暉而降繇是盡有閩嶺五州之地潮即表其事昭宗因建威武軍於福州以潮為節度福建管内觀察使審知為副乾寧中潮卒審知遂繼兄位梁祖開國累加中書令封閩王審知卒子延鈞乃僣即帝位唐李昪海州人偽吳大丞相徐温之養子本名知誥唐天祐初楊行宻卒其子渥嗣㑹佐衞都指揮使張顥殺渥立其弟渭為帥温尋殺顥渭偽授温常州刺史温留廣陵遣昪知州事其後温出鎮潤州以其子知訓知政事時昪為温屬郡昇州刺史乃大理郡廨温表移其治於金陵偽授温大都督府長史充鎮海軍節度副大使知節度事以昪為鎮海軍節度副使行潤州刺史充本州團練使内外馬歩軍都指揮使通判軍府事居無何知訓為大將朱瑾所殺温以昪代知政事明年温冊楊渭為天子僣稱大吳渭死又迎丹陽王溥於潤州即偽位自是温父子愈盛中外共專其國楊氏主祭而已温累官至守太師中書令封東海王後唐天成二年卒昪乃知内外左右軍至守太尉中書令尋封東海王晉天福二年楊溥遜位于昪因還姓李氏始改名昪國號大唐尊徐温為義祖册府元龜卷二百二十三
