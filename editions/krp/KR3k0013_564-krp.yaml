body:
  text: 册府元龜卷五百六十四宋王欽若等撰掌禮部制禮儀注制禮第二唐髙祖武徳元年既受隋禪未遑制作郊廟宴享悉用隋代舊儀太宗貞觀七年以新禮頒示先帝踐祚之初詔中書令房元齡秘書監魏徴等禮官學士修改舊儀著吉禮六十一篇賓禮四篇軍禮十二篇嘉禮四十二篇凶禮六篇國恤五篇總百三十篇分為百卷至是始令頒示十一年三月詔曰先王之辨方正位體國經野象天地以制法通神明以施化樂由内作禮自外成可以安上治民可以移風易俗揖讓而天下治者其唯禮樂乎固以同和無體者非飾玉帛之容崇鐘皷之奏日徃月來朴散淳離淫慝以興流湎忘本魯昭所習惟在折旋魏文所重止於鄭衛秦氏縱暴載籍咸亡漢朝循緝典章不備時更戰國多所未遑雅道淪䘮歴兹永久朕恭承明命嗣膺寳厯懼深馭朽情切納隍慿宗廟之靈資股肱之力上下交泰遐邇乂安率土阽危既極之於塗炭羣生遂性思納之於軌物興言政本夕惕在懐盖知禮樂之情者能作識禮樂之文者能述作者之謂聖述者之謂明朕雖徳謝前王而情深好古傷大道之既隠懼斯文之将墜故廣命賢才旁求遺逸探六經之奥㫖採三代之英華古典之廢於今者咸擇善而修復新聲之亂於雅者竝隨違而矯正莫不本之人心稽乎物理正情性而節事宜窮髙深而歸簡易用之邦國彛倫以之攸叙施之律度金石於是克諧今修撰既畢可頒天下俾富教之方有符先聖人倫之化貽厥後昆十四年正月庚子命有司讀春令詔百官之長升太極殿列坐而聴焉髙宗永徽二年七月詔曰朕聞合宮虚府創鴻規於上代太室總章標茂範於中葉雖復質文殊制奢儉異時然其立大中作人極布政施教歸之一揆朕嗣膺下武丕承上烈思所以荅眷上靈遵事孝飬而法官曠典明堂寢構永言大禮朕甚懼焉宜令所司與禮官學士等考覈故事詳議得失務依典禮造立明堂庶曠代闕文獲申於兹日因心展敬永垂於後昆其明堂制度宜令諸曹尚書及左右丞詳定於是太常博士栁宣依鄭元義以為明堂之制當為五室内直丞孔志約據大戴禮及盧植蔡邕等議以為九室曹王友趙兹皓祕書郎薛文思等各造明堂圗諸儒分爭各有不同上以九室之議為是乃令所司詳定形制及辟雍門闕等務從典故顯慶三年正月太尉長孫無忌侍中許敬宗兼中書令李義府黄門侍郎劉祥道許圉師太常少卿韋琨博士蕭楚才孔志約等修新禮成凡一百三十卷二百九十九篇奏上之詔中外頒行焉時許敬宗李義甫用事其所損益多渉希㫖行用已後學者紛議以為不及貞觀禮上元三年三月下詔令依貞觀年禮為定儀鳯三年又詔顯慶新修禮多有事不師古其五禮並依周禮行事乾封二年二月詳議明堂定詔曰朕以寡薄忝承丕緒奉二聖之遺訓撫億兆之初臨馭朽兢懐推溝在念而上𤣥垂祐宗社降休嵗稔時和人殷俗阜車書混一文軌大同檢玉泥金升中告禪百蠻執贄萬國來庭朝野歡娛華夷胥悦但為郊禋嚴配未安太室布政施行猶闕合宫朕所以日昃忘疲中宵輟寝討論墳籍錯綜羣言採三代之精㣲探九皇之至頤斟酌前載制造明堂棟宇方圎之規雖兼故實度筵陳爼之法獨運財成宣諸内外慱考詳議求其短長兾廣異聞而鴻生碩儒俱稱盡善縉紳士子竝奏該通創此宏模自我作古因心既展情禮獲申永言宗祀良深感慰宜命有司及時赴作務從折衷稱朕意焉總章二年三月丁亥詔曰首出萬物實顯崇髙之位曽覽八紘無違嚮明之道合宫聴朔闡皇軒之茂範靈符通神敷帝勛之景化殷人陽館青珪備禮姬氏𤣥堂彤璋合獻雖運殊驪翰時變質文至於立大中建皇極軌物施教其歸一揆暨乎西京創歴駁政逾繁東漢開基舊章猶闕考圗汶上僅存公王之儀度室圭躔纔紀中元之制三方鼎據祚傾於金馬五胡塵擾道䘮於蒼鵞自此相仍時經版蕩遂使陟配之典久淪於緜載端扆之化允屬於隆平朕恭膺寳命肅奉瑶圗昧旦求衣仄景忘食頼上𤣥垂祐宗社降靈幽明宅心中外禔福封金岱嶺昭累聖之鴻勲勒石九都成文考之先志功標偃革時㑹委裘固可以作化明堂顯庸太室備機之歴既表於嘉名布政之宫式崇於美制是用求中測景取則隂陽考廣袤於裁圭定卑髙於置𣙗傍羅八柱周建四墉架序儀天䟽基象地忩闥齊布應路竝興導辟水以環階應旋衡而結極重阿複道用循測管之模上圎下方仍准分蓍之數木工不琢土事無文豐約折衷經始勿亟勾芒候序入春圃而司儀蓐收戒時下秋園而奉職事符神造鈎䋲之用畢陳義叶子來舋落之期非逺将以肅禋清祀展殷薦於皇靈施號法宮暢休聲於太帝百神執贄咸尊孝饗之風萬國來庭共覩太平之政闕文斯備大禮聿修制作之規可依别勅宜頒示天下永垂來葉於是博考經籍為明堂制度頒下其明堂院每面三百六十歩以象周易乾坤之䇿屬嵗饑竟不克建立而寝上元元年天后上表曰至如父在為母服止一朞雖心䘮三年服由尊降竊謂子之於母慈愛特深非母不生非母不育推燥於濕咽苦吐甘生養勞瘁恩斯極矣所以禽獸之情猶知其母三年在懐理宜崇報若父在為母服止一朞尊父之敬雖同報母之慈有闕且齊衰之制足為差减更令周以一朞恐傷人子之志今請父在為母終三年之服髙宗下詔依行焉則天垂拱四年十二月以東都明堂成制曰昔軒皇御厯朝萬方於合宮丹陵握符咨四岳於衢室有虞輯瑞總章之號既存大禹錫珪重屋之名攸建殷人受命置陽館以辨方周室凝圗立明堂以經野用能範圍三極幽賛五神展尊祖之懐申宗祀之典爰從漢魏迨及周隋經始之制雖興修廣之規未備朕以庸昧䖍膺厚託受寄於綴衣之夕荷顧於仍几之前伏以髙宗徃年已屬意於陽館故京輔之縣預紀明堂之名改元之期先著總章之號朕於乾封之際已奉表上塵雖簡宸心未遑營搆今以鼎郊勝壤圭邑名區處天地之中順隂陽之序舟車是凑貢賦攸均爰籍子來之功式尊奉先之㫖夫明堂者天子宗祀之所朝諸侯之位也闢乾坤之秘奥法氣象之運行故能使災害不生禍亂不作眷言盛烈豈不美歟然比者鴻儒禮官所執各異咸以為明堂者置之二三里之外七里之内在國陽明之地今既俯邇宫掖恐黷靈祗誠乃布政之居未為宗祀之所朕以丙巳之地去宮遥逺每月所居因時饗祭禮備之物頗有煩勞在於朕懐殊非所謂今故栽基紫掖闢宇彤闈經始成之匪但敬事天地神明之徳乃彰尊祀祖宗嚴恭之志方展若使唯云布政負扆臨人則茅宇土堦取適而已豈必勞百姓之力制几筵而御哉誠以獲執蘋蘩䖍奉宗廟故也時既㳂革莫或相遵自我作古用適於事今以上堂為嚴配之所下室為布政之居光敷禮訓式展敬誠來年正月一日可於明堂宗祀三聖以配上帝宜令禮官博士學士内外明禮者詳定儀注務從典要速以奏聞永昌元年正月元日始親享明堂是月四日御明堂布政頒九條以訓於百官是時吐蕃及諸夷以明堂成遣使來賀天册萬嵗二年三月重造明堂成臣欽若等曰證聖元年正月佛堂災延燒明堂並盡至是重造成號為通天宮四月御通天宮之端扆殿有司讀時令布政於羣后𤣥宗開元五年正月幸東都将行大享之禮太常少卿王仁忠博士馮宗陳貞節等議以武氏所造明堂有乖典制詔令所司詳議奏聞刑部尚書王志愔等奏議請改易依舊造乾元殿乃下詔曰古之操皇綱執大象者何嘗不上稽天道下順人極或變通以隨時爰損益以成務且衢室創制度堂以筵用之以禮神是光孝享用之以布政盖稱視朔先王所以厚人倫感天地者也少陽有位上帝斯歆此則神貴於不黷禮殷於至敬今之明堂俯隣宮掖此之嚴祀有異寅恭茍非憲章将何軌物由是禮官博士公卿大夫廣參詳議欽若前古宜存露寝之式用罷辟雍之號可改為乾元殿每臨御宜依正禮季秋大享祀依舊於圎丘行事十三年将封泰山帝以靈山清潔不欲多人上欲初獻於山上壇行事亞獻終獻於山下壇行事因召禮官學士賀知章等入講儀注因問之知章等奏曰昊天上帝君位五方精帝臣位帝號雖同而君臣異位陛下享君位於山上羣臣祀臣位於山下誠足以垂範來葉為變禮之大者也禮成於三初獻亞終合於一處帝曰朕正欲如是故問卿耳於是勅三獻於山上行事其五方帝及諸神於山下壇行事二十年九月以新修開元新禮一百五十卷頒示天下先是十四年通事舍人王嵒上疏請改撰禮記削去舊文而以今事編之詔付集賢院學士詳議右丞相張説曰禮記漢朝所編遂為歴代不刋之典今去聖久逺恐難改易今之五禮儀注貞觀顯慶兩度所修前後頗有不同其中或未折衷望與學士等更討論古今刪改行用制從之乃令學士右散騎常侍徐堅及左拾遺李鋭太常博士施敬本等撿撰歴年不就説卒後肅髙代為集賢院學士始奏起居舍人王邱撰成至是上奏之二十六年四月己亥朔始令太常卿韋縚讀時令於宣政殿百寮於殿上列坐而聴之二十七年勅古者分命公卿廵謁陵寝率皆乘輅以備其儀雖禮則是常不可廢闕而事有適要亦在變通宜令太僕等司每陵各支輅兩乘并儀仗等送至陵所貯掌既免勞煩無虧肅敬其公卿出城日如常儀至陵所准此肅宗乾元元年十二月丙寅立春帝御宣教殿太常少卿于休列讀春令常參官五品以上正員竝升殿序坐而聼之上元二年九月改元為元年詔圎丘方澤依常存一太牢皇廟諸祠臨時獻熟今昊天上帝太廟一牢羊豕各三餘祭盡隨亦供以備禮明火棧飼之禮亦不暇矣元年建夘月辛亥詔曰朕敬授人時慎徽月令庶無極備以獲休徴自今以後每至四孟月迎氣之日與百辟卿士舉而行之代宗廣徳二年正月禮儀使杜鴻漸奏郊廟大禮其祝文自今已後請依唐禮板上墨書其玉簡金字者一切停廢如允臣所奏望編為常式制曰宜用竹簡從古禮也德宗貞元元年十月詔曰郊祀之義本於至誠制禮定名宜從事實五方配帝上古哲王道濟蒸人禮著明祀論善計功則朕徳不類統天御極則朕位攸同而祝文稱臣以祭既無益誠敬有黷等威此豈朕禋祀聰明昭格上下之意前京兆府司録參軍髙佩上疏其理精詳朕重變舊儀訪於卿士申明大義是用釋然依從改正以敦至禮自今已後五方配帝祀文勿稱臣餘禮如舊六年十一月有事於南郊詔以皇太子為亞獻親王為終獻帝問禮官亞獻終獻合受誡誓否吏部郎中栁冕曰准開元禮獻官前七日於内受戒誓詞云各揚其職不供其事國有常刑今以皇太子為亞獻請改誓詞云各揚其職肅奉常儀從之憲宗元和十三年八月太常檢討王彦威進元和曲臺新禮三十卷彦威太常散吏於禮閣掇拾自隋已來沿革吉凶五禮以類區分撰成三十卷進之特授太常博士文宗太和八年二月中書門下奏今月十七日臣等於延英奏事陛下以近嵗隂陽不和水旱為害恐作事有乖於時令施教未合於天心問臣等讀月令因何停廢伏以堯命羲和之官以理四時節授人事至漢丞相魏相奏云隂陽者五事之本羣生之命自古聖賢未有不由者也兼引髙帝時相國蕭何奏云自天子王侯有土之君能法天地順四時以理國家身無禍夭年夀永久是奉宗廟安天下之大禮也願選氣未應灾害之作實恐由斯臣等商量古者敬其事則命以始請從來年正月依開元禮讀時令陛下御宣政殿如朝朔之禮兼請太常卿先撰儀注務於簡便以酌時宜所兾簡而易從行之可久從之明通知隂陽者四人各主一時時至明言所職宣帝納用亦致理平開元二十五年十月制自今春夏秋冬常以孟月朔日於正殿受朝讀時令至二十六年夏四月朔始令太常卿韋縚讀時令於宣政殿百寮於殿上列坐而聼自天寳已後干戈薦興盛典久廢軍旅以便宜從事法令以變權濟時故大化不行和開成三年二月太常卿王起准勑造禮神十王圗晋髙祖天福初詔國朝文物制度起居入閣宜依唐明宗朝事例施行臣欽若等曰五代禮志所述五禮皆㳂前代無所改易故不編録儀注王者成治定之業垂明備之制大則封禪郊廟社稷之事次則朝覲享宴冠婚之文其或舊章湮沒書記罕存則必訪博見洽聞之士咨該練敏識之流俾夫㳂革於古今損益乎名數討河間之墜簡講淹中之舊聞車服羽儀煥然咸序聲明文物浹於天下億兆覩之而悦服夷狄仰之而内向所以傳徐氏之容著曲臺之記載諸油素垂為軌範可不羙歟周周公旦成王時為相制威儀三十所謂冠婚吉㓙盖儀禮是漢叔孫通以髙祖為漢王時通為博士漢王已并天下諸侯共尊為皇帝於定陶通就其儀號就成也后蒼元帝時為博士著曲臺記行射禮於曲臺后蒼為記後漢衛宏字敬仲光武時為議郎撰漢舊儀四卷漢中興儀一卷馬伯第史不載官自此已後不書官者皆史闕建武末制封禪儀樊鯈明帝時為長水校尉與公卿雜定郊祀禮儀鄭𤣥為大司農撰喪服譜一卷應劭獻帝時以前太山太守為袁紹軍謀校尉時始遷都於許舊章湮沒書記罕存劭慨然嘆息乃綴集所聞著中漢輯叙漢官儀及禮儀故事凡十一種百三十六卷朝廷制度百官儀式所以不亡者由劭之記劉表為荆州刺史撰新定禮一卷魏荀攸魏國初建為尚書令撰魏官儀一卷一説魏顗為尚書令詔典著作為魏官儀王粲為侍中時舊儀廢弛興造制度粲嘗典之蜀蔣琬為丞相撰䘮服要義一卷吴張昭為綏逺将軍與孫韶滕𦙍鄭禮等採周漢撰定朝儀謝慈為齊王傅撰䘮服變除圗五卷晋衛瓘為太保撰䘮服儀一卷荀顗為司空撰晋新儀二十卷杜預為鎮南将軍撰䘮服要集二卷崔逰為相府舍人撰䘮服圗一卷行於世蔡謨為司徒撰晋七廟録十卷范汪為安化将軍撰諸府州郡儀十卷賀循為司空撰䘮服要記十卷䘮服譜一卷環濟為太學博士撰䘮服要略一卷葛洪為散騎常侍撰䘮服變除一卷孔衍為廣陵相撰凶禮一卷劉達為侍中撰䘮服要記一卷范隆為侍中國子祭酒撰三禮吉凶宗記甚有條義某璩史失其姓為安城太守撰新定儀注四十卷按隋書經籍志有晋雜儀注十一卷晋尚書儀十卷甲辰儀五卷封禪儀六卷鹵簿圗一卷鹵簿儀二卷史失撰人姓名宋徐廣晋末為漢祖文學祭酒義熙初奉詔撰車服儀注又撰尚書儀曹所定儀注四十一卷車服雜注一卷何承天為錢塘令髙祖在夀陽召為尚書祠部郎中與傅亮共撰朝儀庾蔚之為員外散騎常侍撰䘮服二十一卷傅暢撰晋公卿禮秩故事九卷范曄為太子詹事撰百官階次一卷張鏡為新安太守撰東宫儀記二十三卷徐爰撰家儀一卷按隋書經籍志有宋儀注十卷又有宋儀注二十卷宋尚書雜注十八卷宋長沙檀太妃薨弔荅書十二卷史失所撰姓名南齊王儉為衛将軍撰䘮服古今集記三卷弔荅書儀十卷吉凶書儀二卷王宏為太保撰書儀十卷王俊之為光禄大夫撰䘮服世行要記十卷禮儀制度十三卷王珪之為長水校尉撰齊職儀凡五十卷永明中其子中軍叅軍顥啟上詔付祕閣按隋書經籍志有齊鹵簿儀一卷諸衛左右旗圖様一卷史失所撰人姓名梁伏㬅容初仕齊為太子率更令與衛将軍王儉深相交好令與河内司馬憲吳郡陸澄共撰䘮服古今襍記何𦙍仕齊為國子博士時尚書令王儉受詔撰新禮未就而卒使特進張緒續成之緒又卒屬在司徒竟陵王子良子良以譲𦙍乃置學士三十人佐𦙍撰録有政禮十卷士䘮儀注九巻按南齊列傳中書郎劉繪吳郡杜栖竝助𦙍制禮儀也嚴植之天監初授後軍騎兵参軍事髙祖詔求通治五禮有司奏植之治凶禮撰儀注四百七十九卷録四十五卷明山賔為國子博士撰吉禮儀注二百四十四卷禮儀二十卷孝經䘮服十五卷録六卷一云吉禮儀注十卷賔禮儀注十卷陸璉撰軍禮儀注一百九十二卷録二卷賀瑒為歩兵校尉領五經博士撰賔禮儀注一百四十五卷一云九十巻司馬褧為晋安王長史撰嘉禮儀注一百一十二卷録二卷鮑泉為五經博士於儀禮尤明撰新儀四十卷行於世一云二卷謝朏為司徒尚書令撰書筆儀二十卷任昉為新安太守撰梁儀注十卷丘仲孚為豫章太守撰尚書具事雜儀行於世又撰皇典徐勉為衛将軍撰齊職儀十卷又撰太廟祀文二卷何㸃徴侍中不起撰禮儀注九卷周捨為太子詹事卒撰書儀疏一卷周遷撰古今輿服雜事二十卷蕭子雲為國子祭酒撰東宫新記二十卷裴子野為通直郎撰䘮服傳一巻鮑行卿為歩兵校尉撰皇室儀十三卷按隋書經籍志有梁雜凶禮四十二巻雜儀注一百八卷梁尚書職儀注四十一卷史失撰人姓名陳沈文阿為通直散騎常侍兼國子博士撰儀禮八十餘卷馬樞字要理徴度支尚書辭不應命撰邇儀四卷鄭灼為尚書儀曹郎廣沈文阿儀注撰五禮戚衮為國子助教始興王府録事参軍衮於梁代撰三禮儀記值亂亡失按隋書經籍志有陳尚書雜儀注五百五十卷陳吉禮一百七十一卷陳賔禮六十五卷陳軍禮六卷陳嘉禮一百二巻鹵簿圗一卷史失撰人姓名後魏崔元伯道武時為黄門侍郎撰朝覲宴饗郊廟社稷之儀李韶為儀曹令孝文時修改車服及羽儀制度皆令韶典焉宣武時遷将作大匠勅参定朝儀律令常景為太常博士與太常劉芳撰朝令未及班行别典儀注多所草創未成芳卒景纂成其事拜謁者僕射孝明時勅撰太和之後朝儀已施行者凡五十餘卷後遷中書舍人與侍中崔光安豐王延明受詔儀定服章勅景叅修其事遷為中散大夫蠕蠕主阿那瓌歸闕朝廷疑其位次髙陽王雍訪景曰昔咸寜中南單于來朝晋世處之王公特進之下今日為班宜在藩王儀同三司之間雍從之靈太后詔依漢世隂鄧二后故事親奉廟禮與帝交獻景據正以定儀注朝廷是之後為祕書監撰儀注三十卷邢昕為中書侍郎受詔與祕書監常景典儀注事出帝行釋奠禮昕與祕書裴伯茂等俱為録義盧觀為著作佐郎與太常少卿李神雋光禄大夫王誦等在尚書上省撰定朝儀按隋書經籍志有後魏儀注五十卷史失撰人姓名北齊崔瞻初仕後魏為大夫中庶子孝明時太子納妃斛律氏𠡠瞻與鴻臚崔劼撰定婚禮儀注仍靣受别㫖曰雖有舊事恐未盡善可好定此儀以為後式崔昻為散騎常侍與太子少師邢邵議定朝儀定國初禮趙彦深為司徒撰吉禮七十二卷皇太子䘮禮十卷袁律修為祕書監天統中詔與趙郡王叡等議定五禮按隋書經籍志有後齊儀注二百九卷雜要禮三十八巻皇太子序親簿一巻史失所撰姓名後周周恵達初仕西魏為右僕射自闗右草創禮樂缺然恵達與禮官損益典章至是儀軌稍備薛憕仕西魏為中書侍郎文帝大統初儀制多闕太祖令憕與盧辨檀翥等参定之薛寘仕西魏為中書令朝廷方改物創制欲行周禮乃詔寘與少宗伯盧辨斟酌古今共詳定之庾瑾為司宗中大夫内史撰新儀十編一云書儀十萹隋薛道衡初仕北齊為散騎常侍武平初詔與諸儒脩定五禮宇文弼初仕後周為禮部上士奉詔定五禮裴政仕周為散騎侍郎與盧辨依周禮建六卿設公卿大夫士并撰次朝儀車服器用多遵古禮革漢魏之法事並施行潘徽字伯彦吳郡人煬帝鎮江都引為揚州博士令諸儒撰江都集禮一部復令徽作序按隋書經籍志有婦人書儀八巻失所撰人姓名又有梁脩端文儀二卷謝元内外書儀四卷蔡超書儀二卷李穆叔趙李家儀十巻録一巻釋曇瑗僧家書儀五巻失其朝代唐竇威隋末為考功郎稱病去官及髙祖定闗中引為相國司録草創儀制多威所定髙祖嘗謂裴寂曰叔孫通不能加也令狐徳棻累官太常卿撰皇帝封禪儀六卷張文琮為江州刺史撰䘮儀纂要七卷姚璹為納言則天将封嵩嶽命璹總知撰儀注路敬淳為太子司議郎崇賢館學士數受詔脩緝吉凶雜儀韋叔夏為春官員外則天将拜辟雍及享明堂皆别授制其當時儒者祝欽明郭山惲撰定儀注凡所立義衆咸推伏久之歴遷成均司業久視元年下制曰吉凶禮儀家國所重博士亦甚詳明成均司業韋叔夏太子率更令祝欽明博渉經史多所該練委以参掌兾得精詳自今禮司所脩儀注並令叔夏等刋定訖然後奏進鄭餘慶為右僕射憲宗以其諳練典章朝廷禮樂制度有乖故事専委餘慶叅酌施行遂為詳定使又以刑部侍郎韓愈禮部侍郎李程副知詳定右司郎中崔郾吏部郎中陳諷刑部貟外楊嗣復禮部貟外庾敬休竝充詳定判官從餘慶之請也朝廷儀制吉凶五禮咸有損益焉韋處厚為翰林學士敬宗寳歴末樞宻使王守澄議立文宗問儀於處厚處厚該博今古一夕制置無不得禮且曰詰旦江王宜先下教布告羣臣言已平内難下教訖羣臣然後合班勸進禮畢太皇太后當有令奏册江王即皇帝位於是一如處厚議後唐劉岳為太常卿文學之外通於典禮明宗天成中奉詔撰新書儀一部文約而理當至今行於世册府元龜卷五百六十四
