body:
  text: 册府元龜巻九百七十六宋王欽若等撰外臣部褒異第三唐肅宗至徳二載正月回紇大首領葛邏支將軍等來朝耻班在武臣之下他日帝親引上殿賜食并賜賚慰其意以遣之六月丁酉囘紇首領大將軍多攪等十五人入朝賜食物衣有差閏八月戊寅回紇葉䕶太子入見帝親宴慰賜以金帛器物恣其所欲待之甚厚十月己酉奚首領白越及契丹首領捺括等入朝賜食金帛錦繡衣服等使還蕃乾元元年二月乙卯䕶密國王使大首領羅友文來朝加特進左武衛大將軍仍聽還蕃四月庚申罽賓王藏般若力中天竺國婆羅門三藏善部末摩箇失宻三藏舍郡並慕入朝詔以力為太常少卿末摩為鴻臚少卿並員外置五月壬申朔詔以吐火羅三藏山那及弟子逹摩首領安延師等來詣闕以三藏為光禄少卿逹摩可折衝都尉延師可左清道率並員外置仍放還蕃又乾陁羅國王使大首領中郎將踏匐勒特車鼻施達干並授將軍放還蕃戊戌宴囘紇使於紫宸殿六月丙午囘紇使逹亥阿波刺史入朝迎公主詔授開府儀同三司七月癸未䕶密國王紇設伊俱臯施來朝帝嘉之賜姓李改名崇信八月丁卯新羅國使來朝歸仁國使來朝並宴于紫宸殿九月甲申囘紇使大首領蓋將軍等謝公主下降兼奏破昆堅五萬人宴於紫宸殿賜物有差十一月甲子廻紇使三婦人謝寧國公主之聘也賜宴紫宸殿十二月黑衣跋陁國使伏謝多還蕃宴賜有差二年三月甲申囘紇王子骨咄特勒宰相帝徳等十五人自相州奔于西京帝宴之紫宸殿賞物有差庚寅囘紇特勒辭還行營帝宴之于紫宸殿賜物有差乙未以囘紇王子新除右羽林大將軍員外置骨啜特勒為銀青光禄大夫鴻臚卿員外置辛丑囘紇多害長吏等還蕃帝宴于紫宸殿賜物有差八月壬戍十姓突騎施黒姓可汗阿多裴羅等并波斯進物使李摩曰夜等及寧逺國使葛等來朝並宴於内殿十二月戊申宴蕃胡柘羯於三殿各賜物三十段三年正月乙酉宴奚使土門將軍賜金帛器物有差四月壬辰隴右投降突厥奴刺偲等五人於延英殿見賜物有差癸巳囘紇俱録莫賀逹干等七十四人於延英殿見賜物有差上元元年八月己卯囘紇使二十人於延英殿通謁賜物有差代宗寶應元年五月丁未囘紇演者裴羅等十人來朝引見于延英殿賜物有差六月乙卯突厥奴刺部落千餘人内屬請討賊自效丁巳宴剌奴大首領于内殿賜物有差八月己酉奚及契丹來朝宴于三殿九月丙申以囘紇可汗舉國兵馬至太原遣使奉表請助王師討平殘寇是日引其使宴于延英殿賜物有差十一月丁亥囘紇遣使拔賀那上表賀收東京并獻逆賊史朝義旌旗等物引見于内殿賜綵物二百疋永泰元年六月癸亥突厥自賀蘭等一十二人來朝並留左羽林軍宿衛二年四月甲子囘紇遣首領密悉吉等及牙帳一百人來朝宴于紫宸殿壬子新羅王金獻英遣使朝貢授其使檢校禮部尚書遣之大歴二年三月己卯宴吐蕃使于禮賓院三年正月甲子册新羅國王金乾運母為妃五月丙寅御紫宸殿宴新羅囘紇使四年十月丁巳宴吐蕃尚悉摩等八人於紫宸殿六年十一月乙酉宴文單國王婆妳等二十五人于三殿七年四月甲寅囘紇王子左武衞員外大將軍奢秉義卒贈天水郡王葬事官給令京兆尹充使監䕶秉義歸國宿衞因以賜姓及卒帝悼之乃加禮優寵五月丁未新羅遣金標石來賀正授衞尉員外少卿放還蕃九年二月甲午許蓮華寺尼悟空似先氏還俗封沂國夫人并賜實封一百戸似先氏囘紇可汗之妻母故特寵之也七月辛酉宴吐蕃使于内殿癸巳宴廻紇使骨咄禄梅羅逹干等賜物有差十一月壬子新羅賀正使還蕃授衞尉員外郎遣之十二年十月追贈九姓囘紇宰相曹宻粟亡妻石氏為岷國夫人徳宗貞元四年五月賜宴東蠻鬼王驃傍苴夢衝苴烏星等於麟徳殿頒賜各有差驃傍等自宿雋州臣於吐蕃絶朝貢者三十餘年及是劍南節度韋臯招誘之始棄吐蕃内附來朝特封為和義順正等郡王且授以冠帶仍給两林勿登等部部印而遣之五年十二月庚午囘紇洎咄禄長壽天親毗伽可汗薨廢朝三日仍令文武三品已上就鴻臚弔其使者六年十二月丙申詔九姓囘鶻登里羅没宻施俱録忠貞毗伽可汗薨廢朝三日仍令文武官三品已下就鴻臚弔其使者七年五月戊辰以渤海賀正使太常靖為衞尉卿同正令歸國八年七月甲子以回鶻使藥羅昊檢校尚書右僕射昊本唐人姓吕氏因入回鶻可汗使遂以可汗姓名藥羅葛氏在國用事因來朝帝嘉賚之賜命官而遣之仍給市馬絹十萬疋十年二月壬戌以來朝渤海王子太清允為右衞將軍同正其下拜官三十餘人契丹大首領梅落河奚大首領梅落隘都等皆授果毅都尉令歸國四月戊辰以雲南來朝使叚南羅為試太子詹事兼御史中丞九月辛卯南詔使蒙凑羅揀及清平官尹求寛來獻鐸槊浪人劍及吐蕃印八鈕湊羅揀異牟尋之弟也既朝召見於麟徳殿賚賜甚厚十一年正月甲申以降吐蕃論乞髯湯没藏悉諾硉為歸徳將軍二月甲子以九姓廻鶻吐禄毗伽奉誠可汗卒廢朝三日仍令文武三品已上官就鴻臚弔其使者四月壬戌贈南詔異牟尋弟凑羅揀右常侍初牟尋令凑羅揀入朝還國卒於道故追贈焉癸亥以南詔謝册使尹輔酋為檢校太子詹事兼中丞餘皆授官有差甲子下勅書及贈帛賜南詔異牟尋及子各勸清平官鄭廻尹求寛等各一書書左始引中書三官宣奉行復舊制也十二年七月壬辰贈故降吐蕃歸徳將軍論乞髯湯没藏悉諾硉懷化大將軍又以論乞髯子湯忠義為起徳將軍十四年正月壬辰以文單國朝貢使李頭及為中郎將放還蕃九月丁卯以黑衣大食使含嵳烏雞莎比三人並為中郎將放還蕃十一月戊申以渤海國王大嵩隣姪能信為左驍騎衞中郎將虞侯婁蕃長都督茹富仇為右武衞將軍並放還蕃十八年正月戊寅以驃國王子悉利移為試太僕卿十九年正月癸丑南詔朝賀使楊鏌龍試太僕少卿兼待御史黎州廓清道蠻首領襲恭化郡王劉志遼試太常卿二十年三月甲申以吐蕃贊普卒廢朝三日命工部侍郎張薦弔祭之命文武三品以上官弔其使順宗以貞元二十二年正月丙申即位二月戊辰以新羅王金重熈母和氏為太妃妻朴氏為妃憲宗元和元年二月丁酉授入朝奚王誨落銀青光禄大夫檢校司空饒樂郡王放還蕃國十一月庚子朔己亥歸宿衞新羅王子金獻忠于其國加試秘書監二年八月丙辰朔授南詔使者鄧傍傳試殿中監三年正月甲辰授奚首領索位威衞將軍同正充檀薊遊弈使仍賜姓李氏三月丁亥以囘紇滕里野人令俱録毗伽可汗卒廢朝三日仍令文武三品已上就鴻臚寺弔其使者十月己酉勑新羅王叔金彦昇弟仲恭等三人宜令本國准舊例賜㦸四年正月戊戍帝御麟徳殿引南詔渤海使謁見賜物有差十月甲午以投來奚王没辱孤為右領軍衛將軍員外同正充幽州盧龍軍節度使平林游弈兵馬使仍賜姓李氏五年五月戊午麟徳殿對歸國廻鶻伊難珠等三人賜錦綵器服有差十二月丁卯麟徳殿召對奚丹使賜錦綵金帛有差六年六月戊申三殿對囘鶻及奚使者頒賜有差七年正月癸酉帝御麟徳殿對南詔渤海䍧牱等使賜宴有差甲申賜渤海使官告三十五通衣各一襲丁亥御麟徳殿對南詔使李興禮等各授以官宴賜有差七月庚午以新羅質子試衞尉少卿賜紫金魚袋金沔為試光禄少卿充弔祭冊立副使隨崔稜赴新羅八月丁亥朔勅新羅國大宰相金崇斌等三人宜付本國准舊例賜㦸八年五月戊午廻鶻請和親使伊難珠還蕃宴于三殿賜以銀器繒帛十二月壬辰帝御麟徳殿召見契丹使逹干可葛等賜錦綵有差丙午宴南詔渤海牂牁使仍賜以錦綵九年二月己丑麟徳殿召見渤海使高禮進等三十七人宴賜有差十年正月丁酉詔賜渤海使者卯貞壽等官告放還蕃及召見新羅及南詔蠻使宴賜有差二月甲子賜渤海使大吕慶等官告歸之三月丙子賜渤海使者官告歸之十一月丁酉歸契丹使以告身十九通賜其貴人十二月辛丑賜南詔蠻使楊廷竒等告身二十九通丙午賜南詔蠻錦綵有差十一年正月庚午授牂牁使者十六人官賜以銀綵庚寅以國信三十一封授南詔蠻使歸之甲申歸契丹使以告身十九通賜其貴人二月癸卯賜囘鶻渤海使錦綵銀器有差庚戍授渤海使高宿滿等二十人官五月己酉以南詔蠻大首領蒙龍盛卒廢朝三日十二年二月辛卯賜宴歸國囘鶻摩尼僧等八人三月甲戌以錦綿賜渤海使大誠愼等四月庚子以吐蕃贊普卒廢朝三日十三年九月癸巳御麟徳殿對吐蕃使論句藏戊戍命宰臣宴吐蕃使人於中書省十四年正月癸未御麟徳殿對歸國廻鶻使宴賜有差庚寅對南詔䍧牱等使于麟徳殿賜物有差穆宗以元和十五年即位二月庚寅對新羅渤海朝貢使于麟徳殿宴賜有差二月癸卯朔對歸國囘鶻合逹干等于麟徳殿兼許和親賜錦綵銀器有差七月壬戍詔盛飾安國慈恩千福開業章敬等寺縱吐蕃使者以觀焉乙丑對吐蕃弔祭使于麟徳殿宴賜有差九月戊辰對吐蕃使於麟徳殿宴賜有差十一月辛酉對南詔奚契丹等使於麟徳殿賜以銀器錦綵十二月壬辰對新羅渤海南詔䍧牱昆明等使于麟徳殿宴賜有差長慶元年二月辛卯以九姓囘鶻毗伽保義可汗薨輟朝三日仍令諸司三品以上官就鴻臚寺弔其使者四月庚辰命宰臣等於侍中㕔宴吐蕃使二年正月壬子對渤海使者於麟徳殿宴賜有差六月丁卯吐蕃遣使來朝召對於麟徳殿宴賜有差八月壬午對吐蕃使者五十人於麟徳殿宴賜有差九月戊子朔宴吐蕃使論悉喏等十五人於中書省勅曰蕃客等皆逺申朝聘節遇重陽宜共賜錢二百貫以充宴賞仍給太常音樂丁巳對隂山府沙陁突厥兵馬使朱邪執宜等於麟徳殿仍賜官告錦綵銀器十月壬子對囘紇使者於麟徳殿宴賜有差敬宗寶歴元年六月丁亥命品官田務豐領國信十二車使廻鶻可汗及太和公王文宗太和元年正月辛亥麟徳殿對歸國吐蕃新羅使宴賜有差四月癸巳御麟徳殿對渤海使者十一人宴賜有差十一月甲寅麟徳殿對南詔契丹使宴賜有差二年正月乙亥對歸國南詔使及入朝室韋于麟徳殿宴賜有差八月丙子對入朝囘鶻安寧四十人於麟徳殿宴賜有差十二月己卯渤海新羅室韋契丹南詔皆遣使朝貢並詔對于麟徳殿宴賜有差五年三月己亥朔新羅國王檢校太尉金彦昇薨廢朝六年正月麟徳殿對南詔䍧牱宴賜有差二月丙辰麟徳殿對入朝吐蕃論董渤藏等一十九人又對渤海王子大明俊等六人宴賜有差七年正月甲午麟徳殿對䍧牱刺史宗士方等四人甲寅麟徳殿對歸國南詔蠻王丘銓等二十二人於内亭子賜食賜物有差二月己卯麟徳殿對歸國頰藏等一十九人渤海王子大光晟等六人䍧牱刺史趙倫等四人昆明摩弥叔敬等七人宴賜有差三月庚戍麟徳殿對歸國廻鶻李義節等一十九人宴賜有差四月辛酉以九姓廻鶻可汗薨廢朝三日仍令諸司文武三品尚書省四品已上官就鴻臚寺弔其使者十二月庚戍對室韋大都督阿朱等二十人䍧牱刺史謝聞臺等二十人頒賜有差八年正月庚午麟徳殿對南詔及室韋奚契丹䍧牱等使頒賜有差開成元年十二月壬子新羅國質子試光禄卿賜紫金魚袋金允夫進狀稱本國王命臣入朝充質二十六年飱矣三蒙改授試官再當本國宣慰及冊立等副使准徃例皆蒙特授正官遂授武成王廟二年正月癸巳上御麟徳殿對賀正南詔洪龍軍三十人渤海王子大明俊等一十九人宴賜有差二月癸卯賜奚丹室韋等告身八十九通六月甲寅賜宿衛新羅金忠信等錦綵有差三年二月辛卯上麟徳殿對入朝南詔䍧牱契丹奚室韋渤海等各賜錦綵銀器有差四年正月御麟徳殿對入朝賀正南詔趙酋莫等三十七人賜官告并錦綵銀器金銀帶衣服等有差武宗開成五年正月即位十二月御三殿對歸國南詔等十六人㑹昌元年七月癸巳勑賜盟没斯姓李名全忠制曰昔項伯歸義奉春建䇿賜之劉氏列在漢宗爰寵茂勲抑惟前典盟没斯等代雄沙漠勇冠天山早稱良將之才當佩名王之綬附于絶塞歲已再朞秉是一心竟全大義今則解其毳服始列牙旗自我加恩益聞勵節驥登吳坂感顧盻以長鳴劍出豐城繇拂拭以增煥又以右北平太守李廣北狄避之號為飛將軍顧其苖裔頗在龍庭美瓜瓞之所興因而命氏貴棣蕚之方韡當使同榮夫思在無邪忠為令徳嘉其立志用以錫名爾宜念之無替休命又以囘鶻内宰相受耶勿充歸義軍副使兼賜姓名制曰自古制軍必在佐貳逮至漢氏亦循舊章既得將才俾叅戎政實資謀䇿用正紀綱受邪勿徃在龍廷嘗為貴相乘其乖亂遂㧞跡於殊隣加以懷柔竟歸心於上國而又推誠所奉果協良圖每獲異謀必來獻欵旋觀深志可謂竭忠昔戎狄請和全繇孟樂呼韓帥服始自秩訾言念茂功所宜異等因其請族錫以嘉名漢賜秺侯尚採祭天之義魏親程昱用疇捧日之心寵以貂璫冠於禆校服兹新命宜保厥終可檢校右散騎常侍兼歸義軍副使仍賜姓受名𢎞順十一月帝御麟徳殿見室韋大首領督熱論一十五人賜物有差二年九月幽州節度使張仲武奏契丹新立屈戍等契丹舊用丹之印為文十二月御麟徳殿引見室韋大首領督熱論一十五人宴賜有差六年正月南詔契丹室韋渤海䍧牱昆明等使並朝于宣政殿對於麟徳殿賜食於内亭子仍賚錦綵器皿有差懿宗咸通元年正月御紫宸殿受朝對室韋使昭宗天祐元年六月佛齊國入朝使滿訶粟可寧逺將軍梁太祖開平二年正月渤海國朝貢使殿中少令崔禮光已下各加爵秩并賜金帛有差三年八月戊寅御文殿召契丹朝貢使昌鹿等五十人對見羣臣以逺蕃朝貢稱賀罷賜昌鹿以下酒食於客省賚銀帛有差九月癸卯賜契丹朝貢使曷魯押進將軍汚鹿副使夫逹通事王梅落及首領等銀絹有差乾化元年十一月丙午以廻鶻都督周易言為右監門大將軍同正地略李麦之石壽兒石論斯並左千牛衛將軍同正李屋列殊安鹽山並右千牛將軍同正吐蕃温末首領杜論没悉伽杜論心並左領軍衛將軍同正温末蘇論乞禄論右領軍衛將軍同正癸未廻鶻入朝僧凝盧宜李思宜延錢等並賜紫衣還蕃二年閏五月戊申詔以分物銀器賜渤海進貢首領以下遣還其國庚申嗢末首領熱逋鉢督崔延没相等並授銀青光禄大夫檢校太子賔客遣還本部後唐莊宗同光元年十一月丁巳新羅國王朴英遣倉部侍郎金樂録事叅軍金㓜卿朝貢賜物有差二年四月戊寅新羅朝貢使授朝散大夫守倉部侍郎賜紫金魚袋金岳為朝議大夫試衛尉卿五月庚申賜渤海朝貢使大元譲等分物有差八月渤海朝貢使王姪學堂親衛大元謙可試國子監丞十一月庚寅以黒水國朝貢元兒為歸化中郎將三年五月乙卯以渤海國入朝使政當省守和部少卿賜紫金魚袋裴璆可右贊善大夫明宗天成二年三月乙卯以新羅國權知康州事王逄規為懷化將軍新羅國前登州都督府長張希岩新羅國登州知後官本國金州司馬李彦謨並可檢校右散騎常侍庚午以新羅國入朝使中散大夫兵部侍郎賜紫金魚袋張芬可檢校工部尚書副使兵部郎中賜緋魚袋朴術洪可兼御史中丞判官倉部員外郎賜緋魚袋李忠式可兼侍御史四月新羅國康州遣使林彦朝貢對於中興殿賜物有差八月昆明大鬼主羅殿王普露静王九部落各差使若土等隨牂牁清州八郡刺史宋朝化等一百五十三人來朝各賜等第官告繒帛錦衣銀器放還蕃九月壬申契丹差梅老滑骨以下進奉各有頒賜十二月宣飛勝指揮使安念徳使於契丹賜契丹主錦綾羅三百五十疋金花銀器五百兩寳装酒器一副其母繡被一張寳裝纓絡一副三年正月己酉契丹主阿保機妻差使送前振武副使劉在到行闕賜在金錢帛銀器金帶鋪陳氈褥甚厚甲子契丹使秃汭悲梅老以下五十人進奉仍各賜錦衣銀帶束帛有差宣散指揮使奔托山押國信賜契丹主妻契丹指揮使郭知瓊歸國錫賚加等戊辰勑以吐蕃野利延孫等六人並可懷逺將軍囘鶻米里都督等四人並可歸徳將軍二月甲午勑吐渾寧朔奉化兩府都知兵馬使撿校司徒李紹魯可授光禄大夫撿校太保竭忠建䇿興復功臣吐渾寧朔府都督檢校工部尚書赫連公徳可金紫光禄大夫檢校右僕射賜忠義正衞功臣五月辛未囘鶻使辭於便殿賜賚有差九月甲申吐蕃囘紇入貢使放還蕃賜錦衣繒帛有差壬辰吐蕃使閻薩羅等三人並可歸化司戈囘紇使羅婆都督可歸化司階十月甲子差春州刺史米海金押國信賜契丹王及廻使梅老秀里等辭賜物有差十二月壬戌吐蕃㜸王子撥氈可歸徳郎將首領十人並授歸化司戈四年正月壬辰囘鶻入朝使掣撥都督等五人並可懷化司戈七月乙酉以渤海國前入朝使高正詞為太子洗馬八月乙巳黒水朝貢使骨至來可歸徳司戈癸亥北京奏𦵏摩尼和尚摩尼囘鶻之佛師也先自本國來大原少尹李彦圖者武宗時懷化郡王李思忠之孫也思忠本囘鶻王子盟没斯也歸國錫姓名闗中大亂之後彦圖挈其族歸太祖賜宅一區宅邊置摩尼院以居之至是卒長興元年正月勅河西党項蕃官來萬徳可懷化司戈餘如故十二月以党項折家族五鎮都知兵馬使折文政檢校僕射以党項薄備家族都督薄備撒羅檢校尚書二年十一月戊申以吐蕃首領掇里忙布藺氈並為歸徳司戈三年正月渤海囘鶻順化可汗吐蕃各遣使朝貢凉州奏將吏有狀請朝廷命帥兼進方物諸蕃使各賜物有差三月丙申囘鶻朝貢使都督拽祝為懷化將軍副使印安勤懷化郎將監使美梨懷化司候判官裴連兒懷化司階己亥以吐蕃朝貢使左廂首領右千牛衛將軍同正野利閭心為歸徳大將軍右廂首領籛心為懷化郎將中廂首領李琪讀歸利司候重雲都督對兒六突兒鷄並為歸徳司階五月契丹入朝使繡骨梅里辭歸蕃賜分物鞍馬錦袍銀帶七月詔特進檢校太保使持節𤣥莵州都督上柱國高麗國王建妻河東栁氏可封河東郡夫人高麗入朝使太相王儒奏請也十一月吐蕃朝貢使辭人賜虎皮一張皆披虎皮拜謝委身婉轉落其氊㡌見髪亂如蓬帝笑之不已四年七月癸巳囘鶻遣都督李米等三十人來朝進白鶻一聨帝召對於廣壽殿厚加錫賚仍命解放其鶻閔帝應順元年正月賜廻鶻入朝摩尼八人物有差閏正月瓜州入貢牙將唐進沙州入貢梁行通囘鶻朝貢安摩訶等辭各賜錦袍銀帶物有差廢帝清泰二年八月乙亥囘鶻朝貢使密録都督陳禄海為懐化郎將副使逹奚相温為懷化司階監使屈蜜録阿撥為歸徳司戈判官安均為懷化司戈三年正月庚午以高麗朝貢使王子太相王規檢校尚書右僕射副使廣評侍郎崔儒試將作監其節級三十餘人並授司戈司階二月戊辰以吐渾寧朔奉化兩府留後檢校尚書左僕射李可乆超授檢校司徒其副使檢校工部尚書赫連海龍可檢校尚書左僕射其兩府大夫李鐵匱可檢校右僕射可乆海龍鐵匱皆吐渾白姓赫連部落前朝賜姓巳已以熟吐渾左廂都指揮使李全福右廂赫連撒濫並可懐化司階指揮使党海甲叚公奴梁康全王堂九高骨吐山党公政叚貞福康息力慕容于谷李海全李冬山兩府都評事梁戞根啜等並可懐化司戈吐渾指揮使党紇辢秦公逹慕容葛禮並可懐化司戈皆吐渾兩府白赫連之將校也晉高祖天福二年春故契丹人皇王歸𦵏輟視朝三日十一月詔賜北朝曷魯相公聶相公幽州趙思温繒帛器皿以前屯瀛州援王師討魏故也三年五月囘鶻朝貢使都督翟全福并肅州甘州専使僧等歸本國賜鞍馬銀器繒帛有差十一月授于闐國進奉使檢校太尉馬繼榮鎮國大將軍副使黄門將軍國子少監張再通試衛尉卿監使殿頭承㫖通事舍人吴順規試將作少監囘鶻使都督李方金歸義大將軍監使雷福徳順化將軍漢隱帝乾祐元年七月以囘鶻入朝貢使李握為歸徳大將軍副使安鐵山監使太相温並為歸徳將軍判官翟毛哥為懷化將軍于闐入朝使王知鐸檢校司空副使張文逹檢校右僕射監使劉行立撿校兵部尚書判官秦元保檢校左僕射並放還蕃周太祖廣順元年二月癸丑寒食節太祖出𤣥化門至浦池設御幄遥拜諸陵宣召契丹使䮍骨支囘鶻都督賜酒食未時還宫己未䮍骨支辭賜衣着五十疋銀器二十兩綵二十疋又賜從人各綵三十疋世宗顯徳五年甲午詔賜廻鶻逹怛國信物有差六年正月壬子高麗國王王昭遣其臣王子佐丞王兢佐尹皇甫魏光等來進名馬及織成衣襖弓劍器甲等賜兢等龍衣銀帶器幣有差十一月壬戍占城國進奉使蒲河散金婆羅等辭各賜分物有差仍令齎金銀器千兩繒綵十叚及細甲名馬銀鞍勒等就賜本國主釋利因册府元龜巻九百七十六
