body:
  text: 册府元龜巻一百二十五宋王欽若等撰帝王部料敵夫王者之兵先勝而後戰蓋夫慮敵而動見可而進斯謂出竒無窮伐謀為上者也𦕈觀載籍三代而下撥亂經綸之后仗義征伐之君何嘗不制勝於廟堂之中決㡬於萌朕之表沉謀秘略先天奪人臨事對敵望表知裏用能救元元之命定天下之業夷兇靖難令聞長世自非英識内藴雄威兼厲洞察情偽練逹戎昭智慮造乎精㣲規摹極於宏逺又曷能臻此㢤漢髙祖初為漢王二年四月西過梁地至虞謂謁者隨何曰公能説九江王布使舉兵畔楚項王必留擊之得留數月吾取天下必矣隨何徃説布果使畔楚八月遣酈食其説魏王豹豹不聽乃以韓信為左丞相與曹參灌嬰俱撃魏食其還漢王問魏大將誰也對曰栢直王曰是口尚乳臭不能當韓信騎將誰也曰馮敬曰是秦將馮無擇子也雖賢不能當灌嬰歩卒將誰也曰項它曰不能當曹參吾無患矣武帝元狩四年匈奴入右北平定襄殺略漢千餘人其明年帝與諸將議曰翕侯趙信為單于畫計常以為漢兵不能度幕輕留言輕易漢君故留而不去也一曰謂漢兵不能輕入而久留也今大發卒其勢必得所欲帝令大將軍青驃騎將軍去病出塞大斬首虜後漢光武建武四年賊帥劉永將董憲時在郯其將賁休舉蘭陵城降憲聞之自郯圍休時蓋延及龎萌在楚請往救之帝勑曰可直往擣郯則蘭陵必自解延等以賁休城危遂先赴之憲逆戰而陽敗延等遂退逐因拔圍入城明日憲大出兵合圍延等懼遽出突走因往攻郯帝讓之曰間欲先赴郯者以其不意故耳今既奔走賊計已立圍豈可觧乎延等至郯果不克而董憲遂拔蘭陵殺賁休吳漢征公孫述攻拔廣都遣輕騎燒成都市橋武陽以東諸小城皆降帝戒漢曰成都十餘萬衆不可輕也但堅據廣都待其來攻勿與爭鋒若不敢來公轉營廹之須其力疲乃可撃也漢乘利遂自將歩騎二萬餘人進逼成都去城十餘里阻江北為營作浮橋使副將武威將軍劉尚將萬餘人屯於江南相去二十餘里帝聞大驚讓漢曰比勑公千條萬端何意公臨事勃亂既輕敵深入又與尚别營事有緩急不復相及賊若出兵綴公以大衆攻尚尚破公即敗矣幸無它者即引兵還廣都詔書未到述果使其將謝豐袁吉將衆十餘萬分為二十餘營並出攻漢使别將萬餘人刼劉尚使不得相救漢與大戰一日兵敗走入壁豐因圍之隗囂據天水帝命將征之帝聞得略陽甚悦左右恠帝數破大敵今得小城何足以喜然帝以略陽囂所依阻心腹已壞則制其支體也朱浮為幽州牧時彭寵反攻浮涿郡太守張豐亦反浮以為天子必自將兵討之而但遣鄧隆助浮浮以為帝怠於敵不能救之乃上疏詔報曰徃年赤眉䟦扈長安吾策其無榖必東果來歸降今度此反虜勢無久全其中必有内相斬者今軍資未充故須後麥耳後豐寵並自敗初彭寵攻朱浮於薊帝使㳺擊將軍鄧隆救薊隆軍潞南浮軍雍故遣吏奏狀帝讀激怒謂使吏曰營相去百里其勢豈可得相及比若還北軍必敗矣寵果盛兵臨河以拒隆又别發輕騎三千襲其後大破隆軍浮遠遂不能救引而去鄧禹遣馮愔宗歆守栒邑二人爭權相攻愔遂殺歆因反擊禹禹遣使以聞帝帝問使人愔所親愛為誰對曰䕶軍黄防帝度愔防不能久和勢必相忤因報禹曰縳馮愔者必黄防也乃遣尚書宗廣持節降之後月餘防果執愔將其衆歸罪魏太祖時田豐為袁紹别駕逢紀憚其亮直數䜛之於紹紹於是有害豐之意後太祖聞豐不從戎喜曰紹必敗矣及紹奔遁復曰向使紹用其别駕計尚未可知也文帝黄初二年鎮西將軍曹真命衆將及州郡兵討破叛胡治元多盧水封賞等斬首五萬餘級獲生口十萬羊一百一十一萬口牛八萬河西遂平帝初聞胡決水灌顯美謂左右諸將曰昔隗囂灌略陽而光武因其疲弊進兵滅之今胡決水灌顯美其事正相似破胡事今至不久旬日破胡告檄到帝大笑曰吾䇿之於帷幕之内諸將奮撃於萬里之外其相應若合符契前後克獲虜未有如此也三年孫權破劉備於夷陵初帝聞備兵東下與權交戰樹柵連營七百餘里謂羣臣曰備不曉兵豈有七百里營可以拒敵者乎苞原隰險阻而為軍者為敵所擒此兵忌也孫權上事今至矣後十日破備書到明帝初即位黄初七年八月孫權攻江夏郡太守文聘堅守朝議欲發兵救之帝曰權習水戰所以敢下舩陸攻者㡬掩不備也今已與聘相持夫攻守勢倍終不可久也先時遣治書侍御史荀禹慰勞邉方禹到於江夏發所經縣兵及所從歩騎千人乘山舉火權退走之太和二年正月蜀大將諸葛亮攻邉天水南安安定三郡叛應亮是時朝臣未知計所出帝曰亮阻山為固今者自來既合兵書致人之術且亮貪三郡知進而不知退今因此時破亮必也乃部勒兵馬歩騎五萬拒亮遣大將軍曹真都督闗右並進兵右將軍張邰擊亮於街亭大破之亮敗走三郡平五年三月蜀將諸葛亮攻天水詔司馬宣王拒之初亮出議者以為亮軍無輜重糧必不繼不擊自破無為勞兵或欲自芟上邽左右生麥以奪軍食帝皆不從前後遣兵增宣王軍又勑使䕶麥宣王與亮相持頼得此麥以為軍糧青龍元年閏月保塞鮮卑大人歩度根與叛鮮卑大人軻比能私通并州刺史畢軌表輙出軍以外威比能内鎮歩度根帝省表曰歩度根已為比能所誘有自疑心今軌出軍適使二部驚合為一何所威鎮乎促勅軌已出軍者慎勿越塞過句注也比詔書到軌已進軍屯隂舘遣將軍蘇尚董弼追鮮卑比能遣子將千餘騎迎歩度根部落與尚弼相遇戰於樓煩二將没歩度根部落皆叛出塞與比能合冦邉遣驍騎將軍秦朗將中軍討之虜乃走漠北二年四月諸葛亮出斜谷屯渭南司馬宣王率諸軍拒之詔宣王但堅壁拒守以挫其鋒彼進不得志退無與戰久停則糧盡虜略無所獲則必走走而追之以逸待勞全勝之道也景初二年正月帝議遣司馬宣王討公孫淵發卒四萬人議臣皆以為四萬兵多役費難供帝曰四千里征伐雖云用竒亦當任力不可稍計役費遂以四萬人行及宣王至遼東霖雨不得晴故羣臣或以為淵未可卒破宜詔宣王還帝曰司馬懿臨危制變擒淵可計日待也卒皆如所䇿九月蜀隂平太守廖惇反攻守善羗侯巖蕈營雍州刺史郭淮遣廣魏太守王贇南安太守遊奕將兵討惇淮上書贇奕等分兵夾山東西圍落賊衆破在旦夕帝曰兵法惡離促詔淮勅贇奕諸别營非要處者還令據便地詔勅未到奕軍為惇所破贇為流矢所中死晉宣帝初為魏國軍司馬時蜀將關侯圍曹仁於樊于禁等七軍皆没而仁圍甚急是時漢帝都許昌魏武以為近敵欲徙河北帝諫曰于禁等為水所沒非戰守之失於國家大計未有所損而便遷都既示敵以弱又淮沔之人大不安矣孫權劉備外親内疎關侯之得意權所不願也可喻權使令掎其後則樊圍自觧魏武從之權果遣將吕䝉西襲公安拔之關遂為蒙所獲明帝即位以帝為魏驃騎將軍明帝問吳蜀二虜宜討何者為先對曰吳以中國不習水戰故敢散居東關凡攻敵必扼其喉而摏其心夏口東闗敵之心喉若為陸軍以向皖城引權東下為水戰軍向夏口乘其虛而擊之此神兵從天而墮破之必矣天子並然之魏太和四年蜀諸葛亮入攻帝為驃騎大將軍破亮于祁山鹵城時軍師杜襲督軍薛悌皆言明年麥熟亮必來攻隴右無榖宜及冬豫運帝曰亮再出祁山一攻陳倉挫衂而反縱其後出不復攻城當求野戰必在隴東不在西也亮毎以糧少為恨歸必積榖以吾料之非三稔不能動矣又諸葛亮使至帝問曰諸葛公起居何如食可㡬米對曰三四升次問政事曰二十罰已上皆自省覧帝既而告人曰諸葛孔明其能久乎竟如其言正始三年吳將諸葛恪屯皖邉鄙苦之帝為太傅督諸軍南征時帝欲自擊恪議者多以賊據堅城積榖欲引致官兵今懸軍逺攻其救必至進退不易未見其便帝曰賊之所長者水也今攻城以觀其變若用其所長棄城奔走此為廟勝也若敢固守湖水冬淺船不得行勢必棄水相救繇其所短亦吾利也四年帝軍次於舒恪焚燒積聚棄城而遁五年大將軍曹爽伐蜀帝謂夏侯𤣥曰春秋責大德重昔武皇帝再入漢中㡬至大敗君所知也今興平路勢至險蜀已先據若進不獲戰退見徼絶覆軍必矣將何以任其責𤣥懼言於曹爽引軍退費禕進兵據三嶺以截爽爽爭嶮苦戰僅乃得過所發牛馬運轉者死失略盡羗胡怨嘆而闗右悉虛耗矣景初二年遼東太守公孫淵反時帝為太尉都督雍州徵帝詣京師天子曰此不足以勞君事欲必克故以相煩耳君度其作何計對曰棄城預走上計也據遼水以拒大軍次計也坐守襄平此成禽耳天子曰其計將安出對曰惟明者能深度彼已預有所棄此非其所及也今懸軍遠征將謂不能持久必先距遼水而後守此中下計也天子曰徃還㡬何對曰徃百日還百日攻百日以六十日為休息一年足矣文帝魏正始中為散騎常侍大將軍曹爽之伐蜀也以帝為征蜀將軍副夏侯𤣥出駱谷次于興勢蜀將王林夜襲文王營文王堅卧不動林退帝謂𤣥曰費禕以據險拒守進不得戰攻之不可宜亟旋軍以為後圖爽等引旋禕果馳兵趣三嶺爭險乃得過嘉平四年為安東將軍蜀將姜維攻隴右揚聲欲攻狄道以帝行征西將軍次長安雍州刺史陳㤗欲先敵據狄道帝曰姜維攻羗收其盾任聚榖作邸閣訖而復轉行至此正欲了塞外諸羗為後年之資耳若實向狄道安肯宣露令人知今揚聲言出此欲歸也維果燒營而去甘露二年楊州刺史諸葛誕反帝以大將軍討於淮南進軍丘頭吳使文欽唐咨全端等來救誕諸將逆擊不能禦吳將朱異帥輕兵至藜漿異為石苞周泰所擊敗走吳人殺異帝曰異不得至壽春非其罪也而吳人殺之適以謝壽春而堅誕意使其猶望救耳若其不爾彼當突圍決一旦之命或謂大軍不能久省食減口冀有有他變料賊之情不出此三者今當多方以亂之備其越逸此勝計也因命合圍分遣羸疾就榖淮北廪軍士大豆人三升欽聞之果喜帝愈羸形以示之多縱反間揚言吳救方至誕等益寛恣食俄而城中乏糧石苞王基并請攻之帝曰誕之逆謀非一朝一夕也聚糧完守外結吳人自謂足據淮南欽既同惡相濟必不便走今若急攻之恐内損軍力外冦卒至表裏受敵此危道也今三叛相聚於孤城之中天其或者將使同戮吾當以長策縻之但堅守三面若賊陸道而來軍糧必少吾以遊兵輕騎絶其轉輸可不戰而破外賊外賊破欽等必成擒矣後魏道武皇始元年討慕容寶進運中山引騎圍之帝謂諸將曰朕量寶不能出戰必當憑城自守偷延日月急攻則傷士久守則費糧不如先平鄴信都然後還取中山於計為便若移軍逺去寶必散衆求食民間如此則人必離阻攻之易尅諸將稱善宣武時任城王澄為鎮南大將軍伐梁將攻鍾離詔曰鍾離若食盡三月已前固有可尅如至四月淮水泛長舟行無礙宜善量之前事㨗也此實將軍經略勲有常焉如以水盛難圖亦可為萬全之計不宜昧利無成以貽後悔梁冠軍將軍張惠紹遊擊將軍殷暹驍騎將軍趙景悦龍驤將軍張景仁等率衆五千送糧鍾離澄統軍王足劉思祖等邀擊惠紹等大破之獲惠紹殷暹景仁及其屯騎校史文淵等軍主已上二十七人既而遇雨淮水暴長引歸壽春還既狼狽失兵四千餘人頻表解州帝不許有司奏軍還失路奪其開府又降三階後周太祖初為後魏尚書僕射闗西大行臺時魏帝方圖齊神武太祖乃傳檄方鎮謂諸將曰髙歡雖智不足而詐有餘今聲言欲西其意在入雒吾欲令冦雒率馬歩萬餘自涇州東引王羆率甲士一萬先據華州歡若西來王羆足得抗拒如其入雒冦雒即襲汾晉吾便速駕直赴京邑使其進有内顧之憂退有被躡之勢一舉大定此為上策衆咸稱善永熈二年七月太祖率衆發自髙平前軍至於𢎞農而齊神武稍逼京邑魏帝親總六軍屯於河橋令左衛元斌之領軍斛斯椿鎮武牢遣使告太祖太祖謂左右曰髙歡數日行八九百里曉兵者所忌正須乘便擊之而主上以萬乘之重不能渡河决戰方縁津據守且長河萬里扞禦為難若一處得度大事去矣即遣大都督趙貴為别道行臺自蒲坂濟趣并州遣大都督李賢將精兵一千赴雒陽㑹斌之與斛斯椿爭權不協斌之遂棄椿還紹帝云髙歡兵至帝遂從雒陽率輕騎入闗後帝為大將軍大統三年既平𢎞農因館榖五十餘日時戰士不滿萬人聞齊神武將渡乃引軍入闗齊神武遂渡河逼華州刺史王羆嚴守知不可攻乃渉雒軍於許原西太祖據渭南徵諸州兵未至乃召諸將謂之曰髙歡越山渡河逺來至此天亡之時也吾欲擊之何如諸將咸以衆寡不敵請待歡更西以觀其勢太祖曰歡若得至咸陽人情轉騷擾今及其新至便可擊之即造浮橋於渭令軍人齎三日糧輕騎渡渭輜重自渭南夾渭而西冬十月壬辰至沙苑距齊神武軍六十餘里神武聞太祖至引軍來㑹癸巳旦候騎告齊神武軍且至太祖召諸將謀之李弼曰彼衆我寡不可平地置陳此東十里有渭曲可先據以待之遂進軍衆至渭曲背水東西為陣偃戈於葭蘆中聞鼔聲而起申時齊神武至望太祖軍少競馳而進不為行列總萃於左軍兵將交太祖鳴鼔士皆奮起于謹等六軍與之合戰李弼等率鐵騎横擊之截其軍為二遂大破之斬六千餘級臨陳降者二萬餘人齊神武夜遁追至河上復大尅獲唐太宗初為唐國内史總兵十萬徇東都兩月而旋帝籌之曰賊見吾還必相追躡設三伏以待之俄而隋段逹學萬餘人自後而至帝發伏以擊之賊師大敗親自追奔至於城下斬四千餘級又髙祖武德元年十一月降薛仁杲於析墌城虜其衆數萬隴右悉平初帝師次髙墌賊堅不動諸將咸稱戰帝曰我士卒新經挫衂鋭氣猶少賊以勝自驕必輕進好鬬我且堅壁以折之待其氣衰而後奮擊可一戰而破此萬全之計也因令軍中曰敢言戰者斬相持者久之帝曰可戰矣夜遣將軍龎玉擊賊驍將宗羅㬋兩軍酣戰帝以勁兵出賊不意擊大破之乘勝遂逼析墌城竇抗等執馬苦諫曰賊主猶據堅城雖破羅㬋未可即逐請按兵以候其變帝曰筭之久矣今日舅不須言破竹之勢不可失也大軍已敗餘衆何足為虞㓙魁之計盡於此矣遂率軍而進至夜半軍臨賊城守陴者皆亂爭自投而下仁杲窮蹙開門請降頓顙於道左髙祖聞之大悦遣内史舎人崔確齎錦袍馳賚有功者貞觀二年九月己未突厥冦邉朝臣或言宜修古長城發人乘塞者帝曰頡利國中盛夏降霜五日並出三月連明赤氣滿野鬼哭於路而不修德暴虐滋甚此所謂不畏天時也遷徙無嘗六畜多死所謂不愛地利也其俗死則焚之今起墳墓背其父祖之命此所謂不敬鬼神也突利即其兄子不能輯睦屢相懐貳此所謂不和民人也有此四過能不亡乎以朕察之殆將不遠當為公等廓定沙場安用勞民遠修亭障也十五年十一月薛延陁攻李思摩十部帝詔兵部尚書李勣為朔州道行營總管率兵六萬騎千二百屯朔州右衛大將軍李大亮為靈州道行軍總管率兵四萬騎五千屯靈武右屯衛大將軍張士貴率兵一萬七千為慶州道行軍總管出雲中凉州都督李襲譽為凉州道行軍總管以經略之諸將辭行帝誡之曰延陁負其兵力踰漠而南途經數千馬已疲痩夫用兵之道見利速進不利速退其掩思摩不能疾擊既入長城又不能速退吾先勅思摩燒薙秋草彼糧食日盡野無所獲頃者偵人來云其馬畜齧噉林木枝皮略盡卿等掎角思摩不須前戰俟其將退一時奮擊制勝之舉也又遣右屯衛將軍姜行本率左右飛騎及左右衛引强者數千人受李勣節度十二月甲辰李勣擊延陁破之十八年九月髙昌破焉耆而虜其生口七百初王師之滅髙昌也盡以還之焉耆王背德懷二歸誠於咄陸可汗詔安西都䕶郭孝恪伺機便以討之辛卯帝謂侍臣曰孝恪近奏稱率兵三千以八年十一月詣焉耆二十日應至必以二十二日破之朕計其行程使人今日應到言未畢驛騎至云郭孝恪已破焉耆十九年帝征遼次安市城六月丁巳髙麗靺鞨之衆十五萬來援安市城帝謂侍臣曰髙延壽之來也其䇿有三若引兵直前連安市城以為壘據髙山之險食城中之粟兼縱靺鞨冦吾牛馬攻之則不可卒下欲歸則泥潦為滯此其上策若抽城中之人與之宵遁此其中策若不量其能近城列陣將與吾交鋒者此其下策卿曹觀之彼必用下䇿若得縱兵決戰所謂成擒者也賊中有一對盧年老習事謂延壽曰吾聞中國大亂英雄並起秦王聖武所向無敵遂平天下南面為帝北夷請服西戎獻欵今者傾國而至唐兵之壯健者悉來其鋒不可當也今為計者莫若頓兵不戰曠日持久分遣驍雄斷其餽運不過旬日軍糧必盡求戰不得欲歸無路此不戰而取勝也延壽不從引軍直進遣馬候之云去安市城四十里帝以為兵家之勢以逸待勞猶慮其低佪不至詔左衛大將軍阿史那社爾總突厥千騎以誘之誡曰鋒交而佯北其必乘爾而來也髙麗常令靺鞨居前社爾與之纔交而退髙麗相謂曰此易與耳競馳進軍於安市城東南八里依山麓而陳帝召長孫無忌及侍臣將軍等謂曰夷兵既至塵埃亘數十里彼衆我寡卿等所知國家猛將謀臣並從朕在此破賊萬全之策云何無忌奏稱古來帝王亦有以干戈静亂而臨天下者多委將帥身非經略陛下徃時平定海内年踰成童莫不披堅執鋭躬先士伍翦除干紀救蒼生之命鴻名遠震海外咸服今所從行將士多是幕府舊人雖逺渉夷鄉而喜陪神武横戈思敵人百其戰古人云將戰必觀士卒之情臣適行經諸營衛士等聞髙麗已至無不抽刀結斾喜見於色徃平王世充及竇建德等臣皆從征至於竒謀異筭多出睿㫖用陛下妙筭無不就擒偶違成規必致負敗今陛下親臨遼碣擐甲夷鄉滅髙麗之機在此一舉臣等愚短破陣萬全之策不敢克當特乞陛下指縱臣等奉以行事帝笑謂曰卿等既推筭於朕朕當為君料量因與無忌李勣等翼數百騎乘髙以觀之見其山川可以用竒兵處遣使紿延壽曰我以爾强臣簒弑故來問罪即欲交戰非吾本意天子入境芻粟不能於中國轉運破爾數城以取廪食禮苟修則所失必復矣延壽信之竟夕而俟帝夜召文武躬自指麾遣李勣歩騎一萬五千於賊西嶺為陳無忌率將軍牛進逹等精兵一萬一千以為竒兵自山北於狹谷出以衝其後帝自率歩騎四千挾鼔角偃旌幟趣賊營北髙峯之上勑諸將聞鼔角聲而齊進因令所司張受降幕於朝堂之側曰明日午時納降虜於此矣遂率軍而進戊午延壽獨見李勣兵欲與戰帝遥望無忌軍塵起命鼓角並作旌幟齊舉賊衆大懼將分兵承之而其陣已亂時有雷電助我軍威李勣率歩卒一萬擊之延壽衆退長孫無忌縱兵乘其後帝又引軍臨之賊因大潰斬首三萬餘級延壽等率其餘冦依山自保廻望我軍擊其黨類悲號相召其聲甚哀於是詔無忌勣等引兵圍之無忌徹川梁以斷其歸路帝按軍行觀賊營壘謂侍臣曰髙麗傾國而來存亡所繫一麾而敗天祐我也因下馬再拜以謝天己未髙延壽髙惠貞率三萬六千八百人請降帝營於安市城南令李勣攻安市城甚急城中毎見帝旛旗必乘城鼓噪帝怒甚李勣曰請破城之日男子盡坑城内聞之人皆死戰詔令江夏王道宗督兵築土山攻其城東南隅髙麗亦禆城增雉以相抗詔遣衛兵分畨攻之日六七合抱石撞車壞其樓雉城中隨有隳壞即立木柵忽聞城中雞彘驚鳴帝謂李勣曰圍城多日城中煙火日㣲今雞猪甚喧此其饗士也卿宜嚴兵虜今夜當出矣及夜髙麗數百人縋城而下帝聞之從四五騎至城下召兵急擊斬首數十級髙麗奔退後唐莊宗初為晉王公子梁兵侵劉守文於滄州攻甚急幽州劉仁恭遣使乞師使車結轍武皇恨其翻覆不時許之帝白曰此吾復振之道也不得以嫌怨介懷且九分天下朱氏今有六七趙魏中山在他廡下賊所憚者仁恭與我合勢興復本朝是以逞其兵威將令弭服絶彼結託使我勢孤然後顯行逼奪賊之成敗我之興衰繫此一舉不可失也武皇乃徵兵於燕攻取潞州及軍之起也居浹旬杳無音驛物議憂之帝謂賔友曰我聞朱氏猜嫌丁㑹久矣斯人嘗不自安如援兵未至必來歸我既而丁㑹果以城降天祐十三年唐哀帝天祐元年後是朱梁建國改號開平其莊宗只稱天祐與梁將劉鄩戰於洹水數日兵不交寂若無聲王遣邏騎覘之無斥候者摩壘而觀之則營中有班馬之聲而無煙火之狀望其壘烏止於上又有旗幟循堞徃來覘者還以事聞帝曰我聞劉鄩一歩百變營外不見賊軍必以詭計悞我命覘者入其城中乃以芻為人縳旗上以驢負之循堞而行故旗幟嬰城不息問城中羸老者曰軍去已二日矣覘者還以聞帝曰劉鄩使兵短於決戰愛乘人不備謂我大軍一盡於此料晉陽城内全無備兵必欲出竒絶我根本虛營設詐懼有追兵計彼行程纔及山下既而有人自賊中來言劉鄩兵趣黄澤矣帝遽發竒軍追之十五年大舉赴汴州帝問戰備周德威曰賊軍倍道而來未成營壘我今營寨已備固守有餘既深入賊疆須決萬全之策機須懸料未可輕行此去汴州不越信宿賊之父母妻子盡在其間人之嘗情孰不以家國為念以我深入之人不以方略制之恐難嘗勝王宜以親軍歩卒警其衆按軍以殿臣以其軍擾之使彼不得下營晡晚之後進退無據樵㸑不給人心恐懾因以乘之彼不戰而自潰破賊之道也帝曰河上終日排布恨不見賊今見不殺知復何待德威之言一何怯也顧李存審曰勅輜重先發予為爾殿後殺之帝御新軍驟出德威命其子曰吾未知其死所矣及軍出未成列梁軍已結陣而來横亘數十里亦以陣抗之帝與李存審總河東天雄之衆居其中德威以幽薊之師當其西鎮定之師當其東梁將賀環王彦章中軍兩軍旗鼔相當短兵接戰帝御銀鎗軍突入賊中斬擊十餘里賀環王彦章單騎走濮陽時我軍輜重在陣西與梁騎相雜衆見朱旗驚走德威軍自相蹈藉不能制止故德威一軍敗績陂中有土山迤邐相屬梁餘衆數萬登山帝帥中軍追至山下梁軍戒嚴不動旗幟甚盛帝呼諸軍曰今日之戰得山者勝賊已據山乘髙四望平野觀之罔測衆人乍見皆有懼心吾與爾等各馳一騎以奪之帝率騎先登銀鎗歩卒繼進策馬大呼一時登山賊紛紜而下帝御衆登山賊在土山西結陣數里時已日暮或曰諸軍未齊不如還營詰朝可戰閻寶進曰深入賊廷逢其大敵期於進鋭以決雄雌况賊帥奔亡衆心方恐據山而猶委棄結陣更復何為今登髙擊下勢如破竹芟除殘孽正在今日銀鎗大將軍建及披甲横槊而進曰賊軍大將先已奔亡王之騎軍一無所損賊衆晡晚大半思歸擊此疲敗之軍易如拉朽王且登山縱觀責臣以破賊之效於是李嗣昭領騎軍自山之北略賊陣王建及呼士衆曰今日所失輜重並在山下况彼思歸則一取若拾遺與公等奮矟一呼自然披靡建及大呼入賊陣諸軍繼之賊衆大敗時元城令吳瓊貴卿令胡装各部役徒萬人於山下曵柴揚塵鼔譟助其勢賊不之測自相騰籍棄甲山積俘斬萬計賊衆殆盡漢髙祖以天福十二年四月漢髙祖於晉少帝開運四年二月即位却稱天福十二年收復承天軍軍太原東鄙土門路所衝也是歳二月帝率兵將下井陘以晉太后過常山議還乃留歩卒一千戍之備其不虞時以虜還守者怠為虜所偵濳來攻我我衆驚潰虜乃焚其井邑一日之中狼煙百餘舉帝曰必虜之將退張虛勢也乃遣親將葉仁魯領歩騎三千趣之㑹虜黨發撅掠取不意軍至為我所敗斬級獲馬各千餘而還一路遂平安周世宗顯德五年南伐攻楚州率戰士持火炬以爇其城樓克之帝計其敗卒必將南遁因親領衛士及驍騎數百於南城逐之又殺數千人楚州遂平册府元龜巻一百二十五
