body:
  text: 册府元龜巻二百五十二宋王欽若等撰列國君部復邦訓練禦備交質行罰復邦古之諸侯選賢立嫡樹之成法所以寅奉宗廟長守富貴者也乃有立嗣靡淑怠棄先業流離奔走不保其社稷者矣復有貽謀弗臧延及後嗣艱難勤苦克復其疆土者焉昔周室之興也列爵分土及其衰也以衆暴寡攻戰守禦日不暇給民棄不保時而有之至於因人以興或大其祚修徳以復或啟其宗或覇主以大義固存或國人以衆心見納繇是再奉齋酎以見宗祏不失舊物而處於民上傳曰或多難以固其國非徳義孰能之哉魯隱公五年春晉曲沃莊伯以鄭人邢人伐翼王使尹氏武氏助之翼侯奔隨曲沃晉别封文侯弟成師之邑莊伯成師之子翼晉舊都尹氏武氏周大夫也晉侯君翼故謂之翼侯六年翼九宗五正頃父之子嘉父逆晉侯于隨五正五官之長九宗一姓為九族頃父之子嘉父晉大夫納諸鄂晉人謂之鄂侯鄂侯晉别邑不得復入翼故别居鄂十一年七月公㑹齊侯鄭伯伐許壬午入許許公奔衛鄭伯使許大夫百里奉許叔以居許東偏許叔許莊公之弟桓公十六年許叔入于許桓公三年芮伯萬之母芮姜惡芮伯之多寵人也故逐之出居于魏四年秋秦師侵芮敗焉冬王師秦師圍魏執芮伯以歸芮伯出居魏芮更立君秦為芮所敗故以芮伯歸將欲納之十年秋秦人納芮伯萬于芮十一年夏鄭荘公卒初祭封人仲足有寵於莊公莊公使為卿為公取鄧曼生昭公故祭仲立之曼鄧姓昭公名忽宋雍氏女於鄭莊公曰雍姞生厲公雍氏姞姓宋大夫也雍氏宗有寵於宋莊公故誘祭仲而執之曰不立突將死突厲公名亦執厲公求賂焉祭仲與宋人盟以厲公歸而立之九月丁亥昭公奔衛己亥厲公立十五年春祭仲專鄭伯患之使其壻雍糾殺之雍姬知之遂告祭仲祭仲殺雍糾厲公出奔蔡六月乙亥昭公入九月鄭伯突因櫟人殺檀伯而遂居櫟櫟鄭别都也䄠伯鄭守櫟大夫十七年鄭高渠彌殺昭公而立公子亹十八年齊人殺子亹祭仲逆鄭子于陳而立之昭公弟子儀也莊公十四年春厲公自櫟侵鄭及大陵獲𫝊瑕𫝊瑕曰茍舎我吾請納君與之盟而赦之六月甲子瑕殺鄭子及其二子而納厲公十六年十一月衛侯朔出奔齊惠公名朔初衛宣公烝於夷姜生急子屬諸右公子爲之娶於齊而美宣公取之生壽及朔屬諸左公子宣姜與公子朔構急子宣姜宣公所娶伋子妻公使諸齊使盗待諸莘將殺之壽子載其旌以先盗殺之急子至又殺之二公子皆怨惠公左公子洩右公子職立公子黔牟惠公奔齊莊公五年公㑹齊人宋人陳人蔡人伐衛納惠公六年夏六月衛侯入于衛放黔牟殺左右公子僖公十五年九月晉惠公與秦穆公戰于韓原秦獲晉侯以歸晉大夫反首㧞舍反首髪亂垂下也㧞草舎止壊形毁服秦伯使辭焉曰二三子何其戚也寡人之從君而西也亦晉之妖夣是踐豈敢以至狐突不寐而與神言故曰妖夣申生與突言帝許罸有罪今將晉君而西以厭息此語踐厭也晉大夫三拜稽首曰君履后土而戴皇天皇天后土實聞君之言穆姬聞晉侯至以太子罃𢎞與女簡璧登臺而履薪焉瑩康公名𢎞其母弟也簡璧罃𢎞姊妹古之宫閉者皆居之臺以抗絶之穆姬惠公之妹欲自罪故登臺而薦之以薪左右上下者皆履柴乃得通使以免服衰絰逆且告免衰絰遭喪之服令行人服此服迎秦伯且告将以恥辱自殺曰上天降災使我兩君匪以玉帛相見而以興戎若晉君朝以入則婢子夕以死夕以入則朝以死唯君裁之乃舎諸靈臺在京兆鄠縣周之故臺亦所以抗絶令不得通外内大夫請以入公曰獲晉侯以厚歸也既而喪歸焉用之若將晉侯入則夫人或自殺大夫其何有焉何有猶何得且晉人蹙憂以重我謂反首㧞舎天地以要我不圖晉憂重其怒也我食吾言背天地也食消也重怒難任背天不祥必歸晉君任當也公子縶曰不如殺之無聚慝焉公子縶晉大夫恐夷吾歸復相聚為惡子桑曰歸之而質其太子必得大成晉未可滅而殺其君祗以成惡祗適也且史佚有言無始禍史佚周武王時太史尹佚無怙亂恃人亂為己利無重怒重怒難任陵人不祥乃許晉平晉侯使郤乞告瑕吕飴甥且召之郤乞晉大夫也瑕吕飴甥即吕甥也蓋姓瑕吕名飴甥字子金晉侯聞秦將許之平故告吕甥召使迎已子金教之言曰朝國人而以君命賞恐國人不從故先賞之於朝且告之曰孤雖歸辱社稷矣其卜貳圉也貳代也圉惠公太子懷公名衆皆哭哀國君不還晉於是乎作爰田分公田之稅應入公者爰之於所賞之衆吕甥曰君亡之不恤而羣臣是憂惠之至也將若君何衆曰何為而可對曰征繕以輔孺子征賦也繕治也孺子太子圉諸侯聞之䘮君有君羣臣輯睦甲兵益多好我者勸惡我者懼庶有益乎衆説晉隂飴甥㑹秦伯盟于王城隂飴甥即吕甥也食采於隂故曰隂飴甥王城秦地馮翊臨晉陽縣東有王城今名武鄉秦伯曰晉國和乎對曰不和小人恥失其君而悼䘮其親痛其親爲秦所殺不憚征繕以立圉也曰必報讐寧事戎狄君子愛其君而知其罪不憚征繕以待秦命曰必報德有死無二是以不和秦伯曰國謂君何對曰小人慼謂之不免君子恕以爲必歸小人曰我毒秦秦豈歸君毒謂三施不報君子曰我知罪矣秦必歸君貳而執之服而舎之德莫厚焉刑莫威焉服者懷德貳者畏刑此一役也言還惠公使諸侯威服復可當一事之功秦可以覇納而不定廢而不立以德爲怨秦不其然秦伯曰是吾心也改館晉侯饋七牢焉十一月晉侯歸二十一年邾人滅須句須句子來奔因成風也須句成風家成風爲之言於公曰崇明祀保小寡周禮也明祀太皥有濟之祀保安也變夷猾夏周禍也此邾滅須句而曰蠻夷昭二十三年叔孫豹曰邾又夷也然則邾雖曹姓之國廹近諸戎雜用夷禮故極言之猾夏亂諸夏若封須句是崇皥濟而脩祀紓禍也二十二年春伐邾取須句反其君焉禮也得恤寡小之禮二十八年夏晉侯及楚戰于城濮衛侯鄭出奔楚初文公將伐曹假道于衛衛人弗許還自南河濟侵曹伐衛取五鹿五鹿衛地城濮之戰楚師敗衛成公聞之懼出奔楚遂適陳使元咺奉叔武以受盟或訴元咺於衛侯曰立叔武矣其子角從公公殺之咺不廢命奉夷叔以入守夷叔武謚六月晉人復衛侯寗武子與衛人盟于宛濮衛侯先期入叔武將沭聞君至喜捉髪走出前驅射而殺之元咺出奔晉元咺以衛侯驅入殺叔武故至晉愬之衛侯與元咺訟不勝執衛侯歸之於京師三十年魯公爲請納玉於王與晉侯皆十瑴王許之乃釋衛侯歸于衛衛侯使賂周歂冶廑曰茍能納我吾使爾爲卿二子衛大夫周冶殺元咺及子適子儀子儀瑖母弟不書殺賊也公入祀先君周冶既服將命服卿服將入廟受命周歂先入及門遇疾而死冶厪辭卿見周歂死而懼是年晉文公執曹伯晉侯有疾曹伯之豎侯獳貨筮史竪掌通内外者史晉大夫使曰以曹爲解以滅曹爲解故齊桓爲㑹而封異姓封邢衛今君爲㑹而滅同姓曹叔振鐸文之昭也叔振鐸曹始封君文王之子先君唐叔武之穆也且合諸侯而滅兄弟非禮也與衛偕命私許復曹衛而不與偕復非信也同罪異罰非刑也衛已復曹未復禮以行義信以守禮刑以正邪舎此三者君將若之何公復曹伯成公九年秋鄭伯如晉晉人討其貳於楚也執諸銅鞮公孫申謀之曰我出師以圍許示不畏晉爲將改立君者而紓晉使紓緩也勿亟遣使詣晉示欲更立君晉必歸君十年四月欒武子曰鄭人立君我執一人焉何益不如伐鄭而歸其君以求成晉侯有疾五月晉立太子州蒲以爲君而㑹諸侯伐鄭鄭子罕賂以襄鐘子罕穆公子襄鐘鄭襄公之廟鐘子然盟于脩澤子駟爲質子然子駟皆穆公子滎陽卷縣東有修武亭辛巳鄭伯歸十三年五月公㑹諸侯伐秦曹伯廬卒于師廬曹宣公也曹人使公子負芻守使公子欣時逆曹伯之䘮負芻曹成公也秋負芻殺其太子而自立也諸侯乃請討之晉人以共役之勞請俟他年十五年三月公㑹諸侯盟于戚晉人執曹伯歸于京師十六年六月曹伯歸自京師爲晉侯所赦故書歸襄公十四年二月衛侯衛獻公也名衎出奔齊初獻公戒孫文子寗惠子食皆服而朝朝服待命而朝日旰不君射鴻於囿二子從之不釋皮冠而與之言二子怒孫文子如戚孫蒯入使蒯文子之子公飲之酒使大師歌巧言之卒章其詩云彼何人斯居何之麋無拳無勇職爲亂階喻文子居河上而欲爲亂太師掌樂大夫蒯懼告文子文子曰君忌我矣弗先必死欲先公作亂公使子蟜子伯子皮與孫子盟于丘宮丘宮近戚之地孫子皆殺之四月己未公如鄄使子行於孫子孫子又殺之公出奔孫氏追之敗公徒于阿澤衛人立公孫剽剽穆公孫殤公二十年衛寗惠子疾召悼子悼子寗喜曰吾得罪於衞君悔而無及也名藏在諸侯之策曰孫林父甯殖出其君君入則掩之若能掩之則吾子也若不能猶有鬼神吾有餒而已不來食矣悼子許諾惠子遂卒二十五年八月獻公入于夷儀使與寗喜言求復國也寗喜許之右宰糓曰不可獲罪於兩君前出獻公今式剽天下誰畜之悼子曰吾受命於先人不可以貳二十六年二月庚寅寗喜右宰糓伐孫氏不克寗子出舎於郊欲奔國人召寗子復攻孫氏克之孫林父以戚如晉以邑屬晉甲午衛侯入又云衛獻公奔齊殤公立封公孫林父於宿十二年寗喜與孫林父爭寵相惡殤公使寗喜攻孫林父林父奔晉復求入故衛獻公獻公在齊景公聞之與獻公如晉求入晉為伐衛誘與盟衛殤公㑹晉平公平公執殤公與寗喜而復入衛獻公獻公亡在外十三年而後入昭公三年北燕伯款出奔齊簡公也公多嬖寵欲去諸大夫而立其寵人燕大夫比以殺公之外嬖比相親也公懼奔齊十二年髙偃帥師納北燕伯于唐因其衆也言因唐衆欲納之故得先入唐唐燕別邑也不言於燕未得國二十年六月衛公孟縶狎齊豹公孟靈公兄也狎輕也奪之司㓂與鄄鄄豹邑也有役則反之無則取之縶足不良故有役則以官邑還豹使行公孟惡北宮喜禇師圃欲去之喜貞子也丙辰衛侯在平壽衛侯衞靈公元也公孟有事於蓋獲之門外齊子氏帷於門外而伏甲焉用戈擊公孟殺之公聞亂乘驅自閲門入公載寳以出如死鳥死鳥衛地也齊氏之宰渠子召北宫子北宮喜也北宮氏之宰不與聞謀殺渠子遂伐齊氏滅之丁巳晦公入與北宮喜盟于彭水之上七月戊午朔盟國人定公四年冬蔡侯吳子唐侯伐楚十一月庚午二師陳于柏舉楚師亂吳師大敗之五戰及郢己卯楚子楚昭王名王居取其妹季芈畀我以出渉雎庚寅吳入郢楚子奔鄖鄖公之弟懐曰平王殺吾父父曼成然今我殺其子不亦可乎鄖公止之然恐其殺昭王乃與王出奔隨昭王之出郢也使申包胥楚大夫王孫包胥請救于秦秦以車五百乘救楚楚亦収餘散兵與秦擊吳五年六月敗吴於沂楚地㑹吳王弟夫槩見吳王兵傷敗乃亡歸自立為王闔閭聞之引兵出楚歸擊夫槩夫槩敗奔楚楚封之堂谿號為堂谿氏九月昭王歸入郢哀公二年衛侯元卒乃立輙輙元之孫蒯聵之子六月晉趙鞅納衛太子于戚衛太子蒯聵也是為莊公十五年冬孔文子之竪渾良夫與太子入欒寧奉衛侯輙來奔十七年三月晉趙鞅使告于衛曰君之在晉也志父為主請君若太子來以免志父不然寡君其曰志父之為也恐晉君謂志父教使不來衛侯辭以難太子又使㭬之㭬訴父故速得其處六月趙鞅圍衛十月復伐衛入其郛將入城衛人出莊公而與晉平晉立襄公之孫般師而還十一月衛侯自鄄入莊公也般師出辛巳石圃作難公入于戎州巳氏巳氏戎人姓遂殺之衛人復般師而立之十二月齊人伐衛立公子起起靈公子執般師以歸舍諸潞十八年衛石圃逐其君起起奔齊衛侯輒自齊復歸七年魯人伐邾遂入邾以邾子益來益邾隱公也獻于毫社以其亡國與殷同囚諸負瑕負瑕故有繹負瑕魯邑髙平南平陽西北有瑕丘城前者魯得邾之繹民使在負瑕故使相就以辱之邾茅夷鴻以束帛乗韋自請救于吴無君命故言自八年吳伐我為邾故伐魯吳人行成求與魯成齊侯使如吳請師將以伐魯乃歸邾子邾子又無道吳子使太宰子餘討之囚諸樓臺栫之以棘栫擁也使諸大夫奉太子革以為政十年邾隱公來奔遂奔齊二十二年自齊奔越曰吳為無道執父立子越人歸之太子革奔齊訓練昔祿去周室王道寝衰故禮樂征伐自諸侯出衆者得以暴寡彊者得以凌弱其國大者或僣作五軍其土狹者或竊置三卿其有以大閱於秋治兵於廟定覇爭雄更勝迭負蓋有黷武佳兵之志無弔民問罪之舉徒使蟣虱生於甲胄肝腦横於原野覽之信史良有悲夫魯桓公六年秋大閱齊爲大國以戎事徴諸侯之戌魯人懼之故以非時簡車馬莊公八年正月甲午治兵治兵於廟習號令將以圍郕傳治兵於廟禮也僖公二十七年秋楚子將圍宋使子文治兵於暌子文時不爲令尹故云使治兵習號令也暌楚之邑終朝而畢不戮一人終朝自旦及食時也子文欲委重於子玉故其事略子玉復治兵於蒍子玉爲令尹故蔿楚邑終日而畢鞭七人貫三人耳冬楚子及諸侯圍宋宋公孫固如晉告急於是乎蒐于被廬晉侯以春蒐禮改政令敬其始也被廬晉地作三軍閔元年晉獻公作三軍今復大國之禮二十八年冬晉侯作三行以禦狄荀林父將中行屠擊將右行先蔑將左行晉置上中下三軍命復置三行以辟天子六軍之名三行無佐疑大夫將三十一年秋晉蒐于清原作五軍以禦狄前作三行今罷之更爲上下新軍河東聞喜縣有清原文公六年春晉蒐于夷舍二軍前作五軍今舎二軍復三軍之制夷晉地宣公十四年夏晉侯伐鄭告於諸侯蒐焉而還蒐簡閱車馬昭公八年秋大蒐于紅自根牟至於商衛革車千乘大蒐數軍實簡車馬也根牟魯東界瑯琊陽都縣有牟郷啇宋地魯西境接宋衞也言千乘明大蒐且見魯衆之大數也十年秋七月伐莒取郠郠莒邑名也十一年五月大蒐于比蒲十三年夏晉將以諸侯来討叔向曰諸侯不可以不示威知晉徳薄欲以威服之乃並徴㑹㑹于良七月治兵于邾南甲車四千乘三十萬人叔向曰諸侯有間矣不可以不示衆八月辛未治兵習戰建而不斾建立旌旗不曳其斾斾斿也壬申復斾之諸侯畏之軍將戰則曳斾以恐之二十二年大蒐于昌間定公十三年夏大蒐于比蒲夏蒐非時禦僃春秋左氏傳曰預僃不虞古之善政又曰無僃雖衆不可恃也是知禦僃之略有國者之所急也矧周室既衰諸侯立政彊凌弱衆暴寡交相侵伐無歲不有申嚴警僃惟敵是禦於是乎興版築之役以峻其城壘行蒐田之令以簡其軍實斯所以謹其武守固其邦國者焉魯隱公七年夏城中丘中丘在琅邪臨沂縣東北九年夏城郎桓公五年城祝丘齊鄭將襲紀紀人懼而來告故城祝丘十六年冬城向書時也莊公二十八年冬築郿郿魯下邑非都也凡邑有宗廟先君之主曰都無曰邑邑曰築都曰城二十九年十二月城諸及防諸防皆魯地僖公二年春王正月城楚丘楚丘衛邑不言城衛衛未遷十有四年春諸侯城緣陵緣陵杞邑辟淮夷遷都於緣陵三十一年秋晉蒐于清原作五軍以禦狄二十八年晉作三行今罷之更爲上下新軍河東聞喜縣北清原文公七年三月城郚因伐邾師以城郚郚魯邑卞縣南有郚城僃邾難十二年冬季孫行父帥師城諸及鄆鄆莒魯所爭者城陽姑幕縣南有員亭即鄆也以其逺偪外國故帥師城之十三年春晉侯使詹嘉處瑕以守桃林之塞襄公十三年冬城防書事時也土功雖有嘗節通以事間爲時於是將早城臧武仲請俟畢農事禮也十五年夏齊侯圍成貳於晉故也不畏覇主故敢伐魯於是乎城成郛郛郭也十九年冬十一月城西郛懼齊也前年與晉伐齊又鑄其噐爲鐘故齊及晉平盟于大隧大隧地名故穆叔㑹范宣子于柯穆叔歸曰齊猶未也不可以不懼乃城武城昭公元年六月楚公子圍使公子黒肱伯州犂城犫櫟郟黑肱王子圍之弟晳也犫縣屬南陽郟縣屬襄城櫟今河南陽翟縣三邑本鄭地四年冬吳伐楚入棘櫟麻棘櫟麻皆楚東鄙邑譙國鄼縣東北有棘亭汝隂新蔡縣東北有櫟亭以報朱方之役朱方役在此年秋楚沈尹射奔命於夏汭夏汭漢水曲入江今夏口也吳兵在東北楚盛兵在東南以絶其後箴尹宜咎城鍾離宜咎本陳大夫襄二十四年奔楚薳啟疆城巢然丹城州來然丹鄭穆公孫襄十九年奔楚東國水不可以城彭生罷頼之師彭生楚大夫罷鬭韋龜城頼之師十九年楚工尹赤遷隂於下隂陰縣今屬南鄉郡令尹子瑕城郟叔孫昭子曰楚不在諸侯矣其僅自完也以持其世而已遷隂城郟皆欲以自完守二十三年冬楚囊瓦爲令尹囊瓦子囊之孫子常也代陽匄城郢楚用子囊遺言已築城矣今畏吳復增脩以自固二十九年冬晉趙鞅荀寅帥師城汝濵趙鞅趙武孫也荀寅中行荀吳之子汝濵晉所取陸渾也定公六年冬城中城公爲晉侵鄭故懼而城之十四年秋城莒父及霄公叛晉助范氏故懼而城三邑也哀公三年五月季孫斯叔孫州仇帥師城啟陽魯黨范氏故懼晉城啓陽今琅琊開陽縣四年城西郛魯西郭僃晉也五年春城毗僃晉也六年春城邾瑕僃晉也任城亢父縣北有邾婁城十一年夏公㑹吳子伐齊大敗齊師秋季孫命修守僃曰小勝大禍也齊至無日矣善有僃鄭繻公十五年韓景侯伐鄭取雍丘鄭城京趙獻侯十三年城平邑肅侯十七年築長城武靈王二年城鄗惠文王八年城南行唐在常山孝成王十一年城元氏常山有元氏縣幽繆王遷元年城柏人悼襄王元年大僃一作脩魏欲通平邑中牟之道不成二年城韓臯魏文侯六年城少梁武侯二年城安邑王垣垣縣有王屋山也八年復城少梁十六年伐秦築臨晉元里十七年擊宋中山伐秦至鄭還築雒陽一云擊中山置合陽又世家云攻秦至鄭而還築合陽雒陽三十二年伐鄭城酸棗惠王五年城武都十九年諸侯圍我襄陵築長城塞固陽秦厲公十六年塹阿旁補龎戲城紀作河旁二十六年城南鄭靈公元年城塹河瀬十年補龎城籍姑簡公七年塹雒城重泉獻公二年城櫟陽孝公十九年城武城惠王五年城武都十九年築長城塞固陽武王四年㧞韓宜陽渉河城武遂楚懷王十年城廣陵交質戰國之時諸侯竝爭干戈日尋變詐鋒起既失盟誓之信乃有交質之約或因危以結好或匿詐以圖和締結未己禍敗隨焉雖其至親無所顧惜禮所謂大信不約傳有云信不繇中茍非其時何救於患鄭武公莊公爲平王卿士王貳于虢鄭伯怨王王曰無之故周鄭交質王子狐爲質於鄭鄭公子忽為質於周王子狐平王子魯文公十七年晉鞏朔行成於鄭趙穿公壻池爲質焉十月鄭太子夷石楚爲質於晉宣公十二年楚子圍鄭三月克之許之平潘尫入盟子良出質潘尫楚大夫子良鄭伯弟成公二年九月楚侵魯及陽橋陽橋魯地孟孫請往賂之公衡爲質公衡成公子十七年夏五月鄭太子髠頑侯獳爲質於楚侯獳鄭大夫襄公元年正月諸侯之師圍宋彭城齊人不㑹彭城晉人以爲討二月齊太子光爲質於晉光齊靈公太子定公三年蔡侯如晉以其子元與其大夫之子爲質焉而請伐楚初蔡昭侯爲兩佩與兩裘佩佩玉也以如楚獻一佩一裘於昭王昭王服之以享蔡侯蔡侯亦服其一子常欲之弗與三年止之蔡人固請獻佩于子常蔡侯歸及漢執玉而沈曰余所有濟漢而南者有若大川四年晉人使蔡滅沈楚爲沈故圍蔡蔡昭侯以其子乾與其大夫之子爲質於吳與吳子伐楚越王勾踐自㑹稽反國使范蠡爲大夫諸稽行成爲質於吳二歲而吳歸蠡韓宣惠王十九年秦伐韓韓太子倉質於秦以和楚懷王二十六年齊韓魏三國兵伐楚楚使太子入質於秦而請救秦遣兵救楚三國引兵去二十七年秦大夫有私與楚太子鬭楚太子殺之而亡歸二十九年秦復攻楚大破楚軍死者二萬殺將軍景缺懷王恐乃使太子爲質於齊以求平楚頃襄王二十七年復與秦平而入太子爲質於秦楚使左徒侍太子於秦三十六年頃襄王病太子亡歸齊湣王二十四年秦使涇陽君質於齊二十五年歸涇陽君于燕陳翠合齊将令燕王之弟爲質於齊燕王許諾太后聞之大怒曰陳公不能爲人之國則亦已矣焉有離人子母者老婦欲得志焉陳翠欲見太后王曰太后方怒子子其待之陳翠曰無害也遂入見太后曰何臞也太后曰頼得先王鴈鶩之餘食不宜臞者憂公子之且爲質於齊也陳翠曰人主之愛子也不如布衣之甚也非徒不愛子也又不愛丈夫子獨甚太后曰何也對曰太后嫁女諸侯奉以千金齎璽百里以爲人之終今王願封公子百官持職群臣效忠曰公子無功不當封今王之以公子爲質也且以爲公子功而封之也而太后弗聽臣是以知人主之不愛丈夫子獨甚也且太后與王幸而在故公子貴大后千秋之後王棄國家而太子即位公子賤於布衣故非及太后與王封公子則公子終身不封矣太后曰老婦不知長者之計乃命公子束車制衣爲行具晉惠公八年使太子圉質秦秦歸河東而妻之趙孝成王元年秦伐趙㧞三城趙王新立太后用事秦急攻之趙求救於齊齊曰必以長安君爲質兵乃出太后不肯大臣彊諫太后謂左右曰復言長安君爲質者老婦必唾其靣左師觸龍言願見太后太后甚氣而胥之入胥猶須也糓梁傳曰胥其出也徐趨而坐自謝曰老臣病足曾不能疾走不得見乆矣竊自恕而恐太后體之有所苦也故願望見太后太后曰老婦恃輦而行曰食得毋衰乎曰恃鬻耳曰老臣間者殊不欲食乃彊步日三四里少益嗜食和於身也太后曰老婦不能太后不和之色少觧左師公曰老臣賤息舒祺最少不肖而臣衰竊憐愛之願得補黒衣之缺以衛王宮昧死以聞太后曰敬諾年幾何矣對曰十五歲矣雖少願及未塡溝壑而託之太后曰丈夫亦愛憐少子乎對曰甚於婦人太后笑曰婦人異甚對曰老臣竊以爲媪之愛燕后賢於長安君太后曰君過矣不若長安君之甚左師公曰父母愛子則爲之計深逺媪之送燕后也持其踵爲之泣念其逺也亦哀之矣已行非不思也祭祀則祝之曰必無使反豈非計長乆爲子孫相繼爲王也哉太后曰然左師公曰念三世以前至於趙王之子孫爲侯者其繼有在者乎曰無有曰㣲獨趙諸侯有在者乎曰老婦不聞也曰此其近者禍及其身逺者及其子孫豈人主之子孫則不善哉位尊而無功奉厚而無勞而挾重噐多也今媪尊長安君之位而封之以膏腴之地多與之重噐而不及今令有功於國一旦山陵摧長安君何以自託於趙老臣以媪爲長安君之計短也故以爲愛之不若燕后太后曰諾恣君之所使之於是爲長安君約車百乗質於齊齊兵乃出魏安釐王三十年信陵君無忌率五國兵敗秦軍河外時魏太子增質於秦秦怒欲囚魏太子增或爲增謂秦王曰公孫喜固謂魏相曰請以魏疾擊秦秦王怒必囚増魏王又怒擊秦秦必傷今王囚増是喜之計中也故不若貴増而合魏以疑之於齊韓秦乃止秦昭襄王爲質於燕武王死燕人送歸得立四十年秦悼太子死于魏歸葬芷陽四十二年立次子安國君爲太子太子有子二十餘人中男子楚爲質於趙昭王五十年使王齮圍邯鄲急趙欲殺子楚子楚與呂不韋謀行金六百斤予守者吏得脱亡赴秦軍遂以得歸一云秦質子異人質於趙處於聊城始皇四年秦質子歸自趙趙太子出歸國趙世家云秦召春平君因而留之泄鈞爲之請文信侯曰春平君者趙王甚愛之而郎中妬之故相與謀曰春平入秦秦必畱之故相與謀而内之秦也今君留之是絶趙而郎中之計中也君不如遣春平君而畱平都春平君者言行信於王王必厚割趙贖平都文信侯曰善因遣之十五年燕太子丹入質於秦丹亡歸行罰夫作刑之意法天之震曜明罰之義本易之噬嗑蓋所以齊衆而禁暴輔世而助治者焉春秋列國力政專命至於結姦討貳閑邪懲敗亦必昭其罪戾寘于典刑繇是定覇之舉衆心以服干紀之戮一成不變斯所以臨長臣庶申明憲度寧四封之守宰糾諸司之邪慝至於保世以滋大靖國而永命者曷甞不繇是哉魯莊公六年夏衛侯入臣欽若等曰衛惠公即位四年左公子洩右公子職立公子黔牟惠公奔齊八年而後複入放公子黔牟於周放寗跪于秦殺左公子洩右公子職寗跪衛大夫宥之以逺曰放乃即位十六年夏鄭伯治與于雍糾之亂者臣欽若等曰鄭厲公即位四年祭仲專政公令雍糾殺之雍姫祭仲之女告其父遂殺雍糾公出居櫟七歳復入九月殺公子閼刖彊鉏二子祭仲黨刑足曰刖公父定叔出奔衛共叔叚之孫定謚也三年而復之曰不可使共叔無後於鄭使以十月入曰良月也就盈數焉數滿於十君子謂彊鉏不能衛其足言其不能早避害十八年夏楚子殺其大夫閻敖初楚武王遷權于那處使閻敖尹之權國名南郡當陽縣東南有權城那處楚地南郡編縣東南有那口城及文王即位巴人伐申而驚其師驚巴師巴人叛楚而伐那處取之遂門于楚攻楚城門閻敖游涌而逸涌水在南郡華容縣閻敖既不能守城又游涌水而走楚子殺之僖公四年夏齊人執陳轅濤塗初齊侯以諸侯之師伐楚楚屈完及諸侯盟陳轅濤塗謂鄭申侯曰師出於陳鄭之間國必甚病申侯鄭大夫當有共給之費故若出於東方觀兵於東夷循海而歸其可也東夷郯莒徐夷也觀兵示威申侯曰善濤塗以告齊侯許之許出東方申侯見曰師老矣若出於東方而遇敵懼不可用也若出於陳鄭之間共其資糧屝履其可也扉草也齊侯說與之虎牢還以鄭邑賜之執轅濤塗秋伐陳討不忠也以濤塗爲誤軍道十五年夏秦伯伐晉晉侯三敗慶鄭諫弗聽及戰于韓原公號慶鄭慶鄭曰愎諫違卜固敗是求又何逃焉遂去之秦獲晉侯以歸及晉侯歸臣欽若等曰晉忠公即位六年爲秦所虜復之殺慶鄭而後入二十八年春晉侯伐曹令無入僖負覊之宮而免其族報施也報飱璧之施臣欽若等曰晉文公亡過曹僖負覊餽飱寘璧焉魏犫顚頡怒曰勞之不圗報於何有二子各有從亡之勞爇僖負覊氏爇燒也魏犫傷於胷公欲殺之而愛其材材力使問且視之病將殺之魏犫束胷見使者曰以君之靈不有寜也言不以病故自安寜距躍三百曲踊三百距躍超越也曲踊跳踊也百猶勵也乃舍之殺顚頡以狥于師夏與楚戰于城濮晉中軍風于澤牛馬因風而走皆失之亡大斾之左旃大斾旗名繫旐曰斾通帛曰旃祁瞞奸命掌軍旅事而不修爲奸軍令司馬殺之以徇于諸侯使茅茷代之師還濟河舟之僑先歸士㑹攝右櫂代舟之僑也士㑹隋武子士蔿之孫秋七月振旅愷以入于晉殺舟之僑以狥乎國民於是大服君子謂文公其能刑矣三罪而民服三罪顛頡祁瞞之僑詩云惠此中國以綏四方不失賞刑之謂也是年夏楚令尹子玉與晉戰敗于城濮楚王使謂之曰大夫若入其若申息之老何申息二邑子弟皆從子玉而死言何以見其父老子西孫伯曰得臣將死二臣止之曰君其將以爲戮孫伯即大心子玉子也二子以此答王使欲令子玉徃就君戮及連糓而死至連糓王無赦命故自殺是年冬衛侯與元咺訟爭殺叔武事寗武子爲輔鍼莊子爲坐士榮爲大士衛侯不勝殺士榮刖鍼莊子謂寗愈忠而免之文公九年正月己酉晉箕鄭父先都士縠梁益耳蒯得使賊殺先克乙丑靈公殺先都梁益耳三月甲戌靈公殺箕鄭父士縠蒯得初文公六年夷之蒐晋侯將登箕鄭父先都而使士縠梁益耳將中軍先克曰狐趙之勲不可廢也從之先克奪蒯得田於堇陰故箕鄭父先都士縠梁益耳蒯得作亂十八年冬宋武氏之族道昭公子將奉司城須以作亂文公殺昭公故武族欲因其子以作亂司城須文公弟十二月宋公殺母弟須及昭公子使戴莊桓之族攻武氏于司馬子伯之館載族華樂也莊族公孫師桓族向魚鱗蕩也司馬子伯華耦也遂出武穆之族穆族黨於武氏故宣公元年夏晉人討不用命者放胥甲父于衛胥甲下軍佐文十二年戰河曲不肯薄秦於險而立胥克克甲之子先辛奔齊辛甲之屬大夫十三年冬晉人殺其大夫先縠初十二年晉師救鄭荀林父爲中軍先縠佐之及河聞鄭及楚平桓子欲還先縠曰不可以中軍佐濟故敗是年赤狄伐晉及清先縠召之也冬晉人討邲之敗與清之師歸罪於先縠而殺之盡滅其族君子曰惡之來也已則取之其先縠之謂乎成公五年秋宋公子圍龜爲質子楚而歸圍龜文公子華元享之請皷譟以出皷譟以復入出入輙擊皷曰習攻華氏宋公殺之宣公十五年宋楚平後元使圍龜代已爲質故怨而欲攻之十八年春正月晉周子立悼公周朝于武宮武宮曲沃始命君逐不臣者七人夷羊五之屬臣欽若等曰皆厲公嬖臣也是月齊爲慶氏之難前年國佐殺慶克故甲申晦齊侯使士華免以戈殺國佐于内宮之朝華免齊大夫内宮夫人宮師逃于夫人之宮㐲兵内宫恐不勝書曰齊殺其大夫國佐棄命專殺以糓叛故也國佐本疾滛亂殺慶克齊以是討之嫌其罪不及死故明言其三罪使清人殺國勝國勝佐子前年待命於清者國弱奔魯弱勝之弟王湫奔萊湫國佐黨襄公二年冬楚公子申爲右司馬多受小國之賂以偪子重子辛偪奪其權勢楚人殺之故書曰楚殺其大夫公子申言所以致國討之失六年春宋華弱與樂轡少相狎長相優又相謗也子蕩怒以弓梏華弱于朝子蕩樂轡也張弓以貫其頸若械之在手故曰梏平公見之曰司武而梏於朝難以勝矣司武司馬言甘懦弱不足以勝敵遂逐之華弱奔魯司城子罕曰同罪異罰非刑也專戮于朝罪孰大焉亦逐子蕩十九年秋鄭子孔之爲政也專國人患之乃討西宮之難十年尉止等作難於西宮子孔知不言與純門之師前年子孔召楚師至於純門子孔當罪以其甲及子革子良氏之甲守子展子西率國人伐之殺子孔二十一年晉欒盈出奔楚箕遺及黄淵嘉父作亂不克而死箕遺黄淵嘉父皆晉大夫樂黶娶范宣子之女曰欒祁生盈黶卒祁與其老州賔通盈患之祁懼愬諸宣子曰盈將爲亂盈好施士歸之宣子執政畏其多士使城著將逐之箕遺黄淵等知之而作亂宣子殺遺淵嘉父及司空靖羊舌虎等十人公遂逐羣賊群賊欒盈之黨知起中行喜州綽刑蒯之屬逐之出奔齊謂陽畢曰自穆侯以至於今兵亂不輟陽畢晉大夫穆侯唐叔八世之孫桓叔之父也晉亂自桓叔始輙止也民志無厭禍敗無已厭極已止離民且速㓂恐及吾身若之何速召陽畢對曰本根猶樹本根亂本謂欒氏猶尚樹立也枝葉益長本根益茂是以難已也今若大其柯柯斧所操以伐木去其枝葉絕其本根可以少間間息也謂㓕欒氏而去其黨公曰子實圗之陽畢曰圗在明訓訓教也明訓在威權言既有明教當有威權以行之也威權在君言不在臣君掄賢人之後有常位於國者而立之掄擇也常位謂世有功列於國而中微者亦掄逞志虧君以亂國者之後而去之逞快是遂威而逺權遂申也逺權權及後嗣也民畏其威而懷其德莫能勿從言皆從君也若從則民心皆可畜皆可蓄飬而教之畜其心而知其欲惡民孰偷生欲惡情欲好惡偷茍也若不偷生則莫思亂矣且夫欒氏之誣晉國乆矣誣罔也以惡取善曰誣謂書雖殺厲公然民被其德不以爲惡傳曰武子之德在民若周人之思邵公也欒書實覆宗殺厲公以厚其家覆敗也宗大宗也謂殺厲立悼以取重於國厚其家也若滅欒氏則民威矣威畏也今吾若起瑕原韓魏之後而賞立之則民懷矣瑕瑕嘉原原軫韓韓萬魏畢萬之後皆晉賢人有常位於國者也威與懷各當其所則國安矣君治而國安欲作亂者誰與君曰欒書立吾先君先君悼公欒盈不獲罪如何言盈不得罪於國爲其母范祁所譛耳如何可㓕也陽畢曰夫正國者不可以暱于權暱近也言當逺權爲乆長計也行權者不可以隱於私以私恩隱蔽其罪無以正國也暱于權則民不導不可導訓也行權隱於私則政不行政不行何以道民民之不道亦無君矣與亡君同則其爲暱與隱也復産害矣且勤身復反也勤勞也反勞於國而勞君身也君其圗之若愛欒盈則明逐羣賊而以國倫數而遣之羣賊盈之黨倫理也厚戒箴國以待之箴猶勅待倫也彼若求逞志而圖報於君罪孰大焉滅之猶少猶少滅之恐少彼若不敢而逺逃乃厚其外交而勉之以報其德不亦可乎謂賂其所適之國厚寄託之而勸勉焉公許諾盡逐羣賊而使祁午及陽畢適曲沃逐欒盈祁午中軍尉曲沃欒盈邑欒盈出奔楚遂令於國人曰自文公以來之有功於先君而孫子不育者將授立之得之者賞授之爵位而立之也居三年後三年也欒盈晝入爲賊于絳欒盈在楚一年奔齊魯㐮二十三年齊莊公使析歸父以藩載欒盈及其士納之曲也沃夏四月盈帥曲沃之甲因魏獻子以晝入絳范宣子以公入于襄公之宮襄宫完固故就之傳曰奉公以如固宫也欒盈不克出奔曲沃傳曰晉人圍曲沃也遂刺欒盈滅欒氏刺殺也傳曰晉人克欒盈於曲沃盡殺欒氏之族黨也是以没平公之身無内亂二十六年夏齊烏餘以廪丘奔晉烏餘齊大夫廩丘今東郡廩丘縣故城是襲衛羊角取之今廩丘縣所治羊角城是遂襲魯高魚髙魚城在廩丘縣東有大雨自其竇入雨故水竇開介于其庫入髙魚庫而介其甲以登其城克而取之取魯髙魚無所諱而不書其義未聞又取邑于宋於是范宣子卒宣子范匄諸侯弗能治也及趙文子爲政乃卒治之文子言於晉侯曰晉爲盟主諸侯或相侵也則討而使歸其地今烏餘之邑皆討類也言於此類宜見討而貪之是無以爲盟主也請歸之公曰諾孰可使也對曰胥梁帶能無用師晉侯使往胥梁帶晉大失能無用師言有權謀至二十七年春胥梁帶使諸䘮邑者具車徒以受地必周諸䘮邑謂齊魯宋也周宻也必宻來勿以受地爲名使烏餘具車徒以受封烏餘以地來故詐許封之烏餘以其衆出出受封也使諸侯僞效烏餘之封者效致也使齊魯宋爲若致邑封烏餘者而遂執之盡獲之皆獲其徒衆皆取其邑而歸諸侯諸侯是以睦於晉傳言趙文子賢故平公雖失政而諸侯猶睦昭公十四年八月楚令尹子旗鬭成然有德於王不知度有佐立之德與養氏比而求無厭養氏子旗之黨養繇基之後王患之九年甲午楚子殺鬭成然而滅養氏之族使鬭辛居鄖以無㤀舊勲辛子旗之子鄖公辛定公十年夏晉人討衛之叛故曰繇渉佗成何剸澤之盟成何曰衛吾温原也焉得視諸侯涉佗捘衛侯手故於是執涉佗以求成於衛衛人不許晉人遂殺涉佗成何奔燕君子曰此之謂棄禮必不鈞言必見殺不得與人等詩曰人而無禮胡不遄死涉佗亦遄矣哉詩鄘風遄速也哀公二十二年十一月越王勾踐既滅吳而誅太宰嚭以不忠於其君而受重賂與已比周也册府元龜卷二百五十二
