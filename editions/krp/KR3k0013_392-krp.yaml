body:
  text: 冊府元龜卷三百九十二宋王欽若等撰將帥部威名夫將之為用也戎昭果毅整軍經武號令精眀卒乗競勸人不敢犯法在必行故能風生於三軍名震於鄰國折衝千里隱若長城兹所謂王者之爪牙生民之司命也繇是處以衛社稷則敵不敢加兵出以守邊防則虜不敢近塞豈惟震讋虓虎叱咜風雲蓋亦義勇兼聞䇿謀宏逺者也傳曰有威可畏又曰懐德而畏威其是之謂乎楚得臣為令尹與晉戰敗於城濮晉伐衛救之晉文公猶有憂色曰得臣猶在憂未歇也歇盡也困獸猶鬬况國相乎及楚殺子玉子玉得臣也公喜而後可知也喜見於顔色曰莫余毒也已一云子玉為將文公側席而坐及其死也君臣相慶魏公子無忌在趙秦伐魏公子歸救魏魏王以上將軍印授公子公子遂將安釐王三十年公子使使遍告諸侯諸侯聞公子將各遣將將兵救魏公子率五國之兵破秦軍於河外走蒙驁遂乗勝逐秦軍至函谷關抑秦兵秦兵不敢出當是時公子威振天下吳起為西河守以拒秦韓甚有聲名趙亷頗者趙之良將恵文王十六年頗為趙將伐齊大破之取陽晉拜為上卿以勇氣聞於諸侯李牧北邊之良將常居代鴈門大破殺匃奴十餘萬騎滅襜襤胡名在代北破東胡降林胡單于奔走其後十餘嵗匃奴不敢近趙邊城秦白起為左更料敵合變出竒無窮聲振天下蒙恬為内史秦已并天下乃使恬將三十萬衆北逐戎狄暴師於外十餘年居上郡是時䝉恬威鎮匃奴漢魏尚為雲中守匃奴逺避不近雲中之塞郅都為鴈門太守匃奴素聞郅都節舉邊為引兵去竟都死不近鴈門匃奴至為偶人象都以木為人象都之形也偶對也令騎馳射莫能中其憚如此匃奴患之李廣為驍騎將軍在北平郡匃奴號曰漢飛將軍避之數嵗不入界李廣利為貳師將軍破大宛斬其王還單于欲遮之不敢趙充國為後將軍征西羌西至西部都尉府在金城日饗軍士士皆欲為用虜數挑戰充國堅守捕得生口言羌豪數相責曰語汝亡反今天子遣趙將軍來年八九十矣善為兵今請欲一鬬而死可得邪馮奉世為執金吾歴右將軍居爪牙官前後十年為折衝宿將功名次趙充國辛慶忌為左將軍當時號為國虎臣遭世承平匃奴西域親附敬其威信陳湯為西域副校尉誅郅支單于後坐事徙焞煌太守奏湯前親誅郅支單于威行外國不宜近邊塞詔徙安定後漢齊武王演為更始司徒既破王莾軍莾素聞其名大震懼購伯升邑五萬户黃金十萬斤位上公使長安中官署及天下鄉亭皆畫伯升象於塾屋旦起射之塾門側堂也彭寵父宏哀帝時為漁陽太守偉容貌能飲飯有威於邊岑彭為征南將軍與諸將伐公孫述彭首破荆門長驅武陽持軍整齊秋毫無犯卭糓王任貴貴本越嶲夷殺太守枚根自立為王聞彭威信數千里遣使迎䧏㑹彭已薨光武盡以任貴所獻賜彭妻子祭彤為遼東太守數破斬鮮卑自是鮮卑震懼畏彤不敢復闚塞後率勵鮮卑往擊破赤山烏桓塞外振讋彤之威聲暢於北方陳俊為琅邪太守行大將軍事時琅邪未平齊地素聞俊名入界盜賊皆解散賈宗字武孺大將軍復之子為朔方太守匃奴常犯塞得生口問太守為誰曰賈武孺曰寕賈將軍子邪曰是皆放遣還是後更不入塞張堪為漁陽太守視事八年匃奴不敢犯塞李恂為武威太守坐事免歸鄉里㑹西羌反叛恂到田舍為所執獲羌素聞其名放遣之恂因詣洛陽謝陳禪舉茂才時漢中蠻夷反叛以禪為漢中太守夷賊素聞其名聲即時䧏服郭涼雖為武將然通經書多智略尤曉邊事有名北方徐淑為度遼將軍有名於邊鄧訓為䕶烏桓校尉故人多攜將老㓜樂隨訓徙邊鮮卑聞其威恩皆不敢南近塞下陳龜為度遼將軍既到職州郡重足震慄鮮卑不敢近塞种暠為使匃奴中郎將時遼東烏桓叛復轉遼東太守烏桓望風率服迎拜於界上傅育為武威太守威聲聞於匃奴第五訪為䕶羌校尉邊境服其威信李膺為烏桓校尉虜甚憚攝以公事免官永夀二年鮮卑宼雲中桓帝聞膺能乃復徵為度遼將軍先是羌虜及疏勒龜兹數出攻鈔張掖酒泉雲中諸郡百姓屢被其害自膺到邊皆望風懼服先所掠男女悉送還塞下自是之後聲振逺域皇甫規為度遼將軍在事數嵗北邊威服段紀眀久為邊將威震西土其後賈詡察孝亷為即以疾病去官西還至汧道遇叛氐同行數十人皆為所執詡曰我段公外孫也汝别埋我我家必厚贖之詡實非段甥假以懼氐氐果不敢害與盟而送之其餘悉死公孫瓉為䧏虜校尉兼屬國長史職統戎馬連接邊宼毎聞有警瓉輒厲色憤怒如赴讐敵望塵奔逐或繼之以夜戰虜識瓉聲憚其勇莫敢抗犯瓉常與善射之士數十人皆乗白馬以為左右翼自號白馬義從烏桓更相告語避白馬長史乃畫作瓉形馳騎射之中者咸稱萬嵗虜自此之後逺竄塞外吕布初為騎都尉便弓馬膂力過人號為飛將魏龎德為立義將軍與曹仁討關羽樊下諸將以德兄在漢中頗疑之德常言曰我受國恩義在効死我欲身自擊羽今年我不殺羽羽當殺我後親與羽交戰射羽中額時德嘗乗白馬羽軍謂之白馬將軍皆憚之于禁為偏將軍太祖恨朱靈欲奪其營以禁有威重遣禁將數十騎齎令書徑詣靈營奪其軍靈及部衆莫敢動乃以靈為禁部下督衆皆震服其見憚如此張遼為前將軍屯合肥時孫權復叛文帝遣遼乗舟與曹休至海陵臨江權甚憚焉勑諸將張遼雖病不可當也慎之初遼為孫雄所圍遼潰出復入雄衆破走繇是威鎮江東兒啼不肯止其父母以遼恐之張郃為盪宼將軍與都督夏侯淵守漢中拒劉備時備屯陽平郃屯廣石備以精卒萬餘分為十部夜急攻郃郃率親兵搏戰備不能克其後備於走馬谷燒都圍淵救火從他道與備相遇交戰短兵接刅淵遂没郃還陽平當是時新失元帥恐為備所乗三軍皆失色淵司馬郭淮乃令衆曰張將軍國家名將劉備所憚今日事急非張將軍不能安也遂推郃為軍主郃出勒兵安陣諸將皆受郃節度衆心乃定初劉備憚郃而易淵及殺淵備曰當得其魁用此何為邪後為征西車騎將軍識變數尤善處營陣料戰勢地形無不如計自諸葛亮皆憚之曹真為大將軍督諸軍擊南安天水安定三郡安定民楊條等略吏民保月支城真進軍圍之條謂其衆曰大將軍自來吾願早䧏爾遂自縳出三郡皆平夏侯淵從太祖起兵為别部司馬每赴急疾嘗出敵之不意故軍中為之語曰典軍校尉夏侯淵三日五百六日一千文聘為江夏太守典北兵委以邊事在郡數十年有威恩名震敵國賊不敢侵田豫為䕶匃奴中即將領并州刺史外胡聞其威名相率來獻州界寕肅百姓懐之蜀關公為前將軍假節鉞率衆攻曹仁於樊曹公遣于禁助仁㑹大霖雨漢水汎溢禁所督七軍皆沒禁䧏公公又斬將軍龎德梁郟陸渾羣盗或遥受公印號為之支黨公威振華夏曹公議徙都以避其銳張飛為右將軍雄壯威猛亞於關公魏謀臣程昱等咸稱關飛萬人之敵也諸葛亮為丞相出師揚聲繇斜谷道取郿使趙雲鄧芝為疑軍據箕谷魏大將軍曹真舉衆拒之亮身出軍攻祈山戎陣整齊賞罰肅而號令眀南安天水安定三郡叛魏應亮關中響震亮卒及軍退司馬宣王案行其營壘處所曰天下之竒才也馬忠為庲䧏都督威恩並立張表時名士清望踰忠閻宇宿有功幹於事精勤繼踵在忠後其威風稱績皆不及忠陳叔至自豫州隨先主名位嘗亞趙雲俱以忠勇稱王平為鎮北將軍統漢中時鄧艾在東馬忠在南平在北境咸著名迹平同郡句扶為左將軍忠勇寛厚數有戰功功名爵位亞於平後與張翼廖化並為大將軍時人語曰前有王句後有張廖吳周瑜字公瑾為偏將軍領南郡太守劉備領荆州牧詣京見大帝備自京還權乗飛雲大舩與張昭秦松魯肅十餘人共追送之大宴㑹叙别昭肅等先出帝獨與備留語因言次嘆瑜曰公瑾文武籌略萬人之英顧其器量廣大恐不乆為人臣爾瑜之破魏軍也曹公曰孤不羞走後與帝書曰赤壁之役值有疾病孤燒舩自退橫使周瑜虚獲此名瑜威聲逺著故曹公劉備咸欲疑譛之董襲為揚武都尉時大帝初統事鄱陽賊岑龍彭虎等衆數萬人襲與凌統歩隲蔣欽各别分討襲所向輙破虎等望見旌旗便散走旬日盡平拜威越校尉張昭為輔吳將軍容貌矜嚴有威風大帝嘗曰孤與張公言不敢妄也舉邦憚之朱桓為前將軍領青州牧假節嘉禾六年魏廬江主簿吕習請大兵自迎欲開門為應桓與衛將軍全琮俱以師迎既至事露軍當引還城外有溪水去城一里所廣三十餘丈深者八九尺淺者半之諸軍勒兵渡去桓自斷後時廬江太守李膺整嚴兵騎欲須諸軍半渡因廹擊之及見桓節蓋在後卒不敢出其見憚如此晉義陽成王望初仕魏為征西將軍持節都督雍涼二州諸軍事在任八年威化眀肅先是蜀將姜維屢宼關中及望至廣設方略維不得為寇關中賴之王沈為征虜將軍督江北諸軍事平蜀之役吳人大出聲為救蜀振蕩邊境沈鎮御有方寇聞而退茍晞行兖州刺史汲桑之破鄴也東海王越出次官渡以討之命晞為前鋒桑素憚之於城外為柵以自守晞將至頓兵休士先遣單騎示以禍福桑衆大震棄柵宵遁嬰城固守晞䧟其九壘遂定鄴而還西討吕朗等滅之祖逖為豫州刺史進為鎮西將軍石勒不敢窺兵河南使成皋縣脩逖母墓因與逖書求通使交市逖不報書而聴互市收利十倍時王敦久懐逆亂畏逖不敢發逖卒始得意焉索綝為新平太守時劉聰將蘇鉄劉五斗等刼掠三輔除綝安西將軍馮翊太守綝有威恩華戎嚮服賊不敢犯劉𢎞為寕朔將軍假節監幽州諸軍事鎮烏丸校尉甚有威恵㓂盗屏迹為幽朔所稱周訪為安南將軍梁州刺史聞王敦有不臣之心訪常切齒敦雖懐逆謀而終訪之世未敢為非紀贍為鎮軍將軍當時服其嚴毅雖常疾病六軍敬憚之陶侃為廣州刺史初廣州人迎長沙人王機為刺史機復遣使詣王敦乞為交州刺史敦從之㑹杜𢎞據臨賀因機乞䧏勸𢎞取廣州𢎞遂與温邵及交州秀才劉沈謀反侃擊機破之執劉沈又遣部將討機斬之諸將皆請乗勝擊温邵侃笑曰吾威名已著何事遣兵但一函紙自足爾於是下書諭之邵懼而走追獲於始興以功封柴桑侯食邑四千户後侃為征西大將軍督七州軍事屬後將軍郭黙矯詔襲殺平南將軍劉𦙍輙領江州侃聞之遣將出兵據湓口侃以大軍繼進侃既至黙將宗侯縳黙父子五人及黙將張丑詣侃䧏侃斬黙等黙在中原數與石勒等戰賊畏其勇聞侃討之兵不血刅而擒也益畏侃蘇峻將馮鉄殺侃子奔於石勒勒以為戍將侃告勒以故勒召而殺之劉毅為荆州刺史初屬桓𤣥簒位與宋髙祖何無忌起義兵桓𤣥聞毅及髙祖何無忌之起兵也甚懼其黨曰劉裕烏合之衆勢必無成願不以為慮𤣥曰劉裕勇冠三軍當今無敵劉毅家無擔石之儲樗蒲一擲百萬何無忌劉牢之之甥酷似其舅其舉大事何謂無成其見憚如此劉牢之為謝𤣥參軍𤣥鎮廣陵牢之領精銳為前鋒百戰百勝號為北府兵敵人畏之桓石䖍從伯父温入關叔父冲為苻健所圍垂没石䖍躍馬赴之拔冲於數萬衆之中而還莫敢抗者三軍歎息威震敵人時有患瘧疾者謂曰桓石䖍來以怖之病者多愈其見畏如此宋沈林子從髙祖討姚泓於長安林子威聲逺聞三輔震動關中豪左望風請附長安既平大軍東歸林子領水軍於石門以為聲援沈慶之為建威將軍患頭風好着狐皮㡌羣蠻惡之號曰蒼頭公見慶之軍輙畏懼曰蒼頭公已復來矣檀道濟鎮廣陵率軍繼到彦之以討謝晦彦之戰敗退保隱圻㑹道濟至晦本謂道濟與羡之等共罪同誅謂徐羡之也忽聞來至人情恼懼遂不戰自潰劉胡為隊主討伐諸蠻往無不㨗蠻甚憚之小兒啼語之云劉胡來便止周山圖為振武將軍時鎮軍將軍張永征薛安都於彭城山圖領二千人迎軍至武原為虜騎所追合戰多所傷殺虜圍轉急山圖據城自固然後更結陣死戰突圍出虜披靡不能禁衆稱其勇呼為武原將南齊桓康隨世祖起義摧堅䧟陣膂力絶人所經村邑恣行暴害江南人畏之以其名怖小兒畫其形以避瘧無不立愈梁韋叡為輔國將軍既平合肥髙祖詔衆進次東陵去魏甓城二十里將㑹戰有詔班師去賊既近懼為所躡叡悉遣輜重居前身乗小輿殿後魏人服叡威名望之不敢逼全軍而還張齊為信武將軍巴西㳯潼二郡太守齊在益部累年討擊蠻獠身無寕嵗其居軍中能親勞辱與士卒同其勤苦自畫頓舍城壘皆委曲得其便調給衣糧資用人人無所困乏既為物情所附蠻獠亦不敢犯是以威名行於庸蜀桞仲禮為電威將軍鎮襄陽大通中西魏將賀拔勝來逼樊鄧仲禮出擊破之稍遷司州刺史武帝思見其靣使畫工圖之初侯景潜圖反噬仲禮先知之屢啟求以精兵三萬討景朝廷不許及景濟江朝野便望其至兼蓄雍司精卒與諸藩赴援見推總督景素聞其名甚憚之仲禮亦自謂當世英雄諸將莫已若也程文秀為安逺將軍每戰常為前鋒北齊深憚之謂為程虎陳歐陽頠為衡州刺史時蕭勃在廣州兵強位重及荆州䧟頠委質於勃周文育擒送於髙祖釋之蕭勃死後嶺南擾亂頠有聲南土且與髙祖有舊乃授頠安南將軍衡州刺史始興縣侯未至嶺南頠子紇已尅定始興及頠至嶺南皆懾伏沈恪監㑹稽郡㑹余孝頃謀應王綝出兵臨川攻周廸以恪為壯武將軍率兵踰嶺以救廸孝頃聞恪至退走孫陽為都督荆信二州諸軍事安西將軍荆州刺史出鎮公安増修城池懐服邊逺為隣境所憚後魏于栗磾眀元時為河内鎮將劉裕伐姚泓栗磾禁防嚴宻裕遺栗磾書逺引孫權求討關羽之事假道西上題書曰黒矟公麾下栗䃅以狀表聞眀元許之因授黒矟將軍栗磾好持黒矟以自標裕望而異之故有是語奚眷少有將略眀元時為尚書假安南將軍虎牢鎮將為宼所憚周觀為髙平鎮將觀善撫士卒號有威名河間公齊初坐事免官爵㑹宋將裴方眀䧟仇池太武授齊前軍與建興公古弼討之遂尅仇池威振羌氐復賜舊爵陳留王崇為荆州刺史從太武討蠕蠕别督諸軍出大澤越祁山威懼漠北叔孫建為廣河鎮將羣盗歛跡威名甚震後為徐州刺史太武以建威名甚震為宋所憚除平原鎮大將封丹陽王加征南大將軍都督兾青徐濟四州諸軍事建在平原十餘年綏懐内外甚得邊稱魏初名將尠有及之南方憚其威略青兖輙不為㓂古弼為西安將軍鎮長安甚著威名陸真為長安鎮將咸陽民趙昌鄠縣民王稚兄弟聚衆五千據治容堡真擊破之斬昌等并誅其黨與雍州民夷莫不威服在鎮數年甚著威稱周㡬為寕朔將軍太武以㡬有智勇遣鎮河南威信著於外境辛紹先為下邳太守唯教民治産禦賊之備及宋將陳顯逹蕭道成蕭順之來寇道成謂順之曰辛紹先未易侵行宜共慎之於是不歴郡境遂逕屯吕梁尉元為統萬鎮都將齊髙祖立多遣間諜扇動新民不逞之徙所在蜂起以元威名夙震徵為侍中都督南征諸軍事征西大將軍耒率諸軍以討之元討五固賊桓和等皆平之東南清宴逺近怗然城陽王長夀為沃野鎮都大將性聰恵善撫接在鎮甚有威名長孫稚為揚州刺史都督淮南諸軍事梁將裴䆳虞鴻襲據夀春稚諸子驍果䆳頗難之號曰鐵小兒長孫肥為平南將軍率衆鎮北境威名甚著蠕蠕惮之穆羆為征東將軍山胡劉什婆宼掠郡縣羆討滅之自是部内肅然莫不敬憚庾岳為將有謀略治軍清整嘗以少擊多士衆服其智勇名冠諸將李陽為伏波將軍隨蕭寳夤西征其下每有戰功軍中號曰李公騎鄭模為安東將軍時將督敗殁者多模挫敵持重號為名將鄭楷為伏波將軍楷性嚴烈能摧挫豪強故時人語曰摸􅰑獬付鄭楷李崇為車騎將軍揚州刺史崇沈深有將略寛厚善御衆在州凡經十年常養壯士數千人宼賊侵邊所向摧破號曰卧虎賊甚憚之劉藻為龍驤將軍雍城鎮將先是氐豪徐成楊里等驅逐鎮將故以藻代之至鎮擒獲成里等斬之以殉羣氐震慴楊大眼初以軍敗不能禁徙為營州兵後徵為平南將軍大眼至京師時人思其雄勇喜其更用臺省閭巷觀者如市大眼為將帥前後所遣督將軍未渡江預皆畏懾傳言淮泗荆沔之間有童兒啼者恐之云楊大眼至無不即止王肅弟子秉之初歸國也謂大眼曰在南聞君之名以為眼如車輪及見乃不異人大眼曰旗鼓相望瞋眸奮發足使君目不能視何必大如車輪當世推其驍果皆以為関張弗之過也大眼為荆州刺史嘗縳蒿為人衣青布而射之召諸蠻渠桓示之曰卿等若作賊吾正如此相殺也又北淯郡嘗有虎害大眼搏而獲之斬其頭懸於穰市自是荆蠻相謂曰楊公惡人嘗作我蠻形以射之又深山之虎尚所不免遂不敢復為宼盗崔延伯善將撫得衆心與奚康生楊大眼為諸將之冠延伯功名尤重時大宼未平而延伯死朝野歎懼焉樊子鵠為平北將軍兼尚書行臺治有威信山胡率服韓茂膂力絶人又善騎射為徐州刺史征南將軍為將善於撫衆勇冠當世為朝廷所稱賀拔勝為荆州刺史將圖襄陽乃攻馮翊安定酇城等平之時有梁人書勅蕭續續梁武帝子鎮襄陽云賀拔勝北間驍將汝宜慎之勿與爭鋒其見憚如此冊府元龜卷三百九十二
