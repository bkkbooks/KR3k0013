body:
  text: 册府元龜卷二百九十三宋王欽若等撰宗室部薦賢儉約抑損好尚薦賢夫樂善好賢戚藩之令範也繇東京以來宗哲繼武乃能察掾屬之才美詢士類之行義隠淪胥洎仄陋咸達或形慰薦之䟽或應舉知之詔或白之於清宴或升之於有司莫不任官縻爵飛聲騰實上以增多士彬彬之盛下以隆公族振振之徳又何况知人之為哲薦賢之為賢者哉後漢東平王蒼上疏薦吳良曰臣聞為國所重必在得人報恩之義莫大薦士竊見臣府西曹掾齊國吴良資質敦固公方亷恪躬儉安貧白首一節又治尚書學通師法經任博士行中表儀冝備宿衛以輔聖政臣蒼榮寵絶矣憂責深大私慕公叔同升之義懼干臧文竊位之罪敢秉愚瞽犯冐嚴禁顯宗以示公卿曰前以事見良鬚髪皓然衣冠甚偉夫薦賢助國宰相之職蕭何舉韓信設壇而拜不復考試今以良為議郎蒼又上書表薦名士左馮翊桓虞虚已禮下與參政事晉成都王頴表論興義功臣盧志和演董洪王彦趙驤等五人皆封開國公侯宋臨川王義慶出為荆州刺史元嘉十二年普使内外羣官舉士義慶上表曰詔書疇咨羣司延及連牧求賢仄陋拔善幽遐伏惟陛下惠哲光宣經緯明逺皇階藻曜風猷日昇而猶詢衢室之令典遵明臺之叡訓降淵慮於管庫紆聖思於板築故以道邈徃載徳髙前王臣敢竭虚闇祗承明㫖伏見前臨淄令新野庾實秉真履約愛敬淳深昔在母憂毁瘠過禮今罹父疚泣血有聞行成閨庭孝著隣黨足以敦化率民齊敎軌俗前徴奉朝請武陵龔祈恬和平簡貞潔純素潛居研志躭情墳籍亦足鎮息頽競奬朂浮動處士南郡師覺才學明敏操介清脩業均井渫志固氷霜臣往年辟為州祭酒未行其志若朝命逺暨玉帛遐臻異人間出何逺之有江夏王義恭元嘉九年帝詔百官舉才義恭上表曰臣聞雲和備樂則繁㑹克諧驊騮驂服則致逺斯效陛下順夤大化文明在躬玉衡既正㤗階載一而猶發慮英髦垂情仄陋幽谷空同顯著揚厯是以潜虬聳鱗佇利見之期翔鳳弭翼應來儀之感竊見南陽宗炳操履閑逺思業貞純砥節丘園息賔盛世貧約而苦内無改情軒冕屢招確爾不拔若以蒲帛之聘感以大倫之美庶投竿釋褐翻然來儀必能毗燮九官宣賛百揆尚書金部郎臣徐森之臣府中直兵參軍事臣王天寳並局力允濟忠諒欵誠徃年逆臣叛逸華陽失守森之全境寧民績章危棘前者經略伊瀍元戎䘮旅天寶北勤河朔東據營丘勲勇既昭心事兼竭雖經褒叙未盡才冝並可授以邊藩展其志力交阯遼邈累䘮藩將政刑每闕撫蒞惟艱南中夐逺風謠逈隔蠻獠狡竊邊氓荼毒實須練實以綏其難謂森之可交州刺史天寳可寧州刺史庻足威懐荒表肅清遐服昔魏戍之賢功存薦士趙武之明事彰管庫臣識愧前良理謝先哲率舉所知仰酬採訪退懼瞽言無足甄奬長沙王義欣上言所統威逺將軍北譙梁二郡太守關中侯申季厯自奏職邦畿于兹五年信惠並宣威化兼著外清暴亂内輯民黎役賦均平閭井齊肅綏穆初附招攜荒逺郊境之外仰澤懐風爵賞之授績能是顯冝陞階秩以崇奬勸進號寕朔將軍南齊竟陵王子良武帝子武帝詔舉士子良薦王思逺及吴郡顧暠之陳郡殷叡始安王遙光為揚州刺史明帝建武初有詔舉士遙光表薦王暕王僧孺曰臣聞求賢暫勞垂拱永逸方之䟽壤取類導川伏惟陛下道隠旒纊信充符璽白駒空谷振鷺在庭猶懼隠鱗卜祝藏器屠佑物色闗下委裘河上非取製於一狐諒求味於兼采而五聲倦響九工是詢寢議廟堂借聽輿皂臣位任隆重義兼家邦實欲名實不違徼倖路絶勢門上品猶當格以清談英俊下寮不可限以位貌竊見秘書丞琅邪王暕年二十一七葉重光海内冠冕神清氣茂允廸中和叔寳理遣之談彦輔名敎之樂故以暉暎先逹領袖後進居無塵雜家有賜書辭賦清新屬言𤣥逺室邇人曠物踈道親飬素丘園台階虚位庠序公朝萬夫傾望豈徒荀令可想李公不亡而已哉前晉安郡侯官令東海王僧孺年三十五理尚棲約思致悟敏既筆耕為飬亦傭書成學乃炤螢映雪編蒲緝栁先言往行人物雅俗甘泉遺儀南宫故事畫地成圖抵掌可述豈直鼷䑕有必對之辨竹書無落簡之謬暕坐鎮雅俗引益已多僧孺訪對不休質疑斯在並東序之秘寳瑚璉之茂器誠言以人廢而才實世資帝乃以暕為騎從事中郎僧孺為尚書儀曹郎曲江公遙欣與始安王遙光等參預政事凡所談薦皆得其人繇是朝野輻凑軒葢盈門後魏髙陽王雍宣武正始中詔百官各舉所知雍以田曹參軍辛少雍為舉首遷給事中侍郎清河王懌舉李平行臺七兵郎陽固除歩兵校尉領汝南王悦郎中令尋加寧逺將軍時悦年少行多不法屑近小人固上䟽切諌并面陳徃代諸王賢愚之分以感動悦悦甚敬憚之懌大悦以為舉得其人臨淮王彧為僕射表薦涿郡人祖鴻勛有文學冝試以一官勅除奉朝請人謂之曰臨淮舉卿便以得調竟不相謝恐非其義鴻勲曰為國舉才臨淮之務祖鴻勲何事從而謝之彧聞而喜曰吾得其人矣彭城王勰宣武初為司徒成淹為羽林監領主客知左右二都水事勰曰先帝本奉有成㫖淹有歸國之誠兼厯官著稱冝加優陟髙祖顧命詔猶在耳乃相聞選曹加淹右軍領左右都水仍主客令復授驍騎將軍加輔國將軍都水主客如故勰又每稱尚書祠部郎宋世景精幹尚書僕射才也汝南王悦宣武時詔四門博士董徴敎授徴自安州刺史入為司農少卿光祿大夫徴出州入卿匪唯學業所致亦繇悦以其師資之義為啟請焉任城王澄臨薨啟諌議大夫張普惠為尚書右丞靈太后既深悼覽啟從之北齊任城王湝為定州刺史嘗語李徳林云竊聞蔽賢䝉顯戮乆令君沉滯吾獨得潤身朝廷縱不見尤亦懼明靈所譴於是舉秀才表云李德林者文章學識固不待言觀其風神器宇終為棟梁之用至於經國大體是賈生晁錯之儔彫蟲小技殆相如子雲之輩今雖唐虞君世俊乂盈朝然脩大厦者豈厭夫良材之積也吾嘗見孔文舉薦禰衡表云洪水横流帝思俾乂以正平比夫大禹常謂擬非其倫今以徳林言之便覺前言非大後唐雍王重美為河南尹時馬𦙍孫為禮部侍郎翰林學士清㤗中藩邸舊臣韓昭𦙍房暠為樞使劉延朗李專美為宣徽使河南尹雍王重美不平之宻奏曰馬𦙍孫者只令視草恐未得冝帝然之故令掌貢舉尋拜中書侍郎平章事儉約傳曰儉徳之恭書曰禄不期侈皆先儒之丕訓方䇿之深戒也乃有體自𤣥極列於戚藩承慶靈之錫羡處冨貴之極勢而能躬履素行志脩亷節循守法度靡尚華麗居官以清白處躬以簡儉去泰窒慾慎終如始斯固秉上智之質為宗室之範者焉後漢東海恭王疆光武子也疆深執儉謙及薨帝不欲厚𦵏以違其意詔曰王恭謙好禮以徳自終遣送之物務從約省衣足斂形茅車瓦器物减於制以彰王卓爾獨行之志東海頃王肅疆之子也性謙儉循恭王法度魏陳思王植武帝子也性簡易不治威儀輿馬服餙不尚華麗植之薨也遺令薄葬中山恭王衮武帝子也黄初七年徙封濮陽太和二年就國尚約儉敎勑妃妾紡績織紝習為家人之事晉髙宻文献王泰宣帝弟也㤗武帝時録尚書事性亷静不近聲色雖為宰輔食大國之租服飾肴膳如布衣寒士譙王承宣帝孫也元帝大興初為輔國將軍領左軍將軍居官儉約家無别室及為湘州刺史湘土荒殘公私困弊承躬自儉約乗葦茭車而傾心綏撫甚有能名宋臨川烈武王道規髙祖少弟也道規無子以長沙景王第二子義慶為嗣義慶性謙虚素寡嗜慾受任厯藩無浮淫之過為荆州刺史始至及去鎮迎送物並不受衡陽王義季武帝子也為荆州刺史先是臨川王義慶在任巴蜀亂擾師旅應接府庫空虚義季躬行節儉蓄財省用數年間還復充實徵為都督南兖兖徐青冀幽六州諸軍事南兖州刺史登舟之日帷帳器服諸應隨刺史者悉留之荆楚以為美談建平王景素文帝孫也性甚儉素為荆州時州有髙齋刻楹栢構景素竟不處朝廷頗賜以甲第辭而不當兩宫所遺珍玩塵於笥篋食常不過一肉器用瓦素時有獻鏤玉器景素顧主簿何昌㝢曰我持此安所用哉乃謝而反之南齊始興王鑑髙帝子也為益州刺史於州園地得古冢無復棺但有古槨銅器十餘種并古形玉璧三枚珍寳甚多不可皆識金銀為蚕蛇形者數十計又以朱砂為阜水銀為沼左右咸勸取鑑曰皇太子昔在雍有發古冡者得玉鏡玉屏風玉匣之屬皆將還都吾意常不同乃遣功曹何佇為之起墳諸寳物一不得犯性甚清在蜀積年未嘗有所營造資用一歳不滿三萬王儉嘗歎云始興王雖尊貴而行履都是素士梁鄱陽王恢太祖子也時有進筒中布者恢以竒貨異服即命焚之南康簡王績髙祖子也寡玩好少嗜慾居無僕妾躬事約儉所有租税悉寄天府及薨後府有南康國無召錢數千萬長沙王懿子藻為益州刺史初鄧元起之在蜀也崇於聚歛財貨山積金玉珍帛為一室名為内藏綺縠錦羅為一室號曰外府藻以外府賜將帥内藏歸王府不有私焉及還朝輕装就路始興王憺子曄常乗折角牛榖木履被服比於儒者名盛海内為宗室推重後魏任城王曇景穆子也亷謹白脩及薨令薄塟廣陵王衍景穆孫也衍性清慎所在亷潔又不營産業亡日無歛屍具京兆王曽孫琮為太尉錄尚書事性清儉不營産業身化之日家無餘財彭城王勰獻文子也清正儉素門無私謁北齊彭城景思王浟髙祖子也自定州刺史徴為侍中人吏送别悲號有老翁數百人相率具饌曰自殿下至來五載人不識吏吏不欺人百姓有識已來始逄今化殿下唯飲此鄉水未食此鄉食聊獻䟽薄浟重其意為食一口蘭陵王長恭一名孝瓘文襄第四子也芒山之㨗武成賞其功命賈䕶為買妾二十人惟受其一有千金責劵臨死日盡燔之後周代奰王達文帝子也雅好節儉食無兼膳侍姬不過數人皆衣綈衣又不營資産國無儲積左右嘗以為言逹從容應之曰君子憂道不憂貧何煩如此隋蔡王智積髙祖弟􅀢之子也初為開府時延侍讀府佐於座所設唯餅果酒纔三酌家有妓女唯年節嘉慶奏於太妃之前其簡如此唐鄭王元懿曽孫勉為太子太師率性素淡清亷簡易為宗臣之表二子纉的皆亷介有莭頴王璬𤣥宗第十三子也為蜀郡大都督璬性儉率將渡綿州江登舟見以綵緣蓆為藉者顧曰此可以為寢處柰何踐之命撤去之嗣吴王巘建中貞元間為道䖍滁等州刺史入拜宗正卿厯官清白居處衣服不免風雨寒暑及卒家無升儲公卿以下率斂以賻㐫晉韓王䠤為曹州防禦使亷愛恤下不營財利不好妓樂部人安之抑損古者建國之制名山大澤不以封周室列爵惟五分土為三使上下相維其疆易制也漢興之初海内甫定監姒周夾輔之效徴亡秦孤立之失而子弟寡少並建不足大封同姓以鎮天下或跨州兼郡連城數十然而矯枉之道亦云過矣是以有莫大之患逆辭之萌小者驕佚越法大者倔强放命觸罪絶國勢使之然故賈誼之論晁錯之議主父之䇿咸以救一時之弊自是之後寖以㣲弱當塗而下或以䟽逺降其爵或以法制損其勢而强弱之道始終可䆒得失之理於是存焉漢髙祖時諸侯皆賦國所出有皆入于王也得自除内史以下漢獨為置丞相黄金印諸侯自除御史廷尉正博士擬於天子自吴楚反後五宗主世漢為置二千石去丞相曰相銀印諸侯獨得食租税奪之權其後諸侯貧者或乗牛車也武帝時主父偃説帝曰古者諸侯地不過百里彊弱之形易制今諸侯或連城數十地方千里緩則驕奢易為滛亂急則阻其疆而合從以逆京師今以法制割削則逆節萌起萌謂事之所生如草木之萌牙也前日晁錯是也今諸侯子弟或十數而適嗣代立餘雖骨肉無尺地之封則仁孝之道不宣願陛下令諸侯得推恩分子弟以地侯之彼人人喜得所願上以徳施實分其國必稍自銷弱矣於是帝從其計令諸侯以私恩自裂地分其子弟而漢為定制封號輙别屬漢郡漢有厚恩而諸侯地稍自分折弱初文帝末賈生之議分齊趙景帝用晁錯之計削吴椘帝施主父之䇿下推恩之令使諸侯王得分戸邑以封子弟不行黜陟而藩國自折自比以來齊為七謂齊城陽濟北濟南淄川膠西膠東也趙分為六謂趙平原真定中山廣川河間也梁分為五謂梁濟川濟東山陽濟隂也淮南分為三謂淮南衡山盧江皇子始立者大國不過十餘城長沙燕代雖有舊名皆亡南北邊矣長沙之南更置郡燕代以北更置緣邊郡其所有饒利兵馬器械二國皆失之也景帝遭七國之變抑損諸侯减黜其官謂改丞相曰相省御史大夫廷尉少府宗正博士官大夫謁者郎諸官長丞等也武有衡山淮南之謀作左官之律人道上今右舍天子而仕諸侯故謂之左官也左官猶言左道也皆僻左不正也漢時依上古法朝政之列以右為尊故謂降秩為左遷仕諸侯為官也諸侯惟得衣食税租不與政事衡山王賜所為不法有司請逮治武帝不許為置吏二百石以上漢儀注吏四百石已下自除國中今以王之惡天子皆為置後漢光武建武十三年二月詔曰長沙王興真定王得河間王邵中山王茂皆襲爵為王不應經義以其服屬既䟽不常襲爵為王其以興為臨湘侯臨湘縣今潭州長沙縣得為真定侯邵為樂成侯樂成縣故城今在瀛州樂府縣西北茂為單父侯今宋州縣其宗室及絶國封侯者凡一百三十七人丁巳降趙王良為趙公太原王章為齊公魯王興為魯公一云建武十五年大將軍朱佑朝京師奏古者人臣受封不加王爵可改諸侯為公帝即施行魏文帝黄初五年詔曰先王建國隨時而制漢祖増秦所置郡至光武以天下損耗并省郡縣以今比之益不及焉其改封侯王皆為縣王時法制待藩國既峻迫寮屬皆賈竪不才兵人給其殘老大數不過二百人陳思王植初封東阿王時大發士息及取諸國士植以近前諸國士息已見發其遺孤稚弱在者無幾而復被取乃上書曰臣聞古者聖君與日月齊其明四時等其信是以戮㐫無重賞善無輕怒若驚霆喜若時雨恩不中絶教無二可以此臨朝則臣下知所死矣受任在萬里之外審主之所以受官必已之所以授命雖有構㑹之徒泊然不以為懼者葢君臣相信之明效也昔章子為齊將人有告之反者威王曰不然左右曰王何以明之王曰聞章子改葬死母彼尚不欺死父顧當叛生君乎此君之信臣也昔管仲親射桓公後幽囚從魯檻車載使少年挽而送齊管仲知桓公之必用已懼魯之悔謂少年曰吾為汝唱汝為和聲和聲宜走於是管仲唱之少年走而和之日行數百里宿昔而至至則相齊此臣之信君也臣初受封䇿書曰植受茲青社封于東土以屏翰皇家為魏藩輔而所得兵百五十人皆年在耳順或不踰矩虎賁官騎及親事凡二百餘人正復不老皆使年壯備有不虞檢校乗城顧不足以自救况皆復耄耋罷曳乎而名為魏東藩使屏翰王室臣竊自羞矣就之諸國國有士子合不過五百人伏以為三軍益損不復頼此方外不定必當須辦者臣願將部曲倍道奔赴夫妻負襁子弟懐糧蹈鋒履刃以狥國難何但習業小兒哉愚誠以揮涕增河鼷䑕飲海於朝萬無損益於臣家計甚有廢損又臣士息前後三送兼人已竭惟尚有小児七八歳已上十六七已還三十餘人今部曲皆年耆臥在床蓆非糜不食眼不能視氣息裁屬凡三十七人疲瘵風靡疣盲聾瞶者二十三人惟正湏此小児大者可備宿衛雖不足以禦㓂粗可以警小盗小者未堪大使為可使耘鉏穢草驅䕶鳥雀休候人則一事廢一日獵則衆業散不親自經營則功不攝常自躬親不委下吏而已陛下聖仁恩詔三至士子給國長不復發明詔之下有若皎日保金石之恩必明神之信畫然自固如天如地定習業者並復見送晻若晝晦悵然失圖伏以為陛下既爵臣百寮之右居藩國之任為置卿士屋名為宫冢名為陵不使其危居獨立無異於凡庻若柏成欣於野畊子仲樂於灌園蓬户茅牖原憲之宅也陋巷簞瓢顔子之居也臣才不見効用常慨然執斯志焉若陛下聽臣悉還部曲罷官屬省監官使解璽釋綬追柏成子仲之業營顔淵原憲之事居子臧之廬宅延陵之室如此雖進無成功退有可守身死之日猶松喬也然伏度國朝終未肯聽臣之若是固當覊絆於世繩維繫於祿位懐屑屑之小憂執無已之百念安得蕩然肆志逍遙於宇宙之外此願未從陛下必欲崇親親篤骨肉潤白骨而榮枮木者惟遂仁徳以副前恩詔皆遂還之宋孝武以南郡王義宣亂逆繇於强盛欲削王侯江夏王義恭希㫖請省錄尚書上從之又與驃騎大將軍竟陵王誕奏陳貶損之格九條中外詳議於是有司奏九條之格猶有未盡更加附益凡二十四條大抵㕔事不得南向坐施帳并藩國官正冬不得跣登國殿公主王妃傳令不得朱服轝不得重棡鄣扇不得雉尾劍不得鹿盧形槊眊不得孔雀白氅夾轂隊不得絳襖平乘誕馬不得過二疋胡伎不得綵衣舞伎正冬著袿衣不得装面諸妃子不得着緄帶信幡非䑓省官悉用絳郡縣内史相及封内官長於其封君罷官則不復追敬不合稱臣諸鎮常行車前後不得過六隊刀不得銀銅餙諸王女封縣主諸王子孫襲封之王妃及封侯者夫人行並不得鹵簿諸王子繼體為王者婚塟吉凶悉依諸國公侯之禮不得同皇弟皇子船頭作露平形不得擬象龍舟詔可後魏孝文太和六年春正月乙丑制諸逺屬非太祖子孫及異姓為王皆降為公公為侯侯為伯子男仍舊皆除將軍之號唐髙祖受禪以天下未定廣封宗室以威天下皇從弟及姪年始孩童者數十人皆封為郡王太宗即位因舉宗正屬籍問侍臣曰遍封宗子於天下便乎尚書右僕射封徳彛對曰厯觀往古封王者今最為多両漢已降唯封帝子及親兄弟若宗室䟽逺者非有大功如周之郇滕漢之賈澤並不得濫封所以别親踈也先朝敦睦九族一切封王爵命既降多給力役葢以天下為私殊非至公馭物之道太宗曰朕理天下本為百姓非欲勞百姓以飬已之親也於是宗室率以屬䟽降為郡公唯有功者數十人封王後唐末帝清㤗元年皇子河南尹重美表前夀安令賈譚添民户希别授官中書門下奏親王無薦土例帝曰有例亦不可况無例平好尚禮曰天命之謂性語曰性相近也習相逺也則知性有智愚習有善惡乃有荷茅土脤膰之寄居藩屏夾輔之尊純懿内融清明外發冲虚自守味老氏之𤣥言空寂為心洞金仙之妙理嗜偏伍之向背窮韜略之幽微或求訪圖書或繕完器玩搜竒採異適意㤀勞雖趨向不同同歸於善乃流濕就燥之義豈好丹非素之僻也漢陽城侯徳少脩黄老術常持老子知足之計廣川王去景帝孫也其殿門有成慶畫短衣大袴長劔成慶荆軻也衛又謂之慶卿燕人謂之荆卿又成慶古之勇士事見淮南子去好之作七尺五寸劍被服皆效焉後漢楚王英喜黄老學為浮屠齋戒祭祀宋臨川王義慶受任厯藩無浮淫之過唯晩節奉養沙門頗致費損南齊竟陵王子良為㑹稽太守郡閣下有虞飜舊床罷任還乃致以歸後於西邸起古齋多聚古人器服以充之子良好釋氏敬信尤篤數於邸園營齋戒大集朝臣衆僧至賦食行水或躬親其事又招致名僧講語佛法造經唄新聲道俗之盛江左未有也衡陽王鈞居身清率言未及時㑹稽孔珪家起園列植桐栁多搆山泉殆窮精趣鈞徃遊之珪曰殿下處朱門遊紫闥詎得山人交邪答曰身處朱門而情遊江海形入紫闥而意在青雲珪大美之吴郡張融清抗絶俗雖王公貴人視之傲如也唯雅重鈞謂從兄緒曰衡陽王飄飄有凌雲氣其風雲素韻彌足可懐融與之遊不知老之將至見賞如此梁南平王偉文帝子齊世清溪宫改為芳林苑天監初賜偉為第偉又加穿築果木珍竒窮極雕麗有侔造化立遊客省寒暑得宜冬有籠爐夏設飲扇每與賔客遊其中命從事中郎蕭子範為之記梁藩邸之盛無過焉偉晩年崇信佛理尤精𤣥學著二㫖義别為新通又製情性幾神等論義僧寵及周捨殷釣陸倕並名精觧而不能屈長沙嗣王業性敦篤所在留惠深信因果篤誠佛法髙祖每嘉歎之後魏京兆王愉崇信佛道用度常至不接京兆王太興嘗遇患請諸沙門行道所有資財一時布施乞求病愈名曰散生齋及齋後僧皆四散有一沙門言云乞齋餘食太興戯之曰齋食既盡唯有酒肉沙門曰亦能食之因出酒一斗羊脚一隻食盡猶言不飽及辭出後酒肉俱在出門追之無所見太興遂佛前乞願向者之師當非俗人若此病得差即捨王爵入道未㡬便愈遂請為沙門表十餘上乃見許時孝文南討左軍詔皇太子於四月八日為之下髪施帛二千疋既為沙門更名僧懿居嵩山後周長樂侯深年數嵗便累石為營折草作旌旗布置行伍皆有軍陣之勢及長好讀兵書隋秦王俊仁恕慈愛崇敬佛道請為沙門不許唐韓王元嘉少好學聚書至萬卷又捜採碑文古跡得異本舒王元名為石州刺史二十年性髙潔賞玩林泉有塵外之意岐王範多聚書畫古跡為時所重册府元龜卷二百九十三
