body:
  text: 冊府元龜卷五百八十八宋王欽若等撰掌禮部奏議第十六唐韋凑為太府少卿睿宗景雲元年十月太子重俊諡曰節愍凑上疏曰臣竊見故太子重俊擁北軍禁旅上犯宸居破扉斬闗突禁而入騎騰紫㣲兵指黄屋孝和移御𤣥武門以避其銳親降德音以諭順逆而太子據鞍自若督衆不停俄而其黨悔非轉逆為順或廻兵討賊或投狀自拘多祚伏誅太子逃竄向使同惡其濟以成不道其為禍也胡可忍言及孝和引見羣臣兩淚交集曰幾不共卿等相見其為危懼不亦甚乎臣每思之不勝憤毒今聖明雪罪禮𦵏諡為節愍臣切惑焉昔漢成帝之為太子行不絶馳道周之衰㣲也秦師過周左右免胄而王孫滿猶以其不卷甲譏其無禮必敗由是言之太子稱兵宫内跨馬御前其為悖逆不亦甚乎以其斬武三思父子而嘉之乎弄兵討逆以安君父可也當觧甲於朝以請罪而乃因欲危君父是競為逆也以其廢韋氏而嘉之乎韋氏逆己彰義絶可也而當時韋氏逆節未彰韋則母也太子子也豈有廢母之理乎又非中宗之命而廢之是刼父廢母也夫君或不君臣安可不臣父或不父子安可不子借君父有桀紂之行臣子無廢殺之理昔獻公惑驪姬之譖將殺太子申生公子重耳曰子盍行乎申生曰不可天下豈有無父之國吾何行如之申生受賜而死再拜自縊其行如此僅諡曰恭今則反是可諡節愍乎漢武末年江充為巫蠱䧟太子遂矯節斬充因而逃匿非稱兵詣闕無逆謀於父然身死於湖不𦵏無諡至宣帝時方獲禮𦵏而猶諡曰戾今節愍之行豈可比之乎又陛下之猶子也而可諡為節愍臣願得與諡者議於御前若臣言為非甘趨鼎鑊也書奏不納後為將作大匠開元六年别造義宗廟凑上疏曰臣聞王者制禮是曰規模規模之興實資師古師古之道必也正名惟名與實故當相副其在宗廟禮之大者豈可失哉禮祖有功而宗有德祖宗之廟百代不毁故殷太甲曰太宗太戊曰中宗武丁曰髙宗於周宗文王武王漢則文帝為太宗武帝為世宗其後代有稱宗皆以方制海内德澤可宗列於昭穆期於不毁稱宗之義不亦大乎况孝敬皇帝位正東宫未嘗南靣聖道誠冠於儲副德敎不被於寰瀛立廟稱宗恐非合禮况别起寢廟不入昭穆稽諸祀典何義稱宗而廟號義宗稱之萬代以臣庸識且謂不可望更令有司詳議務合於禮於是太常請以本諡孝敬為廟稱從之源乾曜為諌議大夫景雲二年二月上疏曰夫聖王理天下也制人情人情正則孝於家忠於國此道不替無不理也故君子三年不為禮禮必壊三年不為樂樂必隳是以古人擇士先觀射以明和容之義非取樂一時夫射者别正邪觀德行中祭祀辟冦戎古先哲王莫不逓襲臣竊見數年以來射禮便廢或緣所司惜費遂令大射有虧臣愚以為所費者財所全者禮故孔子云爾愛其羊我愛其禮今乾坤再闢日月貞明望大射之儀春秋不廢聖人之敎今古常行天下幸甚劉子𤣥為太子左庻子景雲二年八月皇太子將釋奠於國學有司草儀注令從臣皆乗馬著衣冠子𤣥進議曰古者自大夫已上皆乗車而以馬為騑服魏晉以來迄於隋氏朝士又駕牛車厯代經史具有其事不可一一言也且如李廣北征觧鞍憇息馬援南伐據鞍矍鑠斯則鞍馬之役行於軍旅戎服所乗貴於便習者也按江左官至尚書郎輒輕乗馬則為御史所彈又顔延之罷官後好騎馬出入閭里當代稱其放誕此則專車憑軾可襲朝衣單馬御鞍宜從䙝服求之近古灼然之明驗也自皇家撫運沿革隨時至如陵廟廵謁王公冊命則盛服冠履乗彼輅車其士庻有衣冠親迎者有服箱充馭者在他事無復乗車貴賤所行通用鞍馬而已臣伏見比者鑾輿出幸法駕首塗左右侍臣皆以朝服乗馬夫冠履而出可配車而行今乗車旣停而冠履不易可謂唯知其一而未知其二也何者褎衣博帶革履高冠本非馬上所施自是車中之服必襪而昇鐙跣以乗鞍非唯不師古道亦自驚於今俗求之折中進退無可且長裾廣袖襜如翼如鳴佩紆組鏘鏘奕奕馳驟於風塵之内出入於旌棨之間儻馬有驚逸人從顛墜遂使屬軍之左遺履不收清道之旁絓驂相續固以受嗤行路有損威儀今議者皆以秘閣有梁武帝南郊圖多有衣冠乗馬者此則近代故事不得謂無其文臣按此圖是後人所為非當時所撰且觀有古今圖畵者多矣如張僧繇畵羣公祖二疎而兵士有著芒履者閻立本畵昭君入匈奴而婦人有著帷帽者夫芒履出於山鄉非京華所有帷帽創於隋氏非漢官所作議者豈可徵此二畵以為故實者乎由斯而言則梁武南郊之圖義同於此又傳稱因俗禮貴緣情殷輅周冕規模不一秦冠漢佩用捨無常况我國家道冠百王功高萬古事有不便理資變通其乗馬衣冠宜從省廢臣懐此議其來自乆日不暇給未及㩁揚今屬殿下親從齒胄將臨國學所以輙進狂言用申鄙見皇太子令付外宣行仍編入令以為常式賈曽為諌議大夫太極元年正月辛巳親祀南郊初有事於南郊有司立議祭昊天上帝而不設皇地祗位曽上表曰微臣詳據典禮謂宜天地合祭謹按禮祭法曰有虞氏禘黄帝而郊嚳夏后氏禘黄帝而郊鯀傳曰大祭曰禘然則郊之與廟俱有禘祭禘廟則祖宗之主俱合於太祖之廟禘郊則地祗羣望俱合於圓丘以始祖配享皆有事而大祭異於常祀之義大傳曰不王不禘故知王者受命必行禘禮虞書曰月正元日舜格于文祖肆類于上帝禋于六宗望秩于山川徧于羣神此則受命而行禘禮者也言格于文祖則餘廟之享可知矣言類于上帝則地祗之合可知矣且山川之祀皆屬於地羣望尚徧况地祗乎周官以六律六吕五聲八音六舞大合樂以致神祗以和邦國以諧萬人又云凡六變而致象物及天神此則禘郊合天神地祗人鬼而祭之樂也三輔故事漢祭圓丘儀上帝位正南靣后土位亦南面而少東又東觀漢記云光武卽位為壇於鄗之陽祭告天地採用元始故事二年正月於雒陽城南依鄗為圓壇天地位其上皆南靣西上按兩漢時自有后土北郊祀而此云於圓丘明是禘祭之儀又春秋說云王者一歲七祭天地合食於四孟别於分至此復天地自常有同祭之儀王肅云孔子言兆圓丘於南郊郊即圓丘圓丘即郊又云祭天而地配此亦郊祀合祭之明說唯鄭康成不論禘當合祭而分昊天上帝為二神專憑緯文事匪經見又其注大傳禮不王不禘義則云正歲之首祭感帝之精以其祖配注周官大司樂圓丘義則引大傳之禘以為冬至之祭逓相矛楯未足可依伏惟陛下膺籙居尊繼文在厯自臨宸極未親郊祭今之南郊正當禘禮固宜合祀天地咸秩百神答受命之符彰致敬之道豈可同彼常郊使地祗無位未從禘享今請備設皇地祗并從祀等座則禮遵稽古義合緣情然郊丘之祀國之大事或失其儀精禋將闕臣術不通經識慙博古徒以昔謬禮職今忝諌曹正議是司敢不陳上儻事有可采惟斷之聖慮制令宰相召禮官詳議可否禮官國子祭酒褚无量國子司業郭山惲等咸請依曾所奏姜皎為太常卿𤣥宗開元四年七月戊子勅宜令禮官上七廟昭穆議皎及禮官奏議曰禮天子三昭三穆與太祖為七昭穆迭毁而太祖常在聖人之典也若禮名不正則奠獻無序矣太常博士陳貞節蘇獻等奏議曰謹按孝和皇帝在廟七室已滿今睿宗大聖真皇帝是孝和之弟甫及仲冬禮當遷祔但弟兄入廟古則有焉逓遷之禮昭穆須正謹按禮論太常賀循議云禮兄弟不相為後也故殷之盤庚不序於陽甲而上繼於先君漢之光武不嗣於孝成而上承於元帝又曰晉惠帝無後懐帝承統懐帝自繼於世祖而不繼於惠帝當同陽甲孝成别出為廟又曰若兄弟相代則共是一代昭穆位同至其當遷不可兼毁二廟此盖禮之常例也荀卿子曰有天下者事七代謂從彌已上也尊者統廣故思及逺祖若傍容兄弟上毁祖考此則天子有不得全事於七代之義也孝和皇帝有中興之功而無後嗣請同殷之陽甲漢之成帝出為别廟時祭不及大祫之辰合食太祖奉睿宗神主升祔太廟上繼高宗則昭穆永貞獻裸常序制從之初令以儀坤廟為中宗廟尋又改造中宗廟於太廟之西貞節等又以肅明皇帝不合與昭成皇后配祔睿宗奏議曰禮宗廟父昭子穆皆有配坐每室一帝一后禮之正儀自夏殷而來無易兹典伏惟昭成皇后有太姒之德已配食於睿宗則肅明皇后無啟母之尊自應别立一廟謹按周禮云奏夷則歌小吕以享先妣者姜嫄是帝嚳之妃后稷之母特為立廟名曰閟宫又禮云晉伏系之議云晉簡文鄭宣后旣不配食乃築宫于外歲時就廟享祭今肅明皇帝無祔配之位請同姜宣后别廟而處四時享祭如舊儀制從之於是遷昭成皇后神主祔於睿宗之室唯留肅明神主於儀坤廟是年十二月皎復與禮官上奏曰臣聞敬宗尊祖享德崇恩必也正名用光時憲禮也伏見太廟中則天皇后配高宗天皇大帝題云天后聖帝武氏伏尋昔居寵秩親承顧託因攝大政事乃從權神龍之初已去帝號岑羲等不閑政體復題帝名若使帝號長存恐非聖朝通典夫七廟者高祖神堯皇帝之廟也父昭子穆祖德宗功非夫帝子天孫乗乾出震者不得升祔於斯矣但皇后祔廟配食高宗位號舊章無宜稱帝今山陵日近漢祔非遥請行陳告之儀因除聖帝之字云則天皇后武氏詔從之陳貞節為太常博士開元五年十月伊闕人孫平子上封事曰臣聞昔者帝王之為國也行其禮則皇圖昌廢其禮則宗社危臣竊見今年正月太廟毁此乃躋聖賢所致也夫宗廟國之大事陛下當今聖主臣不敢曲意巧言而陳之謹按經傳具陳引休咎特望天恩少察臣言則可晏然無慮也故臣不避誅以言之伏惟陛下俯垂許擇臣按左傳云君薨卒哭而祔祔而作主特祀于主烝嘗禘於廟今日有違於此也昔魯文公二年宗伯弗忌躋僖公于閔公上後致太室壊春秋異而書之今日有同於彼也君子以弗忌為失禮仲尼曰臧文仲不仁者三縱逆祀一也又按五行志書僖公雖閔公之兄嘗為閔公臣臣居君上為失禮也故太室壊且兄臣於弟猶不可躋之弟上况弟臣於兄豈可躋弟於兄上耶昔莊公三十三年薨閔公二年吉禘自薨至禘向有二年春秋猶非其失禮况夏䘮冬禘其不亦太速乎且太廟中央曰太室尊高也魯自是陵夷將墮周公之祀臣昧死據此斷之卽太廟毁亦今日將欲陵夷之象墮先帝之祀也斯亦上天祐我唐國乃降此災以陛下去年禘孝和於别室吉祭於太廟未祭孝和先祭太上皇此乃與僖閔事同先臣後君也昔躋兄弟上今弟先兄祭過有甚於古也昔登臣君上今亦如之事豈不同耶昔太室屋壊今聖朝太廟毁變豈不同耶若以兄弟同昭則不合出致别廟若以臣子之例則孝和合進為昭昔武氏簒國十五餘年孝和挺劒龍飛再興唐祚反正朔服色咸依貞觀故事此卽有功於天下也今禘於别殿是廢先聖之訓棄中興之功下君上臣輕長重幼若以孝和無道則位不合稱帝墳不得稱陵傳曰子雖齊聖不先父食乆矣杜氏曰臣繼君猶子繼父也昔禹不先鯀湯不先契文武不先不窋故宋鄭不以帝乙厲王不肖而猶尊尚之况孝和有大功乎魯頌曰春秋匪懈享祀不忒皇皇后帝皇祖后稷詩曰問我諸姑遂及伯姊禮為其後伯姊而先諸姑者何也尊其先也弗忌欲阿時君先其所親亂國大事故傳特引二詩深責其意方今太廟毁雖臣阿曲之過恐危陛下之國也昔晉太康五年宣帝廟地䧟梁折八年正月太廟殿䧟改作殿宇更營新廟逺致名材雜以銅柱自八年九月造至十年四月乃成十一月又梁折毁壊據此言之天降災譴非枯朽也晉不知過天下分離王室大亂英雄競起夷狄滿國特望天恩少垂詳察臣知言必就誅夷而昧死言之者以陛下聖明寛容博物納諌而此事恐史筆書之令來代君子以巍巍聖代野無博識朝無忠直臣將何以彰陛下招諌伏請速召宰相已下御史已上衆共謀議移孝和入廟何必苦違禮典以同魯晉哉陛下前降明制令所司到朝堂進封極言時政得失又舉方正顧問又徵賢山野而寂無人言非朝不招諌時惡直言竊為儒生不達大體也特請陛下於其書傳親加省覽以聖慮斷之頃秋夏之間淫雨彌旬傷稼敗邑漢書五行志云簡宗廟不禱祀逆天時則致災也臣又見兩畿户口逃去者半常侍觧宛招擕不還李傑奏請訪括不得臣能使之如鷹有縚若馬有絆夫鳥飛於空魚沉於泉鹿走於野猿猱騰於山猶尚取而馴之屠而食之况於人不能飛沉乎伏望天恩許臣面奏亦為宗廟未安不敢即言仰恃鴻恩之厚不懼雷霆之威昧死連封伏深戰越詔下禮官議貞節與太常博士馮宗蘇獻等議曰王制天子七廟三昭三穆并太祖而七昭穆者父子之位則知七代之廟無兄弟之義矣殷繼成湯至于帝乙父子兄弟十有二君其正代止六而已易乾鑿度曰殷之帝乙六代王也此即兄弟不數為代之明據也又殷人六廟親廟四並湯而六殷兄弟四人相次為君若以為代使當上毁四室如此則無復祖禰之祭矣古之廟位自禰已上極於太祖雖數謚迭毁隨而上遷三昭穆未嘗有闕也又禮大宗無子則立支子又曰為人後者為之子無兄弟相為後之文所以捨至親取遠屬蓋以兄弟一體無父子之道故父子曰繼兄弟曰及禮兄弟不相入廟者假如兄弟代立孫姪承統告享之日不得稱嗣孫則當上列云伯考伯祖下繫云姪孫此乃可成七廟之位號可成繼統之義序焉斯又不可之甚者也後漢論次昭穆定所繼之統以為盤庚不序陽甲之廟而上繼先君光武不入成帝之廟而繼元帝以弟不可繼兄故也又殷十二代唯三祖三宗明兄弟相及自别立廟不必繼之七代也後漢祖列敘七廟而惠帝不入其數豈非文帝之嫡兄乎及文帝代立子孫克昌為漢之太宗晉景亦晉文之兄緣景帝絶嗣不列七廟之數何以知之據永興元年告謚代祖稱景帝為從祖也若以晉武越次尊崇其父而致廟壊遂及亂亡何因漢氏遷出恵帝宗尊文帝而享代二十有四厯年四百三十殷廟何嘗見隳漢廟未始經折殷漢之盛委而不言魯晉之災引以為喻是以春秋書太室壊者乃垂明誡何必閔僖晉太廟所以毁折者天誅奢麗不以遷廟然天子七廟諸侯五廟辯貴賤之差也父子相繼億萬人之心也昭穆列序重繼統之義也今孝和皇帝若與聖眞皇帝相亞在廟正成六代何以辯貴賤乎裔嗣絶滅何以宗後代乎昭穆失序何以成繼統之義乎况國家遠遵殷之陽甲近法漢之成帝時以孝和實中興之明主開百代不毁之廟别立園寢永以寧神歲時蒸嘗與國終始有何不可乎又孝和在則天末年自身處儲嗣昌宗小豎素宣威權惡盈稔貫衆所共棄南衙則宰相歸奉北門則將軍嚮從推崇嗣君誰曰不可豈若韋氏悖逆干紀亂常總軍國之權操生殺之柄旣行不軌欲振凶威將誅懿親以絶人望睿宗大聖眞皇帝枕戈代邸泣血待晨志切仇讐義殷家國沈謀内斷委䇿聖明開元成武皇帝仰禀成規俯懐秘畧挺身奮臂突入北軍不及終宵一戎定保致君親於堯舜拯社稷於阽危自開闢以來未之有也建立聖明之副𢎞宣祖宗之業前史不疑漢文繼統今亦何怪聖眞之代宗乎禮兄弟相繼不稱嗣子而曰及王明當用繼先君不繼兄之絶統也今睿宗雖代孝和而立故當同繼高宗則兩室並存便成二穆求之於禮不可同列於廟必須一室别居開元皇帝光臨區宇主祭宗廟豈容旁繼伯考之絶緒遂棄已親之正統乎乃云太廟壊緣躋聖賢所致引僖公後薨遷居閔公之上稱為逆祀取類當今聖眞皇帝亞室髙宗孝和皇帝時出立廟孝和升新寢之後聖眞方上祔高宗斯則未嘗一日躋居孝和之上引此為證豈非誣罔朝廷耶平子云春秋傳稱君薨卒哭而祔祔而作主特祀于主蒸嘗禘于廟今日有違於此者自山陵甫終九虞卒哭特祀正寢附于太廟四時享祭於禮何虧平子又云子雖齊聖不先父食昔禹不先鯀湯不先契文武不先不窋者自去歲昇祔之後時孝和新廟未有樂懸所以差辰緣闕備物初非永制蓋是權宜修敎若成卽當同日禮曽華省具列事由豈緣尊卑致隔先後借如睿宗一室誠卑孝和不可緣睿宗之卑後六祖之祭重尊之道禮極繼先因親之義情殷旁及平子云今太廟毁由臣下阿曲之過恐危陛下之國昔太康五年宣帝廟地䧟梁折八年正月太廟殿䧟改作新廟築堦及泉遠徵名材雜以銅柱十二年四月乃成十一月又梁折據此言之天䧏災譴非枯朽者也按孔子在齊景公在焉左右曰周使至言先王廟災孔子曰此必釐王廟夫釐王變文武之制而作𤣥黄華麗之飾故天誅其廟焉有頃左右報所災者釐王廟景公曰善哉聖人之智過人也故晉之太廟掘地及泉雜以銅柱綴以珠玉踰先王之制降皇天之罰與釐王之廟異代同誅今國家太廟因隋舊制開皇之祭創造新都移故太極殿是苻堅所造經今將四百年日月滋深朽蠧而毁晉朝則新構梁折豈得非災唐朝則歲久簷摧誠何足怪夫論徵說咎須義正經理茍異於斯便成妖妄平子不識忌諱肆其狂瞽危言高論謗訟朝廷引衰晉之朝比聖明之代惑亂視聽漸不可長平子又云廟雖造畢災尚未除來有何變故然史䇿垂範義實多門妖孽之興理難固必廟簷墜落自有别由天道難知豈得專尤别廟且廟屋雖年深朽壊聖上猶兢懼不已尊儒學於内殿慎刑書於外朝居纎以禮側身脩德同殷湯之罪已等周文之小心縱令熒惑守辰猶能退舍况咎徵不見逆説其災平子又云莊公三十二年薨閔公二年吉禘自薨至禘向有二年春秋猶非其失禮况夏䘮冬禘其可得乎不亦太速乎後又云秋夏間淫雨彌旬傷稼敗邑漢書五行志簡宗廟不禱祀逆天時則致此災也夫水以潤下為體不能潤下者水德微也何繫於淫雨哉斯乃妄引淫雨證成咎徵牽合災祥推於宗廟平子旣前非速於祭禘後嫌簡不禱祀前後立義互相矛盾速稱越禮簡復貽災未詳二途何者為適且祔後時享與禘全殊蒸礿無愆何名為簡虐旱淫雨時運或然堯日湯年安能累德平子言偽而辯禮所不容狀久不决後竟從貞節等議田再思為刑部郎中開元五年右補闕盧履氷上言准禮父在為母一周除靈三年心䘮則天皇后請同父没之服三年然始除靈雖則權行有紊彛典今陛下孝理天下動合禮經請仍舊章庻叶通典於是下制令百官詳議并舅及嫂叔服不依舊禮亦令議定再思建議曰乾尊坤卑天一地二隂陽之位分矣夫婦之道配焉至若死䘮之戚隆殺之等禮經五服之制齊斬有殊考妣三年之䘮貴賤無隔以報免懐之德以酬罔極之恩者也稽之上古䘮期無數曁乎中葉方有歲年禮云五帝殊時不相沿樂三王異代不相襲禮白虎通云質文再而變正朔三而復自周公制禮之後孔父刋經已來爰殊壓䧏之儀以標服紀之節重輕從俗斟酌隨時故知禮不從天而䧏不由地而出也在人消息為之適中耳春秋諸國魯最知禮以周公之後孔子之邦也晉韓起來聘言周禮盡在魯矣齊仲孫來盟言魯猶秉周禮子張問高宗諒隂三年子思不聴其子服出母子游謂同母異父昆弟之服大功子夏謂合從齊衰之制此等并四科之數十哲之人高歩孔門親承師訓及遇䘮事猶此致疑即明自古以來䧏昇不一者三年之制說者紛紜鄭康成以為二十七月王肅以為二十五月又改塟鄭云服緦三月王云訖塟而除又繼母出嫁鄭云皆服王云從子繼育乃為之服又無服之殤鄭云子生一月哭之一日王云以哭之日為易服之月鄭王祖經宗傳各有異同荀摯采古求遺互為損益方知去聖漸遠殘缺彌多也故曰㑹禮之家名為聚訟寧有定哉為父在為母三年行之已踰四紀出自高宗大帝之代不從則天皇后之朝大帝御極之辰中宫獻書之日徃時叅議謂可施行編之於格服之已久前王所是䟽而為律後主所是著而為令何必乖先帝之㫖阻人子之情虧仁孝之心背德義之本有何妨於聖化有何紊於彛倫而欲服之周年與伯叔母齊焉與姑姊妹同焉夫三年之䘮如白駒之過隙君子䘮親有終身之憂何况再周乎夫禮者體也履也示之以迹孝者畜也養也因之以心小人不耻不仁不畏不義服之有制使愚人企及衣之以衰使見之摧痛以此防人人猶有朝死夕忘者以此制人人猶有釋服從吉者方今漸歸淳朴須敦孝義抑賢引愚理資寧戚食稻衣錦所不忍聞若以庻事朝議一依周禮則古之人臣見君也公卿大夫贄羔鴈珪璧今何故不依乎周之用刑也墨劓宫刖今何故不行乎周則不五十不仕七十不朝今何故不依乎周則井邑丘甸以立征稅今何故不行乎周則分任五等父死子及今何故不行乎周則冠冕衣裘乗車而戰今何故不行乎周則三老五更膠庠養老今何故不行乎諸如此例不可勝述何獨孝思之事愛一年之服於其母乎可為痛心可為慟哭者詩云哀哀父母生我劬勞禮記云父之親子也親賢而下無能母之親子也賢則親之無能則憐之阮嗣宗晉代之英才方外之高士以為母重於父據齊斬升數麤細已降何忍服之節制減至於周豈後代之士盡慙於古循古未必是依今未必非也又同㸑服緦禮經明義嫂叔遠别同諸路人引而進之觸類而長猶子咸衣苴枲季父不服緦麻推遠之情有餘睦親之義未足又母之昆弟情切渭陽翟滂訟舅之寃寗氏宅甥之相我之出也義亦設焉不同從母之尊遂䧏小功之服依諸古禮有爽俗情今貶舅而崇姨是陋今而榮古此並太宗之制也行之百年矣輙為刋復實用有疑於是紛議不定履氷又上疏曰禮父在為母十一月而練十三月而祥十五月而􅎭心䘮三年上元中則天皇后上表請同父没之服亦未有行用垂拱年中始編入格易代之後俗乃通行臣開元五年頻請仍舊恩勅并嫂叔舅姨之服亦付所司詳議諸司所議同異相叅所司唯執齊斬之文又云亦合典禮竊見新修之格猶依垂拱之偽致有祖父母尚在子孫之妻亡没下房筵几亦立再周甚無謂也據易家人卦云利女貞女正位乎内男正位乎外男女正天地之大義家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦家道正而天下正矣禮女在室以父為天出嫁以夫為天乂在家從父出嫁從夫夫死從子本無自專抗尊之法即喪服四制云天無二日土無二王國無二君家無二尊以理之也所以父在為母服周者避二尊也伏惟陛下正持家國孝理天下而不斷在宸衷詳正此禮隨末俗之願念兒女之情臣恐後代復有婦奪夫政之敗者疏奏未報履氷又上表奏曰臣聞夫婦之道人倫之始尊卑法於天地動静合於隂陽隂陽和而天地生成夫婦正而人倫有序自家刑國牝雞無晨四徳之禮不愆三從之義斯在卽䘮服四制云天無二日土無二王國無二君家無二尊以理之也故父在為母服周者見無二尊也准舊儀父在為母一周立靈再周心䘮父必三年而後娶者達子之志焉豈先聖無情於所生固有意於家國者矣原夫上元肇年則天已濳秉政將圖僭簒預自崇先請升慈愛之䘮以抗尊嚴之禮雖齊斬之儀不改而几筵之制遂同數年之間尚未通用天皇晏駕中宗蒙塵垂拱之末果行聖母之偽符載初之元遂啟易代之深釁孝和雖名反正韋氏復效晨鳴孝和非意而終韋氏旋卽稱制不䝉陛下英筭宗廟何由克復易云臣弑其君子弑其父非一朝一夕之故其斯之謂也臣謹尋禮意防杜實深若不早圖刋正何以垂戒於後所以薄言禮教請依舊章恩勅通明蒙付所司詳議且臣所獻者蓋請正夫婦之綱豈忘子母之道諸議持久不討其本源所非議者大凡只論罔極之恩䘮也寧戚禽獸識母而不識父秦燔書後禮經殘缺後儒纉集不足可慿豈得與伯叔母同服豈得與姑姊妹等制三王不相襲禮五帝不相沿樂齊斬足為升降歲年何忍不同此並道聴途說之言未習先王之㫖又安足以議經邦理俗之禮乎臣請據經義以明之所云罔極之恩者春秋祭祀以時思之君子有終身之憂霜露之感豈止二周之服已哉聖人恐有朝死而夕忘曾鳥獸之不若為立中制使賢不肖共成文理而後釋之䘮也寧戚者孔子答林放之問至如太奢太儉太易太戚皆非禮中茍不得中名為俱失不如太儉太戚焉毁而滅性猶愈於朝死夕忘焉此論臨䘮哀毁之容豈比於同宗異姓之服所云禽獸識母而不識父者禽獸羣居聚麀而無家國之禮少雖知親愛其母長而不觧尊嚴其父引此為喻則亦禽獸之不若乎所云秦書燔後禮經殘缺後儒纉集不足可慿者人間或有遺逸豈亦家到户至而燔之假若盡燔茍不可信則墳典都謬庠序徒存非聖之談復云安屬所云與伯叔姑姊妹服同者伯叔姑姊妹豈有筵杖之制三年心喪乎所云五帝不相沿樂三王不相襲禮者誠哉是言此是則天懐私苞禍之情豈可復沿襲乎所云齊斬足為升䧏者母齊父斬不易之禮按三年問云將由修飾之君子與三年之䘮若駟之過隙遂之則是無窮也然則何以周也曰至親以周斷是何也曰天地則已易矣四時則已變矣其在天地之中者莫不更始焉以是象之也然則何以三年曰加重焉爾故父加至再周父在為母加三年心䘮今者還同父没之制則尊厭之律安施䘮服四制又云凡禮之大體體天地法四時則隂陽順人情故謂之禮訾之者是不知禮之所由生非徒不識禮之所由制恐未達孝之通義臣謹據孝經以明陛下孝理之合至德要道請論世俗訾禮之徒與夫至德謂孝悌要道謂禮樂移風易俗莫善於樂安上理民莫善於禮又禮有無體之禮樂有無聲之樂按孝經援神契云天子孝曰就就之為言成也天子德被天下澤及萬物始終成就則其親獲安故曰就也諸侯孝曰度度者法也諸侯居國能奉天子法度得不危溢則其親獲安故曰度也卿大夫孝曰譽譽之為言名也卿大夫言行布滿能無惡稱譽達遐邇則其親獲安故曰譽也士孝曰究究者以明審為義士始升朝辭親入仕能審資父事君之禮則其親獲安故曰究也庻人孝曰畜畜含畜為義庻人含性受朴躬耕力作以畜其德則其親獲安故曰畜也陛下以韋氏構逆中宗降禍宸衷哀憤睿情卓烈初無一旅之衆遂殄九重之妖定社稷於阽危拯宗枝於塗炭此陛下孝悌之至通於神明光於四海無所不通使諸侯得守其法度公卿大夫得盡其言行士得資親以事君庻人得用天而分地此陛下無體之禮以安上理人也上元已來政由武氏文明之後法在凶人賊害宗親誅滅良善勲階歲累酺赦年頻佞之則榮華正之則遷謫神龍景雲之際其事尤繁先天開元之間斯弊都革此陛下無聲之樂以移風易俗也臣前狀單畧議者未識臣之懇誠謹具狀重進請付中書門下商量處分臣言若讜乃敢側足於軒墀臣言不忠伏請竄迹於荒裔又散騎常侍元行冲奏議曰天地之性惟人最靈者葢以智周萬物惟睿作聖明貴賤辨尊卑逺嫌疑分情禮也是以古之聖人徵性識本緣情制服則有申有厭天父天夫故斬衰三年情理具盡盡者因心立極也生則齊體死則同穴此隂陽配合同兩儀之成化而妻䘮杖期情禮俱殺者葢遠嫌疑尊乾道也父為嫡子三年斬衰而不去職者葢尊祖重嫡崇禮殺情也資於事父以事君孝莫大於嚴父故父在為母罷職齊周而心䘮三年謂之尊厭者則情申而禮殺也斯制也可以異於飛走别於華夷羲農堯舜莫之易也文武周孔同所尊也今若捨尊厭之重虧嚴父之意畧純素之嫌貽非聖之責則事不師古有傷名教矣姨兼從母之名即母之女黨加於舅服有理存焉叔嫂不服避嫌疑也若引同㸑之緦以忘推遠之迹旣乖前聖亦謂難從謹詳三者之疑並請依古為當自是百寮議竟不决至七年八月下勅曰惟周公制禮當厯代不刋况子夏為傳乃孔門所授格條之内有父在為母齊衰三年此有違尊厭之義與其改作不如師古諸服紀宜一依䘮服文自是卿士之家父在為母行服不同或旣周而禫禫服六十日釋服心䘮三年者或有旣周而禫禫服終三年者或有依上元之制齊衰三年者時議者是非紛然元行冲謂人曰聖人制厭䧏之禮豈不知母恩之深也但尊祖貴禰欲其遠别禽獸近異夷狄故也人情易揺淺識者衆一紊其度其可止乎二十年中書令蕭嵩與學士改修定五禮又議請依上元勅父在為母齊衰三年為定及頒禮乃一切依行焉冊府元龜卷五百八十八
