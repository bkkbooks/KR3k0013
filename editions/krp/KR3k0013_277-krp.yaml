body:
  text: 册府元龜卷二百七十七宋王欽若等撰宗室部褒寵第三後魏陳留桓王䖍昭成帝孫也武力絶倫與慕容垂戰没道武追惜傷慟者數焉配享廟庭封其子悅為朱提王悅外和内狠道武以桓王死王事特加親寵秦明王翰子儀道武之孫為左丞相從征討有功太武之初育也道武喜夜召儀入曰卿聞夜喚乃不怪懼乎儀曰怪則有之懼實無也帝告以太武生因賜儀御馬御帶縑錦等道武以儀噐望待之尤重數幸其第如家人禮中山王纂秦眀王翰孫初道武養於宫中太武踐祚除定州刺史封中山公進爵為王賜歩挽車以優異之常山王遵子素道武之曽孫眀元從母所生特見親寵陳留王䖍兄覬性嚴重少言道武嘗敬之雅有謀䇿從平中山以功賜爵蒲城侯平盧太守特見寵厚給皷吹羽儀禮同岳牧莅政以威信著稱陽平王熙道武子眀元治兵於東部詔熙督十二軍校閱甚得軍儀明元嘉之賞賜隆厚泰常六年薨眀元哀慟不已賜温眀秘噐禮物偹焉河間公興都初封樂城子獻文初以子東陽王丕貴重進爵樂城侯謝老歸家帝益禮之賜几杖服物致膳於第其妻婁氏為東陽王太妃卒追贈定州刺史河間公任城王雲景穆之子為征東大將軍徐州刺史以太妃蓋氏薨表求觧任百姓所遺錢貨一無所受顯祖聞而嘉之復拜侍中賜錢千貫羊千口出為雍州刺史州民頌之者千人文眀太后嘉之賜帛千匹薨於州䘮至京師車駕親臨哭北海王詳獻文之子孝文自雒北廵詳嘗與侍中彭城王勰並在輿輦陪侍左右至文成射銘之處詔詳與侍臣皆試射逺近諸人皆去一二十歩唯詳箭及之孝文嘉之拊掌欣笑遂詔勒銘親自為製車駕南伐行中領軍留守給皷吹一部甲仗三百人咸陽王禧獻文之子太和中為冀州刺史孝文餞於南郊來朝京師將還州親餞之賦詩叙意入為司州牧都督司豫荆郢雒東荆六州諸軍事詔以禧元弟之重食邑三千戸其餘五王皆食二千戸趙郡靈王幹獻文之子孝文南伐以幹為車騎將軍都督關右諸軍事給銅虎符十别賜詩書班師遷雒除都督冀定瀛三州諸軍事征東大將軍冀州刺史開府如故賜雜物五百段又宻賜黄金十斤孝文親餞於近郊後轄司州牧車駕南討詔幹都督中外諸軍事給皷吹一部甲士三百人出入殿門太和二十三年薨給東園秘噐斂服十五稱賵帛三千疋陪葬長陵廣陵惠王羽獻文之子太和中進號衛將軍征東大將軍開府青州刺史孝文幸羽第與諸弟言曰朕昨親受人訟始知廣陵之眀了咸陽王禧曰臣年為廣陵兄眀為廣陵弟孝文曰我為汝兄汝為羽昆汝復何恨親餞之華林園宣武即位面受司徒薨於府宣武親臨哀慟給東園温眀秘器朝服一具衣一襲錢六十萬布一千疋蠟三百斤大鴻臚䕶䘮事大殮帝親臨之舉哀于都亭贈使持節侍中驃騎大將軍司徒公冀州刺史給羽葆皷吹班劒四十人及𦵏帝親臨送彭城王勰獻文之子孝文南討漢陽假勰中軍大將軍加皷吹一部及為中書令孝文宴大臣於清徽堂日宴移於流化池芳林之下孝文曰向宴之始君臣肅然及將軍觴也而流景將頽竟不盡適戀戀餘光故重引卿等因仰觀桐葉之茂曰其桐其椅其實離離愷悌君子莫不令儀今林下諸賢足敷謌詠遂令黄門侍郎崔光讀暮春羣臣應詔詩至勰詩孝文乃為之改一字曰昔祁奚舉子天下謂之至公今見勰詩始知中令之舉非私也勰對曰臣露此拙方見聖朝之私頼䝉神筆賜刋得有令譽孝文曰雖雕琢一字猶是玉之本體勰曰臣聞詩三百一言以蔽今陛下賜刋一字足以價等連城後從孝文征沔北大破梁將崔慧景孝文不豫内侍醫藥孝文有瘳車駕還京㑹百僚於皇極堂行飲至䇿勲之禮命舎人宣㫖勰翼弼六師纂戎荆楚沔北之勲每毗廟筭從討新野有尅城之謀受命鄧城致大㨗之効功為羣將之最也别當受賞不替厥庸孝文謂勰曰吾與汝等早罹艱苦中逢契闊每謂情意隨事而踈比纒患經歲危同寒葉非汝孔懐情敦忠孝孰能動止躬親必先藥膳每尋此事感思殊逺勰悲泣對曰臣等宿遭不天酷恨長世頼陛下撫育得參人伍豈謂上靈無鑒復使聖躬違和萬國所懸蒼生繫望寢興之勞豈申荼蓼以破慧景等勲増邑五百户又詔曰朕形疲稚年心勞長歲積思成疴頓發汝潁第六弟勰孝均周弟誠侔姬旦遺食捨寢動止必親敦醫勸膳誠力俱竭永言保康實頼同氣又秉務緝政百司是憑綱維折衷萬揆獲濟撫師於霖浩之辰處戎於荐逼之日安外静内功濟大道侍省之績可以孔懐無褒翼亮之勤實乃勲髙社稷宜有酬賞以旌國功可増邑一千戸勰辭曰臣受遇縁親榮枯事等以此獲賞深乖情願乞追成㫖用息謗言詔曰汝在私能孝處公必忠比來勤憂足布朝野但可祗膺尋以勰為司徒太子太傅侍中如故宣武即位以有功任宰輔勰固譲宣武雖許之猶逼以外任尚書令王肅等奏臣等聞旌功表徳道貴前王庸勲親親義髙盛典是故姬旦翼周光宅曲阜東平宰漢寵絶列藩彭城王勰景思内昭英風外發恊廓乾規掃氛漢沔屬先帝在天鳯旌旋斾静一六師肅寧南服登聖皇於天衢開有魏之靈祐論道中鉉王猷以穆七徳丕宣九功在詠臣等参議宜増邑一千五百戸詔曰覽奏倍増殞絶未足以上酬勲徳且可如奏勰頻表固讓宣武與勰書曰恪奉辭暨今悲戀哽咽歲月易逺便迫暮冬每思聞道奉承風教父既辭榮閑外無容頓違至德出藩累朔荒馳實深今遣主書劉道斌奉宣悲戀願父來望必當留京展洩哀窮指不云逺勰乃朝於京師景眀初齊豫州刺史裴叔業以壽春内屬詔勰都督南征諸軍事餘如故與尚書令王肅迎接壽春詔曰五教治樞古難其選自非親賢兼切莫應斯舉王以眀徳懋親任屬保傅出居藩陜入御衮章内外克諧民神攸屬今董率戎麾威號宜重可復授司徒以光實望又詔勰以本官領揚州刺史廣川剛王諧莊王畧之子太和中薨將大殮孝文素服深衣哭之入室哀慟撫尸而出詔贈諧武衞將軍及葬孝文親臨送之東陽王丕孝文嗣位累遷太尉錄尚書事淮南王他淮陽王尉元河東王茍頽並以舊老見禮每有大事引入禁中乗歩挽杖於朝進退相隨文明太后為王叡造宅故亦為丕造甲第第成帝后幸之率百官文武享燕焉使尚書令王叡宣詔賜丕金印一紐又特賜金劵帝北巡狩丕留守賜所乗車馬往來府省帝幸平城子隆謀逆丕免死為太原百姓丕年垂八十猶自平城力載隨駕至雒留雒陽帝每遣左右慰勉之乃還晉陽孝文没丕自并來赴宣武引見之以丕舊老禮有加焉尋勅留雒陽後宴于華林都亭特令二子扶侍坐起丕厯仕六世年垂七十位極公輔而還為庻人然猶心戀京邑不能自絶人事詔以丕為三老襲常山宣王忠字仙德孝文時累遷右僕射賜爵城陽公太和四年疾篤辭退養病於高柳輿駕親送都門之外羣僚友臣執别者莫不涕泣及卒皆悼之命有司為立碑銘淮南王他陽平王熙之子太和初拜侍中轉征西大將軍遷司徒賜安車几杖入朝不趨太和十二年薨孝文有事宗廟始薦聞他薨為之廢祭輿駕親臨慟詔有司監䕶䘮事南平王渾陽平王熈之第二子太武噐其藝能嘗引侍左右賜馬百匹子霄嗣霄好直言正諫孝文特垂欽重詔曰自今奏事相稱可去姓名唯南平王一人可直言某封太和十七年薨賜朝服㝠衣一襲東園第一秘噐絹千匹孝文緦衰臨霄䘮哀動左右醼不舉樂贈衛將軍定州刺史賜帛五百疋江陽王繼南平王霄第二子子叉先納靈太后妹及太后臨朝數與孝眀幸繼宅置酒髙㑹班賜有加尋遷侍中驃騎大將軍儀同三司特進領軍如故徙封京兆王繼疾患積年就養于家每至靈太后與孝眀遊幸於外時令扶入宫守禁内及節慶宴饗皆力疾叅焉特轉太保侍中加後部皷吹孝眀詔曰至節嘉辰禮有朝慶親尊戚老理宜優異王位髙年宿可依齊郡王簡故事朝訖引坐免其拜伏轉太傅侍中頻讓不許大官給酒饌供賔客又詔令乗歩挽至殿庭兩人扶侍禮秩與丞相髙陽王相埒後除使持節侍中太師大將軍録尚書事大都督節度西道諸軍出師之日車駕臨餞傾朝祖送賞賜萬計繼啟求還復江陽詔從之繼長子义娶靈太后妹孝明初以侍中領軍輔政威振於内外乃封其子亮平原郡開國公食邑一千戸及拜孝明御南門臨觀并贈賜御馬帛千疋廣陽王嘉簡王建閭子宣武時拜衛大將軍尚書令除儀同三司嘉好飲酒或沉醉在宣武前言笑自得無所顧忌帝以屬尊年老嘗優容之與彭城北海髙陽諸王每入宴集極懽彌夜數加賞賜帝亦時幸其第廣陵侯衍陽平王新成之次子為徐州刺史至州病重孝文勑徐成伯乗𫝊療疾差成伯還帝曰卿定名醫賚絹三千匹成伯辭請受一千帝曰詩云人之云亡邦國殄瘁以是而言豈惟三千匹乎其為帝所重如此南安惠王禎性忠謹事母以孝聞孝文賜帛千匹以褒之徴赴講武禎子英字虎兒時梁平三關戍宣武詔曰知賊城已下復克三關展威闢境聲略宣振公私稱泰良以欣然將軍淵規内斷忠謀外舉受律揚旌克申廟筭雖方叔之制蠻荆召虎之掃淮浦匹茲蔑如也新州初附宜廣經略想善檢督必令周固有所委付然後凱旋耳安定靖王休太和中為大司馬從駕幸鄴命休率從駕文武迎家於平城孝文親餞休於漳水之北十七年春與太保齊郡王簡並蠲朔望之禮十八年休寢疾髙祖幸其第流涕問疾中使醫藥相望於路薨贈帛三千疋自薨至殯車駕三臨孝文至其門改服裼衰素笄加絰皇太子百官皆從行弔禮及將𦵏又贈布帛二千疋詔假黄鉞加羽葆皷吹虎賁班劍六十三人悉準三老尉元之儀孝文親送出郊慟哭而返諸王恩禮莫比焉宣武世配享廟庭任城文宣王澄從孝文征南至懸瓠以篤疾還京駕餞之汝墳賦詩而别常山刺史穆泰反以澄行州事遂授節銅虎竹使符御仗左右孝眀世為司空侍中西域之厭達波斯諸國各因公使並送澄駿馬一匹澄請付公僕以充國閑詔曰王廉貞之徳有過楚湘可勑付廏以成君子大哉之美後為司徒尚書令薨詔百僚㑹䘮贈假黄鉞使持節都督中外諸軍事太傅領太尉公加以殊禮偹九錫依晉大司馬齊王攸故事諡曰文宣澄之𦵏也㐫飾甚盛靈太后親送郊外停輿悲哭哀動左右百官㑹赴千餘人莫不歔欷當時以為哀榮之極澄弟嵩為安南將軍揚州刺史累戰有功後為蒼頭李太伯所害宣武為嵩舉哀於東堂賻絹一千匹贈車騎將軍領軍澄子順為左僕射爾朱榮之亂為鮮于康奴所害家徒四壁無物殮尸止有書數千卷而已門下通事令史王才達裂裳覆之莊帝還宫遣黄門侍郎山偉廵喻京邑偉臨順䘮悲慟無已既還莊帝恠而問曰黄門何為聲散偉以狀對莊帝勑侍中元祉曰宗室亡非一不可周贍左僕射清苦之節死乃益彰特贈絹百疋餘不得為例贈驃騎大將軍尚書令司徒公定州刺史諡曰文烈髙陽王雍獻文之子為驃騎大將軍司州牧宣武時幸雍第盡家人之禮孝眀初詔入居太極西栢堂諮决大政給親信二十人又詔雍為宗師進太傅侍中領太尉公王如故别勑將作營國子學寺給雍居之靈太后詔雍乗歩挽入掖門又以本官録尚書事雍頻表辭遜優答不許詔侍中敦諭孝眀覽政詔雍乗車出入大司馬門進位丞相給後部羽葆皷吹倍加班劒催令速拜詔雍依齊郡順王簡太和故事朝訖引坐特優拜伏之禮孝昌初詔曰比相府弗開陰陽未變王秉哲居宗勲望隆重道庇蒼生威被華裔體國猶家匪躬在節可開府置佐吏又詔曰丞相高陽王道德淵廣眀允篤誠儀刑太階垂風下國實所以予違汝弼致治責成宜班新制宣之遐邇其州郡先上司徒公文悉可改上相府施所符告皆亦如之後遇害於河陰贈假黄鉞相國城陽王徽為安西將軍秦州刺史詔書旦至夕發徽以將之秦部請詣闕恭授仍表啓固陳請不之職改授輔國將軍加度支尚書元顥入雒徽從莊帝北廵及車駕還宫以與謀之功除侍中大司馬太尉公加羽葆皷吹増邑通前三萬戸章武王融與葛榮戰敗見殺孝眀舉哀於東堂賜東園秘噐朝服一具綵二千八百段尋以融死事進贈司徒加後部皷吹襲常山王素孫暉孝眀世為尚書令攝吏部選事神龜元年卒賜東園秘噐贈使持節都督中外諸軍事司空公將𦵏給羽葆皷吹班劒二十人羽林二百二十人趙郡王謐靈王幹之子除都宫尚書加安南將軍正光四年薨給東園秘噐朝服一具衣一襲賻帛五百匹謐弟惠羽林監直閣將軍早卒賻帛五百匹贈鎮逺將軍恒州刺史武川鎮將軍蘭子志為雒陽令與御史中尉争路帝謂邢巒曰此兒竟可謂王孫公子不鏤自雕巒曰露竹霜條故多勁節非鸞則鳯其在本枝也武昌王鑒宣武時為征虜將軍徐州刺史尅梁角城帝詔鑒曰知摧角城威謀展稱良以欣然此城襟帶淮滸川路衝要自經昔筭未能尅之蟻固積紀每成邊害將軍淵規潜運妙略克宣闢境尅城功著不日㨿要扼喉津徑勢阻可謂勲髙三㨗朕甚嘉焉守御諸宜善以量度宣慰之使尋當别遣上黨王天穆以平邢杲之亂莊帝加太宰羽葆皷吹増邑通前七萬戸北齊廣平公盛神武從叔祖也歴位太尉天平三年薨贈假黄鉞太尉太師録尚書事平秦王歸彦神武族弟天保中以討侯景功封為長郡公除領軍大將軍領軍加大自歸彦始也文宣誅髙徳政金寳財貨悉以賜之及為司空時孝昭將入雲龍門都督成休寜列拒而不内歸彦諭之然後得入進向栢閣永巷亦如之孝昭踐祚以此彌見優重每入常在平原王段韶上以為司空兼尚書令齋宫内唯天子紗㡌臣下皆戎㡌特賜歸彦紗㡌以寵之平陽王淹神武子皇建初為太傅與彭城王浟河間王孝琬並給仗身羽林百人彭城王浟神武子為太師録尚書事河清三年車駕廵幸浟留鄴為羣盗所害贈假黄鉞太師太尉録尚書事給輼輬車襄城王淯神武子天保三年薨乾眀元年贈假黄鉞太師太尉録尚書事高陽王湜神武子廢帝初薨乾眀初贈假黄鉞太師司徒録尚書事馮翊王潤神武子為太師太宰薨贈假黄鉞左丞相瑯琊王儼武成第三子也為領軍大將軍領御史中丞魏氏舊制中丞出清道與皇太子分路行王公皆遥住車去牛頓軛於地以待中丞過其或遲違則赤棒棒之自都鄴後此儀浸絶武成欲雄寵儼乃使一依舊制儼初從北宫出將上中丞凡京畿歩騎領軍之官屬中丞之威儀司徒之鹵簿莫不畢備帝與后在華林園東門外張幕隔青紗歩障觀之觀者傾京邑儼嘗在宫中坐含光殿以視事後周晉公䕶太祖兄子為大冡宰眀帝立拜太師賜路車冕服又為雍州牧并賜金石之樂武帝保定三年詔曰大冡宰晉國公智周萬物道濟天下所以克成我帝業安養我蒼生况親則懿昆任當元輔而可同班庻品齊位衆臣自今詔誥及百司文書並不得稱公名以彰殊禮䕶固讓五年詔曰先宅曲阜魯用郊天之樂地處參虚晉有大蒐之禮所以言時計功昭德紀行使持節太師都督中外諸軍事柱國大將軍大冡宰晉國公體道居貞含和誕德地居戚右才表棟隆國歩艱難寄深夷險皇綱締搆事均休慼故以迹冥殆庻理契如仁今文軌尚隔方隅猶阻典䇿未備聲名多闕宜賜軒懸之樂六佾之舞趙王招陳王純越王盛滕王逌皆文帝子静帝即位加招等入朝不趨劍履上殿代王達字度斤突性果决善騎射初封代公出為荆州刺史在州有政績高祖手勑褒美之髙祖東伐以為將軍㧾管齊淑妃馮氏尤為齊後主所幸齊平帝以達不邇聲色以馮氏賜之静帝即位詔與趙王招等入朝不趨劍履上殿蔡公廣太祖兄邵惠王顥孫也廣母李氏以廣患彌年憂而成疾因此致卒廣乃以毁薨武帝素服親臨百寮畢集故吏儀同李充信等上表褒述申其宿志庻存儉約詔曰昔河間才藻追叙于中尉東海謙約見稱於身後可斟酌前典率繇舊章使易簀之言得申遺志黜殯之請無虧令終於是贈本官加太保隴右十四州諸軍事秦州刺史諡曰文𦵏於隴右所司一遵儉約之典廣陵公孝伯與武帝同日生嘗謂曰公於我猶漢高與盧綰也賜以十三環金帶自是常侍左右出入卧内朝務皆預焉隋安德王雄初進封廣平王改封清漳王仁壽初髙祖曰清漳之名未允聲望命職方進地圗上指安德郡以示羣臣曰此號足以名德相稱於是改封安德王遂寧子達開皇中為鄴鄭趙三州刺史俱有能名平陳之後四海大同帝差品天下牧宰達為第一賜雜綵五百段加以金帶擢拜工部尚書秦王俊為并州總管三十四州軍事頗有令聞高祖聞而大悅下書奬勵焉齊王暕煬帝第二子大業初為豫州牧俄而元德太子薨朝野注望咸以暕當為嗣文帝勑吏部尚書牛𢎞妙選官屬公卿繇是多進子弟眀年轉雍州牧尋徙河南開府儀同三司元德太子左右二萬餘人悉𨽻於暕寵遇益隆自樂平公主及諸戚屬競來致禮百官稱謁填咽道路唐淮安王神通高祖從父弟也為河北道行䑓尚書左僕射太宗即位是月甲戍詔曰褒崇賢戚有國彛典厚秩清階式隆朝望左武衛大將軍上柱國淮安王神通宗室之長德噐優𢎞締構之初早樹勲績右武衛大將軍上柱國燕郡王藝夙著嘉庸志懐彊毅乆司戎禁見稱貞確宜加榮寵式允具瞻並可開府儀同三司四年薨太宗為之廢朝鴻臚䕶䘮事贈司空諡曰靖淮陽王道𤣥高祖從父兄子也從太宗擊宋金剛先登陷陣時年十五太宗壯之賞物千段後擊劉黒闥戰没太宗每追痛之嘗從容謂侍臣曰道𤣥始終從朕深入賊陣所向必尅意常企慕所以每陣先登葢學朕也惜其㓜少力不遂心及於難平後以其弟武都王道眀徙封於淮陽國河間王孝恭髙祖從父兄子也武德二年授信州總管承制拜假蕭銑平髙祖大恱拜孝恭荆州大揔管使畫工貌而視之及平輔公祏璽書褒賞賜甲第一區女樂二部奴婢七百人金寳珍翫甚衆授東南道行䑓尚書右僕射太宗甚加親待諸宗室中莫與比焉貞觀十四年暴薨太宗素服舉哀哭之甚慟江夏王道宗高祖從父兄子為吏部尚書太宗討高麗為前鋒大破賊兵太宗至深加賞勞賜奴婢四十人道宗在陣損足太宗親為之針賜以御膳濟北公瑊河間王孝恭弟也為尚書左丞貞觀十年夏五月幸其第敦親親也襄邑郡王神符貞觀三年為宗正卿後以疾辭位歸第拜光禄大夫每月别給羊酒太宗將幸九成宫就第問疾賜以縑帛又令乗小輿引見紫微殿以其脚疾遣三衛輿之而升齊王元吉高祖子武德四年太宗討竇建德於滎陽留元吉與屈突通圍王世充於東都世充出兵拒戰元吉設伏擊破之斬首八百級生擒其大將軍樂仁昉甲士千餘人世充平拜司空加賜衮冕之服前後部皷吹樂二部班劒二十人黄金二千斤與太宗各聴三鑪鑄錢以自給九年詔曰三台望重仰叶辰曜五教任隆俯安邦國實資懿德式寄親賢侍中并州大都督左衛大將軍上柱國齊王元吉噐量凝邈風神爽邁徽猷夙著嘉譽早隆出莅方岳政績兼懋入侍帷扆獻納允屬推轂閫外偹展勲庸職司禁旅戎章以輯燮理之任朝典攸宜可司徒餘如故酆王元亨高祖子貞觀二年為金州刺史及之藩太宗以其㓜小甚思之中路賜以金盞遣使為之設宴徐王元禮髙祖子貞觀十七年為絳州刺史以善政聞太宗降璽書勞勉賜以錦綵鄭王元懿髙祖子總章中為絳州刺史元懿頗好學數斷大獄甚有公平之譽高宗特降璽書褒美賜物三百段舒王元名髙祖子元名性髙潔矜莊門庭清肅嘗誡其子豫章王亶等曰藩王所乏者不慮無錢財官職但勉行善事忠孝持身此吾志也及亶為江州刺史以善政聞高宗手勑褒美元名以賞其義方之訓魏王泰太宗第二子也貞元十四年太宗幸泰延康坊宅因曲赦雍州及長安大辟罪已下免延康坊百姓無出今年租賦又賜泰府官僚帛有差泰好士愛文學特令就府别置文學館任自引召學士又以泰腰腹洪大趨拜稍難復令乗小輿至於朝所其寵異如此營州都督晦河間王孝恭子也乾封中以善政聞璽書勞問賜物三百段紀王慎太宗第十子為襄州刺史以善政稱髙宗璽書勞勉宋王憲初名成噐睿宗長子睿宗將建儲貳以成噐嫡長而𤣥宗有平韋氏之功成噐涕泣固讓儲副𤣥宗又抗表固讓睿宗不許乃下制曰左衛將軍宋王成噐朕之元子當踐副君以隆基有社稷大功人神僉屬繇是朕前懇讓言在必行天下至公誠不可奪爰示立季之典庻叶從人之願可雍州牧揚州大都督太子太師别加實封二千戸賜物五千段細馬二十匹奴婢十房甲第一區良田三十頃其年十一月拜尚書左僕射尋遷司徒景雲二年兼同州刺史賜物二千段殿中馬二十匹開元二十八年冬憲寢疾𤣥宗令中使送醫藥及珍膳相望於路僧崇一療憲稍瘳帝大恱特賜緋袍魚袋以賞異崇一時申王等皆先薨唯憲獨在上尤加恩貸每年至憲生日必幸其宅移時晏樂居常無日不賜酒酪及異饌等尚食揔監及四方有所進獻食之稍甘即皆分以賜之憲嘗奏請年終録付史官每年數百紙汝陽王璡憲子也天寳九載薨輟朝一日制曰睦親之恩理貫存没飾終之禮義表哀榮故特進上柱國汝陽郡王璡植性謙和執心恭懿聞詩禮而禀訓用忠信而飭躬修詞立誠不虧於道依仁游藝克著於名况乆踐崇班彌彰勤勵兾其永固藩翰有光公族奄兹殞殁良多憫念宜加寵贈用旌幽穸可贈太子太師應治䘮量事官供仍令京兆尹一人簡校葬事嗣申王珣憲子珣出繼申王撝開元二十五年薨𤣥宗甚悼之輟朝三日制曰猶子之恩特深於情禮睦親之義必備於哀榮同安郡王珣禀氣淳和執心忠順邦國垣翰宗枝羽儀磐石疏封將期永固逝川不舎俄歎促齡悼徃之懐因心所切宜増寵命用飾幽泉可贈太子少保葬事官給陪葬橋陵榮王滉後名琬𤣥宗開元十五年授京兆牧二十三年七月以京兆牧榮王滉廣州都督光王涺後名琚河南牧儀王濰後名璲荆州大都督永王澤後名璘益州大都督壽王清後名瑁安西大都䕶延王洇一作洄後名玢揚州大都督盛王沐後名琦第二十二男濟王溢後名環第二十三男信王沔後名瑝第二十四男義王漼後名玭第二十五男陳王渙後名珪並加開府儀同三司第二十六男豐王澄後名珙為左衛大將軍第二十七男恒王潓後名瑱為右衛大將軍第二十九男凉王漎後名璿為左千牛衛大將軍第三十男汴王滔後名璥為右千牛衛大將軍滉等謝恩於朝悉命詣尚書省上自慶王以下咸送之命有司設帳置饌太常供樂敕曰榮王滉等既已封建近又拜官在於府寮合依典故有司准式十二月慶王潭忠王浚棣王洽鄂王涓榮王滉儀王濰潁王澐永王澤壽王清延王洇盛王沐濟王溢義王漼陳王渙豐王澄常王潓凉王漎汴王滔加上柱國故邠王男承寔承􅀢承㝣承􅀢承寪承寏等天寳七年六月皆授朝請郎東宫六品官員外置同正員仍賜緋魚袋詔曰故邠王男承宣等地惟戚屬噐表温良伯仲輝光温温有裕推恩之典既叶於分官賜服之榮宜崇於寵命八月勑諸王長子及先帶郡王名任職事官階卑者並聼著紫佩金魚袋濟南郡王俊棣王之子也天寳十四年十月與濟王男光禄卿平樂郡王俛信王男太常卿新安郡王修陳王男太常卿臨淮郡王佗義王男太僕卿舞陽郡王儀盛王男太常卿真定郡王償永王男太常卿餘姚郡王儧陳王男殿中監安南郡王倫潁王男鴻臚卿髙邑郡王僝延王男殿中監平陽郡王侹信王男光禄卿晉陵郡王倜豐王男宗正卿齊安郡王佻