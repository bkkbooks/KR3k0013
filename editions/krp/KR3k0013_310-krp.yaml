body:
  text: 冊府元龜卷三百十宋王欽若等撰宰輔部徳行聞望清儉威重徳行詩曰有覺徳行四國順之是知天工其代人望攸屬君之卿佐咸由徳舉若乃令範昭著篤行純淑中和之道彰乎所履敦懿之性發乎自然居上而匪驕秉彝而有度故能輔相光化鎮靖雅俗萬邦為憲百官承式望實著於當世功名垂於永久斯賢者之盛躅也是故書有攸好之稱傳述務滋之美太上之所貴孔門之稱首者何莫由斯者矣唐堯時舜舉十六相高陽氏才子八人蒼舒隤敳𢷬戭大臨尨降庭堅仲容叔達齊聖廣淵明允篤誠天下之民謂之八愷高辛氏才子八人伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍忠肅恭懿宣慈惠和天下之民謂之八元虞舜時臯陶為士師邁種徳徳乃降黎民懐之邁行種為降下歸懐也言已無徳民所不能依臯陶布行其徳下令於民民歸服之天下大治周仲山甫為宣王卿士詩美之曰柔嘉維則令儀令色小心翼翼嘉美令善也善威儀善顔色容貎翼翼然恭敬古訓是式威儀是力天子是若明命使賦古故訓道若順賦布也言故訓先王之遺典也式法也力猶勤也勤威儀者恪居官次不解于位也是順從行其所為也顯明王之政敎使羣臣施布之又曰徳輶如毛民鮮克舉之我儀圖之輶輕儀匹也人之言曰徳甚輕然而衆人寡能獨舉之以行者言政事易耳而人不能行者無其志也我與倫匹圖之而未能為也我吉甫自我也惟仲山甫舉之愛莫助之愛惜也仲山甫能獨舉此徳而行之惜乎莫能助之者多仲山甫之徳歸功言耳漢蕭何為丞相何始微時與曹参善及為宰相有隙至何且死所推賢唯参曹参為丞相見人有細過掩匿覆盖之府中無事張歐武帝時為御史大夫歐為吏未嘗言按人剸以誠長者處官官屬以為長者亦不敢大欺上具獄事有可卻卻之退令更平幡之不可者不得已為涕泣面而封之靣謂背之也言不忍視之其愛人如此霍光為大司馬大将軍光為人沈静詳審每出入下殿門進止有常處郎僕射竊識視之不失尺寸其資性端正如此丙吉字少卿魯國人也治律令為魯獄吏積功勞稍遷至廷尉右監坐法失官歸為州從事武帝末巫蠱事起吉以故廷尉監徴徴召詣京師詔治巫蠱郡邸獄時宣帝生數月以皇曾孫坐衛太子事繫吉見而憐之又心知太子無事實重哀曾孫無辜吉擇謹厚女徒令保養曾孫置閒燥處吉治巫蠱事連歳不決後元二年武帝疾徃來長楊五柞宮望氣者言長安獄中有天子氣於是帝遣使者分條中都官詔獄繫者亡輕重一切皆殺之内謁者令郭穰夜到郡邸獄吉因閉門拒使者不納曰皇曾孫在他人無辜死者猶不可況親曾孫乎相守至天明不得入穰還以聞因劾奏吉武帝亦寤曰天使之也因赦天下郡邸獄繫者獨賴吉得生恩及四海矣曽孫病幾不全者數矣吉勑保養乳母加致醫藥視遇甚有恩惠以私財物給其衣食後吉為車騎将軍軍市令遷大将軍長史霍光甚重之入為光祿大夫給事中昭帝崩亡嗣大将軍光遣吉迎昌邑王賀賀即位以行淫亂廢光與車騎将軍張安世諸大臣議所立未定吉奏記光曰将軍事孝武皇帝受襁褓之屬任天下之寄孝昭皇帝早崩亡嗣海内憂懼欲亟聞嗣主發䘮之日以大誼立後所立非其人復以大誼廢故天下莫不服焉方今社稷宗廟羣生之命在將軍之一舉竊伏聴於衆庶察其所言諸侯宗室在位列者未有所聞於民間者也而遺詔所養武帝曽孫名病已在掖庭外家吉前使居郡邸時見其㓜少至今十八九矣通經術有美材行安而節和願将軍詳大義参以蓍龜亟宜褒顯先使入侍侍太后令天下昭然知之然後定大䇿天下幸甚光覽其議遂尊立皇曽孫遣宗正劉徳與吉迎曽孫於掖庭宣帝初即位賜吉爵闗内侯吉為人深厚不伐善自曽孫遭遇吉絶口不道前恩遭遇謂升大位故朝廷莫能明其功也地節三年立皇太子吉為太子太傅數月遷御史大夫及霍氏誅帝躬親政省尚書事是時掖庭宫婢則令民夫上書自陳嘗有阿保之功章下掖庭令考問則辭引使者丙吉知狀掖庭令將則詣御史府以視吉吉識謂則曰汝嘗坐養皇曾孫不謹督笞汝安得有功獨渭城胡組淮陽郭徴卿有恩耳分别奏組等共養勞苦狀詔吉求組徴卿己死有子孫皆受厚賞詔免則為庶人賜錢十萬帝親見問然後知吉有舊恩而終不言帝大賢之翟方進為相公潔請託不行郡國言不以私事託於四方郡國後漢宋𢎞為大司空時帝姊湖陽公主寡帝與共論朝臣微觀其意主曰宋公威容徳器羣臣莫及帝曰方且圖之後𢎞被引見帝令主坐屏風後因謂𢎞曰諺言貴易交富易妻人情乎𢎞曰臣聞貧賤之交不可忘糟糠之妻不下堂帝顧謂主曰事不諧矣袁安為司徒嚴重有威任隗為司空時竇太后臨朝后兄車騎将軍憲北繫匈奴安與隗上書諫以為匈奴不犯邊塞而無故勞師書連上輙寢憲日益橫樹其親黨賔客於名都大郡皆賦斂吏人更相賂遺其餘州郡亦復望風從之安與隗舉奏諸二千石又它所連及貶秩免官者四十餘人竇氏大恨但安隗素行高亦未有以害之隗義行内脩不求名譽而以沈正見重於世尹勤為司空篤性好學屛居人外荆棘生門時人重其節魏華歆為司徒時公卿並賜没入生口唯歆出而嫁之帝歎息王朗為司徒恭儉節約自婚姻中表禮贄無所受嘗譏世俗有好施之名而不恤窮賤故用財以周急為先蜀許靖為司徒靖雖年逾七十愛樂人物誘納後進清談不倦丞相諸葛皆為之拜晉王祥為太保既薨奔赴者非朝廷之賢則親舊故吏而已門無雜弔之賔族孫戎歎曰太保可謂清達矣又稱祥在正始不在能言之流及與之言理致清逺将非以徳掩其言乎劉寔懐帝時為太尉有清徳當時雖禮敎陵遲而寔行已以正䘮妻為廬杖之制終䘮不御内輕薄者笑之寔不介意魏舒為光祿大夫儀同三司及山濤薨以舒領司徒有頃即真舒有威重徳望為事必先行而後言遜位之際莫有知者時論以為晉興以來三公能辭榮善終者未之有也陸玩為司空翼亮累世嘗以𢎞重為人主所貴加性通雅不以名位格物誘納後進謙若布衣由是縉紳之徒莫不廕其徳宇後魏穆觀明元時綰中書門下太武之監國觀為右弼出則統攝朝政入則應對左右事無巨細皆關決焉終日怡怡無愠喜之色勞謙善誘不以富貴驕人北齊叚韶為冡宰歴太宰左丞相雅性温慎有宰相之風教訓子弟閨門雍肅事後母以孝聞齊世勲貴之家罕有及者斛律光為宰輔居家嚴肅見子弟若君臣雖極貴盛性節儉簡聲色不營財利杜絶饋餉門無賔客罕與朝士交不預政事每會議嘗獨後言輙合理将有表疏令人執筆口占之務從省實後周王盟初仕魏為太傅姿度𢎞雅仁而汎愛位居師傅禮冠羣后而謙恭自處未嘗以勢位驕人魏文帝甚重之及有疾數幸其第親問所欲其見禮如此王裒在梁為城安郡守侯景之亂元帝承制以裒為左僕射裒既世㑹名家文學優贍當時咸相推挹故旬月之間位昇端右寵遇日隆而裒愈自謙虛不以位地矜物時論稱之隋牛𢎞為右光祿大夫大業之世委遇彌隆性寛厚隋室舊臣始終信任悔恡不及惟宏一人而已及卒縉紳之士莫不傷痛賦詩追悼者數十人唐房元齡為尚書左僕射既總百司䖍恭夙夜聞人有善若己有之片言可録不隔卑賤李靖為右僕射性沉退每與時宰參議恂恂然似不能言蕭瑀為中書令孜孜自勉申其公正繩違舉過人皆憚之毁誹紛紜終不自理楊師道參預朝政太宗數問以朝臣才行師道多所推進縱有違忤己者亦終不毁之岑文本為尚書令文本自以出自書生每懐撝挹生平故人雖貧賤必與之抗禮事母至孝撫弟姪甚篤又口嘗不及家事或勸營產業者文本歎曰吾漢南布衣耳徒歩入關所望不過秘書郎一縣令耳今無汗馬之勞致位中書令荷俸祿之重為懼已多何多更言產業乎劉仁軌為文昌左相同鳳閣鑾臺三品仁軌能飲酒斗餘不亂不自矜貴每遇故人不改布衣之舊婁師徳為鳳閣侍郎平章事初狄仁傑未入相時師徳常薦之及為宰相不知師徳薦己數排師徳令充外使則天常出師徳舊表示之仁傑大慙謂人曰吾為婁公所容如此方知不逮婁公逺矣陸象先為中書侍郎平章事時蕭至忠等伏誅窮討至忠等枝黨連累稍多象先宻有申理全濟甚衆然口未嘗言人無知者杜黃裳為相始以女嫁韋執誼深不為執誼所悦及被譴黃裳卒保全之其死也請歸其喪盧邁為平章事友愛恭儉邁從父弟􅙝為劍南西川判官卒於成都歸葬於雒陽路由京師邁奏請至城東哭於其柩許之近代宰臣多自以為崇重五服之親或不過弔臨而邁獨振薄俗請臨弟喪士君子是之鄭餘慶為相欝為耆徳朝廷得失言成凖的砥名礪行不失儒者之道趙退翁為相時吏部侍郎杜黃裳為中書讒譖及他過犯及御史中丞穆贊京兆少尹韋武萬年縣令李宣長安縣令盧雲皆為裴延齡所搆陷将加斥黜退翁深保䕶救解之故多從輕貶賈耽為司空知政事性長者不喜臧否人物自居相位凡十三年雖不能以安危大計啓沃於人主而嘗以簡身勵行以律人韋貫之自布衣為相居室無改易性沉厚寡言與人交終嵗無欵曲未曽偽詞以悦人身没之後家無羡財李夷簡自布衣訖将相以直道著聞襟懐洞然不屑細故薦居亞相台輔皆以風望被選未嘗以辭氣茍悦於人梁張文蔚為宰輔居家孝且弟雖位至清顯與仲季相雜在太夫人膝下一不異布素弟濟美早得心恙文蔚撫視殆三十年士君子稱之張全義末帝時累遷太尉中書令封齊王凡四十年位極人臣善保終吉盖一人而已全義樸厚大度敦本務實起戰士而忘功名不儒業而樂善道家非士族而奨愛衣冠開幕府辟士必求望實屬邑補奏不任吏人位極王公不衣羅綺心奉釋老而不溺左道如是數者人以為難後唐趙光逢為相嘗有女真寄黃金一鎰於其室家并屬亂離女真委化於他土後二十年金無所歸納於河南尹張全義請付諸官觀其舊封尚在兩登廊廟四退丘園百行五常不欺闇室縉紳咸仰以為名敎宗主周馮道初仕後唐長興中平章事明宗謂侍臣曰馮道性純儉頃在徳勝寨所居一茅菴與從人同器食卧則蒭藁一束其心晏如及以父憂退歸田里自耕耘樵採與農夫雜處畧不以素貴介懐真士大夫也道厯仕四朝二入中書在相位二十餘年以持重鎮俗為己任性亷儉不受四方之賂未嘗以片簡擾諸侯私門之内無累茵無重味不畜姬僕不聽絲竹有寒素之士求見者必引於中堂語及平生其待遇也心無適莫故雖朝代遷置人無間言屹若巨山不可轉也議者以為厚徳稽古宏才偉量盖漢胡廣晉謝安之徒與蘇禹珪初仕漢為宰輔純厚長者遭遇漢祖與蘇逢吉同登相位漢末逢吉夷滅禹珪恬然無咎時人以爲積善之報也聞望盖后王之不能獨治故建之宰弼承以師長上以輔相天地下以親附百姓秉國之成在帝之右非夫忠肅顯允謨明亮采懋徳以興化秉哲而宣美亦何以副斯民之爾瞻哉元愷而下宗工間出或以純誠篤固經邦而厚俗或以茂功駿發致治而垂裕或雅望塞於輿誦或寵遇冠之羣后由是天下之人挹其高風詠其嘉徳播之於雅什載之於史牘騰之為茂實流之為美談而無窮焉以至直諒之士推宗頑獷之類信服薦紳仰其風采萬乗形於歎息自非王佐之英器生民之間傑亦烏能致是哉帝堯時高陽氏才子八人謂之八凱高辛氏才子八人謂之八元事具宰輔徳行門殷伊尹相湯號曰阿衡商頌云實惟阿衡左右商王周召康公奭為太保當文王武王受命為之楨榦之臣以正天下申伯甫侯皆以賢知入為卿士尹吉甫作崧高美宣王其詩曰維嶽降神生甫及申維申及甫維周之翰漢曹参為相國清净極言合道然百姓離秦之酷後参與休息無為天下俱稱其美矣郭丹為司徒在朝㢘直公正與侯霸杜林張湛郭伋齊名相善伏湛為司徒時賊徐異卿萬餘人據富平連攻之不下唯云願降司徒伏公光武知湛為青徐所信因遣到平原異卿等即日歸降䕶送雒陽後漢龎参為太尉三公之中参名忠直王暢字叔茂名在八俊靈帝時為司空以水災免而李膺亦免歸故郡二人以直道不容當時天下以暢膺為高士諸危言危行之徒皆推宗之願渉其流惟恐不及魏鍾繇為太尉時司徒華歆司空王朗並先世名臣文帝罷朝謂左右曰此三公者乃一代之偉人也蜀諸葛亮為丞相蜀人以亮蒋琬費禕董允為四相號四英吳諸葛恪輔㓜主孫休為太傅罷視聽息校官原逋責除闗税事崇恩澤衆莫不悦恪每出入百姓延頸思見其狀晉衛瓘為司空為政清簡甚得朝野聲譽王導為太保蘇峻難作導入宫侍帝峻以導徳望不敢加害猶以本官居己之右宋王𢎞為太保明敏有思致既以民望所宗造次必存禮法後魏長孫嵩為司徒與山隂侯奚斥北新侯安同白馬侯崔宏等八人坐車門外聽理萬機故世號八公和其奴獻文帝時為司空侍中皇興三年薨内外咸歎惜之贈平昌王謚曰宣北齊趙彥深為司徒孝昭既執政權羣臣宻多勸進彥深獨不敢言孝昭嘗謂王晞云若言衆心皆謂天下有歸何不見彥深有語晞以告彥深彥深不獲已陳請其為時重如此隋楊雄為司空貴寵冠絶一時與高熲虞慶則蘇威稱為四貴高熲為左僕射兼納言有文武大畧明達世務及蒙任寄之後竭誠盡節引進貞良以天下為己任蘇威楊素賀若弼韓擒虎等皆熲所推薦各盡其用為一代名臣自餘立功立事者不可勝數當朝執政将二十年朝野推服物無異議治致昇平熲之力也論者以為真宰相唐房𤣥齡貞觀初與杜如晦為左右僕射共掌朝政至於臺閣規模及典章文物皆二人所定甚獲當代之譽談良相者至今稱房杜焉侯君集為兵部尚書參議朝政遷吏部尚書君集典選舉定考課出為将領入參朝政並有時譽高士㢘為侍中性明辨進止可觀凡有獻納縉紳之士莫不屬目郝處俊高宗儀鳯四年為侍中處俊性儉素土木形骸自參綜朝政每與帝言議必引經籍以應對多有禆益得大臣之體李懐逺則天中宗時歴秋官尚書右㪚騎常侍同中書門下三品趙郡公兩朝宰相年高行直名重當時陸象先睿宗初為中書侍郎太平公主将引中書侍郎崔湜知政事宻以告之湜固讓象先主不許之湜曰象先人望宜在樞近若不登用則湜亦請辭公主遽言於睿宗遂命象先同平章事韓休開元二十四年拜黃門侍郎同中書門下平章事休性方直不務進趨及拜相甚允當時之望韋見素為左相天寶十五載𤣥宗幸蜀至馬嵬從駕諸軍既殺楊國忠時見素為亂兵所傷衆𫝊聲曰勿傷韋相識者遽救之獲免張鎬博州人天寶末自褐衣為左拾遺肅宗即位拜諫議大夫尋遷中書侍郎平章事鎬自入仕凡三年致位宰相謙恭下士善談論多識大體故天下具瞻雖考秩至淺推有舊徳李揆為中書侍郎平章事揆美風儀善奏對毎有敷陳甚得稱辯肅宗賞歎之嘗謂曰卿門第人物文章皆當代所推故時人稱為三絶楊綰代宗時為中書侍郎平章事綰素以徳行著稱質性貞廉車服儉朴居廟堂未數日人心自化御史中丞崔寛劔南西川節度寧之弟家富於財墅在皇城之南池舘臺榭當時第一寛即日潛遣毁折中書令郭子儀在邠州行營聞綰拜相座内音樂咸撤五分之四京兆尹黎幹以承恩每出入馳馭百餘人亦即日减損車騎唯留十騎而已其餘望風變奢從儉者不可勝數其鎮俗移風若此葢楊震丙吉山濤謝安之儔也楊炎徳宗初為門下侍郎平章事炎有風儀善談論又博以文學早負時稱天下翕然望為賢相請出内庫錢帛付之有司以制國用行兩税法救時之弊頗有嘉聲鄭珣瑜順宗初為吏部尚書平章事與諸相方㑹食王叔文至與韋執誼計事執誼起迎叔文就其閣與語同食諸相等心知不可畏懼叔文執誼等莫敢出言珣瑜獨歎曰吾豈可復處此乎顧左右取馬徑歸遂不起前是左僕射平章事魏國公賈耽以病歸第未起珣瑜又繼去二相皆天下重望相次歸卧叔文執誼等益無所顧忌逺近大懼李吉甫憲宗時為中書侍郎平章事性聰敏詳練物務自員外郎出官留滯江淮十五餘年備言閭里疾苦及是為相患方鎮貪恣乃上言使屬郡刺史得自為政敘進羣材甚有美稱裴垍元和中同平章事議者謂垍作相材與時㑹知無不為于時朝無幸人百度寖理而再周遘疾以至休謝公論甚惜之權徳輿為吏部尚書平章事徳輿羽儀朝行性直亮寛恕動作語言一無外飾韞藉風流為時稱嚮李藩為門下侍郎平章事藩材能不及裴垍孤峻頗後韋貫之然人物清規亦其流也鄭餘慶為中書侍郎平章事徳宗與宰臣議将賑給禁衛十軍事未行為中書吏所洩坐貶郴州司馬憲宗即位之月以尚書左丞平章事尋罷相為太子賔客餘慶再為宰相罷免皆非大過尤以清儉為時所稱洎中外薦更欝為耆徳朝廷得失言無低徊崔羣元和中為平章事有冲識精裁為時賢相裴度為中書侍郎平章事出討淮蔡又宻計平李師道成憲皇中興之基當時有奉使絶域夷狄之君咸問度之年齡詢度之儀質其威名逺著擬於汾陽後為東都留守時有使臣自幽鎮來者奏軍中言度在相位兩河諸侯忠者懐徳强者畏威度今在東人皆失望穆宗乃急召赴闕復為門下侍郎平章事蕭俛為門下侍郎平章事居相位孜孜正道時論稱之及罷相後累有端揆喉舌之拜悉讓而退就散秩以孝養為樂高名懿行天下推仰曹確與畢誠俱以儒術進用及居相位㢘潔貞苦君子多之稱為曹畢後唐趙光逢兩登廊廟百行五常不欺闇室縉紳咸仰以為名教宗主周馮道自後唐至是厯任四朝三入中書在相位二十餘年以持重鎮俗為己任事具宰輔徳行門鄭仁誨為樞宻使為人端厚謙損造次必由於禮在帝左右弼諧將順甚得大臣之體雖權位崇重而能孜孜接物無自矜之色及終故朝廷咸惜之清儉書稱克儉𫝊美能貧先儒有云以約失之者鮮矣其有位居宰弼總司邦正祿廩豐腆賜予優渥而能屛奢泰之志絶宴安之念居處僻陋服御純素嗇於奉己厚於待士施周於親黨清遺於子孫辭賂而畏知薄葬以全節斯皆守正秉彞經徳蹈道躬大雅之明哲得天命之中庸故能居簡以為常克終而有裕偃息巖廟輔相天地形四方之風為萬邦之憲者也漢蕭何為相國置田宅必居窮辟處辟隱也為家不治垣屋垣墻也令後世賢師吾儉不賢毋為勢家所奪公孫𢎞為丞相封平津侯於是起客館開東閣以延賢人與參謀議𢎞自食一肉脱粟飯脱粟而已不精潔也故人賔客仰衣食奉祿皆以給之家無所餘朱博為大司空為人㢘儉不好酒色㳺宴自㣲賤至富貴食不重味案上不過三桮夜寢早起妻希見其面後漢張奮為司空在位清白無它異績蔡茂為大司徒在職清儉匪懈范遷為司徒有宅數畆田不過一頃復推與兄子其妻嘗謂曰君有四子而無立錐之地可餘奉祿以為後世業遷曰吾備位大臣而蓄財求利何以示後世在位四年薨家無擔石焉郭丹為司徒坐事免卒於家後明帝因朝㑹問羣臣郭丹家今何如宗正劉政對曰昔孫叔敖相楚馬不秣粟妻不衣帛子孫竟蒙寢丘之封丹出典州郡入為三公而家無遺産子孫困匱帝乃下南陽訪求其嗣劉寵為太尉以日食䇿免歸鄉里寵前後歴宰二郡八居九列四登三司家不藏賄無重寳器菲飲食薄衣服弊車羸馬號為窶陋三去相位輙歸本土往來京師嘗下道脱驂過從人莫知焉寵嘗欲止亭亭吏止之曰整頓傳舍以待劉公不可得止寵因過去其㢘儉皆此類也虞延為司徒坐楚王英事詔書切讓延遂自殺家至清貧子孫不免寒餒周章為司空宻謀立平原王事覺自殺家無餘財諸子易衣而出并日而食鄧彪為太尉在位清白為百僚式李咸為太尉自在相位約身率下嘗食脱粟飯醬菜而已以老乞骸骨許之悉還所賜物乗弊牛車使子男御晨發京師百僚追送盈途不能得見家舊貧陋庇廕草廬橋𤣥為太尉以久病䇿罷卒家貧乏産業柩無所殯當世以此稱為名臣魏華歆為司徒素清貧祿賜以賑施親戚故人家無擔石之儲蜀諸葛亮為丞相自表後主曰成都有桑八百株薄田十五頃子弟衣食自有餘饒至於臣在外任無别調度隨身衣食悉仰於官不别治生以長尺寸若臣死之日不使内有餘帛外有贏財以負陛下及卒如其所言費禕為大將軍録尚書事雅性謙素家不積財兒子皆令布衣素食出入不從車騎無異凡人呉呂岱為大司馬清身奉公所在可述晉張華為司空雅愛書籍身死之日家無餘財惟有文史溢于几篋王導為司徒簡素寡欲倉無儲榖衣不重帛成帝知之給布萬匹以供私費宋袁粲為司徒宅字平素器物取給粲素寡往來門無雜客南齊禇淵初仕宋為中書令與尚書令袁粲同輔㓜主淵同心理庶事當奢侈之後務𢎞儉約百姓賴之武帝時厯司空録尚書事及薨家無餘財負債至數十萬王儉為侍中尚書令寡嗜慾唯以經國為務車服塵素年三十八薨家無遺財後魏長孫道生太武時為司空侍中性㢘約身為三司而衣不華飾食不兼味一熊皮障泥數十年不易時人比之晏嬰唐溫彦博太宗時為尚書左僕射掌機務性儉素不營第宅及卒日殯於陋室太宗甚憫之特命有司為之堂焉魏徴貞觀中累居相位及病綿惙中使相望徴宅先無正寢太宗欲為小殿輟其財為徴營構五日而成又遣中使齎布被素褥而賜之遂其所尚也李義琰高宗時同中書門下三品宅無正寢弟義璡為岐州司功參軍乃市堂材送焉及義璡來覲義琰謂曰以吾為國相豈不懐愧更營美室是速吾禍此豈愛我之意哉義璡曰凡人仕為丞尉即營第宅兄官高祿重豈宜卑陋以偪下也義琰曰事難兼遂物不兩興既有貴仕又廣其宇若無令徳必受其殃吾非不欲之懼獲戾也竟不營構其木為霖雨所腐而棄之李懐逺中宗初同中書門下三品雖久居榮位而𢎞尚簡率園宅無所改作常乗欵段馬左僕射豆盧欽望謂曰公榮貴如此何不買駿乗答曰此馬幸免驚蹶無假别求聞者莫不歎美李元紘同平章事封清水男元紘性清儉稍抑奔競之路在政事累年不改第宅僕馬弊劣未曽改飾所得封物皆散之親族杜暹同平章事以公清勤儉為己任時亦矯情為之弱冠便自誓不受親友贈遺以終其身及卒内出絹三百匹以賜之尚書省及故吏􅉠贈者其子孝友遵其素約拒而不受蘇瓌中宗睿宗朝厯左右僕射同中書門下三品及薨遺令薄葬及祖載之日官給仗外唯有布車一乗論者稱之盧懷慎開元初為黃門監清儉不營産業器用服飾無金玉綺文之麗所得祿奉皆隨時分散及卒而家無餘蓄妻子匱乏黃門監宋璟紫㣲令蘇頲等奏曰太學助敎張知謙與臣等言論故黃門監盧懷慎清儉身死之日家無餘財遺嗣貧窶衣食不給伏以懷慎歴官中外數十餘年晩在黃門足為貴秩清約守道朝廷共推親弟懷莊雖居朝列然其簡身素謹亦有兄風妻子居貧無可以給聖朝褒賢勸善激濁揚清貪婪者靡不棄捐介潔者宜應念録况富本榮業所貴能散天地至仁所貴能養行賞必於合義賜與難以妄加知懷慎者既曽任宰臣特承皇眷施舍可愛沮勸斯在臣等暗識不早陳聞知謙上言理足甄用望出制論懷慎平生苦更賜其家物一百叚粟二百石以示不遺從之張鎬至徳中平章事居身清㢘不營資産楊綰大厯中平章事儉薄自守未嘗留意家産口不問生事累任清要無宅一區所得俸祿隨月分給親故韓滉貞元初為相自居重位愈清㢘嫉惡彌縫闕漏知無不為家人資産未嘗介意入仕之初以至卿相凡四十年相繼乗馬五匹皆及弊帷李勉在相位向二十年祿俸皆遺親黨身沒而無私積趙退翁貞元中為門下侍郎平章事性清儉雖為宰相宅宇居止之處類貧士大夫也所得祿俸先置私廟而竟不立第宅産業柳渾性節儉不理産業官至宰相假宅而居李吉甫為相雖服物食味必極珍美而不殖財産京師一宅之外無他第墅公論以此重之程异為宰相性廉約身没官第家無羨財鄭餘慶四朝居相將之位出入垂五十年祿賜所得多分給親黨其家頗類寒素自至徳已來方鎮除授必遣中使領旌節就第宣賜皆厚以金帛遺之求媚者唯恐其數不廣故王人一求有獲錢數百萬者餘慶毎受方任天子必戒其使曰餘慶家貧不得妄有求取宋申錫為相為中尉王守澄所搆再貶開州司馬申錫自居内廷及為宰相以時風侈靡居要位者尤取納遂成風俗不暇更方逺古且與貞元時甚相背矣申錫至此約身勤潔尤以公亷為己任四方問遺悉無所受既被罪為有司驗劾多獲其四方受領所還問遺之狀朝野為之歎息鄭覃至相國所居未常增飾纔庇風雨家無媵妾人皆仰其素風焉後唐李愚為中書侍郎平章事長興四年二月愚病明宗令中使宣問愚所居寢室蕭然四壁病榻弊氊而已中使具言其事帝曰嘻宰相月俸幾何而委頓如此詔賜絹百尺錢百千幃帳什物一十三事周馮道為太師中書令顯徳元年薨道厯仕四朝三入中書在相位二十餘年性㢘儉不為受四方之賂未嘗以片簡擾諸侯私門之内無累茵無重味不畜姬僕不聽絲竹有寒素之風威重𫝊曰有威可畏謂之威又曰君子不重則不威况夫應槐鼎之象處巖廟之尊萬民具瞻四國為憲固宜資性端重容貎祗肅履有常度居無惰容憚服逺夷得真相之體表率羣后有大臣之風所以享高明之寵總裁成之業致逺任重而克濟焉漢霍光為大司馬大将軍為人沉靜詳審毎出入下殿門進止有常處郎僕射竊識視之不失尺寸識記也其資性端正如此車千秋為丞相謹厚有重徳魏相為丞相為人嚴毅薛廣徳為人溫雅有醖藉位至丞相韋賢為丞相守正持重王商為丞相成帝甚重任之商為人多質有威重多質言不為文飾長八尺餘身體鴻大容貎甚過絶人河平四年單于來朝引見白虎殿未央宮中丞相商坐未央庭中單于前拜謁商單于将見天子而經未央庭中過也商起離席與言單于仰視商貌大畏之遷延却退天子聞而歎曰此真漢相矣王嘉為丞相剛直嚴毅有威重哀帝甚敬之後漢趙憙為衞尉代虞延行太尉事居府如真内典宿衞外幹宰職正身立朝未嘗懈惰牟融代伏恭為司空舉動方重甚得大臣節晉魏舒以右光祿大夫儀同三司領司徒有頃即真舒有威重德望後魏于雒拔文成時為侍中尚書令在朝祗肅百僚憚之北齊斛律金為左丞相文宣晩年敗徳嘗持矟走馬以擬金胷者三金立不動於是賜物千段唐李靖為尚書右僕射性沉退每與時宰參議恂恂然似不能言楊綰為中書侍郎平章事或造之者清談終日未嘗及名利或有客欲以世務干者見綰言必𤣥逺不敢發詞内愧而退裴垍為中書侍郎平章事雖年少驟居相位而性峻整有法度雖大僚宿軰造請不敢干以私韋處厚為相居家循易如不克任至於廷諍敷啓及馭待公吏徑確嶷然不可廹奪質狀非魁偉如甚懦者而庶僚請事畏懼相顧雖與語移晷不敢私謁梁張文蔚為相沉邃重厚有大臣之風冊府元龜卷三百十
