  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_701-1a}
body:
  text: 册府元龜卷七百一宋王欽若等撰令長部總序古者列爵惟五分土惟三文軌所通諸侯而已縣道之制盖未聞焉周初小司徒之職都鄙之制四甸為縣方一十里周書千里百縣其名雖肇其地尚小東周之末諸侯强大封内之縣制始盛矣掌其政者魯謂之宰仲尼為中都宰是也齊謂之大夫齊威王封即墨大夫烹阿大夫是也楚謂之尹沈尹戍為方城之外縣尹是也亦謂之公葉公諸梁是也秦氏罷侯置守以郡統縣其制萬户已上置令秩千石至六百石减萬户置長秩五百石至三百石所職治民顯善勸義禁姦罰惡理訟平賦恤民時務秋冬集課上計於所屬郡國其列侯所食者為國國置相所掌如令長皇太后皇后公主所食曰邑有蠻夷曰道皆置令長漢因之秩六百石以上皆銅印墨綬三百石銅印黄綬成帝綏和初又詔長相皆墨綬哀帝建平中復黄綬後漢自千石令至四百石長皆墨綬哀帝三采青赤紺淳青質長丈六尺八十首其屬官丞一人署文書典知倉獄大縣尉二人小縣一人主盗賊各置諸曹掾有廷掾勸農掾制度掾之類其餘大約如郡員丞尉秩四百石至二百石名為長吏計食佐史百石以下名為小吏統内五家為伍十家為什百家為里里有魁以相簡察十里為亭亭置長以禁盗賊十亭為鄉鄉置有秩三老嗇夫凡五千户置有秩秩百石小者置嗇夫皆主知民善惡為役先後知民貧富為賦多少三老掌教化凡孝子順孫貞女義婦讓財救患及學士為民法式者皆表其門以興善行游徼掌徼循禁司姦盗又有鄉佐主收賦税丞尉而下並兩漢之通制也後漢以雒邑京邑所治屬官差多故丞有三人焉魏循漢制晉千户以上及州治下皆置令减此置長並銅印墨綬朝服進賢一梁冠雒陽置六部尉大縣二尉次縣一尉小縣一尉又有主簿錄事史主記室史門下書佐幹游徼議生循行功曹史小史廷掾功曹史小史書佐幹法門曹幹金倉賦曹掾兵曹史吏曹史獄小吏獄門亭長都亭賊捕掾等户不滿三百以下職吏十八人散吏四人三百以上職吏二十八人散吏六人五百以上職吏四十人散吏八人千以上職吏五十三人散吏一十二人千五百以上職吏六十八人散吏一十八人三千以上職吏八十八人散吏二十六人鄴及長安置吏得同三千户之制又縣户百五已上置鄉三千已上置二鄉五千已上置三鄉萬已上置四鄉鄉置嗇夫一人千户已上置治書史一人千户以上置史佐各一人正一人千五百已上置史一人佐二人又統内百户置里吏一人千户以上置較官掾一人又皆置方畧吏四人宋齊已後多如晉制縣令秩千石者銅印環劒墨綬朝服進賢冠兩梁餘並一梁亦有帶雜號將軍而為之者亦有以臺省而帶之者後魏縣置三令長為封國者置相雒陽令其品從五上縣令相其品六中縣令相其品七下縣令相其品七下孝文初制縣令能静一縣刼盗者兼治二縣即食其祿能静二縣者兼治三縣三年遷為郡守太和中復次職令其祿甚厚京官清貧者或帶縣令以優之其後用人益雜但選勤舊令史為之而搢紳耻居焉北齊制縣自上上至下下凡九等之差上上上中縣其品並從五鄴臨漳成安三縣同之上下縣其品六中上中中中下其品從六下上縣其品七下中下下縣其品從七然用人尚濫武成帝捜揚世胄子弟總召集神武門宣㫖慰諭而授之自是始用士人凡上縣有丞尉先迎功曹先迎主簿功曹主簿錄事及兩曹戸曹金曹租曹兵曹等掾市長等員合五十四人上中上下縣逓减五人中上縣减六人中中縣减五人中下至下下縣逓减一人各置白直以供役鄴臨漳成安三縣其員差多鄴又領右部西部三尉凡一百三十五里臨漳又領左部東部二尉凡一百一十四里成安又領後部北部二尉凡七十四里里各置正後周長安萬年縣令正五命七千户以上令亦同之四千户以上縣令正四命二千户以上令四命五百户以上令正三命户百以下令三命隨増大興長安河東雒陽四縣令為正五品諸縣以閒劇衝要為等級屬官改尉為正唐制有赤縣畿縣望縣𦂳縣上縣中縣中下縣下縣之差赤令其品正五畿令其品正六上縣令其品從六望𦂳同之中縣令其品正七下縣令其品從七其後又有次赤次畿之名後魏已後冠服並隨其品焉亦有假臺省官以榮之者屬官置錄事司功司倉司兵司法司士畧如周制丞為副貳如州上佐主簿撿轄如州錄事叅軍尉分治諸曹如州判司統内百户為里里置正五里為鄉置耆老亦曰父老五代因之夫一同之地有社稷焉有吏民焉可以事神可以為政有督責之令有刑罰之威勸課以率下貢賦以奉上盖生民舒惨之所屬國家休戚之所同至于丞尉而下皆亦攸助其治居其任者可不重乎今故銓次其善惡之迹以為後世之戒焉凡二十一門選任褒異公正選任令長參五等之列布一同之政苟非選任曷補風化所以藴幹才而有聲因篤行而辟召若非務其幹蠱守以㢘勤恕察民情精深理道則曷能與於此哉故曰正理之本必在于親人親人之官莫切于令長斯之謂矣漢嚴延年任侍御史坐法致死亡命㑹赦出丞相御史府徴書同日到延年以御史書先至詣御史府復為掾宣帝識之識其前劾霍光擅廢立拜為平陵令尹賞為粟邑令左馮翊薛宣奏賞能治劇徙為頻陽令後以御史舉為鄭令成帝永始元年延間長安中姦猾浸多閭里少年羣輩殺吏受賕報仇或有自怨于吏或受人賄賂為仇讐也相與探丸彈為彈丸作赤黒白三色而共探取之也得赤丸者斫武吏得黒者斫文吏白者主治䘮其黨與有為吏及他人所殺者則主其䘮事也城中薄暮塵起剽刼行者死傷横道枹皷不絶枹擊皷椎也賞以三輔髙第選守長安令得一切便宜從事後漢呉祐以光祿四行遷膠東侯相漢官儀曰四行敦厚質樸遜讓節儉韓韶辟司徒府時太山賊公孫舉偽號歴年守令不能破散多為坐法尚書選三府掾能理劇者乃以韶為嬴長賊聞其賢相戒不入嬴境魏何䕫為太祖司空掾屬時東南多變太祖以東郡為鄼令䕫為城父令諸縣皆用名士以鎮撫之其後吏民稍定鄭揮字文公避難淮南太祖聞其篤行召為邵陵令蜀鄧芝字伯苗先主定益州為郫邸閣督先主出至郫與語大竒之擢為郫令南齊沈憲為左軍司馬太祖以山隂户衆難治欲分為兩縣武帝啓曰縣豈不可治但用不得其人耳乃以憲帶山隂令治聲大著孔稚珪請假東歸謂人曰沈令料事特有天才傅琰初為山隂令有能名及為江夏王錄事參軍太祖輔政以山隂獄訟煩積復以琰為山隂令陳沈君髙為廷尉卿宣帝太建元年東境大水百姓饑敝乃以君髙為貞威將軍呉令蕭𢎞為中庶子以疾去官明年京師多盗乃復起為貞威將軍建康令褚玠為中書侍郎太建中山隂縣多豪猾前後令皆以贓汙免宣帝患之謂中書舍人蔡景厯曰稽隂大邑久無其宰卿文士之内試思其人景厯進曰褚玠㢘儉有幹用未審堪其選不帝曰甚善卿言與朕意同乃除戎昭將軍山隂令北齊路去病為殿中侍御史以正直知名時敕用土人為縣宰以去病為定州饒陽令後周辛昻為龍州長史領龍安郡時事成都一方之㑹風俗舛雜尉遲逈平蜀以昻逹於從政表昻行成都令唐權懷恩髙宗時為尚乘奉御有奉乘安畢羅善于調馬帝頗狎之懷恩因奏事遇畢羅在帝左右言戲無禮懷恩既退執而杖之帝知而嗟賞謂侍臣曰懷恩乃能不避强禦真良吏也即日擢為萬年縣令竇申徳宗時為司勲員外郎貞元二年正月詔曰政理之本必在於親人親人之官莫切于長令臺郎御史選重當時得以分朕之憂司勲員外郎竇申等十人咸以器能精深理道輟於周行往涖通邑申可長安縣令鄭珣瑜檢校吏部員外郎兼奉先縣令常武檢校禮部員外郎兼昭應縣令賈全咸陽縣令兼監察御史韋貞伯藍田縣令兼監察御史崔淙以原縣令兼侍御史王倉檢校比部員外郎兼美原縣令李曾盩厔縣令兼監察御史李鯤富平縣令兼殿中侍御史韋夏卿為刑部員外郎時久旱詔于郎官中選畿赤令繇是改奉天縣令馮伉貞元中為膳部員外郎澤潞節度使李抱真卒充弔贈使抱真男遺伉帛數百疋不納又專送至京伉因表奏固請不受屬醴泉闕縣令宰臣進人名徳宗意不可謂宰臣曰前使澤潞不受財帛者此人必有清政可以授之遂改醴泉縣令梁季文矩為司門郎中太祖開平元年六月以文矩為開之縣令司勲員外郎孫拙為浚儀縣令先是二邑皆吏部注授今昇為赤縣故命二省郎理褒異夫賞有功褒有徳帝王之彛典也古者子男之任實列于諸侯宰字之官或選于郎署盖民政之攸係而教化之所出也西漢而下暨夫五代乃有知識深逺材用周敏潔身以馳譽勤職而集事布優異之政著殊尤之績獄訟稀簡㓂盗衰息以至濟危窘而有備制彊禦而不懾力勸乎耕稼誕宣其條教由是増之爵秩進諸章綬或降彼恩詔臨問其勤勞或載在冊書激勸乎羣萃或寵之蕃錫或賜之嘉名斯皆薫灼其聲猷便蕃其崇奬咸用編次式垂于後漢王尊行美陽令事宣帝行幸雍過虢尊供張如法而辦尊雖行美陽令而就虢供張也以髙第擢為安定太守後漢卓茂前漢末為宻令有異政光武即位下詔褒之拜太𫝊封褒徳侯歐陽歙為原武令光武初平河北到原武見歙在縣修政遷河南都尉孔奮建武初守姑臧長光武詔書以為治有絶迹賜爵闗内侯董宣為雒陽令卒于官光武詔遣使者臨視惟見布被覆尸妻子對哭有麥數斛敝車一乘帝傷之曰董宣㢘潔死乃知之帝以宣嘗為二千石賜文綏葬以大夫禮拜子並為郎中馮魴遷郟令光武車駕西征隗囂潁州盗賊羣起郟賊延褒等衆三千餘人攻圍縣舍魴率吏士七十許人力戰連日弩矢盡城䧟魴乃遁皇帝聞其反即馳赴潁川魴詣行在所帝案行闘處知魴力戰乃嘉之曰此健令也祭彤為襄賁令時賊鈔掠到官誅鉏姦猾縣界清靜詔書増秩一等賜縑百疋寒朗為濟陽令以母䘮去官百姓追思之章帝東廵狩過濟陽三老吏人上陳朗前政狀帝至梁見朗詔三府為辟首由是辟司徒府魯恭為中牟令有異政河南尹袁安上書言狀章帝異之㑹詔百官舉賢良方正恭薦中牟名士王方帝即徴方詣公車禮之與公卿所舉同恭在事三年州舉尤異後拜侍御史魯丕恭之弟也為新野令州課第一擢拜青州刺史陳重為細陽令舉尤異遷㑹稽太守臧旻為盧奴令冀州舉尤異遷揚州刺史童恢為不其令青州舉尤異遷丹陽太守魏楊沛漢末為新鄭長太祖為兖州刺史西迎天子所將千餘人皆無糧沛進乾椹太祖喜後太祖以為鄴令已拜太祖見之問曰以何治鄴沛曰竭盡心力奉宣科法太祖善之顧謂坐席曰諸君皆可畏也賜其生口十人絹百疋既欲以勵之且以報乾椹也崔林河東武城人太祖定冀州召除鄔長冀無車馬單歩之官太祖征壺闗問長吏徳政最者并州刺史張陟以林對于是擢為冀州主簿呉張純字元基補廣徳令治有異績擢為太子輔義都尉晉郤正初仕蜀為祕書郎入晉除安縣令武帝泰始八年詔曰正昔在成都顛沛守義不違忠節及見受用盡心幹事有治理之績以正為巴西太守竇允為謁者泰始中詔曰當官者能潔身修己然後在公之節乃全身善有章雖賤必賞此興化立教之務也謁者竇允前為浩長以修勤清白見稱河右是當擢用使立行者有所勸主者詳復叅訪有以旌表之拜臨水令夏謖為鄴令卒咸寧元年以謖有清稱賜榖百斛宋劉真道為錢塘令文帝元嘉十三年東饑帝遣揚州治中從事史沈演之廵行在所演之上表薦真道政績為治民之良宰帝嘉之賜榖千斛以真道為歩兵校尉江秉之為山隂令以在縣有能遷補新安太守梁何逺為武康令勵㢘節正身率職民甚稱之髙祖聞其能擢為宣城太守自縣為近畿大郡近代未之有也陳褚玠為山隂令縣民張次的王休達等與諸猾吏賄賂通姦全丁大户類多隱沒玠乃鎻次的等以其狀啓臺宣帝手勑慰勞北齊薛琡初仕後魏為雒陽令孝明時京師久旱悉召集華林理問惟雒陽獄有三人帝嘉之賜絹百疋後周路去病初仕北齊為饒陽令有能名武帝平齊重其能官隂郡守公孫景茂二人不被替代發詔褒揚隋房恭懿髙祖開皇初吏部尚書蘇威薦為新豐令政為三輔之最時雍諸縣令每朔謁帝見恭懿必呼至榻前訪以理人之術蘇重薦之超授澤州司馬劉曠為臨潁令清名善政為天下第一尚書左僕射髙熲言其狀髙祖召之及引見勞之曰天下縣令固多矣卿能獨異于衆良足美也顧謂侍臣曰若不殊奬何以勸于天下優詔擢拜黄州刺史郭絢為漆縣丞煬帝問納言蘇威天下清名第一者誰威以絢對帝賜絢帛百疋令朝集使送至郡郊以旌異焉唐李大亮髙祖武徳初為土門令勸以墾闢歳因大稔時太宗居藩撫廵北境聞而嘉之賜馬一疋帛五十叚王甫武徳初年為醴泉縣令有善政賜帛五十叚賞之賈敦實為饒陽令政化清凈老幼懷之時兄敦頥復授瀛州刺史舊制大功已上不復連官朝廷以其兄弟在職俱有能名遂不遷替韋崇徳為葉縣令髙宗咸亨二年冬幸許汝等州詔賜崇徳絹百疋表清節也鄧𤣥挺為頓丘令為縣有異政璽書勞問馮元淑為清漳令政有殊績又歴浚儀始平二縣令中宗時降璽書勞勉仍令史官編其事迹李朝隱為長安令有宦官内寺伯干以非法朝隱正色叱之仍繫于獄睿宗下制褒之曰夫不吐剛而諂上不茹柔而黷下者君子之事也踐霤必繩登車無屈者正人之務也中大夫行長安縣令李朝隱見義不囘强直自遂亟聞佳政累著能名近者中官入官有干儀式遂能責之以禮繩之以愆但宦竪之流多有憑恃柔寛之代必弄威權每觀載籍嘗為嘆息朕䂓戒前古勤求典憲能副朕意實在斯人虞延持皇后之客梅陶鞭太子之傅古稱遺直復見于今思欲旌其美行遷以重職為時當閲户政在養人宜加一階用表剛烈劉思穆為深州饒陽縣令崔懷嶷為冀州信都縣令𤣥宗開元三年並以課績居最各賜物三十疋勑有司待秩滿日優與處分唐昇為河東縣令代宗大厯七年褒昇階至朝散大夫更留三年旌善政也韋滌為涇陽令徳宗貞元二年正月詔曰滌有禦灾之術有字物之方人不流亡事皆辦集惟是一邑之内獨無愁怨之聲古之循良何以邁此可檢校工部員外郎兼本官賜緋魚袋并賜衣一襲絹一百疋馬一匹凡百君子各宜自勉鄭珣瑜為奉先令韋武為昭應令崔琮為華元令韋貞伯為藍田令李曾為盩厔令貞元三年五月詔以珣瑜為饒州刺史武為遂州刺史琮為歙州刺史貞伯為舒州刺史曾為郢州刺史錄善政也各賜馬一匹并綵物衣服以遣之王正雅為萬年縣令當穆宗時京邑號為難理正雅抑强扶弱政甚有聲㑹柳公綽為京兆尹於帝前褒稱帝命以緋衣銀章就縣宣賜遷户部郎中梁劉羣為長子令開平二年三月太祖在澤州羣率人户來見且言久在山谷保䕶親族每與軍前潜探報蕃賊行止時亦供餽芻粟逓相告報帝嘉其忠節乃賜羣章服百姓賑而遣之李濟美為開封令薛昭文為浚儀令乾化二年開封尹以其課最來上請未除替勑曰李濟美等宰邑浩穰有及物之政朕甚嘉之宜量留一年後唐王延禧攝湯隂縣令柳承翰攝主簿明宗天成元年八月並賜緋魚袋以帝赴難時經過供頓之勞也李温美為博州武水縣令廢帝清泰二年縣民郭贇而下再經州將陳狀乞奏留之觀察使言温美公廉無濫賦于民實為良吏詔曰州縣量留已有規制李温美賜緋魚袋晉趙賚為壽長令髙祖天祐四年七月詔考滿之外量留三年飛蝗避境故也漢劉繼儒晉末為晉陽縣令兼昌陵臺令開運三年詔曰興王舊地原廟所存載懷瞻奉之心允屬循良之吏以爾蒞官有政晉人美之假其省銜許留周歳更圖盡瘁以稱陟明可檢校工部員外郎仍量留一年從北京奏故也周劉表㣲為新安令太祖廣順元年遷河東府司錄參軍奬能吏也公正古者子男居五等之列令宰為百里之長人民社稷之攸繫政教威令之所出故名器斯重選任非易歴代而下惟賢是圖乃有禀剛方之性勵貞固之操中立不倚當官而行拒非理之求絶諂上之迹謹守科法靡顧彊禦惟公是狥惟弊是革以至矯偷薄之俗弃印綬而去者咸足多尚者已齊晏嬰字平仲治東阿三年景公召而數之曰吾以子為可而使子治東阿今子治而亂子退而自察也寡人將加大誅乎晏子曰臣請改道易行而治東阿三年不治臣請死之景公許之于是明年上計景公迎而賀之曰善矣子之治東阿也晏子對曰前臣之治東阿屬託不行貨賂不至陂池之魚以利貧民當此之時民無饑者而君反以罪今臣之治東阿也屬託行貨賂至事左右陂池之魚入權家民之饑者過半君反迎而賀臣臣願乞骸骨公乃下席而謝曰子强復治之東阿者子之東阿也人無復與焉後漢虞延少為户牖亭長時王莽貴人魏氏賔客放縱延率吏卒突入其家捕之以此見怨故位不升陳球為繁陽令時魏郡太守諷縣求納貨賄球不與之太守怒而撾督郵欲令逐球督郵不肯袁安初為縣功曹奉檄詣從事因安致書于令安曰公事自有郵驛私情則非功曹所持辭不肯受從事懼然而止趙儼為郎陵長陽安太守李通妻伯父犯法儼收治致之大辟是時殺生之柄决于牧守通妻子號泣以請其命通曰方與曹公戮力義不以私廢公嘉儼執憲不阿與為親交武周為下邳令時徐州刺史沛國公臧覇敬異周身詣令舍部從事謥調不法周得其罪便收考竟覇益以善周周規為臨湘令長沙太守程徐二月行縣敕諸縣治道規以方春向農民多劇務不欲奪人良時徐出督郵責規即委官而去徐憮然有愧色遣功曹齎印綬檄書謝請還歸規謂功曹曰程府君愛馬蹄不重民力徑逝不顧魏滿寵漢末為許令故太尉楊彪收付縣獄尚書令荀彧少府孔融等並屬寵但當受詞勿加考掠寵一無所報考訊如法數日求見太祖言之曰楊彪考訊無他詞語當殺者宜先彰其罪此人有名海内若罪不明必大失民望竊為明公惜之太祖即日赦出彪初彧融聞考掠彪皆怒及因此得了更善寵司馬芝為廣平令征虜將軍劉勲貴寵驕豪又芝故郡將賔客子弟在界數犯法勲與芝書不著姓名而多所屬託芝不報其書一皆如法後勲以不軌誅交闗者皆獲罪而芝以此見稱呉陶謙為舒令郡太守張磐同郡先輩與謙父友謙耻為之屈當舞屬謙謙不為起固强之乃舞舞入不轉磐曰不當轉耶曰不可轉轉則勝人晉李宻為温令而憎疾從事嘗與人書曰慶父不死魯難未已從事白其書司𨽻司𨽻以宻在縣清慎弗之劾也宻政化嚴明中山諸王每過温縣必賫求供給温吏民患之及宻至中山王過縣欲求芻茭薪蒸宻牋引髙祖過沛賔禮老㓜桑梓之供一無煩擾伏惟明王孝思惟則動識先戒本國望風式歌且舞誅求之辟所未聞命自後諸王過不敢有煩隴西圭司馬子舒深敬友宻而貴勢之家憚其公正前秦徐嵩為長安令貴戚子弟犯法者嵩一皆考竟請託路絶苻堅甚竒之謂其叔父咸曰人為長吏故當應耳此年少落落有端貳之才南齊孔逭為陽羡長義興太守王繢輙錄郡吏陳伯喜付陽羡獄欲殺之逭不知何罪不受繢教為有司所奏繢坐白衣領職梁顧憲之初仕宋為建康令至于權要請託長吏貪殘據法直䋲無所阿縱羅研為信安令故事置勸農謁者圍桑度田勞擾百姓研請除其弊從之隋劉行本為太子左庶子以本官領大興令權貴憚其方直無敢至門者由是請託路絶法令清簡吏民懷之唐李義琰為太原尉時李勣為并州都督僚吏皆望風慴伏義琰獨挺持曲直勣甚禮之李元素為武徳令時州將李文暕將調率金銀造嘗滿鐏以獻百姓甚弊之而官吏無敢異議者元素抗詞固執文暕乃損其制度以家財營之楊瑒為麟遊令時御史大夫竇懷貞檢校造金仙玉仙二觀移牒近縣徴百姓所隱逆人資財以充觀用瑒拒而不受懷貞怒曰焉有縣令卑㣲敢拒大夫之命乎瑒曰所論為人寃抑不知計位髙卑貞壯其對遂寢其事又中宗時韋庶人上表請以年二十二為丁限及韋氏敗省司舉徴租調瑒執曰韋庶人臨朝當國制書非一或進階卿士或赦宥罪人何獨于已役中男重徴丁課恐非保人之術省司遂依瑒所執一切免之薛訥為藍田令有富商倪氏于御史臺理其私債中丞來俊臣受其貨財斷取義倉粟數千石以給之訥曰義倉本備水旱以為儲蓄安敢絶衆人之命以資一家之産竟執之不與㑹俊臣得罪其事遂寢後唐羅貫為河南縣令貫為人强直正身奉法不避權豪時宦官伶人用事凡請託于貫者其書盈閣一無所報皆以示郭崇韜崇韜因奏其事由是左右毎言貫之失册府元龜卷七百一
