body:
  text: 册府元龜卷九百十七宋王欽若等撰總録部矜衒改節矜衒夫不矜者世莫能爭功自衒者士謂之醜行蓋夫處卑以自牧持盈而若冲敦後已之風勵崇讓之操斯可以厠於君子之林矣其或内懷滿假靡思撝挹自負其才美盛稱其智勇形於言色驕乎儕輩激昻其氣概以詫厥能夸大其貴勢以耀於衆蓋雖有周公之藝亦不足觀如若成之傲適足取禍又况𤣥元申戒矜者不長伯益垂訓滿以招損者哉禮至衛大夫謀伐邢以昆弟仕焉既伐邢二禮從國子巡城掖以赴外殺之衛侯燬滅邢禮至為銘曰余掖殺國子莫余敢止惡其不知恥詐以滅同姓而反銘功於器州綽晉大夫奔於齊齊莊公朝指殖綽郭最曰是寡人之雄也州綽曰君以為雄誰敢不雄然臣不敏平隂之役先二子鳴晉伐齊及平隂州綽獲殖綽郭最故自比於雞鬭勝曰先鳴莊公為勇爵設爵位以命勇士殖綽郭最欲與焉自以為勇州綽曰東閭之役臣左驂迫還於門中識其枚數識門枚數其可以與於此乎公曰子為晉君也對曰臣為𨽻新言但為僕𨽻尚新矣然二子者譬於禽獸臣食其肉而寢處其皮矣言嘗射得之顔息魯人定公八年侵齊門於陽州息射人中眉退曰吾無勇吾志其目也以自矜蘇秦東周人為從約長并相六國北報趙王乃行過雒陽車騎輜重諸侯各發使送之甚衆擬於王者周顯王聞之恐懼除道使人郊勞賓至近郊君使卿朝服用束帛勞蘇秦之昆弟妻嫂側目不敢仰視俯伏侍取食蘇秦笑謂其嫂曰何前倨而後恭也嫂委蛇匍匐以面攬地而謝曰見季子位高金多也蘇秦字季子蘇秦喟然歎曰此一人之身富貴則親戚畏懼之貧賤則輕易之况衆人乎且使我有雒陽負郭田二頃吾豈能佩六國相印乎毛遂為平原君門下食客平原君合從於楚與門下有文武具備者二十人偕得十九人餘無可取者遂自贊於平原君備員而行比至楚言其利害日出而言之日中不決遂按劎歴階而上楚王叱之遂曰合從者為楚非為趙也楚王曰唯唯既定從於殿上遂左手持盤盂而右手招十九人曰公相與㰱此血於堂下公等録録音禄所謂因人成事者也漢王仲翁為給事中初仲翁與蕭望之等數人皆補大將軍史三歲間仲翁至光禄大夫給事中望之以射䇿甲科為郎署小苑東門候署補署也門候主候時而開閉也仲翁出入從倉頭廬兒皆官府之給賤役者下車趨門傳呼甚寵顧謂望之曰不肯録録反抱關為望之曰各從其志楊惲為光禄勲居殿中亷潔無私郎官稱公平然惲伐其行治自矜其節行及政治之能也後漢楊政為左中郎將為人不拘小節果敢自矜然篤於義桓榮光武時為太子少傅賜以輜車乘馬榮大㑹諸生陳其車馬印綬曰今日所蒙稽古之力也戴良汝南慎陽人才既高達而議論尚竒多駭流俗同郡謝季孝問曰子自視天下孰可為比良曰我若仲尼長魯國大禹出西羌獨步天下誰與為偶魏許攸字子逺少與袁紹及太祖善獻帝初平中隨紹在冀州嘗在坐席言議官渡之役諫紹勿與太祖相攻紹自以彊盛必欲極其兵勢攸知不可為謀乃亡詣太祖紹破走及後得冀州攸有功焉攸自恃勲勞時與太祖相戲每在席不自限齊至呼太祖小字曰某甲卿不得我不得冀州也太祖笑曰汝言是也然内嫌之其後從行出鄴東門顧謂左右曰此家非得我則不得出入此門也人有白之者遂收而殺之晉郤詵為雍州刺史武帝於東堂㑹送問詵曰卿自以為如何詵對曰臣舉賢良對䇿為天下第一猶桂林之一枝崑山之片玉帝笑侍中奏免詵官帝曰吾與之戲爾不足責周顗為尚書左僕射領吏部庾亮嘗謂顗曰諸人咸以君方樂廣顗曰何乃刻畫無鹽唐突西施也韋諛仕冉閔為光禄大夫性不嚴重好狥巳之功論者亦以是少之嘗謂其子伯陽曰我高我曽重光累徽我祖我考父父子子汝為我對正值惡抵伯陽曰伯陽之不肖誠如尊教尊亦正值軟抵爾諛慙無言時人傳之以為嗤笑顧愷之為散騎常侍博學有才氣矜伐過實少年因相稱譽以為戲弄嘗為箏賦成謂人曰吾賦之比稽康琴不賞者必以後出相遺深識者亦當以高竒見貴劉惔為丹陽尹性簡傲桓温嘗問惔㑹稽王談更進耶惔曰極進然故第二流爾温曰第一復誰惔曰故在我輩其高自標置如此王坦之為大司馬桓温長史有重名僕射江虨音彬虎文也領選將擬為尚書郎坦之聞曰自過江來尚書郎正用第二人何得以此見擬虨遂止袁宏為大司馬記室與伏滔同在桓温府府中呼為袁伏宏心恥之每歎曰公之厚恩本優國士而與滔比肩何辱之甚伏滔為著作郎專掌國史領本州大中正孝武帝㑹於西堂滔與坐還下車先呼子系之謂曰百人高㑹天子先問伏滔在坐不此故未易得為人作父如此定何如也宋劉穆之為丹陽尹初穆之家貧其妻江嗣女穆之嘗往江氏食畢求檳榔江氏兄弟戲之曰檳榔消食君乃常饑何忽湏此妻復截髮市餚饌為其兄弟以餉穆之自此不對穆之梳沐及穆之為丹陽尹將召妻兄弟妻泣而稽顙以致謝穆之曰本不慝怨無所致憂及至醉穆之乃令厨人以金柈貯檳榔一斛以進之王宏字體元宋國初建遷尚書僕射弟曇首為琅琊王大司馬府屬從高祖北征行至彭城高祖大㑹戲馬臺與坐者皆賦詩曇首文先成高祖覽讀因問宏曰卿弟何如卿宏答曰若但如下官門户何寄高祖大笑荀伯子為司徒左長史東陽太守嘗自矜廕籍之美謂車騎將軍王宏曰天下膏粱唯使君與下官爾宣明之徒不可數也袁淑為始興王濬征北長史南東海太守淑始到府濬引見謂曰不意舅遂垂屈佐淑答曰朝廷遣下官本以光公府望也袁粲為中書令清整有風操自遇甚厚嘗著妙德先生傳以續稽康高士傳以自况曰有妙德先生陳國人也氣志淵虚姿神清映性孝履順棲冲業簡有舜之遺風先生幼夙多疾性疎懶無營尚然九流百氏之言雕龍掞天之藝皆汎識其大歸而不以成名家貧嘗仕非其好也混其聲迹晦其心用席門嘗掩三逕裁通雖楊子寂寞嚴叟沈冥不是過也修道遂志終無得而稱焉又嘗謂周旋人曰昔有一國國中一水號曰狂泉國人飲此水無不狂唯國君穿井而汲獨得無恙國人既並狂反謂國主之不狂為狂於是聚謀共執國主療其狂疾火艾針藥莫不畢具國主不任其苦於是到泉所酌水飲之飲畢便狂君臣大小其狂若一衆乃歡然我既不狂難以獨立比亦欲試飲此水南齊袁嘏為諸暨令嘗自重其文謂人云我詩應湏大材迮之不爾飛去明帝建武末為王敬則所殺吳邁逺史失其爵里好為編章宋明帝聞而召之及見曰此人連編之外無所復有邁逺好自誇而蚩鄙他人每作詩得稱意語輙擲地呼曰曹子建何足數哉丘靈鞠為長沙王車騎長史好飲酒臧否人物嘗在沈淵座見王儉詩淵曰王令文章大進靈鞠曰何如我未進時此言達儉靈鞠宋世文名其盛入齊頗减蓬髮弛縱無形儀不治家業王儉謂人曰丘公仕宦不進才亦退矣劉繪武帝時為中書郎以辭辯勑接魏使事畢當撰語辭繪謂人曰無論潤色未易但得我語亦難矣張融為太子中庶子自名集為玉海司徒褚淵問玉海名融答玉以比德海崇上善文集數十卷行於世梁沈約為侍中撰四聲譜以為在昔詞人累千載而不悟而獨得於胷襟窮其妙㫖自謂入神之作武帝不好焉後魏裴叔業仕南齊為徐州刺史時孝文南巡車駕次鍾離叔業以水軍入淮去王師數十里孝文令尚書郎中裴聿往與之語叔業盛飾左右服翫以誇聿曰我在南富貴正如此豈若彼之儉陋也聿云伯父儀服誠為美麗但恨不晝遊爾崔浩太武時為左光禄大夫性敏達長於謀計嘗自比張良謂已稽古過之李彪為御史中尉彪子志及女婕妤並幼慧始彪竒志及婕妤特加器愛公私坐集必自稱詠由是為孝文所貴宋弁為尚書殿中郎中性好矜伐自許膏腴孝文以郭祚晉魏名門從容謂弁曰卿固應推郭祚之門也弁笑曰臣家未肯推祚孝文曰卿自漢魏以來既無高官又無雋秀何得不推弁曰臣清素自立要爾不推侍臣出後孝文謂彭城王勰曰弁人身良自不惡乃復欲以門户自矜殊為可怪弁位至右衛將軍穆弼有名於世矜已凌物頗以損焉孝明時位至平南將軍北齊張雕武成時為假儀同三司方委以朝政雕便以澄清為已任意氣甚高嘗在朝堂謂鄭子信曰向入省中見賢家唐令處分極無所以若作數行兵帳雕不如邕若致主堯舜身居稷契則邕不如我其矜誕如此崔㥄為七兵尚書每以籍地自矜謂盧元明曰天下盛門唯我與爾博崔趙李何事者哉崔暹聞而銜之劉晝舉秀才不第撰高才不遇傳三篇自謂博物竒才言好矜大每云使我數十卷書行於後世不易齊景之千駟也而容止舒緩舉動不倫由是竟無仕進隋崔􅟡字岐叔在北齊時每以讀書為務負恃才地忽畧世人大署其户曰不讀五千卷書者無得入此室唐嚴武中書侍郎挺之子肅宗至德中房琯為相薦為京兆少尹時年三十二以史思明阻兵不之官優游京師頗自矜大出為緜州刺史劒南東川節度使李紳文宗開成中為宣武軍節度使自奏境内蝗不食苗有詔嘉之尋令刋石於州之相國精舍士大夫無不哂之鄭仁表洎之子也文章尤稱俊拔然恃才傲物人士薄之自謂門地人物文章具美嘗曰天瑞有五色雲人瑞有鄭仁表劉鄴少時投文於洎仁表兄弟嗤鄙之咸通末鄴為宰相仁表竟貶死南荒後唐盧程為莊宗太原府推官尋改支使程褊淺無他才惟矜恃門地口多是非篤厚君子尤薄之胡裝為魏州館驛巡官未幾授監察御史裏行遷節度巡官賜緋魚袋尋歴推官檢校員外郎裝學書無師法工詩非作者僻於題壁所至宫亭寺觀必書爵里人或譏之不以為媿晉曹國珍為給事中性頗剛僻經藝文學非其所長好自矜衒多上章疏文字差誤數數有之為縉紳所誚改節夫鮮克有終詩人攸刺信道不篤君子是恥乃有操心靡固素履用愆枉尺直尋改柯易葉先貞而後黷棄本而趨末虧一匱而廢業移百錬於繞指初明而卒暗損正而從邪或因利囘或為禄誘遂踰規矩頓減聲稱斯皆急於時用罔畏人言墨子所以悲絲仲尼所以惡畫者為此發也後漢吉茂初同産兄黃以從公府掾為長陵令是時科禁長吏擅去官而黃聞司徒趙温薨自以為故吏違科奔喪為司𨽻鍾繇所收遂伏法茂時為白衣始有清名於三輔以為兄坐追義而死怨怒不肯哭至歲終繇舉茂議者以為茂必不就及舉既到而茂就之故時人或以茂為畏繇南齊楊法持本道人也與太祖有舊宋後廢帝元徽末宣傳密謀順帝昇明中以為僧正及太祖建元初罷道為寧朔將軍封州陵縣男三百户梁范雲為尚書僕射雲初為郡號稱廉慎及居貴重頗通饋遺然家無畜積隨散之親友後魏廣陵侯衍弟欽字思若少好學早有令譽時人語曰皇宗畧畧壽安思若及晩貴重不能有益識者輕之宋飜初為河隂令威振京師後為雒陽令累遷河南尹及為雒陽迄於尹畏憚權勢更相承接故當世之名大致減損袁衍宣武時為通直郎景明中請隱嵩山至延昌之末衍稍以出山干禄執事孝明除散騎侍郎行河内郡事李洪之本名文通常山人少為沙門晩來還俗仕至安南將軍北齊孫騰為太保尚書令騰早依附神武契濶艱危勤力恭謹深見待信及神武置之衛朝寄以心腹遂志氣驕盈與奪自已後及禍焉高元海為散騎常侍願處山林修行釋典文宣許之乃入林慮山經二年絶棄人事志不能固自啓求歸徵復本任便縱酒肆情廣納姬侍魏愷文宣時除青州長史固辭不就遂積年沉廢後遇吏部楊愔於路微自披陳楊答曰發詔授官咸由聖㫖非選曹所悉公不勞見訴愷應聲曰雖復霖雨自天終待雲興四嶽公豈得言不知楊欣然曰此言極為簡要更不湏多語數日除霍州刺史馮子琮為右僕射仍攝選子琮微有識鑒及位望轉隆宿心頓改擢引非類以為深交縱其子弟官位不依倫次又專營婚媾歴選上門例以官爵許之旬日便騐隋鄭善果為魯郡太守其母崔氏有賢德善果亦克已號清吏後徵授光禄卿其母卒後善果為大理卿漸驕恣清公平允遂不如疇昔焉唐劉禕之高宗咸亨初為中書舍人武后臨朝尋同中書門下三品初禕之居家孝友為士族所推得禄賜多散諸親屬至是坐受歸州都督孫萬榮金兼與許敬宗妾私通得罪一作或誣告禕之受金及私通敬宗妾盧藏用少以詞學見稱隱居終南山長安中徵拜左拾遺後為尚書右丞𤣥宗先天中坐託附太平公主配流嶺表初藏用隱居之時有自儉之操往來于少室終南二山時人稱為隨駕隱士及登朝奢靡淫縱車服鮮麗趦趄詭佞專事權貴時議乃表其醜行侯希逸初領淄青節度甚著聲稱治兵務農逺近美之後漸縱恣政事怠墮尤崇奉釋教且好畋遊興功創寺宇軍州苦之韋渠牟京兆萬年人警悟涉覽經史初為道士復為僧德宗興元中韓滉鎮浙西奏授祕書省挍書郎于頔為山南東道節度入朝拜司空平章事頔少有氣槩文學落落負竒節好古與當時賢士游晩歲遂頽敗李愿初為徐州節度使屬鄆師不庭頗有討伐之功及為鳳翔節度使自此頗怠於理無復前志聲色之外全不掛意未幾又拜宣武軍節度纔逾周歲果為部將李㝏所逐是時愿脫身走入鄭州妻竇氏死於兵士之手其名姬善馬寳貨金帛盡為軍人所得因致大梁月餘日拒命穆宗為之旰食遂貶隨州刺史元錫初歴衢蘇二州刺史所至咸有聲績及除福建觀察使移鎮宣州乃務積貨財通權勢深為公議所責因除祕書監分司東都尋以贓罪發詔監察御史宋申錫按驗得實貶璧州刺史殷脩為忠武軍節度使脩少以通經入仕所至稱理亦以强直知名晩年不能自固急於大用依附權倖時望由是減薄賈直言為昭義軍節度使行御司馬兼御史中丞直言生河朔間始以孝聞鄉里得齒士類後為李師道賓佐頗以逆順之理諫正之師道前後將加危害者數四及師道就戮劉悟於禁錮之所引為上介移鎮東郡上黨皆在幕府悟有纎毫之失未嘗緘言於是正直之譽頗洽羣聽朝廷以諫議大夫徵之詔下之時無不稱當悟旋上表請留復除舊職及悟卒其子從諫擅主留事而直言乃恬然視之無一詞排遏兇計卒使從諫坐邀符節朝廷不得已而授之直言之心不可測已逮兹又為從諫賓佐逺近共驚其處身行事前後之不相侔也如是後唐聶嶼鄴中人少為僧漸學吟咏鄭珏之再主禮闈與鄉人趙都俱赴鄉薦都納賄於珏人報翌日登第嶼聞不捷詬來人以嚇之珏懼俾俱成名崔貽孫仕唐為省郎及使於江南囘以槖裝營别墅於漢上之谷城退居自奉清江之上緑竹亘野狹徑深密維舟曲岸人莫造焉時人初以為高適及梁李振貶均州因奉之甚厚振復入徵為丞郎晉馬全節為天雄軍節度北面行營副招討從杜威北討困於陽城而贍軍竭其私帑僅十萬貫及還任稍稍聚斂百姓苦焉鄉舊有識者非之周王進歴汝鄭防禦使甚有政聲俄授相州節度使為政之道頓減於前未幾以疾薨於任馮道歴仕四朝三入中書在相位二十餘年平生性甚廉儉逮至末年閨庭之内稍狥奢靡其子吉尤恣狂蕩道不能制識者以其不終令譽咸歎惜之册府元龜卷九百十七
