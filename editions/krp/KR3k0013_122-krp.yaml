body:
  text: 册府元龜卷一百二十二宋王欽若等撰帝王部征討第二唐髙祖初為唐王隋義寧二年四月金城賊帥薛舉僣稱尊號乃下令曰大業喪亂兵革殷繁天下黔黎手足無措孤所以救焚拯溺平此亂階蜀道諸郡深思蘇息逺勤王略誠有可嘉方一戎衣静兹多難而薛舉狂僣吞噬西土隴蜀通途恐相侵暴今便命將授律分道進兵其衝要諸郡縣宜率勵各募部民隨機底定斯則暫勞永逸貽厥子孫自國刑家同享安樂武徳元年六月以秦王為西討元帥征薛舉八月薛舉死賊黨推其子仁杲僣尊號復以秦王為西討行軍元帥擊仁杲於涇州十一月平之九月遣工部尚書獨孤懐恩攻堯君素於河東十二月平之十月岐州賊帥邵江海自號新平王遣隴州刺史叔孫老擊之江海率其衆来降是月南陽賊帥朱粲侵浙州遣太常卿鄭元璹率歩騎一萬擊之二年四月粲奔世充三年五月王世充侵濟州遣右驍衞大將軍劉𢎞基㧞之六月劉武周陥介州遣左武衞大將軍姜寳誼擊之十月夏縣人吕崇茂殺縣令舉兵反自稱魏王以應劉武周遣永王孝基工部尚書獨孤懐恩陜州總管于筠内史侍郎唐儉等擊之三年四月武周奔于突厥五月崇茂平三年七月詔曰取亂侮亡聖主於是致治民和衆泰湯武所以成功兵革之興義資靖難出軍命將盖非獲已自隋氏數窮天下鼎沸豺狼交争黔庶凋殘朕受命君臨志存寧濟率土之内咸思覆育聲教所覃莫不清晏維彼伊雒尚隔朝風世充作梗肆行㓙暴害虐良善擁廹吏民反道亂常日月滋甚禍盈疊積天亡有徵心腹積携黨援孤絶農畆荒廢糧廪内空城隍社稷勢黨殄潰弔民問罪今實其時可令陜東道行臺上柱國秦王世民總統諸軍東踰崤澠分命驍勇百道俱進救彼塗炭誅其兇渠凡此授律義在拯民府庫資財一無所利尅敵制勝効䇿獻功官賞之差竝超常典其有背賊歸欵因事立勲即加寵授務隆優厚四年二月戊申遣左武侯大將軍竇抗率精騎三千赴東都三月世充降六月遣趙郡王孝恭率巴蜀兵㳂流下廬江王瑗自襄陽道黔州刺史田世康自辰州道黄州總管周法明自夏口道以圖蕭詵十月尅之七月竇建徳餘黨劉黒闥范願王小胡以漳南舉兵反棗彊人以城叛歸黒闥詔發關中歩騎三千令將軍秦武通定州總管李𤣥通擊之又遣幽州總管燕郡王李藝率兵南㑹十二月劉黒闥陥冀州遣左屯衞大將軍義安王孝當率兵擊之五年六月劉黒闥引突厥之衆冦山東遣燕郡王藝擊之又遣淮安王神通討徐圓朗七月貝州州曹該董康買舉兵反以應黒闥以淮陽王道𤣥為河北道行軍總管以討之十一月遣齊王元吉擊黒闥於山東六年五月平之六年八月淮南道行臺僕射輔公祏據丹陽反僣稱宋王遣趙郡王孝恭率兵趨江州九月輔公祏遣其黨徐紹宗侵海州陳政通侵壽陽詔趙郡王孝恭水路趨九江嶺南道大使李靖引交廣泉桂之衆趨宣城懐州總管黄君漢出譙亳齊州總管李世勣出淮泗以討公祏詔曰禁暴戢兵昔王於是致治亂常干紀有國所以明刑淮南道行臺尚書左僕射上柱國輔公柘本自凡伍素無藝用徃因擾亂連結徒旅與吳王杜伏威同心恊力保據江淮早率數部逺歸朝化録其功效授以官爵任官方隅榮寵兼至不能勵身奉上克保名節遂乃包蔵禍心圖為不軌自伏威入朝之後公祏恣行専擅違犯朝憲不顧典章徵歛榖帛掠奪子女肆其殘忍妄行誅殺驅役士民招聚奸盗毒流衆庶怨結遐邇國家務存含養未申刑罸每加懲誡冀其自改今乃稱兵内侮假相署置驅扇蟻徒敢行鈔竊惟彼兇逆速宜勦定命將授律義在安人已令天䇿上將太尉領司徒尚書令陜東道大行臺雍州牧領十二衞大將軍上柱國秦王世民為江州道行軍元帥統率驍勇風驅電擊麾斾所臨當即奔潰凢此罪惡止在魁渠脅從之徒一無所問縱有已陥賊黨非其本心㧞難而来因立功效此等之類皆從官賞江淮以南比遭毒螫吏民困辱各不聊生平定之後普給優賞即令撫慰各令安堵勲賞之科具如别格宜明宣布咸使聞知是時又詔徐州總管任瓌為徐州道副元帥濟自楊子津以討之七年正月公祏卒七年六月慶州都督楊文幹舉兵反遣右武衞將軍錢九隴靈州都督楊師道擊之又遣秦王率兵以討文幹七月逆徒斬文幹来降太宗貞觀元年五月辛丑開府儀同三司天節軍將軍燕郡王李藝於涇州舉兵反遣吏部尚書長孫無忌為幽州道行軍總管右武侯大將軍尉遲敬徳為涇州道行軍總管以擊之師未至左右斬藝傳首京師十七年三月齊州都督齊王祐殺長史權萬紀典軍韋振據齊州自守詔兵部尚書李勣刑部尚書劉徳威發兵討之兵未至兵曹杜行敏執之而降𤣥宗天寳十四年十一月范陽節度使安禄山反遣將何千年刼太原尹楊光翽害之詔以右羽林軍大將軍王承業為太原尹衞尉卿員外置同正員張介然為汴州刺史河南採訪節度使金吾將軍程千里為潞州長史拒賊册榮王琬為元帥以河西節度髙仙芝為副元帥統諸軍以東征内出錢帛於京師召募十萬衆號曰天武健兒旬日而集屯軍㶚上旌旗營帳連亘二十里昭曜原野十二月命河西隴右節度西平郡王哥舒翰為兵馬副元帥統兵八萬鎮潼闗十五載正月禄山陷東都詔朔方節度郭子儀收河朔以朔方節度副使李光弼為雲中太守攝御史大夫充河東節度副大使知節度事委以東討七月幸蜀至晉安郡下詔曰我唐受命百四十載徳澤浸於荒裔聲教被於殊鄰紹三代之統緒綜百王之禮樂我髙祖神堯皇帝奄有大寳應天順人我太宗文武聖皇帝戡難造邦光宅天下我髙宗天皇大帝修文偃武恵綏四方我中宗孝和皇帝聿導孝徳惟新其命我睿宗大聖貞皇帝清明在躬𤣥化溥暢朕承累聖之洪訓荷祖宗之丕績兢兢業業不敢自寧徃嵗韋氏作逆宗社將墜是用翼戴先後掃盪兇徒宸極歸真寰宇載宴爾來在位垂五十年中原幸無師旅戎狄嵗来朝貢夙興旰食勤念蒼生庶𢎞至理永致仁夀媿無帝堯之聖徳而有寄鯀之不明致令賊臣内外為患蔽朕耳目逺朕忠良或竊威弄權或厚歛重賦蟻壤一漏成此滔天搆逆召戎馳突中夏傾覆我河雒擾亂我崤函使衣冠奔竄於草莽黎庶狼狽於鋒鏑伊朕之凉徳不能寧守厥位貽禍海内有負蒼生是用罪已責躬寤寐焚灼上媿乎天地下媿乎兆民外媿乎四夷内媿乎九族乾乾惕厲思雪大恥夫定禍亂者必仗於羣才理國家者先固其根本太子亨忠肅恭懿悦禮敦詩好勇多謀加之果斷永王璘盛王琦豐王珙皆孝友謹恪樂善好賢雖頃在禁中未習政事察其圗慮可試艱難夫丞相之才師傅之任必資賢哲允屬忠貞况四海多虞二京未復今所慎擇實惟其人太子亨宜充天下兵馬元帥仍都統領朔方河東北平盧等節度使與諸路及諸副大使等計㑹南收長安雒陽以御史中丞裴冕兼左庶子隴西郡司馬劉秩試守右庶子永王璘宜充山南東路及黔中江南西路節度度支採訪使江陵都督如故以少府監竇紹為之傅以長沙郡太守李峴為都副大使仍授江陵都督府長史兼御史中丞盛王琦宜充廣陵大都督仍領江南東路及淮南等道節度採訪等都使以前江陵郡都督府長史劉彚為之傳以廣陵長史李成式為副大使兼御史中丞豐王珙宜充武威郡都督仍領河西隴右安西北庭等路節度採訪使以隴西太守鄧景山為之傅應須兵馬甲仗器械糧賜等並於當道本節度採訪度支防禦等使虢王巨等並依前充使其署置官屬及本道郡縣官等並各任自揀擇其有文武竒才隠在山藪宜加辟命量事獎擢於戲咨爾元子等敬聴朕命謙恭祗敬以見師傅矜莊簡肅以蒞衆官慈恤惠愛以養百姓忠恕哀敬以折庶獄色不可犯以臨軍政犯而必恕以納忠規徃欽哉無替朕命各頒所管咸令知悉初江嶺之人聞京師陷賊不知輿駕所在互相震駭及見是詔逺近相賀思有所効肅宗至徳元年七月即位於靈武十月至彭原郡宰臣房琯抗疏請兵一萬人自為帥以收兩京詔許之以兵部尚書王思禮為副分為三軍使楊希文將軍自宜夀入劉貴哲將中軍自武功入李光進將北軍自奉天入二年三月闗中節度王思禮奏將士張子卿等四十餘人割耳為盟請為父子軍為國討賊又特進張元軌悉稱所領武士一千五百人相與盟咸截左耳誓雪國讐齎所截耳至朝堂帝嘉之七月蜀郡城中節度健兒郭千仞謀逆上皇御𤣥英樓親自招諭不從詔六軍兵馬使及蜀郡長史李峘等領防禦兵討平之九月以元帥廣平王俶領朔方安西回紇西域大軍之衆十五萬號二十萬出討叛逆便收兩京以鎮西北庭行營節度使李嗣業為前軍朔方河西隴右行營節度使郭子儀為中軍關内行營節度使王思禮為後軍遂收長安廣平王留城中號令三日領大兵而東追殘賊兼收河雒乾元元年九月詔司徒朔方節度使郭子儀淮西襄陽節度使魯景興平軍節度使李奐滑濮節度使許叔冀平盧兵馬使董秦北庭行營節度使李嗣業鄭蔡節度使李廣琛率歩騎二十萬衆渡河討安慶緒於湘州又遣司空李光弼關内及潞府節度使王思禮率所部兵續赴湘州二年七月以趙王係為天下兵馬元帥討思明於河陽以司空兼侍中薊國公李光弼為副元帥知節度行營事八月襄州將士康楚元張嘉延率衆為亂陷荆襄澧朗等州以太子少保崔光逺兼御史大夫持節荆襄招討仍充山南東道處置兵馬都使十月荆襄平上元元年四月襄州軍亂殺節度使史翽部將張維瑾據州為叛以陜州來瑱為襄州刺史充山南東道襄鄧等十州節度使討平之上元元年九月詔曰朕聞昆夷作患周王授鉞於方叔大宛不庭漢王委兵於廣利則知昏迷之黨舞干不足以懐柔聖哲之謀伐叛必資於用武事將禁暴盖非獲已司徒兼中書令朔方鄜坊邠寧等節度使代國公子儀慶鍾五百運符魚水挺文武之宏才藴韜鈐之逺略積蒼生之重望有命伐之元勲負鼎和羮己申於啟沃登壇制勝實佇於謀猷萬里長城倚頼攸屬今殘祅未殄戎事猶殷爰資一舉之功以靖四方之難宜令子儀都統諸道兵馬使管崇嗣充副使取邠慶朔方路過徃收大同横野清夷便收范陽及河北仍遣射生衙前六軍英武長興寧國左右威逺驍騎等左廂一萬人馬軍三千人歩軍七千人以開府李光進充都知兵馬使特進烏崇福充都虞候右廂一萬人馬軍三千人歩軍七千人以開府儀同三司李鼎充都知兵馬使特進王兟充都虞候渭北官健一萬人馬軍三千人歩軍八千人以開府韋京杲充使朔方留後蕃漢官健八千人馬軍八百人歩軍七千二百人以兼御史中丞任敷渾釋之同充使蕃漢部落一萬人馬軍五千人歩軍五千人以兼御史中丞慕容兆與新投降首領奴頼同統押充使鄜坊等州官健一萬人馬軍一千人歩軍九千人以攝御史中丞杜冕充使寧州官健一萬人馬軍一千人歩軍九千人以攝御史桑如珪充使涇原防禦官健二千人馬軍五百人歩軍一千五百人以大將軍閻英竒充使蒐乗練卒藉馬賦車合四海以齊心齊九夷而同力金鼓作氣鐡騎争雄歛野噴山隠天動地以服順之師旅討從逆之兇徒人事天時指期可定今將略髙闕出雲中驅蚊蚋於幽燕掃攙搶於鞏雒削平天下混一車書然後獻凱清廟䇿勲盟府剋寧區夏豈不盛與兵馬既衆恐路次難為供應仍備六十程糧十䭾遣馬畜草料所在量事支供不得妄有煩擾百姓仍委子儀即差人先於諸道計㑹分般次進發仍與回紇兵馬犄角相應逐便討除所關軍務應須處置並委子儀續具狀奏聞雖有詔命竟不行二年四月梓州刺史叚子璋反襲破綿州殺遂州刺史嗣王虢王巨東川節度李奐戰敗五月劒南節度崔光逺與李奐領衆平之代宗寳應元年八月台州賊帥袁鼂攻陥台州刺史史叙脱身而逃因盡陷浙東諸州縣有衆數萬越及浙西諸州咸理兵以禦詔河南道副元帥李光弼討之二年四月袁鼂平十月詔以天下兵馬元帥雍王适統河東朔方及諸道行營回紇等兵十餘萬討史朝義㑹軍於陜州十一月朝義平大歴十年四月詔河東鎮冀幽州淄青淮西滑亳汴宋深潞河陽等道出討魏博田承嗣八月田承嗣上表請束身歸朝其將盧子期㓂磁州詔李寳臣李正已李忠臣李勉李昭承田神玉朱滔李抱玉等同赴磁州討伐十月擒子期十一年七月汴宋州節度留後李靈耀竊所部兵叛北結魏博田承嗣為同惡命淮西節度使李忠臣滑州永平軍節度使李勉河陽節度馬燧三鎮兵同討之十月擒靈耀徳宗建中四年三月詔曰淮陽軍節度使李希烈頃以梁崇義叛逆使之専征既集勲庸大加恩禮名極台輔賞延子孫而乃負徳棄身去忠効逆攻刼道路擅固鄧州而又圖陥汴州攘奪尉氏攻圍鄭圃暴犯汝墳已敕神䇿汴滑河陽東畿汝州淮南山南荆南湖南劍南江西鄂岳等道十五萬衆尅日齊進弔人靖亂罪止元兇有能斬希烈歸降者四品以上以希烈官爵授之五品以下封異姓王實封四百户諸軍將士斬獲希烈者亦准此例封賞以軍城降者便以其職授之賜其實封賊平後除供當道外百姓給復三年朕徳之不明化有不洽未躋仁壽尚勞用兵中心咎悼無忘鍳寐四月以永平宣武河陽等軍節度都統李勉為淮西招討使襄陽賈眈江西嗣曹王臯等為之副貞元三年四月希烈平十一月帝在奉天以朔方節度李懐光軍醴泉神策將李晟軍東渭橋以討朱泚興元元年二月以鎮州王武俊兼幽州節度使令討朱㴞三月以神策節度使李晟兼京畿渭北鄜坊丹延節度使以行在都知兵馬使渾瑊為朔方節度使邠寧振武永平奉天行營副元帥收復京城五月京師平八月以河東保寧軍節度使馬燧為奉誠軍晉絳慈隰節度行營兵馬副元帥以靈鹽節度使渾瑊為晉絳節度使河中同陕虢等州及管内行營兵馬副元帥同討李懐光貞元十五年九月詔曰淮西節度使吳少誠非次擢用授以旌旄秩居端揆之榮任總列城之重期申報効奉我典常而秉心匪純自底不類兇狡成性扇誘多端外肆矯誣内懐疑阻毁忠廢信棄徳崇奸擅動甲兵屢越封境壽州茶園輙縱凌奪唐州詔使潜搆殺傷干黷國章已在無赦朕以王者之徳在乎好生人君之體務於含垢寧屈己以宥罪不殘人以興師是以上稽宗社之盛外抑忠賢之請庶其悛革當議優容今更幸鄰境之喪逞貪亂之志焚掠縣邑殘暴平人朕猶冀其知非為之忍恥亟頒詔令未許出師至乃遣軍攻逼許州肆其蠆毒恣行殺戮流害黎蒸惡稔禍盈人神同棄興言致討實悼予𠂻宜令宣武軍河陽三城鄭滑等州節度東都汝州等軍犄角相應同逼申光蔡州常冀幽州淄青魏博易定澤潞太原淮南等州徐泗山南東道鄂岳等軍各發士馬逐便犄角齊進同為討伐大軍四合計日殱夷嗟我忠良受兹詿誤或心存憤激而力屈兇威玉石俱焚良增憫惻其所收得少誠管内州縣百姓官吏等宜切加慰撫各示安存淮西將士等夙著勲庸素懐忠義為其脅制深可哀矜若能因事建功捨逆効順朕當復其職位待以官封其吳少誠在身官爵竝宜削奪其有叶心同謀擒斬少誠者先有官未有官者竝授御史中丞大夫封異姓王賜實封五百户賞錢萬貫庄宅各一所子孫永為功臣先有御史中丞異姓王及刺史者即超轉三資改賜官賞其才器行業為衆所推者便授節度使如有心懐忠憤謀斬少誠被其屠戮者先無官者追贈三品官賜實封二百户先有官者贈二品官賜實封三百户仍各與一子正員五品官已有官者超三資與正員官其所在百姓能團結士衆討除梟斬少誠者准例封賞人臣之所保者忠天地之所助者順報功宥善朕不食言於戯朕司牧黎元為之宗極化有所未洽信有所未孚致兹興戎増用媿悼然不暫勞無以逸俗不誅暴無以安人咨爾藩鎮方州列辟連帥所宜戡剪大憝永康兆人其戮力一心以副朕意應諸道准勅赴蔡州許州將士等皆竭忠誠盡心奉國竝懐感激叶力勤王若能梟斬少誠者亦准前例官賞策勲之典朕所必行如少誠平後應赴行營將士超三資改官其賞物節級當續有處分其將士月糧在後廻給家口宣示中外咸令知悉十六年二月以諸將與賊戰皆不利而退詔左神策行營銀夏節度使韓全義為蔡州行營招討使陳許節度使上官涗副之十月詔赦吳少誠憲宗元和元年正月戊子制曰劍南両川疆界素定藩鎮守備各有區分頃因元臣薨謝鄰境不睦劉闢乃因虛搆隙以忿報讐遂勞三軍兼害百姓朕志存含垢務欲安人遣使宣諭委以旄鉞如聞道路擁塞未息干戈輕肆攻圍擬圖吞併為君之體義在勝殘命將興師盖非獲已宜令河南西道節度使嚴礪領當道士馬與劍南東川節度使李康犄角應接仍令神策行營節度使髙崇文領馬歩五千人為左軍左右神策京西行營兵馬使李元奕領馬歩二千人為次軍竝相續繼發仍仰髙崇文等各差人先與嚴礪計㑹齊進朕以三蜀之人本無過犯征鎮將士各著勲勞廹於威制不能自㧞各宜分明曉諭令悉朕懐如劉闢禀奉朝經抽兵却歸本鎮朕務存誠信必當委待如初其効順之誠臨鎮歸欵髙位重賞當不食言如尚執迷自貽覆滅法既無赦令在必行宜一乃心恭守所職其置頓糧料等仍委度支使差官勾當無令闕失甲午髙崇文領兵馬取鳯翔斜谷路李元奕領兵取駱谷路同赴梓州應接秦惠王時用司馬錯之策以伐蜀漢光武使吳漢伐公孫述魏司馬文王使鄧艾伐劉禪晉穆帝使桓温伐李子仁宋武帝使朱齡石伐譙縱梁武帝使鄧元起伐劉季連周太祖使尉遲逈平蕭紀隋文帝使梁睿平王謙憲宗命髙崇文平劉闢自秦至元和九度伐蜀四為水軍泝江而上唯光秦與鄧艾尉遲逈梁睿及崇文五在斜谷駱谷出師南討不庭矣九月擒劉闢以獻三月詔發河東天徳兵誅夏州楊惠琳初韓全義入朝令其甥楊惠琳知留後俄有詔除李演為節度代全義演赴任惠琳據城叛至是討之是月平二年十月浙西節度使李錡據潤州反殺判官王澹大將趙琦又領蘇常湖杭睦五州戍將殺刺史修石頭故城欲謀僣逆十月詔曰朕聞好生者天地之仁不在乎肅殺止戈者帝王之武不尚乎誅鉏恭惟至言可謂明誡朕祗荷前訓纉承丕圖每思道以自𢎞豈佳兵而為念雖朔陲阻命有戡亂之征蜀部興妖獻夷㓙之㨗而所傷皆及於百姓所費寕止於千金静言思之徃徃興嘆非不得已豈復用師李錡屬列宗支任居方伯窮赫奕之貴飽綢繆之恩待以親賢報之以禮節授以師旅用之以亂常肖圓首方足之形無五常百行之性頃者累陳章䟽勤請来朝姦態不形偽言甚懇朕頗謂誠志乆方允從乃降詔書俾修覲禮示以後命委其深心而梟首驟呼虺毒横厲初則詐疾後仍縱兵寮屬以獻規受屠使臣以傳命見脅朕務於含垢未忍明言累降中人令遵前㫖無軺車之戒路有沴氣之㴞天加以日逞淫征寃痛者無告日興暴賦杼軸者皆空赤子咸罄於餱糧白刄屢膏於頸血為人父母聞甚惻然顧惟紀綱豈敢廢墜其討伐之師竝已有處分剋期齊進其李錡在身官爵階勲等竝宜削除仍令宗正寺削一房屬籍其兩都及諸州府應有李錡庄宅錢物等竝委所繇官簿録聞奏浙西將士素非同惡朕所深知廹於兇威不能自逹但王師進討因事立功梟斬渠魁以效誠節必當特加爵秩超異等倫其將吏等以所領歸降者超三資官以一身降者亦超資改轉官健歸順者厚加賞給仍與叙録明諭將士罪止一夫其餘染汙一切不問於是詔淮南節度使王鍔充諸道行營兵馬招討處置使仍以内官右監門衛大將軍薛尚衍充都監招討宣慰等使徴宣武義寜武昌之師各二千并淮南宣歙之師竝取宿州路進討江西兵士三千取信州路進討浙東兵士取杭州路進討是月平錡四年十月鎮州王承宗拒命制曰天地以大徳煦物而髙秋厲肅殺之威帝皇以至道育人而前王設誅討之典於是乎有阪泉之役有丹浦之威情豈佳兵義存禁暴朕嗣膺寳歴於兹五年以惕厲居於人上以仁恕撫於天下恭惟文祖之訓敢以武功為先昨者吳屬興妖師徒獻㨗朕毎念陳原野之衆行鈇鉞之刑雖舉彛章頗懐慙徳盖不獲已豈樂於斯王承宗頃在苫廬潜窺戎鎮而内外以事君之禮將而必誅分土之宜専則有辟朕念其先祖規嘗有茂勲貸以私恩抑於公議使臣旁午以告諭孽童俯伏以陳誠願獻两川期無貳事朕亦收其後效用以曲全授節制於舊疆齒勲賢於列位况徳棣本非成徳所管昌朝又是承宗懿親俾撫近鄰斯誠厚徳外雖兩鎮中實一家而承宗象恭懐奸肖貌稔禍欺裴武於得位之後縲昌朝於受命之中豺狼之心飽之而愈發梟獍之性養之而益生加以表疏之間悖慢斯甚神祗所以不祐天地所以不容智士所以奮懐義夫所以興憤式遏亂畧期於無刑恭行天誅示於有制其諸道諸軍進討已從别制處分王承宗在身官爵竝宜削奪其鎮州管内將士官吏等乆在戎行未知朝典或陥於邪説或廹以兇威雖有忠誠無由自逹但能效順即是王人豈止惟新當加寵渥其有能廻戈殄冦因事立功時有褒崇不拘資次貴爵厚禄設之而髙懸實封名藩待之以厚賞其以一州歸順者便與當州刺史仍賜實封二百户如先是刺史以州歸順者超三資與官仍賜實封三百户以一縣歸順者超兩資與官賜實封一百户其長行官健歸順者當以優厚褒賞如將校内有翻然改圖梟斬元惡者授以不次之位寵以殊常之封王承宗如能革心悔過束身入朝待之如初一切不問仍准舊官爵别加寵授於戯王者之師盖除於暴亂止戈之武豈願於傷殘而承宗不能負荷舊勲祗承新命自貽其咎寕怨於天遽此興戎至於用鉞固非素意用嘆於懐百辟萬方宜諒朕志是月以左神策䕶軍中尉左衞上將軍吐突承璀為左右神策河中河陽浙西宣歙等道赴鎮州行營兵馬使招討處置等使仍與諸軍計㑹内侍省内寺伯宋惟澄為河南陜西河陽已来舘驛使内侍省内寺伯曹進玉為京畿華州河中晉州太原已来舘驛使内侍省内常侍劉國為太原易定幽州滄州行營兵馬糧料使内侍省内常侍馬朝江為東道行營兵馬糧料使五年正月詔行營諸道進討鎮州又發徐泗滑等州兵四千人赴行營七月赦承宗罷兵八年十二月振武兵亂逐出節度使李進賢屠其家又殺判官嚴澈河東節度使王鍔奏李進賢奔於靖邉軍振武監軍使駱朝寛奏亂衆復平且請給將士衣於本州兼言營田之不可成帝怒命夏州節度使張煦以夏州兵二千代進賢於振武又命王鍔以河東兵二千煦於振武仍許以便宜擊斷十年正月制曰天地之化由肅殺以成嵗功帝王之道以威武而輔文徳朕祗荷鴻業撫臨庶邦務先𢎞含每慎征伐俾懐仁者有恥且格畏罪者見善即遷而或昏迷不恭告命不及固興悖亂之孽自速原野之誅除害正刑國有彛典吳元濟逆絶人理反易天常不居父䘮擅領軍事諭以詔㫖曾無敬恭熒惑一方之人廹脅三軍之衆以其父少陽常經任使為之軫悼命申奠祭臨遣使臣凌虐封疆遂致稽阻絶朝廷之禮意忘父子之恩情旋又掩襲舞陽傷殘士卒焚燒葉縣騷擾閭閻恣行冦攘無所畏忌朕嘗念賞延之義重傷藩帥之門尚欲納於忠順之途處以顯榮之列未能飭法猶為包荒稱以詔書俾申招撫而蠆毒滋長姦心靡悛壽春西南又陥鎮柵窮兇稔惡縱暴挻災覆載之所不容人神之所共棄良非獲已致此興戎盖亦方伯連帥同請討除伐罪弔人故兹申命宜令宣武忠武太原武寧淮南宣歙等兵馬合勢山南東道及魏愽荆南江西歙南東川等道兵馬與鄂南計㑹東都防禦使與懐汝節度及劔南義成軍兵馬掎角相應同為進討吳元濟舊有官秩宜竝削除大軍既臨計即戡殄嗟我淮右之衆本為勤王之師雖是脅從頻已昭洗念此勲力未嘗弭忘適罹狡童又此詿誤必懐忠順廹在兇威苟能率誠即日收效其淮西將士有能梟斬兇渠者先是六品已下官授三品正員官其先授五品已上官者節級昇進仍與實封五百户庄宅各一區錢二萬貫如能率所管兵馬以城鎮来降者竝超三資與改官仍與實封二百户錢一萬貫以一身降者亦與改轉仍賜錢帛諸道應赴副行營將士如有斬元濟者亦准此處分吳元濟如能束身歸朝竝與洗雪若不能改過罪止其身其餘汙脅一切不問接賊界州縣百姓軍興已来供饋繁併言念疲瘵良増憫然元和九年兩税斛㪷錢物等在百姓腹内者并十年夏税並宜放免其有城鎮將士百姓守節拒賊身死王事者各委長吏優給其家仍具事跡聞奏當加褒贈并賜錢帛仍與一子官三州百姓莫非吾人諸軍所至不得妄加殺戮焚燒廬舍據奪財産并有拘執以為俘馘事平之後給復二年三州内有自置義營堡栅王師所至能相率来降各加酬獎時當春候務切農桑應縁軍務所須並不得干優百姓如要車牛夫役及工匠之類竝宜和雇情願仍給優價賊平之後應立功將士竝與超資改官節級賜物於戯朕率理道靡敢荒寧思致中和以康億兆而徳之寡薄化未昭宣爰用甲兵良深媿嘆顧非重武其在止戈宣示中外咸令知悉自九年秋元濟以其父衆逆命帝初推恩信以待之乃易置四面將帥命嚴師飾壘以臨之望其畏寤聽命賊乃分鋭四出焚掠城邑至有犯東畿者繇是帝震怒始下詔討之二月以劔南西川之師五百人𨽻嚴綬徐州之師二千五百人從李光顔又以宣武之師三千人㑹光顔皆討蔡州又命神策軍郃陽鎮遏將索日進以涇原兵六百人㑹光顔劍南東川以兵二千五百人㑹鄂岳團練使栁公綽討賊次於安州十二月詔發振武兵二千㑹義武軍以討王承宗十一年正月制曰上帝垂象輝弧矢之芒先王取威陳鈇鉞之柄盖所以昭宣七徳保乂兆人故窮隂有助於嵗功而大刑無廢於國典朕承累聖之休祉奉昊穹之眷命道思格物心豈佳兵期致俗於和同庶納人於軌度緬窺鐘鼎無忘衞國之勞永惟𢃄礪毎存延代之賞故太尉武俊頃因多難首建大勲懸捧日之明誠遏㴞天之逆竪武烈有過於雷震壯容具紀於丹青餘風凛然雖死不朽是宜子孫襲寵邦國同休而王承宗墜乃箕裘隳其門户不思祖考之徳忍與梟獍同謀不顧天地之恩敢以豺狼為性飽則逾悖撫之不馴兇狂屢見於表章戕賊竊加於宰輔四方同駭千古所無朕以思人爱樹投鼠忌器優柔而不斷隠忍而未征屈其憲法惟絶朝貢俾之思過將謂革心而乃先動干戈屢犯城邑焚燒剽掠流毒於人罪惡既不可容誅討盖非獲已况四面征鎮憤激咸同中朝卿士奏議相繼雖覆以大道欲更含𢎞而廹於海魏博昭義等節度兵馬計㑹進討其承宗在身官爵竝從削奪言念廼祖嘗著功庸蠢兹狡童自取廢絶其所襲實封宜廻賜武俊子右金吾衞將軍士平俾之纂承無乏祭祀若承宗翻然改悟束身入朝必議加恩不惟貸法如沉迷自若討伐遂行則罪止一身其餘驅脅之徒一切不問大軍既臨計即戡殄其成徳將士等或染惡俗或廹兇威雖忠誠無階自逹但能去逆效順因事立功隨其髙下厚加寵錫如有梟斬渠魁及執送京兆以效誠節者王承宗在身官爵土地等便以廻授仍與實封五百户庄宅各一區錢二萬貫如有能率所管兵馬及以城鎮来降者竝超三資與官仍實封二百户錢一萬貫其以州降者便與刺史仍賜實封三百户如本是刺史更超三資與官賜實封三百户以縣降者超兩資與官賜實封一百户其以一營一栅降者節級褒昇務從優厚其諸軍行營將士有先登陥陣屠城下邑者亦准此處分諸應行營將士如有能梟斬承宗者亦准前例處分其接近賊界州縣自軍興已来供饋繁併嗟我疲瘵良増憫然應元和十年兩税斛㪷錢物在百姓腹内并十一年夏税竝宜放免其有城鎮將士百姓守節拒賊身死王事各委長吏優給其家仍具事跡聞奏當加褒贈其有潜謀誅斬承宗被其屠戮者優加追贈并賜錢帛仍與一子官六州百姓莫匪吾人墜于塗炭深用嗟惻兵之所至不得妄加殺戮及焚燒廬舍掠奪資産并有拘執以為俘馘事平之後給復三年其六州管内百姓能相率来歸者所在安存各加優獎方當春候務切農桑邉界之人慮妨耕織應縁軍務所須竝不得干擾百姓如要車牛夫役工匠之類宜和雇優給價錢賊平之後應立功將士竝與超資改轉節級賜物續有處分於戱朕正位凝命端誠嚮方勞謙在心慈儉為寳而化未陶於頑傲澤未浸於隠微薦興甲兵師在原野中宵愧歎當宁憂兢庶將除姦非曰尚武宣示中外宜體至懐自前年詔絶其朝貢承宗數以兵出境四犯田𢎞正不勝其忿累䟽請誅帝方許以兵加境上未令進討承宗幸其詔㫖乃大肆侵掠幽州及滄州易定之師皆苦之請連兵誅伐乃有是命於是六鎮合勢兵十萬餘環数千里將分承宗之力然諸軍回逺難為主約繇是兵加二年竟不能分其勢十二年四月罷河北行營専討淮西二年詔以陳州所送東都防禦五百人廻付汝州又詔發河東兵五千以赴易定十月命常侍梁守謙監淮西行營諸軍仍以空名告身五百道及金帛付之十二年正月詔發河東兵一千㑹於義武軍移潁沈丘武兵二千㑹於壽州七月以中書侍郎平章事裴度為門下侍郎平章事充彰義軍節度使仍充淮西宣慰使以刑部侍郎馬總為副以征元濟十月淮西平十三年七月詔削奪淄青節度使李師道在身官爵仍令宣武魏愽義成武寧横海等軍分路進討其淄青將士如能梟斬兇渠者節級超獎仍與實封五百户庄宅各一區錢二萬貫十四年二月師道平册府元龜卷一百二十二
