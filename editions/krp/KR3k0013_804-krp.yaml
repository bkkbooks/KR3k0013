body:
  text: 册府元龜卷八百四宋王欽若等撰總録部義第四北齊王昕為秘書監少與邢劭俱為元羅賔友及守東萊劭舉室就之郡人以劭是邢果從弟㑹兵將執之昕以身蔽伏其上呼曰欲執邢子才當先殺我劭乃免焉盧文偉魏孝昌中行臺嘗景啓留為行臺郎中及北方將亂文偉積稻榖於范陽城時經荒儉多所賑贍彌為鄉里所歸邢劭字子才後為太常卿攝國子祭酒授特進内行修謹兄弟親姻之間稱為雍睦事寡嫂甚謹養孤子恕慈愛特深在兖州有都信云恕疾便憂之廢寢食顔色貶損朱瑒為王琳故吏琳鎮夀陽為陳將吳明徹所殺𫝊首建業瑒致書陳尚書僕射徐陵求琳首曰竊以朝市遷代𫝊骨梗之風歴運推遷表忠貞之跡故典午將滅徐廣為晉家遺老當塗已謝馬孚稱魏室忠臣用能播美於前書垂名於後世梁故建寧公琳雒濵餘胄沂水舊族立功代邸效績中朝當離亂之辰摠方伯之任爾乃輕躬狥主以身許國寔追蹤於往彦信踵武於前修而天厭梁徳尚思救復徒藴包胥之念終遘萇宏之眚洎王業光啓鼎祚有歸於是逺跡山東寄命河北雖經旅臣之歎猶懐客鄉之禮感兹知已忘此捐軀至使身没九泉頭行千里誠復馬革褁屍遂其平生之志原野暴骸㑹彼人臣之節然身首異處有足悲者封樹靡卜良可愴焉瑒早簉末僚預叅下席降薛君之吐握荷魏公之知遇是用霑巾雨袂痛可識之顔回膓疾首切猶生之靣伏惟聖恩博厚明詔爰發赦王經之哭許田横之葬瑒雖芻賤切亦有心琳經蒞夀陽頗存遺愛曽游江右非無餘徳比肩東閣之吏繼踵西園之賔願歸彼境還脩窀穸庶孤墳既築或飛銜土之燕豐碑式樹時留堕淚之人近故舊王綰等已有論牒仰蒙制議不遂所陳昔梁公告逝即淝川而建塋域孫叔云亡仍芍陂而植楸檟由此言之抑有其例不使夀春城下惟𫝊報葛之人滄州島上獨有悲田之客昧死陳祈伏待刑憲陵嘉其志節又明徹亦數夢琳求首並為啓陳主而訴之仍與開府儀同主簿劉韶恵等持其首還于淮南權瘞八公山側義故㑹葬者數千人瑒等乃間道北歸别議迎接尋有揚州人茅智勝等五人宻送喪柩逹于鄴鞏榮貴魏末為湘州隊主時楊愔一門四世同居家甚隆盛莊帝誅爾朱榮後愔父津為并州刺史北道大行臺愔隨之任有邯鄲人楊寛者求義從出藩愔請津納之俄而孝莊被幽愔時適欲還都行逹邯鄲遇楊寛家為寛所執至相州見刺史劉誕以愔名家盛徳甚相哀念付長史慕容白澤禁止焉白澤遣榮貴防禁送都至安陽亭愔謂榮貴曰僕百世忠臣輸誠魏室家亡國破一至於此雖曰囚虜復何靣目見君父之讐得自縊於一繩𫝊首而去君之恵也榮貴深相矜感遂與俱逃宋遊道廣平人魏末廣陽王深北伐請為鎧曹及為定州刺史又以為府佐廣陽王為葛榮所殺元徽誣其降賊收録妻子遊道為訴得釋與廣陽王子迎送反葬後為司徒左長史時文襄疑黄門郎温子昇知元覲之謀繫之獄而餓之食敝𥜗而死棄屍路隅遊道收而葬之并集子昇文為三十五卷文襄謂曰吾近書與京師諸貴論及朝士卿僻於朋黨將為一病今卿真是重舊節義人此情不可奪子昇吾本不殺之卿葬之何所憚天下人代卿怖者不知吾心也盧叔武范陽涿人少機悟豪率輕俠在鄉時有粟千石毎至春夏鄉人無食者令自載取至秋任其償都不計較而嵗歳常得倍餘武平中為太子詹事右光祿大夫齊滅歸范陽遭亂城陷叔武與族弟士遂皆以寒餒致斃周將宇文神舉以其有名徳收而葬之劉豐為南汾州刺史八子俱非嫡妻所生毎一子所生喪諸子皆為制服三年武平中豐子暐所生喪諸弟並請解官朝廷義而不許㢘景平陽人少勵志節以明經郡舉孝㢘為房謨所重謨與子結婚盧氏謨卒後盧氏將改適他姓景訟之臺府不為理乃持繩詣神廟前北靣大呼曰房謨清吏忠事髙祖及其死也妻子見凌神而有知當助申之今引訣訴於地下便以繩自縊於樹衛士見之救解送所司朝廷哀其至誠命女歸房族獨孤永業為齊將周大司馬獨孤信為冡宰宇文獲所誅其子羅寓居山中孤貧無以自給永業以宗族之故見而哀之為買田宅遺以資畜後周劉璠在梁為雍州刺史蕭循司馬及璠為逹奚武所執時南鄭尚拒守未下逹奚武請屠之太祖將許焉惟令全璠一家而已璠乃請之於朝太祖怒而不許璠泣而固請移時不退柳仲禮侍側曰此烈士也太祖曰事人當如此烈士也遂許之城竟獲全璠力也趙善魏末事爾朱天光天光拒齊神武於韓陵敗見殺善請收葬其屍齊神武義而許之後為左僕射兼侍中趙貴武川人少頴悟有節槩初從賀拔岳平關中累遷大都督及岳為侯莫陳悦所害將吏奔散莫有守者貴謂其黨曰吾聞仁義豈有常哉行之則為君子違之則為小人朱伯厚王叔治感意氣㣲恩尚能蹈履名節況吾等荷賀抜公國士之遇豈可同衆人乎於是從者五十人乃詣悦詐降因請收葬岳言辭慷慨悦壯而許之貴乃收岳屍還營糾合餘衆奔平凉共圖拒悦貴首議迎太祖至以貴為大都督領府司馬平悦逹奚武少倜儻好馳射為賀拔岳所知岳征闗右引為别將武遂委心事岳以戰功拜羽林監及岳為侯莫陳悦所害武與趙貴收岳屍歸平原同翊戴太祖從平悦李穆為小家宰兄逺子植謀害晉公䕶植誅死穆亦坐除名時植弟基任沂州刺史例合從坐穆頻詣䕶請以子惇怡等代基死辭理酸切聞者莫不動容䕶矜之特免基死豆廬寧為岐州刺史薨初寧未有子養弟承恩子勣及生子讃親屬皆請讃為嗣寧曰兄弟之子猶子也吾何擇焉遂以勣為世子世以此稱之獨孤羅字羅仁父信隨魏孝武入關中羅遂為髙氏所囚及信為宇文䕶誅羅始見釋寓居中山孤貧無以自給齊將獨孤永業以宗族故哀之為買田宅遺以資畜韋祐字法寳少好任俠人有急難投之皆保存之魏末四方雲擾王公避難者或依之多得全濟以此為貴遊所徳後為驃騎大將軍開府儀同三司辛威為上柱國其家門有義五世同居世以此稱之樂運後梁人年十五而家陵滅運隨例遷長安其親屬等多被籍没運積年為人傭保贖免之及事母及寡嫂甚謹由是以孝義聞㢘故都官郎中瑯邪王澄美之歎其行事為孝義𫝊韋孝寛為驃騎大將軍早喪父母事兄嫂甚謹所得俸祿不入私房親族有孤遺者必加賑贍朝野以此稱之張元為獄卒宣帝時斛斯徴為大宗伯上疏極諫指陳帝失帝不納内史中大夫鄭譯因譖之遂下徴獄元哀之乃佩刀穿獄墻遂出之元卒被拷而終無所言徴遇赦得免冠雋篤於仁義朞功之中孤㓜者衣食豐約並與同之王思政為驃騎大將軍河橋之戰被重創悶絶有帳下督雷五安於戰處哭求思政㑹其已蘇遂相得乃割衣褁創扶思政上馬夜久方得還裴寛魏末西遷將家屬避難於大石嶺屬獨孤信鎮雒陽始出見焉時汾州刺史韋子粲降於東魏子粲兄弟在關中者咸巳從坐其堂弟子爽先在雒窘急乃投寛寛開懐納之遇有大赦或𫝊子爽合免因爾遂出子爽卒以伏法獨孤信知而責之寛曰爽來見歸義無執送今日獲罪是所甘心以經赦宥遂得不坐姚最為齊王憲府水曹叅軍掌記室事特為憲所禮接賞賜隆厚宣帝嗣位憲以嫌疑被誅隋文帝作相追復官爵最以陪遊積歳恩顧過隆乃録憲功續為𫝊送上史局申徽魏末為元顥東徐州刺史元䆳主簿顥敗䆳被檻車送雒陽故吏賔客並委去惟徽送之及䆳得免乃廣集賔友歎徽有古人風隋蘇威綽子也為車騎大將軍儀同三司綽有從父妹適河南元世雄先與突厥有隙突厥入朝請世雄及其妻子將甘心焉周遂遣之威以夷人貪利遂摽賣田宅整資産贖世雄論者義之李士謙家富於財州里有喪事不辦者士謙輙奔走赴之隨乏供濟出粟數千石以貸鄉人值年榖不登債家無以償皆來致謝士謙曰吾家餘粟本圖賑贍豈求利哉於是悉召債家為設酒食對之焚契曰債了矣幸勿為念也各令罷去明年熟債家争來償士謙拒之一無所受他年又大饑多有死者士謙罄竭家資為之糜粥賴以全活者將萬計收埋骸骨所見無遺至春又出糧種分給貧乏郭雋字𢎞文太原文水人也家門雍睦七葉共居犬豕同乳鳥鵲通巢時人以為義感之應州縣上其事髙祖遣平昌公宇文弼詣其家勞問之持書御史柳彧廵省河北表其門閭辛大徳為信安令煬帝時虞綽為著作左郎坐與楊𤣥感交往帝怒徙綽未至長安而亡天水大徳舍之歳餘為吏所執坐斬大徳誅斬羣盜甚得民情而與綽俱為使者所執其妻泣曰每諫君無匿學士今日之事豈不哀哉大徳笑曰我本圖脱長者反為人告之吾罪也當死以謝綽㑹有詔死罪得以擊賊自效信安吏民詣使者叩頭曰辛君命所懸辛君若去亦無信安矣使者留之以討賊帝怒斬使者大徳獲全唐李綱初仕後周為齊王憲叅軍憲之遇害也故人皆散惟綱撫棺號慟哀感路人躬自埋瘞突拜而去大為時論所嘉王女孀居孑立綱自以齊王故吏毎加贍恤綱之卒也其女披髪號哭如喪考焉魏徴為秘書監以條定五禮當封一子為縣男請讓孤兄子叔慈太宗愴然曰卿之此心可以勵俗遂許之李徳佋隋大業末為離石郡司户書佐太守楊子崇特禮之及髙祖義兵起子崇遇害棄屍城下徳佋赴哭盡哀收瘞之至介休詣義師請葬子崇太宗嘉之因贈子崇官令徳佋為使者往離石禮葬之張河字道源性清慤能苦節勵行嘗與友人客遊友人病中宵而卒河恐驚擾主人遂共屍安卧逹曙方哭親歩營送至其本鄉髙祖起義召拜大理卿時何倜與士澄有罪家口籍没仍以賜河河皆資給衣食一時放去及歴職通顯不營家業所得左右皆放之家無所驅使及卒之日妻子貧乏論者美之後至相州都督宇文士及為右衛大將軍撫幼弟及孤兄子以友睦見稱親戚故人貧乏者輙遺之王隴徳馮翊人王藏仁之蒼頭也藏仁父母先没未獲合葬既而從役物故其妻孀居旁無親屬隴徳迎致其屍并其父母而葬之因廬其墓次負土成墳毎有白雉飛鳴於墳上焉李大亮為太子右衛率兼工部尚書事兄嫂如父母焉大亮討吐谷渾破之以功賜物九百叚奴婢一百五十人悉分遺親戚仍罄家資收葬五葉宗族之無後者三十餘家送終之禮一時稱盛大亮死親戚孤遺為大亮所鞠養服之如父者十有五人褚亮隋大業中坐與楊𤣥感事有舊自太常博士左遷西海郡司户時京兆博士潘徽亦以筆札為𤣥感所禮降授威定縣主簿當時寇盜縱横六親不能相救亮與徽同行至隴山徽遇患終亮親加棺歛瘞之路側愴然傷懐遂題詩於隴樹蕭瑀為雍州都督初闗内産業並先給勲人至是特還其田宅瑀皆分給子弟惟留廟堂一所以奉蒸嘗王雄誕者曹州滄隂人杜伏威之起也用其計屢有克獲署為驃騎將軍伏威後率衆渡淮與海陵賊李子通合後子通惡伏威雄武使騎襲之伏威被重瘡墮馬雄誕負之逃於葭蘆中伏威復招集餘黨攻刼郡縣隋將來整又擊破之亡失餘衆其部將西門君儀妻王氏勇決多力負伏威而走雄誕率麾下壯士十餘人衛䕶隋軍追至雄誕輙還禦之身被數瘡勇氣彌厲竟脱伏威時闞稜年長於雄誕故軍中號稜為大將軍雄誕為小將軍李勣本姓徐隋末奉李宻為主武徳二年宻為王世充所破擁衆歸朝其舊境東至于海南至于江西至於汝州北至魏郡勣並據之未有所屬謂長史郭恪曰魏公既歸大唐今此人衆土地魏公所有也吾若上表獻之即是利主之敗自為已功以邀富貴吾所耻也今宜具録州縣名數及軍人户口總啟魏公聽公自獻此則魏公之功也乃遣使啓宻使人初至髙祖聞其無表惟有啓與宻甚怪之使者以勣意聞奏髙祖方大嘉曰徐世勣感徳推功實純臣也詔授勣黎州總管尋加右武侯大將軍改封曹國公賜姓李氏令勣總統河南山東之兵以拒王世充及李宻反叛伏誅髙祖以勣舊經事宻遣使報其反狀勣表請改葬詔許之勣服衰絰與舊僚吏將士葬宻於黎山之南邱墳髙七仞釋服而散朝野義之及平王世充獲其故人單雄信依例處死勣表稱其武藝絶倫若收之於合死之中必大感恩為國家盡命請以官爵贖之髙祖不許將就戮勣對之號慟割股肉以啖之曰生死已訣此肉同歸於土矣仍收養其子江總為尚書令歐陽詢父紇為陳廣州刺史謀反誅詢獲免總與紇有舊收養之教以書計王義方初舉明經因詣京師中路逢徒歩者自云父為頴上令聞病篤倍道將往焉徒歩不前計無所出義方解所乗馬與之不告姓名而去義方為太子校書魏徴張亮皆厚禮之亮誅坐與交通貶儋州安吉丞改授洹水丞時張亮兄子皎配流在崖州來依義方而卒臨終託以妻子乃致屍還鄉義方與皎書自誓於海神使奴負柩令皎妻抱其赤子乗義方之馬身獨徒歩而還先之原武葬皓告祭張亮送皎妻子歸其家杜楚客如晦弟也少隨叔父淹没於王世充淹素與如晦兄弟不睦譖如晦兄於王行滿世充殺之并囚楚客幾至餓死楚客竟無怨色雒陽平淹當坐死楚客泣涕請如晦救之如晦初不從楚客曰叔已殺大兄今兄又結恨棄叔一門之内相殺而盡豈不痛哉因欲自剄如晦感其言請於太宗淹遂䝉恩宥楚客後為工部尚書攝魏王泰府事趙持滿為凉州都督府長史其舊駙馬都尉長孫銓無忌族弟也中書令許敬宗誣持滿與無忌及銓等同反驛召至京拷訊終無異詞且曰身可殺詞不可奪竟招為反而結奏之誅於城西王方冀與凉州長史趙持滿為友持滿為許敬宗所誣被誅暴屍於城西親戚莫敢收視方冀歎曰欒布之哭彭越大義也周文之掩枯骼至仁也絶友之義蔽主之仁何以事君乃收其屍具禮葬之髙宗嘉其義竟捨而不罪後封太原郡公劉審禮為工部尚書再從同居家無異㸑合門二百餘口人無間言徐太𤣥為杭州叅軍在任時同僚有張惠犯贓至死太𤣥哀其母老乃詣獄自陳與惠同受贓惠數既少遂得減死太𤣥亦坐免官不調十餘年及赴選司列少常伯李敬𤣥大歎賞之擢鄭州司功叅軍太𤣥由是知名後官至秘書少監以徳行為時所重李安仁永徽中為太子左庶子屬太子被廢歸于陳邸官寮皆逃散無敢辭送者安仁獨泣涕拜辭而去朝野義之朱敬則為正諫大夫平章事後貶廬州刺史卒敬則重然諾善與人交毎拯人急難不求其報又嘗與三從兄同居四十餘年財産無異唐休璟為特進初得實封時以絹數千疋散分親族又以家財數十萬大開塋域備禮葬其五服之親時人稱之狄仁傑孝友絶人為并州法曹有同府法曹鄭崇質母老且病當充使絶域仁傑謂曰太夫人有危疾而公逺使豈可貽親萬里之憂乃詣長史藺仁基請代崇質而行時仁基與司馬李孝㢘不協因相謂曰吾等豈獨無愧邪由是相待如初後至納言王晙為朔方軍節度使時魏元忠為張易之昌宗所搆左授髙要尉晙宻狀申明之宋璟時為鳯閣舍人謂晙曰魏公且全矣子冒威嚴而理坐恐子之狼狽也晙曰魏公忠而獲罪晙為義所激顛沛無恨璟歎曰璟不能申魏公之枉深負朝廷矣盧藏用少與陳子昻趙貞固友善子昻貞固并早卒藏用厚撫其子為時所稱張仁興澧陽人先天二年江西按察使上言仁興五代同居甯嘉最為永和縣丞中宗太子重俊以誅武三思兵敗遇害官府寮吏莫敢近者嘉最解衣褁重俊首號哭時人義之宗楚客聞而大怒收付制獄貶授興平縣丞睿宗踐祚下制曰甯嘉最能重名節事髙欒布向幽塗已往生氣凛然静言忠義追崇褒寵可贈永和縣令陸南金初為奉禮郎開元初太常少卿盧崇道犯罪流嶺表逃歸東都時南金以母喪在家崇道事急假稱弔賔造南金言情南金哀而納焉崇道俄為讐人所發詔使侍御史王旭按其事遂捕獲崇道連引南金旭遂繩以重法南金弟趙璧詣旭自言藏崇道請代兄死南金固稱弟實自誣身請當罪兄弟讓死旭怪而問其故趙璧曰兄是長嫡又能幹家事亡母未葬小妹未嫁自惟幼劣生無所益身自請死旭遂列狀上𤣥宗嘉其友義並特宥之劉九江單父人開元十四年宋州奏九江三代同居有慈烏巢于庭户鄉里榮之名其鄉曰邕睦鄉里曰同居里李處恭鎮州鹿泉人與張義貞異姓同居于今三代百餘年吕元簡青州北海人四代同居所養六畜皆與異母共乳韓思訥華隂人三代同居孔璋許州人天寳中陳州刺史李邕贓汚事發罪當死璋上書救邕曰臣聞明主御宇捨過舉能取材棄行烈士抗節勇不避死見危授命晉用林父豈念過乎漢用陳平豈念行乎禽息殞身豈愛死乎何若林父誅陳平死百里不用晏嬰見逐是晉無赤狄之土漢無皇極之尊秦不并西戎齊不霸東海矣臣伏見陳州刺史李邕學成師範文堪經國剛毅忠烈難不茍免往者張易之弄權人畏其口而邕折其角韋氏恃勢言出禍應而邕挫其鋒雖身受謫屈姦謀終損即邕有大造於我邦家也且斯人所能者拯孤恤窮救乏賙急積而能散家無私聚今聞坐贓下吏鞠訊待報將寘極刑死在朝夕臣聞生無益于國不若殺身以明賢臣朽賤庸夫輪轅無取獸息禽視雖生何為況賢為國寳社稷之衛是臣痛惜深矣臣願六尺之軀甘受膏斧以代邕死臣之死所謂落一毛邕之生有足炤千里然臣與邕生平不欵臣知有邕邕不知有臣臣不逮邕明矣夫知賢而舉仁也代人任患義也臣獲二善而死死且不朽則又何求陛下若以臣之賤不足以贖邕鴈門逢掖有效矣伏惟陛下寛邕之生速臣之死令邕率徳改行想林父之功使臣得瞑目黄泉附北郊之迹亦臣之大願畢矣陛下即以陽和之始難於用鉞俟天成命敢忘伏劒豈煩大刑然後歸死皇天后地實炤臣之心昔吳楚七國叛因亞夫得劇孟則寇不足平夫以一賢之能敵七國之衆伏惟敷含垢之道存棄瑕之義逺思劇孟近取李邕豈惟成愷悌之澤實亦歸天下之望況大禮之後天地更新赦而復論人誰無罪惟明主圖之臣聞士為知己者死且臣不為死者所知甘於死者豈獨為惜邕之賢亦成陛下矜能之徳惟明主圖之䟽奏邕以㑹赦減死貶為欽州遵化縣尉璋亦配流嶺南而死璋按史無官裴冕天寳中為京畿採訪使王鉷判官鉷得罪伏法時宰臣李林甫操竊權柄人咸懼之鉷寮佐數百不敢窺鉷門冕獨收鉷屍親自䕶喪瘞于近郊冕自是知名趙驊天寳末為陳留少監安祿山䧟陳留驊因脅于賊時有京兆韋氏夫任畿官以不供賊軍遇害韋氏䧟賊没入為婢葢江西觀察韋儇族兄弟也驊哀其寃抑以錢贖之置之别院厚供衣食而驊竟不見焉明年收復東都驊以家財資給因訪其親屬歸之識者重焉王思禮天寳末為哥舒翰元帥府馬軍都將翰兵敗潼關思禮所乗馬中流矢而斃張光晟時在騎卒之中因下馬授思禮思禮問其姓名不告而退思禮隂記其形貌嘗使人宻求之無何思禮為河東節度使其偏將辛雲京為代州刺史因為將校譛毁思禮怒焉雲京惶懼不知所出光晟時𨽻雲京麾下因進問曰光晟素有徳於王司空比不言者耻以舊恩受賞今使君憂迫光晟請奉命一見司空則使君之難可解雲京然其計即令之太原及謁思禮未及言舊思禮識之遽曰爾豈非吾故人乎何相見之晚也光晟遂陳潼關之事思禮大喜因執其手感泣曰吾有今日子之功也求子頗久竟此相遇何慰如之即命同榻而坐結為兄弟光晟遂述雲京之屈思禮曰雲京比渉謗言過亦不細今為故人特釋之矣即日擢光晟為兵馬使賚以田宅縑帛甚厚累奏特進試太常少卿委以心腹及雲京為河東節度又奏光晟為代州刺史裴胄大厯中為江西觀察李栖筠支使代宗以元載隳紊朝綱徴栖筠入朝内制授御史大夫方將大用載怙權柄栖筠居顧問刺舉之職與之不平及栖筠卒胄䕶栖筠喪歸雒陽衆論危之胄坦然行心無所顧望董思寵櫟陽縣人大歴七年京兆府上言思寵五代同居子孫凡八十餘人友愛敦睦鄉里稱之天寳末寇盜剽掠村閭此家獨全年遭水旱此家獨免至於征税每先於人伏望旌表門閭編諸史册許之裴何代宗朝宰相遵度之子内外支屬百餘人何所得祿俸必同其費及領外任亦挈而隨之有孤惸病苦不能自恤者何尤周給至今稱其孝睦焉後為吏部尚書致仕梁崇義為襄陽節度朱瑱右兵馬使朱瑱被誅朝廷授崇義節度使以代瑱崇義為瑱立祠四時拜享不居瑱㕔及正堂視事於東廂下搆一小室而寢上表抗疏哀請收葬優詔許之殷亮為校書郎朱瑱之被刑也門客四散掩于坎中亮後至獨哭於屍側貨所乗之驢以備棺衾夜詣縣令長孫演以情告之演義而從之亮夜葬祭歩歸京師段秀實為安西節度李嗣業判官諸軍進戰于愁思岡嗣業為流矢所中卒于陣衆推兵馬使荔非元禮代之秀實聞嗣業之喪乃遺先鋒將白孝徳書令發卒䕶嗣業䘮送河内秀實率將吏哭待於境傾私財以奉葬事元禮多其義奏試光祿少卿依前節度判官竇叅為萬年尉同僚有直官曹者將夕聞親疾叅請代之會獄囚亡走京兆尹按直部將奏參遽請曰彼以不及狀謁叅實代之宜當罪坐貶江夏尉人多義之參後至門下侍郎平章事雍仙澤州人五代共居建中二年表其門閭于頎字休甫河南人少以吏事聞累授京兆府士曹為尹史翽所知翽出鎮襄陽奏為御史充判官翽為亂軍所殺頎挺出收葬遺骸時人義之盧邁范陽人少以孝友謹厚稱深為叔舅崔祐甫所親重貞元中為刑部員外郎以叔父兄弟姊妹悉在江介屬蝗蟲歳饑懇求江南上佐於是授滁州刺史累遷給事中婚嫁甥姪之孤遺者時人以此稱之裴佶建中年為藍田尉時有詔命畿内諸縣城奉天時嚴郢為京兆政尚峻暴加以朝㫖甚迫尹正之命急如風雨本曹尉韋重規其室方娠而疾畏郢之暴不敢以事故免佶因請代之没無愆素當時義之吕温以小吏事兵部尚書崔漢衡貞元三年漢衡為㑹盟副使吐蕃背盟漢衡為吐蕃所虜將殺之温趍往以背受刃吐蕃義之由是與漢衡俱免張萬福魏州元城人為泗州刺史時魏州饑父子相賣餓死者接道萬福曰魏州吾鄉里也安可不救令其兄子將米百車往饋之又使人於汴口求魏人自賣者給車牛贖而遣之陽城字亢宗北平人城妹夫客死他處家貧不能葬城親與其二弟舁屍以歸葬於其居之側往返千餘里後為諫議大夫盧坦為庫部員外郎兼侍御史知雜事㑹李錡反有司請毁錡祖父廟墓坦嘗為錡從事乃上言曰淮安王神通有功于草昧且古之父子兄弟罪不相及況以錡叛可累五代祖乎乃不毁因賜神通墓五户以備洒掃方良琨睦州人元和五年睦州上言良琨六代同居請表門閭從之王義為御史中丞裴度歩從人元和十年六月癸卯盜殺宰相武元衡時度亦遇盜通化里盜三以劒擊度初斷靴帶次中背纔絶其單衣後㣲傷其首度墮馬㑹度戴氊帽故瘡不至深賊又揮刃從度義自後來持賊而連呼甚急賊反刃斷義手乃得去時度墮溝中賊謂度已死遂捨去梁渉為豐州刺史李奉先騎卒奉先元和十年殺從事崔徳𤣥没其家其妻太府卿蕭曽之女也奉先以配渉為妻渉不敢受白奉先曰徳𤣥之罪未明已殺之矣今蕭氏列卿女也非渉賤卒所當者請歸之奉先義渉言乃以車一乗使蕭氏載徳𤣥喪而歸孟簡為太子賔客分司東都簡少俊㧞尚義烈重許與尤敦舊故早嵗交友皆一時知名士後多顯逹其或殁於中年簡憐視其孤極於周恤議者以簡有前軰風韓愈字退之為吏部侍郎愈性宏通與人交榮悴不易凡嫁内外及朋友之孤女僅十人柳公綽為吏部尚書外兄薛宫早卒一女孤綽為配張毅資送甚於已子閻鄷虢州玉城人寳歴元年刺史陸亘上言鄷五代同居盧均為廣州節度使管内多流竄者子孫貧困未歸均減俸俾營大事者數百家婚嫁孤弱賙惠困窮柳宗元自朗州司馬移柳州時朗州司馬劉禹錫得播州刺史宗元謂所親曰禹錫有母今為郡蠻方絶域萬里如何與母偕行吾與禹錫為執友胡忍見其若是即草奏請以柳州授禹錫自往播州禹錫終易連州萬晏宣州涇縣人太和六年觀察使沈傳師奏萬晏自髙祖萬頵至萬仲芳五代同居詔表其門閭陳班宣州溧陽人開成二年觀察使崔鄲奏班五代同㸑請蠲除税賦旌表門閭從之徐晦由進士第登直言科為櫟陽尉皆自楊憑所薦及憑得罪貶官臨賀縣尉親交無敢相送獨晦至藍田與憑言别時故相權徳輿與憑交分最深知晦之行因謂晦曰今送臨賀誠為厚矣無乃反為累乎晦曰自布衣沐楊公之知今日不送他日相公為姦邪所譛焉可不送相公乎徳輿大慙因稱之於人不數日御史中丞李夷簡請為監察晦至官之日白夷簡曰晦不由公門公何所取信而見拔于千萬人中哉答曰君送楊臨賀寧肯負國乎由是名益振劉鄴父三復為浙西李徳裕掌書記鄴六七嵗能賦詩徳裕尤憐之與諸子同硯席師學大中初徳裕貶逐鄴無所依以文章客㳺江浙毎有制作人皆稱誦髙元裕㢘察陜虢署為團練推官得秘書省校書郎咸通初劉瞻髙璩居要職以故人子薦為左拾遺召充翰林學士轉尚書郎知制誥正拜中書舍人户部侍郎學士承㫖鄴以李徳裕貶死珠崖大中朝以令狐綯當權累有赦宥不䝉恩例懿宗即位綯在方鎮屬郊天大赦鄴奏論之曰故崖州司户叅軍李徳裕其父吉甫元和中以直道明誠髙居相位中外咸理訏謨有功徳裕以偉望宏才繼登台衮險夷不易勁正無羣禀周勃厚重之姿慕楊秉忠貞之節頃以㣲累竄于遐荒既迫衰殘竟歸㝠寞其子燁坐貶象州邱山縣尉去年遇陛下布惟新之命覃作解之恩移授彬州縣尉今已殁於貶所儻徳裕猶有親援可期振揚㣲臣固不敢上論以招浮議今骨肉將盡生涯已空皆傷棨㦸之門遽作荆榛之地孤骨未歸於兆京一男又殁於湘江特乞聖明俯垂哀愍俾還遺骨兼賜贈官上宏録舊之仁下激狥公之節詔從之梁謝彦章許州人幼事葛從周為養父從周念其敏慧教以兵法彦章盡得其訣及壯事太祖為騎將以戰功領河陽節度使及從周卒臨喪行服躬預葬事時人義之後唐劉贊天成中為中書舍人與學士竇夢徴同年登第鄰居友善夢徴卒贊與同年楊凝式緦麻為位而哭其家無嫡長與視䘮辜䘏其孀稚人士稱之符習趙州昭慶縣人少以軍卒事節度使王鎔積功至都校自莊宗為晉王經畧河朔與鎔連衡嘗令習率師從征鎔為大將王徳明所害徳明據鎮州時習在徳勝行臺徳明上書請習歸藩莊宗詔習謂之曰王徳明召爾歸藩自為行計習雨泣而進曰臣本趙人家世事王氏嘗效忠義而徳明乃幽滄叛卒趙王知人不盡過意任使果致此反噬臣等雖不武願在霸府血戰而死不能委身於兇首被其屠割莊宗曰爾等既懐舊君之恩則能復仇乎吾當助爾習等舉身投地號慟感激良久謝曰王必以故使輔翼之勞雪其寃耻臣不敢期師旅為助但悉本軍可以誅其逆𥪡莊宗即令閻寳史建塘助習興師討徳明乃以習為鎮冀節度留後及徳明誅將正受鉞習不敢當其任辭曰臣縁故主未葬無嗣息臣合服斬衰候臣禮制畢聽命及莊宗兼領鎮州乃割相衛二州置義寧軍以習為節度使習奏曰魏博六州霸王之府不宜分割以示弱但授臣河南一鎮得自攻取便也乃授天平軍節度鄆齊棣觀察東南靣招討等使烏震初為鎮州隊長以功漸陞都將與符習從征於河上頗得士心聞張文禮殺王鎔臣欽若等謹案五代史文禮初為主而養子名徳明志復主讐雪泣請行兵及鎮陽文禮執其母妻洎兒女十口誘之不廻攻城日急文禮忿之咸割鼻斷腕不絶於膚縱至軍門觀者皆不忍正視虞一慟而止憤激自勵身先矢石鎮州平以功歴深趙二州刺史李再豐故鎮帥王鎔之禆校張文禮害王鎔時再豐與别將符習趙仁真在徳勝聞鎮州歸梁號哭請兵於莊宗誓擒文禮及事定用為冀州刺史張守素為馮贇故吏贇死妻子俱伏法惟小兒三嵗守素匿之遇赦獲全朱漢賔亳州人為右衛上將軍以太子少保致仕東還亳郡見鄉舊親戚淪没者有塋兆未辨則給以棺殯有婚嫁未畢則助以資幣受其惠者數百家郡人義之淳于晏登州人以明經登第自霍彦威為小校晏寄食於門下彦威嘗因兵敗獨脱其身左右莫有從者惟晏仗劒從之徒歩草莽自是彦威髙其義相得甚歡及歴數鎮皆為從事李震湖南人鎮州王鎔為張文禮所害鎔次子昭誨當鎔被禍之夕為軍人擕出府第置之地穴十餘日乃髠其髪披以僧衣屬震南還軍士既以昭誨託於震震置之茶禇中既至湖湘乃令依南嶽寺僧習業歳給其費昭誨年長思歸震即賫送而還時鎔故將符習為汴州節度使㑹昭誨來即表其事令赴闕明宗賜衣一襲令脱僧服頃之特授朝議大夫檢校考功郎中司農少卿賜金紫符習因以女妻之紀生者為右丞史圭食客圭長興中出為貝州刺史罷免歸常山㑹清秦末常山有秘瓊之亂史圭家財一夕盡焉生白刅中負圭以行獲免其害晉李周年十六為内兵捕賊將以任俠自負時河朔羣盜充斥南北交兵行旅無援者不敢出郡邑有士人盧岳家於太原擕妻子囊槖寓於逆旅進退無所保惟與所親相對流涕周憫之請援送以歸行經西山中有賊聞其聲夜於林麓間俟之射岳中其馬周大呼曰爾為誰邪賊聞其聲相謂曰李君至此矣即時散走岳全其行裝至於家趙玉幽薊人滄帥劉守文以其弟守光囚父于幽州乃舉兵以伐之尋為守光所敗滄之吏民共立守文之子延祚為帥以節度判官吕衮為謀主以拒守光及守光攻陷滄州究被擒族之衮子琦時年十五為吏追攝將就戮焉玉久游于衮之門下見琦臨危乃紿監者曰此子某之同氣也幸無濫焉監者信之即列之俱去行未數舍琦困于徒歩以足病告玉負之而行逾數百里因變姓名乞食於路乃免其禍李自綸鎮州下博人天福二年本州奏自綸五世義居曹顒鎮州元氏縣人七世義居鄉黨稱其和義麴温潁州汝隂縣人六世同居親屬一百六十口和孝稱於鄉里李罕通冀州阜縣人五世義居趙奉為太子太保奉性豁逹輕財重義凡親友以窮厄告者必傾其資而餉之人士以此多之周馮道初為太原掌書記有大校遺之細口者不得已而留焉乃寘於他室竟訪其主以還之及為翰林學士丁父憂持服於景城遇嵗儉分得俸餘悉散賑鄉里道之所居惟蓬茨而已凡庶牧饋遺斗粟疋帛無所受焉裴羽後唐明宗朝在郎署與右常侍陸崇使于閩風飄不便悮適兩浙時樞宻使安重誨怒絶錢氏朝貢越人以兵守二使於舘崇頻有不遜之語幾欲害之經嵗崇以疾殁羽得歸朝又不許將崇靈柩汎海羽謂錢鏐曰崇奉君命不獲生還安得以海上之俗忌不令歸葬則寄死之所豈無仁人哉由是鏐厚加待遇因託附羽表而復命闕庭羽以錢氏之表逹重誨厲色而問曰表有何言羽曰逺方實封不委其事及發函乃引咎伏辜之詞也明宗甚悦復通朝貢羽䕶崇之柩及資金毫末無缺悉付其家士人稱之後至左散騎常侍徐台符先與漢故太子太傅李崧為執友乾祐中崧為部曲葛延遇李澄等誣告族滅廣順中台符為兵部侍郎白於宰府請誅延遇等宰相馮道以延遇等已經赦宥未之許也時王峻執政聞台符之言深加歎服因奏於太祖遂誅延遇等時人義之李榖河南人為宰相以其所居地置蘭若餘立垣屋凡族人可任官者皆致於祿仕不可任官者分田以居之令督農桑俾其經久以是宗族皆得其所册府元龜卷八百四
