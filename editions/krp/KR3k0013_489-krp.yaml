  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_489-1a}
body:
  text: 册府元龜卷四百八十九宋王欽若等撰邦計部蠲復古者使民以時賦調有數葢以備國用均民力也其或天災流行水旱作沴兵革之後必有凶年故哀其疾苦而有復除之制周禮小司徒稽國中及四郊都鄙之夫家九比之數以辨老㓜貴賤廢疾凡政之施舎者賢者能者豫之傳亦載楚左司馬沈尹戍師都君子與王馬之屬以濟師此又在都邑之士有復除者也其後或王者之里行幸所過給軍之勞苦疾疫之灾及吏民之産子孝弟力田者有時蠲之晁錯所謂徳澤加于萬民民愈勤農民不困乏天下安寧嵗熟且美則民大富樂矣愛人之道斯為㝡焉秦始皇三十五年徙三萬家驪邑五萬家雲陽皆復不事十嵗漢髙祖二年詔曰蜀漢民給軍事勞苦復勿租稅二嵗復者除其賦役也闗中卒從軍者復家一嵗五年詔曰諸侯子在闗中者復之十二嵗其歸者半之非七大夫以下皆復其身及户勿事不輸户賦也復其身及一户之田皆不徭賦也七年春令民産子復勿事二嵗勿事不役使也八年三月令吏卒從軍至平城及守城邑者皆復終身勿事十一年四月令豐人徙闗中者皆復終身六月令士卒從入蜀漢闗中者皆復終身十二年十月髙帝破淮南王布還過沛畱置酒沛宫帝擊筑歌大風之詩慷慨傷懐泣數行下謂沛父兄曰逰子悲故鄉吾雖都闗中萬嵗之後吾魂魄猶思沛且朕自沛公以誅暴逆遂有天下其以沛為朕湯沐邑復其民世世無有所與沛父兄曰沛幸復豐未得唯陛下哀矜乃并復豐惠帝元年五月詔曰吏所以治民也能盡其治則民頼之故重其禄所以為民也今吏六百石以上父母妻子與同居及故吏當佩將軍都尉印將兵及佩二千石官印者家唯給軍賦他無有所與四年正月舉民孝弟力田者復其身文帝時晁錯奏言陛下幸使天下入粟塞下拜爵甚大惠也切恐塞卒之食不足用大渫天下粟邉食足以支五嵗可令入粟郡縣矣入諸郡縣以備凶灾也足支一嵗已上時可赦勿收農民租如此徳澤加于萬民民愈勤農時有軍役遭水旱民不困乏天下安寧嵗熟且美則民大富樂矣帝復從其言乃下詔賜民十二年租稅之半二年正月詔貸種食未入入未備者皆赦之種者五穀之種也食者所以為糧食九月詔曰農天下之大本也民所恃以生也而民或不務本而事末故生不遂衣食絶致有夭喪故不遂其生朕憂其然故今茲親率農以勸之其賜天下民今年田租之半三年五月帝幸太原復晉陽中都民三嵗租十三年六月詔曰農天下之本務莫大焉今廑身從事瘽古勤字而有租稅之賦是謂本末者無以異也本農也末賈也言農與賈俱出租無異也故除田租其于勸農之道未備其除田之租稅武帝建元元年二月赦天下賜民爵一級年八十復二算九十復甲卒二算復二口之算也復甲卒不豫革車之賦也元封四年十月行幸雍通囘中道北出蕭闗歴獨鹿鳴澤自代還賜安定髙平縣朝郍縣涿郡遒縣三縣及楊氏皆無出今年租稅楊氏河東聚邑名天漢三年三月行幸泰山還幸北地詔行所過毋出田租昭帝始元二年秋八月詔曰往年災害多今年蠶麥傷所賑貸種食勿收責毋令民出今年田租元鳯三年詔曰廼者民被水災頗匱於食朕虚倉廩使使者賑困乏其止四年毋漕三年以前所賑貸非丞相御史所請邉郡受牛者勿收責武帝始開三邉徙民屯田皆與犂牛後丞相御史復間有所請今勅自上所賜與勿收丞相所請乃令其僱稅耳宣帝本始三年五月大旱郡國傷旱甚者民毋出租賦三輔民就賤者且毋收事盡四年收謂租賦事謂役使盡本始四年而止四年四月郡國地震或山摧詔被地震壊敗甚者勿收租賦元康二年五月詔曰今天下頗被疾疫之災朕甚愍之其令郡國被災甚者毋出今年租賦四年詔復平陽侯曹參𤣥孫之孫杜陵公乘喜家諸復家皆世世無所與得傳同産子元帝初元元年三月行幸河東祠后土行所過勿出租賦四月詔曰闗東今年穀不登民多困乏其令郡國被災害甚者毋出租賦永光元年正月行幸甘泉郊泰畤行所過毋出租賦成帝建始元年十二月詔郡國被災什四已上毋收田租三年三月赦諸逋租賦所賑貸勿收河平四年正月赦天下諸逋租賦勿收鴻嘉元年二月詔逋貸未入者勿收四年春正月詔曰數勑有司務行寛大而禁苛暴迄今不改一人有辜舉宗拘繫農夫失業怨恨者衆傷害和氣水旱為災闗東流冗者衆冗散失其事業也青幽冀部尤劇朕甚痛焉未聞在位有惻然者孰當助朕憂之已遣使者循行郡國被災害什四以上民貲不滿三萬勿出租賦逋貸未入皆勿收流民欲入闗輙籍内録其名籍而内之所之郡國謹遇以禮務有以全活之思稱朕意永始四年三月幸河東祠后土行所過無出田租哀帝綏和三年秋詔河南潁川郡大水流殺人民壊廬舎其令水所傷縣邑及他郡國灾害什四已上民貲不滿十萬皆無出今年租賦平帝元始元年六月復貞婦鄉一人每鄉一人取其尤㝡者後漢光武建武五年十二月復濟陽二年徭役洛陽縣故城在今曹州宛句縣西南光武考南頓君初為濟陽令以哀帝建平六年帝生于濟陽宫故復六年正月改舂陵鄉為章陵縣世世復徭役比豐沛無有所豫髙祖豐沛邑人故世世給復光武舂陵人故比之十九年九月光武南廵狩幸南陽進幸汝南南頓縣舎置酒㑹賜吏人復南頓田租嵗父老前叩頭言皇考居此日乆陛下識知寺舎寺司也官府所止皆曰寺每来輒加厚恩願賜復十年帝曰天下重器嘗恐不任日復一日安敢期十嵗乎吏人又言陛下實惜之何言謙也帝大笑復増一嵗二十年復濟陽縣徭役六嵗二十二年九月戊辰地震制誥曰日者地震南陽尤甚其口賦逋稅而廬宅尤破壊者無收責漢儀注曰人年十五至五十六嵗出賦錢人一百二十為一䈯又七嵗至十四出口錢人二十以供天子至武帝時又口加三錢以補車騎馬逋稅謂欠田租也三十年七月幸魯國復濟陽縣是年徭役中元元年二月封泰山四月大赦天下復嬴博梁父奉髙四縣属泰州郡勿出今年田租芻藁十一月復濟陽南頓是年徭役眀帝中元二年二月即位九月赦隴西勿收今年租調又所發天水三千人亦復是嵗更賦更謂戍卒更相代也賦謂僱更之錢也更有三品有卒更有踐更有過更古正卒無常人皆當迭為之有一月一更是為卒更貧者欲得僱更錢次直者出錢僱之月二千是為踐更古者天下人皆當戍邉三日亦名為更不可人人自行三日戍當行者不可往即還因任一嵗次直者出錢三百僱之謂之過更永平五年十月行幸鄴與趙王栩㑹鄴常山三老言於帝曰上生於元氏願蒙優復詔曰豐沛濟陽受命所由加恩報徳適其宜也今永平之政百姓怨結而吏人求復令人愧笑重逆此縣之拳拳其復元氏縣田租更賦六嵗勞賜縣掾史及門闌走卒五伯鈴下侍閣門闌部署街里走卒皆有程品多少随所典九年三月詔郡國死罪囚減罪與妻子詣五原朔方占著所在死者皆賜妻父若男同産一人復終身其妻無父兄獨有母者賜其母錢六萬又復其口算和帝永元四年十二月詔今年郡國秋稼為旱蝗所傷其什四已上勿收田租芻藁有不滿者以實除之所損什不滿四者以見損除也六年三月庚寅詔流民欲就賤還歸者復一嵗田租更賦九年六月蝗旱詔今年秋稼為蝗虫所傷皆勿受租更芻藁若有所損失以實除之餘當收租者亦半入十三年九月壬子詔曰荆州比嵗不節今此淫水為害平地出水為淫水餘雖頗登而多不均浃深惟四民農食之本慘然懐矜其令天下半入今年田租芻藁有宜以實除者如故事貧民假種食皆勿收責十四年七月甲寅詔復象林縣更賦田租芻藁二嵗十月甲申詔兖豫荆州今年水雨淫過多傷農功其令被害什四已上皆半入田租芻藁其不滿者以實除之十六年七月辛巳詔令天下皆半入今年田租芻藁其被災害者以實除之及田租芻藁皆勿收責安帝永初四年正月丁邜詔以三輔比遭冦亂人庶流冗除三年逋租過更口算芻藁七年八月詔郡國被蝗傷稼十五已上勿收今年田租不滿者以實除之元初元年十月乙夘詔除三輔三嵗田租更賦口算建光元年十一月詔今年田租其被災甚者勿收口賦丙午詔京師及郡國被水雨傷稼者随頃畆減田租延光元年京師及郡國二十七雨水大風殺人詔田被淹傷者一切勿收田租三年二月東廵狩祠南頓君光武皇帝于濟陽復濟陽今年田租芻藁四年六月少帝北鄉侯詔先帝廵狩所幸皆半入今年田租順帝永建元年十月甲辰詔以疫癘水澇令入半輸今年田租傷害什四已上勿收責不滿者以實除之三年正月丙子漢陽地䧟裂乙未詔勿收漢陽今年田租口賦五年四月辛巳詔郡國貧人被災者勿收責今年過更六年十一月辛亥詔曰連年災潦冀部尤甚比蠲除實傷贍恤窮匱而百姓猶有棄業流亡不絶疑郡國用心怠惰恩澤不宣易美損上益下書稱安民則惠其令冀部勿收今年田租芻藁陽嘉元年三月大赦廪冀州尤貧民勿收今年更租口賦永和三年二月乙亥亰師及金城隴西地震二郡山岸摧地䧟戊戌遣光祿大夫按行金城隴西賜壓死者除今年田租尤甚者勿收口賦四年八月太原郡旱民庶流冗癸丑遣光禄大夫按行除更賦桓帝建和元年正月戊午大赦灾害所傷什四已上勿收田租其不滿者以實除之永夀元年六月詔泰山瑯琊遇賊者勿收田租復更算三年延熹九年正月詔曰比嵗不登人多饑窮又有水旱疾疫之困盗賊徴發南州尤甚災異日食譴告累至亂政在予仍獲咎徴其令大司農絶今嵗調度徴求及前年所調未畢者勿復收責其災旱盗賊之郡勿收餘郡悉半入永康元年復博陵河間二郡比豐沛河間桓帝祖所封博陵桓帝父蠡吾侯兾陵在此靈帝熹平四年四月郡國七大水六月𢎞農三輔螟令郡國遇災者減田租之半其傷害什四已上勿收責光和六年二月復長陵縣比豐沛髙祖陵名長陵也獻帝建安二十四年十一月孫權定荆州盡除荆州民租稅魏文帝以漢延康元年七月甲午南征至譙令曰先王皆樂其所生禮不㤀其本譙霸王之邦真人本出其復譙租稅二年黄初二年正月壬午復潁川郡一年田租詔曰潁川先帝所由起兵征伐也官渡之役四方瓦觧逺近顧望而此郡守義丁壮荷戈老弱負糧者漢祖以秦中為國本光武恃河内為王基今朕復於此登壇受禪其以此郡翼成大魏眀帝青龍元年正月甲申青龍見郏之摩陂井中二月改元改摩陂為龍陂鰥寡孤獨無出今年租賦陳留王景元四年十二月以蜀劉禪降癸丑特赦益州士民復除租賦之半咸熙元年十月詔勸募蜀人能内移者給廪二年復除二十嵗吴大帝嘉禾三年正月詔曰兵乆不輟民困於役嵗或不登其寛諸逋勿復督課晉武帝泰始元年十二月即位大赦復天下租賦及闗市稅一年六年七月丁酉復隴右五郡遇冦害者租賦七年閏五月詔交阯三郡南中諸郡無出今年戸調八年六月丙申詔復隴右四郡遇冦害者租賦咸寕元年二月以將士應已娶者多家有五女者給復太康元年五月詔吴將吏渡江復十年百姓及百工復二十年十月除五女復三年十二月丙申詔四方水旱甚者無出田租四年七月丙寅兖州大水復其田租五年七月減天下户課三分之一六年正月庚申朔以比嵗不登免租貸宿負八月減百姓綿絹三分之一恵帝永平元年五月壬午除天下户調綿絹成帝咸和四年七月詔復遭賊郡縣租稅三年咸康二年三月旱詔免所旱郡縣徭役六年十一月癸夘復琅琊比漢豐沛琅琊元帝本封孝武寧康二年四月壬戌詔三吴義興晉陵及㑹稽遭水之縣尤甚者全除一年租布其次聴除半年大元四年正月辛酉大赦郡縣遭水旱者減租稅五年六月以比嵗荒儉大赦自大元三年以前逋租宿債皆蠲除之宋髙祖永初元年八月戊辰詔曰彭沛下邳三郡首事所基情義繾綣事由情奬今昔所同彭城桑梓本鄉加隆攸在優復之制宜同豐沛彭沛下邳可復租布三十年文帝元嘉元年八月丁酉即位大赦天下逋租宿債勿復收己酉詔減荆湘二州今年租布之半四年三月行幸丹徒謁京陵詔曰丹徒桑梓綢繆大業攸始踐境永懐觸感㒺極昔漢章南廵加恩元氏况情義二三有兼曩日思播遺澤酬慰士民其蠲此縣今年租布十七年十一月丁亥詔曰前所給揚南徐二州百姓田糧種子兖兩豫青徐諸州比年所寛租榖應督入者悉除半今年有不收處都原之凡諸逋債優量申減又州郡估稅所在市調多有煩刻山澤之利猶或禁斷役召之品遂及稚弱諸如此比傷治害民自今咸依法令務盡優允如有不便即依事别言不得茍趣一時以乖隠䘏之旨主者明加宣下稱朕意焉二十四年正月甲戌大赦蠲建康秣陵二縣今年田租之半二十六年三月丁巳以行幸丹徒謁京陵詔復丹徒縣僑舊今嵗租布之半行所經縣蠲田租之半乙丑申南北沛下邳三郡復二十八年魏人自盱眙奔走癸酉詔曰玁狁孔熾難及數州睠言念之寤寐興悼强敵痍挫迸跡逺奔彫傷之民宜時振理凡遭冦賊郡縣令還復居業封屍掩骼贍賑饑流東作方始務盡勸課貸給之宜事從優厚其流寓江淮者並聴節屬并蠲復調稅孝武帝以元嘉三十年五月甲戌即位甲午曲赦京邑三百里内并蠲今年租稅新亭戰亡者復同京城蠲尋陽西陽郡租布三年孝建元年七月丙辰大赦逋租宿債勿復收曲赦京邑三百里三年制荆徐兖豫雍青冀七州統内家有馬一疋者蠲復一丁大明三年二月荆州饑三月甲申原田租布各有差四月竟陵王誕反扵廣陵車駕出頓宣武堂七月己巳斬誕辛未大赦王畿下貧之家近行頓所由並蠲租一年四年正月乙亥躬耕藉田大赦原除逋租宿債五年二月癸巳詔伐蠻之家蠲租稅之半六年四月庚申詔原除南兖州大明三年已前逋租八月癸亥詔原除大明四年已前逋租七年二月甲寅廵南豫南兖二州丙辰赦令行幸所無出今嵗租布其逋稅餘債勿復收蠲歴陽郡租輸三年十二月丙午行幸歴陽郡甲寅大赦蠲郡租十年前廢帝以大明八年閏五月庚申即位十月庚辰詔原除揚南徐州大明七年逋租景和元年八月丙辰原除吴興義興晉陵琅琊五郡大明八年已前逋租明帝泰始二年十一月丙申制東土經荒流散並各還本蠲衆調四年四月己夘詔減郡縣田租之半後廢帝元徽二年五月壬子江州刺史桂陽王休範反齊王蕭道成等討平之戊戌原除江州逋債其有課非常調役為民蠧者悉皆蠲停三年四月遣尚書郎到諸州檢括民户窮老尤貧者蠲除課調丁壯猶有生業随宜寛申貲財足以充限者督令結畢四年七月戊子南徐州刺史建平王景素據京師反討平之丙申原京邑二縣元年已前逋租順帝昇明元年七月雍州大水八月壬子遣使賑䘏蠲除稅調丁夘原除元年已前逋調復郡縣祿田二年二月戊子蠲雍州緣沔居民前被水災者租布南齊髙帝建元三年七月丁巳詔南蘭陵桑梓本郡長蠲租布武進王業所基復十年又詔三吴義興三郡遭水減今年田租二年二月甲午詔江西北民遭難流徙者制遣還本土蠲今年租稅十月原建元已前逋租三年六月大赦逋租宿債除減有差四年二月詔元年已前逋債皆原除武帝以建元四年三月壬戌即位癸酉詔曰城直之制城直言取財直以修城也歴代宜同頃嵗逋弛遂以萬計雖在憲宜懲而原心可諒積年逋城可悉原蕩自茲以後申舊科有違紏裁六月戊戌詔曰吴興義興遭水蠲除租調永明元年三月戊寅詔逋負督贓建元四年三月已前皆特除四年閏正月辛亥躬耕籍田詔曰諸逋負在三年已前尤窮弊者一皆蠲除五年七月戊申詔曰丹陽屬縣建元四年已来至永明三年所逋田租殊為不少京甸之内宜加優貸其中非貲者可悉原停八月乙亥詔今夏雨水吴興義興二郡田農多傷詳蠲租調九月丙午詔尤貧之家可蠲三調二年六年閏十月乙夘詔曰北兖北徐豫司雍青冀八州邉接疆場民多懸罄原永明以前所逋租調七年正月戊申詔曰雍州頻嵗戎役兼水旱為弊原四年已前逋租八年七月癸亥詔曰司雍二州比嵗不稔雍州八年已前司州七年已前逋租悉原汝南一郡復限更申五年十月原建元以前逋租九年八月吴興義興大水乙夘蠲二郡租十年正月戊午詔諸責負衆逋七年已前悉原除髙貲不在此例十一年七月詔曰水旱為災實傷農稼江淮之間倉廪既虚遂草竊充斥互相侵奪依阻山湖成此逋逃曲赦南北兖豫司徐五州南豫州之歴陽譙臨江廬江四郡三調衆逋宿債並同原除其緣淮及青冀新附僑民復除已訖更申五年鬰林王以永明十一年七月戊寅即位癸未凡逋三調及衆責在今七月二十日前悉同蠲除明帝建武元年十月癸亥即位詔逋租宿債換負官物在建武元年以前悉原除之二年三月戊申詔南徐州僑舊民丁多充戎旅蠲今年三課己未詔雍豫司南兖徐五州遇冦之家悉停今年租調丙寅停青州麥租十二月丁酉詔吴晉陵二郡失稔之鄉蠲三調有差四年正月壬寅詔曰民産子者蠲其父母調役一年新婚者蠲夫役一年永泰元年正月癸未朔大赦逋租宿債在四年之前皆悉原除三月丙午蠲雍州遇魏軍之縣租布東昏侯永元元年六月甲子詔原雍州今年三調八月乙巳蠲京邑遇水資財漂蕩者今年調稅和帝中興元年三月乙巳即位于江陵四月戊辰詔曰荆雍義舉所基實始王迹君子勞心細人盡力宜加酬奬副其乃誠凡東討衆軍及諸嚮義之衆可普復除梁髙祖天監元年四月丙寅即位赦逋布口錢宿債勿復收是嵗復南蘭陵武進縣依前代之科蘭陵帝所生地二年六月丁亥詔以東陽信安豐安三縣水潦漂損居民資業遣使周履量蠲課調七年六月辛酉復建修二陵週廻五里内居民十六年正月辛未親祠南郊詔尤貧之家勿收今年三調普通元年正月乙亥朔大赦尤貧之家勿收常調二年正月辛巳親祠南郊詔尤貧之家勿收租賦六年三月丙午賜新附民長復除大通元年春正月辛未詔曰欽奉時事虔薦蒼璧思承天徳惠此下民凡因事去土流移他境者並聴復宅業蠲役五年尤貧之家勿收三調大同元年十一月癸亥賜梁州歸附者復除有差四年八月甲辰詔南兖北徐西徐東徐青冀南北青武仁僮睢等一十二州既經饑饉曲赦逋租宿債勿收今年三調七年正月辛巳親祠南郊赦天下其有流移及失桑梓者各還田宅蠲課五年十一月丁丑詔曰民之多幸國之不幸恩澤屢加彌長奸盗朕亦知此之為病矣如不優赦非仁人之心凡厥諐耗逋負起今七年十一月九日昧爽已前在民間無問多少言上尚書督所未入者皆赦除之十年三月甲午幸蘭陵詣建寧陵至修陵壬寅詔所經縣邑並無出今年租賦監所債民蠲復二年九月己丑詔其有因饑逐食離鄉去土悉聴復業蠲課五年中大同元年三月乙巳赦其或為事逃叛流移困饑亡鄉失土可聴復業蠲課五年停其徭役其被拘之身各還本郡舊業若在皆悉還之太清元年正月辛酉親祠南郊大赦天下尤窮者無出即年租流移他鄉聴復宅業蠲課五年元帝承聖二年二月庚午詔曰食乃民天農為治本垂之千載貽諸百王莫不敬授民時躬耕帝籍是以稼穡為寳周頌嘉其樂章禾麥不成魯史書其方册秦人有耕力之科漢氏開屯田之利頃嵗屯否多難薦臻干戈不戢我則未暇廣田之令無聞於郡國載師之職有陋于官方今元惡殄殱海内方一其庇黔首庶拯横流一㕓曠務勞心日昃一夫廢業舄鹵無遺國富刑清家給民足其力田之身在所蠲免外即宣勒稱朕意焉陳髙祖永定元年十月乙亥即位大赦天下逋租宿債皆勿復收二年十月甲寅太極殿成匠各給復文帝天嘉元年二月乙亥詔曰日者凶渠肆虐衆軍進討舟艦輸積權倩民丁師出經時役勞日乆今氛祲廓清宜有甄被可蠲復丁身夫妻三年于役不幸者復其妻子宣帝大建二年秋八月甲申詔曰懐逺以徳抑惟常典去戎即華民之本志頃年江介繈負相随﨑嶇歸化亭候不絶宜加䘏飬答其誠心維是荒境自投有在都邑及諸州鎮不問逺近並蠲課役四年八月乙未詔停督湘江二州逋租無錫等十五縣流民並蠲其徭賦閏十月辛未詔曰姑熟饒曠荆河澌擬博望闕畿天限嚴峻龍山南指牛渚北臨對熊繹之餘城邇全琮之故壘良疇美柘畦畆相望連宇髙甍阡陌如繡自梁末兵災彫殘略盡比雖務優寛猶未克復咫尺封畿宜湏殷阜且衆將部下多寄上下軍民雜俗極為蠧耗自今有罷任之徒許分留部下其已在江外亦悉迎還任南州津裏安置有無交貨不責市估萊荒墾闢亦停租稅臺遣鎮監一人共刺史津主分明檢押給地賦田各立頓舎六年三月癸亥詔曰去嵗南川頗言失稔所督田租于今未即豫章等六部大建五年田租可申半至秋豫章又逋大建四年撿首田租亦申至秋南康一郡下應接民間尤弊大建四年田租未入者可特原除庶修墾無廢嵗取萬貫十一月乙亥詔北討行軍之所並給復十年八年二月丁丑詔江東道大建五年已前租稅夏調逋在民間者皆原除之九年五月丙子詔曰朕昧旦求衣日旰方食思𢎞億兆用臻俾乂而牧守􅊩民㢘平未洽常年租賦多置逋餘即此務農宜𢎞寛省可起大建已來訖八年流移叛户所帶租調七年八年叛義丁六年七年逋租田米粟夏調綿絹絲布帛等五年訖七年通貲絹皆悉原之十二年十一月己丑詔以亢旱傷農畿内為甚其丹陽等十郡并諸署即年田稅禄秩並令原半其丁租申至來年秋登後主至徳二年十月己酉詔曰耕田自足乃曰淳風貢賦之興其来尚矣葢由庚亟務不獲已而行焉但法令滋章奸盗多有俗尚澆詐政鮮惟良朕日旰夜分矜一物之失所泣辜罪已愧三千之未措望訂初下使彊蔭兼出如聞貧富均起單弱重弊斯豈振窮扇暍之意與是乃下吏箕歛之苛也故云百姓不足君孰與足自大建十四年望訂租調逋未入者並悉原除餘具閏位戒勵門禎明元年三月丁夘詔至徳元年望訂租調逋未入者并皆原之册府元龜卷四百八十九
