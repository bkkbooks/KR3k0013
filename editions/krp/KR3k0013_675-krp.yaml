body:
  text: 册府元龜卷六百七十五宋王欽若等撰牧守部仁恵易曰體仁足以長人書曰安民則恵用仁恵而親百姓者其惟良二千石乎繇漢以來循吏間作至於勤宣徳讓專行寛厚哀此鰥寡賑其乏絶形惻隠之心術務平反於刑典掩覆道骸保全生物夭厲之所及加之營䘏民賦之不登代其輸送雖復犯矯詔之義冒畫一之法亦無憚焉自非安仁而知義果行而邁徳以博濟為已任者亦惡能及是哉漢黄覇為潁川太守使郵亭鄉官皆畜雞豚郵行書舍如今之驛館鄉官鄉所治處也以贍鰥寡貧窮者許丞老病聾督郵欲逐之覇曰許丞廉吏雖老尚能拜起送迎止頗重聽何傷且善助之毋失賢者意龔遂為渤海太守盗賊悉平民安土樂業遂乃開倉廩假貧民假請給與選用良吏尉安牧養焉薛宣為左馮翊日至休吏冬夏至之日不省官事故休吏賊曹掾張扶獨不肯休坐曹治事宣出教曰蓋禮貴和人道尚通日至吏以令休所繇來久曹雖有公職事家亦望私恩意掾宜從衆歸對妻子設酒殽請隣里一笑相樂一笑謂相為歡笑爾斯亦可矣扶慙愧官屬善之劉徳為宗正寛厚好施生言好施恩恵於人而生全之每行京兆尹事多所平反罪人反罪人使從輕也嚴詡為潁川太守詡本以孝行為官謂掾吏為師友有過輙閉閣自責終不大言郡中亂王莽遣使徵詡官屬數百人為設祖道詡據地哭掾吏曰明府吉徵不宜若此詡曰吾哀潁川士身豈有憂哉我以柔弱徵必選剛猛代代到将有僵仆者故相弔爾後漢崔篆為王莽建新太尹三年不行縣門下掾倪敞諫篆乃僵起班春所至之縣獄犴填滿篆垂涕曰嗟乎刑罰不中乃陷人於穽此皆何罪而至於是遂平理所出二千餘人掾吏叩頭諫曰朝廷初政州牧峻刻宥過申枉誠仁者之心然獨為君子将有悔乎篆曰邾文公不以一人易其身君子謂之知命如殺一太尹贖二千人蓋所願也遂稱疾去王望為青州刺史時州郡災旱百姓窮荒望行部道見饑者裸行食草五百餘人愍然哀之因以便宜出所在布粟給其廩糧為作褐衣事畢上言明帝以望不先表請章示百官詳議其罪時公卿皆以為望之專命法有常條鍾離意獨曰昔華元子反楚宋之良臣不禀君命擅平二國春秋之義以為美談袁安為任城令永光十三年楚王英謀為逆事下郡覆考明年三府舉安能理劇拜楚郡太守是時英辭所連及繫者數千人明帝怒甚吏按之急迫痛自誣死者甚衆安到郡不入府先往按獄理其無明驗者條上出之府丞掾史皆叩頭爭以為阿附反虜法與同罪不可安曰如有不合太守自當坐之不以相及也遂分别具奏帝感悟即許得出者四百餘家黄香為魏郡太守郡有内外園田嘗與人分種收榖嵗數千斛香曰田令商者不農王制仕者不耕伐氷食禄之人不與百姓爭利乃悉以賦入課令耕種時被水年饑乃分俸禄及所得賞賜班贍貧者於是豐富之家各出義榖助官廩貸荒民獲全張酺為東郡太守長吏有殺盗徒者酺輙按之以為令長受贓猶不至死盗徒皆饑寒傭保何足窮其法乎任延為㑹稽都尉掾史貧者輙分俸禄以賑給之省諸卒令耕公田以周窮急馬稜為廣陵太守時榖貴民饑奏罷鹽官以利百姓陳寵為廣漢太守先是雒縣城南雒縣名古城在今益州雒縣南也每隂雨嘗有哭聲聞於府中積數十年寵聞而疑其故使吏按行還言世衰亂時此下多死亡者而骸骨不得葬儻在於是寵愴然矜歎即勅縣盡收歛葬之自是哭聲遂絶蓋勲為漢陽長史領太守事時人饑相漁食勲調榖廩之調猶發也先出家糧以率衆存活者千餘人譚顯為豫州刺史時天下饑荒競為盗賊州界收捕且萬餘人顯愍其困窮自陷刑辟輙擅赦之因自劾奏有詔勿理第五訪為張掖太守嵗饑粟石數千訪乃開倉賑給以救其敝吏懼譴譴責也爭欲上言訪曰若上須報是棄民也須待也太守樂以一身救百姓遂出榖賦人順帝璽書嘉之繇是一郡得全嵗餘官民並豐界無姦盗戴封為中山相時諸縣囚四百餘人辭状已定當行刑封哀之皆遣歸家與剋期日皆無遺者詔書美焉皇甫嵩為左車騎将軍領兾州牧嵩以黄巾既平乃奏請兾州一年田租以贍饑民帝從之百姓歌焉臣欽若等日歌其牧守具謡頌聞史弼為平原相時詔書下舉鉤黨謂相鉤連也郡國所奏相連及者多至數百惟弼獨無所上詔書前後切却州郡切急也却退也髠笞掾吏從事坐傳責曰詔書疾惡黨人㫖意懇惻青州六郡其五有黨近國甘陵亦考南北部平原何理而得獨無弼曰先王疆理天下畫界分境水土異壤風俗不同它郡自有平原自無胡可相比若承望上司誣陷良善滛刑濫罰以逞非理則平原之人戸可為黨相有死而已所不能也從事大怒即收郡僚職送獄遂舉奏弼㑹黨禁中解弼以俸贖罪得免濟活者千餘人孔融為北海相國人無後及四方游士有死亡者皆為棺木而殯葬之周昕為竹陽太守袁術遣呉景攻昕未㧞景乃募百姓敢從周昕者死不赦昕曰我則不徳百姓何罪遂散兵還本郡魏陳矯為魏郡西部都尉曲周民父病以牛禱縣結正棄市矯曰此孝子也表赦之杜畿為河東太守徵為尚書初畿在郡被書録寡婦是時他郡或有已自相配嫁依書皆録奪啼哭道路畿但取寡者故所送少及趙儼代畿而所送多文帝問畿前君所送何少今何多也畿對曰臣前所録皆亡者妻今儼送生人婦也帝及左右顧而失色司馬芝為河南尹門下循行嘗疑門幹盗簮幹辭不符曹執為獄芝教曰凡物有相似而難分者自非離婁鮮能不惑就其實然循行何忍重惜一簮輕傷同類乎其寢勿問呉滕裔為丹陽太守徙呉郡㑹稽每聽辭訟斷罪法察言觀色務盡情理人有窮寃悲苦之言對之流涕晉王濬為巴郡太守郡邊呉境兵士苦役生男多不養濬乃嚴其科寛其徭課其産育者皆與休復所全活者數千人轉廣漢太守垂恵布政百姓頼之周處為楚内史簡尸骸無主及白骨在野收葬之鄧攸為呉郡太守郡中大饑攸表賑貸未報乃輙開倉救之臺遣散騎常侍桓彛虞􅔎慰勞饑人觀聽善不乃劾攸以擅出谷俄而有詔原之李矩領河東平陽太守時饑饉相仍又多疫癘矩垂心撫䘏百姓頼焉㑹長安羣賊東下所在多虜掠矩遣部将擊破之盡得所掠婦女千餘人諸將以非矩所部欲遂畱之矩曰俱是國家臣妾焉有彼此乃一時遣之祖逖為豫州刺史收葬枯骨為之祭醊王羲之為㑹稽内史東土饑荒羲之輙開倉賑貸甘卓為梁州刺史為政簡恵善於綏撫估税悉除市無二價州境所有漁池先常責税卓不利其利皆給貧民西土稱為恵政虞潭為呉郡太守是時軍荒之後百姓饑饉死亡塗地潭乃表出倉米賑救之王渾為徐州刺史年荒嵗饑渾開倉賑贍百姓頼之鄭黙為東郡太守值嵗荒民饑黙輙開倉賑給自上待罪朝廷嘉黙憂國恤人詔書褒歎比之汲黯孔沮為呉興内史以嵗饑運家米以賑窮乏百姓頼之陶囬為吳興太守時人饑榖貴三吳尤甚詔欲聽相鬻買以拯一時之急囬上疏曰當今天下不普荒儉惟獨東土榖價偏貴使相鬻買聲必逺流北賊聞此将窺疆場如愚臣意不如開倉廩以賑之乃不待報輙便開倉及割府郡軍資數萬斛米以救乏絶繇是一境獲全既而下詔并勅㑹稽呉郡依囬賑䘏二郡頼之王薈為呉國内史時年饑粟貴人多餓死薈以私米作饘粥以飴餓者所濟活甚衆王藴為呉興太守甚有徳政屬郡荒人饑輙開倉贍䘏主簿執諫請先列表上待報藴曰今百姓嗷然路有饑饉若表上須報何以救将死之命乎專輙之愆罪在太守且行仁義而敗無所恨也於是大賑貸之頼藴全者十七八焉朝廷以違科免藴官士庶詣闕訟之詔特左降晉陵太守復有恵化百姓歌之宋臨川王義慶為荆州刺史畱心撫物州統内官長親老不隨在官舍者年聽遣五吏餉家先是王𢎞為江州亦有此制在州八年為西土所安杜慧慶為交州刺史嵗荒人饑輙以私禄賑之南齊戴僧靜為北徐州刺史買牛給貧民令耕種甚得邊荒之情豫章王嶷為荆湘二州刺史以榖過賤聽民以米當口錢優評斛一百竟陵王子良為丹陽尹開私倉賑屬縣貧民虞愿為晉平太守郡舊有蚺虵膽可為藥有餉愿虵者愿不忍殺放二十里外山中一夜虵還牀下復送四十里外山中經宿復還故處愿更令逺送乃不復歸論者以為仁心所致也崔元祖為東海太守時青州刺史張仲啟淮北頻嵗不熟今秋始稔北境隣接戎冦彌須沃實乞權斷榖過淮南而徐兖豫司諸州又各私斷榖米不聽出境自是江北荒儉有流亡之弊元祖乃上書謂宜豐儉均之書奏見從梁王國珍仕齊為南譙太守治有能名時郡境苦饑乃發米散財以賑窮乏齊髙帝手勅云卿愛人治國甚副吾意也顧憲之仕齊為衡陽内史先是郡境連嵗疾疫死者大半棺木尤貴悉裹以葦席棄之路傍憲之下車分告屬縣求其親黨悉令殯葬其家人絶滅者憲之為出公禄使綱紀營䕶之始興中武王憺為荆州刺史時軍旅之後公私空乏憺厲精為治廣闢屯田減省力役存問兵死之家供其窮困民甚安之又州大水江溢堤壊親率将吏冒雨賦丈尺築治之雨甚水壯衆皆恐或請憺避焉憺曰王尊尚欲身塞河堤我獨何心以免乃刑白馬祭神俄而水退堤立邴州在南岸數百家見水漲遂驚走登屋縁樹憺募人救之一口賞一萬估客數十人應募救焉其州民皆以免又分遣行諸郡遭水死者給棺木失田與糧種並賑賜之蕭暎為北徐州刺史在任𢎞恕人吏懐之常載粟帛逰於境内有遇貧者即以賑焉任昉為義興太守嵗荒民散以私俸米豆為粥活三千餘人時産子者不舉昉嚴其制罪同殺人孕者供其資費濟者千室在郡所得公田俸秩八百餘石昉五分督一餘者悉原兒妾食麥而已鄱陽忠烈王恢為郢州刺史義興初郢城内疾疫死者甚多不及藏殯及恢下車遽命埋掩又遣四使廵行部境内治安成康王秀為南徐州刺史州自崔慧景亂累被兵革戸民流散秀招懐撫納恵愛大行仍值年饑以私財贍百姓所濟活甚多又為江州刺史時盛夏水暴至外司請依舊僦渡收其錢秀教曰刺史不徳水潦為患可利之乎給船而已又為荆州刺史時值水暴長頗損民田秀以榖二萬斛贍之使長史蕭琛簡府州貧老單丁吏一日散管五百餘人百姓甚悦又為郢州刺史先是夏口嘗為兵衝露骸積骨於黄鶴樓下秀祭而埋之一夜夢數百人拜謝而退每冬月常作繻袴以賜凍者陳慶之為司豫都督豫州饑慶之開倉賑給多所全濟王志為丹陽尹京師有寡婦無子姑亡舉債以歛葬既畢而無以還之志愍其義以俸錢償焉時年饑每旦為粥於郡門以賑百姓民稱之不容口張允為呉郡太守下車䘏貧老故舊莫不欣悦蕭景為兖州刺史㑹年荒計口賑䘏又饘粥於路以賦之死者給棺具人甚頼焉明山賓為青冀二州刺史太中正在州所部平陸縣不稔啟出倉米以贍民後刺史簡州曹失簿書以山賔為耗闕有司追責籍其宅入官山賓黙不自理更市地造宅王瞻為晉陵太守時大司馬王敬則舉兵作亂路經晉陵郡民多附敬則軍敗臺軍討賊黨瞻言於朝曰愚人易動不足窮法明帝許之所全活者萬數張稷為呉興太守下車存問遺老引其子孫置之右職政稱寛恕陳宗元饒為南康内史以秩米三千餘斛助民租課存問髙年拯救乏絶百姓甚頼焉後魏武昌王平原為齊州刺史嵗頻不登齊民饑饉平原以私米三千餘斛為粥以全民命北州戍卒一千餘人還者皆給路糧百姓咸稱詠之州民韓疑之等千餘人詣闕頌之孝文覽而加歎任城王澄為定州刺史表減公園之地以給無頼貧口薛虎子為徐州刺史境内遭水二麥不收上奏請貸民粟民有車牛者求詣東兖給之並如所奏民得安堵韋珍為郢州刺史有聲績朝廷嘉之遷龍驤将軍賜驊驑二匹帛五十疋榖三百斛珍乃召集州内孤貧者謂曰天子以我能綏撫卿等故賜以榖帛吾何敢獨當遂以所賜悉分之樊子鵠為殷州刺史屬嵗旱儉子鵠恐民流亡乃勸有粟之家分貸貧者并遣人牛易力多種二麥州内以此獲安李元䕶為齊州刺史值州内饑儉民人困弊志存隠䘏表請賑貸蠲其役賦城陽王徽為并州刺史先是州界夏霜禾稼不熟民庶逃散安業者少徽輙開倉賑之文武咸共諫止徽曰昔汲長孺郡守爾尚輙開倉救民災弊况我國家親近受委大籓豈可拘法而不救民困也先給後表孝明嘉之加安北将軍裴佗為趙郡太守所得俸禄分䘏貧民裴宣為司州别駕上言曰自遷都以來凡戰陣之處及軍罷兵還之後道所有骸無人覆藏者悉命郡戍廵邏簡行埋掩并付出兵之鄉其家有死於戎役者使皆招魂攝魄祔祭先靈復其年租調身被傷痍者免其兵役朝廷從之薛真度為豫州刺史㑹大饑真度表曰去嵗不收饑饉十五今又災雪三尺民人萎餒無以濟之臣輙日出州倉米五十斛為粥救其甚者詔曰真度所表甚有憂濟百姓之意宜在拯䘏陳郡儲粟復不多亦可分贍尚書量賑以聞郭祚為青州刺史值嵗不稔闔境饑饉矜傷愛下多所賑䘏雖斷決掩畱號為煩緩然士女懐其徳澤於今思之裴慶孫為邵郡太守在郡之日值嵗饑㓙四方遊客常有百餘慶孫自以家糧贍之路邕為魏郡太守蒞政清勤經年儉日出家粟賑賜貧窘閻慶𦙍為東秦州敷城太守在政五年清勤厲俗頻年饑饉慶𦙍嵗常以家粟千石賑䘏貧窮民頼以濟其部民楊寳龍等一千餘人申訟美政有司奏按慶𦙍自蒞此郡恵政有聞又以已粟䘏贍饑饉乃有子愛百姓之義如少加優賚無以厲彼貧賤又按齊州東魏郡太守路邕在郡治能與之相符記其分贍又亦不殊而聖㫖優隆賜以衣馬求情即理謂合同賞封叨為瀛州刺史時乗冦亂之後百姓困乏四表求賑䘏百姓頼之武昌悼王鑒為徐州刺史屬徐兖大水民多饑饉鑒表加賑䘏民頼以濟楊逸為光州刺史時災儉連嵗人多餓死逸欲以倉米賑給而所司懼罪不敢逸曰國以人為本人以食為命百姓不足君孰與足假令以此獲戾吾所甘心遂出粟然後申表右僕射元羅以下謂公儲難闕並執不許尚書令臨淮王彧以為宜貸一萬詔聽五萬逸既出粟之後其老少殘疾不能自存活者又於州門煑粥飰之将死而得濟者以萬數北齊李元忠仕魏為光州刺史時州境災儉人皆菜色元忠表求賑貸至秋徵收被報聽用萬石元忠以為萬石給人計一家不過升斗耳徒有虚名不救其弊遂出十五萬石以賑之事訖表陳朝廷嘉而不責蘇瓊為南清河太守天保中郡界大水人災絶食千餘家瓊普集郡中有粟家自從其貸粟悉以給付饑者州計戸徵租復欲推其貸粟綱紀謂瓊曰雖矜饑餒恐累府君瓊曰余一身獲罪且活千室何所怨乎遂上表陳狀使簡皆免人戸保安此等相撫兒子咸言府君生汝在郡六年人庶懐之徐逺督楚州諸軍事逺為治務寛和有恩恵至東楚其年冬邑郭大火城民亡産業逺躬自赴救對之流涕仍為經營皆得安立崔謙為濟北太守恩信大行富者禁其奢侈貧者勸課周給田多沃壤謙咸易之以給人又改鞭用熟皮為之不忍見血示耻而已朝貴行過郡境問人太守為政何如對曰府君恩恵古者所無輿人為歌曰崔府君能臨政給是田皮易鞭布威徳人無爭客曰既稱恩化何須復威對曰長吏憚其威嚴人庶蒙其恩恵故兼言之牧守部有謡頌縁此二事語意相二今亦兩收後周賀蘭祥為荆州刺史時盛夏亢陽祥乃親廵境内觀政得失見有發掘古塜露暴骸骨者乃謂守令曰此豈仁者之為政邪於是命所在收葬之即日澍雨是嵗大有年州境先多古墓其俗好行發掘至是遂息蕭撝為上州刺史為政仁恕以禮讓為本嘗至元日獄中所有囚繫悉放歸家聽二日然後赴獄主者固執不可撝曰昔虞延見稱前史吾雖寡徳竊懐景行導民以信方自此始以之獲罪彌所甘心幸勿慮也諸囚荷恩依限而至吏民稱其恵化隋乞伏慧封西河公為潭桂二州總管曽見人以簺捕魚者出絹買而放之其仁心如此百姓美之號其處曰西河公簺公孫景茂為息州刺史法令清靜徳化大行時屬平陳之役征人在路有疫疾者景茂撒減俸禄為饘粥湯藥分賑濟之頼以全活者以千數髙祖聞而嘉之詔宣告天下後為道州刺史悉以秩俸買牛犢雞猪散恵孤弱不能自存者郭衍為瀛州刺史遇秋霖大水其屬縣多漂没民皆上髙樹依大家衍親備船栰并齎糧拯救之民多獲濟衍先開倉賑䘏後始聞奏髙祖大善之辛公義開皇中為陜州刺史土俗畏病若一人有疾即合家避之公義迎置㕔事與之醫療後人有遇病者爭就使君其家親屬因畱養之始相慈愛此風遂革闔境之内呼為慈母張須陁為齊郡丞㑹興遼東之役百姓散失又屬嵗饑榖米湧貴須陁開倉賑給官屬咸曰待詔勅不可擅與須陁曰今帝在逺遣使往來必淹嵗序百姓有倒懸之急如待報至當委溝壑矣吾若以此獲罪死無所恨先開倉而後上狀煬帝知之而不責也唐王方翼為肅州刺史屬蝗儉諸州平人死於道路而肅州全活者甚衆州人為立碑頌李裕天寳中為義陽郡守上言所部遭損戸一萬八百三戸請給兩月糧充種子許之嗣曹王臯肅宗時為温州長史攝行州事時嵗儉臯擅發倉賑州人而上聞詔書嘉之竇思仁為華州刺史奏乏絶戸請以永豐倉米賑給之張延賞大厯中鎮揚州屬嵗旱歉人有亡去他境者吏或拘之延賞曰夫食人之所恃而生也此居而坐斃適彼而可生得存吾人又何恨彼也具舟檝而盡遣之俾吏修其廬室已而逋債而歸者増於其舊蕭復建中初為同州刺史時州人阻饑有京畿觀察使儲廩在境内復輙以賙貧人為有司所劾詔下削階受代親友唁之復恬然曰茍利於人敢憚薄責馬燧為懐州刺史乗兵亂後其夏大旱人失耕種燧乃務化将吏有父母者燧輙造之施敬收瘞暴骨于頔貞元中為湖州刺史境土偏狹其送終者往往不掩其棺槥頔收葬朽骨凡千餘所袁滋貞元末為華州刺史以寛易清簡為政百姓有至自他境者皆給地以居名其居曰義合里人甚愛之專以慈恵為本有過犯者皆縱而不理擒盜輙捨或以物賞之陽城貞元末為道州刺史土地産民多矮每年嘗配鄉戸貢其男號為矮奴城不平其以良為賤又憫其編氓嵗有離異之苦乃抗疏論免之自是停貢民皆頼之無不泣荷韓愈元和末為袁州刺史州甿以男女𨽻於人者愈悉計庸值而償出之髙承簡為邢州刺史觀察使責時賦急承簡代數百戸出其租羅讓為福建觀察使甚著仁恵有以奴遺讓者讓訪其所自曰本某等家人兄娣九人皆為官所鬻其畱者惟老母爾讓慘然焚其丹書以歸其母崔悛為湖南都團練觀察使湖南舊法豐年貨易不出境隣部災荒不相恤悛至謂屬吏曰此非人情也無宜閉糶重困於民也自是商貨流通令狐楚為天平軍節度觀察等使屬連嵗旱儉人至相食樂其恵化而無流亡者王起太和中為河中節度觀察等使遇嵗旱乃令定價計口出粟以濟民狄兼謩為鄭州刺史屬嵗荒百姓阻饑以常平義倉粟二萬二百石逐便賑給訖事上聞張仲方太和末為京兆尹時将相以甘露事從累者皆大戮仲方密令識之旋詔下許令收葬得認遺骸實仲方之力也盧均開元初為廣州節度使管内多流竄者子孫貧困未歸均以俸俾營大事者數百家婚嫁孤弱賙恵困窮梁王敬蕘唐末為潁川刺史乾寧四年冬龎師古敗於青口敗軍逃歸者甚衆路出於潁時雨雪連旬軍士凍餒敬蕘自淮燎薪相屬於道郡中設糜糗餅餌以待之全活者甚衆後唐袁象先初仕梁為天平軍兩使畱後時鄆境再饑戸民流散象先即開倉賑恤蒙頼者甚衆晉髙漢筠為亳州刺史有逃死百姓虚係税錢二百緡計司累訢不蠲嵗使隣伍代納漢筠在任三年以已俸輸之其恵䘏多如此類楊彦詢為華州節度使在任二年屬部内蝗旱道殣相望彦詢以官粟假貸州民頼之存濟者甚衆安彦威為西州畱守屬連嵗蝗旱河雒之間民多逐食彦威多方撫諭未嘗繩之以法不忍去者亦大半焉至有殍者必遣人收其遺骸掩之以蘧蒢復有㝠錢酒食奠而瘞之聞者美之趙瑩為晉昌軍節度使時天下大蝗境内捕蝗者獲蝗一斗給禄粟一斗使饑者獲濟逺近嘉之張筠初仕後唐為永平節度使性好施每出值貧民於路則給以口食衣物境内除省賦之外未嘗聚歛遂至百姓不撓十年小康秦民懐恵呼為佛子後權領河南尹俄鎮興元所治之地咸用前政上下安之漢王周為冀州刺史性寛恕不忤物情州城西橋敗覆民阻車周曰橋梁不飾刺史之過也乃還其所沉粟出私財以修之民庶悦焉周石仁贇為義州刺史言貧戸殘税無可輸者臣以俸代納之安審琦為兖州節度使言四縣逃戸租税臣自以粟帛代納詔褒之張昭瑀為博州刺史上言民饑欲賑貸詔從之册府元龜卷六百七十五
