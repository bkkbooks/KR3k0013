body:
  text: 册府元龜卷六十七宋王欽若等撰帝王部求賢傳曰股肱喜哉元首起哉百工熈哉鼂錯有言曰古之賢主莫不求賢以為輔翼若夫居大寳之位制四海之命葢竝建衆職非借才於異代故君人者勤於求賢而逸於得人曷嘗不昧旦丕顯求衣未明訪問諮諏膝之前席然後異人間出賢士鄉臻濟濟之寜文王彬彬之盛漢室者繇斯而已矣若乃青雲之士翔而後集爵以德進義無苟合易禄而難畜難進而易退其或弓旌之踰分薫蕕之同器葢有閉門却埽隠居求志者有矣故五三而下致治之后罔不退託不明以延髦俊而後為盛德也虞舜詢於四岳闢四門詢謀也謀治政于四岳開闢四方之門未開者以廣致衆賢周成王嗣位求忠臣輔助以為政作小毖之詩毖慎也天下之事當慎其小小時不慎後為禍大宣王欲得國子之能導訓諸侯者樊穆仲曰魯侯孝言魯侯有孝徳王曰何以對曰肅恭明神而敬事耉老賦事行刑必問於遺訓而咨於故實不干所問不犯所咨王曰然則能訓治其民矣乃命魯孝公於夷宫漢髙祖十一年詔曰葢聞王者莫髙於周文伯者莫高於齊桓皆待賢人而成名今天下賢者智能豈特古之人乎患在人主不交故也士奚繇進今吾以天之靈賢士大夫定有天下以為一家欲其長久世世奉宗廟亡音無絶也賢人已與我共平之矣而不與吾共安利之可乎賢士大夫有肯從我游者吾能尊顯之布告天下使明知朕意御史大夫昌下相國相國鄼侯下諸侯王鄼音賛蕭何封國在南陽御史中執法下郡守中執法中丞也其有意稱明徳者必身勸為之駕有賢者郡守身往勸勉令至京師駕車遣之遣詣相國府署行義年行状年紀也有而弗言覺免年老癃病勿遣文帝二年十一月詔舉賢良方正能直言極諫者以輔朕之不逮十五年九月詔諸侯王公卿郡守舉賢良能直言極諫上親䇿之博納以言武帝初即位徴天下舉方正賢良文學才力之士待以不次之位四方士多上書言得失自衒鬻者以千數其不足採者輙報聞罷報云天子聞其所上之書而罷之令歸建元元年冬十月詔丞相御史列侯中二千石二千石諸侯相舉賢良方正直言極諫之士元光元年十一月初令郡國舉孝㢘各一人孝謂善事父母㢘謂清潔有㢘隅者五年徴吏民有明當世之務習先世之術者縣次給食令與計偕計者上計簿使也郡國每歳遣詣京師偕者俱也令所徴之人與上計者俱來而縣次給之食元朔元年詔曰夫本仁祖義褒徳錄賢勸善刑暴本仁祖義謂以仁義為本始五帝三王所繇昌也故詔執事興㢘舉孝庶幾成風夫十室之邑必有忠信三人竝行厥有我師今或至闔郡而不薦一人闔閉也總一郡之中故言闔郡也是化不下䆒而積行之君子壅於上聞也究竟也言見壅遏不得聞於天子也且進賢受上賞蔽賢䝉顯戮古之道也其與中二千石禮官愽士議不舉者罪是時天下愼法莫敢謬舉而貢士葢鮮故有斯詔元封五年四月詔曰葢有非常之功必待非常之人故馬或奔踶踶蹋也奔走也奔踶者乗之即奔立則踶人也踶音提而致千里士或有負俗之累而立功名夫泛駕之馬泛覆也方勇反字本作覆後通用耳覆駕者馬有逸氣而不循軌轍也跅弛之士跅者跅落無檢局也弛者放廢不遵禮度也跅音士各反弛音式爾反亦在御之而已其令州縣察吏民有茂才異等可為将相及使絶國者絶逺之國謂聲敎之外昭帝始元五年六月詔曰朕以𦕈身獲保宗廟戰戰栗栗夙興夜寐修古帝王之事通保傅傳孝經論語尚書未能有明賈誼作保傅傳在禮大戴記通言能通讀也帝自謂雖通舉此四書皆未能有所明此帝之謙也其令三輔太常舉賢良各二人郡國文學髙第各一人宣帝本始元年四月庚午地震詔内郡國舉文學髙第各一人中國為内郡緣邊有夷狄障塞者為外郡四年夏四月壬寅郡國四十九地震或山崩水出詔曰葢災異者天地之戒也朕承洪業奉宗廟託於士民之上未能和羣生廼者地震北海琅琊壞祖宗廟朕甚懼焉丞相御史其與列侯中二千石博問經學之士有以應變輔朕之不逮毋有所諱令三輔太常内郡國舉賢良方正各一人地節三年詔令内郡國舉賢良方正可親民者元康元年秋八月詔曰朕不明六藝鬱於大道是以隂陽風雨失時其博舉吏民厥身脩正通文學明於先王之術宣䆒其意者各二人中二千石各一人神爵四年四月詔令内郡國舉賢良可親民者各一人元帝初元元年三月詔丞相御史中二千石舉茂材異等直言極諌之士朕将親覽焉二年三月詔丞相御史中二千石舉茂材異等直言極諫之士朕将親覽焉永光二年三月日有食之詔内郡國舉茂材異等賢良直言之士一人成帝建始元年二月詔三輔内郡舉賢良方正各一人三年十二月詔丞相御史與将軍列侯中二千石及内郡國舉賢良方正能直言極諫之士詣公車朕将覽焉河平四年三月詔舉惇厚有行能直言之士元延元年秋七月詔内郡國舉方正能直言極諫者各一人北邊二十二郡舉勇猛知兵法者各一人哀帝建平元年二月詔曰葢聞聖王之治以得賢為首其與大司馬列侯将軍中二千石州牧守相舉孝悌惇厚能直言通政事延於側陋可親民者各一人四年冬詔将軍中二千石舉明兵法有大慮者元夀元年春正月辛丒朔日有蝕之詔曰朕獲保宗廟不明不敏夙夜憂勞未遑寧息惟隂陽不調元元不贍未睹厥咎婁勅公卿庶幾有望婁古屢字至今有司執法未得其中或上暴虐假勢獲名温良寛柔䧟于亡滅是故殘賊彌長和睦日衰百姓愁怨靡所錯躬錯猶置也乃正月朔日有蝕之厥咎不逺在予一人公卿大夫其各悉心勉帥百僚敦任仁人黜逺殘賊期於安民陳朕之過失無有所諱其與将軍列侯中二千石舉賢良方正能直言者各一人平帝元始二年秋舉勇武有節明兵法郡一人詣公車冬中二千石舉治獄平歳一人吏治獄平端也後漢光武建武七年四月壬午詔曰比隂陽錯謬日月薄食百姓有過在予一人大赦天下公卿司𨽻州牧舉賢良方正各一人遣詣公車朕将覽試焉公車門名公車所在因以名焉漢官儀曰公車令掌殿司馬門天下上事及徴召皆總領之孝章建初元年三月甲寅山陽東平地震己巳詔曰朕以無徳奉承大業夙夜慄慄不敢荒寧而災異仍見與政相應朕既不明涉道日寡又選舉乖實俗吏傷人官職耗亂刑罪不中可不憂與昔仲弓季氏之家臣子游武城之小宰孔子猶誨以賢才問以得人明政無大小以得人為本夫鄉舉里選必累功勞今刺史守相不明眞偽茂才孝㢘歳有百數既非能顯而當授之政事甚無謂也每尋前世舉人貢士或起畎畆不繫閥閱敷奏以言則文章可採明試以功則政有異迹文質彬彬朕甚嘉之其令太傅三公中二千石郡國守相舉賢良方正能直言極諫之士各一人五月辛酉初舉孝㢘郎中寛博有謀任典城者以補長相任堪使也典主也長謂縣長相謂諸侯相孝和永元六年詔曰朕以𦕈末奉承鴻烈隂陽不和水旱違度濟河之域凶饉流亡尚書曰濟河惟兖州言東南據濟西北距河而未獲忠言至謀所以康救之䇿窹寐永嘆用思孔疚詩云憂心孔疚惟官人不得於上庶民不安於下有司不念寛和而競為苛刻覆案不急以妨民事不急謂非要甚非所以上當天心下濟元元也思得忠良之士以輔朕之不逮其令三公中二千石二千石内郡守相舉賢良方正能直言極諫之士各一人昭巖穴披幽隐遣詣公車殤帝延平中詔公卿中二千石各舉隐士大儒務取高行以勸後進孝安永初元年三月癸酉日有食之詔公卿内外官郡國守相舉賢良方正有道術之士明政術通古今能直言極諫者各一人五年閏三月戊戌詔曰朕以不徳奉郊廟承大業不能興和降善為人祈福災異蜂起冦賊縱横夷狄猾夏戎事不息百姓匱乏疲於徴發重以蝗蟲滋生害及成麥秋稼方收甚可悼也朕以不明統理失中亦未獲忠良以毗闕政傳曰顛而不扶危而不持則将焉用彼相矣公卿大夫将何以拯救濟斯艱戹承天誡哉葢為政之本莫若得人褒賢顯善聖制所先濟濟多士文王以寧思得忠良正直之臣以輔不逮其令三公特進侯中二千石二千石郡守諸侯相舉賢良方正有道術逹於政化能直言極諫之士各一人及至孝與衆卓異者并詣公車朕将親覽焉七月己巳詔三公特進九卿校尉舉列将子孫明曉戰陣任将帥者元初元年四月丁酉詔三公特進列侯中二千石二千石郡守舉敦厚質直者各一人建光元年四月己巳令公卿特進侯中二千石二千石郡國守相舉有道之士各一人十一月癸卯詔三公特進侯卿校尉舉武猛堪將帥者各五人延光元年詔三公中二千石舉刺史二千石令長相視事一歳已上至十歳清白愛利能勅身率下防奸理煩有益於人者無拘官簿清白謂眞正也愛利謂愛人而利之也無拘官簿謂超遷之不拘常牒也刺史舉所部郡國太守相舉墨綬隐親悉心勿取浮華墨綬謂令長之屬也隐親猶親自隐也悉盡也言令三公以下各舉所知皆當盡心勿取乎浮華不實者順帝即位三月詔公卿郡守國相舉賢良方正能直言極諫之士各一人永和三年九月丙戌令大将軍三公各舉故刺史二千石及見令長郎謁者四府掾屬剛毅武猛有謀謨任将帥者各二人特進卿校尉各一人漢安元年二月丙辰詔大将軍公卿舉賢良方正能探賾索隐者各一人十一月詔大将軍三公選武猛試用有効驗任為将校者各一人冲帝永嘉元年九月京師及太原鴈門地震三郡水涌土裂詔三公特進侯卿校尉舉賢良方正幽逸修道之士各一人百僚皆上封事桓帝建和元年四月京師地震詔大将軍公卿郡國舉至孝篤行之士各一人又詔大将軍公卿校尉舉賢良方正能直言極諫者各一人三年六月詔大将軍三公特進侯其與卿校尉舉賢良方正能直言極諫之士各一人永興二年二月癸卯京兆地震詔公卿校尉舉賢良方正能直言極諫之士各一人延熹八年正月詔公卿校尉舉賢良方正九年詔舉武猛三公各二人卿校尉舉賢良方正各一人永康元年五月詔公卿校尉舉賢良方正靈帝建寧元年五月詔郡國守相舉有道之士各一人又故刺史二千石清髙有遺恵為衆所歸者皆詣公車中平元年三月詔公卿舉列将子弟及吏民有明戰陳之略者詣公車魏武帝建安十五年春下令曰自古受命及中興之君曷嘗不得賢人君子與之共治天下者乎及其得賢也曽不出閭巷豈幸相遇哉上之人不求之耳今天下尚未定此特求賢之急時也孟公綽為趙魏老則優不可以為滕薛大夫若必㢘士而後可用則齊桓其何以覇世今天下得無有被褐懷玉而釣於渭濱者乎又得無盗嫂受金而未遇無知者乎二三子其佐我明揚側陋唯才是舉吾得而用之十九年十二月又下令曰夫有行之士未必能進取進取之士未必能有行也陳平豈篤行蘓秦豈守信邪而陳平定漢業蘓秦濟弱燕繇此言之士有偏短庸可廢乎有司明思此義則士無遺滯官無廢業矣二十二年八月又下令曰昔伊摰傅說出於賤人管仲桓公賊也皆用之以興蕭何曹參縣吏也韓信陳平負汙辱之名有見笑之恥卒能成就王業聲著千載呉起貪将殺妻自信散金求官母死不歸然在魏秦不敢東向在楚則三晉不敢南謀今天下得無有至徳之人放在民間及果勇不顧臨敵力戰若文治之吏髙才異質或堪為将守負汙辱之名見笑之行或不仁不孝而有治國用兵之術其各舉所知勿有所遺文帝黄初四年五月有鵜鶘鳥集靈芝池詔曰此詩人所謂汙澤也曹詩刺共公逺君子而近小人今豈有賢智之士處於下位乎否則斯鳥何為而至其博舉天下雋徳茂才獨行君子以答曹人之刺明帝太和二年十月詔公卿近臣舉良将各一人四年十二月丙寅詔公卿舉賢良青龍元年三月甲子詔公卿舉賢良篤行之士各一人晉武帝泰始四年詔王公卿尹及郡國守相舉賢良方正直言之士五年将興伐呉之役下詔曰呉㑹未平宜得猛士以濟武功雖舊有薦舉之法未足以盡殊才其普告州郡有壮勇秀異才力傑出者皆以名聞簡其尤異擢而用之苟有人勿限所取七年六月詔公卿以下舉将帥各一人八年詔内外羣官舉可任邊郡者各三人太康九年詔内外羣官舉守令之才明帝太寧三年八月詔曰昔周武尅殷封比干之墓漢祖過趙錄樂毅之後追顯既往以勸将來呉時将相名賢之冑有能纂修家訓及忠孝仁義静已守眞不聞於時者州郡中正亟以名聞勿有所遺成帝咸和六年詔舉賢良直言之士七年詔舉賢良簡文咸安二年詔曰朕以𦕈身託於王公之上思頼羣賢以弼其闕夫肥遯窮谷之賢滑泥揚波之士雖抗志𤣥霄潜黙幽岫貪屈髙尚之道以隆恊賛之美孰與自足山水棲遲丘壑狥匹夫之潔而忘兼濟之大邪古人不借才於異代朕所以虛想於今日内外百官各勸所司使善無不逹而吾獲虛心之求焉後魏道武天興四年四月詔有司明隐逸天賜元年十有一月上幸西宫大選朝臣令各辨宗黨保舉才行明元永興五年二月詔分遣使者廵求雋逸其豪門彊族為州閭所推者及有文武才幹臨疑能决或有先賢世胄徳行清美學優義博可為人師者各令詣京師當隨才叙用以賛庶政太武神䴥四年九月詔曰頃逆命縱逸方夏未寧戎車屢駕不遑休息今二㓂摧殄士馬無為方将偃武修文遵太平之化理廢職舉逸民㧞起幽窮延登雋乂昧旦思求想遇師輔雖殷宗之夢版築罔以加也訪諸有司咸稱范陽盧𤣥博陵崔綽趙郡李靈河間邢頴渤海髙允廣平游雅太原張偉等皆賢雋之胄冠冕州邦有羽儀之用詩不云乎鶴鳴九臯聲聞于天庶得其人任之政事共臻雍熈之美易曰我有好爵吾與爾縻之如𤣥之比隐迹衡門不曜名譽者盡勅州郡以禮發遣遂徴𤣥等及州郡所遣至者數百人皆差次叙用延和元年十二月先是辟召賢良州郡多逼遣之詔曰朕除偽平暴征討累年思得英賢緝熙治道故詔州郡搜揚隐逸進賢舉俊古之君子養志衡門德成業就才為世使或雍容雅歩三命而後至或棲棲遑遑負鼎而自逹雖徇尚不同濟時一也諸召人皆當以禮申諭任其進退何逼遣之有也比刺史守宰宣揚失㫖豈復光益乃所以彰朕不德自今以後各令鄉閭推舉守宰但宣朕虛心求賢之意既至當待以不次之舉隨才文武任之政事其明宣勅咸使聞知孝文延興二年七月壬寅詔州郡縣各遣二人才堪専對者赴行在所三年十一月詔其有力田孝悌才器有益於時信義著於鄉閭者具以名聞太和十七年九月帝南伐濟河詔孝悌㢘義文武應求者皆以名聞十八年正月車駕南廵詔孝悌㢘義文武應求者皆以名聞十一月辛未詔冀定二州孝義㢘貞文武應求者具以名聞十二月車駕南廵詔郢豫二州孝悌㢘義文武應求者具以名聞十九年四月行幸魯城詔兖州刺史舉部内士人才堪軍國及守宰治行具以名聞六月帝自南伐迴詔車駕所經孝悌㢘義文武應求者具以名聞十月辛酉詔州郡諸有士庶經行修敏文思遒逸才長吏治堪幹政事者以時發遣二十年七月丁亥詔曰炎陽爽節秋霖大澍在予之責實深慄慄故輟膳三晨以命上訴靈鑒誠欵曲流雲液雖休勿休寧敢僭怠将有賢人湛徳髙士凝棲雖加銓採未能招致其精訪幽谷舉兹賢彦直言極諫輔予不及二十一年五月詔雍州其孝友徳義文學才幹悉仰貢舉孝明孝昌元年三月詔曰選衆而舉其來自昔朕纉承大業綜理萬幾求賢致治心焉若渴知人則哲振古所難宜博訪公卿採兹聲實可令第一品以下五品以上各薦其所知不限素身居職必使精辦器藝具注所能然後依牒簡擢隨才收叙庻濟濟之美無替往時蹇蹇之直有申兹歳九月詔百官五品以上各舉所知孝荘建義元年五月詔求徳行文藝政事彊直者縣令太守刺史皆叙其志業具以表聞得三人以上縣令太守刺史賞一階舉非其人者亦黜一階前廢帝普泰元年三月詔天下徳孝仁賢忠義志信者可以禮召赴闕其不應召者以不敬論後周閔帝元年八月甲午詔曰帝王之治天下罔弗博求衆才以乂厥民今二十四軍宜舉賢良堪治民者軍各九人被舉之人於後不稱厥任者所舉官司皆治其罪武帝太和元年二月戊辰詔三公已下各舉所知建徳元年三月詔公卿以下各舉所知三年二月令六府各舉賢良清正之人四年詔諸畿郡各舉賢良六年平齊詔山東諸州各舉明經幹治者二人若竒才異術卓爾不羣者不拘多少又詔山東諸州舉有才者上縣六人中縣五人下縣四人赴行在所共論政治得失静帝大定元年詔曰帝王設官惟才是務人臣報國薦賢為重去歲已來屢有妖冦宰臣英筭咸得清蕩逆亂之後兵車始竭遐邇勞役生民未康居官之徒致治者寡斯故上失其道以至於兹亦繇下有幽人未展其力今四海寧一八表無塵元輔執鈞垂風揚化若使天下英傑盡升於朝銓衡陟䧏量才而處垂拱無為庶幾可致於是遣戎秩上開府以上職事下大夫以上外官刺史以上各舉清平勤幹者三人被舉之人居官三年有功過者所舉之人隨加賞罰隋文帝開皇三年正月甲戌詔舉賢良十八年詔京官五品以上總管刺史以志行修謹平清幹濟二科舉人仁夀二年七月丙戌詔内外官各舉所知三年七月丁卯詔曰日往月來唯天所以運序山鎭川流唯地所以宣氣運序則寒暑無差宣氣則雲雨有作故能成天地之大徳育萬物而為功況以一人君於四海睹物欲運獨見致治不藉羣才未之有也是以唐堯欽明命羲和以居嶽虞舜敬徳升元凱而作相伊尹鼎爼之媵為殷之阿衡吕望魚釣之夫為周之尚父此則鳴鶴在隂其子必和風雲之從龍虎賢哲之應聖明君徳不回臣道以正故能通天地之和順隂陽之序豈不繇元首而有股肱乎自王道衰人風薄居上莫能公道以御物為下必踵私法以希時上下相䝉君臣義失義失則政乖政乖則人困葢同徳之風不嗣離徳之謗乃生衆人之口鑠金戮辱之禍不測是以行歌避代辭位灌園卷而可懷黜而無愠放逐江湖之上沉赴河海之流所以自潔而不悔者也至於閭閻秀異之士鄉曲博雅之儒言足以佐時行足以厲俗遺棄於草野湮滅而無聞豈勝道哉所以覽古而歎息者也方今區宇一家煙火萬里百姓乂安四夷賔服豈是人功實乃天意朕唯夙夜祗懼将所以上嗣明靈是以小心厲已日愼一日以遺黎在念憂兆庶未康以庶政為懷慮一物失所雖求傳送莫見幽人徒想崆峒未聞至道唯恐商歌於長夜抱闗於夷門逺跡犬羊之間屈身僮僕之伍其令州縣捜揚賢哲皆取明知今古通識治亂䆒政敎之本逹禮樂之源不限多少不得不舉限以三旬咸令進路徴召将送必須以禮時蘓䕫為太子舍人仁夀末天下舉逹禮樂之源者晉王時為雍州牧舉䕫應之詔諸州所舉五十餘人謁見髙祖望䕫謂侍臣曰唯此一人稱吾所舉于是拜晉王友煬帝大業三年四月甲午詔曰天下之重非獨治所安帝王之功豈一士之力自古明君哲后立政經邦何嘗不選賢與能收採滯幽周稱多士漢號得人尚想前風載懷欽佇朕負扆夙興冕旒待旦引領巖谷寘以周行冀與羣才共康庶績而彚茅寂寞投竿罕至豈美璞韜采未値良工将介石在懷確乎難㧞垂鑒則哲憮然興歎凡厥在位譬諸股肱若濟巨川義同舟檝豈得保兹寵祿晦爾所知優游卒歳甚無謂也祁大夫之舉善良史以為至公臧文仲之蔽賢尼父譏其竊位求諸徃古非無褒貶宜思進善用匡寡薄夫孝悌有聞人倫之本徳行敦厚立身之基或節義可稱或操履清潔所以激貪勵俗有益風化彊毅正直執憲不撓學業優敏文才美秀竝為廊廟之用實乃瑚璉之資才堪将略則㧞之以禦侮膂力驍壮則任之以爪牙爰及一藝可取亦宜採錄衆善畢舉與時無棄以此求治庶幾非逺文武有職者五品以上宜依令十科舉人有一於此不必求備朕當待以不次隨才升擢其見任九品以上官者不在舉送之限十年五月庚子詔郡舉孝悌㢘潔各十人唐髙祖武徳五年詔擇善任能救民之要術推賢進士奉上之良規自古哲王𢎞風闡敎設官分職唯才是與然而巖穴幽居草萊僻陋被褐懷珠無因自達實資選衆之舉固藉左右之容義自捜揚理宜精擢是以貢士有適爰致加錫之隆無益於時必貽貶黜之咎末葉澆偽名實相乖取非其人濫居班秩流品所以未穆庶職於是隳廢朕膺圖馭宇寧濟兆民思得賢能用清治本招選之道宜革前弊懲勸之方式加常典苟有才藝所貴適時潔已登朝無嫌自進宜令京官五品以上及諸州總管刺史舉一人其有志行可錄才用未申亦聽自巳具陳藝能當加顯擢授以不次賞罰之科竝依别格所司頒下詳加捜引務在奨納稱朕意焉太宗貞觀元年三月帝謂尚書右僕射封徳彛曰比來令卿舉賢才未嘗有所推薦天下事重宜分朕憂對曰臣愚豈敢不盡心但今所見實無竒才異行帝曰前代明王使人如器不借才於異代皆取士於當時何代無賢才但患遺之不知耳徳彛慙而退三年四月詔曰白屋之内閭閻之人但有文武材能灼然可取或言忠行謹堪理時務或在昬亂而肆情遇太平而克己亦錄名状官人同申是年帝謂宰臣曰朕今孜孜求士欲專心政道聞有好人則抽擢驅使而議者多稱彼皆宰相親故但公等至公行事無避此言便為形迹古人内舉不避親外舉不避讐而為後代稱者以其舉得賢故也卿等但能舉用得才雖是子弟及有讐嫌必不得不舉十一年四月詔曰朕以寡薄嗣守鴻基實資多士共康庶政虛巳側席為日已久投竿捨築罕值其人自親廵東夏觀省風俗興言至治夕惕兢懷然則齊趙魏魯禮義自出江淮呉㑹英髦斯在山川所感古今寧殊載佇風猷實勞夢想宜令河北淮南諸州長官於所部之内精加訪採其孝悌淳篤兼閑時務儒術該通可為時師範文詞秀美才堪著述明識治體可委字民并志行修立為鄉里所推者舉送雒陽宫各給傳乘優禮發遣當隨其器能擢以不次若有老病不堪入朝者具以名聞庶巖穴靡遺俊乂可致務盡捜揚之道稱朕意焉十五年六月詔曰朕遐觀前載歴選列辟莫不貴在得人崇兹多士猶股肱之佐元首譬舟航之濟巨川若夫搆大厦者採衆材於山嶽善為國者求異人於管庫是以陶唐有虞揖讓之聖帝也非元愷不能成功商湯姬發革命之明主也非伊吕無以定其禍亂况乎齊桓中人之材器非濬哲漢武嗣業之主志在驕奢猶頼管仲隰朋之相平津博陸之輔既為五覇之長亦稱萬代之宗是知得士則昌失人則亂朕凝旒夙夜虛心政道雖天地効祉宗社䧏靈區宇晏如俊乂咸事尚恐山林藪澤藏荆隋之寳卜祝屠釣韜蕭張之竒是以躬撫黎庶親觀風俗臨河渭而佇英傑眺箕頴而懷隐淪亟移日月空勞夢寝而驪龍莫兆商歌寂寥豈混迹駑駘未逄良樂之顧将毓徳巖穴方追禽尚之游望雲長想増其歎息可令天下諸州捜揚所部士庶之内或識達公方學綜今古㢘潔正直可以經國佐時或孝悌淳篤節義昭顯始終不移可以敦風厲俗或儒術通明學堪師範或文章秀異才足著述竝宜薦舉具以名聞限來年二月總集泰山庶獨往之夫不遺於版築藏器之士方升於廊廟務得竒偉稱朕意焉是年帝謂宰臣曰致太平之運者唯在得賢才卿等既不能知朕不可遍識日復一日無得人之理今欲令人自舉於事何如魏徴曰知人者智自知者明知人既以為難自知誠亦不易且矜能伐善恐長澆競之風不可行也乃止十七年五月乙丒詔曰朕觀前烈建國君民未有不藉忠良而能濟其功業者也朕顯承宗祀獲奉鴻基側席求賢有年載矣而山林莫致珍玩必臻豈朕好惡之情未達於下其令州縣舉孝㢘茂才好學異能卓犖之士二十年六月手詔曰髙明之天資星辰以麗象博厚之地藉川嶽而成形况於帝王體元立極臨馭萬物字養生靈者乎所以致治之君逺讒佞近忠良屈己以伸人故能成其化為亂之主親不肖疎賢臣虐下以恣情用能成其亂明君遵彼以興國暗主行此以亡身是以馭朽臨氷銘心自戒宵興旰食側席思賢庶欲博訪丘園捜採英俊弼我王道臻於大化焉可令天下諸州明揚側陋所部之内不限吏人其有服道棲仁澄心礪操出片言而標物範備百行以綜人師質髙視於琳琅人不間於曾閔潔志丘園揚名里閈或甄明政術曉達公方禀木鐸於孔門受金科於鄭相竒謀間發明略可以佐時識鑒精通偉才堪於幹國或含章傑出命世挺生麗藻遒文馳楚澤而方駕鈎深覩奥振梁苑以先鳴業擅專門詞髙載筆或辨雕春囿談瑩秋天發研機於一言起飛電於三寸蓄兹奔箭未遂揚庭竝宜推擇咸同舉薦以禮将送具状表聞限以今冬竝與考使同赴庶使焚林之舉咸矯翼於巖廊尺木之階方振鱗於遊霧翹心俊乂稱朕意焉髙宗以貞觀二十三年即位九月詔曰殷宗邁徳化致升平周王顯仁政稱刑措太祖文皇帝神明配徳靈武兼資掃欃槍而王區夏混隂陽而作天地以此大業留屬微躬雖復琯變星霜而心嬰荼毒州郡之長能修厥職禮義興行姦回自屏刑憲不苛孤惸是頼有司詢訪宜以名聞有一於此當超不次其有經明行修談講精熟立身嚴潔才堪教胄者志節妙識用精通博聞彊正終堪卿輔者逰情文藻下筆成章援心處事端平可紀者疾惡揚善依忠履義執持典憲終然不移者京司長官上都督府及上州各舉二人中下州刺史各舉一人前代忠鯁身死王門子孫才堪任官而留滯停移者慨想遺風尤宜旌舉顯慶元年十月手詔曰朕受命上𤣥嗣膺下武每肅恭旒冕延想英竒俯振鷺而企貞臣仰飛鴻而慕良輔雲臺側席玉管屢移宣室整衣金壺亟改寂寥靡覿鑒寐興懷比年雖常進舉遂無英俊猶恐棲巖穴而韜竒樂丘園而晦影宜令河南河北江淮以南州縣或緯俗之英聲馳管樂或濟時之器價逸蕭張學宰帝師材堪棟輔者必當任之不次可明加採訪務盡才傑州縣以禮發遣二年二月詔曰濟時興國實佇九功禦敵安邊亦資七徳朕端拱宣室思𢎞景化将欲分憂俊乂共逸巖廊而比來貢寂英竒舉非勇傑豈稱安慮危之志處存思亂之心如不旌賁逺近則爪牙何寄宜令京官五品以上及諸州牧守各舉所知或勇冠三軍翹闗㧞山之力智兼百勝緯地經天之才藴竒䇿於良平馳功績於衛霍蹤二起於呉白軌雙李於牧廣賞纎善而萬衆恱罸片惡而一軍懼如有此色可精加採訪各以奏聞三年七月帝謂宰臣曰四海之廣唯在得賢卿等用人多作形迹䕶避親知不能盡意甚為不取昔祁奚舉子古人以為美談即使卿等兒姪有材亦須依例進舉五年六月詔内外官四科舉人或孝悌可稱徳行夙著通渉經史堪居繁劇或㳺泳儒術沉研册府下帷不倦博物馳聲或藻思清華詞鋒秀逸舉標文雅材堪逺大或㢘平處事彊直為心洞曉刑書兼苞文藝者精加捜訪各以名薦龍朔元年八月帝謂侍臣曰往者天下七國皆有英賢今四海一統遂無俊傑亦繇經營遼海未暇捜揚将濟巨川佇聞舟楫何其寂寞一至於斯許圉師對曰百里奚處虞而虞亡入秦而秦覇在陛下用之耳帝於是欲於李義府門中㧞擢有材用者遂令本州給傳遣詣東都及至無堪應務者竟罷之三年八月詔内外官五品以上各舉巖藪幽素之士廣加詢訪旁求謡俗式企英材允毗闕政乾封二年八月髙宗引侍臣責以不進賢良司刑少常伯李安期進曰臣聞聖帝明王莫不勞於求賢逸於任使且十室之邑必有忠信况天下至廣非無英彦但比來公卿有所薦引即遭囂謗以為朋黨沉屈者未申而在位者已損所以人思苟免競為緘黙若陛下虛巳招納務於捜訪不忌親讎唯能是用讒毁亦既不入誰敢不竭忠誠此皆事繇陛下非臣等所能致也帝深然之十月令天下諸州舉鴻儒碩學博聞彊記之士咸亨二年十月景帝詔曰禮樂之道其來尚矣朕誕膺眀命克光正歴思隆頌聲以康至道而曲臺闡訓猶乖揖讓之容太樂登歌徒紀鏗鏘之韻良以敎虧綿蕝學闕瞽宗興言盛業寤歎盈抱然則幽誠所著縱九臯而必聞忠信且存在十室而無棄但慮習俎之彦韞跡於閭閻辨鐸之英韜深於林藪夫良玉無脛求之斯來眞龍難覩好之而至其四方士庶及丘園棲隐有能明習禮經詳究音律於行無遺在藝可錄者宜令州縣捜揚博訪具以名聞五年八月詔五品以上各舉所知上元三年閏三月令京官五品以上及諸州都督刺史各舉所知一人儀鳳元年十二月詔曰山東江左人物甚衆雖每充賔薦而未盡英髦或孝悌通神遐邇惟敬或徳行光裕邦邑崇仰或學統九流垂帷覩奥或文髙六藝下筆成章或備曉八音洞該七曜或射能穿札力可翹闗或丘園秀異志存棲隐或将帥子孫素稱勇烈委廵撫大使咸加採訪佇申褒奨亦有婆娑鄉曲負材傲俗為譏議所斥䧟於跅弛之流者亦宜推擇各以名聞三年十二月詔京文武職事三品以上官毎年各舉所知或才藴廊廟器均瑚璉體王佐之嘉猷資公輔之宏量或竒謀異算决勝千里或投石㧞距勇冠三軍或謇諤忠亮志存規弼或繩違紏惡不避權豪或威恵仁明堪居牧守之重或公正㢘直足膺令長之任咸宜捜訪具錄封進朕當詳覽量加奨擢調露元年七月詔令雒州眀揚側陋或孝弟純至感於神眀或文武兼資才堪将相或學藝該博業標儒首或藻思宏贍思擅文宗或洞曉音律識均牙曠或深眀歴數妙同京管者咸令薦舉永隆元年十二月詔縣令刺史御史員外郎太子舍人司儀郎左右史文武五品以上清要近侍及宿衞之官並令舉所知一人中宗神龍元年二月詔九品以上及朝集使舉賢良方正直言之士三月制令京官職事五品以上各舉縣令一人五月制令職官五品以上各舉所知一人九月制内外文武五品以上官竝縣令京師清官九品以上各舉孝弟㢘讓一人景龍元年二月令舉天下鴻儒碩學之士三年三月令内外五品以上舉堪任刺史縣令者册府元龜卷六十七
