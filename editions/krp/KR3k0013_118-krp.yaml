body:
  text: 册府元龜卷一百十八宋王欽若等撰帝王部親征第三唐𤣥宗開元二年十月吐蕃復侵渭源帝思親征乃下制曰朕聞夷不亂華既殊於中外虜或犯塞必興於甲兵我國家一戎定業累聖膺期干戚斯舞梯航畢至小蕃逺㓂假息游魂爰自昔年慕我朝化申以婚姻之好結為舅甥之國嵗時徃復信使相望繒繡以益其饒衣冠以增其寵鴻恩大造特加於蠻貊狼子野心遂同於梟獍在於亭障頗開驚擾己命師徒遄往追躡摧兇殄逆今也其時滅迹掃塵期之不日然以問罪之義百王所以龔行戒嚴之典六軍所以親御是用中宵按劎昧曉求衣豈自逸於崇高而不勤於櫛沐眷茲右輔逺界西陲雖駐蹕之暫勞佇觀兵而决勝宜取今月擇日進發其差取後軍四萬人諸色蕃兵二萬人京兆府兵一萬人飛騎二萬人量追三百里内兵留當下人充萬騎五萬一千人幽隴兵各二千人岐州兵五千人並集本州待進止其馬四萬匹取三百里内諸廐及府馬充所追兵馬及押官委本州精簡赴集衛尉卿兼檢校左金吾大将軍王毛仲為左一軍摠管右金吾将軍康海源為副左武衛大将軍李昌為右一軍摠管左武衛將軍馬衛為副左羽林大將軍趙成恩為左二軍摠管右領軍將軍衛秦義禮為副右羽林將軍楊敬述為左三軍摠管右領軍將軍鮮于庭誨為副左羽林將軍馬崇為右三軍摠管右監門將軍執失善光為副所司准式俾其長驅隴坻深入湟中授以方略掃清氛祲其縁頓支俱務從省約丁巳勑曰戎狄憑陵每勞征戍比興師旅猶未掃除縁邊之人頗有其患朕為父母實用憂勤今欲親案邊疆躬行弔伐宜令朝廷召募勇夫壯士㧞萃逸羣者稱為屯衛飛騎且各量與賜帛行廻之日簡入羽林自餘之人取為長行仍令兵部侍郎韋抗紫㣲舍人王珽即於朝堂簡募十日内具所得人姓名奏聞戊午至自温湯命左驍衛大將軍裴元哲領兵二萬人馳驛往隴右與薛納同討逆虜薛納引兵至渭源遇吐蕃賊數萬戰於武階驛與王晙掎角夾攻之大破賊衆追奔至洮水又戰於城堡豐安軍使王海賔先鋒力戰死之將士乗勝進擊又敗之獲數萬人擒其酋率將士盡收其所掠羊馬并獲其器械不可勝數時帝方欲親征及聞納等克㨗大悦遂停親征後唐明宗天成二年十月乙酉帝幸汴州戊子至京水店汴州分廵院官王榮走馬報朱守殷已叛帝親統禁軍倍程先進己丑師臨汴州四面逼之人百其勇鬭不踰時城潰而入戮其黨類晡晩收軍當日寧帖告諭天下曰朕以名藩龍潜舊地思覃風教爰議廵遊今月九日至滎陽得朱守殷詐奏稱本道都指揮使馬彦超等欲謀叛逆輙使殺害尋令宣徽使范延光徑往撫諭自後更無申奏節度使宋敬殷及使臣十餘並遭陷沒至十日探知虜掠近城居人上城閉門顯為拒捍朕親御六軍徑臨孤壘守殷逆黨敵於鄭門百姓望風下城效順守殷一家遂自屠戮尋獲首級已復城池且朱守殷久事本朝繼膺重委洎朕纘承宗社前後累降渥恩統處尹宗薦居節制位兼将相貴極人臣此謂戮力一心贊時為國殊不知潜懷梟性暗畜狼心全無事上之忠遽恣欺天之意遂加誣於都校兼殺戮於近臣驅脅生靈拒張車駕果貽衆怒誅厥全宗兇狂之釁自招悖逆之辜莫逭一方既靜萬國永安凡所聞知當極慶快如有諸色人被朱守殷密行文字妄有扇揺盖慮奸細黠黷良善朕皆明察不汝疵瑕當各安懷勿為挂慮庚寅帝御𤣥徳殿受賀宣陜府節度使石敬瑭權知汴州事辛邜百官自鄭州到立班稱賀臣欽若等曰後唐莊宗雖稱尊號未至河南其中征伐並具創業門晋少帝天福九年正月乙亥滄鎮貝鄴馳吿契丹前鋒趙延夀趙延昭領兵五萬將及甘陵是日發兵六千屯澶淵以待之庚辰以宋州節度使高行周為北面行營都部署河陽節度使符彦卿為騎軍左排陣使宿州刺史梁進明副之神武統軍皇甫遇為騎軍右排陣使懷州刺史薛懷副之陕府節度使王周為歩軍左排陣使泌州刺史劉詞副之羽林統軍潘環為歩軍右排陣使麟州刺史尹實副之䕶聖左右廂主王景王萬敢為騎軍左右將慈州刺史周景殷武衛將軍張鵬監䕶奉國左右廂主李殷程福贇為歩軍左右將閤門使蕭處仁高勳監䕶前絳州刺史劉在明為先鋒都指揮使衛州刺史石公霸副之坊州刺史陳思讓監䕶又以前單州刺史劉禧為都壕寨使前階州刺史姚武為都橋道使壬午詔曰朕以恭承先㫖尊奉北朝無事不隨有求皆應竭國家之財用務蕃漢之歡和豈謂貪殘終隳信義直驅鐵騎深犯封疆如是憑陵安能俯就顧師徒之憤惋念生聚之凋傷頃議親征用平燕薊盖救驚搔之患寧辭䟦渉之勞取此月十三日躬御六師北征㩦貳指期旦夕悉盪氛霾凡爾百寮當體朕意以前邠州節度使李同為東京留守前晋州節度使周宻前同州節度使李懷忠為東京廵檢使乙酉帝離京戊子鎮邢雒徳四州告攻圍日急辛卯講武於北都甲午以北京留守劉知逺為幽州道行營招討使鎮州節度使杜重威副之定州節度使馬全節為都虞候職員將校委招討使便宜署置丙申虜以偏師㓂黎陽遣右武衛上將軍張彦澤亳州防禦使李蕚坊州刺史陳思讓率勁騎三千拒之辛丑太原奏與契丹偉王戰於秀容斬首三千級生擒五百人獲其大將一十七奪得偉王金槍鐵甲及旗幡等潰散敵軍入鵶鳴谷已進軍襲之三月丙午先鋒指揮使石公霸遇敵數萬騎於戚城之北為敵所圍高行周符彦卿在城之東南方息於林下忽聞衆至駭愕督軍而進纔數千騎衆寡不較行周遣人馳告景延廣請益師延廣遲留俟帝進止既而行周等為敵圍之數重三人大譟瞋目奮擊契丹傷死者甚多帝自御親兵援之前軍獲免戊申李守直等軍至馬家渡敵歩卒萬人方築壘濬隍以騎軍散列其外舟楫數十猶渡兵未已我師搏之敵騎退走遂攻其城四面樹梯一鼓而上敵衆大敗乗馬赴河溺者數千西岸敵軍數萬皷譟揚旗以脅我軍及見東岸俘執斬刈大半陷没水中即大哭而去是日獲敵馬八百匹執敵將莫城義節樓使崔裕先鋒梁思榮契丹大首領信悉兵馬都監常尊王令威吐渾將黨大地羽林使閻令省軍校張興王佐卿張令霸等魁首七十八人部典節級五百人送於行在餘衆數千即時斬之辛亥夏州節度使李彞殷銀州刺史李彞沼合蕃漢之兵四萬抵麟州濟河侵契丹之境易州刺史安蕃約戰契丹於北平獲車馬兵仗敵走保祁溝闗斷其橋梁而還乙卯梁州刺史康彦進率兵侵瀛州破荆窠北薛二城己未定州節度使馬全節率州兵掠秦州破白團城生擒敵軍七百人獲牛馬千餘及器械八百滄州奏敵皇城使李珂領兵三千援送所掠男女三千餘人及貨具等長蘆而歸尋率輕騎攻其不意斬獲千餘人人口輜重悉委之而走三月癸酉朔契丹耶律徳光領兵十餘萬來戰是日高行周前軍在戚城之南既午其將趙延夀趙延昭以數萬騎出於王師之西徳光以鐵騎出我師之東接戰交相勝負至晡時徳光以勁兵中央而來帝亦出親軍列後陣二陣俱列東西偃月際於河涘旗幟鮮盛士馬嚴整徳光望之懼形於色謂左右曰楊光逺言晋朝兵馬半已餓死今日觀之何其壯耶敵騎往來馳突左折右旋我師植立不動萬弩齊彀飛矢蔽地馬行其中多所躓蹶賊軍稍却王師亡命者告徳光曰南軍東面人少㳂河城栅不固宜併兵攻之徳光乃令千騎為隊前鋭後方攻其東首李守貞薛懷讓以勝兵數千急赴之大戰王師敗時夹馬軍士千餘人在堤間治水寨使人急召之旗幡之末出於堰埭敵以為偽遁伏兵所起遂整軍而立良久復戰守貞在戰之後立馬於大塜之端去陣三百餘歩不敢寸進俄頃王師又退至塜下李守貞以數百騎短兵直進擊之敵稍退戰塲之地人馬死者無算斷箭殘鏃交横厚數寸既而昏暝乃擊鉦而去夜行三十里乃收合夷傷萃於野次甲戌太原鎮定咸奏已各離本部刻期於邯戰㑹合師徒乙亥契丹帳内小校竊徳光所乗馬來奔辛巳傳木書收軍北去四月帝還京開運元年十一月壬申詔曰朕以蕃㓂未平邊陲多事選求將帥徴發師徒北面屯軍汾河守禦即目雖無侵軼亦須廣設隄防朕將親率虎貔躬擐甲胄俟聞南牧即便北征不須先定日辰别行曉諭所有供億支用宜令三司預自指揮令隨從諸司職員並宜嘗備行諸侯不得朝覲亦不得以進獻供侍借斂吏民凡百臣寮當體是意二年正月乙丑離京二月丙子次澶州大閲諸軍於戚城東帝乗馬指揮於軍中丁丑復大閲列左右陣戎容甚肅帝親乗馬指揮至晩還行宫己卯勑以許州符彦卿充北面行營馬軍都指揮使統軍潘環充北面行營歩軍都指揮使壬午定州易州各差人奏契丹攻圍祁州癸未宣差皇甫遇領馬歩軍兵士二十九指揮天威兵士二千一百八十人進發是月契丹陷祁州刺史沈斌死之三月甲辰都招討使杜威奏今月八日臣與都監李守貞副招討馬全節安審琦皇甫遇等部領大將發赴定州易州刺史安審約奏二月三日夜差壮丁三百人入敵寨斫營戮敵約千人損馬七百匹又據狼山諸寨稱相繼邀殺蕃軍不少庚戌杜威大軍攻泰州刺史晋廷謙以州降獲守城兵士三百八十九人辛亥易州安審約奏狼山守把孫方簡掩殺得其渠諧里相公一千餘人奚車一兩内有諧里妻及奴婢等甲寅杜威收復滿城獲契丹首領没刺相公及守城兵士一千九百六十四人内七百人是新蔚二州兵士並放歸本道其一千二百人是契丹監送次乙卯收復遂城縣其守城契丹留六十三人首領餘並處斬丁巳杜威退還泰州是日契丹前鋒至涿州戊午杜威大軍在泰州契丹前鋒至矣己未大軍離泰州契丹踵其後是夜營於方順河側敵亦相隨立牙帳己未大軍次陽城庚申契丹萬騎如牆而來大軍歩卒排斗底陣騎軍鬭二十餘合午後張彦澤皇甫遇符彦卿等選勁騎擊之遂行千餘里北渡白溝而去癸亥戰於白圍谷是日契丹主在奚車中及軍敗走車行十餘里追兵既急獲一槖駞乗之而走乙丑杜威大軍自定州班師赴鎮州勑曰睠唯泰郡素乃漢疆偶𨽻殊域久罹塗炭遇王師之進討傾臣節以來降况地處要衝人推勇悍將控臨於强敵宜係屬於雄藩其泰州宜割屬定州為屬郡以狼山寨主孫方簡為泰州刺史仍檢校尚書右僕射本州守禦都指揮使充定州東西面都廵檢四月丙寅朔北面軍前遣人走馬報前月二十八日殺戮敵軍大敗是月帝還京漢高祖天福十二年九月御札曰朕自副推崇敢忘寅畏及物必加於恩信任人無間於親疎期區宇之大同俾蒸黎之小泰洎朕始臨梁苑畢㑹藩侯盖當再造之期用普維新之命莫不駿奔入覲率俾爭先旌旄之寄咸遷帶礪之盟益固魏博杜重威負釁雖重在朕含垢亦深盡捨前非只期後效是以授之真秩換彼名藩而祻胎已成臭氣復作北勾冒頓南拒朝章若不加誅何以為法黷我天憲勞我兵威今則大進梯橦克收壁壘重念一夫作孽百姓何辜雖已推祝網之仁尚宜軫納隍之慮必恐孤城既㧞衆怒猶深儻驚飈更迅於雷霆即烈焰寧分於玉石朕所以軫傷在念想慮尤深將親勞於六師宜再詢於順動豈辭櫛沐須議省廵取今月二十九日車駕起離闕下暫幸澶魏已來凡百士庶宜體朕意十月戊戌帝至鄴城阮亭駐蹕行府節度使高行周率羣校奉迎午後帝次御營丙子宣遣高行周督諸軍分攻城四面是日諸軍將士所傷甚衆宣遣還營始一日前諸軍入謁行宫奏請攻城帝曰朕本意自來者止為魏民久嬰城塹有倒懸之危復以重威執迷抱恥無出處之計今欲示之以武威來之以大義恃其恩待必見歸投若使城中億萬之命重遭塗炭何以表朕弔伐之意也如衆議須意攻迫但益兵張勢可矣時宰執奏曰兵法云夫有金城湯池内無積粟雖善戰者不能守况重威城孤兵散勢窮力殫輿櫬請死期在旦夕而已睿意所宣生靈大幸足以彰陛下有殷湯開網之仁也乙未帝乗馬廵城宣遣諸軍以竹籠橋布列架壕水攻擊至未時還宫丁卯諸軍馬歩兵士一千餘人各願充梯頭於行宫見帝面賜慰勉以俟指命壬申杜重威與妻石氏即石晋宋國長公主也相次遣牙校崔華鄭進齎表獻欵乞赴行在甲戌又遣觀察判官王敏賫表赴行宫丁丑重威出䧏鄴都平是日除重威守太傅中書令楚國公周太祖廣順二年正月勑曰兖州節度使慕容彦超不知恩信輙恣兇狂北則勾喚劉崇南則結連淮㓂刼掠鄰縣邀截路行差補元隨主持鎮務一向殘害生聚百般誅斂貨財贍養姦兇圖謀悖亂割剝之苦所不忍聞朕每為含容欲全終始近據東西諸處申奏慕容彦超偏於管内抽㸃鄉軍人户不伏追差逐處殺刼鎮將又懼挟讐屠害悉是逃竄山林言念衆多盡能忠孝嗟我赤子遇此亂臣方當寒凍之時可想艱辛之狀須行弔伐以救孤危今差侍衛歩軍都指揮使曹英等統領大軍往彼問罪已指揮告報諸軍入兖州界並不得下路村舍斫伐桑棗驅虜牛驢毁拆舍屋發掘墳墓如有犯者便行軍令候至城下委曹英散行指揮安撫人户兼勒諸縣令依舊勾當公事仍差使臣於兖州四面邊界招喚百姓令著營養如有惡黨接便為非者即就彼處斷其人户不得更於堡塞圑集仍勒縣鎮官員節級明具朝廷指揮告報勸課農桑無失春計兼自前有兖州管内人户被慕容彦超迫虜誑惑誘引見在州城内者及有元在兖州充職人等必是逐人各有骨肉房親在城今官中一切不問宜令州縣倍加安撫勿縱節級所繇衷私恐嚇若有全家並在兖州城内者或有莊田店宅及諸般物産如元有人勾當勒一切仍舊若無人主張即委鄰人檢校看守勿信任人妄有占據及毁拆斫伐候收復城池分付本主一夫作亂萬姓何辜興言疚懷傷歎無己故茲告諭各令知委曹英等討之數月未克四月内出御札曰昨以慕容彥超違負國朝閉據城壘尚稽顯戮未决羣情方屬災蒸正勞師旅朕恭臨萬國深居九重處宫闕之清虗雖然遂性念將士之勤苦寧免疚心暫自省廵往申慰撫况非逺路不至甚勞凡我臣寮當體茲意朕取五月五日進發離京赴兖州城下慰勞行營將士㳂路側近節度防禦團練使刺史不得離本州府來赴朝覲其隨駕一行供頓並取係省錢物准備差侍臣勾當仍預告報一路州縣並不得别有排比其隨從臣寮内外諸司官中已有供給州縣亦不得别有破費祗供其要載動用什物車乗亦已指揮備辦如闕少之時候見宣命即得供應只不得預前排比如衷私有人小小取索並不得應副或軍都及諸色人於路途店肆買所須什物先還價錢兩京留司百官只於逓中附表起居時熱不用差官至行在沿路所指揮事件車駕廽日亦依此施行以樞密副使鄭仁誨權大内都㸃檢以中書侍郎同平章事判三司李榖權東京留守兼判開封府侍衛馬軍都指揮郭崇在京都廵檢庚申帝發京師戊辰至兖州城下乙亥旦藥元福部下兵如羊馬城遣奏帝帝出宫督諸軍繇是皷譟而進勇奮之勢不可遏帝遣中使至南寨促王峻進軍廹城峻部下軍爭登城壘賊衆奔潰官軍遂入直抵牙門慕容彦超親率其黨來抵官軍官軍退却緣城而出㑹城北大軍已攀堞而入彦超復結隊死戰虎揵都指揮使杜珣東西班都虞候薄令遷死之少頃城南諸軍復入彦超勢窘乃與妻投井而死彦超長子繼勲與徒黨五百餘自東門奔帝遣騎兵追之王峻亦領親騎追及盡殺之生擒繼勲以獻六師大掠城中死者萬人兖州平世宗顯徳元年三月癸未内出御札曰朕自遘閔凶再經晦朔山陵已卜日月有期未忘荼蓼之情豈願干戈之役而河東劉崇幸灾樂祻安忍阻兵乗我大喪犯予邊境勾引蕃㓂抽率鄉兵殺害生靈覬覦州郡朕為萬姓之父母守先帝之基扄聞此侵凌難以啓處所宜順天地不容之意從驍雄共憤之心親御甲兵往寕邊鄙務清患難敢避驅馳凡在衆多當體茲意朕取此月十一日親率大軍取河陽路親征竚平妖孽永泰寰區應沿路排當並不得差遣百姓科配州縣及於人户處借索刼掠逺近節度刺史並不得輙離理所求赴朝覲應諸司各宜應奉公事者即仰從駕諸無事者不在扈隨務從省要免至勞煩故茲札示想宜知悉以樞密使鄭仁誨為東京留守乙酉帝御戎服親摠六師出東都壬辰次澤州未晡帝披甲具戎器觀兵於東北郊郊距州十五里夜宿於村舍癸巳前鋒與賊軍相遇甲午賊陳於高平縣南之高原有賊中來者云劉崇自將騎三萬餘騎嚴陳以待王師鄉兵不與其數初偵邏者云崇營於八議關闗南距高平四十里契丹聚於長子縣賊將張暉領三千餘騎為前鋒帝慮其奔遁促兵以擊之崇東西列陣頗亦嚴整河陽節度使劉詞帥師在後勢未相繼羣情私相惴恐惟帝鋭氣益振乃命侍衛馬歩都虞候李重進與滑州節度使白重贊將左居陣之西廂侍衛馬軍都指揮使樊愛能歩軍都指揮使何徽將右居陣之東廂宣徽使向訓鄭州防禦使史彦超以精騎當其中殿前都指揮使張永徳以禁兵衛蹕帝介馬觀陣兩軍交鋒未幾樊愛能望賊而遁東廂騎軍潰亂歩卒數萬皆解甲投賊呼萬嵗數聲帝覺勢危乃自率親騎臨陣督戰時太祖馳騎於陣前臣欽若等曰自此以後言太祖者皆皇朝太祖歴試之事先犯其鋒萬旅觀之無不披靡繇是戰士皆奮命爭先賊軍大敗日暮賊萬餘阻澗而陣㑹劉詞領兵至與大軍追之賊軍又潰臨陣斬賊將張暉及偽樞密使王延嗣諸將分兵追襲勢若風雨殭尸棄甲填滿山谷初夜王師至高平降賊軍數千人所棄輜重兵器駞馬及偽乗輿器服等不可勝紀壬寅以天雄軍節度使衛王符彦卿為河東行營一行都部署兼知太原行府事澶州節度使郭崇副之宣徽南院使向訓為監䕶侍衛馬歩都虞候李重進為行軍馬歩都虞候鎮國軍節度使王彦超為先鋒都指揮使領歩騎二萬進發討賊乃詔河中節度使王彦超陕府節度使韓通自隂地闗入與符彦卿㑹合進軍又以河陽節度使劉詞為隨駕都督署鄜州節度使白重贊為副五月甲戌朔帝宿於團栢谷乙亥次落漠驛丙午至太原城下駐蹕於行宫符彦卿率諸將已下來見庚辰命彦卿郭從義向訓白重贊史彦超等率歩騎萬餘赴忻州盖自忻代歸順之後契丹猶在境故命諸將進軍以討之帝復耀兵城下癸未幸城西命諸軍飛礟以擊城乙酉親領六師廵城戊子幸太原城之東引飛礟擊其門壘而旋庚寅城之四面設洞屋飛礟之具辛卯領親騎迫其東門仍以飛礟擊之壬辰帝廵按四面軍砦癸巳遣李筠張永徳以三千騎赴忻州時符彦卿等以契丹在忻北請益兵以驅之故遣筠等往焉六月癸卯朔帝廵賊城親御軍士己巳遲明帝發自太原夕次於來逺驛是行也大集兵車及徴山東懷孟蒲陕丁夫數萬修洞屋雲梯以攻其城旦夕之間期於必取會大雨時行軍士勞苦又聞忻口之師不㨗帝遂决還京之意庚午至自太原三年正月帝將南征庚子御札曰朕以中原雖靜四表未寕臨戎罔憚於躬親問罪須勤於櫛沐今訓齊驍鋭廵幸邊陲用壯軍容永安國歩宜取此月内車駕進發暫幸淮上凡闗舊儀有司准式以宣徽南院使陳州節度使向訓為權東京留守兼判開封府事以端明殿學士左散騎常侍權知開封府事王朴為權東京副留守命曺州節度使韓通權㸃檢侍衛司及為在京内外都廵檢以權判三司張美為大内都㸃檢是日宣侍衛都指揮使歸徳節度使李重進領兵赴晋陽壬寅帝南幸丙辰至夀州城下帝親率六師圍其城數匝號令之聲振於原野列御營於州西北淝河之涘以駐蹕焉丁巳徴宋亳陳潁徐宿許蔡等州丁夫數千萬以備攻城之役又命中使高彦彬等四人各領兵於夀州四面安撫編户及禁其俘掠又命侍衛歩軍都指揮使李繼勳領兵於城之南效順都指揮使唐景恩領兵於城之東各進洞屋雲梯以攻之壬戌太祖上言敗淮賊萬餘衆於渦口斬偽兵馬都監四方館使何延錫靜江軍使李鐸等於陣擒偽夀州節度使劉仁贍姪天忠指揮使崇浦及獲戰船五十餘隻初吳人遣軍萬餘衆維舟於淮列砦於塗山之下上命太祖領鐵騎數千以襲太祖將至賊砦十餘里復其餘軍遣輕騎百餘扣其砦門與之交鋒既而為偽遁之勢仍令數騎棄其馬而遁呉人得其馬大喜因皷譟而來離其砦數里太祖奮伏兵以擊之殺獲殆盡死者不可勝紀二月甲戌徐州遣牙將王嵒押泗州牙校王知朗齎江南國主李景書一函来上書云唐皇帝奉書於大周皇帝不答戊寅命鄧州節度使侯章為攻取賊水砦都部署右驍衛大將軍王環副之四月乙亥帝至濠州駐蹕於其城南己卯韓令坤上言敗楚州賊將馬在貴等萬餘衆於灣頭堰獲偽連州刺史秦進崇等是日殿前都指揮使張永徳上言敗泗州賊軍千餘人於曲溪堰先是江南既失揚州乃令隣郡悉發部兵同謀收復至是皆為我師所敗庚辰詔諭諸道曰朕自渡長淮尋清千里戎輅方期於南下金陵哀告而上章乞駐禁軍稱臣待罪念其危迫未遣攻收不謂忽逞狂謀又屯殘冦韓令坤趙太祖諱憤其姦詐戮力掃除鋭旅纔交賊徒大敗生擒偽將盡奪樓船竚於旦夕之間便見澄清之運凡聞克㨗諒極懽呼五月自宿宋還京六月李繼勳攻夀州為賊所敗時李重進駐軍於其城北聞繼勳之敗幾不能守將議退軍會太祖自六合領兵歸闕路出於夀春因為駐留旬日重進倚以為援故其軍復振四年正月戊申御札曰朕躬臨庶政志靜八方顧淮海之未賓命師徒而致討克㨗相繼殺獲甚多料彼孤危安能抵拒然以將士在外攻戰踰年竭力盡忠摧兇破敵念茲辛苦嘗軫憂勞暫議省廵親行慰撫且地理之不逺諒廻復以非遥今取二月内暫幸淮上應自来緣路供頓務從省略凡有費用並以官物供備所在不得科配其諸約束條件一如近年廵按之例二月甲戌以樞密副使王朴為權東京留守兼判開封府事以内客省使昝居潤副焉以三司使張美為大内都廵檢以侍衛都虞候韓通為京城内外都廵檢乙亥帝衣戎服率歩騎數萬繇薰風門出三月己丑次石硖山瞰山川之形勢是夜大陳師旅繇浮橋濟淮抵夀州之北庚寅旦帝躬擐甲胄擁兵於紫金山南乃命太祖領殿前諸軍擊賊先鋒砦一皷而破之斬吳㓂千餘級餘衆復保山砦攻之未下帝復命太祖領兵伏紫金山攻一砦破之又殺獲賊軍二千餘衆遂斷其来道繇是賊兵首尾不能相救至暮帝分兵守其城砦廻次於下蔡行宫辛卯夜偽監軍使朱仁裕孫璘等相次各舉其砦来降降其卒萬餘衆帝慮其餘黨沿流東潰遽命歩將趙晁率丹師數千沿淮而下是日帝復領兵次於趙歩詰旦淮南岸賊之大砦已為王師所陷殺獲萬餘衆擒賊將偽應援使建州節度使許文顯偽應援都軍使前湖南節度使邊鎬等其餘黨果沿流東下帝遂自趙歩領親騎數百循淮之北岸以逐之又命趙晁等諸將縱舟師順流以擊之時太祖於淮南岸追擊賊卒或殺或溺殆將萬數日既晡帝乗勝馳騎至荆山洪洪距趙歩盖二百餘里沿路又有雒口等砦砦皆迎刄而下之殺溺之外擒賊軍數千人獲戰艦糧船共數百餘隻稻米七萬餘石鎧甲三萬餘副克㨗之速未之有也是夜帝入於鎮淮軍以駐蹕焉甲午詔發近縣丁夫數千城鎮淮軍軍有二城夹淮相對仍命徙下蔡浮橋維於其間甲辰幸夀州城北耀兵而還丙午夀州劉仁贍奉表請降戊辰帝率六師於夀州城北受劉仁贍降詔諭天下曰朕昨者再舉鋭師重清淮甸憑𤣥穹之助順頼將相之協心盡至援軍便臨孤壘劉仁贍智勇俱竭請罪軍門相次遣男奉表輸誠乞全生聚今月十一日大陳兵衆直抵城池劉仁贍率在城兵士一萬餘衆及軍府將吏僧道百姓等出城納欵尋便撫安夀春既靜於煙塵江表竚同於文軌逺聞克㨗當慰衷誠丙辰帝議還京四月至自夀州東京留司文武百官迎見於高砦鎮且以勝㨗稱賀上顧盼者久之兵部尚書張昭因伏奏於馬前曰陛下昨離京之日臣等親奉徳音期以兩月還京今纔五十餘日矣料敵班師皆如睿算臣等不勝慶忭再拜呼萬嵗上大悦十月戊辰降御札曰向者以淮甸未平王師致討實賴忠貞之力繼成克㨗之功漸屬嚴凝念彼征役况今邊陲無事軍旅正雄須議省廵親躬撫問將布混同之化罔辭櫛沐之勞止期一兩月間車駕却還京闕凡在中外當體朕懷今取此月内暫幸淮上應往来沿路供頓務從省畧凡有費用並以官物供備所在不得科配己巳以樞密使王朴充東京權留守三司使張美充大内都㸃檢壬申帝離京丁亥至濠州城西設御營以駐蹕焉戊子帝親領兵破賊砦一所殺淮賊數百人砦在濠州東北十八里灘上其灘廣袤數重淮水浸而圜之乃濠上之咽喉先是賊據其地泊舟楫以自固恃其四面水深謂我師必不能濟帝之將行也令悉索行在槖駞以徃臣寮咸不喻其㫖及至命甲士數百人跨槖駞以濟癸巳帝親領兵於濠州城下分命諸軍攻破賊城水砦斬獲數百人先是賊以戰船數百泊於城北植木於淮以梗我舟師之路是日辰時帝乗勝命水軍皷戰棹以往盡㧞其木因縱火焚其巨艦四隻戰船七十餘隻斬二千餘級餘衆皆自溺死至午時又命大軍攻破羊馬城殺賊軍五百餘人自此城中膽破矣丙辰夜偽濠州團練使郭廷渭差人賫陳情表来上且言家在江南慮既降之後掇孥戮之禍欲先令人稟命於李景望許令健歩南去帝尋降璽書慰諭亦俞其請辛丑帝聞渙河已東有賊船數百隻聲言来救應濠州乃親領甲兵及發戰棹水陸東下連夜而行時太祖率精騎前導癸卯大破淮賊於洞口斬級五千收降二千餘人獲戰船三百餘隻因鼓行而東所至皆下太祖乗戰船以逐淮冦至暮為賊船所圍太祖引滿射殺數人淮冦稍却因縱兵以擊之斬其將卒百餘人餘皆棄船自溺死者甚衆因盡焚其舟楫乙巳至泗州城下太祖率兵先攻其南因焚其城門遂乗勝麾軍破其水砦月城是夜帝據月城樓親冒矢石率禁軍以攻其城丙午冬至分命諸軍急攻泗州是時太祖於城之西北隅構洞屋樹雲梯已傅其城矣一夕摧其城闉我師有登其陴取戰具而廻者城中大懼十二月乙卯泗州守將范再遇以其城降獲降卒三千餘人是日帝御泗州城樓受宰臣以下稱賀戊午帝聞有賊船數百泊於洞口先令輕騎偵之賊乃退保於清口是日平明領親騎發自泗州繇淮之北岸太祖領兵繇淮之南岸夹淮齊進又命諸將率戰棹沿流而下己未至清口方舟以濟庚申追及淮賊是夜月色如練歩騎數萬夹淮舟師沿流且戰且行金皷之聲聞數十里辛酉至楚州西北帝乃駐馬指畫諸將一皷而進破之賊衆數千猶陣於南岸太祖領數十騎馳進擊之即時大敗因逐至楚州北門斬獲甚衆是時有賊船數隻順流東下帝乃親率驍騎循淮以追之又命太祖領精騎前進行六十餘里太祖擒其首領偽保太軍節度使濠泗楚海都應援使陳承昭以歸數其收獲戰船除燒盪外得三百餘隻降卒除殺溺水得七千餘人自是長淮之中南人之戰棹盡矣壬戌偽濠州團練使郭廷渭乙丑偽雄武軍使崔萬廸皆以城歸順丁丑泰州平是月江南李景遣兵驅虜揚州士庶渡江焚其州郭而去五年正月丙戌右龍武將軍王漢璋奏攻下海州乙巳帝親攻楚州丙午㧞之斬偽守將張彦卿等二月天長軍使易贇以城歸順戊午帝南巡丁夘駐蹕於廣陵三月壬午朔幸泰州駐蹕於行宮丙戌瓜歩鎮羗人押潤州軍將丘亮到行宮且言江南李景欲差使朝貢丁亥帝發自泰州復幸廣陵壬辰幸迎鑾江口命武衛大將軍李繼勲已下帥黒龍船三十隻於江中灘上殺吳冦數百人虜賊船二隻以歸癸巳帝復幸江口命太祖帥戰棹入江以逐賊船軍士乗勝因直抵南岸焚其營栅至暮而廻丙申江南國主李景遣其臣偽兵部侍郎陳覺奉表来上仍進方物是日帝召覺對於帳殿凡數刻覺奏云臣願自過江取本國表章進納廬舒蘄黄四州之地乞畫江為界以事陛下哀告之詞悽然可憫帝曰能如是朕復何求若吳主復能舉國内附則亦當待以優禮固不阻他稱朕己亥李景遣其臣劉承遇奉表以廬舒蘄黄四州来上且乞畫江為界江北平六年三月丙寅御札曰朕猥以凉徳紹此丕圖既為萬乗之君宜去兆民之患雖晨興夕惕毎嘗思於萬機而紫塞黄河猶未親於經畧秋夏則波濤罔測三冬則邊鄙驚搔將期安國利人豈憚櫛風沐雨今取此月内駕幸滄州已来應沿路排頓竝以官物充餘依舊例以右羽林統軍李繼勲充棹船左廂都部署前澤州刺史劉洪副之以前虢州刺史劉漢遇充棹船右廂都部署客省副使劉贊原副之以宣徽南院使吳廷祚為權東京留守判開封府事宣徽北院使昝居潤副之以三司使張羙為權大内都部署甲戌帝離京辛夘至滄州是日晝漏未盡帝戎服乗馬率歩騎數萬發自滄州直趨敵界中夜駐蹕於野次壬辰至乾寧軍己未帝大治舟師以備北伐丁酉御龍舟率内六軍鳴鼙鼓棹順流而北艛船戰艦首尾數十里己亥至濁流口自北泝流以進庚子雲旗傃西北而行又傃西南而行皆順河路也壬寅以自闗之西河路漸隘水不能勝舟有巨舫數千艘不能進乃捨之其餘小舟即命歩卒挽之以進是時帝亦捨龍舟乗馬登陸按轡而西癸夘帝入于瓦橋闗駐蹕於行宮太祖未及解鞍旋聞闗西之北有敵騎數千乃領百餘騎往擊之敵兵皆望塵而退五月乙巳朔侍衛使李重進以下諸將相次帥師而至是日敵瀛州刺史髙彦暉上表歸順闗南平是行也王師數萬不亡一矢而契丹城邑皆迎刃而下册府元龜卷一百十八
