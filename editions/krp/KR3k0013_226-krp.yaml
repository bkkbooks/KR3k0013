body:
  text: 册府元龜卷二百二十六宋王欽若等撰僭偽部知人寛恕恩宿戒懼知人傳曰人不易知書曰知人則哲是知非精鑒深識度越群萃者安能善其人倫哉昔晉室衰圯中原俶擾群雄開釁盜竊位號乃有觀貌察言視表知裏揣摩其器能探頤於度量淑慝斯辨用舎惟允斯亦臻賞識之奥得旌别之㫖者焉前趙劉元海族子曜聰恵有竒度年捌嵗從元海獵於西山遇雨止樹下迅雷震樹旁人莫不顛仆曜神色自若元海異之曰吾家千里駒也從兄為不亡矣劉聰族弟曜字永眀嘗輕吳鄧而自比樂毅蕭曹時人莫之許也惟聰毎曰永眀世祖魏武之流何數公足道哉後趙石季龍滅遼西得公卿人士多殺之其見擢用終至大官者唯有河東裴憲渤海石璞滎陽鄭系潁川荀綽北地傳暢劉郡崔恱盧諶等十餘人而已前燕慕容廆嘗言吾積福累仁子孫當有中原既而生孫雋廆曰此兒骨相不常吾家得之矣慕容皝即王位時陽騖字士秋少清素好學器識宏逺起家為平州别駕屢獻守時彊國之術事多納用慕容廆甚竒之皝遷為左長史東西征伐參謀帷幄皝臨終謂雋曰陽士秋忠幹貞固可付託大事汝善待之慕容雋之將圖中原也騖制勝之功竝于慕容恪又皝第五子垂少岐嶷有器度身長七尺七寸手垂過膝皝甚寵之嘗目而謂諸弟曰此兒濶達好竒終能破人之家或能成人家故名覇字道業㤙遇踰于世子雋故雋不能平之前秦符洪其孫堅年七嵗洪毎曰此兒姿貌俊偉質性過人非常人相也符堅以符重鎮雒陽以吕光為長史及重謀反堅聞之曰吕光忠孝方正必不同也馳使命光檻重送之後秦姚弋仲初為石祇右丞相祗與冉閔相攻弋仲遣其子襄救祇戒襄曰汝才十倍於閔若不梟擒不須復見我也襄擊閔於嘗盧澤大破之而歸弋仲怒襄之不擒閔也杖之一百姚興時以楊佛嵩都督嶺北討虜諸軍事安逺將軍雍州刺史率嶺北見兵以討赫連勃勃佛嵩發數日興謂群臣曰佛嵩驍猛果銳毎臨敵對冦不可制抑吾嘗節之配兵不過五千今衆旅既多遇賊必敗今去已逺追之無及吾深憂之其下咸以為不然佛嵩果為勃勃所執絶吭而死後蜀李流素重兄子雄有長者之徳毎云興吾家者必此人矣勑諸子尊奉之流疾篤謂諸將曰驍騎髙眀仁愛識斷多竒固足以濟大事然前軍英武殆天所相可共受事於前軍以為成都王後燕慕容盛垂之庶孫盛之僣位征髙句驪契丹慕容熈從征皆勇冠諸將盛曰叔父雄果英壯有世祖之風但𢎞畧不如耳寛恕仲尼有言曰為君者寛裕以容其民又曰寛以得衆恕以利物斯居上之道也若乃跨㨿山河盜竊名器征伐自出禮樂自用亦能恢其大體成其衆務至有覆敗師旅抵觸忌諱或引已而自責或開心而容受至於奔亡越境則歸其妻孥過惡雖彰而復其位遇故人必為用下無猜心夫所以能致於成功亦克永世者良為此也前凉張駿為凉州牧遣武威太守竇濤等東會韓璞等攻討劉曜所䧟秦州諸郡曜將劉裔来距璞軍糧竭遣武興太守辛巖督運於金城劉裔率騎三千襲巖于沃子嶺敗之璞軍遂潰死者二萬餘人靣縳歸罪駿曰孤之罪也将軍何辱皆赦之西域長史李柏請擊叛將趙貞為貞所敗議者以柏造謀致敗請誅之駿曰吾每以漢世宗之殺王恢不如秦穆之赦孟眀竟以减死論群心咸悅後趙石勒初僣稱趙王宫殿及諸門始就制法令甚嚴諱胡尤峻有醉胡乗馬突入止車門勒大怒謂宫門小執法馮翥曰夫人君為令尚望威行天下况宫闕之間乎向馳馬入門為是何人而勿彈白邪翥惶懼忘諱對曰向有醉胡乗馬馳入甚呵禦之而不可與語勒笑曰胡人正自難與言恕而不罪勒以參軍樊坦清貧擢授章武内史既而入辭勒見坦衣冠敝壊大驚曰樊參軍何貧之甚也坦性誠朴率然而對曰頃遭羯賊無道資財蕩盡勒笑曰羯賊乃爾暴掠邪今當相償耳坦大懼叩頭泣謝勒曰孤律自防俗士不關卿輩老書生也前秦符堅僣稱天王慕容垂初為慕容雋所封吳王與世子全奔於堅堅相王猛伐雒引全為參軍猛乃令人詭𫝊垂語於全曰吾已東還汝可為計全信之乃奔暉猛表全叛状垂懼而東奔及藍田為追騎所獲堅立引見東堂慰勉之曰卿家國失和委身投朕賢子志不忘本猶懐首丘書不云乎父子無相及也卿何為過懼而狼狽若斯也於是復垂爵位待如初堅兄法子東海公陽與王猛子散騎侍郎皮謀反事洩堅問反状陽曰禮云父母之仇不同天地臣父哀公死不以罪齊襄復九世之仇而况臣也皮曰臣父丞相有佐命之勲而臣不免貧餒所以圖富也堅流涕謂陽曰哀公之薨事不在朕卿寜不知之讓皮曰丞相臨終託卿以十具牛為田不聞為卿求位知子莫如父何斯言之徴也皆赦不誅徙陽於髙昌皮於朔方之北後秦姚弋仲初為石祗右丞相部曲馬何羅博學有文才張豺之輔石氏也背弋仲歸豺豺以為尚書郎豺敗復歸咸勸殺之弋仲曰今正是招才納竒之日當収其力用不足害也以為參軍其寛恕如此姚興嗣偽位徴凉州刺史王尚還長安既至坐匿吕氏宫人擅殺逃人薄禾等禁止南臺凉州别駕宗敞治中張穆主簿邉憲胡威等上疏理之興乃赦尚之罪以為尚書後蜀李雄僣稱成都王性寛厚簡刑約法甚有名稱氐符成文隗既降復叛手傷雄母及其来也咸釋其罪厚加待之由是夷夏安之威振西土時海内大亂而蜀無事故歸之者相尋後燕慕容盛僣稱燕王遣輔國將軍李早討遼西及還聞盛殺其將魏雙懼棄軍奔走既而歸罪復其爵位盛謂侍中孫勍曰早總三軍之任荷専征之重不能杖節死綏無故逃亡考之軍正不赦之罪也然當先帝之避難衆情離貳骨肉忘其親股肱失忠節早以刑餘之體効力盡命忠欵之至精貫白日朕故録其忘身之功免其丘山之罪北凉沮渠䝉遜僣稱凉王西郡太守梁中庸西奔李𤣥盛䝉遜聞之笑曰吾與中庸義深一體而不信我但自負耳孤豈怪之乃盡歸其妻孥又張掖太守句呼勒出奔西凉後復奔還待之如初恩宥金行中圮獯醜亂華鴟義荐張梟巢競啟恣用庶戮威虐無辜亦有僣據之初慶賚之際懼上帝之弗祐慮下民之有辭弛秋荼之刑縱凝脂之網布維新之令示更始之仁小恵未孚衆弗懐也前凉張茂凉州牧寔之弟晉太興三年寔為閻沙等所害州人推茂為凉州牧乃誅閻沙及黨與數百人赦其境内駿茂之弟晉大寜三年黄門侍郎史淑在姑臧拜駿為凉州牧西平公駿赦其境内其後劉曜遣將劉裔入據振武河西大震遣皇甫該禦之赦其境内重華駿之子晉永和二年自稱持節大都督太尉䕶羗校尉凉州牧西平公假凉王赦其境内祚重華之庶兄晉永和十年廢重華之子耀靈僣稱帝號赦殊死已下𤣥靚重華之子晉永和十二年自號大都督大將軍校尉凉州牧西平公赦其境内前趙劉元海晉永興元年僣即漢王位赦其境内永興二年僣即皇帝位大赦境内是年遷都平陽汾水中得玉璽文曰有新保之盖王莾時璽也得者因増泉海光三字元海以為已瑞大赦境内聰元海之子晉永嘉四年僣即皇帝位大赦境内嘉平中以太廟新成改元建元大赦境内及劉曜䧟長安外城愍帝使侍中宋敞送牋于曜帝出降至平陽聰使子粲告于太廟改年麟嘉大赦境内後聰殺偽太弟乂立粲為太子大赦殊死已下粲聰之子太興元年嗣偽位大赦境内曜元海之族子晉太興元年僣即皇帝位大赦境内唯靳凖一門不在赦例是年繕宗廟社稷南北郊大赦境内殊死已下後終南山摧長安人劉終於摧所得白玉方一尺有文字曰皇亡皇亡敗趙昌井水竭構五梁咢酉小衰困囂䘮嗚呼嗚呼赤牛奮靷其盡乎時羣臣咸賀以為勒滅之徴曜大悦齋七日後受之於太廟又大赦境内及葬其父墓號永垣陵葬妻羊氏墓號顯平陵大赦境内殊死已下又嘗因疾瘳曲赦長安殊死已下咸和三年躬親二郊飭繕神祠望秩山川靡不周及大赦殊死已下復百姓租税之半後趙石勒晉太興二年即偽趙王位赦殊死已下稱元年至十一年荏平獲黒兎獻之於勒於是大悦赦境内改元太和三年僣即皇帝位改元建平大赦境内其後泰州送白獸白鹿荆州送白雉白兎濟隂木連理甘露降苑鄉勒以休瑞竝臻遐方慕義赦三嵗刑已下均百姓去年逋調特赦凉州殊死勒南郊有白氣自壇属天勒大悦還宫赦四嵗刑勒又耕籍田還宫赦五嵗刑𢎞勒之子晉咸和七年嗣偽位改元延熈赦其境内殊死已下季龍勒之弟晉咸康元年廢石𢎞稱居攝趙天王改元建武赦其境内是年遷偽鄴宫澍雨周洽季龍大悦赦殊死已下二年使牙門將張彌徙雒陽鐘簴九龍翁仲銅駝飛亷于鄴季龍大悦赦二嵗刑三年僣稱大趙天王即位于南郊大赦殊死已下六年大旱季龍下書曰前以豐國澠池二冶初建徙刑徒配之權救時務而主者循為常法致起怨聲自今罪犯流徒皆當申奏不得輙配也京獄見囚非手殺人一皆原遣其日澍雨永和五年僣即皇帝位于南郊大赦境内建元曰太寜遵季龍之子晉永和六年僣即皇帝位于大武殿前大赦殊死已下鑒亦季龍之子晉永和六年簒遵即偽位大赦殊死已下冉閔晉永和六年殺石鑒僣即皇帝位于南郊大赦改國號大魏後蜀李特晉大安元年自稱益州牧都督梁益二州諸軍事大將軍大都督赦其境内雄特之子既尅成都諸將固請雄即尊位以晉永興元年僣稱成都王赦其境内是年僣即帝位赦其境内其後遣鎮南任回征木落分寜州之援寜州刺史尹奉降遂有南中之地雄於是赦其境内乂執梓橦太守譙登遂乗勝進軍討文碩害之雄大悦赦其境内期雄第四子晉咸和九年僣即皇帝位大赦境内夀特弟驤之子晉咸康四年僣即偽位赦其境内勢夀之子晉咸康八年嗣偽位赦其境内太保李奕自晉夀舉兵反之蜀人多有從者衆至數萬勢登城距戰奕單騎突門門者射而殺之衆乃潰散勢既誅奕大赦境内改元嘉寜前燕慕容皝晉咸康三年僣即王位赦其境内雋皝之子晉永和五年嗣偽燕王赦其境内八年僣即皇帝位大赦境内其後太子曄死立次子暐為皇太子赦其境内暐雋之子晉昇平四年僣即皇帝位大赦境内是嵗太師慕容根謀為亂於是使其侍中皇甫真䕶軍傳顔収根等於禁中斬之大赦境内後燕慕容垂晉太元十一年僣即帝位赦其境内寳垂之子太元二十一年嗣偽位大赦境内盛寳之子晉隆安二年以長樂王稱制赦其境内是年僣即帝位大赦殊死已下其後立子遼西公為太子赦殊死已下熈垂之子嗣偽位赦殊死已下其後立貴嬪符氏為皇后赦殊死已下雲寳之養子晉義熈二年僣即天皇位復姓髙氏大赦境内殊死已下南燕慕容徳晉隆安四年僣立為燕王大赦境内殊死已下稱元年是年僣即皇帝位于南郊大赦義熈元年立兄子超為太子大赦境内子為父後者人爵二級超徳之兄子晉義熈元年僣即偽位大赦境内其後祀南郊將登壇有獸大如馬狀類䑕而色赤集於圓丘之側俄而不知所在須臾大風暴起天地晝昏其行宫羽儀皆震裂超宻問於太史令成公綏對曰陛下信用姦臣誅戮賢良賦歛繁多事役殷苦所致超懼而大赦北燕馮䟦晉太元二十年僣稱天王于昌黎赦其境内前秦符徤晉永和七年僣稱天王大單于赦境内死罪生徤第三子晉永和十二年僣即皇帝位大赦境内堅生之從弟晉升平元年僣即大秦天王赦其境内三年南逰覇陵大赦五年鳳凰集於東闕大赦其境内百寮進位一級太和五年平鄴都赦慕容暐及其王公已下皆徙于長安封授有差丕堅之子晉太元十年僣即皇帝位於晉陽大赦境内登堅之族孫晉太元十一年僣即皇帝位大赦境内後秦姚萇晉太元九年自稱大將軍大單于萬年秦王大赦境内十一年僣即皇帝位長安大赦姚興萇之子晉太元十九年僣即皇帝位於槐里大赦境内其後以日月薄蝕降號稱王大赦境内因立其子泓為皇太子大赦境内賜男子為父後者爵一級又以姚碩徳来朝大赦境内姚泓興之子晉義熈十二年僣即皇帝位大赦殊死已下西秦乞伏乾歸晉太元十三年自立為大都督大將軍大單于河南王赦其境内十七年平隴西巴西之地赦其境内殊死已下義熈三年僣稱秦王赦其境内熾盤乾歸之子晉義熈六年襲位大赦元熈元年立其第二子慕末為太子領撫軍大將都督中外諸軍事大赦境内其臣佐等多所封授後凉吕光晉太元十三年入姑臧自稱凉州牧酒泉公大赦境内十四年僣即三河王位赦其境内二十一年僣即天王位大赦境内纂光之子晉隆安四年僣即天王位大赦境内隆光弟寳之子晉元興元年僣即天王位大赦西凉李暠晉隆平四年晉昌太守唐瑶推暠為大都督大將軍凉公赦其境内歆暠之子宋永初元年嗣公偽位大赦境内南凉秃髪烏孤晉隆安元年自稱大都督大將軍大單于西平王赦其境内利鹿孤烏孤之弟晉隆安三年即偽位赦其境内殊死已下既逾年改元赦其境内傉檀利鹿孤之弟晉元興元年僣即凉王位赦其境内北凉沮渠䝉遜晉隆安五年自稱使持節大都督大將軍凉州牧張掖公赦其境内義熈八年僣即河西王位大赦境内及䝉遜母車氏疾篤大赦殊死已下其後以嵗旱下書曰頃自春炎旱害及時苗碧原青野倐為枯壤將刑政失中下有寃獄乎役繁賦重上天所譴乎内省多缺孤之罪也書不云乎百姓有過在予一人可大赦殊死已下夏赫連勃勃晉義熈二年僣稱天王大單于赦其境内時姚興鎮北將軍王買徳来奔謂勃勃曰今秦政雖衰藩鎮猶固深願蓄力待時詳而後舉勃勃善之乃赦其境内其後雍州百姓逐刺史朱齡石而迎勃勃入長安為壇于㶚上僣即皇帝位赦其境内及自長安還統萬以宫殿大成於是赦其境内戒懼夫戒慎乎其所不覩恐懼乎其所不聞盖君子防㣲而深慮者也若乃典午中圯諸國蚩蚩各擅土宇自署君長亦能見異知戒臨事而懼或博訪于政治或詢求于讜直兢兢惕怵有為國之風雖修徳之不足亦力行之可見矣前趙劉淵建號令其子聰冦雒陽聰等至宜陽恃連勝不設備𢎞農太守垣延詐降夜襲聰軍大敗而還淵素服迎師劉聰時流星起於牽牛入紫微龍形委蛇其光照地落于平陽北十里視之則有肉長三十歩廣二十七歩臭聞平陽肉旁嘗有哭聲聰甚惡之延公卿已下問曰朕之不徳致有斯異其各極言勿有所諱劉曜既塟其父大雨霖震墓門屋大風飄發其寝堂于壇外五十餘歩曜避正殿素服哭於東堂五日使其鎮軍劉襲太常梁胥繕復之松栢衆木殖已成林至是悉枯時武功豕生犬上邽馬生牛及諸妖變不可勝記曜命其公卿各舉博識直言之士一人司空劉均舉參軍臺産曜親臨東堂遣中黄門䇿問之産極言其故曜覧而嘉之引見東堂訪以政事産流涕歔欷具陳災變之禍政化之闕辭㫖諒直曜改容禮之曜夢三人金面丹唇東向逡廵不言而退曜拜而履其跡旦召公卿已下議之朝臣咸賀以為吉祥惟太史令任義進曰三者厯運統之極也東震位王者之始次也金為兄位物衰落也唇丹不言事之畢也逡廵揖讓退舎之道也為之拜者屈伏於人也履跡而行懼不出彊也東井秦分也五車趙分也秦兵必暴起亡主䘮師留敗趙地逺至三年近七百日其應不逺願陛下思而防之曜大懼於是躬親二郊飭繕神祠望秩山川靡不周及大赦殊死已下復百姓稅租之半後趙石勒以日蝕避正殿三日令群公卿士各上封事勒時暴風大雨震電建徳殿端門襄國市西門殺五人雹起西河介山大如鷄子平地三尺洿下丈餘行人禽獸死者萬數太原樂平武鄉趙郡廣平鉅鹿千餘里樹木摧折禾稼蕩然勒正服于東堂以問徐光曰歴代已来有斯災幾也光對曰周漢魏晉皆有之雖天地之常然眀主未始不為變所以敬天怒也去年禁寒食介推帝鄉之神也厯代所尊或者以為未宜替也一人吁嗟王道尚為之虧况群神怨憾而不怒動上帝乎縱不能令天下同爾介山左右晉文之所封也宜任百姓奉之勒境内大疫死者十二三乃罷徽文殿作石季龍嗣偽位以冀州百郡雨雹大傷秋稼下書深自咎責遣御史所在發水次倉麥賑給秋種尤甚之處差復一年時旱白虹經天季龍下書曰朕在位六載不能上和乾象下濟黎元以致白虹之變其令百僚各上封事解西山之禁蒲葦魚塩除嵗供之外皆無禁固公侯卿牧不得規占山澤奪百姓之利時白虹出自大社經鳳陽門東南連天十餘刻乃滅季龍下書曰盖古眀王之理天下也政以均平為首化以仁恵為本故能允協人和緝熈神物朕以𦕈薄君臨萬邦夕惕乾乾思遵古烈是以每下書蠲除徭賦休息黎元庶俯懐百姓仰禀三光而中年已来變𤯝彌顯天文錯亂時氣不應斯由人怨於下譴感皇天雖朕之不眀亦群后不能翼奨之所致也昔楚相修政洪災旋弭鄭卿勵道氛祲自消股肱之良用康群變而群公卿士各懐道迷邦拱黙成敗豈所望於台輔百司哉其各上封事極言無隠於是閉鳳陽門唯元日乃開前秦苻徤時蝗蟲大起自華澤至隴山食百草無遺牛馬相噉毛猛獸及狼食人行路斷絶徤自蠲百姓租税减膳徹縣素服避正殿符堅時秦雍二州地震裂水湧出金象生毛長安大風震電壊屋殺人堅懼而愈修徳政焉時秋大旱堅减膳徹懸金玉綺綉皆散之戎士後宫悉去羅紈衣不曳地開山澤之利公私共之偃甲息兵與境内休息又課百姓區種懼嵗不登省節榖帛之費大官後宫减常度二等百寮之秩以次降之後秦姚萇時天大雪萇下書深自責罰散後宫文綺珍寳以供戎事身食一味妻不重綵姚興嗣位以日月薄蝕降號稱王大赦改元後蜀李夀既僣即帝位時大風暴雨震其端門夀深自悔責命群司極盡忠言勿拘忌諱冊府元龜卷二百二十六
