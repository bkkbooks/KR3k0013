body:
  text: 冊府元龜卷一百四十三宋王欽若等撰帝王部弭災傳曰天之愛民甚矣豈使一人肆於民上若乃司牧之重政治或失必示災祥以申警戒聖帝眀王覩而脩徳懼刑政之壅蔽則勤於聽納恐驕盈之易至則身先節儉憂億兆之未泰則矜微恤苦念賦役之尚繁則省財節用思忠賢之未進則旁求遺逸慮邪佞之或邇則斥去羣小補禍為福變災成祥惟徳是輔其理何逺是以堯之水湯之旱太戊之桑榖髙宗之雊雉皆眀徳格天至誠感神而咎徴自消妖不能勝矣殷湯時大旱七年洛川竭使人持三足鼎祝於山川曰政不節邪使人疾邪苞苴行邪讒夫昌邪宫室崇邪女謁盛邪何不雨之極也殷史卜曰當以人禱湯曰吾所為請雨者民也若必以人禱吾請自當遂齋戒剪髪斷爪以已為往禱於桑林之野祝曰惟予小子履履湯名敢用𤣥牡告于上天后土曰今天大旱即當朕身履未知得罪于上下有善不敢蔽有惡不敢赦簡在帝心萬方有罪即當朕躬朕躬有罪無以爾四方無以一人之不敏使上帝鬼神傷民之命言未已而雨大至方數千里太戊時亳有祥桑榖共生于朝一暮大拱祥妖怪也榖音遘今之楮樹二木合生不恭之罰兩手搤之曰拱太戊懼問其相伊陟尹之子伊陟曰臣聞妖不勝徳帝之政有闕與帝其脩徳太戊從之而祥桑枯死與讀曰歟武丁祭成湯之眀日有飛雉登鼎耳而雊武丁懼祖已曰王勿憂先脩政事祖已乃訓王曰唯天監下民典厥義言天視下民以義為常也降年有永有不永非天夭民民中絶命民有不若徳不聽罪天既孚命正厥徳若順聽服也不順徳言無義也不服罪不改修也天既孚命正其徳謂其有永有不永乃曰其如台嗚呼王司敬民罔非天𦙍典祀無豐于昵王者主民當敬民事天祭祀有常不當時豐于近也武丁修政行徳天下咸驩殷道復興周文王之蒞國八年六月文王寢疾五日而地動東西南北不出國郊有司皆曰地之動也人主也今者君王寢疾五日而地動四面不出國郊羣臣皆恐曰請移之文王曰柰何其移之也對曰興事動衆以増國城其可移之乎文王曰不可夫天之道見妖以罰有罪也我必有罪也故以此罰我也今又専興事動衆以増國城是重吾罪也昌也請改行重善移之其可以免乎於是遂謹具禮節秩皮革以交諸侯飾其辭令幣帛以禮悦士頒其爵列等級田疇以賞遂與羣臣行此㡬何而疾止文王即位八年而地動之後四十三年凡蒞國五十一年而終此文王之所見踐妖也詩曰畏天之威于時保之此之謂也宣王時天大旱二年王以不雨遇災而懼側身修行欲消去之祈于羣祀珪璧既卒乃雨大夫仍叔作雲漢之詩以美之漢文帝二年十一月癸夘晦日有食之詔曰朕聞之天生民為之置君以養治之人主不徳布政不均則天示之災以戒不治治音直使切乃十一月晦日有食之適見于天適讀曰讁責也見音乎甸切災孰大焉災莫大於此朕獲保宗廟以微𦕈之身託于士民君王之上天下治亂在予一人唯二三執政猶吾股肱也朕下不能治育羣生上以累三光之眀累音力瑞反其不徳大矣令至其悉思朕之過失令此謂詔書及知見之所不及匄以啟告朕匄音盖乞也啟開也言以過失開告朕躬是則於朕為恩恵也及舉賢良方正能直言極諫者以匡朕之不逮景帝後二年春以嵗不登禁内郡食馬粟沒入之武帝建元六年四月壬子髙園便殿火凡言便殿便室便坐者皆非正大之處所以就便安也園者於陵上作之既有正寢以象平生正殿又立便殿為休息閒宴之處者也帝素服五日昭帝始元六年夏旱大雩不得舉火抑陽助隂也元鳯四年五月丁丑孝文廟正殿火帝及羣臣皆素服宣帝本始四年四月壬寅郡國四十九地震或山崩水出詔曰盖災異者天地之戒也朕承洪業奉宗廟託于士民之上未能和羣生廼者地震北海瑯邪壊祖宗廟朕甚懼焉丞相御史其與列侯中二千石博問經學之士有以應變輔朕之不逮毋有所諱令三輔太常内郡國舉賢良方正各一人律令有可蠲除以安百姓條奏被地震壊敗甚者勿収租賦大赦天下帝以宗廟墮素服避正殿五日堕與隳同地節三年十月詔曰廼者九月壬申地震朕甚懼焉有能箴朕過失及賢良方正直言極諫之士以輔朕之不逮毋諱有司諱避也言雖有司顯職皆言其過勿避之甘露元年四月丙申太上皇廟火甲辰孝文廟火帝素服五日元帝初元元年六月以民疾疫令太官損膳減樂府員省苑馬以賑困乏九月闗東郡國十一大水饑或人相食轉旁郡錢榖以相救詔曰間者隂陽不調黎民饑寒無以保治惟徳淺薄不足以充入舊貫之居言已徳淺薄不足充入先帝之居室其令諸宫館希御幸者勿繕治太僕減榖食馬水衡省肉食獸二年二月戊午地震三月詔曰盖聞賢聖在位隂陽和風雨時日月光星辰静黎庶康寧考終厥命言得夀考終其天命今朕㳟承天地託於王公之上眀不能燭徳不能綏災異竝臻連年不息乃二月戊午地震於隴西郡毁落太上皇廟殿壁木飾壊敗豲道縣城郭官寺及民室屋壓殺人衆豲道属天水凡府庭所在皆謂之寺豲音垣山摧地裂水泉涌出天惟降災震驚朕師師衆也治有大虧咎至于斯夙夜兢兢不通大變深惟鬱悼未知其序鬱不通之意也間者嵗數不登元元困乏不勝饑寒以䧟刑辟朕甚憫之郡國被地震災甚者無出租賦赦天下有可蠲除減省以便萬姓者條奏毋有所諱丞相御史中二千石舉茂材異等直言極諫之士朕将親覽焉六月闗東饑齊地人相食七月詔曰嵗比災害民多菜色五榖不登人但食菜故其色變惡慘怛于心已詔吏虛倉廪開府庫賑救賜寒者衣今秋禾麥頗傷一年中地再動北海水溢流殺人民隂陽不和其咎安在公卿将何以憂之其悉意陳朕過靡有所諱三年四月乙未晦茂陵白鶴館災詔曰廼者天災降於孝武園館朕戰慄恐懼不燭變異咎在朕躬羣司又未肯極言朕過以至于斯将何以寤焉百姓仍遭兇阨無以相賑阨古厄字加以煩擾乎苛吏拘牽乎微文不得永終性命朕甚憫焉其赦天下五年四月有星孛于参詔曰朕之不逮序位不眀逮及也言官人之位失其次序衆僚久懬懬古曠字未得其人元元失望上感皇天隂陽為變咎流萬民朕甚懼之廼者闗東連遭災害饑寒疾疫夭不終命詩不云乎凡民有喪匍匐救之其令大官毋日殺不得日日宰殺所具各減半食具也乗輿秣馬無乏政事而已永光二年二月詔曰盖聞唐虞象刑而民不犯殷周法行而姦軌服軌與宄同亂在外曰姦在内曰宄今朕獲承髙祖之洪業託位公侯之上夙夜戰栗永惟百姓之急未嘗有忘焉然而隂陽未調三光晻昧晻與暗同又音烏感反元元大困流散道路盜賊並興有司又長殘賊失牧民之術是皆朕之不眀政有所虧咎至於此朕甚自耻為民父母若是之薄謂百姓何其大赦天下三月壬戌朔日有食之詔曰朕戰戰栗栗夙夜思過失不敢荒寧惟隂陽不調未燭其咎婁勑公卿曰望有效婁古屢字至今有司執政未得其中中音竹中切施與禁切未合民心施恵褊薄禁令煩苛暴猛之俗彌長和睦之道日衰百姓愁苦靡所錯躬錯置也音厝是以氛邪嵗増侵犯太陽正氣湛掩日久奪光湛讀與沈同湛掩者是掩而湛沒廼壬戌日有食之天見大異以戒朕躬朕甚悼焉其令内郡國舉茂材異等賢良直言各一人四年六月甲戌孝宣園東闕災戊寅晦日有食之詔曰盖聞眀王在上忠賢布職則羣生和樂方外蒙澤今朕晻于王道夙夜憂勞不通其理靡瞻不眩靡聽不惑眩是亂也是以政令多還民心未得還返也邪説空進事亡成功此天下所著聞也公卿大夫好惡不同愛憎各異也或縁姦作邪侵削細民元元安所歸命㢤廼六月晦日有食之詩不云乎今此下民亦孔之哀孔甚也言災異既多百姓甚可哀也自今以来公卿大夫其勉思天戒慎身修永以輔朕之不逮謂當慎修其身思為常久之道也直言盡意無有所諱成帝建始元年二月詔曰廼者火炎降于祖廟有星孛於東方始正而虧言始即帝之正而彗星之虧也咎孰大焉書云惟先假王正厥事假至也言先古至道之君若違災變則正其行事修徳以應之羣公孜孜帥先百僚輔朕不逮崇寛大長和睦凡事恕己毋行苛刻恕者仁也仁已之心以度於物其大赦天下使得自新三年十二月日有食之夜地震未央宫殿中詔曰盖聞天生衆民不能相治為之立君以統理之君道得則草木昆蟲咸得其所昆衆也昆蟲言衆蟲也人君不徳謫見天地災異屢發以告不治朕渉道日寡舉錯不中乃戊申日食地震朕甚懼焉公卿其各思朕過失眀白陳之汝無面從退有後言言我有違道汝當正之無得對面順從唯唯退後則有謗讟之言也丞相御史與将軍列侯中二千石及四郡國舉賢良方正能直言極諫之士詣公車朕将覽焉河平元年四月己亥晦日有食之既詔曰朕獲保宗廟戰戰栗栗未能奉稱謂不副先帝之業傳曰男教不修陽事不得則日為之食天著厥異辜在朕躬公卿大夫其勉悉心輔予不逮百寮各脩其職惇任仁人退逺殘賊惇厚也逺離也陳朕過失無有所諱永始二年二月乙酉晦日有食之詔曰乃者龍見于東萊日有食之天著變異以顯朕郵郵與尤同謂過也朕甚懼焉公卿申敕百寮深思天誡有可省減便安百姓者條奏所賑貸貧民勿収四年六月詔曰廼者地震京師火災屢降朕甚懼焉有司其悉心明對厥咎朕将親覽焉元延元年七月有星孛于東井詔曰廼者日蝕星隕謫見于天大異重仍在位黙然罕有忠言今星孛見于東井朕甚懼焉公卿大夫博士議郎其各悉心惟思變意眀以經對無有所諱哀帝以綏和二年四月即位是秋詔曰朕承宗廟之重戰戰兢兢懼失天心間者日月亡光五星失行郡國比比地動比比猶言頻也廼者河南潁川郡水出流殺人民壊敗廬舍朕之不徳民反䝉辜朕甚懼焉已遣光禄大夫循行舉籍舉其名籍也賜死者棺錢人三千元夀元年正月辛丑朔日有蝕之詔曰朕獲保宗廟不眀不敏夙夜憂勞未皇寧息皇暇也惟隂陽不調元元不贍未覩厥咎屢敕公卿庶㡬有望至今有司執法未得其中惑止暴虐假埶古勢字獲名温良寛柔䧟於亡滅是故殘賊彌長和睦日衰百姓愁怨靡所錯躬乃正月朔日有食之厥咎不逺在余一人公卿大夫其各悉心勉帥百寮敦任仁人黜逺殘賊期於安民陳朕之過失無有所諱其與将軍列侯中二千石舉賢良方正能直言者各一人平帝元始二年大早遣使者捕蝗民捕蝗詣吏以石㪷受錢天下民貲不滿二萬及被災之郡不滿十萬勿租税民疾疫者舍空邸第為置醫藥賜死者一家六尸以上葬錢五千四尸以上三千二尸以上二千罷安定呼沲苑以為安民縣中山之安定也沲音大河切起宦寺市里募徙貧民縣次給食至徙所賜田宅什器假與犂牛種食又起五里於長安城中民居之里宅二百區以居貧民後漢光武建武七年三月癸亥晦日有食之帝避正殿寢兵不聽事五日詔曰吾徳薄致災謫見日食戰栗恐懼夫何言哉今方念愆庶消厥咎其令有司各修職任奉遵法度恵兹元元百僚各上封事無有所諱其上書者不得言聖二十二年九月戊辰地震裂詔曰日者地震南陽尤甚夫地者任物至重静而不動者也而今震裂咎在君上鬼神不順無徳災殃将及吏人朕甚懼焉其令南陽勿輸今年田租芻藁遣謁者案行其死罪繫囚在戊辰以前減死罪一等徒皆弛解鉗衣絲絮賜郡中居人壓死者棺錢人三千其口賦逋税而廬宅尤破壊者勿収責吏人死亡或在壊垣毁屋之下而家羸弱不能収拾者以見錢榖取傭為尋求之眀帝永平三年八月壬申晦日有食之詔曰朕奉承祖業無有善政日月薄蝕彗孛見天水旱不節稼穡不成人無宿儲下生愁墊雖夙夜勤思而知能不逮昔楚荘無災以致戒懼魯哀禍大天不降譴今之動變儻尚可救有司勉思厥職以輔無徳古者卿士獻詩百工箴諫其言事者靡有所諱八年十月壬寅晦日有食之既既盡也詔曰朕以無徳奉承大業而下貽人怨上動三光日食之變其災尤大春秋圖䜟所謂至譴永思厥咎在予一人羣司勉脩職事極言無諱於是在位者皆上封書各言得失帝覽章深自引咎乃以所上班示百官詔曰羣寮所言皆朕之過人寃不能理吏黠不能禁而輕用人力繕脩宫宇出入無節喜怒過差昔應門失守闗睢刺世春秋説題辭曰人主不正應門失守故歌闗雎以感之注曰應門聽政之處也言不以政事為務則有宣淫之心闗雎樂而不淫思得賢人與之共化修應門之政者也飛蓬随風微子所嘆管子曰應門聽政無儀法程式飛揺而無所定謂之飛蓬飛蓬之間眀王不聽此言微子未詳永覽前戒竦然驚懼徒恐薄徳久而致怠耳十三年十月壬辰晦日有食之三公免冠自劾制曰冠履勿劾災異屢見咎在朕躬憂懼皇皇未知其方将有司陳事多所隠諱使君上壅蔽下有不暢乎昔衞有忠臣靈公得守其位今何以和穆隂陽消伏災譴刺史太守詳刑理寃存恤鰥孤勉思職焉十八年四月己未詔曰自春以来時雨不降宿麥傷旱秋種未下政失厥中憂懼而已其理寃獄録輕繫二千石分禱五嶽四瀆郡界有名山大川能興雲雨者周禮職方氏掌天下之地揚州其山曰㑹稽其川曰三江荆州其山曰衡山其川曰江漢豫州其山曰華山其川曰滎洛青州其山曰沂山其川曰淮泗兖州其山曰岱山其川曰河泲雍州其山曰嶽其川曰涇汭幽州其山曰醫無閭其川曰河泲冀州其山曰霍其川曰漳并州其山曰常其川曰滹沱此謂九州名山大川泲音子禮切長吏各潔齋禱請兾蒙嘉㴻章帝以永平十八年八月即位十一月晦日有食之於是避正殿寢兵不聽事五日詔有司各上封事建初五年二月庚辰朔日有食之詔曰朕新離供養愆咎衆著上天降異大變随之詩不云乎亦孔之醜又久旱傷麥憂心惨切公卿已下其舉直言極諫能指朕過失者各一人遣詣公車将親覽問焉其以巖穴為先勿取浮華又詔曰春秋書無麥苖重之也去秋雨澤不適今時復旱如炎如焚凶年無時而為備未至朕之不徳上累三光震慄切切痛心疾首前代聖君博思咨諏雖降災咎輙有開匱反風之應今予小子徒慘慘而已其令二千石理寃獄録輕繫禱五嶽四瀆及名山能興雲致雨者兾蒙不崇朝徧雨天下之報務加肅敬焉和帝永元七年四月辛亥朔日有食之帝引見公卿問得失令將大夫御史謁者博士議郎郎官㑹廷中各言封事八年九月京師蝗吏民言事者多歸責有司詔曰蝗蟲之異殆不虛生萬方有罪在予一人而言事者専咎自下非助我者也朕寤寐恫矜思弭憂釁昔楚嚴無災而懼成王出郊而反風将何以輔朕不逮以塞災變百寮師尹勉脩厥職刺史二千石詳刑辟理寃虐恤鰥寡矜孤弱思致災興蝗之咎十六年秋七月戊午詔曰今秋稼方穂而旱雲雨不霑疑吏行慘刻不宣恩澤妄拘無罪幽閉良善所致其一切囚徒於法疑者勿決以奉秋令禮記月令孟秋之月命有司修法制繕囚具桎梏斷薄刑決小罪方察煩苛之吏顯眀其罰安帝永初三年三月京師大饑民相食壬辰公卿詣闕謝詔曰朕以幼冲奉承鴻業不能宣流風化而感逆隂陽至令百姓饑餓更相㗖食永懐悼嘆若墜淵氷咎在朕躬非羣司之責而過自貶引重朝廷之不徳其務思變復以助不逮四年正月元日㑹以年饑徹樂不陳充庭車每大朝㑹必陳乗輿法物車輦於庭故曰充陳車也建光元年十一月郡國三十五地震或拆裂詔三公以下各上封事陳得失順帝永建三年七月丁酉茂陵園寢災帝縞素避正殿陽嘉元年二月京師旱庚申勑郡國二千石各禱名山嶽瀆遣大夫謁者詣嵩髙首陽山并祠河雒請雨戊辰雩甲戌詔曰政失厥和隂陽隔并冬鮮宿雪春無㴻雨分禱祈請靡神不禜音詠深恐在所慢違如在之義今遣侍中王輔等持節分詣岱山東海滎陽河雒盡心祈焉濟水四瀆之一至河南溢為滎澤故於滎陽祠焉二年四月己亥京師地震五月庚子詔曰朕以不徳統奉鴻業無以奉順乾坤協序隂陽災𤯝屢見咎徴仍臻地動之異發自京師兢兢祗畏不知所裁羣公卿士将何以輔其不逮奉答戒異兾不空設必有所應其各悉心直言厥咎靡有所諱桓帝建和三年四月丁夘晦日有食之五月乙亥詔曰盖聞天生蒸民不能相理為之立君使司牧之君道得於下則休祥著乎上庶事失其序則咎徴見乎象間者日食毁缺陽元晦暗朕祗懼潜思匪遑唘處傳不云乎日食脩徳月食脩刑昔孝章帝愍前世禁徒故建初之元並蒙恩澤流徙者使還故郡沒入者免為庶民先皇徳政可不務乎其自永建元年迄乎今嵗凡諸妖惡支親從坐及吏民減死徙邊者悉歸本郡唯沒入者不從此令永興二年九月詔曰朝政失中雲漢作旱川靈涌水蝗蟲滋蔓殘我百榖太陽虧光饑饉荐臻其不被害郡縣當為饑餒者儲天下一家趣不縻爛則為國寳其禁郡國不得賣酒祠祀裁足延熹九年正月詔曰比嵗不登人多饑窮又有水旱疾疫之困盜賊徴發南州尤甚災異日食譴告累至致亂在予仍獲咎徴其令大司農絶今嵗調度徴求及前年所調未畢者勿復収責其災旱盗賊之郡勿収租餘郡悉半入魏明帝太和五年三月辛巳以四年十月至是不雨大雩景初二年有彗星見張宿史官言於帝曰此周之分野也雒邑惡之於是大修禳禱之術齊王正始元年三月以旱詔令獄官亟平寃枉理出輕微羣公卿士讜言嘉謀各悉乃心晉武帝太始七年閏五月大雩大官減膳咸寧二年正月以疾疫廢二月帝不豫及瘳羣臣上夀詔曰每念頃遇疫氣死亡為之愴然豈以一身之休息忘百姓之艱邪諸上禮者皆絶之四月丁巳詔曰諸旱處廣加祈請五月庚午始祈雨于社稷山川五年二月以百姓饑饉減御膳之半愍帝建興元年六月旱帝親雩元帝大興元年十一月詔曰朕以寡徳纂承洪緒上不能調和隂陽下不能濟育羣生災異屢興咎徴仍見壬子乙卯雷震暴雨盖天災譴誡所以彰朕之不徳也羣公卿士其各上封事具陳得失無有所諱将親覽焉二年五月以三吳大饑詔曰天下凋弊加以災荒百姓困窮國用並匱吳郡饑人死者百數天生蒸民而樹之以君選建眀哲以左右之當深思以救其弊昔吳起為楚悼王眀法審令捐不急之官除廢公族疎逺以附益将士而國富兵强况今日之弊百姓凋困邪其當去非急之務非軍事所湏者皆削之使黄門侍郎虞騑音斐桓彛開倉庫振給并省衆役百官各上封事成帝咸和九年六月以大旱詔太官撤膳省刑恤孤寡貶節用咸康二年三月以旱詔太官減膳免所旱郡縣徭役哀帝隆和元年四月以旱詔出輕繫振困乏十二月詔曰戎旅路次未得輕減賦役元象失度亢旱為患豈政事未治將有版築渭濱之士邪其捜揚隠滯蠲除苛碎詳議法令咸從損要孝武太元元年十一月己巳朔月有蝕之詔太官撤膳四年二月詔曰年谷不登百姓多匱其詔御所供事從儉約九親供給衆官廪俸權乃減半凡諸役費自非軍國事要皆宜停省以周時務後魏文成和平五年四月以旱故減膳責躬是夜㴻雨大降孝文時太極殿成将行考室之禮引集羣臣而雪不克饗帝曰朕經始正殿功搆初成将集百寮考行大禮然彤雲仍結霏雪驟零将繇寡昧未能仰答天心此之不徳咎竟焉在卿等宜各陳所懐以救不逮鎮東将軍定州刺史樓毅稽首對曰雪霜風雨天地之常夏霂冬霰四時之節今隆冬雨雪固是其時又禮云雨沾服失容則廢禮自古而然不足為異帝曰昔劉秀将濟滹沱為之氷合但朕徳謝古人不能仰感天意太和四年二月癸巳詔曰統承乾緒君臨海内夙興昧旦如履薄冰今東作方興庶類萌動品物資始膏雨不降嵗一不登百姓饑乏朕甚懼焉其勑天下祀山川羣神及能興雲雨者修飾祠堂薦以牲璧民有疾苦所在存問五年四月甲寅詔曰時雨不霑春苖萎悴諸有骸骨之處皆勑埋藏勿令露見有神祗之所悉可禱祈十二年九月甲子詔曰日月薄蝕隂陽之常度耳聖人懼人君之放怠因之以設誡故稱日蝕脩徳月蝕脩刑廼癸巳夜月食盡公卿已下宜慎刑罰以答天意十五年正月不雨至于四月有司奏祈百神詔曰昔成湯遇旱齊景逢災並不繇祈山川而致雨皆至誠發中澍潤千里萬方有罪在予一人今普天䘮恃幽顯同哀神若有靈猶應未忍安饗何宜四氣未周便欲祀事唯當考躬責已以待天譴時帝居太后哀故有此詔十七年五月丁丑以旱撤膳宣武景眀四年四月戊戌詔曰酷吏為祻繇古同患孝婦淫刑東海燋壤今不雨十旬意者其有寃獄乎尚書鞫京師見囚務虛聽察之理己亥帝以旱減膳撤樂辛丑㴻雨大洽正始元年六月以旱撤樂減膳公卿以下引咎責躬詔曰朕以菲徳政刑多舛陽旱歴旬京師枯悴在予之責夙宵疚懐有司可循案舊典祗行六事囹圄寃滯平處決之庶尹廢職量加脩舉鰥寡困窮所在存恤役賦殷煩咸加蠲省賢良讜直以禮進之貪殘佞䛕時加屏黜男女怨曠務令媾㑹稱朕意焉又親薦享於太廟及録京師見囚殊死以下皆減一等鞭撻之坐悉皆原之永平元年五月帝以旱故減膳撤樂二年五月帝以旱故減膳撤樂禁斷屠殺延昌元年四月丁丑帝以旱故減膳徹樂詔尚書與郡司鞫理獄訟又詔食䍘之畜皆斷之三年二月詔曰肆州秀容郡殷城縣雁門郡原平縣並自去年四月以来山鳴地震于今不已告譴彰咎朕甚懼焉祗畏兢兢若臨淵谷可恤瘼寛刑以答災譴孝眀熙平元年五月丁卯朔詔曰災旱積辰苖稼萎悴比雖微㴻猶未霑洽晩種不納企望憂勞在予之責思自兢厲尚書可釐恤獄犴辯其淹枉簡量輕重隨事以聞無使一人怨嗟増傷和氣土木作役權皆休罷勸農省務肆力田疇庶嘉澤近降豐年可必神龜二年二月詔曰農要之月時澤弗應嘉谷未納三麥枯悴徳之無感嘆懼兼懐可勑内外依舊雩祈率從祀典察獄理寃掩胔埋骼冀瀛之境狂冦暴野死者既多白骨横道可遣専令収葬賑窮恤寡救疾存老准訪前式務令周備三月㴻雨大洽正光元年五月詔曰朕以寡薄運膺寳圖雖未眀求衣惕懼終日而闇昧多闕炎旱為災在予之媿無㤀寢食今刑獄繁多囹圄尚積宜敷仁恵以濟斯民八座可推鞫見囚務申枉濫又詔曰禳災招應脩政為本民乃神主實宜率先刺史守令與朕共治天下宜哀矜勿喜視民如傷况今災旱歴時萬姓雕弊而不撫恤窮寃理決庶訟可嚴勑州郡善加綏隠務盡聰明加之祗肅必使事允人神時致靈應其賦役不便於民者具以状聞當便蠲罷二年七月癸丑詔曰時澤弗霑禾稼凋損在予之責夙宵震懼雖剋躬徹樂仍無昭感有司可循案舊典祗行六事圄犴淹枉随速鞫决庶尹廢職量加脩厲鰥獨困窮在所存恤役賦煩民咸加蠲損賢良讜直以時昇進貪殘邪佞即就屏黜男女怨曠務令㑹遇庶革正懲違有弭災沴三年六月詔曰朕以冲昧夙纂寳歴不能祗奉上靈感延和氣致令災旱頻嵗嘉雨弗洽百稼焦萎晩種未下将成災年秋稔莫覬在予之責憂懼震懐今可依舊分遣有司馳祈嶽瀆及諸山川百神能興雲雨者盡其䖍肅必令感降玉帛牲牢随應薦享上下羣官側躬自勵理寃獄止土功減膳徹樂禁止屠殺四年八月戊寅詔曰朕以𦕈闇忝承鴻緒因祖宗之基託王公之上每鑒寐属慮思康億兆比雨旱愆時皇運舛錯政理闕和靈祗表異永尋夕惕載恧于懐宜詔百司各勤厥職諸有鰥寡窮疾寃滯不申者並加憐恤若孝子順孫㢘貞義節才學超異獨行髙緒者具以言上朕将親覽加以旌命後周武帝保定二年以久不雨降宥罪人京城三十里内禁酒四月又禁屠宰建徳元年五月帝以大旱集百官于庭詔之曰盛農之節亢陽不雨氣序愆度盖不徒然豈朕徳薄刑賞非中歟将公卿大臣或非其人歟宜進直言無得有隠公卿各引咎自責其夜㴻雨二年三月不雨至于七月集百寮于大徳殿帝責躬罪已問以治政得失宣帝大象元年十二月戊午以災異屢見帝御路寢見百官詔曰穹昊在上聰眀自下吉凶繇人妖不自作朕以寡徳君臨區宇大道未行小信非福始于秋季及此𤣥冬幽顯慇懃屢貽深戒至有金入南斗木犯軒轅熒惑干房又與土合流星照夜東南而下然則南斗主於爵禄軒轅為於後宫房曰眀堂布政所也火土則憂孽之兆流星乃兵凶之驗豈其官人失序女謁尚行政事乖方憂患将至何其昭著若斯之甚上瞻俯察朕實懼焉将避正寢齋居哀念惡衣减膳去飾徹樂披不諱之誠開直言之路欲使刑不濫及賞勿踰等選舉以才宫闈修徳吿諸内外庶盡弼諧允叶民心用銷天譴于是舍仗衛往天興宫百官上表勸復寢膳許之甲子還宫隋髙祖開皇三年四月旱帝親祀雨師于國城之西南十四年正月以嵗旱祀泰山以謝愆咎大赦天下冊府元龜卷一百四十三
