body:
  text: 册府元龜卷九百三宋王欽若等撰總録部書信古之作者曷嘗不因言而見志至於執訊之還往尺書之問遺皆所以導素藴而陳嘉誨者焉春秋以来文辭為盛兩漢之世炳然與三代同風鼎國之後才士間出觀其揚㩁理道論叙今古内罄於悃愊外影於藻翰意趣周密采章英發使人三復而不能自釋於手故史氏所載非以為繁文後學之徒競潄其芳潤者已叔向晉大夫鄭鑄刑書鑄刑書於鼎以為國之常法叔向使詒子産書詒遺也曰始吾有虞於子虞度也言凖度子産以為已法今則已矣已止也昔先王議事以制不為刑辟懼民之有争心也臨事制刑不豫設法也法豫設則民知争端猶不可禁禦是故閑之以義閑防也糾之以政糾舉也行之以禮守之以信奉之以仁奉養也制為祿位以勸其從勸從教嚴斷刑罰以威其淫淫放也懼其未也故誨之以忠聳之以行聳懼也教之以務時所也使之以和説以使民臨之以敬蒞之以彊施之於事為蒞斷之以剛義斷也猶求聖哲之上眀察之官上公王也官卿大夫也忠信之長慈恵之師民於是乎可任使也而不生禍亂民知有辟則不忌於上權移於法故民不畏上並有争心以徴於書而徼幸以成之因危文以生争縁徼幸以成其巧偽弗可為矣為冶也夏有亂政而作禹刑商有亂政而作湯刑夏商之亂著禹湯之法言不能議事以制周有亂政而作九刑周之衰亦為刑書為之九刑三辟之興皆叔世也言刑書不起於始盛之世今吾子相鄭國作封洫立謗政作邱賦制參辟鑄刑書制三辟謂用三代之末法將以靖民不亦難乎書曰儀式刑文王之徳日靖四方言文王以徳為儀式故能有安靖四方之功刑法也又曰儀刑文王萬邦作孚言文王作儀法為天下所信孚信者也如是何辟之有言云唯以徳為信不以刑也民知爭端矣將棄禮而徴於書以刑書為徴錐刀之末將盡爭之錐刀末喻小事亂獄滋豐賄賂並行終子之世鄭其敗乎肹聞之國將亡必多制數敗也其此之謂乎復書曰若吾子之言復報也僑不才不能及子孫吾以救世也既不承命敢忘大恵漢柴武為將軍韓王信降胡漢使武擊之武遺信書曰陛下寛仁諸侯雖有叛亡而後歸輙復故位號不誅也復音扶日反大王所知今王以敗亡走胡非有大罪急自歸信報曰陛下擢僕閭巷南面稱孤此僕之幸也滎陽之事僕不能死囚於項籍此一罪也寇攻馬邑僕不能堅守以城降之此二罪也今為反寇將兵與將軍争一旦之命此三罪也夫種蠡無一罪身死亡大夫種范蠡也二人皆越王句踐之臣大夫種位為大夫名種也有功於越句踐逼令自死范蠡即陶朱公也浮海而逃之齊邑又居陶土自號朱公也竟以夀終信引之以自喻者盖言種不去則見殺蠡逃亡則獲免蠡音禮僕有三罪而欲求活此伍子胥所以僨於吳世也僨謂僵仆而倒也音方問切今僕亡匿山谷間旦暮乞貸蠻夷貸音吐得切僕之思歸如痿人不忘起瞽者不忘視痿風痺病也音人隹切勢不可爾薄昭文帝舅為將軍淮南厲王歸國益恣不用漢法帝令昭予厲王書諫數之曰竊聞大王剛直而勇慈恵而厚貞信多斷是天以聖人之資奉大王也甚盛不可不察今大王所行不稱天資皇帝初即位易侯邑在淮南者大王不肯皇帝卒易之使大王得三縣之實甚厚大王以未嘗與皇帝相見求入朝見未畢昆弟之歡畢盡也而殺列侯以自為名皇帝不使吏與其間為讀曰豫謂不令吏干豫治其事赦大王甚厚法二千石輙言漢補大王逐漢所置而請自置相二千石皇帝骫天下正法而許大王甚厚不從正法聽王自置二千石骫古委字骫謂曲也大王欲屬國為布衣守冢真定屬謂委棄之也音之欲切皇帝不許使大王毋失南面之尊甚厚毋失不失也南面之尊謂王位也大王宜日夜奉法度修貢職以稱皇帝之厚徳今乃輕言恣行以負謗於天下甚非計也夫大王以千里為宅居以萬民為臣妾此髙皇帝之厚徳也髙帝蒙霜露沬風雨沫亦頮字也蒙冒也沫洗面也音呼内切字從午未之未赴矢石野戰攻城身被瘡痍痍音夷以為子孫成萬世之業艱難危苦甚矣大王不思先帝之艱苦日夜怵惕修身正行養犧牲豐粢盛奉祭祀以無忘先帝之功徳而欲屬國為布衣甚過且夫貪讓國土之名輕廢先帝之業不可以言孝父為之基而不能守不賢不求守長陵而求之真定先母後父不誼數逆天子之令不順言節行以高兄無禮謂請守母冢自為名節而表異行用此矜髙於兄爾幸臣有罪大者立斷小者肉刑不仁斷謂斬也貴布衣一劍之任賤王侯之位不知不學問大道觸情妄行不祥任情意所欲則行之妄行行音下更反切此八者危亡之路也而大王行之棄南面之位奮諸賁之勇吳専諸衛孟賁也賁音奔嘗出入危亡之路臣之所見髙皇帝之神必不廟食於大王之手眀矣昔者周公誅管叔放蔡叔以安周齊桓殺其弟以反國子糾兄也言弟者諱也秦始皇殺兩弟遷其母以安秦始皇母與嫪毒私通生二子事覺誅毒并殺二弟遷其母於咸陽官也頃王亡代髙帝奪之國以便事頃王髙帝兄仲也匈奴如代不能守走歸京師髙帝奪其國退為郃王侯以便國法也便音頻面切濟北舉兵皇帝誅之以安漢濟北王興居與大臣共誅諸吕自以功大怨其賞薄故反故周齊行之於古秦漢用之於今大王不察古今之所以安國便事而欲以親戚之意望於太上不可得也太上天子也亡之諸侯游宦事人及舍匿者論皆有法舍匿謂容止而藏隠也其在王所吏主者坐各有所主而坐其罪今諸侯子為吏者御史主主御史也自此以下至縣令主皆謂王官屬為軍吏者中尉主客出入殿門者衛尉大行主諸從蠻夷来歸誼及以亡名數自古者内史縣令主相欲委下吏無與其禍不可得也諸侯王之相欲委罪於在下小吏而身不干豫之不可得也與讀曰豫王若不改漢繫大王邸論相以下為之奈何夫墮父大業退為布衣所哀墮毁也布衣貧賤之人王既伏法則貧賤之人反哀憐之墮音火規切幸臣皆伏法而誅為天下笑以羞先帝之徳羞辱也甚為大王不取也宜急改操易行上書謝罪曰臣不幸早失先帝少孤吕氏之世未嘗忘死嘗恐死陛下即位臣怙恩徳驕盈行多不軌軌法也追念罪過恐懼伏地待誅不敢起皇帝聞之必喜大王昆弟歡欣於上羣臣皆得延夀於下上下得宜海内常安願熟計而疾行之行之有疑禍如發矢不可追已發矢踰速也已語終辭王得書不説司馬遷被刑之後為中書令尊寵任職故人益州刺史任安故人者言其舊交也子遷書責以古賢臣之義遷報之曰少卿足下少卿任安字也曩者辱賜書教以慎於接物推賢進士為務意氣勤勤懇懇懇懇至誠也若望僕不相師用望怨也而流俗人之言謂隨俗人之言而流移其志僕非敢如是也僕雖罷駑亦側聞長者遺風矣罷讀曰疲顧自以為身殘處穢動而見尤顧思念尤過也欲益反損是以抑鬱而無誰語無誰語者言無相知言心之人誰可告語諺曰誰為為之孰令聽之言無知已者設欲脩名節立行誰可為作之又令誰聽之上為音于偽切盖鍾子期死伯牙終身不復鼓琴伯牙鍾子期皆楚人也伯牙鼓琴子期聽之方鼓琴而志在髙山子期曰巍巍乎若泰山既而志在流水子期又曰湯湯乎若水流及子期死伯牙鼔琴絶絃終身不復鼓琴以時人無足復為鼓琴爾何則士為知己用女為説己容説讀曰悦若僕大質己虧缺矣雖材懐隨和行若繇夷繇夷許繇伯夷也隨隨侯珠也和和氏璧終不可以為榮適足以發笑而自㸃爾㸃汙也書辭宜答宜早答㑹東從上来從武帝還也又廹賤事卑賤之事若煩務也謂所供職也相見日淺卒卒無湏臾之間得竭指意卒卒促遽之意也間隙也卒音千怱切今少卿抱不測之罪平居時遷不指報其書今有罪在獄故報往日書欲使其恕以度已也不測謂深也渉旬月廹季冬僕又薄從上上雍薄廹也廹當從行也恐卒然不可諱卒讀曰猝不可諱謂安死也是僕終已不得舒憤懣以曉左右懣煩悶也曉告諭也懣音滿則長逝者魂魄私恨無窮謂任安恨不見報請畧陳固陋闕然久不報幸勿為過請中間久不報也僕聞之脩身者智之府也府者所聚之處也愛施者仁之端也取予者義之符也符信也恥辱者勇之决也立名者行之極也士有此五者然後可以託於世列於士君子之林矣故禍莫憯於欲利憯亦痛也音千敢切悲莫痛於傷心行莫醜於辱先而詬莫大於宫刑詬恥也音垢刑餘之人無所比數非一世也所從来逺矣昔衛靈公與雍渠同載孔子適陳雍渠奄人靈公近之商鞅因景監見趙良寒心景監秦嬖人也趙良賢者同子參乗袁絲變色趙談也與遷父同諱故曰同子自古而恥之夫中材之人事有闗於宦䜿莫不傷氣况慷慨之士乎慷音口朗切如今朝廷雖乏人奈何令刀鋸之餘薦天下豪俊哉僕賴先人緒業得待罪輦轂下二十餘年矣言符從天子之車輿所以自惟惟思也上之不能納忠效信效致也有竒䇿材力之譽自結眀主次之又不能拾遺補闕招賢進能顯巖穴之士外之不能備行伍攻城野戰有斬將搴旗之功搴拔也取敵人之旗也搴音蹇下之不能累日積勞取尊官厚禄以為宗族交遊光寵四者無一遂茍合取容無所短長之效可見於此矣鄉者僕亦嘗厠下大夫之列周官太史謂下大夫也漢太史令之秩比下大夫鄉讀曰嚮曩昔時也陪奉外廷末議不以此時引維綱盡思慮今已虧形為掃除之𨽻在闒茸之中闒茸猥賤也闒下也茸細毛也言非豪楚也闒吐合切茸人勇切乃欲卬首信眉論列是非卬讀曰仰信讀曰伸列陳也不亦輕朝廷羞當世之士耶羞辱也嗟乎嗟乎如僕尚何言哉尚何言哉且事本末未易眀也僕少負不覊之才長無鄉曲之譽不覊言其材質髙逺不可覊繫也負者亦言無此事也主上幸以先人之故使得奏薄伎出入周衛之中薄伎薄材也周衛言宿衛謂周宻也僕以為戴盆何以望天頭戴盆則不得望天則不得戴盆事何可兼施言已方有所造不暇修乎人之事也言營職務爾未論其造書也故絶賔客之知忘室家之業日夜思竭其不肖之材力務一心營職以求親媚於主上而事乃有大謬不然者夫僕與李陵俱居門下素非相善也趣舍異路趣所向也舍所廢也未嘗衘杯酒接殷勤之歡然僕觀其為人自竒士事親孝與士信臨財㢘取與義分别有讓恭儉下人嘗思奮不顧身以狥國家之急狥從也營也其素所畜積也畜讀曰蓄僕以為有國士之風夫人臣出萬死不顧一生之計赴公家之難斯已竒矣今舉事一不當而全軀保妻子之臣隨而媒孽其短媒謂遘㑹也孽謂為生其罪亹媒如媒聘之媒孽如鞠孽之孽一曰齊人謂鞠為媒也僕誠私心痛之且李陵提歩卒不滿五千深踐戎馬之地足歴王庭垂餌虎口横挑彊胡挑音徒了切卬億萬之師卬讀曰仰漢軍北向匈奴南下北方地髙故云然與單于連戰十餘日所殺過當卒計戰士殺敵數多故云過多也虜救死扶傷不給給猶供也旃裘之君長咸震怖乃悉徴左右賢王舉引弓之民能引弓者皆發之一國共攻而圍之轉鬬千里矢盡道窮救兵不至士卒死傷如積然李陵一呼勞軍呼大故切士無不起躬流涕沬血飲泣更張空弮冒白刃北首爭死敵者沬敵頮弮弩弓也沬古頮字頮洗面也言流血在面如與頮冒死也首嚮也沫呼内切字從午未之未弮丘㩲切又音眷冒莫克切首式救切或讀乃以弮拏之弮大謬矣拳則屈指不當言其張時矢盡故張拏之空弓非是手拳也陵未没時使有来報漢公卿王侯皆奉觴上夀後數日陵敗書聞主上為之食不甘味聽朝不怡大臣憂懼不知所出僕竊不自料其卑賤料量也音聊見主上慘悽怛悼誠欲效其欵欵之愚以為李陵素與士大夫絶甘分少自絶㫖甘而與衆人分之共同其少多也能得人之死力雖古名將不過也身雖陷敗彼觀其意且欲得其當而報漢欲於匈奴立功而歸以其當破敗之罪事已無可奈何其所摧敗功亦足以暴於天下矣謂摧破匈奴之兵也僕懐欲陳之而未有路適㑹召問即以此指推言陵功指意也欲以廣主上之意塞睚眦之辭未能盡眀睚眦舉目眥也猶言顧瞻之頃也睚音厓眦才賜切眀主不深曉以為僕沮貳師而為李陵游説沮毁壊也音才汝切遂下於理拳拳之忠終不能自列拳拳恐謹之貌劉向傳作倦倦字音義同爾列陳也因為誣上卒從吏議卒終也家貧財賂不足以自贖交遊莫救左右親近不為一言身非木石獨與法吏為伍深幽囹圄之中誰可告愬者此正少卿所親見僕行事豈不然邪李陵既生降隤其家聲家世為將有名聲陵降而隤之也隕墜也音頽而僕又茸以蠶室茸音人勇切推也蠶室初腐刑所居温密之室也謂推致蠶室之中也重為天下觀笑觀視之而笑也悲夫悲夫事未易一二為俗人言也僕之先人非有剖符丹書之功文史星厯近乎卜祝之間固主上所戲弄倡優畜之流俗之所輕也假令僕伏法受誅若九牛亡一毛與螻螘何異螻螻蛅也螘蚍蜉也皆蟲之㣲少者螻音樓而世又不與能死節者比與許也不與許其能死節特以為知窮罪極不能自免卒就死爾何也素所自樹立使然人固有一死死有重於太山或輕於鴻毛用之所趨異也趨讀曰趣趣嚮也太上不辱先其次不辱身其次不辱理色其次不辱辭令其次詘體受辱其次易服受辱其次闗木索被箠楚受辱箠林也音止藻切其次鬄毛髮嬰金鐵受辱嬰繞也鬄吐討切其次毁肌膚斷肢體受辱最下腐刑極矣𫝊曰刑不上大夫此言士節不可不厲也猛虎出深山百獸震恐及其在穽檻之中揺尾而求食掘地以陷獸也穽音才性切積威約之漸也故古有畫地為牢勢不入削木為吏議不對定計於鮮也未遇刑自殺為鮮眀也今交手足受木索暴肌膚受榜箠榜音彭幽於圜牆之中圜牆獄也周禮謂之圜士當此之時見獄吏則頭搶地搶千羊切視徒𨽻則心惕息惕懼也息喘息也何者積威約之勢也事已至此言不辱者所謂强顔爾曷足貴乎强其兩切且西伯伯也拘牖里李斯相也具五刑淮隂王也受械於陳髙祖偽遊雲夢而信至陳上謁即見囚執械謂桎梏之彭越張敖南鄉稱孤繫獄抵罪或繫於獄或至大罪也鄉讀曰嚮絳侯誅諸吕權傾五霸囚於請室伯讀曰霸魏其大將也衣赭衣闗三木三木在頸及手足季布為朱家鉗奴灌夫受辱於居室此人皆身至王侯將相聲聞隣國及罪至罔加不能引决自財財與裁同古通用字在塵埃之中古今一體安在其不辱也繇此言之勇怯勢也强弱形也審矣曷足怪乎夫人不能蚤自財繩墨之外已稍陵夷至於鞭箠之間乃欲引節斯不亦逺乎古人所以重施刑於大夫者殆為此也重難也夫人情莫不貪生惡死念父母顧妻子至激於義理者不然言激於義理者則不顧念於父母妻子乃有所不得已也今僕不幸蚤失二親無兄弟之親獨身孤立少卿視僕於妻子何如哉且勇者不必死節怯夫慕義何處不勉焉勇敢之人聞於分理未必能死名節怯懦之夫心知慕義則處處皆能勉厲也僕雖怯耎即欲茍活耎柔弱也音人阮切亦頗識去就之分矣何至自湛溺縲紲之辱哉湛讀曰沈縲力追切且夫臧獲婢妾猶能引决揚雄方言云海岱之間罵奴曰臧罵婢曰獲燕之北郊民而罵婢謂之臧女而婢婦奴謂之獲也况若僕之不得已乎所以隠忍茍活幽於糞土之中而不辭者恨私心有所不盡鄙陋没世而文采不表於後也古者富貴而名磨滅不可勝記唯俶儻非常之人稱焉盖西伯拘而演周易仲尼戹而作春秋屈原放逐乃賦離騷左丘失眀厥有國語孫子髕脚兵法脩列孫子與龎涓學而為龎涓所斷足髕不韋遷蜀世傳吕覽吕氏春秋編名八覽六論韓非囚秦説難孤憤説難孤憤韓子之萹名詩三百大抵賢聖發憤之所為作也抵歸也音可禮切此人皆意有所鬱結不得通其道故述往事思来者合將来之人思已往之事及如左丘無目孫子斷足終不可用退而論書䇿以舒其憤思垂文以自見見胡電切僕竊不遜近自託於無能之辭網羅天下放失舊聞考之行事稽其成敗稽計也興壊之理凡百三十六篇亦欲以究天人之際通古今之變成一家之言草創未就適㑹此禍惜其不成是以就極刑而無愠色僕誠已著此書藏之名山傳之其人通邑大都其人謂能行其書者則僕償前辱之責雖萬被戮豈有悔哉然此可為智者道難為俗人言也且負下未易居下流多謗議僕以口語遇遭此禍重為鄉黨戮笑汙辱先人亦何面目復上父母之丘墓乎雖累百世垢彌甚爾是以腸一日而九廻居則忽忽若有所亡出則不知所如往如亦往也每念斯恥汗未嘗不發背霑衣也身直為閨閣之臣寧得自引深藏於巖穴邪故且從俗浮湛與時俯仰湛讀曰沈以通其狂惑今少卿乃教以推賢進士無乃與僕之私指謬乎指意也今雖欲自彫琢琢刻也音篆曼辭以自解曼美也曼音萬無益於俗不信祇取辱爾祇過也要之死日然後是非乃定書不能盡意故畧陳固陋遷既死後其書稍出宣帝時遷外孫平通侯楊惲祖述其書遂宣布焉楊惲為諸吏光禄勲封平通侯免為庶人惲既失爵位家居治産業起室宅以財自娛嵗餘其友人安定太守西河孫㑹宗知畧士也與惲書諫戒之為言大臣廢退當闔門惶懼為可憐之意闔閉也不當治産業通賔客有稱譽惲宰相子少顯朝廷一朝晻昧語言見廢晻與暗同内懐不服報㑹宗書曰惲材朽行穢文質無所底底致也幸賴先人餘業得備宿衛遭遇時變以獲爵位終非其任卒與禍會卒亦終也足下哀其愚蒙賜書教督以所不及蒙蔽督視也殷勤甚厚然竊恨足下不深惟其終始惟思也而猥隨俗之毁譽也猥曲也言鄙陋之愚心若逆指而文過逆足下之意指而自文飾其過黙而息乎恐違孔氏各言爾志之義顔囘季路侍子曰盍各言爾志故惲引之故敢畧陳其愚惟君子察焉惲家方隆盛時乗朱輪者十人位在列卿爵為通侯總領從官與聞政事與讀曰豫曽不能以此時有所建眀以宣徳化又不能與羣僚同心併力陪輔朝廷之遺忘已負竊位素飱之責久矣素空也不稱其職空食禄懐禄貪勢不能自退遭遇變故横被口語横音古孟切身幽北闕妻子滿獄當此之時自以夷滅不足以塞責塞補也豈意得全首領復奉先人之丘墓乎伏惟聖主之恩不可勝量君子遊道樂以忘憂小人全軀説以忘罪説讀曰悦竊自思念過已大矣行已虧矣長為農夫以没世矣是故身率妻子戮力耕桑灌園治産以給公上充縣官之賦役也不意當復用此為譏議也夫人情所不能止者聖人弗禁故君父至尊親父至親君至尊送其終也有時而既䘮不過三年臣見放逐降居三月復初既已也臣之得罪已三年矣田家作苦嵗時伏臘烹羊炰羔斗酒自勞炰毛炙肉也即今所謂爊也炰音歩交切爊音一髙切家本秦也能為秦聲婦趙女也雅善皷瑟奴婢歌者數人酒後耳熱仰天拊缶缶瓦器也秦人擊之以節歌缶即同今之盆類也而呼嗚嗚李斯上書云擊甕叩缶彈筝摶髀而呼嗚嗚快耳者真秦聲也是門中舊有此曲也其詩曰田彼南山蕪穢不治種一頃豆落而為箕人生行樂耳須富貴何時山髙而在陽人君之象也蕪穢不治言朝廷之荒亂也一頃百畝以喻百官也言豆者身家之物當在困窘零落在野喻己見放棄也箕曲而不直言朝廷皆諂䛕也箕豆莖也是日也拂衣而喜奮褏低昻褏古衣袖字頓足起舞誠荒淫無度不知其不可也自謂為可也惲幸有餘禄方糴賤販貴逐什一之利此賈𥪡之事汙辱之處惲親行之下流之人衆毁所歸不寒而栗栗竦縮也雖雅知惲者猶隨風而靡言逐衆意皆相毁也尚何稱譽之有董生不云乎眀眀求仁義常恐不能化民者卿大夫之意也眀眀求財利常恐困乏者庶人之事也引董仲舒之辭仲舒傳作皇皇故道不同不相為謀今子尚安得以卿大夫之制而責僕哉夫西河魏土文侯所興有叚干木田子方之遺風叚干木田子方為賢人也漂然皆有節槩知去就之分漂然髙遠意槩度量也漂音匹由切槩音工代切分音扶問切頃者足下離舊土臨安定安定山谷之間昆戎舊壤昆夷之地也子弟貪鄙豈習俗之移人哉於今乃睹子之志矣言豈隨安定貪鄙之俗而易其操乎平生謂子為達道今乃見子之志與我不同也方當盛漢之隆願勉旃毋多談後漢馮衍以計説更始尚書僕射行大將軍事鮑永永以衍為立漢將軍與上黨太守田邑等繕甲養士扞衛并土及世祖即位邑聞更始敗乃遣使詣雒陽獻璧馬即拜為上黨太守因背前約遣使者招永衍等疑不肯降而忿邑衍與邑素誓刎頸俱受重任衍乃遺書曰盖聞晉文出奔而子犯宣其忠晉文公重耳避驪姬之難出奔狐偃勸令返國遂為霸主子犯即狐偃字也趙武逢難而程嬰眀其賢趙盾晉卿生趙朔朔娶晉成公姊為大夫晉景公三年大夫屠岸賈誅趙氏殺趙朔滅其族朔妻有遺腹走公言趙朔客程嬰公孫杵臼謂程嬰曰胡不死程嬰曰朔之婦有遺腹若幸而生男吾奉之即女也吾徐死爾居無何朔妻生男屠岸賈聞之乃索於宫中夫人置兒於絝中祝曰趙宗滅乎若唬即不滅若無聲及索兒竟無聲程嬰曰今一索不得後必復索之杵臼乃取它嬰兒負之匿山中諸將共攻殺杵臼斥孤兒然趙氏真孤乃在程嬰所即趙武也居十五年晉景公乃立趙武為卿而復其田邑二子之義當矣今三王背畔赤眉危國三王見更始傳天下螘動社稷顛隕螘動衆論是忠臣立功之日志士馳馬之秋也伯玉田邑字也擢選剖符専宰大郡文帝初與郡守始為銅虎符竹使符分持其一以為瑞信剖即分也夫上黨之地有四塞之固東帯三闗西為國蔽三闗謂上黨壺口闗石陘闗也陘音行一切奈何舉之以資彊敵開天下之匈假仇讎之刃豈不哀哉張儀説楚王曰秦下甲攻衛陽晉大開天下胷李斯曰所謂借寇兵而齎盜糧也衍聞之委質為臣無有二心委質猶屈膝也𫝊曰䇿名委質二乃辟也臣無二心古之制也挈瓶之智守不假器是以晏嬰臨盟擬以曲㦸不易其辭齊大夫崔杼弑齊莊公乃却諸大夫盟有敢不盟者㦸鉤其頸劍承其心曰不與崔氏而與公室者盟神視之言不疾指不至血者死所弑者七人而後及晏子晏子奉血仰天曰崔氏無道而殺其君若有能復崔氏而晏不與盟神視之遂仰而飲血崔氏曰晏子與我則齊國吾與共之不與我則㦸在脰劒在心子圖之晏子曰刼吾以刃而失其意非勇也留吾以利而背其君非義也詩云愷悌君子求福不囘晏可囘而求福乎劒刄鉤之直兵推之嬰不革矣崔子遂釋之謝息守郕脅以晉魯不䘮其邑魯孟孫之家臣謝息孟孫從魯昭公如楚謝息為孟孫守郕邑晉人來理祁田季孫將以郕邑與之謝息不可曰夫子從君而守臣䘮邑雖吾子亦有猜焉季孫曰君之在楚於晉罪也又不聽晉魯罪重矣晉師必至吾無以待之謝息曰古人有言挈瓶之智守不假器季孫曰吾與子桃辭以無山與之莱祚乃遷於桃注曰挈瓶汲器諭小智也魯國卞縣之東南有桃虚莱祚二山名繇是言之内無鉤頸之禍外無桃莱之利案謝息得桃邑在山故言無桃菜之利也而被畔人之聲蒙降城之恥竊為左右羞之且邾庶其竊邑畔君以要大利曰賤而必書莒牟夷以土地求食而名不滅是以大丈夫動則思禮行則思義未有背此而身名能全者也庶其邾大夫以邾邑漆閭邱奔魯故言竊也畔君以要利也牟夷莒大夫竊牟婁及防兹来奔昭公三十一年邾黒肱以濫来奔左傳曰以地畔求食而已不求名賤而必書以名其人終為不義不可滅已是故君子動則思禮行則思義或求名而不得或欲盖而名彰此所謂三畔人名者也為伯玉深計莫若與鮑尚書同情戮力顯忠貞之節立超世之功如以尊親係累之故能捐位投命歸之尚書大義既全敵人紓怨紓緩也音舒上不損剖符之貴下足救老㓜之命申眉髙談無愧天下若乃貪上黨之權惜全邦之實衍恐伯玉必懐周趙之憂上黨復有前年之禍趙孝成王時韓上黨太守馮亭使人至趙曰韓不守上黨入之以秦其吏人皆安為趙不欲為秦有城市邑十七願再拜入之趙趙王大喜召平陽君豹告曰馮亭入城市邑十七受之何如豹曰聖人甚惡無故之利夫秦蠶食韓氏地中絶不令相通韓氏所以不入於秦者欲嫁其禍於趙必勿受也趙王不聽遂發兵取上黨於是秦人圍趙坑其卒四十萬又圍邯鄲又改西周故地故言懐周趙之憂前年猶往時昔晏平仲納延陵之誨終免欒髙之難延陵邑名吳公子季札所封故以號焉季札聘齊見晏平仲曰子速納邑與政無邑無政乃免於難晏子因陳桓子以納邑與政是以免於欒髙之難欒謂子雅髙謂子居邑齊大夫魯昭公八年欒髙作難晏子無罪孫林父違穆子之戒故陷終身之惡孫林父衛大夫孫文子也穆子魯大夫叔孫豹衛侯使孫林父聘魯且尋盟公登亦登叔孫穆子相儀趍進曰諸侯之㑹寡君未嘗後衛君今吾子不後寡君未知所過孫子無詞亦無悛容穆子曰孫子必亡為臣而君過而不悛亡之本也至襄十四年孫林父逐出衛獻公獻公復入國林父遂以戚邑畔時陷於終身之惡以為伯玉聞此至言必若刺心自非嬰城而堅守則䇿馬而不顧也言不過為二途而已聖人轉禍而為福智士因敗以成勝願自强於時無與俗同邑報書曰僕雖駑怯亦欲為人者也豈茍貪生而畏死哉曲㦸在頸不易其心誠僕志也間者老母諸弟見執於軍而邑安然不顧者豈非重其節乎若使人居天地夀如金石要長生而避死地可也今百齡之期未有能至老壯之間相去㡬何誠使故朝尚在忠義可立雖老親受戮妻兒横分邑之願也間者上黨黠賊大衆圍城義兵兩軰入據井陘邑親隤敵圍拒擊宗正即劉延自試智勇非不能當誠知故朝為兵所害新帝司徒已定三輔謂鄧禹也隴西北地從風響應其事昭昭日月經天河海帯地不足以比言眀白也死生有命富貴在天天下存亡誠云命也邑雖身没能如命何夫人道之本有恩有義義有所宜恩有所施君臣大義母子至恩今故主已亡義其誰為老母拘執恩所當留而厲以貪權誘以䇿馬抑其利心必其不顧何其愚乎邑年三十歴位卿士性少嗜慾情厭事為况今位尊身危財多命殆鄙人知之何疑君子君長敬通君長鮑永字也揭節垂組自相署立揭音其謁切謂賢也盖仲由使門人為臣孔子譏其欺天孔子有疾仲由欲使門人為臣以大夫之禮葬孔子孔子謂曰由之行詐也吾誰欺欺天乎君長據位兩州加以一郡衍集鮑永行衛軍事安集并州擁兵屯九原與太原李仲房同心并力而河東畔國兵不入彘聞更始敗故諸國敗也不入彘言不征之也彘縣名屬河東郡順帝改曰永安上黨見圍不窺大谷即上所謂黠賊所圍城者也大谷自太原趣上黨之道不窺言不求救也今并州大谷縣而有大谷是也宗正臨境莫之能援兵威屈辱國權日損三王背畔赤眉害主未見兼行倍道之赴昔墨翟累繭救宋申包胥重胝存楚衛女馳歸唁兄之志衛女為許穆公夫人其兄即戴公弟失國曰唁衛懿公為狄所滅戴公乃立廬于曹邑許穆夫人閔衛思歸唁之不得乃賦載馳之詩主亡一嵗莫知所定虚冀妄言茍肆鄙塞未能事生安能事死未知為臣焉知為主豈厭為臣子思為君父乎欲揺泰山而蕩北海言不可也孟子曰挾泰山以超北海也事敗身危要思邑言衍不從或訛言更始隨赤眉在北永衍信之故屯兵界休又遣子壻張舒誘降湼城舒家在上黨邑悉繫之邑又書勸永降曰愚聞大夫不釋故而改圖哲士不徼幸而出危今君長故主敗不能死新帝立不肯降擁衆而據壁欲襲六國之從與邑同事一朝内為刎頸之盟與兵背畔攻取湼城破君長之國壊父母之鄉首難結怨輕弄㓙器人心難知何意君長當為此計昔者韓信將兵無敵天下功不世出畧不再見威執項羽名出髙帝不知天時就烹於漢智伯分國既有三晉欲大無己身死地分頭為飲器君長衘命出征擁帯從士上黨敗不能救河東畔不能取朝有顛危之憂國有分離之禍上無仇牧之節下無不占之志天之所壊人不能支君長將兵不與韓信同日而論威行得衆不及智伯萬分之半不見天時不知厭足欲眀人臣之義當先知故主之未然欲貪天下之利宜及新主之未為今故主已敗新主既成四海為羅網而天下為敵人舉足遇害動揺觸患履深泉之薄氷不為唬陟千均之發機不知懼何如其知也絶鮑氏之姓廢子都之業誦堯之言服桀之行悲夫命也張舒内行邪孽不遵孝友疏其父族外附妻黨已收三族將行其法能逃不自詣者舒也能夷舒宗者子也永邑遂結怨焉馬融為南郡太守與竇伯尚書曰孟陵奴来賜見子跡歡喜何量次於面也書雖兩紙毎紙八行行七字趙壹漢陽人抵罪㡬至死友人救得免壹乃貽書謝恩曰昔原大夫贖桑下人絶氣𫝊稱其仁原大夫謂趙盾也諡曰伯宣孟將之絳見骫桑之下有卧饑人宣孟與脯二朐拜受之不敢食問其故曰臣有母時以遺之宣孟更賜之脯二束遂去贖即續也骩古委字也秦越人還虢太子結􅍺世著其神扁鵲姓秦名越人過虢虢太子死扁鵲曰臣能生之若太子病所謂尸蹷也乃使弟子子陽厲越砥石以取三陽五㑹有間太子蘇設曩之二人不遭仁遇神則結絶之氣竭矣然而糒脯出乎車軫軫車輜間横木鍼石運乎手爪古者以砭石為鍼凡鍼之法右手象天左手法地彈而怨之搔而下之此運手爪也砭音必㢘切今所賴者非直車軫之糒脯手爪之鍼石也乃收之於斗極還之於司命司命文昌中星使乾皮復含血枯骨復被肉允所謂遭仁遇神真所宜𫝊而著之余畏禁不敢班班顯言班班眀貌竊為窮鳥賦一篇後上計名動亰師士大夫想望其風采及西還道經𢎞農過候太守皇甫規門者不即通壹遂遁去門吏懼以白之規聞壹名大驚乃追書謝曰蹉跌不面企徳懐風虚心委質為日久矣側聞仁者愍其區區冀承清誨以釋遥悚今但外白有一尉兩計吏不通屈尊門下尊謂一也敬之故號為尊更啟乃知已去如印綬可投夜豈待旦惟君眀睿平其夙心寧當慢慠加於所天平恕也尊敬壹故謂為所天事在悖惑不足具責儻可原察追修前好則何福如之謹遣主簿奉書下筆氣結汗流竟趾壹報曰君學成師範縉紳歸慕仰髙希驥歴年滋多詩曰髙山仰止景行行止法言曰希驥之馬亦驥之乗希彦之人亦顔之徒希慕也旋轅兼道渴於言侍沐浴晨興昧旦守門實望仁兄昭其懸遲懸心遲仰之以貴下賤握髮垂接易曰以貴下賤大得民也周公一沐三握髮以接天下之士髙可敷翫墳典起發聖意下則抗論當世消弭時災豈悟君子自生怠倦失恂恂善誘之徳同亡國驕惰之志恂恂恭順貌盖見幾而作不俟終日是以夙退自引畏使君勞昔人或歴説而不遇或思士而無從皆歸之於天不尤於物今壹自譴而已豈敢有猜仁君忽一匹夫於徳何損而遠辱手筆追路相尋誠足愧也壹之區區曷云量已其嗟可去謝也可食齊大饑黔敖為食於路以待餓者有蒙袂戢屨貿而来曰嗟來食曰余唯不食嗟来之食以至於斯從而謝之不食而死仲尼曰其嗟也可去其謝也可食壹誠頑薄實識其趣但闗節疢動膝炙壊潰人有四闗十二節請俟它日乃奉其情輙誦来貺永以自慰遂去不顧州郡争致禮命十辟公府並不就終於家孔融字文舉漢末㑹稽太守王朗為孫䇿所敗太祖表徴之朗被徴未至融與朗書曰世路隔塞情問斷絶感懐増思前見表章知尋湯武罪已之迹自投東裔同鯀之罰覽省未周涕隕澘然主上寛仁貴徳宥過曹公輔政思賢並立䇿書屢下殷勤欵至知櫂舟浮海息駕廣陵不意黄能突出羽淵也談笑有期勉行自愛又張紘既好文學善楷篆嘗與融書融遺紘書曰前勞手筆多篆書每舉萹見字欣然獨笑如復覩其人也孫權討江夏命紘居守融書遺紘曰聞大軍征西足下留鎮不有居者誰守社稷深固折衝亦大勲也無乃李廣之氣倉髮益怒樂一當單于以盡餘憤乎南北並定世將無事孫叔投戈絳灌俎豆亦在今日但用離析無縁㑹面為愁歎爾道直途清相見豈復難哉融後為少府劉表為荆州牧與袁尚書説其兄弟分争之變曰每與劉左將軍孫公祐共論此事未嘗不痛心入骨相為悲傷也册府元龜巻九百三
