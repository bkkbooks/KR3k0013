body:
  text: 冊府元龜卷一百四十七宋王欽若等撰帝王部恤下第二唐髙祖武徳元年五月即位詔鰥寡孤獨量加賑恤七月己酉詔曰隋政不綱行止無度東西奔騁靡嵗獲寧遂使父子乖離室家分析親老絶晨昏之養嬰孩無撫育之恩人懐戀本之心家有望鄉之歎朕上膺靈命下字黔黎一物失宜情深軫悼思禆恵澤逮于鰥寡其隋代公卿已下爰及民庶身往江都家口在此不預義軍者所有田宅並勿追收若有困窮糧食交絶具錄名簿速加賑贍四年六月庚寅詔鰥寡孤獨以時恤理七月丁卯大赦詔髙年惸獨量加賑恤六年三月詔曰詩不云乎民亦勞止汔可小康自有隋失馭政刑版蕩豺狼競起肆行暴虐徵求無度侵奪任已下民困擾各靡聊生喪亂之餘百不存一上天降監爰命朕躬廓定凶災乂寧區域念此黎庶凋弊日久新獲安堵衣食未豐所以每給優復蠲減徭賦不許差科輒有勞役義行簡静使務農桑至如大河南北離亂永久師旅薦興加之饑饉百姓勞弊此焉特甚江淮之間爰及嶺外塗路懸阻土曠民稀流寓者多尤宜存恤此等諸處往隔寇戎自經開泰嵗月未久猶恐士民積習不改前弊州縣官人未稱所委迎送往來尚致勞費其河北江淮以南及荆州大總管向西諸州所司宜便班下自今以後非有别勑不得輒差科徭役及迎送供承庶令安逸明加簡約稱朕意焉四月詔曰隋末喪亂豺狼競逐率土之衆百不存一干戈未静桑農咸廢凋弊之後饑寒重切永言於此悼于厥心今寇賊已平天下無事百姓安堵各務稱職家給人足即事可期所以新附之民特蠲徭賦欲其休息更無煩擾使獲安静自脩産業猶恐所在州縣未稱朕懐道路迎送廨宇營築率意徵求擅相呼召諸如此例悉宜禁㫁非有别勑不得差科不如詔者重加推罰布告天下咸知此意太宗以武徳九年八月即位詔鰥寡孤獨不能自存者量加優恤貞觀元年二月詔曰昔周公治定制禮垂裕後昆命媒氏之職以會男女每以仲春之月順時行令蕃育之理既𢎞邦家之化攸在及政教凌遲諸侯力争官失其守人變其風致使謠俗有失時之譏鰥寡無自存之術漢魏作教事非師古道隨世隠義逐時乖重以隋徳淪胥數鍾迍剥五都俱覆萬方咸蕩暨參墟奮旅救彼難危區縣削平總斯圗籍顧瞻禹跡提封尚存乃眷周餘掃地咸盡痛心疾首寤寐無忘葢惟上𤣥之大徳曰生蒸民以最靈為貴一經喪亂多餌豺狼朕肅奉天命為之父母平定甫爾劬勞未堪厚生樂業尚多疎簡永言亭育用切於懷若不申之以婚姻明之以顧復便恐中饋之禮斯廢絶嗣之釁方深有懷怨曠之情或致淫奔之辱憲章典故實所庶㡬宜令有司所在勸勉其庶人男女之無室家者並仰州縣官人以禮聘娶皆任其同類相求不得抑取男年二十女年十五已上及妻喪達制之後孀居服紀已除並須申以媒媾令其好合若貧窶之徒将迎匱乏者仰於其親近及鄉里富有之家裒多益寡使得資送以濟其鰥夫年六十寡婦年五十已上及婦人雖尚少而有男女及守志貞潔者並任其情無勞抑以嫁娶七月詔曰周氏設官分掌邦事漢家創制允定章程故使百工咸理五材異用雖㳂革有時而此塗莫爽但欽明之后役自子來昏亂之朝期盡民力或祁寒隆暑未獲小康或俾夜作明繼之以燭淫費不已凋喪為期朕祗奉明命撫臨億兆愛育之心發於寤寐每咨謀卿士詢訪芻蕘何嘗不以節儉為懷憂矜在念自非田疇耘穫軍國資須未曽别使一人輒求一物每有丁匠之所常申戒作之司令其寛大功程務従閒逸少府僚屬莫不聞知而營造矛鎧催督非理竭人之力以求己功朝夕左右尚乖期約逺方勞役何以克堪雖四海之内無餘經始然繕治器械脩葺城隍及隄防浸決橋梁壞毁事不獲已必藉人功須慰彼民心緩其日用宜班告天下知朕意焉六年三月幸九成宫詔岐雍豳三州行經之所鰥寡惸獨賜以粟帛太宗九年三月大赦鰥寡惸獨不能自存者所在官司量加賑恤十年闗内河東疾病醫齎藥療之十一年二月幸雒陽宫詔従兵有父母年八十已上者悉罷遣七月詔曰雒陽宫室創自有隋朕因其成功無所改作今屋宇湮壞者宜量加脩葺使纔充居處自外材木宜分賜雒州郭内貪民因水損居宅者是月以廢明徳宫之𤣥圃院分給河南雒陽遭水者十三年正月朝獻陵詔鰥寡惸獨有篤疾者賜物各有差十五年正月幸雒陽詔従行士卒家貧親老者並放還所過賜高年篤疾穀帛有差三月戊辰如襄城宫澤州疾疫遣醫就療十六年夏穀涇徐虢戴五州疾疫遣賜醫藥焉十七年四月中郎将李安儼與太子承乾謀反誅籍没其家其父年九十餘太宗愍焉特賜奴婢以養之閏六月潭濠廬三州疾疫遣醫療焉十八年自春及夏廬濠巴普彬疾疫遣醫往療二十一年十二月大寒帝謂侍臣曰朕在九重之内身御珍裘且将臨朝猶覺氣之嚴厲況臣下逺趨北闕蒙犯霜露乎朕思若此遂減衣裘而出二十二年九月邠州大疫詔醫療之高宗永徽元年六月新豐南大雨零口山水暴出漂廬舍溺死者九十餘人詔給死者絹布三疋仍給棺瘞埋之乏絶者給資之宣歙饒常等州暴雨水漂殺四百餘人詔為瘞埋仍給貸之六年六月辛丑商州山水漂壞居人廬舍遣使存問之顯慶元年七月己夘宣州涇縣山水暴漲高四丈餘漂蕩村落溺殺二千餘人制賜死者物各五段廬舍損壞者量為營造并賑給之十一月饒州火焚州城廨宇倉獄延燒居人廬舍有死者詔給死者家布帛以葬之四年七月連州山水暴漲漂没七百餘家詔鄉人為造宅宇仍賑給之龍朔二年十二月詔曰海東二蕃久愆職貢近者命師薄伐軍務事殷緣河州縣勞於征役比雖多有蠲免庶事優矜萬邦俱會致恐煩擾勞逸二途理無兼遂介立大禮及幸東郡並宜立停總章二年九月海水泛溢壞永嘉安固二縣墎居人廬舍六千餘家遣使脩葺宅宇溺死者各賜物五段咸亨元年八月以天下四十餘州旱及霜蟲百姓饑乏闗中尤甚詔雍同華蒲絳五州百姓乏絶者聴於興鳳梁等州逐糧十月詔貧寠之家有年十五已下親屬不能收養者並聴為男女及驅使京官六品以下情願将家口歸本貫及往豐熟之處並聴之上元三年八月青州大風海水泛溢漂損居人廬宅五千餘家齊淄等七州大水詔賑貸貧乏溺死者賜物埋殯之舍宅壞者助其營造儀鳳三年四月以同州饑沙苑及長春宫並許百姓樵採漁獵永隆元年秋河南北諸州大水詔遣使分往存問其漂溺死者各給棺槥其家賜物七段屋宇破壞者勸課鄉閭助其脩葺糧食乏絶者給貸之二年八月河南河北大水詔溺死者各贈物三段中宗神龍元年四月雍州同官縣大雨雹鳥獸死及大水漂流居人四五百家遣員外郎一人巡行賑給被溺死者官為埋殯六月雒水暴漲壊人廬舍二千餘家溺死者數百人令御史存問賑䘏官為瘞埋景龍二年三月築朔方軍城四月以兵匠有疾病者令醫人齎藥巡療𤣥宗先天二年五月詔曰卑宫致美愛人之力靈臺罷營重費之廣景彼前烈吾無間然頃以所居殿院素非𢎞敞時方暑雨頗有蒸鬱上禀聖慈式遵時令将脩别寢順彼高居雖復庀徒所須止於蕃匠補葺所擬無煩外力然以麥秋爰及農務方勤維夏在辰執役為弊營之則衆物有勞而一身逸罷之則我躬未泰而萌庶安夫生人樹君将利之也勞人自奉予所不為其脩大明宫宜即待至閒月方使畢功宣示具寮使知予意所有先役工匠即優還價直勿令懸欠仍即放散開元三年七月詔曰古之為國者蔵之於人百姓不足君孰與足比者山東邑郡歴年不稔朕為之父母欲安黎庶恤彼貧弊拯其流亡静而思之非不勤矣今者風雨咸若京坻可望若貸糧地税庸調正租一時倂徵必無辦法河北諸州宜委州縣長官勘責灼然不能支濟者税租且於本州納不須徵却待至春中更别處分有貸糧迴溥等亦量事減徵四年正月詔曰如聞江淮南諸州大蟲殺人村野百姓頗廢生業行路之人嘗遭死失州縣不以為事遂令猛獸滋多泗州連水縣令李全確前任宣州秋蒲縣令界内先多此獸全確作法遮捕掃除畧盡迄今人得夜行百姓實賴其力宜令全確馳驛往淮南大蟲為害州指授其教與州縣長官同除其害緣官路兩邊去道各十步草木常令芟伐使行人往來得以防備七年九月詔曰東都道俗有來請駕者東西來去雖則為常每嵗來請豈能無擾宜以理告示仍於朝堂賜食即發遣并勑陸象先莫令更相倣傚八年六月河南府穀雒涯三水泛漲漂溺居人四百餘家壞田三百餘頃諸州當防丁當畨衞士掌閑廏者千餘人遣使賑恤及助脩屋宇其行客溺死者委本貫存恤其家十年五月東都大雨伊汝等水泛壞河南府及許汝仙陳四州廬舍數千家溺死者甚衆詔河南府巡行所損之家量加賑貸并借人力助營宅屋十一年七月丁亥勑曰神農嘗草以療人疾岐伯品藥以輔人命朕銓覽古方永念黎庶或榮衞内壅或寒暑外攻因而不救良可歎息今逺路僻州醫術全少下人疾苦将何恃賴宜令天下諸州各置職事醫學博士一員階品同于錄事每州寫本草及百一集驗方與經史同貯其諸州于錄事各省一員中下州先有一員者省訖仰州補勲散官充帝新製廣濟方頒於天下十二年三月詔曰河南河北去嵗雖熟百姓之間頗聞辛苦今農事方起蠶作就功宜令御史分往巡行其有貸糧未納者並停到秋收十三年十二月詔曰應縁朕巡行處有損百姓竹樹者所司即酬其錢十四年七月以懷鄭許滑衞等州水潦遣右監門衞將軍知内侍省事黎敬仁宣慰如有遭損之處應須營助賑給並委使與州縣相知量事處置九月命御史中丞兼戸部侍郎宇文融往河南河北道遭水州宣撫若屋宇摧壊牛畜俱盡及征人之家不能自存立者量事助其脩葺十一月詔曰近聞河南宋沛等州百姓多有㳂流逐熟去者須知所詣有以安存宜令本道勸農事與州縣檢責其所去及所到戸數奏聞十五年四月詔曰河南河北諸州去年緣遭水澇雖頻加賑貸而恐未小康言念於兹無忘鑒寐爰自春夏雨澤以時兼聞夏苗非常茂好既即收穫不慮少糧然以産業初營儲積未贍若非寛恵不免艱辛其貸糧麥種榖子迴轉變造諸色欠負等並放候豐年以漸徵納蠶麥事畢及至秋收後並委刺史縣令専勾當各令貯積勿使妄有費用明加曉諭知朕意焉十六年正月庚子御興慶樓宴羣臣下制曰朕昔在藩國此惟邸第乾坤未泰隂陽尚䝉則有神祗効靈祥符肇貺飛佳氣於在田之際湧瑞日於或躍之池惟此舊居式加新宇周牆僅板於百堵卑宫不階於三尺棟樑之用毁徹所餘聊以紀天地之休徵貽子孫之儉約耳屬春令爰始時惟發生萬方來朝千官入賀既稱觴以獻夀宜施恵以布徳況田農在候稼穡方興或迫於程徭不遂農桑之務言及於此軫歎良深其徒已下且令貴保并應當畨兵士等灼然單貧者所由勘會並放營農所在訴訟長官隨事疎理勿使寃滯非軍國所要餘不急之務一切並停仍加勸課脩植農穡其河北水損戸既屬春事慮有之絶不支濟者宜委採訪使與州縣相知量加賑恤諸處行人之家及鰥寡惸獨不能自存者州縣長官親加優撫使得存濟應有差科量事矜放宜宣風緝化職在令長有司銓擇之次特宜審擇其才惟徳與刑為政之要頃無聞於風化多取威於夏楚理人之道其若是乎愚昧之流或輕抵犯宜加曉諭使識章程其含生之類不得輒有屠殺天下捕獵亦宜禁㫁仍嚴加捉搦百司各遵時令務𢎞寛大之典使政理無失稱朕意焉二十三年五月詔曰如聞闗輔蠶麥雖稍勝常年百姓所收纔得自給若無優假還慮艱弊其先欠百司職田及諸色應合至蠶麥時徵已有處分訖其公私舊債亦宜停徵貧下百姓有傭力買賣與富兒及王公已下者任依常式天寳三載八月詔曰育物者所貴於従宜養人者必資於遂性況加疾苦豈忘哀矜内外廊二衞彍騎等如聞因當上染患者畨滿之後既不勝致還鄉又不容在職掌将息進退無據何所依投溝壑是憂宜謀朝夕永言及此深軫于懷自今以後如有此色宜移就三衞厨給食料将養各委左右金吾将軍存意檢校所須藥物仍與太常計會量事供擬并差醫人救療其諸門及諸舖職掌人等各移就本衞将養所須食料各委将軍以當衞諸色迴殘官物等且量事支給其醫藥宜准内外廊例自餘諸色當畨人等有疢疾者並准此處分其死者各委所由隨事埋瘞當日牒報本貫令家人親族運致還鄉五載八月癸未詔曰朕頃所撰廣濟方救人疾患頒行已久計傳習亦多猶慮單貧之家未能繕寫閭閻之内或有不知儻将療失時因致横夭性命之際寧忘惻𨼆宜令郡縣長官就廣濟方中逐要者於大板上件録當村坊要路牓示仍委採訪使勾當無令脱錯十三載二月詔鰥寡惸獨乏絶者量加賑給肅宗至徳元年七月大赦詔左降官非反逆侵坐及犯惡逆名教枉法强盜贓如有親年八十已上及疾患在牀枕者不堪扶持更無兄弟許其停官終養其流人亦准此乾元元年四月詔曰應緣南郊百司張設有損百姓苗稼者委京兆尹隨損多少倍酬所損錢物便即聞奏十月詔曰應行營人家及羸老單貧鰥寡惸獨已頻有處分宜令州縣長官倍加賑恤上元二年九月詔鰥寡惸獨不能自存立者委刺史縣令量加賑恤代宗寳應元年十月乙夘勅曰浙江東西去嵗旱損所出租賦頗甚艱辛今秋已來復聞遭水百姓重困何以克堪朕所以未明求衣日旰忘食思𢎞理道良用疚懷今所徵收唯正租庸而已其餘差役咸使矜量頗亦申明冀稍安緝如聞諸道節度使不承正勅妄有徵科州縣望風便行文牒務為逼迫自應誅求事且因循轉用生弊不有懲革何以息人自今已後宜令本道觀察及租庸使嚴加訪察其州縣除正勅支遣外不得轉承諸使文牒徴率一物已上如或有犯便仰停務具名彈奏又聞杭越間疾疫頗甚户有死絶未削版圗至於税賦或無舊業田宅延及親鄰言念疲人豈堪兼役致令逃散誠有哀矜亦委租庸使與本州審細勘責據實户差遣處置訖具状聞奏仍委刺史縣令設法招㩦課最之間褒貶斯在其有死絶家無人收塟仍令州縣埋瘞朕臨御寰瀛為人父母一物失所每勤罪己之心四方未寧彌軫納隍之慮庶尹卿士友邦冡君宜悉朕懐共敷至理大厯九年四月制曰其百姓鰥寡孤獨不能存濟者困窮無主誠可哀傷仰所在州縣府長官每年以諸色官物量加贍恤令其得所徳宗貞元元年正月詔嘗陷賊百姓屋宇焚毁貧病老弱咸加優恤十二年越州刺史皇甫政奏云貞元十年綾縠一千七百疋至汴州值兵潰叛物皆散失請率新來客戸續補前數帝謂宰臣曰百姓有業則懷土為居戸失業則去鄉為客戸去鄉者咸遭罹苛暴瘡痍之人豈可重傷可罷其率特免所失物十四年閏五月貶太子詹事蘇弁為汀州司户又貶其兄賛善大夫衮為永州司戸俄降勑曰左降官蘇衮貶官本緣弁連坐矜其年暮加以疾患宜令所在勒迴任歸私第衮年七十兩目無所見已逾年以弁之故竟未停官及貶帝聞之哀憫故許還家十八年七月詔曰朕獲主兆人以臨方夏憂勤于政思底康寧然而理化未孚水旱為沴或傷壞廬舍漂損田疇朕為人父母用切于衷其諸道應遭水損州縣令委本道觀察使速具條疏聞奏當有處分又詔曰政在養人實為邦本朕庶存節用以拯凋殘咨爾長吏宜加安撫申明曉示令悉朕懷十九年七月以闗輔饑罷今嵗吏部選集憲宗元和二年八月沒蕃僧惟良闡等四百五十人自吐蕃復還中國命京兆府勘責先身亡及送在神策軍餘三百九十人詔良闡等頃因淪陷久在殊方或有平日遣人或是衣冠舊族萬里歸國尤所哀矜應歸及分配并侍親等人委所在特加優恤四年九月普寧公主奏出城行田帝令中使彭希昭宣以禾稼初登或慮蹂踐且歸第以俟來月七年六月制册皇太子十一月制高年廢疾者委所管州縣各加存恤十年二月以朗州司馬劉禹錫為播州刺史中丞裴度奏禹錫母年八十今播州乃猿狖所居人跡罕至禹錫誠合得罪然其老母必去不得則須與子為死别傷陛下孝理之風伏請屈制稍移近處使得終養帝曰夫為人子者每事尤須脩謹嘗恐貽親之憂今禹錫所坐更合重於他人豈可以此論救度不能對帝乃曰我所言是責人子之事然終不能傷其所親之心明日改授禹錫連州刺史十二年二月撰貞元集要廣利方憲宗親為之制序散題於天下通衢其方總六千三種五百八十六首九月詔諸道遭水州府其人戸中有漂溺致死者委所在收瘞其屋宇摧倒亦委長史量事勸課脩葺使得安存穆宗長慶元年七月大赦制天下百姓年九十以上委所在長吏量加存問文宗太和元年十一月詔應配流靈夏等州及天徳軍人等自今後宜許将家口赴流所除本身外亦據口數給熟食遞送六年正月詔京城内有鰥寡孤獨不能自濟瘖聾跛躄窮無告者委京兆尹量事賑恤具所破數聞奏五月庚申詔諸道應災荒處疾疫之家有一門盡殁者官給凶具隨事瘞蔵一家如有口累疫死一半者量事與本戸税錢三分中減一分死一半已上者與減一分本戸税其疫未定處並委長吏差官巡撫量給醫藥詢問救療之術各加拯濟事畢條疏奏聞天下有家長大者皆死所餘孩稚十二至襁褓者不能自活必致夭傷長吏勒其近親收養仍官中給兩月糧亦具都數聞奏江南諸道既有凶荒賦入上供悉多蠲減國用常限或慮不充宗廟切急所須外有舊例市買貯備雜物一事已上並仰權停待嵗熟時和例舉處分七年八月詔百姓困窮弊繇姦吏政苟不擾人皆自安其司農寺供宫内及諸厨冬蔵菜並委本寺自供其菜價仍委京兆尹約每年時價支付更不得配京兆府和市其諸陵守當夫宜委京兆府以價直送陵司令自雇召並不得差配百姓應寒食雜差配及樹栽脩橋柴木選塲棘等便於戸税錢内尅折不得更令和市天下諸州府應納義倉及諸色斛斗二合耗外切宜禁斷仍委度支鹽鐵分巡院及出使郎官切加訪察九年八月以責授閬州刺史權􅟛為鄭州刺史璩宰相文公徳輿之子少負名譽籍甚於士大夫間會徳輿門生李宗閔為相璩為中書舍人宗閔敗璩不自安頻宻上章自雪黨比遂改授閬州及是帝知璩所生母抱病因有是命開成元年正月己巳東都留守司徒兼中書令裴度上言前懐州武徳縣令王賞以失縣庫子賞乃盡償所欠緍錢庫子莫可得獄固難竟河陽節度使溫造嚴刻禁賞三年母老不得侍疾母亡不得服喪大理寺執文斷疏疑似之間寃滯深久帝方留情刑獄聞之即時詔釋賞宣宗大中四年正月詔有水旱處宜令州縣長吏多方優恤務使安存如有甚不支濟仰具事繇聞奏别議處分懿宗咸通四年七月朔制曰安南冦陷之初流人多寄溪洞其安南将吏官徤走至海門者人數不少宜令宋式李良瑍察訪人數量事救䘏哀帝天祐二年四月詔鰥寡孤獨不濟者長吏量加賑䘏後唐莊宗天祐二年四月即位制曰應諸道管内有髙年踰百嵗者便與給復永俾除名自八十至九十者與免一子色役州縣不得差徭同光元年十月詔應鰥寡惸獨無所告仰者所在各議拯救或有年過八十者免一子従征十一月勑左降官均州司馬劉岳有母年踰八十近聞身故既鮮兄弟别無骨肉孤魂旅寄誰為葢棺准本朝故事許歸終三年喪服闋如未量移即赴貶所明宗天成三年十一月己丑出潜龍宅粟以賑百官長興二年十二月丁丑帝謂三司使曰先是兩川隔道兵士所有家屬常加贍給勿令失所時孟知祥初有全蜀之地三年七月丙戌詔賜諸軍救接有差四年九月丁丑范延光奏隔在兩川兵士家口自來支給衣糧今縁國計不充欲權停支給帝曰彼非願留因事暌阻父子仳離非人情也不可頓絶支給其間願歸鄉貫者従之如有子弟許繼其父兄本軍名糧如無鄉里可歸無子弟承繼且量支一年以是曉諭其家漢高祖即位太原至東京謂左右曰過陳橋見百姓桑棗空有餘折其廬室悉牆垣耳因荒邪因兵邪左右對曰此契丹犯闕時杜重威宿漢軍之所也上惻然嗟嘆曰重威破國殘物一至於此此而不討是朕養惡蓄姦何以為蒼生父母副海内徯望之心也左右皆稱萬嵗周太祖廣順元年八月契丹瀛莫幽州界大水飢饉流散襁負而歸者不可勝計比界州縣亦不禁止太祖愍之詔沿邊州郡安䘏流民仍口給斗粟前後繼至數十萬口三年正月庚午萊州刺史葉仁魯犯贓法等㫁處死賜自盡将死太祖遣中使賜酒食宣曰汝自抵刑憲國法如此爾有老母當遣存恤耳仁魯感恩泣下尋死之顯徳元年正月赦天下年髙殘疾鰥寡孤獨所屬官吏務行存恤冊府元龜卷一百四十七
