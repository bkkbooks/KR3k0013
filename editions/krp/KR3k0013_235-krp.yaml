body:
  text: 册府元龜卷二百三十五宋王欽若等撰列國君部緫序易之比象曰先王以建萬國親諸侯自黄帝制城畫野得百里之國萬區帝堯在位協和萬邦禹㑹塗山執玉萬國以至於桀存者三千商氏之起大眀憲法立公侯伯子男凡五等之爵其分土則公侯地方百里伯七十里子男五十里為三等之制其不能五十里者附於諸侯曰附庸九州之地各方千里州建二百一十國天子之縣内建九十三國而附庸不與焉千里之外設方伯五國以為屬屬有長十國以為連連有帥三十國以為卒卒有正二百一十國以為州州有伯八州八伯五十六正百六十八帥三百三十六長八伯各以其屬屬於天子之老二人分天下以為左右曰二伯其縣内諸侯選賢以置於位食其國禄而不得世外諸侯以功而封象賢繼立周承商制所封凡八百國同姓五十有餘所以親親賢賢褒美功徳播於雅頌闗諸盛衰深根固本為不可㧞者也幽平之後日以陵替分為二周天下謂之共主諸侯雖强大猶不敢窺周鼎盖枝葉相持藩垣外固繇制法於在昔得長世之善經而使之然也故仲尼之刪定典籍約史記以脩春秋丘眀受經垂諸𫝊述其槩見之大國者周公之子伯禽封曲阜為魯侯武王之子唐叔虞封太原為晉侯文王之子四人康叔封朝歌為衛侯度封上蔡為蔡侯又振鐸之後封陶丘為曹伯繡之後封滕為滕侯宣王母弟友封鄭為鄭伯召公奭之後封薊為北燕伯仲雍之孫周章封吳為吳子太公望之後封營丘為齊侯有熊之曽孫熊繹封丹陽為楚子非子之後封岐之地為秦伯紂兄微子封商丘為宋公胡公封陳為陳侯伯夷之後封許為許男少昊之後封莒為莒子顓頊之後封邾為邾子又别封邾侠之後居郳為小邾子夏禹之後封杞為杞伯少康之後封㑹稽為越子凡大國二十其薛伯虞公虢公紀侯邢侯息侯郕伯鄧侯賈伯隨侯梁伯徐子鄶子沈子䢵子唐侯胡子鄅子南燕伯宿男夔子巴子州公宗子郜子穀伯荀侯賴子譚子滑伯舒子弦子須句子頓子麋子郯子黎侯偪陽子鍾吾子凡三十九國又紀芮東虢蕭莱羅夷管凡八國亡其爵其小國凡四十七焉又有申共向極戴魏遂鄣黄貳軫州絞六葛於餘丘蓼牟權霍耿陽江冀舒蓼巢道柏厲微項箕崇英顓臾寗雍任鄷𣆀邘畢黎昆吾茅應鄀寒鄫蔣根牟胙郇瑕有莘闞鞏介斟灌偪過庸邿爽鳩焦鄟邶有鬲庸斟尋豳戈韓鑄楊邳觀褒姺緍豕韋岐仍商奄駘房大庭亳桐宻須窮桑封父甲父凡九十四國但存爵號而無世次其間亦有虞夏商周之所封皆春秋之攸著者也當其各受分土保有疆域嵗時述職率遵王命洎周徳微弱國綱寖弛而猶五伯更起迭主夏盟尊奬徵討存亡繼絶政令有所禀小陋頼其庇既而霸道交䘮庶邦力攻上有虚位之耻下無方伯之勢强弱相吞莫知能救春秋之後其存者魯衛齊楚宋鄭燕秦趙魏韓中山凡十二國焉其後楚考烈王滅魯頃公遷於卞遂為家人而魯絶祀秦徙衛元君於野王而并其地為東郡不得列於諸侯齊湣王與楚伐宋殺王偃滅宋而三分其地韓哀侯滅鄭而併其國魏文侯使樂羊㧞中山凡亡五國其存者秦楚燕魏韓齊趙七國而已終為秦所併焉今之所紀自春秋以来列國君臣善敗之跡訖於七國為列國君部凡四十門建國錫命奉先建國古者並建諸侯以承天子所以尊宗廟重社稷也自黄帝之畫野分州得百里之國萬區盖封建之舊制矣然而史氏闕紀莫得而詳爰及姬氏周監於二代乃設五等之爵為九服之辨列樹勲戚作深根固本之計重之以分器祚之以世族大者著乎賜履小亦僅乎一同藩屏輔衛於是乎在至於建侯裂壤以申畫郊圻燾土立疆而肇建宗祀職方之志斯著輿地之圗足徵故始封遷卜之諸侯以詳述之矣吳太伯之犇荆蠻自號勾吳及周武王克殷求太伯仲雍之後得周章已君吳因而封之乃封周章弟虞仲於周之北故夏虚在河東大陽縣是為虞仲列為諸侯魯周公旦武王弟也周公佐武王破殷封旦於少昊之虚曲阜是為魯公不就封周公卒子伯禽因以前受封是為魯公燕召公奭與周同姓姓姬氏周武王之滅紂封召公於北燕有南燕故云北燕居廣陽薊縣管叔鮮周文王子而武王弟也武王克殷紂平天下封叔鮮於管今滎陽京縣東北管城蔡叔度周文王子而武王弟也武王克殷平天下封叔度於蔡初居上蔡蔡平侯徙新蔡並汝南縣也後二世殺上蔡衛康叔名封周武王同母少弟成王伐殷殺武庚禄父管叔放蔡叔以武庚殷餘民封康叔為衛君居河淇間故商墟衛成公自楚丘徙濮陽鄶故國今滎陽宻縣東北鄶城唐叔虞者周武王子成王弟成王封叔虞於唐唐在河汾之東方百里故曰唐叔虞都於冀世本曰居鄂宋志曰鄂地今在大夏昭侯封文侯弟成師於曲沃是為曲沃桓叔武公後併晉地而有之鄭桓公友宣王庶弟年表云母弟宣王立二十二年初封於鄭地里志云京兆鄭桓公封於此問太史伯曰王室多故予安逃死乎對曰獨雒之東土河濟之南可居桓公卒言王東徙其民雒東而虢鄶果獻十邑十邑謂虢鄶鄢蔽補丹依㽥歴莘竟國之今河西新鄭也曹姬姓文王子叔振鐸之後武王封之陶丘今濟隂定陶滕姬姓周文王子叔繡之後武王封之居滕今沛郡公丘縣虢姬姓文王弟虢仲之後治今𢎞農陕縣應周武王弟所封今在潁川城父應鄉又左傳云邘晉應韓武之穆也此則應為武王之子魏姬姓國史不載所封為誰其地虞舜夏禹所都之域在古冀州雷首之北析城之西南沈河曲北渉汾水後為晉所滅其後晉獻公滅魏以封畢萬萬從其國為魏氏文公時為列大夫魏悼子徙治霍晉悼公時魏昭子徙治安邑其後恵王徙治大梁畢萬之先畢公髙與周同姓武王伐紂髙封於畢畢在長安縣西耿姬姓國平陽皮氏縣東南有耿鄉為晉所滅趙氏之先造父幸於周繆王賜以趙城繇此為趙氏叔帶去周事晉始建趙氏於晉國地理志河東永安故地周穆王封造父之趙城晉獻公滅耿以賜趙夙至浣自耿徙中牟至敬侯始都邯鄆韓氏之先與周同姓其後裔事晉封於韓原周末韓景侯自新鄭徙陽翟齊太公望其先祖虞夏之際封於吕吕在南陽宛縣西或封於申姓姜氏佐周武王伐商封於齊營丘其後獻公因徙薄姑都治臨淄田完初自陳奔齊始食采於田故為田氏其後以田常彊盛割齊自安平土以東至瑯琊自為封邑至田和并有齊國為諸侯楚熊繹芈氏周成王舉文武勤勞後初封於楚蠻以子男之田居丹陽在南郡枝江縣其後文王熊貲始都郢襄王横為秦所敗東北保於陳城考烈王東徙都夀春秦非子初居犬丘周孝王分土為附庸邑之秦今天水隴西縣秦亭是者也後世秦襄公以兵送周平王徙雒邑平王賜之岐以西之地於是始得國公初居雍城獻公城櫟陽而都之今萬年是也孝公十二年作為咸陽築冀闕徙都之杞夏禹之後周武王克殷紂求禹之後得東樓公封之於杞杞今陳留雍丘越其先夏少康之庶子封於㑹稽以奉守禹之祀陳胡公滿者虞帝舜之後姓媯氏周武王克殷乃求舜後得媯滿封之於陳宋㣲子啟者殷帝乙之首子紂之庶兄也成王誅武庚殺管叔放蔡叔乃命微子啟代殷後國於宋都商丘大辰之墟今梁國睢陽許姜姓堯四岳伯夷之後武王封其苖裔文叔於許今潁川許昌是靈公徙葉悼公遷於夷一名城父又居析一名白羽許男斯處容城莒嬴姓少昊之後武王封兹輿於莒初都計斤後徙莒今城陽莒縣計斤今春秋所謂介根邾國曹姓顓頊之後武王封其苖裔邾侠為附庸居邾邾今魯國鄒縣也文公徙於繹小邾邾侠後夷父顔有功其子友别封附庸居東平昌盧東北郳城共國汲郡共縣宿國東平無鹽縣任姓中山國南陽宛縣夷國城陽莊武縣所治夷女城向國龍元縣東向城姜姓炎帝後南燕國東郡燕縣姬姓黄帝後凡國汲郡共縣東南凡城戴國陳留外黄縣東南戴城息國汝隂新息縣故息國東徙故加新郜國濟隂城武縣東南北郜城芮國漢之馮翊臨晉魏之河東河北縣芮鄉郯國東海郯縣盈姓州國東莞淳于縣又州國南郡華容縣東南州陵城榖國南陽筑陽縣榖城巴國巴郡江州縣廖國儀陽棗陽縣東南湖陽城後廖國亦作風羅國南郡宜城縣西山後徙南郡枝江縣牟國泰山牟縣魯附庸葛國梁郡寜陵縣東北葛鄉譚國濟南平陵縣西南譚城蕭國沛郡蕭縣故蕭叔國宋别封附庸隧國濟北虵丘縣東北遂鄉滑國都費在河南緱氏縣權國南郡當陽縣東南權城鄣國東平無鹽縣東北鄣城霍國平陽永安縣東北霍太山江國汝南安陽江亭冀國平陽皮氏縣東北冀亭弦國弋陽軑縣東南弦亭一云在江夏軑道國汝南陽安縣南道亭栢國汝南西平縣栢亭微國東平夀張縣西北微鄉繒國琅邪繒縣禹後厲國儀陽遂陽縣北厲鄉厲讀曰頼項國汝隂項縣宻國滎陽宻縣姬姓之國也顔師古謂此宻即春秋僖六年圍商宻者也詩所云宻人即左傳所謂宻須之鼔者也在安定隂宻任國東平任城縣須句國東平須昌縣西北句城風姓太昊後顓㬰國泰山南陽縣東北顓㬰城頓國汝南南頓縣頓子姬姓頓廹於陳其後南徙故號南頓雍國河内山陽西雍城畢國京兆長安縣西北豐國始平鄠縣東豐邑臺邢國河内野王縣西北邢城姬姓應國襄城城父縣西南應城蔣國弋陽期思縣蔣鄉城茅國髙平昌邑縣西北茅鄉城胙國東郡燕縣東北胙城夔國建平秭歸縣介國城陽黔陬縣焦國𢎞農陕縣故焦城鄧國南郡鄧縣鄧侯國鄾國南陽鄧鄾縣聚古鄾國歸國南郡秭歸歸鄉䢵國南郡軑東南􅳡城鄖國南郡雲杜鄖城廬國廬江郡故廬子國下邳國東海郡下邳邳初在薛其後徙師故曰下邳鍾離國九江郡古鍾離子邑過當國樂安夀光過鄉州莱國沛郡下蔡淳于國北海淳于鼓國鉅鹿郡下曲陽鼓聚故翟鼓子國肥國泰山肥城又云淄川劇故肥國今肥亭是肥國鉅鹿郡下曲陽西南肥累城古肥國白狄别種後奔燕封於遼西郡肥如鑄國濟北宛丘鑄鄉堯後周武王所封紀國北海劇紀亭棠國北海郡即墨棠鄉夷國北海郡壯武莱國東莱郡鄅國東海郡開陽徐國臨淮郡徐盈姓無終國右北平無終朝鮮國樂浪郡朝鮮周武王封箕子鮮虞國中山國新市陽國城陽都陽城邳國梁國榖熟邳亭沈國汝南平輿沈亭蓼國廬江蓼臯繇後六國廬江六縣臯繇後姬姓巢國廬江六縣居巢城根牟國瑯邪陽都縣東牟鄉城唐國義陽安昌縣東南上唐鄉唐國又在太原晉陽縣黎國上黨壺闗縣黎亭郇國河東解縣西北郇城鬲國平原鬲縣斟國北海郡斟禹後斟灌國樂安夀光縣東南灌亭禹後斟尋國北海郡平夀縣東南斟亭禹後過國東南莱掖縣北過鄉戈國宋鄭之間有戈邑偪陽國彭城傅陽縣妘姓邿國任城亢父縣詩亭邿亦作詩杜國京兆杜縣楊國平陽楊縣豳國新平漆縣東北邠城觀國頓丘衛縣姒姓黄國汝南弋陽北黄城房國汝南吳房本房子國楚靈王遷房於楚後封吳闔閭弟夫槩故曰吳房胡國汝陽縣西北胡城黎國汝南魏郡黎陽縣或云東夷國又漢書地理志黎侯國上黨壺闗宻須國安定隂宻甲父國髙平昌邑縣東南甲父亭梁國伯翳之後與秦同祖秦取梁改曰夏陽今馮翊夏陽是也鍾吾國在東海司吾左傳曰吾執鍾吾子桐國廬江舒縣西南桐鄉荀國河東荀城古荀國以下並古國潞國上黨潞即潞子國虢國榮陽河南虢亭程國河南雒陽上程聚古程國重黎之後伯休甫之國闗中又有程聚文王居程徙都豐故名為上程鞏國河南鞏縣即鞏伯國豕韋國東郡白馬韋鄉古豕韋氏之國塗山國九江當塗禹所娶塗山國有禹墟寒國北海郡平夀寒亭寒浞所封令支國遼支令西孤竹城故伯夷國防風國吳興武康奚仲國魯國薛後遷於邳陽彭祖國彭城奄國魯古奄國錫命天子建徳昭乎利用諸侯正封是為述職稽茂勲之允格故殊命之乃錫粤若厲階斯作得専四履之征外虞以寜始重一卣之錫其或紹休前烈厥政用舉納忠王室多儀克享肇啓公侯之土綽著兵戰之績繇是申之豐報昭其寵數嘉言淑令藹諸簡冊至於博選盛族欽成姻好兹率厥典恢纂舊服非有私於名器實攸頼其夹輔者爾齊太公周成王時管蔡作亂淮夷叛周乃使召康公召公奭命太公曰東至海西至河南至穆陵北至無棣是皆太公始受封土地疆境所至也五侯九伯實得征之五等諸侯九州之伯皆得征討其罪繇此得征伐為大國晉文侯周平王錫以秬鬯圭瓉以圭為杓柄謂之圭瓉作文侯之命幽王為犬戎所殺平王立而東遷雒邑晉文侯迎逆安定之故錫命焉王若曰父義和順其功而命之文侯同姓故稱曰父義和字也丕顯文武克慎眀徳大眀乎文王武王之道能詳審顯用有徳昭升於上敷聞在下惟時上帝集厥命於文王言文王聖徳眀升於天而布聞在下民惟以是故上天集成其王命徳流子孫亦惟先正克左右昭事厥辟言君既聖眀亦惟先正官賢臣能左右眀事其君所以然越小大謀猷罔不率從肆先祖懐在位言文王君聖臣良於小大所謀道徳天下無不循從其化故我後世先祖歸在王位嗚呼閔予小子嗣造天丕愆言我小子之遭天大罪過父死國敗祖業隤隕殄資澤於下民侵戎我國家純言周邦䘮亂絶其資用恵澤於下民侵兵傷我國其禍甚大即我御事罔或耆夀俊在厥服予則罔克所以遇禍即我治事之臣無有耆宿夀耉俊徳在其服位我則材劣無能之致曰惟祖惟父其伊恤朕躬嗚呼有績予一人永綏在位王曰同姓諸侯在我惟祖惟父列者其惟當憂念我身嗚呼能有成功則我一人長安在王位言恃諸侯父義和汝克昭乃顯祖重稱字親之不稱名尊之言汝能眀汝顯祖唐叔之道奬之汝肇刑文武用㑹紹乃辟追孝於前文人言汝今始法文武之道矣當用是道合㑹繼汝君以善使追孝於前文徳之人汝君平王自謂也繼先祖之志為孝汝多脩扞我於艱若汝予嘉戰功曰多言汝之功多甚脩矣乃扞我於艱難謂救周誅犬戎汝功我所嘉王曰父義和其歸視爾師寜爾邦遣令還晉國其歸視汝衆安汝國内上下用賚爾秬鬯一卣黒黍曰秬醸以鬯草不言圭瓉可知卣中罇也當以錫命告其始祖故錫鬯彤弓一彤矢百盧弓一盧矢百彤赤盧黒也諸侯有大功賜徳弓矢然後專征伐彤弓以講習射藏示子孫馬四匹馬供武用四匹曰乘侯伯之賜無常以功大小為度父徃哉柔逺能邇恵康小民無荒寜父徃歸國哉懐柔逺人必以文徳能柔逺者必能柔近然後國安安小人之道必以順無荒廢人事而自安簡恤爾都用成爾顯徳當簡核汝所自治都鄙之人人和政治則汝顯用有徳之功成矣不言鄙繇近以及逺韓侯宣王時錫命尹吉甫作韓奕以美之曰王錫韓侯淑旂綏章簟笰錯衡𤣥衮赤舄鉤膺鏤錫鞹鞃淺幭鞗革金厄淑善也蛟龍為旂綏大綏也錯衡文衡鏤錫有金鏤其錫也鞹革也鞃軾中也淺虎皮淺毛也幭覆式也厄烏蠋也簟笰漆簟以為車蔽今之藩也鉤膺樊纓也眉上曰錫刻金飾之今當盧也鞗革謂轡以金為小環徃徃纒搤之又曰以先祖受命因時百蠻王錫韓侯其追其貊奄受北國因以其伯韓侯之先祖武王之子也因時百蠻長是蠻服之百國也追貊戎狄國也奄撫也韓侯先祖有功徳者受先王之命封為韓侯為侯伯其州界外接蠻服因得使時節百蠻貢獻之徃来後君微弱用失其業今王以韓侯先祖之事如是而韓侯賢故於入覲使復其先祖之舊職錫之蠻服追貊之戎狄令撫柔其所受王畿北面之國因以其先祖侯伯之事盡予之皆美其為人子孫能興復先祖之舊功楚成王惲即位布徳施忠結舊好於諸侯周恵王五年使人獻天子天子錫胙曰鎮爾南方夷越之亂無侵中國齊桓公恵王十年王使召伯廖賜齊侯命召伯廖王卿士賜命為侯伯王欽若等曰齊侯桓公也襄王元年桓公葵丘之㑹天子使宰孔致胙於桓公宰孔宰周公也曰余一人之命有事於文武使孔致胙且有後命曰以爾自卑勞謂爾伯舅無下拜天子稱王官之伯異姓曰伯舅無下拜無下堂拜賜也桓公召管子而謀管子對曰為君不君為臣不臣亂之本也桓公懼出見客曰天威不違顔咫尺違逺顔眉目之間八寸曰咫小白余敢承天子之命曰爾無下拜恐隕越於下以為天子羞遂下拜升受命賞服大輅龍旗九旒渠門赤旂大輅諸侯朝服之車謂金輅鈎樊纓九就龍旗九旒也渠門亦旂名建為軍門若今牙門赤大旂諸侯稱順焉晉恵公襄王二年王使召武公内史過賜晉侯命召武公周卿士内史過周大夫諸侯即位天子賜之命圭為瑞王欽若等曰魯僖公十一年也晉侯晉恵也文公襄王二十年獻楚俘於王駟介百乘徒兵千駟介四馬被甲徒兵歩卒鄭伯傅王用平禮也傅相也以周平王享晉文侯仇之禮享晉侯己酉王享禮命晉侯宥既饗又命晉侯助以束帛以將厚意王命尹氏及王子虎内史叔興父䇿命晉侯為侯伯以䇿書命晉侯為伯也周禮九命作伯尹氏王子虎皆王卿士也叔興父大夫也三官命之以寵晉賜之大輅之服戎輅之服大輅金輅戎輅戎車二輅各有服彤弓一彤矢百玈弓一玈矢千彤赤弓玈黒弓弓一矢百則矢千弓十矣諸侯賜弓矢然後専征伐秬鬯一卣秬黒黍鬯香酒所以降神卣器名虎賁三百人曰王謂叔父敬服王命以綏四國糾逖王慝逖逺也有惡於王者糾而逺之晉侯三辭從命曰重耳敢再拜稽首奉揚天子之丕顯休命稽首首至地丕大也休美也受䇿以出魯文公襄王二十六年公即位天王使毛伯来錫公命毛國伯爵諸侯為王卿士者成公八年秋簡王三年也天子使召伯来錫公命諸侯即位天子賜以命圭與之合瑞八年乃来緩也天子天王王者之通稱齊靈公靈王十三年王使劉定公賜齊侯命將昏於齊故也定公劉夏位賤以能而使之傳稱諡舉其終曰昔伯舅太公右我先王股肱周室師保萬民世胙太師以表東海胙報也表顯也謂顯封東海以報太師之功王室之不壞繄伯舅是頼繄發聲今余命汝環環齊靈公名兹率舅氏之典纂乃祖考無忝乃舊敬之哉無廢朕命纂繼也因昏而加褒顯也傳言王室不能命有功越王句踐已平吳乃以兵北渡淮與齊晉諸侯㑹於徐州致貢於周元王使人賜句踐胙命為伯秦孝公十九年顯王二十六年也天子致胙諸侯畢賀奉先夫祀者國之大事孝者人之本與邦君敦行史册垂美譬諸善政尤為盛烈奉先之誠不匱昭享之義有叙惟馨之薦豐而且潔非有諂也致美之服章而有量不圗奢也然後能保其社稷和其民人盖諸侯之孝也魯隠公五年九月考仲子之宫初獻六羽成仲子之宫安其主而祭之恵公以仲子手文而娶之欲以為夫人諸侯無二嫡盖隱公成父之志為别立宫也公問羽數故書羽婦人無諡因姓以名宫初仲子宫成將萬焉萬舞也公問羽數於衆仲問執羽人數對曰天子用八八八六十四人諸侯用六六六三十六人大夫四四四十六人士二二二四人士有功賜用樂夫舞所以莭八音而行八風八音金石絲竹匏土革木也八風八方之風也以八音之氣播八方之風手之舞之足之蹈之莭其制而叙其情故自八以下惟天子得盡物數故以八為列諸侯則不敢用八公從之於是初獻六羽始用六佾也魯惟文王周公廟得用八而他公遂因僭而用之今隱公特因此婦人之廟詳問衆仲因眀大典故言始用六佾桓公八年五月丁丑蒸十四年八月壬申御廪災御廪蔵公所親耕以奉粢盛之倉也天火曰災乙亥嘗既戒日致齋御廪雖災茍不害嘉榖則祭不應廢故書以示法僖公八年七月禘於太廟用致夫人禘三年大祭之名太廟周公之廟致者致新主於廟而列之昭穆夫人姜氏預弑薨於寢僖公疑其禮歴三禘今果行之公能復周公之宇宇居也故魯頌閟宫有侐實實枚枚閟閉也先妣姜嫄之廟孟仲子曰是禖宫也侐清浄也實實廣大也枚枚礱宻也一云閟神也姜嫄神所依故廟曰神宫周公之孫莊公之子龍旂承祀六轡耳耳春秋匪懈享祀不忒周公之孫莊公之子謂僖公也耳耳然至盛也交龍為旂承祀謂視祭祀也四馬故六轡春秋猶言四時忒變二十四年二月晉公子文公入于晉丁未朝于武宫文公之祖武公廟文公二年二月丁丑作僖公主主者殷人以栢周人以栗三年喪終則遷入於廟傳云過葬十月而作主書其不時宣公八年六月辛巳有事於太廟公子遂卒於垂齊地名壬午猶繹萬入去籥繹眀日又祭萬舞名籥管也猶可止之辭魯人知卿佐之䘮不宜作樂而不廢繹故萬舞去籥成公三年二月甲子新宫災三日哭宣公新神主入廟故謂之新宫書三日哭善得禮宗廟親之神靈所憑居而遇災故哀而哭之十八年晉悼公立正月辛巳朝武宫武宫曲沃始命君襄公十六年晉平公即位烝于曲沃悼公既葬平公改服曲沃晉祖廟烝冬祭也諸侯五月而葬作主然後烝嘗於廟今晉踰月葬作主而烝祭傳言晉將有盟㑹故速葬昭公元年十二月晉烝烝冬祭也十五年二月癸酉禘於武宫魯武公廟成公立六年復立之叔弓涖事籥入而卒去樂卒事禮也大臣卒故為之去樂定公八年冬從祀先公從順也先公閔公僖公將正二公之位次所順非一親盡故通言先公冊府元龜卷二百三十五
