body:
  text: 册府元龜卷五百六十一宋王欽若等撰國史部世官自序世官載筆之任本乎司厯克善厥職遂世其官自南北重黎二正是典羲和仲叔四時分命周世文治簡求嗣掌諸侯司籍亦所圗任兩漢累盛九州洞别遷固父子時推其長魏晉而下撰續不絶葢亦著作之重貴乎専門用能論次舊聞申明先業敷述雅志自成一家者矣堯命羲和欽若昊天厯象日月星辰敬授人時重黎之後羲氏和氏世掌天地四時之官故堯命之臣欽若等按左氏傳重少皥之弟黎顓頊之子至於夏商重黎氏世序天地周司馬氏世典周史籍伯黶為晉正卿司晉之典籍以大政故曰籍氏及辛有之二子董之晉於是有董史董督晉典漢司馬談武帝元鼎末為太史令子遷為郎中是時天子始建漢家之封而太史公留滯周南周南洛陽也雒陽而謂周南者自陜以東皆周南之地也臣欽若等曰太史公談也遷之自序不斥其父名不得與從事發憤且卒而子遷適反見父於河雒之間太史公執遷手而泣曰予先周室之太史也自上世嘗顯功名虞夏典天官事後世中衰絶於予乎女復為太史則續吾祖矣今天子接千載之統封泰山而予不得從行是命也夫命也夫余死汝必為太史為太史毋忘吾所欲論著矣且夫孝始於事親中於事君終於立身揚名於後世以顯父母此孝之大也夫天下稱周公言其能論歌文武之徳宣周召之風逹太王王季思慮爰及公劉以尊后稷也幽厲之後王道缺禮樂衰孔子修舊起廢論詩書作春秋則學者至今則之自獲麟以來四百有餘嵗諸侯相兼史記放絶今漢興海内一統明主賢君忠臣義士予為太史而不論載廢天下之文余甚懼焉汝其念哉遷俯首流涕曰小子不敢請悉論先人所次舊聞弗敢闕卒三嵗而遷為太史紬紬音抽史記石室金匱之書後漢班彪光武時為司徒掾才髙而好述作遂専心於史籍之間武帝時司馬遷著史記自太初以後闕而不録彪乃繼採前史遺事傍貫異聞作後傳數十篇因斟酌前史而譏正得失彪卒子固以彪所續前史未詳乃潛精研思欲就其業既而有人上書明帝告固私改作國史者有詔下郡收固繫京兆獄盡取其家書弟超恐固為郡所覈考不能自明乃馳詣闕上書得召見具言固所著述意而郡亦上其書帝甚竒之召詣校書郎除蘭䑓令史與前睢陽令陳宗長陵令尹敏司𨽻從事孟異共成世祖本紀又撰功臣平林新市公孫述事作列傳載記三十八篇奏之帝乃復使終成前所著書晋華嶠為祕書監撰後漢書十典未成而終秘書監何劭奏嶠中子徹為佐著作郎使踵成之未竟而卒後監繆徽又奏嶠少子暢為佐著作郎克成十典并草魏晋紀傳與著作郎張載等俱在史館永嘉䘮亂經籍遺没嶠書存者五十餘卷南齊賈淵祖弼之父匪之世傳譜學太祖宋昇明中嘉淵世學取為驃騎参軍竟陵王子良使淵撰見客譜出為句容令先是譜學未有名家淵祖弼之廣集百氏譜記専心治業晋太元中朝廷給弼之令史書吏撰定繕寫藏秘閣及左民曹淵父及淵三世傳學凡十八州士族譜合百帙七百餘卷該究精悉當世莫比永明中衛軍王儉抄次百家譜與淵参懐撰定梁裴子野為中書侍郎曽祖松之仕宋為大中大夫文帝元嘉中受詔續修何承天宋史未成而卒子野嘗欲繼成先業齊武帝永明末沈約所撰宋書稱松之已後無聞焉子野更撰為宋略二十卷陳陸瓊為給事黄門侍郎領大著作撰國史父雲公仕梁為黄門侍郎掌著作奉梁武勅撰嘉瑞記瓊述其㫖而續焉自永定訖於至徳勒成一家之言姚察為秘書監知撰梁史事入隋為秘書丞别勅成梁陳二代史其中序論及紀傳有所闕者臨亡之時仍以體例誡約子思亷博訪撰續思亷流涕奉行思亷在陳為衡陽王府法曹参軍㑹稽主簿入隋補漢王府行参軍掌記室尋除河間郡司法煬帝大業初中書侍郎虞世基奏思亷踵梁陳二代史自爾以來稍就補續後魏崔光為侍中中書監領著作撰魏史徒有卷目初未考正闕略尤多毎云此史㑹非我世所成但湏記録時事以待後人臨薨言鴻於孝明鴻光弟敬友之子延昌五年正月詔鴻以本官修緝國史鴻又撰十六國春秋勒成百卷後周劉璠為内中大夫撰梁典三十卷始就未及刋定而卒臨終謂子休徴曰能成我志其此書乎休徴治定繕寫勒成一家行於世隋許善心為給事中父亨撰著梁史未就而殁善心述成父志修緝家書唐令狐徳棻髙祖武徳中為秘書丞與侍中陳叔達太史令庾儉同受詔修周史徳棻𤣥孫峘代宗朝楊綰為禮部侍郎修國史引峘入史館修𤣥宗寳録一百卷代宗實録四十卷李延夀為東宫典膳丞父太師少有著述之志嘗以宋齊梁陳齊周隋南北分隔南書謂北為索虜北書指南為島夷書本國周悉别國未能備往往失實将擬吳越春秋編年以備南北所撰未畢而卒延夀以太宗貞觀中依司馬遷體以次連綴之始末修撰凡十六載為北史南史二書合一百八十卷劉子元則天長安中為左史兼修國史子貺為起居郎修國史弟諫右補闕集賢殿學士修國史歸崇敬字正禮𤣥宗天寳末為起居郎兼史館修撰子登徳宗貞元中為兵部員外郎史館修撰栁芳為右司郎中集賢學士精於譜學永㤗中按宗正譜牒自武徳已來宗枝昭穆相承撰皇室譜二十卷號曰永泰新譜自後無人修續芳孫璟開成初為翰林學士因召對言及圗譜事文宗曰卿祖嘗為皇家圗譜朕昨觀之甚為詳悉卿檢永泰後試修續之璟依芳舊式續武徳後事成十卷以附前譜沈既濟徳宗貞元中為史館修撰建中實録十卷文宗太和初子傳師繼修憲宗實録未竟出鎮湖南特詔成於理所時論榮之自序自司馬談父子續先業齊世傳為之史記以成一家之言及其斷章自叙發明其族系稽古立論揚𣙜其官守詮擇文理之要區别祖述之㫖亦云備矣班范而降遵用舊式至於世胄之源派篹次之模楷似續之憑厚㳂襲之殊軌悉可徴焉然其講世徳叙家範亦不能無虚美者矣漢司馬遷字子長撰史記其自序曰昔在顓頊命南正重以司天北正黎以司地唐虞之際紹重黎之後使復典之至於夏商故重黎氏世序天地其在周程伯休甫其後也封為程國伯休甫字也當周宣王時失其守而為司馬氏司馬氏世典周史惠襄之間司馬氏去周適晋周惠王襄王有子頺叔帶之難故司馬氏奔晋晋中軍隨㑹奔秦而司馬氏入少梁自司馬氏去周適晋分散或在衛或在趙或在秦其在衛者相中山名喜在趙者以傳劍論顯傳謂手摶論而知名史記吳起賛曰非言仁亷勇不能傳劍論兵書也蒯聵其後也在秦者名錯與張儀爭論於是惠王使錯將伐蜀遂拔因而守之守郡守也錯孫靳一作蘄事武安君白起而少梁更名曰夏陽靳與武安君阬趙長平軍還與之俱賜死杜郵葬於華池地名在鄠縣靳孫昌又為秦王鐵官當始皇之時蒯聵𤣥孫卬為武信君將張耳傳云武臣自號武信君而徇朝歌諸侯之相王王卭於殷漢之伐楚卬歸漢以其地為河内郡昌生無澤無澤為漢市長無澤生喜喜為五大夫卒皆葬髙門長安北門也喜生談談為太史公漢儀注太史公武帝置位在丞相上天下計書先上太史公副上丞相一云百官表無太史公司馬談以太史丞為太史令太史公學天官於唐都受易於楊何淄川人習道論於黄子儒林傳云黄生好黄老之術太史公仕於建元元封之間既掌天官不治民有子曰遷遷生龍門在馮翊夏陽縣禹所鑿龍門也耕牧河山之陽年十嵗則誦古文二十而南逰江淮上㑹稽探禹穴禹廵㑹稽上有孔穴云禹入此穴闚九疑浮於沅湘北渉汶泗講業齊魯之都觀孔子之遺風鄉射鄒嶧戹囷鄱薛彭城嶧縣名有山鄱鄒薛三縣屬魯過梁楚以歸於是遷仕為郎中奉使西征巴蜀以南略卭笮昆明還報命是嵗天子始建漢家之封而太史公留滯周南今之雒陽不得與從事故發憤且卒而子遷適使反見父於河雒之間太史公執遷手而泣曰余先周室之太史也自上世嘗顯功名於虞夏典天官事後世中衰絶於予乎汝復為太史則續吾祖矣今天子接千嵗之統封泰山而余不得從行是命也夫命也夫余死汝必為太史為太史無忘吾所欲論著矣且夫孝始於事親中於事君終於立身揚名於後世以顯父母此孝之大者夫天下稱誦周公言其能論歌文武之徳宣周召之風逹太王王季之思慮爰及公劉以尊后稷也幽厲之後王道缺禮樂衰孔子修舊起廢論詩書作春秋則學者至今則之自獲麟以來四百有餘嵗案年表魯哀公十四年獲麟至漢元封元年三百七十一年而諸侯相兼史記放絶今漢興海内一統明主賢君忠臣死義之士余為太史而弗論載廢天下之史文余甚懼焉汝其念哉遷俯首流涕曰小子不敏請悉論先人所次舊聞弗敢闕卒三嵗而遷為太史令紬史記石室金匱之書五年而當太初元年十一月甲子朔旦冬至天厯始改建於明堂諸神受紀言告於百神與天下更始著紀於是太史公曰先人有言自周公卒五百嵗而有孔子孔子卒後至於今五百嵗有能紹明世正易傳繼春秋本詩書禮樂之際意在斯乎意在斯乎小子何敢讓焉上大夫壺遂曰昔孔子何為而作春秋哉太史公曰余聞董生曰周道衰廢孔子為魯司冦諸侯害之大夫壅之孔子知言之不用道之不行也是非二百四十二年之中以為天下儀表貶天子退諸侯討大夫以達王事而已矣子曰我欲載之空言不如見之於行事之深切著明也夫春秋上明三王之道下辯人事之紀别嫌疑明是非定猶豫善善惡惡賢賢賤不肖存亡國繼絶世補敝起廢王道之大者也易著天地隂陽四時五行故長於變禮經紀人倫故長於行書記先王之事故長於政詩記山川谿谷禽獸草木牝牡雌雄故長於風樂樂所以立故長於和春秋辯是非故長於治人是故禮以節人樂以發和書以道事詩以達意易以道化春秋以道義撥亂世反之正莫近於春秋春秋文成數萬其指數千萬物之散聚皆在春秋春秋之中弑君三十六亡國五十二諸侯奔走不得保其社稷者不可勝數察其所以皆失其本已故易曰失之毫釐一云差毫釐差以千里一云繆以千里駰按今易無此語易緯有之故曰臣弑君子弑父非一旦一夕之故也其漸久矣故有國者不可以不知春秋前有䜛而弗見後有賊而不知為人臣者不可以不知春秋守經事而不知其宜遭變事而不知其權為人君父而不通於春秋之義者必蒙首惡之名為人臣子而不通於春秋之義者必陷簒弑之誅死罪之名其實皆以為善為之不知其義被之空言而不敢辭趙盾不知討賊而不敢辭其罪也夫不通禮義之㫖至於君不君臣不臣父不父子不子夫君不君則犯臣不臣則誅父不父則無道子不子則不孝此四行者天下之大過也以天下之大過子之則受而弗敢辭故春秋者禮義之大宗也夫禮禁未然之前法施已然之後法之所為用者易見而禮之所為禁者難知壺遂曰孔子之時上無明君下不得任用故作春秋垂空文以斷禮義當一王之法今夫子上遇明天子下得守職萬事既具咸各序其宜夫子所論欲以何明太史公曰唯唯否否唯唯謙應也否否不通者也不然余聞之先人曰伏羲至純厚作易八卦堯舜之盛尚書載之禮樂作焉湯武之隆詩人歌之春秋采善貶惡推三代之徳褒周室非獨刺譏而已也漢興已來至明天子獲符瑞封禪改正朔易服色受命於穆清受天命清和之氣澤流罔極海外殊俗重譯欵塞欵叩也皆叩塞門來服從也又欵寛也籍除守塞者自保不為㓂害請來獻見者不可勝道臣下百官力誦聖徳猶不能宣盡其意且士賢能而不用有國者之耻主上明聖而徳不布聞有司之過也且余嘗掌其官廢明聖盛徳不載滅功臣世家賢大夫之業不述墮先人所言罪莫大焉余所謂述故事整齊其世傳非所謂作也而君比之於春秋謬矣於是論次其文七年天漢三年而太史公遭李陵之禍幽於縲紲乃喟然而歎曰是余之罪也夫是余之罪也夫身毁不用矣退而深惟曰夫詩書隠約者欲遂其志之思也昔西伯拘羑里在湯隂演周易孔子戹陳蔡作春秋屈原放逐著離騷左邱失明厥有國語孫子臏脚而論兵法不韋遷蜀世傳呂覽韓非囚秦説難孤憤詩三百篇大抵賢聖發憤之所為作也此人皆意有所鬰結不得通其道也故述往事思來者於是卒述陶唐以來至於麟止武帝獲麟遷以為述事之端上紀黄帝下至麟止猶春秋止於獲麟者也自黄帝始著十二本紀既科條之矣竝時異世年差不明作十表禮樂損益律厯改易兵權山川鬼神天人之際承敝通變作八書二十八宿環北辰三十輻共一轂承黄帝以下三十世家老子言車三十輻運行無窮以象王者如此運行無窮輔拂股肱之臣配焉忠信行道以奉主上作三十世家扶義俶儻不令已失時立功名於天下作七十列傳凡百三十篇五十二萬六千五百字為太史公書序略以拾遺補藝六藝也成一家之言厥恊六經異傳齊整百家雜語藏之名山副在京師俟後世聖人君子遷没之後文景紀武紀禮書樂書律書漢興已來将相年表日者列傳三王世家龜策列傳靳蒯列傳元成之間楮先生補缺作武帝紀三王列傳言辭鄙陋世家龜策日者非遷本意也後漢班固字孟堅撰漢書其自序曰班氏之先與楚同姓令尹子文後也子文初生棄於楚瞢中而虎乳之瞢雲瞢澤也楚若敖娶於􅳡生鬬伯比若敖卒從其母畜於􅳡滛於䢵子之女生子文焉䢵夫人使棄諸瞢中虎乳之䢵子田見之懼而歸夫人以告遂使收之楚人謂乳為榖謂虎為於莬故名榖於莬字子文楚人謂虎班其子以為號子文之子鬬班亦為楚令尹秦之㓕楚遷晋代之間因氏焉遂以班為姓始皇之末班壹避墬於樓煩鴈門之縣致馬牛羊數千群值漢初定與民無禁當孝惠髙后時以財雄邊國家不設衣服車旗之禁故班氏多財而為邊地之雄豪出入弋獵旌旗皷吹年百餘嵗以夀終故北方多以壹為字者馬邑人聶壹之類也壹生孺孺為任陜州郡歌之孺生長官至上谷守長生回以茂才為長子令上黨之縣回生况舉孝亷為郎積功勞至上河農都尉上河地名農都尉典農事大司農奏課連最入為左曹校尉成帝之初女為偼伃致仕就第貲累千金徙昌陵昌陵後罷大臣名家皆占數於長安占度也自隠度家之口數而著名籍也况生三子伯斿穉伯少受詩於師丹為侍中光祿大夫斿博學有俊才左将軍史丹舉賢良方正以對䇿為議郎遷諫大夫右曹中郎将穉少為黄門郎中常侍方直自守遷廣平王相穉生彪彪字叔皮㓜與從兄嗣共逰學家有賜書内足於財好古之士自逺方至父黨揚子雲以下莫不造門嗣雖修儒學然貴老嚴之術老子荘周也明帝諱荘漢書作嚴叔皮唯聖人之道然後盡心焉年二十遭王莽敗世祖即位於冀州時隗囂據隴擁衆招輯英俊而公孫述稱帝於蜀漢天下雲擾大者連州郡小者據縣邑叔皮著王命論以救時難廼避墬於河西河西大将軍竇融嘉其美徳訪問焉每事皆與典舉茂才為徐令以病去官後數應三公之召仕不為禄所如不合如往也不苟得禄故所往之處不合其意學不為人博而不俗言不為華述而不作有子曰固弱冠而孤永平中為郎典校秘書專篤志於博學以著述為業以為唐虞三代詩書所及世有典籍故雖堯舜之盛必有典謨之篇然後揚名於後世冠徳於百王徳為百王之上故曰巍巍乎其有成功煥乎其有文章此篇論語載孔子美堯之言也漢紹堯運以建帝業至於六世史臣乃追述功徳私作本紀謂武帝時司馬遷作史記編於百王之末厠於秦項之列太初以後闕而不錄故探篹前記綴輯所聞以述漢書起於髙祖終於孝平王莾之誅十有二世二百三十年綜其行事旁貫五經上下洽通固所撰諸表序及志經典之義號為良史為春秋考紀表志傳凡百篇宋范華為宣城太守刪衆家後漢書為一家之作後與孔熈先等謀逆事發繫於獄中與諸甥姪書以自序曰吾狂釁覆滅豈復可言汝等皆當以罪人弃之然平生行已在懐猶應可尋至於能否意中所觧汝等或不悉知吾少懶學問晚成人年三十許正始有向耳自爾以來轉為心化推老将至者亦當未已也往往有微觧言乃不能自盡為性不尋注書心氣惡小苦思便憤悶口機又不調利以此談功至於通觧處皆自得之於胷懐耳文章轉進但才少思難每於操筆其所成篇殆無全稱者嘗耻作文士文患其事盡於形情急於藻義牽其㫖韻移其意雖時有能者大校多不免此累正可類工巧圗繢竟無得也嘗謂情志所托當以意為主以文傳意以意為主則其㫖必見以文傳意則其辭不流然後抽其芬芳振其金石耳此中性情㫖趣千條百品屈曲有成理自謂頗識其數常為人言多不能賞意或異故也性别宫商識清濁斯自然也觀古今文人多不全了此處縱有㑹此者不必從根本中來言之皆有實証非為空談年少中謝莊最有其分手筆差易文不拘韻故也吾思乃無定方特能濟難適輕重所禀之分猶當未盡但多公家之言少於事外逺致以為恨亦由無意於文名故也本未關史書正嘗學其不可觧耳既造後漢轉得統緒詳觀古今著述及詳論殆少可意者班氏最有髙名既任情無例不可甲乙辨後贊於理近無所得唯志可推耳博贍不可及之整理未必愧也吾雜傳論皆有精意深㫖既存裁味故約其辭句至於循吏以下及六夷諸序論筆勢縱放實天下之竒作其中合者往往不减過秦篇嘗共比方班氏所作非但不愧之而已欲遍作諸志前漢所有者悉令備雖事不必多且使見文得盡又欲因事就卷内發論以正一代得失意復未果贊自是吾文之傑思殆無一字空設竒變不窮同含異體乃自不知所以稱之此書行故應有賞音者紀傳例為舉其大略耳諸細意甚多自古體大而思精未若此也恐世人不能盡之多貴古賤今所以稱情狂言耳吾於音樂聴功不及自揮但所精非雅聲為可恨然至於一絶處亦復何異耶其中體趣言之不盡絃外之意虚響之音不知所從而來雖少許處而㫖能無極亦嘗以授人士庶中未有一毫似者此永不傳矣吾書雖小小有意筆勢不快餘竟不成就每愧此名梁沈約字休文撰宋書約稱史臣其自序曰昔少皥金天氏有𦙍子曰昧為𤣥冥師生允格臺駘能業其官帝顓頊嘉之封諸汾川其後四國沈姒蓐黄沈子國今汝平輿沈亭是也春秋之時列於盟㑹晋使蔡伐沈滅之其後因國為氏自兹以降譜諜罔存秦末有沈逞徴丞相不就漢初逞曽孫保封竹邑侯保子遵遷居九江之壽春官至太傅九代孫戎字威卿説降劇賊尹良漢光武封海昏縣侯因避地徙居㑹稽烏程縣之餘不鄉遂世家焉順帝永建九年分㑹稽為吳郡後為郡人吳孫皓寳鼎初分吳郡為吳興復為郡縣人雖邦邑屢改而築室不遷史臣七世祖延始居縣東鄉之博陸里餘烏村王父從官京師義熙十一年高祖賜館於建康都亭里之運卷戎子鄷零陵守第二子滸安平相少子景河間相演之慶之曇懐文其後也滸子鸞鸞子直直子儀少篤學有雄才以儒素自業州郡禮請二府交辟公車徴竝不屈以夀終孫矯字仲恒以節氣立名仕為偏将軍封列侯孫皓時有将帥之稱吳平後不仕卒子陵元帝之為鎮東命為叅軍子延潁川太守子賀南中郎叅軍子警字世眀惇篤有行業謝安命為叅軍甚相敬重警内足於財為東南豪士無進仕意謝病歸安固留不止警子穆夫字彦和少好學王恭命為前軍主簿隆安三年孫恩於㑹稽作亂三吳皆響應穆夫時在㑹稽恩以為餘姚令恩敗警及穆夫遇害穆夫子淵子雲子田子林子淵子字敬深少有志節隨髙祖尅京城封繁峙侯為太尉叅軍雲子元嘉中為太尉叅軍田子字敬先從髙祖尅京城進平京邑封營道侯官至咸陽始平二郡太守林子字敬士少有大度博覽衆書留心文義從髙祖尅京城進平都邑領建熈令封資中侯髙祖踐祚以佐命功封漢夀伯子璞字道真好學不倦善屬文所著文章皆遇亂零落今所餘詩筆雜文凡二十首有子曰約史臣年十三而孤少頗好學雖棄日無功而伏膺不改嘗以晋氏一代竟無全書年二十許便有撰述之意太始初征西将軍蔡興宗為啟眀帝有勅賜許自此迄今年餘二十所撰之書凡一百二十卷條流雖舉而採綴未周永眀初遇盗失第五􅐆建元四年末被勅撰國史永眀三年又忝兼著作郎撰次起居注自此王役無暇復撰五年春又被勅撰宋書六年二月畢功表上之表曰臣聞大禹刋木事炳虞書西伯戡黎功煥商典伏惟皇基積峻帝烈𢎞深樹徳往朝立勲前代若不觀風唐世無以見帝媯之美自非覩亂秦之餘何用知漢祖之業是以掌言未記爰動天情曲詔史官追述大典臣實庸妄文史多闕以兹下才對揚盛㫖是用夕愓載懐忘其寝食者也臣約頓首頓首死罪死罪竊惟宋氏南面承厯統天雖世窮八主年减百載而兵車亟動國道屢屯垂文簡牘事數繁廣若夫英主啟基名臣建績拯世夷難之功配天光宅之運亦足以勒名鍾鼎昭被方策及虐后暴朝前王罕二國釁家禍曠古未書又可以式規萬葉作鑒於後宋故著作郎何承天始撰宋書草立紀傳止於武帝功臣篇牘未廣其所撰志唯天文律厯自此以外悉委奉朝請山謙之謙之孝建初又被詔撰述尋值病亡仍使南臺侍御史蘇寳生續造諸傳元嘉名臣皆具所撰寳生被誅大眀中又命著作郎徐爰因何蘇所述勒為一史起自義旗之初訖於大眀之末至於臧質魯爽王僧逹諸文皆孝武所造自永光以來至於禪讓十餘年中闕而不續一代典文始末未舉但事屬當時多非實録又立傳之方取捨乖衷進由時㫖退傍世情垂之方來難以取信臣今謹更創立製成新史始自義熙肇號終於昇眀三年桓元譙縱盧循馬魯之徒身為晋賊非關後代吳隠謝混郗僧施義止前朝不宜濫入宋典劉毅何無忌魏詠之檀慿之孟昶諸葛長民志在興復情非造宋今竝刋除歸之晋籍臣逺愧南董近謝遷固以閭閻小才述一代盛典属辭比事望古慙良鞠躬跼蹐靦汗亡厝本紀傳繕寫已畢合表志七十卷今謹奏呈所撰諸志湏成續上謹條目録詣省拜表奉書以聞北齊魏收撰後魏書自序曰漢初魏無知封髙良侯子均均子恢恢子彦彦子歆成帝世鉅鹿守乃家焉收祖父悦濟隂守子子建益州刺史風化大行逺近清静俄拜常侍衛尉卿元顥入洛子建擕家居洛南顥平乃就拜驃騎二子收祚收字伯起十五已属文值四方多難時習武事以文才除太學博士永興初遷中書郎出帝狩嵩山之南既寒苦朝野怨嗟帝與從官皆胡服宮人及妃主雜其間竒伎異飾多非禮度收欲言則畏懼欲黙不能已乃上南狩賦以諷武定中以常侍兼著作轉秘書監齊天保三年受詔撰魏史又詔常侍房延祐博士刁柔裴昻之尚書郎髙孝幹等共緝成紀傳隋許善心為給事中父亨撰著梁史未就而殁善心述成父志修緝家書其序傳末述製作之意曰謹按太素將萌洪荒初判乾儀資始辰象所以正時坤載厚生品物於焉播氣参三才而育徳眷二統而降靈有人民焉樹之君長有貴賤矣為之宗極保上天之睠命應下土之樂推莫不執大方振長策感召風雲驅馳英俊干戈揖讓取之也殊功鼎玉龜符成之也一致革命創制行素之道稍章紀事記言筆墨之官漸著炎農以往存其名而漏其迹黄軒以來晦其文而顯其用登邱納麓具訓誥及典謨貫昴入房傳夏正與殷祀洎辨方正位論時訓功南北左右兼四方之别檮杌乘車擅一家之稱國惡雖諱君舉必書故賊子亂臣天下大懼元龜眀鏡昭然可察及三郊逓襲五勝相㳂俱稱百谷之王並以四海自任重光累徳何世無哉逮有梁之君臨天下江右建國莫斯為盛受命在於一君繼統傳乎四王克昌四十八載餘祚五十六年武皇帝出自諸生爰升寳歴拯百王之弊救萬民之危反澆季之末流登上皇之獨道朝多君子野無遺賢禮樂必備憲章咸舉𢎞深慈於不殺濟大忍於無形蕩蕩巍巍可為稱首屬隂戎入潁羯胡侵雒沸騰惨黷三季所未聞掃地滔天一元之巨厄廊廟有序剪成狐兎之塲珪帛有儀碎夫犬羊之手福善積而身禍仁義在而國亡豈天道歟豈人事歟嘗别論之在序論之卷先君昔在前代早懐述作凡撰齊書為五十卷梁書紀傳隨事勒成及闕而未就者目録注為一百八卷梁室交䘮墳籍銷盡家壁皆殘不韋無所盗帷囊同毁陳農何以求秦儒既拒先王之道将墜漢臣徒請口授之文亦絶所撰之書一時亡散有陳初建詔為史官補闕拾遺心識口誦依舊目録更加修撰且成百卷已有六秩五十八卷上祕閣訖善心早嬰荼蓼弗荷薪搆太建之末頻抗表聞至德之初蒙授使任方願油素採訪門庭記録俯勵弱才仰成先志而單宗少強近虚室類原顔退屏無所交㳺棲遲不求進益假班嗣之書徒聞其語給王隠之筆未見其人加以庸璅凉能孤陋末學忝職郎署兼撰陳史致此書延時未即成績禎眀二年以臺郎入聘值本邑淪覆他鄉播遷行人失時将命不復望都亭而長慟遷别館而懸壺家史舊書在彼焚蕩今止有六十卷在又竝缺落失次自入京以來隨見補葺畧成七十卷四帝紀八卷后妃一卷三太子録一卷為一秩十卷宗室王侯列傳一秩十卷具臣列傳二秩二十卷外戚傳一卷孝德傳一卷誠臣傳一卷文苑傳二卷儒林傳二卷逸民傳一卷數術傳一卷藩臣傳一卷合一秩十卷止足傳一卷列女傳一卷權幸傳一卷羯賊傳二卷逆臣傳二卷叛臣傳二卷叙傳論述一卷合一秩十卷凡稱史臣者皆先君所言下稱名按者並善心補闕别為叙論一篇託於叙傳之末唐李延夀撰北史其序傳曰李氏之先出自帝顓頊髙陽氏當唐堯之時髙陽氏有才子曰庭堅為堯大理以官命族為理氏歴夏殷之季其後理徴字德靈為翼𨽻中吳伯以直道不容得罪於紂其妻契和氏携子利貞逃隠伊侯之墟食李子而得全遂改理為李氏周時裔孫曰乾娶於益夀氏女嬰敷生子耳字伯陽為柱下史子孫散居諸國或在衛或在趙或在秦在魏者為段干大夫段干木其後也别孫悝為魏文侯興富國之術焉在趙者曰曇以功封栢人武安君牧其後也在秦者名興族為將軍生子伯佑建功北狄封南鄭公伯祐生子德德子信為秦時将信孫元曠仕漢為侍中元曠弟仲翔位太尉討叛羌於素昌一名狄道臨陣殞命葬狄道後因家焉史記李将軍傳所云其先自槐里徙居成紀實始此也仲翔曾孫廣廣子當户椒敢當户子陵戰没敢子禹位至侍中禹生承公承公生蜀郡太守先先生長宗長宗生博士况况生孝亷本本字上明生巴郡太守名次公次公生臨淮太守軌軌字逸文生積弩将軍隆隆字業緒生雍雍仕魏歴尚書郎濟北東莞二郡太守雍生柔柔字德逺仕晋為北地太守雍生弇字季子歴天水太守衛将軍子昶字仲堅昶生暠字元盛稱凉王諡曰武昭則皇室七廟之始也暠第二子歆字士業嗣為凉公為沮渠蒙遜所㓕世子重耳奔於江左遂仕於宋後歸魏為𢎞農太守延夀曽祖曉字仁略太尉虎子也臣欽若等按唐書重耳生熈熈生天賜天賜生虎也北齊天保中歴廣武東二郡太守曉生超字仲舉仲舉生太師字君威唐初以竇建德禮部侍郎譴徒西㑹州忽忽不樂乃為覊思賦以見其事侍中觀公楊恭仁時鎮凉州見賦異之召至河西深相禮重日與㳺處太師少有著述之志常以宋齊梁陳魏齊周隋南北分隔南書謂北為索虜北書指南為島夷又各以其本國周悉書别國並不能備亦徃徃失實嘗欲改正将擬吳越春秋編年以備南北至是無事侍中楊恭仁鎮凉州家富有書籍得恣意披覽宋齊梁魏四代有書自餘竟無所得居二年恭仁入為吏部尚書太師復還㑹州武德九年㑹赦至京師尚書僕射封德彞中書令房𤣥齡竝與太師親通勸留不去曰時屬惟新人思自效方事屏退恐失行藏之道太師曰昔唐堯在上下有箕山之節雖以不才請慕其義於是趣装東歸家本多書因編緝前所修書貞觀二年五月終於鄭州滎陽縣野舍時年五十九既所撰未畢以為没齒之恨焉所製文筆詩賦播遷及遭火多致失落存者十卷子慶孫正禮利王延夀安世延敬播俱在中書侍郎顔師古給事中孔頴達下刪削既家有舊本思欲追終先志其齊梁陳五代舊事所未見因編緝之暇晝夜抄録之至五年以内憂去職服闋徙官蜀中以所得者編次之然尚多闕未得及終十五年任東宮典膳丞日右庶子彭陽公令狐德棻又啟延夀修晋書因兹復得勘究宋齊魏三代之事所未得者十七年尚書右僕射禇遂良奉勅修隋書十志復准勅召延夀撰録因此遍得披尋時五代史既未出延壽不敢使入抄録家業貧罄又不辦僱人書寫至於魏齊周陳宋齊梁隋正史並手自寫本紀依司馬遷體以次連綴之又從此八代正史外更勘雜史與正史所無有一千餘卷皆以編入其煩冗者即削去之始末修撰凡十六載始宋終隋凡八代為北史南史二書合百八十卷其南史先寫訖以呈監國史國子祭酒令狐德棻始末蒙讀了乖失者亦為改正之許令聞奏次以北史諮知亦為詳正因遍諮宰相乃表上之册府元龜卷五百六十一
