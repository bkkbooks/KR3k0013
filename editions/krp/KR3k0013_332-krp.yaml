  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_332-1a}
body:
  text: 册府元龜卷三百三十二宋王欽若等撰宰輔部罷免書曰三載考績三考黜陟幽明所以因成功而見善惡繇實効而為用舎也矧秉國之鈞代天而治股肱元后衡石天下得其人則百工允釐非其賢則彞倫攸斁以至公而陞以至公而黜斯所謂直道而行也若夫韋賢告老賜安車而就第李通辭疾以特進而奉朝請斯乃進退以禮君臣俱得至若無所發明號為煩碎賜策以罷理亦宜之其徇私忘公忌賢作威逃戮而退幸亦多矣乃有見嫉姦邪遭罹䜛毀志雖中屈道亦無辱雖復幅巾歸田柴車即路斯以見伯玉卷而懐之子文三已無慍之志焉秦吕不韋為相國始皇九年坐嫪毐免相漢髙后七年九月左丞相審食其免臣欽若等曰按史無事跡者其後並同文帝元年八月右丞相絳侯周勃謝請歸嵗餘復為相十餘月三年十一月詔曰前日吾詔列侯就國或頗未能行丞相朕所重率列侯之國迺免相就國後二年八月丞相張蒼免蒼為丞相十餘年魯人公孫臣上書言漢土徳其符黄龍見當改正朔易服色事下蒼蒼以為非是罷之其後黄龍見成紀帝召公孫臣為博士草立土徳時歴制度草創始也更元年蒼由此自絀謝病稱老蒼任人為中候任保任也中候官名有所保舉也大為姦利帝以為讓用此事責蒼蒼遂病免景帝七年六月丞相陶青免臣欽若等曰按史無事迹者故但書免中三年九月丞相周亞夫免亞夫為丞相四年帝甚重之帝廢栗太子亞夫固争之不得帝繇此疏之而梁孝王每朝嘗與太后言亞夫之短太后言皇后兄王信可侯帝請得與丞相計之亞夫曰高帝約非有功不得侯王信雖后兄無功侯之非約也帝黙然而沮其後匈奴王徐盧等五人降漢帝欲侯之亞夫曰彼背其主降陛下陛下侯之則何以責人臣不守節者景帝曰丞相議不可用廼悉封徐盧等為列侯亞夫因謝病免相武帝建元元年六月丞相衛綰免綰景帝以敦厚可相少主尊寵之賞賜甚多為丞相三嵗武帝卽位以景帝病時諸官囚多坐不辜者而綰不任職天子不親政則丞相當理之而綰不申其寃免之二年十月丞相竇嬰免嬰太后從兄子元年代衛綰為丞相太后好黄老而嬰與太尉田蚡御史大夫趙綰等務隆儒術貶道家言是以竇太后滋不說滋益也說讀曰悅綰請毋奏事東宫太后怒曰此欲復為新垣平耶廼罷逐綰而免嬰五年御史大夫嚴青翟坐太后䘮不辦免六年六月丞相許昌免元光四年御史大夫韓安國免初安國為御史大夫三月丞相田蚡薨行丞相事引堕車蹇為天子導引而堕車跛蹇帝欲用安國為丞相使使視蹇甚廼更以平棘侯薛澤為丞相安國病免元朔三年御史大夫張歐以老病免食上大夫祿五年十一月丞相薛澤免宣帝地節三年正月丞相韋賢免賢本始三年代蔡義為丞相時七十餘至是以老病乞骸骨賜黄金百斤罷歸加賜第一區丞相致仕自賢始丼露元年御史大夫杜延年免延年御史大夫周之子五鳳三年自西河太守徴為御史大夫居父官府不敢當舊位坐卧皆易其處視事三嵗以老病乞骸骨天子優之使光祿大夫持節賜黄金百斤酒米致醫藥延年遂稱病篤賜安車駟馬罷就第元帝永光元年十一月以嵗惡民流丞相于定國御史大夫薛廣徳俱乞骸骨賜安車駟馬黄金六十斤罷就第定國宣帝丼露三年為丞相帝即位關東連年被災民流入関言事者歸咎於大臣帝數以朝日引見丞相御史入受詔條責以職事定國上書謝罪是嵗春霜夏寒日青無光帝復以詔條責之定國惶恐自劾歸侯印乞骸骨帝報曰萬方有罪罪在朕躬君雖任職何必顓焉其勉察郡國守相郡牧非其人者毋令賊民永執綱紀務悉聰明強食愼疾定國稱篤辭廼與廣徳俱罷就第成帝建始三年御史大夫張譚坐選舉不實免三年十二月丞相匡衡免衡元帝建昭三年為丞相時中書令石顯用事衡畏顯不敢失其意及帝卽位廼與御史大夫張譚共奏顯追條其舊惡并及黨與於是司𨽻校尉王尊劾奏衡譚居大臣位知顯等專權勢不以時白奏行罰而阿諛曲從附下罔上無大臣輔政之義罪至不道有詔勿劾衡慙懼上疏謝罪因稱病乞骸骨帝以新卽位褒優大臣然羣下多是王尊者衡嘿嘿不自安毎有水旱風雨不時連乞骸骨不許乆之衡子昌為越騎校尉醉殺人繫詔獄越騎官屬與昌弟旦謀簒昌事發覺衡免冠徒跣待罪天子使謁者詔衡冠履而有司奏衡專地盗土衡竟坐免猶封樂安侯侵地四百頃事具宰輔貪墨門河平四年四月丞相王商免商父武以宣帝舅封樂昌侯商嗣爵建始四年為丞相帝元舅大司馬大將軍王鳳顓權行多驕僣商論議不能平㑹日有蝕之大中大夫蜀郡張匡上書言商作威作福從外制中取必於上言意欲所行必果之於是左將軍史丹等奏請詔謁者召商詣若盧詔獄若盧獄名屬少府黄門北寺帝素重商知匡言多險制曰勿治鳳固争之於是制詔御史蓋丞相以徳輔翼國家典領百寮協和萬邦為職任莫重焉今樂昌侯商為丞相出入五年未聞忠言嘉謨而有不忠執左道之辜陷于大辟前商女弟内行不修奴賊殺人疑商教使謂商重臣故抑而不窮今或言商不以自悔而反怨懟朕甚傷之惟商與先帝有外親未忍致于理其赦商罪使者收丞相印綬免相鴻嘉元年三月丞相張禹免禹代王商為丞相六年至是以老病乞骸骨加優再三迺聴許賜安車駟馬黄金百斤罷就第永始二年十月丞相薛宣免宣代張禹為丞相時帝好儒雅而宣經術淺帝輕之㑹廣漢郡盜賊羣起丞相御史遣掾吏逐捕不能克帝廼拜河東都尉趙䕶為廣漢太守以軍法從事數月斬其渠帥鄭躬渠大也降者數千人廼平㑹邛成太后終䘮事倉卒吏賦歛以趣辦卭成太后宣帝王皇后言趣茍取辦其後帝聞之以過丞相御史遂册免宣曰君為丞相出入六年忠孝之行率先百寮朕無聞焉不聞其有此行也朕旣不明變異數見嵗比不登倉廪虚空比頻也登成也年穀不成百姓饑饉流離道路疾疫死者以萬數人至相食盜賊並興羣職曠廢是朕之不德而股肱不良也廼者廣漢羣盗横恣殘賊吏民朕惻然傷之數以問君君對輒不如其實西州隔絶幾不為郡三輔徴歛無度酷吏並縁為姦侵擾百姓詔君按騐復無欲得事實之意九卿以下咸承風㫖同時陷于謾欺之辜咎繇君焉有司法君領職觧嫚法謂據法以劾也開謾欺之路傷薄風化無以帥示四方不忍致君于理其上丞相高陽侯印綬罷歸成帝綏和二年大司空元年改御史大夫為司空何武免武為大司空與丞相翟方進多所舉奏號為煩碎不稱賢公因遣吏歸迎後母㑹成帝晏駕吏恐道路有盗賊後母留止左右或譏武事親不篤左右謂天子側近之臣哀帝亦欲改易大臣遂策免武曰君舉錯煩苛不合衆心錯置也孝聲不聞惡名流行無以率示四方其上大司空印綬罷歸就國建平元年大司空師丹免初丹議帝母祖母定陶恭王后不合為共皇太后及恭王旣追尊為恭皇帝又議不宜立廟京師繇是寖不合帝意㑹有上書言古者以龜貝為貨今以錢易之民以故貧宜可改幣帝以問丹丹對言可改章下有司議皆以為行錢來已乆難卒變易丹老人忘其前語後從公卿議又丹使吏書奏吏私冩其草丁傅子弟聞之使人上書告丹上封事行道人徧持其書帝以問將軍中朝臣皆對曰忠臣不顯諫大臣奏事不宜漏泄今吏民傳冩流聞四方不宻則失身宜下廷尉廷尉劾丹大不敬遂策免丹曰夫三公者朕之腹心也輔善相過表率百寮和合天下者也朕旣不明委政於公間者隂陽不調寒暑失常變異屢臻山摧地震河决泉涌流殺人民百姓流連無所歸心司空之職尤廢焉君在位出入三年未聞忠言嘉謀而反有朋黨相進不公之名乃者以挺力田議改幣章示君挺引㧞也謂特㧞異力田之人優寵之也君内為朕建可改不疑共立此議也以君之言博考朝臣君乃希衆雷同外以為不便令觀聴者歸非於朕朕隠忍不宣為君受愆朕疾夫比周之徒虚偽壊化浸以成俗故屢以書飭君幾君省過求已省視也自求諸已不尤人也而反不受退有後言及君奏封事傳於道路布聞朝市言事者以為大臣不忠辜陷重辟獲虚采名謗譏匈匈流於四方腹心如此謂䟽者何殆謬於二人同心之利焉將何以率示羣下附親遠方朕惟君位尊任重慮不周宻懐諼迷國諼詐也進退違命反覆異言甚為君耻之非所以恭承天地永保國家之意以君嘗託傅位未忍考於理已詔有司赦君勿治其上大司空高樂侯印綬罷歸二年四月丞相孔光免光成帝時為御史大夫帝無繼嗣至親有同産弟中山孝王同産弟子定陶王帝議立嗣丞相翟方進等以定陶王宜為嗣光以中山王宜為嗣坐議不中意左遷廷尉成帝晏駕卽其夜于大行前拜光丞相定陶王立是為哀帝帝祖母傅皇后欲與成帝母稱尊號羣下多順㫖惟師丹與光持不可丹以罪免光自先帝時議繼嗣有持異之隙矣又重違傅太后㫖繇是傅氏在位者與大司空朱愽為表裏共毀譛光後數月遂策免光曰丞相者朕之股肱所與共承宗廟統理海内輔朕之不逮以治天下也朕旣不明灾異重仍仍頻也日月無光山摧河决五星失行是章朕之不德而股肱不良也君前為御史大夫輔翼先帝出入八年卒無忠言嘉謀今相朕出入三年憂國之風復無聞焉隂陽錯謬嵗比不登比頻也天下空虚百姓飢饉父子分散流離道路以十萬數而百官羣職曠廢姦軌放縱盗賊並起或攻官寺殺長吏數以問君君無怵惕憂懼之意對無能為言盗賊不能為害是以羣卿大夫咸惰哉莫以為意咎繇君焉君秉社稷之重總百寮之任上無以弼朕之闕下不能綏安百姓書不云乎毋曠庻官天工人其代之於虖君其上丞相博山侯印綬罷歸元夀二年八月大司空彭宣免宣為大司空三月㑹哀帝晏駕新都侯王莽為大司馬秉政專權宣上書言三公鼎足承君一足不任則覆亂美實美實謂鼎中之實也易鼎卦九四爻辭曰鼎折足覆公餗餗食也故宣以為言臣資性淺薄年齒老眊數伏疾病昬亂遺忘願上大司空長平侯印綬乞骸骨歸鄉里竢塡溝壑莽白太后策曰惟君視事日寡功德未效廹于老眊昏亂非所以輔國家綏海内也使光禄勲豐策詔君君其上大司空印綬便就國莽恨宣求退故不賜黄金安車駟馬平帝元始二年三月大司空王崇免先是彭宣乞骸骨罷以崇代為大司空嵗餘崇復謝病乞骸骨皆避王莽五年八月太師兼大司徒馬宫免宫哀帝末為光禄勲與丞相御史雜議傅太后謚不直至是王莽發傅太后陵追誅議者宫為王莽所厚獨不及宫内慙懼上書謝罪乞骸骨莽以太皇太后詔賜宫策曰太師大司徒扶德侯上書言前以光禄勲議故定陶共王母謚曰婦人以夫爵尊為號謚宜曰孝元傅皇后稱渭陵東園臣知妾不得體君卑不得敵尊而希指雷同詭經辟說詭違也辟讀曰僻以惑誤上為臣不忠當伏斧鉞之誅幸䝉洒心自新又令得保首領伏自惟念入稱四輔出備三公爵為列侯誠無顔復望闕廷無心復居官府無宜復食國邑願上太師大司徒扶德侯印綬避賢者路下君章有司皆以為四輔之職為國綱維三公之任鼎足承君不有鮮明固守無以居位如君言至誠可聽惟君之惡在於洒心不敢文過朕甚多之多猶重也不奪君之爵邑以著自古皆有死之義以宫上書不文過為信不奪其爵邑論語載孔子言曰自古皆有死民無信不立故引之其上太師大司徒印綬使者以侯就第後漢光武建武二年二月大司空王梁免臣欽若等曰事具帝王含過門三年閏正月大司徒鄧禹免禹與赤眉戰於回谿谿名俗名回坑在河南永寕縣師敗獨與二十四騎還詣宜陽謝上大司空梁侯印綬有詔歸侯印綬五年十一月大司徒伏湛免初車駕征張歩留湛居守時烝祭高廟而河南尹司𨽻校尉於廟中爭論湛不舉奏坐䇿免六年十二月大司空宋𢎞免坐考上黨太守無所據免歸第言無罪状可據十二年九月大司空李通罷通性謙恭嘗願避權勢素有消疾消中之疾自為宰相謝疾不視事連年乞骸骨帝每優寵之令以公位歸第養疾通復固辭積二嵗乃聴上大司空印綬以特進奉朝請十三年三月大司空馬成罷初李通旣罷以成行大司空事居府如真數月拜揚武將軍十五年正月大司徒韓歆免歆好直言無隐諱帝毎不能容嘗因朝㑹帝讀隗囂公孫述相與書歆曰亡國之君皆有才桀紂亦有才帝大怒以為激發歆又證嵗將飢凶指天畫地言甚剛切免歸田里二十年四月大司空竇融免時大司徒戴渉坐所舉人盗竊下獄帝以三公參職不得已乃策免融以大中大夫張湛代渉為大司徒湛至朝堂遺失溲便因自陳疾篤不能復任朝事遂罷之二十二年十月大司空朱浮坐賣弄國恩免明帝永平三年二月太尉趙熹司徒李訢坐考中山相薛脩事不實免四年十月司徒郭丹司空馮魴坐考隴西太守鄧融事無所據策免十二年七月司空伏恭罷恭為司空九年以病乞骸骨詔賜二千石俸以終其身十四年三月司徒虞延免初延代趙熹為太尉八年代范遷為司徒歴位二府十餘年無異政績㑹楚王英謀反隂氏欲中傷之使人私以楚謀告延延以英藩戚至親不然其言又欲辟幽州從事公孫𢎞以𢎞交通楚王而止並不奏聞及英事發覺詔書切讓延遂自殺章帝元和元年八月太尉鄧彪罷彪視事四年以疾乞骸骨詔贈錢三十萬在所以二千石俸終其身三年四月太尉鄭𢎞免𢎞為太尉四年奏尚書張林阿附侍中竇憲而素行贓穢又上雒陽令楊光憲之賔客在官貪殘並不宜處位書奏吏與光故舊因以告之光報憲憲奏𢎞大臣漏泄宻事帝詰讓𢎞收上印綬自詣廷尉詔勑出之五月司空第五倫罷倫奉公盡節言事無所依違連以老病上䟽乞身以二千石俸終其身加賜錢五十萬公宅一區章和元年六月司徒桓虞免和帝永元九年九月司徒劉方免十二年九月太尉張酺免酺數上䟽以疾乞身薦魏郡太守徐防自代帝不許後以事與司𨽻校尉晏稱㑹於朝堂酺從容謂稱曰三府辟吏多非其人稱歸即奏令三府各實其掾史酺本以私言不意稱奏之甚懐恨㑹復共謝闕下酺因責讓於稱辭語不順酺怒遂廷叱之稱乃劾奏酺有怨言天子以酺先帝師有詔公卿愽士朝臣㑹議司徒吕蓋奏酺位居三司知公門有儀不屏氣鞠躬以須詔命反作色大言怨讓使臣司𨽻校尉督大姦滑無所不察故曰使臣不可以示四遠於是䇿免十三年十一月司徒吕蓋罷十四年十月司徒巢堪罷十六年七月司空魯恭坐事策免續漢書曰坐族弟𢎞農都尉炳事免官也安帝永初元年九月庚午太尉徐防免辛未司空尹勤免是嵗郡國被水災比州湮没死者以千數灾異數降西羗反畔殺掠人吏京師滛雨蟊賊傷稼穡防比上書自陳過咎遂策免三公以災䇿免始自防也勤亦以雨水傷稼䇿免三年三月司徒魯恭免恭再在公位性謙退奏議依經濳有補益以老病策罷五年正月太尉張禹以隂陽不和䇿免六年四月司空張敏罷初敏以疾乞身不聴是年春行大射禮陪位頓仆乃䇿罷之䇿曰今君所苦未瘳有司奏君年體衰羸郊廟禮儀仍有曠廢鼎足之任不可以缺重以職事留君其上司空印綬元初元年九月太尉李脩罷二年十二月司徒夏勤罷永寜元年十月司空李郃坐請託事免十二月司徒劉愷罷愷視事五年稱病上疏致事有詔優許焉加賜錢三十萬以千石祿歸養河南尹常以嵗八月致羊酒延光元年四月司空陳褒免二年十月太尉劉愷罷愷視事三年以疾乞骸骨乆乃許之下河南尹禮秩如前三年二月太尉楊震免震前後上疏切帝既不平㑹星變逆行中常侍樊豐等共譛之事具讒臣害賢門夜遣使者䇿收太尉印綬順帝卽位未改元司空劉授以阿附惡逆辟召非其人䇿罷永建元年正月太傅馮石太尉劉熹皆以阿黨大將軍閻顯中常侍江京等策免司徒李郃坐吏民疾病仍有灾異賜䇿免十月司空陶敦免二年七月太尉朱寵司徒朱倀以日食罷三年十二月太傅桓焉坐辟召禁錮者為吏罷四年八月太尉劉光司空張皓以隂陽不和策免十一月司徒許敬以陵轢使官策罷以千石祿終身陽嘉二年五月司空王龔以地震䇿免七月太尉龎參免參夫人疾前妻子投於井而殺之參素與雒陽令祝良不平良聞之率吏卒入太尉府案實其妻乃上參罪遂因灾異策免三年十一月司徒劉﨑司空孔扶免四年四月太尉施延以選舉貪汚策罷永和元年十一月太尉龎參以乆病罷三年八月司徒黄尚免五年九月太尉王龔罷龔以老病乞骸骨六年二月司空郭䖍免漢安元年十月太尉桓焉司徒劉夀以日食免質帝夲初元年六月太尉李固免時帝八嵗梁太后臨朝固為太尉多所規正每輒從用其黄門宦者一皆斥遣天下咸望遂平而梁冀猜固每相忌疾冀旣悖逆酖帝議欲立蠡吾侯而固與司徒胡廣大鴻臚杜喬皆以為清河王蒜明德著聞宜立為嗣冀乃說太后策免固竟立蠡吾侯是為桓帝桓帝建和元年六月太尉胡廣以日食免九月太尉杜喬以地震免三年十月太尉趙戒免戒字志伯蜀郡人元嘉元年四月司徒張歆罷歆字敬讓十月司空胡廣以告老罷二年十一月司空黄瓊免時帝欲褒崇梁兾瓊建議有異兾意以為恨㑹以地震動策免永興元年十月太尉袁湯司徒呉雄司空趙戒以灾異策免二年九月太尉胡廣以日食免永夀元年四月司空房植免是月南陽大水延熹元年七月太尉黄瓊以日食免二年八月太尉胡廣坐阿附梁兾免四年二月司徒盛允免三月太尉黄瓊以冦賊免六月司空虞放免九月司空黄瓊以地震免五年十一月太尉劉矩免初矩與司空黄瓊司徒种暠同心輔政號為賢相時連有灾異司𨽻校尉以劾三公尚書朱穆上疏稱矩等良輔及言殷湯高宗不罪臣下之義帝不省竟以蠻夷反叛免六年十一月司空劉寵以隂霧愆陽免八年九月司空周景以京兆地震免九年四月司徒許栩免七月太尉陳蕃免時李膺等以黨事下獄考實蕃因上疏極諌見宰輔諌諍門帝諱其言切託以蕃辟召非其人遂策免之九月司空劉茂免初南陽太守成瑨太原太守劉質下獄當死茂與太尉陳蕃司徒劉矩共上書訟之帝不悦瑨質既棄市有司承㫖劾奏三公茂遂坐免靈帝建寜元年四月司空宣酆免八月司空王暢免暢為司空數月以水灾䇿免十一月太尉劉矩以日食免因乞骸骨卒於家二年五月太尉聞人襲罷司空許栩免十一月太尉劉寵以日食䇿免三年四月太尉郭禧以日食罷七月司空劉囂罷四年三月太尉聞人襲司徒許訓免是月朔日有食之七月司空來豔司徒橋𤣥免時河東地裂雨雹山水暴出𤣥以國家方弱自度力無所用乃稱疾上疏引衆灾以自劾遂策免熹平元年十二月司徒許栩罷二年三月太尉李咸免七月司空楊賜以灾異免十二月太尉叚熲免先是熲為司𨽻校尉曲意宦官故得保其富貴是年五月代李咸為太尉至是罷三年十二月司空唐珍罷五年五月太尉陳耽罷七月太尉許訓罷十月司徒袁隗罷六年七月司空劉逸免逸字代過十月太尉劉寛以日食免是月朔日食十一月司空陳球以地震免十二月司徒楊賜免時朝廷爵授多不以次而帝好㣲行遊行外苑賜上疏言閹尹之徒共專國朝欺罔日月甚忤曹節等以師傅之恩故得免咎罷為少府光和元年四月司空陳耽免是月地震侍中寺雌鷄化為雄九月太尉張顥罷十一月太尉陳球以日食免二年三月司徒楊滂免太尉橋𤣥司空袁逢罷四年九月太尉劉寛以日食免閏月司徒楊賜以病罷五年三月司徒陳眈免十月太尉許􅖢罷中平元年四月太尉楊賜免時黄巾賊起賜被召㑹議詣省閣切諫忤㫖因以冦賊免司空張濟罷二年二月司徒袁隗免五月太尉鄧盛罷三年二月太尉張延罷四年四月太尉張温免十一月太尉崔烈罷五年四月太尉曺嵩罷六月太尉樊陵罷九月司徒許相罷六年四月太尉馬日磾以日食免少帝卽位初司徒丁宫罷獻帝初平元年二月太尉黄琬司徒楊彪免時董卓秉政関東兵起卓懼欲遷都以避其難彪曰天下動之至易安之甚難卓作色曰公欲沮國計耶琬曰此國之大事楊公之言得無可思卓不答使司𨽻校尉宣播以灾異奏免琬彪等二年七月司空种拂以地震免太尉趙謙罷三年八月司徒趙謙罷十二月太尉皇甫嵩以流星䇿免以日蝕灾四年六月太尉周忠以灾異免是月扶風大風雨雹華山崩裂十月司空楊彪以地震免十二月司空趙温以地震免興平元年七月太尉朱儁以日食免九月司徒淳于嘉罷建安元年九月太尉楊彪司空張喜罷時天子新都許大㑹公卿兖州刺史曹操上殿見彪色不恱恐於此圖之未得讌設託疾如厠因出還營彪以疾罷十三年正月司徒趙温免温從車駕都許以辟司空曹操子丕曹操怒奏温辟中臣子弟選舉不實免官册府元龜卷三百三十二
