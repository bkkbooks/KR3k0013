body:
  text: 册府元龜卷二百八十二宋王欽若等撰宗室部承襲傳有世及之訓詩著似續之義自成周列爵大封同姓傳祚撫封與國升降者有之矣其事見於春秋傳及太史公世家銓次所屬本乎列國秦并天下子弟為匹夫漢矯其失廣樹藩戚或象賢濟美聨輝奕葉或推恩繼絶纂緒傳世魏晋而下何莫繇斯盖所以隆親親以興仁資繩繩而流詠使其枝葉扶踈以大庇本根犬牙相錯以夾輔王室者也漢燕王澤高祖從昆弟也孝文二年薨謚曰敬王子康王嘉嗣九年薨子定國嗣定國有罪自殺國除哀帝時繼絶世乃封敬王澤𤣥孫之孫無終公士歸生為營陵侯無終其所屬縣也公士第一爵歸生名也楚元王交髙祖同父少弟立二十三年薨太子辟非先卒辟非者猶辟邪兵之類也先卒者元王未薨之時已卒也文帝乃以宗正下邳侯郢客嗣郢客元王次子是為夷王郢客立四年薨子戊嗣二十一年戊反誅景帝立宗正平陸侯禮為楚王禮元王子奉元王後是為文王四年薨子安王道嗣二十二年薨子襄王注嗣十四年薨子節王純嗣十六年薨子延夀嗣休侯富楚元王子封六年薨子懐侯登嗣一年薨子敬侯嘉嗣二十四年薨子哀侯章嗣沈猷夷侯嵗楚元王子封二十年子受嗣棘樂敬侯調楚元王子封十六年薨子恭侯應嗣十五年薨子慶嗣浮丘節侯不害楚安王子封十一年薨子覇嗣陽城侯徳楚元王曾孫昭帝時為宗正地節中以親親行謹封為陽城侯立十一年子向坐鑄偽黄金當伏法徳上書訟罪㑹薨大鴻臚奏徳訟子罪失大臣體不冝賜謚置嗣制曰賜謚繆侯為置嗣𫝊至孫慶忌復為宗正太常薨子岑嗣為諸曹中郎将列校尉至太常薨傳子至王莽敗乃絶趙幽王友髙祖諸姬所生也髙后時幽死及孝文即位立幽王子遂為趙王河間文王辟疆趙幽王子孝文二年立十三年薨子哀王福嗣齊悼惠王肥髙祖㣲時外婦所生也立十三年薨子大襄嗣是為哀王十一年薨子文王則嗣十四年薨無子國除孝文十六年乃分齊為六國盡立前所封悼惠王子列侯見在者為王以楊虚侯将閭為齊王安都侯志為濟北王武成侯賢為淄川王白石侯雄渠為膠東王平昌侯卬為膠西王扐侯辟光為濟南王孝景三年吳楚反齊王狐疑城守不聼漢破三國聞齊初與三國有謀欲移兵伐齊齊孝王懼飲藥自殺而膠東膠西濟南淄川王皆伏誅國除獨濟北王在齊孝王之自殺也景帝聞之以為齊首善言其初首無逆亂之心以廹刼有謀非其罪也召立孝王太子夀是為懿王二十三年薨子厲王次昌嗣管共侯罷軍齊悼惠王子封二年薨子戎奴嗣氏丘共侯寗國齊悼惠王子封十一年薨子偃嗣營平侯信都齊悼惠王子封十年薨子廣嗣楊丘共侯安齊悼惠王子封十二年薨子偃嗣博陽頃侯就齊孝王子就薨子終古嗣被陽敬侯燕齊孝王子封十三年薨子穅侯偃嗣二十八年薨子頃侯夀嗣夀薨子孝侯定嗣定薨節侯閎嗣閎薨子廣嗣定敷侯越齊孝王子封十二年薨子思侯徳嗣五十一年薨子憲侯福嗣福薨子恭侯湯嗣湯薨子定侯乗嗣稻夷侯定齊孝王子定薨子簡侯陽都嗣陽都薨子戴侯咸嗣四十二年薨子頃侯閱嗣閱薨子永嗣山原侯國齊孝王子封二十七年薨子康侯棄嗣十四年薨子安侯守嗣二十二年薨子發嗣發薨孝侯外人嗣繁安夷侯忠齊孝王子封十八年薨子安侯守嗣守薨子節侯夀漢嗣夀漢薨子頃侯嘉嗣嘉薨子孝侯光嗣光薨子起嗣桞康侯陽巳齊孝王子陽巳薨子敷侯罷師嗣罷師薨子于侯自為嗣自為薨子安侯攜嗣攜薨子繆侯軻嗣軻薨子守嗣雲夷侯信齊孝王子封十四年薨子茂發嗣茂發薨子康侯遂嗣遂薨子釐侯終古嗣終古薨子得之嗣牟平共侯渫齊孝王子封五年薨子節侯奴嗣三十五年薨子敬侯更生嗣二十九年薨子康侯建嗣一年薨子孝侯齕嗣齕薨子釐侯威嗣威薨子隆嗣柴原侯代齊孝王子封三十四年薨子節侯勝之嗣二十七年薨子敬侯賢嗣賢薨康侯齊嗣齊薨恭侯莫如嗣城陽景王章齊悼惠王子孝文二年立二年薨子共王喜嗣孝文十二年徙王淮南四年復還王城陽凡立三十三年薨子頃王延嗣二十六年薨子敬王義嗣九年薨子惠王武嗣十二年薨子荒王順嗣四十六年薨子戴王恢嗣八年薨子孝王景嗣二十四年薨子哀王雲嗣一年薨無子國絶成帝永始元年以雲弟俚紹封辟土節侯壯城陽共王子封三年薨子明嗣騶丘敬侯寛城陽共王子封六年薨子原侯報徳嗣報徳薨子毋害嗣南城節侯貞城陽共王子封四十二年薨子戴侯猛嗣二十二年薨子元侯尊嗣二年薨子釐侯充國嗣充國薨子頃侯遂嗣遂薨子友嗣廣陵虒侯裘城陽共王子封七年薨子成嗣虖葭康侯澤城陽頃王子封六十二年子夷侯舞嗣舞薨子頃侯閣嗣閣薨孫永嗣挾釐侯覇城陽頃王子封三十五年薨子夷侯戚嗣二十一年薨子節侯賢嗣賢薨子頃侯思嗣思薨子孝侯衆嗣瓡節侯息城陽頃王子封五十五年薨子質侯守嗣虗水康侯禹城陽頃王子封三十八年薨子息侯爵嗣七年薨子敞嗣菑川王志齊悼惠王子孝文十六年立為濟北王孝成四年徙王菑川元朔中齊國絶悼惠王後唯有二孤城陽菑川菑川地比齊比近也武帝為悼惠王冢園在齊乃割臨菑東圜悼惠王冢園邑盡以予菑川令奉祭祀志立三十五年薨是為懿王子靖王建嗣二十年薨子頃王遺嗣三十五年薨子思王終古嗣二十八年薨子考王尚嗣五年薨子孝王横嗣三十一年薨子懐王交嗣六年薨子永嗣劇原侯錯菑川懿王子封十七年薨子孝侯廣昌嗣廣昌薨子戴侯胥嗣胥薨子質侯吉嗣吉薨子節侯囂嗣囂薨子勝容嗣懐昌夷侯髙遂菑川懿王子封二年薨子胡侯延年嗣延年薨子節侯勝時嗣勝時薨子可置嗣平望夷侯賞菑川懿王子封七年薨子原侯楚人嗣二十六年薨子敬侯光嗣十四年薨子頃侯起嗣起薨子孝侯均嗣均薨子旦嗣臨衆敬侯始昌菑川懿王子封三十一年薨子康侯革生嗣十八年薨子頃侯廣平嗣廣平薨子原侯農嗣農薨子節侯理嗣理薨子釐侯賢嗣賢薨子商嗣葛魁節侯寛菑川懿王子封八年薨子戚嗣益都敬侯胡菑川懿王子胡薨子原侯廣嗣廣薨子嘉嗣平的戴侯強菑川懿王子封十七年薨子思侯中時嗣二十年薨子節侯福嗣十三年薨子頃侯鼻嗣鼻薨子釐侯利親嗣利親薨子宣嗣劇魁夷侯黒菑川懿王子封十七年薨子思侯招嗣三年薨子康侯徳嗣徳薨子孝侯利親嗣利親薨子釐侯嬰嗣嬰薨子向嗣平度康侯行菑川懿王子封四十七年薨子節侯慶忌嗣三年薨子質侯帥軍嗣帥軍薨子頃侯欽嗣欽薨子孝侯宗嗣宗薨子嘉嗣冝成康侯偃菑川懿王子封十一年薨子福嗣臨胊夷侯奴菑川懿王子封四十一年薨子戴侯乗嗣乗薨子節侯質嗣質薨子孝侯信嗣信薨子安侯禕嗣禕薨子岑嗣陸元侯何菑川靖王子何薨子原侯賈嗣賈薨子延夀嗣廣饒康侯國菑川靖王子封五十年薨子共侯坊嗣十四年薨子麟嗣缾敬侯成菑川靖王子封五十四年薨子頃侯龍嗣五十年薨子原侯融嗣融薨子閔嗣俞閭煬侯母害菑川靖王子封四十四年薨子原侯况嗣十年薨子暽嗣淮南厲王長髙帝少子孝文六年以謀反廢死八年帝憐王有子四人年皆七八嵗乃封子安為阜陵侯子勃為安陽侯子賜為陽周侯子良為東城侯十六年帝憐淮南王廢法不軌自使失國早夭乃立厲王三子王淮南故地三分之阜陵侯安為淮南王安陽侯勃為衡山王陽周侯賜為廬江王東城侯良前薨無後濟北貞王勃淮南厲王子孝文十六年封為衡山王孝景四年徙濟北一年薨子式王胡嗣五十四年薨子寛嗣陰安康侯不害濟北貞王子封十一年薨子哀侯秦容嗣周望康侯何濟北貞王子封八年薨子當時嗣陪繆侯則濟北貞王子封十一年薨子邑嗣安陽侯樂濟北貞王子封三十八年薨子穅侯延年嗣十七年薨子康侯記嗣十五年薨子安侯戚嗣戚薨子哀侯得嗣羽康侯成濟北式王子封六年薨子恭侯係嗣係薨子棄嗣徳哀侯廣髙帝兄子封七年薨子頃侯通嗣二十四年薨子康侯齕嗣二十四年薨子何嗣梁孝王武文帝子立四十五年薨子共王買嗣七年薨子平王襄嗣襄立四十年薨子頃王無傷嗣十一年薨子敬王定國嗣四十年薨子夷王遂嗣六年薨子荒王嘉嗣十五年薨子立嗣二十七年有罪自殺國除後王莽白太皇太后立孝王𤣥孫之曽孫沛郡卒史音為梁王奉孝王後張梁哀侯仁梁共王子封十三年薨子順嗣代孝王參文帝子立十七年薨子共王登嗣二十九年薨子義嗣元鼎中漢廣關以常山為阻依山以為關徙代王於清河是為剛王并前在代凡立四十年子頃王陽嗣二十四年薨子年嗣年坐事立三年國除元始二年新都侯王莽白太皇太后立年弟子如意為廣宗王奉代孝王後利昌康侯嘉代共王子封五十一年薨子戴侯樂嗣十二年薨子頃侯萬世嗣萬世薨子節侯光禄嗣光禄薨子剌侯殷嗣殷薨子換嗣河間獻王徳景帝子二十六年薨子共王不周嗣四年薨子剛王基嗣十二年薨子頃王緩嗣十七年薨子孝王慶嗣四十三年薨子元嗣十七年坐殺人廢建始元年正月復立元弟上郡庫令良是為河間惠王二十七年薨子尚嗣距陽憲侯匄河間獻王子封十四年薨子淒嗣婁節侯退河間獻王子封十六年薨子釐侯嬰嗣二十二年薨子原侯益夀嗣三十一年薨子安侯充世嗣三年薨子遺嗣阿武戴侯豫河間獻王子封二十四年薨子敬侯宣嗣二十年薨子節侯信嗣二十二年薨子釐侯嬰齊嗣嬰齊薨子頃侯黄嗣黄薨子長久嗣参户節侯免河間獻王子封四十六年薨子敬侯嚴嗣嚴薨子頃侯元嗣元薨子孝侯利親嗣利親薨子度嗣州鄉節侯禁河間献王子封十一年薨子思侯齊嗣齊薨子憲侯惠嗣惠薨子釐侯商嗣商薨子共侯伯嗣伯薨子禹嗣魯共王餘景帝子立二十八年薨子安王光嗣四十年薨子孝王慶忌嗣三十七年薨子頃王封嗣二十八年薨子文王睃嗣亡後建平三年六月以頃王子郚鄉侯閱紹封廣戚節侯將魯恭王子將薨子始嗣公丘夷侯順魯共王子封三十年薨子康侯置嗣置薨子煬侯延夀嗣九年薨子思侯賞嗣賞薨子元嗣瑕丘節侯政魯共王子封五十三年薨子思侯國嗣四年薨子孝侯湯嗣十年薨子煬侯奉義嗣奉義薨子釐侯遂成嗣遂成薨子禹嗣江都易王非景帝子立二十七年薨子建嗣以罪國除絶百二十一年平帝時王莽秉政興滅繼絶立建弟盱眙侯子宫為廣陵王奉易王後胡孰頃侯胥行江都易王子封十六年薨子聖嗣趙敬肅王彭祖景帝子立六十三年薨子昌嗣初彭祖取江都易王寵姬王建所姦淖姬者甚愛之生一男號淖子彭祖以征和元年薨時淖姬兄為漢宦者武帝召問淖子何如對曰為人多欲帝曰多欲不冝君國子民問武始侯昌曰無咎無譽帝曰如是可矣遣使者立昌是為頃王十九年薨子懐王尊嗣五年薨無子絶二嵗宣帝立尊弟髙是為哀王數月薨子共王充嗣五十六年薨子隠嗣平千頃王偃趙敬肅王小子立十四年薨子繆王元嗣尉文節侯丙趙敬肅王子封五年薨子侯犢嗣封斯戴侯胡傷趙敬肅王子封二十五年薨子原侯如意嗣五十二年薨子孝侯宫嗣宫薨子仁嗣朝節侯義趙敬肅王子封十三年薨子戴侯禄嗣禄薨子固城嗣􅱺氏節侯賀趙敬肅王子封十八年薨子思侯安意嗣二十七年薨子康侯千秋嗣十六年薨子孝侯漢强嗣漢强薨子酆嗣易安侯平趙敬肅王子封二十年薨子康侯種嗣種薨子德嗣柏暢戴侯終古趙敬肅王子終古薨子朱嗣粟節侯樂趙敬肅王子封二十七年薨子煬侯忠嗣忠薨子質侯終根嗣終根薨子況嗣洨夷侯周舎趙敬肅王子周舎