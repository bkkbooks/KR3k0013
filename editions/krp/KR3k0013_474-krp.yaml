body:
  text: 册府元龜卷四百七十四宋王欽若等撰臺省部奏議第五唐李嶠則天朝為鳳閣舍人時初置右御史臺廵按天下嶠上疏陳其得失曰陛下創置右臺分廵天下察吏人善惡觀風俗得失期政途之綱紀禮法之準繩無以加也然猶有未折𠂻者臣請試論之夫禁網尚疎法令宜簡簡則法易行而不煩雜疎則所羅廣而無苛碎竊見垂拱二年諸道廵察使所奏科目凡四十有四件至於别凖格勅令察訪者又有三十餘條而廵察使率是三月已後出都十一月終奏事時限迫促簿書塡委晝夜奔逐以赴限期而每道所察文武官多至二千餘人少者一千已下皆須品量材行褒貶得失欲令曲盡行能則皆不暇此非敢惰於職而慢於官也實材有限而力不及耳臣望量其功程與其節制使器周於用力濟於時然後進退可以責成得失可以精覈矣又曰今之所察但準漢之六條推而廣之則無不包矣無為多張科目空費簿書且朝廷萬機非無事也機事之動嘗在四方是故冠蓋相望郵驛繼踵今廵使既出其外州之事悉當委之則傳驛大減矣然則御史之職故不可得閒自非分州統理無繇濟其繁務請大小相兼率十州置御史一人以周年為限使其親至屬縣或入閭里督察姦訛觀採風俗然後可以求其實効課其成功若此法果行必大裨政化且御史出持霜簡入奏天闕其於勵已自修奉職存憲比於他吏可相百也若其按劾姦邪紏讁欺隱比於他吏可相十也陛下試用臣言妙擇賢能委之心膂假温言以制之陳賞罰以勸之則莫不盡力而効死矣何政事之不理何禁令之不行何妖孽之敢興則天善之乃下制分天下為二十道簡擇堪為使者會有沮議者事竟不行薛謙光為補闕天授三年正月上疏曰臣聞國以得賢為寳臣以舉士為忠是以子皮之讓國僑鮑叔之推管仲燕昭委兵於樂毅苻堅託政於王猛及子產受國人之謗夷吾貪共賈之財昭王錫輅馬以止讒永固戮樊世以除譛處猜嫌而益信行間毁而無疑此繇黙而識委而察之深也至若宰我見愚於宣尼逢萌被知於文叔韓信無聞於項氏毛遂不齒於平原此失士之故也是以人主愛不肖之士則政乖得賢良之佐則時泰故堯資八元而庶績其理周任十亂而天下和平繇是言之則知士不可不察而官不可妄授也何者比來舉薦多不以才假譽馳聲互相推奨希潤身之小計忘臣子之大猷非所以報國求賢副陛下翹翹之望者也臣竊窺古之取士實異於今先觀名行之源考其鄉邑之譽崇禮讓以勵已顯節義以標信以敦朴為先最以彫蟲為後科故人崇勸讓之風士去輕浮之行希仕者必修貞確不拔之操行難進易退之規衆議以定其髙下郡将難誣於曲直故計貢之賢愚即州将之榮辱穢行之彰露亦鄉人之厚顔是以李陵降而隴西慙干木隱而西河美故名勝於利則小人之道銷利勝於名則貪暴之風扇是知化俗之本須擯輕浮昔兾缺以禮讓昇朝則晉人知禮文翁以儒林奨俗則蜀士崇儒燕昭好馬則駿馬來庭葉公好龍則眞龍入室繇是言之未有上之所好而下不從其化者也自亡國之季雖雜縱横而漢代求材猶徵百行是以禮義之士敏徳自修閭里推髙然後為府寺所辟魏氏取人尤愛放達晉宋之後祗重門資奨為人求官之風乖授職惟賢之義有梁薦士雅愛屬詞陳氏簡賢特珍賦詠故其俗以詞酒為重不以修身為務迨至隋室餘風尚存開皇李諤論之於文帝曰魏之三祖更好文詞忽君人之大道好彫蟲之小藝連篇累牘不出月露之形積案盈箱唯是風雲之狀世俗以此相高朝廷以兹擢士故文筆日煩其政日亂帝納李諤之策繇是下制禁斷文筆浮詞其年泗州刺史司馬幼之以表不典寔得罪於是風俗改勵政化大行煬帝嗣興又變前法置進士等科於是後生之徒復相倣傚因陋就寡赴速邀時緝綴小文名曰策舉不以指實為本而以浮虛為貴有唐纂厯雖漸革於前非陛下君臨思察才於共理樹本崇化唯在旌賢今之舉人有乖事實鄉議決小人之筆行修無長者之論策第喧競於州府祈恩不勝於拜伏或明制纔出試遣捜敭驅馳府寺之門出入王公之第上啓陳詩唯希咳唾之澤摩頂至足兾荷提攜之恩故俗號舉人皆稱覓舉覓為自求之稱未是人知之詞察其行而度其材則人品於兹見矣徇己之心切則至公之理乖貪仕之性彰則廉潔之風薄是知府命雖高異叔度勤勤之讓黄門已貴無秦嘉耿耿之辭縱不能挹己推賢亦不肯待於三命豈與夫白駒皎皎不雜風塵束帛戔戔榮髙物表較量其廣狹也是以耿介之士羞自拔而致其辭循常之人舍其疎而取其附故選司補授喧然於禮闈州貢賓王諍訟於階闥謗議紛合浸以成風夫競榮者必有競利之心謙遜者亦無貪賄之累自非上智焉能不移在於中人理繇習俗若重謹厚之士則懷禄者必崇徳以修名若開趨競之源則邀仕者皆戚施而附會附㑹則百姓罹其弊修名則兆庶蒙其福故風化之漸靡不繇兹今訪鄉閭之談唯秪歸於里正縱使名虧禮則罪挂刑章或冐籍以偷資或邀勲而竊級假其不義之賂即是無犯鄉閭豈得比郭有道之詮量茅容望重裴逸民之賞拔夏少名高語其優劣也祗如才應經邦之流唯令試策武能制敵之例只驗彎弧若其文擅清奇便充甲第藻思微減旋即告歸以此收人恐乖事實何者樂廣假筆於潘岳靈運詞高於穆之平津文劣於長卿子建華麗於荀彧若以射策為最則潘謝曹馬必居孫樂之右若使恊贊機猷則安仁靈運亦無裨附之益繇此言之不可一槩而取也至如武藝則趙雲雖勇資諸葛之指撝周勃雖雄乏陳平之計略若使樊噲居蕭何之任必失指蹤之機使蕭何入戲下之軍亦無免主之効故鬬将長於摧鋒謀将審於料事是以文泉聚米知隗囂之可圖陳湯屈指識烏孫之自解八難之謀設髙祖退慙於酈生九拒之計窮公輸息心於伐木謀将不長於弓馬良士寧資於射策豈與夫元長自表廣飾詞鋒曹植題章虛飛麗藻較量其可不也伏望陛下降明制頒峻科千里一賢尚不為少僥倖冐進湏立隄防斷浮虛之飾詞收實用之良策不取無稽之説必求忠告之言文則試以効官武則令其守禦始既察言觀行終亦循名責實自然僥倖濫吹之伍無所藏其妄庸故晏嬰云舉之以語考之以事寡其言而多其行拙於文而工於事此取人得賢之道也其有武藝絶倫文鋒挺秀有効伎之偏用無經國之大才為軍鋒之爪牙作詞賦之標凖自可試凌雲之策練穿札之工承上命而賦甘泉禀中軍而令赴敵既有隨才之任必無負乘之憂臣謹案吳起臨戰左右進劍吳子曰夫提鼓揮桴臨難决疑此将事也一劍之任非将事也謹案諸葛亮臨戎不親戎服頓蜀兵於渭南宣王持勁卒不敢當此豈弓矢之用也謹案楊得意誦長卿之文武帝曰恨不得與此人同時及相如至終於文園令不以公卿之位處之者蓋非其所任故也謹案漢法所舉之主終身保任揚雄之坐田儀責其冐薦成子之居魏相酬於薦賢賞罰之令行則請謁之心絶退讓之義著則貪競之習消自然朝廷無爭禄之人選司有謙撝之士仍請寛立年限容其採訪簡汰堪用者試令職守以觀能否叅驗行事以别是非不實免王丹之官得人加翟璜之賞自然見賢不隱食禄不專則荀彧進鍾繇郭嘉劉隱薦李膺朱穆勢不云逺有稱職者受薦賢之賞濫舉者抵欺㒺之罪自然舉得其才則君子之道長矣盧棨中宗時為給事中神龍二年冬十月初有制皇太子在藩府日食封物每年便納東宫棨奏曰伏以皇太子處繼明重離當主鬯之尊歲時服用自可百司供擬又據周官諸司應用財器歲終則會唯王及太子不會此則儲蓄之費咸與王同今與列國諸侯齊衡入封豈所謂憲章在昔垂法将來者也帝納其言而已韋嗣立為兵部尚書景龍中上疏曰刺史縣令理人之首近年已來不存簡擇京官有犯及聲望下者方遣牧州吏部選人暮年無手筆者方擬縣令此風久扇上下同知将此理人何以致化今歲非豐稔戸口流亡國用空虛租調減削陛下不以此留念将何以理國乎臣望下明制其論前事使有司改換簡擇天下刺史縣令皆取才能有稱望充自今已後應有遷除諸曹侍郎兩省兩臺及五品已上清資望官先於刺史内取刺史無人然後餘官中求其御史員外郎等諸清要六品已上官先於縣令中取制中明言如是則人爭就刺史縣令矣得令天下大理萬姓欣然豈非太平樂事哉盧俌睿宗景雲中為右補闕時有上言天下置都督府不便命羣公卿士議定俌與太子右庶子李景伯等議曰牧伯之命非不古也洎漢襲秦罷侯置守方制萬里以綏兆人令出王庭威行郡國南海興利東海詳刑人以阜安其流多矣至漢武帝初置刺史秩六百石掌察墨綬以下其黄綬以上則不察焉所以全長吏之威行不擾之政也至漢成帝改置州牧秩二千石遂以秩髙自守而功業不著於是罷州牧又置刺史及東漢之時復置州牧王綱不振浸以陵夷則事之汙隆詳乎典策今天下諸州分𨽻都督專生殺之柄典刑賞之科若委非其人授受有失權柄既重疵釁或生又非彊幹弱枝經邦軌物者也其親置都督事恐不便今廵察御史秩卑任重御史之流也委以時廵姧宄自禁伏請愼考古道率繇舊章法乾元之簡易守前王之令典俾夫化洽昇平務依貞觀制度矣其後停焉李揆肅宗時為中書舍人時京師多盗賊有通衢殺人寘溝中者李輔國方恣横上請選羽林騎士五百人以備廵簡揆上疏曰昔西漢以南北軍相統攝故周勃因南軍入北軍遂安劉氏皇朝置南北衙文武區分以相伺察今以羽林代金吾警夜忽有非常之變将何以制之遂罷羽林之請李栖筠為工部侍郎代宗廣徳二年三月癸丑奏京畿諸縣百渠下王公寺觀碾磑凡七十餘所有妨農利竝請毁廢計收田租二百萬言入帝甚善之為權臣不便寢之沈既濟為左拾遺史館修撰徳宗建中二年五月二日勅宜令中書門下兩省分置待制官三十員仍於見任前資及同正兼試九品已上官中簡擇文學理道法度優深者具名聞奏度支據品秩量給俸錢并置本收利供廚料所須手力什物㕔宇等竝計料處分既濟上疏論之曰伏以陛下今日之理患在官煩不患員少患在不問不患無人且中書門下兩省官自常侍諫議補闕拾遺總四十員及常叅待制之官日有兩人皆備顧問亦不少矣中有二十一員尚闕人未充他司缺職累倍其數陛下若謂見官非才不足與議則當選求能者以代其人若欲廣務聰明畢收淹滯則當擇其可者先補闕員則朝無曠官俸不徒費且夫置錢息利是有司權宜非陛下經理之法今官三十員皆給俸錢幹力及廚料什噐建造㕔宇約計一月不減百萬以他司息利准之當以錢二千萬為之本方獲百萬之利若均本配人當復除二百戸反覆計之所損滋甚當今闗輔大病皆為百司息錢傷人破產積於府縣實思改革以正本源又臣常計天下財耗斁之大者唯二事焉最多者兵資次多者官俸其餘雜費十不當二事之一所以黎人重困軸杼猶空方斯緝熈必藉裁減豈俾閒官復為冗食藉舊而置猶可省也若之何加焉疏奏從之崔縱為御史大夫貞元元年九月縱上言准今年正月制宜令御史臺勘㑹内外官員商量併省停減仍集百僚詳議聞奏者臣伏以兵戎未息仕進頗多在官者又須褒賞比來每至選集不免㩀闕留人嘗歎遺才仍招怨望况縁頻有恩詔甄録功勞諸道叙優人數甚廣見須處置不可稽留今若停減吏員實恐未便於事非但承優者無官可授抑又叙進者無路可容本兾便人飜成歛怨恐須仍舊以適時宜更待事平然後議經度制曰可李紓貞元初為吏部侍郎嘗建議享武成王不當視文宣王用王者之禮袁高為給事中貞元二年帝以闗輔禄山兵戈之後百姓貧乏田疇荒穢詔諸道進耕牛時諸道觀察使各選揀耕牛進貢委京兆府勸課民戸勘責有地無牛百姓量其地著以牛均給之其田五十畆已下人不在給限髙上疏論之聖慈所憂切在下有田不滿十畆者是貧人請量三兩家共給牛一頭以濟農事疏奏從之陸贄為翰林學士貞元四年贄奏曰學士私臣𤣥宗初令待詔内庭止於唱和詩賦文章而已詔告所出本中書舍人之職軍興之際促迫應務權令學士代之今朝野乂寧合歸職分其命将相制詔請付中書行遣物議是之韋貫之憲宗初為右補闕時杜佑為相子從郁為左補闕貫之崔羣奏論宰相子不合為諫官尋降為左拾遺又論遺補雖品不同皆是諫官父為宰相子為諫官若政有得失不可使子論父乃改為祕書丞穆質為給事中元和三年九月奏諸州府鹽鐡使廵院應决私鹽使囚請州縣同監决免有寃濫從之李渤為給事中元和中以舊制隻日視事對羣臣渤奏論曰事君之義有犯無隱陳誠啟天不必擇辰今羣臣敷奏乃候隻日是畢歲臣下睹天顔獻可否者能幾何憲宗嘉之俄遷戸部侍郎穆宗時為諌議大夫理匭使長慶四年奏應進狀人論事大者請分析聞奏次者請申中書門下小者請各牒諸司諸司若處理不當復來投匭者即請具事繇聞奏如投匭人有欺誑責問得情狀請本罪之外更加一等又寳應元年六月勅如有告密人登時進狀分付金吾留身待進止今縁匭院無械繫之具忽慮兇暴之徒難以理制請勒安福門司領付金吾仗留身然後牒送御史臺京兆府冀絶凶人喧競從之渤又以左右常侍職叅規諷而循黙無言論之曰若設官不責其事不如罷之以省經費茍未能罷則請責職業王敦史敬宗時為膳部員外郎寳歴元年上言中外官寮准制封贈多請廻授祖父母臣謹詳古禮及國朝故事追贈出於鴻恩非繇臣下之求不繫子孫之便開元新詔唯許宰相廻贈於祖蓋以宰相位高封贈崇極故許廻授於義無妨近日常僚率援此例夫推讓於祖在父則然改奪於朝為子何忍伏望宣付宰臣重與依注詳議從之崔元略為戸部侍郎寳歴二年奏曰伏准賤役令内外六品已下官及京司諸色職掌人合免課役伏以設官之際大闗隄防給蠲之時不免踰濫至有因緣假冐多非本身臣自受此官已來無日而不見論請蠲牒必恐從兹不已天下無復有應役之人伏請自今以後應諸司見在官及准式合蠲免職掌人等竝先於本司陳牒責保待本司牒到然後給符其前資官即請於都省陳狀准前勘責事若不實竝准詐偽律論其孝子順孫義夫節婦及割股奉親比來州府懸免課役不繇所司覆請從今已後應有此色勅下後亦須先牒臣當司如不承戸部文符其課役不在免限制可宇文鼎為左司員外郎寳歴二年奏戸部尚書判度支胡証准兩度勅賜爵司御率府録事叅軍文約各一級今月五日勅下尚書省伏以胡濳等先丁母憂猶未終制豈得公然食邑茍竊恩榮下避三年之喪冐受五等之爵有傷教義實敗國風臣謬跡都曹職當綜覈致興物論不敢不舉勅宇文鼎所奏胡濳等爵宜令所司落下胡証職在殷繁事或錯誤特宜釋放司封本郎官委都省書罰文宗太和三年十月御史臺奏准勅差孟琯廵察米價其江西湖南地稱沃壤所出常倍他州俾其通流實資廵察若便空行文牒或慮遠郡未委詔條今孟琯既下淮南即去洪潭不遠伏望便令兼去洪潭可之仍令便道至浙西存恤四年祠部上言當司准赦書節文緇黄之衆蠶食生人規避王徭凋耗物力應諸州府度僧尼道士及創造寺觀累有禁令尚或因循自今已後非别勅處分妄有奏請者委憲司彈奏量加貶責於百姓中茍避徭役冐為僧道所在長吏重為科禁者謹具起請條件如後准天寳八年十一月十八日勅諸州府僧尼籍帳等每十年一造永為常式者其諸州府近日因循都不申報省司無慿收管造籍起今已後諸州府僧尼已得度者勒本州府具法名俗姓鄉貫戸頭所習經業及配住寺人數開頂分析籍帳送本司以明眞偽又将諸州府及京城應置方丈受戒僧尼身死及還俗者其告牒勒本寺綱維當日封送祠部其餘諸州府勒本州申送以憑注毁又諸州府僧尼籍帳准元勅十年一造今五年一造又天下僧尼冐名及非正度者縁經恩赦自太和三年十一月十八日勅前無憑追勘自今已後伏請切加禁斷先度者具名申省省司各給牒知為憑入籍又正度僧尼竝勒於省司請告牒其僧尼童子自今已後不得令私度如有此色勒當寺綱維申報本管長吏其與剃頭師長及專擅出家者當便科决勒還俗其綱維不申報十日已上勒停觧便令出寺其所在長吏不為糾舉者具名銜奏聽進止又諸州府及兩京除舊寺破壞要修理外竝不創建造寺仍請具每州縣管寺幾所每寺管僧尼幾人竝請具寺額僧尼名申省如有創造寺舍委本管長吏切加禁斷其僧尼有不依典教興販經紀行船駕車擅離本寺於公衙論競及在俗家夜結戒壇書符禁呪陰陽術數占相吉凶妄陳禍福既虧釋教與俗無殊自今已後切加禁斷如有此色委所在長吏量情科决使勒還俗其天下州府村坊佛堂普通私色蘭若義井等竝請割屬當州府寺收管又伏准元和元年二月十日勅京城及諸州府寺觀銅鐘因有破損湏更製造者請令州府申牒所司奏聞勅下許以本鐘再鑄不得更别添銅者其諸州府近日皆不守勅文擅有鼓鑄自今已後竝令申省臣等伏以當司公事廢闕多年名額空存事皆去本因起請再舉舊規比類叅詳依格可之九年三月都省奏湖州百姓韓巨川及庾威男道彰進狀稱庾威緣定戸左降及録事叅軍縣令等黜責事勅付尚書省四品已上官集議議曰定罪者必原其情議事者宜究其本庾威均稅之法情實擾人顧其施為必有工拙工者何也冨戸業廣以資自庇產多稅薄歸於羸弱威能盡簡并包者加籍取均困窮者蠲減取濟稅既頓異法亦稍嚴事歸平一人無寃訴此所謂威之工也其拙何也五縣土廣人姧徵簿書即隱占居多簡田苗即驚擾為慮散亂村野胥徒千人雖成功於己事之時而受弊於作法之始豈無他術用以周知竟此紛紜斯所謂威之拙也大凡為郡止於四過一者私加公稅二者逃失黎甿三者虐害平人四者冨潤私室庾威改張稅額賦不加徵聨綿歉灾人悉安業刑甚峻而下無屈禄不厚而賞無濫顧兹四者威無一焉而以擾人均稅投荒黜遠是使循常守故者得以稱功革弊去姧者坐以招譴誰能自苦納諸刑名觀沮之風於斯何在官職黜削本自庾威罪既無名官吏所宜牽復臺司所勘定稅本謂有害於人事既無私理當免復若因其案驗舉察細微以法吏合寘科條在衆議須明本末郡人逺訴益表事情幸遇聖明合從昭雪勅庾威定戸意在均稅臺司推勘慮以擾人近者王璠授威循王傳疑其連坐左遷録事叅軍杜膺及縣令等六人竝復本資官令狐楚為左僕射太和九年奏諸道新授方鎮節度使等具帑抹帶器仗就尚書省兵部叅辭伏以軍國異容古今定制若不繇舊斯為改常未聞省閣之門忽入弓刀之器鄭注外蒙恩寵内蓄凶狂首創奸謀將興亂兆遂致王璠郭行餘之輩敢驅將吏直詣闕廷震驚乗輿騷動京國血濺朝路屍僵禁街史册未書人神共憤既往不咎而其源尚開前件事宜伏乞聖恩速令停罷如湏叅謝即具公服從之歸融為戸部侍郎開成元年兼御史中丞湖南觀察使盧周仁違勅進羡餘錢十萬貫融奏曰天下一家何非君土中外財賦皆陛下府庫也周仁輙陳小利妄設異端言南方火灾恐成灰燼進於京國姑狥私誠入財貨以希恩待朝廷而何淺臣恐天下倣效以羡餘為名因縁刻剝生人受弊周仁請行重責以例藩方其所進錢請還湖南代貧下租稅詔周仁所進於河陰院收貯以備水旱李中敏為右諫議大夫充匭使開成三年中敏奏臣據舊例所有投匭進狀及書策文章等皆先具副本呈匭使其有詭異難行不令進入臣㝷簡文案不見本勅所繇但云貞元中奉宣恐是一時之事臣以為本置匭函每日從内将出日暮進入意者使寃濫無告有司不為申理者或論時政或陳利宜通其必達之路所以廣聰明而慮幽枉若使有司先具裁其可否即非重密其事俾壅塞自申於九重之意也臣伏請自今已後所有人進状及封章等臣但為封狀以進取舍可否斷自中㫖庶使名實在兹明置匭之本意從之韋昭度昭宗時為左僕射時大順元年十二月太康軍屯晉州李克用遣中使韓歸範還朝因上表訴寃言被賊臣張濬依倚朱全忠離間忠臣致削奪臣官爵朝廷欲令釋憾下羣臣議其可否昭度等議曰賞恭罰否前聖之令猷含垢匿瑕百王之垂訓是以雷解而羲文象徳網開而湯化歸仁用彼懷柔式存典範上自軒農之代下臻文武之朝㒺不允治寛𢎞以流霈澤况國家當徳宗守成之日憲宗致理之時車軌一同桑麻萬里燭龍外野悉在梯航大䑕窮郊咸歸正朔然猶王承宗擁兵鎭冀詔范希朝討之仍歲無功卒成赦宥而又朱㴞以幽州之衆結田悅李納王武俊之彊遣馬燧等征之不克旋又寛之以累聖之典模睿哲大朝之紀律文明非不欲勵彼風驅快其電掃然且考春秋之義稽鄭楚之文或退而許平服而便捨存於舊史載彼新書李克用代漢彊宗陰山貴胄呼吸而風雲作氣指麾而草樹成形仰天指心誓獻祑訾之首伏弢歐血屢親都䕶之營所謂為多上人自非窮來歸我及陛下聖考懿宗皇帝之朝彭門失守親驅驍卒首建殊功而先帝即位之初渚宫大擾復提義旅克静妖氛其後封豕長蛇薦食上國繼以子朝之亂皆因重耳之盟保大朝之宗祧垂中興於簡册蓋聖主之御天下也有勲可書有績可載宥過不忘於十代念功豈止於一時天高聽卑請事斯語且四海之内瘡痏尤殷九貢之邦綱條未整昨者遽起邠岐之衆尋已退還又徵燕薊之師倐聞内變出於饟饋失職資䨾絶供致此投戈是乖借箸蓋下計之未熟非聖謀之不臧儻宸斷重新天機間出録兹誠欵散彼師徒虛其念舊之懷待以如初之禮臣等所議實在於斯抑又聞往者漢将趙充國欲因邊境衰弱出兵擊之是時魏相上書畫陳利害且曰恃國家之大矜民人之衆欲見威於敵者謂之驕兵兵驕者滅非但人事乃天道也又曰臣不知此兵何名者也兵出無名事乃不成漢帝納之竟罷其伐伏惟皇帝陛下鑒往古用師之難採列聖遷善之美恩加區宇信及豚魚則臣等不勝懇願況今汴魏尤難幽定方困縱遣之調發豈能集事虛行號令以召宼讐將以勦人非惟辱國且黠戞斯舉勤王之衆推效命之誠未能單騎獨攻所望漢兵同力今兹數鎭奔命不遑難致濟師恐又生事諭其漸當暑熱非和戎旃悉力頒霑遣還蕃部重榮陳五郡之卒益謹闗防王珙振兩河之雄更嚴旗鼓然後奨其上表哀以自陳録彼前勞責之後効徵神爵之往典還日逐之故封諭其已斥王恭不使更疑晉帝凡百臣子實切乃誠其克用在身官爵竝請却還仍依前編屬籍從之册府元龜卷四百七十四
