body:
  text: 冊府元龜卷三百九十九宋王欽若等撰將帥部固守第一夫將兵之法有餘則戰不足則守蓋常道也春秋已來乃有保城亢敵堅壘拒㓂糾合羣志率勵衆力窮矢石之用極機械之變勢且危殆人皆疲弊彌旬月之久絶饟饋之給而能保全臣節甘心死地以至援兵甫集而長圍斯觧勍冦引去而危堞獲全亦有潛謀决䇿乗間掩擊出乎不意以收竒功至或智勇俱困衆寡不敵外絶赴救士無尺鐵遭罹非命不隕其名此春秋所謂獲死所矣趙襄子晉卿也智伯與趙韓魏滅范中行氏而分其地智伯請地韓魏韓魏與之請趙趙不與智伯怒遂率韓魏攻趙趙襄子懼乃奔保晉陽三國攻晉陽歳餘引汾水灌其城城不浸者三板國語云沈竈産蛙民無畔意田單齊諸田疏屬也燕攻齊城惟獨即墨不下燕引兵圍即墨即墨大夫出與戰敗死城中相與推田單立以為將軍以即墨拒燕軍乃收城中得千餘牛為綘繒衣畵以五彩龍文束兵刃於其角而灌脂束葦於其尾端鑿城數十穴夜縱牛壯士五千人隨其後牛尾熱怒而奔燕軍燕軍夜大驚牛尾炬火光明炫燿燕軍視之皆龍文所觸皆死傷五千人因銜枚擊之而城中皷譟從之老弱皆擊銅噐為聲聲動天地燕軍大駭敗走齊人遂夷殺其將騎刼燕軍擾亂奔走齊人追亡逐北所過城邑皆畔燕而歸田單兵日益多乗勝燕日敗亡卒至河上而齊七十餘城皆復於齊後漢張宗為偏將軍時鄧禹軍到栒邑赤眉大衆且至禹以栒邑不足守欲以師進就堅城而衆人多畏賊追憚為後拒禹乃書諸將名於竹簡署其前後亂著笥中令各探之笥以竹為之鄭𤣥注禮記云圓曰簟方曰笥宗獨不肯探曰死生有命張宗豈辭難就逸乎禹歎息謂曰將軍有親弱在營奈何不顧宗曰愚聞一卒畢力百人不當萬夫致死可以橫行宗今擁兵數千以承大威何遽必其敗乎遂留為後拒諸營既引兵宗方勤勵軍士堅壘壁以死當之禹到前縣議曰以張將軍之衆當百萬之師猶以小雪投沸湯雖欲戮力其勢不全也乃遣歩騎二千人反還迎宗宗引兵始發而赤眉卒至宗與戰却之乃得歸營於是諸將服其勇來歙為大中大夫時隗囂據天水自稱西州上將軍歙與征虜將軍祭遵襲囂略陽斬囂守將金梁因保其城囂悉兵數萬人圍略陽斬山築堤激水灌城歙與將士固死堅守矢盡乃發屋斷木以為兵囂盡鋭攻之自春至秋其士卒疲弊光武乃大發関東兵自將上隴囂衆潰走圍觧耿恭為戊己校尉屯金蒲城眀帝永平十八年三月北單于遣左鹿蠡王萬騎擊車師恭遣司馬將軍三百人救之逢匈奴騎多皆為所殁匈奴遂破後王安徳而攻金蒲城恭乗城摶戰以毒藥𫝊矢語匈奴曰漢家箭神其中瘡者必有異因發彊弩射之虜中矢者視瘡皆沸遂大驚㑹天暴風雨隨雨擊之殺傷甚衆匈奴震怖相謂曰漢兵神真可畏也遂觧去恭以疏勒城傍有澗水可固五月乃引兵據之七月匈奴復來攻恭恭募先登數千人直馳之胡騎散走匈奴遂於城下壅絶澗水恭於城中穿井十五丈不得水吏士渇乏笮馬糞汁而飲之恭仰歎曰聞昔貳師將軍㧞佩刀刺山飛泉涌出今漢徳神明豈有窮乎乃整衣服向井再拜為吏士禱有頃泉奔出衆皆稱萬歳乃令吏士揚水以示虜虜出不意以為神明遂引去時焉耆龜兹攻殁都䕶陳睦北虜亦圍関寵於桞中㑹明帝崩國哀救兵不至車師復畔與匈奴共攻恭恭勵士衆擊走之後王夫人先世漢人常私以虜情告恭又給以糧餉數月食盡窮困乃煑鎧弩食其筋革恭與士推誠同死生故皆無二心而稍稍死亡餘數十人單于知恭己困欲必䧏之復遣使招恭曰若䧏者當封為白屋王妻以女子恭乃誘其使上城手擊殺之炙諸城上虜官屬望見號哭而去單于大怒更益兵圍恭不能下初関寵上書求救時帝乃遣征西將軍耿秉等赴援章帝建初元年正月㑹桞中擊車師攻交河城斬首三千八百級獲生口三千餘人驢馬牛羊三萬七千頭北虜驚走車師復䧏㑹関寵已殁王蒙等聞之便欲引兵還先是恭遣軍吏范羌至燉煌迎兵士寒服羌因隨王蒙軍俱出塞羌固請迎恭諸將不敢前乃分兵二千人與羌從山北迎恭遇大雪丈餘軍僅能至城中夜聞兵聲以為虜來大驚羌乃遥呼曰我范羌也漢遣軍迎校尉耳城中皆稱萬歳開門共相持涕泣明日遂相隨俱歸陳球為零陵太守下濕編木為城不可守零陵郡中惶恐椽吏白遣家避難球怒曰太守分國虎符受任一邦豈顧妻孥而沮國威重乎復言者斬乃悉内吏人老弱與共城守絃大木為弓羽矛為矢引機發之遠射千餘歩多所殺賊復激流灌城球輙於内因城勢反决水淹賊相拒十餘日不能下㑹中即將度尚救兵至球募士卒與尚共破斬朱蓋等公孫瓚為遼東屬國長史追畔胡丘力居等反為所圍於遼西管子城二百餘日糧盡食馬馬盡煑弓楯力戰不敵乃與士卒辭訣各分散還時多雨雪墜坑死者十五六虜亦飢困逺走桞城皇甫嵩為左將軍時凉州賊王國圍陳倉嵩督前軍董卓救之卓欲速進赴陳倉嵩不聼卓曰智者不後時勇者不留决速救則城全不救則城滅全滅之勢在於此也嵩曰不然百戰百勝不如不戰而屈人之兵是以先為不可勝以待敵之可勝不可勝在我可勝在彼彼守不足我攻有餘有餘者動之九天之上不足者陷於九地之下今陳倉雖小城守固備非九地之陷也王國雖彊而攻我之所不救非九天之勢也夫勢非九天攻者受害陷非九地守者不㧞國今已陷受害之地而陳倉保不㧞之城我可不煩兵動衆而取全勝之功何救焉遂不聼王國攻陳倉自冬迄春八十餘日城堅守固竟不能㧞賊衆疲弊果自觧去魏韋康為梁州刺史為馬超所圍堅守歴時救軍不至遂為超所殺曹仁行安西將軍屯樊即拜征南將軍關公攻樊時漢水暴溢于禁七軍皆没禁䧏蜀仁人馬數千人守城城不沒者數板蜀軍乗船臨城圍數重外内斷絶糧食欲盡救兵不至仁激勵將士示以必死將士感之皆無二志徐晃救至水亦稍減晃外擊蜀兵仁得潰圍出蜀退走初滿寵為汝南太守曹仁屯樊城拒蜀而左將軍于禁等於㐮陽以霖雨水長為蜀所没蜀急攻樊城得水往往頽壊衆皆失色或謂仁曰今日之危非力所能救可乘蜀圍未合乗輕船夜走雖失城尚可全身寵曰山水速疾冀其不久聞蜀遣别將已在郟下自許以南百姓擾擾蜀所以不敢遂進者恐吾軍掎其後耳今若遁去大河以南非復國家有也君宜待之仁曰善寵乃刑白馬與軍人盟誓㑹徐晃等救至寵力戰有功蜀遂退進封安昌亭候郝昭築陳倉城㑹蜀將諸葛亮圍之亮使人説誘之昭不從亮自以有衆數萬而昭兵纔千餘人又度東救未能便到乃進兵攻昭起雲梯衝車以臨城昭於是以火箭逆射其雲梯梯燃梯上人皆燒死昭又以繩運石磨壓其衝車折亮乃更為井闌百尺以射城中以土丸填塹欲直攀城昭又於内築重墻亮又為地突欲涌出於城裏昭又於城内穿池橫截之晝夜相攻拒之二十餘日亮無計救至引退文聘為後將軍孫權以五萬衆自圍於石陽甚急聘堅守不動權住二十餘日乃觧去聘追擊破之張特守新城諸葛恪圍城特與將軍樂方等三軍衆合有三千是時吏兵疾病及戰死者過半而恪起土山急攻城將陷不可䕶持乃謂吳人曰今我無心復戰也然魏法被攻過百日而救不至者雖䧏家不坐也自受敵以來九十餘日矣此城中本有四千餘人而戰死者過半城雖陷尚有半人不欲䧏者我當還相語之條名别著善惡明日早送名且持我印綬去以為信乃投其印綬以與之吳人聼其辭而不攻印綬亦復不取頃之特還乃夜徹諸屋材柵補其缺為二重明日謂吳人曰我但有闘死耳吳人大怒進攻之不能㧞遂引去朝廷嘉之加雜號將軍封列侯又遷安豐太守蜀霍峻為中即將先主南還襲劉璋令峻守葭萌璋將扶禁向存等帥萬餘人由閬水上攻圍峻且一年不能下峻城中兵纔數百人伺其怠隙選精鋭出擊大破之即斬存首先主定蜀嘉峻之功乃分廣漢為梓潼郡以為梓潼太守禆將軍王平為討㓂將軍諸葛亮圍祁山平别守南圍魏大將軍司馬宣王攻亮張郃攻平平堅守不動郃不能克羅憲為巴東太守吳聞魏攻敗蜀起兵西上外托救援内欲襲憲憲曰本朝傾覆吳為唇齒不恤我難而徼其利背盟違約且漢已亡呉何得久寕能為呉䧏虜乎保城繕甲告誓將士勵以節義莫不用命吳聞鍾鄧敗百城無主有兼蜀之志而巴東固守兵不得過使歩協率衆而西憲臨江拒射不能禦遣叅將楊宗突圍北出告急安東將軍陳騫又送文武印綬任子詣晉王協攻城憲出與戰大破其軍孫休怒復遣陸抗等率衆三萬人増憲之圍被攻凢六月日而救援不到城中疾病大半或説憲奔走之計憲曰夫為人主百姓所仰危不能安急而棄之君子不為也畢命於此矣陳騫言於晉王遣荆州刺史胡烈救憲抗等引退晉王即委前任拜憲凌江將軍封萬年亭侯憲仕蜀為巴東太守劉禪䧏乃歸順於魏繕甲完聚勵以節義士皆用命及鍾㑹鄧艾死百城無主吳又使歩協西征憲大破其軍孫休怒又遣陸抗征之憲拒守經年救援不至城中疾疫大半或勸南出牂牁北奔上庸可以保全憲曰夫為人主百姓所仰既不能存急而棄之君子不為也畢命於此矣㑹荆州刺史胡烈等救至抗退加凌江將軍監巴東軍事使持節領武陵太守㤗始初入朝詔曰憲忠烈果毅有才䇿幹噐可給皷吹又賜以𤣥玉佩劍吳朱然為征北將軍假節鎮江陵魏遣曹真夏侯尚張郃等攻江陵魏文帝自住宛為其勢援連屯圍城吳帝遣將軍孫盛督萬人備州上立圍塢為然外救郃度兵攻盛盛不能拒即時却退郃據州上圍守然中外隔絶吳帝遣潘阜楊粲等救而圍不觧時然城中兵多腫病堪戰者纔五千人真等起土山鑿地道立櫓樓臨城弓矢雨注將士皆失色然晏如而無恐方勵吏士伺間隙攻破两屯魏攻圍然凢六月日未退江陵令姚㤗領兵備城北門見外兵盛城中人少糓食欲盡因與敵交通謀為内應垂發事覺然治戮㤗尚等不能克乃撤攻退還繇是然名震於敵國韓當為偏將軍曹真攻南郡當保東南帥勵將士同心固守又敬戒督司奉遵法令太守善之晉吳彦初仕吳為建平太守晋將伐吳彦為鐵鎖橫斷江路及師臨境縁江諸城皆望風䧏附或見攻而㧞惟彦堅守大衆攻之不能克乃退舍俟之吳平始䧏張光為北地都尉趙王倫為関中都督氐羌反叛太守張損戰没郡縣吏士卒少有全者光以百餘人戍馬蘭山北賊圍之百餘日光撫勵將士屢出竒兵擊賊破之光以兵少路遠自分敗没㑹梁王彤遣司馬索靖將兵迎光舉兵悲泣遂還長安庾亮為中書令都督征討諸軍事與陶侃温嶠起兵討蘇峻亮時以二千人守白石壘峻歩兵萬餘四靣來攻衆皆震懼亮激勵將士竝殊死戰峻軍乃退追斬數百級桓宣為南中即將江夏相鎮襄陽十餘年間石季龍再遣騎攻之宣能得衆心每以寡弱拒守論者以為次於祖逖周訪前凉張璩為寕戎校尉時石季龍將麻秋進攻枹罕與晋陽太守郭坦以城大難守宜棄外城武城太守張悛曰棄外城則大事去不可以動衆心璩從之固守大城秋率衆八萬圍塹三重雲梯雹車地突百道皆通於内城中亦應之殺傷秋衆已數萬季龍復遣其將劉渾等率歩騎二萬㑹之郭坦恨言之不從敎軍士李嘉士與秋通引賊千餘入城西北隅璩使宋修張𢎞辛􅀈郭普等拒之短兵接戰斬二百餘人賊乃退璩戮李嘉士以徇燒其攻具秋退保大夏謂諸將曰我用兵於五都之間攻城略地逺無不㨗乃登秦隴謂有征無戰豈悟南襲仇池破軍殺將築城長最匹馬不歸反攻此城傷兵挫鋭殆天所贊非人力也季龍聞而嘆曰吾以偏師定九州令以九州之力困於抱罕真所謂彼有人焉未可圖也宋毛徳祖為司州刺史時文帝初即位後魏眀元自率衆至方城遣鄭兵將軍達奚斤吳兵將軍公孫表二萬餘人攻滑臺徳祖時戍虎牢遣歩騎三千拒之初亡命司馬楚之等藏竄陳留郡界魏既南渡馳相要結驅扇疆場大為民患魏克滑臺并力乗勝遂至虎牢眀元自率大衆至鄴鄭兵遂克金墉還向虎牢徳祖於城内穴地入七丈二道出城外分作六道出虜陣後募敢死士四百人為前驅叅軍即王符等以二百人為後係出賊圍外掩襲其後魏陣亂斬首數百級焚燒攻具魏雖退散隨後更合魏又遣楚兵將軍渉歸東擊青州所向城邑皆奔走眀元自遣兵益虎牢増圍急攻徳祖大敗又固得城魏領楚兵自滑臺諸軍西就兵共攻虎牢虎牢被圍二百日無日不戰徳祖勁兵戰死殆盡而虎牢増兵轉多外城皆已毁徳祖惟保一城晝夜相持拒將士眼皆生瘡死者大半徳祖恩素結下衆無難心魏作地道偷城内井井深三十丈山勢峻峭不可得防人馬渇乏肌體皆乾燥被創者不復出血魏急攻遂克虎牢自徳祖還諸將佐及郡守在城内皆見囚執惟上黨太守劉談之叅軍范道基將二百人突重圍南還城將潰將士欲扶徳祖出奔徳祖曰我與此城并命義不使城亡而身存也眀元重其固守之節勒衆軍生致之劉道錫為巴西梓潼二郡太守文帝元嘉十八年為氐㓂所攻道鍚募吏民守城復租布二十年保城退敵文帝嘉之陳憲為汝南太守元嘉二十六年魏太武南侵陳潁遂圍汝南懸瓠城憲保城自固賊晝夜攻之憲且守且戰矢石無時不交虜多作髙樓施弩以射城内飛矢雨下城内負户以汲又佛浮圖取金像以為大鈎施之衝車端以牽樓垤城内有一沙門頗有機思輙設竒以應之賊多作蝦䗫車以填塹内薄攻城憲督勵將士憑城墻而戰賊之死者屍與城等遂登屍以上城短兵相接憲鋭氣愈厲戰士無不一當百傷殺萬計汝水為之不流相拒四十餘日豫州刺史南平王鑠遣安蠻司馬劉康祖并寕朔將軍臧質救之虜燒攻具走沈璞為旴𣅿太守時王師北伐彭汴為虞璞以彊㓂對陣事未可測郡境首當衝要乃修城壘浚重隍聚材石積鹽米為不可勝之算後魏太武自領歩騎數十萬陵踐六州京邑為之騷懼百守千城莫不奔駭腹心勸璞還京師璞曰若彼大衆不攻小城故無所懼若兵薄來攻則成擒也諸軍何常見數十萬人聚在一處而不敗者昆陽合肥前事之明驗此是吾報國之秋諸君封侯之日璞收得二千精卒及太武至四靣蟻集攻城璞隨應拒攻守三旬殘其大半太武遁走申恬為通直常侍元嘉二十七年後魏武昌王㓂青州遣恬援東陽因與輔國司馬齊郡太守龎秀之保城固守蕭斌遣青州别駕觧榮之率垣䕶之還援恬仍倚南山得入後魏兵朝來脅城日晚輙退城内乃出車北門外環塹為營欲挑戰魏兵不敢逼停五日東過抄略青河郡及驛道南數千家從東安東莞出下邳下邳太守垣閬閉城拒守保全二千餘家後魏退以恬為寕朔將軍山陽太守臧質為輔國將軍北討時冗從僕射胡崇之為魏所敗質奔旴𣅿太守沈璞完為守戰之備城内有實力三千質大喜因共守魏初南出後無資糧唯以百姓為命及過淮食平越石鼈二屯谷至是抄掠無所人馬飢困聞旴𣅿有積粟欲以為歸路之資既破崇之等一攻城不㧞便引兵南向城内増修守備莫不完嚴元嘉二十八年後魏太守南侵自廣陵北反悉力攻旴𣅿就輔國將軍臧質求酒質封溲便與之太武怒甚築長圍一夜便合開攻道趨城東北運東山土石填之魏又恐城内水道遁去乃引大船於軍山作浮橋以絶淮道城内乗艦逆戰大破之眀旦賊更方船而為桁各嚴兵自衞城内更擊不能禁遂於軍山立桁水陸路竝斷太武與質書曰吾今所遣鬬兵盡非我國人城北是丁零與胡南是三秦氐羌設使丁零死者正可减常山趙郡賊胡死正减并州賊氐羌死正减関中賊卿若殺丁零胡無不利質答書曰省示具悉姦懐爾自恃四脚屢犯國疆諸如此事不可具説王元謨退於東梁坦散於西爾謂何以不聞僮謠言邪虜馬飲江水佛狸死邜年此期未至以二軍開飲江之徑爾㝠期使然非復人事寡人受命相滅期之白登師行未遠爾自送死豈容復令饗有桑乾哉但爾住攻此城假令寡人不能殺爾爾繇我而死爾若有幸得為亂兵所殺爾若不幸則生相鏁縳載以驢直送都市我本不圖全若天地無靈力屈於爾虀之粉之屠之裂之如此未足謝本朝爾識智及衆力豈能勝符堅邪頃年展爾陸梁者是爾未飲江太歳未卯故爾觓蘭昔深入彭城值少日雨隻馬不反爾豈憶邪即時春雨已䧏四方大衆始就雲集爾但安意攻城莫走糧食缺乏者告之當出廩相給得所送劒刀欲令我揮之爾身邪甚苦人附反各自努力無煩多云是時魏中童謠曰軺車北來如穿雉不意虜馬飲江水魏王北歸石濟死魏欲渡江天不從故質書引之太武大怒乃作鐵牀於其上施鐵鑱云破城得質當坐之此上質又與魏衆書曰示詔魏中諸士庶狸伐見與書如别等正朔之民為何力自取如此大丈夫豈可不知轉禍為福耶今寫臺格如别書自思之時購賊太武封開國縣侯食邑一萬户賜布絹各萬疋魏以鈎車鈎垣樓城内繫以彄絙數百人呌呼引之車不能退質夜以木桶盛人懸出城外截鈎獲之眀日又以衝車攻城城土堅宻每至頽落不過數升魏乃肉薄登城分番相代墜而復升莫有退者殺傷萬計魏人死者與城平又射殺其髙梁王如此三旬死者過半太武聞彭城斷其歸路京邑遣水軍自海入淮且疫疾死者甚衆二月二日乃觧圍遁走文帝嘉質功以為持節監雍梁南北秦四州諸軍事冠軍將軍寕蠻校尉雍州刺史封開國子食邑五百户劉襲為安城太守晋安王子勛為逆襲據郡拒之勛遣軍攻圍不能下明帝嘉之桞世榮為前軍長史順帝初沈攸之反圍郢城世隆固守南齊曹虎為右大將軍持節𨽻都督陳顯逹停㐮陽眀帝永㤗元年後魏攻沔北度支尚書崔恵景於鄧地大敗魏軍追至沔北孝文率十萬衆從羽儀華蓋圍樊城虎牢閉門固守魏軍去城數里立營頓設氊屋復再圍樊城臨沔水望㐮陽岸乃去梁蔡道恭為平北將軍司州刺史武帝天監三年魏圍司州城中不滿五千人食裁及半歳魏軍攻之晝夜不息道恭隨方抗禦皆應手摧却魏乃作大車載土四靣俱前欲以填塹道恭於塹内列艨衝鬬艦以待之魏人不得進又濳作伏道以决塹水道恭載土㹠塞之相持百餘日前後斬獲不可勝計魏大造梯衝攻圍日急道恭於城内作土山厚二十餘丈多作大槊長二丈五尺施長刃使壯丁刺魏人登城者魏軍甚憚之庾域為寕朔將軍巴西梓潼二郡太守屬梁州長史夏侯道遷舉州叛䧏魏魏進襲巴西域固守百餘日城中糧盡將士皆齕草食土死亡者大半無有離心魏軍退武帝詔増封二百户昌義之為北徐州刺史魏中山王元英圍義之於鍾離衆號百萬武帝詔豫州刺史韋叡率豫州之衆㑹征北將軍曹景宗以赴救人畏魏軍盛多勸叡緩行叡曰鍾離今鑿穴而處負户而汲車馳卒奔猶恐其後而况緩乎魏人已墮吾腹中卿曹勿憂也旬日而至邵陽大破魏軍叡遣報義之義之且悲且喜不暇答語但呌曰更生更生羊侃為都官尚書侯景反侃為守城督侃偽稱得外射書云邵陵王西昌侯兵已至近路衆乃少安賊為尖頭木驢攻城矢石所不能制侃作雉尾炬施鐵鏃以油灌之擲驢上燒之俄盡賊又東西两靣起土山以臨城城中驚駭侃命為地道潛引其土山不能立賊又作登城樓車髙十餘丈欲臨射城内侃曰車髙塹虚彼來必倒可卧而觀之不勞備設及車動果倒衆皆服為賊頻攻不息㑹侃病死城方陷王僧辨為領軍將軍既平湘土㑹侯景浮江西㓂軍次夏首僧辨為大都督率巴州刺史淳于量定州刺史杜龕宜州刺史王琳等共赴西陽軍次巴陵聞郢州已沒僧辨因據巴陵城帝乃命羅州刺史徐嗣徽武州刺史杜崱竝㑹僧辨于巴陵景既陷郢城兵衆益廣徒黨甚鋭將進冦荆州乃使偽儀同于和統兵五千守江夏大將宋子仙前驅一萬造巴陵景悉兇徒水陸繼進於是縁江戍邏望風請服賊邏至於隐磯僧辨悉上江渚米糧竝沉公私船於水及賊前鋒次江口僧辨乃分命衆乗城固守偃旗卧皷守若無人翼日賊衆濟江輕騎至城下問城内是誰答曰是王領軍賊曰語王領軍勢如此何不早䧏僧辨使人答曰大軍但向荆州此城自當非礙僧辨百口在人掌握豈得便䧏賊騎既去俄又再來曰我王已至王領軍何為不出與王相見乎僧辨不答頃之又執王珣等至于城下珣為書誘説城内景帥船艦並集北寺又分入港中登岸引道廣設壇屋耀軍城東隴上芟除草開八道向城遣五十兎頭内薄苦攻城内同時皷譟矢石雨下殺賊既多賊乃引退帝又命平北將軍胡僧佑率兵下援僧辨是日賊復攻巴陵水歩十處鳴鼓吹角内薄砍上城中放木擲火㸑壘石殺傷甚多午後賊退乃更起長柵繞城大列舸艦以樓船攻水城西南角又遣人渡洲岸引牂牁推蝦䗫車填塹引障車臨城二日方止賊又於艦上竪木桔橰聚茅置火以燒木柵風勢不交自焚而退既頻戰摧挫賊帥任約又為陸法和所擒景乃燒營夜遁陳杜稜初仕東梁為石州刺史髙祖鎮朱方以稜監義興瑯琊二郡髙祖征杜龕留稜與侯安都居守徐嗣徽任約引齊㓂濟江攻臺城稜與安都隨方抗拒晝夜廵警撫綏士卒未嘗觧帶賊平以功除通直散騎常侍左衛將軍丹陽尹杜龕為忠武將軍與叔㓜安俱隨王僧辨討河東王平之又隨僧辨下繼徐文盛軍至巴陵聞侯景襲陷郢州西上將至乃與僧辨等守巴陵以待之景至圍之數旬不尅而遁韋載初為梁義興太守髙祖至王僧辨乃遣周文育輕兵襲載未至而載先覺乃嬰城自守文育攻之甚急載所屬縣宰竝髙祖舊兵皆善用弩載收得數十人繫以長鎻命所親監之使射文育軍約曰十發不两中者則死每發輙中所中者皆斃文育軍稍却因於城外據水立柵相持數旬髙祖自將征之克其水柵仍遣族弟翽齎書喻以誅僧辨意并奉梁敬帝勅令觧兵乃以兵衆䧏孫瑒梁末為巴州刺史髙祖受禪王琳立梁永嘉王蕭莊於郢州徵瑒為太府卿加通直散騎常侍都督郢荆巴武湘五州諸軍事安西將軍郢州刺史總留府之任周遣大將軍史寕率衆四萬乗虚奄至瑒助防張世貴舉外城以應之所失軍民男女三千餘口周軍又起土山髙梯日夜攻逼因風縱火燒其内城南靣五千餘樓時瑒兵不滿千人乗城拒守瑒親自撫廵行酒賦食士卒皆為之用周人苦攻不能克乃矯授瑒柱國郢州刺史封萬户郡公瑒偽許以緩之而潛修戰具樓雉噐械一朝嚴設周人甚憚焉及聞大軍敗王琳乗勝西進周兵乃觧後魏薛强祖興仕晋為冀州刺史安邑公父濤襲爵位梁州刺史京師傾覆皆以義烈著聞後强復代領及符堅將張平以并州叛堅率衆討之因自與數百騎馳至強壘下求與相見強使主簿責之因慷慨宣言曰此城終無生降之臣但有死節之將耳堅諸將請攻之堅曰湏吾平晉自當靣縛捨之以勸事君者張烈孝文時為凌江將軍順陽太守烈到郡二日便為齊東昏侯將崔慧景攻圍七十餘日烈撫勵將士甚得軍人之和㑹車駕南討慧景遁走孝文親勞曰卿定可遂能不負所寄烈拜謝曰若不值鑾輿親駕臣將不免困於犬羊元世儁任城王澄孫孝明帝時為青州刺史邢杲之亂圍逼州城拒守遂得保全畢祖暉為平東將軍幽州刺史正光五年幽州民反招引隴賊攻逼城以祖暉前在州日得民情和復授平西將軍幽州刺史假安西將軍為别將以討之祖暉且前突圍入治孝昌中渤海王顥救至圍始觧以全城之勲封新昌縣開國子食邑四百户李神儁為前將軍荆州刺史時四方多事所在連兵梁遣將曹敬宗來㓂攻圍積時又引水灌城城不没者數板神儁循撫兵民戮力固守詔遣都督崔進别將王羆裴衍等赴援敬宗退走源子雍為夏州刺史屬沃野鎮人破落汙披陵首反亂所在蜂起統萬逆胡與相應接子雍嬰城自守城中糧盡煑馬皮而食之子雍善綏撫得士之心人人戮力無有離二以飢饉轉切欲自出求糧留子延伯據守僚屬僉云今天下分析強賊百重四方音信莫不斷絶俄頃之間變在不意何宜父子如此分張未若棄城俱去更展規略子雍泣而謂衆曰吾世受國恩早受藩寄此是死地更欲何求然守禦以來嵗月不淺所患乏糧不得制勝吾今向東州得數月之食還與諸人保全必矣遂自率羸弱向東夏運糧延伯與將士送出城外哭而辭拜三軍莫不嗚咽子雍行數日為朔方胡帥曹阿各㧞所邀力屈為其所執子雍宻遣人齎書間行與城中文武云大軍在近努力固守必令諸人福流苖裔乃勅延伯令共固守子雍雖被囚執雅為胡人所重嘗以尊禮事之子雍為陳安危禍福之理勸阿各㧞令䧏阿各㧞將從之未果而死㧞弟桑生代領部衆竟隨子雍䧏延伯與兵士共分湯菜防固城隍及子雍為胡所執合城憂懼延伯乃人人曉諭曰吾父吉凶不測方寸焦爛實難裁割但奉命守城所謂處重若以私害公誠孝竝闕諸君幸得此心無虧所寄於是衆感其義莫不勵憤朝廷聞而嘉之除龍驤將軍行夏州卒能固守裴詢為平南將軍郢州刺史梁將李國興㓂邊四方多事朝廷未遑外略縁境戍多為國興所陷賊已乗勝遂向州城詢率勵固守將至百日援軍既至兵乃退加散騎常侍安南將軍辛祥為郢州龍驤校尉長史帶義陽太守自長生之反也梁武遣衆來援因此縁淮鎮戍相繼䧏没惟祥堅城獨守劉長文為南兖州冠軍府長史帶譙郡太守被圍糧竭長文固節全城崔楷為殷州刺史州既新立了無備禦之具及賊來攻楷率力抗拒彊弱勢懸每勒兵士撫勵之莫不爭奮咸稱崔公尚不惜百口吾何為愛一身連戰半旬死者相枕力竭城陷楷執節不屈賊遂害之鄭季眀為醮郡太守帶渦陽戍主頻為梁武遣將攻圍時兵糧寡少外援不接季眀孤城自守卒得保全朝廷嘉之楊津為定州刺史賊帥薛修禮杜雒周殘掠州境孤城獨立在两㓂之間津貯積柴粟修理戰具更營雉堞賊每來攻機械競起又於城中去城十歩掘地至泉廣作地道濳兵涌出置爐鑄鐵持以灌賊賊遂相語曰不畏長槊堅城惟畏楊公鐵星津與賊帥元洪業及與賊中督將尉靈根程殺鬼潘法顯等書曉諭之并受鐵劵許以爵位令圖賊帥毛普賢洪業等感悟復書云今與諸人宻議欲殺普賢願公聼之又賊欲圖城正為取北人耳城中所有北人必湏盡殺公若置之是縱敵為患耳願公察之津以城内北人雖是惡黨然掌握中物未忍便殺但嚴内子城防禁而已將吏無不感其仁恕朝廷初以鐵劵二十枚委津分給津隨賊中首領間行送之修禮普賢頗亦繇此而死既而杜雒周圍州城津盡力禦守詔加衞將軍封開國縣侯將士有功者任津料賞兵民給復畢祖朽為安東將軍瀛州刺史為賊帥鮮于修禮攻圍積旬拒守自固孟表為南兖州刺史領馬頭太守鎮渦陽後齊遣其豫州刺史裴叔業攻圍二十餘日城中食盡唯以朽革及草木皮葉作糧表撫循將士戮力固守㑹鎮南將軍王肅觧義陽之圍還以救之叔業乃退薛懐吉為征虜將軍時梁武遣將軍㓂陷郢州三關詔元英南討懐吉仍為軍司以義陽危急令懐吉馳驛先赴時豫州城民白早生殺刺史以懸瓠入梁梁將齊茍仁率衆守城於是自懸瓠以至於安陸唯義陽一城而已懐吉與郢州刺史婁悦督勵將士且戰且守卒全義陽閻進有謀略勇冠當時為龍驤將軍屬衛可孤作亂攻圍盛樂進率衆拒守緜歴三載晝夜交戰未嘗休息以少擊衆城竟得全李神為相州刺史假李昌中行相州事尋正加撫軍將軍假鎮東將軍大都督建義初除衞將軍時葛榮充斥民多逃散先是州將元監反叛引賊後都督源子雍裴衍戰敗被害朝野憂惶人不自保而神志氣自若無勞兵民小大用命既而葛榮盡鋭攻之乆不能克㑹爾朱榮擒葛榮於鄴西土平除車騎將軍潘永基為持節平北將軍冀州防城都督長樂太守于時葛榮攻信都長圍遏水以灌州城永基與刺史元孚同心戮力晝夜防拒外無軍援内乏糧儲從春至冬力窮乃陷辛纂為南道行臺時梁將曹義宗攻新野纂率衆赴援唯以二千餘兵捍禦疆場尋為義宗所圍相率固守莊帝即位除通直散騎常侍征虜將軍兼尚書仍行臺後大都督費穆擊義宗擒之入城因舉酒屬纂曰㣲辛行臺之在斯吾亦無繇建此功也入朝言於莊帝稱纂固節危城宜蒙爵賞以勸將來帝乃下詔慰勉之杜顒為岐州刺史万俟醜奴亂關右顒為都督防守岐州醜奴攻之不尅冊府元龜卷三百九十九
