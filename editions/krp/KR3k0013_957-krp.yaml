body:
  text: 册府元龜卷九百五十七宋王欽若等撰外臣部國邑禹貢之制五百里荒服曰蠻曰荒周官衛服之外曰蠻曰夷曰錯曰藩皆戎夷之區聲教㒺逹職貢無法流移靡常可以德綏難以力制也漢武承富庶之業好疆塲之功或討以戈甲或餌以玉帛猛將椎鋒以挫其銳辯士緩頰以動其心是以三王之所不臣六經之所不載皆充斥蠻夷之邸俯伏北闕之下至乃涉懸度越流沙泛重溟踰峻嶺囘面受吏稽顙述職焉其後經畧所至軌跡漸廣或卉服入覲或輶軒出使莫不詢其封域考其都鄙記里候之遐邇詳版籍之衆寡告於史氏著之方册今之論次者亦以續伯益之山經備成周之士訓云爾東夷朝鮮者周武王勝殷釋箕子之囚箕子不忍受周之釋走之朝鮮武王聞之因以朝鮮封之周末燕人衛滿自始全燕時嘗畧屬眞番一作莫遼東有番汗縣番音普寒切朝鮮為置吏築鄣塞秦滅燕屬遼東外徼漢興為其遠難守復修遼東故塞至浿水為界屬燕燕王盧綰叛入匃奴滿亡命聚黨千餘人魋結蠻夷服而東走出塞渡浿水居秦故空地上下鄣稍役屬眞番朝鮮蠻夷及故燕齊亡命者王之都王險昌鋫有險濱縣㑹孝惠高后時天下初定遼東太守即約滿為外臣保塞外蠻夷無使盜邊諸蠻夷君長欲入見天子勿得禁止以聞帝許之以故滿得兵威財物侵降其旁小邑眞番臨屯皆來服屬方數千里傳子至孫右渠元封三年夏尼泥谿相叅使人殺右渠來降遂定朝鮮為四郡眞番臨屯樂浪𤣥莵濊貊國南與辰韓北與高句麗沃沮接東窮大海朝鮮之東皆其地也獩一作濊夫餘國在𤣥莵北千里南與高句麗東與挹婁西與鮮卑接北有弱水地方二千里本濊地也東夷之域最為平敞國中有古濊城本濊貊之城也漢武帝元朔元年武帝以其地為滄海郡數年乃罷至元封三年滅朝鮮分置樂浪臨屯𤣥莵眞番四部至昭帝始元五年罷臨屯眞番以并樂浪𤣥莵𤣥莵復徙居句麗自單單大嶺已東沃沮濊貊悉屬樂浪後以境土廣遠復分領東七縣置樂浪東部都尉豆莫婁在勿吉北千里去雒陽六千里餘地挹婁古肅愼之國也在夫餘東北千餘里東濱大海西接寇漫汗國北極弱水其二界廣袤數千里居深山窮谷其路險阻車馬不通高句麗一作驪在遼東之東千里南與朝鮮濊貊東與沃沮北與夫餘接地方二千里戸三萬多大山深谷無原澤人隨山谷以為居其國漢之𤣥莵郡也其地東至新羅西度遼水二千里南接百濟北隣靺鞨千餘里地平壤城即漢樂浪之故地東西六里南臨浿水城内惟積倉儲噐械備寇賊至日方人固守王財别為宅於其側不常居之其外有城及漢城亦别都也復有遼東𤣥莵等數十城皆置官司以相綂攝平壌城亦曰長安城東六里隨山屈曲南臨浿水復有國内漢城並其都㑹之所國中呼為三京唐貞觀五年高麗又發其國衆築長城東北自夫餘城西南至海千有餘里句麗在遼東郡西安平縣北依卜水為居因名曰卜水貊東沃沮在高句麗盖馬大山之東盖馬縣名屬𤣥莵郡其山在今平壤城東東濱大海北與挹婁夫餘南與濊貊接其地東西夾南北長夾音狹可折方千里戸五千無大君王世世邑落各有長帥漢武帝元封二年伐朝鮮以沃沮城為𤣥莵郡後為夷貊所侵徙郡句麗西北所謂𤣥莵故府是也沃沮還屬樂浪漢以土地廣遠在單單大嶺之東分置東部都尉不耐城别主領東七縣北沃沮一名置溝婁去南沃沮八百餘里界南接挹婁挹婁人善乘船寇鈔北沃沮畏之毎夏藏於巖穴至冬船道不通乃下居邑落馬韓古之辰國也居山海之間無城郭凡有五十四國其北與樂浪南與倭接辰韓在帶方東南西海以為限十有二國其北與濊貊接弁辰在辰韓之南亦十有二國其南亦與倭接三韓凡七十八國百濟是其一國焉大者萬餘户小者數千家各在山海間地各方四千餘里東西以海為限倭國在帶方東南其王居邪馬臺國案今名邪摩堆音之訛也樂浪郡徼去其國萬二千里去其西北界拘邪韓國七千餘里其地大較在㑹稽東治之東與朱崖儋耳相近舊有百餘小國相接至魏時有三十國通好户有七萬去帶方萬二千餘里從帶方至倭循海水行歴韓國乍東乍南七千餘里始度一海海濶千餘里名瀚海至支國又度一海千餘里名末盧國又東陸行五百里至伊都國又東南行百里至奴國又東行百里至不彌國又南水行二十里至投馬國又南水行十日陸行一月日至邪馬臺國夷人不知里數但計以日其國境東西五月行南北三月行各至於海其地勢東髙西下都於邪摩堆東海嶼中野人有邪古婆邪多尼三國皆附庸於倭北限大海西北接百濟北抵新羅西南與越州相值日本國倭之别名自云國在日邊故以日本為名東鯷人鯷音逵奚切在㑹稽海外分為二十餘國夷洲在臨海東南去郡二千里禆離國在肅慎西北馬行可二百日領戸三萬養雲國去禆離馬行有五十日領户二萬寇莫汗國去養雲國又百日行領戸五萬餘一羣國去莫汗又百五十日計去肅慎五萬餘里百濟國在遼東之東千餘里始國於帶方故其地界東極新羅北接髙句麗西南俱限大海東西四百五十里南北九百餘里治固麻城其外更有五方中方曰古沙城東方曰得安城南方曰久知下城西方曰刀先城北方曰熊津城以子弟宗族分據之又云其都曰居枝城國南海行三月有眈牟羅國南北千餘里東西數百里土多麞鹿附庸於百濟百濟自西行二日至貊國西南島居者十五所皆有城邑新羅國在百濟東南五百餘里漢時樂浪之地東及南方阻大海西接百濟北隣高麗地東西千里南北二千里有城邑村落王之所居曰金城周七八里靺鞨在高麗之北其地在營州之東二千里南與新羅相接越喜靺鞨東北至黑水靺鞨地方二千里編戸十餘萬兵數萬人文身國在倭國東北七千餘里大漢國在文身國東五千餘里扶桑國在大漢國東一萬里地在中國之東其土多扶桑木故以為名女國在扶桑東千餘里琉球國居海島之中當建安郡東水行五日而至所居曰波羅檀洞塹栅三重環以流水樹棘為藩王所居舍其大一十六間琱刻禽獸多闘鏤樹似橘而葉密條纎如髪然下垂南蠻林邑國蝦夷海島中小國古越裳之界也在交州南海行三千里北連九眞秦時故林邑縣漢象林縣後漢伏波將軍馬援開漢南境置北縣其地縱廣可六百里城去海百二十里去日南界四百餘里北接九眞郡其南界水渉道二百餘里有西屠夷亦稱王馬援植兩銅柱表漢界處也扶南國在日南之南西去林邑三千餘里在海大灣中其境廣袤三千里有城邑宫室城去海五百里毗騫國去扶南八千里有大江廣十里西北流東入於海眞臘國在林邑西南本扶南國之屬國也去日南郡舟行六十日而至南接車渠國西有朱江國其國郭下二萬餘家城中有一大堂是王聽政之所總大城三十城有數千家各有部帥官名與林邑同南方人謂眞臘國為吉蔑國自唐神龍以後眞臘分為二半以南近海多陂澤處謂之水眞臘半以北多山阜處謂之陸眞臘半亦謂之文單國水眞臘國其境東西南北約皆八百里東至奔陁浪州西至隋羅鉢底國南至小海北即陸眞臘其王所居城號婆羅提㧞國之東界有小城皆謂之國黄支國去合浦日南三萬里荆蠻槃瓠之後也其邑君長所居皆深山重阻人跡罕至長沙黔中五溪蠻皆是也恭半國在眞臘西南千餘里城臨大海土地下濕白頭國在扶南之西叅半之西南于陁利國在南海洲上婆利國在廣州東南海中洲上去廣州二月日行國界東西五十日行南北二十日行有一百三十六聚頓遜國在林邑西南海﨑上地方千里城去海千餘里邊斗四國者邊斗國一云班斗都昆國一作都軍拘利國一作九􅀈北嵩國並扶南度金隣大灣南行三千里殊奈國在林邑南去交阯海行三月餘日噉人國在交阯西今謂之烏滸人金利毗逝國在京西南四萬餘里東去致物國二千里西去赤土國一千五百里南去波利國三千里北去栁衢國三千里其國有城邑庭舍墮和羅國南與盤盤北與迦邏舍佛東與眞臘接西隣大海去高州五月日行多蔑國在南海外國界週廻可一月行南阻大海西阻俱逰國北波剌國東眞陁洹國戸口極多置三十州不役屬他國有州郭宫殿樓櫓並用瓦木多摩長國居於海島東與婆鳳西與多隆南與半友跋華言五山也北與訶陵等國接其界東西可一月行南北可二十五日行杜薄國在扶南東漲海中直渡海數十日至洲有十餘國城皆稱王烏篤國在中天竺南地方五千餘里薄刺洲在拘利南海灣中一名勃焚洲狼牙修國在南海中其界東西三十日行南北二十日行去廣州二萬四千里婆利國在廣州東南海中洲上去廣州二月日行國界東西五十日行東北二十日行有一百三十六聚或曰其國在林邑東南海中洲上其地延袤數千里自交州南渡海經林邑扶南赤土文單數國乃至焉盤盤國在林邑之南海曲中與狼牙修國為隣丹丹國在多羅磨羅國西北振州東南理所可二萬餘家亦置州縣以相綂領陁洹國在林邑西南大海中東南與墮和羅接去交阯三月餘日行賓服於墮和羅修羅分國居於南海之北以木栅為城東至眞臘國南至海其王名尸達摩提婆精兵三萬餘人甘軍國居於南海之濱東接林邑其王名旗陁越摩精兵可五千人哥羅舍分國在南海之南東接墮和羅國其王名蒲伽越摩精兵二萬人赤土國扶南之别種也在南海中水行百餘日而達所都土色赤因以為號東波羅刺國西婆羅婆國南訶羅旦國北拒大海方數千里其王居僧祗城有門三重相去各百許步毎門圖畵飛仙仙人菩薩之象懸金花鈴眊婦女數十人或奏樂或捧金花又飾四婦人容飾如佛塔邊金剛力士之狀夾門而立門外者持兵仗門内者執白拂夾道垂素網綴花王宫諸屋悉是重閣北戸北面而坐坐三重之榻衣朝霞布冠金花冠垂雜寳纓絡四女子立侍左右兵衛百餘人王榻後作一木龕以金銀五香木雜鈿之龕後懸一金光焰夾榻又樹二金鏡鏡前並陳金甕甕前各有金香爐當前置一金伏牛牛前樹一寳盖盖左右皆有寳扇婆羅門等數百人東西重行相向而坐汶陽蠻在臨沮西界二百里中水六遶峽魚貫行有數處不通騎西北接梁州新城東北接南襄城南接巴竺三邊並山蠻兇盛據險為寇賊板楯蠻其人多居閬中渝水左右東謝蠻其地在黔州之西數百里南接守宫獠西連夷子北至白蠻西趙蠻在東謝之南其界東至夷子西至昆明南至西洱河洱音珥山洞阻深莫知道里南北十八日行東西二十三日行南平蠻北與涪州接部落四千餘戸羅刹國在婆利之東訶陵國在眞臘國之南其王所居竪木為城造大屋重閣覆以㯶櫚皮甘棠國在大海之南崑崙人也占城國在中華西南其地東西七百里南北三千里東暨海西雲南南眞臘國北驩州界東北暨兩浙海程三十日西南夷君長以十數夜郎最大後為縣屬䍧牱郡其西靡莫之屬以十數滇最大滇音顚地有滇池因為名自滇以北君長以十數卭都最大今之卭州本其地其外西自桐師以東北至葉榆葉榆澤名因以立號後為縣屬益州郡名為嶲昆明嶲音髓今嶲州也昆明又在其西南即南寧州諸爨所居是其地也自嶲以東北君長以十數徙莋都最大徙及莋都二國也徙音斯後為徙縣屬蜀郡莋都後為沈黎郡莋音昨自莋以東北君長十數冉駹最大駹音尨今䕫州開州首領多姓冉者自冉駹以東北君長以十數白馬最大皆氐類也皆巴蜀西南外蠻夷夜郎國東接交阯滇國夜郎西有池周囘二百餘里水源深廣而末更淺狹有似倒流故謂之滇池河卭都夷漢武帝所開以為卭都縣無幾而池陷為江澤因名為卭池南人以為卭河莋都夷漢武帝所開以為莋都縣後為沈黎郡天漢四年并蜀為西部置兩都尉一居旄牛主徼外夷一居青衣主漢人冉駹夷漢武帝所開以為汶山郡其山有六夷七羗九氐各有部落哀牢夷後漢光武時始通中國明帝時内屬其稱邑王者七十七人戸五萬一千八百九十口五十五萬三千七百一十四西南去雒陽七千里南詔蠻自言哀牢之後代居蒙舍州為渠帥在漢永昌故郡東姚州之西驃國在永昌故郡南二千餘里東北拒南詔陽苴咩城六千八百里凡去上都一萬四千里其國境東西三千里南北五千五百里往來通䀻者伽羅婆提等二十國役屬者道林王等九城食境土者羅君潜等二百九十八部落東隣眞臘國西接東天竺國南盡溟海北通南詔㱔㱔樂城界其王姓困設長名摩羅匿其國相名摩阿思那其王近適則輿以金繩床遠適則乘象嬪御甚衆侍御常數百人其羅城搆以磚甓周一百六十里壕岸亦搆磚相傳本是舍利佛城内有居人數萬家佛寺百餘區其堂宇皆錯以金銀渥以丹彩地以紫鑛覆以錦罽附國在蜀郡西北二千餘里即漢之西南夷也其國南北八百里東西千五百里無城近川谷傍山險俗好復讎故壘石為􅠼而居以避其患􅠼高十餘丈下至五六丈毎級丈餘以木隔之基方三四步􅠼上方二三步狀似浮圖於下級開小門從内上通夜必闗閉以防盜賊西爨古南中地延袤二千里獠出自梁益之間散居山谷依樹積木以居其上自晉桓温破蜀之後蜀人東流山險之地多空獠遂挾山傍谷與夏叅居昆彌國一曰昆明西南夷也在爨之西以二河為界即古葉榆河也去京師九千里勝兵數萬人漢武帝時得其地入益州郡其後復絶西域自漢武帝時始通三十六國其後稍分至五十餘哀平時有五十五國皆在匃奴之西烏孫之南南北有大山中央有河東西六千餘里南北千餘里東則接漢漢限以玉門陽闗二闗皆在燉煌西界西則限以葱嶺葱嶺其山高大上多生葱故以名焉其南山東出金城與漢南山屬焉婼羗國王號去胡來王言去離胡域來附漢也去陽闗千八百里去長安六千三百里辟在西南不當孔道辟讀曰僻孔道者穿山險而為道今言穴徑也戸四百五十口千七百五十勝兵者五百人西與且末接且音予餘切鄯善國本名樓蘭王治杆泥城杆音一胡切干同去陽闗千六百里去長安六千一百里戸千五百七十口萬四千一百勝兵二千九百十二人輔國侯郤胡侯郤音邱畧切鄯善都尉擊車師都尉左右且渠擊車師君各一人譯長二人西北去都䕶治所千七百八十五里至山國千三百六十五里西北至車師千八百九十里且末國王治且末城去長安六千八百二十里戸二百三十口千六百一十勝兵三百二十人輔國侯左右將譯長各一人西北至都䕶治所二千二百五十八里北接尉犁南至小宛可三日行西通精絶二千里精絶國王治精絶城去長安八千八百二十里戸四百八十口三千三百六十勝兵五百人精絶都尉左右將譯長各一人北至都䕶治所二千七百二十三里南至戎盧國四月行地阸陋西通杆彌四百六十里杆彌國王一作拘彌治杆彌城去長安九千二百八十里戸三千三百四十口二萬四十勝兵三千五百四十輔國侯左右將左右都尉左右騎君各一人譯長二人東北至都䕶治所三千五百五十三里南與渠勒東北與龜茲西北與姑墨接西通于闐田殿二音三百九十里後漢時名寧彌戎盧國王治卑品城去長安八千三百里戸二百四十口千六百一十勝兵三百人東北至都䕶治所二千八百五十八里東與小宛南與婼羗西與渠勒接南僻不當道渠勒國王治鞬都城鞬音鈐居言切去長安九千九百五十里戸三百一十口二千一百七十勝兵三百人東北至都䕶治所三千八百五十二里東與戎盧西與婼羗北與扞彌接小宛國王治杆零城去長安七千二百一十里戸一百五十口千五十勝兵二百人輔國侯左右都尉各一人西北至都䕶治所二千五百五十里東與婼羗接南僻不當道于闐國去玉門陽闗三百餘里王治西城去長安九千六百七十里戸三千三百口萬九千三百勝兵二千四百人東北至都䕶治所三千九百四十七里南與婼羗接北與姑墨接一說去雒陽萬一千七百里東去鄯善千五百里南去女國三千里西去朱俱波千里北去龜茲千四百里東北去𤓰州二千八百里又云在葱嶺之北二百里南帶葱嶺與婆羅門接相去三千餘里所都城方八九里南與吐蕃接西北至踈勒二千餘里國城之東有曰白玉河西有緑玉河次西有烏玉河其源同出崑崙山去國西一千三百餘里又云城東有大水北流號附支水即黄河也皮山國王治皮山城去長安萬五千里戸五百口三千五百勝兵五百人左右將左右都尉騎君譯長各一人東北至都䕶治所四千二百九十二里西南至烏秅國千三百四十里烏音一加切秅音直加切南與天竺接北至姑墨千四百五十里西南當罽賓烏弋山離道西北通莎車三百八十里烏秅國王治烏秅城去長安九千九百五十里戸四百九十口二千七百三十三勝兵七百四十人東北至都䕶治所四千八百九十二里北與子合蒲犂西與難兠接山居田石間有白草壘石為室蒲犂國王治蒲犂谷去長安九千五百五十里戸六百五十口五千勝兵三千人東北至都䕶治所五千三百九十六里東至莎車五百四十里北至䟽勒五百五十里南與西夜子合接西至無雷五百四十里侯都尉各一人寄田莎車種俗與子合同西夜國王號子合王治呼犍谷犍音鉅言切去長安萬二百五十里戸三百五十口四千勝兵千人東北到都䕶治所五千四百六里東與皮山西南與烏秅北與莎車西與蒲犂接德若國領戸百餘口六百七十勝兵三百五十東去長史居三千五百三十里去雒陽萬二千一百五十里與子合相接依耐國去長安萬一百五十里戸一百二十五口六百七十勝兵三百五十人東北至都䕶治所二千七百三十里至莎車國五百四十里至無雷五百四十里北至踈勒六百五十里南與子合接無雷國王治盧城去長安九千九百五十里戸千口七千勝兵一千人東北至都䕶治所二千四百六十五里南至蒲犂五百四十里南與烏秅北與捐毒西與大月氐接捐毒即身毒天竺也本皆一名語有輕重耳難兠國王治去長安萬一百五十里戸五千口三萬一千勝兵八千人東北至都䕶治所二千八百五十里西至無雷三百四十里西南至罽賓國三百三十里南與婼羌北與休循西與大月氐接罽賓國王治循鮮城去長安萬二千二百里不屬都䕶戸口勝兵多大國也東北至都䕶治所六千八百四十里東至烏秅國二千二百五十里東北至難兠國九日行西北與大月氐西南與烏弋山離接南去舍衛國三千五百里後名漕國在葱嶺之北都城方四里勝兵萬餘人北去㠶延七百里東去劫國六百里東北去𤓰州六千六百里東南去康國百里西去何國百三十里烏弋山離國王去長安萬二千二百里不屬都䕶户口勝兵多大國也東北至都䕶治所六十日行東與罽賓北與撲挑西與犂靬條支接撲音布木切犂讀與驪同靬音鉅連切又鉅言切行可百餘日乃至條支國條支國臨西海暑濕田稻人衆甚多其城在山上周囘四十餘里海水曲環其南及東北三面路絶惟西北隅通陸道轉北而東復馬行六十餘日至安息後役屬條支為置大將監領諸小城焉安息國王治畨兠城畨音盤去長安萬一千六百里不屬都䕶北與康居東與烏弋山離西與條支接一說居和櫝城去雒陽二萬五千里地方數千里小城數百戸口勝兵最為殷盛其東界木鹿城號為小安息去雒陽二萬里西行三千四百里至阿蠻國從阿蠻國西行三千六百里至斯賓國從斯賓南行度河又往西南至於羅國九百六十里安息西界極矣自此南乘海乃通大秦後漢和帝永元九年都䕶班超遣甘英使大秦抵條支臨大海欲度而安息西界船人謂英曰海水廣大往來者逢善風三月乃得度若遇遲風亦有二嵗者故入海人皆齎二歲糧海中善使人思土戀慕數有死亡者英聞之乃止大月氐國治監氏城監一作藍去長安萬一千六百里不屬都䕶戸十萬口四十萬勝兵十萬人東至都䕶治所四千七百四十里西至安息四十九日行南與罽賓接後為匃奴冐頓單于所攻破西擊大夏而臣之都媯水北為王庭月支有五翎侯翖即翕字休密翖侯治和墨城去都䕶二千八百四十一里去陽闗七千八百二里雙靡翖侯治雙靡城去都䕶三千七百四十一里去陽闗七千七百八十二里貴霜翖侯治䕶澡城澡音操去都䕶五千九百四十里去陽闗七千九百八十二里肸頓翖侯肸音許切乙治薄茅城去都䕶五千九百六十二里去陽闗八千二百二里高附翖侯治高附城去都䕶六千四十一里去陽闗九千二百八十三里凡五翖侯皆屬大月氐一說大月氐北與蠕蠕接數為所侵遂西徙都薄羅城小月氐國都富樓沙城其王本大月氐王寄多羅子也寄多羅為匃奴所逐西徙後令其子守此城因號小月氐一云月氐為匃奴所破小衆不能去者保南山羗號小月氐伽倍國故休密翖侯所治和墨城也在莎車西去代萬三千里民居山谷間折薛莫孫國故雙靡翖侯所治雙靡城也在伽倍西去代一萬三千五百里居山谷間鉗敦國故貴雙翖侯所治䕶澡城也在折薛莫孫西去代一萬三千五百六十里居山谷間閻浮謁國故高附翖侯所治高附城在弗敵沙南去代一萬三千七百六十里居山谷間弗敵沙國故肸頓翖侯所治薄茅城也在鉗敦西去代一萬三千六百六十里居山谷間册府元龜卷九百五十七
