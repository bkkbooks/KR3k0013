body:
  text: 册府元龜卷二百六宋王欽若等撰閏位部禮賢好善奬善養老禮賢古之王者嵗三月聘名士禮賢者故書云任官惟賢材又云野無遺賢葢賢者覇王之器邦國之寶也自秦逮梁宋雖運居偏閏而皆建邦啓土制敵庇民乃有豊玉帛之數備弓旌之禮博求遺逸物色儁良至或同簋而命食枉駕而降顧異厥體貌厚其廪賜或高蹈辭聘挂組長往則惠以書問贈之風什故人盡其用士獻其謀白駒無空谷之悲鳴鶴絶在隂之嘆克祚其國用康厥政何莫繇斯道焉秦始皇帝初為秦王見尉繚亢禮衣服食飲與繚同繚曰秦王為人蜂凖蜂一作隆長目摯鳥膺豺聲少恩而虎狼心居約易出人下得志亦輕食人我布衣然見我常身自下我誠使秦王得志於天下天下皆為虜矣不可與久游乃亡去秦王覺因止以為秦國尉卒用其計策蜀先主初為平原相時郡民劉平結客刺先主先主不知而待客甚厚客以狀語之而去是時人民饑饉屯聚鈔暴先主外御寇難内豊財施士之下者必與同席而坐同簋而食無所簡擇衆多歸焉諸葛亮字孔明隱居南陽時先主初屯新野徐庶謂之曰諸葛亮孔明者卧龍也將軍豈願見之乎先主曰君與俱來庶曰此人可就見不可屈致也將軍宜枉駕顧之繇是先主詣亮凢三往乃見以上客禮之龎統為耒陽令免官諸葛亮言之於先主先主見與譚大噐之以為治中從事親待亞於亮遂與亮並為軍師中郎將吳大帝時張紘為㑹稽東部東尉大帝於羣臣多呼其字唯呼張昭曰張公紘曰東部所以重二人也張温字惠恕允之子也少脩節操容貎竒偉大帝聞之以問公卿曰温當今與誰為比大司農劉基曰可與全琮為軰太常顧雍曰基未詳其為人也温當今無軰大帝曰如是張允不死也徵到延見文辭占對觀者傾竦大帝改容加禮潘濬初為劉備從事留典荆州及大帝得荆土將吏悉皆歸附而濬獨稱疾不見大帝遣人以狀就家輿致之濬伏靣著牀席不起涕泣交横哀哽不能自勝大帝慰勞與語呼其字曰承明觀丁父鄀俘也武王以為軍師彭仲爽申俘也文王以為令尹此二人卿荆國之先賢也初雖見囚後皆擢用為楚名臣卿獨不然莫肯降意將以孤異古人之量邪使親近以手巾拭其面濬起下地拜謝以為治中是儀為侍中服不精細食不重膳賑贍貧困家無儲畜大帝聞之幸儀舎求視蔬飯親嘗之對之嘆息即増俸賜益田宅儀累辭讓以恩為戚朱桓領青州牧卒家無餘財大帝賜鹽五千斛以周喪事子異嗣宋髙祖即位初名周續之於廬山續之盡室俱下帝為開館東郭外招集生徒乗輿降幸并見諸生問續之禮記傲不可長與我九齡射於矍圃三義辯析精奥稱為名通孔季恭為左光禄大夫辭官東歸髙祖餞之戲馬臺百僚咸賦詩以述其美文帝元嘉初徵戴顒為散騎常侍不就帝每欲見之謂黄門侍郎張敷曰吾東廵之日當讌戴公山也以其好音長給正聲伎一部及卒後文帝起景陽山成歎曰恨不得使戴顒觀之何尚之為尚書左僕射致仕於方山著退居賦以見志詔書敦勸文帝又與江夏王義恭詔曰今朝賢無多且羊孟尚不得告謝臣欽若等曰羊𤣥保孟顗尚之任遇有殊便未宜申許耶義恭答曰尚之清忠貞固歴事唯允雖年在懸車而體獨克壯未能申許下情所同尚之復攝職沈道處范秦王悦之雷次宗謝超宗顧歡禇伯玉此七事附在卷末武帝時裴昭明為始安内史及還甚貧罄帝曰裴昭明罷郡還遂無宅我不諳書不知古人中誰比遷射聲校尉張緒為常侍中書令緒善言素望甚重髙帝時深加敬異車駕幸莊嚴寺聽僧逹道人講座逺不聞緒言帝難移緒乃遷僧逹以近之永明中為給事中太子詹事每朝見武帝目送之謂王儉曰緒以位尊我我以德貴緒也明帝初為豫州刺史别駕夏侯詳歴事八將州部稱之帝雅相器遇顧暠之與王思逺友善少孤好學有義行初學舉秀才歴官府閤永明末為太子中書舎人兼尚書左丞隆昌初為安西諮議兼著作與思逺並屬文章建武初以疾歸家明帝手詔與思逺曰此人殊可惜就拜中散大夫梁髙祖天監元年詔曰中散大夫范述曽昔在齊世忠直奉主往莅永嘉治身㢘約宜加禮秩以厲清操可大中大夫賜絹二十疋述曽初仕齊永嘉太守以中散大夫還鄉里髙祖踐祚乃輕舟出詣闕仍辭還東故有是命岑之敬為奉車郎年十八預重雲殿法㑹時髙祖親行香熟視之敬曰未幾見兮突而弁兮即日除太學限内慱士簡文帝初為晉安王時孔休源為王府長史南蘭陵太守别勅專行南徐州事休源累佐名藩甚得名譽王深相倚仗軍民機務動止詢謀嘗於中齋别施一榻云此是孔長史坐人莫能預其見禮如此劉慧斐尤明釋典工篆𨽻簡文臨江州遺以几杖論者云自逺法師没後將二百年始有張劉之盛矣張孝秀為建安别駕去職歸山居東林寺專精釋典簡文嘗與慧斐書述其貞白云元帝初為湘東王時以庾承先彊記敏識授法曹㕘軍不就因承先講老子帝親命駕臨聽論議終日深自相賞接留連月餘日乃還山王親祖道并贈篇什隠者美之又表薦顧恊曰臣聞貢玉之士歸之潤山論珠之人出於枯岸是以蒭蕘之言擇於廊廟者臣府兼記室㕘軍吳郡顧恊行稱鄉閭學兼文武服膺道素雅量邃逺安貧守静奉公抗直旁闕知巳志不自營年方六十室無妻子臣欲言於官人申其屈滯恊必苦執其貞退立志難奪謂東南之遺寳矣伏惟陛下未明求衣思賢如渴爰發明詔各舉所知臣識非許郭雖無知人之鍳若守固無言懼貽蔽賢之咎昔孔愉表韓纉之才庾亮薦翟湯之徳臣雖未齒二臣恊實無慚兩士即召拜通直散騎侍郎兼中書通事舎人周𢎞正為國子博士侯景之亂䧟於臺城王僧辯得之甚喜即日啓元帝帝手書與𢎞正曰獯醜逆亂寒暑亟離海内相識零落畧盡韓非之智不免秦獄劉歆之學猶弊亡新音塵不嗣每以耿灼當訪東山而尋子雲望闗西而求伯起遇有今信力附相聞遲此來郵慰其延佇仍遣使迎之謂朝士曰晉氏平吳喜獲二陸今我破賊亦得兩周今古異時足為連類及𢎞正至禮數甚優朝臣無可與比者授黄門侍郎直侍中省初𢎞正弟𢎞直為衡陽内史帝在江陵遺𢎞直書曰適有都信賢兄博士平安但京師縉紳無不附逆王克己為家臣陸𬗟身充卒伍唯有周生確乎不拔言及西軍潺湲掩淚嘗思吾至如望歲焉松栢後凋一人而已陳文帝即位尊重特進左光禄大夫王冲嘗從幸司空徐度宅宴延之帝賜以几杖其見重如此虞寄為陳寶應所獲寶應誅文帝勅都督章昭逹以禮發遣令寄還朝及至日引見謂寄曰管寧無恙其慰勞之懐若此虞荔為太子中庶子領大著作以母卒臺城䧟情禮不申終身蔬食布衣有疾文帝數往臨視令將家口入省荔以禁中非私居之所乞停城外帝不許乃令住於蘭臺乗輿再三臨問手詔中使相望於道又以荔蔬食積久非羸疾所堪乃勑曰能敦布素乃當為髙卿年事已多氣力積减方欲仗委良須克壯今給卿魚肉不得固從所執也荔終不從宣帝時司馬暠初仕梁為太子庶子江陵䧟入周大建八年自周還朝帝特降殊禮賞錫有加除宜都王府諮議叅軍事後主時姚察為太子僕射先是察父僧坦入于長安察蔬食布衣不聽音樂至是㐫問因聘使到江南時察母韋氏喪制始除帝以察羸瘠慮加毁頓乃遣中書舎人司馬申就宅發哀仍勑申專加譬抑爾後又遣申宣㫖誡諭曰知哀毁過禮甚用為憂卿㷀然一身宗奠是寄毁而滅性聖教所不許宜㣲自遣割以存禮制憂懐既深故有此及尋以忠毅將軍起兼東宫通事舎人察志在終喪頻有陳讓並抑而不許俄勑知著作郎服闋除給事黄門侍郎領著作察既累居憂兼齋素日久自免憂後因加氣疾帝嘗别召見察柴瘠過甚為之動容乃謂察曰朝廷惜卿卿宜自惜既蔬菲歳久可停持長齋又遣度支尚書王瑗宣㫖重加慰之令從晩食手勅曰卿羸瘠如此齋菲累年不宜一飯有乖將攝若從所示甚為佳也察雖奉此勑而猶敦宿誓北齊髙祖為東魏丞相天平初遷鄴是時詔下三日户四十萬狼狽就道收百官馬尚書丞郎已下非陪從者盡乗驢髙祖以黄門侍郎常累清貧特給車牛四乘妻孥方得逹鄴髙昂為軍司大都督統七十六都督髙祖每申令三軍嘗鮮卑語昂若在列則為華言昂嘗詣相府掌門者不聽昂怒引弓射之髙祖知而不責好賢夫君人者勤於求賢逸於得人故游放之才絶而縶維之詠作矣所以稽五常之本成百官之務若乃招致英雋物色隱淪疇咨之㫖惟勤登顯之用靡懈故有體貌尤異恩寵隆渥參對則喜見顔色言議則事必從允故可以風起颷至猶有四方之傑矣重器斯在國柄必治故史云得士則重失士則輕用斯道者其有功歟蜀先主東征敗績猇亭之西太守閻芝發諸縣兵五千人以補遺闕遣漢昌長史馬忠送往先主已還永安見忠與語謂尚書令劉巴曰雖亡黄權復得狐篤此為世不乏賢也忠少養外家姓狐名篤後乃復姓馬改名忠吳大帝赤烏中顧譚為左節度雅性亮髙不修意氣或以此望之然權鍳其能見待甚隆數蒙奬賜特見召請宋文帝元嘉初徵戴顒為通直郎散騎常侍皆不起帝每欲見之嘗謂黄門侍郎張敷曰吾東廵之日當讌戴公山也戴公居黄鵠山明帝既即位才學之士多蒙引進參侍文籍應對左右順帝昇明初以司空長史謝朏衛軍長史江斆中書侍郎禇炫武陵王文學劉俁入直省參侍文義號為四友南齊太祖覇府初開賓客輻輳帝留意簡接虞玩之與樂安任遐俱以應對有席上之美齊名見遇張融為中書郎太祖為太尉特竒愛融與融欵接見融嘗笑曰此人不可無一不可有二即位後手詔賜融衣曰見卿衣服麤故誠乃素懐有本交爾藍縷亦虧朝望今送一通故衣意謂雖故乃勝新是吾所著已令裁减稱卿之體并履一量梁髙祖天監初到沆為征虜主簿帝初臨天下收拔賢俊甚愛其才徐勉仕齊為領軍長史初與長沙宣武王遊髙祖深器賞之及義兵至京邑勉於新林謁見髙祖甚加恩禮使管書記髙祖踐阼拜中書侍郎周興嗣為給事中興嗣兩手先患風疸是年又染癘疾左目盲髙祖撫其手嗟曰斯人也而有斯疾手疏治疸方以賜之其見惜如此簡文帝初臨南徐州時陶𢎞景居積金東澗帝欽其風素召至後堂與談論數日而去甚敬異之元帝初為湘東王蕭介為吳令聞介名思共遊處表請為諮議參軍又與裴子野劉顯蕭子雲張纉及當時才秀為布衣之交帝嘗曰余於諸僧重招提琰法師𨼆士重華陽陶貞白士大夫重汝南周𢎞正其於義理清轉無窮亦一時之名士也後梁明帝好周易集朝臣於清暑殿講詔伏曼容執經曼容素著風采帝甞以方嵇叔夜使吳人陸探微畫叔夜像以賜之陳髙祖時虞荔為梁中書舎人領大著作侯景陷臺城逃歸鄉里及張彪之據㑹稽也荔時在焉張彪平髙祖遺荔書曰喪亂已來賢哲彫散君才用有羙聲聞許雒當今朝廷惟新廣求英雋豈可棲遲東土獨善其身今令兄子將接出都想必副朝廷虚遲也文帝又以書曰君東南有美聲譽洽聞自應翰飛京許共康時弊而刻迹丘園保茲獨善豈使稱空谷之望也必願便爾俶裝且為出都計唯遲披覯在於兹日廹切之不得已乃應命至都宣帝輔政時大著作許亨初為王僧辯從事僧辯死亨抗表請葬之帝以亨貞正有古人之風甚相欽重嘗以師禮事之後主時司徒左西掾兼東宫學士陸從典丁父憂去職尋起為徳教學士固辭不就後主勅留一員以待從典北齊文宣時顔之推自東來奔帝見而悦之即除奉朝請於内舘中侍從左右頗被顧盼奬善周書曰人之有技若己有之人之彦聖其心好之斯樂善之謂也自鼎國三分江表建號受終傳繼歴載三百曷嘗不欽尚豪英推奬孝秀崇徳以宣教賞儁以聳善敦尚文雅周旋褒異至於棊奕之工筆札之妙亦皆稱焉斯固菁莪育材之㫖砥石礪世之行將使學文之士研精而不匱執藝之流服勤而競勸葢興化美俗之要道歟吳大帝時朱異為揚武將軍帝與論攻戰辭對稱意帝謂異從父驃騎將軍據曰本知季文異之字快今見之復過所聞顧譚赤烏中代諸葛恪為左節度譚初踐官府上疏陳事大帝輟食稱善以為過於徐詳顧承丞相雍之孫也嘉禾中與舅陸瑁俱以禮徵大帝賜雍書曰貴孫子直子直承字也令聞休休至與相見過於所聞為君嘉之拜為騎都尉領羽林兵宋文帝嘗云天下有五絶而皆出錢唐謂杜道鞠彈琴范悦持楮欣逺模書禇𦙍圍棋徐道度療疾也垣䕶之隨到彦之北伐彦之將廻師䕶之為書諌不納文帝聞而善之以輔江夏王義恭征北行參軍北髙平太守孝武時謝超宗為新安王子鸞國常侍王母殷淑儀卒超宗作誄奏之帝大嗟賞曰超宗殊有鳯毛恐靈運復出南齊太祖時劉善明為冠軍將軍沈攸之反善明料其必敗事平太祖召善明還都謂之曰卿策沈攸之雖復張良陳平適如此耳武帝時王廣之為前將軍帝見廣之子珍國謂廣之曰珍國應不堪事卿可謂老蚌廣之曰不敢辭梁武帝時劉孝綽為廷尉卿坐携妾入官府免職後帝數使僕射徐勉宣㫖慰撫之每朝宴常引焉及帝為籍田詩又使勉先示孝綽時奉詔作者數十人帝以孝綽尤工即日有勑起為西中郎湘東王諮議後為水部郎帝雅好蟲篆時因宴幸命沈約任昉等言志賦詩孝綽亦見引嘗侍宴於坐賦詩七首帝覽其文篇篇嗟賞繇是朝論改觀焉張率為司徒掾直文徳嘗作待詔賦奏之武帝甚見稱賞手勑答曰省賦殊佳相如工而不敏枚臯速而不工卿可謂兼二子於金馬矣又侍宴賦詩帝乃勅賜率詩曰東南有才子故能服官政余雖慙古昔得人今為盛率奉詔往返數首蕭介博渉經史善屬文初武帝招延後進二十餘人置酒賦詩臧盾以詩不成罰酒一㪷盾飲盡顔色不變自若介染翰便成文無加㸃帝兩美之曰臧盾之飲蕭介之文即席之美也到藎左民尚書漑之孫歴尚書殿中郎嘗從武帝幸京口登北顧樓賦詩藎受詔便就帝覽以示漑曰藎是才子飜恐卿從來文章假手於藎因賜漑連珠曰研磨墨以騰文筆飛毫以書信如飛蛾之赴火豈焚身之可吝必耄年其已及可假之於少藎賀琛為臨川王祭酒從事史琛始出都武帝聞其學術召見文徳殿與語悦之謂僕射徐勉曰琛殊有世業仍補王國郎俄並太學博士蕭子雲與其子特俱善草𨽻武帝嘗謂子雲曰子敬之書不及逸少近見特迹遂逼於卿江子一起家王國侍郎請啓求觀書秘閣武帝許之有勅直華林省羊侃為北伐大將軍武帝製武宴詩四十韻以示侃即席應詔帝覽曰吾聞仁者有勇今見勇者有仁可謂鄒魯遺風英賢不絶江紑㓜有孝性年十三父蒨患眼紑侍疾將朞月衣不解帶夜夢一僧云患眼者飲慧眼水必差及覺説之莫能觧者紑第三叔禄與草堂寺智者法師善往訪之智者曰無量夀經云慧眼見真能渡彼岸蒨乃因智者啓捨同夏縣界牛屯里舎為寺乞賜嘉名勅答云純臣孝子往往感應晉世顔含遂見㝠中送藥近見智者知卿第二息感夢云飲慧眼水慧眼是五眼之一號若欲造寺可以慧眼為名及就創造泄故井井水清冽異於常泉依夢取水洗眼及煑藥稍覺有瘳因此遂差時人謂之孝感王子雲太原人及江夏費昶並為閭里才子昶善為樂府又作鼔吹曲武帝重之勅曰才意新㧞有足嘉異昔柳惲博物木蘭巧辭束帛之賜實惟勸善可賜絹十疋司馬暠父子産武帝外兄暠年十二丁内艱毁瘠骨立服闋以姻戚子弟預入問訊帝見暠嬴痩歎息良久謂其父子産曰昨見羅兒尚竒顦顇使人惻然便是不墜家風為有子矣羅兒即暠小字也江摠為尚書殿中郎中武帝撰正言始畢製述懐詩摠預同此作帝覽摠詩深加嗟賞虞寄起家宣城王國左常侍大同中嘗驟雨殿前往往有雜色寳珠武帝觀之甚有喜色寄因上瑞雨頌帝謂寄兄荔曰此頌典裁清㧞卿之士龍也元帝時徐陵子儉為尚書金部郎中常侍宴賦詩帝歎賞曰徐氏之子復有文焉陳宣帝時徐孝克為通直散騎常侍兼國子祭酒孝克每侍宴無所食噉至席散嘗見其前膳損减帝宻記以問中書舎人管斌斌不能對自是斌以意伺之見孝克取珍果内紳帶中斌當時莫識其意後更尋訪方知還以遺母斌以實啓帝帝嗟嘆良久乃勅所司自今宴享孝克前饌並遣將還以餉其母時論美之後主時姚察為吏部尚書後主所製文筆卷軸甚多乃别寫一本付察有疑悉令刋定察亦推心奉主事無所隱後主嘗從容謂朝士曰姚察逹學洽聞手筆典裁求之於古猶難軰匹在於今世足為師範且訪對不休聽之使人忘倦察每製文筆勅便索本嘗曰我于姚察文章非唯翫味無已故是哲匠養老養老之道三王以前尚矣自皇綱觧紐餘分閏位雖乞言孝弟之義不行於庠序而訓恭加惠之典尚及於鄉黨其間以兵威相熾禮用遼夐至於因事存問以時優給假之爵秩異其服玩亦有國之令猷也宋孝武帝大明七年二月車駕廵南豫南兖二州詔歴陽郡髙年加以羊酒十二月行幸歴陽郡賜髙年帛南齊武帝永明七年正月詔曰諸大夫年秩隆重禄力殊薄豈所謂下車惟舊趨橋敬老可増俸詳給見役明帝建武元年十二月詔曰日者百司耆齒許以自陳東西二省猶沾微俸辭事私庭榮禄兼謝興言愛老實有矜懐自今縉紳年及可一遵永明七年以前銓敘之科先是永明中御史中丞沈淵表百官年登七十者皆令致仕並窮困私門故有是詔東魏孝静帝天平三年十二月遣使者授假老人官百歲已下各有差北齊文宣帝天保九年七月給京畿老人劉奴等九百四十三人版職及杖㡌各有差孝昭帝皇建元年八月即位大赦改元諸郡國老人各受版職賜黄㡌几杖文帝元嘉初沈道慶吳興武康人仁愛好老易郡州府十二命皆不就文帝聞之遣使存問賜錢米范泰元嘉中為侍中領江夏王師文帝以泰先朝舊臣恩禮甚重以有脚疾起居艱難宴見之日特聽乗輿到坐累陳時事每優禮之王悦之為黄門郎御史中丞明帝以其㢘介賜良田五頃後廢帝元徽中徵廬山隱居雷次宗至京授給事不就而還其後復詔散騎侍郎徵詣京邑為築室於鍾山西巖下謂之招隱舘使為皇太子諸王講喪服經次宗不入公門乃使自華林東門入延賢堂就學南齊太祖初為領軍時謝超宗為義興太守坐公事免詣東府門自通其日風寒惨厲帝謂四坐曰此客至使人不衣自煗矣超宗既坐飲酒數甌詞氣横出太祖對之甚歡㧞為諮議顧歡少有髙行太祖初徵詣京師及東歸賜以麈尾素琹禇伯玉隱居剡之瀑布山三十餘年隔絶人物不就徵聘太祖即位手詔吳㑹二郡以禮迎遣又辭疾帝不欲違其志勑於剡中立太平舘以居之冊府元龜卷二百六
