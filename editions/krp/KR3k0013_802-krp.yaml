body:
  text: 册府元龜卷八百二宋王欽若等撰總録部義第二魏文聘字仲業南陽宛人也爲劉表大將使禦北方表死其子琮立太祖征荆州琮舉州降呼聘欲與俱聘曰聘不能全州當待罪而已太祖濟漢聘乃詣太祖太祖問曰來何遲邪聘曰先日不能輔弼劉荆州以奉國家荆州雖沒嘗願據守漢川保全土境生不負於孤弱死無愧於地下而計不得已以至於此實懷悲慙無顏早見耳遂歔欷流涕太祖爲之愴然曰仲業卿真忠臣也厚禮待之荀彧素爲何顒所善顒爲董卓收顒繫獄自殺後彧爲尚書令遣人迎叔父司空爽䘮使并置顒屍而葬之於爽塜傍華歆字子魚平原人少以髙行顯名避西京之亂與同志鄭泰等六七人間歩出武關道遇一丈夫獨行願得俱北衆欲許之歆獨曰不可今已在危險之中禍福患害義猶一也無故受人不知其義既已受之若有進退可中棄乎衆不忍卒與俱行此丈夫中道墮井皆欲棄之歆曰已與俱矣棄之不義相率共還出之而後别去衆乃大義之後至太尉袁渙陳郡人蜀先主初爲豫州舉渙茂才後渙爲呂布所拘留布初與先主和親後離隙布欲使渙作書罵辱先主渙不可再三强之不許布大怒以兵脅渙曰爲之則生不爲則死渙顔色不變笑而應之曰渙聞唯德可以辱人不聞以罵使彼固君子邪正不耻將軍之言彼誠小人邪將復將軍之意則辱在此不在於彼且渙他日之事劉將軍猶今日之事將軍也如一旦去此復罵將軍可乎布慙而止後至郎中令毛玠字孝先雖居顯位嘗布衣蔬食撫育孤兄子甚篤賞賜以賑施貧族家無所餘後至尚書僕射賈達河東襄陵人爲絳邑長郭援之攻河東所經城邑皆下達堅守之絳既潰援捕得達達不肯拜謂援曰王府君臨郡積年臣欽若等曰王府君謂河東太守也史失其名不知足下何爲者也援怒曰促斬之諸將覆䕶乃囚於壺關閉著土窖中以車輪蓋上使人固守方將殺之達從窖中謂守曰此間無徤兒耶而當使義士死此中乎時有祝公道者與達非故人而適聞其言憐其守正危厄乃夜盜往引出折械遣去不語其名姓後至豫州刺史司馬朗河内溫人嵗大饑人相食朗收恤宗族教訓諸弟不爲衰世解業後至兖州刺史任俊河南中牟人爲典農中郎將於饑荒之際收恤其友孤遺中外貧宗周急繼乏信義見稱王修字叔治年二十遊學南陽止張奉舍奉舉家得疾病無相視者脩親隠恤之病愈乃去北海相孔融召爲主簿舉孝亷以天下亂不行頃之郡中有反者言孔融有難夜往奔融賊初發融謂左右曰能冐難來者唯王修耳言終而修至復署功曹融每有難修雖休歸在家無不即至融嘗賴修以免袁譚在青州辟修爲治中從事袁紹死譚尚有隙尚攻譚譚軍敗修率吏民往救譚譚喜曰成吾軍者王别駕也譚之敗劉詢起兵漯隂諸城皆應譚歎息曰今舉州皆叛豈孤之不德邪修曰東萊太守管綂雖在海表此人不反必來後十餘日綂果棄其妻子來赴譚妻子爲賊所殺譚更以綂爲樂安太守太祖既破冀州譚又叛太祖遂引軍攻譚於南皮修時運糧在樂安聞譚急將所領兵及諸從事數十人徃赴譚至髙宻聞譚死下馬號哭曰無君焉歸遂詣太祖乞收葬譚屍太祖欲觀修意黙然不應修曰受袁君恩厚若得收歛譚屍然後就戮無所恨太祖嘉其義聽之以脩爲督軍糧還樂安譚之破諸城皆服唯管統以樂安不從命太祖命修取統首修以統亡國之忠臣因解其縳使詣太祖太祖悦而赦之後至太常田疇右北平無終人幽州牧劉虞奉使至長安致命得報馳還未至虞已爲公孫瓚所害疇至乃於虞墓陳發章表哭泣而去瓚聞之大怒購求䕶疇謂曰汝何自哭劉虞墓而不送章報於我也疇答曰漢室衰頽人懷異心唯劉公不失忠節章報所言於將軍未美恐非所樂聞故不進也且將軍方舉大事以求所欲既滅無罪之君又讎守義之臣誠行此事則燕趙之士將皆蹈東海死耳豈忍有從將軍者乎瓚壯其對釋不誅也拘之軍下禁其故人莫得與通或說瓚曰田疇義士君弗能禮而又囚之恐失衆心瓚乃縱遣疇疇得北歸率宗族入徐無山中袁紹死其子數遣使招命又即授將軍印因安輯所統疇皆拒不留紹死其子尚又辟焉疇終不行後遼東斬送袁尚首令三軍敢有哭之者斬疇以嘗爲尚所辟乃往弔祭太祖亦不問後至議郎曹真爲大司馬少與宗人曹遵鄉人朱瓚並事太祖遵瓚早亡真愍之乞所分食邑封遵瓚子詔曰大司馬有叔向撫孤之仁篤晏平乆要之分君子成人之美聼分真邑賜遵瓚子爵關内侯各百戸崔琰字季珪清河東武成人也少樸訥好擊劍尚武事琰友人公孫方早卒琰撫孤息若已子後至中尉臧霸字宣髙泰山華人也黃巾起霸從陶謙擊破之後歸太祖太祖以霸爲瑯邪相初太祖之在兖州以徐翕毛暉爲將兖州亂翕暉皆叛後兖州定翕暉亡命投霸太祖語蜀先主令語霸送二人首霸謂先主曰霸所以能自立者以不爲此也霸受公生成之恩不敢違命然王霸之君可以義吿願將軍爲之辭先主以霸言白太祖太祖歎息謂霸曰此古人之事而君能行之孤之願也乃以翕暉皆爲郡守龎淯字子異初以涼州從事守破羗長㑹武威太守張猛反殺刺史邯鄲商猛令曰敢有臨商䘮死不赦淯聞之棄官晝夜奔走號哭䘮所訖詣猛門𠂻七首欲因見以殺猛猛知其義士勑遣不殺繇是以忠烈聞酒泉太守徐揖請淯爲主簿後郡人黃昻反圍城淯棄妻子夜踰城出圍吿急於張掖燉煌二郡初疑未肯發兵淯欲伏劍二郡感其義遂爲興兵軍未至而郡城已䧟揖死淯乃收歛揖䘮送還本郡行服三年乃還太祖聞之辟爲掾夏侯淵字妙才太祖居家曽有縣官事淵代引重罪太祖營救之得免魏畧曰時兖豫大亂饑乏棄其㓜子而活亡弟孤女後至征西將軍閻溫字伯儉天水西城人守上邽令馬超奔上邽部人任養等舉衆迎之溫止之不能禁乃馳還州超復圍州甚急州乃遣溫宻去吿急於夏侯淵賊圍數重溫夜從水中潛出明日賊見其迹遣追遮之得溫執還請超超解其縳謂曰今成敗可見若從吾言反謂城中東方無救此轉禍爲福之計也不然今爲戮矣溫偽許之超乃載溫詣城下温向城大呼曰軍不過三日至勉之超怒數之曰足下不爲命計邪温曰夫事君有死無貳而公乃欲令長者出不義之名吾豈苟生者乎超遂殺之韓珩爲袁紹别駕及袁熈袁尚爲其將焦觸張南所攻奔遼西烏丸觸自號幽州刺史驅率諸郡太守令長背袁尚曹陳兵數萬殺白馬盟令曰違命者斬衆莫敢語各以次㰱至珩曰吾受袁公父子厚恩今其破亡智不能救勇不能死於義闕矣若乃北面於曹氏所弗能爲也一坐爲珩失色觸曰夫興大事當立大義事之濟否不待一人可卒珩志以勵事君太祖髙珩節屢辟不至卒於家成公英金城人中平末隨韓遂爲腹心建安中遂從華隂破走還湟中部黨散去唯英獨從牽招字子經安平城西人年十餘嵗詣同縣樂隠受學後隠爲車騎將軍何苗長史招隨卒業値京都亂苗隠見害招與隠門生史路等觸蹈鋒刅共殯殮隠屍送䘮還歸道遇冦鈔路等皆悉散走賊欲斫棺取釘招埀淚請赦賊義之乃釋而去繇此顯名招既事袁尚後歸太祖從討烏丸至柳城拜護烏丸校尉還鄴遼東送袁尚首縣在馬市招覩之悲感設祭頭下太祖義之夏侯惇字元讓沛國譙人年十四求師就學人有辱其師者惇殺之繇是以烈氣聞後至大將軍邢顒爲廣宗長以故將䘮棄官有司舉正太祖曰顒篤於舊君一致之節勿問也嘗林河内人漢末以太守酷虐乃避地上黨耕種山阿當時旱蝗林獨豐收盡呼比鄰升斗分之後至光禄大夫趙儼字伯然潁川陽翟人漢末避亂荆州與杜襲繁欽通財同計合爲一家後至司空楊俊漢末以兵亂方起而河内處四達之衢必爲戰塲乃扶持老弱詣京宻山間同行者百餘家俊賑濟貧乏通共有無宗族知故爲人所畧作奴僕者凢六家俊皆傾財贖之本郡王象少孤特爲人僕𨽻年十七八見使牧羊而私讀書因被箠楚俊嘉其才質即贖象著家聘娶立屋然後與别後至南陽太守髙慎字孝甫敦厚少華有沈深之量撫育孤兄子五人恩義甚篤瑯邪相何英嘉其行履以女妻焉按慎魏髙柔六代祖後漢人孫禮爲太祖司空軍謀掾初䘮亂時禮與母相失同郡馬台求得禮母禮推家財盡以與台台後坐法當死禮私導令踰獄自首既而曰臣無逃亡之義徑詣刺奸主簿温恢恢嘉之具白太祖各减死一等梁習字子虞𥘉濟隂王思與習俱爲太祖丞相西曹令史思因直日白事失太祖㫖太祖大怒教召主者將加重辟時思近出習代往對已被收執矣思乃馳還自陳已罪罪應受死太祖歎習之不言思之職分曰何意吾軍中有二義士乎脂習字元升與少府孔融親善太祖爲司空威德日盛而融故以舊意書疏倨傲習嘗責融故令改節及融被誅當時許中百官先與融親善者莫敢收恤而習獨往撫而哭之曰文舉卿捨我死我當復與誰語者哀歎無已太祖聞之收習欲理之尋以其事直見原從許東土橋下習後見太祖陳謝前愆太祖呼其字曰元升卿故慷慨因問其居處以新移徙賜榖百斛至黃初詔欲用之以其年老然嘉其敦舊有欒布之節賜拜中散大夫還家年八十餘卒郭憲西平人以仁篤爲一郡所歸韓約失衆從羗中還依憲衆人多欲取約以徼功而憲皆責怒之言人窮來歸我云何欲危之遂擁䕶厚遇之其後約病死而田樂陽達等就斬約頭當送之達等欲條䟽憲名憲不肯在名中言我尚不忍生圖之豈忍取死人以要功乎達等乃止時太祖方攻漢中在武都而達等送約首到太祖宿聞憲名及視條疏怪不在中以問達等達具以情對太祖歎其忠義乃并表列與達等並賜爵關内侯繇是名震隴右黃初中病卒建始初追嘉其事復賜其子爵關内侯王朗漢末爲㑹稽太守爲孫策所執雖流移窮困朝不謀夕而收恤親舊分多割少行義甚著少與南國名士劉陽交友陽為莒令年未三十而卒故後世鮮聞初陽以漢室漸衰知太祖有雄才恐爲漢累意欲除之而事不㑹及太祖貴求其嗣子甚急其子惶窘走伏無所陽親舊雖多莫敢藏者朗乃納受積年及從㑹稽還又數開解太祖乆乃赦之陽門戸繇是得全袁侃明帝時與尚書選曹郎許允對直同坐職事皆收送獄詔㫖嚴切當有死者正直者爲重允謂侃曰卿功臣之子法應八議不憂死侃知其指乃爲受重允刑竟復吏侃復歴郡守尚書諸葛誕爲郎與僕射杜幾試船陶河遭風覆沒誕亦俱溺虎賁浮河救誕誕曰先救杜侯誕飄於岸絶而後蘇皇甫晏者王經之故吏經之死刑及其母晏以家財收葬蜀許靖漢末補御史中丞時董卓秉政靖懼誅奔豫州刺史孔伷伷卒依揚州刺史陳禕禕死吳郡都尉許貢㑹稽太守王朗素與靖有舊故往保焉靖收恤親理經紀賑贍出於仁厚孫策東渡江皆走交州以避其難靖身坐岸邊先載附從踈親悉發乃從後去當時見者莫不歎息姜冏維父也天水兾人冏昔爲郡功曹值羗戎叛亂身衞郡將沒於戰塲賜維官中郎叅本郡軍事程畿巴西䦘中人爲益州牧劉璋漢昌長縣有賨人種類剛猛昔髙祖以定關中巴西太守龎義以天下擾亂郡宜有武衞頗招合部曲有䜛於璋説義欲叛璋隂疑之義聞甚懼將謀自守遣畿子郁宣㫖索兵自助畿報曰郡合部曲本不爲叛雖有交搆要在盡誠若必以懼遂懷異志非畿之所聞并勅郁曰我受州恩當爲州牧盡節汝爲郡吏當爲太守効力不得以吾有異志也義使人吿畿曰爾子在郡不從太守家將及禍畿曰昔樂羊爲將飲子之羮非父子無恩大義然也今雖復羮子吾必飲之義知畿必不爲已厚陳謝於璋以致無咎璋聞之遷畿江陽太守王連字文儀爲劉璋梓橦令先主起事葭萌進軍南來連閉城不降先主義之不彊偪也張嶷字伯岐巴西郡南兖國人弱冠爲縣功曹先主定蜀之際山冦攻縣縣長捐家逃亡嶷冐白刅携負夫人夫人得免繇是顯名爲州從事得疾病困篤家素貧匱廣漢太守蜀郡何祗名爲通厚嶷宿與疎濶乃自轝詣祗託以治病祗傾財醫療數年除愈關羽爲先主守下邳城行太守事曹公東征擒羽以歸拜爲偏將軍禮之甚渥曹公壯羽爲人而察其無乆留意謂張遼曰卿試以情問之遼以問羽羽歎曰吾極知曹公待我厚然吾受劉將軍恩誓以共死不可背之吾終不留吾要當効力以報曹公而後乃歸遼以羽言報曹公公曰事君不忘其本天下義士也度何時去遼曰受公恩必効力而後去也及羽殺顔良曹公知其必去重加賞賜羽盡封其賞賜拜書吿辭而奔先主左右欲追之曹公曰彼爲其主勿追也楊戯篤於舊故居誠存重與巴西韓儼黎韜童㓜相親厚後儼痼疾廢頓韜無行見捐戱經紀賑恤恩好如初卒於射聲校尉譙周字允南丞相諸葛亮領益州牧以周爲勸學從事亮卒於敵庭周在家聞即便奔赴尋有詔書禁斷惟周以速行得達張裔字君嗣少與犍爲楊恭友善恭早死遺孤未數嵗裔迎留與分屋而居事恭母如母恭之子息長大爲之娶婦買田宅產業使立門户撫恤故舊賑贍衰宗行義甚篤後至輔漢將軍丞相長史吳桓階字伯緖長沙臨湘人仕郡功曹太守孫堅舉階孝廉除尚書郎父䘮還鄉里㑹堅擊劉表戰死階冐難詣表乞堅䘮表義而與之魏志髙岱字孔文吳郡人太守盛憲以爲上計舉孝廉許貢來領郡岱將憲避難於許昭家求救於陶謙謙未即救岱憔悴泣血水漿不入口謙感其忠壯有申包胥之義許爲出軍以書與貢虞翻字仲翔㑹稽餘姚人太守王朗命爲功曹孫策征會稽翻時遭父䘮衰絰詣府門朗欲就之翻乃脱衰入見勸朗避策朗不能用拒戰敗績亡走浮海翻追隨營護到東部侯官侯官長閉城不受翻往説之然後見納張紘爲廣陵太守趙昱察孝亷昱後爲笮融所殺紘甚傷憤而力不能討昱門戸絶滅及紘在東部遣主簿至瑯邪趙昱瑯邪人設祭并求親戚爲之後以書屬瑯邪相臧宣宣以趙宗中五嵗男奉昱祀大帝聞而嘉之駱綂字公緖徐陵卒僮客土田或見侵奪綂爲陵家訟之求與丁覽卜清等爲北權許焉後至偏將軍濡須督陸瑁字子墇丞相遜之弟少好學篤義陳國陳融陳留濮陽逸沛郡蔣纂廣陵袁廸等皆單貧有志就瑁遊處瑁割少分甘與同豐約及同郡徐原爰居會稽素不相識臨死遺書託以孤弱瑁爲起立墳墓教導其子又瑁從父績早亡二男一女皆數嵗以還瑁迎攝養之至長乃别後至選曹尚書王固字子賤少䘮父獨與母居家貧守約色養致敬族弟孤弱與同寒温後至司空陸康字季寧少惇孝悌勤修操行太守李肅察孝亷肅後坐事伏法康歛屍送䘮還潁川行服吳範爲騎都尉領太史令爲人剛直頗好自稱然與親故交接有終始素與魏滕同邑相善滕嘗有罪孫權責怒甚嚴敢有諌者死範謂滕曰與汝偕死滕曰死而無益何用死爲範曰安能慮此坐觀汝邪乃髠頭自縳詣門下使鈴下以聞鈴下不敢曰必死不敢白範曰汝有子邪曰有曰使汝爲吳範死子以屬我鈴下曰諾乃排閣入言未卒權怒欲使投以㦸逡廵出走範因突入叩頭流血言與涕並良乆帝意釋乃免滕滕見範謝曰父母能生長我不能免我於死丈夫相知如汝足矣何用多焉臧均臨淮人諸葛恪爲孫悛所殺夷三族均表乞收葬恪曰臣聞震雷電激不崇一朝大風衡發希有極日然猶繼以雲雨因以潤物是則天地之威不可經日浹辰帝王之怒不宜訖情盡意臣以狂愚不知忌諱敢冐破滅之罪以激風雨之會伏念大𫝊諸葛恪得承祖考風流之烈伯叔諸父遭漢祚盡九州鼎立分託三方並履忠勤熈隆世業爰及於恪生長王國陶育聖化致名英偉服事累紀禍心未萌先帝委以伊周之任屬以萬幾之事恪素性剛愎矜己陵人不能敬守神器穆静邦内興功暴師未期三出虗耗士民空竭府藏專擅國憲廢易繇意假刑刼衆大小屏息侍中武衞將軍都鄉侯俱受先帝囑寄之詔見其姦虐日月滋甚將恐蕩揺宇宙傾危社稷奮其威怒精貫昊天計慮先於神明智勇百於荆聶躬持白刅梟恪殿堂勲超朱虗功越東牟國之元害一朝大除馳首狥示六軍喜踰日月増光風塵不動斯實宗廟之神靈天人之同騐也今恪父子三首縣市積日觀者數萬罵聲成風國之大刑無所不震長老孩㓜無不畢見人情之於品物樂極則哀生見恪貴盛世莫與貳身處台輔中間歴年今之誅夷無異禽獸觀訖情反能不􅉃然且已死之人與土壤同域鑿掘斫刺無所復加願聖朝稽則乾坤怒不極旬使其鄉邑若故民吏收以五土之服惠以三寸之棺昔項羽受殯葬之施韓信獲收歛之恩斯則漢髙發神明之譽也唯陛下敦三皇之仁埀哀矜之心使國澤加於辜戮之骸復受不己之恩於以揚聲遐方沮觀天下豈不宏哉昔欒布矯命彭城臣竊恨之不先請主上而專名以肆情其得不誅實爲幸耳今臣不敢章宣愚情以露天恩謹伏手書冐昧陳聞乞聖朝哀察於是廢帝及峻聽恪故吏歛葬徐平字伯先爲諸葛恪從事意甚薄及恪輔政待平益䟽恪被害其子建亡走爲平部曲所得平使遣去别爲佗軍所獲其行義敦篤嘗此類也晋安平獻王孚性通恕陳留殷武有名於海内嘗罹罪譴孚往省之遂與同處分食譚者稱焉何雄字茂伯河内人初仕郡爲主簿事太守王經及經之死也雄哭之盡哀市人咸爲之悲後太守吳奮以少譴繫雄於獄司𨽻鍾㑹於獄中辟雄爲都官從事會死無人殯歛雄迎䘮而葬之文帝時爲文王召雄責之曰往者王經之死卿哭經於東市我不問也今鍾㑹躬爲叛逆收葬若復相容其如王法何雄曰昔者先王掩骼埋胔仁流朽骨當時豈先卜其功罪而後葬之哉今王誅既加於法已備雄感義收葬教亦無闕法立於上教引於下何必使雄違生背死以立於時殿下讎枯骨而捐之中野爲將來仁賢不亦惜乎帝甚悦與譚宴而遣之鄭袤父泰有髙名袤早孤隨叔父潭避難江東時華歆爲豫章太守潭往依之歆素與泰善撫養袤如已子年十七乃還鄉里後至光禄大夫荀朂仕魏辟大將軍曹爽掾遷中書通事郎爽誅門生故吏無敢往者朂獨臨赴衆乃從之戴顒丹陽人初仕吳廢帝時爲少府帝以廢黜之國道自殺至晋太康中顒迎亮䘮葬之賴鄉廢帝孫亮也吳志樊震爲積射將軍咸寧中爲西戎牙門得見辭武帝問震所繇進震自陳曽爲鄧艾伐蜀時帳下將帝遂尋問艾震具申艾之忠言之流涕繇此遷艾孫朗爲定陵令孫鑠字巨鄴河内懷人少樂爲縣吏太守吳奮轉以爲主簿鑠自㣲賤登綱紀時僚大姓猶不與鑠同坐奮大怒遂薦鑠爲司𨽻都官從事司𨽻較尉劉訥甚知賞之時奮又薦鑠於大司馬石苞苞辟爲掾鑠將應命行達許昌㑹臺已宻遣輕軍襲苞子時汝隂王鎮許鑠過謁之王先識鑠以鄉里之情私吿鑠曰無與禍鑠既出即馳詣壽春爲苞畫計苞賴而獲免遷尚書郎在職駁議十有餘事爲當時所稱劉繇爲衞瓘太保主簿瓘爲楚王偉所害繇冐難收瓘而葬之劉儈爲征南大將軍羊祐叅佐初祐開府累年謙譲不辟士劉儈始有所命會卒不得除署杜預代祐鎮荆州儈與趙寅劉彌孫勃等牋詣預曰昔以謬選忝備官屬各得與前征南大將軍祐叅同庶事祐執德冲虗操尚清遠德髙而體卑位優而行恭前膺顯命來撫南夏既有三司之義復加大將軍之號雖居其位不行其制至今海内渴佇羣雋望風歩其門者貪夫反亷懦夫立志雖夷惠之操無以尚也自鎮此境政化被乎江漢潛謀遠計闢國開疆諸所規摹皆有軌量志存公家以死勤事始辟四掾未至而隕夫舉賢報國台輔之遠任也搜揚側陋亦台輔之宿心也中道而廢亦台輔之私恨也履謙積稔晚節不遂此遠近所以爲之感痛者也昔召伯所憇愛流甘棠宣子所遊封植其樹夫思其人尚及其樹况生存所辟之士便當隨例放棄者乎乞蒙列上得依已至掾屬預表曰祐雖開府而不備僚屬引謙之至宜見顯明及扶疾辟士未到而沒家無血嗣官無命士此方之望隠憂載懷夫篤終追遠人德歸厚漢髙祖不惜四千戸之封以慰趙子弟心請議之詔不許何攀字惠興蜀郡人仕州爲主簿屬刺史黃甫晏爲牙門張宏所害誣以大逆時攀適丁母䘮遂詣梁州拜表證晏不反故晏寃理得申段秀實䘮父服終推財與兄弟閻纘字纘伯爲太傅楊駿舍人轉安復令駿之誅也纘棄官歸要駿故主簿潘岳掾崔基等共葬之基岳畏罪推纘爲主墓成當葬駿從弟模吿武陵王澹將表殺造意者衆咸懼填冡而逃纘獨以家財成墓葬駿而去荀闓辟大司馬齊王冏掾冏敗暴屍三日莫敢收葬闓與冏故吏李述稽含等露板請葬朝議聼之論者稱焉束晳爲尚書郎與衞嘗甚善聞嘗遇禍自本郡迎䘮劉佑為長沙王乂掾乂爲東海王越令張方勒兵所殺將殯於城東官屬莫敢往佑獨送之歩持䘮車悲號泣絶哀感路人張方以其義士不之問也汲桑嘗事成都王頴頴之死也桑載頴棺於軍中每事啟靈以行軍令桑敗棄棺於故井中頴故臣收之改葬於雒陽桑虞五世同居閨門邕穆爲符堅青州刺史苻朗甚重之嘗詣虞家升堂拜其母時人以爲榮庾衮撫諸孤以慈奉諸寡以仁事加於厚而教之義方使長者體其行㓜者忘其孤孤甥郭秀比諸子姪衣食每先之以舊宅與其長兄子𢋫翕及翕卒衮哀其早孤痛其成人而未娶乃撫柩長號哀感行路聞者莫不埀涕潁川太守召爲功曹竟不就汜毓字稚春濟北蘆人也奕世儒素敦睦九族客居青州逮毓七世時人號其家兒無常父衣無常主武帝召補太𫝊叅軍不就紀瞻有重名尚書閔鴻太常薛兼廣川太守河南禇沉給事中宣城章遼歴陽太守沛國武嘏並與瞻素踈咸籍其髙義臨終託後於瞻瞻悉營䕶其家爲起居宅同於骨肉焉少與陸機兄弟親善及機被誅瞻䘏其家周至及嫁機女資送同於所生後至散騎常侍鄧攸初經難棄其子而以弟子綏奔江東攸卒綏服攸䘮三年子後至尚書右僕射范廣字仲將舉孝亷除靈壽令值亂不之官姊適孫氏早亡有孫名邁廣負力南奔雖盜賊艱急終不棄之王育少勤學太守杜宣命爲主簿俄而宣左遷萬年令杜令王攸詣宣宣不迎之攸怒曰卿往爲二千石吾所敬也今吾儕耳何故不見迎欲以小雀遇我使我畏死鷂乎育執刀叱攸曰君辱臣死自昔而然我府君以非罪黜降如日月之蝕耳小縣令敢輕辱吾君汝謂吾刀鈍邪敢如是乎前將殺之宣懼跣下抱育乃止自此知名易雄仕郡爲主簿張昌之亂也執太守萬嗣將斬之雄與賊爭論曲直賊怒叱使牽雄斬之雄趨出自若賊又呼問之雄對如此如此者三賊乃舍之嗣繇是獲免雄遂知名郭舒始爲領軍校尉坐擅放司馬彪繫廷尉獄世多義之刺史夏侯含辟爲西曹轉主簿含坐事舒自繫理含事得釋刺史宗岱命爲治中䘮母去職劉宏牧荆州引爲治中宏卒舒率將士推宏子璠爲主討逆賊郭勱滅之保全一州祖逖爲濟隂太守母䘮不之官及京師大亂逖率親黨數百人避地淮泗以所乘車馬載同行老疾躬自徒歩藥物衣糧與衆共之又多權畧是以少長咸宗之推逖爲行主髙悝廣陵人寓居江州華軼辟爲西曹掾尋而軼敗悝藏匿軼二子及妻﨑嶇經年既而遇赦悝携之出首元帝嘉而宥之孔祗字承祖太守周禮命爲功曹吏禮爲沈充所害故人賔吏莫敢近者祗冐刅號哭親行殯禮送䘮還義興時人義之郄鑒值永嘉䘮亂在鄉里甚窮綏鄉人以鑒名德𫝊共飴之時兄子邁外甥周翼並小嘗携之就食鄉人曰各自饑困以君賢欲共相濟耳恐不能兼有所存鑒於是獨往食訖以飯著兩頰邉還吐與二兒後並得存同過江邁位至䕶軍翼爲剡縣令鑒之薨也翼追撫育之恩解職而歸席苫心䘮三年後至太尉華譚字令思廣陵人爲廬江内史在郡政嚴而與上司多忤揚州刺史劉陶素與譚不善因法收譚下壽陽獄鎮東將軍周馥與譚素相親善理而出之及甘卓討馥百姓奔散馥謂譚已去遣人視之而更移近馥馥歎曰吾嘗謂華令思是臧子源之疇今果效矣甘卓嘗爲東海王越所捕下令敢有匿者誅之卓投譚而免及此役也卓遣人求之曰華侯安在吾甘揚威使也譚答不知遺絹二疋以遣之使反吿卓卓曰此華侯也覆求之譚已亡矣韋宏京兆人䘮亂之際親屬遇饑疫並盡客逰雒陽素聞應詹遂依託之詹與分甘共苦情若弟兄遂隨從積年爲營伉儷置居宅并薦之於元帝宏後位至少府卿既受詹生成之惠詹卒遂製朋友之服哭止宿草追趙氏祀程嬰杵臼之義祭詹終身陶侃爲廬州主簿太守張䕫妻有疾將迎醫於數百里時正寒雪諸綱紀皆難之侃獨曰資於事父以事君小君猶母也安有父母之疾而不盡心乎乃請行衆咸服其義顧悅之爲中軍將軍殷浩吏及浩廢爲庶人卒後將改葬悅之上疏訟寃詔追復本官初悅之將抗表訟浩浩親故多謂非宜悅之决意以聞又與朝臣爭論故衆無以奪焉時人咸稱之韓階長沙人性亷謹篤慎爲閭里所敬愛刺史譙王承辟爲議曹祭酒轉西曹書佐及承爲魏乂所執送武昌階與武延等同心隨從在承左右桓雄被害之後二人執志愈固及承遇禍階延親營殯歛送柩還都朝夕哭奠俱葬畢乃還劉敏元字道光北海人也永嘉之亂自齊西奔同縣管平年七十餘隨敏元而西行及榮陽爲盜所刼敏元己免乃還謂賊曰此公孤老餘年無幾敏元請以身代願諸君舍之賊曰此公於君何親敏元曰同邑人也窮窶無子依敏元爲命諸君若欲役之老不堪使若欲食之復不如敏元乞諸君哀也有一賊瞋目叱敏元曰吾不放此公憂不得汝乎敏元奮劔曰吾豈望生邪當殺汝而後死此公窮老神祗尚當哀憐之吾親非骨肉義非師友但以見投之故乞以身代諸大夫慈惠皆有聼吾之色汝何有靦靣目而發斯言顧謂諸盜長曰夫仁義何嘗寧可失諸君子上當爲髙皇光武之事下豈失爲陳項乎當取之繇道使所過稱詠威德奈何容畜此人以損盛美當爲諸君除此人以成諸君霸王之業前將斬之盜長遽止之而相謂曰義士也害之犯義乃俱免之何無忌爲東海王彦章中尉及桓𤣥害彦章於市無忌入市慟哭而出時人義焉檀慿之從兄子韶兄弟五人皆稚弱而孤慿之撫養若已所生後至冀州刺史後秦宗敞爲南凉州别駕初凉州刺史王尚在凉州甚有惠政姚興以秃髮傉檀代之尚既至長安坐匿呂氏宮人擅殺逃人等禁止敞與治中張穆主簿邉慮胡威等上疏理尚曰臣州荒裔鄰𢃄冦讎居泰無埀拱之安運否離傾覆之難自張氏頽基德風絶而莫扇呂數將終梟鴞以之翻翔羣生嬰罔極之痛西夏有焚如之禍幸皇鑒降眷純風遠被刺史王尚受任埀滅之州策成難全之際輕身率下躬儉節用勞逸豐約與衆同之勸課農桑時無廢業然後振王威以掃不庭廻天討以蕩氛穢則羣逆冰摧不俟朱陽之曜若秋霜隕籜豈待勁風之威何定遠之足髙營平之獨美經始甫爾㑹朝筭改授使希世之功不終於必成易失之機踐之而莫展當其時而明其事者誰不慨然既遠役遐方劬勞於外雖效未酧恩而在公無闕自至京師一旬于今出車之命莫逮萋斐之責惟深以取呂氏宮人裴氏及殺逃人薄禾等爲南臺所禁天鑒元鏡暫免囹圄譏繩之文未離簡墨裴氏年埀知命首髮二毛嫠居本家不在髙室年邁姿陋何用送爲邉藩要捍衆力是寄禾等私逃罪應憲墨以殺止殺安邉之義也假若以不送裴氏爲罪者正闕奚官之一女子耳論勲則功重言瑕則過㣲而執憲吹毛求疵忘勞記過斯先哲所以泣血於當年㣲臣所以仰天而灑涙且尚之奉國歴事二朝能否效於既在優劣簡在聖心就有㣲過功足相補宜宏罔極之施以彰覆載之恩臣等生自西川無翰飛之翼乆沉僞政絶進趨之塗及皇化既霑投竿之心㝠發遂策名委質位忝吏端主辱臣憂故重繭披欵惟陛下亮之興覽之大悅乃赦尚之罪以爲尚書册府元龜卷八百二
