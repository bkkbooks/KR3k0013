body:
  text: 册府元龜卷四百五十三宋王欽若等撰將帥部翻覆怯懦翻覆擇善而從見㡬而作君子變通之道也徇利忘義先貞後黷小人翻覆之行也若乃當百六之㑹遇屯夷之世王綱絶紐戎馬生郊九州𤓰剖以豆分羣雄豹變而鵲起走原之鹿逐之者非一止室之烏瞻之者靡定于斯時也則有居爪牙之列總旗皷之任以英豪自處以方畧相高畜其濟難之謀示兹伏順之節勇冠羣類名動鄰壤而有情深猜忍志在觀望或因緣沮衂或慿恃險阻或負釁以懐懼或乗隙以逞志繇是姦慝之迹斯露飛揚之勢莫返淪胥以敗咎將誰執詩云靡不有初鮮克有終斯之謂矣後漢高峻安定人為隗囂將擁兵萬人據高平第一安定高平縣有第一城光武使待詔馬援招降峻繇是河西道開中郎將來歙承制拜峻通路將軍封關内侯後屬大可馬吳漢共圍囂於冀及漢軍退峻亡歸故營復助囂拒隴坻及囂死後據高平畏誅堅守吕布字奉先獻帝時司徒王允以布為奮武將軍興平元年曹公東擊陶謙其將陳宫説陳留太守張邈迎吕布為兖州牧據濮陽曹公引軍擊破之布東奔劉備時備領徐州居下邳與袁術相拒於淮上術欲引布擊備乃與布書曰術舉兵詣闕未能屠裂董卓將軍誅卓為術報耻功一也昔金元休南至封丘為曹操所敗元休名尚京兆人同郡韋休甫弟五文休俱著名號為三休尚獻帝初為兖州刺史東之郡而太祖已臨兖州尚依袁術術僣號欲以尚為太尉不敢顯言私使諷之術亦不敢强也建安初尚逃還為術所害將軍伐之令術復明目於遐邇功二也術生年以來不聞天下有劉備備乃舉兵與術對戰馮將軍威靈得以破備功三也將軍有三大功在術術雖不敏奉以死生將軍連年攻戰軍糧苦少今送米二十萬斛非惟此止當駱驛復致凡所短長亦唯命布得書大悦即勒兵襲下邳獲備妻子備敗走海西饑困請降於布布又恚術運糧不復至乃具車馬迎備以為豫州刺史遣屯小沛布自號徐州牧術懼布為己害為子求婿布復許之魏孟達初為蜀宜都太守與副將軍劉封不和封尋奪達皷吹達旣懼罪又忿恚遂發表辭先主率所領降魏魏文帝善達之姿才容觀以為散騎常侍建武將軍封平陽亭侯達與桓階夏侯尚親善文帝末桓尚皆卒達自以羇旅久在疆塲心不自安諸葛亮聞之隂欲誘達數書招之達與相報答魏興太守申儀與達有隙宻表逹與蜀濳通帝未之信也司馬宣王遣參軍梁機察之又勸其入朝達驚懼遂反公孫淵明帝時為揚烈將軍遼東太守吳嘉禾元年淵稱藩於吳大帝二年春正月大帝詔曰朕以不徳肇受元命夙夜兢兢不遑假寢思平世難救濟黎庻上答神祗下慰民望是以眷眷勤求俊傑將與戮力共定海内茍在同心與之偕老今使持節督幽州領青州牧遼東太守燕王久脅賊虜隔在一方雖乃心於國其路靡緣今因天命逺遣二使欵誠顯露章表殷勤朕之得此何喜如之雖湯遇伊尹周獲吕望世祖未定而得河右方之今日豈復是過普天一統於是定矣書不云乎一人有慶兆民頼之其大赦天下與之更始其明下州郡咸使聞知特下燕國奉宣詔恩令普天率土備聞斯慶三月遣舒綜還使太常張彌執金吾許晏將軍賀達等將兵萬人金寳珎貨九錫備物乗海授淵江表傳載大帝詔曰故魏使持節車騎將軍遼東太守平樂侯天地失序皇極不建元惡大憝作害平民海内分摧羣生堙滅周餘黎民靡有孑遺方之今日亂又甚焉朕受厯數君臨萬國夙夜戰兢念在弭難若渉淵水㒺知攸濟是以把旌仗鉞剪除兇虐自東徂西靡遑寧處茍力所及民無災害雖賊虜遺種未伏辜誅猶繫囚枯木待時而斃惟將軍天姿特達兼包文武觀時覩變審於去就踰越險阻顯致赤心肇建大計為天下先元勲巨績侔於古人雖若竇融背棄隴右卒占西河以定光武休名美實豈復是過欽嘉雅尚朕實欣之自古聖帝明王建化垂統以爵褒徳以祿報功功大者祿厚徳盛者禮崇故周公有夾輔之勞太師有鷹揚之功並啟土宇兼受偹物今將軍規萬年之計建不世之畧絶僣逆之虜順天人之肅濟成洪業功無與比齊魯之事奚足言哉詩不云乎無言不讐無徳不報今以幽青二州十七郡七十縣封君為燕王使持節守太常張彌授君璽綬䇿書金虎符第一至第五竹使符第一至第十錫君𤣥圭苴以白茅爰契爾龜用錫冢社方有戎事典統兵馬以大將軍曲蓋麾幢督幽州青州牧遼東太守如故今加君九錫其敬聽後命以君三世相承保綏一方寧集四郡訓及異俗民夷安業無或擕貳是用錫君大輅戎輅𤣥牡二駟君務在勸農嗇人成功倉庫盈積官民俱豐是用錫君衮冕之服赤舄副焉君正化以徳敬下以禮敦義崇謙内外咸和是用錫君軒縣之樂君宣導休風懷保邊逺逺人囘面莫不影附是用錫君朱户以居君運其才畧官方任賢顯直措枉羣善必舉是用錫君虎賁之士百人君戎馬整齊威震遐方紏䖍天刑彰厥有罪是用錫君鈇鉞各一君文和於内武信於外擒討逆節折衝掩難是用錫君彤弓一彤矢百旃弓十旃矢千君忠勤有効温恭為徳明允篤誠感于朕心是用錫君秬鬯一卣圭瓉副焉欽哉敬兹訓典寅亮天工相我國家永終爾休舉朝大臣自丞相雍以下皆諫以為淵未可信而寵待太厚但可遣吏兵數百護送舒綜帝終不聽臣松之以為大帝愎諫違衆信淵意了非有攻伐之規重愎之慮宣達錫命乃用萬人是何不愛其民昏虐之甚乎此役也非惟闇塞實為無道淵果斬彌等送其首於魏沒其兵資大帝大怒欲自征淵江表傳載大帝怒曰朕年六十凡事難易靡所不嘗近為䑕子所前却令人氣湧如山不自截䑕子頭以擲於海無顔復臨萬國就令顚沛不以為恨尚書僕射薛綜等切諫乃止淵後又遣使謝吳自稱燕王求為與國然猶令官屬上書自直于魏曰大司馬長史臣郭昕參軍臣柳浦等七百九十八人言奉被今年七月己卯詔書伏讀懇切精魄散越不知身命所當投措昕等伏自惟省螻蟻小醜器非時用遭值千載被受公孫淵祖考以來光明之徳惠澤沾渥滋潤榮華無尺寸之功有負乘之累遂蒙褒奬登名天府並以駑騫附龍託驥紆青拖紫飛騰雲梯感恩惟報死不擇地臣等聞明君在上聽政采言人臣在下得無隠情是以因緣訴讓冐犯愬寃郡在藩表宻邇不羈平昔三州轉輸費調以供賞賜歳用累億虗耗中國然猶䟦扈䖍劉邊陲烽火相望羽檄相逮城門晝閉路無行人州郡兵戈奔散覆沒淵祖父度初來臨郡承受荒殘開日月之光建神武之畧聚烏合之民埽地為業威震耀于殊俗徳澤被于羣生遼土之不壊實度是頼孔子曰㣲管仲吾其被髪左袵向不遭度則郡早為丘墟而民係於虜庭矣遺風餘愛永存不朽度旣薨殂吏民感慕欣戴子康尊而奉之康踐統洪緒克壯徽猷文昭武烈邁徳種仁乃心京輦翼翼䖍恭佐國平亂効績紛紜功隆事大勲藏王府度康當値武帝休明之㑹合䇿明之計夾輔漢室降身委質卑已事魏匪處小厭大畏而服焉乃慕託高風懐仰盛懿也皇帝亦虗心接納待以不次功無巨細每不見忘又命之曰海北土地割以付君世世子孫實得有之皇天后土實聞徳音臣庶小大豫在下風奉以周旋不敢失墜淵生有蘭石之姿少含愷悌之訓允文允武忠惠且直生民欽仰莫弗懐愛淵纂戎祖考君臨萬民為國以禮淑化流行獨見先覩羅結遐方勤王之義視險如夷世載忠亮不隕厥名孫權慕義不逺萬里連年遣使欲自結援雖見絶殺不念舊怨纎纎往來求成恩好淵執節彌固不為利回守志匪石確乎彌堅猶懼丹心未見保明乃卑辭厚幣誘致吳使梟截獻馘以示無二吳雖在逺水道通利舉㠶便至無所隔限淵不顧敵讐之深念存人臣之節絶彊吳之歡昭事魏之心靈祗明鑒普天咸聞陛下嘉美洪烈懿兹武功誕錫休命寵亞齊魯下及陪臣普受介福誠以天覆之恩當卒終始得竭股肱永保祿位不虞一旦横被殘酷惟育養之厚念積累之効悲思不遂痛切見棄舉國號咷拊膺泣血夫三軍所伐蠻夷戎狄驕逸不䖍於是致武不聞義國反受誅討盖聖主之制五服之域有不供職則修文徳而又不至然後征伐淵小心翼翼恪恭于位勤事奉上可謂勉矣盡忠竭節還被患禍小弁之作離騷之興皆由此也就或佞邪盗言孔甘猶當親覧憎而知善讒巧似直惑亂聖聽尚望文告使知所繇若信有罪當垂三宥若不改悟計功減降當在八議而濳軍伺襲大兵奄至舞戈長驅衝擊遼土犬馬惡死况於人類吏民昧死挫辱王師淵雖寃枉方臨危殆猶恃聖恩悵然重奔冀必姦臣矯制妄肆威虐乃謂臣等曰漢安帝建光元年遼東屬國都尉寵奮受二月乙未詔書曰收幽州刺史馮煥𤣥莬太守姚光推案無乙未詔書遣侍御史幽州牧考姦臣矯制者今刺史或儻謬承矯制乎臣等議以為刺史興兵揺動天下殆非矯制必是詔命淵乃俛仰歎息自傷無罪深惟上地所以養人竊慕古公杖䇿之岐乃欲投冠釋紱逝歸林麓臣等維持誓之以死屯守府門不聽所執而七營虎士五部蠻夷各懐素飽不謀同心奮臂大呼排門遁出近郊農民釋其耨鏄伐薪制梃改桉為櫓奔馳赴難軍旅成行雖蹈湯火死不顧生淵雖見棄怨而不怒比遣勑軍勿得干犯及手書告語懇惻至誠而吏士凶悍不可解散期于畢命投死無悔淵懼吏士不從教令乃躬馳騖自往化解僅乃止之一飯之惠匹夫知死况淵累葉信結百姓恩著民心自先帝初興爰曁陛下榮淵累葉豐功懿徳䇿名褒揚辯著廊廟勝衣舉履誦詠明文以為口實埋而掘之古人所耻小白重耳衰世諸侯猶慕著信以隆伯業詩美文王萬邦作孚論語稱仲尼去食存信信之為徳固亦大矣今吳蜀共帝鼎足而居天下揺蕩無所統一臣等毎為陛下懼此危心淵據金城之固仗和睦之民國殷兵彊可以横行䇿名委質守死善道忠至義盡為九州表方今二敵闚𨵦未知孰定是之不戒而淵是害茹柔吐剛非王者之道也臣等雖鄙誠竊耻之若無天乎臣一郡吉凶尚未可知若云有天亦何懼焉臣等况聞仕於家者二世則主之三世則君之臣等生于荒裔之土出于圭竇之中無大援于魏世𨽻於公孫氏報生與賜在於死力昔蒯通言直漢祖赦其誅鄭詹辭順晉文原其死臣等頑愚不達大節敬執一介披露肝膽言逆龍鱗罪當萬死惟陛下恢崇旣欲亮其控告使疏逺之臣永有保恃梁侯景初為後魏河南大行臺文帝大統十三年正月齊神武薨文襄嗣位文襄與景有隙景不自安遣使請舉河南十六州附西魏七月景又宻圖附梁時周文帝為西魏柱國大將軍知其謀悉追前後所配景將士景懼遂叛入梁後魏夏侯道遷初仕南齊為南譙太守歸國為驍騎將軍戍合肥道遷棄戍南叛北齊司馬世雲為潁川刺史侯景反世雲舉州從之景於渦陽敗後世雲復有異志為景所殺彭樂驍勇善騎初隨杜雒周賊知其不立降爾朱榮從破葛榮于滏又為都督從神武與行臺僕射于暉討破羊侃于瑕丘後叛投逆賊韓樓封北平王及爾朱榮遣大都督侯深擊樓樂又叛樓降深神武出山東樂又隨從王琳在梁為湘州刺史及魏平江陵已立梁王詧琳乃為梁元帝發䘮三軍縞素遣别將侯平率舟師攻梁琳屯兵長沙傳檄諸方為進趨之計時長沙藩王蕭韶及上逰諸將推琳主盟侯平雖不能渡江頻破梁軍又以琳兵威不接翻更不受指麾琳遣將討之不尅又師老兵疲不能進乃遣使奉表詣齊并獻馴象又使獻欵于魏求其妻子亦稱臣于梁梁劉嗣彬知俊族子也㓜從知俊征行累遷為軍校及知俊叛以不預謀得不坐貞明末大軍與晉王對壘於徳勝久之嗣彬率數騎奔于晉具言朝廷軍機得失又以家世讐怨將以報之晉王深信之即厚給田宅仍賜錦衣玉帶居一年復來奔龍徳三年冬從王彦章戰于中都擒之晉王笑謂曰爾可還予玉帶矣遂誅之後唐康延孝北塞部落人初𨽻太原因得罪亡命于汴梁末帝時頻立軍功段凝率衆五萬營於王府延孝時為先鋒指揮使率百騎來奔莊宗得之喜解御衣金帶賜之問梁之兵機延孝備陳利害莊宗平梁頗有力焉漢杜重威為魏博節度使高祖起義晉陽重威首獻誠欵及入汴移領宋州重威拒命不行朝廷命上將高行周督衆問罪帝親討之聲云駕至即降尋命給事中陳觀喻㫖使其歸命及至城又閉闔阻之繇是六師憤激内粟漸空而守陴者雜以僧道掠米糧以給其食士庶稍一事違其命者必族而食之左右思變咸欲加害懼而請降與妻孥相次而出帝以宿舊釋其罪命守太傅居班怯懦夫專分閫之權處建牙之任訓必勝之衆練賈勇之夫致討不庭用威不軌必在見危致命臨難忘身彰敢死之名顯盡忠之節者也若乃昧逺大之畧懐顧慮之疑聞强敵而斯退知勢弱而遂逃俾失衆心蔑有鬬志與彼折軾於車下投蓋于稷門者異矣辱命挫威將何以塞其責歟子元楚大夫也以車六百乗伐鄭入于秸秩之門秸秩鄭逺郊之門也子元鬬御疆鬬梧耿之不比為斾子元自與三子特造斾以居前廣充幅長尋曰旐繼曰斾鬬班王孫㳺王孫喜殿三子在后為反禦衆車入自純門及逵市純門鄭外郭門也逵市鄭内道市縣門不發楚言而出子元曰鄭有人焉縣門施於内城鄭示楚以閒暇故不閉城門出兵而效楚言故子元畏之不敢進諸侯救鄭楚師夜遁趙羅晉大夫也趙鞅禦鄭師遇於戚將戰郵無䘏御簡子衛太子為右郵無䘏王良也登鐵上鐵丘名望見鄭師衆太子懼自投于車下子良授太子綏而乘之曰婦人也言其怯鄭人擊簡子中肩斃于車中斃踣也獲其蠭旗蠭旗旗名太子救之以戈鄭師北獲温大夫趙羅羅無勇故鄭師雖北猶獲羅孟孺子洩魯大夫也孟懿子之子武伯彘齊國書帥師伐魯孟孺子洩帥右師冉求帥左師戰于郊師入齊軍冉求之師右師奔師獲甲首八十冉求所得齊人不能師不能整其師宵諜曰齊人遁諜間也冉有請從之三季孫弗許孟孺子語人曰我不如顔羽而賢於邴洩二子與孟懿子同車子羽鋭敏子羽顔羽鋭精也敏疾也言欲戰我不欲戰而能黙心雖不欲口不言奔洩曰驅之言驅馬欲奔趙鞅晉大夫圍衛齊國觀陳瓘救衛得晉人之致師者子玉使服而見之子玉陳瓘也釋囚服服其本服曰國子實執齊柄而命瓘曰無辟晉師豈敢廢命欲必敵晉子又何辱言不須來致師自將往戰簡子曰我卜伐衛未卜與齊戰乃還畏子玉荀瑶晉大夫帥師伐鄭次于桐丘鄭駟𢎞請救于齊𢎞駟􅀈子齊師將興陳成子屬孤子三日朝屬會死事者之子使朝三日以禮之設乗車兩馬繫五邑焉乗車兩馬大夫服又加之五邑召顔涿聚之子晉曰隰之役而父死焉以國之多難未女恤也今君命女以是邑也服車而朝毋廢前勞乃救鄭及留舒違穀七里穀人不知言其整也留舒齊地違去也及濮雨不渉濮水自陳留酸棗縣傍河東北經濟隂至高平入濟子思曰大國在敝邑之宇下是以告急今師不行恐無及也子思國參成子衣製仗戈製雨衣也立于阪上馬不出者助之鞭之知伯聞之乃還畏其得衆心曰我卜伐鄭不卜敵齊漢楊僕為樓船將軍武帝元封四年坐為將軍擊朝鮮畏懦入竹二萬箇贖完為城旦後漢周魴為䕶羌校尉明帝永平十三年秋與西羌迷唐戰周魴還營自守明年魴坐畏懦徵陳瑀為揚州牧袁術為曹公所敗於封丘南入投瑀瑀拒之術走隂陵好辭以下瑀瑀不知權而又怯不即攻術于淮北集兵向壽春瑀懼使其弟公琰請和於術術執之而進瑀走歸下邳焦和為青州刺史是時英雄並起黄巾㓂暴和務及同盟俱入京畿不暇為民保障引軍踰河而西未乆而袁曹二公與董卓將戰于滎陽敗績黄巾遂廣屠裂城邑和不能禦然軍器尚利戰士尚衆而耳目偵邏不設恐動之言妄至望㓂奔走未嘗接風塵交旗皷也欲作䧟氷丸沈河令賊不得渡禱祈羣神求用兵必利蓍筮嘗陳于前巫祝不去於側人見其清談如雲出則混亂命不可知州遂蕭條悉為丘墟也韓馥為冀州牧渤海太守袁紹以渤海起兵將以誅董卓自號車騎將軍主盟與馥立幽州牧劉虞為帝遂遣使奉章詣虞虞不敢受後馥軍安平為公孫瓚所敗瓚遂引兵會卓西入關紹還軍延津因馥惶遽使陳留高幹潁川荀諶等説馥曰公孫瓚乗勝來向南而諸郡應之袁車騎引軍東向此其意不可知竊為將軍危之馥曰為之奈何諶曰公孫提燕代之卒其鋒不可當袁氏一時之傑必不為將軍下夫冀州天下之重資也若兩雄并力兵交于城下危亡可立而待也夫袁氏將軍之舊且同盟也當今為將軍計莫若舉冀州以讓袁氏袁氏得冀州則瓚不能與之爭必厚徳將軍冀州入于親交是將軍有讓賢之名而身安于泰山也願將軍勿疑馥素恇怯因然其計馥長史耿武别駕閔純治中李歴諫馥曰冀州雖鄙帶申百萬穀支十年袁紹孤客窮軍仰我鼻息譬如嬰兒在股掌之上絶其哺乳立可餓殺奈何乃欲以州與之馥曰吾袁氏故吏且才不如本初度徳而讓古人所貴諸君獨何病焉從事趙浮程奐請以兵拒之馥又不聽乃讓紹遂領冀州刺史晉卞敦為太子左衛率時石勒侵逼淮泗元帝偹求良將可以式遏邊境者公卿舉敦除征虜將軍徐州刺史鎮泗口及石勒㓂彭城敦自度力不能支與征北將軍王䆳退保盱眙賊勢遂張淮北諸郡多為所䧟竟以畏懦貶秩三等為鷹揚將軍王澄為荆州刺史益梁流人俱反推杜弢為主澄出領軍擊杜弢次于作塘山簡參軍王冲叛于豫州自稱荆州刺史澄懼使杜㽔守江陵澄遷于孱陵尋奔沓中郭舒諫曰使君臨州雖無異政未失衆心今西收華容尚義之兵足以擒此小醜奈何自棄澄不能從麴允為大都督驃騎將軍時劉曜攻北地允次于晉白城以救之曜聞而轉㓂上郡允軍於靈武以兵弱不敢進劉波為冠軍將軍南郡相時苻堅弟融圍雍州刺史朱序於襄陽波率衆八千救之以敵彊不敢進序竟䧟沒波以畏懦免官鍾雅為驍騎將軍蘇峻之難詔為前鋒監軍假節領精勇千人以拒峻雅以兵少不敢擊退還荀羡為北中郎將初段龕東屯廣固自號齊王稱藩于建業慕容恪討之龕所署徐州刺史王騰索頭單于薛雲降于恪龕遣使詣建業請救穆帝遣羡赴之憚虜彊遷延不敢進司馬流為左將軍率衆拒蘇峻前鋒遇于慈湖流性怯懦不閑軍旅時率水部兵二千南上遇賊懼形于色臨陣方食不知口處問左右曰吾口何在旣而合戰敗遇殺桓冲為車騎將軍時苻丕等㓂襄陽攻朱序又遣荀池石越毛當以衆五萬屯于江陵冲擁衆七萬為序聲援憚池等不進保據上明劉邁劉毅兄也宋高祖起義師誅桓𤣥時邁先在京師事未發數日高祖遣同謀周安穆報之使為内應邁外雖酬許内甚震懼安穆見其惶駭慮事必泄乃馳歸時𤣥以邁為竟陵太守邁不知所為便下船欲之郡是夜𤣥與邁書曰北府人情云何卿近見劉裕何所道邁謂𤣥已知其謀晨起白之𤣥驚懼封邁為重安侯旣而嫌邁不報安穆使得逃去乃殺之後秦楊伯壽為姚興將時仇池公楊盛擾祁山興遣趙琨與伯壽討之盛率衆與琨相持伯壽畏懦弗進琨衆寡不敵為盛所敗興斬伯壽而還宋江夏王義恭總督諸軍出鎮彭泗時後魏太武自𤓰歩北走經彭城城下過遣人語城内食盡且去須麥熟更來義恭大懼閉門不敢追慮虜期又至議欲芟麥剪苖移民堡聚衆論並不同義恭之議遂寢任農夫為左衛將軍時桂陽王休範在江州有異志朝廷慮其下以農夫為輔師將軍淮南太守戍姑孰以防之休範尋率衆向京邑奄至近道農夫棄戍還都周嶠為冠軍將軍時元兇劭弑立隋王誕舉義誕檄又至嶠素怯惶恛不知所從為府司馬丘珍孫所殺殷孝祖為兖州刺史撫軍將軍時賊據赭圻孝祖將進攻之與大統王𤣥謨别悲不自勝衆並駭怪南齊張瓌為光祿大夫明帝方疑大司馬王敬則以瓌為平東將軍吳郡太守以為之備及敬則反瓌遣將吏三千人迎拒於松江聞敬則軍皷聲一時散走瓌棄郡逃民間事平瓌復還郡為有司所奏免官削爵永元初復為前將軍及義師下東昏假瓌節戍石頭義師至新亭瓌棄城走還宫梁曹景宗為平西將軍郢州刺史魏軍攻司州圍刺史蔡道恭城中負板而汲景宗望門不出但耀軍逰獵而已及司城䧟為御史中丞任昉所奏高祖寢而不治徵為䕶軍將軍元慶和為將望敵敗退武帝責之曰言同百舌膽若鼯䑕遂徙合浦陳吳明徹為武州刺史天嘉元年周將賀若敦率馬歩一萬奄至武陵明徹不敵引軍還巴陵北齊孫騰為尚書左僕射時西魏遣將㓂南兖詔騰為南道行臺率諸將討之騰性恇怯無威畧失利而還李神雋孝明末除鎮軍將軍行相州事時葛榮南逼神雋憂懼乃故墜馬傷脚仍停汲郡有詔追還傅靈慶父融有三子靈慶靈根靈越並有才力不能署武將蕭斌王𤣥謨冦碻磝時融始死𤣥謨雖引靈慶為軍主將攻城攻車為城内所燒靈慶懼軍法詐云傷重令左右轝之還營遂與壯士數十騎遁還斌𤣥謨命追之左右諌曰靈慶兄弟並有雄材兼其部曲多是壯勇如彭超戸生之徒皆一當十人援不虗發不可逼也不如緩之𤣥謨乃止靈慶至家遂與二弟匿于山澤之間賀悦征蠕蠕為别道將坐逐賊不進詐增虜級當斬贖為庶人㓂猛為羽林中郎從高祖征南陽以擊賊不進免官尉世辯粲之子也周師將入鄴令辯率千餘騎覘候出塗口登高西望遥見羣烏飛起謂是西軍旗幟即馳還比至紫陌橋不敢廻顧後周庾信初在梁為東宫學士領建康令侯景作亂梁簡文帝令信率宫中文武千餘人營於朱雀航及景至信以衆先退隋段達大業初為金紫光祿大夫帝征遼東百姓苦役平原祁孝徳清河張金稱等並聚為羣盗攻䧟城邑郡縣不能禦帝令達擊之數為金稱等所挫亡失甚多諸賊輕之號為姥後用鄃令揚善會之計更與賊戰方致克捷還京師以公坐免明年帝征遼東以達留守涿郡俄而復拜左翊衛將軍高陽魏刁兒聚衆十餘萬自號歴山飛㓂掠燕趙達率涿郡通守郭絢擊敗之于時盗賊旣多官軍惡戰達不能因機决勝唯持重自守頓兵饋糧多無克獲時皆謂之為怯懦唐裴寂為晉州道行軍總管拒宋金剛于介州戰始合寂棄軍而走兵遂大潰復令鎮撫河東地寂恇怯無捍禦之才唯發使駱驛催督虞泰二州居人勒入城堡焚其積聚百姓惶駭復思為亂張瑾為羽林將軍復遇突厥來㓂瑾不敢戰保于幽州髙祖以其年老拜冠軍將軍優以散秩張亮為滄海道行軍大總管進兵屯于建安城下營壘未固士卒多樵採賊衆奄至軍中惶駭亮素怯懦無計䇿但踞胡牀直視而無所言將士見之飜以亮有膽氣故衆情稍安其副總管張金樹等乃鳴皷令士衆擊賊破之太宗亦知其無將帥之材而不之責韋挺為太常卿先運糧河北旣失支度令除名從軍會李勣擊破蓋牟城詔挺統兵鎮守城去大軍百有餘里與髙麗新城鄰接髙麗大兵或皷譟至其城下挺素無威畧不堪其憂乃貽書於道術人公孫常置詞怨望常以他罪自殺於其囊中得挺所與常書太宗詔挺問之對多不以實太宗尤責讓之乃以宿經驅䇿不忍加誅授朝散大夫守象州刺史病卒韋待價為安息道大總管以擊吐蕃待價旣無統領之材遂狼狽失據士卒饑餓多轉死溝壑時人寃之李子和為靈州總管旣絶梁師都又伺突厥間釁遣使以聞為處羅可汗候騎所獲處羅大怒囚其子于外第子和自以孤危甚懼乃㧞戸口南徙詔以延州故城居之武懿宗為金吾大將軍則天萬歳通天中契丹賊帥孫萬斬冦河北命懿宗為神兵道大總管以討之軍次延州及聞賊將至冀州懿宗懼便欲棄軍而遁王君㚟判梁州都督時吐蕃㓂䧟𤓰州執刺史田仁獻及㚟父壽殺掠人户並取軍資及倉糧又進攻玉門軍及長樂縣仍縱僧徒使歸梁州謂君㚟曰將軍嘗欲以忠勇報國今日何不一戰君㚟聞父被執登陴西向而哭竟不敢出兵杜鴻漸肅宗至徳中為荆南節度使襄州大將康楚元張嘉延盗所管兵犯襄州城以叛刺史王政遁走嘉延南襲荆州鴻漸聞之棄城而遁澧朗峽歸等州聞鴻漸出奔皆惶駭潛竄山谷後為黄門侍郎平章事代宗永㤗元年成都裨將崔寧逐其帥郭英乂走死簡州代宗以鴻漸兼成都尹山南西道劔南道東川西川卭南等道副元帥劔南西川節度使鴻漸出駱谷有謀曰相公駐車閬州遥制劔南數移牒述英乂過失言寧有方畧寧腹心攝諸刺史者皆奏正之命寧及將校不疑然後與東川節度張獻誠及諸賊帥合議數出兵掠擾寧旣數道連出兵未經一年寧兵自然耗少寧窮必束身歸朝此上䇿也鴻漸畏懦計未决㑹寧使至辭禮卑敬且送繒錦數千萬鴻漸貪其利遂至成都日與判官杜亞楊炎將吏等高會縱觀軍州政事悉委寧仍連表聞薦先時張獻誠數與寧戰獻誠屢敗旌節為寧所奪朝廷因鴻漸之請加寧成都尹兼西山防禦使西川節度行軍司馬崔光逺乾元中為魏州節度使使將軍李處崟拒賊賊大至處崟敗投告光逺賊隨處崟至城下反間之曰處崟召我來何為不出光逺乃腰斬處崟處崟素善戰衆皆倚之及死人用危懼魏州城自祿山反袁知秦能元皓等皆繕完之甚堅峻光逺不能守遂突圍夜渡河而南兵士多死没焉旣歸朝不罪之劉徳信徳宗朝為神䇿應援淮西招討使時李希烈徳信統招召子弟軍戍陽翟徳信以賊接近不敢至率衆赴汝州其後陽翟河陽皆䧟杜彦先為鹽州刺史貞元二年十二月吐蕃來㓂彦先使以牛酒犒之吐蕃謂曰我欲州城居之聽爾率其人而去彦先乃悉衆奔鄜州吐蕃遂䧟鹽州蘇太平隴州將也貞元三年吐蕃圍華亭守將王仙鶴求救於隴州刺史蘇清沔清沔令太平率一千五百人赴之及中路其逰騎百餘沒于賊太平素恇怯寡謀遽引衆退歸韓全義出自行間少從軍事竇文場及文場為中尉用全義為帳下偏將典神䇿兵在長武城貞元十三年為神䇿行營節度長武城使代韓潭為夏綏銀宥節度詔以長武兵赴鎮全義貪而無勇短於撫御制未下軍中知之相與謀曰夏州沙磧之地無耕蠶生業盛夏移徙吾所不能是夜戍卒皷譟為亂全義踰城而免殺其親將王栖巖趙䖍曜等頼都虞候高崇文誅其亂首而止之全義方獲赴鎮孟凖淮南大將也初徐州節度使張建封卒其子愔為三軍所立詔淮南節度使杜佑兼徐泗節度委以討伐佑大具舟艦遣凖先甞之凖渡淮而敗佑固境不敢進仍詔以徐州授愔袁滋初為中書侍郎平章事會韋臯殁劉闢擁兵自擅命滋持節安撫中路拜檢校吏部尚書平章事劔南西川節度賊兵方熾滋懼而不進貶吉州刺史杜淑良穆宗長慶中為滄徳節度使時討幽鎮二叛遇賊輙揣其無勇每先犯之旣䧟弓髙縣尋復奔敗䘮所持節貶為歸州刺史李聽以文宗太和六年為徐州節度使聽有蒼頭在徐州為大將不欲聽至聽先使親民慰勞徐人蒼頭遂害使者聽不敢言因以疾辭改太子太保後唐夏魯竒奏臣考限已滿乞差替人懼董璋侵噬故也晉安崇阮仕後唐為䕫州節度使時董璋㓂峽内諸州崇阮望風遁走棄城歸闕待罪於閤門詔釋之馬全節為鄴都留守少帝開運二年契丹趙延壽愓隱羸騎萬餘至湯隂而還議者以為如全節等軍祗在相州出精騎以躡之則破之必矣及延壽等退去之日並無一騎踵之失機斷矣景延廣為侍衛親軍都指揮使同平章事少帝親駐澶淵延廣為上將凡六師進退皆出胷臆少帝亦不能制衆咸憚而忌之冦旣至城下使人宣言曰景延廣喚我來相殺何不急戰一日高行周與蕃軍相遇於近郊以衆寡不敵急請濟師延廣勒兵不出是日行周幸而獲免及冦近延廣猶閉柵自固士大夫曰昔與彼絶好言何勇也今冦至若是氣何憊也漢杜重威為鎮州節度使契丹連年入㓂重威但閉壁自守部内城邑相繼破䧟一境生靈坐受其屠戮重威任居方面未嘗以一士一騎救之每北騎數十驅漢人千萬過城下如入無人之境重威但登陴注目畧無邀取之意開運元年秋加北面行營招討使二年大軍下泰州滿城契丹自古北口廻軍追躡王師重威等狼狽而旋至陽城為彼所困㑹大風猛烈軍情憤激符彦卿張彦澤等引軍四出北師大潰諸將欲追之重威曰逢賊得命更望複子乎遂收軍馳歸常山張從恩為右金吾衛上將軍開運元年契丹前鋒至邢州鎮州杜重威遣人間道告急少主將親御六軍渡河㑹不豫乃令從恩鄴都馬全節河中安審琦等㑹合諸道之師屯於邢州初趙延壽䧟皷城中多富族所得寳貨之物延壽悉輸于契丹王之母北人貪利北主乃自將諸將繼踵至于元氏朝廷知之乃詔從恩等引師漸退軍中遽聞人情震懼乃引還殆無行伍或棄兵甲一路居人皆遭剽剝焚燒廬舍比至相州不能整肅繇是行人皆歸咎於從恩册府元龜卷四百五十三
