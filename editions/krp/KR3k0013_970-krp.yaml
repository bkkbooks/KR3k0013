body:
  text: 册府元龜卷九百七十宋王欽若等撰外臣部朝貢第三隋髙祖開皇元年三月白狼國七月靺鞨酋長八月突厥阿波可汗九月突厥沙鉢畧可汗並遣使貢方物二年正月髙麗百濟並遣使獻方物十一月髙麗又遣使獻方物三年正月髙麗四月突厥五月髙麗靺鞨並貢方物八月靺鞨又貢方物四年靺鞨貢方物契丹率諸莫賀弗來謁五年四月契丹主多彌遣使貢方物六年三月突厥沙鉢畧遣使貢方物是年女國遣使朝貢七年突厥沙鉢畧使其子入貢方物是年突厥都藍可汗遣其母弟傉但特勒獻于闐玉杖八年突厥都藍部落大人相率遣使貢馬萬匹羊二萬口駞牛各五百頭十年七月吐谷渾十一月契丹並遣使朝貢十一年正月髙麗二月吐谷渾四月突厥雍虞閭可汗五月髙麗十二月靺鞨並遣使貢方物十二年春正月帝在仁夀宫突厥髙麗契丹並遣使獻方物是年吐谷渾靺鞨並遣使貢方物十三年正月契丹奚霫室韋七月靺鞨並遣使貢方物十五年五月吐谷渾六月林邑並遣使貢方物十七年六月髙麗七月突厥並遣使貢方物十一月突厥遣使來朝煬帝大業三年五月突厥啓民可汗遣子拓特勒來朝景寅又遣其兄子毘黎伽特勒來朝六月吐谷渾髙昌突厥莫何可汗並遣使貢方物四年三月百濟倭赤土伽羅舍國並遣使貢方物五年二月赤土國四月狄道党項羗並遣使貢方物是年髙麗吐谷渾伊吾並遣使來朝八月突厥沙鉢畧可汗遣子庫舍特勒來朝是年石國遣使朝貢六年三月倭國六月室韋赤土並遣使貢方物七年二月百濟遣使朝貢十年七月曹國百濟國並遣使貢方物十一年正月突厥新羅靺鞨畢大辭訶咄傳越烏那曷波臘吐火羅俱慮建忽論靺鞨訶多沛汗龜兹疏勒于闐安國曹國何國穆國畢衣宻失范延伽折契丹等國並遣使朝貢十二年二月真臘國婆利國並遣使貢方物附國鏺汗挹恒末國史國波斯漕國焉耆等國大業中並遣使朝貢唐髙祖初為唐主突厥遣使獻良馬即位龜兹國王蘇伐㪍駃遣使來朝武徳元年五月突厥始畢可汗七月西蕃突厥闕可汗並遣使朝貢九月始畢又遣骨咄禄特勒來朝二年二月吐谷渾遣使朝貢四月曷薩那可汗獻大珠是月始畢可汗七月西突厥葉䕶可汗及髙昌九月吐谷渾十月靺鞨酋帥突地稽遣使朝貢突稽者靺鞨之渠長也隋大業中與兄瞞咄率其部内屬於營州瞞咄死代總其衆拜遼西太守封扶餘侯朝煬帝於江都屬化及之亂以其徒數百間行歸栁城至是通使焉十一月吐谷渾党項並遣使朝貢是年髙麗王髙建武遣使來朝三年正月三月西蕃突厥葉䕶可汗遣使朝貢是年髙昌王麴伯雅遣使來朝五月六月突厥繼來貢方物八月西㸑十一月突厥並來貢方物是年䍧牱蠻首領謝龍羽遣使朝貢四年正月突厥頡利可汗三月西突厥葉䕶可汗遣使朝貢十月百濟遣使獻果下馬是月新羅國句麗及西域二十二國並遣使朝貢十二月昆眀西南夷昆彌遣使朝貢先是隋文帝時遣史萬嵗平南寧至西洱河其國人來拒因獻明珠徑寸萬嵗班師至是嶲州治中吉宏偉通南寧因至其國諭之遂使入朝自是以後朝貢不絶五年四月西突厥葉䕶可汗遣使獻獅子皮又八月遣使獻名馬十一月靺鞨渠帥阿固郎來朝是年突厥頡利可汗及髙麗並遣使朝貢六年二月林邑四月西突厥六月契丹酋帥孫敖曹十月新羅十二月白蘭白狗羗髙麗突厥吐谷渾並遣使朝貢是年真臘國遣使貢方物七年二月契丹三月昆眀五月百濟六月康國吐谷渾及西突厥莫賀咄可汗七月百濟康國曹國並遣使朝貢靺鞨渠帥阿固郎來朝六月髙昌獻狗雌雄各一髙六寸長一尺餘性甚慧能牽馬銜燭云本出拂菻中國有拂菻狗自此始也九月百濟遣使獻光眀甲是月吐谷渾十二月髙麗國並遣使來貢方物八年正月突厥頡利可汗三月吐谷渾四月林邑九月真臘國叅半國十一月新羅百濟並遣使朝貢九年三月西突厥葉䕶可汗四月靺鞨六月葉䕶可汗七月新羅並遣使朝貢九月頡利可汗獻馬三千匹羊萬口不受十一月頡利可汗十二月髙麗百濟党項並遣使朝貢康國王屈木支遣使獻名馬太宗貞觀元年正月西突厥閏三月髙昌吐谷渾等五月何國康國六月新羅十月西突厥十一月新羅並遣使朝貢二年四月西突厥遣使貢方物九月髙麗王建武遣使奉賀破突厥頡利可汗並上封域圖十月林邑真臘叅半殊柰並遣使朝貢十一月頡利可汗遣使貢馬牛數萬許是年鐵勒遣使朝貢三年正月契丹渠帥來朝二月髙昌八月薛延陁九月髙麗百濟新羅並遣使朝貢拔也古僕骨同羅奚等渠帥並來朝十一月西突厥髙昌十二月西趙夷子䍧牱兖州蠻靺鞨别部並遣使朝貢契丹東謝渠帥來朝是年霫國君長遣使貢方物室韋遣使貢豐貂自此朝貢不絶四年二月薛延陁吐谷渾並遣使朝貢五年林邑獻火珠状如水精日正午時以珠承景取艾衣之即火見云得於羅利國婆利國遣使隨林邑使獻方物七月室韋九月薛延陁並遣使貢方物十二月䍧牱蠻謝龍羽遣使朝貢是年龜兹國王蘇伐疊遣使獻馬自此朝貢不絶又東女國王湯滂氏遣使入朝五年九月百濟十月薛延陁十一月室韋倭黒水靺鞨並遣使朝貢党項白蘭渠帥奚契丹俟斤並來朝是年林邑獻五色鸚鵡又獻白鸚鵡情識辨慧善於應答自此朝貢不絶六年正月五月薛延陁遣使朝貢吐谷渾遣其名王來朝六月契丹渠帥來朝七月焉耆閏八月契丹奚十一月薛延陁室韋靺鞨十一月雪山党項百濟新羅並遣使朝貢是年于闐國王尉遲屋宻遣使獻玉帶帝優詔答之又烏羅渾國君長遣使獻貂皮七年正月契丹奚渠帥並來朝五月吐谷渾七月髙昌九月盤盤國十月西突厥奚利苾咄陸可汗並遣使朝貢八年四月吐谷渾遣使朝貢室韋靺鞨渠帥並來朝十一月吐蕃十二月石國髙昌並遣使朝貢九年正月西突厥同娥設二月于闐王焉耆四月薛延陁真臘渴盤陁國閏月疏勒國五月吐火羅八月西突厥九月于闐室韋薛延陁盤盤國十月處月鴟十一月百濟十二月吐蕃西突厥並遣使來朝貢方物是年康國獻獅子十年二月百濟焉耆于闐疏勒三月薛延陁八月甲子西突厥十二月疏勒朱俱波甘棠並遣使來朝十一年六月罽賔遣使獻舍利名馬八月西蕃咥利失可汗遣使獻方物十一年吐谷渾河源郡王慕容諾曷鉢獻牛羊萬三千頭薛延陁遣子達度設頡利苾來朝十二月百濟王扶餘璋遣太子隆來朝并獻鐵甲雕斧帝優勞之是年康國獻金桃銀桃詔令植之於苑囿十二年正月僧髙武令迦乍鳩宻等四國遣使朝貢並南荒之小國也朝中國自是始通衣服言音與林邑同俗六月墮和羅國遣使貢方物南方荒外崑崙之類也八月吐谷渾十月西突厥烏羅國喝羅國十一月安國並遣使貢方物回紇菩薩南過賀蘭山臨黄河遣使入貢十三年二月波斯康國六月昆眀國九月薛延陁並遣使朝貢十月百濟遣使貢金甲雕斧十四年正月焉耆國三月流鬼國五月訶陵墮和羅罽賔國並遣使貢方物是年髙麗王遣其太子桓權來朝并獻方物十五年二月盤盤國十一月甲午大羊同國並遣使貢方物是年天竺國王尸羅逸多遣使朝貢帝復遣李義報使其王復遣使獻大珠及鬱金香菩提樹十六年春正月吐蕃于闐百濟髙麗新羅康國龜兹吐谷渾曹國賀國史國婆羅國曇陵叅半四月俱宻國五月林邑國十一月朱陁國烏萇國遣使獻方物烏萇自古未通中國其王達摩因陁訶斯遣使奉表曰大福徳至尊一切王中上乗天寶車破諸黒暗譬如帝釋能伏阿脩羅王奴宿種善根得生釋種拜至尊因獻龍腦香帝嘉其逺至降璽書以答慰之是年罽賔國遣使獻褥特䑕喙尖而尾赤能食蛇有被蛇螫者䑕輙臭而尿之其瘡立愈十七年正月朔薛延陁百濟髙麗新羅吐谷渾康國女國閏六月墮和羅國十一月吐蕃薛延陁新羅婆羅門同娥西蕃處般啜等國各遣使獻方物是年拂菻王波多力遣使獻赤頗黎綠頗黎石綠金精等物陁洹國遣使來朝十八年正月朔吐谷渾薛延陁吐蕃髙麗百濟新羅康國于闐三月火辭彌國十二月摩羅游國各遣使獻方物十九年正月庚午朔百濟太子扶餘康信延陁新羅吐谷渾吐蕃契丹奚吐火羅葉䕶沙鉢羅葉䕶于闐同娥康國靺鞨霫等遣使來賀各貢方物二十年正月吐谷渾吐蕃髙麗石國三月西蕃似槃國王瑟匿國閏三月悉立國章求拔國俱蘭國並遣使貢獻章求拔國或云章揭拔本西羌種也在悉立西南聞悉立内附其王羅利多菩伽遣使因悉立以朝獻後右衞率長史王元策往西域為中天竺所刼其王發兵赴之破賊有功自此職貢俱蘭亦名為俱羅其王表曰如雪如珠如雲如月潔白髙逺是文夫枝清涼一切如須彌山又如大海威力自在如那羅延如日光眀大王中王大漢國勝天子名流四海俱羅那國王忽提婆謹修禮拜七月吐蕃遣其大臣祿東贊奉表曰聖天子平定四方日月所照之國並為臣妾而髙麗恃逺闕於臣禮天子自領百萬渡遼致討隳城陷陣指日凱旋夷狄纔聞天子發駕少進之間已聞歸國鴈飛迅越不及陛下速疾奴忝預子壻喜百常夷夫鵝猶鴈也故作金鵝奉獻其鵝黄金鑄成髙七尺中可實酒三斛是年五月天竺遣使貢方物二十一年正月龜兹羊同石國吐蕃波斯康國吐谷渾並貢方物二月陁洹國獻白鸚鵡毛羽皓素頭上有紅毛數十莖垂與翅齊并五色鸚鵡各一及婆律膏三月帝以逺夷各貢方物珍果咸至其草木雜物有異于常者詔皆使詳錄焉葉䕶獻馬乳蒲桃一房長二丈餘子亦稍大其色紫摩伽陁國獻菩提樹一名波羅葉似白楊康國獻黄桃大如鵝卵其色黄金亦呼為金桃伽毘國獻鬱金香葉似麥門冬九月花開状如芙蓉其色紫碧香聞數十歩華而不實欲種取根罽賔獻俱物頭花其花丹白相似而香逺聞伽失畢國獻泥樓鉢羅葉類荷葉缺圓其花色碧而蘂黄香芳數十歩徤達獻佛土葉一莖五葉花赤心中正黄而蘂紫色泥鉢羅獻波稜菜類紅藍實如蒺梨火熟之能益食味又有酢菜状類慎火葉闊味雖少苦乆食益人胡芹状似芹而味香渾提葱其状猶葱而甘辛嗅藥其状類凌冬而青收乾作末味如桂椒其根能愈氣疾薛延陁獻拔蘭鹿麕毛而牛角大如􅀢西蕃突厥獻馬蹄羊其蹄似馬波斯國獻活耨蛇形如䑕而色青身長八九寸能入穴取䑕西蕃咄陸可汗獻金卵鉼烏􅑹也雕刻作禽獸而塗以黄金西蕃胡國出石宻中國貴之帝遣使至摩伽陀國取其法令揚州煎諸薦之汁於中厨自造色味逾於西域所出前代或有貢獻人皆不識及破髙昌収馬乳蒲桃實於苑中種之并得其酒法帝自損益造酒成凡有八色芳辛酷烈味兼緹盎既頒賜羣臣京師始識其味八月骨利幹國遣使朝貢獻馬十匹尤駿帝奇之各為製名號為十驥其一曰騰霜白其二曰皎雪驄其三曰凝露驄其四曰懸光驄其五曰决波騟其六曰飛霞驃其七曰發電赤其八曰流金􅚷其九曰翔麟紫其十曰奔虹赤十二月都播諸部遣使朝貢都播鐵勒之别種也聞骨利幹來通宣國威靈於是遣使是年葱嶺墮婆登國龜兹國吐谷渾獻突没皮突厥車鼻可汗並遣使朝貢二十二年正月朔結骨吐蕃吐谷渾新羅髙麗吐火羅康國于闐烏萇波斯石國並遣使朝貢三月焉耆國五月罽賔六月盤盤國十二月吐谷渾河源王並遣使朝貢二十三年二月西突厥肆葉䕶可汗安國王並獻方物墮和羅國遣使獻象牙火珠三月西洱河大首領楊同外東洱河大首領楊歛松外蠻首領蒙羽等來朝髙宗以貞觀二十三年即位八月吐谷渾河源郡王慕容諾曷鉢獻馬牛九月迦毘葉國遣使獻天鐵熊其力生擒白象獅子永徽元年正月吐蕃遣使朝貢五月吐火羅國獻大鳥髙七尺其足如駞有翅而能飛行日三五百里能噉銅鐵夷俗呼為駞鳥二年八月大食國始遣使朝貢十月真臘國獻馴象陁洹國遣使來獻十一月罽賔國遣使獻褥池䑕是年春正月朔泥婆羅國遣使朝貢三年春正月朔吐谷渾新羅百濟髙麗並遣使朝貢八月吐谷渾遣使獻名馬十月罽賔國曹國十一月駮馬國並遣使朝貢四年四月林邑國人諸葛地自立為王遣使貢方物馴象七月吐谷渾獻名馬十一月新羅遣使獻金總布是月曹國罽賔國並嗣主新立各遣使朝貢五年四月罽賔國曹國康國安國吐火羅國並遣使朝貢五月林邑國獻馴象八月吐蕃使人獻野馬百匹及大佛廬髙五尺廣袤各三十七歩九月吐谷渾遣使朝貢十二月倭國遣使獻琥珀瑪瑙琥珀大如斗瑪瑙大如五升器六年六月大石國鹽莫念並遣使朝貢顯慶元年正月女國遣女使髙覇梨文并其主男三虜等來朝五月婆岸國遣使獻方物十月新羅王遣其子右武衞將軍文正來朝十二月髙麗王髙蔵遣使奉表賀册皇太子二年正月庚申朔吐火羅國獻獅子二月林邑國遣使朝貢六月瞻慱國遣使獻馴象犀牛十二月吐蕃贊普遣使獻金城城上有獅子象駞馬原羝等並有人騎并獻金瓮金頗羅等三年八月千私弗國王法陁㧞底舍利君國王失利提婆摩臘王施婆羅地多並遣使朝貢三國並南天竺屬也國皆絶逺未嘗與中國通至是汎海累月方達交州并獻其方物四年十月蝦夷國隨倭國使入朝龍朔元年八月多篾國王摩如失利多福國王難修强宜說耽羅國王儒李都羅等並遣使來朝各貢方物三國皆林邑之南邊海小國也二年五月于弗國摩臘國三濮國哥羅舍分國修羅分國甘畢國並遣使獻方物哥羅舍分國在南海之南東接墮和羅國其王名蒲伽越摩精兵二萬人其使以顯慶五年發本國至是到京修羅分國居於南海之北木柵為城東至真臘國南至海其王名尸達摩提婆精兵二萬餘人甘畢國居於東海之濵東接林邑其王名旗陁越摩精兵可五千人其使以龍朔元年發本國至是到京乾封元年七月單單國訶陵國各遣使獻方物二年十月波斯國獻方物總章元年七月未陁提國遣使獻方物二年八月林邑王鉢伽舍跋摩羅婆王稱達鉢等十一月倭國並遣使獻方物三年林邑獅子訶羅單單等並遣使朝獻咸亨元年三月罽賔國獻方物倭國王遣使賀平髙麗二年三月拔汗那五月吐火羅波斯康國罽賔國八月鳩宻國王尸利鳩摩富那國王尸利提婆跋摩各遣使來朝貢其方物三年三月南天竺國各獻方物四月吐蕃遣其大臣仲琮來朝上元二年正月右驍衞大將軍龜兹王白素稽獻銀頗羅賜帛以答之拔汗那王獻碧頗黎及虵黄十二月丁亥龜兹王白素稽獻名馬二年二月堅昆獻名馬九月新羅王金法敏遣使獻方物儀鳳二年四月于闐獻方物調露元年十月康國拔汗那䕶宻國各遣使朝貢永隆二年五月大食國吐火羅國各遣使獻馬及方物永淳元年五月大食國波斯真臘國九月石國十二月南天竺及于闐國各遣使獻方物則天垂拱二年三月林邑國遣使獻馴象九年女國十二月㪍律國並遣使朝貢天授二年十月林邑國遣使獻馴象三年三月東天竺國王摩羅枝摩西天竺國王尸羅逸多南天竺國王遮婁其拔羅婆北天竺國王婁其那那中天竺國王地婆西那龜兹國王延繇抜並來朝獻長夀元年九月罽賔國遣使朝貢延載元年七月骨利幹遣使朝貢證聖元年春正月林邑國貢戰象四月林邑國遣使朝貢萬嵗通天二年四月安國獻兩頭犬六月女國十月㪍律國遣使朝貢神功元年二月辛丑葱嶺國遣使貢方物聖厯元年春正月真臘國四月疏勒王裴夷徤臘月黙啜並遣使朝貢二年二月新羅王金理洪遣使貢方物六月林邑國遣使獻馴象八月突騎施烏質勒遣其子遮弩來朝乆視元年七月謝國貢方物長安元年十二月佛誓國遣使貢方物三年三月大食國遣使獻良馬十月日本國遣其大臣朝臣真人貢方物十二月林邑國遣使朝獻三年正月吐蕃新羅林邑並遣使朝貢十月林邑國遣使朝獻十一月突厥遣其大臣移力貪汗獻名馬千疋并方物中宗神龍元年三月新羅王金志誠遣使來朝九月又遣使獻方物二年四月新羅王金隆基遣使獻方物二月日本國遣使來朝七月波斯國林邑國八月新羅國並遣使貢獻十月新羅國又遣使朝貢三年二月吐蕃贊普遣其大臣悉董熱獻方物五月真臘國六月康國王突氏並遣使獻方物八月林邑國遣使獻馴象景龍元年十一月室韋首領十二月新羅並遣使朝貢獻二年春正月吐谷渾三月波斯十一月堅昆並遣使來朝三年正月龜兹二月吐蕃三月崑崙國六月新羅八月吐蕃並遣使貢方物十月室韋遣使貢方物十一月林邑國遣使獻白象及方物四年正月新羅焉耆南天竺真臘等國四月髙麗各遣使來朝睿宗景雲元年九月南天竺國吐蕃十月謝䫻罽賔國並遣使貢方物欽化可汗突騎施守忠遣使來朝十二月吐蕃遣使獻方物是年奚首領李大酺遣使貢方物二年八月九月突厥並遣使來朝十一月靺鞨室韋並遣使獻方物十二月突厥獻食大食新羅林邑獅子國並遣使獻方物拂菻國獻方物太極元年二月新羅突厥並遣使朝貢四月林邑國五月吐蕃並遣使獻方物延和元年八月吐蕃遣使朝見册府元龜卷九百七十
