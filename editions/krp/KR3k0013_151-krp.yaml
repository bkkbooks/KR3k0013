body:
  text: 册府元龜卷一百五十一宋王欽若等撰帝王部愼罰夫震曜殺戮上天之顯道也刑罰威獄王者之大柄也聖人則象天明司牧民命所以糾䖍姦慝章明軌度則刑辟之設禮樂之助也然而丕蔽或爽頗纇有彰巧詆致其深文平民䧟於非辟則常寒總至作沴於隂陽胥怨急聞無措於手足是故帝嬀勑法形欽恤之言周穆制刑敦簡孚之訓臯陶作士寜失於不經盤庚誥民敢動於非罰皆所以昭明愼之㫖懲糾紛之弊也稽古舊史足示方來后辟紛綸光猷輝映至如齋居論决深形於勤恤覆鞫惻愴無憚於淹乆動遵經義以取乎大中時下教告式申於服念若斯之類實繁其徒有足明徴并從論决舜旣受禪乃命象以典刑象法也法用常刑用不越法流宥五刑宥寛也以流放之法寛五刑鞭作官刑以鞭爲治官事之刑扑作教刑扑夏楚也不勤道業則撻之金作贖刑金黄金誤而入刑出金以贖罪𤯝災肆赦怙終賊刑𤯝過災害肆緩賊殺也過而有害當緩赦之怙姦自終當刑殺之欽哉欽哉惟刑之恤哉臯陶曰帝德罔愆臨下以簡御衆以寛愆過也善則歸君人臣之義也罰弗及嗣賞延于世嗣亦世俱謂子延及也父子罪不相及而及其賞道徳之政宥過無大刑故無小過誤所犯雖大必宥不忌故犯雖小必刑罪疑惟輕功疑惟重刑疑從輕賞疑從重忠厚之至與其殺不辜寜失不經好生之德洽于民心兹用不犯于有司辜罪經常司主也臯陶因帝勉已遂稱帝之徳所以明民不犯上也寕失不常之罪不枉不辜之善仁愛之道漢高帝七年制詔御史獄之疑者吏或不敢决有罪者乆而不論無罪者乆繫不决自今以來縣道官獄疑者各讞所屬二千石官二千石官以其罪名當報之當謂處斷也所不能決者皆移廷尉廷尉亦當報之廷尉所不能決謹具為奏傳所當比律令以聞武帝征和四年九月詔曰法令度量所以禁暴止邪也獄人之大命死者不可復生吏或不奉法令以貨賂爲市朋黨比周比音頻寐切以苛爲察以刻爲明令亡罪者失職朕甚憐之職常也失其常理也有罪者不伏罪姦法爲暴甚亡謂也諸獄疑者雖文致於法而於人心不厭者輙讞之後元年正月詔曰獄重事也人有智愚官有上下獄疑者讞有司有司所不能決移廷尉有令讞而後不當讞者不爲失假令讞訖其理不當所讞之人不爲罪失欲令治獄者務先寛宣帝即位以武帝末法令滋彰禁網寖宻時廷尉史路温舒上䟽言秦有十失其一尚存治獄之吏是也帝深愍焉廼下詔曰間者吏用法巧文寖深是朕之不徳也夫决獄不當使有罪興邪不辜蒙戮當重而輕使有罪者起邪惡之心也有罪者更興邪惡無辜者反陥重刑是决獄不平故父子悲恨朕甚傷之今遣廷史與郡鞫獄任輕禄薄鞫窮也獄事窮竟也其為置廷平秩六百石員四人其務平之以稱朕意於是選于定國爲廷尉求明察寛恕黄霸等以爲廷平季秋後請讞時帝常幸宣室齋居而决事未央宫中有宣室殿賈誼傳亦云受釐坐宣室蓋其殿在前殿之側也齋則居之獄刑號爲平矣地節四年九月詔曰令甲死者不可生刑者不可息此先帝之所重而吏未稱今繫者或以掠辜若饑寒瘦死獄中瘦病也囚以饑寒而死曰瘦何用心逆人道也朕甚痛之其令郡國嵗上繫囚以掠笞若瘦死者所坐名縣爵里丞相御史課殿最以聞元康二年詔曰獄者萬民之命所以禁暴止邪養育羣生也能使生者不怨死者不恨則可謂文吏矣今則不然用法或持巧心析律貳端深淺不平增辭飾非以成其罪奏不如實上亦亡繇知此朕之不明吏之不稱四方黎民將何仰哉二千石各察官屬勿用此人吏務平法或擅興繇役飾厨傳稱過使客越職踰法以取名譽譬猶踐薄氷以待白日豈不殆哉後漢光武建武二年詔曰頃獄多寃人用刑深刻朕甚愍之孔子云刑罰不中則民無所措手足其與中二千石諸大夫博士議郎議省刑法明帝永平三年詔曰有司其詳刑愼罰明察單辭夙夜匪懈以稱朕意章帝建初五年三月甲寅詔曰孔子云刑罰不中則民無所措手足今吏多不良擅行喜怒或案不以罪追脅無辜致令自殺者一嵗且多於斷獄甚非爲人父母之意也有司其議糾舉之質帝本初元年正月丙申詔曰昔堯命四子以欽天道洪範九疇休咎有象夫瑞以和降異因逆感禁微應大前聖所重頃者州郡輕慢憲防競逞殘暴造設科條䧟入無罪或以喜怒驅逐長吏恩阿所私罰枉仇隙至令守闕訴訟前後不絶送故迎新人罹其害怨氣傷和以致災𤯝書云明徳愼罰方春東作育㣲敬始其勑有司罪非殊死且勿案驗以崇在寛靈帝熹平五年四月使侍御史行詔獄亭部理寃枉原輕繫休囚徒魏武帝令曰夫刑者百姓之命也軍中典獄者或非其人而任以三軍死生之事吾甚懼之其擇明達法理者使持典刑於是置理曹掾屬文帝黄初五年詔曰近之不綏何逺之懐今事多而民少上下相弊以文法百姓無所措其手足昔泰山之哭者以爲苛政甚於猛虎吾佩儒者之風服聖人之遺教豈可以目翫其辭行違其誡者哉廣議輕刑以惠百姓明帝太和三年十月改平望觀曰聴訟觀帝常言獄者天下之性命也每斷大獄常幸觀臨聽之青龍四年六月壬申詔曰有虞氏畫象而民弗犯周人刑措而不用朕從百王之末追望上世之風邈乎何相去之逺法令滋彰犯者彌多刑罰愈衆而姦不可止徃者案大辟之條多所蠲除思濟生民之命此朕之至意也而郡國蔽獄一嵗之中尚過數百豈朕訓𨗳不醇俾民輕犯罪苛法猶存爲之䧟阱乎有司其議獄緩死務從寛簡及乞恩者或辭未出而獄已報斷非所以究理盡情也其令廷尉及天下獄官諸有死罪具獄以定非謀反及手殺人亟與親治有乞恩者便與奏當文書俱上朕將思所以全之其布告天下使明知朕意晉武帝太康九年詔郡國五嵗刑以下决遣無留庻獄後魏明元永興三年十二月詔南平公長孫嵩任城公嵇拔白馬侯崔𤣥伯等坐朝堂錄决囚徒務在平當太武太平眞君六年詔諸有疑獄皆付中書以經義量决獻文末年尤重刑罰言及常用惻愴每於獄案必令覆鞫諸有囚繫或積年不斷羣臣皆以爲言帝曰獄滯雖非治體不猶愈乎倉卒而濫也夫人幽苦則思善故囹圄與福堂同居朕欲其改悔而加以輕恕耳繇是囚繫雖滯淹而刑罰多得其所孝文延興四年以中書覆案頗上下其法遂罷之獄有大疑乃平議焉先是諸曹奏事多有疑請又口傳詔勑或致矯擅於是事無大小皆令㨿律正名不得疑奏合則制可失𠂻則彈詰之盡從中墨詔自是事咸精詳羣下莫敢相罔太和四年幸廷尉籍坊二獄引見諸囚詔曰廷尉者天下之平民命所懸也朕得惟刑之恤者仗獄官之稱其任也一夫不耕將或受其餒一婦不織將或受其寒今農時要月百姓肆力之秋而愚民䧟罪者甚多宜隨輕重决遣以赴耕耘之業五年五月朔詔曰廼者邉兵屢動勞役未息百姓因之輕䧟刑網獄訟煩興四民失業朕每念之用傷懐抱農月要時民須肆力其勑天下勿使有留獄乆囚十一年十一月戊申詔曰朕惟上政不明令民陥身罪戾今寒氣勁切杖棰難任自今月至來年孟夏不聴拷問罪人又嵗旣不登民多饑窘輕繫之囚宜速决了無令薄罪乆留獄犴二十年七月丁亥詔曰法爲治要民命尤重在京之囚悉命條奏朕將親案以時議决宣武永平元年七月詔曰察獄以情審之五聴枷杖小大宜各定凖然比廷尉司州河南雒陽河隂及諸獄官鞫訊之理未盡矜恕掠拷之苦每多切酷非所以祗憲量𠂻愼刑重命者也推濫究枉良軫於懷可付尚書精檢枷杖違制之繇斷罪聞奏出帝永熈三年五月庚寅詔諸幽枉未申事經一周已上悉集華林朕將覧察脱事已經年有司不列者聴其人各自陳訴若事連州郡繇滯淹嵗月亦仰尚書總集以聞隋文帝開皇五年侍官慕容天逺紏都督田元冐請義倉事實而始平縣律生輔恩舞文陥天逺遂更反坐帝聞之乃下詔曰人命之重懸在律文刋定科條俾令易曉分官命職恒選循吏小大之獄理無疑舛而因襲徃代别置律官報判之人推其爲首殺生之柄嘗委小人刑罰所以未清威福所以妄作爲政之失莫大於斯其大理律博士尚書刑部曹明法州縣律生并可停廢自是諸曹决事皆令具冩律文斷之十二年帝以用律者多致踳駮罪同論異八月甲戌制天下死罪諸州不得便决皆令大理覆治事盡然後上省奏裁十六年詔決死罪者三奏而後行刑唐高祖武德四年四月詔曰緩刑議獄哲后彛訓解網泣辜前王茂軌朕君臨海内撫育黎元一物乖所納隍興慮其益州道行䑓及䕫州總管府衆務臻集統攝遐長囚徒禁繫其數不少或控告未申多有寃屈或注引肆志濫及貞良致使文案稽延獄訟繁擁念彼枉滯情深愍惻其益州總管内諸州委御史大夫光逸檢校䕫州管内委趙郡公孝恭檢校所有囚悉令覆察務從寛簡小大以情但有負罪逃亡離棄鄉邑無問輕重悉令歸首明加勸𨗳務脩墾植庻使家給人足稱朕意焉太宗貞觀元年七月戊申詔曰朕恭膺寳命撫臨率土永鍳前王憲章典故雖文質逓變㳂革不同而發號施令殊塗一揆皆所以成當世之典謨開生民之耳目納之軌度令行禁止自律令班下積有嵗時内外羣官多不尋究所行之事動乖文㫖此乃臣有所𨼆民不見德與夫不令而誅何以異也斯豈守道履正徇公奉法者乎自今以後官人行事與律乗違者仰所司紏劾具以名聞二年三月帝謂侍臣曰古者斷獄必訊於三槐九棘之官自今大辟罪皆令中書門下五品已上及尚書議之庻無寃濫三年四月詔曰泣辜愼罰前王所重枉繫一日事等三秋州縣法司特宜存意普告天下知朕意焉五年八月制决死刑雖令即决仍三覆奏十二月制决死刑二日中五覆奏下諸州三覆奏行之其日尚食勿進酒肉皆令門下覆鞫有據法當死而情有可矜者録狀奏聞十七年九月丁卯帝謂大理卿孫伏伽曰夫作甲者欲其堅恐人傷作箭者欲其銳恐人不傷何則各有司存利在其中故也朕嘗問刑罰輕重每稱法網寛於徃代仍恐主獄之吏利在殺人危人自達以釣聲價今所憂正在此耳深宜防禦務在寛平二十年帝征遼囘二月次行靈石縣指獄而謂皇太子曰此何謂也皇太子對曰此所謂圜獄將繫罪人帝因曰文王作罰刑兹無赦而漢文帝志在輕刑但以平允爲佳非謂有罪即釋也濫殺無辜則政道缺乆滯有罪則怨氣生圜土之中視青天有同懸鏡而鏁械膚體欝結其中夫脩已者可以知物傳曰其恕乎繇此言之不可不愼高宗以貞觀二十三年即位九月帝問大理卿唐臨獄繫囚之數臨對曰見囚五十餘人唯二人合死帝聞囚數不多怡然形於顔色謂臨曰昔東宫卿已事朕朕承大位卿又居近職以疇日相委故授卿此任然爲國之要在於刑法刑急則人殘法寛則失罪務令折𠂻稱朕意焉永徽六年十一月癸巳詔曰朕聞小大以情義重前誥哀矜勿喜道光遐册朕恭膺寳業嗣臨億兆留心聴斷劬勞日昃一物乖方納隍軫慮今旣科格咸備憲制乆行鞫訊之法律條具載深文之吏猶未遵奉肆行慘虐曾靡人心在含氣之倫禀柔脆之質乃有懸枷著樹經日不解脫衣廻立連宵忍凍動轉有礙食飲乖節殘酷之事非復一途楚痛切身何求不得言念於此深以矜懐又挾匿名書國有常禁凡厥寮庻咸應具述近遂有人向朝廷之側投書於地𨼆其姓名誣人之罪朕察其所陳皆極虗妄此風若扇爲蠧方深自今以後内外法司及别勑推事宜並依律文勿更别爲酷法其匿名書亦宜准律處分庶使泣辜之情逺覃於四海䘏刑之㫖長垂於萬葉龍朔二年八月詔曰哀矜折獄義先吕訓明愼用刑事昭姬象朕以寡昧嗣登宸極思闡大猷式隆景運䧟氷是懼屢想於懐中馭朽彌兢馳襟於裕下虗已待物每從寛政如聞率土州縣留獄尚繁困於囚繫致於病死一嵗之中數盈二百蓋繇上愆亭育之化下乖堯舜之心深責在躬興言多媿抑又聞之與我理天下者其惟良二千石今之所任或虧政道未詳欽恤之㫖但徇刻苛之情幽縶困滯證逮遐廣寒暑相襲風露交侵淹乎年月成其病苦加以榜笞失度桎梏違法巧詆深文去將安適獄市之寄何其爽歟自兹以後宜革前弊罪無大小不得稽留其囚病患及罪輕并笞杖等雖法有常規恐典吏妄生威福官人不存檢校或顔面囑請觸類以之若仍舊不悛當加重罰布告天下知朕意焉麟德二年三月戊午詔曰今陽和布氣東作聿興甘澤雖霑猶未周洽睠兹南畆彌用憂勤瞻彼西郊良深兢惕宜順發生之序以申簡恤之恩西京及東都諸司雍雒二州見禁囚徒宜准龍朔元年慮囚例處分其西京令左侍極亷檢校大司憲陸敦信充使東都令右肅機盧承慶充使必令息彼寃滯稱朕意焉咸亨三年十一月駕幸許汝等州分遣使覆見禁囚徒中宗神龍元年三月制曰自今内外法官咸宜敬愼其文深次骨跡徇凝脂高下任情輕重失𠂻必寘嚴典以彰癉惡景龍二年七月大理正王志愔奏言法令者人之隄防隄防不立則人無所禁竊見大理官寮多不奉法以縱罪爲寛恕以守文爲苛刻臣愚少執刑典即爲衆所謗帝謂曰法急則傷人寛則漏罪情實寘罰在於中平宜愼之志愔因奏上應正論以見意𤣥宗先天二年四月詔曰法憲之設期於無私本以救人蓋非獲已故得情存於勿喜折獄貴於哀矜至如斷决諸罪皆著科條若守而不失自爲良吏如聞近日州縣罕習章程率情嚴酷或致殞殂假令事應重辟固當明啓刑書豈可輙因夏楚輕絶人命太上皇仁覃萬㝢澤被羣生子愛黎甿愼恤刑罰予恭承天訓䖍奉睿圖旰食載勤納隍兢慮凡厥長吏宜達此懐務遵法式勿仍前弊如或有違當寘嚴法宣示黔庻咸使聞知開元三年二月庚午詔曰無知之徒自罹刑憲一遭縲絏坐變星琯長吏依違不時䟽决過成滯獄豈曰當官况三陽在辰德澤思布一物失所勤恤是殷惟懐永圗俾申幽枉其所在見禁囚未斷决者令所在長官親加按理仍令御史及按察使訪察隨事紏繩六年二月己卯詔曰仲春在候膏雨頻流故當法天布和順時行令天下諸繫囚宜令所繇作速䟽理斷决勿有寃滯八年詔曰庸愚之人自犯踈網至於公憲誠則難容然服念泣辜昔賢懿躅惟刑是恤不可暫忘如聞囚徒或有寃滯乆在幽縶情何以堪其外州已有使覆京城内宜令中書門下就禁司按理如有枉濫隨事奏聞十四年四月詔曰時屬正陽事殷蠶穡愍彼囹圄或多寃濫宜𢎞愼恤之恩俾助生育之德其所有囚徒除死囚已外所司長官即䟽决處分庚戌又詔曰孟夏麥秋尚决小罪况天時漸熱深愍繫囚徒宜令中書門下廵城内囚徒量事處置畿甸徒囚赤縣縣令䟽理斷决勿滯禁人二十年二月駕發東都北廵狩申命宰臣所在䟽决囚徒二十三年四月壬子詔曰農作是時人無棄日所在獄訟或有滯留其都城已令中書門下䟽理其京城及北都各委留守天下諸州委本道採訪使及本州長官隨事决斷勿令寃繫徒以下罪並量决罰便訪其官典犯贓宜准常式二十五年正月壬午制曰朕猥集休運多謝哲王然而哀矜之情大小必愼自臨寰宇子育烝黎未嘗行極刑起大獄上𤣥降鍳應以祥和思叶平邦之典致之仁壽之域自今有犯死刑除十惡罪宜令中書門下與法官詳所犯輕重具狀奏聞天寳十載正月詔曰法以輔德刑以閑邪豈在煩苛必資簡易朕永懐至理思致還淳每懐哀矜之心屢申寛大之詔實欲人皆知禁化洽無爲頃者已令法官每刋刑典蓋繇此也肅宗乾元三年閏四月己卯御明鳳門大赦改元詔曰自古百王欽愼刑罰蓋以法者人之命刑者國之權苟或失其科條固難措其手足頃以姦臣擅命中典不修造次便行哀矜何在自今已後其有犯極刑者宜命本司依舊三覆庶平反之際人謂不寃幽明之間理皆無濫代宗寳應三年七月壬寅大赦改元制曰天下刑獄須大理正斷刑部詳覆不得中書門下便即處分大厯四年七月癸未詔曰如聞州縣官比年來率意恣行麤杖不依格令致其殞斃深可哀傷頻有處分仍聞乖越自今以後非灼然蠧害者不得輙加非理仍委觀察節度使嚴加糾察勿令有犯録名聞奏宣示中外宜悉朕懐德宗貞元六年十一月南郊赦書曰近日州縣官吏專殺立威杖或踰制自今以後有責情决罰致死者宜令本道觀察使具事繇聞奏并申刑部御史臺順宗初即位制曰天下官吏應行鞭捶本罪不至死者假以責情致令殞斃每念於此良增惻然宜切加察訪憲宗元和二年正月制曰天下官吏應行鞭捶責情致死者切令察訪三年九月給事中穆質奏諸州府鹽鐡使廵院應决私鹽死囚請州縣同監免有寃濫從之四年正月詔曰自今以後在京諸司應决死囚者不承正勑並不在行决之限如事迹兇險須速决遣并特勑處分者宜令一度覆奏時左街功德使吐突承璀牒京兆府稱奉進止令杖死殺人僧惠寂府司都不覆奏便行御史臺奏故有是詔九年八月袁州刺史李將順坐掊擾人貶道州司户叅軍大僚詣執政以爲刺史抵禁不經按訊遽貶官恐不可乃追詔遣御史馳徃推究穆宗長慶元年七月赦書刑獄所繫理道最切如聞比來多有稽滯一拘囹圄動變炎凉自今已後宜令御史臺切加訪察每季差御史廵囚事渉情故或斷結不當有失刑政具事繇聞奏其天下州縣并委御史臺并出使郎官御史兼諸道廵院切加察訪四年三月壬子赦書天下諸州府縣官吏應行鞭捶本罪不至死者假以責情致令殞斃每念於此良增惻然宜委御史臺及出使郎官御史等切加察訪具事繇聞奏敬宗寳厯元年四月制如聞京城諸司捕繫推鞫動經旬時每季御史廵囚罕能舉劾積成寃滯爲弊頗深宜重舉明長慶元年七月十八日赦件聞奏文宗太和四年四月丁丑詔曰如聞時稼甚滋人心望嵗近者時雨稍乏憂懐載深慮有留獄致傷和氣應京城諸司見禁囚徒宜令御史臺選清强御史二人各就司䟽决處分具輕重以聞六月壬申詔如聞御史臺大理寺京兆府及諸縣囚徒近日訊鞫例多停滯自今已後宜令所司速詳決處分其諸司應推獄有稽緩稍甚與奪或乖者仍委尚書左右丞及分察御史糾舉以聞十月詔自今已後有特決囚不令覆奏者有司亦須准故事奏覆先是命中人送教坊樂官劉楚材等四人付京兆府杖殺之不令覆奏又送宫人張缺等十人於西内處置宰臣楊嗣復等奏伶人賤類出入宫禁定刑議罪有異平人若不痛繩即難簡肅准宣各决痛杖一處死事亦相緣宣下之事未有正勑府司准宣處置又不覆奏稍乖常例有惑衆情詔答曰宣下之時不令覆奏稍乖舊制良用慨然遂有是詔五年二月丁丑詔以方春用事寒氣稍侵京城見禁囚徒慮有寃結宜令御史兩人各就本司䟽理以聞七年正月壬子詔曰議獄恤刑前王攸重苟有寃滯即傷陽和應在城諸司諸使有囚徒限七月内處分訖奏聞河南府八州府勑到准此處分閏七月乙卯朔詔京城囚徒慮有寃滯已委䟽决務從寛降宜令鄭覃令狐楚速具條䟽以聞八年四月丙戌詔曰朕比屬暇日周覧國史伏讀太祖因閲明堂經見五臟之係咸附於背乃下制决罪人不得鞭背且人之有生繫於臟腑灸針失所尚致夭傷鞭扑苟施能無枉横况五刑之内笞最爲輕豈可以至輕之刑傷至重之命朕躬承丕業思奉貽謀言念於兹載懐惻𨼆其天下州府應犯輕罪人除情狀巨蠧法所難原者其他過誤罪愆及尋常公事違法並宜准貞觀四年四月十七日制處分不得鞭背今年已後每至夏至已後立秋已前就州府常條之中亦宜量與矜减速爲䟽理不得乆令禁繫委御史臺切加糾察永爲常式五月辛亥朔癸丑詔曰如聞大理寺所覆諸州府刑獄皆盤勘㣲細節目不早詳斷道路遐逺徃返經年非惟囚禁多時有傷和氣兼亦覬望恩澤故渉稽留爲弊頗深須有提舉宜令御史臺切加糾察准勑限較科推狀中有贓數異同及罪人伏欵未盡者即許移牒盤問其他煩碎事條不闗要節者并不得更令移牒勘覆開成四年四月詔曰京城百司及府縣禁囚動經嵗年推鞫未畢蓋繇官吏因循致此留獄欝蒸在候寃滯難堪宜付御史臺委中丞高元裕及强明御史三兩人各就本司應見禁囚分閲案牘據理䟽决聞奏宣宗大中四年四月詔法司用刑或持巧詐分律兩端遂成其罪既奸吏得計則黎庻何安自今已後應書罪定刑宜令直指其事不得舞文妄有援引頒示天下長吏嚴加覺察不得輙使奸吏如有此色當議停解九月御史臺奏准舊例京兆府准勑科决囚徒合差監察御史一人到府門監决伏請自今已後許令御史到府粗精引問以究獄情如囚不稱寃方許行决兾其淫刑永息寃濫獲申勑㫖宜依其河南府亦令准此諸州應有死囚仍委長吏差官監决八年三月甲辰詔此後除巨蠧所不原外每立夏至立秋前犯罪人就州府常條之中量與减貸速爲䟽理無令淹繫懿宗咸通元年詔曰至道所先刑柄最切向聞鞫斷動隔炎凉不惟理且未伸多致疾而成夭寃霾既聚和氣乃傷日月星辰繇此失度水旱蟊賊所以爲災自此委刑法官條示天下州府長吏旋即䟽理無致淹延後唐莊宗天祐五年四月下令曰議獄恤刑比求寃濫頑民下輩輕侮憲章苟非五聴之通明何辨二門之邪正自今後法司如有疑獄予自據格令以决之此法既行雖親無赦同光二年六月己巳勑應御史臺河南府行臺馬歩司左右軍廵院見禁囚徒據罪輕重限十日内并悉决遣申奏仍委西京諸道州府見禁囚徒速宜䟽决不得淹停兼恐内外刑勢官員私事寄禁切要止絶俾無寃滯三年五月己未在京及諸道州府所禁罪人如無大過速令䟽决不得淹滯六月甲寅勑刑以秋冬雖開惻隠罪多連累翻慮淹滯若或十人之中止爲一夫抵死豈可以輕附重禁錮逾時言念哀矜又難全廢其諸司囚徒罪無輕重并宜各委本司據罪詳斷申奏輕者即時䟽理重者候過立春至秋分然後行法如是事繫軍機須行嚴令或謀惡逆或畜姦邪或行刼殺人難於留滯並不在此限明宗天成元年十一月庚申勑應天下州使繫囚除大辟罪已上委所在長官速推勘决斷不得傍追證對經過食宿之地除當死刑外並仰釋放兼不徴治二年春左拾遺李同上言天下繫囚請委長吏逐旬親自引問質其罪狀眞虗然後論之以法庻無枉濫從之六月大理少卿王欝上言凡决極刑合三覆奏近年已來全不守此伏乞今後前一日令各一覆奏奉勑宜依八月西京奏奉近勑在京犯極刑者令决前一日各一覆奏伏緣當府地逺此後凡有極刑不審准條䟽奏覆奉勑㫖昨六月二十日所降勑文祗爲應在雒京有犯極刑者覆奏其諸道已降㫖命准舊例施行今詳西京所奏尚未明近勑兼慮諸道有此疑惑故令曉諭十月辛丑德音爲政之要切在無私聴訟之方惟期不濫天下諸州府官員如有善推疑獄及曾雪寃濫兼有異政者當具姓名聞奏别加甄獎三年正月丁巳内出御札曰朕聞堯舜有恤刑之典貴務好生禹湯申罪己之言庻明知過今月七日據廵檢軍使渾公兒口奏稱有百姓二人以竹竿習戰鬭之事朕昨初聞奏報實所不容率爾傳宣令付石敬瑭處置今旦安重誨敷奏方知悉是㓜童爲戲旣載聆讜議方覺失刑循揣再三愧惕非一亦以渾公兒誑誣頗甚敬瑭詳覆稍乖致人當枉法而殂處朕於有過之地今减常膳十日以謝幽枉其石敬瑭是朕懿親合施規諫旣兹錯誤宜示省循可罰一月俸渾公兒决脊杖二十仍削在身職銜配流登州常知所在其小兒骨肉各賜絹五十疋粟麥各百石便令如法埋塟兼此後在朝及諸道州府凡有極刑須子細裁遣不得回循付中書門下百僚進表稱賀十二月癸丑諸州使數奏囚人死於獄中奉勑朕以握圖纘位端已臨民每於刑獄之間倍軫憂勤之念慮多淹滯累降指揮儻一物以銜寃撫萬機而是愧近聆數處中奏囚人獄内身殂事旣不明理難取證將絶欺罔之弊須頒條理之文宜令今後凡有刑獄切依前准勑命施行斷遣不宜淹停如有賊徒推尋反證斷遣未聞在獄疾病者委隨處官吏當面録問令醫人㸔候無致推司官吏别啓倖門長興元年二月郊祀畢下制曰欲通和氣必在申寃將設公方實資獎善州縣官僚能雪寃獄活人生命者許非時選仍加階超資注官與轉服色已著緋者與轉兼官二年三月辛亥勑朕猥以𦕈躬薦承鴻業念彼疲瘵勞於寢興或慮官不得人因成紊亂或慮刑非其罪遂致怨嗟王化所興獄訟爲本苟無訓勵必有滯淹近日諸道百姓或諸多違犯或小可鬭爭官吏曲縱吏人巧求瑕釁初則滋張節目作法拘囚終則誅剥貨財爲恩出㧞外慿公道内徇私情無理者轉務遷延有理者却思退縮積成訛弊漸失紀綱自今後切委逐處官吏州牧縣宰等深體予懐各舉爾職凡闗推究速與剸裁如敢苟縱依違遂成枉濫或經臺訴屈或投匭申寃勘問不虗其元推官典并當責罰其逐處觀察使刺史别議朝典宜令諸道州府各依此處分所管屬郡委本道嚴切指揮八月丁亥勑三京諸道州府刑獄近日訪問依前禁繫人多不旋决諸道宜令所在各委長吏專切推窮不得滯淹愍帝應順元年三月戊午詔曰刑柄爲制禮之先獄訟乃有國之重一成共守四海同文咸符欽恤之言乃致太平之道以近及逺列職分司申明皆有其舊䂓决斷各繇其所屬惟理則罪疑可定惟正則刑措可期諒在舉行方無壅滯應三京諸道州府繫囚據罪輕重疾速斷遣比來停滯須奏取裁不便區分故爲留滯今後凡有刑獄據理斷遣如有勑推按理合奏聞不在此限末帝清泰元年五月丁丑詔在京諸獄及天下州府見繫罪人正當暑毒之時未免拘囚之苦誠知負罪特軫予懐恐法吏生情滯於决斷詔至所在長吏親自慮問據輕重疾速斷遣無令淹滯二年五月辛丑詔曰運當昭㤗時屬樂康思欲導和氣於雍熈布休光於幽𨼆將期恤物必軫深仁今以甫及㽔賔適兹炎毒宜茂好生之德俾敷在宥之文足以寛肺石之寃辭叶薰風之解愠庻遵時令獲奉天心宜令御史臺河南府運廵諸道州府自五月一日已前見繫罪人常赦不原及已見情狀之外悉令疾速斷遣勿至淹停晉高祖天福三年正月勑應諸道州府刑獄慮有淹延宜令逐處應用禁繫人等并仰各據罪戾詳事理速斷遣不得停滯仍付所司三月庚午詳定院奏前守洪洞縣主簿盧璨進䇿云伏以刑獄至重朝廷所難尚書省分職六司天下謂之㑹府且諸道决獄若闗人命卽刑部不合不知欲請州府凡决大辟罪人謂逐季具有無申報刑部仍具録案欵事節并本判官馬部都虞候司法叅軍法直官馬部司判官名銜申聞所貴或有案内情繇不圓刑部可行覆勘如此則天下遵守法律不敢輕議刑書非唯免有銜寃抑亦勸其立政者臣等叅詳伏以人命至重而國法須精雖載舊章更宜條理誠爲允當望賜施行從之五月詔曰刑獄之難古今所重但闗人命實動天心或有寃魂則傷和氣應諸道州府凡有囚徒據推勘到案欵一一盡理子細檢律令合格勑其間或有疑者准令又讞大理寺亦宜申尚書省省寺明有指歸州府然後决遣五年三月丙子詔曰自大中六年已來𠢐耳稱寃决杖流配訴内雖有理不在申明今後據其所陳與爲勘斷𠢐耳之罪准律别科六年秋七月庚辰詔曰政刑所切獄訟惟先推窮須察於事情斷遣必遵於條法用𢎞欽恤以致和平應三京鄴都及諸道州府縣見禁諸色人等宜令逐處長吏常切提撕疾速决遣每務公當勿使滯淹少帝天福八年四月壬申勑詔自臨寰宇思致和平以四海爲家慮一物失所每念狴牢之内或多枉撓之人屬此炎蒸倍加軫憫兾絶滯淹之嘆用資欽恤之仁應三京鄴都及諸道州府見禁罪人等宜令逐處長吏嚴切指揮本推司及委本所判官疾速結絶斷遣不得淹延及致寃濫仍付所司開運二年五月壬戌殿中丞桑簡能上封事曰伏以天地育萬物廣博厚之恩帝王牧黎元行寛大之令是知恤刑緩獄乃爲政之先布德行惠實愛民之本今盛夏之月農事方殷是雷風長養之時乃動植蕃廡之際宜順時令以𢎞至仁竊以諸道州府都郡縣應見禁罪人或有乆在囹圄稍滯區分胥吏舞文枝蔓及衆捶楚之下或䧟無辜縲絏之中莫能自理苟一人拘繫則數人營財物用旣殫功業亦罷若此之類實繁有徒切恐官吏因循寖成斯弊伏乞降詔㫖令所在刑獄委長吏親自録問量罪疾速斷遣務絶寃濫勿得淹留庻免虗禁平人妨奪農力兾召和氣以慶明時勑曰囹圄之中縲絏之苦奸吏苟窮於枝蔓平人用費於貨財繇兹滯淹兼致屈塞桑簡能體兹軫憫專有敷陳請長吏躬親免獄官抑逼深爲允當宜在頒行十月甲子秘書省著作郎邉玕上封事曰臣聞從諫如流人君之令範極言無𨼆臣子之嘗䂓蓋欲表大國之任人致萬邦之無事前文備載可舉而行伏以皇帝陛下德合上𤣥運膺下武旰食宵衣而軫念好生惡殺以推仁幾措典刑固無寃枉然以照臨之内州郡尤多若不再具舉明伏恐漸成奸弊臣竊見諸道刑獄前朝曾降勑文凡是禁繫罪人五日一度録問但以年月稍逺漸致因循或長吏事煩不及躬親㸃檢或胥徒啟倖妄要追領證明慮有渉於淫刑即恐傷於和氣伏乞特降詔勑自今後諸道并委長吏五日一度當面同共録問所兾處法者無恨銜寃者獲伸俾令四海九州咸歌聖德五風十雨永致昌期勑曰人之命無以復生國之刑不可濫舉雖一成之典務在公平而三覆其詞所宜詳審凡居法吏合究獄情邉玕近陟周行俄陳讜議更彰欽恤宜允申明三年十一月丁未左拾遺竇儼上䟽曰臣伏覩名律例䟽云死刑者古先哲王則天垂象本欲生之義期止殺絞斬之坐皆刑之極也又准天成三年閏八月二十三日勑行極法日宜不舉樂减常膳又刑部式决重杖一頓處死以代極法斯皆仁君哀矜不捨之道也竊以蚩尤爲五虐之科尚行鞭扑漢祖約三章之法止有死刑絞者筋骨相連斬者頭項異處大辟之目不出两端淫刑所興近聞數等蓋縁外地不守通䂓肆率情性或以長釘貫篸人手足或以短刀臠割人肌膚乃至累朝半生半死俾冤聲而上達致和氣以有傷將𢎞守位之仁在峻惟刑之令欲乞特下明勑嚴加禁斷者勑曰文物方興刑罰須當有罪宜從於正法去邪漸契於古風竇儼所貢奏章實禆理道宜依所奏准律令施行漢𨼆帝乾祐二年正月勑政貴寛易刑尚哀矜慮滋蔓之生奸實軫傷而是念今屬三元改候四序履端將兾和平無如獄訟應三京鄴都諸道州府見繫罪人委逐處長吏躬親慮問其於决斷務在公平但見其情即爲具獄勿令牽引遂致淹滯無縱舞文有傷和氣四月甲午勑曰月屇正陽候當小暑乃挺重出輕之日是恤刑議獄之辰有罪者速就勘窮薄刑者畫時䟽决用符時令勿縱滯淹三京鄴都諸道州府在獄見繫罪人宜令所司疾速斷遣無致淹滯枉濫五月辛未勑王化所先獄訟攸切不唯枉撓兼慮滯淹適當長養之時正屬熇蒸之候累行條貫俾速施行靡不丁寜未曾奏報再頒告諭無或因循應三京鄴都諸道州府詔至宜具䟽放已行未行申奏無致逗留周太祖廣順元年五月壬戌朔勑朕肇啓丕基躬臨庻政深慕泣辜之道以宏恕物之心今則方屬炎蒸正當長養黄沙繫縶宜矜非罪之人丹筆重輕切戒舞文之吏凡有獄訟不得淹延務令囚絶拘留刑無枉濫兾叶雍熈之化用符欽恤之情應京都諸道州府見禁人等宜令逐處長吏限勑到應有獄囚當面録問事小者便須遣决案未成者即嚴切指揮疾速勘决據罪詳斷䟽放勿令停滯及致寃抑庻召和氣俾恱羣心二年四月壬辰勑朕以寡昩獲主黎元將以召天地之和每思去刑政之弊寅恭於此宵旰爲勞今以節及長羸時臨暑熱耕農之户蠶麥將忙宜於獄訟之間特示憂勤之㫖應有刑獄切慮淹滯詔至所有重輕繫囚疾速勘鞫斷遣無令寃抑慮有淹延若輕罪畫時决遣其婚田爭訟務内勿治若事要定奪即須疾速區分若斷遣不平許人紏吿官典必議徴斷三年四月乙亥勑朕以時當化育氣屬炎蒸乃思縲絏之人是軫哀矜之念慮其非所案鞫淹延或枉濫窮屈而未得伸宣或饑渇疾病而無所控告以罪當刑者唯彼自召法不可移非理受苦者爲上不明安得無慮欽恤之道夙宵靡寜應諸道州府見繫罪人宜令官吏疾速推鞫據經遣斷不得淹滯仍令獄吏灑掃牢獄常令虗歇滌洗枷械無令蚤虱供給水漿無令饑渇如有疾患令其家人㸔承囚人無主官差醫工診候勿致病亡循典法之成䂓順長羸之時令俾無滯淹以致和平又賜諸州詔曰朕以敷政之勤惟刑是重旣未能化人於無罪則不可爲上而失刑况時當長羸事貴清適念囹圄之閉固復桎梏之拘縻處於炎蒸何異焚灼在州及所屬刑獄見繫罪人卿可躬親録問省略區分於入務不行者令俟開繫有理須伸者速期䟽决俾皆平允無至滯淹又以獄吏逞任情之奸囚人被非法之苦宜時加檢察勿縱侵欺常令靜掃獄房洗刷枷匣知其饑渇供與水漿有病者聽其骨肉㸔承無主者遣醫工救療勿令非理致斃以至和氣有傷卿忠幹分憂仁明蒞事必能奉詔體我用心睠委於兹興寐無已餘從勑命處分世宗顯德元年十一月帝謂侍臣曰天下所奏獄訟多追引文證甚致淹延有及百餘日而未决者其中有徒黨反告者却主陳訴者及妄遭牽引者慮獄吏作倖遲留致生人休廢活業朕每念此彌切疚懐此後宜條貫所在藩郡令選明幹寮吏掌其訴訟如有獄不滯留人無枉撓明具聞奏量與甄獎册府元龜卷一百五十一
