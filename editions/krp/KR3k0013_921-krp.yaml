body:
  text: 冊府元龜卷九百二十一宋王欽若等撰總録部妖妄周禮大司徒之職以八刑紏萬人其七曰造言之刑其八曰亂人之刑夫天生蒸民樹之司牧必去邪而防偽期知常而守正建彼皇極臻夫至治者已故軒鑑斯照物無遁形夏鼎既鑄不逢不若其斯之謂矣乃有挟邪僻之行崇妖妄之説譸張為幻熒惑任巳或假以視煇之術或矜其久夀之道或陳之以律厯或獻之以符命憑虚飾詐誣上罔衆以至造作神異張皇氣焰保聚乎羣黨俶擾乎區域干國之紀為民之患者比比而有然而惡積者滅身姦大者無赦禍不旋踵悠悠皆是著之篇次用垂於後漢新垣平趙人文帝時以望氣見帝其後使人持玉杯上書闕下獻之平言帝曰闕下有寳玉氣来者已視之果有獻玉杯者刻曰人主延夀平又言臣候日再中居頃之日却復中於是始更以十七年為元年令天下大酺平言曰周鼎亡在泗水中今河决通於泗臣望東北汾隂直有金寳氣直謂正當汾隂意周鼎其出乎兆見不迎則不至於是帝使使治廟汾隂南臨河欲祠出周鼎人有上書告平所言皆詐也下吏治誅後文帝怠於改正服鬼神之事正正朔也服服色也正音之成切李少君者以祠竈糓道郤老方見武帝糓道辟糓食之道也帝尊之少君者故深澤侯人主方侯家人主方藥也匿其年及所生長生長謂其郡縣所屬及居止處嘗自謂七十能使物却老物謂鬼物也其㳺以方徧諸侯無妻子人聞其能使物及不死更餽遺之更音工衡切嘗餘金錢衣食人皆以為不治産業而饒給給足也又不知其何所人愈信争事之少君資好方善為巧發竒中時時發言有所中中音竹仲切嘗從武安侯宴坐中有年九十餘老人少君乃言與其大父㳺射處老人為兒從其大父識其處識記也音式志切一坐盡驚少君見帝有故銅器問少君曰此器齊桓公十年陳於柏寢晏子書柏寢臺名也以柏木為寢室於臺之上已而按其刻果齊桓公器刻謂器上所名記一宫盡駭以少君數百嵗人也甘忠可齊人成帝時忠可詐造天官厯包元太平經十二卷以言漢家逢天地之大終當更受命於天天帝使真人赤精子下教我此道忠可以教東平夏賀良宻丘丁廣世東平渤海縣宻丘東海縣東郡郭昌等中壘校尉劉向奏忠可假鬼神罔上惑衆下獄治服未斷病死賀良等復私以相教哀帝初立司𨽻校尉解光亦以眀經通災異得幸白賀良等所挟忠可書事下奉車都尉劉歆歆以為不合五經不可施行而李尋亦好之光曰前歆父向奏忠可下獄歆安肯通此道時郭昌為長安令勸尋宜助賀良等尋遂白賀良等皆待詔黄門數召見陳説漢厯中衰當更受命成帝不應天命故絶嗣今陛下久疾變異屢數所角切天所以譴告人也宜急改元易號乃得延年益夀皇子生災異息矣得道不得行咎殃且亡言知道不能行之必有殃咎将至滅亡不有洪水将出災火且起滌盪民人哀帝久寢疾㡬其有益幾讀曰冀遂從賀良等議於是詔制丞相御史盖聞尚書五曰考終命言大運一終更紀天元人元考文正理推厯定紀數如甲子也朕以眇身入繼太祖承皇天總百僚子元元未有應天心之效即位出入三年災變數降日月失度星辰錯謬髙下貿易言山摧川竭也大異連仍盗賊並起仍頻也朕甚懼焉戰戰兢兢唯恐陵夷屢漸滅亡也惟漢至今二百嵗厯紀開元皇天降非材之右漢國再獲受命之符右讀曰祐祐助也帝自言不材而得天助也朕之不徳曷敢不通夫受天之元命必與天下自新其大赦天下以建平二年為太初元年號曰陳聖劉太平皇帝漏刻以百二十為度布告天下使明知之後月餘帝疾自若竟誅賀良等王莽為安漢公女為平帝皇后莽以皇后有子孫瑞通子午道時年十四始有婦人之道子水也午火也水以天一為牡火以地二為牝故火為水妃令通子以協之午子午道從杜陵直絶南山徑漢中莽既居攝梓潼人哀章學問長安素無行好為大言見莽居攝即作銅匱為兩檢署其一曰天帝行璽金匱圖其一署曰赤帝璽某傳予皇帝金策書某者髙皇帝名也書言王莽為真天子皇太后如天命圖書皆書莽大臣八人又取今名王興王盛章因自竄姓名竄謂厠著也凡為十人皆署官爵為輔佐章聞齊井石牛事下即日昏時衣黄衣持匱至髙廟以付僕射僕射以聞莽至髙廟拜受金匱神嬗嬗音禪莽既僣位欲改太后漢家舊號易其璽綬恐不見聼而莽疎屬王諫欲諂莽上書言皇天廢去漢而命立新室太皇太后不宜稱尊號當隨廢漢奉天命莽乃車駕至東宫親以其書白太后太后曰此言是也恚懟之辭也莽因曰此誖徳之臣也誖乖也音布内切罪當誅於是冠軍張永獻符命銅璧文言太皇太后當為新室文母太皇太后銅璧如璧形以銅為之也莽乃下詔曰予視羣公咸曰休哉視讀曰示休美也其文字非刻非畫厥性自然予伏念皇天命予為子更命太皇太后為新室文母皇太后協于新室故交代之際信于漢氏哀帝之代世傳行詔籌為西王母共具之祥共音居用切當為歴代為母昭然著明予祇畏天命敢不欽承謹以今月吉日親率羣公諸侯卿士奉上皇太后璽紱此紱謂璽之絙也以當順天心光于四海焉太后聼許莽於是鴆殺王諫而封張永為貢符子二年十一月立國将軍孫建奏西域将欽上言九月辛巳戊巳校尉史陳良終帶共賊殺校尉刁護刁音貂劫畧吏士自稱廢漢大將軍亡入匈奴又今月癸酉不知何日男子遮臣建車前白稱漢氏劉子輿成帝下妻子也下妻猶言小妻劉氏當復復音扶福反趣空宫趣讀曰促收繫男子即長安姓武字仲皆逆天違命大逆無道請論仲及陳良等親屬當坐者奏可漢氏髙皇帝比著戒云罷吏卒為賔食比頻也言髙帝頻戒云勿使吏卒守漢廟欲為寄食之賔于王氏廟盖誠欲承天心全子孫也其宗廟不當在長安城中及諸劉為諸侯者當與漢俱廢陛下至仁久未定前故安衆侯劉崇徐卿侯劉快陵鄉侯劉曽楚思王子扶恩侯劉貴等更聚衆謀反更音工衡切今狂狡之虜或妄自稱亡漢將軍或稱成帝子子輿至犯夷滅連未止者此聖恩不蚤絶其萌芽故也臣愚以為漢髙皇帝為新室賔享食明堂成帝異姓之兄弟平帝壻也皆不宜復入其廟元帝與皇太后為體言夫婦一體聖恩所隆禮亦宜之臣請漢氏諸廟在京師者皆罷諸劉為諸侯者以戸多少就五等之差其為吏者皆罷待除於家罷黜其職各使退歸而言在家侍遷除上當天心稱髙皇帝神靈稱音尺孕切塞狂狡之萌莽曰可嘉新公國師以符命為予四輔明徳侯劉龔率禮侯劉嘉等凡三十二人皆知天命或獻天符或貢昌言昌善也或捕告反冦厥功茂焉諸劉與三十二人同宗共祖者勿罷賜姓曰王惟國師以女配莽子故不賜姓改定安太后號曰黄皇室主絶之於漢也是時争為符命封侯其不為者相戲曰獨無天帝除書乎司命陳崇白莽曰此開姦臣作福之路而亂天命宜絶其原莽亦厭之遂使尚書大夫趙竝驗治罪五威将率所班皆下獄初甄豐劉歆王舜為莽腹心倡導在位倡音赤上切褒揚功徳安漢宰衡之號及封莽母兩子兄子皆豐等所共謀而豐舜歆亦受其賜竝富貴矣非復欲令莽居攝也居攝之萌出於泉陵侯劉慶前煇光謝嚚長安令田終術莽羽翼已成意欲稱攝豐等承順其意莽輙復封舜歆兩子及豐等爵位已盛心意既滿又實畏漢宗室天下豪傑而疏逺欲進者竝詐稱符命莽遂據以即真舜歆内懼而已豐素剛彊莽覺其不説説讀曰悦故徙大阿右拂大司空豐託符命文為更始将軍拂讀曰弼與賣餅兒王盛同列豐父子黙黙時子尋為侍中京兆大尹茂徳侯即作符命言新室當分陜立二伯分陜者欲依周公召公故事自陜以東周公主之自陜以西召公主之陜即今陜州是其地也伯長也陜音式冉切以豐為右伯太傅平晏為左伯如周召故事莽即從之豐當述職西出未行尋復作符命言故漢氏平帝后黄皇室主為尋之妻莽以詐立心疑大臣怨謗欲震威以懼下因是發怒曰黄皇室主天下母此何謂也收捕尋尋亡豐自殺尋隨方士入華山嵗餘捕得辭連國師公歆子侍中東通靈将五司大夫隆威侯棻棻弟右曹長水校尉伐虜侯泳大司空邑弟左闗将軍堂威侯竒及歆門人侍中騎都尉丁隆等牽引公卿黨親列侯以下死者數百人尋手理有天子字莽解其臂入視之曰此一天子也或曰一六子也六者戮也明尋父子當戮死也乃流棻于幽州放尋於三危殛隆于羽山效舜之罰共工等也殛誅也音居力切皆驛車載其屍𫝊致天鳳三年長平館西岸摧邕涇水不流毁而北行邕讀曰壅遣大司空王邑行視行音下更切還奏状羣臣上夀以為河圖所謂以土填水填讀與鎮同匈奴滅亡之祥也乃遣并州牧宋𢎞㳺擊都尉任明等将兵擊匈奴至邉止屯是年王路朱鳥門鳴晝夜不絶崔發等曰虞帝闢四門達四聰虞書叙舜之徳也闢四門明四目達四聰故引之門鳴者明當修先聖之禮招四方之士也於是令羣臣皆賀所舉四行從朱鳥門入而對策焉五年皇孫功崇公宗坐自畫容貌被服天子衣冠刻印三一曰維祉冠存已夏處南山蔵薄氷祉福祚也冠存已郤襲代也夏處南山就隂原也蔵薄氷亦以除暑也二曰肅聖寳繼葢自謂承聖舜後能肅敬得天寳龜以立宗欲繼其緒三曰徳封昌圖葢自言以徳見封當遂昌熾受天下圖籍又宗舅吕寛家前徙合浦私與宗通發覺按驗宗自殺莽曰宗屬為皇孫爵為上公知寛等叛逆族類而與交通刻銅印三文意甚害不知厭足窺欲非望春秋之義君親毋将将而誅焉迷惑失道自取此辜嗚呼哀哉宗本名㑹宗以制作去二名今復名㑹宗貶厥號賜諡為功崇繆伯以諸侯之禮葬于故同糓城同者宗所封一同之地宗姊妨為衛将軍王興夫人祝詛姑殺婢以絶口事發覺莽使中常侍䠠惲責問妨䠠音帶又音徒盖切并以責興皆自殺事連及司命孔仁妻亦自殺仁見莽免冠謝莽使尚書劾仁乘乾車駕巡馬左蒼龍右白虎前朱鳥後𤣥武右杖威節左負威斗號曰赤星非以驕仁乃以尊新室之威命也仁擅冕天文冠大不敬有詔勿劾更易新冠其好怪如此六年博募天下有竒技術可以攻匈奴者將待以不次之位言便宜者以萬數或言能渡水不用舟楫楫所以刺舟也音集其字從木連馬接騎濟百萬師或言不持斗糧服食藥物三軍不饑或言能飛一日千里可窺匈奴莽輙試之取大鳥翮為兩翼頭與身背著毛通引環紐飛數百歩墮莽知其不可用茍欲獲其名皆拜為理軍賜以車馬待發是嵗夙夜連率韓博上言有竒士長丈大十圍来至臣府曰欲奮擊朔冦自謂巨毋霸出於蓬莱東南五城西北昭如海瀕昭如海名也瀕涯也音頻又音賔軺車不能載三馬不能勝即日以大車駟馬建虎旗載霸詣闕霸卧則枕鼔以鐵著食此皇天所以輔新室也願陛下作大甲髙車賁育之衣遣大将一人與虎賁百人迎之於道京師門戸不容者開髙大之以視百蠻視讀曰示鎮安天下博意欲以諷莽諷言母得簒盗而霸莽聞惡之留霸在所新豐在所謂其見到之處更其姓曰臣母氏謂因文母太后而霸王符也莽字巨君若言文母出此人使我至霸王徴博下獄以非所宜言棄市地皇二年中郎陽成修獻符命言繼立民母又曰黄帝以百二十女致神仙莽於是遣中散大夫謁者各四十五人分行天下行音下更切博采鄉里所髙有淑女者上名時臨淮𤓰田儀等為盗賊依阻㑹稽長洲姓𤓰田名儀長洲即枚乘所云長洲之苑琅邪女子吕母亦起初吕母子為縣吏為宰所寃殺宰縣令也母散家財以酤酒買兵弩酤音姑隂厚貧窮少年得百餘人遂攻海曲縣殺其宰以祭子墓引兵入海其衆浸多後皆數萬莽遣使者即赦盗賊還言盗賊解轉復合問其故皆曰愁法禁煩苛不得舉手力作所得不足以給貢税閉門自守又坐鄰伍鑄鐵挾銅姦吏因以愁民窮悉起為盗賊莽大怒免之其或順指言民驕黠當誅及言時運適然且滅不久莽説輙遷之後漢劉揚光武建武二年造作䜟記云赤九之後癭揚為主漢以火徳故云赤也光武於髙祖九代孫故云九揚病癭欲以惑衆與緜曼賊交通緜曼地名屬真定國遣前將軍耿絶誅之張豐為涿郡太守建武三年執使者舉兵反自稱無上大将軍與彭寵連兵命征虜将軍祭遵等擊之遵急攻豐豐功曹孟衣執豐降衣音公引切初豐好方術有道士言豐當為天子以五綵囊裹石繋豐肘云石中有玉璽豐信之遂反既執當斬猶曰肘右有玉璽遵為椎破之豐乃知被詐仰天歎曰當死無所恨宫崇琅邪人順帝時崇詣闕上其師于吉于曲陽泉水上所得神書百七十卷皆縹白素朱介青首朱目號太平清領書今閏州有曲陽山神溪水定州有曲陽山神溪水海州有曲陽城北有羽漂水夀州有曲陽城又有北溪水而于吉宫崇並琅邪人盖海州曲陽是也縹青白也素縑也以朱為介道首慓也目題目也太平經曰吾書中善者悉使青下而丹白合乎吾之道乃丹青之信也青者生仁而有心赤者太陽火之正色也于吉先寓居東方来吳㑹立精舍燒香讀道書制作符水以療病吳㑹人多事之孫策嘗于郡城楼上請㑹賔客吉乃盛服趨度門下諸将賔客三分之二下樓拜之掌客者禁之不能止䇿即令收之有事之者悉使婦女入見䇿母請之母謂䇿曰于先生亦助軍作福醫護将士不可殺之䇿曰昔南陽張津為交州刺史前聖典訓廢漢家法律嘗著絳拍頭鼔琴焚香讀邪俗道書云以助化卒為蠻夷所殺此甚無益諸君但未悟耳今此子已在鬼籙勿復費紙筆也即催斬之縣首于市諸事之者尚不謂其死而云尸解焉復祭祀求福其言以隂陽五行為家而多巫覡雜語太平經曰天失隂陽則亂其道地失隂陽則亂其財人失隂陽則絶其後君臣失隂陽則其道不理五行四時失隂陽則為災今天垂象為人法故當承頌之也又曰天上有嘗神聖要語時下授人以言用使神吏應氣而往来也人衆得之謂神咒也咒百中十其呪有可使神為除災疾用之所向無不愈也有司奏崇所上妖妄不經乃收藏之後張角頗有其書焉張角鉅鹿人靈帝時角自稱大賢良師良或作郎奉事黄老道畜養弟子跪拜首過首音式受切符水呪説以療病者頗愈百姓信向之角因遣弟子八人使於四方以善道教化天下轉相誑惑十餘年間衆徒數十萬連結郡國自青徐幽冀荆揚兖豫八州之人莫不畢應遂置三十六萬方猶將軍號也大方萬餘人小方六七千各立渠帥訛言蒼天已死黄天當立嵗在甲子天下大吉以白土書京城寺門及州郡官府皆作甲子字中平元年大方馬元義等先收揚荆數萬人期㑹發於鄴元義數往来京師以中常侍封諝徐奉等為内應約以三月五日内外俱起未及作亂而張角弟子濟南唐周上書告之於是車裂元義於雒陽靈帝以周章下三公司𨽻使鈎盾令周斌将三府掾屬按驗宫省直衛及百姓有事角道者誅殺千餘人推考冀州逐捕角等知事已露晨夜馳勑諸方一時俱起皆着黄巾為標幟幟音尺志切又音試時人謂之黄巾亦名為蛾賊蛾音魚騎切即蟻字也喻賊衆多故以為名殺人以祠天角稱天公將軍角弟寳稱地公将軍寳弟梁稱人公將軍所在燔燒官府劫掠聚邑州郡失據長吏多逃亡旬日之間天下響應京師震動張魯漢中人祖父陵順帝時客於蜀學道鵠鳴山中山在今益州晉原縣西造作符書以惑百姓受其道者輙出米五斗故謂之米賊陵𫝊子衡衡𫝊子魯魯遂自號師君其来學者初名為鬼卒後號祭酒各領部衆衆多者為治頭大祭酒皆教以誠信不聽欺㒺有病但令首過而已大抵與黄巾相似首音式救切諸祭酒各起義舎于路同之亭傳𫝊音陟戀切縣置米肉以給行旅食者量腹取足過多則鬼能病之犯法者先加三原原免也然後行刑不置長吏以祭酒為理民夷信向靈帝光和中東方張角為大平道漢中張修為五斗米道大平道者師持九節杖為符呪教病人叩頭思過因以符水飲之得病或日淺而愈者則云此人信道其或不愈則云不信道脩法畧與角同加施净室使病者處其中思過又使人為姦令祭酒主以老子五千文使都習號為姦令為鬼使主為病者請禱請禱之法書病人姓名説服罪之意作三通其一上之天著山上其一埋之地其一沈之水調之三官手書使病者家出米五斗以為常故號曰五斗米師實無益於治病但為淫妄然小人昏愚競共事之後角被誅修亦亡及魯在漢中因其民信行修業遂増飾之教使作義舍以米肉置其中以止行人人教使自隠有小過者當治道百歩則罪除又依月令春夏禁殺又禁酒流移寄在其地者不敢不奉王凝之為㑹稽内史世事張氏五斗米道凝之彌篤孫恩之攻㑹稽僚佐請為之備凝之不從方入静室請禱出語諸将佐曰吾已請大道許鬼兵相助賊自破矣既不設備遂為孫恩所害殷仲堪為荆州刺史桓𤣥率兵入討仲堪諸将皆敗仲堪出降鄼為𤣥兵所獲逼令自殺仲堪少奉天師道及元来攻猶勤請禱南齊周山圖武帝時為竟陵王鎮北司馬帶南平昌太守時義鄉縣長風廟神姓鄧先經為縣令死遂發靈山圖啓請加神位輔國将軍荅曰足狗肉便了事何用階級為杜京産吳錢唐人祖運為劉毅衛軍㕘軍父道鞠州從事世傳五斗米道至京産及子栖龔𤣥宣始安郡民也𤣥宣云神人與其玉印玉版書不湏筆吹紙便成字自稱龔聖人以此惑衆前後郡守敬事之及裴昭明為始安内史付獄治罪後魏李肅字彦邕為員外常侍初諂附侍中元暉後以左道事侍中穆紹嘗裸身被髮畫腹銜刀於隠屏之處為紹求福故紹愛之司馬休符徐州妖人休符自稱晉王煽惑百姓刺史尉元遣將追斬之北齊薛榮宗後主時為開府榮宗嘗自云能使鬼及周兵之逼言於後主曰臣已發斛律明月将大兵在前去帝信之經古塜榮宗謂舎人先行恭是誰家塜行恭戲之曰郭林宗復問林宗是誰行恭曰郭元貞父榮宗前奏曰臣向見郭林宗從塜出著大帽穿皂靴捶馬鞭問臣我阿貞来否是時羣妄多皆類此李催性喜鬼怪左道之術嘗有道人及女巫歌謳擊鼔下神祭六丁符訣厭勝之具無所不為又于朝廷省門外為董卓作神坐數以牛羊祠之天子使左中郎将李國持節拜催為大司馬在三公之右催自以為得鬼神之助拜厚賜諸巫晉趙王倫與孫秀並惑巫鬼聽妖邪之説秀使牙門趙奉詐為宣帝神語命倫蚤入西宫又言宣帝於北芒為趙王佐助於是别立宣帝廟于芒山謂逆謀可成倫既僣即帝位時三王起兵倫使楊珍晝夜詣宣帝位廟祈請輙言宣帝謝陛下某日當破賊拜道士胡沃為太平將軍以招福祐秀家日為淫祀作厭勝之文使巫祝選擇戰日又令近親于嵩山著羽衣詐稱仙人王喬作神仙書述倫祚長久以惑衆李脱明帝時人為道士脱妖術惑衆自言八百嵗故號李八百自中州至建業以鬼道療病又署人官位時人多信事之弟子李宏養徒灊山云應䜟雷王大寧二年斬於建康市孫泰字敬逺世奉五斗米道師事錢唐杜子恭有秘術嘗就人借𤓰刀其主求之子恭曰當即相還耳既而刀主行至嘉興有魚躍入船中破魚得𤓰刀其為神效往往如此子恭死泰𫝊其術然浮狡有小才誑誘百姓愚者敬之如神皆竭財産進子女以祈福慶王珣言于㑹稽王道子流之于廣州廣州刺史王懐之以泰行鬱林太守南越亦歸之太子太傅王雅先與泰善言於孝武帝以泰知養性之方因召還道子以為徐州主簿猶以妖術眩惑士庶隋獨孤陁獻皇后弟為延州刺史性好左道其外祖母髙氏先事貓鬼已殺其舅郭沙羅因轉入其家髙祖微聞而不之信也㑹獻皇后及楊素妻鄭氏俱有疾召醫視之皆曰此貓鬼疾帝以陁后之異母弟陁妻楊素之異母妺繇是忌陁所為隂命其兄左監門郎将穆以情喻之帝又辟左右謂陁陁言無有帝不悦左轉遷州刺史出怨言帝令左僕射髙熲納言蘇威大理正皇甫孝緒大理丞楊逺等雜按之陁婢徐阿尼言本從阿母家来嘗事貓鬼每以子日夜祀之言子者鼠也其貓鬼每殺人者所死家財物潛移於畜貓鬼家陁嘗從家中索酒其妻曰無錢可酟陁因謂阿尼曰可令貓鬼向越公家使我足錢阿尼便咒之居數日貓鬼向素家後帝初從并州還陁于園中謂阿尼曰可令貓鬼向皇后所使多賜吾物阿尼復呪之遂入宫中楊逺乃於門下外省遣阿尼呼貓鬼阿尼於是夜中置香粥一盆以匙扣而呼曰貓女可来無住宫中久之阿尼色正青若被牽拽者云貓鬼己至帝以事下公卿竒章公牛宏曰妖繇人興殺其人可以絶矣帝令犢車載陁夫妻将賜死於其家陁弟司勲侍中整詣闕求哀於是免陁死除名以其妻楊氏為尼先是有人訟其母為人貓鬼所殺者帝以為妖妄怒而遣之及此詔誅被訟行貓鬼家陁未幾而卒宋子賢唐縣人子賢善為幻術毎夜樓上有光明能變作佛形自稱彌勒出世又懸大鏡於堂上紙素上畫為蛇為獸及有人来禮者轉側其鏡遣觀生形儀或暎見紙上蛇形者賢輙告云此罪業者當更禮念之又令禮謁乃轉人形示之逺近惑信日數百千人遂潛謀作亂大業九年煬帝在髙陽子賢将為無遮佛㑹因舉兵欲襲擊乘輿事泄鷹揚郎将以兵捕之夜至其所遶其所居但見火坑兵不敢進将曰此地素無坑止妖妄耳及進無復火矣遂擒斬并坐其黨與千餘家向海明桑門人也大業中於扶風自稱彌勒佛出世潛謀逆亂人有歸心者輙獲吉夢繇是人皆惑之三輔之士翕然稱為大聖因舉兵及衆至數萬官軍擊破之冊府元龜卷九百二十一
