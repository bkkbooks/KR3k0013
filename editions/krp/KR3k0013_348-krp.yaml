body:
  text: 册府元龜卷三百四十八宋王欽若等撰將帥部立功夫受命於朝受脤於社推轂以遣鑿門而出衽金革而不厭聽鼙鼓而忘身者將帥之事也蓋五材並設未嘗去兵四征弗庭於是用武自三五之世乃有威讓之訓原野之罰焉春秋戰國革車交騖故其握戎著攻城略地之績成斬將搴旗之効者比比有之楚漢競逐勲策可舉繇是之後或内平亂畧外攘夷寇奉辭以討有罪勵兵而翦勍敵乃能戡夷兇醜謐清邊圉鹵獲之數無等追北之威靡亢闢疆以益地平國而弔民紀功於竹帛稱伐於鐘鼎斯所謂折衝之虎臣殿邦之良帥者也孫武為呉將西破强楚入郢北威齊晉顯名諸侯孫子與有力焉司馬穰苴為齊景公將軍將兵扞燕晉之師晉師聞之為罷去燕師聞之度水而解於是追擊之遂取所亡邦内故境孫臏武之後也為齊威王師宣王二年與齊將田忌田嬰俱伐魏敗之馬陵虜太子申而殺魏將龎涓呉起為魯將攻齊大破之魯君疑之謝起起於是聞魏文侯賢而事之文侯以為將擊齊㧞五城趙奢為趙將秦伐韓軍於閼與趙王令趙奢將救之大破秦軍秦軍解而走遂解閼與之圍而歸李牧為趙將居代鴈門大破殺匈奴十餘萬騎滅襜都甘反襤路談反徐廣曰一作臨崔駟又案如淳曰胡名也在代地破東胡降林胡單于奔走其後十餘歳匈奴不敢近趙邊城趙悼襄王元年㢘頗既亡入魏趙使李牧攻燕拔武遂方城居二年龎煖破燕軍殺劇辛後七年秦破趙殺將扈輒於武遂城斬首十萬趙乃以李牧為大將軍擊秦軍於宜安大破秦軍走秦將栢齮封李牧為武安君居三年秦攻畨吾李牧擊破秦軍南距韓魏㢘頗者為趙將惠文王十六年伐齊大破之取晉陽拜為上卿自邯鄲圍解五年而燕用栗腹之謀舉兵擊趙趙使㢘頗將大破燕軍於鄗殺栗腹遂圍燕割五城請和乃聽之二十年㢘頗東攻齊破其一軍居二年㢘頗復伐齊㡬㧞之㡬邑名也案趙世家惠文王二十三年㢘頗將攻魏之㡬邑取之而趙世家及年表無伐齊㡬㧞之事實㡬是邑名屬齊或云屬魏耳田丹在齊不得至於㧞也後三年㢘頗攻魏之防陵安陽拔之樂毅為燕亞卿昭王使毅約趙惠文王别使連楚魏令趙嚪秦嚪進説之意以伐齊之利諸侯害齊湣王之驕暴皆爭合從與燕伐齊毅還報昭王悉起兵使樂毅為上將軍趙惠文王以相國印授毅毅於是并䕶趙楚韓魏燕之兵伐齊破之濟西諸侯兵罷歸而燕軍獨追至于臨淄齊湣王之敗濟西亡走保於莒毅獨留徇齊齊皆城守毅攻入臨淄盡取齊寶財物祭器輸之燕昭王大悦親至濟上勞軍行賞饗士封毅於昌國屬齊號為昌國君於是昭王收齊鹵獲以歸而使毅復以兵平齊城之不下者毅留徇齊五歳下齊七十餘城皆為郡縣以屬燕秦商鞅孝公時為大良造將兵圍魏安邑降之又襲虜魏公子卬因攻其軍盡破之樗里子名疾惠王弟也惠王八年使將而伐晉曲沃盡出其人取其城地入秦二十五年伐趙虜趙將軍莊豹㧞藺明年助魏章攻楚敗楚將屈丐取漢中地秦封樗里子號為嚴君甘茂惠王時為將佐魏章畧定漢中地惠王卒武王立張儀魏章去東之魏蜀侯煇相壯反秦使甘茂定蜀還而以甘茂為左丞相魏冉封穰侯為秦將攻魏魏獻河東方四百里㧞魏之河内取城大小六十餘昭王三十二年為相國將兵攻魏走芒卯芒莫卯切卯陌飽切入北宅三十三年魏背秦與齊從親秦使穰侯伐魏斬首四萬走魏將暴鳶得魏三縣明年穰侯與白起客卿胡陽復攻趙韓魏破芒卯於華陽下斬首十萬取魏之卷丘權切蔡陽長社趙氏觀津白起郿人也昭王十三年爲左庶長將而擊韓之新城明年為左更攻韓魏於伊闕斬首二十四萬又虜其將公孫喜㧞五城起遷為國尉渉河取韓安以東到乾音干河今河東聞喜縣北有乾河口因名乾河里但有故溝處無復水也明年起為大良造攻魏㧞之取城大小六十一明年起與客卿錯攻垣城㧞之河東垣縣後五年攻趙㧞光狼城後七年攻楚㧞鄢鄧五城昭王二十八年其明年攻楚㧞郢燒夷陵遂東至竟陵楚王亡去郢東走徙陳秦以郢為南郡起遷為武安君因取楚定巫黔中郡昭王三十四年攻魏㧞華陽走芒卯而虜三晉將斬首十三萬與趙將賈偃戰沈其卒二萬人於河中昭王四十三年攻韓陘城㧞五城斬首五萬四十四年攻南陽太行道絶之北南陽河内脩武是也四十五年伐韓之野王秦王齕為左庶長昭王四十七年秦使齕音核攻韓取上黨民走趙趙軍長平在泫氏以按據上黨民四月齕因攻趙趙使㢘頗將趙軍士卒犯秦斥兵秦斥兵斬趙裨將茄六月陷趙軍取二鄣四尉七月趙軍築壘壁而守之秦又攻其壘取二尉敗其陣奪西壘壁㢘頗堅壁以待秦秦數挑戰趙軍不出趙王數以為讓九月趙卒不得食四十六日皆内隂相殺食來攻秦壘欲出為四隊四五復之不能出其將軍趙括出鋭卒自搏戰秦軍射殺趙括括軍敗前後斬首虜四十五萬人趙人大震四十八年十月秦復定上黨郡秦分軍為二王齕攻皮牢㧞之司馬梗定太原王翦為秦將始皇十一年翦將攻趙閼與破之㧞九城十八年攻趙歳餘遂抜趙趙王降盡定趙地為郡明年燕使荆軻為賊於秦秦王使王翦攻燕燕王喜走遼東翦遂定燕薊而還翦後將六十萬人擊荆大破荆軍至蘄南殺其將軍項燕荆兵遂敗走秦因乘勝畧定荆地城邑歳餘虜荆王負芻竟平荆地為郡縣因南征百越之君翦子賁為秦將擊荆秦諱楚故云荆荆兵敗還擊魏魏王降遂定魏地後與李信破定燕齊地始皇二十六年盡并天下王氏蒙氏功為多名施於後世蒙驁為上卿莊襄王元年為秦將伐韓取成臯滎陽作置三川郡二年攻趙取三十七城始皇三年蒙驁攻韓取十三城攻魏取二十城作置東郡驁子武始皇二十三年為秦裨將軍與王翦攻楚大破之殺項燕二十四年攻楚虜楚王負芻武子恬因家世得為秦將始皇二十六年攻齊大破之拜為内史秦已并天下乃使蒙恬將三十萬衆北逐戎狄收河南築長城因地形用險制塞起臨洮屬山西至遼東延袤萬餘里於是渡河至陽山五原西安陽縣北有隂山隂山在河内陽山在河北李信為將嘗以兵千人逐燕太子丹於衍水中卒破得丹漢周勃髙帝六年以將軍從擊燕王臧荼破之易下今易縣臣欽若等曰勃漢五年以前從攻項籍並具將帥佐命門韓彭英盧皆放此所將卒當馳道為多當髙祖所行之前七年以將軍從髙帝擊韓王信於代降下霍人以前至武泉縣屬雲中擊胡騎破之武泉北轉攻信軍銅鞮破之還降太原六城擊韓信胡騎晉陽下破之下晉陽復擊信軍於硰石地名硰音沙破之追北八十里還攻樓煩三城因擊胡騎平城下所將卒當馳道為多十年以太尉擊陳豨屠馬邑將卒斬豨將軍乘去聲馬絺姓乘馬名絺也轉擊韓王信陳豨趙利軍於樓煩破之得豨將宋最鴈門守圂圂音下頓切鴈門守之名因轉攻得雲中守遫丞相箕肄將軍勲遫古速字肄音離二切勲者亦豨將之名定鴈門郡十七縣雲中郡十二縣因復擊豨靈丘破之斬豨得豨丞相程縱將軍陳武都尉髙肆定代郡九縣十三年燕王盧綰反勃以相國代樊噲將擊下薊音計幽州縣名得綰大將丞相偃守陘音刑盧綰郡守陘其名也太尉弱御史大夫施屠渾都姓施屠名渾都渾音胡昆切破綰軍上闌後擊綰軍沮陽沮音阻縣名屬上谷追至長城定上谷十二縣右北平十六縣遼東二十九縣漁陽二十二縣最從髙帝得相國一人最者凡也摠言其攻戰克獲之數丞相二人將軍二千石各三人别破軍二下城三定郡五縣七十九得丞相大將各一人樊噲髙帝六年以將軍從攻臧荼於燕虜荼定燕地七年以將軍從攻韓王信於代自霍人以往至雲中與絳侯周勃共定之十年擊陳豨與曼丘臣軍戰襄國破栢人先登降之定清河恒山凡二十七縣殘東垣殘謂多殺傷也遷為左丞相破得綦母卯尹潘軍於無終廣昌姓綦母名卯綦音其破豨别將胡人王黄軍於代南因擊韓王信軍於參合所將卒斬信擊豨胡騎横谷斬將軍趙既虜代丞相馮梁守孫奮大將軍王黄將軍太卜太僕觧福人姓名等十人與諸將共定代鄉邑七十三後燕王盧綰反噲以相國擊綰破其丞相抵薊南抵丁禮切至也一説抵者其丞相之名也定燕縣十八鄉邑五十一噲從髙帝斬首百七十六級虜二百八十八人别破軍七下城五定郡六縣五十二得丞相一人將軍十三人二千石以下至三百石十二人酈商髙帝六年以將軍從擊臧荼戰龍脱地名破荼軍易下卻敵遷為右丞相别定上谷因攻代受趙相國印與綘侯等定代郡鴈門得代丞相程縱守相郭同守相謂為相而居守者將軍以下至六百石十九人後以右丞相擊豨殘東垣又從擊黥布攻其前垣謂攻其壁壘之前垣陷兩陣得以破布軍凡别破軍三降定郡六縣七十三得丞相守相大將軍各一人小將二人二千石以下至六百石十九人夏侯嬰髙帝七年以太僕從擊韓王信軍胡騎晉陽大破之又從擊胡騎句注北大破之又擊胡騎平城南三陷陳功為多從擊陳豨黥布陷陳卻敵灌嬰髙帝七年以車騎將軍從擊韓王信於代至馬邑别降樓煩以北六縣斬代左相破胡騎將於武泉北復從擊信胡騎晉陽下所將卒斬胡白題將一人胡名也又從擊陳豨别攻豨丞相侯敞軍曲逆下破之卒斬敞及特將五人卒謂所將之卒特獨也各獨為也降曲逆盧奴上曲陽安國安平攻下東垣黥布反以車騎將軍先出攻布别將於相破之斬亞將樓煩將三人又進擊破布上柱國及大司馬軍又進破布别將肥銖嬰身生得左司馬一人所將卒斬其小將十人追北至淮上凡從所得二千石二人别破軍十六降城四十六定國一郡二縣五十二得將軍二人柱國相各一人二千石十人靳歙音翕髙帝七年以騎都尉從擊韓王信於平城下還軍東垣有功遷為車騎將軍并將梁趙齊燕楚車騎别擊陳豨丞相敞破之侯敞因降曲逆從擊黥布有功凡斬首九十級虜一百三十二人破别軍十四降城五十九定郡國各一縣二十二得王柱國各一人二千石以下至五百石三十九人郭蒙為將軍髙帝十年代相國陳豨反帝在邯鄲豨將侯敞將萬餘人遊行王黄將騎千餘軍曲逆張春將卒萬餘人渡河攻聊城蒙與齊將擊大破之周亞夫景帝三年以中尉為太尉東擊呉楚㑹兵滎陽㑹集也呉方攻梁亞夫東北走昌邑走音奏使輕騎兵弓髙侯等絶呉楚兵後食道呉楚既餓廼引而去亞夫出精兵追擊大破呉王濞音匹備切呉王濞棄其軍與壯士數千人亡走保於江南丹徒漢兵因乘勝遂盡虜之降其兵月餘越人斬呉王頭以告凡相守攻三月而呉楚破平是時欒布衛綰程嘉公孫渾邪渾音胡温切邪音嗟以切蘇息直不疑皆以將軍擊呉楚有功封侯衛青武帝元光六年以車騎將軍擊匈奴出上谷至籠城籠讀與龍同斬首虜數百賜爵闗内侯元朔元年秋復將三萬騎出鴈門斬首虜數千明年復出雲中西至髙闕髙闕山名一曰塞名在朔方之北遂至于隴西捕首虜數千畜百餘萬走白羊樓煩王遂取河南地為朔方郡當北地之北黄河之南也以三千八百戸封青為長平侯五年春令青將三萬騎出髙闕衛尉蘇建為游擊將軍左内史李沮為彊弩將軍沮音子余太僕公孫賀為騎將軍代相李蔡為輕車將軍皆領屬車騎將軍俱出朔方大行李息岸頭侯張次公為將軍俱出右北平匈奴右賢王當青等兵以為漢兵不能至此飲醉漢兵夜至圍右賢王右賢王驚夜逃獨與其愛妾一人騎數百馳潰圍北去漢輕騎校尉郭成等追數百里弗得得右賢裨王十餘人衆男女萬五千餘人畜數十百萬于是引兵而還至塞天子使使者持大將軍印即軍中拜青為大將軍諸將皆以兵屬立號而歸明年春青以大將軍出定襄合騎侯公孫敖為中將軍太僕公孫賀為左將軍翕侯趙信為前將軍衛尉蘇建為右將軍郎中令李廣為後將軍左内史李沮為彊弩將軍咸屬大將軍斬首數千級而還月餘悉復出定襄斬首虜萬餘人是歳趙信奔降單于元狩四年帝與諸將議曰翕侯趙信為單于畫計常以為漢兵不能度幕輕留今大發卒其勢必得所欲乃令青與驃騎將軍霍去病驃音頻妙切各五萬騎歩兵轉者踵軍數十萬轉者謂運轉車也踵接也而敢力戰深入之士皆屬去病去病始為出定襄當單于捕虜虜言單于東廼更令去病出代郡令青出定襄郎中令李廣為前將軍太僕公孫賀為左將軍主爵趙食其為右將軍食音異其音基平陽侯曹襄為後將軍皆屬大將軍趙信為單于謀曰漢兵即度幕人馬罷罷讀曰疲匈奴可坐收虜耳廼悉逺北其輜重皆以精兵待幕北而適直青軍出塞千餘里直讀曰值見單于兵陳而待於是青令武剛車自環為營而縱五千騎往當匈奴匈奴亦從萬騎㑹日且入而大風起沙礫擊靣兩軍不相見漢益縱左右翼繞單于單于視漢兵多而士馬尚彊戰而匈奴不利薄暮單于遂乘六臝壯騎可數百直冐漢圍西北馳去冐犯也音莫克切昏漢匈奴相紛拏殺傷大當漢軍左校捕虜言單于未昏而去漢軍因發輕騎夜追之青因隨其後匈奴兵亦散走㑹明行二百餘里不得單于頗捕斬首虜萬餘級遂至寘顔山趙信城趙信降匈奴匈奴為築城居之得匈奴積粟食軍食音嗣軍留一日而還悉燒其城餘粟以歸青軍入塞凡斬首虜萬九千級青凡七出擊匈奴斬捕首虜五萬餘級一與單于戰收河南地置朔方郡其裨將及校尉侯者九人䕶軍都尉公孫敖為合騎侯都尉韓説龍頗侯騎將軍公孫賀南窌侯窌亦作卯音普教切輕車將軍李蔡樂安侯校尉李朔陟軹侯趙不虞隨成侯公孫戎奴從平侯張騫博望侯上谷太守郝賢衆利侯將軍李沮李息及校尉豆如意中郎將綰皆有功賜爵闗内侯霍去病為票姚校尉票姚音飄搖一説票音頗妙切姚音羊召切再從大將軍與輕勇騎八百直棄大將軍數百里斬首捕虜二千二十八級得相國當户斬單于大父行籍若侯產籍若胡侯也産名也此人單于祖父之行也行音胡良切捕季父羅姑比再冠軍羅姑名也亦單于之季父也比音頻寐切廼以二千五百户封去病為冠軍侯元狩三年春以去病為驃騎將軍將萬騎出隴西過馬耆山千餘里得胡首虜八千餘級得休屠王祭天金人匈奴祭天處本在栗陽甘泉山下秦擊奪其地後徙之休屠王右地故休屠有祭天金人象也作金人以為天神之主而祭之今佛像是其遺法其夏驃騎將軍復與合騎侯數萬騎出隴西北地二千里過居延祁連山得胡首虜三萬餘級裨小王以下十餘人其後匈奴渾邪王休屠王欲降漢武帝恐其詐乃令去病將兵往迎之去病將兵渡河渾邪裨王見漢兵多不欲降頗遁去去病馳入與渾邪王相見斬其欲亡者八千人先遣渾邪王詣行在去病盡將其衆渡河衆號十萬廼分處降者於邊五郡故塞外而皆在河南因其故俗為屬國乃以千七百户益封去病四年大將軍衛青出定襄去病出代右北平二千餘里直左方兵直當也所斬捕功多於青以五千八百户封去病去病凡六出擊匈奴其四出以將軍再出為票姚校尉也斬首虜十一萬餘級渾邪王以衆降數萬開西河酒泉之地西方益少胡寇其校吏司馬趙破奴封從票侯校尉髙不識宜寇侯僕多煇渠侯煇音許韋切右北平太守路博徳邳離侯北地都尉衛山義陽侯匈奴歸義復陸支復音芳日切杜侯伊即靬音若言切衆利侯趙食其以主爵都尉從大將軍斬首六百六十級元狩三年賜爵闗内侯楊僕元鼎五年秋以主爵都尉為樓船將軍與伏波將軍邳離侯路博徳平南粤樓船將軍出豫章下横浦將精卒先陷尋陿破石門得粤船粟因推而前挫粤鋒以粤數萬人待伏波將軍伏波將軍將罪人道逺後期與樓船㑹廼有千餘人遂俱進樓船居前至畨禺粤王建徳與其相吕嘉皆城守樓煩自擇便處居東南靣伏波居西北靣㑹暮樓船攻敗粤人縱火燒城遲旦城中皆降伏波吕嘉建徳以夜與其屬數百人亡入海伏波又問降者知嘉所之遣人追故騎校司馬蘇𢎞得建徳粤郎都稽得嘉越中所置也稽音雞南粤平伏波將軍益封樓船將軍以摧鋒陷堅為將梁侯又封蘇𢎞為海常侯韓説音悦元鼎六年秋以待詔為横海將軍與樓船將軍楊僕中尉王温舒平東粤説出句章㑹稽之縣浮海從東方往僕出武林温舒出梅嶺元封元年冬咸入東粤自兵未往故粤衍侯呉陽前在漢漢使歸諭東粤王餘善不聽及横海軍至陽以其邑七百人反攻粤軍於漢陽及故粤建成侯敖與繇王居股謀俱殺粤王餘善以其衆降横海將軍為案道侯校尉劉福為繚嫈侯繚音遼嫈音嬰李廣利太初四年為貳師將軍擊大宛宛兵迎擊漢兵漢兵射敗之宛兵入保其城攻之四十餘日宛貴人殺其王母寡母寡宛王名殺漢使者故誅之廼出其馬令漢自擇漢軍取其善馬數十匹中馬以下牝牡三千餘匹而立宛貴人故時遇漢善者名昧蔡為宛王昧音未蔡音干曷切貳師將軍之東出謂旋軍東出所過小國聞宛破皆使其子弟從入貢獻因為質焉封廣利為海西侯食邑八千户初貳師起燉煌為人多道上國不能食起發也道上國近道諸國也食讀曰飤分為數軍從南北道校尉王申生故鴻臚壼充國等千餘人别至郁成城守不肯給食申生去大軍二百里負而輕之負恃也持大軍之威而輕敵人攻郁成急郁成窺知申生軍少晨用三千人攻殺申生等數人脱亡走貳師走音奏貳師令捜粟都尉上官桀往攻破郁成郁成降其王亡走康居桀追至康居康居聞漢已破宛出郁成王與桀桀令四騎士縳守詣大將軍時多利將故謂二師為大將軍上邽騎士趙弟㧞劒擊斬郁成王桀等遂追及大將軍封趙弟為新畤侯軍正趙始成功最多為光禄大夫上官桀敢深入為少府李哆有計謀為上黨太守哆音昌野切軍官吏為九卿者三人諸侯相郡守二千石百餘人千石以下千餘人范明反昭帝元鳳三年以中郎將為度遼將軍將二萬騎出遼東擊烏桓斬首六千餘級獲三王首還封為平陵侯趙充國昭帝時以大將軍䕶軍都尉將兵擊武都反氐音丁奚切定之還為水衡都尉擊匈奴獲西祁王匈奴王也宣帝本始中為蒲類將軍征匈奴斬虜數百級神爵元年先零諸羌反充國以後將軍引兵至先零所在虜久屯聚解弛解亭解弛放也望見大軍棄車重欲度湟水重音直用切道阨狹充國徐行驅之虜赴水溺死者數百降及斬首五百餘人鹵馬牛羊十萬餘頭車四千餘兩音諒又與彊弩將軍許壽擊西羌充國所降復將五千餘人常惠本始二年以光禄大夫使烏孫公主及昆彌皆遣使因惠言匈奴連發大兵擊烏孫取車延惡師地收其人民去使使脅求公主欲隔絶漢昆彌發國半精兵自給人馬五萬騎盡力擊匈奴唯天子出兵以救公主昆彌於是漢大發十五萬騎五將軍分道出五將軍謂祁連將軍田廣明蒲類將軍趙充國武牙將軍田順度遼將軍范明友前將軍韓増以惠為校尉持節䕶烏孫兵昆彌自將翖侯以下五萬餘騎翖即翕字也翖侯烏孫官號也從西方入至右谷蠡庭谷音鹿蠡音黎獲單于父行及嫂居次匈奴女號若言公主也行胡浪切名王騎將以下三萬九千人得馬牛驢驘槖佗五萬餘匹羊六十餘萬頭烏孫皆自取鹵獲陳湯為西城副校尉與都䕶甘延壽破郅支單于斬閼氏太子名王以下千五百一十八級生虜百四十五人降虜千餘人段㑹宗成帝時為左曹中郎將烏孫小昆彌末振將其名也殺大昆彌㑹病死漢恨誅不加元延中遣㑹宗發戊已校尉諸國兵即誅末振將太子畨丘㑹宗恐大兵入烏孫驚畨丘亡逃不可得即留所發兵墊婁地選精兵三千弩徑至昆彌所在召畨丘責以末振將骨肉相殺殺漢公主子孫未伏誅而死使者受詔誅畨丘即手劒擊殺畨丘官屬以下驚恐馳歸天子賜㑹宗爵闗内侯後漢鄧禹光武建武元年以大司徒與積弩將軍馮愔驍騎將軍樊崇車騎將軍宗歆建威將軍鄧尋赤眉將軍耿訢軍師將軍左于西討赤眉既渡汾隂河入夏陽更始中郎將左輔都尉公乘歙引其衆十萬與左馮翊兵共拒禹於衛禹復破走之馮異建武二年以孟津將軍引擊陽翟賊嚴終趙根破之時赤眉延岑暴亂三輔郡縣大姓各擁兵衆大司徒鄧禹不能定乃遣異代禹討之所至皆布威信𢎞農羣盜稱將軍者十餘輩皆棄衆降異異與赤眉遇于華隂相拒六十餘日戰數十合降其將劉始王宣等凡五千餘人三年春拜異為征西大將軍破赤眉於崤底降男女八萬人餘衆尚十餘萬東走宜陽時延岑據藍田王歆據下邽芳丹據新豐芳作茅蔣震據霸陵張邯據長安公孫守據長陵楊周據谷口吕鮪據陳倉角閎據汧駱蓋延據盩厔任良據鄠汝各稱將軍擁兵多者萬餘少者數千人轉相攻擊異且戰且行屯軍上林苑中延岑既破赤眉自稱武安王拜置牧守欲據闗中引張邯任良共攻異異擊破之斬首千餘級諸營保守附岑者皆來降歸異岑走攻析異遣復漢將軍鄧曄輔漢將軍于匡要擊岑大破之降其將蘇臣等八千餘人岑遂自武闗走南陽異乃稍誅擊豪傑不從令者褒賞降附有功勞者悉遣其渠帥詣京師散其衆歸本業威行闗中唯吕鮪張邯蔣震遣使降蜀其餘悉平明年公孫述遣將程焉將數萬人就吕鮪出屯陳倉異與右扶風趙匡迎擊大破之焉退走漢川異追戰於箕谷復破吕鮪營保降者甚衆其後蜀復數遣將間出異輙挫之六年朝京師是時諸將上隴為隗囂所敗乃詔異軍栒邑未及至隗囂乘勝使其將王元行廵將二萬餘人下隴因分遣廵取栒邑異即馳兵乘其不意卒擊鼔建旗而出廵軍驚亂奔走追擊數十里大破之征虜將軍祭遵亦破王元於汧於是使異進軍義渠北地縣名并領北地太守事青山胡率萬餘人降異異又擊盧芳將賈覽匈奴薁鞬日逐王破之上郡安定皆降異復領安定太守事九年春祭遵卒詔異守征虜將軍并將其營及隗囂死其將王元周宗等復立囂子純猶摠兵據冀公孫述遣將趙匡等救之帝復令異行天水太守事攻匡等且一年皆斬之岑彭建武二年行大將軍事擊荆州下犨葉等十餘城是時南方尤亂南郡人秦豐據黎邱自稱楚黎王畧十有二縣董訢起堵鄉許邯起杏南陽復陽縣有杏聚又更始諸將各擁兵據南陽諸城彭破杏降訢邯遷征南大將軍三年夏光武自將南征至葉董訢别將數千人遮道車騎不可得前彭奔擊大破之車駕既還令彭率傅俊臧宫劉宏等三萬餘人南擊秦豐㧞黄郵豐與其大將蔡宏拒彭等於鄧數月不得進帝怪以讓彭彭懼於是夜勒兵馬申令軍中使明旦西擊山都乃緩所獲虜令得逃亡歸以告豐豐即悉其軍西邀彭彭乃濳兵渡沔水擊其將張楊於阿頭山大破之從川谷間伐木開道直襲黎邱擊破諸屯兵豐聞大驚馳歸救之彭與諸將依東山為營豐與蔡宏夜攻彭彭豫為之備出兵逆擊之豐敗走追斬蔡宏更封彭為舞隂侯秦豐相趙京舉宜城降拜為成漢將軍與彭共圍豐於黎邱時田戎擁衆夷陵東觀記曰田戎西平人與同郡人陳義客夷陵為羣盜更始元年義戎將兵陷夷陵義自稱黎邱大將軍戎自稱掃地大將軍襄陽耆舊記曰戎號周成王義稱臨江王聞秦豐被圍懼大兵方至欲降而妻兄辛臣諫戎曰今四方豪傑各據郡國雒陽地如掌耳不如按甲以觀其變戎曰以秦王之彊猶為征南所圍豈况吾邪降計决矣四年春戎乃留辛臣守夷陵自將兵沿江泝沔止黎邱刻期日當降而辛臣於後盜戎珍寶從間道先降於彭而以書招戎戎疑必賣已遂不敢降而反與秦豐合彭出兵攻戎數月大破之其大將伍公詣彭降戎亡歸夷陵帝幸黎邱勞軍封彭吏士有功者百餘人彭攻秦豐三歳斬首九萬餘級豐餘兵裁千人又城中食且盡帝以豐轉弱令朱祐代彭守之使彭與𫝊俊南擊田戎大破之遂㧞夷陵追至秭歸戎與數十騎亡入蜀盡獲其妻子士衆數萬人十一年春彭與大司馬呉漢及誅虜將軍劉隆輔威將軍臧宫驍騎將軍劉歆發南陽武陵南郡兵又發桂陽零陵長沙委輸棹卒凡六萬餘人棹卒持棹行船者一作櫂音直教切騎五千匹皆㑹荆門呉漢以三郡棹卒多費糧榖欲罷之彭以為蜀兵盛不可遣上書言狀帝報彭曰大司馬習用歩騎不曉水戰荆門之事一繇征南公為重而已彭乃令軍中募攻浮橋先登者上賞於是偏將軍魯竒應募而前時天風狂急彭竒船逆流而上直衝浮橋而攢柱鉤不得去竒等乘勢殊死戰因飛炬焚之風怒火盛橋樓摧燒彭復悉軍順風並進所向無前蜀兵大亂溺死者數千人斬任滿生獲程汎而田戎亡保江州彭上劉隆為南郡太守自率臧宫劉歆長驅入江闗令軍中無得虜掠所過百姓皆奉牛酒迎勞彭見諸耆老為言大漢哀愍巴蜀久見虜役故興師逺伐以討有罪為人除害讓不受其牛酒百姓皆大悦爭開門降詔彭守益州牧所下郡輙行太守事彭到江州以田戎食多難卒抜留馮駿守之自引兵乘利直指墊江攻破平曲收其米數十萬石公孫述使其將延岑吕鮪王元及其弟恢悉兵拒廣漢及資中又遣將侯丹率二萬餘人拒黄石彭乃多張疑兵使䕶軍楊翕與臧宫拒延岑等自分兵浮江下還江州泝都江而上襲擊侯丹大破之因晨夜倍道兼行二千餘里徑拔武陽使精騎馳廣都去成都數十里勢若風雨所至皆奔散賈復建武元年以執金吾先渡河攻更始將朱鮪於雒陽與白虎公陳僑戰連破降之二年與騎都尉隂識驍騎將軍劉植南度五社津擊更始郾王尹尊連破之月餘尊降盡定其地引東擊更始淮陽太守暴汜汜降屬郡悉定其秋南擊召陵新息平定之明年春遷左將軍别擊赤眉於新城澠池間連破之呉漢為大司馬以建武二年率大司空王梁建義大將軍朱祐大將軍杜茂執金吾賈復揚化將軍堅鐔偏將軍王霸騎都尉劉隆馬武隂識共擊檀鄉賊於鄴東漳水上大破之降者十餘萬人復率諸將擊鄴西山賊黎伯卿等及河内脩武悉破諸屯聚復進兵南陽擊宛湼陽酈穰新野諸城皆下之引兵南與秦豐戰黄郵水上破之又與偏將軍馮異擊昌城五樓賊張文等又攻銅馬五幡於新安皆破之明年春率建威大將軍耿弇虎牙大將軍蓋延擊青犢於軹西大破降之明年又率陳俊及前將軍王梁擊五校賊於臨平追至東郡箕山大破之北擊清河長直及平原五里賊皆平之長直一作長植在河南不得言北擊當是賊號或地名也時鬲縣五姓共逐守長據城而反鬲音革縣名屬平原郡五姓蓋當土彊宗豪右也漢大破其衆因追討餘黨至無鹽縣名屬東平進擊勃海皆平之又從征董憲圍胊城明年春抜胊斬憲東方悉定十一年春率征南大將軍岑彭等伐公孫述及彭破荆門長驅入江闗漢留夷陵裝露橈船橈短楫也音人連切將南陽兵及弛刑募士三萬人泝江而上㑹岑彭為刺客所殺漢并將其軍十二年春與公孫述將魏黨公孫永戰於魚涪津大破之十五年復率揚武將軍馬成捕虜將軍馬武北擊匈奴徙鴈門代郡上谷吏人六萬餘口置居庸常闗以東十八年蜀郡守將史歆反於成都自稱大司馬攻太守張穆穆踰城走廣都歆遂移檄郡縣而宕渠楊偉胊䏰徐容等起兵各數千人以應之帝以歆昔為岑彭䕶軍曉習兵事故遣漢率劉尚及大中大夫臧宫將萬餘人討之漢入武都乃發廣漢巴蜀三郡兵圍成都百餘日城破誅歆等漢乃乘桴沿江下巴郡楊偉徐容等惶恐解散漢誅其渠帥二百餘人徙其黨與數百家於南郡而還蓋延建武二年以虎牙將軍南擊敖倉轉攻酸棗封丘皆抜其夏督駙馬都尉馬武騎都尉劉隆䕶軍都尉馬成偏將軍王霸等南伐劉永先攻抜襄邑進取麻鄉縣名故城在今碭山縣東北遂圍劉永於淮陽數月盡收野麥夜梯其城入永驚懼引兵走出東門延追擊大破之永棄軍走譙延進攻抜薛斬其魯郡太守而彭城扶陽杼秋蕭皆降又破永沛郡太守斬之永將蘇茂佼彊周建等三萬餘人共攻延延與戰於沛西大破之永軍亂遁沒溺死者大半永棄城走湖陵蘇茂奔廣樂延遂定沛楚臨淮三年睢陽復反城迎劉永延復率諸將圍之百日收其野榖永乏食突走延追擊盡得輜重永為其將所殺永弟防舉城降四年春延又擊蘇茂周建於蘄進與董憲戰留下皆破之因率平敵將軍龎萌攻西防拔之復追敗周建蘇茂於彭城茂建亡奔後從征董憲於昌慮皆破平之六年春遣屯長安九年隗囂死延西擊街泉略陽清水諸屯聚皆定陳俊建武五年以琅邪太守行大將軍事將兵擊董憲於贛榆贛榆縣名屬東海郡贛音貢進破朐賊孫陽平之八年張歩畔還琅邪俊追討斬之帝美其功詔俊得專征青徐臧宫為騎都尉建武二年將突騎與征虜將軍祭遵擊更始將左防韋顔於沮陽韋一作韓酈悉降之三年將兵徇江夏擊代鄉鍾武竹里皆下之光武使大中大夫持節拜宫為輔威將軍七年擊梁郡濟隂皆平之十一年與諸將伐公孫述軍至平陽鄉蜀將王元舉衆降進抜緜竹破涪城斬公孫述弟恢復攻繁郫前後收得節五印綬千八百是時大司馬呉漢亦乘勝進營逼成都宫連屠大城兵馬旌旗甚盛乃乘兵入小雒郭門歴成都城下至呉漢營飲酒髙㑹漢見之甚歡謂宫曰將軍向者經虜城下震揚威靈風行電炤然窮寇難量還營願從他道矣宫不從復路而歸賊亦不敢近之進軍咸門與呉漢並滅公孫述冊府元龜卷三百四十八
