body:
  text: 册府元龜卷九百十九宋王欽若等撰總録部讐怨夫厲階之成怨府之結本乎心術之寡恕血氣之方剛違和同之理搆仇讐之漸不在於大遂為於禍胎失之於㣲乃開於釁隙故有因機乗便發忿吐懣或倐起而圜視或中隱而嘻笑間不容髮以肆其志大則致難宗國流毒於民庶小亦隂畫計䇿圖害於厥軀原夫違言有初交惡斯作事非能以理遣勢不可以兩全快心内興怒氣外洩思以雪乎大恥亦安事於貪生乃復不顧軀命輕用兵力茍圖快意罔念後艱固與夫犯而不校以德報怨者異矣若夫戴天之憾枕戈是期反兵同國存諸典訓斯不可以忽也鄭子駟與尉止有争將禦諸侯之師而黜其車禦牛首師也黜減損尉止獲又與之爭獲囚俘子駟抑尉止曰爾車非禮也言女車猶多過制遂弗使獻不使獻所獲初子駟為田洫司氏堵氏侯氏子師氏皆喪田焉洫田畔溝也子駟為田洫以正封疆而侵四族田故五族聚羣不逞之人因公子之徒以作亂於是子駟當國攝君事也子國為司馬子耳為司空子孔為司徒魯襄公十年十月尉止司臣侯晉堵女父子師僕帥賊以入晨攻執政於西宮之朝公宮殺子駟子國子耳刼鄭伯以如北宮子孔知之故不死子孔公子嘉也知難不告利得其處也楚太子建之子勝在於吳吳王夫差之時楚惠王欲召勝歸楚葉公諫曰勝好勇而隂求死士殆有私乎惠王不聽遂召勝使居楚之邊邑鄢潁川鄢陵是號為白公汝南褒信縣有白亭白公歸楚三年而吳誅子胥白公勝旣歸楚怨鄭之殺其父乃隂養死士求報鄭歸楚五年請伐鄭楚令尹子西許之兵未發而晉伐鄭鄭請救於楚楚使子西徃救與盟而還白公勝怒曰非鄭之仇乃子西也勝自厲劍人問曰何以為勝曰欲以殺子西子西聞之笑曰勝如卵爾何能為也其後四嵗白公勝與石乞襲殺楚令尹子西武城人或有因於吳竟田焉僑田吳界拘鄫人之漚菅者曰何故使吾水滋鄫人亦僑田吳滋濁也及吳伐魯道從武城吳師至拘者道之以伐武城克之鄫人教吳必可克衛莊公登城以望見戎州戎州戎邑問之以告公曰我姬姓也何戎之有焉言姬姓國何故冇戎邑翦之削去其邑聚公使匠久久不休息公欲逐石圃石圃衛卿石惡從子未及而難作石圃因匠氏攻公公閉門而請弗許踰于北方而隊折股戎州人攻之太子疾公子青踰從公青疾弟戎州人殺之公入于戎州已氏己氏戎人姓初公自城上見已氏之妻髮美使髠之以為呂姜髢吕姜莊公夫人髢髲也旣入焉而示之璧曰活我吾與汝璧已氏曰殺女璧其焉徃遂殺之而取其璧皇瑗宋右師瑗之子麋有友曰田丙而奪其兄酁般邑以與之酁般愠而行告桓司馬之臣子儀克克在下邑不與魋之亂故在子儀克適宋告夫人曰麋將納桓氏公問諸子仲子仲皇野初子仲將以杞姒之子非我為子為適子杞姒子仲妻麋曰必立伯也伯非我兄是良材子仲怒弗從故對曰右師則老矣不識麋也言右師老不能為亂麋則不可知公執之執麋皇瑗奔晉召之召令還智伯晉大夫智伯伐鄭趙簡子疾使太子母䘏將而圍鄭智伯醉以酒灌擊母䘏羣臣請死之母䘏曰君所置母䘏為能忍詬然亦愠智伯智伯歸因謂簡子使廢母䘏簡子不聽母䘏繇此怨智伯簡子卒母䘏立是為襄子襄子立四年智伯與趙韓魏盡分其范中行故地智伯益驕請地韓魏韓魏與之請地趙趙不與以其圍鄭之辱智伯怒遂率韓魏攻趙趙襄子懼乃奔保晉陽後趙襄子與韓魏合謀滅智伯并滅智伯之後而三分其地趙襄子最怨智伯漆其頭以為酒器范睢者魏人也字叔游説諸侯欲事魏王家貧無以自資乃先事魏中大夫須賈須賈為魏昭王使於齊范睢從留數月未得報齊襄王聞睢辯口乃使人賜睢金一斤及牛酒睢辭謝不敢受須賈知之大怒以為睢持魏國隂事告齊故得此饋令睢受其牛酒還其金旣歸心怒睢以告魏相魏相魏之諸公子曰魏齊魏齊大怒使舍人笞擊睢折脅摺齒睢佯死即卷以簀置厠中賓客飲者醉更溺睢故僇辱以懲後令無妄言者睢從簀中謂守者曰公能出我我必厚謝公守者乃請出棄簀中死人魏齊醉曰可矣睢得出旣相秦秦號曰張禄而魏不知以為范睢已死久矣魏聞秦且東伐韓魏魏使須賈於秦范睢聞之為㣲行敝衣間步之邸見須賈須賈見之而驚曰范叔固無恙乎范睢曰然須賈笑曰范叔有説於秦邪曰不也睢前日得過於魏相故亡逃至此安敢説乎須賈曰今叔何事范睢曰臣為人傭賃須賈意哀之留與坐飲食曰范叔一寒如此哉乃取其一綈袍以賜之須賈因問曰秦相張君公知之乎今聞幸於王天下之事皆决於相君今吾事之去留在張君孺子豈有客習於相君者哉范睢曰主人翁習知之唯睢亦得謁睢請為君見於張君須賈曰吾馬病車軸折非大車駟馬吾不出范睢曰願為君借大車駟馬於主人翁范睢歸取大車駟馬為須賈御之入秦相府府中望見有識者皆避匿須賈怪之至相舍門謂須賈曰待我我為君先入通於相君須賈待門下持車良久問門下曰范叔不出何也門下曰無范叔須賈曰鄉者與我載而入者門下曰乃吾相張君也須賈大驚自知見賣乃肉袒膝行因門下人謝罪於是范睢盛帷帳侍者甚衆見之須賈頓首言死罪曰賈不意君能自致於青雲之上賈不敢復讀天下之書不敢復與天下之事賈有湯鑊之罪請自屏於胡貉之地唯君死生之范睢曰汝罪有幾曰擢賈之髮以續賈之罪尚未足范睢曰汝罪有三爾昔者楚昭王時而申包胥為楚郤吳軍楚王封之以荆五千户包胥辭不受為丘墓之寄於荆也今睢之先人丘墓亦在魏公前以睢為有外心於齊而惡睢於魏齊公之罪一也當魏齊辱我於厠中公不止罪二也更醉而溺我公其何忍乎罪三也然公之所以得無死者以綈袍戀戀有故人之意故釋公乃謝罷人言之昭王罷歸須賈須賈辭於范睢范睢大供具盡請諸侯使與坐堂上飲食甚設而坐須賈於堂下置莝豆其前令兩黥徒夾而馬食之數曰為我告魏王急持魏齊頭来不然者我且屠大梁須賈歸以告魏齊魏齊恐亡走趙匿平原君所秦昭王聞魏齊在平原君所欲為范睢必報其仇乃佯為好書遺平原君曰寡人聞君之髙義願與君為布衣之交君幸過寡人寡人願與君為十日之飲平原君畏秦且以為然而入秦見昭王昭王與平原君飲數日昭王謂平原君曰昔周文王得呂尚以為太公齊桓公得管夷吾以為仲父今范君亦寡人之叔父也范君之讐在君之家願使人歸取其頭来不然吾不出君於關平原君曰貴而為友者為賤也富而為交者為貧也夫魏齊者勝之友也在固不出也今又不在臣所昭王乃遺趙王書曰王之弟在秦范君之讐魏齊在平原君之家王使人疾持其頭来不然吾舉兵而伐趙又不出王之弟於關趙孝成王乃發卒圍平原君家急魏齊夜亡出見趙相虞卿虞卿度趙王終不可説乃解其相印與魏齊亡間行念諸侯莫可以急抵者乃復走梁欲因信陵君以走楚信陵君聞之畏秦猶豫未肯見曰虞卿何如人也時侯嬴在旁曰人固未易知知人亦未易也夫虞卿躡屫擔簦一見趙王賜白璧一雙黄金百鎰再見拜為上卿三見卒受相印封萬户侯當此之時天下爭知之夫魏齊窮困過虞卿虞卿不敢重爵禄之尊解相印捐萬户侯而間行急士之窮而歸公子公子曰何如人人固不易知知人亦未易也信陵君大慙駕如野迎之魏齊聞信陵君之初難見之怒而自剄趙王聞之卒取其頭予秦秦昭王乃出平原君歸趙張儀者魏人也呂氏春秋曰儀魏氏餘子始嘗與蘇秦俱事鬼谷先生學術蘇秦自以不及張儀張儀已學而游説諸侯嘗從楚相飲已而楚相亡璧門下意張儀曰貧而無行必此人盗相君之璧共執張儀掠笞數百不服醳音釋之其妻曰嘻子母讀書游説安得此辱乎張儀謂其妻曰視吾舌尚在不其妻笑曰舌在也儀曰足矣儀旣相秦為文檄一作咫尺之檄告楚相曰始吾從若飲我不盗而璧若笞我若善守汝國我顧且盜而城孫臏齊人與龎涓俱學兵法龎涓為魏將自以為能不及孫子疾之以法刑斷其兩足齊將田忌進孫子於威王以田忌為將而孫子為師魏與趙攻韓韓告急於齊齊使田忌將而徃直走大梁魏將龎涓聞之去韓而歸齊軍旣已過而西矣孫子謂田忌曰彼三晉之兵素悍勇而輕齊齊號為怯善戰者因其勢而利導之兵法百里而趣利者蹶上將蹶猶挫也五十里而趣利者軍半至使齊軍入魏地為十萬竈明日為五萬竈又明日為二萬竈龎涓行三日大喜曰我固知齊軍怯入吾地三日士卒亡者過半矣乃棄其步軍與其輕鋭倍日幷行逐之孫子度其行暮當至馬陵馬陵道狹而旁多阻隘可伏兵乃砍大樹白而書之曰龎涓死此樹下於是令齊軍善射者萬弩夾道而伏期日暮見火舉而俱發龎涓果夜至斫樹下見白書乃鑽火燭之讀其書未畢齊軍萬弩俱發魏軍大亂相失龎涓自知智窮兵敗乃自刎曰遂成𥪡子之名齊因乗勝盡破其軍虜魏太子申以歸孫臏以此名顯天下漢張耳大梁人與陳餘為刎頸交其後有隙耳為常山王餘為代王相趙襲常山耳敗走髙祖二年東擊楚使告趙欲與俱餘曰漢殺張耳乃從於是漢求人類耳者斬其頭遺餘餘乃遣兵助漢漢敗於彭城西餘亦聞耳詐死即背漢漢遣耳與韓信擊破趙井陘斬餘泜水上袁盎為吳相告歸盎素不好晁錯錯所居坐盎輒避盎所居坐錯亦避兩人未嘗同堂語及孝景即位晁錯為御史大夫使吏案盎受吳王財物抵罪詔赦以為庶人吳楚反聞聞聞於天子錯謂丞史曰百官表御史大夫有兩丞丞史丞及史也袁盎多受吳王金錢專為蔽匿言不反欲請治盎宜知其計謀丞史曰事未發治之有絶事未發之時治之乃有所絶也今兵西向治之何益且盎不宜有謀盎大臣不宜有奸謀錯猶與未决與讀曰豫人有告盎盎恐夜見竇嬰為言吳楚所以反願至前口對狀至天子之前也嬰入言帝乃召盎盎入見帝方與錯調兵食調謂討發之也音徒釣切帝問盎曰君嘗為吳相知吳臣田祿伯為人乎今吳楚反於公意何如對曰不足憂也今破矣帝曰吳王即山鑄錢煮海為鹽即就也誘天下豪傑白頭舉事此其計不百全肯發乎何以言其無能為也盎對曰吳銅鹽之利則有之安得豪傑而誘之誠令吳得豪傑亦且輔而為誼不反矣吳所誘皆亡賴子弟亡命鑄錢姦人故相誘以亂錯曰盎䇿之善帝問曰計安出盎對曰願屏左右帝屏人獨錯在盎曰臣所言人臣不得知乃屏錯錯趨避東廂甚恨帝卒問盎卒竟也對曰吳楚相遺書言髙皇帝王子弟各有分地分音扶問切今賊臣晁錯擅適諸侯削奪之地適讀曰謫以故反名為西共誅錯復故地而罷方今計獨有斬錯發使赦吳楚七國復其故地則兵可無血刃而俱罷於是帝黙然良久曰顧誠何如吾不愛一人以謝天下顧念也誠實也盎曰愚計出此惟帝熟計之乃拜盎為太常宻裝治行後十餘日斬錯張湯為御史大夫七歳敗河東人李文故嘗與湯有隙已而為御史中丞薦數從中文事有可以傷湯者不能為地薦數也數數在中其有文書事可用傷湯者不為作道地也湯有所愛史魯謁居知湯弗平使人上飛變告文姦事飛變猶言急變也事下湯湯治論殺文李敢廣子也為郎中令怨大將軍衛青之恨其父令其父恨而死也乃擊傷大將軍大將軍匿諱之居無何敢從上雍至甘泉宫獵無何謂未多時也雍之所在地形積高故云上也上音時掌切驃騎將軍霍去病怨敢傷青射殺敢去病時方貴幸帝為諱云鹿觸殺之薛宣罷相就第久之哀帝初即位博士申咸給事中亦東海人也毁宣不供養行喪服薄於骨肉前以不忠孝免不宜復列封侯在朝省宣子况為右曹侍郎數聞其語賕客楊明欲令創咸面目使不居位創謂傷之也音初良切其下並同㑹司𨽻缺况恐咸為之遂令明遮斫咸宮門外斷鼻脣身八創事下有司况徙敦煌宣坐免為庶人後漢班固嘗為大將軍竇憲中護軍雒陽令种兢嘗行固奴干其車騎吏推呼之奴醉罵兢大怒畏憲不敢發心銜之及竇氏賓客皆逮考兢因此捕繫固遂死獄中時年六十一詔以譴責兢抵主者吏罪周黨少孤至長安游學初鄉佐嘗衆中辱黨黨久懐之後讀春秋聞復讐之義便輟講而還與鄉佐相聞期尅鬬日旣交刃而黨為鄉佐所傷困頓鄉佐服其義與歸養之數日方蘇旣悟而去自此勅身修志州里稱其髙郎顗北海人明經典隠居海畔延致學徒晝研精義夜占象度勤心鋭思朝夕無倦州郡辟召舉有道方正不就同郡孫禮者積惡兇暴好游俠與其同里人嘗慕顗名德欲與親善顗不顧以此結怨遂為所殺杜喬為大司農益州刺史种暠舉劾永昌太守劉君世以金蛇遺梁冀事發覺以蛇輸司農冀從喬借觀之喬不肯與冀始為恨累遷大鴻臚時冀小女死令公卿㑹喪喬獨不徃冀又銜之遷光祿勲代胡廣為太尉桓帝納冀妹冀欲令以厚禮迎之喬據執舊典不聽又冀屬喬舉汜宮為尚書喬以宮贓罪明著遂不肯用因此日忤於冀及清河王蒜事起冀遂諷有司劾喬及李固與劉鮪等交通請逮案罪而梁太后素知喬忠但䇿免而已冀愈怒使人脅喬曰早從宜妻子可得全從宜令其自盡也喬不肯明日冀遣騎至其門不聞泣者遂白執繫之死獄中妻子歸故鄉與李固俱暴屍於城北呂布初與董卓誓為父子常在左右而卓性褊忿毎小失意拔手㦸擲之布拳捷避之得免繇是隂怨卓卓又嘗使布守中閣布與卓侍婢私通恐事發覺心不安先是司徒王允以布州里壯健厚接納之後布詣允陳卓幾見殺狀時允與僕射士孫瑞密謀誅卓是以告布使為内應布曰奈如父子何允曰君自姓呂本非骨肉今憂死不暇何謂父子布遂許之手刃刺卓允以布為奮威將軍假節儀比三司進封温侯共秉朝政布自殺卓後畏惡涼州人凉州人皆怨繇是李傕等遂相結還攻長安城布不能拒李傕等遂入長安卓死後六旬布亦敗牛輔董卓女婿恇怯失守不能自安見客先筮知吉凶然後見之中郎將董越来就輔輔使筮之得兑下離上筮者曰火勝金外謀内之卦也即時殺越獻帝記云筮人嘗為越所鞭故因此以報之王叡先與孫堅共擊零桂賊以堅武官言頗輕之及叡舉兵欲討董卓素與武陵太守曹寅不相能揚言當先殺寅寅懼詐作案行使者光禄大夫温毅檄移堅説叡罪過令收行刑訖以狀上堅即承檄勒兵襲叡叡聞兵至登樓望之遣問欲何為堅前部答曰兵久戰勞苦所得賞不足以為衣服詣使君更乞資值爾叡曰刺史豈有所吝便開庫藏使自入視之知有所遺不兵進及樓下叡見堅驚曰兵自求賞孫府君何以在其中堅曰被使者檄誅君叡曰我何罪堅曰坐無所知叡窮迫刮金飲之而死吳凌統怨甘寧殺其父操寧常備統不與相見大帝亦命統不得讐之嘗於呂蒙舍㑹酒酣統乃以刀舞寧起曰寧能雙㦸舞蒙曰寧雖能未若蒙之巧也因操刀持楯以身分之後帝知統意因令寧將兵遂徙屯於半州晉衛瓘為司空時帳下督榮晦有罪瓘斥遣之及難作隨兵討瓘故子孫皆及於禍太保主簿劉繇等撾登聞皷上言曰瓘前在司空時帳下給使榮晦無情被黜晦知瓘家人數子孫名字晦後轉給右軍其夜晦在門外揚聲大呼宣詔免公還第及開門晦前到中門復讀所齎偽詔手取公章綬貂蟬催公出第晦案次録瓘家口及其子孫皆兵仗將送著東亭道北圍守一息間便皆斬斫害公子孫實繇於晦及將人刼盜府庫皆晦所為考晦一人衆姦皆出乞騐盡情偽加以族誅詔從之鄭黙為光祿勲太康元年卒尚書令衛瓘奏黙才行名望宜居論道五升九卿位未稱德宜贈三司而后父楊駿先欲以女妻黙子豫黙曰吾毎讀雋不疑傳嘗想其人畏逺權貴弈世所守遂辭之駿深為恨至此駿議不同遂不施行潘岳為琅邪内史孫秀為小吏給岳而狡黠自喜岳惡其為人數撻辱之秀嘗銜忿及趙王倫輔政秀為中書令岳於省内謂秀曰孫令猶憶疇昔周旋不答曰中心藏之何日忘之岳於是自知不免俄而秀遂誣岳及石崇歐陽建謀奉淮南王允齊王冏為亂誅之夷三族向雄河内人仕郡為主簿太守劉毅嘗以非罪笞雄及吳奮代毅為太守又以少譴繫雄於獄後累遷黄門侍郎時吳奮劉毅俱為侍中同在門下雄初不交言武帝聞之勅雄令復君臣之好雄不得已乃詣毅再拜曰向被詔命君臣義絶如何於是即去帝聞而大怒問雄曰我令卿復君臣之好何以故絶雄曰古之君子進人以禮退人以義今之進人若加諸膝退人若墜諸川劉河内於臣不為戎首亦已幸甚安復為君臣之好帝從之郄詵字廣基其鄉人卞峻清貞有檢識以名理著稱詵恃才凌傲峻兄弟峻等亦以門盛輕詵相視如讐詵以楊駿故吏被繫峻時為尚書郎按其獄詵懼不免峻平心斷决正之詵卒以免而猶不悛後為左丞復奏陷卞氏皇甫重為秦州刺史齊王冏輔政以重弟商為參軍冏誅長沙王乂又以為參軍時河間王顒鎮關中其將李含先與商重有隙毎銜之及此説顒曰商為乂所任重終不為人用宜急除之以去一方之患可表遷重為内職因其經長安乃執之賈疋為安定太守雍州刺史丁綽貪横失百姓心乃譖疋於南陽王模以軍司謝班代之疋奔瀘水與胡彭蕩仲及氐竇首結為兄弟聚衆攻班綽奔武都疋復入安定殺班解結與兄系齊名為御史中丞時孫秀亂關中結在都坐議秀罪應誅秀繇是致恨及系被害結亦同戮華譚字令思陳敏之亂吳士多為其所逼顧榮先受敏官而潛謀圖之譚不悟榮㫖露檄逺近極言其非繇此為榮所怨譚後為紀瞻所薦而為榮所止遏遂數年不得調後譚為秘書監戴若思弟邈則譚女壻也譚平生時常抑若思而進邈若思每銜之及用事嘗毁譚於帝繇是官塗不至束晳與兄璆俱知名還鄉里察孝廉舉茂才皆不就璆娶石鑒從女棄之鑒以為憾諷州郡公府不得辟故晳等久不得調王澄為荆州刺史以郭舒為别駕舒少與杜曾厚曾嘗召之不徃曾銜之至是澄又轉舒為順陽太守曾宻遣兵襲舒遁逃得免蘇峻為厯陽内史庾亮輔政欲徵之峻遣司馬何仍詣亮辭以内輔非所堪亮不從遂徵為散騎常侍峻又表乞補一荒郡復不許遂舉兵為亂峻旣敗死司馬任讓等共立峻弟逸為主峻子碩乃發亮父母墓剖棺焚屍王珣兄弟皆謝氏壻以猜疑致隙太傅安旣與珣絶婚又離珉妻繇是二族遂成讐釁時希安㫖乃出珣為豫章太守毛安之四子潭泰邃遁潭嗣爵官至江夏相泰厯太傅從事中郎後軍諮議㕘軍與邃俱為㑹稽王父子所昵乃追論安之討盧悚勲賜爵平都子命潭襲爵元顯嘗宴泰家旣而欲去泰苦留之曰公若遂去當取公脚元顯大怒奮衣而出遂與元顯有隙及元顯敗泰時為冠軍將軍堂邑大山二郡太守邃為遊擊將軍遁為太傅主簿桓𤣥得志使泰收𤣥顯送于新亭泰因宿恨手加毆辱俄並為𤣥所殺惟遁被徙廣州髙瞻渤海蓨人隨崔毖伐慕容廆毖敗降于廆廆署將軍辭疾不就瞻與宋該有隙該隂勸廆除之瞻聞其言彌不自安遂以憂死劉毅少為劉敬宣寧朔㕘軍時人或以雄傑許之敬宣曰人有非常之才當别有調度豈得便謂此君為人豪邪其性外寛而内忌自伐而尚人若一旦遭逢亦當以陵上取禍爾毅聞之深以為恨及在江陵知敬宣還乃使人言於髙祖曰劉敬宣父子忠國旣昧今又不豫義始猛將勞臣方須叙報如敬宣之比宜令在後若使君不忘平生欲相申起者論資語事正可為員外常侍耳聞已授其郡實為優遇尋知復為江州尤所駭惋敬宣愈不自安帝反正自表解職後敬宣伐蜀無功而還毅欲以重法繩之髙祖旣相任待又何無忌明言於毅謂不宜以私憾傷至公若必文致為戮已當入朝以廷議决之毅雖止猶謂髙祖曰夫生平之舊豈可孤信光武悔之於龎萌曹公失之於孟卓公宜深慮之毅出為荆州謂敬宣曰吾忝西任欲屈卿為長史南蠻豈有見輔意乎敬宣懼禍及以告髙祖髙祖笑曰但令老兄平安必無過慮出為使持節督北青州郡軍事征虜將軍册府元龜卷九百十九
