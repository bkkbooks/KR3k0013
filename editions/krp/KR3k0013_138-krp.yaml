body:
  text: 册府元龜卷一百三十八宋王欽若等撰帝王部旌表第二西魏武帝永熈中以故殷州刺史鄭楷兄弟父子並死王事朝野傷歎特贈侍中都督冀定湘三州諸軍事驃騎大將軍儀同三司冀州刺史倉䟦滎陽京縣人也䘮母水漿不入口五日吐血數升居憂毁瘠見稱州里有司奏聞帝詔標門閭楊𢎞鄉郡㐮垣人也三嵗䘮父為叔所飬母年九十三𢎞年七十五哀毁過禮三年服畢恨不識父追服斬衰食粥麤服誓終身命經十三年哀慕不改為郡縣鄉閭三百餘人上状稱美有司奏宜旌賞復其一門樹其純孝詔别勑集書標楊𢎞至行又可假以散員之名也自𢎞以下十人史不載年月令附於本朝之末郭文恭太原平遥人為太平縣令年踰七十父母䘮亡文恭孝慕罔極乃居祖父墓次晨夕拜跪跣足負土培祖父二墓寒暑竭力積年不已見者莫不哀歎尚書聞奏標其門閭董雒生居父䘮過禮詔遣秘書中散温紹伯奉璽書慰之令自抑割以全孝道又詔其宗親使相喻奨勿令有㓕性之譏王崇字乾邕陽夏雍丘人也兄弟並以孝聞身勤稼穡以飬二親仕梁州鎮南府主簿母亡扶而後起鬢髪墮落未及將葬權殯宅西崇廬於殯所晝夜哭泣鳩鴿羣至一小鳥素質黒眸形大如雀栖於崇廬朝夕不去母䘮始闋復丁父憂哀毁過禮是年夏風雹所經處禽獸暴死草木摧折至崇田畔風雹便止禾麥十頃竟無損落及過崇地風雹如初咸稱至行所感崇雖除服仍居墓側於其室前生草一根莖葉甚茂人莫能識至冬中復有鳥巢崇屋乳飬三子毛羽成長馴而不驚守令聞之親自臨視州以聞奏標其門閭張昇滎陽人居父母䘮鬢髪墜落水漿不入口吐血數升詔表門閭王閭北海宻人也數世同居有百口又泰山劉業興四世同居魯郡蓋雋六世同居並其財産家門雍睦鄉里敬異有司申奏皆標門閭張安祖河陽人也襲世爵山北侯時有元承貴曽為河陽令家貧且赴尚書求選逢天寒甚凍死路側一子年㓜停屍門巷棺歛無托安祖悲哭盡禮買木為棺手自營作歛殯周給朝野嘉歎尚書聞奏標其門閭馬八龍武邑武强人也輕財重義友人武遂縣尹靈哲在軍䘮亡八龍聞即奔赴負屍而歸以家財殯葬為制緦服撫其遺孤恩如所生州郡表列詔標門閭李几博陵安平人也七世共居同財家有二十二房一百九十八口長㓜濟濟風禮著聞至於作役卑㓜競進鄉里嘆美標其門閭邵洪哲上谷沮陽人也縣令范道榮先自朐城歸欵已除縣令道榮鄉人徐孔明妄經公府訟道榮非勲道榮坐除名覊旅孤貧不能自理洪哲不勝義憤遂代道榮詣京師明申曲直經歴寒暑不憚劬勞道榮卒得復雪又北鎮反亂道榮孤單無所歸附洪哲兄伯川復率鄉人來相迎接送逹幽州道榮感其誠節訴省申聞詔下州郡標其里閭後周太祖時荆可河東猗氏人䘮母悲號擗踊絶而復蘇者數四廬於墓側負土成墳鄉人以可孝行之至足以勸勵風俗乃上言焉帝令州縣表異之竇榮定文帝欲以為三公榮定上書固辭陳畏懼之道帝乃止前後賞賜不可勝計及卒帝為廢朝令左衛大將軍元旻監䕶䘮事賻絹三千疋上謂侍臣曰吾毎欲致榮定於三事其人固譲不可今欲贈之重違其志於是贈冀州刺史陳國公諡曰懿令狐虬早以名徳著聞仕歴𤓰州司馬墩煌郡守郢州刺史西魏文帝大統末卒於家帝傷悼之遣使者監䕶䘮事又勅鄉人為營墳壟贈龍驤將軍𤓰州刺史武帝初河東安邑人紆回性至孝武成中父母䘮廬於墓側負土成墳廬前生麻一株髙丈許圍之合拱枝葉鬰茂冬夏常青烏棲其上回舉聲哭烏即悲鳴時人異之帝表其閭擢授甘棠令慕容三蔵為右衛將軍周師入鄴齊後主失守東遁委三蔵等留守鄴宫齊之王公以下皆降三蔵猶率麾下抗拒周師及齊平帝引見禮甚厚詔曰三蔵父子誠節久聞宜加榮秩授開府儀同大將軍建徳元年晉公䕶誅詔曰故使持節柱國大將軍大都督陽平郡開國公李逺早蒙驅任夙著勲績内參帷幄外屬藩維竭誠王室乃罹横禍言念貞良追増傷悼宜加榮寵用彰忠節贈本官加陜州等十五州諸軍事陜州刺史諡曰忠逺初為晉公䕶所害也六年詔曰偽齊之末奸佞擅權濫罪淫刑動挂羅綱偽右丞相咸陽王故斛律明月偽侍中特進開府故崔季舒等七人或功髙獲罪或直言見誅朕兵以義動剪除凶暴表閭封墓事切下車宜追贈諡并加其見在子孫各隨䕃叙録家口田宅沒官者並還之秦族性至孝母沒哭泣無時唯飲水食菜而已終䘮之後猶蔬食不入室房二十許年鄉里咸歎異之其邑人王元逹等七十餘人上状有詔表其門閭張元字孝始祖父成沒元號踴絶而復蘇後其父延雋卒水漿不入口三日鄉里歎異之縣博士楊軌等二百餘人上其狀有詔表其門閭皇甫遐河東汾隂人遭母䘮廬於墓側負土為墳郡縣表上其狀有詔旌異之隋文帝開皇初詔曰昔漢髙欽無忌之義魏武挹子幹之風前代名賢後王斯重魏故度支尚書美陽伯蘇綽文雅政事遺跡可稱展力前王垂聲著績宜開土宇用旌善人於是追封邳國公邑三千户宇文孝伯以忠諌為周宣帝所殺及帝踐極以孝伯及王軌忠而獲罪並令收葬復其官爵又嘗謂髙熲曰宇文孝伯實有周之良臣若使此人在朝我軰無措手處也紆士雄回之子也少質直孝友父䘮廬於墓側負土成墳其庭前有一槐樹先甚欝茂及士雄居䘮樹遂枯死服闋還宅死槐復榮帝聞之歎其父子至孝詔書褒揚號其所居為累徳里郎方貴淮南人也少有志尚與從父弟䨇貴同居開皇中方貴嘗因行出遇雨淮水汎長於津所寄渡舩人怒之檛方貴臂折至家其弟䨇貴驚問所繇方貴具言之䨇貴恚遂向津毆擊舩人致死守津者執送之縣官案問其状以方貴為首當死䨇貴從坐當流兄弟二人爭為坐首縣司不能斷送詣州兄弟各引咎州不能定二人爭欲赴水而死州状以聞而異之特原其罪表其門閭賜物百叚田徳懋觀國公仁恭之子也少以孝友著名開皇初以父軍功賜爵平原郡公授太子千牛備身丁父艱哀毁骨立廬於墓側負土成墳髙祖聞而嘉之遣員外散騎侍郎元志就弔焉復降璽書曰皇帝謝田徳懋知在窮疾哀毁過禮倚廬墓所負土成墳朕孝理天下思𢎞名教復以爾通家情義素重有聞孝感嘉歎兼深春日暄和氣力何似宜自抑割以禮自存也兼賜縑二百疋米百石後下詔表其門閭杜猷為濟隂太守開皇三年死王事詔曰行仁蹈義名教所先厲俗敦風宜見褒奨徃者山東河表經此叛亂孤城逺守多不自全濟隂太守杜猷身䧟賊徒命懸冦手郡省事范臺玫傾産營䕶免其戮辱眷言誠節實有可嘉宜超常賞用明激勸臺玫可大都督假湘州刺史薛濬開皇中為考功侍郎丁母艱不勝䘮病卒有司以聞帝為之屑涕降使齎册書弔祭曰皇帝咨故考功侍郎薛濬於戯惟爾操履貞和器業詳敏允膺列宿勤蹇克彰及遘私艱奄從毁㓕嘉爾誠孝感於朕懐奠酹有加抑惟朝典故遣使人指申徃命魂而有靈歆兹榮渥嗚呼哀哉楊慶字伯悦年二十五郡察孝亷以侍飬不行其母有疾不觧襟帶者七旬及居憂哀毁骨立負土成墳齊世表其門閭賜帛三十疋綿十屯粟五十石髙祖開皇中屢加褒賞郭儔字引文太原文水人也家閭雍睦七葉共居犬豕同乳鳥鵲通巢時人以為義感之應州縣上其事髙祖遣平昌公宇文弢詣其家勞問之侍書御史桞彧廵省河北表其門閭劉方為驩州都督平林邑國紀功而還方在道遇患而卒帝甚傷惜之乃下詔曰方肅承廟筭恭行天討飲冰遄邁視險若夷摧鋒直指出其不意鯨鯢殄殪巢穴咸傾役不再勞肅清海外致身王事成績可嘉可贈上柱國盧國公煬帝大業二年五月乙邜詔曰旌表先哲式在饗祀所以優禮賢能顯彰遺愛朕永鍳前脩尚想名徳何嘗不興歎九原屬􅀈千載其自古以來賢人君子有能樹聲立徳佐世救時博利殊功有益於人者並宜營立祠宇以時致祭墳壟之時不得侵踐有司量為條式稱朕意焉三年四月己亥次赤岸驛以太牢祭故太師李穆五年二月戊戌次於閿鄉詔祭開皇功臣墓三月庚午有司言武功男子史永遵與從父昆弟同居帝嘉之賜物一百叚米二百石表其門閭陶模為嵐州司馬漢王諒據并州反刺史喬鍾葵發兵赴逆模拒之鍾葵失色曰司馬反邪臨之以兵辭氣不撓鍾葵義而釋之軍吏進曰若不斬模何以壓衆心於是囚之於獄悉掠取資財分賜黨與及諒平帝嘉之拜開府授大興令皇甫誕為漢王諒并州司馬諒反誕諌之為諒所囚及楊素至諒屯清源誕出獄謀閉城拒之又為諒所害焬帝以誕亡身殉國嘉悼者久之下詔曰褒顯名節有國通規加等餙脩抑惟令典并州總管司馬皇甫誕性理淹通志懐審正効官贊務聲績克宣值狂悖稱禍凶威孔熾確殉單誠不從妖逆雖幽縶冦手而雅志彌厲遂潜與義徒據城抗拒衆寡不敵奄致非命可贈柱國封𢎞義公諡曰明華秋汲郡臨河人也事母以孝聞母終廬於墓側大業初調狐皮郡縣大獵有一兎人逐之奔入秋廬中匿秋膝下獵人至廬所異之自爾此兎嘗宿廬中馴其左右郡縣嘉其孝感具以狀聞帝降使勞問表其門閭翟普林楚丘人也性至孝事親以孝聞州郡辟命皆固辭不就躬耕色飬鄉鄰謂為楚丘先生後父母疾親易燥濕不觧衣者七句大業初父母俱終哀毁殆將㓕性廬於墓側負土成墳盛冬不衣繒絮惟單縗而已家有一烏犬隨其在墓若普林哀臨犬亦悲號見者嗟異焉有二鵲巢其廬前樹每入其廬馴狎無所驚懼大業中司𨽻廵察奏其孝感擢授孝陽令游元大業中為侍御史奉使黎陽楊𤣥感作亂元數其罪𤣥感怒而囚之屢脅以兵竟不屈節於是害之帝甚加歎贈銀青光禄大夫賜縑五百疋拜其子仁宗為正議大夫弋陽郡通守松贇大業末為石門府掾正賊帥楊厚執之令告北海縣云郡兵已破宜早歸降贇至城下言賊弱不足憂遂為厚所害帝遣户曹郎郭子賤討厚破之以贇亡身殉節嗟悼不已上表奏之優詔褒揚贈朝散大夫本郡通守唐髙祖武徳元年八月以髙熲賀若弼張衡宇文弼薛道衡董純等忠於前朝李金才李敏見忌隋室皆被焬帝所誅於是贈其官爵裴仁基初仕隋為左光禄大夫䧟於王世充後謀歸國事洩遇害武徳中贈原州都督諡曰忠二年五月詔曰民禀五常仁義斯重士有百行孝敬為先自古哲王經邦致治設教垂範莫尚於兹叔世澆訛民多偽薄脩身克已事資誘勸朕恭膺靈命臨馭遐荒愍兹弊俗方思遷道雍州萬年縣樂遊鄉民王世貴孝性自天力行無怠䘮其所怙哀毁絶倫負土成墳結廬墓側鹽酪之味在口不嘗哭泣之聲感於行路安福鄉民宋興貴立操雍和主情友睦同居合㸑累世積年務本力農崇謙履順𢎞長名教敦厲風俗宜加褒顯以勸將來可並旌表門閭蠲免課役布告天下使明知之四年表南豐州漢陽縣令姜世雄之閭褒義門也世雄立性仁厚夙敦教義私門之内友悌著聞累葉共居合宗同㸑鄉黨稱慕曽無間言屬隋末冦盗經其里者皆感其義節不忍侵掠帝聞而嘉尚言其孝行堪勵風俗下詔褒美課役並從蠲免楊太寳武徳初為龍門令劉武周䧟晉絳攻之不降城破被害褒贈全節侯劉感岐州鳯泉人後魏司徒髙昌王豐生之孫也武徳初以驃騎將軍鎮涇州薛仁杲率衆圍之感嬰城拒守城中粮盡遂殺所乘馬以分將士將士感之一無所噉唯煑馬骨取汁和木屑食之城垂䧟者數以長平王叔良援兵至仁杲觧圍而去感與叔良出戰為賊所擒仁杲復圍涇州令感語城中云援軍已敗徒守孤城何益也宜早出降以全家室感及至城下大呼曰逆賊饑餓亡在朝夕秦王率數十萬衆四面俱集城中勿憂宜各自勉以全忠節仁杲大怒執感於城邉埋脚馳騎射殺之至死聲色逾厲賊平帝購得其屍祭以少牢贈瀛州刺史封平原郡公諡曰忠壯令其子襲官爵并賜田宅常達陜人也初仕隋為鷹擊郎將數從帝征伐甚蒙親待及義兵起逹在霍邑從宋老生來拒戰老生敗逹懼自匿不出髙祖謂逹已死令人閱屍求之及逹來見髙祖大悦以為統軍武徳初拜隴州刺史時薛舉屢攻之不能克乃遣其將仵士政以數百人偽降逹逹不之察厚加撫接士政伺隟以其徒刼逹擁城中二千人而叛牽逹以見於舉逹詞色抗厲不為之屈舉指其妻謂逹曰識皇后不逹曰止是癭老嫗何足可識竟釋之有奴賊帥張貴謂逹曰汝識我不逹曰汝逃死奴瞋目視之貴怒持刀將斧逹人救獲免及仁杲平帝見逹謂曰卿之忠節便可求之古人命起居舍人令狐徳棻曰劉感常逹須載之史䇿也執仵士政撲殺之賜逹布帛三百叚復拜隴州刺史魏衡妻王氏梓州郪人也武徳初薛仁杲舊將旁企地侵掠梁部因獲王氏逼而妻之後企地漸強盛衡謀以城應賊企地領衆將趨梁州未至數十里飲酒醉卧王氏取其佩刀斬之㩦其首入城衆乃散帝大悦封為崇義夫人仍赦衡同賊之罪獨孤武都謀叛王世充歸國事覺誅死武都子師仁年始三嵗世充以其年㓜不殺使禁掌之乳母王氏號蘭英請髠鉗求入保飬世充許之蘭英撫育提㩦備盡筋力時䘮亂年饑人多餓死蘭英扶路乞丐捃拾遇有所得便歸與師仁蘭英唯啖土飲水而已後詐採拾乃竊師仁歸於京師帝嘉其義下詔曰師仁乳母王氏慈惠有聞撫鞠無倦提㩦遺㓜背逆歸朝宜有褒隆以賜其號可封永夀鄉君張善相許州㐮城人也大業末為里長每督縣兵逐小盗為衆所附遂據本郡歸於李宻宻敗以城歸國帝授伊州總管王世充數攻之善相頻遣使請救兵既不赴城中粮盡自知必敗謂寮屬曰吾荷國恩要當効命諸君無為同死當斬吾頭以歸世充衆皆泣曰寧與公同死終不獨生後城䧟被禽送於世充所辭色不撓罵世充極口尋被害帝歎曰吾負善相善相不負吾封其子為㐮城郡公張志寛河東安邑人也武徳八年丁母憂廬於墓側負土成墳有烏巢於廬前樹上志寛哭臨烏輙悲鳴帝聞之遣使就第弔授員外散騎常侍賜物三百叚表其門閭太宗貞觀元年勑召臨淮劉子翼入京辭以繼母年老不赴色飬之美鄉里稱焉江南道大使李襲譽奏旌表之仍賜以米布改所居為孝慈里及母卒摧毁傷感行路二年九月涇陽人田伯明髙陵寡婦李氏各賜帛三十疋旌孝義也六年正月蠲布衣邉鳯舉韋引宗崔定仁陳嗣等四家課役褒孝義也鳯舉渤海人引宗邑西人並以至孝聞於鄉黨葬父母皆廬墓次負土成墳鳯舉植栢而為嘉樹引宗廬前生芝草七十餘莖見者以為孝感丁父母憂縗服齋居二十餘年不釋定仁博陵人為偶像晨昏定省若平生焉隋末羣賊蜂起莫有侵掠者嗣隴西人四葉同居稱為邕睦帝異之並下書褒美七年十一月以少牢祭杜如晦杜淹李綱之墓十二年二月帝幸長春宫表王隴徳之閭褒節義也隴徳本馮翊人王藏仁之蒼頭也藏仁父母先殁未獲合葬既而從役物故其妻孀居旁無親屬隴徳迎致其屍并其父母而葬之因廬其墓次負土成墳每有白雉悲鳴於墳上焉十月表通事舍人薛萬備之閭旌孝行也萬備者營州都督萬淑之季弟也初丁母艱截髪為髦以充歛及葬廬於墓次負土成墳帝聞而嘉之降璽書弔慰焉十五年二月表華州鄭人王瞿曇之閭旌孝行也瞿曇事親以孝飬聞閭里稱其敬譲葬祖父母及伯父皆負土成墳三年乃畢母終亦如之晝夜悲號哀感行路頭髪盡落形體枯悴墓門三年不掩夜嘗寝於棺側服終之後仍不離墓焉十一月壬戌賜孝女夏侯碎金布帛二十叚粟十石仍標其門閭碎金滑州胙城人先適河間劉氏已産一女其父因疾䘮身碎金遂求離其夫以終侍飬夫不違其志分留一女碎金供飬其父兼事後母以孝聞鄉里方之曾閔父亡號哭之聲朝夕不絶哀毁之至殆不勝䘮寒不衣絮被髪徒跣負土成墳廬於墓側至是已歴五年日一食而止十七年齊王祐舉兵祐初遣沓君謩將數百騎擊平陵平陵人拒守獲全詔嘉之改平陵為全節縣十九年二月庚戌輿駕發雒陽丁巳詔曰昔望諸列國之相漢主尚求其後夷吾覇者之臣魏君猶禮其墓况正直之道邁青松而孤絶忠勇之操掩白玉而振彩者哉殷故少師比干貞一表徳鄰㡬成性以明允之量屬無妄之辰玉馬遽馳愍其邦之殄悴寳衣將燎惜其君之覆亡其義不回懐忠蹈節讜言纔發輕百齡之命滛刑既逞碎七尺之軀雖復周王封墓莫救焚圍之禍孔聖稱仁寧追剖心之痛朕自趙魏問罪遼碣經途秀麥之墟緬懐梓林之地駐蹕而瞻荒隴願以為臣撫躬而想幽泉思聞其諌豈可使慎終之義久闕於徃册易名之典無聞於後代宜錫寵命以展宿心可追贈太師諡曰忠烈所司崇其墓而葺祠堂州縣春秋二時祀以少牢給隨近五户以供灑掃帝自為祭文壬戌次安陽遣使以少牢祭齊清河王髙岳之墓是年帝征遼攻安市城不剋其城中皆屏聲偃幟城主升城拜手奉辭太宗嘉其堅守賜絹百疋以勵事君之節又遼東城長史為部下所殺而省事省事郡吏也㩦其妻子奔白巖城降帝義之賜省事帛五疋仍為造靈輿歸平壌二十一年二月甲戌賜滑州胙城女子劉少娘粟帛仍表其閭旌孝行也少娘母夏侯碎金亦以至孝聞少娘年十五而母亡遂廬於墓側負土成墳許垣豫州人也年十嵗父入山採藥為猛獸所噬即號呌以杖擊之獸遂奔走父得以全帝聞而謂侍臣曰垣雖㓜童遂能致命救親至孝自衷深可嘉尚授文林郎賜物五十叚堯君素隋大業末為鷹揚郎將鎮河中義兵起固守不下髙祖遣其妻至城下説令降君素引弓射殺後人心離叛左右斬之傳首京師梟於都市後帝幸河中歎其忠於隋室贈蒲州刺史以勵事君楊三安妻李氏雍州涇陽人也事舅姑以孝聞及舅姑亡沒三安亦死二子孩童家貧窶李晝則力田夜則紡績數年間畢舅姑及夫之叔姪兄弟七䘮深為逺近所嗟尚帝聞而異之賜帛二百叚遣州縣存恤孝女衛氏字無忌絳州夏縣人也初其父為鄉人衛長則所殺無忌時年六嵗母又改嫁更無兄弟及長嘗思復讎無忌從伯嘗設宴為樂長則時亦預坐無忌以塼撃殺之既而詣吏稱父讐既報請就刑戮廵察大使黄門侍郎禇遂良以聞帝嘉其孝烈特令免罪給傳乘徙於雍州并給田宅仍令州縣以禮嫁之王少𤣥者博州聊城人也父隋末於郡西為亂兵所害少𤣥遺腹生年十餘嵗問父所在其母告之因哀泣便欲求屍以葬時白骨蔽野無繇可辨或曰以子血霑父骨即渗入焉少𤣥乃刺其體以試之凡經旬日竟獲父骨以葬盡體病創歴年方愈貞觀中本州聞薦拜除王府參軍阿史那杜爾本突厥處羅可汗第二子貞觀中為行軍總管以髙昌凱旋帝謂杜爾曰諸軍並分外求財爾獨能不取深可尚也髙昌有一寳鈿刀是其國所寳即以賜之并雜綵千叚李乾祐為侍御史母卒廬於墓側負土成墳帝遣使就弔仍旌表其門髙宗永徽三年九月以周司沐大夫裴融尚書左丞封孝琰有忠節於前代制擢其子孫以旌介烈五年二月庚申故雒州都督贈尚書左僕射屈突通故吏部尚書贈陜東道大行臺尚書右僕射殷開山並贈司空故澤州刺史贈荆州都督邳國公長孫順徳贈開府儀同三司故左領軍大將軍竇琮贈特進故右武衛大將軍史大柰贈輔國大將軍故禮部尚書温大雅贈尚書右僕射故太僕卿贈兵部尚書權引夀贈太子少師故洪州都督贈户部尚書劉政㑹故荆州都督贈禮部尚書應國公武士彠並贈并州都督故㐮州都督贈左驍衛大將軍張公謹贈荆州都督故資州刺史李髙遷贈凉州都督故嘉州刺史李思行贈洪州都督故右光禄大夫張平髙贈潭州都督並追録武徳功臣也六年正月親謁昭陵詔貞觀以來勲賢大臣陪葬者宜以少牢於墓致祭其子孫有淪屈者所司奏聞三月丁酉遣比部員外李文禮致祭名臣圖形於凌煙閣者凡七人故太子太師魏徴右僕射髙士亷特進蕭瑀輔國大將軍叚志𤣥䕫國公劉𢎞基徐州都督秦叔寳秘書監虞世南皆始終著名者也四月丙寅鎮軍大將軍阿史郍杜爾卒贈并州都督陪葬昭陵諡曰元仍令起冡象葱山以旌平龜兹之功也顯慶元年八月賜相州司兵參軍武𢎞度宋州人程表師粟帛標其門閭旌孝行也二年二月髙宗在雒陽宫遣使祭伊尹周公伯夷叔齊許由等廟十月車駕幸許州次白善頓遣有司祭鄭子産及漢太丘長陳實之墓五年二月車駕幸并州其義旗初職事五品已上身亡沒墳墓在州者令所司致祭麟徳元年十月己邜詔曰周京兆尹少冡宰廣陵郡守宇文孝伯忠亮基心貞堅表志滛刑既逞方納諌而求人忍忌將加甘捐軀而狥節年祀雖永風烈猶生宜峻徽章式旌華胄其孫左威衛長史思純可朝散大夫二年十月命有司致祭伊尹周公桓榮楊彪杜預等墓及祠廟十一月己邜至滎陽祭紀信墓追贈驃騎大將軍三年有事泰山路過鄆州聞夀張人張公藝九世同居帝親幸其宅問其義繇其人請紙筆但書百餘忍字帝為之流涕賜以縑帛焉初北齊安王髙樂詣宅慰撫旌表隋開皇中大夫郤陽公梁子恭親慰撫重表其門貞觀中特勑更加旌表咸亨三年十月丁亥詔脩葺傅説祠廟仍令所司少牢致祭儀鳯二年吐蕃冦扶州之臨河鎮鎮將杜孝昇為賊所執賊令送書松州以邀其降孝昇身遭六鎗竟不從俄而賊衆捨孝昇而退又率餘衆拒守詔贈孝昇游擊將軍以旌其忠烈仍賜物二百叚孝昇俄以創甚去職詔令給禄終身三年九月詔賜雍州司法參軍楊諲故妻韋氏物百叚旌孝行也韋氏鄜州刺史吉甫之女其父初嬰疹疾累月不觧衣而寝及父卒一慟而絶帝嘉其至行特賜縑帛仍令編入國史永隆二年四月贈故吉州長史陳行焉陸州刺史旌忠節也初行焉使吐蕃吐蕃大臣欽陵使行焉拜伏行焉擁節不屈臨之以兵竟不從因被拘留十餘年而卒至是䘮還帝深嘉歎之故贈官焉永淳二年正月車駕發東遣使祭巢父許由等祠廟五月以雍州人元譲為太子右内率府長史旌孝行也譲弱冠明經擢第以母疾遂不求仕躬親藥膳蒸蒸致飬不出閭里十餘年及母終廬於墓側蓬髪不櫛沐菜食飲水而已咸亨中孝敬監國下令表其門閭至是廵察使奏譲孝悌殊異繇是拜職孝女賈氏濮州鄄城人也年始十五其父為宗人𤣥基所害其弟疆仁年㓜賈氏撫育之誓以不嫁及疆仁成童思共報復乃候𤣥基殺之取其心肝以祭父墓遣疆仁自列於縣司斷以極刑賈氏詣闕自陳已為請代疆仁死帝哀之特下制賈氏及疆仁免罪移其家於雒陽東夷都䕶張儉第二女左千牛敏直之妻性至孝數嵗時父母㣲有痾急即觀察顔色晝夜不離左右初聞儉有疾自傷不獲奔赴期於必死及凶問至號呌一慟而絶帝聞之下詔褒羙贈物一百叚仍令編入國史楊紹宗妻王氏華州華隂人也初年二嵗所生母亡為繼母鞠飬至年十五父又征遼而殁繼母尋亦卒王乃收所生及繼母屍柩并立父形像招魂遷葬訖廬於墓側培其祖及父母墳永徽中詔曰故楊紹宗妻王氏因心為孝率性成道年廹桑榆筋力衰謝以徃在隋朝父殁遼左招魂遷葬負土成墳又葬其祖父母等竭此老年親加板築痛結晨昏哀感行路永言志行嘉尚良深宜標其門閭用旌敏徳賜物三十叚粟五十石蘇定方為左武衛大將軍卒帝傷惜久之謂侍臣曰蘇定方於國有功例合褒贈卿嘗不言遂使哀榮未及興言及此不覺嗟悼遽下詔贈幽州都督諡曰莊册府元龜卷一百三十八
