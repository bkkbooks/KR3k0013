body:
  text: 册府元龜卷七百四十宋王欽若等撰陪臣部規諷百王以下皆有父兄子弟以補察其政至於瞽史百工亦得獻規而納誨矧内叅家陪之列居卿佐之任者乎春秋之世逮於戰國其間挺公正之操懷忠讜之節或引經據古援事取譬弼違箴闕以貢乎讜言拂心逆耳以救乎失徳非惟官守言責之使然也至或農夫漁者樂正膳宰亦能有犯無隐罄其誠心原乎進不圖寵動非徼福以愛君利國為念雖蒙恥觸禍而靡憚自非蹇蹇匪躬之子坦坦履道之士亦惡能及是者哉故獻可替否所以濟其美改過從善所以成其徳詩云彼已之子邦之司直盖神明之介福焉石碏為衛大夫衛荘公夫人無子公子州吁嬖人之子也嬖親幸也有寵而好兵公弗禁荘姜惡之石碏諫曰臣聞愛子教之以義方弗納於邪驕奢淫佚所自邪也四者之來寵祿過也将立州吁乃定之矣若猶未也階之為禍将立為太子則宜早定若不早定州吁必緣而為禍夫寵而不驕驕而能降降而不憾憾而能眕者鮮矣如此言少也降其身則必憾憾則思亂不能自安自重且夫賤妨貴少陵長遠間親新間舊小加大小國而加兵于大國如息侯伐鄭之比淫破義所謂六逆也君義臣行父慈子孝兄愛弟敬所謂六順也臣行君之義去順效逆所以速禍也君人者将禍是務去而速之無乃不可乎臧僖伯魯大夫魯隠公将如棠觀魚者臧僖伯諫曰凡物不足以講大事大事祀與戎也其材不足以備器用則君不舉焉材謂皮革齒牙骨角毛羽也君将納民於軌物者也故講事以度軌量謂之軌取材以章物采謂之物不軌不物謂之亂政亂政亟行所以敗也故春蒐夏苗秋獮冬狩蒐索擇取不孕者苗為苗除害也獮殺也以殺為名順秋氣也狩圍守也冬物畢成獲則取之無所擇也皆於農隙以講事也各隨時事之間三年而治兵入而振旅雖四時講武猶復三年而大習出曰治兵始治其事入曰振旅治兵禮畢整衆而還振整也旅衆也歸而飲至以數軍實飲于廟以數車徒器械及所獲也昭文章車服旌旗明貴賤辨等列順少長習威儀也鳥獸之肉不登于俎俎祭宗廟之器皮革齒牙骨角毛羽不豋于噐謂以飾法度之噐則公不射古之制也若夫山林川澤之事噐用之資皂隸之事官司之守非君所及也士臣皂皂臣輿輿臣隸言取此雜猥之物以資噐備是小臣有司之職非諸侯之所親也公曰吾将畧地焉孫辭以畧地畧總攝廵行之名傳曰東畧之不知西則否矣遂往陳魚而觀之陳設張也公大設捕魚之備而觀之僖伯稱疾不從公子佗陳桓公弟五父也鄭伯請成于陳成猶平也陳侯不許五父諫曰親仁善鄰國之寳也君其許鄭陳侯曰宋衛實難畏難也鄭何能為遂不許臧哀伯魯大夫僖伯之子也魯桓公取郜大鼎於宋納于太廟宋華督弑殤公以郜大鼎賂魯也臧哀伯諫曰君人者将昭徳塞違以臨炤百官猶懼或失之故昭令徳以示子孫是以清廟茅屋以茅飾屋著儉也清廟肅然清浄之稱大路越席大路玉路祀天車也越席結草大羮不致大羮肉汁不致五味粢食不鑿黍稷曰粢不精鑿昭其儉也此四者皆示儉衮冕黻珽衮畵衣也冕冠也黻韋􅔖以蔽膝也珽玉笏也若今吏之持簿帶裳幅舄帶革帶也衣下曰裳幅若今行縢者舄複履衡紞紘綖衡維持冠者紞冠之垂者也紘纓從下而上者綖冠上覆昭其度也尊卑各有制度藻率鞞鞛藻率以韋為之所以藉玉也王五采公侯伯三采子男二采鞞佩刀弰上飾鞛下飾鞶厲斿纓鞶紳帶也一名大帶厲大帶之垂者㳺旌旗之㳺纓在馬膺前如索帬者昭其數也尊卑各有數火龍黼黻火畵火也龍畵龍也白與黒謂之黼若斧形黑與青謂之黻兩已相戾昭其文也以文章明貴賤五色比象昭其物也車服器械之有五色皆以比象天地四方以示噐物不虚設錫鸞和鈴昭其聲也錫在馬額鸞在鑣和在衡鈴在斾動皆有鳴聲三辰旂旗昭其明也三辰日月星也畵于旂旗象天之明夫徳儉而有度登降有數登降謂上下尊卑文物以紀之聲明以發之以臨炤百官百官於是乎戒懼而不敢易紀律今滅徳立違謂立華督違命之臣而置其賂噐於太廟以明示百官百官象之其又何誅焉國家之敗由官邪也官之失徳寵賂章也郜鼎在廟章孰甚焉武王克商遷九鼎于雒邑九鼎殷所受夏九鼎也武王克商乃營雒邑而後去之又遷九鼎焉時但營雒邑未有都城至周公乃卒营雒邑謂之王城即今河南城也故傳曰成王定鼎于郟鄏義士猶或非之盖伯夷之屬而况将昭違亂之賂噐於太廟其若之何公不聽周内史聞之曰臧孫達其有後於魯乎君違不忘諫之以徳季梁隨賢臣也楚武王侵隨使薳章求成焉薳章楚大夫軍於瑕以待之瑕隨地隨人使少師董成少師隨大夫董正也鬬伯比言於楚子曰吾不得志于漢東也我則使然鬬伯比楚大夫令尹子文之父我張吾三軍而被吾甲兵以武臨之彼則懼而恊以謀我故難間也漢東之國隨為大隨張必棄小國張自侈大也小國離楚之利也少師侈請羸師以張之羸弱也熊率且比曰季梁在何益熊率且比楚大夫鬬伯比曰以為後圖少師得其君言季梁之諫不過一見從隨侯卒當以少師為計故云以為後圖王毁軍而納少師從伯比之言少師歸請追楚師隨侯将許之信楚弱也季梁止之曰天方授楚楚之羸其誘我也君何急焉臣聞小之能敵大也小道大淫所謂道忠於民而信於神也上思利民忠也祝史正辭信也正辭不虚稱君美今民餒而君逞欲逞快也祝史矯舉以祭臣不知其可也詐稱功徳以欺鬼神公曰吾牲牷肥腯粢盛豐備何則不信牲牛羊豕牷純色完全也腯亦肥也黍稷曰粢在噐曰盛對曰夫民神之主也言鬼神之情依民而行是以聖王先成民而後致力於神故奉牲以告曰博碩肥腯謂民力之普存也博廣也碩大也謂其畜之碩大蕃滋也謂其不疾瘯蠡也謂其備腯咸有也雖告神以博碩肥腯其實皆當兼此四謂謂民力適完則六畜旣大而滋也皮毛無疥癬兼備而無有所闕奉盛以告曰潔粢豐盛謂其三時不害而民和年豐也三時春夏秋奉酒醴以告曰嘉栗㫖酒嘉善也栗謹敬也謂其上下皆有嘉徳而無違心也所謂馨香無䜛慝也馨香之遠聞故務其三時修其五教父義母慈兄友弟共子孝親其九族以致其禋祀禋潔敬也九族謂外祖父外祖母從母子及妻父妻母姑之子姊妹之子女子之子并已之同族皆外親有服而異族者於是乎民和而神降之福故動則有成今民各有心而鬼神乏主民饑餒也君雖獨豐其何福之有君姑修政而親兄弟之國庶免於難隨侯懼而修政楚不敢伐曹劌為魯大夫魯荘公如齊觀社二十三年齊因祀社蒐軍實以示客公往觀之曹劌諫曰不可夫禮所以正民也是故先王制諸侯使五年四王壹相朝也王謂王事天子也五年之間四聘於王而一相朝相朝者将朝天子先相朝也終則講於㑹以正班爵之義終畢講習班次也謂朝畢則習禮於㑹以正爵位次序尊卑之義也夫齊棄太公之法而觀民於社太公齊始祖太公望君為是舉而往觀之舉舉動也非故業也業事何以訓民土發而社助時也土發春分周語曰土方脉發社者助時祈福為農始收攟而烝納要也攟拾也冬祭曰烝因祭祀以納五穀之要休農夫也月令孟冬祀于天宗大祀公社及門閭今齊社而往觀旅非先王之訓也旅衆天子祀上帝上帝天也諸侯㑹之受命焉助祭受君命諸侯祀先王先公先王謂若宋祖帝乙鄭祖厲王之屬先公先君卿大夫佐之受事焉事職事也臣不聞諸侯之相㑹祀也祀又不法不法謂觀民君舉必書書而不法後嗣何觀不聽遂如齊一云荘公如齊觀社曹劌諫曰不可夫禮所以整民也故㑹以訓上下之則制財用之節朝以正班爵之義帥長㓜之序征伐以討其不庭諸侯有王王有廵狩以大習之非是君不舉矣故君舉必書書而不法後嗣何觀御孫慶為魯掌匠大夫魯荘公丹桓宫之楹而刻其桷桓宫桓公廟也楹柱也荘公娶于齊曰哀姜哀姜将至當見于廟故丹柱刻榱以誇之也匠師慶言於公曰臣聞聖王公之先封者謂若湯武周公太公遺後人之法今先君儉而君侈之先君桓公令徳替矣替滅公曰吾屬欲美之屬適也適欲自美之非先君之意對曰無益於君而替前之令徳臣故曰庶可以已乎已止公弗聽一云荘公丹桓宫之楹又刻桓宫桷御孫諫曰臣聞之儉徳之共也侈惡之大也先君有共徳而君納諸大惡無乃不可乎哀姜至公使宗婦覿用幣非禮也御孫曰男贄大者玉帛公侯伯子男執玉諸侯世子附庸孤卿執帛小者禽獸卿執羔大夫執雁士執雉以章物也章所執之物以别貴賤女贄不過榛栗棗修以告䖍也榛小栗也修脯䖍敬也皆取其名以示敬也今男女同贄是無别也男女之别國之大節也而由夫人亂之無乃不可乎夏父展魯宗人也宗人宗伯主男女贄幣之禮哀姜至公使大夫宗婦覿用幣宗婦同宗大夫之婦覿見也見夫人也用幣與大夫同贄夏父展曰非故也公曰君作故言君所作則為故事展對曰君作而順則故之順順于禮則書為故事逆則亦書其逆也臣從有司懼逆之書於後也故不敢不告從有司言備位隨從有司後行夫婦贄不過棗栗以告䖍也棗取蚤起栗取敬栗䖍敬也曲禮婦人之贄脯修棗栗也男則玉帛禽獸以章物也公執桓圭侯執信圭伯執躬圭子執穀璧男執蒲璧孤執皮帛卿執羔大夫執雁士執雉庶人執鶩工商執雞章明也明尊卑異物今婦執幣是男女無别也男女之别國之大節也不可無也公弗聽管仲為齊大夫齊桓公㑹魯莊公于柯魯荘公十三年曹沬劫盟桓公桓公乃許盡歸魯之地旣而桓公怒欲倍其約管仲曰不可夫貪小利以自快棄信於諸侯失天下之援不如與之于是桓公乃遂割魯侵地曹沬三戰所亡地盡復于魯桓公盟于寗母謀鄭故也管仲言於齊侯曰臣聞之招攜以禮懷遠以德攜離也德禮不易無人不懐齊侯修禮於諸侯諸侯官受方物諸侯官司各於齊受其方所當貢天子之物鄭伯使太子華聽命於㑹言於齊侯曰洩氏孔氏子人氏三族實違君命三族鄭大夫君若去之以為成我以鄭為内臣君亦無所不利焉以鄭事齊如封内臣齊侯將許之管仲曰君以禮與信屬諸侯而以姦終之無乃不可乎子父不奸之謂禮守命共時之謂信守君命共時事違此二者姦莫大焉公曰諸侯有討於鄭未捷今茍有釁從之不亦可乎子華犯父命是其釁隙對曰君若綏之以德加之以訓辭而帥諸侯以討鄭鄭將覆亡之不暇豈敢不懼若總其罪人以臨之總將領也子華奸父之命即罪人鄭有辭矣何懼以大義為辭且夫合諸侯以崇徳也㑹而列姦何以示後嗣列姦用子華夫諸侯之㑹其徳刑禮義無國不記記姦之位位㑹位也子華為姦人而列在㑹位将為諸侯所記君盟替矣替廢也作而不記非盛徳也君舉必書雖復齊史隐諱亦損盛徳君其勿許鄭必受盟夫子華旣為太子而求介於大國以弱其國亦必不免介因也鄭有叔詹堵叔師叔三良為政未可間也齊侯辭焉子華由是得罪於鄭鄭伯使請盟於齊桓公旣覇㑹諸侯於葵丘而欲封禪魯僖公九年葵丘在陳留外黄縣禪音上載反管仲曰古者封泰山禪梁父者七十二家父音甫而夷吾所記者十有二焉昔無懷氏封泰山禪云云無懷古之王者在伏羲前見荘子云云山在蒙陰縣故城東北下有云云亭虙羲封泰山禪云云虙讀曰伏神農氏封泰山禪云云炎帝封泰山禪云云炎帝神農後黄帝封泰山禪亭亭鉅平有亭亭山顓頊封泰山禪云云帝嚳封泰山禪云云堯封泰山禪云云舜封泰山禪云云禹封泰山禪㑹稽湯封泰山禪云云周成王封泰山禪社首在鉅平南十三里皆受命然後得封禪桓公曰寡人北伐山戎過孤竹伯夷國也在遼西令支令音郎定反支音神祇之祇西伐束馬縣車上卑耳之山将上山纒束其馬縣釣其車世卑耳即齊語所謂辟耳南伐至召陵召陵地也在汝南召讀曰劭登熊耳山以望江漢熊耳山在順陽北益隂縣東北禹貢所云導雒自熊耳者也其山兩峯狀若熊耳因以為名也兵車之㑹三乗車之㑹六九合諸侯一匡天下兵車之㑹三謂荘十二年㑹於北杏以平宋亂僖四年侵蔡蔡潰遂伐楚次于涇六年伐鄭圍新城也乗車之㑹六謂荘十四年㑹于鄄十五年㑹于鄄十六年同盟于幽僖五年㑹于首止八年盟于洮九年㑹于葵丘也一匡天下謂定襄王為天子之位也一説謂陽穀之㑹令諸侯云無鄣谷無貯粟無以妾為妻天下皆從故云一正也諸侯莫違我昔三代受命亦何以異乎於是管仲睹桓公不可窮以辭因設之以事曰古之封禪鄗上之黍北里之禾所以為盛鄗音臛鄗上北里皆地名也盛謂以實簠簋江淮之間一茅三脊所以為藉也茅草有三脊也謂靈茅也藉以藉地藉音才夜反東海致比目之魚爾雅云東方有比目魚言不比不行其名謂之鰈音土盍反西海有比翼之鳥山海經云崇吾之山有鳥狀如鳬而一翼一目相得乃飛其名曰鸞爾雅云南方有比翼鳥焉不比不飛其名謂之鶼鶼而管仲乃云西海其説異也然後物有不召而至者十有五焉今鳯凰麒麟不至嘉禾不生而蓬蒿藜莠茂鴟梟羣翔蓬蒿藜莠皆穢惡之草梟不祥之鳥也鴟盖今所謂角鴟也梟土梟也而欲封禪無乃不可乎於是桓公乃止葵丘之㑹天子使宰孔賜桓公文武胙且曰謂爾伯舅無下拜桓公召管子謀對曰為君不君為臣不臣亂之本也桓公懼出見客又桓公問管仲曰寡人願聞國君之信對曰民愛之鄰國親之天下信之此國君之信公曰善請問信安始而可對曰始于為身中于為國成于為天下公曰請問為身對曰道血氣以求長心長徳長心謂謀慮速長徳謂恩施廣此為身也公曰請問為國對曰遠舉賢人慈愛百姓外存亡國繼絶世起諸孤孤謂死王事者子孫薄税歛輕刑罰此為國之大禮也法行而不苛刑亷而不赦有司寛而不陵不虐惸獨菀濁困滯皆法度不亡菀濁謂穢塞不潔清者也困滯謂疲羸微隐者也有如此者此皆以法度加之不令有所失也往行不來而民游世矣其行法度者但往行而進不却來而退而人以此自得行于世也此為天下也又桓公之時宋伐杞狄伐邢衛桓公不救祼體紐胃稱疾紐摩也自摩其胸若有所痛患也召管仲曰寡人有千歲之食而無百歲之夀今有疾病姑樂乎管子曰諾於是令人懸鐘磬之装装可以嚴飾之陳歌舞竽瑟之樂日殺數十牛者數旬羣臣進諫曰宋伐杞狄伐邢衛君不可不救桓公曰寡人有千歲之食而無百歲之夀今又有疾病姑樂乎且彼非伐寡人之國也伐鄰國也子無事焉宋已取杞狄已拔邢衛矣桓公起行筍簴之間管子從之從至大鐘之西桓公南而立管仲北向對之大鐘鳴桓公視管仲曰樂夫仲父管仲對曰此臣之所謂哀非樂也臣聞之古者之言樂於鐘磬之間者不如此言脱于口而令行乎天下脱出在鐘磬之間而無四面兵革之憂今君之事言脱於口令不得行於天下在鐘磬之間而有四面兵革之憂此臣所謂哀非樂也桓公曰善於是伐鐘磬之懸伐謂折斷併歌舞之樂也併除宫中虛無人不令人掌守之桓公曰寡人已伐鐘磬之縣併歌舞之樂矣請問所始於國将為何行管子對曰宋伐杞狄伐邢衛而君之不救也臣請以慶以不救為是故慶之臣聞之諸侯争於强者勿與分於强若救三國是分于强今君何不定三君之處哉三君旣失國當定其君處也於是桓公曰諾因令以車百乗卒千人以緣陵封杞車百乗卒千人以夷儀封邢車五百乗卒五千人以楚丘封衛又桓公問於管仲曰王者何貴曰貴天桓公仰視天管仲曰所謂天非蒼莽之天也王以百姓為天百姓與之即安輔之即强非之即危倍之即亡又桓公置酒令諸侯大夫曰後者飲一經程管仲後當飲一經程飲其半而棄其半桓公曰仲父當飲一經程而棄之何也管仲曰臣聞之酒入者舌出舌出者棄其身與其身不寧寧棄酒乎桓公曰善又桓公出㳺於野見亡國故城郭氏之墟問於野人曰是為何墟野人曰是為郭氏之墟桓公曰郭氏者何為為墟野人曰郭氏者善善而惡惡桓公曰善善而惡惡人之善行也其所以為墟者何也野人曰善善而不能行惡惡而不能去是以為墟也桓公歸以語管仲管仲曰其人為誰桓公曰不知也管仲曰君亦一郭氏也於是桓公召野人而賞焉公子完陳公子也為齊工正飲桓公酒樂齊桓賢之故就其家㑹據主人之辭故言飲桓公酒公曰以火繼之辭曰臣卜其晝未卜其夜不敢君子曰酒以成禮不繼以淫義也夜飲為淫樂以君成禮弗納於淫仁也鮑叔為齊大夫齊桓公與管仲鮑叔寗戚飲酒桓公謂鮑叔姑為寡人祝乎鮑叔奉酒而起曰祝吾君無忘其出亡而在莒也使管仲無忘其束縳而從魯也使寗武子無忘其飯牛于車下也桓公辟席而拜曰寡人與二大夫皆無忘夫子之言齊國之社稷必不廢此言嘗思困隘之時必不驕矣輪扁齊人也桓公讀書於堂輪扁斵輪於堂下釋其椎鑿而問桓公曰君之所讀書者何書也桓公曰聖人之書輪扁曰其人焉在問作書之人何在也桓公曰已死矣輪扁曰是直聖人之糟粕耳糟酒滓也粕已漉之精也桓公勃然作色而怒曰寡人讀書工人焉得譏之哉有説則可無説則死輪扁曰然有説臣試以臣之斵輪語之太疾則苦而不入苦急意也太徐則甘而不固甘緩意也不甘不苦應於手厭於心而可以至妙者臣不能以教臣之子而臣之子亦不能得之於臣是以行年六十老而為輪今聖人之所言者亦已懷其實窮而死獨其糟粕在耳士蒍為晉大夫晉侯将伐虢士蔿曰不可虢公驕若驟得勝於我必棄其民棄民不養之無衆而後伐之欲禦我誰與夫禮樂慈愛戰所蓄也夫民讓事樂和愛親哀喪而後可用也上之使臣以義讓哀樂為本言不可力屈也虢弗蓄也亟戰将饑言虢不蓄義讓而力戰里克為晉大夫晉獻公使太子申生伐東山臯落氏赤狄别種也臯落其氏族里克諫曰太子奉冢祀社稷之粢盛里克晉大夫冢大也以朝夕視君膳者也膳厨膳故曰冢子君行則守有守則從從曰撫軍守曰監國古之制也夫帥師專行謀帥師者必專謀軍事誓軍旅宣號令也君與國政之所圖也非太子之事也國政正卿師在制命而已命者将軍所制禀命則不威專命則不孝故君之嗣適不可以帥師君失其官帥師不威将焉用之太子帥師是失其官也專命則不孝是為帥必不威也且臣聞臯落氏将戰君其舍之公曰寡人有子未知其誰立焉不對而退孔叔為鄭大夫楚人伐鄭鄭伯欲成孔叔曰不可齊方勤我孔叔鄭大夫勤恤其難棄徳不祥祥善也齊桓公與諸侯盟王使周公召鄭伯曰吾撫女以從楚輔之以晉可以少安周公宰孔也王恨齊桓定太子之位故召鄭伯使叛齊也楚不服于齊故以鎮安鄭也鄭伯喜於王命而懼其不朝於齊也故逃歸不盟孔叔止之曰國君不可以輕輕則失親親黨援也失親患必至病而乞盟所䘮多矣君必悔之弗聽逃其師而歸其後諸侯伐鄭孔叔言於鄭伯曰諺有之曰心則不競何憚於病競强也憚難也旣不能强又不能弱所以斃也國危矣請下齊以救國公曰吾知其所由來矣姑少待我欲以申侯説對曰朝不及夕何以待君鄭殺申侯以説於齊宫之竒為虞大夫魯僖公五年晉獻公復假道于虞以伐虢宫之竒諌曰虢虞之表也虢亡虞必從之晉不可啟寇不可翫翫習也一之為甚其可再乎為二年假晉道滅下陽諺所謂輔車相依唇亡齒寒者其虞虢之謂也輔夾輔車牙車公曰晉吾宗也豈害我哉對曰太伯虞仲太王之昭也太伯不從是以不嗣太伯虞仲皆太王之子不從父命俱讓適吳仲雍之子别封西吳虞公其後也穆生昭昭生穆以世次計故太伯與虞仲于周為昭虢仲虢叔王季之穆也王季者太伯虞仲之母弟也虢仲虢叔文王之母弟也仲叔皆虢君字為文王卿士勲在王室藏於盟府盟府司盟之官将虢是滅何愛於虞且虞能親於桓荘乎其愛之也桓荘之族何罪而以為戮不惟偪乎桓叔荘伯之族晉獻公之從祖昆弟獻公患其偪盡殺之親以寵偪猶尚害之况以國乎公曰吾享祀豐潔神必據我據猶安也對曰臣聞之鬼神非人實親惟徳是依故周書曰皇天無親惟徳是輔周書逸書又曰黍稷非馨明徳惟馨馨香之逺聞又曰民不易物惟徳繄物黍稷牲玉無徳則不見享有徳則見享言物一而用異如是則非徳民不和神不享矣神所慿依将在徳矣若晉取虞而明徳以薦馨香神其吐之乎弗聽許晉使宫之竒以其族行行去也曰虞不臘矣臘嵗終祭衆神之名在此行也晉不更舉矣不更舉兵是年晉滅虢師還舘於虞遂襲虞滅之慶鄭為晉大夫秦饑使乞糴於晉晉人弗與慶鄭曰背施無親幸災不仁貪愛不祥怒鄰不義四徳皆失何以守國虢射曰皮之不存毛将安傅虢射惠公舅也皮以喻所寄秦城毛以喻糴言旣背秦施為怨已深雖與之糴猶無皮而施毛也慶鄭曰棄信背鄰患孰恤之無信患作失援必斃是則然矣虢射曰無損於怨而厚於寇不如勿與言與秦粟不足解怨適足使秦强慶鄭曰背施幸災民所棄也近猶讎之况怨敵乎弗聽退曰君其悔是哉秦伯伐晉晉惠公乗小駟鄭入也鄭所獻馬名小駟慶鄭曰古者大事必乗其産生其水土而知其人心安其教訓而服習其道惟所納之無不如志今乘異産以從戎事及懼而變将與人易變易人意亂氣狡憤隂血周作張脉僨興外彊中乾狡戾也僨動也氣狡僨於外則血脉必周身而作隨氣張動外雖有强形而内實乾燥進退不可周旋不能君必悔之弗聽臧文仲為魯大夫魯僖公伐邾取須句邾人以須句故出師公卑邾不設備而禦之卑小也臧文仲曰國無小不可易也無備雖衆不可恃也詩曰戰戰兢兢如臨深淵如履薄冰詩小雅言常戒懼也又曰敬之敬之天惟顯思顯明也思猶辭也命不易哉周頌言有國宜敬戒天明臨下奉承其命甚難先王之明徳猶無不難也無不懼也况我小國乎君其無謂邾小蠭蠆有毒而况國乎弗聽公及邾師戰于升陘我師敗績二十一年夏大旱公欲焚巫尫巫尫女巫也主祈祝請雨者或以為尫非巫也瘠病之人其面上向俗謂天哀其病恐雨入其鼻故為之旱是以公欲焚之文仲曰非旱備也修城郭貶食省用務穡勸分穡稻也勸分有無相濟也此其務也巫尫何為天欲殺之則如勿生若能為旱焚之滋甚公從之是歲也饑而不害公子目夷宋司馬子魚也宋人圍曹子魚言於宋公曰文王聞崇徳亂而伐之軍三旬而不降崇崇侯虎退修教而復伐之因壘而降復往攻之備不改前而崇自降也詩云刑于寡妻至于兄弟以御于家邦詩大雅言文王之教自近及遠寡妻嫡妻謂太姒也刑法也今君徳無乃猶有所闕而以伐人若之何盍姑内省徳乎無闕而後動公孫固宋荘公之孫也為大司馬楚人伐宋宋公将戰固諌曰天之棄商久矣君将興之弗可赦也已言君興天所棄必不可不如赦楚勿與戰也弗聽戰于泓宋師敗績寗荘子名俞衛大夫也衛文公有邢翟之虞不能禮晉文公重耳寗荘子言於公曰夫禮國之紀也親民之結也善徳之建也此三者公之所慎也晉公子善人也而衛親也君不禮焉棄三徳矣君其圖之康叔文之昭也唐叔武之穆也周之大功在武茍姬未絶周室而卑守天聚者必武族武族惟晉實昌晉裔公子實徳晉仍無道天祚有徳晉之守祀必公子也若復而修其徳鎮撫其民必獲諸侯以討無禮君弗蚤圖衛而在討小人是懼敢不盡心公弗聽叔詹詹一作瞻鄭大夫也晉公子重耳過鄭鄭文公不禮焉叔詹諫曰天之所啟人弗及也晉公子有三焉天其或者将建諸君其禮焉男女同姓其生不蕃蕃息也晉公子姬出也而至于今一也大戎狐姬之子故曰姬出離外之患出亡在外而天不靖晉國殆将啟之二也有三士足以上人而從之三也國語云狐偃趙衰賈佗三人皆卿才晉鄭同儕儕等也其過子弟固将禮焉况天之所啟乎弗聽叔詹曰若不禮焉則請殺之諺曰黍稷無成不能為榮稷粢也無成謂死榮秀也黍不為黍不能蕃廡為成蕃滋廡豐也稷不為稷不能蕃殖殖長所生不疑惟徳之基所生謂生黍得黍種稷得稷若不禮重耳則當除之不耳則當宜厚之如此不疑是為得基公弗聽胥臣晉大夫晉文公問曰吾欲使陽處父傅讙也而教誨之其能善乎陽處父晋太傅陽子也讙文公子襄公名對曰是在讙也蘧蒢不可使俯蘧蒢直者為疾戚施不可使仰戚施屈者僬僥不可使舉僬僥長三尺不能舉重侏儒不可使援侏儒短者不能亢援矇瞍不可使視有眸子而無見曰矇無眸子曰瞍嚚瘖不可使言口不道忠信之言為嚚瘖不能言者聾瞶不可使聽耳不别五音之和曰聾生而聾曰瞶僮昬不可使謀僮無知昬闇亂質将善而賢良賛之則濟可竢也賛導也若有違質違邪教将不入不入其心其何善之為言不使臣臣聞昔者太姒娠文王不變娠有身也不變不動也少溲于豕牢少不溲便也而得文王不加病焉言易也文王在母不憂體不變故不憂在傳不懃處師弗煩事王不怒王謂王季敬友二虢善兄弟曰友二虢文王弟虢仲虢叔而慈惠二蔡惠愛也二蔡文王子也管叔初亦為蔡刑于太姒刑法也太姒文王妃也比于兄弟比親也兄弟同宗之弟詩云刑于寡妻至于兄弟以御于家邦寡妻寡徳之妻謂太妊也御治也於是乎用四方之賢良以自輔也及其即位也詢于八虞詢謀也八虞周八士皆在虞官而咨于二虢咨謀也度于閎天而謀于南宫皆周賢臣度亦謀也南宫括諏于蔡原而訪于辛尹諏訪皆謀也蔡公原公辛辛甲尹尹佚皆周賢大夫也重之以周召畢榮周周文公召召康公畢畢公榮榮公也億寧百神億安也而和柔萬民柔安也故詩曰惠于宗公神罔時恫惠順也宗公大臣也恫痛也言文王為政咨于臣順而行之故鬼神無怨恫者也若是則文王非專教誨之力也言因體也公曰然則教無益乎對曰胡為文益其質亦有美質加以文采乃善故人生而學非學不入不入不入于道也公曰柰夫八疾何蘧蒢至僮昬對曰官師之所材也師長也材古裁字戚施直鎛直主擊者鎛主鐘者蘧蒢蒙璆蒙載也璆玉磬不能俯故使擊磬侏儒扶盧扶緣也盧矛㦸也緣之以為戲也矇瞍循聲目無見于音聲則聞使循之聾瞶司火耳無聞于視則審故使主火僮昬嚚瘖僬僥官師之所不材也所不能裁用以實裔土荒裔夫教者因體能質而利之者也能質性能也若川然有原以印浦而後大印迎也言川已有原因開利迎之以浦然後大也郭偃晋大夫晋文公問於郭偃曰始也吾以國為易今也難對曰君以為易其難也将至矣君以為難其易也将至矣以為難而勤修之故其易将至矣䰻者史失其名晋人也晉文公出田逐獸碭入大澤迷不知所出其中有䰻者文公謂曰我若君也道安從出我且厚賜若䰻者曰臣願有獻文公曰出澤而受之於是遂出澤文公令曰子之所欲以教寡人者何等也願受之䰻者曰鴻鵠保河海之中厭而欲移徙于小澤則必有繳矰之憂蚖鼉保深淵厭而之淺渚則必有羅網釣射之憂今君逐獸碭入至此何行之太遠文公曰善哉謂從者記䰻者名䰻者曰君何以名為君其尊天事地敬社稷固四國慈愛萬民薄賦歛輕租税者臣亦與焉君不敬社稷不固四國外失禮於諸侯内逆民心一國流亡䰻者雖有厚賜不得保也遂辭不受曰君亟歸國臣亦反吾䰻所册府元龜卷七百四十
