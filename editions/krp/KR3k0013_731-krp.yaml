body:
  text: 册府元龜卷七百三十一宋王欽若等撰陪臣部總序古者建侯分土皆有臣吏若有虞庖正有仍牧正之比夏商以徃其詳蓋闕周王之制始以諸侯上大夫卿下大夫上士中士下士爲五等大國三卿皆命於天子次國三卿二卿命於天子一卿命於其君小國二卿皆命於其君而國皆有下大夫五人上士二十七人平王東遷諸侯立政家陪之職多擬王室其見於春秋者魯有司徒司馬司空司宼太宰皆卿官也諸侯倣此祝宗卜史之職大祝掌祠祀宗人掌禮太卜掌卜筮太史掌記事諸國皆有但不備見於經爾魯太史之外復有外史又有工正掌車服隧正主役徒周人掌圖籍宰人掌禮書馬正校人掌馬縣邑則有大夫宰以守邑有賈正掌物價諸國縣邑皆有大夫唯楚縣置尹或僣稱公宋以司徒爲司城避武公諱有大司馬少司馬司馬大司徒司徒右師左師大司宼少司宼司宼太宰太宰督少宰大尹卿正門尹又有御士主公御司里掌閭里迹人主迹禽獸校正主馬工正主車晉以司徒為中軍避僖侯諱有大司空司空太傅司㓂司馬太師太史之職三軍之外復有中行右行左行之官周制大國三軍皆以卿將之大夫佐之晉舊有三軍又新作三軍避天子六軍之制故以行爲右又有軍司馬軍尉軍候亞旅侯奄皆掌軍事又有候正主斥候輿師主兵車校正主馬司士主車右五正主五官執秋主爵秩七輿大夫主車輿大士主治獄公族旄車掌公族餘子掌公適子之母弟公行掌庶子輿尉掌役司典掌典籍復陶主衣服筮史膳宰樂師各掌其事齊卿官及太史太師之外有銳司徒主銳兵辟司徒主辟壘工正主百工衡虞主山舟鮫掌澤虞候掌藪祈望掌海又有侍漁監取魚虞人掌山澤縣大夫之外别有師掌地域楚有令尹太宰右尹宰少宰司徒司空司馬左司馬右司馬司敗陳楚謂司寇爲司敗七大夫莫敖若敖連尹工尹樂尹藍尹箴尹鍼尹囂尹陵尹寢尹沈尹芉尹郊尹卜尹莠尹門尹馬尹宫廐尹中廐尹又有太師掌環列之尹封人主役右領左史爲賤官縣尹之外又有司馬鄭卿官之外有司宮主宮令正主作辭令馬師主馬封人主封疆卜大夫府人庫人郊人各掌其事其餘國則衛有右宰吳有太宰隨有少師它職皆不見於經其戰國之際公侯多僣王號諸國皆有相國假相國上卿客卿國尉御史田部吏其用兵則有大將軍將軍軍師監宰禆將等官縣則有園吏市椽監門之職秦孝公時又置縣令以公士上造簪褭不更不更亦見於春秋大夫公大夫官大夫公乘五大夫左右庶長左更中更右更少上造大上造駟車庶長大庶長關内侯徹侯爲二十爵惠文君時又置左右丞相及有犀首之官若漢虎牙將軍楚又有左徒三閭大夫其家臣則春秋時有冡宰冡司馬祝宗差車戰國有舍人中庶子其太子官及官者皆見於本序此不復紀夫陪貳藩國分守官次所以輔翊其主尊屏王室而有智用淵達謀慮沈敏挺賢懿之德秉忠亮之操方正不撓辭令克允爲禮明上下之等臨政適寛猛之要規正闕失薦達賢彥臨難而盡節受邑而建嗣至於擅命恣横僣上奢縱罔循典禮連搆禍危詭譎交變戕賊肆害任性以忿競棄國而奔越咸用論叙以著於篇凡陪臣部二十門封邑立嗣封邑周制卿大夫士有禄秩之差諸侯亦自命其陪臣卿佐故其家邑采地制䘵受封亦惟舊矣東遷之後庶邦立政雖大國之卿當命於天子者亦罕聞焉若夫覇者之土過於數圻强家之賦踰於百乘當其以能詔爵以功裂壤賞之以衍沃錫之以陪敦傳世延嗣保姓受氏自爾胄緒蕃衍宗族熾大專制國命以弱公室者亦固有之傳曰末大必折尾大不掉其是之謂也桓叔晉文侯弟成師也文侯封之於曲沃曲沃邑大於翼翼晉君都邑也成師封曲沃號爲桓叔靖侯庶孫欒賔相桓叔桓叔是時年五十八矣好德晉國之衆皆附焉君子曰晉之亂其在曲沃矣末大於本而得民心不亂何待共叔段鄭莊公母弟也母姜氏爲共叔段請制公曰制巖邑也虢叔死焉他邑惟命虢叔東虢君也恃制巖險而不修德鄭滅之恐段復然故闢以他邑虢國號今滎陽縣請京使居之謂之京城大叔公順姜請使段居京師謂之京城大叔言寵異於衆臣京鄭邑今滎陽京縣季犮魯莊公弟也僖公元年以汝陽鄪封季友汝陽鄪魯二邑韓武子爲晉大夫封於韓原趙夙畢萬皆晉大夫晋獻公伐魏趙夙御戎畢萬爲右以滅耿滅霍滅魏還賜趙夙耿賜畢萬魏趙衰晉大夫晉文公伐曹衛兵先下山東而以原封趙衰河内沁水縣西北有原城狐溱陽處父皆晉大夫先食於溫地郤缺晉大夫晉襄公反自箕以一命命郤缺爲卿復與之冀孫叔敖爲楚相及卒其子窮困負薪逄優孟優孟謂楚莊王曰念爲亷吏奉法守職竟死不敢爲非亷吏安可爲也楚相孫叔敖持亷至死及今妻子窮困負薪而食不足爲也於是莊王謝優孟乃召孫叔敖子封之寢丘在固始四百户以奉其祀後十世不絶士伯晉大夫晉荀林父敗赤狄於曲梁乃滅潞晉侯治兵于稷以略狄土賞桓子林父也狄臣千室賞士伯以瓜衍之縣曰吾獲狄士子之功也微子吾䘮伯氏矣北郭佐齊大夫齊慶氏亡皆召羣公子具其器用而反其邑焉與晏子邶殿其鄙六十弗受與北郭佐邑六十受之子展子産皆鄭大夫鄭伯賞入陳之功享子展賜之先輅三命之服先八邑賜子產次輅再命之服先六邑子產辭邑曰自上以下降殺以兩禮也臣之位在四且子展之功也臣不敢及賞禮請辭邑公固予之乃受三邑鬬辛楚大夫魯昭公十四年楚子殺鬬成然後滅養氏之族使鬬辛居鄖魏舒爲晉卿韓宣子卒魏獻子爲政獻子即魏舒也分祁氏之田以爲七縣分羊舌氏之田以爲三縣司馬彌牟為鄔大夫賈辛爲祁大夫司馬烏爲平陵大夫魏戍爲梗陽大夫知徐吾爲塗水大夫韓固爲馬首大夫孟丙爲孟大夫樂霄爲銅鞮大夫趙朝爲平陽大夫僚安爲楊氏大夫夫概王吳王闔閭弟也夫概王自立爲王敗走奔楚楚王封夫概王於棠谿在慎縣一云汝南有吳房縣爲棠谿氏田常齊大夫割安平以東爲己封封邑大於齊顏涿聚齊大夫顏庚也魯哀公二十七年晉荀瑤伐鄭鄭請救于齊齊師將興陳成子設乘車兩馬繫五邑焉乘服車兩馬大夫服又加之五邑召涿聚之子晉曰隰之役而父死焉隰役在二十三年以國之多難未汝恤也今君命汝以是邑也服車而朝無廢前勞伯魯趙簡子太子也簡子廢伯魯立子母䘏簡子卒毋䘏立是爲襄子襄子姊前爲代王夫人簡子既塟未除北登夏屋山在廣武請代王使厨人操銅枓以食代王及從者行斟隂令宰人各一作雒以枓擊殺代王及從官遂興兵平代地遂以代封伯魯子周爲代成君樂羊為魏文侯將伐取中山文侯封樂羊以靈壽屬在恒山蘇秦爲趙相既約六國從親歸趙趙肅侯封爲武安君樂毅爲燕亞卿伐齊破之濟西追至於臨淄齊湣王之敗濟西亡走保於莒樂毅獨留狥齊齊皆城守樂毅攻入臨淄盡取齊寳財物祭器輸之燕燕昭王大悅親至濟上勞軍行賞饗士封樂毅於昌國屬齊號爲昌國君毅狥齊五嵗下齊七十餘城唯獨莒即墨未服昭王死惠王使騎刼代將而召樂毅樂毅畏誅西降趙趙封樂毅於觀津號曰望諸君燕王復以樂毅子樂間爲昌國君田單爲齊將大敗燕軍燕軍敗走楚王遂夷殺其將騎刼燕軍擾亂奔走齊人追亡逐北所過城邑皆畔燕而歸齊田單兵日益多乘勝燕日敗亡卒至河上而齊七十餘城皆復爲齊乃迎襄王於莒入臨淄而聼政襄王封田單號曰安平君亷頗爲趙將大破燕軍於鄗殺燕將栗腹遂圍燕燕割五城請和乃聽之趙以尉文邑也封亷頗爲信陵君爲假相國樂乘昌國君樂間之宗也燕王喜用其相栗腹之計欲攻趙而問樂間樂間曰趙四戰之國也其民習兵伐之不可燕王不聽遂伐趙趙使亷頗擊大破栗腹之軍於鄗禽栗腹樂乘趙封樂乘爲武襄君范睢爲秦相秦昭王封睢以應號爲應侯蔡澤爲秦相數月人或惡之懼誅乃謝病歸相印號爲綱成君李宗老子之子也爲魏相封於段干魏邑名馮亭爲韓上黨守秦昭王四十五年伐韓之野王野王降秦上黨道絶亭與民謀曰鄭道已絶河南新鄭韓之國都是也韓必不可得爲民秦兵日進韓不能應不如以上黨歸趙趙若受我秦怒必攻趙趙被兵必親韓韓趙爲一則可以當秦因使人報趙趙孝成王與平陽君平原君計之平陽曰不如勿受受之禍大於所得平原君曰無故得一郡受之便趙受之因封馮亭爲華陽君樗里子秦惠王弟也惠王二十五年使樗里子爲將伐趙虜趙將軍莊豹㧞藺明年助魏章攻楚敗楚將屈匄取漢中地秦封樗里子號爲嚴君魏冉爲秦相秦昭王封魏冉於穰復邑於陶一作隂號曰穰侯衛鞅爲秦相孝公使鞅將而伐魏既破魏還秦封之於商𢎞農商縣也十五邑號爲商君趙奢趙之田部吏也秦伐韓軍於閼與趙王令趙奢將救之大破秦軍秦軍解而走遂解閼與之圍而歸趙惠文王賜奢號爲馬服君李牧爲趙將趙幽繆王三年封李牧爲武安君田嬰爲齊大夫齊將封嬰於薛楚武王聞之大怒將伐齊齊王有輟志公孫閈曰封之成與不非在齊也又將在楚閈說楚王令其欲封公也又甚於齊嬰曰願委之於子公孫閈謂楚王曰魯宋事楚而齊不事者齊大而魯宋小王獨利魯宋之小不惡齊之大何也夫齊之削地而封田嬰是其所以弱也願勿止楚王曰善因不止田文爲齊相封孟嘗君既救趙趙王封之武城田忌爲齊大夫亡齊而之楚鄒忌代之相齊恐田忌欲以楚權復於齊杜赫曰臣請爲留楚謂楚王曰鄒忌所以不善楚者恐田忌以楚權復於齊也王不如封田忌於江南以示忌之不復返齊也鄒忌必以齊厚事楚田忌亡人也而得封必德王若復於齊必以齊事楚此用二忌之道也楚果封之於江南鄒忌子以鼔琴見齊威王三月而受相印期年封以下邳號曰成侯公子無忌魏昭王少子安釐王異母弟也昭王薨安釐王即位封公子爲信陵君黄歇爲楚相封春申君賜淮北地十二縣後十五嵗黄歇言於楚王曰淮北邊齊其事急請以爲郡便因獻淮北十二縣請封於江東考烈王許之春申君因城故吳墟自以爲都邑趙勝爲趙相封於東武城屬清河張儀秦惠王時爲相封五邑號武信君白起秦昭王時爲相封武安君李同趙邯鄲傳舍吏子也秦惠王圍邯鄲邯鄲急且降平原君甚患之李同説平原君平原君從之得敢死之士三千人李同遂與三千人赴秦軍秦軍爲之却三十里亦㑹楚魏救至秦兵遂罷邯鄲復存李同戰死封其父爲李侯河南成臯有李城虞卿遊說之子也說趙季成王再見爲趙上卿食邑於虞故號為虞卿呂不韋陽翟人也秦莊襄王元年爲丞相封文信侯食河內雒陽十萬戸立嗣春秋之世諸侯立政家陪之列或執國命傳祚强大與國升降遠者綿綿不絶近者不十數世其有父没子繼兄亡弟及或家老請嗣或宗人議立或决於龜筮或私於憎愛亂亡之患爭奪之源於兹多矣然而年鈞擇賢義鈞以卜所以生世適之嗣承大宗之重克荷先業大庇族人自非奉若前訓以稽乎至順愼求令德無忝爾祖亦曷能潔蒸嘗而纉基緒者哉石駘仲衛大夫石碏之族也駘仲卒無適子有庶子六人卜所以爲後者莫適立也曰沐浴佩玉則兆言齊潔則得吉兆五人者皆沐浴佩玉石祁子曰孰有執親之䘮而沐浴佩玉者乎不沐浴佩王心正且知禮石祁子兆衞人以龜爲有知也趙衰字子餘晉大夫初從公子重耳文公也奔狄狄人伐廧咎如獲其二女納諸公子公子以叔隗妻趙衰生盾後文公妻趙衰文公以女妻趙衰生原同屏括樓嬰趙姬請逆盾與其母趙姬文公女子餘辭姬曰得寵而忘舊何以使人必逆之固請許之來以盾爲賢請于公以爲嫡子而使其三子下之公孫敖魯大夫也出奔莒魯人立文伯文伯敖子敷也文伯疾而請曰榖之子弱子孟獻子年尚少請立難也難敷弟許之文伯卒立惠叔趙武晉大夫盾之孫朔之子也朔妻晉成公女莊姬也晉討趙同趙括同括竝盾之弟也武從姬氏畜於公宮以其田與祁奚韓厥言於晉侯曰成季之勲宣孟之忠成季趙衰宣孟趙盾而無後爲善者懼矣乃立武而反其田焉仲嬰齊魯大夫公孫嬰齊也未見於經爲公孫嬰齊今見於經爲仲嬰齊公孫嬰齊則曷爲謂之仲嬰齊爲兄後也爲兄後則曷爲謂之仲嬰齊括本公孫爲人後者爲之子也更爲公孫之子故不得復氏公孫爲人後者爲其子則其稱仲何括氏非一孫以王父字爲氏也謂諸侯子也顧興滅繼絶故紀族明所出然則嬰齊孰後後歸父也歸父使于晉而未反宣公十八年自晉至檉奔齊訖今未還何以後之括已絶也叔仲恵伯傳子赤者也叔仲者叔彭生氏也文家自積於叔叔仲有長幼故連氏之經云仲者明春秋質家當積於仲惠謚也文公死子幼子赤幼也公子遂謂叔仲惠伯曰君幼如之何願與子慮之叔仲惠伯曰吾子相之老夫抱之禮大夫七十而致仕若不得謝則必賜之几杖行役以婦人從適四方乘安車自稱曰老夫何幼君之有公子遂知其不可與謀退而殺叔仲惠伯弑子赤而立宣公殺叔仲惠伯不書者舉弑君爲重叔仲惠伯事與荀息相類不得爲累者有異也叔仲惠伯直先見殺耳不如荀息死之宣公死成公幼臧宣叔者相也臧孫許宣謚君死不哭聚諸大夫而問焉曰昔者叔仲惠伯之事孰爲之諸大夫皆雑然曰仲氏也其然乎於是遣歸父之家時見君幼欲以防示諸大夫然後哭君歸父使乎晉還自晉至檉聞君薨家遣墠帷哭君成踊反命於介自是走之齊魯人徐傷歸父之無後也徐者皆共之辭也闗東語傷其先人爲惡身見逐幼不忿懟也於是使嬰齊後之也弟無後兄之義爲亂昭穆之序失父子之親故不言仲孫明不與子爲父孫鮑牽齊大夫也齊刖鮑牽來召鮑國而立之國牽之弟文子初鮑國棄鮑氏而來爲施孝叔臣氏施卜宰句湏吉卜立冡宰施氏之宰有百室之邑與句湏邑使爲宰以譲鮑國而致邑焉施孝叔曰子實吉對曰能與忠良吉孰大焉鮑國相施氏忠故齊人取以爲鮑氏後國佐齊大夫殺慶克以榖叛齊侯復之國勝言難于晉使待命于清勝國佐子使以髙氏之難告晉齊欲討國佐故留其子於外成十八年齊殺國佐于内宮之朝使清人殺國勝國弱來奔弱勝之弟王湫奔萊湫國佐黨慶封爲大夫慶佐爲司寇封佐皆慶克子既齊侯反國弱使嗣國氏禮也佐云罪不及乏祀荀偃晉大夫將中軍伐齊還荀偃癰疽生瘍於頭濟河及著雍病目出大夫先歸者皆反士匄請見弗納請後曰鄭甥可鄭甥荀吳其母鄭女公孫黒肱鄭大夫黒肱有疾歸邑于公召室老宗人立段段子石黒肱子季武子魯大夫無適子公彌長而愛悼子欲立之公彌公鉏悼子紇也訪於申豐曰彌與紇吾皆愛之欲擇才焉而立之申豐趨退歸盡室將行申豐季氏屬大夫他日又訪焉對曰其然將具敝車而行其然猶必爾乃止止不立紇訪於臧紇臧紇曰飲我酒吾爲子立之季氏飲大夫酒臧紇爲客爲上賓既獻己獻酒臧孫命北靣重席新樽潔之酒樽既新復潔澡之召悼子降逆之大夫皆起臧孫下迎悼子及旅而召公鉏獻酬禮畢而通行爲旅使與之齒使從庶子之禮列在悼子之下季孫失色恐公鉏不從季氏以公鉏爲馬正馬正家司馬慍而不出閔子馬見之閔子馬閔馬父曰子無然禍福無門唯人所召爲人子者患不孝不患無所所位處敬共父命何常之有言廢置在父無常位也若能孝敬富倍季氏可也父寵之則可富姦囘不軌禍倍下民可也禍甚於貧賤公鉏然之敬共朝夕恪居官次次舍也季孫喜使飲己酒而以具徃盡舍旃具饗燕之具故公鉏氏富又出爲公左軍出季氏家臣仕於公孟莊子魯大夫也孟孫惡臧孫不相善季孫愛之愛其成己志孟氏之御騶豐點好羯也羯孟莊子之庶子孺子秩之弟孝伯也曰從余言必爲孟孫爲孟孫後再三云羯從之孟莊子疾豐點謂公鉏茍立羯請讐臧氏使孟氏與公鉏共憎臧孫公鉏謂季孫曰孺子秩固其所也固自當立若羯立則季氏信有力於臧氏矣臧氏因季孫之欲立紇而定之猶爲有力今若專立孟氏之少則季氏有力過於臧氏矣弗應孟孫卒公鉏奉羯立於尸側尸側䘮位季孫至入哭而出曰秩焉在公鉏曰羯在此矣季孫曰孺子長公鉏曰何長之有唯其才也季孫廢鉏立紇云欲擇才故以此答之且夫子之命也遂誣孟孫遂立羯秩奔邾臧孫紇魯大夫出奔邾初臧宣叔娶於鑄生賈及爲而死鑄國濟北蛇邱縣所治繼室以其姪女子謂兄弟之子爲姪穆姜之姨子也姪穆姜姨母之子與穆姜姨兄弟生紇長於公宮姜氏愛之故立之立爲宣叔嗣臧賈臧爲出在鑄還舅氏也臧武仲自邾使告臧賈且致大蔡焉大蔡大龜曰紇不敏失守宗祧逺宗廟爲祧敢告不弔不爲天所弔恤紇之罪不及不祀言應有後子以大蔡納請其可請爲先人立後賈曰是家之祸也非子之過也賈聞命矣再拜受龜使爲以納請賈使爲爲己請遂自爲也爲自爲請臧孫如防臧孫邑使來告曰紇非能害也知不足也言使甲從己但慮事淺耳非敢私請爲其先人請也茍守先祀無廢二勲二勲文仲宣叔敢不辟邑據邑請後故孔子以爲要君乃立臧爲臧紇致防而奔齊崔杼齊大夫也生成及疆而寡偏䘮曰寡寡特也娶東郭姜生明東郭姜以孤入曰棠無咎無咎棠公之子與東郭偃相崔氏東郭偃姜之弟也崔成有疾而廢之有惡疾而立明成請老於崔濟南東朝陽縣西北有崔氏城欲居崔邑以終老崔子許之偃與無咎弗予曰崔宗邑也必在宗主宗邑宗廟所在宗主謂崔明成與疆怒將殺之告慶封曰夫子之身亦子所知也唯無咎與偃是從父兄莫得進矣大恐害夫子敢以告夫子謂崔杼慶封曰子姑退吾圖之告盧蒲嫳嫳慶封屬大夫封以成疆之言告嫳盧蒲嫳曰彼君之讐也天或者將棄彼矣彼實家亂子何病焉君謂齊莊公爲崔杼所弑崔之薄慶之厚也崔敗則慶專權他日又告成疆復告慶封曰茍利夫子必去之難吾助汝崔成崔疆殺東郭偃棠無咎於崔氏之朝崔子怒而出其衆皆逃求人使駕不得使圉人駕寺人御而出圉人養馬者寺人奄士且曰崔氏有福止余猶可恐滅家禍不止其身遂見慶封慶封曰崔慶一也言如一家是何敢然請爲子討之使盧蒲嫳帥甲以攻崔氏崔氏堞其宮而守之堞短垣使其衆居短垣内以守弗克使國人助之遂滅崔氏殺成與疆而盡俘其家其妻縊妻東郭姜也嫳復命於崔子且御而歸之嫳爲崔子御至則無歸矣乃縊崔明夜辟諸大墓開先人之塜以藏之遂奔魯髙止齊大夫也出奔燕故髙䜿以盧叛䜿髙止子閭丘嬰帥師圍盧髙䜿曰茍使髙氏有後請致邑還邑於君齊人立敬仲之曽孫酀敬仲髙傒良敬仲也良猶賢也髙䜿致盧而出奔魯駟偃字子游鄭大夫也偃娶於晉大夫生絲弱弱幼少其父兄立子瑕子瑕子游淑父駟乞臧㑹魯人也臧昭伯如晉㑹竊其寳龜僂句僂句龜所出地名以卜爲信與僣僣吉僣不信也臧氏老將如晉問問昭伯起居㑹請徃代家老行昭伯問家故盡對故事也及内子與母弟叔孫則不對内子昭伯妻不對若有他故再三問不對歸及郊㑹逆問又如初又不對至次於外而察之皆無之執而戮之逸奔郈郈魴假使爲賈正焉郈在東平無鹽縣東南魴假郈邑大夫賈正掌貨物使有常價若市吏然計於季氏送計簿於季氏臧氏使五人以戈楯伏諸桐汝之間桐汝里名㑹出逐之反奔執諸季氏中門之外平子怒曰何故以兵入吾門拘臧氏老季臧有惡相怨惡及昭伯從公昭伯從昭公孫齊平子立臧㑹立以爲臧氏後㑹曰僂句不余欺也傳言卜筮之驗善惡由人季桓子有疾命正常曰無死正常桓子之寵臣欲付以後事故勅令勿從己死南孺子之子男也則以告而立之南孺子桓子之妻言若生男告公而立之女也則肥也可肥康子也季孫卒康子即位既葬康子在朝在公朝南氏生男正常載以如朝告曰夫子有遺言命其圉臣曰南氏生男則以告於君與大夫而立之今生矣男也敢告遂奔衛康子請退退辟公公使共劉視之共劉魯大夫則或殺之矣乃討之討殺者公儀仲子之䘮檀弓免焉故爲非禮以非仲子也禮朋友皆在他邦乃袒免仲子舍其孫而立其子此其所立非也公儀蓋魯同姓周禮適子死命適孫爲後檀弓曰何居我未之前聞也居讀爲姬姓之姬齊魯之間語也前猶故也趨而就子服伯子於門右曰仲子舍其孫而立其子何也去賓位就主人兄弟之賢者而問之子服伯子蓋仲孫蔑之𤣥孫子服景伯蔑魯大夫伯子曰仲子亦猶行古之道也昔者文王舍伯邑考而立武王微子舍其孫腯而立衍也夫仲子亦猶行古之道也伯子爲親者隠耳立子非也文王之立武王權也微子適子死立其弟衍者乃殷禮也子游問諸孔子孔子曰否立孫據周禮惠叔蘭衛將軍文子彌牟之弟司寇惠子也惠子之䘮惠叔蘭生子虎子游爲之麻衰牡麻絰惠子廢適立庶爲之重服以譏之麻衰以重服之布爲衰文子辭曰子辱與彌牟之弟游謝其存時又辱爲之服敢辭止之服也子游曰禮也文子退反哭子游名習禮文子亦以爲當然未覺其所譏子游趨而就諸臣之位深譏之大夫之家臣位在賓後文子又辭曰子辱與彌牟之弟游又辱爲之服又辱臨其䘮敢辭止之在臣位子游曰固以請再不從命文子退扶適子南靣而立曰子辱與彌牟之弟游又辱爲之服又辱臨其䘮虎也敢不復位覺所譏也虎適子名文子親扶而辭敬子游也南靣而立則諸臣位在門内北靣明矣子游趨而就客位趙簡子晋大夫也子母䘏襄子也母賤翟婢也簡子盡召諸子與語母䘏最賢乃廢太子伯魯而以母䘏爲太子趙㐮子爲兄伯魯之不立也不肯立子且必欲傳位與伯魯子代成君代成君先死乃取代成君子浣立爲太子田嬰齊宣王庶弟也嬰有子四十餘人其賤妾有子曰文嬰使文主家待賓客賓客日進名聲聞於諸侯諸侯皆使人請薛公田嬰以文爲太子嬰許之嬰卒謚爲靖郭君皇覧曰靖郭君冢在魯國薛城中東南陬而文果代立於薛是爲孟嘗君册府元龜卷七百三十一
