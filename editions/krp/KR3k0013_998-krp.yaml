  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_998-1a}
body:
  text: 冊府元龜卷九百九十八宋王欽若等撰外臣部姦詐古者天子守在四夷脩其教而不易其俗故知桀驁詭詐荒服之性也懐柔率服中國之道也彼俗不與諸夏同則此教不可一揆理仁義不通亷恥遂絶虺毒獸狡吞噬為心争先競逐貪婪是務見利忘義棄徳背恩侵凌冦鈔何代能悛固當修誠厚餌結其野心多方預備防其竊發雖姦詐百端已在吾彀中矣漢閩粤君揺都東甌世號東甌王後數世孝景三年吳王濞反欲從閩粤招粤令從之閩粤未肯行獨東甌從及吳破東甌受漢購殺吳王丹徒以故得不誅武帝元鼎五年南粤反閩粤王餘善上書請以率卒八千從樓船擊吕嘉等兵至掲陽以海風波為解解者自說若今言分疏不行持兩端陰使南粤遣使與相知匈奴且鞮單于初立恐漢襲之盡歸漢使之不降者路充國等於漢單于自謂我兒子安敢望漢天子漢天子我丈人行丈人尊老之稱也行音乎浪切漢遣中郎將蘇武厚幣賂遺單于單于益驕禮甚倨非漢所望也烏孫國治赤谷城孝武遣貳師將軍李廣利再出天子使使告烏孫大發兵擊宛烏孫發二千騎往持兩端不肯前南粤王趙佗孫胡為南粤王立三年閩粤王郢興兵南擊邊邑南粤使人上書曰兩粤俱為籓臣毋擅興兵相攻擊今東粤擅興兵侵臣臣不敢興兵唯天子詔之扵是武帝多南粤義多猶重也守職約守籓臣之職而不踰約制為興師遣兩將軍往討閩粤兵未踰嶺閩越王弟餘善殺郢以降扵是罷兵天子使嚴助往南粤諭意南粤王胡頓首曰天子乃興兵誅閩粤死亡以報徳遣太子嬰齊入宿衛謂助曰國新被㓂使者行矣胡方日夜裝入見天子助去後其大臣諌胡曰漢興兵誅郢亦行以驚動南粤且先王言事天子期毋失禮要之不可以怵好語入見怵誘也不可被誘怵以好語而入漢朝也怵音先畫切入見則不得復歸亡國之勢也扵是胡稱病竟不入見匈奴烏維單于孝武元鼎中數使使好辭甘言以求和親漢使王烏闚匈奴王烏北地人習胡俗單于愛之陽許曰吾為遣其太子入質扵漢以求和親言為王烏故遣太子入質漢使楊信使於匈奴楊信說單于曰即欲和親以單于太子為質於漢單于曰非故約漢嘗遣公主給繒絮食物有品以和親品為等差也而匈奴亦不復擾邊今乃欲反古反違也令吾太子為質無㡬矣言遣太子為質則匈奴國中所餘者無㡬皆當盡也㡬音居豈切楊信既歸漢使王烏等如匈奴匈奴復讇以甘言讇古諂字欲多得漢財物紿王烏曰吾欲入漢紿詐也見天子面相結為兄弟王烏歸報漢漢為單于築邸扵長安匈奴曰非得漢貴人使吾不與誠語誠信也匈奴使其貴人至漢病服藥欲愈之不幸而死漢使路充國佩二千石印綬送其䘮厚幣直數千金單于以為漢殺吾貴使者乃留路充國不歸諸所言者單于特空紿王烏特但也殊無意入漢遣太子来質扵是匈奴數使竒兵侵犯漢邊鄯善國本名樓蘭王治扜泥城宣帝時遣一子質漢漢亦遣一子質匈奴樓蘭王死匈奴先聞之遣質子歸得立為王匈奴在漢前聞樓蘭王死故即遣質子還也漢遣使詔新王令入朝天子將加厚賞樓蘭王後妻故繼母也謂王曰先王遣兩子入漢皆不還柰何欲往朝乎王用其計謝使曰新立國未定願待後年入見天子呼韓邪單于成帝河平元年遣右臯林王伊邪莫演等奉獻朝正月既罷遣使者送至蒲坂河東之縣伊邪莫演言欲降即不受我我自殺終不敢還歸使者以聞下公卿議議者或言宜如故事受其降光禄大夫谷永議郎杜欽議不可納天子從之遣中郎將王舜往問降狀伊邪莫演曰我病狂妄言爾遣去歸到官位如故不肯令見漢使車師後王國治務塗谷太子烏貴立為王與匈奴結婚姻教匈奴遮漢道通烏孫者烏累單于咸立貪王莽賂遺故外不失漢故事然内利㓂掠又使還知子登前死王莽建國四年斬咸子登扵長安市怨恨虜㓂從左地入不絶入為㓂而虜掠使者問單于輒曰烏桓與匈奴無狀黠民共為㓂入塞譬如中國有盜賊爾咸初立持國威信尚淺盡力禁止不敢有二心天鳳二年五月莽復遣王歙與五威將王咸率伏黯丁業等六人使送右厨唯姑夕王因奉歸前所斬侍子登及諸貴人從者䘮皆載以常車縣易車也舊司農出錢市車縣次易牛至塞下單于遣雲當子男大且渠奢等至塞迎咸等至多遺單于金珍因諭說改其號匈奴曰恭奴單于曰善于賜印綬封骨都侯雲當為後安公當子男奢為後安侯單于貪莽金弊故曲聽之然㓂盜如故咸歙又以陳良等購金付雲當令自差與之差其次第多少後漢南匈奴單于安國和帝永元五年立安國初為左賢王而無稱譽左谷蠡王師子素勇黠多知前單于宣及屯屠何皆愛其氣決故遣將兵出塞掩擊北庭還受賞賜天子亦加殊異是以國中盡敬師子而不附安國繇是疾師子欲殺之其諸新降胡初在塞外數為師子所驅掠皆多怨之安國因是委計降者同謀議安國既亡為單于師子以次轉為左賢王覺單于與新降者有謀乃别居五原界單于每龍㑹議事師子輒稱病不往定襄太守皇甫稜知之亦擁護不遣單于懐憤益甚六年皇甫稜免以執金吾朱徽行度遼將軍時單于與中郎將杜崇不相平後知徽崇失和皆徴下獄死安國既為骨都侯喜等為所殺師子乃立為單于以其右温禺犢王烏居戰温禺犢王名烏居戰也始與安國同謀欲考問之烏居戰將數千人遂復反畔出塞外山谷間為吏民害大秦國王常欲通使扵漢而安息欲以漢繒綵與之交市故遮閼不得自達後趙石季龍伐遼西鮮卑段遼遼扵宻雲山遣使詐降季龍信之使征東麻秋百里郊外迎勅秋曰受降如待敵將軍慎之遼又遣使降於慕容皝皝曰胡貪而無謀吾今請降求迎彼終不疑也若伏重軍以要之可以得志皝遣子恪伏兵扵宻雲麻秋統衆三萬迎遼為恪所襲死者十六七秋歩遁而歸季龍聞之驚怒方食吐餔乃削秋官爵後魏蠕蠕主阿那瓌來朝及其還國也境上遷延仍陳窘乏遣尚書左丞元孚奉詔賑恤那瓌執孚過柔互奔于漠北遣尚書令李崇御史中尉兼右僕射元纂追討不及北齊阿至羅别部東魏興和元年十一月遣使請降神武為大將軍帥衆迎之出武州塞不見大獵而還隋奚本曰庫莫奚隋髙祖時突厥稱藩之後亦遣使入朝或通或絶最為無信突厥始畢可汗啓民之子也大業十一年來朝扵東都其年煬帝避暑扵汾陽宫八月始畢率其種落入㓂圍帝扵鴈門詔諸郡發兵赴行在所援軍方至始畢引去繇是朝貢遂絶明年復㓂馬邑唐公以兵擊走之百濟國王昌死子餘璋立大業三年璋遣使者燕文進朝貢其年又遣使者王孝隣入獻請討髙麗煬帝許之令覘髙麗動静然璋内與髙麗通和挾詐以窺中國七年帝親征髙麗使其臣國智牟來請軍期帝大恱厚加賞賜遣尚書起部郎席律詣百濟與相知明年六軍度遼亦嚴兵扵境聲言助軍實持兩端唐初突厥強盛武徳八年三月聲言為㓂命秦王率兵自潞州掩可汗之牙帳後無㓂而止突厥車鼻可汗當頡利可汗之敗北荒諸部將推為大可汗遇薛延陁為可汗車鼻不敢當遂率所部歸扵延陁為人勇烈有謀畧頗為衆附延陁惡而將誅之車鼻宻知其謀竄扵舊所阿史那賀魯貞觀中以執含地處見昆婆鼻三姓兵衆歸朝拜左驍衛將軍瑶池都督處其部落扵庭州莫賀城其後招攜離散廬帳漸多及太宗晏駕謀欲襲取西庭二州刺史駱𢎞義覺而表言之髙宗遣通事舎人橋寳明馳往慰撫賜以弓矢雜物寳明因說賀魯令長子咥運入朝宿衛咥運既行中悔屢欲子叛走寳明内防禦而外誘諭羈以至京授右驍衛中郎將尋又放歸咥運因說其父擁衆西走遂據咄陸可汗之舊地建牙入十雙河及千泉自號沙鉢羅可汗其咄陸弩矢畢下十姓悉歸附之總有西域之地髙宗咸享三年吐蕃遣其大臣仲琮來朝帝問曰我遣薛仁貴等安輯慕容之衆吐蕃掩其不備伏甲擊破之既又㓂逼凉州欲陷城堡其故何也對曰臣受命貢獻而已攻戰之事非臣所得預聞也帝竟厚賜而遣之又遣都水使者黄仁素往吐蕃報聘帝以仲琮非執權之臣又不乞和故輕其使仁素竟不得其情實而還儀鳳二年二月工部員外尚書髙臧加授遼東州都督封朝鮮郡王遣安輯髙麗餘衆髙臧既至遼東濳與靺羯相通謀叛事覺召還配流卭州并徙其人散扵河南隴右諸州貧弱者留在安東城傍安置黙啜以則天聖歴元年上言有女請賜親則天令淮陽王延秀就納之為妃仍令右豹韜衛大將軍閻知微攝春官尚書右武衛郎將楊鸞莊攝司賔卿大齎金帛送赴虜庭延秀行至突厥黙啜南庭閻知㣲楊鸞荘濳有異志宻受黙啜令騎兵數千圍延秀拘之别所乃偽號知微為可汗與之率衆襲伐静難及平狄靖邊等軍静難軍使將軍慕容元崱以兵五千人降之賊軍繇是大振俄又進冦媯檀等州吐蕃以𤣥宗先天中遣使厚遺鄯州都督楊矩因請河西九曲之地以為金城公主湯沐之所矩遂奏與之吐蕃既得九曲其地肥良堪頓兵畜牧又與唐境接近自是後率兵入㓂代宗永泰元年三月吐蕃請和遣宰相元載杜鴻漸等扵興唐寺與之盟秋七月僕固懐恩誘其衆又南犯王畿尚結贊吐蕃宰相也徳宗興元元年西平王李晟之鎮鳳翔也尚結贊頗多言謀尤惡晟乃相與議曰唐之名將李晟與馬燧渾瑊等爾三人必為我憂乃行反間遣使因馬燧以請和既和則請盟復因㑹以刼瑊因以賣燧貞元二年吐蕃用尚結贊之計乃大興兵入隴州抵鳳翔無所虜掠且曰召我故來何不持牛酒勞軍徐乃引去持是以間晟三年五月册拜晟為太尉兼中書令是年五月吐蕃果背約以劫渾瑊六月罷河東節度馬燧為司徒竟中結贊之計至貞元三年四月丙寅入吐蕃使檢校右庶子兼御史中丞崔澣至自鳴沙初澣至鳴沙與蕃相尚結贊相見宣詔問其違約陷鹽夏二州之故對曰本以定界碑被牽倒恐二國背􅉀相侵故造境中請修舊好息人蕃軍頃年敗朱泚之衆扵武功未獲酬賞所以來爾及徙涇州其節度使閉城自守音問莫達又徙鳳翔請通使扵李令公亦不見納又遣康成王真之來皆不能達大國之命日望大臣充使庶展情禮實無至者乃引軍還及鹽夏二州之師懼我之衆請以城與我求全而歸非我所陷也今君以國親將命若繼好復盟蕃之願也盟㑹之期及定界之所惟命是聽君歸奏定當以鹽夏相還又云清水之㑹同盟者少是以和好輕慢不成今蕃相及元帥已下凡二十一人赴盟靈州節度使杜希全禀性和善外境所知請令主此盟㑹涇原節度李觀亦請同主之又同章表帝聞澣誘賂蕃中給役者求其人馬真數凡五萬九千餘人馬八萬六千餘匹可戰者僅三萬人餘悉童㓜備數而已辛未以澣為鴻臚卿又兼御史中丞入吐蕃使令澣報蕃相尚結贊曰杜希全職在靈州不可出境李觀又已改官遣侍中渾瑊充盟㑹使約以五月二十四日復盟扵清水令告尚結贊以鹽夏二州歸扵我然後就盟帝疑蕃情不實以得二州為信焉結贊本請杜希全李觀同盟將劫執二節將乗其銳來犯京師希全等既不行又欲刼執渾瑊長驅入冦其始謀狡蠧如此及瑊充㑹盟使統諸道兵馬二萬人赴平凉壇與吐蕃大將尚結贊等㑹扵壇上吐蕃背約虜刼㑹盟使兵部尚書崔漢衡判官鄭叔矩判官路泌韓弇袁同直裴頲等獨瑊得他馬奔涇州後唐契丹主阿保機莊宗同光四年正月戊寅遣使梅老鞋里已下三十七人貢馬三十匹時阿保機將㓂渤海偽修好扵我虜乗虛掩擊故也明宗長興四年六月己未新州王景戡奏契丹國左右相牙盧兖與臣書稱被都要鎮偷竊馬三匹速宜送来不然則出兵剽掠范延光奏曰北方以我夏州未平欲詭間相窺時向初秋所宜防備緣邊戍兵合交畨者宜且留候秋穫訖令還從之阿保機長子東丹王突欲歸國明宗賜姓名贊華出鎮滑州在鎮多行不法頃之入覲乞留闕下明宗許之復遣使就第問所欲贊華附奏曰臣願為許州節度使明宗欲從之樞宻使范延光以為不可乃止明宗促令歸滑贊華謂使者曰若湏令赴舊地當自裁爾使者以聞明宗不恱召而證之贊華曰臣不言自裁曾言乞削髪為僧使者引統軍李從㫤為證贊華以手畫空曰使者之言如水上畫字何可據耶眀宗優容之晉少帝開運二年八月契丹瀛州刺史詐為書與樂夀監軍王巒願以本城歸順且言城中蕃軍不滿千人請朝廷發軍襲取之以為内應又云今秋苦雨川澤漲溢自瓦橋以北水勢無際戎王已歸本國若聞南夏有變北逺阻水雖欲奔命無能及也又巒繼有宻奏苦言瀛鄚可取之狀先是前嵗中車駕駐扵河上曾遣邊將遺書扵幽州趙延夀勸令歸國延夀尋有報命依違而已是嵗三月復遣都鄴杜威致書扵延夀且述朝㫖啖以厚利仍遣雒州軍將趙行實齎書而往潜申欵宻行實曾事延夀故遣之七月行實自燕囘得延夀書具言久陷虜庭願歸中國乞發大軍應接即㧞身南去叙致懇切詞旨綿宻時朝廷欣然信之復遣趙行實計㑹延夀大軍應接之所又有瀛州大將遣所親齎蠟書至闕下告云欲謀飜變以本城歸命未㡬㑹彼告變者事不果就至是瀛州守將劉延祚受戎王之命詐輸誠欵以誘我軍國家深以為信遂有出師之議周契丹永康王兀欲自漢末遣使寓書扵漢少帝㑹漢室有蕭墻之亂周太祖登極時邢州節度使劉詞馳送虜使至闕周大祖覽其書欲因便以和之廣順元年正月遣將軍朱憲伴送虜使歸國仍遺兀欲金器玉帶以結其意二月朱憲囘兀欲復遣使來賀兼獻良馬朝廷尋遣尚書左丞田敏報命仍厚其禮既而兀欲留我行人將軍姚漢英華光裔不令復命繇是復絶冊府元龜卷九百九十八
