body:
  text: 册府元龜卷三百十三宋王欽若等撰宰輔部謀猷第三唐姚崇先天中為紫微令先是中宗時公主及外戚皆奏請度人為僧尼亦有出私財造寺者富戸彊丁皆經營避役逺近充滿至是崇奏曰佛不在外求之於心佛圖澄最賢無益于全趙羅什多藝不救於亡秦何充符融皆遭敗滅齊襄梁武未免災殃但發心慈悲行事利益使蒼生安樂即是佛身何用妄度姦人令壊正法帝納其言令有司隠括僧徒以偽濫還俗者萬二千餘人宋璟為相開元五年黄門監蘇頲為紫微侍郎同在相位奏曰十月十四十五日承前諸寺觀多動音聲今傳有仗内音聲擬相誇鬭官人百姓㦯有縳綳此事儻行異常喧雜四齊雖許作樂三載猶在遏音伏惟孝理深在典故臣等既聞此事不敢不陳即日勅所在停之十一月庚戌璟與紫微侍郎蘇頲奏曰悲田養病從長安已来置使専知且國家矜孤恤窮敬老養病至扵按此各有司存今遂聚無名之人著收利之使實恐逋逃為藪隠没成姦昔仲繇仕衛出私財為粥以飼貧者孔邱非之乃覆其饋人臣私恵猶且不可國家小慈殊乖善政伏望罷之其病患人令河南府按此分付其家不許又奏朝集使每至春末還多有改轉率以為常璟奏請一切勒還絶其僥求之路七年二月己巳上封者以興慶池是符命之所里之上字符于聖名池水之源生於朱邸請刻石紀頌頒示天下璟又奏曰徴祥所寳在扵聖徳興慶休應宇内咸知頒告刻石恐塵大體望宣付國史従之五月又奏曰陛下屢降徳音勤恤人隠此誠蒼生繄賴明主用心但河北不登或須給貸貴在用遍省於差科共遵程式又考使去日恩勑再三若有饑弊隨使賑廪山東蒸黎徳施溥洽又頃者縁農桑在候恐囚繫尚多徒已下刑並責保放唯流死等色則情不可寛古人慎赦義在存法恐今有言事者未能細知直以月蝕修徳或云分野應有災祥因而多言冀惑上聽臣以為君子道長小人道消女謁不行讒夫漸逺此謂修徳也囹圄不撓甲兵不興理官在平不以深竒為獄軍將慎舉不以輕進邀功此所謂修刑也向時所陳皆朝廷常已留念縦日月慎盈滿将因此而致福必指期而有應且君子恥言浮於行故曰予欲無言又曰天何言哉四時行焉百物生焉望以至誠動神不要制書頻降其京城諸司及府縣繋囚仰重臣等即准勑與所由參詳處分帝報曰在於朕躬庶事戒慎天下或恐不稱所望卿為朕耳目焉上天降省良有以焉深輔朕之不逮郭子儀為中書令代宗大厯十年二月奏曰臣伏以魏博相衛河陽三城陕州等軍吏不寧須速安撫言甚切至帝甚然之楊炎為相初國家舊制天下財賦皆納於左藏庫而大府四時以數聞尚書比部覆其出入上下相轄無失遺及第五琦為度支鹽鐵使時京師多豪将求取無節琦不能禁乃悉以租賦進入大盈内庫以中人主之意天子以取給為便故不復出是以天下公賦為人君私藏有司不得窺其多少國用不得計其盈縮殆二十年矣中官以冗名持簿書領其事者三百人皆奉給其間連結根固不可動及炎作相頓首於帝前論之曰夫財賦邦國之大本生人之喉命天下理亂輕重皆由焉是以前代厯選重臣主之猶懼不集往往覆敗大計一失則天下揺先朝權制中人領其職以五尺官竪操邦之本豐儉盈虚雖大臣不得知則無以計天下利害臣愚待罪宰輔陛下至徳惟人是恤參校蠧弊無斯之甚請出之以歸有司度宫中經費一嵗㡬何量數奉入不敢虧用如此然後可以議政惟陛下察焉詔曰凡財賦皆歸在蔵庫一用舊式每嵗於數中量進三五十萬入大盈而度支先以其全數聞炎以片言移人主意議者以為難中外咸稱之栁渾為相貞元三年奏故尚書左丞田季羔公忠正直先朝名臣其祖父皆以孝行旌表門閭京城隋朝舊第季羔一家而已今被堂姪伯强進状請貨宅召市入馬以討土蕃一開此門恐滋不逞討賊自有國計豈資僥倖之徒且毁棄義門虧損風教望少加責罰亦可懲勸從之陸贄貞元中為中書侍郎平章事請許臺省長官自薦屬官徳宗俄又宣㫖曰外議以諸司所舉多引用親黨兼通賂遺不得實才此法行之非便今後卿等宜自選擇勿用諸司延薦贄論奏曰臣實頑鄙一無所堪猥蒙任使待罪宰相雖懐竊位之懼且乏知人之明自揣庸虚終難上報唯知廣求才之路使賢者各以彚征啓至公之門令職司皆得自達既蒙允許即已宣行南宫舉人纔至千數非臺省舊吏則是使府佐寮累經薦延多厯事任論其資望既不媿於班行考其行能又未聞於闕敗遽以騰口上煩聖聰道已難行亦可知矣陛下勤求治道務狥物情因謂舉薦非宜復委宰臣揀擇其為崇任輔弼博採輿詞可謂聖徳之盛者然於委任責成之道聽言考實之方閑邪存誠猶恐有闕陛下既納臣言而用之旋聞横議而止之於臣謀不責成於横議不考實此乃謀國者得以辭其罪議典者得以肆其誣率是而行觸類而長固無必定之計亦無必實之言計不定則理道難成言不實則小人得志國家之病常必由之昔齊桓公問管仲害霸之事對曰得賢不能任害霸也用而不能終害霸也與賢人謀事而與小人議之害霸也所謂小人者不必悉懐險詖故覆邦家盖以其意性憸邪趣向狭促以沮議為出衆以自異為不羣趍近利而昧逺圖効小信而傷大道况又言行難保恣其非心者乎伏以宰輔常制不過數人人之所知固有限極必不能徧諳諸事備閲羣才若令悉命羣官理須詢訪是則變公舉為私薦易明敡為暗投儻如議者之言所舉多有情故舉於君上且未絶私薦於宰臣安肯無詐失實之弊必又甚焉所以承前命官罕有不涉私謗雖則秉鈞不一或自狥情亦繇私訪所親轉為所賣其弊非逺聖鑒明知今又知狥浮言専任宰臣除吏宰臣不徧諳識踵前須訪於人若訪親朋則是悔其覆車不易故轍若訪於朝列則是求其私薦不如公舉之為愈二者利害惟陛下更詳擇焉恐不如委任長官慎擇寮屬所揀既少所求亦精得賢有鑒識之名失實當暗謬之責人之常性莫不愛身況於臺省長官皆是當朝華選孰肯狥私妄舉以傷名取責者耶所謂臺省長官即僕射尚書左右丞侍郎及御史大夫中丞是也陛下比擇輔相多亦出於其中今之宰臣則往日臺省長官也今之臺省長官乃将来之宰官也但是職名暫異固非行業頻殊豈有為長官之時不能舉一二屬吏居宰臣之位則可擇千百具寮物議悠悠其惑斯甚夫求才貴廣考課貴精求廣在於各舉所知長吏之薦擇是也貴精在於按名責實宰臣之序進是也往者則天太后踐祚臨朝欲收人心尤務拔擢宏委任之意開汲引之門進用不疑求訪無倦非但人得薦士亦許自舉其才所薦必行所舉輙試其於選士之道豈不傷於容易哉而課則既嚴進退皆速不肖者旋黜才能者驟升是以當代謂知人之名累朝賴多士之用此乃近於求才貴廣考課貴精之效也陛下誕膺寳厯思致治平雖好賢之心有踰於前哲而得人之盛未迨扵往時盖由寳鑒獨任於聖聰捜擇頗難於公舉仍速登延之路罕施練覈之方遂使先進者漸益凋訛後来者不相接續施一令則謗沮互起用一人則瘡痏立成此乃失於選才太精制法不一之患也則天舉用之法傷易而得人陛下慎揀之規太精而失士陛下選任宰相必異於庶官精擇長吏必愈扵末品及至宰臣獻規長吏薦士陛下即但納横議不稽始謀是以任以重者輕其言待以輕者重其事且又不辨所毁之虚實不析所試之短長人之多言何所不至是將使人無所措其手足豈獨選任之道失其端而已乎帝雖嘉其所陳長官薦士之詔竟追寢之趙退翁為相深於治道嘗議以為政之本選賢才敦節儉薄賦斂寛刑罰每對揚之際必再三奏之貞元八年表上審官六議曰臣謬登宰輔四年于兹恭承徳音未嘗不以求賢為切至於延薦職在愚臣雖當代天之功且乏知人之鑒漸積嵗月孤負聖朝無補王猷有妨賢路況多病憊兼慮闕違頃奉表章備陳肝膽陛下以臣性拙近直身病可矜不棄孱微尚加委任自此思省報効尤難莫副堯舜之心空懐尸素之懼伏惟陛下法象應期聖神廣運雲行雨施皆發自然訓誥典謨悉經㑹覽臣所以不敢援引古昔上煩天聽且以用人之要願申鄙見復念稽顙丹陛仰對宸嚴謇訥易窮遽數難辨理詳則塵黷頗甚言畧則利害未分若黙以求容茍而竊位縦天地之仁幸免在外中之責何逃非陛下用臣之意也其所欲言者皆陛下思慮之内臣但以頂戴恩造不知所為身被風毒漸憂沉痼是以懇懇勤勤切於愚誠也臣聞開元貞觀之際宰輔論事或多上書所冀獲盡情理今臣酌前代之損益體當時之通變謹獻審官六議伏惟閒宴賜其省覽其大指議宰臣曰宜博採衆賢用為輔弼今中外知其賢者伏惟陛下用之識其能者任之求其全才不可得也議進用廢官則曰異同之論是非難辨由考課難於實劾好惡雜於衆聲所以訪之彌多得之彌少選之彌切慮之彌難屬者臣因論求才選士古今為難拔十得五賢愚猶半陛下謂臣曰何必五也十得三斯可矣聖主思賢至是而宰臣不能進之非也進賢在於廣任用明殿最舉大節棄小瑕隨其所能試之以事用人之大綱也議京諸司闕官則曰當今要官多闕閑官十無一二文官武官任用資序逓遷要官本以才行閒官多因恩澤朝廷或将任使多擬要官要官則人少闕多閒官則人多闕少明當選拔者轉少在優容者轉多宜補闕員務育材用夫大厦永固是梁棟榱桷之全也聖朝致理亦庶官羣吏之能也議中外考課官則曰漢以數易長吏謂之弊政其有能理者輙増秩錫金或八九年十餘年乃入為九卿或遷三輔功績茂異遂至丞相其間不隔數官今陛下内選庶僚外委州府課績髙者不次超昇致理之法無踰于此臣愚以為黜陟宜立年限若所居要重未嘗遷徙就加爵秩其餘進退令知褒貶之必行遲速之有常如績在中等年考及限與之平轉中外迭處厯試其能使無茍且之心又無潦滯之慮議舉遺滯則曰官司既廣必委宰輔宰輔不能徧知又詢于庶官庶官不能徧知又詢於衆人衆聲囂然守有臧否十人舉之未信一人毁之可疑殆至於今兹弊未改其所舉所毁亦盡愛憎也若不於審實而承聲言之大凡常人之心以稱人之善為情以攻人之過為直茍有除授多生謗議由是宰臣每將薦用亦自重難日往月来未副聖意宜須聽時論所舉多者先用必非文故皆不棄之議擢用諸使府僚屬則曰諸使羣吏各自精求務于得人既經試效能否可知擢其賢能置之朝列或曰外使須才固不可奪臣知必不然也屬使府賔介毎有登朝本使殊以為榮自喜知人且明公選任凡才能之士名位未逹多在方鎮日月在上誰不知之思登闕廷如望霄漢宜須博採無俾久滯帝荅曰朕端拱虚懐精求至理弼違獻可允屬台臣卿道著直方識通今古思振淹滯以叙彛倫罄竭謀猷裁成議列志在禆贊實沃予衷克彰奉職之誠深得大臣之體再三省閲良多嘉重焉賈耽為相貞元十六年九月義成軍節度盧羣卒甲戌以尚書左丞李元素為義成軍節度鄭滑等州觀察營田使耽奏曰自今以後諸道節度缺但自朝廷除者冀無他慮若於軍中擢用必有向背喜懼者人心固不安帝以為然及蔡州吳少誠拒命以鹽夏節度使韓全義討之兵敗耽奏曰全義五樓退軍賊不敢追趂者應望國家恩貸伏恐須開其生路帝是之詔雪少誠杜黄裳元和初為相與憲宗語及方鎮除授黄裳言徳宗朝每方鎮死多先命中使探其軍情至則納其副倅及大将厚賂歸稱其美以是因循方鎮罕有特命帥守者陛下宜熟思貞元故事稍以法度整肅諸侯則天下何憂不治帝然其言由是用兵誅夏屬之後不容藩臣蹇傲尅復兩河威令復振盖黄裳啓其衷也又帝謂宰臣曰朕嘗覽前史見厯代帝王或怠於聽理或親於煩政互有得失其理安在黄裳對曰帝王之務在扵修己簡易擇賢任之宵衣旰食以求民瘼舍己從人以務厚下固不可怠肆安逸然事有綱領大小當務知其逺者大者至如簿書訟獄百吏能否本非人主所自任也秦始皇自程決事見嗤前代諸葛亮霸國之相耳二十罰以上皆自省之亦為敵國所誚知不久堪魏明帝欲案省尚書疑事陳矯稱其不可隋文帝日昃聽政毎令衛士𫝊食太宗皇帝亦笑其煩察則為人上之體固不可代下司職但擇人委任責其成功賞罰茍信誰不盡心傳稱舜之徳曰夫何為哉恭己正南面而已誠以能舉十六相去四㐫也豈與勞神疲體自任耳目之主同年而語哉但人主常患在不能推誠人臣之弊在不能自竭由是上疑下詐禮貌或虧欲求共理自然難致茍去此弊何患不至于理帝深然其言武元衡元和為相詔追浙西節度使李錡錡稱疾請醫理俟嵗一入朝帝以問宰相鄭絪請如錡奏元衡曰不可且錡先自請来朝詔既許之即又稱疾是可否在錡也今陛下新立天下屬耳目焉若使姦臣得遂其私則威令從此去矣帝曰遽追之錡果計窮而反李吉甫為相憲宗謂宰臣曰當今政教所施何者為急吉甫對曰為政所急諒非一端自非事舉其中固不可臻於郅理然國以人為本親人之任莫先牧宰實繫一方若㢘察得人委之臨撫列郡承式政化自宣茍或非才為蠧實甚由是而言觀察刺史之任為切自昔唐虞三載考績三考黜陟故得久於其事風化可成而末代命官多輕外任選授之際意在沙汰委以藩部自然非才刺史數廣益非慎擇加以更代促遽人無安志迎送之費竭耗不供此最為弊聖慮所及實窮政本伏望慎守良制改革前失則四海蒙福人無茍且之心帝深然之時京城諸僧有以請莊磑免稅者吉甫奏曰錢米所徴素有定額容緇徒有餘之力配貧下無告之氓必不可許帝不止李藩為相元和四年十二月憲宗謂宰臣曰前代帝王理天下或家給人足或國貧下困其故何也李藩對曰古人云儉以足用盖足用必繋於儉約誠使人君不貴珠玉唯務耕桑則人無滛心俗日孰本百姓既足君孰與不足自然府帑充羨稼穡繼登若或人君力貴異物上行下效風俗日奢去本務末衣食益乏則百姓不足君孰與足自然國貧家困賊盜乗隙而作矣今陛下永鑒前古思躋富庶躬尚勤儉自然理平伏願以知之為非難保之為急務宫室輿馬衣服器玩必須損之又損示人變風則天下幸甚帝曰儉約之事是我誠心貧富之繇如卿所説唯當上下相朂以保此道倘有踰濫極言箴規此固深期於卿等也藩等拜賀而退權徳輿為相元和五年憲宗謂宰臣曰朕以禁中舊殿嵗久傾危欲漸修葺縁國用未足每務簡儉至於車服飲食亦畏奢侈不知竟可營造否徳輿對曰仲尼謂大禹卑宫室菲飲食惡衣服為無間言漢文帝欲起露臺以百金中人十家之産曰吾奉先帝宫室常恐羞之何以臺為於是遂止是以文帝之代四海富庶俗知禮讓今陛下至誠恭儉有過前王實天下幸甚李絳為相元和七年憲宗謂宰臣曰人之行事常患不通於理己然之失追改復難古人處此復有道否絳對曰行事過差古之聖人皆所不免故天子置輔弼之任有諍臣七人皆選正直端莊之臣以備其選規主以道徳勉主以公正故主心理於中臣論正於外制理於未亂銷患於未萌主或過舉則諌以止之故上下同體猶手足之於心膂交相為用以致康寧此亦常理非難遵之事但矜得惜失常情所弊古人貴改過不吝従善如流良為此耳陛下以上聖生知研慮㡬道臣等備位無所發明伏聞聖語益慙愚瞽然無代無賢在用之與否耳昔燕昭王築臺以待賢士郭隗首進請自隗始則四方之賢聞風而至臣等雖以至愚上弼明聖茍不拒愚言同於詢芻蕘常如今日則真賢将至直諫競啓矣帝曰朕之不明固昧於理然擢用卿等唯冀直諫必當盡心無隠數進苦口之言社稷是賴非余敢私也絳等蹈舞拜謝而出憲宗又謂宰臣曰昨者地震草樹皆動揺何祥也絳對曰在昔𤣥元皇帝以大聖明睿通於天下之理因周三川之震云天地之氣不過其序人亂之也人政乖錯則上感隂陽之氣陽伏而不能出隂迫而不能昇於是有地震又孔子修春秋所記災異先地震日蝕盖地載萬物日為君象政有感傷天地見責書之示戒用儆後王伏願陛下勉保䖍恭之誠動以利萬物綏四方為慮則變異自銷休徴可致也帝深然之韋貫之為相元和中以淮西之役鎮州盜發輦下殺宰相武元衡傷御史大夫裴度及度為相二寇並征議者以物力不可貫之請守鎮以養威攻蔡以専力憲宗方急於太平未可其奏貫之進言陛下豈不知建中之事乎天下之兵始於蔡急魏應齊趙同惡徳宗率天下兵命李抱真馬燧急擊之物力用屈於是朱泚乗為亂朱滔隨而向闕致使梁漢為府奉天有行營皆陛下所聞見非他不能忍待次第速於撲滅故也陛下獨不能寛嵗月俟拔蔡而圖鎮耶帝深然之崔羣為相元和十四年誅李師道憲宗顧謂羣曰師古雖自襲祖父然朝廷待之始終其妻於師道即嫂叔也雖云逆族若量罪輕重亦宜降等又李宗奭雖抵嚴憲其情比之大逆亦有不同其妻之族也今其子女俱在掖庭於法皆似稍深卿等留意否羣對曰聖情仁惻罪止元兇其妻近屬儻獲寛宥實合𢎞煦之道於是師古妻女宜娘詔出於鄧州安置宗奭妻韋氏及男女先沒掖庭並釋放其婢奴資貨皆復賜之又鹽鐵福建院官權長孺坐贓詔付京兆府決殺長孺母劉求哀於宰相羣因入對言之憲宗愍其母耄年乃曰朕将屈赦長孺何如羣曰陛下仁惻赦之當速令中使宣諭如待正勑即無及也長孺竟得免死長流羣之啟奏平恕多此類也其年帝謂宰臣曰聽受之間大是難事推誠選任謂所委者必合悉心及至臨事亦聞皆有頗曲朕臨御已來嵗月漸久雖不明不敏然見物理漸詳每欲於事察審比令學士編録古今疑謗類昨以披閲見曖昧似是之事頗為鑒戒羣等奏曰情無曲直辨之至易稍涉欺詐審之實難孔子所謂衆好之必察焉衆惡之必察焉誠以巧言浸潤微昧難覺故古之鞠獄皆聽三訊慮其寃誣擇賢任之嚴法斷之使人務誠直理歸公正則亦何由致蔽偽也陛下覽今古惑聽之説以廣聰明鑒往知来實天下幸甚時欲收復河湟國用不足郡府長吏由是希㫖往往捃拾自為進貢會處州刺史苗稷直進羨餘錢七千貫羣請下令却賜本州代貧逃户税錢遏兹時弊物論歸之裴度為相元和四年憲宗常與宰臣議及人臣事主當力行善事自致公望何乃好樹朋黨朕甚惡之度對臣聞方以類聚物以羣分故君子小人未有無徒者但君子為徒則是同徳小人為徒則是朋黨此是外甚相似中實相逺在聖主觀其所行之事以辨之度等退相賀曰聖上今日論君子小人之事可謂誠言是則聖主以為難辨則易矣以為易辨則難矣今陛下以為辨之難則君子與小人彌當自區别矣他日宰臣或以當今利病欲有所釐改及陳為臣事君之道帝必往復詰問既盡理之後則曰凡事口説則易躬行則難卿等既為朕言當須行之勿空陳説而已宰相起而對曰書曰非知之艱行之惟艱陛下今日處分可謂至言臣等敢不朂厲以副天心然亦以天下之人從陛下所行不従陛下所言臣等亦願陛下毎言之則行之耳帝大悦十二年以楊元卿授蔡州刺史兼御史中丞未行改授光禄少卿初朝廷比令元卿與李愬㑹議於唐州東境選要便處權置行蔡州如百姓等漸有歸順者便准勑優恤必令全活既而召見元卿遽奏請借度支錢及言事頗多不合㫖度亦以諸將討賊三年功成在旦暮如更分土地與元卿即慮相侵生事故罷前命而改授焉寳厯二年四月乙丑送幽州春衣中使内養楊文瑞流崇陵李孝温元陵艱難已来朝廷春衣常命中人賜方鎮及将士時服今春衣所賜幽州時服朱克融嫌疎弱執中使以聞帝特優容别命中人宣諭仍更賜衣服楊文瑞等先是克融留春衣使又奏云伏聞陛下欲幸東都今請将兵馬并丁匠五千人赴東都修理宫闕迎候車駕又奏三軍今年無春衣擬於朝廷請一年春衣約三十萬端疋方可足用不然三軍不安帝覽表召宰臣等問如何處分為宜我欲遣一重臣宣慰兼便索春衣使得無度對曰克融本兇族無故又敢悖慢必將滅亡陛下不足為慮譬如有一豺虎於山林間自吼自擲但不采顧自然無事此賊只敢於巢穴内無禮動必不得今亦不要遣使宣慰亦不要索所留勑使但更緩旬日與一詔云聞中官至彼稍失去就待到我當有處分所賜卿春衣有司製造不謹我甚要知已令科處所請兵馬及丁匠五千人赴東都固是虛語臣料賊中必出不得今欲直挫其姦意即云卿所請丁匠修宫闕可速来已勑魏博等道令所在排比供擬料得此語必慞惶失計若未能如此猶示含容則報云東都宫闕所要修理事在有司不假卿遣丁匠逺来又所言三軍春衣自是本道事比来朝廷或有賜予皆縁徴發須至優恩若尋常則無此例我固不惜三二十萬疋物只是事體不可獨與范陽卿宜知悉只如此處分即得陛下更不要介意帝従之遂進詔草及詔到後皆如度所料册府元龜卷三百一十三
