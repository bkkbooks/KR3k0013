body:
  text: 册府元龜卷三百七十一宋王欽若等撰將帥部忠第二晉閻鼎行豫州刺史事屯許昌遭母喪乃於密縣間鳩聚西州流人數千欲還鄉里値京師失守秦王出奔密中司空荀藩藩弟司𨽻校尉組及中領軍華恒河南尹華薈在密縣建立行臺以密近賊南趣許潁司徒左長史劉疇在密為塢主中書令李暅太傅叅軍騶捷劉蔚鎮軍長史周顗司馬李述皆來赴疇僉以鼎有才用且手握彊兵勸藩假鼎冠軍將軍豫州刺史蔚等為叅佐鼎少有大志因西土人思歸欲立功鄉里乃與撫軍長史王毗司馬傅遜懐翼戴秦王之計謂疇捷等曰山東非霸王處不如關中河陽令傅暢遺鼎書勸奉秦王過雒陽謁拜山陵徑據長安綏合夷晉興起義衆尅復宗廟雪社稷之耻鼎得書便欲詣雒流人謂北道近河懼有抄截欲南自武關向長安疇等皆山東人咸不願西入荀藩及疇捷等竝逃散鼎追藩不及暅等見殺唯顗述走得免遂奉秦王行止上雒為山賊所襲殺百餘人率餘衆西至藍田時劉聰向長安為雍州刺史賈疋所逐走還平陽疋遣人奉迎秦王遂至長安而與大司馬南陽王保衞將軍梁芬京兆尹梁綜等竝同心推戴立王為皇太子登壇告天立社稷宗廟以閻鼎為太子詹事總攝百揆梁綜與鼎争權鼎殺綜以王毗為京兆尹鼎首建大謀立功天下始平太守麴允撫夷䕶軍索綝竝害其功且欲専權馮翊太守梁緯北地太守梁肅竝綜母弟綝之姻也謀欲除鼎乃證其有無君之心専戮大臣請討之遂攻鼎鼎出奔雍為氐竇首所殺𫝊首長安周馥為平東將軍都督揚州諸軍事覩羣賊孔熾雒陽孤危乃建䇿迎天子遷都夀春永嘉四年與長史呉思司馬殷識上書曰不圖厄運遂至於此戎狄交侵畿甸危逼臣輒與祖納裴憲華譚孫惠等三十人伏思大計僉以殷人有屢遷之事周王有岐山之徙方今王都罄乏不可乆居河朔蕭條崤函險澁宛都屢敗江漢多虞於今平夷東南為愈淮陽之地北阻塗山南抗靈嶽名川四帶有重險之固是以楚人東遷遂宅夀春徐邳東海亦足戍禦且運漕四通無患空乏雖聖上神聰元輔賢明居儉守約用保宗廟未若相土遷宅以享永祚臣謹選精卒三萬奉迎皇駕輒檄前北中郎將裴憲行使持節監豫州諸軍事東中即將風馳即路荆湘江揚各先運四年米租十五萬斛布絹各十四萬疋以供大駕今王浚茍晞共平河朔臣等勠力以啟南路遷都弭冦其計竝得皇輿來巡臣宜轉據江州以恢王畧知無不為古人所務敢竭忠誠庶報萬分朝遂夕隕猶生之年東海王越與苟晞不協馥不先白於越而直上書越大怒祖逖為鎮西將軍豫州刺史公私豐贍士馬日滋方當摧鋒越河掃清冀朔㑹朝廷將遣戴若思為都督逖以若思是呉人雖有才望無宏致逺圖且已翦荆棘收河南地而若思雍容直來統之意甚怏怏且聞王敦與劉隗等搆隙慮有内難大功不遂感激發病乃寄妻孥汝南大木山下時中原士庶咸謂逖當進據武牢而反置家險阨或諌之不納逖雖内懐憂憤而圖進取不輟温嶠為平南將軍鎮武昌聞蘇峻之徵也慮其有變求還朝以備不虞不聴未幾而蘇峻果反移屯潯陽遣督䕶王愆期西陽太守鄧岳鄱陽内史紀瞻等率舟師赴難及京師傾覆嶠聞之號慟人有候之者悲哭相對俄而庾亮來奔宣太后詔進嶠驃騎將軍開府儀同三司嶠曰今日之急殄冦為先未效勲庸而逆受榮寵非所聞也何以示天下乎固辭不受時亮雖奔敗嶠每推崇之分兵給亮遣王愆期等要陶侃同赴國難侃恨不受顧命不許嶠初從之後用其部將毛寳説復固請侃行初嶠與庾亮相推為盟主嶠從弟充言於嶠曰征西位重兵彊宜共推之嶠於是遣王愆期奉侃為盟主侃許之遣督䕶龔登率兵詣嶠嶠於是列上尚書陳峻罪狀有衆七千灑泣登舟峻時殺侃子瞻繇是侃激勵遂率所統與嶠亮同赴京師戎卒六萬旌旗七百餘里鉦皷之聲震於百里直指石頭次於蔡州侃屯查浦嶠屯沙門浦時祖約據歴陽與峻為首尾見嶠等軍盛謂其黨曰吾本知嶠能為四公子之事今果然矣峻聞嶠將至逼大駕幸石頭時峻軍多馬南軍仗舟檝不敢輕與交鋒用將軍李根計據白石築壘以自固使庾亮守之賊步騎萬餘來攻不下而退追斬二百餘級嶠又於四望磯築壘以逼賊曰賊必争之設伏以逸待勞是制賊之一竒也是時義軍屢戰失利嶠軍食盡陶侃怒曰使君前云不憂無將士惟得老僕為主耳今數戰皆北良將安在荆州接胡蜀二虜倉廩當備不虞若復無食僕便欲西歸更思良筭但今歲計殄賊不為晩也嶠曰不然自古成監師克在和光武之濟昆陽曹公之拔官渡以寡敵衆仗義故也峻約小䜿為海内所患今日之舉決在一戰峻勇而無謀藉驕勝之勢自謂無前今挑之戰可一皷而擒也柰何捨垂立之功設進退之計且天子幽逼社稷危殆四海臣子肝腦塗地嶠等與公竝受國恩是致命之日事若克濟則臣主同祚如其不捷身雖灰滅不足以謝責於先帝今之事勢義無旋踵騎猛獸安可中下哉公若違衆獨反人心必沮沮衆敗事義旗將廻指於公矣侃無以對遂畱不去嶠於是創建行廟廣設壇塲告皇天后土祖宗之靈親讀祝文聲氣激揚涕流覆面三軍莫能仰視其日侃督水軍向石頭亮嶠等率精勇一萬從白石以挑戰時峻勞其將士因醉突陣馬躓為侃將所斬峻弟逸及子碩嬰城自固嶠乃立行臺布告天下凡故吏二千石臺郎御史以下皆令赴臺於是至者雲集司徒王導因奏嶠侃錄尚書遣間使宣㫖竝讓不受賊將康術以臺城來降為逸所撃求救於嶠江州别駕羅洞曰今水暴長救之不便不如攻榻杭榻杭軍若敗術圍自解嶠從之遂破賊石頭軍奮威長史滕含抱天子奔於嶠船時陶侃雖為盟主而處分規畧一出於嶠及賊㓕拜驃騎將軍開府儀同三司加散騎常侍封始安郡公邑三千戸㕁鑒為大將軍開府儀同三司加散騎常侍咸和初領徐州刺史及祖約蘇峻反鑒聞難便欲率所領東赴詔以北冦不許於是遣司馬劉矩領三千人宿衛京都尋而王師敗績矩遂退還中書令庾亮宣太后口詔進鑒為司空鑒去賊宻邇城孤糧絶人情業業莫有固志奉詔流涕設壇塲刑白馬大誓三軍曰賊臣祖約蘇峻不恭天命不畏王誅㐫戾肆逆干國之紀陵汨五常侮弄神器遂制脅幽主拔本塞源殘害忠良禍虐黎庻使天地神祗靡所依歸是以率土怨酷兆庶泣血咸願奉辭伐罪以除元惡昔戎狄泯周齊桓糾盟董卓陵漢羣后致討義存君親古今一也今主上幽危百姓倒懸忠臣正士志存報國凡我同盟之後勠力一心以救社稷若二㓂不梟義無偷安有渝此盟明神殛之鑒登壇慷慨三軍争為用命乃遣將軍夏侯長等間行謂平南將軍温嶠曰今賊謀欲挾天子東入㑹稽宜先立營壘屯據要害既防其越逸又斷賊糧運然後静鎮京口清壁以待賊賊攻城不拔野無所掠東道既斷糧運自絶不過百日必自潰矣嶠深以為然及陶侃為盟主進鑒都督揚州八郡軍事時撫軍將軍王舒輔國將軍虞潭皆受鑒節度率衆渡江與侃㑹於茄子浦鑒築白石壘而據之㑹舒潭戰不利鑒與後將軍郭黙還丹徒立大業曲阿庱亭三壘以拒賊而賊將張徤來攻大業城中乏水郭黙窘迫遂突圍而出三軍失色叅軍曹納以為大業京口之扞一旦不守賊方軌而前勸鑒退還廣陵以俟後舉鑒乃大㑹僚佐責納曰吾蒙先帝厚顧荷託付之重正復捐軀九泉不足以報今彊冦在郊衆心危迫君腹心之佐而生長異端當何以率先義衆鎮一三軍邪將斬之乆而乃釋㑹峻死大業圍解及蘇逸等走呉興鑒遣叅軍李閎追斬之降男女萬餘口拜司空加侍中劉牢之為南彭城内史輔國將軍代王恭督兖青并七州事時楊佺期桓𤣥將兵逼京師上表理王恭求誅牢之牢之率北府之衆馳赴京師次於新亭𤣥等受詔退兵牢之還鎮京口桓彛為宣城内史蘇峻之亂彛糾合義衆欲赴朝廷其長史禆惠以郡兵寡弱出入易擾可按甲以須後舉彛厲色曰夫見無禮於其君者若鷹鸇之逐鳥雀今社稷危逼義無晏安乃遣將軍朱綽討賊别帥於蕪湖破之彛尋出石頭㑹朝廷遣將軍司馬流先據慈湖為賊所敗遂長驅逕進彛以郡無堅城遂退據廣徳尋王師敗績彛聞慷慨流涕進屯涇陽時州郡多遣使降峻禆惠又勸彛偽與通和以紓交至之禍彛曰吾受國厚恩期在致死焉能忍垢蒙辱與醜逆通問如其不濟此則命也遣將軍俞縱守蘭石峻遣將韓晃攻之縱將敗左右勸縱退軍縱曰吾受桓侯厚恩本以死報吾之不可負桓侯猶桓侯之不負國也遂力戰而死晃因進軍攻彛彛固守經年勢孤力屈賊曰彛若降者當待以優禮將士多勸彛偽降更思後舉彛不從辭氣壯烈志節不撓城陷為晃所害年五十三時賊尚未平諸子竝流迸宣城人紀世和率義故葬之賊平追贈廷尉諡曰簡咸安中改贈太常俞縱亦以死節贈興安太守卞壼為尚書令右將軍領右衞將軍蘇峻稱兵至東陵口詔以壼都督大桁東諸軍事假節復加領軍將軍給事中壼率郭黙趙𦙍等與峻大戰於陵西為峻所破壼與鍾雅皆退還死傷者以千數壼雅竝還節詣闕謝罪峻進攻青溪壼與諸軍距撃不能禁賊放火燒宮寺六軍敗績壼時發背創猶未合力疾而戰率厲散衆及左右吏數百人攻賊麾下苦戰遂死之時年四十八二子眕盰見父没相隨赴賊同時見害峻平朝議贈壼左光禄大夫加散騎常侍尚書郎𢎞訥議以為死事之臣古今所重卞令忠貞之節當書於竹帛今之追贈寔未副衆望謂宜加鼎司之號以旌忠烈之勲司徒王導建議進贈驃騎將軍加侍中訥重議曰夫事親莫大於孝事君莫尚於忠唯孝也故能盡敬竭誠唯忠也故能見危授命此在三之大節臣子之極行也按壼委質三朝盡規翼亮遭世險難存亡以之受顧託之重居端右之任擁衞至尊則有保傅之恩正色在朝則有匪躬之節賊峻造逆勠力致討身當矢旝再對賊鋒父子并命可謂破家為國守死勤事昔許男疾終猶蒙二等之贈况壼仗節國難者乎夫賞疑從重况在不疑謂可上凖許穆下同嵇紹則允合典謨克厭衆望於是改贈壼侍中驃騎將軍開府儀同三司謚曰忠貞祠以太牢贈世子眕散騎侍郎眕弟盰奉車都尉眕母裴氏撫二子尸哭曰父為忠臣汝為孝子夫何恨乎徴士翟湯聞之歎曰父死於君子死於父忠孝之道萃於一門庾翼為安西將軍鎮武昌嘗遣使東至遼東西到涼州要結二方欲同大舉慕容皝張駿竝報使請期翼雅有大志欲以㓕胡平蜀為己任言論慷慨形於辭色桓冲代桓温為豫揚二州刺史初温執權大辟之罪皆自己決冲既蒞事上疏以為生殺之重古今所慎凡諸死罪先須上報冲既代温居任盡忠王室或勸冲誅除時望専執權衡冲不從謝安以時望輔政為羣情所歸冲懼逼寜康三年乃解揚州自求外出桓氏黨與以為非計莫不扼腕苦諌㕁超亦深止之冲皆不納處之澹然不以為恨忠言嘉謀毎盡心力於是改授都督徐豫兖青揚五州知六郡軍事車騎將軍徐州刺史桓伊為䕶軍將軍卒贈右將軍加散騎常侍諡曰烈初伊有馬步鎧六百領豫為表令死乃上之表曰臣過蒙殊寵受任西藩淮南之捷逆兵奔北人馬器鎧隨處放散于時收拾破敗不足貫連比年营繕竝已脩整今六合雖一餘燼未滅臣不以朽邁猶欲輸効力命仰報皇恩此志永絶銜恨泉壤謹奉輸馬裝百具步鎧五百領竝在潯陽請勅所屬領受詔曰伊忠誠不遂益以傷懐仍受其所上之鎧劉𢎞為荆州刺史督荆交廣諸軍事廣漢太守羊冉以天子蒙塵四方雲擾進從橫計於𢎞𢎞怒斬之時人莫不稱善郭誦司州刺史李矩之甥也矩表誦為揚武將軍陽翟令時石勒遣其將石良率精兵五千襲矩矩逆擊不利誦弟元復為賊所執賊遣元以書説矩曰去年東平曹嶷西賔猗盧矩如牛角何不歸命矩以示誦誦曰昔王陵母在賊猶不改意弟當何論勒復遺誦麈尾馬鞭以示殷勤誦不答段匹磾領幽州刺史為從弟末杯所敗北依邵續與續并力追末杯斬獲畧盡又令文鴦北討末杯弟於薊城及還去城八十里聞續已没衆懼而散復為石季龍所遮文鴦以親兵數百人力戰破之始得入城季龍復抄城下文鴦登城臨見欲出撃之匹磾不許文鴦曰我以勇聞故百姓仗我見人被畧而不救非丈夫也令衆失望誰復為我致死乎遂將壯士數十騎出戰殺胡甚多遇馬乏伏不能起季龍呼曰大兄與我俱是戎狄乆望共同天不違願今日相見何故復戰請釋仗文鴦罵曰汝為冦虐乆應合死吾兄不用吾計故令汝得至此吾寜死不為汝擒逐下馬苦戰槊折執刀力戰不已季龍軍四面解馬羅披自鄣前捉文鴦文鴦戰自辰至申力極而後被執城内大懼匹磾欲單騎歸朝續弟樂安内史洎勒兵不許洎復欲執臺使王英送於季龍匹磾正色責之曰卿不能遵兄之志逼吾不得歸朝亦以甚矣復欲執天子使者我雖胡夷所未聞也因謂英曰匹磾世受重恩不忘忠孝今日事逼欲歸罪朝廷而見逼迫忠欵不遂若得假息未死之日心不忘本遂渡黄河南匹磾着朝服持節賔從出見季龍曰我受國恩志在㓕汝不幸吾國自亂以至於此既不能死又不能為汝敬也勒及季龍素與匹磾結為兄弟季龍起而拜之匹磾到襄國又不為勒禮常着朝服持晉節經年國中謀推匹磾為主事露被害文鴦亦遇鴆而死郭黙初為河内督將永嘉之亂率衆自為塢主遣使謁劉琨琨加黙河内太守劉元海遣從子曜討黙曜列三屯圍之欲使饑死黙送妻子為質并請糴焉糴畢設守曜怒沈黙妻子於河而攻之黙遣弟芝求救於劉琨琨知黙狡猾㽞之而緩其救黙便遣人告急㑹芝出城浴馬使彊與俱歸黙乃遣芝質於石勒勒以黙多詐封黙書與劉曜黙使人伺得勒書便突圍投李矩後與矩并力拒劉石魏該為順陽太守王敦之反也梁州刺史甘卓不從欲觀該去就試以敦㫖動之該曰我本去賊惟忠於國今王公舉兵向天子非吾所宜與也遂拒而不應劉隗拜鎮北將軍都督青徐幽平四州軍事假節加散騎常侍率萬人鎮泗口初隗以王敦威權太盛終不可制勸帝出腹心以鎮方隅故以譙王承為湘州續用隗及戴若思為都督敦甚惡之與隗書曰頃承聖上顧盻足下今大賊未滅中原鼎沸欲與足下周生之徒勠力王室共靜海内若其泰也則帝祚於是乎隆若其否也則天下永無望矣隗答曰魚相忘於江湖人相忘於道術竭股肱之力效之以忠貞吾之志也敦得書甚怒周顗代戴若思為䕶軍將軍及王敦搆逆温嶠謂顗曰大將軍此舉似有所在當無濫邪顗曰君少年未更事人主自非堯舜何能無失人臣豈可得舉兵以脅主共相推戴未能數年一旦如此豈云非亂乎處仲王敦字處仲剛愎彊忍很抗無上其意寕有限邪既而王師敗績顗奉詔詣敦敦曰伯仁卿負我顗曰公戎車犯順下官親率六軍不能共事使王旅奔敗以此負公敦憚其辭正不知所答帝召顗於廣室謂之曰近日大事二宫無恙諸人平安大將軍故副所望邪顗曰二宫自如明詔於臣等故未可知䕶軍長史郝嘏等勸顗避敦顗曰吾備位大臣朝廷喪敗寕可復草間求活外投胡越邪俄而與戴若思俱被收路經太廟顗大言曰天地先帝之靈賊臣王敦傾覆社稷枉殺忠臣陵虐天下神祗有靈當速殺敦無令縱毒以傾王室語未終收人以㦸傷其口血流至踵顔色不變容止自若觀者皆為流涕遂於石頭南門外石上害之時年五十四周筵右將軍都督石頭水陸軍事札之兄子王敦作難加冠軍將軍都督㑹稽呉興義興晉陵東陽軍事率水軍三千人討沈充未發而王師敗績筵聞札開城納敦憤咤慷慨形於辭色尋遇害劉超為左衞將軍時蘇峻謀逆京邑大亂朝士多遣家人入東避難義興故吏欲迎超家而超不聴盡以妻孥入處宫内及王師敗績王導以超為右衞將軍親侍成帝屬太后喪軍衞禮章損闕超躬率將士奉營山陵峻遷車駕石頭時天大雨道路沉陷超與侍中鍾雅步侍左右賊給馬不肯騎而悲哀慷慨峻聞之甚不平然未敢加害而以其所親信許萬等補司馬督殿中監外託宿衞内實防禦超等時饑饉米貴峻等問遺一無所受繾綣朝夕臣節愈恭帝時年八歲雖幽危之中超猶啟授孝經論語温嶠等至峻猜忌朝士而超為帝所親遇疑之尤甚後王導出奔超與懐徳令匡術建康令管斾等宻謀將欲奉帝而出未及期事泄峻使任讓將兵入收超及侍中鍾雅帝抱持悲泣曰還我侍中右衞任讓不奉詔因害之及峻平任讓與陶侃有舊侃欲特不誅之乃請於帝帝曰讓是殺我侍中右衞者不可宥繇是遂誅讓及超將改葬帝痛念之不已詔遷高顯近地葬之便出入得瞻望其墓追贈衞尉謚曰忠羊曼為前將軍時蘇峻作亂曼率文武守雲龍門王師不振或勸曼避峻曼曰朝廷破敗吾安所求生勒衆不動為峻所害朱伺為廣威將軍領竟陵内史時王敦欲用從弟廙代陶侃為荆州侃故將鄭攀馬雋等乞侃於敦敦不許攀等以侃始㓕大賊人皆樂附又以廙忌戾難事謀共拒之遂屯結溳口遣使告伺伺外許之而稱疾不赴攀等遂進拒廙既而士衆疑阻復散還横桑口欲入杜曽時朱軌趙誘李桓率衆將擊之攀等懼誅以司馬孫景造謀拒廙因斬之降軌等廙將西出遣長史劉浚㽞鎮揚口壘時杜曽請討第五猗於襄陽伺謂廙曰曽是猾賊外示西還以疑衆心欲誘引官軍使西然後兼道襲揚口耳宜大部分未可便西廙性矜厲自用兼以伺老怯難信遂西行曽等果馳還廙乃遣伺歸裁至壘即為曽等所圍劉浚以壘北門危欲令伺守之或說浚云伺與鄭攀同者乃轉守南門賊知之攻其北門時鄭攀黨馬雋等亦來攻壘雋妻子先在壘内或請皮其面以示之伺曰殺其妻子未能解圍但益其怒耳乃止伺常所調弩忽噤不發伺甚惡之及賊攻陷北門伺被傷退入船初浚開諸船底以木掩之名為船械伺既入賊舉鋋摘伺伺逆接得鋋反以摘賊賊走上船屋大喚云賊帥在此伺從船底沉行五十步乃免遇醫療創小差杜曽遣說伺云馬雋等感卿恩妻孥得活盡以卿家外内百口付雋雋已盡心收視卿可來也伺答曰賊無白首者今吾年六十餘不能復與卿作賊吾死當歸南妻子付汝乃還甑山時王廙與李桓杜曽相持累戰甑山下軍士數驚喚云賊欲至伺驚創而卒周虓字孟威為西夷校尉領梓潼太守寕康初苻堅將楊安㓂梓潼虓固守涪城遣步騎數千送母妻從漢水將抵江陵為堅將朱彤邀而獲之虓遂降於安堅欲以為尚書郎虓曰蒙國厚恩以至今日但老母見獲失節於此母子獲全秦之惠也雖公侯之貴不以為榮况郎任乎堅乃止自是每入見堅輒箕踞而坐呼之為氐賊堅不恱屬元㑹威儀甚整堅因謂虓曰晉家元㑹何如此虓攘𬒮厲聲曰戎狄集聚譬猶犬羊相羣何敢比天子及吕光征西域堅出餞之戎士二十萬旌旗數百里又問虓曰朕衆力何如虓曰戎狄以來未之有也堅黨以虓不遜屢請除之堅待之彌厚虓乃宻書與桓冲説賊姦計太元三年虓潛至漢中堅追得之後又與堅兄子苞謀襲堅事泄堅引虓問其状虓曰昔漸離豫讓燕智之微臣猶漆身吞炭不忘忠節况虓世荷晉恩豈敢忘也生為晉臣死為晉鬼復何問乎堅曰今殺之適成其名矣遂撻之徙於太原後堅復陷順陽魏興獲二守皆執節不撓堅嘆曰周孟威不屈於前丁彦逺絜已於後吉祖冲不食而死皆忠臣也虓竟以病卒於太原吉挹少有志節孝武帝初苻堅陷梁益桓豁表挹為魏興太守太元四年苻堅將韋鍾攻魏興挹遣衆拒之斬七百餘級加督五郡軍事鍾率衆欲趣襄陽挹又邀撃獲五十餘級鍾怒廻軍圍之挹又屢挫其銳其後賊衆繼至挹力不能抗城將陷引刀欲自殺其友止之曰且茍存以展他計為計不立死未晩也挹不從友人逼奪其刀㑹賊執之挹閉口不言不食而死朱序為梁州刺史鎮襄陽苻堅率衆圍序序督護李伯護宻與賊相應襄陽遂没序欲逃歸濳至宜陽藏夏揆家堅疑揆收之序乃詣苻暉自首堅嘉而不問以為尚書太元中苻堅南侵謝石率師拒之時堅大兵尚在項苻融以三十萬衆先至堅遣序説謝石稱已兵威序反謂石曰若堅百萬之衆悉到莫可與敵及其未㑹撃之可以得志於是石遣謝琰選勇士八千人涉肥水挑戰堅衆少却序時在其軍後唱云堅敗衆遂大奔潰序乃得歸拜龍驤將軍瑯琊内史㕁愔為輔國將軍都督徐兖青幽揚州之晉陵諸軍事徐州人多勁悍桓温常云京口酒可飲兵可用深不欲愔居之而愔暗於事機遣牋詣温欲共奬王室脩復園陵子超取視寸寸毁裂乃更作牋自陳老病甚不堪人間乞閒地自養温得牋大喜即轉愔為㑹稽太守毛璩安帝初為征虜將軍及桓𤣥簒位遣使加璩散騎常侍左將軍璩執留𤣥使不受命𤣥以桓希為梁州刺史王异據涪郭法戍宕渠師寂戍巴郡周道子戍白帝以防之璩𫝊檄逺近列𤣥罪狀遣巴東太守柳約之建平太守羅述征虜司馬甄季之撃破希等仍率衆次於白帝武陵王令曰益州刺史毛璩忠誠慤亮自桓𤣥萌禍嘗思躡其後今若平殄兇逆肅清荆郢者便當即受上流之任初璩弟寜州刺史璠喪官璩兄球孫祐之及叅軍費恬以數百人送喪葬江陵㑹𤣥敗謀奔梁州璩弟瑾子脩之時為𤣥屯騎校尉誘𤣥使入蜀既而脩之與祐之費恬及漢嘉人馮遷共殺𤣥約之等聞𤣥死進軍到枝江而桓振復攻沒江陵劉毅等還潯陽約之亦退俄而季之述之皆病約之詣振偽降因欲襲振事泄被害約之司馬時延祖涪陵太守文處茂等撫其餘衆保涪陵振遣桓放之為益州屯西陵處茂拒擊破之振死安帝反正詔曰夫貞松標於歳寒忠臣亮於國危益州刺史璩體識𢎞正誠契義旗受命偏師次於近畿輔翼之勲實感朕心可進征西將軍加散騎常侍都督益梁秦涼寜五州軍事行宜都寜蜀太守文處茂宣讃藩牧蒙險夷難可輔國將軍西夷校尉巴西梓潼二郡太守又詔西夷校尉瑾為持節監梁秦二州軍事征虜將軍梁秦二州刺史畧陽武都太守瑾弟蜀郡太守瑗為輔國將軍寜州刺史初璩聞振陷江陵率衆赴難使弟瑾瑗順外江而下使叅軍譙縱領巴西梓潼二郡軍下涪水當與璩軍㑹於巴郡蜀人不樂東征縱因人情思歸於五城水口反還襲涪害瑾瑾畱府長史鄭純之自成都馳使告璩璩時在畧城去成都四百里遣叅軍王瓊討反者相拒於廣漢僰道令何林聚黨助縱而璩下人受縱誘說遂共害璩及瑗并子姪之在蜀者一時殄没殷覬為南蠻校尉太元中從弟仲堪為荆州刺史仲堪得王恭書將興兵内伐告覬欲同舉覬不平之曰夫人臣之義慎保所守朝廷是非宰輔之務豈藩屏之所圖也晉陽之事宜所不豫仲堪要之轉切覬怒曰吾進不敢同退不敢異仲堪甚以為恨猶宻諌仲堪辭甚切至仲堪既貴素情亦殊而志望無厭謂覬言為非覬見江績亦以正直為仲堪所斥知仲堪當逐異已樹置所親因出行散託疾不還仲堪聞其病出省之謂覬曰兄病殊為可憂覬曰我病不過身死但汝病在㓕門幸熟為慮勿以我為念也仲堪不從卒與楊佺期桓𤣥同下覬遂以憂卒隆安中詔故南蠻校尉殷覬忠績未融奄焉隕喪可贈冠軍將軍張肅寔叔父也為建威將軍西海太守以京師危逼請為先鋒擊劉曜寔以肅年老弗許肅曰狐死首丘心不忘本鍾儀在晉楚弁南音肅受晉寵剖符列位羯逆滔天朝廷傾覆肅晏安方裔難至不奮何以為人臣寔曰門戸受重恩自當闔家效死忠衞社稷以申先公之志但叔父春秋已高氣力衰竭軍旅之事非耆耄所堪乃止既而聞京師陷没肅泣憤而卒何無忌為江州刺史鎮南將軍盧循遣别帥徐道覆順流而下舟艦皆重樓無忌將率衆推之長史鄧濳之諌曰今以神武之師抗彼逆衆廻山壓卵未足為譬然國家之計在此一舉聞其舟艦大盛勢居上流蜂蠆之毒邾魯成鑒宜決破南塘守二城以待之其必不敢捨我遠下蓄力俟其疲老然後擊之若棄萬全之長䇿而決成敗於一戰如其失利悔無及矣無忌不從遂以舟師拒之既及賊令彊弩數百登西岸小山以邀射之南薄於山側俄而西風暴急無忌所乗小艦被飄東岸賊乗風以大艦逼之衆遂奔敗無忌尚厲聲曰取我蘇武節來節至乃躬執以督戰賊衆雲集登艦者數十人無忌辭色無撓遂握節死之宋劉敬宣字萬夀仕晉為征虜將軍領冀州刺史時高祖西討劉毅豫州刺史諸葛長民監太尉軍事貽敬宣書曰盤龍狠戾専恣自取夷㓕異端將盡世路方夷富貴之事相與共之敬宣報曰下官自義熈以來首尾十載遂忝三州七郡今此仗節常懼福過禍生實思避盈居損富貴之㫖非所敢當使呈書高祖謂王誕曰阿夀故為不負我也顔師伯為征虜將軍都督青冀二州徐州之東安兖州之濟北二郡諸軍事竟陵王誕反師伯遣長史嵇𤣥敬率五千人赴難沈慶之為步兵校尉詔討羣蠻於江沔元嘉三十年正月孝武出次五洲總綂羣帥慶之從巴水出至五洲諮受軍畧㑹孝武典籖董元嗣自建鄴還陳元㐫弑逆孝武遣慶之引諸軍慶之請腹心曰蕭斌婦人不足數其餘將帥並是所悉皆易與耳東宫同惡不過三十人此外屈逼必不為用力今輔順討逆不憂不濟也衆軍既集假慶之為征虜將軍武昌内史領府司馬孝武還至潯陽慶之及栁元景等並以天下無主勸世祖即大位不許賊劭遣慶之門生錢無忌齎書說慶之解甲慶之執無忌白孝武孝武踐祚以慶之為領軍將軍禇湛之為丹陽尹元㐫劭弑逆以為吏部尚書復出為輔國將軍丹陽尹綂石頭戍事世祖入伐劭自攻新亭壘使湛之率水師俱進湛之因攜二息淵澄登輕船南奔淵有一男始生為劭所殺世祖即位以為尚書右僕射劉瑀為寜逺將軍益州刺史元㓙弑立以為青州刺史瑀聞問即起義遣軍并送資實於荆州世祖即位召為御史中丞還至江陵値南郡王義宣為逆瑀陳其不可言甚切至義宣以為丞相左司馬俱至梁山瑀猶乗其蜀中船舫又率義宣部曲濳於梁山洲外下投官軍除司徒長史朱脩之為雍州刺史時荆州刺史南郡王義宣反檄脩之舉兵脩之偽與之同而遣使陳誠於帝帝嘉之以為荆州刺史加都督義宣聞脩之不與己同乃以魯秀為雍州刺史擊襄陽脩之命斷馬鞍山道秀不得前乃退及義宣敗於梁山單舟南走脩之率衆南定遺冦時竺超民執義宣脩之至乃殺之以功封南昌縣侯沈攸之為寜朔將軍征南賊攸之從子懐寳為賊將帥在赭圻遣親人楊公讀齎宻書招誘攸之攸之斬公讃封懐寳書呈太宗尋克赭圻後為鎮西將軍荆州刺史後廢帝元徽二年桂陽王休範舉兵襲京邑攸之謂僚佐曰桂陽今反朝廷必聲云與攸之同若不顛沛勤王必増朝野之惑於是遣軍主孫同沈懐奥興軍馳下受郢州刺史晉熈王燮節度同等始過夏口會休範平而還劉秀之為寜朔將軍益州刺史南譙王義宣據荆州為逆遣叅軍王曜徴兵於秀之秀之即日斬曜戒嚴遣中兵叅軍韋山松萬人襲之柳元景為前將軍雍州刺史初臧質起義以南譙王義宣闇弱易制欲相推奉潜報元景使率所領西還元景即以質書呈孝武語信曰臧冠軍當是未知殿下義舉耳方應伐逆不容西還沈林子為征虜將軍既破鮮卑慕容超而盧循奄至循之下也廣固未拔循潜遣人結林子及宗人叔長林子即宻白高祖以超未平隱之還自廣固乃誅叔長謂林子曰昔魏武在官渡汝兖之士多懐二心唯李通獨斷大義古今一也循至蔡州貴遊之徒皆議逺徙唯林子請移家京邑高祖怪而問之對曰耿純盡室從戎李通舉宗居魏林子雖才非古人實受恩深重高祖稱善黄囘為右衞將軍沈攸之反以囘為使持節督郢州司州之義陽諸軍事平西將軍郢州刺史給皷吹一部臧質率衆出新亭為前鋒未發而袁粲據石頭為亂囘與新亭諸將任侯伯彭文之王宜興孫曇瓘等謀應粲粲事發侯伯等並乗船赴石頭唯曇瓘先至得入侯伯等至而粲已平囘本期詰旦率所領從御道直向臺門攻齊王於朝堂事既不果齊王撫之如舊垣詢之驍敢有氣力南郡王義宣反夙聞其名以副輔國將軍張柬時張超首行大逆亦領軍𨽻柬詢之規殺之慮柬不同柬宿有此志又未測詢之同否互相觀察㑹超來論事柬色動詢之覺之即共定謀遣信召超超疑之不至改宿他所詢之不知其移徑斫之殺其僕於牀因與柬南奔柬溺淮死詢之得至時世祖已即位以為積弩將軍殷孝祖為寜朔將軍督兖州諸軍事兖州刺史太宗初即位四方反叛孝祖外甥司徒叅軍葛僧韶建議銜命徴孝祖入朝帝遣之僧韶至孝祖具問朝廷消息僧韶隨方詶譬并陳兵甲精彊主上欲委以前驅之任孝祖即日棄妻子率文武二千人隨僧韶還都時普天同逆朝廷唯保丹陽一郡而永世縣尋又反叛義興賊埀至延陵内外憂危咸欲奔散孝祖忽至衆力不少並傖楚壯士人情大安齊張敬兒宋末為持節督雍梁二州郢司二郡軍事昇明元年冬沈攸之反遣報敬兒敬兒勞接周至為設酒食謂之曰沈公那忽使君來君殊可念乃列仗於㕔事前斬之集部曲偵攸之下當襲江陵遂破之送首京師李安民初為宋司州刺史領義陽太守時桂陽王休範起事安民遣軍援京師徴為左將軍加給事中王𤣥邈為宋輔國將軍幽州刺史青州刺史沈文秀反𤣥邈欲向朝廷慮見掩襲乃詣文秀求安軍頓文秀令頓城外𤣥邈即立營壘至夜㧞軍南奔起義此曉文秀追不復及明帝以為持節都督青州刺史將軍如故太祖鎮淮隂為明帝所疑遣書結𤣥邈𤣥邈長史房叔安勸𤣥邈不相答和罷州還太祖以經途又要之𤣥邈雖許既而嚴軍直過還都啓帝稱太祖有異謀蕭坦之東昏立為侍中領軍將軍永元元年遭母喪起復職加右將軍置府江祏兄弟欲立始安王遥光宻謂坦之曰明帝取天下已非次第天下人至今不服今若復作此事恐四海瓦解我其不敢言持喪還宅宅在東府城東遥光起事遣人夜掩取坦之坦之科頭着禈踰墻走從東治僦渡南渡間道還臺假節督衆軍討遥光屯湘宫寺事平遷尚書右僕射丹陽尹右將軍如故進爵為公増邑千戸荀伯玊太祖時為輔國將軍世祖在於東宫任左右張景真多僭侈世祖拜陵還景真白服乗畫舴艋坐胡牀觀者咸疑是太子内外祗畏莫敢言伯玊謂親人曰太子所為官終不知豈得顧死蔽官耳目我不啓聞誰應啓者因世祖拜陵之後宻啓之帝大怒檢校東宫世祖還至方山日暮將泊豫章王於東府乗飛鷰東迎具白帝怒之意世祖夜歸帝亦停門籥待之二更盡方入宫帝明日遣文惠太子聞喜公子良宣勅詰責并以景真罪狀示世祖稱太子令收景真殺之張冲都督郢司二州諸軍事梁王義師起東昏遣驍騎將軍薛元嗣制局監曁榮伯領兵及糧運百四十餘船送冲使拒西師元嗣等懲劉山陽之敗疑冲不敢進停住夏口浦聞義師將至元嗣榮伯相率入郢城時竟陵太守房僧寄被代還至郢東昏勅僧寄畱守魯山除驍騎將軍僧寄謂冲曰臣雖未荷朝廷深恩實蒙先帝厚澤䕃其樹者不折其枝實欲微立塵效冲深相許諾共結盟誓乃分部守遣軍主孫樂祖數千人助僧寄據魯山岸立城壘明年二月梁王出沔口圍魯山城遣軍主曹景宗等過江攻郢城未及盡濟冲遣中兵叅軍陳光靜等開門出擊為義師所破光靜戰死冲固守不出景宗於是據石橋浦連軍相續下至嘉湖東昏遣軍主巴西梓潼二郡太守呉子陽光子衿李文釗陳虎牙等十二軍援郢至嘉湖不得進乃築城舉烽城内亦舉火應之而内外各自保不能相救冲病死元嗣榮伯與冲子孜及長史江夏内史程茂固守東昏詔贈冲散騎常侍䕶軍將軍假元嗣子陽節江水暴長嘉湖城淹潰義師乗高艦攻之子陽等大敗散魯山城乏糧軍人於磯頭網魚供食宻治輕船將奔夏口梁王命偏軍斷其取路防備越逸房僧寄病死孫樂祖窘以城降郢城被圍二百餘日士庶病死者七八百家魯山既敗程茂及元嗣等議降使孜為書與梁王冲故吏青州中從事房長瑜謂孜曰前使君忠貫昊天操逾松竹郎君但當端坐畫一以荷析薪若天運不與幅巾待命以下從使君今若隨諸人之計非為郢州士女失高山之望亦恐彼所不取也魯山陷後二日元嗣等以郢城降東昏以程茂為督郢司二州輔國將軍郢州刺史元嗣為督雍梁山北秦四州郢州竟陵司州隋郡冠軍將軍雍州刺史竝持節時郢魯二城已降死者相積竟無叛散時以冲及房僧寄比臧洪之被圍也贈僧寄益州刺史册府元龜卷三百七十一
