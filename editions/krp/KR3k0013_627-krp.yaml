body:
  text: 册府元龜卷六百二十七宋王欽若等撰環衛部忠節剛正謹慎忠節夫周衛之職典司禁旅晝夜警備執禦非違故止則宻奉皇闈出則環拱宸極皆妙揀才俊以資心膂故有忠節奮發赤誠明著竭身命以狥國經夷險而一致若乃屬艱危之運變亂之時或宻刺賊臣或力抗凶竪義形於色視死如歸以至忠言激揚至誠感慨為爪牙之寄貞威武之容上所以安君親下所以彰功業管子所謂忠者臣之髙行諒在茲矣漢郅都為中郎将敢直諫面折大臣於朝嘗從景帝入上林賈姬在厠野彘入厠帝目都動目以使也都不行帝欲自持兵救賈姬都伏帝前曰亡一姬復一姬進天下所少寕姬等耶陛下縱自輕奈宗廟太后何帝還彘亦不傷賈姬太后聞之賜都金百斤繇此重都後漢馮魴建武中為執金吾性矜嚴公正在位數進忠言多見納用隂興為期門僕射每從出入常操持小蓋障翳風雨躬履塗泥率先期門光武所幸之處輙先入清宫桓郁為越騎校尉數進忠言多見納録伍孚為越騎校尉忿董卓㓙毒志手刅之乃朝服懐佩刀以見卓孚語畢辭去卓起送至閣以手撫其背孚因出刀㓨之不中卓自奮得免急呼左右執殺孚而大詬曰賊欲反耶孚大言曰恨不得磔裂姦賊於都市以謝天地言未畢而斃魏許褚為挍尉從討袁紹於官渡時常從士徐他等謀為逆以禇常侍左右憚之不敢發伺褚休下日他等懐刀入褚至下舍心動即還侍他等不知入帳見褚大驚愕他等色變褚覺之即擊殺他等太祖益親信之吳丁奉為左将軍景帝即位與張布謀欲誅孫綝布曰丁奉雖不能吏書而計畧過人能斷大事帝召奉告曰綝秉國威将行不軌欲與将軍誅之奉曰丞相兄弟友黨甚衆恐人心不同不可卒制可因獵㑹有陛下兵以誅之也帝納其計因㑹請綝奉與張布目左右斬之遷大将軍晋劉超為左衛将軍蘇峻謀逆京邑大亂朝士多遣家人入東避難義興故吏欲迎超家而超不聽盡以妻孥入處宫内及王師敗績王導以超為右衛将軍親侍成帝峻遷車駕石頭時天大雨道路沉䧟超與侍中鍾雅歩侍左右賊給馬不肯騎而悲哀慷慨峻聞之甚不平時飢饉米貴峻等問遺一無所受繾綣朝夕臣節愈恭帝時年八嵗雖幽厄之中超猶唘授孝經論語後王導出奔超與懐徳令匡述建康令管斾等宻謀将欲奉帝而出未及期事洩被害宋沈演之為中領軍時范曄為太子詹事懐逆謀演之覺其有異言之太祖曄尋事發伏誅卜天興元嘉末為廣威将軍領左細仗元㓙劭入事變倉卒舊将羅訓徐罕皆望風屈附天興不暇被甲執刀持弓疾呼左右出戰徐罕曰殿下入汝欲何為天興罵曰殿下常來云何即時方作此語只汝是賊手射賊邵於東堂㡬中逆徒擊之臂斷倒地乃見殺其隊将張泓之朱道欽陳滿與天興同出拒戰並死卜伯與天興子也為前将軍直閣領細仗主順帝昇明元年與袁粲同謀伏誅後周趙剛初為魏閣内都督及孝武搆隟剛宻奉㫖召東荆州刺史馬景昭未及發而齊神武已逼洛陽孝武西遷景昭集府僚文武議其去就司馬馮道和請據州待北方處分剛抽刀投地曰公若為忠臣可斬道和如欲從賊可見殺景昭感悟遂率衆赴關右屬侯景逼穣城東荆州人楊祖歡等起兵應景以其衆邀景昭於路景昭戰敗剛遂沒於蠻後自贖免乃見東魏東荆州刺史李魔憐勸令歸闗西魔憐納之使剛至并州宻觀事勢神武引剛内宴因令剛賫書申勑荆州剛還報魔憐斬揚權等以州歸西魔憐乃使剛入朝大統初剛於覇上見文帝具陳闗東情寔文帝嘉之封陽邑縣子蔡祐為大将軍閔帝踐阼拜少保祐與尉遲綱共掌禁兵遞直殿省時帝任信司㑹李植等謀害晋公護祐每泣諫帝不聴尋而帝廢隋董純為左驍衞将軍彭城留守齊王暕之得罪也純坐與交通煬帝廷譴之曰汝階緣宿衛以至大官何乃附傍吾兒欲相離間也純曰臣本㣲賤下才過蒙奨擢先帝察臣小心寵踰涯分陛下重加收採位至将軍欲竭餘年報國㤙耳比數詣齊王者徒以先帝先后徃在仁夀宫置元徳太子及齊王於膝上謂曰汝好看此二兒勿忘吾言也臣奉詔之後毎於休暇出入未嘗不詣王所臣誠不敢忘先帝之言于時陛下亦侍先帝之側帝改容曰誠有斯㫖於是捨之郭榮為左侯衞将軍大業九年煬帝至東都謂榮曰公年徳漸高不冝乆渉行陣當與公一郡任所選也榮不碩違離頓首陳譲辭情哀苦有感帝心於是拜為右侯衞大将軍後數日帝謂伯寮曰誠心純節如郭榮者固無比矣其見信如此李景為右武衞大将軍景智略非所長而忠直為時所許楊𤣥感之反也朝臣子弟多預焉而景獨無闗渉帝曰公誠直天然我之梁楝也趙才為右侯衞大将軍宇文化及之難才時在苑北化及遣驍果席徳方矯詔追之才聞詔而出徳方命其徒執之以詣化及化及謂才曰今日之事袛得如此幸勿為懐才黙然不對化及忿才無言将殺之三日乃釋以本官從事欝欝不得志才常對化及宴飲請勸其同謀逆者一十八人楊士覧等酒化及許之才執杯曰十八人止可一度作勿復餘處更為諸人黙然不對行至聊城遇疾俄而化及為竇建徳所破才復見虜心彌不平數日而卒獨孤盛大業末為左屯衞将軍宇文化及之作亂也裴䖍通引兵至成象殿衞者皆釋仗而走盛謂䖍通曰何物兵刑勢大異也䖍通曰事勢已然不預將軍事慎無動盛大罵曰老賊是何物語不及被甲與左右十餘人逆拒之為亂兵所弑唐張鎮州仕隋為屯衛將軍從煬帝江都於上江督運賊董道冲為阻進擊破既而蕭銑䧟長沙宇文化及又作難鎮州為煬帝發䘮哭之甚慟哀感路人武士彠武德中撿校右廂宿衛妻患危惙竟不請假出看先是士彠在并鉞軍之日有兩兒患重以至於沒亦不赴問但傷悼而已及妻死所司奏勑曰此人忠節有餘去年兒夭今日婦亡相去非遙未常言及遺身狥國舉無與比敬君𢎞武徳中為驃騎将軍掌屯營兵於𤣥武門隠太子建成之誅也其餘黨馮立謝叔方率兵犯𤣥武門君𢎞挺身出戰其所親止之曰事未可知當且觀變待兵集成列而戰未晩也君𢎞不從乃與中郎将吕世衡大呼而進並遇害太宗甚嗟賞之贈君𢎞左屯衛大将軍世衡右驍衛将軍周範為左衛将軍太宗幸九成宫常與房𤣥齡統留事範為人嚴正有威所在之職人皆敬憚一心奉上至死不虧及至疾篤不肯出外竟終於内省與𤣥齡相抱而訣曰所恨不獲冄奉聖顔若死而有知謹以幽魂奉衞宫闕薛仁貴為右領軍郎将北門長上永徽五年車駕幸萬年宫甲夜山水猥至衝突𤣥武門宿衞者散走仁貴曰安有天子有急輙敢懼死遂登門桄呌呼以警宫内帝遽出乘高俄而水入寢殿帝使謂仁貴曰頼卿得免淪溺始知有忠臣也賜御馬一匹李安静為右衛将軍天授時王公百僚皆勸革命安静獨義形於色無所陳請及被收下制獄来俊臣詰其反状安静謂曰以我是唐家老臣須殺即殺若問以謀反實無可對俊臣竟誣搆殺之李多祚為右羽林将軍神龍初張柬之将誅張易之兄弟引多祚将籌其事謂曰将軍在北門幾年曰三十年矣柬之曰将軍擊鐘鼎食金章紫綬貴寵當代位極武臣豈非大帝之恩乎多祚泣而對曰常感大帝之㤙死而無忘柬之曰將軍既感大帝殊澤能有報乎大帝之子見在東宫逆竪擅權朝夕危逼宗社之重在於将軍誠能報恩正屬今日多祚曰茍緣王室惟相公所使不顧妻子性命因即引天地神祗為要誓詞氣感動義形於色遂與柬之等定謀誅易之兄弟田歸道為左金吾将軍殿下監押千騎宿衛於𤣥武門敬暉等将討張易之昌宗也遣使就索千騎歸道軍先不預謀拒而不與及事定暉等将誅之歸道執辭免令歸第中宗後嘉其忠壮召拜太僕少卿邢濟為金吾將軍上元中日者朱融與嗣岐王珍交通珍儀表偉如頗類𤣥宗遂誘中官六軍人同謀悖逆融謂濟曰今城中草草闗外冦賊近更慿凌若何濟曰我金吾天子押衙死生從之安能自脫融曰有一人足下見之自當知縱不出城亦無慮矣遂引珍見濟濟即日奏之並伏誅令狐建為左龍武軍使徳宗避朱泚之亂出幸奉天建方習射於軍中遂以四百人随駕徳宗令為後殿張萬福為金吾将軍時裴延齡䜛陸贄等坐貶徳宗怒不觧諫議大夫陽城率拾遺王仲舒等數人守延英門上疏論延齡姦佞贄等無罪徳宗大怒召宰相入語将加城等罪良乆乃觧令宰相諭遣之於是萬福聞諌官伏閣諫趨徃至延英門大言賀曰朝廷有直臣天下必太平矣遂遍拜城及王仲舒等曰諸諌官能如此言事天下安得不太平已而連呼太平萬福武人也年八十餘見此盛事自此名重天下梁孫徳昭為右神策軍都指揮使光化三年唐昭宗為閹宦所廢矯立徳王時中外以權在禁闈莫能致討近藩朋附章表繼有至者丞相崔𦙍外與太祖申結輔佐之好内遣心腹宻購忠直以事諭徳昭者徳昭感慨乃與本軍孫承誨董從實二人奮發應命誓圗返正崔又割衣手筆以通其志天復元年正月一日未旦逆竪左軍容劉季述早入徳昭伏甲要路俟逗其前驅邀其輿而斬之孫承誨等擒捕右軍容王仲先黨立昭宗於是崔裔奉迎御丹鳳樓率百辟待罪且泣即日議功以徳昭為静海軍節度使承誨邕州節度使從實容州節度使並同平章事周何福進少從軍以驍勇聞後唐同光中郭從謙以兵圍荘宗於大内福進時為宿衛軍挍獨出死力拒戰於内後明宗知而嘉之剛正環尹之職上法勾陳所以為王爪牙掌兵蘭錡非夫剛強不撓忠正特立則何以嚴恭宿衛徼巡宫禁兩漢以來實重其選乃有持舉典法不避強族申明憲令務在首公風望凛然讜議確爾專司糾禁靡受私請嫉惡而言形慷慨喜善而意在激勸出入整肅中外悚憚斯寔靡畏於強禦無忝於仕宦者矣漢郅都為中尉丞相條侯貴倨而都揖丞相是時民樸畏罪自重都獨行法不避貴戚列侯宗室見都側目而視號曰蒼鷹寗成為中尉初郅都死後長安左右宗室多犯法長安左右宗邑之中也景帝召寗成為中尉其治效郅都其亷弗如然宗室豪傑人皆惴恐蓋寛饒為衞司馬先是衛司馬在部見衛尉拜謁常為衛官繇繇讀與徭同使市買寛饒視事案舊令遂揖官屬以下行衛者衞尉官属也衛尉私使寛饒出寛饒以令詣官府門上謁辭私見使而公辭尚書也尚書責問衛尉繇寛饒以法令不給使尚書責衛尉不復使司馬繇是衛官不復私使候司馬候司馬不拜出先置衞輙上奏辭天子出為天子先道先天子發故上奏辭自此正焉楊惲為中郎将郎官化之莫不自厲絶請謁貨賂之端令行禁止宫殿之内翕然同聲母将隆為執金吾時侍中董賢方貴帝使中黄門發武庫兵前後十軰送賢及帝乳母王阿舎隆奏武庫兵噐天下公用國家武備繕治造作皆度大司農用度皆出大司農大司農錢自乗輿不以給共養勞賜一出少府蓋不以本藏給末用不以民力共浮費别公私示正路也周賞為執金吾督大姦猾三輔吏民甚畏之後漢承宫遷左中郎将數納忠言陳政事得失論議切慤朝臣惮其節馬魴為執金吾性矜嚴公正數進忠言多見納用魏崔琰為中尉聲姿髙暢有威重朝士瞻望太祖亦嚴惮焉宋沈慶之為領軍将軍劉湛知之欲相引接謂之曰卿在省年月乆比當相論慶之正色曰下官在省十年自應得轉不復以此仰累尋轉正員将軍顔延之領歩兵挍尉賞遇甚厚延年好酒疎誕不能斟酌當世見劉湛殷景仁專當要任意有不平常云天下之務當與天下共之豈一人之智所能獨了辭甚激揚每犯權要謂湛曰吾名噐不升當由作卿家吏湛深恨焉言於彭城王義康出為永嘉太守後魏胡泥為司衛監率勵禁中不惮豪貴殿中尚書叔孫侯頭應入直而闕於一時泥以法䋲之侯頭恃寵遂與口諍髙祖聞而嘉焉賜衣服一襲于烈宣武帝時為領軍将軍咸陽王禧為宰相權重當時曽遣家僮傳言於烈曰求舊羽林虎賁執仗出入領軍可為差遣烈曰天子諒闇事歸宰輔領軍但知典掌禁衞有詔不敢違理無私給奴惘然而返傳烈言報禧禧復遣謂烈曰我是天子兒天子叔元輔之命與詔何異烈厲色而答曰向者亦不道王非是天子兒叔若是詔應遣官人所繇遣私奴索官家羽林烈頭可得羽林不可得禧惡烈剛直遂議出之乃授使持節散騎常侍征北将軍恒州刺史尉聿字成興性耿介孝明時為武衛将軍是時領軍元義秉權百僚莫不致敬而聿獨長揖不拜尋出為平西将軍凉州刺史隋趙才煬帝時授左侯衞将軍俄遷右侯衛大将軍時帝毎出廵幸才常為斥候肅遏姦非無所迥避在途遇公卿妻子有違禁者才輙醜言大罵多所援及時人雖患其不遜然才守正無如之何蘭興俗仁夀大業中與賀蘭蕭俱為武侯将軍剛嚴正直不避強禦咸以稱職知名唐于百億為朝請大夫每掌徼廵精勤不倦凡糾訐不避強禦及太宗踐祚帝在武侯狷直不能容物見百寮有不整肅必面加詆辱或手自捶毆朝士莫不惮之田仁㑹麟徳中為右金吾将軍仁㑹強力疾惡晝夜廵警絲毫越法無不立發躬自閲罰略無寛者京城貴賤咸畏惮之時有女巫蔡娘子以鬼道惑衆自云能令死者復生市里以為神明仁㑹驗其假妄奏請徙邉帝曰若死者不活便是妖妄不可容也竟從仁㑹所奏裴諝建中初為金吾将軍時徳宗以刑名理天下百吏震悚時十月禁屠殺以附近山陵禁益嚴尚父汾陽王郭子儀𨽻人殺羊以入門者覺之諝列奏状帝以為不畏強禦累遣宣諭或謂諝曰郭公有社禝功豈不為葢之諝笑曰非爾所解且郭公威權太盛上新即位必謂黨附者衆今發其細過以明不矣權耳吾上以盡事君之道下以安大臣不亦可乎張萬福為金吾将軍裴延齡䜛譖陸贄等坐貶徳宗怒未觧諫議大夫陽城帥拾遺王仲舒等守延英門䟽論萬福聞諫官伏閣諫趨徃至延英門大言賀曰朝廷有直臣天下必太平矣萬福年已八十見此盛事遂遍拜城及王仲舒等曰諸諫議能如此言事天下安得不太平自此天下愈重其名張延師以軍功累遷左右衞将軍檢挍司羽林軍封范陽郡公典羽林屯兵前後二十餘年亷謹周慎未嘗有過朝廷以此稱之阿史那忠髙宗永徽中為右驍衞大将軍所歴以清謹見稱前後宿衛向四十年時人比之金日磾呉湊章敬皇后弟代宗大厯中為金吾将軍湊小心亷謹識智周敏毎承顧問偏見信任李徳憲宗元和中為羽林将軍有名馬穆宗在東宫令近侍諷徳獻之徳以職縂親軍不敢從册府元龜卷六百二十七
