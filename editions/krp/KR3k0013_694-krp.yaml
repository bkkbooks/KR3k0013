body:
  text: 冊府元龜卷六百九十四宋王欽若等撰牧守部武功第二梁曹景宗初為蕭赤斧冠軍中兵參軍領天水太守時齊建元初蠻冦羣動景宗東西討撃多所擒破韋叡為豫州刺史領厯陽太守魏衆来冦叡率州兵撃走之鄧元起初仕齊為𢎞農太守時西陽馬榮率衆緣江冦抄商旅斷絶刺史蕭遥欣使元起率衆討平之後為武寕太守東昏永元末魏軍逼義陽元起自郡援焉蠻帥田孔明附于魏自號郢州刺史冦掠三關窺襲夏口元起率鋭卒攻之旬月之間頻䧟六城斬獲萬計餘黨悉皆散走乃戍三關劉季連初仕齊為益州刺史永平二年巴西人雍道晞率羣賊萬餘逼巴西去郡數里道晞稱鎮西將軍號建義巴西太守魯休烈與涪令李膺嬰城自守季連遣中兵參軍李奉伯率衆五千救之奉伯至與郡兵破擒道晞斬之涪市裴䆳為廬江太守天監五年魏將吕頗率衆五萬奄来攻郡䆳率麾下拒破之加右軍將軍桓和為青冀二州刺史天監五年伐魏和前軍尅朐山城蔡撙為吳興太守天監九年宣城郡吏吳承伯挟妖道聚衆攻宣城殺太守朱僧勇因轉屠旁縣踰山寇吳興所過皆殘破衆有二萬掩襲郡城東道不習兵革吏民怯擾奔散並請撙避之撙堅守不動募勇敢固郡承伯盡鋭攻撙撙命衆出拒衆於門應手摧破臨陣斬承伯餘黨悉平加信武將軍李畟為交州刺史天監十五年十一月畟斬交州反者阮宗孝傳首京師曲赦交州成景儁為徐州刺史普通五年八月景儁尅魏童棧九月又尅睢陵城夏侯䕫為司州刺史大通元年正月䕫進軍三關所至皆克㨗徐頠為臨賀内史湘衡之界五十餘洞不賓勅令衡州刺史韋粲討之粲委頠為都督悉平殄粲啓武帝稱頠誠幹降詔褒賞仍加超武將軍征討廣衡二州山賊安成王秀為荆州刺史先是巴陵馬營之蠻為緣江寇害後軍馬髙江産以郢州軍伐之不尅江産死蠻遂盛秀遣防閣文熾率衆討之燔其林木絶其蹊徑蠻失其嶮期嵗而江路清於是州境盜賊遂絶張齊為巴西太守郡人揺景和聚合蠻蛋鈔斷江路攻破金城齊討景和於平昌破之陸襄為鄱陽内史先是郡民鮮于琛服食修道法常入山採藥拾得五色幡旄又于地下得石璽竊怪之琛先與妻别室望琛所處常有異氣益以為神大同元年遂結其門徒殺廣晉令王筠號上願元年署置官屬其黨轉相誑惑有衆萬餘人將出攻郡襄先令率民吏修城隍為備禦及賊至連戰破之生獲琛餘衆逃散蘭欽為北梁州刺史大同元年十一月攻漢中尅之後為衡州刺史兼廣州因破俚帥陳文徹兄弟並擒之新喻侯映為廣州刺史大同十年廣州人盧子畧反映討平之楊膘為交州刺史中大同元年正月尅交阯嘉寕城賊李賁竄入獠洞交州平陳慶之為北兖州刺史㑹有妖賊沙門僧強自稱為帝土豪蔡伯龍起兵應之僧強頗知幻術更相扇惑衆至三萬攻陷北徐州濟隂太守楊起文棄城走鍾離太守單希寳見害使慶之討焉慶之受命而行曽未浃辰斬伯龍僧強傳其首裴之髙為梁郡太守時魏汝隂来附勅之髙應接仍假節颷勇將軍潁州刺史士民夜反踰城而入之髙率家僮與麾下奮擊賊乃散走杜懐寳為梁州刺史進督華州值秦州所部武興氐王楊紹反懐寳撃破之王僉為建安太守山酋方善謝稀聚徒依險屢為民害僉潜設方畧率衆平之有詔褒美頒示州郡陳周敷仕梁為寕州刺史熊曇朗之殺周文育據豫章將兵萬餘人襲敷徑至城下敷與戰大破之追奔五十餘里曇朗單馬獲免盡收其軍實曇朗走巴山郡收合餘黨敷因與周廸黄法氍等進兵圍曇朗屠之周文昭仕梁為弋陽太守侯景之亂元帝承制改授西陽太守封西陽縣伯景遣子思穆據守齊安文昭率驍勇襲破思穆擒斬之以功授持節髙州刺史周廸為江州刺史武帝永定二年熊曇朗殺都督周文育舉兵反文帝天嘉元年廸平南中斬曇朗傳首京師後魏元延為并州刺史道武皇始二年并州守將封真率其種族與徒河為逆將攻延延討平之趙徳為趙郡太守神瑞二年司馬順之入恒山流言惑衆稱受天帝命年二十五應為人君遂聚黨於封龍山徳執送京師斬之許宗之為定州刺史乞佛成龍為并州刺史文成太安二年丁零數千家亡匿井陘山聚為寇賊詔宗之成龍等討平之武昌王平原為齊州刺史孝文延興元年妖賊司馬小君聚衆反於平陵平原討擒之尉雒侯為秦益二州刺史太和元年秦州路畧陽民王元夀聚衆五千餘家自號為衝天王雒侯討破元夀獲其妻子送京師李肅為幽州刺史太和二十三年州民王惠定聚衆反自稱明法皇帝肅捕斬之茍頽為司空孝文行幸三州頽留守京師沙門法秀謀反頽率禁旅收掩畢獲内外晏然桓道進為荆州刺史宣武景明元年攻南齊下苲茂拔之降者三千餘户田益宗為東豫州刺史景明元年破齊將吳子陽鄧元起于長風楊大眼為東荆州刺史正始元年大破羣蠻樊季安等薛真度為揚州刺史正始二年大破梁將王超宗俘斬三千司馬靈夀為陳郡太守宋師侵境詔靈夀招引義士得二千餘人平公安頡破虎牢滑臺雒陽三城徙五百餘家入河内又從討蠕蠕西征涼州所在著功薛懐吉延昌中為梁州刺史南秦氐攻逼武興懐吉遣長史崔纂司馬韋弼别駕范珣擊平之進號右將軍桓叔興為南荆州刺史延昌三年大破梁軍于九山斬其虎旅將軍蔡令孫冠軍將軍席世興貞義將軍藍次孫魏子建為東益州刺史孝明正光五年招降南秦氐民復六郡十二州又斬賊王韓祖香南秦賊王張良命畏逼乃造降於蕭寳寅孝昌元年莫折念生遣都督楊鮓梁下辯姜齊等攻仇池郡城子建遣將盛遷撃破之斬下辯齊等首安樂王鍳為青州刺史孝昌元年齊州清河民崔畜殺太守董遵廣川民傅堆執太守劉莾反鍳討平之吕羅漢為秦益二州刺史涇州民張羗郎扇惑隴東聚衆千餘人州軍討之不能制羅漢率歩騎一千撃羗郎擒之武昌悼王鑒為徐州刺史梁角城戍主柴慶宗以城内附鑒遣淮南太守吳秦生率千餘赴之梁淮隂援軍已来斷路秦生屢戰破之乗勝而進遂尅角城李元䕶為齊州刺史入朝以州民聊世明圖為不軌元䕶馳還厯城至即擒殄誅戮所加微為濫酷彭城王勰子劭為青州刺史齊州民劉均房頃等扇動三齊梁遣彭城郡王辯等搔擾邊陲劭頻有防拒之効陸希質為膠州刺史梁武帝遣將率數萬從郁州浮海據島来侵州界希質討破之鄭輯之為黎陽太守屬元顥入雒令其舅范遵鎮守滑臺與輯之隔岸相對遵潜軍夜度規欲掩襲輯之率厲城民拒河擊之遵遂遁走朝廷嘉之除司州别駕崔元珍為平陽太守頻破胡賊郡内以安楊椿初為梁州刺史以母老解還後武都氐楊㑹反假椿節冠軍都督西征諸軍事行梁州刺史與軍司羊祉討破之房亮為平原太守時冀州刺史京兆王愉據州反平原界在河北與愉接境愉乃遣人説亮啖以榮利亮即斬其使人發兵防捍愉怒遣其大將張靈和率衆攻亮亮督厲兵民喻以逆順出城拒擊大破之路思令為南冀州刺史假平東將軍都督時葛榮遣其清河太守李虎據髙唐城以招叛民思令乃命麾下并率鄉曲潜軍夜往出其不意遂大破之徐乃收衆南還潘永基為南徐州刺史梁將曹世宗馬洪武等率衆来冦永基出討破之奚康生為南青州刺史梁武帝自郁州遣軍主徐濟寇邊康生率將出破之擒濟賞帛千疋宋翻為兖州刺史梁將先據荆山規將虜竊屬夀春淪䧟遂乗勢徑趣項城翻遣將成僧逹潜軍討襲頻戰破之自是州境帖然張普惠為東豫州刺史梁將胡廣来寇安陽軍主陳明祖等脇白沙鹿城二戍梁又遣定州刺史田超秀田僧逹等竊䧟石頭戍徑據安陂城郢州新塘梁軍近在州西數十里普惠前後命將拒戰並破之李賢為原州刺史茹茹圍逼州城剽掠居民驅擁畜牧賢欲戰大都督王徳猶豫未決賢固請徳乃從之賢勒兵將出賊密知之乃引軍退賢因率騎士追撃斬二百餘級捕虜百餘人獲駞馬牛羊二萬頭財物不可勝計所掠之人還得安堵李孝怡為魏郡太守時相州刺史中山王熈據鄴起兵孝怡隂結募城民與熈長史栁元章别駕㳺荆之等率衆擒熈賞爵昌樂伯裴果為龍州刺史州人張遁李祐驅率百姓圍逼州城時糧仗皆闕兵士又寡果設方畧以拒之賊便退走於是出兵追擊累戰破之旬日之間州境清晏叔孫建為相州刺史饑胡劉虎等聚黨反叛公孫表等為虎所敗建督表等以討虎斬首萬餘級餘衆奔走投沁水而死水為不流虜其十餘萬口蔡雋為濟州刺史前青州刺史梁侯反攻掠青齊濟州雋討平之又胡遷等據兖州作逆雋與齊州刺史尉景討平之北齊堯奮為南汾州刺史胡夷畏憚之西魏行臺薛崇禮舉衆攻奮與戰大破之崇禮兄弟乞降送於相府轉奮驃騎將軍左光祿大夫潁州刺史堯雄在魏為豫州刺史梁將李洪芝王當伯襲破平鄉城侵擾州境雄設伏要撃生擒洪芝當伯等俘獲甚衆梁司州刺史陳慶之復率衆逼州城雄出與戰所向披靡身被二創壯氣益厲慶之敗棄輜重走髙季式在魏為濟州刺史天平中山東舊賊劉盤陁史明曜等攻劫道路剽掠村邑齊兖青徐四州患之厯政不能討季式至皆破滅之尋有濮陽民杜靈椿等攻剽野聚衆將萬人季式遣騎三百一戰擒之又陽平路叔文徒黨緒顯等立營柵為亂季式討平之又有羣賊破南河郡季式遣兵臨之應時斬戮自兹以後逺近清晏王峻為營州刺史茹茹主菴羅辰率其餘黨東徙峻度其必来預為之備未幾菴羅辰到頓軍城西峻乃設竒伏大破之獲其名王郁久閭豆拔提等數十人送於京師菴羅辰於此遁走先是刺史陸士茂詐殺室韋八百餘人因此朝貢遂絶至是峻分命將士要其行路室韋果至大破之虜其酋帥而還因厚加恩禮放遣之室韋遂獻誠欵朝貢不絶峻有力焉任城王湝為青州刺史後主武平中州人崔蔚波等夜襲州城湝部分倉卒之際咸得齊整撃賊大破之後周寇儁為凉州刺史時梁遣其將曹琰之鎮魏興繼日版築琰之屢擾疆埸邊民患之儁遣長史杜休道率兵攻克其城并擒琰之琰之即梁大將景宗之季弟也於是梁人憚焉郭彦為澧州刺史時齊南安城主馮顯密遣使歸降其衆未之知也柱國宇文貴令彦率兵應接齊人先令顯率所部送糧南下彦懼其衆不從命乃於路邀之顯因得自㧞其衆果拒戰彦縱兵奮撃並虜獲之以南安無備即引兵掩襲顯外兵参軍鄒紹既為彦所獲因請為鄊導彦遂夜至城下令紹詐稱顯歸門者開門待之彦引兵而入遂有其城俘獲三千餘人晉公䕶嘉之史寕在西魏為車騎將軍行涇州事時賊帥莫折後熾冦掠居民寕率州兵與行原州事李賢討破之轉東義州刺史寕僅得入州梨茍亦至寕逆擊破之斬其雒安郡守馮善道轉涼州刺史寕未至而前刺史宇文仲和據州作亂詔遣獨孤信率兵與寕討之寕先至涼州為陳禍福城中吏民皆相率降附仲和仍據城不下尋亦克之加車騎大將軍儀同三司宇文神舉為并州刺史所部東夀陽縣土人相聚為盜率其衆五千人來襲州城神舉以兵討平之韓褒為汾州刺史州界北接太原當千里徑先是齊寇數入民廢耕桑前後刺史莫能防捍褒乃不下屬縣民既不及設備以故多被抄掠齊人喜相謂曰汾州不覺吾至先未集兵今者之還必莫能追躡我矣繇是益懈不為營壘褒已先勒精鋭伏北山中分據險阻邀其歸路乗其衆怠縱伏撃之盡獲其衆故獲生口者並囚送京師褒因是奏曰所獲賊衆不足為多俘而辱之但益其忿耳請一切放還以徳報怨有詔許焉自此抄兵頗息杜杲為修武都守屬鳳州人仇周貢等搆亂攻逼修武杲信洽於民部内遂無叛者尋而開府趙昶督諸軍進討杲率郡兵與昶合勢遂破平之梁臺為平涼郡守時莫折後熾結聚輕剽寇掠居民刺史史寕討之厯時不克臺陳賊形勢兼論攻取之䇿寕善而從之遂破賊徒和洪為龍州刺史先是蠻人任公忻李國立等聚亂刺史獨孤善力不能禦朝議以洪有武畧代善為刺史月餘擒公忻國立皆斬首梟之餘黨悉平楊文思為武都太守十姓獠反文思討平之復治冀州事黨項𦍑叛文思率州兵討平之進擊資中武康隆山生獠及東山獽戎屬並破之趙昶為安夷郡守時屬軍機科發切急氐情難之相率謀叛昶乃潜遣吏説離間其情因其擕貳遂輕往臨之羣氐不知所為咸来見昶乃收其首逆者二十餘人斬之餘衆遂定又為武州刺史興州人叚吒及氐酋姜多復反攻没郡縣昶討斬之賀若誼為熊州刺史平齊之役誼率兵出凾谷先據雒陽即拜雒州刺史陸騰為江州刺史明帝初陵眉戎江資卭新遂八州夷夏及合州民張瑜兄弟並反衆數萬人攻破郡縣騰率兵討之轉潼州刺史後為龍州刺史州民李廣嗣李武等據慿巖險以為堡壁招集不逞之徒攻劫郡縣厯政不能治騰密令多造飛梯身率麾下夜往掩襲未明四面俱上遂破之執廣嗣等於鼓下其黨有任公忻者更聚徒衆圍逼州城乃語騰曰但免廣嗣及武即散兵請罪騰謂將士曰吾若不殺廣嗣等可謂隳軍實而長寇讎事之不可者也公忻竪子乃敢要人即斬廣嗣及武以首示之賊徒沮氣於是出兵奮撃盡獲之隋趙賢通初仕後周為陕州刺史蠻酋向天王聚衆作亂以兵攻信陵秭歸賢通勒所部五百人出其不意襲撃破之二郡獲全時周人於江南岸置安蜀城以禦陳屬霖雨數旬城頽百餘歩蠻酋鄭南鄊叛引陳將吴明徹欲掩安屬議者皆勸賢通益修守禦賢通曰不然吾自有以安之乃遣使説誘江外生蠻同武陽令乗虚掩襲所居獲其南鄉父母妻子南鄉聞之其黨各散陳兵遂退明年吴明徹屢為寇患賢通勒兵禦之前後十六戰每挫其鋒獲陳禆將覃冏王足子吴朗等三人斬首一百六十級以功封開府儀同三司遷荆州總管長史元景山為建州刺史時髙祖為丞相司馬消難之以鄖州入陳也遣將樊毅馬傑等来援景山率輕騎五百馳赴之毅等懼掠居民而遁景山追之一日一夜行三百餘里與毅戰於漳口三合皆克毅等退保甑山鎮其城邑消難所䧟者悉平之拜安州總管桐栢山蠻相聚為亂景山復撃平之及髙祖受禪拜景山亳州總管陳人張景遵以淮南内屬為陳將任蠻奴所攻破其數柵景山發譙潁兵援之蠻奴引軍而退徴為候正劉宏彭城人初仕後周為郡太守尉遲廻之亂遣其將席毗寇掠徐兖宏勒兵拒之以功授儀同元亨為雒州刺史尉遲廻之亂潁陽人梁康邢流水等舉兵應廻旬月之間衆至萬餘州治中王文舒潜與梁康相結將圖亨亨隂知其謀乃選關中兵得二千人為左右執文舒斬之以兵襲擊梁康邢流水皆破之豆盧通為北徐州刺史尉遲廻之亂遣其所署莒州刺史烏丸尼率衆来攻通逆討破之賜帛八百叚進位大將軍蘇沙羅為資州刺史冉尨羌作亂攻汶山金川二鎮沙羅率兵撃破之授邛州刺史韋冲檢校栝州事時東陽賊帥陶子定吳州賊帥羅方慧並聚衆為亂攻圍婺州永康烏程諸縣冲率兵撃破之張湏陁為齊郡丞賊帥王薄聚結亡命數萬人寇掠郡境官軍撃之多不利湏陁發兵拒之薄遂引軍南轉掠魯郡境湏陁躡之及於岱山之下薄恃驟勝不設備湏陁選精鋭出其不意擊之薄衆大潰因乗勝斬首數千級薄收合亡散得萬餘人將北渡河湏陁追之至臨邑復破之斬五千餘級獲六畜萬計薄復北連豆子䴚賊孫宣雅石秪闍郝孝徳等衆十餘萬攻章邱湏陁遣舟師斷其津濟親帥馬歩二萬襲撃大破之賊徒散走既至津梁復為舟師所拒前後獲其家累輜重不可勝計其年賊帥裴長才石子河等衆二萬奄至城下縱兵大掠湏陁未暇集兵親率五騎與戰賊競赴之圍百餘重身中數創勇氣彌厲㑹城中兵至賊稍却湏陁督兵復戰長才敗走後數旬賊帥秦君宏方預等合軍圍北海兵鋒甚鋭湏陁謂官屬曰賊自恃強謂我不敢救吾今速去破之必矣於是簡精兵倍道而進賊果無備撃大破之斬數萬級復獲輜重三千兩又賊左孝友衆將十萬屯於蹲狗山湏陁列八營以逼之復分兵扼其要害孝友窘迫面縳来降其黨解散王良鄭大彪李睕等衆各萬計湏陁悉討平之威振東夏以功遷齊郡通守領河南道十二郡黜陟討捕大使楊善㑹為清河郡丞賊帥張金稱以輕兵掠寇氏善㑹與平原通守楊元宏歩騎數萬衆襲其不意武賁郎將王辯軍亦至金稱釋寇氏来援因與辯戰辯不利善㑹選精鋭五百赴之所當皆靡辯軍復進賊退守夲營諸軍各還于時山東思亂從盜如市郡縣㣲弱䧟没相繼能抗賊者惟善㑹而已前後七百餘陣未甞負敗每憾衆寡懸殊未能滅賊㑹太僕楊義臣討金稱復為賊所敗退保臨清取善㑹之䇿頻與决戰賊乃退走乗勝遂破其營盡俘其衆金稱將數百人遁逃後歸漳南招集餘黨善㑹追捕斬之傳首行在所煬帝賜以尚方甲矟弓劍進拜清河通守其年從楊義臣斬漳南賊髙士逹傳首江都宫帝下詔褒揚之士逹所部將竇建徳自號長樂王来攻信都臨清賊王安阻兵數千與建徳相影響善㑹襲安斬之陳孝意為雁門郡丞煬帝幸江都馬邑劉武周殺太守王仁恭舉兵作亂孝意率兵與武賁郎將王智辯討之戰於下舘城反為所敗武周遂轉攻傍縣百姓忷忷將懐叛逆前郡丞楊長仁雁門令王確等並桀黠為無頼所歸謀應武周孝意隂知之族滅其家郡中戰慄莫敢異志俄而武周来攻孝意拒之每致尅㨗慕容三蔵為疊州總管黨項𦍑時有反叛三蔵随便討平之部内夷夏咸得安輯楊義臣為檢校趙郡太守妖賊向海公聚衆作亂寇扶風安定間義臣奉詔擊平之王世充為江都郡丞領江都宫監及吳元感反吳人朱爕晉陵人管崇起兵江南以應之自稱將軍擁衆十餘萬煬帝遣將軍吐萬緒魚俱羅討之不能克充募江都萬餘人頻擊破之每有克㨗必歸功於下所獲軍實皆推與士卒身無所受繇此人争為用功㝡居多齊郡賊帥孟讓自長白山寇掠諸郡至盱眙有衆十餘萬充以兵拒之而羸師示弱保都梁山為五柵相持不戰後因其解弛出兵奮擊大破之乗勝盡滅賊讓乃以數十騎遁去斬首萬人六畜軍資莫不盡獲帝以充有將帥才畧始遣領兵討諸小盜所向皆破之郭絢為涿郡通守山東盜賊起絢逐捕之多所尅獲時諸郡無復完者惟涿郡獨全唐蕭瑀初仕隋為河池郡守既至有山賊萬餘人寇暴縱横瑀前募勇敢之士設竒而擊之在陣斬賊帥而降其衆所獲財畜咸賞有功繇是人竭其力續以薛舉遣衆數萬侵掠郡境瑀敗之自後諸賊莫敢進郡中復安邱和隋末交阯太守㑹煬帝為宇文化及所弑鴻臚卿寗長真以鬰林始安之地附於蕭銑馬盎以蒼梧髙梁珠崖畨禺之地附於林士宏各遣人召之和初未知隋亡皆不就林邑之西諸國並遣遺和明珠文犀金寳之物富埓王者銑聞利之遣將長真率百越之衆渡海侵和和遣髙士㢘率交愛首領擊之長真退走境内獲全郡中樹碑頌徳于徳秀武徳中為慶州刺史梁師都来侵徳秀擊却之楊則為靈州長史梁師都遣兵侵靈州則擊走之任環為榖州刺史王世充遣其將郭士衡歩騎數千来侵環逆擊大破之俘斬且盡張善為伊州總管武徳二年王世充遣其將王世隆寇伊州善擊走之丁伯徳為西濟州刺史王世充遣其將来侵伯徳擊破之許紹為陕州刺史蕭銑遣其將楊道生来侵紹擊破之郭仁朂為同州留守胡賊掠同州之白水縣坊仁朂討平之開緒為朔州刺史劉武周遣其將牛讓来侵開緒擊走之獨孤開逺為遼州刺史劉黒闥擾亂山東所在多䧟没開逺率厲百姓保其州境屢將兵斷賊糧道賊竟不敢侵逼公孫武逹貞觀初為肅州刺史嵗餘突厥數千騎輜重萬餘人侵肅州欲戰虜稍却急攻之遂大潰犄之於張掖河又命軍士於上流以栰渡兵擊其餘衆賊半濟兩岸夾攻之斬溺畧盡降璽書慰勉之拜右監門將軍又突厥犯西偏武逹與甘州刺史成仁重擊大破之俘其男女千餘口雜畜數千計李道彦貞觀中為岷州都督吐谷渾来寇道彦擊走之執其名王二人俘斬七百餘級崔義元以髙宗永徽中為婺州刺史時睦州女子陳碩真作亂寇東陽義元發兵拒之百姓訛言碩真有神靈犯其兵馬無不滅門士衆恟懼司功叅軍崔元籍曰起兵仗順猶懼無成此乃妖誑豈得能久義元乃遣元籍為先鋒自率官吏繼進至下淮戍擒其間諜數十人夜有流星墜賊營詰朝進擊之左右以楯蔽箭義元曰刺史尚欲避箭誰肯致死遽令去之於是士卒齊力賊衆大潰斬首數千級餘衆悉許其歸進至睦州界歸者萬計房仁裕之軍與義元相㑹遂獲碩真等斬之餘黨悉平劉鱗為南海太守以元宗天寳三載破海賊吳令光永嘉郡平顔杲卿為恒山太守天寳十四載安祿山䧟東都杲卿與長史袁履謙賈深等殺賊將李欽湊執賊將何千年髙邈送京師顔真卿天寳末為平原太守安祿山遣其將李欽湊髙邈何千年等守土門真卿從兄弟恒山太守杲卿與長史袁履謙殺欽湊邈擒千年送京師土門既開十七郡同日歸順共推真卿為帥得兵二十餘萬横絶燕趙詔加真卿户部侍郎依前平原太守薛景仙以肅宗至徳初為扶風太守安禄山逆賊曵落河兵數萬人来寇景仙與將軍康景龍率百姓斬其渠帥十餘人餘皆奔走武齊莊為交城太守破賊安定逺等五千餘衆盡獲其軍資器械韋倫為商州刺史荆襄等道租庸使㑹襄州禆將康楚元張嘉延擁衆為叛兇黨萬餘人自稱東楚義王襄州刺史王政棄城遁走嘉延又南襲破江陵漢沔饋運阻絶朝廷旰食倫乃調兵駐鎮州界楚元兇黨有来降者必厚加賞數日後楚元衆頗怠倫進軍擊之生擒楚元以獻餘衆悉走收租庸錢物僅二百萬貫並免失墜荆襄二州平髙晃為汝州刺史破逆賊史思明賊衆三千生擒賊帥八十人及駞馬器械不可勝數明年又破逆賊五千衆生擒三千人李抱玉為澤州刺史史思明圖澤州抱玉夜出軍大破之邢濟寳應初為桂州刺史討西原賊帥吳功曹等平之裴虬為道州刺史代宗永泰五年湖南都團練使崔灌為其兵馬使玠所殺玠據潭州虬出軍討玠平之李勉為江西觀察使賊帥陳莊連䧟江西州縣偏將吕太一武日昇相繼背叛勉與諸道兵戰悉攻平之王翃大厯中為容州刺史初安祿山反詔徴嶺南募兵命南陽太守魯炅統之以遏南侵魯與賊戰敗于葉縣嶺南山洞夷獠乗此相聚為亂其首領梁崇牽自號平南十道大都統及其黨帥覃問等因誘西原賊張侯夏永攻䧟城邑偷據容州前後陳仁琇李抗侯金儀耿慎惑元結長孫全緒等容州刺史皆寓理藤州或居梧州者及翃至藤州言於衆曰吾為容州刺史安得寄理他邑乃出私財募將徤許奏以髙官厚勲以是人各盡力未數日有斬賊帥歐陽珪馳往廣州見節度李勉求兵應援勉曰容州陷賊已久賊勢且強必難圖也若速討祗自敗耳終無成功翃復請曰大夫若不能命帥但諜告諸州揚言三千兵援助兾藉為勢耳勉然之翃乃手札告諭義州刺史陳仁瓘藤州刺史李曉庭等盟約討賊翃復募三千餘人同力鏖戰至六年三月遂尅復容州故城賊猶壓境戰日數合節度使牒止翃用兵翃慮惑將士匿其牒奮起士卒大破賊數萬衆擒其大首領梁崇牽賊遁數百里外盡復容州故境翃發表以聞奏置順州以遏餘寇前後大小百餘戰生擒賊帥上獻者七十餘人累加銀青光祿大夫兼御史中丞充招討處置使翃又令其將張利用李實等分討襲西原遂收復鬰林諸州部内漸安後因哥舒晃殺節度使吕崇賁嶺南復亂翃遣大將李實悉所管兵赴援廣州西原賊帥覃問復招集其黨白容管兵馬盡趍廣州可襲取之於是悉衆奄至翃又力戰大破之生擒覃問代宗累遣中使慰問加翃金紫光祿大夫于邵為益州刺史時嵗儉夷獠相聚山澤為盜數千萬人来圍州城邵撫勵州兵與之拒戰凡旬有二日間遣使説喻示以善惡山盜邀邵出乃以儒服出城致之不疑因皆降之節度使李抱玉以聞邵遷梓州刺史張萬福攝廬夀二州刺史州送租賦詣京師至潁州界為盜所劫萬福領輕兵入潁州界討之賊不意萬福至忙迫不得戰萬福悉聚而誅之盡得其所亡物并得前後所掠人妻子財物牛馬等萬福悉還其家不能自致者萬福給船乗以遣尋拜夀州刺史淮南節度副使為節度使崔圓所忌失刺史改鴻臚卿以節度副使將千人鎮夀州萬福不以為憾許杲以平盧行軍司馬將三千人駐濠州不去有窺淮南意圓令萬福攝濠州刺史杲聞即提卒去止當塗陳莊賊陷舒州圓又以萬福為舒州刺史督淮南岸盜賊連破其黨大厯三年召赴京師代宗謂曰聞卿名欲一識卿且將累卿以許杲焉萬福拜謝因前曰陛下以許杲召臣如河北諸將叛欲以屬何人代宗笑謂曰且與吾了許杲事方當大用卿以為和州刺史行營防禦使督淮南岸盜賊至州杲懼移軍上元杲至楚州大掠節度使韋元甫命萬福追討之未至淮隂杲為其將康自勸所逐自勸擁兵繼掠循淮南東萬福倍道追而殺之免者十二三盡得擄掠金帛婦女等皆䕶致其家軍還元甫將厚賞將士萬福曰官徤常虚費衣糧無所事今乃一小煩之不足過賞請用三之一代宗發詔以勞之賜衣一襲禁錦十雙郗士美以徳宗建中年為黔中觀察使時溪州賊帥向子琪連結夷蠻控據山洞衆號七八千士美設竒畧討平之詔書勞慰加檢校右常侍封髙平郡公又為鄂岳觀察使討伊慎有功授安黄節度韓滉為潤州刺史李希烈陷汴州滉擇其鋭卒令禆將李長榮王西曜與宣武軍節度使劉元佐掎角討襲解寕陵之圍復宋汴之路滉功為多李澄為滑州刺史破李希烈逆衆於鄭州南境擒賊黨四十七人戎器二千餘事辛秘以憲宗元和中為湖州刺史屬李錡阻命將收支郡以大將守之遂分兵取四州刺史蘇常杭睦或先以戰破或先被拘執賊黨以為秘儒懦甚易之秘密遣牙門將邱知二勒兵數百人候賊將動逆戰大破之知二中流矢墜馬起而復戰斬其將焚其營一州遂安賊平以功賜金紫繇是僉以秘材任將帥李憲為綘州刺史澤州沁水縣妖賊李有經聚衆三千餘人来寇翼城縣憲以州兵及神䇿鎮軍擊破之擒有經以獻李聽為楚州刺史李師道反鄆人素易淮南之卒聼潜訓練出其不意趨海州據險要破沭陽兵降朐山戍懐仁東海兩城望風乞降山東平以功授夏州節度竇易直以穆宗長慶中為潤州刺史部將王國清以所部八百人為亂易直自將牙兵拒之國清衆潰斬於京口餘黨連親兵復為亂皆誅之裴誼以文宗太和中為江南西道觀察使誼奏吉州破赤石徐莊等洞賊戮殺擒獲共二百三十六人收賊柵七所器械三千二百三十事水陸田四百頃牛馬等四百七十餘頭梁王敬蕘唐末為潁州刺史州境荒饉大寇繼至黄巢數十萬衆聚寨於州南敬蕘極力抗禦逾旬而退俄又秦宗權之衆陵暴益甚合圍攻壁皆力屈而去蔡賊復遣將刁君務以萬衆来逼敬蕘列陣當之身先馳突殺敵甚多繇是竟全郡壘逺近歸附及淮人不恭太祖屢以大軍南渡路繇州境敬蕘悉心供億太祖深嘉之張敬方開平中為均州刺史時襄陽小將王永殺留後王班間使附于蜀房州聞之亦叛敬方能完其郡又移兵尅房陵後唐袁建豐為相州刺史領相州軍事行營在外指揮使孟謙據城以叛建豐引兵討平之改隰州刺史索自通為京兆尹西京留守屬河中指揮使楊彦温據河中作亂自通率師討平之晉馬全節後唐清泰初為全州防禦使㑹蜀軍攻其州城兵纔及千人兵馬都監陳隠懼託以他事出城領三百人順流而逃賊既盛人情憂沮全節悉出其家財以給士復出竒拒戰以死繼之賊退朝廷嘉其功孫彦韜仕後唐為濮州刺史清泰末羣寇入郡郡人大擾彦韜率帳下百人一呼破之人皆感之劉遂清為易州刺史時王都與契丹連結將使遏其寇衝既至郡大有禦侮之畧境内頼焉周許遷為隰州刺史以太祖廣順元年十二月朝見賜襲衣金𢃄銀鞍馬奬守城之功也冊府元龜卷六百九十四
