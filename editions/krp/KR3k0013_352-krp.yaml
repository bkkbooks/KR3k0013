body:
  text: 册府元龜卷三百五十二宋王欽若等撰將帥部立功第五梁馬仙琕初仕齊永元中蕭遥光崔恵景亂累有戰功以勲至前將軍累遷振威將軍豫州刺史時昫山民殺瑯邪太守劉昕以城䧏魏詔假仙琕節討之魏徐州刺史盧昶以衆十餘萬赴焉仙琕與戰累破之昶遁走仙琕縱兵乘之魏衆免者十一二收其兵糧牛馬噐械不可勝數振旅還京師遷太子左衞率進爵為侯增邑六百戸曹景宗仕齊為游擊將軍建武四年太尉陳顯逹督衆軍北圍馬圏景宗從之以甲士二千設伏破魏援中山王英四萬人遂尅馬圏髙祖即位以為右衞將軍天監五年魏中山王英攻鍾離圍徐州刺史昌義之髙祖遣景宗督衆軍援義之豫州刺史韋叡亦援焉而受景宗節度既進頓邵陽洲立壘與魏城相去百餘步魏連戰不能却殺傷者十二三自是魏軍不能逼景宗等噐甲精新軍儀甚盛魏人望之奪氣先是髙祖詔景宗等逆裝髙艦使與魏橋等為火攻計令景宗與叡各攻一橋叡攻其南景宗攻其北六年三月春水生淮水暴漲六七尺叡遣所督將馮道根李文釗裴邃韋寂等乘艦登岸擊魏洲上軍盡殪景宗因使衆軍皆噪亂登諸城呼聲震天地魏將楊大眼於西岸燒營奔魏中山王英自東岸棄城走諸壘相次土崩悉棄其噐甲争投水死淮水為之不流景宗令軍主馬廣躡大眼至濊水上四十餘里伏屍相枕義之出逐英至雒口英以匹馬入梁城緣淮百餘里屍骸枕籍生擒五萬餘人收其軍糧噐械積如山牛馬驢騾不可勝計景宗乃搜軍所得生口萬餘人馬千匹遣獻捷髙祖詔還本軍景宗振旅凱入增封四百并前為二千戸進爵為公詔拜侍中領軍將軍給皷吹一部蔡道恭齊末為輔國將軍髙祖舉義師於雍州道恭以舊將遷右衞將軍㑹巴西太守魯休烈等自巴蜀連兵冦上明以道恭持節督西討諸軍事次土臺與賊合戰道恭潜以竒兵出其後一戰大破之休烈等䧏於軍門昌義之天監元年以北徐州刺史鎮鍾離四年大舉北侵臨川王宏督衆軍向雒口義之為前軍攻魏梁城戍尅之五年冬武帝以征役久詔班師魏中山王元英乘勢追躡攻没馬頭等城城内糧貯魏悉移歸北議者咸謂無復南向帝曰此必進兵非其實也乃遣修鍾離城勅義之為戰守備是冬英果率衆數十萬圍鍾離衝車毁西墉時城中衆纔三千義之督帥隨方抗禦前後殺傷萬計魏軍死者與城平六年帝遣曹景宗韋叡率衆二十萬救焉大破魏軍義之率輕兵追至洛口而還以功進號軍師將軍馮道根天監二年以南梁太守領阜陵城戍魏將党法宗傅豎眼率衆二萬奄至城下道根塹壘未固城中衆少莫不失色道根命開城門緩服登城選精銳二百人出與魏軍戰敗之魏軍因退遷輔國將軍六年魏攻鍾離武帝詔豫州刺史韋叡救之道根為叡前驅至徐州建計據邵陽等壘掘塹逼魏城道根能走馬計地計馬足以賦功城隍立辨及淮水長道根乘戰艦斷魏連橋魏軍敗績進爵為伯改封豫寧縣韋叡天監四年以輔國將軍督衆軍北伐叡遣長史王超宗梁郡太守馮道根攻魏小峴城拔之遂進討合肥乃堰肥水以灌之城遂潰俘獲萬餘級牛馬萬數絹滿十間屋遷豫州於合肥五年魏中山王元英冦北徐州圍刺史昌義之於鍾離衆號百萬連城四十餘髙祖遣征北將軍曹景宗都督衆軍二十萬以拒之次邵陽洲築壘相守又詔叡率豫州之衆㑹焉魏人先於邵陽洲兩岸為兩橋樹栅數百步跨淮通道叡裝大艦使梁郡太守馮道根盧江太守裴邃秦郡太守李文釗等為水軍值淮水暴長叡即遣之鬭艦競發皆臨壘以小舩載草灌之以膏從而焚其橋風怒火盛烟塵晦㝠敢死之士拔栅斫橋水又漂疾倐忽之間橋栅俱壊而道根等皆身自搏戰軍人奮勇呼聲動天地無不一當百魏人大潰元英因橋絶脫身遁去魏軍趨水死者十餘萬斬首亦如之其餘者釋甲稽顙乞為囚奴又數十萬所獲軍實牛馬不可勝紀叡遣報昌義之且怒且喜不暇答語但叫曰更生更生髙祖遣中書郎周捨勞於淮上叡積所獲於軍門捨觀之謂叡曰君此獲復與熊耳山等以功增封七百戸進爵為侯裴邃天監五年以右將軍盧江太守征邵陽洲魏人為長橋斷淮以濟邃築壘逼橋每戰輙尅於是宻作没突艦㑹甚雨淮水暴溢邃乘艦徑造橋側魏衆驚潰邃乘勝追擊大破之進尅羊石城斬城主元康又破霍丘城斬城主寗永仁平小峴攻合肥以功封夷陵縣子累遷大匠卿普通二年義州刺史文僧明以州叛入於魏魏來援以邃為假節信武將軍督衆軍討焉邃深入魏境從邉城道出其不意魏所署義州刺史封夀據檀公峴邃擊破之邃圍其城夀面縳請䧏義州平除豫州刺史鎮合肥四年進號宣毅将軍是嵗大軍北伐以邃督征討諸軍事率騎二千先襲夀陽九月壬戍夜至夀陽攻其郛斬門而入日戰九合為後軍蔡秀成失道不至邃以援絶拔還於是邃復整兵收集士卒令諸將各以服色相别邃自為黄袍騎先攻狄兵甓城黎漿等城皆拔之屠安城馬頭沙陵等戍明年復破魏新蔡郡略地至於鄭城汝潁之間所在響應夀陽守將長孫穉河間王元琛率衆五萬出城挑戰邃勒諸將為四甄以待之令直閣將軍李祖憐偽遁以引穉穉等悉衆追四甄競發魏衆大敗斬首萬餘級劉思天監五年以輔國將軍破魏青州刺史元擊於膠水李興國天監五年以武勇將軍攻平靜關尅之夏侯䕫普通二年以征逺將軍副裴邃討義州平之七年拜信武將軍持節督司州諸軍事八年勅䕫帥壯武將軍裴之禮直閣將軍任思祖出義陽道攻平静穆陵隂山三關尅之是時譙州刺史湛僧智圍魏東豫州刺史元慶和於廣陵入其郛魏將元顯伯率軍赴援僧智逆擊破之䕫自武陽㑹僧智斷魏軍歸路慶和於内築栅以自固及䕫至遂請䧏䕫讓僧智僧智曰慶和志欲䧏公不願䧏僧智徃必乖其意且僧智所將烏合募人不可御之以法公持軍素嚴必無犯令受䧏納附深得其宜於是䕫乃登城拔魏幟建官軍旗鼓衆莫敢妄動慶和束兵以出軍無私焉凡䧏男女口萬餘人粟六十萬斛餘財物稱是元顯聞之夜遁衆軍追之生擒一萬餘人斬獲不可勝數詔以僧智領東豫州鎮廣陵䕫引軍屯安陽䕫又遣偏將屠楚城盡俘其衆繇是義陽北道遂絶夏侯亶為中䕶軍普通六年大舉北伐先遣豫州刺史裴邃帥譙州刺史湛僧智歴陽太守胡紹世南譙太守魚𢎞晉熙太守張澄並世之驍將自南道伐夀陽城未剋而邃卒乃加亶使持節馳驛代邃與魏將河間王元琛臨淮王元彧等相拒頻戰剋捷尋有宻勅班師合肥以休士馬須堰成復進七年夏淮堰水盛夀陽城將没髙祖復遣北道将軍元樹帥彭寳孫陳慶等稍進亶帥湛僧智魚𢎞張澄等通清流關将入淮淝魏軍夾淝築城出亶軍後亶與僧智還襲破之進攻黎漿貞威将軍韋放自北道㑹焉兩軍既合所向皆降下凡降城五十二獲男女口七萬五千人米二十萬石陳慶之為宣猛将軍文徳主帥普通七年安西将軍元樹出征夀春除慶之假節總知軍事魏豫州刺史季憲遣其子長鈞西城相拒慶之攻之憲力屈遂降慶之入據其城以功賜爵闗中侯大通元年攻魏梁城拔之進屠考城擒魏濟陰王元暉業又𨽻領軍曹仲宗進據渦陽城魏人掎角作十三城慶之㘅枚夜出陷其四壘渦陽城主王緯乞降所餘九城兵甲猶盛乃陳其俘馘鼓噪而攻遂大奔潰斬獲畧盡渦水咽流降城中男女二萬餘口又出為持節都督縁淮諸軍事奮武将軍妖賊僧强自稱為帝王豪蔡伯龍起兵應之衆至三萬攻陷北徐州濟陰太守楊起文棄城走鍾離太守單希寳見害慶之受命討之未浹辰斬伯龍僧强傳首京中大通二年除都督司西豫三州諸軍事南北司二州刺史慶之至鎮遂圍懸瓠破魏潁州刺史婁起揚州刺史是𤣥寳于溱水又破行臺孫騰騰大都督侯進豫州刺史堯雄梁州刺史司馬恭於楚城大同二年魏遣將侯景率衆七萬冦楚州刺史桓和陷没景仍進軍淮上貽慶之書使降勅遣湘潭侯退右衞夏侯䕫等赴援軍至黎漿慶之已擊破景時大寒雪景棄輜重走慶之收之以歸進號仁威将軍韋放普通八年以明威将軍逐魏軍至渦陽魏又遣常山王元昭大将李奨乞佛寳費穆等衆五萬来援放率所督將陳度趙伯超等夾擊大破之渦陽城主王緯以城降放乃登城檢出降口四千四百人器仗充牣又遣降人三千報李奨費穆等魏人棄諸營壘一時奔潰衆乗之斬獲畧盡擒穆弟超并王緯送於京師郭祖深普通中為雲騎将軍所領皆精兵令行禁止每討逐越境追擒江中嘗有賊祖深自率討之列陣未敢進每令所親人先登不時進斬之遂大破賊威振逺近長江肅清蘭欽大通元年以直閣将軍攻魏蕭城拔之仍破彭城别將郊仲進攻擬山城破其大都督劉屬衆二十萬進攻龍城獲馬千餘匹又破其大将柴集及襄城太守髙宣别将落思念鄭承宗等仍攻厥固張龍子城未抜魏彭城守将楊目遣子孝邕率輕兵来拒欽逆擊走之又破譙州刺史劉海游還拔厥固收其家口楊目又遣都督范思念别将曹龍牙數萬衆来援欽與戰於陣斬曹龍牙𫝊首京師又假欽節都督衡州三郡兵討桂陽陽山始興叛蠻至即平之封安懐縣男又破天漆蠻帥晚時得㑹衡州刺史元慶和為桂陽人嚴容所圍遣使告急欽徃應援破容羅溪於是長樂諸洞一時平蕩隂子春太清二年以信威將軍梁秦二州刺史討峽中叛蠻平之徴為左衛將軍又遷侍中屬侯景亂世祖令子春隨領軍將軍王僧辯攻邵陵王於郢州平之又與左衞將軍徐文盛東討侯景至貝磯與景遇子春力戰常冠諸軍杜崱簡文帝大寳初以宣毅將軍領鎮蠻䕶軍武陵内史隨軍王僧辯東討侯景追至石頭與賊相持横嶺及戰景親率精鋭左右衝突崱從嶺後横截之景乃大破東奔晉陽崱入據城景平加散騎常侍持節督江州諸軍事江州刺史齊將郭元建攻秦州刺史嚴超逺於秦郡王僧辯令崱赴援陳霸先亦自歐陽來㑹與元建大戰於土陵霸先令彊弩射元建衆却崱因縱兵擊大破之斬首萬餘級生擒千餘人元建收餘衆以遁時世祖執王琳於江陵其長史陸納等遂於長沙反世祖徴崱與王僧辯討之承聖二年及納等戰於車輪大敗陷其二壘納等走保長沙崱等圍之後納等䧏崱又與王僧辯西討武陵王於硤口至即破平之杜龕大寳初為持節忠武將軍鄖州刺史追侯景至江夏圍其城景將宋子仙棄城遁龕追至楊浦生擒之三年衆軍至姑孰景將侯子鍳逆戰龕與陳霸先王琳等率精鋭擊之大敗子鍳遂至於石頭景親率其黨合戰龕與衆軍奮擊大破景景遂東奔承聖二年又與王僧辯討陸納等於長沙䧏之又征武陵王於西陵亦平之胡僧祐大寳中假節武猛將軍討侯景於京陜僧祐赴援至楊浦景遣其將任約率鋭卒五千據白塔遥以待之僧祐繇别路西上約謂畏已而退急追之及於南安芊口呼僧祐曰吳兒何為不早䧏走何處去僧祐不與之言潜引却至赤砂亭㑹陸法和至乃與并軍擊約大破之擒約送與江陵侯景聞之遂遁世祖以僧祐為侍中領軍將軍裴之横大寳中以河南内史隨王僧辯距侯景於巴陵景退遷持節平北將軍東徐州刺史中䕶軍封預寧侯邑三千戸又隨僧辯追景平郢曾江晉等州常為前鋒陷陣仍至石頭破景景東奔僧辯令之横與杜崱入守臺城及陸納據湖州叛又𨽻王僧辯南討焉於陣斬納將李賢眀遂平之又破武陵王於硤口還除吳興太守陳侯瑱仕梁為武臣將軍南兖州刺史隨都督王僧辯討侯景常為前鋒每戰却敵既復臺城景奔吳郡僧辯使瑱率兵追之與景戰於吳松江大敗景盡獲其軍進兵錢塘景將謝答仁吕子榮等皆䧏以功除南豫州刺史鎮于姑孰承聖二年北齊遣郭元建出自濡須僧辯遣瑱領甲士三千築壘於東關以扞之大敗元建除使持節鎮北將軍給鼓吹一部增邑二千戸累加太尉天嘉元年二月敗王琳于梁山又敗齊兵于博望生擒齊將劉伯球盡收其資儲舟艦俘馘以萬計琳及其主蕭莊奔於齊徐世譜仕梁以散騎常侍領水軍從司徒陸法和討侯景與景戰於赤亭湖時景軍甚盛世譜乃别造樓船拍艦火舫水車以益勢將戰又乘大艦居前大敗景軍生擒景將任約景退走因隨王僧辯攻郢州世譜復乘大艦臨其倉門賊將宋子仙據城䧏以功除使持節信武將軍信州刺史封魚復縣侯邑五百戸隨王僧辯東下常為前鋒又破景將侯子鍳於湖熟景卒後以功除通直散騎常侍衡州刺史資鎮河東太守增邑并前一千户孫瑒仕梁為戎昭將軍宜都太守從王僧辯救徐文盛於武昌㑹郢州陷乃留軍鎮巴陵修戰守之備俄而侯景兵至日夜攻圍瑒督所部兵悉力拒戰賊衆奔退瑒從大軍㳂流而下及尅姑孰瑒力戰有功除貟外散騎常侍封富縣侯邑一千户遷平南府司馬破黄洞蠻賊有功除廣州刺史歐陽頠仕梁為臨賀内史湘衡之界五十餘洞不賓勅令衡州刺史韋粲討之粲委頠為都督悉皆平殄髙祖之討蔡路養李遷仕頠率兵度嶺以助髙祖及路養等平有功為雲麾將軍東衡州刺史程靈洗仕梁為信武將軍蘭陵太守助防京口及平徐嗣徽靈洗有功除南丹陽太守封遂安縣侯增邑幷前一千五百户仍鎮采石㑹王琳前軍東下靈洗於南陵破之虜其兵士并獲青龍十餘乘以功授使持節都督南豫州縁江諸軍事信武將軍南豫州刺史侯瑱等敗王琳于栅口靈洗乘勝逐北據有魯山徴為衞士將軍餘如故天嘉四年周迪重冦臨川以靈洗為都督自鄱陽别道擊之迪又走山谷間五年遷中䕶軍常侍如故淳于量仕梁為都督巴州諸軍事侯景西上攻巴州元帝使都督王僧辯入據江陵量與僧辯併力拒景大敗景軍擒其將任約進攻郢州獲宋子仙仍随僧辯尅平侯景承聖元年以功授左衞將軍光大中湘州刺史華皎搆逆以量為征南大將軍西討大都督總率大艦自郢州樊浦拒之皎平并降周將長胡公拓拔定等以功授侍中中軍開府儀同三司周炤仕梁為持節髙州刺史討侯景是時炤據武昌西陽二郡招聚卒徒甲兵甚盛景將任約來據樊山炤與寜州長史徐文盛擊約斬其部將叱羅子通趙迦婁等乗勝追之頻尅約衆殆盡大建元年遷龍驤將軍隨都督吳明徹北討所向尅捷一月之中獲十二城裴忌仕梁為豫章王法曹參軍侯景之亂忌招集勇力隨髙祖征討累功為寜逺將軍及髙祖誅王僧辯弟僧智舉兵據吳郡髙祖遣黄佗率衆攻之僧智出兵於西昌門拒戰佗與相持不能尅髙祖謂忌曰三吳奥壌舊稱饒沃雖凶荒之餘猶為殷盛而賊徒扇聚天下揺心非公無以定之宜善思其策忌乃勒部下精兵輕行倍道自錢塘直趣吳郡夜至城下鼓噪薄之僧智疑大軍至輕舟奔杜龕忌入據其郡髙祖嘉之表受吳郡太守天嘉初出為南康内史時義安太守張紹賓據郡從文帝以忌為持節都督嶺北諸軍事率衆討平之周寶安梁平西將軍文育之子文育為熊曇朗所害寶安以吳興太守起為猛烈將軍領其舊兵及平王琳頗有功周迪之破熊曇朗寶安南入窮其餘燼天嘉二年重除雄信將軍吳興太守襲封壽昌縣公荀朗仕梁為豫州刺史王僧辯東討朗遣其將范寶勝及弟曉領兵二千助之侯景平後又别破齊將郭元運于踟蹰山承聖二年率部曲萬餘家濟江入宣城郡界立頓元帝授朗持節通直散騎常侍安南將軍都督南兖州諸軍事南兖州刺史未行而荆州陷髙祖入輔齊遣蕭軌東方老等來寇據石頭城朗自宣城來赴因與侯安都等大破齊軍樊猛仕梁為威戎將軍安南侯蕭方矩湘州司馬㑹武陵王蕭紀舉兵自漢江東下方矩遣猛率湘郢之卒隨都督陸法和進軍以拒之紀已下樓舩戰艦據巴江爭峽口尋相持久之不能決法和揣紀師老卒惰因令猛率驍勇三千輕舸百餘乗衝流直上出其不意鼓譟薄之紀衆倉卒驚駭不及整列皆棄艦登岸赴水死以千數時紀心膂數百人猶在左右猛將部曲三千餘人蒙楯横戈直登舟瞑目大呼紀侍衛皆披靡相枕藉不敢動猛手擒紀父子三人斬於䑽中盡收其舩艦器械以功授游騎將軍封安山縣伯邑一千户仍進軍撫定梁益蜀境悉平大建初遷武毅將軍領長沙内史尋𨽻章昭達西討江陵潜軍入峽焚周舩艦以功封富川縣侯蕭摩訶梁末隨侯安都東西征伐戰勝攻取摩訶功實居多天嘉中以平劉黑歐陽紇之功累遷巴山太守大建五年衆軍北討摩訶隨都督吳明徹濟江攻秦郡齊大將軍尉破胡等率衆十萬來援其前隊有蒼頭犀角大力之號十餘人出戰摩訶斬之於是齊軍退走以功授明毅將軍封廣平縣伯尋進爵為侯七年又隨明徹進圍宿豫擊走齊將王康徳以功除晉熙太守周敷梁末為信武將軍寜州刺史永定初王琳據有上流余孝頃與琳黨李希欽等共圍周迪迪擒孝頃等敷功居多熊曇朗之殺周文育據豫章將兵萬餘人襲敷徑至城敷與戰大破之追奔五十餘里曇朗單馬獲免盡收其軍實曇朗走巴山郡收合餘黨敷因與周迪黄法氍等進兵圍曇朗屠之加平西將軍豫章太守章昭達梁末從文帝討杜龕龕平又從討張彪于會稽尅之累功除明威將軍天嘉元年隨侯安都等拒王琳於沌口戰於蕪湖昭達乘平虜大艦中流而進先鋒發拍中於賊艦琳平昭達册勲第一二年除都督郢巴武沅等州諸軍事郢州刺史進號平西將軍會周迪反於臨川詔令昭達便道征之及迪敗走徵為䕶軍四年陳寶應納周迪復共冦臨川又以昭達為都督既至東興嶺而迪又退走昭達乃踰嶺以討寶應寶應據建安晉安二郡之界水陸為柵以拒官軍昭達與戰不利因據其上流會世祖遣余孝頃出自海道適至因并力乗之寶應大潰遂尅定閩中以功授鎭前將軍開府儀同三司歐陽紇據有嶺南反詔昭達都督衆軍討之擒紇送于京師廣州平以功進車騎大將軍遷司空周迪為振逺將軍江州刺史髙祖即位初王琳東下迪欲自據南川總召所部八郡守宰結盟聲言入赴朝廷恐其為變因厚慰撫之琳至湓城新吳洞主余孝頃舉兵應琳琳以為南川諸郡可傳檄而定乃遣其將李孝欽樊猛等南徵糧餉猛等與余孝頃相合衆且二萬來趨工塘連八城以逼迪迪使周敷率衆頓臨川故郡斷截江口因出與戰大敗之屠其八城生擒李孝欽樊猛余孝頃送於京師收其軍資器械山積虜其人馬黄法氍永定二年以宣毅將軍率兵援周迪王琳功授平南將軍熊曇朗於金口反害周文育法氍共周迪討平之進號安南將軍天嘉元年周迪反法氍率兵會都督吳明徹討迪於工塘迪平法氍功居多徵為使持節散騎常侍都督南徐州諸軍事鎭北大將軍南徐州刺史儀同三司太建五年大舉北伐以法氍為都督出歴陽齊遣其歴陽王步騎五千來援於小峴築城法氍遣左衞將軍樊介分兵於大峴禦之大破齊軍盡獲人馬器械進攻歴陽城䧏之以功加侍中侯安都天嘉元年以司空都督南徐州諸軍事督大軍出頓蕪湖以拒王琳琳敗走入齊安都進軍湓城討琳餘黨所向皆下會留異擁據東陽安都奉詔東討異與第二子忠臣脫身奔晉安安都虜其妻子盡收其人馬甲仗振旅而歸以功加侍中征北大將軍增邑并前五千户戴僧朔天嘉元年隨族兄右將軍僧錫平王琳有功僧錫卒僧朔代為南丹陽太守鎭採石從侯安都征留異又從征周迪有功累遷壯節將軍巴州刺史韓子髙天嘉二年以壯武將軍成州刺史文招縣子隨侯安都征留異頓於桃支嶺下時子髙兵甲精銳别御一營異平除假節貞毅將軍東陽太守五年章昭達等自臨川征晉安子髙自安泉嶺會於建安晉安平以功遷通直散騎常侍進爵為侯程文季天嘉二年以貞毅將軍新安太守隨侯安都東討留異異黨與向文政據有新安文季率精甲三百徑往攻之文政遣其兄子瓉來拒文季與戰大破瓉軍文政乃降四年陳寶應與留異連結又遣兵隨周迪更出臨川文帝遣信義太守余孝頃自海道襲晉安文季為之前軍所向尅捷寶應平文季戰功居多錢道戢天嘉二年為臨海太守鎭南巖時侯安都之討留異也道戢帥軍出松陽以斷其後異平以功拜持節通直散騎常侍輕車將軍都督東西二衡州諸軍事衡州刺史領始興内史宣帝即位徵歐陽紇入朝紇疑懼乃舉兵來攻衡州道戢與戰却之及都督章昭達率兵討紇以道戢為歩軍都督繇間道斷紇之後紇平除左衞將軍太建二年又隨昭達征蕭巋於江陵道戢别督衆軍與陸子隆焚青泥舟艦仍為昭達前軍攻安蜀城䧏之以功加散騎常侍仁武將軍増邑并前九百戸其年遷仁威將軍吳興太守未行改授使持節都督郢巴武三州諸軍事郢州刺史王師北討道戢與儀同黄法氍圍歴陽歴陽城平因以道戢鎭之以功加雲麾將軍増邑并前五千一百戸華皎天嘉三年以仁武將軍新州刺史督尋陽等五郡諸軍事周迪謀反遣其兄子伏甲於舩中偽稱賈人欲於湓城襲皎未發事覺皎遣人逆擊之盡獲其舩仗其年皎隨都督吳明徹征迪迪平以功授散騎常侍平南將軍臨川太守進爵為侯魯廣達天嘉三年以信武將軍北新蔡太守隨吳明徹討周迪於臨川每戰功最仍代兄悉達為吳州刺史封中宿縣侯後為巴州刺史太建五年衆軍北伐畧淮南舊地廣達與齊軍會於大峴大破之斬其敷城主張元範虜獲不可勝數進尅北徐州及授都督北徐州諸軍事徐州刺史吳明徹光大中為丹陽尹會湘州刺史華皎隂有異志詔授明徹使持節散騎常侍都督湘桂武三州諸軍事與征南大將軍淳于量等率兵討皎皎平授開府儀同三司太建五年詔加侍中都督征討諸軍事總綂衆軍十餘萬發自京師緣江城鎭相續䧏欵軍至秦郡尅其水柵齊遣大將尉破胡將兵為援明徹破走之斬獲不可勝計秦郡乃䧏進克仁州授征北大將軍進爵南平郡公次平峽石岸二城進逼壽陽齊遣王琳將兵拒守琳至與刺史王貴顯保其外郭明徹以琳初入衆心未附乗夜攻之中宵而潰齊兵退據相國城及金城明徹令軍中益脩攻具又引肥水以灌城城中苦濕多腹疾手足皆腫死者十六七會齊遣大將軍皮景和率兵數十萬來援去壽春三十里頓軍不進諸將咸曰堅城未拔大援在近不審明公計將安出明徹曰兵貴在速而彼結營不進自挫其鋒吾知其不敢戰明矣於是躬擐甲胄四靣疾攻城中震恐一鼓而克生擒王琳王貴顯扶風王可朱渾孝裕尚書盧潜左丞李騊駼送京師景和惶懼遁走進收其駝馬輜重七年進攻彭城軍至吕梁齊遣援兵前後至者數萬明徹又大破之任忠太建初以明毅將軍隨章昭達討歐陽紇於廣州累加右軍將軍五年衆軍北伐忠將兵出西道擊走齊歴陽王髙景安於大峴逐北至東闗仍尅其東西二城進軍蘄譙并拔之徑襲合肥入其郛進尅霍州以功授貟外散騎常侍封安復縣侯邑五百戸十二年為平南將軍南豫州刺史仍率歩騎趣歴陽周遣王延貴率衆為援忠大破之生擒延貴樊毅為左衞將軍太建五年衆軍北伐毅率衆攻廣陵楚子城拔之擊走齊軍於潁口齊援滄陵又破之七年進尅潼州下邳髙柵等六城徐敬成太建五年以貞威將軍吳興太守隨都督吳明徹北討出秦郡别遣敬成為都督乗金趐自歐陽引埭上泝江繇廣陵齊人皆城守弗敢出自繁梁湖下淮圍淮隂城仍監北兖州淮泗義兵相率響應一二日間衆至數萬尅淮隂山陽鹽城三郡并連口朐山二戍仍進攻鬰州尅之以功加通直散騎常侍雲旗將軍後魏劉庫仁昭成末為南部大人道武未立符堅以庫仁為陵江將軍與衞辰分國部衆而統之後辰叛攻庫仁庫仁大破之又西征庫狄部大獲畜産其後慕容垂圍符丕於鄴又遣將攻堅幽州刺史王永庫仁遣妻兄公孫希助永擊破之劉眷道武初代其兄庫仁攝國事日部大人絜佛叛眷力不能討乃引苻堅并州刺史張蚝攻佛破之眷又破賀蘭部于善無又擊蠕蠕别帥胝渥於意親山破之獲牛羊數十萬頭長孫肥登國初與莫題等俱為大將從征劉顯自濡源擊莫奚討賀蘭部並有戰功帝征蠕蠕大破之肥䧏其主匹侯跋又從征衞辰及薛于部㓕之蠕蠕别主緼紇提子曷多汗等率部落棄父西走肥以輕騎追至上郡斬之後從征中山拜中領軍將軍駕次晉陽慕容寶并州刺史遼西王農棄城宵遁肥追之至蒲泉獲其妻子帝將圍中山慕容寶棄城奔和龍肥與左將軍李栗三千騎追之至范陽不及而還遂破其研城戍俘千餘人中山城内人立慕容普鄰為主帝圍之普隣乃出歩卒千餘人欲伺間犯圍帝命肥挑戰偽退普鄰衆追肥帝截其後盡擒斬之時以士馬少糧遂罷中山之圍就榖河間慕容賀驎殺普鄰而自立車駕次魯口遣肥帥七千騎襲中山入其郛而還賀驎以歩騎四千追肥至𣲖水肥自魏昌擊之獲鎧騎二百肥中流矢瘡重乃還中山平以功賜爵琅邪公遷衞尉卿改爵盧鄕時中山太守仇儒不樂内徙亡匿趙郡推羣盗趙凖為主妄造妖言云燕東傾趙當續欲知其名凖水不足凖喜而從之自號使持節征西大將軍青冀二州牧鉅鹿公儒為長史聚黨二千餘家據闗城連引丁零殺害長吏扇動常山鉅鹿廣平諸郡遣肥率三千騎討之破凖於九門斬仇儒生擒凖詔以儒肉食凖傳送京師轘之於市夷其族除肥鎭逺將軍兖州刺史給歩騎二萬南徇許昌畧地至彭城司馬德宗將劉該遣使詣肥請䧏貢其方物姚平之寇平陽帝遣肥與毗陵王順等六萬騎為前鋒車駕次永安平慕遣勇將率精騎二百闚軍肥逆擊擒之匹馬不返平退保柴壁帝進攻屠之遣肥還鎭兖州肥前後征討未嘗敗失南平中原西摧羌冦肥功居多賞賜奴婢數百畜物數千尉古眞登國初從征庫莫奚及叱突鄰並有功又從救賀蘭破衞辰子直力鞮復擊慕容寶於叅合陂又從平中原以功賜爵束州侯加建節將軍明元初為鴻飛將軍率衆五千鎭大雒城明元西巡古眞與奚斤等率前軍討越勒部大破之獲馬五萬匹牛羊二十萬頭驅掠二萬餘家西還奚斤登國初與長孫肥等俱綂禁兵後從征慕容寶於叅合拜越騎校尉車駕還京師博陵渤海章武諸郡羣盗並起所在屯聚拒害長吏斤與畧陽公元遵等率山東諸將討平之又從破髙車諸部又破庫狄宥連部徙其别部諸落於塞南又進擊侯莫陳部俘虜獲雜畜十餘萬至大峨谷置戍而還遷都水使者明元西巡詔斤先驅討越勒部於鹿那山大破之宋少帝立其大臣不附國内離阻乃遣斤收其所侵河南地假斤節都督前鋒諸軍事司空公晉兵大將軍行揚州刺史率吳兵將軍公孫表等南征宋虎牢守將毛德祖遣其司馬翟廣將軍姚勇錯竇霸等率五千人據土樓以拒斤斤進擊破之廣等單馬走免盡殪其衆斤長驅至虎牢軍於汜東留表守輜重自率輕兵狥下河南潁川陳郡以南百姓無不歸附陳留太守嚴稜以郡䧏斤遂平兖豫諸郡還圍虎牢德祖拒守不下及虎牢潰斤置守宰以撫之大武即位進爵宜城王帝征赫連昌遣斤率義兵將軍封禮等督四萬五千人襲蒲坂昌守將赫連乙升聞斤將至遣使告昌使至綂萬見大軍已圍其城還告乙升曰昌已敗矣乙升懼棄蒲坂西走斤追敗之乙升遂奔長安斤入蒲坂收其資器百姓安業昌弟助興先守長安乙升至復與助興棄長安西走安定斤又西據長安於是秦雍氐羌皆来歸附與赫連定相持累戰破定定聞昌敗遂走上邽斤追之至雍不及而還大延初凉州平以戰功賜僮𨽻七千户王建登國中以左大夫從征伐諸國破二十餘部又從征衞辰破之後為中部大人從破慕容寶於叅合陂遷冠軍將軍烏丸庫侲宫鳴聚黨為寇詔建討平之婁伏連為酋帥領部落從道武破賀蘭部又平中山及征姚平於柴壁以功賜爵安邑侯長孫嵩為南部大人累有軍功後從道武征中山除冀州刺史賜爵鉅鹿公劉羅辰為南部大人從道武平中原以功賜爵永安公奚牧為輔國將軍從道武征慕容寶畧地晉州獲寶丹陽王買得及離石䕶軍髙秀和於干陶以軍功拜并州刺史賜爵任城公和跋擢為外朝大人從道武平中原以功進為尚書鎭鄴慕容德使兄子和守滑臺和長史李辯殺和求援於跋跋率輕騎赴之既至辯悔閉門拒守跋使尚書郎鄧暉說之辯乃開門跋入收其府藏德聞之遣將率三千騎擊跋跋逆擊大破之擒其將士千餘人而還於是陳潁之民多來向化改為定陵公與常山王遵率衆五萬討賀蘭部别帥木易千破之出為平原太守莫題為中山太守督司州之山東七郡事道武征姚興次於晉陽而上黨羣盗秦頗丁零翟都等聚衆於壺闗詔題率衆三千以討之上黨太守捕頗斬之都走林慮詔題捜山捕討盡平之李栗初隨道武幸賀蘭部數有戰功拜右將軍帝征慕容寶栗督萬騎為前驅軍之所至莫不䧏下遷左將軍庾岳為外朝大人慕容垂圍慕容永於長子永告急求援岳與陳留王慶以一萬騎東渡河救於秀容破山胡部髙車門等徙其部落會永㓕乃班師從道武平中原拜安逺將軍官軍之驚於栢肆也賀蘭部帥附力脊紇突鄰部帥匿物尼紀奚部帥叱奴根等聞之聚黨反於隂館南安公元順討之不尅死者數千人太祖聞之詔岳率萬騎還討叱奴根等殄之百姓乃安離石胡帥呼延鐡西河胡帥張崇等不樂内徙聚黨反叛岳率騎三千討破之斬鐡擒崇捜山窮討散其餘黨以功賜爵西昌公進號征虜將軍又討反人張超清河太守傅世并破平之以岳為鄴行臺丘堆明元即位以為散騎常侍與叔孫建等討㓕山胡晉人泝西河上詔堆與建自河内次枋頭以備寇盜姚泓既滅堆留鎭并州赫連屈子遣三千騎寇河内堆自并州與游擊將軍王雒生擊走之以功賜爵為侯和突為材官將軍天興五年破黜弗素古延等諸部獲馬三千餘匹牛羊三萬餘頭蠕蠕杜崘遣騎救素古延等突逆擊破之于山南河曲獲鎧馬二千餘匹劉託為離石䕶軍天賜元年率騎一千襲蒲子擒姚興寜北將軍泰平太守衡譚獲三千餘口閭大肥明元神瑞中為都將討越勒部於跋那山大破之泰常初復為都將領禁兵討蠕蠕獲其大將莫孤渾宜城王奚斤之攻虎牢也大肥與娥清領十二軍出中道畧地髙平金鄉東至太山假大肥使持節安陽公鎭撫陳汝太武初復與奚斤出雲中白道討大檀破之又為都將擊大檀大破之還至渴侯山遂討東部髙車於已尼陂又征平涼並有功太武將拜大肥為王遇疾卒追贈中山王娥清為黄門侍郎明元南巡幸鄴以清為中領軍將軍與宋丘將軍周畿等渡河畧地至湖陸髙平民屯聚林藪拒射官軍清等因誅數千家虜獲萬餘口賜爵須昌侯清與畿等遂鎭枋頭尉目斤泰常中以前將軍從平虎牢頗有軍功拜中山太守于栗磾泰常中為黒矟將軍奚斤之征虎牢也栗磾别率所部攻晉河南太守王㳙之於金墉㳙之棄城遁走遷豫州刺史叔孫建為正直將軍相州刺史飢胡劉武等聚黨叛明元以建督公孫表等討之斬首萬餘級餘衆奔走投汾水死水為不流晉師伐姚泓其部將王仲德為前鋒將逼滑臺兖州刺史尉建率所部棄城濟河仲德遂入滑臺明元聞之詔建渡河耀威斬尉建投其屍於河尋都督前鋒諸軍事禁兵將軍與汝隂公長孫道生濟河而南仲德等自河入濟東走青州宋兖州刺史竺靈秀棄須昌南奔湖陸建追擊大破之斬首五千餘級遂至鄒魯還屯范城大武以建威名南震除平原鎭大將加征南大將軍先是簡幽州以南戍兵集於河上一道討雒陽一道攻滑臺宋將檀道濟王仲德救滑臺建與汝隂公道生拒擊之建分軍夾戰縱輕騎邀其前後焚燒榖草以絶其糧道兵饑叛者相繼繇是安頡等得拔滑臺公孫表為功勞將軍元屈叅軍事宋人征姚興兖州刺史尉建聞冦至棄滑臺北走詔表隨壽光侯叔孫建屯枋頭泰常七年議取河南侵地帝以為掠地至淮滑臺等三城自然面縳表固執宜先攻城帝從之於是以奚斤為都督以表為吳兵將軍廣州刺史斤等濟河表攻滑臺歴時不拔帝乃南巡為之聲援表既克滑臺引師西伐大破宋將翟廣等於王樓遂圍虎牢册府元龜卷三百五十二
