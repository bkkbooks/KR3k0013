body:
  text: 册府元龜卷六百二十六宋王欽若等撰環衞部總序夫環衞之設上法天象故太一所居十二星環之謂之藩臣焉黄帝之時以兵師為營衞即其事也周官宫伯掌授八次八舍之職以衛王宫春秋楚穆王以潘崇掌環列之尹秦有郎中令掌宫殿門户衞尉掌宫殿屯兵漢初京師有南北軍掌理禁衛又有将軍比公者四第一大将軍次驃騎将軍次車騎将軍次衞將軍又有前後左右將軍皆典京師兵衛又有光祿勲卿即秦郎中令掌宿衞宫殿門户典謁署郎更直執㦸宿衛門户又有五官中郎将五官中郎五官侍郎五官郎中皆主更直執㦸宿衛諸殿門又有虎賁中郎將主虎賁宿衛虎賁中郎虎賁侍郎虎賁郎中節從虎賁皆掌宿衞侍從又有羽林中郎将主羽林郎羽林郎無員掌宿衞侍從常選漢陽隴西安定北地上郡西河六郡良家補本武帝以便馬從逰獵還宿殿階巖下宫中故號巖郎又有衛尉卿即秦衛尉掌宫殿衞士中宫徼循事諸門部各陳兵夹道以示威武交㦸遮妄出入南宫衞士令掌南宫衛士北宫衞士左右都候主劒㦸士徼循宫中宫掖門每門有司馬南宫門南屯司馬主平城門北宫門蒼龍司馬主東門𤣥武司馬主𤣥武門北屯司馬主北門北宫朱爵司馬主南掖門東明司馬主東門朔平司馬主北門凡七門並属衞尉魏武為漢丞相置中領軍與護軍皆領禁兵文帝受漢禪置武衞将軍以主禁旅又置領軍将軍主五挍中壘武衛等三營晋武帝置中軍将軍以統宿衛七軍武帝初有領軍将軍使中軍将軍羊祜統二衞前後左右驍衞等營即領軍之任也又以領護二衞驍騎㳺擊将軍謂之六軍懐帝永嘉中改中軍曰中領軍元帝永昌元年改曰北軍中候尋復為領軍成帝世復為中候尋復為領軍又有護軍將軍永昌元年省明帝太寕二年復置領護各領營兵江左以来領軍不復别營縂統二衛驍騎材官諸營護軍猶别有營也資重者為領軍䕶軍資輕者為中領軍中護軍又有光祿勲統虎賁中郎将羽林郎将冗從僕射羽林左監五官左右軍中郎將又有衛尉統武庫公車衛士光祿勲舊名其職則别矣後不復居禁中又無三署郎唯外官朝㑹則名列焉爾後雖取漢代舊名其職則别矣衛尉自秦以後所掌並同至隋唯掌軍器儀衛帳幕以監門衛掌宫門屯兵馬唐因其制歴代廢置使改事迹並載卿監縂序宋因晉制亦有六軍之號以領軍将軍一人掌外軍南齊以二衛四軍前後左右将軍五校即漢之五校驍騎逰擊積射強弩殿中員外殿中武衛七将軍殿中司馬左右及虎賁之中郎将冗從僕射羽林監武騎常侍謂之西省梁以領軍将軍管天下兵要謂之禁司又置驍騎将軍領朱衣直閣並給儀從出則羽儀清道入則與二衛通直臨軒則昇殿夹侍陳承梁皆修其官制其左右驍騎将軍毎大事常令夾侍左右謂驃騎車騎武衛為三将軍末年有八柱國大将軍騎中六人各督二大将軍又各分統開府一人一開府領一軍兵是為二十四軍分掌禁旅當爪牙禦侮之寄又增置左右衛将軍又有二部内幢将又有京畿大都督北齊制官多循後魏其領軍府凡禁衛官皆主之又以左右将軍分掌左右廂所主朱華閣以外各武衛将軍二人貳之後周禁衛之職大底同於後魏也隋髙祖受命置左右武衛左右衞左右武侯左右領左右監門左右領軍等府分司統職焉煬帝改左右衛為左右翊又加置親侍並領勲武三衞煬帝改三衛三侍非翊衞府皆無三侍也唐制十六衛及左右羽林左右龍武左右神武六軍等将軍並掌禁衞也又有神策等天寳初以臨洮城西二百里餘地為神策軍命成如璆為洮陽太守兼神策軍使及安祿山之亂如璆使其将衛伯玉領其軍赴難與觀軍容使魚朝㤙同保陕州時西邉土地已沒遂詔伯玉所領軍號神策軍以伯玉為使復加號神策軍節度使而統於魚朝㤙後遂歸于禁中焉至徳宗朝分神策為左右廂令内官竇文塲王希遷分知兩廂兵馬貞元二年詔策左右廂改為左右神策軍又有殿前左右射生軍又改為神威軍十四年詔左右軍特為親近宜置統軍元和三年罷左右神威軍乃合為一軍號曰天威軍至八年廢天威軍以其騎士分屬左右神策梁置左右天威左右龍虎左右神威左右羽林左右英武左右神武等六軍其将帥咸有統軍之號以衛宸極焉五代有判六軍諸衛事又有内外蕃漢縂管之名又有六軍諸衛副使及侍衛親軍馬歩軍都指揮使及殿前都㸃檢殿前都指揮使之職諸将又有彰聖寕衛拱辰威和興順護衞龍犍虎犍等之名其諸衞将軍雖位號或存而職事多廢今之所述但槩舉其環衞職名而已其歴代貟数品秩及廢置改更之自並見於将帥序焉原夫環衞之設葢所以申嚴武備翊衛宸居為王之爪牙乃國之柱石名器之重莫斯為比此乃副類能之選著幹蠱之譽勤勞以奉上嚴毅以居位以至矜荘祗畏始終無玷者於是乎褒寵之典行焉其或邪僻任已惨毒臨下寘之嚴憲固宜也凡九門著之於篇選任舉職寵異選任環衞之列統制之權葢董蘭錡之重兵以肅勾陳之嚴徼選任所至委用非輕務在智勇兼資親信可任付以緹騎為國爪牙所以魏祖譬予玉以命賢光武羡執金之為職至於是也可不務哉漢辛慶忌明畧威重任國柱石拜執金吾常惠以明習外國事勤勞數有功為右将軍後漢朱暉為東平王屬紿取隂就璧與玉以朝明帝聞而壮之及當幸長安欲嚴宿衞故以暉為衞士令魏徐奕為尚書令太祖征漢中魏諷等謀反中尉楊俊左遷太祖嘆曰諷所以敢生亂心以吾爪牙之臣無遏姦防謀者故也安得如諸葛豐者使代俊乎桓階曰徐奕其人也太祖乃以奕為中尉手令曰昔楚有子玉文公為之側席而坐汲黯在朝淮南為之折謀詩稱邦之司直君之謂與許褚從太祖戰大敗馬超等遷武衛中郎将武衛之號自此始也吳樓𤣥為大司農舊禁中主者自用親近人作之萬彧陳親宻近職宜用好人孫皓因勑有司求忠清之士以應其選遂用𤣥為宫下鎮禁中侯主殿中事晋毛安之有武幹累遷撫軍参軍魏郡太守簡文輔政委以爪牙及登祚安之領兵從駕使止宿宫中羊琇武帝時為中護軍在職十三年典禁兵豫機密寵遇甚厚宋趙伯符文帝元嘉十八年徴為領軍将軍先是外監不𨽻領軍宜相統攝者自有别詔至此始統領焉南齊蕭坦之為鎮軍将軍東昏即位與右僕射江祏並詔更直殿省總監衛後魏奚斤機敏有識度道武登國初與長孫肥等俱統兵後以斤為侍郎親近左右從破慕容寳於参合皇始初從征中原以為征東長史拜越騎挍尉典宿衛禁旅于洛㧞太武帝時為侍御中散車駕征討常在侍衛擢領監御曹事後周尉遲綱魏廢帝二年拜大将軍兼領軍及魏帝有異謀言頗有漏泄周文以綱職典禁旅使宻為之備俄而帝廢立齊王仍以綱為中領軍總宿衛事隋薛世雄性亷謹文帝常從容謂羣臣曰我欲舉好人未知諸君識否羣臣咸曰臣等何能測聖心帝曰我欲舉者薛世雄羣臣皆稱善帝復曰世雄亷正節槩有古人之風於是拜右翊衞将軍来護兒煬帝初拜右驍衞大将軍帝甚重之李子雄為民部尚書從幸江都煬帝以仗衛不整顧子雄部伍之子雄立指麾六軍肅然帝大恱曰真武侯才也尋轉右武侯大将軍唐李粲高祖時為左監門大将軍初高祖問粲年幾對曰八十高祖曰公清幹之譽聞於隋日今年齒雖邁筋力未衰但監門之職非公莫可意欲相兼如何粲以年老辭譲髙祖曰藉公䖏分爾豈欲煩公筋力耶於是詔曰非自殿廷皆乘馬論者榮之薛萬均隋末歸國授上柱國永安郡公太宗平劉黒闥聞其名引為右二䕶軍北門長上恩顧甚至武士彠武徳中檢校并鉞将軍多有獻納勅令将家口入宫檢挍右廂衛仍知㫖俄留守光祿給養李多祚驍勇善射意氣感激少以軍功歴位右羽林将軍前後掌禁兵北門宿衛二十餘年王及善除右千牛衞将軍高宗謂曰朕以卿佩大横刀在三品要職他人非捜辟不得至朕所卿佩大横刀在朕側知此官貴否張守潔為隴右道按察使秦州都督𤣥宗開元十年以為右監門衞将軍又以江南道按察使宣州刺史霍廷玉為右驍騎將軍山南西道按察使梁州都督裴觀為左右衞将軍定州刺史高豫兼判左右衞将軍坊州刺史韋琳兼判右武衞将軍帝将北廵大展六軍之容故歴選岳牧之良者分掌戎挍李晟代宗大歴中為右金吾大将軍涇原四鎮北庭兵馬使時節度使馬璘戰吐蕃兵敗晟㧞璘出於亂兵璘忌晟威名又遇之不以禮令朝京師帝知之留宿衞後唐張䖍釗遼州人也初為太原牙挍以武勇聞於流軰武皇荘宗之世累補左右突騎軍使明宗素聞䖍釗有将帥才及即位擢為䕶駕親軍都指揮使領春秋刺史舉職夫勾陳之署盖取諸埀象環列之尹是掌於禁兵若乃職在徼廵勤乎夙夜雖式道之是任亦忠誠之為允故警衞之任良在於是臣扞掫之規具存乎甲令禦侮之士其可易哉後漢隂興為期門僕射毎出入常操小蓋障翳風雨躬履塗泥率先期門光武所幸之處輒先入清宫甚見親信劉隆為驃騎将軍行大司馬事毎奉法自守楊仁為衞士令明帝永平中諸馬貴盛各争欲入宫仁被甲持㦸嚴勒門衞莫敢輕進者耿秉為執金吾甚見親重章帝每廵郡國及幸宫觀秉常領禁兵宿衞晋陳勰為将軍武帝毎出入勰持白獸幡在乗輿左右鹵簿陳列齊肅太康末武帝常出射雉勰時已為都水使者散從車駕逼闇乃還漏已盡當合函乗輿良乆不得合乃詔勰合之勰舉白獸幡指麾湏㬰之間而函成皆謝勰閑解甚為武帝所任劉彪字仲雅為積弩将軍及武庫火彪建計徹屋得出諸寳器劉超為射聲挍尉明帝末穆后臨朝時軍挍無兵義興人多義随超因統其衆以宿衛號為君子營宋褚淵為中軍将軍桂陽王休範反淵與衞將軍袁粲入衛宫省鎮集衆心梁蕭範為衞尉夜中行城常因風便鞭箠宿衞欲令帝知其勤及姪修在職夜必再廵而不欲人知或問其故曰夜中警逴寔有其勞主上慈愛聞之容或賜止違詔則不可奉詔則廢事且胡質之清尚畏人知此職司之常何足自顯聞者歎服蕭景為領軍將軍管天下兵要監局官僚舊以驕侈景在職峻切官曹肅然臧盾為散騎常侍兼領軍大同二年遷中領軍管天下兵要監局事多盾為人敏贍有風力長於撥繁職事甚理天監中吴平侯蕭景居此職著聲至是盾復繼之後魏周畿明元初為殿中侍御史掌宿衞禁兵㫁决稱職遷左民尚書來大千為殿中給事太武踐祚與襄城公盧魯元等七人俱為常侍持仗侍衞晝夜不離左右隋崔彭為驃騎常典宿衛性謹宻在省闥二十餘年毎當上在仗危坐終日未嘗有怠惰之容高祖甚嘉毎謂彭卿當上日我寝處自安唐尉遲敬德武德中以功授秦王府左二副䕶軍太宗誅建成元吉是時髙祖泛舟於海池太宗命敬徳侍衞髙祖敬徳擐甲持弓直至高祖所高祖大驚問曰今日作亂是誰卿来此何也對曰秦王以太子齊王作亂舉兵誅之恐陛下驚動遣臣來宿衛高祖乃安龎堅為領軍武衛二大將軍堅少長戎旅雅習軍法尤熟侍衞供奉之儀武徳將軍以下多不閑故事髙祖患之皆令取則於玉後為監門大將軍太宗以其耆舊常令典兵於東宫玉雖年老而精勤不怠毫纎之務無不躬親趙道興太宗貞觀初歴遷左武侯中郎将明閑宿衞號為稱職叚志𤣥為左驍衛大将軍文徳皇后之𦵏也志𤣥與宇文士及分統士馬出宿於章武門太宗夜使宦官至二将軍處士及開營納使者志𤣥閉門不納曰軍門不可夜開使者曰此有手勅志𤣥曰夜中不辨真偽因停使者至曉太宗聞而歎曰此真将軍也周亞夫何以加焉李大亮為左衞大将軍及晋王為皇太子兼領太子右衞率俄兼工部尚書身居三職宿衛兩宫最為親信大亮毎當宿直必通宵假寐太宗常勞之曰至公宿直我便通夜安卧令狐建為左龍武軍使建中四年十月涇原兵反徳宗自出苑便門建方教射於軍中遂以四百人隨駕帝令建為後殿李觀為右龍武大将軍建中四年涇師叛觀時為帝直領衞兵千餘人扈從奉天詔都廵官訓練諸将戍卒三數日間加召五千餘兵列之通衢整肅鼙鼓城内因之増氣帝倚頼之賜封二百户二子宏寓授八品京官及駕出奉天與令狐建李昇韋清等咸執覊勒周旋艱險皆著功勞駕還京師詔縂後軍禁旅陳君賞為金吾将軍文宗太和九年十二月中使劉行深白八土操廵邉回走馬自金光門入從者訛言有兵京城不逞之徒皆戎服濳備弓刀引首北望兾城門閉卽恣行剽刼時自内聮命閉門君賞領其徒立望仙門下曰縱使有賊閉門不難請徐觀之至于日晩京城始定是日㣲君賞之禦侮幾将亂寵異夫任環衛之職總貔貅之衆若非本之以忠信輔之以恭慎文武兼資夷險一致則何以近日月之光茂皇王之寵若乃乘之名馬服以御劍從逰幸則督兹羽騎遇挍獵則統彼六衛或嘉其義舉或善其應對以至過墓則祠以中牢發哀而爲之慟哭次之編簡咸足觀焉漢衞綰以功次遷中郎将醇謹無它無它餘志念也孝景為太子時召上左右飲而綰稱病不行恐文帝謂豫有二心事太子文帝末屬孝景曰綰長者善遇之及景帝立嵗餘不孰何綰孰誰也何問也不誰何者猶言不借問耳綰日以謹力自勉力為謹慎日日益甚景帝幸上林詔中郎将參乘還而問曰君知所以得参乗乎言何以得参乘綰曰臣代戯車士幸得功次遷待罪中郎将不知也帝問曰吾為太子時召君君不肯来何也言以此特識之對曰死罪病帝賜之劍綰曰先帝賜臣劍凡六不敢奉詔帝曰劍人之所施易獨至今乎施讀曰移言劍者人所好故多数移易貿換之也又一云施讀曰貤貤延也綰曰具在帝使取六劍劍常盛未嘗服也盛謂在弰室之中也後漢張純為五官中郎将光武重之一日或数四引見何湯為虎賁中郎将光武常嘆曰糾糾武夫公侯干城何湯之謂也江革為五官中郎将每朝㑹章帝使虎賁扶持革及進拜常目禮焉觀視之也時有疾不㑹輙大官送醪膳恩寵有殊魏應為五官中郎将經明行修章帝甚重之数進見論難於前特受賞賜桓郁遷越騎挍尉詔太子諸王各奉賀致禮召訓習韓詩拜左中郎将章帝嘉其善學恩寵甚重出拜陳留太守帝賜劍錢物魏典韋為都尉引置左右将親兵数百人常繞大帳遷挍尉戰死太祖為流涕募取其䘮親自臨哭之遣歸𦵏㐮邑拜子滿為郎中車駕毎過常祠以中牢拜滿司馬引自近許褚為武衞将軍都督中郎軍宿衛禁兵卒太和中明帝思褚忠孝下詔褒賞宋蕭思話為右衞将軍常從太祖登鍾山北嶺中道有盤石清泉帝使於石上弹琴因賜以銀鍾酒謂曰相賞有松石間意梁臧盾為領軍将軍卒即日高祖有詔舉哀贈侍中領軍如故給東園秘器朝服一具衣一襲錢布各有差謚曰忠陳毛喜為右衛将軍丁母憂去職詔追贈喜母庾氏東昌國太夫人賜布五百疋錢三十萬官給䘮事又遣員外散騎常侍杜緬圖其墓田宣帝親與緬案圖指畫其見重如此韋翽為驍騎将軍領朱衣直閣驍騎之職舊領營兵兼統宿衛自梁代已來其任踰重出則羽儀清道入則與二衛通直臨軒則昇殿夾侍翽素有名望每大事嘗令夾侍左右時人榮之號曰夾御将軍後魏于洛拔太武時為侍御中散有姿容善應對恭慎小心帝甚加愛寵因賜名焉又為侍御中散常在侍衛從征凉州旣平賜奴婢四十口轉監御曹令于烈為司衞兼殿中尚書孝文㓜冲文明太后稱制烈與元丕陸叡李冲等各賜金策許以有罪不死楊津為長水挍尉直閣景明中宣武逰於北邙津時陪從大尉咸陽王禧謀反常馳入華林時直閣中有同禧謀者皆在從限及禧平帝顧謂朝臣曰直閣半為逆黨非至忠者安能不預此謀因拜津左中郎将遷驍騎将軍仍直閣于忠為散騎常侍領左衛中正常因侍宴宣武賜之劍杖舉酒屬忠曰卿世秉貞節故嘗以禁衛相委昔以卿行忠賜名曰忠今以卿才堪禦侮與朕御劒杖相似循名取義意在不輕其出入周旋常以自防也忠頓首陳謝北齊厙狄干魏正光初為将軍宿衛於内以家在寒鄉不冝毒暑冬得入京師夏歸里隋元胄為右衛大将軍高祖親顧益宻嘗正月十五日帝與近臣登髙時胄下直帝令馳召之及胄見帝謂曰公與外人登髙未若就朕也賜宴極歡晋王每致禮焉楊義臣秦興縣公崇之子也崇擊突厥力戰而死義臣襲崇官爵開皇中年未弱冠奉詔宿衛如千牛者数年賞賜甚厚宇文述大業中為左衛大将軍與蘇威等典選舉參預朝政述時貴重委任與蘇威等其親愛則過之煬帝所得逺方貢獻及四時口味輙見頒賜中使相望於道李景為右衛大将軍車駕西廵至天水景獻食於焬帝帝曰公主人也賜坐齊王暕之上唐徐勣為右武侯大将軍高祖詔賜姓李氏宇文士及為右衛大将軍甚見親顧毎延入問中乙夜方出遇其歸沐太宗仍遣馳詔同列莫與為比李大亮為左衞大将軍太宗謂大亮公敦懿其心誠善事毎行夜自當丙夜遣郎将中郎将行甲乙丁戊等夜身先於人真将軍也趙道興貞觀初遷左武侯中郎将號為稱職太宗常謂之曰卿父為隋武侯将軍甚有當官之譽卿今克傳弓冶可謂不墜家聲因授右武侯将軍姜確為左屯衛将軍轉蒙恩顧於𤣥武門宿衛及園苑之務皆以委之其屯營飛騎亦分𨽻於確毎有遊幸即領騎而從焉獨孤逺貞觀初總領左廂六衛兵馬軍令嚴肅太后大悦賜雜綵二百叚叚志𤣥為左驍衛大将軍樊國公改封褒國公後疾篤輿駕臨問撫之流涕旣卒太宗為發哀哭之甚痛李多祚中宗神龍初為右羽林將軍以定謀誅張易之兄弟功進封遼陽郡王其年帝将有事于太廟特令多祚與安國相王登輦夹侍當代榮之田歸道除殿中少監右金吾将軍歳餘卒贈輔國大将軍追封原國公𦵏事官供甚厚中宗又親為文以祭之臧希譲為金吾衛大将軍骯髒好談時政屡以理體上干公卿詔令集賢院侍制李觀為龍武大将軍涇師叛觀時上直有衛兵千餘人扈從奉天詔都廵警練諸軍戍卒三數日間加召五千餘兵列之通衢整肅金鼓城内因之増氣徳宗倚賴之賜封二百户二子宏寓授八品京官張萬福為右金吾将軍徳宗召見驚曰杜亞言卿昏耄乃如是健耶詔圖形凌烟閣數賜酒饌衣服并勅度支籍口畜給具費駱元光為金吾上将軍貞元三年七月賜元光姓李氏更名元諒郭鏦為金吾将軍穆宗幸鏦城南荘賜荘千區鏦遽以其荘上獻冊府元龜卷六百二十六
