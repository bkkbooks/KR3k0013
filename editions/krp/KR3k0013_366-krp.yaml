body:
  text: 册府元龜卷三百六十六宋王欽若等撰將帥部機畧第六唐張公謹太宗貞觀元年為代州都督其後李靖經略突厥以公謹為副公謹因言突厥可取之狀曰頡利縱慾肆情窮凶極暴誅害良善昵近小人此則主昏於上其可取一也又其别部同羅僕骨回紇延陀之類並自立君長將圖反噬此則衆叛於下其可取二也突利被疑輕騎自免拓設出討匹馬不歸欲谷喪師立足無地則兵挫將敗其可取三也塞北霜早餱糧乏絶天降之災因以饑饉其可取四也頡利疎其突厥親委諸胡胡人翻覆是其常性大軍一臨内必生變其可取五也華人入北其類寔多比聞自相嘯聚保據山險師出塞垣自然有應其可取六也太宗深納之李勣為并州都督貞觀三年為通漠道行軍總管至雲中與突厥頡利可汗兵㑹大戰於白道突厥既敗屯營於磧口遣使請和詔鴻臚卿唐儉往赦之勣時與定襄道大總管李靖軍㑹與議曰頡利雖敗人衆尚多若走渡磧口保於九姓道遥阻深追則難及今詔使唐儉至彼其必弛備我等随後襲之此不戰而平賊矣靖扼腕喜曰公之此言乃韓信滅田横之䇿也於是定計靖將兵逼夜而發勣勒兵繼進靖軍既至賊營大潰頡利與萬餘人欲走渡磧勣屯軍於磧口頡利至不得渡磧其大酋長率其部落並降於勣虜五萬餘口而還乾封二年為遼東行軍總管勣拔髙麗之新城遣副將契苾何力引兵守之勣初渡遼謂諸將曰新城是髙麗西境鎮城最為要害若不先圖餘城未易可下遂引兵於新城西南據山築栅且戰且守於是城中人扶仇等縳其城主開門請降勣遂引兵進破一十六城侯君集為兵部尚書㕘議朝政貞觀九年將討吐谷渾伏允命李靖為西海道行軍總管以君集及任城王道宗並為之副師次鄯州君集言於靖曰大軍已至賊虜尚未走險宜簡精鋭長驅疾進彼不我虞必有大利若此䇿不行潛遁必逺山障為阻討之實難靖然其計乃簡精鋭輕齎深入道宗追及伏允之衆於庫山破之伏允輕兵入磧以避官軍靖乃中分士馬為兩道並入靖與薛萬均李大亮趣北路使君集道宗趣南路歴破邏真谷踰漢哭山經途二千餘里行空虚之地盛夏降霜山多積雪轉戰過星宿川至於柏海頻與虜遇皆大克獲北望積玉山觀河源之所出焉乃旋師與李靖㑹于大非川平吐谷渾而還駱𢎞義為處州刺史永徽三年阿史那賀魯㓂庭州攻陷金嶺城詔左武候大將軍梁建方等討之𢎞義上言臣聞安中國以信馭夷狄以權理有變通事無常准今有降胡来言賀魯獨據一城深溝髙壘用以自固云今正祁寒積雪漢兵必不逺来誠宜乗其此便一舉可以除𠞰若遷延待春恐事久生變縱不能結援諸國必應逺迹遁逃且兵馬此行不誅賀魯處密已許欵誠處木昆等各思免禍皆知大兵欲至庶望安全淹留不至慮更烏合然嚴冬風勁馬瘦兵寒瘃墮之憂難量進退又不可久停兵馬虚費邉糧見我不前成其黨附伏望且寛處月處密之罪以誅賀魯為名除禍務絶其原未可先取其枝葉但此兩姓見其坐奪不示招攜必自深據如棄而西過則近有後憂先事誅夷未可即克捨而勿問則感義前驅事定從宜徐申弔伐此乃威恩兼舉逺懾邇安向使兵馬早来賀魯久已懸首前機雖失須為别圖望請於射脾部落及發處月處密契苾等兵六千人各齎三十日糧往掩襲大軍頓於憑水秣馬畜兵以為聲勢此則驅率戎狄攻彼豺狼失則無損國家利則功歸社稷且番人行動須約漢兵東西掎角又資趐翼簡胡騎以率其前率漢兵以躡其後賀魯進退無路理即可擒百勝之謀在斯一舉臣恐建方至日為計不同軍謀乖舛後悔無及帝從其言乃制𢎞義與梁建方相知經畧之蘇定方為左武候中郎將永徽中率兵討突厥賀魯大雪平地三尺軍中咸請停兵候晴定方曰虜恃雪深謂我不能前進必當憇息追之可及若緩以縱之則漸逺難追省日兼功在此舉也於是勒兵陵雪晝夜兼進所經收其人衆遂至雙河去賀魯所居一百餘里布陣長驅徑至金牙山賀魯牙帳時賀魯集衆欲獵定方縱兵擊之盡破其牙帳生擒數萬人賀魯脱走投石國定方令副將蕭嗣業往石國定方追賀魯擒歸于京師劉仁軌龍朔三年為帶方州刺史與熊津道行軍總管右威衛將軍孫仁師熊津都督劉仁願大破百濟餘衆及賊於白江拔其周留城百濟偽王扶餘豐走投髙麗初仁願與仁軌既拔百濟之真峴城詔仁師率兵浮海以為之援扶餘豐南引倭賊以拒官軍仁師迎擊破之遂與仁軌之衆相合兵士大振於是諸將㑹議或曰加林城水陸之衝請先擊之仁軌曰加林險固急攻則傷損將士固守則用日持久不如先攻周畱城周畱賊之巢穴羣兇所聚除惡務本須拔其源若克周畱城則諸城自下於是仁師仁願及新羅王金法敏帥陸軍以進仁軌乃别率杜爽扶餘隆率水軍及糧船自熊津江往白江以㑹陸軍同趨周畱城仁軌遇倭兵於白江之口四戰皆捷焚其舟四百艘煙焰漲天海水皆赤豐脱身而走獲其寳劒偽王子扶餘忠志等率士女及倭衆並降百濟諸城皆復歸順至麟德元年仁軌上表曰臣蒙陛下曲垂天奬棄瑕錄用授之刺舉又加連帥材輕職重憂責更深常思報効冀酬萬一智力淺短淹滯無成久在海外每從征役軍旅之事實有所聞具狀封奏伏乞詳察臣今覩見在兵士手脚沉重者多勇健奮發者少兼有老弱衣服單寒唯望西歸無心展効臣聞往在海西見百姓人人投募争欲征行乃有不用官物請自辦衣糧投名義征何因今日兵士如此儜女耕切困也弱皆報臣云今日官府與往日不同人心亦别貞觀永徽年中東西征役身死王事並蒙敕使弔祭追贈官職亦有迴亡者官爵與其子弟從顯慶五年以後征役身死更不惜問往前度遼海者即得一轉勲官從顯慶五年以後頻經渡海不被紀録州縣發遣百姓充兵者其身少壯家有錢財賂與官府任自東西蔵避即並得脱無錢用者雖是老弱推背即來顯慶五年破百濟勲及向平壤苦戰勲當時將軍號令並言與髙官重賞百方購募無種不道洎到西岸唯聞枷鏁推禁奪賜破勲州縣追呼求住不得公私困弊不可盡言發海西之日已有自害逃走非獨海外始逃又本為征役䝉授勲級將為榮寵頻年征役唯取勲官牽挽辛苦與白丁無别百姓不願征行特繇於此陛下再興兵馬平定百濟留兵海外經略髙麗百姓有此議論難為成就功業臣聞琴瑟不調改而更張布政施化随時取適自非重賞明罰何以成功臣又問見在兵士舊畱鎮五年尚得支濟爾等始經一年何因如此單露並報臣道發家來日唯遣作一年裝束自從離家已經二年在朝陽瓮津又遣來去運糧涉海遭風多有漂失臣勘責見在兵士衣裳單露不堪度冬者給大軍還日所留衣裳且得一冬充事來年秋後並無准擬陛下若欲殄滅髙麗不可棄百濟土地餘豐在北餘勇在南百濟髙麗舊相黨援倭人雖逺亦相影響若無兵馬還成一國既須鎮壓又置屯田事藉兵士同心同徳兵士既有此議不可膠柱因循須還其渡海官勲及平百濟向平壤功效除此之外更須褒賞明敕慰勞以起兵士之心若依今日以前處置臣恐師老且疲無所成就臣又見晉代平吳史籍具載内有武帝張華外有羊祜杜預籌謀䇿畫經緯諮詢王濬之徒折衝萬里樓船戰艦已到石頭賈充王渾之輩猶欲斬張華以謝天下武帝云平吳之計出自朕意張華同朕見耳非其本心是非不同乖背如此平吳之後猶欲苦繩王濬賴武帝擁䕶始得保全不逢武帝聖明王濬不存首領臣每讀其書未嘗不撫心長歎伏惟陛下自既得百濟欲取髙麗須内外同心上下齊奮舉無遺䇿始可成功百姓既有此議更宜改調臣恐是逆耳之事無人為陛下盡言自顧老病日侵殘生能㡬奄忽是逝銜恨九泉所以披露肝膽昧死奏陳帝深納其言遣右威衛將軍劉仁願率兵渡海與舊鎮兵交代仍授扶餘隆熊津都督遣歸本國共新羅和親以招集其餘衆扶餘勇者扶餘豐之弟也時走在倭國以為扶餘豐之應故仁軌表言之劉仁願龍朔中為熊津都督與帶方州刺史劉仁軌大破百濟餘賊於熊津之東初蘇定方之軍還也仁願仁軌等尚在百濟之熊津城帝與敕書曰平壤軍迴一城不可獨固宜就拔新羅共其屯守若金法敏藉卿等畱鎮宜且停彼若其不須即宜泛海還也將士咸欲西歸劉仁軌曰春秋之義大夫出疆有可以安社稷便國家専之可也况在滄海之外密邇豺狼者哉且人臣當進思盡忠有死無二公家之利知無不為主上欲吞滅髙麗先誅百濟留兵鎮守制其腹心雖妖孽充斥而備預甚嚴宜勵戈秣馬擊其不意彼既無備何攻不尅戰而有勝士卒自安然後分兵據險開張形勢飛表奏上更請兵船朝廷知其有成必當出師命將聲援纔接兇逆自殲非唯不棄成功實可永清海外今平壤之軍既㢠廻熊津又拔則百濟餘燼不日更興髙麗逋藪何時可滅且今以一城之地居賊中心如其失脚即為亡虜拔入新羅又是坐客脱不如意悔不可追况福信凶暴福信扶餘舊將無始殘虐過甚餘豐猜惑外合内離䲭梟共處勢必相害唯宜堅守觀變乗便取之不可動也衆從之時扶餘豐及福信等以仁願等孤城無援遣使謂曰大使等何時西還當遣相送也仁願遂與仁軌掩其不備出擊之拔其支離城及尹城大山沙井等栅殺獲甚衆仍分兵以鎮守之福信等以真峴城臨江髙險又當衝要加兵守之仁軌伺其稍怠引新羅之兵乗夜薄城四面攀草而上比明而入據其城遂通新羅軍糧之路仁願乃奏請益其兵詔發淄青莱海之兵七千人赴熊津以益仁願之衆裴行儉為秦州鎮撫右軍總管儀鳳二年討西突厥擒其十姓可汗阿史那都支及别帥李遮匐以歸初都支遮匐與吐蕃連和侵逼安西議者欲發兵討之行儉上言曰吐蕃叛擾干戈未息敬𤣥審理失律喪師安可更為西方生事今波斯王身沒其子泥湼師師充質在此差使往波斯册立即路繇二蕃便宜從事可不勞而有功也髙宗從之因命行儉册送波斯王仍為安撫大食使至西州人吏郊迎行儉召其豪傑子弟千餘人随已而西揚言紿其下曰今正炎蒸熱坂難冐俟秋涼之後方可漸行都支覘知遂不設備行儉徐乃召四鎮諸蕃酋長謂曰昔任西州長史憶此從禽未嘗厭倦雖還京輦無時暫忘今因是行欲尋舊賞誰能從我獵也蕃酋子弟投募者僅萬人行儉假為畋遊校試部伍數日遂倍道而進去都支部落十餘里先遣都支所親問其安否外示閒暇似非討襲續又使人趣召相見都支先與遮匐通謀秋中擬拒漢使卒聞軍到計無所出自率子姪首領等五百餘騎就營来謁遂擒之是日𫝊其契箭召諸部酋長悉來請命並執送碎葉城簡其精騎齎糧曉夜前進將掩遮匐匐聞都支就擒遽詣行儉降於是將吏已下立碑於碎葉城以紀其功調露元年為定䇿道行軍大總管大破突厥於黒山擒其首領初行儉率衆行至朔州謂其下曰兵法尚詐者謂以權謀制敵也若御其下則非誠信不可行也蕭嗣業運糧被抄兵多餒死所以敗也狡㓂忸􅏸不可以不備乃詐為糧車三百乗每車伏壯士五人各齎陌刀勁弩以羸兵數百人援車兼伏精兵居險以待之賊果大下羸兵棄車散走賊驅車就泉井解鞍牧馬方擬取糧車中壯士齊發伏兵亦至殺獲殆盡餘衆奔潰自是續遣糧運莫敢近之者王方翼為安西都䕶時突厥車簿反叛圍弓月城方翼引軍救之至伊麗河而賊衆来拒縱擊大破之斬首千餘級俄而二姓咽麵悉發衆與車簿合勢以拒方翼方翼屯兵熱海與賊連戰流矢貫臂徐以佩刀截之左右莫有覺者既而所將蕃兵謀執方翼以應賊方翼密知之悉召㑹議佯出軍資以賜之續引出斬之㑹大風又振金鼓以亂其聲遂誅七千餘人分遣禆將襲車簿咽麵等賊既無備因是大潰擒首領三百人西域遂定唐休璟為左武衛右金吾二衛將軍則天長安中西突厥烏質勒與諸蕃不和舉兵相持安西道絶表奏相繼則天令休璟與宰相商度事勢俄頃間草奏便遣施行後十餘日安西諸州表請兵馬應接程期一如休璟所畫則天謂休璟曰恨用卿晚已遷夏官尚書同鳳閣鸞臺三品又謂魏元忠及楊再思李嶠姚元崇李迥秀等曰休璟諳練邉事卿等十不當一也郭元振中宗景龍中為金山道行軍大總管先是娑葛與阿史那闕啜忠節不和屢相侵掠闕啜兵衆寡弱漸不能支元振奏請追闕啜入朝宿衛移其部落入於瓜沙等州安置制從之闕啜行至播仙城與經畧使右威衛軍周以悌相遇以悌謂之曰國家以髙班厚秩待君者以君統攝部落下有兵衆故也今輕身入朝是一老胡耳在朝之人誰復喜見非唯官賞難得亦恐性命在人今宰相有宗楚客紀處訥並専權用事何不厚賂二公請留不行仍發安西兵并引吐蕃以擊娑葛既得報讎又存部落如此與入朝受制於人豈復同也闕啜然其言便勒兵攻陷于闐坎城獲金寳及生口遣人間道納賄於宗紀元振聞其謀遽上疏曰往者吐蕃所争唯論十姓四鎮國家不能捨與所以不得通和今吐蕃不相侵擾者不是願國家和信不来直是其國中諸豪及泥婆羅門等屬國自有攜貳故贊普躬往南征身殞㓂庭國中大亂嫡庶競立將相争權自相屠滅兼以人畜疫癘財力困窮人事天時俱未稱惬所以屈志且共漢和非是本心能忘情於十姓四鎮也如國力殷足之後則必争小事方便絶和縱其醜徒来相吞擾此必然之計也今忠節乃不論國家大計直欲公為吐蕃作鄉導主人四鎮危機恐從此啓頃年緣黙啜憑陵所應處兼四鎮兵士嵗久貧羸其勢未能為忠節經畧非是憐突騎施也忠節不體國家中外之意而别求吐蕃吐蕃得志則忠節在其掌握若爲復得事漢徃年吐蕃於國非有恩有力猶欲争十姓四鎮今若効力樹恩之後或請分于闐疎勒不知欲以何理抑之又其國中諸蠻及婆羅門等國見今擕背忽請漢兵助其除討亦不知欲以何詞拒之是以古之賢人皆不願受夷狄妄恵非是不欲其力懼後求貨無厭故臣愚以為用吐蕃之力實為非便疏奏不省楚客等既受闕啜之賄遂議遣攝御史中丞馮嘉賔持節安撫闕啜以牛師奬為安西副都䕶便領甘涼以西兵募兼徵吐蕃兵以討娑葛娑葛進馬使娑臘知楚客計馳還報娑葛是日發兵五千騎出安西五千騎出撥換五千騎出焉耆五千騎出疎勒時元振在疏勒於河口栅不敢動闕啜在計舒河口候見嘉賔娑葛兵掩至生擒闕啜殺嘉賔等又殺牛師奬放火燒城遂陷安西四鎮路絶楚客又奏請周以悌代元振統衆徴元振將陷之使阿史那獻為十姓可汗置軍焉耆以取娑葛娑葛遺元振書曰與漢本来無惡只讎於闕啜而宗尚書取闕啜金枉擬破奴部落馮中丞牛都䕶相次而来奴等豈坐受死又聞史獻欲来徒擾亂軍州恐未有寧日乞大使商量處置元振以娑葛狀奏於朝廷楚客怒奏元振有異圖元振使其子鴻間道具奏其狀以悌竟得罪而流于白州復以元振代以悌赦娑葛罪册為十四姓可汗王晙𤣥宗時為太僕少卿隴右羣牧使開元二年吐蕃精甲十萬冦臨洮軍詔晙與隴右防禦使薛訥擊之晙率所部二千人卷甲倍程與臨洮兩軍合勢以拒之吐蕃於大来谷口遣其將坌逹延率兵繼後晙乃出竒兵七百人衣蕃服夜襲之相去五里分為二隊使前隊遇寇大呼而後隊擊鼓以應之蕃衆大懼疑有伏兵自相殺傷死者萬計㑹薛訥率衆至武階谷去大衆二十里為賊所隔晙率兵迎訥之軍賊置兵於兩軍之間連數十里晙夜出壯士銜枚擊之蕃賊大潰乃與訥合軍掩其餘衆追奔至洮水殺獲不可勝數盡收其所掠牛馬而還明年突厥黙啜為九姓所殺其下酋長多欵塞投降置之河曲之内俄而小殺繼立䧏者漸叛晙上疏曰突厥時屬亂離所以欵塞䧏附其與部落非有讎嫌情異北風理固明矣養成其釁雖悔何追今者河曲之中安置䧏虜此輩生梗實難處置日月漸久姦詐逾深窺邉間隙必為患難今有䧏者部落不受軍州進止輒動兵馬屢有傷殺詢問勝州左側被損五百餘人私置𤇺鋪潛為抗拒公私行李頗實危懼北兵如或南牧降户必與連衡臣問沒蕃歸人云却逃者甚衆南北信使委曲通𫝊此輩䧏人翻成細作儻收合餘燼来逼軍州北騎憑陵胡兵應接表裏有敵進退無援雖復韓彭之勇孫吴之䇿令其制勝其可必乎望至秋冬之際令朔方軍盛陳兵馬告其禍福啗以繒帛之利示以麋鹿之饒説其魚米之鄉陳其畜牧之地並分配淮南河南寛鄉安置仍給程糧送至配所雖復一時勞弊必得長久安穏二十年外漸染淳風將以充兵皆為勁卒若以北狄降者不可南中安置則髙麗俘虜置之沙漠之曲西域編甿散在青徐之右唯利是視務安疆塲何獨降胡不可移徙近者在邊將士爰及安蕃使人多作䛕詞不為實對或言北兵破滅或言降户安静志欲自言功效非有以徇邦家伏願察斯利口行兹逺慮邊荒清晏黎元幸甚臣料畱住之議謀者云遵故事必言降户之輩舊置河曲之中昔年既得康寧今者還應穩便但時異事變先典攸𫝊往者頡利破亡邉境寧謐降户之輩無復他心所以多歴嵗年此類皆無動静今虜見未破滅降户私使往来或畏北人之威或懐北人之恵又是北人戚屬夫豈不識親疎將比昔年安可同日臣料其中頗有三䇿若盛陳兵馬散令分配内獲精兵之實外袪黠寇之謀蹔勞永安上䇿也若多屯士卒廣為備擬亭障之地蕃漢相㕘費甚人勞此下䇿也若置之朔塞任之来往通傳信息結成禍胎此無䇿也伏願察斯三者詳其善惡利害之狀長短可尋縱因遷移或致逃叛但有移得之者即是今日良圖畱待河冰恐即有變臣蒙天澤叨居重鎮逆耳利行敢不盡言疏奏未報降虜果叛勅晙帥并州兵西濟河以討之後為朔方道行軍大總管時突厥􅎤跌部落及僕固都督勺磨等散在受降城左右居止謀引突厥共為表裏陷軍城而反晙密請誅之八年秋晙誘􅎤跌等黨與八百餘人於中受降城宴樂酒酣勒兵盡殺之突厥降者繇是遂盡晙還遷兵部尚書復充朔方軍大總管張守珪為左金吾員外將軍吐蕃陷瓜州以守珪為瓜州刺史墨離軍使領餘衆修築州城板堞纔立賊又暴至城下城中人相顧失色雖相率登陴畧無守禦之意守珪曰彼衆我寡又創痍之後不可以矢石相持須以權道制之也乃於城上置酒作樂以㑹將士賊疑城中有備竟不敢攻城而退守珪縱兵擊敗之於是修復廨宇收合流亡皆復舊業王君㚟為河西隴右節度使判涼州都督事開元十六年冬吐蕃大將悉諾邏率衆入冦大小谷又移攻甘州焚燒市里而去君㚟候其兵疲整士馬以掩其後㑹大雪賊徒凍死者甚衆賊遂取積石軍西路而還君㚟令副使馬元慶禆將車蒙追之不及君㚟先令人潛入賊境於歸路燒草悉諾邏還至大非山將息甲牧馬而野草皆盡馬死過半君㚟與秦州都督張景順等率兵襲其後入至青海之西時海冰合將士並乗冰而渡㑹悉諾邏已渡大非山輜重及疲兵尚在青海之側君㚟縱兵盡俘獲之及牛馬羊數萬王忠嗣天寳初為河東節度使每軍出即各召本將付其兵器令給士卒雖一弓一箭必書其名姓於上以記之軍罷却納若遺失即驗其名罪之故人人自勸甲仗充牣後為朔方節度每至互市時即髙估馬價以誘之諸蕃聞之競來求市来輒買之故蕃馬益少而漢軍益壯哥舒翰天寳六年為河源軍使先是吐蕃每至麥熟時即率部衆至積石軍穫取之共呼為吐蕃麥莊前後無敢拒之者至是翰使王難得楊景暉等潛引兵至積石軍設伏以待之吐蕃以五千騎至翰於城中率驍勇馳擊殺之畧盡餘或挺走伏兵邀擊匹馬不還李光弼為北京留守肅宗至德二年正月安禄山賊將史思明蔡希徳髙秀巖牛庭玠等四偽帥衆十餘萬来攻太原光弼所部將士聞之皆懼議欲修城以待之光弼曰城周四十里賊垂至令興功役是未見敵而自疲矣乃躬率士卒百姓於城外掘壕以自固作塹數十萬衆莫知所用及賊攻城於外光弼即令増壘於内壊輒補之賊有城外詬詈戲侮者光弼令穿地道一夕而擒之自此賊將行皆視地不敢逼城强弩發石以擊之賊驍將勁卒死者十二三城中長幼咸服其勤智乾元二年七月加天下兵馬副元帥是年逆賊史思明㓂陷雒陽光弼令許叔冀守汴州戰不勝與董秦梁浦劉從諫等降思明其將李詳畱守汴州思明又使梁浦劉從諫田神功等數千人下江淮南謂之曰收得其地之日每人任取兩船錢帛思明乗勝而西光弼整衆至東京謂畱守韋陟曰賊乗鄴下之勝遂犯王畿難與争鋒雒城無糧又不可守公計若何陟曰加兵陕州退守潼關據險以待之亦足以自固光弼曰此盖兵家常勢非用竒之䇿也夫兩軍相寇貴進尺寸之間耳今委五百里而不顧是張賊勢也若移軍河陽北阻澤潞三城以抗勝即擒之敗則自守表裏相應使賊不敢西侵此則猨臂之勢也夫辯朝廷之禮光弼不如公論軍旅之事公不如光弼陟無以應光弼遂移牒畱守及官吏悉從廻避令軍士運油鐵等以為戰守之備思明至偃師光弼悉令將士赴河陽判官韋損曰東京帝宅侍中何不守之光弼曰令守東京汜水㟧領伊闕各須人守子為兵馬判官令判官分守得否既而遲廻未出城賊已至故城矣光弼引兵趨河陽行至石橋天暮令秉炬徐行與賊相随亦不敢来擊乙夜方入河陽城賊又於墻南掘壕塹築月城以拒光弼但屯於白馬寺不敢居東京於是汝鄭滑等州相次陷沒於賊史思明攻河陽光弼謂李抱玉曰將軍能爲我守南城二日乎抱玉曰過期若何光弼曰過期而救不至任棄城也抱玉受命勒兵守南城賊帥周摯領安太清徐璜玉等先攻南城將陷之抱玉乃紿之曰吾糧盡明日當降賊衆大喜斂軍以俟之抱玉因得繕完設備明日堅壁請戰賊怒見欺急攻之抱玉出奇兵表裏夹攻殺傷甚衆摯領軍却退光弼自將於中潬城城外置栅籬籬外掘大塹濶二丈深如之周摯捨南城力攻中潬光弼命荔非元禮出勁卒於羊馬城以拒賊光弼於城東北角樹一小紅旗下望賊軍賊恃衆直逼其城以車二乗載木鵝䝉衝鬬樓撞車随其後勒兵填城下塹三面各八道過其兵又當塹開柵各置一門光弼遥望賊填塹開栅過兵逼城使人語荔非元禮曰中丞看賊填塹過兵居然不顧何也元禮報曰太尉擬守乎擬戰乎曰戰曰若戰賊為我填塹太尉復何怪也光弼曰吾智不及汝也汝其勉之元禮候栅門開遂勒兵出戰一逼賊軍退走數百歩元禮料賊衆陣堅雖出入馳突不足以破賊遂𫝊令收軍却退光弼遙望軍退大怒使人喚元禮欲按軍令元禮曰戰正忙喚作何物元禮遂退入栅中賊亦整軍不敢逼良久元禮令軍中鼓譟出栅門徒摶齊進衝賊大潰摯又整軍壓北而下將攻北城光弼亦領衆入北城救之登城望賊曰彼雖衆亂而囂不足懼也當為公等日午而破之遂命將士戰日午不決謂諸將曰向来賊何處最堅而難犯曰某處令郝廷玉以五百騎當之又問更向何處堅命倫惟貞率三百騎以當之光弼令之曰爾等望吾旗而戰若麾旗緩任爾觀便宜而進退吾旗連麾三至地則萬衆齊入生死以之軍退者斬玉等䇿馬赴賊有一將援槍刺賊洞馬腹連刺數人一將逢賊不戰而退光弼召不戰者斬之乃命援槍者以絹五百匹賞之令赴戰須臾廷玉奔歸光弼望之驚曰廷玉退吾事不成矣命使者取玉頭来玉見使者曰馬中箭非敢敗也使者馳報光弼令換馬復入玉等決死往戰光弼連麾三軍望旗而俱進聲動天地一鼓而破之僕固懐恩為李光弼右廂兵馬使光弼守河陽命懐恩收懐州城官軍頻不利懐恩設䇿潛通地道取賊號詐𫝊號令賊軍亂遂收懐州城生擒偽刺史安太清及軍將楊希文送闕下初河朔人唐希俊為賊所役官軍得之光弼將按軍令懐恩救免及是通地道獲賊號皆希俊自地道先入與懐恩期於州東門登墻以呼懐恩遂梯城而上甲士繼登斬賊六七千乃擒太清等郭子儀為朔方節度使乾元元年十月破逆賊安慶緒十萬衆生擒其弟慶和初子儀自杏園渡濟河背水而陣設壁以待慶緒而安泰清率衆以拒官軍慶緒聞衛州圍逼悉師而南分為三軍以崔乾祐將上軍安雄俊王福徳為佐田承嗣將下軍榮敬超為佐慶緒自將中軍以孫孝哲薛嵩為佐初子儀之列陣也又使善射者三千人伏於壘垣之上令其衆曰吾師陣於外若小退爾當登壘鼓噪而悉衆攅射又先建髙木為三樓以望慶緒之進退賊軍纎塵所起此皆盡知及明日戰鋒刄接子儀麾其屬偽奔於壘慶緒果逐之善射者萬弩齊發賊軍潰走奔相州子儀乗勝收衛州代宗永泰初子儀出鎮河中是時僕固懐恩誘吐蕃廻紇来冦子儀親諭廻紇皆捨兵下馬拜曰是吾父也子儀招首領等各飲其酒與之重錦歡言如初子儀因説回紇曰吐蕃本吾舅甥之國無負而至是無親也若倒戈乗之如拾芥耳且其羊馬蔽地數百里是謂天賜不可失之也今能逐戎以利舉與我繼好而凱旋不亦善乎㑹懐恩暴死於靈州羣虜無所統遂許諾吐蕃知之其夕奔退廻紇逐之子儀分衆軍以接其後吐蕃大敗而廻紇逐之至靈臺再破之大歴九年子儀入朝代宗召對延英語及西蕃充斥苦戰不暇言發涕零既退復上封論備吐蕃利害曰朔方國之北門西禦犬戎北虞獫狁五城相去三千餘里開元天寳中戰士十萬戰馬三萬纔敵一隅自先皇帝龍飛靈武戰士從陛下收復兩京東西南北曽無寧嵗中年以僕固之役又經耗散人亡三分之二比於天寳中有十分之一今吐蕃充斥勢彊十倍兼河隴之地雜羌渾之衆每嵗来闚近郊以朔方減十倍之軍當吐蕃加十倍之騎欲求制勝豈易為力近入内地稱四節度每將盈萬每賊兼乗數四臣所統將士不當賊四分之一所有征馬不當賊百分之二誠合固守不宜與戰又得馬璘牒賊擬渉渭而南臣若堅壁恐犯畿甸若過畿内則國之大恐諸道易揺外有吐蕃之彊中有易揺之衆外畏内懼將何以安臣伏以陛下横制勝之術力非不足但慮簡練未精進退未一時淹師老地闊勢分願陛下更詢讜議慎擇名將俾之統軍於諸道各抽精卒成四五萬則制勝之道必矣未可失時臣又料河南北山南江淮小鎮數千大鎭數萬空耗月餼曽不習戰臣請抽赴關中教之戰陣則軍聲益振攻守必全亦長久之計也臣猥蒙任遇垂二十年今齒髮已衰願避賢路止足之誡神明所鍳詔曰卿憂深慮逺殊沃朕心始終倚賴未可執辭也册府元龜卷三百六十六
