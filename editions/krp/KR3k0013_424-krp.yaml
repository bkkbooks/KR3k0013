body:
  text: 册府元龜卷四百二十四宋王欽若等撰将帥部死事古之謂死有重於泰山有輕於鴻毛者盖慮乎不得其所也若乃委質以事君陳力而就列有死無貳乃其分焉矧夫處分閫之任總貞師之寄所以式遏寇虐作固垣翰夾輔宗社保障黎元誠安危之注意而委賴之尤重者也乃有遘難虞之㑹當討擊之際純心内激拳勇外發執金皷而作氣冐矢石而無憚奮不顧身淪於鋒刃其或失先聲後實之效當彼衆我寡之勢戰則奔潰守則淪覆而能執心不撓握節自誓捐軀死難沒而益榮此所謂執戈衛社隕首無悔者矣晉狼瞫為戎右魯文公二年秦師伐晉晉侯禦之及秦師戰于彭衙秦師敗績初戰於殽也晉梁𢎞御戎萊駒為右戰之明日晉襄公縛秦囚使萊駒以戈斬之囚呼萊駒失戈狼瞫取戈以斬囚禽之以從公乗遂以為右箕之役在僖公三十三年先軫黜之而立續簡伯狼瞫怒其友曰盍死之瞫曰吾未獲死所其友曰吾與女為難欲共殺先軫瞫曰周志有之勇則害上不登於明堂死而不義非勇也共用之謂勇吾以勇求右無勇而黜亦其所也謂上不我知黜而宜乃知我矣子姑待之及彭衙既陳以其屬馳秦師死焉晉師從之大敗秦師君子謂狼瞫於是乎君子詩曰君子如怒亂庶遄沮又曰王赫斯怒爰整其旅怒不作亂而以從師可謂君子矣欒鍼為戎右荀偃将中軍襄十四年夏諸侯之大夫從晉侯伐秦鄭司馬子僑帥鄭師以進師皆從之至於棫林棫林秦地不獲成焉秦不服荀偃令曰雞鳴而駕塞井夷竈示不反唯余馬首是瞻言進退從已欒黶曰晉國之命未是有也余馬首欲東乃歸黶惡偃自專故棄之下軍從之左史謂莊子曰不待中行伯乎中行伯荀偃也莊子魏絳也左史晉太史莊子曰夫子命從帥夫子謂荀偃欒伯吾帥也吾将從之從帥所以待夫子也以從命為待也欒黶下軍帥莊子為佐故曰吾帥伯游曰吾令實過悔之何及多遺秦禽軍帥不和恐多為秦師所禽獲乃命大還晉人謂之遷延之役遷延却退欒鍼曰此役也報櫟之敗也役又無功晉之恥也吾有二位於戎路欒鍼欒黶弟也二位謂黶將下軍鍼為戎右敢不恥乎與士鞅馳秦師死焉魯公叔禺人昭公子也魯與齊戰于郎郎魯近邑也哀十二年齊國書帥師伐我是也公叔禺人遇負杖入保者息遇見也見走辟齊師将入保罷倦扳其杖頭上兩手掖至休息者保縣邑小城禺人昭公之子春秋傳曰公叔務人曰使之雖病也謂時徭役任之雖重也謂時賊殺君子不能為謀也士弗能死也不可君子謂卿大夫也魯政既惡復無謀臣士又不能死難禺人恥之我則既言矣欲敵齊師踐其言與其鄰重汪錡皆往死焉奔敵死齊冦隣里也重皆當為童未冠者之稱姓汪名錡隣或為談春秋傳曰童汪錡魯人欲勿殤重汪錡見其死君事有士行欲以成人之喪喪之言魯人者死君事國為歛葬問于仲尼仲尼曰能執干戈以衛社稷雖欲勿殤也不亦可乎善之魯哀公十一年公㑹吳伐齊齊國書将中軍髙無㔻将上軍宗樓将下軍陳僖子謂其弟書爾死我必得志書子占也欲獲死事之功宗子陽與閭丘明相厲也相勸厲致死子陽宗樓桑掩胥御國子國子國書公孫夏曰二子必死亦勸勉人将戰公孫夏命其徒歌虞殯虞殯送葬歌曲示必死陳子行命其徒具含玉公孫揮命其徒曰人尋約吳髮短約繩也八尺為尋吳髮短欲以繩貫其首東郭書曰三戰必死于此三矣三戰夷儀五氏與今使問弦多以琴弦多齊人六年奔魯問遺曰吾不復見子矣言将戰死陳書曰此行也吾聞鼔而已不聞金矣鼔以進軍金以退軍不聞金言将死戰于艾陵大敗齊師獲國書公孫夏閭丘明陳書東郭書楚大夫史皇吳伐楚楚師亂吳師大敗子常奔鄭史皇以其乗廣死以戰死漢周苛為御史大夫髙祖令與樅公守滎陽三年項羽引兵西㧞滎陽城生得周苛羽亨周苛亨謂煮而殺之并殺樅公紀通以将軍從髙祖擊破秦入漢定三秦戰好畤死事封子通為襄平侯灌孟吳楚反時潁隂侯灌嬰為将軍屬太尉時潁隂侯是灌嬰之子名何轉冩誤為嬰耳孟為校尉戰常䧟堅遂死吳軍中韓千秋故濟北相武帝元鼎四年南粤相吕嘉為亂天子遣千秋往入粤境破數小邑未至番禺四十里粤以兵擊千秋等滅之於是天子曰韓千秋雖亡成功亦軍鋒之冠封其子延年為成安侯後漢叔壽為破虜大将軍光武建武元年擊五校賊於曲梁戰歿曲梁屬廣平國今雒州縣也劉植為驍騎将軍建武二年更封昌城侯討密縣賊戰殁温序為䕶羌校尉行部至襄武爲隗囂别將茍宇所拘刼宇謂序曰子若與我并威同力天下可圖也序曰受國重任分當致死義不貪生茍背恩徳宇等復曉譬之序素有氣力大怒叱宇等曰虜何敢迫脅漢将因以節撾殺數人賊衆爭欲殺之宇止之曰此義士守節可賜以劒序受劒衘鬚於口顧左右曰既為賊所迫殺無令鬚汙土遂伏劒而死劉尚為武威将軍擊武陵五溪蠻夷深入軍沒傅育為䕶羗校尉章帝元和三年胡羗叛出塞更依迷吾章和元年育上請發隴西張掖酒泉各五千人諸郡太守将之育自領漢陽金城五千人合二萬兵與諸郡尅期擊之命隴西兵據河南張掖酒泉兵遮其西並未及㑹育軍獨進迷吾聞之徙廬落去育選精騎三千窮追之夜至建威南三兠谷去虜數十里湏旦擊之不設備迷吾乃伏兵三百人夜突育營營中驚壊散走育下馬手戰殺十人而死張顯為漁陽太守殤帝延平元年鮮卑復冦漁陽顯率數百人出追之兵馬掾嚴授諫曰前道險阻賊勢難量宜且結營先令輕騎偵視之顯意甚銳怒欲斬之因復進兵遇虜伏發士卒悉走唯授力戰身被十創手殺數人而死顯中流矢主簿衛福功曹徐咸皆自投赴顯俱歿於陣鄧太后策書褒歎賜顯錢六十萬以家二人為郎授福咸各錢十萬除一子為郎仲光為右扶風安帝元初二年與安定太守杜恢京兆虎牙都尉耿溥與先零羗戰於丁奚城光等大敗並沒蔡諷為遼東太守建光元年四月濊貊復與鮮卑寇遼東諷追擊戰歿成嚴為雲中太守建光元年秋鮮卑兵至鞬復畔寇居庸闗嚴擊之兵敗功曹陽穆以身捍嚴與俱戰歿李超為代郡太守順帝永建元年八月鮮卑寇代郡超戰歿馬賢為征西将軍陽嘉五年且凍傳難種羗反叛以騎都尉耿叔副賢將兵十萬屯漢陽羗冦武都燒隴闗掠苑馬六年春賢將五六千騎擊之到射姑山賢軍敗賢及二子皆戰歿順帝愍之賜布三千疋穀千斛封賢孫光為武陽亭侯租入嵗百萬趙冲為武威太守督河西四郡兵馬建康元年追叛羗到建威鸇隂河軍度竟所将降胡六百餘人叛走冲将數百人追之遇羗伏兵與戰歿冲雖身死而前後多所斬獲羗繇是衰耗尹耀為揚州刺史建康元年八月揚徐盜賊范容周生等冦掠城邑九月耀與九江太守鄧顯討范容等於歴陽軍敗耀顯為賊所沒倪式為九真太守桓帝永壽三年居風令貪暴無度縣人朱逹等及蠻夷相聚攻殺縣令衆至四五千人進攻九真式討之戰死詔賜錢六十萬拜子二人為郎劉岱為兖州刺史獻帝初平三年青州黄巾衆百萬入兖州岱戰死鮑信為濟北相迎曹公領兖州牧㑹黄巾大衆入州界曹公以賊將勝而驕故設竒兵挑擊於壽張先與信出行戰地後歩軍未至而卒與遇遂接戰信殊死戰以救曹公信得潰圍出然信遂沒時年四十有一賊退走購求信喪不得衆乃刻木如信形狀祭而哭焉張濟為驃騎将軍討吕布屯兵𢎞農士卒饑餓南攻穰為流矢所中死魏夏侯淵為征西將軍守漢中漢建安二十三年劉備軍陽平闗淵率諸将拒之相守連年二十四年正月備夜燒圍鹿角淵使張郃䕶東圍自将輕兵䕶南圍備挑郃戰郃軍不利淵分所将兵半助郃為備所襲淵遂戰死謚曰愍侯初淵雖數戰勝太祖嘗戒曰為将當有怯弱時不可但恃勇也将以勇為本行之以智計但知任勇一匹夫敵耳衛兹陳留人也太祖至陳留始與兹相見遂同盟計興武事令兵三千人從太祖入滎陽力戰終日失利身沒龎徳為立義将軍討闗羽戰沒被殺後鍾㑹平蜀前後皷吹迎徳屍喪還鄴冢中身首如生趙昱為廣陵太守賊笮融從臨淮見討迸入郡界昱将兵拒戰敗績見害韋康為涼州刺史為馬超所圍堅守歴時救軍不至遂為超所殺孫觀為青州刺史從征孫權於濡湏口為流矢所中穿左足力戰不顧武帝勞之曰将軍被瘡深重而猛氣益奮及瘡甚遂卒曹攄為襄陽太守征南司馬值天下亂攄討賊句吳戰敗死蘇尚為將軍𨽻并州刺史畢軌明帝青龍元年鮮卑軻比能誘納歩度根使叛并州與結和親自勒萬騎迎其累重於陘北軌遣尚及将軍董弼等擊之比能遣子将騎與尚等㑹戰於樓煩臨陣害尚弼張郃為左将軍加特進諸葛亮出祁山詔郃督諸将西至雒陽城亮還保祁山郃追至木門與亮軍交戰飛矢中郃右膝薨謚曰壯侯亮軍退司馬宣王使郃追之郃曰軍法圍城必開出路歸軍勿追宣王不聽郃不得已遂追蜀軍乗髙布伏弓弩亂發矢中郃髀弓遵為𢃄方郡太守景初中樂浪部從事吳林以樂浪本統韓國分割辰韓八國以與樂浪吏譯轉有異同臣智激韓忿攻𢃄方郡﨑離營遵與樂浪太守劉茂興兵伐之遵戰死二郡遂滅韓蜀龎統為軍師中郎將從先主入蜀進圍雒縣統率衆攻城為流矢所中卒時年三十六闗羽為前將軍率衆攻曹仁於樊孫權先遣使為子索羽女羽罵辱其使不許婚權大怒又南郡太守麋芳在江陵將軍傅士仁屯公安素皆嫌羽輕已自羽之出軍芳仁供給軍資不悉相救羽言還當治之芳仁咸懼不安於是權隂誘芳仁芳仁使人迎權而曹公遣徐晃救曹仁羽不能克引軍退還權已據江陵盡虜羽士衆妻子羽軍遂散權遣將逆擊羽斬羽及子平于臨沮權遣将軍擊羽獲羽及子平權欲活羽以敵劉曹左右曰狼子不可養為害曹公不即除之自取大禍乃議徙都今豈可生乃斬之張南為将軍從先主征吳與馮習俱死龔禄字徳緒為越嶲太守隨丞相亮南征為蠻夷所害時年三十一王士字義彊丞相亮南征蠻為益州太守将南行為蠻夷所害趙廣為牙門将隨姜維沓中臨陣戰死張嶷為盪寇将軍魏狄道長李簡密書請降衛将軍姜維率嶷等因簡之資以出隴西既到狄道簡悉率城中吏民出迎軍軍前與魏将徐質交鋒嶷臨陣殞身然其所殺傷亦過倍既亡封長子瑛西鄉侯次子䕶雄襲爵向朗為中領軍後主延熈三年征漢蠻夷被害諸葛瞻為行都䕶衛将軍景耀六年魏征西将軍鄧艾伐蜀自隂平繇景谷道旁入瞻督諸軍至涪停住前鋒破退還住綿竹艾遣書誘瞻曰若降者必表為瑯邪王瞻怒斬艾使遂戰大敗臨陣死時年三十七衆皆離散艾長驅至成都瞻長子尚與瞻俱沒李球為羽林右部從諸葛瞻拒鄧艾臨陣授命死于綿吳陳武字子烈從孫䇿征討有功䇿破劉勲多得廬江人料其精鋭乃以武為督所向無前尤為大帝所親愛數至其家累有功勞進位偏将軍建安二十年從擊合肥奮命戰死大帝哀之自臨其葬蒋欽領兵拒劉備有功還赴南郡與魏交戰臨陣卒徐琨為平虜將軍後從討黄祖中流矢卒張悌與諸葛靚之禦晉兵也吳師大敗諸葛靚與五六百人退走使過迎悌悌不肯去靚自往牽之謂曰且夫天下存亡有大數豈卿一人所知如何故自取死為悌垂涕曰仲恩今日是我死日也且我作兒童時便為卿家丞相所㧞嘗恐不得其死負名賢知顧今以身徇社稷復何遁邪莫牽曵之如是靚流淚放之去百餘步已見為晉軍所殺留贊為左将軍孫峻征淮南授贊節拜左䕶軍未至壽春道路病發峻令贊将軍重先還遇伏兵與戰死之晉楊欣為凉州刺史咸寧四年與虜若羅㧞能等戰于武威敗績死之周處為建武将軍惠帝永平六年氐帥萬年僭號稱帝遣處與安西将軍夏侯俊等討之處及萬年戰於六陌王師敗績處死之時衆寡不敵臨陣慷慨奮不顧命以身狥國力戰而歿贈平西将軍索靖為始平内史及趙王倫簒位靖應三王義舉以左衛将軍討孫秀有功加散騎常侍遷後将軍太安末河間王顒舉兵向雒陽拜靖使持節監雒城諸軍事游擊将軍領雍秦涼義兵與賊戰大破之靖亦被傷而卒追贈太常曹攄為襄城太守懐帝永嘉二年為髙密王簡征南司馬其年流人王道等聚衆屯冠軍寇掠城邑簡遣参軍崔曠討之令攄督䕶曠曠姦兇人也譎攄前戰期為後繼遁而不至攄獨與道戰于酈縣軍敗死之路述為河東太守永嘉二年七月劉元海㓂平陽太守宋抽奔京師述力戰死之王粹為鄴郡太守永嘉二年十一月石勒宼鄴郡粹戰敗死之王賦為安北将軍永嘉二年石勒宼鄴郡王堪為車騎将軍石勒襲白馬堪死之宋抽為征虜將軍永嘉四年七月劉聰從弟曜及其将石勒圍懐詔抽救之為曜所敗抽死之崔曠為襄城太守永嘉四年十月石勒䧟襄城曠遇害郭察為安城太守永嘉五年五月益州流人汝班梁州流人蹇撫作亂於湘州虜刺史茍晀南破零桂諸郡東掠武昌安城察與邵陵太守鄭融充陽内史滕育並遇害郝詵為平北将軍劉琨部将永嘉五年七月石勒宼冀州劉粲㓂晉陽詵帥衆禦粲詵敗績死之李惲為龍驤將軍愍帝建興元年四月石勒宼冀州上白惲死之賈疋愍帝時為驃騎将軍雍州刺史封酒泉公時諸郡百姓饑饉白骨蔽野百無一存疋帥戎馬二萬餘人将伐長安平西太守竺恢亦固守劉粲聞之使劉曜劉雅及趙染距疋先攻恢不尅疋邀擊大敗曜中流矢退走疋追之至于甘泉旋自渭橋襲瀘水胡彭蕩仲殺之遂迎秦王奉為皇太子後蕩仲子夫䕶帥羣胡攻之疋敗走夜墮于澗為夫䕶所害疋勇略有志節以興復晉室為己任不幸顛墜時人咸痛惜之魏浚為揚威将軍河南尹劉曜忌浚得衆率衆軍圍之劉演郭黙遣軍來救曜分兵逆於河北乃伏兵深隐處以邀演黙軍大破之盡虜演等騎浚夜遁走為曜所得遂死之追贈平西将軍華化字長風為征虜将軍討汲桑戰沒陶侃之子與果烈善戰為武威将軍後與杜弢戰與被重創卒侃哭之慟曰喪吾家寳三軍皆為之垂泣詔贈長沙太守趙誘為王敦參軍加廣武将軍與甘卓周訪共討華軼破之又擊杜弢於西湘元帝大興初復與卓攻弢滅之為武昌太守時杜曾迎第五猗於荆州作亂敦遣誘與襄陽太守朱軌陵江将軍黄峻共拒之猗既愍帝所遣加有時望為楚所歸誘等苦戰皆死之敦甚悼惜之表贈征虜将軍秦州刺史子龔與誘俱死陳超為平北将軍祖逖督䕶大興二年冬十月逖遣超襲石勒将桃豹超敗沒於陣司馬玖為将軍明帝大寧元年春李雄使其将李驤任回宼臺登玖死之羊曼為前軍蘇峻之亂曼率文武守雲龍門王師不振或勸曼避峻曼曰朝廷破敗吾安所求生勒衆不動為峻所害年五十五峻平追贈太師楊術為朱提太守成帝咸和二年正月寧州秀才龎遺起義兵攻李雄将任回李謙等雄遣其將羅恒費黒救之寧州刺史尹奉遣裨将姚岳與術援遺戰于臺登岳等敗績術死之孟彦為舟川守将咸康六年三月李壽䧟舟川彦與劉齊李秋皆死之毛寳為征虜将軍咸康中石季龍将夔安李農䧟沔南張貉䧟邾城因宼江夏義陽寳及西陽太守樊俊義陽太守鄭進並死之沈勁少負志節穆帝升平中慕容恪侵逼山陵時冠軍将軍陳祐守雒陽衆不過二千勁自表求配祐效力因以勁補冠軍長史令自募壯士得千餘人以助祐擊賊頻以寡制衆而糧盡援絶祐懼不能保全㑹賊宼許昌祐因以救許昌為名興寧三年留勁以五百人守城祐率衆而東㑹許昌已沒祐因奔崖塢勁志欲致命欣獲死所尋為恪所攻城䧟被執神氣自若恪竒而将宥之其中軍将軍慕容䖍曰勁雖竒士觀其志度終不為人用今若赦之必為後患遂遇害恪還從容言於慕容暐曰前平廣固不能濟辟閭今定雒陽而殺沈勁實有愧於四海朝廷聞而嘉之贈東陽太守李福為潁川太守興寧二年春慕容暐将慕評襲許昌福死之吉挹字冲祖孝武初為魏興太守輕車将軍以拒苻堅堅将韋鍾攻魏興挹遣衆拒之斬七百餘級加督五郡軍事鍾率衆欲趣襄陽挹又邀擊斬五千餘級鍾怒廻軍圍之挹又屢挫其銳其後賊衆繼至挹力不能抗城将䧟引刀欲自殺其友止之曰且苟存以展他計為計不立死未晩也挹不從友人逼奪其刀衆賊執之挹閉口不言不食而死韋簡為東平太守太元十九年十月慕容垂遣其子惡奴宼廪丘簡及垂将尹國戰于平陸簡死之袁山松為吳郡太守孫恩作亂山松守滬瀆城城䧟被害謝琰為㑹稽内史時孫恩作亂琰不設備恩奄至山隂北三十五里琰遣參軍劉宣之拒破恩既而上黨太守張䖍碩戰敗羣賊銳進人情震駭咸以宜持重嚴備且列水軍於南湖分兵設伏以待之琰不聼既至尚未食琰曰要當先滅此寇而後食耳跨馬而出廣武将軍桓寳為前鋒摧鋒䧟陣殺賊甚多而塘路近狹琰軍魚貫而前賊於艦中傍射之前後斷絶琰至千秋亭敗績琰帳下都督張猛於後斫琰馬琰墮地與二子肇峻俱被害寳亦死之周虓字孟威寧康中鎮于巴西為苻堅所獲守節不屈堅使者清道虓躬治達陌謂使者云煩君語氐賊苻堅何至取國士如此堅聞之曰貉子正欲覔死殺之適足成其名耳乃苦加栲檚不食而死檀斌為兖州刺史石勒将瞻攻䧟鄒山斌死之前趙韋忠為劉聰鎮西大将軍平羗校尉討叛羗矢盡不屈節而死前燕吕䕶為慕容暐将奔于晉尋復叛歸于暐待之如初因遣傅顔與䕶率衆據河隂顔北襲勅勒大獲而還䕶攻雒陽中流矢而死後秦楊佛嵩姚興時為都督嶺北討虜諸軍安逺将軍雍州刺史率嶺北見兵以討赫連勃勃嵩發數日興謂羣臣曰佛嵩驍猛果銳每臨敵對宼不可制抑吾嘗節之配兵不過五千今衆旅既多遇賊必敗今去逺追之無及吾深憂之其下咸謂不然佛嵩果為勃勃所執絶吭而死姚平為姚泓後将軍時仇池公楊盛攻䧟祁山執建節王總遂逼秦川泓遣平救之盛引退姚嵩與平追之及于竹嶺姚讚率隴西太守姚秦都雒陽太守王煥以禁兵赴之讚至清水嵩為盛所敗嵩父秦都王煥皆戰死趙元為姚泓征南姚洸部将洸鎮雒陽時宋髙祖為晉太尉總大軍伐泓檀道濟次成臯元謂洸曰元受三帝重恩當守正死耳但明公不用忠臣之言為姦孽所誤後必悔之亦無及耳㑹陽城成臯滎陽武牢諸城悉降道濟等長驅而至元與晉将毛徳祖戰于栢谷以衆寡不敵而敗被創十餘據地大呼元司馬騫鑒冐刃抱元而泣元曰吾瘡已重君宜速去鑒曰若将軍不濟當與俱死去将何之皆死於陣姚洽為姚紹左長史時晉軍伐泓紹率姚鸞等歩騎五萬距王師于潼闗檀道濟固壘不戰紹分道置諸軍為掎角之勢遣輔國胡翼度據東京武衛姚鸞營于大路與晉軍相接沈林子簡精銳䘖枚夜襲之鸞衆潰戰死士卒死者九千餘人紹遣洽及姚墨蠡等騎三千屯于河之九原欲絶道濟諸縣租輸洽辭曰夫小敵之堅大敵之擒今兵衆單弱而逺在河外雖明公神武然鞭短勢殊恐無所及紹不聼沈林子率衆八千要洽於河上洽戰死衆皆沒後梁壘澄仕吕光為酒泉太守時沮渠蒙遜叛蒙遜從兄男成先為将軍守晉昌聞蒙遜起兵逃奔貲虜扇動諸夷衆至數干進攻禄福建安寧戎䕶軍趙䇿擊敗之男成退屯樂涫澄率将軍趙䇿趙陵歩騎萬餘討男成于樂涫戰敗澄䇿死之宋孟龍符為龍驤将軍廣川太守髙祖伐慕容超令龍符統歩騎為前鋒軍逹臨朐與賊爭水龍符单騎衝突應手破散即據水源賊遂退走龍符乗勝奔之後騎不及賊數千騎圍繞攻之龍符奮矟接戰每一合輙殺數人衆寡不敵遂見害劉䖍之為江夏相髙祖西征司馬休之魯宗之等遣參軍檀道濟朱超石歩騎出襄陽䖍之率州郡兵力出鄖城屯三連立木橋聚糧以待道濟等積日不至為宗之子軌所襲衆寡不敵參軍孫長庸流涕勸退軍䖍之厲色曰我仗順伐罪理無不克如其不幸命也戰敗見殺追贈梁秦二州刺史徐逹之尚高祖長女為振威将軍討司馬休之使統軍為前鋒配以精兵利器事尅當即授荆州休之遣魯宗之子軌擊破之於陳見害追贈中書侍郎孟係祖為殿中将軍大明二年後魏侵青冀孝武遣軍援之係祖自占求行戰於杜梁挺身入陣所殺狼藉遂見殺詔書追贈郡太守桓詢為積弩将軍梁山之役力戰為流矢所中死追贈冀州刺史鄭墨淮西人太始元年晉安王子勛與豫州刺史殷琰同逆墨以前奉朝請率子弟部曲及淮右諸部起義於陳郡城有衆一萬明帝以為司州刺史後虜㓂淮戰敗見殺追贈冠軍将軍韋山松為益州刺史劉秀之中兵參軍南譙王義宣據荆江為逆徴兵于秀之秀之遣山松萬人襲江陵出峽竺超民遣将席天生逆之山松一戰即梟其首進至江陵為魯爽所敗山松見殺劉勔為尚書右僕射中領軍桂陽王休範為亂奄至京邑加勔使持節領軍署佐吏鎮扞石頭既而賊衆屯朱雀航南右軍王道隆率宿衛向朱雀航聞賊已至急信召勔勔至命閉航道隆不聼促勔渡航進戰率所領于桁南戰敗臨陣死之時年五十七事平贈散騎常侍司空本官如故卜伯興為殿中将軍泰始初領僮擊南賊于赭圻戰沒劉康祖為佐将軍聞魏軍㓂壽陽自虎牢率七千人來赴魏軍至者八萬騎康祖令軍曰顧望者斬首轉歩者斬足士皆用命賊死者萬餘血流沒踝流矢貫頸墮馬死册府元龜卷四百二十四
