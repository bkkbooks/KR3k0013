body:
  text: 册府元龜卷九百三十宋王欽若等撰總錄部傲慢不恭冦竊傲慢夫傲以取禍往事之明徴慢以失官前言之深戒自東周不競禮讓寖㣲驕倨之俗興而遜悌之風缺仲尼垂叩脛之戒穆叔著倍賦之文自是已還風流不冺或恃材而陵長或盛氣以傲人忽禮容而不修蔑年爵而罔顧至有箕踞而傾倚岸幘以嘯詠跌宕適意豪縱亂常宜乎招負俗之累嬰自貽之戚於戯書云簡而無傲詩云彼交匪傲萬福來求誠為君子之道也卻錡晉大夫魯成公十三年晉侯使卻錡來乞師將事不敬孟獻子曰卻氏其亡乎禮身之幹也敬身之基也卻子無基且先君之嗣卿也受命以求師將社稷是衛而惰棄君命也不亡何為苦成叔晉大夫卻犫也聘衛衛侯饗苦成叔寗恵子相苦成叔傲寗子曰苦成家其亡乎古之為享食也以觀威儀省禍福也故詩曰兕觥其觩㫖酒思柔彼交匪傲萬福來求今夫子傲取禍之道也御叔為魯御邑大夫時臧武仲如晉襄公頻與晉侯外㑹今各將罷魯之守卿遣武仲為公謝不敏故不書雨過御叔御叔在其邑將飲酒曰焉用聖人武仲多知時人謂之聖我將飲酒而已雨行何以聖為穆叔聞之曰不可使也而傲使人言御叔不任使四方國之蠧也令倍其賦古者家其國邑故以重賦為罷傳言穆叔能用教原壤魯人見孔子夷俟夷踞俟待也子曰㓜而不孫弟長而無述焉老而不死是謂賊賊謂賊害以杖叩其脛叩擊也脛脚脛漢寗成南陽人以郎謁者事景帝好氣為小吏必陵其長吏稍遷至濟南都尉而郅都為守始前都尉歩入府因吏謁守如縣令其畏都如此及成往直陵都出其上都素聞其聲善遇成與結驩周陽繇為河東都尉初繇為守視都尉如令及為都尉陵太守奪之治後漢趙壹字元叔漢陽西縣人恃才倨傲為鄉黨所擯乃作解擯後不赴辟召禰衡字正平建安初自荆州北㳺許都恃才傲逸臧否過差見不知己者不與語人皆以是憎之是時許都雖新建尚饒人士衡嘗書一刺懐之字漫㓕而無所適或問之曰何不從陳長文司馬伯逹乎衡曰卿欲使我從屠沽兒軰也又問曰當今許中誰最可者衡曰大兒有孔文舉小兒有楊徳祖又問曹公荀令君趙盪冦皆足蓋世乎衡稱曹公不甚多又見苟有儀容趙有腹尺因荅曰文若可借面弔喪稚長可使監厨請客其意以為荀但有貌趙徤啖肉也於是衆人皆切齒衡知衆不悦將南還荆州装束臨發衆人為祖道先設供帳於城南自共相誡曰衡數不遜今因其後到以不起報之及衡至衆人皆坐不起衡乃號咷大哭衆人問其故衡曰行屍柩之間能不悲乎衡史不載官魏劉楨為太祖丞相掾屬以辭㫖巧妙為諸公子所愛太子嘗請諸文學酒酣坐勸命夫人甄氏出拜坐中衆人咸伏而楨獨平視太祖聞之乃收楨减死論罪文欽為五營挍督出牙門將欽性剛暴無禮所在倨傲陵上不奉官法輒見奏遣明帝抑之後復以為將丁謐字彦清斐之子也謐太和中嘗住鄴借人空屋居其中而諸王亦欲借之不知謐已得直開門入謐望見王交脚卧而不起而呼其奴客曰此何等人促呵使去怒其無禮還且上言明帝收謐繫鄴獄以其功臣子原出後帝聞其有父風召拜度支郎中蜀劉巴字子初為先主左將軍西曹掾張飛嘗就巴宿巴不與語飛遂忿恚諸葛亮謂巴曰張飛雖實武人敬慕足下素矣主公今方收合文武以定大事足下雖天質高亮宜少降意也巴曰大丈夫處世當交四海英雄如何與兵子共語乎先主聞之怒曰孤欲定天下而子初専亂之其欲還北假道於此豈欲成孤事邪簡雍涿郡人隨先主入蜀拜昭徳將軍優游風儀性簡傲跌宕在先主坐席猶箕踞傾欹威儀不肅自縱適諸葛亮以下則獨擅一榻項枕卧語無所為屈彭羕字永年廣漢人為江陽太守資性驕傲多所輕忽楊戯為射聲校尉隨大將軍姜維出軍至亡水戯素心不服維酒後言笑每有傲弄之辭維外寛内忌意不能堪軍還有司承㫖奏戯免為庶人戯性雖簡然省畧未嘗以甘言加人過情接物書符指事希有盈紙鄧芝為大將軍二十餘年性剛簡不餙意氣不得士類之和於時人少所敬貴唯噐異姜維云張嶷為遏冦將軍慷慨壯烈士人咸多貴之然放蕩少禮人亦以此譏焉晉阮籍仕魏為歩兵校尉籍能為青白眼見禮俗之士以白眼對之及嵇喜來弔籍作白眼喜不懌而退喜弟康聞之乃齎酒挾琴造焉籍大悦乃見青眼繇是禮法之士疾之若讐而帝每保䕶之嵇康仕魏為中散大夫初康居貧嘗與向秀共鍜以自給潁川鍾㑹貴公子也精鍊有才辨故往造焉康不為之禮而鍛不輟良乆㑹去康謂曰何所聞而來何所見而去㑹曰聞所聞而來見所見而去㑹以此憾之吕安東平人與嵇康為友毎相思則命駕千里從之或遇其行康兄喜位至方伯拭席而待弗之顧也庾敳為東海王越軍諮祭酒王衍不與敳交敳卿之不置衍曰君不得為耳敳曰卿自君我我自卿卿我自用我家法卿自用卿家法衍甚竒之孫楚字子荆太原中郡人才藻卓絶爽邁不羣多所陵傲缺鄉曲之譽年四十餘始叅鎮東軍事何綏字伯蔚曽孫劭子也位至侍中尚書自以繼世名貴性既輕物翰札簡傲城陽王尼見綏書數謂人曰伯蔚居亂而矜豪乃爾豈其免乎後為東海王越所誅何機曽之孫也為鄒平令性矜傲責鄉里謝鯤等拜或誡之曰禮敬年爵以徳為主令鯤拜勢懼傷風俗機不以為慙謝奕為桓温安西司馬猶推布衣之好在温坐岸幘嘯詠無異常日温嘗曰我方外司馬王徽之字子猷為大司馬桓温叅軍蓬首散帶不綜府事又為車騎桓冲騎兵嘗從冲㳺值暴雨徽之因下馬排入車中謂曰公豈得獨擅一車王獻之為秘書丞尚新安公主嘗經吳郡聞顧辟疆有名園先不相識乗平肩輿徑入時辟疆方集賔友而獻之㳺歴既畢傍若無人辟疆勃然數之曰傲主人非禮也以貴驕士非道也失是二者不足齒之傖耳便驅出門獻之傲如也不以屑意謝琰字瑗度弱冠以貞幹稱羙風姿與從兄䕶軍淡雖比居不徃來宗中子弟惟與才令者數人相接後至㑹稽内史王恬導子也性傲誕不拘禮法謝萬嘗造恬既坐少頃恬便入内萬以為必厚待己殊有喜色恬乆之乃沐頭散髪而出據胡牀於庭中曬髪神氣傲邁竟無賔主之禮萬悵然而還後至散騎常侍謝萬為撫軍從事中即妻父王述為揚州刺史萬嘗衣白綸巾乗平肩輿徑至㕔事前謂述曰人言君侯癡君侯信自癡述曰非無此論但晚合耳宋張敷為祕書郎嘗在省直中書令傅亮貴宿接要聞其好學過候之敷卧不即起亮怪而去後敷為正員郎中書舎人狄當周﨣並管要務以敷同省名家欲詣之﨣曰彼若不相容便不如不往詎可輕往耶當曰吾等並以員外郎矣尚憂不得共坐敷先設二牀去壁三四尺二客就席酬接甚歡既而呼左右曰移我逺客﨣等失色而去其自摽遇如此王僧逹為中書令黄門侍郎路瓊之太后兄慶之孫也宅與僧逹門並嘗盛車服詣僧逹將獵已改服瓊之就坐僧逹了不與語謂曰身昔門下騶人路慶之者是君何親遂焚瓊之所坐牀太后怒泣涕於帝曰我尚在而人凌之我死後乞食矣帝曰瓊之年少無事詣王僧逹門見辱乃其宜耳僧逹貴公子豈可以此加罪乎太后又謂帝曰我終不與王僧逹俱生劉彦節為尚書令既貴士子自非三署不得上方榻時人以此少之王瞻字明逺一字叔鸞負氣傲俗好貶裁人物為王府叅軍嘗詣劉彦節直登榻曰君侯是公孫僕是公子引滿促膝唯餘二人彦節外迹雖酬之意甚不悦王錫為員外散騎歴清職中書郎太子左衛率江夏内史善自立遇太尉江夏王義恭當朝錫箕踞大坐殆無推敬阮佃夫為建城侯朝士貴賤莫不自結而矜傲無所降意入其室者唯吳郡張澹梁韋粲為左衛率兼東宫領直以舊恩任寄綢宻雖居職屢從容宿衛頗擅威名誕倨不為時軰所平右衛朱异嘗於酒席厲色謂粲曰卿何徳已作領軍面陳江溢字深源尚書令摠之子也溢頗有文辭性傲誕恃勢驕物雖近屬故友不免詆欺後魏崔浩為司徒始浩與冀州刺史頥滎陽太守模等年皆相次浩為長次模次頥三人别祖而模頥為親浩恃其家世魏晉公卿嘗侮模頥模謂人曰桃簡止可欺我何合輕我家周兒也浩小名桃簡頥小名周太武頗聞之故浩誅時二家獲免崔接字顯賔定州人容貌魁偉放邁自髙不拘常檢為中書博士樂陵内史雅為任城王澄所禮待及澄為定州刺史接了無民敬王忻然容下之張彛字慶賔襲祖爵平陸侯少而豪放出入殿廷歩眄髙上無所顧忌文明太后雅尚㳟謹因㑹次見其如此遂召集百僚督責之令其修悔而猶無悛改彛愛好知己輕忽下流非其意者視之蔑爾雖疹疾家庭而志氣彌亮後至征西將軍隋龎晃為右衛將軍性剛悍時廣平王雄當途用事勢傾朝廷晃毎陵侮之嘗於軍中卧見雄不起雄甚銜之復與髙熲有隙二人屢譛晃繇是宿衛十餘年官不得進崔儦清河人世為著姓儦每以讀書為務負恃才地忽畧世人大署其户曰不讀五千卷書者不得入此室後為員外散騎侍郎越國公楊素時方貴倖重儦門地為子𤣥縱娶其女為妻聘禮甚厚親迎之始公卿滿座素令騎迎儦儦故敝其衣冠騎驢而至素推令上座儦有輕素之色禮甚倨言又不遜素忿然拂衣而起竟罷座數日儦方來謝素待之如初唐王勃為虢州叅軍勃恃才傲物為僚友所疾張漪為中書令柬之之子也漪恃以父立功每見諸少長不以禮接待時議以為不能易荆楚之剽性焉裴諝初為河南叅軍通逹簡率不好苛禮令狐峘為吉州刺史㑹齊映除江西觀察使過吉州故事刺史始見觀察使皆戎服趨拜映雖嘗為宰相然少年後軰峘雖為屬郡固自挾所以過映者映至當迎謁頗怏怏以語其妻韋氏韋氏雖明有學解亦耻峘以刺史禮見映謂峘曰君自視何如人以白頭走小生前君不以此見映雖黜死我亦無憾峘曰諾映至峘入謁從容歩進不抹首屬戎噐映以為恨去至府奏峘舉前刺史過失鞫不得真無正事不宜臨州貶衢州别駕王仲舒為中書舎人初仲舒與楊憑穆質許孟容李鄘為友故時人稱楊穆許李之友仲舒以後進慕容而入性尚簡傲不能接下以此人多怨之崔元翰為禮部員外郎知制誥詔令温雅合於典謨然性大剛褊簡傲不能取容於時李白字太白山東人待詔翰林嘗醉令高力士脱靴繇是斥去乃浪迹江湖嘗月夜乗舟自采石逹金陵衣宫錦袍於舟中顧瞻嘯傲旁若無人鄭仁表太宗朝宰相肅孫也為起居郎仁表文筆尤稱俊㧞然恃才傲物人士薄之後唐陳乂為知制誥㣲有才術嘗自恃其能為恒山判官日人有造者垂帷深處罕見其面及居西掖而姿態愈倨位竟不至公卿葢噐度促狹者也不恭君者天也無所不恭一節以趨靡遑於待駕三命而俯以至於循牆所有怠棄國章虧損臣禮奉朝覲而不謹承祭祀而㒺祗踰越官儀抵冐邦禁下吏聼議又誰咎焉故書云其或不恭邦有常刑誠先王之典法也漢武陽侯蕭勝孝景中二年坐不齊酎為𨽻臣謂常侍祠而不齊髙苑侯耐信孝武建元元年坐出入屬車間免戸二千二百天子出行東列屬車而輙至於其間北平侯類建元五年坐臨諸侯喪後死祁侯繒它元光三年坐射擅罷免方大射而擅自罷去翕侯邯鄆元光四年坐行來不請長信免長信言太后所居請謁也衍侯翟不疑元朔元年坐挾詔書論酎為司寇詔書當奉持而挾以行故為罪也武安侯田括元朔三年坐衣襜褕入宮不敬免衣謂著之也襜褕直裾禪衣也襄城侯韓釋之元朔四年坐詐疾不從酎為𨽻臣芒侯耏申元朔六年坐向南宫主不敬免景帝女也重信侯擔元狩二年坐不使人為狄請免請音才姓反平州侯昭渉昩元狩五年坐行馳道中免邔嚴侯黄極忠元鼎元年坐掩摶奪公主馬髠為城旦建成侯拾元鼎二年坐使行人奉璧皮薦駕元年十月不㑹免以皮薦璧也時以十月為歲首有賀而不及㑹也山都侯王當元封元年坐蘭入甘泉上林免東方朔武帝時為大中大夫嘗醉入殿中小遺殿上劾不敬有詔免為庶人待詔官署置韋𤣥成宣帝時為太常嗣爵扶陽侯以列侯侍祀孝恵廟當辰入廟天雨淖淖泥也音女教反不駕駟馬而騎至廟下有司劾等軰數人皆削爵為關内侯博陽侯丙顯甘露元年坐酎宗廟騎至司馬門不敬奪爵一級為闗内侯魏劉勲與太祖有舊為廬江太守後為孫䇿所破自歸太祖封列侯勲自恃與太祖有宿日驕慢數犯法又誹謗遂免其官吳朱桓領青州牧詣建業治病後復還屯桓奉觴曰臣當逺去願一捋陛下鬚無所復恨權憑几前席桓進前捋鬚曰臣今日真可謂捋虎鬚也權大笑南齊張融武帝時為司徒從事中郎永明八年朝臣賀衆瑞融扶人拜起復有司所奏見原蔡約領驍騎將軍太子中庶子領屯騎校尉永明八年八月合朔約脱武冠解劍於省眠至下鼔不起為有司所奏贖論後魏莫題為大將軍及還京師嘗與李栗侍宴栗坐不敬獲罪題亦被黜為濟陽太守裴伯茂為廣平王賛文學孝靜天平二年因内宴伯茂申慢殿中尚書章武王景哲景哲遂侮啟稱伯茂棄其本列與監同行以梨擊案傍汚冠服禁庭之内令人㓗衣詔付所司後竟無坐隋楊素髙祖時為御史大夫其妻鄭氏性悍素忿之曰我若作天子卿定不堪為皇后鄭氏奏之繇是坐免唐韋纁為國子司業憲宗元和八年九月戊午重陽賜宰臣以下宴於曲江辛酉罸纁等一十四人各一月俸以其不赴曲江之宴也後唐龍敏為吏部侍郎末帝清泰二年五月壬寅監察使奏薦享太廟其月十九日尚書省受誓戒故事諸行事官質明至省候太尉其日行事官與攝太尉宰臣並先到敏攝司空後至雖及受誓戒其後太尉違禮詔罸一季俸料冦竊書稱草竊姦宄易謂慢藏誨盗葢夫窮斯濫而貪無厭者從事於斯矣觀其背去人紀靡率天常奪攘矯䖍俶擾顛越大則有伏莽之衆同惡以相濟小則競穿窬之巧自作於弗靖莫不鴟張其義狼恣其心擅操利兵争術小智依萑苻而多聚致蔓草之難除又豈止乎䑕竊狗偷探嚢胠篋而已哉自三尺㒺畏法令滋章五教云㣲民俗偷巧道行一失詭詬百端以身狥財見利㤀義始以㳺俠為事終以剽刼為姦敓􅔯於道塗充斥於閭里假詩言而破家負勇氣以凌物挾懐稇載何所不獲乃至觀取國寳不恭斯甚茍脱禁網諒亦天幸若乃狥名果敢以舒國難抱義感慨以救人患雖云小道亦賢哲之兼容也已叔仲帶魯大夫襄公薨于楚宫叔仲帶竊其拱璧拱璧公大璧以與御人納諸其懐而從取之繇是得罪得罪謂魯人薄之故子孫不得志於魯陽虎為魯季氏宰盗竊寳玉大弓是時季氏専魯國陽虎拘季孫季氏逐周公之後取其寳玉藏於其家陽虎拘季孫奪其寳玉孟氏與叔孫氏迭而食之俄而鋟其板以爪刻其饋斂板曰某月某日將殺我於蒲圃力能救我則於是於是時至乎日若時而出臨南者陽虎之出也御之為季氏御於其乗焉季孫謂臨南曰以季氏之世世有子言我季氏累世有女以為臣子可以不免我死乎以義責之臨南曰有力不足臣何敢不勉陽越者陽虎之從弟也為右為季孫車右實衛之諸陽之從者車數十乗至於孟衢孟氏衢四逹可以横去臨南投䇿而墜之䇿馬捶也見二家迭食之欲將季繇孟氏免之恐陽越不聼故詐投䇿欲使下車陽越下取䇿臨南駷馬捶馬銜走而繇乎孟氏陽虎從而射之矢著于莊門莊門孟氏所入門名言幾中季孫頼門閉故着門然而甲起於琴如甲公斂處父所帥也琴如地名二家知出期故於是時起兵弑不成却反舎于郊皆説然息説解舍然猶如或曰弑千乗之主時季氏邑至於千乗而不克舍此可乎嫌其近而無所依陽虎曰夫孺子得國而已得免專國家而已如丈夫何如猶奈也丈夫大人稱也俄而曰彼哉彼哉望見公斂處父師而曰彼哉彼哉两言之者亟遽意趣駕使疾駕既駕公斂處父帥師而至公斂處父孟氏叔孫氏將兵之將慬然後得免自是走之晉寳者何璋判白判半也半圭曰璋白藏天子青藏諸侯魯得郊天故錫以白不言璋言玉者起珪璧琮璜璋五玉盡亡之也傳獨言璋者所以郊事天尤重詩云奉璋峨峨髦士攸宜是也禮珪以朝璧以聘琮以發兵璜以發衆璋以徴召弓繡質質弣也言大者力千斤龜青純純緣也謂緣甲􅏋也千嵗之龜青髯明于吉凶易曰定天下之吉凶成天下之亹亹者莫善乎蓍龜經不言龜者以先知從寳省文謂之寳者世世寶用之辭此皆魯始封之錫不言取而言竊者正名也定公從季孫假馬孔子曰君之於臣有取無假而君臣之義立主書者定公失政權移陪臣拘其尊卿喪其寶玉無以合信天子交質諸侯當絶之不書拘季孫者舉五玉為重書大弓者使若都以國寳書微辭也田文封孟嘗君入秦秦昭王謀欲殺之孟嘗君使人抵昭王幸姬求解姬曰妾願得君狐白裘此時孟嘗有一狐白裘值千金天下無䨇入獻昭王無他裘孟嘗患之徧問客莫能對最下座為狗盗者曰臣能得乃夜為狗以入秦宫藏中取所獻狐白裘至以獻秦幸姬幸姬為言昭王釋孟嘗君漢彭越字仲昌邑人也嘗漁鉅野澤中為盗後封梁王謀反誅郭解河内人少時隂賊感慨臧命作姦剽攻剽刼也攻謂穿窬而盗也剽匹妙反休乃鑄錢掘塜不可勝數適有天幸窘急嘗得脱毎遇赦後漢檀建為瑕丘縣吏盗竊縣内令鍾離意屏人問狀建叩頭服罪不忍加刑遣令長休建父聞之為建設酒謂曰吾聞無道之君以刄殘人有道之君以義行誅子罪命也遂令建進藥而死張伯魯人鍾離意為魯相到官出私錢萬三千文付户曹孔訢修夫子車身入廟拭几席劔履使伯除堂下草土中得玉璧七枚伯懐其一以六枚白意意令主簿安置几前孔子教授堂下牀首有懸甕意召孔訢問此何甕也對曰夫子甕也背有丹書人勿敢發也意曰夫子聖人所以遺甕欲以懸示後賢因發之中得素書文曰後世修吾書董仲舒䕶吾車拭吾履發吾笥㑹稽鍾離意璧有七張伯藏其一意即召問伯果服焉吳胡玉錢塘人漢末為海賊取賈人財物岸上分之孫堅追斬一級晉戴若思廣陵人少好逰俠不拘操行遇陸機赴雒船裝甚盛遂與其徒掠之若思登岸據胡床指麾同旅皆得其宜機察見之知非常人升舫屋上遥謂之曰卿才氣如此乃復作刼邪若思感悟因流涕投劔就之機與言深嘉賞異遂與定交焉後至驃騎將軍為王敦所害賈苞為太廟吏光熈中盗太廟靈衣及劔伏誅後凉胡安據吕纂時盗發張駿墓見駿貌如生得珍珠簾琉璃榼白玉尊赤玉簫紫玉笛珊瑚鞭馬瑙鍾水陸竒珍不可勝紀纂誅安據黨五十餘家遣使弔祭駿並修繕其墓宋焦恭齊人破古塜得玉鎧太守崔道固檢得獻之乃執繫恭王宜興吳興人形狀短小而果勁有膽力少年時為刼不湏伴郡縣討逐圍繞數十里終莫能擒後為屯騎校尉為黄回所殺黄回拳㨗果勁勇力兼人在江西與諸楚子相結屢為刼盗後為鎮北將軍南兖州刺史為齊髙祖所誅梁陳伯之濟隂睢陵人㓜有膂力年十三四好著獺皮帶刺刀候伺鄰里稻熟偷刈之嘗為田主所見呵之云楚子莫動伯之謂田主曰君稻幸多一擔何苦田主將執之伯之因仗刀而進將刺之曰楚子定何如田主皆反走伯之徐擔稻而歸及年長在鍾離數為刼盗嘗授面覘人船船人斫之獲其左耳後為豫州刺史又為通直散騎常侍驍騎將軍大中大夫卒後魏穆崇代人少以竊盗為事劉庫仁為南部大人時國有良馬白騧駠庫仁盗之飬於窟室典馬牧奚蕇聞而馳往取馬庫仁以國甥恃寵慚而逆擊蕇蕇捽其髪落傷其一乳後為太尉宜都公薨房法夀小名馬頭清河繹幕人㓜孤少好射獵輕率勇果結諸羣小而為刼盗從叔元慶範鎮等坐法夀被州郡切責時月相繼宗族甚患之弱冠辟州主簿後以母老不復應州郡之命嘗盗殺猪牛以供其母後終於莊武侯平逺將軍北齊祖珽字孝徴性不覊放縱曽至膠東刺史司馬世雲家飲酒遂藏銅罍二面厨人請搜諸客果於珽懐中得之見者以為深耻後為神武中外府功曹神武宴僚屬於座失金叵羅竇太后令飲酒者皆脱㡌於珽髻上得之神武不之罪也隋麥鐡杖始興人陳大建中結聚為羣盗廣州刺史歐陽頠俘之以獻沒為官户配執御傘毎罷朝後行百餘里夜至南徐州踰城而入行光火刼盗旦還及時仍又執傘如此者十數度物主識之州以狀奏朝士見鐡杖毎旦常在不之信也後數告變尚書蔡徴曰此可騐耳於仗下時購以百金求人送詔書與南徐州刺史鐡杖出應募齎勅而往明旦及奏事帝曰信然為盗明矣惜其勇㨗誡而釋之後為右屯衛大將軍唐王君廓本太原人後徙家於井陘少孤貧無行以駔儈為業善行偷盗嘗所齎噐内有逆鬚制同魚笱纔容人頭於日晚時市人將散見鬻繒者君廓以竹噐自後籠其頭逆鬚為礙不可得脱乃奪繒而去物主不之識竟以獲免其詭譎多此類也張明進中黄門也大厯二年八月景午夜盗内庫黄金二百八十斤藥金二百五十兩擒之單超俊大厯初為少府監嘗嘯聚惡少以盗馬其盗也善變馬毛色雖馬主未能辨至是盗諫大夫裴臯馬三匹超俊家僮以告乃露謫超俊劔南西山効力納贓七千貫同盗馬奴三人並杖殺韋士元貞元四年四月與盧寜等四人白晝挾弓操劔於萬年縣常樂坊盗縣吏捕之士元等突殺吏歩相自延興門逸焉六月士元棄市居賊人豳王孫湛絞士元既死其黨盧寜梁劔等三人刼近城村廬射殺捕吏南居人多棄業投城徳宗乃發神䇿善弩騎與長安萬年縣官率人吏具噐械急捕之又射傷神䇿將及縣吏二十餘人以刃殺一人奪弩犯圍而逸又遣神䇿兵二百人助之居數日偷長梁劔以中矢死南山下得其屍送之盧寜等二十人竟失所在晉方太為泰州節度使太青州千乗人少𨽻本軍為小校嘗戍登州刼海客事洩刺史淳于晏匿之遇赦免周王繼宏為河南節度使繼宏冀州南宫人勇悍無頼為盗攻剽閭里冊府元龜卷九百三十
