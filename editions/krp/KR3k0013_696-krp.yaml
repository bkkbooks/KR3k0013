body:
  text: 冊府元龜卷六百九十六宋王欽若等撰牧守部修武備抑豪彊修武備夫備豫不虞古之善教思艱圖易政之善經乃有居牧伯之重總連城之寄屬冦攘之連結或𦍑戎之密邇以至俯逼強敵旁接叛壘而能發先見之慮設未然之防厚囷倉之蓄増池隍之固簡稽軍實申明師律訓練講閲之必至斥堠烽燧之必嚴峻誅賞之令治戰守之具觸類而長大為之防用能應變無窮遇戰必克叶干城之詠得庇民之術者焉古所謂物不素具則不可以應卒誠哉是言矣後漢第五種為髙密侯相時徐兖二州盜賊羣起髙密在二州之郊倫乃大儲粮稸勤厲吏士賊聞皆憚之桴皼不鳴流民歸者嵗至數千家郭伋為漁陽太守時匈奴數抄郡界邊境苦之伋整勒士馬設攻守之畧匈奴畏憚逺迹不敢復入塞民得安業後為并州牧伋知盧芳夙賊卒難以力制常嚴烽堠明購賞以結冦心芳將随昱遂謀脅芳降伋芳乃亡入匈奴崔實為五原太守是時胡虜連入雲中朔方殺畧吏民一嵗至九奔命實整厲士馬嚴烽堠虜不敢犯常為邊㝡樊凖為鉅鹿太守而趙魏之郊數為𦍑所鈔暴凖外禦冦虜内撫百姓郡境以安後轉河内太守時𦍑復屢入郡界凖輙將兵討逐修理塢壁威名大行任延為武威太守郡北當匈奴南接種𦍑民畏冦抄多廢田業延到選武畧之士千人明其賞罰令將雜種胡騎休屠黄石屯據要害其有警急逆擊追討虜常多殘傷絶不敢出魏劉馥為揚州刺史髙為城壘多積木石編作草苫數千萬枚益貯魚膏數千斛為戰守備建安十三年孫權率十萬衆攻圍合肥城百餘日時天連雨城欲摧於是以苫蓑覆之夜燃脂炤城外視賊所作而為備賊以破走揚州士民益追思之以為雖董安于之守晉陽不能過也賈逵為豫州刺史州南與吳接逵明斥堠繕甲兵為守賊之備賊不敢犯張既為涼州刺史與夏侯儒擊叛胡破之遂上疏請與儒治左城築鄣塞置烽堠邸閣以備胡西羌恐率衆二萬餘落降范粲為武威太守時戎夷頗侵疆塲粲明設防備敵不敢犯西城流通無烽燧之警吳吾彦為建平太守時王濬將伐吳造船於蜀彦覺之請増兵為備皓不從彦乃輙為鐵鎻横斷江路及師臨境緣江諸城皆望風降附或見攻而㧞唯彦堅守大衆攻之不能剋晉王濬為益州刺史武帝謀吳詔濬修舟艦濬乃作大船連舫方百二十歩受二千餘人以木為城起樓櫓開門四出其上皆得馳馬来往又畫鷁首恠獸於船首以懼江神舟楫之盛自古未有濬造船於蜀其木柹蔽江而下吳建平太守吳彦取流柹以呈孫皓曰晉必有攻吳之計宜増建平兵建平不下終不敢渡皓不從尋以謡言拜濬為龍驤將軍監梁益諸軍事劉敬宣為江州刺史課集軍粮搜召舟乗軍戎要用常有儲備故西征諸軍雖失利退據因之每即振復虞潭為吳國内史修滬瀆壘以防海抄百姓頼之梁廬陵王續為雍州刺史多聚馬仗畜養驍雄金帛内盈倉廪外實鄭紹叔為司州刺史創立城隍繕修兵器陳毛喜為永嘉内史喜至郡不受俸秩政尚清静民吏便之遇豐州刺史章大寳舉兵反郡與豐州相接而素無備禦喜乃修治城隍嚴飭器械又遣所部松陽令周磻領千兵援建安賊平授南安内史後魏韋彧為豫州刺史於城北置崇武舘以習武焉境内清肅江文遥為汝州刺史善於綏納甚得物情時雒州葛榮等相繼叛逆自幽燕以南悉皆淪䧟惟文遥介在羣賊之外孤城獨守鳩集荒餘且耕且戰百姓皆樂為用北齊封子繪為合州刺史到州未幾值蕭軌裴英起等江東敗没行臺司馬恭發厯陽徑還夀春疆塲大駭兼在州器械随軍畧盡城隍樓雉虧壊者多子繪乃修造城樓繕治軍器守禦所湏畢備人情漸安尋勅於舟營造船艦子繪為大使總監之陳武帝曽遣其䕶軍將軍徐度等率輕舟從柵口厯東關入巢湖徑襲合肥規燒船艦以夜一更潜冦城下子繪率將士格戰陳人奔退後周王思政為荆州刺史州境卑濕城塹多壊思政乃命都督藺小歡督工匠繕治之權景宣為南陽太守地隣敵境景宣修起城樓多備器械冦盗歛迹民得肄業宇文測行綏州事先每嵗河冰合後突厥即来冦掠測乃於要路數百處並多積柴仍逺斥堠知其動静唐顔真卿為平原太守時安祿山逆節頗著真卿以霖雨為託修城浚池隂科丁壯儲廪實乃陽㑹文士泛舟外池飲酒賦詩或讒於祿山密偵之以為書生不足虞無幾祿山反河朔盡䧟獨平原城守具備張鎰為濠州刺史屬李靈曜反於汴州鎰訓練鄉兵嚴守禦之備詔書褒異加侍御史緣淮鎮守李芃為陳州刺史時李靈曜反於汴州永平節度使李勉署芃兼亳州防禦使練逹軍事兵備甚肅關播為淮南節度陳少遊判官攝滁州刺史時李靈曜阻兵䟦扈於汴州少遊自領兵鎮淮上所在盜賊蜂起播調閲州兵令具守備嗣曺王臯為洪州刺史時梁崇義反乃集州吏令軍中曰嘗有功未伸者别為行有䇿謀及器能堪佐軍者别為行有禆將伊慎李伯潜劉旻皆自占臯察其詞氣驗其有功皆補大將擢王鍔委之中軍以馬彛許孟容為賓介繕甲兵具戰艦將軍二萬焉張建封為夀州刺史時李希烈䧟汴州遣使赴揚州未至為建封所得斬之希烈聞之大怒即署其大將杜少誠為偽僕射淮南節度令先平夀州然後取廣陵建封於霍丘堅柵嚴加守禦少誠竟不能進後為濠夀廬三州觀察使大修緝城池悉心綏撫逺近悦附韓滉為潤州刺史屬輿駕廵幸河汴騷然滉訓練士卒鍜礪戈甲稱為精勁王翃為東都留守凡開置二十餘屯復市勁筋長鐵簡練器械無何吳少誠反蔡州翃賦車籍甲僅得完繕而卒吕元膺為東都留守請募置山棚子弟以衛宫城東畿西南聮鄧號山山谷曠逺多麋鹿猛獸人習射獵不務耕稼春夏以其族黨遷徙無常俗呼為山棚前留守權徳輿知其可縻而用將請之㑹詔徴故元膺繼請焉李景畧為豐州刺史廪儲備器械具二嵗後軍聲雄冠北邊梁趙犨唐末為陳州刺史時黄巢犯宫闕犨謂將吏曰賊巢之虐徧於四方茍不為長安市人所誅則必驅殘黨以東下况與忠武久為仇讎凌我土疆勢必然也乃遣増垣墉濬溝洫實倉廪積薪芻凡四門之外兩舍之内民有資糧者悉令輓入郡中繕甲利兵劍矟弓弩矢石無不畢備又招召勁勇寘之麾下以仲弟昶為防遏都指揮使以季弟珝為親從都知兵馬使長子麓次子霖皆分領鋭兵黄巢在長安果為王師四面振束食盡人饑謀東奔之計先遣驍將孟楷擁徒萬人直入項城犨引兵擊之賊衆大潰斬獲畧盡生擒孟楷中和三年朝廷聞其功就加檢校兵部尚書王檀守密州刺史郡接淮戎舊無壁壘乃率丁夫修築羅城六旬而畢居民頼之鄧季筠為登州刺史下車稱理登州舊無羅城及季筠至郡率丁壯以築之民共安之抑豪彊孔子曰齊之以刑國僑曰紏之以猛是知剛嚴武徤以御其下者盖亦有不得已而然也若夫豪猾之民陵暴疲弱兼并之族雄張邑里撓敗法令侵害吏治復有倚恃強勢肆行姦宄條教不足以懲違徳義不能以宣化繇是聳疾邪之志以除惡為務靡顧權右専事威斷道徳齊禮我則未暇風行霜烈一致於法俾暴横者自禁柔愞者獲全其或深刻之過差勝任而媮快固與夫斷斷守道之吏異矣漢郅都景帝時為中郎將濟南瞷氏宗人三百餘家豪猾二千石莫能制於是帝拜都為濟南守至則誅瞷氏首惡餘皆股栗言懼之甚至於股脚戰栗也居嵗餘郡中不拾遺旁十餘郡守畏都如大府嚴延年武帝時為涿郡太守其治務在摧折豪強扶助貧弱貧弱雖䧟法曲文以出之其豪桀侵小民者以文納之飾文而入之為罪義縱為河内都尉至則族滅其豪穰氏之屬河内道不拾遺趙廣漢守京兆尹時新豐杜建為京兆掾䕶作平陵方上瀇蔵上也建素豪侠賔客為姦利廣漢聞之先風告不改於是收案致法致至也令至於罪罰之法中貴人豪長者為請無不至終無所聼中貴人居中朝而貴者也豪豪傑也長者名徳之人也宗族賔客謀欲簒取逆取曰簒廣漢盡知其計議主名起居起居謂居止之處及欲發之狀使吏告曰若計如此且并滅家令數吏將建棄市莫敢近者京師稱之遷潁川太守先是潁川豪傑大姓相與為婚姻吏宿朋黨廣漢患之厲使其中可用者受計受相訟牋記也擇其中可使者奬厲而使之出有案問既得罪名行法罰之廣漢故漏洩其語令相怨咎遣知其事由某人發故結怨咎也又教吏為缿筩缿若今盛錢蔵缾為小孔可入而不可出或缿或筩皆為此制而用受書令投於其中也及得投書削其主名而託以為豪傑大姓子弟所言其後強宗大族家家結為仇讎姦黨散落風俗大改吏民相告訐靣相斥曰訐廣漢得以為耳目盜賊以故不發發又輙得一切治理威名流聞孫寳為京兆尹以立秋日署侯文東部督郵入見勅曰今月鷹隼始擊當順天氣取姦惡以成嚴霜之誅掾部渠有其人乎渠豈也言掾所部内豈有其人乎文卬曰無其人不敢空受職卬謂仰頭而對也寳曰誰也文曰覇陵杜穉季寳曰其次除季穉之外更有誰也文曰豺狼當道不宜復問狐狸言不當釋大而取小也寳黙然穉季者大侠與衛尉淳于長大鴻臚蕭育等皆厚善寳前失車騎將軍與紅陽侯有郤失車騎將軍謂失王音意奏扈商事也自恐見危時淳于長方貴幸友寳寳亦欲附之始視事而長以穉季託寳故寳窮無以復應文文恠寳氣索索盡也知其有故因曰明府素著威名今不敢取穉季當且闔閤勿有所問闔閉也如此竟嵗吏民未敢誣明府也誣謗也即度穉季而譴它事過度不治罪衆口讙譁終身自堕堕毁也寳曰受教穉季耳目長聞知之杜門不通水火杜塞也不通水火謂雖鄰伍亦不徃来也穿舍後墻為小户但持鉏自治園因文所厚自陳如此具言恐懼改飾之狀也文曰我與穉季幸同土壤素無睚眦顧受將命分當相直言自顧念受天子命為郡將以職分故當相直遇也誠能自改嚴將不治前事即不更心但更門户適趨祻耳更改也穉季遂不敢犯法寳亦竟嵗無所譴何並為潁川太守郡人鍾元為尚書令領廷尉用事有權弟威為郡掾臧千金臧謂致罪之臧也並過辭鍾廷尉廷尉免冠為弟請一等之罪減死罪一等願蚤就髠鉗並曰罪在弟身與君律不在於太守元懼馳遣人呼弟時陽翟輕侠趙季李欵多畜賓客以氣力漁食閭里漁者謂侵奪取之若漁獵之為也至姦人婦女持吏長短縱横郡中聞並且至皆亡去並下車求勇猛曉文法吏且十人使文吏治三人獄武吏往捕之各有所部勅曰三人非負太守乃負王法不得不治鍾威所犯多在赦前驅使入函谷關勿令汙民間不入關乃收之趙李桀惡雖逺去當得其頭以謝百姓鍾威負其兄止雒陽負謂恃其權力也吏格殺之亦得趙李它郡持頭還並皆縣頭及其具獄於市郡中清静尹翁歸為東海太守大豪郯許仲孫郯縣之豪姓許名仲孫為姦猾亂吏治郡中苦之二千石欲捕者輙以力勢變詐自解終莫能制翁歸至論棄仲孫市一郡怖栗莫敢犯禁東海大治以髙第入守右扶風滿嵗為真緩於小弱急於豪強豪強有論罪輸掌畜官論罪決罪也扶風畜牧所在有苑師之屬故曰掌畜官也使斫莝莝斬也責以貟程不得取代貟數也計其人及日數為功程不中程輙笞督督責也極者至以鈇自剄而死鈇所莝刀也使其斫莝故因以莝刀自剄京師畏其威嚴扶風大治陳咸為南陽太守操持掾史操執也郡中長吏皆令閉門自歛不得踰法公移勅書曰公然移書以約勅也即各欲求索自快是一郡百太守也何得然哉下吏畏之豪強慹服令行禁止然亦以此見廢後漢蔡茂為廣漢太守有政績稱時隂氏賓客在郡界多犯吏禁茂輙紏察無所廻避董宣為北海相到官以大姓公孫丹為五官掾丹新造宅而卜工以為當有死者丹乃令其子殺道行人置屍舍内以塞其咎宣知即收丹父子殺之丹宗族親黨三十餘人操兵詣府稱寃號呌宣以丹前附王莾慮交通海賊乃悉繫劇獄劇縣之獄使門下書佐水丘岑盡殺之青州以其多濫奏宣考岑宣坐徴詣廷尉在獄晨夜諷誦無憂色及當出刑官屬具饌送之宣乃厲聲曰董宣平生未曽食人之食况死乎升車而去時同刑九人次當及宣光武馳使騶騎特原宣刑且令還獄遣使者詰宣多殺無辜宣具狀以對言水丘岑受臣㫖意罪不繇之願殺臣活岑使者以聞有詔左轉宣懐令令青州勿案岑罪第五倫為蜀郡太守蜀地肥饒人吏富實掾吏家資多至千萬皆鮮車怒馬以財貨自逹怒馬謂馬之肥壯其氣憤怒也倫悉簡其豐贍者遣還之更選孤貧志行之人以處曺任於是争賕抑絶文職修理羊陟為河南尹禁治豪右京師憚之史弼為平原相為政特挫抑豪強其小民有罪多所容貸張歆為淮陽王相時王新歸國賓客放縱干亂法禁歆將令尉入宫搜捕王白上歆坐左遷為汲令王暢為南陽太守前後二千石逼懼帝鄉貴戚多不稱職暢深疾之下車奮厲威猛其豪黨有釁穢者莫不紏發㑹赦事得散暢追恨之更為設法諸受臧二千萬以上不自首實者盡入財物若其隠伏使吏發屋伐樹堙井夷竈豪右大震任延為武威太守將兵長史田紺郡之大姓其子弟賓客為人暴害延收紺繫之父子賓客伏法者五六人紺少子尚乃聚㑹輕薄數百人自號將軍夜来攻郡延即發兵破之自是威行境内吏民累息滕延為濟北相時小黄門叚珪中常侍侯覧家在濟隂立田業近濟北界僕從賔客侵犯百姓刼掠行旅延一切收捕殺數十人陳尸路衢覧珪大怨以事上訴延坐多殺無辜徴詣廷尉免朱穆為兾州刺史州人有宦者三人為中常侍並以檄謁穆穆疾之辭不相見黄昌為陳相縣人彭氏舊豪縱造起大舍髙樓臨道昌每出行縣彭氏婦人輙升樓而觀昌不喜也亟勅付獄案殺之郡中震慄任宏為𢎞農太守考案郡中有事官官買爵位者雖位至二千石皆掠考收捕遂殺數十人威動鄰界苑康遷泰山太守是時山陽張儉殺常侍侯覧毋案其宗黨賔客或有迸匿泰山界者康既嘗疾閹官因此皆窮相收掩無得遺脱覧大怨之誣康與兖州刺史第五種及都尉壺嘉詐上賊降徴康詣廷尉獄減死罪一等徙日南潁隂人及太山羊陟等詣闕為訟乃原還本郡李固為荆州刺史上奏南陽太守髙賜等贓穢賜等懼罪遂共重賂大將軍梁冀冀為千里移檄言移一日行千里救之急也而固持之愈急冀遂令徙固為泰山太守李爕為河南尹先是潁川甄邵謟附梁冀為鄴令有同嵗生得罪於冀亡奔邵邵偽納而隂以告冀冀即捕殺之邵當遷為郡守㑹母亡邵且埋屍於馬屋先受封然後發䘮邵還至雒陽爕行途遇之使卒投車於溝中笞捶亂下大署帛於其背曰謟貴賣友貪官埋母乃具表其狀邵遂廢錮終身杜密厯代郡泰山太守北海相其宦官子弟為令長有姦惡者輙捕案之第五種為兖州刺史中常侍單超兄子匡為濟隂太守負勢貪放種欲收舉未知所使㑹聞從事衛羽素抗厲乃召羽具告之謂曰聞公不畏強禦今欲相委以重事若何對曰願庶幾於一割以鈆刀論羽出遂馳至定陶閉門收匡賓客親吏四十餘人六七日中紏發其贓五六十萬種即奏匡並以劾超超窘迫遣刺客刺羽羽覺其姦乃收繫客具得情狀州内震慄朝廷嗟嘆之荀昱為沛相弟曇為廣陵太守兄弟皆正身疾惡志除閹官其支黨賓客有在二郡者纎罪必誅昱後共大將軍竇武謀誅中官與李膺俱死曇亦禁錮終身魏倉慈為燉煌太守郡在西陲以䘮亂隔絶曠無太守二十嵗大姓雄張遂以為俗前太守尹奉等循故而已無所改革慈到抑挫權右撫恤貧羸甚得其理舊大族田地有餘而小民無立錐之土慈皆随口割賦稍稍使畢其夲直吳鄭冑為建安太守時校事吕壹賓客於郡犯法胄收付獄考竟壹懐恨後密譖冑大帝大怒召胄還潘濬陳表並為請得釋太常潘濬偏將軍陳表晉劉裔為豫章太守郡人莫鴻南土豪族因亂殺夲縣令横恣無道百姓患之裔至誅鴻及諸豪右界内肅然宋蔡興宗為㑹稽太守郡多豪右不遵王憲又幸臣近習叅半宫省封畧山湖妨民害治興宗皆以法䋲之㑹稽全實民物殷阜王公妃主邸舍相望所在撓亂大為民患子息滋長督責無窮興宗悉啓罷省又陳原諸逋負解遣雜役並見從南齊顧憲之為東中郎長史行㑹稽郡事山隂人吕文度有寵於武帝於餘姚立邸頗縱横憲之至郡即表除之文度後還葬母郡縣争赴弔憲之不與相聞文度深恨之卒不能傷也梁謝覧為吳興太守中書舍人黄睦之家居烏程子弟専横前太守皆折節事之覧未到郡睦之子弟来迎覧覽逐去其船杖吏為通者自是陸之家杜門不出不敢與公私關通何逺為東陽太守疾強富如仇讐視貧細如子弟特為豪右所畏憚後魏趙郡王謐弟譚自羽林監出為髙陽太守為政嚴斷豪右畏之房士逹為平原太守抑推豪強境内肅然劉藻為秦州刺史秦人恃險率多麄暴或拒課輸或害長吏藻開示恩信誅戮豪强羗氐憚之守宰於是始得居其舊元仲景為河南尹奉法無私時吏部尚書樊子鵠部下縱横又為盜竊仲景密加收捕悉獲之咸即行決於是豪貴寒心北齊裴讓之為清河太守郡有二豪吏田轉貴孫舍興久吏姦猾多有侵削於是遂脅人取財計贓依律不至死讓之以其亂法殺之後周栁慶魏末孝武帝時為雍州别駕廣陵王元欣魏之懿親其甥孟氏屢為凶横或有告其盜牛慶推捕得實趣令就禁孟氏殊無懼容乃謂慶曰今若加以桎梏後復何以脱之欣亦遣使辨其無罪孟氏繇此益驕慶於是大集僚吏盛言孟氏依倚權戚侵虐之狀言畢便令笞殺之此後貴戚歛手不敢侵暴韓褒為都督西涼州刺史羌胡之俗輕貧弱尚豪富豪富之家侵漁小民同於僕𨽻故貧者日削豪者益富褒乃悉募貧民以充兵士優復其家蠲免徭賦又調富人財物以賑給之每西域商貨至又先盡貧乏者市之於是貧富漸均户口殷實竇熾為原州刺史抑挫豪右申理幽滯泉企為東雍州刺史部民楊年皮太保椿之從弟恃託椿勢侵害百姓守宰多被其凌侮皆畏而不敢聞企收而治之將加極法於是楊氏漸懼闔宗詣闕請恩自此豪右屏迹無敢犯者隋庫狄士文為雍州長史士文謂人曰我向法深不能窺候要貴必死此官矣及下車執法嚴正不避貴戚賓客莫敢至門人多怨望唐魏元忠則天長安中為并州副元帥時奉宸令張易之甞縱其家奴凌暴百姓元忠笞殺之權豪莫不敬憚路嗣恭代宗大厯中為江南西道都團練觀察使在官恭恪善理財賦賈明觀者事北軍都虞候劉希暹及魚朝恩誅希暹從坐明觀積惡犯衆怒時宰相元載受賂遣江南効力魏少遊承載意茍容之及嗣恭代少遊即日杖殺識者稱之鄭叔則徳宗貞元初為京兆尹奏射生神䇿及六軍將士准三月二十一日勅如有關府縣湏其辨對者先具奏聞然後移牒夲軍不得懸有追捕伏以浩穰之地姦慝不常小失提防恐難懲肅其婚田常務即請准勅處分其盜賊鬭毆及姦偽等若待奏報恐失罪人請以時追捕具狀申奏從之許孟容憲宗元和四年為京兆尹神䇿軍吏李昱假貸長安富人錢八百貫滿三嵗不償孟容遣吏收捕械繫尅日命還之曰不及期當死自興元以後禁軍有功又中貴人尤有恩渥者方得䕶軍故軍士益横府縣不能制孟容剛正不懼以法䋲之一軍盡驚寃訴於帝帝命中使宣㫖令送本軍孟容繫之不遣中使再至乃執奏曰臣誠知不奉詔當誅然臣職司輦轂合為陛下彈抑豪強錢未盡輸昱不可得帝以其守正許之自此豪右歛迹威望大震王播元和五年代許孟容為京兆尹時禁軍諸鎮布列畿内軍人出入屬鞬佩劍往往盜發難以擒姦播奏請畿内軍鎮將卒出入不得持戎具諸王駙馬權豪之家不得於畿内試鷹犬畎獵之具詔從之於是姦豪彌息劉栖楚敬宗寳厯中為京兆尹摧抑豪右甚有鈎距時人比之西漢趙廣漢馮宿為河南尹雒苑使姚文夀縱部下侵欺百姓吏不敢捕一日遇大會常所捕者傲睨於文夀之側宿知而掩之杖死王起鎮蒲州有豪民怙西軍之勢者立擒而鞭之一境獲濟韋長文宗太和末為京兆尹奏准勅天下州府所犯罪除情狀巨蠧者其他過誤及尋常公事違犯不得鞭背者伏以京師浩穰姦豪所聚終日懲罰牴犯猶多小有寛容即難禁戢若恭守勅㫖則無以肅清若臨事用刑則有違詔命伏望許依前據輕重處置從之薛元賞開成初為京兆尹奏京城豪猾素難禁戢自去冬後益恣兇狂假託軍司刼掠坊市伏望自去年十一月後府縣所繇及坊市百姓投名諸軍諸使諸司悉令解還府縣兾得畿内寕止輦下清肅許之栁仲郢武宗㑹昌中為京兆尹時紇于泉訴表甥劉翊毆母翊為禁軍小校仲郢不候奏下杖殺之王龜宣宗大中中為同州防禦使同州素稱難理春夏稍有水旱公賦不齊以妄訴者得計龜下車之後春雨霑洽夏復訴之乃分幹吏䋲其強者蠲其貧者有牙將白約者兇戾狡譎前後長吏皆為姑息龜知之一日有軍士揚言云月給虧損承前必撻其主吏遂令擒揚言者於其理所詰之咸曰白約所教也遂遣判官韋嶽鞫而得情杖殺之有為黨者悉配之於外繇是兇豪者肅然革靣感其威而且惠冊府元龜卷六百九十六
