body:
  text: 册府元龜卷七百十宋王欽若等撰宫臣部輔導講習輔導三王之教世子也建師保之職喻之徳而歸諸道漢氏之分王子弟亦為選置傅相故儲闈以至於戚藩莫不資賢良之士申輔導之義然後成温文之徳著信厚之質者焉乃有藉其素望以定大計極其誠心以安宗社陳禮義而救其失援法度而窒其邪周旋以盡規切磋以縫闕以至形於筆述表乎箴諷皆所以罄惓惓之衷勵蹇蹇之節盖夫朋友著忠告之義官師有相規之訓况乎委質事人豈不念納忠而成美哉漢東園公與綺里季夏黄公甪里先生四人惠帝為太子時髙帝欲廢太子立趙王如意吕后用張良計令建成侯吕澤奉太子卑辭迎四人至客建成侯所髙帝十一年黥布反髙祖疾欲使太子往擊之四人相謂曰凡來者將以存太子太子將兵事危矣廼説建成侯請吕后乗間言諸將皆陛下故等夷廼令太子將此屬莫肯為用於是髙祖自將而東以良行太子少傅事十二年髙祖破布歸疾益甚愈欲易太子良諫不聽因疾不視事叔孫太傅稱説引古以死争太子髙祖陽許之猶欲易之及宴置酒太子侍四人者從太子年皆八十有餘鬚眉皓白衣冠甚偉所以謂之四皓髙祖怪問曰何為者四人皆對各言其姓名上廼驚曰吾求公避逃我今公何自從吾兒㳺乎四人曰陛下輕士善罵臣等義不辱故恐而亡匿今聞太子仁孝恭敬愛士天下莫不延頸願為太子死者故臣等来上曰煩公幸卒調䕶太子調謂和平之䕶謂保之四人為夀已畢趨去髙祖目送之以目瞻之訖而出也召戚夫人指視曰我欲易之彼四人為之輔羽翼已成難動矣吕氏真迺主矣廼汝也叔孫通為太子太傅髙帝欲以趙王如意易太子通諫曰昔者晉獻公以驪姬故廢太子立奚齊晉國亂者數十年為天下笑秦以不早定扶蘇胡亥詐立自使滅祀此陛下所親見今太子仁孝天下皆聞之吕后與陛下攻苦食啖啖當作淡淡謂無味之食言共攻擊勤苦之事而食無味之食其可背哉陛下必欲廢適而立少適讀曰嫡臣願先伏誅以頸血汚地髙帝曰公罷矣吾特戲耳特且也通曰太子天下本本壹揺天下震動奈何以天下戲髙帝曰吾聽公淮南相史失姓名孝景三年吴楚七國反吴使者至淮南王安欲發兵應之其相曰王必欲應吴臣願為將王廼屬之謂以兵委之也相以將兵嬰城守不聽王而為漢漢亦使曲城侯將兵救淮南曲城侯蠱達之子也名㨗淮南以故得完董仲舒為江都易王相易王帝兄素驕好勇仲舒以禮誼規正王敬重焉史丹為駙馬都尉䕶太子家時孝成為太子喜酒樂燕元帝不以為能而定陶恭王有材藝母傅昭儀又愛幸帝以故嘗有意欲以恭王為嗣賴丹䕶太子家輔助有力帝亦以先帝尤愛太子故得無廢後漢公沙穆為繒相時繒侯敞東海恭王之後也所為多不法廢嫡立庶傲狠放恣穆到官謁曰臣始除之日京師咸謂臣曰繒有惡侯以弔小相明侯何因得此醜聲之甚也幸承先人之支體傳茅土之重不戰戰兢兢而違越法度故朝廷使臣為輔願改往修来自求多福乃上沒敞所侵官民田地廢其庶子還立嫡嗣其蒼頭兒客犯法皆收考之因苦辭諫敞敞涕泣為謝多從其所規何敞為濟南王康太傅康尊貴驕甚敞至國輔康以道義數引法度諫正之康敬禮焉程堅為趙王乾傅先是乾居父䘮私聘小妻又白衣出司馬門坐削五縣及堅為傅輔以禮義乾改悔前過堅列上復所削縣魏吳質字季重以才學通博為世子及諸侯所禮為元城令太祖嘗出征世子及臨淄侯植並送路側植稱述功徳發言有章左右屬目太祖亦悦焉世子悵然自失質耳曰王當行流涕可也及辭世子泣而拜太祖及左右咸歔欷是皆以植辭多華而誠心不及也賈詡為大中大夫時文帝為五官將而臨淄侯植才名方盛各有黨與有奪宗之議帝使人問詡自固之術詡曰願將軍恢崇徳度躬素士之業朝夕孜孜不違子道如此而已帝從之深自砥礪髙堂隆為歴城侯徽相遭太祖䘮不哀及㳺獵馳騁隆以義正諫甚得輔導之節蜀霍弋為太子中庶子太子璿好騎射出入無度弋援引古義盡言規諫甚得切磋之體晉安平王孚初為魏國太子中庶子文帝初聞太祖薨號哭過甚孚諫曰大行晏駕天下恃殿下為命當上為宗廟下為萬國奈何效匹夫之孝乎太子良乆乃止曰卿言是也嵇喜為齊王攸司馬攸居文帝䘮哀毁過禮左右以稻米乾飯雜理中丸進之攸泣而不受喜諫曰毁不滅性聖人之教且大王地即宻親任惟元輔匹夫猶惜其命以為祖宗况荷天下之大業負帝室之重任而可盡無極之哀與顏閔争孝不可令賢人笑愚人幸也喜躬自進食攸不得已為之强飯喜退攸謂左右曰嵇司馬將令我不忘居䘮之節得存區區之身耳丁綏為髙宻王泰司空祭酒楚王瑋之被收泰嚴兵將救之綏諫曰公為宰相不可輕動且夜中倉卒宜遣人叅審定問泰從之王修為東平王楙長史惠帝北征以楙都督徐州率衆赴鄴湯隂之役東海王越奔于下邳楙不納越乃還國帝既西幸越總兵謀迎大駕楙甚懼修説曰東海宗室重望今將興義公宜舉徐州以授之此克讓之羙也楙從之卞壼為明帝東中郎長史又為世子師壼前後居師佐之任盡裨輔之節一府貴而憚焉溫嶠為太子中庶子數陳規諷又獻侍臣箴甚有𢎞益嶠又與阮放等共勸太子㳺談老荘不教以經史太子甚敬之華廙為太子少傅動遵禮典得輔導之義梁江革為武陵王長史王憚之雅相欽重每至侍宴言論必以詩書王因此躭學好文典籖沈熾文以王所製詩呈髙祖髙祖謂僕射徐勉曰江革果稱職乃除都官尚書後魏㳺雅為太子少傅時恭宗總百揆監國雅上䟽曰殿下親覽百揆經營内外昧旦而興諮詢國老臣職忝凝承司是獻替漢武時始唘河右四郡議諸疑罪而擿徙之十數年後邊郡充實並修農戍孝宣因之以服北方此近世之事也帝王之於罪人非怒而誅之欲其從善而懲惡擿徙之苦其懲亦深自非大逆正刑皆可從徙雖舉家投逺忻喜赴路力役終事不敢言苦且逺流分離心或思善如此姦邪可息邉陲足備恭宗善其言然未之行楊昱為詹事丞于時孝明在懐抱之中至於出入左右乳母而已不令宫寮聞知昱諫曰陛下不以臣等凡淺備位宫臣太子動止宜令翼從然自此以来輕爾出入進無二傅輔導之羙退闕羣寮陪侍之式非所謂示民儀軌著君臣之義陛下若召太子必降手詔令臣下咸知為後世法於是詔曰自今已後若非朕手敕勿令兒輒出宫臣在直者從至萬嵗門程駿為任城王雲郎中令進箴於王王納而嘉焉裴瑗為汝南王悦郎中令悅散費無常每王俸初入一日之中分贈極意瑗每随例常辭多受少伺悅虚竭還来奉貢恱雖性情不常然亦相賞愛宗欽初仕沮渠蒙遜為世子洗馬欽上東宫侍臣箴北齊邢峙為國子助教授皇太子經厨宰進太子食有菜曰邪蒿峙命去之曰此菜有不正之名非殿下所宜食文襄聞而嘉之賜以被褥縑纊拜國子博士王晞為常山王友時文宣昏亂王以切諫為文宣所撻王從容謂晞曰主上起居不常卿耳目所具吾豈可以前逢一怒遂爾結舌卿宜為撰諫草吾當伺便極諫晞遂條十餘事以呈切諫王曰今朝廷乃爾欲學介子匹夫輕一朝之命狂藥令人不自覺刀箭豈復識親疎一旦禍出理外將奈殿下家業何奈皇太后何乞且將順日慎一日王歔欷不自勝曰乃至是乎明日見晞曰吾長夜九思今便息意便命火對晞焚之後周伊婁穆初為衛公直長史武帝建徳初授荆州復以穆為總管府長史穆頻貳戚藩甚得裨賛之譽蕭圓肅建徳中為太子少傅以任當師傅調䕶是職乃作少傅箴太子見而悦之致書勞問鄭譯為太子宫尹時太子多失徳内史中大夫烏丸軌每勸帝廢太子而立秦王由是太子常不自安其後詔太子西征吐谷渾太子隂乃謂譯曰秦王上愛子也烏丸軌上信臣也今吾此行得無扶蘇之事乎譯曰願殿下勉著仁孝無失子道而已勿為他慮太子然之隋裴政為太子勇左庶子多所規正見稱純慤東宫凡有大事皆以委之唐孔頴達為右庶子皇太子承乾始自㓜小太宗令頴達專侍讀書頴逹性真正每讀書至可規誡必反覆引諭然以早居侍奉意頗狎之雖心有不平而免於憎忿時左庶子于志寧又受詔輔導承乾志寧正色直道多所補益撰諫苑二十卷以進承乾太宗並嘉之二人各賜帛百疋黄金一斤以厲承乾之意仍遷志寧為詹事王珪為禮部尚書兼魏王師王問珪以忠孝珪答曰陛下王之君也事君思盡忠陛下王之父也事父思盡孝忠孝之道可以立身可以成名當年可以享天祐餘芳可以垂後葉王曰忠孝之道已聞教矣願聞所習珪答曰漢東平王蒼云為善最樂太宗謂侍臣曰古来帝子生於宫闥及其成人無不驕逸是以傾覆相踵少能自濟我今嚴教子弟欲令皆得安全王珪我乆驅使是所諳悉以其意存忠孝選為子師爾冝語泰汝之待珪如事我也可以無過泰每為之先拜珪亦以師道自居物議善之蘇幹少以明經累授徐王府記室叅軍王好畋獵幹每諫止之劉憲睿宗景雲初為太子詹事𤣥宗在東宫留意經籍憲因上啓曰自古及今皆重于學至于光輝盛徳𤼵揚令問安靜身心保寧家國無以加焉殿下居副君之位有絶人之才豈假尋章摘句盖止畧知大意用功甚少為利極多伏願克成羙志無棄暇日上以慰至尊之心下以答庶寮之望侍讀禇無量經明行修耆年宿望時賜召問以察其言幸甚褚無量為國子司業景雲初𤣥宗在春宫無量兼皇太子侍讀嘗撰翼善記以進之太子降書嘉勞賚絹四十疋講習夫先王之教子也建師保之職申誨諭之道莫不先之以禮樂遵之以典法使其近正人而聞正言達古義而式古訓化與心㑹習與性成然後徳智長而治道得矣漢氏而下學術尤盛名儒碩生乗時間出乃有奉持素業入叅講議敷暢經㫖進對宴説以師道而自處蒙體貌之殊等博約浸潤以敦乎藝文切磋琢磨以成乎徳範自非誦説有法進退可度秉踐言之善行富博古之多聞者疇以充是選哉漢瑕丘江公受穀梁春秋及詩於魯申公武帝時江公與董仲舒並為博士仲舒通五經能持論善屬文江公訥於口上使與仲舒議不如仲舒而丞相公孫𢎞本為公羊學比輯其議卒用董生於是帝因尊公羊家詔太子受公羊春秋由是公羊大興太子既通復私聞穀梁而善之歐陽地餘其先歐陽生事伏生授倪寛寛授歐陽生子世世相傳地餘宣帝時為太子中庶子授太子蕭望之為太傅以論語禮傳授皇太子張禹元帝初元中立皇太子而博士鄭寛中以尚書授太子薦言禹善論語令禹授太子論語由是遷光禄大夫孔霸事太傅夏侯勝傳尚書之學為大中大夫授太子鄭寛中有雋材事小夏侯建傳尚書為博士授太子後漢桓榮門徒嘗四百餘人何湯為髙第明帝始立為皇太子選求明經乃擢湯為虎賁中郎將以尚書授太子光武從容問湯本師為誰湯對曰事沛國桓榮帝即召榮令説尚書甚善之拜為議郎劉昆受施氏易於戴賔光武時代杜林為光禄勲乃令入授皇太子及諸王小侯五十餘人包咸習論語舉孝㢘為郎中建武中入授皇太子論語鍾興習嚴氏春秋明帝時為左中郎將詔令定春秋章句去其復音複重以授皇太子又使宗室諸侯從興受章句召馴習韓詩章帝時為左中郎將入授諸王魏應習魯詩建初四年拜五官中郎將詔入授千乗王伉蜀尹黙為僕射以左氏傳授太子太子後主也吴張休字叔嗣大帝以子登為太子欲登讀漢書習知近代之事以張昭有師法重煩勞之乃令休從昭受請還以授登休弱冠與諸葛恪顧譚等俱為太子登僚友以漢書授登晉徐邈為中書侍郎武帝時皇太子尚㓜帝甚鍾心文武之選皆一時之俊以邈為前衛率領本郡大中正授太子經帝謂邈曰雖未敕以師禮相待然不以博士不相遇也魏晉以來使人教授號為博士不復尊以為師故帝有云阮放字思度為太子中舎人遷庶子時雖戎車屢駕而放侍太子常説老荘不及軍國明帝甚友愛之鄧攸以儒學嘗授皇太子詩庾亮為中書郎領著作侍講東宫其所論釋多見稱述宋何承天為率更令領國子博士皇太子講孝經承天與中庶子顔延之同為執經蔡茂之侍廬陵王義真讀書官至彭城王義康驃騎從事中郎南齊伏曼容字公儀武帝永明初為太子率更令侍皇太子講王儉為少傅文惠太子於崇政殿講孝經儉令摘句太僕周顒撰為義疏梁何佟之初仕齊明帝建武中為鎮北記室㕘軍侍皇太子講張譏為士林館學士簡文在東宫每有降集必使召之及侯景冦逆於圍城之中猶侍哀太子武徳後殿講老莊庾黔婁為尚書金部郎遷中軍表記室叅軍東宫建以本官侍皇太子講甚見知重詔與太子中庶子殷均中舎人到洽國子博士明山賔等逓日為太子講五經義賀革為湘東王府諮議參軍顧越聰慧有口辯説毛氏詩傍通異議解褐揚州議曹吏兼太子左衛率丞越於義理精妙尤善持論與會稽賀文發俱為梁南平王偉所重引為賔客尋補五經博士遷國子博士世祖即位除始興王諮議叅軍侍東宫講讀世祖以敦篤厚遇之許懋年十四入大學領師説尤曉故事文惠太子聞而召之侍讀于崇明殿僕射江祏重之號為經史笥陳沈文阿文帝時為通直散騎常侍兼國子博士領羽林監仍令於東宫講孝經論語沈徳威篤學無倦遂治經業天嘉元年徴出都侍太子講禮傳王元規為鄱陽王記室叅軍領國子助教後主在東宫引為學士親授禮記左傳䘮服等義賞賜優厚國子祭酒新安王伯固嘗因入宫適㑹元規將講乃啟請執經時論以為榮姚察入隋為員外散騎常侍又敕侍晉王講讀煬帝初在東宫數被召見訪以史籍徐孝克初為散騎常侍陳亡入隋授國子博士後侍東宫講禮傳後魏梁越為禮經博士太祖以其謹厚舉動可則拜上大夫會授諸皇子經書谷洪少受學中書太武令洪入授太子經位至尚書李郁字永穆為廣平王懐友懷深相禮遇時學士徐遵明教授山東生徒甚盛懐徴遵明在館令郁問其五經義例十餘條遵明所答數條而已劉芳為中書侍郎與邢産入授皇太子經遷太子庶子從駕洛陽自在路及旋京師嘗侍坐講讀髙允為秦王翰傅後敕以經授恭宗甚見禮待孫惠蔚自宣武在東宫為博士侍讀及世宗即位之後常在左右敷訓經典自冗從僕射遷秘書丞董徴為四門小學博士後宣武詔徴入琁華宫令孫惠蔚問以六經仍詔徴教授京兆清河廣平汝南四王盧辨孝武時為太子少傅太子及諸王等皆行束脩之禮受業於辨北齊馬敬徳世祖時為後主擇師傅為侍講後主既不好學敬徳侍講甚疎時以春秋入授後周樂遜為太尉李弼府諮議叅軍太祖召遜教授諸子在館六年與諸儒分經授業遜講孝經論語毛詩及服䖍所註春秋左氏傳辛慶之以經明行脩與盧誕等斛斯徴為司樂中大夫髙祖以徴治經有師法詔令教授皇太子宣帝時為魯公與諸皇子等咸服青衿行束脩之禮受業於徴仍並呼徴為夫子儒者榮之隋元善洛陽人通涉五經尤明左氏傳初仕後周武帝甚禮之以為太子宫尹賜爵江陽縣公每執經以授太子楊汪字元度勤學專精左氏傳通三禮初仕周冀王侍讀王甚重之每曰楊侍讀徳業優深孤之穆生也唐孔頴達武徳中為秦府文學館學士以經授中山王承乾陸徳明為秦府文學館學士命中山王承乾從其受業馬嘉連武徳中為崇賢館學士與洗馬秦暐等侍講殿中恩禮甚渥王元感濮州鄄城人也少舉明經累補博城縣丞兖州都督紀王慎深禮之命其子東平王續從元感受學蕭瑀為太子太保貞觀十七年十一月甲辰誕皇太孫太宗幸東宫謂皇太子曰爾國之儲貳府藏是同金玉綺羅不足為賜但先聖典籍可為鏡誡耳因賜尚書毛詩孝經各一部瑀跪而言曰臣道徳才術無一可稱徒以犬馬之年謬當求舊之舉擢其朽質以保儲皇塵露之資實慙無效五經義訓臣頗聞之今所賜書請陳其要太宗許之瑀乃先説孝經次述尚書末叙毛詩咸舉其要㫖申明義趣可為深誡者皆委曲言之太宗大悦以為保傅得人髙智周髙宗時為蘭臺大夫時孝敬在東宫智周與司文郎中賀凱司經大夫王真儒等俱以儒學受詔為侍讀吳文瓘為道士以儒學善教誘童孺大歴中代宗召入宫太子及諸王嘗受經藝王起為皇太子侍讀文宗開成二年正月詔起及陳夷行再入長生院對皇太子講讀劉仲武橋庶十日對諸王講讀二月詔起夷行三日入長生院對皇太子講讀仲武庶八日入内見諸王授書三月詔起夷行五日一入長生院對太子講讀仲武間日入對諸王授經四月甲午朔皇太子於長生殿對起夷行諸王對仲武竇宗直為秘書少監開成二年七月以宗直為太子侍讀三年七月詔宗直及周敬復令每遇雙日入對皇太子九月又詔宗直敬復依前隔日入少陽院册府元龜卷七百十
