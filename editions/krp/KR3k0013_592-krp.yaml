body:
  text: 册府元龜卷五百九十二宋王欽若等撰掌禮部奏議第二十唐王起為兵部尚書元皇太子侍讀兼判太常卿事開成二年二月太常博士丘濡奏祠祭圭玉請依禮文詔令有司詳定起等議曰伏以邦國之禮祀為大事圭璧之儀經有前規臣等謹案周禮天地四方以蒼璧禮天黃琮禮地青圭禮東方赤璋禮南方白琥禮西方𤣥璜禮北方又云四圭有邸以祀天兩圭有邸以祀地圭璧以祀日月星辰凡此九器皆禮神之玉也又云以禋祀昊天上帝鄭𤣥注云禋之言煙也或有玉幣燔燎而升煙所以報陽今與開元禮儀同此則焚玉之驗也又周禮天府掌國之玉鎮大寶器若大祭既事而藏之此則收玉之證也所以梁朝崔靈恩三禮義云凡祭天神各有二玉一以禮神一則燔之禮神者訖事却收事神者與牲俱燎則靈恩之義合於禮經今國家郊天報地祀神之玉嘗用守經據古禮神之玉則無臣等請詔下有司精求羙玉創造蒼璧等九器祭訖具而藏之其餘燎玉請依常制所兾國禮可久之文守而不失周官已墜之典舉而更新制可三年二月起與太常少卿裴泰章太常少卿兼權勾當國子司業楊敬之太常博士崔立等狀奏准今月十日堂帖天寶初置七太子廟異室同堂國朝故事足以師法今欲聞奏以懐懿太子神主祔惠昭及悼懐太子廟不虧情禮又甚便宜送太常寺三卿與禮官同商量議狀者伏以三代已降廟制不同光武為總立一堂羣主異室親盡廟毁昭穆逓遷此蓋祖宗之廟也然則太子廟出於近或散在他處别置一室或尊卑序列共立一堂伏准國初太子廟散在諸方至天寶六載赦文章懐節愍惠宣等太子宜與隐太子列次同為一廟應縁祭事並合官給號為七太子廟又准大歴三年三月以榮王天寶中追贈静恭太子神主未祔詔祔七太子廟加一室今懐懿太子為姪以姪祔叔享獻得宜請於惠昭太子廟添置一室擇日升祔從之四年四月又奏讓皇帝廟去月二十四日詔下太常寺委三卿及博士同詳議聞奏者臣等伏以讓皇帝追尊位號恩出一時别立廟祠不渉正統既非昭穆禘祫所及無子孫饗獻之儀親盡則踈歳久當革杜鴻漸所議禘祫之月時一祭者蓋以時近恩深未可頓忘故也今睿宗𤣥宗既已祧去又文敬等七太子中亦有追贈奉天承天皇帝之號當以停廢則讓帝之廟不宜獨存臣等參詳伏請准中書門下狀便從廢罷㳂情定禮實議叶宜從之杜宣猷為監察使開成四年正月奏伏准開元三十三年正月二十四日勑自今後有大祠宜差丞相特進少保少傅尚書賓客御史大夫攝祭行事者伏以郊祀蒸嘗國家大典肅將明命合差重官茍異於斯則為瀆祭臣伏見近日大祠差王府官攝太尉行事人輕位散不足交神昧陛下㳟潔之誠阻百靈正直之福事有不便實資改更臣請起今春季以後祠祀南郊薦獻太清宫宰臣行事外其餘太祠攝太尉司徒司空伏請差六尚書左右丞列曹侍郎諸三品以上清望官充其中祠小祠官員不足即任差王府官充臣職監祠事不敢因循從之李徳裕武宗時為宰相㑹昌元年三月與陳夷行崔珙李紳等奏請尊憲宗曰章武孝皇帝為不遷廟狀曰臣等伏聞開成中文宗嘗顧訪宰臣欲褒稱憲宗功徳其時宰臣莫能推順羙之心明祖宗之義臣等至愚竊所感嘆臣等伏思國家受命二百五年矣列聖之功徳區宇之廣大王化之威明禮樂之備具過於殷周逺矣而未有中興之朝臣等所以夙夜而發憤也禮祖有功而宗有徳夏之祖宗經傳無文殷則一祖三宗成湯為始祖太甲為太宗太戊為中宗武丁為髙宗劉歆曰天子七廟茍有功徳則宗之所以勸帝者功徳博矣故周公作無逸舉殷之三宗以勸成王漢景帝詔曰孝文皇帝徳厚侔天地利澤施四海廟樂不稱朕甚懼焉其為孝文皇帝廟為昭徳之舞以明休徳然後祖宗之功施於萬代其與丞相列侯中二千石禮官具儀禮奏焉丞相申屠嘉奏曰功莫大於髙皇帝徳莫盛於孝文皇帝髙皇帝廟宜為帝者太祖之廟孝文皇帝廟宜為帝者太宗之廟天子宜代代獻祖宗之廟又漢宣帝詔夙夜惟念孝武帝躬履仁義選明將討不服功徳茂盛不能盡宣而廟樂未稱其議以奏時有司奏請尊孝武廟為太宗廟奏盛徳文始五行之舞天子請代代獻之此子孫褒崇祖宗之明據也自天寶之後兵宿中原彊侯締交髖髀甚衆貢賦不入刑政自出苞荒含垢以至于貞元徳宗懲奉天之難厭征伐之事戎臣優以不朝終老於外其卒則以幕吏將挍代之故長城在王圻之内斥逐主將矣河中居股肱之郡坐邀符節矣韋臯因備邉之勢自擅靈闗李錡竊煮海之資專制澤國而兩河藩鎮或倉卒易帥甚於奕棋或陸梁弄兵同于拒轍憲宗宿憤舉昇平之典法始命將帥順天行誅元年戮琳暨闢季年梟元濟李師道其他或折簡而召或執珪請覲獻其名城割其愛子不可遍舉矣豈有去天下之害不享其名致生人之安不受其報乎臣伏見元初議遷廟之禮而史官稱中宗不得號為中興之君凢非我失之自我復之謂之中興漢光武晋元帝是也臣等竊思此議實所未盡中宗廟自以政事多釁權移后妃所以未得稱為中興恐議者復以此為疑夫興業之與隆道事寔不同漢光武再造邦家不失舊物晋元帝之在江左亦能纂續此乃主業中興可謂有功矣殷髙宗躬行大孝求賢俾乂周宣王㣲而復盛此乃王道中興可謂有徳矣故詩云車攻宣王復古也宣王能内修政事外攘夷狄復文武之境土又蒸民美宣王能任賢使能致周室中興也又江漢羙宣王能興衰撥亂命召公平淮夷也又漢書宣帝贊曰功光祖宗業垂後嗣可謂中興徳侔殷宗周宣之美矣若皆如漢光武晋元帝則殷宗周宣並不得稱中興也臣等伏思任賢使能内修政事平淮夷之叛復祖宗之土皆憲宗有之所謂王道中興與殷高宗周宣王漢宣帝侔徳矣臣等敢遵古典請尊憲宗章武孝皇帝為百代不遷之廟上以彰陛下大孝之徳廣貽謀之訓下以表臣等思古之憤申欲報之誠如合聖心望令諸司清望官四品以下尚書兩省御史䑓與禮官參議帝荅曰所論至好待續施行其表留中不出是年十二月中書門下奏准天寶三年十月六日勑九宫貴神實司水旱功佐上帝徳庇下人兾嘉糓歳豋災害不作毎至四時節令中書門下徃攝祭者准禮九宫次昊天上帝壇在太清宫太廟上用牲牢璧幣類於天地天寶三載十二月元宗親祀乾元二年正月肅宗親祀伏自累年以來水旱愆候恐是有司禱請精誠稍虧今屬孟春合修祭典至明年正月祭日差宰臣一人禱請向後四時祭並請差僕射少師少保尚書太常卿等官所兾稍重其事以申嚴敬臣等十一月二十五日已於延英面奏伏奉聖㫖令簡儀進來者今欲祭時伏望令有司崇飾舊壇務於嚴潔勅㫖依奏二年正月四日太常禮院奏准監察御史闗牒今月十三日祀九宫貴神已勅宰相崔珙攝太尉行事今授誓誡及有司徒司空臣伏以前件祭本稱大祠准太和三年七月二十四日勅降為中祠昨據勅文只稱崇飾舊壇務于嚴潔不令别進儀注更有改移伏恐不合却用大祠禮料伏候裁㫖中書門下奏曰臣准天寶三年十月六日勅九官貴神實司水旱臣等伏以既經兩朝親祀必是祈請有徴况自太和以來水旱愆候陛下常憂稼穡每念蒸黎臣等合副聖心以修墜典伏見太和二年禮官狀云從水旱兵荒品秩不過列宿今者五星悉是從祭日月猶在中祀竊詳其意以星辰不合比於天地曾不知統而言之為天地在於辰象自有尊卑謹案後魏王鈞志北辰第二星盛而常明者為元尊露寢大帝嘗居始由道而為變通之迹又天皇大帝其精曜魄寶蓋萬神之秘圖河海之命紀皆禀焉據兹說即昊天上帝也天一掌八氣九精之政令以佐天極徴命而有常則隂陽序大運興太一掌十者十有六神之法度以輔人極徵明而得中則神人和而王道興外又北斗有權衡二星天一太一參居其間所以財成天地輔相神道也若一槩以列宿論之實為淺近按漢書云天神貴者太一佐曰五帝古者天子以春秋祭太一列於祀典其來久矣今五帝猶為大祠則太一宜無降祀稍重其事固為得所劉向有言曰祖宗所立神祗舊位誠未易動又曰古今異制經無明文至尊至重難以疑說正也其意不欲非祖宗舊典也以劉向之博通尚難於改作臣等學不究於天人識尤懵於祀典欲為參酌恐未得中伏望更令太常卿學官同詳定庶獲明據從之檢較僕射太常卿王起廣文博士盧就等獻議曰伏以九宫貴神位列星座徃因致福詔立祠壇降至尊以稱臣就東郊以親拜在祀典雖云過禮庇羣生豈患無文思福黔黎特申嚴奉誠聖人屈己以安天下之心也厥後祝史不明精誠亦怠禮官建議降處中祠今聖徳憂勤期臻壽域兵荒水旱寐寢軫懷爰命台臣緝興墜典伏准九宫所稱之神則太一攝提軒轅招揺天符青龍咸池太隂天一者也謹案黃帝九宫經及蕭吉五行大義一宫其神太一其星天逄其卦坎其行水其方白二宫其神攝提其星天内其卦坤其行土其方黒三宫其神軒轅其星天衡其卦震其行木其方碧四宫其神招揺其星天輔其卦㢲其行木其方緑五宫其神天符其星天禽其卦離其行火其方黃六宫其神青龍其星天心其卦乾其行金其方元七宫其神咸池其卦兊其行金其方赤八宫其神太隂其星天任其卦艮其行土其方白九宫其神天一其星天英其卦離其行火其方紫觀其統八卦運五行土飛於中數轉於極雖敬事迎釐不聞經見而範圍亭育有助昌時以此兩朝親祀而臻百祥也然以萬物之精上為列星星之運行必繫於物貴而居者則必統八氣總萬神幹權化於混茫賦品彚於隂隲與天地日月誠相參也豈得槩頼於敷佑而屈降於等夷又據太尉攝祀九宫貴神舊儀前七日受誓誡於尚書省散齋四日致齋三日牲用犢祝版御署稱嗣天子臣圭幣樂成比類中祠則無等級今據江都集禮及開元禮行祭之日大明夜明二座及朝日夕月皇帝致祝皆率稱臣若以為非泰壇配祀之時得主日報天之義卑緣厭屈尊用徳伸不以著在中祠取類常祀此則中祠用大祠之禮也又據太社太稷開元之制列在中祠天寶三載二月十四日勑改為太祀自後因循復用前禮長慶三年正月禮官獻議始准前勑稱為太祠唯御署祝文稱嗣天子謹遣某官昭告文義以為植物粒人則宜増秩致祝稱禱有異方丘不以是為太祠遂屈尊稱此又大祠用中祠之禮也參之日月既如彼考之社稷又如此所謂功鉅者因之以殊禮位稱者不敢易其文是前聖後儒陟降之明徵也今九宫貴神既司水旱降福禳灾人將頼之追舉舊章誠為得禮然以立祠非古宅位有方分職既異其司存致祝必參乎等列求之折𠂻宜有變通稍重之儀有以為比伏請自今已後却用大祠之禮誓官備物無有降差唯御署祝文以社稷為准伏縁已稱臣於天帝無二尊故也勅㫖依之付所司三年正月又奏奉宣今日已後百官並不得於京城内置廟者臣等伏據禮記云君子將營宫室宗廟為先廐庫為次居室為後又韋彤五經精義對曰古制廟必中門之外吉㓙大事皆告而後行所以親而尊之不自專也今令城外置廟稍異禮文書於史籍恐乖聖政伏以朱雀門及至徳門凡有九坊其長興坊是皇城南第三坊便有朝官私廟實則逼近宫闕自威逺軍向南三坊俗稱圍外地甚閒僻人鮮經過於此置廟無所妨碍臣等商量今日已後皇城南六坊内不得置私廟至朱雀門縁是南郊御路至明徳門夾街兩面坊及曲江側近亦不得置餘圍外深僻坊並無所禁兾不違禮意感恱人心臣等頻奉聖㫖有事許再三論奏輙罄所見貴補聰明從之鄭路為太常博士㑹昌五年八月中書門下奏東都太廟九室神主共二十六座自禄山叛後取太廟為軍營神主棄於街巷所司潛収聚見在太㣲宫内新造小屋之内其太廟屋並在可以修崇太和中太常博士議以為東都不合置神主車駕東幸即載主而行至今因循尚未修建望令尚書集公卿及禮官詳議如不要更置須有収藏去處如合置望以所折大寺材木修建既是宗室官居守便望令充修東都太廟使勾當修繕奉勑宜依六年三月路與禮官等奏東都太微宫神主二十座去二月二十九日禮院分拆聞奏訖伏奉今月七日勅此禮至重須遵典故宜令禮官同議聞奏者臣今與學官同議獻祖宣皇帝宣莊皇后懿祖光皇帝光懿皇后文穆皇后髙宗天皇大帝則天皇后中宗大聖大昭孝皇帝和思皇后昭成皇后孝敬哀皇后已前十二座親盡迭毁宜遷諸太廟祔于興聖廟祫禘之歳乃一祭之東都無興聖廟可祔伏請且權藏於太廟夾室未題神主十四座前件神主既無題號之文難申祝告之禮今與學官等同商議伏請告遷之日但瘞於舊太㣲宮内空閒之地參酌事理庶叶從宜太常博士叚環等三十九人奏議曰禮之所立本於誠敬廟之所設實在尊嚴既曰薦誠則宜統一昔周之東西有廟亦可徴其所由但縁卜雒之初既須營建又以遷都未决因議兩留酌其事情匪務於廣祭法明矣伏以東都太廟廢已多時若議增修稍乖前訓何者東都始制寢廟於天后中宗之朝事出一時非貞觀開元之法爾後因循不廢者亦踵鎬京之文也記曰祭不欲數數則煩天寶之中兩京悉為㓂䧟兩都廟貌如故東都因此散亡是知九廟之靈不欲歆其煩祀也自建中不葺之後彌歴歳年今若廟貌惟新即須室别有主舊主雖在大半祫祧必几筵而存之所謂宜祧不祧也孔子曰當七廟五廟無虛主也謂廟不得無主者也舊主如有留去新廟便合創添謹案左傳云祔練作主又戴聖云虞而立几筵如或非時成之便是以㓙干吉創添既不典虚廟又非儀考諸禮文進退無守或曰漢於郡國置宗廟凡百餘所今止東西立廟有何不安者當漢氏承秦焚燒之餘不識典故至于廟制率意而行比及元成二帝之間貢禹韋元成等繼出果有正論竟從毁除足知漢初不本於禮經又安可程法也或曰几筵不得復設廟寢何妨修營候車駕時廵便舍所載之主也究其始終又得以論之昨者降勅參詳本為欲収舊主既不立廟更何可施假令行幸九州一一皆立廟乎愚以為廟不可修主宜藏瘞或就塗於塪室或瘞於兩階間此乃萬代常行不易之道也其年九月勑叚環等詳議東都不可立廟李福等列狀又有異同國家制度須合典禮證據未一則難建立宜並令赴都省對議須歸至當工部尚書薛元賞等議伏以建中時公卿奏議修建東都太廟當時之議大㫖有三其一曰必存其廟備立其主時饗之日以他官攝行二曰建廟立主存而不祭皇輿時廵則就饗焉三曰存其廟瘞其主臣等立其三義叅酌禮經理宜存廟不合置主謹案祭義曰建國之神位右社稷而左宗廟禮記云君子將營宫室宗廟為先是知王者建邦設都必先宗廟社稷况周武受命始於都豐成王相宅又卜于雒蒸祭歳于新邑䇿周公于太室故書曰戊辰王在新邑蒸祭歳王入太室祼成王厥後復歸于豐雖成雒邑未嘗久處逮於平王始定東遷則周之豐鎬皆有宗廟明矣又案曾子問廟有二主夫子對以天無二日土無二王嘗禘郊社尊無二上未知其為禮者昔桓公作二主夫子譏之以為偽主是知二主不可並設亦明矣夫聖王建社以厚本立廟以尊祖所以京邑必有宗社今國家定周秦之兩地為東西兩宅闢九衢而立宫闕設百司而嚴拱衞取法元象號為京師既嚴帝宅難虛神位若無祖廟何謂皇都然依人者神在誠者祀誠非外至必由中出理合親敬用交神明位宜存於兩都廟可偕立誠難專於二祭主不並設或以禮云七廟無虚主是謂不可無主所以天子廵狩亦有所尊嘗飾齋車載遷主以行今若修廟瘞主則東都太廟九室皆虛既違於經須徴其說臣復探賾禮意因得盡而論之所以云七廟五廟無虚主是謂見饗之廟不可虚也今之兩都雖各有廟禘祫饗獻斯皆新奉於上京神主几筵不可虛陳於東廟且云唯聖人為能饗帝孝子為能饗親者漢韋元成議廢郡國祀亦曰立廟京師躬親承事四海之内各以其職來祭人情禮意於此較然三宅既不並居二廟豈宜偕附但所都之國見饗之廟既無虛室則叶通經議者又欲置主不饗以俟廵幸昔魯作僖公之主不於虞練之時春秋書而譏之合祔之主作非其時尚為所議今若置不合祔之主不因時而作違經越禮莫甚於斯豈有九室合饗之主而有置而不饗之文兩廟始創於周公二主獲譏於夫子自古制作皆範周孔舊典猶在足可明徴臣以為東都廟則合存主不合置今將修建廟宇誠不虧于典禮其見在太㣲宫中六主請待東都修建太廟畢具禮迎置于西夾室閟而不饗式彰陛下嚴祀之敬以明聖朝尊祖之義吏部郎中鄭亞等五人議據禮院以為東都太廟既廢不可復脩見在太㣲宫神主請瘞於所寓之地有乖經訓不敢雷同臣所以别進議狀請修祔主並依典禮兼與建中元年禮儀使顔真卿所奏同臣與公卿等重議皆以為廟固合脩主不可瘞即與臣等議狀意同但衆議猶疑東西二廟各設神主恐渉廟有二主之義請修廟虛室以太㣲宫所寓神主藏於夾室之中伏以六神位有不祧之宗今用遷廟之儀猶未合禮臣等猶未敢署衆狀蓋為闕疑太學博士直𢎞文舘鄭遂等七人議曰夫論國之大事必本乎正而根乎經以臻于中道聖朝以廣孝為先以得禮為貴而臣下敢不以經對三論六故已詳於前議矣再捧天問而陳乎諸家之說求於典訓考乎大中廟有必修之文主無可置之理則正經正史兩都之廟可徵禮稱天子不卜處太廟擇日卜建國之地則宗廟可知若廢廟之說恐非所宜謹案詩書二經及漢朝正史两都並設廟而載主之制乆已行之敢不明徵而去其文飾援據經文不易前見東都太廟合務修崇而舊主當瘞請瘞於太㣲宫所藏之所皇帝有事于雒則奉齋車載主以行太常博士胡德章議曰夫禮雖縁情將明厥要實在得中必過禮而求多則反虧於誠敬伏以神龍之際天命有歸移武氏廟於長安即其地而置太廟以至天寶初復不為建都而議曰中宗立廟于都無乖舊典徵之古意不亦謬乎又曰東都太廟至於睿宗𤣥宗猶不易者蓋縁嘗所尊奉不可輙廢也今則廢已多時宜循莫舉之典也又曰雖貞觀之始草創未暇豈可謂此事非開元之法者謹案定開元六典勅曰聴政之暇錯綜古今法以周官作為唐典覽其本末千載一朝春秋謂考古之法也行之可久不曰然歟此時東都太廟見在六典序兩都宫闕西都具太廟之位東都則存而不論足明事出一時又安得云開元之法也又三代禮樂莫盛于周作者論議之時便宜細叅夫取周遷而立廟今立廟不因遷何羙之而不能師之也又曰建國神位右社稷而左宗廟君子將營宫室宗廟為先者謹案六典永昌中則天以東都為神都邇後漸加營搆宫室百司於是備矣今之宫室百司乃武氏改命所備也上都已建國立宗廟不合引言又曰東都雒陽祭孝宣等五帝長安祭孝成等三帝以為置廟之例則又非也當漢兩處有廟所祀之地各别今東都建廟作主與上都盡同詳而論之失之甚者又曰今或東雒復立太廟有司同日侍祭以此為數實所未觧者謹案天寶二載詔曰頃四時有事於太廟兩京同日自今已後兩京别宜各擇日載於祀典可得而詳且立廟造主所以祭神而曰嚴而勿祀出自何經當七廟五廟無虛而欲立虗廟法於何典前稱廟貌如故者即指建中之中就有而言以為國之光也前以非時不造主者謂見有神主不得非時造也若江左至徳之際主並散亡不可拘以例也或曰廢主之瘞請在太㣲宫者謹按天寶二年詔曰古廟東間添置兩室定為九代十一室之例以全臣子思敬之義庶叶大順之宜得變禮之正折古今之紛紜立羣疑之的指俾因心廣孝永燭於皇明昭徳事神無虧於聖代勅曰宗廟事重實資叅詳宜令尚書省御史䑓四品以上官大理卿京兆尹等集議以聞鄭涯與衆官等奏議曰夫禮經垂訓莫重於嚴配必叅損益之道則合典禮之大況有明徵是資折𠂻伏自敬宗文宗武宗三朝嗣位皆以兄弟考之前代理有顯據今謹詳禮院所奏並上稽古文旁搜史氏叶於通變允謂得宜臣等商量請從禮官所議從之朱儔為太常禮院修撰官㑹昌六年四月禮院奏禘祫祝文稱號穆宗皇帝宣懿皇后韋氏敬宗皇帝文宗皇帝武宗皇帝縁從前序親親以穆宗皇帝室稱為皇兄未合禮文得儔狀稱禮叙親親陛下於穆宗敬宗武宗三室祝文恐須但稱嗣皇帝臣某昭告于某宗臣等同考禮經於義為允從之任疇為太常博士㑹昌六年五月上言去月禘禮當時五室列於雒都三帝留於京廟行幸之歳與合食之期相㑹不奉齋車又安可以成此禮則知兩廟周人成法載主以行漢家通制或以當虛一都之廟為不可而引七廟無虛主之文禮言一都之廟室不虚主非為兩都各廟而不可虚也既聨出征之詞更明載主之意因事而言理實相統非如詩人更可斷章以取義也古人求神之意非一意神之所無二故廢重作桑主廢桑作栗主既事埋之以明其一也或又引左氏傳築郿凡例謂有宗廟先君之主曰都而立建主之論按魯莊公二十八年冬築郿左傳為築發凡例糓梁譏因藪澤之利公羊稱避㐫年造邑之嫌三傳異同左氏為短何則當春秋二百年間魯凢城二十四邑唯郿一邑稱築其二十二皆有宗廟先君之主乎執此為建主之端又非通論或又曰廢之瘞之何以在太㣲宫所藏之所且捨故取新前已列矣案瘞主之位有三或於北墉之下或在西階之間廟之事也其不當立之主但隨其所在所以瘞之夫主瘞於當立廟斯不然矣以在所而言則太㣲宫所藏之所與漢之寢園無異歴代以降建一都者多兩都者少今國家崇東西之宅極嚴奉之典而以合廟為疑合以建都故事以相質正即周漢是也今詳議所徵失其年代率皆一都之時豈可擬議亦孰敢獻酬於其間詳考經㫖古人謀寢必及於廟未有設寢而不立廟者國家承隋氏之弊草創未暇後雖建於垂拱而寧有所合其後當干戈寧戢之歳文物大備之朝歴于十一聖不議廢之豈不以事雖出於一時廟有合立之禮不可一一革也今雒都之制上自宫殿樓觀下及百辟之司與西京無異鑾輿之至也雖厮役之賤必歸其所理也豈先帝之主獨無其所安乎時也虞主尚瘞廢主宜然或以馬融李冉二人稱寢無傷於偕立廟不妨於暫虗是則馬融李冉可法於宣尼矣以此擬議乖當則深或稱凡邑有宗廟先君之主曰都無曰邑邑曰築都曰城者謹按春秋二百四十年間唯郿一邑稱築於城郎費之類各有所因或以他防或以自固謂之盡有宗廟理則極非或稱聖主有復古之功簡册有考文之羙五帝不同樂三王不同禮遭時為法因事制宜此則改作有為非有司之事也如有司之職但令二經變禮從時則須俟明詔也凡不修之證略有七條廟立因遷一也已廢不舉二也廟不可虛三也非時不造主四也合載遷主行五也尊無二上六也六典不書七也謹按文王遷豐立廟武王遷鎬立廟成王遷雒立廟今東都不因遷而欲立廟是違因遷立廟也謹按禮記曰凡祭有其廢之莫敢舉也有其舉之莫敢廢也今東都太廟廢已八朝若果立之是違已廢不舉也謹按禮記曰當七廟無虛主今欲立虛廟是違廟不可虛也謹按左傳丁丑作僖公主書不時也記又曰過時不祭祀也合禮之祭過時猶廢非禮之主可以作乎今欲非時作主是違非時不作主也謹案曽子問古者師行以遷廟主行載於齋車言必有尊也今取七廟之主以行則失之矣皇氏云遷廟主者載遷一室之主也今欲載遷廟之主以行是違載遷之主也謹按禮記曰天無二日土無二王嘗禘郊社尊無二上今欲兩都建廟作主是違尊無二上也謹按六典序兩都宫闕及廟宇此明東都有廟不載是六典不合修寢以武徳貞觀之中作法垂範之日文物大備儒口畢臻若可修營不應議不及矣記曰樂由天作禮以地制天之體動也地之體止也此明樂可作禮難變也伏惟陛下誠明宰物莊敬御天孝方切於祖宗事乃求於根本再令集議俾定所藏臣實職司敢不條白以對徳章又有上中書門下及禮院詳議兩狀並同載於後其一曰伏見八月六日勅欲修東都太廟令㑹議事此時已有議狀准禮不合更修尚書丞郎以下三十八人皆同署狀德章官在禮寺實忝司存當聖上嚴禋敬事之時㑹相公尚古黜華之日脱國之祀典有乖禮文豈唯受責於曠官竊懼貽譏於明代所以勤懇將不言而又言也昨者異同之意盡可指陳一則以有都之名便合立廟次則欲崇脩廟宇以候時廵殊不知廟不合虛主唯載一時謹案貞觀九年詔曰太原之地肇基王業事均豐沛義等宛譙約禮而言須議立廟時秘書監顔師古議曰臣旁觀祭典遍考禮經宗廟皆在京師不於下土别置昔周之豐鎬實為遷都乃是因事便營非云一時别立太宗許其奏即日而停由是而言太原豈無都號太原爾時猶廢東都不立可知且廟室惟新則須有主主既藏瘞非虛而何是有都立廟之言不攻而自破矣又案曽子問曰古者師行必載遷廟主行乎孔子曰天子廵狩必以遷廟主行載於齋居言必有尊也今也取七廟之主以行則失矣皇氏云遷廟主者唯載新遷一室之主也如祧廟之主無載行之文假使將候時廵自可修營一室議搆九室有何依憑夫宗廟尊事也重事也至尊至重安得以疑文定論言茍不經則為擅議近者勅㫖凡以議事皆須一一披經若無經文任以史證如或經史皆無據者不得率意而言則立廟東都正經史無據果從臆說無乃前後相違也書曰三人占則從二人之言㑹議者四十八人所同者六七人耳比夫二三之喻又何其多也夫堯舜之為帝迄今稱詠之者非有他術異智者也以其賢臣輔翼能順考古道也故堯之書曰若稽古帝堯孔氏傳曰能順考古道傅說佐殷之君亦曰事不師古匪說攸聞考之古道既如彼驗以國章又如此將來典實無以易諸伏希必本正經稍抑浮議踵臯䕫之古道法周孔之遺文則天下守真之儒實所幸甚其餘已具前議其二曰夫宗廟之設主於誠敬旋觀典禮二則非誠是以匪因遷都更不可别立廟宇記曰天無二日土無二王嘗禘郊社尊無二上又曰凡祭有其廢之莫敢舉也有其舉之莫敢廢也則東都太廟廢已多時若議増修稍違前志何者聖歴神龍之際武后始復明辟中宗取其廟易置太廟焉本欲權固人心非經久之制也伏以所存神主既請祧藏今廟室維新即須有主非時不造廟寢又無虛如議修復以候時廵則時廵唯載一主備在方册可得而詳又引經中就有數等或是弟子之語或是他人之言今廟不可虛尊無二上非時不進主合載一主行皆大聖祖及宣尼親所發明者比之常據不可同餘又丘明修春秋悉以君子定褒貶至陳洩冶以忠獲罪晉文以臣召君於此數條不復稱君子將評得失特以宣尼料之傳曰危疑之理須聖言以明也或以東都不同他都地有壇社宫闕欲議搆葺自是無妨此則酌於意懐非曰經據也但以遍討今古無有壇社立廟之證用以為說實所未安謹上自殷周旁稽故實除因遷都之外無别立廟之文制曰自古議禮皆酌人情必稷嗣知機賈生逹識方可發揮大政潤色皇猷其他管窺蓋不足數公卿之議實可施行徳章所陳最為淺近豈得茍申獨見妄有異同事貴酌中理宜從衆宜令有司擇日修崇太廟以留守李石充使勾當六年三月擇日既定禮官既行旋以武宗登遐其事遂寢宣宗即位竟遷太㣲神主祔東都太廟鄭涯為尚書左丞㑹昌六年三月宣宗即位五月禮儀使奏武宗昭肅皇帝祔廟并合祧遷者伏以自敬宗文宗武宗兄弟相及已厯三朝昭穆之位與承前不同所可疑者其事有四一者兄弟昭穆同位不相為後二者已祧之主復入舊廟三者廟數有限無後之主則冝出置别廟四者兄弟既不相為後昭為父道穆為子道則昭穆同班不合異位據春秋魯文公二年躋僖公何休云躋升也謂西上也惠公與莊公當同南面西上隐桓與閔僖當同北面西上孔頴逹亦引此義釋經文賀循云殷之盤庚不序陽甲漢之光武上繼元帝晋元帝簡文皆用此義蓋以昭穆位同不可兼毁二廟故也尚書云七世之廟可以觀徳且殷家兄弟相及有至四帝不及祖禰何容更言七代於理無疑矣二者今以兄弟相及同為一代矯前之失則合復祔代宗神宗於太廟或疑已祧之主不合更入太廟者案晋代元明之時已遷豫章潁川矣及簡文即位乃元帝之子故復豫章潁川二神主於廟又國朝中宗已祔太廟至開元四年乃出致别廟至十年置九廟而中宗神主復祔太廟則以遷復入亦可無疑三者廟有定數無後之主出置别廟者按魏晋之初多同廟蓋取上古清廟一宫遵逺神祗之義自後晋武所立之廟雖有七主而實六代蓋景文同廟故也又案魯立姜嫄文王之廟不計昭穆以尊尚功徳也晋元帝上繼武帝而惠懐愍三帝時賀循等諸儒議以别為主廟親逺義踈都邑遷異於理無嫌也今以文宗棄代纔六七年武宗甫邇復土遽移别廟不齒祖宗在於有司非所宜議四者添置廟之室案禮論晋太常賀循云廟以容主為限無拘嘗數故晋武帝時廟有七主六代至元帝明帝廟皆十室及成康穆三帝皆至十一室自後雖遷故祔新大抵以七代為准而不限室數伏以江左名儒通賾覩奥事有明據固可施行今若不行是議更以迭毁為制則當上不及髙曾未盡之親下有忍臣子恩義之道今備討古今叅挍經史上請復代宗神主於太廟以存髙曾之親下以敬宗文宗武宗同為一代之制禮存合祀祭用質明義兼取於尚幽情實縁於既沒我聖祖澹然嘗在乃道之宗既殊有盡之期宜展事生之禮自今已後毎至聖祖宫有昭告宜改用卯時者今欲以主瘞於宫所即與此勅全乖又曰主不合瘞請藏夾室者謹按前代藏主頗有異同至於夾室宜用以序昭穆也今廟主既不中禮則無禘祫之文又曰君子將營宫室以宗廟為先則建國營宫而宗廟必設今東都既有宫室而太廟不可不營汎以論之其義斯勝盛而西周東漢並列兩都其各有宗廟之證經史昭然又得以極思於揚㩁詩曰其繩則直縮板以載作廟翼翼大雅𤓰瓞言豐廟之作又曰於穆清廟肅雍顯相雒邑既成以率文王之祀此詩豐雒之廟也書曰成王既都雒蒸祭嵗文王騂牛一武王騂牛一又曰祼於太室康王又居豐命畢公保釐東郊豈有無廟而可蒸祭非都而設保釐則書東西之廟也逮于後漢卜雒西京之廟亦存建武二年於雒陽立廟而成哀平三帝祭于西京一十八年親幸長安行十七日享徳明興聖廟得廟直侯論狀稱懿祖室在獻祖室之上當時雖以為然便依行事猶牒報監察使及宗正等請遇祭詳窺玉牒如有不同即相知聞奏爾後伏檢髙祖神堯皇帝本紀伏審獻祖為懿祖之昭懿祖為獻祖之穆昭穆之位天地極殊今廟至奪倫不即陳奏尚為茍且罪不容誅仍勅修撰朱儔檢討王皡研精詳覆得報稱天寶二年制追尊咎繇為徳明皇帝凉武昭王為興聖皇帝十載立廟至貞元十九年制從給事中陳京右僕射姚南仲等一百五十人之議以為禘祫是祖宗以序之祭凡有國者必尊太祖今國家以景皇帝為太祖太祖之上施於禘祫不可為位請接徳明興聖廟共成四室祔遷獻懿二祖謹尋儔等所報即當時表奏並獻居懿上伏以國之大事宗廟為先禘祫之禮不當失序四十餘載理難尋詰伏祈聖鍳即垂詔勅具禮遷正其月儔又奏曰伏奉今月十三日勅以臣所奏獻祖懿祖二室倒置事宜令禮官集議聞奏者臣去月十七日縁遇太廟祫享太祖景皇帝已下羣主准貞元十九年所祔獻祖懿祖於徳明廟共為四室准元勅各於本室行饗禮審知獻祖合居懿祖之上昭穆方正其時親見獻祖之室倒居懿祖之下於後遍檢圖籍實見差殊遂敢聞奏今奉勅宜令禮官集議聞奏者臣得奉禮郎李岡太祝柳仲年恊律郎諸葛玟李潼簡討官王皥修撰官朱儔愽士闗慶之等七人狀稱謹案髙祖神堯皇帝本紀及皇室圖譜並武徳貞觀永徽開元以來諸禮著在甲令者並云獻祖宣皇帝是神堯之髙祖懿祖光皇帝是神堯皇帝之曾祖以髙祖辨之則獻祖是懿祖之父懿祖是獻祖之子即博士任疇所奏倒祀不虛臣疇伏乞即垂詔勅具禮遷正其事遂行陳商為禮部侍郎會昌六年六月詔遣東都備法駕迎太㣲宫木主歸祔太廟初神龍中取武氏廟為太祖自太祖以下神主皆祔焉禄山入雒以廟為馬廐有木主遂散他處恊律郎嚴郢奉之以聞詔歸于廟及思明入雒又亡之後留守盧正已得于他所寄于太㣲宫至大歴十四年留守路嗣叅奏之朝廷下議百寮紛然不一禮儀使顔真卿奏請歸祔詔許之臨事而止㑹昌五年河南尹李石因太㣲宫摧毁奏以廢𢎞敬寺為以其木主廢置未詳闗白宰執中書奏請下公卿議之商議曰今月五日勅再議東都太廟神主廢置今臣等議者伏以古者將營宫室宗廟為先故詩羙文王乃召司徒俾立室家其繩則直作廟翼翼雒誥曰周公徃營成周十二月戊辰成王蒸祭入太室祼徵之周氏文王有廟於豐成王有廟於雒即二都得置宗廟之顯據也然兩置神主曖昧無文既闕明徵難可臆斷臣愚輙斟酌前代以言之夫宗廟以安神神必依主故䘮禮始以重為主既虞即以桑為主既祔即以松栗為主神明之道不可一日無主蒸嘗之本不可一日無神曾子問曰䘮有二孤廟有二主禮與孔子曰天無二日土無二王嘗禘郊社尊無二上未知其為禮也夫煩則不敬所求惟精雖神之所適無方而神之所依惟一求之未當神亦不歆孔聖之言蓋有深㫖今東都之主修之則非神所慿存之則無典可祭嚴祀之道豈其爾乎稽諸異同考以經禮二都有宗廟於古無嫌東西有神主於理無據國家承乾開統爰法唐虞制度等威實尊文武况東京宫廟中宗𤣥宗所奉又是國家之别都廵幸之時展敬有在是同周室豐雒各得建置之義以臣愚見恐不得廢也若添修神主方著彛章既無姬漢遺文且乖禘祫之典是同嘗禘郊社尊無二上之義以臣愚見恐不可置也今議者或引周氏藏先公先王之主於后稷文武之廟禘嘗之時以祭薦者此是周家祧廟之主親盡而遷准禮須存以備五年再殷一禘一祫者也今國家上都主祏昭穆具存親盡已祧之主藏於祖之廟舊矣與周家之制無異鞏雒之主雖存又須崇飾以之禘祫則無文以之禴嘗則非禮存而不論則又非敬臣以東都宗廟宜如聖㫖使留守李石充使増修其廟中神主不當立宜依祔栗主廢虞主之例公羊云虞主瘞之殿兩楹之間為非人所踐蹋又云瘞之廟北方者隂陽無事主亦無事今請瘞藏之雒廟北墉下若相宅成周自可奉迎京師之主以行若歳廵時邁自依三公攝祭庶不遺承襲之典時武宗不用此議勅令迎祔之輅車法駕並至雒下尋遇國事而止至是帝乃行之兩都太廟自此始也孫簡為吏部尚書㑹昌六年九月太常禮院奏十月十三日太廟祫享朝廷配享功臣得修撰官朱儔狀自髙祖至徳宗毎室皆有功臣配享伏以憲宗皇帝誅盪淮蔡削平河朔武功英畧赫濯中興啟沃謨猷必資元輔其配享功臣伏請聞奏定名降下勅遣尚書御史䑓四品已上兩省五品已上同詳定聞奏簡與衆官上議曰伏以憲宗皇帝𤣥徳英猷邁越千古神機睿筭恢復四方始者既戮惠琳連誅闢錡睿求良輔果集大勲乃覆淮蔡之妖巢大芟河朔之餘孽皇威震耀寰宇和寧偃武修文㡬無遺事陛下崇嚴享禮爰軫孝思將舉元勲以顯丕績臣等伏思故司徒兼中書令贈太師裴度天縱忠公道施康濟始處司言之任屢陳憂國之誠嘗因别召深得聖㫖乃貳邦憲使于藩方處嫌疑者悉付心誠懐顧慮者必得要領俄登相位專任大事遂乃擒元濟梟師道承宗効順劉聦叩頭程權來朝同㨗就戮蓋憲宗有知人之明而度盡致君之道也於是息瘡痍培根本宇内無獷悍之俗元和為盛明之代薰灼天下將明帝圖古徃今來善無與讓即祗配聖徳光揚大勲詳考功行無先於度詔曰朕以憲宗皇帝道叶中興威加寰海開啟聖意則有杜黃裳弼成功業則有裴度著在國史時無比倫宜以杜黃裳裴度同配享禮又詔曰論功配食文武宜兼元和一朝武臣功力最髙者定一人與黃裳裴度同配享憲宗皇帝室頃李愬有平蔡之績髙崇文有収蜀之功挍其二人功孰為重宜令尚書省議奏簡等又上議曰伏以蜀蔡之功實皆超卓勲力雖等艱危則殊髙崇文憲宗御宇之初朝廷討叛之始雷霆斯赫物力方全劉闢起参佐而為兇魁行惡者勢同烏合崇文統百萬而命羣師起行者理足鷹揚所以嚴道雖深劍門不能恃其固汚俗未久刀州莫與結其思大勲誠集於忠勞作孽本無其根據此崇文所以不辱專征之寄克成定蜀之勲至于李愬之所立適當伐蔡累年旁有苞荒數鎮元濟襲父業而成邪計兇黨皆為其致命同惡懼齒寒而為隂援軍須必從以有資是故垤窟益深毒爛不誅愬於此時獨能善貸行權竄謀沉斷跳驅間道乘凌堅壁不俟㧞幟而坐失金湯未暇請纓而已纍俘虜斯實軍鋒之冠萬夫之將由是言之伐蜀當專征之始衆鋭且同于楚金攻蔡承連兵之餘羣疑頗同於魯縞及成功而雖一在出竒而尤髙昔光武比耿弇於韓信優之獨収勍㓂今陛下令臣等挍崇文與李愬之功逈出等夷儻聖慈以格言所著徳宜有隣武功之中功皆難掩則愬居苐一崇文次之庶盡公言上符詔㫖勅㫖並令同配食憲宗廟廷册府元龜卷五百九十二
