body:
  text: 册府元龜卷八百十九宋王欽若等撰總録部知子第二南齊垣崇祖年十四有幹畧伯父豫州刺史䕶之謂門宗曰此兒必大成吾門汝等不及也後至五兵尚書張緒少知名清簡寡欲叔父鏡謂人曰此兒今之樂廣也緒位至太子詹事師袁彖字偉才小字史公武陵太守覬之子少有風氣好屬文及𤣥言舉秀才歴諸王府叅軍不就覬臨終與兄顗書曰史公才識可嘉足懋先基矣顗從叔司徒粲外舅征西将軍蔡興宗竝器之徐陶仁為給事中子文景在東宫多不法陶仁謂文景曰終當滅門正當掃墓待䘮耳仍移家避之其後文景竟賜死陶仁遂不哭時人以為有古人風劉繪字士章彭城人太常悛弟也父勔宋末權貴門多人客使繪與之共語應接流暢勔喜曰汝後若束帶立朝可與賔客言矣顧憲之為給事黄門侍郎兼吏部郎中其祖覬之宋世嘗為吏部庭植嘉樹謂人曰吾為憲之種耳至是憲之果為此職梁韋叡伯父祖征累為郡守每㩦叡職視之如子時叡之内兄王憕姨弟杜惲並有鄉里盛名祖征謂叡曰汝自謂何如憕惲叡謙不敢對祖征曰汝文章或小减學識當過之然而幹國家成功業皆莫汝逮也後至䕶軍將軍王茂祖深為北中郎司馬茂年數嵗為深所異嘗謂親識曰此兒吾家之千里駒成門户者必此兒也後為司空謝朏祖宏㣲宋太常卿父荘齊光禄朏十嵗能屬文荘逰土山賦詩使朏命篇朏攬筆便就王景文謂荘曰賢子足稱神童復為後來特達荘笑曰真吾家千金也何敬容特為從兄𦙍所親爱𦙍在若邪山嘗疾篤有書云田疇舘宇悉奉衆僧書經並歸從弟敬容其見知如此何㸃白晳美容貌從兄求㸃毎稱之曰叔寳神清宏治膚清衛玠字叔寳杜又字宏治今觀此子復見衛杜在目位至太子詹事劉虬謂子之遴必以文興吾宗謂諸子曰若比顔氏之遴得吾之文繇是州里稱之之遴官至南郡太守裴之高頗讀書少負意氣嘗隨叔父邃征討所在立功甚為䆳所噐重戎政咸以委焉位至特進光禄大夫劉孺叔父瑱為義興郡守攜以之官嘗置坐側謂賔客曰此兒吾家之明珠也蕭琛字彦瑜蘭陵人年數嵗從伯惠開撫其背曰必興吾宗後至侍中特進謝徴字𤣥度㓜聰慧父景異之嘗謂親從曰此兒非常器所憂者夀若天假其年吾無恨矣微位終南蘭陵太守邱仲孚字公信少好學從祖靈鞠有人倫之鑒嘗稱為千里駒也後至豫章内史邱遲字希範父靈鞠有才名遲八嵗便屬文靈鞠嘗謂氣骨似我黄門郎謝超宗徴士何㸃並見而異之遲位至司徒從事中郎王規字威明八嵗以丁所生母憂居䘮有至性徐孝嗣謂之孝童叔父暕亦深器重之嘗曰此皃吾家千里駒也後至散騎常侍太子中庻子賀琛字國寳會稽山隂人伯父瑒歩兵校尉為世碩儒琛㓜瑒授其經業一聞便通義理瑒異之常曰兒當以明經致貴後至金紫光䘵大夫江革㓜而聰敏早有才思六嵗能屬文父柔之深加賞器曰此兒必興吾門後至光禄大夫王瞻字思範宋太保𢎞從孫也父猷廷尉卿瞻年數嵗常從師受業時有妓經其門同學皆出觀瞻獨不視習誦如初從父尚書僕射僧逹聞而異之瞻父曰大宗不衰寄之此子後至侍中吏部尚書陳周𢎞正㓜孤及弟𢎞譲𢎞直俱為叔父侍中護軍捨所養年十嵗通老子周易捨毎與談論輒異之曰觀汝神情頴悟清理警發後世知名當出吾右後至右僕射周確𢎞直之子美容儀博渉經史世父𢎞正特所鍾爱觧褐梁太學博士陸瓊年十一丁父憂毁瘠有至性從祖㐮嘆曰此兒必荷門基所謂一不為少位至吏部尚書後魏中山王英子熈好學俊爽有文才聞著于世然輕躁浮動英深慮非保家之子甞欲廢之後果坐誅崔道固太山太守輯之子道固賤出適母兄攸之目連等輕之輯謂攸之曰此兒姿識如此或能興人門户汝等何以輕之攸之等遇之彌薄畧無兄弟之禮時宋孝武為徐兖二州刺史得辟他州之民為從事輯乃資給道固令其南仕既至彭城孝武以為從事房士逹少有才氣其族兄景先有鑒識每曰此兒俶儻終當大其門户後終濟南大守李冲字思順燉煌公寳之少子少孤為長兄滎陽大守承所攜訓承常言此兒噐量非常方為門户所寄後至僕射宋弁為禮部尚書有二子維紀見元乂寵勢日隆便至乾沒乃告司染都尉韓文殊父子欲謀逆立清河王懌天下人士莫不怪忿初弁謂族弟世景言維性踈險而紀識慧不足終必敗吾業也世景以為不爾至是果然聞者以為知子莫若父李神儁少有膽畧以氣尚為名早從征役為其從兄崇深所知賞後為驃騎大将軍儀同三司爾朱兆榮之從子麄脱少智無将領之能榮雖奇其膽决然毎云兆不過将三千騎多則亂矣兆後為柱國大将軍爾朱天光榮從子少武决善弓馬榮特親爱之毎有軍戎事要常預謀䇿孝昌末榮将擁衆南轉與天光宻議既據并肆仍以天光為都将總綂肆州兵馬孝明終榮向京師以天光攝行肆州刺史榮将討葛榮留天光在州鎮其根本謂之曰我身不得至處非汝無以稱我心高緒字叔宗明悟好學父謙之常謂人曰興吾門者當是此兒及長渉獵書傳好文詠後為鎮逺将軍冀州儀同府中兵叅軍為府主封隆之所賞隆之行梁州濟之引自随常令總攝數郡李琰之字景珍早有盛名時人號曰神童從父司空仲雅尤所嘆異毎曰興吾宗者其此兒乎嘗資給所須爱同己子後為車騎大将軍儀同三司袁躍字景騰尚書翻之弟博學儁才性不矯俗翻毎謂人曰躍可謂我家千里駒也後為太傅清河王懌文學雅為懌所爱賞李訢北幽州刺史崇之子訢母賤為諸兄所輕崇曰此子相者言貴吾毎觀察或未可知遂使入都為中書學生後為司空侍中北齊房謨為驃騎大将軍謨前妻子子逺險薄甚嫌之不以為子例時以為謨後妻盧氏所譛神武亦以責謨謨陳其惡神武弗信自收恤之令與諸子同學乆乃令還後與任胄等謀殺神武事發神武嘆曰知子莫若父信哉因上言房謨鄭述祖李道璠三家理宜從法竊以謨立身清白履行忠謹鄭仲禮嚴祖度兒晩始收拾李世林生自外養屬絶本宗三人特乞罪止一房魏帝許焉高昻與兄乾數為刼掠州縣莫能窮治招聚劔客家資傾盡鄉閭畏之無敢違逆父翼嘗謂人曰此兒不滅我族當大吾門不直為州豪也後為司徒封京兆郡公盧勇字季禮父璧魏下邳大守初與從兄景裕俱學父叔同稱之曰白頭必以文通季禮當以武逹興吾門在此二子也白頭景裕小字也後勇為揚州刺史景裕為國子博士崔昻字懐逺七嵗而孤伯父吏部尚書孝芬嘗謂所親曰此兒終當逺至吾家千里駒也後為僕射儀同三司徐之才為僕射長子林字少卿太尉司馬次子字同卿太子庻子之才以其無學術毎嘆云終恐同廣陵散矣楊愔字遵彦小名秦王侍中津之子㓜喪母曽詣舅源子恭子恭與之飲問讀何書曰誦詩子恭曰誦至渭陽未邪愔便號泣感噎子恭亦對之歔欷遂為罷酒子恭後謂津曰嘗謂秦王不甚察慧從今已後更欲刮目視之愔一門四世同居家甚隆盛昆季就學者二十餘人學庭前有奈樹實落地羣兒咸争之愔頺然獨坐其季父暐適入學舘見之大用嗟異顧謂賔客曰此兒恬裕有我家風宅内有茂竹遂為愔於林邊别葺一室命獨處其中常以銅盤具盛饌以飯之因以督勵諸子曰汝軰但如遵彦謹愼自得竹林别室銅盤重肉之食愔從父兄黄門侍郎昱特相噐重曽謂人曰此兒駒齒未落已是我家龍文更十嵗後當求之千里外後終特進驃騎大将軍邢邵字子才年十嵗便能屬文雅有才思聰明強記日誦萬餘言族兄巒有人倫鑒謂子弟曰宗室中有此兒非常人也後為尚書令加侍中後周賀若敦東魏潁州長史統之子從其父歸太祖時羣盗蜂起各據山谷龜山賊張世顯潛來襲統敦挺身赴戰手斬七八人賊乃退走統大悦謂左右僚屬曰我少從軍旅戰陳非一如此兒年時膽畧者未見其人非唯成我門户亦當為國名將後至中州刺史尉遲迥父俟兠性𢎞裕有鑒識尚太祖姊昌樂大長公主生迥及綱俟兠病且卒呼二子撫其首曰汝等並有貴相但恨吾不見爾各宜勉之迥後為柱國大將軍迥弟綱後為大司空陜州總管宇文深字奴干性鯁正有器局年數嵗便累石為營伍并折草作旌旗布置行列有軍陣之勢父永遇見之乃大喜曰汝自然知此于後必為名将後從戰河橋及討白額稽胡並有戰功終司命中大夫李穆字顯慶為武衛大將軍雍州刺史宇文䕶執政穆兄逺及其子植俱被誅穆當從坐先是穆知植非保家之子毎勸逺除之逺不能用及逺臨刑泣謂穆曰顯慶吾不用汝言以至于此将復柰何穆以獲免除名為民及其子弟亦免官隋于仲文字次武少聰敏髫齔就學躭閲不倦其父實異之曰此兒必興吾宗矣後官至光禄大夫房彦謙字孝冲早孤不識父為母兄之所鞠飬長兄彦詢雅有清鑒以彦謙天性頴悟毎奇之親教讀書年七嵗誦數萬言為宗黨所異後至司州刺史陸知命以平陳功拜儀同三司復用其弟恪為汧陽令知命以恪非百里才上表陳譲朝廷許之張䖍威字元敬性聰敏渉獵羣書其世父暠之謂人曰䖍威吾家千里駒也年十二州補主簿十八為大尉中兵叅軍薛世雄為兒童時與羣軰㳺戯輒畫地為城郭令諸兒為攻守之勢有不從令者世雄輒撻之諸兒畏惮莫不齊整其父見而竒之謂人曰此兒當興吾家矣後為左禦衛大将軍李士謙事母以孝聞伯父魏岐州刺史瑒深所嗟尚毎稱曰此兒吾家之顔子也後畢志不仕梁彦光後周荆州刺史顯之子彦光少岐嶷有至性其父母謂所親曰此兒有風骨當興吾宗後至相州刺史楊素字處道少落拓有大志不拘小節世人多未知之唯從叔祖魏尚書僕射寛深異之每謂子孫曰處道當逸羣絶倫非常之噐非汝曹所逮也素官至司徒楊𤣥感素子體貌雄偉美鬚髯少時晩成人多謂之痴其父母謂所親曰此兒不痴也及長好讀書便騎射以父軍功位至柱國宇文述為大将軍於江都遇疾及疾篤帝令中使相望于第謂述有何言述曰願陛下一親臨遣司宫魏氏謂曰公危篤朕惮相煩動必有言可陳也述流涕曰臣子化及早預藩邸願陛下哀憐之士及夙䝉天恩亦當驅䇿臣死後智及不可乆㽞願早除之望不破門户魏氏反命隐其言因詭對曰述唯憶陛下爾帝泫然曰述憶我邪将親臨之宫人百僚諌乃止後智及江都弑逆唐楊岳隋尚書令素之弟岳大業中為萬年令與素子𤣥感不叶嘗宻上表稱𤣥感必為逆亂及𤣥感被誅岳在長安繫獄煬帝遽使赦之比使至岳已為㽞守所殺子宏禮等遂免從坐王珪字叔玠㓜孤性雅淡少嗜欲志量沉深能安于貧賤體道履正交不茍合叔父顯當時通儒有人倫鑒嘗謂所親曰門户所寄唯此兒後為禮部尚書兼魏王師劉山伯河間景城人弟武周為人驍勇善騎射交通豪俠山伯每誡之曰汝不擇交逰終當滅吾族也數詈辱之隋末作亂伏誅蘇震京兆武功人也少以門䕃補千牛聰敏好學博渉經史年未冠志學有老成人風伯頊異之嘗謂所親曰吾家有子矣後為河南尹任瓌字瑋廬州合肥人陳鎮東大将軍蠻奴弟之子也父七寳仕陳定逺太守瓌早孤蠻奴爱之情踰己子毎稱曰吾子姪雖多並傭保爾門户所寄唯在於瓌後終通州都督韋叔夏京兆萬年人隋太傅鄖國公孝寛之曾孫也叔夏㓜而博渉經史尤精三禮其叔父太子瞻事琨嘗曰汝能如是可以繼丞相業矣後終國子祭酒封沛國郡公崔液湜之子也液尤善五言湜嘆曰海子我家之神駒也海子即液小名後官至殿中侍御史蕭復字履初太子太師嵩之孫新昌公主之子父衡大僕卿駙馬都尉復生於戚里少秉清操其羣從兄弟競餙輿馬以侈靡相高復衣澣濯之衣獨居室習學不倦非詞人儒士不與之逰伯父華毎嘆異之曰興吾門者必此子也後拜吏部尚書平章事李造遜兄也遜㓜孤寓居江陵與其弟建皆安貧講習不倦造知二弟賢為營丐成其志業兄弟同致休顯漢李松小字大醜㓜而聰敏其父有袁許之鑒嘗謂宗人李鏻曰大醜生處竒形氣異前途應不居徒勞之地頼君誨激之後果至公輔李周邢州人父矩嘗謂周曰邯鄲北接戰國用武之地時事未寕汝果勇抱義當以軍旅之事興我門族後周以軍功歴黔豳徐安雍汴六州節度權開封尹卒册府元龜卷八百十九
