body:
  text: 册府元龜卷七百四十九宋王欽若等撰陪臣部構患夫内懐隱慝心專樂禍㒺念乎紓難姑務於構怨茍利於已貽患於國斯蓋臣之不令而人之無良者歟春秋之世施及六國諸侯力政征伐自出乃有參家陪之列總兵賦之職預公族之齒居嬖御之昵不念乎令德之訓狥於公家之利怙亂以肆志興戎而致擾因私憾而忘本恃外援而傾宗以至干戈日尋禍釁交作燎原之勢暴起發矢之悔莫追其有積稔之自貽夷㓕之是取名在國策為世大戮不為不幸也石制鄭大夫魯宣公十二年春楚子圍鄭是役也石制實入楚師將以分鄭而立公子魚臣辛未鄭殺僕叔及子服僕叔魚臣也子服石制也君子曰史佚所謂毋怙亂者謂是類也言恃人之亂以要利詩曰亂離瘼矣爰其適歸詩小雅離憂也瘼病也爰於也言禍亂憂病於何所歸乎歎之歸於怙亂者也先縠晉大夫魯宣公十三年秋赤狄伐晉及清先縠召之也邲戰不得志故召狄欲為變清一名清原宣伯魯大夫叔孫僑如也成公十六年公出于壊隤壊隤魯邑齊衛皆後非獨魯明晉以僑如故不見公宣伯通於穆姜穆姜成公母欲去季孟以取其室季文子孟獻子將行穆姜送公而使逐二子公以晉難告㑹晉伐鄭曰請反而聽命姜怒公子偃公子鉏趨過二子公庶弟指之曰女不可是皆君也言欲廢公更立君公待於壊隤申宫儆備申勑官備設守而後行是以後後晉楚戰期使孟獻子守于公宫秋㑹于沙隨謀伐鄭也鄭猶未服宣伯使告郤犨曰魯侯待于壊隤以待勝者觀晉楚之勝負郤犨將新軍且為公族大夫以主東諸侯主齊魯之屬取貨于宣伯而訴公于晉侯訴譛也晉侯不見公七月公㑹尹武公及諸侯伐鄭將行姜又命公如初復欲使公逐季孟公又申守而行諸侯之師次于鄭西我師次于督陽不敢過鄭督陽鄭東地子叔聲伯使叔孫豹請逆于晉師豹叔孫僑如弟也僑如於是遂作亂豹因奔齊為食於鄭郊師逆以至聲伯戒叔孫以必須所逆晉師至乃食聲伯四日不食以待之食使者使者豹之介而後食言其忠也宣伯使告郤犨曰魯之有季孟猶晉之有欒范也政令於是乎成今其謀曰晉政多門不可從也政不由君寧事齊楚有亡而已蔑從晉矣蔑無也若欲得志於魯請止行父而殺之行父季文子也我斃蔑也蔑孟獻子時留守公宫而事晉蔑有二矣魯不二小國必睦不然歸必叛矣九月晉人執季文子于苕丘公還待于鄆鄆魯西邑東郡稟丘縣東有鄆城使子叔聲伯請季孫于晉郤犨曰茍去仲孫蔑而止季孫行父吾與子國親於公室親魯甚於晉公室對曰僑如之情子必聞之矣聞其滛慝情若去蔑與行父是大棄魯國而罪寡君也若猶不棄而惠徼周公之福使寡君得事晉君則夫二人者魯國社稷之臣也若朝亡之魯必夕亡以魯之宻邇仇讐仇讐謂齊楚亡而為讐治之何及言魯屬齊楚則還為晉讐卻犨曰吾為子請邑對曰嬰齊魯之常𨽻也𨽻賤官敢介大國以求厚焉介因焉承寡君之命以請承奉也若得所請吾子之賜多矣又何求范文子謂欒武子曰季孫於魯相二君矣二君宣成妾不衣帛馬不食粟可不謂忠乎信䜛慝而棄忠良若諸侯何子叔嬰齊奉君命無私無私不受卻犨請邑謀國家不貳謂四日不食以堅事晉圖其身不忘其君辭邑不食皆先君而後身若虚其請是棄善人也子其圖之乃許魯平赦季孫冬十月出叔孫僑如而盟之僑如奔齊諸大夫共盟以僑如為戒十二月季孫及郤犨盟于扈歸刺公子偃偃與鉏俱為姜所指而獨殺偃偃與謀召叔孫豹于齊而立之近此七月聲伯使豹請逆於晉聞魯人將討僑如豹乃避其難先奔齊生二子而魯乃召之故襄二年豹始見經傳於此因言其終胥童晉大夫魯成公十七年冬晉殺其大夫郤錡郤犨郤至晉厲公侈多外嬖外嬖愛幸大夫反自鄢陵欲盡去羣大夫而立其左右胥童以胥克之廢也怨郤氏童胥克之子宣八年郤缺廢胥克而嬖於厲公郤錡奪夷陽五田五亦嬖於厲公郤犨與長魚矯爭田執而梏之梏械之與其父母妻子同一轅繫之車中既矯亦嬖於厲公欒書怨郤至以其不從已而敗楚師也欲廢之鄢陵戰欒書欲固壘郤至言楚有六間以取勝也使楚公子茷告公曰此戰也郤至實召寡君鄢陵戰晉囚公子茷以歸以東師之未至也齊魯衛之師與軍帥之不具也曰此必敗荀瑩佐下軍居守郤犨將新軍乞師故言不具吾因奉孫周以事君孫周襄公曾孫悼公君楚王公告欒書書曰其有焉不然豈其死之不恤而受敵使乎謂鄢陵戰時楚子問郤至以弓君盍嘗使諸周而察之嘗試也郤至聘于周欒書使孫周見之公使覘之信覘伺也遂怨郤至厲公田與婦人先殺而飲酒後使大夫殺傳言厲公無道先婦人而後卿佐郤至奉豕進之於公寺人孟張奪之寺人奄士郤至射而殺之公曰季子欺余季子郤至公反以為郤至奪孟張豕厲公將作難胥童曰必先三郤族大多怨去大族不逼不逼公室敵多怨有庸討多怨者易有功公曰然郤氏聞之郤錡欲攻公曰雖死君必危郤至曰人所以立信智勇也信不叛君知不害民勇不作亂失兹三者其誰與我死而多怨將安用之言俱死無用多其怨咎君實有臣而殺之其謂君何我之有罪而死後矣若殺不辜將失其民欲安得乎言不得安君位待命而已受君之禄是以聚黨有黨而爭命爭死命罪孰大焉傳言郤至無反心壬午胥童夷羊五帥甲八百將攻郤氏八百人長魚矯請無用衆公使清沸魋助之沸魋亦嬖人抽戈結衽衽裳際而偽訟者偽與清沸魋訟三郤將謀於榭榭講武堂矯以戈殺駒伯苦成叔于其位位所坐處也駒伯郤錡苦成叔郤犨温季曰逃威也遂趨郤至本意欲禀君命而死今矯等不以君命而來故欲逃㓙賊為害故曰威言可畏也或曰威當為藏矯及諸其車以戈殺之皆尸諸朝陳其尸於朝胥童以甲刼欒書中行偃于朝矯曰不殺二子憂必及君公曰一朝而尸三卿余不忍益也對曰人將忍君人謂書與偃也臣聞亂在外為姦在内為宄御姦以德德綏逺御宄以刑刑治近不施而殺不可謂德臣偪而不討不可謂刑德刑不立姦宄並至臣請行遂出奔狄行去也公使辭於二子辭謝書與偃曰寡人有討於郤氏郤氏既伏其辜矣大夫無辱其復職位胥童刼而執之故云辱皆再拜稽首曰君討有罪而免臣於死君之惠也二臣雖死敢忘君德乃皆歸公使胥童為卿公遊于匠麗氏匠麗嬖大夫家欒書中行偃遂執公焉召士匄士匄辭辭不往召韓厥韓厥辭曰昔吾畜於趙氏孟姬之䜛吾能違兵畜養也違去也韓厥少為趙盾所待養及孟姬之亂晉將討趙氏而厥去其兵示不與黨言此者明無所偏助孟姬亂在八年古人有言曰殺老牛莫之敢尸而况君乎二三子不能事君焉用厥也尸主也閏月乙卯晦欒書中行偃殺胥童以其刼已故民不與郤氏胥童道君為亂故皆書曰晉殺其大夫厲公以私欲殺三郤而三郤死不以無罪書書以家怨害胥童而胥童受國討文明郤氏失民胥童道亂宜其為國戮子駟鄭公子也魯襄公八年冬楚子嚢伐鄭討其侵蔡也子駟子國子耳欲從楚子孔子蟜子展欲待晉待晉來救子孔穆公子子蟜子游子子展子罕子子駟曰周詩有之曰俟河之清人壽㡬何逸詩也言人夀促而河清遲喻晉之不可待兆云詢多職競作羅兆卜詢謀也職主也言既卜且謀多則競作羅網之難無成功謀之多族民之多違族家也事滋無成滋益也民急矣姑從楚以紓吾民晉師至吾又從之敬共幣帛以待來者小國之道也犧牲玉帛待於二竟二竟晉楚界上以待强者而庇民焉㓂不為害民不罷病不亦可乎子展曰小所以事大信也小國無信兵亂日至亡無日矣五㑹之信謂三年㑹雞澤五年㑹戚又㑹城棣七年㑹鄢八年㑹邢丘今將背之雖楚救我將安用之言失信得楚不足貴親我無成晉親鄭鄙我是欲楚欲以鄭為鄙邑而反欲與成不可從也言子駟不可從不如待晉晉君方明四軍無闕八卿和睦必不棄鄭四軍謂上中下新軍也軍有二卿楚師遼逺糧食將盡必將速歸何患焉舎之聞之舎之子展名杕莫如信完守以老楚杖信以待晉不亦可乎子駟曰詩云謀夫孔多是用不集詩小雅孔甚也集就也言人欲為政是非相亂而不成發言盈庭誰敢執其咎言謀者多若有不善無適受其咎如匪行邁謀是用不得于道匪彼也行邁謀謀於路人也不得于道衆無適從請從楚騑也受其咎騑子駟名乃及楚平使王子伯駢告于晉伯駢鄭大夫曰君命敝邑修而車賦儆而師徒以討亂畧蔡人不從敝邑之人不敢寧處悉索敝賦索盡也以討于蔡獲司馬爕獻于邢丘今楚來討曰女何故稱兵于蔡稱舉也焚我郊保郭外曰郊保守也馮陵我城郭馮廹也敝邑之衆夫婦男女不皇啟處以相救也皇暇也啟跪也翦焉傾覆無所控告翦盡也控引也民死亡者非其父兄即其子弟夫人愁痛夫人猶人人也不知所庇民知窮困而受盟于楚孤也與其二三臣不能禁止孤鄭伯不敢不告知武子使行人子員對之曰君有楚命見討之命亦不使一介行李告于寡君一介獨使也行李行人也而即安于楚君之所欲也誰敢違君寡君將帥諸侯以見于城下唯君圖之明年晉伐鄭子孔鄭公子也魯襄公十八年冬楚伐鄭子孔欲去諸大夫欲專權將叛晉而起楚師以去之使告子庚子庚弗許子庚楚令尹公子午楚子聞之使揚豚尹宜告子庚曰國人謂不穀主社稷而不出師死不從禮不能承先君之業死將不得從先君之禮不榖即位於今五年師徒不出人其以不榖為自逸而忘先君之業矣謂己未嘗統師自出大夫圖之其若之何子庚歎曰君王其謂午懐安乎吾以利社稷也見使者稽首而對曰諸侯方睦于晉臣請嘗之嘗試其難易也若可君而繼之不可收師而退可以無害君亦無辱子庚帥師治兵於汾襄城縣東北有汾丘城於是子蟜伯有子張從鄭伯伐齊子張公孫黑肱子孔子展子西守二子知子孔之謀二子子展子西完守入保完城郭内保守子孔不敢㑹楚師楚師伐鄭次于魚陵魚陵魚齒山也在南陽犨縣北鄭地右師城上棘遂渉潁次于旃然將渉潁故於水邊權築山城以為進退之備旃然水出滎陽成臯縣東入汴蒍子馮公子格率銳師侵費滑胥靡獻于雍梁胥靡獻于雍梁皆鄭邑河南陽翟縣東北有雍氏城右回梅山在滎陽宻縣東北侵鄭東北至于蟲牢而反子庚門于純門信于城下而還信再宿也渉于魚齒之下魚齒山之下有􅓳水故言渉甚雨及之楚師多凍役徒㡬盡析公楚大夫也魯襄公二十六年蔡大夫聲子使於晉還如楚謂楚令尹子木曰子儀之亂析公奔晉在文十四年晉人寘諸戎車之殿以為謀主殿後軍繞角之役晉將遁矣析公曰楚師輕窕易震蕩也若多皷均聲以夜軍之均同其聲楚師必遁晉人從之楚師宵潰晉遂侵蔡襲沈獲其君敗申息之師於桑隧獲申麗而還成六年晉欒書救鄭與楚師遇於繞角楚師還晉侵沈獲沈子八年楚復敗申息獲申麗鄭於是不敢南靣楚失華夏則析公之為也雍子楚大夫也雍子之父兄譖雍子君與大夫不善是也不是其曲直雍子奔晉晉人與之鄐鄐晉邑以為謀主彭城之役晉楚遇於靡角之谷在成十八年晉將遁矣雍子發命於軍曰歸老㓜反孤疾二人役歸一人簡兵蒐乗簡擇蒐閱秣馬蓐食師陳焚次次舎也焚舎示必死明日將戰行歸者而逸楚囚欲使楚知之楚師宵潰晉降彭城而歸諸宋以魚石歸在元年楚失東夷子辛死之則雍子之為也楚東小國及陳見楚不能敕彭城皆叛五年楚人討陳叛故殺令尹子辛子靈楚大夫也楚子反與子靈爭夏姬子靈巫臣而雍害其事子反亦雍害巫臣不使得取夏姬子靈奔晉晉人與之邢邢晉邑以為謀主扞禦北狄通吳於晉教吳叛楚教之乗車射御驅侵使其子狐庸為吳行人焉吳於是伐巢取駕克棘入州來駕棘皆楚邑譙國鄼縣東北有棘亭楚罷於奔命至今為患則子靈之為也事見成七年苖賁皇楚大夫也楚莊王時若敖之亂伯賁之子賁皇奔晉晉人與之苖苖晉邑以為謀主鄢陵之役楚晨壓晉軍而陳晉將遁矣苖賁皇曰楚師之良在其中軍王族而已言楚之精卒唯在中軍若塞井夷竈成陳以當之塞井夷竈以為陳欒范易行以誘之欒書時將中軍范爕佐之易行謂簡易兵備欲令楚貪已不復顧二穆之兵中行二郤必克二穆郤錡時將上軍中行偃佐之郤至佐新軍令此三人分良以攻二穆之兵楚子重子辛皆出穆王故曰二穆吾乃四萃於其王族必大敗之四萃四面集攻之晉人從之楚師大敗王夷師熸夷傷也吳楚之間謂火滅為熸子反死之鄭叛吳興楚失諸侯則苖賁皇之為也慶封齊大夫也魯襄公二十七年春慶封來聘初崔杼生成及强而寡偏䘮曰寡寡特也娶東郭姜生明東郭姜以孤入曰棠無咎無咎棠公之子與東郭偃相崔氏東郭偃姜之弟崔成有疾而廢之有惡疾也而立明成請老于崔濟南東朝陽縣西北有崔氏城成欲居崔邑以終老崔子許之偃與無咎弗予曰崔宗邑也必在宗主宗邑宗廟所在宗主為崔明成與强怒將殺之告慶封曰夫子之身亦子之所知也唯無咎與偃是從父兄莫得進矣大恐害夫子敢以告夫子謂崔杼慶封曰子姑退吾圖之告盧蒲嫳嫳慶封属大夫封以成彊之言告嫳盧蒲嫳曰彼君之讐也天或者將棄彼矣彼實家亂子何病焉君謂齊莊公為崔杼所殺崔之薄慶之厚也崔敗則慶專權他日又告成彊復告慶封曰茍利夫子必去之難吾助女九月庚辰崔成崔彊殺東郭偃棠無咎於崔氏之朝崔子怒而出其衆皆逃求人使駕不得使圉人駕寺人御而出圉人飬馬者寺人奄士且曰崔氏有福止余猶可恐滅家禍不止其身遂見慶封慶封曰崔慶一也言如一家是何敢然請為子討之使盧蒲嫳帥甲以攻崔氏崔氏堞其宫而守之堞短垣使其衆居短垣内以守弗克使國人㫑之遂滅崔氏殺成與彊而盡俘其家其妻縊妻東郭姜嫳復命於崔子且御而歸之嫳為崔氏御至則無歸矣乃縊崔明夜辟諸大墓開先人之冢以藏之辛巳崔明來奔慶封當國當國秉政二十八年慶封使諸亡人得賊者以告而反之亡人辟崔氏難出奔者故反盧蒲癸癸臣子之子之慶舎有寵妻之子之以其女妻癸慶舎之士謂盧蒲癸曰男女辯姓子不辟宗何也辯别也别姓而後可相取慶氏盧蒲氏皆姜姓曰宗不余辟言舎欲妻已余獨焉辟之賦詩斷章余取所求焉惡識宗言已茍欲有求于慶氏不能復顧禮譬如賦詩者取其一章而已癸言王何而反之二人皆嬖二子皆莊公黨二十五年崔氏殺莊公癸何出奔今還求寵於慶氏欲為莊公報讐使執寢戈而先後之寢戈親近兵伏公膳日䨇鷄卿大夫之膳食饔人竊更之以鶩御者知之則去其肉而以其洎饋御進食者饔人御者欲使諸大夫怨慶氏减其膳蓋盧蒲癸王何之謀子雅子尾怒二子皆惠公孫慶封告盧蒲嫳以二子怒告嫳盧蒲嫳曰譬之如禽獸吾寢處之矣言能殺而席其皮慶封之亂陳無宇濟水而戕舟發梁戕傷壊也不欲慶封得敕難盧蒲姜謂癸曰有事而不告我必不㨗矣姜癸妻慶舎女癸告之告欲殺慶舎姜曰夫子愎莫之止將不出我請止之夫子謂慶舎癸曰諾十一月乙亥嘗於太公之廟慶舎涖事臨祭事盧蒲姜告之且止之弗聽曰誰敢者遂如公至公所麻嬰為尸為祭尸慶集為上獻上獻先獻者盧蒲癸王何執寢戈慶氏以其甲環公宫廟在宫内陳氏鮑氏之圉人為優優俳慶氏之馬善驚士皆釋甲束馬束絆之也而飲酒且觀優至于魚里魚里里名優在魚里就觀之欒髙陳鮑之徒介慶氏之甲欒子雅髙子尾陳陳須無鮑鮑國子尾抽桷擊扉三桷椽也扉門闔也以桷擊扉為期盧蒲癸自後刺子之王何以戈擊之觧其左肩猶援廟桷動於甍甍屋棟以爼壺殺人而後死言其多力遂殺慶繩麻嬰慶繩慶集公懼鮑國曰羣臣為君故也言欲尊公室非為亂陳須無以公歸稅服而如内宫言公懼於外難慶封歸遇告亂者丁亥伐西門弗克還伐北門克之入伐内宫陳鮑在公所故弗克反陳于嶽嶽里名請戰弗許遂來奔伯有鄭大夫良霄也魯襄公三十年鄭人殺良霄初伯有耆酒為窟室窟室地室而夜飲酒擊鍾焉朝至未已朝者曰公焉在家臣故謂伯有為公其人曰吾公在壑谷壑谷窟室皆自朝布路而罷布路分散既而朝伯有朝鄭君則又將使子晢如楚歸而飲酒庚子子晢以駟氏之甲伐而焚之伯有奔雍梁雍梁鄭地醒而後知之遂奔許大夫聚謀子皮曰仲虺之志仲虺湯左相云亂者取之亡者侮之推亡固存國之利也罕駟豐同生罕子皮駟子晢豐公孫叚也三家本同母兄弟伯有汰侈故不免三家同出而伯有孤特人汰侈以亡人謂子産就直助彊時謂子晢直三家彊子産曰豈為我徒徒黨也言不以駟良為黨國之禍難誰知所蔽或主强直難乃不生言能强能直則可弭難今三家未能則伯有方爭姑成吾所欲以無所附著為所辛丑子産歛伯有氏之死者而殯之不及謀而遂行不與於國謀印叚從之義子産子皮止之衆曰人不我順何止焉子皮曰夫子禮於死者况生者乎遂自止之壬寅子産入癸丑子石入子石印叚皆受盟於子晢氏乙已鄭伯及其大夫盟于大宫大宫祖廟盟國人于師之梁之外師之梁鄭城門伯有聞鄭人之盟已也怒聞子皮之甲不與攻已也喜曰子皮與我矣癸丑晨自墓門之瀆入墓門鄭城門因馬師頡介於襄庫以伐舊北門馬師頡子羽孫駟帶率國人以伐之駟帶子西之子子晢之宗主皆召子産駟氏伯有俱召子産曰兄弟而及此吾從天所與兄弟恩等故無所偏助伯有死于羊肆羊肆市列子産襚之枕股而哭之歛而殯諸伯有之臣在市側者既而葬諸斗城斗城鄭地名子駟氏欲攻子産子皮怒之曰禮國之幹也殺有禮禍莫大焉乃止歛塟伯有為有禮於是游吉如晉還聞難不入懼禍并及復命于介八月甲子奔晉駟帶追之及酸棗與子上盟用兩珪質于河子上駟帶也沈珪於河為信也酸棗留縣使公孫肹入盟大夫巳巳復歸游吉歸也書曰鄭人殺良霄不稱大夫言自外入也既出位絶非復鄭大夫僕展從伯有與之皆死僕展鄭大夫伯有黨羽頡出奔晉為任大夫羽頡即馬師頡任晉縣今屬廣平郡鷄澤之㑹在三年鄭樂成奔楚遂適晉羽頡因之與之比而事趙文子言伐鄭之說焉以宋之盟故不可宋盟約弭兵故子皮以公子孫鉏為馬師鉏子罕之子代羽頡欒施齊大夫也魯昭公十年欒施來奔齊惠欒髙氏彊於陳鮑氏而惡之惡陳鮑夏有告陳桓子曰子旗子良將攻陳鮑亦告鮑氏桓子授甲而如鮑氏遭子良醉而騁欲及子良醉故驅告鮑文子遂見文子文子鮑國則亦授甲矣使視二子二子子旗子良則皆將飲酒桓子曰彼雖不信彼傳言者聞我授甲則必逐我及其飲酒也先伐諸陳鮑方睦遂伐欒髙氏子良曰先得公陳鮑焉往欲以公自輔助遂伐虎門欲入公不聽故伐公門晏平仲端委立于虎門之外端委朝服四族召之無所往四族欒髙陳鮑其徒曰助陳鮑乎曰何善焉言無善義可助助欒髙乎曰庸愈乎罪惡不差於陳鮑然則歸乎曰君伐焉歸公召之而後入公卜使王黑以靈姑銔率吉請斷三尺焉而用之王黑齊大夫靈姑銔公旗名斷三尺不敢與君同五月庚辰戰于稷稷祀后稷之處欒髙敗又敗諸莊莊六軌之道國人追之又敗諸鹿門鹿門齊城門欒施髙彊來奔髙疆不書非卿陳鮑分其室叔仲子魯大夫昭公十二年季平子立而不禮于南蒯蒯南遺之子季氏費邑宰南蒯謂子仲子仲公子憗吾出季氏而歸其室於公室季氏家財子更其位更代也我以費為公臣子仲許之南蒯語叔仲穆子且告之故穆子叔仲帶之子叔仲小也語以欲出季氏以不見禮故季悼子之卒也叔孫昭子以再命為卿悼子季武子之子平子父也傳言叔孫之見命乃在平子為卿之前及平子伐莒克之更受三命十年平子伐莒以功加三命昭子不伐莒亦以例加為三命叔仲子欲構二家欲構使相爭謂平子曰三命踰父兄非禮也言昭子受三命自踰其先人平子曰然故使昭子使昭子自貶黜昭子曰叔孫氏有家禍殺適立庶故婼也及此禍在四年若因禍以斃之則聞命矣言因亂討已不敢辭若不廢君命則固有著矣著位次昭子朝而命吏曰婼將與季氏訟書辭無頗頗偏也季孫懼而歸罪於叔仲子故叔仲小南蒯公子憗謀季氏憗告公而遂從公如晉憗子仲南蒯懼不克以費叛如齊子仲還及衛聞亂逃介而先介副使也及郊聞費叛遂奔齊言及郊觧經所以書出南蒯之將叛其鄉人或知之過之而歎鄉人過蒯而歎且言曰恤恤乎湫乎攸乎恤恤憂患湫愁隘攸懸危之貎深思而淺謀邇身而逺志家臣而君圖家臣而圖人君之事故言思深而謀淺身近而志逺有人矣哉言今有此人㣲以感人南蒯枚筮之不指其事汎卜吉㓙遇坤坤上坤下坤之比坤下坎上此坤六五爻變曰黃裳元吉坤六五爻辭以為大吉也示子服惠伯曰即欲有事何如惠伯曰吾嘗學此矣忠信之事則可不然必敗外彊内温忠也坎實故强坤順故温强而能温所以為忠和以率貞信也水和而土安平和平信之本也故曰黃裳元吉黃中之色也裳下之飾也元善之長也中不忠不得其色言非黃下不共不得其飾不為裳事不善不得其極失中德外内倡和為忠不相違也率事以信為共率猶行也共養三德為善三德謂正直剛克柔克也非此三者弗當非忠信善不當此卦且夫易不可以占險將何事也且可飾乎夫易猶此易謂黄裳元吉之卦問其何事欲令從下之飾中美能黃上美為元下美則裳参成可筮参美盡備吉可如筮猶有闕也筮雖吉未也有闕謂不参成將適費飲鄉人酒南蒯自其家還適費鄉人或歌曰我有圃生之杞乎言南蒯在費欲為亂如杞生於園圃非宜也杞世所謂枸杞也從我者子乎子男子之通稱言從已可不失今之尊去我者鄙乎倍其鄰者恥乎鄰猶親也已乎已乎非吾黨之士乎已乎已乎言自遂不改平子欲使昭子逐叔仲小欲以自解說小聞之不敢朝昭子命吏謂小待政於朝曰吾不為怨府言不能為季氏逐小生怨禍之聚觀從楚人也魯昭公十三年楚公子棄疾殺公子比初楚子之為令尹也殺大司馬薳掩而取其室在襄三十年及即位奪薳居田居掩之族言薳氏所以怨遷許而質許圍遷許在九年圍許大夫蔡洧有寵於王王之滅蔡也其父死焉楚滅蔡在十一年洧仕楚其父在國故死王使與於守而行使洧守國王行至乾谿申之㑹越大夫戮焉申㑹在四年王奪鬭韋龜中犨韋龜令尹子文𤣥孫中犨邑名又奪成然邑而使為郊尹成然韋龜子郊尹治郊竟大夫蔓成然故事蔡公蔡公棄疾也故猶舊也韋龜以棄疾有當璧之命故使成然事之故薳氏之族及薳居許圍蔡洧蔓成然皆王所不禮也因羣䘮職之族啟越大夫常夀過作亂常夀過申㑹所戮者圍固城克息舟城而居之息舟楚邑城之堅固者觀起之死也其子從在蔡事朝吳觀起死在襄二十二年朝吳故蔡大夫聲子之子曰今不封蔡蔡不封矣我請試之觀從以父死怨楚故欲試作亂以蔡公之命召子干子晢二子皆靈王弟元年子干奔晉子晢奔鄭及郊而告之情告以蔡公不及謀强與之盟入襲蔡蔡公將食見之而逃不知其故驚起辟之觀從使子干食坎用牲加書而速行使子干居蔡公之牀食蔡公之食並偽與蔡公盟之徵騐以示衆已狥于蔡已觀從也曰蔡公召二子將納之與之盟而遣之矣將師而從之詐言蔡公將以師助二子蔡人聚將執之執觀從辭曰失賊成軍而殺余何益乃釋之賊謂子干子晢也言蔡公已成軍殺已不解罪朝吳曰二三子若能死亡則如違之以待所濟言若能為靈王死亡則可違蔡公之命以待成敗所在若求安定則如與之以濟所欲言與蔡公則可得安定且違上何適而可言不可違上也上謂蔡公衆曰與之乃奉蔡公召二子而盟于鄧潁川召陵縣西南有鄧城二子子干子晢依陳蔡人以國國陳蔡而依之楚公子比子干公子黑肱子晢公子棄疾蔡公蔓成然蔡朝吳帥陳蔡不羮許葉之師因四族之徒四族薳氏許圍蔡洧蔓成然以入楚及郊陳蔡欲為名故請為武軍欲築壘壁以示後人為復讐之名蔡公知之曰欲速且役病矣請藩而已乃藩為軍藩籬也蔡公使須務牟與史俾先入因正僕人殺太子禄及公子罷敵須務牟史俾楚大夫蔡公之黨也正僕太子之近官公子比為王公子黑肱為令尹次于魚陂竟陵縣城西有丼魚陂公子棄疾為司馬先除王宫使觀從從師于乾谿而遂告之從乾谿之師告使叛靈王且曰先歸復所後者劓劓截鼻師及訾梁而潰靈王還至訾梁而衆散公子鐸莒羣公子也魯昭十四年秋八月莒著丘公卒郊公不慼郊公著丘公子國人弗順欲立著丘公之弟庚輿庚輿莒共公蒲餘侯惡公子意恢而善於庚輿蒲餘侯莒大夫茲夫也意恢莒羣公子郊公惡公子鐸而善於意恢鐸亦羣公子公子鐸因蒲餘侯而與之謀曰爾殺意恢我出君而殺庚輿許之為下冬殺意恢傳冬十二月蒲餘侯茲夫殺莒公子意恢郊公奔齊公子鐸逆庚輿於齊齊隰黨公子鉏送之有賂田莒賂齊以田費無極為楚大夫朝吳之在蔡也無極欲去之乃謂之曰王唯信子故處子於蔡子亦長矣而在下位辱必求之吾助子請又謂其上之人曰王唯信吳故處諸蔡二三子莫之如也而在其上不亦難乎弗圖必及於難蔡人逐朝吳朝吳出奔鄭齊豹衛大夫魯昭公二十年秋盗殺衛侯之兄縶初衛公孟縶狎齊豹公益靈公兄也齊豹齊惡之子為衛司冦狎輕也奪之司冦與鄄鄄豹邑有役則反之縶足不良故有役則以官邑還豹使行公孟惡北宫喜禇師圃欲去之喜貞子公子朝通于襄夫人宣姜宣姜靈公嫡母懼而欲以作亂故齊豹北宫喜禇師圃公子朝作亂初齊豹見宗魯于公孟薦逹也為驂乗焉為公孟驂乗將作亂而謂之曰公孟之不善子所知也勿與乗吾將殺之對曰吾由子事公孟子假吾名焉故不吾逺也言子借我以善名故公孟親近我也雖其不善吾亦知之抑以利故不能去是吾過也今聞難而逃是僣子也使子言不信也子行事乎吾將死之以周事之周猶終竟也而歸死於公孟其可也丙辰衛侯在平壽平夀衛下邑公孟有事於蓋獲之門外冇事祭也蓋獲衛郭門齊子氏帷於門外而伏甲焉齊豹之家使祝鼃寘戈於車薪以當門要其前也使一乗從公孟以出亦如前車寘戈於薪尋其後使華齊御公孟宗魯驂乗及閎中閎曲門中齊氏用戈擊公孟宗魯以背蔽之斷肱以中孟公之肩皆殺之齊氏之宰渠子召北宫氏子北宫喜也北宫氏之宰不與聞謀殺渠子遂伐齊氏滅之公子城宋平公子也魯昭公二十年冬宋華亥向寧華定出奔陳與君爭而出宋華向之亂公子城平公子公孫忌樂舎舎樂喜孫司馬彊向宜向鄭宜鄭皆向戌子楚建建平王之亡太子郳甲小邾穆公子出奔鄭八子宋大夫皆公黨辟難出奔其徒與華氏戰于鬼閻八子之徒衆也潁川長平縣西北有閻亭敗子城子城適晉子城為華氏所敗别走至晉為明年子城以晉師至起本二十一年宋華亥向寧華定自陳入于宋南里以叛自外至故曰入據其邑故曰叛南里宋城内里名初華費遂生華貙華多僚華登貙為少司馬多僚為卿士公御士與貙相惡乃譛諸公曰貙將納亡人亡人華亥等亟言之公曰司馬以吾故亡其良子司馬謂費遂良子謂華登死亡有命吾不可以再亡之對曰君若愛司馬則如亡言若愛大司馬則當亡走失國死如可逃何逺之有言亡可以逃死勿慮其逺以恐動公公懼使侍人召司馬之侍人宜僚飲之酒而使告司馬告司馬使逐貙司馬歎曰必多僚也吾有䜛子而弗能殺吾又不死抑君有命可若何乃與公謀逐華貙將使田孟諸而遣之公飲之酒厚酬之酬酒幣賜及從者司馬亦如之亦如公賜張匄尤之張匄華貙臣尤恠賜之厚曰必有故使子皮承宜僚以劔而訊之子皮華貙訊問也宜僚盡以告告欲因田以遣之張匄欲殺多僚子皮曰司馬老矣登之謂甚言登亡傷司馬心已甚吾又重之不如亡也五月丙申子皮將見司馬而行則遇多僚御司馬而朝張匄不勝其怒遂與子皮曰任鄭翩殺多僚任翩亦貙家臣刼司馬以叛而召亡人壬寅華向入樂大心豐愆華牼禦諸横梁國睢陽縣南有横亭華氏居盧門以南里叛盧門宋東城南門六月庚午宋城舊鄘及桑林之門而守之舊鄘故城也桑林城門名十一月癸未公子城以晉師至季孫魯卿也昭公二十一年夏晉士鞅來聘叔孫為政叔孫昭子以三命為國政季孫欲惡諸晉憎叔孫在巳上位欲使得罪於晉使有司以齊鮑國歸費之禮為士鞅鮑國歸費在十四年禮各如其命數魯人失禮故為鮑國七牢士鞅怒曰鮑國之位下其國小而使鞅從其牢禮是卑敝邑也將復諸寡君魯人恐加四牢焉為十一牢言魯不能以禮事大國季公婼魯大夫昭公二十五年九月乙亥公孫于齊初季公鳥娶妻于齊鮑文子生申公鳥季公亥之凡平子庻叔父公鳥死季公亥與公思展與公鳥之臣申夜姑相其室公亥即公若也展季氏族相治也及季姒與饔人擅通季姒公鳥妻鮑文子女饔人食官而懼乃使其妾抶已以示秦遄之妻秦遄魯大夫妻公鳥妹秦姬也曰公若欲使余余不可而抶余又訴于公甫公甫平子弟曰展與夜姑將要余要刼我以非禮秦姬以告公之公之亦平子弟公之與公甫告平子平子拘展於卞而執夜姑將殺之公若泣而哀之曰殺是是殺余也將為之請平子使竪勿内日中不得請有司逆命執夜姑之有司欲迎受殺生之命公之使速殺之故公若怨平子季郈之鷄鬭季平子郈昭伯二家相近故鷄鬭季氏介其鷄㹗芥子播其羽也或曰以膠沙播之為介鷄郈氏為之金鉅平子怒怒其不下巳益宫於郈氏侵郈氏室以自益且讓之讓責也故郈昭伯亦怨平子臧昭伯之從弟㑹昭伯臧為子為讒於臧氏而逃於季氏臧氏執旃平子怒拘臧氏老將禘於襄公萬者二人其衆萬於季氏禘祭也萬舞也於禮公當三十六人臧孫曰此之謂不能庸先君之廟不能用禮也蓋襄公别立廟大夫遂怨平子公若獻弓於公為公為昭公子務人且與之出射于外而謀去季氏公為告公果公賁果賁皆公為弟公果公賁使寺人僚柤告公公寢將以戈擊之乃走公曰執之亦無命也獨言執之無𠡠命懼而不出數月不見公不怒又使言公執戈以懼之乃走又使言公曰非小人之所及也謂僚柤為小人公果自言公以告臧孫臧孫以難言難逐告郈孫郈孫以可勸告子家懿伯子家覊莊公之𤣥孫懿伯曰䜛人以君徼幸事若不克君受其名受惡名不可為也舎民數世以求克事不可必也且政在焉其難圖也公退之退使去辭曰臣與聞命矣言若洩臣不獲死乃館於公恐受洩命之罪故留公宫以自明叔孫昭子如闞闞魯邑公居於長府官府名九月戊戌伐季氏殺公之于門遂入之平子登臺而請曰君不察臣之罪使有司討臣以干戈臣請待於沂上以察罪弗許魯城南自有沂水平子欲出城待罪也大沂水出蓋縣南至下邳入泗請囚于費弗許請以五乗亡弗許子家子曰君其許之政自之出久矣隱民多取食焉隱約窮困為之徒者衆矣日入慝作弗可知也慝姦惡也日𡨕姦人將起叛君助季氏不可知衆怒不可蓄也季氏衆蓄而弗治將蕰蕰積也薀蓄民將生心生心同求將合與季氏同求叛君者君必悔之弗聽郈孫曰必殺之公使郈孫逆孟懿子懿子仲孫何忌叔孫氏之司馬鬷戾言於其衆曰若之何莫對衆疑所助又曰我家臣也不敢知國凡有季氏與無於我孰利皆曰無季氏是無叔孫氏也鬷戾曰然則救諸帥徒以往䧟西北隅以入䧟公圍也公徒釋甲執氷而踞言無戰心也氷櫝丸盖或云櫝丸是箭筩其盖可以取飲遂逐之逐公徒孟氏使登西北隅以望季氏見叔孫氏之旌以告孟氏執郈昭伯殺之于南門之西遂伐公徒子家子曰諸臣偽刼君者而負罪以出君止使若非君本意君自可止不出意如之事君也不敢不改意如季平子名公曰余不忍也與臧孫如墓謀辭先君且謀所奔遂行巳亥公孫于齊次于陽州齊侯將唁公于平隂公先至于野井齊侯曰寡人之罪也使有司待於平隂為近故也齊侯自咎本不𠡠有司逺詣陽州而欲近㑹于平隂故令魯侯過其先至野井逺見迎逆自咎以謝公書曰公孫于齊次于陽州齊侯唁公于野井禮也將求于人則下之禮之善物也物事也謂先往至野井齊侯曰自莒疆以西請致千社二十五家為社千社二萬五千家欲以給公以待公命待君伐季氏之命寡人將帥敝賦以從執事唯命是聽君之憂寡人之憂也公喜子家子曰天祿不再天若胙君不過周公以魯足矣失魯而以千社為臣誰與之立為齊臣且齊君無信不如早之晉弗從臧昭伯率從者將盟載書曰戮力一心好惡同之信罪之有無信明也處者冇罪從者無罪繾綣從公無通内外繾綣不離散以公命示子家子子家子曰如此吾不可以盟覊也不佞不能與二三子同心而以為皆有罪從者䧟君留者逐君皆有罪也或欲通外内且欲去君二三子好亡而惡定焉可同也䧟君於難罪孰大焉通外内而去君君將速入弗通何為而何守焉乃不與盟何必守公昭子自闞歸見平子平子稽顙曰子若我何昭子曰人誰不死子以逐君成名子孫不忘不亦傷乎將若子何平子曰茍使意如得改事君所謂生死而肉骨也昭子從公于齊與公言子家子命適公館者執之恐從者知叔孫謀公與昭子言於幄内曰將安衆而納公昭子請歸安衆公徒將殺昭子伏諸道伏兵左師展告公公使昭子自鑄歸辟伏兵平子有異志不欲復納公冬十月辛酉昭子齊於其寢使祝宗祈死戊辰卒恥為平子所欺因祈而自殺左師展將以公乗馬而歸公徒執之展魯大夫欲與公俱輕歸夷射姑邾大夫也魯定公二年冬邾莊公與夷射姑飲酒私出出辟酒閽乞肉焉奪之杖以敲之奪閽杖以敲閽頭也為明年邾卒傳三年春二月辛卯邾子在門臺門上有臺臨廷閽以缾水沃廷邾子望見之怒閽曰夷射姑旋焉旋小便命執之見其不潔執射姑弗得滋怒自投于牀廢于鑪炭爛遂卒廢墮也先葬以車五乘殉五人欲藏中之潔故先内車及殉别為便房蓋其遺命莊公卞急而好潔故及是卞躁疾也仲梁懐魯大夫定公五年夏季平子卒既葬桓子行東野桓子意如子季孫斯及費子洩為費宰逆勞于郊桓子敬之勞仲梁懐仲梁懐弗敬懐時從桓子行輕慢子洩子洩怒謂陽虎子行之乎行逐懐也秋陽虎囚季桓子叔孫成子魯大夫定公十年夏叔孫州仇仲孫何忌帥師圍郈郈叔孫氏邑秋叔孫州仇仲孫何忌帥師圍郈初叔孫成子欲立武叔公若藐固諫曰不可藐叔孫氏之族成子立之而卒公南使賊射之不能殺公南叔孫家臣武叔之黨公南為馬正使公若為郈宰武叔既定使郈馬正侯犯殺公若弗能其圉人曰武叔之圉人吾以劔過朝公若必曰誰之劔也吾稱子以告必觀之吾偽固而授之末則可殺也偽為固陋不知禮者以劔鋒末授之使如之公若曰爾欲吳王我乎見劔向巳逆呵之鱄諸殺吳王亦用劔刺之遂殺公若侯犯以郈叛犯以不能副武叔之命故叛叛而以圍告廟故書圍武叔懿子圍郈弗克秋二子及齊師復圍郈弗克叔孫謂郈工師駟赤工師掌工匠之官曰郈非唯叔孫之憂社稷之患也將若之何對曰臣之業在揚水卒章之四言矣揚水詩唐風卒章四言曰我聞有命叔孫稽首謝其受巳命駟赤謂侯犯曰居齊魯之際而無事必不可矣無所復事子盍求事於齊以臨民不然將叛侯犯從之齊使至駟赤與郈人為之宣言於郈中詐為齊使言也曰侯犯將以郈易於齊齊人將遷郈民謂易其民人衆兇懼不欲遷駟赤謂侯犯曰衆言異矣不與始同子不如易於齊與其死也猶是郈也而得紓焉何必此言以郈民易取齊人與郈無異勝于守郈為叛人所殺齊人欲以此偪魯必倍與子地言非徒得民又將得齊地且盍多舎甲於子之門以備不虞侯犯曰諾乃多舎甲焉侯犯請易於齊齊有司觀郈將至駟赤使周走呼曰齊師至矣郈人大駭介侯犯之門甲以圍侯犯駟赤將射之偽為侯犯射郈人侯犯止之曰謀免我侯犯請行許之郈人許之駟赤先如宿宿東平無鹽縣故宿國侯犯殿每出一門郈人閉之閉其後門及郭門止之曰子以叔孫氏之甲出有司若誅之誅責也羣臣懼死駟赤曰叔孫氏之甲有物吾未敢以出物識也赤還救侯犯也犯謂駟赤曰子止而與之數數甲以相付駟赤止而納魯人侯犯奔齊齊乃致郈致其名簿趙鞅晉大夫魯定公十三年春齊侯衛侯次于垂葭使師伐晉鞅謂邯鄲午曰歸我衛貢五百家吾舎諸晉陽午許諾十年趙鞅圍衛衛人懼貢五百家鞅置之邯鄲今欲徙諸晉陽晉陽趙鞅邑歸告其父兄父兄皆曰不可衛是以為邯鄲言衛以五百家在邯鄲嘗為是故與邯鄲親而寘諸晉陽絶衛之道也不如侵齊而謀之侵齊則齊當來報欲因懼齊而徙則衛與邯鄲好不絶乃如之而歸之于晉陽欲如是謀而後歸之貢趙孟怒召午而囚諸晉陽趙鞅不察其謀謂午不用命故囚之使其從者説劔而入渉賔不可渉賔午家臣不肯説劔入欲謀叛乃使告邯鄲人曰吾私有討於午也二三子唯所欲立午趙鞅同族别封邯鄲故使邯鄲人更立午宗族遂殺午趙稷渉賔以邯鄲叛范臯夷晉大夫魯定公十三年夏六月上軍司馬籍秦圍邯鄲秋七月范氏中行氏伐趙氏之宫趙鞅奔晉陽晉人圍之范臯夷無寵於范吉射而欲為亂於范氏臯夷范氏側室子梁嬰父嬖於知文子文子荀躒文子欲以為卿韓簡子與中行文子相惡簡子韓起孫不信也中行文子荀寅也魏襄子亦與范昭子相惡襄子魏舒孫曼多也昭子范吉射故五子謀五子范臯夷梁嬰父知文子韓簡子魏襄子將逐荀寅而以梁嬰父代之逐范吉射而以范臯夷代之荀躒言於晉侯曰君命大臣始禍者死載書在河為盟書沈之河今三臣始禍而獨逐鞅刑已不鈞矣請皆逐之武子䞉鄭大夫魯哀公九年春武子䞉之嬖許瑕求邑無以與之賸罕逹也瑕武子之属請外取許之瑕請取於他國故圍宋雍丘宋皇瑗圍鄭師許瑕師每日遷舎作壘漸成輒徙舎合其圍壘合鄭師哭子姚救之大敗子姚武子賸也二月甲戌宋敗鄭師于雍丘使有能者無死惜其能也以郟張與鄭羅歸鄭之有能者闞止齊大夫魯哀公十四年齊人弑其君壬于舒州初齊簡公之在魯也闞止有寵焉簡公悼公陽生子壬也闞止子我也事在六年及即位使為政陳成子憚之驟顧諸朝成子陳常心不安故數顧之諸御鞅言於公曰陳闞不可並也君其擇焉擇用一人弗聽皇瑗宋右師也魯哀公十七年冬皇瑗奔晉皇瑗之子麋有友曰田丙而奪其兄酁般邑以與之酁般愠而行告桓司馬之臣子儀克克在下邑不與魋之亂故在子儀克適宋告夫人曰麋將納桓氏公問諸子仲子仲皇野初子仲將以杞姒之子非我為子為適子杞姒子仲妻麋曰必立伯也伯非我兄是良材子仲怒弗從故對曰右師老矣不識麋也言右師老不能為亂麋則不可知公執之執麋皇瑗奔晉召之召令還十八年春宋殺皇瑗公聞其情復皇氏之族使皇緩為右師言宋景公無常也緩瑗從子孟武伯魯大夫哀公二十五年六月公至自越前年行今還季康子孟武伯逆於五梧魯南鄙也郭重僕為公御車見二子曰惡言多矣君請盡之二子不臣之言甚多欲使公盡極以觀之公宴于五梧武伯為祝祝上壽酒惡郭重曰何肥也訾毁其貎季孫曰請飲彘飲罰之以魯國之宻邇仇讐臣是以不獲從君克免於大行又謂重也肥言重墮君逺行劬勞不宜稱肥公曰是食言多矣能無肥乎以激三桓之數食言飲酒不樂公與大夫始有惡智伯晉卿與趙韓魏共攻出公出公奔齊道死智伯乃立昭公曾孫驕是為晉懿公智伯益驕請地韓魏韓魏與之請地趙趙不與以其圍鄭之辱智伯怒遂率韓魏攻趙趙襄子懼乃奔保晉陽晉出公十一年智伯伐鄭趙簡子疾使太子毋䘏將而圍鄭智伯醉以酒灌擊毋䘏毋䘏羣臣請死之毋䘏曰君所以置毋䘏為能忍詬然亦愠智伯智伯歸因謂簡子使廢毋䘏簡子不聽毋䘏由此怨智伯田乞齊大夫安孺子元年春田乞偽事髙國者每朝乞參乗言曰子得君大夫皆自危欲謀作亂又謂諸大夫曰髙昭子可畏也及未發先之大夫從之六月田乞鮑牧乃與大夫以兵入公宫攻髙昭子昭子聞之與國惠子救公公師敗田乞之從追之曰國惠子奔莒遂反殺髙昭子晏圉奔魯圉晏嬰之子公孫閱齊大夫始成侯騶忌與田忌不善公孫閱謂成侯忌曰公何不謀伐魏田忌必將戰勝有功則公之謀中也戰不勝非前死則後北而命在公矣於是成侯言威王使田忌南之襄陵十月邯鄲㧞齊因起兵擊魏大敗之桂陵於是齊最强於諸侯自稱為王以令天下三十三年殺其大夫牟辛一作夫人三十五年公孫閱又謂成侯忌曰公何不令人操十金卜於市曰我田忌之人也吾三戰而三勝聲威天下欲為大事亦吉乎不吉乎卜者出因令人捕為之卜者驗其辭于王之所田忌聞之因遂率其徒襲攻臨淄求成侯不勝而犇李園趙人事楚始楚考烈王無子春申君患之求婦人宜子者進之甚衆卒無子趙人李園持其女弟欲進之楚王聞其不宜子恐久毋寵李園求事春申君為舎人巳而謁歸故失期還謁春申君問之狀對曰齊王使使求臣之女弟與其使者飲故失期春申君曰娉入乎對曰未也春申君曰可得見乎曰可於是李園乃進其女弟即幸於春申君知其有身李園乃與其女弟謀女弟承間以說春申君曰楚王之貴幸君雖兄弟不如也今君相楚二十餘年而王無子即百嵗後將更立兄弟則楚更立君後亦各貴其故所親君又安得長有寵乎非徒然也君貴用事久多失禮於王兄弟兄弟誠立禍且及身何以保相印江東之封乎今妾自知有身矣而人莫之知妾幸君未久誠以君之重而進妾於楚王必幸妾妾頼天有子男則是君之子為王也楚國盡可得孰與身臨不測之罪乎春申君大然之乃出李園女弟謹舎而言之楚王楚王召入幸之遂生子男立為太子以李園女弟為王后楚王貴李園園用事李園既入其女弟立為王后子為太子恐春申君語泄而益驕隂養死士欲殺春申君以滅口而國人頗有知之者春申君相二十五年楚考烈王病朱英謂春申君曰世有無妄之福又有無妄之禍今君處無妄之世事無妄之主安可以無無妄之人乎春申君曰何謂無妄之福曰君相楚二十餘年矣雖名相國實楚王也今楚王病旦暮且卒卒而君相少主因而代立當國如伊尹周公王長而反政不即遂南靣稱孤而有楚國此所謂無妄之福也春申君曰何謂無妄之禍曰李園不治國而君之仇也不為兵而養死士之日久矣楚王卒李園必先入㨿權而殺君以滅口此所謂無妄之禍也春申君曰何謂無妄之人對曰君置臣郎中楚王卒李園必先入臣為君殺李園此所謂無妄之人也春申君曰足下置之李園弱人也僕又善之且又何至此朱英知言不用恐禍及身乃亡去後十七日楚考烈王卒李園果先入伏死士於棘門之内春申君入棘門園死士俠刺春申君斬其頭投之棘門外於是遂使吏盡滅春申君之家而李園女弟初幸春申君有身而入之王所生子者遂立是為楚幽王册府元龜卷七百四十九
