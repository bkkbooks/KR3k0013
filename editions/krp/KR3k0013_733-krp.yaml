body:
  text: 册府元龜巻七百三十三宋王欽若等撰陪臣部智識第二叔詹鄭大夫也晉公子重耳出奔過鄭鄭文公弗禮叔詹諌其君曰晉公子賢而其從者皆國相且又同姓鄭之出自厲王而晉之出自武王鄭君曰諸侯亡公子過此者衆安可盡禮叔詹曰君不禮不如殺之且後爲國患鄭君不聽晉重耳返國是爲文公以無禮討鄭申繻魯大夫也初内蛇與外蛇鬬於鄭南門中内蛇死六年而厲公入公聞之問於申繻曰猶有妖乎對曰人之所忌其氣燄以取之妖繇人興也尚書洛誥無若火始燄燄未盛而進退之時以喻人心不堅正人無釁焉妖不自作人棄常則妖興故有妖孔叔鄭大夫諸侯盟王使周公召鄭伯曰吾撫女以從楚輔之以晉可以少安周公宰孔也王恨齊桓定太子之位故召鄭伯使叛齊也晋楚不服於齊故以鎭安鄭鄭伯喜於王命而懼其不朝於齊也故逃歸不盟孔叔止之曰國君不可以輕輕則失親親黨携也失親患必至患而乞盟所䘮多矣君必悔之弗聼逃其師而歸明年諸侯伐鄭子良鄭大夫也宣公九年初楚子爲厲之役故伐鄭六年楚伐鄭取成於厲既成鄭伯逃歸晉郤缺救鄭鄭伯敗楚師於柳棼柳棼鄭地國人皆喜惟子良憂曰是國之災也吾死無日矣自是晉楚交兵伐鄭十二年卒有楚子入鄭之禍子展鄭大夫也襄公二十九年塟周靈王鄭上卿有事子展使印叚徃伯有曰弱不可印叚年少官卑子展曰與其莫徃弱不猶愈乎詩云王事靡盬不遑啓處詩小雅盬不堅固也啓跪也言王事無不堅固不暇啓處東西南北誰敢寧處謂上卿堅事晉楚以蕃王室也言我固事晉楚乃所以藩屏王室王事無曠何常之有遂使印叚如周傳言周衰卑於晉楚又魯襄公二十二年十二月游眅將歸晉游眅公孫蠆子未出竟遭逆妻者奪之以館于邑舍之其邑不復行丁巳其夫攻子明殺之子明即游眅以其妻行十二月無丁巳丁巳十一月十四日也子展廢良而立太叔良游眅子太叔眅弟曰國卿君之貳也民之主也不可以茍請舍子明之類子明有罪而良又不賢故求亡妻者使復其所使游氏勿怨鄭國不討專殺之人所以抑强扶弱臨時之宜曰無昭惡也交怨則父之不修益明也子產鄭大夫子國之子襄公八年鄭人欲媚於晉使子國子耳侵蔡獲蔡司馬公子爕鄭侵蔡欲以求媚於晋子耳子良之子不言敗故以獲吿鄭人皆喜子產曰小國無文德而有武功禍莫大焉楚人來討能勿從乎從之晉師必至晉楚伐鄭自今鄭國不四五年弗得寧矣子國怒之曰爾何知國有大命而有正卿童子言焉將爲戮矣大命起師行軍之命又鄭簡公三年鄭相子駟欲自立爲君子孔使尉子殺相子駟而代之子孔又欲自立子產曰子駟爲不可誅之今又效之是亂無時息也於是子孔從之而相鄭簡公又襄公十年子孔當國代子駟爲載書以位序聽政辟自羣卿諸司各守其職位以受執政之法不得與朝政大夫諸司門子弗順將誅之子孔欲誅不順者子產止之請爲之焚書既止子孔又勸令燒除載書子孔不可曰爲書以定國衆怒而焚之是衆爲政也國不亦難乎難以至治子產曰衆怒難犯專欲難成合二難以安國危之道也不如焚書以安衆子得所欲欲爲政也衆亦得安不亦可乎專欲無成犯衆興禍子必從之乃焚書於倉門之外衆而後定不於朝内燒欲使遠近見所燒其年鄭尉止作亂殺子國子耳子西聞盜不儆而出子西公孫夏子駟子尸而追盗先臨尸而追賊盗入於北宮乃歸授甲臣妾多逃器用多䘮子產聞盜爲門者置守門庀羣司具衆官閉府庫愼閉藏完守備成列而後出兵車十七乘千二百七十五人尸而攻盜於北宮子蟜帥國人助之殺尉止子師僕盗衆盡死侯晉奔晋堵女父司臣尉翩司齊奔宋尉翩尉止子司齊司成子又襄二十六年楚子及秦人侵鄭印堇父與皇頡戌城麋印堇父鄭大夫楚人囚之以獻於秦鄭人取貨於印氏以請之子太叔爲令正主作辭令之正以爲請子產曰不獲謂太叔辭以貨請堇父必不得受楚之功而取貨於鄭不可謂國秦其不然受楚獻功大名也以貨免之小利故謂秦不爾若曰拜君之勤鄭國㣲君之惠楚師其猶在敝邑之城下其可辭如此堇父可得弗從遂行秦人不予更幣從子產而獲之更遣使執幣用子產辭乃得堇父傳稱子產之善又楚子伐鄭鄭人將禦之子產曰晉楚將平諸侯將和楚王是故昧於一來昧謂貪昧不如使逞而歸乃易成也逞快也夫小人之性釁於勇嗇於禍以足其性而求名焉者非國家之利也若何從之釁動也嗇貪也言鄭之故與楚戰者皆釁事勇名之人非能爲國計慮乆利不可從也子展說不禦寇子產相鄭伯以如晉叔向問鄭國之政焉對曰吾得見與否在此嵗也駟良方争未知所成駟氏子晳也良氏伯有也若有所成吾得見乃可知也叔向曰不既和矣乎對曰伯有侈而愎愎狠也子晳好在人上莫能相下也雖其和也猶將積惡也惡至無日矣此年秋良霄出奔襄公三十年子產爲政有事伯石賂與之邑伯石公孫叚有事欲使之子太叔曰國皆其國也奚獨賂與焉言鄭大夫共憂鄭國事奚爲獨賂之子產曰無欲實難言人不能無欲皆得其欲以從其事而要其成非我有成其在人乎言成猶在我非在人也何愛於邑邑將焉徃言猶在國子太叔曰若四國何恐爲四鄰所笑子產曰非相違也而相從也言賂以邑欲爲和順四國何尤焉鄭書有之鄭國史書曰安定國家必大焉先先和大族而後國家安姑先安大以待其所歸要其成也既伯石懼而歸邑卒與之卒終也伯有既死使太史命伯石爲卿辭太史退則請命焉請太史更命已復命之又辭如是三乃受策入拜子產以是惡其爲人也惡其虚飾使次己位畏其作亂故寵之襄三十一年子皮欲使尹何爲邑爲邑大夫子產曰少未知可否尹何年少子皮曰愿吾愛之不吾叛也愿謹善也使夫徃而學焉夫亦愈知治矣夫謂尹何子產曰不可人之愛人求利之也今吾子愛人則以政以政與之猶未能操刀而使割也其傷實多多自傷子之愛人傷之而已其誰敢求愛於子子於鄭國棟也棟折榱崩僑將厭焉敢不盡言子有美錦不使人學製焉製裁也大官大邑身之所庇也而使學者製焉其爲美錦不亦多乎言官邑之重多於美錦僑聞學而後入政未聞以政學者也若果行此必有所害譬如田獵射御貫則能獲禽貫習也若未嘗登車射御則敗績厭覆是懼何暇思獲子皮曰善哉虎不敏吾聞君子務知大者逺者小人務知小者近者我小人也衣服附在吾身我知而愼之大官大邑所以庇身也我遠而慢慢易之微子言吾不知也他日我曰子爲鄭國我爲吾家以庇焉其可也今而後知不足自知謀慮不足謀其家自今請雖吾家聽子而行子產曰人心之不同如其靣焉吾豈敢謂子面如吾面乎抑心所謂危亦以吿也子皮以爲忠故委政焉子產是以能爲鄭國傳言子產之治乃子皮之力其年鄭人游於鄉校鄉之學校以論執政論其得失然明謂子產曰毁鄉校何如患人於中謗議國政子產曰何爲夫人朝夕退而游焉以議執政之善否其所善者吾則行之其所惡者吾則改之是吾師也若之何毁之吾聞忠善以損怨爲忠善則怨謗息不聞作威以防怨欲毁鄉校即作威豈不遽止然猶防川遽畏懼也大决所犯傷人必多吾不克救也不如小决使道道通也不如吾聞而藥之也以爲藥石然明曰蔑也今而後知吾子之信可事也小人實不才若果行此其鄭國實賴之豈惟二三臣仲尼聞是語也曰以是觀之人謂子產不仁吾不信也仲尼以二十二年生於是十嵗長而後聞之昭公元年游吉如楚𦵏郟敖且聘立君歸謂子產曰具行器矣行器曽備楚王汰侈而自說其事必合諸侯吾徃無日矣子產曰不數年未能也昭公四年楚子使椒舉如晋求諸侯楚子問於子產曰晋其許我諸侯乎對曰許君晋君少安不在諸侯安於小小不能遠圖其大夫多求貪也莫匡其君在宋之盟又曰如一晋楚同也若不許君將焉用之焉用宋盟王曰諸侯其來乎對曰必來從宋之盟承君之歡不畏大國何故不來大國晋也不來者其魯衞曹邾乎曹畏宋邾畏魯魯衞偪於齊而親於晋唯是不來其餘君之所及也誰敢不至言楚威力所能及王曰然則吾所求者無不可乎對曰求逞於人不可逞快也求人以快意人必違之與人同欲盡濟申之㑹魯衞曹邾不㑹其年子產作丘賦國人謗之子産曰何害茍利社稷死生以之吾不遷矣遷移也渾罕曰渾罕子寛國氏其先亡乎君子作法於凉其敝猶貪凉薄也作法於貪敝將若之何言不可乆行姬在列者在列國也蔡及曹滕其先亡乎偪而無禮蔡偪楚曹滕偪宋鄭先衞亡偪而無法偪晋楚政不率法而制於心民各有心何上之有子産權時救急渾罕譏之正道昭公七年子產聘於晉爲豐施歸州田於宣子豐施鄭公孫叚之子三年晋以州田賜叚曰日君以夫公孫叚爲能任其事而賜之州田今無禄早世不獲乆享君德其子弗敢有不敢以聞於君私致諸子此年正月公孫叚卒宣子辭子產曰古人有言曰其父析薪其子弗克負荷荷擔也以㣲薄喻重貴施將懼弗能任其先人之禄其况能任大國之賜縱吾子爲政而可後之人若屬有疆場之言敝邑獲戾恐後代宣子者將以鄭取晋邑罪鄭而豐氏受其大討吾子取州是免敝邑於戾而建置豐氏也敢以爲請傳言子產貞而不諒宣子受之以吿晋侯晋侯以與宣子宣子爲初言病有之初言謂與趙文子争州田以易原縣於樂大心樂大心宋大夫原晋邑以賜樂大心也魯昭公十一年秋㑹于厥憗謀救蔡也不書救蔡不果救鄭子皮將行子產曰行不逺不能救蔡也蔡小而不順楚大而不德天將棄蔡以壅楚盈而罰之盈楚惡蔡必亡矣且䘮君而能守者鮮矣三年王其有咎乎美惡周必復王惡周矣元年楚子弑君而立嵗在大梁後三年十三嵗嵗星周復于大梁晉人使狐父請蔡于楚弗許狐父晋大夫昭公十三年晉㑹諸侯同盟于平丘齊服也令諸侯日中造于除除地爲壇盟㑹處癸酉退朝先盟朝晉子產命外僕速張于除張帷幕子太叔止之使待明日及夕子産聞其未張也使速徃乃無所張矣地已滿也傳言子產每事敏于太叔十六年鄭大旱使屠擊祝欵豎柎有事於桑山三子鄭大夫有事祭也斬其木不雨子產曰有事於山藝山林也當藝養令繁殖而斬其木其罪大矣奪之官邑鄭禆竈言於子產曰宋衞陳鄭將同日火若我用瓘斝玉瓚鄭必不火瓘珪也斝玉爵也瓚勺也欲以禳火子產弗與以爲天灾流行非禳所息故也明年五月宋衞陳鄭皆火禆竈曰不用吾言鄭又將火前年禆竈欲用瓘斚禳火子產不聽今復請用之鄭人請用之信竈言子產不可子太叔曰寶以保民也若有火國幾亡可以救亡子何愛焉子產曰天道遠人道邇非所及也何以知之竈焉知天道是亦多言矣豈不或信多言者或時有中遂不與亦不復火傳言天道難明雖禆竈猶不足以盡知之鄭之未灾也里析吿子產曰將有大祥里析鄭大夫祥變異之氣民震動國幾亡吾身冺焉弗良及也言將先灾死國遷其可乎子產曰雖可吾不足以定遷矣子產知天灾不可逃非遷所免故託以知不足昭公十六年晉宣子有環其一在鄭商玉人同工其朴成此䨇環宣子謁諸鄭伯謁請也子產弗與曰非官府之守器也寡君不知子太叔子羽謂子產曰韓子亦無幾求言所求少晉國亦未可以貳晉國韓子不可偷也偷薄也若屬有讒人交鬭其間鬼神而助之以興其凶怒悔之何及吾子何愛於一環其以取憎於大國也盍求而與之子產曰吾非偷晉而有二心將終事之是以弗與忠信故也僑聞君子非無賄之難立而無令名之患僑聞爲國非不能事大字小之難無禮以定其位之患夫大國之人令於小國而皆獲其求將何以給之一共一否爲罪滋大滋益也大國之求無禮以斥之何饜之有吾且爲鄙邑則失位矣不復成國若韓子奉命以使而求玉焉貪淫甚矣獨非罪乎出一玉以起二罪吾又失位韓子成貪將焉用之且吾以玉賈罪不亦銳乎銳細小也韓子買諸賈人既成賈矣商人曰必吿君大夫韓子請諸子產曰日起起宣子名請夫環㼬政弗義弗敢復也復重求也今買諸商人商人曰必以聞敢以爲請子產對曰昔我先君桓公與商人皆出自周鄭本在周畿内桓公東遷并與商人俱庸次比耦庸用也用次更相從耦耕以艾殺此地斬之蓬蒿藜藿而共處之世有盟誓以相信也曰爾無我叛我無强賈無强市其物毋或匄奪爾有利市寳賄我勿與知恃此質誓故能相保以至于今今吾子以好來辱而謂敝邑强奪商人是敎敝邑背盟誓也毋乃不可乎吾子得玉而失諸侯必不爲也若大國令而其無藝藝法也鄭鄙邑也亦弗為也不欲為鄙邑之事僑若獻玉不知所成敢私布之布陳也韓子辭玉曰起不敏敢求玉以徼二罪敢辭之傳言子產知禮宣子能改過昭公十九年鄭大水龍鬬於時門之外洧淵時門鄭城門也洧水出滎陽密縣東南至潁川長平入潁國人請爲禜焉子產弗許曰我鬬龍不我覿也覿見也龍鬬我獨何覿焉禳之則彼其室也淵龍之室吾無求於龍龍亦無求於我乃止也傳言子產之知昭公十年鄭子皮如晋塟平公將以幣行見新君之贄子産曰喪焉用幣用幣必百兩載幣用車百乘百兩必千人千人至將不行行用也不行必盡用之不得見新君將自費用盡幾千人而國不亡言千人之費不可當子皮固請以行既塟諸侯之大夫欲因見新君叔孫昭子曰非禮也弗聽叔向辭之曰大夫之事畢矣送葬禮畢而又命孤孤斬焉在縗絰之中既葬未卒哭故猶服斬衰其以嘉服見則䘮禮未畢其以䘮服見是重受弔也大夫將若之何皆無辭以見子皮盡用其幣歸謂子羽曰非知之實難將在行之言不患不知患不能行夫子知之矣我則不足言已繇子產之戒既知其不可而遂行之是我之不足書曰欲敗度縱敗禮商書我之謂矣夫子知度與禮矣我實縱欲而不能自克也欲因喪以慶新君故縱而行之不能自勝子羽鄭大夫也襄公二十九年楚郟敖即位郟敖康王子熊麋也王子圍爲令尹圍康王弟子羽曰是謂不宜必代之昌松栢之下其草不殖言楚君弱令尹強物不兩盛昭元年圍殺郟敖昭元年楚公子圍聘于鄭且娶於公孫叚氏伍舉爲介伍舉椒舉介副也將入館就客舍鄭人惡之知楚懷詐使行人子羽與之言乃館於外舍城外既聘將以衆逆以兵入逆婦子産患之使子羽辭曰以敝邑褊小不足以容從者請墠聽命欲以城外除地爲壇行昏禮令尹命太宰伯州犂對曰君辱貺寡大夫圍謂圍將使豐氏撫有而室豐氏公孫叚圍布几筵吿於莊共之廟而來莊王爲之祖共王爲之父若野賜之是委君貺於草莽也是寡大夫不得列於諸卿也言不得從卿禮不寧惟是又使圍蒙其先君蒙欺也吿先君而來不得禮於女氏之廟故以爲欺先君將不得爲寡君老大臣稱老懼辱命而黜退其蔑以復矣惟大夫圖之子羽曰小國無罪恃實其罪恃大國而無偹則是罪將恃大國之安静已而無乃包藏禍心以圖之小國失恃而懲諸侯使莫不憾者距違君命而有所壅塞不行是懼言已失所恃則諸侯懲恨以距君命壅塞不行所懼惟此不然敝邑館人之屬也館人守舍人也其敢愛豐氏之祧祧遠祖廟伍舉知其有備也請埀櫜而入埀櫜示無弓許之入逆而出子太叔鄭大夫也楚子使薳射城州屈復茄人矣還復茄人於州屈城丘皇遷訾人焉移訾人於州皇使熊相楳郭巢季然郭卷使二大夫爲巢巻築郭也巻城在南陽華縣南子太叔聞之曰楚王將死矣使民而不安其土民必憂憂將及王弗能乆矣駟引鄭大夫也晉荀罃帥師圍鄭未至鄭駟引曰知伯愎而好勝是下之則可行也行去聲乃先保南里以恃之曹劌魯人也莊公十年齊師伐魯莊公將戰曹劌請見其鄉人曰肉食者謀之又何間焉肉食在位者間猶與也劌曰肉食者鄙未能遠謀乃入見問何以戰公曰衣食所安弗敢專也必以分人對曰小惠未徧民弗從也今公衣食所惠不過左右故曰未徧公曰犠牲玉帛弗敢加也必以信祝辭不敢以小爲大以惡爲美對曰小信未孚神弗福也孚大信也公曰小大之獄雖不能察必以情必盡己情察審也對曰忠之屬也上思利民忠也可以一戰戰則請從公與之乘共乘兵車戰于長勺公將皷之劌曰未可齊人三皷劌曰可矣齊師敗績公將馳之劌曰未可下視其轍視車跡也登軾而望之曰可矣遂逐齊師既克公問其故對曰夫戰勇氣也一皷作氣再而衰三而竭彼竭我盈故克之夫大國難測也懼有伏焉恐詐也吾視其轍亂望其旗靡故逐之臧文仲魯大夫也僖公二十年宋襄公欲合諸侯文仲聞之曰以欲從人則可屈己之欲從衆之善以人從欲鮮濟齊國莊子來聘於魯自郊勞至于贈賄禮成而加之以敏迎來曰郊勞送去曰贈賄敏審當於事臧文仲言於公曰國子爲政齊猶有禮君其朝焉臣聞之服有禮社稷之衞也公如齊縣子魯大夫嵗旱穆公召而問焉凡穆公或作繆公曰天乆不雨吾欲暴尫而奚若奚若何如也尫者面鄉天覬天哀而雨之曰天則不雨而暴人之疾子虐毋乃不可與錮疾人之所哀暴之是虐然則吾欲暴巫而奚若曰天則不雨而望之愚婦人於以求之毋乃己疏乎己猶甚也巫主接神亦覬天哀而雨之春秋傳説巫曰在女曰巫在男曰覡周禮大巫旱暵則舞雩也徙市則奚若曰天子崩巷市七日諸侯薨巷市三日爲之徙市不亦可乎徙市者庶人之䘮禮今徙市是憂戚於旱若䘮公子偃魯大夫也莊公十年齊師宋師伐魯次於郎公子偃曰宋師不整可敗也宋敗齊必還請擊之魯莊公弗許自雩門竊出蒙臯比而先犯之雩門魯南城門臯比虎皮公從之大敗宋師於乘丘齊師乃還季文子魯大夫也文公十五年初齊侯侵魯遂伐曹討其朝魯也季文子曰齊侯其不免乎已則無禮執王使而伐無罪而討於有禮者曰女何故行禮禮以順天天之道也己則反天之道而又以討人難以免矣詩曰胡不相畏不畏于天詩小雅君子之不虐幼賤畏于天也在周頌曰畏天之威于時保之詩周頌言畏天威於是保福禄不畏于天將何能保以亂取國奉禮以守猶懼不終多行無禮弗能在矣十八年齊人弑其君商人成公七年吳伐郯郯成季文子曰中國不振旅蠻夷入伐而莫之或恤振整也旅衆也無弔者也夫言中國不能相愍恤故夷狄内侵詩曰不弔昊天亂靡有定其此之謂與詩小雅刺在上者不能弔愍下民故號天吿亂有上不弔其誰不受亂主謂覇主吾亡無日矣君子曰知懼如是斯不亡矣成公八年晉侯使韓穿來言汶陽之田歸之于齊季文子餞之餞送行飲酒私焉私與之言曰大國制義以爲盟主是以諸侯懷德畏討無有貳心謂汶陽之田敝邑之舊也而用師於齊使歸諸敝邑用師鞍之戰今有二命曰歸諸齊信以行義義以成命小國所望而懷也信不可知義無所立四方諸侯其誰不解體言不復肅敬於晋詩曰女也不爽士貳其行士也罔極二三其德爽差也極中也詩衞風婦人怨之丈夫不一其行喻魯事晋猶女事夫不敢過差而晋有罔極之心反二三其徳七年之中一予一奪二三孰甚焉士之二三猶䘮妃耦而况覇主覇主將德是以以用也而二三之其何以長有諸侯乎詩曰猶之未遠是用大簡猶圖也簡諌也詩大雅言王者圖事不遠故用大道諌之行父懼晉之不遠猶而失諸侯也是以敢私言之季武子魯大夫也襄公三十年魯使者在晉晉趙孟以絳縣人爲絳縣師於是歸以語諸大夫季武子曰晉未可偷也偷薄也有趙孟以爲大夫有伯瑕以爲佐伯瑕士文伯有史趙師曠而咨度焉有叔向女齊以師保其君其朝多君子其庸可偷乎勉事之而後可孟獻子魯大夫也聘於晉宣子觴之三徙鐘石之懸不移而具獻子曰富家哉宣子曰子之家孰與我家富獻子曰吾家甚貧惟有二士曰顏向慈無靈者使吾邦家安平百姓和恊惟此二者耳吾盡於此矣獻子出宣子曰彼君子也以畜賢爲富我鄙人也以鐘石金玉爲富孔子曰孟獻子之富可著於春秋宣公十四年楚伐宋孟獻子言于宣公曰臣聞小國之免於大國也聘而獻物物玉帛皮幣也於是有庭實旅百主人亦設籩豆百品實於庭以答賓朝而獻功獻其治國者征伐之功於牧伯於是有容貌采章嘉淑而有加貨容貌威儀容貌也采章車服文章也嘉淑令辭稱贊也加貨命宥幣帛也言徃共則來報亦備謀其不免也誅而薦賄則無及也薦進也見責而徃則不足解罪今楚在宋君其圖之公說明年歸父㑹楚子于宋襄公二年秋仲孫蔑㑹晉荀罃宋華元衞孫林父曹人邾人于戚孟獻子曰請城虎牢以偪鄭虎牢舊鄭邑今属晋知武子曰善鄫之㑹吾子聞崔子之言今不來矣元年孟獻子與齊崔杼次于鄫崔杼有不服晉之言獻子以吿知武子滕薛小邾之不至皆齊故也三國齊之属寡君之憂不惟鄭言復憂齊叛罃將復於寡君而請於齊以城事白晋君而請齊㑹之欲以觀齊志得請而吿吾子之功也得請謂齊人應命吿諸侯㑹築虎牢若不得請事將在齊將伐齊吾子之請諸侯之福也城虎牢足以服鄭息征伐豈唯寡君賴之傳言荀罃能用善謀冬復㑹于戚齊崔武子及滕薛小邾之大夫皆㑹知武子之言故也武子言事將在齊齊人懼帥小國而㑹之遂城虎牢鄭人乃成如孟獻子之謀又襄公七年夏四月三卜郊不從乃免牲獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也郊祀后稷以配天后稷周始祖能播植者是故啓蟄而郊郊而後耕今既耕而卜郊宜其不從也啓蟄夏正建寅之月耕謂春分晉使郤錡來乞師將事不敬將事致君命孟獻子曰郤氏其亡乎禮身之幹也敬身之基也郤子無基且先君之嗣卿也受命以求師將社稷是衞而惰棄君命也不亡何爲郤錡郤克子故曰嗣卿後晉果殺郤錡叔孫穆子魯大夫也虢之㑹諸侯之大夫尋盟未退季武子伐莒取鄆莒人吿於㑹楚人將以叔孫穆子爲戮晉樂王鮒求貨於穆子曰吾爲子請於楚穆子不予梁其踁謂穆子曰有貨以衞身也出貨而可以免子何愛焉穆子曰非女所知也承君命以㑹大事而國有罪我以貨私免是我㑹吾私也苟如是則又可以出貨而成私欲乎雖可以免吾其若諸侯之事何夫必將或循之曰諸侯之卿有然者故也則我求安身而爲諸侯法矣君子是以患作作而不𠂻將或導之是昭其不𠂻也余非愛貨惡不𠂻也且罪非我之繇爲戮何害楚人乃赦之又衞孫文子來聘且拜武子之言而尋孫桓子之盟盟在成三年公登亦登禮登階臣後君一等叔孫穆子相趨進曰諸侯之㑹寡君未嘗後衞君敵體並登今吾子不後寡君寡君未知所過吾子必少安安徐也孫子無辭亦無悛容悛改也穆叔曰孫子必亡爲臣而君過不悛亡之本也詩曰退食自公委蛇委蛇委蛇順貌詩召南言人臣自公門入私門無不順禮謂從者也從順也衡而委蛇必折衡横也横不順道必毁折其後林父逐君又魯襄公在楚楚人使公親襚諸侯有遣使贈襚之禮今楚欲依遣使之禮公患之穆叔曰袚殯而襚則布幣也先使巫袚除殯之凶邪而行襚禮與朝而布幣無異乃使巫以桃茢先袚殯茢黍穣楚人弗禁既而悔之又楚子郟敖即位襄公三十年使薳罷聘魯穆叔問王子之爲政何如王子圍爲令尹對曰吾儕小人食而聽事猶懼不給命而不免於戾焉與知政固問焉不吿穆叔吿大夫曰楚令尹將有大事子蕩將與焉子蕩薳罷助之匿其情矣子圍素貴郟敖㣲弱諸侯皆知其將爲亂故穆叔問之其後圍弑郟敖澶淵之㑹穆叔至自㑹見孟孝伯語之曰晉趙孟將死矣其語偷不似民主偷茍且且年未盈五十而諄諄焉如八九十者弗能乆矣成二年戰於鞍趙朔已死於是趙文子始生至㐮公三十年㑹澶淵盖年四十七八故言未盈五十若趙孟死爲政者其韓子乎韓子韓起吾子盍與季孫言之可以樹善君子也言韓起有君子之德今方知政可素徃立善晉君將失政矣若不樹焉使早備魯使韓子早爲魯備既而政在大夫韓子懦弱大夫多貪求欲無厭齊楚未足與也魯其懼哉孝伯曰人生幾何誰能無偷朝不及夕將安用樹穆叔出而吿人曰孟孫將死矣吾語諸趙孟之偷也而又甚焉言朝不及夕偷之甚也又與季孫語晉故知與孟孫言季孫不從及趙文子卒在昭公元年晉公室卑政在侈家韓宣子爲政不能圖諸侯魯不堪晉求䜛慝𢎞多是以有平丘之㑹又昭公三年小邾穆公來朝季武子欲卑之不欲以諸侯禮待之穆子曰不可曹滕二邾實不忘我好敬以逆之猶懼其貳又卑一睦焉一睦謂小邾逆羣好也其如舊而加敬焉志曰能敬無灾又曰敬逆來者天所福也季孫從之又襄公二十八年崔杼弑其君而後自縊齊人求杼尸將戮之不得叔孫穆子曰必得之武王有亂臣十人亂治也崔杼其有乎不十人不足以葬既崔氏之臣曰與我拱璧吾獻其柩於是得之襄仲魯大夫也如齊拜榖之盟復曰臣聞齊人將食魯之麥以臣觀之將不能齊君之語偷臧文仲有言曰民主偷必死明年齊人弑懿公臧武仲魯大夫也襄公四年陳成公卒楚人將伐陳聞䘮乃止軍禮不伐䘮陳人不聽命不聽楚命臧武仲聞之曰陳不服於楚必亡大國行禮而不服在大猶有咎而况小乎楚彭名侵陳陳無禮故也又襄公十四年衞侯奔齊在邾武仲如齊唁衞侯衞侯與之言虐退而吿其人曰衞侯其不得入矣其言糞土也亡而不變何以復國子展子鮮聞之見武仲與之言道順道理臧孫說謂其人曰衞君必入夫二子者或輓之或推之欲無入得乎又襄公十九年季武子以所得於齊之兵作林鍾而銘魯功焉林鍾律名鑄鐘聲應林鍾因以爲名武仲謂季孫曰非禮也夫銘天子令德天子銘德不銘功諸侯言時計功舉得時動有功則可銘也大夫稱伐銘其功伐之勞今稱伐則下等也從大夫故計功則借人也借晋力也言時則妨民多矣何以爲銘且夫大伐小取其所得以作彛器彛常也謂鐘鼎爲宗廟之常器銘其功烈以示子孫昭明德而懲無禮也今將借人之力以救其死若之何銘之小國幸於大國以勝大國爲幸而昭所獲焉以怒之亡之道也孟公綽魯大夫也襄公二十五年齊崔杼帥師伐我北鄙以報孝伯之師前年魯使孟孝伯爲晋伐齊公患之使吿于晉孟公綽曰崔子將有大志不在病我必速歸何患焉其來也不寇不爲寇害使民不嚴欲得民心異於他日齊師徒歸徒空也展莊叔魯大夫也襄二十八年齊慶封奔魯獻車於季武子美澤可以鑑光鑑形也莊展叔見之曰車甚澤人必瘁宜其亡也叔弓魯大夫也昭二年聘於晉晉侯使郊勞聘禮賓至近郊君使卿勞之辭曰寡君使弓來繼舊好固曰女無敢爲賓徹命於執事敝邑𢎞矣徹達也敢辱郊使請辭辭郊勞致館辭曰寡君命下臣來繼舊好好合使成臣之禄也得通君命則於己爲榮禄敢辱大館敢不敢也叔向曰子叔子知禮哉吾聞之曰忠信禮之器也卑讓禮之宗也宗猶主也辭不忘國忠信也謂稱舊好先國後己卑譲也始稱敝邑之宏先國也次稱臣之禄後己也詩曰敬慎威儀以近有德夫子近德矣子服惠伯魯大夫也昭公七年楚子成章華之臺願與諸侯落之薳啓疆來召魯昭公公將徃夣襄公祖祖祭道祖梓慎曰君不果行襄公之適楚也夣周公祖而行今襄公實祖君其不行子服惠伯曰行先君未嘗適楚故周公祖以道之襄公適楚矣而祖以道若不行何之後公如楚叔孫昭子魯大夫也魯昭公二十年二月己丑日南至是嵗朔旦冬至之嵗也當言正月己丑朔日南至史失閏閏更在二月後故經因史書正月傳更具於二月記南至日以正厯也梓慎望氛氛氣也時魯侯不行登臺之禮使梓慎望氛曰今兹宋有亂國幾亡三年而後弭蔡有大䘮後宋華向出奔蔡侯卒叔孫昭子曰然則戴桓也戴族華氏桓族向氏汰侈無禮已甚亂所在也傳言妖繇人興二十一年宋華亥向寧華定自陳入于南里以叛先是九年冬築郎囿季平子欲其速成也叔孫昭子曰詩曰經始勿亟庶民子來詩大雅言文王始經營靈臺非急疾之衆民自以子義來歡樂為之焉用速成其以勦民也勦勞也無囿猶可無民其可乎叔仲昭伯魯大夫也從襄公如楚及漢聞康王卒欲還叔仲昭伯曰君之來也非爲一人也爲其名與其衆也今王死其名未改其衆未敗何爲還諸大夫皆欲還子服惠伯曰不知所爲姑從君乎叔仲曰子之來也非欲安身也爲國家之利也故不憚勤遠而聽於楚非義楚也畏其名與衆也夫義人者固慶其喜而弔其憂况畏而服乎聞畏而徃聞䘮而還苟芉姓實嗣其誰代之任䘮王太子又長矣執政未改子爲先君來死而去之其誰曰不如先君將爲䘮舉聞䘮而還其誰曰非侮也事其君而任其政其誰曰己貳求說其侮而亟於前之人其讐不滋大乎說侮不懦執政不貳帥大讐以憚小國其誰云待之若從君而走患則不如違君以避難且夫君子計成而後行二三子計乎有禦楚之術而有守國之備乎則可也若未有不如徃也乃遂行子家覊魯大夫也魯昭公二十五年昭公伐季氏平子登臺而請曰君不察臣之罪使有司討以干戈臣請待於沂上以察罪弗許魯城南有沂水平子欲出城待罪也大沂水出盖縣南至下邳入泗請囚於費弗許請以五乘亡弗許子家子曰君其許之政自之出乆矣隠民多取食焉隠約窮困爲之徒者衆矣日入慝作弗可知也慝姦惡也日𠖇姦人將起其衆助季氏不可知也衆怒不可蓄也季氏衆蓄而弗治將蘊藴積也蘊蓄民將生心生心同求將合與季氏同求叛君者君必悔之弗聽郈孫曰必殺之公使郈孫逆孟懿子懿子仲孫何忌叔孫氏之司馬鬷戾言於其衆曰若之何莫對衆疑所助又曰我家臣也不敢知國凡有季氏與無於我孰利皆曰無季氏是無叔孫氏也􅎦戾曰然則救諸帥徒以徃䧟西北隅以入陷公圍也公徒釋甲執冰而踞言無戰心也冰櫝丸蓋或云櫝丸是箭筩其蓋可以取飮遂逐之逐公徒孟氏使登西北隅以望季氏見叔孫氏之旌以吿孟氏執郈昭伯殺之于南門之西遂伐公徒子家子曰諸臣僞刼君者而負罪以出君止使若非君本意者君自可止不出意如之事君也不敢不改意如季平子名公曰余不忍也與臧孫如墓謀祭先君且謀所奔遂行己亥公孫于齊臧昭伯率從者將盟載書曰戮力一心好惡同之信罪之有無信明也處者有罪從者無罪繾綣從公無通外内於是以公命示子家子子家子曰如此吾不可以盟覊也不佞不能與二三子同心而以爲皆有罪從者䧟君留者逐君皆有罪也或欲通外内且欲去君去君僞負罪出奔不必繾綣從公二三子好亡而惡定焉可同也䧟君於難罪孰大焉通外内而去君君將速入弗通何爲而何守焉乃不與盟子服景伯魯大夫也魯哀公十三年㑹晉侯吳子於黄池吳人將以公見晉侯子服景伯言而止既而悔之將囚景伯景伯曰何也立後於魯矣何景伯名將以二乘與六人從遲速惟命遂囚以還及戸牖戸牖陳留外黄縣西北東昬城是謂太宰嚭曰魯將以十月上辛有事於上帝先王季辛而畢何世有職焉有職於祭事自襄以來未之改也魯襄公若不㑹祝宗將曰吳實然言魯祝宗將吿神云景伯不㑹坐爲吳所囚吳人信鬼故以是恐之且謂魯不共而執其賤者七人何損焉太宰嚭言於王曰無損於魯而祗爲名適爲惡名不如歸之乃歸景伯陽文子爲魯大夫楚惠王以梁與魯陽文子文子辭曰梁險而在北境懼子孫之有貳者也夫事君無憾憾則懼偪偪則懼貳夫盈而不偪憾而不貳者臣能自壽也不知其他縱臣而得以其首領没懼子孫之以梁之險而乏臣之祀也王曰子之仁不忘乎子孫施及楚國敢不從子與之賜魯册府元龜卷七百三十三
