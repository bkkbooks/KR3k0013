body:
  text: 冊府元龜卷八百八十二宋王欽若等撰總録部交友第二晉夏侯湛㓜有盛才文章宏富善搆新詞而美容觀與潘岳友善每行止同輿接茵京都謂之連璧位散騎常侍嵇康恬靜寡欲寛簡有大量東平吕安服康高致每一相思輒千里命駕康友而善之康所與神交者陳留阮籍河内山濤豫其流者河内向秀沛國劉伶籍兄子咸瑯邪王戎遂為竹林之游世所謂竹林七賢也康位中散大夫山濤字巨源與嵇康吕安善後遇阮籍便為竹林之交著忘言之論康後坐事臨誅謂子紹曰巨源在汝不孤矣濤晩與尚書和逌交又與鍾㑹裴秀並申欵昵後二人居勢爭權濤平心處中各得其所而俱無恨焉位司徒阮籍素與王渾為友渾子戎年十五隨渾在郎舎戎少籍二十歳而籍與之交籍每適渾俄傾輒去過視戎良久然後出謂渾曰濬冲王戎字也清賞非卿倫也共卿言不如共阿戎談戎每與籍為竹林之游戎常後至籍曰俗物已復來敗人意戎笑曰卿軰意亦復易敗耶籍位歩兵校尉羊曼任逹頽縱好飲酒温嶠庾亮阮放桓彛同志友善並為中興名士時州里稱陳留阮放為宏伯高平郗鑒為放伯太山胡母輔之為逹伯濟陰卞壼為裁伯陳留蔡謨為朗伯阮孚為誕伯高平劉綏為秀伯而曼為黯伯几八伯蓋擬古之八雋曼位丹陽尹王接字祖游平陽太守柳澹散騎侍郎裴遐尚書僕射鄧攸皆與接友善位尚書殿中郎山簡為征南將軍鎮夏口華軼以江州作難或勸簡討之簡曰與彥夏華軼字舊友為之惆悵簡豈利人之機以為功伐乎其篤厚如此戴若思有風儀性閒爽少好游俠不拘操行遇陸機赴雒船裝甚盛遂與其徒掠之若思登岸據胡牀指麾同旅皆得其宜機察見知非常人在舫屋上遙謂之曰卿才器如此乃復作刼邪若思感悟因流涕投劔就之機與言深加賞異遂與定交焉位至驃騎將軍王敦謝鯤庾敳阮修皆為王衍所親善號為四友而亦與王澄狎又有光逸胡母輔之等亦豫焉酣讌縱誕窮歡極娛位大將軍王兄字孝孫本兵家子寓居雒陽卓㷀不覊初為䕶軍府軍士胡母輔之與瑯琊王澄北地傅暢中山劉輿潁川荀邃河東裴遐迭屬河南功曹甄述及雒陽令曹攄請觧之攄等以制旨所及不敢輔之等齎羊酒詣䕶軍門門吏疏名呈䕶軍䕶軍歎曰諸名士持羊酒來將有以也尼時以給府養馬輔之等入遂坐馬廐下與尼炙羊飮酒醉飽而去竟不見䕶軍䕶軍大驚卽與尼長假因免為兵東瀛公騰辟為車騎舍人不就劉琨少負志氣有縱横之才善交勝已而頗浮誇與范陽祖逖為友聞逖被用與親故書曰吾枕戈待旦志梟逆虜嘗恐祖生先吾着鞭其意氣相期如此琨為并州牧裴邵字道期元帝初為安東將軍以邵為長史王導為司馬二人相與為深交友及道期卒王導為司空既拜歎曰裴道期劉王喬在吾不得獨登此位王龔清操過人嘗有宰相之望與王沈齊名友善紀瞻少與陸機兄弟親善及機被誅瞻䘏其家周至及嫁機女資送同於所生位驃騎將軍王機字令明慕王澄為人澄亦雅知之以為己亞遂與友善機位交州刺史荀崧字景猷與王濟何邵為拜親之友崧補濮陽王允文學又與王敦顧榮陸機等友善虞􅔎字思行潭之兄子也雖機幹不及於潭然而素行過之與譙國桓彛俱為吏部郎情好甚篤彛遣子温拜􅔎􅔎使子谷拜彛荀羡弱冠與王洽齊名沛國劉惔太原王濛陳郡殷浩並與交好位兖州刺史周訪為縣功曹陶侃為散吏訪薦侃為主簿相與結友許邁丹陽句容人也少恬靜不務仕進有高世之心王羲之每造之未嘗不彌日忘歸相與為世外之交習鑿齒為桓温别駕善尺牘論議温甚器遇之時清談文章之士韓伯伏滔等並相友善鄧粲長沙人少以高潔著名與南陽劉驎之南郡劉尚公同志友善並不應州郡辟命王濛字仲祖與沛國劉惔齊名友善惔嘗稱濛性至通而自然有節濛每云劉君知我勝我自知時人以惔方荀奉倩濛比袁曜卿凡稱風流者舉濛惔為宗焉位司徒左長史桓温與庾翼友善嘗相期以寧濟之事位大司馬謝安居東土與王羲之孫綽李充許詢道林皆文義冠世共相友昵位太傅陸機與弟雲造張華華素重其名如舊相識機為平原内史宋王𢎞隱于㑹稽與魯國孔淳之為莫逆交何點與陳郡謝卄瀹吳國張融㑹稽孔稚珪為莫逆之交孔淳之隱居剡山嘗遇桑門法崇於三山披襟領契自以為得意之交劉敬宣字萬壽為散騎常侍寛厚待士多技藝弓馬音律無事不善時尚書僕射謝混自負才地少所交納與敬宣相遇盡禮著歡或問混曰卿未嘗輕交與人而傾蓋於萬壽何也混曰人之相知豈可以一途限孔文舉禮太史子義天下豈有非之者邪謝述為彭城王長史尚書僕射殷景仁領軍將軍劉湛並與述為異常之交述美風姿善舉止湛每謂人曰我見謝道兒未嘗足道兒述小字也卒於吳興太守䘮還京師未至數十里景仁湛同乘迎赴望船流涕臧凝之學渉有當世才具與司空徐湛之為異常之交蔡廓與北地傅隆相善廓子興宗修父友之敬向柳有學藝才能太尉袁淑司空徐湛之東揚州刺史顔峻皆與友善謝靈運為侍中以疾東還㑹稽與族弟惠連東海何長瑜潁川荀雍太山羊璿之以文章賞㑹共為山澤之游時人謂之四友蕭惠開為太子舍人與汝南周朗同官友善以偏竒相尚顔延之既廢於家中書令王球名公子延之慕焉球亦愛其材情好甚欵何偃叔攸之與瑯邪王徽相善攸之卒徽與偃書曰吾與義興真恨相知之晩每惟君子知我若夫嘉我小善矜余不能唯賢叔爾王僧䖍為太子舍人退黙少交接與袁淑謝莊善孔逷字世逺好典故事學與王儉至交南齊杜京産開舎授學徵為員外散騎侍郎不就㑹稽孔道徽守志業不仕京產與之友善一曰㑹稽孔覬清剛有節一見而為欵交王思逺與顧暠之友善暠之卒後家貧思逺迎其兒子經䘏甚至柳世隆字彥緒當時名士張緒王延之沈琰雅相欽慕以為君子之交徐伯􅎇東陽人積學十年究尋經史游學者多依之徵士沈儼造膝談論申以素交檀超為南徐州西曹書佐與别駕蕭惠開相抗禮惠開自以地位居前稍相凌辱而超舉動言嘯以地勢摧之謂惠開曰我與卿並有何等官俱是國家微賤時外戚爾何足以一爵高人惠開欣然便為刎頸之交謝淡任逹仗氣不營當世與順陽范㤗為雲霞之交孔稚珪字德璋㑹稽人也稚珪風韻清疏好文詠與外兄張融情趣相得又與瑯琊王思逺廬江何點點弟𦙍並欵交又云稚珪早立名譽當時名士陸惠曉謝卄瀹張融何點沈淵相與為君子之交王僧孺初與任昉遇於竟陵王西邸以文學㑹友及僧孺出為錢唐令昉贈詩其略曰唯子見知唯余知子觀行視言要終猶始敬之重之如蘭如芷梁范雲字彥龍父抗為郢府叅軍雲隨父在郢時吳興沈約新野庾杲之與抗同府見而友之劉李連與㑹稽人石文安相善文安字守休隱居鄉里專行禮讓代季連為尚書左丞出為江夏内史又代季連入為御史中丞劉訏一造阮孝緒即願以神交訏族兄歊又履高操三人日夕招擕故都下謂之三隱蕭勱少交結唯與河東裴子野范陽張纘善韋正與東海王僧孺友善及僧孺為尚書吏部叅掌大選賓友故人莫不傾意正獨澹然及僧孺擯廢之後正復篤素分有踰曩日論者稱焉張率吳郡人與同郡陸倕㓜相友狎嘗同載詣左衛將軍沈約適值任昉在焉約乃謂昉曰此二子後進才秀皆南金也卿可與定交繇此與昉友善陸倕與樂安任昉友善為感知己賦以贈昉昉因此名以報之裴子野性曠逹自云出世不復詣人初未與張纘遇便虚相推重因為忘年友韋粲為外兵參軍兼中兵時潁川庾仲容吳郡張率前軰才名與粲同府並忘年交好謝徽與河東裴子野沛國劉顯同官友善子野嘗為寒夜直宿賦以贈徽為感友賦以讎之何遜弱冠舉秀才范雲見其對策大相稱賞因結忘年交友到漑與兄沼弟洽俱知名樂安任昉大相賞好天監初昉出守義興要漑洽之郡為山澤之游昉還為御史中丞後進宗之時有彭城劉孝綽劉苞劉孺吳郡陸倕張率陳郡殷芸沛國劉顯及漑洽車軌日至號曰蘭臺聚陸倕贈昉詩云和風雜美氣下有真人游壯矣荀文若賢哉陳太丘今則蘭臺聚萬古信為儔任君本達識張子復清修既有絶塵到復見黄中劉時謂昉為任君比漢之三君到則漑兄弟也後漑為左民尚書不好交游唯與朱异劉之遴張綰同志友宻及臥疾於家門可羅雀三人毎歳嘗鳴騶枉道存問置酒敘平生而去陳徐伯陽為侯安都司空叅軍大建初與中記室李爽記室張正見尚書郎賀徹學士阮卓黄門郎蕭詮三公郎王繇禮處士馬樞記室祖孫登比部賀循長史劉刪等為文㑹之友後有蔡凝劉助陳暄孔範亦預焉游宴賦詩動成卷軸伯陽為其集序盛傳於世江總聰敏篤學有文范陽張纘瑯邪王筠南陽劉之遴並髙才碩學總時少有名纘等雅相推重爲忘年友後魏崔模長者篤厚不營利與崔頥相親往來如家封軌與光禄大夫武邑孫惠蔚同志友善蔚每推軌曰封生之於經義非但章句可竒然摽明綱格統括大歸吾所弗如者多矣辛紹先敏悟有識量與廣平游明根范陽盧度世同郡李承昭等甚相友善盧義僖寛和畏慎不妄交欵與魏子建情好尤篤言無所隱索敞初在凉州之日與鄉人陰世隆文學相友世隆至京師被罪從和龍留上谷困不前逹士人徐能抑掠為奴五年因行至上谷遇見世隆語其繇狀對泣而别敞為訴理得免畢衆敬自兖州刺史徵還京師年已七十六太和中高祖賓禮舊老衆敬與咸陽公高允引至方山雖文武奢儉好尚不同然亦與允甚相愛敬接膝談欵有若平生李彪為度支尚書與宋弁結管鮑之交弁為大中正與孝文私議猶以寒地處之殊不欲微相優假彪亦知之不以為恨及弁卒彪痛之無已為之哀誄僃盡辛酸李志字鴻道彪之子博學有才幹年十餘歳便能屬文彪甚竒之謂崔鴻曰子宜與鴻道為二鴻於雒陽鴻遂與志交欵往來張彛性公彊有風氣歴覽經史與盧淵李安仁等結為親友往來朝㑹常相追隨淵為主客令安仁與彛並為散令崔休舉秀才入京城與中書郎宋弁通直郎邢巒雅相知友曹世表性雅正渉獵羣書與武威賈思伯范陽盧同隴西辛雄等並相友善李叔虎好學博聞有識度為鄉閭所稱太和中拜中書博士與清河崔光河間邢巒並相親友羊深有風尚學渉經史好文章兼長几案少與隴西李神儁同志友善邢臧博學有藻思與裴敬憲盧觀兄弟等並結交友封肅為尚書左中兵部郎中性恭儉不妄交游唯是崔勱及勱從兄鴻尤相親善裴伯茂為廣平王文學文藻富贍好飲酒旣卒後殯於家園友人常景李渾王元景盧元明魏季景李騫等十許人於墓傍置酒設祭哀哭涕泣一飲一酹曰裴中書魂而有靈知吾曹也乃各賦詩一篇李騫以魏收亦與之友寄以示收收時在晉陽乃同其作論叙伯茂其十字云臨風想𤣥度對酒思公榮時人以伯茂性侮傲謂收詩頗得事實眭夸少與崔浩為莫逆之交浩為司徒奏徵為中郎辭疾不赴州郡比逼遣不得已入京都與浩相見經留數日唯飲酒談叙平生不及世利浩每欲論屈之竟不能發言其見敬憚如此浩後遂投詔書於夸懐亦不開口夸曰桃簡卿已為司徒何足以此勞國士也吾便於此將别桃簡浩小名也浩慮夸即還時乘一騾更無兼騎浩乃以夸騾内之廐中兾相維縶夸遂託鄉人輸租者謬為御車乃得出關浩知而歎曰眭夸獨行士本不應以小職辱之又使其人杖策復路吾當何辭以謝也時朝法甚峻夸既私還將有私歸之咎浩仍相左右始得無坐經年送夸本騾兼遣以所乘馬為書謝之夸更不受其騾馬亦不復書及浩之誅為之素服受鄉人弔唁經一時乃止歎曰崔公既死誰能更容眭夸遂作朋友篇辭義為時人所稱于忠宣武時為領軍將軍性多猜忌不交勝已唯與直閣將軍章初瓌千牛僃身楊保元為斷金之交胡叟為武威將軍見車馬榮華者視之蔑如也一見高允曰吳鄭之交以紵縞為美談吾之於子以弦韋為幽贄以此言之彼可無媿也劉懋性沈雅厚重與人交器宇淵曠風流甚美時論髙之尚書李平與之結莫逆之交邢劭十歲能屬文日誦萬餘言文章贍速未二十名動衣冠吏部尚書隴西李神儁大相欽重引為忘年之交北齊袁聿修歴任清華趙彦深為水部郎中同在一院因成交友彦深後重被沙汰停私門生藜藿聿修猶以故情音問徃來陸昻為河間邢劭所賞劭又與其父子璋交遊嘗謂子璋云吾以卿老蚌復出明珠裴讞之雖年少不妄交游唯與隴西辛術趙郡李繪頓丘李構清河崔贍為忘年之友封孝琬性恬靜頗好文詠太子少師邢邵七兵尚書王昕並先逹高才與孝琬年位懸隔晩相逢遇分好遂深及孝琬卒靈櫬言歸二人送於郊外悲哭悽慟有感路人崔贍為黄門侍中與趙郡李槩為莫逆之友槩將東還贍遺之書曰仗氣使酒我之常弊詆訶指切在卿尤甚足下告歸吾於何聞過也裴讓之與楊愔友善相遇則清談竟日愔每云此人風流警㧞裴文季為不亡矣盧懷仁有行簡善與人交與瑯琊王衍隴西李壽之情好相得嘗語衍云昔太丘道廣許邵知而不顧嵇生峭立鍾㑹過而絶言吾處季孟之間去其太甚衍以為然荀仲舉與趙郡李槩交欵槩死仲舉因望其宅為五言詩十六韻以傷之詞甚悲切宋游道與頓丘李奬一面便定死交奬曰我年位已高㑹用弟為佐史令弟北面於我足矣游道曰不能旣而奬為河南尹辟游道為中正使者相屬以衣帢待之握手歡謔元顥入雒奬受其命出使徐州都督元孚與城人趙紹兵殺之游道為奬訟寃得雪又表為請贈回已考一汎階以益之又與劉廞結交託廞弟粹於徐州殺趙紹後廞敗梟粹首於鄴市孫騰使客告市司得五百疋後聽收游道時為司州中從事令家人作劉粹所親於州陳訴依律判許而奏之勑至市司猶不許游道杖市司勒使速付騰聞大怒時李奬二子構訓居貧游道後令其求三富人死事判免之凡得錢百五十萬盡以入構訓其使氣黨俠如此後周韋夐高尚不仕與族人處𤣥及安定梁曠為放逸之友周𢎞正造夐談謔盡日恨相遇之晩也後請夐至賓館夐未赴𢎞正乃贈詩曰德星猶未動真車詎肯來當時所欽挹如此薛慎字伯䕶好學能屬文善草書與同郡裴叔逸裴諏之柳虯范陽盧柔隴西李璨並友善張軌少好學志識開朗初在雒陽家貧與樂安孫樹仁為莫逆之友每易衣而出以此見稱黎景希好占𤣥象頗知術數而落魄不事生業與范陽盧道源為莫逆之交冦儁為鎮東將軍西安縣男少為司徒崔光所知光命其子勵與儁結友每造光嘗清談移日小宗伯盧辯以儁業行俱崇待之以師友之禮每有閒暇輒詣儁讌語彌日嘗謂人曰不見西安君煩憂不遣其為通人所敬重如此柳𢎞與𢎞農楊素為莫逆之交裴尼性𢎞雅有器局為通直散騎常侍隴西李璨范陽盧誕並有高名於世與尼結忘年之交隋劉焯聰敏沈深弱不好弄少與河間劉炫結盟為友孔紹安越州山陰人少以文信知名徙居京兆鄠縣閉門讀誦文集數十萬言有詞人孫萬壽與紹安篤忘年之好薛道衡北齊時待詔文林館與范陽盧思道安平李德林齊名友善房彥謙有令名少與太原王邵北海高構蓚縣李綱河東柳彧薛孺皆一時知名雅淡之士彥謙並與為友雖冠蓋成列而門無雜賓體資文雅深逹政務有識者咸以逺大許之彥謙為鄀州司馬内史侍郎薛道衡一代文宗位望清顯所與交結皆海内名賢重彥謙為人深加友敬及為襄州總管辭翰徃來交錯道路煬帝嗣位道衡轉牧番州路經彥謙所留連數日流涕而别裴肅少剛正有局度少與安定梁毗同志友善崔儦年十六太守請為功曹不就少與范陽盧思道隴西辛德源同志友善崔廓與趙郡李士謙少為忘年之友每相徃來時稱李崔及士謙死廓哭之慟為之作傳輸之祕府士謙妻盧氏寡居每有家事輒令人諮廓取定元巖以名節自許少與渤海高熲太原王韶同志友善王孝籍少好學博覽羣言與河間劉炫同志友善李孝貞與從兄儀曹郎中騷太子舍人李節博陵崔子武范陽盧詢祖為斷金之契唐高士廉少有器局頗通文史隋司𨽻大夫薛道衡起居舍人崔祖濬並稱先逹與士亷結忘年之好繇是公卿藉甚杜淹聰辯多才藝弱冠有美名於京邑與同郡車福嗣為莫逆之交楊纂華陰人與瑯琊顔師古燉煌令狐德棻友善頗渉經史尤明史事劉𦙍之少與當時詞人孫萬壽李百藥並為忘年之友劉孝孫弱冠知名與虞世南蔡君和孔德紹庾自直劉斌登山臨水結為交友朱敬則性敦厚恢博少好學重節義少與右史江融尚書左僕射魏元忠友善劉允濟善屬文與綘州王勃早齊名特相友善陸餘慶少與知名之士陳子昻宋之問盧藏用道士司馬承禎道人法成等交游雖才學不逮子昻等而風流彊辯過之王琚聰敏有才畧與周璟張仲之為忘年之友薛登博渉文史與徐堅劉子𤣥齊名友善韋陟中書令安石之子與弟斌文華當代俱有盛名開元中才名之士王維崔顥盧象等嘗與陟唱和游處廣平公每見陟歎曰盛德遺範盡在是矣蕭昕為左拾遺與布衣張鎬友善張九齡素與中書侍郎嚴挺之尚書左丞袁仁敬右庻子梁昇卿御史中丞盧怡交友善挺之等皆有才幹而交道終始不渝甚為當時之所稱也郗純少時為李邕張九齡等知遇尤以詞學見推與顔真卿蕭頴士李華邵軫同志友善故天寶中語曰殷顔柳陸蕭李邵趙以其重行義敦交道也權臯天寳末移家於洪州改著作郎不起京師蹂於胡騎士君子多以家渡江東知名之士如李華柳識兄弟者皆仰臯之德而友善也于休烈自㓜好學善屬文與㑹稽賀朝萬齊融延陵包融為文詞之友齊名一時楊慿少負氣節重交游尚然諾與穆質許孟容李鄘王仲舒為友故時人稱楊穆許李之友王仲舒太原人少貧養母嗜學工文不就鄉舉交友必一時高名者與楊頊梁肅裴樞為忘形之契仲舒為拾遺與楊慿友善及慿得罪仲舒横議之貶為硤州刺史崔造與韓㑹盧東美張正則為友皆僑居上元好談經濟之略常以王佐自許時人號為四䕫郄士美少好學善記覽父友顔真卿蕭頴士柳芳嘗與之討論經傳應對如流旣而相謂曰吾曹異日當交二郄之間矣李泌流放江南與柳渾顧况為人外之交吟詠自適陸贄為中書舍人翰林學士母卒持䘮于河南豐樂佛寺日四方以賻贈為詞厚致金帛贄絲毫無所受唯與劔南節度使韋臯布衣時友善臯以事奏聞每有所致輒稱詔以受之及贄罷相貶忠州而韋臯屢表請以贄代已竟卒於忠州年五十二裴佶為工部尚書政事清敏凡所定交時稱為第一流没之日故司徒鄭餘慶請告於御史府行朋友之服縉紳美之韓愈性𢎞通與人友榮悴不易少時與雒陽人孟郊東郡人張籍友善二人名位未立愈不避寒暑稱薦於公卿間而籍終成科第榮於祿位後雖通貴毎退公之隙則相與談讌論文賦詩如平昔焉柳公綽性端介寡合與錢徽蔣乂杜元頴薛存誠文雅相知交情欵宻為吏部員外郎及武元衡罷相鎮西蜀與裴度俱為元衡判官尤相善公綽先度入為吏部郎中度以詩餞别有兩人同日事征西之句柳宗元與劉禹錫為執友元稹與白居易最善為文友後唐劉贊明宗朝為中書舍人翰林學士竇夢徵同年登第隣居友善夢徵早卒與同年楊凝式服緦麻為位而哭其家無少長與視䘮事䘏其孀稚人士稱之晉劉朐初隱居上谷大寧山與吕夢竒張麟結菴共處以吟誦自娛冊府元龜卷八百八十二
