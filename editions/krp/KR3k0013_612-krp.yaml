body:
  text: 册府元龜卷六百十二宋王欽若等撰刑法部定律令第四唐髙祖初起義師于太原即布寛大之令百姓苦隋苛政競來歸附旬日之間遂成帝業既平京師約法十二條惟制殺人劫盗背軍叛逆者死餘並蠲除之武德元年既受隋禪詔納言劉文静與當朝通識之士因開皇律令而損益之盡削大業所用繁峻之法是時大理少卿韓仲良言于帝曰周代之律其屬三千秦法以來約為五百若逺依周制繁紊更多且官吏至公自當奉法若茍徇己豈顧刑名請崇寛簡以允惟新之望帝然之於是採定開皇律行之時以為便二年正月詔自今已後每年正月五月九月及每月十齋日並不得行刑二月制官人枉法受財及諸犯盜詐請倉庫隱藏官物者罪無輕重皆不得赦原七年五月詔曰古不云乎萬邦之君有典有則九疇之叙興于夏世兩觀之法大備隆周所以禁暴懲姦𢎞風闡化安民立政莫此為先自戰國分擾恃詐任力苛制繁刑于兹競起秦并天下隳滅禮教恣行酷烈害虐烝民宇内騷然遂以顚覆漢氏撥亂思易前軌雖復務從約法蠲削嚴刑尚行葅醢之誅猶設錙銖之禁安民之道實有未𢎞刑措之風以兹莫致爰及魏晋流弊相沿寛猛乖方綱維失序上陵下替政散民凋皆由法令湮訛條章混謬自斯以後宇縣𤓰分戎馬交馳未遑典制有隋之世雖云釐革然而損益不定疎舛尚多品式章程罕能甄備加以微文曲致覽者惑其淺深異例同科用者殊其輕重遂使姦吏巧詆任情予奪愚民妄觸動陷羅網屢聞改革卒以無成朕膺期受籙寧濟區宇永言至治興寐為勞補千年之墜典拯百王之餘弊思所以正本澄源式清流末永垂憲則貽範後昆爰命羣才條定科律但古今異務文質不同䘮亂之後事殊曩代應機適變救弊斯在是以斟酌繁省取合時宜矯正差違務從體要迄兹歴稔撰次始畢宜下四方即令頒用庶使吏曹簡肅無取懸石之多奏讞平允靡競錐刀之末勝殘去殺此焉非逺先是髙祖勅尚書左僕射裴寂右僕射蕭瑀及大理卿崔善為給事中王敬業中書舍人劉林甫臣欽若等按林甫作議萬餘言擢拜中書侍郎顔師古王孝逺涇州别駕靖延太常丞丁孝烏大理寺丞房軸上將府叅軍李桐客太常博士徐上機等檢定律令大畧以開皇為准于時諸華始定邉方尚梗救時之弊有所未暇惟正五十三條格入新律餘無所改至是奏上于是頒行天下又云詔遣裴寂殷開山郎楚之沈寂安崔善為之徒定律令數嵗始成大畧以開皇為准正五十三條權用班行展矜之科有所未畧太宗貞觀十一年正月頒新律令于天下初帝自即位命長孫無忌房𤣥齡興學士法官更加釐改戴胄魏徴言舊律令太重于是議絞刑之屬五十條免死罪㫁其右趾應死者多蒙全活太宗尋又愍其受刑之苦謂侍臣曰前代不行肉刑乆矣今思㫁人右趾意甚不忍諫議大夫王珪對曰古行肉刑以為輕罪今陛下矜死刑之多設㫁趾之法格本合死今而獲生刑者幸得全命豈憚去其一趾且人之見者甚足懲戒帝曰本以為寛故行之然每聞惻愴不能忘懐又謂蕭瑀陳叔達等曰朕以死者不可再生思有愍矜故簡死罪五十條從㫁右趾朕復念其受痛極所不忍叔達等咸曰古之肉刑乃在死刑之外陛下于死刑之内改從㫁趾便是以生易死足為寛法帝曰朕意以為如此故欲行之又有上書言此非便公可更思之其後蜀王法曹叅軍裴𢎞獻又駮律令不便於時者四十餘事太宗令叅掌删改之𢎞獻於是與房𤣥齡等建議以為古者五刑刖居其一及肉刑廢制為死流徒杖笞凡五等以備五刑今復設刖刑是為六刑減罪在于寛𢎞加刑又加繁峻乃與八座定議奏聞于是除㫁趾法改為加役流三千里居作二年又舊條疏兄弟分後䕃不相及連坐俱死祖坐罪死孫配沒㑹有同州人房強弟任綂軍于岷州以謀反伏誅強當從坐帝嘗録囚徒憫其將死為之動容顧侍臣曰刑典仍用蓋風化未洽之咎愚人何罪而肆重刑乎更彰朕之不德也用刑之道當審事理之輕重然後加之以刑罰何有不察其本而一概加誅非所以恤刑重人命也然則反逆有二一為興師動衆一為惡言犯法輕重有差而連坐皆死豈朕情之所安哉更令百寮詳議于是𤣥齡等復定議曰按禮孫為王父尸案令祖有䕃孫之義然則祖孫親重而兄弟屬輕應重反流合輕翻死據理論情深為未愜今定律祖孫與兄弟緣坐俱配流其以惡言犯法不能為害者情狀稍輕兄弟免死配流為允從之自是比古死刑始除其半𤣥齡等遂與法司定律五百條分為十二卷一曰名例二曰衛禁三曰職制四曰户婚五曰廐庫六曰擅興七曰盜賊八曰鬭訟九曰詐偽十曰雜律十一曰捕亡十二曰㫁獄有笞杖徒流死為五刑笞刑五條自笞十至五十杖刑五條自杖六十至杖一百徒刑五條自徒一年逓加半年至三年流刑三條自流二千里逓加五百里至三千里死刑二條絞斬大凡二十等又有議請減贖當免之法八議一曰議親二曰議故三曰議賢四曰議能五曰議功六曰議貴七曰議勤八曰議賓應八議者死罪皆條所坐及應議之狀奏請議定奏裁流罪已下減一等若官爵五品以上及皇太子妃大功已上親應議者周以上親犯死罪者上請流罪以下亦減一等若七品以上官及官爵得請者之祖父母父母兄弟姊妹妻子孫犯流罪以下各減一等應議減及九品以上官若官品得減者之祖父母父母妻子孫犯流罪以下聽贖其贖法笞十贖銅一斤逓加一斤至杖一百則贖銅十斤此以上逓加十斤至徒一年者贖銅二十斤三年則贖銅六十斤流二千里者贖銅八十斤流二千五百里者則贖銅九十斤流三千里者贖銅一百二十斤又許以官當罪以官當徒者謂有官職人犯罪許以官當罪也五品以上犯私罪者一官當徒二年九品以上一官當徒一年若犯公罪者各加一年以官當流者三流同比徒四年仍各解見任除名者比徒三年免官者比徒二年免所居官者比徒一年又有十惡之條一曰謀反二曰謀大逆三曰謀叛四曰惡逆五曰不道六曰大不敬七曰不孝八曰不睦九曰不義十曰内亂其犯十惡者不得議請減之例年七十已上十五已下及廢疾犯流罪已下亦聽贖八十已上十嵗已下及篤疾犯反逆殺人應死者上請盜及傷人亦収贖餘皆勿論九十已上七嵗以下雖有死罪不加刑比隋代舊律減大辟入流者九十二條減流入徒者七十一條其當徒之法惟奪一官除名之人仍同士伍凡削繁去蠧變重為輕者不可勝紀又定令一千五百四十六條為三十卷至是頒下之又删武德貞觀以來勅格三十餘件定留七百條以為格十八卷留本司施行斟酌古今除繁去弊甚為寛簡便于人者以尚書省諸曹為之目初為七卷其曹之常務但留本司者别為留司格一卷葢編録當時制勅永為法則以為故事凡式三十有三篇亦以尚書省列曹及秘書太常司農光禄太僕太府少府及監門宿衛計帳名其篇目為二十卷十四年正月制流罪三等不限以里數量配邉惡之州四月制犯反逆免及緣坐配流者六嵗之後仍不聽仕十月戊寅制决罪人不得鞭背十五年五月定制從征人背軍不在常赦之限十六年正月制徙死罪以實西州其犯流徒則充戌各以罪名輕重為年限焉髙宗永徽元年勅太尉長孫無忌司空李勣左僕射于志寧右僕射張行成侍中髙季輔黄門侍郎宇文節栁奭左丞叚寳𤣥太常少卿令狐德棻吏部侍郎髙敬刑部侍郎劉燕客給事中趙文恪中書舎人李友益少府丞張行實大理丞元紹太府丞王文端刑部郎中賈敏行等共撰定律令格式舊制不便者皆隨有删改遂分格為兩部曹司常務為留司格天下所共者為散頒格其散頒格下州縣留司格但留本司行用焉三年詔曰律學未有定疏每年所舉明法遂無準慿宜廣召解律人條義疏奏聞仍使中書門下監定于是太尉趙國公無忌司空英國公勣尚書左僕射兼太子少師監修國史燕國公志寧銀青光禄大夫刑部尚書唐臨大中大夫守大理卿叚寳𤣥朝議大夫守尚書右丞劉燕客朝議大夫守御史中丞賈敏行等叅撰律疏成三十卷明年十月奏之頒于天下自是㫁獄者皆引疏分析之六年七月上謂侍臣曰律通比附條例太多左僕射志寧等對舊律多比附㫁事乃稍難解科條極衆數至三千隋日載定惟留五百以事類相似者比附科㫁今日所停即是叅取隋律修易條章既少極成省便龍朔二年改易官號因勅司刑太常伯源直心少常伯李敬𤣥司刑大夫李文禮等重定格式惟改曹局之名而不易篇第麟德二年奏上之儀鳯元年官號復舊又勅左僕射劉仁軌右僕射戴至德侍中張文瓘中書令李敬𤣥右庶子郝處俊黄門侍郎來左庶子髙志周右庶子李義琰吏部侍郎裴行儉馬戴兵部侍郎蕭徳昭裴炎工部侍郎李義琛刑部侍郎張楚金兵部侍郎盧律師等删緝格式二年三月九日撰定奏上先是詳刑少卿趙仁本撰法例三卷引以㫁獄時議亦以為折衷後帝覽之以為煩文不便因謂侍臣曰律令格式天下通規非朕庸虛所能創制並是武德之際貞觀以來或取定宸衷叅詳衆議條章備舉軌躅昭然臨事遵行自不能盡何為更須作例致使觸緒多疑計此因循非適今日速宜改轍不得更然自是例法遂廢不用則天垂拱中勅内史裴居道夏官尚書岑長倩鳳閣侍郎韋方質與删定官袁智𢎞等十餘人删改格式加計帳及勾帳式通舊式成二十卷又以武徳以來垂拱以前詔勅便于時者編為新格二卷則天自製序其二卷之外别編六卷堪為當司行用為垂拱留司格式韋方質詳練法理又委其事于咸陽尉王守慎又有經理之才故垂拱格式識者稱為詳宻其律令惟改二十四條又有不便者大抵依舊中宗神龍元年六月詔尚書右僕射唐休璟中書令韋安石左散騎常侍李懐逺禮部尚書祝欽明尚書右丞蘇瓌等定垂拱格四卷後以神龍元年正月二十五日已前制勅為散頒格七卷又删補舊式為二十卷表上之制令頒於天下景龍二年九月勅鳥雀昆蟲之屬不得擒捕以求贖生犯者先决三十睿宗太極元年二月頒新格式於天下先是景雲初勅户部尚書岑羲中書侍郎陸象先左散騎常侍徐堅右司郎中唐紹刑部貟外郎邵知與删定官大理寺丞陳義海左衛長史張處斌大理評事張名播左衛率府倉曹叅軍羅思貞刑部主事閻義顓凡十人删定格式律令至是奏上之名為太極格詔頒于天下四月制曰朕聞措刑由於用刑去殺存乎必殺明罰峻典自古而然立制齊人于是乎在自我朝建國僅將百年天下和平其來已乆徃承隋季守法頗專比襲時安持綱自緩況朕薄德誠莫逮先惟人難理逺不如昔粤從守位三載於兹庶務勤勞不捐晷景嘗謂自我作則感而成化痛乎迷俗忘反不威罔懲將致純風先歸重典比者贓賄不息偷濫公行放心未収犯禁無懼此焉暫革期于永平遂割小慈以崇大體自今造偽頭首者斬仍没一房資財同用䕃者並奪非頭首者絞官典主司枉法受贓一疋已上並先決杖一百其緣贓及惡狀被解者非選時不得輙至朝堂被訴如有此色先决杖一頓仍加貶斥上下官寮輙私情相囑者其受囑人宜封狀奏聞成器以下朕自决罰自餘王公以下並解見任進狀人别加褒賞御史宜令分察諸司若有罪過不能糾獲者貶與外官成器宋王名也𤣥宗先天二年六月禁殺牛馬驢等犯者科違告罪不得官當䕃贖公私賤隸犯者先决六十然後科罪八月制曰凡有刑人國之常法掩骼埋胔王者用心自今已後輙有屠割刑人骨肉者依法科殘害罪開元元年勅黄門監盧懐慎紫微侍郎兼刑部尚書李乂紫微侍郎蘇頲紫微舍人吕延祚給事中魏奉古大理評事髙智静同州韓城縣丞侯郢璡瀛州司法叅軍閻義顓等删定格式令至三年奏上之名為開元格三年二月詔曰古者名將在乎飬兵故疾則吮癰渇不先飲撫循慰薦恩義感激所以奮不顧身戰無完陣如聞諸將總管已下不遵師律多役兵士帳中厭梁肉之娱麾下罹勤瘁之色人既勞力軍亦挫氣豈孫吴飬士之方韜鈴用兵之法春秋責帥典憲斯在自今已後總管以下私使兵士計庸以受所監臨財物論頒下諸軍咸使知悉五年詔曰别宅女婦先施禁令徃來括獲特以寛容何得不悛尚多此事國有常法宜寘於理方畫一于後刑故三令以先德俾從輕法以愧其心今所括獲者見任官徴納四季禄前資准見任自餘諸色並准九品官禄數納粟婦女並放出掖庭即令京兆尹李朝隱求匹配嫁遣之京都作戒天下敢更犯者一依常格又詔曰自今已後官人犯贓罪至流死㑹赦免者宜准開元四年二月二十四日勅處分臣欽若等曰實録闕此四年二月勅六年勅吏部尚書兼侍中宋璟中書侍郎蘇頲尚書左丞盧從愿吏部侍郎裴漼慕容珣户部侍郎楊滔中書舍人劉令植大理司直髙智静幽州司功叅軍侯郢璡等九人删定律令格式至七年上之律令式仍舊名格曰開元後格十二年詔曰大德曰生至重曰命緬觀前典惟刑是恤比來犯盗先决一百雖非死刑大半殞斃言念于此良用惻然自今已後抵罪人合杖勅杖者並宜從寛決杖六十一房家口移𨽻磧西其嶺南人移𨽻安南江淮南人移𨽻廣府劍南人移𨽻姚嶲州其磧西姚嶲安南人各依常式布告遐邇使知朕意十三年詔曰身體髪膚受之父母不合毁傷比來有訴競之人即自刑害耳目自今已後犯者先决四十然後依法十九年侍中裴光廷中書令蕭嵩又以格後制勅用行之後頗與格文相違於事非便奏令所司删撰格後長行勅六卷頒于天下二十二年户部尚書李林甫受詔改修格令林甫尋遷中書令乃與侍中牛仙客御史中丞王敬從與明法官前左武衛胄曹叅軍崔見衛州司户叅軍直中書陳承信酸棗尉直刑部俞元把等共加删緝舊格式律令及勅總七千二十六條其一千三百二十四條於事非要並删之二千一百八十條隨文損益三千五百九十四條仍舊不改總成律十二卷律疏三十卷令三十卷式二十卷開元新格十卷又撰格式律令事類四十卷以類相從便于省覽二十五年九月奏上之勅于尚書都省寫五十本發使散于天下天寳四載詔曰刑之所設將以閑邪法不在嚴貴於知禁朕自臨萬國向踰三紀思𢎞至道之化實務好生之德比者應犯極法皆令免死配流所以市無刑人獄無寃繫哀矜勿喜冀洽于生靈大小以情寧忘于興寐至于徒罪雖非重刑力役之外不免拘繫載罹寒暑誠可矜量自今以後其犯罪應合徒者並宜配諸軍効力庶感激之士因以成功寛大之恩叶于在宥且本置杖罪是代肉刑將以矜人非重為法今官吏决罰或有生情因兹致斃深可哀憫其犯杖罪情非巨蠧者量事亦令効力宜令所司作載限仍立條例處分六載正月詔曰朕承大道之訓務好生之德於今約法已去極刑議罪執文猶存舊日既措而不用亦惡聞其名自今以後所㫁絞斬刑者宜除削此條仍令法官約近例詳定處分今㫁極刑云決重杖以代極刑法始于此也八載詔曰唐虞省刑畫冠不犯秦漢制法宻網惟煩理亂之機得失斯在朕嘗想淳古務崇敦樸刑期不濫政叶無為豈惟守于昇平庶有臻于大道頃者詳諸條目已從推究至于結㫁尚慮深刻所貴從寛示其知禁宜令中書門下與刑部大理法官審更詳定法律之間有所便者具條目奏聞肅宗至德元年七月即位詔官吏犯枉法贓終身勿齒乾元元年四月詔曰百姓中有事親不孝别籍異財㸃汚風俗虧敗名教先決六十配𨽻磧西有官品者禁身奏聞二年三月詔曰刑獄之典以理人命死無再生之路法有哀矜之門是以訟必有孚刑期不用周窮五聽天下所以無寃漢約三章萬人以之胥悦言念欽恤用諧丕變自今以後諸色律令殺人反逆姦盜及造偽十惡外自餘煩冗一切删除仍委中書門下與刑部大理法官共詳定具件奏聞代宗寳應元年九月刑部侍郎盧元裕奏准式制勅與一頓杖者决四十重杖一頓者决六十無文至死式内自有殺却處盡等文即明重杖只合加數京城先因處分决殺者多一死不可復生望准式文處分或决痛杖一頓者式文既不載亦請准重杖六十例不至死許之德宗大歴十四年六月即位詔曰律令格式條目有未折衷者委中書門下簡擇理識通明官共删定自至德以來制勅或因人奏請或臨事頒行差互不同使人疑惑中書門下與删定官詳决取堪乆長行用者編入條格初以中書門下為删定格式使至建中二年罷之其格令委刑部删定貞元八年十一月詔曰比者所司㫁罪拘守科條或至死刑猶先决杖處之極法重此傷殘非惻隱也自今罪至死者勿先決杖憲宗元和二年七月命刑部侍郎許孟容大理少卿栁登吏部郎中房式兵部郎中蔣武户部郎中熊執易度支郎中崔元禮部員外郎單貫之等删定開元格後勅三年正月詔自今已後應坐贓及他罪當贖者諸道委觀察判官一人專勾當及時申報如蔽匿不申者節級科貶如罪不繫奏官長量情處置者其贓但准前申送御史臺充本色給用仍差御史一人專知贓贖不得以贓罰為名如罪名未正妄罰其財亦委觀察判官勾當差定後先具名奏聞三月詔厚𦵏傷生明勅設禁但官司慢法久不申明愚下相循遂至違越其違制賃𦵏車人六人各决四十十月乙亥重申採銀之禁輙採一兩已上者笞二十逓出本界州縣官吏節級科罰四年二月京兆府奏准建中三年三月勅節文當府界内捉獲強盜不論有贓無贓及竊盜贓滿三疋以上者並准勅集衆决殺不滿疋者量事科决補充所由犯盗人雖有官及屬軍等一切並依此例處分准天寳十四年正月勅府縣務煩事須速决若一一皆待勘覆即必有稽留伏准今年正月勅自今以後諸司應有决殺囚若不承正勅並不在行决之限如跡渉兇惡須速决遣並特勅處分者亦宜一度覆奏者伏以京邑浩穰庶務煩劇擒姦戮盗事實尋常若一罪一刑動須覆奏不惟懼于留獄實亦煩于聖覽况畿甸之内尤須肅清其強盗竊盗并犯徒以下罪情准建中三年及天寳十四載勅處分其餘罪犯經有司准按者請准今年正月勅處分從之九月詔刑部大理决㫁繫囚過為淹遲是長姦倖自今以後大理檢㫁不得過二十日刑部覆下不得過十日如刑部覆有異同寺司重㫁不得過十五日省司重覆不得過七日如有牒外州府勘節目及于京城内勘本推即以報牒到後計日數被勘司却報不得過五日仍令刑部具遣牒及報到月日牒報都省及分差使各准勅文勾舉糾訪如有違越奏聽進止其有獄情可疑須再三詳審非限内可畢者即别狀分析并寺司每月已㫁未㫁囚姓名事由並申報中書門下五年十一月癸卯詔應中外官有子弟凶惡不告家長私舉公私錢起自今已後舉錢無尊屬同署文契其舉錢主在與不在其保人等並决二十其本利錢仍令均攤填納應口馬莊宅諸色買賣相當後勒買人面付賣人價錢如違牙人决重杖二十付錢主家亦科罪從京兆尹王播所奏也六年十月中書門下奏狀准建中元年勅常叅官授上訖三日内上表讓一人以自代者伏以人臣拜職皆有謝章晋太尉劉實著崇讓論請因謝章便有所讓令主者掌此讓文類其被舉最多者有官缺據此選用如此則事不專於宰府材須選于衆人唐虞僉諧義實由此臣請自今常叅官舉人後便選擇進具所舉人兼狀上中書門下如官缺要人先于所舉人中選擇進擬臣又聞周之羣僕委于伯冏漢之多士辟于有司故凡稱大寮皆得進善陛下念黎元之困設令長之科羣寮舉知四海蒙福然薦延相繼沮勸未行茍或容私則慮害政伏請所舉縣令到任後刑罰寃濫及有贓犯者其舉薦官削階及停見任書下考並准元和三年勅處分委御史臺諸道觀察使嚴加察訪不得容貸其諸司所奏官屬及有狀論薦人如有贓犯過惡亦請具名奏聞量加殿罰所冀人知所懼舉不妄行為官擇人得賢報國從之八年九月詔減死戍邉前代美政量其逺邇亦有便宜自今已後兩京及闗内河南河東河北淮南山南東西道州府有犯罪繫囚除大逆及殺人外其餘應入死罪並免死配流天德五城諸鎮有妻兒者亦任自隨又緣頃年以來所有配𨽻或非重辟便至逺遷有司上陳又煩年限向後如有輕犯更不得配流五城先是天德流人與諸州異無歸還之限刑部侍郎王播奏以七年放還為限著為定令九年五月壬申命京兆尹禁諸色人不得與商人私有便換犯者没入賞罰有差十年十月辛亥詔曰凡在職司必當亷慎茍懐貪汚實紊政經為理之先固在懲誡其犯贓官本據律文刑名甚重頃者多從寛宥不足懲姦切在申明使其知懼自今以後如錢穀稍多及情狀難恕者宜杖決配流餘並比類節級科處如有此色所在長吏及觀察使不能糾察事發之後並據所犯輕重加責罰庶警貪吏以惠疲人十二年七月己酉勅左降官等考滿量移先有勅命因循日久都不舉行遂使幽遐之中恩澤不及自今以後左降官及量移未復資官亦宜準此處分如是本犯十惡五逆及指斥乘輿妖言不順假托休咎反逆緣累及贓賄數多情狀稍重者宜具事申奏聞其曾任刺史都督郎官御史并五品以上常叅官刑部檢勘具所犯事由聞奏並申中書門下商量處分如未滿五考已前遇恩者准當時節文處分其復資度數准元和二年六月二十七日勅文處分九月刑部奏准今年七月二十一日勅諸左降官等經五考滿許量移者其貶降日授正員官或無責授並請至五考滿然後許本任處申闕並餘左降官緣任去州府多在遐逺至考滿日其中有申牒稽遲致使留滯者其刺史本判官錄事叅軍叅軍等並請與下考如考滿後雖己申牒未量移間其禄料並准天寳貞元兩度勅文依舊攴給其本犯十惡等罪已有正名請依舊從之十三年八月鳳翔節度使鄭餘慶等詳定格後勅三十卷左司郎中崔郾等六人修上其年刑部侍郎許孟容蔣乂等奉詔删定復勒成三十卷刑部侍郎劉伯芻等定如其舊卷穆宗以元和十五年正月即位閏正月鹽鐵使栁公綽奏當使監院塲官及專知納給并吏人等有負犯合結罪者比依推問聞奏只罪本犯所由其監臨主守都無科處伏請從今舉名例律每有官吏犯贓監臨主守同罪及不能覺察者並請准條科處所冀刑章具舉貪吏革心從之十二月勅郊禮日近恐有奸人覬望恩赦從今日至來年正月三日以前京畿應有姦非盜賊准法處分不在赦原之限縱屬諸軍使亦委府縣依律科㫁長慶元年五月御史中丞牛僧孺奏天下刑獄苦於淹滯請立程限大事大理寺限三十五日詳㫁畢申刑部限三十日聞奏中事大理寺三十日刑部二十五日小事大理寺二十五日刑部二十日一狀所犯十人已上㫁罪二十件已上為大事所犯六人已上所㫁罪十件已上為中事所犯五人已下所㫁罪十件已下為小事其或所抵罪狀若所結刑名並同者則雖人數甚多亦同一人之例比來刑獄淹滯亦緣官吏人稀今請刑部四覆官并大理六丞每月常二十日入其厨料牒户部准例加給又近日所㫁刑獄多稱緣元推節目不盡移牒勘覆致此淹滯今日以後如臺推覆節目不盡致令所司須更盤勘元推官書下考本典轉選日量殿三選從之十月御史臺奏應十惡及殺人鬬毆官典犯贓并詐偽訴良劫盜竊盜及府縣推㫁訖重論訴人等皆是姦惡之徒推鞫之時盡皆伏罪臨刑之次即又稱寃或冀有動搖或貴延日月每度稱屈皆須重推遂使知證平人嘗被追擾經渉時嵗獄具無期一姦人自犯刑章數十家因緣破散若無懲革為弊實深伏請自今已後有此色賊臺及府縣并外州縣但通計二度推官不同人皆有伏欵及經三度㫁結者更有論訴一切不在重推問限其中縱有進狀勅下如是已經三度結㫁者亦請受勅處聞奏執論庶得公務肅清姦源杜絶如是告本推官典受賄賂推㫁不平及有寃濫事狀言訖便可立驗者即請與重推如所告及稱寃推勘又虚妄及依前無理者除本犯是死刑外餘罪於本條更加一等科罪如官典取受有實者亦請於本罪更加一等如有所寃屈不虚者其第三度推官典伏請本法外更加一等貶責其第二度官典亦請節級科處冀使下無寃人上無濫法冊府元龜卷六百十二
