body:
  text: 冊府元龜卷五百四十二宋王欽若等撰諌諍部直諌第九北齊王紘字師羅為奉朝請頗為文宣所知待帝常與左右飲酒曰快哉大樂紘對曰亦有大樂亦有大苦帝曰何為大苦紘曰長夜荒飲不寤亡國破家身死名滅所謂大苦帝黙然後責紘曰爾與紇奚舎樂同事我兄弟舎樂既死爾何為不死紘曰君亡臣死自是常節但賊竪力薄斫輕故臣不死帝使燕子獻反縳紘長廣王捉頭帝手劔將下紘呼曰楊遵彦崔季舒逃走避難位至僕射尚書冐危效命之士反見屠戮曠古未有此事帝投刀於地曰王師羅不得殺遂捨之高徳政為尚書右僕射兼侍中與尚書令楊愔綱紀政事多有引益文宣末年縱酒酣醉所為不法徳政屡進忠言後召徳政飲不從又進言曰前諌陛下道我尋休今乃甚於既往其若社稷何其若太后何帝不悅後周栁慶為尚書右丞太祖甞怒安定國臣王茂將殺之而非其罪朝臣咸知而莫敢諌慶乃進曰王茂無罪奈何殺之因而太祖愈怒聲色甚厲謂慶曰王茂當死卿若明其無罪亦須坐之乃執慶於前慶辭氣不撓抗聲曰竊聞君有不逹者為不明臣有不諍者為不忠慶謹竭愚誠實不敢愛死但懼公為不明之君耳碩深察之太祖乃悟而赦茂已不及矣太祖黙然明日謂慶曰吾不用卿言遂令王茂寃死可賜茂家錢帛以旌吾過樂運為京兆丞宣帝嗣位葬訖詔天下曰除帝及六宫便議即吉運上䟽曰三年䘮自天子逹庶人先王制禮安可誣之禮天子七月而葬以俟天下畢至今䘮期既促事訖便除文軌之内奔赴未盡隣境逺聞使猶未至若以䘮服受弔不可既吉復凶如以𤣥冠對使未知此何禮進退無㨿愚臣竊所未安書奏帝不納帝既昏暴滋甚運乃輿櫬詣朝堂陳帝八失一曰内史御正職在弼諧湏叅議共治天下大尊比來小大之事多獨斷之堯舜至聖尚資輔弼况大尊未為聖主而可專恣己心凡諸刑罸爵賞爰及軍國大事請叅諸宰輔與共之二曰内作色荒古人重戒大尊初臨四海惠徳未洽先搜天下美女用實後宫又詔儀同以上女不許輙嫁貴賤同惡聲溢朝野請姬媵非幸御者放還本族欲嫁女勿更禁之三曰天子未明求衣日旰㤀食猶恐萬幾不理天下壅蔽大尊比來一入後宫數日不出所湏聞奏多附内竪傳言失實是非可懼事由宦者亡國之徵請垂拱高視居外聽政四曰變故異常乃為政之大忌嚴刑酷罪非致安之𢎞規若罸無定制則天下皆懼政無常法則民無適從豈有削嚴刑之詔未及半祀尋即追改更嚴前制政令不定乃至於斯今宿衞之官有一夜不直者罪至削除因而逃亡者遂便籍沒此則大逆之罪與十杖同科雖為法愈嚴人情愈散一人心散尚或可止若天下皆散將如之何秦網宻而國亡漢章䟱而祚永請遵經典並依大律則億兆之民手足有所措矣五曰高祖斵雕為朴本欲傳之萬世大尊朝夕趨庭親承聖㫖豈有䘮未踰年而遽窮奢麗成父義志豈其然乎請興造之制務從卑儉雕文刻鏤一切勿營六曰都下之民徭賦稍重必是軍國之要不敢憚勞豈容朝夕徵求唯供魚龍爛熳士民從役祗為俳優角抵紛紛不已財力俱竭業業相顧無復聊生凡此無益之事請並停罷七曰近見有詔上書字誤者即治其罪假有忠謹之人欲陳時事尺有所短文字非工不宻失身義無假手脫有殊謬便䧟嚴科嬰徑尺之鱗其事非易下不諱之詔猶懼未來更加刑戮寧無鉗口大尊縱不能採誹謗之言宜無杜獻書之路請停此詔則天下幸甚八曰昔桑穀生朝殷王因之而獲福今立象垂誡此亦興周之祥大尊雖减膳撤懸未盡消譴之理誠願諮諏善道循布徳政觧兆民之愠引萬方之罪則天變可除鼎業方固大尊若不革兹八事臣見周廟不血食矣帝大怒將戮之内史元巖救之獲免元巖為内史大夫宣帝嗣位為政昏暴京兆郡丞樂運乃輿櫬詣朝堂陳帝八失言甚切至帝大怒將戮之朝臣皆恐懼莫有救者巖謂人曰臧洪同日尚可俱死其比干乎若樂運不免吾將與之俱斃詣闕請見於帝曰樂運知書奏必死所以不顧身命者欲取後世之名陛下若殺之乃成其名落其術内耳不如勞而遣之以廣聖度運獲免隋王誼自高祖為丞相以誼為行軍元帥開皇初帝將幸岐州誼諌曰陛下初臨萬國人情未洽何用此行帝戲之曰吾昔與公位望齊等一朝屈節為臣或當耻愧是行也震揚威武欲以服公心耳誼笑而退劉行本開皇初為諌議大夫檢校中書侍郎高祖甞怒一郎於前笞之行本進曰此人素清其過又小帝不顧行本正當帝前曰陛下不以臣不肖令臣在左右臣言若是陛下安得不聽臣言若非當致之於理安得輕臣而不顧所言非私因置笏於地而退帝歛容謝之遂原所笞者長孫平開皇中為兵部尚書有人告大都督邴紹非毁朝廷為憒憒者高祖怒將斬之平進諌曰川澤納汙所以成其深山嶽蔵疾所以就其大臣不勝志願願陛下𢎞山海之量茂寛裕之徳鄙諺曰不痴不聾未堪作大家翁此言雖小可以喻大邴紹之言不應聞奏陛下又復誅之臣恐百代之後有虧聖徳帝於是赦紹因赦群臣誹謗之罪勿復以聞梁毗為大理卿位上開府時見左僕射楊素貴寵擅權百僚震慴恐為國患因上封事曰臣聞臣無有作福臣之作福其害于而家㓙于而國竊見左僕射越國公素幸遇愈重權勢日隆縉紳之徒属其視聽忤意者嚴霜夏零阿㫖者膏雨冬沐榮枯由其唇吻廢興俟其指麾所思皆非忠讜所進皆是親戚子弟布列兼州連縣天下無事容息異圖四海稍虞必非福始夫姦臣擅命有漸而來王莾資之於積年桓𤣥基之於易世而卒殄漢祀終傾晋祚季孫專魯田氏簒齊皆載典誥非臣億說陛下若以素為阿衡臣恐其心未必伊尹也伏願揆監古今量為處置俾洪基永固率土幸甚輕犯天顔伏聽斧鑕高祖大怒命有司禁止親自詰之毗極言曰素既擅權寵作威作福將領之處殺戮無道又太子及蜀王罪廢之日百僚無不震悚唯素揚眉奮肘喜見容色利國家有事以為身幸毗發言謇謇有誠亮之節高祖無以屈也乃釋之素自此恩寵漸䟱庾質為太史令大業八年煬帝親伐遼東徵詣行在所至臨榆謁見帝謂質曰朕承先㫖親事高麗度其土地人民纔當我一郡卿以為尅否質對曰以臣管窺伐之可尅竊有愚見不願陛下親行帝作色曰朕今總兵至此豈未見賊而自退也質又曰陛下若慮損軍威臣猶願安駕住此命驍將勇士指受規模倍道兼行出其不意事冝在速緩必無功帝不悅曰汝難行可住此也及師還授太史令九年復征高麗又問質曰今復何如對曰臣實愚迷猶執前見陛下若親動萬乘麋費實多帝怒曰我自行不能尅直遣人去豈有成功也帝遂行既而禮部尚書楊立感㨿黎陽反兵部侍郎觧斯政奔帝大懼而西還謂質曰卿前不許我行當為此耳樊子盖大業十一年從駕汾陽宫至於鴈門車駕為突厥所圍頻戰不利帝欲以精騎潰圍而出子盖諌曰陛下萬乘之主豈冝輕脫一朝狼狽雖悔不追未若守城以挫其銳四靣徵兵可立而待陛下亦何所慮及欲身自突圍因垂泣願暫停遼東之役以慰衆望躬親出慰撫厚為勲格人心自奮不足為憂帝從之其後援兵稍至虜乃引去納言蘇威追論勲格太重在斟酌盖執奏不冝失信帝曰公欲收物情耶子盖黙然不敢對趙才為右衞大將軍大業末煬帝將幸江都才見四海亂離恐為社稷之慮自以荷恩深重無容坐看亡敗於是入諌曰今百姓疲勞府蔵空竭盗賊蜂起禁令不行願陛下還京師安兆庶臣雖愚蔽敢以死請帝大怒以才属吏旬日帝意頗觧乃令出之唐孫伏伽髙祖武徳元年為萬年縣法曹以三事上諌其一曰臣聞天子有諍臣雖無道不失於天下父有諍子雖無道不䧟於不義故云子不可不諍於父臣不可不諍於君以此言之臣之事君猶子之事父故也隋後主所以失天下者何也止為不聞其過當時非無直言之士由君不受諌自謂徳盛唐堯功過夏禹窮侈極欲以恣其心天下之士肝腦塗地户口減耗盗賊日滋而不覺知者皆由朝臣不敢告之也向使煬帝修嚴父之法開直言之路選賢任能賞罸得中人人樂業誰能動揺者乎所以前朝好為變更不師古訓者止為天下誘其咎將以開今聖唐也陛下龍舉晋陽天下響應計不旋踵大位遂定陛下勿以唐得天下之易不知隋失之不難也陛下貴為天子富有天下動則左史書之言則右史書之既為竹帛所拘何可恣情不慎凡有蒐狩須順四時不可妄動陛下二十日龍飛二十一日有輙獻鷂雛者此乃前朝之弊風少年之事務何忽今日行之又聞相國叅事盧牟子獻琵琶長安縣丞張安道獻弓箭頻蒙賞勞但普天之下莫非王土率土之濵莫非王臣陛下必有所欲何求而不得陛下所少者豈此物哉願陛下察臣愚心則天下幸甚其二曰百戯散樂本非正聲有隋末大見崇用此謂滛風不可不改近者太常官司於人間借女婦裙𥜗五百餘具以充散妓之服云擬五日於𤣥武門遊戯臣竊思審實損皇猷亦非貽厥孫謀為後代法也故書云無以小惡為無傷而不去恐從小至於大故也論語云放鄭聲逺佞人又云樂則韶舞以此言之散妓定非功成之樂也如臣愚見請並廢之則天下不勝幸甚其三曰臣聞性相近而習相逺以其所好相染故也故書云與治同道㒺弗興與亂同道㒺弗亡以此言之興亡在其所與皇太子及諸王等左右群僚不可不擇而任之也如臣愚見但是無徳義之人及先來無頼家門不能雝穆及好奢華馳騁獵射專作博遊狗馬聲色歌舞之人不得使親而近之也此等止可悅耳目備馳驅至於拾遺補闕决不能為也臣歴窺徃古下觀近代至於子孫不孝兄弟離間莫不為左右之人也願陛下妙選賢才以為皇子僚友如此即克隆磐石永固維城矣高祖覽之大悅拜伏伽中書侍郎及平王世充竇建徳大赦天下既而責其黨與並令配遷伏伽上表諌曰臣聞王言無戲自古格言去食存信傳諸舊典故書云爾無不信朕不食言又論語云一言出口駟不及舌以此而論言之出口不可不慎伏惟陛下光臨區宇覆育群生率土之濵誰非臣妾絲綸一發取信萬方使聞之者不疑見之者無惑也陛下今月二日發雲雨之制光被黔黎無所間然公私蒙頼既云常赦不免皆赦除之此非直赦其有罪亦是與天下斷當許其更新以此言之但是赦後即便無事因而王世充及建徳部下赦後復配遷之此是陛下自違天心欲遣下人莫為取則若欲子細推尋逆城之内人誰無罪故書云殱渠魁充等為首渠魁尚免脅從何辜且古人云蹠犬吠堯吠非其主在東都城内及建徳部下乃有與陛下積小故舊編髪友朋猶尚有人敗後始至者此等豈亡陛下皆云被擁故也以此言之自外踈者竊謂無罪人書云非知之艱行之惟艱上古以來何代無君所以只稱堯舜之善者何也直由為天子者實難善名難得故也往者天下未平威權須應機而作今四方既定設法湏與人共之但法者陛下自作之還湏守之使天下百姓信而畏之今自為無信欲遣兆人均為信畏故書云無偏無黨王道蕩蕩無黨無偏王道平平賞罸之行逹乎貴賤聖人制法無限親踈如臣愚見世充建徳下偽官經赦合免責情欲遷配者請並放之則天下幸甚又上表請置諌官高祖皆納焉貞觀元年轉大理少卿太宗甞馬射伏伽上書諌曰臣聞千金之子坐不垂堂百金之子立不倚衡以此言之天下之主不可履險乘危明矣臣又聞天子之居也則禁衞九重其動也則出警入蹕此非直尊其居處乃為社稷生靈之大計耳故古人云一人有慶兆民頼之臣竊聞陛下猶自走馬射帖娛悅近臣此乃無禁乘危竊為陛下有所不取也何者一則非光史冊二則未足顯揚又非所以導飬聖躬亦不可以垂範後代此只是少年諸王所務豈得既為天子今日猶行之乎陛下雖欲自輕其奈社稷天下何如臣愚見竊謂不可太宗覽之大悅禇亮武徳初為秦王文學高祖以冦亂漸平毎冬畋狩亮抗表諌曰臣聞堯鼓納諌舜木求箴茂克昌之風致升平之道伏惟陛下應千祀之期拯百王之弊平一天下劬勞帝業旰食思政廢寢憂人用農隙之餘遵冬狩之禮獲車之所逰踐虞旗之所渉歴網惟一面禽止三驅縱廣成之獵士觀上林之手摶廽玊鑾而藉豐草引金陣而滿平原盡心目之娛翫罝梁之樂發雕弓而廹狡兎飛勁矢而摧高鳥斯固畋弋之常規而皇王之壯觀至於親逼猛獸臣竊惑之何者筋力驍悍爪牙輕㨗連弩一彂未必挫其㓙心長㦸纔揮不能當其憤氣雖復孟賁抗左夏說居前卒然驚軼事生慮表如或奔赴林藂未填坑谷駭屬車之後乘犯官騎之清塵小臣怯愞私懐悚慄陛下以至聖之資垂將來之教降情納下無隔直言臣切逢明時遊官藩邸身漸榮渥日用不知敢縁天造冐陳丹慮䟽奏高祖納之唐儉貞觀初自天策府長史遷民部尚書從幸雒陽苑射猛獸儉見群豕突出林中太宗引弓四發殪四豕有一雄彘突及馬鐙儉投馬摶之太宗㧞劔斷豕頭笑曰天策長史不見上將擊賊耶何懼之甚對曰漢祖以馬上得之不以馬上治之陛下以神武定四方豈復逞雄心於一獸太宗納之因為罷獵蘇世長武徳中為諌議大夫從幸涇陽校獵至高陵合圍是日獲陳禽獸於旌門高祖入御營顧臣曰今日畋樂乎世長進諌曰陛下逰獵薄廢萬機不滿十旬未為大樂高祖色變既而笑曰狂態發耶又對曰為臣私計則狂為陛下國計則忠矣及突厥入冦武功郿縣多失户口是後下詔將武功較獵世長又諌曰突厥初入大為民害陛下救恤之道猶未發言仍於其地又更畋獵非但仁育之心有所不足百姓俱頓將何以堪高祖不納又甞引之宴於披香殿世長酒酣進曰此殿煬帝之所作耶何雕麗之若此也高祖曰卿好諌似直其心實詐豈不知此殿是吾所造何湏姦詭疑煬帝乎對曰臣實不知但見瓊宫瑶䑓琉璃之瓦並非受命帝王愛民節用之所為也若是陛下作此誠非所冝臣昔在武功幸嘗陪侍見陛下宅纔蔽風霜當于彼時亦以為足今自隋之後民不堪命數歸有道而陛下得之實為懲其奢滛不忘儉約今既有天下而於隋宫之内又加雕餙欲撥其亂而可得乎高祖毎優容之李綱為禮部尚書武徳中高祖拜舞人安叱奴為散騎侍郎既在朝列咸陪逰宴綱諌曰禮均工樂胥不得預於仕伍雖復才如子野妙等師㐮皆終繼世不易其業故魏武帝欲使禰衡擊鼓先觧衣服露體而擊之問其故對曰不敢以先王法服而為伶人之衣也唯齊末高緯封曹妙逹為王安馬駒為開府有國有家者以為殷鑒今新定天下開太平之基起義功臣行賞未遍高才碩學猶滯草萊而先令舞胡致仕五品鳴玉曳組趨馳廊廡故非創規模貽子孫之道也高祖不納曰我已授之不可追矣張行成為給事中太宗甞臨軒謂侍臣曰朕豈不能恣情慾取樂當年而勵節苦心卑宫菲食正為蒼生爾我為人主兼行將相之事豈不是奪公等名昔漢得蕭曹韓彭天下寧晏舜禹湯武有稷契伊吕四海乂安此事朕並兼行之成上書諌曰有隋失道天下沸騰陛下撥亂反正拯生人於塗炭何周漢君臣之所能擬陛下聖徳含光規模𢎞逺雖文武之列實兼將相臨朝對衆與其較量以萬乘至尊與臣下争功哉臣聞天何言哉四時行焉又聞汝惟不矜天下莫與汝争能汝惟不伐天下莫與汝争功臣備員樞近非敢知獻替之事輙陳狂直伏待葅醢太宗深納之魏徵武徳末為諌議大夫太宗即位數引入卧内訪以得失徵雅有經國之才性又抗直無所屈撓太宗常勞之曰卿所陳諌前後二百餘事非卿至誠奉國何能若是貞觀二年遷秘書監叅預朝政七年代王珪為侍中臣欽若等曰魏徵自為秘書監叅預朝政侍中事具宰輔諫諍門是年遜位拜特進知門下省事十一年上䟽曰臣聞為國之基必資於徳禮君之所保惟在於誠信誠信立則下無二心徳禮形則逺人斯格然則徳禮誠信國之大綱在於父子君臣不可斯湏而廢也故孔子曰君使臣以禮臣事君以忠又曰自古皆有死人無信不立文子曰同言而信信在言前同令而行誠在令外然則言而不行言不信也令而不從令無誠也不信之言無誠之令為上則敗徳為下則危身雖在顛沛之中君子所不為也自王道休明十有餘載威加海外萬國來庭倉廪日積土地日廣然而道徳未益厚仁義未益博者何哉由乎待下之情未盡於誠信雖有善始之勤未觀克終之美故也其所由來有漸非一朝一夕昔貞觀之始乃聞善若驚暨五六年間猶悅以從諌自兹厥後漸惡直言雖或勉強時有所容非復曩時之豁如也謇諤之士稍避龍鱗便佞之徒肆其巧辯謂同心者為朋黨謂告訐者為至公謂彊直者為擅權謂忠讜者為誹謗謂之朋黨雖忠信而可疑謂之為至公雖矯偽而無咎彊直者畏擅權之義忠讜者慮誹謗之尤至於竊斧生疑投杼致惑正人不得盡其言大臣莫能與之争熒惑視聼鬰於大道妨治損徳其在兹乎故孔子惡利口之覆邦家盖為此也且君子小人貎同心異君子掩人之惡揚人之善臨難不茍免殺身以成仁小人不耻不仁不畏不義唯利之所在危人則何所不至今將求致此必委之於君子事有得失或訪之於小人其待君子也則敬而踈遇小人也必輕而狎狎則言無不盡踈則情不上通是則毁譽在於小人刑罸加於君子實興衰之所在亦安可以不慎哉此乃孫卿所謂使智者謀之與愚者論之使修㓗之士行之與汙邪之人疑之欲其成功得乎哉夫中智之人豈無小慧然才非經國慮不及遠雖竭力盡誠猶未免於傾敗况内懐姦宄承顔順㫖其患禍不亦深乎故孔子曰君子而或有不仁者焉未見小人而仁者也然則君子不能無小惡惡不積無妨於正道小人或時有小善善不積不足以立忠今謂之善人矣復慮其不有信何異夫立直木而疑其影之不直乎雖竭精神勞思慮其不可得亦已明矣夫君能盡禮臣得盡忠在於内外無私上下相信上不信則無以使下下不信則無以事上信之為道大矣哉故自天祐之吉無不利昔齊桓公問於管仲曰吾欲使爵腐於酒肉腐於爼得無害於覇乎管仲曰此極非其善者然亦無害覇也公曰何如而害覇乎管仲曰不能知人害覇也知而不能用害覇也用而不能任任而不能信害覇也既信而又使小人叅之害覇也晋中行穆伯攻鼓經年而不能下饋間倫曰鼓之得失間倫知之請勿疲士大夫而鼓可得穆伯不應左右曰不折一㦸不傷一卒而鼓可得君奚為不取穆伯曰間倫之為人也佞而不仁若使間倫下之吾可以不賞之乎若賞佞人佞人得志是使晋之士捨仁而為佞雖得鼔將何用之夫穆伯列國大夫管仲覇者之佐猶慎於信任逺避佞人也如此况乎為四海之大君應千齡之上聖而可使巍巍之盛徳復將有所間然乎若欲令君子小人是非不雜必待之以信厲之以義節之以禮然後善善而惡惡審賞而明罸則小人絶其邪君子自彊不息無為之化何遠之有善善而不能進惡惡而不能去罸不及於有罪賞不及於有功則危亡之期或未可保永錫祚裔將何望哉太宗手詔答之太宗常嫌上封事者衆不近事實欲加黜責徵奏曰古者立誹謗之木欲聞已過今之封事謗木之流也陛下思聞得失祗可恣其陳道若所言𠂻則有益於陛下若無𠂻亦無損於國家太宗曰此言是也並勞而遣之戴胄為兵部尚書貞觀二年太宗將修雒陽胄諫曰闗中河外近置軍團富室強丁並從戎旅重以九成作役餘丁尚盡去京二千里内先配司農將作假有遺餘勢何足紀亂離甫止户口單弱一人就役舉家便廢入軍者督其戎杖從役者責其餱糧盡室經營多不能濟以臣愚慮恐致怨嗟今丁役既盡賦調不入費用不止帑蔵其虚且雒陽宫殿足蔽風雨數年功畢亦謂非晩若頓修營恐傷勞擾帝嘉之張𤣥素為給事中貞觀四年詔發卒修雒陽宫乾陽殿以備廵幸𤣥素上書曰微臣竊思秦始皇之為君也藉周室之餘六國之盛將貽之萬世及其子而亡良由逞嗜奔慾逆天害人者也是知天下不可以力勝神祗不可以親恃唯當𢎞儉約薄賦歛慎終如始可以永固方今承百王之末屬凋弊之餘必欲節之以禮制陛下冝以身為先東都未有幸期即何湏補葺諸王今並出藩又須營搆興廢漸多豈疲人之所望其不可一也陛下初平東都之始層樓廣殿皆令撤毁天下翕然同心欣仰豈有初則惡其侈靡今乃襲其雕麗其不可二也每承音㫖未即廵幸此則事不急之務成虚費之勞國無兼年之積何用兩都之好勞役過度怨讟將起其不可三也百姓承亂離之後財力凋盡天恩含育粗見存立饑寒猶切生計未安三五年間恐未平復奈何營未幸之都奪疲人之力其不可四也昔漢高祖將都雒陽婁敬一言即日西駕豈不知地土中貢賦所均但以形勝不如闗内也伏惟陛下化凋弊之人革澆漓之俗為日尚淺未甚淳和斟酌事冝詎可東幸其不可五也臣又甞見隋室造殿楹棟宏壯大木非隨近所有多從豫章採來二千人曵一柱其下施轂皆以生鐡為之若用木輪即便大出鐡轂既生行一二里即有破壞仍數百人别齎鐡以隨之終日不過進二三十里畧計一柱已用數十萬功則餘費又過於此臣聞阿房成秦人散章華就楚衆離及乾陽畢功隋人觧體且以陛下今時功力何如隋日役瘡痍之人襲亡隋之弊以此言之恐甚於煬帝深願陛下思之無為由餘所笑則天下幸甚太宗曰卿謂我不如煬帝何如桀紂對曰若此殿卒興所謂同歸於亂且陛下初平東都太上皇勑大殿高明並冝焚毁陛下以凢木可用不冝焚灼請别與貧人事雖不行然天下翕然謳歌至徳今若遵舊制節是隋役復興五六年間趨捨頓異何以昭示子孫光敷四海帝大悅謂房𤣥齡曰本修雒陽意在便於百姓今𤣥素上表實亦可依又事理須行露坐亦復何苦所修冝即停之馬周為監察御史貞觀六年上䟽曰㣲臣每讀經史見前賢忠孝之事臣雖小人竊希大道而未嘗不廢卷長思想履其迹臣以不幸早失父母犬馬之飬已無所施顧來事何為者唯忠義而已是以徒歩二千里而自歸於陛下陛下不以臣愚瞽過垂齒録竊自瞻省無階答謝輙以微軀丹欵惟陛下所擇臣伏見大安宫在宫城之西其墻宇宫闕之制方之紫極尚為卑小臣伏以東宫皇太子之宅猶處城中大安至尊所居更在城外雖太上皇遊心道素志存清儉陛下重違慈㫖愛惜人力而蕃夷朝見及四方觀者有不足焉臣願營築雉堞修起門樓務從高顯以稱萬方之望則大孝昭乎天下矣臣又伏見明勑以二月二日幸九成宫臣竊為太上皇春秋已高陛下宜朝夕視膳而晨昏起居今所幸宫去京三百餘里鑾輿動軔嚴蹕經旬非以旦暮至也脫太上皇情或思感而欲即見陛下將何以赴之且車駕今行本為避暑然則太上皇尚留熱所而陛下自逐凉處温凊之道臣竊未安然勑書既出業已成就願示速反之期以開衆惑臣又伏見詔書令宗室勲賢作鎮藩邸貽厥子孫嗣守其政非陛下封植之者誠爱之重之欲其裔嫡承守而與國無疆也臣以為如詔㫖陛下冝思所以安存之富貴之然則何用代官也何則以堯舜之父猶有朱均之子儻有孩童嗣職萬一驕愚兆庶被其殃而國家受其敗正欲絶之也則子文之治猶在正欲留之也而欒黶之惡已彰與其毒害於見存之百姓則寧使割恩於己亡之臣明矣然則向所謂愛之者乃適所以傷之也臣謂冝賦以茅土疇其户邑必有材行隨噐方授則雖其翰翮非疆亦可以獲免尤累昔漢光武不任功臣以吏事所以終全其代者良得其術也願陛下深思其事使夫得奉天恩而子孫終其福禄也臣又聞聖人之化天下莫不以孝為基故曰孝莫大於嚴父嚴父莫大於配天又曰國之大事在祀與戎孔子曰吾不與祭如不祭是聖人之重祭祀也如此伏唯陛下踐祚以來宗廟之享未曽親事伏縁聖情獨以鑾輿一出勞費稍多所以忍其孝思以便百姓遂使一代之史不書皇帝入廟之事將何以貽厥孫謀垂則來世臣知大孝誠不在爼豆之間然聖人之訓人固有屈己以從物特願聖慈顧省愚欵臣又聞致化之道在於求賢審官為政之基在於揚清激濁故孔子曰唯名與噐不以假人是言慎舉之為重也臣伏見王長通白明逹本自樂工輿皀雜類韋槃提斛斯正則更無他材獨觧調馬縱使術踰儕輩伎能有取乍可厚賜錢帛以富其家豈得列預士流超授高爵遂使朝㑹之位萬國來庭騶子倡人鳴玊曵履與夫朝賢君子比肩而立同坐而食臣竊耻之然朝命既往縱不可追謂宜不使在朝班預於士伍太宗深納之尋除侍御史加朝散大夫十一年周從幸雒陽又上䟽曰臣歴觀前代自夏殷至漢氏之有天下傳祚相繼多者八百餘年少者猶四五百年皆為積徳累業恩結於人心豈無辟王頼前哲以免自魏晋以還降及周隋多者不過五六十年少者纔二三十年而亡良由創業之君不廣恩化當時僅能自守後無遺徳可思傳嗣之主政教少衰一夫大呼而天下土分矣今陛下雖以大功定天下而積徳日淺固當思隆禹湯文武之道廣施徳化使恩有餘地為子孫立萬代之基但令政教無失以持當年而已然自古明王聖主雖因人設教寛猛隨時而大要唯以禮節於心恩加於人二者是務故其下愛之如日月畏之如雷霆此其所以卜祚遐長而禍亂不作也今百姓承䘮亂之後比於隋時纔十分之一而供官徭役道路相繼兄去弟還首尾不絶遠者往來五六千里春秋冬夏畧無休時陛下雖每有恩詔令其减省而有司作既不廢自然須人徒行文書役之如故臣每訪問四五年來百姓頗有嗟怨之言以為陛下不存養之昔唐堯茅茨土階夏禹惡衣菲食如此之事臣知不可復行於今漢文帝惜百金之費輟露䑓之役集上書囊以為殿帷所幸慎夫人衣不曳地至景帝以錦繡纂組妨害女功特詔除之所以百姓安樂至孝武帝雖窮奢極侈而承文景遺徳故人心不動向使高祖之後即有武帝天下必不能全此於時代差近事迹可見今京師及益州諸處營造供奉器物并諸王妃主服餙議者皆不以為儉臣聞昧旦丕顯後世猶怠作法於理其弊猶亂陛下少處人間知百姓辛苦前代成敗目所親見尚有如此而皇太子生長深宫不更外事即萬歳之後固聖慮所當憂也臣竊尋往代以來敗成之事但有黎庶怨叛聚為盗賊其國無不即㓕人主雖改未有重能安全者凡修政教當修於可修之時若事變一起而後悔之則無益者也故人主每見前代之亡則知其政教之所由䘮而皆不知其身之失是知殷紂笑夏桀之亡而幽厲亦笑殷紂之㓕隋煬帝大業之初又笑齊魏之失國今之視煬帝亦猶煬帝之視齊魏也故京房謂漢元帝云臣恐後之視今亦猶今之視古此言不可不誡也往者貞觀之初率土荒儉一匹絹纔得一㪷米而天下怡然百姓知陛下甚憂憐之故人自安曾無謗讟自五六年來頻歳豐稔一匹絹得粟十餘石而百姓皆以為陛下不憂憐之咸有怨言又今所營為者頗多不急之務故也自古以來國之興亡不由積蓄多少唯在百姓苦樂且以近事驗之隋家貯雒口倉而李宻因之東都積布帛世充㨿之西京府庫亦為國家之用至今未盡向使雒口東都無粟帛則世充李宻未必能聚大衆但貯積者固是有國家之常事要當人有餘力而後收之豈人勞而彊歛之更以資冦積之無益也然儉以息人貞觀之初陛下已躬為之故今行之不難也為之一日則下知之式歌且舞矣若人既勞矣而用之不息儻中國被水旱之災邊方有風塵之患狂狡因之以竊發則有不可測之事非徒聖躬旰食晏寢而已古語云動人以行不以言應天以實不以文以陛下之明誠欲勵精為政不煩遠採上古之術但及貞觀之初則天下幸甚昔賈誼謂漢文帝云可慟哭及長歎息者言當韓信王楚彭越王梁英布王淮南之時使文帝即天子位必不能安又言頼諸王年少𫝊相制之長大之後必生禍亂歴代以來皆以誼言為是臣竊觀今諸將功臣陛下所與定天下者皆仰稟成規備鷹犬之用無威畧振主如韓彭之難駕馭者而諸王年並㓜少縱其長大當陛下之日必無他心然即萬代之後不可不慮自漢晋以來亂天下者何嘗不是諸王皆為樹置失冝不預為節制以至於滅亡人主熟知其然但溺於私愛故使前車既覆而後車不改轍也今天下百姓極少諸王甚多寵遇之恩有過厚者臣之愚慮不唯慮其恃恩驕矜也昔魏武帝寵陳思及文帝即位防守禁閉有同獄囚以先帝加恩太多故嗣王疑而畏之也此則武帝寵陳思適所以苦之也且帝子何患不富貴身食大國封户不少好衣美食之外更何所湏而每年加别優賜曽無紀極里語云貧不學儉富不學奢言自然也今大聖創業豈唯處置見在子弟而已當制長乆之法使萬代遵行又言臨天下者以人為本欲令百姓安樂唯在刺史縣令縣令既衆不必皆賢若每州得良刺史則合境蘇息天下刺史悉稱聖意則陛下端拱巖廊之上百姓不慮不安自古郡守縣令皆妙選賢徳欲有擢昇宰相必先試以臨人或從二千石入為丞相今朝廷獨重内官縣令刺史頗輕其選刺史多是武夫勲人或京官不稱職方始出外而折衝果毅之内身材彊者先入為中郎將其次始補州任邊逺之處用任更輕其材堪宰蒞以徳行見稱擢者十不能一所以百姓未安殆由於此䟽奏太宗稱善乆之虞世南為秘書監貞觀九年詔獻陵制度准漢長陵故事務從隆厚程限既促功役勞敝世南上封事諌曰臣聞古之聖帝明王所以薄葬者非不欲崇言光顯珍寳貝物以厚其親然審而言之高墳厚隴珍物畢備此適所以貽親之累非曰孝也是以深思逺慮安於菲薄為長乆萬代之計割其常情以定耳昔漢成帝造延長二陵制度甚厚功費甚多諌議大夫劉向上書其言深切皆合事理其畧曰孝文居覇陵悽愴悲懐顧謂群臣曰嗟乎以北山石為椁用紵絮斮陳漆其間豈可動哉張釋之進曰使其中有可欲雖錮南山猶有隙使其中無可欲雖無石槨又何戚焉夫死者無終極而國家有廢興釋之所言為無窮計也孝文寤焉遂以薄葬又漢氏之法也人君在位三分天下貢賦以一分入山陵武帝歴年長乆比葬陵中不復容物霍光暗於大體奢侈過度其後至更始之敗赤眉賊入長安破茂陵取物猶不能盡故聚歛百姓為盗之用甚無謂也魏文帝於首陽東為夀陵作終制其畧曰昔葬夀陵因山為體無封樹無立寢殿園邑為棺槨足以蔵骨為衣衾足以朽肉吾營此不食之地欲使易代之後不知其處無蔵金銀銅鐡一以瓦噐自古及今未有不亡之國無不掘之墓䘮亂以來漢氏諸陵無不發掘至乃燒取玉匣金􅍢骸骨並盡乃不重痛哉若違詔妄有變改吾為戮屍於地下死而重死不忠不孝使魂而有知將不福汝以為永制蔵之宗廟魏文此制可謂逹於事矣向使陛下之徳止如秦漢之君臣則緘口而已不敢有言伏見聖徳高遠堯舜猶所不逮而俯與秦漢之君同為奢㤗捨堯舜殷周之節儉此臣所以尤戚也今為丘隴如此其内雖不蔵珍寳亦無益也萬代之後但見高墳大墓豈謂無金玉邪臣之愚計以為漢文覇陵既因山勢雖不起墳自然高顯今之所卜地勢即平不可不起冝依白武通所陳周制為三仭之墳其方中制度事皆减少事竟之日刻石於陵側明立封大小高下之式明噐所湏皆以瓦木合於禮文一不得用金銀銅鐡使萬代子孫並皆遵奉一通蔵之宗廟豈不羙乎且臣下除服三十六日已依覇陵今為墳隴又以長陵為法恐非所冝伏願深覧古今為乆逺之慮臣之赤心唯願萬歳之後神道長安陛下孝名揚於無窮矣書奏不報世南又上䟽曰漢家即位之初便營陵墓近者十餘歳遠者五十方始成就今以數月之間而造数十年之事其於人力亦以勞矣又漢家大郡五十萬户即曰人衆未及往時而工役興之一等此臣所以致疑也時公卿又上奏請遵遺詔務從節儉因下其事付所司詳議於是制度頗有减省焉太宗後頗好獵世南上䟽諌曰臣聞秋獮冬狩盖惟常典射隼從禽備乎前誥伏惟陛下因聽覽之餘承順天道殺伐將欲躬摧班掌親御皮軒窮猛獸之窟穴盡逸材之林薮夷㐫剪暴以衞黎元收革擢羽用充軍器舉旗效獲式遵前古然黄屋之尊金輿之貴八方之所仰徳萬國之所係心清道而行猶戒銜橜斯盖重慎防微為社稷也是以馬卿直諌於前張昭變色於後臣誠㣲物敢忘斯義且彫狐星畢所殪已多頒禽賜獲皇恩亦溥伏願時息獵車且韜長㦸不拒蒭蕘之請降納涓澮之流袒裼徒搏任之群下則貽範百王永光萬代其有犯無隐多此類也太宗以是益親禮之姚思亷為散騎常侍太宗將幸九成宫思亷進諌曰陛下高居紫極寧濟蒼生應湏以欲從人不可以人從欲然則離宫遊幸此秦皇漢武之事非堯舜禹湯之所為也言甚切至太宗嘉言喻之曰朕有氣疾熱便頻劇故非清好遊幸甚嘉卿意賜帛五十匹劉仁軌為樂陽縣丞貞觀十四年太宗欲幸同州較獵仁軌上䟽曰四時蒐狩前王常典事有沿革未必因循今年甘雨應時秋稼甚盛盡力收穫月半猶未畢功貧家無力禾下始冝種麥直據尋常科喚田家已有所妨今既祗供頓事兼之修理橋道縱大簡畧動費一二萬工百姓收歛實為狼狽臣願陛下少留萬乘之尊垂聽一介之說退延旬日收刈總丁則人盡閒暇家得康寧鑾駕徐動公私交㤗上降璽書勞之冊府元龜卷五百四十二
