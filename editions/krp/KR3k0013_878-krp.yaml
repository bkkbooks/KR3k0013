body:
  text: 册府元龜卷八百七十八宋王欽若等撰總録部計策賢者省已為人謀而貴盡忠智士行權以計戰而當萬全自正教頺廢小辯競起挟長短之要術眀利害之兩端機用周通策慮幅臆乃有陳説於尋戈之際畫奇於前席之間矯激縱横講貫詳熟譬喻以盡其委曲感動以極其至誠使夫易危成安轉禍為福大則致國體之彊勝保世嗣之順立次則圗富貴於微賤全身名於疑間雖云小言之破道而或大事之允濟著之談議動盈簡牘者焉蘇秦雒陽人也説趙與諸侯相約從親然恐秦之攻諸侯敗約後負念莫可使用於秦者乃使人微感張儀曰子始與蘇秦善今秦已當路子何不往游以求通子之願張儀於是之趙上謁求見蘇秦秦乃誡門下人不為通又使不得去者數日而見之坐之堂下賜僕妾之食因而數譲之曰以子之材乃自令困辱至此吾寧不能言而富貴子子不足收也謝去之張儀之来也自以為故人求益反見辱怒念諸侯莫可事獨秦能苦趙乃遂入秦蘇秦已而告其舎人曰張儀天下賢士吾殆弗如也今吾幸先用而能用秦者獨張儀可爾然貧無因以進吾恐其樂小利而不遂故召辱之以激其意子為我隂奉之乃言趙王發金幣車馬使人微隨張儀與同宿舎稍稍近就之奉以車馬金錢所欲用為取給而弗告張儀遂得以見秦惠王惠王以為客卿與謀伐諸侯蘇秦之舎人乃辭去張儀曰頼子得顯方且報徳何故去也舎人曰臣非知君知君乃蘇君蘇君憂秦伐趙敗從約以為非君莫能得秦柄故感君使臣隂奉給君資盡蘇君之計謀今君已用請歸報張儀曰嗟乎此吾在術中而不悟吾不及蘇君明矣陳軫為楚使秦時韓魏相攻期年不觧秦惠王欲救之問於左右左右或曰救之便或曰勿救便惠王未能為之決㑹軫適至惠王曰今韓魏相攻期年不解或謂寡人救之便或曰勿救使寡人不能决願子出子主計之餘為寡人計之軫對曰亦常有以夫卞莊子刺虎聞於王者乎莊子欲刺虎館豎子止之曰兩虎方且食牛食甘必争争則必鬬鬬則大者傷小者死從傷而刺之一舉必有䨇虎之名卞莊子以為然立須之有頃兩虎果鬬大者傷小者死莊子從傷者而刺之一舉果有䨇虎之功今韓魏相攻期年不解是必大國傷小國亡從傷而伐之一舉必有兩實此猶莊子刺虎之類也臣主與王何異也惠王曰善卒弗救大國果傷小國亡秦興兵而伐大克之此陳軫之計也馮煖許袁反一作驩音歡為孟嘗君客孟嘗君時相齊封萬户於薛使人出錢於薛歳餘不入貸錢者多不能與其息使馮煖責之煖至薛召貧不能與息者取其劵而燒之煖至謂孟嘗君曰焚無用虛債之劵捐不可得之虛計令薛民親君而彰君之善聲也及孟嘗君就國於薛未至百里民扶老擕幼迎君道中孟嘗君顧謂馮煖曰先生所為文市義者乃今日見之馮煖曰狡兎有三窟僅得免其死爾今止有一窟未得髙枕而卧也請為君復鑿二窟孟嘗君予車五十乗金五百斤西遊於梁謂惠王曰齊放其大臣孟嘗君於薛諸侯先迎之者富而兵彊於是梁主虚上位以故相為上將軍遣使者黄金千斤車百乗往聘孟嘗君馮煖先驅誡孟嘗君曰千金重幣也百乗顯使也齊其聞之矣梁使三反孟嘗君固辭不往也齊王聞之君臣恐懼遣太傅齎黄金千鎰車二駟服劔一封書一謝孟嘗君曰寡人不祥被於宗廟之祟沈於諂䛕之臣開罪於君寡人不足為也願君顧先王之宗廟姑反國統萬人乎馮煖誡孟嘗君曰願請先王之祭器立宗廟於薛廟成還報孟嘗君曰三窟已就君姑髙枕為樂矣孟嘗君為相數十年無纎芥之禍者馮煖之計也侯嬴為大梁夷門監魏安釐王二十年秦昭王已破趙長平軍又進兵圍邯郸魏公子無忌姊為趙惠文王弟平原君夫人數遺魏王及公子書請救於魏魏王使將軍晉鄙将十萬衆救趙秦王使使者告魏王曰吾攻趙旦暮且下而諸侯敢救者已拔趙必移兵先撃之魏王恐使人止晉鄙留軍壁鄴名為救趙實持兩端以觀望平原君使者冠蓋相屬於魏讓魏公子曰勝所以自附為婚姻者以公子之髙義為能急人之困今邯鄲旦暮降秦而魏救不至安在公子能急人之困也且公子縱輕勝棄之降秦獨不憐公子姊耶公子患之數請魏王及賓客辯士説王萬端魏王畏秦終不聼公子自度終不能得之於王計不獨生而令趙亾乃請賓客約車騎百餘乗欲以客往赴秦軍與趙俱死行過夷門見侯生具告所以欲死秦軍狀辭决而行侯生曰公子勉之矣老臣不能從公子行數里心不快曰吾所以待侯生者備矣天下莫不聞今吾且死而侯生曾無一言半辭送我我豈有所失哉復引車還問侯生侯生笑曰臣固知公子之還也曰公子喜士名聞天下今有難無他端而欲赴秦軍譬若以肉投餒虎何功之有哉尚安事客然公子遇臣厚公子往而臣不送以是知公子恨之復返也公子再拜因問侯生乃屏人間語曰嬴聞晉鄙之兵符常在王卧内而如姬最幸出入王卧内力能竊之嬴聞如姬父為人所殺如姬怨之三年自王以下欲求報其父仇莫能得如姬為公子泣公子使客斬其仇頭敬進如姬之欲為公子死無所辭顧未有路爾公子誠一開口請如姬如姬必許諾則得虎符奪晉鄙軍北救趙而西却秦此五覇之伐也公子從其計請如姬如姬果盜晉鄙兵符與公子公子行侯生曰將在外主令有所不受以便國家公子即合符而晉鄙不授公子兵而復請之事必危矣臣客屠者朱亥可與俱此人力士晉鄙聼大善不聼可使撃之於是公子泣侯生曰公子畏死耶何泣也公子曰晉鄙嚄唶上音烏百反下音莊百反宿將往恐不聼必當殺之是以泣爾豈畏死哉於是公子請朱亥朱亥笑曰臣乃市井鼔刀屠者而公子親數存之所以不報謝者以為小禮無所用今公子有急此乃臣效命之秋也遂與公子俱公子過謝侯生侯生曰臣宜從老不能請數公子行日以至晉鄙軍之日北嚮自剄以送公子公子遂行至鄴矯魏王令代晉鄙晉鄙合符疑之舉手視公子曰今吾擁十萬之衆屯於境上國之重任今單車来代之何如哉欲無聼朱亥袖四十斤鐵椎椎晉鄙公子遂將晉鄙勒兵下令軍中曰父子俱在軍中父歸兄弟俱在軍中兄歸獨子無兄弟歸飬得選兵八萬人進兵撃秦秦兵觧去遂救邯鄲存趙吕不韋濮陽人賈於邯鄲見秦質子異人歸而謂父曰耕田之利㡬倍曰十倍珠田之贏幾倍曰百倍立國家之主贏幾倍曰無數曰今力田疾作不得煖衣餘食今建國立君澤可以遺世願往事之秦子異人質於趙處於窌城窌城趙邑窌音疋貌反故徃説之曰子傒子傒秦太子也有承國之業又有母在中今子無母於中外託於不可知之國謂秦託子於趙窌城吉凶不可知也一日倍約身為糞土今子聼吾計事求歸可以有秦國吾為子使秦必来請子乃説秦王后弟陽泉君曰君之罪至死君知之乎君之門下無不居髙尊位太子門下無貴者君之府藏珍珠寳玉君之駿馬盈外廐美女充後庭王之春秋髙一日太子用事君危於累卵而不夀於朝生君陽泉君累卵危也朝生木槿也朝榮夕落謂短命不夀也説有可以一切而使君富貴千萬歳其寧扵㤗山四維必無危亡之患矣陽泉君避席請問其説不韋曰王年髙矣王后無子子傒有承國之業士倉又輔之一日子傒立士倉用事王后之門必生蓬蒿子異人賢材也棄在於趙無母於内引領西望願得一歸王后誠請而立之是子異人無國而有國王后無子而有子也陽泉君曰然入説王后王后乃請趙而歸之趙未之遣不韋説趙曰子異人秦之寵子也無母于中王后欲取而子之使秦而欲屠趙不顧一子以留計是抱空質也若使子異人歸而得立趙厚送遣之是不敢倍徳畔施是自為徳講秦王老矣一日晏駕雖有子異人不足以結秦趙乃遣之異人至不韋使楚服而見王后悦其狀狀貌也髙其知曰吾楚人也而自子之乃變其名曰楚王使子誦誦經也子曰少棄捐在外常無師傅所教學不習於誦王罷之乃請留止間曰陛下嘗軔車於趙矣趙之豪傑得知名者不少今大王反國皆西面而望大王無一介之使以存之臣恐其皆有怨心使邊境早閉晩開王以為然奇其計王后勸立之王乃召相令之曰寡人子莫若楚立以為太子楚立以不韋為相號曰文信侯食藍田十二縣王后為華陽太后諸侯皆致奉邑漢范増居鄛人居鄛縣名也屬廬江郡鄛音巢年七十素好奇計秦末項梁起江東增説梁曰陳勝敗固當言其計畫非是宜應敗也夫秦滅六國楚最無罪自懐王入秦不反楚人憐之至今故南公稱曰楚雖三户亡秦必楚南公南方之老人也但令有三户在其怨深足以亡秦今陳勝首事不立楚後其勢不長今君起江東楚蠭起之將皆争附君者蠭古蜂字也蠭起如蠭而起言其衆也以君世世楚將為能復立楚之後也於是梁乃求楚懐王孫心在民間為人牧羊立以為楚懐王從民望也鮑生有識之士姓鮑而為諸生蕭何為漢王丞相漢三年與項羽相距京索索山客反上數使使勞苦丞相勞来到反鮑生謂何曰今王暴衣露蓋數勞苦君者有疑君心為君計莫若遣君子孫兄弟能勝兵者悉詣君所上益信君於是何從其計漢王大説讀曰悦東園公與綺里季夏黄公甪里先生四人已侍太子髙帝十一年九江王黥布反帝疾欲使太子往撃之四人相謂曰凡来者將以存太子太子將兵事危矣乃説建成侯吕澤曰太子將兵有功則位不益太子無功則從此受禍矣且太子所與俱諸将皆嘗與上定天下梟將也乃使太子將之此無異以羊將狼也皆不肯為用盡力無功必矣臣聞母愛者子抱今戚夫人日夜侍御趙王常抱居前上終不使不肖子居愛子上明乎其代太子位必矣君何不急謂吕后乗間為上泣言黥布天下猛將善用兵諸將乃陛下故等倫乃令太子將此屬無異使羊將狼莫肯為用且使布聞之即鼔行而西爾上雖疾卧䕶之諸將不敢不盡力雖苦彊為妻子計載輜車卧而行於是吕澤夜見吕后吕后乗間為帝泣而言如四人意帝曰吾維之豎子固不足遣乃公自行爾於是帝自將東陸賈為太中大夫病免吕太后時諸吕擅權欲刼少主危劉氏右丞相陳平患之力不能争恐禍及已平常燕居深念念思也以國家不安故靜居獨慮思其方策賈往不請直入坐言不因門將命而徑入自坐陳平方念不見賈思慮之際故不覺賈至賈曰何念深也平曰生揣我何念揣度也音初委反賈曰足下位為上相食三萬户侯可謂極富貴無欲矣然有憂念不過患諸吕少主爾陳平曰然為之奈何賈曰天下安注意相天下危注意將將相和則士豫附豫素也士豫附則下雖有變而權不分權不分為社稷計在兩君掌握爾臣嘗欲謂太尉絳侯謂者與之言絳侯與我戲易吾言言絳侯與我相戲狎輕易其言爾君何不交歡太尉深相結為陳平畫吕氏數事平用其計吕氏謀益壊及誅吕氏立孝文賈有力焉王先生齊人景帝時梁孝王既殺袁盎懼使鄒陽齎以千金令求方畧解罪於上者陽素知王先生素其相知也年八十餘多奇計即徃見語以其事王先生曰難哉人主有私怨深怒欲施必行之誅誠難解也以太后之尊骨肉之親猶不能止况臣下乎昔秦始皇有伏怒於太后羣臣諫而死者以十數得茅焦為廓大義茅焦諫曰陛下車裂假父有嫉妬之心嚢撲兩弟有不慈之名遷母咸陽有不孝之行臣竊為陛下危之臣所言畢乃解衣趨鑊始皇下殿左右接之曰先生起矣即迎太后遂為母子如初始皇非能説其言也廼自彊從之爾説讀曰悦茅焦亦厪脱死如毛氂爾厪少也言纔免於死也厪音巨刃反故事所以難者也今子欲安之乎安焉也之往也陽曰鄒魯守經學齊楚多辯知韓魏時有奇節吾將歴問之王先生曰子行矣還過我而西鄒陽行月餘莫能為謀還過王先生曰臣將西矣為如何王先生曰吾先日欲獻愚計以為衆不可蓋蓋覆蔽也竊自薄陋不敢道也若子行必往見王長君士無過此者矣鄒陽發寤於心曰敬諾辭去不過梁徑至長安因客見王長君長君者王美人兄也後封為蓋侯鄒陽留數日乗間而請曰間謂空隙無事之時臣為長君無使令於前故来侍也使令謂役使之人也令音力成反愚戇竊不自料願有謁也料量也謁告也長君跪曰幸甚陽曰竊聞長君弟得幸後宫天下無有言獨一耳無所比類也而長君行迹多不循道理者今袁盎事即窮竟梁王恐誅如此則太后怫鬱泣血無所發怒怫欝藴積也怫音佛切齒側目於貴臣矣臣恐長君危於累卵累卵者言其将隤而破碎也竊為足下憂之長君戄然曰將為之奈何戄讀曰瞿音居具反瞿然無守之貌陽曰長君誠能精思為上言之得無竟梁事長君必固自結於太后太后厚徳長君入於骨髓而長君之弟幸於兩宫太后宫帝宫也金城之固也言其榮寵無極不可壊故取喻於金城也又有存亾繼絶之功徳布天下名施無窮願長君深自計之昔者舜之弟象日以殺舜為事言日日欲殺也及舜立為天子封之有庳地名也音鼻今鼻亭是也在零陵夫仁人之於兄弟無藏怒無宿怨親愛而已是以後世稱之魯公子慶父使僕人殺子般慶父莊公弟也子般莊公太子也僕人即鄧扈樂也父讀曰甫般字與班同獄有所歸歸罪於鄧扈樂也季友不探其情而誅焉季友慶父之弟不探慶父本情而誅扈樂慶父親殺閔公季子緩追免賊慶父出奔季友縱而不追免其賊亂之罪春秋以為親親之道也公羊之説也言季友親其兄也魯哀姜薨於夷孔子曰齊桓公法而不譎以為過也哀姜莊公夫人也淫於三叔而豫殺閔公齊人殺之於夷夷齊地也法而不譎者言守法而行不能用權以免其親也以是説天子徼幸梁事不奏長君曰諾乗間入而言之及韓安國亦見長公主事果得不治寗乗齊人武帝時以方士待詔公車號東郭先生大將軍衛青衛后兄也封為長平侯軍撃匈奴至餘吾水上而還斬首捕虜有功来歸詔賜金千斤將軍出宫門先生當道遮衛將軍車拜謁曰願白事將軍止車前先生傍車言曰王夫人新得幸於上家貧今將軍得金千斤誠以其半賜王夫人之親人主聞之必喜此所謂奇筞便計也衛將軍謝之曰先生幸告之以便計請奉教於是衛將軍乃以五百金為王夫人之親夀王夫人以聞帝帝曰大將軍不知為此問之安所受計筞對曰受之待詔者東郭先生詔召東郭先生拜以為郡都尉後漢方望平陵人王莾末隗囂㩀隴右以望為軍師望説囂曰足下欲承天順民輔漢而今起立者乃在南陽王莾尚據長安雖欲以漢為名其實無所受命將何以見信於衆宜急立髙廟稱臣奉祠所謂神道設教求助明神者也且禮有損益質文無常削地開兆茅茨土階以致其肅敬雖未偹物神眀舎諸囂從其言虞詡為懐令章帝元初中任尚為中郎將將羽林緹騎五營子弟三千五百人代班雄屯三輔尚臨行詡説尚曰使君頻奉國命討逐㓂賊三州屯兵二十餘萬人棄農桑疲苦徭役而未有功效勞費日滋若此出不克誠為君危之尚曰憂惶久矣不知所如詡曰兵法弱不攻彊走不逐飛自然之勢也今虜皆騎馬日行數百里来如風雨去如絶弦以歩追之勢不相及所以曠而無功也為使君計者莫如罷諸郡兵各令出錢數千二十人共市一馬如此可舎甲胄馳輕兵以萬騎之衆逐數千之虜追尾掩截其道自窮便人利事大功立矣尚大喜即上言用其計乃遣輕騎鈔撃杜季貢於丁奚城斬首四百餘級獲牛馬羊數萬頭鮑信靈帝末為騎都尉大將軍何進遣信所在募兵㑹董卓殺執金吾丁原并其衆故京都兵權惟在卓信謂袁紹曰卓擁彊兵有異志今不早圗將為所制及其初至疲勞襲之可禽也紹畏卓不敢發信遂還鄉里張𤣥字處虚獻帝中平二年司空張温以車騎將軍出征凉州賊邊章等將行𤣥自田廬被褐帶索要説温曰天下㓂賊雲起豈不以黄門常侍無道故耶聞中貴人公卿以下當出祖道於平樂觀明公總天下威重握六師之要若於中坐酒酣鳴金鼔整行陣召軍正執有罪者誅之引兵還屯都亭以次翦除中官觧天下之倒懸報海内之怨毒然後顯用隐逸中正之士則邊章之徒宛轉股掌之上矣温聞之大震不能對良久謂𤣥曰處虚非不悦子之言顧吾不能行如何𤣥乃歎曰事行則為福不行則為賊今與公長辭矣即仰藥欲飲之温前執其手曰子忠於我我不能用是吾罪也子何為當然且出口不行之言誰人知之𤣥遂去逄紀為渤海太守袁紹客時韓馥據冀州紀説紹曰夫舉大事非據一州無以自立今冀部彊實而韓馥庸才可密要公孫瓚將兵南下馥聞必駭懼并遣辯士為陳禍福馥迫於倉卒必懼因據其位紹然之益親紀即以書與瓉瓉遂引兵而至外託董卓而隂謀襲馥馥果以冀州讓紹蒯良中盧人劉表之初為荆州也江南宗賊盛宗黨共為賊袁術屯魯陽盡有南陽之衆吳人蘇代領長沙太守貝羽為華容長各阻兵作亂表初到單馬入宜城而延蒯良與同縣人蒯越襄陽人蔡瑁與謀表曰宗賊甚盛而衆不附袁術因之禍今至矣吾欲徵兵恐不集其筞安出良曰衆不附者仁不足也附而不治者義不足也茍仁義之道行百姓歸之如水之趨下何患所以之不足而問與兵與策乎表顧問越越曰治平者先仁義治亂者先權謀兵不在多在得人也袁術勇而無斷蘇代貝羽皆武人不足慮宗賊帥多貪暴為下所患越有所素飬者使示之以利必以衆来君誅其無道撫而用之一州之人有樂存之心聞君盛徳必襁負而至矣兵集衆附南據江陵北守㐮陽荆州八郡可傳檄而定術等雖至無能為也表曰子柔之言雍季之倫也異度之計舅犯之謀也遂使越遣人誘宗賊至者十五人皆斬之襲取其衆或即授部曲惟江夏賊張虎陳坐擁衆據㐮陽表乃使越與龎季單騎往説降之江南遂悉平許劭字子將汝南平輿人獻帝時揚州刺史劉繇為孫策所逐繇將奔㑹稽劭曰㑹稽富寔筞之所貪且窮在海隅不可往也不如豫章北連豫壌西接荆州若收合吏民遣使貢獻與兖州相聞雖有袁公路隔在其間其人豺狼不能久也足下受王命孟德景升必相收濟繇從之將奔豫章又使笮融助朱皓討劉表所用太守諸葛𤣥劭謂繇曰笮融出軍不顧名義者也朱文明皓字善推誠以信人宜使密防之融到果詐殺皓代領郡事册府元龜卷八百七十八
