body:
  text: 册府元龜卷二百四十二宋王欽若等撰列國君部聽諫明賞聽諫夫稽衆舍己垂於格言虛懐從善謂之吉德而况奄宅分土建邦延世有人民焉有社稷焉斯不可以不慎矣乃有勤求治道思聞過失咨詢嘉言以廣其聰明詳擇臧謀式資於政典應若答響疾如轉規用能導壅遏之情救過誤之舉懲忿窒欲以格其非心弼違紏繆以成於善行至于俊彦咸至名聲日聞長諸侯而主夏盟尊王室而成霸業曷不由是者已齊桓公五年伐魯魯莊公請獻遂邑以平遂在濟北蛇丘縣東北桓公許與魯會柯而盟柯今濟北東阿齊之阿邑猶祝柯今為祝阿魯将盟曹沫以匕首刼桓公於壇上土基三尺土階三等曰壇㑹必有壇者為升降揖讓稱先君以相接也曰反魯之侵地桓公許之已而曹沫去匕首北靣就臣位桓公後悔欲無與魯地而殺曹沫管仲曰夫刼許之而倍信殺之一云已許之而背信殺刼之僅一小快耳而棄信於諸侯失天下之援不可於是遂與曹沫三敗所亡地於魯諸侯聞之皆信齊而欲附焉七年諸侯㑹桓公于鄄鄄衞地今東郡鄄城也而桓公於是始霸焉又㑹諸侯於葵丘而欲封禪管仲諫乃止桓公嘗問於管仲曰寡人幼弱惽愚不通四鄰諸侯之義仲父不當盡語我昔者有道之君乎吾亦監焉管子對曰夷吾之所能與所不能盡在君所矣君胡有辱命桓公又問曰仲父寡人幼弱惽愚不通四鄰諸侯之義仲父不當盡告我昔者有道之君乎吾亦監焉管子對曰夷吾聞之於徐伯曰昔有道之君敬其山川宗廟社稷及至先故之大臣牧聚以忠而大富之固其武臣宣用其力聖人在前貞亷在側競稱于義上下皆飭刑政明察四時不貸民亦不憂五穀蕃殖外内均和諸侯臣服國家安寧不用兵革受其幣帛以懐其德昭受其令以為法式此亦可謂昔者有道之君矣桓公曰善哉桓公曰仲父既已語我昔者有道之君矣不當盡語我無道之君乎吾亦監焉管子對曰今若吾君之羙好而宣通也既官職羙道又何以問惡為桓公曰是何言耶以繢縁繢吾何以知其羙也以素縁素吾何以知其善也仲父已語我其善而不語我其惡吾豈知善之為善也管子對曰夷吾聞之於徐伯曰昔者無道之君大其宮室高其臺榭良臣不使讒賊是舎有家不治借人為圖政令不善墨墨若夜譬若野獸無所就處不脩天道不監四方有國不治譬若生狂衆所怨詛希不滅亡進其俳優繁其鍾鼓流于博塞戲其工瞽誅其良臣傲其婦女狩獵畢弋暴遇諸父馳騁毋度戲樂笑語式政既輮刑罰則烈内削其民以為功伐譬猶漏釡豈能無竭此亦可謂昔者無道之君矣桓公曰善哉桓公曰仲父既已語我昔者有道之君昔者無道之君矣仲父不當盡語我昔者有道之臣乎吾亦監焉管子對曰夷吾聞之於徐伯曰昔者有道之臣委贄為臣不賓事左右君知則事不知則已若有事必圖國家徧其發揮脩其祖德辨其順逆推育賢人讒慝不作事君有義使下有禮貴賤相親若兄若弟忠于國家上下得體居處則思義語言則謀謨動作則事居國則富處軍則克臨難據事雖死不悔近君為拂遠君為輔義以與交廉以與處臨官則治酒食則慈不謗其君不毁其辭君若有過進諫不疑君若有憂則臣服之此亦可謂昔者有道之臣矣桓公曰善哉桓公曰仲父既已語我昔者有道之臣矣不當盡語我昔者無道之臣乎吾亦監焉管子對曰夷吾聞之於徐伯曰昔者無道之臣委贄為臣賓事左右執說以進不蘄亡已遂進不退假寵鬻貴尊其貨賄卑其爵位進曰輔之退曰不可以敗其君皆曰非我不仁羣處以攻賢者見賢若貨見賤若過貪於貨賄競于酒食不與善人唯其所事倨傲不恭不交善士讒賊與通不殄人爭唯趨人訟湛湎于酒行義不從不修先故變易國常擅創為人迷惑其君生奪之政保貴寵矜遷損善士捕援貨人入則乘等出則黨駢貨賄相入酒食相親俱亂其君君若有過各奉其身此亦可謂昔者無道之臣矣桓公曰善哉管仲又曰東郭有狗嘊嘊旦暮欲齧我猳而不使也今夫易牙子之不能愛将安能愛君君必去之公曰諾東郭之狗喻易牙言其小人殘忍同於狗矣豭韻為枷謂以木連狗取聲為義即國家也言易牙終能亡國滅家此不宜使必湏去之為宜管仲又言曰北郭有狗嘊嘊旦暮欲齧我猳而不使也今夫豎刁其身之不愛焉能愛君君必去之公曰諾管子又言曰西郭有狗嘊嘊旦暮欲齧我猳而不使也今夫衞公子開方去其千乘之太子而臣事君是所願也得於君者是将欲過其千乘開方在衞當嗣君之位今棄而事齊則所望不只千乘也其意必得齊國然後稱所望也君必去之桓公曰諾景公之時雨雪三日而不霽公被狐白之裘坐當側階晏子入見立有間公曰恠哉雨雪三日而天不寒晏子對曰天不寒乎公笑晏子曰嬰聞古之賢君飽而知人之饑温而知人之寒逸而知人之勞也君不知也公曰善寡人聞命矣乃令出裘發粟以與饑寒令所睹於塗者無問其鄉所睹於里者無問其家循國計數無言其名士既事者兼月疾者兼歲孔子聞之曰晏子能明其所欲景公能行其所善也齊有彗星景公使禳之晏子曰無益也祗取誣焉誣欺也天道不謟謟疑也不貳其命若之何禳之公説乃已景公欲更晏子之宅曰子之宅近市湫隘囂塵不可以居辭曰小人近市朝夕得所求小人之利也公笑曰子近市識貴賤乎對曰既利之敢不識乎公曰何貴何賤於是景公繁於刑有鬻踊者故對曰踊貴屨賤景公於是省於刑景公疥遂痁期而不瘳諸侯之賓問疾者多在多在齊梁丘據與裔欵二子齊嬖大夫言於公曰吾事鬼神豐於先君有加矣今君疾病為諸侯憂是祝史之罪也盍誅於祝固史嚚以辭賓公説告晏子晏子曰君若欲誅於祝史修德而後可公説使有司寛政毁闗去禁薄刑已責除逋責景公宿於路寢之宮夜分聞西方有男子哭者景公悲之明日朝問於晏子曰寡人夜聞西方有男子哭者甚疾聲氣甚悲是奚為者也寡人哀之晏子對曰西郭徒居布衣之士盆成逆也父之孝子兄之順弟也又嘗為孔子門人今其母不幸而死祔柩未葬家貧身老子孺恐力不能合祔是以悲也公曰子為寡人弔之因問之祔何所在晏子奉命往弔而問偏祔於何存盆成逆再拜稽首而不起曰偏祔寄於路寢得為地下之臣擁札操筆給事宮殿中在階之下願以某日未得君之意也窮困無與圖之布唇枯舌焦心熱中今君不辱而臨之願君圖之晏子曰然此甚人之重者也而恐君不許也盆成逆憱然曰凡在君耳且臣聞之越玉好勇而民輕死楚靈王好細腰宫中多饑死子胥忠其君故天下皆願得以為臣曾参孝己愛其親故天下願得以為子今乃令人子而離散其親戚孝乎哉足以為臣乎若此而得祔是生臣之母也若此而不得則臣請輓尸車而寄之於國門外宇滔之下身不敢飲食推轅執輅木處鳥栖露肉暴骸以望君愍之賤臣雖愚竊意明君哀而不忍也晏子入復乎公公忿然作色而怒曰子何必以若愚言敎寡人乎對曰晏聞之忠不避危愛無惡言且嬰固已難之矣今君宮處為游既奪人有又禁其葬非仁也肆心傲聽不恤民憂非義也若何勿聽因道盆成逆之辭公噴然大息曰悲乎哉子勿復言乃使男子免袒女髽笄者以百數為門以迎盆成逆盆成逆脫縗絰冠絛纓黒緣以見乎公公曰吾聞之五子不滿隅一子滿朝非乃子耶盆成逆於是臨事不敢哭奉事以禮畢出門然後舉聲焉景公成路寢之臺逢於何遭䘮遇晏子於塗再拜乎馬前晏子下車對之曰子何以命嬰也對曰於何之母死兆在路寢之臺牖下願請命合骨晏子曰嘻雖然嬰將為子復之適為不得子将若何對曰夫君子則有以知我者君不許吾将左手擁格右手捆心立我枯槁而死以告四方之士曰於何不能葬其母者也晏子曰諾遂入見公曰有逢於何者母死兆在路寢當牖之下願合骨公作色不恱曰自古及今子亦嘗聞請葬人主之宮者乎晏子對曰古之人君者其宮室節不侵生人之居其臺榭儉不殘犯人之墓故未嘗聞請葬人主之室者也今君侈為宮室奪人之居廣為臺榭殘人之墓是生者愁憂不得驩處死者離易不得合骨豐樂侈遊兼傲生死非人君之行也遂欲滿求不顧細民非存之道也且嬰聞之生者不安命之曰蓄憂死者不葬命之曰蓄哀蓄憂哀者危君不如許之公曰諾晏子出梁丘據曰自昔及今未嘗聞求葬公宮者若何許之曰削人之居殘人之墓凌人之䘮而禁其葬是於生者無施於死者無禮詩云穀則異室死則同穴吾敢不許乎逢於何遂葬路寢室之牖下解縗去絰布衣縢履𤣥冠紫武踊而不哭辭而不拜乃涕洟而去之景公問晏子曰古之聖君其行何如對曰薄於身而厚於民約於身而廣於世其處上也足以明政行敎不以威天下其取財也權有無均貧富不以養嗜欲誅不避貴賞不避賤不淫於樂不遁於哀盡知道民而不伐焉勞力事民而不貴焉政尚相和故下不以相害為行教尚相愛故民不以相惡為名刑罰中於法廢罪順於民是以賢者處上而不華不肖者處下而不怨四海之内社稷粒食之民一意同欲若夫國家之政生有厚利死有遺教此盛君之行也而公不圖晏子又曰臣聞道者更正又聞道者更容今君税斂重故民心離市買悖故商旅絶玩好充故家貨單積邪在上畜怨藏於民嗜欲備於側毁非滿於國而公不圖公曰善於是令玩好不御公市不預宫室不飾業工不成上役輕税上下行之而百姓親之也景公外傲諸侯内輕百姓好勇力崇樂以從嗜欲諸侯不説百姓不親公患之問於晏子曰古之聖王其行若何對曰其行公正而無邪故讒人不得入不阿黨不私色故羣徒之卒不得容薄身厚人故聚歛之術不得行不侵大國之地不耗小國之民故諸侯皆欲其尊不刼人以兵甲不威人以衆彊故天下皆欲其彊徳行教訓加於諸侯慈愛利澤加於百姓故海内歸之若流水今衰世君人者辟邪阿黨故讒諂羣從之卒繁厚身養薄視民故聚斂之人行侵大國之地耗小國之民故諸侯不欲其尊刼人以兵甲威人以衆彊故天下不欲其彊災害加於諸侯勞苦施於百姓故仇敵進伐天下不救貴戚離散百姓不與公曰然則何若對曰請卑辭厚幣以説於諸侯輕罪省功以謝於百姓其可乎公曰諾於是卑辭重幣而諸侯附輕罪省功而百姓親故小國入朝燕魯共貢墨子聞之曰晏子知道道在為人而適為己為人者重自為者輕景公自為而小國不與晏子為人諸侯為役則道在為人而行在反己矣故晏子知道矣景公問晏子曰吾欲和臣親下奈何對曰君得臣而任使之而必信順其令赦其過任大毋多責焉使邇臣無求嬖焉毋以嗜欲貧其家母以讒人傷其心家不外求而足事君不因人而進則臣和矣儉於籍斂節於貨財作工不歴時使民不盡力百官節適闗市省征山林陂澤不專其利領民治民勿使煩亂知其貧富勿使凍餒則民親矣公曰善寡人聞命矣故令諸子毋外親謁辟梁丘據無使受報百官節適闗市省征陂澤不禁寃報者過畱獄者詰焉景公嘗出遊問於晏子曰吾欲遊於轉附朝舞遵海而南至於琅琊寡人何修則夫先王之游晏子再拜曰善哉君之問也嬰聞之天子之諸侯為巡狩諸侯之天子為述職故春省耕而補不足者謂之游秋省斂而助不給者謂之豫夏諺曰吾君不游我何以休吾君不豫我何以助一游一豫為諸侯度今君之游不然師行而糧食貧者不補勞者不息夫從而歴時而不反謂之流從不歴時而不反謂之連從獸而不歸謂之荒從樂而忘歸謂之亡古者聖王無流連之游無荒亡之行公曰善命吏計公掌之粟數長幼貧萌之數吏所委粟發廪出粟以予貧萌者三千鍾公所身見名老者十七人然後歸也景公問政於孔子孔子對曰君君臣臣父父子子公曰善哉信如君不君臣不臣父不父子不子雖有粟吾得而食諸威王時欲伐魏淳于髠謂王曰韓子盧者天下之疾犬也東郭逡者海内之狡兎也韓子盧逐東郭逡環山者三騰山者五兎極於前犬廢於後犬兎俱罷各死其處田父見之無勞勌之苦而擅其功今齊魏乆相持以頓其兵弊其衆臣恐彊秦大楚承其後有田父之功齊王懼謝將休士宣王時先生王斗造門而欲見宣王宣王使謁者延入王斗曰斗趨見王為好勢王趨見斗為好士於王何如使者復還報王曰先生徐之寡人請從宣王因趨而迎之於門與入曰寡人奉先君之宗廟守社稷聞先生直言正諫不諱王斗對曰王聞之過斗生於亂世事亂君焉敢直言正諫宣王忿然作色不説有間王斗曰昔先君桓公所好者九合諸侯一匡天下天子授籍立為太伯今王有四焉宣王説曰寡人愚陋守齊國惟恐失亡之焉能有四焉王斗曰否先君好馬王亦好馬先君好狗王亦好狗先君好酒王亦好酒先君好色王亦好色先君好士王不好士宣王曰當今之世無士寡人何好王斗曰世無麒麟騄耳王之駟已備矣世無東郭逡盧氏之狗王之走狗已具矣世無毛嬙西施玉宫已充矣王亦不好士也何患無士王曰寡人憂國憂民固願得士以治之王斗曰王之憂國憂民不若王愛尺縠也王曰何謂也王斗曰王使人為冠不使左右便辟而使工者何也為工能之今王治齊非左右便辟無使也臣故曰不如愛尺縠也宣王謝曰寡人有罪國家於是舉士五人任官齊國大治孟嘗君在薛荆人攻之淳于髠為齊使於荆還反過薛而孟嘗君令人禮貌而親郊迎之謂淳于髠曰敬聞命矣至齊畢報王曰宣王也何見對曰荆甚固而薛亦不量其力王曰何謂也對曰薛不量其力為先王立清廟先王威王荆固而攻之清廟不免故曰薛不量力而荆亦甚固齊王和其顔色曰譆先君之廟在焉疾出兵救之晉文公田於虢遇一老夫而問曰虢之為虢久矣子處此故矣虢亡其有説乎對曰虢君斷則不能諌則不聽也不能斷又不能用人此虢之所以亡文公乃輟田而歸遇趙衰而告之趙衰曰今其人安在君曰吾不與之來也趙衰曰古之君子聽其言而用其人今之君子聽其言而棄其身哀哉晉國之憂也文公乃召賞之於是晉國樂納善言文公卒以霸襄公蒐于夷将登箕鄭父先登登之於上軍也而使士縠梁益耳将中軍士縠本司空先克曰狐趙之勲不可廢也從之使狐射姑将中軍代先且居趙盾佐之代趙衰也盾趙衰子靈公造九層臺費用千億孫息諫公乃壊臺景公時邲之戰晉敗荀林父曰臣為督将軍敗當誅請死景公欲許之隨㑹曰昔文公之與楚戰城濮成王歸殺子玉而文公乃喜今楚已敗我師又誅其将是助楚殺仇也乃止平公射鴳不死使豎襄摶之失公怒拘将殺之叔向諫公乃趣赦之楚公子棄疾如晉報韓子之聘初韓宣子之適楚也楚人弗逆公子棄疾及晉境晉侯平公將亦弗逆叔向諫乃逆之晉荀盈如齊逆女還卒于戲陽殯于綘未葬晉侯平公飲酒樂膳宰屠蒯趨入請佐公使尊公之使人執尊酌酒請為之佐許之而遂酌以飲工工樂師師曠也公説徹酒平公嘗問於叔向曰國家之患孰為大對曰大臣重禄而不及諫近臣畏罪而不敢言下情不上通此患之大者也公曰善於是令於國曰欲進善言謁者不通罪當死魯襄公如楚還及方城聞季武子襲卞公欲還出楚師以伐魯榮成伯曰不可君之於臣其威大矣不能令於國而恃諸侯諸侯其誰暱之若得楚師以伐魯魯既不違夙之取卞也必用命焉守必固矣若楚之克魯諸姬不獲闚焉而况君乎彼無亦置其同類以服東夷而大攘諸夏將天下是王而何徳於君其予君也若不克魯君以蠻夷伐之而又求入焉必不獲矣不如予之夙之事君也不敢不悛醉而怒醒而熹庸何傷君其入也乃歸衞靈公以天寒鑿池宛春諫公乃罷役楚莊王有愛馬衣以文繡置之華屋席以露牀㗖以棗脯馬病肥死使羣臣䘮之欲以棺槨大夫禮葬之優孟諫乃止靈王之為令尹也為王旌以田析羽為旌王旌斿至於軫芋尹無宇斷之曰一國兩君其誰堪之及即位為章華之宮納亡人以實之章華南郡華容縣無宇之閽入焉有罪亡入章華宮無宇執之有司弗與王有司也曰執人於王宮其罪大矣執而謁諸王執無宇也王將飲酒遇其歡也無宇辭曰天子經畧經營天下畧有四海故曰經畧諸侯正封封疆有定分古之制也封畧之内何非君土食土之毛誰非君臣毛草也故詩曰普天之下莫非王土率土之濱莫非王臣詩小雅濱涯也天有十日甲至癸人有十等王至臺下所以事上上所以共神也故王臣公公臣大夫大夫臣士士臣皁皁臣輿輿臣𨽻𨽻臣僚僚臣僕僕臣臺馬有圉牛有牧養馬曰圉養牛曰牧以待百事今有司曰女胡執人於王宮将焉執之周文王之法曰有亡荒閱荒大也閱蒐也有亡人當大蒐其衆所以得天下也吾先君文王作僕區之法僕區刑書名曰盜所隱器𨼆盜所得器與盜同罪所以封汝也行善法故能啓疆北至汝水若從有司是無所執逃臣也逃而舍之是無陪臺也言皆将逃王事無乃闕乎昔武王數紂之罪以告諸侯曰紂為天下逋逃主萃淵藪萃聚也天下逋逃悉以紂為淵藪集而歸之故夫致死焉人欲致死討紂君王始求諸侯而則紂無乃不可乎若以二文之法取之盗有所在矣言王亦為盜王曰取而臣以往徃去也盗有寵未可得也盗有寵王自謂為葬靈王張本遂赦之令尹子瑕言蹶繇於平王蹶繇吳王弟五年靈王執以歸曰彼何罪諺所謂室於怒市於色者楚之謂矣言靈王怒吳子而執其弟猶人忿於室家而作色於市人舍前之忿可也乃歸蹶繇言楚子能用善言故也又左尹王子勝言於平王曰許於鄭仇敵也而居楚地以不禮於鄭平王復遷邑許自夷還居葉恃楚而不事鄭晉鄭方睦鄭若伐許而晉助之楚䘮地矣君盍遷許許不專於楚自以為舊國不專心事楚鄭方有令政許曰余舊國也許先鄭封鄭曰余俘邑也鄭㓕許而復存之故曰我俘也葉在楚國方城外之蔽也為方城外之蔽上不可易易輕也國不可小謂鄭許不可俘讐不可啓君其圖之楚子説使王子勝遷許於析實白羽於傳時白羽改為析晉韓宣子如楚送女叔向為介及楚楚朝其大夫曰晉吾仇敵也今其來者上卿大夫也若吾以韓起為閽以羊舌肸為司宮足以辱晉薳啓疆諌乃止越王勾踐自㑹稽歸七年拊循其士民欲用以報吳大夫逢同諌曰國新流亡今乃復殷給繕飾備利吳必懼懼則難必至且鷙鳥之撃也必匿其形今夫吳兵加齊晉怨深於楚越名高天下實害周室德少而功多必滛自矜為越計莫若結齊親楚附晉以厚吳吳之志廣必輕戰是我連其權三國伐之越承其弊可克也勾踐曰善趙肅侯游大陵出於鹿門大戊午扣馬曰耕事方急一日不作百日不食肅侯下車謝魏文侯與田子方飲酒而稱樂文侯曰鐘聲不比乎左高田子方笑文侯曰奚笑子方曰臣聞之君明則樂官不明則樂音今君審於聲臣恐君之聾於官也文侯曰善敬聞命武侯與諸大夫浮於西河稱曰河山之險豈不亦信固哉王鍾侍曰此晉國之所以彊也若善循之則霸王之業基矣吳起對曰吾君之言危國之道也而子又附之是重危也武侯忿然曰子之言有説乎吳起對曰河山之險信不足保也是伯王之業不從此也昔者三苖之居左有彭蠡之波右有洞庭之水文山在其南而衡山在其北恃此險也為政不善而禹放逐之夫夏桀之國左天門之隂右天谿之陽廬睪在其北伊雒出其南有此險也然為政不善而湯伐之殷紂之國左孟門而右漳滏前帶河後被山有此險也然為政不善而武王伐之且君親從臣而勝䧏城城非不高人民非不衆也然而可得并者政惡故也從是觀之地形險阻奚足以霸王矣武侯曰善吾乃今日聞聖人之言也西河之政專委子矣梁襄王為太子時惠王死葬有日矣天大雨雪至於半月壊城郭且為棧道而葬羣臣多諌太子者曰雪甚如此而䘮行民必甚疲乏官費又恐不給請弛期更日太子曰為人子而以民勞與官費用之故而不行先王之䘮不義子勿復言羣臣皆不敢言而以告犀首犀首曰吾未有以言之也是其唯薛公乎請告薛公薛公曰諾駕而見太子曰葬有日矣太子曰然薛公曰王季歴葬於楚山尾灓水齧其墓見棺之前和文王曰嘻先君必欲一見羣臣百姓也夫故使灓水見之於是出而為之張朝百姓皆見之三日而後更葬此文王之義也今葬有日矣而雪甚及牛日難以行太子為及日之故得無嫌於欲亟葬乎願太子更日先王必欲少留而扶社稷安黔首也故使雪甚因弛期而更為日此文王之義也若此而弗為意者羞法文王乎太子曰甚善敬弛期更擇日梁君出獵見白鴈羣梁君下車彀弩欲射之道有行者梁君謂行者止行者不止白鴈羣駭梁君怒欲射行者其御公孫襲下車撫矢曰君止梁君忿然作色而怒曰襲不與君而顧與他人何也公孫襲對曰昔者齊景公之時天下大旱三年卜之曰必以人祠乃雨景公下堂頓首曰吾所以求雨者為吾民也必使吾以人祠乃且雨寡人願自當之言未卒而天大雨方千里者何也為有德於天而惠於民也今主君以白鴈之故而欲射殺人主君譬無異於虎狼梁君援其手與上車歸入廟門呼萬歲曰幸哉今日也他人獵皆得禽獸吾獵得善言而歸明賞惟五等之君刑一國之事立家者百乘食土者萬民茍章程之不修将風化之幾墜建侯之利懋賞攸先有能舉不失勞動足有勸使夫為善者信丕命而承事忠力之臣厲貞規而犯難謀能之士吐嘉猷以沃心則書勲之文足光於盟府計功之典克烈於鼎鍾者矣宋武公之世鄋瞞伐宋司徒皇父帥師禦之耏班御皇父充石皇父戴公子充石皇父名公子榖甥為右司㓂牛父駟乘以敗狄于長丘長丘宋地獲長狄緣斯緣斯僑如之先皇父及二子死焉皇父與穀甥及牛父皆死故耏班獨受賞宋公於是以門賞耏班使食其征開門之征税也謂之耏門晉獻公十六年作二軍公将上軍太子申生将下軍趙夙御戎畢萬為右為公御右也夙趙衰兄畢萬魏犨祖父以滅耿滅霍滅魏平陽皮氏縣東有耿鄉永安縣東北有霍太山三國皆姬姓還為太子城曲沃賜趙夙耿賜畢萬魏以為大夫文公旣即位從亡賤臣壺叔曰君三行賞賞不及臣敢請罪文公報曰夫導我以仁義防我以德惠於此受上賞輔我以行卒以成立此受次賞矢石之難汗馬之勞此復受次賞若以力事我而無補缺者此更次賞三賞之後故且及子晉人聞之皆説五年文公與楚戰城濮楚兵敗歸國行賞狐偃為首或曰城濮之事先軫之謀文公曰城濮之事偃説我毋失信先軫曰夫軍事勝為右吾用之以勝然此一時之説偃言萬世之功奈何以一時之利而加萬世之功乎是以先之魯僖公元年莒人求賂求還慶父之賂公子季友敗諸酈獲莒子之弟挐非卿也嘉獲之也莒既不能為魯討慶父受魯之賂而又重來其求無厭故嘉季友之獲而書之公賜季友汶陽之田及費三十一年晉文公解曹地以分諸侯僖公使臧文仲往宿於重館重館人告曰晉始伯而欲固諸侯故解有罪之地以分諸侯諸侯莫不望分而欲親晉皆將爭先晉不以故班必親先者吾子不可以不速行魯之班長而又先諸侯其誰望之若少安恐無及也從之獲地於諸侯為多及既復命為之請曰地之多也重館人之力也臣聞曰善有章雖賤賞也惡有釁雖貴罰也今言而辟境其章大矣請賞之乃賞之爵晉襄公元年敗狄於箕反自箕公以三命命先且居将中軍且居先軫之子其父死敵故進之以再命命先茅之縣賞胥臣曰舉郤缺子之功也先茅絶後故取其縣以賞胥臣以一命命郤缺為卿復與冀還其父故邑景公時荀林父敗赤狄于曲梁公賞之狄臣千室林父桓子名千室千家也亦賞士伯以𤓰衍之縣士伯士貞子曰吾獲狄土子之功也微子吾䘮伯氏矣伯桓子字邲之敗晉侯将殺林父士伯諌而止羊舌職説是賞也職叔向父曰周書所謂庸庸祗祗者謂此物也夫魯成公二年晉使齊還魯汶陽之田公㑹晉師于上鄍上鄍地闕賜三帥先路三命之服三帥郤克士爕欒書也嘗受王先路之賜今改而易新并此車所建所服之物司馬司空輿帥候正亞旅皆受一命之服晉司馬司空皆大夫輿帥主兵車侯正主斥候亞旅亦大夫也皆魯侯賜晉悼公三年㑹諸侯於雞澤悼公之弟揚干亂行於曲沃行次也魏綘戮其僕僕御也公怒魏綘授僕人書将伏劒公跣而出曰子無重寡人之過以綘為能以刑佐民矣反役與之禮食使佐新軍羣臣旅㑹今欲顯綘故特為設禮食十二年公伐鄭軍于蕭魚鄭伯嘉來納女工妾三十人女樂二八歌鍾二肆及寶鏄輅車十五乘公賜魏綘女樂一八歌鍾一肆曰子敎寡人和戎翟而正諸華於今八年七合諸侯寡人無不得志請與子樂之綘辭曰夫和戎翟臣之幸也八年七合諸侯君之靈也二三子之勞也臣焉得之公曰微子寡人無以待戎無以濟河二三子何勞焉子其受之平公十九年鄭伯如晉公孫段相甚敬而卑禮無違者晉侯嘉焉授之以䇿曰子豐有勞於晉國子豐段之父余聞而弗忘賜女州田以胙乃舊勲州縣屬河内郡伯石再拜稽首受䇿以出楚康王十二年以滅舒鳩賞子木辭曰先大夫蔿子之功也以與蒍掩往年楚子将伐舒鳩蒍子馮請退師以湏其叛楚子從之卒獲舒鳩故子木辭賞以與其子鄭簡公十八年入陳十九年賞入陳之功三月甲寅朔享子展賜之先路三命之服先路次路皆王所賜車之總名盖請之於王先八邑以路及命服為邑先八邑三十二井賜子産次路再命之服先六邑子産辭邑曰自上以下隆殺以兩禮也臣之位在四上卿子展次卿子西十一年良霄見經十九年乃立子産為卿故位在四且子展之功也臣不敢及賞禮請辭邑賞禮以禮見賞謂六邑也公固予之乃受三邑位次當受二邑以公固與之乃受三邑公孫揮曰子産其将知政矣知國政讓不失禮齊威王九年召卽墨大夫而語之曰自子之居卽墨也毁言日至然吾使人視卽墨田野闢民人給官無留事東方以寧是子不事吾左右以求譽也封之萬家襄王在莒五年田單以卽墨攻破燕軍迎襄王於莒入臨菑齊復屬齊封田單為安平君趙惠文王二十九年秦韓相攻而圍閼與趙使趙奢将擊秦大破秦軍閼與下賜號為馬服君孝成王五年燕兵擊趙趙使廉頗将大破燕軍於鄗殺栗腹燕将遂圍燕燕割五城請和乃聽之趙以尉文邑名封廉頗為信平君為假相國幽繆王三年大将軍李牧擊秦軍於宜安大破秦軍走秦将桓齮封李牧為武安君魏安釐王時公叔痤為魏将西與韓趙戰澮北禽樂祚魏王説郊迎以賞田百萬祿之公叔痤反走再拜辭曰夫使士卒不奔直而不倚棟撓不避者此吳起餘敎也臣不能為也前脉地形之險阻决利害之備使三軍之士不迷惑者巴寧㸑襄之力也縣賞罰於前使民昭然信之於後者王之明法也見敵之兵鼔之不敢怠倦者臣也王特為臣之右手不倦賞臣可也若以臣之有功臣何力之有乎王曰善於是索吳起之後賜之田二十萬巴寧㸑襄田各十萬王曰公叔豈非長者哉既為寡人勝敵矣又不遺賢者之後不掩能士之迹公叔何可無益乎故又與田四十萬加之百萬之上使百四十萬燕昭王用樂毅并䕶趙楚韓魏燕之兵以伐齊毅入臨淄盡取齊寳財物祭器輸之燕王大恱親至濟上勞軍行賞享士封毅於昌國號為昌國君册府元龜卷二百四十二
