body:
  text: 册府元龜卷七百七十二宋王欽若等撰總録部志節男子之生懸弧於門示將有事於四方也盖古之志士樹勲於世揚名於後者未始不懐慷慨之操勵剛果之節因事感發挾義倜儻或塊處窮約或遭罹困辱而能壯圗内激英槩外見發乎心術形於話言卒能踐之斯可復也至有服膺刻意研味前說矯尾厲角歴干當世不喜卑冗之役無事貴游之樂輕章句之誦習慕豪英之風軌專講王霸之術好論將帥之事靡尚細節罔循常檢是皆魁梧磊落之人也豈齪齪廉謹云乎哉申包胥楚大夫初與伍員為友伍員之亡也謂包胥曰我必復楚國復報也包胥曰勉之子能復之我必能興之及昭王在隨包胥如秦乞師吳起衛人少時家累千金游仕不遂遂破其家鄉族笑之吳起殺其謗己者三十餘人而東出衛郭門與其毋訣齧臂而盟曰起不為卿相不復入衛後為楚相蘇秦者東周雒陽人也東事師於齊習之於鬼谷先生潁川陽城有鬼谷葢是其人所居因為號風俗通曰鬼谷先生六國時從横家出游數嵗大困而歸兄弟嫂妹妻妾皆笑之曰周人之俗治産業力工啇什二以為務今子釋本而事口舌困不亦宜乎蘇秦聞之而慙自傷乃閉室不出出其書徧觀之曰夫士業已屈首受書而不能以取尊榮雖多亦奚以為於是得周書隂符伏而讀之期年以出揣摩戰國策曰乃發書陳篋數十得太公隂符之謀伏而誦之簡練以為揣摩讀書欲睡引錐自刺其股血流至踵曰安有說人主不能出其金帛錦綉取卿相之尊者乎期年揣摩成鬼谷子有揣摩篇曰此可以說當世之君矣後佩六國相印終齊客卿張儀者衛人也始嘗與蘇秦俱事鬼谷先生學成游說諸侯嘗從楚相飲已而楚相亡璧門下意張儀曰儀貧無行此必盜相君之璧共執張儀掠笞數百不服釋之其妻曰嘻子毋讀書游說安得此辱乎張儀謂其妻曰視吾舌尚在否其妻笑曰舌在也儀曰足矣後終於秦相蔡澤者燕人也游學于諸侯小大甚衆不遇而從唐舉相荀卿曰梁有唐舉曰吾聞先生相李兊曰百日之内持國秉政有之乎曰有之曰若臣者何如唐舉熟視而笑曰先生曷鼻巨肩徐廣曰曷一作偈偈一作抑巨一作渠魋顔蹙齃膝欒欒兩膝曲也吾聞聖人不相殆先生乎蔡澤知唐舉戲之乃曰富貴吾所自有吾所不知者壽也願聞之唐舉曰先生之壽從今以往者四十三嵗蔡澤笑謝而去謂其御者曰吾持梁刺齒肥持梁作飯也刺齒二字當作齧又作齒也躍馬疾驅懐黄金之印結紫綬於腰揖譲於人主之前食肉富貴四十三年足矣後為秦相李斯者楚上蔡人也年少時為郡小吏見吏舎厠中鼠食不潔近人犬數驚恐之斯入倉觀倉中鼠食積粟居大廡之下不見人犬之憂於是李斯乃歎曰人之賢不肖譬如鼠矣在所自處耳乃從荀卿學帝王之術學已成度楚王不足事而六國皆弱無可為建功者欲西入秦辭於荀卿曰斯聞得時無怠今萬乗方爭時游者主事今秦王欲吞天下稱帝而治此布衣馳騖之時而游說者之秋也處卑賤之位而計不為者此禽鹿視肉人面而能彊行者耳故詬莫大於卑賤而悲莫深於窮困久處卑賤之位困苦之地非世而惡利自託於無為此非士之情也始皇時斯位至丞相陳勝陽城人少時嘗與人傭耕輟耕之壟上悵悵久之曰茍富貴無相忘傭者笑而應曰若為傭耕何富貴也勝太息曰嗟乎燕雀安知鴻鵠志哉漢陳平陽武戸牖人貧不事業一縣中盡笑其所為里中社平為宰主切割肉也分肉甚均里父老曰善陳孺子之為宰平曰嗟乎使平得宰天下亦如此肉後為丞相韓信淮隂人家貧母死無以𦵏迺行營髙燥地令傍可置萬家者言其有大志也後為淮隂侯朱買臣字翁子吳人也嘗刈薪樵賣以給食擔束薪行且讀書其妻亦負載相隨數止買臣無歌謳道中買臣愈益疾歌妻羞之求去買臣笑曰我年五十當貴今已四十餘矣苦女日久待我富貴報女功後為㑹稽太守丞相長史主父偃臨淄人也上疏言事遷謁者中郎中大夫大臣皆畏其口賂遺千金或説偃曰大横偃曰臣結髮游學四十餘年身不得遂親不以為子昆弟不收賓客棄我我阸日久矣丈夫生不五鼎養則五鼎烹耳後為齊相誅朱雲字游平陵人事蕭望之受論語皆能傳其業好倜儻大節當世以是髙之終於槐里令趙充國字翁孫隴西人為人沈勇有大畧好將帥之節而學兵法通知四夷事為後將軍卒段㑹宗字子松天水上邽人㑹宗為人好大節矜功名位至左曹中郎將光禄大夫終軍者濟南人也初從濟南當詣博士步入闗闗吏予軍繻繻帛邊也舊闗出入皆以傳煩因裂繻頭合以為符信也軍問以此何為吏曰為復傳復返也謂返出闗吏以為傳還當以合符軍曰丈夫西游終不復傳還棄繻而去軍為謁者使行郡國建節東出闗闗吏識之曰此使者迺前棄繻生也班伯為奉車都尉與王許子弟為羣在於綺襦紈絝之間非其好也翟方進字子威汝南上蔡人家世微賤年十二三失父孤學給事太守府為小史號遲頓不及事數為掾史所詈辱方進自傷迺從汝南蔡父相問已能所宜言從何術藝可以自達蔡父大奇其形貌謂曰小史有封侯骨當以經術進努力為諸生學問方進既厭為小史聞蔡父言心喜因病歸家辭其後母欲西至京師受經方進讀經博士受春秋積十餘年經學明習徒衆日廣諸儒稱之以射策甲科為郎後漢耿弇少好學父況為朔調連率弇嘗見郡尉試騎士建旗皷𨽻馳射繇是好將帥之事後終建威大將軍王霸世好文法父為郡決曹掾霸亦少為獄吏嘗慷慨不樂吏職其父奇之遣西學長安後終於上谷太守馬援年十二而孤少有大志諸兄奇之嘗受齊詩意不能守章句乃辭兄況欲就邊郡田牧況曰汝大才當晩成良工不示人以樸且從所好後為伏波將軍封新息侯援曰方今匈奴烏桓尚擾北邊欲自請擊之男兒要當死于邊野以馬革裹屍還𦵏耳何能卧牀上在兒女子手中耶馮衍字敬通幼有奇才二十而博通羣書王莽時諸公多薦舉之者衍辭不肯仕然有大志不戚戚於貧賤居嘗慷慨歎曰衍少事名賢經歴顯位懷金垂紫揭節奉使不求茍得嘗有凌雲之志三公之貴千金之富不得其願不概於懐貧而不衰賤而不憾年雖疲曳猶庶幾名賢之風修道徳於幽㝠之路以終身名為後世法居貧年老卒于家衍官至司𨽻從事鄧訓字平叔禹第六子也少有大志不好文學禹常非之訓終於䕶羌校尉郭丹從師長安買符入函谷闗乃慨然歎曰丹不乗使者車終不出闗既至京師嘗為都講諸儒咸敬重之大司馬嚴尤請丹辭病不就王莽又徵之遂與諸生逃于北地更始一年三公舉丹賢能徵為諫議大夫持節使歸南陽安集受降丹去家十有二年果乗髙車出闗如其志焉梁竦安定人髙山侯統子也竦言生長京師不樂本土自負其才鬱鬱不得意嘗登髙望逺歎息言曰大丈夫居世生當封侯死當廟食如其不然閒居可以養志詩書足以自娛州郡之職徒勞人耳後辟命交至並無所就梁慬有勇氣嘗慷慨好功名官至謁者第五倫為京兆督鑄錢掾毎讀詔書嘗歎息曰此聖主也一見決矣等輩笑之曰爾說郡將尚不下安能動萬乗乎華嶠書曰盖延代鮮于辱為馮翊多非法倫數切諫延憾之故滯不得舉郡將謂郡守倫曰未遇知己道不同故耳位至司空班超為人有大志不修細節然内孝謹居家常執勤苦不恥勞辱與母隨至雒陽家貧嘗為官傭書以供養久勞苦嘗輟業投筆歎曰大丈夫無它志畧猶當效傅介子張騫立功異域以取封侯安能久事筆硯間乎左右皆笑之超曰小子焉知壯士志哉後為西域都䕶封定逺侯趙曄㑹稽山隂人也少嘗為縣吏奉檄迎督郵曄恥於厮役遂棄車馬去到犍為資中資中縣名今資州資陽縣詣杜撫受韓詩究竟其術撫卒乃歸州召補從事不就楊震嘗客居于湖不答州郡禮命數十年衆人謂之晚暮而震志愈篤後位至太尉徐淑交接英雄嘗有壯志舉茂才除渤海修令遷琅瑯都尉趙温為京兆郡丞嘆曰大丈夫當雄飛安能雌伏遂棄官去盧植從馬融學終辭歸闔門教授性剛毅有大節嘗懐濟世志後為議郎張奐少立志節嘗與士友言曰大丈夫處世當為國家立功邊境及為將帥果有勲名為度遼將軍轉太常卒馮良字君郎出於孤微少作縣吏年三十為尉從佐奉檄迎督郵即路慨然恥在厮役因壊車殺馬毁裂衣冠乃遁至犍為從杜撫學戴封年十五詣太學師事鄮令東海申君申君卒送喪到東海道當經其家父母以封當還豫為娶妻封暫過拜親不宿而去還京師卒業後為中山相徵拜為太常卒郭泰字林宗家世貧賤早孤母欲使給事縣廷林宗曰大丈夫安能處斗筲之役乎遂辭就成臯屈伯彦學後以有道徵不就符融少為都官從事主察舉百官犯法者融恥為其吏而去後游太學師事少府李膺范冉冉或作丹少為縣小吏年十八奉檄迎督郵冉恥之乃遁去游學後為萊蕪長不到官卒陳蕃年十五嘗閒處一室而庭宇蕪穢父友同郡薛勤來候之謂曰孺子何不洒掃以待賓客蕃曰大丈夫處世當掃除天下安事一室乎勤知其有清世志甚奇之位至太尉逢萌家貧給事縣為亭長時尉行過亭萌候迎拜謁既而擲楯歎曰大丈夫安能為人役哉遂去之長安學通春秋經後隠於勞山連徵不起卒周黨家産千金少孤為宗人所養而遇之不以禮及長又不還其財黨詣鄉縣訟主乃歸之既而散與宗族悉免遣奴婢遂至長安游學建武中徵為議郎以病去職杜密字周甫潁川陽城人也為人沈實少有厲俗志後為太僕黨事既起免歸本郡岑晊南陽棘陽人也雖在閭里慨然有董正天下之志後太守宏農成瑨請為功曹范滂少厲清節為州里所服舉孝廉光禄四行時冀州飢荒盜賊羣起乃以滂為清詔使案察之滂登車攬轡慨然有澄清天下之志王允少好大節有志於立功嘗習誦經傳朝夕試馳射三公並辟以司徒髙第為侍御史鄭𤣥年十一二隨母還家正臘㑹同列十數皆美服盛飾語言閒通𤣥猶漠然如不及母私督數之乃曰此非我志不在所願也後徵司農卿不就魏夏侯稱字叔權征西將軍淵之子也自孺子而好合聚童兒為之渠帥戲必為軍旅戰陳之事有違者輙嚴以鞭笞衆莫敢逆淵隂奇之使讀項羽傳及兵書不肯曰能則自為耳安能學人與文帝為布衣之交年十八卒婁圭字子伯少有猛志嘗歎息曰男兒居世㑹當得數萬兵千匹騎著後耳儕輩笑之後詣太祖以為大將鄧艾少時毎見髙山大澤輒規度指畫軍營處所時人多笑焉後位至征西將軍留贊字正明㑹稽長山人為郡吏與黄巾賊帥吳桓戰手斬得桓贊一足被創遂屈不伸然性烈好讀兵書及三史毎覽古良將戰攻之勢輒對書獨歎因呼諸近親謂曰今天下擾亂英豪並起歴觀前世富貴非有恒人而我屈躄在閭巷之間存亡無以異今欲割引吾足幸不死而足伸幾復見用死則已矣親戚皆難之有間贊乃以刀自割其筋血流滂沲氣絶良久家人驚怖亦以既爾遂引伸其足足伸創愈以得蹉步凌統聞之請與相見甚奇之乃表薦賛遂被試用賈逵字梁道自為兒童戲弄嘗設部伍祖父習異之曰汝大必為將率口授兵法數萬言終於豫州刺史黄朗字文達沛郡人也為人𢎞通有信實父為本縣卒朗感其如此抗志游學繇是為方國及其郡士大夫所禮特異裴潛少時不為父所知又自感所生微賤無舅氏又為父所不禮即折節仕進雖多所更歴清省恪然後為光禄大夫卒蜀姜維字伯約天水冀人也少孤與母居好鄭氏學為人好立功名隂養死士不修布衣之業後為大將軍吳吕蒙字子明汝南富陂人也少南渡依姊夫鄧當當為孫策將數討山越蒙年十五六竊隨當擊賊當顧見大驚呵叱不能禁止歸以告蒙母母恚欲罰之蒙曰貧賤難可居脫誤有功富貴可致且不探虎穴安得虎子母哀而舍之後為南郡太守黄盖少孤嬰丁凶難辛苦備嘗然有壯志雖處貧賤不自同於凡庸嘗以負薪餘閒學書疏講兵事後為偏將軍潘璋東郡人性博蕩居貧好賖酤債家至輒言後豪富相還後為右將軍張奮昭之弟也年二十造作攻城大攻車為步隲所薦昭不願曰汝年尚幼何為自委於軍旅乎奮對曰昔童汪死難子竒治阿奮實不才耳於年不為少也遂領兵馬將軍連有功效至平州都督封樂鄉亭侯晉杜預字元凱京兆杜陵人也祖畿魏尚書僕射父恕幽州刺史預博學多通明於興廢之道常言徳不可以企及立言可庶幾也後為鎮南大將軍都督荆州諸軍事王濬恢廓有大志嘗起宅開門前路廣四十步人或謂之何太過濬曰吾欲使容長㦸幡旗衆咸笑之濬曰陳勝有言燕雀安知鴻鵠之志後為撫軍大將軍劉卞字叔龍東平須昌人也本兵家子質直少言少為縣小吏功曹夜醉如厠使卞執燭不從功曹銜之以他事補亭子卞後從令至雒得入太學試經為臺四品吏訪問令冩黄紙一鹿車卞曰劉卞非為人寫黄紙者也訪問知怒言於中正退為尚書令史或謂卞曰君才簡畧堪大不堪小不如作守行守之義舍人卞從其言後為吏部令史遷齊王攸司空主簿魏舒字陽元任城樊人也少孤為外家寗氏所養甯氏起宅相宅者云當出貴甥外祖母以魏氏甥小而慧意謂應之舒曰當為外氏成此宅相久乃别居年四十餘郡上計掾察孝廉宗黨以舒無學業勸令不就可以為髙耳舒曰若試而不中其負在我安可虛竊不就之髙以為己榮乎於是自課百日習一經因而對策升第除澠池長趙至字景真代郡人也寓居雒陽緱氏令初到官至年十三與母同觀母曰汝先世本非微賤世亂流離遂為士伍耳爾後能如此不至感母言詣師受業聞父耕叱牛聲投書而泣師怪問之至曰我小未能榮養使老父不免勤苦師甚異之年十四逰太學後占籍遼西舉郡計吏到雒與父相遇時母已亡父欲令其宦立弗之告仍戒以不歸至乃還遼西幽州三辟部從事斷九獄見稱精審太康中以良吏赴雒方知母亡初至自恥士伍欲以官學立名期於榮養既而其志不就號憤慟哭嘔血而卒左思少學鍾胡書及鼓琴並不成父雍謂友人曰思曉解不及我少時思遂感激勤學兼善隂陽之術貌寢口訥而詞藻壯麗不好交游惟以閑居為事思嘗為秘書郎陳頵字延思陳國苦人也少好學有文義父訢立宅起門頵曰當使容馬車訢笑而從之後州辟部從事乗馬車還家宗黨榮之李矩字世廻平陽人也童齓時與羣兒聚戲便為其率計畫指授有成人之量後終於征西將軍司州刺史易雄字興長長沙瀏陽人也少為縣吏自念卑賤無繇自達乃脱幘挂縣門而去因習律令及施行故事交結豪右州里稍稱之後為舂陵令丁紹為冀州刺史自以為才足為物雄當官涖政毎事克舉視天下之事若運於掌握遂慨然有董正四海之志矣是時王浚盛於幽州苟晞盛於青州然紹視二人蔑如也永嘉三年暴疾而卒臨終嘆曰此乃天亡冀州豈吾命哉閻纉不䕶細行而慷慨多大節後終於漢中太守劉琨少負志氣有縱横之才善交勝已頗浮誇與范陽祖逖為友聞逖被用與親故書曰吾枕戈待旦志梟逆虜嘗恐祖生先吾著鞭其意氣相期如此後為幽州刺史王恭字伯孝光禄大夫藴子定皇后之兄也少有美譽清操過人自負才地髙華嘗有宰輔之望讀左傳至奉王命討不庭毎輟卷而歎起家為著作郎歎曰仕宦不為宰相才志何足以騁因以疾辭後為輔國將軍劉殷性至孝時人嘉其至性通感競以穀帛遺之殷受而不謝直云待後貴當相酧耳性倜儻有濟世之志儉而不陋清而不介望之頽然而不可侵也鄉黨親族莫不稱之後仕劉聰至太保夏統字仲御㑹稽永興人也幼孤貧養親以孝聞睦於兄弟毎採梠求食星行夜歸或至海邊拘螊􅒹以資養雅善談論宗族勸之仕謂之曰卿清亮質直可作郡綱紀與府朝接自當顯至如何甘辛苦於山林畢性命於海濱也統勃然作色曰諸君待我乃至此乎使統屬太平之時當與元凱評議出處遇濁代念與屈生同汚共泥若汚隆之間自當耦耕沮溺豈有辱身曲意於郡府之間乎聞君之談不覺寒毛盡戴白汗四匝顔如渥丹心熱如炭舌縮口張兩耳壁塞也言者大慙祖逖與劉琨俱為司州主簿情好綢繆共被同寢中夜聞荒雞鳴蹴琨覺曰此非惡聲也因起舞逖琨並有英氣毎語世事或中宵起坐相謂曰若四海鼎沸豪傑並起吾與足下當相避於中原耳琅琊王拓定江南未遑北伐乃以逖為奮威將軍豫州刺史逖渡江中流擊楫而誓曰祖逖不能清中原而復濟者有如大江辭色壯烈衆皆慨嘆王導從元帝鎮建康過江人士毎至暇日相要出新亭飲宴周顗中坐而歎曰風景不殊舉目有江河之異皆相視流涕惟導愀然變色曰當戮力王室克復神州何至作楚囚相對泣邪衆收泪而謝之導位至宰相陶侃嘗語人曰大禹聖者乃惜寸隂至於衆人當惜分隂豈可逸遊荒醉生無益於時死無聞於後是自棄也後為廣州刺史在州無事輒朝運百甓於齋外暮運於齋内人問其故答曰吾方致力中原過爾優逸恐不堪事其勵志勤力皆此類也谷儉桂陽人中興初以學校陵遲特聽不試孝廉而秀才依舊筞試甘卓為湘州刺史備禮舉儉為秀才儉辭不獲命州厚禮遣之諸州秀才聞當考試皆憚不行惟儉一人到臺遂不復筞試儉恥其州少士乃表求試以髙第除中郎儉少有志行寒苦自立博涉經史于時南土凋荒經籍道息儉不能逺求師友惟在家研精雖所得實深未有名譽又恥衒耀取達遂歸終身不仕卒於家孔安國羣從諸兄並乏才名以富强自立惟安國與兄汪少厲孤貧之操汪既以直亮稱安國亦以儒素顯後歴尚書左右僕射卒劉毅字希樂少有大志不修家人産業後為衛將軍荆州刺史魏詠之生而兔缺年十八聞荆州刺史殷仲堪帳下有名醫能療之貧無行裝謂家人曰殘醜如此用活何為遂齎數斛米西上以投仲堪既至造門自通仲堪與語嘉其盛意召醫視之醫曰可割而補之但須百日進粥不得語笑詠之曰半生不語而有半生亦當療之況百日邪仲堪於是處之别室令醫善療之詠之遂閉口不言惟食薄粥其厲志如此及差仲堪厚資遣之後為荆州刺史前趙劉宣師事樂安孫炎學成而返不出門閭盖數年毎讀漢書至蕭何鄧禹傳未曽不反覆詠之曰大丈夫若遭二祖終不令兩公獨擅美於前矣晉武時為右部都尉前秦王猛字景畧隠於華隂山懐佐世之志希龍顔之主斂翼待時候風雲而後動後為苻堅丞相宋蒯恩蘭陵人髙祖征孫恩縣差恩為征民使伐馬芻恩嘗負大束兼倍餘人每捨芻於地嘆曰大丈夫彎弓三石奈何充馬士髙祖聞之即給器仗恩大喜自征妖賊嘗為先登後為世子司馬傅𢎞之少倜儻有大志為本州主簿舉秀才不行劉鍾字世之彭城人也少孤依鄉人中山太守劉固共居幼有志力嘗慷慨於貧賤後從髙祖征伐為右衛將軍垣䕶之少倜儻不拘小節形狀短陋而氣幹强果從髙祖征司馬休之為世子中軍府長史兼行叅軍王鎮惡年十三而苻氏敗亡闗中擾亂流寓殽澠之間嘗寄食澠池人李方家方善遇之謂方曰若遭遇英雄主要取萬户侯當厚相報方答曰君丞相孫人才如此何患不富貴至時願見用為本縣令足矣鎮惡終於安西將軍劉湛弱年便有宰世志嘗自比管夷吾諸葛亮不為文章不喜談議本州辟主簿不就除著作佐郎又不拜後位至丹陽太守宗慤字元幹南陽人也叔父炳髙尚不仕慤方少時炳問其志慤曰願乗長風破萬里浪炳曰汝不富貴即破我家矣後為雍州都督沈攸之慶之從子也攸之初詣領軍將軍劉遵考求補白丁隊主遵考以為形陋不堪攸之歎曰昔孟嘗君身長六尺為齊相今求士取肥大者哉因隨慶之征討後為荆州刺史曹景宗新野人頗受史書毎讀穰苴樂毅傳輒放卷歎息曰大丈夫當如是南齊垣榮祖少學騎馬及射或謂之曰武事可畏何不學書榮祖曰昔曹操曹丕上馬横槊下馬談論此於天下可不負飲食矣君輩無自全之伎何異犬羊乎垣崇祖在淮隂見太祖自比韓信白起咸不信惟帝獨許之後為兖州大中正李安民少有大志嘗歎曰大丈夫處世富貴不可希取三將五校何難之有太祖時位至中郎領軍封康樂侯王敬則臨淮射陽人也性倜儻不覊好刀劒嘗與暨陽吏鬬謂曰我若得暨陽縣當鞭汝小吏背吏唾其面且曰汝得暨陽縣我亦得司徒公矣敬則後自直閤將軍補暨陽令昔日鬬吏亡叛令出遇之甚厚曰我已得暨陽縣汝何時得司徒公邪樊遜字孝謙河東北猗氏人也遜少學嘗為兄仲所優饒既而自責曰名為人弟獨受安逸可不愧於心乎欲同勤事業母馮氏謂之曰汝欲謹小行邪遜感母言遂專心典籍嘗書壁作見賢思齊四字以自勸勉後寓居鄴中為臨漳小吏縣令裴鑑擢為主簿王儉少時便有宰臣之志賦詩云稷契賛虞夏伊吕翼商周及生子字曰元成取世仍作相之義後為衛將軍尚書令梁吉士瞻字梁客馮翊蓮勺人也少有志氣不事生業時徵士吳苞見其姿容勸以經學士瞻因誦鮑昭詩云䜿儒守一經不足識行藏拂衣不顧後為西陽武昌二郡太守馮道根廣平人本郡召為主簿不就曰吾當使封侯廟食安能為儒吏邪後為左右上將軍封侯裴之横字如岳之髙第十三弟也少好賓游重氣俠不事産業之髙以其縱誕乃為狹被蔬食以激厲之之横歎曰大丈夫富貴必作百幅被遂與僮屬數百人於芍陂大營田墅俄致殷積簡文在東宫聞而異之以為河東王常侍陳吳明徹微涉書史天文孤虚畧通其妙頗以英雄自許髙祖深奇之髙祖受禪拜安南將軍周文育本姓項氏年十一嵗義興人周薈養為己子命兄子𢎞讓教之書計𢎞讓善𨽻書寫蔡邕勸學及古詩以遺文育不之省也謂𢎞讓曰豈能學此取富貴祇有仗槊耳𢎞讓壯之教騎射文育大悦後為鎭南將軍魯廣達字遍覽呉州刺史悉達之弟也少慷慨志立功名位至中領軍後魏崔亮父元孫為沈文秀所害亮時年十歲嘗依季父幼孫居家貧傭書自業時隴西李冲當朝任事亮從兄光往依之謂亮曰安能久事筆硯而不往託李氏也彼家饒書因可得學亮曰弟妹飢寒豈可獨飽自可觀書於市安能看人眉睫宋繇燉煌人繇生而父僚為張邕所誅繇少有志尚喟然謂妹夫張彦曰門户傾覆負荷在繇不能衘膽自厲何以繼承先業遂隨彦至酒泉追師就學閉室誦書晝夜不倦博通經史諸子羣言靡不綜覽後終於安遠將軍李曾趙郡人也郡辟功曹不就門人勸之曾曰功曹之職雖是鄉選高第猶是郡吏耳北靣事人亦何容易後終於趙郡太守李㻛俶儻有大志好飲酒篤於親知毎謂弟郁曰士大夫學問稽博古今而罷何用專經為老博士也後為鎭逺將軍岐州刺史楊侃字士業播之子也頗愛琴書尤好計畫時播一門貴滿朝廷兒姪早通而侃獨不交游公卿罕有識者親朋勸其出仕侃曰茍有良田何憂晩歲但恨無才具耳後終於右光禄大夫王肅少而聰辯涉獵經史頗有大志位至揚州刺史傅永年二十餘有友人與之書而不能答請於叔父洪仲洪仲深讓之而不為報永乃發憤讀書涉獵經史兼有才華後位至光禄大夫李苗少有節操志尚功名毎讀蜀書見魏延請出長安諸葛不許嘗歎息謂亮無竒計及覽周瑜傳未曾不咨嗟絶倒後終冠軍將軍夏侯道遷譙國人少有志操年十七父母為結婚韋氏道遷云欲懷四方之志不願取婦家人咸謂戲言及至婚日求覔不知所在於後訪問乃云逃入益州後為􅘵州刺史卒李業興上黨長子人少耿介志學精力雖在貧賤常自矜負若禮待不足縱屬權貴不為之屈後終於齊文襄王中外府諮議參軍庫狄昌字恃德神武人也少便騎射有膂力膽氣壯烈毎以將帥自許北齊高昻幼稚時便有壯氣長而倜儻父翼為求嚴師令捶撻昂不遵師訓專事馳騁毎言男兒當横行天下自取富貴誰能端坐讀書作老博士也後位至司徒公趙彦深年三歲母傅氏便孀居彦深五歲傅謂之曰家貧兒小何以能濟彦㴱泣而言曰若天哀矜兒大當仰報傅感其意對之流涕及彦深拜太常卿還母子相泣久之魏収年十五頗已屬文及隨父赴邊好習騎射欲以武藝自達榮陽鄭伯調之曰魏郎弄㦸多少収慙遂折節讀書以文章顯後為尚書右僕射後周孟信廣川索盧人也家世貧寒頗傳學業信嘗曰窮則變變則通吾家世傳儒學而未有達官當繇儒非世務也遂感激棄書從軍薛憕字景猷河東汾隂人也曾祖𢎞敞値赫連之亂率宗人避地襄陽憕早喪父家貧躬耕以養祖母有暇則覽文籍時人未之竒也江表取人多以世族憕既覊旅不被擢用然負才使氣未嘗趨世禄之門左中郎將京兆韋潛度謂憕曰君門地非下身材不劣何不􅗓裾數叅吏部憕曰世胄躡高位英俊沈下僚古人以為歎息竊所未能也潛度告人曰此年少極慷慨但不遭時耳與族祖安都之子懷雋相善懷雋每曰汝還鄉里不營産業不肯取妻豈復欲南乎憕亦恬然自處不改其舊後為安東將軍劉璠初仕梁為王國常侍非其好也璠少慷慨好功名志欲立事邊城不樂隨牒平進㑹宜豐侯蕭循出為北徐州刺史即請為輕車府主簿兼記室參軍後為華陽太守屬侯景渡江梁室大亂循以璠有才畧甚親委之時㓂難繁興未有所定璠乃喟然賦詩以見志其末章曰隨㑹平王室夷吾成霸功虚薄無時用徒然慕昔風太祖時為黄門侍郎儀同三司宇文貴少從師受學嘗輟書歎曰男兒當提劒汗馬以取公侯何能為博士也後為大將軍王勵字醜興性忠果有才幹年十七從太祖嘗謂之曰為將坐見成敗者上也被堅執鋭者次也勵曰意欲兼之太祖大笑後為千牛備身直長李弼字景和遼東襄平人少有大志膂力過人屬魏室兵亂語所親曰丈夫生世㑹湏履鋒刃平㓂難安社稷以取功名安能碌碌依階資以求榮位後以戰功為柱國大將軍終於太師楊寛少有大志毎與諸童游處必擇高大之物而坐之見者咸異焉後終於梁州刺史李逺字萬歲幼有器局志度恢然嘗與羣兒為戰闘之戲指麾部分便有軍陣之法郡守見而異之召使更戲羣兒懼而㪚走遠持杖叱之復為向勢意氣雄壯殆甚於前郡守曰此小兒所為非恒人也及長渉獵書傳略知指趣而已官至柱國大將軍蔡佑高平人少有大志與鄉人李穆布衣齊名嘗謂曰大丈夫當建立功名以取富貴安能久處貧賤邪言訖各大笑後皆如其言位至宜州刺史宇文㴱字奴于性鯁正有器局年數歲便累石為營伍并折草作旌旗布置行列皆有軍陣之勢父求遇見之乃大笑曰汝自然如此於後必為名將後終於司命中大夫侯植其先家北地之三水為州郡冠族植少倜儻有大節容貌竒偉武藝絶倫後為司倉下大夫隋宇文慶字神慶沈㴱有器局少以聰敏見知周初受業東觀頗涉經史既而謂人曰書足記姓名而已安能久事筆硯為腐儒之業後終於源州總管王誼字宜君河南雒陽人也父顯周鳳州刺史誼少慷慨有大志便弓馬遍覽羣言周閔帝時為左中侍上士于仲文父實仕周為大左輔仲文倜儻有大志氣調英㧞當時號為名公子起家為趙王屬宇文忻字仲樂本朔方人徙京兆祖莫豆干魏安平公父貴周大司馬許國公忻幼而敏慧為童兒時與羣軰遊戲輙為部伍進止行列無不用命有識者見而異之年十二能左右馳射驍㨗若飛嘗謂所親曰自古名將惟以韓白衞霍為美談吾察其行事未足多尚若使與僕竝時不令䜿子獨擅高名也其少小慷慨如此後為右領大將軍崔廓字士元博陵安平人也少孤貧而母賤繇是不為邦族所齒初為里佐屢逢屈辱於是感激逃入山中遂博覽典籍多所通涉山東學者皆宗之既還鄉里不應辟命王頗好讀書又曉兵法益有縱横之志毎嘆不逢時嘗以公相自許後為王諒府諮議參軍張定和字處謐京兆萬年人也少貧賤有志節初為待詔㑹平陳之役定和當從征無以自給其妻有嫁時衣服定和將鬻之妻靳固不與定和於是遂行以功拜儀同賜帛千匹遂棄其妻沈光少驍㨗大業中煬帝徵天下驍果之士以伐遼左光預焉同類數萬人皆出其下光將詣行在所賓客送至㶚上者百餘騎光酹酒而誓曰是行也若不能建功立名當死於高麗不復與諸君相見矣後為折衝郎將元巖字君山好讀書不治章句剛鯁有器局以名節自許高祖受禪拜兵部尚書進爵平昌郡公來䕶兒幼而卓犖初讀詩至擊鼔其鏜踴躍用兵羔裘豹飾孔武有力因捨書歎曰大丈夫在世當如是㑹為國滅賊以取功名安能區區專事筆硯也羣軰驚其言而壯其志及長雄畧秀出志氣英邁涉獵書史不為章句學後位至開府儀同三司唐房𤣥齡幼仕隋為隰城縣尉坐事除名欝欝不自得時天下方亂嘗慨然有安民濟時之志後位至司空李靖涉獵書傳不為章句之學嘗云大丈夫若遇明君撥亂膺期當立功立事以取富貴耳後終於左僕射竇威家世勲貴躭翫文史時諸兄竝以軍功致仕通顯交結豪貴賓客盈門而威職掌閑㪚諸兄更謂威曰昔孔子積學成聖猶狼狽當時棲遑若此汝效此道復欲何求名位不達固其宜矣威笑而不答後終於内史令魏徵字元成鉅鹿曲城人也少孤貧落拓有大志不事生業好讀書多所通涉見天下漸亂尤屬意縱横之説後為太子太師知門下省事武士彠太原人才器詳敏少有大節及長深沈多大畧毎讀書見扶主立忠之事未嘗不三復研尋常以慷慨揚名為志後終荆州都督馬周字賓王少孤貧好讀書尤明詩傳而落拓不事生産不為州里所敬武德中補博州助教日飲醇酒不以講授為心刺史達奚恕屢加咎責乃拂衣游於曹汴之境復為浚儀令崔賢所辱周遂感激西游長安至新豐宿於逆旅主人惟供設諸商販而不顧周遂命酒一斗八升悠然獨酌主人翁深異之後為中書令兼太子右庶子狄仁傑字懷英并州太原人也兒童時門人有被害者縣吏就詰之衆皆接對惟仁傑堅坐讀書吏責之仁傑曰黄卷之中聖賢備在猶不能接對何暇偶俗吏而見責邪後終於内史褚無量杭州鹽官人也幼孤貧勵志好學家近臨平湖中有龍鬬傾里閈就觀之無量時年十三讀書晏然不動後為左㪚騎常侍皇太子侍讀哥舒翰倜儻任俠好然諾年四十遭父喪客居西京為長安尉不禮慨然發憤折節仗劍之河西後位至尚書左僕射同平章事崔圓少孤貧志尚閎博好讀兵書有經濟宇宙之心後至黄門侍郎平章事馬璘扶風人璘少孤落拓年二十因讀馬援傳至大丈夫當死於邊野慨然嘆曰豈使吾祖勲業墜於地乎乃仗劒從戎西至安西以竒功累遷左金吾衞員外將軍馬燧少嘗與諸兄讀書乃輟卷嘆曰天下將有事矣丈夫當立功伐以濟四海安能矻矻為一儒也後位司徒兼侍中北平王張建封兖州人頗愛屬文以立功名為己任後終於徐州節度使李德裕幼有壯志苦心力學尤精西漢書左氏春秋恥與諸生從鄉賦不喜科試年纔及冠志業大成後位至太尉平章事張仲武范陽人也少業左氏春秋擲筆為薊北雄武軍使梁趙犨髫齓之時與隣里小兒戲於道左嘗分布行列為部伍戰陣之狀自為董帥指顧有節如夙習焉羣兒皆禀而從之無敢亂其行者其父目而異之曰吾家千里駒也必大吾門耳弱冠有壯節好功名後為忠武軍節度使後唐袁象先性寛厚不忤於物幼遇亂慨然有憂時之意後為歸德軍節度使晉李專美舊學為文以父摳唐昭宗時嘗應進士舉為覆試所落不許再入專美心愧之繇是不遊文塲後終於大理卿桑維翰字國僑雒陽人也父珙事河南尹張全義為客將維翰身短靣廣殆非恒人既壯毎對鑑自歎曰七尺之身安如一尺之靣繇是慨然有公輔之望後位至中書令册府元龜卷七百七十二
