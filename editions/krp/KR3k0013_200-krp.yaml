body:
  text: 册府元龜卷二百宋王欽若等撰閏位部倚任夫作朕心膂使如臂指其倚任之謂乎三正既徃嬴氏獨立然强兵之重必委謀臣及梁益負阻江呉分㨿取威定覇得士者昌南北變風政俗有異賢哲是頼寵用彌篤盖以其才略明逹履用謹飭時名攸重舊徳斯茂亦以攀附自始勤勞夙夜凡所更事允合上意繇是小大之務中外迭處榮侍左右斯湏罔離或疇咨機謀欵宻曲盡靡限資地專委要劇乃至總統政治或取論决形於付囑無所嫌間非夫忠信博厚之君子孰克荷於特遇者哉秦始皇時䝉恬北逐戎狄收河南築長城威振匈奴始皇甚尊寵䝉氏信任賢之而親近恬弟毅位至上卿出則叅乘入則御前恬任外事而毅常為内謀名為忠信故雖諸将莫敢與之爭焉蜀先主病篤詔諸葛亮囑以後事又勅後主曰汝與丞相從事事之如父龎統字士元蜀先主大器之以為治中從事親待亞於諸葛亮遂與亮並為軍師中郎將董和字㓜宰劉璋以為益州太守先主定蜀徴和為掌軍中郎將與軍師將軍諸葛亮並署左將軍大司馬府事獻可替否共為歡交後主建興元年封諸葛亮武鄉侯開府治事頃之又領益州牧政事無巨細咸决於亮蔣琬後主時為尚書令總統國事費褘為大將軍録尚書事自琬及褘雖自身在外慶賞威刑皆遥先諮斷然後乃行其推任如此呉孫䇿以虞翻為功曹䇿謂翻曰孤昔冄至夀春見馬日磾及與中州士大夫㑹語我東方人多才耳但恨學問不博語議之間有所不及耳孤意猶謂末耳卿慱學洽聞故前欲令卿一詣許交見朝士以折中國妄語兒卿不願行便使子綱恐子綱不能結兒輩舌也翻曰翻是明府家寳而以示人人儻留之則去明府良佐故前不行耳䇿笑曰然因曰孤有征討事未得還府卿復以功曹為吾蕭何守會稽耳後三日便遣翻還郡大帝初張紘為會稽東部都尉時帝初承統春秋方富太夫人以方外多難深懐憂勞數有優令辭謝付囑以輔助之義紞輒拜版荅謝思惟補察每有異事宻計及章表書記與四方交結常令紘與張昭草創撰作及帝討江夏以東部少事命紘居守遙領所職甘寧字興覇初歸吳周瑜魯肅共薦達帝加異同於舊臣寧乃陳計於帝宜先取黄祖西據楚闗可漸窺巴蜀帝深納之張昭時在坐難曰吳下業業若軍果行恐必致亂寧謂昭曰國家以蕭何之任付君君居守而憂亂奚以希慕古人乎帝舉酒囑寧曰興覇今年行討如此酒矣决以付卿但當勉建方略令必克祖則卿之功何嫌張長史之言乎寕遂西果擒祖獲其士衆遂授寕兵屯夏口薛綜赤烏中為太子少𫝊領選職綜以名儒居師傅之位仍兼選舉甚為優重陸遜為荆州牧時先主病亡子禪襲位諸葛亮秉政與大帝連和時事所宜帝輙令遜語亮并刻帝印以置遜所帝每與禪亮書常過示遜輕重可否有所不安便令改定以印封行之遜常陳便宜勸以施徳緩刑寛賦息調云忠讜之言不能極陳求容小臣數以利聞帝報曰夫法令之設欲以遏惡防邪儆戒未然也焉得不有刑罰以威小人乎此為先令後誅不欲使有犯者耳君以為大重者孤亦何利其然但不得已而為之耳今承來意當重諮謀務求其可且近臣有盡規之諌親戚有補察之箴所以規君正主明忠信也書載予違汝弼汝無面從孤豈不樂忠信言以自裨補耶而云不敢極陳何得為忠讜哉若小人之忠有可納用者寧得以人廢言而不採擇乎假但謟媚取容雖闇亦有明識也至於廢調者徒以天下未定事以衆濟若徒守江表修崇寛政兵自足用何用多為顧坐自守可陋耳若不豫調恐臨時未可便用也又孤與君分義特異榮戚實同來表云不敢隨衆容身茍免此實甘心所望於君也於是令有司盡冩科條使郎中禇逄賫以就遜其諸葛瑾意所不安令損益之是儀字子羽漢末依劉繇避亂江東繇軍敗儀從會稽大帝承攝大業徴儀到見親任專典機宻拜騎都尉後破曹休入闕省尚書事外總平諸官兼領辭訟又令教諸公子書學朱桓為前將軍領青州牧因事託狂發詣建業治病大帝使子異攝領部曲令醫視護數月復遣還屯帝自出祖送謂曰今㓂虜尚存王塗未一孤當與君共定天下欲令君督五萬人專當一面以圖進取想君疾未復發也桓曰天授陛下聖姿當君臨四海猥重任臣以除姦逆臣疾當自愈吕範為征虜中郎將征江夏還平鄱陽孫䇿薨奔䘮於呉大帝復征江夏範與張昭留守又為禆將軍領彭澤太守先主詣京見帝範宻請留之後遷平南將軍屯柴桑帝討荆州過範舘謂曰昔早從卿言無此勞也今當上取之卿為我守建業宋髙祖初謝景仁為髙祖鎮軍司馬尋遷吏部尚書時從兄混為左僕射依制不得相臨髙祖啓晉帝依僕射王彪之尚書王邵前例不解軄劉粹為中軍諮議參軍盧循逼京邑京口任重髙祖使粹奉文帝鎮京城轉㳺擊將軍朱齡石為左將軍髙祖北伐配以兵力守衞殿省劉穆之甚加信仗内外諸事皆與謀焉王鎮惡平長安髙祖留第二子桂陽公義真為安西將軍雍秦二州刺史鎮惡以征虜將軍領安西司馬馮翊太守委以拒禦之任謝晦為侍中轉領軍將軍散騎常侍依晉中軍羊祜故事入直殿省總統宿衞髙祖不豫給班劍二十人與尚書令徐羡之中書令傳亮鎮北將軍檀道濟並侍醫藥髙祖晏駕領軍同被顧命輔政孟懐玉為江州刺史督江州豫州之西陽新蔡汝南潁川司州之松滋六郡諸軍事南中郎將刺史如故時荆州刺史司馬休之居上流有異志故髙祖授懐玉此任以防之沈林子為髙祖叅軍有功朝議欲授以一州八郡髙祖器其才智不使出也故出仕以來便管軍要自非戎車所指未嘗外典焉後文帝出鎮荆州議以林子及謝晦為左藩髙祖曰吾不可頃刻無二人林子行則晦不宜出乃以林子為中郎晦為中兵文帝時沈璞為揚州刺史始興王濬主簿時順陽范煜為長史行州事煜性頗踈帝詔璞謂曰王畿之政既不可不理濬以弱年臨州萬物皆屬耳目賞罰得失時宜詳慎范煜性疎必多不同卿腹心所寄當宻以在意彼雖行其實委卿璞以任遇既深乃夙夜匪懈其有所懐輒以宻啟每至施行必從中出煜正謂聖明留察故深加恭慎而莫見其際也謝𢎞微文帝即位為黄門侍郎與王華王曇首殷景仁劉湛等號曰五臣遷尚書吏部郎叅預機宻尋轉右衞將軍諸故吏臣並𢎞微選擬沈演之為右衞將軍范煜為左衞將軍二人對掌禁旅同叅機宻演之又為吏部尚書兼太子右衛率雖未為宰相任寄不異也素有心氣疾病歴年文帝使卧疾治事何尚之為尚書左僕射致仕於方山著退居賦以見志詔書敦勸文帝又與江夏王義恭詔曰今朝賢無多且羊孟尚不得告謝羊即羊𤣥保孟即孟顗尚之任遇有殊便未宜申許耶義恭荅曰尚書清志貞固歴事唯允雖年在懸車而體猶克壯未相申許下情所同尚之復攝職既還任事帝待之愈隆是時復遣軍北伐資給戎旅悉以委之王𢎞為侍中鎮江州時徐羡之等以廢殺之罪將見誅𢎞既非同謀弟曇首又為文帝所親委事將發宻使報𢎞羡之等誅徴𢎞為侍中司徒揚州刺史録尚書給班劔三十人帝西征謝晦𢎞與驃騎彭城王義康居守入住中書下省引隊仗出入司徒府權置叅軍殷景仁為侍中元嘉三年車駕征謝晦司徒王𢎞入居中書下省景仁張直共掌留任晦平代到彦之為中鎮軍侍中戴法興為文帝征虜記室史補典籖帝即位法興與典籖戴明寳蔡閏累遷南臺侍御史兼中書通事舎人法興等專管内務權重當時轉給事中太子旅賁中郎將孝武親覧朝政不任大臣而腹心耳目不得無所委寄法興頗知今古素見親待雖出侍東宫而意任隆宻魯郡巢尚之人士之秀元嘉中侍始興王濬讀書亦渉獵文史為帝所知孝建初補東海國侍郎仍兼中書凡選授遷轉誅賞處分帝皆與法興尚之叅畫徐爰為員外散騎侍郎文帝每出軍行師授兵畧王𤣥謨等北伐配爰五百人隨軍向碻磝銜中㫖臨時宣示沈慶之為太子歩兵校尉北伐屢有謀議文帝謂之曰河上處分皆合事宜惟恨不棄碻磝耳卿在左右乆偏解我意正復違詔濟事亦無嫌也孝武帝即位何偃遷侍中領驍騎將軍親遇隆宻有加舊臣劉延孫孝武即位侍中累遷尚書右僕射大明中為鎮軍將軍南徐州刺史先是髙祖遺詔京口要地去都邑宻邇自非宗室近戚不得居之延孫與帝室雖同是彭城人别屬吕縣劉氏居彭城縣者又分為三里帝室居綏輿里左將軍劉懐肅居安上里豫州刺史劉懐武居叢亭里三里及吕縣凡四劉雖同出楚元王繇來不序昭穆廷孫於帝本非同宗不應有此授時司空竟陵王誕為徐州孝武深相畏忌不欲居京口遷之於廣陵廣陵與京口對岸欲使腹心為徐州㨿京口以防誕故以南徐授延孫而與之合族使諸王序親劉道隆為龍驤將軍孝武分麾下以為三幢道隆與中兵叅軍王謙之馬文恭各領其一大明中歴黄門侍郎徐青冀三州刺史前廢帝景和中為右衛將軍委以腹心之任顔峻為吏部尚書南郡王義宣臧質等反以峻兼領軍義宣質諸子藏匿建康秣陵姑孰江寧縣界孝武大怒免丹陽尹褚湛之官收四縣官長以峻為丹陽尹加散騎常侍顔師伯為侍中親幸隆宻羣臣莫二遷吏部尚書右軍如故孝武不欲威柄在人親監庶務前後領選者唯奉行文書師伯專情獨斷奏無不可其後孝武遺詔江夏王義恭解尚書令加中書監柳元景領尚書令入住城内事無巨細悉闗二公大事與沈慶之叅斷若有軍旅征討悉委慶之總統尚書中書事委師伯外監所統委王𤣥謨王𤣥謨為金紫光禄大夫領太常及建明堂以本官領起部尚書又領北選與柳元景俱受孝武顧命以外監事委𤣥謨明帝時沈攸之監豫州之西陽司州之義陽二郡軍事鎮號進軍將軍泰豫元年與蔡興宗同預顧命進號安西將軍加散騎常侍給皷吹一部未拜㑹巴西民李承明反執太守張澹蜀土騷擾時荆州刺史建平王景素被徴新除荆州刺史蔡興宗未之鎮乃遣攸之權行荆州事攸之既至㑹承明已平仍以攸之都督荆湘雍益梁寧南北秦八州諸軍事鎮西將軍荆州刺史持節常侍如故王景文為鎮南將軍江州刺史徴為左僕射領吏部揚州刺史加太子詹事屢辭内授明帝手詔譬之曰尚書左僕射卿已經此任東宫詹事用人雖美職次正可比中書令耳庶姓作揚州徐干木王休元殷鐵並處之不辭卿清令才望何媿休元毗賛中興豈謝干木綢繆相與何後殷鐵耶司徒以宰相不應帶神州逺遵先㫖京口鄉基義重宻邇畿内又不得不用驃騎陜西任要繇來用宗室驃騎既去巴陵理應居之中流雖曰閒地控帶二江通接荆郢經途之要繇來有重鎮如此則揚州既闕刺史卿若有辭更不知誰應處之此選大備與公卿疇懐非聊爾也袁粲為尚書令與左僕射禇淵中領軍劉勔竝受明帝顧命加班劔二十人皷吹一部又云蒼桐立齊太祖與袁粲禇淵劉秉共掌機事更日入直决事號為四貴秦時有穰侯華陽高陵涇陽君稱為四貴至是乃復有焉南齊張岱仕宋孝武時為驃騎長史領廣陵太守新安王子鸞以盛寵為南徐州割呉郡屬焉髙選佐史帝召岱謂之曰卿美効夙著兼資宦已多今欲用卿為子鸞佐總刺史之任無謂小屈終當大伸也劉懐珍仕宋明帝時為巴陵王景素征西右司馬寧朔將軍帝手詔懐珍曰卿性忠讜吾所委頼在彼與年少共事不可深存受益景素兒乃佳但不能接物頗亦墮事卿每諌之懐珍奉㫖帝寢疾又詔懐珍曰卿不應乃作景素佐才舊所寄今徴卿參二衛直後為太祖太宰參軍時魏圍泗口懐珍將兵數千破之拜建武將軍樂陵河間二郡太守賜爵廣晉縣侯明年懐珍啟求還孝武答曰邉維湏才未宜陳請李安民仕宋明帝時為寕朔將軍山陽太守三巴擾亂太守張澹棄涪城走以安民假節度都督討蜀軍事輔師將軍五獠亂漢中勅安民回軍至魏興事寕還至夏口後廢帝元徽初除督司州軍事司州刺史領義陽太守假節將軍如故别勅安民曰九江防邉備禦宜重今有此授以増鄢郢之勢無所致辭也太祖時蘇偘為太祖冠軍録事參軍是時張永沈攸之敗後新失淮北始宋朝遣太祖北伐不滿千人每嵗秋冬間邉淮騷動嘗恐冦至太祖廣遣偵候安集荒餘又營繕城府在兵中乆見疑於時太祖乃作塞客吟以喻志偘逹帝此㫖更自勤勵委以府事深見知待又沈昭略有剛氣昇明末為相國西曹太祖賞之及即位謂王儉曰南士中有沈昭略何職處之儉曰臣已有擬奏轉前軍將軍帝不欲違可其奏尋遷為中書郎為桂武將軍桂陽王作難詔復以偘為平南録事領軍主從頓新亭使分金錢賜諸將事寕除歩兵校尉又為黄門郎領射聲校尉任以心膂垣崇祖為豫州刺史進號平西將軍太祖遣使入闗參魏消息還勅崇祖曰卿視吾是守江東而已耶所少者食卿但努力營田自然平殄殘醜勅崇祖修治其陂田江謐為左民尚書諸皇子出閣用文武主帥皆以委謐太祖尋勅選曰江謐寒士誠當不得競等華儕然甚有才幹堪為委用可遷掌吏部謐才長刀筆所在事辦劉懐慰初與帝善齊國建帝欲置齊郡於京邑議者以江右土沃流民所歸乃治𤓰歩以懐慰為輔國將軍齊郡太守帝謂懐慰曰齊邦是王業所基吾方以為顯任經理之事一以委卿又手勅曰有文事者必有武備今賜卿玉環刀一口劉善明為右衛將軍太祖踐祚以善明勲臣欲與善明禄詔謂之曰淮南近畿國之形勝自非親賢不使居之卿為我卧治也代明帝為征虜將軍淮南宣城二郡太守遣使拜授封新塗伯邑五百戸桓康為㳺擊將軍太祖謂康曰卿隨我日乆未得方伯亦當未解我意正欲與卿先共滅虜耳魏軍既動遣康行假節濮陽太守驍騎將軍陳顯逹為護軍將軍建元二年元魏冦夀陽淮南江北百姓騷動帝以顯逹為吏部侍郎持節散騎常侍都督南兖徐青冀兖五州諸軍事平北將軍南兖州刺史之鎮冦退帝勅顯逹曰冦經破散後當無復犯闕理但國家邉防自應過存備豫宋元嘉二十七年後江夏王作南兖徙鎮盱眙沈司空亦以孝武初鎮彼正當以淮上要於廣陵耳卿謂前代此處分云何今僉議皆云卿應據彼地吾未能決乃當以擾動文武為勞若是公計不得憚之柳世隆建元三年出為使持節督南兖兖徐青冀五州軍事安北將軍南兖州刺史江北畏北冦騷動不安太祖勅世隆曰比有北信賊猶治兵在彭城年已垂盡或當未必送死然豺狼不可以理推或為備不可懈彼郭既無闗要用宜開除使去金城三十丈政佳耳發民治之無嫌若作三千人食者已有幾米可指牒付信還人間若有丁多而細口少者悉令戍之非疑也又勅曰昨夜得北使啟鍾離聞賊已渡淮既審送死便當制加勦撲卿好參候之有急令諸小戍還鎮不可賊至不覺也賊既過淮不容邇退散要應處送死者定攻夀陽吾當遣援軍也又遣軍助世隆竝給軍糧冦退帝欲上斷江北又勅世隆曰吕安國近在西土斷郢司二境上雜民殆無驚恐近又令垣豫州斷其州内商得崇祖啟事已行竟近無云殊稱前代舊意卿視兖部中可行此事不若無所擾春便就手也其見親委如此荀伯玉為輔國將軍武帝初在東宫用事不法任左右張景真多僣侈伯玉宻啟太祖收景真殺之太祖嘉伯玉盡心愈見親信軍國宻事多委使之時人為之語曰十勅五令不如荀伯玉命太祖末年指伯玉謂武帝曰此人事我忠我身後人必為其作口過汝勿信也可令徃東宫長侍武帝時曹虎為廣陵太守帝勅虎曰廣陵湏心腹非吾意可委者不可得處此任隨郡王子隆代巴東王子響為荆州備軍容西上以虎為輔國將軍鎮西司馬南平内史王儉為左僕射領選太子少傅衛將軍丹陽尹武帝深委仗之士流選用奏無不可五年即本號開府儀同三司固讓六年重申前命先是詔儉三日一還朝尚書令史出外諮事帝以徃來煩數復詔儉尚書下省十日出外蕭諶為歩兵校尉武帝齋内兵仗悉付之心膂宻事皆使參掌除正員外郎轉左中郎將後軍將軍太守如故武帝卧疾延昌殿勅諶左右宿直欝林即位深委信諶每請急湏出帝通夕不寐諶還乃安張欣泰累除尚書都官郎武帝與欣泰早經欵遇及即位以為直閣將軍領禁旅蔡約為宜都王冠軍長史淮南太守行府州事武帝謂約曰今用卿為近藩上佐想副我所期約曰南豫宻邇京師不治自理臣亦何人爝火不息樂藹為荆州刺史豫章王嶷主簿後為大司馬中兵叅軍轉署記室永明八年荆州刺史巴東王子響稱兵反既罷焚燒府舎官曹文書一時蕩盡武帝引見藹問以西事藹上對詳敏帝悦焉用為荆州治中勅付以修復府州事藹還州繕修廨署數百區減軍而役不及民荆郢以為自晉王悦移鎮以來府舎未之有也崔文仲為徐州刺史時淮北義民桓磊磈於􅀈犢固與魏戰大破之文仲馳啟帝勅曰此間起義者衆深恐良㑹不再至卿善奬沛中人若能一時攘袂當遣一佳將直入也明帝永泰元年遣詔曰徐孝嗣可重申入命中書監本官悉如故沈文季可左僕射常侍護軍如故江祐可右僕射江祀可侍中劉暄可衛尉卿軍政大事委陳太尉内外衆事無大小委徐孝嗣遥光坦之江祐其大事與沈文季江祀劉暄叅懐心膂之任可委劉悛蕭惠休崔惠景沈文季為護軍將軍王敬則反詔文季領兵屯湖頭備京路隆昌元年復為領軍侍中如故後預廢欝林明帝欲以文季為江州遣左右單景雋宣旨文季口自陳讓稱年老不願外出因問右執法有人未景雋還具言之延興元年遷尚書右僕射後同受顧命因褚淵字彦回明帝時轉吏部尚書建安王休仁南討義嘉賊屯鵲尾遣淵詣軍選將帥以下勲階得自專决朝廷機事多與諮謀每見從納禮遇甚重淵後為吳郡太守明帝寢疾危殆馳使召之欲託後事及至召入帝坐帳中流涕曰吾疾篤故日召卿欲使著黄羅􅘼耳指牀頭大函曰文書皆函内冀此函得不復開淵亦悲不自勝黄羅􅘼乳毋服也帝雖小間猶懐身後慮建安王休仁人才美貌物情宗向帝與淵謀誅之淵以為不可帝怒曰卿癡不足與議事彦回懼而奉旨復為吏部尚書梁髙祖時常叡初歸髙祖大軍發郢謀留守將帝難其人乆之顧叡曰棄騏驥而不乗焉遑遑而更索即日以為冠軍將軍江夏太守行郢府事柳慶逺為侍中髙祖初平建業城内常夜火禁中驚懼髙祖時居宫中悉歛諸鑰問桺侍中何在慶逺至悉付之其見任如此周拾為尚書令吏部郎太子右衛將軍雖居職屢徙而常直内罕得休暇國史詔誥儀禮法律軍旅謀謨皆兼掌之日夜侍上預機宻二十年未嘗離左右臧厥為散騎常侍中書通事舎人兼司農卿卒官厥前後居職所掌之局大事及蘭臺廷尉所不能决者勅竝付决厥辯斷精詳咸得其理厥卒後有撾登聞皷訴者求付清直舎人髙祖曰臧厥既亡此事便無可付其見知如此蕭介為武陵王府長史髙祖謂何敬容曰蕭介甚貧可處以一郡敬容未對髙祖曰始興郡頻無良守嶺民頗不安可以介為之繇是出為始興太守介至任宣布威徳境内肅清羊侃大通三年自魏歸梁隨太尉元法僧北討髙祖乃召侃問方略侃具陳進取之計侃曰臣㧞跡還朝常思効命然寔未曽願與法僧同行北人雖謂臣為呉南人已呼臣為虜今法僧同行還是羣類相逐非止有乖素心正欲使匈奴輕漢髙祖曰朝廷今日湏要卿行乃詔以為大軍司髙祖謂偘曰軍司廢來已乆故為卿置之賀琛每進見髙祖與語常移晷刻故省中語曰上殿不下有賀琛容止閒雅故時人呼之散騎常侍叅禮儀如故郭祖深普通中為南津校尉加雲騎將軍秩二千石使募部曲三千及南州公嚴清刻繇來王侯勢家出入南津不忌憲綱挾藏亡命祖深捜撿奸惡不避强禦動致刑辟奏江州刺史邵陵王太子詹事周拾贓罪逺近側足莫敢縱恣淮南太守畏之如上府孔休源為金紫光禄大夫監揚州每車駕廵幸常以軍國事委之昭明太子薨有勅夜召休源入宴居殿與羣公叅定謀議立晉安王綱為皇太子元帝時徐文盛為仁威將軍秦州刺史授以東討之略於是文盛督衆軍東下至武昌遇侯景將士任約遂與相持乆之帝又命護軍將軍尹悦平東將軍杜幼安巴州刺史王珣等㑹之竝受文盛節度擊任約於貝磯約大敗退保西陽劉璠為徐州刺史蕭循記室叅軍後為華陽太守屬侯景度江梁室大亂循以璠有才略甚親委之時冦難繁興未有所定璠乃喟然賦詩以見志其末章曰隨㑹平王室夷吾成覇功虚薄無所用徒然慕昔風循開府置佐史以璠為諮議叅軍仍領記室元帝承制授冠軍將軍鎮西府諮議叅軍賜書曰鄧禹文學尚或執戈葛洪書生且云破賊前修無逺屬望良深顔晃初為邵陵王記室侯景之亂西奔荆州承聖初除中書侍郎杜龕為呉興太守專好勇力其所部多輕險少年元帝患之乃使晃管其書翰仍勅龕曰卿年時尚少習讀未曉顔晃文學之士使相毗佐造次之間必宜咨禀及龕誅晃歸帝以書記親遇甚篤陳髙祖時章昭逹為定州刺史是時留異擁兵據東陽私署守宰髙祖患之乃使昭逹為長山縣令居其心腹沈禮明為通直散騎常侍初髙祖常稱禮明宜居王佐軍國大政多預謀謨周寳安為呉興太守父文育為熊曇朗所害徴寳安還起為猛烈將軍領其舊兵仍令南討文帝即位深噐重之寄以心膂精卒利兵多配焉文帝時華皎為左軍將軍時王琳東下皎隨侯瑱拒之琳平鎮湓城知江州事時南州守宰多鄉里酋豪不遵朝憲帝令皎以法馭之王琳奔散將卒多附於皎韓子髙天嘉元年為右軍王琳至于柵口子髙宿臺内及琳平子髙所統益多將士依之者子髙盡力論進文帝皆任焉趙知禮為定州刺史知禮沉靜有謀謨每軍國大事文帝輒令壐書問之陸繕為左僕射領揚州大中正别賜勅令與徐陵等七人叅議政事孔奐為御史中丞深逹治體每所敷奏帝未嘗不稱善百司滯事皆付奐决之天嘉四年重除御史中丞尋為五兵尚書常侍中正如故時文帝不豫臺閣衆事竝令僕射到仲舉共奐决之呉明徹選鎮東將軍呉興太守及辭之郡文帝謂明徹曰呉興郡惟以帝鄉之重故以相授君其勉之到仲舉為左僕射時文帝積年寢疾不親御萬機尚書中事皆仲舉斷决陸瓊為殿中郎素有令名深為帝所賞及討周廸陳寳應等都官符及諸大手筆竝中勅付瓊至徳元年除度支尚書叅選事掌詔誥竝判廷尉建康二獄事遷吏部尚書著作如故瓊詳練譜牒有雅鍳先是吏部尚書宗元饒卒右僕射袁憲舉瓊宣帝未之用也至是居之號為稱職後主甚委任焉宣帝時孫陽為通直散騎常侍帝即以陽功名素著深委任焉袁憲為右僕射宣帝不豫憲與吏部尚書毛喜俱受顧命始興王叔陵之肆逆也憲指麾部分預有力焉後主被瘡病篤謂憲曰我兒尚㓜後事委卿憲曰羣情喁喁冀聖躬康復後事之旨未敢奉詔以功封建安縣伯邑四百户領太子中庶子餘竝如故後主時蔡徴為中書舎人掌詔誥尋授左民尚書與僕射江總知撰五禮事尋加寧逺將軍帝噐其才幹任寄日重遷吏部尚書安右將軍每十日一往東宫於太子前論述古今得䘮及當時政務又勅以廷尉寺獄事無大小取徴議决俄有勅遣徴收募兵士自為部曲徴善撫䘏得物情旬月之間衆近一萬北齊髙祖時髙乾初解官歸鄉里後聞爾朱榮死乾馳赴雒陽莊帝見之大喜時爾朱黨擁兵在外莊帝以乾為金紫光禄大夫河北大使令招集鄉閭為表裏形援乾垂涕奉詔弟昻拔劔起舞請以死自効封隆之魏中興初拜左光禄大夫吏部尚書爾朱榮等軍於廣阿髙祖與戰大破之乃遣隆之持節為北道大使髙祖將擊爾朱榮等於韓陵留隆之鎮鄴城爾朱兆等走以隆之行冀州事仍領降俘三萬餘人分置諸州杜弼初坐事左遷灌下鎮司馬魏元象初髙祖徴弼為大丞相府法曹行叅軍署記室事轉大行臺郎中尋加鎮南將軍髙祖又引弼典掌機宻甚見信待或有造次不及書教直付空紙即㑹宣讀趙起性沉謹有幹髙祖建義旗以段榮為定州刺史起為典籖除奉車都尉天平中徴為相府騎曹累加中散大夫以文襄嗣事出為建州刺史累遷侍中起於髙祖世頻為相府騎兵二局典知兵馬十有餘年至顯祖即祚之後起罷州還闕雖歴位九卿侍中嘗以本官監兵馬出内驅使居心腹之寄崔暹以趙郡公琛鎮定州辟為開府諮議隨琛徃晉陽髙祖與語悅之兼丞相長史髙祖舉兵將入雒留暹佐琛知後事謂之曰丈夫相知豈在新舊軍戎之事留守任之家弟年少未嫻事宜凡百後事一以相屬握手殷勤至於三四慕容紹宗為髙祖所恩禮初遷都鄴庶事未周乃令紹宗與髙隆之共知府軍圖籍諸事朱愍初擁衆數千人赴髙祖除湘州刺史令愍率本衆西還舊鎮髙祖親送愍愍至鄉據馬鞍山依險為壘徴糧集兵以為聲勢爾朱兆出井陘髙祖破兆於廣阿愍統其本衆屯故城以備爾朱兆相州既平命愍還鄴除西南道行臺都官尚書留守故城爾朱兆等將至髙祖徴愍叅守鄴城盧勇初起晉陽髙祖署為丞相主簿属山西霜儉運山東租輸皆令載實違者治罪令勇典其事鄉郡公主虛僦千餘車勇䋲劾之公主訴於髙祖而勇守法不屈髙祖謂郭秀曰盧勇懔懔有不可犯之色真公人也方當委之大事豈直納租而已後為揚州刺史鎮宜陽叛民韓木蘭陳忻等常為邉患勇啟求入朝髙祖賜勇書曰吾委卿揚州唯安枕髙卧無西南之慮矣但依朝廷所委表啟宜停卿之妻子任在州任當使漢兒之中無在卿前者陳元康為開府司馬加輔國將軍所歴皆為稱職髙祖聞而徴焉稍被任使以為相府功曹叅軍掌内機宻髙祖經綸大業軍務煩廣元康承受意旨甚濟急速性又柔謹通解世事文襄入輔京室崔暹崔季舒崔昻等竝被任使張亮張徽纂竝髙祖所特遇然委任皆出元康之下時人語曰三崔二張不如一康季稚亷髙祖幸代州為開府長史平北將軍稚亷緝諧將士軍民樂悦髙祖幸河東大相嗟賞轉為文襄驃騎府長史諮以濟州控帶川陸接對梁使尤須得人文襄薦之除濟州儀同長史張纂為髙祖行臺右丞事髙祖二十餘嵗傳通教令甚見親賞張亮為髙祖丞相府叅軍事漸見親待委以書記之任天平中為文襄行臺郎中典七兵事雖為臺郎而常在髙祖左右遷行臺右丞後為尚書右僕射亮性質直勤力强濟深為髙祖文襄所信委以腹心之任皮景和少通敏善騎射初以親信事髙祖後除庫直正都督段韶髙祖既征玉壁㑹不豫攻城未下召集諸將共論進止之宜謂大司馬斛律金司徒韓軌左衛將軍劉豐等曰吾每與段孝先段韶字也論兵殊有英略若使比來用其謀亦可無今日之勞矣吾患勢危篤恐或不虞欲委孝先以鄴下之事何如金等咸曰知臣莫若君實無出孝先者仍謂韶曰吾昔與卿父冐渉險艱同奬王室建此大功今疾病如此殆將不濟宜善相翼佐克兹負荷即令韶從文宣鎮鄴召文襄赴軍髙祖疾甚顧命文襄曰段孝先忠亮仁厚智勇兼備親戚之中唯有此子軍旅大事宜共籌之明年侯景構亂文襄還鄴韶留守晉陽文襄還賜女樂十數人金十觔繒帛稱是封長樂郡公文襄帝時崔讓字伯謙為瀛州别駕帝以為京畿司馬帝將之晉陽謂讓曰卿騁足瀛部已著康歌督府務殷是用相授别駕臨别又馬上執手曰執子之手與子偕老卿宜深體此情唐邕為尚書令封晉昌王録尚書事既在被遇意氣漸髙其未經府寺陳訴起覽詞牒條數甚多俱為憲臺及左丞彈糾竝御注放免李繪字敬文為髙陽内史時文襄嗣業晉代山東諸郡其特降書徴者唯繪與清河太守辛術二人而已至補大將軍從事中郎遷司馬文襄以前司徒侯景進賢冠賜繪曰卿但真心事孤當用卿為三公莫學侯景叛也及文宣嗣事仍為丞相尉瑾為中書舎人文襄入朝因命瑾在鄴北宫共髙徳政典機宻孝昭輔政累遷吏部尚書武成踐祚趙彦深本子如賔僚元文遥和士開竝帝鄉故舊共相薦逹任遇彌重吏部銓衡所歸事多秘宻繇是朝之機事頗亦預聞尋兼右僕射攝選盧潜文襄時引為大將軍西閣祭酒轉中外府中叅軍機事强濟為文襄所知言其終可大用王思政見獲於潁川文襄重其才識潜曽從容白文襄云思政不能死節何足可重文襄謂左右曰我有盧潜便是更得一王思政封子繪為大行臺吏部郎中後文襄以子繪為渤海大守令馳驛赴任文襄親執其手曰誠知此郡未允勲望但時事未安湏卿鎮撫且衣錦晝游古人所貴善加經略綏靜海陽不勞學習常太守向州叅也仍聽收集部曲一千人未幾進秩一等加驃騎將軍後為都官尚書時髙歸彦叛逆召子繪入見昭陽殿帝親詔子繪曰冀州宻邇京甸歸彦敢肆㐫悖已勅大司馬平原王段孝先總勒重兵乘機電發司空東安王婁叡督率諸軍絡繹繼進卿世載名徳恩覃彼州故遣叅賛軍事隨便尉撫宜善加謀謨以稱所寄即以其日馳傳赴軍子繪祖父世為本州百姓素所歸附既至廵城諭以禍福民吏降欵日夜相繼賊中動靜小大必知賊平仍勅子繪權行州事文宣帝時魏收為散騎常侍文宣如晉陽令與黄門郎崔季舒髙徳政吏部郎中尉瑾於北第掌機宻崔昻文宣帝時累遷僕射昻有風調才識舊立堅正剛直之名然好探揣上意感激時主或列隂私罪失深為顯祖所知賞發言奬䕶人莫之能毁儀曹律令京畿宻獄及朝中之大事多委之崔劼為給事黄門侍郎直入内省典機宻清儉勤慎甚為文宣所知趙彦深封安國縣伯文宣嗣位仍典機宻進爵為侯天保中累遷秘書監以為忠謹每郊廟必兼太僕執御陪乘轉大司農帝或廵幸即補賛太子知後事辛術為東南道行臺中書鎮下邳東徐州刺史郭志殺郡守文宣聞之勅術自令所統十餘州地諸有犯法者刺史先啓聴報以下先斷後表聞齊代行臺兼總人事自術始也孝昭帝為常山王時王晞為王友及即位詔晞與尚書楊休之鴻臚卿崔劼等三人每日本職務罷竝入東廊共舉録歴代廢禮墜樂職司廢置朝饗異同輿服増損或道徳髙雋乆在沉淪或竊言眩俗妖邪害政爰及田市舟車徴稅通塞婚贄儀軌貴賤齊衰有不便於時而古今行用不已者或自古利用而當今毁棄者悉令詳思以漸條奏未得湏備遇憶續聞朝脯給典御食畢景聼還武成帝時王峻徴拜祠部尚書詔詣晉陽檢校兵馬俄而還鄴轉太僕卿及車駕廵幸常與吏部尚書尉瑾輔皇太子諸親王同知後事仍賜食梁郡轉遷侍中除都官尚書及周師㓂邉詔峻以本官與東安王婁叡武興王晉等自鄴率衆赴河陽禦之車駕幸雒陽以懸瓠為周人所據復詔峻為南道行臺與婁叡率軍南討未至周師棄城走乃使尉輯承郢二州册府元龜卷二百
