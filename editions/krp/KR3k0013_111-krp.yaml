body:
  text: 册府元龜卷一百十一宋王欽若等撰帝王部宴享第三唐憲宗元和二年正月丁巳詔停中和重陽二節賜宴其上巳日仍舊二月丁丑以寒食節御麟徳殿宴宰臣杜祐武元衡鄭絪李吉甫及僕射大夫度支鹽鐵使京兆尹洎軍使駙馬諸親王㑹焉帝與之撃毬于庭賜宰臣以下錦綵銀器有差三月上已節賜宰臣百僚合宴于曲江亭七月丁丑御晨耀樓神策神威六軍内外教坊大合樂以樂之三年四月甲寅御芳林門張樂設百戲五年三月上已節賜宰臣讌于杜佑莊命中使以酒饌就賜之七年正月癸酉帝御麟徳殿對南詔渤海䍧牱等使宴賜有差乙酉御麟徳殿宴涇原節度使朱忠亮丁亥御麟徳殿對南詔使李興禮等宴賜有差三月辛酉罷曲江上已宴將葬恵昭太子也九月甲子重陽節賜百僚宴于曲江八年五月戊午回鶻請和親使伊難珠還蕃宴于三殿賜以銀器繒帛九月戊午重陽節賜宰臣以下宴于曲江十二月丙午宴南詔渤海䍧牱使賜以錦綵九年二月己丑麟徳殿召見渤海使髙禮進等三十七人賜宴有差九月壬午重陽節賜百官宴于曲江十年正月丁酉召見新羅及南詔蠻使宴賜有差十一年七月丙寅權停重陽日曲江賜宴十二年八月癸未勅今年重陽日公卿宴宜權停十三年二月辛酉帝御麟徳殿對回鶻及南詔使賜宴有差乙丑命中官以酒膳宴陳許節度使李光顔于其第賜芻米凡二十五車乙亥御麟徳殿宴宰臣及太子三少六尚書左右丞侍郎御史中丞中書門下省五品已上官翰林學士京兆尹度支鹽鐵使左右金吾將軍威逺皇城六軍及諸衛大將軍駙馬都尉諸道朝覲節度使公主郡主等觀擊鞠角觝之戲大合樂極歡而罷以錦綵銀器頒賜有差丙子又召宰相師保中丞京尹度支鹽鐵使並入内觀諸親及軍使會鞠九月癸巳御麟徳殿對吐蕃使論句藏戊戌命宰臣宴吐蕃使人於中書省十四年正月癸未帝御麟徳殿對歸國回鶻使宴賜有差三月乙酉以齊魯初平宴文武百寮于麟徳殿宰臣裴度等舉觴獻夀跪而言曰陛下徳配天地明並日月神武獨斷冦逆削平賜宴羣臣當茲令節臣等備位台司幸逢昌運願與四海九州之人同上千萬歳夀帝執酒為飲之因撃鞠為戲羣臣縱觀既罷賜繒綵有差丙戌又宴宰輔及大臣翰林學士于禁中七月甲申御麟徳殿宴宣武軍節度韓𢎞及判官大將軍等共三百人賜物有差八月丁夘帝御麟徳殿宴魏博節度使田𢎞正并判官大將等二百人賜物有差九月戊戌帝御會慶亭宴田𢎞正及宰相師保尚書侍郎左右丞太常卿諫議御史中丞給事舍人翰林學士等賜物有差己亥御麟徳殿宴親王及髙品供奉官穆宗以元和十五年正月即位二月庚寅對新羅渤海朝貢使于麟徳殿宴賜有差六月癸巳皇太后歸興慶宫帝率六宫侍行遂合樂大宴迴幸右神策軍賜中尉及左右樂人等金銀錦綵有差七月甲寅新作永安殿大張樂觀百戲恣歡而罷班賜有差乙丑對吐蕃弔祭使于麟徳殿宴賜有差九月戊申重陽節御宣和殿召郭釗兄弟及貴戚駙馬軍使左右中尉等赴宴賜金銀錦綵有差辛酉帝御麟徳殿宴李光顔李愬各賜錦綵五百疋銀瓶盤筭五事衣一襲馬一匹賔佐將校頒賜有差戊辰對吐蕃使於麟徳殿宴賜有差十月吐蕃入冦詔發京西行營諸軍赴援甲申對軍使索日進程懐政董重質田頴劉師貞并大將合六十七人宴賜有差長慶元年二月辛卯寒食節帝御麟徳殿賜百寮宴帝自擊鞠命禁軍設百戲賜物有差壬辰又宴宰臣師保僕射尚書翰林學士將軍軍使賜物有差癸巳又宴將軍軍使及内官四月庚辰命宰臣於侍中㕔宴吐蕃使二年正月壬子對渤海使者於麟徳殿宴賜有差八月壬午對吐蕃使者五十人於麟徳殿宴賜有差九月戊子朔宴吐蕃使論悉諾等十五人於中書省壬辰勅蕃客等皆逺申朝聘節遇重陽宜共賜錢二百貫以充宴賞仍給太常音樂是月丙申重陽節賜宰臣及百寮宴于曲江亭十月壬子對回紇使者於麟徳殿宴賜有差三年三月上已節賜百僚曲江宴九月重陽節賜百僚宴於曲江時韋綬為太子侍讀綬之在書府遇重陽日百官有曲江之宴特請與集賢學士等別為一會從之敬宗以長慶四年正月即位二月壬午平盧軍節度使薛平遣使押領備宿衛渤海大聰叡等五十人至樂驛命中官持酒脯迎宴焉寳厯元年三月壬子帝御三殿宴百僚癸丑又宴宰臣翰林學士給事中中書舍人御史中丞諸曹尚書侍郎京兆尹等頒賜銀器錦綵有差五月庚戌幸魚藻宫觀競渡公主駙馬翰林學士諸軍使與讌樂二年二月丁巳寒食節三殿宴百官又自戊午至庚申讌宰臣師保尚書侍郎御史中丞兩省五品以上官駙馬公主等前後頒賜有差甲子詔今年三月上巳日文武百僚宜准舊例於曲江宴集三月甲戌宰相百僚翰林學士曲江宴命中使劉恵通等頒賜食物九月自甲戌至丙子帝連宴宣和殿百戲皆從文宗太和元年五月戊辰對諸道端午使於麟徳殿宴賜有差四年七月庚辰行幸棃園會昌殿大宴樂五年正月乙巳是日晩行幸棃園㑹昌殿奏樂六年二月己丑寒食節宴羣臣於麟徳殿七年三月庚戌麟徳殿對歸國回鶻李義節等十九人宴賜有差八年三月甲寅上已節賜羣臣宴于曲江亭九年八月丁丑幸左軍龍首殿因幸棃園含元殿大合樂開成元年十二月帝於禁中會讌諸王因命講讀劉仲武每䨇月入内對諸王仍令尚書供食二年正月癸巳帝御麟徳殿對賀正南詔洪龍君三十人渤海王子大明俊等一十人賜宴有差二月京兆尹歸融因對奏上巳日曲江㑹宴縁初遇兩公主出降物力不辦請改日帝曰去年重陽改就九月十九日未失重九之意今上巳日改取十三日可乎融受命而退五月壬申幸十六宅與諸王宴樂三年四月甲午帝幸十六宅賜諸王宴頒賜有差十月甲午命中人以酒脯仙韶院樂賜羣臣宴曲江亭四年正月丁卯夜於咸泰殿觀燈作樂三宫太后及諸公主並赴宴三月乙酉上已節賜百寮宴於曲江亭命内官以詩宣賜裴度六月庚申幸十六宅安王潁王院宴樂賜錢各五十貫絹二千疋銀器二十事二王帝弟也故賜宴特異宣宗大中七年四月日本國遣王子來朝獻寳器音樂帝謂宰執曰近者黄河清今又日本國來朝朕愧徳薄何以堪之因賜百寮宴陳百戲以禮之九年七月宰相崔鉉出鎮淮南帝宴餞賦詩以賜之昭宗乾寧元年正月乙丑鳳翔節度使李茂貞來朝大陳兵衛獻妓女三十人帝開宴大殿天復三年正月辛未宴汴州朱全忠于内殿内弟子奏樂至二月己丑又宴全忠於夀春殿乙未又宴于保寜殿會鞠全忠得頭籌令内弟子送酒戊戌全忠辭歸鎮宴於内殿天祐元年五月幸雒陽乙丑宴百僚于崇勲殿己巳朱全忠辭歸鎮又宴於崇勲殿七月宴於文思殿鞠塲哀帝天祐二年三月詔曰朕以宰臣已下嘗拘官局罕獲歡娛今膏澤不愆豐年有望將臻上瑞宜示優恩及此芳辰當茲麗景稍令暇逸俾務遊從宜令自今月十二日至十六日各令逐便選勝遊宴五月戊寅宴羣臣於崇勲殿朱全忠與王鎔羅紹威買宴也後唐莊宗以天祐八年秋七月㑹王鎔於承天軍鎔武皇之友也帝奉之盡敬捧巵酒為夀鎔亦奉酒醻帝同光元年六月帝幸保寧鞠場宴洎行營將士賜物有差八月癸卯以内園新殿成名曰長春殿宴大臣賜分物有差十月辛巳萬夀節宴長春殿賜百官分物己亥宴于崇元殿十二月丁亥宴羣臣於嘉慶殿二年四月庚辰宴武臣于嘉慶殿六月甲申幸保寧鞠塲宴洎行營將士八月壬申幸皇子繼岌院奏教坊樂縱酒而罷九月癸卯宴大臣於長春殿丁未又宴羣臣于嘉慶殿辛亥宴吳使盧蘋於嘉慶殿大臣畢預甲寅帝幸樞密使郭崇韜之私第宣教坊樂置酒㑹從臣至初夜一更還宫十月丙寅朔宴大臣於嘉慶殿丁亥宴羣臣於長春殿壬辰嘉慶殿宴近臣十一月丙寅朔宴大臣於嘉慶殿戊子宴羣臣於嘉慶殿壬辰宴近臣於嘉慶殿甲午命皇子興慶宫使繼岌於會節園宴蜀使許確吳越國使錢珣各賜分物己亥帝幸六宅教坊樂宴會諸皇弟戊午幸明宗之第又至宋州節度使元行欽之第縱酒作樂一鼓三籌歸宫三年正月甲午皇太后生辰御嘉慶殿召諸王家宴極歡而罷丙午宴大臣於中興殿是月帝幸鄴都戊申宴從官於黎陽行宫二月帝在鄴己巳擊毬於行宫之鞠塲諸皇弟從臣等供奉賜定州王都金鞍御馬鞠罷宴王都於武徳殿之山亭宣教坊樂陳百戲俳優角觝夜漏一鼔方罷甲戌文思殿宴王都頒賜有異夜久方罷戊子宴於思政殿三月帝在鄴戊戌宴于内殿丙午帝撃毬於行宫之鞠塲皇弟存覇皇子繼岌河中偏將王景髙行安等預焉毬罷宴於迎春殿四月丁丑宴淮南使魯思郾於嘉慶殿九月丙午帝於嘉慶殿宴西征都統魏王繼岌招討使郭崇韜客省使李儼諸偏禆將校閏十二月己丑朔新授西川節度使孟知祥自太原至正衙見畢帝以知祥外戚之重預戒所司出内府供帳珎玩竒絶者別飭宫居以宴之庚午宴諸王武臣於長春殿始聽樂先是七月有恭簡皇太后之䘮至是始聽樂四年二月戊子朔宴武臣於嘉慶殿明宗天成元年五月甲戌宴文武百寮於長春殿八月乙未始奏樂宴軍將校於長春殿乙巳宴將校於長春殿十一月庚寅宴契丹降將盧文進及其將佐於長春殿賜分物有差二年二月癸未宴武臣於長春殿三月壬子朔幸㑹節園宰相樞宻使及節度使在京者共進錢絹請宴四月戊子幸會節園召宰臣學士在京勲臣赴宴五月乙丑宴淮南使車雷峴等於長春殿七月戊辰宴在京藩侯郡守統軍諸將校於長春殿八月癸巳秦王從榮自鄴中至洎於至徳宫帝幸其第宣禁中女伎及教坊樂歡宴至晩從榮進馬及銀器錢絹帝賜諸伎樂及行從人等乘輿歸内戊成宴宰相學士及勲臣於長春殿九月己未宴在京藩侯郡守於長春殿各有頒賜甲子宴羣臣於長春殿賜物有差乙丑宴樞宻使及在京節度使内諸司使等於長春殿十月乙未帝在汴宴宰臣學士諸將校等於玉華殿丁酉宴羣臣於玊華殿乙巳宴於𤣥徳殿十一月乙夘徐州霍彦威青州符習入覲召昇殿命樂舉酒語及佐命決策之事歡話移時己巳宴宰臣學士在京侯伯親衛將校於玉華殿勞霍彦威符習房知温三帥壬申宴𤣥徳殿彦威等辭也十二月乙丑宴於𤣥徳殿兖州節度使趙在禮入覲使召赴宴戊戌以夏魯竒趙在禮入覲宴於𤣥徳殿三年二月辛巳宴從臣於玉華殿戊戌開社宴于玉華殿三月戊申宴百寮於玉華殿丁卯宴從臣于南莊五月辛酉南莊宴諸蕃客入幸西莊宴回鶻使召前節度使赴之八月戊戌侍臣宴於玉華殿九月乙丑帝在汴宴百辟於玉華殿十月戊午契丹署平州刺史張希崇將麾下八十餘人歸闕見於𤣥徳殿便召赴宴十一月壬午宴宰臣學士及東都留守孔循於麟趾殿十二月甲寅幸開封府六宫從行宴樂頒賜四年二月乙巳北面馳報王都平收復定州帝大恱舉酒徧賜侍臣喜除腹心之疾賜教坊絹五百疋内臣進馬稱賀戊申宴羣臣於玉華殿樂作王晏球馳報已獲王都首級生擒契丹秃餒等二十餘人百官就班稱賀甲子帝歸京丙寅駐蹕鄭州宴從臣於行宫三月丙子内外輔臣在京藩侯共進鞍馬錢帛以車駕還京請開内宴時潞王自河中入覲進金銀錢絹開内宴壬午宴於長春殿乙酉宴宰相在京節度使於中興殿辛卯宴百辟於長春殿丙申幸會節園召從臣赴宴四月丙午宴于中興殿八月戊戌宴勲臣於廣夀殿丁巳宴大臣於長春殿九月乙酉宴羣臣於長春殿十一月戊辰宴勲臣於廣夀殿長興元年二月乙未宴羣臣於長春殿酬郊祀行事也三月丁卯幸會節園宴宰相及諸道入覲節度使賜物有差因幸河南府至夜歸宫辛未宴入覲節度使於長春殿四月己亥幸會節園宴大臣至暮歸宫六月宴羣臣於長春殿八月戊申宴羣臣於長春殿九月壬申宴百官於長春殿二年三月己亥宴羣臣于長春殿賜物有差四月丁酉幸會節園宴宰臣親王内臣及在京侯伯因幸河南府秦王從榮進馬請物賜侍宴臣寮至晩還京五月癸酉宴羣臣於長春殿九月丁酉宴百寮於長春殿十二月己巳宴近臣於長春殿三年二月戊午宴羣臣於長春殿四月宴羣臣於長春殿九月壬辰宴羣臣於長春殿教坊進新曲奏畢賜名長興殿四年三月辛卯宴百寮於長春殿十月壬子新授汴州節度使趙延夀赴鎮宴於廣夀殿餞之十一月甲戌宴餞鎮州節度使范延光癸未宴近臣及諸軍將校於中興殿愍帝應順元年正月戊子宴將相百寮於廣夀殿三月丁巳宴羣臣於長春殿末帝清泰元年四月戊寅宴文武百寮於廣夀殿賜鞍勒金帛有差五月甲寅宴羣臣於長春殿壬午平盧節度使房知温來朝及與諸將歸鎮宴於長春殿始奏樂知温獻奉數萬計十月戊寅判六軍河南尹皇子從美進縑銀請開宴近例也二年三月丙午宴羣臣於長春殿宰臣樞宻使前任節度使六統軍進奉捧觴獻夀日之夕而罷辛酉宰臣學士皇子樞宻宣徽使侍衛馬部都指揮使共進錢五十萬絹五百疋請開宴六月己夘鎮州董温其獻絹千疋銀五百兩金酒器供御馬請開宴晉髙祖天福元年七月宴羣臣於廣政殿賜物有差八月乙丑宴契丹册禮使於廣政殿賜物有差四年三月乙巳宴馮道等於廣政殿使迴故也丁巳宴羣臣於永福殿賜物有差閏七月甲戌宴羣臣於廣政殿壬辰宴羣臣於永福殿賜物有差八月丁丑宴羣臣於永福殿十二月己酉宴羣臣於永福殿庚寅御明徳樓餞送昭義軍節度使王建立賜玉斧蜀馬五年四月丙申朔宴羣臣於永福殿八月甲午朔宴羣臣於永福殿十月辛亥宴東平王楊光逺於萬歳殿禮賔使王彦章䕶聖指揮使何神通以蕃歌唱和各賜物百端己酉宴羣臣於永福殿賜物有差六年五月甲戌宴羣臣於永福殿七月甲戌宴宰臣前任見任節度刺史統軍行軍副使於永福殿八月戊申宴文武百官于武徳殿九月庚辰宴文武百官于武徳殿諸道進奉使夷狄來朝者亦與焉十月壬寅宴宰臣節度防禦團練使刺史統軍行軍副使于畫堂十一月乙亥宴宰臣節度防禦團練使刺史統軍行軍副史諸軍指揮使于文思殿諸道進奉使亦與焉十二月己巳習射於後苑諸軍都指揮使已上悉預七年二月己丑御武徳殿開宴召新鎮州杜威新涇州王周并應鎮州行營轉運使副使諸軍都指揮使至副兵馬使悉赴焉賜物有差乙未御文思殿開宴三月丙子御文思殿宴宰臣前任見任節度使刺史行軍副使統軍諸軍都指揮使閏三月丁未御崇徳殿宴宰臣前任見任節度防禦團練刺史統軍行軍副使都指揮使四月丙辰宴宰臣節度防禦團練刺史行軍副使統軍諸軍都指揮使于崇徳殿丙子宣廣晉尹齊王就前河中府節度使康福弟以御厨教坊樂宴召見任前任節度使少帝以天福七年六月即位九月甲申宴班帥將校於崇徳殿開運三年二月壬午幸南莊命臣寮泛舟飲酒因幸杜威園醉方歸内五月辛未幸大年莊遊舩習射夜分方歸内八月辛酉南莊召從臣宴樂至暮還宫漢髙帝即位稱天福十二年是年十月庚申帝幸鄴在御營開宴召從官等十二月丙戌召文武從官張宴隱帝乾祐三年三月丙午嘉慶節羣臣入相國寺齊賜教坊樂甲寅入朝侯伯髙行周已下以皇帝初舉樂獻銀縑千計請開御筵謂之買宴戊午宴羣臣於永福殿入覲諸侯貢獻上夀内樂百戲日晏而罷周太祖廣順元年三月壬午宴羣臣於廣政殿四月戊申幸城南園賜從官酒食未時還宫五月壬午幸城南園賜從官酒食八月乙未幸班荆館賜官酒食丙午宴羣臣於永福殿始舉樂十月壬辰太祖幸城南園賜從官王饒王彦超等酒食午後還宫十二月乙未帝幸城西園賜從官酒食申時還宫丙辰幸城南園賜從官酒食申時還宫二年正月甲子宴宰相勲臣於廣政殿三月庚申幸城南園召宰臣近臣諸統軍射己卯宴羣臣於永福殿五月帝親征兖州庚申至班荆館賜從官酒食甲子次成武宴從官朝覲藩帥於行宫戊辰至兖州城下庚午宴從官將校於行宫丙子以兖州平從臣詣行宫稱賀賜宴而罷六月丁亥平兖州迴次鄆州髙行周進錢絹請開宴戊子宴從臣將校於行宫壬辰次澶州癸巳世宗進奉請開宴帝召從官將校奏樂午時宴罷甲午帝在澶州宴從官將校八月丙申宴羣臣於永福殿九月甲寅朔宴宰臣前任藩侯郡守諸軍將校於廣政殿十月丙戌幸南園賜從官酒食庚子幸樞宻院召近臣賜酒食又射於後園十一月庚申内園賜諸軍將校射十二月己亥宴于廣政殿壬寅幸西園召從臣射申時還宫三年正月壬子朔朝賀畢御永福殿百寮稱觴獻夀舉教坊樂甲寅召宰相大將射于内毬塲帝先中的臣寮獻馬上夀射罷各賜物有差辛巳幸城南園賜從官酒食申時還宫閏正月癸未宴見任前任節度防禦等使諸軍大將于廣政殿戊戌宴宰臣見任前任藩臣諸軍將校于廣政殿壬寅幸城南園賜從官酒食申時還宫二月丁丑幸城南園詔從官射申時還宫壬午宴宰臣前任藩帥禁衛大將于廣政殿三月甲午宴宰臣前任藩帥禁衛大將于廣政殿丙午宴羣臣於永福殿戊申幸城南園賜從官酒食申時還宫四月甲寅宴入朝藩使郡守禁軍大將於廣政殿趙暉獻上夀馬十疋金酒器百兩乙丑幸城南園賜酒食申時還宫五月甲申宴宰相於廣政殿乙丑宴在京文武將相于廣政殿壬寅幸城南園賜從官酒食申時還宫七月丙午幸城南園賜從官酒食申時還宫八月甲寅宴文武將相於廣政殿丙寅宴羣臣於永福殿十月丙辰幸城南園又幸城西園賜從官酒食申時還宫世宗顯徳元年三月親征河東己亥宴從官於潞州之衙署四月丙午帝在潞州宴從官於行宫己未復宴從官於行宫六月庚午帝在潞州宴從官於行宫七月征河東還甲戌宴文武百寮於永福殿八月甲辰幸南御莊召武臣觀射至暮還宫癸丑宴文武百寮於永福殿九月戊戌御永福殿宴文武臣寮二年八月甲寅内庫法酒初熟帝面賜宰臣樞宻使已下數爵而止帝因曰朕在位以來不聞臣下有醉者豈朕之防嚴抑臣下畏慎耶九月甲子宴宰臣樞宻使侍衛諸將已下食於萬歳殿帝因曰兩日以來至甚寒沍朕於宫闈之中食珍美之膳但以無功及民何以仰答天貺雖躬親庶政日覽萬機亦恐無以勝任當湏手執耒耜與民同力不然親當矢石為人除害稍可安心耳又曰朕不為賜卿等食因事興言實自責也十月庚午召宰臣樞宻使節將已下觀射于苑中三年正月乙亥宴于金祥殿賞西征之功也丁未帝伐至陳州宴從官於行宫三月親征淮南辛亥宴于行宫文武從官及江南進奉使等悉皆預焉五月辛丑自淮上還次宿州宴從官於行宫丁未次宋州東京文武百寮來見於路左是日宴於行宫十一月辛卯宴於廣政殿四年二月辛酉詔文武百官今後凡遇入閣日宜賜廊飡庚辰帝南征次陳州宴從官於行宫三月戊子朔宴文武從官於行宫四月南征還次潁州宴從官於行宫丁卯次園鎮宣文武從官及迎駕百寮置酒行宫五月乙巳宴文武百寮於廣政殿八月乙卯朔御崇元殿文武百官入閣既罷賜百官廊飡時帝御廣徳殿西樓以觀焉命中黄門閲視酒饌無不精腆九月庚戌宴百寮于廣徳殿十月丙子南征至宋州宴從官於行宫十一月乙巳次泗州城丙午冬至宣宰臣及從官已下就城樓各飲以酒十二月丙辰宴從官於行宫戊辰攻下楚州庚午宴于行宫甲戊又宴從官於行宫五年正月丁亥宴於行宫壬申帝以楚州平受宰臣已下稱賀畢宴於行宫二月癸丑朔又宴于行宫庚申至髙郵縣癸亥宴於行宫庚午在揚州宴於行宫三月庚子以江南内附文武從官稱賀宴于行宫辛丑宴於瓜歩行宫江南兩浙朝貢使皆預焉庚戌宴從官及江南進奉使已下於行宫四月壬子朔駐蹕揚州江南遣使進買宴錢二百萬仍遣伶官五十人俱來癸丑召從官及江南進奉使馮延已以下宴於行宫江南偽臨汝郡公徐遼代李景捧夀觴以獻仍進金酒器御衣等甲寅駐蹕揚州宴從官及江南吳越進奉使於行宫己未次泗州宴從官於行宫甲子至宿州宴從官於行宫戊辰至宋州東京文武百官來迎翌日宴百官於行宫丙子幸迎春苑玉津園宣教坊樂至暮還宫五月丁亥宴文武於廣政殿回鶻逹靼進奉使亦預之是月壬辰帝謂侍臣曰向來御厨造食各分等差今後賜宴羣臣食物並湏類從所食不得更有分别閏七月庚申宴文武百官於廣徳殿九月乙丑賜宰臣樞宻使三司使翰林學士中書舍人宴於玉津園張教坊樂先是帝以前代有賜百官觀稼之事復以是歳秋成又念内臣之勞故有是命十月庚辰宴文武百寮及諸道進奉使於廣徳殿丙申宴于廣政殿十二月乙酉宴于廣政殿六年正月壬子宴于廣政殿庚申帝命諸將大射於鞠塲既而宴于講武殿乙丑命諸將大射于鞠塲二月庚申宴於廣政殿三月甲子宴於廣政殿壬申復宴于廣政殿四月帝北伐戊寅至澶州宴從官于行宫癸未賜博州天平節度使李仲進見於路左是日宴于行宫辛卯至滄州宴從官於行宫五月丙午至瓦橋闗宴從官於行宫乙酉還京賜百官及諸道進奉使宴于迎春苑册府元龜卷一百十一
