body:
  text: 冊府元龜卷七百二十七宋王欽若等撰幕府部辟署第二晉羊曼字祖延少知名本州禮命太傅辟皆不就避難渡江元帝以爲鎮東叅軍轉丞相主簿委以機宻王珣字元琳弱冠與陳郡謝𤣥爲桓温掾後轉主簿從討袁真轉大司馬叅軍陶侃字士行爲盧江縣吏鄱陽孝亷范逵過盧江太守張䕫稱美之䕫召爲督郵遷主簿後除郎中伏波将軍孫秀以亡國支庶府望不顯中華人士耻爲掾屬以侃寒宦召爲舎人温嶠字大真年十七州郡辟召不就司𨽻命為都官從事後舉秀才灼然司徒辟東閣祭酒補上黨令平北大将軍劉琨請爲叅軍琨遷大將軍嶠爲從事中郎琨遷司空以爲右司馬楊方字公囬賀循稱之扵京師司徒王導辟為掾轉東安太守遷司徒叅軍事薛兼字令長察河南孝亷辟公府累歴懷令司空東海王越引爲叅軍轉祭酒元帝爲安東将軍以爲軍諮祭酒稍遷丞相長史劉阮字大連彭城人爲彭城内史避亂渡江元帝以爲從事中郎遷丞相司直委以刑憲刁恊字𤣥亮成都王頴請爲平北司馬後歴趙王倫相國叅軍長沙王乂驃騎司馬東嬴公騰鎮臨漳以恊爲長史避亂渡江元帝以爲鎮東軍諮祭酒轉長史戴淵字若思舉孝亷入雒陸機薦之扵趙王倫倫乃辟之累轉東海王越軍諮祭酒後元帝召爲鎮東右司馬戴邈字望之永嘉中元帝版行邵陵内史丞相軍諮祭酒周覬字伯仁累遷尚書吏部郎東海王越子毗為鎮軍将軍以覬爲長史元帝鎮江右請爲軍諮祭酒應詹字思逺初辟公府爲太子舍人趙王倫以爲征東長史倫誅坐免城都王頴辟爲掾鎮南大將軍劉𢎞詹之祖舅也請爲長史卞壺字望之永嘉中除著作佐郎征東將軍周馥請爲從事中郎不就元帝鎮建業召爲從事中郎將委以選舉甚見親仗鄧攸字伯通爲太子洗馬東海王越世子文學吏部郎中越弟騰爲東中郎将請攸爲長史孫惠字徳施永寧初赴齊王冏義辟以大司馬户曹掾轉東曹屬冏敗成都王頴以爲大將軍叅軍後改姓名以遁東海王越舉兵下邳惠詭稱南嶽逸士秦秘之以書干越越榜道以求之惠乃出見越即以爲記室叅軍後除太子中庶子復請補司空從事中郎熊逺字孝文豫章人太守㑹稽夏静辟為功曹及静去職逺送至㑹稽以歸州辟主簿元帝作相引爲主簿轉從事中郎顧和爲司徒掾時東海王冲爲長水校尉妙選僚屬以劉眈爲司馬庾懌爲功曹和爲主簿陳頵字延思陳國人仕郡督郵簡獲隱匿者三千人爲一州尤最太守劉享㧞爲主簿州辟從事乘馬車還家宗黨榮之髙崧字茂琰總角時司空何充稱其明慧充爲楊州引爲主簿益相欽重轉驃騎主簿累遷黄門侍郎簡文輔政引爲撫軍司馬庾亮美姿儀善談論而方嚴自守元帝爲鎮東時聞其名辟西曹掾及引見風情都雅過於所望甚器重之庾翼字稚恭蘇峻作逆時翼年二十二兄亮使白衣領數百人備石頭亮敗與翼俱奔事平始辟太尉陶侃府轉叅軍累遷從事中郎在公府雍容諷議庾懌字叔預東海王冲爲長水校尉清選綱紀以懌爲功曹又爲冲中軍司馬王承字安期永寧初爲驃騎将軍後避難南下遷司空從事中郎後東海王越鎮許以爲記室叅軍雅相知重王述字懷祖年三十尚未知名人或謂之癡司徒王導以門地辟爲中兵屬既見無他言惟問以江東米價述張目不答導曰王掾不癡人何言癡也康帝爲驃騎将軍召補功曹又歴庾氷征虜長史王坦之字文度簡文帝爲撫軍将軍辟爲掾累遷叅軍從事中郎仍爲大司馬桓温長史王廙字世将初辟太傅掾轉叅軍出爲濮陽太守元帝作鎮江右廙棄郡過江帝見之大悦以爲司馬後以冠軍将軍領丞相軍諮祭酒蔡謨字道明父克爲成都王頴大将軍記室頴爲丞相擢爲東曹掾後絶不仕東嬴公騰爲車騎将軍鎮河北以克爲從事中郎知必不就以軍期致之謨避亂渡江明帝爲東中郎将引為叅軍元帝拜丞相復辟爲掾轉叅軍後歴大将軍王敦從事中郎司徒左長史諸葛恢字道眀元帝爲安東将軍以恢為主簿復爲鎮東叅軍與卞壺竝以時舉遷從事中郎兼統記室孔愉字敬康㑹稽人值亂入新安山中改姓孫氏永嘉中元帝始以安東将軍鎮楊土命愉爲叅軍邦族尋求莫知所在建興初始出應召爲丞相掾仍除駙馬都尉叅丞相軍事時已五十矣謝尚字仁祖司徒王導深器之比之王戎嘗呼爲小安豐辟為掾轉西曹屬謝安字安石年四十征西大將軍桓温請爲司馬既到温甚喜言生平歡笑竟日既出温問左右頗嘗見我有如此客不王獻之字子敬轉秘書丞謝安甚欽愛之請爲驃騎長史安進號衛将軍復為長史桓宣譙國人爲元帝丞相舎人時塢主張平自稱豫州刺史樊雅自稱譙郡太守轉宣行叅軍使説平雅平雅遣将軍主簿詣丞相府受節度南中郎將王含請爲叅軍桓伊字叔夏有武幹摽悟簡率為王濛劉琰所知頻叅諸府軍事累遷大司馬恭軍毛穆之字憲祖寳之子果毅有父風安西将軍庾翼以爲恭軍翼子方之爲建武将軍守襄陽方之年少翼選武将可信仗者爲輔弼乃以穆之爲建武司馬桓遐字應逺勇力絶人桓温以爲恭軍數從温征伐虞預字叔寧餘姚人太守庾琛命爲主簿預上計陳時政所失琛善之即皆施行太守記瞻到預復爲主簿轉功曹史安東從事中郎諸葛恢恭軍庾亮等薦預召爲丞相行恭軍兼記室棗據字道彦美容貌善文辭弱冠辟大将軍府周玘字宣佩弱冠州郡辟命不就刺史初到召爲别駕從事虚已備禮方始膺命車𦙍風姿美劭機悟敏速甚有鄉曲之譽桓温在荆州辟爲從事以辯識義理深重之引爲主簿習鑿齒字彦威荆州刺史桓温辟爲從事江夏相袁喬深器之數稱其才於温轉西曹主簿親遇隆宻謝𤣥字㓜度有經國才略屢辟不起後與王珣俱被桓温辟爲掾竝禮重之謝萬弱冠辟司徒掾遷右西蜀不就簡文帝作相聞其名召為撫軍從事中郎萬著白綸巾鶴􅌁裘履版而前既見與帝共談移日鄧粲長沙人少以髙潔著名與南陽劉麟之南郡劉尚公同志友善竝不應州郡辟命荆州刺史桓冲卑辭厚禮請粲爲别駕粲爲其好賢乃起應召孫盛字安國補瀏陽令太守陶侃請爲恭軍庾亮代侃引爲征西主簿轉恭軍庾翼代亮以爲安西諮議恭軍桓温代翼留爲恭軍與俱伐蜀累遷從事中郎羅企生字宗伯豫章人爲臨汝令刺史王凝之請爲别駕殷仲堪之鎮江陵引爲功曹累遷武陵太守未之郡而桓𤣥攻仲堪仲堪更以企生爲諮議恭軍宋徐羨之字宗文少為王雅太子少傅主簿劉牢之鎮北功曹又爲桓循撫軍中兵恭軍與髙祖同府深相親結義旗建髙祖㧞爲鎮軍恭軍領軍司馬補瑯邪王大司馬恭軍司徒左西屬深州别駕從事義熙十一年除鷹揚将軍瑯邪内史仍爲大司馬從事中郎将髙祖北伐轉太尉左司馬嘗留任以副劉穆之王鎮惡北海人廣固之役或薦鎮惡扵髙祖即以爲青州治中從事史行恭中軍大尉軍事署前部賊曹義熙八年大軍西討轉恭軍事十二年髙祖将北伐轉諮議恭軍行龍驤将軍領前鋒孟龍符懐玉弟也早爲髙祖所知既克京城以爲建武恭軍朱齡石初爲桓循撫軍恭軍髙祖克京城以爲建武叅軍後遷武康令又召爲恭軍累遷尚書都官郎尋復爲恭軍坐事免復爲恭軍朱超石齡石之弟桓謙爲衛将軍以補行恭軍又恭何無忌輔國右軍軍事徐道覆破無忌得超石以爲叅軍至石頭説其司舟人單舸走歸髙祖髙祖甚喜之以爲徐州主簿遷車騎恭軍事復補中兵恭軍毛修之字敬文少有大志頗讀史籍荆州刺史殷仲堪以爲寜逺恭軍後爲桓𤣥恭佐桓𤣥平還至京師髙祖以爲鎮軍諮議恭軍羊欣字敬元桓𤣥輔政領平西将軍以欣爲平西恭軍義熙中弟徽被遇扵髙祖髙祖謂諮議鄭鮮之曰羊徽一時美器時論猶在兄後恨不識之即㧞欣補右将軍劉璠司馬轉長史中軍将軍道璘諮議恭軍傅𢎞之字仲度少倜儻有大志義旗建輔國将軍劉道規以爲恭軍劉道産彭城人初爲輔國恭軍無錫令有能名髙祖㧞爲中軍行恭軍又爲道憐驃騎恭軍後又爲彭城王驃騎中兵恭軍王敬𢎞琅邪人桓𤣥輔政及簒位屢召不至髙祖以爲車騎從事中郎徐州治中從事征西将軍道規諮議恭軍謝靈運陳郡人初爲晉琅邪王大司馬行恭軍撫軍将軍劉毅鎮姑熟以爲記室恭軍毅鎮江陵又以爲衛軍從事中郎毅伏誅髙祖㧞爲太尉恭軍髙祖伐長安驃騎将軍道憐居守㧞爲諮議恭軍劉秀之字道寳父仲道髙祖克京城以補建武恭軍秀之累官建業令太祖鎮襄陽以爲撫軍録事恭軍張敷性整實風韻甚髙好讀古書兼屬文論少有盛名髙祖見而愛之以爲世子中軍恭軍數見接父邵爲湘州去官侍從太祖㧞爲西中郎恭軍江夏王義㳟鎮江陵以爲撫軍功曹轉記室恭軍王華父廞起兵兵敗不知存亡華布衣蔬食十餘年髙祖欲収其才用乃發廞喪問使華制服服闋髙祖北伐長安領鎮西将軍北徐州刺史辟華爲州王簿仍轉鎮西主簿治中從事史歴職著稱袁淑字陽源遷太子洗馬以脚疾不拜衛軍臨川王義慶雅性好文章請爲諮議恭軍遷司徒左西屬謝莊爲吏部尚書免官時北中郎將新安王子鸞有盛寵欲令招引才望孝武乃使子鸞㧞莊爲長史顔延之字延年文章之美冠絶當時飲酒不䕶細行後将軍呉國内史劉桞以爲行恭軍因轉主簿豫章公世子中軍行恭軍顔師伯字長淵父邵剛正有局力爲謝晦所知晦鎮江陵請爲諮議恭軍領掾事師伯方孤貧劉道産為雍州以為輔國行恭軍弟師仲妻臧質女也質爲徐州辟師伯爲主簿衡陽王義季代質爲徐州質薦之扵義季即命爲征西行恭軍興安侯義賔代義季世祖代義賔仍爲輔國安北行恭軍諮議恭軍王景文薦之世祖乃以爲徐州主簿世祖鎮尋陽啓太祖請爲南中郎主簿太祖不許謂典籖曰中郎府主簿那得用顔師伯世祖又啓爲長流正佐太祖又曰朝廷不能除之卿可自授亦不宜署長流乃㧞爲恭軍事署刑獄沈慶之字𢎞先兄敬之爲趙倫之征虜恭軍南陽太守慶之往襄陽省兄倫之見而賞之倫之子伯符爲竟陵太守倫之命伯符㧞為寜逺中兵恭軍顧覬之呉郡人初爲郡主簿謝晦為荆州以爲南蠻功曹仍爲晦衛軍恭軍晦愛其雅素深相知待王𢎞辟爲陽州主簿仍爲𢎞衛軍恭軍鹽官令衡陽王義季右軍主簿沈穆夫字彦和少好學王㳟命爲前軍主簿與其父警書曰足下既秉不㧞之志髙卧東南故屈賢子共事非以吏職嬰之也劉勔少有志節兼好文義家貧爲廣州増城令廣州刺史劉道錫引爲揚烈府主簿何長瑜東海人盧陵王紹鎮尋陽以長瑜爲南中郎行恭軍掌書記之任龔頴遂寧人少好學益州刺史毛璩辟爲勸學從事璩爲譙縱所殺縱脅頴以兵刃頴終不屈節其後刺史至輙加辟引歴府恭軍州别駕從事袁顗父爲呉郡顗隨父在官值元凶弑立安東将軍隨王誕舉兵入討㧞顗爲諮議恭軍南齊孔稚珪字徳璋㑹稽人少學渉獵有美譽太守王僧􅐚見而重之引爲主簿州舉秀才解褐安成王車騎法曹行恭軍後為殿中郎太祖爲驃騎以稚珪有文翰取爲記室恭軍對掌辭筆辛普明河南人有賢行後遭母喪幾至毁滅揚州刺史豫章王辟爲議曹從事夏侯㳟叔譙國人桓崇祖為豫州聞其才義辟爲主簿兼掌書翰庾杲之爲王儉衛軍長史時人呼儉府爲入芙蓉池儉謂人曰昔袁公作衛軍欲用我爲長史雖不獲就要是意向如此今亦應湏知我軰人也乃用杲之垣崇祖字敬逺下邳人年十四有幹略刺史劉道隆辟爲主簿厚遇之劉懐珍字道玉平原人本州辟主簿江夏王義恭出鎮旴𣅿道遇懐珍以應對見重取為驃騎長史兼墨曹行恭軍劉善明平原人年四十刺史劉道隆辟治中從事父懐民謂善明曰我已見汝立身復欲見汝立官也善明應辟周山圖字季寂初爲呉郡晉陵防郡隊主兖州刺史沈僧榮鎮瑕丘與山圖有舊以爲已建武府恭軍焦度字文續孝武帝初青州刺史顔師伯出鎮臺以度領幢主送之與魏軍戰扵沙溝破陣大㨗師伯㧞爲已輔國府恭軍後補晉安王子勛夾轂隊主子勛起兵事敗逃宫亭湖中朝廷聞其勇甚憂患之使江州刺史王景文誘降度景文以爲已鎮南恭軍尋領中直兵虞玩之少閑刀筆沉渉書史累遷安成王車騎録事轉少府太祖鎮東府朝野致敬玩之猶躡履造席太祖引爲驃騎諮議恭軍覇府初開賔客輻凑玩之與樂安任遐俱以應對有席上之美齊名見遇謝超宗陳郡人爲新安王撫軍行恭軍泰始初為建安王司徒恭軍事遷司徒主簿丹陽丞建安王休仁引爲司徒記室正員郎太祖爲領軍數與超宗共屬文愛其才翰衛将軍袁粲聞之謂太祖曰超宗開亮逈悟善可與語取爲長史臨淮太守虞悰字景豫㑹稽人少而謹正有至性州辟主簿累至州治中别駕黄門郎武帝爲中軍引悰爲諮議恭軍遣吏部江謐持手書謂悰曰今因江吏部有白以君情意顧欲相屈胡諧之豫章人州辟從事主簿累爲邵陵王左軍諮議武帝頓盆城使諧之守尋陽城及爲江州復以諧之爲别駕以事任蕭景先南蘭陵人太祖鎮淮隂以景先領軍主除後軍行恭軍與世祖欵暱世祖爲廣興郡啓太祖求景先同行除世祖寧朔府司馬自此嘗相隨逐江祏字𢎞業累官南徐州别駕髙宗輔政委以心腹髙宗爲驃騎鎮東府以祏爲諮議恭軍江斆字叔文濟陽人少有美譽桂陽王休範臨州辟迎主簿不就後為安成王撫軍記室轉驃騎從事禇淵爲衛将軍重斆爲人先通㫖意引為長史何昌㝢字儼望廬江人宋建安王休仁爲揚州辟昌㝢州主簿遷司徒行恭軍太傅五官司徒東閣祭酒建平王景素爲征北南徐州昌㝢又爲府主簿以風素見重謝卄瀹字義絜累官至撫軍功曹武帝爲中軍引爲記室建元初累至中書郎衛軍王儉引為長史雅相禮遇王思逺琅邪人少無仕心宋建平王景素辟南徐州王簿甚見禮遇陸惠曉字叔明呉郡人初應州郡辟舉秀才衛尉史歴諸府行叅軍以母老還家太祖輔政除尚書殿中郎太祖表禁奢侈惠曉撰答詔草為太祖所賞引爲太𫝊東閣祭酒王融字元長少而神明警惠晉安王南中郎授行叅軍坐公事免竟陵王爲司徒授法曹行叅軍謝朓字𤣥暉爲新安王中軍記室尋兼尚書殿中郎髙宗輔政以眺爲驃騎諮議領記室掌覇府文筆又掌中書詔誥張欣泰字義亨宋左衛将軍興世之子少有志節不以武業自居好讀子史辟州主簿歴諸王府佐卞彬字士蔚才操不羣文多指刺州辟西曹主簿丘巨源少舉丹陽郡孝亷為宋孝武所知江夏王義恭取爲掌書記王智深字雲才建平王景素爲南徐州作觀法篇智深和之見賞辟爲西曹書佐未到職而景素敗賈淵字希鏡世傳譜學大始初辟丹陽郡主簿昇明中太祖嘉淵世學取爲驃騎恭軍李珪之字孔璋江夏人少辟州從事宋㤗始初蔡興宗爲郢州以珪之爲安西府佐委以職事封延伯字仲璉渤海人有學行不與世人交州辟主簿不就垣崇祖爲豫州辟啓太祖用爲長史𢃄梁郡太守平藹爲豫章王嶷荆州刺史主簿恭知州事嶷甚重焉州人嫉之或譛藹廨門如市嶷遣覘之方見藹閉閣讀書嶷還都以藹為太尉刑獄恭軍典書記樂頥字文徳南陽人世居南郡少而言行和謹湘州刺史王僧􅐚引爲主簿以同僚非人棄官去蔡樽舉髙第為司徒法曹行恭軍王儉髙選府僚以樽爲主簿梁沈約起家奉朝請濟陽蔡興宗聞其才而善之興宗爲郢州刺史引爲安西外兵恭軍兼記室興宗嘗謂其諸子曰沈記室人倫師表宜善事之范岫與呉興沈約俱爲蔡興宗所禮興宗爲安西将軍引爲主簿陸倕呉郡人年十七舉本州秀才刺史竟陵王子良開西邸延英俊倕亦預焉辟議曹叅軍周捨有口辨王亮爲丹陽尹聞而喜之辟爲主簿政事委焉龔惬遂寧人劉季連爲益州刺史辟為府主簿愜缺之孫累世有學行故引缺王僧孺爲太學慱士尚書僕射王晏深相賞好晏爲丹陽尹召補郡功曹使僧孺撰東宫新記後兼太學博士晏子得元出爲晉安郡以僧孺補郡丞任昉爲征西行叅軍永明初衛将軍王儉領丹陽尹引爲主簿儉雅欽重昉以爲當時無軰劉景昕事母孝謹母病三十年一朝而瘳鄉里以爲誠感荆州刺史湘東王辟爲主簿江淹昇明初齊帝輔政聞其才召爲尚書駕部行驃騎叅軍事王亮爲大司馬從事中郎出爲衡陽太守以南土卑濕辭不之官遷給事黄門侍郎尋拜晉陵太守在職清公有美政時齊明帝作相聞而嘉之引爲領軍長史甚見賞納鄧元起爲武寜太守戍三闗郢州刺史張冲督河北軍事元起累與冲書求旋軍冲報書曰足下在彼吾在此表裏之勢所謂金城湯池一旦捨去則荆棘生焉乃表元起爲平南中兵叅軍事樂法才少逰京師造沈約約見而稱之和帝爲相國召爲府叅軍鎮軍蕭頴胄辟爲主簿王志字次道司空僧􅐚之子爲大尉行叅軍又爲武陵王文學禇淵爲司徒引志爲主簿謂僧􅐚曰朝廷之恩本爲殊特所可光榮在屈賢子桞慶逺字文和為襄陽令髙祖臨雍州問京兆人杜惲求州綱惲舉慶逺髙祖曰文和吾已知之所問未知者耳因辟别駕從事史夏侯詳字叔逺譙郡人年十六遭父艱服闋刺史殷琰召補主簿琰叛輔國将軍劉勔討平代爲刺史又補主簿頃之爲新汲令豫州刺史表轉治中從事仍遷别駕歴事八将州部稱之蔡道㳟字懐儉少寛厚有大量齊文帝為雍州召補主簿鄭紹叔字仲明榮陽人年二十餘爲安豐令有能名本州召補主簿轉治中從事史髙祖臨司州命爲中兵叅軍領長流桞惔字文通年十七齊武帝爲中軍命爲叅軍轉主簿桞憕字文深爲中庶子後爲鎮北始興王長史王移鎮益州復請憕帝曰桞憕風標才氣恐不能久爲少王臣王請數四不得已以爲鎮西長史宗夬字明敭南陽人宋明帝即位爲郢州治中以父老去官南康王爲荆州刺史引爲别駕樂藹字蔚逺南陽人宋建平王景素爲荆州刺史辟爲主簿景素爲南徐州復引爲征北刑獄叅軍遷龍陽相齊豫章王嶷爲武陵太守雅善藹爲政及嶷爲荆州刺史以藹爲驃騎行叅軍領州主簿叅知州事嶷還都以藹爲太尉刑獄叅軍典書記遷支江令還爲大司馬中兵叅軍轉都記室後南康王爲西中郎以藹爲諮議叅軍傅昭字茂逺宋世太原王延秀薦於丹陽尹袁粲深為所禮辟爲郡主簿蕭琛字彦瑜少而朗悟爲齊太學博士王儉宴於樂道苑琛著虎皮靴䇿桃杖直造儉坐儉與語大悦儉爲丹陽尹辟爲主簿後爲晉熙王長史行南徐州兼少府髙祖定京邑引爲驃騎諮議領録事裴子野字幾原爲右軍安成王叅軍俄遷兼廷尉正免職呉平侯蕭景爲南兖州刺史引爲冠軍録事府遷職觧顧恊字正禮爲安成王國左常侍兼廷尉正大尉臨川王聞其名召掌書記累遷輕車湘東王叅軍事兼記室西豐侯正徳受詔北討引爲府録事叅軍掌書記賀琛字國寳㑹稽人於鄉里聚徒教授普通中刺史臨川王辟爲祭酒從事劉孺字季雉彭城人本州召迎主簿起家中軍法曹行叅軍鎮軍沈約聞其名引爲主簿嘗與逰宴賦詩大爲約所嗟賞劉遵字孝陵累遷晉安王宣惠雲麾二府記室甚見賔禮轉南徐州治中王後爲雍州復引爲安北諮議叅軍臧盾字宣卿齊世爲丹陽尹丞髙祖平京邑覇府建引爲驃騎刑獄叅軍丘遲字希範呉興人州辟從事累遷車騎録事恭軍髙祖平京邑覇府開引爲驃騎主簿甚被禮遇庾於陵字介傳學有才思齊隨王子隆爲荆州召爲主簿子隆代還又以爲送故主簿後始興王遥光爲撫軍引爲行叅軍兼記室呉均字叔彦呉興人家世寒賤至均好學有俊才桞惲爲呉興召補主簿日引與賦詩建安王偉爲揚州引兼記室掌文翰劉峻字孝標齊蕭遥光爲豫州引爲府刑獄禮遇甚厚後爲西省學士免安成王季好峻文學及遷荆州引爲户曹叅軍伏挺字士摽髙祖義師至挺迎謁於新林髙祖見之甚悦謂曰顔子引爲征東行叅軍時年十八顔見逺博學有志行齊和帝之鎮荆州以見逺爲録事叅軍庾域少沉静有名鄉曲梁文帝爲郢州辟爲主簿歎美其才曰荆南柯梓其在斯乎加以恩禮陳蔡景歴字茂世爲海陽令侯景之亂客逰京口髙祖鎮朱方素聞其名以書要之景歴對使人答書筆不停綴文不重改髙祖得書甚加欽賞仍更賜書報答即日授征北府中兵叅軍仍領記室衡陽獻王昌時爲呉興郡昌年尚少呉興王之鄉里父老故人尊卑有序髙祖恐昌年少接對乖禮乃遣景歴輔之沈恪呉興武康人深有幹局梁新渝侯蕭映爲郡特召爲主簿映遷北徐州恪隨映之鎮映又遷廣州以恪兼府中兵叅軍嘗領兵討伐江徳藻濟陽人爲武陵王行叅軍南平王偉爲大司馬聞其才名請爲東閣祭酒杜之偉㓜精敏有才爲邵陵王叅軍侯景之亂逃竄山澤及髙祖爲丞相素聞名召補記室叅軍周鐵虎膂力過人便馬槊事梁河東王譽以敢勇聞奏授爲府中兵叅軍張種爲梁西昌侯府西曹掾時武陵王爲益州刺史重選府僚以種爲征西曹掾侯景之亂種奉其母東奔母卒以凶荒未獲葬服制雖畢而常若在喪侯景平司徒王僧辯以狀聞起爲貞威将軍治中從事史并爲具葬禮訖方即吉沈烱字禮明少有雋才初爲賊将宋子仙所逼掌書記子仙敗梁将王僧辯購得之羽檄軍書皆出扵禮明僧辯爲司徒以禮明爲從事中郎虞寄字安次㑹稽人閉門稱疾以書籍自娯岳陽王爲㑹稽太守引爲行叅軍遷記室叅軍領部五官掾轉爲中記室掾到仲舉字徳言侯景之亂依文帝及景平文帝爲呉興郡守以仲舉為郢郡丞與頴川庾持俱爲文帝賔客文帝為宣毅将軍以仲舉爲長史蕭乾字思惕五舉明經再遷太子舎人建安侯蕭正立出鎮南豫州授録事叅軍累遷中軍宣城王中録事諮議恭軍侯景平髙祖鎮南徐州引爲貞威将軍司空從事中郎孔奐字休文爲儀曹侍郎丹陽尹何敬容以奐剛直請補功曹史喪母以孝聞侯景平司徒王僧辯先下辟書引爲左西掾又補丹陽丞元帝即位扵荆州徴奐及沈禮明僧辯表留之帝手勅曰孔沈二士今且借公爲朝廷所重如此仍除太尉從事中郎僧辯爲揚州又補揚州治中從事髙祖作相除司徒右長史沈君理字仲倫起家湘東王法曹叅軍髙祖鎮南徐州遣君理謁見髙祖髙祖器之辟爲府西曹掾徐凌字孝穆梁晉安王爲平西将軍寧蠻校尉父摛爲王諮議王又引凌叅寜蠻府軍事謝貞字元正累官駕部侍郎始興王叔陵爲楊州刺史引爲祠部侍郎阮卓記室辟貞爲主簿貞不得已乃行尋遷府録事恭軍領丹陽丞註亨字亨通侯景之亂避地郢州梁邵陵王引爲諮議叅軍王僧辯之襲郢州也素聞其名召爲儀同從事郎中遷太尉從事中郎徐度字孝節安陸人世居京師少倜儻不拘小節及長姿貌瓌偉嗜酒好博嘗使童僕屠酤爲事始與内史蕭介之郡度從之将領士卒征諸山洞以驍勇聞髙祖征交阯厚禮招之度乃委質何之元解褐梁太尉臨川王楊州議曹從事史尋轉主簿及袁昻爲丹陽尹辟爲丹陽五官掾總户曹事安西武陵王爲益州刺史以之元爲安西刑獄叅軍侯景之亂王琳召爲記室叅軍其後湘州刺史始興王叔陵遣功曹史桞咸齎書召之之元始與朝廷有隙及書至大惶恐讀書至孔章無罪左車見用之元仰而歎曰辭㫖若此豈欺我哉遂隨咸至湘州再遷中衛府諮議恭軍册府元龜卷七百二十七
