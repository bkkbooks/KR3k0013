body:
  text: 册府元龜卷一百七十九宋王欽若等撰帝王部姑息第四後唐閔帝應順元年正月西川孟知祥上言給事中韋勲賜五旗旌節官告進銀一千五百兩繒綵一千五百疋時知祥專制劒南動多姑息初奏李肇而下五人分諸州為五帥請朝廷降使及韋勲至成都不甚禮待聊以貢奉尋僭號於蜀廢帝清泰元年五月以天平軍節度使檢校太師中書令岐國公食邑七千户食實封五百户李從曮可鳳翔尹充鳳翔節度使加邑千食實百户初帝起鳳翔帑藏匱乏從曮家獻錦袍銀𢃄用仗等物以助軍實及帝將赴京師岐人叩馬頭願以從曮臨藩許之王建立乃代從曮七月條奏從曮在任所用過省錢詔蠲除之六月詔平盧軍節度使房知温封東平王知温始與帝嘗失意於杯盤間以白刄相恐及帝即位知温憂甚帝乃封王爵以寧之知温徑赴雒陽申其宿過且感新恩帝開懐以厚禮慰而遣之十二月詔以故武安軍節度使檢校司空彭城郡侯邑千户劉建峯累贈太傅可贈太尉其妻厙狄氏贈韓國夫人建峯唐光啟中蔡賊秦宗權之黨淮南之亂與孫儒冦陷揚州儒令建峯將兵冦衡潭諸州建峯乃自為湖南歳餘卒别將馬殷代帥其衆馬氏深徳之前後屢表建峯贈官至是有此封贈三年六月以右千牛衛將軍權知魏府事張令昭為齊州防禦使捧聖右第二指揮使开立為徳州刺史捧聖第五指揮使康福進為莫州刺史先是令昭為鄴都屯駐捧聖都虞候逐節度使劉皓據城叛翼日右副使邊仁嗣已下逼令奏請節旄改授將軍權知而立及福進始與令昭同謀應太原逐延皓朝廷故並授郡印累遣使宣諭託以諸軍虐留未能輕解其意蓋俟太原成敗耳至是除郡又促令赴任以觀其心十二月以前坊州刺史劉景巖為彰武軍節度留後景巖故河西鄜延帥髙萬全之將校累任至坊州刺史家在延州父子豪右私家有丁夫兵仗埶傾郡邑邑人憚其强多推服之㑹楊漢章帥延州無政失蕃漢之私是時有詔借括戰馬及壯丁漢章以數千人將赴軍期兵仗鞍馬閲之於野而便成行景巖宻令人撓之言契丹在河東丁壯有去無歸衆心懼殺漢章乃以其衆至景巖墅推為留後朝廷不獲已而命之是年詔放澶州刺史馮暉屬省錢一百萬暉以犒軍為辭故有是命晉髙祖天福元年封天雄軍節度使范延光臨清王帝建義太原唐末帝遣延光以本部兵二萬屯遼州與趙延壽犄角合勢及延壽兵敗延光促還心不自安帝入雒尋封列土以寛反側二年安州屯將王暉殺節度使周環詔遣滄州節度使李金全以騎兵千人鎮撫其地未及境暉為部下所殺金全至亂軍數百人不自安金全說遣赴闕密伏兵於野以祖之座上擒其軍校武彦和等數十人斬之彦和臨刑宣言曰周環儉嗇多疑嚴刑峻令暉麄率悖慢怨其約束以至飛語相間各為防虞暉乃無疾針砭數月不出銛竹為矛圖為竊發預其事者暉腹心數人而已行間之卒皆受其制心雖有異敢不從之連雞不棲物之常理夫亂者必戮軍令有之然則王暉元惡天子猶賜之信誓許為郡守我等見殺非有罪也若朝廷之命是食前言茍將軍之令得無寃乎既戮彦和等其徒皆以兵送赴闕下初金全之將行也帝謂之曰王暉之亂罪莫大焉但慮乎封守不寧則民受其弊故折矢飛詔示之以不戮一人㧞暉為淮安守序秩次校以主其兵卿之此行無失吾信至是以彦和等當為亂之日劫掠郡城三日所獲財貨在焉遂殺而奪之帝聞之以姑息金全不究其事授以旄節三年五月賜汴州節度使楊承祚衣一襲通犀𢃄靴笏銀鞍轡馬等物又太妃皇后各有所賜帝以鄴城將下光逺方綰兵柄故通姻好以固之所賜汴俗謂之繫女壻十月宣遣東上閤門副使張瓊祚押福建進來牙一株犀三株玳瑁三十斤銀盆四口臘面茶三十斤香藥二百斤徃魏府賜楊光逺十一月制曰王者居域中之大以天下為家兩曜照臨必覃聲教二儀覆載咸有寵綏矧夫地鎮南臺心傾北闕遥識興隆之運顯輸翊戴之誠得不竝舉徽章式旌亮節爰當吉日遂降明恩威武軍節度福建管内觀察處置等使光禄大夫檢校太保兼御史大夫上柱國瑯邪縣開國伯食邑七百户王繼恭淮水源長緱山系逺代襲弓裘之業家承帶礪之勲劒有龜文乃是千星之器玉稱龍府居為照廡之珍當年已得於佩刀繼世連持於瑞節紅蓮緑水幕中多倚馬之賔貝胄犀渠帳下悉曳牛之將號令而秋霜肅物撫綏而時雨隨車嶽鎮一方風行萬里而況誠専㑹禹道著尊周挂帆檣而逺渉滄波貢章表而備陳丹懇菁茅畢至無虧任土之儀玉帛咸來悉是充庭之寳爾能若此朕實嘉焉是用益以井田榮之黻冕階昇峻級爵極真王冀旌奉上之心仍錫推忠之號於戲航深梯險爾無怠於恭䖍崇徳報功朕敢稽於渥澤勉承休命永保令圗可特進檢校太傅福州大都督府長史威武軍節度福建管内觀察處置兼三司發運等使封臨海郡王加食邑二千户食實封三百户賜推忠奉節功臣繼恭圗閩王昶而自立故有是命五年八月以西京留守楊光逺守太尉兼中書令充平盧軍節度使封東平王是時光逺有功每以為帝懼已稍干預政事帝亦從之以其子承祚尚主次子承信等皆與一官而恩渥殊等為當時之冠時桑維翰為樞密使往往御前可否其事光逺密知心銜之及范延光歸命光逺面奏維翰等擅權帝以光逺方有功於國乃出維翰領安陽光逺為西京留守兼鎮河陽罷其兵權光逺繇此怨望朝廷潜貯異圗多以珍玩奉契丹訴已之屈又私養部曲千餘人撓法犯禁河雒之人嘗如備盜尋册守太尉時范延光致仕輦槖裝妓妾居河陽光逺利其竒貨且慮為子孫之讐因奏延光不家汴雒而出舍外藩非南走淮則北走越宜早除之髙祖以許之不死鐵劵在焉持疑未允光逺乃遣子勳以甲士圍其第廹令自裁延光曰天子在上安得如此光逺尋遣爪牙請移雒下及浮橋推落水中流尸至繆家灘奏云延光自投于河朝廷頗知之以姑息不暇莫能理其事後踰嵗入覲帝為置曲宴時教坊樂官皆家在雒陽以光逺左右多縱暴取深銜之因陳戲譏光逺而光逺無慙色帝曰元城之役卿左右皆立功未曽酬奬今各與一郡赴任以榮之因命為刺史者數人乃命青州節度使王建立移鎮潞州遂以光逺代焉光逺面奏請與長子同行尋授承勳莱州防禦使及赴任僕從姬媵行李至數千騎滿盈僭侈為方嶽之最下車之後惟以刻剥為事少帝天福八年遣内班曹延丕押玉帶一衣一襲衣著三百疋銀器二百兩御馬二疋賜青州楊光逺是年以單州刺史楊承祚為登州刺史其官告遣前華州節度副使周光遜送之九年遣使詔駙馬都尉楊承祚送長安公主乳母傅姆等一十二人歸于青州示柔服也開運二年杜重威進軍糧九萬八千石鎗一千二百條並在鎮州重威在鎮州日重斂多納與腹心數十輩分利而處皆為宫室㑹有命移鎮而公私未剖朝廷察知遣殿中監王欽祚權知鎮州軍州事降詔以和糴為名比户籍之欽祚性激訐好邀功利既至真定乃痛劾掌事者盡抉摘重威一行所聚儲蓄而條奏焉重威聞之大怒表曰不知臣有何罪王欽祚封鎻臣員寮口食詞甚不遜朝廷不欲傷其意竟不區分尋追還欽祚故重威有是獻將弭其事詔賜重威茶萬斤絹萬疋充軍糧價又賜重威器帛氊帳駿鷹别賜公主衣著百疋以姑息之漢隱帝時湖南馬希廣庻弟希蕚為朗州節度使怒希廣立不以長繇是日尋干戈相侵伐希廣希蕚交訐於朝廷累降詔和解之周太祖廣順二年八月樞密使王峻貢第三表辭解重任賜詔不允翊日峻入朝進謝恩馬三匹峻自居密地常恃舊恩以國政為己任帝頗亦姑息之李重進鄭仁誨向訓等皆帝親舊腹心也峻濳忌之每見仁誨等在帝左右漸見進用尤所不平至是連拜三章求解樞務帝累遣中使就第宣諭每對使者辭氣益厲又發諸道節將書祈請保證旬日之間諸蕃皆遣驛執奏進納峻書帝驚駭久之又遣近臣召令視事稠疊慰勉兼宣云若卿尚未入朝朕當親自迎請峻得宣諭殊未回意且言車駕若來應是致臣於不測之祻也帝知樞密直學士陳觀與峻情通乃詔觀諭意令至峻第觀回奏曰峻意解矣望陛下聲言駕幸但嚴駕以待之峻聞車駕將至即馳至帝黽勉從之峻果入朝謁見於便殿帝慰勞久之即令視事其要君無禮也如此十二月戊申以左千牛衛將軍歐𢎞練為嘉州刺史京兆少尹張仲荀為渝州刺史並放歸本道𢎞練仲荀皆故湖南馬希範之牙將也𢎞練以進奉入朝值本鎮亂歸訃阻絶仲荀本邸官馬氏既亡朝廷以環衛二尹授之至是劉言與𢎞練等書言已為故府攘除寇盜權主山河都無舊人同議藩任已具聞奏請速旋歸故有是命是月丙戍武平軍兵馬留後劉言上表曰臣聞域中至大須歸正統之君海内稱尊合奉真明之主事既縁其道阻機且務於從權關河之信使不通戎政之牋章未逹寔為暌越罪屬稽留臣前年以馬氏弟兄交相魚肉是希崇之失禦致邊鎬之侵疆當道節度使馬光惠早副羣情方施庻政遽多耽惑將亂紀綱三軍商量乃行廢黜臣繆居上將忽被衆推尋且奉表東吳所冀且安西土不謂湖南節度使邊鎬多行間諜常畜隂謀致半年未降於新恩而中使遽來於急詔而又縱横肆意説誘五溪暗行文書廣齎金帛將㑹合欲舉攻状臣請節度副使王進逵行軍司馬何敬真别差指揮使周行逢朱全琇張倣等慮其姦計恐致危亡乃舉兵師去平兇寇自十月三日水陸發兵順水至五日收下沅江九日又下益陽十四日克復湖南越池邊鎬見其危廹陸路奔逃見發竒兵掩後追逐料行狼狽必恐收擒臣素昧兵鈐曽無將畧幸處軍中之長叨司閫外之權念臣節以徒堅望堯堦而尚夐既復瀟湘之土宇永依日月之照臨幸成破竹之功敢慢傾葵之懇且馳單介徑逹皇都謹差節度押牙張崇嗣奉表以聞是年十月内言收湖湘尋差人上章至荆南髙保融留之自先奏其事言聞其未逹乃復令張崇嗣奉表兼别具奏狀縷述其事曰當道去年以湖南馬希蕚弟兄傷寒家國陵夷淮南差邊鎬濳入長沙便為據守扶風一族楚水萬家並押送東呉固無留者當道有兵士二千來衆亦被括將累乞放廻意未允許今春前節度使馬光惠耽荒稍甚僣侈非常三軍商量乃行廢黜臣以位居簉貳衆意推崇辭讓既難藩方無主此際以馬光惠早歸東國累降頒宣臣等例奉甄昇未遑廻變方思述職鄰道可明不謂湖南頻行間鬬彼衆將行討伐當軍須舉兵師冀先定於熊湘復歸明於象闕東呉早以臣權知戎閫未降明恩尋有急徴並令歸國其邊鎬唯懷詭詐多畜姦謀況五溪八州是武陵管屬邊鎬暗齎金帛密與鈎連計料加兵欲謀攻逼於界首益陽縣下砦聚食屯師自謂士卒精强濠塹牢固當道節度副使王進逵行軍司馬何敬真指揮使周行逢朱全琇蒲公益等去十月三日部署大齊雲截波魚龍戰棹等三百餘艘計三萬人並陸路指揮使張倣董從徳等押馬歩兵士二萬餘人同日進發五日收下沅江縣獲賊都監劉承遇其賊將李師徳等五百餘人並束甲歸降至九日到益陽寨賊衆一萬餘人堅守抵扞攻擊自辰至未其砦自潰殺戮八千餘人捉得都指揮使夏昌活擒八百餘人至十一月橋口湘隂數處相次歸降至十三日當軍水陸俱上經長沙城下邊鎬見其兵勢不敢拒張當夜取東路奔逃至十四日進逵敬真差發五千餘人追襲除鎬先次奔竄外掩殺賊衆五百餘人即日進逵敬真入湖南城安撫軍民訖其東吴岳州刺史宋徳權尚倚孤壘亦聚強兵探知搬下舟船亦無鬬志十月十八日差指揮使蒲公益押戰船五十隻兵士三千人到岳州城下其宋徳權即時爇城而竄便令蒲公益權主岳州招撫生聚其潭州上江諸郡邑見差守宰撫安次且言潭州兵戈之後焚燒殆盡乞移使府於朗州帝從之詔昇朗州為都督府在潭州之上三年正月丙辰制武平軍節度留後檢校太尉彭城郡侯食邑一千户劉言可檢校太師同中書門下平章事行朗州大都督充武平軍節度管内觀察處置兼三司水陸發運等使制置武安靜江等軍事進封公邑一千户實封三百户賜推誠定難忠義功臣又以武平軍節度副使權知潭州軍州事檢校太傅新泰縣子邑五百户王進逵可檢校太尉潭州刺史充武平軍節度使改郡侯加邑五百户賜協謀宣力功臣武安軍節度行軍司馬兼衙内歩軍都指揮使檢校太傅廬江縣子邑五百户何敬真可檢校太尉行桂州刺史靜江軍節度使進封侯加邑五百户賜協謀宣力功臣皆劉言之請也又以張倣領睂州刺史充武平軍節度副使朱元琇領黄州刺史充靜江軍節度副使宇文瓊領海州刺史充武安軍節度副使周行逢領集州刺史充武安軍莭度行軍司馬自倣以下皆劉言同起之將校也言又遣崇嗣入朝知進奏院賜靴衫銀帶又賜劉言詔曰卿卓立功勳明彰臣節復馬氏所亡之地安楚人仍舊之邦一境土疆方資節制大朝藩屏殊切倚毗凡於錫賜之恩皆奬削平之効惟卿敏逹知朕睠懐今賜卿舊屬湖南在京及諸處莊宅樓店邸務舎屋等又以檢校太保屯衛將軍楊琛檢校太傅領涪州刺史武平軍節度行軍司馬從劉言奏也册府元龜卷一百七十九
