body:
  text: 册府元龜卷七百七十三宋王欽若等撰總録部幼敏書曰惟人萬物之靈若夫幼而慧少而成者益可貴矣中古而下英妙間出乃有特禀異資迥越倫萃岐嶷兆於襁褓頴悟發於齠齡學疑宿習動彰黙識或未就外傅已通羣籍甫及志學即為人師識洞於未萌智表於先見心計足以成務口辯足以解紛老成之姿著於容止賦筆之麗成於俄頃至行出於天性𤣥譚絶於流俗時軰推尚英聲騰騖斯仲尼所謂生知之者歟后稷名棄為兒時屹如巨人之志其遊戲種樹麻菽麥及成人遂好耕農相地之宜宜榖者稼穯焉民皆法則之帝堯聞之舉棄為農師楚蒍賈為大夫楚子將圍宋使子文治兵於暌終朝而畢不戮一人子玉復治兵於蒍終日而畢鞭七人貫三人耳國老皆賀子文子文飲之酒賈尚幼後至不賀子文問之對曰不知所賀子之傳政於子玉曰以靖國也靖諸内而敗諸外所獲幾何子玉之敗子之舉也舉以敗國將何賀焉且子玉剛而無禮不可以治民過三百乗其不能以入矣茍入而賀何後之有子玉果敗於城濮周王孫滿尚幼秦師過周北門左右免冑而下超乗者三百人王孫滿觀之言於王曰秦師輕而無禮必敗謂過天子門不卷甲束兵超乗示勇輕則寡謀無禮則脱脱易也入險而脱又不能謀能無敗乎晉果敗秦師于殽獲秦三帥以歸范匄晉大夫也士燮之子士燮范文子也晉楚遇於鄢陵楚晨壓晉軍而陳軍吏患之匄趨進曰塞井夷竈陳於軍中而疏行首疏行首者當陳前决開營壘為戰道也晉楚惟天所授何患焉文子執戈逐之曰國之存亡天也童子何知焉國僑字子產鄭大夫也魯襄公八年其父子國與子耳侵蔡獲蔡司馬公子燮鄭人皆喜子產不順子產不順衆而喜曰小國無文德而有武功禍莫大焉楚人來討能勿從乎從之晉師必至晉楚伐鄭自今鄭國不四五年弗得寧矣子國怒之曰爾何知國有大命而有正卿童子言焉將為戮矣是秋楚子囊伐鄭討其侵蔡鄭及楚平九年十月晉帥諸侯伐鄭鄭人恐乃行成十一月楚子伐鄭鄭及楚平十年九月晉帥諸侯伐鄭鄭及晉平楚救鄭鄭與楚人盟十一年晉伐鄭自是鄭遂服衛公孫彌牟字子之衞大夫也初魯哀公十二年秋衞侯㑹呉呉人藩衞侯之舍既歸效夷言子之尚幼曰君必不免其死於夷乎執焉而又説其言從之固矣出公輙後卒死於越孔子為兒嬉戲嘗陳爼豆設禮容閭丘印齊人年十八道遮齊宣王曰家貧親老願得小仕宣王曰子年尚稚未可也閭丘印對曰不然臣聞昔有顓頊行年十二而治天下秦項槖七歲為聖人師繇此觀之印不肖年不稚矣宣王曰未有咫角驂駒而能服重致遠者也繇此觀之夫士亦華髮墮顚而後可用耳閭丘印曰不然夫尺有所短寸有所長驊驑騄驥天下之俊馬也使之與貍鼬試之於塗竈之間其疾未必能過貍鼬也黄鵠白鶴一舉千里使之與燕服翼試於堂廡之下廬室之間其便未必能過燕服翼也辟閭巨闕天下之利劍也擊石不缺刺石不銼使之與管槀决耳出眯其便未必能過管槀也繇此觀之華髮墮顚與印何以異哉宣王曰善子有善言則何見寡人之晚也印對曰夫雞豚讙嗷即奪鐘鼔音雲霧充咽則奪日月明讒人在側是以見晚也詩曰聽言則對譛言則退庸得進乎宣王拊軾曰寡人有過遂載與之俱歸而用焉田文齊人號孟嘗君靖郭君嬰之子也嬰有子四十餘人文母其賤妾也文以五月五日生嬰告其母曰勿舉也其母竊舉生之及長其母因兄弟而見其子文於嬰嬰怒其母曰吾令若去此子而敢生之何也文頓首因曰君所以不舉五月子者何故嬰曰五月子者長與户齊特不利其父母文曰人生受命於天乎將受命於户邪嬰黙然文曰必受命於天君何憂焉必受命於户則可髙其户耳誰能至者嬰曰子休矣甘羅者甘茂之孫年十二事秦相文信侯吕不韋為舍人秦始皇帝使剛成君蔡澤於燕三年而燕王喜使太子丹入質於秦秦使張唐往相燕欲與燕共伐趙以廣河間之地張唐謂文信侯曰臣嘗為秦昭王伐趙趙怨臣曰得唐者與百里之地今之燕必經趙臣不可以行文信侯不快未有以强也甘羅曰君侯何不快之甚也文信侯曰吾令剛成君蔡澤事燕三年燕太子丹已入質矣吾自請張卿相燕而不肯行甘羅曰臣請行之文信侯叱曰去我身自請之而不肯汝焉能行之甘羅曰夫項槖生七歲為孔子師今臣生十二歲於兹矣君其試臣何遽叱乎於是甘羅見張卿曰卿之功孰與武安君卿曰武安君南挫强楚北威燕趙戰勝攻取破城墮邑不知其數臣之功不如也甘羅曰應侯之用於秦也孰與文信侯專張卿曰應侯不如文信侯專甘羅曰卿明知其不如文信侯專與曰知之甘羅曰應侯欲攻趙武安君難之去咸陽七里而立死於杜郵今文信侯自請卿相燕而不肯行臣不知卿所死處矣張唐曰請因孺子行令裝治行行有日甘羅謂文信侯曰借臣車五乗請為張唐先報趙文信侯及入言之於始皇曰昔甘茂之孫甘羅年少耳然名家之子孫諸侯皆聞之今者張唐欲稱疾不肯行甘羅説而行之今願先報趙請許遣之始皇召見使甘羅於趙趙襄王郊迎甘羅甘羅説趙王曰王聞燕太子丹入質秦歟曰聞之曰聞張唐相燕歟曰聞之曰燕太子丹入秦者燕不欺秦也張唐相燕者秦不欺燕也燕秦不相欺者伐趙危也燕秦不相欺無異故欲攻趙而廣河間王不如齎臣五城以廣河間請歸燕太子與强趙攻弱燕趙王立自割五城以廣河間秦歸燕太子丹趙攻燕得上谷三十城令秦有十一甘羅還報秦乃封甘羅為上卿復以始甘茂田宅賜之漢外黄令舍人兒史失其姓名年十三時項羽擊陳留外黄不下數日降羽悉令男子年十五以上詣城東欲阬之舍人兒令之舍人兒也往説羽曰彭越强刼外黄恐故且降待大王大王又皆阬之百姓豈有所歸心哉從此以東梁地十餘城皆恐莫肯下矣羽然其言乃赦外黄當阬者而東至睢陽聞之皆争下張辟疆留侯之子也吕太后哭惠帝而泣不下泣謂淚辟疆為侍中年十五謂丞相陳平曰太后獨有帝今哭而不悲君知其解未觧謂觧説其意陳平曰何觧辟疆曰帝無壮子太后畏君等今請拜吕台吕產為將將兵居南北軍及諸吕官居中用事如此則太后心安君等幸脱禍矣脱免也丞相如辟疆計請之太后説其哭廼哀賈誼雒陽人年十八能誦詩書屬文稱於郡中後為長沙主簿張湯杜陵人父為長安丞出湯為兒守舍還䑕盜肉父怒笞湯湯掘熏得䑕及餘肉劾䑕掠治傳爰書訊鞠論報傳謂傳逮追送若今之追逆赴對也爰換也以文書代換其口辭也訊考問也鞠窮也謂考問之也論報謂上論之而獲報也并取䑕與肉具獄磔堂下父見之視文辭如老獄吏大驚遂使書獄後為御史大夫終軍少好學以辯博能屬文聞於郡中年十八選為博士弟于至府受遣太守聞其有異材召見軍甚竒之與交結軍揖太守而去後軍死世謂之終桑宏羊武帝時以心計年十三為侍中張禹為兒數隨父至市喜觀於卜相者前久之頗曉其别蓍布卦意時從旁言卜者愛之又竒其靣貌謂禹父曰是兒多知可令學經後位特進封安昌侯童烏揚雄子也雄嘗曰吾家之童烏九齡而與我論元後漢鄧禹字仲華南陽新野人年十三能誦詩受業長安時光武亦遊學京師禹年雖幼而見帝知非常人遂相親附後位至太傅魯恭父為甘陵太守卒官時恭年十二弟丕年七歲晝夜號踊不絶聲郡中賻贈無所受乃歸服䘮禮過成人鄉里竒之恭年十五與丕居太學兄弟俱為諸儒所稱學士争歸之後為司徒張堪年十六受業長安志美行厲諸儒號曰聖童光武微時見堪志操嘗嘉焉官至漁陽太守馮衍幼有竒才年九歲能誦詩書至二十而博通羣書後為司𨽻從事以文過其實廢於家杜安年十歲名稱鄉里至十五入太學號曰神童朱勃年十二能講詩書嘗候馬援兄况勃衣方領能矩步辭言􅈺雅卒為雲陽令馬客卿援子也幼而岐嶷年六歲能應接諸公専對賓客嘗有死罪亡命者來過客卿逃匿不令人知外若訥而沈敏援甚竒之以為將相器故以客卿字焉及援卒客卿亦夭殁周防年十六仕郡小吏光武廵狩汝南召掾吏試經防尤能誦讀拜為守丞任延年十二為諸生學於長安明詩易春秋顯名太學學中號為任聖童後為河南太守卒丁鴻年十三從桓榮受歐陽尚書三年而明章句善論難為都講官至司徒范升少孤依外家居九歲通論語孝經班固年九歲能屬文誦詩賦後為聊城令坐事免呉祐字季英陳留長垣人父恢為南海太守祐年十二隨從到官恢欲殺青簡以冩經書青者以火炙簡令汗取其漬易書復不蠧謂之殺青亦謂之汗簡祐諫曰今大人踰越五嶺逺在海濱其俗誠陋然舊多珍恠上為國家所疑下為權戚所望此書若成則載之兼兩昔馬援以薏苡興謗王陽以衣囊徼名嫌疑之間誠先賢所愼也恢乃止撫其首曰呉氏世不乏季子矣季子謂季札也後為大將軍梁冀長史張覇年數歲而知孝讓雖出入飲食自然合禮鄉人稱為張曽子七歲通春秋復欲進餘經父母曰汝小未能也霸曰我饒為之故字曰伯饒後四遷為侍中卒楊終年十三蜀郡人為郡小吏太守竒其才遣詣京師受業習春秋一云蜀郡有雷震洪曹終上白以為斷獄煩苛所致太守乃令終賦雷電之意而竒之後為郎中卒楊厚母與前妻子不相安厚年九歲思令和親乃託疾不言不食母知其指瞿然改意恩養加篤徴拜議郎三遷至侍郎虞詡字升卿陳國武平人也十二能通尚書後辟太尉府旋遷郎中至尚書令謝廉汝南人與河南趙建章年始十二各能通經尚書左雄竝奏拜童子郎於是負書來學雲集京師知名太學崔駰年十三能通詩易春秋博學有偉才盡通古今訓詁百家之言善屬文少游太學與班固傅毅同時齊名以處士辟車騎將軍掾周爕始在髫鬌而知廉讓十歲就學能通詩論後安帝以元纁羔幣聘爕不起馬續七歲能通論語十三明尚書十六治詩博觀羣籍善九章筭術順帝時為䕶羗校尉遷度遼將軍陳蕃字仲舉汝南平輿人也年十五嘗閑處一室而庭宇蕪穢父友同郡薛勤來候之謂蕃曰孺子何不洒掃以待賓客蕃曰大丈夫處世當掃除天下安事一室乎勤知其有清世志終位至太尉太傅録尚書事荀爽幼而好學年十二能通春秋論語太尉杜喬見而稱之曰可為人師後位至司空黄香江夏安陸人也年十二太守劉䕶召之署門下遂博學經典究精道術能文章京師號曰天下無䨇江夏黄童初除郎中終魏郡太守黃琬江夏安陸人少失父早而辯慧祖父瓊初為魏郡太守桓帝建和元年正月日食京師不見而瓊以狀聞太后詔問所食多少瓊思其對而未知所况琬年七歲在傍曰何不言日食之餘如月之初瓊大驚即以其言應詔而㴱竒愛之後瓊為司徒琬以公孫拜童子郎辭病不就知名京師時司空盛允有疾瓊遣琬候問㑹江夏上蠻賊事副府副本詣公府也允發書視畢微戲琬曰江夏大邦而蠻多士少琬奉手對曰蠻夷猾夏責在司空因拂衣辭去允甚竒之後位至司徒太尉臧洪年十五以父功拜童子郎知名太學後為東郡太守陳實為太邱長出於單微自為兒童雖在戲弄為等類所歸荀悦為秘書監侍中初年十二能説春秋貧無書毎之人家所見篇牘一覽多能誦記孔融為北海相幼有異才年十歲隨父詣京師時河南尹李膺以簡重自居不妄接士賓勑外自非當世名人及與通家皆不得白融欲觀其人故造膺門語門者曰我是李君通家子弟門者言之膺請融問曰高明祖父嘗與僕有恩舊乎融曰然先君孔子與君先人李老君同德比義而相師友則融與君累世通家衆坐莫不歎息大中大夫陳煒後至坐中以告煒煒曰夫人少而聰了大未必竒融應聲曰觀君所言將不早慧乎膺大笑曰高明必為偉器融後為曹公所殺融二子皆齠齓融既見収顧謂二子曰何以不辭二子俱曰父尚如此復何以辭以為必俱死也一云二子年八歲時方奕碁融被収二子端坐不起左右曰若父見執而不起何也二子曰安有巢毁而卵不破者魏邴原年十一而䘮父家貧早孤鄰有書舍原過其傍而泣師問曰童子何悲原曰孤者易傷貧者易感夫書者必皆具有父兄者一則羡其不孤二則羡其得學心中惻然而為涕零也師亦哀原之言而為之泣曰欲書可耳答曰無錢資師曰童子茍有志我徒相教不求資也於是遂就書一冬之間誦孝經論語自在童齓之中嶷然有異後為五官將長史卒賈達字梁道河東襄陵人自為兒童戲弄嘗設部伍祖父習異之曰汝大必為將率口授兵法數萬言終豫州刺史司馬朗字伯達九歲人有道其父字者朗曰慢人親者不敬其親也客謝之十二歲試經為童子郎監試者以其身體壯大疑朗匿年劾問朗曰朗之内外累世長大朗雖穉弱無仰高之風損年以求蚤成非志所為也監試者異之後至兖州刺史王弼字輔嗣幼而察慧年十餘歲好左氏通辯能言後為尚書鍾㑹太尉繇小子敏慧夙成五歲繇遣見蔣濟濟甚異之曰非常人後為司徒任昭先名嘏世為著姓夙智蚤成鄉人為之語曰蔣氏翁任氏童年十四始學疑不再周三年中誦五經皆曉其義兼包羣言無不綜覽於時學者號之為神童荀攸字公達彧從子也祖父曇廣陵太守攸少孤及曇卒故吏張權求守曇墓攸年十三疑之謂叔父衢曰此吏有非常之色殆將有姦衢寤乃推問果殺人亡命繇是異之一云攸年十八歲衢曽醉誤傷攸耳而攸出入遊戲常避䕶不欲令衢見衢後聞之大驚其夙智如此位至尚書令常林河内溫人年七歲有父黨造門問林伯先在否汝何不拜林曰雖當下客臨子字父何拜之有於是咸共嘉之後為光禄大夫管輅年八九歲便喜仰視星辰得人輙問其名夜不肯寐父母常禁之猶不可止自言我年雖少然眼中喜視天文嘗云家雞野鵠猶尚知時况於人乎與隣比兒共戲土壤中特畵地作天文及日月星辰毎答言説事語皆不常宿學耆人不能折之皆知其當有大異之才父為琅琊郡丘長時年十五來至官舍讀詩論語及易本便開胸布筆辭義斐然于時黌上有逺方及國内諸生四百餘人皆服其才也琅琊太守單子春雅有才度聞輅一黌之雋欲得見輅父即遣造之太守賓客百餘人坐上有能言之士輅問子春府君名士加有雄貴之資輅既年少膽未堅剛若欲相觀懼失精神先飲三升清酒然後而言之子春大喜便斟三升清酒獨使飲之酒盡之後問子春今欲與輅為對者若府君四坐之士邪子春曰吾欲自與卿旗皷相當輅言始讀詩論語易本學問微淺未能上引聖人之道陳秦漢之事但欲論金木水火土鬼神之情耳子春言此最難者而卿以為易邪於是唱大論之端遂經於隂陽文采葩流枝葉橫生少引聖籍多發天然子春及衆士互共攻詰論難蜂起而輅人人答對言皆有餘至日向暮酒食不行子春語衆人曰此年少盛有才器聽其言論正似司馬犬子遊獵之賦何其磊落雄壯英神以茂必能明天文地理變化之數不徒有言也於是發聲徐州號之神童後為少府丞蜀諸葛瞻字思遠亮子也亮與兄瑾書曰瞻今已八歲聰慧可愛嫌其蚤成不為重器耳十七尚公主拜騎都尉後為衞將軍呉虞翻少好學有高氣年十二客有候其兄者不過翻翻追與書曰僕聞虎魄不取腐芥磁石不受曲針過而不存不亦宜乎客得書竒之繇是見稱仕為騎都尉陸績年六歲於九江見袁術術出橘績懷三枚去拜辭墮地術謂曰陸郎作賓客而懷橘乎績跪答曰欲歸遺母術大竒之孫䇿在呉張昭張紘秦松為上賓共論四海未泰須當用武治而平之績年少末坐遥大聲言曰昔管夷吾相齊桓公九合諸侯一匡天下不用兵車孔子曰遠人不服則修文德以來之今論者不務道德懷取之術而惟尚武績雖童蒙竊所未安也昭等異焉後為鬱林太守諸葛恪少有才名發藻岐嶷辨論應下莫與為對大帝見而竒之謂父瑾曰藍田生玉眞不虚也位至太傅荆揚州牧督中外諸軍事朱桓子異張惇子純與張儼俱童少往見驃騎將軍朱據據聞三人才名欲試之告曰老鄙相聞渴甚矣夫騕䮍以迅驟為功鷹隼以輕疾為妙其為吾各賦一物然後乃坐儼乃賦犬曰守則有威出則有獲韓盧宋鵲書名竹帛純賦席曰席以冬設簟為夏施揖讓而坐君子攸宜異賦弩曰南嶽之榦鍾山之銅應機命中獲隼高墉三人各隨其目所見而賦之皆成而後坐據大歡悦桓後為前將軍青州牧沈友豫章人年十一太守華歆出行風俗見而異之因呼曰沈郎可登車語乎友逡廵却曰君子講好㑹宴以禮今仁義陵遲聖道漸壞先生衘命將以裨補先王之教整齊風俗而輕脱威儀猶負薪救火無乃更崇其熾乎歆慙曰自桓靈以來雖多英彦未有幼童若此者仕為丹陽太守丁覽山隂人八歲而孤家又單微清身立行用意不苟推賄從弟以義讓稱為功曹守始平長徐平字伯先太末人童齓知名虞翻甚愛之屢稱歎焉後為武昌左都督册府元龜卷七百七十三
