body:
  text: 冊府元龜卷五百八十七宋王欽若等撰掌禮部奏議第十五唐吳陽吾為成均博士則天聖厯元年臘月辛亥制每月一日於明堂拜告朔之禮博士辟閭仁諝奏議曰謹按經史正文無天子每月告朔之事唯禮記玉藻云天子聽朔於南門之外周禮天官太宰正月之吉布政于邦國都鄙干寶注云周正建子之月告朔日也此即玉藻之聽朔矣今每年歲首元日於通天宫受朝讀時令布政事京官九品已上諸州朝集使等咸列於廷此則聽朔之禮畢而合於周禮玉藻之文矣而鄭𤣥注玉藻聽朔以秦制月令有五帝五官之事遂云凢聽朔必特牲告其時帝及其神配以文王武王此鄭注之誤也故漢魏至今莫之用按月令云其帝太昊其神勾芒者謂宣布時令告示下人其令詞云其帝其神爾所以敬授之欲使人奉其時而務其業每月有令故謂之月令非謂天子月朔日以祖配帝而祭告之其每月告朔諸侯之禮也故春秋左氏傳曰公旣視朔遂登觀臺又鄭注論語云禮人君每月告朔於廟有祭謂之朝享魯自文公始不視朔是諸侯之禮明矣今王者行之非所聞也按鄭所謂告其帝者即太昊等五人告其神者即重黎等五行官雖功施於人列在祀典無天子每月拜祭告朔之文臣謹按禮論及三禮義宗江都集禮貞觀禮顯慶禮及祠令並無天子每月告朔之事若以為代無明堂故無告朔之禮則江都集禮貞觀禮顯慶禮及祠令著祀五方上帝於明堂即孝經宗祀文王於明堂也此則無明堂而著其享祀何為告朔獨闕其文若以為君有明堂即合告朔則周秦有明堂而經典正文並無天子每月告朔之事臣等詳求今古博考載籍既無其禮不可襲非望請停每月一日告朔之祭以正國經竊以天子之尊而用諸侯之禮非所謂頒告朔令諸侯奉而行之義也鳳閣侍郎王方慶又議奏曰謹按明堂天子布政之宫也蓋所以明天氣統萬物動而儀德被於四海者夏曰世室殷曰重屋姬曰明堂此三代之名也明堂天子太廟所以宗祀其祖以配上帝東曰青陽南曰明堂西曰總章北曰𤣥堂中曰太室雖有五名而以明堂為主漢代達學通儒咸以明堂太廟為一漢左中郎將蔡邕立議亦以為然取其宗祀則謂之清廟取其正室則謂之太室取其向陽則謂之明堂取其建學則謂之太學取其圓水則謂之辟雍異名而同事古之制也天子以孟春正月上辛於南郊總授十二月之政還藏於祖廟月取一政班於明堂諸侯孟春之月朝於天子受十二月之政藏於祖廟月取一政而行之蓋所以和隂陽順天道也如此禍亂不作災害不生矣仲尼美而稱之明王之以孝理天下也君以其禮告廟則謂之告朔聽視此月之政則謂之視朔亦曰聽朔雖有三名其實一也今禮官議稱按經史正文無天子每月告朔之事者臣謹按春秋文公六年閏十月不告朔榖梁傳曰閏附月之餘日天子不以告朔左氏傳云閏月不告朔非禮也閏以正時時以作事事以厚生生人之道於是乎在矣不告閏朔棄時政也臣據此文則天子閏月亦告朔矣寧有别月而廢其禮者乎博考經籍其文甚著何以明之周禮太史職云頒告朔於列國閏月告王居門終月又禮記玉藻文云閏月則闔門左扉立于其中並是天子閏月而行告朔之事也禮官又稱玉藻天子聽朔於南門之外周禮天官太宰正月之吉布政於邦國都鄙干寶注云周建子之月告朔日也此即玉藻之聽朔矣今每歲首元日通天宫受朝讀時令布政事京官九品已上諸州朝覲使等咸列於廷此聽朔之禮畢而合於周禮玉藻之文禮論及三禮義宗江都集禮貞觀禮顯慶禮及祠令無王者告朔之事者臣按玉藻云𤣥冕而朝日於東門之外聽朔於南門之外鄭𤣥注云朝日春分之時也東門皆謂國門也明堂在國之陽每月就其時明堂而聽朔焉卒事反宿於路寢凡聴朔必以特牲告其時帝及其神配以文王武王臣謂今歲首元日通天宫受朝讀時令及布政自是古禮孟春之上辛受十二月之政藏於祖廟之禮爾而月取一政班於明堂其義昭然猶未行也即如禮官所言遂闕其事臣又按禮記月令天子每月居青陽明堂總章𤣥堂即是每月告朔之事先儒舊說天子行事一年十八度入明堂大享不問卜一入也今禮官立義唯歲首一入爾與先儒旣異臣不敢同鄭𤣥云凡聽朔告帝臣愚以告朔之時五方上帝之一帝也春則靈威仰夏則赤熛怒秋則白招拒冬則叶光紀季月則含樞紐也並以始祖而配之人帝及神列在祀典亦於其月而享祭之魯自文公始不視朔子貢見其禮廢欲去其羊孔子以羊存猶可識其禮羊亡禮遂廢故云爾愛其羊我愛其禮也漢承秦滅學庻事草創明堂辟雍其制作闕漢武帝封禪始造明堂於太山旣不立於京師所以無告朔之事至漢平帝元始中王莽輔政庻幾復古乃建明堂辟雍焉禘祫於明堂諸侯王列侯宗室子弟九百餘人助祭畢皆益户賜爵及金帛贈秩補吏各有差漢末喪亂尚傳其禮爰至後漢祀典仍存明帝永平二年郊祀五帝於明堂以光武配祭牲各一犢奏樂如南郊董卓西移載籍湮滅告朔之禮於此而墜曁于晉末戎馬生郊禮樂衣冠掃地總盡元帝過江是稱狼狽禮儀制度南遷蓋寡彛典殘缺無復舊章軍國所資臨事議之旣闕明堂寧論告朔宋朝何承天纂集其文以為禮論雖加編次事則闕如梁代崔靈恩撰三禮義宗但捃摭前儒因循故事而已隋大業中煬帝命學士撰江都集禮指抄撮舊禮更無異文貞觀禮顯慶禮及祠令不言告朔者蓋為厯代不傳所以其文遂闕各有由緒不足依據今禮官引為明堂證在臣誠實有疑陛下肇建明堂幸遵古典告朔之禮猶闕舊章欽若稽古應須補葺若每月聽政於明堂事亦煩數孟月視朔亦不可廢帝又令春官廣集鴻儒取方慶仁諝所奏議定得失陽吾與太學博士郭山惲奏曰臣等謹按周禮禮記及三傳皆有天子告朔之禮天子頒告朔於諸侯秦政焚滅詩書繇是告朔禮廢今明堂肇建總章新立紹百王之絶軌樹萬代之鴻規上以嚴祀祖宗下以敬授時令使人知禮樂道適中和災害不生禍亂不作今若因修班朔每月依行禮貴隨時事須沿革望依王方慶議用四時孟月及季夏於明堂修復告朔之禮以頒天下其帝及神亦請依方慶用鄭𤣥義告五帝於堂上則嚴配之道通於神明至孝之德光於四海制從之祝欽明為禮部尚書中宗神龍元年三月制東都創置太廟社稷太常博士張齊賢建議曰昔孫卿子云有天下者事七代有一國者事五代則天子七廟古今逹禮故尚書稱七代之廟可以觀德祭法稱王立七廟一壇一墠王制云天子七廟三昭三穆與太祖之廟而七莫不尊始封之君謂之太祖太祖之廟百代不遷祫祭之禮毁廟之主陳於太祖未毁之主皆升合食於太祖之廟太祖東向昭南向穆北向商之契周之后稷是也太祖之外更無始祖但商自𤣥王已後十有四代至湯而有天下周自后稷已後十有七代至武而有天下其間代數稍遠遷廟親廟皆出太祖之後故合食有序尊卑不差其後漢高受命無始祖即以高皇帝為太祖太上皇之父立廟享祀不在昭穆合食之列為尊於太祖故也魏武創業文帝受命亦即以武帝為太祖其高皇太皇處士君等並為屬尊不在昭穆合食之列晉宣創業武帝受命亦即以宣帝為太祖其征西豫章潁川京兆府君等亦為屬尊不在昭穆合食之列歴兹己降至于有隋宗廟之制斯禮不易故宇文氏以文皇帝為太祖隋室以武元皇帝為太祖國家誕受天命累聖重光景皇帝始封唐公實為太祖中間代數旣近列在三昭三穆之内故皇家太廟唯有六室其𢎞農府君宣光二帝尊於太廟親盡則遷不在昭穆合食之數今皇極再造孝思匪寧奉二月二十九日勅七室已下依舊號尊崇文奉三月一日勅旣立七廟須尊崇始祖速令詳定者伏尋禮經始祖即是太祖太祖之外更無始祖周朝太祖之外以周文王為始祖不合禮經或有引白虎通義云后稷為始祖文王為太祖乃鄭𤣥注詩雍序云太祖謂文王以為說者其義不然彼以禮王者祖有功而宗有德周人祖文王而宗武王故謂文王為太祖爾非祫祭羣主合食之太祖今之議者或有欲立凉武昭王為始祖斯為不可何者昔在商周稷卨始封湯武之興祚繇稷卨故以稷卨為太祖即皇家之景皇帝是也凉武昭王勲業未廣後主失國守土不傳景皇始封實基明命今乃捨封唐之盛烈崇西京之逺構考之前古實乖典禮魏氏不以曹參為太祖晉氏不以殷王卬為太祖宋氏不以楚元王為太祖齊梁不以蕭何為太祖陳隋不以胡公楊震為太祖則皇家安可以凉武昭王為太祖乎漢之東京大議郊祀多以周郊后稷漢當郊堯制下公卿議者僉同帝亦然之唯杜林正議獨以為周室之興祚繇后稷漢室特起功不緣堯祖宗故事所宜因循竟從林議又傳云欲知天上事問長人以其近之武德貞觀之時主聖臣賢其去凉武昭王蓋亦近於今矣當時不立者必不可立故也今旣年代寖遠方復立之是非三祖二宗之意也實恐景皇失職而震怒武昭虗位而不答非社稷之福也宗廟事重禘祫禮崇先王以之觀德或者不知其說旣灌而徃孔子不欲觀之今朝命惟新宜應愼重祭如神在理不可誣請勅加太廟為七室享宣皇以備七代其始祖不合别有尊崇太常博士劉承慶尹知章又議曰謹按王制天子七廟三昭三穆與太祖而七此載籍之明文古今之遺制皇唐稽考前範詳稱列辟崇建宗靈式遵斯典但以開基之王受命之君王迹有淺深而太祖有遠近昔湯文祚基稷卨太祖代遠出乎昭穆之上故七廟可也若夏繼唐虞功非繇鯀漢除秦項力不因堯及魏晉經圖周隋撥亂皆勲隆近代祖業非遠受命始封之主不離昭穆之親故肇立宗祊罕聞令制夫太祖以功建昭穆以親崇有功百代而不遷親盡七葉而當毁或以太祖代淺廟數非備更於昭穆之上逺立合遷之君曲從七廟之文深乖迭毁之制皇家千齡啟聖四葉重光景皇帝睿德基唐代數猶近號雖崇於太祖親尚列於昭穆且臨六室之位未申七代之尊是知太廟當六未合有七故先朝唯有宣光景元神堯文武六代親廟大帝神主升祔於廟室以宣皇帝代數當滿准禮復遷止有光皇帝以下六代親廟非是天子之廟數不當七本繇太祖有遠近之異故初建有多少之殊敬惟三后臨朝代多儒雅神祊事重禮豈虗存規模可沿理資變革宣皇旣遷其廟不合重立若禮終運徃建議復崇實違古制之文不合先朝之㫖請依貞觀之故事無改三聖之宏規光崇六室不虧古義時有制令宰臣更加詳定禮部尚書祝欽明等奏曰博士三人自分兩義張齊賢以景帝始封為唐宗太祖不合更祖昭王劉承慶以王制三昭三穆不合重崇宣帝臣等商議依張齊賢景皇帝為太祖依劉承慶崇六室制從之是月欽明與禮官等奏謹按經典無先農之文禮記祭法云王自立社曰王社先儒以為其社在藉田詩載芟篇序云春藉田而祈社稷也永徽年中猶名籍田垂拱已後刪定改為先農然先農與社本是一神妄有改張以惑人聽其先農壇請改為帝社以應經禮王社之義其祭先農改為帝社禮仍令用孟春吉亥祠后土以勾龍氏配制從之於是改先農為帝社壇又立帝稷壇禮同太社太稷壇不備方色所以異乎太社也彭景直為太常博士景龍二年諸陵每日奠祭景直以為乖於古禮上疏奏曰謹按三禮正文無諸陵日祭之事惟著宗廟月祭之禮故祭法云天下有王分地建國置都立邑設廟祧壇墠而祭之乃為親疎多少之數是故王立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之逺廟為祧有二祧享甞乃止去祧為壇去壇為墠壇墠有禱焉祭之祭志云天子之始祖及高祖祖考皆每月朔加薦以象平生朔食謂之月祭二祧之廟無月祭此譙周所著與古禮義相附近亦無日祭之文今諸陵月祭有朔望并諸節日朔望則古禮殷事之義矣諸節日猶古薦新之義矣故鄭𤣥注禮記云殷事月朔月半薦新之奠也又注儀禮云月朔月半猶平常之朝夕也大祥之後及諸節四時焉此則古者祭皆在廟近代以來始分月朔月半及諸節日祭於陵寢在廟四時正享及臘為五享前所奏定並依古禮正文不旁求外傳故祭義云祭不欲數數則煩煩則不敬考據經史無日祭於陵唯漢七廟議京師自高祖下至宣帝與太上皇悼皇考各自居陵旁廟又園中各有寢便殿日祭於寢月祭於廟時祭於便殿至元帝時貢禹以為太煩奏請罷郡國廟丞相韋𤣥成等議七廟之外寢園皆無復修奏可議者亦以為不欲祭數數則黷宜復古禮四時祭於廟丞相匡衡亦奏七廟迭毁之義帝從之又數改劉歆以為禮去事有殺引春秋外傳云日祭月祀二祧則時享壇墠則歲貢至後漢陵寢致祭祀無明文以言魏氏三祖皆不祭於墓故晉書云魏文帝黄初元年自作終制立壽陵無封樹無寢殿夫塟者藏也欲人之不明見禮不墓祭欲存亡不黷也明帝遵奉之晉宣帝預於首陽山為土藏不墳不樹歛以時服不設明器景文皆奉成命無所加焉景帝後依宣帝故事自魏三祖以下不於陵寢致祭並附於古禮至於江左亦不崇園寢及宋齊梁陳其祭並無聞今參詳以為三禮者不刋之書懸諸日月外傳所記不與經合不合依慿國家率由典章討論典禮謀事作範垂裕將來擇善而行依經為允其諸陵請准禮停日祭疏奏上謂侍臣曰禮官奏言諸陵准禮不合别進食者但禮因人情事有沿革陵寢如昨祗薦是常乃按日月之期請停朝夕之奠乍覽此奏哀慕增懐乾陵宜依舊朝晡進奠昭獻二陵每日一進所司供辦辛苦可減朕常膳以為常式因􅒣欷久之唐紹為太常博士舊制每年四季之月嘗遣使徃諸陵起居景龍二年三月紹以為准諸事元無此禮止謂送形而徃山陵為幽静之宫迎精而返宗廟為享薦之室但以春秋仲月命使廵陵鹵簿衣冠禮容必備自天授已後時有起居因循至今乃為常事起者以起動為充居者以居止為名詳起居之義非陵寢之法生事以禮必勤於定省死塟以禮當閟於安厝豈可以事居之道行送徃之時敢辭命使勞繁但恐不安靈域又降誕之日穿針之辰皆以續命為名時人多有進奉今聖靈日遠仙駕難追進止起居恐乖先典况京畿傳驛機速極繁加以諸陵徃來其馬便多死損望停四季及䧏誕并節日起居陵使但唯式二時廵陵庻得義合禮經陵寢安謐制不許又武氏昊陵順陵置守户五百人又梁宣王三思及魯忠王崇訓墓各置守户六十人又韋氏褒德廟守户一百人紹以為深乖常典上疏曰謹按昊陵順陵恩勅特令依舊因循前例守户與昭陵數同又先代帝王陵户唯二十人今雖外氏恩隆亦須附近常典請准式量减取足防閑庻無逼上之嫌不失尊崇之道又親王守墓唯得十人梁魯近加追贈不可越於本爵唯令贈官用䕃各减正官一等故知贈之與正義有抑揚禮不可踰理須義制請同親王墓户各置十人為限又太廟宿衛准配正兵縱令壖内掃除還以其兵應役褒徳别加廟户兼配軍人旣益煩勞又虧常典縱使恩加極禮須准太廟汙隆别置百人亦請停不納三年遷左臺侍御史兼太常博士是年十一月十三日乙丑冬至隂陽人盧雅等請奏促冬至就十二日甲子以為吉㑹紹奏曰禮所以冬至祀圜丘於南郊夏至祭方澤於北郊者以其日行纒次極於南北也日北極當晷度循半日南極當晷度環周是日一陽爻生為天地交際之始故易曰復其見天地之心乎即冬至卦象也一歲之内吉莫大焉甲子但為六甲之首一年之内隔月嘗遇旣非大㑹當晷運未周唯總六甲之辰助四時而成歲今欲避環周以取甲子是背大吉而就小吉也太史令傅孝忠奏曰准漏刻經南陸北陸并日校一分若用十二日甲子卽欠一分未南極即不得為至帝曰俗諺云冬至長於歲亦不可改竟依紹議以十三日乙丑祀圜丘焉遷左司郎中又上疏曰臣聞王公以下送終明器等物具標申令品秩高下各有節文孔子曰明器者不用備物以芻靈者善為俑者不仁注曰俑者有面目機發似於生人也以此而塟殆於殉故曰不仁比者王公百官競為厚塟偶人象馬雕飾如生徒以眩耀路人本不因心致禮更相扇慕破産傾資風流遂行下兼士庻若無禁制奢侈日増望請王公已下送塟明器皆依令式並陳於墓所不得衢路將行士庻結親之儀備諸六禮所以承宗廟事舅姑當須昏以為期詰朝謁見徃者下里庸鄙時有鄣車邀其酒食以為戲樂近日此風轉盛上及王公乃廣陳音樂多集徒侣遮擁道路留滯淹時邀致財物動踰萬計遂使鄣車之禮過於聘財歌舞諠譁殊非助感旣虧名教實蠧風猷違紊禮經須加節制請昏嫁鄣車者並令禁斷其犯者官䕃家請准名教例付簿無䕃人决杖六十各科本罪制從之禇无量為國子司業兼修文舘學士景龍二年將親祀南郊禮官博士修定儀注國子祭酒祝欽明司業郭山惲等皆希㫖請以皇后為亞獻无量獨與太常博士唐紹蔣欽緒固争以為不可无量建議曰夫郊祀者帝王之盛事國家之大禮其行禮者不可以臆斷不可以請求皆上順天心下符人事欽若稽古率由舊章然後可以交神明可以膺福祐然禮文雖衆莫如周禮周禮者周公致太平之書先聖極由𠂻之典法天地而行教化辯方位而叙人倫其義可以幽賛神明其文可以經緯邦國備物致用其可忽乎至如冬至圜丘祭中最大皇后内主禮位甚尊若合郊天助祭當具著禮典今遍檢周禮都無此制蓋繇祭天南郊不以地配唯将始祖為主不以祖妣配天故唯皇帝親行其禮皇后不合預也謹按大宗伯職云若王不祭祀則攝位注云王有故代行其祭事下文云凡大祭祀王后不預則攝其薦豆籩不親徹若皇后合助祭承此下文當云若不預祭祀則攝其薦豆今於文上更起凡則是别生餘事與上異則别起凡凡者生上起下之名不專繫於本職周禮一部之内此例極多備在文中不可具錄又王后助祭親薦豆籩而不親徹者按九嬪職云凡祭祀賛后薦注云后進之而不徹則知申徹者為宗伯生文若宗伯攝祭則宗伯親例不别使人又按外宗掌宗廟之祭王后不預則賛宗伯此之一文與上文相證何以明之按外宗唯掌宗廟祭祀不掌郊天足明此文是宗廟祭也按王后行事總在内宰職中檢其職唯云大祭祀後祼獻則賛瑶爵亦如之鄭注云謂祭祀宗廟也注所以知者以文不祼獻祭天無祼以此得知又祭天之噐則用陶匏亦無瑶爵又以此知是宗廟也又内司服掌王后六服無祭天服而巾車職掌王后之五輅亦無后祭天之輅祭天之獻無后亞獻以此諸文叅之故王后不合助祭天也唯漢書郊祀志則有天地合祭皇后預享之事此則西漢末代强臣擅朝悖亂彛倫黷神謟祭不經之典事渉誣神故易傳曰誣神者殃及三代泰誓曰王稽古立功立事可以永年承天之大律斯史䇿之良誡豈可不知今南郊禮儀事不稽古叅守經書不敢黙然請旁詢碩儒俯遵舊典採曲臺之故事行圜丘之正儀使神明叶昭曠之塗天下知文物之盛豈不幸甚時宰相韋巨源等阿㫖叶欽明之議竟不從无量所奏冊府元龜卷五百八十七
