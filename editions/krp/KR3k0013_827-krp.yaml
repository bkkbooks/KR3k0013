body:
  text: 册府元龜卷八百二十七宋王欽若等撰總録部品藻第二魏鍾繇為太尉以為顔子既沒能備九徳不貳其過唯荀彧然或問繇曰君雅重荀君比之顔子自以不及可得聞乎曰夫明君師臣其次友之以太祖之聰明每有大事嘗先諮之荀君是則古師友之義也吾等受命而行猶或不盡相去顧不逺邪文帝問羣臣昔子産治鄭民不能欺子賤治單父民不忍欺西門豹治鄴民不敢欺三不欺於君徳孰優繇與司徒華歆司空王朗對曰臣以為君任徳則臣感義而不忍欺君任察則臣畏覺而不能欺君任刑則臣畏罪而不敢欺任徳感義與夫道徳齊禮有耻且格等趨者也任察畏罪與夫導政齊刑免而無耻同歸者也孔子曰為政以徳譬如北辰居其所而衆星拱之考以斯言論以斯義臣等以為不忍欺不能欺優劣之縣在於權衡非徒低昂之差乃鈞銖之覺也且前志稱仁者安仁智者利仁畏罪者彊仁較其仁者功則無以殊核其為仁者則不得不異安仁者性善者也利仁者力行者也彊仁者不得已者也三仁相比則安仁優矣易稱神而化之使民宜之若君化使民然也然則安仁之化與夫彊仁之化優劣亦不得不相縣絶也然則三臣之不欺雖同所以不欺異矣則純以恩義崇不欺與以威察成不欺既不可同槩而比量又不得錯綜而易處楊阜字義山天水冀人以州從事為牧韋端使詣許拜安定長史阜還關右諸將問袁曹勝敗孰在阜曰袁公寛而不斷好謀而少决不斷則無威少决則失後事今雖彊大終不能成大業曹公有雄才逺略决機無疑法一而兵精能用度外之人所任各盡其力必能濟大事者也何晏與夏侯𤣥等名盛於時司馬景王亦預焉晏嘗曰唯深也故能通天下之志夏侯泰初是也唯㡬也故能成天下之務司馬子元是也唯神也不疾而速不行而至吾聞其語未見其人蓋欲以神况諸已也晏位至尚書陳羣字長文明帝時為司空時太尉華歆淡於財欲其後寵賜諸公莫及然終不植産業羣嘗歎曰若華公可謂通而不泰清而不介者矣羣與孔融論汝潁人物羣曰荀文若公達休若友若公豫當今並無對臣欽若等曰荀彧字文若荀攸字公達荀衍字休若荀諶字友若荀説字公豫崔林為司空嘗與司空陳羣共論冀州人士稱崔琰為首羣以智不存身貶之林曰大丈夫為有邂逅耳即如卿諸人良足貴乎杜恕字務伯時張閣字子臺以簡質聞恕著家戒稱閣曰張子臺視之似鄙樸人然其心中不知天地間何者為美何者為好敦然似能與隂陽合徳者作人如此自可不富貴然而患禍當何從而來世有髙亮如子臺者皆多力慕體之不如也後官至幽州刺史征北將軍蔣濟字子通時汝南許靖字文休夙有名譽既以篤厚為稱又以人物為意雖行事舉動未悉允當濟以為大較廊廟器也濟萬機論許子曰許文休者大較廊廟器也而子孫貶之若實不貴之是不明也誠今知之蓋善人也濟位至太尉陳登為廣陵太守請陳矯為功曹使矯詣許謂曰許下論議待吾不足足下相為觀察還以見誨矯還曰聞逺近之論頗謂明府驕而自矜登曰夫閨門雍穆有徳有行吾敬陳元方兄弟淵清玉潔有禮有法吾敬華子魚清修疾惡有識有義吾敬趙元達博聞彊記竒逸卓犖吾敬孔文舉雄姿傑出有王覇之畧吾敬劉𤣥徳所敬如此何驕之有餘子𤨏𤨏亦焉足録哉登雅意如此而深敬友矯管輅字公明冀州刺史裴徽辟為文學從事徽問輅曰何平叔一代才名其實何如輅曰其才若盆盎之水所見者清所不見者濁神在廣博志不務學弗能成才欲以盆盎之水求一山之形形不可得則智繇此惑故説老莊則巧而多華説易則美而多偽華則道浮偽則神虚得上才則淺而流絶得中才則游精而獨出輅以為少功之才也徽曰誠如來論吾數與平叔共說老莊及易嘗覺其辭妙於理不能折之又時人吸習皆歸服之焉益令不了相見得清言然後灼灼耳官至少府丞韋誕字仲將為大鴻臚卿魚豢曰尋省往者魯連鄒陽之徒援譬引類以解締結誠彼時文辯之雋也今覧王粲繁欽阮瑀陳琳路粹諸人前後文㫖亦何不若哉其所以不論者時世異耳余又竊怪其不甚見用以問仲將仲將云仲宣粲字傷於肥戅休伯繁欽字也都無格簡元瑜阮瑀字也病於體弱孔墇陳琳字也實自麄䟽文蔚路粹字也性頗忿鷙如是彼為非徒以脂燭自煎糜也其不髙蹈蓋有繇矣然君子不責備于一人譬之朱漆雖無楨幹其為光澤亦壯觀也鍾㑹字士季為黄門侍郎吏部郎缺文帝問其人於㑹㑹曰裴楷清通王戎簡要皆其選也袁凖字孝尼渙子也官至給事中或問凖諸葛亮何人也曰翼徳雲長與𤣥徳俱起爪牙腹心之臣而武人也晩得諸葛亮因以為佐相而羣臣悦服𤣥徳足信亮足重故也及其受六尺之孤攝一國之政事凢庸之君專權而不失禮行君事而國人不疑如此即以為君臣百姓之心欣戴之矣行法嚴而國人悦服用民盡其力而下不怨及其兵出入如賓行不冦芻蕘者不獵如在國中其用兵也止如山進退如風兵出之日天下震動而人心不憂亮死至今數十年國人歌思如周人之思召公也孔子曰雍也可使南面諸葛亮有焉又曰或云故少府楊阜豈非忠臣哉見人主之非則勃然怒觸之與人言未嘗不道也豈非所謂王臣謇謇匪躬之故者歟答曰然可謂直士忠則吾不知也夫仁者愛人施於君謂之忠施於親謂之孝忠孝其本一也故仁愛之至者君親有過諫而不入求之反覆不得已而言不忍宣也今為人臣見人主失道直詆其非而播揚其惡可謂直士未為忠臣也故司空陳羣則不然其談論終日未嘗言人主之非書數十上而外人不知君子謂羣於是乎長者矣蜀許靖字文休汝南人好為臧否至蜀見王商而稱之曰設使商生於華夏雖王景興無以加也又謂張裔幹理敏捷中夏鍾元常之倫也官至司徒龎統字士元襄陽人羣命為功曹吳將周瑜助先主取荆州因領南郡太守瑜卒統送䘮至吳門人多聞其名及當西還並㑹昌門陸績顧劭全琮皆往統曰陸子可謂駑馬有逸足之力顧子可謂駑牛能負重致逺或問統曰如所目陸子為勝乎統曰駑馬雖精所致一人耳駑牛日行三百里所致豈一人之重哉劭就統宿語因問卿名知人吾與卿孰愈統曰陶冶世俗甄綜人物吾不及卿論帝王之祕策攬倚伏之要最吾似有一日之長劭安其言而親之謂全琮曰卿好施慕名有似汝南樊子昭蔣濟萬機論云許子將褒貶不平以㧞樊子昭而抑許文休劉曄曰子昭㧞自賈豎年至耳順退能守靜進能不茍濟答曰子昭誠自長㓜完潔然觀其臿齒牙樹頰胲吐脣吻自非文休敵也雖智力不多亦一時之佳也績劭謂統曰使天下太平當與卿共料四海之士深與統相結而還為先主軍師中郎將秦宓廣漢人丞相諸葛亮問宓董扶及任安所長宓曰董扶褒秋毫之善貶纎介之惡任安記人之善忘人之過官至大司農吳諸葛恪字元遜蜀樊建以校尉來使值權病篤不自見建權問諸葛恪曰樊建何如宗預也恪對曰才識不及預而雅性過之恪位至大將軍張儼為大鴻臚作黙記論諸葛亮與司馬宣王曰漢朝傾覆天下隳壞豪傑之士競希神器魏氏跨中土劉氏據益州並稱兵海内為世覇王諸葛司馬二相遭值際㑹託身明主或收功於蜀漢或聞名於伊雒丕備既沒後嗣即統各受保阿之任輔翼㓜主不負然諾之誠亦一國之宗臣覇王之賢佐也歴前世以觀近事二相優劣可得而詳也孔明起巴蜀之地蹈一州之上方之大國其戰士人民蓋九分之一也提歩卒數萬長驅祁山慨然有飲馬河雒之志仲達據天下十倍之地仗兼并之衆據牢城擁精鋭無擒敵之意自保而已使彼孔明自來自去若此人不亡則凉雍不解甲中國不解鞍勝負之䇿亦决矣方之司馬不亦優乎薛瑩字道言為散騎常侍常稱王蕃器量綽異𢎞博多通樓𤣥清白節操才理條暢賀卲厲志髙潔機理清要韋曜篤學好古博見羣籍有記述之才胡冲以為𤣥劭蕃曜一時清妙畧無優劣必不得已𤣥宜在先劭當次之蕃華麗文賦之才有過於曜而典誥不及也胡綜為侍中太子登使綜作賔友目曰英才卓越超踰倫匹則諸葛恪精識時機達幽䆒㣲則顧譚凝辯宏達言能釋結則謝景䆒學甄㣲游夏同科則范慎羊道乃私駁綜曰元遜才而疏子嘿精而佷叔發辯而浮孝敬深而狹所言皆有指趣而道卒以此言見咎不為恪等所親後四人皆敗吳人謂道之言有徵周昭為中書郎嘗著書稱歩隲及嚴畯等曰古今賢士大夫所以失名䘮身傾家害國者其繇非一也然要其大歸摠其常患四者而已急論議一也爭名勢二也重朋黨三也務欲速四也急論議則傷人争名勢則敗友重朋黨則蔽主務欲速則失徳此四者不除未有能全也當世君子能不然者亦比比有之豈獨古人乎然論其絶異未若顧豫章諸葛使君歩丞相嚴衛尉張奮威之為美也論語言夫子循循然善誘人又曰成人之美不成人之惡豫章有之矣望之儼然即之也温聽其言也厲使君體之矣恭而安威而不猛丞相履之矣學不求禄心無茍得衛尉奮威蹈之矣此五君者雖徳實有差輕重不同至於趨舍大檢不犯四者俱一揆也昔丁諝出於孤家吳粲繇於牧豎豫章楊其善以並陸全之列是以人無幽滯而風俗厚焉使君丞相衛尉三君昔以布衣俱相友善諸論者因各叙其優劣初先衛尉次丞相而後有使君也其後並事明主經營世務出處之才有不同先後之名須反其初此世常人所决勤薄也至於三君分好卒無虧損豈非古人交哉又魯横江昔杖萬兵屯據陸口當世之美業也能與不能孰不願焉而横江既亡衛尉應其選自以才非將帥深辭固讓終於不就後徙九列遷典八座榮不足以自曜禄不足以自奉至於二君皆位為上將窮富極貴衛尉既無求欲二君又不稱薦各守所志保其名好孔子曰君子矜而不爭羣而不黨斯有風矣又奮威之名亦三君之次也當一方之戍受上將之任與使君丞相不異也然歴國事論功勞實有先後故爵位之榮殊焉而奮威將處此决能眀其部分心無失道之欲事無充詘之求每升朝堂循禮而動辭氣謇謇罔不惟忠叔嗣雖親貴言憂其敗蔡文至雖疏賤談稱其賢女配太子受禮若弔慷愾之趨惟篤人物成敗得失皆如所慮可謂守道見幾好古之士也若乃經國家當軍旅於馳騖之際立覇王之功此五者未為過人至其純粹履道求不苟得升降當世保全名行邈然絶俗實有所師故粗論其事以示後之君子虞翻稱闞澤曰闞生矯傑蓋蜀之揚雄又曰闞儒術徳行亦今之仲舒也翻官至騎都尉晉傅𤣥為司𨽻校尉著書名為傅子或問今之君子曰袁郎中積徳行儉華太尉積徳居順其智可及也其清不可及也事上以忠濟下以仁晏嬰行父何以加諸臣欽若等曰袁煥為郎中令華歆為太尉或問近世大賢君子𤣥答曰荀令君之仁荀軍師之智臣欽若等曰令君荀彧也軍師荀攸也斯可謂近世大賢君子矣荀令君仁以立徳明以舉賢行無謟黷謀能應機孟軻稱五百年而有王者興其間必有名世者其荀令君乎太祖稱荀令君之進善不進不休荀軍師之去惡不去不止也吳彦初仕吳為建平太守吴亡歸晉武帝問彦陸遜陸抗二人誰多也彦對曰道徳名望抗不及遜立功立事遜不及抗張華字茂先每言成公簡清淨比揚子雲黙識擬張安世華位至司空盧欽為侍中奉車都尉著書稱徐邈曰徐公志髙行潔才博氣猛其施之也髙而不狷潔而不介博而守約猛而能寛聖人以清為難而徐公之所易也或問欽徐公當武帝之時人以為通自在涼州及還京師人以為介何也欽答曰往者毛孝先玠字孝先崔季珪琰字季珪等用事貴清素之士于時皆變易車服以求名髙而徐公不改其常故人以為通比來天下奢靡轉相倣效而徐公雅尚自若不與俗同故前日之通乃今日之介也是世人之無常而徐公之有常也樂廣為右僕射少與𢎞農楊凖相善凖之二子曰喬曰髦皆知名於世凖使先詣裴頠頠性𢎞方愛喬有髙韻謂凖曰喬當及卿髦少减也又使詣廣廣性清淳愛髦有神檢謂凖曰喬自及卿然髦尤精出凖笑曰我二兒之優劣乃裴樂之優劣也論者以為喬雖有髙韻而神檢不足樂為得之矣傳暢云喬似凖而踈王濟太原人與同郡孫楚友善濟為本州大中正訪問銓邑人品狀至楚濟曰此人非卿所能名自狀之曰天才英博亮拔不羣濟叔湛少言語初有隱徳人莫能知武帝問濟曰湛誰比濟曰山濤以下魏舒以上時人謂湛上方山濤不足下比魏舒有餘湛聞曰欲處我季孟之間乎濟官至太僕荀崧父頵為羽林右監崧弱冠王濟甚相器重以方其外祖陳郡袁侃謂侃弟奥曰近見荀監子清虛名理當不及父徳性純粹是賢兄軰人也其為名流所賞如此韋忠平陽人少慷慨有不可奪之志閉門修已不交當世裴頠為僕射數言忠於司空張華辟之辭疾不赴人問其故忠曰吾茨簷賤士本無宦情且茂先華而不實裴頠欲而無厭棄典禮而附賊后此豈大丈夫之所宜行耶後為郡功曹裴楷為開府儀同三司有知人之鑒初在河南樂廣僑居郡界未知名楷見而竒之致之於宰府嘗目夏侯𤣥云肅肅如入宗廟中但見禮樂器鍾㑹如觀武庫森森但見矛㦸在前傅嘏汪翔靡所不見山濤若登山臨下幽然深逺謝鯤陳郡人庾敳頴川人皆雋朗士也見裴楷子憲而竒之相謂曰裴憲鯁亮宏達通機識命不知其何如父至於深𢎞保素不以世物嬰心者其殆過之官至光祿大夫武陔為左光禄大夫開府儀同三司少好人倫與潁川陳泰友善文帝甚親重之數與銓論時人嘗問陳泰孰若其父羣陔各稱其所長以為羣泰畧無優劣帝然之泰字𤣥伯羣之子文帝問陔曰𤣥伯何如其父司空也陔曰通雅博暢能以天下聲教為己任者不如也明統簡至立功立事過之王戎有人倫鍳識嘗目山濤如璞玉渾金皆欽其寶莫知名其器王衍神姿髙徹如瑶林瓊樹自然是風塵表物謂裴頠拙於用長荀朂工於用短陳道寧謖謖如束長竿嵇康子紹初徵入雒或謂王戎曰昨於稠人中始見嵇紹昻昻然若野鶴之在鷄羣戎曰君復未見其父耳位至司徒王衍有重名於世時人許以人倫之鍳尤重弟澄及王敦庾敳嘗為天下人士目曰阿平第一子嵩第二處仲第三澄嘗謂衍曰兄形似道而神鋒太儁衍曰誠不如卿落落穆穆然也澄繇是顯名有經澄所題目者衍不復有言輒云已經平子矣戎位至太尉周浚為揚州刺史吳平以陸雲為從事謂人曰陸士龍當今顔子也庾敳為太傅從事中郎見和嶠而歎曰嶠森森如千丈松雖磥砢多節目施之大厦有棟梁之用郄鑒為安西將軍兖州刺史都督揚州江西諸軍假節合肥王敦忌之表為尚書令徵還道經姑熟與敦相見敦謂曰樂彦輔樂廣字也短才耳後生流宕言違名簡考之以實豈勝滿武秋滿奮也耶鑒曰儗人必於其倫彦輔道韻平淡體識冲粹處傾危之朝不可得而親疎及愍懷太子之廢可謂柔而有正武秋失節之士何可同日而言敦曰愍懷廢徙之際交有危機之急人何能以死守之乎以此相方其不减明矣鑒曰丈夫既潔身北面義同在三豈可偷生屈節靦顔天壤耶茍道數終極固當存亡以之耳郭象河南人為東海太傅主簿象著文稱嵇紹父死在非罪曾無耿介貪位而死闇主義不足多象以問郄公曰王裒之父亦非罪死裒猶辭徵紹不辭用誰為多少郄公曰王勝於嵇或曰魏晉所殺子皆仕宦何以無非也答曰殛鯀興禹者以鯀犯罪也若以時君所殺為當耶則同於禹以不當耶則同於嵇又曰世皆以嵇見危授命答曰紀信代漢髙之死可謂見危授命如嵇偏善其一可也以備體論之則未得也顧榮為元帝軍司散騎常侍謂帝曰陸士元貞正清貴金相玉質甘季思忠欵盡誠加以膽幹殊快殷慶元質略有明規文武可施用榮族兄公讓明亮守節困不易操㑹稽楊彦明謝行言皆服膺儒雅賀生沉潛青雲之士陶恭兄弟才力雖少實事極佳凡此諸人皆南金也庾亮為中書監嘗謂周顗曰諸人咸以君方樂廣顗曰何乃刻畫無鹽唐突西子也劉惔沛國人為丹陽尹與桓温善嘗稱之曰温眼如紫石稜鬢作蝟毛磔孫仲謀晉宣王之流亞也惔又稱王濛性至通而自然有節濛每云劉君知我勝我自知時人以惔方荀奉倩濛比袁曜卿王濛字仲祖有風流美譽為中書郎初謝安弱冠詣濛清言良乆既去濛子修曰向客何如大人濛曰此君亹亹而來逼人謝萬為散騎常侍嘗叙漁父屈原季主賈誼楚老龔勝孫登嵇康四隠四顯為八賢論其㫖以處者為優出者為劣以示孫綽綽與往反以體公識逺者則出處同歸謝尚與劉惔共論中朝人士或問杜乂可方衛洗馬不尚曰安得相比其間可容數人惔又云杜乂膚清叔寳神清臣欽若等曰衛玠字叔寶卒於太子洗馬尚官至衛將軍散騎常侍劉訥字令言有人倫鑒識初入雒見諸名士而歎曰王夷甫大鮮眀樂彦輔我所敬張茂先我所不解周𢎞武巧於用短杜方叔拙於用長王敦過江嘗稱王衍曰夷甫處衆中如珠玉在瓦石間敦位大將軍梅陶為尚書陶與親人曹識書曰陶侃機神明鑒似魏武忠順勤勞似孔明陸抗諸人不能及也謝安每言陶公雖用法而常得法外意温嶠為大將軍初以郭文曠達不仕嘗稱曰文有賢人之性而無賢人之才柳下梁踦之亞乎梁踦古之髙士虞斐為金紫光禄大夫王導嘗謂斐曰孔愉有公才而無公望丁潭有公望而無公才兼之者其在卿乎官未達而䘮時人惜之桓彛目禇裒曰季野有皮裏陽秋言外無臧否而内有所褒貶也彛官至宣城内史王羲之字逸少為右軍將軍少時阮裕徵侍中不就還剡山有肥遯之志有以問羲之羲之曰此公近不驚寵辱雖古之沉𡨕何以過此人云裕骨氣不及逸少簡秀不如真長晉劉惔字韶潤不如仲祖思致不如殷浩而兼有諸人之美顔含為光禄勲或問江左羣士優劣答曰周伯仁周顗字之正鄧伯道鄧攸字之清卞望之卞壼字之節餘則吾不知也謝安字安石為太傅王獻之嘗與兄徽之操之俱詣謝安二兄多言俗事獻之寒温而已既出客問安王氏兄弟優劣安曰小者佳客問其故安曰吉人之辭寡以其少言故知之顧愷之為散騎常侍初仕桓温府嘗云愷之體中癡黠各半合而論之正得平耳故俗傳愷之有三絶才絶畫絶癡絶楊亮初歸姚襄待以客禮後奔桓温溫問襄於亮亮曰神明器宇孫䇿之儔而雄武過之羅含為郡功曹刺史庾亮以為部江夏從事太守謝尚與含為方外之好乃稱曰羅君章可謂湘中之琳琅孫綽字興公簡文帝為㑹稽王也嘗與綽商略諸風流人綽言曰劉惔清蔚簡合王濛温潤恬和桓温髙爽邁出謝尚清易令達而濛性和暢能言理辭簡而有㑹綽與髙陽許詢俱有髙尚之志綽與詢一時名流或愛詢髙邁則鄙於綽或愛綽才藻而無取於詢沙門支遁試問綽君何如許答云髙情逺致弟子早已服膺然一詠一吟許將北面矣綽有髙節嘗鄙山濤而謂人曰山濤吾所不解吏非吏隠非隠若以元禮門為龍津則當㸃額暴顋矣綽後為廷尉卿領著作卒庾龢名重一時少所推服嘗稱韓康伯及王坦之曰思理倫和我敬韓康伯志力彊正吾愧王文度終於中領軍王忱范泰外弟也或問忱曰范泰何如謝邈忱曰茂度漫又云何如殷顗忱曰伯道易王廙字世將丞相導從弟也荀闓荀䆳俱過江明帝嘗從容問廙曰二荀兄弟孰賢廙答以闓才明過䆳帝以語庾亮曰䆳真粹之地亦闓所不及繇是議者莫能定其兄弟優劣位至平南將軍荆州刺史李銓為光禄大夫嘗論揚雄才學優於劉向范喬以為向定一代之書正羣籍之篇使雄當之故非所長遂著劉揚優劣論宋范泰為度支尚書僕射陳郡謝琨後進知名髙祖嘗從容問泰琨名輩可以比誰對曰王元太一流人也蔡湛之及見謝安兄弟謂人曰謝𢎞㣲貎類中郎性似文靖中郎𢎞㣲曾祖萬也文靖謝安謚也謝靈運因宴集問謝晦潘岳陸機與賈充優劣晦曰安仁謟於權門士衡邀競無已並不能保身自求多福公閭勲名佐世不得為並靈運曰安仁士衡才為一時之冠方之公閭本自遼絶靈運官至臨川内史雷次宗尤明三禮毛詩南齊衡陽王道度太祖長兄也與太祖俱受學次宗宣帝問二兒學業次宗答曰其兄外朗其弟内潤皆良璞也劉湛為領軍湛外甥王延之阮韜並有早譽湛甚愛之曰韜後當為第一延之為次也延之甚不平每致餉下都韜與朝士同列文帝聞其如此與延之書曰韜云卿未嘗有別意當縁劉家月旦故邪梁沈約字休文吳興人時謝𢎞㣲與瑯邪王恵王球並以簡淡稱人謂約曰王惠何如約曰令明簡次問王球約曰蒨玉淡又次問𢎞㣲約曰簡而不失淡而不流古之所謂名臣𢎞㣲當之又王筠清静好學與從兄泰齊名沈約見筠以為似外祖袁粲謂僕射張稷曰王郎非唯額類袁公風韻都欲相似稷曰袁公見人輒矜嚴王郎見人必娛笑唯此一條不能酷似約位至侍中少𫝊尋加特進卒丘遲為中書侍郎待詔文徳殿天監初到洽兄溉俱蒙擢用溉尤見知賞從兄沆亦齊名髙祖問遲曰到洽何如沆溉遲對曰正情過於沆文章不减溉加以清言殆將難及即召為太子舍人禇向淹雅有器量大通四年出為寧逺將軍北中郎廬陵王長史三年卒官外兄謝舉為製墓銘其略曰𢎞治晉杜乂字推華子嵩慙量酒歸月下風清琴上論者以為擬得其人後魏㳺雅與中書令髙允及太原張偉同業相友雅嘗論允曰前史載卓公卓茂也寛中文饒劉寛字也洪量𥚹心者或弗之信余與髙子遊處四十年矣未嘗見其是非愠喜之色不亦信哉髙子内文明而外柔弱呐呐不能出口余嘗呼為文子崔公崔浩也謂余云髙生豐才博學一代佳士所乏者矯矯風節耳余亦然之司徒之譴起於纎㣲及於詔責崔公聲嘶股戰不能言宗欽已下伏地流汗都無人色髙子敷陳事理申釋是非辭義清辯音韻髙亮明主為之動容聽者無不稱善仁及僚友保兹元吉向之所謂矯矯者更在斯乎宗愛之任勢也威振四海甞召百司於都堂王公已下望庭畢拜髙子獨昇階長揖繇此觀之汲長孺可卧見衛青何抗禮之有向之所謂風節者得不謂此乎知人故不易人亦不易知吾既失之於心内崔亦漏之於形外鍾期止聽於伯牙夷吾見明於鮑叔良有以也北齊邢子廣為長廣太守時盧詢祖與盧思道俱有才名子廣目二盧云詢祖有規檢禰衡思道無氷稜文舉文舉孔融字也隋盧思道初後魏為尚書郎時濟南王彧少有才學當時甚美少與從兄安豐王延明中山王熈並以宗室博古文學齊名時莫能定其優劣思道謂吏部崔林曰二人才學雖並優美然安豐少於造次中山邈於大多未若濟南風流寛雅時人為之語曰三王楚琳瑯未若濟南備員方元善以髙熲有宰相之具嘗言於髙祖曰楊素麄疎蘇威怯愞元胄元昊正似鴨耳可以付社稷者唯獨髙熲善位至國子祭酒楊素有子𤣥感蘇威有子䕫䕫少聰敏楊素甚竒之素每戲威曰楊素無兒蘇䕫無父又楊達為人𢎞厚有局度素每言曰有君子之貎兼君子之心者唯達耳素終於司徒封楚公賀若弼為武侯大將軍煬帝之在東宫嘗謂弼曰楊素韓擒虎史萬嵗三人俱稱良將其間優劣何如弼曰楊素是猛將非謀將韓擒虎是鬬將非領將史萬嵗是騎將非大將帝曰然則大將誰也弼拜曰唯殿下所擇弼意自許為大將唐王珪貞觀中為侍中嘗侍宴太宗謂之曰卿識鑒清通尤善談論自房𤣥齡等咸宜品藻之可自量孰與諸子珪對曰孜孜奉國知無不為臣不如𤣥齡才兼文武出將入相臣不如李靖敷奏詳明出納惟允臣不如温彦博濟繁理劇衆務必舉臣不如戴胄以諫諍為心耻君不及於堯舜臣不如魏徵至於激濁揚清疾惡好善臣於數子亦有一日之長太宗大喜稱其言為然羣公亦各以為盡已所懷謂之確論岑文本為中書侍郎時馬周有機辯能敷奏文本謂所親曰吾見馬君論事多矣援引事類揚㩁古今舉要刪蕪㑹文切理一字不可加一言不可减聽之靡靡令人忘倦昔之蘇張終賈正應此耳賈言忠髙宗時為侍御史言忠受詔往遼東支度軍糧使廻上問曰卿觀遼東諸將孰賢對曰李勣先朝舊臣聖鑒所悉龎同善雖非鬬將而持軍嚴整薛仁貴勇冠三軍威名逺振髙侃勤儉自處忠果有謀契苾何力沉毅持重有綂御之才雖頗有忌前之癖而臨事能斷然諸將夙夜小心忘身憂國者莫及於李勣上深然其言遽遣使齎璽書以慰勣等潘好禮深慕徐有功為人乃著論曰張釋之為廷尉天下無寃人徐公之斷獄亦天下無寃人畧同耳然而釋之所行者甚易徐公所行者甚難張公逢漢文之時天下無事至如盗髙廟玉環及渭橋驚馬守法而已豈不易哉徐公逢革命之秋屬維新之運唐朝遺老或有包藏禍心至如周興來俊臣者更是堯舜之四㐫也崇餙惡言以誣盛徳忠心側目恐死亡無日矣徐公守死善道深相明白㡬陷囹圄數推網羅此豈不難矣宋璟與蘇頲同知政事璟剛正多所裁斷頲皆順從其美若上前承㫖敷奏及應物則頲為之助相得甚悦璟嘗謂人曰吾與蘇家父子前後皆同時為宰相僕射長厚誠為國器若獻可替否罄盡臣節斷割吏事至公無私即蘓頲過其父也冊府元龜卷八百二十七
