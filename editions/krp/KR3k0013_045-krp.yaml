body:
  text: 册府元龜卷四十五宋欽王欽若等撰帝王部謀畧權畧謀畧夫王者龍興大人虎變莫不乗期運而起膺命厯之數繇是三神眷命百姓與能然後履至尊而制六合發大號而奉帝統者焉若乃經綸草昩之際艱難開創之始維御羣品驅攘醜類决機帷幄之内矢謀俄頃之間密不容髪迅如發矢斯固竒畧獨運宏謨絕出制勝以無失鬭智而邁倫者哉若乃端委南面總制萬幾舉無失䇿識參寰表開物成務而卒以戡濟繇中制外而臻乎底定斯皆禀英睿之姿包逺大之度而能揚茂烈於當世飛淑聲於無窮者也漢高祖十年九月代相國陳豨反帝曰豨嘗爲吾使甚有信代地吾所急故封豨爲列侯以相國守代今乃與王黄等刼掠代地吏民非有罪也能去豨黄來歸者皆舍之帝自東至邯鄲帝喜曰豨不南據邯鄲而沮漳水吾知其亡能爲矣趙相周昌奏常山二十五城亡其二十城請誅守尉帝曰守尉反乎對曰不帝曰是力不足亡罪上令周昌選趙壮士可将者白見四人帝嫚罵曰竪子能爲将乎四人慚伏地帝封各千户以爲将左右諌曰從入蜀漢伐楚賞末徧行今封此何功帝曰非汝所知陳豨反趙代地皆豨有吾以羽檄徴天下兵未有至者今計獨邯鄲中兵耳吾何愛四千户不以慰趙子弟皆曰善又聞豨将皆故賈人帝曰吾知與之矣乃多以金購豨将豨将多降後漢光武爲更始大司馬徇河北先是更始遣尚書令謝躬率六将軍攻王郎不能下會光武至共定邯鄲而躬裨将虜掠不相承禀光武深忌之雖俱在邯鄲遂分城而處然毎有以慰安之躬勤於職事光武常稱曰謝尚書真吏也故不自疑躬既而率其兵數萬還屯於鄴時光武南擊青犢謂躬曰我追賊於射犬必破之尤來在山陽者勢必當驚走若以君威力擊此散虜必成禽也躬曰善及青犢破而尤來果北走隆慮山躬乃留大将軍劉慶魏郡太守陳康守鄴自率諸将軍擊之窮冦死戰其鋒不可當躬遂大敗死者數千人光武因躬在外乃使呉漢與岑彭襲其城漢先令辨士説陳康康然之於是康收劉慶及躬妻子開門納漢等及躬從隆慮歸鄴不知康已反之乃與數百騎輕入城漢伏兵收之手擊殺躬其衆悉降續漢書曰時岑彭已在城中将躬詣傳舍馳白漢漢至躬在彭前伏漢曰何故與兒語遂殺之更始遣李軼朱鮪等守雒陽光武乃以馮異爲孟津将軍拒朱鮪異乃遺李軼書深逹意通書之後更不與異爭鋒異見其信効具以奏聞光武故宣露軼書令朱鮪知之鮪怒遂使人刺殺軼繇是城中乖離多有降者建武十六年郡國大姓及兵長羣盗處處竝起攻刼所在害殺長吏郡縣追討到則解散去復屯結青徐幽冀四州尤甚遣使者下郡國聽羣盗自相糾擿五人共斬一人者除其罪吏雖逗留㢠廻避故縱者皆勿問聽以禽討爲効其牧守令長坐界内盗賊而不收捕者又以畏愞捐城委守者皆不以爲負但取獲賊多少爲殿最唯蔽匿者乃罪之於是更相追捕賊竝解散徙其魁帥於它郡賦田受廪使安生業自是牛馬放牧邑門不閉魏太祖初爲曹公西征馬超韓遂韓遂請與公相見公與遂父同歲孝亷又與遂同時儕軰於是交馬語移時不及軍事但説京都舊故拊手歡笑既罷超等問遂公何言遂曰無所言也超等疑之他日公又與遂書多所㸃竄如遂改定者超等愈疑遂公乃與克日會戰先以輕兵挑之戰良乆乃縱虎騎夾擊大破之斬成宜李堪等遂超等走凉州楊秋奔安定闗中平諸将或問公曰初賊守潼闗渭北道缺不從河東擊馮翊而反守潼闗引日而後北渡何也公曰賊守潼闗如吾入河東賊必引守諸津則西河未可渡吾故盛兵向潼闗賊悉衆南守西河之備虗故二将得擅取西河然後引軍北渡賊不能與吾爭西河者以有二将之軍也連車樹栅爲角道而南既爲不可勝且以示弱渡渭爲堅壘虜至不出所以驕之也故賊不爲營壘而求割地吾順言許之所以從其意使自安而不爲備因畜士卒之力一旦擊之所謂疾雷不及掩耳兵之變化固非一道也晉武帝初爲魏武主簿從討張魯言於魏武曰劉備以詐力虜劉璋蜀人未附而逺爭江陵此機不可失也今若曜威漢中益州震動進兵臨之勢必瓦解因此之勢易爲功力聖人不能違時亦不失時矣魏武曰人苦無足既得隴右復欲得蜀言竟不從魏國既建遷軍司馬言於魏武曰昔箕子陳謀以食爲首今天下不耕者葢二十餘萬非經國逺籌也雖戎甲未卷自宜且耕且守魏武納之於是務農積榖國用豊贍時蜀将闗侯圍曹仁於樊于禁等七軍皆没而仁圍甚急是時漢帝都許昌魏武以爲近賊欲徙河北帝諫曰禁等爲水所没非戰之失於國家大計未有所損而便遷都示敵以弱又淮沔之人大不安矣孫權劉備外親内疎關之得意權所不願也可喻權令犄其後則樊圍自解魏武從之呉大帝果遣将吕蒙西襲公安㧞之關遂爲蒙所獲魏武以荆州遺黎及屯田在潁川者逼近南冦皆欲徙之帝曰荆楚輕脱易動難安雲長新破諸爲惡者藏竄觀望今徙其善者既傷其意将令去者不敢復還從之其後諸亡者悉復業及文帝即位轉丞相長史呉大帝帥兵西過朝議以樊襄陽無榖不可以禦冦時曹仁鎮襄陽請召仁還宛帝曰孫權新破雲長此其欲自結之時也必不敢爲患襄陽水陸之衝禦冦要害不可棄也言竟不從仁遂焚棄二城呉大帝果不爲冦魏文悔之太和元年新城太守孟逹連呉固蜀潛圖中國蜀相諸葛亮慮其爲患逹與魏興太守申儀有隙亮欲促其事乃遣郭模詐降過儀因漏泄其謀逹聞其謀漏泄将舉兵帝恐逹速發以書諭之曰将軍昔棄劉備託身國家國家委将軍以疆埸之任任将軍以圖蜀之事可謂心貫白日蜀人愚智莫不切齒於将軍諸葛亮欲相破惟苦無路耳模之所言非小事也亮豈輕之而令宣露此殆易知耳逹得書大喜猶豫不决帝乃潛軍進討平之初申儀乆在魏興專威疆埸輙承制刻印多所假授逹既誅有自疑心時諸郡守以帝新克㨗奉禮求賀皆聽之帝使人諷儀儀至問承制状執之歸於京師又徙孟逹餘衆七千餘家於幽州蜀将姚靜鄭他等帥其屬七千餘人來降時邊郡新附多無戸名魏朝欲加隱實屬帝朝於京師天子訪之於帝帝對曰賊以密網束下故下棄之宜𢎞以大綱則自然安樂又問二虜宜討何者爲先對曰呉以中國不習水戰故敢散居東闗凡攻敵必扼其喉而摏其心夏口東闗賊之心喉若爲陸軍以向皖城引權東下爲水戰軍向夏口乗其虗而擊之此神兵從天而墮破之必矣天子竝然之五年諸葛亮冦天水天子使帝西屯長安車騎将軍張郃勸帝分軍住雍郿爲後鎮帝曰料前軍獨能當之者将軍言是也若不能當而分爲前後此楚之三軍所以爲黥布禽也遂軍隃麋亮聞大軍且至乃自帥衆将芟上邽之麥諸将皆懼帝曰亮慮多决少必安營自固然後芟麥吾得二日兼行足矣於是卷甲晨夜赴之亮望塵而遁帝曰吾倍道疲勞此曉兵者之所貪也亮不敢據渭水此易與耳進次漢陽與亮相遇帝列陣以待之使将牛金輕騎餌之兵才接而亮退追至祁山亮屯鹵城據南北二山斷水爲重圍帝攻㧞其圍亮宵遁追擊破之俘斬萬計天子使使者勞軍増封邑青龍二年亮又帥衆十餘萬出斜谷壘於郿之渭水南原天子憂之遣征蜀護軍秦朗歩騎二萬受帝節度諸軍欲往渭北以待之帝曰百姓積聚多在渭南此必爭之地也遂引軍而濟背水爲壘因謂諸将曰亮若勇者當出武功依山而東若西上五丈原則諸軍無事矣亮果上原将北渡渭帝遣将軍周當屯陽遂以餌之數日亮不動帝曰亮欲爭原而不向陽遂此意可知也遣将軍胡遵雍州刺史郭淮共備陽遂與亮會於積石臨原而陣亮不得進還於五丈原會有長星墜亮之營帝知其必敗遣竒兵掎亮之後斬五百餘級護生口千餘降者六百餘人景初二年遼東太守公孫文懿反以太尉帥歩騎四萬次於遼水文懿果遣歩騎數萬阻遼隧堅壁而守南北六七十里以距帝帝盛兵多張旗幟出其南賊盡鋭赴之乃泛舟潛濟以出其北與賊營相逼沉舟焚梁旁遼水作長圍棄賊而向襄平諸将言曰不攻賊而作圍非所以示衆也帝曰賊堅營高壘欲以老吾兵也攻之正入其計此王邑所以恥過昆陽也古人曰敵雖高壘不得不與我戰者攻其所必救也賊大衆在此則巢窟虗矣我則直指襄平必人懷内懼懼而求戰破之必矣遂整陣而過賊見兵出其後果邀之帝謂諸将曰所以不攻其營正欲致此不可失也乃縱兵逆擊大破之三戰皆㨗賊保襄平進軍圍之會霖潦大水平地數尺三軍恐欲移營帝令軍中敢有言移者斬都督令史張靜犯令斬之軍中乃定賊恃水樵牧自若諸将欲取之皆不聽司馬陳珪曰昔攻上庸八部竝進晝夜不息故能一旬之半㧞堅城斬孟逹今者逺來而更安緩愚竊惑之帝曰孟逹衆少而食支一年将士四倍於逹而粮不淹月以一月圍一年安可不速以四擊一正令半解猶當為之是以不計死傷與粮競也今賊衆我寡賊饑我飽水雨乃爾功力不設雖當捉之亦何所為自發京師不憂賊攻但恐賊走今賊粮垂盡而圍落未合掠其牛馬抄其樵採此故驅之走也夫兵者詭道善用事變賊慿衆恃雨故雖饑困未肯授首當示無能以安之取小利以驚之非計也朝廷聞師遇雨咸請召還天子曰司馬公臨危制變計日禽之矣正始七年吳冦柤中夷夏萬餘家避冦北渡沔帝以沔南近賊若百姓奔還必復致冦宐權留之曹爽曰今不能脩守沔南而留百姓非長䇿也帝曰不然凡物致之安地則安危地則危故兵書曰成敗形也安危勢也形勢御衆之要不可不審設今賊以三萬人斷沔水三萬人與沔南諸軍相持萬人陸梁柤中将何以救之爽不從卒令還南賊果襲破柤中所失萬計景帝為大将軍魏嘉平末吳太傅諸葛恪圍新城朝議慮其分兵以冦淮泗欲戍諸水口帝曰諸葛恪新得政於吳欲徼一時之利并兵合肥以冀萬一不暇復為青徐患也且水口非一多戍則用兵衆少戍則不足以禦冦恪果并力合肥卒如所度帝於是使鎮東将軍毌丘儉揚州刺史文欽等距之儉欽請戰帝曰恪卷甲深入投兵死地其鋒未易當且新城小而固攻之未可㧞遂命諸将高壘以弊之相持數月恪攻城力屈死傷大半帝乃敕欽督鋭卒趣合榆要其歸路儉帥諸将以為後繼恪懼而遁欽逆擊大破之斬首萬餘級正元二年揚州刺史文欽舉兵向闕帝時帥師征之欽屯項城進軍将攻鄧艾帝潛衘枚徑造樂嘉與欽相遇欽子鴦年十八勇冠三軍謂欽曰及其未定請登城鼓譟擊之可破也既謀而行三譟而欽不能應鴦退相與引而東帝謂諸将曰欽走矣今發鋭軍以追之諸将皆曰欽舊将鴦少而鋭引軍内入未有失利必不走也帝曰一鼓作氣再而衰三而竭鴦三皷欽不應其勢已屈不走何待欽将遁鴦曰不先折其勢不得去也乃與驍騎十餘摧鋒陷陣所向皆披靡遂引去魏文帝丼露二年以大将軍討諸葛誕於淮南命合圍分遣羸疾就榖淮北廩軍士大豆人三升文欽聞之果喜帝愈羸形以示之多縱反間揚言呉救方至誕等益寛恣食俄而城中乏粮石苞王基竝請攻之帝曰誕之謀逆非一朝一夕也聚粮完守外結呉人自謂足據淮南欽既同惡相濟必不便走今若急攻損游軍之力外冦卒至表裏受敵此危道也今三叛相聚於孤城之中天其或者将使同戮吾當以長䇿縻之但堅守三面若賊陸道而來軍粮必少吾以游兵輕騎絶其轉輸可不戰而破外賊外賊破欽等必成擒矣後竟如其言景元四年爲大将軍輔魏政将伐蜀乃謀於衆曰自定夀春已來息役六年治兵繕甲以擬二虜略計取呉作戰船通水道當用千餘萬功此十萬人百數十日事也又南土下濕必生疾疫今宜先取蜀三年之後因巴蜀順流之勢水陸竝進此滅虞定虢吞韓并魏之勢也計蜀戰士九萬居守成都及備他境不下四萬然則餘衆不過五萬今絆姜維於沓中使不得東顧直指駱谷出其空虗之地以襲漢中彼若嬰城守備兵勢必散首尾離絶舉大衆以屠城散鋭卒以畧野劍閣不暇守險闗頭不能自存以劉禪之闇而邉城外破士女内震其亡可知也征西将軍鄧艾以爲未有釁屢陳異議帝患之使主簿師纂爲艾司馬以喻之艾乃奉命於是徴四方之兵十八萬使鄧艾自狄道攻姜維於沓中雍州刺史諸葛緒自祁山軍於武衛絶姜維歸路鎮将軍鍾會等又自駱谷襲漢中遂平蜀元帝時建威将軍周玘自以爲不得調内懷怨望與王恢隂謀誅諸執政推玘及戴若思與諸南士共奉帝以經緯世事謀泄帝聞而秘之召玘爲鎮東司馬未到復改授建武将軍南郡太守玘既南行至蕪湖又下令曰玘奕世忠烈義誠顯著孤所欽嘉今以爲軍諮祭酒将軍如故進爵爲公禄秩僚屬一同開國之例玘忿於迴易又知其謀泄遂憂憤發背而卒明帝聰明有機斷尤精物理屬王敦挾震主之威将移神器帝﨑嶇遵養以弱制強濳謀獨斷廓清大祲改授荆湘等四州以分上流之勢撥亂反正彊本弱枝雖享國日淺而規模宏逺矣後魏道武初爲代王左長史張衮從帝征蠕蠕遁走追之五六百里諸部帥因衮言於帝曰今日追賊粮盡不宜深入請速還軍太祖令衮問諸部帥若殺副馬足三日食不皆言足也帝乃倍道追之及於廣漢赤地南床山下大破之既而帝問衮卿曹外人知我前問三日粮意乎對曰皆莫知也帝曰此易知耳蠕蠕奔走數日畜產之餘至水必留計其道程三日足及輕騎卒至出其不意彼必驚散其勢然矣衮以帝言出告部帥咸曰聖策長逺非愚近所及也又嘗遣賀狄干結婚於姚萇會萇死興立因留狄干興弟平率衆冦平陽道武討平之擒其将狄伯支吏唐小方天賜中詔北新侯安同送興唐小方於長安後蠕蠕社崘與興和親送馬八千匹始濟河赫連屈子忿興與國交好乃叛興邀留社崘馬乃遣使請以駿馬千匹贖伯支而遣狄干還道武意在離間二冦於是許之明元初即位時晉将劉裕伐姚泓帝遣侍中長孫嵩知山東諸軍詣平原縁河北岸又勅簡精兵爲戰備若裕西過者便率精銳南出彭沛如不時過但引軍隨之彼至崤陜間必與姚泓相持一死一傷衆力疲弊比及秋月徐乃乗之則裕可不戰而遯於是叔孫建等尋河趣雒遂入闗嵩與建等自成臯南濟晉諸屯戍皆望塵奔潰裕克長安嵩乃班師孝文時僕射李冲自鄴還京汎舟洪池乃從容謂冲曰朕欲從此通渠於雒南伐之日何容不從此入雒從雒入河從河入汴從汴入渭以至於淮下船而戰猶出户而鬭此乃軍國之大計今溝渠若須二萬人已下六十日有成者宜以漸脩之冲對曰若爾便是士無逺渉之勞戰有兼人之力唐太宗在隋末煬帝爲突厥所圍郡縣皆發兵赴援時帝年未弱冠召募從軍𨽻屯衛将軍雲定興師将發帝勸之多齎旗鼓設疑兵以威突厥定興不納帝謂之曰始畢掃其境内敢圍天子本疑國家倉卒無援忽見旗皷之盛必謂救兵雲集今者進師可前後相次令數十里間連亘不絶晝則幡旗相續夜則鉦鼓相應以張形勢賊必見懼望塵而退此計之上也不然者則爲所輕悉軍來戰公必不能支矣定興從焉将次崞縣突厥候騎馳告始畢曰兵大至矣遂解圍而退果如所籌武德元年十一月帝平薛仁杲於折墌城俘其精兵萬餘人男女五萬口既而諸将奉賀因問曰始大王野戰破賊其主尚保堅城王無攻具輕騎騰逐不待歩兵徑薄城下咸疑不尅而竟下之何也帝曰此以權道迫之使其計不暇發以故克也羅睺恃徃前之勝兼復養銳日乆見吾不出意在相輕今喜吾出悉兵來戰吾雖破之傷殺蓋少若不急躡還走投城仁杲收而撫之則便未可得矣且其兵衆皆隴西人一敗被追不及囬顧散歸隴外則折墌自虗我軍隨而廹之所以懼而降也此乃成筭諸君盡不見耶諸将謝曰實爲聖略乃非凡人所能及也二年十一月討宋金剛于安邑諸将咸請戰帝曰金剛懸軍千里深入吾地精兵驍将皆在於此劉武周自據太原專倚金剛以爲捍蔽金剛雖衆内實空虗虜掠爲資意在速戰我堅營畜銳以挫其鋒分兵汾隰衝其心腹彼粮盡計窮自當遁走當待此機未宜速戰於是遣劉𢎞基張綸進逼西河而晉澮城堡並來歸附賊轉輸路絶其衆遂餒三年四月金剛果遁帝追之及尋相於吕州身先士卒奮擊大破之乗勝逐北一日一夜行二百餘里轉戰數十合士卒疲弊至高壁嶺總管劉𢎞基執馬而諫曰大王功効於此足矣亦宜思自安之計方今草創敵可盡乎且餱糧已竭士卒疲頓更欲何之願且停營待兵粮咸集而後决戰帝曰功者難成易敗機者難遇易失金剛走到介州衆心已沮我及其末定當乗勢擊之此破竹之義也如更遲留賊必生計此失機之道吾家國之事當竭忠盡力豈顧身之安危乎遂策馬而去諸軍乃進莫敢以饑乏爲辭四年討王世充於東都會竇建德以兵十萬來援王世充至於酸棗帝議将拒之蕭瑀屈突通封德彝及諸将等進諫曰腹背受敵恐非萬全請班師且據谷州以觀勝負帝不許曰世充粮盡内外離心我當不勞攻擊坐收其弊耳建德新破海公将驕卒惰今我進據武牢扼其襟要若賊恃勝冒險爭鋒吾當破之必矣賊若不戰旬月之間世充自潰彼敗我振足以臨之一行而定在於斯舉若不速進入武牢諸城新附必不能守二賊并力将如之何通又請解圍就險以候其變帝又不許於是留瑀通輔巢刺王元吉以圍王世充親領歩騎三千五百人趣武牢當時日出軍歴北芒渡河陽而去世充登城因見莫之測也竟不敢出四月帝至武牢建德自滎陽西上帝以數百騎出武牢東二十餘里以挑之徃徃設伏比至賊營纔四騎而已謂左右曰賊見我而旋是其上計乗險追我是其下策賊初見騎少疑爲斥候帝謂曰我秦王也因引弓射之斃其一将賊以五六千騎竝援槍而至從者皆失色帝謂之曰爾但前去我自殿後於是按轡徐行賊至徐引射之斃一賊賊懼而止止而復來如此再三每來必斃賊乃不敢復逼帝且還伏兵相次而發合擊破之獲其大将殷秋石瓚斬首數百級九年初即位突厥遣其腹心執失思力入朝爲覘自張形勢云二可汗總兵百萬今已至矣帝曰我與突厥面自和親汝則背之輙将兵入我畿縣自誇强盛我當先戮爾矣思力懼而請命蕭瑀封德彞請禮遣之帝曰今若放還當謂我懼縶思力於門下省帝出自𤣥武門與侍中高士廉中書令房𤣥齡将軍周範馳六騎隔渭水與可汗語責以負約俄而衆軍縱至精甲曜日連騎蔽野頡利見軍容大盛又知思力就拘繇是大懼是日頡利請和詔許焉蕭瑀進曰初頡利之未和也謀臣猛将多請戰而陛下不納臣以爲疑既而虜自退其策安在帝曰我觀頡利之兵雖衆不整君臣之計唯財利是視可汗獨在水西逹官皆來謁我捽而縳之因擊其衆勢同拉朽然我已令無忌李靖設伏於豳州敵若奔還伏邀其前大軍躡其後覆之如反掌然我即位日淺安靜爲務一與敵戰必有死傷不能忘懐也又敵人一敗或當懼而脩德結怨於我爲患非細我今卷甲韜戈㗖以玉帛彼既得所欲固知其退頑梗驕恣必自是始将欲取之必固與之此之謂也貞觀十九年征遼既渡遼水撤橋梁以堅士卒之志領數百騎至遼東城下見士卒負擔以填塹者帝欲與之同勞苦分尤重者親於馬上持之從官悚動爭齎以送城下及班師渡遼水至渤錯水八十里間遼澤餘潦車馬不通詔長孫無忌楊師道率文武官寮及征兵萬人剪草填道而進水深之處以車爲梁道太宗憂梁道不成自鞘柴馬上詣無忌等以助役睿宗景雲元年八月帝以萬騎十餘人自恃平韋氏功肆行凌暴士庶多苦之竝授以外官又停以戸奴爲萬騎更增置飛騎𨽻於左右羽林衛京師大悦文宗開成三年十月易定軍亂不納新除節度使李仲遷請立故節度使張璠之子元益爲留後宰臣欲議征討帝曰易定兩州地狹人貧軍資半在度支急之即無所不爲緩之則必生變卿不須更言第令謹守封境曾不逾月軍中果有異議但以不便李仲遷爲辭帝亦屈法從人遂罷仲遷而以元益爲代州刺史果至不戮一人以定一方乃神武不殺之功也後唐荘宗初爲晉王天祐四年四月召周德威軍歸晉陽汴人既見班師知其國禍以爲潞州必取援軍無復再舉遂停斥候梁祖亦自澤州歸雒帝知其不備籌之曰賊師寢謀唯憚先帝今聞我新有家禍必謂不能興師又以我少年嗣位未習戎事幸聞變故必有驕怠之心若簡練甲兵倍道兼行出其不意以吾憤激之衆擊彼驕惰之師拉朽摧枯未方其易解圍定霸在此一役甲子軍發自太原己巳王師潞州北黄碾下營五月辛未朔晨霧晦𡨕帝率親軍伏三垂岡下詰旦天復昏霧進軍直抵夾城明宗時總帳下親軍攻東北隅李存璋王覇率丁夫燒寨斸夾城爲二道周德威李存審各分道進攻軍士鼓譟三道齊進明宗壞夾城東北隅率先掩賊不意我師遽至賊黨大恐南向而奔投戈委甲噎塞行路俘斬萬級獲賊将副招討使前鋒都指揮使符道招洎大将三百人夾城中芻粟百萬僞招討使康懷貞得百餘騎出天井闗梁祖聞其敗也大懼既而嘆曰生子當如是李氏爲不亡矣吾家諸子豚犬耳十三年二月與梁将劉鄩相拒於澶州帝知劉鄩将速戰乃聲言歸晉陽誘動其兵帝令副總管李存審守營嚴駕如西行之備實勞軍於貝州劉鄩覘知謂帝已歸晉陽乃令楊延直自澶州率兵萬人會我城下延直夜半至於南門城中選士五百持短兵竊出乗其無備突入其中譟聲動地梁軍自亂踰垣赴塹爭相蹈藉遲明鄩軍自莘至於城東與延直殘衆合劉鄩軍之起也李存審率兵踵其後時命明宗典親軍自魏州出戰俄而帝自貝州至與明宗當其前劉鄩卒見帝軍懼形於色曰乃晉王邪引軍漸却帝追之至於故元城西李存審大軍已成列矣我師前後爲方陣賊於其間爲圓陣賊四面受敵初一合擒賊騎軍數百再合劉鄩引騎軍突西南而走我騎軍追擊之賊步兵合戰短兵既接我軍鼓譟圍之數重埃塵漲天明宗馳鐡騎千餘突入其間賊四向披靡相轥如積我師四面斬擊棄甲之聲聞數十里追討敗衆皆匿於村園茂樹登者既衆其枝殆折皆命下樹遁去騎軍追及河上十萬爲羣赴水而死時賊歩軍七萬殱亡殆盡既定魏州梁将劉鄩據洹水而軍魏人上言曰張源德擅據我貝州源德比是吾人事急必來歸我貝州若下北面無虞可以東出兵師徇地滄海先收郡縣控扼河津不出半年瀕海以西皆爲吾土矣帝曰吾策則不然貝州魏之邊郡壁壘完堅張源德託附劉鄩勢難卒解昨投來者説已又添軍必若攻之未見其可德州是横海支郡西接貝州張源德毎用軍機又與滄帥共爲首尾昨偵德州無備可以輕騎取之我若在彼駐軍二賊自然勢解滄州門外是我戰塲待二竪各保孤城然後乃圍進擊於是遣騎軍五百晝夜兼行襲之羣将不意我師至踰垣而遁遂攻其城以遼州守捉将馬通爲刺史明宗初爲邢州節度使天祐十四年四月契丹阿保機率衆二十萬攻幽州周德威間使告急荘宗召諸将議進趨之計諸将咸言虜勢不能持乆野無所掠食盡自還然後踵而擊之可也帝奏曰德威盡忠於國家孤城被攻危亡在即不宜更待虜衰願假臣突騎五千爲前鋒以援之荘宗曰公言是也即命帝與李存審閻寳率軍赴援帝爲前鋒會軍於易州歩騎七萬三将謀進存審曰契丹合戰唯使騎軍弓良矢勁其鋒難敵我師合戰唯使歩兵若於平原廣野之中卒遇其衆彼若以騎軍十萬馳突我師欲戰不能退則被逐則我屬無遺類矣帝曰彼賊騎以馬上爲生不須營壘我今歩騎之行須有次舍禦備輜重資粮一宿不㸑則士有饑色若平原之中卒遇賊軍被掠輜重資粮則我不戰而自亡矣不如衘枚束甲尋澗谷而直行抵幽州與德威合勢如賊警覺據險枝梧此計之上也長興三年二月雲州上言契丹遣使來求果子帝曰敵中雖闕此物亦彼非實然亦當面偵諜冝阻其求但報云遣使入朝當有處分周太祖乾祐中爲樞密使漢隱帝以河中李守貞叛命詔帝自往用兵帝既奉命與白文珂常思劉詞約以八月二十二日文珂自同州常思自潼闗帝自分陜三道竝進将臨賊城揚旗伐皷聲殷天地歩騎踊躍賊觀之失色白文珂是日奪得闗城立河西砦常思立城南砦帝立城東砦初徵發諸州夫二萬餘分地起長連城諸将啓曰守貞窮冦安能持乆不勞塹地築壘以守之帝曰軍法備不虞兵勢有盈竭蜂蠆有毒而况賊乎退謂白文珂劉詞曰二公老於軍中不言可知守貞自慙反覆常謀背叛畏懼先帝不敢鴟張謂我輩勃興太原事功未著而有輕我之志又聞身到河中便圖自固散金以結豪傑厚利以誘萑蒲山林羣兇豬突豨勇安得不爲吾患加以城闕百倍十圍五攻若驅卒徒赴湯火則所傷多矣若長墉巨塹飛走無門俟其倉廪家財散盡不唯烏合之衆父子安能相保此時梯衝逼脅書檄招呼違禍脱身不呼自至所言兵勢盈竭此之是也當分地配夫速立垣池以謀持乆後思吾言必如此料世宗顯德三年親征淮南幸水砦行至淝橋帝自取石一塊於馬上持之至砦以供飛礟文武從臣過橋者皆齎一石四年十一月幸淮上親領兵破賊砦一所殺淮賊數百人砦在濠州東北十八里灘上其灘廣袤數里淮水浸而圜之乃濠上之咽喉也先是賊據其地泊舟檝以自固恃其四面水深謂我師必不能濟帝之将行也悉索行在槖駝以往臣寮咸不諭其㫖及至命甲士數百人跨槖駝以濟帝又續領騎軍相繼而渡一鼓而盡殪之虜其戰艦而迴五年正月帝在淮上詔發楚州管内丁壮於城西北開老鸛河是時帝将以齊雲船數百艘自淮入江楚州城北舊有北城堰度其舟大難於過堰故開此河以通其路先期令近臣往按地計功迴奏云地形不便又計功甚多帝勿聽因枉駕以視之親授規畫大減丁夫之數旬日而成不愆於素繇是我之戰艦自淮逹江無留滯矣二月帝在淮南甲寅僞天長軍使易贇令男延夀齎表以其城來降天長縣當九驛之路城小而固南人以其地爲雄州帝之破楚州也獲其僞守将張彦卿男光祐捨而不誅因令光祐齎璽書以諭贇贇知楚州既下故降權畧易曰見幾而作不俟終日又曰動靜屈伸唯變所適蓋執物之理則不適事之機守事之常則不逹物之變故聖人德以經其逸權以濟其危神化無方竒謀間出蒙險難而無咎安反側而不疑故能駕馭英豪撥平禍亂使强敵不能以計測姦臣不得以智闚然則取之以權守之以正帝王之道皇皇而有中矣漢高祖初爲漢王三年正月九江王黥布間行與隨何俱歸漢至漢王方踞牀洗洗濯足也而召布入見布大怒悔來欲自殺出就舍帳御飲食從官如漢王居布又大喜過望六月項羽圍成臯漢王跳跳走也獨與滕公從張耳軍脩武至宿傳舍晨自稱漢使馳入壁張耳韓信未起即其卧奪其印符就其卧處麾召諸将易置之信耳起乃知獨漢王來大驚漢王奪兩人軍印即令張耳備守趙地拜信爲相國發趙兵未發者擊齊謂趙人末嘗見發者四年正月與項羽臨廣武之間數羽十罪羽大怒伏弩射中漢王漢王傷胷乃捫足曰虜中吾指漢王病創卧張良彊請漢王起行勞軍以安士卒毋令楚乗勝漢王出行軍疾甚因馳入成臯二月立韓信爲齊王時信平齊使人言漢王曰齊夸詐多變反覆之國南邊楚邊近也不爲假王以鎮之其勢不定今權輕不足以安之臣請自立爲假王當是時楚方急圍漢王於滎陽使者至發書發信使者所齎書也漢王大怒罵曰吾困於此旦暮望而來佐我乃欲自立爲王張良陳平伏後躡漢王足因附耳語曰漢方不利寧能禁信之自王乎不如因立善遇之使自爲守不然變生漢王亦寤因復罵曰大丈夫定諸侯即爲真王耳何以假爲乃遣張良操印立信爲齊王操持也徵其兵使擊楚五年十二月項羽既死漢王還至定陶馳入齊王信壁奪其軍徙封信楚王六年十月楚王信謀反帝問左右左右爭欲擊之用陳平計乃僞遊雲夣在南郡之華容十二月會諸侯於陳楚王信迎謁因執之正月高祖已大封功臣其餘日夜爭功而不决未得行封帝居雒陽南宫從複道望見諸将徃徃耦語以問張良良曰陛下與此屬共取天下今已爲天子而所封皆故人所愛所誅皆平生仇怨今軍吏計功以天下爲不足用徧封言有功者多而土地少而恐以過失及誅故相聚謀反耳帝曰爲之奈何良曰取上素所不快言有舊嫌者也計羣臣所共知最甚者一人先封以示羣臣三月帝置酒封雍齒爲什方侯屬廣漢而急趣丞相御史定功行封羣臣罷酒皆喜曰雍齒且侯我屬無患矣十年九月代相國陳豨反帝親征之至邯鄲令周昌選趙壯士可令將者白見四人帝嫚罵曰竪子能為將乎四人慙皆伏地帝各封千户為將左右諌曰從入蜀漢伐楚賞未徧行今封此何功帝曰非汝所知陳豨反趙代地皆豨有吾以羽檄徵天下兵未有至者檄者以木簡為書長尺二寸用徵召也其有急事則加之鳥羽挿之示疾速也今計唯獨邯鄲中兵耳吾何愛四千户不以慰趙子弟皆曰善哀帝即位太后詔王莽就第避帝外家帝初優莽不聽莽上書固乞骸骨而退帝乃下詔曰曲陽侯根前在位建社稷䇿侍中大僕安陽侯舜往時䕶太子家導朕忠誠專壹有舊恩新都侯莽憂勞國家執義堅固庶幾與為治太后詔休就第朕甚閔焉其益封根二千户舜五百户莽三百五十户以為特進朝朔望帝少而聞知王氏驕盛心不能善以初立故優之後漢光武初為蕭王將北徇時更始遣李軼朱鮪等守雒陽乃以馮異為孟津將軍拒朱鮪異乃遺李軼書軼深逹意通書之後更不與異争鋒異見其信効具以奏聞光武故宣露軼書令朱鮪知之鮪怒遂使人刺殺軼繇是城中乖離多有降者魏太祖嘗討賊廪糓不足私謂主者曰如何主者曰可以小斛以足之太祖曰善後軍中言太祖欺衆太祖謂主者曰特當借君死以厭衆不然事不觧乃斬之取首題徇曰行小斛盗官糓斬之軍門又嘗出軍行經麥中令士卒無敗麥犯者死騎士皆下馬持麥以相付於是太祖馬騰入麥中勅主簿議罪主簿對以春秋之義罸不加於尊太祖曰制法而自犯之何以帥下然孤爲軍帥不可自殺請自刑因㧞劍割髻以置地晉宣帝爲魏太傅與大将軍曺爽有隙稱疾不與政事爽謂帝疾篤遂有無君之心與黄門張當密謀圖危社稷期有日矣帝亦潛爲之備爽之徒屬亦頗疑帝會河南尹李勝将莅荆州來候帝詐疾篤使兩婢侍持衣衣落指口言渴婢進粥皆流出霑胷勝曰衆情謂明公舊風發動何意尊體乃爾帝使聲氣絶屬説年老枕疾死在旦夕君當居并州并州近胡善爲之備恐不復相見以子師昭兄弟爲託勝曰當還忝本州非并州帝乃錯亂其辭曰君方到并州勝復曰當忝荆州帝曰年老意荒不解君言今還爲本州盛德壮烈好建功勲勝退告爽曰司馬公尸居餘氣形神已離不足慮矣他日又言曰太傅不可復濟令人愴然故爽等不復設備景帝爲魏相國揚州刺史文欽與其子鴦舉兵作亂帝以大将軍征之帝目有瘤疾使醫割之鴦之來攻也驚而目出懼六軍之恐䝉之以被痛甚囓被敗而左右莫知焉元帝時周玘行建威将軍自以爲不得調内懷怨望與王恢隂謀誅諸執政推玘及戴若思與諸南士共奉帝以經緯世事謀泄帝聞而秘之召玘爲鎮東司馬未到復改授建武将軍南郡太守玘既南行至蕪湖又下令曰玘奕世忠烈義誠顯著孤所欽嘉今以爲軍諮祭酒將軍如故進爵為公禄秩僚屬一同開國之例玘忿於迴易又知其謀泄遂憂憤發背而卒明帝太寧二年王敦舉兵内向帝宻知之乃乗巴滇駿馬㣲行至湖陰察營壘還敦覺於是使五騎物也追帝帝亦馳去馬有遺糞輒以水灌之見逆旅賣食嫗以七寳鞭與之曰後有騎来可以此示也俄而追者至問嫗曰去已逺矣因以鞭示之五騎傳玩稽留遂久又見馬糞冷以為信逺而止不追帝僅而獲免後魏孝明武泰初薛曇尚為奉朝請時爾朱榮擅疆弁伺朝廷欲揣其情除曇尚員外常侍使於榮託以慰喻然以觀之後周太祖初為夏州刺史侯莫陳悦阻兵隴右太祖志在平之乃令墨曹參軍冀雋偽作魏帝勅書與費也頭令將兵助太祖討悦雋依舊勅模冩偽代舎人主書等署與真無異太祖説費也頭已曽得魏帝書及見此勅不以為疑遂遣歩騎一千受太祖節度武帝沉毅有智謀初以晉公䕶專權嘗自晦迹人莫測其深淺及誅䕶之後始親萬機克已勵精聽覽不怠唐太宗貞觀二十一年寢疾時李勣爲太子詹事帝謂太子曰汝於李勣無恩我今将責出之我死後汝當授以僕射即荷汝恩必致其死力乃出爲壘州都督高宗即位其日召拜雒州刺史加開府儀同三司令中書門下參掌機密尋册拜尚書右僕射德宗建中三年北平王馬燧討田悦於山東時歲旱京師括率人心甚揺鳳翔留鎮幽州兵多離散入西山爲盗殿中丞李雲端與其黨袁封單超俊李誠信等與燧子鴻臚少卿暢善因飲食聚會言時事将危暢乃遣家人溫靖與父書具陳利害可班師還鎮燧怒執靖具奏其状令兄炫執暢請罪帝以燧方討賊不竟其事誅雲端等十二人勅炫就第杖暢三十帝於是罷括率之令四年幸奉天時度支汴東兩稅使包佶所總錢帛八百萬貫爲淮南觀察使陳少遊所奪包於彈丸中置表以少遊脅取財帛事會少遊使繼至帝問曰少遊收包佶財幣有之乎對曰臣發揚州後非所知也帝曰少遊國之守臣或防他盗供費軍旅收亦何傷時方隅阻絶國命未振遠近聞之大驚咸以聖情逹於變通明見萬里後唐太祖爲晉王天復元年六月以汴冦方盛難以兵伏佯降心以緩其謀乃遣牙将張特持帛馬書檄以諭之陳當時利害請復舊好明宗天成末王都據定州叛契丹主遣原知感等九人将騎三萬援都嘉山之戰爲王晏球符彦卿高行周追擊敗之至幽州界竝爲趙德鈞所擒獻於京師諸将請誅之帝曰此八九人胡之驍将也彼以死報主蕃中絶望矣不如留之以愧其情必紓邉患長興中乃賜姓名易蕃號册府元龜卷四十五
