body:
  text: 冊府元龜卷九百二十三宋王欽若等撰總録部不忠不孝不睦不忠古人有言曰竭身命以狥國經夷險而一節者忠臣也若乃三精露昏四海波蕩乃有體被組綬世隆寵渥靡排死以立操翻謀身而敗名或當難而逃歸或臨危而不救締交於㓙虐之伍阿㫖於權倖之門以至懐貳受節挟私謀事草板檄以内毁畫計策而反攻盖廢三綱之正道使百代之可誅豈獨人神之所棄今古共恥者也書之於策可以為訓右宰榖衛大夫也衛侯出奔齊右宰榖從而逃歸衛人將殺之以其從君故欲殺之辭曰余不説初矣言初從軍非説之不獲已耳余狐裘而羔袖言一身盡善雅少其惡喻己雖從君出其罪不多乃赦之桓子為陳司馬鄭子産子展伐陳宵突陳城遂入之陳侯扶其太子偃師奔墓欲逃塜間遇司馬桓子曰載余陳之司馬曰將巡城不欲載公以巡城辭伯嚭為吳太宰吳伐越敗之扶椒太湖中椒山也越王勾踐使大夫種因嚭而行成行成求成也吳王將許之伍子胥諫不聽聽嚭卒許越平與盟而罷兵去後越王滅吳誅嚭以為不忠漢李緒武帝時為塞外都尉居奚侯城匈奴攻之緒降而單于客遇緒常坐李陵上其後漢遣使使匈奴李陵謂使曰吾為漢将歩卒五千人横行匈奴以亡救而敗何負於漢而誅吾家使者曰漢聞李少卿教匈奴為兵陵曰乃李緒非我也陵痛其家以緒而誅使人刺殺緒盧賀封亞夫侯武帝征和二年坐受衛太子節掠死以衛太子擅發兵而賀受其節疑有反心故見考掠而死也晉何曽初仕魏為司𨽻時曹爽専權宣帝稱疾曽亦謝病爽誅乃起視事魏帝之廢也曽預其謀焉王沈初仕魏為侍中髙貴鄉公甚見委重及髙貴鄉公将攻文帝召沈及王業告之沈業馳白帝以功封安平侯邑二千户沈既不忠於主甚為衆論所非郗超為桓恭將軍父愔在北府徐州人多勁悍温常云京口酒可飲兵可用深不欲愔居之而愔素闇於事機遣牋詣温欲共奨王室修復園陵超取視寸寸毁裂乃更作牋自陳老疾甚王廙為左衛將軍及從兄敦搆禍元帝遣廙諭敦既不能諫其悖逆乃為敦所留受任助亂敦得志以廙為平南将軍領護南蠻校尉荆州刺史謝澹安之孫也封柴桑侯澹少歴顯位桓𤣥簒位以澹兼太尉與王謐俱齎冊到姑孰後恭帝元熙中為光禄大夫復兼太保持節奏冊禪宋宋沈懐明為輔國将軍明帝時為潯陽内史行江州事鄧琬挟晉安王子勛為亂懐明與申謙之杜㓜文劉亮率軍討之命豫州刺史劉胡拒子勛於赭圻帝欲綏慰人情遣吏部尚書禇淵至虎檻選用将帥以下申謙之杜㓜文因此求黄門郎懐明與劉亮求中書郎建安王體仁即使褚淵擬選帝不許曰忠臣狥國不謀其報臨難以干朝典當為臣下之節耶後魏髙欽字希叔頗有文學莫折念生之反也欽隨元志西討志敗為賊所擒念生以為黄門郎北齊斛律孝卿為侍中典機宻後主至齊州以孝卿為尚書令勸後主作詔禪位任城王令孝卿齎詔策及傳國璽往瀛州孝卿便詣鄴城歸於周武帝仍從入長安授納言上士隋郭術初仕後周為上柱國宻勸髙祖殺周室諸王早行禪代由是大被親信韋福嗣為内史舎人後以罪出煬帝大業中楊𤣥感之亂以兵逼東都福嗣從衛𤣥戰於城北軍敗為𤣥感所擒令作文檄詞甚不遜尋背𤣥感還東都帝銜之不已車裂於髙陽裴矩為黄門侍郎大業末從煬帝在江都宇文化及反矩晨起将朝至坊門遇逆黨數人控矩馬詣孟景所賊皆曰不闗裴黄門既而化及從百餘騎至矩迎拜化及慰之諭令矩㕘定儀注推秦王子浩為帝以矩為侍中隨化及至河北及僭即位以矩為尚書右僕射加光禄大夫封燕國公薛徳音大業末為著作郎及越王侗稱制東都王充之僣號也車書羽檄皆出其手王充平以罪伏誅唐張均為大理卿均弟垍為太常卿禄山之亂𤣥宗幸蜀次咸陽謂髙力士曰倉皇離京朝官不知所詣今日誰當至此力士曰張垍兄弟世受國恩又連戚屬必當先至是日房琯至帝因問均垍曰臣離京師亦過其舎比約同行均報臣云己於城南取馬觀其趨向来意不切既而均弟兄果受禄山偽命薛兢為武功令𤣥宗幸蜀兢見於路隅帝謂之曰卿飭装便隨朕行兢俯伏不對帝曰不願行亦聽卿且好養人及賊至京師兢受偽官頗失臣節王師收京城兢伏誅後唐蘇循唐末為禮部尚書阿䛕善承順茍容以希進取昭宗自秦還洛也朱温兇勢日滋唐室舊臣隂懐主辱之憤名族之胄往往有違禍不事逆温者唯循希㫖傅㑹朱温之失律江西也屯於夀春要少帝欲授九錫朝臣或議是非循揚言云梁王功業顯大厯數有歸朝廷速宜揖讓時畏温如虎即議行之明年朱温逼遜循為冊禮副使希幸風雲求為宰輔先是循子起居郎楷上疏駁昭宗諡號不可為昭請改諡為襄楷亦附㑹賊心别求進達朱温既僣偽位敬翔惡其為人父子放歸田里乃寓居河中積年㑹荘宗將副人望求唐室舊臣遣使自河中徴赴鄴都初監軍事使張承業惜經國之費未欲議即尊之事諸将賔僚無敢言者及循至鄴入荷城拜魏師㕔謂之拜殿翼日獻畫日筆三十管冀悦帝心其諂進如此承業聞之怒㑹河東節度副使盧汝弼卒因以代之明年春偶不食病瘧而卒孟漢瓊明宗朝為宣徽北院使性通黠善交搆初見秦王權重乃挟王淑妃勢傾心事之及朱宏昭馮贇用任又與之締搆秦王既誅翼日令漢瓊馳騎召閔帝於鄴及帝嗣位尤恃恩寵期月之内累加開府儀同三司驃騎大將軍潞王赴闕閔帝急召漢瓊欲令先入於鄴漢瓊藏匿不至知潞王行及陕州乃單騎至澠池謁見因自慟哭欲有所陳潞王曰諸事不言可知漢瓊即自預從臣之列尋戮于路左漢安叔千初仕晉少帝開運初為左金吾衛上将軍獯戎犯闕百僚迎見於赤崗虜主登髙崗駐馬而撫諭漢官叔千出班夷言虜主曰是安沒字否卿少在邢州屢貢章表有以見卿之效忠也俄授鎮國節度未幾髙祖革命代歸京師自以嘗附虜庭居常愧惕久之授太子太師致仕不孝立徳之厚莫先於仁為仁之本莫大於孝夫以髪膚所禀保抱而成凱風自南載傷於生鞠昊天罔極何報於劬勞茍乖色難尚三牲而無補矧為悖徳固五刑之尤重眇觀舊史具著遺文明徴㓙頑之條以示沮勸之義云爾楚后臧葉公諸梁之弟也魯定公五年吳師敗楚臧從其母於吳不待而歸諸梁司馬沈尹臧之子葉公子髙也吳入楚獲后臧之母楚定臧棄母而歸葉公終不正視之不義之吳起衛人也後為衛将少時家累千金㳺士不遂遂破其家鄉黨笑之吳起殺其謗己者三十人而東出其衛郭門與其母訣齧臂而盟曰起不為卿相不復入衛遂事曽子居頃之其母死起終不歸曽子薄之而與起絶後漢賈閔嗣其祖復封膠東侯章帝建初元年坐誣告母殺人國除人名也蜀姜維天水冀人也少孤與母居後主建興六年丞相諸葛亮軍向祁山天水太守夜亡保上邽時維為中郎参本郡事遂還冀冀不納還詣諸葛亮亮辟為倉曹掾與母相失後得母書令求當歸維曰良田頃不在一畝但有逺志不在當歸也晉賈充為太尉行太子太保録尚書事充前妻李氏淑美有才行其父豐誅李氏坐流徙充後娶郭配女槐性妬忌武帝踐祚李以大赦得還母栁勑充迎李氏槐怒不許充迎李氏及母将亡充問所欲言母曰我教汝迎李新婦尚不肯安問他事遂無言孫㑹侍中秀之子年二十為射聲校尉尚惠帝女河東公主母䘮未期便納聘禮劉肅民荆州刺史毅之子也安帝義熙八年宋髙祖遣振武将軍王鎮襲毅於江陵毅倉卒無為便就子肅民取馬肅民不與朱顯之謂曰人取汝父而惜馬不與汝今自走欲何之奪馬以授毅宋向植父彌以佐命功封曲江縣侯植嗣封以不受母訓奪范曄為長沙王義欣鎮軍長史寜朔将軍兄暠為宜都太守嫡母隨暠在官十六年母亡報之以疾曄不時奔赴及行又擕妓妾自隨為御史丞劉損所奏太祖愛其才不罪也曄家樂器服玩皆珍麗妓妾亦盛飾母住止單陋唯有一厨盛樵薪子冬無被叔父單布衣曄後謀逆將誅其母泣曰主上念汝無極曽不能感恩又不念我老今日奈何仍以手擊曄頸及頬曄色不怍及妓妾来别曄悲泣流連謝况前為㑹稽録事㕘軍以諂佞事巴陵王休若况多受賄賂時内外戒嚴普着袴褶况居母䘮被起聲樂酣飲不異吉人衣冠既無殊異並不知况居䘮嘗自稱孤子衆乃駭愕王長嗣祖華封新建縣侯明帝泰始二年坐罵母奪爵南齊劉彪宋司徒文宣公穆之孫也建元初降封南康縣侯武賁中郎将坐廟墓不修削爵為羽林監又坐與亡弟母楊别居楊死不殯葬為有司奏事寝不出顧昌元為烏程令坐父法秀宋太始中北征死亡屍骸不反而昌元宴樂喜逰常人無異有司請加以清議朱緒秣陵人無行母病積年忽思菰羮緒妻到市買菰為羮欲奉母緒曰病復安能食先嘗之遂併食盡母怒曰我病欲此羮汝何心併啖盡天若有知當令汝哽死緒聞便心中介然即利血明日而死蕭叡明聞之大悲慟不食積日問緒尸在何處欲手自戮之既而曰洿吾刀乃止張植為瀛州刺史其母夏侯氏出家為尼植雖自州送禄奉母及為諸弟而各别資財同居異㸑一門數竈植母既老身又長嫡其臨州也妻子隨去分違數嵗論者譏焉梁栁仲禮為司州刺史父津太子詹事襲封雲杜侯侯景圍城既急而仲禮擁兵来援時邵陵王綸亦在外與仲禮搆怨津登城謂仲禮曰汝君父在難不能盡心竭力仲禮言笑自若景遺以金環仲禮閉營不戰武帝召津問策對曰陛下有邵陵臣有仲禮不忠不孝賊何由平太清三年城陷卒隋鄭譯開皇初為上柱國與母别居為憲司所劾由是除名下詔曰譯嘉謀良策寂爾無聞鬻獄賣官沸騰盈耳若留之於世在人為不道之臣戮之於朝入地為不孝之鬼有累幽顯無以置之宜賜以孝經令其熟讀仍遣與母共居馮忱為尚書兵部郎攝江都郡丞慈明子也李宻逼東都詔令慈明安集瀍雒為宻黨翟讓所害忱先在東都王充破李宻忱亦在軍中遂遣奴負父屍詣東都身不自送未幾又盛花燭納室時論醜之唐李均為殿中侍御史内供奉弟鍔京兆府法曹㕘軍並不守名教配流均於施州鍔於辰州縱㑹非常之赦不在免限均鍔温州人也𤣥宗天寳中州舉道學咸赴京師既升弟㕘官遂割貫長安與郡里絶凡二十餘載母死不舉温州别駕知州事嗣曹王臯具以聞下憲司訊問鍔等俱伏罪帝歎息久之曰三千之刑莫大於此合寘轅裂豈止謫竄焉崔損徳宗貞元中為門下侍郎平章事損身居宰相母野殯不展墓不議遷祔姊為尼歿於近寺終䘮不臨君子罪之鄭方逵先為太僕寺丞元和三年其兄兵部侍郎御史中丞雲逵奏方逵受性兇悖不知君親衆惡備身教訓莫及結聚惡黨江中劫人臣亡父先臣臚杖至一百終不能斃張延賞任揚州日亦曽犯延賞法决殺復蘇至於常言皆呼臣亡父先臣名見戚所知無可教語昨聞於邠寜慶等州干謁節度使及州縣乞丐今見在武功縣南西戎俯近恐有異謀若不冒死奏聞必恐覆臣家族詔曰鄭方逵宜委京兆府錮身遞送黔州付李模於偏逺州驅使勿許東西陸慎餘故京兆府法曹賡之子慎餘與兄博文居䘮衣華服飲酒食肉於坊市為京兆府所奏詔各决四十慎餘流循州博文遞歸本貫獨孤鉉穆宗初為田宏正鎮州從事及王庭凑作亂從事皆遇害鉉時奉使鄰境故得免死其母及血屬皆為庭凑所囚時有周僧逹者繼母即鉉之女弟因隨親至鎮州亦為庭凑所囚鉉聞軍亂懼不敢入留於境上僧達時在京聞亂奔走鎮州謁庭凑諭以逆順之理庭凑雖不能納感其忠孝之心遂許僧達迎其親以歸當時朝議奨僧達之行授渭南縣尉貶鉉為夹州司户自此鉉為士林所鄙崔貽孫自吏部侍郎貶官塞北三子争於舊業分其利以自謀甘㫖醫藥咸莫知之貽孫以書責之曰生有明君真宰死有天曹地府後唐烏正為鎮州都将聞張文禮殺王鎔志復主天雪泣請行兵及鎮陽文禮執其母妻洎兒女十口誘之不回攻城日急文禮忿之咸割鼻斷腕不絶於膚放至軍門觀者皆不忍正視正一慟而止晉程遜為太常卿髙祖天福三年命使吳越母羸老且瞽未嘗白執政以辭之将行母以手捫其面號哭拊背而送之及使回遭風水而溺焉景延廣為侍衛親軍都指揮使少帝時加同平章事及虜騎南牧六師親主澶淵延廣南在軍母㓙訃至自澶淵律北移於津南不信宿而復莅戎事曽無戚容下俚之士亦聞而惡之王瑜范陽人也為太府少卿杜重威之鎮東平也瑜父欽祚為節度副使及重威移鎮常山瑜乃以詭計干重威使奏己為成徳軍節度副使竟代其父位馮傑晉宰相玉之子也玉從少帝北遷虜偽命為太子少保至周太祖廣順二年傑自幽州不告父而亡歸玉懼虜譴責尋以憂恚卒於蕃中楊仁澤前為鄜州三川縣主簿仁澤在父憂制内求官為大理寺所奏詳斷官大理正韓保裔與詳覆官刑部員外郎李知損斷曰伏以楊仁澤父䘮未滿釋服求官人子何堪違律如此宜從追毁以贖典刑餘望依大理寺斷可之漢後贊為飛龍使贊母本倡家也與父同郡往来其家生贊從職四方父未嘗離郡贊既長疑其所生及為内職不欲父之来寓書以致其意父自郡至京師直抵其第贊不得已而奉之不睦夫兄弟之親手足之義也悌順居先友于是切故詩人以棠棣之華敷榮相嫓鶺鴒在原急難為喻洎乎義匪相容情惟不睦寜問共被之恩動起䦧牆之忿尺布斗粟尚或致争連枝同氣豈顧其義乎共叔段鄭荘公弟也初鄭武公娶于申曰武姜生荘公及共叔段荘公寤生驚姜氏故名曰寤生遂惡之愛共叔段欲立之亟請於武公公弗許及荘公即位為之請制公曰制巖邑也虢叔死焉他邑唯命虢叔東虢君也恃制巖險而不修徳鄭滅之叔段復然故問以他邑虢今滎陽縣請京使居之謂之京城太叔公順姜請使段居京請謂之京城太叔言寵異於衆臣京鄭邑今滎陽京縣也京叛太叔段段入于鄢公伐諸鄢太叔出奔共共國今汲郡共縣書曰鄭伯克叔段于鄢段不弟故不言弟如二君故曰克稱鄭伯譏失教也後隠公㑹鄢伯伐許許荘公奔衛隠公以許與鄭鄭伯使大夫百里奉許叔以居許東偏許叔許荘公之弟東偏東鄙也曰寡人有弟不能和協而使餬其口於四方其况能久有許乎漢主父偃為齊相至齊徧召昆弟散五百餘金予之數曰數責也數音所具反始吾貧時昆弟不我衣食衣音于既切食讀曰飮今吾相齊諸君迎我或千里吾與諸君絶矣母復入偃之門薛宣為丞相任政數年宣有弟明修明至南陽太守修歴郡守京兆尹少府善交接得州里之稱後母嘗從修居官宣為丞相修為臨菑令宣迎後母修不遣後母病死修去官持服宣謂修三年服少能行之者兄弟相駮不可駮者執意不全猶如色之間雜修遂竟服繇是兄弟不和魏袁尚冀州牧紹之少子紹愛尚貌美欲以為後而未顯審配逢紀與辛評郭圖争權配紀與尚比評圖與譚比衆以譚長欲立之配等恐譚立而評等為己害緣紹素意乃奉尚代紹位譚至不得立自號車騎将軍由是譚尚有隙太祖北征譚尚譚軍黎陽尚少與譚兵而使逢紀從譚譚求益兵配等議不與譚怒殺紀劉琦荆州牧表之長子也初表及妻愛少子琮欲以為後而蔡瑁張允為之友黨乃出長子琦為江夏太守衆遂奉琮為嗣琦與琮還讐隙夏侯楙伏波将軍惇之子也文帝時為安西将軍妻即清河公主也楙性無武畧而好治生太和二年明帝西征人有白楙者遂召還為尚書楙在西時多蓄伎妾公主由此與楙不和其後羣弟不遵禮度楙數切責弟懼見治乃共搆楙以誹謗令主奏之有詔收楙帝意欲殺之以問長水校尉京兆段黙黙以為此必清河公主與楙不睦出於譛搆冀不推實耳且伏波與先帝有定天下之功宜加三思帝意解曰吾亦以為然乃發詔推問為公主表者果其羣弟子臧子江所搆也蜀許靖汝南人位至司徒少與從弟劭俱知名並有人倫臧否之稱而私情不協劭為郡公曹排擯靖不得齒叙以馬磨自給晉王濟為侍中時父渾為僕射主者處事或不當濟性峻厲明法繩之數與從弟佑不平佑黨頗謂濟不能顧其父由是長同異之言出為河南尹陳騫為大司馬素無謇諤之風弟稚與其子輿忿争遂説騫子女穢行騫表從弟以此獲譏於時也後輿為侍中坐與叔父不睦出為河内太守輿雖無簡正而有力致陶稱侃子也稱為東中郎恃性虓勇與諸弟不協王愷少踐清階為侍中領右衛将軍愷弟愉為輔國将軍愉弟國寳安帝時為中書令中領軍㕘管朝權威震内外時王恭惡國寳亂國討國寳愷愉並請解職以與國寳異生又素不協故得免禍宋周郎為太子舎人兄嶠尚髙祖第四女志氣怯懦而郎少而愛竒雅有風氣與嶠志氣不同嶠甚疾之江智淵湘州刺史夷之弟子也夷有盛名夷子湛又有清譽父子並貴達智淵父僧安少無名問湛禮敬甚簡智淵常以為恨自非節嵗不入湛門後魏陸暐為尚書左户二公郎後除伏波将軍暐與弟恭之並有時譽暐與恭之晚不和睦為時所鄙酈道元字善長為御史中尉弟兄不能篤穆又多嫌忌時論薄之薛懐徹金紫光禄大夫真度嫡子也為車騎将軍真度長庶子懐吉為後将軍汾州刺史懐吉弟懐直懐直弟懐朴懐朴弟懐景懐景弟懐雋真度諸子既多其母非一同産相朋因有争愛興和中遂致訴列云以毒藥相害顯在公府發揚疵釁時人恥焉冊府元龜卷九百二十三
