body:
  text: 册府元龜卷五百二十九宋王欽若等撰諫諍部規諫第六宋何偃為太子中庶子文帝欲更北伐訪之群臣偃議曰内幹胡法宗宣詔逮問北伐伏計羗羯更亂殱殄非難今雖廟筭無遺而兵未精習縁邊鎮戍充實者寡邊民流散多未附業按引所資取給根本虧根本以殉邊患宜動必不克往歲挫傷續以内舋侮亡取亂誠為沛然淮泗數州實亦彫耗流傭未歸創痍未起且攻守不等客主形異薄之則勢難圍之則曠日進退之間姦虞互起竊謂當今之弊易䘏方來之冦不深宜含垢藏疾以齊天道周朗為建平王宏中軍録事叅軍孝武普責百官讜言朗上䟽曰仲尼有言治天下若示諸掌豈徒言哉方策之政息舉在人盖當世之君不為之耳况乃運鍾澆暮世膺亂餘重以宗廟遭不更之酷江淮被未有之痛千里連死萬井垂泣而秦漢餘弊尚行于今而望化崇于古却行及前之言積薪待燃之譬臣不知所以方然陛下既基之以孝又申之以仁民所疾苦敢不畧薦凡治者何哉為教而已今教衰已久民不知則又隨以刑逐之豈為政之道歟欲教者宜二十五家選一長百家置一師男子十三至十七皆令學經十八至二十盡使修武訓以書記圖律忠孝仁義之理廉讓恭勤之則授以兵經戰畧軍部舟騎之容挽彊擊刺之法官長皆月至學所以課其能習經者五年有立則言之司徒用武者三年善藝亦升之司馬若七年而經不明五年而勇不達則更求其言政置謀迹其心術行履復不足取者雖公卿子孫長歸農畝終身不得為吏其國學則宜詳考古數部定子史令書不煩行習無糜力凡學雖凶荒不宜廢也農桑者實民之命為國之本有一不足則禮節不興若重之宜罷金錢以穀帛為賞罰然愚民不達其權議者好増其異凡自淮以北萬疋為市從江以南千斛為貨亦不患其難今宜聴市至千錢以還者用錢餘皆用絹布及米其不中度者坐之如此則墾田自廣民資必繁盜鑄者罷人死必息又田非疁水皆播麥菽地堪滋養悉藝紵麻陰巷縁藩必樹桑柘列庭接宇惟植竹栗若此令既行而善其事者庶民則叙之以爵有司亦從而加賞若田在草間木物不植則撻之而伐其餘樹在所以次坐之又取税之法宜計人為輸不應以貲云何使富者不盡貧者不蠲仍令桑長一尺以圍為價田進一畝以度為錢屋不得瓦皆責貲實民以此樹不敢種土畏妄墾棟熒榱露不敢加泥豈有剝善害民禁衣惡食若此苦者方今若重斯農則宜務削滋法凡為國不患威之不立患恩之不下不患土之不廣患民之不育自華夷爭戰戎夏競威破國則積尸竟邑屠将則覆車滿野海内遺生盖不餘半重以急政嚴刑天災歲疫貧者但供吏死者弗望埋鰥居有不願娶生子每不敢舉又戍淹徭久妻老嗣絶及淫奔所孕皆復不收是殺之日有數途生之歲無一理不知後百年間将盡以草木為世耶此最是驚心悲魂慟哭太息者法有禁殺子之科設蚤娶之令然觸刑罪忍悼痛而為之豈不有酷甚處耶宜令家寛其役户減其税女子十五不嫁家人坐之雌雉可以聘妻妾大布可以事舅姑若待禮足而行則有司加紏凡宫中女隸必擇不復字者庶家内役皆令各有所配要使天下不得有終獨之生無子之老所謂十年存育十年敎訓如此則二十年間長戸勝兵必數倍矣又亡者亂郊饉人盈甸皆是不為其存計而任之遷流故饑寒一至慈父不能保其子欲其不為冦盗豈可得耶既御之使然復止之以殺彼於有司何酷至是且草樹既死皮葉皆枯是其梁肉盡矣氷霜已厚苫盖難資是其衣裘敗矣比至陽春生其餘幾今自江南所在皆穰有食之處須官與役宜募遠近能食五十口一年者賞爵一級不過千家故近食十萬口矣使其受食者悉令就佃淮南多其長帥給其糗糧凡公私游手歲發佐農令堤湖盡修原陸並起仍量家立社計地設閭檢其出入督其㳺惰須待大熟可移之復舊淮以北悉使南過江東旅客盡令西歸故毒之在體必割其緩處幽渭靈區閴為荒窟伊洛神基蔚成茂草豈可不懷歟歴下泗間何足獨戀議者必以為彼衰不足避而不知我之病甚于彼矣若謂民之既從彼必就之若其來從我之願也彼若能來必非其種不過山東雜漢則是國家由來所欲覆育既華得坐實戎寇自逺其為來利固善也今空守孤城徒費財役亦行見淮北必非境復有者矣不亦重辱喪哉使彼但發輕騎三千更互出入春來犯麥秋至侵禾水陸漕輸居然復絶于賊不勞而邊已困不至二年卒散民盡可蹻足而待也設使彼滅則中州必有興者决不能有奉土地率人民以歸國家矣誠如此則齊徐終逼亦不可守且夫戰守之法當恃人之不敢攻頃年兵之所以敗皆反此也今人之不以羊追狼蟹捕䑕而令重車弱卒與肥馬悍畨相逐其不能濟固宜矣漢之中年能事畨者以馬多也畨之後服漢者亦以馬少也既兵不可出車騎應畜今宜募天下使養馬一匹者蠲一人役三匹者除一人為吏自此以進階賞有差邊亭徼驛一無發動又将者求其死也自能執干戈幸而不忘筋力盡于戎役其望上者固已深矣重有澄風掃霧之勤驅穢滌塵之力此所自矜尤復為甚近所功賞人知其濃然似頗謬虛實怨怒實衆垂臂而反唇者徃往為部耦語而觖望者處處成群凡武人意氣特易摧沮設一旦有變則向之怨者皆為敵也今宜國財與之共竭府粟與之同罄者矣應遣濃加寵爵發所在之禄将秩未充餘費宜闕他事員輦長不應與唯可教以蒐狩之禮習以鉦皷之節若假勇以進務黜其老至期而罷賞延于嗣又縁淮城壘皆興復使烽火相達兵食相連若邊民請師皆莫允許逺夷貢至止於報答語以國家之未睱示以何事而非君須内教既立徐料寇形辦騎卒四十萬而國中不擾取穀支二十歲而逺邑不驚然後越淮窮河跨隴出漢亦何適而不可又教之不敦一至于是今士大夫以下父母在而兄弟異計十家而七矣庶人父子殊産計八家而五矣凡甚者乃危亡不相知饑寒不相䘏嫉謗殘害其間不可稱數宜明其禁以革其風先有善於家者即務其賞自今不改則没其財又三年之喪天下之達喪以其哀並中出故制同外興日久均痛故愈遲齊典漢氏節其臣則可矣薄其子則亂也云何衰苴之容盡嗚號之音息夫佩玉啓旒深情弗忍冕珠㫝朝不亦甚乎凡法有變于古而刻于情則莫能順焉至乎敗于禮而安于心必處而奉之何乃厚于惡而薄于善乎今陛下以大孝始基宜反斯謬且朝享臨御當近自身始妃主典制宜漸加矯正凡舉天下以奉一君何患不及或帝有集皂之陋后有帛布之鄙亦無取焉且一體炫金不及百兩一歲美衣不過數襲而必收寳連櫝集服累笥目豈嘗視身未時親是櫝帶寳笥著衣空散國家之財徒奔天下之貨而主以此惰禮妃以此傲家是何麋蠧之劇惑鄙之甚逮至婢䜿皆無定科一婢之身衆婢以使一䜿之家列豎以役塗金披綉漿酒藿肉者不可稱紀至有列軿以逰遨飾兵以駈叱不亦重甚哉若禁行賜薄不容致此且細作始并以為儉而市造華恠即傳于民如此遷也非罷也凡天下得治者以實治天下者嘗虛民之耳目既不可誑治之盈耗立亦隨之故凡厥庶民制度日侈商販之室飾等王侯鑪賣之身製均妃后凡一䄂之大足斷為兩一裙之長可分為二見車馬不辨貴賤視冠服不知尊卑尚方今造一物小民明已睥睨宫中朝制一衣庶家晩已裁學侈麗之源實先宫閫又妃主所賜不限高卑自今以去宜為節目金珀翠玉錦綉縠羅奇色異章小民既不得服在上亦不得賜若工人復造奇技淫器則皆焚之而重其罪又置官者将以燮天平氣賛地成功防姦禦難治煩理劇使官稱事立人稱官置無空樹散位繁進冗人今高卑貿實大小反稱徒云名定是謂官邪而世廢姬公之制俗傳秦人之法惡明君之典好闇主之事其甚矣今則宜先省事從而并官置位以周典為式變名以適時為用秦漢末制何足取也當使徳厚者位尊位尊者禄重能薄者官淺官淺者秩輕纓冕紱珮稱官以服車騎容衞當職以施又寄各州郡宜通廢罷舊地民戸應更置立豈吳邦而有徐邑揚境而宅兖民上淆辰紀下亂畿甸其地如朱方者不宜置州土如都江者應更建邑又民少者易理君近者易歸凡吏皆宜每詳其能每厚其秩為縣不得復用蒙恩之家為郡不得復選勢族之老貴人王侯識未堪用不應彊仕須令冠而啓封能政而議爵且帝子未官人誰謂賤但宜詳置賓友茂擇正人亦何必列長史叅軍别駕從事然後為貴哉又世有先後業有難易明帝能令其兒不比光武之子馬貴人能使其家不比陰后之族盛矣哉此於後世不可忘也至當輿抑碎首之忿陛殿延辟㦸之威此亦復不可忘也内外之政實不可雜若妃主為人請官其人宜終身不得為官若請罪者亦終身不得赦罪凡天下所須者才誠難知也有深居而言寡則蘊學而無由知有卑處而事隔則懐奇而無由進或復見忌於親故或亦遭讒於貴黨期欲致車右而動御席語天下而辨治亂焉可得哉漫言舉賢則斯人固未得矣宜使世之所稱通經達史辨辭精數吏能将謀偏術小道者使獵纓危膝博求其用制内外與官之逺近及仕之類令各以所能而造其室降情以誘之卑身以安之然後察其擢唇吻樹頰胲動精神發意氣語之所至意之所執不過數四間不亦盡可知哉若忠孝廉清之比彊幹惇柔之倫難以檢格立可須㬰定宜使鄉部求其行守宰察其能竟皆見之于選貴呈之于相主然後處其職宜定其位用如此故應愚鄙盡捐賢明悉舉矣又俗好以毁沉人不知察其所以致毁以譽進人又不知測其所以致譽毁徒皆鄙則宜擢其毁者譽黨悉庸則宜退其譽者如此則毁譽不妄善惡分矣又既謂之才則不宜以階級限不應以年齒齊凡貴者好疑人少不知其少于人矣老者亦輕人少不知其不及少矣自釋氏流教其來有源淵檢精測固亦深矣舒引容濶既亦廣矣然習慧者日替其束修誡者月繁其過遂至糜散錦帛侈飾車徒復假精醫術託雜卜數延姝滿室置酒夾堂寄夫託妻者不無殺子乞兒者繼有而猶倚靈假象背親傲君欺責疾老震損宫邑是乃外刑之所不容戮内教之所不悔罪而橫天地之間莫之紏察人不得然豈其鬼與今宜申嚴佛律禆重國令其疵惡顯著悉皆罷遣餘則隨其藝行各為之條使禪義經誦人能其一食不過蔬衣不出布若應更度者則令先習藝行本其神心必能草腐人天竦精以往者雖侯王家子亦不宜拘凡鬼道惑衆妖巫破俗觸木而言怪者不可數遇綵而稱神者非可筭其原本是亂男女合飲食因之而以祈祝從之而以報請是亂不誅為害未息凡一苑始立一神初興淫風輒以之而甚今修堤以北置國百里峻山以右居靈十方糜財敗俗其可稱恨又針藥之術世寡復修診脉之技人鮮能逹民因是益徴於鬼遂棄于醫重令耗惑不反死夭復半今大醫宜男女習教在所應遣吏受業如此故當愈於媚神之愚㣲正腠理之弊矣凡無世不有言事末時不有令下然而升平不至昬危是繼何哉盖設令之本非實也又病言不出于謀臣事不便于貴戚輕者詆訾呵駭重者死厭窮擯故西京有方調之誅東都有黨錮之戮陛下若欲申常令修末典則群臣在焉若欲改舊章興王道則微臣在矣敢昧死以陳願陛下察之書奏忤㫖自解去職南齊劉獻除尚書祠部郎不拜太祖踐阼召獻入華林園談語謂獻曰吾應天革命物議以為何如獻對曰陛下誡前軌之失加之以寛厚雖危可安若循其覆車雖安必危矣既出帝顧謂司徒禇淵曰方直乃爾劉思效為員外郎太祖初表陳讜言曰宋自大明以來漸見彫弊徵賦有増於往天府尤貧於昔兼軍警屢動傷夷不復戍役殘丁儲無半菽小民嗷嗷無樂土之色貴世之流貨寳之族車服伎樂爭相奢麗亭池第宅競趨高華生於山澤之人不敢採飲其水草貧富相輝捐源尚末陛下宜發明詔吐徳音布惠澤禁邪偽薄賦歛省徭役絶奇麗之賜塞鄭衛之倡變歴運之化應質文之用不亦大哉又彭汴有䲭梟之巢青丘為狐兎之窟虐害踰紀殘暴日滋鬼泣舊泉人悲故壤童孺視編髪而慙生耆老㸔左祍而恥没陛下宜仰荅天人引領之望下弔沉黎傾首之勤授鉞衛霍之將遣䇿蕭張之師萬道俱前窮山蕩谷此即常山不足指而傾渤海不足飲而竭豈徒殘寇塵滅而已哉帝詔曰朕夙夜思惟常𢎞道義紆夢巖濱垂精管庫旰食舊懐其勤至矣吳郡顧歡散騎郎劉思效或自至園丘或越在冗位並能獻書金門芻辭鳳闕辨章政體有恊朕心今出其表外可詳擇所宜以時敷奏歡近以加於賁終思效可付選銓序以顯讜言崔祖思為給事黄門郎太祖建元初啓陳政事曰禮義者人倫之襟冕帝王之樞柄自古開物成務必以教學為先世不習學民罔志義悖競因斯而興亂禍是焉而作故篤俗昌治莫先道教不得以夷險革慮儉泰移業今無員之官空受禄力三載無考績之效九年闕登黜之序國儲以之空匱民力為之彫散能否無章涇渭混流宜太廟之南𢎞修文序司農以北廣開式校臺州列國限外之職問其所樂依方課習各盡其能月供僮幹如廣充給若有廢惰遣還故郡殊經奇藝待以不次士修其業必有異等民識其利能無勉勵又曰漢文集上書囊以為殿帷身衣弋綈以韋帶劍慎夫人衣不曵地惜中民十家之產不為露臺劉備取帳鈎銅鑄錢以充國用魏武遣女以帛帳東阿婦以綉衣賜死王景興以淅米見誚武帝以節儉過人張妃房帷碧綃蚊幬三齊苮席五盞盤桃花米飯殷仲文勸令畜伎答云不解聲仲文曰但畜自解又答畏解故不畜歴觀帝王未嘗不以約素興侈麗亡也伏惟陛下體唐成儉踵虞為樸寢殿則素木卑構饍器則陶匏充御瓊簮玉筯碎以為塵珍裘繡服焚之如草斯實風高上代民偃下世矣然教信雖孚民染未革宜加甄明以速歸厚詳察朝士有柴車蓬館高以殊等彫牆華輪卑其稱謂馳禽荒色長違清編嗜音酣酒守官不徙物識義方且懼且勸則調風變俗不俟終日又曰憲律之重由來尚矣故曹參去齊惟以獄市為寄餘無所言路温舒言秦有十失其一尚存治獄之吏是也實宜清置廷尉茂簡三官寺丞獄主彌重其選研習律令刪除繁苛詔獄及兩縣一月三訊觀貌察情欺枉必達使明慎用刑無忝大易寧失不經靡愧周書漢末治律有家子孫並世其業聚徒講授至數百人故張于二氏絜譽文宣之世陳郭兩族流稱武明之朝决獄無寃慶昌支裔槐衮相襲蟬紫傳輝今廷尉律生乃令史門戸族非咸𢎞庭闕于訓刑之不措抑此之由如詳擇篤厚之士使習律令試簡有徵擢為廷尉僚屬茍官世其家而不美其績鮮矣廢其職而欲善其事未之有也若劉累傳守其業庖人不乏龍肝之饌斷可知矣又曰樂者動天地感鬼神正情性立人倫其義大矣按前漢編戸千萬大樂伶官方八百二十九人孔光等奏罷不合經法者四百四十一人正樂定員惟置三百八十八人今戸口不能百萬而太樂雅鄭元徽時校試千有餘人後堂雜伎不在其數糜費力役傷敗風俗今欲撥邪歸道莫若罷雜伎王庭惟置鍾簴羽戚登歌而已如此則官充給養國反淳風矣又曰論儒者以徳化為本談法者以刻削為體道教治世之粱肉刑憲亂世之藥石故以教化比雨露刑法方風霜是以有恥且格敬讓之樞紐令行禁止為國之闗鍵然則天下治者賞罰而已矣賞不事豐所病于不均罰不在重所困于不當如今甲功少乙功多賞甲而捨乙天下必不勸矣丙罪重丁𤯝輕罰丁而赦丙天下必不悛矣是賞罰空行無當乎勸沮将令見罰者寵習之臣受賞者仇讎之士戮一人而萬國懼賞匹夫而四海悦又曰籍稅以厚國國虛民貧廣田以實廪國富民散堯資用天之儲實拯懷山之數湯慿分地之積以勝流金之運近代魏置典農而中都足食晉開汝潁而河汴委儲今将掃闢咸華題鏤龍漠宜簡役敦農開田廣稼特罷山池之威禁深抑豪右之兼擅則兵民優贍可以出師又曰古者左史記言右史記事故君舉必書盡直策而不汗上無妄動知如絲之成綸今著作之官起居而已述事之徒褒諫為體世無董狐書法必隠時闕南史直筆未聞又曰廢諫官則聽納靡依雖課勵朝僚徵訪芻輿莫若推舉質直職思其憂夫越任干事在言為難當官而行處辭或易物議既以無言望己己亦當以吞黙慙人中丞雖謝咸元未有全廢劾簡廷尉誠非釋之寧容都無訊牒故知與其謬人寧不廢職目前之明效也漢徵貢禹為諫大夫矢言先策夏侯勝狂直拘繫出補諷職伐柯非遐行之即善又曰天地無心賦氣自均寧得誕秀往古而獨寂寥一代将在知與不知用與不用爾夫有賢而不知知賢而不用用賢而不委委賢而不信此四者古今之通患也今誠重郭隗而招劇辛任鮑叔以來夷吾則天下之士不待召而自至矣帝優詔報答梁賀琛為散騎常侍高祖時任職者皆縁飾姦諂深害時政琛遂啓陳事條封奏曰臣荷拔擢之恩曽不能效一職居獻納之任又不能薦一言竊聞慈父不愛無益之子明君不畜無益之臣臣所以當食廢餐中宵而歎息也輒言時事列之于後非謂謀猷寧云啓沃獨緘胸臆不語妻子辭無粉飾削藁則焚脱得聽覽試加省鍳如不允合亮其戅愚一事曰今北邊稽顙戈甲觧息正是生聚教訓之時而天下戸口減落誠當今之急務雖是處凋流而闗外彌甚郡不堪州之控總縣不堪郡之衰削更相呼擾莫得治其政述惟以應赴徵歛為事百姓不能堪命各事流移或依於大姓或聚於屯封盖不獲已而竄亡非樂之也國家於闗外賦税盖微乃至年嘗租課動致逋積而民失安居寧非牧守之過東境戸口空虛皆由使命繁數夫犬不夜吠故民得安居今大邦大縣舟舸銜命者非惟十數復窮幽之鄉極遠之邑亦皆必至每有一使所至驚擾深為民害駑困邑宰則拱手聽其漁獵桀黠長吏又因之而為貪殘縱有廉平猶為掣肘故邑宰懐印類無考績細民棄業流宂者多雖年降復業之詔屢下蠲賦之恩而終不得反其居也其二事曰聖主恤隱之心納隍之念無間於遐邇至于翾飛蠕動猶且度脱况在兆民而州郡無恤民之志故天下顒顒惟注仰于一人誠所謂愛之如父母仰之如日月敬之如鬼神畏之如雷電茍須應病進藥豈可不治之哉今天下宰守所以皆尚貪殘罕有廉白者曰風俗靡侈使之然也淫奢之弊其事多端粗舉二條言其尤者夫食方丈于前所甘一味今之燕喜相競誇豪積菓如山嶽列肴同綺繡露臺之產不周一燕之資而賓主之間裁取滿腹未及下堂已同梟腐又歌姬舞女本有品制二八之錫良待和戎今畜妓之夫無有等秩雖復庶賤微人皆盛姬妾務在貪汙爭飾綺羅故為吏牧民者競為剝削雖致賢臣憶罷歸之日不支數年便以消散盖由宴醑所廢既破數家之産歌謡之具必俟千金之資所費事等邱山為歡止在俄頃乃更追憾向所取之少今所費之多如復傅翼増其搏噬一何悖哉其餘淫奢著之凡百習以成俗日見滋甚欲使人守廉隅吏向清白安可得耶今誠宜嚴為禁制導之以節儉貶除彫飾紏奏浮華使衆皆知變其耳目改其好惡夫失節之嗟亦民所患正恥不及群故勉疆而為之茍力所不至還憂其弊矣今釐其風而正其失易於反掌夫論至治者必以淳素為前先正雕流之弊也其三事曰聖躬荷負蒼生以為任𢎞濟四海以為心不憚胼胝之勞不辭癯瘠之苦豈止日昃忘饑夜分廢寢至于百司莫不奏事上息責下之嫌下無逼上之咎斯實道邁百王事超千載但斗筲之人藻棁之子既得伏奏帷房便欲詭競求進不識國之大體不知當一官處一職貴使理其紊亂救其不及心在明恕事乃平章但務吹毛求疵擘肌分理運挈瓶之智徼分外之求以深刻為能以䋲逐為務迹雖似于奉公事更成其威福犯罪者復多巧避蒞職者因而曠怠惠惡増姦實由于此今誠欲責其公平之效試其黜過之心則上安下謐無徼求之患矣其四事曰自征伐北境帑藏空虛今天下無事而猶日不暇給者良有以也夫國弊則省其事而息其費事省則養民費息則財聚止或五年之中必能使國豐民阜若復積以歳月斯乃范蠡滅吳之術管仲伯齊之由今計内省職掌各檢其所部凡京師治署邸肆所為或十條宜省其五或三條宜省其一及國容戎備在昔應多在今宜少雖於後應多即事未須皆悉減省四方屯傳邸泊或舊有或無益或防民有所宜除除之有所宜減減之凡厥興造凡厥費財有非急者有役民者又凡厥討召凡厥求取雖闗國計權其事宜皆須靜息不息費則無以聚財不休民則無以聚力故蓄其財者所以大用之也息其民者所以大役之也若言小事不足害財則終年不息矣以小役不足妨民則終年不止矣擾其民而欲求殷阜不可得矣聚其財而務賦歛興造作則姦詐盗竊彌生是弊不息而其民不可使也則難可以語富强而圖逺大矣自普通以來二十餘年戎役薦起民力彫流今魏氏和親疆塲無警若不及於此時大息四民使之生聚減省國費令府庫蓄積一旦異境有虞闗河可掃則國弊民疲安能振其逺畧事至方圖無所及矣言奏髙祖大怒後魏崔浩為祭酒明元有微疾怪異屢見乃使中貴人密問於浩曰春秋星孛北斗七國之君皆将有咎今兹日蝕于胃昴趙代之分朕病彌年療治無損恐一旦淹忽諸子並少将如之何其為我設圖後之計浩曰陛下春秋富盛聖業方隆徳以除災幸就平愈且天道懸逺或消或應昔宋景見災修徳熒惑退舍願陛下遣諸憂慮恬神保和納御嘉福無以闇昩之説致損聖思必不得已請陳瞽言自聖化龍興不崇儲貳是以永興之始社稷幾危今宜蚤建東宫選公卿忠賢陛下素所委仗者使為師傅左右信臣簡在聖心者以充賔友入總萬機出統戎政監國撫軍六柄在手若此則陛下可以優逰無為頥神養壽以進醫藥萬歲之後國有成主民有所歸則姦宄息望旁無覬覦此乃萬代之令典塞禍之備也今長皇子壽年漸一周明叡温和衆情所繫時登儲副則天下幸甚立太子以長禮之大經若須並大成人而特倒錯天倫則生履霜堅冰之禍自古以來載籍所記興衰存亡尠不繇此帝納之高允為著作郎太武問曰萬機之務何者為先是時多禁封良田又京師逰食者衆允因言曰方百里則為地方一里則為田三頃七十畝萬里則田三萬七千頃若勸之則畝益三升不勸則畝損三升方百里損益之率為粟二百三十二萬斛况以天下之廣乎若公私有儲雖遇饑年復何憂哉帝善之遂除田禁悉以授民髙祐孝文時為秘書令上疏曰今之選舉不採識治之優劣專簡年勞之多少斯非盡才之謂宜停此薄藝棄彼朽勞惟才是舉則官方斯穆又勲舊之臣雖年勤可録而非才撫人者則可加之以禄賞不宜委之以方任所謂王者可私人以財不私人以官者也孝文善之李彪為秘書丞上表曰臣聞昔之哲王莫不亹亹孜孜思讜言以康黎庶是以訪童問老不避淵澤詢謀諮善不棄蒭蕘用能光茂實于竹素播徽聲于金石臣屬生有道遇無諱之朝敢循往式竊揆時宜謹冐死上封事七條狂瞽之言伏待刑戮其一曰自太和建號踰於一紀典刑徳政可得而言也立圜丘以詔孝則百神不乏享矣舉賢才以酬諮則多士盈朝矣開至誠以軌物則朝無佞人矣敦六順以教人則四門無凶人矣制冠服以明秩則典式復彰矣作雅樂以恊人倫則人神交慶矣深慎罰以明刑則庶獄得𠂻矣薄服味以示納則儉徳光昭矣殫宮女以妃鰥則人無怨曠矣傾府藏以振錫則大賚周渥矣省賦役以育人則編戸巷歌矣宣徳惠以懷逺邇則華荒抃舞矣垂至徳以暢幽顯則禎祥效質矣生生得所事事惟新巍巍乎猶造物之曲成也然臣愚以為行儉之道猶自闕始何者今庶人豪富之家習華既深敦樸情淺未識儉素之易長而行奢靡之難久莊制地宅美飾車馬僕妾衣綺羅土木被紋繡僣度違𠂻者衆矣古先哲王之為制也自天子以至公卿下及抱闗擊柝其宫室車服各有差品小不得逾大賤不得逾貴夫然故上下序而人志定今時華相競情無常守大為消功之物又置費力之事豈不謬哉消功者錦繡雕文費力者廣宅高宇莊制麗飾是也其妨農業害女工者焉可稍言哉漢文時賈誼上䟽云今之王政可為長太息者六此是其一也夫上之所好下必從之故越王好勇而士多輕死楚靈好瘠而國有饑人今二皇躬行儉素詔令殷勤而百姓之奢華猶未革者豈楚越之人易變如彼大魏之士難化如此盖朝制弗宣人未見徳使之然耳臣愚以為第宅車服自百官以至於庶人宜為其等制使貴不逼賤卑不僣高不可以稱其侈意用違經典今或者以為習俗日久不可卒革臣謹言古人革之漸昔子產為政一年百姓歌之曰我有田疇子產伍之我有衣冠子産禇之孰殺子產吾其與之及三年乃歌曰我有田疇子產殖之我有子弟子産誨之子產若死其誰嗣之然則鄭人之智豈前昏而後明哉且從政者須漸受化者難頓故也今若為制以差品之始末之情魏士與鄭人同矣既同鄭人是為卒有善歌豈可憚其初怨而不為終善哉夫尚儉者開富之源好奢者起貧之兆然則儉約易以教行華靡難以財滿是以聖人留意焉賢人希准焉故夏禹卑宫室而惡衣服殷湯寢黄屋而乗輅輿此示儉于後王後王所宜觀其意而取折衷也孔子為魯司寇乘柴車而駕駑馬晏嬰為齊正卿冠濯冠而衣敝裘此示儉于後臣後臣所宜識其情而消息之也前志云作法於凉其弊猶貪此言雖畧有達治道臣之瞽言倘或可採比及三年可以有成有成則人務本人務本則奢費除奢費除則榖帛豐榖帛豐則人逸樂人逸樂則皇基固矣其二曰易稱主器者莫若長子傳曰太子奉冡嫡之粢盛然則祭亡主則宗廟無所享冡嫡廢則神器無所傳聖賢知其如此故垂語以為長世之法昔姫主得斯道也故恢崇儒術以訓世嫡世嫡於是乎習成懿徳用大恊于黎丞是以世統生人載祀八百逮嬴氏之君于秦也殆棄徳政坑焚儒典弗以義方教厥冡子冡子於是習成凶徳肆虐以臨黔首是以享年不永二世而亡亡之與興其道在於師傅師傅之損益可得而言益者周公傅成王敎以孝仁義禮逐去邪人不使見惡又選天下之端士孝弟博聞有道術者以為衞翼此周道之所以長久也損者趙高傅胡亥教以刑戮斬劓及夷人族逐去正人不得見善士諂佞讒賊者為其左右此秦祚之所以促短也夫皇天輔徳也豈私周而踈秦哉由所行之道殊故禍福之途異爾昔光武議為太子置傅以問其群臣群臣望意皆言太子舅執金吾新陽侯陰就可博士張逸正色曰今立太子為陰氏乎為天下乎即為陰氏則陰侯可為天下則固宜用天下之賢才光武稱善曰置傅以輔太子也今博士之不難正朕况太子乎即拜逸為太子太傅漢明卒為賢主然則逸之傅漢明非乃生之漸也尚或有稱而況乃生訓之以正道其為益也固已大矣故禮曰太子生因舉以禮使士負之有司齋肅端冕見于南郊明冡嫡之重見乎天下過闕則下過廟則趨明孝敬之道也然古之太子自為赤子而教固已行矣此則逺世之鏡也高宗文成皇帝慨少時師不勤敎嘗謂群臣曰朕始學之日年尚幼冲情未能專既臨萬機不遑温習今而思之豈惟矛咎抑亦師傅之不勤尚書李祈免冠而謝此則近日之可鍳也伏惟太皇太后翼賛高宗訓成顯祖使巍巍之功邈乎前王陛下幼蒙鞠誨聖敬日躋及儲宫誕育復親撫告日省月試實勞神慮今誠宜准古立師傅以訓導太子訓導正則太子正太子正則皇家慶皇家慶則人幸甚矣其三曰臣聞國本黎元人資粒食是以昔之哲王莫不勤勸稼穡盈蓄倉廪故堯湯水旱人無菜色者盖由備之有漸積之有素暨于漢家以人食少乃設常平以給之魏氏以兵糧乏制屯田以供之用能不匱當時軍國取濟又記云國無三年之儲謂國非其國光武以一畝不實罪及牧守聖人之憂世重榖殷勤如彼明君之恤人勸農相效如此頃年山東饑去歲京師儉内外人庶出入就豐既廢營產疲而乃達又於國體實有虛損若先多積榖安而納之豈有督老弱糊口千里之外以今況古誠可懼也臣以為宜折州郡常調九分之二京都度支餘各立官司年豐糴積于倉時儉則加私之二糶之於人如此民必力田以買官絹又務即以取官粟年登則常積歲凶則直給又别立農官取州郡户十分之一以為此人相水陸之宜料頃畝之數以賦贖雜物餘財帛中科給令其肆力以一夫之田歲貢六十斛甄其課并征戍雜役行此二事數年之中則榖積而人足雖災不為害臣又聞前代明主皆務懷遠人禮賢引滯故漢高過趙求樂毅之胄晉武廓定族吳蜀之彥臣謂宜于河表七州人中擢其門才引令赴闕依中州官比隨能存之一可以廣聖朝均新舊之義二可以懷江漢歸有道之情其四曰昔帝舜命咎繇惟刑之恤周公誥成王勿誤于庶獄斯皆君臣相誡重刑之至也今二聖哀矜罪辜小大以情讞决之日多從降恕時不得已必垂惻隠雖前王之勸聽肆赦亦如斯而已至若行刑犯時愚臣竊所未安漢制舊斷獄報重嘗盡季冬至孝章時改盡十月以育三微後歲旱論者以不可十月斷獄陰氣微陽氣泄以故致旱事下公卿尚書陳寵議冬至陽氣始萌十一月有射干芸荔之應天以為正周以為春十二月陽氣上通雉雊雞乳地以為正殷以為春十三月陽氣已至天地以交萬物皆出蟄蟲始振夏以為春三微成著以通三統三綂之月斷獄流血是不稽天意也月令仲冬之月身欲寧事欲靜以起隆怒不可謂寧以行大刑不可謂靜章奏帝善其言卒以十月斷令京都及四方斷獄報重竟季冬不推三正以育三微寛宥之情每過於昔遵時之憲猶或闕然今豈所謂助陽發生垂奉微之仁也微三微也誠宜逺稽周典近採漢制天下斷獄起自初秋盡於孟冬不於三統之春行斬絞之刑如此則道恊幽顯仁垂後昆矣其五曰古者大臣有坐不亷而廢者不謂之不廉乃曰簠簋不飾此君之所以禮貴臣不明言其過也臣有大譴則白冠氂纓盤水加劍造室而請死此臣之所以知罪而不敢逃刑也聖朝賓遇大臣禮同古典自太和以降有負罪當䧟大辟者多歸第自盡遣之日深垂隠愍言發悽淚百官莫不見四海莫不聞誠足以感将死之心慰戚屬之情然恩發至𠂻未著永制此愚臣所以敢陳末見也昔漢文時人有告丞相周勃謀反者逮繫長安獄頓辱之與皂隸同賈誼乃上書極陳君臣之義不宜如是夫貴臣者天子為其改容而禮貌之吏人為其俯伏而敬貴之其有罪過廢之可也賜之死可也若束縛之輸之司冦榜笞之小吏罵詈之殆非所以令衆庶見也及将刑也臣則北靣再拜跪而自裁天子曰大夫自有過耳吾遇子有禮矣此上不使人抑而刑之也孝文深納其言是後大臣有罪則自殺不受刑至孝武時稍復入獄良由孝文行之當時不為永制故耳伏惟聖徳慈惠豈與孝文比隆哉今天下有道庶人不議之時臣安可陳瞽言於朝但恐萬世之後繼體之主有若漢武事焉夫道貴長久所以樹之風聲也法尚不虧所以貽厥孫謀也焉得行恩當時而不著長世之制乎其六曰孝經稱父子之道天性也書云孝乎惟孝友于兄弟二經之㫖盖明一體而同氣可共而不可離也及其有罪罪不相及者乃君上之厚恩至若有懼懼應相連者固自然之常理也無情之人父兄繫獄子弟無慘惕之容子弟逃刑父兄無愧惡之色宴安榮位逰從自若車馬仍華衣冠猶飾寧是同體共氣分憂均戚之理也哉楚人滅江秦伯素服而示懼宋宏未舉桓譚免冠而謝罪則子弟之於父兄父兄之於子弟惟其情至豈與結盟相知者同年語其深淺哉二聖清簡風俗孝慈是先臣愚以為父兄有犯宜令子弟素服肉袒詣闕請罪子弟有坐宜令父兄露板引咎乞解所司若職任必要不宜許者慰勉留之如此足以敦勵凡薄使人知有所恥矣其七曰禮云臣有大喪君三年不呼其門此聖人縁情制禮以終孝子之情者也周季陵夷喪禮稍亡是以要絰即戎素冠作刺逮乎虐秦殆皆冺矣漢初軍旅屢興未能遵古至宣帝時民當從軍屯者遭大父母父母死未滿三月皆弗徭役其朝臣䘮制則未有聞至後漢元初中大臣其重憂始得去官終服暨魏武孫劉之世日尋干戈前世禮制復廢而不行晉時鴻臚鄭典䘮親固請終服武帝感其孝誠遂著令以為常聖魏之初撥亂反正未遑建終䘮之制今四海無虞百姓安逸誠是孝慈道洽禮教興行之日也然愚臣所懷竊有未盡伏見朝臣丁父憂者假滿赴職衣錦乘軒從郊廟之祀鳴玉垂縷同郎慶之醼傷人子之道虧天地之經愚謂如有遭大父母父母䘮者皆聽終服若無其人有曠庶官者則優㫖慰諭起令視事但綜所司出納敷奏而已國之吉慶一令無預其軍戎之警墨縗從役雖愆于禮事所宜行也如臣之言少有可採願付有司别為條制孝文覧而善之尋皆施行册府元龜卷五百二十九
