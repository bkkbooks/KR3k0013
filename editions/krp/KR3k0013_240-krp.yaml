body:
  text: 册府元龜卷二百四十宋王欽若等撰列國君部勤王獻㨗救患勤王自周室微弱諸侯力政征伐之出靡繇天子勤王之舉兆於此矣乃有為兵車之㑹以尊王室平戎狄之亂以救猾夏或修職貢朝聘之禮或興仗順伐罪之師以至糾合齊盟繕完都邑請糴鄰國傋預天災盖夾輔之所存亦大義之可見桓文之舉未或不繇斯道也韓侯以時覲於宣王故韓奕之詩曰韓侯入覲以其介圭入覲於王秦襄公七年春周幽王用褒姒廢太子立褒姒子為適數欺諸侯諸侯叛之西戎犬戎與申侯伐周殺幽王驪山下而秦襄公將兵救周戰甚力有功周避犬戎難東徙雒邑襄公以兵送周平王平王封襄公為諸侯衛武公四十二年犬戎殺周幽王武公將兵往佐周平戎甚有功周平王命武公為侯魯隐公六年冬京師來告饑隐公為之請糴於宋衛齊鄭禮也鄭伯如周始朝桓王也桓王即位周鄭交惡至是乃朝故曰始八年八月丙戌鄭伯以齊人朝王禮也初鄭武公荘公為平王卿士王貳於虢桓王立周人將畀虢公政周鄭交惡鄭伯不以虢公得政而背王故禮之九年夏宋殤公不王不共不職鄭伯為王左卿士以王命討之秋鄭人以王命告魯伐宋遣使致王命也伐宋未得志故復更告也冬公㑹齊侯於防謀伐宋也十年正月公㑹齊侯鄭伯於中丘癸丑盟於鄧為師期尋九年㑹於防謀伐宋也魯公既㑹而盟盟不書非後也盖公還告㑹而不告盟鄧魯地六月戊申公㑹齊侯鄭伯於老桃㑹不書不告於廟也老桃宋地日六月無戊申戊申五月二十三日誤壬戌公敗宋師於菅庚午鄭師入郜辛未歸魯庚辰鄭師入防辛巳歸於魯壬戌六月七日庚午十五日庚辰二十五日荘公後期而魯公獨敗宋師故鄭頻獨進兵以入郜防入而不有命魯取之推公上爵讓以自替不有其實故經但書魯取以成鄭志善之也君子謂鄭莊公於是乎可謂正矣以王命討不庭下之事上皆成禮於庭中不貪其土以勞王爵正之體也蔡人衞人郕人不㑹王命冬齊人鄭人入郕討違王命也桓公五年秋蔡人衛人陳人從王伐鄭王自為伐鄭之主君臣之辭也莊公十八年春虢公晉侯朝王十九年秋周惠王之五大夫奉子頽以伐王不克出奔温蘇子奉子頽以奔衛衛師燕師伐周冬立子頽二十年冬王子頽享五大夫樂及徧舞皆舞六代之樂鄭伯聞之見虢叔叔虢公字曰寡人聞之哀樂失時殃咎必至今王子頽歌舞不倦樂禍也夫司冦行戮司冦刑官君為之不舉去盛饌而況敢樂禍乎奸王之位禍孰大焉臨禍忘憂憂必及之盍納王乎虢公曰寡人之願也二十一年春胥命於弭夏同伐王城鄭虢相命弭鄭地鄭伯將惠王自圉門入虢叔自北門入殺王子頽及五大夫五月王巡虢守巡守於虢國也天子省方謂之巡守虢公為王宮於玤玤虢地三十年山戎來侵燕齊桓公伐山戎救燕因割燕所至地與燕使燕共貢天子如成周時職使燕復修召公之法僖公四年春齊侯以諸侯之師侵蔡蔡潰遂伐楚楚子使與師言曰君處北海寡人處南海唯是風馬牛不相及也楚界猶未至南海因齊處北海遂稱所近牛馬風逸葢末界之微事故以取喻不虞君之渉吾地也何故管仲對曰昔召康公命我先君太公召康公周太保召公奭也曰五侯九伯女實征之以夾輔周室五等諸侯九州之伯皆得征討其罪齊桓因此命以誇楚賜我先君履東至於海西至於河南至於穆陵北至於無棣穆陵無棣皆齊境也履所踐履之界齊桓又因以自言其盛爾貢包茅不入王祭不共無以縮酒寡人是徴包裹束也茅菁茅也束茅而灌之以酒為縮酒尚書包匭菁茅茅之為異未審昭王南征而不復寡人是問昭王成王之孫南巡守渉漢船壊而溺周人諱而不赴諸侯不知其故故問之對曰貢之不入寡君之罪也敢不共給昭王之不復君其問諸水濱昭王時漢非楚境故不受罪五年夏公及齊侯宋公陳侯衛侯鄭伯許男曹伯㑹王世子於首止惠王太子鄭也不名而殊㑹尊之也首止衞地陳畱襄邑縣東南有首鄉秋八月諸侯盟于首止㑹王太子鄭謀寧周惠王以惠后故將廢太子鄭而立王子帶故齊桓公帥諸侯㑹王太子以定其位七年閠六月襄王惡太叔帶之難懼不立不發惠王䘮而告難於齊八年正月公㑹王人齊侯宋公衛侯許男曹伯陳世子欵盟於洮謀王室也鄭伯乞盟請服也襄王定位而後發䘮十一年夏揚拒泉臯伊雒之戎同伐京師入王城焚東門揚拒泉臯皆戎邑及諸雜戎居伊水雒水之間者今伊闕北有泉亭王子帶召之也王子帶昭公也召戎欲因以纂位秦晉伐戎以救周秋晉惠公平戎於王十三年春齊侯使仲孫湫聘於周且言王子帶前年王子帶奔齊言欲復之夏公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯於鹹鹹衛地東郡濮陽縣東南有鹹城淮夷病杞故且謀王室也秋為戎難故諸侯戍周齊仲孫湫致之戍守也致諸侯戍卒於周十六年秋王以戎難告於齊齊徴諸侯而戍周十一年戎伐京師以來遂為王室難二十四年秋太叔以狄師伐周太叔王子帶王出適鄭處於汜二十五年春秦伯師於河上將納王狐偃言於晉侯曰求諸侯莫如勤王諸侯信之且大義也繼文之業而信宣於諸侯今為可矣晉文侯仇為平王侯伯匡輔周室使卜偃卜之吉晉侯辭秦師而下辭讓秦師使還順流故曰下三月甲辰次於陽樊右師圍温太叔在温故左師逆王四月丁巳王入於王城取太叔於温殺之於隰城戊午晉侯朝王二十八年四月己巳晉文公敗楚於城濮癸酉而還甲午至於衡雍作王宫於踐土癸亥王子虎盟諸侯於王庭踐土宫之庭書踐土别於京師要言曰皆奨王室無相害也有渝此盟神明殛之俾隊其師無克祚國奨助也渝變也殛誅也俾使也隊隕也克能也及而𤣥孫無有老㓜君子謂是盟也信合義信謂晉於是役也能以徳攻五月公朝於王所王在踐土非京師故曰所冬諸侯㑹於温晉侯召王以諸侯見且使王狩晉侯大㑹諸侯而欲尊事天子以為名義自嫌彊大不敢朝周喻王出狩因得盡羣臣之禮皆譎而不正之事三十年冬天王使宰周公來聘周公天子三公兼冡宰公子遂如京師遂如晉如京師報宰周公文公元年夏天王使毛伯來錫公命毛國伯爵諸侯為王卿士者諸侯即位天子賜以命圭合瑞為信叔孫得臣如周拜謝賜命宣公九年夏孟獻子聘於周王以為有禮十六年冬晉侯使士㑹平王室定王享之成公元年春晉侯使瑕嘉平戎於王文十七年邥垂之役詹嘉處瑕故謂之瑕嘉單襄公如晉拜成謂謝晋為平戎十三年三月公如京師十五年春㑹於戚討曹成公討其殺太子而自立事在十三年執而歸諸京師襄公五年王使王叔陳生愬戎於晉王叔周卿士也戎陵虣周室故告愬盟主晉人執之士魴如京師言王叔之貳於戎也王叔反有二心於戎失奉使之義故晉執之二十四年冬齊人城郟郟王城也於是穀雒鬭毁王宫齊叛晉欲求媚於天子故為王城之穆叔如周聘且賀城二十六年冬晉韓宣子聘於周王使請事問何事來聘對曰晉士起將歸時事於宰旅無佗事矣起宣子名禮諸侯大夫入天子國稱士時事四時貢職宰旅冡宰之下士言獻職貢於宰旅不敢斥尊王聞之曰韓氏其昌阜於晉乎辭不失舊阜大也言聞周衰諸侯莫能如禮唯韓起不失昭公二十二年六月王子朝因舊官百工之喪職秩者與靈景之族以作亂單子逆悼王於莊宫以歸悼王王猛也魯叔鞅至自京師言王室之亂十月晉籍談荀躒帥九州之戎九州戎陸渾戎也州鄉屬也五州為鄉及焦瑕温原之師晉四邑以納王於王城十一月乙酉王子猛卒己丑敬王即位十二月庚戌晉籍談荀躒賈辛司馬督司馬烏帥師軍於隂籍談所軍於侯氏荀躒所軍於谿泉賈辛所軍次於社司馬督所次王師軍於汜於解次於任人五師分在三邑閠月晉箕遺樂徴右行詭濟師取前城三子晉大夫濟師渡伊雒軍其東南王師軍於京楚辛丑伐京毁其西南京楚子朝所在二十三年正月壬寅二師圍郊二師王師晉師也癸卯郊鄩潰二邑皆子朝所得丁未晉師在平隂王師在澤邑王使告間子朝敗故庚戌還晉師還六月壬午子朝入於尹自京入尹氏之邑庚寅單子劉子樊齊以王如劉辟子朝出居劉子邑甲午王子朝入於王城次於左巷近東城七月戊申鄩羅納諸莊宫鄩羅周大夫鄩盻之子二十四年三月庚戌晉侯使士景伯涖問周故涖臨也就問子朝敬王知誰曲直士伯立於乾祭而問於介衆乾祭王城北門介大也晉人乃辭王子朝不納其使衆言子朝曲故六月壬申王子朝之師攻瑕及杏皆潰瑕杏敬王邑鄭伯如晉子太叔相見范獻子獻子曰若王室何對曰老夫其國家不能恤敢及王室抑人亦有言曰嫠不恤其緯嫠寡婦也織者常苦緯少寡婦所宜憂而憂宗室之隕為將及焉恐禍及己今王室實蠢蠢焉蠢蠢動擾貌吾小國懼矣然大國之憂也吾儕何知焉吾子其早圖之詩曰缾之罄矣惟罍之恥詩小雅罍大器缾小器常稟於罍者而所受罄盡則罍為無餘故恥之王室之不寧晉之恥也獻子懼而與宣子圖之宣子韓起乃徴㑹於諸侯期以明年為明年㑹黄父傳二十五年夏叔詣㑹晉趙鞅宋樂大心衛北宫喜鄭游吉曹人邾人滕人薛人小邾人于黄父謀王室也王室有子朝亂謀定之趙簡子令諸侯之大夫簡子趙鞅輸王粟具戍人曰明年將納王納王於王城二十六年四月單子如晉告急七月己巳劉子以王出師敗懼而出庚午次於渠渠周地王城人焚劉燒劉子邑丙子王宿於禇氏雒陽縣南有禇氏亭丁丑王次於萑谷庚辰王入於胥靡辛巳王次於滑萑谷胥靡皆周地胥靡滑本鄭邑晉知躒趙鞅帥師納王使女寛守闕塞女寛晉大夫闕塞雒陽西南伊闕口也守之備子朝十月丙申王師起於滑辛丑在郊郊子朝邑遂次於尸十一月辛酉晉師克鞏知躒趙鞅之師召伯盈逐王子朝伯盈本黨子朝晉師克鞏知子朝不成更逐之而逆敬王王子朝及召氏之族毛伯得尹氏固南宫嚚奉周之典籍以奔楚尹召二族皆奔故稱氏重見尹固名者為後還見殺隂忌奔莒以叛隂忌子朝黨莒周邑召伯逆王於尸及劉子單子盟召伯新還故盟遂軍圉澤次於隄上圉澤隄上皆周地癸酉王入於成周成周今雒陽甲戌盟於襄宫襄王之廟晉師使成公般戍周而還般晉大夫十二月癸未王入於莊宮荘宫在王城二十七年十二月晉籍秦致諸侯之戍於周三十二年秋八月王使富辛與石張如晉請城成周子朝之亂其餘黨多在王城敬王畏之徙都成周成周狹小故請城之天子曰天降禍於周俾我兄弟并有亂心以為伯父憂俾使也兄弟謂子朝也伯父謂晉侯我一二親昵甥舅不遑啟處於今十年謂二十三年二師圍郊至於今勤戍五年謂二十八年晉籍秦致諸侯之戍至於今余一人無日忘之念諸侯勞閔閔焉如農夫之望嵗懼以待時閔閔憂貌遭亂嘗閔閔兾望安定如農夫之憂饑兾望來嵗之将熟伯父若肆大惠復二文之業弛周室之憂肆展放也二文謂文侯仇文公重耳也弛猶觧也徼文武之福以固盟主宣昭令名則余一人有大願矣昔成王合諸侯城成周以為東都崇文徳焉作成周遷殷民以為京師之東都所以崇文王之徳今我欲徼福假靈於成王脩成周之城俾戍人無勤諸侯用寧蝥賊逺屏晉之力也蝥賊喻災害其委諸伯父使伯父實重圖之俾我一人無徴怨於百姓徴召也而伯父有榮施先王庸之庸功也徼先王之靈以為大功范獻子謂魏獻子曰與其戍周不如城之天子實云云欲罷戍而城雖有後事晉勿與知可也從王命以紓諸侯晉國無憂是之不務而又焉從事魏獻子曰善使伯音對伯音韓不信曰天子有命敢不奉承以奔吿於諸侯遲速衰序衰差也序次也於是焉在在周所命冬十一月晉魏舒韓不信如京師合諸侯之大夫於狄泉尋盟且令城成周己丑士彌牟營成周計丈數計所當城之丈數揣髙卑度髙曰揣度厚薄仞溝洫度深曰仞物土方議逺邇物相也相取土之方靣逺近之宜量事期知事㡬時畢計徒庸知用㡬人功慮材用知費幾材用書餱糧知用幾粮食以令役於諸侯屬役賦丈付所當城尺丈書以授帥帥諸侯之大夫而效諸劉子效致也韓簡子臨之以為成命定公六年四月周儋翩率王子朝之徒因鄭人将以作亂於周儋翩子朝餘黨鄭於是乎伐馮滑胥靡負黍狐人闕外鄭伐周六邑陽城縣西南有負黍亭六月晉閻沒戍周且城胥靡為下天王出居姑蕕起十二月天王處於姑蕕姑蕕周地辟儋翩之亂也七年十一月戊午單子劉子逆王於慶氏慶氏守姑蕕大夫晉籍秦送王己巳王入於王城秦孝公十九年天子致伯孝公使公子少官率師㑹諸侯於逢澤開封東北有逢澤朝天子獻㨗春秋之義凡諸侯有四夷之功則獻㨗於王所以表殺敵之為果示我武之惟揚繇是操仗大功懸首藁邸愷歌斯作用警不庭者矣至有尊奉覇王協比同盟爰行執訊之儀用敦睦鄰之好既瀆遺俘之禮有媿不汙之典褒貶之義舊典存焉魯莊公三十一年六月齊侯來獻戎㨗僖公二十一年冬楚子伐宋楚人使宜申來獻㨗二十八年晉文公敗楚於城濮獻楚俘於王振旅愷以入於晉愷樂也獻俘授馘飲至大賞授數也獻楚俘於廟魯宣公十五年七月晉侯使趙同獻狄俘於周十六年春晉士㑹帥師滅赤狄甲氏及畱吁鐸辰鐸辰畱吁之屬三月獻狄俘獻於王也成公二年十一月晉師及諸侯之師戰於案齊師敗績晉景公使鞏朔獻齊㨗於周王弗見使單襄公辭焉曰蠻夷戎狄不式王命式用也淫湎毁常王命伐之則有獻㨗王親受而勞之所以懲不敬勸有㓛也兄弟甥舅侵敗王畧兄弟同姓國甥舅異姓國畧經畧法度王命伐之告事而已不獻其功所以敬親暱告伐事而不獻囚俘禁淫慝也淫慝為賊掠百姓取囚也今叔父克遂有功於齊克能也而不使命卿鎮撫王室所使來撫余一人而鞏伯實來未有職司於王室鞏朔上軍大夫非命卿名位不逹於王室又奸先王之禮謂獻齊捷余雖欲於鞏伯欲受其獻其敢廢舊典以沗叔父夫齊甥舅之國也而大師之後也齊世與周昏故曰甥舅寧不亦淫從其欲以怒叔父抑豈不可諫誨士莊伯不能對莊伯鞏朔王使委於三吏委屬也三吏三公也禮之如侯伯克敵使大夫告慶之禮降於卿禮一等王以鞏伯宴而私賄之使相告之曰非禮也勿籍相相禮者籍書也王畏晉故私宴賄以慰鞏朔十六年晉厲公與楚戰於鄢陵楚師敗績十二月晉侯使郤至獻楚㨗於周襄公二十五年六月鄭子展子産帥師伐陳入之八月子産獻㨗於晉獻入陳之功而不獻其俘戎服將事戎服軍旅之衣異於朝服晉人問陳之罪對曰昔虞閼父為周陶正以服事我先王閼父舜之後當周之興閼父為武王陶正我先王頼其利器用也與其神明之後也舜聖故謂之神明庸以元女大姫配胡公庸用也元女武王之長女胡公閼父之子滿也而封諸陳以備三恪周得天下封夏殷二王後又封舜後謂之恪并二王後為三國其禮轉降示敬而已故曰三恪則我周之自出至於今是頼言陳周之甥至今頼周徳桓公之亂蔡人欲立其出陳桓公鮑卒於是陳亂事在魯桓五年蔡出桓公之子厲公也我先君莊公奉五父而立之五父佗桓公弟殺太子免而代之鄭莊公因就定其位蔡人殺之欲立其出故我又與蔡人奉戴厲公奉戴猶奉事至於莊宣皆我之自立陳莊公宣公皆厲公子夏氏之亂成公播蕩又我之自入君所知也播蕩流移失所也宣公十一年陳夏徴舒殺靈公靈公之子成公奔晉自晉因鄭而入也今陳忘周之大徳蔑我大惠棄我姻親介恃楚衆以馮陵我敝邑不可億逞億度也逞盡也我是以有往年之告謂鄭伯稽首告晉請伐陳未獲成命未得伐陳命則有我東門之役前年陳從楚伐鄭東門當陳隧者井堙木刋敝邑大懼不競而恥大姫上辱大姫之靈天誘其𠂻啓敝邑心啟開也開道其心故得勝陳知其罪授手於我用敢獻功晉人曰何故侵小對曰先王之命唯罪所在各致其辟辟誅也且昔天子之地一圻方千里列國一同方百里自是以衰衰差降今大國多數圻矣若無侵小何以至焉晉人曰何故戎服對曰我先君武莊為平桓卿士鄭武公莊公為周平王桓王卿士城濮之役文公布命曰各復舊職晉文公命我文公戎服輔王以受楚㨗不敢廢王命故也城濮在僖公二十八年士莊伯不能詰士莊伯士弱也復於趙文子文子曰其辭順犯順不祥乃受之定公六年夏季桓子如晉獻鄭俘也獻此春取匡之俘救患親仁善鄰有國之本也周亟䘏患諸侯之禮也盖夫天道難諶災沴或作地利不至饑饉遂臻必當通其有無行其彼此嵗凶則告糴以舒其難國富則餼粟以矜其民故雖天災流行而乃人用不匱若其兵戈互舉强弱相敝則必救以師旅釋圍觧鬭立其宗社興㓕固存或以定覇之宜或以同盟之故仗其大義矜其無資斯乃侯伯之道也其或以暴易暴以衆凌寡亦五覇之罪人也魯桓公六年夏北戎伐齊齊侯使乞師於鄭鄭太子忽帥師救齊六月大敗戎師獲其二帥大良少良甲首三百以獻於齊甲首被甲者首於是諸侯之大夫戍齊莊公三十二年夏宋公齊侯遇於梁丘初齊侯為楚伐鄭之故請㑹於諸侯楚伐鄭在二十八年謀為鄭報楚宋公請先見於齊侯故夏遇於梁丘齊善宋之請見故進其班閔公元年正月狄人伐邢狄伐邢在往年冬管敬仲言於齊侯曰戎狄豺狼不可厭也敬仲管夷吾諸夏親暱不可棄也諸夏中國也暱近也宴安酖毒不可懐也以宴安比之酖毒詩云豈不懐歸畏此簡書詩小雅也文王為西伯勞來諸侯之詩簡書同惡相恤之謂也同恤所惡請救邢以從簡書齊人救邢僖公元年春齊率諸侯之師救邢次於聶北邢人潰出奔師奔聶北之師也邢潰不書不告也師遂逐狄人具邢器用遷之師無私焉皆撰具還之無所私也夏邢遷於夷儀諸侯城之救患也凡侯伯救患分災討罪禮也二年春諸侯城楚丘而封衛焉君死國㓕故傳言封衛國有狄人之敗出處於漕齊桓公救而封之遺之車馬器服焉衛人思之欲厚報之作木𤓰之詩六年秋楚人圍許以救鄭楚子不親圍以圍者告諸侯救許乃還十二年春諸侯城衛楚丘之郛懼狄難也十三年冬晉薦饑麥禾皆不熟使乞糴於秦秦伯謂子桑與諸乎對曰重施而報君將何求言不損秦重施而不報其民必攜攜而討焉無衆必敗不義故民不從之謂百里與諸乎百里秦大夫對曰天災流行國家代有救災䘏鄰道也行道有福丕鄭之子豹在秦請伐晉欲為父報仇秦伯曰其君是惡其民何罪秦於是乎輸粟於晉自雍及綘相繼雍秦國都絳晉國都命之曰汎舟之役十五年春楚人伐徐徐即諸夏故也三月諸侯盟於牡丘尋葵丘之盟且救徐也葵丘盟在九年孟穆伯帥師及諸侯之師救徐諸侯次於匡以待之秋伐厲以救徐也是年秦伐晉獲晉侯秦與晉平晉又饑秦伯又餼之粟曰吾怨其君而矜其民且吾聞唐叔之封也箕子曰其後必大晉其庸可兾乎唐叔晉始封之君武王之子箕子商王帝乙之子紂之庻兄姑樹徳焉以待能者於是秦始征晉河東置官司焉十八年春宋公曹伯衞人邾人伐齊夏師救齊狄救齊師魯師也二十年秋齊狄盟於邢為邢謀衛難也於是衛方病邢二十二年宋公衛侯許男滕子伐鄭楚人伐宋以救鄭二十七年冬楚子及諸侯圍宋宋公孫固如晉告急先軫曰報施救患取威定覇於是乎在矣先軫晉下軍之佐狐偃曰楚始得曹而新昏於衛若伐曹衛楚必救之則齊宋免矣於是乎蒐於被廬作三軍謀元帥出穀戍釋宋圍一戰而覇文之教也二十八年春晉侯伐衛楚人救衛不克晉執衛侯公為之請納玉於王與晉侯皆十㲄王許復之三十三年秋晉陽處父侵蔡楚子上救之文公三年冬公如晉十有二月己巳公及晉侯盟晉陽處父帥師伐楚救江時楚人圍江晉師伐楚楚國有難則江圍自觧宣公元年六月陳靈公受盟於晉秋楚子侵陳遂侵宋趙盾帥師救陳宋㑹於棐林以伐鄭也楚蒍賈救鄭遇於北林與晉師相遇熒陽中牟縣西南有林亭在鄭北囚晉解揚晉人乃還二年春秦師伐晉以報崇也伐崇在元年遂圍焦焦晉河外邑夏晉趙盾救焦遂自隂地及諸侯之師侵鄭隂地晉河南山北自上雒以東至陸渾以報大棘之役楚鬭椒救鄭曰能欲諸侯而惡其難乎遂次於鄭以待晉師趙盾曰彼宗競於楚殆將斃矣競彊也鬭椒若敖之族自子文以來世為令尹姑益其疾乃去之欲示弱以驕之十年冬楚子伐鄭晉士會救鄭逐楚師於潁北潁水出河南陽城至下蔡入淮諸侯之師戍鄭成公十七年正月鄭子駟侵晉虗滑虗滑晉二邑滑故滑國為秦所滅時屬晉後屬周衞北官括救晉侵鄭至於髙氏不書救以侵告髙氏在陽翟縣西南五月楚公子成公子寅戍鄭公㑹尹武公單㐮公及諸侯伐鄭自戲童至於曲洧今新汲縣治曲洧六月楚子重救鄭師於首止諸侯還畏楚强冬諸侯伐鄭前夏未得志故十月庚午圍鄭楚公子申救鄭師於汝上十一月諸侯還不書圍畏楚救不成圍而還十八年冬十一月楚子重救彭城伐宋使偏師與鄭人侵宋子重為後鎮宋華元如晉告急韓獻子為政於是欒書卒韓厥代將中軍曰欲求得人必先勤之勤恤其急成覇安疆自宋始矣晉侯師於台谷以救宋台谷闕遇楚師於靡角之谷楚師還畏晉强也靡角宋地晉士魴來乞師將救宋季文子問師數於臧武仲武仲宣叔之子對曰伐鄭之役知伯實來下軍之佐也知伯荀罃今彘季亦佐下軍彘季士魴如伐鄭可也伐鄭在十七年事大國無失班爵而加敬焉禮也從之從武仲言十二月孟獻子㑹於虗朾謀救宋宋人辭諸侯而請師以圍彭城不敢煩諸侯故但請其師㐮公元年圍彭城襄公元年夏五月晉韓厥荀偃帥諸侯之師伐鄭入其郛茍偃經不書非元帥敗其徒兵於洧上徒兵歩兵洧水出密縣東南至長平入潁於是東諸侯之師次於鄫以待晉師齊魯曹邾杞晉師自鄭以鄫之師侵楚焦夷及陳於是孟獻子自鄫先歸不與侵陳楚故不書晉侯衛侯次於戚以為之援為韓厥援秋楚子辛救鄭侵宋呂畱呂畱二縣今屬彭城郡鄭子然侵宋取犬丘五年九月丙午盟於戚㑹吳且命戍陳也公及其㑹而不書盟非公後㑹盖不以盟告廟楚子囊為令尹公子貞范宣子曰我䘮陳矣楚人討貳而立子囊必改行改子辛所行而疾討陳疾急也陳近於楚民朝夕急能無往乎有陳非吾事也無之而後可言晉力不能及陳故七年陳侯迯歸冬諸侯戍陳備楚子囊伐陳十一月甲午㑹於城棣以救之七年楚子囊圍陳㑹於鄬以救之十年冬諸侯之師城虎牢而戍之晉師城梧及制士魴魏綘戍之鄭及晉平楚子囊救鄭十四年春吳告敗於晉前年為楚所敗㑹於向為吳謀楚故也謀為吳伐楚范宣子數吳之不徳也以退吳人吳伐楚䘮故以為不徳數而遣之卒不為伐楚二十三年秋齊侯伐衛遂伐晉兩事故言遂八月叔孫豹帥師救晉次於雍榆豹救晉待命於雍榆故書次雍榆晉地汲郡朝歌縣東有雍城二十四年秋齊侯聞將有晉師使陳無宇從薳啓疆如楚辭且乞師冬楚子伐鄭以救齊門於東門次於棘澤以齊無宇乞師故也諸侯還救鄭夷儀諸侯昭公十一年秋季孫意如㑹晉韓起齊國弱宋華亥衛北宮佗鄭罕虎曹人杞人於厥憗謀救蔡不書救蔡不果救二十二年春宋華氏之亂諸侯之戍謀曰若華氏知困而致死楚恥無功而疾戰非吾利也不如出之以為楚功其亦無能為也已言華氏不能復為宋患救宋而除其害又何求乃固請出之宋人從之己巳宋華亥向寧華定華貙華登皇奄傷省臧士平出奔楚華貙已下五子不書非卿二十五年九月己亥公孫於齊次於陽州齊侯將唁公於平隂公先至於野井齊侯曰寡人之罪也使有司待於平隂為近故也齊侯自咎本不勑有司逺詣陽州而欲近㑹於平隂故令魯侯過共先至野井逺見迎逆自咎以謝公書曰公孫於齊次於陽州齊侯唁公於野井禮也將求於人則先下之禮之善物也物事也謂先至於野井齊侯曰自莒疆以西請致千社二十五家為社千社二萬五千家欲以給公以待君命待君伐季氏之命寡人將帥敝賦以從執事唯命是聽君之憂寡人之憂也十二月庚辰齊侯圍鄆欲取以居公不書圍鄆人自服不成圍定公五年夏歸粟於蔡蔡為楚所圍饑乏故魯歸之粟以周亟矜無資亟急也六月申包以秦師至秦子蒲子虎帥車五百乘以救楚五百乘三萬七千五百人子蒲曰吾未知吳道道猶法術使楚人先與吳人戰而自稷㑹之大敗夫槩王於沂稷沂皆楚地吳人獲薳射於栢舉薳射楚大夫其子帥奔徒奔徒楚散卒以從子西敗吳師於軍祥楚地八年夏齊國夏髙張伐我西鄙報上二侵晉士鞅趙鞅荀寅救我救不書齊師已去未入境十五年夏鄭罕逹敗宋師於老丘罕逹子齹之子老丘宋地宋公子地奔鄭鄭人為之伐宋欲取此以處之見哀公十二年齊侯衛侯次於蘧挐謀救宋也哀公六年春吳伐陳復修舊怨也元年未得志故也楚子曰吾先君與陳有盟不可以不救乃救陳師于城父陳盟在昭公十三年秋七月楚子在城父將救陳卜戰不吉卜退不吉王曰然則死也再敗楚師不如死前已敗於柏舉今若退還亦是敗棄盟逃讐亦不如死死一也其死讐乎命公子申為王不可則命公子結亦不可則命公子啓申子西結子期啓子閭皆昭王兄五辭而後許將戰王有疾庚寅昭王攻大㝠卒於城父大㝠陳地吳師所在七年八月宋人圍曹鄭桓子思曰宋人有曹鄭之患也不可以不救桓諡冬鄭師救曹侵宋十年冬楚子期伐陳陳即吳故吳延州來季子救陳謂子期曰二君不務徳二君吳楚而力争諸侯民何罪焉我請退以為子名務徳而安民乃還十七年夏六月趙鞅圍衛齊國觀陳瓘救衛國觀國書之子得晉人之致師者子玉使服而見之釋囚服服其本服曰國子實執齊柄而命瓘曰無辟晉師豈敢廢命欲必敵晉子又何辱言不煩來致師自將往戰簡子曰我卜伐衛未卜與齊戰乃還畏子玉二十七年夏晉荀瑶帥師伐鄭次於桐丘鄭駟𢎞請救於齊𢎞駟歂子齊師將興陳成子屬孤子三日朝屬㑹死事者之子使朝三日以禮之設乘車兩馬繫五邑焉乘車兩馬大夫服又加之五邑召顔涿聚之子晉曰隰之役而父死焉隰役在二十三年以國之多難未女恤也今君命女以是邑也服車而朝毋廢前勞乃救鄭及畱舒違穀七里榖人不知畱舒齊地違去也及濮雨不渉濮水在陳畱酸棗縣傍河東北經濟隂至髙平入濟水子思曰大國在敝邑之宇下是以告急今師不行恐無及也子思國参成子衣製杖戈製兩衣也立於阪上馬不出者助之鞭之知伯聞之乃還畏其得衆心曰我卜伐鄭不卜敵齊秦昭王立王母宣太后楚女也楚懐王怨前秦敗楚於丹陽而韓不救乃以兵圍韓雍氏韓使公仲侈告急於秦秦昭王新立太后楚人不肯救公仲因甘茂為韓言於秦昭王曰公仲方有得秦救故敢扞楚也今雍氏圍秦師不下殽公仲且仰首而不朝公叔且以國南合於楚楚韓為一魏氏不敢不聽然則伐秦之形成矣不識坐而待伐孰與伐人之利秦王曰善乃下師於殽以救韓楚兵去齊威王八年楚大發兵加齊齊王使淳于髠之趙請救兵齎黄金千鎰白璧十雙車馬百駟髠辭而行至趙趙王與之精兵十萬革車千乘楚聞之夜引兵而去威王大悦册府元龜卷二百四十
