body:
  text: 册府元龜卷四百四十九宋王欽若等撰將帥部殺降専殺殺降夫荷推轂之寄膺鑿門之任帥王者時雨之師弔四海籲天之衆此將帥之職也若乃納其欵不示其信肆燎原之威亡竭澤之戒繫其老弱燒其城郭由是敵人震壘合境復畔乃閉門而拒守致彌載而不克俾夫隂燐蔽于原野强魂號于道路豈唯失通侯之爵固將致杜郵之死雖兼弱攻昧有國之常規而舎逆取順大易之微㫖紀諸竹素垂戒將來白起為秦上將軍攻韓取上黨上黨民走趙趙將趙括軍長平以救之秦出輕兵擊之趙戰不利因築壁堅守以待救至秦昭王聞趙食道絶王自之河内賜民爵各一級發年十五以上悉詣長平遮絶趙救及糧食至九月趙卒不得食四十六日皆内隂相殺食來攻秦壘欲出為四隊四五復之不能出將軍趙括出銳卒自搏戰秦軍射殺趙括括軍敗卒四十萬人降武安君武安君計曰前秦已拔上黨上黨民不樂為秦而歸趙趙卒反覆非盡殺之恐為亂乃挾詐而盡坑殺之遺其小者二百四十人歸趙前後斬首虜四十五萬人趙人大震項羽為楚上將軍破秦軍秦將章邯降羽羽立為雍王置軍中使長史欣史失其姓為上將將秦軍行前行前謂居前而行是時羽將諸侯兵三十餘萬行畧地至河南遂西到新安今榖州新安城是異時諸侯吏卒徭使屯戍過秦中異時俗言先時也秦中秦地也秦中遇之多亡狀無善形狀也及秦軍降諸侯諸侯吏卒乘勝奴虜使之輕折辱秦吏卒吏卒多竊言曰章將軍等詐吾屬降諸侯令能入關破秦大善即不能諸侯虜吾屬而東秦又盡誅吾父母妻子諸將微聞其計以告羽羽廼召英布蒲將軍計曰秦吏卒尚衆其心不服至關不聽事必危不如擊之獨與章邯長史欣都尉翳入秦於是夜擊坑秦軍二十餘萬人既入函谷關至戲鴻門後數日羽廼屠咸陽殺秦降王子嬰燒其宫室羽於是自立為西楚覇王明年羽至咸陽齊王田榮亦將兵㑹戰榮不勝走至平原平原民殺之羽遂北燒夷齊城郭室屋夷平也皆坑降卒係虜老弱婦女狥齊至北海所過殘滅齊人相聚而畔之漢李廣為將軍從大將軍出定襄諸將多中首虜率為侯者而廣軍無功後以郎中令出右北平廣軍幾没漢法廣軍自當亡賞當謂功過相當也廣與望氣王朔語曰自漢征匈奴廣未嘗不在其中而諸妄校尉已下妄猶凡也材能不及中中謂中庸之人也以軍功取侯者數十人廣不為後人然終無尺寸功以得封邑者何也豈吾相不當侯邪朔曰將軍自念豈嘗有恨者乎恨悔也廣曰吾為隴西守羌嘗反吾誘降者八百餘人詐而同日殺之至今恨獨此耳朔曰禍莫大於殺己降此乃將軍所以不得侯者矣晉王澄為荆州刺史持節領南蠻校尉先是巴蜀流人散在荆湘者與土人忿爭遂殺縣令屯聚樂鄉澄使成都内史王機討之賊請降澄偽許之既而襲之於寵州以其妻子為賞沉八千餘人於江中自是益梁流人四五萬家一時俱反後魏王建為中部大夫從道武破慕容寶於參合陂道武乗勝將席捲南下于是揀擇俘衆有才能者留之其餘悉給衣糧遣歸令中州之民知恩德乃召羣臣議之建曰慕容寶覆敗於此國内空虚圖之為易今獲而歸之無乃不可乎且縱敵生患不如殺之道武謂諸將曰若從建言恐後南人創乂絶其向化之心非伐罪弔民之義諸將咸以建言為然建又固執乃坑之道武既而悔焉遂進圍中山寶棄城走和龍城内無主百姓惶惑東門不開道武將夜入乘城據守其門建貪而無謀意在虜獲恐士卒四掠盗賊亂府庫請候天明道武乃止是夜城中人共立慕容普驎為主遂閉門固守道武乃悉衆攻之連日不㧞使人登巢車臨城招其衆曰慕容寶捐城奔走汝曹百姓將為誰守何不識天命取死亡也皆曰羣小無知但復恐如參合之衆永全日月耳道武聞之顧視建而唾其面崔游為左將軍南秦州刺史先是州人楊松柏楊雒德兄弟數為反叛游至州深加慰撫松柏歸欵引為主簿稍以辭誘之兄弟俱至松柏既州之豪帥感游恩遇奬喻羣氐咸來歸欵且以過在前政不復自疑游乃因宴㑹一時俱斬於是外人以其不信合境皆反隋樊子蓋為光禄大夫封濟公言其功濟天下特為立名無此郡國大業十一年絳郡賊敬槃陁柴保昌阻兵數萬汾晉苦之詔令子蓋進討于時人物殷阜子蓋善惡無所分别汾水之北村塢盡焚之百姓大駭相率為盗其歸首者無少長悉坑之擁數萬之衆經年不能破賊有詔徴還唐隱太子建成武德四年以稽胡酋帥劉企成為邊害詔建成率師討之軍次鄜州大破之虜獲千餘人建成設詐放其渠帥十人並授官爵令還本所招慰羣胡企成與胡中大帥請降建成以胡兵尚衆恐有變將盡殺之乃陽言増置州縣須有城邑悉課羣胡執板築之具㑹築城所隂勒兵士皆執之企成聞有變奔於梁師都競誅降胡六千人程知節以髙宗顯慶二年為葱山道行軍大總管以討賀魯次常都城有胡人數千家開門出降知節屠城而去賀魯遂即逺遁軍還坐免官専殺三代之授鈇鉞兩漢之賜棨㦸皆得専殺者唯以肅軍旅而謹號令也若乃秦漢而降幸總戎昭性非仁賢學昧詩禮驕盈弗率暴横是圖負恃軍戎擅恣誅殛或失律而歸罪於下或遷怒而厚誣於人或疑忌之相形或取求之不獲怠棄王命殺害無辜恣殘忍之心快忿懟之意旋伏明戮以謝沉寃天之禍淫信不誣矣項羽字籍為楚次將與上將軍宋義救鉅鹿宋義久不渡河羽晨朝宋義即其帳中斬義頭即就也出令軍中曰宋義與齊謀反楚楚王因令籍誅之諸將讋服讋失氣也音之渉切莫敢枝梧梧音悞枝梧猶枝桿也瓚曰小柱為枝邪柱為梧皆曰首立楚者將軍家也今將軍誅亂乃相與共立羽為假上將軍未得懐王之命故立為假也使人追宋義子及之齊殺之使桓楚報命於王王因使使立羽為上將軍漢周苛為御史大夫守滎陽城是時左丞相韓信擊魏虜魏王豹傳豹詣滎陽漢王令豹守滎陽楚圍之急苛曰反國之王難與共守遂殺豹胡建孝武時守軍正丞南北軍各有正又置丞而建未得眞官兼守之時監軍御史為姦穿北軍壘垣以為賈區坐賣曰賈為賣物之區也區者小室之名若今小菴屋之類故衞士之屋謂之區廬宿衞宫外士稱為區士也賈音古建欲誅之乃約其走卒約束也曰我欲與公有所誅吾言取之則取斬之則斬於是當選士馬日監御史與䕶軍諸校列坐堂皇上校者軍之諸部校也室無四壁曰皇建從走卒趨至堂皇下詐謁因上堂走卒皆上建指監軍御史曰取彼走卒前曳下堂皇建曰斬之遂斬御史䕶軍諸校皆愕驚不知所以建亦已有成奏在懐中遂上奏以聞繇是顯名後漢張脩靈帝時為中䕶匈奴中郎將光和元年脩與南單于呼徴不相能脩擅斬之更立右賢王羌渠為單于脩以不先請而擅誅殺檻車徴廷尉抵罪劉岱為兖州刺史與曹公袁紹等起兵誅董卓進屯河内岱與東郡太守橋瑁相惡岱殺瑁以王肱領東郡太守吳凌統為别部司馬行破賊都尉從擊山賊時大帝破保屯先還餘麻屯萬人統與督張異等留攻圍之克日當攻先期統與督陳勤㑹飲酒勤剛勇任氣因督察酒陵轢一坐舉罰不以其道統疾其侮面折不為用勤怒詈統及其父操統流涕不答衆因罷出勤乘酒凶悖又於道路辱統統不能忍引刀斫勤數日乃死及當攻屯統曰非死無以謝罪乃率吏士卒身當矢石所攻一面應時披壊諸將乘勝遂大破之還自拘於軍正帝壯其果毅使得以功贖罪孫綝為大將軍魏將諸葛誕舉壽春請降遣朱異帥三萬人屯安豐城為文欽勢異敗歸綝授兵三萬人使異死戰異不從綝斬之於鑊里而遣弟恩救㑹誕敗引還綝既不能㧞出誕而喪敗士衆自戮名將莫不怨之晉郭黙為右將軍成帝咸和四年十二月害平南將軍江州刺史劉毅太尉陶侃帥衆討黙於尋陽斬之前趙靳冲為鎭北將軍冦太原平北卜珝率衆繼之冲攻太原不尅而歸罪於珝輙斬之劉聰聞之大怒曰此人朕所不得加刑冲何人哉遣其御史中丞浩衍持節斬冲宋蕭惠開為益州刺史持節督益寧二州諸軍事路經江陵時吉翰子在荆州與惠開有舊為設女樂樂人有美者惠開既求不得又欲以四女妓易之不許惠開怒收吉斬之即納其妓啟云吉為劉義宣所遇交結不逞向臣訕毁朝政輙已戮之孝武稱快南齊任侯伯宋末為平西將軍黄回軍主先是王藴罷南中郎將南陽王翽未之鎭藴寧朔府長史庾佩玉權行州事朝廷先遣南中郎將中兵參軍臨湘令韓幼宗領軍防州沈攸之之難二人各相疑阻佩玉輙殺幼宗回至郢州遣侯伯行湘州事又殺佩玉侯伯與回同衞將軍袁粲謀石頭事回令侯伯水軍乘舸往赴㑹衆軍已至不得入太祖令湘州刺史吕安國至收侯伯誅之王奐為鎭北將軍雍州刺史輙殺寧蠻長史劉興祖武帝大怒御史中丞孔稚圭奏其事罪合窮戮從之陳吳明徹為領軍將軍時湘州刺史華皎隂有異志詔明徹率兵討之明徹於軍中輙戮安成内史楊文通後魏萬安國孝文時為大司馬大將軍先與神部長奚買奴不平承明初矯詔殺買奴于苑中帝聞之大怒遂賜安國死侯莫陳悅為秦州刺史時賀㧞岳督關中兵召悅共討靈州悅誘岳斬之岳左右奔散悅遣人安慰云我别禀意㫖止在一人諸軍勿怖衆皆畏伏無敢拒者唐趙郡王孝恭為東南行臺右僕射髙祖武徳中與越州都督闞稜同討輔公祏及擒公祏公祏誣稜與已通謀又杜伏威王雄誕及家産在賊中者合從原放及皆籍没稜訴理之有忤孝恭孝恭怒遂以反誅之竇軌為益州道行臺右僕射軌與行臺尚書韋雲起郭行方素不協及隱太子誅有詔下益州軌藏諸懐中雲起問曰詔書安在軌不言示但曰卿欲反矣執而殺之行方大懼奔於京師蘇海政為䫻海道總管檢校右武衞將軍髙宗龍朔二年十二月受詔討龜兹及疎勒勑崑陵都督阿史那彌射及濛池都督阿史那歩直發衆以從海政歩直先與彌射爭部落不和密謂海政曰彌射謀反請以計誅之時海政兵纔數千懸師在彌射境内遂集軍吏而謀曰彌射若反我輩既無噍類不如先事誅之乃偽稱有勑令大總管賫物數百萬段分賜可汗及諸首領繇是彌射率其麾下隨列請物海政盡收斬之其下鼠厄施㧞塞幹兩部叛走海政與歩直追討平之海政軍廻至疎勒之南弓月又引吐蕃之衆來拒官軍海政以師老不敢戰遂以軍資賂吐蕃約和而還其後吐蕃盛言彌射不反為歩直所誣而海政不能審察濫行誅戮哥舒翰為副元帥禦安禄山既至潼關或勸翰曰禄山阻兵以誅楊國忠為名公若留兵三萬守關悉以精銳廻誅國忠此漢挫七國之計也公以為何如翰心許之未發有客泄其謀於國忠國忠大懼乃奏曰兵法安不忘危今潼關兵衆雖盛而無後殿萬一不利京師得無恐乎請選監牧小兒三千人訓練於苑中詔從之遂遣劒南將軍李福杜光庭分統焉又奏召募一萬人屯於灞上令其腹心杜乾運將之翰慮為所圖乃上表請乾運兵𨽻於潼關遂詔乾運赴潼關計事因斬之李光弼肅宗至徳元年八月為太原尹北京留守先是太原節度王承業軍政不修時御史崔衆主兵於河東侮易承業之為人衷甲持槍上承業㕔以玩謔之光弼聞之甚不平至是又有詔交衆所主兵於光弼衆以麾下來謁光弼迎旌相接而不遜避長揖光弼光弼怒既至又不交兵光弼收繫之頃中使至云除衆御史中丞中使懐其勑問衆所在光弼曰衆有罪繫之久矣中使持勑示光弼李光弼對曰光弼今祗斬侍御史若宣制命拜中丞即斬中丞若拜宰相即斬宰相中使懼遂寢之而還翼日以兵圍衆至碑堂下斬之威振三軍嚴武為劒南節度等使前後在蜀累年肆志逞欲恣行猛政梓州刺史章彛初為武判官及是小不副意召赴成都杖殺之由是威震一方駱元光為華州節度徳宗貞元元年八月専殺徐庭光元光累有功帝慮諫官論其専殺先令宰相諭諫官勿論周智光為同華節度代宗永泰元年秋逐吐蕃至鄜州時杜冕屯坊州智光與冕不協遂殺鄜州刺史張麟坑杜冕家屬八十一人焚坊州廬舍三千餘家李奉先為金吾衞將軍憲宗元和十年河東防秋卒殺豐州刺史燕重旴而歸以奉先為檢校左散騎常侍兼豐州刺史初重旴之見殺也麾下之衆或啟之故不及備從事有崔徳𤣥者總其亂衆而頗易置之黨亂者懼奉先至而聽於徳𤣥乃潛告於奉先曰燕大夫之死實徳𤣥搆焉今又招扇諸部以拒公矣豐州百姓舊與夷種雜處及奉先遣使潛視見其牛羊廬帳之在郊以為信然及徳𤣥迎謁于郊奉先數而殺之没其家孟簡元和末為山南東道節度使以心腹吏陳翰知上都進奏委以關通翰持簡隂事漸不可制簡怒追至州殺之且欲滅口翰弟及子進狀訴寃且告簡贓狀御史臺案驗獲簡贓及為吐突承瓘錢帛等共計之十餘貫匹事狀詞明白故自太子賓客分司東都貶吉州司馬劉從諫為昭義軍節度使敬宗寶厯二年七月奏大將軍程光晟謀翻動發覺處置訖從諫稔惡藏姦非一朝一夕光晟之死人頗疑其寃韓約為安南經畧使文宗太和二年六月奏愛州刺史張丹犯贓并欲謀惡事已准法處置大理寺議張丹既行禁勘即是制囚韓約不合専擅處置勑張丹男宗禮等並釋放康𫝊圭僖宗乾符中自河東行軍司馬除河東節度等使時𫝊圭已率兵在代州自行營赴任兩都虞候張錯郭朏迎于烏城驛並殺之軍中震悚梁朱珍唐末為太祖諸軍指揮使龍紀初與諸將屯於蕭縣以禦時溥珍慮太祖自至令諸軍葺馬廐以候廵撫時排陣斬斫使李唐賓之裨將嚴郊獨慢焉軍候范權恃珍以督之唐賓素與珍不協果怒乃見珍以訴其事珍亦怒曰唐賓無禮㧞劒斬之珍命騎列狀陳其事太祖初聞唐賓之死驚駭與敬翔謀詐令有司收捕唐賓妻子下獄以安珍心太祖遂徑往蕭縣距蕭一舍珍率將校迎謁太祖令武士執責其専殺命丅㑹行戮都將霍存等數十人叩頭以救太祖怒以坐牀擲之乃退後唐李冲為華州節度使初明宗至京師西征軍未旋命冲為華州都監令應接之冲至華廹華帥史彦鎔入朝李存敬至華冲盡誅其家俄而任圜領西征大軍至招討推官張礪六軍推官李松等因言西征監軍官李從襲欲圖任圜幾覆西軍慮至京師妄生間諜君宜矯制誅之冲即遣牙兵數十人擒之軍中斬首以徇史彦鎔以逼己歸朝深怨冲泣訴於安重誨重誨怒冲復令彦鎔歸華詔冲歸朝孟知祥為西川節度使天成二年表奏泗州防禦使充西川兵馬都監李嚴扇揺軍衆尋已處斬訖初李嚴同光中為客省使使于蜀時王衍専據坤維部曲離心知其必可取使還具奏蜀亡之狀興師之日必有成功故平蜀之謀始於嚴郭崇韜起軍之日乃以嚴為三川招撫使嚴與先鋒使康延孝將兵五千先驅閣道或馳詞説或威以兵鋒大軍未及所在隨下延孝在漢州王衍與書曰可謂李司空先來予既舉誠納欵衆咸以為討蜀之謀始於嚴衍以甘言將誘而殺之欲不令遽往嚴聞之喜曰候魏王至吾兩人大功立矣即馳騎入益州衍見嚴於母前以妻母為託即日引蜀使歐陽彬迎謁魏王三川既平以功冀領節度尋遇蕭牆之難明宗即位嚴求之蜀川乃以為兵馬都監知祥忌之既至召宴即被執而害之以謀欲搆亂聞晉李金全為滄州節度使髙祖天福二年安州屯將王暉殺節度使周環詔遣金全以騎兵千鎭撫其地未及境暉為部下所殺金全至亂軍數百人不自安金全說遣赴闕密伏兵於野以祖之座上擒其軍校武彦和等數十人斬之彦和臨刑宣言曰周環儉嗇多疑嚴刑峻令王暉粗率悖慢怨其約束以至飛語斥間各為防虞暉乃無疾針砭數月不出銛竹為矛圖為竊發預其事者暉腹心數人而已行間之卒皆受其制心雖有異敢不從之連雞不棲物之常理夫亂者必戮軍令有之然則王暉元惡也天子猶賜之信誓許為郡守我等見殺非其罪也若朝廷之命是食前言茍将軍之令得無寃乎既戮彦和等其徒皆以兵送赴闕下初金全之將行也帝謂曰王暉之亂罪莫大焉但慮乎封守不寧則民受其弊故折矢飛詔約之以不戮一人㧞暉為淮安序升次校以主其兵卿之此行無失吾信至是以彦和等當危亂之日刼掠郡城三日所獲財貨在焉遂殺而奪之帝聞之以姑息金全不究其事尋授以旄節楊光逺為西京留守兼鎭河陽因罷其兵權光逺繇此怨望潛貯異志多以珍玩奉契丹訴己之屈又私養部曲千餘人撓法禁河雒之人常如備盗尋册拜太尉兼中書令時范延光致仕輦囊裝妓妾居於河陽光逺利其竒貨且慮為子孫之讎因奏延光不家汴雒出舎外藩非南走淮夷則北走契丹宜早除之髙祖已許之不死鐵劵存焉持疑未允光逺乃遣子承勲以甲士圍其第逼令自裁延光曰天子在上安得如此乃遣使者乞移居雒下行及河橋擯於流而溺殺之矯奏云延光自投於河朝廷以適㑹其意弗之理張彦澤為涇州節度使有從事張式者以宗人之分受其知遇時彦澤有子為内職素不叶父意數行笞撻懼其楚毒逃竄外地齊州捕送到闕勑㫖釋罪放歸父所彦澤上章請行朝典式以有傷名教屢諫止之彦澤怒引弓欲射之式僅而獲免尋令人逐式出衙式自為賓從彦澤委以庶務左右羣小惡之久矣因此讒搆互來廹脅云書記若不便出斷定必遭屠害式乃告病尋醫擕其妻子將奔衍州彦澤遣指揮李興領二十餘騎追之戒曰張式如不從命即斬取頭來式懇告刺史遂差人援送到邠州節度使李周驛騎以聞朝廷以姑息彦澤之故有勑流式於商州彦澤遣行軍司馬鄭元昭詣闕論請面奏云彦澤若不得張式恐致不測髙祖不得已而從之既至决口剖心斷手足而死之式父驛詣闕訴寃朝廷命王周代之李俊為商州刺史少帝開運二年俊奏元隨吳漢筠監軍資庫擅用官錢二十貫文已處斬訖刺史無軍權部曲有罪奏聽進止可也不奏而殺物議非之宋彦筠為鄧州節度使經過雒京於銀沙灘斬㕔頭將軍鄭温為留臺所奏據鎭將於都城殺人其罪不細有詔鞫之擬云彦筠先進過小流二百里奉勑命配在興順軍内有千人先令往陜府般家未到沿路逃走捕捉到一人貴要例衆等便處斬投屍於河彦筠出身軍旅不知事體合送鄭温於河南府請行勘責不合専擅加刑者勑曰王者約法之義比在防非將致一平所期共守昨以憲司舉職有國舊規宋彦筠尋悔愆尤理可矜恕念兹勲績深軫朕懐特開宥過之恩庶叶匿瑕之道凡百有位宜勵乃誠所犯科條並釋放漢王繼𢎞為彰徳軍節度使乾祐初誣殺節度判官張易斥逐觀察推官張制易鎭州人繼𢎞事有所不當易必抗言爭之繼𢎞粗褊心不能容嘗於席上問國家西面用兵事易曰或說尚洪遷力戰傷重蓋性太剛故也繼𢎞正色曰洪遷傷重合有邸報子安得此言揺惑羣情遽繫之於獄奏易訛言惑衆殺之以聞制曹州人繼𢎞事有非理與張易協力極言之繼𢎞嘗乘醉攘臂毆於牀下至是因殺易乃誣奏制與易同出訛言而削其官牒而逐之後因郭謹代繼𢎞又令害制焉衆寃之漢法深刻蕃方奏刑殺不問端倪即順其情故當時從事鮮賔客之禮重足一迹而事之不暇李洪信為陜州節度使乾祐末洪信奏馬歩都指揮使聶召秦國指揮使楊徳䕶聖指揮使康審澄等與節度判官路濤掌書記張洞都押牙楊紹勍等同謀叛並殺之唯康審澄夜中放火奪關奔歸初朝議以諸道方鎭皆是勲臣不諳政理其都押牙孔目官令三司軍將内選才補之藩帥皆不悅故洪信因朝廷多故誣奏加害焉周王宴為晉州節度使廣順元年正月殺行軍司馬徐建崇言諜通劉崇故也册府元龜卷四百四十九
