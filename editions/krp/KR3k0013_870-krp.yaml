body:
  text: 册府元龜卷八百七十宋王欽若等撰總錄部救患夫患難相死謂之至行緩急時有載之前言然而士之處世豈常其遇或遘難虞之㑹或罹困阨之辱禍不旋踵危若綴旒秉志雖直而莫申臨難無苟而曷訴乃有扶義倜儻以自任繇衷感激而克壯畫䇿㣲婉以救其死挺身赴蹈以脫其急以至抗封䟽以論解伏軒陛以固争卒能消赫斯之怒全蕞爾之質兹所謂濡足拯溺焦頭救焚得以謂之仁矣周閎夭事西伯殷紂信崇侯虎之譖而囚西伯閎夭之徒患之乃求有莘氏美女驪戎之文馬有熊九駟他物竒怪因殷嬖臣費仲而獻之紂紂乃悅曰此一物足以釋西伯况其多乎乃赦西伯賜之弓矢斧鉞使西伯得征伐申叔展楚大夫楚伐蕭還無社與司馬卯言號申叔展還無社蕭大夫司馬卯楚大夫無社素識叔展故因卯呼之叔展曰有麥麴乎曰無有山麴窮乎曰無麥麴鞠窮所以禦濕欲使無社逃泥水中無社不觧故曰無軍中不敢正言故謬語河魚腹疾奈何叔展言無禦濕藥將疾曰目於眢井而拯之無社意觧欲入井故使叔展視虛廢井而求拯之若為茅絰哭井則已叔展又教結茅以表井湏哭乃應以為信眀日蕭潰申叔視其井則茅絰存焉號而出之號哭也祁奚晉大夫晉欒盈出奔楚范宣子殺其黨羊舌虎虎叔向弟也囚叔向人謂叔向曰子離於罪其為不知乎譏其受囚而不能去叔向曰與其死亡若何言離囚何若於死亡詩曰優哉游哉聊以卒嵗知也樂王鮒見叔向曰吾為子請叔向弗應出不拜其人皆咎叔向叔向曰必祁大夫室老聞之曰樂王鮒言於君無不行其言皆得行求赦吾子吾子不許謂不應出不拜祁大夫所不能也不能動君而曰必繇之何也叔向曰樂王鮒從君者也何能行祁大夫外舉不棄讐内舉不失親其獨遺我乎詩曰有覺徳行四國順之夫子覺者也覺較然正直晉侯問叔向之罪於樂王鮒對曰不棄其親其有焉言叔向篤親親必與叔虎同謀於是祁奚老矣老去公族大夫聞之乘驛而見宣子曰詩曰惠我無疆子孫保之書曰聖有謨勲眀徴定保勲功也言聖哲有謨功者當眀信定安之夫謀而鮮過惠訓不倦者叔向有焉謀鮮過有謨勲也惠訓不倦惠我無疆也社稷之固也猶將十世宥之以勸能者今壹不免其身壹以弟故以棄社稷不亦惑乎鯀殛而禹興言不父罪廢其子伊尹放太甲而相之卒無怨色太甲湯孫也荒淫失度伊尹放之桐宫三年改過而復之而無恨心言不以一怨妨大徳管蔡為戮周公右王言兄弟罪不相及若之何其以虎也棄社稷子為善誰敢不勉多殺何為宣子說與之乘以言諸公而免之共載入見公不見叔向而歸言為國非私叔向也叔向亦不告免焉而朝不告謝之明不為己叔向晉大夫也齊陳無宇送女於晉謂無宇非卿執諸中都叔向言於晉侯曰彼何罪彼無宇君使公族逆之齊使上大夫送之猶曰不共君求以貪國則不共逆卑於送是晉國不共而執其使君刑已頗何以為盟主頗不平且少姜有辭謂請無宇之辭冬十月陳無宇歸趙文子晉大夫也初虢之㑹魯人食言楚令尹子圍將以魯叔孫穆子為戮穆子名豹樂王鮒求貨焉弗與趙文子謂叔孫曰夫楚令尹有欲於楚少懦於諸侯諸侯之故求治之不求致也其為人也剛而尚寵若及必弗避也子盍逃之不幸必及於子對曰豹也受命於君以從諸侯之盟為社稷也若魯有罪而受盟者逃魯必不免也是吾出而危之若為諸侯戮者魯誅盡矣必不加師請為戮也夫戮於身實難自他及之何害茍可以安君利國美惡一心文子將請之於楚樂王鮒曰諸侯有盟未退而魯背之安用齊盟縱不敢討又免其受盟者晉何以為盟主矣必殺叔豹文子曰有人不難以死安利其國可無憂乎若皆卹國如是則大不喪威而小不凌矣若是道也果可以教訓何敗之有吾聞之曰善人在患弗救不祥惡人在位弗去亦不祥必免叔豹固請於楚而免之江上丈人莫知其名族也初伍員過於荆至江上欲渉涉渡見一丈人挾小船方將漁從而請焉丈人度之已絶江絶過問其名族族姓則不肯告解其劔以與之謂丈人曰此千金之劔也願獻之丈人獻上丈人不肯受曰荆國之法得伍員者爵執圭祿萬擔金千鎰者子胥吾尚不取周禮侯執圭言爵之為侯萬擔萬石金二十兩為鎰不取子胥以受此賞今我何以子之千金劒為乎伍員遇於呉遇猶至使人求之江上則不能得也每食必祭之曰祝江上之丈人旴夷六國時人也齊魏約而伐楚魏以董慶為質於齊楚攻齊大敗之而魏弗救田嬰怒將殺董慶旴夷為董慶謂田嬰曰楚攻齊大敗之而不敢深入者以為魏將内之於齊而擊其後今殺董慶是示楚無魏也魏怒合於楚齊必危矣不如赦董慶以善魏而疑之於楚也公子無忌魏昭王少子安釐王二十年秦昭王已破趙長平軍又進兵圍邯鄲公子姊為趙惠文王弟平原君夫人數遺魏王及公子書請救於魏魏王使將軍晉鄙將十萬衆救趙秦王使使者告魏王曰吾攻趙旦暮且下而諸侯敢救者已㧞趙必移兵先擊之魏王恐使人止晉鄙暫留軍壁鄴名為救趙實持兩端以觀望平原君使者冠葢相屬於魏讓魏公子曰勝所以自附為婚􅊚者以公子之髙義為能急人之困今邯鄲旦暮降秦而魏救不至安在公子能急人之困也且公子縱輕勝棄之降秦獨不憐公子姊耶公子患之數謂魏王及賔客辯士說王萬端魏王畏秦終不聼公子公子自度終不能得之於王計不獨生而令趙亡乃請賔客約車騎百餘乘欲以身徃赴秦軍與趙俱死行過夷門見侯生具告所以欲死秦軍狀詞决而行侯生屛人間語曰嬴聞晉鄙之兵符常在王卧内而如姬最幸出入王卧内力能竊之嬴聞如姬父為人所殺如姬資之三年自王以下欲求報其父仇莫能得如姬為公子泣公子使客斬其仇頭敬進如姬如姬之欲為公子死無所辭顧未有路耳公子誠一開口請如姬如姬必許諾則得虎符奪晉鄙兵北救趙而西却秦此五覇之伐也公子從其計請如姬如姬果盗晉鄙兵符與公子公子行行至鄴矯魏王令代晉鄙晉鄙合符疑之舉首視公子曰今吾擁十萬之衆屯於境上國之任重今單車來代之何如哉欲無聼朱亥袖四十斤鐵椎椎殺晉鄙公子遂將晉鄙兵勒兵下令軍中曰父子俱在軍中父歸兄弟俱在軍中兄歸獨子無兄弟歸養得選兵八萬人進兵擊秦軍解去遂救邯鄲存趙范痤故魏相也趙使人謂魏王曰為我殺范痤吾請獻七十里之地魏王曰諾使吏捕之圍而未殺痤因上屋騎危危棟上也使者曰與其以死痤市不如以生痤市有如痤死趙不予王地則王將奈何故不若與先定割地然後殺痤魏王曰善痤因上書信陵君曰痤故魏之免相也趙以地殺痤而魏王聼之有如彊秦亦將襲趙之欲則君且奈何信陵君言於王而出之漢項伯名纒項羽季父也為左尹沛公西入咸陽項羽至鴻門欲擊沛公項伯素善張良夜馳至沛公軍私見良欲與俱去良曰臣為韓王送沛公今事有急亾去不義乃具語沛公沛公大驚曰為之奈何良曰沛公誠欲背項王耶公曰鯫生說我距關母内諸侯鯫七垢千垢二切鯫小人也秦地可盡王也故聼之良曰沛公自度能卻項王乎卻丘畧切沛公黙然曰今為奈何良因邀項伯見沛公沛公與伯飲為夀結婚􅊚令伯具告沛公不敢背項王所以距關者備他盗也項羽後解沛公見羽鴻門羽留沛公項羽亞父范增謀欲殺沛公令項莊㧞劍舞中欲擊沛公項伯常屛蔽之王陵沛人也從漢王定天下封安國侯初陽武人張蒼秦時為御史有罪亾歸及沛公畧地過陽武蒼以客從攻南陽蒼當斬解衣伏質質鍖也身長大肥白如瓠時陵見而怪其美乃言沛公赦勿斬陵位至太傅朱家魯人也初髙帝數為項籍將季布所窮項籍滅髙帝購求布千金有舍匿罪三族布匿濮陽周氏漢求急乃髠鉗置廣栁車中并其家僮之魯朱家所賣之朱家心知其季布也買置田舍乃之雒陽見汝隂侯滕公說曰季布何罪臣各為其主用職耳職常也言此乃常道也一曰職主掌其事也項氏臣豈可盡誅耶今帝始得天下而以私怨求一人何示不廣也且以季布之賢漢求之急如此此不北走胡即南走越耳夫忌壯士以資敵國此伍子胥所以鞭荆平之墓也子胥伍員也荆即楚也子胥之父伍奢為平王所殺乃奔呉教呉伐楚平王已卒其後呉師之郢子胥掘平王之墓取尸鞭之三百也若何不從容為帝言之滕公心知朱家大俠意布匿其所乃許諾侍間果言如朱家指侍謂侍於天子間謂務事之隙帝乃赦布朱建封平原君惠帝時人或毁辟陽侯審食其惠帝大怒下吏欲誅之太后慚不可言大臣多害辟陽侯行欲遂誅之辟陽侯急因使人欲見平原君辭曰獄急不敢見君建乃求見孝惠幸臣閎籍孺髙祖時則有籍孺孝惠時有閎孺斯則二人皆名為孺而姓各別今此云閎籍孺誤剰籍字後人所妄加耳說曰君所以得幸帝天下莫不聞今辟陽侯幸太后而下吏道路皆言君讒欲殺之今日辟陽侯誅旦日太后含怒以誅君何以不肉袒為辟陽侯言於帝帝聼君出辟陽侯太后大驩兩主俱幸君君富貴益倍矣於是閎籍孺大恐從其計言於帝果出辟陽侯辟陽侯之囚欲見建建不見辟陽侯以為背已大怒及其成功出之乃大驚吕太后殁大臣誅諸吕辟陽侯於諸吕至深辟陽侯於諸吕相親信為罪宜誅者至深也卒不誅計畫所以全者皆陸賈平原君之力也郭舍人武帝時倖倡也帝少時東武侯母嘗養帝號之曰太乳母後乳母家子孫奴縱横暴長安中聞於中不忍致之法有司請徙乳母家處之於邊奏可乳母當入至前靣見辭乳母先見郭舍人為下泣舍人曰即入見辭去疾歩數還顧乳母如其言謝去疾歩數還顧郭舍人疾言罵之曰咄老女何不疾行陛下已壯矣寧尚湏汝乳而活耶尚何還顧於是人主憐焉悲之乃下詔止無徙乳母公孫敖為騎郎武帝時衛青姊子夫得入宫幸帝皇太后長公主女也陳皇后武帝姑女也無子妬大長公主聞衞子夫幸有身妬之廼使人捕青青時給事建章建章宫中未知名大長公主執囚青欲殺之其友公孫敖與壯士徃簒之逆取曰簒故得不死辛慶忌為左將軍朱雲上書求見公卿在前雲曰臣願請上方斬馬劒㫁佞臣一人頭以厲其餘上問誰也雲曰安昌侯張禹上曰小臣居下訕上廷辱師傅罪死不赦御史將雲下雲攀殿檻檻折慶忌免冠解印綬叩頭殿下曰此臣素著狂直於世使其言是不可誅其言非固當容之敢以死争慶忌叩頭流血上意解然後得已王咸為博士弟子鮑宣為司𨽻坐大不敬不道下廷尉咸舉幡太學下曰欲救鮑司𨽻者㑹此下諸生㑹者千餘人朝日遮丞相孔光自言又守闕上書宣遂得減死一等髠鉗後漢劉賜為光祿勲初任光者少忠厚為鄉里所愛初為鄉嗇夫郡縣吏續漢志曰三老游徼郡所置也秩百石掌一鄉人其鄉小者縣署嗇夫一人主知人善惡為役先後知人貧富為賦多少漢兵至宛軍人見光冠服鮮眀令解衣將殺而奪之㑹賜適至視光容貎長者乃救全之鮑徳為黄門侍郎初竇憲薦張林為尚書陳寵言其貪濁憲深恨寵既秉權乃白太后令典喪事欲因過責之徳素敬寵說憲弟夏陽侯瓌曰陳寵奉事先帝深見納任故乆留䑓閣賞賜有殊今不䝉忠能之賞而計㡬㣲之故誠傷輔政容貸之徳瓌亦好士深然之故得出為太山太守鍾離意為尚書僕射詔賜降胡子縑尚書案事誤以十為百眀帝見司農上簿大怒召郎將笞之意因入叩頭曰過誤之失常人所容若以懈怠為愆則臣位大罪重郎位小罪輕咎皆在臣臣當先坐乃解衣就格帝意解使復冠而貫郎張峻山陽人也前為懐令章帝二貴人父宋楊峻友人也貴人既被譖自殺免楊歸本郡郡縣因事復捕繫之峻與左馮翊沛國劉均等奔走解釋得以免罪霍諝字叔智魏郡鄴人也少為諸生眀經有人誣諝舅宋光於大將軍梁商者以為妄刋章文坐繫雒陽詔獄掠拷困極諝時年十五奏記於商商髙諝才志即為奏原光罪諝繇是顯名後位至廷尉李篤東萊人也時山陽東部督郵張儉舉劾中常侍侯覽家在防東殘暴百姓所為不軌請誅之覽遏絶章奏並不得通覽鄉人朱並上書告儉與同郡二十四人為黨於是刋章討捕儉得亡命流轉東萊止篤家外黄令毛欽操兵到門篤引欽謂曰張儉知名天下而亾非其罪縱儉可得寧忍執之乎欽因起撫篤曰蘧伯玉耻獨為君子足下何如自傳仁義篤曰篤雖好義眀廷今日載其半矣欽嘆息而去賈彪為新息長延熹元年黨事起太尉陳蕃争之不能得朝廷寒心莫敢復言彪謂同志曰吾不西行大禍不解乃入雒陽說城門校尉竇武尚書霍諝武等訟之桓帝以此大赦黨人李膺出曰吾得免此賈生之謀也何顒南陽人也屬黨事起變姓亾匿汝南間袁紹慕之與為奔走之友是時黨事起天下多罹其難顒嘗私入雒陽從紹計議其窮困閉阨者為求援救以濟其患有被掩捕者則廣設權計使得逃隱全免者甚衆及黨錮解顒辟司空府彭伯為議郎時董卓大㑹百官於朝堂議欲廢立衆僚無敢言盧植獨抗議不同卓怒罷㑹將誅植植素善蔡邕邕前徙朔方植獨上書請之邕時見親於卓故徃請植事又伯諫卓曰盧尚書海内大儒人之望也今先害之天下震怖卓乃止免植官而已魏常林河内温人時太守王匡起兵討董卓遣諸生於屬縣㣲伺吏民罪負便收之考責錢穀贖罪稽遲則夷滅宗族以崇威嚴林叔父撾客為諸生所白匡怒收治舉宗惶怖不知所責多少懼繫者不救林徃見匡同縣胡母彪曰王府君以文武髙才臨吾鄙郡鄙郡表裏山河土廣民殷又多賢能惟所擇用今主上㓜冲賊臣虎據華夏震慄雄才奮用之秋也若欲誅天下之賊扶王室之㣲智者望風應之若响克亂在和何征不㨗茍無恩徳任失其人覆亡將至何暇輔翼朝廷崇立功名乎君其藏之因說叔父見拘之意彪即書責匡原林叔父林位至光祿大夫賈詡姑臧人漢末為郎疾病去官時獻帝既東而李傕來追司徒趙温太常王偉衛尉周忠司𨽻榮邵皆為傕所嫌欲殺之詡謂傕曰此皆天子大臣卿奈何害之傕乃止孔融為將作大匠時楊彪為尚書令建安元年獻帝從東都幸許大㑹公卿兖州刺史曹公上殿見彪色不恱恐於此圖之未得宴設託疾如厠因出還營彪以疾罷時袁術僭亂曹公託彪與術婚􅊚誣以欲圖廢置奏收下獄劾以大逆融聞之不及朝服徃見曹公曰楊公四世清徳海内所瞻周書父子兄弟罪不相及况以袁氏歸罪楊公易稱積善餘慶徒欺人耳曹公曰此國家之意融曰假使成王殺召公周公可得言不知耶今天下纓緌縉紳所以瞻仰眀公仁智輔相漢朝舉直錯枉致之雍熈也今横殺無辜則海内聼觀誰不解體孔融魯國男子眀日便當拂衣而去不復朝矣曹公不得已遂理出彪陳琳字孔彰廣陵人也初清河崔琰以琴書自娯袁紹聞而辟之及紹卒二子交爭爭欲得琰琰稱疾固辭繇是獲罪幽於囹圄頼隂䕫與琳營救得免仕至司空軍謀祭酒管記室張𢎞為吕布刺姦陳登為魏太祖先驅以討吕布時登諸弟在下邳城中布乃質執登三弟與求和同登執意不撓進圍日急𢎞懼於後累夜將登三弟出就登鮮于輔為度遼將軍時魏國初建徐邈為尚書郎時科禁酒而邈私飲至於沉醉校事趙達問以曹事邈曰中聖人達白之太祖太祖甚怒輔進曰平日醉客謂酒清者為聖人濁者為賢人邈性修慎偶醉言耳因得免刑陳羣為侍中領太祖東西曹掾時五官將文學劉廙坐弟與魏諷謀反當誅羣言之太祖太祖曰廙名臣也吾亦欲赦之乃復位廙深徳羣羣曰自眀主之意吾何知焉胡昭字孔眀潁川人晉宣帝為布衣時與昭有舊同郡周生等謀害帝昭聞而歩渉險邀生於崤澠之間止生生不肯昭泣與結誠生感其意乃止昭因與斫棗樹共盟而別昭雖有隂徳於帝口中終不言人莫知之蜀劉巴字子初曹公辟為掾使招納長沙零陵桂陽㑹先主畧有三郡巴不得反使逺適交阯更姓為張與交阯太守王爕計議不合乃繇䍧牱道去為益州郡所拘留太守欲殺之主簿曰此非常人不可殺也主簿請自送至州見益州牧劉璋璋父焉昔為巴父祥所舉孝亷見巴驚喜每大事輒以諮訪呉趙昱瑯琊人與張昭友善刺史陶謙舉昭茂才不應謙以為輕已遂見拘執昱傾身營救方以得免華覈字永先呉郡人也初後主收左國史侍中韋曜下獄將殺之覈連上疏救曜曰曜運值千載特䝉哀識以其儒學得與史官貂蟬内侍承答天問聖朝仁篤慎終追逺迎神之際垂涕勑曜曜愚惑不達不能敷宣陛下大舜之美而拘繫史官使聖趣不叙至行不彰實曜愚蔽當死之罪然臣慺慺見曜自少勤學雖老不倦探綜墳典温故知新及意所經識古今行事外吏之中少過曜者李陵為漢將軍兵敗不還而降匈奴司馬遷不加疾惡為陵游說漢武以遷有良史之才欲使畢成所撰不忍加誅書卒成立垂之無窮今曜在呉亦漢之史遷也伏見前後符瑞彰著神指天應繼出累見一統之期庶不復乆事平之後當觀時設制三王不相因禮五帝不相沿樂質文殊塗損益異體宜得曜軰依凖古義有所改立漢氏承秦則有叔孫通定一代之儀曜之才學亦漢通之次也又呉書雖已有頭角叙賛未述昔班固作漢書文辭典雅後劉珍劉毅等作漢記逺不及固叙傳尤劣今呉書當垂千載編次諸史後之才士論次善惡非得良才如曜者實不可使闕不朽之書如臣頑蔽誠非其人曜年七十餘數無㡬乞赦其一等之罪為終身徒使成書業永足傳示垂之百世謹通進表叩頭百下後主不許甘寧字興覇初依黄祖祖不禮之祖都督蘇飛薦寧祖不用寧於是歸呉勸大帝取祖大帝遂授寧兵屯當口大帝破祖先作兩函欲以盛祖及蘓飛首飛令人告急於寧寧曰飛若不言吾豈忘之大帝為諸將置酒寧下席叩頭血涕交流為大帝言飛疇昔舊恩寧不值飛固已捐骸於溝壑不得致命於麾下今飛罪當夷戮特從將軍乞其首領大帝感其言謂曰今為君致之若走云何寧曰飛免分裂之禍受重生之恩逐之尚必不走豈當圖亾哉若爾寧頭當代入函大帝乃赦之諸葛瑾字子瑜初為大帝中司馬大帝嘗舉孝廉呉郡太守朱治大帝舉將也大帝曾有以望之而素加敬難自詰讓忿忿不解瑾揣知其故而不敢顯陳乃乞以意私自問遂於大帝前為書泛論物理因以已心遥徃忖度之畢以呈大帝大帝喜笑曰孤意解矣顔氏之徳使人加親豈謂此耶大帝又恠校尉殷模罪至不測羣下多為之言大帝怒益甚與相反覆惟瑾黙然大帝曰子瑜何獨不言瑾避席曰瑾與殷模等遭本州傾覆生類殄盡棄墳墓携老弱披草萊歸聖化在流𨽻之中䝉生成之福不能躬相督厲陳答萬一至令模辜負恩惠自䧟罪戾臣謝過不暇誠不敢有言大帝聞之愴然乃曰特為君赦之又虞翻以狂直流徙惟瑾屢為之說翻與所親書曰諸葛敦仁則天治物比䝉清諭有以保全惡積罪深見忌殷重雖有祁老之救徳無羊舌解釋難兾也劉基為大司農大帝嘗宴飲騎都尉虞翻醉酒犯忤大帝欲殺之威怒益盛繇基諫諍翻以得免孫鄰領豫章太守召還為繞帳督時太常潘濬掌荆州事重安長陳留舒爕有罪下獄濬嘗失爕意欲寘之於法論者多為言濬猶不釋鄰謂濬曰舒伯膺兄弟爭死海内義之以為美談仲膺又有奉國舊恩今君殺其子弟若天下一統青葢北廵中州士人必問仲膺繼嗣答者云潘承眀殺爕於事何為濬意即解爕用得濟吕䝉為左䕶軍虎威將軍屯陸口時虞翻以數犯顔諫爭坐徙丹陽涇縣䝉圖取關羽稱疾還建業以翻兼知醫術請以自隨亦欲因此令翻得釋也册府元龜卷八百七十
