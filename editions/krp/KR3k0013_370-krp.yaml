body:
  text: 册府元龜卷三百七十宋王欽若等撰將帥部忠夫忠者國之寶民之望而臣下之髙行也是以先王著移忠之義前史垂盡忠之訓出身事主其大者乎若乃任以牙爪委以心膂總戎昭之寄當帥臣之重安危所注社稷是衞固宜休戚之同體赴蹈而畢命焉三代之後居其任者或臨患不忘其國或殺身有益於君或累及而行明或難至而節見舍生以全義竭力以舒患遺風餘烈煥乎前聞古人所謂死而不朽乆而彌新者誠哉是言矣秦䝉恬為内史將三十萬衆北逐戎狄胡亥遣使者以罪賜公子扶蘇死又遣使者之陽周令䝉恬曰君之過多矣而卿弟毅有大罪法及内史恬曰自吾先人及至子孫積功信於秦三世矣今臣將兵三十餘萬身雖囚繫其勢足以倍畔然自知必死而守義者不敢辱先人之教以不忘先王也昔周成王初立未離襁褓周公旦負王以朝卒定天下及成王有病甚殆公且自揃其爪以沉於河曰王未有識是旦執事有罪殃旦受其不祥乃書而藏之記府可謂信矣及王能治國有賊臣言周公旦欲為亂乆矣王若不備必有大事王大怒周公旦走而奔於楚成王觀於記府得周公旦沉書乃流涕曰孰謂周公旦欲為亂乎殺言之者而反周公旦故周書曰必參而伍之今恬之宗世無二心而事卒如此是必孽臣逆亂一作辭内陵之道也夫成王失而復振則卒昌桀殺闗龍逢紂殺王子比干而不悔則身死國亡臣故曰過可振而諫可覺也察於參伍上聖之法也凢臣之言非以求免於咎也將以諌而死願陛下為萬民思從道也使者曰臣受詔行法於將軍不敢以將軍言聞於上也䝉恬喟然太息曰我何罪於天無過而死乎良乆徐曰恬罪固當死矣起臨洮屬之遼東城塹萬餘里此其中不能無絶地胍哉此乃恬之罪也乃呑藥自殺漢紀信為將軍髙帝三年四月項羽圍漢滎陽漢王請和割滎陽以西者為漢亞父勸項羽急攻滎陽漢王患之陳平反間既行羽果疑亞父亞父大怒而去發病死五月將軍紀信曰事急矣臣請誑楚可以間出間出投間隙私出若言間行㣲行耳紀信詐為漢王而出西門遁走私出也於是陳平夜出女子東門二千餘人楚因四面擊之紀信乃乘王車黄屋左纛天子以黄繒為蓋纛毛羽幢也在乘輿車衡左方上注之一曰以㹈牛尾為之如斗或在騑頭或在衡曰食盡漢王降楚楚皆呼萬歲之城東觀以故漢王得與數十騎出西門遁令御史大夫周苛魏豹樅公守滎陽樅公史不知其名故曰公羽見紀信問漢王安在曰已出去矣羽燒殺信周苛為御史大夫楚圍漢王滎陽急漢王出去而使苛守滎陽城楚破滎陽城生得苛羽謂苛為我將以公為上將軍封三萬户苛罵曰若趣降漢王不然今為虜矣若汝也趣讀曰促若非漢王敵也羽怒烹苛烹為煑而殺之韓信為大將軍平齊漢王徴其兵使擊楚楚以亡龍且項王恐使盱眙人武涉徃說信曰足下何不反漢與楚楚王與足下有舊故且漢王不可必必謂必信之身居項王掌握中數矣然得脫背約復擊項王其不可親信如此今足下雖自以為與漢王為金石交稱金石者取其堅固然終為漢王所禽矣足下所以得須臾至今者以項王在項王即亡次取足下何不與楚連和三分天下而王齊今釋此時自必於漢王以擊楚且為智者固若此邪信謝曰臣得事項王數年官不過郎中位不過執㦸郎中宿衞執㦸言不聽畫䇿不用故背楚歸漢漢王授我上將軍印將數萬之衆解衣衣我推食食我下衣音於記反下食讀曰飼言聽計用吾得至於此夫人深親信我背之不祥幸為信謝項王武涉已去蒯通知天下權在於信深說以三分天下鼎足而王信不忍背漢又自以功大漢王不奪我齊遂不聽夏侯嬰從髙祖擊項羽至彭城羽大破漢軍漢王不利馳去見孝惠魯元載之漢王急馬罷虜在後罷讀曰疲常蹳兩兒棄之嬰常收載行面雍樹馳蹳音撥面背也雍抱持之言取兩兒令面著已而抱持之以馳故云面擁樹馳雍讀曰擁髙祖怒欲斬嬰者十餘卒得脫而致孝惠魯元於豐及髙后德嬰之脫孝惠魯元下邑也乃賜嬰北第第一北第者近北之第嬰最第一曰近我以尊異之霍去病武帝時為驃騎將軍帝常為治第令視之對曰匈奴不滅無以家為由此帝益重之後漢劉稷為光武兄伯升部將稷數陷陳潰圍勇冠三軍時將兵擊魯陽聞更始立稷怒曰本起兵圖大事者伯升兄弟也今更始何為者邪更始君臣聞而心忌之竇融行河北五郡大將軍事遥聞光武即位而心欲東向以河西隔逺未能自通時隗囂先稱建武年號融等從受正朔囂皆假其將軍印綬囂外順人望内懐異心使辨士張𤣥游說河西曰更始事業已成尋復亡滅此一姓不再興之效今即有所主便相係屬一旦拘制自令失柄後有危殆雖悔無及今豪傑競逐雌雄未決項羽謂髙祖曰願與沛公決雌雄當各據其土宇與隴蜀合從以利合為從以威勢相脅曰横髙可為六國下不失尉佗佗姓趙眞定人也陳勝起佗行南海尉遂王有南越故曰尉佗也融等於是召豪傑及諸太守計議其中智者皆曰漢承堯運左傳曰陶唐氏既衰其後有劉累事孔甲為御龍氏春秋時晉卿士㑹即其後也士㑹奔秦後歸晉其處者為劉氏戰國時劉氏自秦獲於魏遷大梁都於豐號豐公即太上皇父也故曰漢承堯運歴數延長今皇帝姓號見於圖書謂河圖赤伏符曰劉秀發兵捕不道自前世博物道術之士谷子雲夏賀良等建明漢有再受命之符言之乆矣前書成帝時谷永上書曰陛下當陽數之標季渉三七之節紀哀帝時夏賀良言赤精子讖漢家歴運中衰當再受命也故劉子駿改易名字冀應其占劉歆以哀帝建平元年初改名秀字穎叔兾應符命及莽末道士西門君惠言劉秀當為天子遂謀立子駿事覺被殺出謂百姓觀者曰劉秀真汝主也皆近事暴著暴露也著見也智者所共見也除言天命且以人事論之今稱帝者數人而雒陽土地最廣甲兵最强號令最明觀符命而察人事它姓殆未能當也諸郡太守各有賔客或同或異融小心精詳遂決䇿東向五年夏遣長史劉鈞奉書獻馬先是帝聞河西完富地接隴蜀常欲招之以逼囂術亦發使遺融書遇鈞於道即與俱還帝見鈞歡甚禮饗畢乃遣令還賜融璽書曰制詔行河西五郡大將軍事蜀國都尉勞鎮守邊五郡兵馬精强倉庫有蓄民庶殷富外則折挫羌胡内則百姓蒙福威徳流聞虛心相望道路隔塞邑邑何已長史所奉書獻馬悉至深知厚意今益州有公孫子陽天水有隗將軍方蜀漢相攻權在將軍舉足左右便有輕重猶蒯通曰與楚即楚勝與漢則漢勝以此言之欲相厚豈有量哉諸事俱長史所見將軍所知王者迭興千載一㑹言時難得而易失也欲遂立桓文輔㣲國當勉卒功業周室㣲弱齊桓晉文輔之以覇天下欲三分鼎足連衡合從亦宜以時定蒯通說韓信曰三分天下鼎足而立天下未并吾與爾絶域非相吞之國今之議者必有任囂效尉佗制七郡之計秦胡亥時南海尉任囂病且死召龍川令趙佗語曰畨禺負山險阻南北東西數千里頗有中國人相輔此亦一州之主可為國故召公即令行南國尉事地理志曰蒼梧鬱林合浦交趾九眞南海日南皆越之分野此為七郡也效致也流俗本作教者誤也王者有分土無分民自適已事而已今以黄金二百斤賜將軍便宜輒言因授融為涼州牧璽書既至河西皆驚以為天子明見萬里之外網羅張立一作𤣥之情融即復遣鈞上書曰臣融竊伏自惟幸得託先后末屬蒙恩為外戚累世二千石至臣之身復僃列位假歴將帥假猶濫也守持一隅以委質則易為辭以納忠則易為力書不足以深達至誠故遣劉鈞口陳肝膽自以底裏上露長無纖介底裏皆露言無藏隱而璽書盛稱蜀漢二主三分鼎足之權任囂尉佗之謀竊自痛傷臣融雖無識猶知利害之際順逆之分豈可背真舊之主事姦偽之人廢忠貞之節為傾覆之事棄已成之基求無兾之利此三者雖問狂夫猶知去就而臣獨何以用心謹遣同産弟友詣闕口陳區區友至髙平髙平今涼州縣也㑹囂反叛道絶馳還遣司馬席封間行通書東觀記及續漢書席皆作虞帝復遣席封賜融友書所以慰藉之甚僃融乃與隗囂書責讓之囂不納融乃與五郡太守共砥厲兵馬上疏請師期帝深嘉美之鮑永從更始為尚書僕射行大將軍安集河東并州朔方時赤眉害更始三輔道絶光武即位遣諫議大夫儲大伯持節徴永詣行在所永疑不從乃收繫大伯遣使馳至長安既知更始已亡乃發喪出大伯等封上將軍列侯印綬罷兵但幅巾與諸將及同心客百餘人詣河内帝見永問曰卿衆所在永離席叩頭曰事更始不能令全誠慙以其衆幸富貴故悉罷之帝曰卿言大是而意不悅呉漢為司馬性彊力每從帝征伐帝未安居漢常側足而立耿弇為大將軍為張步所攻光武聞之自徃救之未至陳俊謂弇曰劇虜兵盛可且閉營休士以須上來弇曰乘輿已到臣子當擊牛釃酒以待百官反欲以賊虜遺君父耶乃出兵大戰自旦及昏復大破之來歙為中郎將與虎牙大將軍蓋延揚武將軍馬成進攻公孫述將王元環安於河池下辯陷之乘勝遂進蜀人大懼使刺客刺歙未殊馳召蓋延延見歙因伏悲哀不能仰視歙叱延曰虎牙何敢然今使者中刺客無以報國故呼巨卿巨卿蓋延字也欲相屬以軍事而反效兒女子涕泣乎刃雖在身不能勒兵斬公耶延收淚强起受所誡歙自書表曰臣夜人定後為何人所賊傷中臣要害臣不敢自惜誠恨奉職不稱為朝廷羞夫理國以得賢為本太中大夫段襄骨鯁可任願陛下裁察又臣兄弟不肖終恐被罪陛下哀憐數賜教督投筆抽刃而絶祭遵為征虜將軍無子兄午娶妾送之遵乃使人逆而不受自以身任於國不敢圖生慮繼嗣之計祭彤為太僕將萬餘騎伐北匈奴坐逗撓下獄既出數日歐血死臨終謂其子曰吾蒙國㤙厚奉使不稱㣲績不立身死誠慚恨義不可以無功受賞死後若悉簿上所得賜物身自詣兵屯効死前行以副吾心既卒其子逢上疏具陳遺言帝甚嗟嘆之溫序為䕶羌校尉行部至襄武為隗囂别將茍宇所拘刼宇謂序曰子若與我并威同力天下可圖也序曰受國重任分當効死義不貪生茍背恩徳宇等復暁譬之序素有氣力大怒叱宇等曰虜何敢迫脅漢將因以節撾殺數人賊衆争欲殺之宇止之曰此義士死節可賜以劔序受劒衘鬚於口顧左右曰既為賊所迫殺無令鬚汚土遂伏劔而死序主簿韓遵從事王忠持屍歸歛光武聞而憐之命忠送喪到雒陽賜城傍為冢地賻穀千斛縑五百疋馬援為伏波將軍征五溪夜與送者訣謂友人謁者杜愔曰吾受厚恩年迫餘日索索盡也常恐不得死國事今獲所願甘心瞑目但畏長者家兒或在左右或與從事殊難得調介介獨惡是耳長者家兒謂權要子弟等介介猶耿耿也援又謂平陵孟兾曰方今匃奴烏桓尚擾北邊欲自請擊之男兒要當死於邊野以馬革裹屍還葬耳何能卧牀上在兒女子手中邪兾曰諒為烈士當如此矣班超為將兵長史在西域衛侯李邑䕶送烏孫使者因盛毁超擁愛妻抱愛子安樂外國無内顧心超聞之歎曰身非曾參而有三至之讒恐見疑於當時矣遂去其妻帝知超忠乃切責邑曰縱超擁愛妻抱愛子思歸之士千餘人何能盡與超同心乎遂令邑詣超受節度詔超若邑任在外者便留與從事超即遣邑將烏孫侍子還京師徐幹謂超曰邑前親毁君欲敗西域今何不緣詔書留之更遣它吏送侍子乎超曰是何言之陋也以邑毁超故今遣之内省不疚何䘏人言快意留之非忠臣也皇甫嵩為右車騎將軍平黄巾威震天下故信都令漢陽閻忠說嵩嵩懼曰非常之謀不施於有常之勢創圖大功豈庸才所致黄巾細孽敵非秦項新結易散難以濟業且人未忘主天不佑逆若虛造不兾之功以速朝夕之禍孰與委忠本朝守其臣節雖云多讒不過放廢猶有令名死且不朽反常之論所不敢聞忠知計不用因亡去張楊為河内太守獻帝在河東楊將兵至安邑拜安國將軍封晉陽侯楊欲迎天子還雒陽諸將不聽楊還野王建安元年楊奉董承韓暹挾天子還舊京糧乏楊以糧迎道路遂至雒陽謂諸將曰天子當與天下共之幸有公卿大臣楊當捍外難何事京都遂還野王即拜為大司馬董承為車騎將軍開府時獻帝自都許之後權歸曹氏天子總已百官僃員而已帝忌操專偪乃宻詔承使結天下義士共誅之承遂與劉備同謀未發㑹備出征承與偏將軍王服長水校尉种輯議郎吳碩結謀事泄承服輯碩皆為操所害魏龎德為立義將軍與曹仁禦闗公樊下諸將以德兄在漢中頗疑之德常曰我受國恩義在效死我欲身自擊羽今年我不殺公公當殺我後親與公戰射公中額時德嘗乗白馬公軍謂之白馬將軍皆憚之仁使德屯樊北十里會天霖雨十餘日漢水暴溢樊下平地五六丈德與諸將避水上隄公乗船攻之以大船四面射隄上德被甲持弓箭不虛發將軍董衡部曲將董超等欲降德皆收斬之自平旦力戰至日過中公攻益急矢盡短兵接戰德謂督將成何曰吾聞良將不怯死以茍免烈士不毁節以求生今日我死日也戰益怒氣愈壯而水浸盛吏士皆降德與麾下將一人伍伯二人彎弓𫝊矢乗小船欲還仁營水盛船覆失弓矢獨抱船覆水中為公所得立而不跪公謂曰卿兄在漢中我欲以卿為將不早降何為德罵公曰豎子何謂降也魏王帶甲百萬威振天下汝劉僃庸才耳豈能敵邪我寜為國家鬼不為賊將也遂為公所殺太祖聞而悲之為之流涕封其二子為列侯徐晃為横野將軍與蜀將關公宿相愛公攻曹仁於樊太祖遣晃與公遙共語但說平生不及軍事須臾晃下馬宣令得蜀將軍頭賞金千斤公驚怖謂晃曰大兄是何言邪晃曰此國之事耳郝昭為將軍築陳倉城太和二年十二月蜀將諸葛亮圍陳倉亮使昭鄉人靳詳於城外遙說之昭於樓上應詳曰魏家科法卿所練也我之為人卿所知也我受國恩多而門戸重卿無可言者但有必死耳卿還謝諸葛便可攻也詳以昭語告亮亮又使詳重說昭曰人兵不敵無為空自破滅昭謂詳曰前言已定矣我識卿耳箭不識也詳乃去許允齊王時為中領軍時姜維冦隴右安東將軍司馬文王鎮許昌徴還擊維至京師帝於平樂觀以臨軍過允與左右小臣謀因文王辭殺之勒其衆以退大將軍已書詔於前文王入帝方食栗優人雲午等唱曰青頭鷄青頭鷄青頭鷄者鴨也帝懼不敢發文王引兵入城景王因是謀廢帝諸葛誕為鎮南將軍時母邱儉文欽反遣使詣誕招呼豫州士民誕斬其使露布天下令知儉欽凶逆又誕據有淮南之地司馬文王新秉政欲徵誕為司空乃遣賈充與誕相見談說時事因謂誕曰雒中諸賢皆願禪代君所知也君以為云何誕厲色曰卿非賈豫州子世受魏恩如何負國欲以魏國輸人乎非吾所忍聞若雒中有難吾當死之充黙然誕既被徴請諸牙門置酒飲宴呼牙門從兵皆賜酒令醉謂衆人曰前作千人鎧杖始成欲以擊賊今當還雒不復得用欲蹔出將見人游戲須臾還耳諸君且止乃嚴鼓將士七百人出樂綝聞之閉州門誕歴南門宣言曰當還雒邑蹔出游戲揚州何為閉門見備前至東門東門復閉乃使兵緣城攻門州人悉走因風放火焚其府庫遂殺綝誕表曰臣受國重任統兵在東揚州刺史樂綝專詐說臣與吳交通又言被詔當代臣位無狀日久臣奉國命以死自立終無異端忿綝不忠輙將歩騎七百人以今月六日討綝即日斬首函頭驛馬傳送若聖朝明臣臣即魏臣不明臣臣即吳臣不勝發憤有日謹拜表陳愚悲感泣血哽咽斷絶不知所如乞朝廷察臣至誠孫禮為冀州牧以定平原清河界為曹爽所怒後除城門校尉時匃奴王劉靖部衆彊盛而鮮卑數冦邊乃以禮為并州刺史加振武將軍使持節䕶匃奴中郎將徃見太傅司馬宣王有忿色而無言宣王曰卿得并州少邪恚理分界失分乎今當逺别何不懽也禮曰何明公言之乖細也禮雖不德豈以官位徃事為意邪本謂明公齊蹤伊吕規輔魏室上報明帝之託下建萬世之勲今社稷將危天下兇兇此禮之所以不悅也因涕泣横流宣王曰且止忍不可忍蜀霍峻為中郎將先主自葭萌南還襲劉璋留峻守葭萌城張魯遣將楊帛誘峻求共守城峻曰小人頭可得城不可得帛乃退去關公初事先主為别部司馬行徐州太守事後為曹公所禽曹公壯公為人而察其心誠無久留之意謂張遼曰卿試以情問之既而遼以問公公歎曰吾極知曹公待我厚然吾受劉將軍厚恩誓以共死不可背之吾終不留吾要當立功以報曹公乃去遼以公言報曹公義之傅彤為將軍從先主征吳進軍斷後拒戰兵人死盡吳將語彤令降彤罵曰吳狗何有漢將軍降者遂戰死拜子僉為左郎中後為關中都督景耀六年又臨危授命論者嘉其父子奕世忠義姜維初為奉義將軍先是馬謖敗於街亭諸葛亮拔將西縣千餘家及維等還維遂與母相失魏人使其母手書呼維令反并送當歸以譬之維報書曰良田百頃不計一畝但見逺志無有當歸張翼為庲降都督綏南中郎將翼性持法嚴不得殊俗之歡心耆率劉胄背叛作亂翼舉兵討胄胄未破㑹被徴當還羣下咸以為宜便馳騎即罪翼曰不然吾以蠻夷蠢動不稱職故還耳然代人未至吾方臨戰塲當運糧積穀為滅賊之資豈可以一退之故而廢公家之務乎於是統攝不懈代到乃發馬忠因其成基以破殄胄丞相亮聞而善之霍弋為安南將軍統南郡事聞魏軍來弋欲赴成都後主以備敵既定不聽及成都不守弋素服號哭大臨三日諸將咸勸宜速降弋曰今道路隔塞未詳主之安危大故去就不可茍也若主上與魏和見遇以禮則保境而降不晩也若萬一危辱吾將以死拒之何論遲速邪羅憲為巴東太守時右大將軍閻宇都督巴東為領軍後主拜憲為宇副貳魏之伐蜀召宇西還留守二千人令憲守永安城尋聞成都敗城中擾動江邊長吏皆棄城走憲斬稱成都亂者一人百姓乃定得後主委質問至乃帥所統臨於都亭三日吳張昭為輔吳將軍每朝見辭氣壯厲義形於色曾以直言逆㫖中不進見後蜀使來稱蜀德羙而羣臣莫拒大帝歎曰使張公在坐彼不折自廢安復自誇乎明日遣中使勞問因請見昭昭避席謝帝跪止之昭坐定仰曰昔太后桓王不以老臣屬陛下而以陛下屬老臣臣是以思盡臣節以報厚恩使冺没之後有可稱述而意慮淺短違逆聖㫖自分幽淪長棄溝壑不圖復蒙引見得奉帷幄然臣愚心所以事國志在忠益畢命而已若乃變心易慮以偷榮取容此臣所不能也帝辭謝焉徐盛為中郎將大帝為魏稱藩魏使邢貞拜為吳王帝出都亭候貞貞有驕色張昭既怒而盛忿憤顧謂同列曰盛等不能奮身出命為國家并許雒吞巴蜀而令吾君與貞盟不亦辱乎因涕泣横流貞聞之謂其旅曰江東將相如此非久下人者也吕蒙為將從大帝征合肥既徹兵為張遼等所襲蒙與凌統以死捍衛董襲遷偏將軍曹公出濡須襲從大帝赴之使襲督五樓船徃濡須口夜卒暴風五樓船傾覆左右散走舸乞使襲出襲怒曰受將軍任在此備賊何等委去也敢復言此者斬於是莫敢干其夜船敗襲死大帝改服臨殯供給甚厚周瑜為大將軍曹公聞瑜年少有羙才謂可游說動也乃宻下揚州遣九江蔣幹徃見瑜幹有儀容以才辯見稱獨歩江淮之間莫與為對乃布衣葛巾自託私行詣瑜瑜出迎之立謂幹曰子翼良苦逺渉江湖為曹氏作說客邪幹曰吾與足下州里中間别隔遙聞芳烈故來叙闊并觀雅規而云說客無乃逆詐乎瑜曰吾雖不及䕫曠聞絃賞音足知雅曲也因延幹入為設酒食畢遣之曰適吾有宻事且出就館事了别自相請後三日瑜請幹與周觀營中行視倉庫軍資器仗訖還飲宴示之侍者服飾珍玩之物因謂幹曰大丈夫處世遇知己之主外託君臣之義内結骨肉之恩言行計從禍福共之假使蘇張更生酈叟復出猶撫其背而折其辭豈足下㓜生所能移乎幹但笑終無所言幹還稱瑜雅量髙致非言辭所間中州之士亦以此多之賀齊為將時大帝征合肥還為張遼所掩襲於津北幾至危殆齊時率三千兵在津南迎大帝既入大船會諸將飲宴齊下席涕泣而言曰至尊人主常當持重今日之事幾致禍敗羣下震怖若無天地願以此為終身戒大帝自前收其淚曰大慙謹以刻心非但書諸紳也陸遜為大將軍時中書典挍吕壹竊㺯權柄擅作威福遜與太常潘濬同心憂之言至流涕後大帝誅壹深以自責張悌為屯騎校尉晉伐吳孫皓使悌督沈瑩諸葛靚帥衆三萬渡江逆之至牛渚沈瑩曰晉治水軍於蜀久矣今傾國大舉萬里齊力必悉益州之衆浮江而下我上流諸軍無有戒備名將皆死㓜少當任恐邊江諸城盡莫能禦也晉之水軍必至于此矣宜畜衆力待來一戰若勝之日江西自清上方雖壊還可取之今渡江逆戰勝不可保若或摧喪則大事去矣悌曰吳之將士賢愚所知非今日也吾恐蜀兵來至此衆心必駭懼不可復整今宜渡江可用決戰力爭若其敗喪則同死社稷無所復恨若其克勝則此敵奔走兵勢萬倍便當乗威南上逆之中道不憂不破也若如子計恐軍行散盡相與坐待敵到君臣俱降無復一人死難者不亦辱乎遂渡江戰吳軍大敗晉毛炤為將軍與吳軍戰殺吳前部督修則陶璜等後食盡為吳人所獲以炤壯勇欲赦之而則子允固求殺炤炤亦不為璜等屈璜等怒面縛炤詰之曰晉賊炤厲聲曰吳狗何等為賊吳人生割其腹允割其心肝罵曰庸復作賊炤猶罵不止曰尚欲斬汝孫皓皓汝父向死狗也乃斬之武帝聞而哀矜即詔使炤長子襲爵餘三子皆關内侯周處為御史中丞時氐人齊萬年反處𨽻夏侯駿西征伏波將軍孫秀知其將死謂之曰卿有老母可以此辭也處曰忠孝之道安得兩全既辭親事君父母復安得而子乎今日是我死所也既而梁王彤為征西大將軍時賊屯梁山有衆七萬而駿逼處以五千擊之處曰軍無後繼必至覆敗雖在亡身為國取恥彤復命處進討乃與振威將軍盧播雍州刺史解系攻萬年於六陌將戰處軍人未食彤促令速進而絶其後繼處知必敗賦詩曰去去世事已䇿馬觀西戎藜藿甘梁黍期之克令終言畢而戰自旦及暮斬首萬計弦絶矢盡播系不救左右勸退處按劔曰此是吾效節受命之日何退之為且古者良將受命凶門以出蓋有進無退也今諸君負信勢必不振我為大臣以身殉國不亦可乎遂力戰而没張光為材官將軍梁州刺史鎮漢中時逆賊王如餘黨大盛光嬰城固守自夏迄冬憤激成病佐吏及百姓咸勸光退據魏興光按劔曰吾受國厚恩不能翦除冦賊今得自死便如登仙何得退還也聲絶而卒百姓悲泣逺近傷惜之山簡為征南將軍鎮襄陽雒陽陷沒遷于夏口時樂府伶人避難多奔沔漢讌會之日僚佐或勸奏之簡曰社稷傾覆不能救者有晉之罪人也何作樂之有因流涕慷慨坐者咸愧焉索綝為安西將軍時懐帝蒙塵長安又陷南陽王模被害綝泣曰與其俱死寜為伍子胥乃赴安定與雍州刺史賈遷扶風太守梁綜安夷䕶軍麴允等糾合義衆頻破賊黨修復舊舘遷定宗廟進救新平小大百戰綝手擒賊帥李羌與閻鼎立秦王為皇太子及即尊位是為愍帝綝遷侍中太僕以首迎大駕升壇授璽之日封弋居伯又進前將軍尚書右僕射劉琨愍帝即位拜大將軍都督并州諸軍事加散騎常侍假節琨上疏謝曰陛下畧臣大愆錄臣小善猥蒙天恩光授殊寵顯以蟬冕之榮崇以上將之位伏省詔書五情飛越臣聞晉文以卻縠為元帥而定霸功髙祖以韓信為大將而成王業咸有敦詩閱禮之德戎昭果毅之威故能振豐功於荆南拓洪基於河北况臣凢陋擬蹤前哲俯懼折鼎慮在覆餗昔曹沬三北而收功於柯盟馮異垂翅而奮翼於澠池皆能因敗為成以功補過陛下宥過之恩已隆而臣自新之善不立臣雖不逮預聞前訓恭讓之節臣猶庻幾所以冐承寵命者實欲没身報國輒死自効要以致命冦塲盡其臣節至於寵榮之施非言辭所謝又謁者史蘭殿中中郎王春等繼至奉詔臣俯尋聖㫖伏紙飲淚臣聞夷險流行古今代有靈厭皇德曾未悔禍蟻狄縱毒於神州夷醜肆虐於上國七廟闕禋祀之嚮百官喪彛倫之序梓宫淪辱山陵未兆率土永慕思同考妣陛下龍姿日茂睿質彌光升區宇於既頽崇社稷於已替四海之内肇有上下九服之萌復覩典制伏惟陛下蒙塵於外越在秦郊蒸嘗之敬在心桑梓之思未克臣備位歴年才質駑下邱山之釁已彰毫釐之效未著頃以時宜權假位號竟無殪戎之績而有負乗之累當肆刑書以明黜陟是以臣前表上聞敢緣愚欵乞奉先朝之班茍存偏師之職赦其三敗之愆収其一切之用得騁志虜塲快意大逆雖身膏野草無恨黄壚陛下偏恩過隆猶蒙擢拔遂授上將位超常伯征討之任得從事宜拜命驚惶五情戰悸懼于隕越以為朝羞昔申胥不徇栢舉而成公壻之勲伍員不從城父而濟入郢之庸臣雖頑凶無覬古人其於被堅執銳致身冦讐所謂天地之施羣生莫謝不勝受恩至深謹拜表陳聞後石勒據襄國及麴允敗劉曜斬趙冉琨上表曰逆胡劉聰敢率犬羊憑陵輦轂人神發憤遐邇奮怒伏省詔書相國南陽王保太尉涼州刺史軌糾合二州同恤王室冠軍將軍允䕶軍將軍綝總齊六軍戮力國難王旅大捷俘馘千計旌旗首於晉路金鼓振於河曲崤凾無䖍劉之警汧隴有安業之慶斯誠宗廟社稷陛下神武之所致含氣之類莫不引領况臣之心能無踴躍臣前表當與鮮卑猗盧尅今年三月都會平陽會凶羯石勒以三月三日徑掩薊城大司馬博陵公浚受其偽和為勒所虜勒勢轉盛欲來襲臣城塢駭懼志在自守又猗盧國内欲生姦謀幸盧警慮尋皆誅滅遂使南北顧慮用愆成舉臣所以泣血宵吟扼腕長歎者也勒據襄國與臣隔山冦騎朝發夕及臣城同惡相求其徒實繁西北八州勒滅其七先朝所授存者唯臣是以勒朝夕謀慮以圖臣為計闚伺間隙冦抄相尋戎士不得解甲百姓不得在野天網雖張靈澤未及唯臣孑然與㓂為伍自守則稽聰之誅進討則勒襲其後進退維谷徒懐憤踴力不從願慙怖怔營痛心疾首形留所在神馳㓂庭秋榖既登胡馬已肥前鋒諸軍並有至者臣當首啓戎行身先士卒臣與二虜勢不並立聰勒不梟臣無歸志庶憑陛下威靈使微意獲展然後殞首謝國没而無恨又及二都傾覆社稷絶嗣元帝初鎮江左琨誠繫王室謂右司馬溫嶠曰昔班彪識劉氏之復興馬援知漢光之可輔今晉祚雖衰天命未改吾欲立功河朔使卿延譽江南子其行乎對曰嶠雖無管張之手而明公有桓文之志欲建匡合之功豈敢辭命乃以為左長史檄告華夷奉表勸進既至引見具陳琨忠誠志在效節因說社稷無主天人係心辭㫖慷慨舉朝屬目帝器而嘉焉王導周顗謝琨庾亮桓彛等並與親善於時江左草創綱維未舉嶠殊以為憂及見王導共談歡然曰江左自有管夷吾吾復何慮琨為段疋磾所害嶠表琨忠誠雖勲業不遂然家破身亡宜在褒崇以慰海内之望帝然之劉沉齊王冏輔政引為左長史遷侍中于時李流亂蜀詔沉以侍中假節統益州刺史羅尚梁州刺史許雄等以討流行次長安河間王顒請沉為軍司遣席逺代之後領留雍州刺史及張昌作亂詔顒遣沉將州兵萬人并西征府五千人自藍田關以討之顒不奉詔沉自領州兵至藍田顒又逼奪其衆長沙王乂命沉將武吏四百人還州張方既逼京都王師屢敗王湖祖逖言於乂曰劉沉忠義果毅雍州兵力足制河間宜啓上詔與沉使發兵襲顒顒窘急必召張方以自救此計之良也乂從之沉奉詔馳檄四境令七郡之衆及諸軍塢壁甲士萬餘人以安定太守衛博新平太守張光安定功曹皇甫澹為先登襲長安顒時頓于鄭縣之高平亭為東軍聲援聞沉兵起還鎮渭城遣督䕶虞䕫率步騎萬餘人逆沉於好畤接戰夔衆敗顒大懼退入長安果急呼張方沉渡渭而壘顒每遣兵出鬬輒不利沉乗勝攻之使澹博以精甲五千從長安門而入力戰至顒帳下沉軍來遲顒軍見澹等無繼氣益倍馮翊太守張輔率衆救顒横擊之大戰於府門博父子皆死之澹又被擒顒竒澹壯勇將活之澹不為之屈於是見殺沉軍遂敗率餘卒屯于故營張方遣其將郭偉夜至沉軍大驚而潰與麾下百餘人南遁為陳倉令所執沉謂顒曰夫知己之顧輕在三之節重不可違君父之詔量强弱以茍全投𬒮之日期之必死葅醢之戮甘之如薺辭義慷慨見者哀之顒怒鞭之而後腰斬之有識者以顒干上犯順虐害忠義知其滅亡不久也册府元龜卷三百七十
