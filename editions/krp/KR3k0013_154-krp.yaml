body:
  text: 册府元龜卷一百五十四宋王欽若等撰帝王部明罰第三後唐莊宗同光元年十月入汴州詔曰朕既殄偽庭顯平國患好生之令含𢎞雖切於予懷懲惡之規决斷難違於衆請况趙巖趙鵠等自朕收城數日布惠四方尚匿迹以濳形罔悛心而革面須行赤族以謝衆心其張漢傑昨於中都與王彦章同時俘獲此際未詳行止偶示哀矜今既上將陳詞羣情激怒往日既彰於僣濫此時難漏於網羅宜寘國刑以塞羣論除妻兒骨肉外其他疎屬僕使並從釋放敬翔李振首佐朱温共傾唐祚屠害宗屬殺戮朝臣既寰宇以皆知在人神而共怒敬翔雖聞自盡未豁幽寃宜與李振並族於市疎屬僕使並從原宥朱珪素聞狡蠧唯務讒邪鬭惑人情枉害良善將清内外須切去除况衆狀指陳亦宜誅戮契丹撒刺阿撥既棄其母又背其兄朕比重懷來厚加恩渥看同骨肉錫以姓名兼分符竹之榮疊被頒宣之渥而乃輒孤重惠復背明庭罔顧欺違竄歸偽室既同梟鏡難貸刑章可並妻子同戮於市其朱氏近親趙鵠正身趙巖家屬仰嚴加擒捕其餘文武職員將校一切不問是日趙巖張希逸張漢傑張倫張漢融朱珪敬翔李振及契丹撒刺阿撥等并其妻孥皆斬於汴橋下並梁室臣佐也二年正月丙午前新鄉鎮將李洪玫詣闕首罪斬於天津橋南洪玫先以城歸梁故也六月蕃漢總管李嗣源遣使部送安義賊首領楊立左重趙實韓貴等二十人到闕令兩軍號令磔於鎮國橋十二月壬午勑周易博士冀軫貶磁州司户禮記愽士宋澶貶石州司户春秋博士陳處中謫授國子監丞誤保選人故也選人呉延皓取亡叔告身改舊名行事付河南府處死銓吏尹致職居行首但恣奸欺窮竒備驗於行藏積弊須去其元惡可處死鄭傳身為堂吏事昧公心勾當踰濫選人曲委冩造文狀保奸斯在情故可知可流決邢州承㫖官王處環是臺司首吏職名不卑誠宜助憲府之凖繩豈得叶選人之踰濫决流忻州裴温玉皇甫源邵仁郜勾當選人有渉踰濫或出公驗都昧精詳各决杖退充本司最下令史三銓官崔沂等既已貶謫劾其有司冀軫與諸令史共為嚢槖故也三年正月丁酉中書門下奏選人劉邽麻温田昭遠賈思義盧琢皆是家狀内牧豎丁父母憂年月不同已牓示駁放劉邽麻温塗毁告身委本州重處色役田昭遠已下殿五選從之明宗天成元年四月辛丑勑鄧州節度使李紹欽太子少保李紹冲汴州都麴務使辛廷尉李繼宣等並勒歸田里紹欽本姓温名韜紹冲本姓叚名凝廷尉偽開封尹王瓉之牙將也朱友貞時依瓉勢曲法亂政汴人深惡之繼事汴將孟審澄之子審澄誅亡命歸莊宗劉皇后蓄之為子時宫掖之間穢聲流聞比之四兇帝在藩邸時惡其為人故並誅黜之二年二月丙午以從馬直指揮使郭從謙為景州刺史尋令中使誅於郡夷其族以其首謀大逆弑莊宗也三年閏八月滑州掌書記孟昇匿母憂大理寺斷流奉勑朕以允從人望嗣守帝圖政必究於化源道每從於德本貴全國法以正人倫孟昇身被儒冠職居賔幕比資籌畫以贊盤維而乃都昧操脩但貪榮禄匿母喪而不舉為人子以何堪瀆汚時風敗傷名教五刑是重十惡難寛雖遣投荒無如去世孟昇賜自盡觀察使觀察判官録事叅軍失其糾察各有殿罰襄邑縣民周威父為人所殺不雪父寃有狀和解奉勑處死九月勑先監送諸州罪人温韜等流言亂政在憲典以難容稔惡幸災固人祗之共怒温韜生為黔首起自緑林依憑中夏干戈刼盗本朝陵寢段凝豺狼類性梟獍為謀無辜而幾害平人得便而嘗懷逆節陶記曾司藩翰恣黷貨財自處竄流彌興怨望石如納比居賔佐合務贊禆當守殷門撥發文字扇揺戎帥聶嶼擢從班列委佐親賢不守條章彊買店宅其後細詢行止頗駭聽聞喪妻未及於半年别成姻媾棄母動逾於千里不奉晨昏而皆自抵刑章各居竄逐都無省過但出怨詞在朕意雖欲含𢎞於物論固難容赦尚全大體只罪一身並令本處賜死十一月宗正卿李紵先補虛稱試御史權公裔攝陵臺令紵欵稱公裔請假與公裔狀不同大理少卿張之愿詳斷以報上不實者徒一年李紵前犯詐假是重今犯報上不實是輕凖律雖寛酌情尤重請降特勑指揮奉勑李紵縱橫詐偽重疊欺君雖奪一任告身尚屈大朝憲法玷予宗籍時乃奸訛宜奪歴任告身仍配隴州徒一年四年二月車駕自汴還京至汜水東都留司官太子少傅李琪等奏曰伏以陛下暫違清廟纔過周星初平作孽之守殷次戮不臣之庭琬今者敗契丹之兇黨破真定之逆城大振皇威咸繇睿筭臣等久違宸極俱戀聖恩恨不隨獸舞於汴郊拜龍顔於梁苑豈可只於清洛坐俟迴鑾願於次舍之間得展㑹同之禮庶傾就望咸竭歡呼臣等今乞於偃師東排班迎駕稱賀後先赴雒陽東祇候奉勑契丹即為兇黨真定不是逆城蓋闕審詳有兹差誤李琪罰一月俸先是定州王都叛命琪不詳鎮州為真定誤用之故及於罰六月有内班石重千等六人控鶴官三人矯傳聖㫖宣諭臣寮多受其遺賂是日發覺殺四人鞭五人背十二月蔡州西平縣令李商為百姓告陳不公大理寺斷止贖銅以官當罪勑㫖李商招愆俱在案欵大理定罪備引格條然亦事有所未圖理有所未盡古之立法意在惜人况自列聖相承溥天無事人皆知禁刑遂從輕喪亂已來亷耻者少朕一臨寰海四換星灰嘗宣無外之風每革從前之弊勤脩一德深念五刑寛則不威暴則無惠唯期不濫皆守無私李商不務養民專謀潤已初聞告不公之事件决彼狀頭又為奪有主之庒田撻其本戸國家給州縣篆印只為行遣公文而乃將印歴下鄉從人戸取物據茲行事何以當官今王饒所告李商並招實罪宜奪歴任官重杖一頓處死元論人王饒四人並宜放仍令所在長吏徧示衆多居髙者不得貪以陵卑在下者不得驕而訕上體泣罪之意聽祝網之言各守公途共資王道長興元年正月乙亥御史臺奏京兆府牒送到爭論莊田人詳牒内本府元未曾推勘便送赴臺伏准舊例諸道州府責勘尋常公事如曾經斷遣不了方具奏聞候勑下付臺始行追勘且無州縣直牒送臺請行推勘兼夾府尹判語指揮臺司勑㫖為官未可避事夾判不合申臺既有舉明須行責罰府司官吏已下等第書罰九月庚午濟州偽造嘉禾七莖共兩穗本州長史皆罰直十月吏部侍郎王權將作監王澄太僕少卿魏仁鍔庫部郎中孔崇弼司門郎中李殷夢河南縣令郭正封等六人妻叙封郡君縣君者勑㫖叙封之例勑格甚明况在所司備經其事既成差誤蓋是因循顯有紏彈實為允當欺即難恕錯即可矜然欲示戒懲須行責罰本行令史馬仁珪决臋杖七十勒停本部判郎中裴坦罰兩月俸王權等六人妻進封叙封郡縣邑號官誥宜令所司追納毁廢初郊天後赦書節文云朝臣並與追封贈及叙封制不在此限其年七月十二日中書以前赦書節文不該據品秩依格例施行又奏覆在朝臣寮限兩月内一齊聞奏並據品秩依格例施行河南縣令郭正封制前任考功員外郎朝議郎階俱是六品後遷河南縣令加朝請大夫正五品其妻乃叙封縣君内彈侍御史吕琦舉劾乃招偽濫有渉情故二年三月禮部令史呉知已揩改太廟齋郎李誼勑甲及堂判姓名為張昭因偽出給優牒與張昭齋郎吕圖陳告其偽捕訊於御史臺張昭吕圖李誼是諫議大夫張延雍將作少監吕道昭宗正卿李玩之子也以䕃當補獄成呉知已欵伏縁張延雍習為當省郎官令知已專主張其子齋郎文書縁奏覆未成延雍累遣人催促及召至面前苛克以此怕懼遂揩改李誼勑書張昭姓名兼蒙昧本司官人出給優牒偽使符印有實詔付大理寺定罪少卿路阮詳斷准格詐為制勑偽行符印罪當絞其令史呉知已准格重杖一頓處死本司官祠部郎中王承弁初不精詳致彼罔冐准詐偽律合杖九十如已去官則减等今王承弁已别除官據格放罪門下令史陳延祐雖不與呉知已同情有涉屬託准律杖一百放堂後官何康初言屬託不至瑕疵准律杖罪吕道昭李玩吕圖事雖關連别無深罪准格並合釋放諫議大夫張延雍補䕃自有格文催促失於事體言苛尅之語雖是見人據引驗之詞蓋亦虛指伏候勑處分勑㫖曰張延雍中官舊居省署䕃子合補齋郎為優牒稽遲於本司催促苛克縱實已該肆赦之恩引驗無聞自掇兩詞之詰致淹折獄宜示罰金宜罰一季俸餘依法寺詳斷四月以樞宻院承㫖李䖍徽為忠武軍行軍司馬䖍徽邢州人始為郡史而安重誨信愛之至是驟昇厥職行己之道非其正也重誨出鎮故有是命五月丙子國子勒停官張崇遠受賂補人法寺定罪為無禄者减死一等又引四月二十六日恩赦俾從釋放帝問張崇遠本官久無錢料今有春冬逐月糧者勑㫖設禄任能立法懲惡苟有違犯須舉憲刑崇遠流外授官監中守職雖官不請於俸禄而職見請於依糧贓罪既彰死刑難貸宜决重杖一頓處死閏五月誅河中節度新除太子太師致仕安重誨詔曰朕猥以𦕈躬纉承丕搆欲華夷之共泰於刑賞以無私其有位極人臣寵踰涯分擅威權而積惡詢物議以難容苟緩刑章是滋凶慝安重誨始從幼稚獲備指揮既倚注以漸深亦旌酬而益甚自朕紹興王業委掌樞機官列三公望崇四輔謂勤劬之可恃每率暴以居懷且孟知祥董璋自守藩維素堅臣節輙從間諜令負憂疑擢任姻親往分符竹潛設猜防之計擅興割據之言兩川飲恨以俱深一旦飛章而頓絶又錢鏐位冠王公嘗輸愛戴朕方禮優元老恩遇遠人而重誨採掇瑕疵遽行止絶且去年郊天禮畢率土乂康重誨既綰國權復希兵柄輙出渡淮之語貴邀統衆之名事雖不行謀實可懼其後終興戈甲遽討巴邛將士疲勞梯船阻絶又遣專臨寨所俾料軍儲恣威虐以復多致民兵之共怨朕尚存大體特示優恩爰自禁庭委之藩翰方繄共理旋乃貢章豈謂别有動揺潛懷怨望長子崇緒親居内職次子崇贊顯列朝行遣彼元隨偷歸本道據兹悖逆須究端繇勞千里以興師致四方之駭聽果明罪釁難逭誅夷其安重誨宜削奪自身官爵仍并男崇贊崇緒及重誨妻向張等四人宜並賜死七月澤州沁水縣令李炤主簿樂鈞兩相鬭毆及追至本州不肯交割牌印大理刑部詳斷其罪准律罪當徒及罰銅縁並該今年四月二十六日恩宥勑㫖同官相毆據法當徒大理寺以所犯罪名合該恩勑雖備陳格律而合議矜寛但李炤樂鈞等處令佐之資縱屠沽之行既罵且鬭自晝經宵加以抗拒使符執畱縣印仝乖事體大紊紀綱至於偶在勑前合從赦限豈可遣兹兇軰親我疲民免刑已是優𢎞復職實非允當其李炤樂鈞並勒停見任餘依所奏三年正月北京大將等辭歸本道賜物有差時有鐡林都長行一人退及南廊有言聞於殿上乃有宣問其稱為量减下秋衣錢一千文别添逐月料錢五百文而不知所减少而益多帝責其退有後言笞歸田里四月御史臺奏禮部貢院散從官呼延昭送到應學究科人李咸雍稱於省門前髙聲稱屈勑曰李咸雍既是書生合知禮範凡關事理祇可披論尚書省前豈是喧呼之所主司在内何興詬罵之言雖妄指陳實為兇惡苟無懲誡難例軰流宜令御史臺監送本貫重處色役十二月勑曰國計之重軍食為先比防主守之隱欺遂致監臨之鈐轄丁延徽選從禁職委以倉儲蓋藉忠勤特添俸給所宜亷慎以副指揮而敢與專知官田繼勲杜延德副知趙德遵楊仁祚等相徇私情擅出官物脚夫論告贓狀分明及遣推窮即稱貸借按正律則罪加於凡盜准後勑則名犯於極刑况兩司簡詳再經議讞定法既當於不濫懲奸斷在於必行又據宰臣所問五條康澄繼陳兩表雖為滯獄且貴盡心但丁延徽所出軍須已離當處本無文紀豈是公官宜同入已而論難逭㓕身之罪宜依兩司詳議斷遣處分其丁延徽田繼勲贓滿二十疋並决重杖一頓處死杜延德已下各依本罪决杖配流賞元告人絹二十疋丁延徽為供奉官監倉與倉官田繼勲杜延德共盗倉粟三百五十石脚夫論告左軍巡禁詰稱官米爛折借粟變米頃官數及勘變米粟不曾至碾乃是糴貸錢亦破使訖刑部引統類監臨官典犯一疋已上入已者不在赦限同入已之贓今約丁延徽粟價計贓絹六十五疋二丈合犯絞二人專知官田繼勲等計贓絹三十七疋二丈為首合犯絞副知趙德遵合流二千里其次決流有差刑部據法律定罪而大理少卿澄上表論以為借粟有還竟合减等四年四月大理寺奏滑州人程洪與鄰人不恊自焚其屋延及隣人屋燒家財蕩盡伏縁三經赦恩例合杖罪令償所燒家財勑㫖程洪宜配流德州常知所在餘依奏五月獲嘉縣令盧嵩以户民關延韜不伏責問喧悖令從人曳撲良久致死大理寺斷既關威力之條合處殺人之罪但以情非巨蠧事准格文爰該免死之科式表好生之德盧嵩准格配流天德曳撲人王光祚配流登州勑㫖盧嵩容易宰邑造次怒人不恕法以行刑遂尋時而致死原情則本非故殺據律則當處極刑小不忍而難追内自訟而何及法不可墜義亦須明但究彼根繇以縁公事罪雖甚重理稍可疑峻行則慮致民驕輕恕則恐滋吏酷永從遠竄特貸餘生聊以慰往者之魂兼可戒為官之屬嵩宜配蔚州長流百姓縱逢恩赦不在於歸之限其出身歴任告勑付所司焚毁餘依省寺詳斷七月戸部奏諸州所貢物舊例每年冬至後到京准備正仗於殿前陳列據房州常貢物至今年三月方至京有違常式勑㫖方州所尚土貢為先苟有稽遲誠為怠易須加懲罰俾効恭勤其錄事叅軍孔霸文宜罰一季俸刺史尹暉縁元勑不該宜放本典以下宜令本道觀察使量罪科責訖以聞末帝自鳯翔問君側之罪至乾壕南院宣徽使孟漢瓊以帝河中失守在清化第時明宗王淑妃嘗令傳教往來錫賜謂於己厚見帝大哭欲有所陳帝曰事不言可知仍自預從臣之列即命斬之路隅漢瓊者鎮州王鎔之小豎也明宗在真定時入侍性通黠能交搆朋黨初見秦王權重乃挾妃子勢援傾心事之及朱𢎞昭馮贇謀去秦王又與之締結長興之季氣熖燻灼開府驃騎之資期月遍歴西軍既叛人主拱手待斃鄂王急召漢瓊欲先令入鄴漢瓊匿不奉召知帝及陜乃單馬趨陜至澠池西斬於路左清泰元年五月中書門下言以改元分命朝臣奏告其應州四廟差左監門衞將軍孔知鄴稱疾改差右驍衞將軍華光遠稱墜馬傷足詔曰改元重事告廟常規凡在班行宜思策勵孔知鄴等方當任使皆合恪恭豈可居常則各冐寵光臨事則自圖便穏苟無懲誡何肅紀綱孔知鄴華光遠並停見任其告廟官差右武衛將軍髙允崇三年二月監察使奏薦饗太廟其月十九日尚書省受誓戒故事諸行事官質明至省候太尉其日行事官與攝太尉宰臣並先到其攝司空吏部侍郎龍敏後至雖及受誓戒其候太尉違禮詔罰一季俸料十月詔金州斬屯戍都監陳知隱先是蜀人侵軼禦侮不嚴突至城下水寨失守故也十二月司天冬官正朱懋訟本監胡杲通言前監徐鴻亡在殯鴻男皓方行服杲通署為監丞下御史臺鞫問杲通言自授官後有監丞髙巒言厯筭事徐皓工於推歩其祖保謙藝優所以權署攝不知徐鴻死方在殯其署徐皓縁厯筭事大詔曰徐皓伎術勘造且宜落下别後處分髙巒備知徐皓居喪不合薦舉宜停見任杲通已下並釋放晉髙祖天福二年五月乙丑御史臺奏六宅使王繼𢎞前洺州團練使髙信於崇禮門内相詬已伏欵罪勑曰髙信曾剖郡符繼𢎞方叅禁職凡於語黙合曉規儀豈得輙於内庭恣行私忿肆喧譁而頗甚侮憲法以若無既駭物情尤傷事體苟無懲沮何戒踰違尚示含容止從譴逐髙信宜送復州收管王繼𢎞勒停送義州衙門前仍常知所在四年十月勑李道牧前為陸渾縣主簿狠直求官强詞抗勑厚誣宰輔累犯乘輿措言孰顧於斥尊搆意只謀其撓政將懲狡蠧須舉典刑宜令决杖配流永不齒録少帝開運二年春誅青州節度使楊光遠部下指揮使張逈等五人時光遠叛命帝以戎事方興慮其扇揺故也周太祖廣順元年五月甲申勑考城縣巡檢供奉官馬彦勍處死以在巡檢所停匿赦書殺獄囚故也二年八月勑前明經劉繼倫决杖仍追奪出身文書先是繼倫醉酒於臨街民家踞床而坐權知開封府袁義前驅騶道叱之不起又加慢罵所司詰之以聞遂有是責三年正月責教坊樂人張錦繡等四人各杖脊十七除籍控鶴官將虞候賈超等二人各决杖二十配流商州坑冶務收管時安州節度使王令温受代入朝樂人與控鶴官詣令温求丐太祖知之故有是責二月勑鳯翔少尹桑能責授鄧州長史能故開封尹維翰之庶弟也維翰父珙有愛姬生子嵗餘珙卒姬求出遂㩦兒而去兒即能也其後莫知所之及維翰貴前遣人求訪音問微知在青州㑹户部侍郎王松權知青州時維翰鎮兖州以誠託松松至郡訪能果得之於博興縣民家能母適𤣥氏能即為𤣥氏子松即送能至維翰所維翰表其事有頃晉祖授能恊律郎維翰鎮京兆以能為衙内都指揮使維翰再入中書改太常丞累遷司封員外郎能幼稚流落長於他族不識文字性格鄙俗及維翰薨諸子幼弱能以維翰舊第得錢千緍典帖與人其宅本辛氏之業也辛氏定年限帖典與維翰及年限滿能出為鳯翔少尹辛氏乃詣維翰子坦贖之坦辭以候取能㫖辛氏訴於官樞宻使王峻素知其事深所不平即追能證問能具伏其罪故貶逐之又相之湯隂民焦遠詣闕門伐皷訟鎮將李柔豪奪二女詔開封府鞫劾勑李柔配役作坊世宗顯德元年九月辛丑斬供奉官副都知竹春璘於寧陵縣以其先奉命在彼巡檢有羣盗掠其客船而不能登時擒殺故也十月杖死供奉官郝光庭於府門以其在葉縣巡檢日挾私斷殺平人故也四年三月追奪前許州行軍司馬韓倫在身官爵仍配沙門島縱逢恩赦不在放還之限倫侍衛馬軍都指揮使令坤之父也令坤兼鎮陳州倫罷職於許而居於陳軍州政事多所干預及自於衙署開壚以鬻酒掊歛之暴公私患之為項城民武郁等所訟帝命殿中侍御史率汀按之倫詐報汀云准詔赴闕汀即奏之帝愈怒遽令追劾盡得事實令坤數於帝前泣請父命故罪止於追削配流而已五年十二月楚州兵馬都監武懷恩棄市以其擅殺降卒廖約等四人故也六年二月杖落第舉人趙贊朱夢叶竇浚等於省門外仍配邊郡先是禮部貢院上言贊等酗酒厲聲詬其考試官下御史府訊之伏罪故杖之册府元龜卷一百五十四
