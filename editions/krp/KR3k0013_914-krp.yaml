body:
  text: 冊府元龜卷九百十四宋王欽若等撰總録部嗜酒酒失嗜酒易曰飲酒濡首亦不知節也傳曰酒以成禮不繼以淫盖先王之作酒醴所以奉明祀養髙年而已至於享賓合歡一獻百拜飲而不醉良有以也若乃荒腆為務沈湎自恣俾晝作夜廢時亂日伐徳以致敗腐脅而無悔者其惡已甚矣至有遭罹世難髙翔逺引含味道腴隠居求志矯抗以避禍沈冥而不耀陶然自得以酒為名者斯又忘懐而獨善者也其或引滿舉白沈飲不亂决事靡滯治讞益精亦天資所得無累於明矣然周書著無彛之訓詩人有彼昏之譏誠在昔之深戒也齊惠欒髙氏皆嗜酒欒髙二族皆出惠公伯有鄭大夫嗜酒為窟室窟室地室而夜飲酒擊鐘焉朝至未巳朝者曰公焉在家臣故謂伯有為公其人曰吾公在壑谷壑谷窟室皆自朝布路而罷布路分散既而朝伯有朝鄭君則又將使子晳如楚歸而飲酒子晳以駟氏之甲伐而焚之伯有奔雍梁雍梁鄭地醒而後知之遂奔許子皮鄭大夫子皮之族飲酒無度相尚以奢相困以酒漢于定國為廷尉食酒至數石不亂食酒者謂能多飲費盡其酒猶云食言流俗書本輙改食字作飲字冬月治讞飲酒益精明陳遵為校尉封嘉威侯居長安中列侯近臣貴戚皆貴重之牧守當之官及郡國豪傑至京師者莫不相因到遵門遵嗜酒每大飲賓客滿堂輙闗門取客車轄投井中雖有急終不得去既闗閉門又投車轄也嘗有部刺史奏事過遵値其方飲刺史大窮候遵霑醉時突入見遵母霑醉言其大醉也叩頭自白當對尚書有期㑹狀母迺令從後閣出去遵大率常醉然事亦不廢揚雄王莽時為大夫家素貧嗜酒人希至其門時有好事者載酒肴從游學後漢楊政京兆人善説經書為人嗜酒不拘小節丁冲為司𨽻校尉數過諸將飲羙酒不能醉爛腸死鄭𤣥字康成北海髙宻人身長八尺飲酒一斛徴為大司農不赴盧植涿郡人常懐濟世志不好辭賦能飲酒一石為尚書免官卒魏徐邈為尚書郎時科禁酒而邈私飲至沈醉校事趙逹問以曹事邈曰中聖人逹白之太祖太祖甚怒渡遼將軍鮮于輔進曰平日醉客謂酒清者為聖人濁者為賢人邈性脩慎偶醉言爾竟坐得免刑後為潁川典農中郎將文帝幸許昌問邈曰頗復中聖人不邈對曰昔子反斃於榖陽御叔罰於飲酒臣嗜同二子不能自懲時復中之然宿瘤以醜見傳而臣以醉見識帝大笑吳胡綜為侍中嗜酒酒後歡呼極意或推按引觴摶擊左右大帝愛其才弗之責也晉阮籍字嗣宗為文帝大將軍從事中郎聞步兵厨營人善釀有貯酒三百斛乃求為步兵校尉阮咸字仲容籍之兄子諸阮皆能飲酒咸至宗人間共集不復用杯觴斟酒以大盆盛之圓座相向大酌更飲時有羣豕來飲其酒咸直接去其上便共飲之後為始平太守卒阮修字宣子咸之從弟常步行以百錢挂杖頭至酒店便獨酣暢後為太子洗馬遇害胡母輔之字彦國性嗜酒任縱不拘小節與王澄王敦庾敳俱為太尉王衍所昵號曰四友後為揚武將軍湘州刺史卒胡母謙之字子光輔之之子才學不及父而傲縱過之至酣醉常呼其父字輔之亦不以介意譚者以為狂輔之正酣飲謙之闚而厲聲曰彦國年老不得為爾將令我凥背東壁輔之歡笑呼入與共飲其所為如此年未三十卒史無官光逸字孟祖常投胡母輔之後以世難避亂渡江復依輔之初至屬輔之與謝鯤阮放畢卓羊曼桓彞阮孚散髪裸袒閉室酣飲已累日逸將排户入守者不聽逸便於戸外脱衣露頭於狗竇中窺之而大呌輔之驚曰他人决不能爾必我孟祖也遽呼入遂與飲不舍晝夜時人謂之八逹中興為給事中卒畢卓字茂世新蔡鮦陽人少希放逹為胡母輔之所知元帝太興末為吏部郎嘗飲酒廢職比舍郎釀熟卓因醉夜至其甕間盜飲之為掌酒者所縳明旦視之乃畢吏部也遽釋其縳卓遂引主人宴於甕側致醉而去卓嘗謂人曰得酒滿數百斛船四時甘味置兩頭右手持酒杯左手持蟹螯拍浮酒船中便足了一生矣鄭泉字文淵陳郡人博學有竒志而性嗜酒其閑居毎日願得羙酒滿五百斛船以四時甘脆置兩頭反覆沒飲之憊即住而啖肴膳酒斗升减随即益之不亦快乎臨卒謂同類曰必𦵏我陶家之側庻百嵗之後化而成土幸見取為酒壺實獲我心矣劉伶字伯倫不以家産有無介意嘗乘鹿車擕一壺酒使人荷鍤而随之謂曰死便埋我嘗因渴甚求酒於其妻妻損酒毁器涕泣諫曰君酒太過非攝生之道必宜斷之伶曰善不能自禁惟當祝鬼神自誓爾便可具酒肉妻從之伶跪祝曰天生劉伶以酒為名一飲一斛五斗解酲婦兒之言慎不可聽仍引酒御肉隗然復醉嘗醉與俗人相忤其人攘袂奮拳而徃伶徐曰雞肋不足以安尊拳其人笑而止伶雖陶兀昬放而機應不差未嘗厝意文翰惟著酒徳頌一篇嘗為建威將軍後以夀終郭璞字景純性輕易不脩威儀嗜酒好色時或過度著作郎于寳嘗誡之曰此非適性之道也璞曰吾所受有本限用之嘗恐不得盡卿乃憂酒色之為害乎為王敦記室叅軍被害華嶠字叔駿為秘書監性嗜酒率嘗沈醉所撰後漢書十典未成而終顧榮字彦先為廷尉正常縱酒酣暢謂友人張翰曰惟酒可以忘憂但無如作病何爾孔羣為中丞性嗜酒司徒王導嘗戒之曰卿常飲不見酒家覆瓿布日月乆糜爛邪答曰公不見肉用糟淹更堪乆邪嘗與親友書云今年田得七百石秫米不足了麴糵事其沈湎如此周顗為尚書右僕射頗以酒失畧無醒日時人號為三日僕射顗在中朝時能飲酒一石及過江雖日醉毎稱無對偶有舊對從北來顗遇之欣然乃出二石酒共飲各大醉及顗醒使視客已腐脅而死王忱為荆州刺史酒醉輙累旬及醒則儼然端肅末年尤嗜酒一飲連月不醒或裸體而遊毎歎三日不飲便覺形神不相親也王藴字叔仁孝武定皇后父為㑹稽内史素嗜酒末年尤甚及在㑹稽畧少醒日前燕皇甫真為侍中大尉飲酒至石餘不亂宋衡陽王義季為荆州刺史素嗜酒自彭城王義康廢後遂為長夜之飲畧少醒日太祖累加詰責義季引愆陳謝帝詔報之曰誰能無過改之為貴爾此非唯傷事業亦自損性命世中比比皆汝所諳近長沙兄弟皆縁此致故將軍蘇徽躭酒成疾旦夕待盡吾誡令禁斷并給藥膳至今能立此自是可節之物但嗜者不能立志裁割爾晉元帝人主尚能感王導之諫終身不復飲酒汝既有羙尚加以吾意殷勤何至不能慨然深自勉厲乃復須嚴相割截生諸紛紜然後少止者幸可不至此一門無此酣法汝於何得之臨書歎塞義季雖奉此㫖酣縱如初遂以成疾帝又詔之曰汝飲積食少而素羸多風常慮至此今果委頓縱不能以家國為懐近不復顧性命之重可歎可恨豈復一條本望能以理自厲未欲相苦爾令遣孫道𦙍就楊佛等令晨夕視汝并進止湯食可開懐虗受慎勿隠避吾飽嘗見人斷酒無他慊吸盖是當時甘嗜罔已之意爾今者憂怛正在性命未暇及羙業復何為吾煎毒至此耶義季終不改以至於終陶濳為彭澤令在縣公田悉種秫榖曰令吾常醉於酒足矣妻子固請種秔乃使二頃五十畆種秫五十畆種秔濳性嗜酒而家貧不能常得親舊知其如此或置酒招之造飲輙盡期在必醉既醉而退曽不恡情去留江州刺史王𢎞嘗欲識之不能致也濳嘗徃廬山𢎞令濳故人龎通之賫酒具於半道栗里要之有脚疾使一門生二兒轝籃輿既至欣然便共飲酌俄頃𢎞至亦無忤也先是顔延之為劉桺後軍功曹在尋陽與濳情欵後為始安郡經過日日造濳毎徃必酣飲致醉臨去留二萬錢與濳濳悉與酒家稍就取酒嘗九月九日無酒出宅邉菊叢中坐乆值𢎞送酒至即便就酌醉而後歸濳不解音聲而畜素琴一張毎有酒適輙撫弄以寄其意貴賤造之者有酒輙設濳若先醉便語客我醉欲眠卿可去其真率如此郡將候濳值其酒熟取頭上葛巾漉酒畢還復著之檀韶為江州刺史嗜酒貪横所蒞無績髙祖嘉其合門從義又弟道濟有大功故特見寵授孔顗為安陸王子綏冠軍長史江夏内史顗為人使酒仗氣毎醉輙彌日不醒僚類之間多所陵忽尤不能曲意權幸莫不畏而疾之不治産業居嘗貧罄有無豐約未嘗闗懐為二府長史典籖諮事不呼不敢前不令去不敢去雖醉日居多而明曉政事醒時判决未嘗有壅衆咸云孔公一月二十九日醉勝他人二十九日醒也孝武每欲引見先遣人覘其醒醉後顗反敗王晏斬之東閣外臨死求酒曰此是平生所好顔延之好飲酒不䕶細行年三十猶未婚又嘗乘羸牛笨車逄子竣鹵簿即屛往道側又好騎馬遨遊里巷遇知舊輙據案索酒得酒必頽然自得卒於金紫光禄大夫南齊沈文季為吳興太守文季飲酒至五斗妻王錫女飲酒亦至三斗文季與之對飲竟日而視事不廢蔡約為冠軍將軍好飲酒夷淡不與世雜梁臧盾善飲酒髙祖招延後進二十餘人置酒賦詩盾以詩不成罰酒一斗盾飲盡顔色不變言笑自若時蕭介染翰便成文無加㸃髙祖兩羙之曰臧盾之飲蕭介之文即席之羙也卒於領軍將軍蕭琛為侍中性通脱常自解竈事畢餘餕必陶然致醉王瞻為吏部尚書頗嗜酒每飲或彌日精神朗暢不廢簿領髙祖毎稱瞻有三術射棊酒也張率字士簡嗜酒事事寛恕於家務尤所忘懐為新安太守卒陳陳暄學不師受文才俊逸尤嗜酒無節操徧歴王公門沈湎諠譊過差非度其兄子秀常憂之致書於暄友人何胥兾以諷諌暄聞之與秀書曰旦見汝書與孝典陳吾飲酒過差吾有此好五十餘年昔吳國張長公亦稱躭嗜吾見張時伊已六十自言引滿大勝少年時吾今所進亦多於徃日老而彌篤唯吾與張季舒爾吾方與此子交歡於地下汝欲反吾所志耶昔阮咸阮籍同遊竹林宣子不聞斯言王湛能𤣥言巧騎武子呼為癡叔何陳留之風不嗣太原之氣巋然翻成可怪吾既寂寞當世朽病殘年産不異於顔原名未動於卿相若不日飲醇酒復欲安歸汝以飲酒為非吾以不飲酒為過昔周伯仁渡江唯三日醒吾不以為少鄭康成一飲三百盃吾不以為多然洪醉之後有得有失成厮養之志是其得也使次公之狂是其失也吾嘗譬酒之猶水亦可以濟舟亦可以覆舟故江諮議有言酒猶兵也兵可千日而不用不可一日而不備酒可千日而不飲不可一飲而不醉羙哉江公可與共論酒矣汝驚吾墮馬侍中之門䧟池武陵之第徧布朝野自言焦悚丘也幸茍有過人必知之吾生平所願身沒之後題吾墓云陳故酒徒陳君之神道若斯志意豈避南征之不復賈誼之慟哭者哉何水曹眼不識盃鐺吾口不離瓢杓汝寜與何同日而醒與吾同日而醉乎政言其醒可及其醉不可及也速營糟丘吾將老焉爾無多言非爾所及後魏劉尼為定州刺史在州清慎然率多酒醉治日甚少陸昶為光禄大夫昶無他才能惟飲酒為事崔長謙好學脩立少有令名為尉景開府諮議叅軍晚頗以酒為損劉藻字彦先飲酒至一石不亂仕至太尉司馬元敏魏之宗室嗜酒多費家為之貧其壻柱國乙弗貴大將軍大利稽祐家貲皆千萬毎營給之敏随即散盡而帝不之責貴祐後遂絶之北齊薛孤延為車騎將軍性好酒率多昏醉而以勇決善戰每大軍征討常為前鋒故與彭劉韓潘同列髙季式為濟州刺史豪率好酒又恃舉家勲功不拘檢節與光州刺史李元忠生平逰欵在濟州夜飲憶元忠乃開城門令左右乗驛馬持一壺酒徃光州勸元忠朝廷知而容之李元忠為侍中雖居要任初不以物務干懐惟以聲酒自娱大率常醉家事大小了不闗心園庭之内羅種果藥親朋尋詣必留連宴賞毎挾彈擕壺遨逰里閈毎言寧無食不可使我無酒阮步兵吾師也孔少府豈欺我哉後自中書令復求為太常以其有音樂而多羙酒故神武欲用為僕射文襄言其放達常醉不可委以臺閣其子搔聞之請節酒元忠曰我言作僕射不勝飲酒樂爾愛僕射宜勿飲酒盧懐道性輕率好酒頗有慕尚終於烏蘇鎮城都督祖茂班之從父弟也頗有辭情然好酒性率不為時重除給事中辭疾不就顔之推好飲酒多狂縱不修邉幅時論以此少之後為平原太守隋裴政初仕周為少司憲能飲酒至數斗不亂簿案盈几剖決如流唐劉黒闥貝州漳南人隋末無頼嗜酒好博奕不治産業父兄患之崔敬嗣則天時為房州刺史好飲酒中宗安置在州嘗徳之及即位訪敬嗣已卒其子汪又嗜酒不堪任職且授雒州司空又改五品慢官李逈秀中宗朝為鴻臚卿晩溺於酒然公事不虧李適之為刑部尚書雅好賓友飲酒一斗不亂夜則宴賞晝則决公務庭無廢事崔咸為陜州刺史晨起飲酒至暮必大醉及夜分視事無滯失者吏以為神入為右散騎常侍秘書監飲酒如初徐晦歴刑部兵部二侍郎同州刺史性彊直當官正守惟嗜酒太過晚年䘮明遂至委廢王源中為戸部侍郎翰林承㫖學士性頗嗜酒嘗召對源中方沉醉不能及醉醒同列告之源中但懐憂惕殊無悔恨他日又以醉不任赴召遂終不得大用酒失傳曰豢豕為酒非以為禍也而訟獄益繁則酒之流生禍也故酣酒者大禹之訓日富者小雅所譏其敢崇飲者周公之格言不及於亂者仲尼之申戒乃有沈湎自恣荒腆不已狂藥内攻忮心中作惡言暴怒奮攘交鬭忤世奸法蹈禍蒙耻至或臨戎而致敗殺人而不忌曠廢官守夭閼生理者亦比比有之率用類次以為民鑑夏仲康時羲和湎淫廢時亂日羲氏和氏世掌天地四時之官承太康之後沈湎於酒過差非度𦙍廢天時亂甲乙徃征之𦙍國名告於衆曰惟時羲和顛覆厥徳顛覆言反倒也沈亂於酒畔官離次沈謂醉冥失次位也俶擾天紀遐棄厥司俶始擾亂遐逺也紀謂時日司所主也乃季秋月朔辰弗集於房辰日月所㑹房所舍之次集合也不合即日食可知瞽奏皷嗇夫馳庻人走凡日食天子伐皷於社責上公瞽樂官樂官進皷則伐之嗇夫主幣之官馳取幣禮天神衆人走供救日食之百役也羲和尸厥官罔聞知主其官而無聞知於日食之變異所以罪重昏迷於天象以干先王之誅闇錯天象言昏亂之甚干犯也齊慶封好田而嗜酒與慶舍政舍封子慶封當國不自為政以付舍則以其内實遷於盧蒲嫳氏易内而飲酒内實寳物妻妾也移而居嫳家數日國遷朝焉就於盧蒲氏朝見封齊惠欒髙氏皆嗜酒欒髙二族皆出惠公信内多怨説婦人言故多怨彊於陳鮑氏而惡之惡陳鮑有告陳桓子曰子旗子良將攻陳鮑亦告鮑氏桓子授甲而如鮑氏遭子良醉而騁欲及子良醉故騁告鮑文子遂見文子文子鮑國則亦授甲矣使視二子二子子旗子良也則皆將飲酒桓子曰彼雖不信彼傳言者聞我授甲則必逐我及其飲酒也先伐諸陳鮑方睦遂伐欒髙氏荆共王與晉厲公戰於鄢陵荆師敗共王傷臨戰司馬子反渇而求飲豎陽榖一云榖陽豎子反内豎也操參酒而進之酒器受三升曰參子反曰訾退酒也豎陽榖曰非酒也反曰訾退却豎陽榖又曰非酒也子反受而飲之子反之為人也嗜酒甘而不能絶於口醉戰既罷共王欲復戰而謀使召司馬子反子反辭以心疾共王駕而徃視之入幄中聞酒氣臭而還曰今日之戰不榖親傷所恃者司馬也而司馬又若此是忘荆國之社稷而不恤吾衆也不榖無與復戰矣於是罷師去之斬司馬子反以為戮故竪陽榖之進酒也非以醉子反也其心以忠也而適足殺之故曰小忠大忠之賊也左傳云榖陽豎獻飲於子反子反醉而不能見王曰天敗楚也夫余不可以待乃宵遁楚世家云晉敗楚射中共王目共王召將軍子反子反嗜酒從者豎陽榖進酒醉王怒射殺子反遂罷兵歸知伯晉大夫伐鄭趙簡子疾使太子毋卹將而圍鄭知伯醉以酒灌擊毋卹羣臣請死之毋卹曰君所以置毋䘏為能忍訽然亦愠知伯知伯歸因謂簡子使廢毋卹簡子不聽毋卹繇此怨知伯漢灌夫為太僕與長樂衛尉竇甫飲輕重不得謂飲酒禮數輕重不得其平也夫醉搏甫搏以手擊之甫竇太后昆弟武帝恐太后誅夫徙夫為燕相數嵗坐法去家居長安夫為人剛直使酒不好面䛕貴戚諸勢在已之右欲必陵之士在已左愈貧賤尤益禮敬夫家居雖富然失勢賓客益衰及魏其侯竇嬰也失勢亦欲倚夫引繩披根生平慕之後棄者夫亦倚魏其而通列侯宗室為名髙兩人相為引重其游如父子然相得驩甚無厭恨相知晩夫嘗有服過丞相蚡田蚡也丞相從容曰吾欲與仲孺過魏其侯㑹仲孺有服夫曰將軍乃肯幸臨况魏其侯夫安敢以服為解請語魏其侯帳具將軍旦日蚤臨武安許諾武安侯田蚡也夫具語魏其侯如所謂武安侯魏其與夫人益市牛酒夜灑掃早帳具至旦平明令門下伺候至日中丞相不來魏其謂夫曰丞相豈忘之哉夫不懌曰夫以服請宜徃乃駕自徃迎丞相丞相特前戱許灌夫殊無意徃及至門丞相尚卧於是夫入見曰將軍昨日幸許過魏其魏其夫妻治具自旦至今未敢嘗食武安鄂一作悟謝曰吾昨日醉忽忘與仲孺言乃駕徃及飲酒酣夫起舞屬丞相丞相不起夫從坐上語侵之魏其乃扶灌夫去謝丞相丞相卒飲至夜極驩而去丞相嘗使籍福請魏其城南田不得繇此怨灌夫魏其後丞相娶燕王女為夫人有太后詔召列侯宗室皆徃賀魏其侯過灌夫與俱夫謝曰夫數以酒失得過丞相今者又與夫有郄魏其曰事已解強與俱飲酒酣武安起為夀坐皆避席伏已魏其侯為夀獨故人避席爾餘半膝席灌夫不悦行酒至武安武安膝席曰不能滿觴夫怒因嘻笑曰將軍貴人也屬之屬一作畢時武安不肯行酒次至臨汝侯灌嬰孫名賢臨汝侯方與程不識耳語又不避席夫無所發怒乃罵臨汝侯曰生平毁程不識不直一錢今日長者為夀乃效女兒呫囁耳語武安謂灌夫曰程李俱東西宫衛尉今衆辱程將軍仲孺獨不為李將軍地乎灌夫曰今日斬頭䧟胷何知程李乎坐乃起更衣稍稍去夫出武安遂怒廼戱騎縛夫戯讀曰麾謂指麾命之收縛也繫居室署名屬少府棄市事具總録忿争門于永丞相定國之子少時嗜酒多過失以父任為侍中中郎將匡衡子昌為越騎校尉醉殺人繫詔獄越騎官屬與昌弟且謀簒昌逆取曰篡事發覺衡時為丞相免冠徒跣待罪後漢光武時馬武為捕虜將軍嗜酒闊逹敢言醉在御前面折同列言其短長無所避忌帝故縱之以為笑樂吳陳勤為凌統督將統當擊賊圍先期統與勤㑹飲酒勤剛勇任氣因督祭酒陵轢一坐舉罰不以其道統疾其侮慢面折不為用勤怒詈統及其父操統流涕不答衆因罷出勤乘酒㓙悖又於道路辱統統不能忍引刀斫勤數日不死及當攻屯統曰非死無以謝罪乃率厲士卒身當矢石所攻一面應時披壊諸將乘勝遂大破之還自拘於軍正權壯其果毅許以功贖罪虞翻字仲翔為騎都尉性疏直數有酒失晉庾純為河南尹以司空賈充姦佞與任敳共舉充西鎮闗中充繇是不平充嘗宴朝士而純後至充謂曰君行嘗居人前今何以在後純曰且有小市井事不了是以來後世言純之先嘗有伍伯者充之先有市魁者充純以此相譏焉充自以位隆望重意殊不平及純行酒充不時飲純曰長者為夀何敢爾乎充曰父老不歸供養將何言也純因發怒曰賈充天下兇兇繇爾一人充曰充輔佐二世蕩平巴蜀有何罪而天下為之兇兇純曰髙貴鄉公何在衆坐因罷充左右欲執純中䕶軍羊琇侍中王濟佑之因得出充慙怒上表解職純懼上河南尹闗内侯印綬上表自劾曰司空公賈充請諸卿校并及臣臣不自量飲酒過多醉亂行酒重酌於公公不肯飲言語徃來公遂訶臣父老不歸供養卿為無天地臣不服罪自引而更忿怒厲聲名公臨時諠譊遂至荒越禮八十月制誠以衰老之年變難無常也臣不惟生育之恩求養老父而懐禄貪榮烏鳥之不若充為三公論道興化以教義責臣是也而以枉錯直居下犯上醉酒迷荒昏亂儀度臣得以凡才擢授顯任易戒濡首論誨酒困而臣聞義不服過言盈庭黷慢台司違犯憲度不可以訓請臺免臣官廷尉結罪大鴻臚削爵土勅身不謹伏湏罪誅御史中丞孔恂劾純請免官詔曰先王崇尊卑之禮明貴賤之序著温克之徳記沈酗之禍所以光宣道化示人軌儀也昔廣漢陵慢宰相獲犯上之刑灌夫託醉肆忿致誅斃之罪純以凡才備位卿尹不惟謙敬之節不忌覆車之誡陵上無禮悖言自口宜加顯黜以肅朝倫遂免純官孫季舒為長水校尉時石崇以功臣子有才氣與裴楷志趣各異不與之交季舒嘗酣讌慢慠過度崇欲表免之楷聞之謂崇曰足下飲人狂藥責人正禮不亦乖乎乃止周顗字伯仁中興遷為吏部尚書以醉酒為有司所糾白衣領職後為左僕射領吏部元帝讌羣公於西堂酒酣從容曰今日名臣共集何如堯舜時耶顗因醉厲聲曰今雖同人主何得復比聖世帝大怒而起手詔付廷尉將加戮累日方赦之尋為䕶軍將軍尚書紀瞻置酒請顗及王導等顗荒醉失儀復為有司所奏詔曰顗參副朝右職掌銓衡當敬慎徳音式是百辟屢以酒過為有司所繩吾亮其極歡之情然亦是濡首之戒也顗必能克巳復禮者今不加黜責初顗以雅望獲海内盛名後頗以酒失為僕射略無醒日時人號為三日僕射庾亮曰周侯末年所為鳯徳之衰也王澄為荆州刺史聞郭舒名引為别駕澄終日酣飲不以衆務在意荆土士人宗廞嘗因酒忤澄澄怒叱左右棒廞舒厲色謂左右曰使君過醉汝輩何敢妄動澄恚曰别駕狂耶誑言我醉因遣搯其鼻炙其眉頭舒跪而受之澄意少釋而廞遂得免後趙徐光為石勒記室㕘軍石勒如苑鄉召光光醉不至以光物情所湊常不平之因此發怒退為牙門勒自苑鄉如鄴徐光侍直愠然攘袂振紛仰視不顧勒因而惡之讓光曰何負卿而敢怏怏邪於是幽光并其妻子於獄宋謝超宗為人仗才使酒多所陵忽在直省常醉帝召見語及北方事超宗曰虜動來二十年矣佛出亦無如之何以失儀出為南郡王中軍司馬顔延之好飲酒不拘細行何尚之為侍中在直延之以前永嘉太守醉詣焉尚之望見便陽眠延之發簾熟視曰朽木難雕尚之謂左右曰此人醉甚可畏故為國子祭酒司徒在長史坐買人田不肯還直尚書左丞荀赤松奏延之沈迷麴蘖詆毁朝士預宴班觴肆詈上席請以訟田不實免所居官詔可故為太常沙門釋慧琳以才學為太祖所賞愛毎召見常升獨榻延之甚疾焉因醉白帝曰昔同子參乗袁絲正色此三台之座豈可使刑餘居之帝變色延之性既褊激兼有酒過肆意直言曽無回隠論者多不與之謂之顔彪魯爽祖宗之為南陽太守父軌為竟陵太守北奔爽仕魏為荆州刺史襄陽公鎮長社爽㓜染殊俗無復華風麤中使酒數有過失魏太武將誅之後遂將家屬歸宋南齊焦度為東宫直閣將軍好飲酒醉輙暴怒髙帝常使人節之周山圗為給事中冗從僕射直閣將軍山圗好酒多失明帝數加怒誚後遂自改到撝永明中為御史中丞車駕幸丹陽郡宴飲撝恃舊酒後狎侮同列言笑過度為左丞庾杲之所糾贖論梁謝覽為侍中頗樂酒因讌席與散騎常侍蕭琛辭相詆毁為有司所奏髙祖以覽年少不直出為中權長史曹景宗為領軍將軍髙祖數讌見功臣共道故舊景宗醉後謬妄或誤稱下官髙祖故縱之以為笑樂蕭頴達出為豫章内史意甚憒憒未發前預華林宴酒後於座辭氣不恱沈約因勸酒欲以釋之頴達大罵約曰我今日形容正是汝老鼠所為何忽復勸我酒舉座驚愕髙祖謂之曰汝是我家阿五王欽若等曰頴達齊光禄大夫赤斧第五弟也與梁同姓故云我家阿五沈公宿望何意輕脫若以法繩汝汝復何理頴達竟無一言惟大涕泣帝心愧之謝善勛飲酒至數升醉後輙張眼大罵雖復貴賤親疎無所擇也時謂之謝方眼栁盼為散騎常侍性愚戅使酒因醉乘馬入殿門為有司劾免􅌰於家後魏劉尼為司徒皇興中獻文北征帝親誓衆而尼昏醉兵陣不整獻文以其功重特恕之免官而已皮喜為豫州刺史詔讓其在州寛怠以飲酒廢事威不禁下使者就州決以杖罰于若襲父祚爵為鉅鹿郡公若多酒過為叔父景所撾殺甄楷侍中琛之子琛啓除祕書郎宣武未葬楷與河南尹丞張普恵等飲戱免官夏侯夬字元廷道遷長子厯鎮逺將軍南兖州大中正夬性好酒居䘮不戚醇醪肥鮮不離於口沽買飲噉多所費用父時田園貨賣略盡人間債負猶數千餘兩榖食至常不足弟妹不免饑寒於是昏醉而卒李肅為黄門郎性酒狂熈平初從靈太后幸江陽王繼第肅時侍飲頗醉言辭不遜抗辱太傅清河王懌為有司彈劾靈太后怒之出為章武内史盧昶為雍州刺史性好酒曽於婦氏飲宴小有不平手刄其客程靈虬為梁郡太守以酗酒為徐州刺史武昌王鑒所劾失官既下梁郡志力少衰猶時為酒困久去官禄不免饑寒元麗為滎陽太守性頗使酒郡丞辛琛毎諌之麗後醉輙令閉閣曰勿使丞入也裴茂伯為廣平王賛文學好飲酒頗涉疎傲末年劇飲不已乃至傷性多所愆失北齊髙隆之初仕後魏驃騎大將軍西魏文帝曽與隆之因酒忿競文帝坐以黜免髙祖責隆之不能協和乃啓出為北道行臺薛孤延初仕東魏為左衛將軍左廂大都督與諸軍將討潁川延専監造土山以酒醉為敵所襲據潁川平諸將還京師讌於華林園文襄啓魏帝坐延於階下以辱之荀仲舉字士髙潁川人仕梁為南沙令從蕭明於寒山被執長樂王尉粲甚禮之與粲劇飲齧粲指至骨文宣知之杖仲舉一百或問之曰我那知許當時正疑是塵尾爾平鑒為揚州刺史其妻生男鑒因喜酣醉擅免境内囚誤免關中細作二人醒而知之上表自劾文宣特原其罪顔之推好飲酒多任縱不修邉幅時論以此少之之推自周奔至文宣見而悦之天保末從至天池以為中書舍人令中書郎叚孝信將勅書出示之推之推營外飲酒孝信還以狀言文宣乃曰且停繇是遂寢唐李景儉為諌議大夫凌蔑公卿大臣使酒尤甚尋出為建州刺史未幾元稹用事召還為諌議大夫長慶初景儉退朝與兵部郎中知制誥馮宿庫部郎中知制誥楊嗣復起居舎人温造司勲員外郎李肇刑部員外郎王鎰等同謁史官都官員外郎獨孤朗乃詣史館同飲景儉乗醉遂入中書徧詣時宰面詰侮王播崔植杜元頴皆呼其名姓詞頗慢易播等知其狂酒且遜止之以事聞詔曰丞相府署國家樞機上法三台下臨百辟若等威可紊則堂陛不嚴諌議大夫李景儉乃因酣醉輙肆叨凟昏呶侮慢靡所不為詢其狂態甚用驚聽宜加譴責以守遐荒予非深尅勉自循省可漳州刺史仍馳驛發遣又貶獨孤朗為韶州刺史温造朗州李肇澧州王鎰郢州坐與景儉同飲也田渭為泉州刺史寳厯二年削渭官在任徴本州鹽鐵院官裴汾銅四十斤渭使酒與汾交争為本道㢘使舉奏因各懲罰王直方為右補闕太和九年出為興元府成固令直方始為鎮州冊贈使謁祖墓於邢州時劉從諌自以位兼宰相於直方禮有所不至直方飲酣頗以語侵之從諌怒具以表聞直方素有直疏文宗雖嘉之然非當時姦邪所樂及是以直方家於成固因而遣之薛延老為殿中侍御史翰林學士因飲酒沈醉文宗聞之以為失於敬慎遂罷翰林後唐蕭愿為太常少卿明宗朝祀太㣲宫愿乗醉預公卿之列為御史所彈左遷右賛善大夫晉關徹為義成軍節度使史匡翰幕客狂率酣醟一日使酒怒目謂匡翰曰明公昔刺覃懐與徹主客道至事無不可今領節鉞數不相容書記趙礪險詖之人也脅肩諂笑黷貨無厭而明公待之甚厚徹今請死近聞張彦澤臠張式未聞史匡翰斬關徹恐天下譚者未有此類翰不怒引滿自罰而慰勉之周傅珣廣順初為通事舍人善於辭令後因宣制以醉失儀停任邉歸讜顯徳中為御史中丞世宗宴於廣徳殿歸讜飲酣忽揚袂而言曰至於一盃而已帝遣黄門扶出之歸讜猶廻顧曰陛下何不決殺趙守㣲王欽若等曰時守㣲自民間獻疏世宗擢為右拾遺尋以指斥配流翌日歸讜以酒過伏閣請罪帝釋之仍令於閣門復飲數爵以愧其心焉冊府元龜卷九百十四
