body:
  text: 册府元龜卷六百八宋王欽若等撰學校部小學目録刋校讐嫉小學昔伏羲氏造書契以代結繩之政周官保氏教國子以六書盖文字之興其來尚矣厥後二篆繼作八體竝生沿波振葉増華競逐岐分轍異其流彌廣中代而下善其業者或為之訓詁或形乎論敘布之方牘叅乎緗帙咸得以徴焉仲尼曰吾猶及史之闕文又曰盖有不知而作之者故述作之際不可以不慎矣黄帝時倉頡為史作蟲篆周宣王時太史籕作大篆十五篇教學童書也與孔氏壁中古文異體又云史籕篇者周時史官教學童書也秦李斯為丞相作倉頡篇七章又作小篆亦曰秦篆趙髙為車府令作爰厯篇六章胡母敬為太史令作博學篇七章博學篇古文多取史籕篇而篆體復頗異所謂秦篆者也又云倉頡爰厯博學三篇斷六十字以為一章凡五十五章并為倉頡篇程邈為秦獄吏得罪繫雲陽獄中覃思十年益小篆方圓而為隸書三千字始皇善之用為御史王次仲上谷人善隸書始作八分書漢司馬相如為文園令作凡将篇凡將篇无複字史㳺元帝時為黄門令作急就一篇又云慕容􅀈親造太上章以代急就篇又顔之推顔師古各注急就篇李長成帝時為将作大匠作元尚一篇急就元尚篇皆倉頡中正字也凡将則頗有出揚雄為大夫作倉頡訓纂一篇元始中徵天下通小學者以百數各令記字於庭中揚雄取其有用者以作訓纂又云李斯作倉頡篇揚雄作訓纂篇後漢郎中賈魴作滂喜篇故曰三倉杜鄴從張吉學吉子竦又幼孤從鄴學問亦著於世尤長小學鄴子林清静好古亦有雅材建武中歴位列卿至大司空其正文字過於鄴竦故世言小學者繇杜公也又云宣帝時徴齊人能正讀者張敞從受之傳至外孫之子杜林為作訓詁焉竦即敞之孫林作倉頡訓纂一篇倉頡訓一篇位至凉州刺史劉歆撰古今文字二卷又焦子明撰文字統畧一卷位至安定屬國都尉後漢許慎作説文解字十四篇皆傳於世梁有演説文一卷庾儀撰為洨長卒馬援為伏波将軍上書曰臣所假伏波将軍印書伏字犬外嚮城臯令印臯字為白下羊丞印四下羊尉印白下人人下羊即一縣長吏印文不同恐天下不正者多符印所以為信也所宜齊同薦曉古文字者事下大司空正郡國印章奏可班固字孟堅以揚雄作訓纂篇順續倉頡又易倉頡中重復之字凡八十九章固復續揚雄作十三章又撰在昔篇一卷太甲篇一卷為大将軍竇憲中䕶軍服䖍撰通俗文一卷位至九江太守蘇林字孝友博學多通古今字指凡諸書傳文間危疑林釋之建安中為五官将文學甚見禮待郭顯卿為太子中庶子撰雜字指一卷衛宏字敬仲撰古文字書一卷位至議郎邯鄲淳一名竺字子叔為博士給事中善倉雅蟲篆許氏字指蔡邕為左中郎将撰聖皇章黄初章吳章篇勸學篇各一卷崔瑗為濟北相撰飛龍篇篆草勢合三卷張揖撰埤倉二卷梁樊恭又撰廣倉一卷古今字詁三卷又云揖撰三倉難字一卷詁訓三卷錯誤字一卷又異字二卷朱育撰字属一卷賈魴撰蜀來敏尤精於倉雅訓詁好是正文字位至執慎将軍吳項峻為郎中令撰始學篇十二卷朱育山隂人少好竒字凡所特達依體像類造作異字千名以上位至侍中晋郭荷雒陽人明䆒羣籍特善史書不應州郡之命陸機為平原内史撰吳章二卷王義為下邳内史撰小學篇一卷李彤撰字指二卷單行字四卷字偶五卷位至朝議大夫呂忱為弦令撰字林七卷殷仲堪為荆州刺史撰常用字訓一卷呂静為安復令撰韻集六卷衛恒撰四體書勢一卷葛洪撰要用字苑一卷終於句漏令顧愷之為㪚騎常侍撰啟疑三卷宋何承天為御史丞撰纂文三卷顔延之撰纂要六卷詁幼文三卷位至金紫光禄大夫謝靈運為臨川内史撰要字苑一卷吳恭為揚州督䕶撰字林音義五卷劉善經撰文字指歸一卷夏侯詠撰四聲韻畧十三卷李槩撰音譜四卷釋静洪撰韻英三卷南齊吳均為奉朝請續文釋五卷王斌著四聲論行於時梁沈約撰四聲一卷位至尚書令侍中領太子少傅阮孝緒不應徴辟撰文字集畧六卷吉文甫為㪚騎常侍撰釋字同音三卷又有異字同音一卷蕭子雲撰五十二體書一卷位至侍中國子祭酒蕭愷為太子家令時太學博士顧野王奉令撰玉篇太宗嫌其書詳略未當以愷博學文字為善使便與學士删改蕭琛在宣城有北僧南渡維齎一瓠蘆中有漢書序傳曰三輔舊老相傳以為班固真本琛固求得之其書多有異今者而紙墨亦古文字多如龍舉之例非隸非篆琛甚秘之及是行也以書餉鄱陽王範範乃獻於東宫位至侍中陳顧野王為左将軍撰玉篇三十卷庾持善字書每屬辭好為竒字文士亦以此譏之位至太中大夫領步兵校尉後魏太武始光二年初造新字千餘詔曰在昔帝軒剏制造物乃命倉頡因鳥獸之跡以立文字自兹以降隨時改作故篆隸草楷竝行於世然經歴久遠傳習多失其真故令文體錯繆㑹義不愜非所以示軌則於來世也孔子曰名不正則事不成此之謂矣今制定文字世所用者頒下遠近永為楷式陽尼造字釋千卷猶數十篇未就而卒其從孫大學博士承慶遂撰為字統二十卷行於世尼位至國子祭酒兼幽州中正江式字法安陳留濟陽人六世祖瓊字孟琚晋馮翊太守善蟲篆詁訓永嘉大亂瓊棄官西投張軌子孫因居凉土世傳家業祖强字文威太延五年凉州平因徙代京上書三十餘法各有體例又獻經史諸子千餘卷由是擢拜中書博士式少專家學除殄冦将軍尋為符節令延昌三年三月式上表曰臣聞庖羲氏作而八卦列其畫軒轅氏興而龜䇿彰其彩古史倉頡覽二象之爻觀鳥獸之跡别剏文字以代繩用書契以維事宣之王庭則百工以敘載之方册則萬品以明迄於三代厥體頗異雖依類取制未能悉殊倉氏矣故周禮八嵗入小學保氏教國子以六書一曰指事二曰象形三曰諧聲四曰㑹意五曰轉注六曰假借盖是史頡之遺法也及宣王太史史籕著大篆十五篇與古文或同或異時人即謂之籕書至孔子定六經左丘明述春秋皆以古文厥意可得而言其后七國殊軌文字乖别暨秦兼天下丞相李斯乃奏蠲罷不合秦文者斯作倉頡篇中車府令趙髙作爰歴篇太史令胡母敬作博學篇皆史籕大篆式頗省改所謂小篆者也於是秦燒經書滌除舊典官獄繁多以趣約易始用隸書古文由此息矣隸書者始皇使下杜人程邈附於小篆所作也以邈徒隸即謂之隸書故秦有八體一曰大篆二曰小篆三曰刻符書四曰蟲書五曰摹印六曰署書七曰殳書八曰隸書漢興有尉律學復教以籕書又習八體試之課最以為尚書史書省字不正輙舉劾焉又有草書莫知誰始考其形畫雖無厥誼亦是一時之變通也孝宣時召通倉頡讀者張敞受之凉州刺史杜業沛人爰禮講學大夫秦近亦能言之孝平時徴禮等百餘人説文字於未央宫中以禮為小學元士黄門侍郎揚雄採以作訓纂篇及亡新居攝自以運應制作使大司空甄豐校文字之部頗改定古文時有六書一曰古文孔子壁中書也二曰竒字即古文而異者三曰篆書云小篆也四曰佐書秦隸書也五曰繆篆所以摹印也六曰鳥蟲所以書幡信也壁中書者魯恭王壊孔子宅而得禮尚書春秋論語孝經也又北平侯張倉獻春秋左氏傳書體與孔氏相類即前代之古文矣後漢郎中扶風曹喜號曰工篆小異斯法而甚精巧自是後學皆其法也又詔侍中賈逵修理舊文殊藝異術王教一端苟有可以加於國者靡不悉集逵即汝南許慎古文字之師也後慎嗟時人之好竒嘆俗儒之穿鑿惋文毁於譽痛字敗於訾更詭任情變亂於世故撰説文解字十五篇首子終亥各有部屬包括六藝羣書之詁評釋百氏諸子之訓天地山川草木鳥獸昆䖝雜物竒怪珍異王制禮儀世間人事莫不畢載可謂類聚羣分雜而不越文質彬彬最可得而論也左中郎将陳留蔡邕採李斯曹喜之法為古今雜形詔於太學立石碑列載五經題書楷法多是邕書也後開鴻都書畫竒能莫不雲集於時諸方獻篆無出邕者魏初博士清河張揖著埤倉廣雅古今字詁究諸埤廣綴拾遺漏増長事類抑亦於文為益者然其字詁方之許慎篇古今體用或得或失矣陳留邯鄲淳亦與揖同時博聞古藝特善倉雅許氏字指八體六書精究閑理有名於揖以書教諸皇子又建三字石經於漢碑之西其文蔚炳三體復宣較之説文篆隸大同而古字少異又有京兆韋誕河東衞覬二家竝號能篆當時臺觀牓題寶器之銘悉是誕書咸傳之子孫世稱其妙晋世義陽王典詞令任城呂忱表上字林六卷尋其况趣附託許慎説文而按偶章句隠别古籕竒惑之字又得正隸不差篆意也忱弟静别放故左校令李登聲類之法作韻集五卷宫商角徴羽各為一篇而文字與兄便是魯衞音讀楚夏時有不同皇魏承百王之季紹五運之緒世易風移文字改變篆形謬錯𨽻體失真俗學鄙習復加虚巧談辯之士又以意為説炫惑於時難以釐改乃曰追來為歸巧言為辨小兎為䨲神蟲為蠶如斯甚衆皆不合孔氏古書史籕大篆許氏説文石經三字也夫文字者六藝之宗王教之始前人所以垂今今人所以識故故曰本立而道生孔子曰必也正名乎又曰述而不作書曰予欲觀古人之象皆言遵修舊文而不敢穿鑿也臣六世祖瓊家世陳留往晋之初與從父兄應元俱受學於衞覬古篆之法倉雅方言説文之誼當時竝收善譽而祖官至太子洗馬出為馮翊郡值雒陽之亂避地河西數世傳習斯業所以不墜也世祖太延中皇威西被牧犍内附臣亡祖文威杖䇿歸國奉獻五世傳掌之書古篆八體之法時䝉褒錄敘列於儒林官班文省家號世業暨臣闇短識學庸薄漸漬家風有忝無顯但逢時來恩出願外每承澤雲津厠霑漏潤驅馳文閣叅預史官題篆宫禁猥同上哲既竭愚短欲罷不能是以敢藉六世之資奉遵祖考之訓竊慕古人之軌企踐儒門之轍求撰集古來文字以許慎説文為主爰採孔氏尚書五經音注籕篇爾雅三倉凡将方言通俗文祖文宗埤倉廣雅古今字詁三字石經字林韻集諸賦文字有六書之誼者皆以次類編聨文無復重統為一部其古籕竒惑俗隸諸體咸使班於篆下各有區别詁訓假借之誼僉隨文而解音讀楚夏之聲竝逐字而注於其所不知者則闕如也脱䝉遂許冀省百氏之觀而同文字之域典書秘書所須之書乞垂勅給竝學士五人常習文字者助臣披覽書生五人專令抄冩侍中黄門國子祭酒一月一監評議疑隠庶無紕繆所撰名目伏聽明㫖詔曰可如所請竝就太常兼教八書其所有須依請給之名目待書成重聞式於是撰集字書號曰古今文字凡四十卷大體依許氏説文為本上篆下隸正光中除驍騎将軍兼著作佐郎式尋中卒其書竟未能成李登為左校書令撰聲類十卷北齊宋世良强學好屬文撰字畧五篇位至東郡太守陽休之撰韻畧一卷辨嫌音二卷位至和州刺史顔之推為黄門侍郎撰訓俗文字畧一卷後周黎季明其從祖廣後魏太武時為尚書郎善古學嘗從吏部尚書清河崔𤣥伯受字義又從司徒崔浩學楷篆自是家傳其法季明亦傳習之頗與許氏有異太祖令季明正定古今文字於東閣位至車騎大将軍冀雋為襄樂郡守徴還教世宗及宋獻公等隸書時俗入書學者亦行束修之禮謂之謝章雋以書字所興起自倉頡若同常俗未為合禮遂唘太祖釋奠倉頡及先聖先師趙文深善楷𨽻太祖以隸書紕繆命文深與黎季明沈遐等依説文及字林刋定六體成一萬餘言行於世位至趙興郡守隋王邵為秘書少監撰難字三卷顔愍楚撰証俗音畧一卷曹憲為秘書學士撰古今字圖雜録一卷文字指歸四卷劉善經河間人撰四聲指歸一卷唐顔真卿為刑部尚書大厯十二年獻所著韻海鏡源三百六十卷詔秘閣及集賢書院貯之真卿耽尚儒學以陸法言切韻文指非𢎞乃纂集九經子史字義題為韻海鏡源獻之唐𤣥度為翰林待詔開成初於國子監復定石經字體𤣥度定九經字體依故司業張叅五經字様為定諸經之中别有疑闕舊字様未載者今與校勘官同商校是非取其適中纂錄為新加九經字様一卷請附五經字様之末從之目錄夫四科之設所趣不同六藝之端為學亦異自微言既絶説郛遂多諸子𤣥興羣儒紛糾兵農雜説其徒實繁然而學者斯勤述者彌衆廣搜竝購既顯於好文强學專門頗患於寡要故前之逹者分其例類使有條不紊求者可以俯觀也漢司馬遷為太史令撰史記目録一卷劉向撰七畧别錄二十卷元帝時擢為㪚騎宗正給事中劉歆向子也哀帝初即位遷騎都尉光禄大夫總括羣書篇撮其指要著為七畧一曰經畧二曰集畧三曰諸子畧四曰詩賦畧五曰兵書畧六曰術數畧七曰方伎畧大凡萬三千九十卷後漢班固傅毅竝為校書郎自光武中興明章繼軌於東觀及仁夀閣集書固毅等典掌焉竝依七畧而為書部固又編之則以為漢書藝文志魏鄭黙為秘書郎始制中經荀朂為秘書監因中經更著新簿分為四部總括羣書一曰甲部紀六藝及小學等書二曰乙部有古諸子家近世子家兵書家術數家三曰丙部有史記舊事皇覽簿雜事四曰丁部有詩賦圖讃汲冡書大凡四部合二萬九千九百四十五卷一云朂撰中經簿十四卷撰文章家集序十卷晉摯虞為太常卿撰文章志三卷丘深之撰義熙以來新集目録三卷宋傅亮為中書監尚書令撰續文章志三卷謝靈運為秘書監造四部目錄大凡六萬四千五百八十二卷文帝撰江左文章志五卷殷淳為秘書丞在秘書閣撰四部書目凡四十卷行於世南齊王儉為秘書丞撰四部書目四卷大凡一萬五千七十四卷又撰令書七志一曰經典志紀六藝小學史記雜傳二曰諸子志紀今古諸子三曰文翰志紀詩賦四曰軍書志紀兵書五曰隂陽志紀隂陽圖緯六曰術藝志紀方技七曰圖譜志紀地域及圖書其道佛附見合九條賀蹤補注梁王亮永明中為秘書丞與監謝朏又造四部書目大凡一萬八千一十卷阮孝緒不應徴辟篤好墳史博採宋齊以來王公之家凡有書記叅校官簿更作七錄一曰經典錄紀六藝二曰史籍錄紀記傳三曰子兵錄紀子書四曰文集錄紀詩賦五曰技術錄紀數術六曰佛錄七曰道錄其分部題目頗有次序任昉為秘書監於文德殿内列藏衆書華林園内總集釋典大凡二萬三千一百六卷自齊永元以來秘閣四部篇卷紛雜昉手自讐校由是篇目定焉丘賓卿撰天監四年書目四卷殷鈞撰天監六年四部書目後授㪚騎常侍國子祭酒祖暅為奉朝請以梁有秘書監任昉殷鈞四部目錄又文德殿目錄其術數之書更為一部使暅撰其名故梁有五部目錄楊松珍撰史目三卷沈約永明二年兼著作郎撰宋世文章志二卷劉遵撰梁東宫四部目錄四卷劉孝標安成王引為荆州户曹叅軍撰梁文德殿四部目錄四卷陳沈文阿為㪚騎常侍兼國子博士撰經典𤣥儒大義序錄二卷後魏裴景融領著作郎撰四部要畧令景融專典髙道穆為給事黄門侍郎莊帝詔曰秘書圖籍所在内典書又加繕冩緗素委積盖有年載出内繁蕪多致零落可令道穆總集帳目并牒儒學之士編比次第後周樊深撰七經異同説三卷義綱畧論并目錄三十卷竝行於世後為中大夫加開府儀同三司隋牛宏為光祿大夫撰開皇四年書目四卷王邵為㪚騎侍郎修起居注撰開皇二十年書目四卷隋書又有魏闕書目錄一卷陳秘閣圖書法目錄一卷陳天嘉六年夀安殿四部目錄四卷陳德教殿四部目錄四卷陳承香殿五經史記目錄二卷開皇八年四部書目錄四卷香厨四部目錄四卷隋大業正御書目録九巻法書目錄六卷雜儀注目錄四卷書品二卷名手畫錄一卷正流論一卷竝無撰人姓名許善心開皇中為秘書丞於時秘藏圖籍尚多淆亂善心倣阮孝緒七錄更制七林各為總叙冠於篇首又於部錄之下明作者之意區分類例焉唐馬懷素為秘書監兼昭文館學士是時秘書省典籍㪚落條流無敘懷素上疏曰南齊已前墳籍舊編王儉七志已後著述其數盈多隋志所書亦未詳悉或古書近出前志闕而未編或近人相傳浮詞鄙而猶記著無編錄難辨淄澠望括簡近書篇目并前志所遺者續王儉七志藏之秘府帝於是召涉學之士國子博士尹知章等分部撰錄并刋正經史麄創首尾㑹懷素病卒元行冲為太子賔客𢎞文館學士累封常山郡公先是秘書監馬懷素集學者續王儉今書七志左㪚騎常侍禇無量於麗正殿校冩四部書事未就而懷素無量卒館行冲總代其職於是行冲表請通撰古今書目名為羣書目錄命學士鄠縣尉母炤櫟陽尉韋述曹州司法叅軍殷踐猷大學助教余欽等分部修撿歳餘書成奏上之開元七年詔曰比來書籍缺亡後多錯亂者良由籍歴不明綱維失序或須披閲難可檢尋今麗正殿冩四庫書各於本庫每部别為目錄其與四庫目不類者依劉歆七畧排為七志其經史子集及天文以時代為先後以品秩為次第其三教珠英既有缺落宜依書目隨次修補朕當披覽無使闕遺韋述為櫟陽尉秘書監馬懷素受詔編次圖書乃奏用左㪚騎常侍元行冲左庶子齊澣秘書少卿王珣衞尉少監吳兢并述等二十六人同於秘閣詳錄四部書懷素尋卒行冲代掌其事五年而成其總目二百卷刋校仲尼曰文王既没文不在兹乎故曰自衞反魯刪定經藝而門人逹者亦有所刋正焉既而遭秦煨燼㑹漢巫蠱編簡㪚逸微言殆絶雖故老所傳得於口占壞壁之獲固多古文頗或遺脱率用裁擇既而學校斯建傳習彌廣龜鳥之變魚魯之殊盖有之矣矧復師資迭授覃研無廢増以章句為之訓傳又多乎哉故英儒博聞之士潛心大業探求精義正其闕誤芟其繁亂或䝉被詔令典校閣成上書自陳求給筆札至於前世之載記百家之述作亦或揚㩁其繆戾考正其異同縫其漏而質其非翦其蕪而撮其要朱紫之有别淄澠之不混六經之㫖既明四部之文維叙後來以之折衷學者於兹蒙益非好古博雅之君子疇克預於此哉周孔子刪詩為三百篇卜商字子夏孔子弟子之晉過衞有讀史記者曰晉師三豕涉河子夏曰非也是己亥也夫已之與三相近豕之與亥相似至於晉而問之則曰晉之己亥渉河也漢孔安國孔子後也武帝時為博士魯共王壞孔子宅得古文尚書安國悉得其書以考二十九篇得多十六篇壁中書多以考見行二十九篇之外更得十六篇安國獻之遭巫蠱事未列於學官安國以孔氏蝌蚪尚書及伏生之書考論文義定其可知者為隸古定更以竹簡冩之増多伏生二十五篇伏生又以堯典合於舜典益稷合於臯陶謨盤庚三篇合為一康王之誥合於顧命復出此篇并序凡五十九篇為四十六卷劉向成帝時為光祿大夫先是武帝時以中古文易經校施孟梁丘經中者天子之書也言中以别外耳向又以中古文校歐陽大小夏侯三家尚書經文酒誥脱簡一召誥脱簡二率簡二十五字者脱亦二十五字簡二十二字者脱亦二十二字文字異者七百有餘脱字數十至成帝詔向校經傳諸子詩賦步兵校尉任宏校兵書太史令尹咸校術數太醫監李柱國校方技每一書就向輙為一錄論其指歸辯其訛謬而奏之劉歆為黄門郎河平中與父向領校秘書後漢蘇竟以明易為博士講書祭酒王莽時與劉歆等共典校書桓榮習歐陽尚書事博士朱普受普學章句四十萬言浮辭繁長多過其實及榮入授明帝減為二十三萬言子郁復刪省定成十二萬言繇是有桓君大小太常章句桓榮建武三十年為太常桓郁永元四年為太常鍾興明帝時為左中郎将詔令定春秋章句去其復重樊儵刪定公羊嚴氏春秋章句世號樊氏學仕至長水校尉張霸永元中為㑹稽太守以樊儵刪嚴氏春秋猶多繁辭乃減定為二十萬言更名張氏學崔寔拜議郎復與諸儒博士雜定五經馬融為校書郎中詣東觀典校秘書楊終章帝時為蘭臺校書終受詔刪太史公書為十餘萬言傅毅為郎中建初中章帝博召文學之士以毅為蘭臺令史拜郎中與班固賈逵共典校書鄭衆為大司農受詔作春秋刪十九篇劉珍少好學安帝時為謁者僕射鄧太后詔使與校書劉騊駼馬融及五經博士校定東觀五經諸子傳記百家藝術整齊脱誤是正文字伏無忌博物多識順帝時為侍中屯騎校尉詔與議郎黄景校定中書五經諸子百家藝術張奐少逰三輔師事太尉朱寵學歐陽尚書初牟氏章句浮辭繁多有四十五萬餘言奐為九萬言後辟大将軍梁兾府乃上書桓帝奏其章句詔下東觀延篤從論解經傳多所駁正後儒服䖍等以為折中位至侍中盧植靈帝時為九江太守時始立太學石經以正五經文字植乃上書曰臣少從通儒故南郡太守馬融受古學頗知今之禮記特多囬穴囬穴猶紆曲臣前以周禮諸經發起紕謬敢率愚淺為之解詁而家乏無力供繕冩上繕善也言家貧不能繕冩而上願得将能書生二人共詣東觀就官財糧專心研精合尚書章句考禮記失得庶裁定聖典刋正碑文古文蝌蚪近於為實而厭抑流俗降在小學中興以來通儒達士班固賈逵鄭興父子竝敦悦之令毛詩左氏周禮各有傳記與春秋共相表裏宜置博士為立學官以助後來以廣聖意後與諫議大夫馬日磾議郎蔡邕楊彪韓説等竝在東觀校中書五經紀傳補續漢記蔡邕拜郎中校書東觀遷議郎邕以經籍去聖久遠文字多謬俗儒穿鑿疑誤後學熹平四年乃與五官中郎将堂谿典光祿大夫楊賜諫議大夫馬日磾議郎張馴韓説太史令單颺堂谿姓也典字子度潁川人為西鄂長奏求正定六經文字靈帝許之邕乃自書册於碑使工鐫於太學門外雒陽記曰太學在雒城南開陽門外講堂長五丈廣三丈堂前石經四部本碑凡四十六枚西行尚書周易公羊十六碑存十二碑毁南行禮記十五碑悉崩壞東行論語三碑二碑毁禮記碑上有諌議大夫馬日磾議郎蔡邕名於是後儒晩學咸取正焉及碑始立其觀視及摹冩者車乗日千餘兩填塞街陌馬日磾融之族子少傳融業以才學進與楊彪盧植蔡邕等典校中書劉陶明尚書春秋為之訓詁推三家尚書三家謂夏侯建夏侯勝歐陽和伯為侍郎受詔次第春秋條列靈帝時拜侍御史吳韋曜為中書郎博士祭酒孫休命曜依劉向故事定衆書晉司馬彪為秘書郎初譙周以司馬遷史記書周秦以上或採俗語百家之言不專據正經周於是作古史考二十五篇皆憑舊典以糾遷之謬誤彪復以周為未盡善也條古史考中凡百二十二事為不當多據汲冡紀年之義亦行於世鄭黙字思元起家秘書郎考覈舊文刪省浮穢中書令虞松謂曰而今而後朱紫别矣束晳為佐著作郎武帝太康二年汲郡人不準掘魏安釐王塜得竹簡小篆古書十餘萬言藏於秘府秘書丞衞恒考正汲塜書未訖而遭難晳述而成之事多證異義時東萊太守陳留王庭堅難之亦有證據晳又釋難而庭堅已亡㪚騎侍郎潘滔謂王接曰卿才學理議足解二子之紛可試論之接遂詳其得失摯虞謝衡皆博物多聞咸以為允當初太康二年汲郡人不準盗發魏襄王墓或言安釐王塜得竹簡數十車其紀年十三篇記夏以來至周幽王為犬戎所滅以事按之三家分述魏事至安釐王之二十年盖魏國之史書大畧與春秋皆多相應其中經傳太異則云夏年多殷益干啓位啟殺之太甲殺伊尹文丁殺季歴自周受命至穆王百年非穆王夀百嵗也幽王既亡有共伯和者攝行天子事非二相共和也其易經二篇與周易上下經同易繇隂陽卦二篇與周易畧同繇辭則異卦下易經一篇似説卦而異公孫叚二篇公孫叚與邵陟論易國語三篇言楚晉事名三篇似禮記又似爾雅論語師春一篇書左傳諸卜筮師春者是造書者姓名也𤨏語十一篇諸國卜夢妖怪相書也梁丘藏一篇先敘魏之世數次言丘藏金玉事繳書二篇論弋射法王封一篇帝王所封大厯二篇鄒子談天類也穆天子傳五篇言周穆王游行四海見帝臺西王母圖詩一篇畫賛之屬也又雜書十九篇周食田法周書論楚事周穆王美人盛姬死事大凡七十五篇七篇簡書折壞不識名題塜中又得銅劍一枚長二尺五寸漆書皆蝌蚪字初發塜者燒䇿炤取寶物及官收之多燼簡斷札文既殘缺不復詮次武帝以其書付秘書校綴次第尋考指歸而以今文冩之晳在著作得觀竹書隨疑分釋皆有義證李充為大著作郎於時典籍混亂充刪除煩重以類相從分作四部甚有條貫秘閣以為永制徐廣字野民孝武世除秘書郎典校秘書省増置省職轉員外㪚騎侍郎仍領校書宋謝靈運為秘書監文帝使釐理秘閣書補足遺闕梁任昉為秘書監領前軍将軍自齊永元以來秘閣四部篇卷紛雜昉手自讎校由是篇目定焉張率為司徒掾直文德待詔省勅使抄乙部書後為建安王記室直夀光省治丙丁部書抄阮孝緒陳留尉氏人者刪繁書武帝時徴不到劉峻天監初召入西省與學士賀蹤典校秘閣到沆為太子洗馬時文德殿置學士省召髙才碩學者侍詔其中使之校墳史詔沆通籍焉劉之遴為太學博士時鄱陽王範得班固所上漢書真本獻之東宫令之遴與張纉到溉等叅校異同之遴錄其異狀數十事非真本殷鈞為秘書丞在職啟校定秘閣四部書陳周宏正在梁為左民尚書及侯景平王僧辨啟送秘書圖籍勅宏正校讎姚察為秘書監領著作察任秘省大加刪正後魏闞駰博通經傳初仕沮渠䝉遜為秘書考課郎中給文吏三十人典校經籍刋定諸子三千餘卷崔光韶為司空行叅軍孝文勑光韶兼秘書郎掌校華林秘書宋道璵少而敏雋宣武初以才學被召與秘書丞孫惠蔚典校羣書考正同異常景為秘書監刪正晉司空張華博物志北齊李鉉為太學博士在東館師友諸王鉉以去聖乆遠文字多有乖謬感孔子必也正名之言乃喟然有刋正之意於講授之暇遂覧説文爰及倉雅刪正六藝經中謬字名曰字辨樊遜以對䇿第一清河王岳為大行臺率衆南討假遜大行臺郎中文宣天保七年詔令校定羣書供皇太子遜與冀州秀才髙乾和瀛州秀才馬敬德許㪚愁韓同寶雒州秀才傅懷德懐州秀才古道子廣平郡孝㢘李漢子渤海郡孝㢘鮑長暄又陽平郡孝㢘景孫前梁州府主簿王九元前開府水曹叅軍周子深等十一人被尚書召共刋定時秘府書籍紕繆者多遜乃議曰案漢中壘校尉劉向受詔校書每一書竟表上輙言臣向書長水校尉臣叅書太史公太常博士書中外書合若干本以相比然後殺青今所讎校供擬極重出自蘭臺御諸甲館向之故事見存府閣即欲刋定必藉衆本太常卿邢子才太子少傅魏收吏部尚書辛術司農少卿穆子容前黄門郎司馬子瑞故國子祭酒李業興竝是多書之家請牒借本叅校得失秘書監尉瑾移尚書都坐凡諸别本三千餘卷五經諸史殆無遺闕宋繪好撰述以諸家年歴不同多有紕繆乃刋正異同撰年譜錄未成武成河清五年竝遭水漂失繪雖博聞强記而天性恍惚晩又遇疾言論遲緩及失所撰之書乃撫膺慟哭曰可謂天喪予也後周冦雋拜秘書監時軍國草創墳典㪚逸雋始選置令史抄集經籍四部羣書稍得備具蕭撝梁武帝弟安成王秀子也入周為侍中驃騎大将軍明帝即位集公卿已下有文學者八十餘人於麟趾殿校定經史仍撰世譜撝亦預焉以母老兼有疾疹五日畨上便隔晨昏請在外著書詔許焉宗懔初仕梁元帝時為吏部尚書及江陵平與王褒等入關太祖以懔名重南土甚禮之明帝即位詔懔與王褒等在麟趾殿刋定羣書元偉明帝初拜師氏中大夫受詔於麟趾殿刋正經籍楊寛為御史正中大夫武成二年詔寛與麟趾殿學士叅定經籍姚最字士㑹梁太醫正僧垣之子年十九隨僧垣入關明帝盛聚學徒校書於麟趾殿最亦預為學士隋李德林父敬族歴太學博士鎮遠将軍魏孝静帝時命當世通人正定文籍以為内校書别在直閣省郎茂仕齊為司空府叅軍奉詔於秘書省刋定載籍許善心為秘書丞奏追李文博陸從典等學者十許人正定經史錯繆劉焯以儒學知名除員外将軍與諸儒於秘書省考定羣書王邵為著作郎採摘經史謬誤為讀書記三十卷時人服其精博于仲文為光祿大夫撰漢書刋繁三卷唐顔師古貞觀中於秘書省考五經師古多所釐正既畢奏之太宗復遣諸儒重加詳議於時諸儒傳習既久皆共非之師古輙引晉宋以來古本隨方曉答援據詳明皆出其意表諸儒莫不欽服於是拜通直郎㪚騎常侍頒其所定之書於天下令學者習焉尋拜秘書少監專典刋正所有竒書難字衆所惑者隨疑剖析曲盡其源呂才為太常博士太宗以隂陽書行之自久近代以來漸致訛偽穿鑿既甚拘忌亦多遂命有司總令修撰命才及諸隂陽學者十餘人共加刋削并舊書可行者四十七卷書成詔班下之魏徴為秘書監以喪亂之後典章紛雜奏引學者校定四部書數年之間秘書圖籍粲然完備長孫無忌為太尉髙宗永徽二年三月詔無忌及中書門下與國子三館博士𢎞文館學士刋定故國子祭酒孔穎逹所撰五經正義顔揚庭師古子也永徽三年揚庭為符璽郎又表上師古所撰匡謬正俗八卷髙宗下詔付秘書閣仍賜揚庭帛五十疋司馬承禎隠於天台山開元初徴至京師承禎頗善篆隸書冩三體老子經因刋正文句定著五千三百八十言為真本以奉上之後居王屋為陽臺觀卒贈銀青光祿大夫號真𤣥先生蒋乂集賢學士蒋明之子也弱冠該博羣籍其父在集賢日嘗以兵亂之後圖籍溷雜乃白執政請令乂入院編次於是宰相張鎰署乂為集賢小吏編錄纔逾一年於㪚亂中釐集二萬餘卷勒成部祑旁通百家尤精歴代沿革後為集賢學士禇無量以内庫舊書目髙宗代即藏在宫中漸至遺逸奏請繕冩刋校以𢎞經籍之道於是上令於東都乾元殿前施架排次因大加搜冩廣求天下異本數年間四部充備後遷左㪚騎常侍兼國子祭酒封舒國公劉太真貞元二年為秘書監太真上言請擇儒者詳校九經於秘書省令所司陳設及供食物宰臣錄其功課從之包佶為秘書監貞元年上言開元中刪定禮記月令改為時令其音及疏并開元有相涉者竝未刋正請選通儒詳定從之㑹佶卒其事不行文宗太和三年三月癸亥集賢院奏應校勘宣索書及新添冩經籍令請秘省春坊崇文校正共一十八員權抽作畨次就院同校勘前件書其厨料等請度支准本官例支給從之周墀為起居舍人集賢殿學士開成元年正月中書門下奏墀及監察御史張次宗禮部員外郎孔温業兵部員外郎集賢殿直學士崔球等同就集賢院勘校經典釋文鄭覃為門下侍郎平章事兼國子祭酒初文宗詔國子監九經石本所司校勘尚有舛誤傳於永久必在精詳宜令率更令韓泉充詳定石經官就集賢院校勘仍旋送國子監上石開成二年十月覃進石壁九經一百六十卷後唐楊凝式明宗天成初為給事中凝式精選通儒校定三館圖書馬縞為太子賔客長興三年四月勅近以遍注石經雕刻印板委國學每經差專知業博士儒徒五六人勘讀并注今更於朝官内别差五人充詳勘官太子賔客馬縞太常丞陳觀祠部員外郎兼太常博士叚顒太常博士路航屯田員外郎田敏等朕以正經事大不同諸書雖以委國學差官勘注盖緣文字極多尚恐偶有差誤馬縞已下皆是碩儒各專經業更令詳勘貴必精研兼宜委國子監於諸色選人中召能書人謹楷冩出旋付匠人雕刻每五百紙與减一選所减等第優與選轉官資時宰相馮道以諸經舛謬與同列李愚委學官等取西京鄭覃所刋石經雕為印板流布天下後進頼之漢隠帝乾祐元年四月國子監上言在監雕印板九經内只周禮儀禮公羊榖梁四經未有印板今欲集學官校勘四經文字雕造印板從之周田敏為尚書左丞兼判國子監事廣順三年六月敏獻印板書五經文字五經字様各二部一百三十䇿奏曰臣等自長興三年校勘雕印九經書籍經注繁多年代殊藐傳冩紕繆漸失根源臣守官膠庠職司校定旁求援據上備雕鐫幸遇聖明克終盛事播文德於有截傳世教以無窮謹具陳進先是後唐宰相馮道李愚重經學因言漢時崇儒有三字石經唐朝亦於國學刋刻今朝廷日不暇給無能别有刋立嘗見吳蜀之人鬻印板文字色類絶多終不及經典如經典校定雕摹流行深益於文教矣乃奏聞勅下儒官田敏等考校經注敏於經注長於詩傳孜孜刋正援引證據聨為篇卷先經奏定而後雕刻乃分政事堂厨錢及諸司公用錢又納及第舉人禮錢以給工人尹拙為國子監祭酒顯德二年二月中書奏拙狀稱准敕校勘經典釋文三十卷雕造印板伏以陸氏釋文唐初撰集綿歴嵗月傳冩失真非多聞博識之人通幽洞㣲之士重其商確必致乖訛况今朝廷富有鴻碩如兵部尚書張昭太常卿田敏皆文儒之領袖也或家藏萬卷或手校六經實後學之宗師為當今之雄尚伏乞察以事繼垂教情非屬私特賜敷敭俾同讎校勅曰經典之來訓釋為重須資鴻博共正疑訛庶使文字精研免至傳習眩惑其經典釋文已經本監官員校勘外宜差兵部尚書張昭太常卿田敏詳校顯德三年十二月詔委中書門下於朝官内選差三十人據見在書籍各求真本校勘刋正謬誤仍於逐卷後署校勘官姓名宜令官司逐月具功課申報中書門下讎嫉仲尼没而微言絶七十子喪而大義乖周室道微漢承秦弊師授迭異經藝遂分以是肇各家之學樹同門之黨穿鑿聖典異端蜂起既傳禀之不一復潤色而相勝其有𨽻章句之業乖和裕之德緣飾已失以為當掎摭彼是以為非庠序之間讙咋騰涌講習之際譏詆紛錯互相擯斥動成仇讎或忿爭於朝廷或遷謗於祖裔其於攻訐以寘害淪胥而罹咎者盖有之矣固異夫合志同方營道同術之説焉漢轅固生以治詩孝景時為博士與黄生爭論景帝前久之病免武帝即位復以賢良徴固諸儒多疾毁固曰固老罷歸之時固已九十餘矣王式字翁思以説詩昭帝時為昌邑王師王廢式以减死論歸家山陽張長安幼君長安名先事式後東平唐長賔沛禇少孫亦來事式問經數篇式謝曰聞之於師具是矣自潤色之言所聞師説具盡於此若嫌簡畧任更潤色不肯復授唐生禇生應博士弟子選詣博士摳衣登堂頌禮甚嚴摳衣謂以手内舉令離地也摳口侯切頌讀曰容式誦説有法疑者丘盖不言論語載孔子曰盖有不知而作之者我無是也式欲遵此意故效孔子自稱丘耳盖者發語之辭諸博士驚問何師對曰事式皆素聞其賢共薦式詔除下為博士下除官之書也下胡稼切式徴來衣博士衣而不冠曰刑餘之人何宜復充禮官既至舍中㑹諸大夫博士共持酒肉勞式皆注意髙仰之勞來到切博士江公世為魯詩宗為魯詩者所宗師也至江公著孝經説心嫉式謂歌吹諸生曰學官自有此法酒坐歌吹以相樂也歌驪駒逸詩篇名也見大戴禮客欲去歌之其辭云驪駒在門僕夫具存驪駒在路僕夫整駕也式曰聞之於師客歌驪駒主人歌客毋庸歸庸用也主人禮未畢且無用歸也今日諸君為主人日尚蚤未可也江翁曰經何以言之於經何所有此言式曰在曲禮江翁曰何狗曲也意怒故妄發言言狗者輕賤之甚也今流俗書本云何曲狗妄改之也式恥之陽醉逿墬逷失據而倒也墬古地字逷徒浪切式客罷譲諸生曰我本不欲來讓責也諸生彊勸我竟為豎子所辱遂謝病免歸終於家劉歆為光禄大夫校秘書欲建立左氏春秋及毛詩逸禮古文尚書皆列於學官哀帝令歆與五經博士講論其義諸博士或不肯置對竝不與歆意同故不肯立其學也置對置辭以對也歆因移書太常博士讓之其言甚切諸儒皆怨恨是時名儒光祿大夫龔勝以歆移書上䟽深自罪責願乞骸骨罷及儒者師丹為大司空亦大怒奏歆改亂舊章非毁先帝所立帝曰歆欲廣道術亦何以為非毁哉歆由是忤執政大臣為衆儒所訕訕謗也所諌切懼誅求出補吏為河内太守以宗室不宜典三河徙守五原後漢孔僖字仲和魯國人也逰太學習春秋因讀吳王夫差傳廢書歎曰所謂畫虎不成反為狗者友人崔駰曰然昔孝武皇帝始為天子年方十八崇信聖道師則先王五六年間號勝文景及後恣已忘其前善僖曰書傳若此多矣隣房生梁郁儳和之曰如此武帝亦是狗邪僖駰黙然郁怒恨之陰上書告駰僖誹謗先帝譏刺當世事下有司駰詣吏受訊僖恐誅乃上書章帝自訟詔皆勿問拜僖蘭䑓令周福甘陵人初桓帝為蠡吾侯受學於福及即位擢福為尚書時同郡河南尹房植有名當朝鄉人為之謡曰天下規矩房伯武因師獲印周仲進二家賔客至相譏揣遂各樹朋徒漸成尤隙鄭𤣥字康成北海髙宻人少為鄉嗇夫及黨事起被禁錮遂隠修經業杜門不出時任城何休好公羊學遂著公羊墨守言公羊義理深遠不可駁難如墨翟之守妙左氏膏肓喻左氏之疾不可為也榖梁廢疾元乃發墨守鍼膏肓起廢疾休見而歎曰康成入吾室操吾矛以伐我乎後公車徴為大司農給安車一乗蜀孟光字孝裕河南雒陽人漢末為講部吏獻帝遷都長安遂逃入蜀劉焉父子待以客禮博物識古無書不覽尤鋭意三史長扵漢家舊典好公羊春秋而譏呵左氏每與來敏爭此二義光常譊譊讙咋譊音奴交切讙音休袁切咋徂格切先主定益州拜為議郎許慈字仁篤胡潛字公興竝為博士慈善鄭氏學治易尚書三禮毛詩論語潛卓犖彊識先主定蜀承喪亂厯紀學業衰廢乃鳩合典籍沙汰衆學慈潛與孟光來敏等典掌舊文值庶事草創動多疑議慈潛更相克伐謗讟忿爭形於聲色書籍有無不相通借時尋楚撻以相震攇虚晩切其矜已妬彼乃至於此先主愍其若此羣僚大㑹使倡家假為二子之容倣其訟䦧之狀酒酣樂作以為嬉戯初以辭義相難終以刀杖相屈用感切之後魏㳺雅文成時為秘書監北人陳竒愛翫經典博通墳籍與河間邢祐同召赴京雅素聞其名始頗好之引入秘省欲授以史職後與竒論典誥及詩書雅贊扶馬鄭至易訟卦天與水違行雅曰自葱嶺以西水皆西流推此而言易之所及自葱嶺以東耳竒曰易理緜廣包含宇宙若如公言自葱嶺以西豈東廻望兊哉竒執義非雅每如此類終不茍從雅性䕶短因以為嫌嘗衆辱竒或爾汝之或指為小人竒曰公身為君子竒身且小人耳雅曰君言身且小人君祖父是何人也竒曰祖燕東部侯釐雅質竒曰侯釐何官也竒曰三皇不傳禮官名豈同哉昔故有雲師火正鳥師之名以斯而言世革則官異時易則禮變公為皇魏東宫内侍長侍長竟何職也繇是雅深憾之先是勅以竒付雅令銓補秘書雅既惡之遂不復叙用焉竒冗散數年髙允每與竒讎溫古籍嘉其遠致稱竒通識非凡學所窺允微勸雅曰君朝望具瞻何為與野儒辯簡牘章句雅謂允有私於竒曰君寧黨小人也乃取竒所注論語孝經焚扵庭内竒曰公貴人不乏樵薪何乃燃竒論語雅愈怒因告京師後生不聽傳授而竒無降志亦評雅之失雅製昭皇太后碑文論后名字之美比論前魏之甄后竒刺發其非聞於上詔下司徒檢對碑史事乃郭后雅有屈焉有人為謗書多怨時之言頗稱竒不得志雅乃諷在事云此書言竒不遂當是竒假人為之如依律文造謗書者皆及孥戮遂抵竒罪時司徒平原王陸麗知竒見枉惜其才學故得遷延經年冀有寛宥但執以獄成竟致大戮遂及其家隋劉焯信都人為縣功曹髙祖開皇中與左僕射楊素等扵國子學共論古今滯義素等莫不服其精博時運雒陽石經至京師文字磨滅莫能知者奉勅與劉炫等考定後因國子釋奠與炫二人論義深挫諸儒諸儒咸懷妬恨遂為飛章所謗除名為民蘇夔右僕射威之子少有盛名起家為太子通事舍人議樂事與國子博士何妥各有所持扵是夔妥俱為一議使百寮署其所同朝廷多附威同䕫者十八九妥恚曰吾席間函丈四十餘年反為昨暮兒之所屈也元善文帝時為國子祭酒學問在通直散騎常侍何妥之下然以風流醞藉俯仰可觀音韻清明聽者忘倦由是為後進所歸妥每懐不平心欲屈善因善講春秋初發題諸儒畢集善私謂妥曰名望已定幸無相苦妥然之及就講肆妥遂引古今滯義以難善多不能對善深銜之二人由是有隙唐孔穎逹仕隋煬帝大業初為河内郡博士詔徴諸郡儒官集於東都令國子秘書學士與之論難穎逹為最時穎逹少年而先輩宿儒恥為之屈潛遣刺客伺其便而圖之禮部尚書楊元感深禮之知其如是延之於第待以上客薦為太學助教由是顯名貞觀中遷國子祭酒撰正五經疏義稍為詳悉然有大學博士馬嘉運每掎摭之因此相與不平嘉運屢相譏詆有詔更令詳定未訖而卒周樊倫為國子司業太祖廣順末尚書左丞田敏判國子監獻印板九經書流行而儒官素多是非倫乃掇拾舛誤訟於執政又言敏擅用賣書錢千萬請下吏訊詰樞宻使王峻素聞敏大儒佐佑之宻訊其事搆致無狀然其書至今是非未息冊府元龜卷六百八
