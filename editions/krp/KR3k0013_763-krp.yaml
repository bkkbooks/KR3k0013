body:
  text: 册府元龜卷七百六十三宋王欽若等撰總録部忠烈死節忠烈夫有生者世之所共貴守死者人之所甚難而有委質事君陳力就列遭時不造秉節無貳冐難履險而罔憚齎志畢命而是圖自非内藴專精之誠舉無媮茍之念保丹赤而自誓經顛沛而不渝又安能比鴻毛以自輕履虎尾而弗畏者也中代而下不乏其人觀其植節匪遷狥義為務臨危益勵視死如歸古人云疾風知勁草斯之謂矣其或脱坎窞之阨免鯨鯢之害功濟於世身享其榮者亦固有焉漢蜀郡王皓為美陽今王嘉為郎王莾簒位並棄官西歸及公孫述稱帝遣使徵皓嘉恐不至遂先繫其妻子使者謂嘉曰速裝妻子可全對曰犬馬猶識主况於人乎王皓先自刎以首付使者述怒遂誅皓家屬嘉聞而歎曰後之哉乃對使者伏劒而死後漢閻忠漁陽人前為信都令梁州賊王國等起兵刼忠為主統二十六郡號車騎將軍忠感慨發病死魏賈逵初為郡吏守絳邑長郭援之攻河東所經城邑皆下逵堅守援攻之不㧞乃召單于并軍急攻之城將潰絳父老與援要不害逵絳人既潰援聞逵名欲使為將以兵刼之逵不動左右引逵使叩頭逵叱之曰安有國家長吏為賊叩頭援怒將斬之絳吏民聞將殺逵皆乗城呼曰負要殺我賢臣寜俱死耳左右義逵多為請遂得免初逵過皮氏曰争地先據者勝及圍急知不免乃使人間行送印綬歸郡且曰急據皮氏援既并絳衆將進兵逵恐其先得皮氏乃以他計疑援謀人祝奥援由是留七日郡從逵言故得無敗蜀諸葛尚瞻之子也時瞻為行都䕶衛將軍魏鄧艾伐蜀瞻督諸軍至涪停住前鋒破退尚歎曰父子荷國重恩不早斬黄皓以致傾敗用生何為乃馳赴前軍而死黄皓後主所任邪臣也晉賈渾恵帝大安中為介休令及劉元海作亂遣其將喬晞攻陷之渾抗節不降曰吾為晉守不能全之豈茍求生以事賊寇何面目以視息世間哉晞怒執將殺之晞將尹崧曰將軍舍之以勸事君晞不聽遂害之易雄長沙瀏陽人為舂陵令聞王敦作逆譙王承檄至雄馳檄逺近列敦罪惡俄而王師敗績敦得肆暴收雄姑熟以檄示焉雄曰有之惜雄位㣲力弱不能救國難安以生為今日即戮得為忠鬼乃所願也敦憚其辭正釋之衆人皆賀雄笑曰昨夜夢乗車掛肉其傍夫肉必有筋筋者斤也車傍有斤吾其戮乎尋而敦遣殺之宋劉伯宗渤海太守乗民從弟也明帝初青州刺史沈文秀舉兵同薛安都反乗民據臨濟城起義伯宗合率鄉兵復克北海因率所領向青州所治東陽城文秀拒之伯宗戰敗被創弟天愛扶持將去伯宗曰丈夫當死戰塲以身殉國安能歸死兒女手中乎弟可速去無為兩亡及見殺追贈龍驤將軍長廣太守傅𢎞之為雍州治平從事為赫連瓌所襲佛佛逼令降𢎞之不為屈時天寒祼𢎞之𢎞之呌罵見殺賈襲宗定陵人也劉胡叛淮南本縣已為胡所得率三十人救沈攸之攸之言於建安王休仁休仁㧞為司徒叅軍督䕶使還鄉里招集為胡所擒以火炙之問臺軍消息一無所言瞋目謂胡曰君稱兵海内窺覦神器未聞奇謀逺畧而為炮烙之刑僕本以身奉義死亦何有胡斬之梁顔見逺博學有志行初齊和帝之鎮荆州也以見逺為錄事參軍及即位於江陵以為治書侍御史俄兼中丞高祖受禪見逺乃不食發憤數日而卒高祖聞之曰我自應天從人何預天下人事而顔見逺乃至於此也霍雋為廣陵令太清二年侯景反既陷東府城郡邵陵王綸率馬歩三萬討之為景所敗景獲雋等來送城下狗之逼云已擒邵陵王雋獨云王小小失利己全軍還京口城中但堅守援軍尋至賊以刀毆之雋言辭顔色如舊景義而釋之陳沈烱仕梁為尚書左民侍郎出為呉令侯景之難呉郡太守袁居正入援京師以烱監郡京城陷景將宋子仙據呉興遣使召烱委以書記之任烱固辭以疾子仙怒命斬之烱解衣將就戮礙於路間桑樹乃更牽徃他所或遽救之僅而獲免裴政初仕梁為黄門侍郎副王琳拒蕭紀破之於硤口加平越中郎將鎮南府長史及周師圍荆州琳自桂州來赴難次于長沙政請從間道先報元帝至百里洲為周人所獲蕭詧謂政曰我武皇帝之孫也不可為爾君乎爾亦何煩殉身於叔父若從我計則貴及子孫如或不然分腰領矣政詭曰唯命詧鏁之送至城下使謂元帝曰王僧辨聞臺城被圍己自為帝王琳孤弱不能復東政許之既而告城中曰援兵大至各思自勉吾以間使被擒當以碎身報國監者擊其口終不易辭詧怒命趣行戮蔡大業諌曰此民望也若殺之則荆州不可下矣因得釋㑹江陵陷與城中朝士俱送于京師周文帝聞其忠授員外散騎侍郎引事相府隋陶模高祖時為嵐州司馬漢王諒據并州反刺史喬鍾葵發兵赴逆模諌之鍾葵失色曰司馬反耶臨之以兵氣辭不撓鍾葵義而釋之軍吏進曰若不斬模何以壓衆心於是囚之於獄悉掠取資財分賜黨與敬釗為繁畤令漢王諒據并州反釗不從賊既至力戰城陷賊帥墨弼掠其資産而臨之以兵釗辭氣不撓弼義而止之執送於偽將喬鍾葵所鍾葵釋之署為代州總管司馬釗正色拒之至再三鍾葵忽然曰受命則可不然當斬釗答曰忝為縣宰遭逢逆亂進不能保境退不能死節為辱己多何乃復以偽官相廹也死生唯命餘非所聞鍾葵怒甚熟視釗曰卿不畏死耶復將殺之㑹楊義臣軍至鍾葵遽出戰因而大敗釗遂得免馮慈明煬帝時攝江都郡丞事李宻之逼東都也詔令慈明安集瀍雒追兵擊宻至鄢陵為宻黨崔樞所執宻延慈明於坐勞苦之因而謂曰隋祚已盡區宇沸騰吾躬率義兵所向無敵東都危急計日將下今欲率四方之衆問罪於江都卿以為何如慈明答曰慈明直道事人有死而已不義之言非所敢對宻不悦冀其後改厚加禮焉慈明潛使人奉表江都及致書東都留守論賊形勢宻知其狀義而釋之出至營門賊帥翟讓怒曰爾為使人為我所執魏公相待至厚曽無感戴寜有畏乎慈明勃然曰天子使我來正欲除爾軰不圖為賊黨所獲我豈從汝求活耶湏殺但殺何湏罵詈因謂羣賊曰汝等本無惡心因饑饉逐食至此官軍且至早為身計讓益怒於是亂刀斬之楊善㑹大業中拜清河通守竇建徳自號長樂王來攻信都復擾臨清河善會逆拒之反為所敗嬰城固守賊圍之四旬城陷為賊所執建徳釋而禮之用為貝州刺史善會罵之曰老賊何敢擬議國士但恨吾力劣不能擒汝等我豈是汝屠酤兒軰汝輒敢欲相吏耶臨之以兵辭氣不撓建徳猶欲活之為其部下所請又知終不為己用於是害之清河士庶莫不傷痛焉松贇北海人性剛烈重名義為石門府隊正大業末有賊楊厚擁徒作亂來攻北海縣贇從郡兵討之贇輕騎覘賊為厚所獲厚令贇謂城中郡兵已破宜早歸降贇偽許之既至城下大呼曰我是松贇為官軍覘賊邂逅被執非力屈也今官軍大來並已至矣賊徒寡弱旦暮擒剪不足為憂賊以刀築贇口引之而去毆擊交下贇罵厚曰老賊何敢致辱賢良禍自及也言未卒賊已斬其腰城中望之莫不流涕扼腕鋭氣益倍北海卒完唐靳孝謨仕隋為朝邑縣法司義兵濟河授正議大夫受詔安集邊郡多有降附進位金紫光禄大夫行至鹽州為梁師都所陷孝謨見師都竟不屈節臨之以兵顔色不變罵師都極口由是見害高祖聞而嘉歎者久之唐安金藏為太常工人時睿宗為皇嗣或有誣告皇嗣有異謀者則天令來俊臣鞫之左右不勝楚毒皆欲自誣惟金藏大呼謂俊臣曰公既不信金藏言請剖心以明皇嗣不反即引佩刀自剖其胷五臟並出流血被地氣遂絶則天聞之舁入宮中遣醫人却内五臟以桑白皮縫合之傳藥經宿乃蘇則天臨視歎曰吾有子不能自明不如爾之忠也即令停推睿宗由是獲免周憬壽春人慷慨有節操中宗神龍中與光禄卿王同皎宻謀誅武三思及事泄遁於比干廟乃自刎而死臨終謂左右曰比干昔之忠臣也儻神道聰明應知我忠自殺又曰韋后亂朝樹寵邪佞武三思干上犯順虐害忠良吾知其滅亡不久也可懸吾頭於國門觀其身首異門而出其後韋氏及三思果亦誅滅甄濟為安祿山范陽掌書記察祿山有異圖乃偽嘔血遂舁歸及祿山反使偽節度使蔡希徳領行戮者李掞等二人封刀來召察其詐不起即就戮之濟以左手書云去不得李掞持刀而前濟引首以待希徳欷歔嗟嘆因李掞等退以實病報張巡為真源令姚誾為城父令與巡官聨相善及安祿山反舉兵渡河時靈昌太守呉王祗濟南太守李清單父尉賈賁各招召義徒數千人與巡誾等同拒逆黨雍丘令狐潮據城以應祿山百姓有違令者百餘人將殺之覘者報官軍至潮不及行刑遂反縛仆於地令人守之遽出軍以禦官軍縳者忽一人幸脱殺守者互解其縛閉城門以拒潮相持累日賁聞之入其城領衆殺潮母妻及子以堅人志將殺之先磔其子於城上示潮使人告之若降我吾捨汝潮又不從亦殺之後磔其母亦不從復殺之呉王祗表賁忠為監察御史會賁與潮戰為潮所殺巡先領兵為賁掎角及賁死因統其衆而守其城潮與賊將李庭望攻圍數月竟不㧞賊因置杞州築城於雍丘之北以絶路仍斷其外救巡度雍丘小城不足以禦外敵乃開門驅百姓詐降令將士持弓弩引滿巡以鋭卒數百殿其後且行且戰夜投睢陽城見許逺姚誾等共謀捍守朝廷壯之累遷主客郎中兼御史中丞誾官亦至郎中逺為侍御史賊將尹子奇圍城經數月求救於臨淮節度賀蘭進明竟不之救城中糧盡米斗價至八百後至人相食析骸以爨巡恐人心有變呼其愛妾對三軍殺之以饗軍士而令之曰諸公等戮力為國家守城巡不能以肉啖將士豈敢戀其寵愛乎將士皆泣下不忍食後括城中婦人盡以男夫老小繼之口尚四五萬初求救於賀蘭進明巡遣帳下士南霽雲夜縋出城之臨淮見進明日高會張樂饗士殊無出兵之意霽雲泣而謂之曰强冦陵逼圍城半年糧盡矢窮計無所出圍城之際城中數萬人今老小相食殆盡張中丞自殺愛妾以饗軍士今見存不過數千城中之人不敢愛死恐破之後賊過淮南亦不利於大夫耳霽雲所以持尺刃晝伏夜動匍匐以見大夫今大夫數日高會殊無遣兵之意豈忠臣義士勤王報國之意乎霽雲不能達主將之意請嚙一指留於大夫示之以信歸報城中將士遂却還睢陽數日得達城中懸繩而入城城中之人知救不至慟哭數日遂陷巡在城中每戰登埤大呼以助威眥血流面牙齒皆碎城已陷西向再拜曰為救不至臣智勇俱竭不能全城今使逆賊陵逼臣死之後願為鬼與賊為厲以答國恩及城陷尹子奇見巡問之曰聞公毎督戰則皆眥裂齒碎實有之否巡應之曰然子奇曰何以至此曰欲得殺逆賊遂至於此子奇以大刀剔其口見有齒在者不過三數巡因大詬罵子奇責以悖逆損害平人子奇欲赦之左右曰此人必不為我用又得衆死心不可留故害之霽雲及誾亦皆同日遇害唯許逺生擒送雒陽安慶緒將投河北哥舒翰程千里許逺等三十餘人皆舍於偽客省及慶緒敗渡河北走使嚴莊盡害之而後行石演芬為朔方節度使李懐光養子累至右武鋒都將興元初懐光軍屯三橋將與朱泚通謀演芬乃使食客郜成義宻疏具言懐光無狀請即罷其總統成義至奉天乃反以其言告懐光子琟琟宻報其父懐光乃召演芬責之曰我以爾為子柰何欲破我家今死可乎演芬對曰天子以公為腹心公亦以演芬為腹心公上負天子安可下責演芬且演芬胡人不解異心欲守死以事一人幸得免呼為賊死常分也懐光初使左右臠食之皆曰此忠烈之士也可令快死乃以刀斷其頸徳宗追思義烈故贈兵部尚書仍贈錢三百千又捕得郜成義于朔方軍戮之高郢字公楚李懐光統邠寜奏署幕僚累轉副元師判官懐光背恩將歸河中郢言曰西迎大駕豈非忠乎懐光忿而不聽及歸鎮又欲悉衆而西時渾瑊軍孤羣帥未集郢與李鄘誓死駐之屬懐光長子琟候郢郢乃諭以逆順之理且言天寶以來阻兵今誰在者况國家仗天命非獨人力今若恃衆西向自絶于天十室之邑必有忠信安知三軍不有奔潰者乎琟震懼流淚氣索明年春郢與都知兵馬使呂鳴岳都虞侯延英同謀間道上表及受宻詔事洩二將立死懐光乃大集將卒白刃盈庭引郢詰之郢挺然抗辭無所慙隱憤氣感發觀者淚下懐光慙沮而入李鄘字建侯為秘書省正字為李懐光所辟累遷監察御史及懐光蒲津叛鄘與母妻陷賊中恐禍及親因偽白懐光曰兄病在雒請母徃視之懐光許焉且戒妻子無得從鄘皆遣行後懐光責之對曰鄘名𨽻軍籍不得隨侍老母柰何不使婦隨姑行也懐光無以罪時與高郢同在賊庭乃宻奏賊軍虛實及攻取之勢徳宗賜手詔以勞之後事泄懐光嚴兵召郢與鄘詰責鄘詞激氣壯三軍義之懐光不敢殺囚獄中懐光死馬燧就獄致禮表為河東從事張名振為李懐光左都將徳宗興元元年徳宗詔賜懐光鐵劵懐光奉詔倨慢名振大呼於軍門曰太尉見賊不擊天使到不敬固將反耶且安史兩賊僕固懐恩今皆族滅今欲何為是資忠義之士立功勲耳懐光聞之召名振謂之曰我不反為賊强盛須蓄鋭候時耳無幾懐光引軍入咸陽名振又曰向者言不反今㧞軍此來何也何不以兵急攻朱泚收復京城取大富貴是善計也懐光聞之曰名振病狂也使杖殺之後唐姚洪為指揮使率兵千人鎮閬州洪嘗為汴之小校經事東川節度董璋璋叛宻令人誘洪洪以大義拒之及璋攻城洪悉力拒守者三日禦備既竭城陷被擒璋謂洪曰爾頃為健兒由吾奬㧞至此吾書誘諭投之於厠何相負耶洪大罵曰老賊爾為天子鎮帥何苦反耶爾既孤恩背主吾與爾何恩而云相負爾為李七郎奴掃馬糞得一臠殘炙感恩無盡今明天子付與茅土貴為諸侯而驅徒結黨圖為反噬爾本奴才則無恥吾忠義之士不忍為也吾可為天子死不能與人奴茍生璋怒令軍士十人持刀寸割其膚燃鑊於前自取啗食洪至死大罵不已明宗聞之泣下置洪二子於近衛給賜頗優沙守榮為弓箭庫使應順元年三月閔帝以潞王兵至出奔衛州遇鎮州節度使石敬瑭即晉高祖諭以潞王危社稷康義誠已下叛我無以自庇長公主見敎逆爾於路謀社稷之計石曰衛州王宏贄宿舊諳事且徃宏贄圖之石馳騎而前見宏贄曰播遷至此危廹吾戚藩也何以圖全宏贄曰天子避狄古亦有之然於奔廹之中亦有將相國家法物所以軍民瞻奉不覺其亡也今宰執近臣從乎寶玉法物從乎詢之無有宏贄曰大樹將顛非一繩所維今以五十騎奔竄無一人將相擁從安能興復大計所謂蛟龍失雲雨也今六軍將士總在潞邸矣公縱以戚藩念舊無柰之何遂與宏贄同謁於驛亭並坐謀之石以宏贄所陳以聞守榮前謂石曰主上即明宗愛子公明宗愛壻富貴既同受休戚合共之故謀之戚藩原期安復今翻索從臣國寶欲以此為辭為賊筭天子乎乃抽佩刀刺石親將陳暉扞之守榮與暉軍戰而死死節禮曰謀人之軍師敗則死之又曰臨陣無勇非孝也又曰臨難無茍免是知束髮事君竭誠許國蓋臣子之常分也若乃辭色慷慨承白刃而不顧膽氣倜儻雖衆潰而獨死或抗節不從於戎首或城陷不屈其剛操或後進已至詎肯解舟而輕去或主帥前却自率屬兵而赴敵此皆抗志忠烈垂名竹帛至如以杙抉傷得矛亡㦸一則恥不終其賜一則恨不快其心至於畢命抑其次也臧堅魯臧紇之族也齊侯伐魯北鄙齊人獲臧堅齊侯使夙沙衛唁之且曰無死使無自殺堅稽首曰拜命之辱抑君賜不終姑又使其刑臣禮於士以杙抉其傷而死言使賤人來唁已是惠賜不終也夙沙衛奄人故謂之刑臣也敝無存齊人也齊侯伐晉夷儀為衛討也敝無存之父將室之辭以與弟室之為娶婦曰此役也不死反必娶於高國高氏國氏齊貴族也無存欲必有功還娶卿相之女先登求自門出死於霤下既入城夷儀人不服故鬪死於門屋霤下也平阿餘子齊人也齊晉相與戰餘子亡㦸得矛平阿齊邑餘子官氏退而去不自快謂路之人曰亡㦸得矛可以歸乎路之人曰㦸亦兵也矛亦兵也亡兵得兵何為不可以歸去行心猶不自快也遇高唐之孤叔無孫孤特立尊也叔姓無孫名餘子當其馬前曰今者戰亡㦸得矛可以歸乎叔孫曰矛非㦸也㦸非矛也亡㦸得矛豈亢責也哉餘子曰嘻還反㦸趨尚及之遂戰而死漢路中大夫姓路為中大夫孝景三年呉楚反膠東膠西菑川濟南王皆發兵應呉楚欲與齊與之同名齊王使路中大夫告于天子天子復令路中大夫還報告齊王堅守漢兵今破呉楚矣路中大夫至三國兵圍臨菑數重無從入三國將與路中大夫盟曰若反言漢已破矣若汝也反謂反易其辭也齊趣下三國不且見屠路中大夫既許至城下望見齊王曰漢已發兵百萬使太尉亞夫擊破呉楚方引兵救齊齊必堅守無下三國將誅路中大夫後漢張况光武初為常山關長時年八十會赤眉攻闗城况出戰死帝甚哀之杜篤為車騎將軍馬防從事章帝建初三年防擊西羌請篤為從事中郎戰没於射姑山嚴授為漁陽太守張顯兵馬掾安帝元初中鮮卑數百餘騎冦漁陽顯率吏士追出塞遙望虜營烟火急趨之授慮有伏兵苦諫止不聽顯促令進授不獲已前戰伏兵發授身被十創殁於陣顯㧞刃追散兵不能制虜射中顯主簿衛福功曹徐咸遽赴之顯遂墜馬福以身擁蔽虜并殺之朝廷愍授守節詔書褒歎孟嘗其先三世為郡吏並伏節死難雒皓為中牟令靈帝中平四年二月滎陽賊殺皓及主簿潘業皓等與賊戰臨陣不顧皆被害袁祕字永寜汝南人閎之孫也為郡門下議生黄巾起祕從太守趙謙擊之軍敗祕與功曹封觀主簿陳端門下督范仲禮賊曹劉偉徳主記史丁子嗣張仲然等七人以身扞刄皆死于戰謙以得免詔旌祕等門閭號曰七賢魏夏侯榮征西将軍淵之第五子年十三從太祖於漢中戰敗左右提之走不肯曰君親任難焉所逃死乃奮勇而戰遂没于陣杜畿為司𨽻校尉文帝征呉以畿為尚書僕射統留事其後帝幸許昌畿復居守受詔作御樓船於陶河試船遇風没帝為之流涕劉整為士齊王嘉平中呉將諸葛恪圍合肥新城城中遣整出圍傳消息為賊所得考問所傳語整曰諸葛公欲活汝汝可具服整罵曰死狗此何言也我當必死為魏國鬼不茍求活逐汝去也欲殺我者便速殺之終無他辭遂殺之鄭像為士時呉將諸葛恪圍合肥城中遣像出城傳消息或以語恪恪遣馬騎尋圍跡索得像還四五人的頭面縛將繞城表勑語像使大呼言大軍已還雒不如早降像不從其言更大呼城中曰大軍近在圍外壯士努力賊以刃築其口使不得言像遂大呼令城中聞知而死後追賜像爵關内侯閻溫字伯儉天水西城人也以凉州别駕守上邽令馬超來奔上邽郡人任養等舉衆迎之溫止之不能禁乃馳還州超復圍州所治冀城甚急州乃遣溫宻出告急於夏侯淵賊圍數重溫夜從水中濳出明日賊見其迹遣人追遮之於顯親界得溫執還詣超解其縛謂曰今成敗可見足下為孤城請救而執於人手義何所施若從吾言反謂城中東方無救此轉禍為福之計也不然今為戮矣温偽許之超乃載溫詣城下温向城大呼曰大軍不過三日至勉之城中皆泣稱萬嵗超怒數之曰足下不為命計邪溫不應時超攻城久不下故徐誘温冀其改意復謂溫曰城中故人有欲與吾同者不溫又不應遂切責之溫曰夫事君有死無貳而卿乃欲令長者出不義之言吾豈茍生者乎超遂殺之蜀傅僉史不載其官與武興督蔣舒守闗口鍾㑹伐蜀别將攻之舒將出降乃詭謂僉曰今賊至不擊而閉城自守非良圖也僉曰受命保城惟全為功今違命出戰若䘮師負國死無益矣舒曰子以保城獲全為功我以出戰克敵為功請各行其志遂率衆出僉謂其戰也至隂平已降胡烈烈乗虛襲城僉格鬪而死魏人義之張遵為尚書隨諸葛瞻於綿竹與鄧艾戰而死程畿字季然先主領益州牧辟為從事祭酒後隨先主征呉遇大軍敗績泝江而還或告之曰後追已至解舩輕去乃可以免畿曰吾在軍未曽為敵走况從天子而見危哉追人雖及畿舩畿身執㦸戰敵舩有覆者衆大至共擊之乃死黄崇為尚書郎隨衛將軍諸葛瞻拒鄧艾到涪縣瞻盤桓未進崇屢勸瞻宜速行據險無令敵得入平瞻猶豫未納崇至於流涕㑹艾長驅而前瞻却戰至緜竹崇帥屬軍士期於必死臨陳見殺晉毛嶷司州刺史徳祖次弟徳祖戍武牢為魏所没嶷及弟辯並有志節嶷死於盧循之難辯没於魯宗之役並奮不顧命為世所歎宋沈勁為冠軍陳祐長史戍金墉城為鮮卑慕容恪所陷不屈節見殺荀瓊頴隂人也宋元嘉末渡淮赴武陵王義為元凶追兵所殺王應之為衡陽内史時晉安王子勛反應之起義拒湘州從事何惠文為惠文所殺南齊陳光靜為郢州刺史張冲中兵參軍梁王義師起冲拒之梁王遣軍主曹景宗等過江攻郢城未及盡濟冲遣光静等開門出擊為義師所破光静戰死梁任孝恭為中書通事舍人高祖太清三年侯景冦逼孝恭啟募兵𨽻蕭正徳屯南岸及賊至正徳舉衆入賊孝恭還赴臺臺門已閉因奔入東府尋為賊所攻城陷見害蘭夏禮安南將軍欽子也侯景至厯陽其部曲邀擊景兵敗夏禮死之陳楊孝辨中領軍魯廣達友人也時賀若弼軍乗勝至宫城廣達為中領軍苦戰不息孝辨時從廣達在軍中戰陷陣其子亦隨孝辨揮刃殺隋兵十餘人力窮父子俱亡唐宗大業末為朔方郡丞時梁師都舉兵將據郡城宗抗節不從遂遇害唐尹元貞河間人也為曲阿令天后文明元年徐敬業據揚州亂元貞在曲阿聞敬業攻陷潤州乃率兵赴救苦戰力屈為賊所擒敬業臨以白刃脅令附己元貞詞色慷慨竟不之屈尋遇害李奐為河間司法天寶末史思明圍饒州太守盧全誠陸渾令李系拒之奐以七千人救之為思明所敗後賊將尹子奇圍河間四十餘日平原太守顔真卿使將和琳領一萬一千人馬數百疋以救之官軍去城二十餘里北風嚴烈鼓聲絶不相聞思明使兵亂擊之官軍敗生擒和琳至城下思明既至合勢賊軍大振從外築道為高堤以入城城上戰不勝退至街巷又戰城中大潰奐為賊所擒送至東京為祿山所害翟景珂本潯陽人後家於濮州之鄄城倜儻有膽氣鄉里稱之貞明初與太原兵夾河而軍濮州隣境疲於俘剽景珂聚鄉邑入保永定驛固守踰年景珂戰殁衆潰後唐王緘在莊宗募府胡柳之役緘隨輜重前行没於亂兵際晩盧質還營莊宗問副使所在曰某初不之知也既而緘凶問至莊宗流涕乆之得其䘮歸葬太原安承規為昭義軍都虞候光火賊武章等刼州獄奪其黨類承規獨禦之久無救應為衆所殺册府元龜卷七百六十三
