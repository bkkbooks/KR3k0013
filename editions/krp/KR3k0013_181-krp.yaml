body:
  text: 册府元龜卷一百八十一宋王欽若等撰帝王部惡直疑忌無斷惡直傳曰事君勿欺也而犯之又曰有犯而無隱故古之良臣挺謇諤之志勵骨鯁之節内懷忠愛情均休戚故有犯顔色觸忌諱獻替可否補救闕失言必逆耳事乃利國自非人主廓容納之量克己降意則龍鱗人逆鮮或不怒至有勵斧鉞以震威建官司以監謗下幽縶之詔行黜棄之典乃使良士結舌嘉言攸伏良可戒哉書曰予違汝弼汝無面從又曰有言逆於汝心必求諸道誠哉爲邦之丕訓也夏王桀淫虐諸侯咸叛闗龍逄引黄圖而諫桀以爲妖言焚黄圖而殺龍逄商王紂既淫亂微子諫不聽乃與太師箕子謀去之比干曰爲人臣者不得不以死諫乃强諫紂紂怒曰吾聞聖人心有七竅剖比干觀其心箕子懼乃佯狂爲奴紂又囚之周厲王即位三十年好利近榮夷公大夫芮良夫諫厲王不聽卒以榮公爲卿士用事王行暴虐侈傲國人謗王召公諫曰召康公之後穆公虎爲王卿士民不堪命矣王怒得衞巫衞國之巫也使監謗者以告則殺之其謗鮮矣諸侯不朝三十四年王益嚴國人莫敢言道路以目以目相視而已厲王喜告召公曰吾能弭謗矣乃不敢言召公又諫之王不聽於是國人莫敢出言漢文帝時袁盎爲中郎將亦以數直諫不得久居中調爲隴西都尉調選也景帝即位以太子太傅石奮爲九卿廹近憚之以其敬恭履度故憚之徙奮爲諸侯相武帝時汲黯爲中大夫以數切諫不得久留内選爲東海太守召爲主爵都尉亦以數直諫不得久居位狄山爲博士匈奴求和親羣臣議前於帝前議事山曰和親便帝問其便山曰兵凶器未易數動言難可屢動高帝欲伐匈奴大困平城乃遂結和親孝惠高后時天下安樂及文帝欲事匈奴北邉蕭然苦兵蕭然猶騷然擾動之貌也孝景時吳楚七國反景帝往來東宫間謂諮謀於太后也天下寒心數月懼於兵難也吳楚已破竟景帝不言兵訖景帝之身更不議征伐之事天下富實今自陛下興兵擊匈奴中國已空虚邉大困貧繇是觀之不如和親帝問湯湯張湯也湯曰愚儒無知狄山曰臣固愚忠若御史大夫湯乃詐忠湯之治淮南江都以深文痛詆諸侯别䟽骨肉使藩臣不自安臣固知湯之詐忠於是帝作色曰吾使生居一郡能無使虜入盗乎博士之官故呼爲生也山曰不能曰居一縣曰不能復曰居一鄣間鄣音之向切謂塞上要險之處别䇿爲城因置吏士而爲鄣蔽以折冦也山自度辯窮且下吏度計也見詰自辯而辭窮當下吏也曰能乃遣山乘鄣乘登也登而守之至月餘匈奴斬山頭而去是後群臣震讋成帝時朱雲上書求見公卿在前時丞相故安昌侯張禹以帝師位特進甚尊重雲曰臣願賜尚方斬馬劔斷佞臣一人頭以厲其餘帝問誰也對曰安昌侯張禹帝大怒曰小臣居下訕上廷辱師傅罪死不赦御史將雲下雲攀殿檻折後帝意亦解劉輔以美才擢爲諫議大夫成帝欲立趙媫妤爲皇后輔上書曰陛下乃觸情縱欲以卑賤之女母天下乎里語曰腐木不可以爲柱卑人不可以爲主臣辱諫諍之官不敢不盡死書奏帝使侍御史収縳輔繫掖庭秘獄後減死罪一等綸鬼薪哀帝寵董賢爲大司馬賢年二十二帝置酒與賢父親屬宴飲帝飲醉從容視賢而笑曰吾欲法堯禪舜何如侍中王閎在坐進諫曰昔周成戲以桐葉封弟叔虞於晉周公入曰天子無戲言今天下乃髙帝之天下非陛下之天下也陛下以藩王入奉嗣孝成皇帝後當承宗廟傳子孫於無窮豈得以戲言將高祖社稷輸人邪帝黙然不悅終以失㫖貶爲郎署後漢光武建武中内外羣官多帝自選舉加以法理嚴察職事過苦尚書近臣至乃揺撲率曵於前羣臣莫敢正言尚書令申屠剛毎輙極諫又數言皇太子宜時就東宫簡任賢保以成其德帝並不納剛以數切諫失㫖數年出爲平隂令和帝時侍郎光禄大夫李法上䟽以爲朝政苛碎違永平建初故事宦官權重椒房寵盛又譏史官記事不實後世有識尋功計徳必不明信坐失㫖下有司免爲庶人安帝時蘇章爲議郎數陳得失其言甚直出爲武原令成翊世爲尚書郎安帝時常侍樊豐與帝乳母王聖共譛皇太子廢爲濟隂王翊世連上書訟之又言樊豐王聖誣㒺之狀帝既不從而豐等䧟以重罪下獄當死有詔免官歸本郡順帝時宋登爲侍中數上封事抑退權臣繇是出爲潁川太守桓帝時白馬令李雲上䟽言孔子曰帝者諦也今小人謟進財貨公行是帝欲不諦乎帝怒送黄門北寺獄𢎞農五官掾杜衆傷雲以忠諫獲罪上書願與雲同日死帝愈怒遂并下廷尉大鴻臚陳蕃上䟽救雲曰李雲所言雖不識禁忌干上逆㫖其意歸於忠國而已昔高祖忍周昌不諱之諫成帝赦朱雲腰領之誅今日殺雲臣恐剖心之譏復議於世矣故敢觸龍鱗冐昧以請太常楊秉雒陽市長沐茂郎中上官資並上䟽請雲帝恚甚有司奏以爲大不敬詔切責蕃秉免歸田里茂資貶秩二等時帝在濯龍池管霸奏雲等事霸跪言曰李雲野澤愚儒杜衆郡中小吏出於狂戅不足加罪帝謂霸曰帝欲不諦是何等語而常侍欲原之邪顧使小黄門可其奏雲衆皆死獄中靈帝時欒巴爲議郎時大將軍竇武太傅陳蕃被誅巴以其黨復讁爲永昌太守以功自效辭病不行上書極諫理陳竇之寃帝怒下詔切責收付廷尉巴自殺張鈞時爲郎中以中常侍張讓所在貪殘爲人蠧害乃上書曰宜斬十常侍縣頭南郊可不須師旅而大冦自消天子以鈞章示讓等皆免冠徒跣頓首乞自致雒陽詔獄並出家財以助軍費有詔皆冠履視事如故帝怒鈞曰此真狂子也十常侍固當有一人善者不鈞復重上猶如前章輙寢不報詔使廷尉侍御史考爲張角道者御史承讓等阿㫖遂誣奏鈞學黄巾道収掠死獄中而讓等實多與張角交通魏文帝黄初元年十二月長水校尉戴陵諫不宜數行弋獵帝大怒陵減死罪一等鮑勛爲宫正時文帝欲征吳羣臣大議勛面諫以爲不可帝益忿之左遷勛爲治書執法蘇則爲侍中文帝時人多饑困而軍數出又兼治宫室則數面諫繇此帝頗不悅其後出爲河東相晉武帝時詔齊王攸將之國祭酒曹志建議以爲不當遣帝覽議大怒曰曹志尚不明吾心况四海乎以議者不指答所問横造異論策免太常鄭黙於是有司奏收志等結罪詔惟免志官以公還第其餘皆付廷尉向雄爲河南尹齊王攸將歸藩雄諫曰陛下子弟雖多然有名望者少齊王卧在京邑所益實深不可不思帝不納雄固諫忤㫖起而徑出遂以憤卒元帝爲晉王時奉朝請周嵩上疏曰臣聞取天下者常以無事及其有事不足以取天下故古之王者必應天順時義全而後取讓成而後得是以享世長久重光萬載也今議者以殿下化流江漢澤被六州功濟蒼生欲推崇尊號臣謂今梓宫未反舊京未清義夫泣血士女震動宜深明周公之道先雪社稷大耻盡忠言嘉謀之助以時濟𢎞仁之功崇謙謙之美推後己之誠然後揖讓以謝天下誰敢不應誰敢不從繇是忤㫖出爲新安太守後周宣帝爲太子時武帝顧命曰内史王誼社稷臣宜處以機密不須遠任也及即位憚誼剛正出爲襄州總管劉行本掌朝下大夫宣帝嗣位多失德行本切諫忤㫖出爲河内太守隋高祖初即位虞慶則勸高祖盡滅宇文氏高熲楊惠亦依違從之唯内史令李德林固爭不可高祖作色怒曰君讀書人不足平章此事於是遂盡誅之自是品位不加出於高虞之下唯依班例授上儀同進爵爲子煬帝時盗賊不止天下大亂納言蘇威每諷諫帝彌不平後復問伐遼東事威對願赦羣盗遣討高麗帝益怒之梁毗爲刑部尚書并攝御史大夫事奏劾字文述私役部兵煬帝議免述罪毗固諍因忤㫖遂令張衡代爲大夫毗憂憤數月而卒蕭瑀爲内史侍郎時煬帝至鴈門爲突厥所圍瑀進計其圍乃解其後帝又將伐遼東謂羣臣曰突厥狂悖勢何能爲以其少時未散瑀遂相恐動情不可恕因出之爲河池郡守即日遣之張䖍威爲謁者大夫時煬帝數廵幸百姓疲弊䖍威因上封事以諫帝不悅自此見踈許善心爲給事郎大業七年從至涿郡帝方自御戎以東討善心上封事忤㫖免官唐德宗貞元中袁高爲給事中以切直忤㫖時宰相齊映連請以高爲左丞御史大夫皆不行姜公輔爲諫議大夫同中書門下平章事從德宗幸山南車駕至城固縣唐安公主薨公主帝之長女昭德皇后所生性聰敏仁孝上所鍾愛初詔尚韋宥未克禮㑹而遇播遷及薨帝悲悼尤甚詔所司厚其塟禮公輔諫曰非久克復京城公主必須歸塟今於行路且宜儉薄以濟軍士帝怒謂翰林學士陸䞇曰唐安夭亡不欲於此爲塋壠且令造一磚塔安置功費甚微不合闗宰相論列公輔忽進表章都無道理但欲指朕過失擬自取名朕比㧞擢爲腹心乃負朕如此䞇對曰公輔官是諫議職居宰衡獻替固其職分本立輔臣置之左右朝夕納誨意在防微而弼之乃其所也陛下以造塔役費微小非宰相所論之事但問理之是非豈綸事之大小若造塔爲是役雖大而作之何傷若造塔爲非費雖小而言者何罪帝又曰卿未㑹朕意以公輔才行共宰相都不相當在奉天時已欲罷免後因公輔辭退朕以面許尋屬懷光背叛遂且因循容至山南公輔知朕必擬改官所以固論造塔賣直取名據此用心豈是良善朕所惆悵者只縁如此䞇雖再三救䕶帝怒不已乃罷爲左庶子蕭復爲相扈駕奉天請别對奏云陛下臨御之初聖德光被自用楊炎盧把秉政損黷皇猷以致今日今雖危急願陛下深革睿思微臣敢當此任若令臣依阿偷免臣不敢曠職盧把奏對於帝前阿䛕順㫖復正色曰盧把之詞不正德宗愕然退謂左右曰蕭復頗輕朕遂令往江南宣撫後遂罷之憲宗元和中王承宗叛詔以吐突承璀爲招討使右補闕孟簡拜䟽論之坐忤㫖出爲常州刺史錢徽爲翰林學士淮蔡未平徽以連年征伐不息與蕭俛俱在宥宻迭上䟽請罷兵因忤帝㫖除右庶子罷内職裴潾元和末爲起居舎人時有術士栁泌錬藥帝惑之潾上䟽請令術士先嘗其藥以是忤㫖貶江陵縣令文宗太和六年百姓上官興殺人危死諫議大夫史館修撰王彦威累上䟽以激切忤㫖又咨於執政辭訐氣盛除河南少尹疑忌自古駕御豪傑彈壓區宇必推己以及物執中以作孚坦蕩爲懷從容肆體堯舜禹湯率繇是矣暨周成惑羣叔之說姬旦有東山之遷鴟鴞之詩義形怨刺厥後勲高佐命威足震主爵禄不足以充其賞禮法不足以扼其勢優崇斯至猜惡彌甚比諸芒刺視如土芥加以䜛搆相攻謡䜟符合久操兵柄頗得士心或車服僣差交結靡間或以勞自負不慎厥終故雖漢高之豁逹光武之寛容去就之間猶不免乎嫌忌矣矧乃天資峻刻舊惡是念欲加之罪其無辭乎書曰任賢勿貳又曰任賢繇已蓋聖哲之明訓也漢高祖征陳豨還相國蕭何爲民請曰長安地陿上林中多空棄地願令民得入田毋收槀爲禽獸食槀禾稈也言恣人田之不取其槀稅也槀音工老切稈音二旱切帝大怒曰相國多受賈人財物爲請吾苑乃下何廷尉械繫之數日王衞尉侍百官公卿表衞尉王氏無名字史失之也侍謂侍天子也前問曰相國胡大罪陛下繫之暴也前問謂進而請也胡何也帝曰吾聞李斯相秦皇帝有善歸主有惡自予今相國多受賈䜿金爲請吾苑以自媚於民媚愛也求愛於民故繫治之王衞尉曰夫職事茍有便於民而請之眞宰相事者陛下柰何乃疑相國受賈民錢乎且陛下距楚數嵗陳豨黥布反時陛下自將往當是時相國守闗中闗中揺足則闗西非陛下有也相國不以此時爲利乃利賈人之金乎且秦以不聞其過亡天下夫李斯之分過又何足法哉陛下何疑宰相之淺也帝不懌懌恱也感衞尉之言故慙悔而不恱也是日使使持節赦出何景帝時周亞夫爲丞相帝居禁中召亞夫賜食獨置大胾胾大臠音側吏反無切肉又不置箸亞夫心不平顧謂尚席取箸尚席主席者也帝視而笑曰此非不足君所乎帝言賜君食而不設箸此繇我意於君有不足乎亞夫免冠謝帝帝曰起亞夫因趨出帝目送之曰此鞅鞅非少主臣也竟下獄死武帝時鄭當時字莊以任俠自喜聲聞梁楚間及爲大司農帝使視决河自請治行五日治行謂莊嚴帝曰吾聞鄭莊行千里不齎糧治行者何也義縱爲右内史武帝幸鼎湖病久已而卒起幸甘泉已病愈也言帝久病既愈忽然即幸甘泉道不治帝怒曰縱以我爲不行此道乎銜之至冬楊可方受告緡縱以爲此亂民部吏捕其爲可使者天子聞使杜式治以爲廢格沮事武帝使楊可主告緡没入其財物縱捕爲可使者此爲廢格詔書沮已成之事也沮壤也棄縱市宣帝初即位謁見高廟大將軍霍光從驂乗帝内嚴憚之若有芒刺在背後車騎將軍張安世代光驂乗天子從容肆體甚安近焉及光身死而宗族竟誅故俗傳之曰威震主者不畜霍氏之禍萌於驂乗後漢光武時馮勤爲郎中給事尚書司徒侯霸薦前梁令閻楊楊素有譏議帝嘗嫌之既見霸奏疑其有姦大怒賜霸璽書曰崇山幽都何可偶黄鉞一下無處所欲以身試法邪將殺身以成仁邪使勤奉策至司徒府勤還陳霸本意申釋事理帝意稍觧魏太祖初爲董卓所辟太祖變易姓名間行東歸過故人成臯吕伯奢伯奢出行五子俱在備賔主禮聞其食器聲以爲圖已遂夜殺之既而悽愴曰寧我負人無人負我遂行周不疑㓜有異才聰明敏逹太祖初欲以女妻之不疑不敢當帝愛子倉舒夙有才智謂可與不疑爲儔及倉舒卒帝心忌不疑欲除之文帝諫以爲不可帝曰此人非汝所能駕御也乃遣刺客殺之帝持法峻刻諸將有計畫勝出已者隨以法誅之及故人舊怨亦皆無餘其所刑殺輒對之垂泣嗟痛之然終無所活初袁忠爲沛相嘗欲以法治帝後亦殺之楊脩字德祖好學有俊才爲丞相主簿嘗出行籌太祖有問外事乃逆爲荅記勑守舎兒若有令出依次通之既而果然如是者三操怪其速使亷之知狀於此忌脩且以袁紹之甥慮爲後患遂因事殺之文帝時臧霸爲鎭東將軍都督青州諸軍事初霸遣别軍在雒㑹太祖殁霸所部及青州兵以爲天下將亂皆鳴皷擅去帝即位以曹休都督青州霸謂休曰國家未肯聽霸爾若假霸歩騎萬人必能横行江表休言之於帝帝疑霸軍前擅去今意壯乃爾遂東廵因霸來朝而奪其兵晉宣帝以𤣥石圖有牛繼馬後深忌牛氏遂爲二榼共一口以貯酒焉帝先飲佳者而以毒酒鴆其將牛金景帝夏侯后母曹氏魏德陽鄉主后雅有識度魏明帝世宣帝居上將之重諸子並有雄才大畧后知帝非魏之純臣而后魏氏之甥帝深忌之遂以鴆終夏侯𤣥爲景帝所執衞將軍司馬文王流涕請之帝曰卿忘㑹趙司空塟乎先是司空趙儼薨大將軍兄弟㑹塟賔客以百數𤣥時後至衆賔咸越席而迎繇是惡之文帝有宻䟽未之屏也如厠侍中鄭小同詣之還謂之曰卿見吾䟽乎對曰否帝猶疑而鴆之卒王儀高亮雅直爲文帝司馬東闗之役帝問於衆曰近日之事誰任其咎儀對曰責在元帥帝怒曰司馬欲委罪於孤耶遂引出斬之武帝太始初石苞督揚州時諸葛誕初破滅苞便鎮撫淮南士馬强盛邉境多務苞既勤庶事又以威惠服物淮北監軍王琛輕苞素微又聞童謡曰宫中大馬幾作驢大石壓之不得舒因是宻表苞與吳人交通先時望氣者云東南有大兵起及琛表至帝甚疑之㑹荆州刺史胡烈表吳人欲大出爲冦苞亦聞吳師將入乃築壘遏水自固帝聞之謂羊祜曰吳人每來常東西相應無縁偏爾豈石苞果有不順乎祜深明之而帝猶疑焉㑹苞子喬爲尚書郎帝召之經日不至帝謂為必叛欲討苞而隱其事遂下詔以苞不料賊勢築壘遏水勞擾百姓策免其官遣太尉義陽王望率大軍徵之以備非常又勑鎭東將軍琅邪王伸自下邳㑹壽春苞用掾孫鑠計放兵歩出住都亭待罪帝聞之意觧及苞詣闕以公還第明帝時羊鑑爲少府及王敦反帝以鑑敦舅又素相親黨數被嫌責孝武帝時謝安爲太傅安女壻王國寶專利無檢行安惡其爲人每抑制之及帝末年嗜酒好肉而㑹稽王道子昏醟尤甚惟狎昵謟邪於是國寶䜛䛕之計稍行於主相之間而好利憸詖之徒以安功名盛極而搆㑹之嫌隙遂成帝嘗召桓伊飲讌安侍坐帝命伊吹笛伊神色無迕即吹爲一㺯乃放笛云臣於筝分乃不及笛然自足以韻合歌管請以筝歌并請一吹笛人帝善其調逹乃勑御妓奏笛伊又云御府人於臣必自不合臣有一奴善相便串帝彌賞其放率乃許召之奴既吹笛伊便撫筝而歌怨詩曰爲君既不易爲臣良獨難忠信不可顯乃有見疑患周旦佐文武金縢功不刋推心輔王政二叔反流言聲節慷慨俯仰可觀安泣下沾襟乃越席而就之捋其鬚曰使君於此不凡帝甚有愧色後魏道武時鄧淵爲尚書吏部郎謹於朝事未嘗忤㫖其從父弟暉爲尚書郎兇俠好竒與定陵侯和䟦厚善䟦有罪誅其子弟奔長安或告暉將送出之繇是道武疑淵知情遂賜淵死既而悔之時人咸愍惜焉庾岳道武時爲司空天賜四年詔賜岳舎地於南宫岳將家僮治之侯官告岳衣服鮮麗行止風采擬於人君道武時既不豫多所嫌惡遂誅之時人咸寃惜焉賀狄千世爲將初道武普封功臣狄千雖爲姚興所留遥賜狄千爵襄武侯加秦兵將軍及狄干至道武見其言語衣服有類中國以爲業慕而習之故忿焉既而殺之弟歸亦剛直方雅與狄千俱死後周武帝忌齊王憲意欲除之謂小冡宰宇文孝伯曰公能爲朕圖齊王當以其官位相授孝伯叩頭曰奉先帝遺詔不許濫誅骨肉齊王陛下叔父戚近功高社稷重臣棟梁所寄陛下若妄加刑戮㣲臣又順㫖曲從則臣爲不忠之臣陛下爲不孝之子也帝不懌因漸踈之乃與于智王端鄭譯等宻圖其事後令智告憲謀逆遣孝伯召憲入遂誅之隋高祖禪位後封宇文忻爲杞國公帝嘗欲令忻率兵擊突厥高熲言於帝曰忻有異志不可委以大兵乃止忻既佐命功臣熲屢經將領有威名於當世帝繇是㣲忌焉以譴去官楊素爲尚書左僕射貴寵日隆朝臣莫不畏附唯兵部尚書栁述以帝壻之重數於帝前面折素大理卿梁毘抗表言素作威作福高祖漸踈忌之後因出勑曰僕射國家之宰輔不可躬親細務但三日一度向省評論大事外示優崇實奪之權也終仁壽之末不復通判省事帝天性沉猜素無學術好爲小數不逹大體故忠臣義士莫得盡心竭辭其草創元勲及有功諸將誅夷罪退罕有存者王雄爲右衞大將軍參預朝政貴寵冠絶一時與高熲虞慶則蘇威稱爲四貴帝惡其得衆陰忌之不欲其典兵焉乃册爲司空亦外示優崇實奪其權也雄無職務乃閉門不通賔客薛道衡爲内史侍郎上儀同三司仁壽中楊素專掌朝政道衡與素善高祖不欲道衡久知機宻因命檢校司徒總管道衡久䝉驅䇿一旦違離不勝悲戀言之哽噎帝愴然改容曰爾光陰晩暮侍奉誠勞朕欲令爾將攝兼撫萌俗今爾之去朕如斷一臂於是賚物三百段九環金帶并時服一襲馬十疋慰勉遣之後爲畨州刺史上表求致仕煬帝謂内史侍郎虞基曰道衡將至當以秘書監待之道衡既至上高祖文皇帝頌帝覽之不恱顧謂蘇威曰道衡致美先朝此魚藻之義也於是拜司𨽻大夫將置之罪道衡不悟司𨽻刺史房彦謙素相善知必及禍勸之杜絶賔客卑辭下氣而道衡不能用㑹議新令久不能决道衡謂朝士曰向使髙熲不死令决當久行有人奏之帝怒曰汝憶高熲耶付執法者勘之道衡自以非大過促憲司早斷暨於奏日冀帝赦之勅家人具饌以備賔客來候者及奏帝令自盡道衡殊不意未能引决憲司重奏縊而殺之妻子徙且末時年七十天下寃之煬帝即位初楊素爲僕射素雖有建立之策及平楊諒之功然特爲帝所猜忌外示殊禮内情甚薄太史言隋分野有大䘮因改封於楚與隋同分欲以厭當之素寢疾之日帝每令名醫診候賜以上藥然宻問醫人甞恐不死竇杭爲幽州總管時漢王諒之作亂也煬帝將發幽州兵以討之時帝恐杭有貳心問可任者於楊素時李子雄爲江州刺史坐事免素進子雄授大將軍元善爲國子祭酒以高熲有宰相之具嘗言於帝帝初然之及熲得罪帝以善之言爲熲㳺說深責望之善憂懼先患消渇於是疾動而卒蕭琮梁蕭詧之後雖復羈旅見豪貴無所降下嘗與賀若弼深相友善弼既被誅復有童謠言其復起煬帝繇是忌之遂徙其家未幾而卒宇文㢸爲禮部尚書以才能著稱煬帝頗忌之時帝漸好聲色尤勤遠畧㢸謂高熲曰昔周天元好聲色而國亡以今方之不亦過乎又言長城之役幸非急務有人奏之竟坐誅死天下寃之李敏娶周樂平公主女宇文氏爲光禄大夫大業十年煬帝復征遼東遣敏於黎陽督運時或言敏一名洪兒帝疑洪字當䜟嘗面告之冀其引决敏繇是大懼數與李渾及渾兄子善衡等屏人私語宇文述知而奏之竟與渾同誅年三十九其妻宇文氏後數月亦賜鴆而終庾質爲太史令煬帝性多忌刻齊王暕亦被猜嫌質子儉時爲齊王屬帝謂質曰汝不能一心事我乃使兒事齊王何向背如此邪質曰臣事陛下子事齊王實是一心不敢有二帝怒不解繇是出爲合水令元𢎞嗣爲金紫光禄大夫大業中煬帝復征遼東㑹奴賊冦隴右詔𢎞嗣擊之及楊𤣥感作亂逼東都𢎞嗣屯兵安定或告之謀應𤣥感者代王遣執之送行在所以無反行當釋帝疑不解除名徙日南道死楊注大業中爲銀青光禄大夫及楊𤣥感反河南贊持裴𢎞策出師禦之戰不利𢎞策出還遇注而屏人交語既而留守樊子葢斬𢎞策以狀奏注帝疑之出爲梁郡通守樊子葢大業十一年從駕汾陽宫至于雁門車駕爲突厥所圍欲潰而出子葢諫曰萬乘主豈宜輕脫望躬親出慰撫厚爲勲格人心自奮不足爲憂帝從之其後援兵稍至虜乃引去納言蘇威追論勲格太重宜在斟酌子葢執奏不宜失信帝曰公欲收物情耶子葢黙然不敢對魚俱羅爲碣石道將軍征高麗還江南劉元進作亂詔俱羅將兵向㑹稽諸郡逐捕之于時百姓思亂從盗如市俱羅擊賊帥來燮管崇等無不㨗然賊勢浸盛散而復聚俱羅度賊非嵗月可平諸子並在京雒又見天下漸亂終恐道路隔絶於時東都饑饉榖食湧貴俱羅遣家僕將船米至東都糶之益市財貨潛迎諸子朝廷微知之恐其有異志發使案驗使者至前後察問不得其罪帝復令大理司直梁敬眞就鏁將詣東都俱羅相表異人目有重瞳陰爲帝之所忌敬眞希㫖奏俱羅師徒敗衂於是斬於東都市家口籍没唐太宗貞觀中李君羡爲左驍衞大將軍武昌郡公貞觀中有謠言當有女主王天下太宗惡之後當宴三品已上遣作酒令仍各稱其小名君羡自稱小名五娘子太宗愕然因大笑曰何物女子如此勇猛其後竟以事誅之至天授中則天復其官爵魏徵爲特進知門下省事嘗宻薦中書侍郎杜正倫及吏部尚書侯君集有宰相之材徵卒後正倫以罪黜君集犯逆伏誅太宗始疑徵阿黨徵又自録前後諫諍言詞往復以示史官起居郎禇遂良太宗知之愈不悅先許以衡山公主降其長子叔玉於是手詔停婚顧其家漸衰矣德宗時嚴震爲山南西道節度使帝忽遽行幸梁州山南地素貧褊又遭連山賊剽䘐之後雖云十五州之地其寔未敵江南三數縣户口震悉心供應人既不擾事亦不闕然累奏百姓困竭須使支持帝以爲結恩於百姓也嚴懷志以涇原禆將隨渾瑊會吐蕃背盟懷志等䧟没居吐蕃中十餘年逃入吐蕃以西諸國為所掠賣又脫走經十餘國至天竺占波國泛海而歸貞元十四年始至温州徵詣京師德宗以懷志處蕃久不欲令出外囚之仗内順宗即位始釋之初懷志之䧟父母俱存及歸父母皆殁妻嫁佗人吕温者以小吏事崔漢衡貞元初吐蕃背盟漢衡爲吐蕃所虜將殺之温趨往以背受刅吐蕃義之繇是與漢衡俱免及漢衡歸獨留蕃中吐蕃尚浮屠法温因求爲僧久之乃得歸亦以習吐蕃事囚焉順宗即位釋之與嚴懷志俱授中郎將憲宗元和十二年淮西平十三年襄陽節度使李愬奏請判官大將已下官凡一百五十員帝不悅謂裴度曰李愬誠有竒功然奏請過多使李晟渾瑊之勲業又何如哉遂留中不下後唐莊宗在鄴時明宗爲相州刺史天祐十三年滄州小校毛璋以城歸欵莊宗命明宗率師至滄州慰撫軍民明宗既至毛璋開門迎謁遣璋入覲軍城乂安時書吏誤爲申狀云某已至滄州禮上畢莊宗覽狀大怒曰諱諱明宗名反邪時末帝掌莊宗親軍在帳下顧謂末帝曰爾父固予所悉此葢王建立安重誨戲予斬二僕之首而還末帝惶恐既而明宗旋師行臺斬其書吏謝之乃移安國軍節度使李存審鎮滄州承制授明宗安國軍節度邢洺磁等州觀察處置等使安金全爲朔州刺史事莊宗爲騎將莊宗神勇冠世而性忌不欲臣下勝已故金全與王建及位不踰刺史多稱疾以避禍愍帝應順元年正月以内皇城使安重益爲陳州刺史去冬秦王之釁重益將騎追王至府廨出之伏下害之至是帝心惡之不欲在左右仍令典方州三月遣供奉官王廷悅劉贊各以玉帶金錯刀賜秦州張延朗興元張䖍劉竺帥各進潞王書疑其兩端故有是賜無斷傳曰惡惡而不能去善善而不能用此優㳺不斷之謂也自漢而下居民上者或失於剛克之訓存夫兼容之道淑慝斯混失於洞分幾微有初闇於先見不能斥去邪說割絶私愛念宗社之大計思邦國之永圖而乃牽於文義制於近習惑於衆多之說迫於權倖之勢以至猶豫靡决禍釁旋搆噬臍無及發矢莫進葢夫當斷不斷其爲害大矣誠方策之深戒焉漢元帝時蕭望之死擢周堪爲光禄勲堪弟子張猛爲光禄大夫給事中大見信任𢎞恭石顯憚之堪性公方自見孤立遂直道而不曲是嵗夏寒日清無光恭顯及許史皆言堪猛用事之咎帝内重堪又患衆口之浸潤無所取信時長安令楊興以材能幸常稱譽堪帝欲以爲助乃見問興朝臣齗齗不可光禄勲何邪齗齗忿嫉之意也齗音牛斤切興者傾巧士謂帝疑堪因順㫖曰堪非獨不可於朝廷自州里亦不可也臣見衆人聞堪前與劉更生等謀毁骨肉以爲當誅故臣前言堪不可誅傷爲國養恩也帝曰然此何罪而當誅今宜奈何興曰愚以爲可賜爵闗内侯食邑三百户勿令典事明主不失師傅之恩此最策之得者也帝於是疑㑹城門校尉諸葛豐亦言堪猛短帝因發怒免豐帝又曰豐言堪猛貞信不立朕閔而不治又惜其材能未有所效其左遷堪爲河東太守猛槐里令顯等專權日甚帝牽制文義優游不斷爲文義所牽制故不斷孝宣之業衰焉成帝時大將軍王鳳用事會日蝕京兆尹王章素剛直敢言乃奏封事請退鳳章每召見帝輒辟左右辟讀曰闢時太后從弟長樂衞尉𢎞子侍中音𢎞者太后之叔父也音則從父弟獨側聽具知章言以語鳳鳳聞之稱病出就第上䟽乞骸骨謝帝曰臣材駑愚戅得以外屬兄弟七人封爲列侯宗族䝉恩賞賜無量輔政出入七年國家委任臣鳳所言輒聽薦士常用無一功善隂陽不調災異數見咎在臣鳳奉職無狀此臣一當退也五經傳記師所誦說咸以日蝕之咎在於大臣非其人易曰折其右肱豐卦九三爻辭也肱臂也此臣二當退也河平以來臣久病連年數出外曠職素餐此臣三當退也空廢職任徒受禄秩也陛下以皇太后故不忍誅廢臣猶自知當遠流放又重自念重音直用切兄弟宗族所䝉不測當殺身靡骨死輦轂下靡碎也音武皮切不當以無益之故有離寢門之心誠嵗餘以來所苦加侵誠實也日月益甚不勝大願願乞骸骨歸自治養兾頼陛下神靈未埋髪齒朞月之間幸得瘳愈復望帷幄不然必寘溝壑臣以非材見私天下知臣受恩深也以病得全骸骨歸天下知臣被恩見哀重巍巍也巍巍高貌重音直用切進退於國爲厚萬無纎介之議論者不云䟽斥外戚也唯陛下哀憐其辭指甚哀太后聞之爲垂涕不御食帝少而親倚鳳弗忍廢乃報鳳曰朕秉事不明政事多闕故天變婁臻咸在朕躬婁古屢字將軍乃深引過自予欲乞骸骨而退則朕將何嚮焉書不云乎公母困我周書雒誥載成王告周公辭也言公必須留京師母得逺去而令我困務專精神安心自持期於亟瘳稱朕意焉亟急瘳差也於是鳳起視事帝使尚書劾奏章死獄中自是公卿見鳳側目而視晉武帝知太子即惠帝也弗克負荷然恃皇孫聰睿故無廢立之心復慮非賈后所生終致危敗時朝廷咸知不堪政事帝亦疑焉嘗悉召東宫官屬使以尚書事令太子决之太子不能對賈妃遣左右代對多引古義給使張泓曰太子不學陛下所知今宜以事斷不可引書妃從之泓乃具草令太子書之帝覽而大悅太子遂安又賈充既爲帝所遇欲專名勢而庾純張華温顒向秀和嶠之徒皆與任愷善楊珧王恂華廣等充所親敬於是朋黨紛然帝知之召充愷宴於式乾殿而謂充等曰朝廷宜一大臣當和充愷各拜謝而罷既而充愷等以帝知之而不責結怨愈深惠帝居大位政出羣下紀綱大壞貨賂公行勢位之家以貴凌物忠賢路絶䜛邪得志更相薦舉天下謂之互市焉賈后將誅楊駿段廣跪而言於帝曰楊駿受恩先帝竭心輔政且孤公無子豈有反理願陛下審之帝不答孝武帝時會稽王道子荒恣愽平令吳興聞人奭上䟽陳之帝益不平而逼於太妃無所廢黜乃出王恭爲兖州殷仲堪爲荆州王恂爲僕射王雅爲太子少傅以張王室而潛制道子也道子復委任王緒繇是朋黨競扇友愛道盡太妃每和解之而道子不能改中書郎徐邈以國之至親唯道子而已宜在敦穆從容言於帝曰昔漢文明主猶悔淮南世祖聰逹負愧齊王兄弟之際實宜深愼帝納之復委任道子如初隋煬帝時趙才爲右侯衞大將軍帝幸江都待遇踰昵時江都糧盡將士離心内史侍郎虞世基秘書監袁充等多勸帝幸丹陽帝廷議其事才極陳入京之策世基盛言渡江之便帝黙然無言才與世基相忿而出唐高祖時太子建成令楊文幹起兵及高祖馳使召太宗以謀之太宗曰文幹小䜿狂悖起兵州府官司已應擒勦縱其假息時刻但須遣一將耳高祖曰文幹事連建成恐應之者衆汝宜自行還立汝爲太子吾不能效隋文帝誅殺骨肉廢建成封作蜀王地既僻小易制若不能事汝亦易取耳太宗既行元吉及四妃更爲建成内請封倫又外爲遊說高祖意便頓改遂寢不行復令建成還京居守唯責以兄弟不能相容歸罪於中允王珪左衞率韋挺及天䇿兵曹杜淹等並流之巂州後太宗宴於建成宫中毒高祖乃謂太宗曰發跡晉陽本是汝計尅平宇内是汝大功欲升儲位汝固讓不受以成美志建成自居東宫多歴年所今復不忍奪之觀汝兄弟終是不和同在京邑必有忿競汝還行臺居於雒陽自陜已東悉宜主之仍令汝建天子旌旗如梁孝王故事太宗泣而奏曰今日之授實非所願不能遠離膝下言訖嗚咽悲不自勝高祖曰昔陸賈漢臣尚有遞過之事况吾四方之主天下爲家東西兩宫塗路咫尺憶汝即往無勞悲也及將行建成元吉相與謀曰秦王今往雒陽既得土地甲兵必爲後患留在京師制之一匹夫耳宻令數人上封事曰秦王左右多是東人聞往雒陽非常欣躍觀其情狀自今一去不作來意高祖於是遂停𤣥宗天寶十四載時肅宗爲皇太子安禄山至雒陽有詔以太子監國召宰臣楊國忠韋見素謂之曰皇太子仁孝朕尋欲傳以大位今遇冦難委之監國正副朕懷事寧之後朕當高枕耳帝往在東宫恭謹仁孝日聞於外百姓思傳寶位十餘年矣及下詔之日國人相賀楊國忠專宰朝政禄山反以誅國忠爲名盛言國忠虢國夫人罪惡六軍將士皆切齒願除其黨以解國難國忠大懼聚族而哭入而號訴於貴妃妃悲號銜土請命於𤣥宗翼日有司進儀注遂寢而不行天下失望代宗時李栖筠爲御史大夫時元載專政栖筠正身守道無所畏懼垂入相者數四帝憚載有内外之助竟不能决猶是依違累年竟以憂憤遘疾薨海内痛惜之德宗建中四年十月在奉天靈武留後杜希全鹽州刺史戴休顔夏州刺史時常春合率兵六千赴難將至帝召宰相盧杞闗播與白志貞渾瑊同議來路利害杞與志貞以漠谷路爲便瑊曰漠谷險隘必為賊所邀不若取乾陵北過附栢城守固而行便取城東北雞子堆下與城中犄角相應且分賊勢朱泚必不敢更於陵寢往來杞曰漠谷路近若慮逆賊邀擊即此出兵應接更取乾陵路過恐驚陵寢瑊曰今朱泚圍城斬伐松栢以夜繼日驚動多矣况又城中事危諸道救兵不至唯希全等率先赴難所繫不輕若此軍得於雞子堆下營固守善地則朱泚可以計破杞曰陛下以順討逆豈同逆賊乎若令希全等北來即是自驚陵寢白志貞後賛其言帝重違之遂命取漠谷路景子希全等軍至漢谷路果爲逆賊邀擊奪據水口乘高以大弩巨石左右夾擊殺傷頗甚文宗開成三年正月五日宰相李石自親仁里將曙入朝盗發於故郭尚父宅引弓射石矢纔破膚馬逸而廻盗伏坊門揮刀斫石斷馬尾竟以馬逸得還私第帝聞之駭愕遣中使撫問賜金瘡藥因差六軍兵士二十人衞從是日京師大恐常㕘官入朝者九人而已旬日方安石拜章辭位者三乃授荆南節度使李訓之亂起石於常僚之中付之衡柄石忘身徇國不顧患難振舉朝綱國威再復而中官仇士良切齒惡之伏戎加害帝深知其故不能理乃至罷免及石赴鎭賜宴之儀並闕人士傷之恥君子之道消也後唐莊宗同光二年中書奏曰諸道節度防禦刺史各著功名並全忠孝洎䝉昇奬皆荷渥恩雖萌爲治之心未展分憂之効况聞藩府不可以久虚侯伯不可以久缺藩府虚則兵不輯侯伯缺則化不行繇此觀之爲務甚急請令歸本任不奉詔㫖不得輒離治所從之是時諸藩府連帥或屯師于邉或在闕下皆遣人權典後事人望既卑法多掊歛時議甚危之宰相故有是奏帝雖依允終却遲留及後王室危難釁起鄴都率繇此也四年三月壬戍宰相豆盧革率百官上表請出内府財帛勞軍以軍情有變故也其辭畧云臣竊知内府所積有餘租庸贍軍不足今内外諸軍室家不能相保儻非此時安䘏臣懼人心離合表奏不報時知星者上言昨夜惡星入大庫宜散帑藏以給三軍又奏流星犯天棓主御前有急兵宜爲之備帝召宰臣於便殿劉皇后出宫中粧奩銀盆各二并皇子滿喜等三人謂宰臣曰外人不知謂内庫金寶無數諸道所進旋以給賜今宫中有者即粧奩嬰孺而已可市之贍軍革等惶恐而退時出錢帛給賜諸軍樞宻使張居翰宣徽使馬紹宏唐王供奉内使景進各獻錢幣數千以助賞軍是時編甿饑饉軍士之家乏食連營婦女掇蔬於野衞軍日望頒給復怨租庸刻削月糧諸軍騰口流言不息宰臣延英奏對每請出内府財以給諸軍帝將行之尋爲劉后所沮而止既而鄴城變擾軍人幸其揺動縱行優賞不滿其心至是積錢帛金銀賜之軍士負物而詬曰吾妻子已殍方與賞錢兾吾陳力一何謬也議者聞之知禍亂旦夕矣閔帝時朱洪實與康義誠有隙應順元年潞王據岐陽將稱兵向闕二月辛酉義誠將議出征閔帝幸左藏庫親給軍士錢帛是日義誠與洪實同於庫中面論用兵利害洪實言自出軍討逆累發兵師今聞小衂無一人一騎來者不如以禁軍據門自固彼安敢徑來然後徐圖進取全䇿也義誠怒曰若如此言洪實反矣洪寔曰公自惟誰反其聲漸厲帝聞召而訊之洪實猶理前謀又曰義誠言臣圖反據發兵計義誠反必矣閔帝不能明辨命斬洪實既而義誠果以禁軍迎降潞王廢帝清泰元年六月三司使劉昫上言天下州郡於天成二年括定稅率迨今八年近有民於本道及詣闕訴田不均乞簡視累行蠲放漸失賦租請朝臣中選清强廵行簡視從之昫奉詔便欲曉諭樞宻使韓昭裔言俟更詳議其事不報帝猶豫少决皆此類也册府元龜卷一百八十一
