body:
  text: 册府元龜卷五百九十六宋王欽若等撰掌禮部諡法希㫖繆妄諡法第二唐鄭珣瑜為相卒贈尚書右僕射太常博士徐復議請謚文獻兵部侍郎李巽駁曰夫謚所以昭德德既昭矣則文無以加焉故相國鄭公端操持立寡言慎行及居台司有蠲逋恤人之美有知難不汙之節雖無文若之進拔無孟子之是非無賑施之仁無謇諤之義然足以稱賢相也夫文者大則經緯天地次則潤色王猷周文以至德為西伯季孫以道事其主咸謚曰文為美無以尚矣亦焉用兩字然後為備哉竊觀兩字之謚或有兼德一字不足以盡盛德之形容故有兩字生焉然亦興於近古非三代兩漢之事也夫舉典之道信其正不信其邢春秋大㫖也則兩字之謚非春秋之正也故相國鄭公之謚為文足矣焉用獻哉為獻可矣焉用文哉兩字兼謚切所未諭請下太常重議太常博士徐復議曰鄭珣瑜令德清規坐鎮風俗理人而善政浹洽作相而謀猷密勿其終始事跡當時罕儔所以表賢易名實曰文獻夫文者煥乎大行獻者軒然髙名今而褒之厥有經義亦猶貞惠文子累數其功至於再三以勸事君者今奉駁議議其無進拔無是非無賑施無謇諤且曰二字之謚非三代兩漢事愚以為巽之駁所謂進拔者豈不推擇羣萃致之於庭乎珣瑜往司銓衡暨當鈞軸流品式敘英髦在朝若無奨拔之明則何以至此但如來議寡言慎行故其端兆不可得而窺也當先朝之日上體不平姦臣王叔文招權作朋将害於國其視丞相如無也輕詣相府不循舊章珣瑜意雖難誅力固不足移疾髙謝萬情所歸則是非之明孰大於此夫所謂賑施者在禮家施不及國賢人君子廣闕為心莫不開稱物之源布厚生之政曩者恤災患免逋租亦既當之矣其於篤親庇族衣無常主踐名教者誰則不行若以分孤寡之資同於賑施則珣瑜所羞言也奚謂無哉至如謇謇匪躬前議已書其微婉矣既承髙論敢不指明德宗季年李實為京兆尹殊恩晝接貴幸無比而實以羡餘稱代莫之敢非珣瑜衆詰所繇上陳利害且曰取於人而未讐其直焉得有餘是其言不可謂之無謇諤矣伏以國朝宰輔謚文而兼字者代有人焉故房𤣥齡謚曰文昭狄仁傑謚曰文惠魏徴陸象先蘇瓌宋璟張説崔祐甫竝謚曰文貞劉仁軌劉幽求姚元崇裴耀卿張九齡竝謚曰文獻李元紘韓休竝曰文忠薛元超曰文懿盧懐慎曰文成蘇頲曰文憲楊綰曰文簡其餘不可悉數若以文包美不宜以他字配之則房𤣥齡狄仁傑以䧏昭惠貞獻忠懿成簡皆不得正矣我唐聲名文物二百年更閲羣才發揮王度豈擬名之典獨未得中邪不然何輕沮之為駁正所設但當論謚之當否不宜詰字之多少茍有不當雖一字可乎若皆允宜雖二字何害如韋巨源附㑹凶黨李北海奪其嘉名所言至公人則悦服今既曰賢相而又非之君子於其言豈得茍而已乎若曰二字非三代兩漢之規則又異乎愚所學者矣夫威烈慎靚周王之文謚也文修文成漢祖之佐命也霍光為宣成孔光為宣烈中代之勲德也劉寛為昭烈楊賜為文烈東都之鼎臣也安謂其無二字哉况文之為名其義多矣有經緯天地焉有忠信節禮焉有寛立不懾堅强不暴焉有敏而好學不恥下問焉夫匪一端各有所當若皆西伯季孫之德然後可稱文則魯侯與文伯歜之類皆不為文矣故誄謚之制因時旌别前狀議珣瑜之行曰為一代之名臣斯其㫖歟謹上採禮經旁觀舊史叅諸國典以定二名請依前謚曰文獻兵部侍郎李巽再議曰鄭珣瑜兩字之謚今太常請依前謚曰文獻者夫謚者春秋褒貶之㫖也仲尼書法隨類推廣雖一字褒貶其文猶博盖欲指明事業以昭示後代俾後之人懲其惡而勸其善政不可苟夫謚一字正也堯舜禹湯周公邵公是也兩字非正也故謚法不載或人臣不守彛章茍逞異端威烈慎靚是也或時主之權以功德加厚於臣也蕭何霍光房𤣥齡魏徴是也不加而加僭也孔光劉寛薛元超李元紘是也三字過也貞惠文子是也亦謚法所不載也古今無有也公叔文子謚衞君之過也衞之亂制也不然則記之失也以一善加一字即堯舜禹湯當累數十字以為謚也夫禮記者非盡聖賢之意也非盡宣尼所述也當時雜記也昔后蒼為曲䑓記其弟子戴聖増損刋定為小戴禮今禮記是也若盡宣尼所述即戴聖豈得而増也昔宣尼修春秋游夏不能措一詞以知禮記非盡宣尼所述故戴聖得以増損也則貞惠文子之謚衞君亂制也古今無有也非宣尼所述又何足法哉鄭珣瑜和茂修整始終無缺可謂美矣至於議行考功而度越等輩比於鄭文成梁文昭魏文貞則不侔而謚號無差輕用國典失春秋之㫖矣向者鄭梁數公皆經綸草昧輔翼興王以道輔君致於化洽彰灼千古言之者凛然生敬而以珣瑜齒之豈無愧於心哉夫數公者皆時王感風雲之㑹懐謨明之美故加於常典以明其行亦所以篤君臣之義也然非正也權制也若後之人非數賢之比則當循常以避數賢地也其劉仁軌薛元超李元紘等加字之謚皆黷國典而昧彞倫言之可為寒心豈當舉之為訓也其餘姚元崇宋璟劉幽求或輔相一代致理平之化或忘身狥難成中興之業又豈珣瑜之比以典選為進善以辭疾為嫉邪皆尚口為辨非守典確論也夫以典選者皆為進善邪若然者則國家有天下二百年何裴行儉馬戴盧從愿等數賢獨見稱於時也循資置署謂為進善異乎余所聞也又珣瑜之病數月而終豈偽疾邪借使偽疾尤可怪也昔子路之冗食家臣尤殺身徇難而珣瑜履台輔之重當危難之際居平則享其髙爵厚祿見危則奉身自保以此為是非之明即董狐之書趙盾為妄作也珣瑜之辭可質於太常舉以為德信君臣之義非常人所知也珣瑜之下詰李實誠中其病可謂美矣然則珣瑜自始筮仕至於啟手足垂四十年厯諫職持風憲特中規激發恐有過此者今太常舉其下詰李實未為多也謂為謇諤者衆豈能使汲黯魏徴有慙色哉前巽議云三代兩漢無二字之謚此未學之過也無荀令君之進善無孟軻之是非無文子之賑施無周舍之謇諤以珣瑜之行清而無缺可謂掩之不足辨也今所議兩字之謚亦又不當其議固不足斥也前巽之言過也但兩字之謚加等之美以蕭何房𤣥齡言不在珣瑜也巽雖不敏至於言美謚以惑人聽此當所激切而不平也終不欲有僭齒於蕭何房𤣥齡之宗不欲有造次擬於魏文貞姚元崇宋璟劉幽求之讜言悟主茂績殊勲也夫前車之覆後車所以易轍也前有司之失後有司則當以矯之也不矯則逶迤遂逺以至於亂制也此有國之誡也威烈慎靚孔光劉寛薛元超李元紘之同於禹湯文武蕭何霍光房𤣥齡魏徴前有司之過也後之專筆削則宜有以矯之典禮寖亂矣有司不可以尤而効之也不可黨所見而遂僣典也鄭珣瑜兩字之謚請下太常重議若一字不足盡珣瑜之盛德必須兩字則敢候再告敬從復議謚文獻元載為中書侍郎同中書門下平章事誅死太常博士崔韶請謚曰荒左司郎中韋孔景請下太常重議博士王炎改謚成縱二議交持故事不行爾後太常王彦威議曰元載謚成則不得為縱縱則不得為成成縱竝施美惡齊致考之常法實不通經夫蕭瑀謚貞詔命加褊事出恩制不可擬據依爾後崔韶以平厲謚楊炎以壯繆易伊慎此皆惑於貞褊混淆不可之文詳在駁議今明其説恐悞後來事寢不報王士貞為成德軍節度使卒以其子承宗不順不加謚太常博士馮宿以為懐柔之議不可遺其忠勞遂加之美謚李吉甫為宰相薨太常謚為恭懿博士尉遲汾請為敬度支郎中張仲方駁議曰古者易名請謚禮之典也處大位者取其巨節蔑諸細行垂範當代昭示後人然後書之垂於不朽善惡不可以誣故稱一字則至明矣定褒貶是非之宜冺同異紛綸之論贈司徒吉甫禀氣全才乗時佐雒博涉多藝含章炳文爕賛陰陽經緯邦國惜乎通敏資性便媚取容故載踐樞衡叠致台衮大權在已沉謀罕成好惡狥情輕脱寡信諂淚在險遇便則流巧言如簧應機必發夫人臣之翼戴元后者端恪致治孜孜夙夜緝熙庶績平章百揆兵者凶器不可從我始及乎伐罪則料敵以成功至使内有害輔臣之盗外有懐毒蠆之孽師徒暴野戎馬生郊皇上旰食宵衣公卿大夫且慙且恥農人不得在畆績婦不得在桑耗賦斂之常貲散帑廪之中積徴邊徼之備遏運輓之勞僵尸流血胔骼成岳毒痛之病號訴無辜勦絶羣生迨今四載禍胎之兆實始其謀遺君父之憂而豈謂之先覺者乎夫論大功者不可以妄取不可以枉致為資畫著體理不顯不競而豈妨令美當削平西蜀乃言語從侍之臣擒翦東呉則訏謨廊廟之輔較其功則有異言其力則不倫何捨其所重而録其所輕收其所小而畧其所大且奢靡是嗜而曰愛人以儉受授無守而曰慎才以輔斥諫諍之士於外豈不近之蔽聰也舉忠烈之廟豈不近之匿愛也焉有蔽聰匿愛家範無制而垂法作程憲章百度乎謹案謚法曰敬者夙夜警戒敬以直内内而不肅何以刑外憲也者刑也法也戴記曰憲章文武又發慮憲義以為敬恪終始載考厯位未嘗劾一法官讞一小獄及居重位以安和平易寛柔自處考其名與其行不類研其事與其道不侔一定之辭惟精惟審異日詳制貽諸史官請俟蔡冦将平天下無事然後都堂聚議亦未遲憲宗方用兵惡仲方深言其事怒甚貶為遂州司馬賜謚曰忠于頔薨贈太子賔客太常博士王彦威議曰于頔剛毅特立博游文藝蘊開物成務之志為從横倜儻之才刺湖州復南朝舊陂以溉人田由是舄鹵生稻梁嵗時大化得丁壯之物籍者取什一代貧人租入故輕重以濟江南卑濕送終者無懸窆封樹之制髙不可隠深則及泉土纔周棺水至露胔頔悉命以官地收瘞當時稱之為蘇州則繕完隄防疏鑿畎澮列樹以表道决水以溉田其為襄陽當吳少誠弄兵王師有征軍不乏見糧師未嘗退表尅吳房朗山生得賊将遽以兵柄授之推誠於人有古将畧然惜其不能善終如始奉初以還跋扈立名滿盈不戒則有司擬議之際安可不善善而惡惡哉元洪刺郡以官事被謫中貴人衘命部領便道之徙所路出于漢頔遽命武士持刃捕捽洪既就執王人徒歸又不奉詔出師而西停於鄧軍聲甚雄人聽日駭夫師出以律其出不命時人不能識其指歸王者功成而作樂諸侯則否頔之反斾於蔡也作文武順聖樂貞元御㝢務求寵綏有司請編優詔莫逆事岀一時之澤樂作諸侯之庭良可惜哉然則如頔者是知樂之可作而不知禮之不可作者也迹其馭衆為政之術盖初以利興害去為己任而令行禁止其源出於法家者流文深意苛有犯無捨至有屋誅同命之慘然未嘗别白其罪以示顯戮人到於今而寃之洎乎天姻下浹元侯入覲朝廷申婚姻之好復以宰相待之則文子罪官輅而連起國獄縉紳之論浸益非之謹按謚法殺戮不辜曰厲愎狠遂過曰厲請謚為厲或曰太保繇文學政事而敭厯中外卒當登壇補衮之寄推於事任亦謂難能則易其名者宜兼舉美惡二字以正褒貶今特謚為厲或有未安愚以為不然夫類能而授聖王之勸勉議謚貴當有司之職分禮經言謚盖節以一惠至於論譔之際要當美惡咸在細大無遺議平遁名則以優迹春秋議也况援其功不足以補過挈其美不足以掩瑕其馭下也任威少恩其事上也失忠與敬謚之為厲不亦宜乎勅賜謚曰思而尚書右丞相張正甫封勅䟽奏不答留中不下然賜謚勅封在都省亦不下至明年張正甫改為同州刺史所封勅取中書門下處分宰相令都省収管竟不施行太常博士王彦威又上表云聞古之聖王立謚法之意所以彰善惡垂勸戒使一字之褒寵逾紱冕之錫片言之貶辱過市朝之刑此邦家之禮典而陛下勸懲之大柄也伏以故太子賔客致仕于頔頃擁節旄恣行暴虐人神所怒法令不容擅舉全師僭作王樂侵辱中使擒止制囚殺戮不辜誅求無度故以定謚為厲今陛下不忍改賜曰思誠為聖慈實害聖政伏以陛下自臨宸極懋建大中聞善若驚從諫不倦况當統天立極之始所謂執法慎名之時一垂恩光盡望僥倖且如頔之不法不道而陛下不忍焉臣恐将來不逞之徒不法不道必有如頔者衆矣此其謚也則又引頔為例則陛下何以處之是恩發於前而弊生於後矣又臣此見長藩鎮服大僚者率多驕淫不道誅求自封貨足以藩身威足以鉗口而法吏顧望自愛或不能度紏天刑生前網已漏鯨没後賜而就木若以李吉甫近常謚引之則吉甫之相也豈犯上殺人乎以頔况之恐非倫比如或以頔嘗入錢助國改過求覲兩使蕃國可以贖論夫傷財而害人剥下以奉上進家財以求幸尤不可長焉自兩河宿兵垂七十年王師譓征瘡疾不絶其後張茂昭以易定來程權以滄景來故國家髙爵以勸或臣申恩以徯來者而襄陽名鎮也于頔文吏也居肘腋之下有崛强之名錫之姻親始修覲禮豈可持此况彼而以朝覲為功乎若然者則頔雖有游夏文學龔黄政令班超之絶漢匪躬卜式之持錢助國終恐不足以彌縫惡迹降减罪名伏惟陛下以至聖至明之姿用無偏無頗之道恩繇義斷政以禮成使褒貶道存僥倖路絶則天下幸甚右補闕髙錢上䟽曰夫謚者所以懲惡勸善激濁揚清使忠臣義士知勸亂臣賊子畏罪忠臣義士雖受屈於生前死獲美名亂臣賊子雖竊位於當時没加惡謚者所以懲暴戾垂沮勸孔子修春秋亂臣賊子懼盖為此也垂範如此尚不能救况又隳其典法乎臣風聞此事是徐泗節度使李愬奏謁李愬勲臣節将陛下寵其勲勞賜其爵祿車服第宅則可若亂朝廷典法将何以沮勸仲尼曰惟名與器不以假人名器君子所司也若以假人是與之政也政亡則國家從之矣于頔頃鎮襄漢殺戮不辜恣行凶暴移軍襄鄧廹脇朝廷擅留逐臣邀遮天使當先帝嗣位之始貴安反側以靖四方幸免鈇鉞之誅得全腰領而斃誠宜謚為繆厲以沮凶邪豈特加美名以惠奸惡如此則是于頔生為奸臣死獲美謚竊恐天下有識之士以為聖朝無人有此倒置伏請速追前詔却依太常謚為厲使典法無虧國章不紊杜佑卒贈太傅太常博士柳應規謚忠簡太嘗博士尉遲汾又議曰佑之寛容得衆全和葆光不病於物類其能考終得不為寛容乎和好不争自卑上而極重任一心於理以惠物潔行㢘正人無尤怨得不為一德不懈乎請謚為安簡范希朝卒贈太師太常博士馮定請謚忠武禮部員外郎王源中駁請下太常重定太常請如前謚忠武王源中重駁博士王塾改謚宣馬暢卒贈工部尚書太常博士林寶議謚曰敬工部郎中崔備駁議曰謹按謚法敬字之義與馬暢始終名跡不同考行之義尚乖易名之典未正事須再牒禮院請重議者且以暢墳土猶濕物議尚存皆可徴言盡堪覆視在春秋隠惡之義可也加史册虚美之命難乎况尚書責實當究是非易名宜存褒貶夫國之禮法懸在不刋而文士多病於愧詞史臣或許其使傳舊章既失後代何觀雖以禮之愛久無而亂名之責豈絶幸稽前士用示後人其馬暢所謚為敬請更叅議尚書兵部員外郎韋奕駁曰太常考馬暢之行舉夙夜就事㢘方徑正之敬以易其名異乎無所苟於言也比建中興元間暢以父有征討之勲推恩而授爵位父薨家富於財以酒色自娛貞元中嘗傾産交中官因獻田宅以求幸德宗薄其人而終不信用生前與孤姪寡嫂分居競財醜聲聞於時殁後使孽子孀妻披姦抉私公言盈於庭此皆章著於視聽者可以謚為敬乎議者云先司徒之籌畫而暢揣摩者䇿而遺焉暢叅計於閨庭之内苟所言屢中而不可隠當指明其効實而書之俾行道者無所惑不然則莊武公之才略光於典䇿矣而乃飾虚辭以攘其善為子請謚得非繆濫之甚耶又稱名儒端士皆從之游未知孰為其田蘇邪孟軻云尹公他端人也其取友必端矣夫與端士而游乎暢之門况謚法夙夜就事者以其績用已犯非謂其曠日引月以至乎終身也㢘方徑正則暢處已行事未嘗造次而踐其途焉何以謚為敬乎大凡言功伐議德行尊其跡亦以觀善貶其名有以懲惡固非庸者事也如暢之輩烏足以黷典法哉若有司以有為而為之則宜乎貶之例也請下太常重定其謚博士崔韶改謚曰縱議曰馬暢承藉故業厯居通顯家富於財以奢縱自處不能撫安嫂姪使之離拆其干進也赴利如轉圜其居家也操下如束濕故時論鄙之謹案國史宇文士及居家侈縱謚為縱暢之行已同於士及請以縱為謚蒋清為東都採訪判官死祿山之難太和三年考功奏請謚曰初安祿山反清為留守李憕從事與憕盧奕俱死以秩卑當時未行謚典至是其外孫吏部郎中王髙上聞故追謚焉房式卒左㪚騎常侍博士陸亘請謚曰傾吏部郎中韋乾度駁曰詳觀貞元之末西蜀之事逆豎劉闢搆難之初凶邪叶謀噭嘯相聚年深事遠十不記一然而磈磊不平鋒刺釁深者藏在骨髓請舉其梗槩一二焉式自忠州刺史故太師奏授劒南西川度支副使後兼御史中丞又部符蜀州是時貞元十八年也式因晝日昏睡如醉經宿乃寤詳其左右僮僕不知其所從來後逾年却復此職㑹故使太師薨殁劉闢潜扇逆謀禍亂始胎式遂倖姦人之意為譎怪之語謂闢曰乃者蜀州昏病之中見公為上相盧文若為侍郎儀衞甚盛富貴極矣他日無相忘賊聞大喜而蒲軍縣自以為神授非人力也賊每接賔客肆談論撫羣邪申號令也未嘗不以是為先深自以為祥兆也豈不因式作異言鼔妖孽惑亂平人堅壯凶險不然何區區之蜀璅璅之冦王師討伐經費萬計﨑嶇嶮阻留年乃拔何哉盖以式深為浹洽之辭激切嚚固不然何盤柢固根之甚也故使太師永貞元年八月薨其時乾度任殿中侍御史前使支度判官劉闢日攝行軍司馬節度留後九月初乾度被逐攝簡州刺史名雖守郡其實囚之明年四月追廻勒攝成都縣令其時闢授西川節度詔命初下東川之圍未解乃召募亡命兼收管内鎮兵張皇虚聲熒惑郡縣發兵七千馬畜三萬號為十五萬人轉牒盩厔以來縣道郵次酒肉畢具蒭茭無匿署牒首曰闢副曰式叅謀曰符令下之日妖氛坌興下愚沸騰貪冐姦賞奔走叛命肩摩轂擊争死恐後當此之時卭蜀震驚田野廢業竄伏山谷邑居人吏分散道路如此之事非得之於人皆親所聞覩時賊圍逼梓州又王師諸軍稍稍既至猖狂凶冦不復張矣然嘗察式之為人柔而善佞不顧不義不然何劉闢文若喬規符載皆咨諏執禮拳拳以事之以斯而言可以知其所止矣伏以聖上法維天之度崇納汚之德雖泫澤滂流鼔盪昭洗易名之典在正根源茍非其人不可加美如式西蜀之事大節已虧缺矣何面目以求謚焉傾之為謚頗乖前狀請下太常專議太常博士李虞等重議曰式之在西蜀也入人耳目其事熟矣固非愛之者所能粉飾而文其論惡之者所能披抉而裝其説蜀之此時雖女子小人亦知凶闢斷頭之不日然為其用者乃救死於頸語其無勇烈之心斯可矣豈可盡披其附麗之名乎如式之於劉闢既不能死可謂求生害仁者也而駁議曰大節已虧無乃過言歟何從聞之闢之走西山也召所疑畏者十數輩於庭将盡殺之然後去而式在其間頼蒼黄之際闢黨有䕶持者僅免於難推嚮之論則不當如是明矣然居此時有将見危授命之義殺身成仁之道詰之者稱式無愧色愚不信也如是則式之去希烈也理河南也㢘宣城也何以無忠敬之目歟愚論之曰式也不疾任求之目不閉吉邑之口其罪也無王浩棄家之心無譙𤣥受毒之志其罪也如闢之反天子棄墳墓乃日顧式説一夢以結其心署一牒以張其勢豈其然乎夫人臣不幸罹於是惟死而已矣然孟子曰生吾所欲也矧自軻已下哉使死之易則王諒李業虞悝鴻信不足貴也意者将不可以必死望人乎始以不死罪之以懷生貶之是異論也夫謚者易其名者也夫子曰名以出信不曰名之必可言也名不正則言不順以至於刑罰不中正謂此耳夫豈容易哉語曰於其所不知盖闕如也恍惚之夣駁議之外無言者懼非所以昭示後世也臯陶謨曰五刑五用哉言用刑必當其罪也刑其支體於一時猶須當其罪矧刑其行義揭之於千萬年歟康誥曰敬明乃罰請依前謚為傾伊慎卒贈太子太保太常博士崔韶請謚壯繆吏部尚書韓臯駁議不報崔從為淮南節度使卒從少以貞晦恭謹自處不交權利忠厚方嚴為正人宿儒所推階品合立門㦸終不之請四為方鎮無聲妓之娯太常定謚曰貞令狐楚為興元節度使薨将死戒諸子曰吾生何益於人無請謚號無受軍府賵贈𦵏以布車一乗無或加飾無用鼓吹及終将𦵏嗣子請奉行遺言詔曰生為名臣殁有理命終始之分可謂兩全然以鹵簿哀榮之末節難違往意誄謚國家之大典湏守彛章鹵簿宜停易名須准舊例太常謚曰文李愬元和中平吳元濟有功及卒博士元從質謚曰武尚書省議以其謚與父西平王晟同宜改之從質云愬無他行以功定謚不可改也問難數四竟不能駁其議今之定謚則不然也唯顧其勢望恐為子孫之嫌歸於茍且故㑹昌朝陳商曽為禮部侍郎貽博士書曰古者太常博士職以公卿諸侯大夫死第其所行舉而褒貶焉使世世以一二字觀其道與不道拘藂言為文武忠孝所以失褒也執己見為繆荒赧醜所以失貶也二柄之失博士不得職往者不得享為政者不得道夫執己見拘藂言是有上中下貿其一二字視緍金之重輕以緍金重輕貽後之龎微偷忠盗貞㒺世間人為盡善加於行路皆博士忍其過而阿其時也夫天下人望執事以為質正然未見有執事能針其膏盲之病者若當貶而褒當褒而貶是猶錄跖殺夷經綽混淆者也褒而褒之貶而貶之經紀既著善惡懸白勸大而用微所以使後代力行不易如日月山河江海草木四支七竅以統幹而治自從其教也於戯博士職盖不細願出意念慮焉宋申錫官至宰相為鄭注搆誣貶開州司馬㑹昌中報復官爵追謚曰穆白居易為太子太傅以刑部尚書致仕卒大中三年十二月中書侍郎平章事白敏中表請謚從之太常謚曰文又云大中十三年宰臣白敏中表請謚曰臣頃自布衣爰及仕進飽僧孺之惠義師居易之文章斯人之亡各已數載屬先帝憂勤之際贈典未行遇陛下聖明之初謚法宜頒其将行業以傳册書從之居易謚曰文僧孺謚曰簡後唐朱漢賔太子少保致仕卒贈太子少傅至晋天福二年太常博士林弼議謚曰漢賔常恃倜儻不習㢘隅遏鄴都姦卒之訛言時銷叛亂却華師親隨之浮議俗致安康開國承家忠貞保義而又散已俸而代逋欠闢荒榛而種􅀈麰民有袴襦之謡野無萑蒲之患安民禁暴威惠兼行而又知進退存亡之理得善始令終之名亦所為知幾其神也謚法忠道不撓保節揚名曰貞愛民好學寛裕慈仁曰惠請謚貞惠可之安元信為昭義軍節度澤潞等州觀察處置等使卒贈太師太常博士賈緯議謚曰叨居禮職式考儒經德雖以百行相成謚乃取一善為定公經邦緯俗積行累功宜立摠名用彰殊號按謚法事君盡節曰忠體和居中曰懿左傳曰公家之事知無不為忠也春秋正義曰保已精粹立行純厚懿也公抑揚事任周旋盛明嘗險阻艱難秉温良恭儉或宣風千里有負襁之民或布政百城致隨軒之雨道光羣后功著厯朝凡士大夫歎開幕之芙蕖久謝無賢不肖感成蹊之桃李空存煥彼緹緗豐諸碑版令被實錄非讓古人事君既有忠規為臣足以御衆復彰懿行從政備焉前代所髙斯謚為當今請謚曰忠懿從之錢元瓘為天下兵馬都元帥吳越國王天福八年所司議謚曰莊穆王奉勅改謚曰文穆王漢髙從誨為荆南節度使南平王乾祐二年卒勅宜令太常定謚故事臣下請謚即故吏陳行狀上考功覆奏下乃議謚今降勅新例也周劉詞為永興軍節度使薨贈中書令謚曰忠惠詞發身軍校亟厯戎事嘗以忠勇自負洎領藩鎮能靖恭為理無苛政及民謚曰忠惠議者韙之希㫖夫禮者所以定親踈决嫌疑别同異明是非也故三代而下濬哲之主曷嘗不講求文質稽考遺墜著為大法垂之方來者乎然而大臣矢謨攸司奏議當執折衷之論用成經久之規乃有回邪其心險詖其行以揣摩為己任以附麗為身謀忘典册之格言縱詭隨之臆説卒使舊章斯亂大政攸斁聿興相䑕之刺終起白圭之詠貽誚千古守官者得不鍳之哉夏父弗忌魯大夫也文公三年有事於太廟躋僖公逆祀也僖是閔兄不得為父子嘗為臣位應在下令居閔上故舊曰逆祀於是弗忌為宗伯宗伯掌宗廟昭穆之禮尊僖公且明見曰吾見新鬼大故鬼小新鬼僖公既為兄死時年又長故鬼閔公死年少弗忌明言其見先大後小順也躋聖賢明也人以僖公為聖賢明順理也君子以為失禮禮無不順祀國之大事也而逆之可謂禮乎子雖齊聖不先父食久矣齊肅也臣繼君猶子繼父故禹不先鯀湯不先契鯀禹父契湯十三世祖文武不先不窋不窋后稷子宋祖帝乙鄭祖厲王猶上祖也帝乙微子父厲王桓公父二國不以帝乙厲王不肖而猶尚之是以魯頌曰春秋匪懈享祀不忒皇皇后帝皇祖后稷忒差也皇皇美也后帝天也云頌僖公郊祭上天配以后稷君子曰禮謂其后稷親而先帝也先稱帝也詩曰問我諸姑遂及伯姊衞女思歸而不得故願致問於姑姊君子曰禮謂其姊親而先姑也僖公文公父夏父弗忌欲阿時君先其所親故傳以此二詩深責其意漢霍光為大将軍昭帝初光緣武帝雅意以李夫人配食緣因也雅意素舊之意追上尊號曰孝武皇后晉叚暢為博士太尉賈充薨下禮官議充謚博士秦秀議謚曰荒武帝不納暢希㫖建議謚曰武帝乃從之宋徐爰為将作大匠便辟善柔能得人主微㫖頗涉書傳尤悉朝儀文帝元嘉初便入侍左右預兹顧問既長於附㑹又飾以典文故為帝所任遇大明世委寄尤重朝廷大禮儀非爰議不行雖復當時碩學所解過人者既不敢立異議所言亦不見用孝武殷淑儀卒既追進貴妃謚曰宣又諷有司創立新廟爰之議宣貴妃既加殊命禮絶五宮考之古典顯有成據梁劉勰為南康王記室兼東宮通事舍人時七廟饗薦已用蔬菓而二郊農社猶用犧牲勰乃表言二郊宜與七廟同改詔付尚書議依勰所陳遷步兵校尉兼舍人如故唐許敬宗為太子賔客髙宗永徽初議者以貞觀禮未盡詔長孫無忌與杜正倫李義府及敬宗等重加緝定至顯慶三年奏上之時敬宗義府用事其所損益多涉希㫖行用已後學者紛議以為不及貞觀祝欽明為國子祭酒中宗景龍三年十一月将南郊欽明希㫖上言皇后亦當助祭遂建議曰謹按周禮天神曰祀地祗曰祭宗廟曰享大宗伯職曰祀大神祭大祗享大鬼理其大禮若王有故則攝而薦徹豆籩又追師職掌王后之首服以待祭祀又内司服職掌王后之六服凡祭祀供后之衣服又九嬪大祭祀后祼獻則賛賛瑶爵亦如之據此諸文即知皇后合助皇帝祀天神祭地祗明矣故鄭𤣥注司服云闕狄皇后助王祭羣小祀之服然則小祀尚助王祭中大推理可知闕狄之上猶有两服第一禕衣第二搖狄第三闕狄此三狄皆助祭之服闕狄既助祭小祀即知搖狄助祭中祀禕衣助祭大祀鄭舉一隅故不委説唯祭宗廟周禮王有兩服先王衮冕先公鷩冕鄭𤣥因此以后助祭宗廟亦分兩服云禕衣助祭先王搖狄助祭先公不言助祭天地社稷自宜三隅而反又春秋外傳云禘郊之事天子親射其牛王后親舂其粢故代婦職但云詔皇后之禮事不言主宗廟也若專主祭廟者則内宗外宗職皆言掌宗廟祭祀此皆禮文分明不合疑惑舊説以天子父天母地兄日姊月所以祀天於南郊祭地於北郊朝日於東門之外夕月於西門之外以昭事神訓人事君必躬親以禮之有故然後使攝此其義也又禮記祭統曰夫婦親之所以備内外之官也官備則具備又哀公問孔子曰冕而親迎不亦重乎孔子愀然作色而對曰合二姓之好以繼先聖之後以為天地宗廟社稷之主君何謂已重焉又漢書郊祀志云天地合祭先祖配天先妣配地天地合精夫婦合判祭天南郊則以配一體之誼也據此諸文則知皇后合助祭儀注同進帝意頗以為疑召禮官親問焉太常博士唐紹蒋欽緒對曰皇后南郊助祭於禮不合帝問曰據何禮文不合欽緒對曰欽明所奏執是祭宗廟禮非祭天地禮又鄭𤣥王后六服最上禕衣從祭先王無祭天地之服欽明又進對曰此實鄭𤣥大錯誤不可依也帝命宰臣等取兩家狀對定奏聞欽緒遂議曰周禮凡言祀祭享三者皆祭之雅名本無定議何以明之案周禮典瑞職云兩珪有邸以祀地則祭地亦稱祀也又司几筵設祀先王之祚席則祭宗廟亦稱祀也又内宗職云掌宗廟之祭祀此又非獨天地稱祭祀也又按禮記云惟聖為能享帝此則祀天亦稱享也又按孝經云春秋祭祀以時思之即宗廟亦言祭祀也經典此文不可備數據此則欽明所執天曰祀地曰祭宗廟曰享未得為定明矣又周禮凡言大祭祀者祭天地宗廟之總名非獨天地之為大祭也何以明之按鬰人職云大祭祀與量人受舉斚之卒爵按尸與斚皆宗廟之事則宗廟亦稱大祭祀又欽明狀引九嬪職凡大祭祀后祼獻則贊瑤爵據祭天無祼獻亦無瑤爵此宗廟稱大祭祀之明文欽明所言大祭祀即為祭天地未得為定明矣又周禮大宗伯職云凡大祭祀王后有故不與則攝而薦豆籩徹欽明唯執此文以為王后有祭天地之禮欽緒等據此文乃是王后薦宗廟之禮非祭天地之事何以明之按此文凡祀大神祭大祇享大鬼師執事而卜日宿視滌濯涖玉鬯省牲鑊奉玉齍制大號理其大禮詔相王之大禮若王不與祭祀則攝位此皆宗廟之事故通言大神大祇之祭也下文云凡大祭祀王后不與則攝而薦豆籩徹此一凡直是王后祭宗廟之事故惟言大祭祀也若云王后合助祭天不應重起凡大祭祀之文也為嫌王后有祭天地之疑故重起後凡以别之耳王祭宗廟自是大祭祀何故上凡相天王之禮以混下凡王后祭宗廟之文此是本經科叚明白又按周禮外宗掌宗廟之祭祀佐王后薦玉豆凡后獻亦如之王后有故不與則宗伯攝而薦豆籩徹外宗贊之内宗外宗所掌皆佐王后宗廟之薦本無祭天地之禮但天地尚質宗廟尚文玉豆宗廟器物非祭天所設請問欽明若王后助祭天地在周禮使何人賛佐若宗伯攝后薦豆祭天又合何人贊佐竝請明徴禮文即知攝薦是宗廟之禮明矣按周禮司服云王祀昊天上帝則服大裘而冕享先王則衮冕内司服掌王后祭服無王后祭天地之服案三禮義宗明王后六服謂禕衣揺翟闕翟鞠衣展衣褖衣也褘衣從王祭先王則服之揺翟祀先公及享諸侯則服之鞠衣以求桑則服之展衣以禮見王及見賔客則服之禒衣燕居則服之王后無助祭於天地之服但自先王已下及三禮義宗明王夫人之服云后不助祭天地五嶽故無助祭天地四望之服按此則王后無祭天地之服明矣又三禮義宗明王后五輅謂重翟厭翟安車翟車輦車也重翟者后從王祭先王所乗也厭翟者后從王享諸侯所乗也安車者后宫中見於王所乗也翟車者后親桑之所乗也輦車者后遊宴之所乗也按此則王后無祭天之車明矣禮記郊特牲義賛云祭天地無祼鄭𤣥注云唯人道宗廟有祼天地大神至尊不祼圓丘之祭與宗廟祫同朝踐王爵泛齊以獻是一獻按此后無祭天之事大宗伯次酌醴齊以獻是二獻按此則祭圓丘大宗伯次王為獻非攝王后之事欽明等所執王后有故不預則宗伯攝薦豆籩是攝王后宗廟之薦非攝天地之祀明矣欽明建議引禮記祭統曰夫祭也者必夫婦親之按此是王與后祭宗廟之禮非關祀天之義按漢魏晉宋後魏周陳隋等厯代史皇后無助祭之事又髙祖神堯皇帝太宗文武聖皇帝南郊祀天無皇后祭處髙宗天皇大帝永徽二年十一月辛酉親有事於南郊又總章元年十二月丁卯親拜南郊亦無皇后助祭之禮又按大唐禮亦無皇后南郊助祭之禮欽緒等幸忝禮官親承聖問竭盡聞見不敢依隨伏以主上稽古志遵舊典所議助祭實無明文若以王者制禮自我作古在明主聖斷非臣下敢言國子司業禇無量又議曰夫郊祀者明王之盛事國家之大禮行其禮者不可以臆斷不可以情求皆上順天心下符人事欽若稽古率由舊章然後可以交神明可以膺福佑然禮文雖衆莫如周禮周禮者周公致太平之書先聖極由衷之典法天地而敷教化辨方土而教人倫其義可以幽賛神明其文可以經緯邦國備物致用其可忽乎至如冬祀圓丘祭中最大皇后内主禮位甚尊若今郊天助祭當具著禮典今遍檢周官無此儀制盖由祭天南郊不以地配唯將始祖為主不以祖妣配天故唯皇帝親得行其禮皇后不合預也謹按大宗伯職云若王祭祀不與則攝位注云王有故代行其祭事下文凡大祭祀王后不與則攝而薦豆籩徹若皇后合助祭承此下節當云后若不與祭祀則攝而薦豆籩徹於文上更起凡明是别生餘事矣是則上異則别起凡凡者生上起下之名不專繫於本職周禮一部之内此例極多備在文中不可具錄又王后助祭親薦豆籩而不親徹按九嬪云凡祭祀贊后薦徹豆籩皇后進之而不徹者為宗廟祭則宗伯親徹不别使人又按外宗掌宗廟之祭祀王后不與則贊宗伯此之一文與上文相證何以明之按外宗唯掌宗廟祭不掌郊天足明此文是宗廟祭也又按王后行事總在内職中簡其職文唯云大祭祀后祼獻則賛瑤爵亦如之鄭注謂祭宗廟也注所以知者以文云祼獻祭祀無祼以得知又祭天之器則用陶匏亦無瑤爵注以此知是宗廟也又内司服掌王后六服無祭天之服而巾車職掌王之五輅亦無后祭天之輅祭天七獻無后亞獻以此諸文叅之故知后之不合助祭天也唯漢書郊祀志則有天地合祭皇后預享之事此則西漢末代彊臣擅朝悖亂彛倫黷神諂祭不經之典事渉誣神故易傳曰誣神者殃及三代秦誓曰正稽古立功事可以永年天之大律斯史䇿之良戒豈可不知今南郊禮儀事不稽古忝守經術不敢緘默請詢碩儒俯考典䑓之故事行圓丘之正義使聖朝叶昭曠之途天下知文物之盛豈不幸甚時定儀注官尚書左僕射韋巨源又希皇后㫖叶同欽明之議奏言皇后合助祭請依欽明議為定帝納其言竟以皇后為亞獻大臣李嶠等女為齊娘執籩豆焉欽明又以安樂公主獨任權勢欲請公主為終獻遂引南郊儀注謁者引終獻以為女相唐紹及蒋欽緒與之固爭欽明止遂以尚書左僕射韋巨源為終獻王璵少習禮學博求祠祭儀注以干時開元末為太常博士侍御史充祠祭使璵專以祀事希倖其祭祀之制或焚紙錢禳祈福祐近於巫者以是稍承恩遇肅宗即位累遷太常卿亦以祀事見寵繆妄夫學不足以待問智不足以體遠罔識損益之理靡逹弛張之訓亦何足以議乎禮經之制作矣中代而下去聖逾遠師資出於淺近討論乖於通博以致叅掌厥事或非其人草創之初罔克稽古違失經㫖貽儒先之誚紛錯儀範著史氏之譏斯亦出於獨見因其失傳寖以成非罔之能正其或乗其繆誤恣乎封執黷祭違禮狥情失度垂之後世良可惡哉漢武帝元鼎中令諸儒習射牛草封禪儀數年至且行而羣儒既以不能辨明封禪事又拘於詩書古文而不敢騁帝為封祠器視羣儒視讀曰示羣儒或曰不與古同徐偃又曰太常諸生行禮不如魯善徐偃博士姓名周霸屬圖封事屬音之欲切㑹也㑹諸儒圖封事也周霸人姓名於是帝黜偃霸而盡罷諸儒弗用魏文帝黄初二年正月乙亥祀朝日於東門之外違禮二分之義禮春分祀朝日於東秋分祀夕月於西今正月非其時也明帝景初元年六月有司奏武皇帝撥亂反正為太祖樂用武始之舞文皇帝應天受命為髙祖用咸熙之舞帝創作興治為烈祖樂用章武之舞三祖之廟萬世不毁其餘四廟親盡迭毁如周后稷文武廟祧之制孫盛曰夫謚以表行廟以存容皆於既没然後著焉所以原始要終以示百世也未有當年遂制祖宗未終而預自尊顯昔華樂以厚𦵏致譏周人以豫凶違禮魏之羣司於是乎失正蜀後主景耀六年詔為丞相諸葛亮立廟於沔陽先是亮初亡所在各求為立廟朝議以禮秩不聽百姓遂因時節私祭之於道陌上言者或以為可聽立廟於成都者後主不從步兵校尉習隆中書郎向充等共上表以為因宜近墓立之於沔陽聽親屬以時祀祭凡其臣故吏欲奉祀者皆限至廟斷其私祀以崇正禮於是始從之何承天曰周禮凡有功者祭於大蒸故後代尊之以元勲配享充等曽不是正後主又從之竝非禮也晉元帝大興元年立南郊於已地非禮所有就陽位之義也南出道狹未議開闢遂於東南已地創立丘壇四年四月始有司奏應報賽宗廟山川詔曰祈廟云賽非奉尊下辭吾意有疑以為舊山川有許報故兩賽非大事不應吿廟臣子無要君之道黷祭稱賽於禮有違成帝咸康二年臨軒遣使兼太保領軍將軍諸葛恢兼太尉䕶軍将軍孔愉六禮備物拜皇后杜氏即日入宫帝御太極殿羣臣畢賀非禮也禮娶婦之家三日不舉樂而羣臣賀為失禮宋孝武末公除後晉安王子勛侍讀博士諮将作大匠徐爰宜習業與不爰荅曰居喪禮習業何嫌少始安王子真博士又諮爰曰小功廢業三年喪何容讀書其專斷乖謬皆此類明帝時廷尉虞和議社稷合為一神散騎常侍王琨按舊紏駁時和深被親寵朝廷歎琨强正唐德宗貞元九年十二月𦵏故太師李晟帝御南望春門臨送之又令中人宣詔於柩車文武常叅官哭拜於路太常卿裴郁草儀誤引令中書隔品致敬之文乃請宰相及二品以上者哭而不拜送𦵏不拜禮官失也穆宗元和十五年正月即位六月勅宗廟之禮嚴肅居先薦告之詞精審為切方将昇附安可九室皆同既已祧遷豈宜四昭咸在宗正少卿李子鴻實司祀事誤進祝文罪有根源理難降減宜停見任博士既失於詳定御史又曠其監臨若不薄懲恐乖至敬王彦威宜罰兩月俸料削一階崔鄲宜罰一季俸削兩階其後禮合變文事宜中節者太常博士不得更稱舊制致有差殊故事将有祔禮先告於太極殿然後奉神主赴太廟侍中於廟庭跪奏入室曰以今吉辰某皇帝神主祔謁遂奉神主詣第七室祔饗而不再告饗畢祔於第九室設安神之幕而塪之然則告於太極殿不再告於太廟以孫祔於祖尊不得申也是時憲宗神主升祔宰臣不詳舊典今有司再告祔禮於太極殿禮官執議不聽適屬宗正寺進祝板誤以憲宗尊號為睿宗御史士職當省察不知其誤宰臣兼怒之遂下詔削罰而變其舊禮時甚非之長慶元年正月辛丑郊社禮畢大赦天下宣赦畢宰臣率百寮稱賀於樓前仗退帝朝太后於興慶宮先是南郊禮畢不設御榻帝立受羣臣稱賀及御樓仗退百寮復不賀於興慶宮舉大典而有二闕皆有司之過也文宗太和五年六月貶權知太常博士權安為河南府兵曹叅軍安狂險以朋附得官好持論而無依據以博士定故宰相韋處厚謚議逞私憾誣枉不實朝論雜然非之故有是命後唐明宗天成四年五月中書奏先據太常寺定少帝謚昭宣光烈孝皇帝廟號景宗伏以本朝基搆垂三百年昭宗以中否東遷少帝以沉寃晏駕始封侯於偽室新立廟於聖朝追奕世之尊雪當時之恥先皇帝初定中原之後昭宗少帝尋合一時入廟所司不舉遂成闕禮既暌昭穆難㑹蒸嘗太廟有合食之儀外邑無登歌之奏生曽為帝享乃成祧既號景宗合入太廟如不入廟難以言宗須叶徽章免貽羣議於理而論祧以遠廟安少帝神主於太廟即昭穆序而宗祀正今或且居别廟即欲不言景宗只云昭宣光烈孝皇帝兼册文内有基字是𤣥宗廟諱尋常泛行詔勑皆不廻避少帝是繼世之孫册文内不欲斥列聖之諱今改基為宗字勅皆可之論者以為追尊之廟謚不稱宗於禮得矣至如云生曽為帝享乃承祧即子孫纉嗣以宗祧為本明矣下文復云祧一遠廟安少帝於太廟則祧之一字義有兩説乎時人多謂祧字為祧去之祧禮則不然按祭法云遠廟為祧有二祧鄭𤣥解祧者超也謂超然上去之意孔穎逹正義云遠廟為祧五世而遷之主藏於祧廟去祧為壇去壇為墠所謂遠廟者即始祖之廟也五世之後合遷之例以其有德百世不遷故謂之二祧文王武王是也髙祖太宗是也祧與遷異義在此矣又云册文中有基字是𤣥宗廟諱夫先王制禮貴在折中君子有終身之憂三年之喪豈盡其情哉賢者俯而及之欲重其制也五世不諱所謂報之極也按風俗通陳孔璋議諱云尊尊有節親親有殺䘮祭哀敬各有攸終欲令言著而可遵事施而不犯禮云卒哭之後宰執木鐸狥於宮曰舍故而諱新故者即毁廟之主也恩遠屬絶名不可諱今昭宣皇帝上去𤣥宗十五世矣奏改册文以避遠諱将以垂法信不典也如或上無所斷下無所齊即百代之主皆可避也舍故諱新寧虗語乎名不正則至於人為無所措手足制禮作法可不慎歟周世宗顯德元年十月太常禮院上言去冬遷宗社於浚都其諸祠郊壇奉勅依四京制度修築伏緣司寒神元在兩京後園水井所祠祭未審且在彼祭為復於此勅曰據月令孟冬祭司寒於北郊其司寒一祠一且准月令施行藏氷開氷祭司寒之神事屬别祭後有氷室尚取指揮時田敏以鴻儒為太常卿朝廷之内禮義差失謂可質正而司寒小祀不能按故實舉行翻以水井為請中書止引月令命正之大為士子所笑册府元龜卷五百九十六
