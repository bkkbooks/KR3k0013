body:
  text: 册府元龜巻七百四十二宋王欽若等撰陪臣部規諷第三椒舉楚大夫也楚子㑹諸侯於申椒舉言於楚子靈王也曰臣聞諸侯無歸禮以為歸今君始得諸侯其愼禮矣霸之濟否在此㑹也夏啟有鈞臺之享啟禹子也河南陽翟縣南有鈞臺陂蓋啟享諸侯於此商湯有景亳之命河南鞏縣西南有湯亭或言亳即偃師縣周武王有孟津之誓將伐紂也成有岐陽之蒐周成王歸自奄大蒐於岐山之陽岐山在扶風美陽縣西北康有鄷宫之朝酆在始平鄠縣東有靈臺康王於是朝諸侯穆有塗山之㑹周穆王㑹諸侯於塗山塗山在壽春東北齊桓有召陵之師在僖四年晉文有踐土之盟在僖二十八年君其何用宋向戍鄭公孫僑在諸侯之良也君其選焉選擇所用王曰吾用齊桓用㑹召陵之禮楚子示諸侯侈自奢侈椒舉曰夫六王二公之事六王啟湯武成康穆也二公齊桓晉文皆所以示諸侯禮也諸侯所由用命也夏桀為仍之㑹有緍叛之仍緍皆國名商紂為黎之蒐東夷叛之黎東夷國名周幽為大室之盟戎狄叛之大室中嶽皆所以示諸侯汰也諸侯所由棄命也今君以汰無乃不濟乎王弗聽楚子圍朱方執齊慶封而盡滅其族慶封以襄二十八年奔吳將戮慶封椒舉曰臣聞無瑕者可以戮人慶封惟逆命是以在此逆命謂性不恭順其肯從於戮乎言不肯黙而從戮播於諸侯焉用之播揚也王弗聽負之斧鉞以狥於諸侯使言曰無或如齊慶封弑其君弱其孤以盟其大夫齊崔杼弑君慶封其黨也故以弑君罪責之慶封曰無或如楚共王之庶子圍弑其君兄之子麋而代之以盟諸侯王使速殺之楚靈王為章華之臺與伍舉升焉伍舉即椒舉也曰臺美夫對曰臣聞國君服寵以為美安民以為樂聽德以為聰致遠以為明不聞其以土木之崇高雕鏤為美而以金石匏竹之昌大囂庶為樂不聞其以觀大視侈滛色以為明而以察清濁為聰也先君莊王為匏居之臺高不過望國氛大不過容宴豆木不妨守備用不煩官府民不廢時務官不易朝常問誰宴焉則宋公鄭伯問誰相禮則華元駟騑問誰贊事則陳侯蔡侯許男頓子其大夫侍之先君是以除亂尅敵而無惡于諸侯今君為此臺也國民罷焉財用盡焉年糓敗焉百官煩焉舉國營之數年乃成願得諸侯與始升焉諸侯皆距無有至者而後使大宰啟疆請於魯侯懼之以蜀之役而僅得以來使富都那𥪡贊焉而使長鬛之士相焉臣不知其美也夫美也者上下外内大小遠邇皆無害焉故曰美若於目觀則美以財用則匱是聚民利以自封而瘠民也胡美之為夫君國者將民之與處民實瘠君安得肥且夫私欲𢎞侈則德義鮮少德義不行則邇者騷離而遠者距違若歛民利以成其私欲使民蒿焉忘其安樂而有遠心其為惡也甚矣安用目觀故先王之為臺榭也榭不過講軍實臺不過望氛祥故榭度於大卒之居臺度於臨觀之高其所不奪穡地其為不匱財用其事不煩官業其日不敗時務瘠磽之地於是乎為之城守之木於是乎用之官寮之暇於是乎臨之四時之隙於是乎成之故周詩曰經始靈臺經之營之庶民攻之不日成之經始勿亟庻民子來王在靈囿麀鹿攸伏夫為臺榭將敎民利也不知其以匱之也若君謂此臺美而為之正楚其殆矣薳啟疆楚大夫也晉韓宣子如楚逆女叔向為介及楚楚子靈王也朝其大夫曰晉吾仇敵也茍得志焉無卹其佗今其來者上卿上大夫也若吾以韓起為閽刖足使守門以羊舌肹為司宫加宫刑足以辱晉吾亦得志矣可乎大夫莫對薳啟疆曰可茍有其備何故不可耻匹夫不可以無備况耻國乎是以聖王務行禮不求耻人朝聘有珪珪以為信享頫有璋享饗也頫見也既朝聘而享見也臣為君使執璋小有述職諸侯適天子曰述職大有廵功天子廵守曰廵功設几而不倚爵盈而不飲言務行禮宴有好貨宴飲以貨為好衣服車馬在客所無飱有陪鼎熟食為飱陪加也加鼎所以厚殷勤入有郊勞賓至逆勞之於郊出有贈賄去則贈之以貨賄禮之至也國家之敗失之道也則禍亂興失朝聘宴好之道城濮之役晉無楚備以敗於邲邲之役楚無晉備以敗於鄢自鄢以來晉不失備而加之以禮重之以睦君臣和也是以楚弗能報而求親焉既獲姻親又欲耻之以召冦讎備之若何言何以為備誰其重此言怨重若有其人耻之可也謂有賢人以敵晉則可耻之若其未有君亦圖之晉之事君臣曰可矣求諸侯而麇至麇群也求昏而薦女薦進也君親送之上卿及上大夫致之猶欲恥之君其亦有備矣不然柰何韓起之下趙成中行吳魏舒范鞅知盈五卿位在韓起之下皆三軍之將佐也成趙武之子吳荀偃之子羊舌肹之下祁午張趯藉談女齊梁丙張骼輔躒苗賁皇皆諸侯之選也言非凡人韓襄為公族大夫韓湏受命而使矣韓襄無忌子也為公族大夫須起之門子年雖㓜已任出使箕襄邢帶二人韓氏族叔禽叔椒子羽皆韓起庶子皆大家也韓賦七邑皆成縣也成縣賦百乘也羊舌四族皆彊家也四族銅鞮伯華叔向叔魚叔虎兄弟四也晉人若䘮韓起羊肹五卿八大夫五卿趙成以下八大夫祁午以下輔韓湏羊石石叔向子食我也因其十家九縣韓氏七羊舌氏四而言十家舉大數也羊舌四家共二縣故但言彊家長轂七百長轂戎車也縣百乘其餘四十縣遺守四千計遺守國者尚有四千乘奮其武怒以報其大恥伯華謀之伯華叔向兄中行伯魏舒帥之伯仲行吳其蔑不濟矣君將以親易怨失婚姻之親實無禮以速冦而未有其備使群臣往遺之擒以逞君心何不可之有王曰不穀之過也大夫無辱謝薳啟疆厚為韓子禮王欲敖叔向以其所不知而不能言叔向之多知亦厚其禮申無宇楚大夫也楚靈王城陳蔡不羮襄城縣東南有不羮城定陵西北有不羮亭使棄疾為蔡公王問於申無宇曰棄疾在蔡何如對曰擇子莫如父擇臣莫如君鄭莊公城櫟而寘子元焉使昭公不立子元鄭公子莊公寘子元於櫟桓十五年厲公因之以殺櫟大夫檀伯遂居櫟卒使昭公不安位而見殺齊桓公城穀而寘管仲焉至於今頼之臣聞五大不在邉五細不在庭上古金木水火土謂之五官𤣥鳥氏丹鳥氏亦有五又以五鳩氏五雉為五工正蓋五官之本也末世遂事施職是以官無常數今無宇稱習古言故云五大言五官之長專盛過節則不可居邉細弱不勝任亦不可居朝廷親不在外覊不在内今棄疾在外鄭丹在内襄十九年丹奔楚君其少戒王曰國有大城何如對曰鄭京櫟實殺曼伯曼伯檀伯也厲公得櫟又并京宋蕭亳實殺子㳺在莊十二年齊渠丘實殺無知在莊九年渠丘今齊國西安縣也齊大夫雍廪邑衞蒲戚實出獻公蒲寗殖邑戚孫林父邑出獻公在襄十四年若由是觀之則害於國末大必折折其本尾大不掉君所知也又云楚靈王城陳蔡不羮使僕夫子晳問於無宇曰吾不服諸夏而獨事晉何也惟晉近我遠也今吾城二國賦皆千乘亦當晉矣又加之以楚諸侯其來乎對曰其在志也國為大城未有利者昔者鄭有京櫟衛有蒲戚宋有蕭蒙魯有卞費齊有渠丘晉有曲沃秦有徵衛叔叚以京患嚴公鄭幾不封櫟人實使鄭子不得其位衛蒲戚實出獻公宋蕭蒙實殺昭公魯卞費實弱襄公齊渠丘實弑無知晉曲沃實納齊師秦徵衛實難桓景皆志於諸侯此其不利者也且夫制城邑若體性焉有首領股肱至于指拇毛脉大能掉小故變而不勤地有高下天有晦明民有君臣國有都鄙古之制也先王懼其不帥制之以義旌之以服行之以禮辨之以名書之以文道之以言及其失也易物之由夫邉境者國之尾也譬之如牛馬處暑之既至蝱䗽之既多而不能掉其尾臣亦懼之不然是楚三城也豈不使諸侯之心惕惕焉子晳復命王曰是知天咫安知民則是言誕也右尹子革侍曰民天之生也知天必知民矣是其言也可以懼哉三年陳蔡不羮人納棄疾而弑靈王矣鄭丹楚大夫也楚子狩於州來狩冬獵也次于潁尾潁水之尾在下蔡西使蕩侯潘子司馬督囂尹午陵尹喜帥師圍徐以懼吳五子楚大夫徐吳與國欲圍之以偪吳楚子次於乾谿在譙國城父縣南以為之援雨雪王皮冠秦復陶秦所遺羽衣也翠被以翠羽飾被豹舄以豹皮為履執鞭而出執鞭以敎令僕析父從楚大夫右尹子革夕子革鄭丹夕莫見王見之去冠被舍鞭敬大臣與之語曰昔我先王熊繹楚始封君與吕級齊太公之子丁公王孫牟衛康叔子康伯燮父晉唐叔之子禽父周公子伯禽竝事康王康王成王子四國皆有分我獨無有四國齊晉魯衞分珍寳之器今吾使人於周求鼎以為分王其與我乎對曰與君王哉昔我先王熊繹辟在荆山在新城沶鄉縣南篳路藍縷以處草莾䟦踄山林以事天子惟是桃弧棘矢以共禦王事桃弧棘矢以禦不祥言楚在山林少所出有齊王舅也成王母齊太公女晉及魯衞王母弟也楚是以無分而彼皆有今周與四國服事君王將命是從豈其愛鼎王曰昔我皇祖伯父昆吾舊許是宅陸終氏生六子長曰昆吾少曰季連季連楚之祖故謂昆吾為伯父昆吾嘗居許地故曰舊許是宅今鄭人貪頼其田而不我與我若求之其與我乎對曰與君王哉周不愛鼎鄭敢愛田王曰昔諸侯遠我而畏晉今我大城陳蔡不羮賦皆千乘子與有勞焉諸侯其畏我乎對曰畏君王哉是四國者專足畏也四國陳蔡二不羮又加之以楚敢不畏君王哉工尹路請曰君王命剝圭以為鏚柲鏚斧也柲柄也破圭以飾斧柄敢請命請制度之命王入視之析父謂子革曰吾子楚國之望也今與王言如響國其若之何譏其順王心如響應聲子革曰磨礪以湏王出吾刄將斬矣以已喻鋒刄欲自磨礪以斷王之淫慝王出復語左史倚相趨過倚相楚史名王曰是良史也子善視之是能讀三墳五典八索九丘皆古書名對曰臣嘗問焉昔穆王欲肆其志周穆王肆極也周行天下將皆必有車轍馬迹焉祭公謀父作祈招之詩以止王心謀父周卿士祈父周司馬世掌甲兵之職招其名祭公方諌㳺行故指司馬官而言此逸詩矣王是以獲没於祇宫獲没不見簒弑臣問其詩而不知也若問遠焉其焉能知之王曰子能乎對曰能其詩曰祈招之愔愔式昭德音愔愔安和貌式用也昭明也思我王度式如玉式如金金玉取其堅重形民之力而無醉飽之心言國之用民當隨其力任如金冶之器隨器而制形故言形民之力去其醉飽過盈之心王揖而入饋不食寢不寐數日深感子革之言不能自克以及於難克勝也仲尼曰古也有志克己復禮仁也信善哉楚靈王若能如是豈其辱於乾谿白公子張楚大夫也靈王虐子張驟諫王患之謂史考曰吾欲已子張之諫若何史考子亹已止對曰用之實難已之易矣若諫君則曰余左執鬼中右執殤宫中身也禮曰其中退然夭死曰殤殤宫殤之居也執謂把其錄籍制服其身知其居處若今世云能使殤也凡百箴諫吾盡聞之矣寧聞佗言不欲聞諫白公又諫王如史考之言對曰昔殷武丁能聳其德至于神明武丁高宗聳敬至通也通於神明夢見傅說也於是乎三年嘿以思道嘿諒闇也思道思君人之道書曰高宗諒闇不言言乃讙也卿士患之患不言也曰王言以出令也若不言是無所禀令也禀受武丁於是作書以書解卿士曰以余正四方余恐德之不類兹故不言類善兹此如是而又使以象旁求四方之賢聖思賢而夢見之識其容狀故作其象而使求之也得傅說以來升以為公公上公也書序高宗夢傅說使伯工營求之野得傅說作說命而使朝夕規諫曰若金用汝作礪使磨礪也若渉水用汝作舟喻遭渉水若大旱用汝作霖雨大旱自比苖稼三日以上為霖啟乃心沃朕心啟開也賢者之心比霖雨若藥不瞑眩厥疾不瘳以藥喻忠言瞑眩煩暋攻已急也瘳愈也若跣不視地厥足用傷以失道比徒跣而不視若武丁之神明也通於神明既得道猶不敢專制使以象旁求聖人以為輔今君或者未及武丁而惡規諫者不亦難乎難以保國齊桓晉文皆非嗣也非嫡嗣還軫諸侯不敢滛逸還軫謂出奔心類德音以得有國類善近臣諫遠臣謗輿人誦以自誥也輿衆也誦誦善敗也誥告也是以其入也四封不備一同備滿也方百里曰同方欲美之故尤小焉而至於是有畿田方千里曰畿以屬諸侯屬㑹至於今為令君桓文皆然君不度於二令君而欲自逸也無乃不可乎周詩有之曰弗躬弗親庶民弗信為政不躬親則衆民不信臣懼民之不信君也故不敢不言不然何急其以言取罪也王病之曰子復語病不能然故復使語不穀雖不能用吾憗寘之於耳憗猶願也寘置也對曰頼君之用之也故言頼恃不然巴浦之犀犛兕象其可盡乎其又以規為瑱也犛犛牛規諫也瑱所以塞耳言四獸之牙角可以為瑱難盡而又以規諫為之乎今象出徼外其三獸則荆交有焉巴浦地名或曰巴郡浦合浦遂趨而退歸杜門不出七月乃有乾谿之亂靈王死之叔向晉大夫也楚公子棄疾如晉報韓子也報送女韓宣子之適楚也楚人弗逆公子棄疾及晉境晉侯將亦弗逆叔向曰楚辟我𠂻辟邪也𠂻正也若何效辟詩曰爾之敎矣民胥效矣言上敎下效從我而已焉用效人之辟書曰聖作則逸書則法也無寧以善人為則無寧寧也而則人之辟乎匹夫為善民猶則之况國君乎晉侯說乃逆之子瑕楚令尹也言蹶由於楚子蹶由吳王弟靈王執以歸曰彼何罪諺所謂室於怒市於色者楚之謂矣言靈王怒吳子而執其弟猶人忿於室家而作色於市人舍之怒可也乃歸蹶由晏嬰齊大夫齊莊公將伐晉問於晏子晏子對曰君德合而欲多養欲而意驕德合而欲多者危養欲而意驕者困今君志於勇力之士以伐盟主幸而不濟君之福不幸而有功憂必及君莊公作色不悅晏子辭而不為臣退而窮處堂下生藜藿門外生荆棘莊公終任勇力之士西伐晉取朝歌及大行朞而民散身滅於崔氏又景公欲更晏子之宅曰子宅近市湫隘囂塵不可以居湫下隘小囂聲塵土請更諸爽塏者爽明塏燥辭曰君之先臣容焉先臣晏子之先人臣不足以嗣之於臣侈矣侈奢也且小人近市朝夕得所求小人之利也敢煩里旅旅衆也不敢勞衆為己宅公笑曰子近市識貴賤乎對曰既利之敢不識乎公曰何貴何賤於是景公繁於刑繁多也有鬻踊者故對曰踊貴屨賤景公為是省于刑君子曰仁人之言其利溥哉晏子一言而齊侯省刑詩曰君子如祉亂庶遄已如行也祉福也遄庶也言君而行福則庶幾亂即止也其是之謂乎又景公疥遂痁痁瘧疾也期而不瘳諸侯之賓問疾者多在梁丘據與裔欵二子齊嬖大夫言於公曰吾事鬼神豐於先君有加矣今君疾病為諸侯憂是祝史之罪也諸侯不知其謂我不敬君盍誅於祝固史嚚以辭賓欲殺嚚固以辭謝來問疾之賓公說告晏子晏子曰日宋之盟日往日也宋盟在襄二十七年屈建問范㑹之德於趙武趙武曰夫子之家事治言於晉國竭情無私其祝史祭祀陳信不愧其家事無猜其祝史不祈家無猜疑之事故史無求於鬼神建以語康王楚王康王曰神人無怨宜夫子之光輔五君以為諸侯主也五君文襄靈成景公曰據與欵謂寡人能事鬼神故欲誅於祝史子稱是語何故對曰若有德之君外内不廢無廢事上下無怨動無違事其祝史薦信無愧心矣君有功德祝史陳説之無所愧是以鬼神用饗國受其福祝史與焉與受國福其所以蕃祉老壽者為信君使也其言忠信于鬼神其適遇滛君外内頗邪上下怨疾動作辟違從欲厭私使私情厭足高臺深池撞鍾舞女斬刈民力輸掠其聚掠奪取也以成其違不䘏後人暴虐滛縱肆行非度無所還忌還猶顧也不思謗讟不憚鬼神神怒民痛無悛於心其祝史薦信是言罪也以實白神是言君罪其蓋失數美是矯誣也蓋掩也進退無辭則虚以求媚作虚詞以求媚於神是以鬼神不饗其國以禍之祝史與焉所以夭昏孤疾者為暴君使也其言僣嫚於鬼神公曰然則若之何對曰不可為也言非誅祝史所能治山林之木衡鹿守之澤之萑蒲舟鮫守之藪之薪蒸虞候守之海之鹽蜃祈望守之衡鹿舟鮫虞候祈望皆官名也言公專守山澤之利不與民共縣鄙之人入從其政偪介之闗暴征其私介隔也廹近國都之闗言邊鄙既入服政役又為近闗所征税任暴奪其私物承嗣大夫强易其賄承嗣大夫世位者布嘗無藝藝法制也布政無制徵歛無度宫室日更滛樂不違違去也内寵之妾肆奪於市肆放也外寵之臣僣令於鄙詐為敎令於邊鄙私欲養求不給則應養長也所求不給則應之以罪民人苦病夫婦皆詛祝有益也詛亦有損聊攝以東聊攝齊西界也平原聊城縣東北有攝城姑尤以西姑尤齊東界也姑水尤水皆在城陽郡東南入海其為人也多矣雖其善祝豈能勝億兆人之詛十萬曰億十億曰兆君若欲誅於祝史修德而後可公說使有司寛政毁闗去禁薄歛已責除逋責景公田於沛至自田晏子侍於遄臺子猶馳而造焉子猶梁丘據公曰唯據與我和夫晏子對曰據亦同也焉得為和公曰和與同異乎對曰異和如羮焉水火醯醢鹽梅以烹魚肉燀之以薪燀炊也宰夫和之齊之以味濟其不及以洩其過濟益也洩減也君子食之以平其心君臣亦然亦如羮君所謂可而有否焉否不可也臣獻其否以成其可獻君之否以成其可君所謂否而有可焉臣獻其可以去其否是以政平而不干民無争心故詩曰亦有和羮既戒既平詩頌殷中宗言中宗能與賢者和濟可否其政如羮敬戒且平和羮備五味異於大羮鬷假無言時靡有争鬷總也假大也言總大政能使上下皆如和羮先王之濟五味濟成也和五聲也以平其心成其政也聲亦如味一氣湏氣以動二體舞者有文武三類風雅頌四物雜用四方之物以成器五聲宫商角徵羽六律黄鍾太簇姑洗㽔賔夷則無射也陽聲為律隂聲為吕比十二月氣七音周武王伐紂自午及子凡七日武王因此以數合之以聲昭之故以七同其數以律和其聲謂之七音八風八方之風九歌九功之德皆可歌也六府三事謂之九功以相成也言此九者合然後相成為和樂清濁大小長短疾徐哀樂剛柔遲速高下出入周䟽以相濟也周宻也君子聽之以平其心心平德和故詩曰德音不瑕心平則德音無瑕闕今據不然君所謂可據亦曰可君所謂否據亦曰否若以水濟水誰能食之若琴瑟之專一誰能聽之同之不可也如是飲酒樂公曰古而無死其樂若何晏子對曰古而無死則古之樂也君何得焉昔爽鳩氏始居此地爽鳩氏少皥之司冦也季萴因之季萴虞夏諸侯代爽鳩氏者有逄伯陵因之逄伯陵殷諸侯姜姓蒲姑氏因之蒲姑氏殷周之間代逄公者而後大公因之古若無死爽鳩氏之樂非君所願也齊侯甘於所樂志於不死晏子稱古以節其情願又景公時有彗星齊侯使禳之晏子曰無益也祗取誣焉誣欺也天道不謟謟疑也不二其命若之何禳之且天之有彗也以除穢也君無穢德又何禳焉若德之穢禳之何損詩曰惟此文王小心翼翼昭事上帝聿懷多福厥德不回以受方國翼翼共也聿惟也回違也言文王德不違天人故四方之國歸往之也君無違德方國將至何患於彗詩曰我無所監夏后及商用亂之故民卒流亡逸詩也言追監夏商之亡皆以亂故若德回亂民將流亡祝史之為無能補也公說乃止又景公與晏子坐於路寢公歎曰美哉室其誰有此乎景公自知德不能久有國故歎也晏子曰敢問何謂也公曰吾以為在德對曰如君之言其陳氏乎陳氏雖無大德而有施於民豆區釜鍾之數其取之公也薄以公量收其施之民也厚以私量貸公厚歛焉陳氏厚施焉民歸之矣詩曰雖無德與女式歌且舞義取雖無大德要有喜說之心欲歌舞之式用也陳氏之施民歌舞之矣後世若少惰陳氏而不亡則國其國也已公曰善哉是可若何對曰惟禮可以已之在禮家施不及國民不遷農不移工賈不變常守業士不濫不失職官不滔滔慢也大夫不收公利不作福公曰善哉我不能矣吾今而後知禮之可以為國也對曰禮之可以為國也乆矣與天地竝有天地則禮義興君令臣共父慈子孝兄愛弟恭夫和妻柔姑慈婦聽禮也君令而不違臣共而不二父慈而敎子孝而箴箴諫也兄愛而友弟敬而順夫和而義妻柔而正姑慈而從從不自專婦聽而婉婉順也禮之善物也公曰善哉寡人今而後聞此禮之上也對曰先王所禀於天地以為其民是以先王上之禀受也大宰犯楚大夫也宋華氏之亂晉曹衛救宋敗華氏圍諸南里楚薳越帥師將逆華氏大宰犯諫曰諸侯唯宋事君今又争國釋君而臣是助無乃不可乎王曰而告我也後既許之矣子家駒魯大夫也魯昭公將弑季氏傳言弑者從昭公之詞告子家駒曰季氏為無道僣於公室久矣諸侯稱公室吾欲弑之如何昭公素畏季氏意者以為如人君故言弑子家駒曰諸侯僣於天子大夫僣於諸侯久矣昭公曰吾何僣矣哉失禮成俗不自知也子家駒曰設兩觀禮天子諸侯臺門天子外關兩觀諸侯内闗一觀乘大路禮天子大路諸侯路車大夫大車士餙車朱干干楯也以朱飾楯玉戚戚斧也以玉飾斧以舞大夏大夏夏樂也周所以舞于樂者王者始起未制作之時取先王之樂與己同者假以風化天下天下大同乃自作樂取夏樂者與周俱文也王者舞六樂於宗廟之中舞先王之樂明有法也舞已之樂明有制也舞四夷之樂大德廣及之也東夷之樂曰佅離南夷之樂曰任西夷之樂曰禁北夷之樂曰昧八佾以舞大武此皆天子之禮也且夫牛馬維婁繫馬曰維繫牛曰婁委已者也委食已者而柔焉柔順季氏得民衆久矣季氏專賞罰得民衆之心久矣民順從之猶牛馬之於委食已者君無多辱焉恐民不欲從君命而為季氏用反逐君故云爾子家駒上説正法下引時事以諫者欲使昭公先自正乃正季氏昭公不從其言終敗焉果反為季氏所逐公子西楚大夫也吳子使徐人執掩餘使鍾吾人執燭庸二十七年奔故二公子奔楚楚子大封而定其居大封田土而定其所徙之居使監馬尹大心逆吳公子使居養二子奔楚楚使逆之於境也養即所封之邑莠尹然左司沈尹戍城之城養取其城父與胡田以與之胡田故胡之地將以害吳也子西諫曰吳光新得國而親其民視民如子辛苦同之將用之也若好吾邉疆使柔服焉猶懼其至柔服謂不與吳搆怨吾又彊其仇以重怒之無乃不可乎仇謂二公子吳周之胄裔也而棄在海濱不與姬通今而始大比於諸華光又甚文將自同於先王先王謂大王王季亦自西戎始比諸華不知天將以為虐乎使翦䘮吳國而封大異姓乎其抑亦將卒以祚吳乎其終不遠矣言其事行可知不久我盍姑億吾鬼神億安也而寜吾族姓以待其歸善惡之歸將焉用自播揚焉播揚猶勞動也王弗聽吳子怒執鍾吾子遂伐徐防山以水之防壅山水以灌徐滅徐又昭王之奔隨也將渉於成臼江夏竟陵縣西有臼水出聊屈山西南入漢藍尹亹渉其帑亹楚大夫不與王舟及寧王欲殺之寜安定也子西曰子嘗惟思舊怨以敗君何效焉王曰善使復其所吾以志前惡惡過也子綦楚司馬也楚昭王欲之荆臺㳺子綦諫曰荆臺之㳺左洞庭之波右彭蠡之水南望獵山下臨方淮其使人遺老而忘死也王不可㳺也公叔發衛大夫公叔文子也魯伐鄭不假道於衛衛侯怒使彌子瑕追之公叔文子老矣輦而如公曰尤人而效之非禮也昭公之難君將以文之舒鼎衛文公之鼎成之昭兆寳龜定之鞶鑑鞶帶而以鏡為餙也今西方羗胡猶然古之遺服茍可以納之擇用一焉公子與二三臣之子諸侯茍憂之將以為之質為質求納魯昭公此群臣之所聞也今將以小忿蒙舊德蒙復也無乃不可乎大姒之子大姒文王妃唯周公康叔為相睦也而效小人以棄之不亦誣乎天將多陽虎之罪以斃之君姑待之若何乃止止不伐魯師伍員吳大夫吳王夫差敗越於夫椒夫椒吳郡縣西南太湖中椒山遂入越越子以甲楯五千保於㑹稽上㑹稽山也在㑹稽山隂縣南使大夫種因吳大宰嚭以行成吳子將許之伍員曰不可臣聞之樹德莫如滋去疾莫如盡昔有過澆殺斟灌以伐斟鄩澆寒浞子封於過者二斟夏同姓諸侯襄四年傳曰澆用師滅斟灌滅夏后相夏后相啓孫也后相失國依於二斟復為澆所滅后緍方娠逃出自竇后緍相妻娠懷身也歸於有仍后緍有仍氏女生少康焉為仍牧正牧官之長惎澆能戒之惎毒也戒備也澆使椒求之椒澆臣逃奔有虞為之庖正以除其害虞舜後諸侯也梁國有虞縣庖正掌膳羞之官賴此以得除已害虞思於是妻之以二姚思有虞君也虞思以二女妻少康姚虞姓而邑諸綸綸虞邑有田一成有衆一旅方十里為成五百人為旅能布其德而兆其謀兆始以收夏衆撫其官職襄四年傳曰靡自有鬲氏收二國之燼以滅浞而立少康使女艾諜澆女艾少康臣諜謀也使季杼誘豷豷澆弟也季杼少康子后杼也遂滅過戈復禹之績過澆國戈豷國祀夏配天不失舊物物事也今吳不如過而越大於少康或將豐之不亦難乎言與越成是使越豐大必為吳難句踐能親而務施施不失人所加惠賜皆得其人親不棄勞推親愛之誠則不遺小勞與我同壤而世為仇讎於是乎克而弗取將又存之違天而長冦讎猶言天與不取後雖悔之不可食已食消也已止也姬之衰也日可俟也姬吳姓言可計日而待介在蠻夷而長冦仇以是求伯必不行矣弗聽吳王夫差乃告諸大夫曰孤將有大志於齊欲伐齊吾將許越成而無拂吾慮拂絶若越既改吾又何求若其不改反行吾振旅焉伐齊反振旅而討之也申胥諫曰不可許也申胥即伍員也夫越非實忠心好吳也又非懾畏吾甲兵之強也大夫種勇以善謀將還玩吳國於股掌之上以得其志還轉玩弄也脇本曰股夫固知君王之蓋威以好勝也蓋猶尚也故婉約其辭以從逸王志婉順約卑從隨也使滛樂於諸夏之國以自傷使吾甲兵鈍弊民人離落而日以憔悴離畔落殞憔悴疲病也然後安受吾燼夫越王好信以愛民四方歸之年穀時熟日長炎炎炎炎進貌及吾猶可以戰也為虺弗摧為蛇將若何虺小蛇傳曰封豕長蛇吳王曰大夫奚隆於越奚何隆盛越曾足以為大虞乎虞度若無越則吳何以春秋曜吾軍士乃許之成夫差既許越成乃大戒師徒將以伐齊申胥進諫曰越之在吳也猶人之有腹心之疾也今王非越是圖而齊魯以為憂事夫齊魯譬諸疥癬也疥癬在外為害微豈能渉江淮而與我争此地哉將必越實有吳土壤地接而越修德也王盍亦鑑於人無鑑於水鑑鏡也以人為鏡見成敗以水為鏡見形而已書曰人無於水鑑當於民鑑昔楚靈王不君不得君道其臣箴諫以不入入受乃築臺於章華之上章華地名闕為石郭陂漢以象帝舜闕穿陂壅也舜葬九疑其山體水旋其丘故壅漢水使旋石郭以象之也罷弊楚國以間陳蔡間候也候其隙而取之魯昭八年楚滅陳十一年滅蔡不脩方城之内方城楚北山踰諸夏而圖東國諸夏陳蔡東國徐夷吳越也三歲於沮汾以服吳越沮汾水名楚東鄙沮汾之間乾谿也魯昭六年楚令尹子蕩帥師伐吳師于豫章次于乾谿其民不忍饑勞之殃三軍叛王於乾谿殃害也民罷國亂中外叛潰事在魯昭十三年王親獨行屏營仿偟於山林之中三日乃見其㳙人疇涓人今中涓也疇名王呼之曰余不食三日矣疇趨而進王枕其股以寢於地王寐疇枕王以墣而去墣塊王覺而無見也乃匍匐將入於棘闈棘闈不納也棘楚邑闈門乃入芋尹申亥氏焉申亥楚大夫芋尹無宇之亥子傳曰王沿夏將入鄢申曰吾父再干命王弗誅惠孰大焉乃求王遇諸棘闈也王縊申亥負王以歸而土埋之其室傳曰王縊申亥以其二女殉而葬也此志也豈遽忘於諸侯之耳乎志記也言此事皆見記於諸侯諸侯之耳尚未忘今王既變鯀禹之功王夫差也變易也魯語禹能以德修鯀之功也而高高下下以罷民於姑蘇高高起臺榭下下深汙池姑蘇臺名在吳西近湖天奪吾食都鄙薦饑天奪吾食稻蟹也都國鄙邉邑薦重也今王將狼天而伐齊狼逼夫吳民離矣有離畔心體有所傾辟如群獸然一介負矢將百群皆奔傾傷也言衆獸群聚其中一介被矢則百群皆走以言吳民臨陳就戰少有傾傷亦復然王其無方收也方道收還越人必來襲我王雖悔之其猶有及乎王弗聽吳將伐齊越子率其衆以朝焉王及列士皆有饋賂吳人皆喜唯子胥懼曰是豢吳也夫諫曰越在我心腹之疾也壤地同而有欲於我夫其柔服求濟其欲也不如早從事焉得志於齊猶獲石田也無所用之越不為沼吳其冺矣使醫除疾而曰必遺類焉者未之有也盤庚之誥曰其有顛越不共則殄滅無遺育無俾易種于兹新邑是商所以興也今君易之將以求大不亦難乎弗聽鮑文子齊大夫魯陽虎出奔齊請師以伐魯曰三加必取之三加兵於魯齊侯將許之鮑文子諫曰臣嘗為𨽻於施氏矣施氏魯大夫文子鮑國也成十七年齊人召而立之至今七十四歲於是文子盖九十餘矣魯未可取也上下猶和衆庶猶睦能事大國大國晉也而無天菑若之何取之陽虎欲勤齊師也齊師罷大臣必多死亡已於是乎奮其詐謀夫陽虎有寵於季氏而將殺季孫以不利魯國而求容焉求自容親富不親仁君焉用之君富於季氏而大於魯國兹陽虎所欲傾覆也魯免其疾而君又收之無乃害乎逄滑為陳大夫吳之入楚也使召陳懷公懷公朝國人而問焉曰欲與楚者右欲與吳者左陳人從田無田從黨都邑之人無田者隨黨而立不知所與故直從所居田在西者居右在東者居左逄滑當公而進當公不左不右曰臣聞國之興也以福其亡也以禍今吳未有福楚未有禍楚未可棄吳未可從而晉盟主也若以晉辭吳若何公曰國勝君亡非禍而何楚為吳所勝對曰國之有是多矣何必不復小國猶復况大國乎臣聞國之興也視民如傷是其福也如傷恐驚動其亡也以民為土芥是其禍也芥草也楚雖無德亦不艾殺其民吳日敝於兵暴骨如莾草之生於曠野莾莾然故曰草莾而未見德焉天其或者正訓楚也使懼而改過禍之適吳其何日之有言今至陳侯從之册府元龜巻七百四十二
