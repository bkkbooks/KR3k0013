body:
  text: 册府元龜卷七百五十宋王欽若等撰陪臣部奔亡賜玦而去禮開待放之端越境以亡傳載出奔之迹葢夫五等疏爵千乗承家必有陪臣用司厥政固宜盡瘁以委質陳力以事公競獻其忠各専其霸其或守節不固為徳靡修當聽任之不明忠邪之並進君臣道替上下相疑憂讒搆之言懼誅殛之罪事勢斯窘奔亡是圖其或包藏異謀出成戎首之釁退避時難反無討賊之功載之信書甚可醜也魯隱公元年鄭共叔段出奔共國今汲郡共縣公孫滑出奔衛公孫滑共叔段之子衛人為之伐鄭取廪延莊公九年齊人殺襄公初襄公立無常鮑叔牙曰君使民慢亂將作矣奉公子小白出奔莒亂作管夷吾召忽奉公子糾奔魯十二年宋南宫長萬弑閔公殺大夫仇牧及太宰督立子游宋公子羣公子奔蕭公子御説奔亳宋莊公子十六年鄭厲公治與雍糾之亂者魯桓公十五年鄭祭仲専鄭伯患之使其壻雍糾殺之糾妻告祭仲祭仲殺雍糾厲公奔蔡魯莊十四年鄭伯復入殺公子閼刖強鉏二子祭仲黨公父定叔出奔衛共叔段之孫定諡三年而復之曰不可使共叔無後於鄭二十二年春陳人殺其太子御冦陳公子完與顓孫奔齊公子完顓孫皆御冦之黨顓孫自齊奔魯三十二年魯莊公疾問後於叔牙莊公弟對曰慶父材葢欲進其同母兄問於季友對曰臣以死奉般般莊公子季友莊公母弟故欲立般八月公薨子般即位次于黨氏即喪位次舍也共仲使圉人犖賊子般於黨氏共仲慶父成季奔陳即季友也閔公元年八月季子來歸二年八月共仲使卜齮賊公於武闈宫中小門謂之闈成季以僖公適邾共仲奔莒乃入立之以賂求共仲於莒莒人歸之及密使公子魚請公子魚奚斯也不許哭而往共仲曰奚斯之聲也乃縊十二月鄭大夫髙克奔陳克好利而不顧其君文公惡之使帥師次于河上久而弗召師潰而歸髙克奔陳僖公五年晉獻公使寺人披伐蒲蒲城人欲戰重耳不可曰保君父之命而享其生祿享受也保猶恃也於是乎得人以祿致衆有人而校罪莫大焉校報也吾其奔也遂奔狄從者狐偃趙衰衰趙夙弟顛頡魏武子武子魏犨司空季子胥臣臼季也其時狐毛賈佗皆從而獨舉此五人賢而有大功者十四年四月晉人殺㔻鄭子㔻豹奔秦十六年鄭殺太子子華子華弟子臧出奔宋二十八年晉文公盟諸侯于踐土衛侯出奔楚遂適陳使元咺奉叔武以受盟奉使攝君事或訴元咺於衛侯曰立叔武矣其子角從公公使殺之角元咺子咺不廢命奉夷叔以入守夷諡晉人復衛侯衛侯先期入公子歂犬華仲前驅叔武將沐聞君至喜捉髪走出前驅射而殺之元咺出奔晉三十年秦伯使杞子逄孫楊孫戍鄭三子秦大夫三十一年鄭洩駕惡公子瑕鄭伯亦惡之故公子瑕出奔楚三十二年杞子自鄭使告于秦曰鄭人使我掌其北門之管若濳師以来國可得也穆公召孟明西乞白乙出師於東門之外及滑鄭商人弦髙使遽告于鄭鄭穆公使視客館則束載厲兵秣馬矣嚴兵待秦師使皇武子辭焉曰吾子淹久於敝邑惟是脯資餼牽竭矣為吾子之將行也示知其情鄭之有原圃猶秦之有具囿也吾子取其麋鹿以閒敝邑若何杞子奔齊逄孫楊孫奔宋文公六年春使狐射姑狐偃子賈季也將中軍趙盾佐之陽處父改蒐于董易中軍易以趙盾為帥射姑佐陽子成季之屬也處父常為趙衰屬大夫故黨于趙氏九月賈季使續鞫居殺陽處父十一月晉殺續簡伯簡伯鞫居也賈季奔狄八月晉襄公卒太子少太子靈公也晉人以難故欲立長君趙孟使先蔑迎公子雍于秦穆嬴日抱太子以啼于朝趙孟與諸大夫皆患穆嬴且畏偪畏國人以大義来偪巳乃背先蔑立靈公而敗秦師先蔑奔秦士㑹從之先蔑之使也荀林父止之曰夫人太子猶在而外求君此必不行子以疾辭若何不然將及禍將及巳攝卿以往可也何必子同官為寮吾嘗同寮敢不盡心乎弗聽為賦板之三章義取芻蕘之言猶不可忽况同寮乎僖二十八年林父將中行先蔑將左行又弗聽及亡荀伯盡送其孥及其器用財賄於秦曰為同寮故也八年十月魯公孫敖穆伯也奔莒初穆伯娶于莒曰戴已生文伯其娣聲已生惠叔穆伯公孫敖也文伯穀也惠叔難也戴已卒又聘于莒莒人以聲已辭則為襄仲聘焉襄仲公孫敖從父昆弟七年冬徐伐莒莒人来請盟見伐故欲見援穆伯如莒莅盟且為仲逆及鄢陵登城見之美鄢陵莒邑自為娶之仲請攻之公將許之叔仲惠伯諫而止及是穆伯如周弔喪不至以幣奔莒從巳氏焉巳氏莒女魯人立文伯穆伯之子榖也穆伯生二子于莒而求復文伯以為請襄仲使無朝聽命復而不出不得使與聽政事終寢於家三年而盡室以復適莒是冬宋司城蕩意諸奔魯宋襄公夫人襄王之姊也昭公不禮焉昭公適祖母夫人因戴氏之族華樂皇皆戴族以殺襄公之孫孔叔公孫鍾離及大司馬公子卭皆昭公之黨也司城蕩意諸来奔效節於府人而出效猶致也意諸公子蕩之孫公以其官逆之皆復之亦書以官皆貴之也卿違從大夫之位公賢其效節故以本官逆之請宋而復之司城官屬悉來奔故言皆復之十二年春郕伯卒初郕太子朱儒自安於夫鍾國人弗狥順也郕伯卒太子以夫鍾與郕邽來奔郕邽亦邑公以諸侯逆之非禮也非公寵叛人十三年邾文公卒文公元妃齊姜生定公二妃晉姬生捷菑文公卒邾人立定公捷菑奔晉十四年九月宋髙哀為蕭封人以為卿蕭宋附庸仕附庸還升為卿不義宋公而出遂來奔出而待放從放所來故曰遂書曰宋子哀來奔貴之也貴其不食汚君之祿避禍連也宣公元年晉人討不用命者放胥甲父于衛胥甲下軍佐文十二年戰河曲不肯薄秦于險而立胥克克甲之子先辛奔齊辛甲之屬大夫二年二月鄭公子歸生伐宋華元帥師戰于大棘將戰華元殺羊食士其御羊斟不與及戰曰疇昔之羊子為政今日之事我為政與入鄭師故敗宋人以兵車百乗文馬百駟畵馬為文四百匹以贖華元于鄭半入華元逃歸立于門外告而入告宋城門而後入言不茍見叔牂曰子之馬然也叔牂羊斟也卑賤得先歸華元見而慰之對曰非馬也其人也叔牂知前言已顯故不敢讓罪既合而來奔叔牂言畢遂奔魯合猶荅也十年夏齊惠公卒崔杼有寵於惠公髙國畏其逼也髙國二家齊正卿公卒而逐之奔衛十八年公孫歸父如晉還至笙遂奔齊歸父以襄仲之立公也有寵歸父襄仲子欲去三桓以張公室時三桓強公室弱故欲去之以張大公室與公謀而聘于晉欲以晉人去之冬公薨季文子言於朝曰使我殺適立庶以失大援者仲也夫適謂子惡齊外甥襄仲殺之而立宣公南通于楚既不能固又不能堅事齊晉故云失大援也臧宣叔怒曰當其時不能治也後之人何罪子欲去之許請去之宣叔文仲子武仲父許其名也時為司冦主行刑言子自以歸父害巳欲去者許請為子去之也遂逐東門氏襄仲居東門故曰東門氏子家還及笙子家歸父壇帷復命於介除地為壇而張帷介副也將去使介反命於君既復命袒括髪以麻約髪即位哭三踊而出依在國喪禮設哭位公薨故遂奔齊成公二年楚使申公巫臣聘于齊巫臣盡室以行室家盡去及鄭使介反幣而以夏姬行將奔齊齊師新敗曰吾不處不勝之國遂奔晉晉人使為邢大夫七年冬衛孫林父出奔齊十四年春衛定公如晉晉侯強見孫林父焉強見欲歸之定公不可夏衛侯既歸晉侯使郤犨送孫林父而見之衛侯見而復之復林父位十三年曹宣公卒於師公子負芻守成公也殺太子而自立諸侯將見子臧於王而立之子臧辭曰前志有之曰聖逹節次守節下失節為君非吾節也雖不能聖敢失守乎遂逃奔宋十五年諸侯㑹于戚討曹成公討其殺太子而自立執而歸諸京師諸侯將見子臧於王而立之子臧逃奔宋十六年宋殺其大夫山於是華元為右師魚石為左師蕩澤為司馬華喜為司徒公孫師為司城向為人為大司冦鱗朱為少司冦向帶為太宰魚府為少宰蕩澤弱公室殺公子肥華元曰我為右師君臣之訓師所司也今公室卑而不能正吾罪大矣不能治官敢賴寵乎乃出奔晉魚石止華元於河上乃反使華喜公孫師帥國人攻蕩氏殺子山魚石向為人鱗朱向帶魚府出舍于睢上畏同族罪及將出奔華元止之不可遂出奔楚十七年齊使國勝告難于晉待命于清勝國佐子齊欲討國佐故留其子于外十八年齊殺國佐于内宫之朝使清人殺國勝國弱來奔弱勝之子王湫奔萊襄公六年宋華弱奔魯華弱與樂轡少相狎長相優又相謗也狎親習也優調戯也子蕩怒以弓梏華弱于朝子蕩樂轡也張弓以貫其頸若械之在手故曰梏平公見之曰司武而梏于朝難以勝矣司武司馬言其懦弱不足以勝敵遂逐之華弱来奔七年鄭子駟使賊夜弑僖公八年羣公子以僖公之死也謀子駟子駟先之辟殺子狐子熈子侯子干辟罪也加罪以戮之孫擊孫惡出奔衛二孫子狐之子十四年夏諸侯之大夫從晉侯伐秦至棫林欒黶先還諸軍從之晉人謂之遷延之役欒鍼曰此役也報櫟之敗也役又無功晉之耻也吾有二位于戎路欒鍼欒黶弟也二位謂黶將下軍鍼為戎右敢不耻乎與士鞅馳秦師死焉士鞅反鞅士匄子欒黶謂士匄曰余弟不欲往而子召之余弟死而子來是而子殺余之弟也弗逐余亦將殺之士鞅奔秦欒黶汰侈誣逐士鞅也是年衛孫林父自戚入見蘧伯玉曰君之暴虐子所知也大懼社稷之傾覆將若之何對曰君制其國臣敢奸之奸猶犯也雖奸之庸知愈乎言逐君更立知當差否遂行從近關出愳難作欲速出竟十七年宋華閲卒華臣弱臯比之室臣閲之弟臯比閱之子弱侵易之使賊殺其宰華吴賊六人以鈹殺諸盧門合左師之後盧門宋城門合向戍邑後屋左師懼曰老夫無罪賊曰臯比私有討於吴遂幽其妻幽吴妻也曰畀余以大璧畀與也宋公聞之曰臣也不唯其宗室是暴大亂宋國之政必逐之左師曰臣也亦卿也大臣不順國之耻也不如葢之乃舍之左師為巳短䇿茍過華臣之門必騁惡之十一月甲午國人逐瘈狗瘈狗入於華臣氏國人從之華臣懼遂奔陳華臣心不自安見逐狗而驚走十九年鄭子孔之為政也專國人患之子展子西率國人伐之殺子孔而分其室子然子孔宋子之子也子然子革父士子孔圭媯之子也宋子圭媯皆鄭穆公妾士子孔子良父圭媯之班亞宋子而相親也士子孔亦相親也子然士子孔卒司徒孔實相子革子良之室司徒孔實與二父相親故相助其子三室如一言同心故及於難故二子并及難子革子良出奔楚子革為右尹子革即鄭丹二十年蔡公子爕欲以蔡之晉背楚蔡人殺之公子履其母弟也故出奔楚陳慶虎慶寅畏公子黄之偪二慶陳卿恐黄偪奪其政愬諸楚曰與蔡司馬同謀同欲之晉楚人以為討討責陳公子黄出奔楚奔楚自理二十一年正月邾庻其以漆閭丘來奔二邑在高平南平陽縣東北有漆鄉西北有顯閭亭以邑出為叛適魯是春齊侯討公子牙之黨執公子買於句瀆之丘公子鉏奔魯叔孫還奔燕二子齊公族秋晉欒盈出奔楚初欒桓子娶於范宣子生懷子桓子欒黶懷子盈也范鞅以其亡也怨欒氏十四年欒黶強逐范鞅使奔秦故與欒盈為公族大夫而不相能桓子卒欒祁與其老州賔通欒祁桓子妻范宣子女盈之母也范氏堯後祁姓幾亡室矣言亂甚懷子患之祁懼其討也愬諸宣子曰盈將為亂以范氏為死桓主而専政矣桓主欒黶曰吾父逐鞅也不怒而以寵報之謂宣子不為黶責怒鞅而反與鞅寵位又與吾同官而専之同為公族大夫而鞅専其權勢吾父死而益富死吾父而専于國有死而已吾蔑從之矣言宣子専政盈欲以死作難其謀如是懼害于主吾不敢不言范鞅為之徴證其有此懐子好施士多歸之宣子畏其多士也信之懐子為下卿下軍佐宣子使城著而遂逐之著晉邑在外易逐盈出奔楚知起中行喜州綽邢蒯出奔齊四子晉大夫皆欒氏之黨也二十三年夏邾畀我奔魯畀我是庶其之黨同有竊邑叛君之罪十月魯臧孫紇奔齊初季武子無適子公彌長而愛悼子彌公鉏悼子紇也欲立之訪于臧紇臧紇曰飲吾酒吾為子立之季孫飲大夫酒臧紇為客為上賔既獻巳獻酒臧孫命北靣重席新樽潔之召悼子降逆之大夫皆起臧孫下迎悼子及旅而召公鉏獻酬既畢而通行為旅使與之齒使從庶子之禮列在悼子之下季孫失色恐公鉏不從季氏以公鉏為馬正馬正家司馬孟孫惡臧孫不相善季孫愛之愛其成巳志孟孫之御騶豐㸃好羯也羯孟莊子之庶子孺子秩之弟孝伯曰從吾言必為孟孫為孟孫後再三云羯從之孟莊子疾豐㸃謂公鉏茍立羯請讐臧氏使孟氏與公鉏共憎臧孫公鉏謂季孫曰孺子秩固其所也若羯立則季氏信有力於臧氏矣弗應孟孫卒公鉏奉羯立於户側户側䘮主季孫曰秩焉在公鉏曰羯在此矣遂立羯秩奔邾孟氏閉門告於季孫曰臧氏將為亂不使我葬不使孟孫得成葬禮季孫不信臧孫聞之戒戒為備也冬十月孟氏將辟藉除於臧氏辟穿藏也於臧氏借人除葬道臧孫使正夫助之正夫遂正除於東門甲從己而視之畏孟氏故從甲士視作者孟氏又告季孫季孫怒命攻臧氏見其有甲故臧紇斬鹿門之關以出奔邾魯南城東門臧孫自邾如防防臧孫邑致防而奔齊是月晉人克欒盈于曲沃盡殺欒氏之族黨欒魴出奔宋二十四年冬陳人復討慶氏之黨鍼宜咎出奔楚二十五年齊崔杼弑其君光盧蒲癸奔晉王何奔莒二子莊公黨閭丘嬰以帷縳其妻而載之與申鮮虞乗而出二子莊公近臣鮮虞推而下之下嬰妻也曰君昏不能匡危不能救死不能死而知匿其暱匿藏也暱親也其誰納之行及弇中將舍弇中狹道嬰曰崔慶其追我鮮虞曰一與一誰能懼我言雖道狹衆無所用遂舍枕轡而寢恐失馬也食馬而食駕而行出弇中謂嬰曰速驅之崔慶之衆不可當也遂奔魯二十六年春衛獻公使子鮮獻公母弟與甯喜言茍反政由寗氏祭則寡人寗喜告蘧伯玉伯玉曰瑗不得聞君之出敢聞其入十四年孫氏欲逐公瑗從近關出遂行從近關出夏齊烏餘以廪丘奔晉烏餘齊大夫二十七年夏衛侯之弟鱄出奔晉子鮮也衛殺寗喜子鮮曰逐我者出謂孫林父納我者死謂甯喜賞罰無章何以沮勸君失其信而國無刑不亦難乎難以治國且鱄實使之使甯喜納君遂出奔晉公使止之不可不肯留及河又使止之止使者而盟於河誓不還託於木門木門晉邑不向衛國而坐怨之深也木門大夫勸之仕不可曰仕而廢其事罪也從之昭吾所以出也將誰愬乎從之謂治其事也事治則明已出欲仕無所自愬吾不可以立於人之朝矣終身不仕自誓不仕終身公喪之如税服終身税即繐也喪服繐纕裳縷細而希非五服之裳本無月數痛愍子鮮故特為此服無月數而獻公尋薨故言終身九月齊崔明奔魯初崔杼生成及強而寡偏喪曰寡特也娶東郭姜生明東郭姜以孤入曰棠無咎無咎棠公之子與東郭偃相崔氏偃姜之弟崔成有疾而廢之有惡疾也而立明成請老于崔崔子許之偃與無咎弗予曰崔宗邑也必在宗主宗邑宗廟所在宗主為崔明成與強怒殺東郭偃棠無咎崔子怒遂見慶封慶封曰請為子討之使盧蒲嫳攻崔氏遂滅崔氏殺成與強而盡俘其家其妻縊嫳復命于崔子且御而歸之至則無歸矣乃縊崔明辟諸大墓開先人之冢藏之遂奔魯二十八年夏衛人討甯氏之黨故石惡出奔晉冬齊慶封來奔叔孫穆子食慶封慶封汜祭禮食有祭示有所先也汜祭逺散所祭不共穆子不説使工為之誦茅鴟工樂師茅鴟逸詩刺不敬亦不知既而齊人來讓讓魯受慶封封奔吴二十九年九月齊公孫蠆公孫竈放其大夫髙止於北燕蠆子尾竈子雅放者宥之以逺故髙竪以盧叛竪髙止子十月閭丘嬰帥師圍盧髙竪曰茍使髙氏有後請致邑還邑於君齊人立敬仲之曽孫酀敬仲髙傒良敬仲也良猶賢也十一月髙竪致盧而出奔晉晉人城緜而寘旃晉人善其致邑三十年鄭良霄出奔許鄭伯有良霄也耆酒為窟室窟室地室而夜飲酒擊鐘焉朝至未巳朝者曰公焉在家臣故謂伯有為公其人曰吾公在壑谷壑谷窟室皆自朝布路而罷布路分散既而朝伯有朝鄭君則又將使子晳如楚歸而飲酒子晳以駟氏之甲伐而焚之伯有奔雍梁雍梁鄭地醒而後知之遂奔許是年鄭羽頡出奔晉為任大夫羽頡即馬師頡任晉縣今屬廣平郡雞澤之㑹在三年鄭樂成奔楚遂適晉羽頡因之與之比而事趙文子言伐鄭之説焉以宋之盟故不可宋盟約弭兵故昭公元年夏秦伯之弟鍼出奔晉后子有寵於桓如二君於景后子秦桓公子景公母弟鍼也其權寵如兩君其母曰弗去懼選選數也恐景公數其罪而加戮鍼適晉其車千乗冬楚公子圍問王疾縊而殺之楚右尹子干出奔晉宫廐尹子晳出奔鄭子干奔晉從車五乗叔向使與秦公子同食食祿同皆百人之餼百人卒也其祿足百人趙文子曰秦公子富謂秦鍼富強秩祿不宜與子干同叔向曰底祿以徳底致也徳均以年年同以尊公子以國不聞以富且夫以千乗去其國彊禦巳甚詩曰不侮鰥寡不畏強禦詩大雅侮陵也秦楚匹也使后子與子干齒以年齒為髙下而坐四年冬魯叔孫豹卒以餒死叔仲子謂季孫曰帶受命於子叔孫曰葬鮮者自西門不以夀終為鮮西門非魯朝正門季孫命杜洩杜洩叔孫氏家宰命使從西門杜洩曰卿喪自朝魯禮也從生存朝覲之正路吾子為國政未改禮而又遷之遷易也羣臣懼死不敢自也既葬而行善杜洩能辟禍五年夏莒牟夷以牟婁及防兹來奔牟夷非卿而書尊地也尊重也重地故書以名其人終為不義六年二月鄭罕朔奔晉鄭馬師氏與子皮氏有惡馬師氏公孫鉏之子罕朔也襄三十年馬師頡出奔公孫鉏代之為馬師與子皮俱同一族罕朔殺罕魋魋子皮弟罕朔奔晉韓宣子問其位於子産問朔可使在何位子産曰君之覉臣茍得容以逃死何位之敢擇卿違從大夫之位謂以禮去者降位一等罪人以其罪降罪重則降多古之制也朔於敝邑亞大夫也其官馬師也大夫位馬師職獲戾而逃唯執政所寘之得免其死為惠大矣又敢奸位宣子為子産之敏也使從嬖大夫為子産故使降一等不以罪降夏宋華合比出奔衛宋寺人柳有寵有寵于平公太子佐惡之華合比曰我殺之欲以求媚太子柳聞之乃坎用牲埋書詐為盟處而告公曰合比將納亡人之族亡人華臣也襄十七年奔衛既盟于北郭矣公使視之有焉遂逐合比合比奔衛八年七月齊子尾卒子旗欲治其室子旗欒施也欲并治子尾之家政殺梁嬰梁嬰子尾家宰八月逐子成子工子車三子齊大夫子尾之屬子成頃公子固也子工成之弟鑄也子車頃公之孫捷也皆來奔十年夏齊欒施奔魯齊惠欒髙氏皆耆酒欒髙二族皆出惠公信内多怨信婦人言故多怨彊於陳鮑氏而惡之惡陳鮑有告陳桓子曰子旗子良將攻陳鮑亦告鮑氏桓子授甲而如鮑氏遭子良醉而騁欲及子良醉故驅告鮑文子遂見文子文子鮑國則亦授甲矣使視二子子旗子良則皆將飲酒桓子曰彼雖不信彼傳言者聞我授甲則必逐我及其飲酒也先伐諸陳鮑方睦遂伐欒髙氏戰于稷稷祀后稷之處欒髙敗又敗諸莊莊六軌之道國人追之又敗諸鹿門鹿門齊城門欒施髙強來奔十二年十月公子憗出奔齊季平子立而不禮於南蒯蒯南遺之子季氏費邑宰南蒯謂子仲子仲公子憗吾出季氏而歸其室於公室季氏家財子更其位更代也我以費為公臣子仲許之南蒯語叔仲穆子且告之故穆子叔仲帶之子叔仲小也語以欲出季氏以不見禮故季悼子之卒也叔孫昭子以再命為卿悼子季武子之子平子父也傳言叔孫之見命乃在平子為卿之前及平子伐莒克之更受三命十年平子伐莒以功加三命昭子不伐莒亦以例加以三命叔仲子欲構二家欲構使相争謂平子曰三命踰父兄非禮也言昭子受三命自踰其父兄平子曰然故使昭子使昭子自貶黜昭子曰叔孫氏有家禍殺適立庶故婼也及此禍在四年若因禍以斃之則聞命矣言因亂討已不敢辭若不廢君命則故有著矣著位次昭子朝而命吏曰婼將與季氏訟書辭無頗頗偏也季孫懼而歸罪於叔仲子故叔仲小南蒯公子憗謀季氏憗告公而遂從公如晉憗子仲南蒯懼不克以費叛如齊子仲還及衛聞亂逃介而先介副使也及郊聞費叛遂奔齊十四年春南蒯奔齊南蒯之將叛也盟費人司徒老祁慮癸二人南蒯家臣偽廢疾使請于南蒯曰臣願受盟而疾興若以君靈不死請待間而盟間差也許之二子因民之欲叛也請朝衆而盟欲因合衆而作亂遂却南蒯曰羣臣不忘其君君謂季氏畏子以及今三年聽命矣子若弗圗費人不忍其君將不能畏子矣不能復畏子子何所不逞欲請送子送使出奔請期五日南蒯請期冀有變遂奔齊十五年夏蔡朝吴出奔鄭楚費無極害朝吴之在蔡也朝吴蔡大夫有功于楚平王故無極恐其有寵疾害之欲去之乃謂之曰王唯信子故處子于蔡子亦長矣而在下位辱必求之吾助子請請求上位又謂其上之人蔡人在上位者曰王唯信吴故處諸蔡二三子莫之如也而在其上不亦難乎弗圖必及于難蔡人逐朝吴朝吴出奔鄭二十年春楚太子建奔宋楚費無極言于楚子曰建與伍奢將以方城之外叛十九年令太子建居城父王信之執伍奢使城父司馬奮揚殺太子未至而使遣之知太子寃故遣令去太子奔宋無極曰奢之子材若在吴必憂楚國盍以免其父召之彼仁必來不然將為患王使召之曰來吾免而父棠君尚謂其弟員尚奢長子為棠邑大夫員尚弟子胥曰爾適吴我將歸死吾知不逮我能死爾能報爾其勉之伍尚歸楚人皆殺之員如吴夏曹公孫㑹自鄸出奔宋鄸曹邑秋衛齊豹殺公孟縶縶靈公兄公出如死鳥北宫氏之宰伐齊氏滅之公入八月公子朝禇師圃子玉霄子髙魴出奔晉皆齊氏黨冬宋華亥向寧華定出奔陳宋元公無信多私而惡華向華定華亥與向寜謀華亥偽有疾誘殺羣公子取太子欒與母弟辰公子地為質公亦取華亥向寧華定之子為質公子城平公子公孫忌樂舍舍樂喜孫司馬彊向宜向鄭宜鄭皆向戌子楚建楚平王之亡太子郳甲小邾穆公子出奔鄭公子宋大夫皆公黨避難出奔其徒與華氏戰八子之徒衆也敗子城子城奔晉十月公殺華向之質而攻之華向奔陳華登奔吴登費遂之子黨華向者三十一年冬邾黒肱以濫奔魯黒肱邾大夫定公元年叔孫成子逆昭公之喪於乾侯初昭公二十五年孫于齊子家懿伯從子家羈也叔孫逆公喪請見子家子子家子辭曰覊未得見而從君以出出時成子未為卿君不命而薨覊不敢見言未受昭公之命託辭以拒叔孫叔孫使告之曰公衍公為實使羣臣不得事君二子始謀逐季氏若公子宋主社稷則羣臣之願也宋昭公弟定公名凡從君出而可以入者將唯子是聽子家氏未有後季孫願與子從政此皆季孫之願也使不敢以告不敢叔孫成子名對曰若立君則有卿士大夫與守龜在覊弗敢知若從君者則貌而出者入可也貌出謂以義從公與季氏無實怨冦而出者行可也與季氏為㓂讐者自可去若覊也則君知其出也君昭公而未知其入也覊將逃也䘮及壊隤公子宋先入從公者皆自壊隤反從公諸臣皆反出奔四年冬吴子及楚人戰于柏舉楚師敗績楚嚢瓦出奔鄭初伍員為吴行人以謀楚楚之殺郤宛也伯氏之族出伯州犁之孫嚭為吴太宰以謀楚冬蔡侯吴子唐侯伐楚舍舟于淮汭自豫章與楚夾漢楚令尹囊瓦也子常濟漢而陳三戰子常知不可欲奔知吴不可勝十一月庚午二師陳于柏舉闔廬之弟夫槩王以其屬五千先擊子常之卒子常之卒奔楚師亂吴師大敗之子常奔鄭五年九月吴王闔廬弟夫槩王歸自立也以與王戰而敗自立為吴王號夫槩奔楚為棠谿氏八年夏晉師將盟衛侯于鄟澤趙簡子曰羣臣誰敢盟衛君者前年衛叛晉屬齊簡子意欲摧辱之渉佗成何曰我能盟之二子晉大夫將㰱渉佗捘衛侯之手及捥捘擠也血至衛侯怒叛晉晉人請改盟弗許十年晉人討衛之叛曰由渉佗成何捘衛侯手故於是執渉佗以求成于衛衛人不許晉人殺渉佗成何奔燕九年春宋公使樂大心盟于晉且逆樂祁之尸辭偽有疾乃使向巢如晉盟且逆子梁之尸巢向戍曽孫子明謂桐門右師出子明樂祁之子溷也右師樂大心子明族父也右師往到子明舍子明逐使出門去曰吾猶衰絰而子擊鐘何也忿其不逆父喪因責其無同族之恩右師曰喪不在此故也既而告人曰巳衰絰而生子余何故舍鐘巳子明也子明聞之怒言於公曰右師將不利戴氏樂氏戴公族不肯適晉將作亂不然無疾乃逐桐門右師樂大心奔曹十年秋宋公子地奔陳初公子地嬖蘧富獵地宋景公弟辰之兄也十一分其室而以其五與之與冨獵也公子地有白馬四公嬖向魋魋欲之向魋司馬桓魋也公取而朱其尾鬛以與之與魋也地怒使其徒抶魋而奪之魋懼將走公閉門而泣之目盡腫母弟辰曰子分室以與獵也而獨卑魋亦有頗焉子為君禮禮辟君也不過出竟君必止子公子地出奔陳公弗止辰為之請弗聽辰曰是我迋吾兄也迋欺也吾以國人出君誰與處冬母弟辰暨仲佗石彄出奔陳佗仲幾子彄褚師叚子皆宋卿衆之所望故言國人十四年春衛侯逐公叔戍與其黨故趙陽奔宋戍來奔夏衛北宫結來奔公叔戍之故也亦黨公叔戍秋衛世子蒯瞶出奔宋盡逐其黨故公孟彄出奔鄭自鄭奔齊哀公三年秋季孫有疾命正常曰無死正常桓子之寵臣欲付以後事故勅令勿從已死南孺子之子男也則以告而立之南孺子季桓子之妻言若生男告公而立之女也則肥也可肥康子也季孫卒康子即位既葬康子在朝在公朝也南氏生男正常載以如朝告曰夫子有遺言命其圉臣曰南氏生男則以告於君與大夫而立之今生矣男也敢告遂奔衛康子請退退辟位也公使共劉視之共劉魯大夫則或殺之矣乃討之討殺者召正常正常不反畏康子也冬十月晉趙鞅圍朝歌師于其南范中行所在荀寅伐其郛伐其北郭圍使其徒自北門入已犯師而出茍寅使在外救己之徒擊趙氏圍之北門用外内攻得出癸丑奔邯鄲四年九月晉趙鞅帥師圍邯鄲邯鄲降荀寅奔鮮虞十二月齊弦施㑹鮮虞人納荀寅於柏人五年春晉圍柏人荀寅士吉射奔齊秋齊景公疾使國惠子髙昭子立荼惠子國夏昭子髙張寘羣公子于萊萊齊東鄙邑齊景公卒冬十月公子嘉公子駒公子黔奔衛公子鉏公子陽生來奔皆景公子在萊者萊人歌之曰景公死乎不與埋三軍之事乎不與謀師乎師乎何黨之乎師衆也黨所也之往也稱諡葢葬後而為此歌哀羣公子失所六年夏六月陳乞鮑牧牧鮑國孫及諸大夫以甲入于公宫昭子聞之與惠子乗如公戰于莊敗髙國敗也莊六軌之道國人追之國夏奔莒遂及髙張晏圉弦施來奔圉晏嬰之子圉施不書非卿八月齊邴意兹來奔髙國之黨故十一年夏陳轅頗出奔鄭初轅頗為司徒賦封田以嫁公女封内之田悉賦税之有餘以為已大器大器鍾鼎之属國人逐之故出道渴其族轅咺進稻醴梁糗服脯焉糗乾飯也喜曰何其給也對曰器成而具具此醴糗曰何不吾諌對曰懼先行恐言不從先見逐冬衛太叔疾出奔宋疾即齊也初疾娶于宋子朝子朝宋人仕衛為大夫其娣嬖娣所娶女之弟子朝出出奔孔文子使疾出其妻而妻之疾使侍人誘其初妻之娣寘于犁犁衛邑而為之一宫如二妻文子怒欲攻之仲尼止之遂奪其妻或滛于外州外州人奪之軒以獻外州衛邑軒車耻是二者故出十四年春小邾射以句繹來奔射小邾大夫繹地名五月陳宗𥪡出奔楚是月宋向魋出奔衛桓魋之寵害於公恃寵驕盈公使夫人驟請享焉而將討之夫人景公母也數請享飲欲因請討之未及魋先謀公請鞌易薄鞌向魋邑薄公邑欲因易邑為公享宴而作亂公曰不可薄宗邑也乃益鞌七邑而請享公焉偽喜于受賜以日中為期家備盡往甲兵之備公知之向魋遂入于曹以叛八年宋滅曹以為邑六月使左師巢伐之欲質大夫以入焉巢不能伐以致公怒待國内大夫為質還入國不能亦入于曹取質不能得大夫故入曹刼曹人子弟而質之欲以自固魋曰不可旣不能事君又得罪於民將若之何乃舍之舎曹子弟民遂叛之向魋奔衛向巢來奔宋公止之曰寡人與子有言矣不可以絶向氏之祀辭曰臣之罪大盡滅桓氏可也若以先君之故而使有後君之惠也若臣則不可以入矣司馬牛致其邑與珪焉而適齊牛桓魋弟也珪守邑符信向魋出於衛地公文氏攻之公文氏衛大夫求夏后氏之璜焉與之佗玉而奔齊陳成子使為次卿司馬牛又致其邑焉而適吳示不與魋同吴人惡之而反趙簡子召之陳成子亦召之卒于魯郭門之外阬氏葬諸丘輿阬氏魯人泰山南城縣西北冇輿城錄其卒𦵏所在愍賢者失所冬陳轅買出奔楚十五年夏齊髙無丕出奔北燕十六年春衛瞞成禇師比出奔宋初衛莊立害故政欲盡去之故政輙之臣先謂司徒瞞成曰寡人離病于外久矣請亦嘗之歸告褚師比欲與之伐公不果乃奔夏衛孔悝出奔宋是時衛侯飲孔悝酒于平陽曹郡燕縣東北有平陽亭重酬之大夫皆有納焉納財賄也醉而送之夜半而遣之夜遣者慙負孔悝不欲令人見載伯姬于平陽而行載其母俱去及西門使貳車反祏于西圃使副車還取廟主于西圃孔氏廟所在祏藏主石函子伯季子初為孔氏臣新登于公升為大夫請追之遇載祏者殺而乗其車子伯殺載祏者許公為反祏孔氏怪載祏者久不來使公為反逆之遇之曰與不仁人爭明無不勝不仁人謂子伯季子也明無不勝言必勝必使先射射三發皆逺許為許為射之殪傳言子伯不仁所以死也或以其車從從公為得祏于槖中孔悝奔宋秋衛太叔遺奔晉衛侯占夢嬖人以能占夢見愛求酒于太叔僖子僖子太叔遺不得與卜人比而告公曰君有大臣在西南隅弗去懼害託占卜夢而言乃逐太叔遺奔晉魏武侯時吴起治西河之外王錯譛之魏武侯武侯使人召之吴𧺫至于岸門上車而休望西河泣數行下其僕謂之曰竊觀公之志視舍天下若舍屣今去西河而泣何也吳𧺫雪泣應之曰子不識也君始知我而使我畢能秦必可亡西河可以王今君聽讒人之譛而不知我西河之為秦也不久矣魏因此削矣起果去魏入荆有間西河畢入秦魏日以削秦日益大此吴𧺫之所以先見而泣也楚惠王十九年王子英奔秦秦厲共公二十五年晉大夫智開率其邑人來奔二十九年晉大夫智伯寛率其邑人來降趙敬侯元年武公子朝出奔魏初烈侯卒弟武公立武公卒趙復立烈侯太子章是為敬侯敬侯元年武公子朝作亂不克出奔衛成侯二十五年公子緤與太子争立緤敗亡奔韓孝成王時使㢘頗伐魏之繁陽屬衛郡拔之王卒子悼襄王立使樂乗代㢘頗㢘頗怒攻樂乗樂乗走㢘頗奔魏之大梁齊威王時成侯鄒忌及田忌將而救韓伐魏成侯與田忌爭寵成侯賣田忌田忌懼襲齊之邊邑不勝亡走㑹威王卒宣王立知成侯賣田忌乃復召田忌以為將秦昭王七年欲誅吕禮禮出奔齊燕昭王時使樂毅為上將軍并䕶趙楚韓燕之兵以伐齊五嵗下齊七十餘城皆為郡縣以屬燕唯獨莒即墨未服㑹昭王死子立為惠王惠王自為太子時常不快于樂毅及即位得齊反間乃使騎刼代將而召樂毅樂毅知惠王之不善代之畏誅西降趙趙封樂毅於觀津號曰望諸君秦孝公二十四年衛鞅亡歸魏册府元龜卷七百五十
