body:
  text: 册府元龜卷五十一宋王欽若等撰帝王部崇釋氏昔漢明帝兆夣於金人楚王英為蒲塞桑門之饌繇是竺乾之教被於中夏其所述之㫖所謂三歸五戒十善業四無量心四無色定以極人天之果四諦十二因縁六波羅蜜以辯三乗之位經律論以紀三蔵之名數至于覺一切種智證無生法忍此所以登圓寂而成佛道也歴代帝王或崇奉其事營建塔廟増嚴像設翻譯梵文廣度浄衆盖以茂植徳本樹立衆善為民祈福敺之仁夀斯亦大易神道設教之㫖歟漢武帝元狩中遣嫖姚將軍霍去病討匈奴至睪蘭過居延昆耶主將其衆五萬来降獲其金人帝以為天神列於甘泉宫金人率長丈餘不祭祀但燒香禮拜而已此則佛道流通之漸也及開西域遣張騫使大夏還傳其旁有身毒國一名天竺始聞有浮屠之教哀帝元夀元年愽士弟子秦􅕺憲受大月氏王使伊存口授浮屠經中土聞之未之信了浮屠正號曰佛陀其聲相近皆西方言華言譯之則謂浄覺後漢明帝夜夢金人頂有日光飛行殿庭乃訪羣臣傅毅始以佛對帝遣郎中蔡愔及博士弟子等使於天竺寫浮屠遺範愔仍與沙門攝摩騰竺法蘭束還雒陽中國有沙門及跪拜之法自此始也愔又得佛經四十二章及釋迦立像帝令畫工圖佛像置清凉䑓及顯節陵上經緘於蘭䑓石室愔之還也以白馬負經而至漢因立白馬寺於雒陽雍關西摩騰竺法蘭咸卒於此寺章帝時楚王英喜為浮屠齋戒遣郎中令奉黄縑白紈三十疋詣相國以贖愆詔報曰楚王尚浮屠之仁祠㓗齊三月與神為誓何嫌何疑當有悔吝其還贈以助伊蒲塞桑門之盛饌因以書示諸國伊蒲塞猶優波塞桑門沙門也桓帝設華盖以祠浮圖魏明帝時欲壊宫西佛圖外國沙門乃金盤盛水置於殿前以佛舎利投之於水仍有五色光起於是帝歎曰自非靈異安得爾乎遂徙于道為作周閭百間佛圗故䖏鑿為濛汜池種芙蓉於中晉明帝好佛手畫形像經歴冦難而堂存宜城王為之頌孝武太元六年正月帝初奉佛法立精舎于殿内引諸沙門以居之後魏道武帝初平中山經畧燕趙所經郡國佛寺見諸沙門道士皆致情敬禁軍旅無有所犯帝好黄老頗覽佛經但天下初定戎車屢動庶事草剏未建圗宇招延僧衆然時時訪求先是有沙門僧朗與其徒隠於泰山之崐峏谷帝遣使致書以繪素旃罽銀鉢為禮號曰朗公谷初神元與魏晉通聘文帝乆在雒陽昭成又至襄國乃備究南夏佛法之事臣欽若等曰自神元至昭成皆追册帝號天興元年詔曰夫佛法之興其来逺矣濟益之功無分存殁神蹤遺軌信可依慿其勑有司於京城建飾容範修整宫室令信向之徒有所居止是歳始作五級佛圗耆闍崛山及須彌山殿加以繢飾别搆講堂禪室及沙門座莫不嚴具焉明元帝好黄老及崇佛法京邑四方建立圗像仍令沙門敷導民俗初黄始中趙郡有沙門法果戒行精至開演法籍道武聞其名詔以禮徵赴京師後以為道人統攝僧徒每與之言多所惬允供施甚厚至是彌加崇敬永興中前後授以輔國宜城子忠信侯安成公之號皆固辭帝嘗親幸其居以門小狭不容輿輦更廣大之年八十餘卒帝三臨其喪追贈老夀將軍趙胡靈公先是法果每言道武明元好道即是當今如来沙門宜應盡禮遂嘗致拜謂人曰能𢎞道者人主也我非拜天子乃是禮佛耳法果四十始為沙門有子曰猛詔令襲果所加爵帝後幸廣宗有沙門曇證年且百嵗邀見於路奉致果物帝敬其年老志力不衰亦加以老夀將軍之號太武帝遵道武明元之業每引髙德沙門與共談論於四月八日輿諸佛像行於廣衢帝親御門樓臨觀散花以致禮敬先是沮渠䝉遜在凉州亦好佛法有罽賓沙門曇摩䜟習諸經論於姑臧與沙門智髙等譯湼槃諸經十餘部又曉術數禁呪歴言他國安危多所中驗蒙遜每以國事諮之神䴥中帝命䝉遜送䜟詣京師惜而不遣旣而懼魏威責遂使人殺䜟䜟死之日謂門徒曰今時將有客来可早食以待之食訖而走使至時人謂之知命帝初平赫連昌得沙門惠始姓張家本清河聞鳩摩羅什出新經遂詣長安見之觀習經典坐禪於白渠北晝則入城聼講夕則還䖏静坐三輔有識多宗之宋髙祖為晉太尉㓕姚泓留子義真于長安及其去也赫連屈丐追敗之道俗少長咸見坑戮恵始身被白刅而體不傷衆大怪異言於屈丐屈丐大怒召恵始於前以所持寳劔擊之又不能害乃懼而謝罪昌平恵始到京都多所訓導時人莫測其迹帝甚重之每加禮敬始自習禪至於没世稱五十餘未嘗寢卧或時跣行雖履泥塵而不汚足色愈鮮白世號之白脚終於八角寺文成帝興安元年詔曰夫為帝王者必祗奉明靈顯彰二道其能恵著生民濟益羣品者雖在古昔猶序其風烈是以春秋嘉崇明之禮祭典載功施之族况釋迦如来功濟大千恵流塵境尋生死者歎其逹觀覽文義者貴其沙門助王政之禁律益仁智之善性排斥羣邪開演正覺故前代以来莫不崇尚亦我國家嘗所尊事也世祖太武皇帝開廣邉荒德澤遐及沙門道士善行純誠恵始之倫無逺不至風義相感徃徃如林夫山海之深怪物多有姦淫之徒德容假託講寺之中致有兇黨是以先朝因其瑕釁戮其有罪有司失㫖一切㫁禁􅕺穆皇帝每為慨然值軍國多事未遑修復朕承洪緒君臨萬邦思述先志以隆斯道今制諸州郡縣於衆居之所各聼建佛圗一區任其財用不制㑹限其好樂道法欲為沙門不問長㓜出於良家性行素篤無諸嫌穢鄉里所明者聼其出家率大州五十人小州五十人其郡逺䑓者十人各當局分皆足以化惡就善播揚道教也初太武詔誅長安沙門焚破佛像勑留臺下四方令一依長安行事至是復之所毁圗寺仍還修復佛像經論皆得顯傳京師沙門師賢本罽賔國王種人少入道束遊凉城凉平赴京罷佛法時師賢假為醫術還俗而守道不改於脩復日即反沙門其同軰伍人帝皆親為下髪師賢仍為道人統是年詔有司為石像令如帝身旣成頭上足下各有黒石㝠同帝體上下黒子論者以為純誠所感興光元年秋勅有司於五級大寺内為太祖已下五帝鑄釋迦立像五各長一丈六尺都用赤金二十五萬斤太安初有師子國胡沙門邪奢遣多浮陀難提等五人奉佛像三到京都皆云備歴西域諸國見佛影迹及肉䯻外國諸王相求咸遣工匠摹寫其容莫能及難提所造者去十餘歩視之炳然轉近轉㣲又沙勒胡沙門赴京師致佛鉢并畫像迹和平初以僧曇曜為沙門統初曇曜以復佛法之明年自中山被命赴京值帝出見於路御馬前馬前啣曜衣時以為馬識善人帝後奉以師禮曇曜白帝以京城西武州塞鑿山石壁開窟五所鐫建佛像各一髙者七十尺次六十尺雕餙竒偉冠於一世曇曜奉平齊户及諸民有能歳輸榖六十斛入僧曹者即為僧祗户粟至於儉歳賑給饑民又請民犯重罪及官奴以為佛圗户以供諸寺掃灑歳兼營田輸粟帝並許之於是僧祗户粟及寺户遍於州鎮矣曇曜又與天竺沙門嘗那邪舎等譯出新經十四部又有沙門道進僧超法存等並有名於時演唱諸典獻文天安中起永寧寺搆七級佛圗髙三百餘尺基架愽敞為天下第一又於天宫寺造釋迦立像髙四十三尺用赤金十萬斤皇興中又搆三級石佛圗榱棟􅎝楹上下重結大小皆石頭髙十丈鎮固巧宻為京華壯麗其後傳位於太子移御北苑崇光宫覽習𤣥籍建鹿野佛圗於苑中之西山去崇光右十里巖房禪舎僧居其中孝文承明元年八月詔起建明寺太和元年二月幸永寧寺設齋赦死罪囚三月又幸永寧寺設會行道聼講命中秘三省與僧徒討論佛義施僧衣服寳器有差又於方山道武營壘之䖏建恩逺寺自興光後至北京城内寺新舊且百所僧尼二千餘人四方諸寺六千四百七十八僧尼七萬七千二百五十八人四年正月丁巳罷畜鷹鷂之所以其地為報德佛寺初文明皇后生獻文帝帝立尊為皇太后至是詔罷鷹師及諸鷙傷生之類宜放之山林以其地為太后立寺十五年八月戊戌移道壇於桑乾之隂改曰崇虛寺十六年詔四月八日七月十五日聼太州度一百人為僧尼中州五十人下州二十人以為常准著於令十七年詔立僧制四十七條十九年四月帝幸徐州白塔寺顧謂諸王及侍臣曰此寺近有名僧嵩法師授成實論于羅什在此流通後授淵法師淵法師授登紀二法師朕每翫成實論可釋人染情故至此寺焉時沙門道登雅有義業為帝眷賞常時講論曽於禁内與帝夜談同見一鬼及卒帝甚悼惜之詔施布一千疋又設一切僧齋并命京城七日行道又詔曰朕道登法師奄至徂背痛怛摧慟不能巳巳比藥治隕喪未容即赴便凖師義哭諸門外祭奠之又有西域沙門名䟦跎素有道業深為帝所敬信詔於少室山隂立少林寺而居之公給衣供二十一年五月詔曰羅什法師可謂神出五才志入四行者也今常住寺猶有遺地欽恱修蹤情深遐邇可於舊堂所為建三級浮圗又見逼昏虐為道殄軀旣蹔同俗禮應有子孫可推訪以聞當加序接先是立建福曹又改為昭𤣥備有官屬以斷僧務時沙門道順會覺僧意恵紀僧範道弁恵度智誕僧顯僧義僧利並以義行知重宣武帝􅕺明元年詔大長秋卿白整凖大京靈巖寺石窟於雒南伊闕山為髙祖文昭皇太后營石窟二所初建之始窟頂去地三百一十尺至正始二年終始斬山二十三丈大長秋卿王質謂斬山太髙費功難就奏求下移就平地去一百尺南北一百四十尺永平中中尹劉勝奏為帝復造石窟一凡為三所從景明元年至正始四年六月已前用功八十萬二千三百六十六永平元年秋詔曰緇素旣殊法律亦異故道教彰於𤣥顯禁勸各有所宜自今已後衆僧犯殺人已上罪者仍依俗斷餘犯付昭𤣥以内律僧制治之二年冬沙門統恵深上言僧尼浩曠清濁混流不遵禁典精麄莫别輙與經律法師羣議上制諸州鎮郡維那上座寺主各令戒律自修咸依内禁若不解經律者退其本次又出家之人不應非法積入不浄物然經律所制通塞有方依律車牛净人不净之物不得為己私畜惟有老病年六十已上者限聼一乘又比来僧尼或因三寳出貸私財自此不得更爾又出家捨著本無凶儀不應廢道從俗其父母三師逺聞凶問聼哭三日若在見前限以七日或有不安寺舎遊止民間亂道生過皆繇此等若有犯者脫服還民其有造寺者限僧五十以上啓聞聼造若有輙營置者處以違勅之罪其寺僧衆擯出外州僧尼之法不得為俗人所使若有犯者還配本屬其外國僧尼来歸化者求精舎簡有德行合三藏者聼住若無德行遣還本國若其不去依此僧制治罪詔從之是年十一月帝於試乾殿為諸僧朝臣講維摩詰經二年冬迎𢎞農荆山造珉玉丈六像置於雒濵之報徳寺帝躬觀致敬四年夏詔曰僧祗之粟本朝濟施儉年出貸豐則收入山林僧尼隨以給施民有窘弊亦即賑之但主司冐利規取贏息及其徵責不計水旱或償利過本或翻改劵契侵蠧貧下莫知紀極細民嗟毒歳月滋甚非所以矜此窮乏崇尚慈極之本意也自今已後不得專委維那都尉可令刺史共加監括尚書簡諸有僧祗榖之州别列其元數出入贏息賑給多少並貸償嵗月見存未收上臺録記若收利過本及翻改初劵依律免之勿復徵責或有私債孺施償僧即以丐民不聼收簡後有出貸先盡貧窮徵責之科一准舊格富有之家不聽輙貸脫仍冐濫依法治罪時尚書令髙肇奏言謹案故沙門統曇曜昔於承明元年奏度凉州軍户趙苟子等二百家為僧祗户立課積粟擬濟饑年不限道俗皆以拯施又依内律僧祗户不得别屬一寺而都維那僧暹僧頻等進違成㫖退乖内法肆意任情奏求逼召致使呼嗟之怨盈於行道棄子傷生自縊溺死五十餘人豈是仰贊聖明慈育之志深失陛下歸依之心遂令此等行號巷哭呌訴無所至乃白羽貫耳列訟宫闕悠悠之人尚為哀痛况慈悲之士而可安之計聽苟等還鄉課輸儉乏之年周給貧寡若有不虞以擬捍邉其暹等違㫖背律謬奏之愆請付昭𤣥依僧律推䖏詔曰暹等特可原之餘如奏帝篤好佛理每年嘗於禁中親講經論廣集名僧標明異㫖沙門以脩録為内起居焉帝旣崇之下彌企尚至延昌中天下州郡僧尼寺積有一萬三千四百三十七所徒侣逾衆孝明熈平元年詔遣沙門恵生使西域採諸經律及還京師所得經論一百七十部行於世時帝於城内大社西起永寧寺靈太后親率百寮表基立刹佛圖九層髙四十餘丈其諸費用不可勝紀景明寺佛圗亦其亞也至於官私寺塔其數甚衆神龜元年冬司空尚書令任城王澄奏曰仰惟髙祖定鼎嵩瀍卜世悠逺慮括始終制洽天人造物開符埀之萬葉故都城制云城内惟擬一永寧寺郭内唯擬尼寺一所餘悉城郭之外欲令永遵此制無敢踰矩逮景明之初微有犯禁故世宗仰修先志爰發明㫖城内不得造立浮圗僧尼舎亦欲絶其希覬文武二帝豈不愛尚佛法盖以道俗殊歸理無相亂故也但俗眩虛聲僧貪厚潤雖有顯禁猶自冐營至正始三年沙門統恵深有違㬌明之禁便云營就之寺不忍移毁求自今已後更不聼立先㫖寛容抑典從請前班之詔仍卷不行後来私謁彌以奔競永平二年深等復立條制啓云自今已後欲造寺者限僧五十已上聞輒聼造若有輙營置者依俗違勑之罪其寺僧衆擯出外州爾来十年私營愈盛罪擯之事寂爾無聞豈非朝格雖明恃福共毁僧制徒立顧利莫從者也不俗不道務為損法人而無厭其可極乎夫學迹冲玅非浮識所辨𤣥門曠寂豈短辭能究然净居塵外道家所先功緣冥深匪尚棄遁苟能誠信童子聚石可邁於道塲純頭陀儉設足薦於䨇樹何必縱其盗竊資營寺觀此乃民之多幸非國之福也然比日私造動盈百數或剩請公地輙樹私福或啓得造寺限外廣制如此欺罔非可稍計臣以才劣誠忝公務奉遵成規裁量是縂所以披尋舊㫖研究圗格輙遣府司馬陸昶屬崔孝芬都城之中及郭邑之内檢括寺舎數剩五百空地表刹未立塔宇不在其數民不畏法乃至於斯自遷都已来年逾二紀寺奪民居三分且一髙祖立制非徒欲使緇素殊途抑亦防微深慮世宗述之亦不可錮禁營福當在先塞未萌今之僧寺無處不有或比滿城邑之中或連溢屠沽之肆或三五少僧共為一寺梵唱屠音連簷接響像塔纒於腥臊性靈没於嗜慾真偽混居往来紛雜有司因習而莫非僧曹對制而不問其餘汚染真行塵穢練僧薰猶同器不亦甚歟往在北伐有法秀之謀近日冀州遭大乗之變皆初假神教以惑衆心終設姦誑用逞私悖太和之制因法秀而壮逺景明之禁慮大乗之将亂始知祖宗獻聖防遏慮深履霜堅氷不可不慎昔如来闡教多依山林今此僧徒戀着城邑豈湫隘是經行所宜浮諠必栖禪之宅當繇利引其心莫能自止䖏者旣失其貞造者或損其福乃釋氏之糟糠法中之社䑕内戒所不容王典所應棄矣非但京邑如此天下州鎮僧寺亦然侵奪細民廣占田宅有傷慈矜用長嗟苦且人心不同善惡亦異或有栖心真趣道業清逺者或外假法服内懐悖德者如此之徒宜辨涇渭若雷同一貫何以勸善然覩法賛善凡人所知隨俗避嫌物情同趣臣獨何為孤議獨發誠以國典一廢追理至難法網蹔失條綱將亂是以冐陳愚見兩願其益臣聞設令在於必行立罰貴能肅物令而不行不如無令罰不能肅孰與亡罰頃明詔屢下而造者更滋嚴限驟施而為犯不息者豈不以假福託善幸罪不加人殉其私吏難其劾前制無追往之辜後㫖開自今之恕悠悠世情遂忽成法今宜加以嚴科特設重禁糾其来違懲其往失脫不峻簡方垂容惜恐今㫖雖明復如往日又㫖令所斷標榜禮拜之䖏悉聼不禁愚以為樹榜無常禮䖏難驗欲令有造立榜證公須營之辭㫖以言常禮如此則徒有禁名實通造路且臨御已後斷詔四行而私造之徒不懼制而止豈是百官有司怠於奉法將繇網漏禁寛容託有佗故耳如臣愚量都城之中雖有標榜營造之功事可改立者請依先制在於郭外任擇所便其地若得劵證分明者聼其孺施若官地盗作買即令還官若靈像旣成不可移徹請依令勅如舊不禁今悉坊内行止不聼毁坊開門以妨里内通巷若被㫖者不在斷限郭内准此商量其廟像嚴立而逼近屠沽者請斷旁屠殺以潔靈居雖有僧數而事在可移者令就閑敞以避溢漏如今年正月勅後造者求依僧制案法科治若僧不滿五十者共相通容小就大寺必令充限其地賣還一如上式自今外州若欲造寺僧滿五十以上先令本州表列昭𤣥量審奏聼乃立若有違犯悉依前科州郡以下容而不禁罪同違㫖庶仰遵先皇不朽之業俯奉今㫖慈悲之令則繩墨可全聖道不墜矣奏可未幾天下喪亂加以河隂之酷朝士死者其家多捨居宅以施僧尼亰邑第舎略為寺矣前目禁令不復行焉後周太祖為魏丞相雅好談論并簡名僧深識𤣥宗者一百人於第内講説又令行臺學士薛慎等十二人兼學佛義使内外俱通繇是四方競為大乗學丞相府記室參軍盧光性崇佛道至誠信敬嘗從帝狩於檀䑓山時獵圍旣合帝遥指山上謂羣公等有所見不咸曰無見光獨曰見一桑門帝曰是也即解圍而還令光於桑門立處造浮圗掘䑓一丈得瓦鉢錫杖各一帝稱歎因立寺焉武帝天和四年二月帝御大德殿集百寮道士沙門等討論釋老義宣帝大象元年初復佛像及天尊像初武帝至德三年斷佛道二教像悉毁罷至是復之帝與二像俱南面而坐大陳雜戯令京城士民縱觀静帝以大象二年即位復行佛道二教舊沙門道士精誠自守者簡令入道隋文帝開皇十二年令陳散騎常侍徐孝克於尚書都堂講金剛般若經二十四年詔沙門道士壊佛像天尊百姓壊嶽凟神像皆以惡逆論帝年齡晚暮尤崇尚佛道故也仁夀元年六月頒舎利於諸州唐太宗貞觀三年十二月癸丑詔曰至人虛已忘彼我於胷懐三教慈心均異同於平等是知上聖惻隠無隔萬方大悲𢎞濟義猶一子有隋失道九服沸騰朕親總元戎致兹明罰誓牧登陑曽無寧歳老弱被其桀犬愚惑嬰此湯羅啣鬚義憤捐軀抗節各殉所奉咸有可嘉日往月来逝川斯逺雖復項籍放命封樹紀於丘墳紀信捐生丹書著於圗史猶恐九泉之下尚淪鼎鑊八難之間永纒氷炭愀然疚懐用忘興寢思所以樹立福田濟其營魄可於建義已来交兵之䖏為義士凶徒殞身戎陣者立寺刹焉乃詔虞世南李百藥褚亮顔師古岑文本許敬宗朱子奢等為之碑銘以紀功業時沙門𤣥奘於中天竺國將梵本經論六百餘部而歸太宗奇之召髙業沙門與之翻譯出三蔵聖教太宗為其論序皇太子重闡斯美乃著述聖記以廣其義十六年五月御製懴文於𢎞福寺曰聖哲之所尚者孝也仁人之所愛者親也朕㓜荷鞠育之恩長蒙撫養之訓蓼莪之念何日忘之罔極之情昊天匪報昔子路歎千鍾之無養虞丘嗟二親之不待方寸亂矣信可悲夫朕每痛一月之中再罹艱疚興言永慕哀切深𠂻欲報靡因唯資㝠助敬以絹二百疋奉於大道儻至誠有感冀消過去之愆為善有因庶獲後縁之慶髙宗永徽二年八月廢玉華殿以為佛寺顯慶元年四月戊申御安福門樓觀慈恩寺僧𤣥奘等迎御製書慈恩寺碑文向寺諸寺皆造幡盖飾以金寳窮極瓌麗太常及京城音樂車數百兩僧尼執幡兩行導從士女觀者填噎街衢自魏晉以来崇事釋教未嘗有如此盛者也乾封元年正月戊辰朔有事於泰山詔兖州置觀寺各三所其觀以紫雲仙月萬歳為稱其寺以封巒非煙重輪為名各度七人天下諸州别置一觀一寺各度七人中宗神龍元年二月制天下諸州各置寺觀一所咸以大唐中興為名九月制曰如聞天下諸觀皆畵化胡之變諸寺亦畵老君之形一種尊容兩俱不可限制到後十日並除却若有故留者即科違勅罪其化胡經先有明勅禁斷如聞在外仍頗流行自今諸部化胡經事及餘說化胡事處並宜除削三年七月丁酉以所造長樂坡大像工役稍廣百姓多怨嗟制罷之𤣥宗開元二十年都城僧等奏曰伏請以每歲八月于衛國天宫等寺轉經行道至九月罷為陛下修福在京於雲化興善等寺歳以為常許之二十三年九月親注金剛經及修義訣中書令張九齡等上言臣等伏見御注前件經及義訣佛法宗㫖撮在此經人間傳習多所未悟陛下曲垂聖意敷演㣲言幽闡玅鍵豁然洞逹雖臣等愚昧本自難曉伏覽睿㫖亦旣發明是知日月旣出天下普照誠在此也陛下至德法天平分儒道已廣度其僧又不違其願三教並列萬姓知歸伏望降出御文内外傳授帝手詔報曰僧徒固請欲以興教心有所得輙復䟽之今請頒行仍慮未惬檢校釋門威儀僧思有奏曰自像教西流貝文東譯學傳師口凡今則多註訣聖情前古未有臣請具幡花奉迎於敬愛寺設齋慶賀其御注經伏乞示天下宜付史官許之二十六年正月丁酉制曰道釋二門皆為聖教義歸𢎞濟理在尊崇其天下觀寺大小各度一十七人檢擇灼然有經業戒行為鄉閭所推仍先取年髙者二十七年二月制天下觀寺每于齋日宜轉讀經典懲惡勸善以闡文教天寳四載九月詔曰波斯經教出自大秦傳習而来乆行中國爰初建寺因以為名将欲示人必倄其本其兩京波斯寺宜改為大秦寺天下諸府郡者亦宜准此十載六月帝以先帝忌日命女工綉釋迦牟尼佛像親題繡額稽首祈福册府元龜卷五十一
