body:
  text: 册府元龜卷一百宋王欽若等撰帝王部聽納古之為天下者何嘗不虛己訪言疇諮詢度擇令典而從人欲補闕政而成機務故帝堯有稽衆舍己之聽漢祖有納諫轉環之美用能極羣臣之謀慮任四海之志力塞未然之咎立非常之功使下情無壅而芻蕘不遺大猷是經而金玉其度者也東方朔曰談有悖於耳拂於目謬於心而便於身者有説於目順於耳快於心而毀於行者非明王聖主孰能聽之蓋君人之用心當如氷鑑之不將不迎山澤之納汙藏垢然後忠邪立辯疎逺咸達擇其善者聞斯行諸書曰嘉言罔攸伏詩曰周道如砥其直如矢是之謂也漢髙祖初為漢王二年三月至洛陽新城三老董公遮説漢王曰臣聞順徳者昌逆徳者亡兵出無名事故不成名者伐有罪故曰明其為賊敵乃可服為音無為之為布告天下言項羽殺義帝明其為賊亂舉兵征之乃可服也項羽為無道放殺其主天下之賊也夫仁不以勇義不以力為義帝發䘮此為行仁義不用勇力也三軍之衆為之素服以告之諸侯為此東伐四海之内莫不仰徳此三王之舉也言以徳義取天下則可比蹤扵三王漢王曰善非夫子無所聞扵是漢王為義帝發䘮袒袒謂脱衣之袖也而大哭哀臨三日三年十二月漢王與酈食其謀撓撓弱也楚權食其欲立六國後以樹樹立也黨漢王刻印將遣食其立之以問張良良發八難漢王輟飯吐哺哺口中所含食曰豎儒言其賤劣無智若童豎也㡬敗乃公事㡬近也令趨銷印趨速也五月欽若等曰漢初以十月為嵗首故此月在後漢王出滎陽至成臯自成臯入關收兵欲復東轅生説漢王曰漢與楚相距滎陽數嵗漢常困願君王出關項王必引兵南走走亦謂趨向也王深壁令滎陽成臯間且得休息使韓信等得輯河北趙地輯謂和合也連燕齊郡乃復走滎陽如此則楚所備者多力分漢得休息復與之戰破之必矣漢王從其計出軍宛葉間葉縣名古葉公之國宛縣葉縣之間也與黥布行收兵羽聞漢王在宛果引兵南漢王堅壁不與戰六月項羽圍漢王成臯漢王跳跳獨出意也得韓信軍八月臨河南鄉軍小脩武欲復戰郎中鄭忠說止漢王髙壘深塹勿戰漢王聽其計使盧綰劉賈將卒二萬人騎數百度白馬津入楚地佐彭越燒楚積聚所畜軍糧芻藁之屬復撃破楚軍燕郭西燕縣名古南燕國攻下睢陽外黄十七城四年十一月韓信已破齊使人言曰齊邉楚權輕不為假王恐不能安齊漢王怒欲攻之張良曰不如因而立之使自為守於是遣張良操印立韓信為齊王五年冬十月漢追羽至陽夏南止軍與齊王信魏相國越期㑹撃楚至固陵即固始也屬淮陽不㑹楚撃漢軍大破之漢王復入壁深塹而守謂張良曰諸侯不從奈何良對曰楚兵且破未有分地信越等未有益地之分其不至固宜理宜然也君王能與共天下可立致也共有天下之地割而封之齊王信之立非君王意信亦不自堅因其自請為假王乃立之耳故曰非君王意彭越本定梁地始君王以魏豹故拜越為相國今豹死越亦望王而君王不早定今能取睢陽以北至榖城皆以王彭越從東以南傅海與齊王信信家在楚其意欲得復故地能出捐此以許兩人使各自為戰則楚易敗也扵是漢王發使使韓信彭越至皆引兵来六年人有上書告楚王韓信反髙帝問諸將諸將曰亟發兵阬豎子耳亟急也髙帝黙然以問陳平平固辭謝曰諸將云何帝具吿之平曰人有上書言信反人有聞知者乎曰未有曰信知之乎曰弗知平曰陛下精兵孰與楚與如也帝曰不能過也平曰陛下將用兵有能敵韓信者乎帝曰莫及也平曰今兵不如楚之精將弗及而舉兵撃之是趣之戰也切為陛下危之帝曰為之奈何平曰古者天子廵狩㑹諸侯南方有雲夢楚澤名陛下苐出偽㳺雲夢苐但也語聲急也它皆類此㑹諸侯扵陳陳楚之西界信聞天子以好出㳺其勢必郊迎謁出其郊逺迎謁也而陛下因擒之特一力士之事耳髙帝以為然乃發使吿諸侯㑹于陳吾將南㳺雲夢帝因隨以行行至陳楚王信果郊迎道中髙帝豫具武士見信即執縛之田肯賀帝曰陛下得韓信又致秦中時山東人謂關中為秦中秦形勝之國也得形勢之便也帶河阻山縣隔千里持㦸百萬秦得百二焉百二得百中之二二萬人也秦地險固二萬人足當諸侯百萬人也夫齊東有瑯邪即墨之饒二縣近海財用之所也南有泰山之固西有濁河之限齊西有平原河水東北過髙唐即平原也孟津號黄河故曰濁河北有渤海之利地方二千里持㦸百萬縣隔千里之外齊得十二焉齊得十二者二十萬人當諸侯百萬也此東西秦也非親王子弟亡可使王齊者帝曰善賜金五百斤馮唐事文帝帝輦過問唐曰父老何自為郎家安在言年已老矣何乃自為郎也具以實言帝曰吾居代時吾尚食監髙祛數為我言趙將李齊之賢戰扵鉅鹿之下吾每飲食意未嘗不在鉅鹿也每食念監所説李齊在鉅鹿時也父老知之乎唐對曰齊尚不如廉頗李牧之為將也帝曰何已已猶也唐曰臣大父在趙時為官帥將大父祖父也善李牧臣父故為代相善李齊知其為人也帝既聞廉頗李牧為人良説良善也聞頗牧之善帝意大説廼拊髀曰嗟乎吾獨不得廉頗李牧為將耳豈憂匈奴哉唐曰主臣恐懼之言陛下雖有廉頗李牧不能用也帝怒起入禁中良久召唐讓曰公衆辱我獨無間處乎何不間隙之處而言唐謝曰鄙人不知忌諱當是時匈奴新大入朝那殺北地都尉卬帝以胡冦為意廼卒復問唐曰公何以言吾不能用頗牧也唐對曰臣聞上古王者遣將跪而推轂曰闑以内寡人制之闑以外將軍制之門中楹為闑也軍功爵賞皆決於外歸而奏之此非空言也臣大父言李牧之為將也居邊軍市之租皆自用饗士賞賜決于外不從中覆也覆謂覆白之也委任而責成功故李牧乃得盡其智能選車千三百乗彀騎萬三千匹彀張弩也百金之士十萬良士直百金也百金喻其貴重也是以北逐單于破東胡滅澹林澹胡也晉北有澹林之胡樓煩之戎也西抑强秦南支韓魏當是時趙㡬霸㡬致扵霸也後㑹趙王遷立趙幽王子其母倡也倡樂家也用郭開讒而誅李牧令顔聚代之是以為秦所滅今臣竊聞魏尚為雲中守軍市租盡以給士卒出私養錢五日一殺牛私假錢也以饗賔客軍吏舍人是以匈奴逺避不近雲中之塞虜嘗一入尚率車騎撃之所殺甚衆夫士卒盡家人子起田中從軍安知尺籍伍符尺籍所以書軍令伍符五伍相保之符信也漢軍法曰吏卒斬首以尺籍書下縣移郡令人故行不行奪勞二嵗伍符亦行伍之符要節度也家人子謂庶人之家子也終日力戰斬首捕虜上功幕府一言不相應文吏以法繩之其賞不行吏奉法必用愚以為陛下法太明賞太輕罰太重且雲中守尚坐上功首虜差六級陛下下之吏削其爵罰之繇此言之陛下雖得李牧不能用也臣誠愚觸忌諱死罪文帝説是日令唐持節赦魏尚復以為雲中守而拜唐為車騎都尉武帝時巴蜀四郡通西南夷道載轉相饟數嵗道不通士罷餓餒離暑濕死者甚衆餒饑也離遭也西南夷又數反發兵興撃耗費亡功耗損也帝患之使公孫𢎞往視問焉還報言其不便及𢎞為御史大夫時方築朔方據河逐胡𢎞等因言西南夷為害言通西南夷大為損害可且罷専力事匈奴帝許之罷西夷獨置南夷兩縣一都尉稍令犍為自保就令自保守且修成其郡縣宣帝即位徵魏相為大司農遷御史大夫四嵗大將軍霍光薨帝思其功徳以其子禹為右將軍兄子樂平侯山復領尚書事山者去病之孫今言兄子誤也相因平恩侯許伯奏封事言春秋譏世卿惡宋三世為大夫及魯季孫之專權皆危亂國家自後元以来禄去王室政繇冢宰今光死子復為大將軍兄子秉樞機昆弟諸壻據權勢在兵官光夫人顯及諸女皆通籍長信宮通籍謂宮之中皆有名籍恣出入也或夜詔問出入驕奢放縱恐寖不制寖漸也不制不可制御也宜有以損奪其權破散隂謀以固萬世之業全功臣之世又故事諸上書者皆為二封署其一曰副領尚書省先發副封所言不善屏去不奏相復因許伯白去副封以防壅蔽宣帝善之詔相給事中皆從其議霍氏殺許后之謀始得上聞馮奉世破莎車帝説下議封奉世丞相將軍皆曰春秋之義大夫出疆有可以安國家則顓之可也奉世功效尤著宜加爵土之賞少府蕭望之獨以奉世奉使有指本為送諸國客而擅矯制違命發諸國兵雖有功效不可以為後法即封奉世開後奉使者例以奉世為比争遂發兵要功萬里之外遂竟也為國家生事扵夷狄漸不可長奉世不宜封帝善望之之議以奉世為光禄大夫水衡都尉鮑宣為諫議大夫上書陳天變請復徵用何武師丹彭宣傅喜等帝感大異納宣言徵何武彭宣旬月皆復為三公拜宣為司隷後漢明帝時下令禁民二業謂農者不得商賈也又以郡國牛疫通使區種増耕而下吏檢括多失其實百姓患之居巢侯劉般上言郡國以官禁二業至有田者不得漁捕今濵江湖郡率少蠶桑民資漁採以助口實且以冬春閒月不妨農事夫漁獵之利為民田除害有助榖食無關二業也又郡國以牛疫水旱墾田多減故勅詔區種增進頃畆以為民也而吏舉度田欲令多前至扵不種之䖏亦通為租可申勅刺史二千石務令覈實其有増加皆使與奪田者同罪帝悉從之王望為青州刺史是時州郡災旱百姓窮荒望行部道見饑者裸行草食五百餘人愍然哀之因以便宜出所在布粟給其廪糧為作褐衣事畢上言帝以望不先表請章示百官詳議其罪時公卿皆以為望之専命法有常條鍾離意獨曰昔華元子反楚宋之良臣不禀君命擅平二國春秋之義以為美談今望懐義忘罪當仁不讓若繩之以法忽其本情有乖聖朝愛育之義帝嘉意議而赦望罪章帝建初元年地震東平王蒼上便宜其事留中帝報書曰丙寅所上便宜三事朕親自覽讀反覆數周心開目明曠然發矇間吏人奏事亦有此言但眀智淺短或謂儻是復慮為非何者災異之降縁政而見今改元之後年饑人流此朕之不徳感應所致又冬春旱甚所被尤廣雖内用刻責而不知所定得王深䇿快然意觧詩不云乎未見君子憂心忡忡既見君子我心則降思惟嘉謨以次奉行兾蒙福應彰報至徳特賜王錢五百萬和帝時故居巢侯劉般子愷當襲封爵先是建初中般卒愷與弟憲遁逃避封久之章和中有司請絶愷國章帝特優假之愷猶不出積十餘年永元中有司復奏之侍中賈逵因上章曰孔子稱能以禮讓為國於從政乎何有切見居巢侯劉般嗣子愷素行孝友謙遜潔清弟憲潛身逺迹有司不原樂善之心而繩以循常之法懼非長克讓之風以成含𢎞之化前世扶陽侯韋𤣥成近有陵陽侯丁鴻鄳侯鄧彪並以髙行潔身辭爵未聞貶削而皆登三事今愷景仰前修有伯夷之節宜蒙矜宥全其先功以増聖朝尚徳之美帝納之下詔曰故居巢侯劉般嗣子愷當襲般爵而稱父遺意致國弟憲遁亡七年所守彌篤盖王法崇善成人之美其聽憲嗣爵遭事之宜後不得以為比乃徵愷拜為郎安帝時連有災異詔百僚各上封事尚書陳忠乃上疏豫通廣帝意曰若有道之士對問髙者宜垂省覽特遷一等以廣直言之路書進御有詔拜有道髙第士沛國施延為侍中順帝永和四年中常侍張逵蘧政等共譖梁商等帝不從逵等悉伏誅辭所連染及在位大臣商懼多侵枉乃上疏曰春秋之義功在元帥罪止首惡故賞不僭溢刑不泛濫五帝三王所以同致康乂也切聞考中常侍張逵等辭語多所牽及大獄一起無辜者衆死囚久繫纎微成大非所以順迎和氣平政成化也宜早訖竟以止逮捕之煩帝乃納之罪止坐者左雄為尚書令上言宜崇經術繕修太學帝從之至陽嘉元年太學新成詔試明經者補弟子増甲乙之科員各十人除京師及郡國耆儒六十已上為郎舍人諸王國郎者百三十八人雄又上言郡國孝廉古之貢士出則宰民宣協風教若其面墻則無所施用孔子曰四十而不惑禮稱强仕請自今孝廉年不滿四十者不得察舉皆先詣公府諸生試家法儒有一家之學故稱家文吏課牋奏付之端門練其虛實以觀異能以美風俗有不承科令者正其罪法若有茂才異行自可不拘年齒帝從之於是班下郡國後劉據為大司農以職事被譴召詣尚書傳呼促步又加以捶撲雄復上言九卿位亞三事班在大臣行有佩玉之節動有庠序之儀孝明皇帝始有撲罰皆非古典帝從而改之其後九卿無復捶撲者李固陽嘉中公卿舉固對䇿詔特對當世之弊為政所宜帝覽其對多所納用即時出阿母還舍諸常侍悉叩頭謝罪朝廷肅然以固為議郎後固為大司農先是周舉等八使按察天下多所劾奏其中並是宦者親屬輒為請乞詔遂令勿考又舊任三府選令史光禄試尚書郎時皆特拜不復選試固乃與廷尉吳雄上疏以為八使所糾宜急誅罰選舉署置可歸有司帝感其言乃更下免八使舉刺史二千石自是稀復特拜切責三公明加考察朝廷稱善乃復與光禄勲劉宣上言自頃選舉郡牧守多非其人至行無道侵害百姓又宜止盤逰專心庶政帝納其言扵是下詔諸州劾奏守令以下政有乖枉遇人無恵者免所居官其姦穢重罪收付詔獄桓帝時度遼將軍陳龜上疏陳牧守不良或出入中官宜更選匈奴烏桓護羌中郎將校尉除并涼二州今年租帝覺悟乃更選幽州刺史自營郡太守都尉以下多所革易下詔為陳將軍除并涼一年租賦以賜吏民應奉為司隷校尉及鄧皇后敗而田貴人見幸桓帝有建立之議奉以田氏微賤不宜超登后位上書諫曰臣聞周納狄女襄王出居扵鄭左傳襄王將以狄女為后富辰諫曰不可狄固貪婪王又啟之王不從狄人伐周襄王出奔鄭漢立飛燕成帝繼嗣冺絶母后之重興廢所關宜思關鴡之所求逺五禁之所忌韓詩外傳曰婦人有五不娶䘮婦之長女不娶為其不受命也世有惡疾不娶棄於天也世有刑人不娶棄扵人也亂家女不娶類不正也逆家女不娶廢人倫也帝納其言竟立竇皇后靈帝光和五年公卿以謡言舉刺史二千石害民者太尉許􅖢音郁司空張濟承望内官受取貨賂其宦官子弟賔客皆不敢問而虛糾邉逺小郡有恵化者吏人詣闕陳訴司徒陳耽與議郎曹操上言公卿所舉率黨其類斯所謂放鴟梟而囚鸞鳳也其言忠節切帝以讓􅖢濟繇是諸坐謡言徵者悉拜議郎魏太祖征馬超等於關西時軍每度渭輒為超騎衝突營不得立地又多沙不可築壘婁子伯曰今天寒可起沙為城以水灌之可一夜而成帝從之乃作縑囊以運水夜度兵作城比明城立繇是帝軍盡得渡渭又征韓遂等遂請與公相見公與遂等㑹語諸將曰公與虜交語不宜輕脱可設木行馬以為防遏公甚然之明帝初踐祚羣臣或以宜饗㑹博士髙唐隆曰唐虞有遏宻之哀髙宗有不言之思是以至徳雍熙光扵四海以為不宜為㑹帝敬納之楊阜為城門校尉常見帝著褐被縹絞半裒袖問帝曰此於禮何法服也帝黙然不答自是不法服不見阜晉景帝為魏相征淮南時吳將諸葛恪帥軍於孫權所築東興堤左右結山夹築兩城使全端留守之恪引軍而還諸葛誕言於帝曰致人而不致於人者此之謂也今因其内侵使文舒逼江陵仲恭向武昌以羈吳之上流然後簡精卒攻兩城比救至可大獲也帝從之魏嘉平五年吳將諸葛恪圍合肥時姜維亦出圍狄道帝問虞松曰今東西有事二方皆急而諸將意阻若之何松曰昔周亞夫堅壁昌邑而吳楚自敗事有似弱而强者有似强而弱者不可不察也今恪悉其鋭衆足以肆暴而坐守新城欲以致一戰耳若攻城不拔請戰不得師老衆疲其勢自走諸將自不輕進乃公之利也姜維有重兵而縣軍應恪投食我麥非深根之冦也且謂我并力扵東西方必虛是以輕進今若使關中諸軍倍道急赴出其不意殆將走矣帝曰善乃使郭淮陳恭悉關中之衆觧狄道之圍勅母丘儉等按兵自守以新城委吳姜維聞淮進兵軍食少乃退屯隴西界武帝泰始中散騎常侍傅𤣥上便宜五事詔曰得所陳便宜言農事得失及水官興廢又安邊禦胡政事寛猛之宜申省用備一二具之此誠為國大本當今急務也如所論皆善深知乃心廣思諸宜動静以聞也初王濬平吳為王渾所嫉所賞甚薄時人咸以濬功重報輕博士陳秀太子洗馬孟康前溫令李泌等並表訟濬之功帝乃遷濬鎮軍大將軍加散騎常侍領後軍將軍成帝時蔡謨代郗鑒為征北將軍先是郗鑒上部下有勲勞者凡一百八十人帝並酧其功未卒而鑒薨斷不復與謨乃上疏以為先以許鑒今不宜斷且覽所上者皆積年勲効百戰之餘亦不可不報詔聽之簡文帝初為撫軍執政王彪之為廷尉時當南郊帝訪彪之應有赦不答曰中興以來郊祀往往有赦愚常謂非宜何者黎庻不達其意將以為郊祀必赦至此時㐫愚之輩復生心於僥倖矣遂從之後魏明元時崔浩為祭酒晉軍在雒議欲以軍絶其後帝問浩浩對以為不可帝大悦語至中夜賜浩御縹醪酒十觚水精戎鹽一兩曰朕味卿言若此鹽故與卿同其甘也文帝時源賀出為冀州刺史上書乞寛刑已後入死者皆恕死徙邊久之帝謂羣臣曰源賀勸朕宥諸死刑徙充北蕃諸戍自爾至今一嵗所活殊為不少生濟之理既多邊戍之兵有益卿等事朕致何善意也苟人人如賀朕治天下復何憂哉顧憶誠言利實廣矣羣臣咸曰非忠臣不能進此計非聖明不能納此言孝文為太子恂娶司徒馮誕長女以女㓜待年長先為聘彭城劉長滎陽鄭慤女為左右孺子時恂年十三四帝泛舟天淵池謂郭祚翟光宋弁曰人生須自放不可終朝讀書我欲使恂旦出省經傳食後還内晡時復出夕而罷卿等以為何如光曰孔子稱血氣未定戒之在色傳曰晝以訪事夜以安身太子以㓜年渉學之日不宜於正晝之時捨書御内又非所以安柔弱之體固永年之命帝以光言為然乃不令恂晝入内鄭道昭為國子祭酒表請崇尚儒學孝文詔曰具卿崇儒敦學之意良不可言新令尋班施行無逺不至可謂職思其憂無曠官矣髙道悦為諫議大夫兼御史中尉時孝文將繇水路幸鄴已詔都水迥營搆之材以造舟楫道悦表諫之帝詔曰省所上表深嘉乃心但卿之立言半非矣當須陳非以示謬稱是以彰徳然後明所以不用有繇而為之不爾則未相體耳迥材都水蹔營嬉逰終為棄物修繕非務舟楫無章士女雜亂此則卿之失辭矣深薄之危撫陵之重斯則卿之得言也於是帝遂從陸路隋文帝時崔仲方為虢州刺史上言論取陳之䇿帝覽而大悦轉基州刺史徵入朝仲方因面陳經畧帝善之賜以御袍袴并雜綵五百段進位開府而遣之及大舉伐陳以仲方為行軍總管率兵與秦王㑹唐髙祖武徳初齊王元吉為并州總管為劉武周所攻棄軍還京髙祖怒甚謂禮部尚書李綱曰元吉㓜小未習時事故遣竇誕宇文歆輔之强兵數萬食支十年起義興運之基一朝而棄宇文歆首畫此計我當斬之綱曰頼歆令陛下不失愛子臣以為有功髙祖問其故綱對曰罪繇竇誕不能規諷致令軍人怨憤又齊王年少肆行驕逸放縱左右侵漁百姓誕曾無諫止乃隨順掩藏以成其釁此誕之罪宇文歆論情則疎向彼又淺王之過失悉以聞奏且父子之際人所難言而歆言之豈非忠懇今欲誅罪不録其心臣愚切以為過翌日髙祖召綱入升御坐謂曰今我有公遂使刑法不濫元吉自惡結怨扵人歆既曾以表聞誕亦焉能禁制皆非其罪太宗貞觀十六年七月丁酉謂侍臣曰當今國家何等為急諫議大夫褚遂良曰即日四方仰徳誰敢為非但太子諸王須有定分陛下宜為萬代法以遺子孫帝曰此言是也朕年將五十已覺衰怠既以長子守器東宮第及庶子數將五十心常憂慮頗在此耳但自古嫡庶無良何嘗不傾敗國家公等為朕搜訪賢徳以輔儲宮爰及諸王咸求正士且事人嵗久即分義情深非意窺窬多繇此作其王府官僚宜限以四考褚遂良為黄門侍郎貞觀中鴻臚寺奏髙麗莫支離貢白金遂良進曰莫支離虐殺其主九夷不容陛下已云興兵將示弔伐為遼山之人報主辱之恥若受其貢何所攻伐太宗納焉張𤣥素為景州都督録事參軍太宗聞其名及即位召見訪以政道對曰臣觀自古以来未有如隋室䘮亂之甚豈非其君自専其法日亂向使君虛受扵上臣弼違於下豈至於此且萬乗之重又欲自専庶務日斷十事而五條中中者信善其如不中者何况一日萬㡬已多虧失以日繼月乃至累年乖謬既多不亡何待如其廣任賢良髙居深視有司奉職誰敢犯之臣又觀隋末沸騰被於㝢縣所求天下不過十數人餘皆保邑全家思歸有道是知人欲背主為亂者鮮矣但人君不能安之遂致於亂陛下若近鑒危亡日慎一日堯舜之道何以能加太宗善其對擢侍御史髙宗時太尉長孫無忌位當元舅數進謀議帝無不優納之𤣥宗先天二年詔貶特進李嶠為太子率更令時嶠子暢為處州刺史嶠隨暢之任先是韋庶人臨朝嶠宻表請令相王諸子皆出京師帝於宮内獲其表以傳示侍臣或請誅之中書令張説曰嶠雖不辯順逆然亦為當時之謀議非其主請不追討其罪帝從其言因有是命姚崇為紫微令𤣥宗時幸東都而太廟屋壊召宋璟蘇頲問其故璟等奏言今三年之制未畢誠不可行幸凡災變之發皆所以明教戒陛下宜增大道以答天意且停幸東都帝义召崇問曰朕臨發京邑太廟無故隳壊恐神靈戒以東行不便耶崇對曰太廟殿本是苻堅時所造隋文帝創立新都移宇文廟故殿造此廟國家又因縁舊制嵗月兹深朽蠧而毀山有朽壤尚不免頺此既久来枯木合將摧折偶與行期相㑹不是縁行乃隳四海為家兩京相接陛下以關中不甚豐熟轉運又有勞費所以為人行幸非是無事煩勞東都百司已作供擬不可失信於天下舊廟既毀爛不堪修理望移神主於太極殿安置更改造新廟以申誠敬車駕依前徑發帝曰卿言正合朕意賜絹二百疋所司奏七廟神主遷於太極改造新廟車駕遂幸東都因命崇五日一㕘仍入閣供奉甚承恩遇宋璟為侍中時太常卿修國史姜皎兄弟當朝用事璟以其權寵太盛恐非久安之道屢奏請稍抑損之𤣥宗勅曰西漢諸將多以權貴不全南陽故人並以優閒自保觀夫先後之迹吉㐫之數較然可知良有以也宜放皎歸田園以恣娛樂又𤣥宗東廵璟復為留守帝臨發謂璟曰卿國之元老為朕股肱耳目今將廵雒邑為别歴時所有嘉猷宜相告也璟因極言得失特賜綵帛仍降手制曰所進之言書之座右出入觀省以戒終身肅宗至徳中李勉為司膳員外郎時關東獻俘百人詔並䖏斬因有仰天嘆者勉偶過問之對曰某被脇制守官非逆者勉入而上言曰元惡未殄遭㸃汚者半天下皆欲澡心歸化若盡殺之是驅天下以資兇逆也帝遽令奔騎宥釋繇是歸化日至李揆為中書舍人至徳中宗室請加張皇后翼聖之號肅宗召問之揆對曰臣觀諸古后妃終則有諡生加尊號未之前聞景龍失政韋氏専恣加號翼聖今皇后之號正與韋氏同陛下明聖動遵典禮豈可比蹤景龍故事哉肅宗驚曰凡才㡬誤我家事遂止時代宗自廣平王改封成王張皇后有子數嵗隂有奪宗之議揆因對見肅宗從容曰成王嫡長有功今當命嗣卿意何如揆拜賀曰陛下言及於此社稷之福天下幸甚臣不勝大慶蕭宗喜曰朕計決矣自此頗承恩遇遂䝉大用徳宗建中四年末避難遷扵奉天以城隘不可久議幸鳳翔且依張鎰户部尚書蕭復聞之遽請見曰竊聞移幸鳳翔未審虛實帝曰有之復曰陛下大誤鳳翔將士皆朱泚舊兵今泚悖逆此中必有同惡相濟者臣尚慮張鎰不能久奈何擬幸鳳翔帝曰朕行計已決試為卿駐駕一日屬鳳翔後營將李楚琳殺張鎰自為節度使乃止貞元十二年信州刺史姚驥舉員外司馬盧南史准例配得有典一人每月請紙筆錢一千文南史以官閒冗無職事於典而納其直凡五年計贓六十千文又云私買鉛燒黄丹詔令刑部員外郎裴澥監察御史鄭楚大理評事陳正儀充三司使往按之並召對於延英徳宗曰必須評審無令漏罪銜寃三人將退澥獨立奏曰臣覽姚驥奏狀云南史取直典紙筆雖於公法有違在情可恕徳宗曰此事亦其應有但未知燒鉛事何如澥曰燒鉛為黄丹格令不禁准天寶十三載勅鉛銅錫並不許私家買賣盖防私鑄錢亦不言不許燒黄丹然南史違勅買鉛不得無罪三司使至江南今忽縁小事令往非唯罷耗州縣亦恐逺䖏聞之各懐憂懼臣聞開元中張九齡為五嶺按察使有録事參軍吿其非法朝廷唯令大理評事往按近大歴中鄂岳觀察使吳仲孺與轉運判官劉長卿紛競仲孺奏長卿贓犯三千萬貫時止差監察御史苗丕往推今姚驥所奏事既無多臣若堪任此行即請獨往恐不要三司盡行徳宗曰卿言是也可召楚相等来及至乃賜坐曰朕懵於理道䖏事未精裴澥所奏深合事宜卿可宣付宰臣但行舉一人往按問十八年三月以前攝東都團練使齊總為衢州刺史給事中許孟容上表封還時左補闕王武陵右補闕劉伯芻復上疏言之繇是詔書留中不出明日雨不視事特開延英門召許孟容對帝慰諭開納曰使百執事皆如卿朕何憂也憲宗元和五年九月復以吐突承璀為左衛上將軍依前知内侍省事充右神䇿䕶軍中尉兼左街功徳使承璀嘗建謀征討無功而還於是諫官上疏懇論帝從之間一日降為軍器等使六年十一月宰臣李吉甫奏永昌公主所立祠堂不如置墓户以充守奉翊日帝謂吉甫曰卿昨所奏罷祠堂事深惬朕心朕初疑其冗費縁未知故實是以量減及覽所奏方知無據然朕不欲破三二十户百姓當揀官户謹信者委之吉甫等拜賀帝曰卿此豈是難事有關朕身不便扵時者苟聞之則改此豈足多邪卿但切思規正無謂朕不能行也册府元龜卷一百
