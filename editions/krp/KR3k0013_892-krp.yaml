body:
  text: 冊府元龜卷八百九十二宋王欽若等撰總錄部夢徴周禮有六夢一曰正夢二曰噩夢三曰思夢四曰寤夢五曰喜夢六曰懼夢又詩云吉夢維何維熊維羆維虺維蛇又曰牧人乃夢衆維魚矣旐維旟矣斯則夢之徴矣是知禍福無門在祥應而斯顯吉凶有象考虚實之彌彰按漢書藝文志云衆占非一而夢為大所以黄帝悟吹塵而得風后唐堯感白帝而獲臯陶成湯占鼎而遇賢高宗求野而得相周文享其齡壽孔子識其云亡至於晋霸得天楚傷中月曹因社滅鄭以蘭生叔孫之得竪牛簡子之聽廣樂夢徴所至於焉可知黄帝夢大風吹天下之塵埃皆去又夢人執千鈞之弩驅羊數萬羣帝寤而歎曰風為號令執政者垢去土解清治者天下豈有姓風名后者哉夫千鈞之弩異力能逺者也驅羊數萬羣是能善牧者也天下豈有姓力名牧者乎於是依二夢之占而求之得風后于海隅登以為相得力牧于大澤進以為將堯為天子夢白帝遺以馬隊子臯陶母升高丘睹上有白雲如虎感已而生臯陶堯聘索狀母問之如堯言徴與語明於刑法商湯思賢夢見有人負鼎抗俎對已而笑寤而占曰鼎為和味俎者割截天下豈有人為吾宰者哉初力牧之後曰伊摯耕於有莘之野湯聞以幣聘之有莘之君留而不進湯乃求婚於有莘之君有莘嫁女於湯以摯為媵臣至亳乃負鼎抱俎見湯伊摯將應湯命夢乗船過日月之旁高宗夢傅說使百工營求諸野得諸傅巖周文王去商在程正月既生魄太姒夢見商之庭産棘小子發取周庭之梓樹于門間梓化為松栢棫柞寤驚以告文王文王及太子發竝拜吉夢受商之大命于皇天上帝文王謂武王曰汝何夢矣武王對曰夢帝與我九齡帝天也文王曰汝以為何也武王曰西方有九國君王其終撫諸文王曰非也古者謂年為齡齒亦齡也我百爾九十吾與爾三焉九齡九十年之祥也文王以憂勤損壽武王以安樂延年與爾三者明傳業於汝汝受而成之文王九十七乃終武王九十三而終武王與叔虞母㑹時夢天謂武王曰余命汝生子名曰虞與之唐及生子文在其手曰虞故命之曰虞成王封之於唐虢公夢在廟有神人面白色虎爪執鉞立於西阿之下公懼而走神曰無走帝命曰使晋襲于爾門公拜稽首覺召史嚚占之對曰如君之言則蓐收也天之刑神也天事官成公使囚之且使國人賀夢舟之僑告其諸族曰衆謂虢亡不久吾乃今知之君不度而賀大國之襲於已何瘳吾聞之曰大國道小國襲焉曰服小國敖大國襲焉曰誅民疾君之侈也是以逐於逆命今嘉其夢侈必展是天奪之鑒而益其疾也吾不忍俟也將行以其族適晋六年虢乃亡秦穆公立病卧五日不寤寤乃言夢見上帝上帝謂天也上帝命穆公平晉亂史書而藏之府府藏書之處而後世皆曰上天穆公晉文公救宋次於濮城晉文侯夢與楚子搏摶手搏楚子伏已而盬其腦盬建也是以懼子犯曰吉我得天楚伏其罪吾且柔之矣晉侯上向故得天楚子下向地故伏其罪腦所以柔物子犯審見事宜故權言以答夢子玉自為瓊弁玉纓未之服也將與晉戰夢河神謂已曰畀余余賜汝孟諸之麋子玉不與而戰敗子玉楚大夫趙盾在時夢見叔𢃄持要而哭甚悲已而笑拊手而歌盾卜之兆絶而後好趙史援占曰此甚惡非君之身乃君之子然亦君之咎至趙朔被殺下宫及趙武而復鞍之戰晉韓厥夢子輿厥父也謂已曰且避左右故中御而從齊侯邴夏曰射其御者君子也公曰謂之君子而射之非禮也射其左越于車下射其右斃于車中趙嬰夢天使謂已祭余余福汝使問諸士貞伯貞伯曰不識也既而告其人自告貞伯從人曰神福仁而禍滛滛而無罰福也祭其得亡乎以得放遣其福祭之之明日而亡晉侯夢大厲披髪及地搏膺而踊曰殺余孫不義厲鬼也趙氏之元祖也八年晉侯殺趙同趙括故怒余得請於帝矣壊大門及寢門而入公懼入於室又壊戸公覺召桑田巫桑田晉邑巫言如夢巫云鬼怒如公所夢公曰何如曰不食新矣言公不得及食新麥公疾病求毉于秦秦伯使毉緩為之緩毉名為猶治也未至公夢疾為二𥪡子曰彼良毉也懼傷我焉逃之其一曰居肓之上膏之下若我何肓鬲也心下為膏醫至曰疾不可為也在肓之上膏之下攻之不可逹之不及藥不至焉不可為也逹針也公曰良毉也厚為之禮而歸之六月丙午公欲麥使甸人獻麥將食如厠䧟而卒小臣有晨夢負公以登天及日中負晉侯出諸厠遂以為殉吕錡夢射月中之退入於泥吕錡魏錡晉大夫占之曰姬姓日也周世姫姓尊異姓月也異姓卑必楚王也射而中之退入於泥亦必死矣錡自入泥亦死象及戰射共王中目王召養繇基與之兩矢使射吕錡中項伏弢弢弓衣以一矢復命聲伯夢渉洹洹水出汲郡林慮縣東北至魏郡長樂縣入清水或與已瓊瑰食之瓊玉瑰珠也食珠玉含象泣而為瓊瑰盈其懐涙下化為珠下滿其懐從而歌之曰濟洹之水贈我以瓊瑰歸乎歸乎瓊瑰盈吾懐乎從就也夢中為歌懼不敢占也還自鄭至于貍脤而占之曰余恐死故不敢占也今衆繁而從余三年矣無傷也言之之莫而卒繁猶多也傳戒數占夢荀吳帥師滅陸渾韓宣子夢文公攜荀吳而授之陸渾宣子韓起文公晉文公荀吳中行穆子晉大夫也故使穆子帥師獻俘於文公欲以應夢齊侯伐魯北鄙中行獻子將伐齊夢與厲公訟弗勝厲公獻子所殺者以戈擊之首墜於前跪而戴之奉之以走見梗陽之巫臯梗陽晉邑也在太原臯巫名也夢并見之他日見諸道與之言同巫亦夢也獻子與厲公訟巫曰今兹主必死若有事於東方則可以逞獻子許諾叔孫穆子去叔孫氏及庚宗成公十六年避僑如之難奔齊庚宗魯地遇婦人使私為食而宿焉適齊夢天壓已弗勝穆子夢也顧而見人黒而上僂深目而豭喙號之曰牛助余乃勝之及反魯所宿庚宗之婦人獻以雉獻穆子問其姓對曰余子長矣能奉雉而從我矣召而見之則所夢也未問其名號之曰牛曰唯皆召其徒使視之遂使為竪竪官也傳言從夢未必吉衛侯殺渾良夫夢于北宫見人登昆吾之觀衛有觀在古昆吾氏之墟今濮陽城之中被髪北面而譟曰登此昆吾之墟緜緜生之𤓰緜緜𤓰初生也良夫言已有以小成大之功若𤓰之生謂使衛侯得國耳余為渾良夫呌天無辜本盟當免三死而并數一時之事為三罪殺之故自謂無辜公親筮之胥彌赦占之赦衛筮史曰不害與之邑寘之而逃奔宋言衛侯無道卜人不敢以實對懼難而逃宋景公無子取公孫周之子得與啓畜諸公宫未有立焉公卒得夢啟北首而寢於廬門已為鳥而集於其上喙加於南門尾加於桐門曰余夢美必立乃得立鄭文公有賤妾曰燕姞夢天使與已蘭曰余為伯儵余而祖也以是為而子以蘭有國香人服媚之如是既而文公見之與之蘭而御之生穆公名之曰蘭穆公有疾曰蘭死吾其死乎刈蘭而卒子産聘于晉晉侯有疾韓宣子曰寡君寢疾於今三月矣竝走羣望有加而無瘳今夢黄熊入于寝門其何厲鬼也對曰以君之明子為大政其何厲之有昔堯殛鯀于羽山其神化為黄熊以入于羽淵實為夏郊三代祀之晉為盟主其或者未之祀乎韓子祀夏郊晉侯有間間差也鄭殺大夫良霄伯有也在襄三十年鑄刑書之嵗二月昭六年或夢伯有介而行介甲也曰壬子余將殺𢃄也明年壬寅余又將殺叚也及壬子駟𢃄卒國人益懼齊燕平之月壬寅公孫叚卒國人愈懼衛襄公夫人姜氏無子姜氏宣姜嬖人婤姶生孟縶孔成子夢康叔謂已立元成子衛卿孔逹之孫烝鉏元孟縶弟夢時元未生余使羇之孫圉與史苟相之羇烝鉏子茍史朝子史朝亦夢康叔謂已余將命而子苟與孔烝鉏之曽孫圉相元史朝見成子告之以夢夢恊恊合也晉韓宣子為政聘于諸侯之嵗在二年婤姶生子名之曰元孟縶之足不良弱行跛也孔成子以周易筮之曰元尚享衛國主其社稷蓍辭遇屯震下坎上又曰余尚立縶尚克嘉之嘉善也遇屯之比坤下坎上也屯初九爻變以示史朝史朝曰元亨又何疑焉周易曰屯元亨成子曰非長之謂乎言屯之元亨謂年長非謂名元對曰康叔名之可謂長矣善之長也孟非人也將不列於宗不可謂長足跛非全人不可列為宗主且其繇曰利建侯繇卦辭嗣吉何建建非嗣也嗣子有常位故無所卜又無所建今以位不定卜嗣得吉則當從吉而建之也二卦皆云謂再得屯卦皆有建侯之文子其建之康叔命之二卦告之筮襲於夢武王所用也弗從何為外傳云太誓曰朕夢恊朕卜襲於休祥戎商必克此武王辭弱足者居跛則偏弱居其家不能行侯主社稷臨祭祀奉民人事鬼神從㑹朝又焉得居各以所利不亦可乎孟跛利居元吉利建故孔成子立靈公泉邱人有女夢以其帷幕孟氏之廟泉邱魯邑遂奔僖子其僚從之鄰女為僚友者隨而奔僖子盟于清丘之社曰有子無相棄也二女自共盟僖子使助薳氏之簉簉副妾也薳氏之女為僖子副妾別居在外故僖子納泉丘人女令副助之反自祲祥宿於薳氏生懿子及南宫敬叔於泉丘人其僚無子使字敬叔字養也似雙生趙簡子夢童子臝而轉以歌轉宛轉也旦而日食占諸史墨曰吾夢如是今而日食何也簡子夢適與日食㑹謂咎在已故問之對曰六年及此月也吳其入郢乎終亦弗克史墨知夢非日食之應故釋日食之咎而不釋其夢入郢必以庚辰庚日有變日在辰尾故曰以庚辰定四年十一月庚辰吳入郢日月在辰尾辰尾龍尾也周十二月今之十月日月合朔於辰尾而食庚午之日日始有謫火勝金故弗克謫變氣也庚午十月十九日去辛亥朔四十一日雖日食在辛亥更以始變為占也午南方楚之位也午火庚金也日以庚午有變故災在楚楚之仇敵唯吳故知其入郢必吳火勝金者金為火尅食在辛亥亥水也水數六故六年也宋元公將為魯昭公故如晉請納公夢太子欒即位於廟已與平公服而相之平公元公父旦召六卿公曰寡人不佞不能事父兄父兄謂華向以為二三子憂寡人之罪也若以羣子之靈獲保首領以沒唯是楄柎所以藉幹者楄柎棺中笭牀也幹骸骨也請無及先君欲自貶損仲幾對曰君若以社稷之故私降昵宴羣臣弗敢知昵近也降宴謂損親近聲樂飲食之事若夫宋國之法死生之度先君有命矣羣臣以死守之弗敢失墜臣之失職常刑不赦臣不忍其死君命祗辱言君命必不行祗適也宋公遂行己亥卒于曲棘宋人圍曹初曹人或夢衆君子立于社宫社宫社也而謀亡曹曹叔振鐸請待公孫強許之振鐸曹始祖旦而求之曹無之戒其子曰我死爾聞公孫强為政必去之及曹伯陽即位好田弋曹鄙人公孫强好弋獲白鴈獻之且言田弋之說說之因訪政事大説之有寵使為司城以聽政夢者之子乃行强言霸説於曹伯曹伯從之乃背晉而奸宋宋人伐之晉人不救築五邑於其郊曰黍邱揖邱大城鍾䢴河南夏邑縣西南有黍丘亭宋公將還禇師子肥殿子肥宋大夫曹人詬之不行詬詈也不行殿兵止也師待之公聞之怒命反之遂滅曹執曹伯及司城强以歸殺之終曹之夢楚靈王成章華之臺願與諸侯落之太宰薳啟彊來召魯昭公公將往夢襄公祖梓慎曰君不果行㐮公之適楚也夢周公祖而行今㐮公實祖君其不行子服惠伯曰行也先君未嘗適楚故周公祖以道之㐮公適楚矣而祖以道君不行何之三月公如楚齊景公田於梧宫夜猶早公坐睡夢有五大夫北而穪無罪公覺召晏子告所夢公曰我其嘗殺無罪歟晏子對曰昔先君靈公田五大夫駭獸故并斷其頭葬之命曰五大夫丘豈此耶命人掘其葬處求之則五頭同穴存焉公嘉之命吏𦵏之又景公舉兵將伐宋師過㤗山公夢見二丈夫立而怒其怒咸盛公恐覺辟門召占夢者占夢者至公曰今夕吾夢二丈夫立而怒不知其所言其怒甚盛吾猶識見其狀不識其名占夢者曰師過泰山而不用事故㤗山之神怒請召祝史祠乎㤗山則可公曰諾明日晏子朝見公告之如告占夢之言也公曰占夢之言曰師過泰山而不用事故泰山之神怒今欲使人召祝史晏子俯有間對曰占夢者不識也此非泰山之神也是宋之先湯與伊尹也公疑以為泰山神晏子曰公疑之則嬰請言湯伊尹之貎湯晳以長頤以髯鋭上豐下倨身而揚聲公曰然是已伊尹黒而短蓬而髯豐上而鋭下僂身而下聲公曰然是已今若何晏子曰夫湯太甲武丁祖乙天下之盛君也不宜無後今唯宋爾矣而公伐之故湯伊尹怒請散師平乎宋景公不用終伐宋晏子曰公伐無罪之國以怒明神不易行以續菑進師以近過非嬰之所知也師若果進軍必有殃軍進再舍鼔毁將殪公乃辭乎晏子散師不果伐宋孔子蚤作負手曳杖逍遥於門歌曰泰山其頺乎梁木其壊乎哲人其萎乎既歌而入當戸而坐子貢聞之曰泰山其頺則吾將安仰梁木其壊哲人其萎則吾將安倣夫子殆將病也遂趍而入夫子曰賜爾來何遲也夏后氏殯於東階之上則猶在阼也殷人殯於兩楹之間則與賓主夾之也周人殯於西階之上則猶賔之也而丘也殷人也予疇昔之夜夢坐奠於兩楹之間夫明王不興而天下其孰能宗予予殆將死葢寢疾七日而沒趙武靈王十六年遊大陵他日王夢見處女鼓琴而歌詩曰美人熒熒兮顔若苕之榮棊母䆳曰陵苕之草其華紫命乎命乎曽無我嬴棊母䆳曰言有命禄生遇其時人莫如已貴盛盈端也異日王飲酒樂數言所夢想見其狀吳廣聞之因夫人而納其女娃嬴方言曰娃美色吳有館娃之宫孟姚也徐廣曰古史考云内其女曰娃孟姚甚有寵於王是為惠后孝成王夢衣偏裻之衣乗飛龍上天不至而墜見金玉之積如山明日王召筮史敢占之曰夢衣偏裻之衣者殘也乗飛龍上天不至而墜者有氣而無實也見金玉之積如山者憂也其後三日韓上黨守馮亭降趙趙受之卒有長平之禍秦始皇夢與海神鬭如人狀乃令人入海齎捕鉅魚具而自以連弩候大魚出射之遂竝音旁海西至平原津而病漢文帝嘗夢欲上天不能進有一黄頭郎推之上顧見其衣後穿覺而之漸臺見郎鄧通衣後穿即夢中所見也因而寵之衛太子為江充所譖敗久之田千秋上急變訟太子寃曰子弄父兵罪當笞天子過誤殺人當何罪哉臣嘗夢見一白頭翁教臣言是時上顧知太子惶恐無他意乃大感悟召見千秋謂曰父子之間人所難言也公獨明其不然此高廟神靈使公教我公當遂為吾輔佐立拜千秋為大鴻臚昌邑王夢見青蠅之矢積殿東西階王乃問龔遂對曰詩云營營青蠅止於樊愷悌君子無信讒言陛下察之王終不改韋元成為丞相奏罷祖宗廟在郡國者嵗餘元成薨薨字下一字犯太祖廟諱上一字匡衡代為丞相成帝寢疾夢祖宗譴罷郡國廟帝少弟楚孝王亦夢焉帝詔問衡議欲復之衡深言不可王莽夢長樂宫銅人五枚起立莽惡之念銅人銘有皇帝初兼天下之文即使尚方工鐫滅所夢銅人膺文師古曰鐫鑿也音子全反又感漢高廟神靈師古曰謂夢見譴責遣虎賁武士入高廟㧞劍四面提擊師古曰提擲也音徒計反斧壊戸牖師古曰以斧砍壊之桃湯赭鞭鞭灑屋壁師古曰桃湯洒之赭鞭鞭之也赭赤也令輕車校尉居其中又令中軍北壘居高寢後漢公孫述將僭號夢有人語之曰八厶子系十二為期覺謂其妻曰雖貴而祚短若何妻對曰朝聞道夕死尚可况十二乎王延壽曽有異夢意惡之乃作夢賦以自勵後溺水死時年二十餘史無官范式字巨卿山陽金鄉人仕郡為功曹與汝南張劭字元伯為友後元伯寢疾卒式忽夢見元伯元冕垂纓屣屐而呼曰吾以某日死某時𦵏永歸黄泉如未我忘豈能相及式覺而驚悲赴之鄭𤣥詔徵不赴夢孔子告之曰起起今年嵗在辰來年嵗在已北齊劉晝高才不遇傳𤣥論曰辰為龍巳為蛇嵗至龍蛇賢人嗟𤣥以識合之葢謂此也既寤以讖合之知命當終有頃寢疾時袁紹與曹操相拒於官渡令其子譚遣使逼𤣥隨軍不得已載疾到元城縣疾篤不進其年六月卒周磐字伯堅為重合令棄官還鄉里嵗朝曽集諸生講論終日因令其二子曰吾日者夢見先師東里先生與我講於陰堂之奥既而長歎豈吾齒之盡乎其月望日無疾忽終華松家本孤㣲其母夜夢兩伍伯夾門言司𨽻在此松果至司𨽻蔡茂初為廣漢太守夢坐大殿極上有三穗禾茂跳取之得其中穗輙復失之以問主簿郭賀賀離席慶曰大殿者宫府之形象也極而有禾人臣之上禄也取中穗是中台之位也於字禾失為秩雖曰失之乃所以得禄秩也衮職有闕君其補之旬月而茂徵為三公張奐為武威太守其妻懐孕夢𢃄奐印綬登樓而歌訊之占者曰必將生男復臨兹邦命終此樓既而生子猛以建安中為武威太守殺刺史邯鄲商州兵圍之急猛恥見擒乃登樓自燒而死卒如占言公孫瓚為奮武將軍為袁紹所圍夢薊城摧果敗焉魏程昱少時嘗夢上泰山兩手捧日昱私異之以語荀彧及兖州反賴昱得完三城於是彧以昱夢白太祖曰卿當終為吾腹心昱本名立太祖乃加其上日更名昱也後至衛尉封安鄉侯管輅舉秀才吏部尚書何晏請之鄧颺在晏謂輅曰聞君蓍爻神妙試為作一卦知位當至三公不又問連夢見青蠅數十頭來鼻上驅之不肯去有何意故輅曰夫飛鴞天下賤鳥及其在林食椹則懐我好音况輅心非草木敢不盡忠昔元凱之弼重華宣惠慈和周公之翼成王坐而待旦故能流光六合萬國咸寜此乃履道休應非卜筮之所明也今君侯位重山嶽勢若雷電而懐徳者鮮畏威者衆殆非小心翼翼多福之仁又鼻者艮此天中之山相書謂鼻之所在為天中鼻有山象故曰天中之山也高而不危所以長守貴也今青蠅臭惡而集之焉位峻者顛輕豪者亡不可不思虚盈之數盛衰之期是故山在地中曰謙雷在天上曰壯謙則裒多益寡壯則非禮不履未有謙已而不光大行非而不傷敗願君侯上追文王六爻之㫖下思尼父彖象之義然後三公可决青蠅可驅也颺曰此老生之常譚輅答曰夫老生者見不生常譚者見不譚晏曰過嵗更當相見輅别傳載為何晏所請果共論易九事九事皆明晏曰君論隂陽比世無䨇時鄧颺與晏共坐颺言君見謂善易而論初不及易中辭義何故也輅尋聲答之曰夫善易者不論易也晏含笑而譖之可謂要言不煩也因請輅為卦輅既稱引鍳成晏謝之曰知幾其神乎古人以為難交疏而吐其誠今人以為難君今一面而盡二難之道可謂明徳惟馨詩不云乎中心藏之何日忘之輅還邑舍具以此言語舅氏舅氏責輅言太切至輅曰與死人語何所畏耶舅大怒謂輅狂悖嵗朝西北大風塵埃蔽天十餘日聞晏颺皆誅然後舅氏乃服太祖嘗夢三馬同食一槽甚惡焉因謂太子丕曰司馬懿非人臣也必預汝家事既而竟遷魏鼎司馬宣王帥師平遼東迴至㐮平夢明帝枕其膝曰視吾面俛視有異於常心惡之先是詔宣王便道鎮關中及次白屋有詔召宣王三日之間詔書五至手詔曰間側息望到到便直排閣入視吾面宣王大遽乃乗追鋒車晝夜兼行自白屋四百餘里一宿而至引至嘉福殿臥内升御床宣王流涕問疾明帝執宣王手目齊王曰以後事相托死乃復可忍吾忍死待君得相見無復所恨矣蔣濟為領軍其婦夢見亡兒涕泣曰死生異路我生時為卿相子孫今在地下為泰山伍伯憔悴困辱不可復言今太廟西謳士孫阿今見召為泰山令願母為白侯屬阿令轉我得樂處言訖母忽然驚寤明日以白濟濟曰夢為爾耳不足怪也明日暮復夢曰我來迎新君止在廟下未發之頃暫得來歸新君明日日中當發臨發多事不復得歸永辭於此侯氣强難感悟故自訴於母願重啟侯何惜不一試驗之遂道阿之形狀言甚備悉天明母重啟濟曰雖云夢不足怪此何太適適亦何惜不一驗之濟乃遣人入太廟下推問孫阿果得之形狀證驗悉如兒言濟涕泣曰幾負吾兒於是乃見孫阿具言其事阿不懼當死而喜得為泰山令惟恐濟言不信也曰若如足下言阿之願也不知賢子欲得何職濟曰隨地下樂者與之阿曰輙當奉教乃厚賞之言訖遣還濟欲速知其驗從領軍門至廟下十歩安一人以傳阿消息辰時傳阿心痛巳時傳阿劇日中傳阿亡濟泣曰雖哀吾兒之不幸且喜亡者有知後月餘兒復來語母曰已得轉為録事矣曹爽為大將軍録尚書事夢二虎銜雷公雷公若二升椀放著庭中爽惡之以問占者靈臺丞馬訓曰憂兵訓退告其妻曰爽將以兵亡不出旬日後為司馬宣王所誅皇甫謐累徵不起夢至雒陽自廟出見車騎甚衆以物呈廟云誅大將軍曹爽寤而以告其邑人邑人曰君欲作曹人之夢乎朝無公孫强如何且爽兄弟典重兵又權尚書事誰敢謀之謐曰爽無叔振鐸之請茍失天機則離矣何恃於强昔漢之閻顯倚母后之尊權國威命可謂至重矣閹人十九人一旦尸之况爽兄弟乎未幾爽果敗鄧艾為征西將軍嘗伐蜀夢坐山上而有流水以問殄虜䕶軍爰邵邵曰按易卦山上有水曰蹇蹇繇曰蹇利西南不利東北孔子曰蹇利西南往有功也不利東北其道窮也往必克蜀殆不還乎艾憮然不樂蜀關侯為盪㓂將軍督荆州事初出軍圍樊夢猪齧其足語子平曰吾今年衰矣然不得還魏延字文長為前軍軍師征西將軍諸葛亮出北谷口延為前鋒去亮營十里延夢頭上生角以問占夢趙直直詐延曰夫麒麟有角而不用此不戰而賊自敗之象也退而告人曰角之為字刀下用也頭上用刀其凶甚矣延後果為楊儀所殺蔣琬為廣都長衆事不理先主欲加罪戮諸葛亮推琬有社稷之噐乃不加罪琬見推之後夜夢有一牛頭在門前流血滂沱意甚惡之呼問占夢趙直直曰夫見血者事分明也牛角及鼻公字之象君位必當至公大吉之徵也後為大司馬何祗字公肅嘗夢井中生桑以問占夢趙直直曰桑非井中之物㑹當移植然桑字四十下八君壽恐過此祗笑云得此足矣後為犍為太守年四十八卒如直所言吳丁固初為尚書夢松樹生其腹上謂人曰松字十八公也後十八嵗吾其為公乎卒如所夢朱壽占夢不失一晉王濬為廣漢太守嘗夜夢懸三刀於其卧屋梁上須㬰又益一刀濬驚覺意甚惡之主簿李毅再拜賀曰三刀為州字又益一者明府其臨益州乎及賊張宏殺益州刺史皇甫晏果遷濬為益州刺史鄧攸為淮南太守夢行水邉見一女子猛獸自後斷其盤囊占者以為水邉有女汝字也斷盤􅌩者新獸頭代故獸頭也不作汝隂當汝南也果遷汝隂太守郭瑀夢乗青龍上天至屋而止寤而歎曰龍飛在天今止於屋屋之為字尸下至也龍飛至尸吾其死也古之君子不卒内寢况吾正士乎遂還酒泉南山赤厓閣飲氣而卒索紞為郎中避世晦跡惟以占夢為無悔吝乃不逆問者孝亷令狐䇿夢立氷上與氷下人語紞曰氷上為陽氷下為隂隂陽事也士如歸妻迨氷未泮婚姻事也君在氷上與下人語為陽語隂媒介事也君當為人作媒氷泮而婚成䇿曰老夫耄矣不為媒也㑹太守田豹因䇿為子求鄉人張公徴女仲春成婚焉郡主簿張宅夢走馬上山還繞舍三周但見松栢不知門處紞曰馬屬離離為火火禍也人上山為凶字但見松栢墓門象也不知門處為無門也三周三朞也後三年必有大禍宅果以謀反伏誅索充初夢天上有二棺落於充前紞曰棺者職也當有京師貴人舉君二棺者頻再遷俄而司徒王戎書屬太守使舉充太守先署充功曹而舉孝亷充後夢見一虜脫上衣來詣充紞曰虜去上半下半男字夷狄隂類君婦當生男終如其言宋桷夢内中有一人著朱衣桷手把兩杖極打之紞曰内中有人肉字也肉色赤也兩杖箸象也極打之飽食肉也俄而亦驗焉黄平問紞曰我昨夜夢舍中馬舞數十人向馬拍手此何祥也紞曰馬者火也舞為火起向馬拍手救火人也平未歸而火作索綏夢東有二角書其大角朽敗小角有題韋嚢角佩一在前一在後紞曰大角朽敗腐棺木小角有題題所詣一在前前凶也一在後後背也當有凶背之問時綏父在東居三日而凶問至郡功曹張邈嘗奉使詣州夜夢狼啖一脚紞曰脚肉被啖為却字㑹東虜反遂不行凡所占莫不驗太守隂澹從求占書紞曰昔入太學因一父老為主人其人無所不知又匿姓名有似隠者紞因從父老問占夢之術審測而說實無書也澹命為西閣祭酒紞辭曰少無山林之操游學京師交結時賢希申鄙藝㑹中國不靖欲養志終年老亦至矣不求聞逹又少不習勤老無吏幹濛汜之年弗敢聞命澹以束帛禮之月致羊酒張華為司空方晝卧忽夢見屋壊覺而惡之是夜難作被害陸機為平原内史長沙王乂假機後將軍征河間王顒夜夢黒幕三重繞車機擘出不得明旦被殺其日大風拔木時人以為陸氏之寃戴洋為都水令史請急還鄉將赴雒夢神人謂之曰雒中當敗人盡南渡後五年揚州必有天子洋信之遂不去既而皆如其夢王敦為大將軍舉兵向建業兵至姑孰明帝隂察敦營壘敦正晝寢夢日環其城驚起曰此必黄鬚鮮卑奴來也帝母筍氏燕代人帝狀類外氏鬚黄敦故謂帝云敦初殺刁恊後病殆夢白犬自天而下嚙之又見恊乗軺車導從瞋目令左右執之俄而敦死揚雄為舂陵令王敦作亂雄起兵禦之為敦所執敦將釋之衆人皆賀雄笑曰昨夢乗車挂肉其傍夫肉必有筋筋者斤也車傍有斤吾其戮乎尋而敦遣殺之當時見者莫不傷惋張茂為吳國内史沈充之反也茂與三子竝遇害茂弟盎為周札將軍充討札盎又死之贈茂太僕茂少時夢得大象以問占夢萬推推曰君當為大郡而不善也問其故推曰象者大獸獸者守也故知當得大郡然象以齒焚為人所害果如其言王導子恱為中書侍郎導夢人以百萬錢買悦潛為祈禱者備矣尋掘地得錢百萬意甚惡之一皆藏閉及悦疾篤導憂念特至不食積日忽見一人形狀甚偉被甲持刀導問君是何人曰僕是蔣侯也公兒不佳欲為請命故來爾公勿復憂因求食遂噉數升食畢勃然謂導曰中書患非可救者言訖不見悦亦殞絶温嶠為驃騎將軍鎮武昌至牛渚磯水深不可測云其下多怪嶠遂燬犀角而炤之須㬰見水族萬品其夜夢人謂嶠曰與君幽明道隔何意相炤嶠惡之忽中風至鎮旬日而卒陶侃為廣州夢有司馬與侃鎧者長史陳恊以為司馬者國姓也鎧者捍禦之噐節下當進位俄加平西將軍又嘗夢生八翼飛而上天見天門九重已登其八唯一門不得入閽者以杖擊之因墜地折其左翼及寤左腋猶痛及都督八州據上流握强兵潛有窺伺之志每思折翼之祥自抑而止羅含字君章少有志尚嘗晝卧夢一鳥文彩異常飛入口中因驚起説之朱氏曰鳥有文彩汝後必有才章自此後藻思日新後至長沙相中散大夫王珣夢人以大筆如椽與之既覺語人云此當有大手筆事俄而孝武哀䇿謚皆珣所草謝安為太保有疾因悵然謂所親曰昔桓温在時吾嘗懼不全忽夢乗温輿行十六里見一白鷄而止乗温輿者代其位也十六里止至今十六年矣白鷄主酉今太嵗在酉吾病殆不起乎乃上疏遜位俄卒王恭為安北將軍鎮京口舉兵以討司馬尚之王愉為名司馬劉牢之諌不從而恭夢牢之坐其處旦謂牢之曰事平以卿為北府牢之後叛恭誅果代恭位劉敬宣牢之長子也知略不及父而技藝過之孫恩之亂隨父征討所向有功為元顯從事中郎又為桓元諮議叅軍牢之敗與廣陵相高雅之俱奔慕容超夢丸土而服之既覺喜曰丸者桓也桓既吞矣我當復本土也旬日而元敗遂與司馬休之還京師謝擒為臨川太守毎寢輙夢聞鼔吹有人為其占之曰君不得生鼔吹當死鼔吹爾擒擊杜弢戰歿追贈長水校尉𦵏給鼔吹焉前趙劉曜咸和三年曜夢三人金面丹唇東向逡巡不言而退曜拜而履其跡旦召公卿以下議之朝臣咸賀以為吉祥惟太史令任義進曰三者歴運統之極也東為震位王者之始次也金為兑位物衰落也唇丹不言事之畢也逡巡揖譲退舍之道也為之拜者屈伏於人也履跡而行慎不出疆也東井秦分也五車趙分也秦兵必暴起亡主䘮師留敗趙地願陛下思而防之曜大懼於是躬親二郊餙繕神祠望秩山川靡不周及大赦殊死已下復百姓租税之半既而曜戰敗為石勒所擒後趙石虎晝寢永安宫夢羣羊從東北負魚而來鄴東北上高丈餘木生滿其上寤而問佛圗澄澄曰此不祥也鮮卑其有中原乎其後果驗西凉張駿有疾夢出逰不識其處見一元龜向之張口而言更九日當有嘉聞遂經九日而卒西凉李士業之將敗也有敦煌父老令狐熾夢白頭公衣帢而謂熾曰南風動吹長木胡桐椎不中轂言訖忽然不見士業小字桐椎至是而卒前秦苻徤字建業洪第三子初母姜氏夢大熊而孕之徤初入關夢天神遣使者朱衣赤冠命拜堅為龍驤將軍徤翼日為壇於曲沃以授之徤泣謂堅曰汝祖昔受此號今汝復為神明所命可不勉之苻生初夢大魚食蒲又長安謡曰東海大魚化為龍男便為王女為公問在何所雒門東東海苻堅封也時為龍驤將軍第在雒門之東生不知是堅以謡夢之故誅其侍中太師録尚書事魚遵及其七子十孫苻生夜坐對侍婢曰阿法兄弟亦不可信明當除之是夜清河王苻法夢神告之曰旦將禍及汝門惟先覺者可以免之寤而心悸㑹侍婢來告乃與特進梁平老强汪等率壯士數百人潛入雲龍門苻堅與吕婆樓率麾下三百餘人鼔譟繼進宿衛將士皆捨杖歸堅生猶昏寐未寤堅衆既至引生置於别室廢之為越王俄而殺之慕容儁夜夢石虎齧其擘覺遂痛惡之曰死胡安敢夢生天子使掘之數其罪鞭其屍投之漳水俄寢疾而卒後秦姚萇㐮之弟初從㐮征伐每叅大謀㐮之冦雒陽也夢萇服衮衣升御座諸酋長皆侍立旦謂將佐曰吾夢如此此兒志度不常或能大起吾族姚萇如長安至于新支堡疾篤輿疾而進夢苻堅將天官使者鬼兵數百突入營中萇懼走入宫宫人迎萇刺鬼誤中萇隂鬼相謂曰正中死處㧞矛出血石餘窹而驚悸遂患隂腫毉刺之出血如夢萇遂狂言或稱臣萇殺陛下者兄㐮非臣之罪願不枉臣後蜀李雄字仲儁特第三子母羅氏夢䨇虹自門升天一虹中斷既而生蕩後羅氏因汲水忽然如寐又夢大蛇繞其身遂有孕十四月而生雄嘗言吾二子若有先亡在者必大貴也蕩竟前死後凉吕光討西域進攻龜兹城夜夢金象飛越城外光曰此謂佛神去之胡必亡矣南燕慕容徳初迎其兄子超于長安及是而至徳夜夢其父曰汝既無子何不早立超為太子不爾惡人生心寤而告其妻曰先帝神明所勑觀此夢意吾將死矣乃下書以超為皇太子大赦境内子為父後者人爵二級其月死册府元龜巻八百九十二
