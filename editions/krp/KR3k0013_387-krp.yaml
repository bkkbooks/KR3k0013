  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_387-1a}
body:
  text: 册府元龜卷三百八十七宋王欽若等撰將帥部褒異第十三後唐李承嗣少仕郡為右職唐僖宗中和二年從武皇討賊關輔為前鋒王師之攻華隂黄巢令偽客省使王汀㑹軍機於黄揆承嗣擒之以獻賊平以功授汾州司馬改榆次鎭將朱玫之亂遣承嗣率萬人援鄜州至渭橋迎扈車駕王行瑜既殺朱玫承嗣㑹鄜夏之師入定京城獲偽相裴徹鄭昌圉函送朱玫襄王首獻於行在駕還宫賜號迎鑾功臣檢校工部尚書守嵐州刺史賜軍錢二萬貫孟方立之襲遼州也承嗣設伏擊其歸兵大敗之獲其將奚忠信以功授洺州刺史及張濬之加兵於太原也時鳳翔軍營霍邑承嗣帥一軍攻之岐人夜遁追擊至趙城合大軍攻平陽旬有三日而抜師旋改敎練使檢校司空李存信唐昭宗大順中為蕃漢都校從武皇討李儔降赫連鐸白義誠以功檢校左僕射從入關討王行瑜加檢校司空領彬州刺史李存進昭宗光化中為永安軍使鴈門以北都知兵馬使天復初破氏叔琮前軍於洞渦三年授石州刺史莊宗初嗣位又為步軍右都檢校司空帥出井陘授行營馬步軍都營虞候破汴軍於栢鄉論功授汾州刺史轉檢校司徒俄兼西南面行營招討使出師收慈換慈沁二州刺史二年定魏愽授天雄軍廵按使十四年權蕃漢馬步副總管從攻楊劉戰胡栁十六年以本職兼領振武節度使時王師據德勝渡汴軍據村渡存進造橋成人皆伏其智莊宗舉酒曰存進吾之杜預也賜寶馬御衣進檢校太保兼魏愽馬步都將與李存審固德勝十九年汴將王瓚率衆攻北城存進機拒應之汴軍退加檢校太傅李漢韶初事莊宗為河東牢城指揮使㑹契丹侵北鄙表令漢韶率師進討既而大破胡寇以功加檢校右僕射李存璋昭宗光化二年為澤州刺史入為牢城使從李嗣詔討雲州叛將王暉平之改敎練使檢校司空五年立莊宗夷内難頗有力焉改河東馬步都虞候兼領鹽鐵又從破汴軍於夾城轉檢校司徒栢鄉之役為三鎭排陣使十二年從盟朱友謙於猗氏授汾州刺史汴將尹皓攻慈州逆戰敗之十三年王檀逼太原存璋率汾之軍入城固守授大同軍防禦使應蔚朔等州都知兵馬使秋契丹逼雲州存璋拒守敵退以功檢校太傅大同軍節度雲應等州觀察使十九年四月以疾卒於雲州同光初追贈太尉平章事李存賢以天祐五年權知蔚州以禦吐渾六年權沁州刺史先是州當賊境不能保守存賢至郡乃移復舊郡莊宗嘉之轉檢校司空眞拜刺史九年汴人乗其無備來攻其城存賢擊退之十一年授武州刺史山北團練使十二年移慈州刺史七月汴將尹皓攻州城存賢督軍拒戰遁去十八年河中朱友謙來求援命存賢率師赴之十九年汴將段凝軍五萬營臨晉存賢拒退之以功加檢校司徒同光二年為盧龍軍節度使卒詔贈太傅康君立自武皇為鴈門節度立為右都押衙僖宗時從武皇入關逐黄孽收長安武皇還鎭太原授先鋒軍使文德初李罕之既失河陽來歸於武皇且求援焉乃以君立充南面招討使為汾州刺史及潞州小校安居受反武皇遣君立討平之授檢校左僕射昭義節度使自是武皇之師連嵗掠地於邢洺攻孟方立君立常率澤潞之師以為掎角加檢校司徒食邑千户李存孝據邢州叛武皇命君立討之以功加檢校太保薛志勤自武皇鎭鴈門領代北軍使從入關收京城以功檢校工部尚書河東右都押衙先鋒右軍使從武皇救陳許平黄巢武皇遇難於上源驛志勤擊敗汴軍昭宗大順初與李承嗣敗韓建之軍於䝉坑進收晉綘以功授沂州刺史又從討鎭州牧天長臨城志勤皆先登陷陣王暉據雲州叛討平之以志勤為大同軍節度檢校司空史儼為武皇帳中親將昭宗乾寧中從討王行瑜時京城太擾士庶奔迸儼分騎警衛駕比還京盜賊不作以功檢校右散騎常侍屯於三橋者累月昭宗寵錫優異史建瑭昭宗光化中典昭德軍與李嗣昭攻汾州率先登城擒叛將李瑭以獻授檢校工部尚書李思安之圍上黨也建瑭為前鋒與總管周德威赴援時汴將王景仁營於栢鄉瑭與德威先出井陘高邑之戰汴軍有歸志建瑭先陷其陣遂長驅追擊夜入栢鄉俘斬數千論功加檢校左僕射十三年敗劉鄩於元城收澶州以建瑭為刺史檢校司空外衙騎軍都尉蓋寓自武皇鎭太原為左都押衙檢校左僕射昭宗乾化三年寓從武皇入闗討王行瑜特授檢校太保開國侯邑千户周德威昭宗乾寧中為鐵林軍使從武皇討王行瑜以功授檢校左僕射移内衙軍副天祐三年與李嗣昭合燕軍攻潞州降丁㑹以功加檢校太保代州刺史代嗣昭為蕃漢都將李思安之冦潞州也徳威軍余吾時汴州軍十萬築夾城圍潞州及武皇猒代莊宗再援潞州德威大敗梁軍解潞州之圍以功加檢校太保平章事十年又擒幽州劉守光父子授檢校侍中幽州盧龍軍節度使符存審初典武皇義兒軍從討邠州之勁兵屯龍泉寨存審奮力抜之師旋授檢校左僕射副李嗣昭討李瑭於汾州擒之以功改左右廂步軍都指揮使昭宗天祐三年授蕃漢馬步副指揮使與李嗣昭降丁㑹於上黨從周德威破賊夾城以功加檢校司徒授沂州刺史使領蕃漢馬步都指揮使七年加檢校太保充蕃漢副總管九年梁祖攻蓨縣存審赴援汴人燒營而遁以功遙領邢洺慈團練使十三年二月劉鄩襲魏州存審戰於故元城大敗汴人從莊宗收澶衛慈洺等州秋邢州閻寶降授存審安國軍節度邢洺慈等州觀察使十月戴思逺棄滄州毛璋以城降授存審檢校太傅横海軍節度使兼領魏愽馬步軍都指揮使明年就加平章事十九年平鎭州以功加檢校太傅兼侍中二十年正月師旋於魏州莊宗出城迎勞就第宴樂居無何契丹犯燕薊詔存審以本官充幽州盧龍軍節度使自鎭州之任同光初加開府儀同三司檢校太師中書令邑千户賜號忠烈扶天啓運功臣五月卒於幽州莊宗震悼乆之廢朝三日贈尚書令袁建豐為鐵林都虞候從武皇破邠州王行瑜以功遷左親騎軍使轉突騎指揮使從莊宗解圍上黨破栢鄉陣累功加右僕射左廂馬軍使明宗為内衙指揮使建豐為副北討劉守光常身先士伍轉都教練使權蕃漢副總管莊宗入鄴以心腹幹能選為魏府都廵撿使破劉鄩下衛慈洺三郡有功加檢校司空夏魯竒為慈州刺史中都之戰汴人大敗魯奇擒王彦章以獻莊宗壯之賞絹千匹梁平授鄭州防禦使元行欽為武寧軍節度使檢校太傅莊宗賜名紹榮常内宴羣臣使相預㑹行欽官為保傅合地褥而坐酒酣樂作帝叙平生戰陣之事因左右顧視曰紹榮安在所司奏云有𠡠使相預㑹紹榮散官殿上無位帝徹㑹不懌翌日以行欽為同平章事繇是不宴百官於内殿但宴武臣而已李建及為遼州刺史莊宗胡栁之役欲收軍建及引銀鎗效節奮擊繇是王師復振以功檢校司空魏愽内外衙都將又與汴將王瓚戰於戚城建及傷手莊宗解御衣金帶賜之張敬達為㕔直軍使從莊宗平河南有功加檢校工部尚書康思立為河東親騎軍使從莊宗解上黨圍敗梁人於栢鄉及平薊丘後戰於河上皆有功累加檢校戸部尚書右突騎指揮使莊宗即位繼改軍帥賜忠勇拱衛功臣加檢校尚書左僕射康延孝為捧日軍兼南面招討指揮使檢校司徒莊宗平汴延孝頗有力焉以功加檢校太保安元信為突陣軍都將時莊宗嗣晉王位元信從救上黨破夾寨復澤潞以功授檢校司空遼州刺史賜玉鞍名馬栢鄉之役日晚戰酣元信重傷莊宗自臨傅藥改檢校司徒武州刺史充内衙副都指揮使山北諸州都團練副使安金全武皇時為騎將屢從征伐莊宗之救潞州及平河朔皆有戰功累遷刺史閻寶莊宗時遥領天平軍節度使東西面招討等使張文禮之殺王鎔也寶帥師進討及契丹來援鎭州前鋒至新樂衆心憂之寶見莊宗指陳方畧軍情乃安敵退加檢校侍中李紹文莊宗時為愽州刺史預破劉鄩於故元城歴貝隰二州刺史領天雄軍馬步副都將屯於德勝從閻寶討張文禮為馬步都虞候明宗收鄆州以紹文為右都押衙馬步軍都將從破王彥章於中都同光中歴徐滑二鎭副使知府事霍彦威為陜州留後從明宗平潞州授徐州節度使天成初改平盧軍節度至鎭擒王公儼斬之明年冬肆覲於汴明宗接遇甚厚累遷至檢校太尉兼中書令王晏球為齊州防禦使北面行營馬軍都指揮使鄴都之亂明宗入赴内難晏球時在瓦橋遣人招之明宗至汴晏球率騎軍從至京師以平定功授宋州節度使天成二年王都據定州叛晏球討平之以功授天平軍節度使未幾移鎭青州就加兼中書令安審通明宗天成初為齊州防禦使兼諸道先鋒馬軍都指揮使奉詔北征㑹龍晊部下兵亂審通盡戮之以功檢校太傅滄州節度使劉彦琮為鐵林指揮使從明宗赴難京師授華州留後尋正授節旄西方鄴為奉義指揮使天成初荆渚違命明宗素知其才力擢授䕫州刺史東南面行營招討副使鄴將偏師收復峽内三州二年昇䕫州為寧江軍以鄴為節度使屢奏克捷三年加檢校太保孫璋天成初為齊州防禦使王都之據中山璋為定州行營都虞候賊平加檢校太保張䖍釗為親軍都指揮使領春州刺史明宗天成中䖍釗與諸將圍王都於中山大敗契丹於嘉山之下及定州平以功授滄州節度使晉房知溫初仕後唐明宗天成初為兖州節度使明年詔充北面招討使屯於盧臺軍以盧文進來歸特加進同平章事賞招討之功也至長興二年除平盧軍節度使累官至開府儀同三司檢校太師兼中書令封東平王食邑五千户食實封三百户高祖天福元年十二月卒於鎭贈太尉詔立神道碑康福初仕後唐明宗為朔方河西等軍節度到鎭嵗餘西戎皆欵附改賜福耀忠扶定保節功臣末帝清泰中加特進開國侯充西面都部署高祖受命就加檢校太尉封開國公華温琪仕後唐為泰州節度使明宗即位因入朝願留闕下明宗嘉而許之除左驍衛上將軍逐月别賜錢粟以豐其家後為太子少保致仕高祖天福元年十二月終於家詔贈太子太保方太為奉國都虞候從杜重威破張從賔於氾水高祖以其功除趙州刺史郭金海為䕶聖都虞候高祖天福二年金海從王師討范延光於魏州以功轉本軍都指揮使王建立為青州節度使高祖天福二年封臨淄王明年封東平王五年入覲高祖賜不拜呼老兄使肩輿入朝上殿則使人扶導論者榮之尋表乞休致帝不許乃除潞州節度使割遼沁為上黨屬郡加檢校太師進封韓王以光其故里高祖御明德樓餞送赴鎭賜玉斧蜀馬及卒册贈尚書令馬全節高祖天福五年鎭安州時李金全據州叛引淮軍為援因命全節將兵討平之以功加檢校太尉六年授鎭州行營副招討使兼排陣使與安重榮戰於宗城大敗之鎭州平加開府儀同三司程福贇初為軍校天福七年冬從杜重威討鎭州與安重榮大戰於宗城以功遷雒州團練使檢校太尉皇甫遇高祖天福末鎭河陽少帝即位歸闕及北騎南寇從至漕州戰於鄆州北津敵衆大敗溺死數千人以功拜滑州節度使郭璘少帝開運中鎭易州時契丹攻其郡以州兵擊賊數獲其利朝廷嘉之就加檢校太保漢王周初仕後唐明宗為禆校累歴郡守晉天福中安重榮以鎭州叛從杜重威討平之以功授貝州節度使高祖定天下移鎭徐州加同平章事乾祐元年二月卒於鎭輟視朝三日贈中書令劉在明後唐明宗時為奉聖左廂都指揮使領和州刺史從幸汴州至滎陽聞朱守殷叛用為前鋒至汴城率先登城賊平授汴州馬步軍都指揮使晉高祖天福中李金全以安州叛在明從李守貞攻之大破淮賊以功授安州防禦使移領綘州楊光逺據青州叛召為行營馬步軍都指揮使領齊州防禦使青州平遷相州留後及高祖踐阼授幽州道行營都部署時蕃將守中山在明出師經略敵乃棄城而去遂授鎭州留後乾祐元年五月二日授鎭州節度使六月卒於鎭贈侍中史宏肇為許州節度使侍衛步軍都指揮使時高祖由蒲陜赴潞宏肇為前鋒兵士所至秋毫不犯以至平定兩京及從駕征鄴迴加同平章事充侍衛親軍都指揮使兼鎭宋杜重威晉天福初典禁軍遥授舒州刺史二年張從賓搆亂據氾水晉高祖遣重威與侯益率衆破之以功授潞州節度使與楊光逺降范延光於鄴城改許州節度使兼侍衛親軍馬步軍副都指揮使尋加同平章事周高季興梁太祖時為荆南節度使開平中破雷彦恭於朗州加平章事安叔千初仕後唐莊宗為奉安都將天成初王師伐定州命為先鋒都指揮使王都平授秦州刺史連刺涿易二郡清泰初契丹冦振門叔千從晉祖逆戰敗之進位檢校太保振武節度使晉祖踐阼就加同平章事王商後唐天成中為靈武都指揮使乆之代還清泰中張令昭據鄴叛商從范延光討之首冒矢石率先登城以功授祁州刺史何福進後唐清泰中自彰聖都虞候率本軍從范延光平鄴以功歴鄭隴二州防禦使安審暉晉高祖時為河陽節度使㑹李金全據安州叛詔馬全節為都部署領兵討之以審暉為副安陸平移鎭鄧州進位檢校太傅又襄州安從進叛舉漢南之衆北攻南陽審暉登城召賊帥以讓之從進不克而退襄州平就加檢校太尉宋彦筠初仕晉為防禦使從高行周破安從進於襄陽以功拜鄧州節度使王饒仕晉高祖為奉國軍檢校尚書左僕射天福六年從杜重威平常山以功加檢校司空遷本軍都校領連州刺史時安從進叛于襄陽高祖以饒為行營步軍都指揮使賊平授凉州刺史復為本軍右廂都指揮使領閬州團練使及漢祖舉義於晉陽尋討復諸夏唯常山郡為蕃將所據時饒在其郡乃與李筠白再圖之䇿承間盡逐其黨漢祖嘉之授鄜州觀察使後加光祿大夫賜爵齒侯高從誨為荆南節度使晉天福中加守中書令時襄州安從進反王師攻討從誨起戰棹饋軍食以助焉詔書褒美尋加守尚書令劉詞仕晉為奉國第一都虞候從馬全節伐安陸敗淮賊萬餘衆晉祖嘉之授奉國都校累加檢校司空又從杜重威敗安重榮於宗城又破鎭陽詞自登雲梯身先士伍以功加檢校司徒沁州刺史又仕漢為奉國右廂都校遥領閬州防禦使從漢祖平鄴加檢校太保乾祐初李守貞叛於河中太祖征之朝廷以詞為侍衛步軍都指揮遥領寧江軍節度使充行營馬步都虞候命分屯於河西二年正月李守貞遣敢死之士數十夜入其營詞叱短兵以擊之賊衆大敗而退河中平太祖嘉其功表為華州節度使嵗餘移鎭滑臺太祖受命加同平章事王令温晉初為洺州團練使及安重榮稱兵於鎭州晉祖以令温為營馬軍都指揮使與都帥杜重威敗賊於宗城以功授亳州防禦使李建崇仕晉為申州刺史天福七年冬襄州安從進搆逆建崇拒賊至湖陽縣之花山接戰大敗之以功授亳州團練使襄陽平遷安州防禦使王重𦙍為禁軍指揮使晉天福中鎭州安重榮謀叛請分杜重威麾下兵擊敗之以功遷䕶聖右廂都指揮使漢初仍典禁軍從征鄴都為先鋒都校鄴都平遷深州刺史趙暉仕漢祖乾祐初鎭鳳翔屬王景崇叛據岐山命暉為西南面行營都部署以討明年春拔之加檢校太師兼侍中國初就加兼中書令曹英仕漢為奉國軍主檢校司徒假康州刺史乾祐初李守貞據河中叛授行營步軍都校河中平遷本軍廂主領岳州防禦使隨太祖在魏為北面行營步軍都校從平内難國初以翊戴功授招武軍節度使檢校太傅侍衛步軍都指揮使史彦超為龍捷指揮使太祖之赴内難彦超以本軍從國初與虎揵都指揮使何徽戍晉州㑹劉崇與契丹入冦攻圍州城月餘彦超與何徽叶力固拒累挫賊鋒太祖嘉其善守之功賞賜甚厚未幾授龍捷右廂都指揮使尋授鄭州防禦使劉崇之寇潞州也車駕親征以彦超為先鋒都指揮使高平之戰先登陷陣以功授華州節度使先鋒如故高行周初𨽻後唐明宗帳下時明宗為總管襲鄆州行周為前軍夜涉河入東城比曙平之及莊宗平河南累加檢校太保領端州刺史明宗即位行周從王景球圍定州敗王都擒秃餒皆有功賊平遷頴州團練使晉末為鄆州節度使漢高祖入汴加守太傅兼中書令代李守貞為天平軍節度使杜重威據鄴叛漢高祖以行周為招討使總兵討之鄴平遷鄴都留守加守太尉進爵臨清王乾祐中入覲加守太保進封鄴王復授天平軍節鉞改封齊王太祖踐阼加尚書令増食邑至一萬七千户太祖以行周耆年宿將賜詔不名但呼王位而已廣順二年秋薨贈賻加等册贈尚書令追封秦王安審琦仕晉少帝為襄州節度使兼中書令屬荆人叛命潛遣舟師數千將屠襄郢審琦禦之而遁朝廷賞功就加守太保進封齊國公嵗餘又加守太傅國初封南陽郡顯德初進封陳王世宗嗣位加守太尉三年拜章請覲優詔許之加守太師増食邑至一萬五百户食實封三千三百户唐景思世宗時董效順指揮屯於淮上世宗親征淮南景思繼有戰功乃命遥領饒州刺史白延遇仕晉歴典禁軍累遷至檢校司空天福中晉祖在鄴安重榮叛於鎭州帥衆數萬指闕而來晉祖命杜重威統諸將以禦之時延遇不預其行乃泣告晉祖願以身先許之及陣於宗城延遇帥其屬先犯之斬級數千晉祖聞之即命中使以寶劍良馬賜之常山平以功加檢校司徒充馬軍右廂都校後遷復州防禦使國初加檢校太保尋受代歸闕屬太祖親征兖海以延遇為先鋒都校兖州平授齊州防禦使及世宗征淮南乃詔延遇為先鋒都校與韓令坤先入揚州尋以别部屯於盛塘前後敗淮賊萬餘衆及世宗迴自夀陽制以延遇為同州節度使未之任所以疾卒於濠州下詔贈太尉册府元龜卷三百八十七
