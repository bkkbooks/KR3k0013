body:
  text: 册府元龜卷六百三十宋王欽若等撰銓選部條制第二唐𤣥宗開元二年三月勑諸色出身人銓試訖應常選者常年色各為一甲團奏給告牒過百人以上分不滿五人附入甲其月二十八日勑繁劇司闕官有灼然要籍者聴牒選司於應得官人内據材用資歴相當者先補擬五月詔曰今歳諸州多非善軌爰及京師每勞轉運員外等官人數倍廣禄俸之軰何以克周諸色員外試簡校官除皇親諸親及五品以上並戰陣要籍内侍省以外一切摠停至冬放選量狀迹書判與正員外官其未經考者先與處分仍不拘選格聴集自今以後除戰功以外非别勑不得輒注擬員外等官十一月詔曰新豐縣官及温泉監官經兩度祗承者與一中上考三年正月五日勑内外官考未滿所司預補替名守闕特宜禁斷縱後有闕所繇不得令上六月八日𠡠吏部銓委任尤重比雖守職務在循常既限之以選勞或失之於求士宜選日用擢一二十人不湏限以資次四年四月詔曰選人既多比銓注過謝了皆不及考遂使每一年選即虗破一年闕在於公私俱不利便自今以後官人初上年宜聴通計年以來滿二百日者許其成考仍准零考例至來年考時併校永為常式六月十九日勑六品以下官令所司補授其員外郎御史并餘供奉宜進名𠡠授七月勑如聞黔州管内州縣官員多闕吏部補人多不肯去成官官以後或假解或從正考滿得資更别叅選自餘管蠻僚州大率亦皆如此宜令所司於諸色選人内即召補並馳驛發遣至州令都府勘到日申所司如遲違牒管内都督御史六十日追毁告身更不須與官九月十二日勑諸色選人納紙保候五日内其保識官各加當司具名品并所在人州貫頭御都為一牒報選司若有偽濫先用闕然後准式處分十二月詔曰比来兩畿縣令經一兩考即改其行茍且罕在政要百姓弊於迎送典吏因而隠欺自今以後皆令四考滿滿日聴依京官例選仍不得輙續於前勞六年二月詔曰我國家敦樸質斷浮艷禮樂詩書是宏文徳綺羅珠翠深格弊風必使情見於詞不用言深於行比來選人試判舉人對䇿剖析案牘敷陳奏議多不切事宜廣張華飾何大雅之不足而小能之是衒自今以後不得更然八月詔曰明經進階雖著於甲令儒道敦俗宜申於舊章其選人有能仕優則學所業不廢者當在甄收以示勸奬其能舊經外更業者准初出身例加階是月𠡠嶺南及黔中叅選人曹如文解每限五月三十日到省八月三十日内簡勘使了選使及選人限十月三十日到選所正月三十日内銓注使畢其嶺南選補使宜移桂州安置九月二十七日𠡠應南州每府同一解嶺北州及黔府管内州每州同一解各令所管勘責出身繇厯選數考課優勞等級作簿書先申省省司勘應選人曹名考等一事以上明造歴予選使與本司對勘定訖便結階定品署印牒付選使其每至選時皆湏先定所擬官使司團奏後所司理覆同但憑進畫應給籖告所司為冩限使奏𠡠到六十日内冩了差專使送付黔桂等州州司送本州府分付九年十月𠡠如聞朝官子弟未曾經歴即坐要司及京畿并州縣理人官或侍郎受財遨遊怠惰或恣行决罰妄作姦非刑憲不可偏矜父兄莫能訓導茍䧟於法良軫於懐宜令本司及州府長官按實驗察有此色并少年未諳時事可移與閑慢官十一年四月十五日勑要官兒子少年未經事者不得作縣官親民十二年三月詔曰文武選人十月下解既逼銓注勘簡難周不能自親並委猾吏恣成姦濫為蠧尤深自今以後兵吏兩司專定員外兩人判南曹事每年選畢起五月一日所是文狀即預勘責闗簡判南曹官親自就覆每包攅作簿書對本司長官連署印記不得委其胥吏勘責畢各具人數奏聞其判南曹官所司郎進名朕自簡擇以陳希烈席豫判吏部南曹劉同升源復判兵部南曹其年太子左庶子吳兢上表諌曰臣聞易稱君子思不出其位言各止其所不侵官也此實百王凖的伏見勑㫖勑刑部尚書韋抗等十人分掌吏部銓選及試判將畢遽召入禁中决定雖有吏部尚書及侍郎皆不得叅其事議者皆以陛下曲受讒言不信於有司然則居上臨人之道經邦緯俗之規必在推誠方能感物抑又聞欲用天下之智力者莫若使天下信之也故漢光武置赤心於人腹良有㫖哉昔魏明帝嘗卒至尚書省尚書令陳矯跪問曰陛下欲何之帝曰欲按下省司文簿矯曰此自臣之職分非陛下所宜臨若臣不稱職則宜就黜退陛下宜即還宫帝慙廻車而反又陳平邴吉者漢家之宰相耳尚不對錢糓之數不問鬬死之人故知自天子至于卿士守其職分而不可輒有侵越也况我大唐萬乘之君卓絶千古之上豈得下行選曹之事頓取恠於朝野乎凡是選人書判並請委之有司仍停此十銓分選依舊以三銓為定十四年十一月二十五日勑比来所擬注官多不慎擇或以資授或未適才宜令吏部每年先於選人内精加簡試灼然明閑法理者留擬其評事以上仍令大理長官相加簡擇並不得授非其人十五年九月𠡠今年吏部選人宜依例糊名試判臨時考等第奏聞十六年五月十日勑諸蕃應授内外文武官及留宿衛長上者共為一甲其放還蕃者别為一甲仍具形狀年幾同為一奏十七年三月制曰邉逺判官多有老弱宜令吏部每年於選人内揀擇彊幹堪邉任者隨闕補受秩滿量减三兩選與留仍加優奬是日制曰諸州都督刺史上佐等官員闕非安穏者所授官在任經一考以上宜量與改轉十八年四月侍中裴光庭以選人既廣常限或有出身二十餘年而不獲禄者復作循資格定為限域凡官罷滿以若干選而集各有差等卑官多選髙官少遷賢愚一貫必合乎格者乃得銓授自下昇上限年躡級不得踰越乆淹不收者皆荷之謂之聖書雖小有常規而求材之方失矣此起於後魏崔亮停年之制也其有異才髙行聴擢不次然有其制而無其事有司但守文奉式循欲壓例而已五月十一日勑附甲授官無闕者却牒中書門下改擬十九年四月二十六日勑應授官校考叙功累勲有失者門下省詳覆有憑即為改注十二月制曰設官分職本資共理無隔中外更遞出入比者考官計年除改縁其任乆量與遷移遂長僥求爭次入考所司情故公然遣来若更因循有損風化今年考使事了並勒還州必政理著聞當别有處分其年齒衰暮疾疢緜積無别愆違者宜聴致仕二十年正月二十二日吏部尚書裴光庭奏文武選人承前三月十日始畢比團甲巳至夏末自今以後並正月三十日内團甲至二月内畢六月二十八日蕭嵩奏吏部選人請准舊例至三月三十日團甲畢二十一年六月二十八日制曰古者諸侯舉士必本於鄉曲府庭署吏亦先於能行所以人自束脩官無敗政及乎魏承漢弊權立九品今之吏部用是因循乆仕漫多為法轉宻然於濟理求才未聞深識持衡取事徒立煩文朕寤寐永懐每以怊悵夫琴瑟不調者改而更張法令不便者義復何異頃者有司限數及拘守循資遂令銓衡不得探㧞天下賢俊屈滯頗多凡人三十始可出身四十乃得從事更造格限分品為差若如所制之文六十尚不離一尉有才能者始得如此稍敦朴者遂以終身繇是取人豈為明恕自今以後選人每年搃令赴集仍舊以三月三十日為限其中有才優業異操行可明者一委吏部臨時擢用貴於取實何限常科雖逺郡下僚名迹稍著亦湏甄㧞令其勸勉俾人思為善之利俗知進取之途朕所責成實在吏部可舉其大畧令有所依比者流外奏申乃引過門下簿書堆盈於𤨏闥胥使填委於掖垣豈是事宜過為煩碎自今以後亦宜依舊先是裴光庭為吏制循資格光庭薨蕭嵩為中書令與光庭不協以資格取士不廣故奏改之二十四年十二月二十四日制王子未出閣侍讀侍講侍文侍書並取見任官充經三年放選與處分習藝館諸色内教通取前資及常選人充經二年以上選日各於本色量減兩選與處分左右衛三衛及五品以上子孫經七年雜衛三衛經八年勲官經九年並放選與處分天寳二年十一月十六日勑諸州醫學生等宜隨貢舉人例申省補署十年與散官恐年歳深乆簡勘無憑仍同流外附甲八載六月十六日勑授百官宜侍攅符九載三月十三日勑吏部取人必限書判且文學政事本自異科求備一人百中無一况古來良宰豈必文人又限循資尤難奬擢自今以後簡縣令但才堪政理方圓取人不得限以書判及循資格注擬諸畿望𦂳上中每等為一甲委中書門下察問選擇堪者然後奏授大理評事其朝要子弟中有未歴望畿縣便授此官既不守文又未經事自今以後有此色及朝要至親並不得注擬十一載七月詔曰政理之源實惟選士銓綜之道必在至公比來文武選人調集者及於留放末日引通或甄鑒匪周或紀綱不一以資取捨詎免流言湏議事以制法亦因時而革弊自今以後吏部選人宜審定格限頒示令集銓之日各量官資書判狀迹功優據闕合留對衆便定豈惟免淹時日抑亦共表公平見收者既無濫升被放者亦當歛分則自近及逺以絶倖求其有宏詞愽學或書判特優超越流輩者不過限以選數聴集其武部選人試日校等第功優亦對衆便從留放仍永為常式並作條件處分是月勑吏部選人書判藍縷及雜犯不合得留者不限選數並放除此之内先從選深人一槩並留其選深被放人選淺得留名其留放逗留牓示選人各令知悉仍以單狀奏聞不湏更起條目十二月二日吏部尚書楊國忠奏請兩京選人集銓日便定留放無長名遂勑文部選人調集者宜審定限格令集銓日量官資書判狀跡功優據闕合留對舉便定十三載三月二十八日勑為授官取蜀郡大麻紙一張寫告身七月二十七日勑如聞嶺南州縣近来頗習文儒自今以後其嶺南五府管内白身有詞藻可稱者每至選補時任令應諸色鄉貢舉仍委去使准我考試有堪及第者具狀聞奏如有願赴京者亦聴其前資官并常選人等有詞理兼通才堪理務者亦任此選及授此官肅宗至徳二載二月詔其刺史上佐録事叅軍縣令委中書門下速於諸色人中精加訪擇補擬判司丞以下宜令所繇先於兩京潜藏不事逆賊及故託疾病官中簡擇考資深才堪者詮注續發遣乾元二年三月丙辰制自來諸州府多有奏請官者或先無闕員所司雜授捜即與替深紊紀綱自今以後州縣官有灼然衰暮暗弱無政及犯贓私切湏與替者仰具事繇聞奏如縁軍州文要官吏部任簡擇并具闕繇聞奏所奏人皆湏具歴任考第甲授日月同奏三年閏四月制設官以理本在安人遞遷之政務於利物今寰瀛之内兵革未清加以時或不登物皆踴貴軍儲是急廪稍靡供冗官之流固甚勞弊其京閑司官等有材堪釐務者宜令中書門下即類例量資歴出授外官代宗寳應二年七月制刺史縣令自今以後改轉刺史三年為限縣令四年為限員外及攝政官一切不得釐豫廣徳元年二月勑諸州府及縣令今後每有闕官宜委本州府當日牒報本道觀察節度及租庸使使司具闕繇附便使牒中書門下送吏部依闕准式處分其所闕官有職務稍重者委本府長官於見任及比司官中簡擇權令勾當正官到日停不得更差前資及白身等攝吏部及制勑所授官委中書門下及吏部甲制勑出後三日内下本州准令式計程水一月不到任本州報中書門下吏部用闕如灼然事故准勑勒留不在此限其違程人六品以下本色内殿一兩選許同㑹闕不成人例五品以上停一二年其殿選人諸州諸使不得奏用二年二月制臺省之官事資履歴刺史縣令任在親人職務所更是為理本其左右丞侍郎御史中丞等取曾任刺史者郎官亦取曾任縣令者并所選御史亦宜於録事叅軍縣令中簡擇仍湏資歴稍深者其有官非累歴才行特堪任用者自布衣以上任所在聞薦委中書門下尚書省考試堪任者不在此限其天下諸州府長官及縣令有清白著聞善政稱最能招緝逃亡編附復業户口增多者具狀聞奏朕當差人按覆典所舉狀同者超資進改又諸州府授官違程不到任六品以下各於本色内殿一兩選同㑹闕不成例處分五品以上停一二年與處分三月制中書門下兩省五品以上尚書省四品以上御史五品以上諸同正員三品以下諸王駙馬中要周朞上親及女婿外甥不得任京兆府判司畿令赤縣丞簿尉從京兆尹魏少游所請永泰元年七月詔不許百姓任本貫州縣官及本貫隣縣官京兆河南府不在此限大厯元年二月詔許吏部選人自相舉如任官有犯坐舉主從吏部侍郎王延昌所請四年正月吏部以選士多闕員少請用授官計上日成三考闕許之六年七月十四日宰臣奏請自今以後勑授文武六品以下官勑自後付兵吏部附甲團奏十二年六月勑見任中書門下兩省五品以上尚書省三品以上子孫合授官者一切擬京官不得擬州縣官徳宗大厯十四年五月癸亥即位六月己亥朔徳宗御丹鳯樓大赦天下諸州刺史上佐自今以後准式入計建中元年正月制常叅官及節度觀察防禦軍使都知兵馬使刺史少尹赤令畿令及大理司直評事授訖三日内於四方舘上表讓一人自代其外官委長吏附送其表付中書門下每官闕以舉多者授之其月勑大理法官及太常禮官宜委吏部每至選時簡擇才識相當者與本司商量注擬二年七月闗播為給事中舊例諸司甲庫皆是省吏掌知為弊頗乆播始定議並以士人知之至今稱當興元元年六月詔應去冬奉天行在給勑牒授官人等宜令中書門下簡勘牒及憑據分明即依授官月日進畫以後簡官日並畫日為定不得用所行下月日十月詔軍衛及率府五品以上正員武官得替及以禮去任者宜令兵部准五品以上天官例每年作格限條件聞奏是年勑吏部侍郎劉滋知洪州選事時京師㓂盗之後天下蝗旱榖價翔貴選人不能赴調乃命滋江南典選以便江嶺之人時稱舉職十一月嶺南選補史右司郎中獨孤愐奏伏准建中四年九月一日勑選補條件所注擬官便給牒放上至上都付吏部團奏給告身勑㫖准式處分貞元元年三月勑宜令清資常叅官每年於吏部選人中各舉一人堪任縣令録事叅軍者所司依資注擬便於甲歴具所舉官名銜仍牒報御史臺如到任政理尤異及無贓犯事跡明著所司録舉官姓名聞奏當議褒貶仍長名後二十日内舉畢仍永為常式七月吏部奏選人淹滯多時理湏權宜發遣請量取建中四年授官至今計日成考三闕注擬其授替人皆於常例稍屈宜量事優當委所司選限畢後具所用闕人名䘖聞奏至選日各减一選二年正月制曰叅官及節度觀察防禦軍使城使兵馬使諸州刺史少尹赤令畿令并七品以下清官及大理司直評事等頃者令内外新授官人三日内上表舉一人自代欲於中選才堪者任用比來所舉少有摭實殊乖素來求才之意自今以後每舉人皆令指陳其承前事跡如有政能行義藝業勞効各分析言之二月京兆尹鮑防奏咸陽縣令賈全是臣親外甥伏准廣徳二年三月十一日勑中書門下及兩省五品以上尚書省四品以上諸司正員三品以上諸王駙馬等周朞以上親及女婿外甥等自今以後不得任京兆府判司及畿縣令兩京縣丞簿尉等者制曰功勞近臣至親子弟既處繁劇或招過犯寛宥則撓法取責則虧恩不令守官誠為至當賈全等十人昨縁畿内凋殘親自選擇事非常制不令避嫌三月吏部奏劇准今年二月十三日勑除臺省常叅官餘六品以下並准舊例部付本司處分者其六品以下選人中有人才書判無闕相當承前准格皆送中書門下又立功狀奏請要有褒揚等令並委本司注擬即不同常格選人若無闕相當一一令待續闕事即停滯必招喧訴應縁功狀及非時與官合授正員額内并選限内無闕注擬者伏請量事計日用成三考闕如臨時人數稍多注擬不足灼然湏處置發遣即請兼用兩考以上得資闕并量人才資序注擬訖准勑送中書門下詳定可否其六品以下有官資稍髙合入五品縱非五品亦請依前送名勑㫖兩考闕不在用限其三考闕如非當年准格令用除别勑授官人外亦不在用限如闕員不足選人事湏處分者臨時奏聴進止餘依二月勑二月勑實録不載其月又勑五品准式不合選補使注擬宜付吏部簡勘訖送中書門下其據資叙却合授六品以下官任便處分五月吏部奏伏准貞元元年七月二十五日勑諸州府及京五品以上官停使下郎官御史等宜付所司作條件聞奏省縁諸色功優非時授官闕員稍多請作節限許集上州刺史兩府少尹四赤令停替後許一月日於都省陳牒納文狀畢簡勘同具繇歴每至月終送名中書門下仍請不試太原河中鳯翔江陵成都興元府少尹赤令及原兆鴘赤令中下州刺史諸使不停减郎官御史等停官當年並聴集六品以下常叅官以禮去任者當年聴集宜員官京兆府先申中書門下省簡勘未成失文歴者其中先東西在逺不及選集並請依後許合集人限所在陳牒隨例赴集選人有明經進士道舉明法出身無出身人有經制舉宏詞㧞萃及第判入等清白狀陟狀并曾有上下考較奏成及考義名聞制及勑褒奬者或曽任郎官御史起居補闕拾遺太常博士兩府畿赤官使下郎官觀察使節度都團練防禦度支水陸運鹽鐵使留守判官支使推官書記等制勑分明貞元元年十二月以前離任者一切聴集併六府少尹鴘赤令並不在此試例應未及一考以下被替丁憂服滿廢省患解侍親解并隔絶不止州府縣昇降等官並聴當年集縁未得資望准六品以下選人例所試狀縱入下等望臨時據人材定留放其違程上人經免殿者聴集仍却還本道本色官應准格未合集人其中有文詞博贍學術精通灼然為衆所知亦任於所在州府程狀本州長官精加選擇堪奬㧞者具解繇送依例赴集至省審考覈有才實相副别狀送名如有渝濫其本州署申解牒本判官量事科罰四品五品官中庸衰疾情願致仕官者但是正員官不限考數任於所在州府陳牒依合集人狀様通繇歴准前送本道觀察使上省不用身到禮部附學官先及第人黄蘭吏部者並聴集准例式狀定留放應集合試官並望准舊例狀一道仍准建中二年格例及大厯十二年六月制請條委左右僕射兵部尚書侍郎同考試其狀考入上次等具名所試狀依限送中書門下其考入下等者任還七月復置吏部小選七月詔實録不載二年十一月十日勑嶺南黔中選舊例補注訖給牒放上其俸除手力紙筆園厨雜給之外餘並待奏申勑到後據㫖給付其福建選補使宜停其桂黄泉建賀福韶等州宜依選例省補四年正月一日制額内官勿更注擬見任者三考勒停諸道幕府判官及軍將比奏改准例多超日應從散慢入清望官者並拆資處分八月吏部奏伏以艱難以來年月積乆兩都士庶散在逺方三庫勑甲又經伏墜因此人多罔冐吏或詐欺混見官者謂之擘名承已死者謂之接脚乃至制勑㫖甲皆被改張毁裂如此之色其類頗多比來因循遂便滋長所以選集加衆真偽混然實資簡責用甄涇渭謹具繇厯狀様如前伏望委諸州府縣於界内應有出身以上便令依様通狀限勑牒到一月内畢務令盡出不得遺漏其勑請令度支急遞送付州府州司待納狀畢以州印印狀尾末縫相連星夜送觀察使司定判官一人專使勾當都封印差官給驛遞驢送至省上都五百里内十二月上旬到千里外中旬到每逺較一千里外即加一旬雖五千里外一切正月下旬到盡黔中嶺南應不合北選人不納文狀限其狀直送吏部曹不用都司發人到日所司勘會即姦偽必露寃抑可明如湏盤問即下所在州府責狀其隠而未盡及在逺不及期限者亦任續通依前觀察使興送所在勘責必有灼然踰濫事跡著明者據輕重非條件商量聞奏庶稍澄流品永息踰濫勑㫖依奏五年十二月十六日勑除常叅官及諸使判官等餘並附所司申其兵部選人亦准此六年二月制吏部續留選人新授官者至來年二月之任初吏部侍郎劉滋李紓以去冬選人無缺員乃奏請代貞元五年授官計日成考者三百五十員令至今年八月之任議者非之於是諌議大夫韓章抗䟽曰竊見去年選授官者多以六月七月方至任所扶老携㓜不逺數千里以就一官到纔經年遂見停替又見在留中人多有注貞元四年闕者准格至來年正月赴上其續留人注五年闕者遽以今年八月便上一等用闕一等授官五年闕者授替在前四年闕者准格上仍在後事交非允可矜今制命巳行難於改易其所授官人請令至來年二月上赴從之八年二月户部侍郎盧徵奏内外官應直京百司及禁軍并因親勒留官等若勑出便帶職事及勒留京官即合以勑出為上日外官以勑到為上日如今司未經奏聞即合同赴任者例准貞元六年二月二十四日勑待甲出後省符到任日支給俸料者若甲出未帶勒留官簽符先下州府支替理例未免喧争伏請起今以後並湏挾名留勒勑到任方為上日支給科錢其附甲官有給脚依前勒留直諸司者待附甲後簽符到州為上日支給課料兾塞僥求庶絶論訴勑㫖宜依是年中書侍郎平章事陸贄始復令吏部每年集選人舊事吏部嘗每年集人其後遂三數年一置選人猥至文書多不可尋勘真偽紛雜及因大為姦巧選士一蹉跌或至十年不得官而官之闕者或累歳無人贄乃令吏部分内外官員為新分計闕集人年以為常其弊去十七八天下稱之九年七月以縣令四考為限無替者宜至五考十一月制以冬薦官其令諸司尚書左右丞本司侍郎引於都堂訪以理術兼試時務狀考其通否及歴任考第事跡定為二等並舉主名姓録奏仍令御史一人監試如授官有課効尤著及犯贓不任者仍委御史臺及觀訪使聞奏以殿最舉使十二月制自今後應諸色使行軍司馬判官書紀叅謀支使推官等使罷者如是簡校試五品以下不合於吏部選集並任准罷使郎官御史例冬集季聞奏十年二月刑部奏准建中元年正月十七日勑諸州府五品以上正員及額内上佐宜四考停其左降官不在此限者五品左降官既不許停禄料六品以下未復資已經四考未量移間其禄料伏望亦許准給勑㫖禄料宜准天寶六載七月十四日勑處分餘依常式十一年五月左降官于邵劉剔等並量移授官故事量移六品以下官皆吏部㫖授至是始特制授之十三年三月詔於吏部選人中簡擇通事舎人十四年八月故懐澤縣主壻簡校右贊善大夫竇克搆伏言臣頃以國親超授寵禄及縣主薨逝臣官遂停臣陪位出身未授簡校官日自有本官伏乞宜付所司許取前銜婺州司户叅軍隨例詣選詔竇克搆宜令赴選仍委有司比類前任正員官依資注擬自今以後郡縣主壻丁憂外有曽任正員官停簡校官俸料者亦准此處分其餘先是兼試同正員等不在選序者停簡校官俸料任便赴集有司據簡校官量降三資與正員官元無官與解褐正員官十五年六月詔吏部奏選人依前二月三十日以前團奏畢其流外兵部禮部舉人等專委郎官恐不詳審共為取舎適表公平每至留放之時皆就尚書侍郎對定既上下簡察庻任得人十六年十二月罷吏部覆考判官先是每歳吏部選人試判官别奏官考覆第其上下考訖中書門下覆奏擇官覆定侵以為例至是中書侍郎平章事齊抗奏言吏部尚書侍郎巳朝廷精選不宜别考重覆其年他官考判訖俾吏部侍郎自覆問後一歳遂除覆考判官葢因抗所建白也册府元龜卷六百三十
