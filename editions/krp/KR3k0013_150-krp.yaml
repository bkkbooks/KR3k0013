body:
  text: 冊府元龜卷一百五十宋王欽若等撰帝王部寛刑書曰與其殺不辜寧失不經斯寛刑之謂也故虞夏之道寡怨於民漢興之初禁網疏闊爾後或下民多辟自投罪罟為之司牧不忘𨼆悼以至理官閱獄法科無爽申嚴攸屬國章是舉而乃録其昔欵察其素心申恩以矜老推仁而錫類寛其連及之典恕以狂愚之罰奉順時令重惜髦彦霽雷霆之威恢川澤之量霈然發號以原以降斯臯陶所謂好生之盛徳仲尼所述濟猛之善政者也漢文帝十三年太倉令淳于意有罪當刑少女緹縈上書曰妾父為吏齊中皆稱其廉平今坐法當刑妾傷夫死者不可復生刑者不可復屬屬聮也一作續雖欲改過自新其道亡繇也妾願没身入為官婢以贖父刑罪使得自新書奏帝憐悲其意是嵗除肉刑具法官定律門後漢光武建武中董宣為北海相大姓公孫丹子殺人宣收丹父子殺之丹宗黨三十餘人稱寃宣使書佐水丘岑盡殺之坐徴詣廷尉當刑同刑九人次應及宣光武馳使騶騎特原宣刑且令還獄遣使者詰宣多殺無辜宣具以狀對言水丘岑受臣㫖意罪不繇之願殺臣活岑使者以聞有詔左轉宣懐令令青州勿案岑罪二十八年十月癸酉詔死罪繫囚皆一切募下蠶室具女子宫謂幽閉也三十一年九月甲辰詔令死罪繫囚皆一切募下蠶室具女子宫章帝建和中有人侮辱人父者而其子殺之帝貰其死刑而降宥之和帝永元元年十月令郡國弛刑輸作軍營其徙出塞者刑雖未充皆免歸田里十一年二月詔郡國中都官徒及篤癃老小女徒各降半刑其未充三月者皆免歸田里順帝即位初詔司𨽻校尉惟閻顯江京近親當伏辜誅其餘務崇寛貸陽嘉元年九月詔郡國中都官繫囚皆減死罪一等亡命者贖各有差楊倫順帝時為侍中會邵陵令任嘉贓罪千萬倫上請并罪本舉之主尚書奏探知宻事徼以求直坐不敬結鬼薪結正其罪也鬼薪取薪以給宗廟三嵗刑也詔書以倫數進忠言特原之免歸田里魏太祖時魏諷反劉廙弟偉為諷所引當相坐帝下令曰叔向不坐弟虎古之制也特原不問徙署丞相倉曺屬􅛫上疏謝曰臣罪應傾宗禍應覆族遭乾坤之靈值時來之運揚湯止沸使不燋爛起煙於寒灰之上生華於已枯之木物不荅施於天地子不謝生於父母可以死効難用筆陳文帝黄初中韓宣為尚書郎嘗以職事當受罰於殿前已縛束杖未行帝輦過問此為誰左右對曰尚書郎勃海韓宣也帝追念前臨菑侯説乃寤曰是子建所道韓宣邪韓宣為軍謀掾嘗輿臨菑侯植相值值天雨潦以扇自障往道邊植使人往問宣問答往還數四宣枝柱難窮植為太子言以為辯特原之遂解其縛時天太寒宣前以當受杖豫脱袴纒禈面縛及其原禈要廹不下乃趨而去帝目而送之笑曰此家有瞻諦之士晉武帝太始中西平人趙路伐登聞皷言多被謗有司奏棄市帝曰朕之過也釋而不問元帝時羊𥅆為廬陵太守疑郡人簡良等為賊殺二百餘人有司奏𥅆當死兄子賁尚公主自表求解婚詔曰罪不相及古今之令典也𥅆雖極法於賁何有其特不聴離婚琅邪太妃山氏𥅆之甥也入殿叩頭請命王導又啟𥅆罪不容恕宜極重法山太妃憂戚成疾陛下罔極之恩宜䝉生全之宥於是詔下曰太妃惟此一舅發言摧咽乃至吐血情慮深重朕往丁荼毒受太妃撫育之恩同於慈親若不堪難忍之痛以至頓弊朕亦何顔以寄今使原𥅆生命以尉太妃渭陽之恩於是除名後魏明元時封𤣥之坐與司馬國璠溫楷等謀亂伏誅臨刑帝謂之曰終不令絶汝種也将宥爾一子𤣥之謂曰弟處之子磨奴字君平早孤乞全其命乃殺𤣥之四子而赦磨奴孝文太和五年三月詔曰法妖詐亂常妄説符瑞蘭臺御史張永等一百餘人招結奴𨽻謀為大逆有司科以族誅誠合刑憲但矜愚重命猶所弗忍其五族者降止同祖三族止一門誅止身陸叡為鎮北将軍與穆泰等同謀搆逆賜死獄中免孥戮徙其妻子為遼西郡民詔僕射李冲領軍于烈曰陸叡少年早蒙寵禄位極人臣自與卿等同受非常之詔朕許以不死之㫖思得上下齊信以保大義朕於卿等嘗忘短棄瑕務相含養豈謂陸叡無心之甚一至於斯乃與穆泰結禍數圗反噬以朕遷雒内懐不可擬舉諸王議引子恂若斯之論前後非一始欲推故南安王次推陽平王若不肯従欲逼樂陵王訕謗朝廷書言炳然事既垂就叡以洛都休明勸令小緩於是之後兩人復競然猶𨼆而弗聞賴陽平王忠貞奮發獲泰之言便爾馳表得使正人糾慝恒岳無塵是以叡之愆失處入門誅朕諦尋前㫖許不盡法反逆之志自負幽㝠違誓在彼不闗朕也反心逆意既異餘犯雖欲矜恕無如之何然猶憶先言兼以末頗異議聴自死别府免厥孥戮其一門子孫永不齒元丕二子一弟首為賊端其父無人明證理在可覩但以言無炳灼隠而弗窮以連坐應死特恕為民朕本期有終而彼自棄卿等之間忽及今日違心乖念一何可悲故此别示想無致怪也謀反之外皎如白日耳冲烈表曰臣等遭逢幸會生遇昌辰才非利用坐班位列功無汗馬猥受山河叨忝之寵終古無比莫大之施萬殞靡酬而叡丕職乖犬馬心同梟獍潛引童稚搆兹妖逆違悖天常罪踰萬殞叡結釁在心隂搆不息間説戚藩擬窺乾象雖覩休平未懐疑惑何嘗片辭披露宿志原心語跡實為賊首丕之二子従惡累年交扇東西規擾并夏測觀此状無客不知雖聖慈含育恕其生命其若天地何其若神祗何夫効誠盡節為下之常分刑兹無赦在上之常法況曲䝉莫大之恩奨以忠貞之義而更違天背道包蔵姦逆求情推理罪乃常誅而慈造寛渥更流恩貸續叡三斷之骸還丕已絶之魄二三縦宥實虧憲典猶復上延天眷言念疇日不以臣等背負餘黨别垂明詔再申齊信之恩重諭皎日之㫖伏讀悲慙惟深愧惕沈保冲為南徐州冠軍長史坐援連口臣欽若等曰孝文太和二十一年南討諸将致於連口退敗有司處之死刑孝文詔曰保冲文秀之子可特原命配雒陽作部終身既而獲免新興公丕子隆謀舉兵斷闗丕當連坐孝文以先許不死之詔躬非染逆之身聴免死以為太原百姓其後妻二子聴隨隆母弟及餘庶兄弟皆徙燉煌李彪為散騎常侍孝文南伐彪為度支尚書與僕射李冲任城王等參理留臺事彪素性剛豪與冲等意義乖異冲積其前後罪過奏之帝在懸瓠覽表歎愕曰不意留京如此也有司處彪大辟帝恕之除名焉宣武時蕭寳夤以南齊宗室來奔除為鎮東将軍及中山王英南伐寳夤又表求征乃為使持節鎮東将軍别将以繼英配羽林虎賁五百人與英頻破梁軍乗勝遂攻鍾離淮水汎溢寳夤與英狼狽引退士死没者十四五有司奏寳夤守東橋不固軍敗繇之處以極法詔曰寳夤因難投誠宜加矜貸可恕死免官削爵還第隋高祖開皇六年詔免尉遲逈王謙司馬消難三逆人家口配没者悉官酬贖使為編户因除孥戮相坐之法陸讓為蕃州刺史黷貨當死母馮氏上表求哀詞情甚切文帝愍然為之改容獻皇后甚竒其意致請於帝治書侍御史栁彧進曰馮氏母徳之至有感行路如或殺之何以為勸帝於是集京城士庶於朱雀門遣舍人宣詔曰馮氏以嫡母之徳足為世軌慈愛之道義感人神特宜矜免用奨風俗譲可減死除名為民賀若弼平陳之役自謂功名出朝臣之右每以宰相自許既而楊素為右僕射弼仍為将軍甚不平形於言色繇是免官弼怨望愈甚後數年下弼獄文帝謂之曰我以髙熲楊素為宰相汝每唱言云此二人惟堪㗖飯耳是何意也弼曰熲臣之故人素臣之舅子臣並知其為人誠有此語公卿奏弼怨望罪當死帝惜其功於是除名為民唐高祖武徳四年二月親錄囚徒謂僕射裴寂曰離亂之後犯法者多限以常條死者更衆其刼賊傷財主征人逃走官人枉法如此之徒理在難恕自餘之輩朕欲法外赦之於是多所原放太宗貞觀十六年十一月廣州都督黨仁𢎞坐枉法取財及受所監臨贓百餘萬當死太宗哀之曰吾一昨見大理進殺仁𢎞第五奏中心愴然臨晡食遂令輟案愍其白首就戮将全活之而為其求理永無濟路今曲法就公等乞之十二月壬午朔召五品以上至太極殿前而謂之曰夫人君執賞罰貴在必信同天地法四時也黨仁𢎞犯罪當死朕欲哀矜是朕自弄文法誠負天地臣有過請罪於君君有過須請罪於天因命有司設草席於南郊壝内日一進蔬食朕将三日告天請罪焉司空房𤣥齡等曰陛下躬履行陣撥亂平敵天下户口千六百萬賴陛下而生禮洽化行政寛刑簡仁𢎞受財議當極法陛下哀其齒耄賜以更生殺生之柄屬在人主今欲請罪於天臣等不勝悚懼請停太宗不聴自左序門入百寮於殿廷頓首三請且至日晐太宗乃手詔答曰夫為政之大慎枉刑獄縦捨任心以欺衆庶罪一也知人不明委用貪冒罪二也善善未賞惡惡不誅罪三也若斯三者豈得無過以公固諫且依來請於是宥仁𢎞為庶人徙欽州十七年吏部尚書侯君集以反伏誅臨刑容色不改顧謂監刑将軍曰君集豈反者乎蹉跌至此然昔自藩邸早奉羈絏及蒙驅策謬當分閫擊滅二國頗有㣲功為言於陛下乞全一子以為禋祀繇是特原其妻及子為庶人徙嶺南二十二年九月齊州人段志冲上封事請帝致政於皇太子太子聞之憂見於色發言涕流長孫無忌等請誅志冲帝手詔答曰朕聞以徳下人者昌以貴髙人者亡是以五岳凌霄四海亘地納汙蔵疾無損髙深志冲欲以匹夫解位天子朕若有罪是其直也若當無罪是其狂也譬尺霧鄣天不虧於大寸雲遮日何損於明今卿等皆欲致以極刑意所不忍可更詳議任流逺方髙宗永徽四年十二月代州都督劉大器坐妄説圗䜟情有窺窬特免死流配峯州手詔示百寮曰窺窬圗䜟必以亡身滅族斯皆先賢設教厯代舊章今大器乃與妖人往還虛占禍福矯託天命包蔵逆心非意自彰已歸嚴憲今屈法免死者繇朕寡徳所致故也去春遺愛等逆起於前今冬大器禍彰於後一嵗之内再有此釁朕宵興自思非無深愧御史大夫長孫祥大理卿段寳𤣥奏言劉大器包蔵禍心罪合極法天恩寛貸特免其罪臣聞君親無将将而必誅此法厯代嘗行大器不可縦捨臣等忝是法官敢以死請帝曰卿等執奉誠知守法朕已恕其性命不敢二三竟赦之睿宗景雲二年十二月張奉先詐稱尚乗奉御偽宣勑取内廏馬司農丞獨孤璿犯贓並命斬之臨刑有制免死各杖一百放于嶺表太極元年金城人段萬謙昇太極殿登御床自稱天子呼宿衞兵士令稱萬嵗有司固請誅之帝以為風狂特免其死配流嶺表𤣥宗開元二年九月己亥詔曰明王垂訓則罪不相及善人懼罰則刑不可濫由是母嘗有言豈坐趙括魚既従戮寧遺叔向古之道也朕所務焉衞尉少卿崔滌竭誠奉國忘軀事君曽同下杜之遊頗寄中陽之舊誠表於先覺節全於後凋其兄湜素蓄異圗交結兇黨滌雖懐在原之急深憂闔室之刑動静則聞始終必盡為臣無𨼆唯滌有之言念厥功曷云従坐況老父就殞諸兄繼殁揺落變衰有聞矜憫賞罰勸懲宜判忠邪滌家除兄湜一房外餘並不須為累十四年詔曰陳州刺史李樂詐盜受贓其數甚廣法司斷死國有常刑時屬發生特申寛典宜免死貶為欽州道化縣尉員外置長任二十五年正月宣州溧陽令宋廷暉涇州良原令周仁公寧州彭原令裴裔皆犯贓坐死刑帝以陽和在候特恕之悉杖六十配流於龔州是年四月皇太子瑛鄂王瑤光王琚駙馬都尉薛鏽並得罪特免瑤妃韋氏詔曰鄂王瑤妃韋氏時標令徳作配藩邸夫義已薄婦道惟勤規誡之言無繇見納輔佐之道空竭乃誠但恭肅以奉上每柔明以撫下周旋禮度固所未聞不有家風何至於此今因罪累例加本族有善不紀何以勸下其韋氏不須為累徳宗貞元六年閏四月詔原富平令侯遵罪但停其官初遵縣人李載配納元陵園蕃兩車愆期成譖毁載於遵者因寄怒以痛繩之載所負之直不過數千而罰之三百貫文枷禁拽辱焉載妹婿昭徳皇后弟王果奏言帝命御史臺鞫之遵具欵伏宰臣董晉竇參進曰李載不納差科未為巨蠧侯遵峻其懲罰頗越常倫況是國親去就有禮毁損過甚理當罪責望貶澧州司户參軍帝不欲以戚屬之故而罪吏故有是命憲宗元和十二年七月宰相裴度為淮西行營處置使用兵討呉元濟建牙赴行營奏用左衞武将軍張茂和為都押衙茂和嘗以膽氣才畧自贊於相府故度奏用之茂和慮度無功淮蔡不可平乃辭之以疾度怒甚奏請斬茂和以厲行者憲宗曰予以家行忠順為卿逺貶十二月戊寅貶淮西降將董重質為春州司户凌朝江播州司户呉元濟拒命重質等屢與官軍力戰李愬平蔡州始來降以先許其不死故逺貶焉十四年五月戊寅前平盧營田判官陸行儉忍棄慈親倫安異俗臣節既廢子道亦虧顧其積惡合寘重典但以好生為徳來逺為心姑務含𢎞示其養理可守高州司户參軍己亥詔李師古嘗經任使待以始終雖是師道近親典章宜有差降其妻裴氏及女宜娘並於鄧州安置淄青平帝謂宰臣曰李師古雖自襲祖父然朝廷待以終始其妻於師道即嫂叔也雖曰逆人親屬量其輕重亦宜降等故有是詔七月鹽鐵福建院官權長孺坐贓一萬三百餘貫詔付京兆府杖殺之其母劉求哀於宰相崔羣因對言之帝愍其母老乃曰朕将捨長孺之死何如羣對曰陛下即捨之當速遣人往若待正勑不及矣帝乃使品官馳往止之翼日詔杖八十長流康州李宗奭為滄州刺史與本道節度鄭權不叶不秉節制權奏之憲宗令中使追之宗奭諷州兵留已上言懼亂未敢離郡滄州将吏懼共逐宗奭宗奭奔歸京師詔以悖亂之罪斬於獨栁之下後下詔曰李宗奭本於兇狠自抵誅夷用戒猖狂合従孥戮顧其㣲細已正刑章特示含𢎞載寛緣坐其妻韋氏及男女等先收在掖庭並宜放出前數日帝謂宰臣曰李宗奭雖抵嚴憲其情比之大逆亦有不同其妻士族也今與其子女俱在掖庭於法皆似過深卿等曽留意否崔羣對曰聖情仁惻罪止兇魁其妻子近屬儻獲寛恕實合𢎞覆之道帝遂出之准法逆人親屬得原免者唯止一身至是其奴婢資貨悉令還付穆宗長慶二年六月有于方者故司空頔之子欲以譎謀求進言於宰相元稹稱有竒士王昭等可反間出牛元翼於深州之圍貨誘兵吏部印為告身二十通以便宜給賜稹皆然之尋有告事人李賞上言稹設計隂謀令王昭等三人謀害宰相裴度詔三司案鞫無害裴度事而餘事並露獄成詔曰于方罪犯合處極刑以其父頔頃在襄陽頗能㡬諫不陷不義方實有之又念其弟季友嘗聮國姻特宜免死長流端州李賞流潮州郭𤣥覽于啟明王昭以于方既從減論並放杖郭𤣥覽配流封州于啟明配流新州王昭配流雷州敬宗寳厯三年正月御史臺奏右諫善大夫李方現把笏擊損内園品官李重實欵狀明具勑李方現不自謹身有此喧競假如品官陵忽只合詣實奏聞輒肆狂疎恣行毆擊傷人見血理在難容但以父有勤勞身叨宗屬特従輕典粗以繩違宜量罰兩月俸料三月丙子御史臺推勘京兆府藍田縣令劉㐾在任日将諸色錢𨼆没破用凡九十餘萬制曰劉㐾所犯贓私其數至廣恣為貪猾固抵刑章若據本條合當極法以其大父於國有勞特為矜量俾従寛宥宜除名流雷州㐾故宰相晏之孫也文宗太和三年五月滄州平制李同捷力屈計窮方圗轉禍在途隂懐狡計夜縦火號潛誘家僮更謀網漏自速梟獻其母并妻男及家口等宜並特從寛宥今於潮南館内諸有空閒處安置是月李載義進滄鎮兩州生口除在路死損外見在将徤共七百五人鎮州三百九十人已誅元惡按問其餘並宜減死分配邊州充鎮諸州防秋便充正額官徤度支給衣糧六月勑李同捷弟同志久因貶謫不涉逆謀又知異出特寛緣坐宜聴隨母於所配居止六年七月刑部奏大理寺申斷和州刺史徐登加徴税錢據其贓犯合處極法特勅徐登減死決四十流潮州七月慈州刺史杜叔近犯贓法當死庚申詔叔近以時屬元陽務従寛宥決八十流儋州後唐荘宗以同光四年四月即位下詔曰朕臨御寰區當明賞罰刑既加於有罪道貴洽於無私據親疎宜分皂白特行寛宥俾釋憂疑罪人元行欽孔謙及應犯法人田宅已従籍没其門人使下任従穏便不詰罪尤灼然有才能者仍許所司録任長興三年三月殿直張紹謙奏父靈武節度使希崇先借官馬十五匹遣軍将裴昭隠等二人進納其人與進奏官范順之隠留一匹合抵極法帝曰不可以一馬而戮三人笞而釋之十一月甲辰勑龍隲毛璋陶玘曺廷𨼆成景𢎞等或子或弟本無相及之刑尋示寛恩各免連坐止令州府别係職官而聞收管已來縻係之後頗極窮困宜放營生仰逐處開落姓名乃給公憑放逐穏便末帝清泰元年七月詔曰朕自中春釁生家國長子重吉遽陷無辜其供奉官楚祚乗幼主之猜嫌徇賊臣之指使纔聞差使遽自請行坐情過甚于仇讐臨法不依於制度恣加凌辱𨼆奪資財縦便致於族誅亦未平於深恥朕再惟大體不欲極刑抑沈痛於恩情示好生于天道且令逺斥粗釋幽寃宜配登州長流百姓嘗知所在其父西京副指揮使處章放令自便縦逢恩赦不在齒録之限重吉明宗時為控鶴指揮使鄂王時朱馮忌嫉出為亳州團練使重吉初不奉詔令宋州節度使召赴州令楚祚往害之帝息嗣不多併罹非禍言發涕零後知祚殺重吉時詬辱笞掠以責家財時祚在外位立令追攝将加極刑韓昭裔曰帝王天下君父臣下皆為赤子論刑定罪須合人心楚祚承命檢校家財理須窮詰若以此加法懼失物情今便族楚祚之門已逝者何救臣受恩殊等安敢惜言帝曰吾兒不可復得殺一楚祚何足與言帝性仁恕終為韓開釋而祚免死是年詔陜州放左龍武統軍王景勘絳州刺史張従諫先是二人從康義誠出軍皆為部下所執歸帝初欲誅之従諫大言曰臣従殿下千征萬戰臣之材力殿下所知豈童豎輩所能制臣誘臣歸首翻以為擒面欺也帝惜其才用令拘於陜獄至是釋之晉髙祖天福二年七月諸衞将軍婁繼英坐張從賔叛梟首闕下勑河府奏收到婁繼英男萬泉令懐徳據婁繼英已行處斬家業投官其婁懐徳令河府追取舊受告身毁抺特従釋放三年八月大理寺以左街使従人韓延嗣招為百姓李延暉衝省街使連喝不住遂驅趂毆撃致延暉身死准律鬭毆人者元無殺心因相鬭毆而殺人者絞故殺人者斬其韓延嗣准律皆斬准刑法絞類節文絞斬刑決重杖一頓處死勑曰韓延嗣因呌喝見不避路者輒行毆擊致傷人命法寺定刑比不因鬬故毆傷人辜内死者依殺人論葢徴相類且非本條有所疑法當在宥宜決脊杖十八黔面配華州發運務収管周太祖廣順二年九月同州節度使薛懐讓并子有光受夏陽縣民張延徽獻送迫促判官劉震斷殺里人康重等訴寃臺司奏薛懐譲并子有光及隨幕判官軍将等並令追攝勘問帝以懐譲武臣位兼使相不欲責辱只令臺司據見勘到欵占結案獄成上付大理寺詳斷劉震王延誨並處死刑部郎中劉延詳覆稱冊府元龜卷一百五十
