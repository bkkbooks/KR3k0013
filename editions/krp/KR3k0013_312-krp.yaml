body:
  text: 册府元龜卷三百十二宋王欽若等撰宰輔部謀猷第二漢衛綰為丞相武帝建元元年十月詔丞相御史列侯中二千石二千石諸侯相舉賢良方正直言極諌之士綰奏所舉賢良或治申商韓非蘇秦張儀之言亂國政請皆罷奏可卜式為御史大夫式既在位言郡國不便鹽鐡而舩有筭可罷魏相為丞相條漢興以來國家便宜行事奏請施行曰臣聞明主在上賢輔在下則君安虞而民和睦虞與娱同臣相幸得備位不能奉明法廣教化理四方以宣聖徳民多背本趍末或有饑寒之色為陛下之憂臣相罪當萬死臣相知能淺薄不明國家大體時用之宜惟民終始未得所繇竊伏觀先帝聖徳仁恩之厚勤勞天下垂意黎庶憂水旱之災為民貧窮發倉廩賑乏餒遣諌議大夫博士廵行天下察風俗舉賢良平寃獄冠蓋交通省諸用寛租賦弛山澤陂池禁秣馬酤酒貯積秣馬以粟米飯馬也貯積滯米粟也所以周急繼困慰安元元便利百姓之道甚備臣相不能悉陳昧死奏故事詔書凡二十三事臣謹按王法必本於農而務積聚量入制用以備凶災亡六年之畜尚謂之急元鼎二年平原渤海太山東郡溥被災害溥與並同民餓於道路二千石不豫慮其難使至于此頼明詔賑捄乃得蒙更生捄古救字今嵗不登榖暴騰踊臨秋收斂猶有乏者至春恐甚亡以相恤西𦍑未平師旅在外兵革相乗臣竊寒心宜蚤圖其備惟陛下留神元元率繇先帝盛徳以撫海内宣帝施行其策相又數表采易陰陽及明堂月令奏之表謂標明之采撮取也曰臣相幸得備員奉職不修不能宣廣教化陰陽未和災害未息咎在臣等臣聞易曰天地以順動故日月不過四時不忒聖人以順動故刑罰清而民服天地變化必由隂陽隂陽之分以日為紀日冬夏至則八風之序立萬物之性成各有常職不得相干東方之神太昊乗震執規司春木為仁仁者生生者圜故為規南方之神炎帝乗離執衡司夏火為禮禮者齊齊者平故為衡西方之神少昊乗兊執矩司秋金為義義者成成者方故為矩北方之神顓頊乗坎執權司冬水為智智者謀謀者重故為權中央之神黄帝乘坤艮執繩司下土土為信信者誠誠者直故為繩兹五帝所司各有時也東方之卦不可以治西方南方之卦不可以治北方春興兊治則饑秋興震治則華冬興離治則泄天地之氣不閉宻也夏興坎治則雹明王謹于尊天慎于養人故立羲和之官以乘四時乘治也節授民事各依其節而授以事君動静以道奉順隂陽則日月光明風雨時節寒暑調和三者得叙則災害不生五榖熟絲麻遂艸木茂鳥獸蕃艸古草字蕃多也民不夭疾衣食有餘若是則君尊民恱上下亡怨政教不違禮讓可興夫風雨不時則傷農桑農桑傷則民饑寒饑寒在身則亡亷恥寇賊姦宄所由生也臣愚以為隂陽者王事之本羣生之命自古聖賢未有不繇者也天子之義必純取法天地而觀於先聖髙皇帝所述書天子所服第八第八天子衣服之制也于施行詔書第八曰大謁者臣章受詔長樂宫曰令羣臣議天子所服以安治天下相國臣何御史大夫臣昌蕭何周昌也謹與將軍臣陵太子太傅臣通等議陵王陵通叔孫通春夏秋冬天子所服當法天地之數中得人和故自天子王侯有土之君下及兆民能法天地順四時以治國家身無禍殃年夀永究是奉宗廟安天下之大禮也臣請法之中謁者趙堯舉春主一時衣服禮物朝祭百事也李舜舉夏倪湯舉秋貢禹舉冬髙帝時自有一貢禹也四人各職一時大謁者襄章奏制曰可孝文皇帝時以二月施恩惠於天下賜孝弟力田及罷軍卒祠死事者頗非時節罷軍卒新從軍而休罷者也御史大夫鼂錯時為太子家令奏言其狀臣相伏念陛下恩澤甚厚然而災氣未息竊恐詔令有未合當時者也願陛下選明經通知隂陽者四人各主一時時至明言所職以和隂陽天下幸甚數陳便宜帝納用焉貢禹為御史大夫列于三公在位數言得失書數十上又上言諸離宫及長樂宫衛可減其大半以寛繇役又諸宫奴婢十萬餘人戲遊亡事稅良民以給之歳費五六鉅萬宜免為庶人廪食給其食也令代關東戍卒乘北邊亭塞候望又欲令近臣自諸曹侍中以上家亡得私販賣與民爭利犯者輙免官削爵不得仕宦又言孝文皇帝時貴㢘潔賤貪汚賈人贅婿及吏坐贓者皆禁錮不得為吏賞善罰惡不阿親戚罪白者伏其誅白明也疑者以與民罪疑從輕也亡贖罪之法故令行禁止海内大化天下斷獄四百與刑措亡異武帝始臨天下尊賢用士闢地廣境數千里自見功大威行遂從耆欲從讀曰縱耆讀曰嗜用度不足乃行一切之變使犯法者贖罪入榖者補吏是以天下奢侈官亂民貧盜賊並起亡命者衆郡國恐伏其誅則擇便巧史書習於計簿能欺上府者以為右職上府謂所屬之府右職髙職也姦宄不勝則取勇猛能操切百姓者以苛暴威服下者使居大位故亡義而有財者顯于世欺慢而善書者尊於朝誖逆而勇猛者貴於官故俗皆曰何以孝弟為財多而光榮何以禮義為史書而仕宦何以謹慎為勇猛而臨官故黥劓而髠鉗者猶復攘臂為政於世行雖犬彘家富勢足目指氣使是為賢耳動目以指物出氣以使人故謂居官而置富者為雄桀處姦而得利者為壯士兄勸其弟父勉其子俗之壞敗乃至於是察其所以然者皆以犯法得贖罪求士不得真賢相守崇財利相諸侯相也守郡守也誅不行之所致也今欲興至治致太平宜除贖罪之法相守選舉不以實及有贜者輙行其誅亡但免官不止免官而已則爭盡力為善貴孝弟賤賈人進真賢舉實㢘而天下治矣孔子匹夫之人耳以樂道正身不解之故解讀曰懈四海之内天下之君微孔子之言亡所折中况乎以漢地之廣陛下之徳處南靣之尊萬乗之權因天地之助其於變世易俗調和隂陽陶冶萬物正天下易於決流抑隊決欲流之水抑將隊之物言其便宜自成康以來幾且千嵗欲為治者甚衆然而太平不復興者何也以其舍法度而任私意奢侈行而仁義廢也陛下誠深念髙祖之苦言髙祖取天下之難醇法太宗之治正己以先下選賢以自輔開進忠正致誅姦臣逺放讇佞讇古謟字赦出園陵之女罷倡樂絶鄭聲去甲乙之帳退偽薄之物修節儉之化驅天下之民皆歸于農如此不解解讀曰懈則三王可侔五帝可及唯陛下留意省察天下幸甚元帝下其議令民産子七嵗乃出口錢自此始又罷上林宫館希幸御者及省建章甘泉宫衛卒減諸侯王廟衛卒省其半餘雖未盡從然嘉其質直之意後漢耿國為大司馬上言宜置度遼將軍左右校尉屯五原以防逃亡卒後明帝追思國言後遂置度遼將軍左右校尉如其議焉第五倫為司空倫雖峭直然嘗疾俗吏苛刻及為三公值章帝長者屢有善政乃上疏褒稱盛美因以勸成風徳曰陛下即位躬天然之徳體晏安之姿以寛𢎞臨下出入四年前嵗誅刺史二千石貪殘者六人斯皆明聖所鑒非羣下所及然詔書每下寛和而政急不解務存節儉而奢侈不止者咎在俗弊羣下不稱故也光武承王莽之餘頗以嚴猛為政後代因之遂成風化郡國所舉類多辨職俗吏殊未有寛博之選以應上求者也陳留令劉豫冠軍令駟協並以刻薄之姿臨人宰邑専念掠殺務為嚴苦吏民愁怨莫不疾之而今之議者反以為能違天心失經義誠不可不慎也非徒應坐豫協亦當宜譴舉者務進仁賢以任時政不過數人則風俗自化矣臣嘗讀書記知秦以酷急亡國又目見王莽亦以苛法自滅故勤勤懇懇實在于此又聞諸王主貴戚驕奢踰制京師尚然何以示逺故曰其身不正雖令不從以身教者從以言教者訟夫隂陽和嵗乃豐君臣同心化乃成也其刺史太守以下拜除京師及道出雒陽者宜皆召見可因博問四方兼以觀察其人諸上書言事有不合者可但報歸田里不宜過加喜怒以明在寛鮑昱為司徒建初元年大旱榖貴章帝詔昱問曰旱既太甚將何以修復災眚對曰臣聞聖人理國三年有成今陛下始踐天位刑政未著如有失徳何能致異但臣前在汝南典理楚事臣欽若等曰謂楚王英事繫者千餘人恐未能盡當其罪先帝詔言大獄一起寃者過半又諸徙者骨肉離分孤魂不祀一人呼嗟王政為虧宜一切還諸徙家屬蠲除禁錮興滅繼絶死生獲所如此和氣可致帝納其言張奮為司空值嵗災旱祈雨不應乃上表曰比年不登人用饑匱今復久旱秋稼未立陽氣垂盡嵗月廹促夫國以民為本民以榖為命政之急務憂之重者也臣蒙恩尤深受職過任夙夜憂懼章奏不能叙心願對中常侍疏奏即時引見復口陳時政之宜明日和帝召太尉司徒幸雒陽獄録囚徒收雒陽令陳歆即大雨三日桓焉順帝即位拜太傅與太尉朱寵並録尚書事焉復入授經禁中因讌見建言宜引三公尚書入省事帝從之李固為太尉質帝初將北卜山陵固乃議曰今處處㓂賊軍興用費加倍新創憲陵賊發非一帝尚㓜少可起陵於憲陵塋内依康陵制度其於役費三分減一乃從固議楊賜為司徒靈帝初黄巾帥張角等執左道稱大賢以誑燿百姓天下襁負歸之賜召掾劉陶告曰張角等遭赦不悔而稍益滋蔓今若下州郡捕討恐更騷擾速成其患且欲切勅刺史二千石簡别流人各䕶歸本郡以孤弱其黨然後誅其渠帥可不勞而定何如陶對曰此孫子所謂不戰而屈人之兵廟勝之術也賜遂上書言之㑹去位事留中魏王朗文帝時為司空孫權遣使稱藩而與劉備交兵詔議當興師與吳并取蜀不朗議曰天子之軍重於華岱誠宜坐曜天威不動若山假使權親與蜀賊相持摶戰曠日智均力敵兵不速決當須軍興以成其勢者然後宜選持重之將承冦賊之要相時而後動擇地而後行一舉可無餘事今權之師未動則助吴之軍無為先征且雨水方盛非行軍動衆之時帝納其計又奏曰詔問所宜損益必謂東京之事也若夫西京雲陽汾隂之大祭千有五百之羣祀通天之䑓入阿房之宫齊必百日養犧五載牛則三千其重玉則七千其器文綺以飭重席童女以蹈舞綴釀酎必貫三時而後成樂人必三千四百而後備内宫美人數至近千學官博士七千餘人中廐則騑騄駙馬六萬餘匹外牧則扈養二萬而馬十之執金吾從騎六百走卒倍焉太常行陵幸車千乘太官賜官奴婢六千長安城内治民為政者三千中二千石蔽罪斷刑者二十有五獄政充事猥威儀繁富隆於三代近過禮中夫所以極奢者大抵多受之於秦餘既違繭栗慤誠之本掃地簡易之指又失替質而損文避泰而從約之趣豈夫當今隆興盛明之時祖述堯舜之際割奢務儉之政除繁崇省之令詳刑慎罰之教所宜希慕哉及夫寢廟日一太牢之祀郡國並立宗廟之法丞相御史大夫官屬吏從之數若此之軰既已屢改於哀平之前不行光武之後矣謹按圖牒所改奏在天地及五帝六宗宗廟社稷既已因前代之兆域矣夫天地則掃地而祭其餘則皆壇而埒之矣明堂所以祀上帝靈䑓所以觀天文辟雍所以修禮樂太學所以集儒林髙禖所以祈休祥又所以察時務揚教化稽古先民開誕慶祚舊時皆在國之陽並髙棟夏屋足以肆饗射望雲物七郊雖尊祀尚質猶皆有門宇便坐足以避風雨可須軍罷年豐以漸修治舊時虎賁羽林五營兵及衛士并合雖且萬人或商賈惰㳺子弟或農野謹鈍之人雖有乗制之處不講戎陣既不簡練又希更冦雖名實不副難以備急有警而後募兵軍行而後運糧或乃兵既久屯而不務營佃不修器械無有貯聚一隅馳羽檄則三靣並荒擾此亦漢代近世之失而不可式者也當今諸夏已安而巴蜀在畫外雖未得偃武而弢甲放馬而戢兵宜因年之大豐遂寄軍政於農事吏士小大並勤稼穡止則成井里於廣野動則成校隊於六軍省其暴繇贍其衣食易稱恱以使民民忘其勞恱以犯難民忘其死今之謂矣糧畜於食勇畜於勢雖坐曜烈威而衆未動畫外之蠻必復稽顙以求改往而効用矣若畏威効用不戰而定則賢於交兵而後威立接刃而後功成逺矣若姦凶不革遂迷不反猶欲以其所虐用之民待大魏投命報養之士然後徐以前歌後舞樂征之衆臨彼倒㦸折矢樂服之羣伐腐摧枯未足以為喻賈詡為太尉文帝謂詡曰吾欲伐不從命以一天下吳蜀何先對曰攻取者先兵權建本者尚德化陛下應期受禪撫臨率土若綏之以文德而俟其變則平之不難矣吴蜀雖蕞爾小國依阻山水劉備有雄才諸葛亮善治國孫權識虛實陸遜見兵勢據險守要汎舟江湖皆難卒謀也用兵之道先勝後戰量敵論將故舉無遺䇿臣料羣臣無備權對雖以天威臨之未見萬全之勢也昔舜舞干戚而有苖服臣以為當今宜先文後武文帝不納後興江陵之役士卒多死陳羣為司空太和中中軍大將軍曹真表欲數道伐蜀從斜谷入羣以為太祖昔到陽平攻張魯多收豆麥以益軍糧魯未下而食猶乏今既無所因且斜谷阻險難以進退轉運必見鈔截多留兵守要則損戰士不可不熟慮也帝從羣議真復表從子午道羣又陳其不便並言軍事用度之計詔以羣議下真真據之遂行㑹霖雨積日羣又以為宜詔還帝從之蜀諸葛亮為丞相聞孫權破曹休魏兵東下關中虛弱上言曰先帝慮漢賊不兩立王業不偏安故託臣以討賊也以先帝之明量臣之才故知臣伐賊才弱敵强也然不伐賊王業亦亡惟坐待亡孰與伐之是故託臣而弗疑也臣受命之日寢不安席食不甘味思惟北征宜先入南故五月渡瀘深入不毛并日而食臣非不自惜也顧王業不得偏全於蜀都故冐危難以奉先帝之遺意也而議者謂為非計今賊適疲於西又務於東兵法乗勞此進趍之時也謹陳其事如左髙帝明並日月謀臣淵深然渉險被創危然後安今陛下未及髙帝謀臣不如良平而欲以長計取勝坐定天下此臣之未解一也劉繇王朗各據州郡論安言計動引聖人羣疑滿腹衆難塞胷今嵗不戰明年不征使孫䇿坐大遂并江東此臣之未解二也曹操智計殊絶於人其用兵也髣髴孫吴然困於南陽險於烏巢危於祁連偪於黎陽幾敗伯山殆死潼關然後偽定一時耳况臣才弱而欲以不危而定之此臣之未解三也曹操五攻昌霸不下四越巢湖不成任用李服而李服圖已委之夏侯而夏侯敗亡先帝每稱操為能猶有此失况臣駑下何能必勝此臣之未解四也自臣到漢中中間朞年耳然䘮趙雲陽羣馬玉閻芝丁立白夀劉郃鄧銅等及曲長屯將七十餘人突將無前賨叟青羗散騎武騎一千餘人此皆數十年之内所糾合四方之精銳非一州之所有若復數年則損三分之二也當何以圖敵此臣之未解五也今民窮兵疲而事不可息事不可息則住與行勞費正等而不及今圖之欲以一州之地與賊持久此臣之未解六也夫難平者事也昔先帝敗軍於楚當此時曹操拊手謂天下已定然後先帝東連吴越西取巴蜀舉兵北征夏侯授首此操之失計而漢事將成也然後吴更違盟關帥毁敗秭歸蹉跌曹丕稱帝凡事如是難可逆見臣鞠躬盡力死而後已至於成敗利鈍非臣之明所能逆覩也於是有散關之役吴顧雍為丞相時江邊諸將各欲立功自効多陳便宜有所掩襲權以訪雍雍曰臣聞兵法戒於小利此等所陳欲邀功名而為其身非為國也陛下宜禁制茍不足以曜威損敵所不宜聼也權從之晉王渾為司空武帝嘗訪渾元㑹問郡國計吏方俗之宜渾奏曰陛下欽明聖哲光于逺近明詔沖虚詢及芻蕘斯乃周文疇咨之求仲尼不恥下問也舊三朝元㑹前計吏詣軒下侍中讀詔計吏跪受臣以詔文相承已久無他新聲非陛下留心方國之意也可命中書指宣明詔問方士異同賢才秀異風俗好尚農桑本務刑獄得無寃濫守長得無侵虐其勤心政化興利除害者授以紙筆意盡陳聞以明聖指垂心四逺不復因循常辭且察其答對六義以觀計吏人才之實又先帝時正㑹後東堂見征鎮長史司馬諸王國卿諸州别駕今若不能别見可前詣軒下使侍中宣問以審察方國於事為便帝然之裴秀為司空秀以尚書三十六曹統事準例不明宜使諸卿任職未奏而薨桓温加侍中大司馬都督中外諸軍使假黄鉞温上疏陳便宜七事其一朋黨雷同私議沸騰宜抑杜浮競莫使能植其二戸口凋寡不當漢之一郡宜并官省職令久於其事其三機務不可停廢常行文案宜為限日其四宜明長㓜之禮奬忠公之吏其五裦貶賞罰宜允其實其六宜述遵前典敦明學業其七宜選建史官以成晉書有司皆奏行之謝安為中書監録尚書事輔政于時懸象失度亢旱彌年安奏興滅繼絶求晉初佐命功臣後而封之謝𤣥已破符堅安奏宜乗釁分㑹以𤣥為前鋒都督率冠軍將軍桓石䖍徑造渦頴經略舊都𤣥復率衆次于彭城南齊褚淵髙帝時為司徒後魏來侵帝欲發王公以下無官者為軍淵諌以為無益實用空致擾動帝乃止後魏咸陽王禧為長兼太尉上表曰國朝偃武崇文偏捨來久州鎮兵人或有雄勇不閑武藝今取嵗暮之暇畨上之日訓其兵法弓矢干矟三分並教使人閑其能臨事無闕詔曰雖云教武未練其方既逼北行卒聞教武脱生羣惑且可停之崔浩為司徒時方士祁纎奏立四王以日東西南北為名欲以致禎吉除災異詔浩與學士議之浩對曰先王建國以作蕃屏不應假名以為其福夫日月運轉周歴四方京都所居在於其内四王之穪實奄邦畿名之則逆不可承用先是纎奏改代為萬年浩曰昔太祖道武皇帝應天受命開拓洪業諸所制置無不循古以始封代土後稱為魏故代魏兼用猶彼殷商國家積徳著在圖史當享萬億不宜假名以為益也纎之所聞皆非正義太武從之是時河西王沮渠牧犍内有貳意太武將討焉先問於浩浩對曰牧犍惡心已露不可不誅官軍徃年北伐雖不克獲實無所損于時行者内外軍馬三十萬匹計在道死傷不滿八千嵗常羸死恒不減萬乃不少於此而逺方乗虚便謂大損不能復振今出其不意不圗大軍卒至必驚駭騷擾不知所出擒之必矣且牧犍劣弱諸弟交恣爭權從横民心離解加比年以來天災地變都在秦梁成滅之國帝曰善吾意亦以為然命公卿議之𢎞農王奚斤等三十餘人皆曰牧犍西陲下國雖心不純臣然繼父職貢朝廷接以蕃禮义王姬釐降罪未甚彰謂且覊縻而已今士馬勞乏宜可小息又其地鹵斥畧無水草大軍既到不得久停彼聞軍來必完聚城守攻則難拔野無所掠於是尚書古弼李順之徒皆曰自溫圉河以西至於姑臧城南天梯山上冬有積雪深一丈餘至春夏消液下流成川引以溉灌彼聞軍至決此渠口水不通流則致渴乏去城百里之内赤地無草又不任久停軍馬斤等議是也帝乃命浩以其前言與斤共相難抑諸人不復餘言唯曰彼無水草浩曰漢書地里志稱涼州之畜為天下饒無水草何以畜牧又漢人為居終不於無水草之地築城郭立郡縣也又雪之消液裁不斂塵何得通渠引漕溉灌數百萬頃乎此言大詆誣於人矣李順等復曰耳聞不如目見吾曹目見何可共辯浩曰汝曹受人金錢欲為之辭謂目不見便可欺也帝隱聽聞之乃出親見斤等辭㫖嚴厲形于神色羣臣乃不敢言唯唯而已於是遂討涼州而平之多饒水草如浩所言及帝至東雍親臨汾曲觀叛賊薛永宗疊進軍圍之永宗出兵欲戰帝問浩曰今日可擊否浩曰永宗未知陛下自來人心安閑北風迅疾宜急擊之湏臾必碎若待明日恐其見官軍盛大必夜遁走帝從之永宗潰滅車駕濟河前驅告賊在渭北帝至雒水橋賊已夜遁詔問浩曰蓋吴在長安北九十里渭北地空榖草不備欲渡渭南西行何如浩對曰蓋吴營去此六十里賊魁所在擊蛇之法當先破頭頭破則尾豈能復動宜乗勢先擊吴今軍往一日便到平吴之後廽向長安亦一日而至一日之内未便損傷愚謂宜從北道若從南道則葢吴徐入北山卒未可平帝不從乃渡渭南吴聞太武至盡散入北山果如浩言軍無所尅帝悔之尉眷為侍中太尉與太宰常英等評尚書事文成北廵狩以寒雪方降議還眷曰今動大衆以威北敵去都不逺而便旋駕虜必疑我有内難方寒雪兵人勞苦以經畧大體宜便前進帝從之遂渡漢而還北海王詳領司徒侍中録尚書事詳與八座奏曰竊惟姦刼難除為蠧日久羣盗作患有國攸病故五刑為用猶䧟觸網之誅道幾勝殘寧息狗竊之響是以班制垂式名為治本整綱提目政之大要謹尋奪禄事條班已周嵗然京邑尹令善惡易聞邊州逺守或難聽審皆上下同情迭相掩没設有賊發隠而不言或以刼為偷或遏掠成盜更令賊發難知攘竊惟甚臣等参議若依制削奪則縣無朞月之宰附條貶黜郡縻嵗稔之守此制必行所謂法令滋章盜賊多有昔黄龔變風不繇削禄張趙稱美豈憚貶退綏導之體得失在人乃可重選慎官依律劾禁不宜輕改法令削黜羣司今請改制條還附律處其勵己公清賞有常典風謡黷賄案為考第宣武從之高陽王雍為太傅侍中領太尉表請王公以下賤妾悉不聽用織成錦繡金玉珠璣違者以違㫖論奴婢悉不得衣綾綺纈止於縵繒而已奴婢布服並不得以金銀為釵帶犯者鞭一百太后從之而不能久行也任城王澄為司空孝明初靈太后臨朝澄表上皇誥宗制并訓詁各一卷意欲太后覽之思勸誡之益又奏利國濟民所宜振舉者十條一曰律度量衡公私不同所宜正之二曰宜興學校以明黜陟之法三曰宜興滅繼絶各舉所知四曰五調之外一不煩民任民之力不過三日五曰臨民之官皆須黜陟以旌賞罰六曰逃亡代輸去來年久者若非伎作任聽即住七曰邊兵逃走或實䧟没皆須精檢三長及近親若實隠之徵其代輸不隠勿論八曰工商世業之戸復徵租調無以堪濟今請免之使專其業九曰三長禁奸不得隔越相領戸不滿者隨近并合十曰羽林虎賁邊方有事暫可赴戰常戍宜遣畨兵代之靈太后下其奏百寮議之事有同否時四中郎將兵數寡弱不足以襟帶京師澄奏宜以東中帶滎陽郡南中帶魯陽郡西中帶恒農郡北中帶河内郡選二品三品親賢兼備者居之省非急之作配以强兵如此則深根固本彊榦弱枝之義也靈太后初將從之後議者不同乃止之澄又重奏曰固本宜彊防微在豫故雖有文事不忘武功况今重以南蠻仍獷北妖頻結來事難圖勢同往變脱暴勃忽起振動關畿四府羸卒何以防擬平康之世可以寄安遺之久長恐非善䇿如臣愚見郎將領兵兼總民職省官食禄於此乎在求還依前増兵益號將位既重則念報亦深軍郡相依則表裏俱濟朝廷無四顧之憂奸宄絶窺覦之望矣卒不納又以流人初至逺鎮衣食無資多有死者奏并其妻子給糧一嵗從之唐魏徵為祕書監參朝政時髙昌王麴文泰將入朝西域諸國咸欲因文泰遣使貢獻太宗令文泰使人厭怛紇干往迎接之徵諌曰中國始平瘡痍未復若微有勞役則不自安往年文泰入朝所經州縣猶不能供况加以此軰若任其商賈來往邊人則獲其利若為賔客中國則受其弊矣漢建武二十二年天下已寧西域請置都䕶送侍子光武不許蓋不以蠻夷勞弊中國也今若許十國入貢其使不下千人欲使縁邊諸州何以取濟人心萬端後雖悔之終無所及帝善其議時厭怛紇干已發遽追止之又帝從容謂近臣曰朕披覽史籍見前王之善事皆力行而不逮其所任用公軰數人而已比於文景之世而不逮之逺也徵進曰今者四夷賔服天下無事曠古所未有何文景之足論然自古帝王誰不欲比迹於堯舜及其安樂也莫能終其善人臣誰不欲追蹤於稷契及其富貴也莫能竭其心若使君臣各保其終則天下無憂不理矣帝甚嘉其言狄仁傑則天聖歴元年為納言安撫河北諸州遭賊之處是時河朔間為突厥所迫脇者賊平後多懼逃散仁傑上疏曰臣聞朝廷議者以為契丹作梗始明人之逆順或因迫脅或有願從或受偽官或為招慰或兼外賊或是土人跡雖不同心即無别誠以山東雄猛繇來重氣一顧之勢至死不回近縁軍機調發傷重家戸悉破或至逃亡剔屋賣田人不為售内顧生計四壁皆空重以官典侵欺因事而起取其髓腦曽無悔心修築城池繕造兵甲州縣役使十倍軍機官私不矜期之必取枷棒之下痛切肌膚事迫情危不循禮義愁苦之地不樂其生有利則歸且圖賖死此乃君子之媿辱小人之常行人猶水也壅之則為泉疏之則為川通塞隨流豈有常性借以唐朝為喻殷監不遥河北河南時有恭陵之役主司逼迫操切不准程一瓦石亂投一時逃散豈不以力窮則怨不畏刑書民之至愚皆如此類幸蒙唐朝見捨今為大周淳人向無矜恕之恩安有自新之路昔董卓之亂神器播遷及卓被誅部曲無赦事窮變起毒害生人京室丘墟化為禾黍此繇恩不普洽失在機先臣一讀此書未嘗不廢卷嘆息今以負罪之伍必不在家露宿草行濳竄山澤赦之則出不赦則狂山東羣盗縁兹聚結臣以邊塵蹔起不足為憂中夏不安以此為事臣聞持大國者不可以小道理事廣者不可以細分人主恢𢎞不拘常法罪之則衆情恐懼恕之則反側自安伏願曲赦河北諸州一無所問自然人神通暢率土歡心諸軍凱旋得以無擾從之册府元龜卷三百十二
