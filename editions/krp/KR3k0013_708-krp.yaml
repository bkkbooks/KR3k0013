在前少傅在後入則有保出則有師師也者教之以事而喻諸徳者也慎諸身以輔翼之而歸諸道也由漢而下曷嘗不茂建儲兩崇樹蕃屏上以貞邦而固本次以强幹而昌世故其左右前後必詢求於正人傅相官屬咸叅取於時彥資乎忠亮賴其老成將以申切磋之益成温文之羙芝蘭俱化允歸於善道磐維克固誕揚於頌聲斯固乃僚慎簡之攸先為邦令典之稱首者也漢張良既封留侯性多疾即導引不食穀髙祖自將東擊黥布良强起至曲郵曲郵在新豐謂曰子房雖疾强卧傅太子時叔孫通己為太傅以良行少傅事周昌為御史大夫時髙祖憂趙王如意年少而戚夫人與吕后有隙用符璽御史趙堯計為趙王置貴强相堯進言昌為人堅忍伉直自吕后太子及大臣皆素嚴憚之獨昌可髙祖曰善於是召昌謂曰吾固欲煩公固必也煩勞也公强為我相趙昌泣曰臣初起從陛下獨奈何中道而棄之於諸侯乎髙祖曰吾極知其左遷是時尊右卑左故謂貶秩位為左遷然吾私憂趙念非公無可者公不得已强行於是徙昌為趙相賈誼為長沙王太傅嵗餘文帝思誼徴之乃拜為梁懐王太傅懐王帝少子愛而好書故令誼傅之石奮孝文時為大中大夫無文學恭謹無與比時東陽侯張相如為太子太傅免選可為傅者皆推奮奮為太子太傅轅固治詩為博士景帝以固㢘直拜為清河王太傅衛綰為中郎將景帝以為㢘忠實無他腸乃拜綰為河間王太傅後為中尉賜告歸帝立膠東王為太子召拜太子太傅石慶為沛守武帝元狩元年立太子選羣臣可傅者以慶為太子太傅嚴彭祖為東郡太守以髙第選太子太傅韋𤣥成丞相賢之子宣帝愛淮陽憲王欽欲立之以太子蚤失母故弗忍也乆之帝以𤣥成陽狂讓侯兄經明行髙稱於朝廷乃召拜𤣥成為淮陽中尉欲感諭憲王輔以推讓之臣由是太子遂安疏受太子太傅廣之兄子也受次公子亦以賢良舉為太子家令受好禮恭謹敏而有辭敏謂所見㨗利宣帝幸太子宫受迎謁應對及置酒宴奉觴上夀辭禮閑雅帝甚驩説説讀曰悦頃之拜受為少傅史丹字君仲元帝為太子以丹為中庶子侍從十餘年帝即位為駙馬都尉侍中出常驂乗甚有寵帝以丹舊臣皇考外屬丹祖父恭有女弟為衛太子良娣信之詔丹護太子家傅喜少好學問有志行哀帝初為太子成帝選喜為太子庶子後漢張佚為博士光武大㑹百官詔問誰可傅太子者羣臣承意皆言太子舅執金吾隂識可佚正色曰今陛下立太子為隂氏乎為天下乎即為隂氏則隂侯可為天下則固宜用天下之賢才帝稱善曰欲置傅者以輔太子也今博士不難正朕况太子乎即拜為太子太傅杜林為光祿勲時稱通儒有節行㑹皇太子强求乞自封東海王故重選官屬以林為王傅何湯豫章人桓榮弟子明帝始立為皇太子選求明經乃擢湯為虎賁中郎將以尚書授太子隂識為侍中明帝始立為皇太子以識守執金吾輔導東宫魏邢顒為左馮翊以病去官時武皇諸子髙選官屬令曰侯家吏宜得淵深法度如邢顒軰遂以為平原侯植家丞後叅丞相軍事轉東曹掾初太子未定而臨淄侯有寵丁儀等並賛翼其羙太祖問顒顒對曰以庶代宗先世之戒也願殿下深重察之太祖識其意後遂以為太子少傅遷太傅鄭稱為侍中文帝初嗣王位封子叡為武徳侯以稱為傅令曰龍淵太阿出昆吾之金和氏之璧由井里之田礱之以砥礪錯之以他山故能致連城之價為命世之寳學亦人之砥礪也稱篤學大儒勉以經學輔侯宜旦夕入侍曜明其志司馬孚宣王次弟時陳思王有俊才清選官屬以孚為文學掾蜀董允字休昭時掌軍中郎將和之子先主立太子允以選為舎人李譔字欽仲延熙元年後主立太子以譔為庶子遷為僕射轉中散大夫右中郎將猶侍太子太子愛其多知甚悦之吳闞澤字徳潤究覽羣籍孫和為太子以澤為太子太傅又以薛宗為少傅而蔡潁張純封俌嚴維等皆從容侍從程秉字徳樞汝南南頓人也避亂交州大帝聞其名儒以禮徴秉既到拜太子太傅張溫字恵恕父允名顯州郡少修節操容貌竒偉大帝聞之以問公卿曰溫當今與誰為比大司農劉基曰可與全琮為軰太常顧雍曰基未詳其為人也溫當今無軰帝曰如是張允不死也徴到延見文辭占對觀者傾竦帝改容加禮尋遷太子太傅陳表字文奥孫登為太子表及諸葛恪張休顧譚等以遷入傳講詩書出從騎射太傅張溫言於大帝曰夫中庶子官最親宻切問近對宜用俊彦於是乃用表等為中庶子華融字徳㽔祖父避亂居山隂時皇象亦寓居山隂吳郡張溫来就象學欲得所舎或告溫曰有華徳㽔者雖年少羙有令志可舎也溫遂止融家朝夕談講俄而溫為選部尚書乃推擢融為太子庶子晉鄭袤滎陽開封人魏武帝初封諸子為侯精選賔友袤與徐幹俱為臨淄文學郭奕性剛正武帝踐祚初建東宫以奕及鄭黙並為中庶子何邵為中書監恵帝永熙元年以初建東宫太子年㓜欲令親萬機故盛選師傅以邵為太子太師吏部尚書王戎為太子太傅衛將軍楊濟為太子太保裴楷為少師張華為少傅和嶠為少保劉寔為散騎常侍愍懐太子初封廣陵王髙選師友以寔為師孟珩為友楊準馮蓀為文學及建東宫又詔曰遹尚㓜蒙今出東宫惟當頼師傅羣賢之訓其㳺處左右宜得正人使共周旋能相長益於是使太保衛瓘息庭司空㤗息略太子太傅楊濟息毖太子少師裴楷息憲太子少傅張華息禕尚書令華廙息常與太子㳺處以相輔導焉髙光為散騎常侍從恵帝還雒陽時太弟新立重選傳訓以光為少傅加光禄大夫常侍如故孔坦少方直有雅望善左氏傳解屬文元帝為晉王以坦為世子文學東宫建補太子舎人丁潭為尚書祠部郎元帝建武初琅邪王裒始受封帝欲引朝賢為其國上卿將用潭以問中書令賀循循曰郎中令職望清重寔宜審授潭清淳貞粹雅有隠正聖明所簡才實宜之遂為琅邪王郎中令顧榮字彦先吳人也時入雒者惟陸機陸雲及榮三人而已以南州望士補吳王郎中令王衍舉遼東太守不就以名聞超為太子舎人賀循字彦先元帝時為中書令以老疾固辭拜太子太傅詔曰循清直履道秉尚真實居身以冲約為本立徳以仁讓為行可躬訓儲宫黙而成化周顗太興初明帝為太子顗以吏部尚書更拜太子少傅顗上疏讓曰臣退自循省學不通一經智不效一官止足良難未能守分遂忝顯任名位過量不悟天監忘臣頑弊乃欲使臣内管銓衡外忝傅訓質輕蟬翼事重千鈞此之不可不待識而明矣若臣受負乗之責必貽聖朝惟塵之恥俯仰愧懼不知所圖詔曰紹㓜冲便居儲副之貴當頼軌匠以祛蒙蔽望之儼然斯不言之益何學之習邪所謂與田蘇㳺忘其鄙心者便當副往意不宜冲讓殷仲堪少好學能清言善屬文人士咸欽愛之以孝行稱康帝聞其名召為太子中庶子甚相知悦顔含為東陽太守東宫初建含以儒素篤行補太子中庶子傅暢右僕射祗之子年未弱冠甚有重名以選入侍講東宫為秘書丞孔安國為領軍將軍安帝詔曰安國貞慎清正外内播譽可以本官領東海王師必能導逹津梁依仁㳺藝宋裴松之為髙祖治中從事史既克洛陽髙祖敇曰松之廊廟之才不宜乆尸邊務今召為世子洗馬與殷景仁同可令知之王惠字令明為世子征虜長史宋國初建嘗置郎中令髙祖難其人謂傅亮曰今用郎中令不可减袁曜卿也既而曰吾得其人矣乃以惠居之遷世子詹事王僧逹太保𢎞之少子也少好學善屬文年未二十以為始興王後軍叅軍遷太子舎人謝述從兄曜為義康王長史䘮官述代之太祖與義康書曰今以述代曜其才應詳練著於歴職故以佐汝汝始親庶務而任事殷宜寄懐羣賢以盡弼諧之羙想自得之不俟吾言也謝超宗解褐奉朝請孝武帝寵子子鸞為新安王超宗以選補國常侍齊王僧䖍弱冠寛厚宋孝武時自太子中庶子出為豫章王子尚撫軍長史遷散騎常侍復出為新安王子鸞北中郎長史東海太守行南徐州事二藩皆帝愛子也王琨為歴陽内史初仕宋孝武以琨忠實徙為寵子新安王東中郎長史加輔國將軍遷右衛將軍度支尚書出為永嘉王左軍始安王征虜二府長史加輔國將軍廣陵太守皆孝武諸子謝顥武帝永明初髙選文學以顥為竟陵王友何昌㝢永明初為竟陵王子良文學以清信相得意好甚厚王景文明帝時為中書監領太子太傅景文固辭太傅帝遣新除尚書右僕射禇淵宣㫖以古来比例六事詰難之不得已乃受拜張緒字思曼清簡寡欲明帝時為太子中庶子遷司徒左長史吏部尚書袁粲言於帝曰臣觀張緒有正始遺風宜為宫職轉中庶子梁沈約初仕齊為步兵校尉惠文太子入居東宫約管書記當時王侯到官或不得進約每以為言太子曰吾生平懶起是卿所悉得卿談論然後忘寢卿欲我夙興可常早入遷太子家令徐勉為太子中庶子侍東宫昭明太子尚㓜時選極親賢妙盡時譽勉陳讓數四又與沈約書授侍講詔不許然後就焉轉太子詹事又改授侍中頻表解官職優詔不許王規天監中為中書黄門侍郎敕與陳郡殷均瑯邪王錫范陽張緬同侍東宫俱為昭明太子所禮到洽天監中為太子中舍人與庶子陸倕對掌東官管記俄為侍讀侍讀省仍置學士二人洽復充其選陸襄大通中為太子中庶子㑹昭明太子薨妃蔡氏别居金華宫以襄為中散大夫領步兵校尉金華宫家令知金華宫事劉杳為東宫通事舎人昭明太子薨新宫建舊人例無停者敇特留杳焉庾於陵為太子洗馬舊東宫官屬通為清選洗馬掌文翰尤其清者近世用人皆取甲族有才望時於陵與周捨並擢充職髙祖曰官以人而清豈限於甲族時論以為羙徐摛為左衛司馬㑹晉安王出戍石頭髙祖謂周捨曰為我求一人文學俱長兼有行者欲令與晉安㳺處捨曰臣外弟徐摛形質陋小若不勝衣而堪此選髙祖曰必有仲宣之才亦不簡其容貌以摛為侍讀普通四年晉安王為西平將軍寧蠻校尉摛為王諮議徐陵摛之子也叅晉安王寧蠻府軍事大通二年王立為皇太子東宫置學士陵充其選孔休源為宣惠晉安王尉長史南郡太守行荆州府州事髙祖謂之曰荆州總上流衝要義髙分陕今以十嵗兒委卿善輔翼之勿憚周昌之舉也對曰臣以庸鄙曲荷恩遇方揣丹誠效其一割帝善其對乃敇晉安王曰孔休源人倫儀表汝年尚㓜當每事師之宗史字明􅏡武帝嫡孫南郡王居西州以史管書記史既以筆札被知貞正見許故任焉俄而文惠太子薨王為皇太孫史仍舊管書記庾肩吾為中庶子初簡文在藩雅好文章士時肩吾與東海徐摛吳郡陸罩彭城劉遵劉孝儀弟孝威同被賞接及居東宫又開文徳省置學士肩吾子信摛子陵吳郡張長公北地傅𢎞東海鮑至等充其選王襃為秘書丞時宣城王大器簡文帝之冡嫡即襃之姑子也于時盛選僚佐乃以襃為學士陳蔡景歴為髙祖記室時衡陽獻王昌為吳興郡昌年尚少呉興王之鄉里父老故人尊卑有數髙祖恐昌年少接對乖禮乃遣景歴輔之王㻛為中庶子父冲嘗為㻛辭中庶子文帝顧謂冲曰所以乆留㻛於承華正欲使太子微有㻛風法耳虞寄自閩還朝文帝謂劉仲舉曰衡陽王既出閣雖未置府僚然湏得一人旦夕㳺處兼掌書記宜求宿士有行業者仲舉未知所對文帝曰吾自得之乃手敇用寄寄入謝帝曰所以暫屈卿㳺藩者非止以文翰相煩乃令以師表相助也陸繕為太子中庶子領步兵校尉掌東宫管記繕儀表端麗進退閑雅文帝使太子諸王咸取則焉其趨步躡履皆令習繕規矩除尚書吏部郎中步兵如故仍侍東宫顧野王宣帝太建中為國子博士後主在東宫野王兼東宫管記遷太子率更令兼通事舎人時宫僚有濟陽江總吳國陸瓊北地傅縡吳興姚察並以才學顯著論者推重焉陸瓊為中書侍郎太子家令長沙王為江州刺史不循法度宣帝以王年少授瓊長史行江州府國事帶尋陽太守瓊以母老不欲逺出太子亦固請留之遂不行後魏車路頭代人也道武時以忠厚選給東宫為明元帳下師谷渾明元時為前鋒將軍從幸河南還選給事東宫盧魯元敏而好學寛和有雅度明元時選為直郎以忠謹給侍東宫恭勤盡節太武親愛李靈字虎符太武時為淮陽太守以學優溫謹選授文成經李敷字景文選入中書教學以忠謹給事東宫盧誕本名恭祖為給事黄門侍郎太武詔曰經師易求人師難得朕諸兒稍長欲命卿為師於是親幸晉王第敕晉王以下皆拜之於帝前因賜名曰誕加征東將軍散騎常侍陸馥獻文將禪位於京兆王子推隴西王源賀並固諌馥抗言曰皇太子聖徳承基四海屬望不可横議干國之紀臣請刎頸殿廷有死無二乆之帝意乃解詔曰馥直臣也其能保吾子乎遂以馥為太保鄭羲孝文延興初為散騎常侍中山王叡寵幸當世並置王官羲為其傅祖瑩太和中為司徒彭城王勰法曹行叅軍孝文顧謂勰曰蕭賾以王元長為子良法曹今為汝用祖瑩豈非倫匹也勅令掌勰書記髙諒字脩賢太和末京兆王愉開府辟召孝文妙簡僚佐諒與隴西李仲尚趙郡李鳳起等同時應選游肇孝文時為太子中庶子以謹素敦重文雅見任李冲為侍中吏部尚書時咸陽王禧自冀州刺史朝京師孝文詔曰仲尼在鄉黨猶尚恂恂周文王為世子卑躬求道禧等雖連蕚宸暉得不尊尚師傅也故欲為置之以嘉令徳廷尉卿李冲可咸陽王師東宫既建拜太子少傅楊機少有志節為士流所稱宣武時解褐奉朝請於時皇太子國官多非其人詔選清直之士機見舉為京兆王愉國中尉愉甚敬憚之崔光宣武延昌初為中書監帝幸東宫召光與黄門甄琛廣陽王淵等並賜坐詔光曰卿是朕西臺大臣當令為太子師傅光起拜固辭詔不許即命孝明出從者十餘人敇以光為傳之意令孝眀拜光又拜辭不當受太子拜復不蒙許孝明遂南面再拜詹事王顯啟請從太子拜於是宫臣畢拜光北面立不敢答拜惟西面拜謝而出裴伯茂西魏出帝永興中以廣平王贊盛選賔僚以伯茂為文學北齊李鉉為太子博士髙祖令世宗在京妙簡碩學以教諸子世宗以鉉應㫖徴詣晉陽時中山石曜北平陽絢北海王晞清河崔瞻廣平宋欽道及工書人韓毅同在東館師友諸王李渾文宣太保初除太子少保邢邵為少師楊愔為少傅皆以為榮封孝琰為太子舎人出入東宫甚有令望丁母憂解任除晉州法曹叅軍尋徵還復除太子舎人王晞孝昭皇建初為丞相從事中郎時百官請建東宫敇未許每令晞就東堂監視太子冠服導引趨拜為太子太傅晞以局司奉重綬皇太子釋奠又兼中庶子帝謂曰今既當劇職不得尋常舒慢也晞淹雅有器度神武訪朝廷子弟忠孝謹宻者令與諸子游晞與清河崔瞻頓丘李度范陽盧正通首應此選文襄時為大將軍握晞等手曰我弟並向成長志識未定近善狎惡可移吾弟不負義方即祿位常亞舎弟若茍使回邪致相詿誤罪及門族非止一身晞随神武到晉陽補中外府功曹叅軍帶常山公演友崔瞻為征虜將軍孝昭踐祚皇太子就傅受業詔除太子中庶子徵赴晉陽敕專在東宫調護講讀及進退禮度皆歸委焉馮子琮為東宫管記又奉别詔令共胡長粲輔導太子轉庶子孫靈暉後主時為潼郡太守天統中敇令朝臣推舉可為南陽王綽師者吏部尚書尉瑾表薦靈暉徴為國子博士授南陽王經綽雖不好文學亦甚相敬重啓除其府諮議叅軍綽除定州刺史仍随之鎮綽所為猖獗靈暉惟黙黙憂顇不能諫正綽欲以管記馬子結為諮議叅軍乃表請轉靈暉為王師以子結為諮議朝廷以王師三品啓奏不合後主於啓下手答云但用之仍手報南陽書並依所請儒者甚以為榮後周裴文舉字道裕少忠謹涉獵經史西魏大統十年起家奉朝請遷丞相府墨曹叅軍時太祖諸子年㓜盛簡賔友文舉以選與諸公子游雅相欽敬未嘗戯狎隋蘇亮初仕西魏文帝為中書舎人魏文帝子宜都王武為秦州刺史以亮為司馬帝謂亮曰黄門侍郎豈可為秦州司直以朕愛子出藩故以心腹相委勿以為恨臨辭賜以御馬尉遲運初仕周明帝為右司衛時宣帝在東宫親狎謟佞數有罪失武帝於朝臣内選忠諒鯁正者以輔弼之於是以運為右宫伯建徳三年帝幸雲陽宫又令運以本官兼司武與長孫覽輔皇太子居守李徹字廣逹初仕周武帝為左武衛將軍後入隋及煬帝為晉王鎮幷州妙選府官詔徹總晉王府軍事進爵齊安郡公時蜀王秀亦鎮益州帝謂侍臣曰安得文同王子相武如李廣逹者乎其見重如此顔之儀初仕後周明帝為麟趾殿學士稍遷司書上士武帝初建儲宫盛選師傅以之儀為太子侍讀明克讓髙祖受禪拜太子舍人率更令于時東宫盛徴天下才學之士至于博學洽聞皆出其下禇亮初仕陳為尚書殿中侍郎開皇中陳亡入京文帝詔亮侍游東宫為太子學士蘇孝慈開皇中為兵部尚書待遇愈宻時皇太子勇頗知時政帝欲重宫官之望多令大臣領其職于是拜孝慈為太子右衛率尚書如故張䖍威字元敬開皇初煬帝為晉王出鎮幷州盛選僚佐以䖍威為刑獄叅軍累遷為屬王甚羙其才與河内張衡俱見禮晉邸稱為二張焉徐孝克陵之弟也煬帝為皇太子文帝以孝克為國子博士侍東宫講禮傳宇文述開皇中為右衛大將軍及晉王為皇太子以述為左衛率舊令率官第四品文帝以述素貴遂進率品為第三其見重如此栁謇之大業初為黄門侍郎時元徳太子初薨朝野注望以齊王當立帝亦重王府選拜為齊王長史帝法服臨軒命齊王于西朝堂遣吏部尚書牛𢎞内史令楊約左衛大將軍宇文述等從殿庭引謇之詣齊王所西面立宣勅謂齊王曰我出藩之初時年十二先帝立我于西朝堂乃令髙熲虞慶則元旻等從内送王子相於我誡我曰以汝未更世事令子相作輔於汝事無大小皆可委之無得昵近小人疎逺子相若從我言者有益於社稷成立汝名行如不用此言惟國及身敗無日矣吾受敇奉以周旋不敢失墜微子相之力吾幾無今日矣若與謇之從事一如子相也又敇謇之曰今以卿作輔相齊副朕所望也若齊王徳業修備富貴自當鍾卿一門若有不善罪亦相及唐李綱初為太子詹事以太子建成漸狎無行之徒有猜忌之謀不可諫止頻乞骸骨髙祖慢罵之曰卿為何潘仁長史何乃羞為朕尚書且建成在東宫遣卿輔導何為屢致辭乎綱頓首陳謝曰潘仁賊也誡在殺害每諫便止所活極多為其長史故得無愧陛下功成業㤗頗自矜伐臣以凡劣才乖元凱所言如水投石安敢乆為尚書兼以愚臣事太子所懐鄙見復不採納既無補益所以請退帝謝曰知公直士勉弼我兒於是擢拜太子少保尚書詹事並如故杜淹武徳末隠太子誅後擢為御史大夫判太子詹事詔東宫儀式簿領並取淹節度至貞觀初為散騎常侍行太子左庶子兼崇賢館學士太宗謂曰國之儲副自古所重必擇善人為之輔佐今太子年在㓜冲志意未定朕若朝夕見之可得随事誡約今既委以監國不在目前知卿志懐貞慤能執直道故輟卿於朕以輔太子宜知委任輕重也王珪為禮部尚書魏王泰師太宗嘗謂侍臣曰古来帝子生于宫闥及其成人無不驕逸是以傾覆相踵少能自濟我今嚴教子弟欲令皆得安全王珪我乆驅使是所諳悉以其意存忠孝選為子師爾宜語泰汝之待珪如事我也可以無過泰每為之先拜珪亦以師道自居物議善之孔頴逹為給事中以正直稱庶人承乾之在東宫也妙選朝望為官屬以頴逹為太子中允累遷常侍國子祭酒仍侍講東宫于志寧為太子左庶子太宗謂志寧曰古者太子既生卜士負之即置輔弼昔成王㓜小周召為師傅日聞正道習以成性今皇太子既㓜小卿當輔之正道無使邪僻闗其心勉之無忘當稱所委官賞可不次而得也房𤣥齡為左僕射拜太子少師𤣥齡上表遜位優詔不許𤣥齡固讓乃下詔曰夫選賢之義無私為本奉上之道當仁是貴列代所以𢎞風通賢所以叶力卿忠肅恭懿明允篤誠草昧霸圖綢繆帝道儀形禮閣庶政惟和輔翼春宫望實斯在而忘彼大體徇茲小節雖恭教諭之職乃辭機衡之務豈所謂弼余一人共安四海者也宜聽此懐無煩固讓𤣥齡固不奉詔又詔曰𤣥齡徳為時秀位隆朝右業履恭儉志懐冲退頻表陳誠固辭執法朕昃食思治虚己欽賢方資啟沃共康兆庶豈得申其雅尚用虧彛典便可斷表即令攝職魏徴為特進知門下省事貞觀中皇太子承乾不修徳業魏王㤗寵愛日隆内外庶僚並有疑議太宗聞而惡之謂侍臣曰當今朝臣忠謇無踰魏徴我遣傅皇太子用絶天下之望後拜太子太師知門下省事如故徴自陳有疾詔答曰漢之太子四皓為助我之頼公即其義也知公疾病可卧䕶之馬周貞觀中為御史中丞兼知諫議大夫事髙宗在藩盛隆府望周以本官檢校晉王長史及升儲位加中書侍郎兼太子左庶子長孫無忌為司徒定策立晉王為太子太宗以無忌為太子太師房𤣥齡蕭瑀為傅保制曰明兩之重實固宗祧輔導之職莫先師保是以吕望召奭騰芳于有周叔孫𤣥成繼羙於隆漢司徒趙國公無忌器範宏邈風鑒秀逺材稱棟幹地兼姻戚佐命之功勒乎鍾鼎論道之譽穆乎台槐股肱是屬邦國攸賴教諭少陽僉望斯在司空梁國公𤣥齡體業忠肅識具𢎞通誠著霸圖功宣鼎業奉上之節所懐必盡益國之事知無不為必能厲茲六行審喻三善特進宋國公瑀操行清約識局貞正夙受先遇早升朝右立身之操必在於直道體國之心無忘於忠義輔翼儲貳望實攸歸無忌可太子太師𤣥齡可太子太傅瑀可太子太保又以黄門侍郎褚遂良為太子賔客李勣為兵部尚書髙宗踐儲宫以勣為太子詹事兼右衛率同中書門下三品太宗謂勣曰我兒新登儲兩卿舊長史今以宫事相委故有此授雖屈階資可勿怪也来濟為考功員外郎時初置太子司議郎妙選人望遂以濟為之仍崇文館直學士敬播為著作佐郎以撰實録功遷太子司議郎時此官初置極為清望韓瑗髙宗顯慶初為侍中時代王𢎞為皇太子瑗與中書令来濟禮部尚書許敬宗並為皇太子賔客又以尚書左僕射于志寧為太子太傅劉仁軌上元中為左僕射雍王為皇太子仁軌與右僕射戴至徳侍中張文瓘中書令郝處俊並為皇太子賔客王方慶為麟臺監中宗立為東宫方慶兼檢校太子左庶子則天聖歴二年正授左庶子俸料同職事三品兼侍皇太子讀書崔融累補宫門丞兼直崇文館學士中宗在春宫制融為侍讀兼侍屬文劉禕之為中書侍郎轉相王府司馬髙宗謂曰朕之愛子以卿忠孝之門藉卿師範所冀蓬生麻中不扶自直耳元讓髙宗末為太子右内率府長史嵗滿還鄉里中宗居東宫徴拜司議郎及謁見則天謂曰卿既孝於家必能忠於國今授此職須知朕意宜以孝道輔我兒也源乾曜司刑太常伯直心之子開元初邠王守禮府僚吏有犯法者𤣥宗令左右求堪為王府長史者太常卿姜皎薦乾曜公清有吏幹因召見與語乾曜神氣清爽對答皆有倫序𤣥宗甚恱之乃拜少府監兼邠王府長史潘好禮開元初為邠王府長史六年二月詔曰分命諸王典於大郡諒存公道以鎮淳風邠王禀性頗寛馭下不肅且復簡貴未詳倫理故選剛直任之端寮王家奴客等有違法綱者長史潘好禮随事檢校科决若王有何怪僻好禮具狀聞徹王歴虢隴襄滑晉等州刺史時皆擇首僚以持綱紀好禮與源乾曜袁嘉祚皆為邠府長史兼州佐郗常通為國子博士開元六年皇太子及郯王嗣直等五人年近十嵗尚未就學左散騎常侍禇無量内繕冩論語孝經各五本以獻𤣥宗覽之曰吾知無量意矣乃下詔曰修身貴乎慎始篤學在乎自幼朕諸子已各髫丱須聞詩禮宜于儒官中選徳行耆宿三五人入閣教授俄以常通國子博士郭謙光左拾遺潘元祚等為太子及郯王已下侍讀賀知章開元中為散騎常侍時肅宗為陕王天性屬辭典麗𤣥宗甚愛之詔知章與潘肅吕向皇甫彬邢璹等侍讀韓擇木侍書孔述睿徳宗建中初為諫議大夫㑹有詔東宫官宜擇端厚之士皇太子時幸太學行齒胄之禮乃以述睿為太子侍讀徐岱貞元初以前京兆府功曹為膳部員外郎睦王已下侍讀嵗中遷水部郎中皇太子侍讀兼舒王已下侍讀馮伉貞元中為醴泉令韋渠牟薦給事中充皇太子諸王侍讀崔芊自茅山徴為右贊善大夫充太子侍直新名也歸登貞元末為兵部員外郎皇太子侍讀順宗即位遷給事中元和四年憲宗册皇太子與吕元膺俱為皇太子侍讀詔曰輔翼元良教諭成徳使目睹正事耳聞正言形于施為漸于心術非齊莊忠慤之士不在茲選工部侍郎歸登給事中吕元膺並踐履端方行義修潔通於經訓而得其要達於教化而蹈其中侍講承華師範磐石訪乃公議副予精求並可充皇太子諸王侍讀李逢吉為給事中元和七年與司勲員外郎李巨並為太子諸王侍讀韋綬為屯田郎中元和九年八月以為職方郎中充皇太子及諸王侍讀薛放為兵部郎中憲宗以儲皇好書求端士輔導經義旋充皇太子侍讀吕元膺為諫議大夫給事中規諫大舉其職及出為同州刺史乃入謝帝訪以時政元膺抗辭直對無所阿䛕帝察其忠藎命復守舊官加皇太子侍讀賜以金紫丁公著為右補闕集賢殿直學士元和十一年九月改為水部員外郎充皇太子侍讀庾敬休為户部侍郎文宗太和六年以敬休守本官兼魯王傅又以太常少卿鄭肅守本官兼魯王府長史以户部郎中李踐方守本官兼魯王府司馬魯王帝之元子帝以年幼思賢傅輔導之時魯王傅和元亮因侍制召問事元亮出於卒吏不知書一不能對後宰相延英奏事帝從容曰魯王質性可教宜擇賢士大夫為官屬不可復用和元亮之軰因有是命崔栯為中書舎人太和九年二月以栯及考功員外郎史館修撰蘇滌兼充皇太子侍讀王起為兵部尚書判户部事太和九年七月以起及翰林學士太常少卿知制誥陳夷行並充皇太子侍讀仍每五日一入長生院對皇太子劉仲武為國子監四門助教開成元年十二月仲武充奉諸王講讀橋庶為河南府緱氏縣開成二年四月以庶為諸王講讀與劉仲武更入教授韋溫為給事中開成二年五月以溫充皇太子侍讀竇宗直為秘書少監開成二年七月以宗直為皇太子侍讀周敬復為禮部員外郎兼起居郎史館修撰開成三年五月以敬復守本官充皇太子侍讀依前史館修撰狄兼謩武宗會昌三年二月以兼謩兼益王傅鄭簡之兼益王府長史制曰古者聖王之教子也皆選天下之端士以衛翼之漢代梁王好書則以賈誼經緯之才而耀明之其淮陽好政則以𤣥成讓兄之節而鎮静之前王令猷百代可法况朕建立元子錫之奥區朱邸初開黄髮是憲以兼謩慷慨立志有袁盎正席之忠以簡之取捨俟時有貢禹彈冠之操皆行不茍合誠無暗欺歴職有聲居正不撓舉其素行擢在顯僚爾宜廣徳義之風明孝愛之道俾其嚴於問寢敬不絶馳化與心成中道若性欽哉休命可不勉歟王欽若等按唐書本傳不載此事唐年補錄有此詔而不載兼謩等本官王牘為太子賔客昭宗乾寧四年韓建獻封事十條其三太子諸王請置師傅教導乃以牘為諸王侍讀制曰王者之子在襁褓中置三師訓之由古道也我思成人已来遘此多難師訓之義翦焉闕聞南面稱尊愧于寡昧由是言念諸子疚于厥心擇正人為之傅導今丞相言爾牘老於大學雅有徳行明君臣父子之道知禮樂詩書之源可使髙歩承華大叅望苑琢磨羽翼朕有冀焉爰授正卿以加峻級且旌優異徃為傅師邪蒿鮑魚勿俾登爼胄筵講肆為惜分隂使其知東平為善之規喜王襃洞簫之賦承萬代之業固磐石之基斯實賴於老成人也後唐劉贊明宗時為刑部侍郎時秦王為元帥秦王府判官太子詹事王居敏與贊鄉曲之舊以秦王盛年自恣須朝中選端士納誨冀其禀畏乃奏薦贊焉授秘書監兼秦王傅册府元龜卷七百八
