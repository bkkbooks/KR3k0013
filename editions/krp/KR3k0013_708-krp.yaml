  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_708-1a}
body:
  text: 册府元龜卷七百八宋王欽若等撰宫臣部總序古之有天下者必立儲貳用承統緒並建子弟以屏王室莫不内制宫朝之秩外設國藩之職為之輔佐焉唐虞之前官次莫記夏商之際教世子之法太傅在前少傅在後入則有保出則有師晉荀綽百官表云太子太傅唐虞官而未詳所得動有司過之史處有徹膳之宰所以翼導乎元良教喻而成徳者也周監二代建職制吏地官司徒之屬有師氏掌以三徳教國子中大夫一人上士二人保氏掌養國子以道教以六藝下大夫一人中士二人夏官司馬之屬有諸子掌國子之倅掌其戒令下大夫二人中士四人皆有胥徒府史之屬燕義云周天子官有庶子是也斯皆六聮之内左右太子者也而太傅居三公論道之位少傅當三孤貳公之任職在經緯匪專輔導班彪云成王為孺子時出則周公召公史佚入則太顛閎夭南宫括散宜生左右前後賈誼云成王在襁褓之中置三少皆上大夫曰少保少傅少師與太子宴者也又幽王時有太子傅作小弁之詩列國太子亦有師傅少師之名晉杜元欵為太子申生傅楚潘崇為太子商臣師伍奢為太子建師費無極為太子建少師戰國亦置師傅秦商鞅黥孝公太子師傅秦立百官之職因古制設太子太傅少傅增置屬官有太子門大夫庶子各五人洗馬十六人掌前驅舎人無員又置詹事掌太子家有丞屬官有太子率更家令丞僕中盾衛率厨廄長丞率更掌知漏刻中盾主周衛徼道衛率主門衛漢氏因之而大裂疆土分王子弟宫室百官同制京師王國有太傅輔王内史治國民中尉掌武職丞相統衆官羣卿大夫都官如漢朝國家惟為置丞相其御史大夫以下皆自置之羣卿已上皆秩二千石景帝中五年改丞相曰相省御史大夫廷尉少府宗正博士官大夫謁者郎諸官長丞皆損其員時七國之亂抑損諸侯王始令諸國皆天子為置吏武帝改丞僕曰僕并郎中令皆損其秩為千石成帝綏和元年省内史更令相治民如郡太守中尉如郡都尉而太子宫復有左右户將左右户直郎後漢省之及省詹事員而太傅專職輔導不領官屬少傅亦司輔導而悉主諸職員吏十二人以率更令主庶子舎人更直職比光禄屬官庶子舎人皆無員庶子如三署郎舎人如三署郎中一云舎人一十三人選良家子充家令主倉榖飲食職比司農少府屬官增置太子倉令一人主倉庫太子食官令一人主飲食太子僕主車馬職如太僕屬官廄長一人主車馬門大夫比郎將一云員二人選四府掾屬充增置中庶子員五人職如侍中洗馬職如謁者選以郎中補中盾衛率如故皇子封王者並置傅相相有長史如郡丞餘諸卿皆如舊制又有大夫無員掌奉王使至京都奉璧賀正及使諸國皆持節舊有尚書尋改治書又更名大夫謁者掌冠長員十六人禮樂長主樂人衛士長主衛士醫工長主醫藥永巷長主宫中婢使宦者為之祠祀長主祠祀又有郎中無員二漢以来嘗以詹事少傅主太子家然時有以他官監護娱侍輔導者孝宣欲以中郎將監護太子又以王褒劉向張子僑等娛侍太子元帝以侍中史丹護太子家光武以侍中隂識守執金吾輔導太子順帝立太子居承光宫以侍御史种暠監護之魏國初建太子官屬率擬漢臺之制而别有太子侍講嘗從虎賁督保傅丞東宫摘句郎其諸王國别有文學監國謁者典書令家令都尉長史司馬之職其侯國又有家丞武帝選邢顒為平原侯桓家丞陳思王有監國謁者灌均明帝已後東宫制度廢闕官司不具惟置衛率令典兵二傅并攝衆事他皆闕焉蜀有太子太傅家令舎人中庶子庶子之名後主為太子以諸葛亮為太子太傅譙周為太子家令董允為太子舎人後主立太子璿戈冲為中庶子李譔為庶子吳有左輔右弼輔正翼正二都尉為太子四友亦有太傅少傅中庶子之官孫權立子登為太子以諸葛恪為左輔張休為右弼顧譚為輔正都尉陳表為翼正都尉是為四友孫和為太子以闞澤為太傅薛綜為少傅及以中庶子為親近之官晉武帝㤗始二年始建東宫損益前制備置官屬以太子太傅少傅總宫事並有功曹主簿五官太傅少傅專職訓導後以儲副體尊遂命諸公居之以本位重故或行或領盖一時之制也始置中衛率其中庶子正置四人皆以俊茂者為之或以郡守叅選其食官令一人職如太官令庶子四人比散騎常侍中書監令太子舎人十六人比散騎中書侍郎從駕則正直從次直守妃出則次直從洗馬八人准秘書郎掌圖籍釋奠講經率更令主宫殿門户及賞罰事職如光禄衛尉家令主刑獄榖貨飲食職比司農少府丞一人後漢以家令主食官令至是食官自為官不復屬家令僕主車馬親秩如太僕宗正諸王置師友文學各一人後改師為傅避景帝諱改太守為内史省相及僕有郎中令中尉大農為三卿大國置左右常侍各一人省郎中置侍郎二人典書典祠典衛學官令典書丞各一人治書四人中尉司馬世子庶子陵廟牧長各一人謁者四人中大夫六人舎人十人典醫典府丞各一人公國無中尉常侍侯國又無大農侍郎伯子男惟典書已下無學官令史皆以次損公侯置官屬皆随國大小無定制其餘官司各有差皆選其文武官五年分中衛率為左右衛率各領一軍咸寧元年復置詹事掌宫事二傅不復領官屬大國置上中下軍三將軍次國上下二將軍小國上軍後又省詹事崇廣傅訓之職置太子太保并太傅皆以諸公領之少傅亦以重官兼領吏屬如舊四年始置中舎人四員以舎人才學羙者為之與中庶子共掌文翰職如黄門侍郎惠帝元康元年復置詹事職擬尚書令掌三令四率中庶子庶子洗馬舎人等官丞一人主簿五官掾功曹史主記門下史録事戸曹法曹倉曹賊曹功曹書佐門下亭長門下書佐省事各二人愍懐建宫乃置六傅三太三少太師後避景帝諱改為太保而詹事文書皆闗通六傅自元康已後諸傅不備或二或三或四或六加置前後二衛率各有丞一人永康中又不置詹事惟置丞一人擬尚書左右丞掌奉行文書闗通六傅又置中衛率是為五率太安已来復置詹事江左有太傅少傅不立師保省前後二率詹事丞用員外郎博士為之遷尚書郎孝武大元中又復前後二率僣偽諸國亦有東宫藩國諸職前趙劉乂為皇太弟有太師太傅太保東宫舎人劉曜時又有太子少師前秦苻堅有太子舎人後秦姚萇為秦王置左右長史司馬掾屬㕘軍及為太子又置中舎人洗馬宋氏之始東宫王國皆循晉制惟二傅各加置丞一人以家令率更令僕為太子三卿倉官令屬中庶子止置左右二率增置屯騎步兵翊軍校尉各七人冗從僕射七人旅賁中郎將十人又置左右積弩將軍左十人右二人殿中將軍十人殿中員外將軍二十人復置門大夫一人王國師改為傅餘皆無改齊因宋制二傅詹事始稱府無庶子官復置常從虎賁督王國改傅為師置典籖帥增置食官廄牧長倉官令無内史治書司馬世子庶子陵廟長中大夫舎人典醫典府丞公侯國惟置郎中令一卿自魏晉已来諸王多領將軍州鎮而王國屬官率兼幕府之職若長史司馬叅軍别駕治中祭酒儀曹從事史功曹兵曹書佐主簿掾屬東西閣祭酒之軰梁以太子太傅視尚書令少傅視左僕射詹事視中護軍任總宫朝門大夫視謁者僕射通事舎人視南臺御史多以他官兼之左右衛率視御史中丞左率領果毅統逺立徳建寧陵鋒夷冦祚徳等七營右率領崇營永吉崇和細射等四營二率各置殿中將軍十人正員司馬四人又有員外司馬督官而旅賁中郎將冗從僕射左右積弩將軍各置一人又置通事守舎人典法守舎人以中庶子功髙者一人為祭酒中舎人庶子功髙者各一人與中庶子祭酒共掌其坊之禁令而以舎人專掌丈記置典經局洗馬八人視通直郎掌文翰取甲族有才名者為之屬官有典經守舎人典事守舎人無員又有外監殿局内監殿局導客局齋内局主璽主衣扶持等局復有門局錫庫局内廄局中藥藏局食官局外廄局車廄局各有司存以承其事皇弟皇子府置師長史司馬從事中郎諮議叅軍友掾屬中記室中直兵等叅軍功曹史録事記室中兵等叅軍文學主簿正叅軍行叅軍長兼叅軍等員副王府减師友文學長兼行叅軍藩王府减從事中郎諮議叅軍掾屬録事記室中兵叅軍等員王國復置廟長陵長典醫典府丞舎人中大夫增置執書中尉嗣王國惟置郎中令常侍大農寺員藩王又省常侍餘皆循前制天監初置東宫常侍以散騎常侍為之六年詔家令視通直常侍率更僕視黄門皆置丞東宫三卿宋齊已来清流者不為之至是武帝始詔革其選七年以太子中舎人司從中郎為庶子自齊庶子用人卑雜至是詔革其選大通三年又置金華家令以昭明太子妃居金華宫陳仍梁制東宫惟置太傅而無師保又有東宫學士之員王府藩國正員之外復有版授之職後魏起於北土亦封建王侯因郡為國其大郡王國吏二百人次郡王國一百人皆立典師職比家丞總統羣師太武延和三年始立東宫備置屯衛比西宫三分之一孝文太和中始定官品東宫之屬增置太子主書主衣舎人典書典衣令史左右衛率主簿而分詹事為左右改食官令為食官長復置中盾之名其三太三少左右衛率中庶子庶子三卿三授官常從虎賁督守中舎人洗馬門大夫舎人倉令廄長詹事五官舍人並仍舊制王國置王家尉王家吏諸王師友皆仍舊號亦置皇子府官屬别有開府從事中郎開府掾屬郎中令列曹叅軍事開府祭酒中尉叅軍事列曹叅軍事侍郎上中下將軍叅軍督護中大夫二率丞典書典衛典祠學官等四令餘並同梁制其始藩王二藩王三藩王之官屬有長史司馬諮議叅軍録事叅軍事功曹記室户曹叅軍中兵叅軍事功曹史主簿列曹叅軍事列曹行叅軍叅軍督護一云皆有師傅又有王公國置郎中令大農中尉常侍侍郎上中下將軍中大夫等官北齊制官多循後魏而東宫職局統領有異以詹事總内外衆務領三寺左右率二坊置司馬功曹主簿以丞其事家令寺領食官典倉司藏等署令丞又領内坊令丞食官又别領器局酒局二丞典倉又别領園丞司藏又别領仗庫典作二局丞率更等領中盾署令丞僕寺領廄牧署令丞車輿局丞左右衛署防率各領騎官備身正副都督騎官備身五職騎官備身又有内直備身正副都督内直備身五職内直備身而又有備身正副都督備身五職備身直閣直前直後等員又有旅騎屯衛典軍校尉各二人騎尉三十人門下坊有中庶子中舎人通事守舎人主事守舎人各四人領殿内局内直監六人副直監四人典膳局監丞各二人藥藏局監丞各二人侍醫四人齋帥局齋帥内閣帥各二人典書坊庶子四人舎人二人十人領典經坊洗馬八人守舎人二人門大夫坊門大夫主簿各一人又統伶官西凉二部清商二部王置師一人皇子王國置郎中令大農中尉常侍各一人侍郎二人上中下三將軍各一人上中大夫各二人防閣四人典書典祠學官典衛令各一人齋帥四人食官廄牧長各一人典醫丞二人典書二人謁者四人舎人十人諸王國增置陵長廟長常侍各一人上中大夫各减一人并减中將軍諸公又减防閣齋帥典衣丞等員侯伯子男又减諸國公將軍大夫員後周武帝六官之建有小師氏保氏司戎司武司衛等員皆宫衛之職而諸侯之宫謂之外命建徳二年增改東宫官員三年置太子諫議大夫四人文學十人皇弟皇子各置友二人學士六人後又置太子宫正宫尹諸王侍讀隋室莗命官名俱復置三太三少以二坊分統諸局以門下内史二省開皇初置詹事二年罷之門下坊左庶子二人内舎人四人録事二人主事二人主事令史四人所統六局司