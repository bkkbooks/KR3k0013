body:
  text: 冊府元龜卷四百二十宋王欽若等撰將帥部掩襲古之用人也謀於廟宜於社推轂以命將秉旄而誓衆鳴鼓以啓行尅日以告戰是謂節制之師仁義之舉也及乎狙詐云盛智巧相圖故老氏言乎用奇孫子謂之詭道乃有人銜枚馬纒勒夜行晝伏掩其不備之事興焉春秋以來司戎重者或斷之以深謀濟之以銳氣鋒鏑靡接俘馘坐獲誠決勝之奇䇿走敵之良術也與夫戎容暨暨所以宣武威天陣堂堂所以襲姦逆不鼓不成列臨大事而不忘大禮古人以為文王之戰者殊哉公子槖師楚大夫也魯成公十七年舒庸人以楚師之敗也敗於鄢陵舒庸東夷國道吴人圍巢伐駕圍釐虺巢駕釐虺乃楚四邑遂恃吴而不設備公子槖師襲舒庸滅之叔弓魯大夫也昭公五年夏莒牟夷以牟婁及防兹來奔城陽平昌縣西南有防亭姑幕縣東北有兹亭秋七月公至自晉莒人來討討受牟夷不設備戊辰叔弓敗諸蚡泉莒未陳也荀吴晉大夫也魯昭公十三年鮮虞人聞晉師之悉起也五年𫝊曰遺守四千今甲車四千乗故為悉起而不警邊且不修備言夷狄無謀荀吴自著雍以上軍侵鮮虞及中人驅衝兢中山望都縣西北有中人城驅衝車與狄爭逐大獲而歸左司馬盿楚大夫也魯哀公四年夏楚人既克夷虎夷虎蠻夷叛楚者乃謀北方盿及申公夀餘葉公諸梁致蔡於負函三子楚大夫也此蔡之故地人民楚因以為邑致之者㑹其衆也致方城之外於繒闗負函繒闗皆楚地曰吴將泝江入郢逆流曰泝將奔命焉為一昔之期襲梁及霍偽辭當備吴夜結期明日便襲梁霍使不知之梁河南梁縣西南故城也梁南有霍陽山皆蠻子之邑也漢韓信為左丞相擊魏王豹魏盛兵蒲坂塞臨晉信乃益為疑兵陳船欲渡臨晉而伏兵從夏陽以木􅎆渡軍襲安邑魏王豹大驚引兵迎信信遂虜豹信又發趙兵未發者擊齊謂楚人未嘗見發者信引兵東未渡平原聞漢王使酈食其已說下齊信欲止蒯通說令擊齊信然其計遂渡河襲歴下軍至臨淄齊王走髙密後漢岑彭為廷尉行大將軍事彭鎮河内馮異先攻朱鮪於雒陽鮪大出軍欲擊彭時天霧鮪以為彭已去令其兵皆穫黍彭乃進擊大破之來歙為中郎將時隗囂據隴右歙與征虜將軍祭遵襲畧陽遵道病還遣精兵隨歙合二千餘人伐山開道從番須回中番須回中並地名徑至畧陽斬囂守將金梁因保其城囂大驚曰何其神也王霸為偏將軍光武幸譙使霸與捕虜將軍馬武東討周建於垂惠蘇茂將五挍兵四千餘人救建武為茂建所敗霸閉營堅壁軍吏皆爭之霸曰今閉營固守示不相援賊必乗勝輕進捕虜無救其戰自倍如此茂衆疲勞吾承其弊乃可克也茂建果悉出攻武合戰良久霸軍中壯士路潤等數十人斷髪請戰霸知士心銳乃開營後出精騎襲其背茂建前後受敵驚亂敗走鄧訓為張掖太守時盧水胡反叛訓因發湟中秦胡羌兵四千人出塞掩擊迷唐於寫谷斬首六百餘人得牛馬羊萬餘頭迷唐乃去大小榆兩谷名居頗巖谷衆悉破散其春復欲歸故地就田業訓乃發湟中六千人令長史任尚將之縫革為船置於箄上以渡河箄木筏也音步佳切掩擊迷唐盧落大豪多所斬獲馬援為隴西太守援與揚武將軍馬成擊先零諸羌因將其妻子輜重移阻於允吾谷中援乃潛行間道兵聚北山上援陣軍向山而分遣數百騎繞襲其後乗夜放火擊鼔呌譟虜遂大潰魏滿寵為征東將軍青龍三年春吴主遣兵數千家佃於江北至八月寵以為田向收熟男女布野其屯衞兵去城逺者數百里可掩擊也遣長史督二軍循江東下摧破諸屯焚燒榖物而還詔美之因以所獲盡為將士賞鄧艾為鎮西將軍伐蜀蜀將姜維守劍閣鍾㑹攻維未能克艾上言今賊摧折宜遂乗之從陰平繇邪徑經漢徳陽亭趣涪出劒閣四百里去成都三百餘里奇兵衝其腹心劒閣之守必還赴涪則㑹方軌而進劒閣之兵不還則應涪之兵寡矣軍志有之曰攻其無備出其不意今掩其空虚破之必矣冬十月艾自陰平道行無人之地七百餘里鑿山通道造作橋閣山髙谷深至為艱險又糧運將匱瀕於危殆艾以氊自褁推轉而下將士皆攀木緣崖魚貫而進先登至江由蜀守將馬邈降蜀衞將軍諸葛瞻自涪還綿竹列陳待艾艾遣子慧唐亭侯忠等出其右司馬師纂等出其左忠纂戰不利並退還曰賊未可擊艾怒曰存亡之分在此一舉何不可之有乃叱忠纂等將斬之纂馳還更戰大破之斬瞻及尚書張遵等首進到雒後主遣使奉皇帝璽綬為箋詣艾請降胡烈為泰山太守司馬文王為大將軍甘露二年討諸葛誕於淮南吴將朱異帥兵萬餘人留輜重於都陸輕兵至黎漿監軍石苞兖州刺史陳泰禦之異退烈以奇兵襲破都陸焚其糧運苞泰復進擊異大破之異之餘卒餒甚食葛葉而遁吴吕蒙為左䕶軍虎威將軍西屯陸口與闗侯結好侯討樊留兵將備公安南郡蒙上疏曰雲長討樊而多留備兵必恐蒙圖其後故也蒙嘗有病乞分士衆還建業以治病為名彼聞之必撤備兵而赴襄陽大軍浮江晝夜馳上襲其空虛則南郡可下而彼可擒也遂稱病篤大帝乃露檄召蒙還陰與圖計侯果信之撤備兵以赴樊魏使于禁救樊侯盡擒禁等人馬數萬託以糧乏擅取湘闗米帝聞之遂行先遣䝉在前䝉至尋陽盡伏精兵兵􅖻􅑳中使白衣揺櫓作商賈人服晝夜兼行至侯所置江邊屯候盡收縛之是故侯不聞知遂到南郡士仁麋芳皆降陸遜為鎮西將軍嘉禾五年攻襄陽還到白圍託言住獵潛遣將軍周峻張梁等擊江夏新市安陸石陽石陽市盛峻等奄至人皆捐物入城城門噎不得闗敵乃自斫殺已民然後得闔斬首凡千餘人孫韶為鎮北將軍黄武四年魏文帝至廣陵臨江觀兵帝見波濤洶湧歎曰嗟乎固天所以隔南北也遂歸韶乃遣將髙夀等率敢死之士五百人於徑路夜要之帝大驚夀等獲副車羽蓋以還朱然為車騎將軍右䕶軍赤烏九年征柤中魏將李興等聞然深入率步騎六千斷然後道然復出逆之軍以勝反朱異為偏將軍時魏廬江太守文欽營住六安多設屯砦置諸道要以招誘亡叛為邊寇害異身率其部下二千人掩破欽七屯斬首數百遷揚武將軍胡綜為右都督時將軍晉宗叛歸魏魏以宗為蘄春太守去江數百里數為寇害大帝使綜與賀齊輕行掩襲生虜得宗加建武中郎將晉祖逖為豫州刺史陳川遣將魏碩掠豫州郡大獲子女車馬逖遣將軍衞䇿邀擊於谷水盡獲所掠者皆令歸本家朱伺為威逺將軍依陶侃於夏口建興中陳聲率諸無賴二千餘家斷江抄掠侃遣為都䕶討聲聲衆雖少伺容之不擊求遣弟詣侃降伺外許之及聲去伺乃遣勁勇要聲弟斬之潛軍襲聲聲正旦並出祭祀飲食伺軍入其門方覺聲將闗普鄭進皆死戰伺軍人多傷乃還營聲東走保董城宋王鎮惡為振武將軍率龍驤將軍蒯恩討劉毅晝夜兼行於鵲州尋陽江口巴陵守風凡四日十月二十二日至豫章口去江陵城二十里鎮惡進路揚聲劉兖州上毅謂為信然不知見襲鎮惡自豫章口捨船步上蒯恩軍在前鎮惡次之舸留一二人對舸岸上豎立七旗下輒安一鼓語所留人計我將至城便長嚴如後有大軍狀又分隊在後令燒江津船艦鎮惡徑前襲城語前軍若有問者但云劉兖州至津戍及百姓皆言劉蕃實上晏然不疑未至城五六里逢毅要將朱顯之與十許騎步從者數十欲出江津問是何人答云劉兖州至顯之馳前問蕃在所答云在後顯之既見軍不見蕃而見軍人擔鼓排戰具望見江津船艦已被燒烟焰漲天而鼓鼙之聲甚盛知非蕃上便躍馬馳告劉毅外有大軍似從下上垂已至城江津船悉被火燒矣行令閉諸城門鎮惡亦馳進軍人緣城得入門猶未及下闗因得開大城東門大城内毅凡有八隊帶甲千餘人已得戒嚴蒯恩入東門便北迴擊射堂前攻金城東門鎮惡入東門便直擊金城西門軍分攻金城内東從舊將猶有六隊千餘人西將及能細直吏快手復有二千餘人食時就攻至中晡西人退散及歸降略盡鎮惡入城便因風放火燒大城南門及東門又遣人以詔及赦文并髙祖手書凡三函示毅毅皆燒不視金城内亦未信髙祖自來有王桓者家在江陵昔手斬桓謙為髙祖所賞抜常在左右求還西迎家至是率十餘人助鎮惡戰下晡間於金城東門北三十步鑿城作一穴桓便先衆入穴鎮惡自後繼之隨者稍多因短兵接戰鎮惡軍人與毅將或有是父兄子弟中表親戚者鎮惡令且鬭且共語衆並知髙祖自來人情離懈一更許㕔事前陣散潰斬毅勇將趙蔡毅左右兵猶閉東西閣拒戰鎮惡慮闇夜自相傷犯乃引軍出繞金城開其南面以為退路毅慮南面有伏兵三更中率左右三百許人開北門突出初毅常所乗馬在城外不得入倉卒無馬毅便就子肅民取馬肅民不與朱顯之謂曰人取汝父而惜馬不與汝今自走欲何之奪馬以授毅初出正值鎮惡軍衝之不得去迴衝蒯恩軍軍人鬭已一日疲倦毅得從大城東門出奔牛牧佛寺自縊死鎮惡身被五箭射鎮惡手所執矟於手中破折江陵平後二十日大軍方至署中兵出為安逺䕶軍武陵内史以討劉毅功封漢夀縣子食邑五百戸沈林子參髙祖征西軍事署三府中兵前鋒與㕘軍檀道濟同攻潼闗姚紹退走留將軍姚鸞精兵守險林子銜枚夜襲即屠其城劓鸞而抗其衆髙祖賜書曰頻再破賊慶快無譬暨屢摧破想不復久耳馮景祖為晉熙王燮中兵參軍燮為郢州刺史元徽二年太尉江州刺史桂陽王休範舉兵逼朝廷燮遣景祖襲尋陽休範留中兵參軍毛慧連州别駕程罕之居守開門詣景祖降進燮號安西將軍加督江州諸軍事南齊陳顯達為益州刺史武帝即位進號鎮西益部山險多不賓服大度村獠前後刺史不能制顯達遣使責其租贍獠帥曰兩眼刺史尚不敢調我遂殺其使顯達分部將吏聲言出獵夜往襲之男女無少長皆斬此後山夷震服劉懷珍宋世為寧朔將軍東安東筦二郡太守率龍驤將軍王敬則姜產步騎五千討夀陽廬江太守王仲子南奔賊遣偽廬江太守劉道蔚五千人頓建武澗築三城懷珍遣軍主段僧愛等馬步三百餘人掩襲斬之引軍至晉熙偽太守閻湛拒守劉子勛遣將王仲蚪步卒萬人救之懷珍遣馬步三千人襲擊仲蚪大破之於莫耶山遂進夀陽李安民為鎮東將軍屯夀春後魏南侵詔安民持節屢行緣淮清泗諸戍屯軍安民引水步軍入清至淮陽與魏戰破之既退安民知有伏兵乃遣族弟馬軍主長文三百騎為前驅自與軍副周盤龍崔文仲係其後分軍隠林中及長文至宿豫魏軍見衆少數千騎遮之長文且退且戰引賊向大軍安民率盤龍等趨兵至合戰於孫溪渚戰交灣側魏軍大敗赴清水死不可勝數陳侯安都初為梁將太平元年屯梁山以輕兵襲齊行臺司恭於歴陽大破之俘斬萬計後隨髙祖鎮京口除蘭陵太守髙祖謀襲王僧辯諸將莫知者惟與安都定計仍使安都率水軍自京口趨石頭髙祖自率馬步從江乗羅落㑹之安都至石頭北棄舟登岸僧辯弗之覺也石頭城北接嶺阜雉堞不甚危峻安都被甲帶長刀軍人捧之投於女垣内衆隨而入進逼僧辯臥室髙祖大軍亦至與僧辯戰於㕔事前安都自内閣出腹背擊之遂擒僧辯程文季為豫章内史隨都督章昭達率軍往荆州征蕭巋巋與周軍多造舟艦置于清泥水中時水長漂疾昭達乃遣文季共錢道戢輕舟襲之盡焚其舟艦昭達因蕭巋等兵稍怠又遣文季夜入其外城殺傷甚衆陳詳為仁威將軍吴州刺史天嘉二年周迪據臨川舉兵反詳等從他道襲迪於濡城别營獲其妻子迪敗走詳復本鎮陸子隆為智武將軍時華皎據湘州反以子隆居其心腹深患之頻遣使招誘子隆不從皎因遣兵攻之又不能尅及皎敗於郢州子隆出兵以襲其後因與王師相㑹授持節通直散騎常侍都督武州諸軍進爵為侯增邑并前七百户魯廣達為智武將軍巴州刺史太建初與儀同章昭達入峽口拓定安蜀等州鎮時周氏將圍江左大造舟艦於蜀并運糧青泥廣達與錢道戢等兵掩襲縱火焚之以功增封并前二千戸仍還本鎮後魏晉王伏羅太武之子督髙平源州諸軍討吐谷渾慕利延軍至樂都謂諸將曰若從大道恐軍聲先振必當逺遁若潛軍出其非意此鄧艾擒蜀之計也諸將咸難之伏羅曰夫將軍制勝萬里擇利專之可也遂間道行至大毋橋利延衆驚奔白蘭慕利延兄子拾寅走河曲降其一萬餘落陸俟為内都大官長安盧永劉超等聚黨以叛太武詔俟鎮長安使以方畧定之於是俟單馬之鎮超聞之忻然以為無能為也既至申揚威信示以成敗誘納超女外若姻親超猶自警初無降意俟乃率其帳下往見超觀其舉動超使人迎曰三百人以外適當以弓馬相待三百人以内當以酒食相供乃將二百騎詣超超設備甚嚴俟遂縱酒盡醉而退俟謂將士曰超可取乃密選精兵五百人激勵之言至懇切士卒各曰以死從公必無二也遂偽獵詣超與士卒約曰今㑹發機以當醉為限俟於是詐醉上馬大呼手斬超首將士皆應聲縱擊遂平之太武大悅徵還轉外都大官蕭寶夤為鎮東將軍討梁梁浮山既成堰淮水濫溢將為揚徐之患夤於堰上流更鑿新渠引注淮澤水乃小滅乃遣輕車將軍劉智文虎威將軍劉延宗率壯士千餘夜渡淮燒其竹木營聚破賊三壘殺獲數千人斬其將軍王升明而還火數日不滅酈範為寧逺將軍副慕容白曜南征宋師次無鹽宋將申纂憑城拒守議者僉以攻具未周不宜便進範曰今輕軍逺襲深入敵境無宜淹留久稽機候且纂必以我軍來速不在攻守謂方城可憑弱卒可恃今若外潛威形内整戎旅密勵將士出其不意可一攻而尅之白曜遂潛軍偽退示以不攻纂果不設備於是即夜部分晨便騰城崇朝而尅于栗磾為黑矟將軍新安侯太武征赫連昌勅栗磾與宋兵將交侯周幾襲陜城昌𢎞農太守曹達不戰而走乗勝長驅仍至三輔進爵為公加安南將軍北齊潘樂為司徒文宣時周文帝東至崤陜遣其行臺侯莫陳崇從齊子嶺趣軹闗儀同楊摽從鼔鐘道出建州陷孤公戍詔樂總大衆禦之樂晝夜兼行至長子遣儀同韓永興從建州西趣崇崇遂遁後周賀拔岳為衞將軍副爾朱天光討万俟醜奴醜奴走安定平亭天光與岳軍於汧渭之間宣言逺近曰今氣候漸熱非征討之時待至秋涼更圖進取醜奴聞之遂以為實分遣諸軍散營農於岐州之北岳與天光諸軍盡發掩之醜奴乃棄平亭而走岳輕騎急追明日及醜奴於平涼之長坑一戰擒之劉亮為大都督從文帝平侯莫陳悅悅黨豳州刺史孫定兒據州不下涇秦諸州悉與相應衆至數萬推定兒為王帝令亮襲之定兒以義兵猶逺未為之備亮輕以二十騎先樹一纛懸於近城髙嶺即馳入城中定兒方置酒髙㑹卒見亮衆皆駭愕莫知所為亮乃麾兵斬定兒懸首號令賊黨仍遥指城外纛命二騎曰出追大軍賊黨大懼一時降附於是諸州皆歸款伏裴寛為車騎大將軍鎮𢎞城時北齊伊川郡守梁鮓常在境首抄掠文帝患之命寛經畧焉後鮓行過妻家椎牛宴飲既醉然後不復自防寛密知之遣兵往襲遂斬之帝嘉焉賜奴婢金帶粟帛等李逺為都督義州𢎞農等二十一防諸軍事時東魏將段孝先率步騎二萬趨宜陽以送糧為名然實有窺窬之意逺密知其計追兵襲破之獲其輜重器械孝先遁走文帝乃賜所乗馬及金帶牀帳衣被等并雜綵二千疋拜大將軍史寧為驃騎大將軍宕昌羌獠甘作亂逐其王彌定而自立朝廷遣寧討破之獠甘將百騎走投生羌鞏㢘玉彌定遂得復位寧以未獲獠甘密欲圖之乃揚聲欲還獠甘聞之復招引叛羌依山起柵欲攻彌定寧謂諸將曰此羌入吾術中當進兵擒之耳諸將思歸咸曰羌之聚散無常依據山谷今若遣討恐引日無成且彌定還得守蕃將軍功已立矣獠甘勢弱彌定足能制之以此還師䇿之上者寧曰一日縱敵數世之患豈可舍垂滅之寇更煩再舉人臣之禮知無不為以此觀諸君不足與計事也如更沮衆寧豈不能斬諸君邪遂進軍獠甘衆亦至與敵大破之生擒獠甘徇而斬之并執鞏㢘玉送闕獨孤信為岷州刺史赤水蕃王梁企定舉兵反詔信討之企定尋為其部下所殺而企定子弟收其餘衆信乃勒兵向萬年頓三交谷中賊併力拒守信因詭道趣稠松嶺賊不虞信兵之至望風奔潰乗勝逐北徑至城下賊並出降隋楊素為信州總管及大舉伐陳以素為行軍元帥引舟師趣三硤軍至流頭灘陳將戚欣以青龍百餘艘屯兵數千人守狼尾灘以遏軍路其地險峭諸將患之素曰勝負大計在此一舉若書日下船彼則見我灘流迅激制不繇人則吾失其便以夜掩之素親率黄龍數千艘銜枚而下遣開府王長襲引步卒從南岸擊欣别柵令大將軍劉仁恩率甲騎趣白沙北岸遲大貽切明而至擊之欣大敗走悉虜其衆勞之秋毫不犯陳入大恱李安為黄門侍郎平陳之役為楊素司馬仍領行軍總管率蜀兵順流東下時陳人屯白沙安謂諸將曰水戰非北人所長今陳人依險泊船必輕我而無備以夜襲之賊可破也諸將以為然安帥先鋒大破陳師髙祖嘉之詔書曰陳賊之意自言水戰為險隘益之間彌謂官軍所憚幕府親將所部夜動舟師摧隘破賊徒生擒虜衆益官軍之氣破賊人之膽副朕所委聞以欣然進位上大將軍除郢州刺史周法尚為桂州總管桂州人李光仕舉兵作亂令法尚討之光仕帥勁兵保白石洞法尚遣兵列陣以當光仕親率奇兵蔽林設伏兩陣始交法尚馳擊其柵柵中人皆走散光仕大潰追斬之後遂州獠反又命法尚以行軍總管討之軍將至賊散走山谷間法尚捕不能得於是遣使慰諭假以官號偽班師日行二十里軍再舍潛遣人覘之知其首領盡歸柵聚相賀法尚遣步騎數千擊襲破之李充為行軍總管從元帥衞王爽擊突厥言於爽曰突厥每侵邊諸將輒以全軍為討莫能死戰繇是突厥勝多敗少所以毎輕中國之師今者沙鉢畧悉國内之衆屯據要險必輕我而無備精兵襲之可破也爽從之諸將多以為疑惟李徹奬成其計請與同行遂與充率精騎五千出其不意掩擊大破之沙鉢畧棄所服金甲潛草中而遁楊武通歴岷蘭二州總管與周法尚討嘉州叛獠法尚軍初不利武通為賊斷歸路於是束馬懸車出賊不意頻戰破之唐劉文靜初為唐公府司馬率兵禦屈突通於潼闗通遣虎牙郎將桑顯和率勁兵來擊文靜苦戰者半日死者數千人文靜度顯和軍稍怠潛遣奇兵掩其衆通尚擁兵數萬將遣歸東都文静遣所部將追而執之畧定新安以西之地李靖字藥師武徳二年為開府時蕭銑據荆州髙祖遣靖安輯之㑹開州首領冉肇則反招集蠻左凶威甚盛趙郡王孝恭與戰不利靖率羸兵八百襲之破其城後又要險設伏大破賊軍貞觀三年以靖為代州道行軍總領四年擊定襄大破之頡利可汗大懼退保鐵山遣使入朝謝罪請舉國内附又以靖為定襄道行軍總管往迎頡利頡利雖外請朝謁而潛懷猶豫其年二月太宗遣鴻臚卿唐儉將軍安修仁慰諭靖揣知其意謂副將張公謹曰詔使到彼彼必自寛遂選精騎一萬齎二十日糧引兵自白道襲之公謹曰詔許其降行人在彼未宜討擊靖曰此兵機也時不可失韓信所以破齊也如唐儉等輩安足可惜督軍疾進師至陰山遇其斥堠千餘帳皆俘以隨軍頡利見使者大悅不虞官兵至也靖軍將逼其牙十五里彼始覺頡利畏威先走部衆因而潰散靖斬萬餘級俘男女十餘萬殺其妻隋義城公主初頡利乗千里馬將走投吐谷渾西道行軍總管張寶相擒之以獻俄而突利可汗來奔遂復定襄常安之地斥土界自陰山張孝岷為偏將軍武徳二年閏二月以勁卒百人襲王世充汜水城入其郛郭沉其米船一百五十艘劉𢎞基為行軍總管武徳二年七月遣仲如願襲王世充於河陽城斬首數百級毁其河橋而還李厚徳為涉州刺史武徳三年七月襲武昌克之獲王世充總管韋瑗王君廓為左將軍時王世充鄭州司馬沈悅遣使詣左武大將軍李世勣請以城降君廓夜襲虎牢悅為内應遂克之獲其荆王行本長史戴胄武徳四年四月襲竇建徳糧艘大破之斬首三百級五月又襲破之獲其將張特虜六百餘人斬首三百級江夏王道宗與侯君集副李靖為崑丘道行軍大總管以討吐谷渾時賊聞兵至走入嶂山已行數千里諸將議欲息兵道宗固請追討李靖然之而君集不從道宗遂率偏師倍道徑往去大軍十日追擊之賊據險苦戰道宗潛遣千餘騎踰山襲其後表裏受敵一時奔潰張亮為滄海道行軍大總管從太宗征髙麗與亞將程名振拔卑沙城其城四面懸絶惟西門有攻取之勢名振督軍夜襲之副總管王文度先登士卒繼進城中潰散虜其男女八千口牛進達貞觀中為鄯善行軍副總管後吐蕃入寇進達鎮於松州吐蕃攻城十餘日進達掩其不備夜出兵襲破之吐蕃乃退蘇定方貞觀初為康道府折衝隨李靖襲突厥頡利於磧口靖遣定方率二百騎為前鋒乗霧而行走去賊一里許忽然霧歇望見其牙帳馳掩殺數十百人頡利及隋公主狼狽散走餘衆俯伏靖軍既至遂悉降之髙祖時為左驍騎大將軍既平賀魯思結闕俟斤都曼分鎮其地以彌射步真不綏御之遂率疎勒未俱般陁三國復叛擊破于闐定方受詔討之兵至葉水而賊保馬頭川於是選精兵萬人騎三千掩襲之一日一夜行三百里詰朝而到其城都曼大驚拒戰於城門之外賊師敗績契苾何力貞觀中為左領軍將軍與薛萬均征吐谷渾萬均為賊所攻何力救之獲吐谷渾主在突倫川何力復欲擊之萬均懲其前敗固言不可何力曰賊非有城郭逐草木以為生若不襲其不虞便恐鳥驚魚散一失機㑹安可傾其巢穴邪乃自領驍兵千餘騎直入突倫川襲破吐谷渾牙帳斬首數千級獲駝馬牛羊四十餘萬頭渾主脫身以免俘其妻子而還龍朔初何力為遼東道行軍大總管率兵征遼次于鴨綠水其地即髙麗之險防莫離支男生以精兵數萬守之衆莫能濟何力始至㑹層冰大合趣即渡水兵鼔噪而進賊遂大潰追奔數十里斬首三萬級餘衆盡降男生僅以身免㑹有詔班師乃還黑齒常之為河源軍副使吐蕃贊婆及素和貴等率衆數萬屯聚於良非川常之以精騎三千夜襲賊營斬首二千餘級獲羊馬數萬計贊婆等單馬而遁賞帛三千段以為河源軍大使張仁愿為雒州刺史時突厥入寇朔方軍總管沙叱忠義為賊所敗仁愿攝御史大夫代忠義統衆仁愿軍至而賊衆已退乃躡其後夜掩大破之崔光逺為御史大夫兼京兆尹天寶末祿山陷西京光逺於渭北召集人吏之歸順者嘗有賊剽掠涇陽縣界于僧寺中椎牛享之連夜酣飲去光逺營四十里光逺悉而知之率馬步二千人往一夜及之賊徒多醉不以為虞光逺領百餘騎持滿搤其要路分驍勇以陌刀呼而斬之賊徒二千餘人皆斃虜其馬千餘疋賊中以光逺勇勁常避其鋒侯希逸為平盧軍節度使肅宗元年建丑月率衆襲范陽擊敗偽將李懷光引衆而南李重倩善騎射臨事勇果為淮西節度李忠臣偏禆忠臣討李靈耀於汴州時田承嗣遣侄悅率精兵數萬援靈耀屯於州郭威聲頗盛重倩以騎數百乗夜掩襲貫穿賊營殺數千人而旋賊軍大駭田悅單騎突走士卒相枕藉死者不可勝紀靈耀因是開城濳遁餘卒奔潰遲明汴州平皆重倩之力也田穎為忠武軍大將軍從李光顔討淮西時諸軍使齊力攻討賊嘗徑攻烏重𦙍之壘重鎗禦之中數槍馳請救於光顔光顔以小殷橋賊之保也乗其無備使穎及宋朝隠襲而取之遂平其城壘梁雷彦恭為朗州節度使時周汭在荆南暴狠與鄰境皆樹讐怨蜀淮賊圍迫杜洪於鄂州洪求救於汭汭乃悉境内兵登舟從江而下彥恭常有窺圖意聞汭東去喜甚即率兵上襲荆人拱手而歸之於是廩藏金帛市里人民悉為彥恭舟徙而去後唐李嗣恩天祐十二年為天雄軍馬步軍都指揮使梁將劉鄩之北趣樂平也嗣恩襲之倍程先入北京時城中無備得嗣恩兵至人百其勇鄩聞其先過雨中宵遁晉康福拜朔方河西等軍節度使唐明宗遣將軍牛和柔領兵送赴鎮行次青岡峽㑹大雪令人登山望之見川下烟火吐蕃數千帳在焉寇不之覺因分軍為三道以掩之蕃衆大駭棄帳幙而走殺之殆盡獲玉璞羊馬甚多周馮暉善戰有勇後唐明宗朝領瀘州刺史典禁兵長興初董璋據東蜀叛攻陷閬州其年秋晉祖將兵繇大散闗討之川賊守劍門暉與趙在禮各領部下兵踰險阻他道出於劍門之左掩襲之殺守兵殆盡折從阮為勝州觀察處置等使廣順三年三月率軍至落葉鎮掩襲蕃部尋却至慶州折徳扆為府州團練使廣順三年十二月太原賊將喬贇引兵犯州界尋出軍掩襲敗走之冊府元龜卷四百二十
