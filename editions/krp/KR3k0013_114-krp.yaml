body:
  text: 册府元龜卷一百十四宋王欽若等撰帝王部廵幸第三唐𤣥宗天寳元年十月丁酉幸溫泉宫十一月己巳至自溫泉宫二年三月韋堅開廣運潭畢功得陳舟艦丙寅幸廣運樓以觀之即日還宫十一月戊寅幸溫泉宫十一月乙卯至自溫泉宫十二月戊申幸溫泉宫丙辰至自溫泉宫三載正月乙丑幸溫泉宫二月庚子至自溫泉宫十月甲午幸溫泉宫十一月丁卯至自溫泉宫四載十月丁酉幸溫泉宫十二月戊戌至自溫泉宫五載十月丁酉幸溫泉宫十一月己巳至自溫泉宫六載十月乙酉幸溫泉宫改溫泉宫為華清宫十二月癸亥還宫七載十月庚戌幸華清宫辛酉還宫八載十月丙寅幸華清宫十二月丁巳幸御史中丞楊釗庄九載正月幸華清宫十月庚申幸華清宫改驪山為昌山十二月辛卯幸楊國忠亭子十二月乙亥還宫十載十月辛亥幸華清宫十一月己未幸楊國忠宅十一載正月至自華清宫十月戊寅幸華清宫十二月乙亥還宫十二載十月戊申幸華清宫十三載正月還宫十月乙酉幸華清宫十二月戊午還宫十四載十月庚寅幸華清宫十一月甲子安祿山稱兵向闕庚午以其事聞於行在丙子還宫肅宗乾元元年十月甲寅上皇幸華清宫帝送於壩上二年冬十月丁酉詔曰昔昆夷作患周宣興薄伐之役陳豨稱亂漢祖發親征之師蓋所以禁暴除兇取威靖難上以保宗社下以拯黎元古昔帝王兹道無替頃者祿山稱兵搆逆背義負恩惡既貫盈尋已殄滅而思明殘冦尚敢挻祅聚其蜂蠆之餘邀我雷霆之伐朕以干戈屢動黎庶未康繇是按甲延誅冀其來格而乃竊兵干紀自取滅亡副元帥光弼紏率銳徒恭行天伐爰啓絳宫之畧克摧青犢之師曾未浹辰大破兇黨此皆穹昊垂祐宗社降靈是以戎律用貞祻淫斯在如聞蓬艾之下蚊蚋猶虞故當乗破竹以追奔同燎原而撲滅朕為人父母深念塗炭是用大整戈矛方申弔伐撫綏河雒以致和平即以今月十七日幸東京率六軍取北路進發但廵幸所過自有行營應緣祗供並有司自辦其路次州縣一切不得别有徵斂亦不得輒有進獻及時新野味等王公以下文武從官每頓主人供蔬飯不得輒置魚肉餅果及鋪設亦不得妄差人力别有祗承行從官及州縣所由有如違犯王公以下五品以上具名錄奏當日貶官餘并從軍令仍令知頓使左右廵使御史相知紏察具狀彈奏如涉阿容及不能舉奏所由議在必行毋貽後悔仍令户部侍郎同中書門下平章事第五琦充置頓使應行幸供擬及兵馬糧料續撙節作條件奏聞其從官委中書門下定名錄奏務從減省不欲勞煩宣示中外宜知朕意又以殿中監李輔國行營兵馬以御史大夫賀蘭進明中京留守時公卿皆獻書進諫帝以制命已行不納考功郎中知制誥蘇源明及給舎等上言切諫帝省表遂不行代宗寳應二年五月幸興慶宫即日還大明宫大厯二年二月壬午幸昆明池從俗踏青也徳宗貞元三年七月丙寅幸章敬寺七年七月幸章敬寺賦詩序皇太子在侍進和兼題百寮畢和以班列焉其後京兆尹薛珏請皇太子書帝詩序刻石而填之以金八年七月幸章敬寺十二年九月癸卯幸魚藻宫即日還十三年四月壬戌幸興慶宫龍堂求雨七月幸魚藻宫池先深一丈更掏加四尺十九年四月幸家令寺憲宗元和六年七月戊申御興安門觀樂十五年七月幸安國寺觀釋氏盂蘭盆之㑹庚辰復幸興福寺穆宗元和十五年八月壬申幸魚藻宫敬宗寳厯元年十一月幸溫湯即日還宫二年三月戊寅幸魚藻宫觀競渡己卯賜魚藻宮從官左右神策中尉諸司使翰林學士等錦綵銀器有差十月丁未幸城南華嚴寺文宗太和四年八月戊辰幸禁園亭㑹昌殿奏新樂七年十二月庚子駕幸望春宫昭宗乾寧四年三月庚午車駕幸韓建南莊六月帝幸西溪觀競渡光化元年車駕在華州四月幸陟屺寺宴從官於韓建所獻御莊六月幸西溪觀競渡後唐莊宗同光元年十一月詔將自汴歸雒有事於南郊河南尹張全義進迎駕法物儀仗甲子帝發汴州十二月庚午朔車駕寅時發自石橋御史中丞李徳林率文武百官班於積潤驛六軍諸衛金吾儀仗大常法物畢陳於路自上東門歸大内百官稱賀辛未以百官初至雒放三日朝㕘壬辰幸伊闕二年二月戊寅幸李嗣源明宗宅宣教坊樂盡歡而罷己卯幸左龍武軍辛卯寒食假帝出宣仁門幸東宅皇太后皇后幸水陸院尋勝教坊内弟子作樂晡晚還宫三月甲子幸東宅皇太后幸水陸院召李嗣源侍宴五月辛丑幸内園觀親殿上梁又幸郭崇韜之私第置酒作樂七月乙酉幸龍門之雷山祭天神從北俗之舊事也八月幸皇太子繼岌院奏教坊院樂縱酒而罷九月甲寅幸郭崇韜之私第宣教坊樂置酒㑹從官至一更還宫十月甲申幸小馬坊閱馬十一月己亥幸六宅作教坊樂宴諸皇弟戊午幸明宗第又至宋州節度使元行欽之第縱酒作樂一鼓三籌歸宫十二月戊辰幸西苑庚午車駕幸張全義之第丙子勅大名重地全魏奥區成予定覇之基致我興王之業蓋以土田沃衍庶士忠動載想夤緣得無睠矚近者頻令按察頗樂和平既堅望幸之誠宜舉省方之典取來年正月七日朕當廵幸東京丁丑勅中書門下省御史臺尚書省諸寺監大卿監各差有公事官三十員從行乙酉幸廣化寺祈雪乙丑又幸龍門三年正月乙未御史中丞崔協率從駕官屬先發東京留中書省印宰臣趙光裔雒中行事丙申勅翰林學士中書舎人金吾將軍兵吏部郎官扈從餘官並取三日先程赴鄴庚子車駕幸鄴京扈從軍三萬陳於上東門外帝御城樓慰撫而遣之宰臣趙光裔率留守司官屬辭至白坡河陽張繼業遣人上章云病甚既次河陽帝遣御醫視之癸卯駕次新鄉鄴都留守李岌進御衣縑銀謝廵幸副留守張憲遣少尹龍敏奉表謁於路戊戌至鄴皇后先歸大内帝自千秋亭乗輦備法駕晡晩歸宫三月庚子詔曰朕以削平僭亂底定寰區爰宅雒都再踰星歲乃睠興王之地頗聆望幸之辭暫議省廵以慰羣品因兹駐蹕俄已經春優恩既洽於大名車駕宜還於中土俾宣遐邇咸暢昇平可定此月十七日發程取河陽舊路歸雒甲辰宰臣竇盧革御史中丞崔協率文武從官先赴雒京帝詔郭崇韜謂曰朕思在徳勝寨時霍彦威叚凝皆予之勍敵終日革鬭戰聲相聞安知二年之間在吾廡下吾無少康光武之才一旦重興基構者繇二三勲徳卿等同心輔翼故也朕有時夢寢如在戚城因念曩時挑戰鏖兵勞則勞矣然而揚旌伐鼓差慰人心殘壘荒溝依然在目予欲按徳勝故寨與卿再陳舊事崇韜曰此去澶州不逺陛下再觀戰地益知王業之艱難可不偉哉己酉發自鄴宫副留守張憲率東京官吏辭於千秋亭是夜次南樂行宫庚戌次澶州辛亥至徳勝寨地帝登城四望指戰陣之處以喻宰臣渡河而南㳂岸西上所至指示廢柵陳曩時勝負至汴軍所據楊村寨因召龍驤神威諸校問當時諸將勇怯以為笑樂及至戚城先鋒寨置酒作樂日晏而旋丙辰次獲嘉懐州刺史李建鄴謁于路戊午次溫縣前華州刺史髙允竒自鞏縣修倉所來見乙未次河陽庚辰早發至白坡邢州節度李存紀振武節度朱守殷河南尹張全義謁於路宰臣竇盧革趙光裔文武百官班於路左右金吾六軍儀仗畢陳道從還宫四月壬申幸甘泉亭際晚還宮乙亥帝與皇后幸樞宻使郭崇韜私第崇韜進銀鞍馬六匹御衣著五百叚銀器副之皇后衣二百叚金合副之絹百疋從官李從霸下至供奉教坊伶官優給有差又幸左龍武統軍朱漢賔之第夜漏三刻還宫庚辰帝侍皇太后幸㑹節園遂幸李紹榮之第五月戊辰幸龍門廣化寺祈雨己未幸𤣥元廟禱雨九月丁巳出師子門射鴈於尖山至晩還宫明宗天成元年八月出上陽門幸冷泉宫觀稼至晩還宫九月乙未幸至徳宫因幸前隰州刺史袁建豐之第甲戌幸冷泉宫觀稼至晚還宫二年三月壬子朔幸㑹節園宰相樞宻使及節度使在京者共進錢絹請宴壬戌車駕幸甘泉亭四月戊子幸㑹節園召宰臣學士在京勲臣赴宴甲辰出左掖門觀修堤部署首領及力役軍人百姓賜物有差幸駙馬石敬瑭晉髙祖也宅又幸安重誨第進酒奏樂例加賜賚六月庚子幸白坡祭突厥神至晚歸内七月幸冷泉宫至暮歸内八月秦王從榮自鄴中至泊於至徳宫帝幸其第宣禁中女伎及教坊樂飲宴至晚從榮進馬及銀器錢絹帝賜諸伎樂及行從人等乗輿歸内己未御札就中書示諭曰歴代帝王以時廵狩一則遵行典禮一則按察方區矧彼夷門控兹東夏當先帝戡平之始為𦕈躬殿守之邦俗尚貞純兵懐忠勇自元臣鎮靖庶事康和兆民咸樂於有年闔境彌堅於望幸事難違衆議在省方朕取十月七日親幸汴州其㳂路一行宿食頓逓可下三司排當務從簡儉不得勞擾人户至於扈從兵師亦已嚴行誡約兼告諭東北道諸侯不得迎駕朝覲庚午勅應兩省及諸司有公事朝臣並隨駕西班差左右金吾大將軍及諸司衛將軍等十餘人扈從十月甲辰勅少府監聶延祚等以大駕廵幸告祭神祠帝御興教門慰諭樓前兵士乙酉幸汴州馬歩軍士數萬人自級節以上各賜錦衣鎧甲光明組練鮮潔法令如一行伍日嚴師徒雄盛近代罕比憇於積潤驛宰臣崔協引百官辭於行宫前辛丑詔曰禁暴戢兵實繇武徳安人和衆乃契天心車駕自離雒京戒嚴兵士不犯一物不役一夫河流井泉此外無取尚恐州縣以迎駕為名妄有配率或加察知必不容恕車駕至汴帝出咸安門封禪寺遊幸至晚歸内十二月壬午幸西郊食於釋氏知庖司取樵蘇于僧舎命逺買以償之庚子幸石敬瑭公署及康義誠私第三年正月壬子延宰臣於𤣥徳殿帝欲廵幸鄴都鄭珏等贊美其事癸丑内出御札曰王者以六合為家萬幾是務動必從於人欲道貴表於君臨矧以大業名都先皇舊地干戈近息井邑初完去春特命親賢出分攸寄一載之化條方闡六州之生聚咸蘇朕又竊念并汾有同豐沛欲和鑾之親撫慮致勞煩移嗣子之總臨冀諧委注今則以令赴鎮兼報行期而鄴都士庶馳誠表章繼至思朕車御暫到庶彼内外永康疊興徯后之詞何爽省方之便朕今月七日廵幸鄴都踰月之内却駐梁苑其㳂路宿食頓逓並仰三司預專排比不得輒擾人户付中書門下准此辛酉宰臣與百官詣閣進表請辛未幸鄴都及且住般糧尋降御札曰朕以鄴都望幸暫議省廵雖宣命已行而憂勤是厲切緣禁軍家口元住雒京般取或在道塗已到未經信宿念其辛苦動繫憂勞所宜别選良辰以副朕意今改三月十三日故兹札示壬戌追朝宣御札於閣門曰朕每念𦕈躬嗣承丕構厲憂勤於庶政持兢業於厥心罔敢怠荒冀符禆益去歲以五兵偃息九榖豐登指内外以省方慰羣情之望幸迨於駐蹕允協來蘇廼睠鄴城匪遥梁苑復念興王之地思從徯后之詞將命和鑾指期届路卿等情深許國道在弼予旋貢表章罄輸丹赤備閱傾䖍之懇深詳啓沃之規已諭淹延禆從俞允其六軍經費諸道轉輸國計所先兵食斯衆將致贍豐之備難矜運輓之勞既念疲羸粗宜蠲减其百姓般糧至雒京並却停罷只今近東州府般至汴州時將幸大名也六卿家口纔自雒陽遷於汴水頗亟聞順動初有難色及至百官上表聖慮未廻頗有狂說定州王都正多疑慮人情相恐軍士惶惑在位咸不敢言趙鳳手疏於安重誨直諭其事重誨自驚具白於帝翌日詔罷行期内外謐然安帖二月帝在汴丁酉出御札於中書曰朕聞王者握圖御宇應天順人必從億兆之心以副寰瀛之望朕恭承大寳漸致小康當時和歲豐之辰叶海晏河清之道思從望幸爰議省方昨者以全魏名邦興唐覇國當去弊除姦之後是安民撫衆之時思暫議於廵遊庶躬親於勞慰尋頒詔旨已定行期而聞衛士連營方諧聚族農功務穡始在承春雖無供億之勞寧免差徭之患而又勲賢拱北藩翰勤王儻萬乗之少留煩諸侯之入覲况復大臣抗表多士輸忠睹瀝懇以再三閱封章而數四諒為禆益深可歎嘉宜罷鳴鑾且謀駐蹕凡在中外當體朕懐先取今月十三日廵幸鄴都權停四月癸巳駕出北門觀麥翌日謂侍臣曰昨日出城詢諸父老苗稼滋潤牛驢皆肥喜形于色朕亦樂之左右皆賀五月帝幸西莊宴回鶻召前節度使赴之六月乙卯幸南莊八月戊戌幸西莊閏八月戊辰右散騎常侍李光憲上言請車駕歸雒陽修大禮於南郊九月壬午幸南莊翌日謂侍臣曰朕見西郊種麥已知生民之苦辛深可憫念十二月甲寅帝幸開封府六宫從行宴樂頒賜至晚幸康義誠楊漢章私第賜捧聖三指揮絹千疋翌日顧侍臣曰行幸飲六十餘盃亦覺太甚左右無對者四年二月丁卯東京留守孔循請車駕還京師己酉出御札宣示中書曰朕紹續鴻圖撫寧諸夏爰從雒邑來幸浚郊屬中山興悖逆之心外冦恣朋連之勢致煩征討方見盪除皆宗社之威靈盡忠良之禆贊自此遐邇永遂隆平蓋以乆别三川常懐九廟既克清於氛祲宜便復於京師取今月十三日歸雒都庚戌差内臣㳂路排頓辛亥幸西莊丙辰車駕將自汴歸雒文武百官先赴雒京辭丁巳帝取二十四日歸京駕出厚載門觀步兵先發甲子車駕歸京宿于中牟縣百官詣行宫起居各賜酒食帝謂侍臣曰麥田稍旱朕已闇申禱祈乙亥届鄭州雨三日百辟稱賀丙寅以未晴駐蹕鄭州宴從官於行宫庚午自石橋排儀仗列大常鹵簿鼔吹車輅法駕道引至未時入上東門三月壬辰幸延慶庄戊戌幸㑹節園召從臣赴宴四月幸西莊五月幸龍門諸寺六月幸至徳宫八月十五日幸金貞觀至東午橋還宫九月辛卯幸延慶莊至晚還宫十月壬子幸七星亭至晚還宫庚申幸龍門至晚還宫甲戌出徽安門按夏州所進白鷹十一月壬辰幸鎮國橋慰勞工徒而還戊子出上陽門幸苑内亭子閱馬至晚還宫長興元年正月丁卯閱馬於苑内至晚還宫癸未幸至徳宫二月戊戌幸長夏門稻田莊至晚還宫三月丁卯幸㑹節園宴宰臣及諸道入覲節度使賜物有差因幸河南府至夜歸宫壬午幸河南工役所丁亥出上陽門觀稼至晚歸宫四月丁酉幸長夏門稻田莊己亥幸㑹節園宴大臣至暮歸宫八月出定鼎門觀秋稼九月壬午幸至徳宫十月幸龍門至晚還宫十二月辛亥出歸子門幸苑中新修亭子至晚還宫二年二月丁酉幸至徳宫因幸前襄州節度使安元信東州王突欲之第賜突欲絹三百疋至晚還宫三月庚申幸左藏庫給將士金帛仍親視之四月丁酉幸㑹節園宴宰臣親王内臣及在京侯伯因幸河南府秦王從榮進馬請賜侍臣宴羣寮至晚還宫乙巳帝幸龍門佛寺祈雨至晚還宫三年正月辛丑白坡新修軍營駕幸觀之稱旨賜部署軍吏等物有差癸卯御中興殿顧謂侍臣曰朕幸白坡登邙山忽於山谷荒榛之中見有百姓興築房舎甚嘉歎之三月丙辰幸龍門永定庄甲子幸至徳宫至晩歸内五月甲子觀雒水漲溢是日水落三尺至午還宫賜控鶴官錢各一千油衣一事己丑帝觀榖水至午還宫十月庚申幸至徳宫因幸石敬瑭李從敏之私第十二月癸丑幸龍門觀工徒修伊河石堰以羊酒賜役夫如雒堤例伊水中流榜夫墮水遣人拯之以包錦賜之四年三月幸龍門七星亭農事方春田民遍野上見其㓢音洛桑稼樹枉駕勞問親自勸課八月壬申幸至徳宫自聖躬不豫未嘗宴遊至是始幸都民瞻望輿輦夾道歡呼所至如堵九月丙子幸至徳宫士庶夾道歡呼以帝初不豫至是喜帝復能騎乗也十月辛未幸宫西士和亭至晚還宫末帝清泰元年六月庚辰幸至徳宫又幸房知温安元信范延光索自通李從敏居第各賜繒帛銀器至夕還宫七月甲辰幸龍門佛寺禱雨十二月庚寅幸龍門禱雪二年十月丁卯幸崇道宫拜老子祠出定鼎門幸甘泉水亭賜從官酒食日夕還宫甲戌幸樞宻使趙延夀之第河南尹重美從獻金酒器四十事繒帛三千疋供御馬八匹金線袍玉𢃄樞宻宣徽内諸司使皆贄幣馬賜公主及諸子金𢃄金器幣馬有差移幸三司張延朗第昏暝還宫三年正月戊戌幸龍門祈雪晉髙祖天福元年十二月乙酉朔幸河陽餞送大相温蕃部兵士歸國二年三月勅曰王者省方設教靡憚於勤勞養士撫民必從於宜便顧惟凉徳肇啓丕圖嘗務去乎煩苛冀漸臻於富庶而念京城俶擾之後舟舩焚爇之餘饋餉有虧支費殊闕將别謀於飛輓慮轉困於生靈以此咎心未嘗安席今以夷門重地梁苑雄藩水陸交通舟車必集爰資經度須議按廵寧免暫勞所期克濟宜取今月二十七日廵幸汴州諸道州府節度防禦團練使刺史不計逺近並不得輒離州城來赴朝覲文武兩班委宰臣酌量逐司量差官員隨所應奉公事外餘並留守司所在行宫一聽仍舊不得修葺經過量事通得車馬外方當農時不得勞役人户修治㳂路食頓並委所司破省錢物預前排備所在州縣並不得輒有科斂布告中外咸使聞知凡百臣寮宜體朕旨中書奏車駕經過河南府河陽鄭州汴州管界所有名山大川帝王陵廟名臣等去路十里内者伏請下本州府各排比祗候俟車駕經過日以酒脯醢祭告從之庚辰帝卯時離京至積潤驛下馬留司官等班辭辛巳帝寅時離偃師至孝義食巳時至鞏縣壬午帝丑時離鞏縣汜水食上馬至滎陽四月癸未朔帝丑時離滎陽至須水食鄭州防禦自景友進牲餼器皿帝曰不出民力否景友奏曰臣畏陛下皆辦於己俸乃令收之甲申帝至中牟丙戌帝已時入汴州至鞠塲宣諭隨駕馬歩兵入内三年正月壬戌夜放燈都人夜逰帝御大寧宫門樓觀之五年八月丁酉觀稼於西郊辛巳觀稼於沙臺六年七月甲申降御札曰朕自承天命肇啓帝圖期四海之混同法五載之廵狩睠惟全魏實曰奥區人物殷繁山河雄壯地雖昇於都邑民未識於乗輿皆傾望幸之情宜展省方之義取今月五日暫幸雒都㳂路供頓並委所司以官物排比州縣官不得科率人户其隨駕内外官員并馬步兵士等不得擾人踐踏苗稼中外遐邇宜體朕心前均州刺史劉禧為隨駕橋道使鄆州節度使杜威為隨駕御營使遣䕶聖右廂都指揮使梁漢璋等領兵士八指揮徃鄴都賜衣服錢絹茶有差宣放文武百官朝㕘兩日取便進發壬辰離東京宿封丘己亥至鄴左右金吾六軍儀仗排列如儀迎引入内七年正月庚午上元節燒燈帝御乾元門觀之夜半還宫少帝以天福七年六月即位八年二月庚戌御札宣示曰控制寰中梁苑得舟車之要撫寧河朔鄴臺有粟帛之饒先皇帝肇啟其扃咸昇都邑南北非逺來徃是常今則時正晏清候當和煦宜廻金輅徃幸夷門宜取今月十一日還幸東京應㳂路州府並不用修飾行宫開治道路食宿頓逓並以官物供給勿令科斂人户側近州府長吏勿來朝覲凡在遐邇宜體朕懐己未登鄴都辛酉至澶州甲子次封丘文武百官見於行宫乙丑至東京庚午幸南莊七月丁酉幸南莊召從駕臣寮習射路左農人賜布衫麻縷開運元年十二月己亥朔幸髙門臺二年四月丙寅在澶淵是日帝出北門廵幸至戚城東宣隨駕臣寮習射晚際還宫十月幸硯臺廻幸魯國大長公主第至暮還宫三年二月壬午帝辰時乗馬幸南莊㳂河射鴨子向西至板橋沙灘下馬召隨駕節度統軍皇帝眷賜茶酒巳時囘至南莊臣僚賜食畢唱蕃歌赴行宫射弓復命臣寮上舩飲酒至東莊次入鄴都留守杜威園醉方入内四月丁未幸大年莊遊舩召近臣前任節度使開宴射弓酣甚賜羣官器帛物等又召彈獨絃琴瞽者昭陽人數十軰皆賜物有差及夜歸内漢髙帝以晉開運四年二月辛未即位改開運四年為天福十二年九月御札取今月二十九日暫幸澶魏十月壬午次長垣癸未幸蘧伯玉廟駐蹕賜臣寮酒丙戌次澶淵戊戌至鄴城院中駐蹕因幸節度使髙行周本營賜羣臣酒食十一月帝乗馬幸御營東金堤臺父老張進等數十人進茶湯帝曰朕之北來都為百姓勿以暫時駐軍而為煩也衆皆歡呼因賜物有差周太祖廣順元年正月丙戌幸城西御園午後還宫二月己未幸城南園賜從官酒食申時還宫三月辛未幸城西城南御園及史𢎞肇園太祖嘗與𢎞肇遊宴其間臨觴嗟叱乆之至晚還宫己丑幸城南園賜從官酒食申時還宫四月戊申幸城南園賜從官酒食申時還宫五月壬午巳時幸城南園賜從官酒食六月壬子巳時出金義門幸城西園申時還宫八月乙未辰時車駕幸班荆館賜從官酒食乙巳幸城西園内閱新城戰棹十二月乙未辰時幸城西園賜從官酒食申時還宫丙辰幸城南園賜從官酒食申時還宫二年三月幸城南園召宰臣諸統軍射十一月丙戌車駕辰時幸南園賜從官酒食申時還宫庚子幸樞宻院王峻請之也時峻於本院東别修廨署大興屋宇及成欲太祖幸後即於中視事太祖從之即召近臣賜酒食賜峻繒絹十疋銀器三千兩宰臣馮道已下及宣徽使翰林學士樞宻直學士賜物有差午際復召宰臣樞宻使前節度使諸統軍後園射賜物有差十二月壬寅幸城西園召從官射申時還宫三年正月辛巳幸城南賜從官酒食申時還宫三月戊申幸城南園賜從官酒食申時還宫五月壬寅幸城南園賜從官酒食申時還宫十月丙辰辰時幸城南園又幸城西園賜從官酒食申時還宫世宗顯徳元年七月庚辰出薰風門幸南御庄觀稼至晩還宫八月甲辰出金義門幸南御庄召武臣觀射至晩還宫二年十月癸酉幸禮賔院既而薄狩於近郊帝親射兎中之五年五月辛丑幸懷信驛癸卯幸造舩務九月丙子幸造舩務及玉津園己酉幸東水門命水工修利堤岸六年二月辛丑幸迎春苑及新蔡河因就陶家觀其陶器既而賜陶人物有差三月丙午朔丁未幸造舩務辛未幸造舩務壬申宴於廣政殿冊府元龜卷一百十四
