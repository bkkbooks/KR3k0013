body:
  text: 册府元龜卷九百二十八宋王欽若等撰總錄部好尚嗜好好丹術好尚傳曰人心不同如其面焉則知好尚有殊率性皆異莫窺其際有以見執徳不回樂在其中有以知所趣惟適不違本性但任所懐無或害人聊以成志則何往而不利焉董父舜時人實甚好龍能求嗜欲以飲食之龍多歸之乃擾畜龍以服事帝舜帝賜之姓曰董氏曰豢龍葉公子高楚人好龍門亭軒牖皆畵龍形一旦真龍垂頭於窓掉尾於戸葉公驚走失措焉漢辛慶忌為左將軍居處恭儉食飲被服尤節約然性好輿馬號為鮮明唯是為奢王吉字子陽為諫大夫謝病去吉子駿為御史大夫駿子崇為司空自吉至崇祿位彌隆皆好車馬衣服後漢陸閎為尚書令羙姿貌喜著越布单衣光武見而好之自是嘗勅㑹稽郡獻越布晉嵇康為中散大夫性絶巧而好鍛宅中有一柳樹甚茂乃激水圜之毎夏月居其下以鍛王濟為侍中解相馬又甚愛之杜預嘗稱濟有馬癖孫楚為大將軍叅軍雅敬王濟濟卒楚後來哭之甚悲賔客莫不垂涕哭畢向靈床曰卿嘗好作驢鳴我為卿作之體似聲真賔客皆笑阮孚為侍中性好屐祖約性好財同是一累而未判其得失有詣約見正料財物客至屏當不盡餘兩小簏以著背後傾身障之意未能平或有詣阮正見著蠟屐因自嘆曰未知一生當著幾量屐神色甚閒暢於是勝負始分袁山松為吳郡太守矜情秀逺善音樂舊歌有行路難曲辭頗疎質山松好之乃文其辭句婉其節制毎因酣醉縱歌之聽者莫不流涕初羊曇善唱樂桓伊能挽歌及山松行路難繼之時人謂之三絶時張湛好於齋前種松栢而山松毎出㳺好令左右挽歌人謂湛屋下陳尸山松道上行殯王羲之為右軍將軍㑹稽内史性愛鵞㑹稽有孤居姥飬一鵞善鳴求市未能得遂擕親友命駕就觀姥聞羲之將至烹以待之羲之嘆惜彌日又山隂有道士養好鵞羲之往觀焉意甚悦固求市之道士云為冩道徳經當舉羣相贈耳羲之忻然冩畢籠鵞而歸甚以為樂其任率如此郗超為司徒左長史以母喪去職性好聞人棲遁有能辭榮拂衣者超為之起屋宇作噐服畜僕豎費百金而不吝謝尚好衣刺文袴諸父責之因而自改位至尚書僕射謝安為太保性好音樂及登台輔期喪不廢樂謝𤣥少好佩紫羅香囊叔父安患之而不欲傷其意因戯賭取即焚之於此遂止位終左將軍㑹稽内史王徽之為桓冲府騎兵叅軍性縱逸時吳中一士大夫家有好竹欲觀之便出坐輿造竹下諷嘯良乆主人洒掃請坐徽之不顧將出主人乃閉門徽之便以此賞之盡歡而去嘗寄居空宅中便令栽竹或問其故徽之但嘯詠指竹曰何可一日無此君耶前秦苻朗為鎮東將軍青州刺史切懐逺操毎登渉山水不知老之將至宋謝靈運為永嘉太守郡有名山水靈運素所愛好遂肆志遊遨徧歴諸縣動逾旬朔何尚之為左光祿開府儀同三司性静退居家嘗著鹿皮帽王僧逹為宣城太守性好鷹犬何尚之於宅設八關齋行香次至僧逹曰願郎且放鷹犬勿復逰獵庾炳之為吏部尚書性好潔士大夫造之者去來出户輙令拭席洗床殷仲陳郡人性亦好潔小人非净浴新衣不得近左右王𢎞之隐居性好釣日夕載魚入上虞郭經親故門各以兩頭置門内而去南齊孔稚珪㑹稽山隂人不樂世務居宅盛營山水憑几獨酌傍無雜事門庭之内草萊不剪而多鳴蛙或問之曰欲為陳蕃乎珪笑答曰我以此當兩部鼓吹何必期效仲舉陳蕃字仲舉終散騎常侍王思逺為吳郡丞好簡潔衣服垢穢方便不前形儀新楚乃與促膝既去之後猶令二人以交箒掃其坐處梁何佟之為驃騎司馬性好潔一日之中洗滌者十餘過猶恨不足時人稱為水淫陶宏景居於句容之句曲山自號華陽隐居特愛松風庭院皆植松毎聞其響欣然為樂阮孝緒陳留尉氏人性沉静㓜與童兒逰戯嘗以穿池築山為樂劉之遴為南郡太守好古愛竒在荆州聚古噐數百種有一噐似甌可容一斛上有金錯字時人無能知者又獻古噐四種於東宫其第一種鏤銅鴟夷榼二枚兩耳有銀鏤銘云建平二年造二種金銀錯鏤古鐏二枚有篆銘云秦容成侯適楚之嵗造三種外國澡灌一口有銘云元封二年龜兹國獻四種古製澡盤一枚銘云初平二年造蕭幾為新安太守郡多山水時其所好適性逰履遂為之記後魏高樹生雅好音律嘗以絲竹自娛後為大都督高允性好音樂毎至伶人絃歌鼓舞嘗擊節稱善終散騎常侍光祿大夫隂遵和小名虎頭好音律尚武事初拜奉朝請裴藹之性輕率好琴書終安廣汝陽二郡太守唐王涯好古名畵人所保惜者必厚以貨財致之不受貨者即以官爵致之厚為垣竅而藏之複壁位至司空柳公權字誠懸所寳惟筆硯圗畵嘗自扄鑰之官終太子少師嗜好在天成象列宿有風雨之好唯人最靈大欲存飲食之味雖愛尚之或異亦縱恣而無節務求爽口焉取乎心至有變掩豆之嘗非登爼之用暴殄天物不近人情葢非仁者之用心斯亦格訓之所戒屈到楚人嗜芰芰菱也有疾召其宗老而屬之家人曰老為人宗者曰祭我必以芰曽晳魯人嗜羊棗而曽子不忍食羊棗魏文侯嗜晨鳬好北犬太子擊在中山遣倉唐紲北犬并晨鳬獻之文侯曰擊愛我知我所嗜好齊王食鷄蹠數千百段足公儀休為魯相嗜魚一邦皆争買魚而獻之公儀子不受曰夫唯嗜魚固不受也宋劉邕嗣封南康公所噉食毎異於人性嗜瘡痂以為味似蝮魚嘗詣孟靈休靈休先患灸瘡痂落牀上邕因取食之靈休大驚邕荅云性之所嗜靈休瘡痂未落者悉褫取以貽邕邕既去靈休與何朂書曰邕向見噉遂舉體流血南康國吏二百許人不問有罪無罪逓與鞭瘡痂嘗以給邕膳南齊虞悰為輔國將軍善為滋味和齊皆有方法豫章王嶷盛饌享賔謂悰曰今日餚羞寜有所遺不悰曰恨無黄頷臛何世祖幸芳林園就悰求扁米粣悰獻粣及雜餚數十轝大官鼎味不及也上就悰求諸飲食方悰祕不肯出上醉後體不快悰乃獻醒酒鯖鮓一方而已梁何𦙍累遷左民尚書去官初侈於味食必方丈後稍欲去其甚者猶食白魚䱇脯糖蟹以為非見生物宜食蚶蠣使門人議之學生鍾岏曰䱇之就脯驟於屈申蟹之將糖躁擾彌甚仁人用意深懐如怛至於車螯蚶蠣眉目内闕慙渾沌之竒獷殻外緘非金人之慎不悴不榮曽草木之不若無馨無臭與瓦礫其何算故宜充庖厨永為口實後魏夏侯道遷為豫州刺史好筵宴務口實京師珍羞㒺不畢有辛紹先為下邳太守性嗜羊肝嘗呼子少雍共食及紹先卒少雍終身不食羊肝隋劉臻為儀同父名顯臻性好噉蜆以音同父諱呼為扁螺後唐李鏻嘗為鎮州王鎔判官善飲茶嘗呼喫茶郎中好丹術丹術之興始於西漢風流寖逺好尚滋多或以黄金之可成或以長生之可致貴嚮才士讀誦祕書佩服靈符鍊餌神藥以至謝免爵位高蹈巖穴狥其所尚代有人焉采於簡編咸用論次漢江喜為轑陽侯坐使家丞上書還印符隨方士免劉向本名更生宣帝時為諌大夫帝復興神仙方術之事而淮南有枕中鴻寳苑祕書鴻寳苑祕書並道術篇名藏在枕中嘗存錄之不漏泄也書言神仙使鬼物為黄金之術及鄒衍重道延命方世人莫見而更生父徳武帝時治淮南獄得其書更生㓜而讀誦以為竒獻之言黄金可成帝令典尚方鑄作事尚方主巧作金銀之所今之中尚署費甚多方不騐帝乃下更生吏按吏劾更生鑄偽黄金繫當死更生兄陽城侯安民上書入國户半贖更生罪帝亦竒其材徳踰冬减死論蘇樂善方術王莽簒位二年興神仙事以樂善起八風臺於宫中臺成萬金費直萬金也作樂其上順風作液湯藝文志有液湯經其義未聞也又種五梁禾於殿中五色也谷永所謂耕耘五徳也各順其色置其方面先鬻鶴瑇瑁犀玉二十餘物漬種鬻古煑字也古瀡字也謂鬻取汁以漬糓子也瑇音代瑁音莫内切計粟斛成一金言此黄帝糓仙之術也以樂為黄門郎令主之晉葛洪丹陽句容人尤好神仙導飬之法從祖𤣥吳時學道得仙號曰葛僊公以鍊丹祕術授弟子鄭隐洪就隐學悉得其法焉後師事南海太守上黨鮑𤣥𤣥亦内學逆占將來見洪深重之以女妻洪洪傳𤣥業兼總練醫術初洪以年老欲鍊丹以祈遐夀聞交阯出丹求為勾漏令帝以洪資高不許洪曰非欲為求榮以有丹耳帝從之洪遂將子姪俱行至廣州刺史鄧嶽留不聽去洪乃止羅浮山鍊丹嶽表補東莞太守又辭不就嶽乃以洪兄子望為記室叅軍在廣積年優㳺閒飬著述不輟鮑靚為南海太守嘗行部入海遇風饑甚取白石煮食之以自濟宋劉亮為梁州刺史忽服食修道欲致長生迎武當山道士孫懐使合神仙藥至益州泰豫元年藥始成未出火毒孫不聽亮服亮苦欲服平旦開城門取井華水服至食後心動如刺午間便絶及就殮屍弱如生後人逄見乗白馬將數十人出關西行共語分明此乃道家所謂尸解者也梁陶宏景仕齊為奉朝請武帝永明末上表辭祿許之勅所在月給茯苓五斤白蜜二升以供服餌既得神符祕訣以為神丹可成而苦無藥物武帝給黄金朱砂曽青雄黄等後合飛丹色如霜雪服之體輕及武帝服飛丹有騐益敬重之鄧郁荆州建平人少而不仕隐居衡山極峻之嶺立小板屋两間足不下山斷穀三十餘載飲以澗水服雲母屑日夜誦大洞經武帝敬信殊篤為帝合丹帝不敢服起五岳樓貯之供飬家道吉日躬往禮拜白日神僊魏夫人忽來臨降乗雲而至從少嫗三十並著絳紫羅繡袿䙱年皆可十七八許色艶桃李質勝瓊瑶語言良乆謂郁曰君有仙分所以故來尋當相候至天監十四年忽見二青鳥悉如鶴大鼓翼翔舞移晷方去謂弟子等曰求之甚勞得之甚逸近青鳥既來期㑹至矣少日無病而終山内唯聞香氣世未嘗有武帝後令周舍為鄧郁傳具序其事後魏徐謇字成伯善醫術謇嘗有藥餌及吞服道符年垂八十而鬚髪不白力未多衰除右衛將軍謇欲為孝文合服金丹致延年之法乃入居崧髙採營其物歴嵗無所成遂罷李預為征西大將軍長史𢃄馮翊太平府解罷郡遂居長安毎羡古人飡玉之法乃採訪藍田躬往攻掘得若環璧雜噐形者大小百餘稍得黑鹿便篋盛以還而至觀之皆光潤可玩預乃椎七十枚為屑日服食之餘多恵人後預及聞者更求玉於故處皆無所見馮翊公源懐等得其玉琢為噐佩皆鮮明可寳預服經年云有效騐而世事寢食皆不禁節又加之好酒損志及疾篤謂其妻子曰服玉屏居山林排棄嗜欲或當大神力而吾酒色不絶自致於死非藥過也然吾尸體必當有異於常勿便速殯令後人知飡服之妙時七月中旬長安毒熱預停尸經宿而體色不變其妻常氏以珠玉二枚含之口閉常謂之曰君自云飡玉有神騐何故不受含也言訖齒啟納珠因嘘屬其口都無穢氣舉尸於棺堅直不傾委死時猶有遺玉屑數斗槖盛納諸棺中北齊張逰逺善方術文宣令與諸術士合九轉金丹及成文宣置之玉匣云我貪世間作樂不能即飛上天待臨死時取服按傳逰逺本無官唐師市奴方術人髙祖武徳中合金銀並成帝異之以示侍臣封徳彛進曰漢代方士及劉安等皆學術唯苦黄白不成金銀為食噐可得不死張道鶴平棘人少逰名山得服食之術後居人間毎毎餌金膏太宗貞觀十九年車駕次平棘幸其廬賜以衣服時六百四十六嵗尉遲敬徳累遷開府儀同三司貞觀末年篤信仙術飛鍊金石服藥餌雲母粉静居閒處修理池臺嘗奏清商樂一部厚自奉飬不與外人交通劉道合宛丘人為道士高宗令合還丹丹成而上之咸亨中卒唯有空皮而背上開折有似蟬蛻高宗聞之曰劉師為我合丹自服仙去其所進者亦無異孟洗汝州梁人也少好方術嘗於鳳閣侍郎劉禕之家見其勅賜金謂禕之曰此藥金也若燒火其上當有五色氣試之果然後歸伊陽山第以藥餌為事孫太冲隐於嵩山𤣥宗天寳三載河南尹裴敦復上言太冲於嵩山合鍊金丹自成於竈中精華特異變化非常請宣付史官頒示天下以彰靈瑞仙聖之應從之李抱真徳宗貞元中為昭義軍節度使晚節好方士以冀長生有孫季長者為抱真鍊金丹紿抱真曰服之當昇仙遂署為賔僚數謂叅佐曰此丹秦皇漢武皆不能得唯我遇之他年朝上清不復偶公輩矣復嘗夢駕鶴冲天寤而刻木鶴衣道士衣以習乗之凡服丹二萬丸腹堅不食將死不知人者數日矣道士牛洞𤣥以猪肪穀漆下之殆盡病少間季長復曰垂上仙何自棄也益服三千餘丸頃之卒鄭注文宗太和末為鳳翔節度注兩目不能逺視自言有金丹之術可去痿弱重膇之疾始徐州節度李愬自云得效乃移之監軍王守澄亦被其事後唐王鎔唐末為成徳軍節度晏安既乆惑於左道専求長生之要嘗聚淄黄鍊仙丹或講説佛經親受符籙西山多佛寺又有王母觀鎔増置舘宇雕飾土木道士王若訥者誘鎔登山臨水訪求仙迹毎一出數月方歸百姓勞敝王母觀石路既峻不通輿馬毎登行命僕妾數十人維錦繡牽持而上晉盧華莊宗時為平章事登庸之後不以進賢勸能為務唯事修鍊求長生之術嘗服丹砂嘔血數日垂死而愈晉史圭仕後唐為河南少尹有嵩山術士遺圭石藥如斗謂圭曰服之可以延夀然不可中輟輟則疾作矣圭後服之神爽力健深保惜焉清泰末圭在恒山遇祕瓊之亂時貯於衣笥為賊所刼便不復得天福中疾生胸臆之間嘗如火灼圭知其不濟求歸鄉里詔許之及渉河竟為藥氣所蒸卒於路册府元龜卷九百二十八
