body:
  text: 册府元龜卷八百五十八宋王欽若等撰總録部醫術周官有醫師之職掌醫之政令聚毒以供其事稽勞而制其食葢以十全者為上矣傳曰醫不三世不服其藥又曰三折肱知為良醫誠以其繼志肄業傳習精練除疾蠲疴功效顯著之謂也自俞扁和緩擅名於前代漢魏而下髙手繼出其操術之妙亦幾於神簡策所紀爛然可覿若乃審四時之候究六癘之本調五味五穀五藥之品視五氣五聲五色之狀兩之以九竅之變參之以九臟之動則人之死生繫焉在執藝之工為難能矣醫緩秦人也晉景公疾病求醫於秦秦伯使醫緩為之緩醫名為猶治也未至公夢病為二䜿子曰彼良醫也懼傷我焉逃之其一曰居肓之上膏之下若我何肓鬲也心為下膏醫至曰疾不可為也在肓之上膏之下攻之不可逹之不及藥不至焉不可為也逹針也公曰良醫也厚為之禮而歸之醫和秦人也晉平公有疾求醫於秦秦伯使醫和視之曰疾不可為也是謂近女室疾如蠱蠱惑也非鬼非食惑以喪志惑女色而失志良臣將死天命不祐良臣不規救君過故將死而不為天所祐公曰女不可近乎對曰節之先王之樂所以節百事也故有五節五聲之節遲速本末以相及中聲以降五降之後不容彈矣此謂先王之樂得中聲聲成五降而息也降罷退也於是有煩手淫聲慆堙心耳乃忘平和君子弗聼也五降而不息則雜物竝奏所以成鄭衛之聲物亦如之言百事皆如樂不可失節至於煩乃舍也巳無則生疾煩不舍則生疾君子之近琴瑟以儀節也非以慆心也為心之節儀使動不過度天有六氣謂隂陽風雨晦明也降生五味謂金味辛木味酸水味鹹火味苦土味甘皆繇隂陽風雨而生發為五色辛色白酸色青鹹色黑苦色赤甘色黄發見也徵為五聲白聲商青聲角黑聲羽赤聲徵黄聲宫徵也淫生六疾淫過也滋味聲色所以養人然過則生害六氣曰隂陽風雨晦明也分為四時序為五節六氣之化分而序之則成四時得五行之節過則為菑古災字隂淫寒疾寒過則為冷陽淫熱疾熱過則喘渇風滛末疾末四肢也風緩急雨淫腹疾雨濕之氣為洩注晦淫惑疾晦夜也為宴寢過節則心惑亂明淫心疾明盡也思慮煩多心勞生疾女陽物而晦時淫則生内熱惑蠱之疾女嘗隨男故言陽物家道嘗在夜故言晦時今君不節不時能無及此乎出告趙孟趙孟曰誰當良臣對曰主是謂矣主相晉國於今八年晉國無亂諸侯無闕可謂良矣和聞之國之大臣榮其寵禄任其大節有菑禍興而無改焉改改行以救菑必受其咎今君至於淫以生疾將不能圗恤社稷禍孰大焉主不能禦吾是以云也云主將死趙孟曰何謂蠱對曰淫溺惑亂之所生淫溺没於嗜欲於文皿蟲為蠱文字皿器也器受蟲為害者為蠱穀之飛亦為蠱穀乆積則變為飛蟲名曰蠱在周易女惑男風落山謂之蠱㢲下艮上蠱㢲為長女為風艮為少男為山少男而說長女非匹故惑山木得風而落皆同物也物猶類也趙孟曰良醫也乃厚禮而歸之文摯宋醫也齊王疾痏齊王惽王宣王之子痏鮮痏也一曰善曈卧也使人之宋迎文摯文摯視王之疾謂太子曰王之疾必可巳也巳猶愈也雖然王疾不可治怒王則摯必死怒讀强弩之弩也太子頓首强請曰茍已王之疾臣與臣之母以死爭之於王王必幸臣之母幸哀也願先生之勿緩也文摯曰諾請以死為王為治也與太子期而將徃不當者三三不如期也齊王固已怒矣文摯至不觧屨登牀履王衣問王之疾王怒而不與言故不觧屨以履王衣欲令王怒也王怒果甚不與文摯言之也文摯因出固辭而重怒王叱起疾乃遂己巳徐愈也王大怒不說將生烹文摯太子與王后急争之而不能得果以鼎生烹文摯㸑之三日三夜其顔色不變變毁也文摯曰誠欲殺我則胡不覆之以絶隂陽之氣王使覆之文摯乃死趙扁鵲渤海郡鄭人鄭當為鄚今莫州縣姓秦氏名越人少時為人舍長舍客長桑君過扁鵲獨奇之嘗謹遇之長桑君亦知扁鵲非常人也出入十餘年乃呼扁鵲私坐間與語曰我有禁方年老欲傳與公公母泄扁鵲曰敬諾乃出其懐中藥與扁鵲飲是以上池之水上池水謂水未至地盖承取露及竹木上取之以和藥服之三十日當見鬼物三十日當知物矣乃悉取其禁方書盡與扁鵲忽然不見殆非人也扁鵲以其言飲藥三十日視見垣一方人以此視病盡見五藏癥結特以診脉為名爾為醫或在齊或在趙在趙者名扁鵲當晉昭公時趙簡子為大夫専國事簡子疾五日不知人大夫皆懼於是召扁鵲扁鵲入視病出董安于問扁鵲扁鵲曰血脉治也而何恠昔秦穆公嘗如此七日而寤寤之日告公孫友與子輿曰我之帝所甚樂吾所以乆者適有所學也帝告我晉國且大亂五世不安其後將覇未老而死覇者之子且令而國而汝也男女無别公孫支書而藏之秦策於是出夫獻公之亂文公之霸而襄公敗秦師於殽而歸縱滛此子之所聞今主公之病與之同不出三日必間間必有言也居三日半簡子寤語諸大夫曰我之帝所甚樂與百神游於鈞天廣樂九奏萬舞不類三代之樂其聲動心有一熊欲援我帝命我射之中熊熊死又有羆来我又射之中羆羆死帝甚喜賜我二笥皆有副吾見兒在帝側帝屬我一翟犬曰及而子之壯也以賜之帝告我晉國且世衰七世而亡嬴姓將大敗周人於范魁之西而亦不能有也董安于受言書而藏之以扁鵲言告簡子簡子賜扁鵲田四萬畝後扁鵲過虢虢太子死扁鵲至虢宫門下問中庶子喜方者曰太子何病國中治禳過於衆事中庶子曰太子病血氣不時交錯而不得泄暴發於外則為中害精神不能止邪氣邪氣畜積而不得泄是以陽緩而隂急故暴蹷而死扁鵲曰其死何如時曰雞鳴至今曰收乎曰未也收謂棺歛其死未能半日也言臣齊渤海秦越人也家在於鄭未嘗得望精光侍謁於前也聞太子不幸而死臣能生之中庶子曰先生得無誕之乎何以言太子可生也臣聞上古之時醫有俞跗治病不以湯液醴灑􅀈石橋引按杌毒熨一撥見病之應因五藏之輸乃割皮觧肌訣脉結筋搦髓腦揲荒􅏨幕湔浣腸胃漱滌五藏練精易形先生之方能若是乎則太子可生也不能若是而欲生之曽不可以告咳嬰之兒終日扁鵲仰天嘆曰夫子之為方也若以管窺天以郄視文越人之為方也不待切脉望色聽聲寫形言病之所在聞病之陽論得其隂聞病之隂論得其陽病應見於大表不出千里决者至衆不可屈指也子以吾言為不誠試入診太子當聞其耳鳴而鼻張循其兩股以至於隂當尚温也中庻子聞扁鵲言目眩然而不瞚舌撟然而不下乃以扁鵲言入報虢君虢君聞之大驚出見扁鵲於中闕曰竊聞髙義之日乆矣然未嘗得拜謁於前也先生過小國幸而舉之徧國寡臣幸甚有先生則活無先生則棄捐填溝壑長終而不得反言未卒因嘘唏服臆魂精泄横流涕長澘一云言未卒因涕泣交流嘘唏不能自止忽忽承䀹悲不能自止容貎變更扁鵲曰若太子病所謂尸蹷者也夫以陽入隂中動胃繵緣中經維絡維一作結别下於三焦膀胱是以陽脉下遂作隊隂脉上争㑹氣閉而不通隂陽内行下内鼔而不起上外絶而不為使上有絶陽之絡下有破隂之細破隂絶陽之色已癈一作發脉亂故形静如死狀太子未死也夫以陽入隂支蘭藏者生以隂入陽支蘭藏者死凡此數事皆五藏蹷中之時暴作也良工取之拙者疑殆扁鵲乃使弟子子陽厲鍼砥石以取外三陽五㑹有間太子蘇乃使子豹為五分之熨以八減之齊和煮之以更熨兩脅下太子起坐更適隂陽但服湯二旬而復故故天下盡以扁鵲為能生死人扁鵲曰越人非能使之起爾虢自晉獻公時滅至是二十餘年矣蓋傳誤也扁鵲過齊齊桓侯客之入朝見曰君有疾在腠理不治將深桓侯曰寡人無疾扁鵲出桓侯謂左右曰醫之好利也欲以不疾者為功後五日扁鵲復見曰君有疾在血脉不治恐深桓侯曰寡人無疾扁鵲出桓侯不恱後五日扁鵲復見曰君有疾在腸胃間不治將深桓侯不應扁鵲出桓侯不恱後五日扁鵲復見望見桓侯而退走桓侯使人問其故扁鵲曰疾之居腠理也湯熨之所及也在血脉鍼石之所及也其在腸胃酒醪之所及也在骨髓雖司命無奈之何今在骨髓臣是以無請也後五日桓侯體病使人召扁鵲扁鵲已逃去桓侯遂死是時齊無桓侯即日和之子桓公也扁鵲名聞天下過邯鄲聞貴婦人即為帶下醫過雒陽聞周人愛老人即為耳目痺醫来入咸陽聞秦人愛小兒即為小兒醫隨俗為變秦太醫令李醯自知伎不如扁鵲也使人刺殺之至今天下言脉者繇扁鵲也漢太倉公者為齊國太倉長姓淳于氏名意少而喜醫方術髙后八年更受師同郡元里公乘陽慶慶年七十餘無子時使意盡去其故方更悉以禁方與之傳黄帝扁鵲之脉書五色診病知人死生决嫌疑定可治及藥論甚精時受之三年為人治病决死生多驗然左右行㳺諸侯不以家為家或不為人治病病家多怨之者文帝詔召問所為治病死生驗者幾何人主名為誰意對曰自意少時喜醫藥方試之多不驗者至髙后八年意年二十六得見師臨菑元里公乘陽慶慶年七十餘意得見事之謂意曰盡去而方書非是也慶有古先道遺傳黄帝扁鵲之脉書五色診病知人生死决嫌疑定可治及藥論書甚精我家給富心愛公欲盡以我禁方書悉教於公臣意即曰幸甚非意之所敢望也臣意即避席再拜謁受其脉書上下經五色診奇咳術揆度隂陽外變藥論石神接隂陽禁書受讀觧驗之可一年所明嵗即驗之有驗然尚未精也要事之三年所即當已為人治診病决死生有驗精良今慶已死十年所臣意年盡三年年三十九嵗也齊侍御史成自言病頭痛臣意診其脉告曰君病惡不可言也即出獨告成弟昌曰此病疽也内發於腸胃之間後五日當􅢝腫後八日嘔膿死成之病得之飲酒且内成即如期死所以知成之病者臣意切其脉得肝氣濁一作黽而静一作清此内闗之病也脉法曰脉長而弦不得代四時者其病主在於肝和即經主病也代則絡脉有過經主病和者其病得之筋髓裏其代絶而脉貫者病得之酒且内所以知其後五日而􅢝腫八日嘔膿死者切其脉時少陽初代代者經病病去過人人則去絡脉主病當其時少陽初闗一分故中熱而膿未發也及五分則至少陽之界一作分下章曰肝與心相去五分故曰五日盡也及八日則嘔膿死故上二分而膿發五界而􅢝腫盡泄而死熱上則熏陽明爛流絡流絡動則脉結發脉結發則爛觧故絡交熱氣已上行至頭而動故頭痛齊王中子諸嬰兒小子病召臣意診切其脉告之曰氣鬲病使人煩懣食不下時嘔沫病得之少憂數忔食飲臣意即為之作下氣湯以飲之一日氣下二日能食三日即病愈所以知小子之病者診其脉心氣也濁一作黽又作極躁而經也此絡陽病也脉法曰脉来數病去難而不一者病主在心周身熱脉盛者為重陽重陽者逷心主逷盪也謂病盪心者猶刺其心故煩懣食不下則絡脉有過絡脉有過則血上出血上出者死此悲心所生也病得之憂也齊郎中令循病衆醫皆以為蹷入中而刺之臣意診之曰湧疝也令人不得前後溲循曰不得前後溲三日矣臣意飲以火齊湯一飲得前溲再飲大溲三飲而病愈病得之内所以知循病者切其脉時右口氣急右一作又脉無五藏氣右口脉大而數數者中下熱而湧左為下右為上皆無五藏應故曰湧疝中熱故溺赤也齊中御府長信病臣意入診其脉告曰熱病氣也然暑汗脉少衰不死曰此病得之當浴流水而寒甚已則熱信曰唯然往冬時為王使於楚至莒縣陽周水而莒橋梁頗壊信則繫車轅未欲渡也馬驚即墜信身入水中幾死吏即来救信出之水中衣盡濡有間而身寒已熱如火至今不可以見寒臣意即為之液火齊湯遂熱一飲汗盡再飲熱去三飲病已即使服藥出入二十日身無病者所以知信之病者切其脉時并隂脉法曰熱病隂陽交者死切之不交并隂并隂者服順清而愈其熱雖未盡猶活也腎氣有時間濁濁一作黽在太隂脉口而希是水氣也腎固主水故以此知之失治一時即轉為寒熱齊王太后病召臣意入診脉曰風癉客脬難於大小溲溺赤臣意飲以火齊湯一飲即前後溲再飲病已溺如故病得之流汗出􅎵􅎵者去衣而汗晞也所以知齊王太后病者臣意診其脉切其太隂之口滋然風氣也脉法曰沉之而大堅浮之而大𦂳者病生在腎腎切之而相反也脉大而躁躁大者膀胱氣也躁者中有熱而溺赤齊章武里曹山跗病臣意診其脉曰肺消癉也加以寒熱即告其人曰死不治適其供飬此不當醫治法曰後三日而當狂妄起行欲走後五日死即如期死山跗病得之盛怒而以接内所以知山跗之病者臣意切其脉肺氣熱也脉法曰不平不鼔形弊一作散此五藏髙之逺數以經病也故切之時不平而代不平者血不居其處代者時參擊竝至乍躁乍大也此兩絡脉絶故死不治所以加寒熱者言其人尸奪尸奪者形弊形弊者不當闗炙鑱石及飲毒藥也臣意未往診時齊太醫先診山跗病炙其足少陽脉口而飲之半夏丸病者即泄注腹中虚又灸其少隂脉是壊肝剛絶深如是重損病者氣以故加寒熱所以後三日而當狂者肝一絡連屬結絶乳下陽眀故絡絶開陽明脉傷即當狂走後五日死者肝與心相去五分故曰五日盡即死矣齊中尉潘滿如病小腹痛臣意診其脉曰遺積瘕也臣意即謂齊大僕臣饒内史臣繇曰中尉不復自止於内則三十日死後二十餘日溲血死病得之酒且内所以知潘滿如病者臣意切其脉深小弱其卒然合一云未然合合也是脾氣也右脉口氣至𦂳小見瘕氣也以此相承故三十日死三隂俱摶者如法不俱摶者决在急期一摶一代者近也故其三隂摶溲血如前止前一作勤也陽虚侯相趙章病召臣意衆醫皆以為寒中臣意診其脉曰迵風言動徹入四支迵風者飲食下嗌謂喉下也而輙出不留法曰五日死而後十日乃死病得之酒所以知趙章之病者臣意切其脉脉来滑是内風飲食下嗌而輙出不留者法五日死皆為前分界法後十日乃死所以過期者其人嗜粥故中藏實中藏實故過期師言曰安穀者過期不安穀者不及期濟北王病召臣意診其脉曰風蹷胸滿即為藥酒盡三石病已得之汗出伏地所以知濟北王病者臣意切其脉時風氣也心脉濁一作黽病法過入其陽陽氣盡而隂氣入隂氣入張則寒氣上而熱氣下故胷滿汗出伏地者切其脉氣隂隂氣者病必入中出及瀺水也齊北宫司空命婦出於病婦一作奴奴盖女奴也衆醫皆以為風入中病主在肺肺一作肝刺其足少陽脉臣意診其脉曰病氣疝客於膀胱難於前後溲而溺赤病見寒氣則遺溺使人腹腫出於病得之欲溺不得因以接内所以知出於病者切其脉大而實其来難是蹷隂之動也脉来難者疝氣之客於膀胱也腹之所以腫者言蹷隂之絡結小腹也蹷隂有過則脉結動動則腹腫臣意即灸其足蹷隂之脉左右各一所即不遺溺而溲清小腹痛止即更為火齊湯以飲之三日而疝氣散即愈故濟北王阿母一作齊阿王母自言足熱而懣臣意告曰熱蹶也即刺其足心各三所案之無出血病旋已病得之飲酒大醉濟北王召臣意診脉諸女子侍者至女子豎豎無病臣意告永巷長曰豎傷脾不可勞法當春嘔血死臣意言王曰才人女子豎何能王曰是好為方多伎能為所是案法新所一作取往年市之民所四百七十萬曹偶四人臣欽若曰史記索隠曹偶猶等軰也王曰得母有病乎臣意對曰豎病重在死法中王召視之其顔色不變以為不然不賣諸侯所至春豎奉劍從王之厠王去豎後王令人召即仆於厠嘔血死病得之流汗流汗者同法病内重毛髪而色澤脈不衰此亦闗内之病也齊中大夫病齲齒臣意執其左太陽眀脉即為苦參湯日漱三升出入五六日病已得之風及卧問曰食而不漱菑川王美人懐子而不乳来召臣意臣意往飲以莨𦿆藥一撮以酒飲之旋乳臣意復診其脉而脉躁躁者有餘病即飲以消石一齊出血血如豆比五六枚齊丞相舍人奴從朝入宫臣意見之食於閨門外望其色有病氣臣意即告宦者平平好為脉學臣意所臣意即示之舍人奴病告之曰此傷脾氣也當至春鬲塞不通不能食飲法至夏泄血死宦者平即往告相曰君之舍人奴有病病重死期有日相君曰卿何以知之曰君朝時入宫君之舍人奴盡食閨門外平與倉公立即示平曰病如是者死相即召舍人奴而謂之曰公奴有病乎舍人曰奴無病身無痛者至春果病至四月泄血死所以知奴病者脾氣周乘五藏傷部而交故傷脾之色也望之殺然黄察之如死青之兹衆醫不知以為大蟲不知傷脾所以至春死病者胃氣黄者土氣也土不勝木故至春死所以至夏死者脉法曰病重而脉順清者曰内闗内闗之病人不知其所痛心急然無苦若加以一病死中春一愈順及一時其所以四月死者診其人時愈順愈順者人尚肥也奴之病得之流汗數出炙於火而以出見大風也菑川王病召臣意診脉曰蹷上為重頭痛身熱使人煩懣臣意即以寒水拊其頭刺足陽明脉脉左右各三所病旋巳病得之沐髪未乾而卧診如前所以蹷頭熱至肩齊王黄姬兄黄長卿家有酒召客召臣意諸客坐未上食臣意朢見王后弟宋建告曰君有病往四五日君要脅痛不可俛仰要與腰同又不得小溲不亟治病即入濡腎及其末舍五藏急治之病方今客腎濡此所謂腎痺也宋建曰然建故有要脊痛往四五日天雨黄氏諸倩倩者壻也東齊之間壻謂之倩言可假倩也見建家京下有方石京倉廩之属也即弄之建亦欲效之效之不能起即復置之暮要脊痛不得溺至今不愈建病得之好持重所以知建病者臣意見其色太陽色乾腎部上及界要以下者枯四分所故以往四五日知其發也臣意即為柔湯使服之十八日所而病愈濟北王侍者韓女病要背痛寒熱衆醫皆以為寒熱也臣意診脉曰内寒月事不下也即竄以藥旋下病已病得之欲男子而不可得也所以知韓女之病者診其脉時切之腎病也嗇而不屬嗇而不屬者其来難堅故曰月不下肝脉弦出左口故曰欲男子不可得也臨淄汜里女子薄吾病甚衆醫以為寒熱篤當死不治臣意診其脉曰蟯瘕蟯瘕為病腹太上膚黄麄循之戚戚然臣意飲以芫華一撮即出蟯可數升病已三十日如故病蟯得之於寒濕氣宛篤不發化為蟲臣意所以知薄吾病者切其脉循其尺其尺索刺麄而毛美奉髪奉一作奏又作拳是蟲氣也其色澤者中藏無邪氣及重病齊淳于司馬病臣意切其脉告曰當病迵風迵風之狀飲食下嗌輙後之如厠病得之飽食而疾走淳于司馬曰我之王家食馬肝食飽甚見酒来即走去疾驅至舍即泄數十出臣意告曰為火齊米汁飲之七八日病已所以知之者診其脉時切之盡如法其病順故不死齊中郎破石病臣意診其脉告曰肺傷不治當後十日丁亥溲血死即後十日溲血而死破石之病得之墜馬僵石上所以知破石之病者切其脉得肺隂氣其来散數道至而不一也色又乘之所以知其墜馬者切之得番隂脉入虚裏乘肺脉肺脈散故色變也乘之所以不中期死者師言曰病者安穀即過期不安穀則不及期其人嗜黍黍主肺故過期所以溲血者診脉法曰病喜養隂處者順死喜養陽處者逆死其人喜自静不躁又乆安坐伏几而寐故血下泄齊王侍醫遂病自練五石服之臣意往過之遂謂意曰不肖有病幸診遂也臣意即診之告曰公病中熱論曰中熱不溲者不可服五石石之為藥精悍公服之不得數溲亟勿服色將發臃遂曰扁鵲曰隂石以治隂病陽石以治陽病夫藥石者有隂陽水火之齊故中熱即為隂石柔齊治之中寒即為陽石剛齊治之臣意曰公所論逺矣扁鵲雖言若是然必審診起度量立規矩稱權衡合色脉合一作占表裏有餘不足順逆之法叅其人動静與息相應乃可以論論曰陽疾處内隂形應外者不加悍藥及鑱石夫悍藥入中則邪氣辟矣而宛氣愈深診法曰二隂應外一陽接内者不可以剛藥剛藥入則動陽隂病益衰陽病益著邪氣流行為重困於愈忿發為疽意告後百餘日果為疽發乳上入缺盆死此為論之大體也必有經紀拙工有一不習文理隂陽失矣齊王故謂陽虚侯時病甚齊悼惠王子也名將盧以文帝十六年為齊王衆醫皆以為蹷臣意診脉以為痺根在右脅下大如覆杯令人喘逆氣不能食臣意即以火齊粥且飲六日氣下即令更服丸藥出入六日病已病得之内診之時不能識其經觧大識其病所在臣意嘗診安陽武都里成開方開方自言以為不病臣意謂之病苦㳫風三嵗四支不能自用使人瘖一作脊瘖即死今聞其四支不能用瘖而未死也病得之數飲酒以見大風氣所以知開方病者診之其脉法奇咳言曰藏氣相反者死切之得腎反肺二反字一作及字法曰三嵗死也安陵阪里公乘項處病臣意診脉曰牡疝牡疝在鬲下上連肺病得之内臣意謂之慎毋為勞力事為勞力者則必嘔血死處後蹴踘要蹷寒汗出多即嘔血臣意復診之曰當旦日日夕死即死病得之内所以知項處病者切其脉得番陽番陽入虚裏處旦日死一番一絡者絡一作結牡疝也臣意曰他所診期决死生及所治已病衆多乆頗忘之不能盡識不敢以對問臣意所診治病病名多同而診異或死或不死何也對曰病名多相類不可知故古聖人為之脉法以起度量立規矩縣權衡按繩墨調隂陽别人之脉各名之與天地相應參合於人故乃别百病以異之有數者皆異之無數者同之然脉法不可勝騐診病人以度異之乃可别同名命病主在所居今臣意所診者皆有診籍所以别之者臣意所受師方適成師死以故表籍所診期决死生觀所失得者合脉法以故至今知之問臣意曰所期病死生或不應期何故對曰此皆飲食喜怒不節或不當飲藥或不當針炙以故不中期死也問臣意意方能知病死生論藥用所宜諸侯王大臣有嘗問臣意者不及文王病時齊文王也以文帝十五年卒不求意診治何故對曰趙王膠西王濟南王呉王皆使人来召臣意臣意不敢往文王病時臣意家貧欲為人治病誠恐吏以除拘臣意也時諸侯得自拜除吏故移名數左右不修家生出行㳺國中問善為方數者事之乆矣見事數師悉受其要事盡其方書意及解論之身居陽虚侯國因事侯侯入朝臣意從之長安以故得診安陸項處等病也問臣意知文王所以得病不起之狀臣意曰不見文王病然竊聞文王病喘頭痛目不明臣意心論之以為非病也為肥而蓄精身體不得揺骨肉不相任故喘不當醫治脉法曰年二十脉氣當趨年三十當疾歩四十當安坐年五十當安卧年六十以上氣當大董文王年未滿二十方脉氣之趨也而徐之不應天道四時後聞醫炙之即篤此論病之過也臣意論之以為神氣爭而邪氣入非年少所能復之也以故死所謂氣者當調飲食擇宴日車歩廣志以適筋骨肉血脉以㵼氣故年二十是謂易貿一作賀又作質法不當砭炙砭炙至氣逐問臣意師慶安受之聞於齊諸侯不對曰不知慶所師受慶家富善為醫不肯為人治病當以此故不聞慶又告臣意曰慎母令我子孫知若學我方也問臣意師慶何見於意而愛意欲悉教意方對曰臣意不聞師慶為方善也意所以知慶者意少時好諸方事臣意試其方皆驗精良臣意聞菑川唐里公孫光善為古傳方臣意即往謁之得見事之受方化隂陽及傳語法臣意悉受書之臣意欲盡受他精方公孫光曰吾方盡矣不為愛公所吾身已衰無所復事之是吾年少所受妙方今悉與公母以教人臣意曰得見事待公前悉得禁方幸甚意死不敢妄傳人居有間公孫光間處臣意深論方見言百世為之精也師光喜曰公必為國手吾有所善者皆疏同産處臨菑善為方吾不若其方甚竒非世之所聞也吾年中時嘗欲受其方楊中倩不肯曰若非其人也胥與公往見之胥猶言須也當知公喜方也其人亦老矣其家給富時者未往㑹慶子男殷来獻馬因師光奏馬王所意以故得與殷善光又屬意於殷曰意好數公必謹遇之其人聖儒即為書以意屬楊慶以故知慶臣意事慶謹以故愛意也問臣意曰吏民嘗有事學意方及畢盡得意不何縣里人對曰臨菑人宋邑一作黾邑學臣意教以五診嵗餘濟北王遣太醫髙期王禹一作齲學臣意教以經脉髙下及奇絡結當論俞所居及氣當上下出入邪正逆順以宜鑱石定砭炙亦處嵗餘菑川王時遣太倉馬長馮信正方臣意教以按法逆順論藥法定五味及和齊湯法髙永侯家丞杜信喜脉来學臣意教以上下經脉五診二嵗餘臨菑召里唐安来學臣意教以五診上下經脉奇嗽四時應隂陽重未成除為齊王侍醫問臣意診病决死生能全無失乎臣意對曰意治病人必先切其脉乃治之敗逆者不可治其順者乃治之心不精脉所期死生視可治時時失之臣意不能全也周仁其先任城人以醫見見於天子為太子舍人積功遷至大中大夫樓䕶字君卿齊人父世醫䕶少隨父為醫長安出入貴戚家䕶誦醫經本草方術數十萬言長者咸愛重之後為廣漢太守王莽前輝光卒後漢涪翁不知何出常漁釣於涪水因號涪翁乞食人間見有疾者時下針石輙應時而效乃著針經診脉法傳於世弟子程髙尋求積年翁乃授之髙亦隠迹不仕郭玉少師事程髙學方診六徵之技隂陽不測之術和帝時為太醫丞多有效應帝奇之仍試令嬖臣美手腕者與女子雜處帷中使玉各診一手問所疾苦玉曰左陽右隂脉有男女狀若異人臣疑其故帝歎息稱善玉仁愛不矜雖貧賤厮飬必盡其心力而醫療貴人時或不愈帝乃令貴人羸服變處一針即差召玉詰問其狀對曰醫之為言意也腠理至微隨氣用巧針石之間毫芒即乖神存於心手之際可得觧而不可言也夫貴者處尊髙以臨臣臣懐怖懾以承之其為療也有四難焉自用意而不任臣一難也將身不謹二難也骨節不强不能使藥三難也好逸惡勞四難也針有分寸時有破漏重以恐懼之心加以裁慎之志臣意且猶不盡何有於病哉此所為不愈也帝善其對黄憲父為牛醫阮炳字叔文為河南尹精意醫術撰藥方一部魏東平王翕撰觧寒食散方與皇甫謐所撰竝行於世華佗字元化沛國譙人一名旉古敷字與專相似属書者多不能别尋也字元化其名宜為敷也㳺學徐土舉孝亷太尉黄琬辟皆不就曉養性之術時人以為仙年且百嵗而貎有壯容又精方藥其療疾合湯不過數種心解分劑不復稱量煮熟便飲語其節度舍去輙愈若當灸不過一兩處每處不過七八壯病亦應除若當針亦不過一兩處下針言當引某許若至語人病者言已到應便㧞針病亦行差若病結積在内針藥所不能及當須刳割者便飲其麻沸湯須臾便如醉死無所知因破取病若在腸中便斷腸湔洗縫腸膏摩四五日差不痛人亦不自寤一月間即平復矣故甘陵相夫人有娠六月腹痛不安佗視脉曰胎已死矣使人手摸知所在在左則男在右則女人云在左於是為湯下果下男形即愈縣吏尹世苦四支煩口中渴不欲聞人聲小便不利佗曰試作熱食汗則愈不汗後三日死即作熱食不汗出佗曰藏氣已絶於内當涕泣而絶果如佗言府吏兒尋李延共止俱頭痛身熱所苦正同佗曰尋當下之延當發汗或難其異佗曰尋外實延内實故治之宜殊即各與藥明旦竝起鹽凟嚴昕與數人共候佗適至佗謂昕曰君身中佳否昕曰自如常佗曰君有急病見於面莫多飲酒坐畢歸行數里昕卒頭眩墮車人扶將還載歸家中宿死故督郵頓子獻得病已差詣佗視脉曰尚虚未得復勿為勞事御内即死臨死當吐舌數寸其妻聞其病除從百餘里来省之止宿交接中間三日發病一如佗言督郵徐毅得病佗往省之􅐧謂佗曰昨使醫曹吏劉祖針胃管訖便苦咳嗽欲卧不安佗曰刺不得胃管誤中肝也食當日減五日不救遂如佗言東陽陳叔山小男二嵗得疾下利嘗先啼日以羸困問佗佗曰其母懐軀陽氣内養乳中虚冷兒得母寒故今不得愈佗與四物女宛丸十日即除彭城夫人夜之厠蠆螫其手呻呼無賴佗令温湯近熱漬手其中卒可得寢但旁人數為易湯令煖之其旦即愈軍吏梅平得病除名還家家居廣陵未至二百里止親人舍有頃佗偶至主人許主人令佗視平佗謂平曰君早見我不至此今疾已結促去可得與家相見五日卒應時歸如佗所刻佗行道見一人病咽塞嗜食而不得下家人車載欲往就醫佗聞其呻唫駐車往視之語之曰向来道邊有賣餅家䔉虀大酢從取三升飲之病自當去即如佗言立吐蛇一枚縣車邊欲造佗佗尚未還小兒戲門前逆見自相謂曰似逢我公車邊病是也病者前入坐見佗北壁縣此蛇輩約以十數又有一郡守病佗以為其人盛怒則差乃多受其貨而不加治無何棄去留書罵之郡守果大怒令人追捉殺佗郡守子知之屬使勿逐守瞋恚既甚吐黑血數升而愈又有一士大夫不快佗云君病深當破腹取然君夀亦不過十年病不能殺君君忍病十載夀俱當盡不足故自刳裂士大夫不耐痛癢必欲除之佗遂下手所患尋差十年竟死廣陵太守陳登得病胷中煩懣面赤不食佗脉之曰府君胃中有蟲數升欲成内疽食腥物所為也即作湯三升先服一升斯須盡服之食頃吐出三升許蟲赤頭皆動半身是生魚膾也所苦便愈佗曰此病後三期當發遇良醫乃可濟救依期果發動時佗不在如言而死太祖聞而召佗佗常在左右太祖苦頭風每發心亂目眩佗針鬲隨手而差李將軍妻病甚呼佗視脉曰傷娠而胎不去將軍言聞實傷脤胎已去矣佗曰按脉胎未去也將軍以為不然佗舍去婦稍差百餘日復動更呼佗佗曰此脉故是有胎前當生兩兒一兒生出血甚多後兒不及生母不自覺旁人亦不寤不復迎遂不得生胎死其血脉不復歸必燥着母脊故使多脊痛今當與湯幷針一處此死胎必出湯針既加婦痛急如欲生者佗曰此死胎乆枯不能自出宜使人探之果得一死男手足完其色黑長可尺許佗之絶技凡類此也然本作士人以醫見業意嘗自悔後太祖親理得病篤重使佗專視佗曰此近於難濟事攻治可延嵗月佗乆逺家思歸因曰當得家書方欲暫還爾到家辭以妻病數乞期不反太祖累書呼又敇郡縣發遣佗恃能厭食事猶不上道太祖大怒使人往撿若妻信病賜小豆四十斛寛假限日若其虚詐便収送之於是傳付許獄考騐首服荀彧請曰佗術實工人命所縣宜赦宥之太祖曰不憂天下當無此鼠軰邪遂考竟佗佗臨死出一卷書與獄吏曰此可以活人吏畏法不受佗亦不强索火燒之佗死後太祖頭風未除太祖曰佗能愈此小人飬吾病欲以自重然吾不殺此子亦終當不為我斷此根原耳及後愛子倉舒病困太祖歎曰吾悔殺華佗令此兒僵死也初軍吏李成苦咳嗽晝夜不寐時吐膿血以問佗佗云君病腸臃欬之所吐非從肺来也與君兩錢散當吐二升餘膿血訖快自飬一月可小起好自將愛一年便健十八嵗當一小發服此散亦行復差若不得此藥故當死復與兩錢散成得藥去五六嵗親中人有病如成者謂成曰卿今强健我欲死何忍無急去藥案古語以藏為去也以待不祥先將貸我我差為卿從華佗更索成與之已故到譙適值佗見收怱怱不忍從求十八嵗成病竟發無藥可復以至於死人有在青龍中見山陽太守廣陵劉景宗言漢末景宗說中平日數見華佗其治病手脉之候其驗若神琅琊劉勲為河内太守有女年幾二十左脚膝裏上有瘡癢而不痛瘡愈數十日復發如此七八年迎佗使視佗曰是易治之當得稻糠黄色犬一頭好馬二疋以繩繫犬頸使走馬牽犬馬亟輙易馬走三十餘里犬不能行復令歩人拖曵計向五十里乃藥藥飲女女即安卧不知人因取大刀斷犬腹近後脚之前以所斷之處向瘡口令去二三寸停之須臾有若蛇者從瘡中而出便以鐵錐横貫蛇頭蛇在皮中動揺良乆須臾不動乃牽出長三寸所純是蛇但有眼處無瞳子又逆鱗耳以膏著瘡中七日愈又有人苦頭眩頭不得舉目不得視積年佗使悉解衣倒縣令頭去地一二寸濡布拭身體令周匝候視諸脉盡出五色佗令弟子數人以鈹刀抉脉五色血盡視赤血乃下以膏摩被覆汗且出周匝飲以亭歴大血散立愈又有婦人長病經年世謂寒熱注病者冬十一月中佗令坐石槽中平旦用寒水汲灌云當滿百始七八灌㑹戰欲死灌者懼欲止佗令滿數將至八十灌熱氣乃蒸出囂囂髙二三尺滿百灌佗乃使然火温牀厚覆良乆汗洽出著粉汗燥便愈又有人病腹中半切痛十餘日中鬚眉墮落佗曰是脾半腐可刳腹養治也使飲藥令卧破腹就視脾果半腐壊以刀斷之刮去惡肉以膏傅瘡飲之以藥百日平復佗别傳曰有人病兩脚躄不能行舉詣佗佗望見云已飽針灸服藥矣不看脉便使觧衣㸃其背數十處相去或一寸或五寸縱邪不相當言炙此各十壯炙創愈即行行後炙處夹脊一寸上下行端直均謂調如引繩矣吳普廣陵人從華佗學普依凖佗治多所全濟樊阿彭城人從華佗學阿善針術凡醫咸言背及胷藏之間不可妄針針之不過四分而阿針背入一二寸巨闗胷藏針下五六寸而病輙皆瘳吳趙泉以善醫為侍醫赤烏中為丞相顧雍疾微時孫權令泉視之拜其少子濟為騎都尉雍聞之悲曰泉善别死生吾必不起故上欲及吾目見濟拜也雍果卒册府元龜卷八百五十八
