body:
  text: 册府元龜卷五百八十九宋王欽若等撰掌禮部奏議第十七唐張說為中書令開元十一年與秘書監賀知章叅定南郊之禮奏議曰晉元帝建武二年定郊禮於建業之南去城七里一壇之上尊卑雜位千有五百神去聖日逺損益不同臣等按祠令五星已下内官五十三座中官一百六十座外官一百四座衆星三百六十座臣共所由勘史傳及星經内外所主職有尊卑舊圖座位升降頗錯今奉墨勅授尊卑升降又新加降等座總三百一十九座并衆星三百六十九座凡六百八十七座具圖如左詔遂頒於有司以為常式十三年撫州三脊茅生有上封者言曰昔齊桓公九合諸侯一匡天下将欲封禪問於夷吾夷吾對曰江淮間三脊茅生用以縮酒乃可封禪其時無茅桓公大慙而罷自厯千古今始一生昔宣王南征責楚包茅不入王祭不供則是其地生茅今髙一尺至七八月長足方堪縮酒特望聖恩至時令采用祭太山并根掘取苑内植之時宰臣已遣使於岳州採沅江茅乃奏曰管夷吾為桓公是諸侯不合封禪故稱茅拒之及伐楚之日尊周室行覇道乃責楚云包茅不入王祭不供若以茅瑞是不知經義臣等厯任荆楚博訪貢茅沅江最勝臣已牒岳州取訖今稱撫州有茅請移根入苑且貉不踰汶橘不過江移根苑中信是虚妄勅撫州日進六束與沅江相比用之帝曰可韋縚為太常少卿開元十七年四月禘享太廟九室命有司攝行禮初唐禮祫序昭穆禘各於其室縚奏曰准古禮五年再殷祭一祫一禘其義合聚昭穆定次序又孔安國王肅等先儒皆以為序昭穆唯鄭𤣥云禘各扵其室若如鄭㫖則與常享不異臣恐鄭謬扵周經請依古禮如王肅等議序列昭穆許之二十一年五月縚奏曰奉今年二月三日勅宗廟所奉尊敬之極因以名署情所未安宜令禮官詳擇可宜奏聞者謹詳經典尋令式宗廟享薦皆主奉常别置署司事非稽古其署望廢令本司専奉其事許之縚尋遷太常卿二十三年正月制以籩豆之薦或未能備物宜令禮官學士詳議具奏縚請宗廟之奠每坐籩豆各加十二又今之酌獻酒爵制度全小僅無一合執持甚難請令廣大其郊祀奠獻亦准此仍望付尚書省集衆官詳議務從折衷於是兵部侍郎張均及職方郎中韋述等建議曰謹按禮祭統曰凡天之所生地之所長茍可薦者莫不咸在水草陸海三牲八簋昆蟲之異草木之實隂陽之物備薦矣聖人知孝子之情深而物類之無限故為之節制使有常禮物有其品器有其數上自天子下至公卿貴賤差等無相踰越百代常行無易之道也又按周禮膳夫掌王之食飲膳羞食用六榖膳用六牲飲用六清羞用百有二十品珍用八物醬用百有二十罋則與祭祀之禮豐省本殊左傳曰饗以訓恭儉宴以示慈惠恭儉以行禮慈惠以布政又曰饗有體薦宴有折俎杜預曰饗有體薦爵盈而不飲豆乾而不食宴則相與共食饗之與宴猶且異文祭奠所陳固不同矣又按周禮籩人豆人各掌四籩四豆之實以供祭祀與賓客所用各殊據此數文祭奠不同常時其來久矣且人之嗜好本無慿凖宴私之饌與時遷移故聖人一切同歸於古雖平生所嗜非禮亦不薦也平生所惡是禮則不去也楚語曰屈到嗜芰有疾召宗老而囑曰祭我必以芰及卒宗老将薦芰屈建命去之曰祭典有之國君有牛享大夫有羊饋士有豚犬之奠庻人有魚炙之奠籩豆脯醢則上下安之不羞珍異不陳庻侈不以私欲干國之典遂不用此則禮外之食前賢不敢薦今欲取甘㫖之物肥濃之味随所有皆充祭用茍踰舊制其何限焉雖籩豆有加豈能備也傳曰太羮不和粢食不鑿昭其儉也書曰黍稷非馨明徳惟馨事神在於䖍誠不求厭飫三年一禘不欲黷也三獻而終禮有成也風有采蘋采蘩雅有行葦泂酌守以忠信神其舎諸若以今之珍饌平生所習求神無方何必古器簠簋可去而盤盂杯棬當在御矣韶濩可息而箜篌笛笙當在奏矣凡斯之流皆非正物或興於近代或出於蕃夷耳目之娱本無則象用之宗廟後嗣何觀欲為永式恐未可也且自漢以降諸陵皆有寢宫嵗時朔望薦以常饌此既常行亦足盡至孝之情矣宗廟正禮宜依典故率情變革人情所難又按舊制一升曰爵五升曰散禮器稱宗廟之祭貴者獻以爵賤者獻以散此明貴小賤大示之節儉又按國語觀射父曰郊禘不過繭栗蒸嘗不過把握夫神以精明臨人者也所求備物不求豐大茍失扵禮雖多何為豈可捨先王之遺法狥一時之所尚廢棄禮經以從流俗裂冠毁冕将安用之且君子愛人以禮不求茍合况在宗廟敢忘舊章請依古制庶可經久禮部員外郎楊仲昌議曰謹按禮曰夫祭不欲煩煩則黷亦不欲簡簡則怠又鄭𤣥云人生尚䙝食鬼神則不然神農時雖有黍稷猶未有酒醴及後聖作為醴酪猶存𤣥酒亦不忘古春秋曰蘋蘩蕰藻之菜潢汙行潦之水可薦於鬼神可羞於王公又曰太羹不和粢食不鑿此明君人者有國奉先敬神嚴享豈肥濃以為尚将儉約以表誠則陸海之物鮮肥之類既乖禮文之情而變作者之法皆充祭用非所詳也易曰樽酒簋貳用缶納約自牖此明祭在簡易不在繁奢所以一樽之酒貳簋之奠為明祀也抑又聞之夫義以出禮禮以體政違則有紊是稱不經薦肥濃則䙝味有登加籩爵則事非師古與其别行新制寧如謹守舊章時太子賓客崔沔户部郎中楊伯成左衛兵曹劉秩等皆建議以為請依舊禮不可改易於是宰臣等具沔述等議以奏𤣥宗曰朕承祖宗福徳至於享祀粢盛實思豐潔禮物之具諒在昭忠其非芳潔不應法制者亦不可用於是更令太常量加品味縚又奏請每室加籩豆各六每四時異品以當時新果及珍羞同薦制可之又酌獻酒爵𤣥宗令用龠升一升合於古義而多少適中自是常依行焉二十二年制曰服制之紀或有所未通宜令禮官學士詳議聞奏太常卿韋縚奏曰謹按儀禮喪服舅緦麻三月從母小功五月傳曰何以小功以名加也堂姨舅舅母恩所不及外祖父母小功五月傳曰何以小功以尊加也舅緦麻三月並是親情而服屬疎者也外祖正尊同於從母之服姨舅一等服則輕重有别堂姨舅親即未疎恩絶不相為服親舅母來承外族同爨之禮不加竊以古意猶有所未暢者也且為外祖小功此則正尊情甚親而服屬疎者也請加至大功九月姨舅親既無别服宜齊等請為舅加至小功五月堂姨舅踈降一等親舅母從服之例先無制服之文並望加至袒免臣聞禮以飾情服從義制或有沿革損益可明事體皆大理資詳審望付尚書省集衆官吏詳議務從折衷永為典則二十七年縚以開元六年秋睿宗喪畢祫享于太廟自後又相承三年一祫五年一禘各自計年不相通數至二十七年凡經五禘七祫其年夏禘訖冬又當祫乃建議曰禘祫二禮俱為殷祭祫謂合食祖廟禘謂諦序尊卑申先君逮下之慈成羣嗣奉親之孝事異常享有時行之然而祭不欲數數則黷亦不欲踈踈則怠故王者法諸天道制祀典焉烝嘗象時禘祫如閏五歳再閏天道大成宗廟法之再為殷祭者也謹按禮記王制周官宗伯鄭𤣥注觧髙堂隆所議並云國君嗣位三年喪畢祫於太廟明年禘於羣廟自禰以降五年再殷一祫一禘漢魏故事貞觀實録並用此禮又按禮緯及魯禮禘祫注云三年一祫五年一禘所謂五年而再殷祭也又按白虎通及五經通義許慎異義何休春秋賀循祭議並云三年一禘何也以為三年一閏天道小備五年再閏大備故也此則五年再殷通計其數一祫一禘迭相乗矣今廟禘祫各自數年兩岐俱下不相通計或比年頻祫或同歳再序或一禘之後併為再祫或五年之後驟有三殷法天象閏之期既違其度五歳再殷之制數又不同求之禮文頗為乖矣説者或云禘祫二禮大小不侔祭名有殊年數相去祫以三紀殺小而合禘以五斷至十而周有兹參差難為通計竊以三祫五禘之説本出禮緯五歳再殷之數同在其篇㑹通二文非相詭也盖以禘後置祫二周有半舉以全數謂之三年一閏只用三十二月也其有禘祫異稱各隨四時秋冬為祫春夏為禘祭名雖異為殷則同譬如礿祀烝嘗其體一也鄭𤣥謂祫大禘小傅咸謂祫小禘大夫肆陳之間或有増減通計之義初無異同盖象天之法相傳不失惟晉代陳舒有三年一殷之議自五年八年厯十一十四年尋其議文所引亦以象閏五年一禘又奚所施矛盾之説固難憑也夫以天之度既有指歸稽古之禮若兹昭著禘祫二祭通計明矣今請以開元二十七年己卯四月禘至辛巳年十月祫至甲申年四月又禘至丙戌年十月又祫至己丑年四月又禘至辛卯年十月又祫自此五年再殷週而復始又禘祫之説非惟一家五歳再殷之文既相師矣法天象閏之理大抵亦同而禘後置祫或近或逺盈縮之度有二法焉鄭𤣥宗髙堂則先三而後二徐邈之議則先二而後三謹按鄭氏所注先王之法約三祫五禘之文存三歳五年之序以甲年既禘丁年當祫己年又禘壬年又祫甲年又禘丁年又祫周而復始以此相承祫後去禘十有八月而近禘後去祫三十二月而遙分析不均粗於算矣假如攻乎異端置祫於秋則三十九月為前二十一月為後雖有小愈其間尚偏竊據本文皆云象閏二閏相去則平分矣兩殷之序何不等耶且又三年之言本舉全數二周有半實准三年於此置祫不違文矣何必拘滯遂隔三年乎盖千慮一失通儒之蔽也徐氏之議有異於是研覆周審最為可憑以為二禘相去為月六十中分三十置一祫焉若甲年夏禘丙年冬祫有象閏法毫釐不偏三年一祫之文既非乖越五歳再殷之制疎數又均較之諸儒義實長久今請依據以定二殷預推祭月周而復始禮部員外郎崔宗之駮下太常令更詳議今集賢學士陸善經等更加詳覈善經亦以其議為允於是縚奏曰禮有禘祫俱稱殷祭二法更用鱗次相承或云五歳稱殷一禘一祫或云三年一祫五年一禘法天象閏大趣皆以太廟禘祫計年有差考於經傳微有所乖須在四月以前禘享今指孟冬又申祫儀合食禮頻恐違先典伏以陛下能事畢舉舊物咸甄宗祏祗慎之時經訓申明之日臣等忝在持禮職思討論輒據舊文定其倫序請以今年夏禘便為殷祭之源自此之後禘祫相代五年稱殷周而復始今年冬祫准禮合停望令所司但行時享即嚴禋不黷庶合舊議從之裴耀卿為侍郎開元二十七年寧王憲將葬𤣥宗遣中使勅其子璡等務令儉約送終之物皆令衆見所司請依諸陵舊例壙内置千味食時耀卿為監䕶使奏曰尚食所料水陸等味一千餘種每色瓶盛安於藏内皆是非時𤓰果及馬牛驢犢麞鹿等肉並諸藥酒三十餘色儀注禮料皆無所慿臣據禮司所科奠祭相次事無不備典制分明天恩每申讓帝之志務令儉約禮外加數竊恐不安又非時之物馬驢犢等並野味魚雁鵝鴨之屬所用銖兩動皆宰殺盛夏胎養聖情所禁又須造作什物動餘千計求徵市井實謂煩勞千味不供禮無所闕伏望依禮减省以取折衷制從之顔真卿為御史大夫肅宗至徳二年自鳯翔還京真卿議云春秋時新宫灾魯成公三日哭今太廟為盗毁請築壇於野皇帝東向哭然後遣使竟不能從後為吏部尚書充禮儀使代宗大歴十四年七月奏言髙祖至肅宗七聖廟號尊諡文字繁多皇帝則悉有大聖之號皇后盡有順聖之名使言之者惑於今行之者異於古請髙祖己下累聖諡號􅊖取初諡為定請按舊制上諡號髙祖為文皇帝髙宗為天皇大帝中宗為孝和皇帝睿宗為聖真皇帝𤣥宗為孝明皇帝肅宗為孝宣皇帝其廟號如故仍請准漢魏國朝故事於尚書省議定奏御行之時以諡號前後文繁多不經而儒學之臣思改者久矣㑹真卿上奏皆謂必克正焉而兵部侍郎袁操不詳典故乃上言陵廟中玉册既刋勒矣不可輕改遂罷之操曽不知陵中玉册寳紀其初號後雖追尊而册文如故是年十月代宗神主将祔廟真卿以元皇帝代數已逺准禮合祧請遷於西夾室奏議曰王制天子七廟三昭三穆與太祖之廟而七又禮器云有以多為貴者天子七廟又伊尹曰七世之廟可以觀徳此經典之明證也七廟之外則去祧為壇去壇為墠故厯代儒者制迭毁之禮皆親盡宜毁伏以太宗文皇帝七代之祖髙祖神堯皇帝國朝首祚萬葉所承太祖景皇帝受命於天始封於唐元本皆在不毁之典代祖元皇帝地非開統親在七廟之外代宗皇帝升祔有日元皇帝神主禮合祧遷或議者以祖宗之名難於迭毁昔漢朝近古不敢以私滅公故前漢十二帝為祖宗者四而已至後漢漸逺經意子孫以推美為先自光武已下皆有廟號則祖宗之名莫不建也安帝以䜛害大臣廢太子無上宗之奏後自建武以來無毁者因以陵號稱恭宗至桓帝失徳尚有宗號故初平中左中郎蔡邕以和帝已下功徳無殊而有過差不應為宗餘非宗者追尊三代皆奏毁之是知祖有功宗有徳存至公之義非其人不居盖三代立禮之本也自東漢以来則此道䘮矣魏明帝自稱烈祖論者以為逆自稱祖宗故近代此名􅊖為廟號未有子孫踐祚而不祖宗先王者以此明之則不得獨據兩字而為不合祧遷之證假令傳祚百代豈可上崇百代以為孝乎請依三昭三穆之義永為通典寳應二年並祔𤣥宗肅宗則獻祖懿祖已從迭毁伏以代宗睿文孝皇帝卒哭而祔合上遷一室元皇帝代數已逺其神主准禮當祧至禘祫之時然後饗祀於是祧元皇帝於西夹室祔代宗神主焉建中元年三月真卿上言東都太廟闕木主請造以祔詔下議之初武太后於東都立髙祖太宗髙宗三廟中宗以後兩京太廟四時並享至徳亂後木主多亡缺未祔於是議者紛然而大指有三一曰必存其廟遍立羣主時享之日以他官攝行二曰建廟立主存而不祭若皇輿時廵則就饗焉三曰存其廟瘞其主駕或東幸則飾齋車奉京師羣廟之主以徃議皆不决而罷是年十一月辛酉詔曰冠婚之義人倫大經昔唐堯降嬪帝乙歸妹逮於漢氏同姓主之爰自近代禮教凌替公主郡主法度僣差姻族闕齒序之義舅姑有拜下之禮自家刑國多愧古人今縣主有行將俟嘉命俾親執棗栗以見舅姑近尊宗婦之儀降就家人之禮事資變革以抑浮華宜令禮儀使典禮官約古今儀禮詳定公主郡縣主出降覿見之儀以聞於是禮司銓定儀制請依開元禮婦見舅姑之儀又曰故事朝廷三品以上清望官定名赴婚㑹謂之觀花燭又有障車下壻及詠扇之詩非宜也請皆去之又按禮經壻執贄以相見也當於奠雁時男女相見親迎以歸然後同牢而食合卺而酳近代别設氊帳擇地而置乃元魏穹廬之制不可為准當於室中施帳以紫綾縵為之又云今俗以子卯午酉之嵗娶婦者謂之當梁不得見舅姑又吕才新定隂陽書五十三篇並無此說其俗忌諱皆禁之乃為永制王公百官率用此禮否者並使劾之又婚禮皆用誕馬在禮經無文按周禮玉人有璋諸侯以聘女禮云玉以比徳今請駙馬加以璋郡主壻加以璧以代用馬又其函書出自近代事無經據請罷勿用皆從之無何殿中少監李洞清嫁女用俗法施氊帳禮儀使舉送御史臺按之真卿尋遷太子少師依前禮儀使二年十月癸卯祫祖神主出行祫禮初寳應二年𤣥宗肅宗神主祔廟始遷憲祖懿祖神主於西夹室是時禮儀使于休烈以國䘮畢將行祫享以太祖既位當東面獻祖懿祖屬宗於太祖若同祫享即太祖不得居正位於是永閟二祖神主於西夹室至是有司亦以國䘮既畢當行祫禮於是太常博士陳京上疏言今年十月祫享太廟并合享遷廟獻祖懿祖二神主春秋之義毁廟之主陳于太祖未毁廟之主皆升合食於太祖太祖之位在西而東向其下子孫昭穆相對南北為别無毁廟遷主不享之文徴是禮也自於周室而國朝祀典嘗與周異且周以后稷配天為始封之祖而下乃立廟廟毁主遷皆在太祖之後禘祫之時無先於太廟太祖者故太祖東向之位全其尊而不疑然今年十月禘享太廟伏請據魏晋舊制為比則搆築别廟東晋以征西等四府君為别廟至禘祫之時則於太廟正太祖之位以申其尊别廟祭高皇太皇征西等四府君以叙其親伏以國家若用此則宜别為獻祖懿祖立廟禘祫祭之以重其親則太祖於太廟遂居東向以全其尊伏以徳明興聖二皇帝曩立廟至禘祫之時尚用享禮今則别廟之制便就興聖廟藏祔為宜勅下尚書省百寮集議真卿議曰議者云獻祖懿祖親逺廟遷不當祫享宜永閟於西夹室又議者云二祖宜同祫享與太祖並昭穆而空太祖東向之位又議者云二祖若同祫享即太祖之位永不得正宜奉遷二祖神主祔藏於徳明皇帝廟臣伏以三議俱未為允且禮經殘缺既無明據儒者比方義類斟酌取中則可舉而行之盖協於正也伏惟太祖景皇帝以兩命始封之功處百代不遷之廟配天崇享是極尊嚴且禘祫之時蹔居昭穆之位屈己申孝敬奉祖宗縁齒族之禮廣尊先之道此是太祖明神烝烝之本意亦所以化被天下率循孝弟也請依晋蔡謨等議至十月祫享之日奉獻祖神主居東面之位自懿祖太祖洎諸祖宗遵左昭右穆之列此有彰國家重本尚順之明義足為萬代不易之令典也又議者請奉遷二祖神主於徳明皇帝廟行祫祭之禮夫祫合也故公羊傳曰大事者何祫也若祫祭不陳於太廟而享於徳明廟斯乃分食也豈謂合食乎名實相乖深失禮意二不可行也議奏留中不下將及祫享真卿又奏請從蔡謨為定從之三年閏正月真卿上言武成王廟是中祠上元元年禮儀使杜鴻漸奏罷祭今既修葺廟宇已成伏請准月令每春秋二仲以上戊日行釋奠之禮又武成王自齊太公追封侯王名義同廟廷用樂合准諸侯之數今請軒懸從之于休烈為工部侍郎充禮儀使舊儀冬至元日百官於光順門朝賀皇后乾元元年張皇后遂行此禮休烈先奏曰據周禮有命夫命婦朝夫人主婦朝女君自明慶元年以則天為皇后始行此禮其日命婦又朝光順門朝官命婦雜處殊為失禮有詔乃停册府元龜卷五百八十九
