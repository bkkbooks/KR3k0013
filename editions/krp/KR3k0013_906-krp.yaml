body:
  text: 册府元龜卷九百六宋王欽若等撰總錄部疾疹禳厭假告疾疹夫人肖天地而生含五行之氣故陰陽不和神靈不清則百疾生焉是故洪範謂之六極墨子記其多方若繇此而去軒冕之途絶婚姻之禮終身沈廢至於短折死者此乃仲尼興斯疾之感衛疾有将殻之惡良可悲也魯季孫行父秃晉郤克眇衛孫良夫跛曹公子手僂荀偃卿也癉疽生痬於頭癉疽惡瘡病目出齊景公疥遂痁痁疾期而不瘳卜商字子夏夫子弟子哭子而喪其明衛縶不立惡疾也縶衛侯之兄冉伯牛魯人有疾孔子問之自牖執其手曰亡之命矣夫斯人也而有斯疾也斯人也而有斯疾也再言之者痛惜之甚禇師聲子衞大夫衞侯為靈臺于籍圃與諸大夫飲酒焉聲子韈而登席古者見君解韈公怒辭曰臣有疾異於人足有瘡疾若見之君将殻之殻嘔吐也左丘明魯人失明漢杜欽目偏盲茂陵杜薪與欽同姓字俱以材能稱京師故衣冠謂欽為盲杜子夏以相别欽惡以疾見詆乃為小冠髙廣財二寸由是京師更謂欽為小冠杜子夏而薪為大冠杜子夏欽優㳺不仕以夀終司馬相如口吃而善著書常有消渇病常稱疾閒居不慕官爵馮立為東海太守下溼病痺武帝聞之徙為平原太守班伯成帝時為定襄太守徵道病中風既至以侍中光祿大夫養病後漢李通素有消病自為宰相謝病不視事景丹為驃騎大將軍從光武至懷病瘧在上前瘧發帝曰聞壯士不瘧漢大将軍反瘧病耶杜篤仕為郡文學掾以目疾二十餘年不窺京師魏鍾繇有膝疾位至太傅卞蘭苦酒消渇疾位至㳺擊将軍散騎常侍丁儀字正禮沛郡人也太祖聞儀為令士雖未見欲以愛女妻之以問五官将五官将曰女人觀貎而正禮目不便誠恐愛女未必悦也以為不如與伏波子楙太祖從之尋辟儀為掾到與議論嘉其才郎曰丁掾好士也即使其兩目盲尚當與女何况但眇乎仕為右刺姦賈逵為𢎞農太守後為太祖丞相主簿逵前在𢎞農與校尉争公事不得理乃發憤生癭後所病稍大自啓欲割之太祖惜逵恐其不活教謝主簿吾聞十人割癭九人死逵猶行其意而癭愈大晉杜預患癭位至鎮南将軍王戎先有吐疾居喪増甚帝遣醫療之并賜藥物又㫁賔客位至司徒樂廣字彦輔為侍中河南尹嘗有親客乆闊不復來廣問其故答曰前在坐蒙賜酒方欲飲見盃中有蛇意甚惡之既飲而疾于時河南㕔事壁上有角漆畫作蛇廣意盃中蛇即角影也復置酒於前處謂客曰酒中復有所見不答所見如初廣乃告其所以客豁然意解沉痾頓愈裴楷有渇利疾位至中書令加侍中皇甫謐字士安因病服寒食散而性與之忤每委頓不倫常悲恚叩刄欲自殺叔母諌之而止謐嘗上疏曰乆癭篤疾軀半不任又脚偏小十有九載又服寒食藥違錯節度辛苦荼毒于今七年隆冬裸袒食冰當暑煩悶加以咳逆或若温瘧或類傷寒浮氣流腫四肢酸重於今困劣終不仕趙孟字長舒善清談其面有疵黯諸事不决皆言當問疵面也山𤣥山允皆濤之子𤣥不仕允為奉居都尉竝少尫病形甚短小而聰敏過人武帝聞而欲見之濤不敢辭以問於允允自以尫陋不肯行濤以為勝已乃表曰臣二子尫病宜絕人事不敢受詔庾衮字叔褒州郡交命皆不降志入林慮山中塗眩發倚巖而坐柱杖将起跌墜崖而卒謝安字安石本能為雒下書生詠有鼻疾故其音濁名流愛其詠而不能及或手掩鼻以斆之位至太傅王胡之字脩齡弱冠官有聲譽歴郡守侍中丹陽尹素有風眩疾發動甚數而神明不損魏詠之生而缺仕至荆州刺史殷仲堪吏部尚書師之子也父常患耳聰聞牀下蟻動謂之牛鬪病積年仲堪為晉陵太守衣不解帶執藥揮淚遂眇一目習鑿齒為桓温荆州别駕以脚疾遂廢於里巷及襄陽䧟於苻堅堅素聞其名與釋道安俱輿而至焉既見與語大悦之賜遺甚厚又以其蹇疾與諸鎮書曰昔晉氏平吳利在二陸今破漢南獲士裁一人有半爾宋何尚之為臨津令髙祖領征南将軍補府主簿從政長安以公事免還都因患勞病積年飲婦人乳乃得差謝述有心虚疾性理時或乖謬除吳郡太守以疾不之官南齊巴陵王寶義為楊州封晉安王寶義少有廢疾不堪出入故帝加除授仍以始安王遥光代之轉寶義為右将軍領兵置佐鎮石頭梁周興嗣為給事中兩手先患風疽是年又染癘疾左目盲髙祖撫其手嗟曰斯人也而有斯疾手疏治疽方以賜之其見惜如此任昉又愛其才常言曰周興嗣若無疾旬日當至御史中丞何㸃少時常患渇陳徐世譜為光祿大夫尋以疾失明謝病不朝後魏李諧為人短小六指因癭而學頥因跛而緩歩因謇而徐言人言李諧善用三短長孫子彦末年疾發舉體生瘡雖親戚兄弟以為惡疾子彦曰惡疾如此難以自明世無良醫吾其死矣嘗聞惡疾蝮虵螫之不痛試為求之當令兄弟知我乃於南山得虵以股觸之痛楚號呌俄而腫死北齊西河王仁機生而無骨不自支持李廣字宏基范陽人也文宣天保初欲以為中書郎遇疾資産屢空藥石無繼廣雅有鑒識度量宏逺坦平無私為士流所愛嵗時共贍遺之賴以自給竟以疾終唐鄧𤣥挺患消渴人因號為鄧渇封常清細痩白纇脚短而跛盧炤鄰為新都尉因染風疾去官處大白山中以服餌為事後疾轉篤徙居陽翟之具茨山著釋疾文五悲等詞頗有騷人之風甚為文事所重炤鄰既沉痼攣癈不堪其苦常與親属執别遂自投潁水而死李洧正已之從父也正巳死其子納犯宋州洧以其州歸順無何背發疽得稍平乃大具麋餅飯僧於市洧乗平肩輿自臨其場市人歡呼洧驚疽潰於背而卒贈左僕射漢張沆為翰林學士沆雖瞶疾出入金馬五六年隠帝末陽史遇害翼日沆方知之聽猶未審忽問同僚曰竊知盗殺史公其盗獲否是時恟懼之次聞者笑之禳厭天災流行歴代時有禳禬之術往册攸傳葢天因咎徵之或興以厭當而為法六祈之義所以號變而徼福五行之氣所以克勝而迭至斯乃祝祉祿而求永貞者也則有識洞幾㣲藝臻高妙明春秋之祥異辨洪範之徵符不假命龜如指諸掌若乃五材汩亂六極交作孽非自搆殃繇外興繇是稽考休嘉式昭康靖厥應如響信而有徵其或命屯數奇失徳踰矩敗類致寇蹈非速禍雖罄巫祝之修其可以救歟漢董仲舒為江都相治國以春秋災異之變推陰陽所以錯行故求雨閉諸陽縱諸陰祈止雨反是若閉南門禁舉火及開北門水灑人之類是也行之一國未嘗不得所欲勇之越巫也史失其名武帝時栢梁災勇之曰越國有火災即復大起宫室以厭勝之帝於是作建章宫度為千門萬户賈惠河陽人為河内掾邑人息夫躬以宜陵侯就國未有第宅寄居丘亭丘空也姦人以為侯家富常夜守之謂欲盗之伺其便惠往過躬教以祝盗方以桑東南指枝為七畫北斗七星其上躬夜自被髪立中庭向北斗持七招指祝盗或招或指所以求福排禍也後漢郭憲光武建武七年為光祿勲從駕南郊憲在位忽囘向東北含酒三潠執法奏為不敬詔問其故憲對曰齊國失火故以此厭之後齊果上火災與郊同日髙獲字敬公汝南新息人郡境大旱獲素善天文曉遁甲能役使鬼神太守鮑昱自往問何以致雨獲曰急罷三部督郵明府當自北出到三十里亭祠雨可致也昱從之果得大雨楊統章帝時為彭城令一州大旱統推陰陽消伏縣界䝉澤太守宗湛使統為郡求雨亦即降澍樊英字秀齊南陽魯陽人隠于壺山之陽嘗有暴風從西方起英謂學者曰成都市火甚盛因含水西向潄之乃令記其日客後從蜀來云是日大火有黒雲卒從東起須㬰大雨火遂得滅於是天下稱其術郎顗北海人順帝時公車徵使對尚書顗對曰臣竊見去年閏十月十七日己丑夜有白氣從西方天苑趨左右入玉井數日乃滅金精之變責歸上司上司大司馬也建武二十七年改為太尉韓詩外傳曰司馬主天陰陽不調星辰失度責之司馬故云責歸上司也宜以五月丙午遣太尉服干戚建井旟干楯也戚斧也西方主兵故太尉執持楯斧所以厭金氣也井南方火宿也鳥隼曰旟也以火勝金故書井星之文於旟而建之也書玉版之策引白氣之異書祝辭於玉版也於西郊責躬求愆謝咎皇天消滅妖氣葢以火勝金轉災為福也以五月丙午日火勝金也欒巴為尚書正朝大㑹巴獨後到又飲酒西南噀之有司奏巴不敬有詔問巴巴頓首謝曰臣本縣成都市失火臣故因酒為雨以滅火臣不敢不敬詔即以驛書問成都成都答言正旦大失火于時有雨從東北來火乃息雨皆酒臭趙彦琅琊人少有學術桓帝時琅邪賊勞丙與太山賊叔孫無忌攻没琅邪朝廷以宗資為討冦中郎将督州郡兵合討彦為陳孤虛之法以賊屯在莒莒有五陽之地謂城南陽南武陽開陽陽都安陽並近莒宜發五陽郡兵郡名有陽謂山陽廣陽漢陽酉陽丹陽郡之類從孤擊虚以討之資具以状上詔書遣五陽兵到彦推遁甲教以時進兵一戰破賊晉郭璞洞五行天文卜筮之術禳災轉禍通致無方王導引參已軍事導嘗令作卦璞言公有震厄可命駕西出數十里得以栢樹截㫁如身長置寝處災可消矣導從其言數日果震栢木粉碎桓彝與璞友善彝每造或值璞在婦間便入璞曰卿來它處自可徑前但不可厠上相尋爾必主客有殃彝後因醉詣璞正逄在厠掩而觀之見璞祼身披髪銜刀設醊璞見彝撫心大驚曰吾毎属卿勿來反更如是非但禍吾卿亦不免矣天實為之将以誰咎璞終嬰王敦之禍彝亦死蘇峻之難嚴卿善卜筮魏序欲東行卿筮曰君慎不可東行必遭暴害之氣而非刼也序不之信卿曰既不必停宜以禳之可索西郭外獨母家白雄狗繫着船前求索止得駮狗無白者卿曰駮者亦是然猶恨其色不純當餘小毒正及六畜軰爾無所復憂序行半路狗忽然作聲甚急如有人打之者比視已死吐黑血斗餘其夕序墅上白鵝數頭無故自死而序家無恙淳于智字叔平善厭勝之術髙平劉柔夜卧鼠囓其左手中指以問智智曰是欲殺君而不能當為君使其反死乃以朱書手横腕文後三寸作田字辟方一寸二分使露手以卧明旦有大鼠伏死手前譙人夏侯藻母病困詣智卜忽有一狐當門向之嘷藻佈愕馳見智智曰其禍甚急速君歸在狐嘷處拊心啼哭令家人驚怪大小必出一人不出哭勿止然後其禍可救也藻還如其言母亦扶病而出家人既集堂屋五間立然而崩應詹少亦多病智乃為符使詹佩之誦其文既而皆驗莫能學也上黨鮑瑗家多喪病貧苦智乃為卦卦成曰君安宅失宜故令君困君舍東北有大桑樹君徑至市入門數十歩當有一人持荆馬鞭者就買以懸此樹三年當暴得財瑗承言詣市果得馬鞭懸之三年浚井得錢數十萬銅鐵器復二十餘萬於是致贍疾者亦愈韓友字景先善京費厭勝之術龍舒長鄧林婦病積年垂死醫巫皆息意友為筮之使畫作野豬著卧處屛風上一宿覺隹於是遂差舒縣廷掾王睦病死已復魄友為筮之令以丹畫版作日月置牀頭又以豹皮馬鄣泥卧上立愈劉世則女病魅積年巫為攻禱伐空冡故城間得狸鼉數十病猶不差友筮之命作布囊依女發時張囊著牕牖間友閉户作氣若有所驅斯須之間見囊大脹如吹因决敗之女仍大發友乃更作皮囊二枚沓張之施張如前囊復脹滿因急縳囊口懸著樹二十許日漸消開視有二斤孤毛女遂差宣城邉洪以四月中旬就友卜家中安否友曰卿家有兵殃其禍甚重可伐七十束柴積於庚地至七月丁酉放火燒之咎可消也不然其凶難定洪即聚柴至日大風不敢發火後為廣陵領校遭母喪歸家其夜洪歘發狂絞殺兩子并殺婦又斫父妾二人皆被創因出亡走明日其宗族往収殯亡者尋索洪數日於宅前林中得之已自經死𤣥文河間人也宋髙祖圍慕容超其尚書令董鋭勸超出降超大怒繫之於獄於是賀賴盧公孫五樓為地道出戰王師不利𤣥文説髙祖曰昔趙攻曹嶷望氣者以為澠水帶城非可攻抜若塞五龍口城必自䧟石季龍從之而嶷請降後慕容恪之圍叚龕亦如之而龕降降後無幾又震開之今舊基猶在可塞之高祖從其言至城中男女患脚弱病者大半南齊顧歡解陰陽書為數術多效騐病邪者問歡歡曰家中有書否曰唯有孝經歡曰可取置病人枕邉恭敬之自差病者果愈人問其故答曰善禳惡正勝邪此病者所以差也梁伯人方士也武陵王紀反舉岷蜀之衆由外水而下湘東王命伯人於長州苑板上畫紀形象親下鐵釘于支體以厭之後魏王早明陰陽九宫明元時喪亂之後多相殺害有人詣早求問勝術早為設法令各無咎由是州里稱之北齊綦母懷文以道術知名東魏時髙祖與周文戰於邙山是時官軍旗幟盡赤西軍盡黒懷文言於高祖曰赤火色黒是水色水能滅火不宜以赤對黒土勝水宜改為黄髙祖遂改為黄所謂河陽幡者也斛律羡為幽州道行臺僕射兄光為祖班等誣其謀反後主詔盡滅其宗族羡未誅前忽令其在州諸子自伏䕶以下五六人鎻頸乗驢出城合家皆泣送之至閭日晚而歸吏民莫不驚異燕郡守馬嗣明毉術之士為羡所欽愛乃竊問之答曰須有禳厭數日而有此變隋蕭吉善陰陽算術房陵王時為太子言東宫多鬼鼠妖數見髙祖令吉詣東宫禳邪氣於宣慈殿設神座有㢠廻風從艮地鬼門來掃太子座吉以桃湯葦火驅之風出宫門而止又謝土於未地設壇為四門置五帝座于時至寒有蝦蟇夜從西南來入門升赤帝座還從入門而出行數尺忽然不見髙祖大異之賞賜優洽又上言太子當不安位時帝陰欲廢立得其言是之由此毎被顧問王輔賢新豐人房陵王為太子知皇后遺陽素金始有廢立之意輔賢曰白虹貫東宫門太白襲月皇太子廢退之象也以銅鐵五兵造諸厭勝又於後園之内作庶人村屋宇卑陋太子時於中寝息布衣草褥冀以當之唐劉王文静高祖武徳二年為户部尚書其家中妖恠數見弟文起憂之遂召巫者於星月之下披髪銜刀為厭勝之法其愛妾失寵以状告其兄妾兄上變故誅焉李抱真貞元中為昭義軍節度使以乆疾為巫祝所惑請降爵以禳之章奏凡七上辭甚切至徳宗難違之故自檢校司空而授僕射假告急告寕休皆假名也説者云吉曰告凶曰寕然而五日一休始於漢律一月五急著於晉令又若予賜之典所以優禮大臣取請之文所以俯從私願至乃歳時令節多遂歡娛公府餘閑頻得澣沐蔚為人澤率由舊章其有省親故留移疾當解或坐稽違之責或掇避事之尤悉著于篇以懲不恪漢石慶為丞相武帝元封四年闗東流民二百萬口無名數老四十萬公卿議欲徙流民於邉以適之帝以為慶老謹不欲與其議乃賜丞相告歸而案御史大夫以下汲黯字長儒為主爵都尉多病病且滿者三月武帝常賜告者數終不愈最後嚴助為請告馮野王成帝時為琅邪太守帝長舅大司馬大将軍王鳳顓權野王懼不自安遂病滿三月賜告與妻子歸杜陵就醫藥鳳風御史中丞劾奏野王賜告養病而私自便便安也持虎符出界歸家奉詔不敬杜欽時在将軍幕府欽素髙野王父子行能奏記於鳳為野王言曰竊見今月吏二千石告過長安謁謁者自白得告也律吏二千石以上告歸寕道不過行在者便道之官無辭不分别予賜予予告也賜賜告也今有司以為予告得歸賜告不得是一律兩科失省刑之意省减也夫三最予告令也在官連有三最則得予告也病滿三月賜告詔恩也今告詔恩不得失輕重一之差又二千石病賜告得歸有故事不得去郡亡著令律施行無不得去郡之文也傳曰賞疑從予所以廣恩勸功也疑當賞不當賞則與之疑厚薄則從厚罰疑從去所以慎刑闕難知也疑當罰不當罰則赦之疑輕重則從輕今釋令與故事而假不敬之法也釋廢棄也假謂假託法律而致其罪也甚違闕疑從去之意即以二千石守千里之地任兵馬之重不宜去郡将以制刑為後法者則野王之罪在未制令前也刑賞大信不可不慎鳳不聼竟免野王郡國二千石病賜告不得歸家自此始後漢許荆字子張㑹稽人家貧為吏無有船車休假常單歩荷擔上下清節稱於鄉里魏李豐齊王芳時為侍中尚書僕射豐在臺省常多託疾時臺制疾滿百日當觧祿豐病未滿數十日輙暫起以復卧如是數嵗王思正始中為大司農年老目暗又少信時有吏父病篤近在外舍自白求假思疑其不實發怒曰世有思婦病母者豈此謂乎遂不與假吏父明日死思無恨意晉王尼音夷字孝孫城陽人也初為䕶軍府軍士胡毋輔之與琅邪王澄北地傅暢中山劉興頴川荀䆳河東裴遐等持羊酒詣軍門吏疏名呈䕶軍䕶軍曰諸名士持羊酒來将有以也尼時以給府養馬輔之等入尼遂坐馬廐下與炙羊飲酒醉飽而去竟不見䕶軍䕶軍大驚即與尼長假因免為兵宋王惔之文帝時為祕書郎父敬宏為㑹稽郡守惔之曽請假還家未定省敬宏尅日見之至輙不果見假日将盡惔之乞求奉辭敬宏呼前至閣復不見謝靈運為侍中自以名軰應參時政王曇首王華等名位素不踰之竝見任遇意不平多稱疾不朝直出郭遊行或一百六七十里經旬不歸既不表聞又不請急文帝不欲傷大臣諷㫖令自解靈運表陳病賜假東歸庾炳之為吏部尚書居選部請急還家尚書令史來諮事一人善彈一人工歌畱與宿有司舉違制奏焉唐張重光為華州刺史代宗大厯三年以病抗疏乞還京師醫療許之乃遣中使如其第問疾嚴綬為檢校司徒兼太子少傅穆宗長慶二年四月御史臺奏綬疾假滿百日合停勑嚴綬年位俱高須加優異仍依舊秩未愽舉停郭鏦為右金吾衛将軍長慶二年六月疾假滿百日帝以仲舅許未停官崔從為太子賔客分司東都文宗太和四年三月甲申畱守崔宏禮奏從請假一百日准式停官梁盧格為侍御史太祖乾化二年御史臺奏格先請患假滿一百日准例合停從之後唐盧導為右司郎中知雜事明宗天成二年八月假滿百日奉勑停官安重誨為樞密使天成四年奏堂兄應州副使晟卒請准式假有司給假一十五日勑㫖重誨位重禁庭日親機務與羣官之有異在常式以難拘宜自初聞日共給七日李遘為司天少監長興二年二月戊戌御史臺奏遘請假滿十旬准前例合停官從之王昭誨為司農少卿長興二年七月乙巳御史臺奏昭誨自寒食請假歸鎮州灑掃已滿百日准例停官勑㫖王昭誨方念繼絶特授殊恩乆别丘園許歸祭奠雖違假限宜示優宏不停見任册府元龜卷九百六
