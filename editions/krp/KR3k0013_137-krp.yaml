body:
  text: 册府元龜卷一百三十七宋王欽若等撰帝王部旌表王者甄明髙義顯異至行所以激揚風化敦率人倫也蓋天下至大士民至衆不可家喻而户曉故顯其忠所以勵事君也褒其孝所以勸事親也尊賢者所以聳善也表烈士所以興義也或授之爵秩或禄其子孫或旌其門閭或賜以榖帛以至復其征賦申以祠祀皆因事以立教奨一而勸百故能述宣王度丕變薄俗民徳歸厚有耻且格蓋上之行化速於置郵下之從風易如偃草繇斯道矣周武王既克商釋箕子之囚封比干之墓表商容之閭惠王二十一年齊㑹諸侯伐楚許穆公卒於師葬之以侯禮凡諸侯薨於朝㑹加一等死王事加二等於是有以衮歛漢髙帝五年既平項羽齊王田横廼與其客二人乘傳詣雒陽至尸鄉自剄令二客奉其頭馳奏之髙帝曰嗟乎有以起布衣兄弟三人更王臣欽若等曰三人謂儋榮及横豈非賢哉為之流涕而拜其二客為都尉發卒二千以王者禮葬横十二年十二月詔曰秦皇帝楚隠王陳勝魏安釐王昭王之子齊愍王宣王之子趙悼㐮王孝威王之子皆絶亡後其與秦始皇帝守塜二十家楚魏齊各十家趙及魏公子無忌各五家無忌即信陵君也令視其冡復無與他事初帝微少時數聞魏公子無忌賢及即天子位毎過大梁嘗祠公子至是擊黥布還為公子置守冡五家世世歳以四時奉祠公子成帝時為霍光置守冡百家吏卒奉祠焉平帝元始二年詔曰漢興以來股肱在位身行儉約輕財重義未有若公孫𢎞者也位在宰相封侯而為布被脱粟之飰奉禄以給故人賔客無有所餘可謂減於制度禮貴有嘗尊衣服有品而率下篤俗者也與内富厚而外為詭服以釣虛譽者殊科夫表徳章義所以率世勵俗聖王之制也其賜𢎞後子孫之次見為適者爵闗内侯食邑三百户後漢光武時來歙攻公孫述為刺客所中自書表訖投筆抽刀而絶帝聞大驚省書覧涕乃賜策曰中郎將來歙攻戰連年平定羗隴憂國忘家忠孝彰著遭命遇害嗚呼哀哉使太中大夫贈歙中郎將征羗侯印綬諡曰節侯謁者䕶䘮事還雒陽乘輿縞素臨弔送葬以歙有平羗隴之功故改汝南之當鄉縣為征羗國焉常少張隆初事公孫述少隆皆勸述降述不從並以憂死及述既㓕帝下詔贈少為太常隆為光禄勲以禮改葬之其忠節志義之士並蒙旌顯劉茂太原人為郡門下掾建武二年赤眉二十餘萬衆攻郡縣殺長吏及府掾史茂負太守孫福踰牆藏空宂中得免其暮俱奔孟縣晝則逃隠夜求粮食積百餘日賊去乃得歸府明年詔書求天下義士福言茂曰臣前為赤眉所攻吏民懐亂奔走趣山臣為賊所圍命如絲髪頼茂負臣踰城出保孟縣茂與弟觸冐兵刅縁山負食臣及妻子得度死命節義尤髙宜蒙表擢以勵義士詔書即徴茂拜議郎譙𤣥巴郡閬中人也能説易春秋公孫述遣使者備禮徴之若不起便賜以毒藥𤣥受毒藥其子瑛泣血叩頭於太守奉錢十萬以贖父死述許之𤣥遂隠藏田野終述之世建武十一年卒明年天下平定𤣥弟慶以狀詣闕自陳帝美之䇿詔本郡祠以中牢勑所在還𤣥家錢李業廣漢梓潼人也公孫述聞業賢徴之業固疾不起述羞不致之乃使大鴻臚尹融持毒酒刼業業遂飲毒而死蜀平帝詔曰表其閭益部載其髙節圖畫形像温序為䕶羗校尉隗囂别將苟宇所拘伏劒而死主簿韓遵從事王忠持其屍歸歛帝聞而憐之命忠送䘮歸雒陽賜城傍為冡地賜榖千斛縑五百疋除三子為郎中李善淯陽人本同縣李元蒼頭也元死唯孤兒續始生數旬貲財千萬諸奴婢欲殺續而分其財善不能制乃負續逃亡瑕丘界中十餘嵗與歸本縣脩理舊業時鍾離意為瑕丘令上書薦善行狀帝詔拜善及續並為太子舍人明帝永平二年十一月遣使者以中牢祠蕭何霍光帝謁陵園過式其墓姜詩廣漢人事母至孝母好飲江水嗜魚膾夫婦力作供膳舍側忽有涌泉味如江水毎旦輙出䨇鯉甞以供母膳永平三年察孝亷帝詔曰大孝入朝凡諸舉者一聼平之繇是皆拜郎中章帝建初七年西廵狩幸長安以中牢祠蕭何霍光元和二年東廵狩至沛使使祠故六安郡丞桓譚冡鄉里以為榮和帝永元二年十一月有事於十陵遣使者以中牢祠蕭何曹参蕭何墓見上註曹参墓在長陵旁道北安帝永初二年劉雄為平原令劇賊平豪等入平原界雄將吏士乗船追之至厭次河與賊合戰雄敗執雄以矛刺之時小吏所輔前叩頭求哀願以身代雄豪等縱雄而刺輔貫心洞背而死東郡太守捕得豪等具以狀上詔書追傷之賜錢二十萬除父奉為郎中元初中鮮卑數百餘騎冦漁陽太守張顯率吏士追出塞遥望虜營煙火急趣之兵馬掾嚴授慮有伏兵苦諫止不聼鮮賊入進授不獲已前戰伏兵發授身被十創歿於陣顯㧞刅追散兵不能制虜射中顯主簿衛福功曹徐咸遽赴之顯遂堕馬福以身擁蔽虜并殺之朝廷愍授等節詔書褒歎厚加賞賜各除子一人為郎中延光三年幸長安以中牢祠蕭何曹参霍光桓帝延熹三年武陵蠻冦江陵荆州刺史劉度謁者馬睦南郡太守李肅並奔走肅主簿胡爽扣馬諫止肅遂殺爽而走帝聞之徴肅棄市度睦减死一等復爽門閭拜家一人為郎中王渙為雒陽令以平正居身得寛猛之宜元興元年病卒民思其徳為立祠安陽亭延熹八年特詔宻縣存故太傅卓茂廟雒陽留王渙祠焉靈帝中平中陳實子紀字元方遭父憂毎哀至輙嘔血絶氣雖衰服已除而積毁消瘠殆將㓕性豫州刺史嘉其至行表上尚書圖象百城以勵風俗袁秘汝南汝陽人也為郡門下議生黄巾起秘從太守趙謙擊之軍敗秘與功曹封觀主簿陳端門下督范仲禮賊曹劉禕徳主記史丁子嗣記室史張仲然等七人㧞刅突陣與戰並死謙以得免詔復秘等門閭號曰七賢獻帝初即位遣使弔祠故太傅陳蕃大將軍竇武又贈射聲校尉沮儁為𢎞農太守旌死節也王允為司徒為李傕郭汜所害後帝遷都於許思允忠節使改殯葬之遣虎賁中郎將奉䇿弔祭賜東園秘器贈以本官印綬送還本郡封其孫黒為安樂亭侯食邑三百户元尚為兖州刺史袁術將僣號欲以尚為太尉尚拒之建安初逃還為術所害其後尚䘮與太傅馬日磾䘮俱至京師帝嘉尚忠烈為之咨嗟詔百官弔祭拜子瑋郎中而日磾不與焉魏太祖北征桞城過涿郡令告太守曰故北中郎將盧植名著海内學為儒宗士之楷模國之楨幹也昔武王入殷封商容之閭鄭䘮子産而仲尼隕涕孤到此州嘉其餘風春秋之義賢者之後有異於人敬遣丞掾脩墳墓并致薄醊以彰厥徳植仕漢為尚書以老疾去官隠居上谷軍都山獻帝初平三年卒衛兹字公振陳留㐮邑人也少有大節不應三公之辟太祖初至陳留兹曰平天下者必此人也太祖亦異之數詣兹議大事從討董卓戰於滎陽而卒太祖每涉郡境輙遣使祠焉應余為南陽郡功曹宛將侯音刼射太守東里衮余以身捍衮前被七創而死及征南將軍曹仁討平音表余行狀並脩祭醊太祖聞之嗟嘆良久下荆州復表門閭賜榖千斛文帝行幸自譙過梁遣使以太牢祀漢太尉橋𤣥黄初初大理王朗與太尉鍾繇連名表上主簿趙郡張登昔為本縣主簿值黒山賊圍郡登與縣長王雋帥吏兵七十二人直徃赴救與賊交戰吏兵散雋殆見害登手格二賊以全雋命又守長夏逸為督郵所枉登身受考掠理逸之罪義濟二君宜加顯異兼稱登在職勤勞詔曰登忠義彰著在職功勤名位雖卑直亮宜顯饔膳近任當得此吏今以登為太官令朗太祖初已曽表聞太祖以所急者多未遑奨擢至是復表之乃有此命明帝青龍中東征乗輦入故豫州刺史賈逵祠詔曰昨過項見賈逵碑像念之愴然古人有言患名之不立不患年之不長逵存有忠勲沒而見思可謂死而不朽者矣其布告天下以勸將來齊王嘉平中呉將諸葛恪圍於合肥新城時城中遣士劉整及鄭像出城傳消息皆為所執皆守節不囬為其所害後毋丘儉上言因下詔曰夫顯爵所以褒元功重賞所以寵烈士整像召募通使越䧟重圍冐突白刅輕身守信不幸見獲抗節彌厲揚六軍之大勢安城守之懼心臨難不顧畢志傳命昔觧揚執楚有隕無貳齊路中大夫以死成命方之整像所不能加今追賜整像爵闗中侯各除士名使子襲爵如部曲將死事科髙貴鄉公甘露二年四月詔曰𤣥莬郡髙顯縣吏民反叛長鄭熈為賊所殺民王簡負擔熈䘮晨夜星行逺致本州忠節可嘉其特拜簡為忠義都尉以旌殊行七月車駕東征屯項復入賈逵祠下詔曰逵沒有遺愛歴世見祠追聞風烈朕甚嘉之昔先帝東征亦幸於此親發徳音褒揚逵美徘徊之心益有慨然夫禮賢之義或掃其墳墓或脩其門閭所以崇敬也其掃除祠堂有穿漏者補治之八月詔曰昔燕刺王謀反韓宜等諌而死漢朝顯登其子諸葛誕創造凶亂主簿宣隆部曲督秦絜秉節守義臨難固争為誕所殺所謂無比干之親而受其戮者其以隆絜子為騎都尉加以贈賜光示逺近以殊忠義三年六月丙子詔曰昔南陽郡山賊擾攘欲刼質故太守東里衮功曹應余獨身捍衮遂免於難余顛沛隕斃殺身濟君其下司徒署余孫倫吏使蒙仗節之報晉武帝詔曰蜀將軍傅僉前在閱城身拒官軍致命不顧僉父彤復為劉備戰亡天下之善一也豈繇彼此以為異僉息著蔓後沒入官免為庶人㤗始四年以東海劉儉有至行拜為郎中五年詔諸葛亮孫京隨才署吏李宻字令伯犍為人也父早亡母更適人宻見飬於祖母蜀平後帝徴為太子洗馬宻上䟽曰臣生孩六月慈父見背行年四嵗舅奪母志祖母劉愍臣孤弱躬見撫飬臣無祖母無以至今日祖母無臣無以終餘年母孫二人更相為命是以區區不敢廢逺臣今年四十有四祖母劉今年九十有六是臣盡節於陛下之日長報飬劉之日短也烏鳥私情願乞終飬臣之辛苦非徒蜀之人士及二州牧伯所見明知皇天后土實所共鍳願陛下矜愍愚誠聼臣微志庶劉僥倖保卒餘年臣生當隕首死當結草臣不勝犬馬怖懼之情帝覧表曰宻不空有名也嘉其誠欵賜奴婢二人下郡縣供飬其祖母惠帝永康元年詔以光禄大夫劉頌誅賈謐督攝衆事有功追封梁鄒縣侯食邑千五百户索靖太安末為㳺擊將軍領雍秦凉義兵與賊戰被傷而卒追贈太常後贈司空追封安樂亭侯諡曰荘周處義興陽羡人也為御史中丞征氐人齊萬年力戰而沒帝追贈平西將軍賜錢百萬葬地一頃京城地五十畆為第又賜其家近田五頃詔曰處母年老加以逺人朕每愍念給其醫藥酒米賜以終年劉殷新興人也性至孝曽祖母王氏盛冬思堇而不言食不飽者一旬矣殷時年九嵗乃於澤中哭不絶聲者半月董為生焉太傅楊駿輔政備禮聘殷殷以母老固辭駿於是表之優詔遂其髙志聼終色飬勅所在供其衣食蠲其徭賦賜帛二百疋榖五百斛元帝為左丞相承制以嵇紹死節事重而贈禮未副勲徳表贈太尉祠以太牢及即位賜諡曰忠穆復加太牢之祀虞悝長沙人也與弟望並有士操譙王承之討王敦以悝為長史望為司馬督諸軍湘東太守鄭澹敦之姊夫也不順承㫖遣望討之望率一旅直入郡斬澹以狥四境及魏乂來攻望毎先登力戰而死城破悝復為乂所執將害之子弟對之號泣悝謂曰人生有死闔門為忠義鬼亦何恨哉及王敦平贈悝㐮陽太守望滎陽太守遣謁者至墓祭以少牢許孜東陽呉寧人也惠帝元康中郡察孝亷不起巾褐終身年八十餘卒於家邑人號其居為孝順里咸康中太守張虞上䟽曰臣聞聖賢明訓存乎舉善褒貶所興不逺千載謹案所領呉寧縣物故人許孜至性孝友立節清峻與物恭譲言行不貳當其奉師則在三之義盡及其䘮親實古今之所難咸稱殊類致感猛獸弭害雖臣不及見然備聞斯語竊謂蔡順董黯無以過之孜沒積年其子尚在性行純慤今亦家於墓側臣以為孜之履操世所希逮宜標其令跡甄其後嗣以疇既徃以奨方來春秋傳曰善善及其子孫臣不逹大體請䑓量議䟽奏詔旌表門閭蠲復子孫卞壺為尚書令右將軍蘓峻稱兵壺苦戰死之二子昣旰見父沒相隨赴賊同時見害昣子誕嗣咸康六年成帝追思壺下詔曰壺立朝忠恪䘮身兇冦所封懸逺租秩薄少妻息不贍以為慨然可給實口廪其後盗發壺墓尸僵鬂髪蒼白面如生兩手悉拳爪甲穿逹手背安帝詔給錢十萬以脩塋兆虞潭母孫氏呉郡富春人呉大帝族孫女也永嘉末潭為南康太守值杜弢搆逆率衆討之孫氏勉潭以必死之義傾其資産以餽戰士潭遂克㨗及蘓峻作亂潭時守呉興又假節征峻孫氏戒之曰吾聞忠臣出孝子之門汝當捨生取義勿以吾老為累仍盡發其家僮令隨潭助戰貿其所服環珮以為軍資于時會稽内史王舒遣子允之為督䕶孫氏又謂潭曰王府君遣兒征汝何為獨否潭即以子楚為督䕶與允之合勢其憂國之誠如是拜為武昌侯太夫人加金章紫綬潭立飬堂於家王導以下皆就拜謁咸和末卒年九十五成帝遣使弔祭諡曰定夫人張茂妻陸氏呉郡人也茂為呉郡太守被沈充所害陸氏傾家産率茂部曲為先登以討之充敗陸詣闕上書為茂謝不尅之責詔曰茂夫妻忠誠舉門義烈宜追贈茂太僕穆宗升平中慕容恪侵逼山陵時冠軍將軍陳祐守雒陽衆不過二千時有沈勁者少負志節自表求配祐効力因以勁補冠軍長史令自募壮士得千餘人以助祐擊賊頻以寡制衆而粮盡援絶祐懼不能保全㑹賊冦許昌祐因以救許昌為名興寕三年留勁以五百人守城祐率衆而東㑹許昌已沒祐因奔崖塢勁志欲効命欣獲死所尋為恪所攻城䧟被執神氣自若恪竒而將宥之其中軍將軍慕容䖍曰勁雖竒士觀其志度終不為人用今若赦之必為後患遂遇害恪還從容言於慕容暐曰前平廣固不能濟辟閭今定雒陽而殺沈勁實有愧於四海朝廷聞而嘉之賜東陽太守子赤黔為大長秋毛寳為征虜將軍豫州刺史州陵縣開國侯守邾城石季龍遣將攻邾城城䧟寳率左右突圍出赴江溺死穆帝詔曰寳之傾敗宜在貶裁然蘓峻之難致力王室今咎其過故不加贈祭之可也其後公卿言寳有重勲加死王事不宜奪爵昇平三年乃下詔復本封孝武太元中功臣普被減削司空何充等止得六家守冡以故司空興平伯陸玩有佐命之勲先陪陵而葬繇是特置興平伯官屬以衛墓又詔曰褒徳顯仁哲王令典故左尉忠穆公嵇紹也執徳髙邈在否彌宣貞㓗之風義著千載毎念其事愴然傷懐忠貞之裔烝嘗宜逺所以大明至節崇奨名教可訪其宗裔襲爵主祀丁穆為順陽太守苻堅兵至為其所執至長安稱疾不仕偽朝堅又傾國南冦穆與闗中人士唱義謀襲長安事泄遇害臨死作表以付其妻周其後周得至京師詣闕上之帝下詔曰故順陽太守貞定侯丁穆力屈身䧟而誠節彌固直亮壮勁義貫古烈其䘮柩始反言尋傷悼可贈龍驤將軍雍州刺史賻賜一依周虓故事為置屋宅并給其妻衣食以終厥身周虓為西夷校尉領梓潼太守䧟於苻堅不屈節而死其子興迎致其䘮冠軍將軍謝𤣥親臨哭之因上䟽曰臣聞旌善表功崇義明節以振揚聲教垂羙來葉故西夷校尉梓潼太守周虓執心忠烈勵節冦庭遂嬰禍荒裔痛㝠泉壌臣每悲其志以為蘇武之賢不復過也前宣告并州訪虓䘮并索其家負荷數千始得來至即以資送還其舊隴伏願聖朝追其忠心表其殊節使負霜之志不墜於地則榮慰存亡惠被幽顯矣帝詔曰虓厲志貞亮無愧古烈未及㧞身奄隕厥命甄表義節國之典也贈龍驤將軍益州刺史賻錢二千萬布百疋又贍賜其家謝琰隆安四年討孫恩兵敗琰帳下督張猛於後斫琰馬琰遂遇害後左里之㨗宋髙祖令擒猛送琰小子混混刳肝生食之詔以琰父子殞於君親忠孝萃於一門贈琰侍中司空諡曰忠肅二子肇峻肇歴驃騎參軍峻以琰勲封建昌侯及沒於賊詔贈肇散騎常侍峻散騎侍郎安帝義熈初檀慿之與桓𤣥將皇甫敷戰死賜冀州刺史詔曰夫旌善紀功有國之通典沒而不朽節義之篤行故冀州刺史檀憑之忠烈果毅亡身為國既義敦其情故臨危授命考諸徃迹古人無以逺過近者之贈意猶恨焉可加贈散騎常侍本官如故既隕身王事亦宜追論封賞可封曲阿縣公邑三千户孫季髙義熈中討盧循於番禺循走交州季髙病卒贈龍驤將軍宋髙祖為南海太守念季髙之功乃表曰孫季髙嶺南之勲已蒙褒贈臣更思惟盧循稔憣也惡一紀據有全城若令根本未㧞投奔有所招合餘燼猶能為虞懸師逺討方勤廟筭而季髙汎海萬里投命洪流波激電邁指日遄至遂奄定南海覆其巢窟使循進退靡依輕舟逺遁曽不句月妖凶殱殄蕩滌之功實此為大徃年所贈猶為未優愚謂宜更贈一州即其本號庶令忠勲不湮勞臣増厲重贈交州刺史將軍如故何無忌義熈二年遷都督江荆二州進鎮南將軍征盧循兵敗握節死之詔曰無忌秉哲履正忠亮明允亡身殉國則契協英謨經綸屯昧則重氛載廓及敷政方夏實播風惠妖冦搆亂侵擾邦畿投袂致討志清王畧而事出慮外臨危彌厲握節隕難誠貫古賢朕用傷慟於厥懐其贈侍中司空本官如故諡曰忠肅毛􅟛為征西將軍督益梁秦寧凉五州軍事譙從之亂􅟛遇害及􅟛弟瑾瑗子姪之在蜀者一時殄沒􅟛子𢎞之嗣義熈中時延祖為始康太守上䟽訟􅟛兄弟於是詔曰故益州刺史􅟛西夷校尉瑾蜀太守瑗勤王忠烈事乖慮外葬送日近益懐惻愴可皆贈先所授官給錢三十萬布三百疋論􅟛討桓𤣥功追封歸鄉公千五百户又以祐之斬𤣥功封夷道縣侯後魏道武平中原贈李勰宣威將軍蘭陵太守勰恬静好學有聲趙魏間至是已亡帝哀惜之故有是命王憲字顯則北海劇人祖猛苻堅丞相父休河東太守憲㓜孤隨伯父永在潁苻丕稱尊號復以永為丞相永為慕容永所殺憲奔清河匿於民家皇始中輿駕次趙郡之髙邑憲乃歸誠帝見之曰此王猛孫也厚禮待之以為本州中正領選曹事兼掌門下太武討赫連經庾岳墓宅愴然動容遂下詔為立廟令一州之民四時致祭岳先事道武為將有謀畧名冠軍中道武猜忌誅之段進為白道守將蠕蠕大檀入塞圍之力屈被執進抗聲大罵遂為賊所殺帝愍之追贈安北將軍賜爵顯羙侯諡曰荘石文徳中山蒲隂人也有行義真君初縣令黄宣在任䘮亡宣單貧無朞親文徳祖父苖以家財殯葬持服三年奉飬宣妻二十餘載及亡又衰經歛附率禮無闕自苖逮文徳刺史守令卒官者制服送之五世同居門庭雍睦又梁州上言天水白石縣人趙令安孟蘭疆等四世同居行著州里詔並標榜門閭獻文末常農北陜人王𤣥威立草廬於州城門外衰服𬞞粥哭踴無時刺史苟頽以事表聞詔令問狀云先帝澤被蒼生𤣥威不勝悲慕戀心如此不知禮式詔問𤣥威欲有所訴聼為表列𤣥威云聞諱悲號竊謂臣子同例無所求謁及至百日乃自竭家財設四百人齋至忌日又設百僧供至大除日詔送白紬袴褶一具與𤣥威釋服下州令表異焉孝文帝初都雒陽嘗幸北邙遂幸洪池命任城王澄侍昇龍舟因賦詩以序懐帝曰朕昨夜夣一老公頭鬂皓白正理冠服拜立路左朕怪而問之自云晉侍中嵇紹故此奉迎神爽卑懼似有求焉澄對曰晉世之亂嵇紹以身衛主殞命御側亦是晉之忠臣比干遭紂兇虐忠諌剖心可謂殷之良士二人俱死於王事墳塋並在於道周然陛下徙御瀍雒經殷墟而弔比干至雒陽而遺嵇紹當是希恩而感夣帝曰朕何徳能幽感逹士也然實思追禮先賢樹揚忠懿比干嵇紹皆是古之誠烈而朕務濃比干禮畧嵇紹情亦有愧然既有此夣或如任城所言於是求其兆域遣使弔祭焉郭祚從帝出征及還正授黄門車駕幸長安行經渭橋過郭淮廟問祚曰是卿祖宗所承也祚曰是臣七世伯祖帝曰先賢後哲頓在一門祚對曰昔臣先人以通儒英博惟事魏文㣲臣虛薄遭奉明聖自惟幸甚因勅以太牢祭淮廟令祚自撰祭文宣武景明三年九月車駕幸鄴詔使者弔殷比干墓董吐渾東郡小黄縣人也吐渾飬兄事親至孝三世同居閨門有禮景明中畿内大使王凝奏請標異詔從之正始元年六月立周公旦夷齊廟於首陽山李伯貴宣武時為郡守有孝行居父䘮哀戚過禮遂以毁卒帝嘉之賜渤海相王續生滎陽京縣人也遭繼母憂居䘮杖而後起及終禮制鬂髪盡落有司奏聞帝詔標旌門閭甄其徭役劉侯仁豫州人也永平元年城人白早生殺刺史司馬悦據城南叛悦息朏走投侯仁賊雖加購募又嚴其捶撻侯仁終無漏泄朏遂免禍事寧有司奏其操行議免府籍叙一小縣詔可李謐延昌四年卒其年四門十學博士孔璠等四十五人上書論其行業帝詔曰謐屢辭徵辟志守冲素儒隠之操深可嘉羙可逺傍惠康近准𤣥晏諡謐曰貞静處士并表其門閭以旌髙節於是表其門曰文徳里曰孝義髙道悦為太子中庶子太子訽以道悦數規諌殺之髙祖甚加悲惜諡曰貞侯至帝又追録拜其子給事中秦榮先性至孝遭父母䘮哀慕不已遂以毁卒邑里化其孝行帝嘉之乃下詔曰孝為政本徳乃化先既表天經又明地義居䘮致疚至感過人窮號不反迄乎㓕性行標當世理鏡幽明此而不顯道將何述可贈滄州刺史以旌厥異晁清遼東人也祖暉濟州刺史潁川公清襲祖爵例降為伯為梁城戍將梁武攻圍粮盡城䧟清抗節不屈為賊所殺帝褒羙贈樂陵太守諡曰忠孝明正光三年太保崔光奏劉昞著業凉城遺文在兹篇籍之羙頗足觀採如或愆舋當蒙數世之宥况乃維祖逮孫相去未逺而令久淪皂𨽻不獲收異儒學之士所為竊嘆臣忝職史教曽以奏聞乞勅尚書簡准所屬甄免雜役用廣聖朝旌善繼絶敦化厲俗詔曰昞徳冠前世蔚為儒宗太保啟陳深合勸善其孫等三家特可聼免河西人以為榮髙諒正光中為驍騎將軍徐州行䑓屬元法僧反叛逼諒同之諒不許為法僧所害時年四十一朝廷痛惜之贈左將軍滄州刺史馮景正光中為蕭寳寅闗西大行䑓都令從寳寅征討寳寅將舉兵景固諌不從寳寅敗後景還雒朝廷先聞景有諌言故免之除奉車都尉貞孝女宗者趙郡栢仁人趙郡太守李叔裔之女范陽盧元禮之妻率性至孝聞於州里父卒號慟㡬絶者數四頼母崔氏慰免之得全三年之中形骸銷瘠非人扶不起及歸夫氏與母分隔便飲食日損涕泣不絶日就羸篤盧氏令家人慰喻不觧乃遣歸寜還家乃復如故如此者八九焉後元禮卒李追亡撫存禮無違者事姑以孝謹著母崔以神龜元年終於雒陽凶問初到舉聲慟絶一宿乃蘇水漿不入口者六日其姑慮其不濟親為奔䘮而氣力危殆自范陽向雒八日方逹攀櫬號踊遂卒有司以状聞詔曰孔子稱毁不㓕性蓋為其廢飬絶類也李既非嫡子而孝不勝哀雖乖俯就而志勵義逺若不加旌異則無以勸引澆浮可追號曰貞孝女宗易其里為孝徳里標李盧二門以惇風俗王榮世陽平舘陶人也為三城戍主方城縣子梁武攻圍力窮知不可全乃先焚府庫後殺妻妾及梁軍䧟城與戍副鄧元興等俱以不屈被害帝下詔褒羙忠節進世爵為伯贈齊州刺史元興開國子贈雒州刺史荘帝建義初以鄭仲明兄洪建李冲女壻仲明舅氏之親其弟與謀扶戴仲明之死也且有奉國之意乃追封安平縣開國侯邑七百户贈侍中車騎大將軍儀同三司尚書左僕射雍州刺史永安初彭城石縣人孫道登初為梁武將韋休等所虜面縳臨刅廵逺村塢令其招降鄉曲道登厲聲唱呼但當努力賊所不能遂屠戮之荆州被圍行䑓宗靈恩遣使宗女等四人入城曉喻為賊將所獲執女等廵城令其改辭女等大言天軍垂至堅守莫降賊忿各刳其腹然後斬首二州表其節義道登等並賜五品郡五等子爵聼子弟承襲遣使詣所在弔祭廢帝時刁思遵妻魯氏女也始笄為思遵所聘未踰月而思遵亡其家矜其少寡許嫁已定魯聞之自誓父母不逹其志遂經郡訴稱刁民恡䕶寡女不使歸寜魯乃與老姑徒歩詣司徒府自告情状普㤗初有司聞奏帝詔曰貞夫節婦古今同尚可令本司依式標牓册府元龜卷一百三十七
