正員官者亦進改亡官失爵放歸不齒者量加收叙流人放還僧尼道士移𨽻者罪人已亡歿家口未許歸者一切放歸如自情願住者勿拗令歸如先有勅去縱逢恩赦不在放還之限者及别勅安置者並宜放還其安置之人五品已上待進止左降官及流人亡歿百官者各還本官今日已前㾗累禁錮及反逆縁坐一切並與洗滌應縁山陵制度及䘮儀禮物博詢可否務遵禮度必誠必信副朕𠂻懐橋道置頓並以内庫錢充諸有費用先給功價仍以見錢更不折物不得輒令科配天下百姓應欠貞元二年二月三十日已前𣙜酒及兩税錢物諸色逋懸一物已上一切放免京畿諸縣應今年秋夏青苖錢並宜放免天下諸州府應須夫役車牛驢馬脚價之類並以兩税錢自備不得别有科配仍並依兩税元勅處分仍永為常式不得擅有諸色𣙜税常貢外不得别進錢物金銀器皿竒紋異錦雕文刻鏤之類若已發在路者並納在藏庫清浄者理國之本恭儉者修己之端朕臨御萬邦方𢎞此道苟可濟物予何愛焉宫掖之中宜先省約其後宫弟子音聲人等並宜放歸親族應縁宫市並出正文帖仍依時價買賣不得侵擾百姓所縁官中要妳母並取食糧户充税不得科配寺觀諸軍先擒吐蕃生口配在諸處者宜資給放還本國天下官吏應行鞭捶本罪不致死者假以責情致令殞斃每念於此良増惻然宜切加察訪内外文武見任及致仕官并諸道將士等賜爵加階賜勲有差二王三恪褒聖侯各與一子官大長公主嗣王等各與一官及出身有差宗子中有才用者委宗正卿以名聞量才叙用皇王等已上親賜爵加階有差陪位者年十五已上並放出身武徳已來配饗功臣及張廵許逺南霽雲顔杲卿顔真卿等子孫中各與一人正員官故尚父子儀贈太師晟太尉秀實子孫中各與一人正員五品官及諸州府長官及京常叅官父見在未有官者並與五品致仕官及階父歿母存者與邑號父母亡歿量與追贈陜州元從寶應功臣興元元從奉天定難功臣賜爵勲冇差亡歿者與追贈中書門下節度使東都留守度支鹽鐡等使京兆尹觀察招討等使及神䇿神威金吾六軍将軍大将軍英武威逺鎮國軍使隴右經畧軍使節度留後各與一子官有差其神䇿神威六軍将軍大将軍英武軍等使並與加官神䇿神威六軍英武威逺營左右金吾及皇城将士及縁御樓立仗将士等賜物及爵階有差應東宫官及侍讀侍書教授在正月二十六日已前者有國已來職掌行事及冊命官授顧命撰制詔及修冊文并寫制詔官等賜爵加階勲進改有差蕃客等共賜物一千八百七十疋義武軍節度使下官健在城立仗共賜物三千八百四十五疋立仗将士等量加改轉内侍省及内防官正諸道進奏院及奏事官賜爵階勲有差内外五品已上文官及臺省常叅官宜至四考滿與改轉中外逓遷量才叙用其中政績尤異須甄升者不在此限常叅官及諸州刺史有先得替及假百日經䘮去官未授官者並即與進擬百司及在城諸使息利本錢徴放多年積成深弊内外官料錢職田等厚薄不均兩稅及諸色𣙜税物重轉須有損益並宜委中書門下與逐司商量具利害條件以聞不得擅有閉糴禁錢務令通濟諸色人中有才識兼茂明於體用者經術精深可為師法者逹於吏理可使從政者宜委常叅官各舉所知其在外者長吏宜精加訪擇具以名聞仍優禮發遣朕當詢事考言審其才實如無人論薦者即任自詣闕應内外官及諸色人任上封事極言時政得失有可觀者别當甄奨百姓九十已上版授及賜各有差仍令官吏就家存問順孫孝子義夫節婦旌表門閭重加優恤四月戊申詔曰惟先格王光有天下必正邦本以立人極建儲貳以承宗祧所以啟廸大猷安固洪業斯前代之令典也皇太子純體仁秉哲恭敬温文徳叶元良禮當上嗣朕奉若丕訓憲章古式永惟社稷之重載考春秋之義授之匕鬯以奉粢盛爰以令辰俾膺茂典今冊禮云畢慶感交懐思與萬方同其恵澤自貞元二十一年二月二十四日已後至四月九日昧爽已前天下應犯死罪者特降從流流罪已下各減一等文武官常叅官及諸州府長官子為父後者賜勲兩轉古之所以教太子必茂選師友以輔翼之俾法於訓詞而行其典禮右左前後罔非正人是以教諭而成徳也給事中陸贄中書舎人崔樞積學懿文守經據古以叅講習庶叶於中可充皇太子侍讀天下孝子順孫先旌表門閭者委所管州縣各加存恤五嶽四瀆名山大川委所在長吏量加祭禮永貞元年八月辛丑傳位於皇太子帝稱太上皇居興慶宫下詔曰有天下者傳歸於子前王之制也欽若大典斯為至公式揭耿光用體文徳朕獲奉宗廟臨御萬邦降疾不瘳庶政多闕乃命元子代予守邦爰以令辰光膺冊禮以今月九日冊皇帝於宣政殿乃命檢校司徒平章事杜佑充冊使門下侍郎平章事杜黄裳為副使國有大命恩俾惟新宜因紀元之慶用覃在宥之澤宜改貞元二十一年為永貞元年八月五日昧爽已前天下應犯死罪特降從流流罪已下各降一等憲宗元和元年正月丁卯御含元殿受朝賀禮畢御丹鳳樓大赦天下制曰朕聞明王之以孝理也必先之以博愛臨之以荘敬繇一人之至徳鼓四表之懽心臻於太和以育庶類則下知禁而無犯上措刑而勿用斯道不逺𢎞之在予朕以寡昧嗣守丕業荷累聖之鴻休禀太上之嚴訓夙夜寅畏不敢荒寧承顔而退省萬機問寝而下臨四海䖍奉帷眷施於兆人皇王以來孰有斯慶端本之化自予躬行總百行之源刑四方之理推恩以覆育廣敬以昭事王者要道朕其庶乎則日月之燭照可以率俾昆蚑之涵養期於不夭是必家至日見而後化洽刑清圖始所難慎終斯勉猶恐下愚之人因循陥辟官師之長教道未明廹於飢寒遂愆禮節詿誤之網顧失政而多途哀矜之人雖得情而勿喜思與公卿大夫下及士庶人勵翼循省以圖将来其因體元之始覃此惟新之澤上報於君父下念於蒼生頒慶紀年鴻恩斯洽可大赦天下改永貞二年為元和元年自元和元年正月二日昧爽已前大辟罪已下常赦所不原者咸赦除之京畿諸縣今年青苖錢及𣙜酒錢並宜放免地稅率於每年㪷量放二升江淮荆襄等十州管内水旱所損四十七州減放米六十萬石秋税錢六十萬貫内外文武見任在官神䇿六軍諸道将士等各賜爵加勲自武徳已來功臣子孫與官及出身文武常叅官觀察節度團練經畧使刺史六軍大将等父母亡歿與封賜至徳以來任宰輔與追贈及諡陜州奉天元從功臣普恩之外更賜勲爵中書門下及外使宰相宜與一子七品官東都留守六軍大将等與一子出身東宫官並與改官其撰冊文官等與一子官及勲爵有差天下百姓髙年者賜米帛羊酒國子監祭酒司業及學官並先取朝廷有徳望學識者充東都國子監諸舘共置學生百員應天下州府每年所稅地子數内宜十分取二均充常平倉仍各逐當處穏便收貯以時價糶糴務在救人九月西川劉闢平十月詔曰西川諸州鎮刺史大将軍及叅官佐吏将健百姓等應被脅從補職掌一切不問二年正月辛卯有事於南郊還御丹鳳樓大赦天下制曰朕聞王者大孝業莫盛於配天國之大事禮莫尊乎享帝故二儀合祭知上天所子之仁萬國駿奔觀聖人嚴父之道教之所設禮極於斯我國家宗武祖文繼天撫運聲名所被車書必同承祧而御極業光十聖體元而紀號年将二百朕以㣲𦕈纉奉昌圖畏此洪業若臨深谷而大事所屬仙寝維營凶徳相挺兩隅皆阻淮湖奥壤水旱愆期惄然疚懐懼不克濟既而上天降祐烈祖垂休妖氛盡珍逆節咸伏精祲有以相盪善惡有以相資五兵纔試而復藏四氣應序而咸理物皆滋茂嵗亦豐登百姓之心懽然相與是用齋精三日欵謁上𤣥明發不寐祗見烈祖周旋在位陟降是依克配之禮既展如在之誠増慕嘉此福祐與物惟新式敷顒若之化俾洽霈然之澤可大赦天下罪無輕重常赦不原者咸赦除之左降官與量移及復資仍聴累叙流移配𨽻並放還天下應有逋欠在百姓腹内者及京畿今年夏青苖錢並放免官酤酒及新𣙜率並同禁斷淮南江南去年已来水旱疾疫其稅租節級蠲放天下兩稅貞元四年制書已令三年一定委有司舉舊勅商量處置諸道年終勾宜停刺史録事叅軍並不得擅離州其事類已後制勅速令有司刪定江淮大縣每嵗據闕委三省御史臺諸司長官節度觀察使各舉堪任縣令不限選數並許赴集臺省官及刺史赤令有闕先於縣令中揀擇如有能否與元舉人同賞罰復置具員簿以序内外庶官禁郵驛假託乘券京兆府諸司色役人各令條疏簡省天下官吏應行鞭棰責情至死切令察放王府六品已下官及諸州縣有獄并省處及諸官諸使有要停減者委有司商量廢省天下百姓不得冒為僧尼道士以避徭役其創造寺觀廣興土木者舉勅處分内外文武見任及致仕官諸軍将士等以品秩節級賜勲爵文宣王及二王三恪公主諸與一子官仍賜物有差宗子中有才用者委中書門下量才叙用故尚父子儀太師晟太尉秀實顔真卿顔杲卿張廵許逺南霽雲及配饗功臣與一子官及出身有差至徳已來功臣未配饗者速令詳定文武常叅官及諸道節度觀蔡使等并諸軍使並與父母封及追贈并一子官及出身有差諸軍身仗及在本營節級賜物應縁大禮職事官並賜階爵天下諸色人中有賢良方正能直言極諫博通墳典逹於教化軍謀宏逺堪任将帥詳明政術可以理人委内外官各舉所知當親䇿試天下百姓髙年者贈米帛羊酒物及版授官封名山大川及古聖帝明王忠臣烈士各令以禮致祭三年正月癸巳御宣政殿受徽號曰睿聖文武皇帝冊禮畢移仗御丹鳳樓大赦天下自今已後應諸道有除官赴闕受代至京不得取本道錢妄稱進奉四年十月庚寅冊皇太子癸巳制曰朕丕承寶圖撫有方夏夙夜寅畏不敢荒寧永惟祖宗之洪業厯考皇王之令典思所以垂統立極事神保乂推明至公安固大本尊廟祧而主匕鬯嚴社稷而奉粢盛俾開春闈乃命元子斯古今之通誼也皇太子寧清明體仁荘敬好禮挺忠孝之節一君親之誠允諧詢謀用建儲貳爰以吉日冊於明庭鍾皷載和文物大備盛禮云畢慶感良深是宜布澤施恩自中逹外厥有前躅舉而行之自元和四年十月八日昧爽已前天下應犯死罪殺人者降從流流罪已下逓減一等左降官未經量移者與量移文武常叅官及諸州府長官子為父後者賜勲兩轉應縁冊禮行事官賜階及勲爵有差鄧王府官量與改進夫輔翼元良教諭成徳使目睹正事耳聞正言刑於施為漸於心術非齋荘忠慤之士不在兹選工部侍郎歸登給事中吕元膺並踐履端方行義修潔通於經訓而得其要逹於教化而蹈其中侍講承華師範磐石訪乃公義副予精求並可充皇太子諸王侍讀登宜加一階元膺宜賜紫金魚袋天下孝子順孫先旌表門閭者委所管州縣各加存恤五嶽四瀆名山大川委所在長吏量加祭祀七年十月庚戌制曰王者司牧黎元紹膺統緒必建儲貳以稱家邦故春秋垂冢祀之文易象著震方之位朕屬承景運嗣守丕圖稽前王之令謨奉烈聖之彝訓上以嚴宗祧之顧下以繫億兆之心無疆之休用崇主鬯祗荷成懿敢怠於懐皇太子忠孝温文率義繇禮寛粹荘重自誠而明慶靈所積姿器夙茂能辨南陽之牘允符東海之貴承華載序所感則深永為固本為慶滋大宜𢎞欽恤之令亦覃命賜之恩與衆共之無思不被自元和七年十月十七日昧爽已前天下應犯死罪殺人者遞減一等左降官流人並與量移如因流貶所亡歿及得罪之人并任歸葬文武常叅官及諸州府長官子為父後者賜勲兩轉應縁冊皇太子行事官加階賜勲爵有差文武常叅官及陪位官并宗子諸親賜勲一轉遂至王府量與進改天下孝子順孫先旌表門閭者及髙年廢疾者委所管州縣各加存恤五嶽四瀆名山大川委所在長吏量加祭祀布告遐邇咸使知聞十三年正月乙酉朔帝御含元殿受朝賀禮畢御丹鳳樓大赦天下詔曰朕聞王者法天作則與衆守邦奉公無私居兆人上當恭已嚮方之際切臨深馭朽之懐憂勤靡遑今古何逺所重者兵革不試軌度自貞熙仁扇和以至大道朕顧惟菲徳祗奉睿圖承昊天之眷命纉烈聖之丕緒昃食以求至理虛心而候昌言兢兢業業常懼失墜逮今十有四年矣道且希於廣運意常在於包荒推誠則深感物未至頃嵗蜀川浙右怙亂阻兵人神共誅剪滅相次姑務偃革期於措刑方蕭灼以懲姦庶干羽以成化而淮蔡㓂孽稔禍挺災問罪興師盖非獲已每念征行之暴露軫餽給之煩勞中宵惕然載益祗勵妖兇既殄黎庶用康斯皆宗社垂休中外恊力将勤恤於下土兾昭荅於上𤣥兹朕所以思與羣公卿士勵精於庶政也屬獻嵗發春授時惟敬勾萌盡逹幽蟄咸蘇黴纆可矜鰥恤存念俾踈網之是决與慶澤之惟新可大赦天下元和十三年正月十日昧爽已前大辟罪已下咸赦除之惟官典犯贓不在此限左降官及流人移𨽻等並與量移近處别勅因責降授正員官所司亦與處分其淮西管内縱有迹同惡逆掛渉流言事在徃時一切不問如聞申光蔡汝四州百姓干戈之後餓殍為病宜委所在長吏設法綏理先入擒吴元濟立功将先委韓𢎞條疏宜速具功勞等第聞奏待有甄奨處分天下諸州府百姓兩稅之外輒不得更有差率已頻申勅尚恐因循宜委御史加糾察其諸道州府縣用兵已来或慮有權置職名及擅加科配事非永制者一切禁斷淮西側近應縁資給軍用𣙜稅經奏請者各委條疏停省王承宗若束身赴闕捨而不問仍加官爵其度支元和二年已前諸道借假及懸欠錢物斛㪷雜物當四百八十餘萬貫石端疋枚具斤兩等並放鹽鐡户部諸監院應有欠負亦疏理減放二王三恪及文宣公各賜物五十疋神䇿六軍威逺金吾及皇城等縁御樓立仗将士等及在城蕃客各賜物有差故尚父子儀贈太尉秀實杲卿真卿張廵許逺南霽雲與一子官出身有差中書門下及文武常叅官諸道節度觀察神䇿諸軍等使祖父母節級與贈封官存者量與致仕及邑號天下百姓髙年賜米帛羊酒有差十四年七月己丑御宣政殿羣臣冊上尊號禮畢御丹鳳樓大赦天下制曰朕聞惟人戴后因事必極於推尊惟辟奉天有善必歸於讓徳式敷景福以答𤣥功居有勞謙之思進多滿假之懼緬自逺古何嘗不因是而致理焉朕獲纉睿圖祗奉神器上奉大祭下安羣生恭己臨軒兢懐馭朽志欲周於四海而念常切於一夫旰食宵興惟恐失墜運屬休泰時丁小康方隅廓清氛祲銷盪斯乃上荷乾坤之垂祐宗社之降靈下頼卿士之叶心戎臣之宣力端拱嚮道推誠任能豈予寡昧用集丕績况至化猶鬱勤憂未寧而中外諸臣文武多士累陳懇疏並進昌言願獻鴻名以増虛美拒衆心而率籲轉切顧𦕈身而内愧靡安乃選吉辰爰受典冊禋告於清廟䖍聞於昊天當兹盛儀夕惕増勵於戲朕自御極再加景號在徽章而孔備諒浮實而多慚宜因行慶之辰誕布惟新之澤與時咸遂永孚於休可大赦天下自元和十四年七月十二日昧爽已前大辟罪已下咸赦除之唯故殺人及官典犯贓不在此限左降官量移如復資者即任便赴選亡官失爵放歸不齒者量加收叙前資見任官如因瑕累未階録用并左降官事情可恕才行足稱者並宜簡㧞奨用淄青舊管内官人将士百姓等縱有跡同惡逆掛渉流言事在當時一切不問京畿今年秋稅青苖及𣙜酒錢每貫量放四百文從元和五年至十年已前諸縣百姓欠負錢物斛㪷等委京兆府疏理減放淮南浙江東道宣歙江南西道湖南福建山南東道荆南等道今年秋稅錢合上供者每貫量與減放度支鹽鐡户部應有逋懸並委本司疏理具可放數奏聞比来州縣多不定户貧富變易遂成不均前後頻有制勅長吏不盡遵守今宜三年一定必使均平内外文武見任及致仕官三品已上賜爵一級四品已下加一階仍賜勲兩轉神䇿六軍金吾皇城威逺諸道将士經淮西淄青兩度立功者更賜勲兩轉二王三恪及文宣公神䇿六軍金吾皇城威逺等諸軍應在城内蕃客並節級賜物侍中韓𢎞讀冊官崔羣讀寶官皇甫鏄並各加一階已至三品者賜爵二級撰册文官崔羣與一子正員官其餘應職行掌事官加階賜爵勲有差故尚父子儀贈太師晟贈太尉秀實及張廵許逺南霽雲顔真卿杲卿子孫各與官及出身寶應與元功臣各賜勲爵天下諸色人有賢良方正能直言極諫博通墳典逹於教化軍謀宏逺堪任将帥詳明政術可以理人者委内外官各舉所知當親自策試委中書門下選黜陟使分廵天下百姓髙年者頒賜有差册府元龜卷八十九
