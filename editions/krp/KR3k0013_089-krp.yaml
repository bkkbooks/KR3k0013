  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_089-1a}
body:
  text: 冊府元龜卷八十九宋王欽若等撰帝王部赦宥第八唐徳宗以大厯十四年五月癸亥即位六月己亥朔御丹鳳樓大赦天下自大厯十四年六月一日已前罪無輕重常赦不原者咸赦除之寶應元年以後㾗累禁錮及反逆縁坐等一切洗滌内外文武官三品已上賜爵一級四品已下加階致仕官同見任天下百姓為户者賜古爵一級内外将相及方面連帥尚父子儀李正已李寶臣李忠臣朱泚崔祜甫崔寧李勉李叔明張獻恭梁崇義張延賞段秀實陳少㳺田悅張伯儀朱㴞李抱真李希烈馬燧崔昭薛邕李道昌李國清吴仲孫李昌䕫李固清李元忠郭昕孟皥馬崇福李芄康澤姚明敭杜佑及李忠誠嚴郢趙惠伯并劉晏侯希逸顔真卿路嗣恭王駕鶴等其正已為司徒兼太子太保寶臣為司空兼太子太傅崔寧李勉各以本官同平章事餘並加官及勲封等其乘輿服御量加減省務敦素質天下進獻事縁郊祀陵廟所須依前勿闕餘並樽節歸於省約士庶自艱難已来田宅踰制車服奢侈仰所司詳前後格式明立法度王公百官既處崇班宜知亷慎如省坊市之内置邸鋪鬻與人争利並禁斷仍委御史臺及京兆尹糾察諸州府祥瑞珍禽異獸鷹犬之類竒器異服錦繡珠玊等並不得輒有進獻諸軍州有與戎狄接境各守邉疆勿更掩襲無備仍即差使臣宣諭共崇和好諸州刺史上佐自今已後準式入計叔祖潁王已下叔彭王已下弟蜀王已下大長公主長公主各與一子京官郡縣主嗣王郡王各與一子出身二王三恪襃聖侯各與一子官在城諸軍将士各賜縑帛武徳已来宰臣功臣名迹崇髙并至徳已来将相功效明著已亡歿者量加贈諡子孫沉翳者量與官諸州刺史及常叅官父見在未有官者量與五品致仕官及階父母歿與贈官及邑號天下諸使及州府有須改革處置事一切先申尚書省委僕射已下衆官商量聞奏外使及州府不得輒自奏請或律令格式條目有未折𠂻者委中書門下簡擇理識通明官共刪定自至徳已来制勅或因人奏請或臨事頒行差互不同使人疑惑中書門下與刪定官詳决取堪久長行用者編入條格三司使準式以御史中丞中書舎人給事中各一人為之每日於朝堂受詞推勘處分憲官諫官常叅官每政事錯綜仰面折廷争無有所隱憲司彈奏一依貞觀故事其知匭使先有明勅非不丁寧猶聞壅遏自今已後仰每日諸匭務招逺方達聰明目諸司各舉厥職共守至公天下有才業尤著髙蹈丘園及直言極諫之士所在具以名聞其諸色人中有孝弟力田經學優深文詞清麗軍謀宏逺武藝殊倫者亦具以名聞能詣闕自陳者亦聴仍限今年十二月内到朕當親試自今已後更不得令置寺觀及請度人存問耆老恤孤弱不能自存者建中元年正月辛未有事於南郊還御丹鳳樓大赦天下自正月五日已前大辟已下罪咸赦除之内外文武官賜爵及階勲諸道宜分遣黜陟使觀風俗問疾苦自艱難已来徴賦名目繁雜委黜陟使與諸道觀察使刺史作年支兩稅徴納比来新舊徴科色目一切停罷兩稅外輒别率一錢四等官準擅興賦以枉法論其軍府支計等數準大厯十四年八月七日勅處分九廟子孫非五等新任用始封王廕不限年代東宫官宜擇端厚之士皇太子時幸大學行齒胄之禮諫議大夫孔述睿宜充太子侍讀公卿諸儒議定五經博士其常叅官及節度觀察防禦軍使都知兵馬使刺史少尹赤縣及大理司置評事授訖三日内於四方館上表讓一人自代其外官與長吏附中書門下每官闕以舉多者授之王府六品已下官及諸州縣有可併省及諸官要罷減者量事廢省天下子為父後者賜勲兩轉興元元年正月癸酉朔帝在奉天行宫受朝賀畢大赦天下制曰致理興化必在推誠忘已濟人不吝改過朕嗣服丕搆君臨萬邦失守宗祧越在草莽不念率徳誠莫追於既徃永言思咎期有復於将来明徴其義以示天下小子懼徳不嗣罔敢怠荒然以長於深宫之中暗於經國之務積習易溺居安忘危不知稼穡之艱難不恤征伐之勞苦澤靡下究情未上通事既壅隔人懐疑阻猶未省已遂與興戎徴師四方轉餉千里賦車籍馬逺近騷然行齎居送衆庶勞止或一日屢交鋒刃或連年不解甲胄祀奠乏主室家靡依死生流離怨氣凝結力役不息田萊多荒暴令峻於誅求疲甿空於杼軸轉死溝壑離去鄉閭邑里丘墟人烟斷絶天譴於上而朕不寤人怨於下而朕不知遂致亂階變行都邑賊臣乘釁肆逆㴞天曽莫知愧敢行凌偪萬品失序九廟震驚上累於祖宗下負於蒸庶痛心靦貌罪實在予永言愧悚若墜淵谷賴天地降祐神祗叶謀将相竭誠爪牙宣力羣盗斯屏皇維載張将𢎞永圖必布新令朕晨興夕惕惟念前非乃者公卿百寮用加虛美以聖神文武之號被蒙闇寡昧之躬固辭不獲俯遂羣議昨因内省良所瞿然體隂陽不測之謂神與天地合徳之謂聖豈伊淺劣所敢當仁文者所以化成武者所以定亂朕自臨御於六載化之不被亂用是興豈可苟狥羣情猥當徽號重予不徳益用懐慙自今已後中外所上書奏不得更言聖神文武之號今上元統厯獻嵗發祥宜革紀年之號式敷在宥之澤與人更始以荅天休可大赦天下改建中五年為興元元年自正月一日昧爽已前大辟罪已下咸赦除之李希烈田悅王武俊李納等有以忠勞任膺将相有以勲舊繼守藩維朕撫馭乖方誠信未著致使疑懼不自保安失於懐柔黷此威武皆由上失其道而下罹其災朕實不君人則何罪屈己𢎞物予無愛焉庶懐引慝之誠以洽好生之徳其希烈武俊田悅李納并所管将吏等一切並與洗滌復其爵位待之如初仍即遣使分道宣諭朱㴞雖縁朱泚連坐路逺必不同謀朕念其舊勲務在𢎞貸如能效順亦與惟新朱泚大為不道棄義絶恩反易天常盗竊名器暴犯陵寝所不忍言獲罪祖宗朕不敢赦其應被朱泚脅從将吏百姓等或遭扇誘或廹兇威苟能自新理可矜宥但官軍未到京城已前去逆效順并散歸本軍者并從赦例原免左降官及已經量移并與量移近處流人配𨽻及罰鎮効力並安置及得罪人家口未許歸者一切放還先有㾗累禁錮反逆縁坐承前恩赦不該者並宜洗雪亡官失爵放歸勿齒量加收叙未復資者更與進叙諸色降黜配𨽻人中有才能者特加録用諸軍諸道應赴奉天并進收京城将士並賜名奉天定難功臣身有過犯逓減罪三等子孫有犯減罪二等諸道将士在行營並超三等改官仍各賜勲五轉在本鎮者依資與改官各賜勲三轉内外文武官三品已上賜爵一級四品已下者加一階仍並賜勲兩轉應囚流貶身死未葬並許其家各據本官以禮改葬其所加墊陌錢税間架竹木柴漆𣙜鐡之類悉宜停罷其奉天升為赤縣仍給復五年在縣城内者給復十年天下有隱居行義晦迹丘園委長吏具名聞奏當備禮邀致諸色人中有賢良方正能直言極諫并博通墳典逹於教化識洞韜畧堪任将帥者委常叅官及長吏奏聞諸道貢獻自非供宗廟軍國之用一切並停赦書既下人心大悦七月辛卯御丹鳳樓大赦天下詔曰國家百七十載八聖儲慶敷祐下人視之如傷懼夭天理未嘗不既富而教既教而懲有泣辜宥過之恵無作威逞欲之事俾爾萬姓嗣續汔今俾予一人纂承及此朕恭膺顧命獲主大寶懵於理亂之本溺於因習之安上下否隔賞罰乖舛執法以濟衆而犯令愈甚興戎以除害而長亂益繁中心浩然罔知攸濟姑務騁力曽㣲省躬殫財以竭人畧内以勤逺中外耗蠧遐邇震騷賊臣蓄奸承釁竊發九廟乏祀兆人靡依猰㺄肆其吞噬豺狼擾於宫闕去嵗云半再罹播遷茫茫中原罔有定極烈士殞命暴骸於草野黔首遭難轉死於溝壑朕實獲戾人其何辜悼心慙顔泣血思咎敢憚霣越以幸於厥躬誠懼重辱祖宗益縱兇醜忍耻誓志庶復㓂讐賴昊穹降威式沮亂命将帥戮力恭行天誅士庶宅心不忘先徳賜予寡昧再受多祜紐乾綱於既紊復天柱於将傾言旋鎬京不改舊物宗祧以序朝享有期明發不寐彌増感惕嗚呼君者所以撫人也君苟失位人将安仰朕受天明命臨御萬方違道任情致冦興禍生靈無告受制兇威苟全性命急何能擇或虧廢名節或貪冒貨利陥於法紀事匪一端究本原情諒非獲巳不能撫之以道而又繩之以刑豈朕恤人罪己之誠含垢布和之義滌清汚俗與物更新可大赦天下自興元元年七月二十日昧爽已前大辟罪已下咸赦除之今年五月已前左降官與量移内外文武及致仕官三品已上賜爵一級四品已下加一階仍並賜勲兩轉司徒兼中書令晟與一子五品正員京官侍中瑊與一子六品正員京官駱元光尚可孤韓逰環戴休顔各與一子七品正員官諸道節度使及行在都知兵馬使都虞侯扈從左右金吾六軍大将軍各與一子八品正員官都團練使觀察使各與一子官收京城将士超八資改轉已甄叙者更與超二資扈從及收京城将士及常叅官祖父母在先無官封量授致仕官及邑號已亡者與追贈扈從将士三品已上賜爵兩級四品已下各加兩階賜勲三轉諸州刺史普恩之外賜爵一級四品已下加一階賜太尉秀實天授貞烈激其頺風蒼黄之中密藴雄斷将紓國難詭收㓂兵撓其兇謀果集吾事挺身徑進奪擊渠魁英名凛然振邁千古宜差官致祭并旌表門閭縁葬所要一切官給及於墓所官為立碑以揚徽烈諸軍将士有身死王事委本使具名銜聞奏即與褒贈京兆府百姓普恩之外給復一年貞元元年正月丁酉朔御含元殿受朝賀禮畢大赦天下以興元二年為貞元元年李懐光束身歸順以其嘗有大勲官封如舊諸道進討淮西罪止希烈脅從皆原自今特敕正月十一日昧爽已前大辟罪已下咸赦除之左降官量移近處流人及罰鎮効力並即放還應有㾗玷禁錮前後恩赦節文未該及者並宜洗雪李希烈僣逆不道誠所難容朕憫念蒼生務息征討頻有詔命許其自新若能歸降依前勅待之以不死内外文武見任及致仕官三品已上賜爵一級四品已下加一階白身人賜勲三轉應奉天興元元年扈從立功并收京城将士食封者各隨文武與一子官餘並加兩階仍賜勲三轉其文武百僚應從到興元府者五品已上賜勲三轉其五品已下賜爵一級六品已下加一階合入三品五品者不拘考限聴叙其中五品已上父母未經追贈者並與追贈司徒兼中書令晟宜與一子五品正員官副元帥各與一子五品正員官都統與一子六品正員官中書門下平章事充節度使及神䇿兵馬使六軍統軍金吾六軍大将軍判度支侍郎各與一子八品正員官都團練防禦觀察使京兆河南尹金吾六軍将軍殿前射生兵馬使各與一子九品正員官故尚父子儀先朝元勲再復京邑贈太尉秀實以死衞國節冠古今各宜與子孫一人五品正員官江淮轉運使檢校尚書左僕射平章事韓滉勵精勤職夙夜在公漕輓資儲千里相繼可進國公闗畿之内連嵗興戎荐屬天災稼穡不稔榖麥翻貴蒸黎困窮倉廪空虛莫之賑贍每一興念惻然痛心宜令度支取江西湖南見運到襄州米一十五萬石設法搬赴上都以救荒饉大長公主長公主各與一子七品官嗣王郡王各與一子出身應陪位皇親三品已上賜爵一級四品五品加一階六品已下及常選官等簡選日優與處分應縁大禮職掌行事及留守副留守内行事中官等三品已上各賜爵一級四品已下加一階人竝賜勲兩轉介公酅公各與一子官如無子孫賜物一百疋及神䇿六軍殿前射生英武威武威逺皇城左右金吾街使等諸軍諸使将士御樓立仗及守本仗者併諸道節度下随使赴上都帖仗将士等宜共賜物十三萬段仍賜勲兩轉四年正月庚戌朔御丹鳳樓制曰朕以菲薄託於王公之上恭承天