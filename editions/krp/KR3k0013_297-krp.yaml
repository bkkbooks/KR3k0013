body:
  text: 册府元龜卷二百九十七宋王欽若等撰宗室部譴讓傳曰門内之治恩掩義門外之治義斷恩葢先王之道不以私害公也周漢而降宗枝茂盛封建既廣性習不同乃有背既睦之教蓄不咸之性忽麟趾之義忘磐石之訓恣其驕盈弗率典訓以至奉藩無狀事親不謹暱愛近習衒惑邪説或專用非辟或濳懷異圖雖復舉八議之典蒙三宥之惠煩一尺之詔屈廷尉之請猶或長惡不悛罔顧顛覆以致遷削土宇陷於不義悲夫漢淮南厲王長文帝之弟文帝時薄太后及太子諸大臣皆憚厲王厲王以此歸國益恣不用漢法出入警蹕稱制自作法令數上書不遜順數音所角反文帝重自切責之重難也時帝舅薄昭為將軍尊重帝令昭予厲王書諫數之曰數音所具切竊聞大王剛直而勇慈惠而厚貞信多斷是天以聖人之資奉大王也甚盛不可不察今大王所仃不稱天資皇帝初即位易侯邑在淮南者侯邑在淮南者更易以佗郡地徙之不欲使錯在王國大王不肯皇帝卒易之卒終也使大王得三縣之實甚厚大王以未嘗與皇帝相見求入朝見未畢昆弟之歡畢盡也而殺列侯以自為名皇帝不使吏與其間與讀曰豫謂不令吏干豫其事赦大王甚厚漢法二千石缺輒言漢補大王逐漢所置而請自置相二千石皇帝骩天下正法而許大王甚厚不從正法聽王自置二千石骩古委字骩謂曲也大王欲屬國為布衣守冢真定屬謂委棄之也音之欲反皇帝不許使王毋失南面之尊甚厚毋失不失也南面之尊謂王位也大王宜日夜奉法度脩貢職以稱皇帝之厚徳今廼輕言恣行以負謗於天下甚非計也夫大王以千里為宅居以萬民為臣妾此高皇帝之厚徳也高帝蒙霜露沬風雨沬亦頮字也蒙冒也沬洗面也音胡内切宇從午未之未赴矢石野戰攻城自被創痍痍音夷以為子孫成萬世之業艱難危苦甚矣大王不思先帝之艱苦日夜怵惕脩身正行養犧牲豐粢盛奉祭祀以無忘先帝之功徳而欲屬國為布衣甚過且夫貪讓國土之名輕廢先帝之業不可以言孝父為之基而不能守不賢不求守長陵而求之真定先母後父不誼數逆天子之令不順言節行以高兄無禮謂請守母冢自為名節而表異行用此矜高於兄耳幸臣有罪大者立斷小者肉刑不仁斷謂斬也貴布衣一劔之任賤王侯之位不知不學問大道觸情妄行不祥任情意所欲則行之妄行行音下更切此八者危亡之路也而大王行之棄南面之位奮諸賁之勇吳專諸衞孟賁也賁音奔常出入危亡之路臣之所見高皇帝之神必不廟食於大王之手明白昔者周公誅管叔放蔡叔以安周齊桓殺其弟以反國子糺兄也言弟者諱也秦始皇殺兩弟遷其母以安秦始皇母與嫪毐私通生二子事覺誅毐并殺二弟遷其母於城陽宫也頃王亡代高帝奪之國以便事頃王高帝兄仲也匈奴入代不能守走歸京師高帝奪其國退為邵陽侯以便國法也便音頻面切濟北舉兵皇帝誅之以安漢濟北王興居與大臣誅諸吕自以功大怨其賞薄故反故周齊行之於古秦漢用之於今大王不察古今之所以安國便事而欲以親戚之意望於太上不可得也太上天子也亡之諸侯游宦事人及舍匿者論皆有法舍匿謂容止而藏隱也其在王所吏主者坐言各有所主而坐其罪今諸侯子為吏者御史主主御史也自此以下至縣令主皆謂王官屬為軍吏者中尉主客出入殿門者衞尉大行主諸從蠻夷來歸誼及以亡名數自占者内史縣令主相欲委下吏無與其禍不可得也言諸侯王之相欲委罪於在下小吏而身不干豫之不可得也與請曰豫王若不改漢繫大王邸論相以下為之柰何夫墮父大業退為布衣所哀墮毁也布衣貧賤之人王設伏法則貧賤之人切哀憐之墮音火規切幸臣皆伏法而誅為天下笑以羞先帝之徳羞辱也甚為大王不取也宜急改操易行上書謝罪曰臣不幸早失先帝少孤呂氏之世未嘗忘死常恐畏死也陛下即位臣怙恩德驕盈行多不軌軌法也追念罪過恐懼伏地待誅不敢起皇帝聞之必喜大王昆弟歡欣於上群臣皆得延壽於下上下得宜海内常安願熟計而疾行之行之有疑禍如發矢不可追已發矢喻速也已語終辭王得書不説臨江王榮景帝子前四年為皇太子四歳廢為臨江王三歳坐侵廟壖地為宮帝徴榮榮至詣中尉府對簿中尉郅都簿責訊王王恐自殺淮南王安厲王長子安既立其羣臣賓客江淮間多輕薄以厲王遷死感激安建元六年彗星見淮南王心怪之或説王曰先吳軍時彗星出長數尺然尚流血千里今彗星竟天天下兵當大起王心以為上無太子天下有變諸侯竝爭愈益治攻戰具積金錢賂遺郡國遊士妄作妖言阿諛王王喜多賜予之太子學用劔自以為人莫及聞郎中雷被巧被音皮義切巧者善用劔也召與戯被壹再辭讓誤中太子中音陟仲反太子怒被恐此時有欲從軍者輒詣長安被即願奮擊匈奴太子數惡被譖毁之於王也王使郎中令斥免欲以禁後令後人更不敢效也元朔五年被遂亡之長安上書自明事下廷尉河南河南治章下廷尉及河南令於河南雜治其事逮淮南太子追赴河南也王王后計欲毋遣太子王與王后共計也遂發兵計未定猶與十餘日猶與讀曰豫㑹有詔即訊太子即就也訊問也就淮南問之不逮詣河南淮南相怒壽春丞留太子逮不遣丞順王意不遣太子應逮書劾不敬王請相相不聽王使人上書告相事下廷尉治從迹連王從讀曰蹤王使人候伺入京師候伺其事漢公卿請逮捕治王王恐欲發兵太子遷謀曰漢使即逮王令人衣衞士衣持㦸居王旁有非是者即刺殺之臣亦使人刺殺淮南中尉廼舉兵未晚也是時帝不許公卿而遣漢中尉宏即訊驗王即亦就也王視漢中尉顔色和問斥雷被事耳自度無何自計度更無罪度音徒谷反不發中尉還以聞公卿治者曰淮南王安雍閼求奮擊匈奴者雷被等格明詔雍讀曰壅格音閣謂亭閣不行之當棄市詔不許請廢勿王帝不許請削五縣可二縣使中尉宏赦其罪罰以削地中尉入淮南界宣言赦王王初聞公卿請誅之未知得削地聞漢使來恐其捕之廼與太子謀如前計中尉至即賀王王以故不發燕王旦武帝子昭帝立旦與左將軍上官桀葢主等謀逆事發天子使使者賜燕王璽書曰昔高皇帝王天下建立子弟以藩屏社稷先日諸呂隂謀大逆劉氏不絶若髪賴絳侯等誅討賊亂尊立孝文以安宗廟非以中外有人表裏相應故邪樊酈曹灌攜劔推鋒樊噲酈商曹參灌嬰從高皇帝墾菑除害耘鉏海内當此之時頭如蓬葆勤苦至矣然其賞不過封侯今宗室子孫曾無暴衣露冠之勞裂地而王之分財而賜之父死子繼兄終弟及今王骨肉至親敵吾一體廼與他姓異族謀害社稷親其所疏疏其所親有悖逆之心無忠愛之義如使古人有知當何面目復奉齊酎見高祖廟乎旦得書以符璽屬醫工長謝相二千石奉事不謹死矣乃以綬自絞淮陽憲王欽宣帝子母張媫妤已卒憲王外祖母舅張博兄弟三人歳至淮陽見親輒受王賜後王上書請徙外家張氏於國博上書願留守墳墓獨不徙王恨之後博至淮陽王賜之少博言負責數百萬責謂假貸人財物未償者也責音側懈切願王為償王不許博辭去令弟光恐王云王遇大人益解恐謂怖動也大人博自稱其母也解讀曰懈博欲上書為大人乞骸骨去王乃遣人持黄金五十斤送博博喜還書謝還書報書為諂語盛稱譽王因言當今朝廷無賢臣灾變數見足為寒心萬姓咸歸望於大王大王奈何恬然恬然安静貌恬音大廉切不求入朝見輔助主上乎使弟光數説王宜聽博計令於京師説用事貴人為王求朝王不納其言後光欲至長安辭王復言願盡力與博共為王求朝王即日至長安可因平陽侯光得王欲求朝語馳使人語博博知王意動復遺王書曰博幸得肺腑自云於王有親數進愚䇿未見省察北㳺燕趙欲循行郡國求幽隱之士聞齊有駟先生者善為司馬兵法大將之材也博得謁見承間進問五帝三王究竟要道卓爾非世俗之所知卓爾高逺貌也自言見駟先生問以要道知其高逺也今邊境不安天下騷動㣲此人其莫能安也㣲無也又聞北海之濵有賢人焉濵涯也音頻又音賔累世不可逮然難致也逮及也言其材智不可及也致至也難得召而至也得此二人而薦之功亦不細矣博願馳西以此赴助漢急無財幣以通顯之趙王使謁者持牛酒黄金二十斤勞博博不受勞謂問慰之音来道反復使人願尚女聘金二百斤博未許尚女者王欲取博女以自配也㑹得光書云大王已遣光西與博并力求朝博自以棄捐不意大王還意反義結以朱顔還猶囘也願殺身報徳朝事何足言大王誠賜咳唾使得盡死湯禹所以成大功也駟先生蓄積道術書無不有言凡是書籍皆有之願知大王所好請得輒上王得書喜説説讀曰悦報愽書曰子高廼幸左顧存恤發心惻隱左顧猶言枉顧顯至誠納以嘉謀語以至事以至極之事告語我也雖亦不敏敢不諭意諭曉也今遣有司為子高償責二百萬是時博女壻京房以明易隂陽得幸於帝數召見言事自謂為石顯五鹿充宗所排謀不得用數為博道之博常欲誑燿淮陽王即具記房諸所説灾異及召見宻語持予淮陽王以為信驗詐言已見中書令石君求朝許以金五百斤賢聖制事葢慮功而不計費志成功不惜財費也昔禹治洪水百姓罷勞罷讀曰疲成功既立萬世賴之今聞陛下春秋未滿四十髪齒墮落太子㓜弱佞人用事隂陽不調百姓疾疫饑饉死者且半洪水之害殆不過此謂堯時水災不大於今大王緒欲救世緒業也一日始為端緒將比功徳何可以忽言比功徳於古帝王也忽怠忘也博已與大儒知道者為大王為便宜奏大儒知道謂京房也道術也陳安危指災異大王廟見先口陳其意而後奏之帝必大説説讀曰悦事成功立大王即有周召之名邪臣散亡公卿變節功徳亡比而梁趙之寵必歸大王梁王景帝弟欲為嗣趙王如意幾代惠帝也外家亦將富貴何復望大王之金錢王喜説説音悦報博書曰廼者詔下止諸侯朝者寡人㦧然不知所出㦧痛也不知計䇿何所出也㦧音才感切子高素有顔冉之資臧武之知顔顔囘也冉冉耕也字伯牛皆孔子弟子論語稱孔子曰徳行顔淵閔子騫冉伯牛仲弓臧武者魯大夫臧武仲也名紇論語稱子曰若臧武仲之智故王引之為言也子貢之辨論語稱孔子云言語宰我子貢卞莊子之勇卞莊子古之勇士兼此四者世之所鮮鮮少也音先踐反既開端緒願卒成之卒終也求朝義事也柰何行金錢乎博報曰已許石君須以成事須待也王以金五百斤予博㑹房出為郡守離左右顯具得此事告之房漏泄省中語博兄弟詿誤諸侯王誹謗政治狡猾不道皆下獄有司奏請逮捕欽帝不忍致法遣諫議大夫王駿賜欽璽書曰皇帝問淮陽王有司奏王舅張博數遺王書非毁政治謗訕天子褒舉諸侯稱引周易以讇惑王讇古諂字也所言尤惡悖逆無道王不舉奏而多與金錢報以好言辠至不赦朕惻焉不忍聞惻痛也為王傷之推原厥本不祥自博祥善也自從也不善之事從博起也惟王之心匪同於㓙已詔有司勿治王事遣諫議大夫駿申諭朕志申謂約束之詩不云乎靖恭爾位正直是與小雅小明之詩也與偕也言人能安靜而恭以守其位偕於正直則神明聽之用錫福善王其勉之駿諭指曰璽書之外天子又有指意並令駿曉告於王也禮為諸侯制相朝聘之義葢以考禮一徳尊事天子也考成也一徳謂不二其心也且王不學詩乎詩云俾侯於魯為周室輔魯頌閟宮之詩也言立周公子伯禽使為諸侯於魯國而作周家之藩輔今王舅博數遺王書所言悖逆王幸受詔䇿通經詔䇿若廣陵王策曰無邇宵人毋作匪徳也經術之義不得内交知諸侯名譽不當出竟竟讀曰境天子普覆徳布於朝而恬有博言恬安也聞博邪言安而受之多予金錢與相報應不忠莫大焉故事諸侯王獲罪京師罪惡輕重縱不伏誅必蒙遷削貶黜之罪故事者言舊制如此也未有但已者也但徒也空也已止也徒空然而止者也今聖主赦王之罪又憐王失計忘本為博所惑加賜璽書使諫議大夫申諭至意殷勤之恩豈有量哉博等所犯惡大群下之所共攻王法之所不赦也自今以來王毋復以博等累心累音力瑞反務與衆棄之春秋之義大能變改以有過而能變改者為大易曰藉用白茅無咎此大過初六爻辭也茅者潔白之物取其自然故用為藉致享於神慎之至也言臣子之道改過自新潔己以承上然後免於咎也王其留意慎戒惟思所以悔過易行塞重責稱厚恩者塞猶補也稱副也如此則長有富貴社稷安矣於是淮陽王欽免冠稽首謝曰奉藩無狀無善狀過惡暴列暴謂章顯也陛下不忍致法加大恩遣使者申諭道術守藩之義伏念博罪惡尤深當伏重誅臣欽願悉心自新奉承詔策悉盡也頓首死罪東平王宇宣帝子母公孫媫妤元帝初就國事太后内不相得太后上書言之求守杜陵園宣帝陵也宮人無子乃守園陵帝於是遣大中大夫張子蟜蟜字或作僑並音鉅昭反奉璽書敕諭之約敕而曉告之也曰皇帝問東平王葢聞親親之恩莫重於孝尊尊之義莫大於忠故諸侯在位不驕以致孝道制節謹度以翼天子翼佐也然後富貴不離於身而社稷可保今聞王自修有闕本朝不和謂東平國之朝也流言紛紛謗自内興朕甚㦧焉為王懼之㦧痛也音才感反詩不云乎毋念爾祖聿脩厥徳永言配命自求多福大雅文王之詩也言當念爾先祖之道聿修其徳則長配天命此乃所以求多福也朕惟王之春秋方剛言其年少血氣盛忽於道徳忽遺忘也意有所移忠言未納謂漸染其惡人而移其性未受忠言也故遣太中大夫子蟜諭王朕意親臨遣之令以朕意曉告王孔子曰過而不改是謂過矣論語載孔子之言謂人有失行許以自新王其深惟熟思之無違朕意又特以璽書賜王太后曰皇帝使諸吏宦者令承問東平王太后朕有聞言母子不和也不欲指斥言之故云有聞也王太后少加意焉夫福善之門莫美於和睦患咎之首莫大於内離今東平王出襁褓之中而託於南面之位加以年齒方剛渉學日寡驁忽臣下驁讀與傲同不自它於太后言不自同它人以是之間能無失禮義者其惟聖人乎傳曰父為子隱直在其中矣王太后明察此意不可不詳閨門之内母子之間同氣異息骨肉之恩豈可忽哉昔周公戒伯禽曰故舊無大故則不可棄也毋求備於一人事見論語言人有小惡當思其善不可責以備行而即棄之耳夫以故舊之恩猶忍小惡而况此乎已遣使者諭王王既悔過服罪太后寛忍以貰之貰猶緩也後宜不敢言王於後當不敢更為非也王太后強餐止思念慎疾自愛宇慚懼因使者頓首謝死罪願洒心自改洒音先弟反詔書又敕傅相曰夫人之性皆有五常及其少長耳目牽於耆慾耆讀曰嗜故五常銷而邪心作情亂其性利勝其義性者所受而生也情者見物而動者也而不失厥家者未之有也今王富於春秋氣力勇武獲師傅之教淺加以所少聞見自今以來非五經之正術敢以游獵非禮道王者輒以名聞道讀曰導梁王立成帝元延中以公事怨相掾及睢陽丞使奴殺之殺奴以㓕口凡殺三人傷五人手敺郎吏二十餘人上書不拜奏謀篡死罪囚逐取曰篡有司請誅帝不忍削立五縣哀帝建平中立復殺人天子遣廷尉賞大鴻臚繇持節即訊就問也至移書傅相中尉曰王背䇿戒初封時策書有戒勅之言誖暴妄行誖乖也音布内反連犯大辟毒流吏民比比蒙恩不伏重誅比猶頻也不思改過復賊殺人幸得蒙恩丞相長史大鴻臚丞即問王陽病抵讕置辭扺距也讕誣諱也扺丁禮反讕來亶切嬌嫚不首主令與背叛亡異不首謂不伏其罪也主令者於法令之條與背判無異也首音失救切次下亦同丞相御史請收王璽綬送陳留獄明詔加恩復遣廷尉大鴻臚雜問今王當受詔置辭恐復不首實對書曰至于再三有不用我降爾命言我教法至於再三汝不能用我則下置黜汝命也傅相中尉皆以輔政為職虎兕出於匣龜玉毁於匱中是誰之過歟此論語孔子責冉有季路之辭言虎兕出於檻龜玉毁於櫝中豈非典守者之過邪喻輔相人者當持危扶顛也書到明以誼曉王敢復懷詐罪過益深傅相以下不能輔導有正法立惶恐免冠對曰立少失父母孤弱處深宮中獨與宦官婢妾居漸漬小國之俗加以質性下愚有不可移之姿言不從化也論語稱孔子曰唯上智與下愚不移往者傅相亦不純以仁義輔翼立大臣皆尚苛刻求微宻䜛臣在其間左右弄口積使上下不和更相眄伺更音工衡切宮殿之裏毫釐過失亡不暴陳當伏重誅以視海内視讀曰示數蒙聖恩得見貰赦貰謂寛其罪也今立自知賊殺中郎曹將冬月廹促貪生畏死即詐僵仆陽病僵仆倒地也僵音薑仆音赴徼幸得踰於須臾冀得踰冬月而减罪也謹以實對伏須重誅須待也時冬月盡春大赦不治後漢阜陵質王延光武子初封淮南王明帝永平中有上書告延與姬兄謝弇及姊館陶公主壻駙馬都尉韓光招姦猾作圖䜟祠祭祝詛事下案驗有司奏請誅延帝以延罪薄於楚王英故特加恩徙為阜陵王食二縣延既徙封數懷怨望章帝建初中復有告延與子男魴造逆謀者有司奏請檻車徴詣廷尉詔獄帝下詔曰王前犯大逆罪惡尤深有同周之管蔡漢之淮南經有正義律有明刑先帝不忍親親之恩枉屈大法為王受愆愆過也反而不誅先帝之過故言為王受過也羣下莫不惑焉今王曾莫悔悟悖心不移逆謀内潰自子魴發誠非本朝之所樂聞朕惻然傷心不忍致王于理今貶爵為阜陵侯食一縣獲斯辜者侯自取焉於戯誡哉齊王晃及弟利侯剛與母太姫宗更相誣告章帝章和元年有司奏請免晃剛爵為庶人徙丹陽帝不忍下詔曰朕聞人君正屏有所不聽白虎通曰所以設屏以自障示不極臣下之敬也宗尊為小君宮衞周備出有輜軿之飾入有牖户之固殆不至如譖者之言晃剛愆乎至行濁乎大倫濁汚也倫理也甫刑三千莫大不孝不忍置之于理其貶晃爵為蕪湖侯削剛户三千於戯小子不朂大道控于法理以墮宗緒其遣謁者收晃及太姬璽綬樂成王萇驕淫不法愆過累積冀州刺史與國相舉奏萇罪至不道安帝詔曰萇有靦其面而放逸其心知陵廟至重承繼有禮不惟致敬之節肅穆之慎乃敢擅損犧牲不備苾芬詩小雅曰苾苾芬芬祀事孔明慢易太姫不震厥教太姫即萇所繼之母震懼也出入顛覆風淫于家聘取人妻饋遺婢妾毆擊吏人專已兇暴愆罪莫大甚可恥也朕覽八辟之議不忍致之于理其貶萇爵為臨湖侯朕無則哲之明致簡統失序罔以慰承太姫增懷永歎河閒惠王政傲狠不奉法憲順帝以侍御史吳郡沈景有彊能稱故擢為河間相景到國謁王王不正服箕踞殿上侍郎贊拜景峙不為禮峙立也問王所在虎賁曰是非王邪景曰王不服常人何别今相謁王豈謁無禮者邪王慙而更服景然後拜出住宫門外請王傅責之曰前發京師陛下見受詔以王不恭使相撿督諸君空受爵禄而無訓導之義因奏治罪詔書讓政而詰責傅景因捕諸奸人上案其罪上奏上也音市又反殺戮尤惡者數十人出寃獄十餘人政遂改節悔過自修魏陳思王植太祖子初封臨淄侯植嘗乗車行馳道中開司馬門出太祖大怒公車令坐死繇是重諸侯科禁而植寵日衰下令曰自臨淄侯植私出開司馬門至金門令吾異目視此兒矣又令曰諸侯長史及帳下吏知吾出輒將諸侯行意否從子建私開司馬門來吾都不復信諸侯也恐吾適出便復私出故攝將行不可常使吾以誰為心腹也趙王幹大祖子明帝青龍二年私通賔客為有司所奏賜幹璽書誡誨之曰易稱開國承家小人勿用詩著大車維塵之誡自太祖受命創業深覩治亂之源鑒存亡之機初封諸侯訓以恭慎之言輔以天下之端士嘗稱馬援之遺誡重諸侯賔客交通之禁乃使與犯妖惡同夫豈以此薄骨肉哉徒欲使子弟無過失之愆士民無傷害之悔耳髙祖踐阼祗慎萬機申著諸侯不朝之令朕感詩人常棣之作嘉采菽之義亦縁詔文曰若有詔得詣京師故命諸王以朝聘之禮而楚中山並犯交通之禁趙宗戴㨗咸伏其辜近東平王復使屬官敺壽張吏有司舉奏朕裁削縣令有司以曹纂王喬等因九族時節集王家或非其時皆違禁防朕惟王㓜小有恭順之素加受先帝顧命欲崇恩禮延乎後嗣况近在王身乎且自非聖人孰能無過已詔有司宥王之失古人有言戒慎乎其所不覩恐懼乎其所不聞莫見乎隱莫顯乎㣲故君子必慎其獨也叔父率先聖之要典以纂乃先帝之遺命戰戰兢兢靖恭厥位稱朕意焉彭城王據太祖子景初元年坐私遣人詣尚方作禁物削縣二千户璽書曰制詔彭城王有司奏王遣司馬董和齎珠玉來到京師中尚方多作禁物交通工官出入近署踰侈非度慢令違制繩王以法朕用憮然不寧于心王以懿親之重處藩輔之位典籍日陳於前勤誦不輟於側加雅素奉修恭肅敬慎務在蹈道孜孜不衰豈忘率意正身考終厥行哉若然小疵或謬于細人忽不覺悟以斯為失耳書云惟聖罔念作狂惟狂克念作聖古人垂訓乃至於此故君子思心無斯須遠道焉常慮所以累徳者而去之則徳明矣開心所以為塞者而通之則心夷矣慎行所以為尤者而修之則行全矣三者王之所能備也今詔有司宥王削縣二千户以彰八柄予奪之法昔羲文作易著休復之語仲尼論行既過能改王其改行茂昭斯義率意無怠楚王彪太祖子齊王嘉平元年兖州刺史令狐愚與太尉王淩謀迎彪都許昌乃遣傅及侍郎御史就國案騐收治諸相連及者廷尉請徴彪治罪於是依漢燕王旦故事使兼廷尉大鴻臚持節賜彪璽書切責之曰夫先王行賞不遺仇讐用戮不違親戚至公之義也故周公流涕而决二叔之罪孝武傷懷而斷昭平之獄古今常典也惟王國之至親作藩于外不能祗奉王度表率宗室而謀於奸邪乃與太尉王淩兖州刺史令狐愚搆通逆謀圖危社稷有悖忒之心無忠孝之意宗廟有靈王其何面目以見先帝朕深痛王自陷罪辜既得王情深用慨然有司奏王當就大理惟公族甸師之義不忍肆王市朝故遣使者賜書王自作孽匪繇於他燕刺之事宜足以觀王其自圖之彪乃自殺吳孫皎大帝時為征虜將軍皎堅弟靜之子也嘗以小故與甘寧忿爭或以諫寧寧曰臣子一例征虜雖公子何可專行侮人邪吾值明主但當輸効力命以報所天誠不能随俗屈曲矣帝聞之書讓皎曰自吾與北方為敵中間十年初時相持年小今者且三十年矣孔子言三十而立非但謂五經也授卿以精兵委卿以大任都䕶諸將於千里之外欲使如楚任昭奚恤揚威於北境非徒相使逞私志而已近聞卿與甘興霸飲因酒發作侵凌其人其人求屬呂䝉督中此人雖麄豪有不如人意時然其較略大丈夫也吾親之者非私之也吾親愛之卿疎憎之卿所為毎與吾違其可久乎夫居敬而行簡可以臨民愛人多容可以得衆二者尚不能知安可董督在逺禦冦濟難乎卿行長大特受重任上有逺方瞻望之觀下有部曲朝夕從事何可恣意有盛怒耶人誰無過貴其能改宜追前愆深自咎責今故煩諸葛子瑜重宣吾意臨書摧愴心悲淚下皎得書上疏陳謝遂與寜結厚宋彭城王義康高祖子文帝元嘉中輔政十餘年以專恣出鎮豫章停省十餘日桂陽侯義融新渝侯義宗秘書監徐湛之往來慰視於省中奉辭便下渚帝惟對之慟哭餘無所言衡陽王義季高祖子文帝時徐州刺史元嘉二十三年魏軍侵逼北境攪動義季不欲以功勤自業無他經略惟飲酒而已文帝詔之曰杜驥申怙倉卒之際尚以弱甲𤨏卒徼冦作援彼為元統士馬桓桓既不懷奮發連被意㫖猶復逡廵豈惟大乖應赴之宜實孤百姓之望且匈奴輕漢將自此而始賊初起逸未知指趣故且裝束兼存觀察耳少日勢漸可見便應大有經略何合安然遂不敢動遣軍政欲乗際㑹拯危急以申威援本無驅馳平原方幅爭鋒之理又山路易慿何以畏首尾迥弱若謂事理正應如此者進大鎮聚甲兵徒為煩耳南郡王義宣高祖子文帝時鎮荆州元嘉二十七年後魏南侵義宣慮敵至欲奔上明及魏軍退太祖詔之曰善修民務不須營濳逃計也巴陵王休若文帝子明帝時為雍州刺史典籖夏寶期事休若無禮繫獄啓帝殺之慮不被許啓未報輒於獄行刑信反果錮送而寶期已死帝大怒與休若書曰孝建大明中汝敢行此耶使其母加杖三百降號左將軍貶使持節都督為監行雍州刺史假寧蠻校尉削封五百户晉平王休祐文帝子明帝時為荆州刺史左右范景逹善彈棋帝詔之休祐留不遣帝怒詰責之曰汝剛戾如此豈為下之義南齊竟陵王子良武帝子文惠太子薨帝撿行東宮見太子服御羽儀多過制度帝大怒以子良與太子善不啓聞頗加嫌責廬陵王子卿武帝子為荆州刺史在鎮營造服飾多違制度帝勅之曰吾前後有勅非復一兩道諸王不得作乖體格服飾汝何意都不憶吾勅耶忽作瑇瑁乗具已成不須壞可速送都又作銀鐙金箔箭脚便速壤去凡諸服章自今不啟吾知復專輒作者後有所聞當復得痛杖又曰汝比在都讀學不就年轉成長吾日兾汝美勿得勅如風過耳使吾失氣永明十年遷使持節都督南豫司三州諸軍事南豫州刺史子卿之鎮道中戲部伍為水軍帝聞之大怒殺其典籖遣宜都王鏗代之子卿還第不與相見陳新安王伯固文帝子宣帝時為南徐州刺史在州不知政事日出畋獵或乗眠輿至於草間輒呼人從遊動至旬日捕麞鹿多使生致帝頗知之遣人責讓者數矣武陵王伯禮文帝子宣帝時為吳興大守恣行刼掠為有司所劾帝曰王年少未逹道皆繇佐吏不能輔弼所致特降軍號後若更犯必致之以法有司不言與同罪後魏毗陵王順位司𨽻校尉道武好黄老數召諸王及朝臣親為說之在坐莫不祗肅唯順獨坐寐欠伸不顧而唾帝怒廢之以王薨於家襲常山王陪斤子昭小字阿兒尚書張彞引兼殿中郎孝文將為齊郡王蘭舉哀而昭乃作宮懸帝大怒詔曰阿兒愚騃誰引為郎於是黜彞白衣守尚書昭遂停廢任城王澄為吏部尚書孝文自鄴還雒引見公卿曰營國之本禮教為先朕離京邑以來禮教為日新以不澄對曰臣謂日新帝曰朕昨入城見車上婦人冠帽而著小襖者若為如此尚書何為不察澄曰著猶少於不著者帝曰深可怪也卿意欲令全著乎一言可以䘮邦者斯之謂歟可命史官書之澄後為尚書右僕射宣武景明初有降人嚴叔懋告尚書令王肅遣孔思逹濳通南齊圖為叛逆齊遣俞公喜送勅於肅公喜還南肅與裴叔業馬為信澄信之乃表肅將叛輒下禁止咸陽北海二王奏澄擅禁宰輔免官歸第廣陽王嘉為徐州刺史孝文南伐嘉違天指授令賊得免帝怒責之曰叔祖定非世孫何太不類也趙郡王幹孝文時為司州牧車駕南討詔幹都督中外諸軍事幹貪淫不遵治典御史中尉李彪將糺劾之㑹遇幹於尚書下舍因屏左右而謂幹曰殿下比有風聞即欲起彈恐損聖明委託之㫖若改往修來彪當不言脱不悛改夕聞旦發而幹悠然不以為意彪乃表彈之帝省之忿惋詔幹與北海王詳俱隨太子詣行在所既至詳獨得朝見幹不蒙引接宻令左右察其意色知無憂悔乃親數其過杖之一百免所居官以王還第襲臨淮王提為梁州刺史以貪縱削除加罰徙配北鎮久之提子員外郎穎免官請解所居官代父邊戍孝文不許京兆王愉與弟廣平王懷頗相誇尚競慕華麗貪縱不法於是宣武攝愉禁中推案杖愉五十出為冀州刺史城陽王鸞為定州刺史鸞愛樂佛道修持五戒不飲酒食肉積歳長齋繕起佛寺勸率百姓共為土木之勞公私費擾頗為民患宣武聞而詔曰鸞親惟宗懿作牧大州民物殷繁綏寧所屬宜剋己厲誠崇清樹惠而乃驟相徴發專為煩擾編户嗷嗷家懷嗟怨北州土廣姦亂是繇准法尋愆應加肅黜以鸞戚屬情有不忍可遣使者以義督責奪禄一周微示威罰也安定王爕弟願平宣武初為給事中悖惡日甚殺人刼盗公私咸患帝以其戚近未忍致之於法乃免官禁之别館館名愁思堂冀其尅念孝明立願平乃得出靈太后臨朝以其暴亂不悛詔曰願平志行輕疎每乖憲典可還於館依前禁錮久之解禁還家付宗師嚴加誨奬高陽王雍孝明時為司州牧侍中太師録尚書事靈太后許賜其女妓未及送之雍遣其閹丁鵝自至宫内料簡四口冒以還第太后責其專擅追停之河間王琛為定州刺史琛妃宣武舅女高皇后妹琛馮侍内外在州貪惏及還朝靈太后詔曰琛在定州惟不將中山宮來自餘無所不至何可更復叙用繇是遂廢於家後周襲杞公亮為徐州總管在州無政績晉公護誅後亮心不自安唯縱酒而已武帝勅讓之隋秦王俊高祖子為并州總管以疾徴還京師高祖以其奢縱免官以王就第左武衞將軍劉昇諫曰秦王非有他過但費官物營廨舍而已臣謂可容帝曰法不可違昇固諫帝忿然作色昇乃止其後楊素復進諫曰秦王之過不應至此願陛下詳之帝曰我是五兒之父非兆民之父若如公意何不别制天子兒律以周公之為人尚誅管蔡我誠不及周公遠矣安能虧法卒不許俊疾篤未能起遣使奉表陳謝帝謂其使曰我戮力開基創兹大業作訓垂範庶臣下守之而不失汝為吾子而欲敗之不知何以責汝俊慙怖疾甚大都督皇甫統上表請復王官不許歳餘以疾篤復拜上柱國開皇二年六月薨於秦邸帝哭之數聲而已蜀王秀高祖子在蜀奢侈違犯制度晉王隂令楊素求其罪而譖之仁壽二年徴還京師帝見不與語明日使切讓之秀謝曰忝荷國恩出臨藩岳不能奉法罪當萬死皇太子及諸王流涕庭謝帝曰頃者秦王麋費財物我以父道訓之今秀蠧害生民當以君道繩之於是付執法者廢為庶人秀上表希與愛子𤓰子相見帝因下詔數其罪曰汝地居臣子情兼家國庸蜀要重委以鎮之汝以干紀亂常懷惡樂禍䁹睨二宫佇遲災釁容納不逞結構異端我有不和汝便覘候望我不起便有異心皇太子汝兄也次當建立汝假託妖言乃云不終其位妄稱鬼怪又道不得入宫自言骨相非人臣徳業堪承重器妄道青城出聖欲以己當之詐稱益州龍見託言吉兆重述木易之姓更治成都之宫妄説禾乃之名以當八千之運横生京師妖異以證父兄之災妄造蜀地徴祥以符巳身之籙汝豈不欲得國家惡邪天下亂也輒造白玉之挺又為白羽之箭文物飾服豈似有君鳩集左道符書厭鎮漢王於汝親則弟也乃畫其形像書其姓名縛手釘心枷鎻杻械仍云請西嶽華山慈父聖母神兵九億萬騎收楊諒魂神閉華山下勿令散蕩我之於汝親則父也復云請西嶽華山慈父聖母賜為開化楊堅夫妻迴心懽喜又畫我形像縛手撮頭仍云請西嶽神兵收楊堅魂神如此形狀我今不知楊諒楊堅是汝何親也包藏凶慝圖謀不軌逆臣之迹也希父之災以為身幸賊子之心也懷非分之望肆毒心於兄悖弟之行也嫉妬於弟無惡不為無孔懐之情也違犯制度壞亂之極也多殺不辜豺狼之暴也剥削民庶酷虐之甚也唯求財貨市井之業也專事妖邪頑嚚之性也弗克負荷不材之器也凡此十者滅天理逆人倫汝皆為之不祥之甚也欲免禍患長守富貴其可得乎後聽與其子同處唐魏王泰太宗第四子貞觀十七年四月太子承乾敗太宗面加譴讓承乾曰臣貴為太子更何所求但為泰所圖時與朝臣謀自安之計不逞之人教臣為不軌之事今若以泰為太子是落其度内太宗因謂侍臣曰我若立泰便是儲宮之位可經營而得也泰立承乾晉王皆不存晉王立泰與承乾可無恙也乃下詔曰朕聞生育品物莫大乎天地愛敬罔極莫重乎君親是故為臣貴於盡忠虧之者有罰為子在於行孝違之者必誅大則肆諸市朝小則終貽黜辱雍州牧相州都督左武侯大將軍魏王泰朕之愛子實所鍾心㓜而聰令頗好文學恩遇極於隆重爵位窮於寵章不思聖哲之戒自搆驕僭之咎惑讒諛之言信離間之説以承乾雖居長嫡久纒疴恙濳有代立之望靡遵義方之則承乾懼其凌奪泰亦日增猜阻爭結朝士競引㓙人遂使文武之官各有託附親戚之内分為朋黨朕志存公道義在無偏彰厥巨釁兩從廢黜非惟作則四海亦乃貽範百代可解雍州都督左武侯大將軍并削爵土降為東萊郡王尋改封順陽郡王於均州為邑制宅以處之齊王祐太宗子貞觀中為齊州都督溺情群小尤好弋獵長史薛大鼎屢諫不聽太宗以大鼎輔導無方坐免權萬紀前為吳王恪長史有正直之節乃以為祐長史有咎君謨梁猛彪者竝以善騎得幸於祐萬紀驟諫不納遂斥逐之而祐濳遣招延狎昵愈甚太宗慮不能悔過數以書責讓祐滕王元嬰多驕縱失度高宗以書誡之曰王地在宗枝寄深磐石㓜聞詩禮夙承教義實冀孜孜無怠漸以成徳豈謂不遵軌轍踰越典章且城池作固以備不虞關鑰開閉須有常凖鳩召散樂并集府僚嚴關夜開非復一度遏宻之悲尚纒比屋王以此情事何遽紛紜又廵省百姓本觀風問俗遂乃驅率老㓜借狗求罝志從禽之娛忽黎元之重時方農要屢出畋遊以彈彈人將為笑樂取適之道尚應多緒何必此事方得為娛晉靈虐主未可取則趙孝文趨走小人張四郎倡優賤𨽻王親與博戯極為輕脱一府官僚何所瞻望凝寒方甚以雪埋人虐物既深何以為樂家人奴僕侮弄官人至於此事彌不可長朕以骨肉至親不忍致王於法今與王下上考以媿王心人之有過貴在能改國有憲章私恩難再興言及此慙戁盈懐嗣虢王巨肅宗乾元初為河南尹於南橋梁出入車牛皆税錢以供國用頗有乾没士庶怨之後與妃張氏不睦張氏即皇后從父妹宗正卿李遵構之發其贓貶為遂州刺史邠王震為宗正卿昭宗天祐三年七月勅曰震就列朝行守官宗寺俄從私便久去上京既稍失於規程宜特示於黜免勒停見任幷落下襲封册府元龜卷二百九十七
