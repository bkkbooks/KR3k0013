body:
  text: 册府元龜卷二百四十六宋王欽若等撰列國君部盟會傳稱誥誓不及五帝盟詛不及三王自周室東遷諸侯力政彊陵弱大侵小或夷狄交亂於中國或覇王臨長於庶邦繇是坎牲㰱血之事作矣若夫稱之以先代要之以明神形於載書以著其信誓及後世以圖其終固宜守之而勿渝奉之而可乆其或假璧易田乃成於詐諼捧盤執耳或至於紛紜可尋可寒逮乎長亂是糾是殛垂之空言自非仗仁義之名保丹青之誓恤病討貳以存亡國而討不睦勤王尊主以翼天子而訓諸侯茍異於斯亦鮮以濟魯隱公元年三月公及邾儀父盟於蔑蔑姑蔑魯地魯國卞縣南有姑蔑城公攝位而欲求好於邾故為蔑之盟儀父邾子未奉王命故不書爵九月及宋人盟于宿客主無名皆微者也宿小國東平無鹽縣也始通也初惠公之季年敗宋師于黄公立而求成焉故曰始通也二年春公會戎于濳戎狄蠻夷皆氐羗之别種也戎而書會者順其俗以為禮皆謂居中國若戎子駒支者陳留濟陽縣東南有戎城潜魯地修惠公之好也戎請盟公辭許其修好而不許其盟八月公及戎盟于唐高平方與縣北有武唐亭復修戎好也冬十月紀子帛莒子盟于宻魯故也子帛裂繻字也莒魯有怨紀侯既昏於魯使大夫盟莒以和觧之子帛為魯結好息民故曰魯故也宻莒邑城陽淳于縣東北有宻鄉三年十二月齊侯鄭伯盟于石門石門齊地或曰濟北盧縣故城西南尋盧之盟也四年春公與宋公為會将尋宿之盟未及期衛人來告亂夏公及宋公遇于清宿盟在元年六年五月公會齊侯盟于艾泰山牟縣東南有艾山始平于齊也春秋前魯與齊不平今乃棄惡修好故言始平于齊七年夏齊侯使夷仲年來聘結艾之盟也艾盟在六年秋宋及鄭平七月盟于宿冬陳及鄭平六年鄭侵陳大獲今乃平十二月陳五父如鄭蒞盟蒞臨也壬申及鄭伯盟㰱如忘志不在於㰱血洩伯曰五父必不免不頼盟矣洩伯鄭洩駕鄭良佐如陳蒞盟良佐鄭大夫辛巳及陳侯盟亦知陳之将亂也八年春齊侯将平宋衛平宋衛於鄭有會期宋公以幣請於衛請先相見宋敬齊命衛侯許之故遇於犬丘夏齊人卒平宋衛於鄭秋會于温盟于瓦屋以釋東門之役禮也定國息民故曰禮也平宋衛二國忿鄭之謀八月公及莒人盟于浮來以成紀好也二年紀莒盟于宻為魯故今公尋之故曰以成紀好冬齊侯使來告成三國齊侯冬來告稱秋和三國公使衆仲對曰君釋三國之圗以鳩其民君之惠也寡君聞命矣敢不承受君之明徳九年冬公會齊侯于防防魯地在琅邪華縣南時宋公不王不供王職鄭伯為王左卿士以王命討之伐宋宋以入郛之役怨公不告命入郛在五年公以七年伐邾欲以説宋而宋猶不和也公怒絶宋使秋鄭人以王命來告伐宋故會防以謀伐宋十年三月公會齊侯鄭伯于中丘盟于鄧為師期尋九年㑹防謀伐宋鄧魯地五月羽父先㑹齊侯鄭伯伐宋六月公會齊侯鄭伯于老桃老桃宋地十一年夏公會鄭伯于時來時來郲也滎陽縣東有釐城鄭地謀伐許也鄭伯将伐許七月公會齊侯鄭伯伐許桓公元年春公即位脩好于鄭鄭人請復祀周公卒易祊田公許之三月鄭伯以璧假許田為周公祊故也魯不宜聽鄭祀周公又不宜易取祊田犯二不宜以動故隐其實不言祊稱璧假言若進璧以假田非久易也四月公及鄭伯盟于越結祊成也結成易二田之事也傳以經不書祊故獨見祊盟曰渝盟無享國冬鄭伯拜盟二年七月蔡侯鄭伯會于鄧潁川召陵縣西南有鄧城始懼楚也楚國今南郡江陵縣北紀南城也楚武王始僭號稱王欲害中國蔡鄭姬姓近楚故懼而會謀九月公及戎盟于唐脩舊好也三年正月公㑹齊侯于嬴嬴齊邑今太山嬴縣成昏於齊也公不由媒介自與齊侯㑹而成昏非禮也夏齊侯衛侯胥命于蒲申約言以相命而不㰱血也蒲衛地在陳留長垣縣西南不盟也又公會杞侯于郕杞求成也二年入杞今求成也六年四月公㑹杞侯于成成魯地在太山鉅平縣東南來諮謀齊難也齊欲滅杞故來謀之七年夏盟向求成于鄭既而背之盟向二邑名隱十一年王以與鄭故求與鄭成八年秋隨及楚平楚子将不許鬭伯比曰天去其疾矣去疾謂少師見獲而死隨未可克也乃盟而還十年秋公會衛侯于桃丘弗遇衛侯與公為㑹期中背公更與齊鄭故公獨往而不相遇也桃丘衛地濟北東阿縣東南有桃城十一年春齊衛鄭宋盟于惡曹惡曹地名九月魯大夫柔會宋公陳侯蔡叔盟于折蔡叔蔡大夫叔名也折北地名公會宋公于夫鍾夫鍾郕地十二月公㑹宋公于闞闞魯地在東平須昌縣東南十二年六月公會杞侯莒子盟于曲池平杞莒也曲池魯地魯國汶陽縣北有曲水亭隱四年莒人伐杞自是遂不平公欲平宋鄭秋公及宋公盟于句瀆之丘句瀆之丘即榖丘也宋人以立厲公故多責賂於鄭鄭人不堪故不平宋成未可知也秋又會于虛冬又會于龜宋公辭平故與鄭伯盟于武父宋公貪鄭賂故與三會而卒辭不與鄭平十四年春公會鄭伯于曹脩十二年武公之好以曹地曹與會曹人致餼禮也熟曰饔生曰餼夏鄭子人來尋盟且脩曹之會子人即弟語也其後為子人氏十五年六月乙亥昭公入許叔入于許公㑹齊侯于艾謀定許也十一月公會宋公衛侯陳侯于袲謀伐鄭将納厲公也弗克而還十六年正月公會宋公蔡侯衛侯于曹謀伐鄭也前年冬謀納厲公不克故復更謀四月公會宋公衛侯陳侯蔡侯伐鄭春既謀之今書會者魯諱議納不正蔡常在衛上今序陳下蓋後至十七年正月公會齊侯紀侯盟于黄黄齊地平齊紀且謀衛故也齊欲滅紀衛逐其君二月公會邾儀父盟于趡尋蔑之盟也趡魯地稱字義與蔑盟同荘公三年秋紀季以酅入于齊紀於是乎始判判分也言分為附庸始於此冬公次于滑将㑹鄭伯謀紀故也鄭伯辭以難厲公在櫟故也四年三月楚武王伐隨令尹鬭祁莫敖屈重除道梁溠營軍臨隨隨人懼行成時秘王䘮故為竒兵更開直道溠水在義陽厥縣西東南入鄖水梁橋也隨人不意其至故懼而行成莫敖以王命入盟隨侯且請為會于漢汭而還汭内也謂漢西夏齊侯陳侯鄭伯遇于垂九年春公及齊大夫盟于蔇齊亂無君故大夫得敵於公蓋欲迎子紏也來者非琅人故不稱名蔇魯地邪繒縣北有蔇亭十三年春齊侯宋人陳人蔡人邾人會于北杏北杏齊地以平宋亂宋有弑君之亂齊桓欲脩覇業冬公會齊侯盟于柯此柯今濟北東阿齊之阿邑猶祝柯今為祝阿始及齊平也始與齊桓通好十四年冬周大夫單伯會齊侯宋公衛侯鄭伯于鄄鄄衛地今東郡鄄城也齊桓脩覇業卒平宋亂宋人服從欲歸功天子故赴以單伯㑹諸侯為文十五年春齊侯宋公陳侯衛侯鄭伯會于鄄齊始覇也始為諸侯長十六年十二月會齊侯宋公陳侯衛侯鄭伯許男滑伯滕子同盟于幽鄭成也書會魯會之不書其人㣲者也言同盟服異也陳國小毎盟會皆在衛下齊桓始覇楚亦始強陳侯介於二大國之間而為三恪之客故齊桓因而進之遂班在衛上終於春秋滑國都今在河南緱氏縣幽宋地十九年秋公子結媵陳人之婦于鄄遂及齊侯宋公盟公子結魯大夫公羊糓梁皆以為魯女媵陳侯之婦其稱陳人之婦未入國畧言也大夫出境有可以安社稷利國家者則專之可也結在鄄聞齊宋有㑹權事之宜去其本職遂與二君為盟故備書之二十二年七月丙申及齊高傒盟于防高傒齊之貴卿而與魯之微者盟齊桓謙接諸侯以崇覇業二十三年夏公及齊侯遇于糓十有二月公會齊侯盟于扈扈鄭地在榮陽巷縣西北二十七年六月公㑹齊侯宋公陳侯鄭伯同盟于幽陳鄭服也二十二年陳亂而齊納敬仲二十五年鄭文公之四年獲成于楚皆有二心于齊今始服也冬公會齊侯于城濮城濮衛地将討衛也二十八年秋荆伐鄭公會齊人宋人救鄭三十年冬公及齊侯遇于魯濟濟水歴齊魯界在齊界為齊濟在魯界為魯濟蓋魯地謀山戎也以其病燕故也齊桓行覇故欲為燕討難燕國今薊縣三十二年春齊侯為楚伐鄭之故請會于諸侯楚伐鄭在二十八年謀為鄭報楚宋公請先見于齊侯夏遇于梁丘齊善宋之請見故進其班梁丘在高平昌邑縣西南閔公元年八月公及齊侯盟于落姑落姑齊地請復季友也閔公初立國家多難以季子忠賢故請覇主而復之齊侯許之使召諸陳公次于郎以待之非師旅之事故不書次季子來歸嘉之也二年冬齊高子來盟蓋高傒也齊侯使來平魯亂僖公新立因遂結盟故不稱使也魯人貴之故不書名子男子之羙稱僖公元年八月公會齊侯宋公鄭伯曹伯邾人于檉檉宋地陳國陳縣西北有檉城盟于犖謀救鄭犖即檉也地有二名二年九月齊侯宋公江人黄人盟于貫服江黄也貫宋地梁國蒙縣西北有貫城貫與貰字相似江國在汝南安陽縣三年秋齊侯宋公江人黄人㑹于陽糓謀伐楚也陽糓齊地在東平須昌縣北二年楚侵鄭故齊侯為陽糓之㑹來尋盟冬公子友如齊蒞盟公時不會陽糓故齊侯自陽糓遣人詣魯求尋盟魯使上卿詣齊受盟謙也四年正月公會齊侯宋公陳侯衛侯鄭伯許男曹伯侵蔡蔡潰齊侯以諸侯之師伐楚師次于陘楚使屈完如師完及諸侯盟于召陵屈完楚大夫也楚子遣完如師以觀齊屈完覩齊之盛因而求盟故不稱使以完來盟為文齊桓退舍以禮楚故盟召陵召陵潁川冬十有二月公孫兹帥師會齊人宋人衛人鄭人許人曹人侵陳公孫兹叔牙子叔孫戴伯五年夏公及齊侯宋公陳侯衛侯鄭伯許男曹伯會王世子于首止惠王太子鄭也不名而書會尊之也首止衛地陳留襄邑縣東南有首鄉謀寧周也惠王以惠后故将廢太子鄭而立王子帶故齊桓帥諸侯會王太子以定其位八月諸侯盟于首止復稱諸侯者王世子不盟故也王之世子尊與王同齊桓行覇翼戴天子尊崇王室故殊貴世子鄭伯逃歸不盟六年夏公會齊侯宋公陳侯衛侯曹伯伐鄭以其逃首止之盟故也七年七月公會齊侯宋公陳世子欵鄭世子華盟于寗母謀鄭也高平方與縣東有泥母亭音如寗八年春王正月公㑹王人齊侯宋公衛侯許男曹伯陳世子欵盟于洮謀王室也王人與諸侯盟不譏者王室有難故洮曹地鄭伯乞盟請服也襄王定位而後發䘮王人會洮還而後王位定九年夏公㑹宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘尋盟且脩好禮也周公宰孔也宰官周采地天子三公不字宋子襄公也在䘮公侯曰子陳留外黄縣東有葵丘九月齊侯盟諸侯于葵丘曰凡我同盟之人既盟之後言歸于好義取修好故顯其盟辭宰孔先歸既㑹先諸侯去遇晉侯曰可無會也晉侯欲來會葵丘齊侯不務徳而勤逺略故北伐山戎在荘三十一年南伐楚在四年西為此會也東略之不知西則否矣言或向東必不能復西畧晉侯乃還不復會齊十三年夏公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯于鹹鹹衛地東郡濮陽縣東南有鹹城淮夷病杞故且謀王室也秋為戎難故諸侯戍周齊仲孫湫致之戍守也致諸侯戍卒于周十五年三月公會齊侯宋公陳侯衛侯鄭伯許男曹伯于牡丘牡丘地名尋葵丘之盟且救徐也十六年十二月公會齊侯宋公陳侯衛侯鄭伯許男邢侯曹伯于淮臨淮左右謀鄫且東略也鄫為淮夷所病故十九年夏六月宋公曹人邾人盟于曹南曹雖與盟而猶不服不肯致餼無地主之禮故不以國地而曰南鄫子會盟于邾不及曹南之盟諸侯既罷鄫乃會之于邾故不言如會冬會陳人蔡人楚人鄭人盟于齊地於齊齊亦與盟修桓公之好也二十年秋齊人狄人盟于邢為邢謀衛難也於是衛方病邢二十一年春宋人齊人楚人盟于鹿上鹿上宋地汝陰有原鹿縣宋為盟主故在齊人上以求諸侯於楚楚人許之公子目夷曰小國爭盟禍也宋其亡乎幸而後敗謂軍敗績秋宋公楚子陳侯蔡侯鄭伯許男曹伯會于盂盂宋地楚始與中國行禮會故稱爵二十五年冬衛人平莒于我十二月盟于洮脩衛文公之好且及莒平也莒以元年酈之役怨魯衛文公将平之未及而卒成公追成父志降名以行事故曰脩文公之好二十六年正月公會莒茲㔻公茲㔻時君之號莒夷無謚以號為稱寗荘子盟于向荘子寗速衛大夫向莒地尋洮之盟也二十七年十二月公會諸侯盟于宋諸侯伐宋公與楚有好而往會之非後期宋方見圍無嫌與盟故直以宋地二十八年二月晉侯齊侯盟于歛盂歛盂衛地衛侯請盟晉侯弗許四月晉楚戰于城濮鄉役之三月鄉猶屬也城濮役之前三月鄭伯如楚致其師為楚師既敗而懼使子人九行成于晉子人氏九名晉欒枝入盟鄭伯五月丙午晉侯及鄭伯盟于衡雍丁未晉侯獻楚俘于王衛侯聞楚師敗懼出奔楚遂適陳自襄牛出使元咺奉叔武以受盟奉使攝君事癸亥王子虎盟諸侯于王庭踐土宫之庭書踐土别於京師要言曰皆奨王室無相害也有渝此盟明神殛之俾隊其師無克祚國奨助也渝變也殛誅也俾使也隊隕也克能也及而𤣥孫無有老幼君子謂是盟也信合義信六月晉人復衛侯以叔武受盟于踐土故聼衛侯歸寗武子與衛人盟于宛濮武子寗俞也陳留長垣縣西南有宛亭近濮水曰天禍衛國君臣不恊以及此憂也衛侯欲與楚國人不欲故不和也今天誘其𠂻𠂻中也使皆降心以相從也不有居者誰守社稷不有行者誰扞牧圉牛曰牧馬曰圉不恊之故用昭乞盟於爾大神以誘天𠂻自今日已往既盟之後行者無保其力居者無懼其罪有渝此盟以相及也以惡相及明神先君是紏是殛國人聞此盟也而後不貳言叔武之賢寗俞之忠衛侯所以書復歸冬公會晉侯齊侯宋公蔡侯鄭伯陳子莒子邾子秦人于温討不服也討衛許二十九年夏公會王子虎晉狐偃宋公孫固齊國歸父陳轅濤塗秦小子憖盟于翟泉翟泉今雒陽城内大倉西南池水也尋踐土之盟且謀伐鄭也秦小子憖在蔡下者若宋向戌之後會卿不書罪之也晉侯始覇翼戴天子諸侯輯睦王室無虞而王子虎下盟列國以凟大典諸侯大夫上敵公侯虧禮傷敎故貶諸大夫諱公與盟在禮卿不會公侯會伯子男可也大國之卿當小國之君故可以會伯子男諸卿之見貶亦兼有此㑹故𫝊重發之三十二年夏狄有亂衛人侵狄狄請平焉秋衛人及狄盟不地者就狄廬帳盟文公元年秋公孫敖會晉侯于戚戚衛邑在頓丘衛縣西禮卿不會公侯春秋魯大夫皆不貶者據用魯史成文而已晉侯疆戚田故公孫敖會之晉取衛田正其疆界二年三月及晉處父盟處父為晉正卿不能䂓君以禮而親與公盟故貶其族族去則非卿故以微人常稱為耦以直厭不直不地者盟晉都晉人以公不朝來討公如晉四月晉使陽處父盟公以耻之以大夫盟欲以耻辱魯也六月公孫敖會宋公陳侯鄭伯及晉司空士縠盟于垂隴垂隴鄭地滎陽東有隴城士榖出盟諸侯受成於衛故貴而書名氏晉討衛故也討元年衛人伐晉士縠士蒍子書士縠堪其事也晉司空非卿也士縠能堪卿事故書三年春正月衛侯如陳拜晉成也二年陳侯為衛請成于晉冬晉人懼其無禮於公也請改盟改二年處父之盟公如晉及晉侯盟晉侯享公賦菁菁者莪菁菁者莪詩小雅取其既見君子樂且有儀荘叔以公降拜謝其以公比君子也曰小國受命於大國敢不慎儀君貺辭譲公登成拜俱還上成拜禮公賦嘉樂嘉樂詩大雅取其顯顯令徳宜民宜人受禄于天七年八月公會諸侯晉大夫盟于扈扈鄭地滎陽卷縣西有扈亭不分别書會人總言諸侯晉大夫盟者公後會而及其盟晉侯立故也冬徐伐莒莒人來請盟穆伯如莒蒞盟穆伯公孫敖八年冬十月壬午公子遂會晉趙盾盟于衡雍乙酉公子遂會雒戎盟于暴𫝊云晉人以扈之盟來討前年盟扈公後至冬襄仲會晉趙孟盟于衡雍報扈之盟也遂會伊雒之戎伊雒之戎将伐魯公子遂不及復君故專命與之盟書曰公子遂珍之也十年七月及蘇子盟于女栗女栗地名蘇子周卿士頃王新立故與魯盟親諸侯也十一年夏叔仲彭生會晉郤缺于承匡承匡宋地在陳留襄邑縣西彭生叔仲惠伯郤缺冀缺謀諸侯之從於楚者九年陳鄭及楚平十年宋聼楚命十三年冬公如晉朝且尋盟衛侯會公于沓沓地名請平于晉公還鄭伯會公于棐棐鄭地亦請平于晉公皆成之鄭衛二於楚故因公請平鄭伯與公宴于棐子家賦鴻鴈子家鄭大夫公子歸生也鴻鴈詩小雅義取諸侯哀鰥寡有征行之勞言鄭國寡弱欲使魯侯還晉恤之季文子曰寡君未免於此亦有同微弱之憂文子賦四月四月詩小雅義取行役踰時思祭祀不欲為還晉子家賦載馳之四章載馳詩鄘風之四章以下義取小國有急欲引大國以救助文子賦采薇之四章采薇詩小雅取其豈敢定居一月三㨗許為鄭還不敢安居鄭伯拜謝公為行公答拜十四年六月公會宋公陳侯衛侯鄭伯許男曹伯晉趙盾同盟于新城新城宋地在梁國穀熟縣西從於楚者服從楚者陳鄭宋十五年三月宋司馬華孫來盟華孫奉使隣國能臨事制宜至魯而後定盟故不稱使其官皆從故書司馬貴之也古之盟會必備威儀崇䞇幣賔主以成禮為敬故曰卿行旅從春秋時率多不能備威儀華孫能率其屬以從古典所以敬事而自重使重而敬事則魯尊而體篤故貴而不名公與之宴辭曰君之先臣督得罪於宋殤公名在諸侯之策臣承其祀其敢辱君耦華督魯孫也督殺殤公在桓二年耦自以罪人子孫故不敢屈魯君對共宴㑹請承命於亞旅亞旅上大夫魯人以為敏無故掦其先祖之罪是不敏魯人以為敏明君子所不與也六月晉以新城之盟在前年蔡人不與不會盟晉郤缺以上軍下軍伐蔡兼帥二軍曰君弱不可以怠怠懈也戊申入蔡以城下之盟而還十一月晉侯宋公衛侯蔡侯陳侯鄭伯許男曹伯盟于扈尋新城之盟且謀伐齊也齊執王使且數伐魯齊人賂晉侯故不克而還於是有齊難是以公不會明今不序諸侯不以公不㑹故書曰諸侯盟于扈無能為故也惡其受賂不能討齊十六年正月及齊平齊前年再伐魯魯為受弱故平公有疾使季孫行父季文子會齊侯于陽糓請盟齊侯不肯曰請俟君間間疾瘳公使襄仲納賂于齊侯故盟于郪丘郪丘齊地十七年四月齊侯伐我北鄙襄仲請盟六月盟于糓晉不能救魯故請服六月晉侯蒐于黄父一名黒壤晉地遂復合諸侯于扈平宋也傳不列諸侯而言復合則如上十五年會扈之諸侯可知也公不與會齊難故也十月襄仲如齊拜糓之盟宣公元年夏季文子如齊納賂以請會宣公篡立未列於會故以賂請之公會齊侯會於平州平州齊地在泰山牟縣西以定公位篡立者諸侯既與之會則不得復討臣子殺之與弑君同故公與齊會而位定東門襄仲如齊拜成也謝得會宋人之弑昭公也在文十六年晉荀林父以諸侯之師伐宋宋及晉平宋文公受盟于晉又會諸侯于扈将為魯討齊皆取賂而還文十五年十七年二扈之盟皆受賂鄭穆公曰晉不足與也遂盟于楚三年春齊侯伐鄭及郔鄭及晉平士㑹入盟郔鄭地為夏楚侵鄭傳七年春衛侯使孫良夫來盟孫桓子也始通且謀會晉也公即位衛始修好鄭及晉平公子宋之謀也故相鄭伯以會冬盟于黒壤王叔桓公臨之以謀不睦王叔桓公周卿士銜天子之命以監臨諸侯不同㰱者尊卑之别也晉侯之立也在二年公不朝焉又不使大夫聘晉人止公于會盟于黄父公不與盟以賂免黄父即黒壌也故黒壤之盟不書諱之也慢盟主以取執止之辱故諱之九年九月晉侯宋公衛侯鄭伯曹伯會于扈討不睦也謀齊陳十一年夏楚子陳侯鄭伯盟于辰陵楚復伐鄭故受盟也辰陵陳地潁川長平縣東南有辰亭陳鄭服也言楚與晉狎主盟秋晉侯會狄于欑函郤成子求成于衆狄衆狄疾赤狄之役遂服于晉赤狄潞氏最強故服役衆狄會于欑函衆狄服也欑函狄地十二年十二月晉人宋人衛人曹人同盟于清丘晉衛背盟故大夫稱人宋華椒承羣偽之言以誤其國宋雖有守信之善而椒猶不免譏清丘衛地在今濮陽縣東南曰恤病討貳於是卿不書不實其言也宋伐陳衛救之不討貳也楚伐宋晉不救不恤病也宋為盟主故伐陳陳貳於楚故衛人救之孔逹曰先君有約言焉若大國討我則死之衛成公與陳共公有舊好故孔逹欲背盟救陳而以死謝晉十四年衛殺孔逹十三年夏楚子伐宋以其救蕭救蕭在前年君子曰清丘之盟唯宋可以免焉宋討陳之貳今宋見伐晉衛不頋盟以恤宋而春秋貶宋大夫傳嫌華椒之罪累及其國故曰唯宋可以免十四年冬公孫歸父會齊侯于糓十五年春公孫歸父會楚子于宋五月楚師伐宋宋人懼使華元夜入楚師登子反之牀起之曰寡君使元以病告兵法因其鄉人而用之必先知其守将左右謁者門者舍人之名因而利道之華元蓋用此術得以自通曰敝邑易子而食析骸以㸑㸑炊也雖然城下之盟有以國斃不能從也寧以國斃不從城下之盟去我三十里唯命是聼子反懼與之盟而告王退三十里宋及楚平華元為質盟曰我無爾詐爾無我虞楚不詐宋宋不備楚秋仲孫蔑會齊高固于無婁無婁杞邑十七年六月公會晉侯衛侯曹伯邾子同盟于斷道斷道晉地討貳也十八年春齊侯會晉侯盟于繒以公子彊為質于晉晉師還蔡朝南郭偃逃歸晉既與齊盟守者解緩故得逃成公元年夏臧孫許及晉侯盟于赤棘晉地與晉盟懼齊楚二年六月季孫行父臧孫許叔孫僑如公孫嬰齊帥師會晉郤克衛孫良夫曹公子首及齊侯戰于鞌齊師敗績七月齊侯使國佐如師己酉及國佐盟于袁婁鞌去齊五百里袁婁去齊五十里使齊人歸我汶陽之田公會晉師于上鄍上鄍地名冬楚侵魯及楊橋孟孫請往賂之楚侵遂深故孟孫請以賂往孟孫獻子也以執斵執鍼織絍執斵匠人執鍼女工織絍織繒布者皆百人公衡為質公衡成公子以請盟楚人許平十一月公會楚公子嬰齊于蜀公與大夫會不貶嬰齊者時有許蔡之君故然也丙申公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人鄫人盟于蜀齊在鄭下非卿傳所謂卿不書匱盟也然則楚於是始與中國準自此以下楚不書卿貶惡也卿不書匱盟也於是乎畏晉而竊與楚盟故曰匱盟匱乏也蔡侯許男不書乘楚車也謂之失位乘楚王車為左右則失位也卿不書則稱人諸侯不書君臣之别三年十一月晉侯使荀庚來聘且尋盟尋元年赤棘盟荀庚林父之子衛侯使孫良夫來聘且尋盟尋宣七年盟公問諸臧宣叔曰中行伯之於晉也其位在三下卿孫子之於衛也位為上卿将誰先對曰次國之上卿當大國之中中當其下下當其上大夫降一等小國之上卿當大國之下卿中當其上大夫下當其下大夫降大國二等上下如是古之制也古制公為大國侯伯為次國子男為小國衛在晉不得為次國春秋時以强弱為大小故衛雖侯爵猶為小國晉為盟主其将先之訃等則二人位敵以盟主故先晉丙午盟晉丁未盟衛禮也五年十二月公會晉侯齊侯宋公衛侯鄭伯曹伯邾子杞伯同盟于蟲牢蟲牢鄭地陳留封丘縣北有桐牢鄭服也諸侯謀復會宋公使向為人辭以子靈之難子靈圍龜也宋公不欲㑹以新誅子靈為辭為明年侵宋傳七年秋楚公子嬰齊帥師伐鄭公會晉侯齊侯宋公衛侯曹伯莒子邾子杞伯救鄭八月同盟于馬陵馬陵衛地陽平元城縣東南有地名馬陵尋蟲牢之盟且莒服故也蟲牢盟在五年莒本屬齊齊服故莒從之九年正月公會晉侯齊侯宋公衛侯鄭伯曹伯莒子杞伯同盟于蒲蒲衛地在長垣縣西南為歸汶陽之田故諸侯貳於晉歸田在前年晉人懼會于蒲以尋馬陵之盟馬陵盟在七年季文子謂范文子曰徳則不競尋盟何為競強也范文子曰勤以撫之寛以待之堅彊以御之明神以要之柔服而伐貳徳之次也是行也将始會吳吳人不至十年五月公會晉侯齊侯宋公衛侯曹伯伐鄭晉侯太子州蒲也稱爵見其生代父居位失人子之禮為晉立太子州蒲以為君故會諸侯伐鄭生立子為君父不父子不子書晉侯其惡明鄭子罕賂以襄鐘子罕穆公子襄鐘鄭襄公之廟鍾子然盟于脩澤子駟為質子然子駟皆穆公子滎陽卷縣東有脩武亭辛巳鄭伯歸十一年春公至自晉晉人以公為貳於楚故止公公請受盟而後使歸前年七月如晉弔至是乃得歸三月晉侯使郤犫來聘己丑及郤犫盟郤犫郤克從父兄弟夏季文子如晉報聘且蒞盟也郤犫文子交盟魯晉之君其意一也故但書來盟舉重畧輕冬宋華元如楚遂如晉克合晉楚之成為明年盟宋西門外張本秦晉為成将會於令狐晉侯先至焉秦伯不肯涉河次于王城使史顆盟晉侯于河東史顆秦大夫晉郤犫盟秦伯于河西就王城范文子曰是盟也何益齊盟所以質信也齊一心質成也會所信之始也始之不從其可質乎秦伯歸而背晉成十二年五月晉士爕會楚公子罷許偃二子楚大夫癸亥盟于宋西門之外曰凡晉楚無相加戎好惡同之同恤菑危備救凶患若有害楚則晉伐之在晉楚亦如之交䞇往來道路無壅䞇幣也謀其不恊而討不庭討背叛不來王庭者有渝此盟明神殛之殛誅也俾隊其師無克胙國俾使也隊失也鄭伯如晉聼成聼猶受也晉楚既成鄭往受命會于𤨏澤成故也晉既與楚成合諸侯以申成好冬楚公子罷如晉聘且蒞盟報郤至十二月晉侯及楚公子罷盟于赤棘赤棘晉地十五年三月公會晉侯衛侯鄭伯曹伯宋世子成齊國佐邾人同盟于戚討曹成公也討其殺太子而自立其事在十三年十六年春楚子自武城使公子成以汝陰之田求成于鄭汝水之南近鄭地鄭叛晉子駟從楚子盟于武城為晉伐鄭起秋公會晉侯齊侯衛侯宋華元邾人于沙隨沙隨宋地梁國寧陵縣北有沙隨亭不見公不及䣕陵戰故不諱者耻輕於執止公會尹子晉侯齊國佐邾人伐鄭尹子王卿士子爵十二月季孫行父晉郤犫盟于扈晉許魯平故盟十七年夏公會尹子單子晉侯齊侯宋公衛侯曹伯邾人同盟于柯陵柯陵鄭西地尋戚之盟也冬公會單子晉侯宋公衛侯曹伯齊人邾人伐鄭十八年十二月仲孫蔑會晉侯宋公衛侯邾子齊崔杼同盟于虚朾虚朾地闕謀救宋也襄公元年春仲孫蔑會晉欒黶宋華元衛寗殖曹人莒人邾人滕人薛人圍宋彭城二年七月仲孫蔑會晉荀罃宋華元衛孫林父曹人邾人于戚謀鄭故也冬崔武子及滕薛小邾之大夫復會于戚知武子之言也武子言事将在齊齊人懼帥小國而會之遂城虎牢鄭人乃成三年四月公及晉侯盟于長樗晉侯出其國都與公盟于外孟獻子相公稽首相儀也稽首首至地知武子曰天子在而君辱稽首寡君懼矣稽首事天子之禮孟獻子曰以敝邑介在東表宻邇仇讐仇讐謂齊楚與晉爭寡君将君是望敢不稽首言獻子能固事盟主晉為鄭服故且欲修吳好鄭服在前年将合諸侯使士匄告于齊曰寡君使匄以歲之不易不虞之不戒寡君願與一二兄弟相見不易多難也虞度也戒備也列國之君相謂兄弟以謀不恊請君臨之使匄乞盟齊侯欲勿許而難為不恊乃盟于耏外與士匄盟耏水名六月公會單頃公及諸侯己未同盟于鷄澤單頃公王卿士晉侯使荀㑹逆吳子於淮上吳子不至道逺多難楚子辛為令尹侵欲於小國陳成公使袁僑如會求成患楚侵欲袁僑濤塗四世孫晉侯使和組父告于諸侯告陳服秋叔孫豹及諸侯之大夫及陳袁僑盟陳請服也其君不來使大夫盟之匹敵之宜五年夏仲孫蔑衛孫林父會吳于善道初吳子使壽越如晉壽越大夫辭不會于雞澤之故三年㑹雞澤吳不至今來謝之且請聼諸侯之好更請㑹晉人将為之合諸侯使魯衛先會吳且告會期以其道逺故使魯衛先告期二大夫皆受晉命而會吳九月盟于戚會吳且命戍陳也公及其㑹而不書盟非公後㑹蓋不以盟告廟穆叔以屬鄫為不利使鄫大夫聼命于會鄫近魯境故欲以為屬國既而與莒有忿魯不能救恐致譴責故復乞還之七年十月衛孫文子來聘且拜武子之言緩報非貳之言而尋孫桓子之盟盟在成三年公登亦登禮登階臣後君一等叔孫穆子相趨進曰諸侯之會寡君未嘗後衛君敵禮竝登今吾子不後寡君寡君未知所過吾子其少安安徐也孫子無辭亦無悛容悛改也穆叔曰孫子必亡為臣而君過而不悛亡之本也詩曰退食自公委蛇委蛇委蛇順貎詩召南言人臣自公門入私門無不順禮謂從者也從順也衡而委蛇必折衡横也横不順道必毁折八年五月季孫宿會晉侯鄭伯齊人宋人衛人邾人于邢丘時公在晉晉悼難勞諸侯唯使大夫聼命故季孫在㑹而公先歸以命朝聘之數使諸侯之大夫聼命鄭伯獻㨗于會故親聼命獻蔡㨗也九年冬公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光伐鄭甲戌師于汜衆軍還聚汜汜鄭地東汜令於諸侯曰修噐備兵噐戰備盛餱糧餱乾食歸老㓜示将乆師居疚于虎牢諸侯己取鄭虎牢故使諸軍疾病息其中肆眚圍鄭肆緩也𤯝過也不書圍鄭逆服不成圍鄭人恐乃行成與晉成也中行獻子曰遂圍之以待楚人之救也而與之戰不然無成獻子荀偃也恐楚救鄭復屬之知武子曰許之盟而還師以敝楚人敝罷也吾三分四軍分四軍為三部與諸侯之銳以逆來者來者楚也於我未病楚不能矣晉各一動而楚三來故曰不能猶愈於戰勝聚戰暴骨以逞不可以爭言爭當以謀不可以暴骨大勞未艾君子勞心小人勞力先王之制也艾息也言當從勞心之勞諸侯皆不欲戰乃許鄭成十二月同盟于戲鄭服也鄭服故言同将盟鄭六卿公子騑子駟公子發子國公子嘉子孔公孫輒子耳公孫蠆子蟜公孫舎之子展及其大夫門子皆從鄭伯門子卿之適子晉士荘子為載書荘子士弱載書盟書曰自今日既盟之後鄭國而不唯晉命是聼而或有異志者有如此盟如違盟之罰公子騑趨進曰天禍鄭國使介居二大國之間介猶間也大國不加徳音而亂以要之謂以兵亂之力强要鄭使其鬼神不獲歆其禋祀其人民不獲享其土利夫婦辛苦墊隘無所底告墊隘猶委頓底至也自今日既盟之後鄭國而不唯有禮與彊可以庇民者是從而敢有異志者亦如之亦如此盟荀偃曰改載書子駟亦以所言載於策故欲改之公孫舍之曰昭大神要言焉要誓以告神若可改也大國亦可叛也知武子謂獻子曰我實不徳而要人以盟豈禮也哉非禮何以主盟姑盟而退修徳息師而來終必獲鄭何必今日我之不徳民将棄我豈唯鄭若能休和逺人将至何恃於鄭乃盟而還遂兩用載書十二月楚子伐鄭與晉成故子駟将及楚平子孔子蟜曰與大國盟口血未亁而背之可乎子駟子展曰吾盟固云唯彊是從今楚師至晉不我救則楚彊矣盟誓之言豈敢背之且要盟無質神弗臨也質主也所臨唯信信者言之瑞也瑞符也善之主也是故臨之神臨也明神不蠲要盟蠲潔也背之可也乃及楚平公子罷戎入盟同盟於中分中分鄭城中里名罷戎楚大夫十年春公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光會吳于柤吳子在柤晉以諸侯往會之故曰會吳吳不稱子從所稱也柤楚地會吳子壽夣也壽夢呉子乘十一年四月公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭鄭人懼乃行成秋七月同盟于亳范宣子曰不慎必失諸侯慎敬威儀謹辭令諸侯道敝而無成能無貳乎數伐鄭皆罷于道路乃盟載書曰凡我同盟無蕰年蕰積年糓而不分災毋壅利専山川之利母保姦藏罪人母留慝速去惡救災患恤禍亂同好惡奨王室奬助也或間茲命司慎司盟名山名川二司天神羣臣羣祀羣祀在祀典者先王先公先王諸侯之大祖宋祖帝乙鄭祖厲王之比也先公始封君七姓十二國之祖七姓晉魯衛鄭曹滕姬姓邾小邾曹姓宋子姓齊姜姓莒己姓杞姒姓薛任姓實十三國言十二誤也明神殛之殛誅也俾失其民隊命亡氏踣其國家踣斃也九月諸侯悉師以復伐鄭諸侯之師觀兵于鄭東門鄭人使王子伯駢行成甲戌晉趙武入盟鄭伯冬十月丁亥鄭子展出盟晉侯二盟不書不告十二月戊寅會于蕭魚經書秋史失之庚辰赦鄭囚皆禮而歸之納斥候不相備也禁侵掠十四年正月季孫宿叔老會晉士匄齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人會吳于向叔老聲伯子也魯使二卿會晉敬事覇國晉人自是輕魯幣而益敬其使故叔老雖介亦列於㑹也齊崔杼宋華閱衛北宫括在㑹惰慢不攝故貶稱人蓋欲以督率諸侯奨成覇功也吳來在向諸侯會之故曰會吳向鄭地為吳謀楚故也謀為吳伐楚范宣子數吳之不徳也以退吳人吳伐楚䘮故以為不徳數而遣之卒不為伐楚将執戎子駒支駒支戎子名范宣子親數諸朝行之所在亦設朝位曰來姜戎氏昔秦人廹逐乃祖吾離于𤓰州四嶽之後皆姜姓又别為允姓𤓰州地在今燉煌乃祖吾離被苫蓋蓋苫之别名蒙荆棘以來歸我先君蒙冒也我先君惠公有不腆之田腆厚也與女剖分而食之中分為剖今諸侯之事我寡君不若昔者蓋言語漏洩則職女之繇職主也詰朝之事爾無與焉詰朝明旦不使復得與會事與将執女對曰昔秦人負恃其衆貪于土地逐我諸戎惠公蠲其大徳蠲明也謂我諸戎是四嶽之裔胄也四嶽堯時方伯姜姓也裔逺也胄後也毋是翦棄翦削也賜我南鄙之田狐貍所居豺狼所嘷我諸戎除翦其荆棘驅其狐貍豺狼以為先君不侵不叛之臣至于今不貳不内侵亦不外叛昔文公與秦伐鄭秦人竊與鄭盟而舎戍焉在僖三十年於是乎有殽之師在僖三十三年晉禦其上戎亢其下亢猶當也秦師不復我諸戎實然譬如捕鹿晉人角之諸戎犄之犄其足也與晉踣之踣僵也戎何以不免自是以來晉之百役與我諸戎相繼于時言給晉役不曠時以從執政猶殽志也意常如殽無中二也豈敢離逷今官之師旅無乃實有所闕以攜諸侯而罪我諸戎我諸戎飲食衣服不與華同䞇幣不通言語不達何惡之能為不與於會亦無瞢焉瞢悶也賦青蠅而退青蠅詩小雅取其愷悌君子無信讒言宣子辭焉辭謝使即事於會成愷悌也成愷悌不信讒言不書者戎為晉屬不得特達於是子叔齊子為季武子介以會自是晉人輕魯幣而益敬其使齊子叔老字也言晉敬魯使經所以竝書二卿冬季孫宿會晉士匄宋華閱衛孫林父鄭公孫蠆莒人邾人于戚十五年春正月宋公使向戌來聘二月己亥及向戌盟于劉十六年三月公會晉侯宋公衛侯鄭伯曹伯莒子邾人薛伯杞伯小邾子于溴梁不書髙厚逃歸故也溴水出河内軹縣東南至温入河戍寅大夫盟諸大夫本欲盟髙厚高厚逃歸故遂自共盟雞澤會重序諸侯今此間無異事即上諸侯大夫可知晉侯與諸侯宴于温使諸大夫舞曰歌詩必類歌古詩當使各從義類齊高厚之詩不類齊有二心故荀偃怒且曰諸侯有異志矣使諸大夫盟高厚高厚逃歸齊為大國高厚若此知小國必當有從者於是叔孫豹晉荀偃宋向戌衛寗殖鄭公孫蠆小邾之大夫盟曰同討不庭自曹以下大夫不書故傳舉小邾以包之十九年春諸侯還自沂上盟于督揚曰大毋侵小督揚即祝柯也執邾悼公以其伐我故遂次于泗上疆我田正邾魯之界也泗水名取邾田自漷水歸之于我十一月齊及晉平盟于大隧大隧地名故穆叔會范宣子于柯齊晉平魯懼齊故為柯㑹以自固穆叔見叔向賦載馳之四章四章曰控于大邦誰因誰極控引也取其欲引大國以自救助叔向曰肸敢不承命叔向度齊未肯以盟服故許救魯穆叔歸曰齊猶未也不可以不懼乃城武城册府元龜卷二百四十六
