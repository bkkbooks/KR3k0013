body:
  text: 冊府元龜卷二百二十九宋王欽若等撰僣偽部政治求諫聴納政治三代之道不可尚已一國之風有足觀者盖為政之本在人則舉矣自五馬南渡六胡亂華國異政家殊俗法禁賦歛猶議其重輕武事文經各立乎制度故能摠攬賢俊修定律令俾夫一方之氓知所歸嚮四境之内咸致樂康子皮曰國無小夫子曰雖蠻貊之邦行之矣信哉前凉張軌為凉州刺史威著西州化行河右中州避難来者日月相繼分武威置武興郡以居之張駿為凉州牧下令境中曰昔鯀殛而禹興芮誅而缺進唐帝所以殄洪災晉侯所以成五覇法律犯死罪朞親不得在朝今盡聴之唯不宜内參宿衛耳於是刑清國富駿有計畧勤修庶政總御文武咸得其用逺近嘉詠號曰積賢君自軌據凉州屬天下之亂所在征伐軍無寧嵗至駿境内漸平張重華自稱假凉王輕賦歛除闗稅省園囿以恤孤窮西凉李暠自稱秦凉二州牧於南門外臨水起堂名曰靖恭之堂以議朝政閱武事圖讃自古聖帝明王忠臣孝子烈士貞女暠親為序頌以明鑒戒之義當時文武群僚亦皆圖焉有白雀翔于靖恭堂暠觀之大恱又起嘉納堂於後園以圖讃所志暠既遷酒泉乃敦勸稼穡群僚以年榖頻登百姓樂業請勒銘酒泉暠許之前趙劉聰初置相國官上公有殊勲徳者死乃贈之於是大定百官置太師丞相自大司馬以上七公位禄綟綬逺㳺冠置輔漢都䕶中軍上軍輔軍鎮衛前後左右上下軍輔國冠軍龍驤武牙大将軍營各配兵二千皆以諸子為之置左右司𨽻各領戸二十餘萬萬戸置一内史凡内史四十三單于左右輔各主六夷十萬落萬落置一都尉省吏部置左右選曹尚書自司𨽻以下六官皆位次僕射置御史大夫及州牧位皆亞公劉曜襲偽位省鄷水囿以與貧戸禁無官者不聴乗馬禄八百石以上婦女乃得衣錦繡自季秋農功畢乃聴飲酒宗廟社稷之祭不得殺牛犯者皆死後趙石勒初為趙王下書曰今大亂之後律令滋煩其採集律令之要為施行條制於是命法曹令史貫志造辛亥制度五千文施行十餘嵗乃用律令後依春秋列國漢初侯王毎世稱元胡人出内重其禁法不得侮易衣冠華族號胡為國人署前將軍李寒領司兵勲教國子撃刺騎射之法又下書禁國人不聴報嫂及在䘮婚娶其燒𦵏令如本俗又清定五品以張賓領選復續定九品署張班為左執法郎孟卓為右執法郎典定士族副選舉之任令羣寮及州郡縣嵗各舉秀才至孝㢘清賢良直言武勇之士各一人置都部從事各一部一州秩二千石職凖丞相司直又以百姓復業資儲未豐於是重制禁釀郊祀宗廟皆以醴酒行之數年無釀者又令州郡有墳發掘不掩覆者推劾之骸骨暴露者縣為備棺衾之具以牙門将王波為記室参軍典定九流始立秀孝試經之制及僣稱天王行皇帝事下書曰自今有疑難大事八座及委丞郎齎詣東堂詮評平决其有軍國要務湏唘自今僕射尚書随局入陳勿避寒暑昏夜也勒既僣即皇帝位下書曰自今諸有處法􅊖依科令吾所忿戮怒發中旨者若徳位已髙不宜刑罰或服勤死事之孤邂逅罹譴門下皆各列奏之吾當思擇而行也又禁州郡諸祠堂非正典者皆除之其能興雲致雨有益于百姓者郡縣更為立祠堂殖嘉樹凖嶽瀆已下為差等又下書令公卿百寮嵗薦賢良方正直言秀異至孝㢘清各一人荅䇿上第者拜議郎中第中郎下第郎中其舉人得逓相薦引廣招賢之路石季龍僣稱居攝趙天王始制散騎常侍已上得乗軺軒王公郊祀乗副車駕四馬龍旂八旒朔望朝㑹節乗軺軒季龍如長樂衛國有田疇不闢農業不修者貶其守宰而還禁郡國不得私學星䜟敢有犯者誅後稱大趙天王以吏部選舉斥外耆徳而勢門童幼多為美官免郎中魏㚟為庶人時豪戚侵恣賄託公行季龍患之擢殿中侍御史李巨為御史中丞特親任之自此百寮震懾州郡肅然前燕慕容廆初為大單于時二京傾覆幽冀淪䧟廆刑政修明虚懐引納流亡士庶多襁負歸之廆乃立郡以統流人冀州人為冀陽郡豫州人為成周郡青州人為營丘郡并州人為唐國郡廆嘗從容言曰獄者人命之所懸也不可以不慎賢人君子國家之基也不可以不敬稼穡國之本也不可以不急酒色便佞亂徳之甚也不可以不戒乃著家令數千言以申其旨慕容皝嗣廆位籍田於朝陽門東置官司以主之立納諌之木以開讜言之路以乆旱丐百姓田租前秦苻健僣即帝位起靈䑓於杜門與百姓約法三章薄賦卑宫垂心政事優禮耆老修尚儒學而闗右稱來蘓焉苻堅僣號大秦天王於是修廢職繼絶世禮百神課農桑立學校其殊才異行孝友忠義徳業可稱者令所在以聞又遣使廵行四方觀風俗問政道明黜陟恤孤獨不能自存者及戎狄種落州郡有髙年孤寡不能自存長吏刑罰失中為百姓所苦清修疾惡勸課農桑有便於俗篤學至孝義烈力田者皆令具條以聞堅以王猛卒置聴訟觀於未央之南禁老莊圖䜟之學後秦姚萇僣即帝位自長安還安定修徳政而行恵化省非急之費以救時弊閭閻之士有亳介之善者皆顯異之及破苻登後下書兵吏從征伐戸在大營者世世復其家無所豫将帥死王事者加秩二等士卒戰沒皆有褒贈下書有復私仇者誅之將吏亡沒者各随所親以立後賑給長育之又下書除妖謗之言及赦前姦穢有相劾舉者皆以其罪罪之姚興襲偽位令郡國各嵗貢清行孝㢘一人下書禁百姓造錦繡及淫祀又下書令士卒戰亡者守宰所在埋藏之求其近親為之立後又班命郡國百姓因荒自賣為奴婢者悉免為良人始平太守周班槐里令李􅒷皆以黷貨誅於是郡國肅然矣興下書聴祖父母昆弟得相容隐命百寮舉殊才異行之士刑政有不便於時者皆除之立律學於長安召郡縣散吏以授之其通明者還之郡縣論决刑獄若州郡縣所不能决者讞之廷尉興嘗臨諮議堂聴斷疑獄于時號無寃滯興下書將帥遭大䘮非在疆場險要之所皆聴奔赴及朞乃從王役臨戎遭䘮聴假百日若身為邉將家有大變交代未至敢輒去者以擅去官之罪罪之姚泓既襲偽位下書士卒死於王事贈以爵位永復其家後蜀李特自稱使持節大都督承制封拜時益州刺史羅尚貪殘為百姓患而特與蜀人約法三章施捨賑貸禮賢㧞滯軍政肅然百姓為之謡曰李特尚可羅尚殺我李雄僣稱成都王除晉法約法七章雄性寛厚簡刑約法甚有名稱氐苻成文隗既降復叛手傷雄母及其来也咸釋其罪厚加待納繇是夷夏安之威震西土時海内大亂而蜀獨無事故歸之者相尋其賦男丁嵗榖三斛女丁半之戸調絹不過數丈綿數兩事少役稀百姓富實閭門不閉無相侵盗後燕慕容盛僣即帝位有犯罪者十日一自决之無撾捶之罰而獄情多實後去皇帝之號稱庶人大王引見百寮於東堂考詳器藝超㧞者十有二人命有司舉文武之士才堪佐世者各一人北燕馮跋僣稱天王下書曰自頃多故事難相尋賦役繁苦百姓困窮宜加寛宥務從簡易前朝苛政皆悉除之守宰當垂仁恵無得侵害百姓蘭臺都官明加澄察分遣使者廵行郡國觀察風俗孤老乆疾不能自存者賑榖帛有差孝悌力田閨門和順者皆褒顯之每遣守宰必親見東堂問為政之要令極言無隐以觀其志於是朝野競勸焉又下書曰聖人制禮送終有度重其衣衾厚其棺槨将何用乎人之亡也精魂上歸於天骨肉下歸扵地朝終夕壊無寒煖之期衣以綿綉服以羅紈寧有知哉厚於送終貴而改𦵏皆無益亡者有損於生是以祖考因舊立廟皆不改營陵寢申下境内自今皆令奉之南燕慕容徳僣即位於廣固遣其度支尚書封愷中書侍郎封逞觀省風俗所在大饗將士北凉沮渠蒙遜僣稱河西王命征南姚艾尚書左丞房咎撰朝堂制行之旬月百寮振肅及尅酒泉百姓安堵軍無私焉閩王審知起自壠畆以至富貴每以節儉自處選任良吏省刑惜費輕徭薄斂與民休息三十年間一境晏然求諌經曰士有爭友則身不離於令名父有爭子則身不陥於不義况僣其位號據有邦域䖍鞏於强大恐懼乎闕漏者也而有下令求言樹鼓招諌懸封爵箱篚之科級俟工瞽士農之損益信而克行豈不盛哉前凉張寔既襲父位為凉州牧下令國中曰忝紹前蹤庶事有缺竊慕箴誦之言以補不逮自今有靣刺孤罪者酬以束帛翰墨陳孤過者荅以箱篚謗言於市者報以羊米後趙石勒偽稱趙王令逺近牧守宣告屬城諸所欲言靡有隐諱使知區區之朝虚渇讜言也及僣即帝位以日蝕避正殿三日令群公卿士各上封事石季龍僣襲趙天王時白虹出自大社經鳳陽門東南連天十餘刻乃滅季龍下書曰盖古明王之理天下也政以均平為首化以仁恵為夲故能允協人和緝熈神物朕以𦕈薄君臨萬邦夕惕乾乾思遵古烈是以每下書蠲除徭賦休息黎元庶俯懐百姓仰禀三光而中年已來變眚彌顯天文錯亂時氣不應斯繇人怨于下譴感皇天雖朕之不明亦羣后不能翼奨之所致也昔楚相修政洪災旋弭鄭卿厲道氛祲自消皆股肱之良用康羣變而羣公卿士各懐道迷邦拱黙成敗豈所望於台輔百司哉其各上封事極言無隐前燕慕容皝初為大單于立納諌之木以開讜言之路及僣即王位以牧牛給貧家田于苑中公收其八二分入私記室参軍封裕諌之皝賜裕錢五萬明宣内外有欲陳孤過者不拘貴賤勿有所諱後秦姚泓僣即帝位令文武各盡直言政有不便扵時事有光益宗廟者極言勿有所諱後蜀李夀僣即帝位大風暴雨震其端門夀深自悔責命羣司極盡忠言勿拘忌諱南凉秃髮利鹿孤僣稱西凉王謂其羣下曰吾無經濟之才忝承業統自負乗在位三載于茲雖夙夜惟寅思𢎞道化而刑政未能允中風俗尚多凋弊戎事屡駕無闢境之功務進賢彦而下猶蓄滯豈所任非才将吾不明所致也二三君子其極言無諱吾将覧焉北凉沮渠蒙遜自稱凉州牧下令曰養老乞言晉文納輿人之誦所以能招禮英彦致時雍之美况孤寡徳智不經逺而可不思聞讜言以自鏡哉内外羣寮其各捜揚賢俊廣進蒭蕘以救孤不逮聴納典午之中圯也藩籬非固姦宄並作亂華干紀竊號假名據千里之疆僣稱我理感一顧之士各為其主日尋戈㦸専用狙詐戰謀國體自任其胸臆庭諍庶議尚資於豪傑若乃動有過舉事非乗便激切以規正周旋以引喻而能遷思廽慮虚受兼容雖不足徴亦各從其類者也前凉張寔為凉州牧賊曹佐髙昌隗瑾進言曰聖王將舉大事必崇三訊之法朝置諌官以佐大理凝丞輔弼以補闕拾遺今事無巨細盡决聖慮興軍布令朝中不知若有謬闕則下無分謗竊謂宜偃聰塞智開納群言政刑大小與衆共知若常内斷聖心則羣寮畏威而靣從矣善惡専歸於上雖賞千金終無言也寔納之増位三等賜帛四十疋張駿寔之弟為凉州牧時劉曜東討石生長安空虚大蒐講武將襲秦雍理曹郎中索詢諌曰曜雖東征劉𦙍猶守夲險阻路遥為主人甚易𦙍若輕騎憑氐羌以距我者則奔突難測輟彼東合而逆戰者則冦我未已頃年頻出戎馬生郊外有饑羸内資虚耗豈是殿下子物之謂耶駿曰每患忠言不獻靣從背違吾政教缺然而莫我救者卿盡辭規諌深副孤之所望以羊酒禮之駿境内嘗大饑榖價踊貴市長譚詳請出倉榖與百姓秋收三倍徴之從事隂據諌曰昔西門豹宰鄴積之於人觧扁蒞東封之邑計入三倍文侯以豹有罪而可賞扁有功而可罰今詳欲因人之乏饑要三倍之利反裘傷皮未足喻之駿納之駿議欲嚴刑峻制衆咸以為宜参軍黄斌進曰臣未見其可駿問其故斌曰夫法制所以經綸邦國篤俗齊物既立必行不可窪隆也若尊者犯令則法不行矣駿屏机改容曰夫法唯上行制無髙下且㣲黄君吾不聞過矣黄君可謂忠之至也於是擢為燉煌太守又辛晏阻兵於枹罕駿讌羣寮于閒豫堂命竇濤等進討辛晏從事劉慶諌曰霸王不以喜怒興師不以乾沒取勝必湏天時人事然後起也辛晏父子安忍凶狂其亡可待奈何以饑年大舉猛寒攻城昔周武廽戈以湏亡殷之期曹公緩袁氏使自斃何獨殿下以旋兵為恥乎駿納之張重華駿之子為凉州牧假凉王石季龍將麻秋乆據枹罕有衆十二萬進屯河内遣王擢畧地晉興廣武越洪池嶺至於曲栁姑臧大震重華議欲親出距之謝艾固諌以為不可别駕從事索遐進曰賊衆甚盛漸逼京畿君者國之鎮也不可以親動左長史謝艾文武兼資國之方召宜委以推轂之任殿下居中作鎮授以筭畧小賊不足平也重華納之前趙劉元海僣即漢王位都離石㑹嵗大饑遷于黎亭以就邸閣榖留其太尉劉宏䕶軍馬景守離石使大司農卜豫運粮以給之以其前将軍劉景為使持節征討大都督大將軍要撃并州刺史劉琨于版橋為琨所敗琨遂據晉陽其侍中劉殷王育進諌元海曰殿下自起兵以来漸已一周而顓守偏方王威未震誠能命将四出决機一擲梟劉琨定河東建帝號鼔行而南尅長安而都之以闗中之衆席卷雒陽如指掌耳此髙皇帝之所以創唘鴻基尅殄彊楚者也元海恱曰此孤心也遂據進河東攻冦蒲阪平陽皆陷之元海遂入都蒲子劉曜命起鄷明觀立西宫建陵霄臺於滈池又將於霸陵西南營夀陵侍中喬豫和苞上疏切諌曜覧之大恱下書曰二侍中懇懇有古人之風烈矣可謂社稷之臣也非二君朕安聞此言乎以孝明於承平之世四海無虞之日尚納鍾離一言而罷北宫之役况朕之闇眇當今極弊而可不敬從明晦乎今勑悉停夀陵制度一遵覇陵之法詩不云乎無言不讎無徳不報其封豫安昌子苞平興子並領諌議大夫可敷告天下使知區區之朝思聞過也自今政法有不便於時不利社稷者其詣闕極言勿有所諱尋而終南山摧獲玉有隠文羣臣以為瑞中書監劉均獨以為亡國之象辯而言之曜憮然改容御史劾均狂言瞽說誣罔祥瑞請依大不敬論曜曰此之災瑞誠不可知深戒朕之不徳朕收其忠恵多矣何罪之有乎後蜀李雄意在招致逺方國用不足故諸将每進金銀珍寳多有以得官者丞相楊褒諌曰陛下為天下主當羅網四海何有以官買金邪雄遜辭謝之後雄嘗酒醉而推中書令杖太官令褒進曰天子穆穆諸侯皇皇安有天子而為酗也雄即捨之雄無事小出褒於後持矛馳馬過雄雄恠問之對曰夫統天下之重如臣乗惡馬而持矛也急之則慮自傷緩之則懼其失是以馬馳而不制也雄悟即還李夀遣其散騎常侍王嘏中常侍王廣聘於石季龍先是季龍遺夀書欲連横入冦約分天下夀大恱乃大修船艦嚴兵繕甲吏卒皆偹餱糧以其尚書令馬當為六軍都督假節鉞營東場大閱軍士七萬餘人舟師泝江而上過成都鼓譟盈江夀憑城觀之其羣臣咸曰我國小衆寡吳險逺圖之未易觧思明又切諌懇至夀於是命羣臣議其利害龔壯諌曰陛下與胡通孰如與晉通胡豺狼國也晉既滅不得不北面事之若與之争天下則強弱勢異此虞虢之成範已然之明戒碩陛下熟慮之羣臣以壯之言為然叩頭泣諌夀乃止士衆咸稱萬嵗前燕慕容皝以牧牛給貧家田于苑中公收其八二分入私有牛而無地者亦田苑中公収其七三分入私記室封裕以収入太重上書諌皝皝乃令曰覽封記室之諌孤實懼焉君以黎元為國黎元以榖為命然則農者國之夲也而二千石令長不遵孟春之令墮農弗勸宜以尤不修闢者措之刑法肅厲屬城主者明詳推撿具狀以聞苑囿悉可罷之以給百姓無田業者貧者全無資産不能自存各賜牧牛一頭若私有餘力樂取官牛墾官田者其依魏晉舊法溝洫溉灌有益官司主者量造務盡水陸之勢中州未平兵難不息勲臣既多官寮不可以减也待尅平凶醜徐更議之百工商賈數四佐與列將速定大員餘者還農學生不任訓教者亦除員録夫人臣闗言於人主至難也妖妄不經之事皆應蕩然不問擇其善者而從之王憲劉明雖其罪應禁黜亦由孤之無大量也可悉復本官仍居諌司封生謇謇深得王臣之體詩不云乎無言不讎其賜錢五萬明宣内外有欲陳孤過者不拘貴賤勿有所諱慕容雋欲經畧闗西乃令州郡校閱見丁精覈隐漏率戸留一丁餘悉發之欲使歩卒滿一百五十萬期明年大集將進臨雒陽為三方節度武邑劉貴上書極諌陳百姓凋弊召兵非法恐人不堪命有土崩之禍并陳時政不便于時者十有三事雋覽而恱之付公卿慱議事多納用乃改為三五占兵寛戎備一周悉令明年季冬赴集鄴都前秦苻生時将苻産既為姚襄所殺襄遣使從生假道将還隴西生將許之苻堅諌曰姚襄人傑也今還隴西必為深慮不如誘以厚利伺隙而撃之生乃止苻堅時以樊世辱王猛既殺之諸氐紛紜競陳猛短堅恚甚慢罵或有鞭撻於殿庭者權翼進曰陛下洪達大度善馭英豪神武卓犖録功捨過有漢髙祖之風然慢易之言所宜除之堅笑曰朕之過也時烏丸獨孤鮮卑沒奕干率衆數萬降于堅堅初欲處之塞内苻融以匈奴為患其興自古北虜馬不敢南首者畏威故也今虜之扵内地見其弱矣方當闚兵郡縣為北邉之害不如徙之塞外以存荒服之義堅從之堅嘗如鄴狩于西山旬餘樂而忘返伶人王雒叩馬而諌堅曰善昔文公悟愆於虞人朕聞罪於王雒吾過也自是遂不復獵堅既遣苻丕冦襄陽堅将親率衆助丕等使苻融将闗東甲卒㑹于夀春梁熈統河西之衆以繼中軍融熙並上言以為未可興師乃止堅自平諸國之後國内殷實遂示人以侈懸珠簾于正殿以朝羣臣宫宇車乗品物服御悉以珠璣琅玕竒寳珍怪飾之尚書郎裴元畧諌曰臣聞堯舜茅茨周卑宫室故致和平慶隆八百始皇窮極奢麗嗣不及孫願陛下則采椽之不琢鄙瓊室而不居敷純風于天下流休範於無窮賤金玉珍榖帛勤恤人隠勸課農桑損無用之器棄難得之貨敦至道以厲薄俗修文徳以懐逺人然後一軌九州同風天下刑措既登告成東嶽蹤軒皇以齊美哂二漢之徙封臣之碩也堅大恱命去珠簾以元畧為諌議大夫後秦姚萇性簡率羣下有過或面加罵辱太常權翼言於萇曰陛下𢎞逺自任不修小節駕馭羣雄包羅俊異棄嫌録善有髙祖之量然輕慢之風所宜除也萇曰吾之性也吾於舜之美未有片焉漢祖之短已收其一若不聞讜言安知過也姚興如貳城将討赫連勃勃遣安逺姚祥及歛曼嵬鎮軍彭白狼分督租運諸軍未集而勃勃騎大至興欲留歩軍輕如嵬營衆咸惶懼羣臣固諌以為不可興弗納尚書郎韋宗希旨勸興行蘭臺侍御史姜楞越次而進曰韋宗傾險不忠沮敗國計冝先腰斬以謝天下脫車駕動軫六軍駭懼人無守志取危之道也宜遣單使以徴祥等興黙然右僕射韋華等諌曰若車騎輕動必不戰自潰嵬營亦未必可至惟陛下圖之興乃遣左將軍姚文宗率禁兵距戰中壘齊莫統氐兵以繼之文宗與莫皆勇果兼人以死力戰勃勃乃退留禁兵五千配姚祥守貳城興還長安興留心政事包容廣納一言之善咸見禮異京兆杜瑾馮翊吉黙始平周寳等上陳時事皆擢處美官後凉吕光宴羣寮酒酣語及政事時刑法峻重参軍叚業進曰嚴刑重憲非明王之義也光曰商鞅之法至峻而兼諸侯吴起之術無親而荆蠻以覇何也業曰明公受天眷命方君臨四海景行堯舜猶懼有弊奈何欲以商申之末法臨道義之神州豈此州士女所望於明公哉光改容謝之扵是下令責躬乃崇寛簡之政西凉李歆既嗣凉州牧將謀東征左長史張體順切諌止之及沮渠蒙遜伐歆歆将出距之體順固諌乃止蒙遜大芟秋稼而還北凉叚業僣稱凉王以沮渠蒙遜為尚書左丞梁中庸為右丞吕光遣其二子紹纂伐業請救扵秃髮烏孤烏孤遣其弟鹿孤及楊軌救業紹等軍盛欲從三門闗挟山而東纂曰挟山示弱取敗之道不如結陣衝之彼必憚我而不戰也紹乃引軍而南業将撃之蒙遜諌曰楊軌恃虜騎之强有窺覦之志紹纂兵在死地必决戰求生不戰則有太山之安戰則有累卵之危業曰卿言是也乃案兵不戰紹亦難之各引兵歸沮渠蒙遜為西凉李歆敗扵觧支澗復収散卒欲戰前將軍成都諌曰臣聞髙祖有彭城之敗終成大業冝旋師以為後圖蒙遜從之城建康而歸夏赫連勃勃議討乞伏熾盤王買徳諌曰明王之行師也軌物以徳不以暴且熾盤我之與國新遭大䘮今若伐之豈所謂乗理而動上感靈和之義乎茍恃衆力因人䘮難匹夫猶恥為之而况萬乗哉勃勃曰甚善㣲卿朕安聞此言冊府元龜卷二百二十九
