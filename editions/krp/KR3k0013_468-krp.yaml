body:
  text: 册府元龜卷四百六十八宋王欽若等撰臺省部薦舉詩曰烝我髦士傳曰舉爾所知大易著彚征之訓丘明紀稱善之說皆論薦之謂也乃有處機要之任當喉舌之寄而能思報寵遇務詢才傑旁洎通逸上達卿士察其志行之忠亮知其學術之深厚或文可以丹青神化道可以彌綸王度孜孜推進以助乎治推轂之義攸著引翼之志斯篤上有同升之美下無滯才之歎濟濟之詠繇是興焉非夫樂善援能奉上盡節者其孰能與於斯乎漢陳咸為左曹王吉子駿以孝亷為郎咸薦駿父子經明行修宜顯以勵俗鮑宣為諫議大夫彭宣為右將軍罷數歲宣數薦彭宣㑹哀帝元壽元年正月朔日蝕宣復言帝乃召彭宣為光禄大夫後漢鍾離意明帝時為尚書僕射上書薦劉平及王望王扶平初名曠曰臣竊見瑯邪王望楚國劉曠東萊王扶皆年七十執性恬淡所居之處邑里化之修身行義應在朝次臣誠不足知人竊慕推士進賢之義書奏有詔徵平等特賜辦裝錢至皆拜議郎並數引見賈逵為侍中和帝時李尤少以文章顯逵薦尤有相如楊雄之風召詣東觀受詔作賦拜蘭臺令史又薦中散大夫魯丕道藝深明宜見任用又楊終坐事徙北地貰還逵薦終博達忠直徵拜郎中韓稜為尚書令在朝數薦舉良吏應順呂章周紆等皆有名當時陳忠為尚書安帝始親朝事忠以為臨政之初宜徵聘賢才以宣助風化數上薦隱逸及直道之士馮良周爕杜根成翊世之徒於是公車禮聘良爕等司徒劉愷致仕㑹太尉馬英策罷忠上䟽薦愷曰臣聞三公上則台階下象山岳股肱元首鼎足居職恊和陰陽調訓五品考功量才以序庶僚遭烈風不迷遇迅雷不惑位莫重焉而今上司缺職未議其人臣竊差次諸卿考合衆議咸稱太常朱倀少府荀遷臣父寵前參司空倀遷並為掾屬具知其能倀能說其經書而用心褊狹遷嚴毅剛直而薄於藝文伏見前司徒劉愷沈重淵懿道德博備克讓爵土致祚弱弟躬浮雲之志兼浩然之氣頻歴二司舉動得禮以疾致仕側身里巷處約思純進退有度百僚景式海内歸懐往者孔光師丹近世鄧彪張酺皆宰相復序上司誠宜簡練卓異以厭衆望書奏詔引愷拜太尉周興為郎中興少有名譽忠又上疏薦興曰臣伏惟古者帝王有所號令言必𢎞雅辭必溫麗垂於後世列於經典故仲尼嘉唐虞之文章從周室之郁郁臣竊見光禄郎周興孝友之行著於閨門清厲之志聞於州里蘊匵古今博物多聞三墳之篇五典之策無所不覽屬文著辭有可觀採尚書出納帝命為王喉舌臣策旣愚闇而諸郎多文俗吏鮮有雅才每為詔文宣示内外轉相求請或以不能而專已自繇辭多鄙固興抱竒懐能隨輩栖遲誠可歎惜詔乃拜興為尚書郎黃瓊順帝時為尚書僕射時連有災異上疏曰臣前頗陳災𤯝并薦光禄大夫樊英太中大夫薛包及㑹稽賀純廣漢楊厚未蒙御省伏見處士巴郡黃錯漢陽任棠年皆耆耋有作者七人之志宜更見引致助崇大化於是有詔公車徵錯等史敞為尚書胡廣為尚書僕射時陳留郡缺職敞與諸尚書薦廣曰臣聞德以旌賢爵以建事明試以功典謨所美五服五章天秩所祚是以臣竭其忠君豐其寵舉不失德下忘其死竊見尚書僕射胡廣體真履規謙虚溫雅博物洽聞探賾窮理六經典奧舊章憲式無所不覽柔而不犯文而有禮忠貞之性憂公如家不務其能不伐其勞翼翼周慎行靡玷漏密勿夙夜十有餘年心不外顧志不茍進臣等竊以為廣在尚書劬勞日久後母年老既蒙簡照宜試職千里撫寧方國陳留近郡今太守任缺廣才略深茂堪能撥煩願以參選紀綱頽俗束脩首善有所觀仰廣尋為濟陰太守左雄為尚書令薦周舉為尚書舉既稱職議者咸稱焉虞詡為尚書僕射成翊世辟司空張皓府遷為議郎自劾歸詡雅重之欲引與共參朝政乃上書薦之徵拜議郎後尚書令左雄僕射郭䖍復舉為尚書翊世在朝正色百僚敬之又順帝新立大臣懈怠朝多闕政議郎左雄數言事其辭深切詡以雄有忠公節上疏薦之曰臣見方今公卿以下類多拱黙以樹恩為賢盡節為愚至相戒曰白璧不可為容容多後福伏見議郎左雄數上封事至引陛下身遭難厄以為警戒實有王臣蹇蹇之節周公謨成王之風宜擢在喉舌之官必有輔弼之益繇是拜雄尚書龎參為大鴻臚詡又薦參有宰相器能順帝以為太尉録尚書事郭䖍桓帝時與應賀並為尚書時平丘令周舉上書言當世得失辭甚切正䖍賀等見之歎息共上疏稱舉忠直欲置章御座以為誡章謂所上之書陳蕃為尚書令胡廣為僕射徐穉舉有道家拜太原太守皆不就延熹二年蕃等上疏薦穉及姜肱等曰臣聞善人天地之紀政之所繇也詩云思皇多士生此王國天挺俊乂為陛下出當輔弼明時左右大業者也伏見處士豫章徐穉彭城姜肱汝南袁閎京兆韋著潁川李曇德行純備著于人聽若使擢登三事協亮天工必能翼宣盛美增光日月矣桓帝乃以安車𤣥纁備禮徵之並不至蕃又薦河内太守魏朗公忠亮直宜在機密徵為尚書羊陟為尚書令以前太尉劉寵司隸校尉許沐幽州刺史楊熙涼州刺史劉恭益州刺史龎艾清亮在公薦舉升進帝嘉之楊喬烏傷人為尚書同郡孟嘗為合浦太守以病自上表辭隱處窮澤桓帝時喬上書薦嘗曰臣前後七表言故合浦太守孟嘗而身輕言微終不蒙察區區破心徒然而已嘗安仁引義耽樂道德清行出俗能幹絶羣前更守宰移風改政去珠復還饑民蒙活且南海多珍財產易積掌握之内價盈兼金而嘗单身謝病躬耕壟次匿景藏采不揚華藻實羽翮之美用非徒腹背之毛也而沉淪草莽好爵莫及廊廟之寳棄于溝渠且年歲有訖桑榆行盡而忠貞之節永謝聖時臣誠傷心私用流涕夫物以逺至為珍士以希見為貴槃木朽株為萬乘用者左右為之容耳王者取士宜拔衆之所貴臣以斗筲之姿趨走日月之側思立微節不敢茍私鄉曲竊感禽息亡身進賢嘗竟不見用朱穆為尚書延熹中長沙零陵賊入桂陽蒼梧南海交阯蒼梧三郡皆沒遣荆州刺史劉度撃之軍敗桓帝詔公卿舉任代劉度者穆舉度尚自右校令擢為荆州刺史出兵三年羣寇悉定蔡邕靈帝時為郎中上封事曰夫求賢之道未必一塗或以德顯或以言揚頃者立朝之士曾不以忠信見賞常被謗訕之誅遂使羣下結口莫圗正辭郎中張文前獨進狂言聖聽納受以責三司臣子曠然衆庶解恱臣愚以為宜擢文右職以勸忠謇宣聲海内博開政路魏荀彧漢末為尚書令仲長統性倜儻敢言獻帝在許彧領典樞機好士愛奇聞統名啓召以為尚書郎杜畿自荆州還後至許見侍中耿紀語終夜彧與紀比屋夜聞畿言異之且遣人謂曰有國士而不進何以居位旣見畿知之如舊相識者遂進畿於朝魏太祖時為丞相謂彧曰河東當今天下之要地也君為我舉蕭何寇恂以鎮之彧曰杜畿其人也彧稱畿勇足以當大難智能應變其可試之於是拜畿為河東太守王象為散騎常侍文帝踐阼表薦南陽太守楊俊曰伏見南陽太守楊俊秉純粹之茂質履忠肅之宏量體仁足以育物篤實足以動衆克長後進惠訓不倦外寛内直仁而有斷自初彈冠所歴垂化再守南陽恩德流著殊鄰異黨襁負而至今境守清靜無所展其智能宜還本朝宣力輦轂熙帝之載盧毓文帝時吏部尚書㑹司徒缺毓舉處士管寧帝不能用更問其次毓對曰敦篤至行則太中大夫韓暨亮直清方則司隸校尉崔林貞固純粹則太常常林帝乃用暨帝使毓自選代曰得如卿者乃可毓舉常侍鄭冲帝曰文和吾自知之更舉吾所未聞者乃舉阮武孫邕帝於是用邕夏侯惠文帝時為散騎侍郎劉劭為散騎常侍詔書博求衆賢惠薦劭曰伏見常侍劉劭深忠篤思體周於數凡所錯綜源流𢎞逺是以羣才大小咸取所同而斟酌焉故性實之士服其平和良正清静之人慕其𤣥虚退讓文學之士嘉其推步詳密法理之士明其分數精比意思之士知其沈深篤固文章之士愛其著論屬辭制度之士貴其化略較要策謀之士贊其明思通微凡此諸論皆取適已所長而舉其支流者也臣數聽其清談覽其篤論漸漬歴年服膺彌久實為朝廷奇其器量以為若此人者宜輔翼機事納謀幃幄當與國道俱隆非世俗所常有也惟陛下垂優游之聽使劭承清閒之歡得自盡於前則德音上通輝燿日新矣孟康為散騎侍郎崔林為司隸校尉明帝景初元年司徒司空並缺康薦林曰夫宰相者天下之所瞻效誠宜得秉忠履正本德仗義之士足為海内所師表者竊見司隸校尉崔林稟自然之正性體髙雅之𢎞量論其所長以比古人忠直不囘則史魚之儔清儉守約則季文之匹也牧守州郡所在而治及為外司萬里肅齊誠台輔之妙器衮職之良才也後年遂為司空呉薛綜為選曹尚書固讓奉車都尉顧譚曰譚心精體密貫通達微才照人物德允衆望誠非愚臣所可越先後遂代綜華覈為中書丞陸𦙍為左虎林有時名覈表薦𦙍曰𦙍天姿聰朗才通行潔昔歴選曹遺迹可紀還在交州奉宣朝恩流民歸附海隅肅清蒼梧南海歲有暴風瘴氣之害風則折木飛砂轉石氣則霧鬰飛鳥不經自𦙍至州風氣絶息商旅平行民無疾疫田稼豐稔州治臨海海流秋鹹裔又畜水民得甘食惠風橫被化感人神遂憑天威招合遺散至被詔書當出民感其恩以忘戀土負老擕幼甘心景從衆無携貳不煩兵衛自諸將合衆皆脅之以威未有如𦙍結以恩信者也衘命在州十有餘年賓帶殊俗寳玩所生而内無粉黛附珠之妾家無文甲犀象之珍方之今臣實難多得宜在輦轂股肱王室以贊唐虞康哉之頌江邉任輕不盡其才虎林選督堪之者衆若召還都寵以上司則天工畢修庶績咸熙矣晉李重為吏部尚書武帝受禪曹嘉為東筦太守重啓云魏氏宗室屈滯每聖恩所存東筦太守曹嘉才幹學義不及志翕而良素修潔性業踰之臣欽若等曰嘉白馬王彪子志陳思王植子翕東平王微子又已歴二郡臣以為優先代之後可以嘉為員外散騎侍郎于時内官重外官輕兼階級繁多重議之又上䟽曰凡山林避寵之士雖違世背時出處殊軌而先王許之者嘉其服膺髙義也昔先帝患風流之弊而思反純樸乃諮詢朝衆搜求隱逸咸寧三年始以太子中庻子徵安定皇甫謐四年又以博士徵南安朱冲太康元年復以太子庶子徵冲雖皆以疾病不至而朝野悅服陛下逺邁先帝禮賢之日臣訪冲州邑言其雖年近耋耄而志氣充壯耽道窮數老而彌新操尚貞純所居成化誠山棲耆德足以表世篤俗者也臣以為宜垂聖恩及其未沒顯加優命山濤為吏部舉散騎常侍阮咸典選曰阮咸貞表寡欲深識清濁萬物不能移若在官人之職必絶於時武帝以咸耽酒浮虚遂不用濤為尚書僕射啓事曰郿令諸葛京祖父亮遇漢亂分隅父子在蜀雖不達天命要為盡心所事京治郿自復有稱臣以為宜以補東宮舍人以明事人之禮副梁益之論崔洪為吏部尚書薦雍州刺史郤詵代已為左丞詵後糾洪洪謂人曰我舉詵丞而還奏我是挽弩自射也詵聞曰昔趙宣子任韓厥為司馬以軍法戮宣子之僕宣子謂大夫曰可賀我矣吾選厥也任其事崔侯為國舉才我以才見舉惟官是視各明至公何故斯言乃至此洪聞其言而重之荀朂守中書監侍中尤為武帝所信時太尉賈充司徒李𦙍並薨太子太傅又缺勗表陳三公保傅宜得其人若使楊珧參輔東宮必當仰稱聖意尚書令衞瓘吏部尚書山濤皆可為司徒若以瓘新為令未出者濤即其人帝並從之胡濟為尚書郎武陵人伍朝少有雅操閒居樂道不修世事性好學以博士徵不就刺史劉宏薦朝為零陵太守主者以非選列不聽濟奏曰臣以為當今資喪亂之餘運承百王之遺弊進趨者乘國故以僥倖守道者懷蘊匵以終身故今敦褒之化虧退讓之風薄案朝游心物外不屑時務守静衡門志道日新年過耳順而所尚無虧誠江南之竒才丘園之逸老也不加飾進何以勸善且白衣為郡前漢有舊宜聽光顯以奬風尚事可而朝不就陳準惠帝時為中書令張華為中書監屬氐帥齊萬年反於關中衆數十萬諸將覆敗相繼準華以趙梁諸王在關中雍容貴戚進不貪功退不懼罪士卒雖衆不為之用周處喪敗職此之由上下離心難以勝敵以孟觀沈毅有文武材用乃啓觀討之觀所領宿衛兵皆趫健勇悍并統關中士卒身當矢石大戰十數皆破之生擒萬年威慴氐羌轉東羌校尉王琨為尚書郎范喬有行元康中詔求亷讓冲退履道寒素者不計資以參選叙琨乃薦喬禀德真粹立操髙潔儒學精深含章内奥安貧樂道棲志窮巷簞瓢詠業長而彌堅誠當今之寒素著厲俗之清彥紀瞻元帝時為僕射郄鑒據鄒山屢為石勒等所侵逼瞻以鑒有將相之才恐朝廷棄而不恤上疏請徵之曰臣聞皇代之興必有爪牙之佐干城之用帝王之利器也故虞舜舉十六相而南面垂拱伏見前輔國將軍郄鑒少立髙操體清望峻文武之略時之良幹昔與戴若思同辟推放荒地所在孤特衆無一旅救援不至然能綏集殘餘據險歴載遂使㓙寇不敢南侵但士衆單寡無以立功旣統名州又為常伯若使鑒從容臺闥出内王命必能盡抗直之規補衮職之闕自先朝以來諸所授用已有成比戴若思以尚書為六州都督征西將軍復加常侍劉隗鎮北陳眕鎮東以鑒年時則與若思同以資則俱八座况鑒雅望清量一代名器聖朝以至公臨天下惟平是與是以臣寢頓陋巷思盡聞見惟開聖懐垂問臣道冀有豪釐萬分之一江虨穆帝時為尚書僕射虨薦郄愔以為執德存正識懐沉敏而辭職遺榮有不㧞之操成務須才豈得遂其獨善宜見徵引以參政術於是徵為光禄大夫加散騎常侍王珣孝武時為尚書僕射戴逵累徵常侍博士辭疾不就珣上疏復請徵為國子祭酒加散騎常侍徵之復不至後珣為尚書令徐廣為員外散騎侍郎珣深欽重舉廣為祠部郎宋沈演之為吏部尚書建康令劉秀之性纎密善糾摘微隐政甚有聲演之每稱之於太祖徐爰為尚書左丞劉亮果勁便刀楯朝士先不相悉朝廷亦弗嘗聞唯爰知之白太祖稱其梟敢及孔覬反亮每戰以刀楯直盪往輙陷決王彧為尚書僕射明帝泰始初周山圗為殿中將軍四方反叛彧舉山圗將領呼與語甚恱使領百舸為前驅舉軍主侯長生等攻破賊湖白赭圻二城除員外郎加振武將軍南齊沈淵為吏部郎沈約為中書郎沈麟士隱居教授學者數十百人武帝永明六年淵約表薦麟士義行曰呉興沈麟士英風夙挺峻節早樹貞粹禀於天然博綜生乎篤習承世貧窶藜藿不給懷書而耕白首無倦挾琴採薪行歌不輟長兄早卒孤姪數四攝尫鞠稚吞苦推甘年踰七十業行無改元嘉以來聘召仍疊玉質逾潔霜操日嚴若使聞政王庭服道槐掖必能敷朝規於邉鄙播德澤於荒垂詔又徵為太學博士不就梁范雲為吏部尚書周捨為奉常丞髙祖即位博求異能之士雲與捨父顒素善重捨才器言之於髙祖召拜尚書禮部郎許懋為文惠太子侍講吏部尚書雲舉懋參詳五禮除著作待詔文德省徐勉為吏部尚書孔休源為臨川王府行參軍髙祖嘗問勉曰今帝業初基須一人有學藝解朝儀者為朕思之誰堪其選勉對曰孔休源識具清通諳練故實自晉宋起居注誦略上口髙祖亦素聞之即日除兼尚書儀曹郎中勉參掌機密大通三年以疾陳解因舉何敬容自代乃以敬容為尚書僕射又奏東宮通事舍人劉香為王府諮議髙祖曰劉香須先經中書仍除中書侍郎殿中郎缺髙祖謂勉曰此曹舊用文章且居鴈行之首宜詳擇其人勉舉太子舍人張緬充選沈瑀為駕部兼尚書左丞薦族人沈僧隆僧炤有吏幹髙祖並納之范岫為都官尚書表薦陸襄起家為著作郎杜之偉為中書侍郎領著作姚察為原鄉令之偉與察深相眷遇表用察佐著作仍選史陳袁樞為吏部尚書陸瑀舉秀才對策髙第樞薦於世祖超授衡陽王文學直天保殿學士蔡景歴為中書舍人褚介為中書侍郎髙宗太建中山隂縣多豪猾前後令皆以贓汚免髙宗患之謂景歴曰稽隂大邑久無良宰卿文士之内試思其人景歴進曰褚介亷儉有幹用未審堪其選不髙宗曰甚善卿言與朕意同乃除戎昭將軍山隂令徐陵自尚書右僕射遷左僕射陵抗表推周𢎞正王勱等髙宗召陵入殿曰卿何為固辭此職而舉人乎陵曰周𢎞正從陛下西還舊藩長史王勱太平中相府長史張種帝鄉賢戚若選賢與舊臣宜居後固辭累日髙宗苦屬之陵乃奉詔又薦陸瓊於髙宗曰新安王文學陸瓊見識優敏文史足用左西掾闕允膺兹選乃除司徒左西掾時朝議北伐髙宗曰朕意已決卿可舉元帥衆議咸以中權將軍淳于量位重共署推之陵獨曰不然呉明徹家在淮左悉彼風俗將略人才當今亦無過者於是爭論累日不能決都官尚書裴忌曰臣同徐僕射陵應聲曰非但明徹良將裴忌即良副也是日詔明徹為大都督令忌監軍事遂克淮南數十州之地髙宗因置酒舉杯屬陵曰賞卿知人陵避對曰定策出自聖𠂻非臣之力也其年加侍中餘並如故江總為尚書令時吏部尚書蔡徵移中書令後主方擇其人總等咸薦度支尚書姚察敕答曰非惟學藝優博亦是操行清修典選難才今得之矣後魏髙允為中書侍郎轉中書令遷中書監自文成迄于獻文軍國書檄多允文也允以中書侍郎髙閭文章富逸舉以自代閭遂為獻文所知及為尚書散騎常侍獻文平青齊徙其族於代允隨其才能表奏申用時議者皆以新附致異允謂仗政任能無宜抑屈髙閭為中書監李冲為侍中以著作郎楊㞐碩學博識舉為國子祭酒又孫惠蔚舉郡對策為中書閭宿聞惠蔚稱其英辯因相談薦為中書博士王衍為尚書時劉莩年十二詣衍與語大竒之遂與太傅李延實秘書李凱上疏薦之拜祕書郎任城王澄為尚書僕射曹世表少喪父舉止有禮度性雅正工尺牘涉獵羣書孝文太和二十三年澄奏世表為國子助教崔光為黃門郎薦司徒司馬宋弁自代孝文不許然亦賞光知人未幾以弁兼黃門尋即正兼司徒左長史光為中書監劉芳為太常卿光表求以中書監讓芳宣武不許房景先為太學博士光以當世儒宗歎其精博光遂奏兼著作佐郎修國史張彞為秦州刺史廢於家光為侍中表薦曰彞及季韶朝列之中惟此二人出身官次本在臣右器能幹世文並為多而近來參差便成替後計其階途雖應遷陟然恐班秩猶未賜等昔衛之公叔引下同升晉之士匄推長伯游古人所髙當時見許敢縁斯義乞降臣位一階授彼品級齊行聖庭帖穆選叙詔加征西將軍冀州大中正光又與御史中尉李彪同撰國書彪以罪除名白衣修史光奏曰伏見前御史中尉臣李彪夙懐美意創刋魏典臣昔為彪所致與之同業積年其志力貞强考述無倦督勸羣寮注綴略舉雖頃来契濶多所廢離近蒙收録起綜厥事老而彌厲史才日新若勉復舊職專切不怠必能昭明春秋闡成皇籍先帝既厚委任宿歴髙班纎負微愆應從滌洗愚謂宜申以常伯正維著作停其外役展其内思研精歲月紀册必就鴻聲巨迹蔚乎有章盛軌懋詠鑠焉無泯矣帝不許李彪為祕書丞與宋弁州里迭相祗好弁自中散彪請為著作佐郎源懷為左僕射宋世景為尚書祠部郎懷引世景為行臺郎巡察州鎮十有餘所黜陟賞罰莫不咸允遷徙七鎮別置諸戍明設亭堠以備北方懐大相委重還而薦之於宣武曰宋世景文武才略當今寡儔清平忠直亦少其比陛下若任之以機要終不減李冲也宣武曰朕亦聞之城陽王徽為尚書僕射孝明欲親討荆州詔辛雄為行臺左丞與臨淮王彧東趣鄴城㑹右丞闕徽舉雄乃除輔國將軍尚書右丞侯剛為侍中熙平中侍中游肇出為相州剛言與靈太后曰昔髙氏擅權抗衡不屈先帝所知四海同見而出牧一藩未盡其美宜還引入以輔聖主太后善之李凱為祕書監裴景融為太學博士永安中凱以景融才學啓除著作佐郎北齊髙隆之東魏孝静武定初為尚書僕射營搆大將李業興為通直散騎常侍隆之被詔繕治三署樂器衣服及百戯之屬乃奏請業興共參其事司馬子如東魏末為尚書令趙隐隱字彥深性聰敏不雜交游為子如賤客供寫書子如善其無誤欲将入省隠靴無氈衣帽穿敝子如給之用為書令史月餘補正令史神武在晉陽索二史子如舉彦深後拜子如開府參軍超拜水部郎及文襄為尚書令選沙汰諸曹郎彦深以地寒被出為滄州別駕辭不行子如言於神武徵補大丞相功曹參軍專掌機密文翰多出其手稱為敏給子如又薦呂思禮為尚書二千石郎中尋以地寒被出兼國子博士郭秀為守七兵尚書與盧恭道交欵性溫良頗有文學及秀任事每稱薦之神武亦聞其名天平初特除龍驤將軍楊愔文宣天保中為右僕射崔瞻為司徒屬愔欲引瞻為中書侍郎時盧思道直中書省因問思道曰我此日多務都不見崔瞻文藻卿與其親通理當相悉思道答曰崔瞻文辭之美實有可稱但舉世重其風流所以才華見沒愔云此言有理便奏用之事既施行愔又曰昔裴瓚晉世為中書郎神情髙邁每於禁門出入宿衛者肅然動容崔生堂堂之貌亦當無愧裴子愔又薦盧思道才學兼著解褐司空行參軍長史辛衍為殿中尚書楊愔為右僕射時辛德源少有重名衍愔見德源竝虚襟禮敬因同薦之於文宣帝起家奉朝請崔昂為尚書舉薦大行臺郎中樊遜詔付尚書考為清平勤幹送吏部劉逖武成時為中書侍郎上表薦辛德源曰弱齡好古晩節逾厲枕籍六經漁獵百氏文章綺艷體調清華恭慎表於閨門謙撝著於朋執實後進之辭人當今之雅器必能效節一官騁足千里繇是除員外散騎侍郎陳元康為散騎常侍時髙岳討侯景未尅武成欲遣潘相樂副元康曰相樂機變不如慕容紹宗且先王有命稱其堪敵侯景公但推赤心於此人則侯景不足憂也是時紹宗在逺世宗欲召見之恐其驚叛元康曰紹宗知元康特蒙顧待新使人来餉金以致其誠欵元康欲安其意故受之而厚答其書保無異也世宗乃任紹宗遂以破景賞元康金五十斤李神雋為吏部侍郎魏收初除大學博士神雋重收才學奏授司徒記室參軍祖孝徵為尚書僕射薦太子舍人盧昌衡字子均為尚書金部郎孝徵每曰用盧子均為尚書郎自謂無愧幽明矣隋髙熲自髙祖受禪拜尚書左僕射任寄益隆熲深避權勢上表遜位讓於蘇威帝欲成其美聽解僕射數日帝曰蘇威髙蹈前朝熲能推舉吾聞進賢受上賞寧可令去官於是命熲復位蘇威開皇初為納言民部尚書薦房恭懿為新豐令政為三輔之最時雍州縣令每朝謁帝見恭懿必呼至榻前訪以理人之術威重薦之超授澤州司馬又柳莊初仕後梁為太府卿梁國廢授開府儀同三司尋除給事黃門侍郎并賜以田宅莊明習舊章雅達政事凡所駁正章莫不稱善威重莊器識常奏帝云江南人有學業者多不習世務習世務者又無學業能兼之者不過於柳莊威至大業初為魯郡太守嘗欲殺一囚司法書佐陳孝意固諫止之及威再為納言奏孝意為侍御史楊素仁壽初為尚書僕射劉子翊為秦州司馬參軍事十人入考素見而異之奏為侍御史又李百藥追赴仁壽宮素愛其才奏授禮部貟外郎令襲父爵楊𤣥感為禮部尚書時煬帝徵天下儒生集於東都講論令𤣥感主之孔穎達與諸儒論難咸為之屈諸儒嫉之潛令刺客伺其便𤣥感深禮之知其如是延之於第待以上客薦為太學助教繇是顯名許善心大業元年轉禮部侍郎奏薦儒者徐文逺為國子博士包愷陸德明褚徽魯世達之輩並加品秩授為學官唐裴矩隋大業末為黃門侍郎以海南僻逺吏多侵漁百姓咸怨數為逆於是選淳良太守撫之矩因奏言天水郡守丘和歴居二郡皆以惠政著聞寛而不擾煬帝從之追和為交阯太守李勣武德初為武候大將軍後遷左監門大將軍時張亮為檢校定州別駕勣數薦亮於太宗房元齡亦言之於是引為車騎將軍漸蒙顧遇委以心膂魏徵為尚書左丞貞觀初杜正倫直文學館徵表薦正倫以為古今難匹遂擢授兵部員外李靖貞觀初為刑部尚書屬平江陵時岑文本事蕭銑為中書侍郎掌機務至是授祕書郎直中書省靖驟稱其才擢拜中書舍人劉洎為黃門侍郎李義府貞觀初進士舉門下省典儀洎與治書侍御史馬周皆稱薦之劉恭甫為吏部侍郎臨終上表薦賢太宗甚嘉悼賜之絹二百五十匹杜淹貞觀中拜吏部尚書參議朝政前後表薦四十餘人後多名者淹嘗薦刑部貟外郎邸懷道太宗因問淹懷道才行如何淹對曰懷道在隋日作吏部主事甚有清慎之名又煬帝向江都之日召百官問去住之計時行計已決公卿皆阿旨請去懷道官位極卑獨言不可臣目見此事閻立本為工部尚書黜陟河南時狄仁傑為汴州判佐為人誣告立本驚謝曰仲尼觀過知仁足下可謂海曲之明珠東海之遺寳特薦之遷并州都督府司法薛元超髙宗永徽中為黃門侍郎兼檢校太子左庶子元超既擅文詞兼好汲引寒酸嘗表薦任希古髙智周郭正一王義方孟利貞等十餘人繇是時論稱美劉審禮儀鳯初為工部尚書薦魏元同有時務之才拜岐州刺史魏知古睿宗初為黃門侍郎表薦洹水令呂大一蒲州司功參軍齊幹前右内率府胄曹參軍柳澤及知吏部尚書事又擢用密縣尉宋遙左補闕袁暉右補闕封希顏伊闕尉陳希烈後咸累居清要時論以為有知人之鍳姚崇為夏官尚書出為靈武軍使將行則天令舉外司堪為宰相者崇對曰秋官侍郎張柬之沉厚有謀能斷大事且其人年老惟陛下急用之則天登時召見尋同鳯閣鸞臺平章事李嶠為内史及監察御史張廷珪並薦李邕詞髙行直堪為諫諍之官繇是召拜右拾遺張鎬𤣥宗時為左拾遺安禄山叛逆詔朝臣舉智謀果決才堪統衆者各一人鎬薦賛善大夫來瑱有縱横才略臨事能斷堪當禦侮之任表入即日召見稱㫖拜潁川郡太守充招討使蕭昕為左拾遺常與布衣張鎬友館而禮之表薦曰如鎬者用之為王者師不用則幽谷叟爾𤣥宗擢鎬為拾遺不數年出入將相及安禄山反昕舉賛善大夫來瑱任將帥思明之亂瑱功居多張漸為中書舍人時南詔閤羅鳯叛宰臣楊國忠兼劒南節度遙制其務屢喪師徒漸薦黔府督趙國珍有武略習知南方地形國忠遂奏用之在五溪凡十餘年中原興師惟黔中封境無虞第五琦為殿中侍御史河南等五州度支使天寳末韋倫為劒南行軍司馬中官毁譛之貶衡州司戸屬東都河南竝陷賊漕運路絶琦薦倫有理能乃拜商州刺史兼御史中丞充荆襄等道租庸使李季卿代宗大厯中為吏部侍郎薦大理評事李紓徵拜左補闕楊綰為吏部侍郎薦漣水令劉滋堪備諫職拜右補闕乂薦令狐峘自華原封拜右拾遺劉晏為户部侍郎判度支時顏真卿以文學正直出為利州刺史晏舉真卿自代焉大厯中晏為吏部尚書鹽鐡轉運使蘇州嘉興人徐岱家世以農為業少好學六籍諸子悉所探究乂聰辯問無不通難莫得屈表薦之授校書郎又劉迺為宣州判官晏尋奏令巡覆江西多所蠲免改殿中侍御史檢校倉部員外郎户部郎中充浙西東留後佐晏徵賦頗有裨益晏甚重之又孔述睿隐於嵩陽好學不倦晏聨表薦述睿有顏閔之行游夏之學繇是累授協律郎于邵為禮部侍郎建中元年堯山令樊澤舉賢良對策邵厚遇之邵與楊炎善薦為補闕元琇德宗興元初為尚書左丞江淮轉運使時齊抗為工部貟外郎充江淮宣慰判官㑹朱泚初平旱蝗之後國用空耗琇以抗有才奏為倉部郎中條理江淮漕運以給京師韋渠牟貞元中為諫議大夫茅山處士崔芉徵至闕下鄭隨自山人再至補闕馮伉自醴泉令為給事中充皇太子及諸王侍讀皆渠牟延薦之李行修為殿中侍御史貞元中費冠卿及第歸而父母卒嘗恨不及榮養遂絶迹不仕元和三年行修薦之授右拾遺李巽為兵部侍郎鹽鐵使元和初程异初以附王叔文敗貶郴州司馬巽薦异曉暢錢穀請棄瑕録用繇是㧞為侍御史復充揚州留後李德裕穆宗時為御史中丞表薦處士李源曰臣伏見賈誼云守圉扞敵之臣誠死城郭封疆故曰聖人有金城者此物此志也自天寳之後俗尚浮華士罕仗義人懐茍免至有棄城郭委符節者其身不以為恥當代不以為非臣恐風俗既成紀綱皆廢此當今之急務教化所宜先也臣訪聞處士李源即故禮部尚書東都留守贈司徒忠烈公憕之少子天與貞孝嗣兹忠烈以父死國難衰纆終身自司農寺主簿絶心禄仕垂五十年放懷山澤罕至人落暨于衰暮多依慧林佛寺以其本憕別業就寓殘生從僧住持不舉煙爨隨僧一食以至五十餘年嗜欲靡窺精麤同衆寺之舊殿則憕之寢堂源過必敬趨未嘗登踐其端心執孝無有不至忘形患苦絶意貪縁迸斥浮虚就專志節則孰能挺操不易沉身無聲處薄自頤終老彌篤且憕之忠烈實冠古今當逆羯屠陷飇驅響從而憕抗節誓心約義同列居朝守位抵刃就終臣節之光繇憕益勸而源名銷迹滅徵訪不加實任職居方之臣歴政之闕也况源嘗守沉默不語是非或心交静求理契深要一言開析百慮洗然致君阜時指象如見抱此貞用棄於清朝臣竊為陛下深惜伏乞就授一官召赴京闕仍以事跡宣付史館則聖代有求賢之盛朝廷美得材之難憕之貞烈如存源之承荷不墜忠孝之美并集憕門光嗣德於一時激為臣於千古疏奏帝欣納之册府元龜卷四百六十八
