body:
  text: 册府元龜卷二百八十五宋王欽若等撰宗室部忠一傳曰忠為令德盖策名委質有死無二之謂也乃有體自天極列于藩維承光日月同休宗社而内懷明德發於精衷自晦以掩君惡建義以雪國耻定策佐命以安天下扶危持顛以濟大難守節而無茍拒惡而靡憚勵恭慎之節竭謨明之效周旋佽助彌綸罄盡奉侍勤瘁誠言敦篤至或挺身變亂而罹害感慨宗國而亡身抗志不撓瞑目無悔斯皆仁厚成於自然純亮表於性質挺咸一之徳隆在三之義千載之下凛乎其有生氣矣商箕子紂之親戚也紂為滛泆箕子諫不聼人或曰可以去矣箕子曰為人臣諫不聼而去是彰君之惡而自悦於民吾不忍為也乃被髪佯狂而為奴漢燕王澤聞呂太后終澤乃曰帝少王欽若等曰帝謂呂后所立惠帝後宮子疆諸呂用事諸劉孤弱引兵與齊王合謀西欲誅諸呂至梁聞漢灌將軍屯滎陽澤還兵偹西界遂跳驅至長安齊王傳云使祝午紿琅邪王琅邪王馳見齊王齊王因留琅邪王而使祝午盡發琅邪國而并將其兵琅邪王既見欺不得反國乃説齊王求入闗計事齊王以為然乃益具車送琅邪王與此傳不同疑此傳誤也代王亦從代至諸將相與琅邪王共立代王是為孝文帝衡山王勃景帝初七國反呉使者至衡山衡山王堅守無心呉楚已破衡山王來朝帝以為貞信乃勞苦之曰南方卑濕徙王於濟北以褒之濟北王胡以為武帝且封禪上書獻泰山及其旁邑天子以它縣償之武平侯璜王莽居攝一年以舉兵誅莽死陵鄉侯曽王莽建國六年以舉兵欲誅莽死後漢慎侯賜光武族兄更始初封賜為宛王典將六部兵伯升初起置六部之兵後赤眉破更始所賜領六部亦稍散畔乃去宛保育陽聞光武即位乃西之武闗迎更始妻子將詣雒陽帝嘉賜忠故封為慎侯劉虞為幽州牧就拜太尉初平二年冀州刺史韓馥渤海太守袁紹及山東諸將議以朝廷㓜冲逼於董卓逺隔闗塞不知存否以虞宗室長者欲立為主乃遣故樂浪太守張岐等齎議上虞尊號虞見岐等厲色叱之曰今天下紛亂主上蒙塵吾被重恩未能清雪國耻諸君各㨿州郡宜共戮力盡心王室而反造逆謀以相垢誤耶固拒之馥等又請虞領尚書事承制封拜復不聼遂收斬使人魏曹洪字子廉太祖從弟也太祖起義兵討董卓至滎陽為卓將徐榮所敗太祖失馬賊追甚急洪下以馬授太祖太祖辭讓洪曰天下可無洪不可無君遂歩從到汴水水深不得渡洪循水得船與太祖共濟還奔譙齊王族祖冏字元首魏世諸侯王多所抑損冏上書曰臣聞古之王者必建同姓以明親親必樹異姓以明賢賢故傳曰庸勲親親眤近尊賢書曰克明俊徳以親九族詩曰懷徳維寧宗子維城由是觀之非賢無與興功非親無與輔治夫親親之道專用則其漸也㣲弱賢賢之道偏任則其弊也刼奪先聖知其然也故博求親踈而並用之近則有宗盟藩衞之固逺則有仁賢輔弼之助盛則有與共其治衰則有與守其土安則有與享其福危則有與同其禍夫然故能有國家保其社稷厯紀長久本支百世也今魏尊賢之法雖明親親之道未偹詩不云乎鶺鴒在原兄弟急難以斯言之明兄弟相救於喪亂之際同心於憂禍之間雖有䦧墻之忿不忘禦侮之事何則憂患同心也今則不然或任而不重或釋而不任一旦疆塲稱警關門反拒股肱不扶胸心無衛臣竊惟此寢不安席思獻丹誠貢策天闕謹撰合所聞叙論成敗論凡數千言是時天子㓜稚冏兾以此論感悟曹爽爽不能納蜀北地王諶景耀末鄧艾兵至譙周勸後主降後主將從譙周之策諶怒曰若理窮力屈禍敗必及便當父子君臣背城一戰同死社稷以見先帝可也後主不納遂送璽綬是日諶哭於昭烈之廟先殺妻子而後自殺左右無不為泣者晋惠帝西遷范陽王虓與從兄平昌公模長史馮嵩等刑白馬㰱血而盟推東海王越為盟主虓都督河北諸軍事驃騎將軍持節領豫州刺史劉喬不受越等節度乘虛破許虓自㧞渡河王浚表虓領冀州刺史資以兵馬虓入冀發兵又南濟河破喬等河間王顒聞喬敗斬張方傳首於越越與虓西迎帝而顒出奔於是奉天子還都拜虓為司徒齊王攸為驃騎將軍每朝政大議悉心陳之汝南王亮為太宰錄尚書事楚王瑋有勲而好立威亮憚之欲奪其兵權瑋甚憾乃承賈后㫖誣亮與衛瓘有廢立之謀矯詔遣其長史公孫宏與積弩將軍李肇夜以兵圍之帳下督李龍白外有變請距之亮不聼俄然楚兵登墻而呼亮驚曰吾無二心何至於是若有詔書其可見乎宏等不許促兵攻之長史劉凖謂亮曰觀此必是姦謀府中俊乂如林猶可盡力距戰又弗聼遂為肇所執乃歎曰我之忠心可破示天下也如何無道枉殺不辜是時大熱兵人坐亮于車下時人憐之為之交扇將及日中無敢害者瑋出令曰能斬亮者賞布千匹遂為亂兵所害投于北門之壁鬚髮耳鼻皆悉毁焉淮南王允元康九年入朝初愍懷之廢議者將立允為太弟㑹趙王倫廢賈后詔遂以允為驃騎將軍開府儀同三司侍中都督如故領中䕶軍允性沈毅宿衛將士皆敬服之倫既有僣逆志允隂知稱病不朝宻養死士潜謀誅倫倫甚憚之轉為太尉外示優崇實奪其兵也允稱病不拜倫遣御史逼允收官属以下劾以大逆允恚視詔乃孫秀手書也大怒便收御史將斬之御史走而獲免斬其令史二人厲色謂左右曰趙王欲破我家遂率國兵及帳下七百人直出大呼曰趙王反我將攻之佐淮南王者左袒於是歸之者甚衆允將赴宮尚書左丞王輿閉東掖門允不得入遂圍相府允所將兵皆淮南竒才劍客也與戰頻敗之倫兵死者千餘人太子左率陳徽勒東宮兵皷譟於内以應允結陳於承華門前弓弩齊發射倫飛矢雨下主書司馬畦秘以身蔽倫箭中其背而死倫官属皆隐樹而立每樹輙中數百箭自辰至未徽兄淮時為中書令遣麾騶虞幡以解鬭倫子䖍為侍中在門下省宻要壯士約以富貴於是遣司馬督䕶伏𦙍領騎四百從宮中出舉空版詐言有詔助淮南王允允不之覺開陣納之下車受詔為𦙍所害時年二十九初倫兵敗皆相傳曰已擒倫矣百姓大悦既而聞允死莫不歎息齊王冏趙王倫宻與相結廢賈后以功轉遊擊將軍冏以位不滿意有恨色孫秀㣲覺之且憚其在内出為平東將軍假節鎮許昌倫簒遷鎮東大將軍開府儀同三司欲以寵安之冏因衆心怨望潜與離狐王盛潁川王處穆謀起兵誅倫倫遣腹心張烏覘之烏反曰齊無異志冏既有成謀未發恐事泄乃與軍司管襲殺穆送首與倫以安其意謀定乃收襲殺之遂與豫州刺史何朂龍驤將軍董艾等起兵遣使告成都河間常山新野四王移檄天下征鎮州郡縣國咸使聞知揚州刺史郄隆承檄猶豫未决參軍王䆳斬之送首于冏冏屯軍陽翟倫遣其將閭和張泓孫輔出堮坂與冏交戰冏軍失利堅壘自守㑹成都軍破倫衆於黄橋冏乃出軍攻和等大破之及王輿廢倫惠帝反正冏誅討賊黨既畢率衆入雒頓軍通章署甲士數十萬旌旗器械之盛震於京都天子就拜大司馬加九錫之命傋物典策如宣景文武輔魏故事冏於是輔政居攸故宮成都王頴轉鎮北大將軍趙王倫之簒也進征北大將軍加開府儀同三司及齊王冏舉義頴發兵應冏以鄴令盧志為左長史頓丘太守鄭琰為右長史黄門郎程收為左司馬陽平太守和演為右司馬使兗州刺史王彦冀州刺史李毅督䕶趙驤石超等為前鋒羽檄所及莫不響應至朝歌衆二十餘萬趙驤至黄橋為倫將士猗許超所敗死者八千餘人士衆驚駭頴欲退保朝歌用盧志王彦策又使趙驤率衆八萬與王彦俱進倫復遣孫會劉琨等率三萬人與猗超合兵距驤等精甲耀日鐡騎前驅猗既戰勝有輕驤之心未及温十餘里復大戰猗等奔潰頴遂過河乗勝長驅左將軍王輿殺孫秀幽趙王倫迎天子反正頴入京都誅倫使趙驤石超等助齊王冏攻張泓於陽翟泓等遂降冏始率衆入雒自以首建大謀遂擅威權頴營于大學及入朝天子親勞焉東海王越初為中書令徙侍中遷司空領中書監成都王頴攻長沙王乂固守雒陽殿中諸將及三部司馬疲於戰守宻與左衛將朱黙夜收乂别省逼越為主啟惠帝免乂官事定越稱疾遜位帝不許加守尚書令太安初帝北征鄴以越為大都督六軍敗越奔下邳徐州都督東平王楙不納越徑還東海成都王頴以越兄弟宗室之美下寛令招之越不應命帝西幸以越為太傅與太宰顒夾輔朝政讓不受東海中尉劉洽勸越發兵以備頴越以洽為左司馬尚書曹馥為軍司既起兵楙懼乃以州與越越以司空領徐州都督以楙領兖州刺史越三弟並㨿方任征伐輙選刺史守相朝士多赴越而河間王顒挾天子發詔罷越等皆令就國越倡義奉迎大駕還復舊都率甲卒三萬西次蕭縣豫州刺史劉喬不受越命遣子祐距之越軍敗范陽王虓遣都䕶田徽以突騎八百迎越遇祐於譙祐衆潰越進屯陽武山東兵盛闗中大懼顒斬送張方首求和尋變計距越越率諸侯及鮮卑許扶厯駒次宿歸等歩騎迎惠帝反雒陽詔越以太傅錄尚書以下邳濟陽二郡增封及懷帝即位委政於越吏部郎周穆清河王覃舅越之姑子也與其妹夫諸葛玫共説越曰主上之為太弟張方意也清河王本太子為羣㓙所廢先帝不諱多疑東宫公盍思伊霍之舉以寧社稷乎言未卒越曰此豈宜言耶叱左右斬之以玫穆世家罪止其身因表除三族之法譙王承為湘州刺史王敦搆難遣参軍桓羆説承以劉隗専寵今便討擊請承以為軍司以軍期上道承歎曰吾其死矣地荒人鮮勢孤援絶赴君難忠也死王事義也惟忠與義夫復何求便欲倡義而衆心疑惑承曰吾受國恩義無有二府長史虞悝慷慨有志節謂承曰王敦居分陜之任而一旦作逆天地所不容人神所痛疾大王宗室藩屏寧可從其偽邪便宜電奮存亡以之於是與悝及弟前丞相掾望建昌太守長沙王循衡陽太守淮陵劉翼等共盟誓因桓羆馳檄湘州指期至巴陵零陵太守尹奉首同義謀出軍營陽於是一州之内皆同義舉乃使虞望討諸不服斬湘東太守鄭澹澹敦姊夫也敦遣南蠻校尉魏乂將軍李恒田嵩等甲卒二萬以攻承承且戰且守待救於尹奉虞望而城池不固人情震恐或勸承南投陶侃又云可退㨿零桂承曰吾舉義衆志在死節寧偷生茍免為奔敗之將乎事之不濟其令百姓知吾心耳城沒被害宋江夏王義恭遷侍中未拜元㓙劭肆逆遣召義恭先是詔召太子及諂諸王各有常人慮有詐妄致害者至是義恭求常所遣傳詔劭遣之而後入義恭請罷兵凡府内兵仗並送還臺進位太保服侍中服又領大宗師世祖入討劭疑義恭有異志使入住尚書下省分諸子並住神虎門外侍中下省劭聞世祖已次近路欲悉力逆之决戰中道義恭慮世祖船乘陋小劭豕突中流容能為患乃進説曰割棄南岸柵斷石頭此先朝舊法以逸待勞不憂不破也劭從之世祖前鋒至新亭劭挾義恭出戰常錄在左右故不能自㧞戰敗使義恭於東堂閲將義恭先使人具船東冶渚因單馬南奔始濟淮追騎已至北岸僅然得免劭大怒遣始興王濬就西省殺義恭十二子世祖時在新林浦義恭既至上表勸世祖即位彭城王義康錄尚書事文帝有虛勞疾每意有所想便覺心中痛裂屬纊者相係義康入侍醫藥盡心衛奉湯藥飲食非口所嘗不進或連夕不寐彌日不解衣内外衆事皆專决施行建平王宏文帝第七子元㓙弑立以宏為左將軍丹陽尹又以為散騎常侍領軍將軍江州刺史世祖入討劭錄宏殿内世祖先嘗以一手板與宏宏遣左右親信周法道齎手板詣世祖事平以為尚書左僕射使奉迎太后營浦侯遵考子琨之為竟陵王誕司空主簿誕作亂以為中兵參軍不就縶繫數十日終不受乃殺之追贈黄門郎詔吏部尚書謝莊為之誄南郡王義宣為荆雍都督元嘉三十年遷司徒中軍將軍揚州刺史侍中如故未及就徴值元㓙弑立以義宣為中書監太尉領司徒侍中如故義宣聞之即時起兵徴聚甲卒傳檄逺近㑹世祖入討義宣遣參軍徐遺寳率衆三千助為前鋒劉韞長沙王道憐之孫為宣城太守晉安王子勛為亂大衆屯據鵲尾攻逼宣城于時四方牧守莫不同逆惟韞棄郡赴朝廷太宗嘉其誠以為黄門郎太子中庻子侍中劉襲長沙王道憐之孫為安城太守晉安王子勛為逆襲據郡拒之勛遣軍攻圍不能下太宗嘉之以為郢州刺史封建陽縣侯食邑五百户南齊豫章王嶷嘗謂世祖曰古來言願陛下夀偕南山或稱萬嵗此殆近貎言如臣所懷實願陛下極夀百年亦足矣帝曰百年復何可得止得東西一百於事亦濟南康縣侯子恪建武中遷輔國將軍呉郡太守及司馬王敬則於㑹稽舉兵反奉子恪為名明帝悉召子恪子弟親從七十餘人入西省至夜當害之㑹子恪棄郡奔歸是日亦至明帝乃止以子恪為太子中庻子梁長沙元王弟藻出為使持節督南徐州刺史侯景亂藻遣長子彧率兵入援及城開加散騎常侍大將軍景遣其儀同蕭邕代之據京口藻因感氣疾不自療或勸奔江北藻曰吾國之台鉉任寄特隆既不能誅翦逆賊正當同死朝廷安能投身異類欲保餘生因不食累日薨尋陽王大心為郢州刺史大同七年徴為侍中兼石頭戍軍事太清元年為雲麾將軍江州刺史二年侯景冦京邑大心招集士卒逺近歸之衆至數萬與上流諸軍赴援宫闕三年城䧟上甲侯蕭韶南奔宣宻詔加散騎常侍進號平南將軍南郡王大連太清元年出為使持節輕車將軍東揚州刺史侯景入冦京都大連率衆四萬來赴及臺城沒援軍散復歸揚州河東王譽為南中郎將湘州刺史未㡬侯景冦京邑譽率軍入援至青草湖臺城沒有詔班師南浦侯淮安城王秀子也侯景之亂守東府城䧟握節死之邵陵王綸太清二年侯景反既䧟東府城綸率西豐公大春新塗將軍永安侯確超武將軍南安鄉侯駿前譙州刺史趙伯超武州刺史蕭弄璋歩兵校尉尹思合等馬歩三萬發自京口直㨿鍾山景黨大駭具船舟咸欲逃散分遣萬餘人距綸綸擊大破之斬首千餘級旦日景復陳兵覆舟山北綸亦列陣以待之景不進相持㑹日暮景引軍還安南鄉侯駿率數十騎挑之景回軍與戰駿退時趙伯超陳於𤣥武湖北見駿急不赴乃率軍前走衆軍因亂遂敗績綸奔京口賊盡獲輜重器甲斬首數百級生俘千餘人景既攻臺城綸與臨成公大連等自東道集于南岸荆州刺史湘東王遣世子方等兼司馬呉曄天門太守樊文皎下赴京師營于湘子岸前髙州刺史李遷任前司州刺史羊鴉仁又率兵繼至既而鄱陽世子嗣永安侯確羊鴉仁李遷仕樊文皎率衆渡淮攻賊東府城前柵破之遂結營于青溪水東景遣其儀同宋子仙頓南平王第緣水西立柵相拒景食稍盡至是米斛數十萬人相食者十五六初援兵至北岸百姓扶老擕㓜以俟王師纔得過淮便競剥掠賊黨有欲自㧞者聞之咸止邵陵攜王綸子確為太子舍人鍾山之役苦戰所向披靡及侯景乞盟憚確在外慮為後患啟求召確入城詔乃召確為南中郎將廣州刺史確知此盟多貳城必淪沒因欲南奔攜王聞之逼確使入確猶不肯攜王流涕謂曰汝欲反邪時臺使周石珍在坐確謂石珍曰侯景雖云欲去而不解長圍以意而推其事可見今召我入未見益也石珍曰勅㫖如此侯豈得辭確執意猶堅攜王大怒謂趙伯超曰譙州卿為我斬之當齎首赴闕伯超揮刃眄確曰我識君耳刀豈識君確於是流涕而出遂入城及景背盟復圍城城䧟確排闥而入啓髙祖曰城已䧟矣髙祖曰猶可一戰不對曰不可臣向親格戰勢不能禁自縋下城僅得至此髙祖歎曰自我得之自我失之亦復何恨乃使確為慰勞文確既出見景景愛其膂力常令在左右先是攜王遣人宻導確確出謂使者曰侯景輕佻可一夫力致確不惜死正欲手刃之但未得其便耳卿還啓家王願勿以為念也事未遂而為賊所害山桑侯㑹理南康簡王績之子太清二年侯景圍京邑㑹理治嚴將入援㑹北徐州刺史封山侯正表將應其兄正徳外託赴援實謀襲廣陵㑹理擊破之方得進路臺城䧟侯景遣前臨江太守董紹先以髙祖手勅召㑹理其僚佐咸勸距之㑹理曰諸君心事與我不同天子年尊受制賊虜今有手勅召我入朝臣子之心豈得違背且逺處江北功業難成不若身赴京都圖之肘腋吾計决矣遂席卷而行以城輸紹先至京景以為侍中司空兼中書令雖在冦手每思興復與西鄉侯歡等潛布腹心要結壯士時范陽祖皓斬董紹先㨿廣陵城起義期以㑹理為内應皓敗狀辭相連及景矯詔免㑹理官猶以白衣領尚書令是冬景徃晉熈京師虛弱㑹理復與桞敬禮謀之曰舉大事必有所資今無寸兵安可以動㑹理曰湖熟有吾舊兵三千餘人昨來相知尅期響集聼吾日定便至京師計賊守兵不過千人耳若大兵外攻吾等内應直取王偉事必有成縱景後歸無能為也敬禮曰善因賛成之于時百姓厭賊咸思用命自丹陽至於京口靡不同之後事不果與弟祈陽侯通理並遇害建安侯乂理南康簡王績之次子也太清中侯景内冦聚賓客數百輕裝赴南兖州隨兄㑹理入援常親當矢石為士卒先及城䧟又隨㑹理還廣陵因入齊為質乞師行二日㑹侯景遣董紹先據廣陵遂追㑹理因為所獲紹先防之甚嚴不得與兄弟相見乃偽請先還京得入辭母謂其姊固安公主曰事既如此豈可合家受斃兄若至願為言之善為計自勉勿顧以為念也家國阽危雖死非恨前途亦思立效未知天命如何耳至京以魏降人元貞立節忠正可以託孤乃以玉柄扇贈之貞怪其故不受乂理曰後當見憶幸勿推辭㑹祖皓起兵乂理奔長蘆收軍得千餘人其左右有應賊者因間刼㑹理其衆遂駭散為景所害時年二十一元貞始悟其前意往收葬焉瀏陽公大雅簡文帝之子也太清三年京城陷賊已乘城大雅猶命左右格戰賊至漸衆乃自縋而下因發憤感疾薨時年十七忠壯世子方等少聰敏有俊才初髙祖欲見諸王長子世祖遣方等入侍方等欣然升舟兾免憂辱行至繇水值侯景亂世祖召之方等啟曰昔申生不愛其死方等豈顧其生世祖省書歎息知無還意乃配歩騎一萬使援京城賊每來攻方等必身當矢石宫城陷方等歸荆州收集士馬甚得衆和世祖始歎其能方等又勸修築城柵以備不虞既成樓雉相望周回七十餘里世祖觀之甚悦河東王為湘州刺史不受督府之令方等乃乞征之世祖許焉拜為都督令帥精卒二萬南討方等臨行謂所親曰吾此段出征必死無二死而獲所吾豈愛生及至麻溪河東王率軍逆戰方等擊之軍敗遂溺死時年二十二宜豐侯脩為秦梁二州刺史時兄嗣鄱陽王範在湓城頗有異論武陵王大生疑防流言噂􅊱脩深自分釋求送質子并請助防武陵王乃遣從事中郎蕭固諮以當世之事且觀脩意脩涕泣為言忠臣孝子之節王敬納之故終脩之時不為不義一夕忽有狗據脩所卧牀而卧脩曰此其戎乎因大脩城壘承聖元年魏將逹奚武來攻脩遣記室参軍劉璠至益州求救於武陵王紀紀遣將楊乾運援之拜脩隋郡王璠還至嶓􅜗乃降於魏乾運班師璠至城下説城中降魏脩數之曰卿不能死節反為説客邪命射之間信遣至荆州元帝遣與相聞脩中直兵參軍陳晷甚勇有口才為覘候見獲以辭烈被害乃遣諮議虞馨致武牛酒武謂曰梁已為侯景所敗王何為守此孤城脩荅守之以死誓為斷頭將軍陳長沙王叔堅始興王叔陵弟也宣帝弗豫叔堅叔陵等並從後主侍疾叔陵隂有異志乃命典藥吏曰切藥刀甚鈍可礪之及宣帝不諱倉卒之際又命其左右於外取劍左右弗悟乃取朝服所佩木劍以進叔陵怒叔堅在側聞之疑有變伺其所為及翌日小歛叔陵䄂剉藥刀趨進斫後主中項後主乳母安樂君吳氏俱以身捍之獲免叔堅自後扼叔陵擒之并奪其刀將殺之問後主曰即盡之為待也後主不能應叔陵舊多力須臾自奮得脱出雲龍門入於東府城兵敗走趨新林蕭摩訶追斬之岳陽王叔慎禎明元年出為持節都督湘衡桂武四州諸軍事智武將軍湘州刺史三年隋師濟江破臺城前刺史晉熈王叔文巴州刺史畢寳荆州刺史陳紀並降隋行軍元帥清河公楊素兵下荆門别遣其將龎暉將兵略地南至湘州城内將士莫有固志剋日請降叔慎乃置酒㑹文武僚吏酒酣叔慎歎曰君臣之義盡於此乎長史謝基伏而流涕湘州助防遂興侯正理在坐乃起曰王辱臣死諸君獨非陳國之臣乎今天下有難實是致命之秋也縱其無成猶見臣節青門之外有死不能今日之機不可猶豫後應者斬衆咸許諾乃殺牲結盟仍遣人詐奉降書於龎暉暉信之克期而入叔慎伏甲待之暉令數百人屯於城門自將左右數十人入于㕔事俄而伏兵發縛暉以徇盡擒其黨皆斬之叔慎坐於射堂招合士衆數日之中兵至五千人衡陽太守樊通武州刺史鄔居業皆請赴難未至隋遣中牟公薛胄為湘州刺史聞龎暉死乃益請兵隋又遣行軍總管劉仁恩救之未至薛胄兵次鵝羊山叔慎遣正理及樊通拒之因大合戰自旦至於日昃隋軍迭息迭戰而正理兵少不敵於是大敗胄乘勝入城生擒叔慎是時鄔居業率其衆自武州來赴出横橋江聞叔慎敗績乃頓于新康口隋總管劉仁恩兵亦至横橋據水置營相持信宿因合戰居業又敗仁恩虜叔慎正理居業及其黨與十餘人秦王斬之于漢口叔慎時年十八册府元龜卷二百八十五
