body:
  text: 册府元龜卷二百四十八宋王欽若等撰列國君部攻伐書曰列爵惟五分土惟三所以錫壤開封建賢立徳乃用其制以為藩屏暨夫衰世交相攻伐陳師鞠旅或勤王而討不庭遣將即戎或主覇而存危國斯則近於仁義之舉得乎節制之道矣及乎以彊暴弱以曲凌直生民之肝腦塗地而靡顧親隣之盟誓在耳而遽絶衰世之弊一至於此故仲尼曰天下有道禮樂征伐自天子出天下無道禮樂征伐自諸侯出信哉斯言之可徵也魯公伯禽宅曲阜今兗州徐夷竝興東郊不開徐戎淮夷並起為冦於魯故東郊不開作費誓魯侯征之於費地而誓衆也費魯東郊之地名公曰嗟人無譁聽命伯禽為方伯監七百里内之諸侯帥之以征嘆而勅之無使喧嘩欲其静聽誓命徂兹淮夷徐戎竝興今征此善糓乃甲胄敿乃干無敢不弔言當善簡汝甲鎧胃鍪無敢不至令攻堅使可用備乃弓矢鍜乃戈矛礪乃鋒刄無敢不善僃調弓矢鍜鍊戈矛磨礪鋒刄皆使無敢不工善今惟淫舍牿牛馬今軍人惟大放舍牿牢之牛馬言軍所在必放牧之杜乃擭敜乃穽無敢傷牿牿之傷汝則有常刑捕獸機檻當杜塞之穽穿地以䧟獸敜之無敢令傷所放牿牢之牛馬牛馬之傷汝則有殘人之畜常刑馬牛其風臣妾逋逃無敢越逐馬牛其有奔佚臣妾逋亡勿敢棄越壘伍而求逐之役人賤者男曰臣女曰妾祗復之我商賚汝衆人其有得佚馬牛逃臣妾皆還敬復之我則商度汝功賜與汝乃越逐不復汝則有常刑越逐為失伍不還為攘盗汝則有此常刑無敢冦攘踰垣墻軍人無敢暴刦人無越人墻物有自來者無敢取之竊馬牛誘臣妾汝則有常刑軍人盗竊馬牛誘偷奴婢汝則有犯軍令之常刑甲戌我惟征徐戎誓後甲戌之日我惟征之峙乃糗糧無敢不逮汝則有大刑皆當儲峙汝糗糒之糧使足食無敢不相逮及汝則有乏軍興之死刑魯人三郊三遂峙乃楨幹甲戌我惟築總諸國之兵而但稱魯人峙具楨幹道近也題曰楨旁曰幹言三郊三遂明東郊距守不峙甲戌日當築攻敵壘距堙之屬無敢不供汝則有無餘刑非殺峙具楨幹無敢不供不供汝則有無餘之刑刑者非一也然亦非殺汝魯人三郊三遂峙乃芻茭無敢不多汝則有大刑郊遂多積芻茭供軍牛馬不多汝則亦有乏軍興之大刑作此費誓遂平徐戎定魯隱公元年五月鄭伯克叚于鄢初鄭莊公弟京城太叔京鄭邑今滎陽京縣太叔即叚也繕甲兵具卒乘歩曰卒車曰乗将襲鄭公命子封帥車二百乘以伐京古者兵車一乘甲士三人歩卒七十二人京叛太叔叚叚入于鄢公伐諸鄢太叔出奔共共國今汲郡共縣八月紀人伐夷夷國在城陽荘武縣紀國在東莞劇縣十月鄭共叔之亂公孫滑出奔衛公孫滑共叔叚之子衛人為之伐鄭取廪延鄭人以王師虢師伐衛南鄙虢西虢國也𢎞農陜縣東南南有虢城二年十二月鄭人伐衛討公孫滑之亂也治元年取廩延之亂四年二月莒人伐杞取牟婁杞國本陳留雍丘縣牟婁杞邑城陽諸縣東北有婁鄉夏宋公陳侯蔡人衛人伐鄭初宋殤公之即位也公子馮出奔鄭鄭人欲納之及衛州吁立将修先君之怨於鄭謂二年鄭人伐衛之怨而求寵於諸侯以和其民謂篡立者諸侯既與之㑹則不復討故欲求此寵使告於宋曰君若伐鄭以除君害害謂宋公子馮君為主敝邑以賦與陳蔡從則衛國之願也言舉國之賦調宋人許之於是陳蔡方睦於衛蔡今汝南上蔡縣故宋公陳侯蔡人衛人伐鄭圍其東門五日而還五年四月鄭人侵衛牧牧衛邑以報東門之役衛人以燕師伐鄭南燕國今東郡燕縣鄭祭足原繁洩駕以三軍軍其前使曼伯與子元潛軍軍其後燕人畏鄭三軍而不虞制人北制鄭邑今河南成臯縣六月鄭二公子以制人敗燕師於北制二公子曼伯子元秋衛師入郕衛之亂也郕人侵衛故衛師入郕郕國也東平剛父縣西南有郕鄉九月邾人鄭人伐宋邾主兵故序鄭上宋人取邾田邾人告於鄭曰請君釋憾於宋敝邑為道釋四年再見伐之恨鄭人以王師㑹之伐宋入其郛以報東門之役郛郭也十二月宋人伐鄭圍長葛以報入郛之役六年五月庚申鄭伯侵陳大獲冬宋人取長葛秋取冬乃告也前年冬圍不克而還今冬乘長葛無偹而取之言易也七年七月公伐邾為宋討也公距宋而更與鄭平欲以為援今鄭復與宋盟故懼而伐邾欲以求宋故曰為宋討九年冬北戎侵鄭鄭伯禦之患戎師曰彼徒我車懼其侵軼我也徒歩兵也軼突也公子突曰使勇而無剛者嘗㓂而速去之公子突鄭厲公也嘗試也勇則能往無剛不恥退君為三覆以待之覆伏兵也戎輕而不整貪而無親勝不相讓敗不相救先者見獲必務進進而遇覆必速奔後者不救則無繼矣乃可以逞逞解也從之戎人之前遇覆者奔祝聃逐之祝聃鄭大夫𠂻戎師前後擊之盡殪為三部伏兵祝聃帥勇而無剛者先犯戎而速奔以遇三伏兵至後伏兵起戎還走祝聃反逐之戎前後及中三處受敵故曰𠂻戎師殪死也戎師大奔後駐軍不復繼也十一月甲寅鄭人大敗戎師十年夏翬帥師㑹齊人鄭人伐宋公子翬不待公命而貪㑹二國之君疾其專進故去氏齊鄭以公不至故亦更使㣲者從之伐宋不言及明翬專行非鄭之謀也六月壬戌公敗宋師于菅齊鄭後期故公獨敗宋師書敗宋未陳也辛未取郜辛巳取防鄭後至得郜防二邑歸功於魯故書取明不用師徒也濟隂成武縣東南有郜城高平昌邑縣西南有西防城七月庚寅鄭師入郊猶在郊鄭師還駐兵於逺郊宋人衛人入鄭宋衛竒兵乘虚入鄭蔡人從之伐戴從宋衛伐戴也八月壬戌鄭伯圍戴癸亥克之取三師焉三國之軍在戴故鄭伯合圍之師者軍旅之通稱宋衛既入鄭而以伐戴召蔡人伐戴乃召之蔡人怒故不和而敗言鄭取之易也九月戊寅鄭伯入宋十月壬午齊人鄭人入郕討違王命也十一年夏公㑹鄭伯于時來時來郲也滎陽縣東有釐城鄭地也謀伐許也鄭伯将伐許五月甲辰授兵於大宫大宫鄭祖廟七月公㑹齊侯鄭伯伐許潁考叔取鄭伯之旗蝥弧以先登子都自下射之顛瑕叔盈又以蝥弧登瑕叔盈鄭大夫周麾而呼曰君登矣周徧也麾招也鄭師畢登壬午遂入許許荘公奔衛齊侯以許讓公公曰君謂許不共不共職貢故從君討之許既伏其罪矣雖君有命寡人弗敢與聞乃與鄭人鄭伯使許大夫百里奉許叔以居許東偏許叔許荘公之弟東偏東鄙也曰天禍許國鬼神實不逞於許君而假手於我寡人借手於我寡徳之人以討許寡人唯是一二父兄不能共億父兄同姓群臣共給億安也其敢以許自為功乎寡人有弟不能和協而使餬其口於四方弟共叔叚也餬鬻也出奔在元年其况能久有許乎吾子其奉許叔以撫柔此民也吾將使獲也佐吾子獲鄭大夫公孫獲若寡人得沒於地以夀終天其以禮悔禍於許言天加禮于許而悔禍之無寜兹許公復奉其社稷無寜寜也兹此也唯我鄭國之有請謁焉如舊昏媾謁告也婦之夫曰昏重婚曰媾其能降以相從也降降心也無滋他族實偪處此以與我鄭國争此土也吾子孫其覆亡之不暇而况能禋祀許乎潔齊以享謂之禋祀謂許山川之祀寡人之使吾子處此不唯許國之為亦聊以固吾圉也圉邉陲也乃使公孫獲處許西偏曰凡而噐用財賄無置於許我死乃亟去之吾先君新邑於此此今河南新鄭舊鄭在京兆王室而既卑矣周之子孫日失其序鄭亦周之子孫夫許大岳之裔也大岳神農之後堯四岳也裔繼也天而既厭周徳矣吾其能與許争乎是年鄭息有違言以言語相違恨息侯伐鄭鄭伯與戰于竟息師大敗而還息國汝南新息縣君子是以知息之将亡也不度徳鄭荘賢不量力息國弱不親親鄭息同姓之國不徵辭不察有罪言語相恨當明徵其辭以審曲直不宜輕鬬犯五不韙而以伐人其喪師也不亦宜乎十月鄭伯以虢師伐宋壬戌大敗宋師以報其入鄭也桓公二年秋七月杞侯來朝不敬公即位而來朝杞侯歸乃謀伐之九月入杞討不敬也三年春晉曲沃武公伐翼次于陘庭韓萬御戎梁𢎞為右武公曲沃莊伯子也韓萬莊伯弟也御戎僕也右戎車之右逐翼侯於汾隰汾隰汾水邊驂絓而止驂騑馬夜獲之及欒共叔共叔桓叔之傅欒賓之子也身傅翼侯父子各狥所奉之主故并見獲而死六年春楚武王侵隨隨國今義陽隨縣使薳章求成焉薳章楚大夫軍於瑕以待之瑕隨地隨人使少師董成少師隨大夫董正也夏北戎伐齊齊侯使乞師於鄭鄭太子忽帥師救齊六月大敗戎師獲其二帥大良少良甲首三百以獻於齊甲首披甲者首七年夏盟向求成于鄭既而背之盟向二邑名隱公十一年王以與鄭故求與鄭成秋鄭人齊人衛人伐盟向王遷盟向之民于郟郟王城八年春滅翼曲沃滅之夏楚子合諸侯于沈鹿沈鹿楚地黄隨不㑹黄國今弋陽縣使薳章讓黄責其不㑹楚子伐隨軍於漢淮之間季梁請下之弗許而後戰下之請服也所以怒我而怠冦也少師謂隨侯曰必速戰不然将失楚師隨侯禦之望楚師遥見楚師季梁曰楚人上左君必左君楚君也無與王遇且攻其右右無良焉必敗偏敗衆乃携矣少師曰不當王非敵也弗從不從季梁謀戰于速杞隨師敗績隨侯逸速杞隨地逸逃也鬬丹獲其戎車與其戎右少師鬭丹楚大夫戎車君所乗兵車也戎右車右也寵之故以為右秋隨及楚平楚子将不許鬭伯比曰天去其疾矣去疾謂少師見獲而死隨未可克也乃盟而還九年春巴子使韓服告于楚請與鄧為好韓服巴行人巴國在巴郡江州縣楚子使道朔将巴客以聘於鄧道朔楚大夫巴客韓服鄧南鄙鄾人攻而奪之幣鄾在今鄧縣南沔水之北殺道朔及巴行人楚子使薳章讓於鄧鄧人弗受言非鄾人所攻夏楚使鬬廉帥師及巴師圍鄾鬭亷楚大夫鄧養甥𣆀甥帥師救鄾三逐巴師不克二甥皆鄧大夫鬬廉衡陳其師於巴師之中以戰而北衡横也分巴師為二部鬭亷衡陳於其間以與鄧師戰而偽北北走也鄧師逐之背巴師而夾攻之楚師偽走鄧師逐之背巴師巴師攻之楚師自前還與戰鄧師大敗鄾人宵潰秋虢仲芮伯梁伯荀侯賈伯伐曲沃梁國在馮翊夏陽縣荀賈皆國名十年十二月丙午齊侯衛侯鄭伯來戰于郎改侵伐而書來戰善魯之用周班初北戎病齊在六年諸侯救之鄭公子忽有功焉齊人餼諸侯使魯次之魯以周班後鄭鄭人怒請師于齊齊人以衛師助之十一年春楚屈瑕将盟貳軫貳軫二國名鄖人軍於蒲騷将與隨絞州蓼伐楚師鄖國在江夏雲杜縣東南有鄖城蒲騷鄖邑絞國名州國在南郡華容縣東南蓼國今義陽棘陽縣東南湖陽城莫敖患之莫敖楚官名即屈瑕鬭亷曰鄖人軍其郊必不誡且日虞四邑之至也虞度也四邑隨絞州蓼也邑亦國也君次于郊郢以禦四邑君謂屈瑕也郊郢楚地我以鋭師宵加於鄖鄖有虞心而恃其城恃近其城莫有鬭志若敗鄖師四邑必離遂敗鄖師於蒲騷卒盟而還卒盟貳軫十二年冬公㑹宋公于龜宋地欲平宋鄭宋公辭平故與鄭伯盟于武父宋公貪鄭賂與公三㑹而卒辭不與鄭平遂帥師而伐宋戰焉宋無信也是冬楚伐絞軍其南門莫敖屈瑕曰絞小而輕輕則寡謀請無扞采樵者以誘之扞衛也樵薪也從之絞獲三十人獲楚人也明日絞人争出驅楚役徒於山中楚人坐其北門而覆諸山下坐猶守也覆設伏兵而待之大敗之為城下之盟而還十三年春二月己巳及齊侯宋公衛侯燕人戰齊師宋師衛師燕師敗績或稱人或稱師史異辭也是春楚屈瑕伐羅及鄢亂次以濟鄢水在襄陽宜城縣入漢及羅羅與盧戎兩軍之盧戎南蠻大敗之莫敖縊于荒谷十四年冬宋人以齊人蔡人衛人陳人伐鄭能左右之曰以報宋之戰也在十二年焚渠門入及大逵渠門鄭城門逵道方九軌伐東郊取牛首東郊鄭郊牛首鄭邑以大宫之椽歸為盧門之椽大宫鄭祖廟盧門宋城門十六年四月公㑹宋公衛侯陳侯蔡侯伐鄭春既謀之今書㑹者魯諱議納不正蔡嘗在衛上今序陳下蓋後至夏伐鄭秋七月公至自伐鄭以飲至之禮也十七年五月丙午及齊師戰于奚奚魯地皆陳曰戰疆事也争疆界也於是齊人侵魯疆疆吏來告公曰疆埸之事慎守其一而僃其不虞虞度也不度猶不意也姑盡所僃焉事至而戰又何謁焉齊背盟而來公以信待故不書侵伐秋伐邾宋志也邾宋争疆魯從宋志背趡之盟莊公元年冬齊師遷紀郱鄑郚齊欲滅紀故徙其三邑之民而取其地郱在東莞臨胊縣東南鄑在朱虚縣東南北海都昌縣西有訾城二年夏公子慶父帥師伐於餘丘於餘丘國名也三年正月溺㑹齊師伐衛溺魯大夫疾其專命而行故去氏四年三月楚武王荆尸授師孑焉以伐隨尸陳也荆亦楚也更為楚陳兵之法揚雄方言孑者㦸也然則楚於此始用㦸為陳王行卒於樠木之下樠木木名令尹鬬祁莫敖屈重除道梁溠營軍臨隨隨人懼行成時秘王喪故為竒兵更開直道溠水名梁橋也莫敖以王命入盟隨侯且請為㑹於漢汭而還汭内也謂漢西濟漢而後發䘮五年冬公㑹齊人宋人陳人蔡人伐衛納惠公也惠公朔也桓公十六年出奔齊八年正月師次于郎以俟陳人蔡人期共伐郕陳蔡不至駐師于郎以待之甲午治兵治兵于廟習號令将以圍郕夏師及齊師圍郕郕降于齊師二國同討而齊獨納郕秋師還九年夏公伐齊納子紏齊小白入于齊二公子各有黨子糾黨須伐乃得入又出在小白之後小白稱入從國逆之文本無位秋師及齊師戰於乾時我師敗績公䘮戎路傳乘而歸戎路兵車傳乘乗他車秦子梁子以公旗辟于下道二子公御及戎右也以公旗誤齊師是以皆止止獲也鮑叔帥師來言曰子糾親也請君討之鮑叔乗勝而進軍志在生得管仲故託不忍之辭管召讐也請受而甘心焉管仲射桓公故曰讐甘心言欲快意戮殺之乃殺子糾於生竇生竇魯地召忽死之十年春齊師伐魯夏六月齊師宋師次于郎公子偃曰宋師不整可敗也公子偃魯大夫宋敗齊必還請擊之公弗許自雩門竊出䝉臯比而先犯之雩門魯城南門臯比虎皮公從之大敗宋師于乗丘齊師乃還九月荆敗蔡師于莘荆楚本號後改為楚莘蔡地以蔡侯獻舞歸獻舞蔡季十月齊師滅譚譚國在濟南平陵縣西南齊侯之出過譚譚不禮焉及其入也諸侯皆賀譚又不至遂滅譚譚子奔莒十一年五月戊寅公敗宋師于鄑鄑魯地宋為乘丘之役故侵我公禦之宋師未陳而薄之敗諸鄑十三年春齊侯宋人陳人蔡人邾人㑹於北杏北杏齊地以平宋亂宋有弑君之亂齊桓欲修覇業遂人不至夏齊人滅遂而戍之戍守也十四年春齊人陳人曹人伐宋背北杏㑹齊請師于周齊欲崇天子故請師假王命以示大順夏單伯㑹之取成于宋而還夏楚子以蔡侯滅息遂伐蔡七月楚入蔡十五年秋宋人齊人邾人伐郳郳附庸屬宋而叛故齊桓為之伐郳鄭人間之而侵宋十六年夏宋人齊人衛人伐鄭宋故也鄭侵宋也鄭伯自櫟入緩告于楚秋楚伐鄭及櫟為不禮故也十八年冬巴人伐楚初楚武王克權使鬬緡尹之權國名南郡當陽縣東南有權城鬬緡楚大夫以叛圍而殺之緡以權叛遷權於那處那處楚地南郡編縣東南有那口城使閻敖尹之閻敖楚大夫及文王即位與巴人伐申而驚其師驚巴師巴人叛楚而伐那處取之遂門于楚攻楚城門閻敖㳺涌而逸涌水在南郡華容縣閻敖不能守城又㳺涌水而逸楚子殺之其族為亂巴人因之以伐楚楚子禦之大敗於津為巴人所敗津楚地十九年冬齊人宋人陳人伐魯西鄙幽之盟魯使㣲者㑹鄄之盟使媵臣行所以受敵鄙邊邑二十六年秋㑹宋人齊人伐徐宋序齊上主兵虢人侵晉冬虢人又侵晋二十八年三月甲寅齊人伐衛衛人及齊人戰衛人敗績數之以王命取賂而還秋楚令尹子元以車六百乗伐鄭入于桔柣之門桔柣鄭逺郊之門也諸侯救鄭楚師夜遁鄭人将奔桐丘許昌縣東北有桐丘城諜告曰楚幕有烏乃止諜間也幕帳也二十九年夏鄭人侵許閔公元年冬晉侯作二軍晉本一軍公將上軍太子申生將下軍趙夙御戎畢萬為右為公御右也夙趙衰兄畢萬魏犫祖父以滅耿滅霍滅魏平陽皮氏縣東南有耿鄉永安縣東北有霍太山三國皆姬姓僖公元年七月楚人伐鄭荆始改號曰楚鄭即齊故也九月公敗邾師于偃虚丘之戍將歸者也虛丘邾地邾人既送哀姜還齊人殺之因戍虚丘欲以侵魯公以義求齊齊送姜氏之䘮邾人懼乃歸故公要而敗之十月壬午公子友帥師敗莒師于酈獲莒拏莒人來求還慶父之賂拏莒子之弟二年春晉獻公使荀息以屈産之乘與垂棘之璧假道於虞以伐虢曰冀為不道入自顛軨伐鄍三門前是冀伐虞至鄍鄍虞邑河東大陽縣東北有顛軨坂冀之既病則亦唯君故言虞報伐冀使病将欲假道故稱虞彊以説其心冀國名平陽皮氏縣東北有冀亭今虢為不道保於逆旅逆旅客舍也虢稍遣人分依客舍以聚衆抄晋邊邑以侵敝邑之南鄙敢請假道以請罪于虢問虢伐己以何罪虞公許之且請先伐虢喜於厚賂而欲求媚宫之竒諌不聴遂起師夏晉里克荀息帥師㑹虞師伐虢滅下陽晋猶主兵不信虞冬楚人伐鄭鬬章囚鄭𣆀伯經書侵傳言伐本以伐興權行侵掠三年四月徐人取舒徐國在下邳僮縣東南舒國今廬江舒縣勝國而不用大師亦曰取冬楚人伐鄭鄭伯欲成孔叔不可曰齊方勤我孔叔鄭大夫勤恤鄭難棄徳不祥祥善也四年正月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯侵蔡蔡潰民逃其上曰潰遂伐楚次于陘楚子使與師言曰君處北海寡人處南海唯是風馬牛不相及也楚界猶未至南海因齊處北海遂稱所近牛馬風逸盖末界之㣲事故以取喻不虞君之渉吾地也何故管仲對曰昔召康公命我先君太公召康公周太保召公奭也曰五侯九伯女實征之以夾輔周室五等諸侯九州之伯皆得征討其罪齊桓因此命以夸楚賜我先君履東至于海西至于河南至于穆陵北至于無棣穆陵無棣皆齊境也履所踐履之界齊桓又因以自言其盛爾貢包茅不入王祭不共無以縮酒寡人是徵包裹束也茅菁茅也束茅而灌之以酒為縮酒尚書包匭菁茅茅之為異未審昭王南征而不復寡人是問昭王成王之孫南廵狩渉漢船壊而溺周人諱而不赴諸侯不知其故故問之對曰貢之不入寡君之罪也敢不供給昭王之不復君其問諸水濵昭王時漢非楚境故不受罪師進次于陘楚不服罪故進師夏楚子使屈完如師如陘之師觀强弱師退次於召陵完請盟故屈完及諸侯盟陳轅濤塗謂鄭申侯曰師出於陳鄭之間國必甚病申侯鄭大夫當有共給之費故若出於東方觀兵於東夷循海而歸其可也東夷郯莒徐夷也觀兵示威申侯曰善濤塗以告齊侯許之許出東方申侯見曰師老矣若出於東方而遇敵懼不可用也若出于陳鄭之間共其資糧屝屨其可也屝草履齊侯説與之虎牢還以鄭邑賜之執轅濤塗秋伐陳討不忠也以濤塗為誤軍道冬叔孫戴伯帥師㑹諸侯之師侵陳陳成歸轅濤塗九年十一月齊侯以諸侯之師伐晋及髙梁而還討晋亂也髙梁晋地在平陽縣西南十一年冬楚人伐黄黄恃齊故十二年夏楚人滅黄黄人恃諸侯之睦於齊也不共楚職曰自郢及我九百里焉能害我十五年春楚人伐徐徐即諸夏故也三月孟穆伯帥師及諸侯之師救徐諸侯次于匡以待之秋伐厲以救徐也冬宋人伐曹討舊怨也莊十四年曹與諸侯伐宋楚敗徐於婁林徐恃救也十一月壬戌晋侯及秦伯戰于韓韓晋地獲晋侯初晋侯許賂中大夫中大夫國内執政里㔻等既而皆背之賂秦伯以河外列城五東盡虢畧南及華山内及解梁城既而不與河外河南也東盡虢畧從河南而東盡虢界也解梁城今河東解縣也晋饑秦輸之粟在十三年秦饑晋閉之糴故秦伯伐晉戰于韓原晋戎馬還濘而止濘泥也還便旋也小駟不調故墮泥中秦獲晋侯以歸秦伯伐晋晉侯三敗慶鄭諌弗聴及戰于韓原公號慶鄭慶鄭曰愎諫違卜固敗是求又何逃焉遂去之秦獲晋侯以歸及晋侯歸臣欽若等曰晉惠公即位六年為秦所虜復立之殺慶鄭而後入十六年夏齊伐厲不克救徐而還十五年齊伐厲救徐十七年春齊人為徐伐英氏以報婁林之役也英氏楚與國婁林役在十五年夏師滅項師魯師項國今汝隂項縣淮之㑹公有諸侯之事未歸而取項淮㑹在前年冬諸侯之事㑹同講禮之事齊人以為討而止公内諱執皆言止十月齊桓公卒立公子無虧孝公奔宋故伐齊以納孝公十八年正月宋襄公以曹伯衛人邾人伐齊三月齊人殺無虧以說宋齊人将立孝公不勝四公子之徒無虧已死故曰四公子遂與宋人戰五月戊寅宋師及齊師戰于甗甗齊地齊師敗績立孝公而還冬邢人狄人伐衛狄稱人者史異辭圍莬圃衛侯以國讓父兄子弟及朝衆曰茍能治之燬請從焉燬衛文公名衆不可不聴衛侯讓而後師于訾婁衛邑狄師還獨言狄還則邢留距衛言邢所以終為衛所㓕十九年秋衛人伐邢以報莬圃之役邢不速退所以獨見伐於是衛大旱卜有事於山川不吉有事祭也寗莊子曰昔周饑克殷而年豐今邢方無道諸侯無伯伯長也天其或者欲使衛討邢乎從之師興而雨秋宋人圍曹討不服也曹南盟不修地主禮故二十年春滑人叛鄭而服於衛夏鄭公子士洩堵冦帥師入滑公子士鄭文公子洩堵冦鄭大夫鄭之入滑也滑人聴命師還又即衛鄭公子士洩堵俞彌帥師伐滑堵俞彌鄭大夫伐滑在二十四年冬楚人伐隨初隨以漢東諸侯叛楚冬楚鬬榖於莬帥師伐隨取成而還君子曰隨之見伐不量力也量力而動其過鮮矣善敗繇已而繇人乎哉二十一年秋宋公楚子陳侯蔡侯鄭伯許男曹伯㑹于盂盂宋地子魚曰禍其在此乎君欲已甚其何以堪之於是楚執宋公以伐宋冬邾人滅湏句須句子來奔公伐邾為邾滅湏句故二十二年春公伐邾取湏句反其君焉禮也得恤寡小之禮夏宋公衛侯許男滕子伐鄭子魚曰所謂禍在此矣八月丁未公及邾戰于升陘我師敗績邾人獲公胄懸諸魚門魚門邾城門是月楚人伐宋以救鄭大司馬固諌曰大司馬固荘公之孫公孫固也天之棄商久矣君将興之弗可赦也已弗聽十一月己巳朔宋公及楚人戰于泓宋人既成列楚人未既濟司馬曰子魚也彼衆我寡及其未既濟也請擊之公曰不可既濟而未成列又以告公曰未可既陳而後擊之宋師敗績公傷股門官殱焉門官守門者師行則在君左右二十三年春齊侯伐宋圍緡緡宋邑髙平曷邑縣東南有東緡城以討其不與盟十九年盟于齊而宋獨不㑹復召齊盟于鹿上故今討之秋楚成得臣帥師伐陳討其貳於宋也成得臣子玉也遂取焦夷城頓而還焦今譙縣也夷一名城父今譙郡城父縣頓國今汝隂南頓也二十五年正月丙午衛侯燬滅邢邢同姓也故名秋晋秦伐鄀鄀本在商宻秦楚界上小國其後遷于南郡鄀縣楚鬬克屈禦冦以申息之師戍商宻鬭克申公子儀屈禦冦息公子邊商宻鄀别邑今南鄉丹水縣戍守也二子屯兵于析為商宻援秦人過析隈入而係輿人以圍商宻昬而傅焉析楚邑一名白羽今南鄉析縣隈隐蔽處係縛輿人詐為克析得其囚俘者昬而傅城不欲令商宻知囚非析人宵坎血加書偽與子儀子邉盟者掘地為坎以埋盟之餘血加盟書其上商宻人懼曰秦取析矣戍人反矣乃降秦師秦囚申公子儀息公子邊以歸商宻既降析戍亦敗故得囚二子楚令尹子玉追秦師弗及不復言晋者秦為兵主遂圍陳納頓子于頓為頓圍陳二十六年春齊師侵魯西鄙公追齊師至酅弗及濟北榖城縣西有地名酅下夏齊孝公伐魯北鄙公使展喜犒師勞齊師使受命于展禽柳下惠齊侯未入竟展喜從之衛人伐齊洮之盟故也洮盟在前年秋楚人滅䕫䕫楚同姓國今建平秭歸縣䕫子不祀祝融與鬻熊楚之逺祖也䕫楚之别封楚人讓之對曰我先王熊摰有疾鬼神弗赦而自竄于䕫吾是以失楚又何祀焉廢其嘗祀而飾辭文過楚成得臣鬬宜申帥師滅䕫以䕫子歸成得臣令尹子玉也鬬宜申司馬子西也冬楚令尹子玉司馬子西帥師伐宋圍緡初東門襄仲臧文仲如楚乞師臧孫見子玉道之伐齊宋以其不臣也言其不臣事周室可以此罪責而伐之也公以楚師伐齊取糓師能左右之曰以寘桓公子雍於糓易牙奉之以為魯援雍本與孝公争立故使居糓以偪齊二十七年春杞桓公來朝用夷禮公卑杞杞不共也八月乙巳公子遂帥師入杞責無禮也責不共也冬楚人陳侯蔡侯鄭伯許男圍宋公孫固如晋告急二十八年春晉侯将伐曹假道于衛曹在衛東故衛人弗許還自南河濟從汲郡南渡出衛南而東侵曹伐衛正月戊申取五鹿五鹿衛地晋侯圍曹門焉多死攻曹城門曹人尸諸城上磔晋死人于城上晉侯患之聽輿人之謀曰稱舍於墓輿衆也舍墓為将發塜師遷焉曹人兇懼遷至曹人墓兇兇恐懼聲為其所得者棺而出之因其兇也而攻之三月丙午入曹數之以其不用僖負覊而乗軒者三百人也四月戊辰晋侯宋公齊國歸父崔夭秦小子憖次于城濮國歸父崔夭齊大夫也小子憖秦穆公子也城濮衛地楚師背酅而舍酅丘陵險阻名晉侯患之聽輿人之誦恐衆畏險故聴其歌誦曰原田每每舍其舊而新是謀髙平曰原喻晋君美盛若原田之草每每然可以謀立新功不足念舊惠公疑焉疑衆謂己背舊謀新子犯曰戰也戰而㨗必得諸侯若其不㨗表裏山河必無害也晋國外河而内山公曰若楚惠何欒貞子曰漢陽諸姬楚實盡之貞子欒枝也水北曰陽姬姓之國在漢北者楚盡滅之思小惠而忘大恥不如戰也楚子玉使鬬勃請戰鬭勃楚大夫曰請與君之士戲君馮軾而觀之得臣與寓目焉寓寄也晋侯使欒枝對曰寡君聞命矣楚君之惠未之敢忘是以在此為大夫退其敢當君乎既不獲命矣不獲止命敢煩大夫謂二三子煩鬭勃令戒勑子玉子西之屬也戒爾車乗敬爾君事詰朝将見詰朝平旦晋車七百乗韅靷鞅靽五萬二千五百人在背曰韅在胷曰靷在腹曰鞅在後曰靽言駕車修備也晋侯登有莘之虚以觀師曰少長有禮其可用也有莘故國名少長猶言大小遂伐其木以益其兵伐木以益攻戰之具輿曵柴亦是也己巳晋師陳于莘北胥臣以下軍之佐當陳蔡子玉以若敖之六卒将中軍曰今日必無晋矣子西将左子上将右子西鬭宜申子上鬭勃胥臣蒙馬以虎皮先犯陳蔡陳蔡奔楚右師潰陳蔡屬楚右師狐毛設二斾而退之斾大旗也又建二斾而退使若大将稍却欒枝使輿曵柴而偽遁曵柴起塵詐為衆走楚師馳之原軫郤溱以中軍公族横擊之公族公所率之軍狐毛狐偃以上軍夾攻子西楚左師潰楚師敗績子玉収其卒而止故不敗三軍惟中軍完晋師三日館榖晋侯伐曹令無入僖負覊之宫而免其族報施也報飱璧之施臣欽若等曰晋文公亡過曹僖負覊餽飡寘璧焉魏犫顛頡怒曰勞之不圗報於何有二子各有從亡之勞爇僖負覊氏爇燒也魏犫傷於胷公欲殺之而愛其材材力使問且視之病将殺之魏犫束胷見使者曰以君之靈不有寜也言不以病故自安寜距躍三百曲踊三百距躍超越也曲踊跳踊也百猶勵也乃舍之殺顛頡以狥于師夏與楚戰于城濮晋中軍風于澤牛馬因風而走皆失之亡大斾之左旃大斾旗名繋旐曰斾通帛曰旃祁瞞奸命掌此二事而不修為奸軍令司馬殺之以徇于諸侯使茅茷代之師還濟河舟之僑先歸士㑹攝右權代舟之僑也士㑹隨武子士蒍之孫秋七月振旅愷以入於晋殺舟之僑以狥于國民於是大服君子謂文公其能刑矣三罪而民服三罪顛頡祁瞞舟之僑詩云惠此中國以綏四方不失賞刑之謂也是年夏楚令尹子玉與晋戰敗于城濮遂自殺冬諸侯圍許㑹温諸侯也許比再㑹不至故因㑹共伐之三十年春晋人侵鄭以觀其可攻與否九月甲午晉侯秦伯圍鄭以其無禮于晉文公亡過鄭不禮之且貳於楚也三十二年夏狄有亂衛人侵狄報前年狄圍衛狄請平焉三十三年二月秦人入滑夏四月晋人及姜戎敗秦師于殽姜戎姜姓之戎初晋文公卒三十一年冬杞子自鄭使告于秦三十年秦使戍鄭曰鄭人使我掌其北門之管若潛師以來國可得也穆公召孟明西乞白乙使出師於東門之外蹇叔哭之曰孟子吾見師之出而不見其入也秦師遂東晋原軫曰秦違蹇叔而以貪勤民天奉我也奉與也奉不可失敵不可縱縱敵患生違天不祥必伐秦師欒枝曰未報秦施而伐其師其為死君乎言以君死故忘秦施先軫曰秦不哀吾䘮而伐吾同姓秦則無禮何施之為言秦以無禮加已施不足顧吾聞之一日縱敵數世之患也謀及子孫可謂死君乎言不可謂背君遂發命遽興姜戎子墨衰絰晋文公未𦵏故襄公稱子以凶服從戎故墨之梁𢎞御戎萊駒為右四月辛巳敗秦師於殽獲百里孟明視西乞術白乙丙以歸是月公伐邾取訾婁以報升陘之役在二十二年邾人不設僃秋襄仲復伐邾魯因晋䘮以陵小國十二月晉人陳人鄭人伐許討其貳於楚也楚令尹子上侵陳蔡陳蔡成遂伐鄭晋陽處父侵蔡楚子上救之與晋師夾泜而軍泜水出魯陽縣東經襄城定陵入汝陽子患之使謂子上曰吾聞之文不犯順武不違敵子若欲戰則吾退舍子濟而陳欲避楚使渡成陳而後戰遲速唯命不然紓我不獲止命紓緩也老師費財亦無益也師久為老乃駕以待子上欲渉大孫伯曰不可晋人無信半渉而薄我悔敗何及不如紓之乃退舍楚退欲使晋渡陽子宣言曰楚師遁矣遂歸楚師亦歸文公元年四月晋侯伐衛初晋文公之季年諸侯朝晋衛成公不朝使孔逹侵鄭孔逹衛大夫伐緜訾及匡匡地名今在潁州新汲縣東北晋襄公既祥諸侯雖諒闇亦因祥祭為位而哭使告於諸侯而伐衛及南陽今河内地先且居曰效尤禍也尤衛不朝故伐今不朝王是效衛致禍王在温故勸之請君朝王臣從師晋侯朝王於温先且居胥臣伐衛五月辛酉朔晋師圍戚六月戊戌取之獲孫昭子昭子衛大夫食戚邑衛人使告於陳陳共公曰更伐之我辭之見伐求和不競大甚使報伐示己力足以距晋衛孔逹帥師伐晋君子以為古古者越國而謀合古之道而失今事覇王之禮故國失其邑身見執辱二年春秦孟明視帥師以伐晋以報殽之役二月晋侯禦之先且居将中軍趙衰佐之伐郤溱王官無地御戎代梁𢎞狐鞫居為右鞫居續簡伯甲子及秦師戰于彭衙秦師敗績晋人謂秦拜賜之師以孟明言三年将拜君賜故冬晋先且居宋公子成陳轅選鄭公子歸生伐秦取汪及彭衙而還以報彭衙之役三年正月叔孫得臣㑹晋人宋人陳人衛人鄭人伐沈沈國名汝南平與縣北有沈亭以其服於楚也沈潰夏秦伯伐晋濟河焚舟示必死也取王官及郊王官郊晋地晋人不出遂自茅津濟封殽尸而還茅津在河東大陽縣封埋藏之遂覇西戎用孟明也秋楚師圍江晋先僕伐楚以救江冬晋以江故告于周欲假天子之威以伐楚王叔桓公晋陽處父伐楚以救江桓公周卿士王叔文公子門于方城遇息公子朱而還子朱楚大夫伐江之帥也聞晋師起而江兵解故晋亦還四年秋晋侯伐秦圍邧新城以報王官之役邧新城秦邑也王官役在前年楚人滅江五年夏秦人入鄀鄀叛楚即秦又貳於楚也秋楚人滅六六國今廬江六縣六人叛楚即東夷楚成大心仲歸帥師滅六仲歸子家冬楚公子爕滅蓼蓼國今安豐蓼縣七年春公伐邾間晋難也公因覇國有難而侵小國三月甲戌取須句寘文公子焉非禮也邾文公子叛在魯故公使為守須句大夫也絶大皥之祀以與鄰國叛臣故曰非禮冬徐伐莒八年夏秦人伐晋取武城以報令狐之役令狐役在七年秋晋人以扈之盟來討前年盟扈公後至九年春楚人伐鄭楚子師於狼淵不親伐初楚范山言於楚子曰晋君少不在諸侯北方可圗也范山楚大夫楚子師于狼淵以伐鄭陳師狼淵為伐鄭援也潁川穎隂縣西有狼陂囚公子堅公子尨及樂耳三子鄭大夫鄭及楚平夏侵陳克壺丘壺丘陳邑以其服晋也秋楚公子朱自東夷伐陳子朱息公也陳人敗之獲公子茷陳懼及楚平以小勝大故懼而請平十年春晋人伐秦取少梁少梁馮翊夏陽縣夏秦伯伐晋取北徵報少梁十一年春楚子伐麇討前年逃厥貉㑹成大心敗麇師于防渚成大心子玉之子大孫伯也防渚麇地潘崇復伐麇至錫穴錫穴麇地十二年春羣舒叛楚羣舒偃姓舒庸舒鳩之屬今廬江南有舒城西南有龍舒夏子孔執舒子平及宗子遂圍巢子孔楚令尹若敖曽孫平舒君名宗巢二國羣舒之屬冬十二月戊午秦人晋人戰于河曲秦為令狐之役故伐晋取羈馬令狐役在七年羈馬晋邑晋人禦之趙盾将中軍荀林父佐之林父代先克郤缺將上軍代箕鄭臾駢佐之代林父欒盾将下軍欒枝子代先蔑胥甲佐之胥臣子代先都范無恤御戎代歩招以從秦師於河曲臾駢曰秦不能久請深壘固軍以待之從之秦人欲戰秦伯謂士㑹曰若何而戰晋士㑹七年奔秦對曰趙氏新出其屬曰臾駢必實為此謀将以老我師也臾駢趙盾屬大夫新出佐上軍趙有側室曰穿晋君之壻也側室支子穿趙夙庶孫有寵而弱不在軍事弱年少也未嘗渉知軍事好勇而狂且惡㬰駢之佐上軍也若使輕者肆焉其可肆暫往而退也秦伯以璧祈戰於河祈求勝也十二月戊午秦軍掩晋上軍趙穿追之不及上軍不動趙穿獨追之反怒曰裹糧坐甲固敵是求敵至不擊将何俟焉軍吏曰将有待也待可擊穿曰我不知謀將獨出乃以其屬出宣子曰秦獲穿也獲一卿矣僖三十三年晋侯以一命命郤缺為卿不在軍師之數然則晋自有散位從卿者秦以勝歸我何以報乃皆出戰交綏司馬法曰逐奔不逺從綏不及逐奔不逺則難誘從綏不及則難䧟然則古名退軍為綏秦晋志未能堅戰短兵未至爭而兩退故曰交綏秦行人夜戒晋師曰兩君之士皆未憖也明日請相見也憖缺也臾駢曰使者目動而言肆懼我也目動心不安言肆聲放失常節将遁矣薄諸河必敗之薄廹也胥甲趙穿當軍門呼曰死傷未收而棄之不惠也不待期而薄人於險無勇也乃止晋師止為宣元年放胥甲傳秦師夜遁復侵晋入瑕十四年春伐邾邾文公之卒也在前年公使弔焉不敬邾人來討伐我南鄙故惠伯伐邾十五年夏晋伐蔡初新城之盟在前年蔡人不與不㑹盟晋郤缺以上軍下軍伐蔡兼帥二軍曰君弱不可以怠怠懈也戊申入蔡以城下之盟而還秋齊侯侵魯西鄙謂諸侯不能也不能討已遂伐曹入其郛討其來朝也此年夏朝十六年秋楚人秦人巴人滅庸庸今上庸縣属楚之小國率羣蠻叛楚也自廬以徃振廪同食徃徃伐庸也振發也廩倉也同食上下無異饌次于句澨楚西界也使廬戢棃侵庸戢棃廬大夫及庸方城方城庸地上庸縣東有方城亭庸人逐之囚子揚窓窻戢棃官属三宿而逸曰庸師衆羣蠻聚焉不如復大師還復句澨師且起王卒合而後進師叔曰不可師叔楚大夫潘尫也姑又與之遇以驕之彼驕我怒而後可克先君蚡冐所以服陘隰也蚡冐楚武王父陘隰地名又與之遇七遇皆北軍走曰北唯禆儵魚人實逐之禆儵魚庸三邑魚魚復縣東今巴東永安縣輕楚故使三邑人逐之庸人曰楚不足與戰矣遂不設備楚子乗驛㑹師于臨品驛傳車也臨品地名分為二隊隊部也兩道攻之子越自石溪子貝自仭以伐庸子越鬭椒也石溪仞入庸道秦人巴人從楚師羣蠻從楚子盟蠻見楚强故遂滅庸十七年春晋荀林父衛孔逹陳公孫寜鄭石楚伐宋討曰何故弑君猶立文公而還宋人弑昭公十六年冬趙宣子請師於靈公以伐宋公曰非晋國之急也對曰大者天地其次君臣所以為明訓也今宋人弑其君是反天地而逆民則也天必誅焉晋為盟主而不脩天罰将懼及焉公許之乃發令於太廟召軍吏而戒樂正令三軍之鐘鼔必僃趙同曰國有大役不鎮撫民而僃鐘皷何也宣子曰大罪伐之小罪憚之襲侵之事凌也是故伐備鐘皷聲其罪也戰以錞于丁寜儆其民也錞于形如碓頭與皷相和丁寜謂鉦也儆戒也唐尚書云錞于鐲非也鐲與錞于各異物襲侵宻聲為暫事也暫暫其無備今宋人弑其君罪莫大焉明聲之猶恐其不聞也吾僃鐘皷為君故也乃使旁告於諸侯治兵振旅鳴鐘皷以至於宋夏齊侯伐魯北鄙襄仲請盟晋不能救魯故請服宣公元年秋楚子鄭人侵陳遂侵宋晋趙盾帥師救陳宋㑹于棐林以伐鄭楚蒍賈救鄭遇於北林與晋師相遇滎陽中牟縣西南有林亭在鄭北囚晋解揚晋人乃還冬晋趙穿帥師侵崇初晋欲求成於秦趙穿曰我侵崇秦急崇必救之崇秦之與國吾以求成焉既而趙穿侵崇秦弗與成晉人伐鄭以報北林之役報囚解揚二年春鄭公子歸生受命于楚伐宋受楚命也宋華元樂吕御之二月壬子戰于大棘宋師敗績囚華元獲樂吕樂吕司冦獲不書非元帥也獲生死通名經言獲華元故傳特䕶之曰囚以明其生獲故得見贖而還及甲車四百六十乗俘二百五十人馘百人狂狡輅鄭人入于井狂狡宋大夫輅迎也倒㦸而出之獲狂狡秦師伐晋以報崇也伐崇在元年遂圍焦焦晋河外邑夏晋趙盾救焦遂自隂地及諸侯之師侵鄭隂地晋河南山北自上雒以東至陸渾以報大棘之役楚鬬椒救鄭曰能欲諸侯而惡其難乎遂次于鄭以待晋師趙盾曰彼宗競于楚殆将斃矣競强也鬭椒若敖之族自子文以來世為令尹姑益其疾乃去之欲示弱以驕之傳言趙盾所以稱人且為四年楚滅若敖氏張本三年夏楚人侵鄭鄭即晋故也秋宋師圍曹初宋文公即位三年殺母弟須及昭公子武氏之謀也武氏謀奉弟須及昭公子以作亂事在文十八年使戴桓之族攻武氏於司馬子伯之舘盡逐武穆之族武穆之族以曹師伐宋宋師圍曹報武氏之亂也四年正月公及齊侯平莒及郯莒人不肯公伐莒取向莒郯二國相怨故公與齊侯共平之向莒邑非禮也平國以禮不以亂伐而不治亂也責公不先以禮治之而用伐以亂平亂何治之有無治何以行禮冬楚子伐鄭鄭未服也前年楚侵鄭不獲成故曰未服五年冬楚子伐鄭陳及楚平晋荀林父救鄭伐陳六年春晋衛侵陳陳即楚故也冬楚人伐鄭取成而還七年夏公㑹齊侯伐萊不與謀也凡師出與謀曰及不與謀曰㑹八年夏晋師白狄伐秦楚人滅舒蓼楚為衆舒叛故伐舒蓼滅之舒蓼二國名楚子疆之正其界也及滑汭滑水名盟呉越而還冬楚人伐陳陳及晋平楚師伐陳取成而還言晋楚争强九年夏齊侯伐莱九月晋侯宋公衛侯鄭伯曹伯㑹于扈討不睦也謀齊陳陳侯不㑹前年與楚成故晋荀林父以諸侯之師伐陳不書諸侯師林父帥之無将帥晋侯卒于扈乃還冬宋人圍滕因其喪也楚子伐鄭六年楚代鄭取成於厲既成鄭伯逃歸事見十一年晋郤缺救鄭鄭伯敗楚師于柳棼桞棼鄭地十年六月宋師伐滕滕人恃晋而不事宋也是月晋人宋人衛人曹人伐鄭鄭及楚平故取成而還秋公孫歸父帥師伐邾取繹繹邾邑冬楚子伐鄭晋士㑹救鄭逐楚師於潁北潁水出河南陽城至下蔡入淮諸侯之師戍鄭十一年春楚子伐鄭及櫟子良曰晋楚不務徳而兵争與其來者可也晋楚無信我焉得有信乃從楚夏公孫歸父㑹齊人伐莒楚左尹子重侵宋子重公子嬰齊莊王弟王待諸郔郔楚地冬楚子為陳夏氏亂故伐陳十年夏徴舒弑君遂入陳殺夏徵舒轘諸栗門轘車裂也栗門陳城門因縣陳滅陳以為楚縣申叔時曰諸侯之從也曰討有罪也今縣陳貪其富也以討召諸侯而以貪歸之無乃不可乎乃復封陳鄉取一人焉以歸謂之夏州州鄉屬示討夏氏所獲也十二年春楚子圍鄭前年盟辰陵而又徼事晋故旬有七日鄭人卜行成不吉卜臨於大宫臨哭也大宫鄭祖廟且巷出車吉出車於巷示将見遷不得安居國人大臨守陴者皆哭陴城上僻倪皆哭所以告楚窮也楚子退師鄭人脩城進復圍之三月克之哀其窮哭故為退師而猶不服故圍之入自皇門至於逵路塗方九軌曰逵鄭伯肉袒牽羊以逆肉袒牽羊示服為臣僕楚子退三十里而許之平退一舍以禮之夏六月乙卯晋荀林父帥師及楚子戰于邲邲鄭地林父将中軍代郤缺先縠佐之彘季代林父士㑹将上軍郤克佐之郤缺之子代臾駢趙朔将下軍代欒盾欒書佐之欒盾之子代趙朔趙括趙嬰齊為中軍大夫括嬰齊皆趙盾異母弟鞏朔韓穿為上軍大夫荀首趙同為下軍大夫荀首林父弟趙同趙嬰兄韓厥為司馬韓萬𤣥孫晋楚戰于邲晉師敗績及昏楚師軍于邲晋之餘師不能軍不能成營屯宵濟亦終夜有聲言其兵衆将不能用丙辰楚重至于邲重輜重也遂次於衡雍祀於河作先君宫告成事而還冬楚子滅蕭蕭宋附庸國初宋華椒以蔡人救蕭蕭人囚熊相宜僚及公子丙王曰勿殺吾退蕭人殺之王怒遂圍蕭蕭潰申公巫臣曰師人多寒王廵三軍拊而勉之拊撫慰勉之三軍之士皆如挾纊纊綿也言説以忘寒遂傅於蕭滅之宋師伐陳背清丘之盟衛人救之孔逹曰先君有約言焉若大國討我則死之衛成公與陳共公有舊好故孔逹欲背盟救陳而以死謝晋十三年春齊師伐莒莒恃晋而不事齊故也夏楚子伐宋以其救蕭也救蕭在前年十四年夏晋侯伐鄭為邲故也晋敗於邲鄭遂属楚告於諸侯蒐焉而還蒐簡閲車馬中行桓子之謀也曰示之以整使謀而來鄭人懼使子張代子良于楚十二年子良為質于楚秋九月楚子圍宋初楚子使申舟聘于齊曰無假道于宋申舟毋畏亦使公子馮聘于晋不假道於鄭申舟以孟諸之役惡宋文十年楚子田孟諸毋畏抶宋公僕曰鄭昭宋聾昭明聾闇晋使不害我則必死王曰殺女我伐之見犀而行犀申舟之子及宋宋人止之華元曰過我而不假道鄙我也鄙我亡也以我比其邊鄙是與亡國同殺其使者必伐我伐我亦亡也亡一也乃殺之楚子聞之投𬒮而起投振也袂袖也屨及於窒皇窒皇寝門閾劔及於寝門之外車及於蒲胥之市十五年夏五月楚師将去宋在宋積九月不能服宋故申犀稽首於王之馬前曰毋畏知死而不敢廢王命王棄言焉王不能答未服宋而去故曰棄言申叔時僕僕御也曰築室反耕者宋必聽命從之築室於宋分兵歸田示無去志宋人懼使華元夜入楚師登子反之牀起之曰寡人使元以病告曰城下之盟有以國斃不能從也寜以國斃不從城下盟去我三十里惟命是聽子反懼與之盟而告王退三十里宋及楚平六月秦人伐晋七月秦桓公伐晋次於輔氏晋地壬午晉侯治兵于稷以畧狄土立黎侯而還狄奪其地故晋復立之及雒魏顆敗秦師于輔氏晋侯還及雒也雒晋地獲杜回秦之力人也十八年春晋侯衛太子臧伐齊至於陽糓齊侯㑹晋侯盟于繒以公子强質于晋晉師還夏公使如楚乞師欲以伐齊公不事齊齊與晋盟故懼而乞師于楚楚荘王卒楚師不出既而用晋師成二年戰于鞌是册府元龜卷二百四十八
