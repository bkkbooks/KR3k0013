body:
  text: 册府元龜卷二百五十一宋王欽若等撰列國君部攻伐第四魯哀公九年春宋皇瑗帥師取鄭師于雍丘陳留縣初鄭武子賸之嬖許瑕求邑無以與之賸罕逹也瑕武子之屬請外取許之故圍宋雍丘宋皇瑗圍鄭師毎日遷舍壘合鄭師哭子姚救之大敗子姚武子賸也二月甲戌宋取鄭師于雍丘使有能者無死惜其能也以郏張與鄭羅歸鄭之有能者夏楚人伐陳陳即吳故也秋宋公伐鄭報雍丘冬吳子使來儆師伐齊前年齊與吳謀伐魯齊既與魯成而止故吳恨之反與魯謀伐齊十年春公㑹吳子邾子郯子伐齊南鄙師于鄎鄎齊地齊人弑悼公赴于師以說吳吳子三日哭于軍門之外徐承帥舟師將自海入齊齊人敗之吳師乃還承吳大夫夏宋人伐鄭晉趙鞅帥師伐齊經書侵以侵告大夫請卜之趙孟曰吾卜於此起兵謂往歲卜伐宋不吉利以伐姜故今興兵事不再令再令瀆也卜不襲吉襲重也行也於是乎取犂及轅犂一名隰濟南有隰隂縣祝阿縣西有轅城毁髙唐之郭侵及頼而還秋吳子使來復儆師伐齊未得志故冬楚子期伐陳陳即吳故吳延州來季子救陳謂子期曰二君不務德二君吳楚而力爭諸侯民何罪焉我請退以爲子名務德而安民乃還季子吳王壽夢少子十一年春齊爲鄎故鄎在前年國書髙無㔻帥師伐我及清清齊地濟比盧縣東有清亭師及齊師戰于郊齊師自稷曲稷曲郊地名師不踰溝樊遲謂冉有曰非不能也不信子也請三刻而踰之如之衆從之如樊遲言乃踰溝師入齊軍冉有之師右師奔齊人從之逐右師陳瓘陳莊渉泗二陳齊大夫師獲甲首八十冉求所得齊人不能師不能整其師冉有用矛於齊師故能入其軍五月公㑹吳子伐齊爲郊戰欲以報也克博壬申至於嬴博嬴齊邑也二縣皆屬泰山中軍從王吳中軍胥門巢將上軍王子姑曹將下軍展如将右軍三將吳大夫齊國書將中軍髙無㔻將上軍宗樓將下軍陳僖子謂其弟書爾死我必得志書子占也欲獲死事之功宗子陽與閭丘明相厲也相勸厲致死子陽宗樓也桑掩胥御國子國子國書公孫夏曰二子必死亦勸勉之將戰公孫夏命其徒歌虞殯虞殯送葬歌曲示必死陳子行命其徙具含玉子行陳逆也具含玉亦示必死公孫揮命其徒曰人尋約吳髮短約䋲也八尺爲尋吳短髮欲以䋲貫其首東郭書曰三戰必死于此三矣三戰夷儀五氏與今使問弦多以琴弦多齊人也六年奔魯問遺也曰吾不復見子矣言將戰死陳書曰此行也吾聞鼓而已不聞金矣鼔以進軍金以退軍不聞金言將死也傳言吳師彊齊人皆自知將敗甲戌戰于艾陵展如敗髙子齊上軍敗國子敗胥門巢吳上軍亦敗王卒助之大敗齊師獲國書公孫夏閭丘明陳書東郭書革車八百乘甲首三千以獻于公公以兵從故以勞公十二年秋宋向巢帥師伐鄭初宋鄭之間有隙地焉曰彌作頃丘玉暢嵒戈錫凡六邑子産與宋人爲成曰勿有是俱棄之及宋平元之族自蕭奔鄭在定十五年鄭人爲之城嵒戈錫城以處平元之族九月宋向巢伐鄭取錫殺元公之孫遂圍嵒十二月鄭罕逹救嵒丙申圍宋師十三年春宋向魋救其師救前年圍嵒師鄭子賸使徇曰得桓魋者有賞魋也逃歸遂取宋師于嵒獲成讙郜延二子宋大夫以六邑爲虛空虛之名不有夏楚公子申帥師伐陳六月丙子越子伐吳爲二隧隧道也疇無餘謳陽自南方二子越大夫先及郊吳大子友王子地王孫彌庸壽於姚自泓上觀之觀越師泓水名彌庸見姑蔑之旗姑蔑越地今東陽大宋縣曰吾父之旗也彌庸父爲越所獲姑蔑人得其旌旗不可以見讐而弗殺也太子曰戰而不克將亡國請待之彌庸不可屬徒五千屬㑹也王子地助之乙酉戰彌庸獲疇無餘地獲謳陽越子至王子地守丙戌復戰大敗吳師獲大子友王孫彌庸壽於姚地守故不獲丁亥入吳又云夫差殺申胥不稔於歲乃㑹晉公午於黄池於是越王勾踐乃令范蠡后庸率師㳂海泝淮以絶吳路敗子友於姑熊夷勾踐乃率中軍泝江以襲吳入其郛焚其姑蘇徙其大舟秋晉魏曼多帥師侵衛十四年秋晉趙鞅帥師伐衛十五年夏鄭伯伐宋楚子西子期伐吳及桐汭宣城廣德縣西南有桐水出白石山西北入丹陽湖秋晉趙鞅帥師伐衛冬晉侯伐鄭十七年三月越子伐吳吳子禦之笠澤夾水而陳越子爲左右句卒句卒鈎伍相著别爲左右屯使夜或左或右皷譟而進吳師分以御之越子以三軍潜渉當吳中軍而皷之吳師大亂遂敗之左右句卒以分吳軍而三軍精卒并力擊其中故得勝也六月晉趙鞅圍衛齊國觀陳瓘救衛國觀國書之子得晉人之致師者子玉使服而見之釋囚服服其本服曰國子實執齊柄而命瓘曰無辟晉師豈敢廢命欲必敵晉子又何辱言不須來致師自將往戰簡子曰我卜伐衛未卜與齊戰乃還畏子玉七月己卯楚公孫朝帥師滅陳初白公之亂陳人恃其聚而侵楚聚積聚也楚旣寧將取陳麥楚子問帥於大師子糓與葉公諸梁子糓曰右領差車與左史老皆相令尹司馬以伐陳其可使也言此二人皆嘗輔相子西子期伐陳今復可使子髙曰率賤民慢之懼不用命焉右領左史皆楚賤官子糓曰觀丁父鄀俘也武王以爲軍率楚武王是以克州蓼服隨唐大啟羣蠻彭仲爽申俘也文王以爲令尹實縣申息楚文王滅申息以爲縣朝陳蔡封畛於汝開封畛北至汝水唯其任也何賤之有子髙曰天命不謟謟疑也令尹有憾於陳十五年子西伐吳陳使貞子弔吳以此爲恨天若亡之其必令尹之子是與君盍舍焉舍右領與左史臣懼右領與左史有二俘之賤而無其令德也王卜之武城尹吉武城尹子西子公孫朝使帥師取陳麥陳人御之敗遂圍陳滅之冬十月晉復伐衛春伐未得志故入其郛將入城簡子曰止叔向有言曰怙亂滅國者無後不欲乘人之衰衛人出莊公而與晉平晉立襄公之孫般師而還十一月衛侯自鄄入般師出辟蒯聵也初公登城以望見戎州戎州戎邑問之以告公曰我姬姓也何戎之有焉言姫姓國何故有戎邑翦之削壞其邑聚公使匠久乆不休息公欲逐石圃石圃衛卿石惡從子未及而難作辛巳石圃因匠氏攻公公閉門而請弗許踰于北方而隊折股終如卜言乃自後踰戎州人攻之太子疾公子青踰從公青疾弟戎州人殺之公入于戎州巳氏巳氏戎人姓初公自城上見巳氏之妻髮美使髠之以爲呂姜髢呂姜莊公夫人髢髲也既入焉而示之璧曰活我吾與女璧巳氏曰殺女璧其焉往遂殺之而取其璧衛人復公孫般師而立之十二月齊人伐衛衛人請平立公子起起靈公執般師以歸舎諸潞潞齊邑十八年春巴人伐楚圍鄾鄾楚邑初右司馬子國之卜也觀瞻曰如志子國未爲令尹時卜爲右司馬得吉兆如其志觀瞻楚開卜大夫觀從之後故命之命以爲右司馬及巴師至將卜帥王曰寧如志何卜焉寧子國也使帥師而行請承承佐王曰寢尹工尹勤先君者也柏舉之役寢尹吳由于以背受戈工尹固執燧象奔吳皆爲先君勤勞三月楚公孫寧吳由于薳固敗巴師于鄾故封子國於析君子曰惠王知志知用其意夏書曰官占唯能蔽志昆命于元龜逸書也官占卜筮之官敝斷也昆後也言當先斷意後用龜也其是之謂乎志曰聖人不煩卜筮惠王其有焉不疑故不卜十九年春越人侵楚以誤吳也誤呉使不爲僃夏楚公子慶公孫寛追越師至㝠不及乃還㝠越地是年吳伐楚二十年十一月越圍吳二十二年十一月丁卯越滅吳請使吳王居甬東辭曰孤老矣焉能事君乃縊越人以歸以其尸歸又云越王勾踐伐吳吳王帥其賢良與其重祿以上姑蘇使王孫雄行成於越曰昔者上天降禍於吳得罪於㑹稽今君其圖不榖不榖請復㑹稽之和王弗忍許之范蠡進諫曰臣聞之聖人之功時爲之庸得時不成天有還刑天節不逺五年復反小凶則近大凶則逺先人有言曰伐柯者其則不逺今君王不斷其忘㑹稽之事乎王曰諾不許使者往而復來辭愈卑禮愈尊王又欲許之蠡諫曰孰使我蚤朝而晏罷者非吳乎與我爭三江五湖之利者非吳乎夫十年而謀之一朝而棄之其可乎王姑勿許其事將易兾巳王曰吾欲勿許而難對其使者子其對之范蠡乃左提皷右㧞枹以應其使者曰昔者上天降禍於越委制於吳而吳不受今將反此義以報此禍吾王敢無聽天之命乎王孫雄曰子范子先人有言曰無助天爲虐助天爲虐者不祥今吾稻蟹不遺種子將助天爲虐不忌其不祥乎蠡曰王孫子昔吾先君固周室之不成子也故濵於東海之陂黿鼉魚鱉之與處而鼃黽之與同陼余雖靦然而人面哉吾猶禽獸也又安知是諓諓者乎王孫雄請反辭於王蠡曰君王已制於執事之人矣子往矣無使執事之人得罪於子使者辭反蠡不報於王擊皷興師以隨使者至於姑蘇之宮不許吳成遂滅吳二十三年夏六月晉荀瑶伐齊茍瑶荀躒之孫知伯襄子髙無㔻帥師御之知伯視齊師馬駭遂驅之曰齊人知余旗其謂余畏而反也及壘而還將戰長武子請卜武子晉大夫知伯曰君告于天子而卜之以守龜於宗祧吉矣吾又何卜焉且齊人取我英丘君命瑶非敢耀武也治英丘也治濟齊取英丘以辭伐罪足矣何必卜壬辰戰于犂丘犂丘隰也齊師敗績知伯親禽顔庚顔庚齊大夫顔涿聚二十四年夏四月晉侯將伐齊使來乞師曰昔臧文仲以楚師伐齊取糓在僖二十六年宣叔以晉師伐齊取汶陽在成二年寡君欲徼福於周公願乞靈於臧氏以臧氏世勝齊故欲乞其威靈臧石帥師㑹之取廪丘臧石賓如之子軍吏令繕將進晉軍吏也繕治戰備莱章曰君卑政暴莱章齊大夫往歲克敵禽顔庚今又勝都取廩丘天奉多矣又焉能進是躗言也躗過也役將班矣晉師乃還餼臧石牛生曰餼太史謝之晉太史曰以寡君之在行在軍行牢禮不度不如禮度敢展謝之二十六年夏五月叔孫舒帥師㑹越臯如后庸宋樂筏納衛侯舒武叔之子文子也臯如后庸越大夫樂筏宋司城子潞衛侯輒也文子欲納之懿子曰君愎而虐少待之必毒於民愎狠也乃睦於子矣民睦師侵外州大獲越納輒之師出禦之大敗衛師大敗掘褚師定子之墓焚之於平莊之上定子褚師比之父也平莊陵名也文子使王孫齊私於臯如齊衛大夫王孫賈之子昭子也曰子将大滅衛乎抑納君而已乎臯如曰寡君之命無他納衛君而已文子致衆而問焉曰君以蠻夷伐國國㡬亡矣請納之衆曰勿納曰彌牟亡而有益請自北門出欲以觀衆心衆曰勿出重賂越人申開守陴而納公申重也開重門而嚴設守僃欲以恐公使不敢入公不敢入師還立悼公悼公蒯瞶庻弟公子黚也南氏相之以城鉏與越人公曰期則爲此司徒期也令茍有怨於夫人者報之夫人期姊也怒期而不得加戮故勅宮女令苦困期姊司徒期聘於越爲悼公聘公攻而奪之幣期告王越王也王命取之期以衆取之公怒殺期之甥之爲太子者忿期而及其姊爲夫人者遂復及夫人之子遂卒于越終言之也終效夷言死于夷二十七年夏晉荀瑶帥師伐鄭次于桐丘鄭駟𢎞請救于齊𢎞駟歂于齊師將興陳成子屬孤子三日朝屬㑹死事者之子使朝三日以禮之設乗車兩馬繫五邑焉乗車兩馬大夫之服又加之五色召顔涿聚之子晉曰隰之役而父死焉隰役在二十三年以國之多難未女恤也今君命女以是邑也服車而朝毋廢前勞乃救鄭及留舒違糓七里糓人不知言其整也留舒齊地違去也及濮雨不渉濮水自陳留酸棗縣傍河東北經濟隂至髙平入濟子思曰大國在敝邑之宇下是以告急今師不行恐無及也子思國參成子衣製仗戈製雨衣也立於阪上馬不出者助之鞭之知伯聞之乃還畏其得衆心曰我卜伐鄭不卜敵齊周定王二年秦庻長將兵㧞魏城秦厲共公十年臣欽若等曰是歲魯哀公卒此後依六國年表以周年爲首十二年秦厲共公將師與緜諸戰二十二年楚滅蔡楚惠王二十二年蔡侯齊四年二十四年楚滅杞杞夏之後考王十年楚滅莒楚簡王元年威烈王八年秦與魏戰少梁秦靈公七年晉城少梁秦擊之十三年秦與晉戰敗鄭下秦簡公二年是年齊伐晉毁黄城圍陽狐齊宣公四十三年十四年魏公子擊圍繁龎魏文侯十三年是年齊伐魯莒及安陽一作安陵十五年齊伐魯取一城十七年魏伐秦十八年魏擊宋中山伐秦至鄭而還是年韓伐鄭取雍丘韓景侯元年齊取魯郕十九年鄭伐韓敗韓於負黍在陽城是年齊伐衛取毌丘安王元年秦伐魏至陽狐二年鄭圍韓之陽翟晉伐楚至桑丘楚悼王二年四年楚敗鄭師七年秦伐諸繇秦惠公五年八年齊伐魯取㝡齊康公十一年九年魏伐鄭十一年秦伐韓宜陽取六邑韓列侯九年十二年秦與晉戰武城是年齊伐魏魏取襄陽魯敗齊于平陸在東平十三年秦侵晉十五年秦伐蜀取南鄭十六年魏襲邯鄲戰敗魏武侯元年十七年韓伐鄭取陽城伐宋到彭城執宋君韓文侯二年是年齊伐魯破之趙敗齊于靈丘趙敬侯二年十八年趙救魏于廩丘大敗齊人十九年魏敗趙兎臺趙築剛平以侵衛二十一年趙借兵於楚伐魏取棘蒲二十二年魏韓趙伐齊至桑丘鄭敗晉是年齊伐燕取桑丘是時秦魏攻韓韓求救於齊齊桓公午召大臣而謀曰蚤救之孰與晩救之騶忌曰不若勿救段干曰不救則韓且折而入于魏不若救之田臣思曰過矣君之謀也秦魏攻韓楚趙必救之是天以燕予齊也桓公曰善乃陰告韓使者而遣之韓自以爲得齊之救因與魏秦戰楚趙聞之果起兵而救之齊因起兵襲燕取桑丘二十三年趙襲衛不克㧞魏黄城在陳留二十四年魏韓趙伐齊至靈丘齊威王元年因康公䘮來伐二十五年蜀伐楚兹方楚肅王四年是年齊伐燕趙救之與中山戰于房子二十六年趙伐中山戰于中人中山唐縣有中人亭烈王元年韓滅鄭因徙都鄭韓哀侯二年三年燕敗齊林狐一作林營燕釐公三十年是年魯伐齊入陽闗在鉅平晉伐齊至博陵四年趙伐衛取都鄙一作鄉邑七十三趙成侯三年是年衛敗趙于藺魏伐齊取薛陵五年魏伐楚取魯陽道與秦戰髙安敗之六年趙伐齊于甄是年魏敗趙于懷魏惠王元年趙攻鄭敗之以與韓韓與趙長子三年魏敗韓于馬陵韓㦤侯二年是年趙敗魏涿澤一作濁澤初魏武侯卒子罃惠王也與公中緩爭爲太子公孫頎自宋入趙自趙入韓謂韓懿侯曰魏罃與公中緩爭太子君亦聞之乎今魏罃得王錯魏大夫挾上黨固半國也因而除之除一作倍破魏必矣不可失也懿侯說乃與趙成侯合軍并兵以伐魏戰於涿澤在長社魏氏大敗魏君圍趙謂韓曰除魏君立公中緩割地而退我且利韓曰不可殺魏君人必曰暴割地而退人必曰貪不如兩分之魏分爲兩不强於宋衛則我終無魏之患矣趙不聽韓不說以其少卒夜去惠王之所以身不死國不分者二家謀不和也若從一家之謀則魏必分矣故曰君終無適子其國可破也顯王元年齊伐魏取觀津今之衛縣一説獻觀以和齊是年趙侵齊至長城三年秦敗韓魏洛陽秦獻公十二年一說魏城武堵爲秦所敗是年趙與齊戰阿下四年魏伐宋取儀臺一作義臺是年趙伐衛取甄五年秦章蟜一云車騎與晉戰于石門斬首六萬是年秦攻魏趙救之石阿六年秦攻魏少梁趙救之七年魏伐韓敗于澮一作㑹是年秦使庻長國伐魏戰少梁虜其太子一云虜魏將公孫痤取龎八年魏伐趙取皮牢趙與韓攻秦九年趙助魏十一年秦敗韓西山秦孝公四年韓昭侯元年十二年宋取韓黄池在平丘魏取韓朱十四年秦魏侵宋黄池宋復取之十五年秦與魏戰元里斬首七千取魏少梁是年魏圍趙邯鄲十六年魏㧞邯鄲趙求救於齊齊威王召大臣而謀曰救趙孰與勿救騶忌子曰不如勿救叚于朋曰不救則不義且不利威王曰何也對曰夫魏氏并邯鄲其於齊何利哉且夫救趙而軍其郊是趙不伐而魏全也故不如南攻襄陵以弊魏邯鄲㧞而乘魏之弊威王從其計使田忌南攻襄陵十月邯鄲㧞齊因起兵擊魏大敗之桂陵十七年秦衛鞅爲大良造將兵伐魏安邑降之是年諸侯圍魏襄陵十八年秦衛鞅圍固湯降之秦攻趙藺二十二年趙公子范襲邯鄲不勝二十五年趙攻齊㧞髙唐二十七年趙公子刻攻魏二十八年魏伐趙趙肅侯九年趙告急齊宣王用孫子計救趙擊魏魏遂大興師使龎㳙將而令太子申爲上將軍過外黄外黄徐子徐子外黄人也外黄時屬宋謂太子曰臣有百戰百勝之術太子曰可得聞乎客曰固願効之曰太子自將攻齊大勝并莒則富不過有魏貴不益爲王若戰不勝齊則萬世無魏矣此臣之百戰百勝之術也太子曰諾請必從公之言而還矣客曰太子雖欲還不得矣彼勸太子戰攻欲啜汁者衆太子雖欲還恐不得矣太子因欲還其御曰將出而還與北同太子果與齊人戰敗於馬陵在元城齊虜魏太子申殺將軍㳙軍遂大破二十九年秦趙齊共伐魏秦將商君詐魏將軍公子卭而襲奪其軍而破之三十年秦與晉戰岸門三十四年秦㧞韓宜陽三十六年秦敗魏將龍賈軍四萬五千于雕陰在上郡是年楚圍齊於徐州楚成王七年趙圍魏黄不克三十七年魏與齊伐趙魏襄王三年齊宣王十一年趙決河水灌之兵去是年齊伐燕取十城燕易王元年齊宣王十一年因燕䘮伐之蘇秦説齊還燕十城三十九年秦圍魏焦曲沃秦惠文王八年予秦河西之地四十年秦渡河取魏汾陰皮氏圍焦降之是年魏伐楚敗之陘山在宻縣楚威王十一年四十一年秦公子桑圍魏蒲陽降之是年趙疵與秦戰敗秦殺疵河西取代藺離石四十四年魏敗韓韓舉韓宣惠王八年四十五年秦相張儀將兵取陜四十六年楚使柱國昭陽將軍而攻魏破之於襄陵得八邑又移兵而攻齊齊王患之懷王六年昭陽移和而攻齊軍門曰和陳軫適爲秦使齊齊王曰爲之奈何陳軫曰王勿憂請令罷之卽往說昭陽昭陽引兵去四十七年秦取魏曲沃平周慎靚王二年秦擊韓取鄢於乾切今鄢陵縣三年魏韓趙楚燕五國擊秦不勝而去是歲秦惠文王後七年魏哀王元年韓宣惠王十五年趙武靈王八年楚懷王十一年燕王噲三年四年趙韓魏共擊秦秦敗趙斬首八萬級又敗韓于脩魚虜得韓將䱸申差於濁澤一云鯁申差長社有濁澤韓氏急公仲謂韓王曰與國非可恃也今秦之欲伐楚乆矣王不如因張儀爲和於秦賂以一名都具甲與之南伐楚此以一易二之計也韓王曰善乃警公仲之行將西購於秦楚王聞之大恐召陳軫告之陳軫曰秦之欲伐楚乆矣今又得韓之名都一而具甲秦韓并兵而伐楚此秦所禱祀而求也今已得之矣楚國必伐矣王聽臣爲之警四境之内起師言救韓命戰車滿道路發信臣多其車重其幣使信王之救己也縱韓不能聽我韓必德王也必不爲鴈行以來是秦韓不和也兵雖至楚不大病也爲能聽我絶和於秦秦必大怒以厚怨韓韓之南交楚必輕秦輕秦其應秦必不敬是因秦韓之兵而免楚國之患也楚王曰善乃警四境之内興師言救韓命戰車滿道路發信臣多其車重其幣謂韓王曰不糓國雖小已悉發之矣願大國遂肆志於秦不糓將以楚徇韓韓王聞之大説乃止公仲之行公仲曰不可夫以實伐我者秦也以虛名救我者楚也王恃楚之虛名而輕絶彊秦之敵王必爲天下大笑且楚韓非兄弟之國也又非素約而謀伐秦也已有伐形因發兵言救韓此必陳軫之謀也且王已使人報於秦矣今不行是欺秦也夫輕彊秦而信楚之謀臣恐王必悔之韓王不聼遂絶於秦秦因大怒益甲伐韓大戰楚救不至是年齊敗魏趙於觀澤一作觀津齊泯王七年五年秦使司馬錯擊蜀滅之是年秦取趙中都西安陽邑一云西都及中陽又云中都西陽六年秦伐韓取石章敗趙將軍英一作趙將泥一作趙將莊赧王元年秦使樗里子伐魏焦降之一云取曲沃敗韓岸門斬首萬其將犀首走二年秦樗里子擊趙藺陽虜趙將公子繇通一云虜將趙莊三年秦庶長章與韓擊楚於丹陽虜其將屈匄斬首八萬又攻楚漢中取地六百里置漢中郡楚圍雍氏秦使庻長疾樗里子也助韓而東攻齊到蒲助魏攻燕是年齊趙攻魏魏擊齊虜聲子於濮與秦擊燕初燕王噲立以國讓其相子之事皆決於子之三年國大亂將軍市被與太子平攻子之不克將軍市被及百姓反攻太子平將軍市被死以徇因構難數月死者數萬衆人恫恐百姓離志孟子謂齊王曰今伐燕此文武之時不可失也王因令章子將五郡之兵章子齊人見孟子以因北地之衆以伐燕士卒不戰城門不閉燕君噲死齊大勝年表云君及太子噲子之皆死汲冡紀年田齊人擒子之而醢其身四年秦伐楚取召陵魏圍衛七年秦使甘茂庶長封伐韓宜陽秦武王三年韓襄王四年八年秦㧞宜陽斬首六萬渉河城武遂是年趙王北略中山之地至房子遂伐之北至無窮西至河登黄華之上九年秦擊魏皮氏未㧞而解秦昭王元年是年趙王略中山地至寧葭西略胡地至榆中林胡王獻馬歸使樓緩之秦仇液之韓王賁之楚富丁之魏趙爵之齊代相趙固主胡致其兵十一年趙王攻中山趙袑爲右軍許鈞爲左軍公子章爲中軍王并將之牛翦將車騎趙希并將胡伐趙與之陘一作陸又作陘或宣言趙與之陘陘者山絶之名常山有井陘中山有苦陘上黨有閼與合軍曲陽攻取丹丘華陽鴟之墓華一作夾鴟一作鴻王軍取鄗石邑在常山封龍東垣中山獻四邑請和王許之罷兵十二年秦㧞魏蒲坂晉陽封陵取韓武遂是年趙攻中山十四年蜀反秦司馬錯往誅蜀守惲一作煇是年秦取韓穣趙攻中山魏韓齊與秦擊楚敗楚將軍唐昧於重丘齊使公子將大有功秦庶長奐斬首二萬十五年秦擊楚斬首三萬攻襄城攻一作取殺景缺一作景快是年趙攻中山攘地北至燕代西至雲中九原十六年秦使將軍芊戎攻楚取新市八城江夏有新市縣十七年魏韓齊共擊秦於函谷敗之是年秦敗楚十六城楚頃襄王元年十九年魏韓齊宋中山五國擊秦至鹽氏而還一作監氏秦與韓武遂和一云秦與韓魏河北及封陵二十年秦尉錯㧞魏襄城魏昭王元年是年趙與齊燕共滅中山遷其王於膚施在上郡是年趙惠文王四年一説在三年二十一年魏與秦戰解不利是年秦向壽伐韓武始魏郡有武始縣左更白起攻新城二十二年韓使公孫喜率周魏擊秦秦左更白起敗韓魏二十四萬于伊關虜公孫喜㧞五城韓釐王三年二十三年秦大良造白起攻魏取垣復予之攻楚取宛二十四年秦左更錯取軹及鄧河内有軹縣南陽有鄧縣㧞韓宛城二十五年趙梁將與齊合軍攻韓至魯關下二十六年秦客卿錯擊魏至軹取城大小六十一二十七年秦㧞趙梗陽在太原是年趙董叔與魏氏伐宋得河陽於魏二十八年秦㧞魏新垣曲陽之城是年趙趙梁將兵攻齊二十九年秦將錯攻魏㧞安邑秦出其人又敗韓兵夏山趙韓徐爲將攻齊是年齊伐宋秦昭王怒曰吾愛宋與愛新城陽晉同韓聶與吾友也而攻吾所愛何也蘓代爲齊謂秦王曰韓聶之攻宋所以爲王也齊彊輔之以宋楚魏必恐恐必西事秦是王不煩一兵不傷一士無事而割安邑也此韓聶之所禱於王也秦王曰吾患齊之難知一從一衡其説何也對曰天下國令齊可知乎齊以攻宋其知事秦以萬乘之國自輔不西事秦則宋治不安中國白頭遊敖之士皆積智欲離齊秦之交伏軾結軼西馳者未有一人言善齊者也伏軾結軼東馳者未有一人言善秦者也何則皆不欲齊秦之合也何晉楚之智而齊秦之愚也晉楚合必議齊秦齊秦合必圖晉楚請以此决事秦王曰諾於是齊伐宋宋王出亡死於温三十年秦將蒙武㧞齊列城九一云趙相國樂毅將趙秦韓魏燕攻齊取靈丘三十一年秦尉斯離與韓魏燕趙共擊齊攻之是時燕以樂毅爲上將軍與秦楚三晉合謀以伐齊齊兵敗湣王出亡於外燕兵獨追北入至臨菑盡取齊寳燒其宮室宗廟城之不下者唯獨聊莒即墨其餘盡屬燕三十二年秦㧞魏安城汝南有安城縣兵至大梁而還燕趙救之是年趙廉頗將攻齊昔陽取之樂平沾縣東有昔陽城二十三年齊㧞趙兩城是時樂毅將趙師攻魏伯陽而秦怨趙不與已擊齊乃伐趙三十四年秦㧞趙石城右北平有石城縣是年趙王再之衛東陽決河水伐魏氏三十五年秦白起擊趙取光狼城斬首二萬一云三萬池動壞城趙使趙奢將攻齊麥丘取之是年秦將錯發隴西因蜀擊楚黔中㧞之楚與秦漢北及上庸地楚項襄王十九年三十六年秦㧞楚鄢西陵一云鄢鄧殺罪人遷之是年趙廉頗將攻齊三十七年秦白起擊楚㧞郢燒夷陵更東至竟陵以為南郡楚頃襄王亡走陳三十八年秦蜀守若伐楚㧞巫黔中三十九年秦白起擊魏南城一作两城魏安釐王元年又㧞楚江旁是年趙樓昌將攻魏幾不能取廉頗將攻幾取之四十年秦㧞魏兩城軍大梁下韓使暴䳒來救爲秦所敗與秦温以和是年趙廉頗將攻魏房子屬常山㧞之因城而還又攻安陽取之四十一年趙與魏共擊秦秦將白起破趙華陽得一將軍又㧞魏四城斬首四萬四十二年秦客卿胡傷攻魏卷河南有卷縣蔡陽長社取之擊芒卯華陽破之華陽亭名在宻縣斬首十五萬魏入南陽以和四十三年楚使三萬人助三晉伐燕四十四年趙藺相如伐齊至平邑四十五年秦韓相攻而圍趙閼與音焉與在上黨趙使趙奢將擊秦大敗之是年秦客卿竈攻齊取剛夀予穰侯四十六年秦中更胡傷攻趙閼與不㧞四十七年秦聽范雎諜使五大夫魏綰伐魏㧞懷城四十九年秦㧞魏廩丘懷或作邢丘又作郪丘五十年秦㧞趙三城趙孝成王元年趙王新立太后用事秦急攻之趙氏求救於齊齊曰必以長安君爲質乃出太后不肯左師觸龍諫之於是爲長安君約車百乘質於齊齊兵乃出是年齊田單將趙師攻燕中陽一作中人㧞之又攻韓注人㧞之韓惠王七年五十一年秦㧞韓陘城汾旁一云白起攻韓㧞九城斬首五萬五十二年秦擊韓於太行五十三年秦五大夫賁攻韓取十城取楚州五十四年趙使廉頗距秦於長平初秦擊韓於太行上黨守馮亭使者至趙曰韓不能守上黨入之於秦其吏民皆安爲趙不欲爲秦有城邑十七願再拜入之趙聴王所以賜吏民王大喜召平陽君豹告之曰馮亭入城市邑十七受之何如對曰聖人甚禍無故之利王曰人懷吾德何謂無故乎對曰夫秦蠶食韓氏地中絶不令相通固自以爲坐而受上黨之地也韓氏所以不入於秦者欲嫁其禍於趙也秦服其勞而趙受其利雖彊大不能得之於小弱小弱顧能得之於彊大乎豈可謂非無故之利哉且夫秦以牛田之水通糧蠶食上乘倍戰者裂上國之地其政行不可與爲難必勿受也王曰今發百乘之軍而攻踰年歴歲未得一城也今以城市邑十七幣吾國此大利也趙豹出趙王召平原君與趙禹而告之對曰發百萬之軍而攻踰歲未得一城今坐受城市邑十七此大利不可失也王曰善乃令趙勝受地告馮亭曰敝國使者臣勝敝國君使勝致命以萬户都三封太守千户都三封縣令皆世世爲侯吏民皆益爵三級吏民能相安皆賜之六金馮亭垂涕不見使者曰吾不處三不義也爲主守地不能死國不義一矣入之秦不聽主令不義二矣賣主地而食之不義三矣趙遂發兵取上黨廉頗將軍軍長平五十五年秦將白起破趙齊楚救之秦計曰齊楚救趙親則退兵不親遂攻之趙無食請粟於齊齊不聽周子曰不如聽之以退秦兵不聽則秦兵不却是秦之計中而齊楚之計過也且趙之於齊楚扞蔽也猶齒之有唇也唇亡則齒寒今日亡趙明日患及齊楚且救趙之務宜若奉漏甕沃焦釡也夫救趙髙義也却秦顯名也義救亡國威却彊秦之兵不務爲此而務愛粟爲國計者過矣齊王弗聽秦破趙於長平四十餘萬遂圍邯鄲五十六年秦軍分爲三軍白起歸王齕將伐趙武安皮牢㧞之司馬梗北定太原盡有韓上黨正月兵罷復守上黨其十月五大夫陵攻趙邯鄲五十七年正月秦益發卒佐陵陵戰不善令王齕代將其十月將軍張唐攻魏爲蔡尉捐弗守五十八年十月秦張唐攻鄭㧞之十二月益發卒軍汾城旁王齕攻邯鄲不㧞一云魏公子無忌楚春申君救邯鄲秦兵解去去還奔汾軍餘攻秦軍斬首六千晉楚流外河死二萬人楚一作走攻汾城即從唐㧞寜一作曼趙邑也新中寧新中更名安陽魏郡有安陽縣五十九年秦將軍摎攻韓取陽城負黍斬首四萬攻趙取二十餘縣首虜九萬是年燕攻趙昌壯一作莊五月㧞之趙將樂乘慶舎攻秦信梁軍破之韓魏楚救趙新中秦兵罷是歲周赧王卒此後以秦年為首秦昭王五十二年楚取魯楚考烈王八年五十六年燕伐趙燕王喜四年爲趙所破殺栗腹初燕王令丞相栗腹約驩以五百金爲趙王酒還歸報燕王曰趙氏壯者皆死長平其孤未壯可伐也王召昌國君樂間而問之對曰趙四戰之國也其民習兵伐之不可王曰吾以衆伐寡二而伐一可乎對曰不可王曰吾即以五而伐一可乎對曰不可燕王大怒羣臣皆以爲可燕卒起二軍車二千乘栗腹將而攻鄗在常山今高邑卿秦將而攻代廉頗爲趙將破殺栗腹虜卿秦樂間世家云亷頗圍燕莊襄王元年秦使蒙驁伐韓韓獻成臯滎陽秦界至大梁是年楚滅魯趙假相大將武襄君樂乘攻燕圍其國三年趙延陵鈞率師從相國信平君助魏攻燕是年秦使蒙驁攻魏高都㧞之又攻趙榆次新城狼孟取三十七城三年秦將王齕擊韓上黨㧞之是年魏公子無忌率五國兵敗秦軍于河外走蒙驁趙孝成王二十一年趙廉頗將攻繁陽在頓丘取之是歲秦始皇三年此後秦諸侯並入閏位勲業門悼襄王二年趙使李牧將攻燕㧞武遂屬河間一云屬安平方城屬有督亢亭三年趙使龎煖將攻燕禽其將劇辛初劇辛故居趙與龎煖善巳而亡走燕燕見趙數困于秦而廉頗去令龎煖將也故因趙弊攻之問劇辛辛曰龎煖易與耳燕使劇辛將擊趙趙使龎煖擊之取燕軍二萬殺劇辛四年龎煖將趙楚魏燕之鋭師攻秦蕞在新豐不㧞移攻齊取饒安在渤海又云饒屬北海安屬平原五年傅抵將居平邑慶舍將東陽河外帥守河梁河門右九年趙攻燕取貍陽城兵未除秦攻鄴㧞之令饒陽一作㧞閼與鄴九城册府元龜卷二百五十一
