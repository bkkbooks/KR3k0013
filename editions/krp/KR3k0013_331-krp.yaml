body:
  text: 册府元龜卷三百三十一宋王欽若等撰宰輔部退讓第二宋王𢎞元嘉五年為侍中錄尚書事以旱引咎遜位表曰臣聞三才雖殊其致則一故世道休明五福攸應政有失徳咎徵必顯抑臣又聞台輔之職論道讃契上佐人主燮理隂陽以徳授受則和氣淳穆寇竊非據則讁見於天是以陳平有辭不濫主者之局邴吉停駕大懼牛喘之繇斯固有國之所同天人之逺旨陛下聖哲御世光隆中興宜休徴表祥醴泉毖涌而隂陽隔并亢旱成災秋無嚴霜冬無積雪疾癘之氣彌歴四時此豈非任失其人覆餗之咎臣以庸短自畢凡流謬逢嘉運叨恩在昔陛下忘其不腆又重之以今任正位槐鼎統理神州珥貂衣衮捴錄朝端内外要重頓萃㣲躬窮極寵貴人臣莫比令徳居之猶或難稱矧伊陋昧何以克任此之易了不俟明識但受命之始屬值時艱六戎親戒憂及社稷誠是臣下致節忘身之時當有何心塵擾聖聽所以僶俛從事循墻馳驅志在宣力慮不及逺既鯨鯢折首西夏厎定便宜訴其本情避賢謝拙而常人偷安日甘一日實亦仰佩天眷未能自己荏苒推遷忽及三載遂令負乗之釁彰著幽明愆伏之灾患纒氓庶上缺皇朝緝熈之美下増官謗覆折之災伏念惶赧五情飛散雖曰厚顔何以寜處不逺而復大易攸稱小懲大戒細人之福近復之美非所敢望懲戒之章竊懐庶幾今履端惟始朝慶禮畢輙還私門思愆家巷庶㣲塞天譴小弭謗言伏願監其所守即而許之臨啓愧塞不自宣盡乃降為衛将軍開府儀同三司六年以彭城王義康處親賢之地𢎞上表曰臣聞異姓為後宗周之明義親不在外有國之所先故魯長滕君春秋所美楚出棄疾前史垂戒矧乃茂親明徳道光一時述職侯甸朝政弗及而以庶族庸陋浮華之臣超踰先典居中讃契豈所以憲章古式緝熈治道驃騎將軍臣義康徽猷淵邈明徳彌劭敷政江漢化被荆南搢紳屬情想樂當務周旦之寄不謀同辭分陜雖重比此為輕臣實空闇階恩踰越俯積素餐仰玷盛化公私二三無一而可昔孫叔不嗣楚子見哂展季在下臧文貽譏况道隆地眤義兼前禮臣於古人無能為役負乗竊位萬物謂何雖曰顔厚胡寜以處斯亾之懼實疚厥心乞觧州錄以允民望伏願陛下逺存至公近監丹欵俯順朝野改授親賢豈惟下臣獲免大戾凡厥衆𨽻孰不慶幸若天眷罔已脫復遲迴請出臣表逮聞外内朝議輿誦或有可擇詔曰省表逺擬隆周經國之體近述大易卑牧之志三復冲㫖良用憮然公體道淵虚明識經逺毗翼艱難勲猷光茂俾朕獲宸居垂拱司契委成豈容髙遜捴錄固辭神州使成務有虧以重朕之不徳耶深存體國所望寅亮驃騎親賢之寄地均旦奭還入内輔參贊機務輙敬從所執義康繇是代𢎞司徒與之分錄𢎞又表曰近冐表聞披陳愚管實兾天鍳體其至誠而奉被還詔未蒙酬察徒塵聖覽仰延優㫖顧影慙惶罔識攸厝臣忝荷要重四載於今既違前史量力之誡又㣲古人進賢之美尸位固寵日積官謗旋觀周行興愧尤厚况在親賢朝野歸徳甫思引身曷云能補惟塵大典虧䘮已多不悟天眷之隆復垂恩奨名器弗改䝉寵如舊愚惑自揆茫若無涯臣義康既搃錄百揆毗贊盛化忝厠下風諮憑有所内朝細務庶可勉竭神州任重實難兼該臣何人斯寇竊不已為爾推遷覆敗將及就無人事之愆必有隂陽之患伏念惟憂疢如疾首不知何理可以自安但成㫖已决渙汗難反加臣庸劣少無此志進不能抗言陳辭以死自固退不能重繭置氷鮮食為瘠袛畏天威遂復俛仰至於攝督所部料綜文案曹局吏役所須不多其餘文武皆為冗長相府初建或有未充請留職僚同事而已自此以外及諸資實一送司徒臣受恩深重休戚是預義無虚飾茍自貶損伏願聖察特垂許順不令誠訴其見抑奪又詔曰衛軍表如此司徒宜須事力可順公雅懐割二千人配府資儲不煩事送南齊禇淵建元元年進位司徒侍中中書監如故淵固辭司徒與僕射王儉書欲依蔡謨事例儉以非所宜言勸淵受命終不就太祖遺詔以淵錄尚書事頃之寢疾上相星連有變憂之表遜位又因王儉及侍中王晏口陳武帝帝不許淵又啓曰臣顧惟凡薄福過灾生未能以正情自安逺慙彦輔既内懐耿介便覺晷刻難持叨職未乆首嵗便嬰篤疾爾來沉痼頻經危殆彌深憂震陛下曲存遲迴或謂僉議同異此出於留慈每過愛欲其榮臣年四十有八叨忝􅊀至若以疾陳遜豈該聴察捴錄之任江左罕授上隣亞台升降紫㣲今受祿弗辭退絀斯願於臣名器非曰貶少萬物耳目皎然共見寜足仰延聖慮稍垂矜惜臣若内飾亷譽外修謙徳此則憲書行劾刑網是肅臣赤誠不能行亦幽明所不宥區區寸心歸啓以實自吝寸隂寔願萬倍堯世昔王𢎞固請乃以司徒為衛將軍宋氏行之不疑當時物無異議以臣方之曽何足説伏願恢闡宏猷賜開停造則臣雖死之日猶生之年乃改授司空領驃騎將軍侍中錄尚書如故王儉建元四年為侍中尚書令鎮軍將軍永明元年進號衛將軍參掌選事三年領國子祭酒叔父僧䖍亡儉表觧職不許五年即本號開府儀同三司固讓徐孝嗣加開府儀同三司孝嗣聞有詔歛容謂左右曰吾徳慙古人位登衮職將何以堪之明君可以理奪必當死請若不獲命正當角巾丘園待罪家巷耳固辭不受王僧䖍遷侍中左光祿大夫開府儀同三司僧䖍謂兄子儉曰汝仕於朝行當有八命之禮我若復此授則一門有二台司實可畏懼乃固辭不拜帝優而許之改授侍中特進左光祿大夫客問僧䖍固辭之意僧䖍曰君子所憂無徳不憂無寵吾衣食周身榮位已過所慙庸薄無以報國豈容更受髙爵方貽官謗耶陳顯達明帝時為太尉嘗侍晏酒後啓帝曰臣年老富貴已足唯少枕死特就陛下乞之帝失色曰公醉矣以年禮告退不許梁謝朏初拜侍中司徒尚書令朏辭脚疾不堪拜謁乃角巾肩輿詣雲龍門謝詔見於華林園乗小車就席明旦輿駕出幸朏宅醼語盡懽朏固陳本志不許後魏穆亮為司空及兄罷預穆泰反事亮以府事付司馬慕容契上表自劾孝文優詔不許還令攝事亮頻煩固請乆乃許之北海王祥孝文時行中領軍留守兼督營搆之務孝文顧命祥為司空輔政宣武即位以祥有營搆之勤増邑一千户祥以帝居諒闇不受頃之除太傅領司徒侍中錄尚書事如故祥固辭詔遣敦勸乃受咸陽王禧宣武時為侍中太尉八座奏増邑千户帝從之禧固辭不受髙陽王雍轉太尉公加侍中時雍以旱故再表遜位優詔不許除太保領太尉侍中如故廣陵王羽為車騎大將軍司州牧宣武覧政引羽入内而授司徒羽辭曰彦和本自不願而陛下彊與今新去此官而以臣代之必招物議李豫既轉授之無嫌請為司空帝猶彊焉固辭乃許之崔光孝明正光二年為車騎大將軍儀同三司領祭酒著作司徒京兆王經頻上表以位讓光為司徒侍中光表固辭歴年終不肯受三年進位太保光又固辭楊椿為太保侍中孝莊帝還宫椿乞歸老詔賜侍中朝服一具衣一襲八尺床帳几杖不朝乗安車駕駟馬給扶𫝊詔二人仰所在郡縣時以禮存問安否方乖諮訪良用憮然椿奉詔於華林園帝下御座執椿手流涕曰公先帝舊臣實為元老今四方未寜理須諮訪但髙尚其志决意不留既難相違深用悽愴椿亦歔欷欲拜莊帝親執不聽於是賜以絹布給羽林衛送羣公百寮餞於城西張方橋行路觀者莫不稱歎隋李穆開皇初拜大師乃上表乞骸骨詔曰朕初臨㝢内方藉嘉猷養老乞言實懐虚想七十致仕本為常人至若吕尚以期頥佐周張蒼以華皓相漢髙才命世不拘常禮遲得此心留情規訓公年既耆舊筋力難煩今勒所司敬蠲朝集如有大事須共謀議别遣使臣就第詢訪唐蕭瑀為尚書右僕射武徳七年以熒惑犯右執法上表遜位優詔不許長孫無忌為尚書右僕射貞觀二年上表遜位詔曰昔東漢功臣莫任機揆西京戚里或存退讓故能常守富貴不懼危殆尚書右僕射齊國公無忌神識清舉風采凝映聖戚之望朝野所推比軒禁不虞釁生慮表倉卒之間厥功以茂自居樞要聲實俄逺然以椒掖之親處機權之重深知止足有戒滿盈收袵之情言辭懇切宜遂其心以勵貪競可解尚書右僕射仍進散位開府儀同三司後為太子太師貞觀二十年夏四月與太子太傅房𤣥齡太子太保蕭瑀並遜師傅之位優詔不許二十三年五月髙宗即位進拜太尉知尚書門下事如故無忌固辭知尚書省事仍令以太尉同中書門下三品十一月以晋州地震無忌與司空荆王元景尚書左僕射李勣咸請遜位詔不許永徽三年以旱上書辭職髙宗頻降手詔敦諭不允杜如晦為尚書右僕射貞觀三年以疾遜位許之李靖為尚書右僕射以疾上表遜位曰臣聞匠石程材樗散無棟梁之用陶冶成器滿盈有傾覆之憂是以量力著於魯史招損陳於夏書臣固庸流無階貴仕短翮慕侣顧榆枋而自得駘足追羣瞻燕越而絶思幸屬光華啓旦管庫無遺錄其丹赤棄其瑕滓假宫啇於庸音披丹漆於朽質雖復南臨徼外北踐沙場敵必倒戈人懐尚義以此為效實貪天功而上賞亟行鴻恩罔已錫爵胙土連衡寇鄧腰金鳴玉方軌崔盧木石有心豈不増愧自濫端副待罪文昌靦顔疚心屢移星琯畫一之譽無紀明時維鵜之譏日聞朝聴遂使化洽陰陽或虧於玉燭徳動辰緯時爽於珠聨求其所繇並臣之咎加以年事西夕疴疾日侵腰脚疼痺筋力衰竭雖欲勉勵非復全人臣猶知之况於他人臣之所祈本陳情實非敢追踪䟽傅繼跡留侯妄自矯飾求兹虚譽若使尸素重任無損國猷亦當僶俛匪躬丼受身累撫事論心無一而可乞觧所職養病私門伏願暫屏冕旒曲鍳丹懇輟天威於雨露迴陽光於葵藿則彛章載穆品物咸亨臣未申投報方違軒陛伏紙慙戀預懐罔極魏徴為侍中貞觀十年遜位乞觧所職請為散官陪奉左右拾遺補闕太宗曰朕拔卿於讎虜之中任卿以樞要之職見朕之非嘗不諌公獨不見金之在鑛也何足貴哉良冶鍜而為器便為人所寳朕方自比於金以卿為良匠卿雖有疾未為衰老得便爾耶徴乃止六月徵又面請遜位言發至誠太宗難違之遂下手詔曰留侯名相濟北之志已髙䟽傅人師東都之跡彌芳後進仰其遺烈前䇿以為美譚諒可以砥節礪行化俗𢎞風者也左光祿大夫侍中鄭國公魏徴器量沉敏軌儀詳正文思優贍學業該通自叅贊機衡綢繆帷幄知無不為心力備盡格言弗隠正義日聞一徳載宣四聰斯達實賴嘉猷用康治道而深執謙損志懐冲退詞誠懇切良用憮然杼軸於懐屢移氣序而固陳丹欵義在難違今便申其雅志以成厥美可特進封如故仍知門下事朝章國典叅議得失自徒流以下罪詳事奏聞其禄賜及國官防閣等並同職事房𤣥齡貞觀十六年自中書令拜司空𤣥齡頻表固譲太宗遣使謂𤣥齡曰昔留侯譲位竇融辭秩自懼盈滿知進能退善鑒止足前代美之公亦欲齊蹤徃哲實可嘉尚然國家乆相任使一朝忽然無良相如失两手公筋力不衰無煩此譲自知衰怠當更奏聞髙士亷為尚書右僕射貞觀十七年上䟽請求致仕再三懇切優詔許觧右僕射餘官如故依舊平章政事李勣為左僕射與元景等咸以晋州地震請遜位詔並不許後又抗表求觧僕射仍令以開府儀同三司依舊知政事于志寜永徽元年為左僕射同中書門下三品嘗與右僕射張行成中書髙季輔俱䝉賜地志寜奏曰臣代居闗右周魏以来基址不堕行成等新營莊宅尚少田園於臣有餘乞申私讓帝嘉其意乃分賜行成及季輔崔敦禮為中書令簡校太子詹事敦禮自以乆患不堪趋事两宫乞解所職制除太子少師同中書門下三品劉祥道龍朔中為右相在位深懐憂懼數自陳老疾請退就閒職尋轉司禮太常伯罷知政事陸敦信為左僕射兼檢校右相乾封元年以老疾辭職拜大司成兼左僕射停檢校右相劉仁軌為尚書左㒒射兼太子少傅同中書門下三品永隆二年上表固辭端揆之職詔聽尚書左僕射以太子少傅同中書門下三品姜恪為左相咸亨元年秋京輦洎闗河數州炎旱八月恪率文官三品已上詣闕抗表自陳尸素請避位以厭灾咎優制不許閏九月以乆旱恪已下抗䟽辭職並不許王方慶為鸞臺侍郎同鳯閣鸞臺平章事聖歴初以老疾乞從閒逸乃授麟臺監修國史朱敬則長安中為正諌大夫同鳯閣鸞臺三品以老請罷知政事許之仍令以本官依舊兼脩國史唐休璟中宗神龍元年為尚書右僕射休璟以頃者雨水為害咎在主司上表曰臣聞天運其工用人代之而理禮行其化為政資之以和所謂佐弼萬幾主贊百揆共康庶績𢎞闡大猷得其理則隂陽以調失其和則灾沴斯作故舉才而授帝唯其難論道於邦官不必備茍非其任自古缺之臣樗櫟散才桑榆暮齒識非經逺器不濟時徒以宿忝周行歴登朝廡再睹興運累辱寵章執典禁戎不雪四郊之耻忝尸端右更居八座之榮任重材輕恩深効淺空曠職事僶俛嵗時莫能師長具寮損益大政况疲弊已至年髪浸衰心欲自彊力終不及無徳而祿必為小人之患非材妄居果致大臣之咎頃自中夏及乎首秋有因水灾屢為人害瀕陽奥壤流溺邑居淇上名區漂壞閭井又雒水汎溢决潰隄防驚惶居人輙動皇念將政教之吏罔副天心實燮理之才未知王度夫水隂氣也右實主之臣忝職右樞致此隂沴是不能調理其氣而曠其官雖運屬堯年則無理水之用位侔殷相且闕濟川之功猶負明時坐逃皇譴皇恩不棄其謂天何昔漢官故事丞相以天灾免職况竊在聖朝臣豈敢靦顔居位乞觧所居待罪私庭兾移隂咎之徴復免夜行之責手制荅曰隂陽乖爽事屬在予待罪私門難依来表休璟又表請觧職優制不許魏元忠神龍中為右僕射中書令節愍太子之舉兵魏元忠子昇為太子脅令從已遂為亂兵所殺元忠以昇遇害之日逆順不分懼不自安上表自陳曰臣本書生藝業無取徒以服膺儒教頗踐禮經忠義所奬思固名節每見危臨難輙即忘死昔事先帝以謹宻見稱名位雖微預叅顧問中事則天皇后緣委質先朝以屨屢之末特存恩眄徃事陛下又預宫寮攀附之情無忘造次遇䜛邪興謗欺誷天聰暫生投抒之疑逺放不毛之地屬龍興啟運寳命維新以臣再沐先慈遽令追入一承恩幸百日屢遷無翼而飛坐昇霄漢濫承茅土之賜猥登衡石之司而名忝大臣不能緝諧中外致使禍生輦轂釁起儲闈空懐報國之誠而無死莭之効又誠慙知子禮失義方男昇踐蹈兇邪莫分逆順因招流議歸責於臣賴陛下保明獲存今日若非天地覆育臣已乆從灰粉所以偷生僶俛感徳躊蹰犬馬戀恩未遑辭退頃因自思念舉措無顔豈可更踐樞機茍貪祿位請觧尚書右僕射中書令知兵部事及監修國史并除齊國公封爵如䝉聖恩憫察矜兹微欵乞一散秩罷還私第得叅朔望之謁時拜闕庭即進退有歸生死知足手制聽觧尚書左僕射以特進齊國公致仕於家仍朝朔望楊國忠為右相天寳十二載自魏國公改封衛國公辭其大名也苖晉卿肅宗初為左相後以賊漸除屢乞骸骨優詔許之遂罷為太子太傅明年帝思舊臣復拜侍中寳應元年九月上表遜位不許王縉廣徳初同平章事二年遷侍中持節都綂河南淮西山南東道諸節度行營事進封太原郡公縉上表讓曰臣性實至愚才非出衆幸以逢時之命乆為尸祿之人頃自艱難累職中外取之於武無逐冦之勲用之於文乏經邦之畧不能陳力而猶冐進豈謂天眷擢居台衡時已渉於炎凉政無禆於塵露上慙報國内愧妨賢身無所容況加重寄既綂師律又鎮方隅翔飛徒及於戻天蹇足不可以逐日致冦非逺害盈必徴竊念才微位髙福過哀至憂懼所切晷刻為年特乞聖慈察臣不逮退侍中及郡公等還臣舊官本封使赴前途或兾成事不然坐致顛沛取笑遠邇手詔荅曰卿道髙王佐才茂國楨叙百揆於中台調四時於元氣乃眷東夏至於海隅爰咨相府之謀出捴兵車之㑹受被師律主其載書禮有優崇昭兹寵命黄樞受秩𤣥社加封咸重分麾俾光推轂用申彛典何至勞謙即斷來表縉又上表曰君之使臣就死不避況増榮命翻敢固辭鄙辟之誠已罄陳露幸遇天髙聴卑之日懼無下情不逹之感且臣名在宰輔肅將聖恩行臨四方孰不悦服坐鎮萬里自然晏清豈必重以大官假之多邑無益時事實枉寵光於臣先為之極於禮殊為不中伏乞容臣輸力候有成功從此懋官實為未晚使臣即日奉詔陷於飾讓矯詞褊心成病恐無能為也特望鴻慈必允所願手詔荅曰常伯之任元戎之權自非大臣孰允僉望齊梁郡國淮楚方隅必資相府之賢式綂軍司之務爰從益邑懋厥官常朝典已行何至固讓即斷来表縉又上表曰恩詔三降令出惟行愚臣萬死志不可奪竊恐器小受多既盈招損憂敗公事敢愛微軀將命前行湯火寧顧無功増秩荷伏是思履薄臨深心魂積悸伏惟陛下至明至聖洞鑒幽微以欲從人以慈育物自念沛然受恩天下咸服則能者必勸僣人知取豈非陛下逹臣子之道張國家之網臣恨不開腹布心用表誠實謹冐死以聞手詔荅曰以卿叶宣廟謀綱綂戎律軍國大務咸以咨之禮命優崇古今通制爰進珥貂之秩用加書社之封累表陳情固辭寵數言多激切志益堅貞雖尚徳任賢務於褒進而勞謙退讓宜有允從暫紓所懐俯順誠情所讓侍中郡公者宜依郭子儀代宗時加守太尉累表陳譲又手詔荅曰卿秉徳資忠懿文經武内凝庶績外定羣兇為社稷之元勲實台陛之良輔爰昇太尉以冠具寮六府益明九鼎増重而懇守冲譲至於再三確乎丹誠貫彼白日范宣辭位馮異不言雖成功而勿居固時望而無易用旌懇至俯遂乃懐所譲者依杜鴻漸為門下侍郎平章事兼東都留守充河南淮西山南東道副元帥大歴四年以疾抗䟽請遜位不從又上言曰臣内顧微躬自量拙分無片善可取無一事可稱皆緣際㑹叅務軍國尸榮竊位公責所歸且智小謀大鮮不敗事福過禍生常然之理一自嬰瘵旬朔未瘳大减服食晦明異候竊料氣力衰憊恐先朝露乞遂退閒庶安形神且臣素以疵賤敢期貴逺嘗慮薄質不勝重任今祿位俱極過逾涯量致此沉疴得非害盈思自損抑兾通神理又不親政事卧受寵榮廢公曠時益増慙懼所以塵黷旒扆至於再三情迫於兹敢有所隠愚朴之性陛下素知漸加危頓豈容矯飾伏望罷其所授貸以殘生昔漢魏近臣有暮年多疾則賜告就第或再起復位若大限未盡羸疴漸平聖慈不棄馳策非晚重得珥貂彤庭鏘玉紫墀則竭力之日長乞恩之時少也如或殆至深慮何必蹔榮儻生遂其志沒無所恨矣實兾皇天聽用於上訴大陽迴舍於至誠俯納誠祈退令攝衛衰年餘齒殊私曲全受賜則多生涯之幸手詔荅曰卿光輔朕躬協全大化頃緣軍國務搃陽和致乖渉於旬時藥弗瞑眩屢薦章表固求歸閒謙冲再三辭志懇苦兾遂全攝重違厥誠康復之日且有後命楊綰為中書侍郎平章事大歴十二年以疾抗䟽請遜位三表不許蕭復興元元年為門下侍郎平章事三上表請罷免許之劉滋貞元二年為左散騎常侍平章事在位亷謹畏慎多所退讓嵗餘罷平章守本官馬燧貞元三年為河東節度使冊拜司徒侍中燧累乞骸骨陳讓侍中不許十一年又以疾請罷侍中數表詞甚切至帝不允趙憬貞元十年為門下侍郎平章事以目疾三辭相位不許至十一年四月憬又以時旱表乞退帝不許盧邁為中書侍郎平章事貞元十二年九月於政事堂中風疾遂肩輿以歸十月乙丑邁以疾讓官不許癸酉又上表請罷不許丙子令宰相徃邁宅問疾戊寅邁又上表讓官不許十二月甲申邁又上表請罷官詔報曰卿職重台衡道存忠諒自嬰所疾每著於懐日兾有瘳宜善將攝遽兹陳請殊曰不然未遂乃誠當悉朕意十三年二月辛已邁又上表請罷官不許九月邁又上表懇辭官詔報曰卿操履貞方器識淹茂自居台輔益見忠清方藉謀猷遽嬰疾痛嵗月乆淹章表屢聞陳請再三撝謙難奪且養賢之禮宜遂優閒而告免之誠斯為懇至俯從來奏良用憮然賈躭貞元末平章事上表以疾辭官不許杜祐元和中為平章事充度支鹽鐵等使上表讓錢榖之任朝廷既允其譲乃册司徒平章事封岐國公嵗餘請致仕詔不許但减其朝謁李吉甫元和九年為平章事表再上讓官不許武元衡元和九年與李絳同平章事憲宗對宰臣於延英殿元衡絳皆稽首陳讓者再三帝優喻之蕭俛長慶初為門下侍郎平章事抗䟽辭相位優詔不許數日繼陳三表牛僧儒寳歴初居相位三年嘗以寵過為懼自前年二月抗䟽乞罷敬宗以先朝舊相園寝未終不許穆宗祔廟畢又如前拜章帝復以郊禮在近職當輔導不許至是又固陳乞帝乃嘉其退讓特進建武昌軍額而命之太和六年又為中書侍郎同平章三上䟽求免遂出為淮南節度使裴度寳歴初入為司空平章事兼判度支滄景既平因上陳調兵食非宰相事請歸於有司詔從之加開府儀同三司仍賜實封三百户俄以危疾固辭機宻恩禮愈厚加司徒平章軍國重事許其三五日一入度上表辭冊禮曰臣䝉恩授前件官准制取今月二十八日册命者伏以公台崇禮典冊盛儀庸臣當之實為忝越况累承寵命亦謂便蕃前後三度既行此禮非稱臣猶忝叅樞近竊懼無以弼諧重此勞煩有靦面目伏乞天恩且課臣効官責臣實事册命之儀特賜停罷則素飡髙位空媿耻於中心弁冕輅車免譏笑於衆口不勝慙惶懇迫之至詔曰裴度上獻表章固辭冊禮冲謙之志發自懇誠嘉歎良深用依来請其冊禮宜權停改以司徒兼侍中出鎮襄州在鎮數年齒及懸車累上表求致仕詔皆不允陳請益懇遂除東都留守司徒侍中如故路随太和中平章事文宗坐紫宸殿随奏事退至龍墀身仆於地帝令中人慰問翼日遂以䟽陳乞識者嘉嘆竇易直為吏部侍郎平章事判度支未幾轉門下侍郎讓度支置其俸三月詔停判度支陳夷行開成中平章事辭以足疾讓官帝使中人宣召夷行三上䟽優詔不許鄭覃開成中與李珏同平章事覃珏俱上表讓官優詔不許李徳裕自司徒加太尉衞國公抗表辭曰太尉自國初已来唯有七人其中有三人是不得已而授臣心恐禍至乞守舊秩武宗曰朕不同文宗與卿心地殊不相見此官卿不合得必不與卿㫁自朕心更不要讓徳裕受之益懼時賢美之鄭延昌景福中平章事以病求罷除尚書左僕射梁趙光逢為中書侍郎平章事累轉僕射兼租庸使上章求退以太子太保致仕末帝愛其才徴拜司空平章事無幾以疾辭授司徒致仕後唐郭崇韜為樞宻使中書令同光二年二月上表陳請曰臣聞底力辭封者貞臣之至節慢官速戾者有國之常刑其或任重才䡖智小謀大縱君恩念舊不貽覆餗之譏倘官業無章何顯陟明之道臣本轅牙小校樗朽凡姿在公雖歴於年深臨事莫聞於日益頃者皇帝陛下雄圖方運陽徳初潛爰將整於䂓繩乃俾司於機務此際臣亦内循短淺累具退陳而陛下天睠不迴國權堅付在一時而難違重命許五年而别選通人邇来雖昧經綸强施勤拙至於戡夷巨孽纉紹鴻基雪三百年社稷深寃立十九葉宗祊大事皆謀從聖慮斷在宸𠂻兼列校之同心非㣲臣之獨計况今名昇台輔任處樞衡珥貂冕於朝端統龍旌於閫外恩榮有進功徳無稱終憂即鹿之嫌寜抑懸貆之刺今則陛下功全報本禮極配天衣冠盡列於明廷名器宜推於碩徳况臣才謨素寡齒髪漸衰以有限之精神當無窮之事務必須下傾肝血上告天聰兾勞逸之稍均庶初終之可保伏望陛下念臣不逮察臣繇衷其樞宻使比列親班實為要執即復本朝規制宜選内官掌臨一則使權職有分一則免心力俱耗輙茲傾瀝非敢闇欺干犯冕旒伏增隕越詔報曰卿名髙釣渭才大築巖夙符封社於周王早契夣魂於殷主顧君臣之際㑹實社稷之威靈所以翊贊冲人纉承丕祚頃嵗以梁賊搆逆唐室罹灾羣兇競起於萑蒲九廟皆生於禾黍忍耻而徒思嘗膽平居而未見沃心爾能竭迺沉謀資予大計遂訓齊虎旅平殄梟巢文軌混同梯航盡入延景運於綴旒之後建殊庸於誓帶之前况今纔告類於郊壇方卜年於雒宅始欲與卿平章理道講貫化源長遵馭朽之規每聽從繩之諌雖遷廊廟尚委樞機縱領藩垣不離都輦而又别頒金篆求佐瑶圖今則忽睹表章遽辭繁捴進退徒聞於知足始終寜稱於注懐是宜勵力扶持勉思翼戴既叶雲從之義更申日益之功將致君而須歴重權方為主而難持謙柄覧卿陳乞俾我焦勞宜體朕懐即斷来表崇韜又表曰臣以機務寔繁智力俱困輙有聞天之請願辭宻地之權豈謂聖㫖俄宣皇情未允捧對而水湯滿腹揣修而芒刺盈軀臣以委質無才受恩踰等强展神扶之力每懐曠敗之憂自陛下委寄重難纒綿嵗序臨事而退思補過竭力而知無不為當陛下㳂河料敵之時對塞交鋒之日臣若固將丹素堅有讓陳不唯招避事之譏抑亦顯不忠之罪况今元兇已殄丕構彌隆圓丘陳報本之儀寰海被無私之化英髦星萃抜邁雲臻緬惟不迨之才豈掩旁求之命矧乃一身多疾三處持權捫心益懼於滿盈持徳每虞於忝據伏望陛下特迴睿炤迺悉煩襟終乞輟此要樞歸於内列一則表大國有進賢之道二則免微臣獨竊位之名干冐宸嚴無任迫切詔荅曰卿忠孝有稱古今無比竭智術而扶持景運蹈讓謙和而統冠羣英欝有勲庸刋於簡冊昨以剪平元惡開拓丕基權謀雖出於朕懐叶贊全資於爾力是乃委司鈞軸任捴兵符樞機兼掌於金藏盟約備頒於鐵劵實諧倚注雅稱褒隆豈其忽覧封章堅辭宻務在卿幽明監徳内外推仁可保於千載一時何軫於前思後慮况朕綏寜寰海纔欲半年告類圓丘未踰一月耆徳便歸退靜羣情莫測其源方賴嘉謀永禆闕政卿宜勉持幹恪永惓繁難更圖逺大之功共保初終之道其年八月崇韜又上表曰臣伏念朝廷起軍之際陛下决於宸斷撫臣背曰此去必盪寇讎可期清泰事了之後與卿一鎮臣仰奉成筭固絶他疑果賴神謀尋平偽孽今乾坤交泰弓矢載櫜徽章以正于母儀嘉禮獲申於元子須傾血懇仰凟宸嚴但以宻近之權合歸重望鈞衡之柄宜屬通材至於所領節旄雖是陛下所許伏緣鎮州在北狂虜未除慮有奔衝須為控扼亦希付於上將所貴殿彼一隅伏望陛下道極炤臨仁深覆載念臣乆司繁重憫臣方在衰羸退放居閒俾從遵養臣無任祈天瀝懇之至帝召崇韜面諭之曰吾在朝城許卿重鎮不許退閒卿與國同休去將安徃促復乃位餘勿復言鄭玨為中書侍郎平章事天成三年二月戊戌開社宴於玉華殿珏稱疾不朝翼日表請老丁酉百官朝於𤣥徳殿珏奏曰臣受國恩深首居宰輔所恨年齒衰耄又復耳聾望容臣休職帝曰朕自臨御數年康寜賴輔佐更勉三五年相伴安重誨為樞宻使中書令長興元年九月重誨進表乞解機務帝謂曰朕與卿無間兇軰厚誣尋已誅戮卿此後更勿在懐翼日宰臣入對馮道等奏曰臣竊聞安重誨乞辭機務此事不可輕議乞陛下特持宸襟以安中外帝曰朕已面諭之無所改易至是重誨復靣奏云臣以孤賤事陛下今日位重人臣忽被無名誣搆若非聖鍳至明察臣忠懇則已膏於斧鉞矣以臣才輕位重終恐難鎮流言乞與臣一鎮暫觧機務以息浮謗聖㫖不恱重誨奏不已帝怒謂之曰放卿出朕自有人宣徽使范延光奏曰自中興以来重誨叅掌機務况無過失頗濟國家如重誨辭退無可為代帝曰卿豈不得延光奏曰重誨事陛下三十年為陛下無不陳力臣伏事日近幸逢興運叨竊寵靈比徳較功不可與重誨同年而語臣固才力不迨也帝遣促為之因令武徳使孟漢瓊至中書宣問宰臣商量重誨事執政疑其對唯馮道揚言曰諸人茍惜安令公紓其禍難則解機務為便也趙鳯諍曰大臣不宜輕動公失言也道等因附漢瓊奏曰此斷在宸㫖然重臣不可輕易移改繇是兼命延光為樞宻使重誨如故馮贇應順元年正月為中書令贇表譲又靣奏曰臣出自寒微比無勞效徒因際㑹遂竊寵靈今諸藩帥臣中書元輔鮮有中令之拜者臣等一旦並居此位天下觀聴者安肯無言臣竭血誠期不奉詔上以其衷切改授兼侍中進封邠國公李愚清泰中平章事以嬰疾多請告累表乞骸不允尋卒於位盧文紀清泰中平章事三表乞骸不允疾損中興殿見末帝存問文紀曰臣器能淺薄復衰年多疾精神咸耗自惟無以報効鴻恩致國家通泰所以迴避重權兾養餘年是以繼有章䟽啓陳聖睠未容瀝懇臣安偃蹇求便必望聖慈放臣醫藥幸也漢李崧晋天福初平章事表譲樞宻使不允周馮道初仕晋平章事少帝遣中使就中書賜道生辰器幣道以㓜屬亂離早䘮父母不記生日堅讓不受李糓廣順初平章事以步履所傷未損拜章辭位不允表再上不省遣内班宋延恩宣曰昨迴批荅已丁寜宣諭卿所掌至重代難其人茍濟事權何勞勤見朕於便殿待卿可暫入来與卿欵敘糓見於金祥殿披瀝極言太祖再三撫慰不得已而視事初詔糓綜三司事未能筆署乃刻名用之糓表辭以名印不可經乆太祖意不移俾復用之顯徳中為司空平章事以風痺請告十旬不損上表求觧所任詔不允自是凡三表册府元龜卷三百三十一
