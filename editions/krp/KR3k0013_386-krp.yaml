body:
  text: 册府元龜卷三百八十六宋王欽若等撰將帥部褒異第十二梁趙犨唐僖宗時為陳州刺史賊巢驍將孟楷擁徒入項縣犨引兵擊之賊衆大潰生擒孟楷中和三年朝廷聞其功就加檢校兵部尚書俄轉右僕射不數月加司空進封頴川縣伯巢黨復與蔡州秦宗權合勢以攻宛丘犨祈師於太祖太祖引大軍㑹於陳之西北陳人急攻巢寨重圍遂解獻捷于行在五年八月除犨為蔡州節度使于時巢黨雖敗宗權益熾唯陳去蔡百餘里兵少力微日與爭戰及巢黨敗宗權誅文徳元年蔡州平朝廷議勲以犨檢校司徒充泰寧軍節度使又改授浙江節度使兼領二鎭昭宗龍紀元年三月又以平巢蔡功就加平章事充忠武軍節度使仍以陳州為理所趙昶者犨之仲弟也昭宗時為忠武軍節度使亦以陳州為理所時秦宗權未滅昶毎選精鋭深入蔡賊雖衆終不能抗以至宗權敗焉朝廷賞勲加檢校司徒趙珝者犨之季弟也犨為陳州刺史以珝為親從都知兵馬使時巢黨東出商鄧與蔡賊㑹衆至百餘萬攻陳陳人大懼珝與二兄堅心誓衆約以死節㑹太祖率大軍解其圍朝廷議功加檢校右僕射遥領處州刺史羅紹威為魏博節度使唐昭宗天祐三年詔許本道立三代私廟至太祖開平元年十月帝以紹威近年以來貢輸極頻且倍於諸道帝慮其殫於事力以及於民遂勞而止之賜以南越所貢珍珠枕龍腦帶後紹威疾革遣使上章祈骸太祖撫案動容顧使者曰亟行語而主為我强飯如有不可諱當世世貴爾子孫以相報也仍命其子周翰監總軍府及訃至輟朝三日册贈尚書令羅周翰紹威子也紹威薨復為魏博節度使太祖乾化二年帝北廵至昌樂縣周翰來見於行宫宣至内殿對仍於御前賜食數刻乃退及辭歸鎭詔以良馬玉帶金銀器及香藥賜而遣之王罕之為河陽節度唐昭宗乾寧二年李克用為邠州行營四面都統克用表罕之為副及誅王行瑜罕之以功授檢校太尉食二千戸馮行襲唐僖宗時為金州防禦使時興元楊守亮將襲京師道出金商行襲逆擊大破之詔升金州為節鎭以戎昭軍為額即以行襲為節度使龎師古為太祖偏將援陳破蔡累有戰功遂用為都指揮使唐昭宗乾寧四年正月復統諸軍伐鄆抜之擒其帥朱瑄以獻始表為天平軍節度留後尋授徐州節度使檢校司徒張存敬為諸軍都虞候唐昭宗天順二年佐霍存董大軍收宿州以功奏加檢校兵部尚書太祖東征徐兖存敬屢有俘斬之功凡授指顧皆與機㑹矢石所及必以身先太祖尤加優異為行營都指揮使檢校右僕射天復元年春太祖以河中節度使王珂與太原結親憑恃驕恣命存敬統大軍討之即日收絳州生擒刺史陶建劉洎至晉州刺史張漢瑜來降二郡平進軍攻河中王珂請降太祖嘉之乃以存敬權知䕶國軍留後未幾檢校司空宋州刺史未之任卒於河中太祖痛惜開平初追贈太保葛從周唐僖宗時為大校從太祖破魏軍又晉人圍張全義於河陽從周赴援大破晉軍解河陽之圍以功表授檢校工部尚書從朱珍討徐州抜豐縣敗時溥加檢校刑部尚書昭宗大順二年八月與龎師古同攻兖州朱瑾乾寧二年十月擒其部將孫漢筠累立戰功自懐州刺史歴曹宿二州刺史遷檢校右僕射三年五月從周擊并師殺戮殆盡與龎師古渡河擊鄆四年正月下之乗勝伐兖其將朱懐英以城來降以功授兖州留後檢校司空光化元年四月又大破并師大軍以從周兼領邢州留後二年春幽州劉仁恭寇魏州從周擊走之授宣義軍司馬三年八月從太祖破并人表授檢校太保兼徐州兩使留後尋為兖州節度使天復元年青州劉鄩陷兖州太祖命討之十一月鄩舉城降以功檢校太傅末帝即位制授潞州節度使令坐食其俸加開府儀同三司檢校太師兼侍中封陳留郡王累食邑至七千戸命近臣旌節就别墅賜之貞明初卒於家册贈太尉謝彦章事太祖為騎將未帝嗣位用為兩軍馬軍都軍使累與晉軍接戰有功尋領河陽節度使張歸霸自太祖鎭宣武補劇職僖宗光啟二年與蔡賊秦宗權將張郅較勝為飛戈所中即抜馬却逸控弦一發賊洞頸而墜遂兼騎而還太祖時於高丘下瞰備見其狀靣加賞激厚以金帛及所獲馬錫之又常被命發伏兵掩殺千餘人奪馬數十匹尋奏授撿校左散騎常侍文德初與徐懐玉領兵大敗蔡賊太祖召至賞之曰昔耿弇不俟光武擊張歩言不以賊遺君父弇之功爾其二焉昭宗大順中與燕人戰於内黄殺劉仁恭兵三萬餘衆戎績超特居衆將之右累官至檢校右僕射光化二年權知邢州事明年春李嗣昭以蕃漢五萬來寇歸霸堅壁設備晉軍不敢顧其城遂移攻洺州陷焉時太祖在滑頗慮邢之失守及葛從周復洺水嗣昭北遁歸霸出兵襲之殺二萬餘衆捷至賞賜殊等旋以功奏加檢校司空光化初遷萊州刺史秩滿授左衛上將軍又除曹州刺史其秋加檢校司徒副劉知俊禦邠鳳之寇敗之太祖受禪拜右龍虎統軍改左騎衛上將軍充河陽諸軍都指揮使明年夏六月就除河陽節度使檢校太保尋加同平章事七月卒於位詔贈太尉張歸厚歸霸之弟也太祖署為軍校唐僖宗光啓三年夏蔡將張晊以數萬衆屯干赤堈歸厚常與晊單騎鬬于陣晊不能支而奔師徒乗此大捷太祖大悦立署為騎軍長仍以鞍馬器幣錫之昭宗龍紀初奏遷檢校工部尚書大順二年與葛從周禦晉軍於洹水殊績尤著詔加檢校右僕射其後討滄州復洺州咸以功聞太祖錄其勲命權知洺州事昭宗遷都雒陽除右神武統軍天祐二年改左羽林統軍與徐懐玉同守澤州拒退并軍乃還太祖受禪加檢校司徒開平二年夏劉知俊以同州叛歸厚副楊師厚劉鄩等討平之秋軍還授亳州團練使乾化元年拜鎭國軍節度使明年以疾卒詔贈太保張歸弁為太祖牙校唐昭宗乾寧中以偏師佐葛從周禦并軍于洹水光啓中又佐張存敬與燕人戰于内黄積前後功表授檢校工部尚書大順初為齊州刺史明年春青冦大舉來伐時州兵既寡罄發私帑賞給士伍青人遂遁青州平超加檢校右僕射遥領愛州刺史從征荆襄迴轉檢校左僕射天祐三年春太祖入魏誅牙軍歸弁攻討封境悉平而歸弁于高堂入賊太猛飛矢中于臆太祖嘉之命賜銀鞍勒馬一匹金帶一條夏五月命權知晉州冬十一月眞拜晉州刺史加檢校司空太祖受禪改滑州長劒指揮使開平二年秋九月并軍圍平陽詔歸弁統兵救之軍至解其圍加檢校司徒楊師厚為徐州節度使昭宗天祐元年加諸軍行營馬步都指揮使二年八月太祖討趙凝於襄陽命師厚統前軍一戰敗趙凝翌日表師厚為山南東道節度留後即令南荆州留後趙明亦并軍上峽不浹旬并下兩鎭乃正授襄州節度使開平元年加檢校太保平章事又加檢校太傅三年三月詔入朝詔兼潞州行營都招討使以奇兵進攻劉知俊于鳳翔降賊將王建制加師厚檢校太尉牛存節為太祖遏後都指揮使攻濮之役領軍先登遂抜其壘唐昭宗景福二年四月下徐州梟時溥存節力戰其功居多乾寧二年表授檢校工部尚書三年夏太祖東討鄆州十二月存節獨率伏軍奪其濠橋諸軍俱進四年正月陷其城尋與葛從周降下兖州加檢校右僕射天祐元年授邢州團練使時州兵纔及二百晉人知之以大軍來冦太祖在鄴存節率健壯出鬭并軍不能克而去太祖召至勞慰乆之厚賚金帛鞍馬加檢校司徒四年太祖受禪除右千牛衛上將軍其秋攻潞州以存節為行營馬步軍都排陣使開平二年二月自右監門衛上將軍轉右龍虎統軍駐留雒下是嵗王師敗于上黨晉人乗勝進迫澤州之城將陷河南留守張全義召存節謀遂以本軍及右龍武羽林等軍往應接上黨之師存節引衆銜枚夜至澤州分布守禦晉軍焚營而退郡以獲全太祖屢嘆賞之五月遷左龍虎統軍充六軍馬步都指揮使十月授絳州刺史三年四月除鄜州留後六月劉知俊以同州叛尋授同州留後未幾加檢校太保同州節度使乾化二年加檢校太傅進封開國公三年加同平章事詔赴闕末帝召見慰勉賞賜甚厚十一月加開府儀同三司食邑一千户授鄆州節度使四年加淮南西北面行營招討使控扼淮濆邊境安之其冬蔣殷反徐州逆命奉詔與劉鄩同討之殷棄甲而遁平徐州詔加太尉王檀自唐僖宗中和中太祖鎭大梁檀為小將文德元年二月討羅𢎞信敗魏人於内黄檀獲其將同儒邵神劍以歸補衡山都虞候昭宗大順元年從龎師古渡淮深入討孫儒之亂奮命擊賊未幾遷順義都將天復中從太祖率西鎭之師圍鳳翔以迎昭宗屢立戎效遷左踏白指揮使從攻王師範于青丘檀以偏師復密郡遂權知軍事充本州馬步軍都指揮使表授檢校右僕射守密州刺史郡接淮戎舊無壁壘乃築羅城居民頼之加檢校司空開平二年六月授邢州保義軍節度使檢校司徒三年加檢校太保充潞州東面行營招討使乾化元年正月王景仁與晉人戰于栢鄉王師敗績俄而晉軍大至重圍四合太祖憂之檀密上表請駕不征而悉力枝梧竟全城壘三月以功就加檢校太傅同平章事七月加開府儀同三司檢校太尉琅邪郡王命宣徽使趙殷衡齎詔慰諭賜絹千匹銀千兩賞守禦邢州之功也庶人犮珪僭位授鄧州宣化軍節度使檢校太尉兼侍中末帝即位移授許州節度加檢校太師五年蔡州刺史王彥溫作亂檀受詔討平之加兼中書令劉鄩以太祖開平元年授右衛上將軍充諸軍馬步都指揮使其年秋與諸將征潞州遷檢校司徒三年二月轉右威衛上將軍依前諸軍馬步都虞候五月改左龍武統軍充侍衛親軍兼馬步軍都指揮使其年夏同州劉知俊反引岐人襲據長安分兵扼河潼太祖幸陜命鄩西討即奪取潼關擒知俊弟知浣以獻遂引兵收復長安知俊棄郡奔鳳翔太祖以鄩為佑國軍兩使留後尋改佑國軍為永平軍以鄩為節度使檢校司徒行太安尹金州管内觀察使是時西鄙未寧鄩練兵馬撫衆獨當一面四年加檢校太保同平章事庶人友珪簒位加檢校太傅末帝即位尤深倚重明年夏詔鄩歸闕授開封尹遥領鎭南軍節度使九月徐州蔣殷叛鄩與鄆帥牛存節率兵攻擊破之梟殷首以獻詔加檢校太尉賀瓌唐昭宗天復中預平青州王師範以功授曹州刺史兼先鋒都指揮使加檢校司空天祐二年與楊師厚從太祖平荆襄授荆南兩使留後未幾徵還為行營左廂步軍都指揮使累遷左龍虎統軍未帝貞明元年慶州叛為李繼陟所據瓌以本官充西面行營馬步軍都指揮使與張筠江鳳之衆三萬下寧衍二州三年秋慶州平十二月瓌以功授滑州宣義軍節度使依前檢校太傅加同平章事唐懐英唐昭宗光化初太祖署為軍校天復元年冬太祖帥師迎昭宗于鳳翔時李茂貞遣大將符道昭領兵萬餘屯武功以拒太祖太祖命諸軍擊之以懐英為前鋒領衆先登一鼓而大破之翌日太祖方至顧左右曰邑名武功今首盪逆黨眞武功也乃召懐英大加奬激仍以駿馬珍器賜之二年八月岐軍屯奉天太祖令懐英寨於岐軍之東北岐軍不勝而退昭宗還京賜迎鑾毅勇功臣是嵗淮人寇徐州太祖命懐英馳騎以救之淮人遁去即以懐英為權知晉州刺史天祐三年冬佐劉知俊破邠鳳之衆五萬於美原收十五餘寨乗勝引軍攻下鄜州以功授陜州節度使太祖受禪加檢校太保徐懐玉唐僖宗中和末為太祖親從副將左長劒都虞候又從破蔡賊於板橋收秦宗權八寨奏加檢校右散騎常侍文德初同諸軍解河陽之圍復從破徐宿昭宗乾寧中奏加檢校刑部尚書又破朱瑾於金鄉南擒宋江以獻表授金紫光禄大夫檢校右僕射光化中授沂州刺史頃之王師範以青州叛屢出兵侵軼懐玉擊退之天復四年轉齊州防禦使加檢校司空天祐三年轉右龍虎統軍領六軍之士赴澤州晉人遂退開平元年授曹州刺史加檢校司徒明年除晉州刺史其秋晉人大至懐玉領兵破之於洪洞三年制授鄜坊節度使特進檢校太保練兵繕壁人頗安之加檢校太傅郭言為步軍都將唐僖宗光啓中太祖東伐徐鄆言出奇决戰所向皆捷太祖録其績以排陣斬斫之號委之尋表為宿州刺史檢校右僕射劉康乂為太祖元從都將唐僖宗中和中從太祖連年攻討徐鄆所向多捷尤善為營壘充諸軍壕寨使及太祖盡下三鎭議其功奏加檢校右僕射兼領軍衛劉捍為太祖親軍指揮使時太祖迎昭宗於岐下天復三年正旦宋文通令客將郭奇使於太祖命捍復命昭宗聞其至即詔見詢東兵之事仍以錦服銀鞍勒馬賜之翌日授光禄大夫檢校司空登州刺史昭宗還京改常州刺史賜號迎鑾毅勇功臣太祖受禪授左龍虎統軍兼元從親軍馬步都虞候及上黨纒兵以捍為禦營使蕃戎逼澤州命捍以兵千人赴之并軍遂遁車駕還京授捍侍衛親軍都指揮使晉人侵晉州從幸陜迴加檢校太尉氏叔琮為太祖後院馬軍都將時東伐徐鄆多歴年所叔琮身當矢石奮不顧命累遷為指揮使尋奏授宿州刺史檢校右僕射遷曹州刺史昭宗天福元年領大軍攻抜澤潞叔琮遂引兵北掠太原師還除晉州節度使明年太祖屯軍于岐下晉軍潛襲絳州前軍不利晉軍恃勝而攻臨汾叔琮嚴設備禦晉軍遂退據蒲縣時太祖遣朱友寧將數萬副應悉委叔琮節制叔琮因夜出潛師截其歸路遇晉軍逰騎盡殺之遂抜其壘太祖聞之喜謂左右曰殺蕃賊破太原非氏老不可叔琮乃長驅收汾州與晉人轉戰直抵并壘軍迴以其功奏加檢校司徒朱汝恭為汝州刺史檢校司空唐昭宗乾化初淮夷侵鄂渚武昌軍杜洪來乞師太祖遣友恭將兵應援俘斬萬計以功為潁州刺史加檢校司徒王重師僖宗文德中為太祖帳下都指揮使檢校右僕射枕戈擐甲五六年於齊魯間凡經百餘戰威震敵人尋檢校司空後知平盧軍留後加檢校司徒其後北伐幽滄鎭定屢與晉軍接戰頗得士心故多勝捷昭宗天祐中授雍州節度加同平章事黄文靖為諸軍指揮使從太祖南平巢蔡北定兖鄆皆有功唐昭宗光化初晉將李嗣昭周德威寇於山東文靖佐葛從周統大軍禦之尋以功表授檢校右僕射耀州刺史天祐二年春命佐楊師厚深入淮甸赴夀春侵廬江軍至大獨山遇淮夷殺五千餘衆振旅而還改蔡州刺史檢校司空胡規唐昭宗天祐四年為諸軍濠寨使太祖受禪除右羽林軍尋從劉鄩統兵收潼闗擒劉知浣獻之乃以為右龍虎統軍兼侍衛指揮使李讜為左德勝騎軍都將從太祖討蔡賊頗有軍功及東伐兖鄆以所部士伍俘獲甚衆改元從騎將表授檢校右僕射李重𦙍為太祖先鋒步軍都頭及太祖大舉伐蔡賊秦宗權俾重𦙍以滑兵為先鋒及東討徐州下豐蕭二邑轉右廂馬步軍指揮使范居實為感義都頭鄭州馬軍指揮使幽州劉仁恭舉衆冦魏郡居實與葛從周張存敬率兵救魏大破幽滄之衆於内黄太祖迎昭宗於岐下以居實為河中馬軍都指揮使及唐昭宗還京賜迎鑾毅勇功臣遥領錦州刺史又遷左龍驤馬軍都指揮使從征淮南迴改登州刺史轉右神勇軍使開平元年用兵於潞州命居實統軍以解澤州之圍授耀州刺史劉知俊唐昭宗大順中為開道指揮使從太祖討蔡賊秦宗權及攻徐州皆有功尋補徐州馬步軍都指揮使攻海州下之遂奏授刺史天復初歴典懐鄭二州從平青州以功奏授同州節度使天祐三年冬以兵五千破岐軍六萬於美原自是連克鄜延五州乃加檢校太傅平章事開平二年春三月命為潞州行營招討使知俊未至潞夾寨已陷晉人引軍方攻澤州聞知俊至乃退尋改西路招討使六月大破岐軍於幕谷俘斬千計李茂眞僅以身免三年五月加檢校太尉兼侍中封大彭郡王趙德諲唐僖宗光啓中太祖為蔡州四面行營都統表德諲為副仍領襄州節度使蔡州平以功累加官爵封淮安王册府元龜卷三百八十六
