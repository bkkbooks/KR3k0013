body:
  text: 册府元龜卷六百六十七宋王欽若等撰内臣部將兵監軍立功幹事將兵夫近侍之臣雖宣於命令統帥之任實寄於腹心當經畧之未靖惟材能之斯委觀其漢氏中微元魏多事逮兹唐室荐罹寇難㝢縣挺災金革不息乃有禀忠厚之性懐將領之材或付之禁衞之師或委之征伐之任或監示於方靣或扈從於乘輿或能震耀天威恢張師律克施拱極之效聿成靖亂之勲論而次之垂諸簡册俾後之觀者庶知前王之權畧矣後漢蹇碩為小黄門桓帝置西園八校尉以碩為上軍校尉又以碩壯健而有武畧特親任之以為元帥督司隸校尉以下雖大將軍亦領属焉後魏孫小為西臺中散太武幸𤓰步慮有北寇之虞乃加小左衞將軍除留臺軍將杞嶷為中常侍孝文時累遷殿中侍御尚書以統宿衞唐楊思朂𤣥宗時為右監門衞將軍開元初安南首領梅𤣥成叛自稱黒帝與林邑眞臘國通謀陷安南府詔思朂將討之十二年五溪首領覃行璋作亂思朂復受詔率兵討之十四年邕州賊帥梁大海擁賓横等數州反思朂又統兵討平之十六年隴州首領陳行範何遊魯馮憐等聚徒作亂詔思朂率永連道等州兵及淮南弩手十萬討之李輔國天寳末侍太子如朔方肅宗至徳初擢為太子家令判元帥行軍司馬專掌禁兵程元振為右監門衞將軍知内侍省事代宗寳應初代李輔國判元帥行軍司馬專制禁兵魚朝恩為品官給事黄門寳應初九節度討安慶緒於相州不立統帥以朝恩為觀軍容宣慰處置使觀軍容使名自朝恩始累加左監門衞大將軍自相州之敗史思明再陷河雒朝恩常統禁軍鎮陜以殿東夏廣徳初改為天下觀軍容宣慰處置等使竇文塲徳宗建中末與霍僊鳴從幸奉天左右禁旅委文塲僊鳴主之文塲累遷左監門衞大將軍知内侍省事監勾當左神策軍僊鳴累遷右監門衞將軍知内侍省事監勾當右神䇿軍貞元十二年六月特立䕶軍中尉兩員中䕶軍兩員以帥禁軍乃以文塲為左神䇿軍䕶軍中尉僊鳴為右神䇿軍中尉又以監左神威軍使内侍兼内謁者監張尚進為左神威軍中䕶軍監右神威軍使内侍兼内謁者監焦希望為右神威軍中䕶軍䕶軍中尉與中䕶軍古有其官自國朝未嘗置其員秩也帝以禁衞嚴宻又崇寵中貴故異其名而授文塲等第五守亮為開府内常侍貞元十四年霍僊鳴卒以守亮為右軍中尉楊志亷與孫榮義並為内給事貞元十七年以志亷為内常侍充左神䇿䕶軍中尉副使榮義為内常侍右神策䕶軍中尉副使二十年以志亷為特進左監門大將軍充左神䇿䕶軍中尉兼左街功徳使榮義為特進右武衞大將軍充右神䇿䕶軍中尉兼右街功徳使薛盈珍貞元末為内侍省内侍知省事充右神䇿軍䕶軍中尉副使憲宗元和初遷右神策軍䕶軍中尉兼右街功徳使吐突承璀為内常侍元和元年遷左監門衞將軍充左神策軍䕶軍中尉兼左街功徳使累遷左衞上將軍四年鎮州王承宗拒命詔承璀為左右神策河中河南浙宣歙等道行營兵馬使招討處置等使時諌官御史上䟽相属皆言自古無中貴人為兵馬綂帥者補闕獨孤郁叚平仲言尤激切憲宗不獲已乃改充鎮州巴東招撫處置等使出師經年無功乃宻遣人告王承宗令上疏待罪許以罷兵承宗表至朝廷罷兵承璀班師為禁兵中尉叚平仲抗䟽極論帝不獲已降為軍器使出為南監軍八年復為神䇿中尉第五國珍元和二年為右監門將軍知内侍省事充神策軍䕶軍中尉兼右街功徳使程文幹為内侍省監知省事元和五年遷右監門衞將軍知内侍省事充右神䇿䕶軍中尉兼左街功徳使彭獻忠為右武衞將軍知内侍省事元和七年充左衞神策䕶軍中尉兼右街功徳使梁守謙為内常侍元和十三年遷右監門衞大將軍右神䇿䕶軍中尉兼右街功徳使十五年十月涇州奏吐蕃大軍去州三十里下營命守謙充左右神䇿京西京北行營都監統神策兵四千人并發八鎮全軍赴涇州救援馬進潭元和末為左神䇿軍䕶軍中尉楊承和穆宗長慶初為右神策軍副使馬存亮長慶中為左神䇿軍䕶軍中尉劉𢎞規為鴻臚禮賓使敬宗即位以𢎞規為左神䇿䕶軍中尉魏𢎞簡為内弓箭庫使寳歴二年遷右神䇿軍䕶軍中尉王守澄知樞宻事文宗即位以守澄為驃騎大將軍充右神䇿軍中尉仇士良魚志𢎞太和末為左右軍中尉又云太和九年士良等因甘露事率禁兵殺宰相王涯等二十一家自是權歸於士良志𢎞至宣宗即位復誅其泰甚者而閽寺之勢仍握軍權之重焉楊欽義大中時為神䇿中尉楊𤣥寔僖宗乾符中為左神策軍中尉楊復光為黄門累監諸鎮征討乾符中賊帥黄巢犯江西以復光為排陣使時招討使宋威戰敗復光總其兵權中和中詔充天下兵馬都監押諸軍入定關輔田令孜自諸司小使監諸鎮用兵累遷左神策軍中尉僖宗幸蜀以令孜為觀軍容制置左右神䇿䕶駕十軍等使時自蜀中䕶駕令孜招募新軍五十四都都千人左右神策各二十七都分為五軍令孜總領其權王彥甫廣明中與田令孜為左右觀軍容使率禁軍從幸興元西門思恭中和中為觀軍容使楊復恭為樞宻使光啓二年代田令孜為右軍中尉專典禁軍劉景宣西門重遂昭宗大順二年為左右神䇿軍中尉駱全瓘景福二年代西門重遂為神䇿右軍中尉景尉脩宋道弼光化元年為左右軍中尉劉季述王仲先光化二年為兩軍中尉韓全誨張𢎞彥天復初為兩軍中尉監軍古稱兵者凶噐戰者危事盖不得已而用之也觀夫唐制始自肅宗叅用内臣典制軍政或蒞戎於征討或䕶兵於鎮守申嚴有翼則往無不濟愛克厥威則功或罔成雖委以腹心誠無外顧而貞其師律或爽嘉猷信利害之相兼否臧之不一也唐魚朝恩𤣥宗天寳末為品官給事黄門肅宗至徳中嘗令兼用軍事九節度討安慶緒於相州不立統帥以朝恩為觀軍容宣慰處置使觀軍容使自朝恩始也竇文塲王希遷皆為將軍徳宗興元元年以文塲兼神䇿軍左廂兵馬希遷兼神䇿軍右廂兵馬孟介貞元八年為宣武監軍王定逺貞元十一年為河東監軍節度使李自良卒行軍司馬李說授任先是定逺以間徳宗授說告命定逺以始謀為李說說深徳之自是河東軍政多出於監軍焉貞元十四年吳少誠拒命詔徵十七鎮之師討之時軍無統帥兵無多少皆以内官監之師之進退不由主將薛盈珍貞元中為鄭滑監軍吐突承璀為左衞上將軍知内侍省事憲宗元和六年出為淮南節度監軍使梁守謙為内常侍知樞宻元和十一年命守謙宣慰淮西諸軍因留監進討授以虗名告身五百通及金銀錢帛以勸死士王守澄元和中為徐州監軍崔潭峻元和末為荆南監軍楊承和為右神䇿副使穆宗長慶元年十二月以李光顔為陳許節度兼深州節度敕承和充深州諸道兵馬都監長慶二年官軍討伐鎮州率命中使參䕶其軍號為監陣多選勁騎自衞觀望勝則乘驛急聞以邀爵服敗則廹脅戎帥致其怗懼故以兩河之衆討數州之叛師老力屈終議赦之固因統馭非才亦由監陣擾之也叚文政為内常侍長慶二年鎮州兵亂賊圍深州以文政充都監領鄭滑河陽陳許三道兵赴深州應援馬存亮為左神策䕶軍中尉長慶四年以存亮為淮南監軍使楊叔元文宗太和中為山南西道監軍使李榮成太和四年興元軍亂節度使李絳被害命榮成充興元監軍使王守涓守澄弟也太和中為徐州監軍田令孜本姓陳懿宗咸通後自諸司小使監諸鎮用兵僖宗乾符中盗起關中諸軍誅盗以令孜為觀軍容等使後幸梁州永為西川監軍王建自為蜀帥仍舊監軍事楊𤣥价為内常侍咸通中為河南監軍楊復恭㓜入内侍省每監諸鎮兵龎勛之亂命復恭監陣有功自河陽監軍入為宣徽使楊復光為小黄門累監諸鎮征討乾符中王僊芝起曹濮詔遣齊克譲討之復光監其軍後僊芝陷荆襄以宋威為招撫使復光又監其軍宋威敗詔以荆南節度使王鐸代宋威復光監光武軍屯於鄧州中和初復光赴援京師㑹河中王重榮入屯武功朝廷初以觀軍容使西門思恭為天下兵馬都監軍時老疾不行詔令復光代之袁季貞為河中都監昭宗乾寧三年以季貞充邠寧四面行營兵馬都監押後唐張承業唐光啓中為内供奉武皇之討王行瑜承業累奉使渭北因留監武皇軍昭宗將幸太原以承業與武皇善乃除為河南監軍張居翰唐末為樞宻承㫖昭宗在華下起授内侍嘗出監幽州軍事立功功名之立君子之所尚也故載之令甲藏於盟府以垂乎不朽者焉乃有列職禁闥祗事帝右忠而能力勇且知方或應變矢謨克平於大憝或從行執銳屢摧乎勍敵或竭誠而濟難或悉力以盪寇用能立事當世流芳䇿書論而次之固亦以勸事君者之忠藎爾後漢鄭衆為内侍大將軍竇憲兄弟圗作不軌衆遂首謀誅之以功遷大長秋單超河南人徐璜下邳長城人貝瑗魏郡元城人左悺河南平隂人悺音工奐切又音館唐衡潁川郾人也桓帝初超璜瑗為中常侍悺衡為小黄門史初梁冀兩妹為順桓二帝皇后冀代父商為大將軍再世權戚威振天下冀自誅太尉李固杜喬等驕横益甚皇后乘勢忌恣多所鴆毒上下拑口周書曰賢智鉗口謂不言也拑與鉗古字通音其炎反皆莫有言者帝逼畏久常懐不平恐言泄不敢謀之延熹二年帝因如厠獨呼衡問左右與外舍不相得者有誰乎外舍謂皇后家也衡對曰單超左悺前詣河南尹不疑敬禮小簡不宜收其兄弟送雒陽獄二人詣門謝乃得解徐璜貝瑗嘗私忿疾外舍放横口不敢道於是帝呼超悺入室謂曰梁將軍兄弟專固國朝廹脅内外公卿以下從其風㫖今欲誅之於常侍意何如超等對曰誠國姦賊當誅日乆臣等弱劣未知聖意何如爾帝曰審然者常侍密圗之對曰圗之不難但恐陛下復中狐疑中音丁仲反帝曰姦臣脅國當伏其罪何疑乎於是更召璜瑗等五人遂定其意帝輒囓超臂出血為盟於是詔收冀及宗親黨與悉誅之趙忠少給事省中桓帝時為小黄門以與誅梁冀功封都鄉侯後魏孫小初内侍太武東宮以聰識有智畧轉西臺中散每從征伐屢有戰功仇雒大武時為給事黄門侍郎從征平凉以功超遷散騎常侍唐楊思勗中宗初從事内侍省預討李多祚功超拜銀青光禄大夫開元初為右監門將軍時安南首領梅𤣥成叛自稱黒帝與林邑真獵國通謀陷安南詔思勗將兵討之思勗至嶺表鳩募首領子弟兵馬十餘萬取伏波故道以進出其不意𤣥成遽聞兵至遑惑計無所出竟為官軍所擒臨陣斬之盡誅其黨與積屍為京觀而還十二年五谿首領覃行璋作亂思勗復受詔率兵募討之生擒行璋斬其黨三萬餘級以軍功累加輔國大將軍十四年邕州賊帥梁大海擁賓横等數州反叛思勗又統兵討平之生擒梁大海等三十餘人斬黨三萬餘級復積屍為京觀十六年瀧州首領陳行範何遊魯馮璘等聚衆作亂陷四十餘城行範自稱天子遊魯稱定國大將軍馮璘稱南越王割據嶺表詔思勗率永連道等兵及淮南弩手十萬人進討兵至瀧州臨陣擒遊魯馮璘斬之行範潜竄深州據雲際盤遼二洞思朂悉衆攻之生擒行範斬之斬其黨六萬級獲馬口金玉巨萬計魚朝恩為右監門衞將軍廣徳元年西蕃入犯京畿代宗幸陜時禁軍不集徵召離散北至華隂朝恩大軍遽至迎奉六師方振繇是深加寵異改為天下觀軍容宣慰處置使皇甫政徳宗時内臣也貞元中福建叛卒逐其觀察使吳詵既而福州兵四百餘人潰亡入海延至温台明州寇掠鄉閭頗為人患帝憂其滋長令政設策備之政乃令從事韋萬巡撫三州擇海浦形便起城栅修艦教弩選士豪者為統將以招討之萬有方畧數月之間擒獲頗衆餘悉降之自是瀕海皆寧萬及將吏各加官賜帛各有差楊復光咸通中樞宻使楊𤣥翼之猶子也乾符中為内侍王僊芝起曹濮詔遣齊克讓討之復光監其軍後僊芝陷荆襄以宋威為招撫使復光又監其軍宋威敗復光乃總其衆控扼於襄鄧之間僊芝敗乃移監許州中和初巢讓陷京師許州帥周岌稱臣二賊復光斬其偽使㑹許州秦宗權叛岌遂得衆三千人復說宗權赴難宗權遣其將王淑以兵八千從入至南陽淑遲留不進復光斬之併其衆分為八部則麗晏孔寵從韓建王建晉暉張造李師太是也簡一人未獲尋收鄧州復召徐州宋州壽州荆門等軍赴援京師皆從之衆踰二萬乃㑹河中王重榮入屯武功朝廷初以觀軍容使思恭為天下兵馬都監時老疾不行詔令復光代之既破巢讓朝廷方議其功以其年六月暴終馬存亮為左神䇿軍䕶軍中尉敬宗長慶四年四月丙申有賊犯右銀臺門入宮時帝在清思殿擊毬聞之驚出違難至左軍存亮匍匐出迎捧帝足嗚咽涕泣自負帝入軍既安堵存亮又令驍將康藝全率騎卒入宮討賊賊衆殱焉初帝始至軍憂太皇后之隔存亮復以二百騎迎二后至安於軍中丁酉帝還宮幹事内臣之職載於周官見於左氏秦漢而下乃有性質忠厚智識開敏或居出納之任或釐中外之務而能乃心王室恪居官次夙夜匪懈風雨不已提綱而衆目皆治投刄而盤根必解職修而事舉功成而名著易曰貞固足以幹事其斯之謂矣秦趙髙者諸趙疏逺属也趙髙昆弟數人皆生隱宮為宦者秦王聞髙強力通於獄法舉以為中軍府令髙即私事公子胡亥喻之决獄髙有大罪秦王令蒙毅法治之毅不敢阿法當髙罪死除其宦籍帝以髙之敦於事也赦之復其官爵漢石顯𢎞恭皆為中黄門以選為中尚書宣帝時皆任中書官明習法令故事善為請奏能稱其職侯淵以宦者有才辯任職元帝時佐石顯等領中書號曰大常侍後漢鄭衆字季産南陽人為人謹敏有心機位大長秋蔡倫有才學盡心敏慎為尚方令和帝永元九年監作秘劔及諸噐械莫不精工堅密為後世法曹騰為大長秋加位特進用事省闥三十年餘事四帝未嘗有過後魏仇雒齊中山人為給事黄門侍郎魏初禁網疏闊民户隱匿漏脱者多東州既平綾羅户樂葵因是請採漏户供為絲綿自從迯户占為紬蠒羅縠者非一於是雜營户師徧於天下不属守宰發賊輕易民多私附户口錯亂不可簡括雒齊奏議罷之属郡縣趙黑大武時以恭敬小心帝使進御膳出入承奉初無過幸又遷侍御典監藏後轉選部尚書能自謹厲當官任舉頗得其人孫小字茂翹咸陽人内侍東宮聰識有智畧累遷給事中領駕部課理有方畜牧蕃息出為并州刺史州内四郡百餘人詣闕頌其政化杞嶷為中常侍安西將軍中曹侍御尚書自總納言職當機近諸所奏議必致伉直孝文文明太后嘉之以為殿中侍御尚書領中曹如故王質髙陽人為鎮逺將軍瀛州刺史在州十年風化粗行察姦糾慝究其情狀民庶畏服之張祐為鎮南將軍尚書左僕射祐性恭宻出入機禁二十餘年未曽有過李堅初事文明太后稍遷給事中小心謹慎常在左右孝文遷雒轉被委授為太僕卿簡課牧産多有滋息白整者少掌宮掖碎職以恭敏著稱遷中常侍太和末為長秋卿成軌者孝文時為謁者僕射以謹厚稱時有奏發輒合帝心車駕南征專進御膳時帝不豫嘗居禁中晝夜無懈王遇宣武初兼將作大匠性巧強於部分北都方山靈泉道俗居宇及文明太后陵廟雒京東郊馬射壇殿修廣文昭太后墓園太極殿及東西兩堂内外諸門制度皆遇監作雖年在耆老朝夕不倦跨鞍驅馳與少壯者均其勞逸唐髙力士性謹宻能傳詔勑授宮闈丞開元初為右監門將軍知内侍省事𤣥宗嘗曰力士當上我寢則穏李輔國知書計事髙力士令掌閑廐中簿籍天寳中閑廐使王鉷嘉其畜牧之能薦入東宮焉吐突承璀幼以小黄門值東宮性敏慧有力幹後為神策中尉楊復光慷慨負節義有籌畧僖宗中和初為天下兵馬都監卒後唐張承業初為太原監軍莊宗在位太原事一委承業而積聚庾帑收兵市馬招懐流散勸課農桑咸盡力焉册府元龜卷六百六十七
