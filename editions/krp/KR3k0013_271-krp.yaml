body:
  text: 册府元龜卷二百七十一宋王欽若等撰宗室部武勇剛正武勇夫洸洸之述於周雅仡仡之著於秦誓皆武勇之謂也矧乃挺生公族夾輔王室而特資異禀雄材傑出或參預締搆功宣戎旅或遭罹否阨事以戡濟或揚威以克敵或奮怒以屏盜維城之重垣翰之寄於是乎在矣然而武者取其止戈勇者謂之達德矜能恃力古人所戒故曰天下有事用之於戰勝天下無事用之於禮義茍異於是雖有過人絶倫之藝搏熊扛鼎之力適足為亂亡之本可不愼乎漢淮南厲王長髙帝少子早失母嘗附吕后孝惠吕后時以故得幸無患然嘗心怨辟陽侯審食其不敢發及孝文即位三年入朝厲王有材力扛鼎乃往詣辟陽侯辟陽侯出見之即日褎金椎椎之謂以金椎蔵置褎中出而椎之命從者刑之直斷其首也馳詣闕下肉袒謝曰臣母不當坐趙時事辟陽侯力能得之吕后不爭罪一也趙王如意子母無罪吕后殺之辟陽侯不爭罪二也吕后王諸吕欲以危劉氏辟陽侯不爭罪三也臣謹為天下誅賊報母之仇伏闕下請罪帝傷其志為親故不治赦之江都易王非孝景之次子也孝景前二年立為汝南王吳楚反時非年十五有材氣上書自請擊吳景帝賜非將軍印擊吳吳已破徙王江都治故吳國治謂都之劉潭所居也以軍功賜天子旗元光中匈奴之入漢邊非上書願擊匈奴武帝不許非好氣力治宫館招四方豪傑廣陵厲王胥孝武次子也壯大好倡樂逸遊力扛鼎空手搏熊彘猛獸後漢陳王寵善弩射十發十中中平中黄巾賊起郡縣皆棄城走寵有強弩數千張出軍都亭國人素聞王善射不敢反叛故陳獨得完百姓歸之者衆十餘萬人魏任城威王彰太祖子也少善射御膂力過人手格猛獸不避險阻數從征伐志意慷慨太祖嘗抑之曰汝不念讀書慕聖道而好乘汗馬擊劔此一夫之用何足貴也課彰讀詩書彰謂左右曰丈夫一為衛霍將十萬騎馳沙漠驅戎狄立功建號耳何能作博士邪太祖嘗問諸子所好使各言其志彰曰好為將太祖曰為將奈何對曰披堅執銳臨難不顧為士卒先賞必行罰必信太祖大笑彰北征入涿郡界叛胡數千騎卒至時兵馬未集唯有步卒千人騎數百匹用田豫計固守要隙虜乃退散彰追之身自搏戰胡騎應弦而倒者前後相屬戰過半日彰鎧中數箭意氣益厲乘勝逐北至於桑乾桑乾縣屬代郡今北虜居之號索千都去代二百餘里長史諸將皆以為新涉逺士馬疲頓又受節度不得過代不可深進違令輕敵彰曰率師而行唯利所在何節度乎胡走未逺追之必破從令縱敵非良將也遂上馬令軍中後出者斬一日一夜與虜相及擊大破之斬首獲生以千數彰乃倍嘗科大賜將士將士無不喜悦時鮮卑大人軻比能將數萬騎觀望強弱見彰力戰所向皆破乃請服北方悉平太祖嘗在漢中而劉備栖於山頭使劉封下挑戰太祖罵曰賣履舍兒長使假子拒汝公乎待呼我黄鬚來令擊之乃召彰彰晨夜進道西到長安而太祖已還從漢中而歸彰黄鬚故以呼之靈壽亭侯眞嘗獵為虎所逐顧射之應聲而倒太祖壯其鷙勇使將虎豹騎討靈丘賊㧞之封靈壽亭侯晉長沙厲王乂武帝第六子開朗果斷才力過人吳昭義中郎將靜字幼臺堅之季弟堅始舉事静糾合鄉曲及宗室五六百人以為保障衆咸附焉䇿破劉繇定諸縣進攻會稽遣人請静静將家屬與䇿會于錢塘丞相大將軍都督中外諸軍事峻静之曽孫也少便弓馬精果膽决偏將軍領丹陽太守翊大帝弟也驍悍果烈有兄䇿風南齊豫章文獻王嶷太祖第二子有大成之量當桂陽王範之役太祖出頓新亭壘拔嶷為寧朔將軍領兵衛從範率士卒攻壘南嶷執白幡督戰屢摧却之及太祖在領軍府嶷居清溪宅蒼梧王夜中㣲行欲掩襲宅内嶷左右舞刀㦸於中庭蒼梧從牆間窺見以為有備乃去長沙威王晃太祖第四子也少有武力為太祖所愛昇明二年代兄映為寧朔將軍淮南宣城二郡太守初沈攸之事起晃便弓馬多從武客赫奕都街時人為之語曰煥煥蕭四繖世祖嘗幸鍾山晃從駕以馬矟刺道邊枯蘖上令左右數人引之銀纒皆卷聚而矟不出乃令晃復馳馬拔之應手便去每逺州獻駿馬帝輒令晃於華林中調試之魚復侯子響勇力絶人彎弓四斛力數在園池中帖騎馳走竹樹下身無虧傷曲江公遥欣為左將軍荆州刺史好勇聚畜武士以為荆援梁西昌侯藻武帝長兄懿之子天監初出為持節都督益寧三州諸軍事冠軍將軍益州刺史時天下草創邊徼未安州民焦僧䕶聚衆數萬據郫樊作亂藻年未弱冠集僚佐議欲自擊之或陳不可藻大怒斬于階側乃乘平肩輿廵行賊壘賊聚弓亂射矢下如雨從者舉楯禦箭又命除之繇是人心大安賊乃夜遁藻命騎追之斬首數千級遂平之進號信威將軍豫章王綜武帝第二子也有勇力手制奔馬廬陵王續武帝第五子也少英果膂力絶人馳射游獵應發命中帝嘗嘆曰此我之任城也嘗與臨賀王正德及胡貴通趙伯超等馳射帝大悦永安侯確邵陵王綸之次子也少驍勇有文才嘗在第中習騎射學兵法時人皆以為狂左右或以進諫確曰聽吾為國家破賊使汝知之除祕書丞太子中舍人鍾山之役礭苦戰所向披靡羣虜憚之確每臨陣對敵意氣詳贍帶甲據鞍自朝及夕馳驟往反不以為勞諸將服其壯勇河東王譽昭明太子之第二子也為湘州刺史幼而驍勇兼有膽氣能撫循士卒甚得衆心及被圍既乆雖内外斷絶而備守猶固綏建王大摯簡文之子也幼雄壯有膽氣及京師陷乃嘆曰大丈夫㑹當滅虜屬奶媪驚掩其口曰勿妄言禍將及大摯笑曰禍至此非繇此言後魏西河公敦平文帝曽孫道武初從征名冠諸將後征中山所向無前扶風公處眞烈帝之後也少以壯烈聞位殿中尚書吐京胡曹僕渾等叛招引朔方胡為援處眞與高凉王那等討滅之秦明王翰昭成帝次子少有高氣年十五便請征伐昭成壯之使領騎二千及長統兵號令嚴明多有尅捷翰子衛王儀少能舞劔騎射絶人道武幸賀蘭部侍從出入登國初從破諸部有戰功儀膂力過人弓力將十石陳留公矟大稱異時人云衛王弓桓王矟太武之初育也道武喜夜召儀入曰卿聞夜喚乃不怪懼乎儀曰怪則有之懼實無也儀弟隂平王烈剛武有智畧元紹之逆百僚莫敢有聲唯烈出詣紹詐與相附募執明元紹信之自延秋門出遂迎立明元烈弟觚勇烈有膽氣少與兄儀從道武侍衛左右使於慕容垂垂末年政在羣下遂止觚以求賂道武絶之觚率左右馳還衛王孫禎膽氣過人太武時從征蠕蠕忽遇賊别部多少不敵禎乃就山解鞍被馬以示有伏賊果疑而避之常山王遵昭成帝孫少而壯勇不拘小節道武初有佐命勲賜爵洛陽公慕容寶之敗也别率騎七百邀其歸路繇是有參合之捷陳留王䖍昭成帝孫也姿貎魁偉武力絶倫每以常矟細短大作之猶患其輕復綴鈴於刃下其弓力倍加常人以其殊異於世代京武庫嘗存而志之䖍嘗臨陣以矟刺人遂貫而髙舉又嘗以一手頓矟於地馳馬偽退敵人爭取引不能出䖍引弓射之一箭殺二三人搖矟之徒亡魂而散徐乃令人取矟而去每從征討常先登陷陣勇冠當時敵無衆寡莫抗其前者河陽王曜道武子武藝絶人與陽平王熈等並督諸軍講武衆服其勇陽平王他道武帝孫性謹厚武藝絶人從大武討胡白龍於河西屠其城别破餘黨斬首千級安康縣伯均長子忻之性麤武有氣力釋褐定州平北府中兵叅軍長壽子鸞以武藝著稱頻為北都大將常山王素子可悉陵年十七從大武獵遇一猛獸陵遂空手搏之以獻帝曰汝才力絶人當為國立功立事勿如此也即拜内行阿干又從平凉州沮渠茂䖍令一驍將與陵相擊兩槊皆折陵抽箭射之墜馬陵恐其救至未及拔劔以刀戾其頸使身首異處帝壯之即日拜都幢將永昌王徤明元帝次子姿貎魁壯大武襲蠕蠕越涿邪山詔徤殿後矢不虚發所中皆應弦而斃威震漠北徤子仁亦驍勇有父風大武竒之魏興王融字叔融貎甚短陋驍武過人莊帝謀殺爾朱榮以融為直閣將軍任城王雲子嵩為左中郎將從孝文南伐齊將陳顯達率衆拒戰嵩身備三仗免胄直前將士從之顯達潰斬獲萬計嵩於爾日勇冠三軍華山王鷙字孔雀文皇帝之後容貎魁壯腰帶十圍有武藝木訥少言北齊清河王岳神武從父弟初神武與四胡戰於韓陵神武將中軍髙昻將左軍岳將右軍中軍敗績賊乘之岳舉麾大呼横衝賊陣髙祖方得廻師表裏奮擊因大破賊上黨剛肅王渙神武第七子天姿雄傑俶儻不羣雖在童幼嘗以將畧自許神武壯而愛之曰此兒似我及長力能扛鼎材武絶倫元象中封平原郡公文襄之遇賊渙年尚幼在西學聞宫中讙驚曰大兄必遭難矣彎弓而出蘭陵武王長恭一名孝瓘文襄第四子累遷并州刺史突厥入晉陽長恭盡力擊之芒山之敗長恭為中軍率騎五百再入周軍遂至金墉之下被圍甚急城上人弗識長恭免胄示之面乃下弩手救之於是大捷武士共歌謡之為蘭陵王入陣曲是也後為太尉與段韶討栢谷又攻定陽韶病長恭總其衆前後以戰别封鉅鹿長樂樂平髙陽等郡公芒山之捷後主謂長恭曰入陣太深失利悔無所及對曰家事親切不覺其遂然帝嫌其稱家事遂忌之安德王延宗文襄第五子以平陽之役後主自禦之命延宗率右軍先戰城下擒周開府宗挺及大戰延宗以麾下再入周軍莫不披靡諸軍敗延宗猶全軍延宗容貎充壯坐則仰偃則㐲人笑之乃赫然奮發氣力絶異馳騁行陣勁挺若飛後禦周齊王於城北奮大矟往來督戰所向無前後周東平公神舉文帝族子膂力絶人彎弓數百斤能左右馳射莒莊公雒生少任俠尚武藝及壯有大度好施愛士北州賢俊皆與之遊而才能多出其下葛榮破鮮于仲禮乃以雒生為漁陽王領德皇帝餘衆時人呼為雒生王善撫將士帳下多驍勇至於陣戰莫有當其鋒者是以尅獲常冠諸軍爾朱榮定山東收諸豪傑遷晉陽雒生時在虜中榮雅聞其名心憚之為榮所害章武公遵少雄豪太祖愛之及入關遵嘗從征伐太祖討侯莫陳悦以遵為都督鎭原州及悦走故塞遵追斬之杞簡公連臨敵果毅隨德皇帝追賊定州戰殁齊王憲高祖第五子也武帝保定中憲為雍州牧及晉國公護東伐尉遲逈為前鋒圍雒陽憲與達奚武王雄等軍於邙山自餘諸軍各分守險要齊兵數萬人奄出軍後諸軍震駭並各退散唯憲與雄等率衆拒之而雄為齊人所敗三軍震慴憲親自督勵衆心乃安建徳五年大舉東伐憲為前鋒憲渡汾而西及帝於玉璧帝又令憲率兵六萬還援晉州憲遂進軍營於涑水齊主攻圍晉州晝夜不息間諜還者或云已陷憲乃遣柱國越王盛大將軍尉遲逈開府宇文神舉等輕騎一萬夜至晉州憲進據蒙坑為其後援知城未陷乃歸涑水㝷而髙祖東轅次於髙顯憲率所部先向晉州明日諸軍總集稍逼城下齊人亦大出兵陣於營南帝召憲馳往觀之憲返命曰易與耳請破而後食帝悦曰如汝所言吾無憂矣内史栁昻私謂憲曰賊亦不少王安得輕之憲曰憲受委前鋒情兼家國掃此逋冦事等摧枯商周之事公所知也賊雖衆其如我何既而諸軍俱進應時大潰其後齊王遁走憲輕騎追之既及永安髙祖續至齊人收其餘衆復據髙壁及雒女砦髙祖命憲攻雒女破之明日與大軍㑹於介休時齊主已奔鄴留其從兄安德王延宗據并州延宗因僭偽號帝圍其城憲攻其西面克之擒延宗以功封第二子質為河間王拜第三子賨一作貞為大將軍仍詔憲先驅趣鄴汝南郡公慶衛王直鎭山南引為左右慶善射有膽氣好格猛獸直甚壯之後從武帝攻河隂先登攀堞與賊短兵相接中石乃墜死而後蘇帝勞之曰卿勇可以賈人也復從武帝拔晉州齊兵大至慶與齊王憲輕騎覘卒為賊所窘憲挺身而出慶退據汾橋衆賊爭進慶射之所中人馬必倒賊乃稍却及拔髙壁尅并州下信都禽高湝功並居最隋蜀王秀髙祖子有膽氣多武勇甚為朝士所憚唐淮陽王道𤣥髙祖從父兄子也武德初從太宗擊宋金剛於介州先登陷陣時年十五太宗壯之賞物千段後討王世充頻戰皆捷竇建德至武牢太宗以輕騎誘賊令道𤣥率伏兵於道左會賊至追擊破之又從太宗轉戰於氾水麾戈陷陣直出賊後衆披靡復衝突而歸太宗大悦命副乘以給道𤣥又從太宗赴賊再入再出飛矢亂下箭如蝟毛猛氣益厲射人無不應弦而倒東都平拜雒州總管後為劉黒闥所擒太宗嘗從容謂侍臣曰道𤣥終始從朕深入賊陣所向必尅意嘗企慕所以每陣先登蓋學朕也惜其年少不遂逺圖因為之流涕贈左驍衛大將軍謚曰壯江夏王道宗道𤣥從父弟也武德初從太宗平竇建德破王世充屢有殊效五年授靈州總管梁師都據夏州遣弟洛仁引突厥兵數萬至於城下道宗閉門拒守伺隙而戰賊徒大敗髙祖聞而嘉之謂僕射裴寂中書令蕭瑀曰道宗今能守邊以寡制衆昔魏任城王彰臨戎却敵道宗勇敢有同於彼初突厥連於梁師都其都尉設入居五原舊地道宗逐出之振耀威武開拓疆界井地千餘里邊人悦服貞觀三年為大同道行軍總管遇李靖襲破頡利可汗頡利以十餘騎來奔其部道宗引兵逼之徴其執送頡利以數騎夜奔匿於荒谷沙鉢羅懼馳追獲之遣使送於京師吐谷渾冦邊詔右僕射李靖為崑丘道行軍大總管道宗與吏部尚書侯君集為之副賊聞兵至走入嶂山已行數千里諸將議欲息兵道宗固請追討李靖然之而君集不從道宗遂率邊師并行倍道去大軍十日追擊之賊據險苦戰道宗潛遣十餘騎踰山襲其後賊表裏受敵一時奔潰十四年大軍討髙麗令道宗與李勣為前鋒濟遼水尅蓋牟城逢賊兵大至軍中僉欲深溝保險待太宗至徐進道宗曰不可賊赴急逺來兵實疲頓恃衆輕我一戰必摧昔耿弇不以賊遺君父我既職在前軍當須清道以待輿駕李勣然之乃與壯士數十騎直衝賊陣左右出入勣同合擊大破之大宗既親討髙麗初遣營州都督張儉統輕騎先渡遼觀賊形勢儉懼敵不敢深入道宗固請將百騎覘賊太宗許之因問往還幾日對曰往十日返十日周覽十日總經一月望謁陛下遂秣馬束兵備歴險阻直發遼東城南山觀其地形險易安營置陣之所及還賊已引兵過長城斷其路道宗斬關而出如期謁見太宗嗟嘆曰賁育之勇何以過此賜金五十斤絹千匹梁郴王友裕太祖之長子也氣貎雄傑幼即明敏嘗從征伐破黄巢於陳又破賊於寃句後討蔡冦於溵水又戰於斤溝秦宗權來冦也領軍馬翼帝於府西板橋大勝之又從破張晊於封丘南破鄆之范縣寨擒都將尹萬榮敗魏卒於黎陽臨河後唐贈太保從璟明宗長子性忠勇沈厚摧堅陷陣人罕偕焉晉韓王暉髙祖從弟髙祖初為河東節度使張敬達之圍晉陽也髙祖署暉為突騎都將嘗引所部出敵之不意深入敵戰雖夷傷流血矢鏃貫骨而辭氣益勵髙祖壯之剛正夫有託景宸極維翰帝室奮立剛毅克揚威望非天資挺特内韞忠亮臨事有守居正不撓又曷能申疾風勁草之節彰烈火眞金之操啓發憤悱昭著茂烈者乎繇漢而還可以槩舉至有外屬彊熾怙寵干紀權臣跋扈放命肆虐而能激昻正説折挫驕勢嫉邪蹈險執義不廻乃至恪守官次靡受私請修明職事弗畏強禦惡無禮於君側折諸短於言下賦性質重未嘗笑謔斯亦各秉志向以樹英聲者耳漢朱虚侯章齊王肥子也髙后稱制立諸吕為三王擅權用事明年章入宿衛章年二十有氣力忿劉氏不得職嘗入侍宴飲髙后令章為酒吏章自請曰臣將種也請得以軍法行酒髙后曰可酒酣章進歌舞已而曰請為太后言耕田欲申諷諭也髙后兒子畜之比之於子笑曰顧乃父知田耳顧念也乃汝也汝父謂髙帝也若生而為王子安知田乎章曰臣知之太后曰試與我言田意章曰深耕穊種立苗欲疏穊稠也穊種者言多生子孫也疏立者四散置之令為藩輔也非其種者鋤而去之以斥諸吕也太后黙然頃之諸吕有一人醉亡酒避酒而逃章追拔劔斬之而還報曰有亡酒一人臣謹行軍法斬之太后左右大驚業已許其軍法亡以罪也因罷酒自是後諸吕憚章雖大臣皆依朱虚侯劉氏為彊魏任城王彰初治鄢陵塉薄使治中牟及文帝受禪因封為中牟王是後大駕幸許昌北州諸侯上下皆畏彰之剛嚴每過中牟不敢不速晉成都王穎為車騎將軍賈謐嘗與皇太子博爭道穎在坐厲聲呵謐曰皇太子國之儲君賈謐何得無禮謐懼繇此出頴為平北將軍鎭鄴嗣譙王恬為御史中丞値海西廢簡文帝登祚未解嚴大司馬桓温屯中堂吹警角恬奏劾温大不敬請科罪温視奏嘆曰此兒乃敢彈我眞可畏也恬忠直有幹局在朝憚之嗣譙王尚之為前將軍兄弟俱典兵後將軍元顯寵倖張法順每宴㑹坐起無别尚之入朝正色謂元顯曰張法順驅走小人有何才異而暴被㧞擢當今聖世不宜如此元顯黙然尚之又曰宗室雖多規諫者少王者尚納芻蕘之言况下官與使君骨肉不逺蒙眷累世何可坐視得失而不盡言因叱法順令下舉坐失色尚之言笑自若元顯深銜之後符下西府令出勇力二千人尚之不與曰西藩濵接荒餘冦虜無嘗兵止數千不足戍衞無復可分徹者元顯尤怒東安王繇性剛毅有威望後魏華山王鷙字孔雀為大司馬侍中鷙木訥少言性方厚每息直省闥雖暑月不解衣冠曽於侍中髙岳之席咸陽王坦恃力使酒衆皆下之坦謂鷙曰孔雀老武官何因得王鷙答曰斬反人元禧首是以得之衆皆失色鷙怡然如故禧坦之父也艾陵伯萇性剛毅雖有吉慶未嘗開口而笑孝文遷都萇以代尹畱鎭懷朔領大將因别賜萇酒雖拜飲而顔色不泰帝曰聞公一生不笑今方隔山河當為朕笑竟不可得美陽公暉業為特進中書監録尚書事齊文襄執政嘗問之曰比何所披覽對曰所㝷伊霍之傳不讀曹馬之書建中伯志字猛畧為雒陽令不避彊禦與御史中尉李彪爭路俱入見面陳得失彪言御史中尉避承華車蓋駐論道皷劍安有雒陽縣令與臣抗衡志言神鄉縣主普天之下誰不編户豈有俯同衆官趨避中尉孝文曰雒陽我之豐沛自應分路揚鑣自今以後可分路而行及出與彪折尺量道各取其半帝謂邢巒曰此兒竟可所謂王孫公子不鏤自彫巒曰露竹霜條故多勁節非鸞則鳯其在本枝也東平王字建扶性耿介有氣節宣武即位累遷給事黄門侍郎時茹皓始有寵百僚㣲憚之帝曽於山陵還詔建扶陪乘又命皓登車皓褰裳將上建扶諫帝推之令下皓恨建扶失色當時壯其忠謇後為度支尚書時宣帝委政於髙肇宗室傾憚唯建扶與肇抗衡先自造棺置於㕔事意欲輿棺詣闕論肇罪惡自殺切諌肇聞而惡之東河縣公順任城王澄之子起家為給事中時尚書令髙肇帝舅權重天下人士望塵拜伏順曽懷刺詣肇門門者以其年少答云在坐大有貴客不肯為通順叱之曰任城王兒可是賤也及見直往登床捧手抗禮王公先達莫不怪慴而順辭吐傲然若無所覩肇謂衆賔曰此兒豪氣尚爾况其父乎及出肇加敬送之為給事黄門侍郎時領軍元义威勢尤盛凡有遷授莫不造門謝謁順拜表而已曽不詣义义謂順曰卿何得聊不見我順正色曰天子富於春秋委政宗輔叔父宜以至公為心舉士報國如何賣恩責人私謝豈所望也至於朝論得失順嘗鯁言正議曽不阿㫖繇此見憚出除平北將軍常州刺史順謂乂曰北鎭紛紜方為國梗桑乾舊都根本所係請假都督為國捍屏义疑難不欲授以兵官謂順曰此朝廷之事非我所裁順曰叔父既握國柄殺生繇已自言天之歴數應在我躬何得復有朝廷也义彌忿憚之义既解領軍順累遷侍中初中山王熈起兵討元义不果而誅及靈太后反政乃得改葬順侍坐西遊園因奏太后曰臣昨往看中山家葬非惟宗親哀其寃酷行路士女見其一家七䘮皆為澘然莫不酸泣义妻時在太后側順指之曰陛下奈何以一妹之故不伏元义之罪使天下懷寃太后嘿然不語後營州城民就德興反使尚書盧同往討之大敗而返屬侍中穆紹與順侍坐因語同之罪同先有近宅借紹紹頗欲為言順勃然曰盧同終將無罪太后曰何得如侍中之言順曰同有好宅與要勢侍中豈慮罪也紹慚不敢復言後徐紇間順於靈太后出順為䕶國將軍太常卿順奉辭於西遊園紇侍側順指謂靈太后曰此人魏之宰嚭魏國不滅終不死亡紇脅肩而出順遂抗聲叱之曰爾刀筆小人正堪為机案之吏寧應忝執㦸虧我彛倫遂振衣而起靈太后黙而不言㝷除吏部尚書兼右僕射與城陽王徽同日拜職舍人鄭儼於止車門外先謁徽後拜順順怒曰卿是佞人當拜佞王我是直人不受曲拜儼深懷謝順曰卿是高門子弟而為北宫幸臣僕射李思沖尚與王雒誠同傳以此度之卿亦應繼其卷下見者為之震動而順安然自得時三公曹令史朱暉素事録尚書髙陽王雍雍欲以為廷尉評頻煩托順順不為用雍遂下命用之順投之於地雍聞大怒昧爽坐都㕔召尚書及丞郎畢集欲待順至於衆挫之順日高方至雍攘袂撫几而言曰身天子之子天子之叔天子之相四海之内尊親莫二元順何人以身成命投棄於地順鬚髯俱張仰面看屋憤氣奔涌長欷而不言乆之摇一白羽扇徐而謂雍曰髙祖遷宅中土創定九流官方清濁軌儀萬古而朱暉小子身為省吏何合為廷尉清官殿下既先皇同氣宜遵成㫖自有恒規而復踰之也雍曰身為丞相録尚書如何不得用一人為官曰庖人雖不治庖尸祝不得越樽俎而代之未聞有别㫖令殿下參選事順又厲聲曰殿下必如是順當依事奏聞雍遂笑而言曰豈可以朱暉小人便相忿恨遂起呼順入室與之極飲順之容貎不撓皆此類也北齊趙郡王叡累拜大尉監與馮翊王潤安徳王延宗及元文遥奏後主云和士開不宜仍居内任并入奏太后因出士開為兗州刺史太后曰士開舊經驅使欲畱過百日叡正色不許數日之内太后數以為言有中官要人知太后密㫖謂叡曰太后意既如此殿下何宜苦違叡曰吾國家事重死且不避若貪生茍全令國家擾攘非吾志也况受先皇遺㫖委寄不輕今嗣主幼冲豈可使邪臣反側不守之以正何面戴天遂重進言詞理懇切太后令酌酒賜叡叡正色曰今論國家大事非為巵酒言訖便出及明日入朝妻子咸諌止之叡曰自古忠臣皆不顧身今社稷事重吾當以死効之豈容令一婦人傾危宗廟且和士開何物豎子如此縱横吾寧死事先皇不忍見朝廷顚沛至殿門又有人曰願殿下勿入慮有危變叡曰吾上不負天死亦何恨入見太后太后復以為言叡執之彌固出至永巷遇兵被執送華林園於雀離佛院令劉桃枝拉而殺之樂安王勱性剛直有才幹甚為時人所重斛律明月雅敬之每有征伐則引之為副遷侍中尚書右僕射及後主為周師所敗勱奉太后歸鄴時宦官放縱儀同荀子溢尤稱寵幸勱將斬之以狥太后救之乃釋劉文殊竊謂勱曰子溢之徒言成禍福何得如此勱攘袂曰今者西冦日侵朝貴多叛繇此輩㺯權致使衣冠解體若得今日殺之明日受誅無所恨也文殊甚愧唐惠文太子範睿宗子𤣥宗時王毛仲等本起㣲賤皆崇貴傾於朝廷諸王每相見假立引待獨範見之色莊嗣吳王巘貞元中為宗正卿性介直每與人言論好面折其短册府元龜卷二百七十一
