body:
  text: 册府元龜卷九百六十八宋王欽若等撰外臣部朝貢第一周制九州之外謂之蕃國世壹見各以其所貴寶為贄蓋古之聖王文徳光被乃有占風望氣浮琛没羽而至者繇漢以來濟以威信命單車以通絶域置都䕶以總北道繇是魚龍雀馬之殊玩犀甲珠翠之名寶寶􅀈火毳之異品夷歌巴舞之竒技莫不充於内府而陳於外庭矣魏晉之後或朝或絶策書所記昭然可見若乃殊隣絶壤蹈徳詠仁祇奉國琛賔于宰旅先王所以賜異姓之國分伯叔之邦時庸展親謹其述職唯服食器用之是供也至於給耳目之華侈違生物之性習必斥之而不御却之而不受慮嗜好之無極懼徳志之或䘮美哉旅􅋙之篇召公之訓詳矣要荒之外覊縻不絶織皮崑崙大禹以之即叙越裳重譯姬文形於徳讓亦以其忽畧無常非上威服而來其貢物故肅慎之不貢楛矢亦嘗致詰焉夏后即位七年于夷來賔少康即位三年方夷來賔周武王克商西旅獻獒太保作旅獒以誡王自是通道九夷百蠻使各以其方賄來貢使無忘職業於是肅慎貢楛矢石弩長尺有咫后芒即位三年九夷來御周公居攝六年制禮作樂天下和平交阯之南有越裳國以三象重譯而獻白雉曰道路悠逺山川阻深音使不通故重譯而朝成王以歸周公公曰徳不加焉則君子不饗其質化不施焉則君子不臣其人吾何以獲此賜也其使請曰吾受命吾國之黄耉曰久矣天之無烈風雷雨意者中國有聖人乎則盍往朝之周公乃歸之於王稱先王之神致以薦於宗廟周徳既衰於是稍絶成王既伐東夷肅慎來朝宣王時追貊之國來貢故韓奕之詩曰獻其貔皮赤豹黄羆漢文帝元年使陸賈賜南粤王佗書賈至南粤佗恐乃頓首謝願奉眀詔長為藩臣奉職貢謹北面因使者獻白璧一雙翠鳥千犀角十紫貝五百桂蠧一器生翠四十雙孔雀二雙昧死再拜以聞皇帝陛下武帝始遣使至安息國其國因發使隨漢使者來觀漢地以大鳥卵及犂靬眩人獻於漢天子大說又帝令張騫使烏孫騫既致賜諭指曰烏孫能東居故地則漢遣公主為夫人結為昆弟共拒匈奴不足破也烏孫逺漢未知其大小又近匈奴服屬日久其大臣皆不欲徙昆莫年老國分不能專制乃發使送騫因獻馬數十匹報謝其使見漢人衆富後歸其國其國後乃益重漢元狩二年南越獻馴象能言鳥天漢元年正月匈奴歸漢使者使使來獻二年秋渠黎六國使使貢獻宣帝神爵二年匈奴握衍朐鞮單于立復脩和親遣弟伊酋若王勝之入漢獻見四年五月匈奴單于遣弟呼留若王勝之來朝甘露元年冬匈奴單于遣弟左賢王朝賀三年匈奴郅支單于亦遣使奉獻漢遇之甚厚四年匈奴呼韓邪郅支兩單于俱遣使朝獻漢待呼韓邪使有加成帝河平元年單于遣右臯林王伊邪莫演等奉獻朝正月平帝元始元年春正月越裳氏重譯獻白雉一黑雉二詔使三公以薦宗廟二年日南之黄支國來獻犀牛後漢光武初公孫述據益州夜郎大姓龍傅尹董氏保境為漢乃遣從畨禺江奉貢帝嘉之並加褒賞建武六年匈奴遣使來獻使中郎將報命八年十二月髙句麗王遣使奉貢十三年九月日南徼外蠻夷獻白雉兎十四年莎車國王賢與鄯善王安並遣使詣闕貢獻於是西域始通䓤嶺以東諸國皆屬賢是年匈奴遣使奉獻使中郎將報命十七年十二月莎車國遣使貢獻二十年韓人亷斯人蘇馬鞮等詣樂浪貢獻二十五年南匈奴單于復遣使詣闕奉藩稱臣獻國珍寶求使者監䕶遣侍子修舊約是嵗夫餘王遣使貢獻遼西烏桓大人郝且等九百二十二人率衆向化詣闕朝貢獻奴婢牛馬及弓虎豹貂皮三十年鮮卑大人於仇賁率衆人詣闕朝貢三十一年北匈奴遣使奉獻中元二年東夷倭奴國王遣使奉獻使人自稱大夫倭國之極南界也眀帝永平十七年西南夷哀牢儋耳僬僥槃木白狼動黏諸種前後慕義貢獻章帝元和元年正月日南徼外蠻夷究不事人邑蒙獻生犀白雉章和元年月氐國遣使獻扶㧞獅子和帝以章和二年二月即位十月安息國遣使獻獅子扶㧞永平元年北單于弟右温禺鞮王奉奏貢獻六年正月永昌徼外夷敦忍乙王莫延慕義遣使譯獻犀牛大象九年正月永昌徼外蠻及撣國王壅繇調遣重譯奏國珍寶十年十二月燒當羌豪迷唐等率種人詣闕貢獻十三年十一月安息國王滿屈遣使獻獅子及條枝大爵時謂之安息爵十六年十一月北匈奴遣使稱臣貢獻殤帝以元興元年十二月即位是月北匈奴遣使稱臣詣燉煌奉獻安帝永初元年三月永昌徼外僬僥夷貢獻内屬十月倭國王師升等遣使奉獻口百六十願請見三年正月髙句麗遣使貢獻元初二年正月蜀郡青衣道夷奉獻内屬永寧元年十二月永昌徼外遣使朝獻是月撣國王壅繇調復遣使者詣闕朝賀獻樂及幻人是嵗夫餘王遣子詣闕奉獻延光元年二月夫餘王遣使貢獻十二月九真徼外蠻夷貢獻内屬三年七月日南徼外蠻豪帥詣闕貢獻順帝永建二年三月疏勒國臣磐遣使奉獻六月西域長史班勇燉煌太守張朗討焉耆尉黎危須三國破之並遣子貢獻四年拘彌國遣使貢獻五年正月疏勒王侍子及大宛莎車王皆遣使貢獻六年二月于闐王遣侍子貢獻十二月日南徼外葉䕶國撣國遣使貢獻是月于闐王遣侍子詣闕貢獻陽嘉二年六月疏勒國獻獅子封牛漢安二年二月鄯善國遣使貢獻桓帝延熹二年天竺國來獻其國和帝時數遣使貢獻後西域反叛乃絶至是從日南至徼外來獻四年十月天竺國十二月夫餘王並遣使來獻九年九月大秦國王遣使奉獻漢世唯一通焉靈帝建寧九年燒當羌遣使貢獻熹平二年十二月日南徼外國重譯貢獻三年正月夫餘國遣使貢獻光和六年正月日南徼外國重譯貢獻獻帝建安七年于闐國獻馴象延康元年濊貊扶餘單于焉耆于闐王各遣使貢獻魏文帝黄初元年鮮卑歩度根遣使獻馬三年二月鄯善龜兹于闐王各遣使奉獻五年鮮卑歩度根詣闕貢獻厚加賞賜是後一心守邊不為宼害眀帝太和三年十二月大月氏王波調遣使奉貢五年四月鮮卑附義王軻比能率其種人及丁零大人兒禪詣幽州貢名馬青龍四年五月肅慎氏貢楛矢景初元年七月遣幽州刺史毌丘儉率衆軍討遼東右北平烏丸單于宼婁敦遣弟阿羅奬等詣闕朝貢二年六月倭女王遣大夫難升米等詣郡求謁天子朝獻太守劉夏遣使送詣京都三年二月西域重譯獻火浣布詔大將軍太尉臨試以示百寮齊王正始元年春東倭重譯納貢焉耆危須諸國弱水南鮮卑名王皆遣使來獻四年十二月倭國女王俾彌呼遣使大夫伊聲耆掖邪狗等八人上獻生口倭錦絳青縑緜衣帛布丹木􅽟短弓矢八年倭國女王壹與遣大夫掖邪狗等詣臺獻上男女生口三十人貢白珠五千枚青大句珠二枚異文雜錦二十匹陳留王景元二年七月樂浪外夷韓濊貊各率其屬來朝貢三年四月遼東郡言肅慎國遣使重譯入貢獻其國弓三十張長三尺五寸楛矢長一尺八寸石砮三百枚皮骨鐵雜鎧二十領貂皮四百枚吳孫權赤烏六年十二月扶南王范族遣使獻樂人及方物晉武帝泰始元年倭人國女王遣使重譯朝獻扶南國亦遣使朝貢二年十一月倭人來獻方物三年裨離國遣小部獻其方物康居國王那鼻遣使上封事并獻善馬四年扶南國遣使來獻林邑國王胡達上疏貢金盤椀及金鉦等物六年九月大宛獻汗血馬焉耆來貢方物咸寧元年六月鮮卑力微遣子來獻五年十二月肅慎來獻楛矢石砮太康元年辰韓王遣使獻方物是年東夷二十國朝獻二年三月東方辰韓等五國朝獻三年九月東夷二十九國歸化獻其方物五年十二月林邑大秦國各遣使來獻六年四月扶南等十國來獻七年扶南等二十一國馬韓等十一國使人來獻八年南夷扶南西域康居國各遣使來獻十年東夷絶逺三十餘國西南夷二十餘國各遣使來獻太熙元年東夷七國朝貢十年辰韓詣東夷校尉何龕上獻元帝大興二年八月肅慎獻楛矢石砮成帝時肅慎國遣使來獻肅慎有石砮皮骨之甲檀弓三尺五寸楛矢長尺有咫其國東北有山出石其利入鐵將取之必先祈神周武王時獻其楛矢石砮逮于周公輔成王復遣使入賀爾時千餘年雖秦漢之盛莫之致也及文帝作相魏景元末來貢楛矢石砮等文帝召歸于相府賜其王傉奚錦罽綿至武帝元康初復來貢獻元帝中興又詣江左貢其石砮咸康二年髙句驪遣使貢方物六年十月林邑獻馴象康帝建元元年髙句驪遣使朝獻後秦姚萇時二城故曹寅王達獻馬三千疋前凉張重華時龜兹國遣使貢方物南燕慕容盛長樂中髙句麗王安遣使貢方物北燕馮䟦時蠕蠕大檀遣使獻馬三千疋羊萬口宋髙祖永初二年林邑王范陽邁遣使貢獻少帝景平元年三月髙麗國遣使朝貢二年髙麗國遣使貢獻文帝元嘉五年天竺迦毘黎國王月愛遣使奉表獻金剛指環摩勒金環諸寶物赤白鸚鵡各一六年七月百濟王西河王河南國遣使獻方物七年倭國王訶羅陁國林邑國獅子國遣使獻方物是嵗訶羅單國遣使獻金剛指環赤鸚鵡鳥天竺國白㲲古貝葉婆國古貝等物其表語畧同佛經九年河南王西河王並遣使獻方物十年林邑王闍婆洲訶羅單國並遣使獻方物十一年林邑國扶南國訶羅單國並遣使獻方物十二年獅子國扶南國訶羅單國並遣使獻方物是年闍婆娑達國國王師黎婆達訶陀羅䟦摩遣使奉表曰宋國大主大吉天子足下教化一切種智安穏天人師降伏四魔咸等正覺轉尊法輪度脫衆生我雖在逺亦霑靈潤十三年髙麗國武都王遣使獻方物十四年河南王西河王訶羅單國並遣使獻方物十五年武都王河南國髙麗國倭國扶南國林邑國並遣使獻方物十六年武都王河南王林邑國髙麗國並遣使獻方物十七年武都王河南王百濟國遣使獻方物十八年肅特國髙麗蘇摩黎國林邑國並遣使獻方物是嵗斤陁利國王釋婆羅那遣長史竺留陀及多獻金銀寶器十九年婆皇國芮芮國並遣使獻方物二十年河西國髙麗國百濟國倭國並遣使獻方物二十六年婆皇國婆達國並遣使獻方物二十七年百濟國遣使獻方物二十八年婆皇國河南王髙麗國婆達國並遣使獻方物二十九年訶羅單國遣使獻方物孝武帝孝建二年槃槃國斤陀利國髙麗國婆皇國河南國遣使獻方物大眀二年河南王髙麗國林邑國並遣使獻方物三年婆皇國髙麗國並遣使獻方物肅慎國重譯獻楛矢石砮西域獻舞馬四年宕昌王倭國並遣使獻方物五年河南王遣使獻方物六年髙麗國遣使獻方物七年芮芮國百濟國並遣使獻方物八年婆皇國遣使貢獻眀帝泰始二年天竺迦毘黎國遣使貢獻泰豫元年林邑國遣使獻方物後廢帝元徽元年河南王婆黎王並遣使獻方物二年芮芮國遣使獻方物三年河南王髙麗國並遣使獻方物順帝昇眀元年倭國遣使獻方物二年倭國髙麗國芮芮國並遣使獻方物南齊太祖建元元年五月河南王吐谷渾拾寅迦羅國王荷知並遣使貢獻二年三月百濟王牟都遣使貢獻九月蠕蠕遣使朝貢三年十二月髙麗王樂浪公髙璉遣使貢獻武帝永眀二年八月扶南王僑陳如闍邪䟦摩奉啓曰天竺道人釋那伽仙從中國來此仰序陛下聖徳仁治詳議風化佛法興顯衆化殷集法事日盛王威嚴整朝望國範慈愍蒼生八方六合莫不歸伏如聽其所說則化隣諸天非可為喻臣聞之下情踊悅若蹔奉見尊足仰慕慈恩澤流小國天垂所載率土之民並得皆蒙恩祐是以臣今遣此道人釋那伽仙為使上表問訊奉貢微獻呈臣等赤心并别陳下情但所獻輕陋愧懼唯深伏願天慈曲炤鑒其丹欵賜不垂責今獻金鏤龍王坐像一