body:
  text: 册府元龜卷七百五十三宋王欽若等撰總錄部孝第三南齊崔懷愼清河東武城人父耶利魯郡太守宋文帝元嘉中没于魏懷愼與妻房氏篤愛聞父陷没即日遣妻布衣蔬食如居䘮禮耶利後仕魏中書戒懷愼不許如此懷愼從叔模為滎陽太守亦同没魏模子雖居處改節而不廢婚冠大明中懷愼宗人冀州刺史元孫北使魏問之曰崔耶利崔模竝力屈歸命二家子姪出處不同義將安在元孫曰王尊驅驥王陽廻車欲令忠孝竝知臣子兩節徐孝嗣字始昌東海郯人祖湛之父聿之竝為宋文帝所殺孝嗣在孕得免㓜而挺立風儀端簡八歳襲爵枝江縣公見孝武升陛流涕迄于就席帝甚愛之尚康樂公主張岱仕宋為司徒左西掾母年八十籍注未滿岱便去官徙貫還養有司以岱違制將欲糺舉宋孝武曰觀過可以知仁不須案也王寛仕宋明帝泰始初為隨郡太守値西方反父𤣥謨在都寛棄郡歸明帝加賞使隨張永討薛安都寛辭以母猶存在西為賊所執請得西行遂襲破隨郡斬偽太守劉師念救其母事平明帝嘉之使圖畵寛形王儉初仕宋為丹陽尹袁粲聞其名言之於明帝尚陽羡公主拜駙馬都尉帝以儉嫡母武康公主同太初巫蠱事不可以為婦姑欲開冡離葬儉因人自陳密以死請事始不行顧昌衍呉人居喪幾致滅性王儉言之帝曰昌衍既有至行且張永之甥宜居禮闈以光郎署乃以為尚書禮部郎劉善明仕宋為直閣將軍時青州没魏善明母移置桑乾善明布衣蔬食哀戚如持喪明帝每見為之歎息時人稱之轉寧朔將軍巴西梓潼二郡太守善明以母在虜中不願西行涕泣固請見許朝廷多哀善明心事後廢帝元徽初遣北使朝議令善明舉人善明舉州鄉北平田惠紹使虜贖得母還劉悛仕宋為散騎侍郎桂陽王之難加寧朔將軍助守石頭父勔於朱雀航戰死悛時疾病扶伏路次號哭求勔屍項後傷缺割髪補之持哭墓側冬月不衣絮太祖代勔為領軍素與勔善書警悛曰承至性毁瘵轉之危慮深以慘怛終哀全生先王明軌豈有去縑纊撤温席以此悲號得終其孝性耶當深顧徃㫖少自抑勉建平王景素反太祖總衆軍出頓𤣥武湖悛初免䘮太祖欲使領父軍召見悛兄弟皆羸削改貎於是乃止後轉持節都督司州諸軍事司州刺史將軍如故悛父勔討殷琰平壽陽無所犯害百姓徳之為立碑記悛歩道從壽陽之鎮過勔碑拜敬涕泣悛兄弟以勔死朱雀航終身不行此路東昏即位改授散騎常侍領驍騎將軍衛送山陵路經朱雀航感慟至曲阿而卒袁廓之父景擕宋世為淮南太守以非罪見誅廓之終身不聽音樂布衣蔬食足不出門示不臣於宋時人以比晉之王裒顏延之見其㓜時嘆曰有子如袁廓足矣齊國建方出仕稍至殿中郎王儉柳世隆傾心待之劉瓛有至性祖母病疽經年手持膏藥漬指為爛母孔氏甚嚴謂親戚曰阿彌便是今世曽子瓛小名也年四十餘未有婚對建元中太祖與司徒褚淵為瓛娶王氏穿壁挂履土落孔氏體上孔氏不恱瓛即出其妻居父喪不出廬足為之屈杖不能起位征北司徒記室江斆為中書郎斆庶祖母王氏老疾斆視膳嘗藥七十餘日不解衣及累居内官每以侍養陳請朝廷優其朝直齊臺建為吏部郎太祖即位斆以祖母久疾連年臺閣之職永廢温凊啟乞自解蕭惠基仕宋為長水校尉母憂去官太祖即位為征虜將軍衛尉惠基就軄少時累表陳解見許禇淵為右僕射衛尉如故淵以母年高羸疾晨昏須養固辭衞尉不許為中書令受顧命遭庶母郭氏喪有至性數日中毁頓不可復識朞年不盥櫛唯泣涙處乃見其本質焉詔斷哭禁弔客葬畢起為中軍將軍本官如故嫡母吴郡公主薨毁瘠如初𦵏畢詔攝軄固辭又以時及朞祭乞解職竝不許賈棲長淵之子淵世傳譜學魏人王泰寳買襲瑯邪譜以淵坐披求當極法棲長謝罪稽顙流血朝廷哀之免淵罪棲長位北中郎叅軍孫琰太原人居長沙事母孝母疾不眠食以差為期母哀之後有疾不使之知也杜棲為豫章王嶷西曹書佐以父京産年老歸養怡情壠畝肥白壯長及京産疾旬日間便皮骨自支京産亡水漿不入口七日晨夕不能哭不食鹽菜每營買祭奠身自㸔侍號泣不自持朔望節歳絶而復續吐血數升時何𦙍謝朏竝隱東山遺書敦譬誡以毁滅至祥禫暮夜見其父慟哭而絶顧歡母亡水漿不入口六七日廬于墓次遂隠遁不仕於剡天台山開館聚徒受業者嘗延百人歡早孤每讀詩至哀哀父母輙執書慟哭學者繇是廢蓼莪篇不復講位揚州主簿薛淵汾隂人父從安都為宋徐州刺史以彭城降魏親族皆入北太祖鎭淮隂淵遁來南委身自結武帝即位淵為左衛將軍初淵南奔母索氏不得自援改嫁長安楊氏淵私遣購贖梁州刺史崔慧景報淵云索在界首遣信拘引已得援難淵表求解職至界上迎之見許改授散騎嘗侍征虜將軍淵母南歸事竟無實永眀元年淵上表解職送貂蟬詔曰遠隔殊方聲問難審淵憂迫之深固辭朝列昔東關舊典猶通婚宦况母出有差音息時至依附前例不容申訴便可斷表速還章服淵以贖母既不得又表陳解職詔不許後魏使至帝為淵致與母書江泌濟陽考城人母亡後以生闕供養遇鮭不忍食劉靈哲嫡母崔氏及兄子景煥宋泰始中為魏所獲靈哲為布衣不聽樂及父懷珍卒當襲爵靈哲固辭以兄子在魏存亡未測無容越當茅土朝廷義之靈哲傾産贖嫡母及景煥累年不能得武帝哀之令北使者請之魏人送以還南襲懷珍封爵靈哲位兖州刺史蕭叡眀南蘭陵人少有至性奉親謹篤母疾躬禱夕不假寐及亡不勝哀而卒謝卄瀹為桂陽王友以母老須養出為安城内史後為侍中以晨昏有廢固辭不受武帝勅令速拜别停朝直張融為黄門郎太子中庶子司徒左長史融有孝義忌月三旬不聽樂事嫂甚謹王文殊呉興故鄣人父没于魏文殊思慕泣血蔬食山谷三十餘年太守謝卄瀹拔為功曹不就樂頥字文徳為京府叅軍父在郢州病亡頥忽思戀涕泣因請假還中路得父凶聞頥便徒跣號咷後遇啇人附載西土水漿不入口數日嘗遇病與母隔壁忍病不言嚙被至碎恐母之哀己也樂預頥弟也性孝父臨亡執其手以託郢州行事王奐預悲感悶絶吐血數升遂發病位丹陽尹朱謙之字處光呉郡錢塘人年數歳喪所生母謙之父昭之假葬田側為族人朱幼方燎火所焚同産姊密語之謙之雖小拔刄殺幼方詣獄自繫陸厥為後將軍始安王遙光反厥父閒被誅厥坐繫尚方尋有赦令厥恨父不及感慟而卒言不及赦令崔慰祖字悦宗父慶緒永明中為梁州刺史慰祖解褐奉朝請父喪不食鹽母曰汝既無兄弟又未有子毁不滅性正當少進肴羞耳如何絶鹽吾今亦不食矣慰祖不得已從之劉懷慰字彦泰父乗民冀州刺史懷慰初為桂陽王征北拔行叅軍乗民死於義嘉事難懷慰持喪不食鹽醤冬月不衣絮養孤弟妹寡叔母皆有惠義陸絳父閒為揚州别駕刺史始安王遙光反事敗閒以綱佐被召至杜姥宅尚書令徐孝嗣啟閒不預逆謀未及報徐世標令殺之絳時隨閒延頸乞代死遂并見殺陸慧暁舉秀才厯諸府行叅軍以母老還家侍養十餘年不仕劉渢南陽人事繼母有孝行弟溓事渢亦謹王秀之為太子舍人父卒為菴舍於墓下持喪張冲監青冀二州刺史事冲父初卒遺命祭我必以鄉土所産無用牲物冲在鎮四時還呉園中取菓菜流涕薦焉劉繪為長沙内史遭母喪去官有至性持喪墓下三年食麤糲劉懷裔晉陵無錫人與弟懷則年十歳遭父喪不絮帛不食鹽菜薛天生晉陵無錫人母遭艱菜食天生亦菜食母未免喪而死天生終身不食魚肉與弟有恩義公孫僧逺㑹稽剡人治父喪至孝事母及伯父謹節年榖饑貴僧遠省飡以供母華寶晉陵無錫人父戍長安寶年八歳父臨别謂寶曰湏我還當為汝上頭長安陷没寶年至二十不婚冠或問之者輙號慟彌日不忍答也何永廬江濳人也母王氏為父所害永與弟㸃以此無宦情宗測南陽人有高尚之志母喪身負土手植松栢臧榮緒東莞莒人祖奉先建陵令父庸民國中助教榮緒㓜孤躬自灌園以供祭祀母喪後乃著嫡寝論掃洒堂宇置筵席朔望輙拜席丼珍未嘗先食沈昭光者昭略之弟也昭略文季兄弟子也與文季同為東昏所害昭光聞收至家人勸逃去昭光不忍捨母遂見格殺中興元年贈昭略太常昭光廷尉剡縣小兒史失姓名年八歳與母俱得赤班病母死家人以小兒又惡不令其知小兒疑之問云母嘗數問我病昨來覺聲羸今不復聞何謂也因自投下牀匍匐至母尸側頓絶而死鄉隣告之縣令宗善才求表廬事竟不行庾曜父𢎞遠為江州長史坐與刺史陳顯達舉兵敗斬於朱雀航曜年四歳抱持乞代命遂并殺之沈麟士呉興武康人嘗為人作竹誤傷手便流涙求還同作者謂曰此不足損何至涕零答曰此本不痛但遺體毁傷感而悲耳王斯有業行居父憂過禮謝卄瀹欲遣叅之孔稚珪曰何暇叅此豈有全理以憂卒禇向年數歳父母相繼亡没毁若成人親表異之位北中郎廬陵王長史鮮于文宗漁陽人七歳喪父父以種芋時亡至明年芋時對芋嗚咽如此終身庾震字彦文新野人喪父母居貧無以葬賃書以營事至手掌穿然後葬事獲濟南陽劉虬因此為撰孝子傳毛惠素為少府卿性至孝母服除後更修母所住處牀帳屏幃每月朔十五日向帷悲泣傍人為之感傷終身如此陶季直五歳喪母哀若成人初母未病令於外染衣卒後家人始贖季直抱之號慟聞者莫不酸感位大中大夫梁傅昭父淡初仕宋竟陵王劉誕誕反坐誅昭六歳而孤哀毁如成人者宗黨咸異之殷鈞為臨州内史母憂去職居喪過禮昭明太子憂之手書誡諭曰知比諸德哀頓為過又所進殆無一溢甚以酸耿逈然一身宗奠是寄毁而滅性聖教所不許故宜㣲自遣割俯存禮制饘粥果蔬少加勉强憂懷既深指故有及并令繆道臻口具鈞答曰奉賜手令并繆道臻宣㫖伏讀感咽肝心塗地小人無情動不及禮但禀生尫劣假推年歳罪戾所鍾復加横疾頃者綿㣲守盡晷漏目亂𤣥黄心迷哀樂唯救危苦未能以遠理自制薑桂之資實聞前典不避梁肉復忝今慈臣亦何人降此憂愍謹當循復聖言思自補續如脱申延實繇亭造服闋遷五兵尚書猶以頓瘵經時不堪拜受陸襄父閒初為齊始安王遙光揚州治中永元末遙光據東府作亂或勸閒去之閒曰吾為人吏何所逃死臺軍攻陷城閒見執將刑第二子絳求代死不獲遂以身蔽刃刑者俱害之襄痛父兄之酷喪過于禮服釋後猶若居憂終身蔬食布衣不聽音樂口不言殺害五十許年為揚州治中以父終此官固辭軄高祖不許聽與府司馬換廨居之蔡撙仕齊為給事黄門侍郎丁母憂廬于墓側齊末多難服闋因居墓所任昉仕齊為廣陵王記室叅軍以父喪去官泣血三年杖而後起齊武帝謂昉伯父遐曰聞昉哀瘠過禮使人憂之非直亡卿之寳亦時才可惜宜深相全譬遐使進飲食當時勉勵迴即嘔血昉父遙本性重檳榔以為常餌臨終嘗求之剖百許箇不得好者昉亦所嗜好深以為恨遂終身不嘗檳榔遭繼母憂昉先以毁瘠每一慟絶良久乃蘇因廬於墓側以終喪禮昉素强壯腰帶甚充服闋不可復識沈約仕齊為通直散騎常侍永元二年以母老表求解職改授冠軍將軍司徒左長史約子旋為司徒右長史免約喪為太子僕射復以母憂去官因蔬食辟榖服除猶絶粳粱孔休源字慶緒父珮為齊廬陵王記室叅軍早卒休源年十一而孤居䘮過禮見父手所冩書必哀慟流涕不能自勝見者莫不為之垂涙韋愛遭母憂廬於墓側負土起墳高祖臨雍州聞之親徃臨弔柳忱字文若惔第五弟也數嵗父世隆及母閻氏時寢疾忱不解帶經年及喪以毁聞位光祿大夫江蒨為廬陵王主簿居父憂以孝聞廬于墓側陶子鏘字海育丹陽秣陵人母終居喪盡禮與范雲鄰雲每聞其哭聲必動容改色欲相申薦㑹雲卒初子鏘母嗜􅐜母没後嘗以供奠高祖義師初至此年冬營􅐜不得子鏘痛恨慟哭而絶久之乃蘇遂長斷􅐜味鄭紹叔為冠軍將軍少失父事母及祖母以孝聞為衛尉卿以母憂去軄紹叔有至性高祖嘗使人節其哭柳慶遠為征虜將軍母憂去職以本官起之固辭不拜馬仙琕少以果敢聞遭父憂毁瘠過禮負土成墳手植松栢鄧元起為益州刺史在州二年以母老乞歸供養詔許焉徴為右衞將軍楊公則字君翼父仲懷宋泰始初為豫州刺史殷琰將叛輔國將軍劉勔討琰仲懷力戰死於横塘公則隨父在軍年未弱冠冒陣抱屍號哭氣絶良久勔命還仲懷首公則殮畢徒歩負喪歸鄉里繇此著名袁昻字千里五歳時父顗仕齊為雍州刺史以叛誅死藏其首於武庫十年始還昻號哭嘔血絶而復蘇從兄彖嘗撫視抑譬昻更制服廬于墓次後與彖同見從叔司徒粲粲謂彖曰昻幼孤而能至此故知名器自有所在後為武陵王長史丁内憂哀毁過禮庾道愍潁川鄢陵人晉司空氷之𤣥孫有孝行頗能屬文少出孤悴時人莫知其所在生母流漂交州道愍尚在襁褓及長知之求為廣州綏寜府佐至南而去交州尚遠乃自負擔冒嶮僅得自逹及至交州尋求母經年日夜悲泣嘗入村日暮雨驟及寄止一家旦有一嫗負薪外還而道愍心動因訪之乃其母也於是行伏號泣遠近赴之莫不揮淚朱文濟字敬達呉興人自賣以葬母太守謝卄瀹命為儒林不就張稷字公喬稷所生母劉氏遘疾歷時稷年始十一夜不解衣而養父永異之及母亡毁瘠過人杖而後起頻居父母憂六載廬于墓側初劉氏假葬瑯琊黄山後改申葬禮賻助委積於時雖不拒絶事畢隨以還之自幼及長數十年中常設劉氏神座出告反靣如事生焉韓懷明十五喪父幾至滅性負土成墳贈助無所受免喪與鄉人郭麻香俱師事南陽劉虬虬常一日廢讀獨居涕泣懷明竊問其故虬家人答云是外祖亡日時虬母亦亡矣懷明聞之即日棄學還家就養虬歎曰韓生無吾之恨矣家貧嘗肆力以供甘肥嬉怡膝下朝夕不離母側王志年九歳居所生母憂哀容毁瘠為中表所異位金紫光祿大夫王份為黄門侍郎以父終於此職固辭不拜遷秘書監王銓有孝行母病而銓形貌瘦瘠人不復識及居喪哭泣無常因得氣疾位丹陽尹王僉八歳丁父憂哀毁過禮服闋召補國子生除威戎將軍始興内史丁所生母憂固辭不拜王訓年十三父暕亡憂毁家人莫之識王瞻年十二居父憂以孝聞服闋襲封東亭侯夏侯亶為南郡太守父憂解職居喪盡禮廬于墓側顧恊自丁母艱憂遂終身布衣蔬食位鴻臚卿范岫字懋賓早孤事母以孝聞自親喪之後蔬食布衣以終身王筠為太子家令以母憂去職筠有孝性毁瘠過禮服闋後疾廢久之王僧孺好學家貧嘗傭書以養母幼時其母鬻紗布以自業嘗擕僧孺至市道遇中丞鹵簿驅迫溝中及僧孺為中丞拜日引騶清道悲感不自勝張緬父張策任衞尉卿為賊所害緬痛父之酷喪過于禮高祖遣戒喻之後為淮南武陵王郡太守母劉氏以父没家貧喪禮有闕遂終不居正室不隨子入官府緬在郡所得祿俸不敢用乃至妻子易衣裳及還都竝供其母賑贍親屬雖累載所蓄一朝隨盡緬私室常門然如貧素者江柔之為尚書倉部郎有孝行以母憂毁卒子革年十六喪母亦以孝聞革子從簡厯官司徒從事中郎侯景亂為任約所害子兼叩頭流血乞代父命以身蔽刃遂俱見殺天下莫不痛恨之江子一字元貞少好學有志操以家貧闕養因蔬食終身位南津校尉王規字威明八歳以丁所生母憂居喪有至性太尉徐孝嗣每見必為之流涕稱曰孝童禇向字景政年數歳父母相繼亡没向哀毁若成人者親表咸異之禇球為建康令母憂去職以本官起之固辭不拜禇翔為吏部尚書侯景圍臺城翔於圍内居母憂以哀毁卒劉覽字孝智十六通老易厯官中書郎以所生母憂廬于墓再朞口不嘗鹽酪冬止着單布家人慮其不勝喪中夜竊寘炭於牀下覽因煖氣得睡既覺知之號慟嘔血高祖聞其有至性數遣省視劉孺年十四居父喪毁瘠骨立宗黨咸異之為吏部尚書以母憂去職居喪未朞以毁卒時年十九謚曰孝子臧盾有孝性母亡服制未終父又卒盾居喪五年不出廬户形骸枯悴家人不復識服闋為太尉長史丁所生母憂三年廬于墓側張嵊父臨青州為土民所害嵊感家禍終身蔬食布衣手不執刀刃范雲起家郢州西曹書佐轉法曹行叅軍俄而沈攸之舉兵圍郢城父抗時為府長流入城固守留家屬居外雲為軍人所得攸之召與語聲色甚厲雲容貌不變徐自陳説攸之乃笑曰卿定可兒且出就舍明旦又召令送書入城内或欲誅之雲曰老母弱弟懸命沈氏若其違命禍必及親今日就戮甘心如薺長史柳世隆素與雲善乃免之庾黔婁父亡持喪過禮和帝即位將起之鎮軍蕭穎胄手書敦譬黔婁固辭劉曇淨解褐安城王國佐嘗侍父卒於郡曇淨奔䘮不食飲者累日絶而又蘇每哭輒嘔血服闋因毁瘠成疾㑹有詔士姓各舉四科曇淨叔父慧斐舉以應孝行高祖用為海寧令曇淨以兄未為縣因以讓兄乃除安西行叅軍父亡後事母尤敦至身營飱粥不以委人母疾衣不解帶及母亡水漿不入口者殆一旬母喪權瘞藥王寺時天寒曇淨身衣單布廬于瘞所晝夜哭泣不絶聲哀感行路未及朞而卒謝藺字希如年五歳每父母未飰乳媪欲令藺先飰藺曰兒不覺飢强食終不進舅阮孝緒聞之歎曰此兒在家則曾子之流事君則藺生之匹因名之曰藺丁父憂晝夜號慟毁瘠骨立母阮氏嘗自守視譬抑之泰清元年遷散騎侍郎兼散騎嘗侍使於魏㑹侯景舉地入附境土交兵藺母慮不得還感病卒及藺還入境爾夕夣不祥旦便投劾馳歸既至號慟嘔血氣絶久之水漿不入口親友慮其不全相對悲慟强勸以飲粥藺初勉强受之終不能進經月餘日因夜臥而卒時年三十八禇修性至孝父喪毁瘠過禮因患冷疾及丁母憂水漿不入口二十三日氣絶復蘇每號慟輒嘔血遂以毁卒江紑父卒廬于墓終日號慟不絶聲月餘嚴植之性淳孝謹厚不以所長高人少遭父憂因菜食二十三載後得風冷疾乃止滕曇恭母卒水漿不入口者旬日感慟嘔血絶而復蘇隆冬不着繭絮蔬食終身每至忌日思慕不自堪晝夜哀慟甄恬㓜歳喪父哀戚有若成人家人矜其小以肉汁和飰飲之恬不肯劉惠鏡父元真為淮南太守居郡得罪惠鏡厯詣朝士乞哀懇惻甚至遂以孝聞庾沙彌父佩玉輔國長史長沙内史宋昇明中坐沈攸之事誅沙彌時始生年至五歳所生母為製衣輙不肯服母問其故流涕對曰家門酷禍用是何為既長終身布衣蔬食嫡母劉氏寢疾沙彌晨夕侍側衣不解帶或應鍼灸輒以身先試之及母亡水漿不入口終喪不解衰絰族兄都官尚書詠表言其狀應純孝之舉高祖召見嘉之以補歙令沈崇傃字思整父懷明宋兖州刺史崇傃六歳丁父憂傭書以養母焉天監初為前軍鄱陽王叅軍事三年太守柳惲辟為主簿崇傃從惲到郡還迎其母母卒崇傃以不及侍疾將欲致死水漿不入口晝夜號哭旬日殆將絶氣兄弟謂之曰殯葬未申遽自毁滅非全孝之道也家貧無以遷窆乃行乞經年始獲葬焉既而廬于墓側自以初行喪禮不備復以葬後更治服三年久食麥屑不噉鹽酢坐卧於單薦因虚腫不能起郡縣舉其至孝詔書擢拜太子洗馬崇傃奉詔釋服而涕泣如居喪固辭而受官苦自陳讓經年乃得為永寧令自以祿不及養悼恨愈甚哀思不自堪至縣卒年三十九荀匠父法超齊中興末為安復令卒於官凶聞至匠號慟氣絶身體皆冷至夜乃蘇既而奔喪每宿江渚商旅皆不忍聞其哭聲服未闋兄斐起家為鬰林太守征狸賊為流矢所中死於陣喪還匠迎于豫章望舟投水傍人馳救僅而得全既至家貧不得時葬居父憂并兄服厯四年不出廬戸自括髪後不復櫛沐髪皆禿落哭無時聲盡則係之以泣目皆皆爛形體枯悴皮骨裁連雖家人不復識竟以毁卒吉翂字彥膚世居襄陽翂幼有孝性年十一遭所生母憂水漿不入口殆將滅性親黨異之天監初父為呉興原鄉令為姦吏所誣逮詣廷尉翂年十五號泣衢路祈請公卿行人見者皆為隕涕其父理雖清白恥為吏訊乃虛自引咎罪當大辟翂乃撾登聞皷乞代父命高祖異之勑廷尉蔡法度曰幼童未必自能造意卿可取其欵實翂詞不移其初見獄掾依法備加桎梏法度矜之命脫其械更令著一小者翂弗聽曰翂求代父死死罪之囚唯宜増益豈可減乎竟不脱械法度具以奏聞高祖乃宥其父沈顗内行甚修事母兄弟孝友為鄉里所稱慕劉香十三丁父憂每哭哀感行路自居母憂便長斷腥膻持齊蔬食劉敦嘗欲避人世以母老不忍違離每隨兄霽香之官沈續父瑀於路為人所殺續布衣蔬食終其身裴子野生而偏孤為祖母所養年九歳祖母亡泣血哀動家人賀革為貞威將軍南平太守革性至孝嘗恨祿不及養在荆州厯為郡縣所得俸秩不及妻孥專擬還鄉造寺以申感思何㸃字子晢父鑠坐法死㸃年十一幾至滅性㸃弟名𦙍字子平年八嵗居憂哀毁若成人謝幾卿父超宗坐事徙越州路出新亭渚幾卿不忍辭訣遂投赴江流左右馳救得不沉溺及居父憂哀毁過禮臧嚴字彥威幼有孝性居父憂以毁聞裴之禮居母憂唯食麥飯庾蓽字休野年十歳遭父憂居喪毁瘠為州黨所稱劉訐字彦度幼稱純孝數歳父母繼卒訐居喪哭泣孺慕幾至滅性赴弔者莫不傷焉為伯父所養事伯母及昆弟孝友篤至為宗族所稱自傷早孤人有誤觸其諱者未常不感結流涕范元琰父靈瑜居父憂以毁卒元琰時童孺哀慕盡禮親黨咸異之劉苞字孝嘗四歳而父終及年六七歳見諸父嘗泣時世叔父悛繪等竝顯貴苞母謂其畏憚怒之苞對曰早孤不及有識聞諸父多相似故心中歎悲無有他意因而歔欷母亦慟甚初苞父母及兩兄相繼亡没悉瘞焉苞年十六始移墓所經營改葬不資諸父未幾而皆畢繪嘗歎服之少好學能屬文起為司徒法曹行叅軍不就蕭子範為司徒主簿丁所生母憂去軄子範有孝性居喪以毁聞袁樞起家為秘書郎厯太子舍人侯景之亂樞徃呉郡省父因丁父憂時四方擾亂人求茍免樞居喪以至孝聞袁君正少聰敏年數歳父疾晝夜不眠專侍左右家人勸令暫卧答曰官既未差眠亦不安何匡𦙍為侍御史以父疾陳觧匡𦙍侍疾經旬身不解帶頭不櫛沐信宿之間形貌頓改及父卒號慟不絶聲枕苫藉地腰脚虛腫醫云須服猪蹄湯何以有肉味不肯服親友請譬終於不回遂以毁卒劉鬷幼為外祖臧質所鞠養質既冨盛嘗有音樂後母没十許年鬷每聞絲竹之聲未嘗不歔欷流涕終於晉安内史馮道根少孤家貧傭賃以養母行得甘肥未嘗先食必遽還以遺母年十三以孝聞庾子輿為梁州主簿時父在梁州遇疾子輿奔侍醫藥言涙常并長沙宣武王省疾見之顧曰庾錄事雖危殆可憂更在子輿尋丁母憂哀至輙嘔血父戒以滅性仍禁其哭泣李孝緒為東莞太守丁母憂去職廬于墓側每慟嘔血數升劉景昕事母孝謹母嘗病癖三十餘年一朝而瘳鄉里以為景昕誠感何修之有至性父母亡後嘗設一屋一易晦朔拜伏流涕如此者三十餘年當世服其孝行劉善明以母陷于魏累為州郡頗黷財賄崔祖思怪而問之答曰管子云鮑叔知我因流涕曰方寸亂矣豈暇為亷所得金錢皆以贖母及母至清節方峻所厯之軄亷簡不煩俸祿皆散之親友賀琛㑹稽山隂人少精三禮郡補功曹史琛辭以母老終於固執俄遭母憂廬于墓服闋猶未還舍生徒復從之琛哀毁積年骨立而已未堪講授諸生營投稍稍集業到溉遭母憂居喪盡禮所處廬開方四尺毁瘠過人服闋猶蔬食布衣者累載冊府元龜卷七百五十三
