body:
  text: 册府元龜卷六百五十三宋王欽若等撰奉使部稱㫖仲尼曰使於四方不辱君命可謂士矣蓋夫有專對之才加之以敏應機罔滯遇事立斷足以成務始可與權然後出疆則有華復命則有勞斯古人以為使乎之難者矣至于馳一介之行李合二國之懽心俾隣境益恭獷俗向化得紓難之畧啟和戎之利乃有奉將清詔循行庶邦宣慰有方便宜從事廵察風俗舉劾貪猾以應對而知賞繇懐輯而見稱以至䟦扈之人能令其順命疑貳之俗終俾其歸心斯皆使者之任也是故明君之使臣也以事而不制以辭故能俾其成命而獲考者也漢隨何為謁者時漢王與楚大戰彭城不利謂左右曰彼等皆無足與計天下事者何進曰不審陛下所謂漢王曰孰能為我使淮南使之發兵向楚淮南英布也我之取天下可以萬全何曰臣請為使之乃與二十人俱至淮南布間行與何俱歸漢陸賈初以客從髙祖時尉佗平南越因王之髙祖使賈賜佗印為南越王佗大說稱臣奉漢約歸報髙帝大說文帝即位欲使人之南越丞相陳平乃言賈徃使尉佗去黄屋稱制黄屋謂車上之蓋也黄屋及稱制皆天子之儀故令去之者今比諸侯皆如意指嚴助為中大夫時閩越圍東甌告急武帝曰吾新即位不欲出虎符發兵郡國廼遣助以節發兵㑹稽㑹稽守欲距法不為發以法距為無符驗也助廼斬一司馬諭意指以天子意指曉告之遂發兵浮海救東甌未至閩越引兵罷終軍為謁者使行郡國所見便冝以聞還奏事帝甚悦司馬相如字長卿武帝時唐蒙已畧通夜郎因通西南夷道發巴蜀廣漢卒作者數萬人治道二歲不成士卒多物故物故死也費以億萬計蜀民及漢用事者多言不便是時卭莋之君長卭者今為卭都縣筰者今為定筰縣聞南夷與漢通得賞賜多欲願為内臣妾請吏比南夷帝問相如相如曰卭筰冉駹者近蜀道易通今䕫州開州府等首領姓冉者皆舊冉種也駹音龍異時嘗通為郡縣矣異時猶言徃時也至漢興而罷通今誠復通為置縣愈於西南夷南夷謂犍為牂牁也西夷謂越嶲益州也帝以為然乃拜相如為中郎將建節徃使副使者王然于壼充國呂越人馳四乘之傳張戀切因巴蜀吏幣物以賂南夷相如使畧定西南夷卭筰冉駹斯榆之君皆請為臣妾除邉關邊關益斥西至沬若水沫水出蜀廣平徼若水出就牛徼外沬音妹南至牂牁為徼徼以木石水謂為界者也斯榆之君等自求去邉關欲與牂牁作徼舉也工釣切通靈山道橋孫水鑿開靈山道置靈道縣孫水出臺登縣南至㑹無入若水於孫水上作橋以通卭筰還報天子大說說讀曰悅蓋寛饒為大中大夫行風俗多所稱舉貶黜奉使稱意孔光為博士成帝初奉使錄寃獄行風俗振贍流民奉使稱意由是知名陳咸為刺史冀州奉使稱意平當為博士給事中使行流民幽州舉奏刺史二千石勞徠有意者言渤海鹽池可且勿禁以救民急恣民者鹽官不專也所過見稱即奉使者十一人為最樓䕶字君卿齊人也平阿侯王譚舉䕶方正為諫議大夫使郡國䕶假貸言以假物貧人令䕶監之使還奏事稱意後漢李恂章帝時為侍御史持節使幽州宣布恩澤慰撫北狄所過皆圖冩山川屯田聚落百餘卷悉封奏上帝嘉之雷義以順帝時守灌謁者漢官儀曰謁者三十五人以郎中䄮滿歲稱給事未滿歲稱灌謁者使持節督郡國行風俗太守令長坐者凡七十人周舉為諌議大夫永和六年詔遣八使廵行風俗舉於是劾奏貪猾表薦公清朝廷稱之范滂桓帝時舉孝亷光禄四行光祿舉敦厚質樸遜譲節儉此為四行也時冀州饑荒盗賊羣起乃以滂為清詔使案察之滂登車攬轡慨然有澄清天下之志及至州境守令自知贜汚望風觧印綬去其所舉奏莫不厭塞衆議第五種以司徒掾清詔使冀州亷察災害風俗通曰汝南周勃辟太尉清詔使荆州又此言以司徒清詔使冀州蓋三公府有清詔員以承詔使也舉奏刺史二千石以下所刑免甚衆弃官奔走者數十人奉使稱職蜀孫乾字公祐北海人也先主領徐州辟為從事後隨從周旋先主之背曹公遣乾自結袁紹將適荆州乾又與縻竺俱使劉表皆如意指馬良為侍中時東征吳遣良入武陵招納五溪蠻夷渠帥皆受印號咸如意指鄧芝為尚書先主薨於永安先是吳王孫權請和先主累遣宋璋費禕等與相報答丞相諸葛亮深慮權聞先主殂隕恐有異計未知所如芝見亮曰今主上㓜弱初在位冝遣大使重申吳好亮答之曰吾思之久矣未得其人耳今日始得之芝問其人為誰亮曰即使君也乃遣芝修好於權權果狐疑不時見芝芝乃自表請見權曰臣今來亦欲為吳非但為蜀也權乃見之語芝曰孤誠願與蜀和親然恐蜀主㓜弱國小勢偪為魏所乘不自保全以此猶豫耳芝對曰吳蜀二國四州之地大王命世之英諸葛亮亦一時之傑也蜀有重險之固吳有三江之阻合此二長共為唇齒進可并兼天下退可鼎足而立此理之自然也大王今若委質於魏魏必上望大王之入朝下求太子之内侍若不從命則奉辭伐叛蜀必順流見可而進如此江南之地非復大王之有也權黙然良久曰君言是也遂自絶魏與蜀連和遣張温報聘於蜀權與亮書曰丁厷掞張漢書禮樂志曰長離前掞光耀明孫權蓋以丁厷之言多浮豐也掞音夷念反隂化不盡和合二國唯有鄧芝李福字孫德梓潼涪人也為尚書僕射諸葛亮於武功病篤後主遣福省侍遂因諮以國家大計福徃具宣聖㫖聽亮所言至别數日忽思未盡其意遂却騎馳還見亮亮語福曰孤知君還意近日言語雖彌日有所不盡更求一决耳君所問者公琰其宜也蔣琬字公琰福謝前實失不諮請公如公百年後誰可任大事者故輙還耳乞復請蔣琬琬後誰可任者亮曰文偉費禕字文偉可以繼之又復問其次亮不答福還奉使稱㫖費禕為昭信校尉使吳還遷為侍中諸葛亮北住漢中請禕為叅軍以奉使稱㫖頻至吳羅憲字令則以宣信校尉再使於吳吳人稱美焉吳是儀為侍中時蜀相諸葛亮卒大帝垂心西州遣儀使蜀申固盟好奉使稱意晉侯史為侍中與皇甫陶荀廙持節循省風俗及還奏事稱㫖宋裴松之為國子博士文帝元嘉三年誅徐羡之等分遣大使廵天下松之出使湘州反使奏曰天道以下濟光明君德以廣運為極古先哲后因心溥被是以文思在躬則時雍自洽禮行江漢而美化斯遠故垂大武之休詠廓造周之盛則伏惟陛下神叡𤣥通道契曠代冕旒華堂垂心八表咨敬敷之未純慮明揚之靡暢清問下民哀此鰥寡渙焉大號周爰四逹遠猷形於雅誥惠訓播乎遐陬是故率土仰詠重譯咸悅莫不謳吟踊躍式欽皇風或有扶老携㓜稱歡路左誠繇亭毒既流故忘其自千載一時於是乎在臣謬蒙銓任忝厠顯列猥以短乏思循八表無以宣暢聖㫖肅明風化黜陟無序搜揚寡聞慙懼屏營不知所措奉二十四條謹隨事為牒伏見癸卯詔書禮俗得失一依周典毎各為書還具條奏謹依事為書以繫之松之甚得奉使之意論者美之劉勔為劉道錫揚烈府主簿元嘉二十七年後魏南侵道錫遣勔使詣京都太祖引見之酬對稱㫖南齊劉係宗為寜朔將軍白賊唐㝢之起宿衛兵東討遣係宗隨軍慰勞遍至遭賊郡縣百姓被驅逼者悉無所問還復民伍係宗還武帝曰此役有征無戰以時平蕩百姓安帖甚快也陳蕭乾為黄門侍郎時熊曇朗在豫章周廸在臨川留異在東陽陳寳應在建晋共相連結閩中豪帥立砦自保武帝患之令乾徃諭以逆順謂曰昔陸賈南征趙佗歸順隨何奉使黥布來臣追想清風髣髴在目卿宜勉建功名不煩更勞師旅乾至示以逆順所在欵附毛喜初與宣帝事梁元帝為尚書勸論侍郎及江陵䧟喜及宣帝俱遷關右世祖即位喜自周還進和好之策朝廷乃遣周𢎞正等通聘宣帝反國喜於郢州奉迎又遣喜入關以家屬為請周冡宰宇文䕶執喜手曰能結二國之好者卿也蕭引為吏部侍郎時廣州刺史馬靖甚得嶺表人心而兵甲精練毎年深入俚洞又數有戰功朝野頗生異議宣帝以引悉諳嶺外物情且遣引觀靖審其舉措諷令送質引奉宻㫖南行外託収督賧物既至畨禺靖即悟㫖盡遣兒弟下都為質後魏崔𤣥伯道武時為周兵將軍時詔遣使者廵行郡國糺察守宰不如法者令𤣥伯與宜都公穆觀等案之明元稱其平當公孫表字𤣥元初為慕容冲尚書郎歸朝使江南稱㫖庾岳道武時為外朝大人參預軍國帝既絶慕容垂以岳為大人使詣慕容永永服其詞義張濟為散騎侍郎時後秦姚興遣將攻洛陽晉雍州刺史楊佺期遣使乞師於常山王遵遵以状聞道武遣濟為遵從事中郎報之濟自㐮陽還帝問濟江南之事濟對曰司馬昌明死子德宗代立所部州鎮迭相攻擊今雖小定君弱臣強全無綱紀臣等既至㐮陽佺期問臣魏初伐中山幾十萬衆臣答四十餘萬佺期曰魏國被甲戎馬可有幾匹臣答中軍精騎十有餘萬外軍無數佺期曰以此討羌豈足滅也又曰魏定中山徙幾戸於此臣答七萬餘家佺期曰治在何城臣答定都平城佺期曰有如許大衆亦何用城為又曰魏帝為欲久都平城將復遷乎臣答非所知也佺期聞朝廷不都山東貌有喜色曰晉魏通和乃在徃昔非唯今日羌㓂狡猾頻侵河雒夙夜憂危今此寡弱倉庫空竭與君便為一家義無所諱雒城救援仰待於魏若獲保全當必厚報如其為羌所乗寧使魏取臣等欲分向揚州佺期曰蠻賊互起水行甚難魏之軍焉已據滑臺於此而還從北道東下乃更便宜且晉之法制有異於魏今都督㐮陽委以外事有欲征討輙使興發然後表聞令朝廷知之而已如其事勢不舉亦不承臺命帝嘉其詞順乃厚賞其使許救雒陽後遷謁者僕射報使姚興以累使稱㫖張彛為散騎常侍兼侍中彛善於督察毎東西馳使有所廵檢彛嘗充其選清慎嚴猛所至人皆畏伏儔類亦以此髙之古弼明元時為獵郎使長安稱㫖李順凢使凉州沮渠蒙遜十有二返太武稱其能髙推字仲譲早有名譽大延中以前後南使不稱妙簡行人中書博士游雅薦推應選詔兼散騎常侍使宋南人稱其才辯元庫汗明於斷决獻文即位拜殿中給事毎奉使察行州鎮折獄以情所厯皆稱之秦州父老詣闕乞庫汗為刺史前後千餘人朝廷許之未及遣遇病卒鄧羡為黄門侍郎時幽瀛滄冀大水頻經㓂難民饑詔羡兼尚書假散騎常侍持節諸州隨方賑恤多有所濟㳺肇為散騎侍郎兼侍中為畿内大使黜陟善惡賞罰分明襲恒山王暉少沉敏頗渉文史宣武即位拜尚書主客郎廵省風俗還奏事稱㫖隂道方為李神儁所知賞神儁為前將軍荆州刺史請道方為其府長流參軍神儁曽使道方詣梁雍州刺史蕭綱論邉事道方風神沉正為綱所稱李崇孝明時為使持節兼侍中東道大使黜陟能否著賞罰之稱劉隲字子昇彭城人弱冠州辟主簿齊獻武王時奉使詣闕見莊帝於顯陽殿問以邉事隲應對閑敏帝善之元孚從出帝入關為司空時蠕蠕主與孚相識先請見孚然後遣女於是乃使孚行蠕蠕君臣見孚莫不歡悅奉皇后求歸北齊宋世良初仕魏為殿中侍御史詣河北括戸大獲浮惰還見汲郡城旁多骸骨移書州郡令悉收瘞其夜丼雨滂沲還孝莊勞之曰知卿所括得丁倍於本帳若官人皆如此用心便是更出一天下也斛律羌舉為東夏州刺史時髙祖欲招懐遠夷令羌舉使於阿至羅宣揚威德前後稱㫖甚被知賞張纂為右光禄大夫使於茹茹以衘命稱㫖李稚廉兼散騎常侍省方大使行還所奏多見納用後周趙剛初為魏閣内都督時賀㧞勝獨孤信以孝武西遷之後並流寓江左至是剛言於魏文帝請遣而復之乃以剛為兼給事黄門侍郎使梁魏興齎移書與其梁州刺史杜懐珤等即與盟㰱受移建康仍遣人隨剛報命是年又詔剛使三荆聼在所便宜行事使還稱㫖進爵武城縣侯除大丞相府帳内都督復使魏興重申前命尋而梁人禮送賀㧞勝獨孤信等宇文測初仕魏為司徒右長史李武疑齊神武有異圖詔測詣太祖言令宻為之備太祖見之甚懽厙狄峙初為魏黄門侍郎時與東魏爭衡蠕蠕乘虗屡為邉患朝議欲和親乃使峙徃峙狀貌魁梧善於辭令蠕蠕主雅信結重之自是不復為㓂文帝謂峙曰昔魏絳和戎見稱前史以君方之彼有愧色楊檦為撫軍將軍銀青光禄大夫時東魏遷鄴太祖欲知其所為乃遣檦間行詣鄴以觀察之使還稱㫖杜杲為司倉上士初陳文帝弟安成王頊為質於梁及江陵平頊隨例遷長安陳人請之太祖許而未遣至是帝欲歸之命杲使焉陳文帝大悅即遣使報聘并賂黔中數州之地仍請畫野分疆永敦隣好以杲奉使稱㫖進授都督治小御伯更徃分界焉劉雄為駕部中大夫兼齊公憲府掾時齊相斛律明月率衆築通闕城以援宜陽先是國家與齊通好約言各保境息民不相侵擾至是憲以齊人失信令雄使於明月責其背約雄辭議辨直齊人憚焉楊薦孝閔帝初為御伯大夫使突厥結婚突厥可汗弟地頭可汗阿史那庫頭居東面與齊通和說其兄欲背先約計謀已定將以薦等送齊薦知其意乃正色責之詞氣慷慨涕泗横流可汗慘然良久曰幸無所疑當共平東賊然後發遣我女乃令薦先報命仍請東討以奉使稱㫖遷大將軍竇毅為大將軍時與齊人爭衡戎車嵗動並交結突厥以為外援在太祖之時突厥已許納女於我齊人亦甘言重幣遣使求婚狄固貪惏便欲有悔朝廷乃令楊薦等累使結之徃反十餘方復前好至是雖期徃逆猶懼改圖以毅地兼勲戚素有威重乃命為使及毅之至齊使亦在焉突厥君臣猶有二志毅抗言正色以大義責之累旬乃定卒以皇后歸朝議嘉之王慶為中將軍武帝保定二年使吐谷渾與其分疆仍論和好之事渾主悅服遣所親隨慶獻貢初突厥與周和親許納女為后而齊人知之懼成合從之勢亦遣使求婚財饋甚厚突厥貪其重賂便許之朝議以魏氏昔與蠕蠕結婚遂為齊人離貳今者復恐改變欲遣使結之遂授慶左武伯副揚薦為使是嵗遂興入并之役慶乃引突厥騎與隋公楊忠至太原而還及齊人許送皇姑及世母朝廷遂與通和突厥聞之復致疑阻於是又遣慶徃喻之可汗感悅結好如初五年復與宇文貴使突厥逆女自此以慶信著北藩頻歲出使後更至突厥屬其可汗暴殂突厥謂慶曰前後使來逄我國䘮者皆𠢐面表哀况今二國和親豈得不行此事慶抗辭不從突厥見其守正卒不敢逼武帝聞而嘉之陸逞為軍司馬武帝天和三年齊遣侍中斛斯文略中書侍郎劉逖來聘初修隣好盛選行人詔逞為使尹公正為副以報之逞美容止善詞令敏而有禮齊人稱焉隋元暉初仕周為武伯下大夫時突厥屢為㓂患朝廷將結和親令暉齎錦綵十萬使於突厥暉說以利害申國厚禮可汗大悅遣其王隨獻方物武帝之聘突厥后也令暉致禮焉韋冲字世冲初仕後周從大將軍元定渡江伐陳為陳人所虜武帝以幣贖而還之帝復令冲以馬千匹使於陳以贖開府賀㧞華等五十人及元定之柩西還冲有辭辯奉使稱㫖蘇孝慈仕周為中侍上士後拜都督聘於齊稱㫖長孫晟初仕周為司衛上士宣帝時突厥攝圖請婚於周以趙王招女妻之然周與攝圖各相誇競妙選驍勇使者以充因遣晟副汝南公宇文慶送千金公主至於其牙前後使人數十軰攝圖多不禮見晟而獨愛焉毎共㳺獵留之竟歲嘗有二鵰飛而争肉因以两箭與晟曰請射取之晟乃彎弓馳徃遇鵰相攖遂一發而䨇貫焉攝圖喜命諸子弟貴人皆親友兾眤近之以學彈射其弟處羅侯號突利設尤得衆心而為攝圖所忌宻託心腹隂與晟盟晟與之㳺因察山川形勢部衆强弱皆盡知之時髙祖作相晟以狀白髙祖髙祖大喜賀若誼初仕周為直門將軍時茹茹種落携貳齊遣其舍人楊暢結好於茹茹太祖恐其并力為邉境之患使誼聘茹茹誼因㗖以厚利茹因信之遂與周連和執暢付誼太祖嘉之韋師為河北道行臺兵部尚書詔於山東河南十八州安撫大使奏事稱㫖長孫平髙祖時為工部尚書時突厥逹頭可汗與都藍可汗相攻各遣使請援帝使平持節宣諭令其和觧賜縑三百疋良馬一匹而遣之平至突厥所為陳利害遂各觧兵柳謇之為光祿少卿時啟民可汗自以内附遂畜牧於定襄馬邑間帝使謇之諭令出塞及還奏事稱㫖皇甫誕為持書侍御史髙祖以百姓多流亡令誕為河南道大使以簡括之及還奏事稱㫖帝甚悅房彦謙為監察御史以陳平奉詔安撫泉括等十州衘命稱㫖盧昌衡為金州刺史奉詔持節為河南道廵省大使及還稱㫖許善心為禮部侍郎煬帝大業元年副納言楊逹為冀州道大使還奏稱㫖唐劉文静為晉陽司馬髙祖初興義兵於晉陽遣文静使突厥始畢始畢曰唐公舉義欲何為也文静曰文皇帝廢冡嫡傳位後主致斯禍亂唐公國之懿戚不忍坐觀成敗欲廢不當立者願與可汗兵馬同入京師人衆土地入唐公財帛金寳入突厥始畢大悅即遣將康鞙利領騎二千而又獻馬千匹髙祖大悅襄武郡公琛與太常卿鄭元璹齎女妓遺突厥始畢可汗以結和親始畢甚重之贈名馬數百匹遣骨吐祿特勤隨琛貢方物髙祖大悅皇甫無逸武德初為御史大夫時益部新開政刑未洽長使橫恣贓汚狼籍令無逸持節廵撫無逸宣揚朝化法令嚴肅蜀中甚頼之豆盧寛太宗貞觀中為殿中監使於突厥寛容儀閑雅詞㫖可觀突厥甚敬憚焉崔敦禮以貞觀二十年為兵部尚書兼簡校鴻臚卿瀚海都督廻紇吐迷度為其下所殺詔敦禮持節綏輯之因立其嗣敦禮深識蕃情凢所奏請事多允㑹鄭維忠中宗時為御史大夫持節賑給河北道仍黜陟牧宰還敷奏稱㫖李傑神龍初為衛尉少卿為河東道廵察黜陟使奏課為諸使之最宇文融𤣥宗開元初為兵部員外郎括逃戸所至揚宣恩命百姓感其言至有流淚稱為父母者李暠為工部尚書東都留守開元二十一年正月制曰繼好之義雖屬邉鄙受命以出必在親賢事欲重於當時禮故崇於殊俗選衆之舉無出宗英工部尚書李暠體含柔嘉識致明允為公族之領袖是朝廷之羽儀金城公主既在蕃中漢庭公卿非無專對有懐於遠夫豈能忘宜持節充入吐蕃使准式發遣以國信物一萬疋私覿物二千匹皆雜以五綵遣之及還金城公主上言請以今年九月一日樹碑於赤嶺定蕃漢界樹碑之日詔張守珪李行禕與吐蕃使莽布支同徃觀焉既而吐蕃遣其臣隨漢使分徃劍南及河西磧西歴告邉州曰兩國和好無相侵掠漢使告亦如之暠奉使稱㫖王縉肅宗時為兵部侍郎屬平史朝義河朔未安詔縉以本官河北宣慰奉使稱㫖賀若察代宗大厯四年為給事中察自潁州使還見於延英殿賜帛五十疋先是潁州刺史李岵以暴政專殺本道使令狐彰陳奏帝命宣慰且驗其事察復奏稱㫖與彰狀恊流岵於夷州吳凑為金吾將軍時滑亳節度令狐彰汴宋節度田神功等亡於鎮軍州頗騷擾凑皆承詔宣勞慰撫事多適宜班宏為結事中時成德軍李寳臣卒其子惟岳匿父䘮以求位代宗難之乃遣宏問疾且喻惟岳惟岳厚賂之宏皆不受還報合㫖歸崇敬德宗時為左散騎常侍時两河叛渙之徒初禀朝命令崇敬以本官兼御史大夫持節宣慰奉使稱㫖李紓為兵部侍郎時誅李懐光諸軍兵㑹河中詔紓宣慰以勵節將還報合㫖樊澤為都官員外郎建中初為充和蕃使蕃中用事宰相尚結賛深禮之尋從鳯翔節度張鎰與吐蕃㑹盟於清水盧羣為兵部員外郎使淮西節度吳少誠奉使稱㫖于頔以櫟陽主簿攝監察御史充入蕃使判官後為司門員外郎兼侍御史充西蕃計㑹使將命稱㫖時論以為有出疆專對之能溫造字簡輿張建封收夀春招以尺書造從之及建封按察彭門造歸下邳時李希烈用蔡兵四刦所至䧟没天下城鎮恃兵者皆欲動揺或自立帥請節德宗患之以范陽劉濟方推忠誠但不能盡逹朝廷倚頼之意乃宻詔建封選賢德有識之士徃喻之建封乃强署造節度參謀使於幽州造與語未訖濟俯伏流涕曰濟僻在遐裔不知天子神聖大臣忠藎願得率先諸侯效以死節造還建封以其名上聞乃馳驛入奏長慶元年授京兆府司錄參軍奉使河朔稱㫖遷殿中侍御史既而幽州劉總請以所部九州聴朝㫖穆宗選可使者或薦造帝召而謂之曰朕以劉總輸忠雖以書詔便蕃未盡朕之深意以卿素能辦事為朕此行造對曰臣府縣走吏初受憲職望輕事重恐辱國命無能諭㫖帝曰我在東宮時聞劉總請覲及我即位比年上書不絶及約以行期即瘖黙不報卿識機知變徃諭我懐無多譲也乃拜起居舍人賜緋魚袋充太原鎮州幽州宣諭使造初至范陽劉總具櫜鞬郊迎及宣聖㫖示以禍福總俯伏流汗若兵加於頸矣及造使還總遂移家入覲朝廷遂以張𢎞靖代之及朱克融逐𢎞靖成徳殺田𢎞正朝廷用兵乃先令造衘命河東魏博澤潞横海深冀易定等道諭以軍期事皆稱㫖李鄘為吏部員外郎徐州張建封卒其子愔為將校所迫俾領軍務詔擇臨難不懾者即其軍以諭之遂命鄘為宣慰使鄘直抵其軍召將士傳朝㫖陳禍福脫監軍桎梏令復其位兇黨不敢犯及愔上表稱兵馬留後鄘以為非詔令所加不宜自號使削去乃受爰陟貞元中為左司郎中累奉使皆稱㫖袁滋為祠部郎中兼御史中丞充册南詔使及還以清平官尹輔酋來朝又得先没蕃將衛景升韓演等三人並南詔所獲吐蕃將帥俘囚百人至京南詔異牟尋上表陳謝册命及頒賜正朔仍請撃吐蕃兼獻方物房式憲宗時為吏部郎中時河朔節度劉濟王士貞張茂昭皆以兵壯氣豪相持短長屢以表聞迭請加罪帝欲止其兵李吉甫薦式為給事中將命於河朔式歴使諸鎮諷諭之還奏愜㫖崔從為尚書左丞元和十三年王承宗再奉朝貢表遣二子入侍請納德棣二州詔從宣撫且受地議者以承宗誠詐未可知又入侍者非承宗子人皆憂之從次魏州田𢎞正以路師道境欲以五百騎送之從不聼以童僕十數騎徑至成徳先令大集軍士於毬塲宣諭恩敕詞㫖慷慨衆心感動承宗與軍士皆號泣俯拜及饗宴每從容與承宗諭以大節承宗為禮益恭及還遂按二郡之籍收其戸口兵儲以復命帝臨軒勞恱久之鄭權為右散騎常侍穆宗長慶二年三月自廻鶻告哀回帝初即位欲重其使以權嘗厯顯位噐質魁偉有詞辯可以將命故選任之權憚遠役辭以宿有廢痼之疾不能馳馬既不免乃肩轝渉磧至虜庭詞氣不撓頗得使臣之體虜衆敬憚焉李行修長慶三年為宣撫使至楚州舉費冠卿之至孝至泗州舉刺史李宜臣之贓犯時以為奉使得人楊於陵為戸部侍郎會李師道削平分其地為三鎮朝廷思有所制置於陵以選兼御史大夫充宣慰使還奏合㫖梁韋震為殿中監蔡州四靣都統判官時蔡將郭璠縶秦宗權送於太祖太祖復請震奏事且疏時溥之罪願委討伐仍請降滄兖二師之命溥既以都統破黄巢功居第一又與兖鄆連衡結中官為内援時宰之忌太祖者復佑之右拾遺徐彦樞亦䟽請所在斬宗權不必至京師陳獻俘之儀盖以時溥獻黄巢止函首故也震往復論列於天子前敢大言亦能協附執政所請事多允李震為太祖從事乾化二年以馬殷初領湖南為雷滿所逼帝以震骨鯁有辯命馳往和觧殷滿並禀命李珽為兵部郎中崇政院直學士時許帥馮行襲疾甚出為許州留後先是行襲有牙兵二千皆蔡人也太祖深以為憂乃遣珽馳往以伺察之珽至傳舍召將吏親加慰撫行襲欲使人代受詔珽曰東首加朝服禮也乃於卧内宣詔令善自補養茍有不諱子孫俱保後福行襲泣謝遂解二印以授珽珽代掌軍府事太祖覽奏曰予固知珽必辦吾事行襲門戸不朽矣張歸弁歸於太祖得署為牙校時太祖初鎮宣武屢命歸弁結好於近境頗得行人之禮後唐伊廣襟情灑落善專對及為汾州刺史時武皇主盟諸侯景附軍機締結聘遺旁午廣奉使稱㫖郭崇韜臨事機警應對可觀武皇時為典謁奉使鳯翔稱㫖薛仁謙為通事舍人莊宗即位三聘於吳得使乎之體晉劉處讓初仕後唐為客省副使累將命稱㫖李承約仕後唐為潁州團練使天成中以邠州節度使毛璋將圖不軌乃命為涇州節度副使且承宻㫖往偵之既至以善言諭之璋乃受代明宗賞其能加檢校太保聶廷祚為太子賔客善揣人情多有材藝飲博諧戯無所不通累奉使杭越及荆湖藩鎮侯王見者愛之亦嘗使於契丹善待之册府元龜卷六百五十三
