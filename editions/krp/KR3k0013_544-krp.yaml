body:
  text: 冊府元龜卷五百四十四宋王欽若等撰諌諍部直諌第十一唐薛謙光為左補闕萬嵗通天二年四夷多遣子入侍其論欽陵阿史徳元珍孫萬軒等皆因充侍子遂得徧觀中國兵威禮樂其後竟為邉害謙光上䟽曰臣聞戎夏不雜自古所誡夷狄無信易動難安故斥居塞外不違中國前史所稱其来久矣然而帝徳廣被有時朝謁受向化之誠請納梯山之禮貢事畢則歸其父母之國導以指南之車此三王之盛典也自漢魏已後遂革襲衣冠築室京師不令歸國此中葉之故事也較其利害則三王是而漢魏非論其得失則拒邉長而徵質短殷鑒在乎往代豈可不懐經逺之慮哉昔郭欽獻策於武皇江統納諌於恵主咸以為夷狄䖏中夏必為變晉武不納二臣之逺策好慕化之虚名縱其習史漢等書授以五部都尉此皆計之失也若前事不忘則後代之元龜此臣所以極言而不隱者也伏惟陛下徳洽區外仁被左袵綏懐式遏之方故無遺策豈臣庸淺所敢輕議然而區區之心有所未盡者也竊惟突厥吐蕃契丹等往因入侍並叨殊奨或執㦸丹墀策名戎秩或曳裾庠序髙歩黌門服改氊裘語兼中夏明習漢法覩衣冠之儀目擊朝章知經國之要窺成敗於國史察安危於古今識邉塞之盈虗知山川之險易或委以經畧之功令其展効或矜其首邱之志放使歸蕃於國家雖有冠帯之名在夷狄廣其從横之智雖則慕化之美茍恱於當時而狼子孤恩旋生於過後及歸部落鮮不稱兵邉鄙羅災實由於此故老子云國之利噐不可以示人在於齊人猶不可以示之况於夷狄乎謹按楚申公巫臣奔晉而使於吴使其子狐庸為吴行人教吴戰陣使之叛楚吴於是始伐楚取巢取駕克棘入州来子反一嵗七奔命其所以能謀楚良以此也又按漢書桓帝遷五部匈奴於分晉其後卒有劉石之難向使五部不徙則晉祚猶未可量也鮮卑不遷幽州則慕容無中原之僣又按漢書陳湯云天胡兵五而當漢兵一何者兵刄鈍弓弩不利今聞頗得漢工猶然三而當一由是言之利兵尚不可使胡人得法况䖏之中國而使之習見哉昔漢東平王請太史公書朝臣以為太史公書有戰國從横之說不可以與諸侯此則内地諸王尚不可與况外國乎臣竊計秦并天下及劉項之際累載用兵人户凋𣪚以晉恵方之八王之喪師輕於楚漢之地冐頓之全實過於五部之㣲弱當曩時冐頓之強盛乗中國之虗弊髙祖餒厄平城而冐頓不能入中國者何也非兵不足以侵諸夏力不足以破汾晉其所以解圍而縱髙祖者為不習中土之風不安中國之美生長磧漠之北以穹廬賢於城邑以氊罽美於章紱既安其所習而樂其所生是以無窺中國之心者為不生漢故也豈有心不樂漢而欲深入者乎劉元海五部離𣪚之餘而卒能自振於中國者為少居内地眀習漢法非元海恱漢漢亦恱之一朝背誕四人響應遂鄙單于之號竊帝王之寳賤沙漠而不居擁平陽而鼎峙者為居漢故也向使元海不内徙正當刼邉人繒綵麴蘖以歸隂山之北安能使王彌崔懿反為其用耶當今皇風遐覃含識革面凡在虺性莫不懐馴方使由余効忠日磾盡節以臣愚慮者國家方傳無窮之祚於後脱備預不謹邉臣失圗則夷狄稱兵不在方外非所以肥中國威四夷經營萬乗之規貽厥孫謀之道也臣愚以為願充侍子一皆禁絶必若先在中國者亦不可更使歸蕃則夷人保疆邉邑無事矣䟽奏不納蘓安常冀州武邑人渉獵文史尤明周官及春秋左氏傳大定元年投匭上䟽曰臣聞厯數在躬握璇璣者哲后天命攸屬臨寳極者聖人或揖譲而升或干戈以定此二塗也今古共之伏惟皇帝陛下徳合天地澤流河海庶物和平萬靈充塞臣謂胥庭之化無以過也陛下欽先聖之顧託受嗣子之推譲豈不以極斯大節成此鴻勲應天順人于今二十餘年臣馳情緗素繹念邱墳竊見女媧氏之代風俗簡朴人淳易理垂衣拱手不足可言洎漢朝以恵帝幼冲吕后監撫享國八嵗日不暇給雖不傳之簡策亦焉足道㢤如陛下之在位五星同色四海無波陛下造明堂即宗文祖武之業也封中岳即萬代一時之事也受寳圗即河圗雒書之瑞也功既大矣業復成矣即當損其犬馬減其服馭觀四大其如遺視萬乗其若脱陛下豈不聞虞舜褰裳周公復辟良以大禹至聖成王既長推位讓國其道備焉故舜之於禹事祗親族旦與成王不離叔父且族親何如子之愛叔父何如母之恩今太子孝敬是崇春秋既壮若使統臨宸極何異陛下之身陛下年徳既尊寳位将倦㡬務殷重浩蕩心神何不禪位東宫自怡聖體陛下縱日慎一日雖休勿休其若天意何陛下輟金輪聖神等號是厭倦萬㡬之象此謂天意也太子以姦臣枉搆久已自新相王推位青宫退居朱邸天下聞之莫不謳吟聖代此謂人事也故知天意人事終我聖朝大臣重禄不言近臣畏罪不諌不能使我君有堯舜之道故書云后徳惟臣不徳惟臣此其謂也臣又聞自昔眀王之孝理天下者不見二姓而俱王也當今梁定河内建昌諸王等承陛下之䕃覆並得封王臣恐千秋萬嵗之後於事非便臣請黜為公侯任以閑簡曺務臣又聞陛下有三十餘孫今無尺土之封此非長久之計也臣請四面都督府及要衝州郡分土而王之縱今年尚幼小未聞養人之術臣請擇之師傅成其孝敬之道将以夹輔周室藩屏皇家使累業重光享祀不輟斯為美矣豈不大哉臣今又覩外敵侵擾窺覘中國陛下居總章申廟算赫然發怒分閫出師輓粟飛芻十室而九焼範鑠刄以時繫年即士卒不遑府庫空竭故兵法曰興師十萬日費千金此其謂也陛下若能告倦萬㡬推位太子分州列郡以王子孫自然四夷聞之繫頸面縳百姓聞之皷腹撃壌史臣書之曰掩媧燧而邁胥庭後代聞之曰四三皇而六五帝豈虚也哉臣山東草莱耳無撃鐘鼎食之榮有碩學鴻儒之業臣来時跪而辭父父謂臣曰丈夫䖏代君子生年汝當獻一謀畫一策厥塗不就草木何殊今上有堯舜之徳下有稷卨之位古人有言欲安其家先安其國欲安其親必先安其君當今天下雖安亦有未然之計故書云若昔大猷制治於未亂保邦於未危此其謂也臣母又謂臣曰朝亦倚門而望汝暮亦倚門而望汝若能上干人主進書獻説揚名後代以榮父母是吾子也臣感父母之言明發不寢今故杖策千里徒歩三川雖牽拙而無由同獻符而竊抃陛下若採臣一言之善成國家萬代之基臣之懇誠幸甚幸甚䟽奏則天召見賜食慰諭而遣之長安二年安常又上䟽曰臣聞忠臣不順時而取寵烈士不惜死而偷生故君道不明者忠臣之過歟伏惟皇帝陛下功格四表道大百王昔者先皇晏駕留其顧託将以萬㡬殷廣令陛下兼知政事雖唐堯虞舜居其位而共工伯鯀在其朝間陛下骨肉之恩阻陛下母子之愛愚臣謂聖情以運祚将衰拯斯大節天下之人謂陛下微弱李氏貪天之功何以年在耄倦而不能復子明辟使忠言莫進姦佞成朋夷狄紛擾屠害黎庶陛下雖納隍興念亦何能救此生靈臣聞天下者神堯文武之天下也昔有隋失馭小人道長群雄馳鹿四海瞻烏皇唐親事戎旃鳯翔叅野削平㝢縣龍飛踐極㰱血為盟指河為誓非李氏不王非功臣不封陛下雖居正統實因唐氏舊基故詩曰惟鵲有巢惟鳩居之此言雖小可以喻大陛下自坤生徳乗乾作主豈不以上服天意下順人心東宫昔在諒隂相王又非長子陛下恐國嗣将絶所以應其謳歌當今太子追廻年徳俱盛陛下貪其寳位而忘母子深恩臣聞京邑翼翼四方取則陛下蔽太子之元良枉太子之神噐何以教天下母慈子孝焉使天下移風易俗惟陛下思之将何聖顔以見唐家宗廟将何誥命以謁大帝墳陵陛下何故日夜積憂不知鍾鳴漏盡臣愚以為天意人事還歸李家陛下雖安天位殊不知物極則反噐滿即傾故語云當斷不斷反受其亂此之謂也陛下不如髙揖㡬務自怡聖躬命史臣以書之令樂府以歌之斯亦太平之盛事也臣前後所上事條必知陛下不能用但要不可不言臣聞見過不諌非忠臣也畏死不言非勇士也臣何惜一朝之命而不安萬乗之國哉故茍利國家雖死可矣願陛下蹔輟萬㡬詳臣愚見陛下若以臣為忠則從諌如流擇是而用之若以臣為不忠則斬取臣頭以示天下䟽奏不納桓彦範為司刑少卿長安中司僕卿張昌宗坐遣術人李𢎞泰占相云有天分御史中丞宋璟請收付制獄窮理其罪則天不許彦範上䟽曰微臣竊見宋璟奏張昌宗令李𢎞泰占有天分及有天子氣請禁身勘當恩勅不允者但昌宗無徳無才謬承榮寵自宜粉碎肌骨以答殊私豈得包藏禍心有此占相陛下以簮屨恩久不忍先刑昌宗以逆亂罪多自招其咎此是皇天降怒非惟陛下故誅違天不祥乞陛下裁擇原其本奏以防事敗事敗即言奏訖不敗則候時為變此乃姦臣詭計疑惑聖人今果遂其所謀陛下何忍不察向若昌宗措其占相奏後不合更與𢎞泰往還脩福復擬禳厄此則期於必遂元無悔心也縱雖奏聞情實難恕此而可捨誰其可刑陛下黨而不誅養成其惡臣恐更有為逆者無人敢言縱使昌宗元無此心今見頻遭事迫亦當不日為亂况復先有包蔵又昌宗經勘當已前其心或防後敗雖有此懼勢仍傾朝况經兩度事彰天恩普皆捨放自亦以為得計人亦以為應運即不勞兵甲天下皆從萬方譏之以陛下縦成其亂也臣聞父在子稱尊者尚為逆子君在臣圗天分是為逆臣臣逆而不誅社稷其亡矣伏請行鸞臺鳯閣三司考竟其罪䟽奏不報魏靖為監察御史長安二年十一月上䟽曰臣聞國之綱紀在乎降殺理道攸寄人命所懸法務於寛刑期尚簡猶慮詆欺過制旋濫不歸臣逺睇前經歴探故事刑得其中則風雨順而隂陽和法失其宜則怨濫興而災𤯝作虐臣酷吏者資矯佞以事君行刻薄以臨下矯佞似乎用意刻薄類乎無私侮憲害公弄權撓法倚深之奏似公之請既肆滛巧理難聽察其周興来俊臣邱勣萬國俊王𢎞義侯思止郭𢎞覇李敬仁彭先覺王徳夀張知黙者既堯年四㐫矣恣愚騁暴縦虐含毒讎疾在位安忍朝臣罪逐法加刑随意改當其時也囹圄如市朝廷以目既而神靈不昩寃魂有託行惡期報禍滛可徴具嚴天刑以懲亂首臣竊見来俊臣身䖏極法者以其羅織良善屠䧟忠賢籍沒以勸將来顯戮以謝天下臣又聞之道路上至聖王傍洎貴臣眀眀有羅織事矣俊臣既死推者獲功胡元禮超遷裴談顯授中外稱慶朝廷載安破其黨者既能賞不逾時被其䧟者豈可啣寃累嵗且稱反之徒湏得反状惟據口辨即請行刑拷楚妄加疑答何限故徐有功以寛平而見忌斛瑟羅以妓女而受拘中外具知枉直斯在借以為喻其餘可詳臣又聞之郭𢎞覇自刺而唱快萬國俊被遮而遽亡霍獻可臨終膝拳於頂李敬仁将死舌至於臍皆衆鬼滿庭羣妖横道推徴集應若響随聲備在人謡不為虗說伯有晝見殆無以過此亦羅織之一據也臣以至愚不識大體儻使平反者數人衆共詳覆来俊臣等所推大獄庶鄧艾獲申於今日孝婦不濫扵昔時恩渙一流天下幸甚䟽奏制令来俊臣丘勣等所推鞫人身死籍沒者令三司重簡勘其寃濫者雪免張廷珪為監察御史則天長安四年四月幸興泰宫欲於白馬坡營建佛像廷珪上䟽曰夫佛者以覺知為義因心而成不可以諸相見故經云若以色見我以音聲求我是人行邪道不能見如来此明如来之果不可外求也陛下信心歸依彂𢎞誓願壮其塔廟廣其尊容已遍扵天下久矣盖有住於相而行布施非最上第一希有之法何以言之經云若人滿三千大千世界七寳以用布施其福甚多若人於此經中受持乃至四句偈等為他人演說其福勝彼如佛所言陛下傾四海之財殫萬人之力窮山之木以為塔極冶之金以為像雖勞則甚矣費則多矣而所獲福縁不愈於禪房之匹夫沙門之末學受持精進端坐思惟理亦明矣竊為陛下小之今陛下廣樹薫修又置精舎則經云菩薩作福徳不應貪着盖有為之法不足髙也况此營建事殷土木或開發盤磚峻築基階或填塞川澗通轉採斫輾壓蟲蟻動盈巨億豈佛標坐夏之義愍蠢動而不忍害其生哉今陛下何以為之又役鬼不可惟人是營通計工匠率土貧窶朝驅暮役勞筋苦骨簞食瓢飲晨炊星飯饑渴所致疾疢交集豈佛標徒行之義愍畜獸而不忍殘其力哉今陛下何以為之又營築之資僧尼是稅雖乞丐所致而貧闕猶多郡縣徵歛星火過逼或謀計靡所或鬻賣以充怨聲溢路和氣未洽豈佛標随喜之義愍愚蒙而不忍奪其産㢤今陛下何以為之且邉朔未寜軍装日給天下虗竭海内勞敝伏惟陛下慎之重之思菩薩之行為利益一切衆生應如是布施則經所謂不住色布施不住聲香味觸法布施故其福徳若東西南北四維上下虚空不可思量矣何必懃懃於住相凋蒼生之業崇不急之務乎臣以時政論之則宜先邉境蓄府庫養人力臣以釋教論之則宜救苦厄滅諸相崇無為伏願陛下察臣之愚行佛之意務以理為尚不以人廢言幸甚帝從其言即停作楊齊哲為雒陽縣尉長安四年太后幸西亰齊哲上書諌曰臣聞古先哲后咸以為獨智不可以任己専欲不可以為衆所以樹板徵謗懸鼔納諌思聞過而從善全直言而沃心用能綱紀天下統成大業經曰無為而理者其舜也歟夫何為哉安人之道貴乎省事也陛下以大定元年冬遷睠咸京長安三年冬遷雒邑四年又将西幸聖躬得無勞於車轝乎士卒得無敝於暴露乎扈従僚屬俶装而不濟随駕商旅棲泊而匪寜東周之人盛懐嗟怨昔者周穆王欲周行天下使皆有車轍馬迹祭公謀父作祈招之詩以止王心陛下玉琯四周金輿三駕車轍馬迹雖未出於兩都廵狩省方事不師於五載雷動天轉海運山移儼彼六龍嵗適千里此亦近於刑人之力矣安人之道臣用有疑此邦父老抗表留駕陛下告以吐蕃和親為詞臣愚以為未得也况吐蕃蕞醜西隅咫尺自京到雒曾不崇朝陛下乃欲務其艱逺恵然從就夫千鈞之弩尚不為鼷䑕發機况萬乗之君輕為邉戍枉駕夫人至賤而不可簡至愚而不可欺經曰可畏非人是人不可欺也今陛下言此是欺下也使南史何以書之臣朽才淺學竊為陛下籌之陛下今幸長安也乃是背逸就勞破益為損何者神都帑藏儲粟積年充實淮海漕運日夕流衍地當六合之中人恱四方之㑹陛下居之國無横費長安府庫及倉庶事空缺皆藉京洛轉輸價直非率户徵科其物盡官庫酬給公私縻耗盖亦滋多陛下居之是國有横費人疲重徭由此言之陛下之居長安也山東之人財力日匱在雒邑也關西百姓賦役靡加背逸就勞破益為損殷鑒不逺伏惟念之又王者敬授民時所重惟榖今陛下鑾輅以眀年正月即塗嵗首是就耕之初駕行非務農之意無乃不可乎嚴善思為給事中神龍元年中宗欲合葬則天皇后於乾陵善思抗䟽諌曰謹按天元房録葬法云尊者先葬卑者不合於後開入臣伏聞𦵏則天大聖皇后欲開乾陵合葬然以則天大聖卑於天皇大帝若欲開陵合𦵏即是以卑動尊事既違經恐非安穏臣又聞乾陵𤣥宫其門以石閉塞其石縦隙鑄鐵以固其中今若開陵其門必湏䥴鑿然神明之道體尚幽𤣥今乃勤衆加功誠恐多所驚黷又若别開門道以入𤣥宫即往者𦵏時神位先定今更改𦵏為害益深又以修築乾陵之後國頻有難遂至則天大聖皇后權總萬㡬二十餘年其難始定今乃更加營作伏恐還有難生但合𦵏非古著作禮經縁情為用無足依准况今事有不安豈可復修斯制臣又伏見漢時諸陵皇后多不合𦵏魏晉已降始有合者然以漢之積年向餘四百魏晉之後祚皆不長雖受命應期有因天假然以循機享徳亦在時文但陵墓所安必資聖地後之裔嗣用託靈根神靈或有不安後嗣固難長享伏望依漢朝之故事改魏晉之頺綱於乾陵之傍更擇吉地取生墓之法别起一陵既得從𦵏之儀又成固本之業夫以合𦵏者縁人私情不合𦵏者前修故事若以神道有知幽途自得通㑹若以死者無知合之復有何益然以山川精氣上為星象若𦵏得其所則神安後昌若𦵏失其宜則神危後損所以前哲垂範具立葬經欲使生人之道克隆死者之神永泰伏望少廻天眷俯鑒臣言行古昔之明規割私情之愛欲使社稷長享天下乂安凡在懐生孰不慶幸䟽奏制令百官詳議尋降勅言則天遺命葬乾陵賈虗已為左拾遺中宗神龍元年追贈后父故豫州刺史韋𤣥貞為上雒郡王虚已上䟽諌曰臣聞孔子曰惟名與噐不可以假人其非李氏而王自古盟書所棄今陛下創制謀始垂範将来為皇王令圗子孫明鏡興復未㡬后族有私臣雖庸愚尚知不可史官執簡必是直書今萬姓顒然聞一善令莫不途歌里頌延頸向風欣然慕化日恐不見太平奈何行私恵使樵夫譏之即先朝贈太原郡王殷鑒不逺同雲生於膚寸尋木起於孽栽誠可惜也如渙汗既行憚改成命臣望請皇后抗表固辭使天下知引譲之風彤管著冲謙之徳則是巍巍聖徳無得而稱䟽奏不納靳常為左拾遺神龍初中宗以時屬炎暑制令每隔日方坐常上䟽諌曰臣聞昔漢制反支日亦通奏事又光武在軍躬自覽䟽明帝撫運夜必讀書豈以四序炎寒有妨正理况陛下紹登大位初啓中興六合之内莫不延首傾聽威恩未著忠信未孚勤勞者未逹沉滯者未舉逋逃者未還浮偽者未息兼之郡國凋弊倉廪空虚獄訟猶繁澆淳尚雜外逼凶㓂調發未寜内切饑寒衣食不足人思陛下企望太平久矣陛下固宜兢兢業業居安慮危絶嗜慾之源崇清净之化宵衣旰食以荅蒼生之望簡賢任能以救蒼生之弊使天下翕然變風變俗奈何以其㣲熱遂闕一日萬㡬之事六合之内不可家到户說必謂陛下安其宫室重以宴閒忽於黎庶怠於聽政復何以逹堯心於天下復何以垂令範於後代臣愚竊為陛下有所嘆惜帝不納李邕為左拾遺神龍初上䟽曰盖人有感一飱之恵殞七尺之軀况臣為陛下官受陛下禄而得目之所見口不言之是負恩矣自陛下親政日近復在九重所以未聞在外羣下竊議道路藉藉皆云鄭普思多行詭惑妄說妖祥惟陛下信之尚見驅使此事若行必撓亂朝政臣至愚至賤不敢以胷臆對揚天威請以古事為明證孔子云詩三百一言以蔽之思無邪陛下若使以普思有竒術可致長生久視之道則爽鳩氏久應得之永有天下非陛下今日可得而求若以普思可致仙方則秦皇漢武應得之永有天下亦非陛下今日可得而求若以普思可致佛法則漢明梁武應得之永有天下亦非陛下今日可得而求若以普思可致鬼神之道則墨翟干寳各獻於至尊而二主得之永有天下亦非陛下今日可得而求此皆事渉虚妄歴代無效臣愚不願陛下復行之於明時惟堯舜二帝自古稱聖臣觀所行故在人事敦睦九族平章百姓不聞以鬼神之道聽理天下伏望陛下察之則天下幸甚䟽奏不納宋務先為右衛騎曺叅軍神龍初以水災令文武官九品已上直言極諌務先上䟽曰自昔后王樂聞過罔不興拒忠諌罔不亂何者樂聞過則下情通下情通則政無闕此其所以興也拒忠諌則羣議壅羣議壅則上必孤此其所以亂也伏見明制令九品已上直言極諌大哉徳音真堯舜用心禹湯之責已也臣謬叅朝列侵沐聖恩敢不竭愚以副聖㫖狂言抵禁幸陛下寛而宥之臣嘗讀書觀天人相與之際考休咎冥符之兆有感必應其間甚宻是以教失於此變生於彼亦猶影之象形響之赴聲動而輙随各以類應故曰天垂象見吉㓙聖人則之竊見自夏以来水氣勃戾天下郡國多罹其災去前月二十七日雒水暴漲漂損百姓臣謹按五行傳曰簡宗廟廢祠祀則水不潤下矣夫王者即位必郊祀天地嚴配祖宗是故鬼神歆饗多獲福助自陛下光臨寳極綿歴炎涼郊廟遲留不時殷薦山川寂寞未議懐柔水之為災殆因此彂臣又按水者隂類臣妾之道隂氣滿則水泉迸溢加頃虹霓紛錯暑雨滯霪雖丁厥時而汨常度亦隂勝陽之沴也恐後庭近習或有離中饋之職干外朝之政伏願深思天變杜絶其萌又自春及夏牛多病死疫氣浸滛於今未息謹按五行傳曰思之不睿時則有牛禍意者萬㡬之事陛下或未躬視乎昔太戊有異木生於朝伊陟戒以修徳厥妖用殄髙宗有飛雉雊於鼎祖已陳以政事殷道再興此皆視履考祥轉禍為福之明鏡也晁錯曰五帝其臣不及則自親之今朝廷英佐雖多皆莫能仰陛下天光伏願勤思法官少凝大化冝以萬方為念不以聲色為娱以百姓為憂不以犬馬為樂暫勞宵旰用緝明良豈不休哉天下幸甚臣聞三五之辟不能免滛水太平之時不能無小孽供禦之道存乎其人若細微之怪恬而不怪及禍變成象駭而圗之猶水决而繕防病困而求藥雖復黽勉亦何救哉夫災變應天實繫人事故日蝕修徳月蝕修刑若乃雨晹或愆則貎言之咎雩宗之法存乎禮典今暫逢霖雨即閉坊門棄先聖之明訓尊後来之淺術時偶中者安足神耶盖當屏翳收津豐隆戢響之日也豈有一坊一市遂能感召皇天暫開暫閉便欲彂揮神道必不然矣何其謬哉至今巷議街談共呼坊門為宰相謂能節宣風雨爕理隂陽夫如是則赫赫師尹是為虚設悠悠蒼生復何所望也自數年已来公私虚竭户口減耗家無接新之儲國乏俟荒之蓄陛下不出都邑近觀邑市則以為率土之人既庶且富及至踐閭陌視鄉亭百姓食犬彘之食者十室而九矣丁壮盡於邉塞孤孀轉於溝壑猛吏滛威奮其毒暴徵急歛破其資馬困斯佚人窮乃詐或起為姦盜茍事流亡從而刑之良可悲也臣觀今之甿俗率多輕佻人貧而奢不息法設而偽不止長吏貪冒選舉私謁樂多繁滛噐尚浮巧稼穡之人少商旅之人衆誠願坦然更化以身先之端本澄源滌瑕蕩穢接凋殘之後冝緩其力役當久弊之極湏訓以敦龎良牧樹風賢宰革化十年之後生聚方足三代之美庶㡬可還臣聞太子者君之貳國之本易有其卦天有其星今古相循率由兹道陛下自登皇極未建元良非以守噐承祧養徳賛業離明不可輟曜震位不可久空伏願早擇賢能以光儲副上安社稷下慰黎元且親戚之間謗議所集假令漢帝無私於廣國元規切譲於中書天下之人安可户説積疑成患憑寵生災所謂愛之適足以害之也至如左𣪚騎常侍徳静郡王武三思等誠能輟兹機要授彼清閒厚禄以富其身蕃錫以稱其意國家利噐不可以假人朝廷髙秩已越於彛等且夫貪天之功以為己力秘書監鄭普思國子祭酒葉静能等或挟小道而登朱紫或因淺術以帶銀黄既虧國經實悖天道書曰制理于未亂保邦于未危此誠理亂安危之秋也伏願欽祖宗之丕烈惕王業之艱難逺佞人親有徳乳保之母妃主之家以時接見無令媟黷凡此數者今之急務惟陛下留神採納永保康寜䟽奏不省景龍三年為監察御史河南道廵察使以滑州輸丁不多配封全廣有㸃充封户者皆歸避甚於行役嗟吁滿道因上疏奏曰臣聞分珪裂土各有方位通邑大都不以封錫前猷未逺古義亦深自頃命侯稍殊舊式莫居磽塉専擇雄奥徐州貢土方色已乖寝邱辭封譲徳不嗣其滑州者國之近甸宻邇帝畿地出紋縑人多趨射所以列縣為七分封為五王賦少於侯租入家倍於輸國求諸既往實所未聞每科封丁有甚征役因而失業莫反其居此州土風逃者舊少頃日波𣪚良縁封多百姓嗷嗷不堪其弊伏願稍均封户𣪚配餘州下息疲甿上遵古制則公侯不失於采地流泛得還於故鄉諸州封户亦望准此又徵封使者往来相繼既勞傳驛甚擾公私諸附租庸每年送納望停封使以静下人仍編入新格庶為永例又聞五等崇勞百王盛典自非邢茅懿戚㓂鄧鴻勲無以誓彼山河疇其爵土近者封建頗縁恩澤功無横草人已分茅遂使沃壤名蕃多入侯國邑收家稅半於天府經費不足盖亦有由竊見武徳之初建侯故事于時天寳新定王基創開佐命如雲謀臣如雨然而封者不過十數人今禮樂承平邦家繼代有象賢舊徳之裔無野戰攻城之勤至於命封不合全廣論功少於前葉食邑多於往時既減邉儲寔虧國用伏惟酌隆姬之前訓咨武徳之舊章地匪宗盟勲殊社稷不宜加以寔邑自可寵以虚名如是庶績其凝彛倫攸叙臣忝當㢘問備採風謡灼見不安豈敢自黙知必被封家所疾顧嘗以報國為心乞擇愚言訪諸朝宰秋毫有益夕死無恨疏奏不納四年中宗制東都所造聖善寺更開擴五十餘歩以増廣僧房計破百姓數百十家老幼稱寃者甚衆務先上䟽諌曰臣聞有國有家者以恤省為務節用為先故唐堯至化采椽不斵漢文深仁露臺罷搆且西方之聖道貴融心使下人不寜匹夫竊嘆豈菩薩無相布施如来慈悲本㫖哉陛下罔極孝思崇建佛寺土木之功装嚴斯畢僧房精舎宴坐有餘禪宇道塲經行已足更事開擴奪人便利貧者有溝壑之憂富者無安堵之所幸非急務何至於斯况陽和發生播植伊始興役丁匹廢棄農工一夫不耕必有饑者三時之務安可奪焉臣聞失鬼神之心可因巫祝而謝失君長之心可因左右而謝失父母之心可因親戚而謝唯失百姓之心不可解也陛下以萬邦為念何用傷一物之心臣雖至愚猶有所惑方今西戎尚梗北虜未覊戰士老於邉庭後軍屯於塞下甿户流𣪚府藏空虚卒然烽候興一面之虞水旱虐數州之地乗其不意何以禦之伏惟陛下體唐堯漢文之用心思菩薩如来之本意惕邉卒艱難之弊察下人勞怨之聲董逋逃休力役寔倉廩急農桑杜邪枉之門止侈尚之路諸不急之務一切總停應湏擴寺請俟農隙如此則國用充給黎元幸甚䟽奏不納王覿為監察御史神龍初制則天祔廟日令安國相王與遼陽郡王李多祚登輦夹侍覿上疏諌曰竊惟祔廟之禮勅令安國相王與李多祚叅乗且多祚夷人有功於國適可加之寵爵豈可逼奉至尊将帝弟以連衡與吾君而共輦誠恐萬方之人不允所望昔漢文帝引趙談叅乗袁盎伏車前曰臣聞天子所與共六尺輿者皆天下豪英今漢雖乏人陛下獨奈何與刀鋸之餘共載於是斥而下之多祚雖無趙談之累亦非卿相之重不自循省無聞固譲豈國之良輔更無其人史官所書将示後代何袁盎之彊諌獨微臣之不及惟陛下詳擇焉帝謂覿曰多祚雖是夷人縁其有功委以心腹故特令侍輦卿勿復言也冊府元龜卷五百四十四
