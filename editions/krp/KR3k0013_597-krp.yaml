body:
  text: 册府元龜卷五百九十七宋王欽若等撰學校部總序古者家有塾黨有庠術有序國有學然則有虞氏之米廪夏后氏之序商之瞽宗周之頖宮皆學也又云夏曰校商曰序周曰庠故樂正崇四術立四教順先王詩書禮樂以造士王太子王子羣后之太子卿大夫元士之適子國之儁選皆造焉周官小司徒之職師氏掌以三徳三行敎國子保氏掌養國子以道乃教之六藝又春官大司樂掌成均之法以治建國之學政而合國之子弟大胥掌學士之板以待致諸子小胥掌學士之徴令而比之太師教以六詩六徳六律籥師掌教國子舞羽龡籥皆其事也秦置博士掌通古今漢興武帝初置五經博士掌教弟子國有疑事掌承問對本四百石升比六百石初文帝欲廣逰學之路論語孝經孟子爾雅皆置博士至是遂罷傳記博士平帝元始中立學官郡國曰學縣道邑侯國曰校校學置經師一人鄉曰庠聚曰序序庠置孝經師一人後漢光武愛好經術立五經博士凡有一十四人太常差次總領焉取聰明有威重者一人爲祭酒秩六百石建武五年乃脩起大學稽式古典中元元年初建三雍宮明堂辟雍靈臺也至明帝親行其禮靈帝光和初置鴻都門學魏文帝黃初中立太學置春秋糓梁博士晉承魏制置博士十九人武帝咸寧四年初立國子學以教生徒而𨽻屬太學定置國子祭酒博士各一人助教十五人以教生徒博士皆取履行淸淳通明典義者若散騎常侍中書侍郎太子中庶子以上皆得召試元帝初减國子祭酒博士助教爲九人大興中又置周易儀禮公羊博士末年增儀禮春秋公羊博士各一人合爲十一人後又增爲十六人不復分掌五經而謂之太學博士秩六百石孝武太元中損國子助教爲十員宋國子祭酒若不置學則助教唯置一人明帝泰始中以國學廢初置總明觀眞儒文史四科科置學士各十人正令史一人書令史二人幹一人門吏一人典觀吏二人齊髙帝建元中有司奏置國學祭酒准諸曹尚書博士准中書郎助教准南臺御史選經學爲先若其人難備給事中以還明經者以本位領其下典學二人三品准太常主簿户曹儀曹各二人五品白簿治禮吏八人六品保學醫威儀各二人其夏廢學有司奏省助教以下又有總明觀祭酒一人掌治五禮大始六年以國學廢初置永明三年國學建遂省梁國子祭酒人班第十三比列曹尚書又置國子博士二人爲九班助教班第二又置大學博士八人班第三又置五經博士各一人陳國子祭酒秩中二千石品第三博士品第四秩千石國子助教大學博士竝品第八秩六百石律學博士秩品亦同後魏道武始建都邑􅀈以經術爲先立太學置五經博士太武又别起太學於城東獻祖又立郡學置博士二人助教二人後詔大郡立博士二人助教四人次郡立博士助教各二人中郡立博士一人助教二人下郡立博士助教各一人孝文改中書學爲國子學建明堂辟雍及遷都雒邑又立國子太學四門學宣武又詔營國學樹小學於四門國子祭酒本第四品上後增爲從三品國子博士從第五品上後增爲第五品國子助教五人從七品大學博士第六品後䧏爲第七品大學助教第八品中四門博士第九品律博士第六品中後降爲第九品上比齊國子寺掌訓教胄子祭酒一人從三品又置功曹五官主簿錄事等員博士五人品第五助教十人太學博士十人從第七品助教二十人從第九品四門博士二十人正九品上亦有助教二十人後周依周禮建六官之職春官太學博士下大夫四命助教及小學博士上士三命皆國子監之屬官也祭酒無聞焉武帝又立露門學隋國子寺開皇中𨽻太常祭酒一人屬官有功曹主簿錄事各一人統國子太學書筭學各置博士國子太學四門各五人書筭各二人助教國子太學四門各五人書筭各二人仁壽初罷國子唯置太學煬帝改太學爲國子監初置司業一人丞三人唐置國子監祭酒司業之職掌邦國儒學訓導之政祭酒一人司業二人屬官有丞主簿錄事府史亭長掌固等員國子博士二人掌教文武官三品以上及國公子孫從二品以上曾孫之爲生者屬官有助教學生典學廟幹掌固等員大學四門亦然大學博士三人掌教文武五品以上及郡縣公子孫從三品曾孫之爲生者四門博士三人掌教文武七品以上及侯伯子男子之爲生者若庶人子爲儁士生者國子直講四人掌佐博士助教之職專以經術講授而已律學博士一人掌教文武官八品以下及庶人子之爲生者以律令爲專業格式法例所兼習之屬官有助教學生典學等員書學筭學亦然書學筭學各博士二人竝掌教文武官八品以下庶人子之爲生者以書筭自武徳初以國子學𨽻太嘗寺又省國子司業及丞貞觀初改國子寺爲監六年復置國子司業一人龍朔二年改國子監爲司成舘祭酒爲大司成司業爲少司成博士爲司成宣業又於東都置國子監其學生於兩京教授咸亨初年改司成舘復爲國子監大司成復爲祭酒少司成復爲司業本一員至太極初年加一員光宅初改國子監爲成均監祭酒爲成均祭酒長安四年國子監始置直講焉神龍初改成均監復爲國子監成均復爲祭酒天寶九年置廣文舘領國子監進士業者博士助教各一人五代因之教化之本學校爲先振古以來歴代而下莫不慎擇能者以居其任業專所以世守師嚴然後道尊馳辨彰乎洽聞抗議明乎適變考論章句則析理惟精刋定闕疑則伏膺罔倦因祖述而綴舊學次甲乙而總群綱小道可觀靡不覃究用被國奬實耀儒林若乃自負好勝爭名忌前亦著於篇以示懲艾凢學校十有五門選任世業選任自漢承秦弊宗尚經術求稽古之士重學官之選歴代而下雖廢置或異而授受之際未嘗輕焉觀其延登鴻碩優隆體貌崇其位著厚其祿廪豈徒冗大官之食重高門之地而已亦將以發揮典籍申明治具顧有益於風教耳非夫大雅宏逹博聞彊識究先王之法言蘊專門之素業式可莫二籍甚有聞卽何以稱法師之望恢教授之業敷暢先儒之微㫖誘掖方來之儁士以丹青帝載而化民成俗者哉漢叔孫通薛人秦時以文學待詔博士張生濟南人受尚書於伏生文帝時爲博士賈誼雒陽人河南守吳公爲廷尉廼言誼年少頗通諸家之書文帝詔以爲博士韓嬰燕人推詩人之意而作内外傳數萬言文帝時爲博士孫商至武帝亦爲博士董仲舒廣川人以治春秋景帝時爲博士進退容止非禮不行學士皆師尊之胡母生字子都齊人治公羊春秋爲景帝博士與董仲舒同業轅固生齊人以治詩景帝時爲博士食子公河南人受韓生詩於同郡蔡誼昭帝時爲博士長孫順淄川人受韓詩於昌邑王中尉王吉爲博士韋賢字長孺魯國鄒人篤志於學兼通禮尚書時人號稱鄒魯大儒徵爲博士嚴彭祖字公子東海下邳人與顔安樂俱事晆孟孟弟子百餘人唯彭祖安樂爲明繇是公羊春秋有嚴顔之學彭祖爲宣帝博士施讎字長卿沛人爲童子從田王孫受易王孫爲博士復從卒業宣帝時少府梁丘賀薦讎結髮事師數十年從結髮爲童子卽從師學著其早也賀不能及詔拜讎爲博士江公瑕邱人受糓梁春秋及詩於魯申公傳子至孫宣帝時沛人蔡千秋能說榖梁爲郎中戸將㑹千秋病死徴江公孫爲博士劉向以故諫大夫通逹待詔受糓梁欲令助之周慶丁姓二人姓名也宣帝時待詔保宮少府屬官也詔五經名儒太子太傅蕭望之等大議殿中平公羊榖梁同異慶姓皆爲博士王式字翁思東平新桃人受詩於免中徐公及許生式爲昌邑王師昌邑廢式得減死歸家後東平唐長賔沛禇少孫應博士弟子選詣博士摳衣登堂頌禮甚嚴摳衣謂以手内舉令離地也諸博士驚問何師對曰事式皆素聞其賢共薦之詔除下爲博士下除官之詔也張長安字㓜君山陽人與唐長賔禇少孫事王式皆爲博士繇是魯詩有張唐禇氏之學長安門人陳留許晏亦爲博士殷嘉東海人姚平河東人乘𢎞乗姓也音食翰切河南人受易於京房成帝時皆爲博士繇是易有京氏之學士孫張字仲方平陵人受易於五鹿充宗爲博士孟喜字長卿東海蘭陵人善爲禮春秋授后蒼疏廣世所傳后氏禮疏氏春秋皆出孟喜喜後舉孝廉爲郎曲臺署長曲臺殿名署者主供其事歐陽生字和伯千乘人受伏生尚書爲博士其子世世相傳至曾孫髙子陽爲博士髙孫地餘長賔以太子中庶子授太子後爲博士論石渠林尊字長賔濟南人事歐陽高爲博士論石渠周堪字少卿齊人與孔覇俱事大夏侯勝覇爲博士堪譯官令論於石渠經爲最高張山拊字長賔平陵人事小夏侯建爲博士論石渠后蒼字近君東海郯人事夏侯始昌始昌通五經蒼亦通詩禮爲博士後漢牟長字君髙樂安臨濟人少習歐陽尚書不仕王莽世光武建武初大司空宋𢎞特辟拜博士洼丹洼音圭南陽育陽人也世傳孟氏易學義研深易家宗之稱爲大儒建武初爲博士丁恭字子然山陽東緡人東緡今兖州金鄉縣習公羊嚴氏春秋恭學義精明教授嘗數百人州郡請召不應建武初爲博士髙詡字季囬平原般人世傳魯詩建武初爲符離長去官後徴爲博士李封魏郡人建武初鄭興陳元傳春秋左氏學時尚書令韓歆上疏欲爲左氏立博士范升與歆爭之未决陳元上書訟左氏遂以封爲左氏博士張興字君上潁川鄢陵人習梁丘易建武中辟司徒馮勤府舉孝廉爲博士張𤣥字君夏河内河陽人少習春秋顔氏兼通數家建武中舉孝廉爲郎會顔氏博士缺𤣥試策第一拜爲博士戴慿字次仲汝南平輿人習京氏易年十六郡舉明經徴博士伏恭字叔齊瑯琊東武人明齊詩建武中爲劇令靑州舉爲尤異太常試經第一拜博士甄宇字長文北海安丘人習嚴氏春秋教授嘗數百人建武中爲州從事徴拜博士桓榮爲議郎會歐陽尚書博士缺光武欲用榮叩頭讓曰臣經術淺薄不如同門生郎中彭閎揚州從事臯𢎞帝曰俞往汝諧周澤字穉都北海安丘人少事公羊嚴氏春秋建武末辟大司馬府署議曹祭酒數月徴試博士董鈞字文伯犍爲資中人習慶氏禮建武中舉孝廉辟司徒鈞博通古今數言政事明帝永平初爲博士魏應字君伯任城人少好學詣博士受業習魯詩明帝永平初爲博士李育字元春扶風漆人也漆縣今幽州辛平少習公羊春秋沉思專精博覽書傳知名大學章帝建初元年衞尉馬廖舉育方正爲議郎後拜博士詔與諸儒論五經於白虎觀楊倫字仲理陳留東昏人習古文尚書安帝元初中郡禮請三府竝辟公車徴皆辭疾不就後特徴博士周防字偉公汝南汝陽人師事徐州刺史葢豫受古文尚書經明舉孝廉拜郎中撰尚書雜記四十萬言安帝初太尉張禹薦補博士魏邯鄲淳一名竺字子叔博學有文章文帝初爲五官將博延英儒亦宿聞淳名因啓淳欲使在文學官屬中會臨淄侯植亦求淳太祖遣詣植及文帝卽位以淳爲博士蘓林字孝友陳留人博學多通古今字指漢末爲五官將文學甚見禮待黃初中爲博士帝作典論所稱蘇林是也蜀來敏字敬逹義陽新野人渉獵書籍善左氏春秋漢末入蜀嘗爲劉璋賔客先主定益州署敏典學校尉許慈字仁篤南陽人師事劉熈善鄭氏學治易尚書三禮毛詩論語漢末自交州入蜀時魏郡胡濳亦在益土先主定蜀承䘮亂厯紀學業衰廢乃鳩合典籍沙汰衆學慈濳竝爲博士尹黙字思濳梓潼涪人通諸經史又專精於左氏春秋先主定益州領牧以爲勸學從事子宗傳其業爲博士晉曹志字允恭魏陳思王植之子少好學以才行稱武帝時厯樂平章武趙郡太守咸寧初詔曰甄城公曹志篤行履素達學通識宐在儒林以𢎞胄子之教其以志爲散騎常侍國子博士後遷祭酒杜夷字行齊廬江灊人博覽經籍百家之書靡不畢究元帝爲丞相教曰今大義頺替禮典無宗朝廷滯義莫能攸正宐特立儒林祭酒官以𢎞其事處士杜夷棲情遺遠確然絶俗才學精博道行優備其以夷爲祭酒夷辭疾未就又除國子祭酒謝沉字行思博學多識明練經史康帝卽位朝議七廟迭毁乃以太學博士徴以質疑滯范𢎞之字長文安北將軍汪之孫雅正好學以儒術該明孝武時爲太學博士宋徐廣字野民好學尤精百家數術無不研覽初仕晉孝武帝以廣博學除爲秘書郎校書秘閣增置職僚轉員外散騎侍郎領校書如故江湛字徽深文帝元嘉末爲左衞將軍時改選學職以太尉江夏王義恭領國子祭酒湛及侍中何攸之領博士南齊王儉初仕宋爲秘書丞初孝武好文章天下悉以文采相尚莫以專經爲業儉弱年便留心三禮尤善春秋明帝泰始六年置總明觀於儉宅開學士舘以總明四部書充之又詔儉以家爲府及武帝永明三年以丹陽尹領國子祭酒儉子暕暕子承其後皆爲祭酒張緒字思曼長於周易言精理奥見宗一時髙帝建元末初立國子學以緒爲太常卿領國子祭酒武帝時累遷太子詹事永明七年竟陵王子良爲司徒領國子祭酒帝敕王晏曰吾欲令司徒辭祭酒以授張緒物議以爲如何子良竟不拜以緒領國子祭酒梁孔休源字慶緒齊末舉秀才爲竟陵王西邸學士梁臺建與劉之遴同爲太學博士當時以爲美選伏暅字𤣥曜臨海太守曼客之子幼傳父業仕齊爲鄞令髙祖天監初兼五經博士與吏部尚書徐勉中書侍郎周捨總知五禮事出爲永陽内史復徴爲國子博士復爲豫章内史徴拜黃門侍郎領國子博士嚴植之字孝源少精解䘮服孝經論語及長遍治鄭氏禮周易毛詩左氏春秋天監二年判後車騎兵叅軍事四年初置五經博士各開舘教授以植之兼五經博士六年遷中撫軍記室叅軍猶兼博士賀瑒字德璉舉明經揚州祭酒俄兼國子助教太學博士天監四年初開五舘以瑒兼五經博士明山賔爲治書侍御史右軍記室叅軍掌治吉禮時初置五經博士山賔首應其選後以東宮新置學士又以山賔居之俄以本官兼國子祭酒崔靈恩淸河武城人遍通五經尤精禮傳初仕後魏爲太常博士天監十三年歸國髙祖重其儒術累遷歩兵校尉兼國子博士後爲長沙内史還除國子博士盧廣范陽涿人少明經有儒術天監中歸國拜國子博士遍講五經尋遷員外散騎常侍博士如故沈峻字士嵩吳興武康人好學遍遊講肆遂博通五經尤長三禮初爲王國中尉稍遷侍郎竝兼國子助教僕射徐勉奏峻兼五經博士於館講授後爲華容令還除員外散騎侍郎復兼五經博士孔僉㑹稽山陰人通五經尤明三禮孝經論語講說竝數十徧厯官國子助教三爲五經博士太淸亂卒於家僉子叔𤣥頗渉文學官至太學博士陳沈文阿字國衞父峻以文學名於梁氏文阿少習父業研精章句察孝廉爲梁臨川王國侍郎累兼國子助教五經博士文帝時遷通直散騎常侍兼國子博士鄭灼字茂昭東陽人仕梁爲西省義學士孝元承聖中除通直散騎侍郎兼國子博士高祖世祖之世累遷中散大夫兼國子博士沈徳威字懷遠梁末遯於天目山篤學無倦遂治經業文帝天嘉初授太學博士轉國子助教每自學還私家講授尋遷太常丞兼五禮學士顧越字思南說毛詩旁通奥義尤善持論梁末補五經博士敬帝紹㤗元年遷國子博士文帝以越篤學厚遇之除給事黃門侍郎又領國子博士後魏梁越字𤣥覽博綜經傳無所不通國初以爲禮經博士道武以其謹厚舉動可則拜上大夫命授諸皇子經李訢爲中書學生聰敏機辨彊記明察初李靈爲文成博士諮議崔浩選中書學生器業優者爲助教浩舉其弟子箱子與盧度世李敷三人應之給事髙讜子祐尚書叚覇兒姪等以爲浩阿其親戚言於恭宗以浩爲不平聞之於太武太武意在於訢曰云何不取幽州刺史李崇老翁兒也浩對曰前亦言訢合選但以其先行在外故不取之太武曰可待訢還箱子等罷之訢爲太武所識如此遂除中書助教博士張偉字仲業學通諸經太武時與髙允俱被辟命拜中書博士索敞字巨振燉煌人爲劉昞助教專心經籍盡能傳昞之業凉州平入國以儒學見拔爲中書助教博士平恒字繼叔研綜經籍安貧樂道不以屢空改操徴爲中書博士穆弼渉獵經史孝文初定氏族欲以弼爲國子助教弼辭曰先臣以來蒙恩累世比較徒流實用慙屈孝文曰朕欲敦厲胄子故屈卿光之白玉投泥豈能相汚弼曰旣遇明時耻沉泥滓祖瑩范陽人爲中書學生孝文召入令誦五經章句竝陳大義帝嗟賞之瑩出後孝文戲盧㫤曰昔流共工於幽州北裔之地那得忽有此子㫤對曰當是才爲世生以才名拜太學博士劉芳爲通直常侍孝文詔以芳經學精洽超遷國子祭酒董徴字文發頓邱衞人從博陵劉獻之徧受諸經數年之中大義精練講授生徒太和末爲四門小學博士崔景儁梗正有髙風好古博渉以經明行修徴拜中書博士北齊李鉉字寶鼎渤海南皮人撰定孝經論語毛詩三禮義疏及三傳異同周易義例東魏末舉秀才除太學博士文宣天保初詔鉉與殿中尚書邢邵中書令魏收等叅議禮律仍兼國子博士時詔北平太守宋景業西河太守綦母懷文等草定新厯録尚書平原王髙隆之令鉉與通直常侍房延祐國子博士刁柔叅考得失尋正國子博士刁柔字子溫渤海人綜習經史尤留心禮儀髙祖令教授諸子文宣天保初除國子祭酒博士張買奴平原人經義該博諸儒咸推重之厯太學博士邢峙字士峻河南鄚人通三禮左氏春秋天保初郡舉孝廉授四門博士遷國子助教又拜國子博士張雕中山北平人徧通五經尤明三傳廢帝乾明初除國子博士琅琊王儼求博士精儒學有司以雕應選時號得人累遷國子祭酒馬敬徳河間人少好儒術留意於春秋左氏舉秀才中第乃請試經業問十條竝通擢授國子助教遷太學博士後主天統初除國子博士武平初拜國子祭酒孫靈暉長樂武彊人舉秀才射䇿髙第後以儒術甄明擢授太學博士累遷潼郡太守天統中勑令朝臣推舉可爲南陽王綽師者吏部尚書尉瑾表薦之徴爲國子博士授南陽王經劉軌思渤海人說詩甚精天統中任國子博士鮑季詳渤海人甚明禮兼通左氏春秋諸儒稱之天統中爲太學博士張思伯河間樂城人善說左氏亦治毛詩章句以二經教齊安王廓武平初拜國子博士後周沈重字徳厚吳興武康人專心儒術博覽群書尤明詩禮及左氏春秋初仕梁髙祖髙祖置學官以崇儒教中大通四年乃革選以重補國子助教大同二年除五經博士盧誕仕西魏爲散騎常侍太祖以誕儒宗學府爲當世所推乃拜國子祭酒薛慎爲太祖丞相府墨曹叅軍太祖於行臺省置學取丞郎及府佐徳行明敏者充生悉令旦理公務晩就講習先大經後子史又於諸生中簡徳行純慤者侍讀書慎與隴西李伯良辛韶武功蘓衡譙郡夏侯裕安定梁曠梁禮河東裴舉薛同滎陽鄭朝等十二人竝應其選又以慎爲學師以知儒生課業樊深字文深講習五經晝夜不倦太祖置學於東舘教諸將子弟以深爲博士深經學通贍儒者推其博物後除國子博士六官建拜太學助教遷博士蕭撝字智遐博觀經史雅好屬文武帝時爲上州刺史及入朝屬置露門學帝以撝與唐瑾元偉王褒等四人俱爲文學博士熊安生字植之博通五經專以三禮教授北齊河淸中陽休之奏爲國子博士武帝入鄴令隨駕入朝至京勅令於大乗佛寺叅議五禮宣政元年拜露門博士下大夫樂遜字遵賢西魏廢帝二年太祖召遜教授諸子講孝經論語毛詩及服䖍所注春秋左氏傳授太學助教閔帝元年治太學博士轉治小師氏下大夫宣帝大象中又爲露門博士隋房暉遠字崇儒常山眞定人治三禮春秋三傳詩書周易嘗以教授爲務北齊南陽王綽爲定州刺史聞其名召爲博士周武帝平齊搜訪儒俊暉遠首應辟命授小學下士及髙祖受禪太常卿牛𢎞每稱爲五經庫吏部尚書韋世康薦之遷太學博士後爲國子博士王頍初仕後周武帝引爲露門學士每有議决多頍所爲髙祖開皇初授著作佐郎於國子講授會髙祖親臨釋奠祭酒元善講孝經頍與相論難詞義鋒起善往往見屈髙祖大奇之超授國子博士馬光字榮伯武安人尤明三禮爲儒者所宗開皇初髙祖徴山東義學之士光與張仲讓孔籠竇士榮張黒奴劉祖仁等俱至竝授太學博士時人號爲六儒禇輝字高明吳郡人以三禮學稱於江南煬帝時徴天下儒術之士悉集内史省相次講論輝博辨無能屈者於是擢爲太學博士唐徐文遠雒州偃師人博覽五經尤精左傳隋開皇中累遷太學博士大業初擢授國子博士時人稱文遠之左氏爲一時之最陸徳明蘓州人陳宣帝大建中大徴四方名儒講于承光殿徳明年弱冠往預焉後帝禎明中爲國子助教煬帝嗣位以爲秘書學士大業中廣召明經之士四方至者甚衆遣徳明與魯逹孔褒俱會門下省共相駁難無出其右者授爲國子助教髙祖武徳中補太學博士太宗貞觀中拜國子博士孔頴逹字仲逹冀州衡水人隋大業初舉明經髙第授河内郡博士煬帝徴諸郡儒官集於東都令國子秘書學士與之論難頴逹爲最補太學助教太宗在藩引爲秦府文學舘學士及卽位擢授國子博士貞觀六年累除國子司業歳餘遷太子右庶子仍兼國子司業與諸儒議厯及明堂皆從頴逹之說十二年拜國子祭酒司馬才章魏州貴鄕人父烜博渉五經善緯候才章少傳其業隋末爲郡博士貞觀初太宗謂侍臣曰隋末學者凋䘮儒教凌遲唯陸徳明徐文遠爲儒𤣥壼奥二三年間相次殂殁豈有後進之士經業優洽而未深用者乎因徴才章及王琰王恭俱拜爲博士才章爲國子助教王恭爲太學博士葢文懿貝州宗城人武徳初爲國子助教時髙祖别於秘書省置學教授王公之子以文懿爲博士貞觀中除國子博士許叔牙少精于毛詩禮記尤善諷詠貞觀初累授晉府叅軍兼侍王讀書字遷太子洗馬兼崇賢館學士仍兼侍讀馬嘉運繁水人專精儒業貞觀十一年召拜太學博士𢎞文館學士羅道綜少爲太學生勤於學業髙宗末爲太學博士禇無量字𢎞度杭州鹽官人尤精三禮及史記中宗朝累除國子博士遷司業兼脩文館學士以母老請停官歸侍𤣥宗在東宮召拜國子司業兼皇太子侍讀及卽位兼遷國子祭酒歸崇敬字正禮蘓州吳人天寶初以經業擢第調授四門助教轉博士司業徳宗建中初又拜國子司業馮伉京兆人少有經學累登五經秀才及博士三史科徳宗貞元中爲皇太子及諸王侍讀憲宗元和初拜國子祭酒後爲散騎常侍復領太學史廻文宗太和初爲四門館助教四年閏十二月國子監以廻及處士成子野葢繇庚梁徳方前越州叅軍疆嘉徴等皆通經術准長慶元年赦書節文得以薦聞請勑所在州府給將服許傳遞至都與太學諸生講訖仍乞委中書門下更加搜訪如有此比准徴赴廷從之周田敏初仕漢乾祐中爲戸部侍郎兼國子祭酒時桑維翰執政時或有不悅敏者言未有學官兼丞郎者又言敏長于經義唯學官最稱職維翰乃去戸部侍郎祗爲祭酒加檢校右僕射尋而復除右丞兼判國學世業自夫子之以詩禮授伯魚而有趨庭之訓其後漢武表章六經始立博士開弟子員設科射策勸以官祿學者寖盛葢獲利之使然爾故有父子講習以著專門之稱世家祖述以成傳業之美莫不達章句之要精詁訓之說克纘前緒見推當時以至厯世祚之遐邈不墜其素風誨生徒以蕃熾益廣乎遺教名家獨出蔚爲儒宗稽古擅譽以階榮爵葢韋賢有言斥籯金之非寶夏侯立論謂朱紫之可拾斯不誣矣漢孔光字子夏孔子十四世之孫孔子生伯魚鯉名鯉字伯魚先言其字者孔氏自爲譜系示尊其先也鯉生子思伋伋生子上白白生子家求求生子真箕箕生子髙穿穿生順順爲魏相順生鲋鲋爲陳渉博士死陳下鲋弟襄爲孝惠博士長沙太傅襄生忠忠生武及安國武生延年延年生覇字次儒覇生光焉安國延年皆以治尚書爲武帝博士安國至臨淮太守覇亦治尚書光位至丞相士孫張字仲方受易於五鹿充宗官至給事中家世傳業兒寛受尚書於孔安國而歐陽大小夏侯氏學皆出於寛寛授歐陽生子世世相傳至曾孫髙子陽爲博士名髙字子陽髙孫地餘長賔以太子中庶子授太子後爲博士論石渠地餘少子政爲王莽講學大夫繇是尚書世有歐陽氏學寛位至御史大夫韓嬰孫商為博士宣帝時涿郡韓生其後也以易徴待詔殿中曰所受易卽先太傅所傳也嘗受韓詩不如韓氏易深滿昌字君都通詩禮爲詹事家世傳業瑕丘江公受穀梁春秋及詩於魯申公傳至子孫爲博士徐良字遊卿受大戴禮爲博士家世傳業夏侯勝其先夏侯都尉從濟南張生受尚書以傳族子始昌始昌傳勝勝又事同郡簡卿兒寛門人勝傳從兄子建繇是尚書有大小夏侯之學勝位至太子太傅橋仁字季卿受小戴禮爲大鴻臚家世傳業韋賢治詩事大江公及許生大江公卽瑕丘江公也又治禮至丞相傳子𤣥成以淮陽中尉論石渠後亦至丞相𤣥成及兄子賞以詩授哀帝繇是魯詩有韋氏學王中受嚴彭祖春秋爲元帝少府家世傳業尹更始授左氏傳取其變理合者以爲章句傳子咸官至諫大夫長樂戸將劉向爲中壘校尉子歆爲黃門郎河平中受詔領校秘書哀帝初卽位大司馬王莽舉歆宗室有才行爲侍中大夫遷騎都尉奉車光祿大夫幸貴復領五經卒父前業後漢洼丹世傳孟氏易建武初爲博士髙詡曾祖父嘉以魯詩授元帝仕至上谷太守父容少傳家學哀平間爲光祿大夫詡以父任爲郎中世傳魯詩徴爲博士耿况以明經爲郎子弇少好學習父業袁山松書曰弇少學詩禮明銳有權謀曹褒字叔通父充治慶氏禮慶普字孝公爲東平太傅受禮于后蒼號慶氏禮建武中爲博士褒少篤志有大度結髪傳充業博雅疏通尤好禮事褒位至侍中徐防祖父宣爲講學大夫以易教授王莽父憲亦傳宣業防少習父祖學位至太尉鄧甫徳爲開封令學傳父業陳元父欽習左氏春秋王莽從欽受學以欽爲厭難將軍元少傳父業爲之詁訓銳精覃思至不與鄕里通歐陽歙自歐陽生傳伏生尚書至歙八世皆爲博士伏湛字惠公琅琊東武人九世祖勝字子賤所謂濟南伏生也湛父理爲當世名儒以詩授成帝爲髙密太傅别自名學爲髙密王寛傅也寛武帝𤣥孫廣陵王胥後也湛性孝友少傳父業教授數百人成帝時以父任爲博士弟子初自伏生以後世傳經業湛子翕翕子光光子辰辰子無忌無忌亦傳家學博物多識順帝時爲侍中永和元年詔無忌與議郎黃景校定中書五經諸子百家藝術中書内中之書也桓榮受朱普學章句四十萬言浮辭繁長多過其實及榮入授顯宗減爲二十三萬言榮子郁復刪省定成十二萬言繇是有桓君大小太常章句郁敦厚篤學傳父業以尚書教授門徒有數百人郁中子焉能傳其家學焉孫典字公雅復傳其家業以尚書教授潁川門徒至數百人一云伏氏自東西京相襲爲名儒以取爵位而桓氏尤盛自榮至典而世宗其道父子兄弟代作帝師受其業者皆至卿相顯于當時榮位至太常少卿鮑永少有志操習歐陽尚書子昱少傳父學客授於東平永位終兖州牧劉軼字君文父昆受施氏易於沛人戴賔教授弟子嘗五百餘人軼傳父業門徒亦盛位至宗正鄭衆字仲師從父授左氏春秋子安世亦傳家業爲長樂未央廐令伏黯以明齊詩改定章句作解說九篇位至光祿勲子恭少傳黯學除劇令舉尤異太常試經第一拜博士以父章句繁多乃省減繁辭定爲二十萬言薛漢世習韓詩父子以章句著名漢少傳父業教授嘗數百人建武初爲博士當世言詩者推漢爲長袁安祖父良習孟氏易安少傳良學安子敞及京亦傳易經教授京作難記三十萬言京子彭字伯楚少傳父業彭弟湯字仲和亦傳家學諸儒稱其節多歴顯位安位至太尉甄宇習嚴氏春秋教授嘗數百人位至太子少傅傳業子普普傳子承承講授嘗數百人子孫傳學不絶劉丕博學號爲通儒子寵少受父業以明經舉孝廉李郃字孟節漢中南鄭人父頡以儒學稱官至博士郃習父業遊太學通五經善河雒風星當世稱之宋意字伯志父京以大夏侯尚書教授至遼東太守意少傳父業楊震字伯起少好學受歐陽尚書於太常桓郁震中子秉字叔節少傳父業兼明京氏易博通書傳嘗隱居教授秉子賜字伯獻亦傳家學篤志博聞嘗退居隱約教授門徒震少子奉奉子敷敦志博聞議者以爲能世其家敷早卒子衆亦傳先業震位至太尉孔奮少從劉歆受春秋左氏傳弟竒博通經典作春秋左氏刪刪定其義也奮晩有子嘉官至城門校尉作左氏說云說猶今之疏也牟長習歐陽尚書爲博士子紓又以隱居教授門生千人曹曾從歐陽歙受尚書門徒三千人位至諫議大夫子祉河南尹傳父業教授崔駰通詩易春秋子瑗字子玉早孤銳志好學盡能傳其父業年十八至京師從侍中賈逵質正大義逵善待之竇憲爲車騎將軍辟駰爲掾賈逵父徽習左氏春秋兼習國語周官又受古文尚書於塗惲學毛詩於謝曼卿逵悉傳父業弱冠能誦左氏傳及五經本文以大夏侯尚書教授雖爲古學兼通五家糓梁之說自爲兒童嘗遊太學不通人間事位至侍中楊統曾祖父仲續代修儒學以夏侯尚書相傳郎顗父宗學京氏易能望氣占候顗少傳父業後拜郎中辭不就翟酺四世傳詩酺好老子尤善圖緯天文厯筭位至將作大匠張酺少從祖父充受尚書能傳其業又事太常桓榮勤力不怠聚徒以百數位至太尉孔僖二子長彦好章句學季彦守其家業門徒數百人僖官至臨晉令馬日磾字翁叔馬融之族子少傳融業以才學進與楊彪盧植蔡邕等典校中書歴位九卿遂登台鼎蜀許慈字仁篤治易尚書三禮毛詩論語子勛傳其業復爲博士尹黙字思濳從司馬徳操宋仲子等受古學皆通諸經史子宗傳其業爲博士吳虞飜太嘗時爲騎都尉飜初立易注奏上曰臣聞六經之始莫大陰陽是以伏羲仰天懸象而建八卦觀變動六爻爲六十四以通神明以類萬物臣髙祖父故零陵太守光治孟氏易曾祖父故平輿令成纘述其業至臣祖父鳯爲之最密臣亡考故日南太守歆受本於鳯最有故書世傳其業至臣五世晉王愆期父接官至征虜將軍嘗注公羊又撰列女後傳愆期流寓江南緣父本意更注公羊又集列女後傳云范宣尤善三禮嘗以講誦爲業子輯亦以講授爲事宣以太學博士散騎郎竝徴不就宋杜坦祖預注春秋左氏傳坦與弟驥傳其家業坦位至左將軍南齊裴昭明河東聞喜人祖松宋太中大夫父駰南中郎叅軍昭明少傳儒史之學爲太學博士梁明山賔爲國子博士卒其子興道亦傳父業歴官太學博士禇脩父仲都善周易天監中脩歴官五經博士脩少傳父業兼通孝經論語范縝字子眞尤精三禮爲中書郎國子博士卒官子胥字長才傳父學起家太學博士賀瑒字徳璉會稽山陰人祖道立善三禮爲尚書三公郎建康令瑒少傳家業爲五經博士子革字文明少通三禮及長徧治孝經論語毛詩左傳賀琛伯父瑒爲世碩儒授經於琛髙祖聞琛學術召見文徳殿與語悅之謂僕射徐勉曰琛殊有世業仍補王國侍郎俄兼太學博士孔僉通五經尤明三禮歴官國子助教三爲五經博士子叔𤣥頗渉文學官至太學博士僉兄子元素又善三禮有盛名司馬筠字貞素博通經術尤明三禮累加左丞出爲始興内史卒官子夀傳父業亦明三禮歴官尚書祠部郎出爲曲阿令沈峻爲五經博士卒子文阿傳父業尤明左氏傳太淸中自國子助教爲五經博士陳杜之偉字子大吳郡錢塘人家世儒學以三禮專門父規梁奉朝請之偉有逸才七歳受尚書稍習詩禮畧通其學十五遍觀文史儀禮故事時軰嘉其早成累遷太中大夫顧越字思南吳郡鹽官人所居新坡黃堈世有鄕校繇是顧氏多儒學焉越少孤以勤苦自立說毛詩旁通異義梁世補五經博士賀徳基字承業世傳禮學祖文發父淹仕梁俱爲祠部郎竝有名當世徳基於禮記稱爲精明居以傳授累遷尚書祠部郎徳基雖不至大官而三世儒學俱爲祠部時論美其不墜焉後魏李曾少治鄭氏禮左氏春秋以教授爲業三辟功曹竝不就子孝伯少傳父業博綜群言孝伯兄祥字元善學傳家業鄉黨宗之江式字法安陳留濟陽人六世祖瓊字孟琚晉馮翊太守善䖝篆詁訓永嘉大亂瓊棄官西投張軌子孫因居凉土世傳家業祖彊字文威後魏太延五年凉州平内徙代京上書三十條各有體例又獻經史諸子千餘卷繇是擢拜中書博士式少傳家學兼著作郎劉獻之饒陽人善春秋毛詩每講左氏盡隱公八年便止云義例已了不復須解孝文幸中山詔徴典内校書固以疾辭四子放古爰古參古修古竝傳父詩北齊馬敬徳河間人少好儒術負笈隨大儒徐遵明學詩禮畧通大義遂留意於春秋左氏爲諸儒所稱累授助教博士侍講東宮子元熙字長明傳父業兼事文藻累遷散騎侍郎待詔文林館後主武平中皇太子將講孝經有司請擇師友帝曰馬元熙朕師之子可令教兒儒者榮其世載顔之推字子介琅琊臨沂人父勰世善周官左氏梁湘東王諮議參軍之推早傳家業博覽群書無不該遍湘東以爲國左常侍後周盧辨字景宣范陽涿人累世文學父靖太常丞辨少好學博通經術舉茂才爲太學博士以大戴禮未有解詁辨乃注之其兄景裕爲當世碩儒謂辨曰昔侍中注小戴今爾注大戴庶纂前脩矣隋包愷字和樂東海人其兄愉明五經愷悉傳其業爲國子助教庾季才爲太史中大夫藝術精通子質復爲太史令質子儉亦傳父業兼有學識唐顔籀字師古琅琊臨沂人祖之推仕北齊爲黃門侍郎有盛名父思魯少以學業稱武徳初爲秦府記室參軍事師古少傳家業博學羣言多所詳練尤精詁訓善屬文累遷秘書監𢎞文館學士卒許孟容京兆長安人父鳴謙究通易象官至撫州刺史孟容少以文詞知名舉進士後究王氏易登科授秘書省校書郎蔣乂字徳源祖環太子洗馬開元初𢎞文館學士父蔣明累遷國子司業集賢殿學士代爲名儒乂史官吳兢之離孫㓜便記覽弱冠博通群籍史才尤長宰相張益見而竒之署集賢小職册府元龜卷五百九十七
