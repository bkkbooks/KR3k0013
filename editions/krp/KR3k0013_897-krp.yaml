body:
  text: 册府元龜巻八百九十七宋王欽若等撰總録部改過悔過改過傳曰弗知實難夫子有言曰主忠信無友不如己者過則勿憚改過而不改是為過矣法語之言能無從乎改之為貴子貢曰君子之過也如日月之食焉過也人皆見之更也人皆仰之是知人誰無過過而能改善莫大焉故顔淵亞聖乃稱不貳蘧瑗大賢猶曰知非然要在乎眀於自知闇於自是君子所以敦五常謹百行遵大易考祥之㫖守曲禮踐言之教加之以聽忠告之言慎克終之道然後能保乎令名而於過失鮮矣魏公子無忌者魏昭王少子安釐王異母弟也封信陵君安釐王二十年秦圍邯鄲公子救邯鄲存趙趙王欲以五城封公子公子聞之意驕矜而有自功之色客有説公子曰物有不可忘或有不可不忘夫人有徳於公子公子不可忘也公子有徳於人願公子忘之也且矯魏王令奪晉鄙兵以救趙於趙則有功矣於魏則未為忠臣也公子乃自驕而功之竊為公子不取也於是公子立自責似若無所容者又無忌留趙十年不歸秦聞公子在趙日夜出兵東伐魏魏王患之使使往請公子公子恐其怒之乃誡門下有敢為魏王使通者死賔客皆自魏之趙莫敢勸公子歸毛公薛公兩人往見公子曰公子所以重於趙名聞諸侯者徒以有魏也今秦攻魏魏急而公子不恤使秦破大梁而夷先王之宗廟公子當何面目立天下乎語未及卒公子立變色告車趣駕歸救魏仲由字子路卞人也尸子曰子路卞之野人少孔子九嵗子路性鄙好勇力志伉直冠雄雞佩猳豚冠以雄雞佩猳豚二物皆勇子路好勇故冠帶之陵暴孔子孔子設禮稍誘子路後儒服委質因門人請為弟子漢于永定國之子也少嗜酒多過失年至三十乃折節脩行以父任為侍中嗣西平侯至御史大夫朱雲字子游魯人徙平陵少時通輕侠借客報讎年四十廼變節從博士白子反受易後漢鄭均東平任城人也其兄為縣吏頗受禮遺均數諫止不聽即脱身為傭嵗餘得錢帛歸以與兄曰物盡可復得為吏坐贓終身捐棄兄感其言遂為亷潔均後公車徴不就賜尚書祿以終其身時人號為白衣尚書賈淑字子厚世有冠冕而性險害邑里患之郭林宗遭母憂淑来脩弔既而鉅鹿孫威直亦至威直以林宗賢而受惡人弔心怪之不進而去林宗追而謝之曰賈子厚誠實㐫徳然洗心向善仲尼不逆互鄉故吾許其進也淑聞之改過自厲終成善士宋果性輕悍喜與人報讎為郡縣所疾郭林宗乃訓之義方懼以禍敗果感悔叩頭謝負遂自改節自勵後以烈氣聞左原者陳留人也為郡學生犯法見斥林宗嘗聞之遇諸路為設酒肴以慰之謂曰昔顔涿聚梁甫之巨盗叚干木晉國之大駔卒為齊之忠臣魏之名賢蘧瑗顔回尚不能無過况其餘乎慎勿恚恨責躬而已原納其言而去或有譏林宗不絶惡人者對曰人而不仁疾之已甚亂也原後忽更懐憤結客欲報諸生共曰林宗在學原愧負前言因遂罷去後事露衆人咸謝服焉徐庶穎川人先名福本單家子少好任俠擊劍中平末嘗為人報讎白堊突面被髪而走為吏所得問其姓字閉口不言吏乃於車上立柱維磔之擊皷以令於市鄽莫敢識者而其黨伍共簒觧之得脱於是感激棄其刀㦸更踈巾單衣折節學問始詣精舎諸生聞其前作賊不肯與共止福乃卑躬早起嘗獨掃除動静先意聽習經業義理精熟遂與同郡石韜相親愛吴甘寜巴郡臨江人少好游侠招合輕薄少年為之渠帥羣衆相隨挟持弓弩負眊帶鈴民聞鈴聲即知是寜人與相逢及属城長史接待隆厚者乃與交歡不爾即放所将奪其資貨於長史界中有所賊害作其發負至二十餘年止不攻刼頗讀諸子乃往依劉表因居南陽不見進用後歸吴為西陵太守折衝将晉周處字子隠義興陽羡人父魴吴鄱陽太守處少孤未弱冠膂力絶人好馳騁田獵不修細行縱情肆慾州曲患之處自知為人所惡乃慨然有改勵之志謂父老曰今時和嵗豐何苦而不樂耶父老歎曰三害未除何樂之有處曰何謂也答曰南山白額猛獸長橋下蛟并子為三矣處曰若為患吾能除之父老曰子若除之則一郡之大慶非徒去害而已處乃入山射殺猛獸因投水搏蛟蛟或沉或浮行數十里而處與之俱經三日三夜人謂已死皆相慶賀處果殺蛟而反聞鄉里相慶始知人患已之甚乃入吴尋二陸時機不在見雲具以情告曰欲自脩而年已蹉跎恐将無及雲曰古人貴朝聞夕改君前塗尚可但患志之不立何憂名之不彰處遂勵志好學有文思志存義烈言必忠信克己期年州府交辟仕東觀左丞皇甫謐字士安安定朝那人也漢太尉嵩之曽孫出繼叔父居新安年二十不好學逰蕩無度或以為癡嘗得𤓰果輙進所飬叔母任氏任氏曰孝經云三牲之飬猶為不孝汝今年餘二十目不存教心不入道無以慰我因歎曰昔孟母三徙以成人曾氏烹豕以存教豈我居不卜隣教有所闕何爾魯鈍之甚也脩身篤學自汝得之於我何有因對之流涕謐乃感激就鄉人席坦受書勤力不怠居貧躬自稼穡帶經而農遂博綜典籍百家之言沈静寡欲始有髙尚之志自號𤣥晏先生裴憲字景思楷之子少而頴悟好交輕侠及弱冠更折節嚴謹脩尚儒學足不踰閾者數年陳郡謝鯤頴川庾敳皆隽朗士也見而竒之後為豫州刺史終䧟於石勒焉王濬字士治𢎞農湖人也家世二千石濬博渉墳典羙姿貌不脩名行不為鄉曲所稱濬乃變節踈通亮直恢廓有大志州郡辟河東從事終為撫軍大将軍開府儀同三司胡母輔之字彦國泰山奉髙人也少擅髙名性嗜酒不拘小節後為繁昌令始節酒自厲甚有能名後為揚武将軍湘州刺史唐彬字儒宗魯國鄒人有經國大度而不拘行簡少便弓馬好逰獵身長八尺走及奔鹿强力兼人晚乃敦悦經史尤明易經随師受業還家教授嘗數百人初為郡門下掾後卒為前将軍領戎校尉雍州刺史戴若思廣陵人也有風儀性開爽少好逰侠不拘操行遇陸機赴雒船装甚盛遂與其徒掠之若思登據胡床指麾同旅皆得其宜機察見之知非常人在舫屋上遥謂之曰卿才器如此乃復作刼耶若思感悟因流涕投劔就之機與言深嘉賞異遂與定交焉後舉孝亷位至驃騎将軍謝尚字仁祖豫章太守鯤之子及長開率穎秀辯悟絶倫脱略細行不為流俗之事好衣刺文袴諸父責之因而自改遂知名後為衛将軍散騎常侍王濛字仲祖少時放縱不覊不為鄉曲所齒晚節始克己勵行有風流羙譽虚已應物恕而後行莫不敬愛焉卒為司徒左長史王述字懐祖元帝鎮東府中郎丞之子也家貧求試宛陵令頗受贈遺而脩家俱為州司所簡有一千三百條王導使謂之曰名父之子不患無禄屈臨小縣甚不宜爾述答曰足自當止時人未之達也此後屢居州郡清潔絶倫禄賜皆散之親故宅宇舊物不革於昔始為當時所歎後為衛軍尚書令王沈為荆州刺史自恃才氣放酒誕節又年少居方伯之任譚者憂之及鎮荆州威風肅然殊得物和前秦索泮字徳林燉煌人也世為冠族泮少而游侠及長變節好學有佐世才器張天錫以為冠軍記室叅軍符登字文髙堅之族孫也登少而雄勇有壮氣麄險不脩細行故堅弗之竒也長而折節謹厚頗覧書傳拜殿上将軍宋鎮西将軍郢州刺史蕭思話南蘭陵人也年十許嵗未知書以博誕逰遨為事好騎屋棟打細腰鼓侵暴隣曲莫不患毒之自此折節數年中遂有令譽好書史善彈琴能騎射髙祖一見便以國器許之劉康祖為散騎常侍以浮蕩蒲酒為事前後屢被糾劾免官後為孝武征虜中兵叅軍既被委任折節自脩轉太子翊軍校尉何尚之字彦徳廬江灊人也小時頗輕薄好樗蒲既長折節蹈道以操立見稱為陳郡謝混所知與之逰處元祐中為吴郡太守顔延之為光禄大夫延之與張鏡隣居延之飲酒喧呼不絶而鏡静翳無聲後延之於籬邉聞其與客語取胡床坐聽辭氣清𤣥延之心服謂賔客曰彼有人焉由此不復酣呌到撝彦之之子也襲爵建昌公資籍豪富厚自奉飬愛伎陳玉珠眀帝遣求不與逼奪之撝頗怨望帝令有司誣奏撝罪付廷尉将殺之撝入獄數宿鬚鬂皆白免死繫尚方奪封與弟撝憤由是屏斥聲玩更以貞素自立南齊周奉叔為冠軍将軍青州刺史勇力絶人随父盤龍征討所在為暴掠及世祖使領軍東討唐寓之奉叔畏上威嚴檢勒部下不敢侵斥周山圗為冗從僕射直閣将軍山圗好酒多失明帝數加怒誚後遂自改出為錢塘新城戍梁朱异年十餘嵗好羣聚蒲博頗為鄉黨所患既長乃折節從師遍治五經尤明禮易後為侍中王瞻廷尉卿猷之子也幼時輕薄好逸逰為閭里所患長頗折節有士操渉獵書記起家為著作佐郎謝覧為吴興太守一境清謐昔覧在新安頗聚歛至是遂稱亷潔時人方之王懐祖張充字延陵吴郡人父緒齊特進金紫光禄大夫有名前代充少時不持操檢好逸逰緒嘗假還吴始入西郭值充出獵左手臂鷹右手牽狗遇緒船至便放紲脱鞲拜於水次緒曰一身兩役無乃勞乎充跪對曰充聞三十而立今二十九矣請至来年而敬易之緒曰過而能改顔氏子焉及明年便脩身改節學不盈載多所該覧尤明老易與從叔稷俱有令譽起家撫軍行叅軍邱仲孚仕齊為山隂令齊末政亂頗有贓入入梁為豫章内史在郡更勵清節何逺為武昌太守逺夲倜儻尚俠至是乃折莭為吏杜絶交逰饋遺秋毫無所受陳周寳安文育子寳安年十餘嵗便習騎射以貴公子驕蹇逰逸好犬馬樂馳騁靡衣媮食文育之為晉陵以征討不遑之郡令寳安監知郡事尤聚惡少年髙祖患之及文育西征敗績縶於王琳寳安便折節讀書與士君子逰綏御文育士卒甚有威恵除員外散騎侍郎文育歸後除貞威將軍後魏穆羆髙祖時為虎牢鎮将頻以不法致罪後轉征東将軍賞善罰惡深自尅勵谷渾字元冲昌黎人也父衮膂力兼人彎弓三百斤渾少有父風任俠好氣以父母在常自退抑晩乃折節受經業遂覽羣籍被服類儒者太武世為儀曺尚書陸彰初歴數州以聚歛為事晩節修改自行青冀滄瀛州事甚有時譽加以虗已納物人愛敬之刁遵冀州刺史雍之子少不拘小節長更脩改卒為龍驤将軍洛州刺史趙超宗為汝南太守多所受納徙河東太守超宗在河東更自修勵清静愛人百姓追思之髙閭字閻士漁陽雍奴人也貪褊矜慢初為中書博士在中書好詈辱諸博士博士學士百有餘人有所干求者無不受其財貨及老為相幽二州刺史乃更亷儉自謹有良牧之譽邢巒為安西將軍梁秦二州刺史商販聚歛清論者鄙之後為安東将軍自宿豫大㨗及平懸瓠志行脩正不復以財賄為懐戎賞軍實絲毫無犯遷殿中尚書加撫軍将軍甄琛字思伯中山無極人初舉秀才入都積嵗頗以奕棊棄日至乃通夜不止手下倉頭嘗令秉燭或時睡必加其杖如此非一奴後不勝椘痛乃白琛曰郎君辭父母仕宦京師若為讀書執燭奴不敢非乃以圍棊日夜不息豈是上京之意而賜加杖罸不亦非理琛惕然慙感遂從許赤彪假書研習聞見益優後拜中書博士楊固少任侠好劔客弗事生産年二十六始折節好學遂博覧篇籍有文才後從大将軍宋王劉昶征義陽版府法曹行叅軍北齊司馬子如初為尚書令以贓賄免未㡬起行冀州事子如能自勵改甚有聲譽發摘奸偽僚吏畏伏之轉行并州事詔復官爵髙乾字乾邕彀涄脩人也性明悟俊偉有智畧羙音容進止都雅少時輕侠數犯公私長而修改輕財重義當世以意氣相得後為開府儀同三司徐州刺史尉景初為冀州刺史大納賄後為青州刺史操行頗改百姓安之徴授大司馬崔肇師魏尚書僕射亮之孫父士大諫議大夫肇師少時踈放長遂變節更成謹厚渉獵經史頗有文思襲父爵樂陵男魏收字伯起年十五頗已属文乃随父子建赴邊好習騎射欲以武藝自達榮陽鄭伯調之曰魏郎弄㦸多少收慙遂折節讀書精力不輟以文華顯初除大學博士畢義雲小字陁児少麄俠家在兖州北境嘗刼掠行旅州里患之晚方折節從官終為七兵尚書後周楊汪字元度𢎞農華隂人也少凶疎好與人羣闘拳所毆擊無不顛踣長更折節勤學専精左氏通傳三禮觧後為冀州侍讀隋王頗字景丈齊州刺史頒之弟也年數嵗值江陵䧟随諸兄入闗少好逰侠年二十尚不知書為其兄顒所責怒於是感激始讀書年二十二周武帝引為露門學士入隋為漢王諒府諮議叅軍劉權字世畧彭城豐人也少有侠氣重然諾藏亡匿死吏不敢過門後更折節好學重循法度後位至南海太守焦通塗陽人也梁彦光為相州刺史招致山東大儒每鄉立學通性酣酒事親禮闕為從弟所訟彦光弗之罪将至州學令觀於孔子廟于時廟中有韓伯瑜母杖不痛哀母力弱對母悲泣之像通遂感悟媿恨若無自容彦光訓諭而遣之後改過勵行卒為善士皇甫績三嵗而孤為外祖韋孝寛之所鞠飬嘗與諸外兄博奕孝寛以其惰業督以嚴訓愍績孤幼特捨之績曰我無庭訓養於外氏不能尅躬勵已何以成立深自感激命左右自杖三十孝寛聞之對之流涕於是精心好學畧渉經史虞慶則京兆櫟陽人初以弋獵為事中便折節讀書開皇中為桂州道行軍縂管唐邱和河南雒陽人也父夀魏鎮東将軍和以少便弓馬重氣任侠及長始折節與物無忤無貴賤皆愛之後為特進封潭國公栁亨拜光祿大夫行光祿少卿太宗每誡之曰與卿舊親情兼宿素卿為人多有往還今授此職宜存簡静亨性好獵有饕湎之聲此後頗自朂勵杜絶賔客約身節儉勤於職事叚綸為益州縂管髙下縱情多所陵傲及太宗踐祚遷右光禄大夫秘書監綸始折節脩道閉門不妄交逰乃鳩集史籍披覧不倦李安逺者夏州朔方人少時好飛鷹走狗逰蕩無度家代為将甚富於財然數從博徒逰至於破業晚始折節讀書敬慕名士但逢勝已皆傾心與逰焉後歴懐州刺史程异初為虞部員外郎充楊子院留後坐王叔文黨貶栁州司馬元和初復為侍御史累遷檢校兵部郎中淮南䓁五道兩税使异自懲往坐勵已在公江淮錢榖之弊多所剗革入遷太府少卿後唐錢鏐字具羙杭州臨安人也初事董昌時年甫壮室性尚剛烈時有儒士謁於主帥已進刺矣見鏐稍怠鏐怒投之羅刹江及典謁者将召鏐詐云客已拂衣去矣及為帥時有人獻詩云一條江水横前流鏐不敏以為譏已尋害之迨於晚嵗方愛人下士留心理道數十年間時甚歸羙歴累朝為尚父吴越國主天下都元帥晉王建立為性好殺晚年歸心釋氏飯僧營寺戒殺慎獄民稍安之終為青州節度使臨淄郡王李從璋後唐明宗之猶子也性黷懼明宗嚴正以自滑帥入居宿衛除拜趺心稍悛悟後歴數鎮與故時幕客相遇不足無所憾焉蒲陕之日政有善譽改賜勤静理功臣之號及晉髙祖即位愈畏其故終為鄧州節度使人甚惜之張彦澤初為涇源節度使其政苛刻交代王周奏弊事二十件後為相州節度使頓悛舊跡凡正俸公府常入之外一無所取民吏愛之少帝開運三年父老僧道詣闕舉留焉周王仁裕生於泰州白石鎮少孤不從師訓唯以狗馬彈射為務年二十五方有意就學終為太子少保悔過孔子曰吾未見能見其過而内自省者盖夫生民之性淪於所習七情交戰反乎中庸迷方違道棄理愆徳狭中而獨任師心而自是由中人以下曷能免焉固其洗然知非翻然易慮念既往之咎圗勿貳之羙斯為難矣三代之下大道云䘮乃有所舉之或遂事之不追秉義之靡終守官之踰矩因貽悔吝自底弗類而能杜尤怨之志興克責之言形於包羞極其引慝斯所謂不逺而復莫大之善者焉與夫恥過作非聞義不徙之徒異矣衛孫林父文子也以戚叛於晉吴公子札自衛如晉将宿於戚戚孫文子之邑聞鍾聲焉曰異哉吾聞之也辯而不得必加於戮辯猶爭也夫子獲罪於君以在此孫文子以戚叛懼猶不足而又何樂夫子之在此也猶燕之巢于幕下言至危君又在殯而可以樂乎獻公卒未葬遂去之不止宿文子聞之終身不聽琴瑟聞義能改秦后子有寵於桓如二君於景后子秦桓公子景公母弟針也其權寵如兩君其母曰弗去懼選選數也恐景公數其罪而加戮鍼適晉其車千乗后子享晉侯為晉侯設享禮造舟於河造舟于梁通秦晉之道十里舎車一舎八乗為入反之偹自雍至綘雍綘相去千里用車八百乗歸取酬弊備九獻之儀始禮自賫其一故續送其八酬酒弊終事八反每十里以八乗車各以次載弊相受而還不徑至故言八反千里用車八百乗其二乗以自随故言千乗傳言秦鍼之出極奢富以成禮欲盡敬於所赴司馬侯問焉曰子之車盡於此而已乎對曰此之謂多矣若能少此吾何以得見言已坐車多故出奔女叔齊以告公叔齊司馬侯且曰秦公子必歸臣聞君子能知其過必有令圗令圖天所贊也子太叔鄭大夫㳺吉也子産疾謂太叔曰我死子必為政惟有徳者能以寛服民其次莫如猛夫火烈民望而畏之故鮮死焉水懦弱民狎而翫之狎輕也則多死焉故寛難難以治疾數月而卒太叔為政不忍猛而寛鄭國多盗取人於萑苻之澤萑苻澤名澤中刼人太叔悔之曰吾早從夫子不及此趙勝封平原君與毛遂至椘定從而歸歸至於趙曰勝不敢復相士勝相士多者千人寡者百數自以為不失天下之士今乃於毛先生而失之也先生一至椘而使趙重於九鼎大吕毛先生以三寸之舌强於百萬之師勝不敢復相士遂以為上客秦白起昭王時為将封武安君以罪免為士伍遷之隂宻属安定出咸陽西門十里至杜郵昭王乃使使者賜之劔自裁武安君引劔将自剄曰我何罪於天而至此哉良乆曰我固當死長平之戰趙卒降者數十萬人我詐而阬之足以死遂自殺漢李陵為騎都尉将兵擊匈奴戰敗而降匈奴寵貴之陵數勸蘓武降匈奴武不從陵見其至誠喟然歎曰嗟呼義士陵與衛律之罪上通於天因泣下霑衿與武訣去衛律亦漢将降匈奴韋𤣥成嗣父賢爵扶陽侯坐騎至廟削爵為關内侯𤣥成自傷貶黜父爵歎曰吾何面目以奉祭祀作詩自刻責𤣥成代于定國為丞相貶黜十年之間遂繼父相位封侯故國榮當世焉𤣥成復作詩自著復玷缺之囏難玉缺曰玷因以戒示子孫戴聖為九江太守聖禮經號小戴者也行治多不法前刺史以其大儒優容之及何武為揚州刺史錄囚徒有所舉以属郡属委也音之欲切聖曰後進生何知廼欲亂人治言武仕學未乆故謂之後進生也皆無所决武使從事亷得其罪㢘察也聖懼自免後為慱士毁武於朝廷武聞之終不揚其惡而聖子賔客為羣盗得聚為羣盗而吏捕得也為廬江聖自以子必死武平心决之卒得不死自是後聖慙服武每奏事至京師刺史每嵗盡則人奏事於京師也聖未嘗不造門謝恩王鳳為大将軍成帝建始二年秋京師民無故相驚言大水至百姓奔走相蹂躙蹂踐也躙車也老弱號呼長安大亂天子親御前殿召公卿議鳳以為太后與上及後宫可御舟船令吏民上長安城以避水羣臣皆從鳳議左将軍王商􅍦曰自古無道之國水猶不冐城郭今政治平世無兵革上下相安何因當有大水一日暴至此必訛言也不宜令上城重驚百姓帝乃止有頃長安中稍定問之果訛言也帝於是羙壮商之固守數稱其議而鳳大慙自恨失言後漢虞詡為尚書令去官卒臨終謂其子恭曰吾事君直道行已無愧所悔者為朝歌長時殺賊數百人其中何能不有寃者自此二十餘年家門不増一口斯獲罪於天也馬融字秀長大将軍鄧隲聞融名召為舎人非其好也遂不應命客於凉州武都漢陽界中㑹羌虜飈起邊方擾亂米榖踴貴自闗以西道饉相望融既饑困乃悔而歎息謂其友人曰古人有言左手據天下之圗右手刎其喉愚夫不為所以然者生貴於天下也今以曲俗咫尺之羞滅無貲之軀殆非老莊所謂也故往應隲召魏劉陶字季冶善名稱有大辯曹爽為選部也鄧颺之徒稱之以為伊吕當此之時其人意凌青雲謂傳𤣥曰仲尼不聖何以知其然智者圗國天下羣愚如弄一丸於掌中而不能得天下傅𤣥以其言大惑不復詳難也謂之曰天下之質變無常也今見卿窮爽之敗退居里舎乃謝其言之過蒋濟字子通為太尉王凌子廣字公淵廣弟飛梟金虎並才武過人太傅司馬宣王嘗從容問濟濟曰凌文武俱贍當今無䨇廣䓁志力有羙於父耳退而悔之告所親曰吾此言滅人門宗矣蜀馬超漢末為偏将軍先主圍成都超将兵徑到城下先主待之厚超嘗呼先主字關侯怒請殺之先主曰人窮来歸我卿䓁怒以呼我字而殺之何以示於天下也張飛曰如是當示之以禮明日大會請超入關張並仗刀立直超顧坐席不見關張見其直也乃大驚止不復呼字明日歎曰我乃知其所以敗為呼人主字㡬為關張二人所殺自後乃尊事之諸葛亮為丞相越嶲太守馬謖才器過人好論軍計亮深加器異先主臨薨謂亮曰馬謖言過其實不可大用君其察之亮猶謂不然以謖為叅軍每引見談論自晝達夜後主建興六年亮出軍向祁山時有宿将魏延吴壹䓁論者皆言宜以為先鋒而亮違衆㧞謖綂大衆在前與魏将張郃戰敗於街亭亮戮謖以謝衆上疏自貶二䓁以督厥咎鄧芝為車騎将軍征涪陵見𤣥猿縁山芝性好弩手自射猿中之猿㧞其箭巻木葉塞其創芝曰噫吾違物之性其将死矣乃歎息投弩水中吴虞翻性疏直數有酒失坐徙交州大帝既即尊位翻因上書曰陛下膺明聖之徳體舜禹之孝厯運當期順天濟物奉承革命臣命輕雀䑕性輶毫釐罪惡莫大不容於誅昊天㒺極全宥九載退當念戮頻受生活復偷視息臣年耳順思咎憂憤形容枯悴髪白齒落雖未能死自悼終沒不見宫闕百官之富不覩皇輿金軒之餙仰觀巍巍衆民之謡傍聽鍾鼓侃然之樂永殞海隅棄骸絶域不勝悲慕逸豫大慶悦以忘罪晉王衍為元帥為石勒所破将死顧而言曰嗚呼吾曹雖不如古人向若不祖尚浮虚戮力以正天下猶可不至今日庾衮字褒明舉秀才清白異行皆不降志世號之為異行初父誡衮以酒每醉輙自責曰余廢先父之誡其何以訓人乃於父墓前自杖三十王導為司徒及從父兄敦搆􅊇劉隗勸元帝盡誅諸王時導率羣從詣闕請罪值僕射周顗謂曰伯仁顗字伯仁以百口累卿顗直入不顧既見帝言導忠誠申救甚至帝納其言顗喜飲酒致醉而出導猶在門又呼顗顗不與言顧左右曰今嵗殺諸賊奴取黄金印如斗大繫肘既出又上表明導言甚切至導不知救已而甚衘之王敦既得志向導曰周顗戴若思南北之望當登三司無所疑也導不答又曰若不三司便應令僕邪又不答敦曰若不爾正當誅爾導又無言導後料簡中書故事見顗表救已殷勤欵至導執表流涕悲不自勝告其諸子曰吾雖不殺伯仁伯仁由我而死幽㝠之中負此良友王獻之為中書令遇疾家人為上章道家法應首過問其有何得失對曰不覺餘事惟憶與郗家離婚獻之前妻郗曇女也殷仲文安帝時為桓𤣥侍中𤣥敗仲文至巴陵因奉二后投義軍而為鎮軍長史轉尚書帝初反正抗表自觧曰臣聞洪波振壑川無恬鱗驚飈拂野林無静柯何者勢弱則受制於臣力微則無以自保於理雖可得而言於臣實非所敢譬昔桓𤣥之以代誠復驅逼者衆至如微臣罪實深矣進不能見危授命亡身殉國退不辭粟首陽拂衣髙謝遂乃晏安昬寵叨昩偽封錫文篡事曽無獨固名義以之俱淪情節自兹兼撓宜其極法以判忠邪會鎮軍将軍劉裕興復社稷大𢎞善貸佇一戮於微命申三驅於大信既恵之以首領又申之以縶維於時皇輿否隔天人未㤗用忘進退是以僶俛從事自同令人今宸極反正唯新告始憲章既眀品物愧舊臣亦胡顔之厚何以顯居榮次乞觧所職待罪私門違離闕庭乃心慕戀詔不許後周賀若敦為忠州刺史鎮幽谷敦恃功負氣顧其流軰皆為大将軍敦獨未得兼以湘州之役全軍而反翻被除名每出怨言晉公䕶怒徴還逼令自殺臨刑呼子弼謂曰吾必欲平江南然心不果汝當成吾志吾以舌死汝不可不思因引錐刺弼舌出血誡以慎口唐狄仁傑未為宰相時婁師徳嘗薦之及為宰相不知師徳薦已數排師徳令充外使則天嘗出師徳舊表示之仁傑大慙謂人曰吾為婁公所含如此方知不逮婁公逺矣李光弼為河南副元帥既疾亟将吏問以後事曰吾乆在軍中不得就養既為不孝子夫復何言髙郢徳宗時為中書舎人時詔以前禮部員外于公異逰學逺方忘其温凊之戀放歸田廬初郢薦前監察御史元敦義及睹公異譴責懼為所累乃上疏首陳敦義逺於禮教詔褒郢之知過敦義俾罷歸晉王建立累領藩鎮為性好殺晚年歸心釋氏飯僧營寺戒殺慎獄民稍安之册府元龜巻八百九十七
