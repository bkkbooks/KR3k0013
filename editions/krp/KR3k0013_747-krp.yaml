body:
  text: 册府元龜卷七百四十七宋王欽若等撰陪臣部失禮奢僭專恣失禮夫禮者所以章疑别微以為民防者也若乃當春秋之世居大夫之列亡君臣之禮違朝著之位玉幣相聘失行人之辭樽爼交歡愆為賔之序乃至紛亂祀典顛越彛制存諸赴告厥用垂誡公子友為魯大夫莊公二十七年秋公子友如陳葬原仲非禮也原仲季友之舊也原仲陳大夫季友違禮會外大夫塟先軫為晉大夫魯僖公三十二年晉敗秦師獲孟明西乞白乙文嬴請而釋之先軫朝問秦囚公曰夫人請之吾舎之矣先軫怒曰武夫力而拘諸原婦人暫而免諸國暫猶卒也墮軍實而長㓂讐亡無日矣墮毁也不顧而唾臧文仲為魯大夫孔子曰臧文仲安知禮夏父弗綦逆祀而弗止也燔柴於奥文仲魯公子彊之曾孫辰也莊文之間為大夫於時為賢是以非之不正禮也文二年八月丁卯有事於太廟躋僖公始逆祀是夏父弗綦為宗人之為也奥當為㸑字之誤也或作竈祀户卒食而祭饎㸑饔㸑也時人以為祭大神乃燔柴夫奥者老婦之祭盛於盆尊於甑老婦先炊者也尊甑炊噐也明此祭先炊非祭大神燔柴似失之禮也者猶體也若人身體體不備君子謂之不成人設之不當猶不備也郤克晉大夫獻子也魯成公二年靡笄之役郤獻子伐齊齊侯來靡笄之役故服而朝晉也獻之以得隕命之禮獻致享也獻籩豆之數征伐所獲國君之獻禮也以得言不得也伐國獲君若秦獲晉惠晏為隕命今齊雖敗頃公不見得非隕命也故苖棼皇以郤克不知禮司馬法曰其有隕命行禮如㑹所爭義不爭利也曰寡君使克也不腆敝邑之禮為君之辱敢歸諸下執政以整御人歸履也執政執事整願也御人婦人願以此報君御人笑也曰郤子勇而不知禮矜其伐而恥國君其與㡬何言將不終命郤犨為晉大夫魯成公十四年春晉侯使犨于衛衛侯饗苦成叔成叔郤犨寗惠子相相佐禮惠子寗殖苦成叔傲寗子曰苦成家其亡乎古之為享食也以觀威儀省禍福也故詩曰兕觥其觩㫖酒思柔周小雅言君子好禮飲酒皆思柔德雖兕觥觩然不用以兕角為觵所以罰不敬觩陳設之貎彼交匪傲萬福來求彼之交於事而不惰傲乃萬福之所求今夫子傲取禍之道也孫林父衛大夫文子也魯襄公七年文子來聘公登亦登禮登階臣後君一等叔孫穆子相趨進曰諸侯之㑹寡君未嘗後衛君敵體並登今吾子不後寡君寡君未知所過吾子其少安安胥也孫子無辭亦無悛容悛改也髙厚為齊大夫魯襄公十年春諸侯㑹吳于柤三月癸丑齊髙厚相太子光以先㑹諸侯于鍾離不敬吳子未至光從東道與東諸侯㑹遇非本期地故不書㑹髙厚髙固子也癸丑月二十六日士莊子晉大夫曰髙子相太子以㑹諸侯將社稷是衛而皆不敬厚與光俱不敬棄社稷也其將不免乎十九年齊殺髙厚二十五年殺其君光伯有為鄭大夫魯襄公二十七年鄭伯享趙孟于垂隴伯有賦鶉之賁賁鶉之賁賁詩鄘衛人刺其君滛亂鶉鵲之不若義取人之無良我以為兄我以為君也趙孟曰牀笫之言不踰閾况在野乎非使人之所得聞也笫簀也此詩刺滛亂故云牀笫之言閾門限使人趙孟自謂慶封為齊大夫魯襄公二十七年春齊使慶封來聘叔孫與慶封食不敬為賦相䑕亦不知也相鼠詩鄘風曰相鼠有皮人而無儀人而無儀不死何為慶封不知此詩為已言其闇甚二十八年慶封來奔叔孫穆子食慶封慶封汜祭禮食有祭示有所先也汜祭逺散所祭不共穆子不說使工為之誦茅鴟工樂師茅鴟逸詩刺不敬亦不知既而齊人來讓讓魯受慶封慶封奔吴孟僖子為魯大夫昭公七年二月公如楚鄭伯勞于師之梁鄭城門孟僖子為介不能相儀僖子仲孫貜及楚不能答郊勞孔張為鄭大夫魯昭公十六年三月晉韓起聘于鄭鄭伯享之子産戒曰茍有位於朝無有不共恪孔張後至立於客間孔張子孔之孫執政禦之執政掌位列者禦止也適客後又禦之適縣間縣樂肆客從而笑之渉佗成何皆晉大夫也魯定公八年晉師將盟衛侯於剸澤趙簡子曰羣臣誰敢盟衛君者前年衛叛晉屬齊簡子意欲摧辱之渉佗成何曰我能盟之衛人請執牛耳盟禮尊者涖牛耳主次盟者衛侯與晉大夫盟自以當涖牛耳故請之成何曰衛吾温原也焉得視諸侯言衛小比縣人不得從諸侯禮將㰱渉佗捘衛侯之手及腕捘擠也血至腕衛侯怒王孫賈趨進賈衛大夫曰盟以信禮也信猶明也有如衛君其敢不唯禮是事而受此盟也衛侯乃叛晉晉人請改盟弗許十年晉人討衛之叛故曰繇渉佗成何捘衛侯手故於是執渉佗成何奔燕君子曰此之謂棄禮必不鈞言必見殺不得與人等詩曰人而無禮胡不遄死佗亦遄矣哉詩鄘風遄速也蕢尚為魯大夫哀公使人吊蕢尚遇諸道辟於路畫宫而受吊焉哀公魯君也畫宫畫地為宫曾子曰蕢尚不如杞梁之妻之知禮也行吊禮于野非齊莊公襲奪于莒杞梁死焉其妻迎其柩于路而哭之哀莊公使人吊之對曰君之臣不免於罪則將肆諸市朝而妻受執君之臣免於罪則有先人之敝廬在君無所辱命渾良夫為衛大夫衛侯為虎幄於籍圃於籍田之圃新造幄幕皆以虎獸飾之成求令名者與之始食焉太子請使良夫以良夫應為令名良夫乗衷甸兩牡衷甸一轅卿車紫衣狐裘紫衣君服至袒裘不釋劔而食食而熱故偏袒亦不敬太子使牽以退數之以三罪而殺之三罪紫衣袒裘帯劔奢僣傷民力而干邦憲者其奢僣之謂乎故古者聖賢之所譏切著在方䇿昭昭可見矣當周室微弱諸侯為政乃有家陪之列因縁逞欲怙寵崇侈卑上長傲驕佚以自滿晏安而無懼斯乃犯義侵禮招損取禍之道也已管仲字夷吾為齊相富擬於公室孔子曰管仲鏤簋朱紘山節藻梲君子以為濫矣濫亦盗竊也鏤簋謂刻而飾之大夫刻為龜耳諸侯飾以象天子飾以玉朱紘天子冕之紘也諸侯為組紘大夫士當緇組紘纁邊栭謂之節梁上楹謂之梲宫室之飾士首本大夫逹捘諸侯斵而礱之天子加宻石焉無畫山藻之禮也又曰管仲之噐小哉言其噐量小也或曰管仲儉乎或人見孔子小之以噐謂之大儉曰管氏有三歸官事不攝焉得儉三歸取三姓女婦人謂嫁曰歸攝猶兼也禮國君事大官各有人大夫兼并今管仲家臣備職非為儉然則管仲知禮乎或人以儉問故答以安得儉或人問不儉便謂為得禮曰邦君樹塞門管氏亦樹塞門邦君為兩君之好有反坫管氏亦有反坫反坫反爵之坫在兩楹之間人君别内外於門樹屏以蔽之若與隣國為好㑹其獻酢之禮更酧畢則各反爵於坫上今管仲皆僣為之如是是不知禮管氏而知禮孰不知禮子臧鄭子華弟也魯僖公二十四年出奔宋好聚鷸冠鷸鳥名聚鷸羽以為冠非法之服鄭伯聞而惡之惡其服非法使盗誘之八月殺之于陳宋之問君子曰服之不衷身之災也衷猶適也詩曰彼已之子不稱其服詩曹風刺小人在位言彼人之德不稱其服子臧之服不稱也夫詩曰自詒伊慼其子臧之謂矣詩小雅詒遺也戚憂也取其自遺憂夏書曰地平天成稱也后子秦桓公子景公母弟鍼也有寵於桓如二君於景其權寵如兩君其母曰弗去懼選選數也恐景公數其罪而加戮鍼適晉其車千乗言其富也后子享晉侯為晉侯設享禮造舟于河造舟為梁通秦晉之道十里舎車一舎八乗為八反之備自雍及絳雍絳相去千里用車八百乗歸取酬幣備九獻之義始禮自舉其一故續送其八酬酒幣終事八反舟十里以八乗車各以次載幣相授而還不徑至故言八反千里用車八百乗其二百乗以自隨故言千乗傳言秦鍼之出極奢富以成禮欲盡敬於所赴仲孫叔孫季孫皆魯大夫也謂之三桓皆桓公後禮運云諸侯不敢祖天子大夫不敢祖諸侯而公廟之設於私家非禮也繇三桓始也公廟魯以周公之故立文王廟三家見而僣焉又大夫而饗君非禮也其享君由强且富也大夫强而君殺之義也繇三桓始也又季孫有喪孔子往吊入門而左從客也主人以璵璠收䘮季平子意如之䘮桓子斯在䘮孔子吊之入門而左行故曰從客位也主人以璵璠收收歛也孔子徑庭而趨歴級而上上堂曰以寳玉收譬之猶暴骸中原也璵璠君佩玉也昭公在外平子行君事入宗廟佩璵璠故欲用之孔子以為平子逐昭公出之其行惡不當以玉斂而反用之肆行非度人又利之必先發掘故曰由暴骸中原也徑庭歴級非禮也雖然以救過也孔子曰拜下禮也今拜乎上泰也雖違衆吾從下吾不欲違禮亦不足人之失禮故歴級死古之人非無寳也其所寳者異也又季氏八佾舞於庭孔子謂是可忍也孰不可忍也孰誰也佾列也天子八佾諸侯六卿大夫四士二八人為列八八六十四人魯以周公故受王者禮樂有八佾舞季桓子僣於其家廟舞之故孔子譏之三家者以雍徹三家謂仲孫叔孫季孫雍周頌臣工篇名天子祭於宗廟歌之以徹祭今三家亦作此樂孔子曰相維辟公天子穆穆奚取於三家之堂辟公謂諸侯及二王之後穆穆天子之容貎雍篇歌此者有諸侯及二王之後來助祭故也今三家但家臣而已何取此義而作之于堂耶臧文仲魯大夫也居蔡臧孫辰也文謚也蔡國君之守龜出蔡地因以為名焉長尺有二寸居蔡僣也山節藻梲包曰節者栭也刻鏤為山梲者梁上楹畫為藻文言其奢侈孔子曰何如其知也孔子非時人謂之為也趙文子晉大夫也大夫之奏肆夏也繇趙文子始也僣諸侯趙文子名武慶封齊大夫也魯襄公二十七年來聘其車美孟孫謂叔孫曰慶季之車不亦美乎季慶封字叔孫曰豹聞之服美不稱必以惡終美車何為駟秦鄭大夫也富而侈嬖大夫也而嘗陳卿之車服於其庭鄭人惡而殺之子思曰詩曰不解於位民之攸塈子思子産子國三也詩大雅攸所也塈息也不守其位而能久者鮮矣商頌曰不僣不濫不敢怠皇命以多福僣差也濫溢也皇暇也言駟秦違詩商頌故受殺穰侯魏冉者秦昭王母宣太后弟也冉相秦六嵗而免二嵗復相秦四嵗而使白起㧞楚之郢秦置南郡乃封白起為武安君白起者穰侯之所任舉也相善於是穰侯之富富於王室及免相國就封邑出闗輜車千乗有餘黃歇楚春申君也考烈王立楚復强趙平原君使人於春申君春申君舎之於上舎趙使欲夸楚為瑇瑁簮刀劔室以珠玉飾之請命春申君客春申君客三十餘人其上客皆躡珠履以見趙使趙使大慙專恣昔周道衰微禄去公室諸侯以之擅命陪臣由是專恣行私惠以收民心用宗黨以參邦政峻殺戮以圖畏已濫爵賞以務恱人動靡顧於典刑言但肆於威福其甚者取美檟受饋錦外交鄰邦内易先嗣徒俾忠臣覩之而扼腕賢者覽之以寒心故先聖曰陪臣執國命三世希不失矣蓋欲使姦臣賊子聞之而懼焉又曰惟名與噐不可以假人此誠百王之攸戒也公子豫魯大夫也隱公元年十月鄭人以王師虢師伐衛南鄙虢西虢國也𢎞農陜縣東南有虢城請師於邾邾子使私於公子豫私請師豫請往公弗許遂行及邾人鄭人盟于翼翼邾地祭仲鄭大夫也魯桓公十五年春祭仲專鄭伯患之使其壻雍紏殺之將享諸郊雍姬知之謂其母曰父與夫孰親其母曰人盡夫也父一而已胡可比也婦人在室則天父出則天夫女以為疑故母以所生為本解之遂告祭仲曰雍氏舎其室而將享子於郊吾惑之以告祭仲殺雍紏尸諸周氏之汪汪池也周氏鄭大夫殺而暴其尸以示戮也公載以出愍見其尸故載其尸共出國曰謀及婦人宜其死也公子溺魯大夫莊公三年正月溺㑹齊師伐衛疾其專命而行故伐之公子元楚文王弟也魯莊公三十年夏歸自伐鄭而處王宫欲遂蠱文夫人鬭射師諫則執而梏之射師鬭亷也足曰桎手曰梏秋申公鬭班殺子元申楚縣也楚僣號縣尹皆稱公魏犨晉大夫也魯僖公二十八年晉文公入曹令無入僖負覊之宫而免其族報施也魏犨顚頡怒曰勞之不圖報於何有爇僖負覊氏公子商人齊桓公子也魯文公十四年公子商人驟施於國驟數也而多聚士盡其家貸於公有司以繼之家財盡從公及國之有司富者貸趙盾晉正卿任國政二年而襄公卒太子夷臯年少盾以國多難欲立襄公弟雍雍時在秦使迎之太子母日夜啼泣頓首謂盾曰先君何罪釋其適子而更求君趙盾患之恐其宗與大夫襲誅之廼遂立太子是為靈公發兵距所迎襄公弟於秦者靈公既立趙盾益專國政田襄子齊大夫既相齊宣公三年晉殺知伯宣公之三年時也分其地襄子使其兄弟宗人盡為齊都邑大夫與三晉通使曰以其齊國先縠晉大夫也魯宣公十二年楚子圍鄭晉師救鄭及河聞鄭與楚平荀林父欲還彘子曰不可彘子先縠晉所以覇師武臣力也今失諸侯不可謂力有敵而不從不可謂武由我失覇不如死且成師以出聞敵强而退非夫也非丈夫命為軍帥而卒以非夫唯羣子能之我弗為也以中軍佐濟佐彘子所帥也濟渡河臧宣叔魯大夫也宣公十八年公孫歸父以襄仲之立公也有寵歸父襄仲子欲去三桓以張公室時三桓强公室弱故欲去之以張大公室與公謀而聘于晉欲以晉人去之冬公薨季文子言於朝曰使我殺適立庶以失大援者仲也夫適謂子惡齊外甥襄仲殺之而立宣公南通於楚既不固又不能堅事齊晉故云失大援也臧宣叔怒曰當其時不能治也後之人何罪子欲去之許請去之宣叔文仲子武仲父許其名也時為司冦主行刑言子自以歸父害已欲去者許請為子去之遂逐東門氏襄仲居東門故曰東門氏季文子魯大夫襄公二年齊姜薨初穆姜使擇美檟檟梓之屬以自為櫬與頌琴櫬棺也頌琴琴名猶言雅琴皆欲以送終文子取以葬齊姜君子曰非禮也禮無所逆婦養姑者也虧姑以成婦逆莫大焉穆姜成公母齊姜成公婦也季武子為魯上卿襄公十一年春將作三軍魯本無中軍惟上下軍皆屬于公有事三卿更帥以征伐季氏欲專其民人故假立中軍因以改作告叔孫穆子曰請為三軍各征其軍征賦稅也三家各征其軍之家屬穆子曰政將及子子必不能政者覇國之政令禮大國三軍魯次國而為大國之制貢賦必重故憂不能也武子固請之穆子曰然則盟諸穆子知季氏將復變易故盟之乃盟諸僖閎僖宫之門詛諸五父之衢五父衢道名在魯國東南以禍福之言相要正月作三軍三分公室而各有其一三分國民衆三子各毁其乗壊其軍乗分以足成三軍十二年春王三月莒人伐我東鄙圍邰蓋攻守之害深故以危録其月季孫宿帥師救邰遂入鄆宿武子名鄆莒邑遂繼事也受命而入鄆惡季孫宿也二十九年公如楚還及方城季武子取卞取卞邑以自益使公冶問問公起居公冶季氏屬大夫璽書追而與之璽印也曰聞守卞者將叛臣帥徒以討之既得之矣敢告公冶致使而退致季氏使命及舎而後聞取卞發書乃聞之公曰欲之而言叛祗見疏也言季氏欲得卞而欺我言叛益疏我公謂公冶曰吾可以入乎以季氏疏已故不敢入對曰君實有國誰敢違君公與公冶冕服以卿服𤣥冕賞之固辭强之而後受公欲無入榮成伯賦式微乃歸式微詩弼風曰式微式微胡不歸式用也義取寄寓之微陋勸公歸五月公至自楚公冶還其邑於季氏本從季氏得邑故還之而終不入焉不入季孫家曰欺其君何必使余季孫見之則言季氏如他日不見則終不言季氏及疾聚其臣大夫家臣曰我死必無以冕服歛非德賞也言公畏季氏而賞其使非以我有德且無使季氏葬我趙簡子問史墨史墨晉史蔡墨曰季氏亡乎史墨對曰不亡季友有大功於魯受為上卿至於文子武子世增其業文公卒東門遂東門遂襄仲也居東門故稱東門遂殺適立庶魯君於是失國政政在季氏於今四君矣民不知君何以得國是以為君愼噐與名不可以假人噐車服名爵號崔杼齊大夫魯襄公十九年崔杼殺髙厚於灑藍而兼其室灑藍齊地書曰齊殺其大夫從君於昏也又魯襄公二十五年晉侯使魏舒宛沒逆衛侯衛獻公以十四年奔齊將使衛與之夷儀崔子止其孥以求五鹿崔杼欲得衛之五鹿故留衛侯妻子于齊以質之子孔鄭大夫魯襄公十九年鄭子孔之為政也專專權國人患之乃討西宫之難十年尉止等作難西宫子孔知而不言與純門之師前年子孔召楚師至純門子孔當罪以其甲及子革子良氏之甲守以自守也甲辰子展子西率國人伐之殺子孔而分其室書曰鄭殺其大夫專也亦以國討為文子然子孔宋子之子也子然子革父士子孔圭媯之子也宋子圭媯皆鄭穆公妾士子孔子良父圭媯之班亞宋子而相親也亞次子士子孔亦相親也僖之四年子然卒鄭僖四年魯㐮六年簡之元年士子孔卒魯襄八年司徒孔實相子革子良之室司徒孔實與二父相親故相助其子三室如一言同心故及於難故二子并及難子革子良出奔楚子革為右尹子革即鄭丹鄭人使子展當國子西聽政立子産為卿簡公猶㓜故大夫當國范宣子晉大夫初欒桓子娶於范宣子生懐子桓子欒黶懐子盈也范鞅以其亡也怨欒氏十四年欒黶强逐范鞅使奔秦故與欒盈為公族大夫而不相能桓子卒欒祁與其老州賔通欒祁桓子妻范宣子女盈之母也范氏堯後祁姓㡬亡室矣言亂甚懐子患之祁懼其討也愬諸宣子曰盈將為亂以范氏為死桓主而專政矣桓主欒黶曰吾父逐鞅也不怒而以寵報之謂宣子不為黶責怒鞅而反與鞅寵位又與吾同官而專之同為公族大夫而專其權勢吾父死而益富死吾父而專於國有死而已吾蔑從之矣言宣子專政盈欲以死作難其謀如是懼害於主吾不敢不言范鞅為之徴證其有此懐子好施士多歸之宣子畏其多士也信之懐子為下卿下軍佐宣子使城著而遂逐之著晉邑在外易逐魯襄公二十一年秋欒盈出奔楚宣子殺箕遺黃淵嘉父司空靖邴豫董叔邴師申書羊舌虎叔羆皆晉大夫欒盈之黨羊舌虎叔向弟囚伯華叔向籍偃籍偃上軍司馬司城子罕相宋謂宋君曰夫國家之安危百姓之治亂在君之行夫爵禄賞賜人之所好也君自行之殺戮刑罰民之所惡也臣請當之君曰善寡人當其美子受其惡寡人自知不為諸侯笑矣國人知殺戮之刑專在子罕也大臣親之百姓畏之君不至朞年子罕遂去宋君而專其政左師宋大夫魯襄公二十六年秋宋公殺其世子痤初左師見夫人之歩馬者歩馬習馬問之對曰君夫人氏也左師曰誰為君夫人余胡弗知圉人歸以告夫人夫人使饋之錦與馬先之以玉以玉為錦馬之先曰君之妾棄使某獻左師改命曰君夫人而後再拜稽首受之左師令使者改命也傳言宋公闇左師諛太子所以無罪而死費無極楚大夫也魯昭公二十七年吳子欲因楚䘮而伐之前年楚平王卒楚左尹郤宛工尹壽帥師至于潜吳師不能退及聞吳亂而還卻宛直而和國人說之以直事君以和接類鄢將師為右領右領官名與費無極比而惡之惡卻宛令尹子常賄而信讒無極譛郤宛焉謂子常曰子惡欲飲子酒子惡卻宛又謂子惡令尹欲飲酒於子氏子惡曰我賤人也不足以辱令尹令尹將必來辱為惠已甚吾無以酬之若何酬報獻無極曰令尹好甲兵子出之吾擇焉擇取以進子取五甲五兵曰寘諸門令尹至必觀之而從以酬之曰無極辭及饗日帷諸門左張帷陳甲兵其中無極謂令尹曰吾㡬禍子子惡將為子不利甲在門矣子必無往且此役也此春救潜之役吾可以得志子惡取賂焉而還又誤羣帥使退其師曰乗亂不祥吳乗我䘮我乗其亂不亦可乎令尹使視郤氏則有甲焉不往召鄢將師而告之告子惡門有甲兵將害已將師退遂令攻郤氏且爇之爇燒也子惡聞之遂自殺也國人弗爇令曰不爇郤氏與之同罪或取一編管焉或取一秉杆焉編管苫也秉把杆藁也國人投之遂弗爇也令尹炮之炮燔郤宛盡滅郤氏之族黨殺陽令終與其弟完及佗令終陽匄子與晉陳及其子弟晉陳楚大夫皆郤氏黨晉陳之族呼於國曰鄢氏費氏自以為王專禍楚國弱寡王室蒙主與令尹以自利也蒙欺也令尹盡信之矣國將如何令尹病之進胙者莫不謗令尹進胙國中祭祀也謗詛也沈尹戍言於子常曰夫左尹與中廐尹莫知其罪而子殺之以興謗讟至于今不已左尹郤宛也中廐尹陽令終戍也惑之仁者殺人以掩謗猶弗為也今吾子殺人以興謗而弗圖不亦異乎夫無極楚之讒人也民莫不知去朝吳在十五年出蔡侯朱在二十一年䘮太子建殺連尹奢在二十年屏王之耳目使不聰明不然平王之温惠共儉有過成莊無不及焉所以不獲諸侯邇無極也邇近也今又殺三不辜以興大謗三不辜郤氏陽氏晉陳氏幾及子矣子而不圖將焉用之夫鄢將師矯子之命以滅三族國之良也而不愆位在位無愆過吾新有君光新立也疆塲日駭楚國若有大事子其危哉知者除讒以自安也今子愛讒以自危也甚矣其惑也子常曰是瓦之罪敢不良圖九月己未子常殺費無極與鄢將師盡滅其族以說於國謗言乃止魏舒晉大夫也魯定公元年春王正月辛巳魏舒合諸侯之大夫于狄泉將以城成周魏子涖政涖臨也代天子大夫為政衛彪傒衛大夫曰將建天子立天子之居而易位以令非義也大事奸義必有大咎晉不失諸侯魏子其不免乎是行也魏獻子屬役於韓簡子及原壽過簡子韓起孫不信也原壽過周大夫而田於大陸焚焉禹貢大陸在鉅鹿此嫌絶逺疑此田在汲郡吳澤荒蕪之地火田并見燒也爾雅廣平曰陸還卒於寗寗今修武縣近吳澤范獻子去其柏椁以其未復命而田焉范獻子代魏子為政去其柏椁示貶之陽虎魯季氏家臣也定公五年六月季平子行東墅東墅季氏邑還未至丙申卒于房陽虎將以璵璠歛璵璠美玉君所佩仲梁懐弗與懐亦季氏家臣曰改歩改玉昭公之出季孫行君事佩璵璠祭宗廟今定公立復臣位改君歩亦當去璵璠陽虎欲逐之告公山不狃不狃曰彼為君也子何怨焉不狃季氏臣費宰子洩也為君不欲使僣九月乙亥陽虎囚季桓子公父文伯文伯季桓子從父昆弟也陽虎欲為亂恐二子不從故囚之而逐仲梁懐冬十月丁亥殺公何藐藐季氏族己丑盟桓子于稷門之内魯南城門庚寅大詛逐公父歜及秦遄皆奔齊歜即文伯也秦遄平子姑壻也傳言季氏之亂七年秋齊國夏伐我齊叛晉故陽虎御季桓子公歛處父御孟懿子處父孟氏臣成宰公歛陽將宵軍齊師齊師聞之墮伏而待之墮毁其軍以誘敵而設伏兵處父曰虎不圖禍而必死而女也苫夷曰虎䧟二子於難苫夷季氏家臣二子季孟不待有司余必殺女虎懼乃還不敗傳言陪臣强能自相以制季孟不敢有心田釐子乞事齊景公為大夫其收賦稅於民以小斗受之其粟予民以大斗行隂德於民而景公弗禁繇此田氏得齊衆心宗族益强民思田氏晏子數諫景公景公弗聽已而使於晉與叔向私語曰齊國之政其卒歸于田氏矣晏嬰卒後范仲行氏反晉晉攻之急范仲行請粟於齊田乞欲為亂樹黨於諸侯乃說景公曰范仲行數有德於齊齊不可不救齊使田乞救之而輸之粟景公太子死後有寵姬曰芮生子荼一作粥子景公病命其相國惠子與髙昭子以子荼為太子景公卒兩相髙國立荼是為安孺子而田乞不說欲立景公陀子陽生陽生素與乞歡安孺子之立也陽生奔魯田乞偽事髙昭子國惠子者每朝代参乗言曰始諸大夫不欲立孺子既立君相之大夫皆自危欲作亂又紿大夫曰髙昭子可畏也及未發先之諸大夫從之田乞鮑牧與大夫以兵入公室攻髙昭子昭子聞之與國惠子救公公師敗田乞之衆追國惠子惠子奔莒遂返殺髙昭子安孺子奔魯田乞使人之魯迎陽生陽生至齊匿田乞家田乞請大夫曰常之母有魚菽之祭幸而來㑹飲㑹飲田氏田乞盛陽生槖中置座中央發槖出陽生曰此乃齊君矣大夫皆伏謁將盟立之鮑牧醉田乞誣曰吾與鮑牧謀共立陽生也鮑牧怒曰大夫忘景公之嚴命乎諸大夫欲悔陽生乃頓首曰可則立之不可則已鮑牧恐禍及已乃復曰皆景公之子何為不可遂立陽生於田乞之家是為悼公乃使人遷安孺子於駘而殺孺子荼悼公既立田乞為相專齊政孟孺子洩魯孟懿子之子也哀公十四年將圉馬於成洩孟懿子之子孟武伯圉畜養也成孟氏邑成宰公孫宿不受曰孟孫為成之病不圉馬焉病謂民貧困孺子怒襲成從者不得入乃反成有司使孺子鞭之恨恚故鞭成有司之使人秋八月辛丑孟懿子卒成人奔䘮弗内袒免哭于衢聽共弗許請聽命共使懼不歸不敢歸成十五年正月成叛季孫雉魯大夫哀公二十四年閏月公如越得太子適郢適郢越王句踐之太子將妻公而多與之地公孫有山使告于季孫季孫懼使因大宰嚭而納賂焉乃止嚭故吳臣也季孫恐公因而討已故懼大尹宋近官有寵者魯哀公二十六年宋景公無子取公孫周之子得與啟畜諸公室周元公孫子髙也得昭公也啟得弟畜養也未有立焉於是皇緩為右師皇非我為大司馬皇懐為司徒皇懐非我從昆弟靈不緩為左師不緩子零圉龜之後樂茷為司城茷樂溷之子樂朱鈕為大司㓂朱鈕樂輓之子六卿三族降聽政三族皇靈樂降和同也因大尹以逹六卿因之以自通逹於君大尹常不告而以其欲稱君命以令不告君也國人惡之司城欲去大尹左師曰縱之使盈其罪盈滿也重而無基能無敝乎言勢重而無德以為基必敗也冬十月公游于空澤空澤宋邑辛巳卒于連中連中官名大尹興空澤之士千甲甲士千人奉公自空桐入如沃宫奉公尸也梁國虞縣東南有地名空桐沃宫宋都内宫名使召六子曰聞下有師君請六子畫畫計䇿六子至以甲刼之曰君有疾病請二三子盟乃盟于少寢之庭曰無為公室不利大尹立啟奉䘮殯于大宫三日而後國人知之司城茷使宣言于國曰大尹惑蠱其君而專其利今君無疾而死死又匿之是無他矣大尹之罪也言大尹所弑得夢啟北首而寢於盧門之外盧門宋東門北首死象在門外失國也已為烏而集于其上咮加于南門尾加于桐門曰余夢美必立桐門北門大尹謀曰我不在盟少寢盟但以君命盟六卿大尹不盟無乃逐我復盟之乎使祝襄為載書六子在唐孟地名將盟之祝襄以載書告皇非我襄祝名皇非我因子潞子潞樂茷門尹得樂得左師謀曰民與我逐之乎皆歸授甲使狥于國曰大尹惑蠱其君以陵虐公室與我者救君者也衆曰與之大尹狥曰戴氏皇氏將不利公室戴氏即樂氏與我者無憂不富衆曰無别惡其號令與君無别戴氏皇氏欲伐公公謂啟樂得曰不可彼以陵公有罪我伐公則甚焉使國人施于大尹施罪于大尹大尹奉啟以奔楚乃立得司城為上卿盟曰三族共政無相害也田常齊卿殺簡公乃立簡公弟驁是為平公平公即位田常桓之專齊之政割齊安平以東為田氏封邑平公之時齊自是稱田氏田常既殺簡公懼諸侯共誅已乃盡歸魯衛侵地西約晉韓魏趙氏南通吳越之使修功行賞親于百姓以故齊復定趙簡子晉卿也晉定公十八年簡子圍范中行氏于朝歌中行文子奔邯鄲二十一年簡子救邯鄲中行文子奔栢人簡子又圍栢人中行文子范昭子遂奔齊趙竟有邯鄲栢人范中行餘邑入于晉趙名晉卿實專晉權奉邑侔於諸侯晉頃公之十二年六卿以法誅公族祁氏羊舌氏分其邑為十縣六卿各令其族為之大夫晉公室由此益弱魏冉秦宣太后異父弟封穰侯同父弟曰芉戎為華陽君而昭王同母弟曰髙陵君涇陽君而魏冉最賢自惠王武王時任職用事武王卒諸弟爭立惟魏冉力為能立昭王昭王即位以冉為將軍衛咸陽誅季君之亂而逐武王后出之魏昭王諸兄弟不善者皆㓕之威振秦國昭王少宣太后自治任魏冉為政册府元龜卷七百四十七
