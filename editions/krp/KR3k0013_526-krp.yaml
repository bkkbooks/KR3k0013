body:
  text: 册府元龜巻五百二十六宋王欽若等撰諌諍部規諌第三後漢陳龜桓帝時為京兆尹㑹羌胡宼邊殺長吏驅畧百姓帝以龜世諳邊俗拜為度遼將軍龜臨行上䟽曰臣龜蒙恩累世馳騁邊垂雖展鷹犬之用頓斃胡虜之庭䰟骸不反薦享狐狸猶無以塞厚責荅萬分也臣至駑頑器無鈆刀一割之用過受國恩榮秩兼優生年死日永懼不報臣聞三辰不軌擢士為相蠻夷不恭挾卒為將臣無文武之才而忝鷹揚之任上慙聖朝下懼素餐雖殁軀體無所云補今西州邊鄙土地塉埆埆音覺又音確謂土薄也鞍馬為居射獵為業男寡耕稼之利女乏機杼之饒守塞候望懸命鋒鏑聞急長驅去不圖反自頃年以來匈奴數攻營郡殘殺長吏侮畧良細戰夫身膏沙漠居人首係馬鞍或舉國掩户盡種灰滅孤兒寡婦號哭空城野無青草室如懸磬雖含生氣實同枯朽徃歲并州水雨災螟互生稼穡荒耗租更空闕老者慮不終年少壯懼不困戹陛下以百姓為子品庻以陛下為父焉可不日昃勞神垂撫育之恩哉唐堯親捨其子以禪虞舜者是欲民遭聖君不令遇惡主也故古公杖策其民五倍文王西伯天下歸之豈復輿金輦寶以為民惠乎近孝文皇帝感一女子之言除肉刑之法體德行仁為漢賢主陛下繼中興之綂承光武之業臨朝聴政而未留聖意且牧守不良或出中官懼違上㫖取過目前呼嗟之聲招致災害胡虜凶悍因衰緣隙而令倉庫殫于豺狼之口功業無銖两之效皆由將帥不忠聚姦所致前涼州刺史祝良初除到州多所紏罰太子令長貶黜將半致未踰時功效卓然實應賞異以勸功能改任牧守去斥姦殘又宜更選匃奴烏桓䕶羗中郎將校尉簡練文武授之以法令除并涼二州令年租更寛赦罪隸掃除更始則善吏知奉公之祐惡者寛營私之禍胡馬可不窺長城塞下無候望之患矣帝覺悟乃更選幽并刺史自營郡太守都尉以下多所革易下詔為陳將軍除并涼一年租賦以賜吏民趙典桓帝時任為大鴻臚時恩德諸侯以無勞受封羣臣不悦而莫敢諫典獨奏曰夫無功而賞勞者不勸上忝下辱亂象干度左傳曰國無功不用善則自取謫于日月之災故政不可不慎務三而已一則曰擇人二曰從時前書曰成帝時同日封王氏五侯其日天氣赤黄霧四塞哀帝封丁氏日亦然是不用善傳人則亂象干度且髙祖之誓非功臣不封宜一切削免爵土以存舊典帝不從桓鸞為議郎上陳五事舉賢才審授用黜佞倖省苑囿息賦役書奏御忤内監故不省蔡邕為議郎初直諌靈帝好學自造黄羲篇五十章因引諸生能為文賦者本頗以經學相招后諸為尺牘及工書鳥篆者皆加引召遂至數十人侍中祭酒樂松賈䕶多引無行趨勢之徒並待制鴻都門下憙陳方俗閭里小事帝甚悦之待以不次之位又市賈小民為宣陵孝子者復數十人悉除為郎中太子舍人時頻有雷霆疾風傷樹拔木地震隕雹蝗蟲之害又鮮卑犯境役賦及民六年七月制書引咎制羣臣各陳政要當施行邕上封事曰臣伏讀聖㫖雖周風訊諸執事宣王遭旱密勿祗畏無以或加臣聞天降災異緣象而至辟歴數發辟音普歴切霹陽氣之動也殆刑誅繁多之所生也風者天之號令所以教人也夫昭事上帝則自懷多福宗廟致敬則鬼神以著國之大事實先祀典天子聖躬所當恭事臣自在宰府及備朱衣宰府謂司徒橋𤣥府也朱衣謂祭官也漢官儀曰漢家赤行齊者綘絝韈音文伐切迎氣五郊而車駕稀出四時之敬屢委有司雖有解除猶為踈廢故皇天不悦顯此諸異鴻範傳曰政悖德隱厥風發屋折木坤為地道易稱安貞隂氣憤盛則當靜反動法為下叛夫權不在上則雹傷物政有苛暴則虎狼食人貪利傷民則蝗蟲損稼去年六月二十八日太白與月相迫兵事惡之鮮卑犯塞所從來逺今之出師未見其利上違天文下逆人事誠當博覽衆議從其安者臣不勝憤懣謹條宜所施行七事表左表左謂陳之於表左也猶今云如左如右一事明堂月令天子以四立及季夏之節迎五帝於郊天子居明堂各依其月布政故云明堂月令四立謂立春立夏立秋立冬各以其日天子親迎氣于其方并祭其方之帝季夏之末祭中央帝也所以𨗳致神氣祈福豐年清廟祭祀追徃孝敬養老辟雍示人禮化皆帝者之大業祖宗所祗奉也而有司數以蕃國踈喪宮内產生及吏卒小汙屢生忌故小汙謂病及死也竊見南郊齋戒未嘗有廢至于他祀輒興異議豈南郊卑而他祀尊哉孝元皇帝策書曰禮之至敬莫重于祀所以竭心親奉以致肅祗者也又元和故事復申先典章帝元和二年制曰山川百神應典禮者尚未咸秩其議修羣祀以祈豐年又宗祀五帝于汶上明堂三年望祀華霍柴東岱宗為人祈福前後制書推心懇惻而近者以來更任太史忘禮敬之大任禁忌之書拘信小故以虧大典禮妻妾產者齋則不入側室之門無廢祭之文也禮記曰妻將生子及月辰居側室夫使人日再問之夫齋則不入側室之門也所謂宫中有卒三月不祭者謂士庻人數堵之室共處其中耳儀禮曰有死于宫中者則為之三月不舉祭豈謂皇居之曠臣妾之衆哉自今齋制宜如故典庻答風霆災妖之異二事臣聞國之將興至言數聞内知己政外見民情是故先帝雖有聖明之資而猶廣求得失又因災異援引幽隱重賢良方正敦樸有道之選危言極諌不絶于朝陛下親政以來頻年災異而未聞特舉博選之㫖誠當思省述修舊事使抱忠之臣展其狂直以解易傳政悖德隱之言三事夫求賢之道未必一塗或以德顯或以言揚頃者立朝之士曽不以忠信見賞嘗被謗訕之誅遂使羣下結口莫圖正詞郎中張文前獨盡狂言聖聴納受以責三司臣子曠然衆庻解悦漢名臣奏張文上䟽其畧曰春秋義曰蝗者貪擾之氣所生天意若曰貪狼之人蠶食百姓若蝗食禾稼而擾萬民獸齧人者象暴政若獸而齧人京房易傳曰小人不義而反尊榮則虎食人辟厯殺人象暴政妄有喜怒政以賄成刑放於寵推類敘意探㫖求原皆象羣下貪狼威敎妄施或若蝗蟲宜勅正衆邪清審選舉退屏貪暴魯僖公小國諸侯勅政修已斥退邪臣尚獲其報六月甚雨之應豈况萬乘之主修善求賢宜舉敦樸以輔善政陛下體堯舜之聖秉獨見之明恢太平之業敦經好學流布逺近可留須臾神慮則可致太平招休徵矣詔曰下太尉司徒司空夫瑞不虛至災必有緣朕以不德秉綂未明以招祅偽將何以昭顯憲法哉三司任政者也所當夙夜而各拱黙訖未有聞將何以奉答天意敉寧我人其各悉心思所崇改務消復之術稱朕意焉臣愚以為宜擢文右職以勸忠謇宣聲海内愽開政路四事夫司𨽻校尉諸州刺史所以督察姦枉分别白黒者也伏見幽州刺史楊憙益州刺史龎芝涼州刺史劉䖍各有奉公疾姦之心憙等所紏其效尤多餘皆枉撓不能稱職或有抱罪懷瑕與下同疾紀綱弛縱莫相舉察公府臺閣亦復黙然五年制書議遣八使又令三公謡言奏事漢官儀曰三公職採長吏臧否人所疾苦條奏之是為舉謡言是也是時奉公者欣然得志邪枉者憂悸失色未詳斯議所因寢息昔劉向奏曰夫執狐疑之計者開羣枉之門養不斷之慮者來讒邪之口今始聞善政旋復變易足令海内測度朝政宜追定八使紏舉非法更選忠清平章賞罰三公歲盡差其殿最使吏知奉公之福則衆災之原庻可塞矣五事臣聞古者取士必使諸侯歲貢尚書大傳曰古諸侯之于天子三年一貢士一適謂之攸好德再適謂之賢賢三適謂之有功注云適猶得也孝武之世郡舉孝廉又有賢良文學之選於是名臣軰出文武並興漢之得人數路而已數路謂孝廉文學之路也夫書畫辭賦才之小者經國理政未有其能陛下即位之初先渉經術聴政餘日觀看篇章聊以游意當代博奕非以教化取士之本而諸生競利作者鼎沸其高者頗引經訓風諭之言下則連偶俗語有類俳優或竊成文虛冐名氏臣每受教于聖化門差次錄第其未及者亦復隨軰皆見拜擢既加之恩難復收改但守俸禄於義已𢎞不可復使理人及仕州郡昔孝宣㑹諸儒於石渠章帝集學士於白虎通經釋義其事優大文武之道所宜從之若乃小能小善雖有可觀孔子以為致逺則泥君子固當志其大者六事墨綬長吏職典理人漢官儀曰秩六百石銅章墨綬也皆當以利惠為績日月為勞褒責之科所宜分明而今在任無復能省及其還者多召拜議郎郎中若器用優美不宜處之冗散如有釁故自當極其刑誅豈有伏罪懼考而反求遷轉更相放效臧否無章先帝舊典未嘗有此可皆㫁絶以覈眞偽七事伏見前一切以宣陵孝子者有以為太子舍人臣聞孝文皇帝制喪服三十六日惟繼體之君父子至親公卿列臣受恩之重皆屈情從制不敢踰越今虛偽小人本非骨肉既無私幸之恩又無祿仕之實惻隱思慕情何緣生而羣聚山陵假名稱孝行不隱心義無依至有姦軌之人通容其中恒思皇后祖載之時東郡有盗人妻者亡在孝中本縣追捕乃伏其辜虛偽雜穢難得勝言又前至得拜後軰被遺或經年陵次以暫歸見漏或以人自代以蒙寵榮爭訟怨憾汹汹道路太子官屬宜搜選令德豈有但取丘墓凶醜之人其為不祥莫與大焉宜遣歸田里以明詐偽書奏帝乃親迎氣北郊及行辟雍之禮又詔宣陵孝子為舍人者悉改為丞尉焉盧植為尚書靈帝光和元年有日食之異植上封事諌曰臣聞五行傳曰晦而月見謂之朓王侯其舒此謂君政舒緩故曰食晦也春秋傳曰天子避位移時言其相掩不過移時而間者日食自已過午既食之後雲霧晻曖比年地震彗孛互見臣聞漢以火德化當寛明近色信讒忌之甚者如火畏水故也按今年之變皆陽失陰侵消禦災凶宜有其道謹畧陳八事一曰用良二曰原禁三曰禦癘四曰備㓂五曰修禮六曰遵堯七曰禦下八曰散利用良者宜舉州郡覈舉賢良隨方委用責求選舉原禁者凡諸黨錮多非其罪可加赦恕申宥回枉禦癘者宋后家屬並以無辜委骸横尸不得收葬疫癘之來皆由于此宜勅收拾以安逰䰟后以王甫程阿所横憂死父及兄弟並被誅靈帝後夢見桓帝怒曰宋皇后何罪而絶其命也訴于天上帝震怒罪在難救也備㓂者侯王之家賦税减削愁窮思亂必致非常宜使給足以防未然修禮者應徵有道之人若鄭𤣥之徒陳明洪範攘服災咎遵堯者今郡守刺史一月數遷宜依黜陟以章能否縱不九載可滿三歳禦下者請謁希爵一宜禁塞遷舉之事責成主者散利者天子之體理無私積宜𢎞大務蠲畧納徵帝不省孔融為少府荆州牧劉表不供職貢多行僭偽遂乃郊祀天地擬斥乘輿詔書班行其事融上疏曰竊聞領荆州牧劉表桀逆放恣所為不軌至乃郊祀天地擬議社稷雖昏僭惡極罪不容誅至于國體宜且諱之何者萬乘至重天王至尊身為聖躬國為神器陛級懸逺祿位限絶猶天之不可階日月之不可踰也每有一豎臣輒去圖之若行之四方非所以杜塞邪萌愚謂雖有重戾必宜隱忍賈誼所謂投䑕忌器盖謂此也是以齊兵次楚唯責包茅王師敗績不書晉人前以露袁術之罪今復下劉表之事是使跛䍧欲闚髙岸天險可得而登也按表跋扈擅誅列侯遏絶詔命㫁盗貢篚招呼元惡以自營衛專為羣逆主萃淵藪郜鼎在廟章孰甚焉桑落瓦解其勢可見臣愚以為宜隱郊祀之事以崇國防魏劉􅘙魏國初建為黄門侍郎太祖在長安欲親征蜀􅘙上疏曰聖人不以智輕俗王者不以人廢言故能成功于千載者必以逺察近智周于獨㫁者不恥于下問亦欲博采必盡于衆也且韋弦非能言之物而聖賢引以自規臣才智闇淺願自比于韋弦昔樂毅能用弱燕破大齊而不能以齊兵定即墨者夫自為計者雖弱必固欲自潰者雖强必敗也自殿下起軍以來三十餘年敵無不破彊無不服今以海内之兵百勝之威而孫權負險于吳劉備不賔于蜀夫夷狄之臣不當冀州之卒權備之籍不比袁紹之業然本初亡而二㓂未㨗非闇弱于今而智武于昔也私自為計者與欲自潰者異勢耳故文王伐崇三駕不下歸而修德然後服之秦為諸侯所征必服及兼天下東向稱帝匹夫大呼而社稷用隳是力斃于外而不恤民于内也臣恐邊宼非六國之敵而世不乏才分土之勢此不可不察也天下有重得有重失勢可得而我勤之此重得也勢不可得而我勤之此重失也於今之計莫若料四方之險擇要害之處而守之選天下甲卒隨方面而歲更焉殿下可高枕于廣厦潜思于治國廣桑事從節約修之旬年則國富民安矣太祖遂進前而報􅘙曰非但君知臣臣亦當知君今欲使吾坐行西伯之德恐非其人也賈詡為大中大夫文帝為五官將而臨菑侯植有奪宗之思太祖嘗屏除左右問詡詡黙然不對太祖曰與卿言而不答何也詡曰屬適有所思故不即對耳太祖曰何思詡曰思袁本初劉景昇父子也太祖大笑于是太子遂定王朗文帝時為御史大夫上䟽勸育民省刑曰起兵以來三十餘年四海盪覆萬國殄瘁頼先王芟除盗賊扶育孤弱遂使華夏復有綱常鳩集兆民于兹魏土使封鄙之内鷄鳴狗吠達于四境蒸庻欣欣喜遇昇平今逺方之宼未賓兵戎之役未息誠令復除足以懷逺人良宰足以宣德澤阡陌咸修四民殷熾必復過于曩時而富于平日矣易稱勅法書著祥刑一人有慶兆民頼之慎法獄之謂也昔曹相國以獄市為寄路溫舒疾治獄之吏夫治獄者得其情則無寃死之囚丁壯者得盡地力則無饑饉之民窮老者得仰食倉廪則無餒饑之殍嫁娶以時男女無怨曠之憾胎養必全則孕者無自傷之哀新生必復則孩者無不育之累壯而後役則㓜者無離家之思二毛不戎則老者無頓伏之患醫藥以療其疾寛柔以樂其業威罰以抑其强恩仁以濟其弱賑貸以贍其乏十年之後既笄者必盈巷二十年之後勝兵者必滿野矣辛毗為侍中文帝欲大興軍征吳毗諌曰吳楚之民險而難禦道隆後服道汚先叛自古患之非徒今也陛下祚有海内夫不賔者其能乆乎昔尉佗稱帝子陽僣號歴年未幾或臣或誅何則違逆之道不乆全而大德無所不服也方今天下新定地廣民稀夫廟筭而後出軍猶臨事而懼況今廟有闕而欲用之臣誠未見其利也先帝屢起鋭師臨江而旋今六軍不増于故而復循之此末易見也今日之計莫若修范蠡之養民法管仲之寄政則充國之屯田明仲尼之逺懷十年之中强壯未老童齔勝戰兆民知義將士思奮然後用之則役不再舉矣帝曰如卿意更當以虜遺子孫耶毗對曰昔周文王以紂遺武王惟知時也茍時未可庸得已乎帝竟伐吳至江而還高柔為廷尉魏初三公無事又希與朝政柔上䟽曰天地以四時成功元首以輔弼興治成湯仗阿衡之佐文武慿旦望之力逮至漢初蕭曹之儔並以元勲代作心膂此皆明王聖主任臣于上賢相良輔股肱于下也今公輔之臣皆國之棟梁無所具瞻而置之三事不使知政遂各偃息養髙鮮有進納誠非朝廷崇用大臣之義大臣獻可替否之謂也古者刑政有疑輒議于槐棘之下自今之後朝有疑議及刑獄大事宜數以咨訪三公三公朝朔望之日又可得延入講論得失博盡事情庻有禆起天聴𢎞益大化文帝加納焉至明帝即位為博士是時禁殺鹿者身死財產沒官有能覺告者厚加賞賜上䟽曰聖王之御世莫不以廣農為務儉用為資夫農廣則穀積用儉則財蓄蓄財積穀而有憂患之虞者未之有也古者一夫不耕或為之饑一婦不織或為之寒中間以來百姓供給衆役親田者既減加頃復有獵禁羣鹿犯暴殘食生苗處處為害所傷不貲民雖障防力不能禦至如滎陽左右周數百里歲畧不收元元之命實可矜傷方今天下生財者甚少而麋鹿之損者甚多卒有兵戎之役凶年之災將無以待之惟陛下覽先聖之所念愍稼穡之艱難寛放民間使得捕鹿遂除其禁則衆庻永濟莫不悦豫矣又魏名臣奏載柔上䟽曰臣深思陛下所以不蚤取此鹿者誠欲使極蕃息然後大取以為軍國之用然臣竊以為今鹿但有日耗終無從得多也何以知之今禁地廣輪且千餘里臣計其中有虎大小六百頭狼有五百頭狐萬頭有大虎一頭三日食一鹿一虎一歲百二十鹿是為六百頭虎一歲食七萬二千頭鹿也使十狼日共食一鹿是為五百頭狼一歲共食萬八千頭鹿也鹿子始生未能善走使十狐一日共食一子比至徤走一月之間是為萬狐一月共食鹿子二萬頭也大凢一歲所食十二萬頭其鵰鶚所害臣置不計以此推之終無從得多不如早取之為便也和洽明帝時為光禄勲太和中散騎常侍髙堂隆奏時風不至而有休廢之氣必有司不勤職事以失天常也詔書虛謙引咎博諮異同洽以為民稀耕少浮食者多國以民為本民以穀為命故廢一時之農則失育命之本是以先王務蠲煩費以專耕農自春夏以來民窮于役農業有廢百姓囂然時風不至未必不由此也消復之術莫大于節儉太祖建立洪業奉師徒之費供軍賞之用吏士豐于資食倉府衍于穀帛猶不飾無用之宮絶浮華之費方今之要固在省息勞煩之役損除他餘之務以為軍戎之儲三邊守禦宜在備豫料賊虛實蓄士養衆筭廟勝之䇿明攻取之謀詳詢衆庶以求厥中若謀不素定輕弱小敵軍人數舉舉而無庸所謂玩武無震古人之戒也髙堂隆為侍中明帝用法深重隆上疏曰夫拓跡垂統必俟聖明輔世致治亦須良佐用能庶績其凝而品物康乂也夫移風易俗宣明道化四表同風回首面内徳教光熙九服慕義固非俗吏之所能也今有司務糾刑書不本大道是以刑用而不措俗弊而不敦宜崇禮樂班敘明堂修三雍大射養老營建郊廟尊儒士舉逸民表章制度改正朔易服色布愷悌尚儉素然後備禮封禪歸功天地使雅頌之聲盈于六合緝熙之化流于後嗣斯蓋至治之美事不朽之貴業也則九域之内可揖讓而治矣尚何憂哉茍不正其本而求其末譬猶棼絲非理政也可命羣公卿士通儒造具其事以為典蔣濟為中䕶軍明帝時中書監令號為專任濟上疏曰大臣太重者國危左右太親者身敝古之至戒也往者大臣秉事外内扇動陛下卓然自覽萬幾莫不祇肅夫大臣非不忠也然威權在下則衆心慢上勢之常也陛下既已察之于大臣願無忘於左右左右忠正逺慮未必賢于大臣至于便辟取舍或能工之今外所言輒云中書雖使恭愼不敢外交但有此名猶惑世俗況實握事要日在目前儻因疲倦之間有所割制衆臣見其能推移于事即亦因時而向之一有此端因當内設自完以此衆語私招所交為之内援若此臧否毁譽必有所興功負賞賜必有所易直道事上者或壅曲附左右者反達因微而入緣刑而出意所狎信不復猜覺此宜聖智所當蚤聞外以經意則形察自見或恐朝臣畏言不合而受左右之怨莫適以聞臣竊亮陛下潜神黙思公聴並觀若事有未盡于理而物有未周于用將改曲易調逺與黄唐角功近昭武文之迹豈近習而已哉然人君猶不可悉天下事以適已明有所付三官任一臣非周公旦之忠又非管夷吾之公則有弄機敗官之弊當今柱石之士雖少至于行稱一州智效一官忠信竭命各奉其職可並驅策不使聖明之朝有專吏之名也詔曰夫骨鯁之臣人主之所伏也濟才兼文武服勤盡節每軍國大事輒有奏議忠誠奮發吾甚壯之就遷為䕶軍加散騎常侍鍾毓為散騎常侍時蜀將諸葛亮圍祁山明帝欲親征毓上䟽曰夫策貴廟勝功尚帷幄不下殿堂之上而决勝千里之外車駕宜鎭守中土以為四方威勢之援今大軍西征雖有百倍之威于關中之費所損非一且盛暑行師詩人所重實非至尊動軔之時也遷黄門侍郎時大興雒陽宫室車駕便幸許昌天下當朝正許昌許昌偪狹于城南以氊為殿備設魚龍蔓延民罷勞役毓諌以為水旱不時帑藏空虛凢此之類可須豐年又上宜復關内開荒地使民肆力于農事遂施行王肅為散騎常侍大司馬曹眞征蜀肅上䟽曰前志有之千里饋糧士有饑色樵蘇後㸑師不宿飽此謂平塗之行軍者也又況于深入險阻鑿路而前則其為勞必相百也今又加之以霖雨山阪峻滑衆逼而不展糧縣而難繼實行軍之大忌也聞曹眞發已踰月而行裁半谷治道功夫戰士悉作是賊便得以逸而待勞乃兵家所憚也言之前代則武王伐紂出關而復論之近事則文武征權臨江不濟豈非所為順天知時通于權變者哉兆民知聖上以水雨艱劇之故休而息之後日有釁乘而用之則所謂悦以犯難民忘其死者矣于是遂罷何晏為尚書正始八年七月奏曰善為國者必先治其身治其身者愼其所習習正則身正身正則不令而行所習不正則其身不正其身不正則雖令不從是故為人君者所與逰必擇正人所觀覽必察正象放鄭聲而不聼逺佞人而弗近然後邪心不生而正道可行也季末闇主不知損益斥逺君子引近小人忠良踈逺便佞䙝狎亂生近暱譬之社䑕考其昬明所積以然故聖賢諄諄以為至慮舜戒禹曰鄰哉鄰哉言愼所近也周公戒成王曰其明言愼所與也詩云一人有慶兆民頼之可自今以後御幸式乾殿及游豫後園皆大臣侍從因從容戲宴兼省文書詢謀政事講論經義為萬世法孔晏乂為散騎常侍諌議大夫正始八年十二月奏曰禮天子之宫有斵礱之制無朱丹之飾宜循禮復古今天下已平君臣之分明陛下但當不懈于位平公正之心審賞罰以使之可絶後園習騎乘馬出必御輦乘車是天下之福臣子之願也晏乂咸因闕以進規諌程曉齊王嘉平中為黄門侍郎時校事放横曉上䟽曰周禮之設官分職以為民極春秋傳曰天有十日人有十等愚不得臨賢賤不得臨貴於是並建聖哲樹之風聲明試以功九載考績各修厥業思不出位故欒書欲拯晉侯其子不聼死人横于街路邴吉不問上不責非職之功下不務分外之賞吏無兼綂之勞民無二事之役斯誠為國要道治亂所由也逺覽典志近觀秦漢雖官名改易職司不同至于宗上仰下顯明分例其致一也初無校事之官干與庻政者也昔武皇帝大業草創衆官未備而軍旅勤苦民心不安乃有小罪不可不察故置校事取其一切耳然檢御有方不至縱恣也此覇世之權宜非帝王之正典其後漸蒙見任復為疾病轉相因仍莫正其本遂令上察宮廟下攝衆司官無局業職無方限隨意任情惟心所適法造于筆端不依科詔獄成于門下不顧覆訊其選官屬以謹慎為粗疏以􅢽詷為賢能其治事以刻暴為公嚴以循理為性弱外則託天威以為聲勢内則聚羣姦以為腹心大臣恥與分勢含忍而不言小人畏其鋒芒欝結而無告至使尹謨公于目下肆其姦慝罪惡之著行路皆知纎惡之過積年不聞既非周禮設官之意又非春秋十等之義也今外有公卿將校總統諸署内有侍中尚書綜理萬機司隷校尉督察京輦御史中丞董攝宮殿皆髙選賢才以充其職申明科詔以督其違若此諸賢猶不足任校事小吏益不可信若此諸賢各思盡忠效其區區亦復無益各更髙選國士以為校事則是中丞司隷重増一官耳莫如舊選尹謨之姦今復發矣進退推筭無所用之昔桑𢎞羊為漢求利卜式以為獨烹𢎞羊天乃可雨若政治得失必感天地臣恐水旱之災未必非校事之由也曹恭公逺君子近小人國風託以為刺衛獻公舍大臣而與小臣謀定姜謂之有罪縱今校事有益于國以禮義言之尚傷大臣之心又況姦回暴露而據不罷是衮闕不補迷而不返也於是遂罷校事官呉闞澤文帝時領中書權嘗問書傳篇何者為美澤欲諷諭以明治亂因對以賈誼過秦論最善權覽讀焉全琮為呉大司馬右軍師為人恭順善于承顏納規言辭未嘗切迕初權將圍珠崖及夷州皆先問琮琮以聖朝之威何向而不克然殊方異域隔絶瘴海水土氣毒自古有之兵入民出必有疾病咸相汙染徃者懼不能返所獲何可多致猥虧江岸之兵以兾萬一之利愚臣有所不安權不聴軍行經歲士衆疾疫死者十有八九權深悔之後言次及之琮對曰當是時羣臣有不諌者臣以為不忠册府元龜卷五百二十六
