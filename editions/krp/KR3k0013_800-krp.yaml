body:
  text: 册府元龜卷八百宋王欽若等撰總録部敏㨗夫言辭辯給應答無滯其敏㨗之謂矣仲尼曰言及之而不言謂之隠又曰辭之不可以已也其或備人君之切問預朋友之燕居剖疑析滯渙若氷釋解嘲答難森然鋒起或因枝而振葉或踵事以増華響應無窮言必有中良足嘉也至夫嗇夫之利躁人之多貽如簧之譏致亂官之責亦所不敢取也後漢戴寵年二十二為督郵曾以職事見詰府君欲撻之寵曰今鄙郡遭明府咸以為仲尼之君國小人少以寵為顔回豈聞仲尼有撻顔回之義府君異其對即日教署主簿張重日南計吏形容短小明帝問云何郡小吏答曰臣日南計吏非小吏也魏陳登沛相陳珪子也呂布在下邳珪遣登詣太祖布因登求徐州牧不得登還布怒㧞㦸斫几曰卿父勸我協同曹公絶婚公路今吾所求無一獲而卿父子並顯重為卿所賣耳卿為吾言其說云何登不為動容徐喻之曰登見曹公言待将軍譬如養虎當飽其肉則将噬人公曰不如卿言也譬如養鷹飢則為用飽則颺去其言如此布意方解王朗字景興太祖請同㑹啁朗曰不能效君昔在㑹稽折秔米飯也朗仰而嘆曰宜適難値太祖問云何朗曰如朗昔者未可折而折如明公今日可折而不折也後為司空徐邈為尚書郎時禁酒而邈私飲至醉校事趙達問以曹事邈曰中聖人逹白之後文帝幸許昌問邈曰頗復中聖人不邈對曰昔子反斃於穀陽御叔罰於飲酒臣嗜同二子不能自懲時復中之然宿瘤以醜見傳而臣以醉見識帝大笑顧左右曰名不虚立吳虞昺字世文翻第八子也少有倜儻之志仕吳黄門郎以㨗對見異超拜尚書侍郎張純字元基少厲操行學博才秀切問㨗對容止可觀拜郎中薛綜為謁者僕射蜀使張奉於太常前列尚書闞澤姓名以嘲澤澤不能對綜下行酒因勸酒曰蜀者何也有犬為獨無犬為蜀横目勾身蟲入其腹奉曰不敢復列君吳耶綜應聲曰無口為天有口為吳君臨萬邦天子之都於是衆坐喜笑而奉無以對其樞機敏㨗皆此類也一云費褘聘於吳陛見公卿侍臣皆在座酒酣褘與諸葛恪相對嘲難言及吳蜀褘問曰蜀字云何恪曰有水者濁無水者蜀横目勾身蟲入其腹褘復問吳字云何恪曰無口者天有口者吳下臨滄海天子之都諸葛恪父瑾面長似驢大帝大㑹羣臣使人牽一驢入長檢其面題曰諸葛子瑜恪跪曰乞請筆益兩字因聽與筆恪續其下曰之驢舉坐歡笑乃以驢賜恪他日復見帝問恪曰卿父與叔父孰賢對曰臣父為優帝問其故對曰臣父知所事叔父不知是以為優帝又大噱命恪行酒至張昭前昭先有酒色不肯飲曰此非養老之禮也帝曰卿其能令張公辭屈乃當飲之耳恪難昭曰昔師尚父九十秉旄仗鉞猶未告老也今軍旅之事將軍在後酒食之事将軍在先何謂不養老也昭卒無辭遂為盡爵後蜀使至羣臣並㑹帝謂使曰此諸葛恪雅好騎乗還告丞相為致好馬恪因下謝帝曰馬未至而謝何也恪對曰夫蜀者陛下之外廐今有恩詔馬必至也安敢不謝恪之才㨗皆此類也帝嘗問恪頃何以自娛而更肥澤恪對曰臣聞富潤屋徳潤身臣非敢自娛脩已而已又問卿何如滕𦙍恪答曰登階攝履臣不如𦙍運籌轉䇿𦙍不如臣恪嘗獻帝馬先􅀈其耳范慎時在座嘲恪曰馬雖六畜稟氣於天今殘其耳豈不傷仁恪答曰母之於女恩愛至矣穿耳附珠何傷於仁曽有白頭鳥集殿前帝曰此何鳥也恪曰白頭翁也張昭自以坐中最老疑恪以鳥戯之因曰恪欺陛下未嘗聞鳥有白頭翁者試使恪復求白頭母恪曰鳥名鸚母未必有對試使輔吳復求鸚父昭不能答坐中皆歡笑位至太傅蜀張裔為益州郡太守郡耆率雍闓不賔縛裔與吳㑹先主薨諸葛亮遣鄧芝使吳亮令芝言次可從孫權請裔裔自至吳數年流徙伏匿權未之知也故許芝遣裔裔臨發權乃引見問裔曰蜀卓氏寡女亡奔司馬相如貴土風俗何以乃爾乎裔對曰愚以為卓氏之寡猶賢於買臣之妻權又謂裔曰君還必用事西朝終不作田父於閭里也将何以報我裔對曰裔負罪而歸将委命有司若蒙徼倖得全首領五十八已前父母之年也自此以後大王之賜也權言笑歡悅有器裔之色裔出閣深悔不能陽愚即便就船倍道兼行權果追之裔已入永安界數十里追者不能及晉阮籍文帝引為大将軍從事中郎有司言有子殺母者籍曰嘻殺父乃可至殺母乎坐者恠其失言帝曰殺父天下之極惡而以為可乎籍曰禽獸有知母而不知父殺父禽獸之類也殺母禽獸之不如衆乃悅服孫皓封歸命侯武帝嘗與王濟奕棊時皓在側濟謂皓曰何以好剥人面皮皓曰見無禮於君者則剥之濟時伸脚局下皓譏焉吳彦為建平太守吳亡彦始歸降晉武帝以為金城太守帝嘗從容問薛瑩曰孫皓所以亡國者何也瑩對曰歸命侯臣皓之君吳昵近小人刑罰妄加大臣大将無所親信人人憂恐各不自安敗亡之釁由此而作矣其後帝又問彦對曰吳主英俊宰輔賢明帝笑曰君明臣賢何為亡國彦曰天禄永終厯數有屬所以為陛下擒此葢天時豈人事也張華時在坐謂彦曰君為吳將積有歳年蔑爾無聞竊所惑矣彦厲聲曰陛下知我而卿不聞乎帝甚嘉之孫楚與王濟友善楚少時欲隠居謂濟曰當欲枕石潄流誤云潄石枕流濟曰流非可枕石非可潄楚曰所以枕流欲洗其耳所以潄石欲礪其齒後為馮翊太守陸機字士衡入雒嘗詣侍中王濟濟指羊酪謂機曰卿吳中何以敵此答云千里蓴羮未下鹽豉時人稱為名對范陽盧志於衆中問機曰陸遜陸抗於君近逺機曰如君於盧毓盧珽志黙然既起雲謂機曰殊邦遐逺客不相識何至於此機曰我父祖名播四海寧不知耶議者以此定二陸之優劣機位至平原守陸雲性清正有才理與兄機齊名雖文章不及機而持論過之雲與荀隠素未相識嘗㑹張華座華曰今日相遇可勿為常談雲因抗手曰雲間陸士龍隠曰日下荀鳴鶴鳴鶴隠字也雲又曰既開青雲覩白雉何不張爾弓挾爾矢隠曰本謂是雲龍騤騤乃是山鹿野麋獸微弩彊是以發遲華撫手大笑後為大将軍右司馬王尼字孝孫初入雒詣東海王越云公負尼物越大驚曰寧有是也尼曰昔楚人亡布謂令尹盜之今尼屋舍資財悉為公軍人所略尼今飢凍是亦明公之負也越大笑即賜絹五十疋諸貴人聞競往餉之辟車騎府舍人不就祖納為大将軍王敦聞其賢遺其二婢而辟為從事中郎有戯之曰奴價倍婢納曰百里奚何輕於五羖皮耶諸葛恢嘗與司空王導戯爭族姓曰人言王葛不言葛王也恢曰不言馬驢而言驢馬豈驢勝馬耶恢後至尚書令習鑿齒為桓温户曹參軍時有桑門釋道安俊辯有髙才自北至荆州與鑿齒初相見道安曰彌天釋道安鑿齒曰四海習鑿齒時人以為佳對戴􅋟字安丘處士逵之弟並驍果多權畧逵勵操東山而􅋟以武勇顯謝安嘗謂􅋟曰卿兄弟志業何如􅋟曰下官不堪其憂家兄不改其樂王珣為僕射王恭謂珣曰比來視君一似胡廣珣曰王陵廷爭陳平慎黙但問歲終何如耳孫綽髙尚有志節所居齋前種一株松嘗自守䕶鄰人謂之曰樹子非不楚楚可憐但恐永無棟梁日耳綽答曰楓栁雖復合抱亦何所施行潘京字世長武陵人為州所辟因謁見問䇿探得不孝字刺史戯京曰辟士為不孝耶京舉板答曰今為忠臣不得為孝子其機辯皆此類京位至泉陵令周處仕吳為無難督及吳平王渾登建業宮釃酒謂吳人曰諸君亡國之餘得無戚乎處對曰漢末分離三國鼎立魏滅於前吳亡於後亡國之戚豈惟一人渾有慚色袁甫為淮南國大農郎中令石衍問甫曰卿名能辯豈知夀陽已西何以常旱夀陽已東何以常水甫曰夀陽已東皆是吳人夫亡國之音哀以思鼎足彊邦一朝失職憤嘆甚積積憂成隂隂積成雨雨久成水故其域常澇也夀陽已西皆是中國新平彊吳美寶皆入志盈心滿用長歡娛公羊有言魯僖甚喜故致旱京師若能抑彊扶弱先疏後親則天下和平灾害不生矣觀者嘆其敏㨗孟嘉為征西桓温參軍人問聽伎絲不如竹竹不如肉何謂也嘉答曰漸近使之然一坐咨嗟袁宏為大司馬桓温記室謝安嘗賞其機對辯速後安為揚州刺史宏自吏部出為東陽郡乃祖道於治亭時賢皆集安欲以卒廹試之臨别執其手顧就左右取一扇而授之曰聊以贈行宏應聲答曰輒當奉揚仁風慰彼黎庶時人嘆其率而能要焉謝𤣥字幼度與從兄朗俱為叔父安所噐重安嘗戒約子姪因曰子弟亦何豫人事而正欲使其佳諸人莫有言者𤣥答曰譬如芝蘭玉樹欲使其生於庭階耳安悅之後為左將軍㑹稽史顧悅之字君叔少有義行與簡文同年而髪早白帝問其故對曰松柏貞姿經霜獨茂蒲栁常質望秋先零帝悅其對厯尚書右丞顧愷之為大司馬桓温參軍甚見親昵温薨後愷之拜温墓賦詩云山摧溟海竭魚鳥将何依或問之曰卿慿重温公乃爾哭狀其可見乎答曰聲如震雷破山淚如傾河注海虞嘯父為侍中侍宴因大醉出拜不能起孝武顧曰扶虞侍中嘯父曰臣位未及扶醉不及亂非分之賜所不敢當帝甚悅王楨之字公幹獻之兄徽之子也為大司馬長史桓𤣥為太尉朝臣畢集問楨之我何如君亡叔在坐咸為氣咽楨之曰亡叔一時之標公是千載之英一坐皆悅劉邁為殷仲堪中兵參軍桓𤣥嘗戯馬以弰拂仲堪邁謂𤣥曰馬弰有餘精理未足𤣥怒将殺之邁僅而免禍後𤣥得志邁詣門稱謁𤣥謂邁曰安知不死而敢相見邁對曰射鈎斬袪與邁為三故知不死𤣥甚喜張天錫自梁州歸命封西平郡公㑹稽王導嘗問其西土所出天錫應聲曰桑葚甜甘鴟鴞革響乳酪養性人無忌心宋張敷為中書郎敷小名查父邵小名梨文帝戯之曰查何如梨敷曰梨為百果之宗查何可比顧覬之嘗於文帝坐論江左人物言及顧榮袁淑謂覬之曰卿南人怯懦豈辨賊覬之正色曰卿乃復以忠義笑人淑有愧色位至吏部尚書沈慶之為車騎大将軍孝武嘗勸飲普令羣臣賦詩慶之手不知書眼不識字帝逼令作詩慶之曰臣不知書請口授師伯帝即令顔師伯執筆慶之口授之曰微臣値多幸得逢時運昌朽老筋力盡徒步還南岡辭榮此聖世何媿張子房帝甚悅衆生稱其辭意之美沈懷文孝武嘗有事圜丘未至期而雨晦竟夜明旦風霽日色甚美帝升壇甚悦懷文稱慶曰昔漢后郊祀太一白日重輪神光四燭今陛下有事兹禮而膏雨迎夜前景麗朝斯寔聖明幽感所致臣願與侍臣賦之帝笑稱善後為廣陵太守謝莊為左衛将軍孝武嘗賜莊寶劍莊以與豫州刺史魯爽送别爽後反叛世祖因宴集問劍所在答曰昔以與魯爽别竊為陛下杜郵之賜帝甚悦當時以為知言孝武嘗謂顔延年曰謝希逸月賦何如答曰美則美矣但莊始知隔千里兮共明月帝召荘以延年答語語之莊應聲曰延年作秋胡詩始知生為乆離别沒為長不歸帝撫掌竟日又王𤣥謨問莊何者為雙聲何者為疉韻答曰𤣥䕶為雙聲磝碻為疉韻其㨗速如此巢尚之甚聰敏時百姓欲為孝武立寺擬其名尚之應聲曰宜名天保詩云天保下報上也時服其機速累遷黄門侍郎宗越為後軍參軍督䕶隨王誕戱之曰汝何人遂得我府四字越答曰佛貍未死不憂不得諮議參軍誕大笑臣欽若等曰佛貍後魏道武小字也殷叡字文子解義有口才司徒褚淵甚重之謂之曰諸殷自荆州以來無出卿右者叡歛容答曰殷侯衰悴誠不如昔若此㫖為虚故不足降此㫖為實彌不可聞南齊褚炫初仕宋為撫軍車騎記室正員外郎從明帝射雉至日中無所得帝甚猜羞召問侍臣曰吾旦來如臯遂空行可笑座者莫答炫獨曰今節候雖適而雲露尚凝故斯翬之禽驕心未警但得神駕游豫羣情便為載懽帝意解乃於雉塲置酒范柏年初為州将劉亮使出都咨事見宋明帝帝言次及廣州貪泉因問柏年卿州復有此水不答曰梁州唯有文川武鄉廉泉讓水又問卿宅在何處曰臣亷讓之間帝嗟其善答因見知厯位内外終於梁州刺史崔祖思為刺史髙帝既為齊王置酒為樂羮膾既至祖思曰此味故為南北所推侍中沈文季曰羮膾吳食非祖思所解祖思曰炰鼈膾鯉似非句吳之詩文季曰千里蓴羮豈闗魯衛帝甚悦曰蓴羮故應還沈祖思後為青冀二州刺史王儉為吏部郎有客姓譚者詣儉求官儉謂曰齊桓滅譚那得有君答曰譚子奔莒所以有僕儉賞其善噱卒得職焉王慈僧䖍之子也謝鳯字超宗嘗謂慈曰卿書何當及䖍公慈曰我之不得仰及猶鷄之不得鳯也時人以為名答慈位至豫章内史王敬則為太尉武帝御座賦詩敬則執紙曰臣幾落此奴度内帝問此何言敬則曰臣若知書不過尚書令史耳那得今日虞長耀為員外郎王敬則初使虜於北館種楊栁後長耀北使還敬則問我昔種楊柳樹今若大小長耀曰虜中以為甘棠敬則笑而不答周盤龍為散騎常侍武帝戱之曰卿看貂蟬何如兠鍪盤龍曰此貂蟬從兠鍪中出耳范文季為散騎常侍領軍將軍武帝謂文季曰南土無僕射多厯年所文季對曰南風不競非復一日文季雖不學發言必有辭采當世稱其應對周顒為太子僕衛将軍王儉謂顒曰卿山中何所食顒曰赤米白鹽緑葵紫蓼文惠太子問顒菜食何味最勝顒曰春初早韭秋末晩菘時何𦙍亦精信佛法無妻妾太子又問顒卿精進何如𦙍顒曰三塗六難共所未免然各有其累太子曰所累伊何對曰周妻何肉其言辭應變皆如此也庾杲之為黄門吏部郎武帝酒後謂羣臣曰我後當得何謚羣臣莫有答王儉因目杲之後答曰陛下夀等南山方與日月齊明千載之後豈是臣子輕所仰量時人雅嘆其辯答杲之嘗兼主客郎對魏使使問杲之曰百姓那得家家題名帖賣宅答曰朝廷既欲掃蕩京雒克復神州所以家家賣宅耳魏使縮鼻而不答杲之後為太子右衛卒謝瀹性甚敏贍嘗與劉俊飲推辭久之俊曰謝莊兒不可云不能飲瀹曰茍得其人自可沉湎千日俊甚慙無言勔俊父也瀹後為太子詹事劉繪性通悟出為南康相郡人有性賴所居名穢里刺謁繪繪戯嘲之曰君有何穢而居穢里此人應聲曰未審孔丘何闕而居闕里繪黙然不答亦無忤意歎其辯速梁范雲初仕齊為竟陵王丹陽尹主簿時進見齊髙帝值有獻白鳥者帝問此為何瑞雲位卑最後答曰臣聞王者敬宗廟則白鳥至時謁廟始畢曰卿言是也感應之理一至此蕭琛仕齊為司徒記室永明九年魏始通好琛再銜命至桑乾還為通直散騎侍郎時魏遣李道固來使齊帝讌之琛於御筵舉酒勸道固道固不受曰公廷無私禮不容受勸琛徐答曰詩所謂雨我公田遂及我私座者皆服道固乃受琛酒王瑩為尚書令性清慎髙祖深喜之時有猛獸入郭帝意不悅以問羣臣羣臣莫對瑩在御筵乃歛板答曰昔撃石拊石百獸率舞陛下膺籙御圖武象來格帝大悅衆咸服焉謝幾卿為西昌侯藻軍師長史将行與僕射徐勉别勉云淮肥之役前謝已著竒功未知今謝何如幾卿應聲曰已見今徐勝於前徐後謝何必愧於前謝勉黙然李膺為西昌侯藻主簿使至都髙祖悅之謂曰今李膺何如昔李膺對曰今勝昔問何故對曰昔日李膺事桓靈之主今日李膺逢堯舜之君帝嘉其對以如意擊席者久之乃以為益州别駕王份為散騎常侍領步兵校尉髙祖於宴席問羣臣曰朕為有為無份對曰陛下應萬物為有體至理為無髙祖稱善曹景宗為右衛将軍嘗於華光殿侍宴武帝連句令左僕射沈約賦韻景宗不得韻意色不平啟求賦詩帝曰卿技能甚多人才英㧞何必止在一詩景宗已醉求作不已詔令約賦韻時韻已盡唯餘競病二字景宗便操筆而成曰去時兒女悲歸來笳鼓競借問行路人何如霍去病帝嘆不已約等驚嗟竟日何敬容為侍中大同三年正月朱雀門灾髙祖謂羣臣曰此門制卑狹我始欲搆遂遭天灾並相顧未有答敬容獨曰此所謂陛下先天而天弗違時以為名對夏侯亶為人美風儀寛厚有噐量涉獵文史辯給能專對宗人夏侯溢為衡陽内史辭日亶侍御髙祖謂亶曰夏侯溢於卿疏近亶答曰是臣從弟髙祖知溢於亶已疏乃曰卿傖人好不辯族從亶對曰臣聞服屬易疏所以不忍言族時以為能對亶位至平北将軍蕭子顯為侍中髙祖嘗從容謂子顯曰我造通史此書若成衆史何觀子顯對曰仲尼讚易道黜八索述職方除九丘聖製符同復在兹日以為名對陳顔晃字元明為梁邵陵王兼記室參軍時東宮學士庾信嘗使于府中王使晃接對信輕其尚少曰此府兼記室幾人晃答曰猶當少於宮中學士當時以為善對後魏楊昱為散騎侍郎初尚書令王肅除揚州刺史出頓於雒陽東亭朝貴畢集詔令諸王送别昱伯父播同在餞席酒酣之後廣陽王嘉北海王祥等與播論議競理播不為之屈北海顧謂昱曰尊伯性剛不伏理大不如尊使君也昱前對曰昱父道隆則從其隆道洿則從其洿伯父剛則不吐柔亦不茹一坐歎其能言肅曰此非郎何得申二公之美也邢巒為中書侍郎孝文因行樂至司空府南見巒宅遣使謂巒曰朝行樂至此見卿宅乃住東望德館情有依然巒對曰陛下移搆中京方建無窮之業臣意在與魏昇降寧容不務永年之宅帝謂司空穆亮僕射李冲曰巒之此言其意不小爾朱彦伯廢帝時為侍中帝讌彦伯於顯陽殿時侍中源子恭黄門郎竇瑗並侍坐彦伯曰源侍中比為都督與臣相持於河内當爾之時旗鼓相望𣺌如天隔寧期同事陛下今日之歡也子恭曰蒯通有言犬吠非其主昔日之事永安猶今日之事陛下耳帝曰源侍中可謂有射鈎之心也遂令二人極醉而罷北齊盧詢祖初襲爵封大夏男有宿德朝士謂之曰大厦初成應聲答曰且得燕雀相賀又邢邵曽戯詢祖曰卿少年才學富盛戴角者無上齒恐卿不夀對曰詢祖初聞此言實懷恐懼見丈人蒼蒼在鬢差以自安邵甚重其敏贍楊愔為吏部尚書典選令史唱人名誤以盧士深為士琛士深自言愔曰盧郎玉潤所以從玉又魏收昔在雒京輕薄尤甚人號曰魏收驚蛺蝶文襄曽逰東山令給事黄門侍郎元顥等宴文襄曰魏收恃才無宜適須出其短往復數番收忽大唱曰楊遵彦理屈已倒遵彦愔字也愔從容曰我綽有餘暇山立不動若遇當塗恐翩翩遂逝當塗者魏翩翩者蝶也文襄先知之大笑稱善王晞為丞相常山王并州刺史嘗詣晉祠賦詩曰日落應歸去魚鳥見留連忽有相王使至臣欽若等曰相王王為丞相也召晞不時至明日丞相西閣祭酒盧思道謂晞曰昨被召已朱顔得不以魚鳥致恠晞緩笑曰昨晚陶然頗以酒漿被責卿軰亦是留連之一物豈直在魚鳥而已元文遥為侍中子行恭少頗驕恣文遥令與范陽盧思道交逰文遥嘗謂思道云小兒比日微有所知是大弟之力然白擲劇飲甚得師風思道答曰六郎辭情俊邁自是克荷堂構而白擲劇飲亦天性所得崔㥄為侍中其妺為博陵王妃婚夕文宣舉酒祝曰新婦宜令孝順富貴㥄奏曰孝順出自臣門富貴恩由陛下宋遊道為司州中從事時将還鄴㑹霖雨行旅擁於河橋遊道於幕下朝夕宴歌行者聞之曰何時節作此聲固大癡逰道應聲曰何時節不作此聲固大癡孫搴為散騎常侍搴學淺而行薄邢邵嘗謂之曰更須讀書搴曰精騎三千足敵君羸卒數萬後周長孫澄初仕西魏為征東将軍文帝嘗與太祖及羣公宴從容言曰孝經一卷人行之本諸公宜各引要言澄應聲曰夙夜匪懈以事一人座中有人忽云匡救其惡既而出閣太祖深歎澄之合機而譴其次答隋雲定興女為太子勇昭訓生長寧王儼誕乳之初以報髙祖髙祖曰此即皇太孫何乃生不得地定興奏曰天生龍種所以因雲而出時人以為敏對位至屯衛大将軍麥鐡杖為汝南太守因朝集考功郎竇威嘲之曰麥是何姓鐡杖應聲對曰麥豆不殊那忽相恠威赧然無以應之時人以為敏慧唐蘇世長隋大業中王世充署為太子太保與偽将豆盧褒俱鎮襄陽既降京師髙祖誅褒而責世長來晚之故世長頓顙曰自古帝王受命為逐鹿之喻一人得之萬夫歛手豈有獲鹿之後忿同獵之徒問爭肉之罪也陛下應天順人布德施惠又安得忘管仲雍齒之事乎且臣武功之士經涉亂離死亡略盡唯臣殘命得見聖朝陛下若復殺之是絶其類也寔望天恩使有遺種髙祖與之有故笑而釋之尋授玉山屯監後於𤣥武門引見語及平生恩意甚厚髙祖曰卿自謂諂佞耶正直耶對曰臣實愚直髙祖曰卿若直何為背世充而歸我對曰雒陽既平天下為一臣智窮力屈始歸陛下向使世充尚在據漢南天意雖有所歸人事足為勍敵髙祖大笑嘗嘲之曰名長意短口正心邪棄忠貞於鄭國忘信義於吾家世長對曰名長意短寔如聖㫖口正心邪未敢奉詔昔竇融以河西降漢十世封侯臣以山南歸國唯蒙屯監即日擢拜諫議大夫册府元龜卷八百
