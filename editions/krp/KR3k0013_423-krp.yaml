body:
  text: 册府元龜卷四百二十三宋王欽若等撰將帥部討逆夫式遏亂略詰誅暴慢者將帥之任也昔人有言不以賊遺君父盖謂是矣乃有受任閫外典司戎重當專征之寄以經武為職其或凶徳嘯聚姧黨竊發殺掠吏士跨據城堡睢盱倔强滋蔓充斥繇是率勵有衆奮揚威怒罔繇申覆亟徃殄滅允所謂疾雷之作非掩耳所及破竹之勢乃迎刃自解耳夫如是乃可以副推轂之選増守方之氣矣後漢堅鐔為楊化將軍建武二年為右將軍萬修徇南陽而堵鄉人董訢反宛城獲南陽太守劉驎鐔乃引軍赴宛選敢死士夜自鄧城斬闗而入訢遂棄城走還堵鄉劉尚為武威將軍建武十九年西南夷寇益州郡遣尚討之時越嶲太守任貴謀叛尚襲貴誅之魏鍾繇漢建安中以司𨽻校尉持節督闗中諸軍㑹河東衛固作亂與張晟張琰及高幹等並為寇繇率諸將討破之趙儼為闗中䕶軍盡統諸軍屯田客吕並自稱將軍聚黨據陳倉儼率平難將軍殷署等攻之賊即破滅蜀鄧芝為督江州延熙十一年涪陵國人殺都尉反叛芝率軍征討即梟其渠帥百姓安堵吳陸遜為輔國將軍領荆州牧嘉禾五年范陽賊彭旦等為亂六年二月遜討旦等其年皆破之晉呉彦武帝時代陶璜為南中都督領交州刺史初璜之死也九眞戍兵作亂逐其太守九眞賊帥趙祉圍郡城彦悉討平之王浚為驃騎將軍都督東夷河北諸軍事領幽州刺史惠帝光熙元年東萊􅀈令劉相根反自稱􅀈公襲臨淄高密王簡奔聊城浚遣將討相根斬之山簡為征南將軍懐帝永嘉四年雍州人王如舉兵反於宛殺害令長自號大將軍司雍二州牧大掠漢沔新平人龎寔馮翊人嚴嶷京兆人侯脫等各起兵應之簡與荆州刺史王澄南中郎將杜㽔並遣兵援京師及如戰於宛陶侃為廣州刺史平越中郎將侃進至始興先是廣州人背刺史郭訥迎長沙人王機為刺史機復遣使詣王敦乞為交州敦從之而機未發㑹杜𢎞據臨賀因機乞降勸𢎞取廣州𢎞遂與温邵及交州秀才劉沈俱謀反或勸侃且住始興觀察形勢侃不聽直至廣州𢎞遣使偽降侃知其詐先於封口起發石車俄而𢎞率輕兵而至知侃有備乃退侃追撃破之執劉沈於小桂又遣部將許高討機斬之𫝊首京都進號平南將軍轉都督湘州刺史時交州刺史王諒為賊梁碩所䧟侃遣將高寳進撃平之以侃領交州刺史桓豁為右將軍監荆揚雍州軍事南陽督䕶趙億等逐太守桓琰據宛城以叛豁與竟陵太守羅崇討破之劉毅以冠軍將軍督豫州諸軍事梁州刺史劉雅反毅遣將討擒之宋杜慧度晉末為廣州將軍持節督交州諸軍事㑹賊帥盧循襲破合浦徑向交州慧度乃率文武六千人拒循於石碕交戰禽循長史孫建之循雖敗餘黨猶有三千人皆習練兵事李子遜李弈等奔竄石碕盤結俚獠各有部曲循知弈等與杜氏有怨遣使招之弈等引俚率衆五六千人受循節度六月庚子循晨造南津命三軍入城乃食慧度悉出宗族私財以充勸賞弟交趾太守慧期九眞太守章民並督率水歩軍慧度自登高艦合戰放火箭雉尾炬歩軍夾兩岸射之循衆艦俱燃一時散潰循中箭赴水死斬循及父嘏并循二子親屬録事參軍阮静中兵參軍羅農夫李脫等𫝊首京邑沈慶之以太子歩兵校尉為王元謨軍副屯碻磝元嘉二十九年亡命司馬黑石廬江叛吏夏侯方進在西陽五水誑動羣蠻自淮汝至於江沔咸罹其患慶之督諸將討之羊希為寧朔將軍初李萬周劉嗣祖籍畧廣州明帝以萬周為歩兵校尉權行廣州事希既至而萬周等並有異圖希誅之南齊李安民為領軍將軍屯夀春先是宋世亡命王元初聚黨六合山僭號自云垂手過膝州郡討之不獲積十餘年安民遣軍偵候生擒元初斬建康市陳顯逹為鎭西將軍都督益寧二州諸軍事廣漢賊司馬龍駒據郡反顯逹討平之蕭懿為豫州刺史永元二年四月平西將軍崔慧景舉兵襲京師江夏王寳元納之據城拒守懿起義援救慧景棄衆走陳陳景詳為豐州義軍主至徳三年前豐州刺史章文寳舉兵反景詳斬文寳𫝊首京師後魏南安公順道武皇始二年賀蘭部帥附力眷紇突隣部帥匿物尼紇奚部帥叱奴根聚黨反於陰館順率衆討之略陽公元遵為大將軍鎭渤海之合口天興元年博陵渤海章武羣盜並起元遵討平之長孫嵩為安南將軍鎭冀州天興元年道武將北還都右將軍尹國先督租冀州聞帝將還謀反欲襲信都嵩執送斬之元城侯屈率衆鎭并州明元永興五年六月濩澤劉逸自號征東將軍三巴王王紹為都署官屬攻逼建興郡屈討平之奚斤為鄭州將軍循行州郡章武民劉牙聚黨為亂斤討平之明元幸雲中斤留守京師昌黎王慕容伯兒收合輕俠失志之徒李沈等三百餘人謀反斤聞召伯兒入天安殿東廡下窮問欵引悉收其黨誅之公孫軌太武時為平南將軍時宋將到彥之遣其部將姚縱夫濟河攻治坂慮更北入遣軌屯壺闗㑹上黨丁零叛軌討平之陸眞文成時為安西將軍長安鎭將咸陽民趙昌受宋明帝署龍驤將軍扇動鄠盩厔二縣聚黨數百人據赤谷以叛眞與雍州刺史劉邈討平之昌單騎走免後鄠縣民王稚兄弟聚一千餘人招引趙昌始平石安池陽靈武四縣人皆應之衆至五千據治谷堡時詔南郡王李惠等領歩騎六千討昌眞以大軍未至慮昌滋蔓與雍州刺史劉邈討昌昌出營拒戰眞撃破之斬昌及賊首三千餘級𫝊首京師并誅其黨與七百餘人獲男女一千餘口雍州民夷莫不震伏唐元逹獻文時為安西將軍華州刺史時杏城民盖平定聚衆為逆帝遣給事楊鍾葵撃之不剋而還詔元逹討平之杏城民成赤李又聚黨自號為王逼掠郡縣殘害百姓元逹率騎二百邀其狹路撃破之叛民曹平原復聚為亂元逹追撃悉平之尉撥為平南將軍北豫州刺史後雒州民田智度聚黨謀逆詔撥乗𫝊發豫州兵與雒州刺史兵頓撃之獲智度送京師張赦提為虎賁郎京畿盜魁自稱虎子豹子以赦提為逐賊將軍未㡬而獲虎子豹子及其黨與盡送京師斬於闕下自是清静其靈邱羅思祖宗門豪俠家處隘險多止亡命與之為刼獻文怒之拏戮其家而思祖家黨相率寇盜赦提募求捕逐乃以赦提為遊徼將軍前後禽獲殺之畧盡韓務為太子翊軍校尉時孝文南征行梁州刺史楊靈珍謀叛以務為統軍受都督李崇節度以討靈珍有功授後軍長史薛虎子孝文時為平南將軍徐州民桓和等叛逆屯於五固詔虎子為征南都副將與尉元等討平之李煥宣武時為輔國將軍梁州刺史時武興氐楊集起舉兵作逆煥督别將石長樂統軍王祐等與軍司茍金養俱討之大破集起軍㑹秦州民吕茍兒反焕仍令長樂等赴援秦州屬都督元麗遂共平之李韶為將作大匠吕茍兒反於秦州除撫軍西道都督行秦州事與右衛將軍元麗率衆討之元譚孝明時為宗正少卿加冠軍元法僧外叛詔譚為持節假左將軍别將以討之徐州平遷光禄少卿行南兖州事裴衍為北道都督鎭鄴之武城時相州刺史安樂王鑒潛圖叛逆衍覺其有異密表陳之尋而鑒所部别將嵇崇馳驛告變乃詔衍與都督源子邕李神軌等討鑒平之李神軌為征東將軍時相州刺史安樂王鑒據州反詔神軌與都督源子邕等討平之武泰元年正月羣盜燒刼鞏縣自西闗口以東公路澗以南詔神軌為都督討平之鄭先䕶莊帝時為前將軍廣州刺史假平南將軍當州都督時妖賊劉舉於濮陽起逆詔先䕶以本官為東道都督討舉平之還鎭谷楷為奉車都督時沙門法慶反於冀州雖大將討破而妖帥尚未梟除詔楷冀州追捕皆擒獲之北齊王則初仕後魏為東徐州防城都督爾朱榮之死也東徐州刺史斛斯樁是其枝黨内懐憂怖時梁立魏汝南王恱為魏主資其士馬送境上樁遂翻城降恱則與蘭陵太守李義撃其偏師破之魏因以則行北徐州事堯雄為二豫揚郢四州都督時元洪威據潁州叛民趙繼宗殺潁川太守邵招據樂口自稱豫州刺史北應洪威雄率衆討之繼宗敗走民因雄之出遂推城人王長為刺史據州引西魏雄復與行臺侯景討平之宋顯為西兖州刺史時梁州刺史鹿永吉據州外叛西魏遣博陵王約趙郡王景神率衆迎接顯勒當州士馬邀破之斬約等李侃鎭魯山城天保六年四月梁反人李山花自號天子逼魯山城侃撃斬之皮景和為領軍大將軍河南道行臺武平中軍至祖口值土人陳暄等作亂景和平之又有陽平人鄭子饒詐依佛道設齋㑹用米麫不多供贍甚廣密從地藏漸出餅飯愚人以為神力見信於魏衛之間將為逆亂謀泄掩討漏逸乃潛渡河聚衆數千自號長樂王已破乗氏縣又欲襲西兖州城景和自南兖州遣數百騎撃破之斬首千餘級生擒子饒送京師烹之後周泉仚初仕西魏雒州都督上雒人泉岳其弟猛畧與順陽人杜窋等謀翻雒州以應東魏仚知之殺岳及猛畧等傳㫖詣闕而窋没東魏令狐整字廷保西魏末為𤓰州刺史東陽王元榮主簿加盪寇將軍太祖表為都督城人張保殺刺史成慶與凉州刺史宇文仲和搆逆規據河西晉昌人吕興等復害郡守郭肆以郡應保初保等將圖為亂慮整守義不從既殺成慶因欲及整然以整人之望復恐其下叛之遂不敢害雖外加禮敬内甚忌整整亦偽若親附而密欲圖之陰令所親說保曰君與仲和結為唇齒今東軍漸逼凉州彼勢孤危恐不能敵若或摧衂則禍及此土宜分遣銳師聲言救援二州合勢則東軍可圖然後保境息人計之上者保然之而未知所任整又令說保曰厯觀成敗在於任使所擇不善旋致傾危令狐廷保兼資文武才堪統帥若使為將蔑不濟矣保納其計且以整父兄等並在城中弗之疑也遂令整至玉門郡召集豪傑整說保罪逆馳還襲之先定晉昌斬吕興進軍撃保衆人素服整威名並棄保來附保遂奔吐谷渾宇文貴為大將軍代尉遲逈鎭蜀時隆州人開府李光昜反於鹽亭攻圍隆州而隆州人李柘亦聚衆反開府張道應之貴乃命開府叱奴與攻隆州又令開府成亞撃柘及道降之並送京師除益州刺史未就拜小司徒陸騰為隆州總管資州石槃民反殺郡守據險自守州軍不能制騰率軍討撃破斬之鐵山獠抄斷内江路騰撃之應時奔潰一日下其三城斬其魁帥俘獲三千兵招納降附者三萬户隋源雄初仕後周武帝時為檢校徐州總管東潼州刺史曹孝逹據州作亂雄遣兵襲撃斬之進位上大將軍觀徳王雄仕周武帝時為太子司掖下大夫武帝幸雲陽宫衛王眞作亂以其徒襲肅章門雄逆拒破之董純大業中為彭城留守東海賊彭孝才衆數千掠懐仁縣轉入沂水保五不及山純以精兵撃之擒孝才於陣車裂之餘黨各散唐王栖曜為浙西都知兵馬使代宗廣徳中江左兵荒詔内常侍馬日新領汴滑軍五千人鎭之日新貪暴賊蕭庭蘭乗人怨訴逐之而劫其衆時栖曜遊弈近郊遂為賊所脅進圍蘇州栖曜因其懈怠挺身登城率城中兵出擊賊其衆大潰段秀實為涇州兵馬使代宗永泰三年邠寧節度使馬璘移鎭涇州其邠寧𨽻朔方軍邠州將吏以郡𨽻燒馬坊為亂秀實斬其凶首八人乃定李勉為嶺南節度使代宗大厯四年番禺賊帥馬崇道桂州叛將朱濟時等阻洞為亂前後累嵗䧟沒十餘州勉至遣將李觀與容州刺史王翃併力招討悉斬之劉海濱為涇州别將徳宗建中初李懐光為邠寧節度兼領涇原代段秀實懐光新臨濫殺朔方大將數人法令嚴峻别駕劉文喜等懼且因人之怨拒不受命上疏復求段秀實否則朱泚於是以朱泚代懐光又不奉詔有勁兵二萬人閉城拒守使其子入質吐蕃以請救徳宗命朱泚李懐光并巨濟攻之於是泚屯其南懐光屯其東巨濟屯其西周築大城以守之閉壁不與戰時韋倫初復命西戎方守約而賊勢窘廹海濱與其子國光率侯蘭程俊仁等殺文喜𫝊首闕下張延賞為西川節度使建中四年十一月部將西山兵馬使張昢以兵入成都為亂延賞奔漢州鹿頭戍遣將叱千遂等討之其日斬昢及同惡者復歸成都李泌為潼闗防禦使貞元二年陳許戍邊卒三千人自京西逃歸至陜州境泌發防禦兵潛師險隘左右攻之盡誅叛卒楊朝晟為邠寧節度都虞侯貞元四年七月授張獻甫邠寧慶節度使代韓遊瓌癸丑寧州戍卒叛初遊瓌以吐蕃犯塞自將衆戍寧州及遊瓌受代以是月壬子夜輕騎潛遁歸闕其將卒素驕怠畏獻甫之嚴既因遊瓌夜出衙内千餘人遂叛大縱掠且因監軍楊明義邀奏請以出奔之將范希朝為節度朝晟初逃於郊外翌日聞請希朝乃來紿其衆曰所請甚愜我來賀也繇是叛卒稍安朝晟乃與諸營將密謀及乙夘晨率諸軍以告曰前請者不獲張尚書昨日已入邠州汝等皆當死吾不能盡殺誰為戎首各言之以歸罪焉餘無所問於是衆中唱二百餘人立斬之乃定徐誠為山南東道都將貞元八年二月節度使嗣曹王臯卒其判官李實知留後事實深刻軍士素不恱之又取臯之私馬官賣之軍士皆怒時府藏羡溢或稱臯有遺令以官財分賞軍士是夜城中鼔角將楊清潭焚積草刼庫兵軍士皆亂遂縱掠府庫獨不犯臯之家李實縋城夜濟漢北走比明誠繩城而入號令止遏兵士方解甲衆歸罪於楊清潭等六人誠與監軍計議皆斬之乃以公財分賞府帑殆盡鼔角將三百人分徙諸州王䖍休為昭義軍節度留後貞元十年七月昭義行軍司馬元誼據洺州以謀亂八月䖍休統兵赴臨洺以攻元誼是月誼除饒州刺史不行故䖍休率兵攻之誼又上疏請率洺州軍士防秋於京西徳宗許之而未敢出䖍休以大兵臨城城中出師禦之頗相殺傷䖍休又引洺水以灌城分兵收雞澤九月䖍休遣將李庭芝破元誼兵將李同恱於長橋殘殺居人男女數百口同恱走魏州庭芝進收雞澤又殺居人男女數百口雞澤守將官吏悉走魏州自是平息洺水等數縣將吏居人聞䖍休兵至悉走魏州十二月䖍休以洺州漳濠氷合發卒數千人踰濠搏城急攻之元誼自城上督戰矢石亂下又出兵拒鬭䖍休軍稍却㑹日暮氷解渉濠者多沉溺大將張沛來浩皆中流矢士卒死傷大半自是䖍休引漳洺二水以灌之李復貞元中為嶺南節度使㑹安南經畧使高正平張應相次卒官其下參佐偏裨李元度胡懐義等阻兵黷亂州縣姦贓狼藉復誘懐義杖殺之奏元度流於荒裔薛平為平盧軍節度使穆宗長慶元年幽鎭叛棣州為賊所窘平即遣將李叔佐以兵五百救之居數月刺史王稷餽給稍薄兵士怨怒叔佐不能戢宵潰而歸仍推突將馬狼兒為帥行及青城鎮刼鎮將李自勸并其衆次至博昌鎭刼其鎭兵復共得七千餘人徑至青州城城中兵士少力不敵平悉府庫并家財厚賞二千精卒逆撃之仍先以騎兵掩其家屬輜重賊衆惶惑反顧因大敗狼兒與其同惡十數軰脫身竄匿餘黨降稍後者猶斬於鞠場其明日狼兒亦就擒戮繇是逺近畏服平之威畧又牙將馬廷崟謀逆平覺其謀而誅之李質為汴州都知兵馬使長慶二年七月節度使李愿為亂軍逐出都將李㝏為三軍所推權知留後㝏遣兵收宋州朝廷除鄭滑節度韓充兼宣武節度陳許節度李光顔自領全軍赴汴州屯於尉氏縣八月質與監軍使姚文夀計㑹擒斬李㝏及其黨薛志忠秦鄰李臣則等曹華為武寧軍節度使李㝏叛於大梁華不俟命赴討之㝏方遣兵三千人取宋州華逆撃敗之繇是宋亳不從㝏亂韓約為安南都䕶文宗太和二年峯州刺史王升朝背叛約發兵二千人討逐收峯州升朝及所結聚黨並各處置陳君賞為易定節度使開成五年易定軍亂逐君賞君賞鳩合豪傑數百人復入城盡誅謀亂兵士軍民復安張仲武為幽州雄武軍使武宗㑹昌元年幽州偏將陳行泰權主留後三軍表請符節朝廷未允至是次將張絳殺行泰三軍復上表請絳符節仲武遣軍吏吳仲舒上表從雄武領兵請伐叛黨帝允之鄭畋為鳯翔府節度使僖宗中和元年黄巢入京城車駕在興元以畋充京西諸道行營都統與涇原節度使程宗楚秦州經略使仇公遇鄜延節度使李孝恭夏州節度使拓拔思恭等同盟起兵傳檄天下黄巢遣上將林言尚讓率衆數萬寇鳯翔畋率師逆撃大破賊衆於龍尾陂王景崇為成徳軍節度使中和二年四月景崇奏當道慈谷靈夀兩鎭報尉州刺史蘇祐擅驅兵騎侵突臣管界及謀逆亂事尋已處置訖者蘇祐本自㣲人謬承聖奬自抛離郡邑竄保山巖臣亦愍以困窮累曽救䘏慮其猖獗每使慰安豈期無惡不為有兇皆納狐鳴鼠伏曽不悛心擐甲弄兵嘗思怒目況朝廷道全姑息思務含𢎞加騎省之榮資除濮陽之望郡而又拒違明勅侮易天朝擅割屬城背雲中而納欵潛將逆黨附并部以揚威昨者初犯中山尚深疑貳謂其舉衆將議朝天或捨逆以自新或樹功而遷善殊不知終懐鴆毒竟務鴟張刼石臼之倉儲逼昌零之鎭戍旋則亂驅虵豕入臣封疆陰蓄姦欺伺臣勇怯臣此時未窮來意詎忍加兵尋令問以行藏兼遣倒其戈甲然終無一字以述端倪累有元隨自陳狀跡云本擬脅臣優給刼臣村廬奪戰馬而以利犬羊招亡命而别謀吞併臣尚觀釁待變以膳羞茍尚可以恩懐且欲候其勅命緣賊已擬發露自致蒼黄乃與後來敗卒合謀便擬據城作梗臣既優饒稍過傾覆是虞固難使四郡軍民噬臍貽悔一城生靈束手受誅其蘇祐一行徒黨除歿告軍將人數外今月七日並已分兵誅戮訖此皆皇帝陛下雷霆振響宗社垂靈將復致於中興故先除其小醜況此賊逋藏藪澤招聚兇豪締結厲階爰經數度包含怨府不啻十年其寨即在中山一隅去大同咫尺彼兩鎭不能覆巢破卵蕩葉夷根盖以其兎狡難蹄獸窮則搏顧兹疾疚實謂腹心茍非天静寰中曷使魚遊釡内今則攙搶一掃噍類無遺凡在邊藩孰不鼔躍梁楊師厚為滑州節度使屯魏州魏州衙内都指揮使潘晏與大將臧延範趙訓謀變有密告者師厚布兵擒捕斬之越二日又有指揮使趙賓夜率部軍擐甲俟旦為亂師厚以衙兵圍捕賓不能起乃越城而遁師厚遣騎追至肥鄉擒其黨百餘人歸斬於府門即以師厚為魏博節度使後唐劉玘初事梁為襄州都指揮使開平初襄帥王班為帳下所害亂軍聚譟推玘為留後玘不能遏詭從之翌日受賀衙庭享士伏兵幕下中筵盡斬其亂將以聞孔勍為昭義節度使莊宗同光中監軍楊繼源與都將謀據潞州事泄勍誅之任圜為工部尚書同光末從魏王繼岌伐蜀蜀平魏王班師及利州先鋒使康延孝叛以勁兵欲囘刼西川繼岌遣人馳書諭之夜半令中使李延安召圜因署為副招討使令圜率兵七千餘騎與都指揮使梁漢顒監軍李延安討之圜先令都將何建宗撃劒門下之圜以大軍至漢州延孝來逆戰圜命董璋以東川懦卒當其鋒伏精兵於其後延孝撃退東川之軍急追之遇伏兵起延孝敗馳入漢州閉壁不出西川孟知祥以兵二萬與圜令合勢攻之漢州四面樹竹木為栅圜陣於金雁橋即率諸軍鼔譟而進四面縱火風熖亘空延孝危急引騎出戰遇陣於金鴈橋又敗之延孝以十數騎奔綿州何建崇追及擒之圜命載以檻車至鳯翔詔誅之符彦超為汾州刺史同光末魏州軍亂天下騷動詔彦超北京廵檢朝廷先令内養吕鄭二人一監兵一監倉庫留守張憲與彦超承應不暇及蕭墻變起明宗入雒皇弟存霸單騎入河東與二寺人謀殺彦超張憲據城自衛彦超預知其謀夜密謁憲曰摠管入雒存詔此來無善意濟之以吕鄭吾徒禍不旋踵矣宜出機先無落腐人之手憲儒者又以莊宗故吏不忍背之猶豫未決是日彦超部下大譟趨紙橋至暝牢城兵軍集憲出奔殺吕鄭存霸於衙城詰旦號令諸軍三城晏然符彦饒為汴州馬歩軍都指揮使明宗天成元年詔發汴軍三千人戍瓦橋關控鶴指揮使張諫部率既出城軍衆大譟囘戈攻門剽刼坊市殺權州知州推官高逖仍刼彦饒為節度使彦饒喻之曰公等以離家逺戍不願進程吾可為爾奏聞明天子在上安得自擇主帥行如此事未見其福亂兵不遜彦饒懼及禍曰爾軰欲吾為帥當宜便止焚刼一從吾命軍衆曰然即分命撫遏斬其暴者是日安静彦饒曰翌日吾於南衙領事當以軍禮見彦饒密與拱衛指揮使龎起謀伏甲於室詰朝諸將入賀陳列彦饒曰昨日暴亂者數人而已將立法令無宜長惡即命斬張諫及同惡三人諫黨張審瓊召其衆大譟於建國門彦饒乃率軍攻撃遂入張諫營殺其謀亂者四百人霍彦威明宗天成初為鄆州節度使值青州王公儼拒命改平盧軍節度至鎭擒公儼斬之沙彦珣為雲州節度使末帝清泰三年七月歩軍指揮使桑遷謀應太原引戍兵圍子城時無兵甲彦珣突圍出城就西山據雷公口二日招集兵士入城剪伐亂軍桑遷戰敗不知存亡是日應州尹暉復部送桑遷與同謀叛太原人李元信至鞫訊伏罪並尸於市晉盧順密為右廂都指揮使天福初高祖幸夷門范延光據鄴城叛高祖命諸將相次領軍討之順密亦預其行㑹騎將奉進屯於滑州尋為滑率符彦饒所殺軍衆大亂争荷戈拔劒噉呼於外時馬萬為歩軍都校不為遏之順密未明其心乃率部曲數百趨謂諸將及萬曰滑臺去行闕二百里我等家屬悉在闕下爾軰如此不思血屬乎奉進見殺過在彦饒擒送天子必立大功順我者賞之不順我者殺之萬曰善諸軍遂不敢動乃引軍北攻牙城執彦饒於樓上使禆將方太押送赴闕滑城遂定朝廷即以馬萬為滑州節度使時飛奏皆以萬為首故也後數日高祖知功繇順密尋以順密為涇州留後册府元龜卷四百二十三
