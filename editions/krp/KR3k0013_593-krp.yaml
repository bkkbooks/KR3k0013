body:
  text: 册府元龜卷五百九十三宋王欽若等撰掌禮部奏議第二十一唐楊發為左司郎中大中三年十二月宣宗追尊順宗憲宗諡號禮院奏廟中神主已題舊號請改造及重題詔禮官議發與都官郎中盧摶獻議曰臣等伏尋舊典栗主升祔之後在禮無改造之文亦無重加尊諡改題神主之例求之曠古夐無其文周加太王王季文王之諡但以德合王周遂加王號未聞改諡易主且文物大備禮法可稱最在兩漢並無其事光武中興都雒陽遣大司馬臣鄧禹入闗奉髙祖已下十一帝后神主祔雒陽宗廟葢神主不合新造故也自魏晉迄於周隋雖代有放恣之君亦有知禮講學之士不聞加諡追尊改主重題書之史䇿可以覆視今議者唯引東晉重造鄭太后神主事為證伏以鄭太后本琅邪王妃薨後己祔琅邪邸廟其後母以子貴將升祔太廟賀循請重造新主改題皇后之號備禮告祔當時用之伏以諸侯廟主與天子廟主長短不同若以王妃八寸之主上配至極禮似不同時謟臣貪君之私用此謬禮改造神主比量晋事義絶非宜且宣懿非穆宗之后實武宗之母以子之貴已祔别廟正為得禮饗薦無虧今若從祀至尊題主稱為太后因子正得其宜今若改造新主題去太字即穆宗上僊之後臣下追致作嬪之禮瀆亂正經實驚有識臣當時並列朝行知其謬戾以漢律擅論宗廟者以大不敬論又其時無詔下議遂黙塞不敢出言今又欲重用東晋謬禮穢媟聖朝大典猥䝉下問敢不盡言臣謹按國朝前例甚有明文武德元年五月備法駕於長安通義里舊廟奉迎宣簡公懿王景皇帝神主升祔太廟既言於舊廟奉迎足明必奉舊主其加諡追尊之禮自古本無其事自則天太后攝政之後累累有之自此之後數用其禮歴簡國史並無改造重題之文若故事有之無不書於簡册臣等愚見宜但告新諡於廟止其改造重題之文開元初太常卿韋縚以髙宗廟題武后神主云天后聖帝武氏縚奏請削去天后聖帝之號别題云則天順聖皇帝后武氏詔從之即不知其時削舊題耶重造主耶亦不知用何代典禮禮之疑者决在宸衷以臣所見但以新諡寶冊告陵廟正得其宜改造重題恐乖禮意時宰臣覆奏就神主改題而知禮者非之以發議為是令狐綯為相大中五年十一月奏准太常禮院奏中書侍郎兼吏部尚書平章事崔龜從奏准令式合立私廟祔准㑹昌五年二月一日勅百官並不得京城内置廟如欲於京城内置者但准舊於所居處置廟即不失敬親之禮伏以武宗時縁南郊行事見天門街左右有廟宇許令私第内置若令依舊㑹昌五年勅文盡勒於所居處置廟兼恐十年間私廟漸逼於宮墻齊人必苦於吞併臣具詳本末兾便公私今請夾天門街左右諸坊不得立私廟其餘圍外逺坊任取舊廟及擇空閑地建立廟宇應立廟之初先取禮司詳定兼請准開元禮二品已上祠四廟三品祠三廟三品已上不須兼爵者四廟外有始封祖通祠五廟三品已上不得過九架並厦兩頭其三室廟制合造五間其中三間隔為三室兩頭各厦一間虛之前後亦虚之每室中西壁三分之一近南去地四尺開一塪室以石為之可容兩神主廟垣合開南門東門并有門屋餘並准開元禮及元和曲臺禮為定制其享獻之禮除依舊禮使少牢特牲饋食外有設時新及今時熟饌者並聼仍請永為定式從之李景儉為御史大夫大中十一年右羽林統軍鄭光卒輟朝三日景儉上疏曰鄭光是陛下親舅外族之愛誠軫聖心今以輟朝之數比於親王公主即前例所無縱有亦不可純用何者先王制禮所貴防㣲大凡人情於外族則深於宗屬則薄於先王制禮割愛厚親據開元禮外祖父母親舅䘮止服小功五月若親伯叔弟兄即服齊縗周年所以踈於外而宻於内也有天下者尤不可使外戚强盛今鄭光輟朝日數望速改詔命輟朝一日或兩日示其升降有差恩禮無僭垂之百王永播芳烈䟽奏乃詔罷兩日牛叢為太常卿中和元年四月僖宗在成都府有司請享太祖已下十一室詔公卿議其儀叢與儒者同議其事或曰王者廵狩以遷廟主行如無遷廟之主則祝奉幣帛皮珪告於祖禰遂奉以出奉幣帛皮珪以出載于齋車每舍奠焉今非廵狩是失守宗廟夫失守宗廟則當罷宗廟之事叢疑之將作監王儉太子賓客李匡乂虞部員外郎袁皓建議同異及左丞崔厚為太常卿遂議立行廟以𤣥宗幸蜀時道宮𤣥元殿之前架幄幕為十一室義無神主題神版位而行事逹禮者非之以為止之可也殷盈孫為太常博士光啟三年二月僖宗自興元還京以宮室未備權駐鳯翔禮院奏皇帝還宫先謁太廟今宗廟焚毁神主失墜請准禮例修奉者禮院獻議曰案春秋新宫災三日哭傳曰新宫宣公廟也三日哭禮也案國史開元五年正月二日太廟四室摧毁時神主皆存迎奉於太極殿安置𤣥宗素服避正殿寶應元年肅宗還京師以宗廟為賊所焚於光順門外設次向廟哭歴檢故事不見百官奉慰之儀然帝既素服避殿百官奉慰亦合情禮切循故事比附參詳恐須宗正寺具宗廟焚毁及神主失墜事由申奏皇帝素服避殿受慰訖輟朝三日下詔委少府監擇日依禮新造列聖神主如此方似合宜伏縁採栗須十一月漸恐遲晩修奉使宰相鄭延昌具議申中書門下奏曰伏以前年冬再有震驚俄然廵幸主司宗祏廹以蒼黃伏縁移蹕鳯翔未敢陳奏今將廻鑾輅皆舉典章清廟再營孝思咸備伏請降敕命所司參詳典禮修奉勅曰朕以凉徳祗嗣寶圖不能上承天休下正人紀兵革競興於㝢縣車輿再越於藩垣宗廟震驚蒸嘗廢闕敬修典禮倍切哀摧宜付所司又修太廟使宰相鄭延昌奏太廟大殿十一室二十三間十一架功績至大計料支費不少兼宗廟制度有素難為損益今不審依元料修奉為復更有商量請下禮官詳議盈孫奏議言如依元料難以速成况帑藏方虚須資變禮切以至德二年以新修太廟未成其新造神主權於長慶殿安置便行饗告之禮如同宗廟之儀以候廟成方為遷祔今京城除充大内及正衙外别無殿宇伏聞先有詔㫖欲以少府監大㕔權充太廟其㕔五間伏縁十一室於五間之中陳設隘狹請更接續修建成十一間以備十一室薦饗之所其三太后廟即於少府監内取西南屋三間以備三室告饗之所勅㫖從之大順元年將行禘祭有司請以三太后神主祔饗於太廟王后者孝明太皇太后鄭氏宣宗之母恭僖皇太后王氏敬宗之母貞獻皇太后韋氏文宗之母三后皆作神主有故不當入太廟當時禮官建議並置别廟一年五饗及三年一祫五年一禘皆於本廟行事無奉神主入太廟之文至是亂離之後舊章散失禮院凴曲臺禮欲以三太后祔饗盈孫獻議非之曰臣謹按三太后憲宗穆宗之后也二帝已祔太廟三后所以立别廟者不可入廟故也與帝在位皇后别廟不同今有司誤用王彦威曲臺禮禘别廟太后於太廟乖戾之甚臣切究事體有五不可曲臺禮云别廟皇后禘祫於太廟祔於祖姑之下乃皇后先崩已造神主夫在帝位如昭成肅明元獻昭徳之比昭成肅明棄世睿宗在位元獻棄世𤣥宗在位昭徳棄世肅宗在位四后於太廟未有本室故創立别廟當為太廟合食之主故禘祫乃奉以饗其神主但題云某諡皇后明其後太廟有本室即當遷祔帝方在位故皇后暫立别廟耳本是太廟合食之主故禘祫乃升太廟未有位故祔祖姑之下今恭僖貞獻二太后皆穆宗之后恭僖㑹昌四年造神主合祔穆宗廟室時穆宗廟已祔武宗母宣懿皇后神主故為恭僖别立廟其神主直題云皇太后明其終安别廟不入太廟故也貞獻太后大中元年作神主别立廟其神主亦題為太后並與恭僖義同孝明咸通五年作神主合祔憲宗廟室憲宗廟已祔穆宗之母懿安皇后故孝明亦别立廟是懿宗祖母故題為太皇太后與恭僖貞獻亦同帝在位后先作神主之例今以别廟太后神主禘祭升享太廟一不可也曲臺禮别廟皇后禘祫於太廟儀注云内常侍奉别廟皇后神主入置於廟庭赤黃褥位奏云某諡皇后禘祫祔享太廟然後以神主升今即須奏云某諡太皇太后且太廟中皇后神主二十一室今忽以太皇太后入列於昭穆二不可也若但云某諡皇后即與所題都異神何憑依此三不可也古今禮要云舊典周立姜嫄别廟四時祭薦及禘祫與七廟皆祭唯不入太祖廟為别配文思甄后明帝母廟及寢依姜嫄之廟四時及禘皆與諸廟同此舊禮明文得以為證今以别廟太后禘祫於太廟四不可也所以置别廟太后以孝明不可與懿安並祔憲宗之室今禘享乃處懿安於舅姑之上此五不可也且祫合祭也合猶不入太祖之廟而况於禘乎竊以為並皆置於别廟為宜且㳟僖貞獻二廟以在朱陽坊禘祫赴太廟皆須備法駕典禮甚重儀衛至多咸通之時累遇大饗耳目相接歳代未遥人皆見聞事可詢訪非敢以臆斷也或曰三廟故禘祫于别廟或可矣而將來有可疑焉謹按睿宗親盡已祧今昭成肅明二后同在夾室如後代憲宗穆宗親盡而祧三太后神主其得不入夾室乎若遇禘祫則如之何對曰此又誤也三太廟若親盡合祧但當閟而不享安得處于夾室禘祫則就别廟行之歴代已來何嘗有别廟神主復入太廟夾室乎禘祫禮之大者無宜錯失宰相孔緯曰博士之言是也昨禮院所奏儀注今已勑下大祭日近不可遽改且依行之于是遂以三太后祔祫太廟逹禮者譏其大謬薛昭緯為禮部員外郎光啟三年四月將行禘祭有司引舊儀禘徳明興聖二廟及懿祖獻祖神主先祔興聖徳明廟通為四室黃巢之亂廟已焚毁及是將禘俾議其儀博士殷盈孫議曰臣以徳明等四廟功非創業義止追封具於今皇帝年代極遥昭穆甚逺可依晋韋𢎞屋朽乃已之例因而廢之勅下百僚都省㑹議昭緯奏議曰伏以禮貴從宜過猶不及祀有常典理當據經謹按徳明追尊實為遐逺推諸歴代莫有其倫自古典禮該詳無踰周室后稷實始封之祖文王乃建極之君且不聞后稷之前别議立廟以至二漢則可明徵稽彼簡書並無追號迨於興聖本非經據葢以始王於凉遂列為祖類長沙於後漢之代等楚元於宋髙之朝悉無尊祀之名足為憲章之驗重以獻祖懿祖皆非宗有徳而祖有功親盡宜祧理當毁廢遷於二廟亦出一時且武徳之初議宗廟之事神堯聼之太宗参之碩學通儒森然在列而不議立臯陶凉武昭之廟蓋知其非所宜立也尊太祖代祖為帝而以獻祖為宣簡公懿祖為懿王卒不加帝號者謂其親盡則毁明矣春秋左氏傳孔子在陳魯廟災曰其桓僖乎已而果然蓋以親盡不毁宜致天災炳然之徵不可忽也據太常禮院狀所引至徳二年克復後不治𢎞農府君廟神主及晋韋𢎞屋朽乃已之議頗為明據深叶禮經其興聖等四室請依禮院之議奉勑依典禮付所司梁末帝貞明中諸王納妃公主下降皆宫殿門廷行揖讓之禮物議非之太常少卿馬縞上䟽曰臣聞詩羙何穠傳稱築舘將就肅雍之徳必分内外之規故曰主王姬者自公門出舊禮以几筵告於宗廟以候迎者故於廟之外朝門築舘得禮之正也昔漢賈誼上書云古者見君之乘車必下見君之几杖必起入正門必趨又孟子云朝廷不越位而與人言不踰階而相揖孔丘過位色勃蘧瑗望闕趨風近亦有僕射與員外郎共列謝官班次蓋以公器不私尊無二上亦得禮之正也臣竊以入正門必趨不踰階相揖著於前史實有舊文則豈可臣下而於宫殿門庭行賔主揖讓之儀使華夏觀禮之人惑於非據言動必書之史疑爽彛倫臣雖處典司寧分禮道以其所見恐未合宜伏乞宣付中書門下參酌可否施行後唐莊宗同光二年三月太常禮院奏准制尚書令秦王李茂貞備禮册命檢詳舊儀無不帶節度使判册之命宜准故襄州節度使趙凝封楚王例施行秦王受册自備革輅一乘載册特車一乘并本品鹵簿鼓吹如儀從之是月祠部奏本朝舊儀太㣲宫每年五薦獻其南郊壇每年四祠祭吏部申奏請差中書門下攝太尉行事其太廟及諸郊壇並吏部差三品已上攝太尉行事從之四月太常禮院奏准制以次月十三日行皇后册命令撿詳臨軒命使册皇后舊儀皇后廟見如納后之儀受册後合别定廟見日其日皇后乘重翟車鹵簿鼓吹儀仗導從從之又奏議按開元禮臨軒册皇后表謝朝皇太后並如納后之儀不載朝謝皇帝之禮准納后儀則皇帝服衮冕降迎於門恐禮太重今詳酌請其日常服御内殿皇后首餙禕衣尚儀引入至殿廷階間再拜又再拜訖退如常儀從之六月太常禮院奏國家在鄴都興建之時於北京已置宗廟自六龍都雒却復本朝宗祧詳求典禮無二廟之文其北京廟據禮徹去遂下尚書省議其可否禮部尚書王正言等奏議曰伏以宫室之制宗廟為先陛下卜雒居尊開基御宇龍樓鳯輦式當表正之初玉葉金枝悉在股肱之列事當師古神必依人北京先制之宗廟不宜並設竊以每年朝享固有常儀時日既同神何所據嘗聞近例禮有從權如神主已修迎之藏于夾室若廟宇已崇虗之乃為常制昔桓公之廟二主靡有所從由是古者師行亦從遷于廟主昔天后之崇鞏雒悉謂非宜漢皇之變豐滕終無所設而况本廟故事禮院具明且雒邑舊都嵩丘正位當定鼎測圭之地乃居衝處要之方今則皇命承天握圖纂祀九州是務四海為家豈宜逺宮闕之居建祖宗之廟事圖可久理屈從長北京宗廟請停從之七月中書門下奏據太常禮院人每年太㣲宫五薦獻南郊壇四祠祭並宰臣攝太尉行事唯太廟時祭獨遣寮庶雖為舊規慮成闕禮臣等商量自此後太廟祀祭亦望迭差宰臣行事從之是月太常禮院奏按本朝舊儀自一品至三品婚禮得服衮冕劒珮衣九章今皇太子興聖官使繼岌雖未封建官是檢校太尉合准一品婚禮施行其妃准禮婦人從夫之爵亦准一品命婦至行親迎之日太常鹵簿鼓吹前導乘輅車其妃花釵九枝博鬢䄖翟衣九等其日平明皇帝差官告親廟一室宗正卿攝婚主行禮其夕親迎興聖宫使乘輅車鹵簿鼓吹前導至女氏之門以結綵車御輪交車從之十一月禮儀使奏伏准禮䘮三年不祭惟祭天地社稷為越紼行事此古制也爰自漢文益尊神器狥至公絶私之義行以日易月之制事久相㳂禮從順變今園陵已畢祥練既除宗廟不可以乏饗神祗不可以廢祀宜遵禮意式展孝思伏請自貞簡太后升祔禮畢應宗廟使樂及羣祀並准舊施行從之明宗天成元年八月莊宗皇帝神主以此月十日祔太廟七室之内合有祧遷中書門下奏議請祧懿祖皇帝室復下百寮集議於尚書省禮部尚書蕭頃等奏議曰歴代故事㳂革不同蓋就所宜期於合禮事雖稽古理亦從長七廟之致享斯存萬世之承基靡絶禮分逺近事究否臧懿祖既逺於昭宗創業又非於己力儔諸列聖可議祧遷皇帝陛下道繼百王德符三代撥禍亂於艱難之際救蒼生於交䘮之秋方啟洪圖是崇宗祏為四方之准的稱萬國之炤臨中書所定祧遷於議為允請下所司施行從之十月左散騎常侍姚顗奏曰明王御宇哲后垂衣必崇郊薦之儀以表君臨之道伏自陛下興隆寶祚展禮群神每祈福以為人必差官而行事先七日受誓戒於南省后三日各致齋於本司必在精誠以感靈貺臣伏見南郊壝壇之側及諸祠壇並無宿齋之所請下所司量事修建屋宇俾嚴祗事允屬聖朝是年中書舍人馬縞上言曰伏以宗廟立制今古通規損益所宜徵求可見伏惟陛下俯狥羣願入纘丕基率土推誠遐方向化臣是以竊規舊典敢有上聞伏見漢晋以來以諸侯王宗室承襲帝統除七廟之外皆别追尊親廟漢光武皇帝立先四代於南陽其後自安帝已下亦皆遐考前修追崇先代四時禋祀陳豐潔於豆豋多士駿奔認等差於藻梲伏以陛下奄有四海為天下君雖繼統承祧無忘日慎而敦本崇徃尚鬰時思伏乞以兩漢舊事别立宗廟於便路履霜露以陳誠薦馨香而盡敬禮於是在誰曰不然詔下南宫集百寮定議禮部尚書蕭頃等議曰伏見方册所載聖槩斯存將逹蘋藻之誠宜新楶棁之制伏惟陛下以孝敬日躋之徳上合穹旻秉恭儉罔怠之規再康寰宇爰臻至化難抑時思馬縞儒學優深禮法明練所奏果符於睿㫖載詳固叶於典經臣等集議其追尊位號及建廟都邑則乞發自宸𠂻特降制命二年春宰臣鄭珏等上言曰㳟以皇帝陛下特降睿慈俯詢輿議尊歴朝之正典允多士之䖍祈廣溥天孝治之風慰萬國仁親之道臣聞自古英主入紹洪基莫不慎固逺圖凝思徃事敬宗尊祖追養存誠廣殊號於園陵展異儀於璽紱春秋殷薦霜露永懐又聞兩漢以諸侯王入繼帝統則必易名上諡廣孝稱皇載於諸王故事孝徳皇孝仁皇孝元皇是也伏兾聖慈猥從人願許取皇而薦號兼上諡以尊名改置園陵仍増兵衛御札報曰朕猥承基搆實頼祖宗將申報本之義常切奉先之志爰崇祀典思固逺圖兾上答於劬勞度永資于孝理卿等咸堅輔弼共副咨詢徴兩漢之舊規宏三皇之故事乃飛章而定議請薦號以尊名兼廣園陵仍増兵衞載覧矢謨之意備觀順羙之誠感歎良深嘉愧無已宜依上表施行詔禮院定其儀制太常博士王丕等引漢桓帝入嗣尊其祖河間孝王曰孝穆皇帝蠡吾侯曰孝崇皇帝為例請付太常定諡議刑部侍郎權判太常卿馬縞復議曰伏准兩漢舊事以諸侯王宗室入承帝統亦必追尊父祖修樹園陵西漢宣帝東漢光武孝享之徳故事具存自安帝入嗣遂有皇太后令别崇諡法追曰某皇所謂孝徳孝穆之類是也前代惟孫皓自烏程侯繼嗣追父和為文皇帝事出非常不堪垂訓據禮院狀漢安帝已下若據本紀又不見有帝字伏以諡法徳象天地曰帝伏縁禮院已曽奏聞難將兩漢故事便述尊名詔右僕射李琪集百寮議曰伏以别制四廟徴漢室以定儀崇上尊名詳諡法以取證伏覩歴代以來宗廟成制繼襲無異㳂革或殊伏惟陛下應運開祥體乾覆物纘紹之徳咸頌聖於鴻圖孝思之心乃垂光於帝範馬縞所奏禮有按㩀乞下制令馬縞䖍依典册以述尊名帝手詔報曰朕聞開國承家得以制禮作樂故三皇不相襲五帝不相㳂隨代創規於理無爽矧或情闗祖禰事繫蒸嘗將崇追逺之文以示化民之道馬縞秉持古學歴覧羣書援兩漢之舊儀雖明按據考百王之立制未盡變通且議諡追尊稱皇與帝既有増减之字合陳褒貶之辭大約二名俱為尊稱若三皇之代則不可加帝五帝之代亦不可言皇爰自秦朝便兼其號爾後纂業承基之主握乾應用之君洎至我唐不易斯議至若元元皇帝事隔千祀宗追一源猶顯册于鴻名豈須遵于漢典况朕居九五之位為億兆之尊不可總二名于渺躬惜一字于先代茍隨執議何表孝誠又如堯咸舜韶夏松殷柏隨時變禮厥理斯存縞則以徴事上言深觀動静朕則以奉先為切慮致因循須定一塗以安四廟可特委宰臣與百官詳定集兩班于中書逐班各陳所見唯李琪等請于祖禰二室先加帝字宰臣合衆議而奏曰臣聞徳教重于日新禮經不自天降故歴代之有損有益隨時之可止可行且華蟲象衮之規三皇未備雲鳥紀官之制五帝皆殊考其言而既出舊章窮其理而便為故實恭惟朝廷之重宗廟為先事繫承祧義符致羙將以觀盛徳于七代展明祀於十倫一時而儻墜斯文千載而永為闕典且聖朝追尊之日即引漢氏舊儀在漢氏封崇之時復依何代故事是以理関凝滯未曰聖謨道合變通方為民則且王者功成治定制禮作樂正朔服色尚有改更尊祖奉先何妨㳂革若應州必立别廟即地逺上都定虧孝享之儀徒有尊崇之稱伏據開元中追尊臯陶為徳明皇帝凉武昭王為興聖皇帝皆立廟於京都制度斯在况陛下入清内難光闡帝圗徳澤廣浹於華夷廟享猶虧於祖禰若宫廟須成於逺塞則蒸嘗慮闕于孝思今臣等商量所議追尊四廟望依御札並加帝號兼請于雒京選地立廟中㫖令就應州舊宅立廟餘依四月左散騎常侍李光憲上言曰臣聞國之重事惟祀與戎四時薦享之儀合以敬恭備禮每祭三公具列御史監臨行事羣官皆宿壇廟或屋宇不庇風雨或止泊投寄村園無戸牖以防虞無薦席以藉地茍傷棲旅難責精䖍禮或不周福將安望乞令量事添置庶保肅恭䟽下所司竟不行三年十一月中書奏舊制凡降册命至尊臨軒伏自陛下纂襲繼有封崇但申持節之儀尚闕臨軒之禮今後有封册請御正衙雖勞萬乘之尊兾重九天之命如此則行之者禮備受之者感深寧惟轉耀于皇猷實亦永標于青史從之是月太常定唐少帝為昭宣光烈孝皇帝廟號景宗博士吕朋龜奏曰謹按禮臣不誄君稱天以諡之是以本朝故事太尉率百寮奉諡册告天於圓丘廻讀于靈座前並在七月之内諡册入陵若追尊定諡册於太廟藏册於本廟伏以景宗皇帝頃負沉寃歳月深逺園陵已修不祔于廟則景宗皇帝親在七廟之外今聖朝申究追尊定諡重新帝號須撰禮儀又禮云君不逾年不入宗廟且漢之殤冲質君臣已成晋之惠懐愍俱負艱難皆不列廟食止祀于園寢臣等切詳故實欲請立景宗皇帝廟于園所命使奉册書寶綬上諡于廟便奉太牢祀之其四時委守令奉薦請下尚書省集三省官詳議施行右散騎常侍蕭用等議請依禮院所奏奉勅宜令曹州城内選地起廟四年五月中書門下奏先據太常寺定少帝諡昭光烈孝皇帝廟號景宗伏以本朝基搆垂三百年昭宣以中否東遷少帝以沉冤晏駕始封侯於偽室立新廟于聖朝追奕世之尊雪當年之恥先皇帝初定中原之後昭宗少帝尋合一時入廟所司不舉遂成闕禮既暌昭穆難㑹蒸嘗太廟有合食之儀外邑無登歌之奏生曾為帝享乃承祧既號景宗合入太廟如不入廟難以言宗須叶徽章免貽羣議于理而論祧一逺廟安少帝神主于太廟即昭穆序而宗祀正今或且居别廟即欲不言景宗祗云昭宣光烈孝皇帝兼册文内有基字是元宗廟諱尋常從行詔勅皆不廽避少帝是繼世之孫册文内不欲斥列聖之諱今改為宗字勅皆可之議者以毁廟之主恩逺屬絶名不可諱且昭宣上去元宗十四世奏改冊文非典故也六月國子博士田敏上言曰禮有五經祭在其首國之大事祀亦居先則知祭祀者有國是遵百王所重是以肅雍清廟禋祀𤣥天立四時則大駕親臨将置齋則仲尼所慎莫不嚴崇宫室潔滌樽罍陳其肅肅之儀報以穰穰之福臣竊見四郊祠祭並無齋室行事官吏旅寓鄉村有凟至誠恐非清潔伏乞特下有司俾於四郊量起屋宇詔下有司竟不行八月大理正路航奏見春秋釋奠于文宣王廟武成王廟久曠時祭國之二柄文武之宗請復常祀從之九月太常博士叚顒奏臣聞國之大事惟有祀典竊見時祭遇大祠則差宰臣行事中祀則諸寺卿監行事小祀則委太祝奉禮而已並不差官以臣芻愚竊謂不可今小祀請差五品官行事從之十月中書門下奏太㣲宫太廟南郊壇宰臣行事宿齋百官皆入廟伏以奉命行事精䖍宿齋儻偏見於朝官渉不䖍於祠祀今後宰臣行事文武兩班望令並不得到宿齋處者奉勅宜依十二月奏今後宰臣致齋内請不押班知印不赴内殿起居或遇國忌應行事官受誓戒並宜不赴行香並奏覆刑殺公事及大祀致齋内請不開宴從之又奏今後大忌前一日請不坐朝從之長興元年五月丁丑明宗臨軒命使册淑妃曹氏為皇后時禮院上言百官上䟽于皇后曰皇后殿下六宫及率土婦人慶賀祗呼殿下不言皇后中書覆奏若祗呼殿下恐與皇太子無所分别凡上中宫表章呼皇后殿下若不行文字尋常祗呼皇后從之九月太常禮院草定册秦王儀注太常博士田顒奏議據開元禮臨軒册命諸大臣其日受册者服朝服從茅備鹵簿與羣臣俱集朝堂就次受册訖通事舎人引出不載謁廟還茅之儀自開元已後册拜諸王皆正衙命使詣延英閣進册皇帝御内殿髙品引王入詣殿庭立于髙位宣制讀册王受册訖歸王院亦無乘輅及謁廟之禮臣按五禮精義云古者皆因禘嘗而發爵禄所以示無所專禀祖宗也今雖册命不在禘嘗然拜大官封大邑必至廟庭者敬順之道也今册命秦王當司欲准開元禮册命儀注其日秦王服朝服自理所乘輅車備鹵簿與羣臣俱集朝堂就次受册訖出應天門外奉册載於册車王升輅謁太廟訖還理所如來儀從之是月太常禮院奏來年四月孟夏禘饗於太廟謹按禮經三年一祫以孟冬五年一禘以孟夏已毁之主未毁之主並合食於太祖廟功臣配饗于太廟之庭本朝寶應元年定禮奉景皇帝為始封之祖居東向之尊自代祖元皇帝髙祖太宗已下列聖子孫各序昭穆南北相向合祀于前聖朝中興重修宗廟今太廟見饗髙祖太宗懿宗明宗獻祖太祖莊宗七廟太祖景皇帝在祧廟之數不列廟饗將來禘禮若奉髙祖居東向之尊而又禘饗不及於太祖代祖亦已祧廟太祖居東向之位則有違於禮意而㳂革未聞今所司奉修祧廟神主及諸色法物已備合預請參詳事須具狀申奏勅下尚書省集百寮商議戸部尚書韓彦惲署百寮議狀奏曰伏以三年祫而五年禘䆳古通規祖有徳而宗有功前王令範始封為百代之主親盡從羣廟之祧繇是昭穆罔差尊卑式叙標諸前典是謂格言我國家土徳中興瑶圖再造既展郊禋之禮爰崇禘祫之儀典册畢陳孝思無極恭以本朝尊受命之祖景皇帝為始封之君百代不遷累朝頻議自貞觀至於天祐無所改移聖祖神孫左昭右穆洎經兵革久廢蒸嘗蕪沒宮庭陸沉園寢迨夫中興國祚重立宗祊議出一時制行七廟遂致太祖景皇帝在祧廟之數不列祖宗伏惟聖明神武文徳恭孝皇帝陛下紹復鴻圖不失舊物欲尊太祖之位將行東向之儀爰命羣臣畢同集議伏詳本朝列聖之舊典明皇㝎禮之新規開元十年特立九廟子孫遵守歴代無虧今既行七廟之規又以祧太祖之室昔徳宗朝行禘祫之禮顔真卿立議請奉獻祖神主居東向之位景皇帝暫居昭穆之列考之於貞元則以為誤引之說行之於今日雅得其變禮之宜今欲請每遇禘祫之歳暫奉景皇帝居東向之尊自元皇帝已下叙列昭穆羣寮聚議貴在酌中臣等謬列周行咸非博識約其故事庶叶典章勅㫖從之十月國子博士田敏奏請依春秋藏氷頒氷之儀以消隂陽愆伏之沴勅㫖藏氷之制載在前經獻廟之儀廢於近代既朝臣之特舉按典禮以宜行田敏所奏祭司寒獻羔事宜依其桃弧棘矢以下事乆不行理難備創其諸侯亦宜准徃制任藏氷二年五月中書門下覆奏尚書都官員外郎知制誥張昭逺丁母憂伏以大臣枕凷有弔祭之恩羣寮寢苫無慰問之例髙下之位不等君親之義無偏况卿士甚多有父母者極少固於孝道上軫聖懐張昭逺望量與恩賜兼自此朝臣或有丁憂亦依此制册府元龜卷五百九十三
