body:
  text: 册府元龜卷九百十宋王欽若等撰總録部偽政南宫有言曰楚雖三户亡秦必楚項氏世為楚将因民胥怨嘯聚無頼攻城略地所過無不殘滅而且遥尊懐王為義帝以慰羣下之望是時豪傑蜂起生靈靡託譬猶捕鹿獲者同功必推最强專用宰割然項籍以匹夫之勇婦人之仁威詐亟行脅以從已號令非一諸侯不平豈所謂失道者寡助不善者善人之資邪故漢髙以寛仁長者卒有天下矣及漢氏中微乃有新莽繇外戚以用事假仁義以邀名始輔弱主之政終竊南面之位禮樂制度上下變更宴懐姦慝偷安嵗月而不知漢徳雖衰天命未改孟堅曰紫色鼃聲非偽而何哉項籍字羽為楚上将軍既屠咸陽殺秦降子嬰廼陽尊懐王為義帝徙之長沙都郴分天下以王諸侯羽為諸侯上將軍以前事迹並見將帥門羽與范増疑沛公業已講解講和也又惡背約恐諸侯叛之隂謀曰巴蜀道險秦之遷民皆居之乃曰巴蜀亦闗中地故立沛公為漢王王巴蜀漢中而三分闗中王秦降將以距塞漢道乃立章邯為雍王王咸陽以西長史司馬欣故櫟陽獄吏嘗有徳於梁都尉董翳本勸章邯降故立欣為塞王王咸陽以東至河立翳為翟王王上郡徙魏王王豹為西魏王王河東瑕丘公申陽者瑕丘縣之老人姓申名陽張耳嬖臣也嬖謂愛幸也先下河南迎楚河上立陽為河南王趙将司馬卭定河内數有功立卭為殷王王河内徙趙王歇王代趙相張耳素賢又從入闗立為常山王王趙地當陽君英布為楚将嘗冠軍立布為九江王番君呉苪帥百粤佐諸侯又從入闗立苪為衡山王義帝柱國共敖将兵擊南郡功多因立為臨江王徙燕王韓廣為遼東王燕将臧荼從楚救趙因從入闗立荼為燕王徙齊王田市為膠東王齊将田都從共救趙入闗立都為齊王故秦所滅齊王建孫田安羽方渡河救趙安下濟北數城引兵降羽立安為濟北王田榮者背梁不肯助楚擊秦以故不得封陳餘棄将印去不從入闗然素聞其賢有功於趙聞其在南皮故因環封之三縣饒南皮三縣以封之番君将梅鋗功多故封十萬户侯羽自立為西楚伯王王梁楚地九郡都彭城諸侯各就國田榮聞羽徙齊王市膠東而立田都為齊王大怒不肯遣市之膠東因以齊反迎擊都都走楚市畏羽廼亡之膠東就國榮怒追殺之即墨自立為齊王予彭越将軍印令反梁地越廼擊殺濟北王田安田榮遂并王三齊之地時漢王還定三秦羽聞漢并闗中且東言方将出闗而擊楚齊梁畔之大怒廼以故呉令鄭昌為韓王以距漢令蕭公角等擊彭越越敗蕭公角等羽北擊齊徴兵九江王布布稱疾不行使將将數千人往漢王二年羽隂使布殺義帝羽至城陽田榮不勝走至平原平原民殺之羽遂北燒夷齊城郭室屋皆坑䧏卒繫虜老弱婦女狥齊至北海所過殘滅齊人相聚而畔之於是田榮弟横收得亡卒數萬人反城陽羽因留連戰未能下漢王刼五諸侯兵凡五十六萬人東伐楚時有十八諸侯漢得其五常山河南韓魏殷也羽聞之即令諸将擊齊而自以精兵三萬人南從魯出胡陵東至彭城日中大破漢軍謂早擊之至日中大破也漢軍滎陽築甬道取敖倉食三年羽數擊絶漢甬道漢王食乏請和割滎陽以西為漢羽欲聽之范増曰漢易與爾今不取後必悔之羽乃急圍滎陽漢王患之用陳平計以金四萬斤間楚君臣羽以故疑范増稍奪之權増怒疽發背死漢王西入闗收兵出宛葉間與黥布行收兵羽聞之即引兵南漢王堅壁不與戰是時彭越渡睢與項聲薛公戰下邳殺薛公羽乃東擊彭越漢王亦引兵北軍成臯羽已破走彭越引兵西下滎陽城進圍成臯漢王跳跳謂輕身而急出也獨與滕公得出羽遂㧞成臯四年羽擊陳留外黄不下數日降羽悉令男子十五以上詣城東欲阬之外黄令舍人兒年十三說羽曰彭越强刼外黄外黄恐故且降待大王大王至又皆阬之百姓豈有所歸心哉從此以東梁地十餘城皆恐莫肯下矣羽然其言乃赦外黄當阬者而東至睢陽聞之皆争下時漢軍方圍鍾離昧於滎陽東羽亦軍廣武與漢王相與語漢王數羽十罪羽怒伏弩傷漢王時漢闗中兵益出食多羽兵食少漢王使侯公說羽羽廼與漢王約中分天下割鴻溝而西者為漢東者為楚歸漢王父母妻子已約羽解而東五年漢王進兵追羽至固陵復為羽所敗漢王用張良計致齊王信建成侯彭越兵及劉賈入楚地圍壽春大司馬周殷叛楚舉九江兵隨劉賈迎黥布與齊梁諸侯皆大㑹羽壁垓下軍少食盡漢帥諸侯兵圍之數重羽夜聞漢軍四面皆楚歌廼驚曰漢皆已得楚乎是何楚人之多也起飲帳中有美人姓虞氏常幸從駿馬名騅常騎蒼白雜毛曰騅以色名之廼悲歌忼慷自為歌詩曰力㧞山兮氣葢世時不利兮騅不逝騅不逝兮可奈何虞兮虞兮奈若何若汝也歌數曲美人和之羽泣下數行左右皆泣莫能仰視於是羽遂上馬戲下騎從者八百餘人戲大将旗也漢書通以戲為旌麾及指麾字夜直潰圍南出馳平明漢軍廼覺之令騎将灌嬰以五千騎追羽渡淮騎能屬者百餘人羽至隂陵迷失道隂陵縣名屬九江郡問一田父田父紿曰左左乃陷大澤中以故漢追及之羽復引而東至東城廼有二十八騎追者數千羽自度不得脱謂其騎曰吾起兵至今八嵗矣身七十餘戰所當者破所擊者服未嘗敗北遂霸有天下然今卒困於此此天亡我非戰之罪也今日固决死願為諸軍决戰必三勝斬将艾旗廼後死使諸軍知吾非用兵罪天亡我也於是引其騎因四隤山隤四下隤陁也而為圜陳外向圜陳四周圍之兵刄皆在外漢騎圍之數重羽謂騎曰吾為公取彼一将令四面騎馳下期山東為三處於是羽大呼馳下漢軍皆披靡遂殺漢一将是時楊喜為郎騎追羽羽還叱之還謂回面也喜人馬俱驚辟易數里辟易謂開張而易其本處與其騎㑹三處漢軍不知羽所居分軍為三復圍之羽乃馳復斬漢一都尉殺數十百人復聚其騎亡兩騎廼謂騎曰何如騎皆服曰如大王言於是羽遂引東欲渡烏江在牛渚烏江亭長檥船待整船向岸也謂羽曰江東雖小地方千里衆數十萬亦足王也願大王急渡今獨臣有船漢軍至無以渡羽笑曰乃天亡我何渡為且籍與江東子弟八千人渡而對今亡一人還縱江東父兄憐而王我我何面目見之哉縱彼不言籍獨不愧於心乎謂亭長曰吾知公長者也吾騎此馬五嵗所當亡敵嘗一日千里吾不忍殺以賜公廼令騎皆去馬歩持短兵接戰羽獨所殺漢軍數百人羽亦被十餘創顧見漢騎司馬吕馬童曰若非吾故人乎馬童面之面謂背之不面向也指王翳曰此項王也羽廼曰吾聞漢購我頭千金邑萬户吾為公得令公得我為功也廼自剄王翳取其頭亂相輮蹈争羽相殺者數十人最後楊喜吕馬童郎中吕勝楊武各得其一體故分其地以封五人皆為列侯漢王廼以魯公號葬羽於榖城諸項支屬皆不誅封項伯等四人為列侯賜姓劉氏王莽為安漢公攝行皇帝之事居攝以前莽之事迹並見宰輔諸部外戚門改元居攝元年正月莽祀上帝於南郊迎春於東郊行大射禮於明堂養三老五更成禮而去置柱下五史秩如御史聽政事侍旁記疏言行三月己丑立宣帝𤣥孫嬰為皇太子號曰孺子以王舜為太傅左輔甄豐為大阿右拂甄邯為太保後承又置四少秩皆二千石四月安衆侯劉崇與相張紹攻宛不得入而敗莽汙池崇室宅羣臣復白劉崇等謀逆者以莽權輕也宜尊重以鎮河内五月甲辰太后詔莽朝見太后稱假皇帝十二月羣臣奏請益安漢公宫及家吏置率更令廟廐厨長丞中庶子虎賁以下百餘人又置衛士三百人安漢公廬為攝省府為攝殿第為攝宫莽白太后下詔曰故太師光雖前薨功效已列太保舜大司空豐輕車将軍邯歩兵将軍建皆為誘進單于籌䇿又典靈臺明堂辟雍四郊定制度開子午道與宰衡同心說徳合意幷力功徳茂著封舜子康為同心侯林為說徳侯光孫為合意侯豐孫康併力侯益邯建各三千户是嵗西𦍑龎恬傅幡等怨莽奪其地作西海郡反攻西海太守程永奔走莽誅永遣䕶羌校尉竇况擊破之二年五月禁列侯以下不得挾黄金輸御府受直然卒不與直九月東郡太守翟義都試勒車騎因發奔命立嚴鄉侯劉信為天子信東平煬王之子也移檄郡國言曰莽毒平帝攝天子位欲絶漢室今共行天罰誅莽郡國疑惑衆十餘萬莽惶懼不能食晝夜抱孺子告禱郊廟作䇿曰昔成王幼周公攝政而管蔡挾禄父以畔禄父紂子也今翟義亦挾劉信而作亂自古大聖猶懼此况臣莽之斗筲自喻材器小也羣臣皆曰不遭此變不章聖徳莽於是依周書作大誥武王終周公相成王而三監淮夷叛周公作大誥莽自比周公故依放其事曰惟居攝二年十月甲子攝皇帝若曰大誥道諸侯王三公列侯於汝卿大夫元士御事言以大道告於諸侯已下御事主事也不弔天降䘮於趙傅丁董趙飛燕傅太后丁太后董賢也不弔言不為天所弔閔降下也洪惟我幼冲孺子當承繼嗣無疆大歴服事洪大也惟思也冲稚也大思幼稚孺子當承繼漢家無竟之歴服行政事予未遭其明哲能導民於安况其能往知天命予莽自稱也言不遭遇明知之人以自輔伏而導百姓於安也熈我念孺子若渉淵水熈歎辭予惟往求朕所濟度奔走言我當求所以濟度之故奔走盡力不憚勤勞以傅近奉承髙皇帝所受命予豈敢自比於前人乎前人謂周公也天䧏威明用寧帝室遺我居攝寳龜威明猶言明威也太皇太后以丹石之符廼紹天明意紹承也詔予即命居攝踐祚如周公故事反虜故東郡太守翟義擅興師動衆曰有大難于西土西土人亦不靖曰者述翟義之言西土謂京師也言在東郡之西也於是動嚴鄉侯信誕敢犯祖亂宗之序誕大也天䧏威遺我寳龜固知我國有呰災使民不安呰病也言天所以䧏威遺龜者知國有災病義信當反天下不安之故也是天反復右我漢國也粤其聞曰粤發語詞上問曰也宗室之雋有四百人諸劉見在者民獻儀九萬夫民之表儀謂賢者予敬以終於此謀繼嗣圖功我用此宗室之雋及獻儀者共謀圖國事終成其功我有大事休予卜并吉大事戎事也言人謀既從卜又并吉是為美也故我出大将告郡太守諸侯相令長曰予得吉卜予惟以汝于伐東郡嚴鄉逋播臣逋去也播散也爾國君或者無不反曰艱大民亦不静亦惟在帝宫諸侯宗室於小子族父敬不可征言爾等國君或有言曰禍難既大衆庶不安又劉信國之宗室於孺子為族父當加禮敬不可征討也帝不違卜卜既得吉天命不違故予為冲人長思厥難曰烏虖義信所犯誠動鰥寡哀哉無妻無夫之人亦同受其害故可哀哉予遭天役遺大解難於予身以為孺子不身自䘏言天以漢家役事遺我而令身解其難故我征伐以為孺子除亂非自憂身予義彼國君泉陵侯上書泉陵侯劉慶也言書令莽行天子事曰成王㓜弱周公踐天子位以治天下六年朝諸侯於明堂制禮樂班度量而天下大服班謂布行也太皇太后承順天心成居攝之義皇太子為孝平皇帝子皇太子即謂孺子年在襁褓宜且為子知為人子道令皇太后得加慈母恩畜養成就加元服然後復子明辟辟君也以明君之事還孺子也熈為我孺子之故重歎而言予惟趙傅丁董之亂遏絶繼嗣變剥適庶危亂漢朝以成三厄㑹也謂三七二百一十嵗隊極厥命隊隕也極盡也烏虖害其可不膂力同心戒之哉害何也膂陳也予不敢僣上帝命僣不信也言順天命而征討天休于安帝室興我漢國惟卜用克綏受兹命言天美於興復漢國故我惟用卜吉能安受此命今天其相民况亦惟卜用言天道當思助人况更用卜吉可知矣太皇太后肇有元城沙鹿之右沙鹿在元城縣春秋時沙鹿崩王莽以為元后之祥隂精女主聖明之祥李親懐元后夢月入懐隂精女主之祥配元生成以興我天下之符遂獲西王母之應民傳祀西王母之應也神靈之徴徴證也以祐我帝室以安我大宗以紹我後嗣以繼我漢功厥害適統不宗元緒者辟不違親辜不避戚其有害國之正統不尊大緒者當速加刑辟不避親戚夫豈不愛亦惟帝室非不愛此人但為帝室不得止是以廣立王侯並建曽𤣥俾屏我京師綏撫宇内屏謂蔽捍其難也博徴儒生講道於廷論序乖謬制禮作樂同律度量混一風俗混亦同也正天地之位昭郊宗之禮定五畤廟祧咸秩亡文諸廢祀無文籍皆祭之建靈臺立明堂設辟雍張太學尊中宗高宗之號宣帝元帝也昔我高宗崇徳建武克綏西域以受白虎威勝之瑞元帝誅滅郅支單于懐輯西域時有獻白虎者所以威逺勝猛也天地判合乾坤序徳言元帝既有威徳太后又兆符應則是天地乾坤夫妻之義相配合也判之言片也太皇太后臨政有龜龍麟鳳之應五徳嘉符相因而備河圖雒書逺自崑崙出於重壄崑崙河所出重壄雒所出皆有圖書故本言之古讖著言肆今享實讖故也言古有其讖故今當其實此廼皇天上帝所以安我帝室俾成就洪烈也洪大也烈業也烏虖天明威輔漢始而强大矣言因此難更以强大爾有惟舊人泉陵侯之言爾不克逺省爾豈知太皇太后若此勤哉言爾當思乆舊之人泉陵侯所言爾不能逺省識古事其知太后之勤乎天毖勞我成功所天慎勞我國家成功之所在予不敢不極卒安皇帝之所圖事卒終也言我不敢不終祖宗之業安帝室所謀之事肆予告我諸侯王公列侯卿大夫元士御事肆陳也陳其理而告之也天輔誠辭言有至誠之辭則為天所輔天其累我以民予害敢不於祖宗安人圖功所終累託也言天以百姓託我我曷敢不謀終祖宗安人之功也天亦惟勞我民若有疾予害敢不於祖宗所受休輔言天欲撫勞我衆若有疾苦我曷敢不順祖宗之意休息而輔助之予聞孝子善繼人之意忠臣善成人之事予思若考作室厥子堂而構之父有作室之意則子當築堂而構棼橑以成之厥父菑厥子播而穫之菑耕其田子當布種而收穫反土為菑一云田一嵗日菑予害敢不於身撫祖宗之所受大命作室農人猶不棄其本業我於今日不得有避而不征討叛逆也若祖宗廼有效湯武伐厥子民長其勸弗救譬有人來伐其子而長養彼心反勸助之弗救其子者止以子惡故也言湯武疾惡其心亦然今所征討不得避親當以公義烏虖肆哉肆陳也勸令陳力諸侯王公列侯卿大夫元士御事其勉助國道明道繇也言當繇於明知之事以助國也亦惟宗室之俊民之表儀廸知上帝命廸亦道也言當遵道而知天命粤天輔誠爾不得易定言天道輔誠爾不得改易天之定命況今天䧏戾於漢國惟大囏人翟義劉信大逆欲相伐於厥室豈亦知命之不易乎言義信不知天命不改易乃大為艱難以干國紀是自相謀誅伐其室也予永念曰天惟䘮翟義劉信若嗇夫予害敢不終予畮嗇夫治田志除草穢天之欲䘮義信事亦如之我當順天以終竟田畮之事天亦惟休于祖宗予害其極卜害敢不于從言天美祖宗之事我何其極卜法敢不往從言必從率寧人有㫖疆土况今卜并吉亦循祖宗之業務在安人而美疆土况今卜并吉乎言不可不從也故予大以爾東征今不僭差言必信之矣卜陳惟若此卜兆陳列如此廼遣諫議大夫桓譚等班行諭告當反位孺子之意還封譚為明告里附城明告者以其出使能明告諭言外也附城如古附庸也遣王邑孫建等八将軍擊義分屯諸闗守阨塞槐里男子趙明霍鴻等起兵以和翟義相與謀曰諸将精兵悉東京師空可攻長安衆稍多至且十萬人莽恐遣将軍王竒王級将兵拒之以太保甄邯為大将軍受鉞高廟領天下兵左仗節右把鉞屯城外王舜甄豐晝夜循行殿中十一月王邑等破翟義於圉司威陳崇使監軍為使而監軍於外上書言陛下奉天洪範心合寳龜心與合也龜膺受元命豫知成敗咸應兆占是謂配天配天之主慮則移氣言則動物施則成化臣崇伏讀詔書下日竊計其時聖思始發而反虜仍破思慮也詔文始書反虜大敗制書始下反虜畢斬衆将未及齊其鋒芒臣崇未及盡其愚慮而事已决矣莽大説盡壞義第宅汙池之汙停水也發父方進及先祖冢在汝南者燒其棺柩夷滅三族誅及種嗣至皆同坑以棘五毒幷葬之野葛狼毒之屬也而下詔曰葢聞古者伐不敬取其鯨鯢築武軍封以為大戮於是乎有京觀以懲淫慝此左傳載楚莊王辭也鯨鯢大魚為害者也以比敵人之勇桀者京高丘也觀謂如闕形也懲創也慝惡也廼者反虜劉信翟義悖逆作亂於東而芒竹羣盗趙明霍鴻造逆西土芒竹在盭厔南芒水之曲而多竹林也即今司竹園是其地矣遣武将征討咸伏其辜惟信義等始發自濮陽結姦無鹽殄滅於圉趙明依阻槐里環隄槐里縣界其中有環曲之隄而明依之以自固也霍鴻負倚盭厔芒竹負恃也咸用破碎亡有餘類其取反虜逆賊之鯨鯢聚之通路之旁濮陽無鹽圉槐里盭厔凡五所各方六丈髙六尺築為武軍封以為大戮薦樹之棘薦重也聚也建表木髙丈六尺表者所以標名也書曰反虜逆賊鯨鯢在所長吏嘗以秋循行勿令壞敗以懲滛慝焉三年春地震大赦天下王邑等還京師西與王級等合擊明鴻皆破滅莽大置酒未央宫白虎殿勞賜将帥詔陳崇治校軍功第其髙下莽乃上奏曰明聖之世國多賢人故唐虞之時可比屋而封至功成事就則加賞焉至于夏后塗山之㑹執玉帛者萬國諸侯執玉附庸執帛周武王孟津之上尚有八百諸侯周公居攝郊祀后稷以配天宗祀文王於明堂以配上帝是以四海之内各以其職來祭葢諸侯千八百矣禮記王制千七百餘國是以孔子著孝經曰不敢遺小國之臣而况於公侯伯子男乎故得萬國之歡心以事其先王此天子之孝也秦為亡道殘滅諸侯以為郡縣欲擅天下之利故二世而亡高皇帝受命除殘考功施賞建國數百後稍衰微其餘僅存太皇太后躬統大綱廣封功徳以勸善興滅繼絶以永世是大化流通旦暮且成遭羌寇害西海郡反虜流言東郡逆賊惑衆西土忠臣孝子莫不奮怒所征殄滅盡備厥辜天下咸寧制禮作樂實考周爵五等地四等有明文爵五等公侯伯子男也地四等公一等侯伯二等子男三等附庸四等殷爵三等有其說無其文公一等侯二等伯子男三等孔子曰周監於二代郁郁乎文哉吾從周監視也二代夏殷也郁郁文章貌臣請諸將帥當受爵邑者爵五等地四等奏可於是封者髙為侯伯次為子男當賜爵闗内侯更名曰附城凡數百人擊西海者以羌為號槐里以武為號翟義以虜為號羣臣復奏言太后脩功錄徳逺者千載近者當世或以文封或以武爵深淺大小靡不畢舉今攝皇帝背依踐阼宜異於宰國之時制作雖未畢已已止也宜進二子爵皆為公春秋善善及子孫賢者之後宜有土地成王廣封周公庶子六人皆有茅土及漢家名相大将蕭霍之屬咸及支庶兄子光可先封為列侯諸孫制度畢已大司徒大司空上名如前詔書太后詔曰進攝皇帝子褒新侯安為新舉公賞都侯臨為褒新公封光為衍功侯是時莽還歸新都國羣臣復白以封莽孫宗為新都侯莽既滅翟義自謂威徳日盛獲天人助遂謀即真之事矣九月莽母功顯君死意不在哀令太后詔議其服少阿羲和劉歆與博士諸儒七十八人皆曰居攝之義所以統立天功興崇帝道成就法度安輯海内也昔殷成湯既沒而太子蚤夭其子太甲㓜少不明伊尹放諸桐宫而居攝以興殷道周武王既沒周道未成成王幼少周公屏成王而居攝以成周道屏擁也是以殷有翼翼之化商頌曰商邑翼商翼四方之極言邑禮俗翼翼然可則效乃四方之中正也周有刑錯之功謂成康之世囹圄空虛今太皇太后比遭家之不造比類也周頌曰遭家不造造成也故議者引之委任安漢公宰尹羣僚衡平天下宰治也尹正也衡平也言如稱之衡遭孺子㓜少未能共上下上下謂天地皇天䧏瑞出丹石之符是以太后則天明命詔安漢公居攝踐祚将以成聖漢之業與唐虞三代比隆也攝皇帝遂開秘府㑹羣儒制禮作樂卒定庶官茂成天功茂美也聖心周悉卓爾獨見發得周禮以明因監殷因於夏禮周監於二代則天稽古而損益焉猶仲尼之聞韶孔子在齊聞韶三月不知肉味言天縱多能而識微也日月之不可階子貢叙孔子徳云他人賢者邱陵也猶可踰也仲尼日月無得而踰焉又曰夫子之不可及猶天之不可階而升也非聖哲之至孰能若兹綱紀咸張成在一匱言人修行道徳者若為山雖於平地始覆一匱之土而作不止可以得成謂莽修行政化致於太平本繇一匱也此其所以保祐聖漢安靖元元之效也今功顯君薨禮庶子為後為其母緦傳曰與尊者為體不敢服其私親也攝皇帝以聖徳承皇天之命受太后之詔居攝踐祚奉漢大宗之後上有天地社稷之重下有元元萬機之憂不得顧其私親故太皇太后建厥元孫俾侯新都建立也元長也謂莽孫宗為新都侯為哀侯後明攝皇帝與尊者為體承宗廟之祭奉共養太皇太后不得服其私親也周禮曰王為諸侯緦縗弁而加環絰弁上加環絰也謂之環者言其輕細如環之形也同姓則麻異姓則葛攝皇帝當為功顯君緇縗弁而加麻環絰如天子弔諸侯服以應聖制莽遂行焉凡一弔再㑹而令新都侯宗為主喪服三年莽下書曰遏宻之義訖于季冬平帝以元始五年十二月終至此再朞年也遏止也蜜静也謂不作樂也正月郊祀八音當奏王公卿士樂凡幾等五聲八音條各云何其與所部儒生各盡精思悉陳其義是嵗廣饒侯劉京車騎将軍千人扈雲千人官名屬車騎将軍扈姓雲名太保屬臧鴻奏符命京言齊郡新井雲言巴郡石牛鴻言扶風雍石莽皆迎受十一月甲子莽奏太后曰陛下至聖遭家不造遇漢十二世三七之阨承天威命詔臣莽居攝受孺子之託任天下之寄臣莽兢兢業業懼於不稱宗室廣饒侯劉京上書言七月中齊郡臨淄縣昌興亭長辛當一暮數夢曰吾天公使也天公使我告亭長曰攝皇帝當為真即信我此亭中當有新井亭長晨起視亭中誠有新井誠實也入地且百尺十一月壬子直建冬至壬子之日冬至而其日當建巴郡石牛戊午雍石文皆到于未央宫之前殿臣與太保安陽侯舜等視天風起塵㝠風止得銅符帛圖於石前文曰天告帝符獻者封侯承天命用神令騎都尉崔發等眂說言視其文而説其意也及前孝哀皇帝建平二年六月甲子下詔書更為大初元将元年案其本事甘忠可夏賀良䜟書藏蘭堂蘭堂掌圖籍之所臣莽以為元将元年者大将居攝改元之文也於今信矣尚書康誥王若曰孟侯朕其弟小子封孟長也孟侯者言為諸侯之長也封者衛康叔之名此周公居攝稱王之文也春秋隱公不言即位攝也此二經孔子周公所定葢為後法孔子曰畏天命畏大人畏聖人之言臣莽敢不承用臣請共事神祗宗廟奏言太皇太后孝平皇后皆稱假皇帝其號令天下天下奏言事毋言攝以居攝三年為初始元年漏刻以百二十為度用應天命臣莽夙夜養育隆就孺子隆長也成就之使其長大也令與周之成王比徳宣明太皇太后威徳於萬方期於富而教之孺子加元服復子明辟如周公故事奏可衆庶知其奉符命指意羣臣博議别奏以視即真之漸矣梓潼人哀章作銅匱為兩簡署其一曰天帝行璽金匱圖其一署曰赤帝某傳予黄帝金策書某者髙皇帝名也莽至髙廟拜受金匱神嬗言有神命漢禪位於莽御王冠謁太后還坐未央宫前殿下書曰予以不徳託於皇初祖考黄帝之後皇始祖考虞帝之苗裔而太皇太后之末屬皇天上帝隆顯大佑成命統序符契圖文金匱䇿書神明詔告屬予以天下兆民屬委付也赤帝漢氏髙皇帝之靈承天命傳國金䇿之書予甚祗畏敢不欽受以戊辰直定於建除之次其日當定御王冠即真天子位定有天下之號曰新其改正朔易服色變犧牲殊徽幟異器制徽幟通謂旌旗之屬以十二月朔癸酉為建國元年正月之朔以鷄鳴為時服色配徳上黄犧牲應正用白使節之旄幡皆純黄其署曰新使五威節以承皇天上帝威命也冊府元龜卷九百十
