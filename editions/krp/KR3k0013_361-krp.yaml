body:
  text: 册府元龜卷三百六十一宋王欽若等撰將帥部機畧第一傳曰兵㐫器戰危事又曰以正合以竒勝不得已而用之屬在主將而已故得其術於是為廟勝之師失其宜不異驅市人而戰用舍之要煥然明白若乃登壇受脤臨軍對敵既知此而知彼或示弱而示緩亦有勢同破竹所謂奪人之心聲如疾雷使之不暇掩耳因敵變化不可談悉雖復無名之舉前王所慎黷武之事有國共戒然則伐謀决䇿不戰而屈人諒匪英才孰能必取軍志有之曰有必勝之將無必勝之兵其是之謂矣公子突鄭莊公子也北戎侵鄭魯隐公九年鄭伯禦之患戎師曰彼徒我車懼其侵軼我也徒歩兵也軼突也公子突曰使勇而無剛者嘗冦而速去之嘗試也勇則能往無剛不耻退君為三覆以待之覆伏兵也戎輕而不整貪而無親勝不相讓敗不相救先者見獲必務進進而遇覆必速奔後者不救則無繼矣乃可以逞逞觧也從之戎人之前遇覆者奔祝𣆀逐之祝𣆀鄭大夫衷戎師前後擊之盡殪為三部伏兵祝𣆀帥勇而無剛者先犯戎而速奔以遇二伏兵至後伏兵起戎還走祝𥅆反逐之戎前後及中三處受敵故曰衷戎師殪死也戎師大奔欒枝晉大夫也晉楚戰於城濮僖公二十八年楚將子玉從晉師晉師陳於莘北胥臣以下軍之佐當陳蔡子玉以若敖之六卒將中軍曰今日必無晉矣鬭宜申將左鬭勃將右胥臣蒙馬以虎皮先犯陳蔡陳蔡奔楚右師潰陳蔡屬楚右師狐毛設二斾而退之斾大旗也又建二大旗而退使若大將稍却也欒枝使輿曳柴而偽遯曵柴起塵詐為衆走楚師馳之原軫郤溱以中軍公族横擊之公族公所帥之軍狐毛狐偃以上軍夾攻子西楚左師潰楚師敗績子玉收其卒而止故不敗陽處父晉大夫也陽處父侵蔡楚子上救之與晉師夾泜而軍泜水出魯陽縣東經襄城定陵入汝陽子患之使謂子上曰吾聞之文不犯順武不違敵子若欲戰則吾退舍子濟而陳欲避楚使渡成陳而後戰遲速唯命不然紓我紓緩也老師費財亦無益也師乆為老乃駕以待子上欲渉大孫伯曰不可晉人無信半渉而薄我悔敗何及不如紓之乃退舍楚退欲使晉渡陽子宣言曰楚師遁矣遂歸楚師亦歸魏舒晉大夫也中行穆子敗無終及羣狄於太原崇卒也崇聚也將戰魏舒曰彼徒我車所遇又阨地險不便車也以什共車必克更増十人以當一車之用困諸阨又克車每困於阨道今去車故為必克也請皆卒去車為歩卒也自我始乃毁車以為行魏舒先自毁其屬車為歩陣也五乘爲三伍荀呉之嬖人不肯即卒斬以徇為五陳以相離兩於前伍於後専為右角參為左角偏為前距以誘之狄人笑之未陳而薄之大敗之孫叔敖楚令尹也晉楚戰于邲晉魏錡趙旃請致師魯宣公十二年晉人懼二子之怒楚師也使軘車逆之軘車兵車名潘黨望其塵使騁而告曰晉師至矣楚人亦懼王之入晉軍也遂出陳孫叔敖曰進之寧我薄人無人薄我詩云元戎十乗以先啓行先人也元戎戎車在前也詩小雅言王者軍行必有戎車十乘在前開道先人為僃軍志曰先人有奪人之心薄之也奪敵戰心遂疾進師車馳卒奔乘晉軍晉師敗績養繇基楚大夫也吳侵楚魯㐮公十三年養繇基奔命子庚以師繼之子庚楚司馬養叔曰吳乘我喪謂我不能師也養叔養繇基也必易我而不戒戒僃也子為三覆以待我覆伏也我請誘之子庚從之戰於庸浦庸浦楚地大敗吳師獲公子黨君子以吳為不弔不用天道相弔恤詩曰不弔昊天亂靡有定言不為昊天所恤則致罪也中行獻子晉大夫也獻子伐齊魯㐮公十八年軍於平隂齊侯登巫山以望晉師巫山在盧縣東北晉人使司馬斥山澤之險雖所不至必斾而疏陳之斥堠也疏建旌旗以為陳示衆也使乘車者左實右偽以斾先偽以衣服為人形也建也斾以先驅多為陣示衆輿曳柴而從之以揚塵齊侯見之畏其衆也乃脱歸脱謂不張旗幟也脱身而歸胥梁帶晉大夫也齊烏餘以廪丘奔晉魯襄公二十六年晉侯使胥梁帶討之胥梁帶使諸䘮邑者具車徒以受地必周諸䘮邑謂齊魯宋也周宻也必宻來勿以受地為名使烏餘具車徒以受封烏餘以地來故詐許封之烏餘以其衆出出受封也使諸侯偽效烏餘之封者效致也使齊魯宋偽若致邑封烏餘者而遂執之盡獲之皆獲其徒衆皆取其邑而歸諸侯諸侯是以睦於晉傳言趙文子賢故平公雖失政而諸侯猶睦荀吳晉大夫也偽㑹齊師者魯昭公十二年假道於鮮虞遂入昔陽鮮虞白狄别種在中山新市縣昔陽肥國都樂平沾縣東有昔陽城秋八月壬午滅肥以肥子緜臯歸肥白狄也緜臯其君名鉅鹿下曲陽縣西南有肥累城公子光吳公子也楚師大敗吳師魯昭公十七年獲其乘舟餘皇公子光請於其衆曰䘮先王之乘舟豈唯光之罪衆亦有焉請藉取之以救死藉衆之力以取舟衆許之使長鬛者三人潛伏於舟側曰我呼餘皇則對師夜從之三呼皆迭對迭更也楚人從而殺之楚師亂吳人大敗之取餘皇以歸烏枝鳴齊大夫也宋華氏之亂烏枝鳴助宋戍守昭公二十一年華登以吳師救華氏烏枝鳴曰用少莫如齊致死齊致死莫如去僃僃長兵也彼多兵矣請皆用劒從之華氏北復即之北敗走也公子期楚公子也吳師敗楚師於雍澨魯定公五年秦師又敗吳師吳師居麇麇地名子期將焚之子西曰父兄親暴骨焉不能收又焚之不可前年楚人與吳戰多死麇中言不可并焚子期曰國亡矣死者若有知也可以歆舊祀言焚吳復楚則祭祀不廢豈憚焚之焚之而又戰吳師敗又戰於公壻之谿楚地名吳師大敗陽虎魯人晉趙鞅納衛太子于戚魯哀公二年齊人輸范氏粟鄭子姚子般送之子姚即罕逹子般駟𢎞士吉射逆之趙鞅禦之遇於戚陽虎曰吾車少以兵車之斾與罕駟兵車先陳斾先驅車也以先驅車益其兵車以示衆罕駟自後隨而從之彼見吾貌必有懼心於是乎㑹之必大敗之從之鄭師大敗獲齊粟千車孫臏齊人也顯王二十八年魏與趙攻韓告急於齊齊使田忌為將孫臏為師而往直走大梁魏將龎涓聞之去韓而歸齊軍既已過而西矣孫子謂田忌曰彼三晉之兵素悍勇而輕齊齊號為怯善戰者因其勢而利導之兵法百里而趣利者蹶上將五十里而趣利者軍半至使齊軍入魏地為十萬竈明日為五萬竈又明日為三萬竈龎㳙行三日大喜曰我故知齊軍怯入吾地三日士卒亡者過半矣乃棄其歩軍與其輕鋭倍日并行逐之孫子度其行暮當至馬陵馬陵道狹而旁多阻隘可伏兵乃斫大樹白而書之曰龎㳙死於此樹之下於是令齊軍善射者萬弩夾道而伏期曰暮見火舉而俱發龎涓果夜至見白書乃鑽火燭之讀其書未畢齊軍萬弩俱發魏軍大亂相失龎涓自知智窮兵敗乃自剄曰遂成豎子之名齊因乘勝盡破其軍虜魏太子申以歸樂毅為燕將昭王問以伐齊之事毅對曰齊霸國之餘業也地大人衆未易獨攻也王必欲伐之莫如與趙及楚魏於是使樂毅約趙惠文王别使連楚魏令趙嚪秦嚪進説之意以伐齊之利諸侯害齊湣王之驕暴皆争合從與燕伐齊樂毅還報燕昭王悉起兵使樂毅為上將軍趙惠文王以相國印授樂毅樂毅於是并䕶趙楚韓魏燕之兵以伐齊破之濟西諸侯兵罷歸而燕軍樂毅獨追至於臨淄齊湣王之敗濟西亡走保於莒樂毅獨留徇齊齊皆城守樂毅攻入臨淄盡取齊寳財物祭器輸之燕燕昭王大悦親至濟上勞軍行賞饗士封樂毅於昌國號為昌國君於是燕昭王收齊鹵獲以歸而使樂毅復以兵平齊城之不下者樂毅留徇齊五嵗下齊七十餘城皆為郡縣以屬燕白起為秦上將軍而王齕為尉裨將令軍中有敢泄武安軍將者斬趙將趙括至則出兵擊秦軍秦軍佯敗而走張二竒兵以刼之趙軍逐勝追造秦壁壁堅拒不得入而秦竒兵二萬五千人絶趙軍後又一軍五千騎絶趙壁間趙軍分而為二糧道絶而秦出輕兵撃之趙戰不利李牧者趙之北邊良將也嘗居代鴈門僃匈奴邊士皆願一戰於是乃具選車得千三百乘選騎得萬三千匹百金之士五萬人管子曰能破敵擒將者賞百金彀者十萬人悉勒習戰大縱畜牧人民滿野匈奴小入佯北不勝以數千人委之單于聞之大率衆來入牧多為竒陳張左右翼擊之大破殺匈奴十餘萬騎滅䄡襤音耽藍胡名在代北破東胡降林胡單于奔走田單者齊諸田疏屬也湣王時單為臨菑市掾不見知及燕使樂毅伐破齊齊湣王出奔己而保莒城燕師長驅平齊而田單走安平今之東安平也在青州臨淄縣東十九里古紀之􅀈邑齊改為安平秦滅齊改為東安平縣屬齊郡以定州有安平故加東字令其宗人盡斷其車軸末而傅鐵籠傅音附已而燕軍攻安平城壞齊人走争塗以轊拆車敗轊車軸頭也為燕所虜唯田單宗人以鐵籠故得脱東保即墨即墨城中以單習兵立為將軍以即墨拒燕頃之昭王卒恵王立與樂毅有隙田單聞之乃縱反間於燕宣言曰齊王已死城之不拔者二耳樂毅畏誅而不敢歸以伐齊為名實欲連兵南面而王齊齊人未附故且緩攻即墨以待其事齊人所懼唯恐他將之來即墨殘矣燕王以為然使騎刼代樂毅樂毅因歸趙燕人士卒忿而田單乃令城中人食必祭其先祖於庭飛鳥悉翔舞城中下食燕人怪之田單因宣言曰神來下教我乃令城中人曰當有神人為我師有一卒曰臣可以為師乎田單乃起引東鄉坐師事之卒曰臣欺君誠無能也田單曰子勿言也因師之每出約束必稱神師乃宣言曰吾惟懼燕軍之劓所得齊卒置之前行與我戰即墨敗矣燕人聞之如其言城中人見齊諸降者盡劓皆怒堅守唯恐見得單又縱反間曰吾懼燕人掘吾城外壟墓僇先人可為寒心燕軍盡掘壟墓燒死人即墨人從城上望見皆涕泣其欲出戰怒自十倍田單知士卒之可用乃身操版挿與士卒分功妻妾編於行伍之間盡散飲食饗士令甲卒皆伏使老弱女子乘城遣使約降於燕燕軍皆呼萬嵗田單又收民金得千鎰令即墨富豪遺燕將曰即墨即降願無虜掠吾族家妻妾令安堵燕將大喜許之燕軍繇此益懈田單乃収城中得千餘牛為絳繒衣畫以五彩龍文束兵刅於其角而灌脂束葦於尾燒其端鑿城數十穴夜縱牛壯士五千人隨其後牛尾熱怒而奔燕軍燕軍夜大驚牛尾炬火光明炫燿燕軍視之皆龍文所觸盡死傷五千人因銜枚擊之而城中鼓譟從之老弱皆擊銅器為聲聲動天地燕軍大駭敗走齊人遂夷殺其將騎刼燕軍擾亂奔走齊人追亡逐北所過城邑皆畔燕而歸田單兵日益多乘勝燕日敗亡卒至河上而齊七十餘城皆復為齊乃迎襄王於莒入臨菑而聽政襄王封田單號曰安平君漢韓信為左丞相擊魏魏王盛兵蒲坂塞臨晉信迺益為疑兵陳船欲渡臨晉而伏兵從夏陽以木罌缶渡襲安邑以木椑縳罌缶以渡也罌缶謂缻之大腹小口者也音一攻反臨晉在同州朝邑縣夏陽在韓城縣界魏王豹驚引兵迎信信遂虜豹定河東又信伐趙未至井陘口三十里止舍夜半傳發選輕騎二千人人持一赤幟從間道萆山而望趙軍萆音蔽依山自覆蔽也誡曰趙見我走必空壁以逐我若疾入拔趙幟立漢幟令其禆將傳餐曰今日破趙㑹食諸將皆嘸然陽應曰諾信謂軍吏曰趙已先據便地壁且彼未見大將旗鼓未肯擊前行行音胡郎反恐吾阻險而還乃使萬人先行出背水陳趙兵望見大笑平旦信建大將旗鼓鼓行出井陘口趙開壁擊之大戰良久於是信張耳棄旗鼓走水上軍復疾戰趙空壁争漢皷旗逐信耳信耳已入水上軍軍皆殊死戰不可敗信所出竒兵二千騎者候趙空壁逐利即馳入趙壁皆㧞趙旗幟立漢赤幟二千趙軍已不能得信耳等欲還壁壁皆漢赤幟大驚以為漢皆已破趙王將矣遂亂遁走趙將雖斬之弗能禁也於是漢兵夾擊破虜趙軍斬成安君泜水上信既破趙諸將效首虜休皆賀效致也謂各致其所獲因問信曰兵法有右背山陵前左水澤今者將軍令臣等反背水陳曰破趙㑹食臣等不服然竟以勝此何術也信曰此在兵法顧諸君弗察耳兵法不曰䧟之死地而後生投之亡地而後存乎且信非得素拊循士大夫此所謂驅市人而戰之也其勢非置死地人人自為戰今即予之生地皆走寧尚可得而用之乎諸將皆服曰非所及也後為相國擊齊楚使龍且將兵救齊與信夾濰水陳濰音維濰水出琅邪北箕縣信乃夜令人為萬餘囊盛沙以壅水上流引兵半渡擊龍且陽不勝還走龍且果喜曰固知信怯遂追渡水信使人決壅囊水大至龍且軍大半不得渡即急擊殺龍且龍且水東軍散走齊王廣亡去信追北至城陽虜廣楚卒皆降遂平齊陳平為䕶軍中尉盡䕶諸將髙祖為漢王三年楚圍漢王於滎陽平乃夜出女子二千人滎陽東門楚因擊之平乃與漢王從城西門出去遂入闗收聚兵而復東七年從髙祖擊韓王信於代至平城為匈奴所圍七日用陳平竒計得出陳平使畵工圖美女間遣人遺閼氏云漢有美女如此今皇帝困厄欲獻之閼氏畏其奪已寵因謂單于曰漢天子亦有神靈得其土地非能有也於是匈奴閒其一角得突出去李廣為上郡大守從百騎追匈奴射鵰者殺其二人生得一人已縛之上山望匈奴數千騎見廣以為誘騎皆驚上山陳廣之百騎皆大恐欲馳還走廣曰我去大軍數十里今如此走匈奴追射我立盡耳今我留匈奴必以我為大軍之誘不我擊廣令曰前未到匈奴陳二里所止令曰皆下馬觧鞍騎曰虜多如是觧鞍即急奈何廣曰彼虜以我為走今觧鞍以示不去用堅其意有白馬將出䕶兵廣上馬與十餘騎奔射殺白馬將而復還至其百騎中觧鞍縱馬卧時㑹暮胡兵終怪之弗敢擊夜半胡兵以為漢有伏軍於傍欲夜取之即引去平旦廣乃歸其大軍霍去病為驃騎將軍武帝嘗欲教之孫吳兵法吳吳起也孫孫武也對曰顧方畧何如爾不至學古兵法匈奴單于怒渾邪王居西方數為漢所破亡數萬人以故欲召誅渾邪王渾邪王與休屠王謀欲降漢使人先要道邊道猶言也先為要約來言之於邉界也是時大行李息將城河上得渾邪王使即馳傳以聞傳音張戀反帝恐其以詐降而襲邊乃令去病將兵往迎之去病既渡河與渾邪衆相望渾邪裨王將見漢軍而多欲不降者頗遁去去病乃馳入與渾邪王相見斬其軍欲亡者八千人遂獨遣渾邪王乘傳先詣行在所盡將其衆度河降者數萬人號稱十萬趙充國為後將軍時叛羌䍐开豪靡當兒使弟雕庫來告都尉曰先零欲反後數日果反雕庫種人頗在先零中都尉即留雕庫為質充國以為亡罪迺遣歸告種豪大兵誅有罪者明白自别毋取并滅言勿相和同自取滅亡天子告諸羌人犯法者能相捕斬除罪斬大豪有罪者一人賜錢四十萬中豪十五萬下豪二萬大男三千女子及老小千錢又以其所捕妻子財物盡與之充國計欲以威信招降䍐开及刼畧者觧散虜謀徼極乃擊之徼要也要其倦極者也徼音工堯反時上已發三輔太常徒弛刑弛刑謂不加鉗􅎂者也弛之言觧也三河潁川沛郡淮陽汝南材官金城隴西天水安定北地上郡騎士羌騎與武威張掖酒泉太守各屯其郡者合六萬人矣酒泉太守辛武賢奏言郡兵皆屯僃南山北邊空虛勢不可久或曰至秋冬乃進兵此虜在竟外之册竟讀曰境今虜朝夕為寇土地寒苦漢馬不能冬能讀曰耐屯兵在武威張掖酒泉萬騎以上皆多羸痩可益馬食以七月上旬齎三十日糧分兵並出張掖酒泉合擊䍐开在鮮水上者虜以畜産為命今皆離散兵即分出雖不能盡誅亶奪其畜産虜其妻子亶讀曰但復引兵還冬復擊之大兵仍出虜必震壞仍頻也天子下其書充國令與校尉以下吏士知𦍑事者博議充國及長史董通年以為武賢欲輕引萬騎分為兩道出張掖回逺千里回謂路紆曲也音胡梅反以一馬自佗負三十日食佗音徒何反凢以畜產載負物者皆為佗為米二斛四斗麥八斛又有衣装兵器難以追逐勤勞而至虜必商軍進退稍引去商計度也逐水􅋄入山林􅋄古草字隨而深入虜即據前險守後阸以絶糧道必有傷危之憂為夷狄笑千載不可復復音扶目反而武賢以為可奪其畜產虜其妻子此殆空言非至計也殆僅也又武威縣張掖日勒皆當北塞有通谷水草日勒張掖之縣臣恐匈奴與羌有謀且欲大入幸能要杜張掖酒泉以絶西域要遮也杜塞也其郡兵尤不可發先零首為叛逆它種刼畧言被刼畧而反叛非其本心故臣愚册欲捐䍐开闇昧之過隐而勿章先行先零之誅以震動之宜悔過反善因赦其罪選擇良吏知其俗者拊循和輯拊古撫字輯與集同此全師保勝安邊之册天子下其書公卿議者咸以為先零兵盛而負䍐开之助負恃也不先破䍐开則先零未可圖也廼拜侍中樂成侯許延夀為彊弩將軍即拜酒泉大守武賢為破𦍑將軍即就也就其郡而拜之也賜璽書嘉納其册以書敕讓充國曰讓責也皇帝問後將軍甚苦暴露將軍計欲至正月乃擊䍐𦍑𦍑人當穫麥已逺其妻子徙其妻子令逺居而身來為寇也精兵萬人欲為酒泉燉煌寇邊兵少民守保不得田作今張掖以東粟䂖百餘芻藁束數十皆謂錢直之數言其貴轉輸並起百姓煩擾將軍將萬餘之衆不早及秋共水草之利争其畜食此畜謂畜產牛羊之屬也食謂穀麥之屬也一曰畜食畜之所食者謂草也欲至冬虜皆當畜食此畜讀曰蓄蓄聚積之也多藏匿山中依險阻將軍士寒手足皸瘃皸坼裂也瘃寒創也皸音軍瘃音竹足反寧有利哉將軍不念中國之費欲以嵗數而勝微久厯年嵗乃勝小敵也數音所具反將軍誰不樂此者言凡為將軍者皆樂此今詔破羌將軍武賢將兵六千一百人燉煌太守快將二千人長水校尉富昌酒泉侯奉世將婼月氏兵四千人婼音兒遮反亡慮萬二千人亡慮大計也齎三十日食以七月二十二日擊䍐开羗入鮮水北句廉上句音鈎句廉謂水岸曲而有廉稜也去酒泉八百里去將軍可千二百里將軍其引兵便道西並進雖不相及使虜聞東方北方兵並來分散其心意離其黨與雖不能殄滅當有瓦解者已詔中郎將卭將胡越佽飛射士歩兵二校尉益將軍兵今五星出東方中國大利蠻夷大敗五星所聚其下勝羌人在西星在東為漢太白出髙用兵深入敢戰者吉弗敢戰者凶將軍急裝因天時誅不義萬下必全勿復有疑充國既得讓以為將任兵在外便宜有守以安國家言為將之道受任行兵於外雖受詔命若有便宜則當固守以取安利也迺上書謝罪因陳兵利害曰臣竊見騎都尉安國前幸賜書擇羌人可使使䍐开諭告以大軍當至漢不誅䍐开以解其謀恩澤甚厚非臣下所能及臣獨私美陛下盛徳至計亡已故遣开豪雕庫宣天子至徳䍐开之屬皆聞知明詔今先零羌楊玉此羌之首帥名王將騎四千及煎鞏騎五千阻山石木候便為寇謂依阻山之石木以自保䍐羌未有所犯今置先零先擊䍐釋有罪誅無辜起一難就兩害誠非陛下本計也臣聞兵法攻不足者守有餘又曰善戰者致人不致於人皆兵法之書也致人引至而取之也致於人為人所引也今䍐羌欲為燉煌酒泉寇宜飭兵馬練戰士以須其至飭整也須待也飭與敕同也坐得致敵之術以逸擊勞取勝之道也今恐二郡兵少不足以守而發之行攻釋致虜之術而從為虜所致之道失廢棄也臣愚以為不便先零羌虜欲為背畔故與䍐开解仇結約然其私心不能亡恐漢兵至而䍐开背之也臣愚以為其計常欲先赴䍐开之急以堅其約先擊䍐羌先零必救之今虜馬肥糧食方饒擊之恐不能害適使先零得施徳於䍐羌堅其約合其黨施徳自樹恩徳也虜交堅黨合精兵二萬餘人迫脅諸小種附著者稍衆莫須之屬不輕得離也莫須小種羗名也如是虜兵寖多寖漸也誅之用力數倍臣恐國家憂累繇十年數不二三嵗而已累音力瑞反繇與由同臣得蒙天子厚恩父子俱為顯列臣位至上卿爵為列侯犬馬之齒七十六為明詔填溝壑死骨不朽亡所顧念縁思惟兵利害至熟悉也於臣之計先誅先零已則䍐开之屬不煩兵而服矣先零已誅而䍐开不服渉正月擊之得利之理又其時也以今進兵誠不見其利唯陛下裁察六月戊申奏七月甲寅璽書報從充國計焉充國引兵至先零在所虜久屯聚解弛解讀懈弛放也望見大軍棄車重欲渡湟水重音直用反道阨狹充國徐行驅之或曰逐利行遲逐利宜疾今行少遲充國曰此窮宼不可迫也緩之則走不顧急之則還致死謂更回還盡力而死戰諸校皆曰善虜赴水溺死者數百降及斬首五百餘人鹵馬牛羊十萬餘頭車四千餘兩後漢任光為信都太守光武初為大司馬徇河北王郎稱號於邯鄲光武至信都光迎入𫝊舍光武謂光曰伯卿今勢力虛弱欲俱入城頭子路刁子都城頭子路刁子都皆賊之號也兵中何如邪光曰不可光武曰卿兵少何如光曰可募發奔命出攻傍縣若不降者恣聽掠之人貪財物則兵可招而致也光武從之拜光為左大將軍封武成侯留南陽宗廣領信都太守事使光將兵從光乃多作檄文曰大司馬劉公將城頭子路刁子都兵百萬衆從東方來擊諸反虜遣騎馳至鉅鹿界中吏民得檄𫝊相告語光武遂與光等投暮入堂陽界堂陽今冀州縣也使騎各持火炬彌滿澤中光燄燭天地舉城莫不震驚惶怖其夜即降旬日之間兵衆大盛因攻城邑遂屠邯鄲迺遣光歸郡耿純更始中為前將軍從光武平邯鄲又破銅馬時赤睂青犢上江大槍鐵脛五幡十餘萬衆並在射犬光武引兵將擊之純軍在前去衆營數里賊忽夜攻純雨射營中矢下如雨士多死傷純勒部曲堅守不動選敢死二千人俱持彊弩各傅三矢使銜枚閒行繞出賊後齊聲呼譟彊弩並發賊衆驚走追擊遂破之馳騎白光武光武明旦與諸將俱至營勞純曰昨夜困乎純曰頼明公威徳幸而獲全光武曰大兵不可夜動故不相救爾陳俊為彊弩將軍光武初為蕭王與五校戰於安次五校退入漁陽俊言於光武曰宜令輕騎出賊前使百姓各自堅守壁以絶其食可不戰而殄也光武然之遣俊將輕騎馳出賊前視人保壁堅完者勑令固守放散在野者因掠取之賊至無所得遂散敗及軍還光武謂俊曰困此虜者將軍䇿也及即位封俊為列侯銚期字次況更始中為賊曹掾從光武徇薊時王郎檄書到薊薊中起兵應郎光武趣駕出百姓聚觀諠呼滿道遮路不得行期騎馬奮㦸瞋目大呼左右曰䟆周禮𨽻僕掌䟆宮中之事鄭衆曰止行清道也若今警䟆説文䟆與蹕同衆皆披靡及至城門門已閉攻之得出寇恂更始中為河内太守行大將軍事朱鮪聞光武北而河内孤使討難將軍蘇茂副將賈彊將兵三萬餘人渡鞏河攻温鞏温並今雒州縣也臨黄河故曰鞏河也檄書至恂即勒軍馳出並移告屬縣發兵㑹於温下軍吏皆諫曰今雒陽兵渡河前後不絶宜待衆軍畢集乃可出也恂曰温郡之藩蔽失温郡不可守遂馳赴之旦日合戰而偏將軍馮異遣救及諸縣兵適至士馬四集幡旗蔽野恂乃令士卒乗城皷譟大呼言曰劉公兵至蘇茂軍聞之陳動恂因奔擊大破之追至雒陽遂斬賈彊茂兵自投河死者數千生獲萬餘人岑彭為征南大將軍建武三年率傅俊臧宮劉宏等三萬餘人南擊秦豐㧞黄郵聚名在南陽新都縣豐與其大將蔡宏拒彭等於鄧數月不得進帝怪以讓彭彭懼於是夜勒兵馬申令軍中使明旦西擊山都山都縣名屬南陽郡舊南陽之赤鄉秦以為縣故城在今襄州義清縣東北乃緩所獲虜令得逃亡歸以告豐豐悉率其軍西邀彭彭乃潛兵度沔水擊其將張楊於阿頭山大破之沔水源出武都東狼谷之中即漢水之上源也阿頭山在襄陽也從川谷間伐木開道直襲黎丘擊破諸屯兵豐聞大驚馳歸救彭與諸將依東山為營豐與蔡宏夜攻彭彭豫為之備出兵逆擊之豐敗走追斬蔡宏更封彭為舞隂侯秦豐相趙京舉宜城降王霸建武四年為偏將軍與捕虜將軍馬武東討周建於垂恵蘇茂將五校兵四千餘人救建而先遣精騎遮擊馬武軍糧武往救之建從城中出兵來擊武武恃霸之援戰不甚力為茂建所敗武軍奔過霸營大呼求救霸曰賊兵盛出必兩敗努力而已乃閉營堅壁軍吏皆爭之霸曰茂兵精鋭其衆又多吾吏士心恐而捕虜與吾相恃兩軍不一此敗道也今閉營固守示不相援賊必乘勝輕進捕虜無救其戰自倍如此茂衆疲勞吾承其弊乃可克也茂建果悉出攻武合戰良久霸軍中壯士路潤等數十人斷髪請戰霸知士心鋭乃開營後出精騎襲其背茂建前後受敵驚亂敗走耿弇為建威將軍建武五年詔遣弇東討張歩弇悉收集降卒結部曲置將吏率騎都尉劉歆太山太守陳俊引兵而東從朝陽橋濟河以度朝陽縣名屬濟南在朝水之陽張歩聞之乃使其大將軍費邑軍厯下故城在今之濟州厯城縣又分兵屯祝阿濟州縣名别於太山鍾城列營數十以待弇弇渡河先擊祝阿自旦攻城未中而㧞之故開圍一角令其衆得奔歸鍾城鍾城人聞祝阿已潰大恐懼遂空壁亡去費邑分遣弟敢守巨里巨里聚名也一名巨合在今濟州弇進兵先脅巨里使多伐樹木揚言以填塞坑塹數日有降者言邑聞弇欲攻巨里謀來救之弇乃嚴令軍中趣修攻具宣勅諸部後三日當悉力攻巨里城隂緩生口令得亡歸歸者以弇期告邑邑至日果自將精兵三萬餘人來救之弇喜謂諸將曰吾所以修攻具者欲誘致邑耳今來適其所求也即分三千人守巨里自引精兵上岡阪山脊曰岡坡者曰阪乘髙合戰大破之臨陳斬邑既而收首級以示巨里城中兇懼兇音呼勇力費敢悉衆亡歸張歩弇復收其積聚縱兵擊諸未下者平四十餘營遂定濟南時張歩都劇使其弟藍將精兵二萬守西安縣名屬齊郡也諸郡太守合萬餘人守臨淄相去四十里弇進軍畫中邑名畫音胡麥反居二城之間弇視西安城小而堅且藍兵又精臨淄名雖大而實易攻乃敕諸校㑹後五日攻西安藍聞之晨夜儆守至期夜半弇勅諸將皆蓐食未起而牀蓐中食也㑹明至臨淄城䕶軍荀梁等爭之以為宜速攻西安弇曰不然西安聞吾欲攻之日夜為備臨淄出不意而至必驚擾吾攻之一日必㧞㧞臨淄即西安孤張藍與歩隔絶必復亡去所謂擊一而得二者也若先攻西安不卒下頓兵堅城死傷必多縱能㧞之藍引軍還奔臨淄并兵合勢觀人虛實吾深入敵地後無轉輸旬月之間不戰而困諸君之言未見其宜遂攻臨淄半日㧞之入據其城馮異為征西大將軍建武六年諸將上隴為隗囂所敗乃詔異軍栒邑未及至隗囂乘勝使其將王元行巡將二萬餘人下隴因分遣巡取栒邑異即馳兵欲先據之諸將皆曰虜兵盛而新乘勝不可與爭宜止軍便地徐思方畧異曰虜兵臨境忸􅏸小利遂欲深入若得栒邑三輔動揺是吾憂也夫攻者不足守者有餘今先據城以逸待勞非所以爭也潛往閉城偃旗皷行巡不知馳赴之異乘其不意卒擊皷建旗而出巡軍驚亂奔走追擊數十里大破之臧宫為輔威將軍建武十一年將兵至中盧屯駱越中盧縣名屬南郡駱越人徙於此因以為名是時公孫述將田戎任滿與征南大將軍岑彭相拒於荆門彭等戰數不利越人謀叛從蜀宫兵少力不能制㑹屬縣送委輸車數百乘至宫夜使鋸斷城門限令車聲回轉出入至旦越人候伺者聞車聲不絶而門限斷相告以漢兵大至其渠帥乃奉牛酒以勞軍宫陳兵大㑹擊牛釃酒饗賜慰納之釃音所宜切説文下酒也越人繇是遂安廉范為雲中太守明帝永平中匈奴大入塞烽火日通故事虜入過五千人移書傍郡吏欲𫝊檄求救范不聽自率士卒拒之虜衆盛而范兵不敵㑹日暮令軍士各交縛兩炬三頭爇火營中星列虜遥望火多謂漢兵救至大驚待旦將退范乃令軍中蓐食晨往赴之斬首數百級虜自相轔藉死者千餘人繇此不敢復向雲中鄧訓為䕶羌校尉章帝元和中迷唐燒當羌叛訓於是賞賂諸羌種使相招誘迷唐伯父號迷吾乃將其母及種人八百户自塞外來降訓因發湟中秦胡羌兵四千人出塞掩擊迷唐於冩谷冩一作雁斬首虜六百餘人得馬牛萬餘頭迷唐乃去大小榆兩谷名也居頗巖谷衆悉破散其春復欲歸故地就田業訓乃發湟中六千人令長史任尚將之縫革為船置於箄上以渡河箄木筏也音歩惟切掩擊迷唐廬落大豪多所斬獲復追逐奔北㑹尚等夜為羌所攻於是義從羌胡并力破之斬首前後一千八百餘級獲生口二千人馬牛羊三萬餘頭一種殆盡一種謂迷唐也迷唐遂收其餘部逺徙廬落西行千餘里諸附落小種皆背叛之燒當豪帥東號稽顙歸死東號羌名餘皆欵塞納質於是綏接歸附威信大行遂罷屯兵各令歸郡唯置弛刑徒二千餘人分以屯田為貧人耕種修理城郭塢壁而已班超為西域將兵長史章帝章和元年發于闐諸國兵二萬五千人復擊莎車而龜茲王遣左將軍發温宿姑墨尉頭合五萬人救之超召將校及于闐王議曰今兵少不敵其計莫若各散去于闐從是而東長史亦於此西歸可須夜皷聲而發陰緩所得生口龜茲王聞之大喜自以萬騎於西界遮超温宿王將八千騎於東界徼于闐超知二虜已出宻召諸部勒兵鷄鳴馳赴莎車營遂大驚亂奔走追斬五千餘級大獲其馬畜財物莎車遂降龜茲等因各退散自是威震西域虞詡為懷令安帝時羌冦武都鄧太后以詡有將帥之畧遷武都太守羌乃率衆數千遮詡於陳倉崤谷詡即停軍不進而宣言上書請兵須到當發羌聞之乃分鈔傍縣詡因其兵散日夜進道兼行百餘里令吏士各作兩竈日増倍之羌不敢逼或問曰孫臏減竈而君增之兵法日行不過三十里以戒不虞而今日且二百里何也詡曰虜衆多吾兵少徐行則易為所及速進則彼所不測虜見吾竈日増必謂郡兵來迎衆多行速必憚追我孫臏見弱吾今示强勢有不同故也既到郡兵不滿三千而羌衆萬餘攻圍赤亭數十日詡乃令軍中使彊弩勿發而潛發小弩羌以為矢力弱不能至并兵急攻詡於是使二十彊弩共射一人發無不中羌大震退詡因出城奮擊多所俘殺明日悉陳其兵衆令從東郭門出北一作西郭門入貿易衣服回轉數周羌不知其數更相恐動詡計賊當退乃潛遣五百餘人於淺水設伏候其走路虜果大奔因掩擊大破之斬獲甚衆賊繇是敗散南入益州度尚桓帝時為荆州刺史既擊破長沙零陵郡賊而桂陽渠帥卜陽潘鴻等畏尚威烈徙入山谷尚窮追數百里遂入南海破其三屯多獲珍寳而陽鴻等黨衆猶盛尚欲擊之而士卒驕富莫有鬬志尚計緩之則不戰逼之必逃亡乃宣言卜陽潘鴻作賊十年習於攻守今兵寡少未易可進當須諸郡所發悉至爾乃并力攻之申令軍中恣聽射獵兵士喜悦大小皆相與從禽尚乃宻使所親宻潛焚其營珍積皆盡獵者來還莫不泣涕尚人人慰勞深自咎責因曰卜陽等財寳足富數世諸卿但不并力爾所亡少少何足介意衆聞咸憤踊尚勅令秣馬蓐食明旦徑赴賊屯陽鴻等自以深固不復設僃吏士乗鋭遂大破之朱儁為鎮賊中郎將靈帝時南陽黄巾張曼成起兵稱神上使衆數萬殺郡守禇貢屯宛下百餘日後太守秦頡擊殺曼成賊更以趙宏為帥衆寖盛遂十餘萬據宛城儁與荆州刺史徐璆及秦頡合兵萬八千圍宏自六月至八月不㧞有司奏欲徴儁司空張温上疏曰昔秦用白起燕任樂毅皆曠年厯載乃能克敵儁討潁川已有功效引師南指方畧已設臨軍易將兵家所忌宜假日月責其成功靈帝乃止儁因急擊宏斬之賊餘帥韓忠復據宛拒儁儁兵少不敵乃張圍結壘起土山以臨城内因鳴皷攻其西南賊悉衆赴之儁自將精卒五千掩其東北乗城而入忠乃退保小城惶懼乞降司馬張超及徐璆秦頡皆欲聽之儁曰兵有形同而勢異者昔秦項之際民無定主故賞附以勸來耳今海内一統唯黄巾造寇納降無以勸善討之足以懲惡今若受之更開逆意賊利則進戰鈍則乞降縱敵長寇非良計也因急攻連戰不尅儁登土山望之顧謂張超曰吾知之矣賊今外圍周固内營逼急乞降不受欲出不得所以死戰也萬人一心猶不可當況十萬乎其害甚矣不如徹圍并兵入城忠見圍解勢必自出自出則意散易破之道也既而解圍忠果出戰儁因擊大破之乘勝逐北數十里斬首萬餘級忠等遂降而秦頡積忿忠遂殺之餘衆懼不自安復以孫夏為帥還屯宛中儁急攻之夏走追至西鄂精山又破之復斬萬餘級賊遂解散皇甫嵩為北地太守時黄巾起旬日之間天下嚮應京師震動詔勑州郡修理攻守簡練器械召羣臣㑹議嵩以為宜解黨禁益出中藏錢西園廏馬以班軍士帝從之於是發天下精兵博選將帥以嵩為左中郎將持節與右中郎將朱儁共發五校三河騎士及募精勇合四萬餘人嵩儁各統一軍共討潁川黄巾儁前與賊波才戰戰敗嵩因進保長社波才引大衆圍城嵩兵少軍中皆恐乃召軍吏謂曰兵有竒變不在衆寡今賊依草結營易為風火若因夜縱燒必大驚亂吾出兵擊之四靣俱合田單之功可成也其夕遂大風嵩乃約勑軍士皆束炬乗城使鋭士閒出圍外縱火大呼城上舉燎應之嵩因皷而奔其陳賊驚亂奔走㑹帝遣騎都尉曹操將兵適至嵩操與朱儁合兵更戰大破之斬首數萬級封嵩都鄉侯嵩儁乗勝進討汝南陳國黄巾追波才於陽翟擊彭脱於西華並破之餘賊降散二郡悉平又進擊東郡黄巾卜已於倉亭生擒卜已斬首七千餘級後為左將軍靈帝中平五年梁州賊王國圍陳倉復詔嵩督前將軍董卓各率二萬人拒之卓欲速進赴陳倉嵩不聽卓曰智者不後時勇者不留決速救則城全不救則城滅全滅之勢在於此也嵩曰不然百戰百勝不如不戰而屈人之兵是以先為不可勝以待敵之可勝不可勝在我可勝在彼彼守不足我攻有餘有餘者動於九天之上不足者䧟於九地之下今陳倉雖小城守固僃非九地之䧟也王國雖彊而攻我之所不救非九天之勢也夫勢非九天攻者受害陷非九地守者不㧞國今已陷受害之地而陳倉保不㧞之城我可不煩兵動衆而取全勝之功將何救焉遂不聽王國圍陳倉自冬迄春八十餘日城堅守固竟不能㧞賊衆疲敝果自解去嵩進兵擊之卓曰不可兵法窮冦勿追歸衆勿迫今我追國是迫歸衆追窮冦也困獸猶鬭蜂蠆有毒況大衆乎嵩曰不然前吾不擊避其鋭也今而擊之待其衰也所擊疲師非歸衆也國衆且走莫有鬭志以整擊亂非窮寇也遂獨進擊之使卓為後拒連戰大破之斬首萬餘級國走而死卓大慚恨繇是忌嵩董卓為中郎將討黄巾軍敗抵罪韓遂等起涼州復為中郎將西拒遂於望垣硤北為羌胡數萬人所圍糧食乏絶卓偽欲捕魚堰其還道當所渡水為池使水停滿數十里黙從堰下過其軍而決堰比羌胡聞知追逐水已深不得渡六軍上隴西五軍敗績卓獨全衆而還公孫瓚為遼東屬國長史嘗從數十騎出行塞下見鮮卑數百騎瓚乃退入空亭中約其從者曰今不衝之則死盡矣瓚乃自持兩頭矛刃馳出衝賊殺傷數十人瓚左右亦亡其半遂得免鮮卑懲艾後不敢復入塞陳登為廣陵太守甚得江淮間歡心於是有吞滅江南之志孫策遣攻登於匡琦城策初到旌甲覆水羣下咸以今賊衆十倍於郡恐不能抗可引軍避之與其空城水人居陸不能久處必尋引去登厲聲曰吾受國命來鎭此土昔馬文淵之在斯位能南平百越北滅羣狄吾既不能遏除凶慝何逃寇之為邪吾其出命以報國仗義以整亂天道與順克之必矣乃閉門自守示弱不與戰將士銜聲寂若無人登乗城望形勢知其可擊乃申令將士宿整兵器昧爽開南門引軍指賊營步騎鈔其後賊周章方結陣不得還船登手執軍鼓縱兵乗之賊遂大破皆棄船并走登乗勝追奔斬虜以萬數册府元龜卷三百六十一
