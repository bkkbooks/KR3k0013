body:
  text: 冊府元龜卷二百九十宋王欽若等撰宗室部立功順陽懷侯嘉光武族兄義兵起嘉隨更始征伐為偏将軍及攻破宛封興徳侯遷大将軍擊延岑於冠軍降之更始都長安封漢中王安成侯賜光武族兄自伯升起兵賜乃隨従攻擊諸縣更始既立以賜為光禄勲及伯升被害代為大司徒加丞相更始都長安封賜為宛王拜前大司馬使持節鎮撫闗東建武初聞光武即位乃詣雒陽成武侯順光武族兄建武八年使擊破六安賊因拜為六安太守陳王寵明帝子陳敬王之孫中平中黄巾賊起郡縣皆棄城走寵善弩射十發十中中皆同處寵射其秘法以天覆地載参連為竒又有三微三小三微為經三小為緯經緯相将萬勝之方然要在機牙寵有彊弩數千張出軍都亭置軍營於國之都亭國人素聞王善射不敢反叛故陳獨得完百姓歸之者衆十餘萬人魏任城王彰太祖子漢末封鄢陵侯建安二十三年代郡烏九反以彰為北中郎将行驍騎将軍討之彰北征入涿郡界叛胡數千騎卒至時兵馬未集唯有步卒千人騎數百匹用田豫計固守要隙虜乃退散彰追之身自摶戰射胡騎應弦而倒者前後相屬戰過半日彰鎧中數箭意氣益厲乘勝逐北至桑乾去代二百餘里長史諸将皆以為新涉逺士馬疲頓乂受節度不得過代不可深進違令輕敵彰曰率師而行唯利所在何節度乎胡走未逺追之必破従令縱敵非良将也遂上馬令軍中後出者斬一日一夜與虜相及擊大破之斬首獲生以千數彰乃倍常科大賜将士将士無不悦喜時鮮卑大人軻比能将數萬騎觀望彊弱見彰力戰所向皆破乃請服北方悉平陳侯仁太祖従弟從太祖為别部司馬行厲鋒校尉太祖之破袁術仁所斬獲頗多從征徐州仁嘗督騎為軍前鋒别攻陶謙将吕繇破之還與大軍合彭城大破謙軍從攻費華即墨開陽謙遣别将救諸縣仁以騎擊破之太祖征吕布仁别攻句陽㧞之生獲布将劉何太祖平黄巾迎天子都許仁數有功拜廣陽太守後太祖征張繡仁别徇旁縣率厲将士甚奮太祖壮之遂破繡太祖與袁紹久相持於官渡紹遣先主徇諸縣太祖使仁将騎擊先主破走之盡復收諸叛縣而還紹遣别将韓荀鈔斷西道仁擊荀於雞雒山大破之太祖討馬超以仁行安西將軍督諸将拒潼闗破超渭南蘇伯田銀反以仁行驍騎將軍都督七軍討銀等破之復以仁行征南将軍假節屯樊鎮荆州侯音以宛叛畧傍縣衆數千人仁率諸軍攻破音斬其首高陵侯純初以議郎參司空軍事督虎豹騎從太祖圍南皮純麾下騎斬袁譚及北征二郡純部騎獲單于蹹頓従征荆州追先主於長坂獲其二女輜重收其散卒進降江陵樂城侯洪太祖従弟太祖征徐州張邈舉兖州叛迎吕布時大饑荒洪将兵在前先據東平范聚糧穀以繼軍太祖討邈布於濮陽布破走遂據東阿轉擊濟陰山陽中牟陽武京宻十餘縣皆拔之以前後功拜鷹揚校尉遷陽武中郎将别征劉表别将於舞陽葉堵陽博望有功遷厲鋒将軍長平侯休太祖族子漢末從曹洪擊蜀将吳蘭於下辯大破之文帝初以休為鎮南将軍都督諸軍事孫權遣将屯厯陽休到擊破之又别遣兵渡江燒賊蕪湖營數千家遷征東将軍領揚州刺史帝征孫權休為征東大将軍假黄鉞督張遼等及諸州郡二十餘軍擊權大将吕範等於洞浦破之拜揚州牧明帝時吳将審惪屯皖休擊破之斬惪首吳将韓綜翟丹等前後率衆詣休降遷大司馬都督揚州如故邵陵侯真太祖族子漢末太祖使将虎豹騎討靈丘賊拔之又以偏将軍擊蜀将於下辯破之又為征蜀䕶軍督徐晃等破蜀将髙詳於陽平文帝即位以真為鎮西将軍假節都督雍梁諸軍事張進等反於酒泉真遣費耀討破之斬進等黄初三年為上軍大将軍假節與夏侯尚等征吳擊牛渚屯破之明帝即位遷大将軍蜀将諸葛亮圍祁山南安天水安定三郡應亮帝遣真督諸軍郿遣張郃擊亮将馬謖破之安定民楊條等畧吏民保月支城真進擊之條謂其衆曰大将軍自來吾願早降耳遂自縛出三郡皆平吳奮威将軍瑜堅弟静之子漢建安九年為丹陽太守與周瑜等共討麻保二屯破之後屯溧陽徙屯牛渚瑜以水安人饒助為襄安長無錫人顔連為居巢長使招納廬江二郡各得降附瑜弟皎漢建安中為䕶軍校尉領衆二千餘人是時曹公數出濡須皎每赴拒號為精鋭後襲南郡權以吕蒙為大都督皎為後繼定荆州皎有力焉皎弟沙羡侯奐建安末代皎統其衆領江夏太守黄武五年大帝攻石陽奐以地主使所部将軍鮮于丹帥五千人先斷淮道自帥呉碩張梁五千人為軍前鋒降高城得三将拜揚威将軍輔堅之兄子以揚武校尉佐長沙桓王䇿平三郡䇿討丹陽七縣使輔西屯厯陽以拒袁術并招誘餘民鳩合遺散乂従䇿討陵陽生得祖郎䇿西襲廬江太守劉勲輔隨従身先士卒有功䇿以輔為廬陵太守桓堅族子河之子年二十五拜安東中郎将與陸遜共拒先主先主軍衆甚盛彌山盈谷桓投刀奮命與遜戮力先主敗走桓斬上兜道截其徑要先主踰山越險僅乃得免先主恚歎曰吾昔初至京城桓尚小兒而今迫孤乃至此桓以功拜建武将軍封丹徒侯晉琅邪王伷泰始中為鎮東大将軍平吳之役率衆數萬出涂中孫皓奉箋送璽綬詣伷請降詔曰琅邪王伷督率所統連據涂中使賊不得相救又使琅邪相劉𢎞等進軍逼江賊震懼遣使奉偽璽綬又使長史王恒率諸軍渡江破賊邉守獲督蔡機斬首降附五六萬計諸葛靚孫奕等皆歸命請死功勲茂著其封子二人為亭侯各三千戸賜絹六十疋汝隂王駿為鎮西将軍都督雍凉等州咸寧初羌虜樹機能等叛駿遣衆討之斬三千餘級進位征西大将軍又紹駿遣七千人代凉州守兵樹機能侯彈勃等欲先刼伷兵駿命平虜䕶軍文俶督凉秦雍諸軍各進屯以威之機能乃遣所領二十部及彈勃面縳軍門各遣入質子安定北地金城諸胡吉軻羅侯金多及北虜熱冏等二萬口又来降淮陵王漼初封廣陵公為散騎常侍趙王倫之簒也三王起義漼與左衛将軍王輿攻殺孫秀因而廢倫以功進封為王東海王越懷帝永嘉三年九月丙寅劉聰圍浚儀遣平北将軍曹武討之丁丑王師敗績越入保京城聰至西明門越禦之戰於宣陽門外大破之南頓王宗初封南頓公討劉喬有功進封王增邑五千并前萬户譙王尚之初為會稽王道子驃騎諮議與弟允之並居列職兖州刺史王恭忌其盛也與豫州刺史庾楷並稱兵以討尚之為名南連荆州刺史殷仲堪南郡公桓𤣥等道子命前将軍王珣右将軍謝琰討恭尚之拒楷允之與楷子鴻戰於當利鴻敗走斬楷将段方楷單馬奔桓𤣥道子以尚之為建威将軍豫州刺史假節一依楷故事宋長沙景王道憐晉末為建威将軍南彭城内史時北青州刺史劉該反引魏人為援清河陽平二郡太守孫全聚衆應之義熙元年後魏遣豫州刺史索度眞大将軍斛蘭冦徐州攻相縣執鉅鹿太守賀申進圍寧朔将軍羊穆之於彭城穆之告急道憐率衆救之軍次陵栅斬全進至彭城眞蘭退走道憐率龍驤将軍孔隆及穆之等追真蘭走奔相城又追躡至光水溝斬劉該魏衆見殺乃赴水死畧盡以破索度真功封新渝縣男食邑五百户従髙祖征廣固嘗為軍鋒及城陷慕容超将親兵突圍走道憐所部獲之以廣固功改封竟陵縣公食邑千戸臨川烈武王道規髙祖少弟少倜儻有大志髙祖奇之與謀桓𤣥時桓𢎞鎮廣陵以為征虜中兵參軍髙祖尅京城道規以其日與劉毅孟昶共斬𢎞收衆濟江進平京邑𤣥敗走晉大将軍武陵王遵承制以道規為振武将軍義昌太守與劉毅何無忌追桓𤣥遇𤣥於峥嶸洲大敗𤣥軍𤣥與郭鈐單舸走江陵不復能守欲入蜀為馮遷所斬義軍遇風不進桓謙桓振復據江陵毅留巴陵道規與無忌俱進攻桓謐於馬頭桓蔚於寵洲皆破之復進軍夏口偽鎮軍将軍馮該戍夏口東岸楊武将軍孟山圖據魯城輔國将軍桓仙客守偃月壘於是毅攻魯城道規無忌攻偃月並克之生禽仙客山圖其夕該遁走進平巴陵道規留夏口進號輔國将軍督淮北諸軍事并州刺史義昌太守如故時荆州湘江豫猶多桓氏餘燼往往屯結復以本官進督江州之武昌荆州之江夏隨郡義陽綏安豫州之西陽汝南潁川新蔡九郡諸軍事隨宜翦撲皆悉平之竟陵王誕為揚州刺史孝武帝孝建初南郡王義宣舉兵反有荆州江兖豫四州之力勢震天下孝武即位日淺朝野大懼帝加誕節仗士五千人出入六門上流平定誕之力也始安王休仁明帝即位為揚州刺史會諸方逆命休仁都督征討諸軍事增班劍三十人出據虎檻進據赭圻尋領太子太傅總統諸軍隨宜應接泰始二年拜司徒休仁率衆軍大破賊斬偽尚書侯射袁覬進討江郢荆雍湘五州平定之巴陵王休若泰始二年為鎮軍将軍時方反叛休若進號衛将軍雍州刺史率諸軍破賊於吳興會稽平定三郡同迹皆伏誅三年薛安都子伯令畧據雍州四郡休若討斬之晉熙王爕廢帝元徽二年為征虜将軍郢州刺史時江州刺史桂陽王休範反爕遣中兵叅軍馮景祖襲尋陽休範中兵叅軍毛惠等居守開門降爕進號安西将軍督江州諸軍事南齊豫章文獻王嶷宋建元元年為都督揚南徐二州諸軍事驃騎大将軍二年春魏軍冦司豫二州南蠻司馬崔慧景北討又分遣中兵叅軍蕭惠朗援司州屯西闗魏軍濟淮攻壽春分騎當出隋鄧衆以為憂嶷曰魏入春夏非動衆時令豫司强守遏其津要彼見堅嚴自當潰散必不敢越二鎮而南也是時纂嚴嶷以荆州隣接蠻蜑慮其生心令鎮内皆緩服既而魏軍竟不出樊鄧於壽春敗走尋給班劍二十人梁長沙王懿齊永明季授持節都督梁南北秦沙四州諸軍事加冠軍将軍是嵗魏人入漢中遂圍南鄭懿隨機拒擊傷殺甚多乃解圍遁去懿又遣氐帥楊元秀攻魏厯城臯蘭駱谷仇池等六戍尅之魏人震懼邉境遂寧永元元年裴叔業據豫州反授持節征虜将軍督豫州諸軍事討叔業叔業懼降於魏既而平西将軍崔慧景入冦京邑奉江夏王寶𤣥圍臺城齊室大亂詔徵懿懿時方食投箸而起率鋭卒三千人援城慧景遣其子覺来拒懿奔擊大破之覺單騎走乘勝而進慧景衆潰追斬之遷尚書令都督征討水陸諸軍事持節将軍如故懿子西昌侯藻天監元年為持節都督益寧二州諸軍事冠軍将軍益州刺史時天下草創邊徼未安州民焦僧䕶聚數萬據郫樊作亂藻年未弱冠集僚佐議欲自擊之或陳不可藻大怒斬于階下乃乘平肩輿巡行賊壘賊聚弓亂射矢下如雨從者舉楯禦箭又命除之繇是人心大安賊乃夜遁藻命騎追之斬首數千級遂平之始興忠武王憺齊末為給事黄門侍郎巴東太守蕭慧訓子璝及巴西太守魯休烈舉兵逼荆州屯軍上明鎮軍蕭潁胄暴疾卒西朝甚懼尚書僕射夏侯詳議徵兵雍州南平王偉遣憺赴之憺以書喻璝等旬日皆請降吳平侯景為寧蠻校尉雍州刺史魏元志率衆七萬冦潺溝驅迫羣蠻蠻悉渡水來降因命司馬朱思逺寧蠻長史曹義宗中兵叅軍孟惠雋擊志於潺溝大破之生禽志長史杜景斬首萬餘級流屍葢漢水南郡王大連太清元年為使持節輕車将軍東揚州刺史三年會稽山賊田領羣聚黨數萬来攻大連命中兵叅軍張彪擊斬之陳遂興侯詳髙祖疎屬也髙祖東征杜龕詳别下安吉原鄉故彰三縣龕平以功授散騎侍郎假節雄信将軍青州刺史後魏上谷公紇羅初從道武自獨孤如賀蘭部與弟建勸賀蘭納推道武為主及道武即帝位以援立功與建同日賜爵為公武陵侯因從道武平中原以功封曲逆侯太武時改封曲陽侯素延以小統從道武征討諸部初定并州為刺史道武之驚於柏肆也道武征慕容寳軍于鉅鹿之柏肆塢其夜寳悉衆犯營帝驚而起并州守將封寳真為逆素延斬之吉陽男比干以司衛監討白澗丁零有功平陽王真樂髙涼王孤孫也頻有戰功樂成侯謂烈帝子與其子烏真俱隨道武征討屢有戰功東陽王丕子雋邕並有軍功雋封新安縣男邕封涇縣男秦明王翰昭成子年十五便請征伐昭成壯之使領騎二千長統兵號令嚴信多有尅獲翰子衛王儀登國初破諸部有謀戰功皇始二年十月遣儀將三萬騎攻慕容徳於鄴大興元年正月慕容徳走保滑臺儀克鄴收其倉庫詔賞將士各有差常山王遵道武初慕容寳之敗别率騎七萬邀其歸路繇是有參合之㨗及平中山拜尚書左僕射加侍中領渤海之合口及博陵渤海羣盗起遵討平之陳留王䖍登國初與衛王儀破黜弗部後衛辰慕容寳来㓂䖍絶其左翼寳敗䖍弟崇為并州刺史從道武討蠕蠕别督諸軍出大澤越涿耶山威懾漠北永昌王健所在征戰常有大功從太武破赫連昌遂西畧至木根山討和龍健别攻拔建徳後平叛胡白龍餘黨於西河帝襲蠕蠕越涿邪山詔健殿後矢不虚發所中皆應弦而斃威震漠北又從征平涼州健功居多又討破秃髪保周自殺𫝊首京師淮南王佗太武之討胡白龍於西河屠其城佗别破餘黨斬首數千級後與武昌王提率并州諸軍討吐京叛胡曹僕渾於河西平之拜使持節前鋒大將軍督諸軍北討蠕蠕破之後劉義隆遣將㓂邊佗從征於懸瓠破之拜使持節都督雍秦二州諸軍事鎮西大將軍武昌王提太武時為使持節鎮東大將軍平原鎮都大將軍提子平原襲封爵獻文時蠕蠕犯塞從駕擊之平原戰功居多為鎮南大將軍齊州刺史孝文時妖賊司馬小君自稱晉後聚黨三千餘人屯聚平陵年號聖君攻破郡縣殺害長吏平原身自討擊殺七人擒小君送京師斬之又有妖人劉舉自稱天子扇惑百姓復討斬之晉王伏羅為車騎大將軍督高平涼州諸軍討吐谷渾慕利延吐谷渾慕利延軍至樂都遂間道行至大母橋慕利延衆驚奔白蘭慕利延子拾寅走阿曲斬首五千餘級降其一萬餘落河間公齊從太武征赫連昌帝馬蹶賊逼帝齊以身蔽捍決死力戰賊乃退帝得上馬是日微齊帝㡬至危殆帝以微服入其城齊固諫不許乃與數人從帝入城内既覺諸門悉閉帝及齊等因入其宫中得婦人裙繫之槊上帝乘而上因此得拔齊有力焉賜爵浮陽侯從征和龍以功拜尚書進爵為公後坐事免官爵守將裴方明䧟仇池太武復授齊前將軍與建興公古弼討之遂尅仇池威振羌氐復賜爵河間公與武都王楊保宗對鎮駱谷保宗弟文徳説保宗閉險自固有期矣秦州主簿邊固知之密告齊晨詣保宗呼曰古弼至欲宣詔保宗出齊叱左右扶保宗上馬馳驛送臺諸氐遂推文徳為主求授於宋宋遣將房亮之苻昭啖龍等率衆助文徳齊擊斬殺龍擒亮之氐遂平以功拜内都大官臨淮王譚太武南討為中軍大將軍初宋文帝以鄒山險固乃積糧為守禦之備譚率衆攻之獲米三十萬以供軍儲宋人恃淮之阻素不設備造筏數十潜軍而濟賊衆驚潰斬其將胡崇及賊首萬餘級陽平王新成長子頥為懐朔鎮大將都督三道諸軍北討詔徴赴京朂以戰伐之事對曰當仰仗廟筭使呼韓同渭橋之禮帝曰壯哉王言朕所望也乃與陸叡集諸將議軍途所詣於是中道出黒山東道趣士盧河西道向侯延河軍過大磧大破蠕蠕頥入朝詔曰王之前言果不虚也濟隂王小新成子麗為宗正右衛將軍時秦州屠各王法智推州主簿吕茍兒為主號建明元年置立百官攻逼州郡涇州人陳瞻亦聚衆自稱王號聖明元年以麗為使持節都督與别駕楊椿討之茍兒率衆十餘萬屯孤山别據諸險圍逼州城麗出擊大破之便進軍永雒賊徒逆戰麗夜擊走之行秦州事李韶乘勝追掩茍兒遂率其衆三千餘人降麗上黨王長孫觀獻文時以征西大將軍假司空督河西七鎮諸軍討吐谷渾部帥拾寅遁藏焚其所居城邑而還孝文初拜殿中尚書侍郎吐谷渾又侵逼復假觀司空討除之任城王雲獻文時蠕蠕犯塞雲為中軍大都督從獻文討之遇於大磧及仇池氐反雲為征西大將軍討平之雲子澄為征北大將軍孝文時蠕蠕犯塞加澄使持節都督北討諸軍事以討之蠕蠕遁走後為揚州刺史時梁將張囂之冦夷陵戍澄遣輔國將軍成興步騎赴討大破之復夷陵囂之遁走又遣長風戍主竒道顯攻梁隂山戍破之斬其戍主龍驤將軍都亭侯梅興祖仍引攻白槀戍又破之斬其寧朔將軍闗内侯吳道爽澄表請南伐詔發二萬人馬千五百匹并壽陽先兵三萬委澄經畧乃遣綂軍傅竪眼王神念等進次大峴東闗九山淮陵皆分部諸將倍道據之總勒大衆駱驛相接而神念尅其開惡潁川二城斬梁軍主費尼而寧朔將軍韋惠龍驤將軍李伯繇仍固大峴澄遣綂軍黨法宗傅竪眼等進軍尅之遂圍白塔牽城數日之間便即逃潰梁清溪戍望風散走梁徐州刺史司馬明素率衆三千欲援九山徐州長史潘伯隣規固淮陵寧朔將軍王爕負險焦城法宗進克焦城破淮陵擒明素斬伯隣其濟隂太守王厚强廬江太守裴遂即亦奔退詔曰將軍文徳内昭武功外暢奮揚大畧將蕩江吳長旌始舒賊徒懾氣熊旅方馳東闗席卷想江湖弭波在旦夕耳所送首虜並已聞之澄弟嵩宣武時為安南將軍揚州刺史梁湘州刺史楊公則率衆二萬屯軍雒口姜慶真領軍五千據於首陂又遣其左軍將軍騫小眼軍主何天祚張俊興等率衆七千攻圍陸城嵩遣綂軍封邁王㑹等步騎八千討之邁達陸城賊皆夜遁追擊破之斬獲數千公則慶真退還馬頭梁徐州刺史昌義之屯據高皇遣三軍潜冦隂陵以淮水淺竭不通船艦屯於馬頭梁將田道龍何景先等領卒三千已至衡山規冦陸城並克逼嵩遣兼綂軍李叔仁等援合肥小峴楊石頻戰破之梁征虜將軍趙革頓於黄口嵩遣軍司趙熾等往討之先遣統軍安伯醜潜師夜渡㐲兵下蔡革率卒四千逆來拒戰伯醜與下蔡戍主王虎等前後夾擊大敗之俘斬溺死四千餘人綂軍李叔仁等夜襲硤石又破之梁将姜慶真専據肥汭冠軍将軍曹天寳屯於雞口軍主尹明世屯東硤石嵩遣别將羊𢎞次於淮西去賊營十里司馬趙熾率兵一萬為表裏聲勢衆軍既㑹分擊賊之四壘四壘之賊戰敗奔走斬獲數千溺死萬數綂軍牛敬賓攻硤石明世宵遁慶真合餘燼浮淮下下蔡戍主王畧截流擊之俘斬大半於是威名大振江陽王繼孝文時為安北将軍留守雒京時髙車酋帥樹者擁部民反叛詔繼都督北討諸軍事繼推檢斬諐首一人餘加慰諭於是叛徒歸順北海王顥為徐州刺史撫軍将軍免其後賊帥宿勤明達叱干騏驎等冦亂豳華諸州乃復顥王爵以本将軍使持節征西将軍都督華豳東秦諸軍事兼左僕射西道行臺以討明達顥轉戰而前頻破賊衆解豳華之圍以功增封八百戸進號征西将軍彭城王勰從孝文征沔北為使持節都督南征諸軍事中軍大將軍開府又詔曰明便交敵可勅将士肅爾軍儀勰於時親勒大衆至明大破齊將崔慧景等車駕還京會百寮於宣極堂行飲至䇿勲之禮命舍人宣旨勰翼弼六師纂戎荆楚沔北之勲每毗廟算從征新野有尅城之謀受命鄧城致大㨗之効功為羣将之最也别當授賞不替厥庸以破慧景等勲増色五百戸宣武時為司徒領揚州刺史揚州所統建安戍主胡景畧猶為寳卷拒守不下勰水陸討之景畧面縛出降自勰之至壽春東定城戍至於陽石西降建安山蠻順命斬首獲生以數萬計進位大司馬領司徒增邑八百戸又寳卷遣将陳伯之屯於肥口胡松又據梁城水軍相繼二百餘思勰部分將士分攻諸營伯之胡松率衆出戰諸将擊之斬首九千俘獲一萬伯之等僅以身免屯於烽火勰又分命諸將頻戰伯之計窮宵遁淮南平詔曰王戚尊上輔徳勲莫二孤心昧識訓保攸憑比以壽春初開封疆任重故令王親董元戎逺撫淮外冐兹炎蒸衡葢飄颻經畧踰時必有虧損淹違詔覿夙夜繫情制勝宣規威效兼著公私允稱義所欽嘉雖凱旋有期無申延屬可遣給事黄門侍郎鄭道昭就彼祗勞徴勰還朝中山王英孝文南伐英為梁漢别道都将後大駕臨鍾離詔英率衆備冦境上英以未暇西救漢中有可乗之㑹表求進討孝文許之師次沮水齊將蕭懿遣將尹紹祖梁季羣等領衆二萬之徼山立栅分為數處居髙視下隔水為營英謀曰彼帥賤民慢莫能相服若選精卒并攻一營彼不相救我尅必矣若尅一軍四營自拔於是簡兵三面騰上果不相救既破一處四面俱潰生擒梁季羣斬三千餘級俘七百人齊白馬戍将其夜逃潰乗勝長驅漢川之民相率歸附宣武即位詔英持節假鎮南將軍都督征義陽諸軍事率衆南討梁武司州刺史蔡道恭聞英將至遣其驍騎将軍楊繇率城外民三千餘家於城西南十里賢首山即嶺為三栅作表裏之勢英勒諸軍圍賢首壘焚其栅門楊繇驅水牛從營而出繼之以兵軍人避牛師遂退下尋分兵圍守其夜栅民任馬駒斬繇以降民皆安堵梁平西將軍曹景宗後將軍王僧炳等率步騎三萬來救義陽僧炳綂衆二萬據鑿峴景宗率一萬繼後英遣冠軍將軍元逞楊烈將軍曹文敬進據樊城抗之英部勒将士犄角討之大破僧炳軍俘斬四千餘人英又於士雅山結壘與景宗相抗分遣諸綂㐲於四山示之以弱梁將馬仙琕率萬餘來掩英營英命諸軍偽北誘之既至平地綂軍傅永等三軍擊之梁軍便奔退進擊潰之斬首二千三百級斬其羽林監軍鄧終年仙琕又率一萬人重來決戰英勒諸將隨便分擊又破之復斬梁将陳秀之統軍王買奴别破東嶺之陣斬首五百道恭憂死驍騎将軍行州事蔡靈恩後馮窮城短兵日接景宗仙琕知城将拔盡鋭決戰一日三交皆大敗而返靈恩勢窘遂降三闗戍聞之亦棄城而走梁又遣將冦肥梁詔英使持節加散騎常侍征南将軍都督揚徐二道諸軍事率衆十萬討之所在皆以便宜從事英擊破隂陵斬梁将二十五人及虜首五千餘級及頻破賊軍於梁城斬其支将四十二人殺獲及溺死者將五萬梁中軍大將軍臨川王蕭宏尚書左僕射栁惔等大將五人沿淮南走凡收米三十萬石英追至馬頭梁馬頭戍主委城遁走郢州治中督榮祖潜引梁軍以義陽應之三闗之戍並據城降梁郢州刺史婁悦嬰城自守懸瓠城民白早生等殺豫州刺史司馬悦據城南叛梁將齊茍仁率衆守懸瓠悦子尚華陽公主并為所刼又詔英使持節都督南征諸軍事假征南將軍出自汝南宣武以荆蠻平破早生詔英南赴義陽英輙與荆蠻分兵攻懸瓠尅之乃引軍而進初茍仁之據懸瓠梁寧朔將軍張道凝等率衆據楚城聞英將至棄城南走英追擊斬道凝及梁虎賁中郎曹苦生盡俘其衆既次義陽將取三闗英䇿之曰三闗相須如左右手若尅一闗兩闗不待攻而定攻難不如攻易東闗易攻宜須先取即黄石公所謂戰如風發攻如河決英恐其并力於東乃使長史李華率五統向西闗分其兵勢身督諸軍向東闗英至長薄梁將馬廣夜遁入於武陽英進師攻之梁遣其冠軍將軍彭瓫生驃騎將軍徐超秀援武陽英乃緩軍曰縱之使入此城吾先曽觀其形勢易攻耳吾取之如拾遺也諸軍未之信瓫生等既入武陽英促圍攻之六日而廣等降於是進擊黄峴梁太子左衛李元履棄城奔竄又討西闗梁司州刺史馬仙琕亦即退走果如英䇿凡擒獲其大將十人支將二十人卒七千米四十萬石軍資稱之安定王休為外都大官時蠕蠕犯塞出為使持節征北大將軍撫㝠鎮大将休身先将士擊虜退之髙陽王雍孫端為鎮軍將軍兖州刺史時梁將復㓂徐兖圍逼州城端率文武拒守以功封安徳縣開國公食邑五百戸章武王融宣帝時為驍騎將軍梁将㓂逼淮陽梁城䧟沒詔融假節征虜将軍别将南討大摧賊衆還梁城安豐王猛子延明孝明時為尚書右僕射及元法僧反詔為東道行臺徐州大都督節度諸軍事與都督臨淮王彧尚書李憲等討法僧梁遣其豫章王綜鎮徐州延明先收徐方甚得人譽招懐舊土逺近歸之綜既降延明因以軍乘之復東南之境至宿豫而還册府元龜卷二百九十
