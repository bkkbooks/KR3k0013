body:
  text: 冊府元龜卷六百四十一宋王欽若等撰貢舉部條制第三唐文宗太和元年七月勅今年權於東都置舉其明經進士任使東都赴集其上都國子監舉人合在上都試及節目未盡者委條流聞奏八月禮部貢院奏東都置舉條件其上都國子監宗正寺鴻臚寺舉人並請待東都考試畢却廻就上都考試從之十月中書門下奏應禮部諸色科目選人等凡未有出身未有官如有文學只合於禮部應舉有出身有官合於吏部赴科目選近年以來格文差互多有白身及用散試官并稱鄉貢者並赴科目選及注擬之時即妄論資次曽無格例有司不知所守其宏詞㧞萃學䆒一經則有定制然亦請不在用散試官限其三禮三傳一史三史明習律令等如白身並令國子監及州府同明經一史三禮三傳同進士三史當年關送吏部便授第二任官如有出身及有正員官夲是吏部常選人則任於吏部不限選數應科目選三史則超一資授官如制舉人既諸色人中皆得選試則無出身官人並可亦請不用散試官從之是月京兆府鄉貢明經孫延嗣等三百人進狀舉大厯六年七年例請同國子監生上都考試許之二年十二月禮部貢院奏五經明經舉人試義請准元和十四年十一月四日勅以墨義代口義許之三年八月禮部奏進士舉人先試帖經并畧問大義取經義精通者次試議論各一首文理髙者便與及第其所試詩賦並停者伏請帖大經各十帖通五通六為及格所問大義便於習大經内准格明經例問十條仍對衆試口義伏惟新制進士畧問大義縁初釐革今且以通三通四為格明年以後並依明經例其所試議論請各限五百字以上成勅㫖依奏四年十月中書門下奏應開元禮學䆒一經三禮三史明習律令科人等准太和元年十月二十三日勅散試官及白身人並於禮部考試其有出身及有官人並吏部科目選者凡是科目本合在吏部試自分兩處考試每處皆别與人數轉多事理非便臣等商量坐准前吏部收試其諸節目並准太和元年十月二十三日勅處分從之七年八月制公卿士族子弟明年已後不先入國學習業不在應明經進士之限其進士舉宜先試帖經并畧問大義取經義精通者次試議論各一道文理髙者便與及第所試詩賦並停其試帖官便以國子監學官充禮部不得别更奏請𢎞文崇文兩舘生齋郎並依令試經畢仍差都省郎官兩人覆試須責保任不得輙許替代八年正月禮部奏明經𢎞文崇文舘生太廟郊神齋郎掌坐等共五百五十二人今六色共請減一百三十八人從之是月禮部侍郎李漢奏准太和七年八月勅貢舉人不要試詩賦䇿且先帖大經小經共二十帖次對正義十道次試議論各一首訖考覈放及第是月中書門下奏進士放榜舊例禮部侍郎皆將及第人名先呈宰相然後放榜伏以委在有司固宜精慎宰臣先知取捨事匪至公今年已後請便令放榜不用先呈人名其及第人所試雜文及鄉貢三代名諱並當日送中書門下便令定例勅㫖依奏八月詔罷諸色選舉以嵗旱故也九月勅吏部禮部兵部今年選舉並緣秋末蟲旱相因恐致災荒權令停罷及歛蔵之後物力且任念彼求名之人必懐觖望之念寕違我令以慰其心宜依常例却置應緣所納文狀及銓試等期限仍准今年格文逓延一月十月禮部奏進士舉人自國初以來試詩賦帖經時務䇿五道中間或蹔改更旋即仍舊葢以成法可守所取得人故也去年八月節文先試帖經口義論議等以臣商量取其折𠂻伏請先試帖經通數依新格處分時務䇿五道其中三道問經義兩道時務其餘並請准太和六年以前格處分勅㫖依奏九年十二月中書門下奏今月九日閤内面奉進止今條流進士人數及諸色人等進士元格不得過二十五人今請加至四十人明經元格不得過一百一十人今請減十人伏以國家取士逺法前代進士之科得人為盛然於入世湏更指撝必使練逹固在經厯起來年進士及第後三年任選委吏部依資盡補州府叅軍𦂳縣簿尉官滿之後來年許選三考後聽諸使府奏用便入恊律郎四衛佐未滿三考不在奏改限如任江淮官特與勉其綱使又聞每年貢士常僅千人據格所取其數絶少強學待用常年不試孤貞介士老而無成甚可惜之臣等商量望付所司精求行藝起來年添滿四十人及第仍委禮部於所試諸色貢舉人元格數内共減一十五人都守每年放出身黄衣人數永為定制編入常格庶令才人速得自効經於下位以致上逹可之開成元年正月詔文武之道合而兼濟勲臣子弟有能修詞務學應進士明經及通諸科者委有司先加奬引自其年至二年三年並髙鍇知貢舉每年皆恩賜題目及第並四十人二年五月禮部奏請每年進士以三十人為限從之十二月勅諸道應薦萬言童子等朝廷設科取士門目至多有官者合詣吏曺未仕者即歸禮部此外更或延引則為冗長起今後不得更有聞薦俾繇正路兾絶倖門雖有是命而以童子為薦者比比有之四年十月勅每年明經及第宜更與十人武宗㑹昌三年正月勅禮部所放進士及第人數目今後但據才堪者即與不要限人數每年止於十人五人總得是月宰臣李徳裕等奏舊例進士未放榜前禮部侍郎遍到宰相私第先呈及第人名謂之呈榜比聞多有改換頗致流言宰相稍有寄情有司固無畏忌取士之濫莫不繇斯將務責成在於不撓既無取舍豈必預知臣等商量今年便任有司放榜更不得先呈臣等仍向後便為定例如有固違御史紏舉奏者其時有勅重試進士因栖靈塔災且止四年二月權知貢舉左僕射判太常卿王起下及第二十五人續奏五人堪放及第楊知至竇緘楊嚴鄭朴源重奉勅只放楊嚴及第餘並落下王起頃年知貢舉每貢院考試訖上榜後更呈宰相取可否復人數不多宰相延英論言主司試藝不合取宰相與奪比来貢舉艱難放人絶少恐非引誘之道帝曰有司不㑹我意不放子弟即太過無論子弟寒門但取實藝耳李徳裕對曰鄭肅封敖冇好子弟不敢應舉帝曰我比聞楊虞卿兄弟朋比貴勢妨平進之路昨楊知至鄭朴之徒並令落下抑其太甚耳徳裕曰臣無名第不合言進士之非然臣祖天寳末以仕進無他岐勉強随計一舉登第自後家不置文選盖惡其祖尚浮華不根藝實然朝廷顯官湏是公卿子弟何者因小便習舉業目熟朝廷間事䑓閤儀範班行准則不教而自成寒士縱有出人之才登第之後始得一班一級固不能習熟也則子弟成名不可輕矣十月中書門下奏朝廷設文學之科以求髦俊臺閣清選莫不繇兹近緣覈實不在於鄉閭趨名頗雜於非類致有䟦扈之地情計交通將澄化源在舉明憲臣等商量今日以後舉人於禮部納家狀後望依前三人自相保其衣冠則以親姻故舊久同遊處其有江湖之士則以封壤接近素所諳知者為保如有缺孝弟之行資朋黨之勢跡繇邪徑言渉多端者並不在就仕之限如容情故自相隠蔽有人紏舉其同保人並三年不得赴舉仍委禮部明為戒勵編入舉格從之五年三月中書門下奏貢舉人並不許於兩府取解仰於兩都國子監就試宣宗大中元年正月禮部侍郎魏扶放及第二十三人續奏堪放及第三人封彦卿崔琢鄭延休等皆以文藝為衆所知其父皆在重任不敢選取其所試詩賦並封進奏進止令翰林學士户部侍郎知制誥韋琮等考盡合程度其月二十五日奉進止并赴所司放及第有司考試只合在公如渉狥私自有刑典從今以後但依常例取捨不得别有奏聞是月勅自今放進士榜後杏園任依舊晏集所司不得禁制六月中書門下奏貢舉人取解宜准舊條於京兆府河南府集試從之十年四月禮部侍郎鄭顥進諸家科目記十三卷勅付翰林自今放牓後仰冩及第人姓名及所試詩賦題目進入内仍付所司逐年編次五月中書門下奏據禮部貢院見置科目内開元禮三禮三傳三史學䆒道舉明筭明法童子等九科近年取人頗濫曽無實藝可採徒添入仕之門湏議條流俾精事業臣等己於延英面論伏奉聖㫖將文字來者其前件九科臣等商量望起大中十年權停三年滿後至時赴試者令有司據所與人先進名令中書舍人重覆問過如有夲業精通堪備朝廷顧問即作等第進名候勅處分如事業荒蕪不合送名數者考官當議朝責其童子近日諸道所薦送者多年齒已過偽稱童子考其所業又是常流起今以後望令天下州府薦送童子並湏實年十一十二以下仍湏精熟一經問全通兼自能書寫者如違制條夲道長吏亦議懲罰從之十二年三月中書舍人李潘知舉放博學宏辭科陳琬等三人及進詩賦論等召潘謂曰所賦詩中重用字何如潘曰錢起湘靈鼓瑟詩有重用字乃是庶幾帝曰此詩似不及起乃落下十三年十二月河中節度使令狐綯以其子滈求應進士舉勅曰令狐滈多時舉人極有文學流軰所許合得科名比以父綯職在樞衡避嫌不赴今因出鎮却就舉塲况諧通規合試至藝宜令主司准大中六年勅考試只在至公如渉狥情自有刑典從今以後但依常例放牓夲司舉士貴在得人去留之間惟理所在懿宗咸通十一年四月勅去年屬以用軍之際權停貢舉一年今既偃戈却宜仍舊来年宜别許三十人及第進士十人明經二十人已後不得援例景宗天祐三年正月國子監奏得監生郭應圖等六十人狀稱伏覩今年六月五日勅文應國學與諸道等明經一例解送兩人者應圖等早辭耕稼夙慕詩書自抛鄉邑之中便忝國庠之内棲遲守學轗軻於時未諧昇進之期却抱減退之患茍或諸道解送監府同條實謂首尾難分夲枝無異伏請聞奏俾遂渥恩者又河南府奏當府取解明經舉人周定言等二十七人各據取解差司錄叅軍崔藴考試並已及格伏縁明經舉人先准勅諸州府解送不得過二人者今當府除去留外見在二十七人考試並已及格若只送二人必恐互有争論難以指揮者勅曰取士之科明經極重每年人數已有舊規去夏雖舉條流盖慮所司踰濫今者國子監既有聞奏河南府亦具陳論不念逺人何以誘進只在乎升陟之際切務公平又何必解送之時便為沙汰將免遺才之嘆湏開汲善之門特改舊條俾循往例國子監河南府所試明經並依准常例解送禮部所放人數亦許酌量施行但不得茍狥嘱求遂致僥倖兼下諸道准此二月禮部奏伏以朝廷累年多事道途艱辛在逺舉人併阻随計逐年所司放牓人數不常量其少多臨事増減今者干戈稍弭水陸漸通舉人等皆負笈擔簦裂裳裹足來求試藝競切觀光雖人數不廣於近年而貢籍頗甚其屈譽至於俊造亦有其人臣今欲於去年數外更放三數人佇開勸誘之門以賛文明之運已選今月二十一日放牓伏候進止者勅曰朝廷取士之科每嵗擇才之重必資藝實以副勤求或來自逺途或久稽鄉薦今年就試多有屈人所司奏論是宜俞允茍叶無私之道俾開振滯之門切在精詳佇觀公當其禮部所放進士於舊年人數外宜令更添兩人梁太祖開平元年六月詔近年諸道貢舉人當籓方秋薦之時不親試者號為㧞解非所以責實也帝因知之乃下令止絶三年勅條流禮部貢院每年放明經及第不得過二十人四年十二月兵部尚書知貢舉姚洎奏曰近代設詞科選胄子盖所以綱維名教崇樹邦夲者也曩時進士不下千人嶺徼海隅偃風嚮化近嵗觀光之士人數不多加以在位臣僚罕有子弟就其寡少復避嫌疑實恐因循漸為廢墜今在朝公卿親屬將相子孫有文行可取者請許所在州府薦送以廣毓才之義從之乾化元年十二月以尚書左僕射楊渉知禮部貢舉非常例也前代自唐武徳貞觀之後但委考功員外郎掌之至開元二十五年員外郎李昻為貢士李權所詆繇是中書奏請以禮部侍郎専焉其間或以他官領者多用中書舍人及諸司四品清資官准㑹昌中命太常卿王起主貢舉時乃檢校僕射耳後唐莊宗同光二年三月勅選舉二門仕進根本當掄擇於多士全委仗於有司茍請託是從則踰濫斯極况方行公事已集羣材湏行戒勵之文俾絶倖求之路宜令吏部禮部翰林考藝必盡於精詳滅私狥公無從於請託仍委三銓貢院牓示省門曉告中外十月中書門下奏獻可効忠前經之令典因時建議有國之明規道既務於化成事亦敷於競勸敢俾宸聽輙罄芻言伏惟陛下業茂經綸功成理定五材七徳威冠於成謀百氏三墳義彰於知教爰自中興啓運下武膺期炤臨而日月光華鼓舞而乾坤交泰英明取士睿哲崇儒誠宜便廣於搜羅豈可尚令於淹抑但以今春貢士就試不多即目選人磨勘未畢宗伯莫臻於俊乂天官難辨於妍媸况已過秋期將行公事例間道路悉是家貧比及到京多踰程限文闈選部皆礙條流伏請權停貢選一年俟遷鸎者更勵進修希千祿者益加循省然後精求良幹博採異能免有遺賢庶同樂聖𠡠舉選二門國朝重事俱要精確難議權停宜准常例處分三年三月勅禮部貢院今年新及第進士符豪正成僚王徹桑維翰四人國家嵗命春官首司貢籍髙懸科級明列等差廣進善之門為取士之本所重者藝行兼著鄉里有稱定才實之淺深振聲名於夷夏必當得雋允副旁求爰自近年寖成澆俗多聞濫進全爽舊章朕自興復丕圖削平偽紀方作事以謀始盡革故以鼎新盖欲窒弊正訛去華務實誠為要道無切於斯今據禮部奏所放進士符䝉正等四人既慊輿情頗干浮論湏令覆試俾塞羣言又遣考詳貴從精覈及再覧符䝉正成僚等呈試詩賦果有瑕疵今若便有去留慮乖激勸儻無昇降即𦕈甄明况王徹體物可嘉屬辭甚妙細披製作㝡異儕流但應試以効成或求對而不切桑維翰若無紕繆稍有功夫止當屬對之間每失求妍之美湏推事藝各定否臧貴叶允平庶諧公共其王徹改為第一桑維翰第二符䝉正第三成僚第四禮部侍郎裴皥在掄材之際雖匪阿私當定名之時頗虧優劣但緣符蒙正等既無絀落裴皥特議寛容勿負憂疑已從釋放自今後應禮部常年所試舉人雜文策等候過堂日委中書門下准本朝故事細加詳覆方可奏聞不得輙狥人情有隳事實時命盧質覆試於翰林院試君從諫則聖賦以堯舜禹湯傾心求過為韻臣事君以忠詩是嵗試進士科者數十人裴皥精選其文惟得王徹軰或譖毁於宣徽使李紹宏曰今年新進士不繇才進各有阿私物議以為不可紹宏訴於郭崇韜因奏令盧質覆試質為賦韻五平聲三仄聲且踰常式覆試之日中外謄口議者非之五月禮部貢院奏當司准流内銓牒應請定冬集舉人内有前鄉貢童子者三銓已前團奏冬集皆竪前鄉貢童子伏准格文只有童子科此無鄉貢字銓司先為請定冬集舉人九經張仲宣等内有前鄉貢明經童子成光誨遂檢尋六典及蘓冕㑹要又無本朝書子細檢討惟有閏十三年十二月勅諸道應薦萬言及童子起今後不得更有聞薦據此童子兩字皆由諸道表薦固無鄉貢之名又無口議帖經亦不合有明經之字進則止於暗誦便號神童此外格文别無童子其成光誨銓司准格只收竪前童子團奏去二月十五日具狀申留司宰臣取裁奏例准申者伏緣三銓見團奏冬集右内有鄉貢及明經字已依成光誨例准格只竪童子團奏次者左伏以院司常年考試皆憑諸道表薦降勅下到當司准格考試及格者便放及第其同光二年童子郭忠恕等九人皆是表薦童子勅内并納到家狀並有鄉貢兩字院司檢勘同便牓示引試及第後先具白關牒報吏部南曺續便團奏春關奏狀下到中書省追當司元下納家狀檢㸃同覆奏放勅經過諸處勅下後方始到當司備錄黄關牒報御史䑓尚書省并吏部南曺令准流内銓牒伏緣院司承前皆憑勅命施行童子勅内並有鄉貢兩字若使下落恐渉専擅者奉勅起今後宜准開成三年勅文凡有官者並詣吏曺未仕者皆歸禮部其童子則委夲州府依諸色舉人例考試結解送省任稱鄉貢童子長吏不得表薦若無本處解送本司不在考試之限八月勅條例諸道州府不得表薦童子四年正月五科舉人許維岳等一百人進狀言伏見新定格文三禮三傳每科只放兩人方今三傳一科五十餘人三禮三十餘人三史學䆒一十人若每年止放兩人及一人逐年又添初舉縱謀進修皆恐滯留臣伏見長慶咸通年放舉人元無定式又同光元年春牓亦是一十三人請依此例以勸進修勅依同光元年例永為常式明宗天成元年八月勅應三京諸道今年貢舉人可依常年例取解仍令随處津送赴闕二年正月尚書禮部貢院奏五經考試官先在吏部日長定合請兩貟數年係屬貢院准新定格文祗令奏請一貟兼充考試伏緣今年科目人數轉多却欲依舊請考試官各一貟如蒙允許續具所請官名進御申奏奉勅宜依是年四月中書奏禮部貢院申當司奉今月六日勅吏部流内銓狀申據白院狀申當司先准禮部貢院牒稱具成徳軍解送到前進士王蟾狀請罷攝深州司功叅軍應宏詞舉前件人准格例應重科合在吏部其王蟾并解送吏部請准例指縱者當司遂具狀申堂奉判送吏部分折近年事例如何者伏緣近年别無事例今檢登科錄内於偽梁開平三年應宏詞登科二人前進士余渥承㫖舍人李愚考官二人司勲郎中崔景兵部貟外郎張貽憲者再具狀申堂奉判送吏部准例指揮者其前進士王蟾應宏詞考官試官合在流内銓申請者前進士王蟾請應宏詞伏自近年以来無人請應今詳格例合差考官二人又緣只有王蟾一人獨應銓司未敢懸便奏請差官者奉中書門下牒奏勅宜令禮部貢院就五科舉人考試者伏以舉選公事皆有格條准新定格勅文宏詞㧞萃准長慶二年格吏部差考試官二人與知銓尚書侍郎同考試聞奏又准格節文内准太和元年十月二十三日勅應禮部諸色貢舉人及吏部諸色科目選人凡無出身及未有官只合於禮部應舉有出身有官方合於吏部赴科目選其請應宏詞舉前進士王蟾當司當年放及第後尋已開過吏部訖若應宏詞例待南曺判成即是科選選人事理合歸吏部况緣五科考試官只考學業難於同考宏詞者奉勅王蟾宜令吏部准往例差官考試十二月勅新及第進士有聞喜宴春關宴逐年賜錢四十萬三年春趙鳳知貢舉塲中利病備逹天聽因勅進士帖經通三即可五科試本業後對䇿全精即可諸經學帖經及格後於大經汎問五義尚書於試紙令直解其理通三即可對䇿並湏理有指歸言關體要七月工部侍郎任賛上言曰伏以聖代設科貢闈取士必自鄉薦来觀國光將叶公平惟求藝行盖廣搜羅之理且非喧競之塲伏見常年舉人等省門開後春牓懸時所習既未精妍有司寕免黜落或嫉其先逹或恣以厚誣多集怨於通衢皆取駭於羣聽頗虧教本却成亂階宜立新規以革前弊自今後諸舉人不是家在逺方水陸隔越者望本令各於本貫選藝精通賔寮一人考試如非通贍不許妄薦儻考覈必當即試官請厚於甄酬若薦送稍私并童子盡歸於竄逐兾彰睿化免紊儒風庻絶濫進之人共守推公之道是日勅宜令今後諸色舉人委逐道觀察使慎擇有詞藝及通經官貟各據所業考試及格者即與給解仍具所試詩賦經帖通精數一一申省未及格者不得狥私發解兼承前諸道舉人多於京兆府寄應例以洪固鄉胃貴里為户一時不實久逺難明自此各於本道請解具言本州縣某鄉某里某為户如或寄應湏具本貫屬入狀不得効洪固胃貴之例文解到省後據所稱貫屬州府户籍内如是無名本人并給解處官吏必加罪責京百司發解就試准前指揮兼下貢院具本朝舊格諸色舉人每年各放幾人及第到日續更詳酌處分是月勅應將來三傳三禮三史開元禮學䆒等考試本業畢後引試對䇿時宜令主司湏於時務中採取要當䇿題精詳考校不必拘於對屬湏有文章但能周通文字典切即放及第如不及此格雖本業精通亦湏黜落應九經五經明經帖書及格後引試對義時宜令主司於大經汎出問義五通於簾下書於試紙令隔簾逐叚解説但要不失疏注義理通二通三然後便令念疏如是熟卷並湏全通仍無失錯始得入䇿亦湏於時務中選䇿題精當考校如精於筆硯留意者得則以四六對仍湏理有指歸言關體要如不曽於筆硯致功則許直書其事不得錯使文字只在明於利害其問義念疏對䇿逐件湏有去留是月勅近年諸道解送童子皆越常規或年齒漸髙或精神非俊或道字頗多訛舛或念書不合格文主司若不去留貢部積成乖弊自此後應諸道州府如公然濫發文解畧不考選藝能其逐處判官及試官並加責罰仍下貢院將来諸道應解送到童子委主司精専考校湏是年顔不髙念書合格道字分明兼無蹷失即放及第仍依天成三年例主司未出院間便引就試與諸科舉人同日放牓不得前却十二月戊午禮部貢院以諸色及第人失墜出身請同年一人充保次年及第二人充保即重給春關己未以近令進士帖經通三即放慮非所知致今年令不及通三亦放来年秋賦詞人並令對義四年二月貢院雖鎻未試舉人勅先往雒京赴本省就試七月貢院奏今年諸色及第人中有曽攝州縣官及有御署攝牒兼或有正授官及曽在賓幕赴舉者諸條格中書奏及第人先曽授職官者宜令所司於守攝文書内竪重任舉及第年月日或改名不改名分明印押懼其轉賜於人假資冐進也其中曽授正官御署并佐幕者仍約前任資序與除一任官如自中興以來諸科及第人曽授職官者並令所司追給文書到日准今年及第人例處分已授官者不在此限兼勒貢院將來舉人納家狀内各分折曽為官及不曽為官改名不改名其曽為職官者先納厯任文書及第後准例指揮從之是月勅應今年新及第人給春關並於敷政門外宣賜慮所司邀頡故也十月中書門下條流貢舉人事件應諸道州府解送諸色舉人湏准元勅差有才藝公正官考試及格然可給解仍具所試詩賦義目帖繇送省如逐州府解内不竪出前件指揮事節所司不在引試之限禮部貢院考試諸色帖經舉人今後據所業經書對義之時逐經湏將生卷與熟卷中半考試不得依往例只將熟卷試問今後主司不得受内外官寮書題薦託舉人及安排考試官如或實講知有才學精博者任具奏聞若受書題囑託致有屈人其主司與發書人並加黜責其所舉人别行朝典三銓南曺亦不得受諸色官貟書題薦託選人如違並准前指揮應諸色落第人此後所司具所落事繇别張懸文牓分明曉示除諸州府解送舉人外餘有於河南府寄應及宗正寺國子監生等亦湏准上指揮其中有依託朝臣者於解内具言在某官某姓名門舘考試及第後並據姓名覆試諸色舉人至入試之時前五日内據所納到試紙本司印署訖却送中書門下取中書省印印過却付司給散逐人就試貢院合請考官試官今後選舉業精通亷慎有官者充人在朝臣門舘人不得奏請奉勅宜依是月兵部尚書盧質奏請逐年諸色貢舉人州府取解之時選強明官考試具詩賦義自送省從之五年正月禮部貢院奏當司准天成三年十二月十八日勅文内准近勅自此進士試雜文後據所習本經一一考試湏帖得通三已上即放及第者奉勅進士帖經本朝舊制盖欲明先王之㫖趣潤才子之文章近代以來此道稍墜今且上從元輔下及庶寮雖負藝者極多能帖經者甚少恐此一節或滯羣材既求備以斯難庶觀光而是廣今年凡應進士舉所試文䇿及格帖經或不及通三與放及第來年秋賦詞人所習一大經許令對義義目多少次第仍委所司件奏者其今年逐處所解送到進士當司引試雜文帖經後欲令别於所習一大經内對義目五道考試通二通三准帖經例於其入䇿其將來秋賦諸寺監及諸道州府所解送進士等亦准去年十月一日𠡠條流考試其詩賦義目帖由等解送赴省如或不依此解送當司准近勅並不引試奉勅宜依册府元龜卷六百四十一
