body:
  text: 册府元龜卷三百七十六宋王欽若等撰將帥部褒異第二魏鮮于輔為左度遼將軍從太祖於官渡袁紹破走太祖喜顧謂輔曰而今克之此既天意亦二三子之力也閻柔為烏丸校尉從太祖征三郡烏丸以功封關内侯太祖甚愛柔毎謂之曰我視卿如子亦欲卿視我如父也公孫康嗣父永寧鄉侯太祖征三郡烏丸屠栁城袁尚等奔遼東康斬送尚首封康襄平侯拜左將軍張燕為平難中郎將太祖將定冀州燕遣使求佐王師拜平北將軍率衆詣鄴封安國亭侯邑五百戸夏侯惇字元讓漢末太祖初起惇嘗為禆將從征伐太祖行奮武將軍以惇為司馬别屯白馬遷折衝校尉領東郡太守太祖自徐州還惇從征吕布為流矢所中傷左目復領陳留濟陰太守加建武將軍封髙安鄉侯又轉領河南尹太祖平河北爲大將軍後拒鄴破遷伏波將軍領尹如故使得以便宜從事不拘科制獻帝建安十二年錄惇前後功増封邑千八百戸幷前二千五百戸二十一年從征吳還使惇都督二十六軍留居巢賜伎樂名倡令曰魏絳以和戎之功猶受金石之樂况將軍乎二十四年太祖軍擊破吕布惇嘗同載拜前將軍夏侯淵字妙才惇族弟也太祖初起兵以别部司馬騎都尉從遷陳留潁川守昌狶反撃降之拜典軍校尉又濟南樂安黄巾徐和司馬俱等攻城殺長吏淵將泰山齊平原郡兵撃大破之十四年以淵爲行領軍太祖征吳還使淵督諸將撃廬江叛者雷緒破之及太祖還鄴以淵行䕶軍將軍撃破南山賊劉雄幷餘黨梁興於鄠拔之斬興封博昌亭侯又破韓遂及降馬超餘衆乃假淵節初枹罕宋建因涼州亂自號河首平漢王太祖使淵討平之太祖下令曰宋建造爲亂逆三十餘年淵一舉滅之虎步關右所向無前仲尼有言吾與爾不如也増封三百戸幷前八百戸曹仁爲太祖别部司馬行厲鋒校尉太祖破袁術仁所斬獲頗多從征徐州仁嘗督騎爲前軍鋒别攻陶謙將吕繇破之還與大軍合彭城大破謙軍從攻費華即墨開陽謙遣别將救諸縣仁以騎撃破之太祖征吕布仁别攻句陽拔之太祖平黄巾迎天子都許仁數有功拜廣陽太守太祖器其勇畧使不之郡以議郎督騎從破張繡太祖遂使將騎撃劉備軍破走之又撃破袁紹别將韓洵太祖又從仁計降壺關城於是錄仁前後功封都亭侯從平荆州以仁行征南將軍留屯江寜拒吳衆退之三軍服其勇太祖益壯之轉安平亭侯太祖討馬超以仁行安西將軍督諸將拒潼關破超渭南蘇伯田銀反以仁行驍騎將軍都督七軍討銀等破之復以仁行征南將軍假節屯樊鎮荆州侯音以宛叛畧傍縣仁率諸軍攻破音斬其首還屯樊即拜征南將軍鄢陵侯彰北征烏丸文帝在東宮爲書戒彰曰爲將奉法不當如征南邪及即王位拜仁車騎將軍都督荆揚益州諸軍事進封陳侯増邑二千幷前三千五百戸後召還屯宛攻破呉將陳邵於襄陽即拜仁大將軍又詔仁移屯臨潁遷大司馬曹休爲曹洪騎都尉參洪軍事太祖謂休曰汝雖參軍其實帥也洪從休議撃劉備將呉蘭大破之太祖拔漢中諸將還長安拜休中領軍文帝初即位爲領軍將軍錄前後功封東陽亭侯夏侯惇薨以休爲鎮南將軍假節都督諸軍事車馬臨送帝乃下與執手而别呉遣將屯歴陽休到撃破之又别遣兵渡江燒賊蕪湖營數千家遷征東將軍領揚州刺史進封安陽鄉侯帝征呉以休爲征東大將軍假黄鉞督張遼等及諸州郡二十餘軍撃呉大將吕範等於洞浦破之拜揚州牧明帝即位進封長平侯呉將審德屯皖休撃破之斬德首呉將韓綜翟丹等前後率衆詣休䧏增邑四百幷前二千五百戸遷大司馬都督揚州如故曹真字子丹太祖使將虎豹騎討靈丘賊拔之封靈壽亭侯以偏將軍將兵撃蜀别將於下辨破之拜中堅將軍從至長安領中領軍是時夏侯淵沒於陽平太祖憂之以真爲征南䕶軍督徐晃等破蜀别將髙詳於陽平太祖自至漢中拔岀諸軍使真至武都迎曹洪等還屯陳倉文帝即王位以真為鎮西將軍假節都督雍涼州諸軍事錄前後功進封東鄉侯張進等反於酒泉真遣費耀討破之斬進等黄初三年還京都以真為上軍大將軍都督中外諸軍事假節鉞與夏侯尚等征孫權擊牛渚屯破之轉拜中軍大將軍加給事中明帝即位進封邵陵侯遷大將軍諸葛亮圍陳倉真遣將軍郝昭王生守陳倉有僃亮不能克増邑并前二千九百戸及朝雒陽遷大司馬賜劔履上殿入朝不趨夏侯尚為中領軍文帝踐阼更封平陵鄉侯遷征南將軍領荆州刺史假節都督南方諸軍事撃破蜀别軍於上庸遷征南大將軍車駕幸宛使尚率諸軍與曹真共圍江陵尚夾江燒其舟船水陸並攻破之城未拔㑹大疫尚引諸軍還益封六百戸幷前九百戸假鉞進為荆州牧降附蠻夷數千家徙封昌陵鄉侯尚疾篤還京都帝數臨幸執手涕泣鍾繇為司𨽻校尉持節都督關中諸軍太祖在官渡與袁紹相持繇送馬二千餘匹給軍太祖與繇書曰得所送馬甚應其急關右平定朝廷無西顧之憂足下之勲也昔蕭何鎮守關中足食成軍亦適當耳程昱為振威將軍収山澤亡命得精兵數千人乃引軍與太祖會黎陽討袁譚袁尚譚尚破走拜昱為奮武將軍封安國亭侯文帝踐阼為衛尉進封安鄉侯増邑三百戸并前八百戸方欲以為公㑹薨帝為流涕追贈車騎將軍郭嘉為司空軍祭酒征吕布三戰破之又從太祖破袁紹紹死又從討譚尚於黎陽連戰數克諸將欲乘勝遂攻之嘉以為不可太祖乃南征軍至西平譚尚果爭冀州譚為尚軍所敗走保平原遣辛毗乞降太祖還救之遂從定鄴又從攻譚於南皮冀州平封嘉洧陽亭侯及疾篤太祖問疾者交錯及薨臨其喪哀甚乃表曰軍祭酒郭嘉自從征伐十有一年毎有大議臨敵制變臣策未決嘉輙成之平定天下謀功為髙不幸短命事業未終追思嘉勲實不可忘可増邑八百戸并前千户蔣濟為散騎常侍與大司馬曹仁征呉仁薨以濟為東中郎將代領其兵詔曰卿兼資文武志節忼愾嘗有超越江湖吞呉㑹之志故復授將帥之任郝昭為將軍守陳倉蜀將諸葛亮攻之二十餘日昭固守亮乃退明帝詔嘉昭善守賜爵列侯及還帝引見慰勞之顧謂中書令孫資曰卿鄉里乃有爾曹快人爲將若如此朕復何憂乎仍欲大用之㑹病亡張既爲雍州刺史文帝即王位初置涼州以安定太守鄒岐為刺史張掖張進執郡守舉兵拒岐黄華麴演各逐故太守舉兵以應之既進兵為䕶羌校尉蘓則聲勢故則得以有功既進爵都鄉侯涼州盧水胡伊健妓妾治元多等反河西大擾帝憂之曰非既莫能安涼州乃召鄒岐以既代之撃胡大破之帝甚説詔曰卿踰河歴險以勞撃逸以寡勝衆功過南仲勤踰吉甫此勲非但破胡乃永寧河右使吾長無西顧之念矣徙封西鄉侯増邑二百戸并前四百戸賈逵為豫州刺史關内侯黄初中與諸將並征呉破吕範於洞浦進封陽里亭侯加建威將軍明帝即位增邑二百戸并前四百戸任峻為典農中郎將太祖使峻典軍器糧運賊數寇鈔絶糧道乃使千乘為一部十道方行為複陳以營衛之賊不敢近軍國之饒起於羽林監棗祗而成於峻太祖以峻功高乃表封為都亭侯邑三百戸遷長水校尉蘇則為酒泉安定武都太守所在有威名太祖征張魯使為軍導魯破徙為金城太守文帝初西平麴演叛稱䕶羌校尉則勒兵討之演恐乞降帝以其功加則䕶羌校尉賜爵關内侯後演復結旁郡為亂及武威三種胡幷冦鈔道路斷絶武威太守毌丘興告急於則乃發兵救武威降其三種胡與興撃敗演軍河西平乃還金城進封都亭侯邑三百戸張遼為中郎將數有戰功遷禆將軍從太祖討袁譚袁尚於黎陽有功行中堅將軍又破遼東賊柳毅等還都太祖自岀迎遼引共載以遼為盪冦將軍復别撃荆州定江夏諸縣還屯臨潁封都亭侯從征袁尚於柳城卒與虜遇遼勸太祖戰氣甚奮太祖壯之自以所持麾授遼遂撃大破之太祖論諸將功曰登天山履峻險以取蘭成盪冦功也増邑假節遼又率諸軍討吳追撃大帝㡬獲之太祖大壯遼拜征東將軍文帝即位轉前將軍賜帛千匹糓萬斛吳復叛遣遼還屯合肥進遼爵都鄉侯給遼母輿車及兵馬送遼家詣屯勑遼母至導從岀迎所督諸將軍吏皆羅拜道側觀者榮之文帝踐阼封晉陽侯増邑千戸幷前二千六百戸黄初二年遼朝雒陽宫帝引遼會建始殿親問破吳狀帝嘆息願左右曰此亦古之召虎也為起第舎又特為遼母作殿以遼所從破吳軍應募步卒皆為虎賁吳復稱藩遼還屯雍丘得疾帝遣侍中劉曄將太醫視疾虎賁問消息道路相屬疾未瘳帝迎遼就行在車駕親臨執其手賜以御衣太官日送御食疾小差還屯吳復叛遼與諸將破之遼病篤薨於江都帝為流涕樂進為陷陣都尉從撃吕布於濮陽張超於雍丘橋㽔於苦皆先登有功封廣昌亭侯從征張繡於安衆圍吕布於下邳破别將撃眭固於射犬攻蜀先主於沛皆破之拜討冦校尉渡河攻獲嘉還從撃袁紹於官渡力戰斬紹將淳于瓊從撃譚尚於黎陽斬其大將嚴敬行㳺撃將軍别撃黄巾破之定樂安郡從圍鄴鄴定從撃袁譚於南皮先登入譚東門譚敗别攻雍奴破之太祖表漢帝稱進功遷折衝盪冦将軍太祖征管承軍淳于遣進與李典撃之承破走逃入海島海濵平荆州未服遣屯陽翟後從平荆州留屯襄陽撃關羽蘇非等皆走之南郡諸縣山谷蠻夷詣進降又討蜀臨沮長杜普旌陽長梁太皆大破之後從征吳假進節太祖還留進與張遼李典屯合肥増邑五百戸并前凡千三百戸遷右將軍于禁為軍司馬太祖使將兵詣徐州攻廣威拔之拜陷陣都尉從征黄巾劉辟黄邵等撃破之遷平虜校尉初黄巾降號青州兵太祖寛之故敢因緣為畧禁怒乃討之青州兵詣太祖自訴或謂禁青州兵已訴君矣宜促詣公辨之禁乃入謁具陳其狀太祖悦謂禁曰將軍在亂能整討暴堅壘有不可動之節雖古名將何以加之於是錄禁前後功封益夀亭侯又太祖使禁别將屯原武撃袁紹别營於杜氏津破之遷禆將軍禁又督守土山力戰紹破遷將軍又征昌豨降之是時太祖軍淳于聞而嘆曰豨降不詣吾而歸禁豈非命邪益重禁東海平拜禁虎威將軍後與臧霸等攻梅成張遼張郃等討陳蘭遂斬蘭成増邑二百戸并前千二百戸又太祖嘗恨朱靈欲奪其營禁徑詣靈營奪其軍衆皆震服遷右將軍假節鉞張郃為偏將軍封都亭侯從太祖攻鄴拔之又從撃袁譚於渤海别將軍圍雍奴大破之以功遷平狄將軍又别督諸軍降巴東巴西二郡還南鄭拜盪冦將軍太祖在長安遣使假郃節文帝即王位以郃為左將軍進爵都鄉侯及踐阼進封鄚侯諸葛亮岀祁山加郃位特進遣督諸軍拒亮絶其汲道撃大破之南安天水安定郡反應亮郃皆破平之詔曰賊亮以巴蜀之衆當虓虎之師將軍被堅執銳所向克定朕甚嘉之益邑千戸并前四千三百戸郃屯方城㑹諸葛亮復岀急攻陳倉明帝驛馬召郃到京都帝自幸河南城置酒送郃遣南北軍士三萬及分遣武衛虎賁使衛郃徐晃河東楊人也為郡吏從車騎將軍楊奉討賊有功拜騎都尉及歸太祖太祖授晃兵使撃卷卷音墟權切原武賊破之拜禆將軍從征吕布别降布將趙庶李鄒等與史渙斬眭固於河内從破蜀先主又從破顔良拔白馬進至延津破文醜拜偏將軍與曹洪撃㶏彊賊祝臂破之又與史渙撃袁紹運車於故市功最多封都亭侯又從征蹋頓拜横野將軍馬超等反關右遣晃屯汾陰以撫河東賜牛酒令上先人墓又從征張魯别遣晃討攻櫝仇夷諸山氐皆降之遷平冦將軍晃助曹仁討關羽羽圍仁於樊又圍將軍吕常於襄陽晃撃退之振旅還摩陂太祖迎晃七里置酒大㑹太祖舉巵酒勸晃且勞之曰全樊襄陽將軍之功也時諸軍皆集太祖案行諸營士卒咸離陣觀而晃軍營整齊將士駐陣不動太祖嘆曰徐將軍可謂有周亞夫之風矣文帝即王位以晃為右將軍進封為逯鄉侯及踐阼進封楊侯與夏侯尚討蜀先主於上庸破之以晃鎮陽平徙封陽平侯明帝即位拒吳將諸葛瑾於襄陽増邑二百戸并前三千一百戸李整者典之從父乾子也太祖使整將乾兵與諸將撃蘭封蘭封破從平兖州諸縣有功稍遷青州刺史李典為禆將從太祖圍鄴鄴定與樂進圍高幹於壺關撃管承於長廣皆破之遷捕虜將軍封都亭侯典宗族部曲三千餘家居乘氏自請徙詣魏郡太祖嘉之遷破虜將軍又率將與張遼破走呉大帝増邑百戸并前三百戸李通爲振威中郎將太祖討張繡通為先登大破繡軍拜禆將軍封建功侯分汝南二縣以通為楊安都尉太祖與袁紹相拒於官渡紹遣使拜通征南將軍劉表亦陰招之通皆拒焉又撃羣賊瞿恭江宫沈成等皆破殘其衆送其首遂定淮汝之地改封都亭侯拜汝南太守又破攻賊張赤等五千餘家蜀先主與周瑜圍曹仁於江陵通率衆入圍迎仁軍勇冠諸將通得病死追増邑二百户幷前四百户臧霸為琅邪相太祖方與袁紹相拒而霸數以精兵入青州故太祖得專事封霸為都亭侯加威虜將軍又與夏侯淵討黄巾餘賊徐和等有功遷徐州刺史沛國公文帝踐阼進封開陽侯徙封良成侯與曹休討吳賊破吕範於洞浦徴為執金吾位特進明帝即位増邑五百戸并前三千五百戸文聘為江夏太守太祖使典北兵委以邊事賜爵關内侯與樂進討關羽於尋口有功進封延夀亭侯加討逆將軍又攻羽輜重於漢津燒其船於荆城文帝踐阼進封長安鄉侯假節與夏侯尚圍江陵使聘别屯沔口止石梵自當一隊禦賊有功遷後將軍封新野侯聘又追撃吳大帝衆破之増邑五百戸并前千九百戸吕䖍領泰山太守引兵與夏侯淵撃黄巾徐和等斬首獲生數千人太祖使督青州諸郡兵以討東萊羣賊李條等有功太祖令曰夫有其志必成其事葢烈士之所徇也卿在郡以來擒姦討暴百姓獲安躬蹈矢石所征輒克昔冦恂立名於汝潁耿弇建策於青兖古今一也舉茂才加騎都尉文帝即位加禆將軍封益夀亭侯遷徐州刺史加威虜將軍又討利城叛賊斬獲有功明帝即位徙封萬年亭侯増邑二百戸并前六百戸許褚爲都尉從太祖征張繡先登斬首萬計遷校尉又從圍鄴力戰有功賜爵關内侯從討韓遂馬超大破之遷武騎中郎將文帝踐阼進封萬夀亭侯遷武衛將軍都督中軍宿衛禁兵初禇所將為虎士者從征伐太祖以為皆壯士也同日拜為將其後以功為將軍封侯者數十人都尉校尉百餘人明帝即位進牟鄉侯邑七百戸禇兄定亦以軍功封為振威將軍都督徼道虎賁典韋為都尉毎戰鬬常先陷陳遷爲校尉從征張繡創重瞋目大怒而死太祖退駐舞隂聞韋死為流涕募間取其喪親自臨哭之遣歸葬襄邑車駕每過常祠以中牢龎德少爲郡吏州從事漢末獻帝初平中從馬騰撃反羌叛氐數有功稍遷至校尉建安中太祖討袁譚尚於黎陽譚遣郭援高幹等畧取河東太祖使鍾繇率關中諸將討之德随騰子超拒援幹於平陽德為軍鋒進攻援幹大破之親斬援首拜中郎將封都亭侯太祖定漢中素聞其驍勇拜立義將軍封關門亭侯邑三百戸裴潜為兖州刺史太祖次摩陂嘆其軍齊整特嘉賞賜衛臻為侍中中䕶軍諸葛亮冦天水臻奏宜遣竒兵入散關絶其糧道明帝乃以臻為征蜀將軍假節督諸軍事到長安亮退加光祿大夫趙儼以議郎參曹仁軍事南行遷平冦將軍文帝黄初三年賜爵關内侯吳大帝冦邊征東大將軍曹休統五州軍禦之徴儼為軍師吳衆退封宜土亭侯孫禮明帝時為揚州刺史伏波將軍賜爵關内侯吳大將全琮帥數萬衆來侵冦時州兵休使在者無㡬禮躬勒衛兵禦之戰於芍陂奮不顧身賊衆乃退詔書慰勞賜絹七百疋辛毗爲侍中賜爵關内侯上軍大將軍曹眞征朱然于江陵毗行軍師還封廣平亭侯楊阜爲參軍事與馬超戰身被五創宗族昆弟死者七人超遂南奔張魯隴右平定太祖封討超之功賜阜爵關内侯滿寵爲奮威將軍屯當陽吳大帝數擾東陲復召寵還爲汝南太守賜爵關内侯關羽圍襄陽寵助征南將軍曹仁屯樊城拒之寵力戰有功羽退進封安昌亭侯文帝即王位遷揚武將軍破吳於江陵有功更拜伏波將軍屯新野大軍南征到精湖寵帥諸軍在前與賊隔水相對寵撃破之進封南鄉侯黄初三年假寵節鉞五年拜前將軍明帝即位進封昌邑侯太和二年領豫州刺史四年拜寵征東將軍青龍三年寵遣長史督二軍循江東下摧破呉諸屯而還詔美之景初二年以寵年老徴還遷為太尉寵不治産業家無餘財詔曰君典兵在外專心憂國奉公有行父祭遵之風賜田十頃穀五百斛錢二十萬以明清忠儉約之節焉寵前後増邑凡丸千六百戸田豫文帝時使持節䕶烏丸校尉山賊髙艾衆數千人冦鈔為幽冀害豫誘使鮮卑素利部斬艾傳首京都封豫長樂亭侯文帝太和末公孫淵以遼東叛帝欲征之而難其人中領軍楊暨舉豫應選乃使豫以本官督青州諸軍假節往討之後呉復來冦豫往拒之賊即退景初末増邑三百并前五百戸齊王正始初遷使持節䕶匃奴中郎將加振威將軍領幷州刺史牽招初為太祖軍謀掾從討烏丸至柳城拜䕶烏丸校尉從平漢中太祖還留招為中䕶軍事罷還鄴拜平虜校尉將兵督青徐州諸軍事撃東萊賊斬其渠帥東土寧静文帝踐阼拜招使持節䕶鮮卑校尉大軍征吳召招還至値軍罷拜右中郎将出為鴈門太守明帝即位賜爵關内侯郭淮為丞相兵曹議令史從征漢中太祖還留征西將軍夏侯淵拒蜀先主以淮為淵司馬與蜀先主戰淮時有疾不出淵遇害軍中擾擾淮収散卒推盪冦將軍張郃為軍主諸營乃定太祖善之假郃節復以淮為司馬文帝即王位賜爵關内侯轉鎮西長史行征羌䕶軍擢領雍州刺史封射陽亭侯黄初五年為眞安定羌大帥太和二年蜀相諸葛亮出祁山遣將軍馬謖至街亭高詳屯列栁城張郃撃謖淮攻詳營皆破之又破隴西羌唐蹏於枹罕加建威將軍齊王正始初轉前將軍夏侯𤣥伐蜀淮督諸軍為前鋒淮度勢不利輙拔軍出故不敗還假淮節姜維之岀石營從彊川乃西迎叛胡治無戴留陰平太守廖化於成重山築城淮乃别遣夏侯霸等追維於沓中淮自率諸軍就攻化等維果馳還救化皆如淮計進封鄉都侯嘉平元年遷征西將軍都督雍涼諸軍事是歲與雍州刺史陳泰協策降蜀牙門將句安等於趐上二年詔曰昔漢川之役㡬至傾覆淮臨危濟難功書王府在關右三十餘年外征冦虜内綏民夷比歲以來摧破廖化禽虜句安功績顯著朕甚嘉之今以淮為車騎將軍儀同三司持節都督如故進封陽曲侯邑凡二千七百八十戸陳泰以齊王嘉平初代郭淮為雍州刺史加奮威将軍淮薨代為征西将軍假節都督雍涼諸軍事及吳大將孫峻岀淮泗以泰為鎮軍將軍假節都督淮北諸軍事及諸葛誕作亂夀春司馬文王率六軍軍丘頭泰總署行臺司馬前後以功増邑二千六百户胡質為荆州刺史振威將軍賜爵關内侯吳大将軍朱然圍樊城質輕軍赴之遂勒兵臨圍城中乃安遷征東将軍假節都督青徐諸軍事嘉平二年薨家無餘財追進封陽陵亭侯邑百戸王基為荆州刺史揚烈将軍隨征南王昶撃呉虜安北將軍譚正納降數千口賜爵關内侯髙貴鄉公即位進封常樂亭侯毌丘儉文欽作亂以基為行監軍假節統許昌軍儉使文欽將兵襲鄧艾基知其勢分進兵偪項儉衆乃敗欽等已平遷鎮南將軍都督豫州諸軍事領豫州刺史進封安樂鄉侯諸葛誕反基以本官行鎮東將軍都督揚豫諸軍事進封東武侯是歳基母卒詔祕其凶問迎基父豹喪合塟雒陽廿露四年轉為征南將軍都督荆州諸軍事常道鄉公即尊位増邑千戸并前五千七百戸景元二年薨追贈司空王凌文帝時為兖州刺史與張遼等至廣陵討吳凌與諸將逆撃捕斬首虜有功封宜成亭侯加建武將軍齊王正始初為征東將軍假節都督揚州諸軍事二年吳大將全琮數萬衆冦芍陂凌率諸軍逆討與賊爭塘力戰賊退進封南鄉侯邑千三百五十戸遷車騎将軍儀同三司毌丘興者儉之父也黄初中討賊張進及討叛胡有功封髙陽鄉侯毌丘儉為荆州刺史明帝圗討遼東以儉有幹策徙為幽州刺史加度遼將軍使持節䕶烏丸校尉率幽州諸軍公孫淵逆與儉戰不利引還明年帝遣太尉司馬宣王統中軍及儉等衆數萬討淵定遼東儉以功進封安邑侯邑三千九百戸齊王正始中儉以髙句驪數侵叛督諸軍步騎萬人岀𤣥莵從諸道討之斬獲首虜以千數遷左將軍假節監豫州諸軍事領豫州刺史諸葛誕為鎮東大將軍都督揚州呉大將孫峻吕據留賛等聞淮南亂㑹文欽往乃帥衆將欽徑至夀春誕諸軍已至城不可攻乃走誕遣將軍蔣班追撃之斬賛傳首収其印節進封髙平侯邑三千五百戸鄧艾為南安太守齊王嘉平元年與征西将軍郭淮拒蜀軍姜維屯白水維潜軍來而渡艾先至據城得以不敗賜爵關内侯加討冦将軍髙貴鄉公即位進封方城亭侯呉大将軍孫峻等號十萬衆將渡江艾遣泰山太守諸葛緒等於黎漿拒戰逐走之徴拜長水校尉以破文欽等功進封方城鄉侯行安西将軍解雍州刺史王經圍於狄道姜維退駐鍾提乃以艾為安西將軍假節領䕶東羌校尉與維戰於段谷大破之高貴鄉公甘露元年詔曰逆賊姜維連年狡黠民夷騷動西土不寧艾籌畫有方忠勇奮發斬将十數馘首千計國威振於巴蜀武聲揚於江岷今以艾為鎮西将軍都督隴右諸軍事進封鄧侯分五百戸封子忠為亭侯二年拒姜維於長城維退還遷征西将軍前後増邑凡六千六百戸陳留王景元三年征蜀降之詔曰艾耀威奮武深入虜亭斬將搴旗梟其鯨鯢僣號之主稽首係頸歴世逋誅一朝而平兵不踰時戰不終日雲徹席巻盪定巴蜀雖白起破彊楚韓信克勁趙呉漢禽子陽亞夫滅七國計功論美不足比勲也其以艾為太尉増邑二萬户鍾㑹為鎮西將軍假節都督闗中諸軍事陳留王景元四年秋㑹移檄蜀將吏士民㑹與諸葛緒進攻劔閣蜀軍保險拒守鄧艾遂至緜竹大戰斬諸葛瞻維等聞瞻已破率其衆東入于巴㑹乃進軍至涪遣胡烈田續龎㑹等追維艾進軍向成都蜀後主詣艾降遣使勅維等令降於㑹十二月詔曰㑹所向摧弊使前無强敵緘制衆城網羅迸逸蜀之豪帥面縳歸命舉無廢功凡所降誅動以萬計全勝獨克有征無戰拓平西夏方隅清晏其以㑹為司徒進封縣侯増邑萬戸册府元龜卷三百七十六
