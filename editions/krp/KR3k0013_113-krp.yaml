與聰明純孝極於安親大功深於濟代自陟元后實總朕師時政益明彛倫攸敘而邊甿遐阻藩服悠曠式慰來蘇之懐寔允卜征之意加以頃年邊將授任或乖師旅以虧軍威不振今盛徳在水𤣥𡨕御辰天道成於積隂王制崇於大閱皇帝宜順時廵狩親幸邊陲掌圖修考事之儀典樂具陳詩之禮西泊河塞東踰燕朔望秩名山肆覲羣后休農問老誓師訓卒其有牧州典郡功施於人杖節擁旄隱若敵國者當崇進律之賞加以分麾之命若郡政不舉軍令莫修聚歛苛細侵削戰士者宜明茲典憲肅以天誅然後七萃騰裝三軍按節合符釜山之典覽軒帝之餘風勒騎單于之臺踐漢皇之故事使隂山罷祲大漠無塵其供帳所資儲擬之費皆令有司支備不得煩人甲午帝以北廵之故慎選良將乃以幽州防禦使幽州都督宋璟為左軍大總管和戎等軍大使并州長史薛訥為中軍大總管朔方大總管兵部尚書郭元振為右軍大總管既而竟不行二年八月癸卯制曰咸雒京師建都惟舊乃眷時邁卜御斯在朕承天纂厯恭已臨人鼎爼雖甘念疲甿之不足宫室信美惕浮戶之未安事内攢於千慮心外周於萬物則知帝業初起崤函乃金湯之地天下大定河雒為會同之府周公測景寔曰土中總六氣之所交均萬方之來貢引魚鹽於淮海通稅紵於吴越瞻彼雒汭長無阻饑自中宗入闗於今八載省方之典久而莫修遂使水漕陸輓方春不息勞人奪農卒嵗何望闗東嗟怨朕實聞焉思欲寧人而休轉運館榖而就敖庾如以暑雨作害災拂秦川嵗星有福祥歸豫野朕情深救弊身豈懐安愽考靈心審聽輿語上奉天以為孝下利人以為忠順時而動從衆之願宜以今年十一月行幸東都凡厥有司各恭乃事至於行從兵馬供頓貯積務在樽節勿使煩勞考使選人咸令都集東都宫殿湏理量加補葺不得煩人朕本為人而行非擬勞人自奉所過州縣無費黎元亦不得輙有差科旁求進獻宣布遐邇知朕意焉十月己亥幸新豐之温湯乙巳至自温湯開元二年九月戊申幸新豐之温湯十一月甲辰勑曰惟此新豐是出古之順豫義兼廵省頃者觀風數臨兹地以寃滯詢于故老閭里歡康田疇墾闢况冬降積雪春期有年夏諺王遊果符時邁雖千乗萬騎咸給於主司而累月再來頗勤於除掃宜下復蠲之令慰其望幸之心新豐縣百姓免一年雜差科縣官及温泉監官經兩度祗承者與一中上考三年十月癸亥幸郿縣之鳯泉湯甲戌制曰詩人賦田以備蒐狩之義王者順時式展畋遊之禮頃者築塲神甸清道子來經上林之苑囿指扶風之藪澤雖獵將提鼔虞人植旗仍憫沍寒之節不行肅殺之命豈惟虞舜之典咸秩山川所兾周文之風及於鳥獸繇是罷還士卒非重盤遊養彼吏人致有煩擾所謂行者幸也后來其蘇宜申恩恵用符古者所經州縣供承頓官百姓并告營幕橋道等事宜令所司勘會奏聞其緣御路及頓場麥苖有損者亦令具實奏聞十一月乙卯至鳯泉湯是月詔曰陳詩展義問俗觀風乃王者之所務也頃屬農事皆隙嵗功有成近歴酆鎬左連岐雍見江山秀麗溝塍綺錯長楊鄠杜之間竹林果園之富相望於道家給人足謂之時邁頗慰予懐思所以問耆老恤淹滯舉逸人旌賢士庶恊廵遊之典以符行在之恩駕所過之縣見禁囚徒以下咸宜放免流以上罪具犯狀奏聽進止古者親問高年存養孤老其年九十以上并篤疾各賜物四段綿布各一屯四年二月甲辰幸温泉湯丁卯至自温泉湯十二月乙卯幸新豐之温湯乙丑至自温湯是月帝將幸東都以京兆尹蕭璿充置頓戶部侍郎崔皎為副太常少卿崔子璟充橋道使自華州東北趨同州於渭水造一浮橋五年正月辛亥幸東都庚申勅曰行幸所經州宜令紫微令黄門平章事蘇頲訪察刺史上佐政術定作三等奏聞二月甲戌至東都六年七月辛酉詔曰觀俗省方所以愛人治國崇尊廟貌所以事神享親欽若昔典此惟大義朕祗膺鴻業積稔咸泰去嵗欲幸雒京已發成命旋屬重營太廟因將中止未即展軨効駕信弗可違終肆覲於東方當載馳於西土流晷不駐通䘮永畢象居始成如在増慕朕之前志日夜匪遑故可以詩陳肅雍禮極禋祀况神明之隩時惟雍州稼穡有年莫若闗輔王假用吉后來其蘇實獲我心俾從人欲可以今年十月取北路幸長安所司准式務在節省無得勞費甲寅復詔曰兩京來去乃是尋常縁頓所湏皆用官物至於百姓縱暫祗承處置有條不合辛苦其中侵擾莫非横干或漁獵畜養以將進獻驅使役徒以狥聲名實由綱紀未樹教令不行去年從京向都嘗亦處分蒲州刺史程行諶同州刺史李朝隱陜州姜師度至其州界咸有進奉惜其能善政故乃屈法收情憶至於今豈能無恠中冬西幸不可踵前其有輙進送及餉遺從官并别有煩擾者必科以法御史明加糾察隨事奏聞九月辛卯以將作大匠韋溱為東都留守十月甲寅還京十一月辛未至自東都七年十月辛卯幸新豐之温湯癸卯至自温湯八年十月辛巳幸長春宫壬午畋於華州之下邽庚寅遂幸温泉十一月乙丑至自長春宫九年正月丙寅幸新豐之温湯乙亥至自温湯九月甲戌詔曰王者觀俗以賦政考祥以省方必將恊于人和而奉若天命朕祗承鴻業用康黎庶思振徳以恵物豈勞人以尊已頃年闗輔之地轉輸實煩重以河塞之役兵戎屢動千金有費九載未儲懐此勞軫以増旰昃且夫苟利於物可隨方而變通將適於人故因時以廵幸卜雒萬方之隩維嵩五嶽之中風雨之所交舟車之所會流通江汴之漕控引河淇之運利俗阜財於是乎在今欲省其費務以實闗中即彼敖庾少留河邑乗嵗陽之吉展遊順之儀豈惟龜筮不違故亦詢謀是恊修五禮問百年車輿動而不勞玉帛會而胥悦所謂先天以𢎞道因人以為利也宜以明年正月十五日幸東都十二月乙酉幸新豐之温湯壬辰至自温湯十年正月丁巳幸東都二月戊寅至東都八月壬子制曰朕頃自鎬京省方於雒本以息轉輸之費即河瀍之殷今屬宗廟改修禮崇昭事永言配享必在躬親又眷彼晉陽是稱重鎮將陳詩以問俗式安邊而訓武雖來徃祗供頗有煩役而國之大事不可云勞宜以明年正月三日發雒幸并州取便路還京應湏支計所留准式縁頓祗承一事已上並用當處官物不許科歛百姓其逓運及從兵馬官寮等務從減省所在公私并不得輙有進獻違者所由州縣官及進獻人各量事貶罰布告遐邇咸使聞知十一年正月己巳發東都北廵狩庚辰幸潞州二月辛未歸京師十月丁酉幸新豐之温湯置温泉宫甲寅至温泉宫十二月甲午幸鳯泉湯詔有司萬事自備不得干擾百姓戊申至自鳯泉湯十二年十一月庚午幸東都戊寅至東都十三年二月戊午幸龍門即日還宫十月辛酉帝發東都廵狩十一月丙戌至泰山之下去山趾五里己丑日南至帝與宰臣及外壇行事之官登于嶽上齊宫之所庚寅祀昊天上帝于山上辛卯祀皇地祗于社首之泰拆壇事見帝王封禪門丙申幸孔子宅親設奠祭十二月己巳至東都十四年十月庚申幸汝州之温湯辛酉至温湯之行宫時屬雨雪帝親賦喜雪詩以示羣臣己巳至自汝州之温湯十一月丁巳幸寧王憲宅與諸王宴探韻賦詩即日還宫十二月己丑幸夀安安定方秀州時狩故也十五年六月乙巳西京父老詣闕上表請幸帝手詔許之甲寅制曰朕粤自鎬酆省方瀍雒屬九服寧晏四時順成殊徴龎殷景福紛委遂荷靈睠登于介丘先天成功允答休祜盖敬天知命不敢以寧也我來于東嵗亦數稔而西土耆老傒予多怨況闗輔之地頃則有年宜叶卜征之祥式展時廵之義可以今年閏九月十日取北路幸長安所司准式緣頓支供一事已上並用當處官物不湏科斂百姓其逓運及行從官寮等物從減省所在公私不得輙有進獻宣布遐邇知朕意焉七月戊戌幸寧王之第是日憲誕辰也八月己巳制曰朕君臨區宇子育黎元每懐勤恤不欲勞煩而鎬京之地陵寢所在自展義河雒已歴嵗年所以式遵卜征有事時邁抑惟常典寧敢憚勞將欲西廵元取北路今同州有暴水浸于邑居載懐憂惕無忘鑒寐且從南路幸長安所司准式閏九月庚申發東都幸京師十月己卯至京師十一月丙寅幸寧王憲之第十六年十月己卯幸温泉宫乙丑至自温泉宫十二月戊申幸寧王第留宿丁卯幸温泉宫十七年十二月辛酉幸温泉宫壬申至自温泉宫十八年四月乙巳幸温泉宫丁未至自温泉宫壬戌幸寜親公主第七月庚辰幸寧王憲第八月辛亥幸永穆公主宅十月庚寅幸岐州之鳯泉湯癸卯至自鳯泉湯十一月丁卯幸新豐温泉湯十九年六月丁卯制曰三秦九雒咸曰帝京五載一廵時惟邦典上腴多饒衍之美仍勞於轉輸中壤均舟車之凑頗聞於殷積朕所以相時度宜期于利物者也況河汴頻稔江淮屢登二周馳望幸之誠三川勤傒予之請然猶未便順動且念人勞期以來年方議時邁而頃京輔近甸膏澤未均陜雒之交稼穡亦盛固不可俟於今日庶用協乎光天豈肆心於宴安期順人而從幸兩京供帳宿有儲擬十月滌塲是因暇隙信可備法駕整勾陳清蹕崤潼觀風河雒宜以今年十月四日幸東都所司准式十月丙中幸東都勑供頓州縣百姓所縁料及充木匠雜祗供人等宜放今年地租自餘戶等免今年地税半應定供頓縣官各與一中上考庚辰至東都二十年七月甲辰制曰昔之握皇綱執大象者或省方以肆觀或廵狩以觀風故軒轅至崆峒之野夏禹列塗山之會雖徃古遺事先王髙迹觀其出豫稍渉遐逺朕自臨馭天下底綏人極法駕罕順動之儀蒼生多傒來之歎每欲時邁因而布和憚于人勞必也中止惟彼堯俗古風猶遽方於譙郡王業是同西漢髙皇永懐于沛邑東京數帝每幸於舂陵豈不逺思喬木無忘敬梓況境乃近壤城惟列都既行幸是嘗亦情禮兼遂又嵩郡天險方位土中而陵寢地遥攀望増感且布政而行化實展懐於志思宜取今年十月十二日幸北都便還西京所司准式十月壬午駕發東都北廵辛丑至北都庚申祀后土於脽上十二月辛未至京師二十一年正月丁巳幸温泉宫丁亥還京十月庚戌幸温泉宫己未還京二十二年正月己巳幸東都己丑至東都二十三年十月詔曰朕所時邁皆狥物情屬闗輔無年遽爾東顧幸非為己將以息人今百榖既登庶事皆省而五陵所奉誠在京師安可更留周南有闕時薦宜以來年正月七日取南路幸西京所司准式縁行幸所湏務從節減所司明為條例勿使勞煩二十四年正月勅以前議西幸屬嵗不登闗輔之間且欲無擾今稼漸熟漕運復多而陵寢久違蒸嘗永感農隙順動得非其時前取今年十月幸西京者以其月三日發東都取南路應縁頓所要務從節減所司明為條例勿有煩勞十月戊申發東都幸京師甲子至陜州丁亥至京二十五年十一月壬申幸温泉宫乙酉至自温泉宫十二月戊午幸寧王宅二十六年五月庚寅幸咸宜公主宅十月戊寅幸温泉宫庚辰至自温泉宫二十七年十月甲戌幸温泉宫十一月辛丑至自温泉宫二十八年正月癸巳幸温泉宫庚子至自温泉宫十月甲子幸温泉宫辛巳至自温泉宫二十九年正月癸亥幸温泉宫庚子至自温泉宫十月丙申幸温泉宫十一月辛酉至自温泉宫册府元龜卷一百十三
