body:
  text: 册府元龜卷一百十三宋王欽若等撰帝王部廵幸第二後周明帝以閔帝元年九月即位時未建年紀二年六月辛未辛昆明池九月丁未幸同州過故宅賦詩曰玉燭調秋氣金輿歴舊宫還如過白水更似入新豐霜潭漬晚菊寒井落疎桐舉盃延故老令聞歌大風十月辛酉還宫武帝保定三年七月戊辰行幸原州丁丑幸津門問百年賜錢帛又賜髙年板職有差九月甲子自原州登隴山丙戌幸同州十二月辛卯至自同州四年十月丁卯幸沙苑勞師時遣師伐齊癸酉還宫五年二月壬申行幸岐州七月庚寅行幸秦州八月丙子至自秦州天和元年十一月丙戌行幸武功等新城十二月庚申還宫三年二月丁卯幸武功丁亥還宫五月庚申行幸醴泉宫七月戊午至自醴泉宫十一月甲辰行幸岐陽十二月丁丑至自岐陽四年五月戊戌行幸醴泉宫七月辛亥至自醴泉宫五年四月甲寅行幸醴泉宫七月乙卯至自醴泉宫六年十一月丁巳行幸散闗十二月己丑還宫建徳元年十一月庚戌行幸羌橋集京城以東諸軍都督以上頒賜有差乙卯還宫十二月壬申行幸斜谷集京城以西諸軍都督已上頒賜有差丙戌還宫三年二月乙卯行幸雲陽宫三月辛酉至自雲陽宫七月庚申行幸雲陽宫戊子至自雲陽宫八月丙申行幸雲陽宫九月庚申幸同州十月甲寅行幸蒲州丙辰行幸同州十一月己巳大閲于城東甲戌至自同州四年正月癸酉行幸同州三月丙寅至自同州七月丙辰行幸雲陽宫丁卯至自雲陽宫十月甲午行幸同州十二月庚午至自同州五年正月癸未行幸同州辛卯行幸河東涑川甲午還同州三月壬寅至自同州四月乙卯行幸同州五月壬辰至自同州六月丁巳行幸雲陽宫八月乙卯至自雲陽宫六年五月癸巳行幸雲陽宫六月丁未至自雲陽宫甲子帝東廵七月丙戌行幸雒州十月戊申行幸鄴宫十二月庚申行幸并州宫宣政元年正月壬午行幸鄴宫辛卯行幸懐州置宫二月丁巳帝至自東廵宣帝宣政元年六月即位八月壬申行幸同州十月癸酉至自同州大象元年正月甲辰東廵狩戊午行幸雒陽二月乙亥行幸鄴辛巳詔傳位於太子自稱大元皇帝三月庚申至自東廵大陳軍伍帝親擐甲胄入自青門皇帝衍備法駕從入百官迎于青門外其時驟雨儀衛失容自此以後宣帝行幸八月庚申行幸同州壬申還宫十一月乙未行幸同州壬寅還宫十二月乙丑行幸雒陽帝親御驛馬日行三百里四皇后及文武侍衛數百人並驛以從仍令四后方駕齊驅或有先後便加譴責人馬頓仆相屬二年二月辛卯行幸同州増候正前驅式道為三百六十重自應門至於赤岸澤數十里間幡旗相蔽鼓樂俱作又令武賁持鈒馬上稱警蹕以至同州隋文帝開皇元年十月壬辰行幸岐州十二月庚子至自岐州二年正月癸丑幸上柱國王誼第庚申幸安成長公主第二月辛卯幸趙國公獨孤陀第三年六月乙未幸安成長公主第九月壬子幸城東觀稼四年二月庚戌幸隴州九月甲子幸襄國公主第乙丑幸㶚水觀漕渠賜督役者帛各有差甲戌以闗内饑幸雒陽五年四月戊申至自雒陽八月己酉幸栗園九月丁巳至自栗園七年二月壬申幸醴泉宫四月己酉幸晉王第十月庚申行幸同州以先帝所居降囚徒癸亥幸蒲州丙寅宴父老上極歡曰此間人物衣服鮮麗容止閑雅良繇仕宦之鄉陶染成俗也十一月甲午幸馮翊親祠故社父老對詔失㫖帝大怒免其縣官而去戊戌至自馮翊八年十一月乙亥行幸定城陳師誓衆時遣師伐陳丙子幸河東十二月庚子至自河東九年四月己亥幸驪山勞旋師也十年二月庚申幸并州四月辛酉至自并州十一月辛卯幸國學頒賜各有差十一年八月壬申幸栗園乙亥至自栗園十二年七月壬戌幸昆明池其日還宫八月乙亥幸龍首池十三年正月壬戌行幸岐州二月丁亥至自岐州七月丁巳幸昆明池十四年十二月乙未東廵狩十五年正月壬戌次齊州親問疾苦三月己未至自東廵狩丁亥幸仁夀宫九月至自仁夀宫十一月辛酉幸温湯乙丑至自温湯十六年十月己丑幸長春宫十一月壬子至自長春宫十七年二月庚寅幸仁夀宫九月甲申至自仁夀宫十八年二月甲辰幸仁夀宫九月辛卯至自仁夀宫十二月自京師至仁夀宫置行宫十有二所十九年二月甲寅幸仁夀宫二十年九月丁未至自仁夀宫仁夀二年三月己亥幸仁夀宫九月丙戌至自仁夀宫四年正月甲子幸仁夀宫煬帝以仁夀四年即位十一月乙未幸雒陽大業元年八月壬寅帝御龍舟幸江都以左武侯大將軍郭衍為前軍李景為後軍文武官五品已上給樓船九品以上給黄篾舟舳艫相接二百餘里二年三月庚午發江都四月庚戌帝自伊闕陳法駕備千乗萬騎入于東京三年三月辛亥自東京還京師四月庚辰詔曰古者帝王觀風問俗皆所以憂勤兆庶安集遐荒自蕃夷内附未遑親撫山東經亂湏加存恤今欲安輯河北廵省趙魏所司依式丙申車駕北廵狩戊戌勅百司不得踐暴禾稼其有湏開為路者有司計地所收即以近倉酬賜務從優厚己亥次赤岸澤戊午發河北十餘郡丁男鑿太行山逹于弁州以通馳道六月戊子次榆林郡甲辰帝御北樓觀漁于河以宴百僚八月壬午車駕發榆林啓民可汗飾廬清道以候乗輿帝幸其帳啓民奉觴上夀宴賜極厚皇后亦幸義成公主帳癸巳入樓煩闗壬寅次太原營晉陽宫九月乙未次濟源幸御史大夫張衡宅宴享極歡己巳至于東都四年三月己亥幸大原因出塞廵長城八月辛酉親祀恒岳河北道牧守畢集大赦天下凡經縣免一年租調五年正月帝自東都還京師二月戊戌次閿郷詔祭古帝王陵及開皇功臣墓戊申至京師三月己巳西廵河右乙亥幸扶風舊宅四月癸亥出臨闗渡黄河至西平陳兵講武五月庚辰入長寧谷度星嶺甲申宴羣臣於金山之上丙戌梁浩亹上音閣下音門水名御馬渡而橋壊斬朝散大夫黄亘及督役者九人六月癸卯經大斗㧞谷山路隘險魚貫而出風霰晦㝠與從官相失士卒凍死者大半丙午次張掖丙辰御觀風行殿盛陳文物奏九部樂設魚龍曼延宴髙昌王吐屯設於殿上以寵異之蠻夷陪列者三十餘國九月入長安十一月丙子幸東都六年三月癸亥幸江都宫七年二月己未升釣臺臨楊子津大宴百寮乙亥自江都御龍舟入通濟渠遂幸涿郡詔征髙麗四月庚午至涿郡之臨朔宫八年正月辛巳大軍集于涿郡三月辛巳御師戊子臨戎于遼水甲午渡遼自此以後事迹具帝王親征門七月軍敗班師九月庚寅至東都九年三月戊寅幸遼東以越王侗民部尚書樊子盖留守東都四月庚午車駕度遼六月庚午以楊𤣥感反于黎陽遂班師閏九月己巳幸愽陵庚午謂侍臣曰朕昔從先朝周旋于此年甫八嵗日月不居倐經三紀追惟平昔不可復希言未卒流涕嗚咽侍衛者皆泣下霑襟十年二月詔親征髙麗三月壬子行幸涿郡癸亥次臨渝宫甲午次北平七月癸丑次懐逺鎮甲子髙麗遣使降帝大恱八月己巳班師十月丁卯至東都己丑還京師十二月壬申如東都戊子入東都十一年三月幸太原避暑汾陽宫八月乙卯廵北塞戊辰突厥始畢可汗率騎數十萬謀襲乗輿義成公主遣使告變壬申馳幸鴈門癸酉突厥圍城官軍頻戰不利帝大懼欲潰圍而出民部尚書樊子盖固諫乃止九月甲辰突厥解圍而去十月壬戌至于東都十二年七月甲子幸江都宫以越王侗光禄大夫叚逹太府卿元文都檢校民部尚書韋津右武衛將軍皇甫無逸右司郎盧楚等總留後事奉信郎崔民象以盜賊充斥於建國門上表諫不宜廵幸帝大怒先解其頥乃斬之己巳車駕次淝奉信郎王愛仁諫帝請還西京又斬之而行唐髙祖武徳元年十二月乙酉幸周氏陂過故庄置酒髙會極歡而罷丁亥至自周氏陂二年十月乙卯以秦王世民東伐王世充車駕幸華隂送出師也三年正月癸巳至自華隂二月庚子幸華隂四月壬寅至自華隂六月癸丑幸昆明池四年正月乙酉幸山堰即日還宫閏十月乙卯幸稷州己未次于武功舊庄庚申召父老故吏男女數百人置酒髙會賜帛有差辛未幸周氏陂壬申還京師六年二月庚戌幸温湯甲寅至自温湯三月乙未幸昆明池宴從官極歡而罷四月乙未幸故宅改名通義宫祭元皇帝于舊寢以貞皇后配享髙祖哽咽悲不自勝侍衛莫不歔欷於是置酒髙會賜從臣帛有差十月乙未幸華隂十一月迎勞秦王於忘武頓十二月甲寅至自華隂七年正月庚子幸月陂六月辛丑幸仁智宫戊申幸秦王第七月甲午至自仁智宫壬子幸東宫宴從官下至胥徒頒賜有差甲寅幸齊王元吉第十月丁卯幸慶善宫癸酉幸終南丙子幸樓觀謁老子廟十二月丁卯幸躍龍宫庚午至自慶善宫八年正月甲寅幸秦王第謂羣臣曰朕以秦王有大功於宫中立第以異之焉甲子幸月陂六月庚子幸太和宫七月丙子至自太和宫十月辛巳幸周氏陂壬午幸躍龍宫十一月辛卯幸宜州十二月辛酉至自宜州九年正月己未幸月陂三月丙午幸周氏陂乙夘至自周氏陂太宗貞觀四年二月己亥幸温湯丙午至自温湯九月乙卯幸隴州十一月甲子至自隴州五年十二月壬寅幸温湯戊申至自温湯六年三月戊辰幸九成宫發使存問髙年鰥寡十月乙卯至自九成宫七年五月癸未幸九成宫十月庚申至自九成宫十一月甲寅幸芙蓉園八年三月庚辰幸九成宫十月甲子至自九成宫十一年二月甲子幸雒陽宫三月戊子引五品以上射於儀鸞殿庚子宴三品以上於西苑帝御龍舟沈於積翠池六月丁巳幸明徳宫十一月辛卯幸懐州丙午還雒陽十二年二月癸亥自雒陽幸河北縣觀砥柱因勒銘于其上以陳盛徳庚午幸蒲州甲戌幸長春宫閏二月丁未至自雒陽宫十三年四月幸九成宫十一月甲申至自九成宫十四年二月壬午幸温湯辛卯至自温湯十五年正月辛巳如雒陽次温湯衛士崔卿刁文懿憚於行役冀鑾輿驚擾而停遂夜射行宫矢及寢院者五皆以大逆論己丑詔從行士卒家貧親老者並放還二月癸丑宴從官及山東宗姓雒陽年髙於貞觀殿三月戊辰如襄城宫庚午發襄成宫分賜百姓十月壬辰幸嵩陽辛丑還宫十一月壬申還京十二月戊子至自雒陽十六年十一月丙辰西狩於武功甲子幸慶善宫庚午還宫十二月癸卯行幸温湯乙巳還宫十七年十月壬戌幸芙蓉園十二月庚申幸温湯庚午還宫十八年正月乙未幸鍾官城庚子幸鄠縣壬寅幸温湯二月己酉幸靈口村落偪側問其受田丁三十畆遂夜分而寢憂其不給詔雍州録尤少田者並給復移之於寛郷乙卯還宫四月辛亥幸九成宫壬子次太平宫八月甲子至自九成宫十月甲寅幸雒陽宫十一月壬申至雒陽宫戊寅親録囚徒多所降免庚辰遣使齎璽書詣鄭汝懐澤四州廵問髙年宴賜各有差壬午宴父老一百九十人於儀鑾殿班賜有差是月征遼之兵大聚於幽州帝將親征十九年二月庚戌發雒陽宫辛亥次河陽女子吕年百七十嵗太宗幸其宅存問之癸丑次綏徳太宗將飛騎厯北山行遇猛虎引弓射之應弦而殪戊午次汲縣女子翟張並年百嵗太宗幸其宅存問之壬戌次安陽癸亥次於鄴三月壬申次平棘幸張道鴻之廬賜以衣服禮髙年也道鴻餌金膏時一百四十六嵗丁丑幸定州壬辰發定州四月丁未發幽州丁巳次北平登臨海戍降望大壑五月庚午次遼澤壬申渡澤丁丑渡遼六月丁未發遼東丙辰次安市城九月癸未太宗以季秋草枯遼寒冽即命班師自發幽州後督職納降事迹並見帝王親征門十月丙申次蒲溝丙午次營州丙辰次圍山戊午次漢武臺十一月辛未次幽州庚辰次易州丙戌幸定州壬辰發定州戊戌幸并州二