body:
  text: 册府元龜卷三百三十九宋王欽若等撰宰輔部邪佞忌害不忠邪佞夫秉國鈞以維四方財物宜而貞百度佐佑乃辟朝夕納誨者宰輔之任也自漢氏而下居其位者乃有體異忠懃性恣便佞徒茍患於失位罔以道而事君乃至專為從諛以順上指姑務朋比以為身謀惡直醜正而事先媮合茍容而為念巧言令色曾靡於顧憚脅肩謟笑惟事於詭隨以至王綱日頺厲階斯構大或崩於禍亂次或罹於譴黜蓋夫謀猷囘遹周雅之所譏方命圮族堯誅之首及顧豈可處承弼之重哉漢公孫𢎞武帝時為丞相嘗與公卿約議至帝前皆背其約以順帝㫖主爵都尉汲黯庭詰曰齊人多詐而無情始與臣等建此議乃今皆背約不忠帝問𢎞𢎞謝曰夫知臣者以臣為忠不知臣者以臣為不忠帝然𢎞言左右幸臣每毁𢎞帝益厚遇之𢎞治春秋不如董仲舒而𢎞希世用事位至公卿仲舒以𢎞為從䛕𢎞嫉之孔光為丞相哀帝故令董賢私過光光雅恭謹知哀帝欲尊寵大司馬董賢及聞賢當來也光警戒衣冠出門待望見賢車乃却入賢至中門光入閣既下車乃出拜謁送迎甚謹不敢以賔客鈞敵主禮賢歸帝聞之喜立拜光兩兄子諫大夫常侍賢繇是權與人主侔矣晉荀顗為司空無質直之操唯阿意茍合於荀朂賈充之間初皇太子將納妃顗上言賈充女資德淑茂可以叅選以此獲譏於世賈充武帝時為尚書令侍中充無方正之操不能正身率下專以謟媚取容侍中任顗中書令庾純等剛直守正咸共疾之荀朂為侍中尚書監時侍中尚書令賈充將鎮關中朝之賢良欲進忠規獻替者皆幸充此舉望隆維新之化充既外出自以為失職深銜任顗計無所從將之鎮百寮餞於夕陽亭朂私焉充以憂告朂曰公國之宰輔而為一夫所制不亦鄙乎然是行也辭之實難獨有結婚太子不頓駕而自留矣充曰然孰可寄懐朂曰朂請言之俄而侍宴論太子婚姻事朂因言曰充女才質令淑宜配儲宫而楊皇后及荀顗亦竝稱之帝納其言㑹京師大雪平地三尺軍不得發既而皇儲當婚遂不西行詔充居本職當時甚為正直者所疾而獲佞媚之譏焉陳江總為尚書令後主之世總當權位不持政務但日與後主㳺宴後庭共陳瑄孔範王瑗等十餘人當時謂之狎客繇是國政日頺紀綱不立有言之者輙以罪斥之君臣昏亂以至於滅亡北齊和士開後主武成初為尚書令録尚書事士開禀性庸鄙不闚書𫝊發言吐論唯以謟媚自資隋楊素高祖時為尚書右僕射專掌朝政帝令素監營仁夀宫素遂夷山堙谷督役嚴急作者多死宫側時聞鬼哭之聲及宫成帝令高熲前視奏稱頗傷綺麗大損人丁高祖不恱素憂懼計無所出即於北門啓獨孤皇后曰帝王法有離宫别館今天下太平造此一宫何足損費后以此理喻帝帝意乃解於是賜錢百萬錦絹三千叚及太子勇敗長子長寧王儼亦坐廢黜上表乞宿衛辭情哀切高祖覽而憫然素進曰伏願聖心同於螫手不宜復留意虞世基煬帝時為内史侍郎專典朝政于時天下大亂世基知帝不可諫正又以高熲張衡等相繼誅戮懼禍及己雖居近侍唯諾取容不敢忤意盜賊日甚郡縣多沒世基知帝惡數聞之後有告敗者乃抑損表狀不以實聞是後外間有變帝弗之知也嘗遣太僕楊義臣捕盜於河北降賊數十萬列狀上聞帝歎曰我初不聞賊頓如此義臣降賊何多也世基對曰䑕竊雖多未足為慮義臣克之擁兵不少乆在閫外此最非宜帝曰卿言是也遽追義臣放其兵散又越王侗遣太常丞元善逹間行賊中詣江都奏事稱李密有衆百萬圍逼京都入據厫倉城内無食若陛下速還烏合必散不然則東都必敗因欷歔嗚咽帝為之改容世基見帝色憂進曰越王年小此輩誑之若如所言善逹何縁而至帝乃勃然怒曰善逹小人敢廷辱我因使經賊中向東陽催運善逹遂為羣盜所害此後外人杜口莫敢以聞奏世基貌沈審言多合意是以特見親愛朝臣無與於比唐封倫太宗即位初無右僕射倫素險詖與左僕射蕭瑀商量可奏者至太宗前盡易之李勣高宗時為司空永徽末將廢皇后王氏立昭儀武氏為皇后尚書右僕射同中書門下三品褚遂良叩頭流血言不可廢翼日帝謂勣曰册立武昭儀之事遂良固執不從遂良既是受顧命大臣事若不可當且止也勣對曰此乃陛下家事不合問外人帝乃立昭儀為皇后姚璹則天時為納言證聖九年正月辛巳詔賜大酺三日丙申明堂火左拾遺劉承慶諫曰明堂當宗祀之所今忽被焚陛下宜輟朝以答天譴后然其言欲責躬避正殿璹進曰此實人火非天災也至如成周宣榭火卜代愈隆漢武建章宫災盛徳彌永今明堂乃是布政之所非宗廟之地陛下將避正殿於大禮有乖后又從之乃御端門縱觀而罷楊再思則天時為鳯閣鸞臺平章事累為内史知政十餘年未嘗有所薦逹為人巧佞邪媚能得人主微旨主意不欲必因而毁之主意所欲必因而譽之長安未張昌宗為法司所鞫司刑少卿桓彦範斷解其職昌宗抗表稱寃則天意將申理昌宗廷問宰臣曰昌宗於國有功否再思對曰昌宗徃因合鍊神丹聖躬服之有效此實莫大之功則天甚恱昌宗因以復職時人貴彦範而賤再思也時左補闕戴令言作兩脚野狐賦以譏刺之再思聞之甚怒出令言為長杜令朝士尤加嗤笑張易之兄司禮少卿同休嘗奏請公卿大臣宴於司禮寺預其㑹者皆盡醉極歡同休戯曰楊内史面似高麗再思欣然請剪紙自貼於中却披紫袍為高麗舞縈頭舒手舉動合節滿座嗤笑又昌宗以姿貌見寵倖再思又諛之曰人言六郎面似蓮花再思以為蓮花似六郎非六郎似蓮花也其傾巧取媚如此宗楚客中宗時為兵部尚書令神龍三年節愍太子死後楚客率百僚上表加后號為順天翊聖皇后趙彦昭中宗時為中書侍郎景龍四年金城公主出降吐蕃贊普帝初謂侍中紀處訥曰昔文成公主出降則江夏王送之入畨卿雅識審情有安邊之略可為朕充此使也處納拜謝既而以不練邊事固辭帝遂令彦昭代行彦昭以既充外使恐失其寵殊不悦司農卿趙履温私謂曰公國之宰輔而為一介之使不亦鄙乎彦昭曰計將安出履温因為隂託安樂公主密留之帝乃遣楊矩代彦昭而徃韋巨源中宗時為尚書左僕射韋皇后衣箱中裙上有五色雲起乆而方歇巨源以為非常嘉瑞請布告天下許之崔湜睿宗時因太平公主為中書侍郎同中書門下三品公主即武攸暨妻當延秀伏辜諸武竝流嶺外湜以公主故徙於嶺北授以州縣官竇懐貞為侍中睿宗為金仙玉真二公主創立兩觀料工甚多時議皆以為不可惟懐貞贊成其事躬自監役後懐貞族弟詹事司直維鑒謂懐貞曰兄位極台衮當思獻可替否以輔明主奈何較量瓦木厠跡工匠之間欲令海内何所瞻仰懐貞不能對而監作如故時人謂之語曰竇僕射前為韋氏國㸙者今作公主邑丞言懐貞伏事公主同於邑官也李林甫𤣥宗時為禮部尚書同中書門下三品林甫面柔而有狡計能伺候人主意故驟列清班為時委任而中官妃家皆厚結託伺帝動静皆豫知之故出言進奏動必稱旨李揆代宗時為中書侍郎平章事自以山東甲族位居台輔見李輔國執子弟之禮謂之五父崔損徳宗時為諫議大夫平章事為相過為恭遜接見便辟不止於容身而已自建中以後居相位者數皆罷黜損用此中帝意竊大任者八年帝知物議鄙其持禄取容然憐而厚之皇甫鏄為户部侍郎判度支與鹽鐡使程异同日以本官平章事鏄雖有吏才素無公望特以聚歛媚上刻削希恩後唐豆盧革莊宗時為平章事同光元年魏州興建革奏曰皇子之職故事合帶宫使革因進擬以興聖為名授皇子繼岌議者以古之王者稱孤寡不穀以示其謙本朝宫名罕有帶聖字者豆盧革謟事希寵識者罪之三年大水户口流亡軍士乏食革依阿狥旨竟無所陳但云陛下威徳冠天下今西蜀平定珍貨甚多可以給軍水旱作沴天之常道不足以貽聖憂又以同列郭崇韜父名𢎞希其意奏改𢎞文舘為崇文舘至明宗天成二年乃復焉安重誨明宗時為樞密使天成二年十月請于諸道州府自同光二年以前所欠秋粮夏稅租并主持務局敗闕課利并沿河舟船折欠天成元年殘欠夏稅竝特與除放時重誨既搆任圜之禍恐人非之思市恩于衆以掩己過乃奏曰三司積欠二百萬貫虚係帳額請竝蠲放帝重違其意故有是詔時議民以蠲隔年之賦或恵民塲院課利一槩除之得不啓奸倖之門乎范延光為樞宻使長興三年二月明宗顧謂侍臣曰朕昨日以雨霽暫觀緑野遙望西南山坡之下初謂羣羊俯而察之乃貧民耦耕朕甚憫焉范延光對曰陛下輕徭薄賦所以村落之間日勤於稼穡也是時帝哀疲民多無耕牛劚地以種延光以為勤於稼穡豈主上憂民之意歟孔循為樞宻使性柔而狡安重誨初不察其為人多從其言重誨嘗受詔以秦王從榮兄弟欲娶重誨女為妻循謂重誨曰不可公為機宻之臣不宜與皇子婚媾乃止明宗幸汴州循為洛京留守時重誨門人或言循之難測愛間諜人事不可令居樞宻循知之即令人結託方便聞奏言願以息女妃皇子帝即以鄂王許之重誨繇是大怒因奏落樞宻出鎮為許州節度復移鎮滄州及重誨將失勢内廷論樞宻使帝曰孔循舊嘗為之不亦可乎循在滄州聞上言即治行裝將入朝㑹從榮以鄂王妻父尤忌疾之初聞帝有徴循之言正人無不憂之咸以為將來無益於社稷俄而循卒晉馮玉為右僕射平章事開運末張彦澤引契丹䧟京城軍士爭凑其第家財巨萬一夕罄空翼日玉假蓋而出猶繞指以謟彦澤且請引送玉璽於虜主將利其復用少帝蒙塵終無一言勸之以死共欲偷安視息深為士大夫所恥忌害夫懐强忮之心蓄囘遹之計以蔽賢為念搆害能之禍忌賢而固寵惡直而醜正斯人倫之㓙徳天罰之不宥者也其或以小人之質乗君子之噐竊據台鼎躬握鈞樞啟納乃猷進退多士而乃乗乎威勢恣其愛憎巧誣善良中傷才彦或壅隔於外俾蹈乎禍機或交搆於中驅致於吏議或沮其覲見之禮或遏其柄用之命至使耆徳棄逺吉士幽憤悖王化之紀致國家之敗曷嘗不繇是哉漢公孫𢎞武帝時為御史大夫遷丞相其性意忌外寛内深諸常與𢎞有隙無近逺雖陽與善後竟報其過殺主父偃徙董仲舒膠西皆𢎞力也張湯為御史大夫臣欽若等曰漢初丞相太尉御史大夫同為三公也河東人李文故嘗與湯有隙已而為御史中丞薦數從中文事有可以傷湯者不能為地薦音在見反數音所角反言數數在中有文書事可用傷湯者不為作道地也湯有所愛史魯謁居知湯弗平使人上飛變告文姦事飛變猶急變也事下湯湯治殺文後漢梁冀為大將軍輔政時太后臨朝有日食地震之變詔公卿舉賢良方正光禄勲杜喬少府房植舉荀淑淑對䇿譏刺貴倖為冀所忌補朗陵侯相又南郡太守馬融有事忤冀㫖諷有司奏融在郡貪濁免官髠徙朔方晉賈充武帝時為尚書令侍中任愷惡充之為人也不欲令乆執朝政每裁抑焉充疾之不知所為後乗間言愷忠貞局正宜在東宫使䕶太子帝從之以為太子少傅而侍中如故充計畫不行或為充謀曰愷總門下樞要得帝與親接宜啓令典選便得漸疎此一都令史事耳且九流難精間隙易乗充因稱愷才能宜在官人之職帝不之疑謂充舉得其才即日以愷為吏部尚書愷既在尚書選舉公平盡心所職然侍覲轉希充與荀朂乗間浸潤謂愷豪侈用御食噐充遣尚書左僕射高陽王珪奏愷免官有司收太官宰人簡覈是愷妻齊長公主得賜魏時御噐也愷既免而毁謗益至帝漸薄愷後為光禄勲在公勤恪甚得朝野稱舉而充朋黨又諷有司奏愷與立進令劉友交關事下尚書愷對不伏尚書杜友廷尉劉良竝公忠士也知愷為充所抑與申理之故遲留而未斷以是愷及友良皆免官荀朂為中書監侍中與散騎侍郎阮咸論音律自以為逺不及也疾之出補始平太守傅亮為尚書令輔政自以文義之美一時莫及太子舎人顔延之負其才辭不為之下亮甚疾焉少帝即位延之自員外常侍出為始安太守領軍將軍謝晦謂延之曰昔荀朂忌阮咸斥為始平郡令卿又為始安可謂二始黄門郎殷景仁亦謂之曰所謂俗惡俊異世疵文雅南齊王儉為尚書令輔政時太祖用張緒為右僕射以問儉儉曰南士繇來少居此職禇淵在座咨帝曰儉年少或不盡憶江左用陸玩顧和皆南人也儉曰晉時衰政不可以為凖帝乃止後魏高肇宣武時遷司徒忌衛尉卿于忠樸厚少言欲密出之乃言於帝稱中山要鎮作捍須才以忠噐能宜居其位於是出忠授安北將軍定州刺史隋虞世基為内史侍郎叅掌朝政時納言蘓威坐事除名為民從幸江都宫煬帝將復用威世基與裴藴奏言威昏老羸疾乃止唐李義府高宗永徽中為中書侍郎同中書門下三品其狀貌温恭與人語必嬉怡微笑而褊忌隂賊既處權要欲人附己微忤意者輙加傾䧟故時人言義府笑中有刀又以其柔而害物亦謂之李猫許敬宗高宗顯慶中為中書令初皇后武氏以長孫無忌受重賜而不助己也深啣之又韋寧預聞廢立之謀獨無言以持兩端亦不恱無忌以敬宗希㫖附㑹嘗正面折之繇是敬宗常伺無忌將因事搆䧟之㑹有洛陽人李奉節上封告太子洗馬韋季方監察御史李巢交通朝貴有朋黨之事詔敬宗與侍中辛茂將命鞫之敬宗按之甚急季方事廹自刺不死又搜奉節得私書有題與趙師者遂奏言趙師即無忌也隂為隠語擬䧟忠良伺隙謀反帝驚曰豈當有此或容惡人間構小生疑阻至于即反猶恐不然敬宗奏曰臣始未推勘自奉節有趙師之言又得偽書是季方所作即疑無忌欲反使其濳行搆間斥除忠臣近戚此計若行自然權歸無忌蹤跡已露陛下猶有所疑恐非社稷之福帝泣曰我家不幸親戚中頻有惡事徃年高陽公主與朕同氣遂共其夫叶計謀反今阿舅復作惡心近親如此使我慙見百姓此事若實當如之何敬宗奏曰房遺愛乳臭小兒與女子謀反寧能成事豈如無忌當今姦雄天下之所畏伏若一旦竊發陛下遣誰當之此是宗廟有靈皇天疾惡因推小事發其大罪豈非天下之慶臣恐無忌知季方自刺即為急計攘袂一呼嘯命同惡必為宗廟之憂臣徃見字文化及其父述為煬帝所委地居親婭身執國權十有餘年勢傾天下父終子繼化及典禁兵遂於江都作亂初夜宫城門閉即稱驍果欲叛矯制集人先殺不同己者臣家亦即被破蘓威裴矩崔君肅等皆於馬前舞蹈比至天明即傾隋室故事不逺誠願陛下決之帝又令審加按問翌日敬宗又奏曰昨夜臣聞季方語無忌與國至親累葉恩任何恨而反答云韓瑗嘗語無忌云栁奭褚遂良等勸舅立梁王為太子今梁王既廢帝又疑舅故遣高履行外出自安之計見長孫祥又出及瑗得罪即日夜共季方等圖謀覔便即反臣參驗辭狀竝相符合請即收捕凖法破家帝又泣曰阿舅果爾我决不忍殺之若處分與罪後代書史道我不能和其親戚使至於此天下將謂我何敬宗曰漢文帝漢室之明主薄昭即是阿舅從代來日亦有大勲于後唯坐無辜殺人帝惜國之法紀遂令朝臣䘮服就宅哭而殺之良史不以為失今無忌忘先朝之大徳捨陛下至親聽受邪謀遂懐悖逆意在移社稷傾宗廟撓亂天下塗炭生靈若比薄昭罪惡未可同日而語按諸刑典合誅五族願速即處分以安天下臣聞當斷不斷反受其亂大機之事間不容髮若少遲延恐即生變且無忌先朝謀取天下天下伏其智作宰相三十年百姓畏其威可謂威能伏物智能動衆有同漢之王莽魏之司馬懿今反從首露逆黨自承陛下何疑不即斷決帝竟不親問無忌便下詔廷斥之仍發遣次州府兵援送於黔州其子秘書監駙馬都尉冲等竝除名配流嶺表李敬𤣥為中書令高宗咸亨中聞朱敬則之名召見與語大恱將加擢用敬𤣥深毁之遂受洹水縣張說為中書令𤣥宗開元十三年車駕東封囘陳州刺史李邕於汴州謁獻詞賦甚稱帝㫖頗自矜衒說甚惡之李林甫開元末為中書令耽寵固權己自封植朝望稍著必隂計中傷之初韋堅登朝以堅皇太子妃兄引居要職示結恩信實圖傾之乃濳令御史中丞楊慎矜隂伺堅隙㑹正月望夜皇太子出遊與堅相見慎矜知之奏帝帝大怒以為不軌黜堅林甫因是奏李適之與韋堅昵狎及裴寛韓朝宗竝曲附適之帝以為然賜堅自盡後慎矜權位漸盛林甫又忌之乃引王鉷為御史中丞托以心腹鉷希林甫意遂誣罔宻奏慎矜左道不法遂族其家天寶八載太府趙奉璋告林甫罪狀一十餘條告書未上林甫知之諷御史臺逮捕以為妖言重杖決殺李揆肅宗時為中書侍郎平章事修國史矜能䕶短以工部侍郎于休烈修國史與己齊列嫉之力奏改為國子祭酒權留史館修撰以下之元載為户部侍郎同中書門下平章事引用私黨懼朝臣論奏其短乃請百官凡欲論事皆先白長官長官白宰相然後上聞檢校刑部尚書知省事顔真卿上疏論之具言如今日之事曠古未有雖李林甫楊國忠不敢公然如此後真卿攝上公享太廟以祭噐不修抗詞白于執政載怙權真卿素不附載載因坐以誹謗貶真卿陜州員外别駕又李栖筠為工部侍郎公望充積為載所出為常州刺史盧杞為門下侍郎平章事徳宗建中時詔徴汾州刺史劉暹暹剛腸嫉惡歴典數州皆為亷史畏憚杞恐暹為御史大夫沮己之所見遽稱薦前河南尹于頎為御史大夫以其柔佞易制也又太常卿韋倫奉使稱㫖西蕃敬服朝廷得失上疏言之為杞所惡改太子少保徳宗幸奉天右僕射崔寧流涕論時事杞聞惡之譖於徳宗言寧與朱泚盟誓故至遲廻寧遂見殺又宰相張鎰忠正有才徳宗所委信杞頗惡之鎰尋罷相杞專權忌害又罷顔真卿禮儀使改太子太師仍諭之日方面之任何處為便真卿候杞於中書曰真卿以褊性為小人所憎竄逐非一今已羸老幸相公庇之相公先中丞𫝊首至平原面上血真卿不敢衣拂以舌䑛之相公忍不相容乎杞矍然而拜含怒於心會李希烈陷汝州杞乃奏曰顔真卿四方所信使論之可不勞師旅帝從之朝廷失色李勉聞之以為失一元老貽朝廷羞宻表請留又遣逆於路不及後真卿為希烈所害竇參為中書侍郎平章事徳宗貞元中趙憬為尚書左丞綱轄省務清勤奉職參惡其能請出為同州刺史徳宗不從八年四月參罷黜憬與陸贄竝拜中書侍郎同平章事初參不恱李翰白宗正卿左授雅王傅及廷對自陳為參所排又言事合㫖及黜虢王則之徳宗命參以翰代之參不時下詔書翰未之知也帝口授翰金吾大將軍遽令中使送至金吾仗視事除書令方下陸贄為中書侍郎平章事素惡于公異于邵既輔政而遂之談者亦以為隘皇甫鏄憲宗元和中自度支使戸部侍郎為平章事初鏄隂結權倖以求宰相崔羣累疏其奸邪憲宗終用鏄為宰相無何羣臣議上尊號而鏄欲加孝徳兩字羣曰有睿聖則孝徳在中矣竟為鏄所構出為湖南觀察使李逢吉憲宗朝為門下侍郎平章事時用兵討淮蔡帝以兵機委裴度逢吉慮其成功宻沮之繇是相惡穆宗長慶初逢吉為兵部尚書時裴度自太原入朝以招懐河朔功度復與工部侍郎元稹相次拜平章事度在太原時常表論元稹姦邪及同居相位逢吉以為勢必相傾乃遣人告和王𫝊于方結客欲為稹刺度及捕于方鞫之無狀稹度俱罷相位逢吉代為門下侍郎平章事自是寖以恩澤結朝臣之不逞者造作謗言百端中傷度賴學士李紳韋處厚於帝前言度為逢吉排斥而度有功不宜擯棄故得以僕射在朝李紳有寵逢吉惡之乃除為中丞又欲出於外乃以吏部侍郎韓愈為京兆尹兼御史大夫仍放臺參以紳褊直必與愈争及制出紳果移牒徃來乃罷愈為兵部侍郎紳為江西觀察使後唐郭崇韜為樞宻使兼中書令莊宗同光中幽州節度使李存審痼疾屢作堅求入覲求醫以情告崇韜在晉陽之時功名在存審之下既權寵時重人士輻輳不欲加己每隂沮之存審妻郭氏與崇韜宗姓泣訴於崇韜曰公不垂保惜忍令死棄北荒崇韜愈懐慙忿明年春存審疾甚上章數四乞生覲天顔又不之許存審伏枕而歎曰老夫歴事二主垂四十年不敢言功幸而無過今日天下一統逺夷近塞皆得面覲彤庭射鈎斬袪之人孰不奉觴丹陛獨予壅隔豈非命哉自是漸増危惙薨於幽州安重誨為樞密使兼中書令天成中任圜以功拜平章事判三司重誨忌之嘗㑹於私第有妓善歌重誨求之不得嫌隙漸深先是使人食劵皆出於户部重誨止之俾須内出爭於御前徃復數四竟為所沮求罷三司俄除太子少保致仕出居磁州駕幸夷門至鄭門聞朱守殷叛重誨便慮圜為結構立遣入稱制就害之又符習為邢洺節度使初習與霍彦威畫赴難之謀重誨名位猶下二人既藉宿望議論多抗重誨銜之習在鎮以軍政委判官劉摶性褊而猾物論惡之有言於重誨者重誨具以聞天成四年召習京師復授宣武軍節度使重誨心猶不恱㑹汴人言習厚賦錢以代納藁及軍租加省耗繇是罷歸京師私第授太子太師致仕又皇甫立代北人也明宗之刺代州署為牙校從歴藩鎮性純謹明宗委信之安重誨策名委質在立後明宗踐祚以立為忻州刺史頻詔安重誨授一藩鎮重誨奏曰立嘗申意於臣且願舊地繇是遷改留滯蓋重誨扼之也不忠輔弼之任邦家之攸賴忠藎之節大臣之所守故同底於道實相以濟若乃藴經綸之噐居承弼之列高秩官師之上訐謨帷扆之地天工仰其寅亮百姓希其安附則有邪慝自任榮利是視忘社稷之重而計其家忽縉紳之言而逞乎志熒惑乎視聽附嚴乎兇醜靡思赴難之舉聚成構亂之隙以致為時大憝貽笑永世先民有言曰不令之臣天下之所惡也故亡身覆族者悠悠相繼著之方䇿以垂戒於後者焉漢張禹成帝時以特進為太師國家每有大政必與定議永始元延之間日蝕地震尤數吏民多上書言灾異之應譏切王氏專政所致帝懼變異數見意頗然之未有以明廼車駕至禹第辟左右問禹以天變因用吏民所言王氏事示禹禹自見年老子孫弱又與曲陽侯王根不平恐為所怨禹則謂帝曰春秋二百四十二年間月蝕三十六地震五或為諸侯相殺或為夷狄侵中國灾異之意深逺難見故聖人罕言命不語怪神性與天道自子貢之屬不得聞何况淺見鄙儒之所言陛下宜修政事以善應之與下同其福善此經義意新學小生亂道誤人宜無信用以經術斷之帝雅信愛禹繇此不疑王氏後曲陽侯根及諸王子弟聞知禹言皆喜恱遂親就禹後漢梁冀冲帝時以太后兄為大將軍與太傅趙峻太尉李固叅録尚書事固以清河王蒜年長有徳欲立之謂冀曰今當立帝宜擇長年高明有徳任親政事者願將軍審詳大計察周霍之立文宣周勃立文帝霍光立宣帝戒鄧閻之利幼弱鄧太后立殤帝誕育百餘日又立安帝時年十餘歳閻太后立北郷侯其年薨冀不從乃立樂安王子纘年八歳是為質帝南齊褚淵初仕宋朝明帝為中書令䕶軍將軍與尚書令袁粲受顧命輔幼主及蒼梧暴虐稍甚太祖與淵粲言世事粲曰主上幼年微過易改伊霍之事非變世所行縱使功成亦終無全地淵黙然歸心太祖王晏武帝永明末為右僕射領太孫右衛率帝遺㫖以尚書付晏及除孝嗣令乆於其職太孫即位即欝林王轉左僕射尋加侍中明帝謀廢立晏便響應推奉明帝帝與晏宴於東府語及時事晏抵掌曰公嘗言晏怯今定何如北齊唐邕以晉昌王録尚書事與高阿那肱有隙後主平陽敗後狼狽鄴都邕懼那肱譖之恨斛律孝卿輕己遂留晉陽與莫婁敬顯等崇樹安徳王為帝信宿城䧟邕遂降周隋鄭譯初仕後周宣帝為内史上大夫領内史事初高祖與譯有同學之舊譯又素知高祖相表有竒傾心相結宣帝不豫遂與御正下大夫劉昉謀引高祖入受顧托既而譯宣詔文武百官皆受高祖節度時御正中大夫顔之儀與宦者謀引大將軍宇文仲輔政仲已至御座譯知之遽率開府楊惠及劉昉皇甫績柳裘俱入仲與之儀見譯等愕然逡廵欲出高祖因執之於是矯詔復以譯為内史大夫及高祖為大冡宰總百揆以譯兼領天官都府司㑹總六府事史臣曰晏嬰有言一心可以事百君百心不可事一君於譯見之矣楊素高祖開皇中為尚書右僕射與高熲專掌朝政二十年晉王廣為靈朔道行軍元師素為長史王卑躬以交素及為太子素之謀也仁夀末高祖不豫素與兵部尚書栁述黄門侍郎元巖等入閣侍疾時皇太子入居大寶殿乃手自為書封出問素素條録事狀以報太子宫人悞進高祖所高祖覽而大恚欲召庶人勇太子謀之於素素矯詔追東宫兵士帖上臺宿衛門禁出入竝取宇文述郭衍節度又令張衡侍疾繇是頗有異論史臣曰素謀廢嫡致國於傾危終使宗廟丘墟市朝霜露究其禍敗之源乃素之繇也蘓威為納言開府儀同三司煬帝大業末年尤多征役至於論功行賞威每承望風㫖輙寢其事時羣盜蜂起郡縣有表奏詣闕者又訶誡使人令減賊數故出師攻討多不克捷繇是為物議所譏從幸江都宇文化及之弑逆也以威為光禄大夫開府儀同三司化及敗歸於李密未幾密敗歸於東都越王侗以為上柱國邳國公王世充僭號署太師威自以隋室舊臣遭逢䘮亂所經之處皆與時消息求容免及大唐秦王平世充坐放東都閶闔門内威詣謁見稱老病不能拜起王遣人詰之曰公隋朝宰輔政亂不能扶救遂令品物塗炭君弑國亡見李密王世充皆拜伏舞蹈今既老病無勞相見尋歸長安至朝堂請見又不許遂卒於家唐楊再思中宗神龍中為侍中太子重俊誅武三思時再思與宰相蘇瓌李嶠兵部尚書宗楚客左衛將軍紀處訥等竝在太極殿前統兵二千餘人惟閉正門及左右延明門以自固竟不能犯難赴救君子是以深咎之趙彦昭景龍末為中書侍郎同中書門下三品是時金城公主出降吐蕃贊普中宗命彦昭充使彦昭以既充外使恐失其寵殊不恱司農卿趙履温私謂曰公國之宰輔而為一介之使不亦鄙乎彦昭曰計將安出履温因為隂託安樂公主密奏留之帝乃遣驍衛大將軍楊矩代彦昭而往宗楚客景龍末為中書令中宗崩遺詔韋庶人輔少主知政事相王旦参謀輔政楚客謂宰相韋温曰今湏請皇太后臨朝宜停相王輔政且皇太后於相王居嫂叔不通問之地甚難為儀注理全不可右僕射同中書門下三品蘇瓌獨正色拒之謂楚客等曰遺制是先帝意安可更改楚客及韋温大怒遂削相王輔政而宣行焉及韋氏敗楚客伏誅李嶠景龍末為兵部尚書同中書門下三品韋庶人臨朝嶠密表請置相王諸子勿令在京及𤣥宗踐祚獲其表以示侍臣矜其老疾赦之令隨子䖍州刺史暢赴任崔𦙍昭宗天復初為司空平章事兼領度支鹽鐡三司等使明年夏汴師朱全忠攻䧟河中晉綘至同華中尉韓全誨以𦙍交結全忠慮汴京逼京師請罷𦙍知政事落使務其年冬全忠挾帝幸鳯翔𦙍怨帝廢黜不扈從遣使告全忠請於岐迎駕令太子太師盧知猷率百官迎全忠入京師及全忠岐下還河中𦙍迎謁於渭橋捧巵上夀持板為全忠唱歌仍自撰歌詞贊功業後唐鄭珏初任梁末帝時為平章事同光元年莊宗敗王彦章於中都長驅趨汴梁帝聞梁師將至召宰相李振敬翔等號哭謀所向皆猶預不決珏對曰臣有一䇿可以緩外冦不知陛下能行乎梁帝曰卿意如何珏曰願得陛下傳國寶臣懐之以入晉軍可以緩其師以俟叚凝梁帝曰事急矣此物固無惜但卿此行得事了不卿更籌之珏俛首曰了則不了左右縮頭恥笑翼日莊宗入汴州珏率偽百官迎謁是日謫授萊州司戸叅軍孔循明宗時為樞密使天成二年以荆南高季興謀叛不恭安重誨任圜同謀討伐季興幼與循同為朱友讓之𨽻義如兄弟及議興師循心不欲以為水潦將降懼不成功及劉訓進兵果不克捷兵不能退帝即令循徃軍前循既至遣門客李湜入荆州見季興且述循意即時師旋安重誨明宗時為樞密使誘河中副都指揮使楊彦温乗潞王閱馬於皇龍莊據城謀叛王遣人詰之曰吾善侍汝何苦為叛彦温報曰某非敢負恩緣奉樞密院宣頭令某拒命請公但歸朝廷數日詔潞王歸朝明宗疑其詐不欲興兵授彦温綘州刺史重誨堅請出師即命西京留守索自通侍衛歩軍都指揮使藥彦稠等帥兵攻之五日而拔自據城及敗凡十三日初彦稠出師明宗戒之曰與朕生致彦温吾將自訊之及收城斬首傳送明宗深怒彦稠等時四海恬然五兵載戢倘非邊郡近在國門而彦温安能狂悖皆以為重誨方弄國權尤忌末帝之名故巧作窺圖冀能傾䧟也彦温愚昧為人所嗾故滅其族焉册府元龜卷三百三十九
