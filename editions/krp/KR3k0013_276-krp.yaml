body:
  text: 册府元龜卷二百七十六宋王欽若等撰宗室部褒寵二宋長沙景王道憐髙祖中弟永初二年朝正入住殿省三年髙祖不豫加班劍三十人六月薨追贈太傅持節侍中都督刺史如故祭禮依晋太宰安平王故事鸞輅九旒黄屋左纛輼輬挽歌二部前後部羽葆鼓吹虎賁班劍百人長沙成王義欣景王道憐子元嘉七年遷使持節監豫司雍并四州諸軍事征虜將軍如故給鼓吹一部十一年夏入太廟太祖厚加恩禮臨川烈武王道䂓髙祖少弟晋義熙末位至荆州刺史征西將軍髙祖受命贈大司馬追封臨川王文帝少為道䂓所養後文帝還本以長沙王子義慶嗣慶為荆州廟主當隨往江陵文帝下詔褒美勲徳及慈䕃之重曰褒道崇徳經國之盛典尊親追逺因心之所隆故侍中大司馬臨川烈武王體道欽明至徳淵邈睿哲自天孝友光備爰始協規則翼賛景業陵威致討則尅翦梟鯨逮妖逆交侵方難孔棘勢踰累棊人無固志王神謨獨運靈武宏發輯寜内外誅覆羣凶固已化被江漢勲髙微管逺猷侔於二南英雄邁於兩獻矣朕㓜蒙殊愛徳廕特隆豐恩慈訓義深情戚永惟仁範感慕纒懐今當擁移寢祏初祀西夏思崇嘉禮式備徽章庶以昭宣風度允副幽顯其追崇丞相加殊禮鸞輅九旒黄屋左纛給節鉞前後部羽葆鼓吹虎賁班劍百人侍中如故及長沙太妃檀氏臨川太妃曹氏後薨祭皆給鸞輅九旒黄屋左纛輼輬車挽歌二部前後部羽葆鼔吹虎賁班劒百人江夏文獻王義恭髙祖之子髙祖特所鍾愛諸子莫及元嘉十七年徴為侍中司徒録尚書事給班劒二十人置兵加仗二十一年進位太尉領司徒相府年給錢二千萬他物稱此而義恭性奢用常不足太祖又别給錢年千萬二十六年領國子祭酒時有獻五百里馬者以賜義恭二十七年出鎮彭城二十九年冬還朝帝以御乗蒼鸞船上迎之元㐫弑逆義恭上表勸進世祖踐阼特授使持節侍中都督揚南徐三州諸軍事太尉録尚書六條事揚南徐二州刺史給皷吹一部班劒二十人又假黄鉞事寧進位太傅領大司馬增班劒為三十人以藩所服玉環大綬賜之増封二千户孝建元年南郡王義宣臧質魯爽等反加黄鉞白直百人入六門事平以臧質七百里馬賜義恭又増封二千户大明三年省兵佐加領中書監以崇藝昭武永化三營合四百三十七户給府更増吏僮千七百人合為二千九百人六年解司徒府太宰司依舊辟召又年給三千匹布撰國史孝武自為義恭作傳永光元年八月為廢帝所害明帝定亂追崇使持節侍中都督中外諸軍事丞相領太尉中書監録尚書事並如故給九旒鸞輅虎賁班劒百人前後部羽葆皷吹輼輬車又下詔曰皇基崇建屯剥維難𢎞啟熙載底績忠果故從享世祀勒勲宗彛世祖寧亂定業實資翼亮故使持節侍中都督中外諸軍事丞相領太尉中書監録尚書事江夏文獻王義恭故使持節侍中都督南豫江豫三州軍事太尉南豫州刺史巴東郡開國忠烈公元景故侍中司空始興郡開國襄公慶之故持節征西將軍雍州刺史洮陽縣開國肅侯慤或體道冲𤣥燮化康世或盡誠致効夷難龕逆宜式遵國典陪祭廟廷義恭子伯禽孝建三年生元兇作逆義恭諸子皆遇害朝廷哀之至是孝武名之曰伯禽以擬魯公伯禽周公旦之子也衡陽王義季髙祖之子太祖為荆州髙祖使隨徃繇是特為太祖所愛元嘉十六年代臨川王義慶為荆州給鼔吹一部義季素拙書帝聼使餘人書啟事唯自署名而已義季病篤帝遣中書令徐湛之省疾召還京師未及發薨於彭城時年三十三彭城王義康髙祖之子太祖即位進號驃騎將軍加散騎常侍給鼔吹一部元嘉二年改授都督荆湘等八州諸軍事給班劍三十人九年太妃薨辭班劍解侍中十二年復加侍中班劍南郡王義宣髙祖之子世祖即位以為中書監進號中軍將軍加散騎常侍給鼓吹一部又都督揚豫二州丞相録尚書六條加羽葆鼓吹給班劍四十人竟陵王誕文帝第六子元嘉二十六年為㑹稽太守加皷吹一部孝武既平元兇進號驃騎將軍加班劍二十人建平王宏文帝第七子也文帝寵愛殊常為立第於雞籠山盡山水之美建平國職髙他國一階廬江王禕文帝第八子大明二年為散騎常侍中書令領驍騎將軍給鼔吹一部明帝踐阼加侍中中書監給班劍三十人桂陽王休範文帝第十八子永光初以驃騎大將軍還為江州進督越州諸軍事給三望車一乘明帝遺詔進位司空侍中加班劍三十人始平王子鸞孝武第八子母殷淑儀寵傾後宫子鸞愛冠諸子凡為帝眄遇者莫不入子鸞之府國及為南徐州又割吳郡以屬之六年以本官兼司徒進號撫軍司徒給節禮儀並依正公又加都督南徐諸軍事八年加中書令領司徒成安王凖明帝第三子拜撫軍將軍置佐史元徽二年進號車騎將軍都督揚南豫州諸軍事給鼓吹一部刺史如故四年又進驃騎大將軍號開府儀同三司班劍三十人都督刺史如故營浦侯遵考髙祖族弟也明帝即位為侍中特進右光禄大夫領崇憲太僕給親侍三十人㤗始五年賜几杖大官四時賜珍味疾病太醫給藥固辭几杖當陽侯秉長沙王道憐孫也為尚書左僕射參選元徽元年領吏部加兵五百人桂陽王休範為逆中領軍勔出守石頭秉權兼領將軍所給加兵自隨入殿南譙王世子恢南郡王義宣子也晉氏過江不置城門校尉及衛尉官孝武欲重城禁故復置衛尉卿以恢為侍中領衛尉衛尉之置自恢始也南齊豫章王嶷太祖第二子特所鍾愛太祖即位以為都督荆湘等八州諸軍事南蠻校尉荆湘二州刺史持節侍中將軍開府如故晉宋之際刺史多不領南蠻别以重人居之至是二府二州荆州資費嵗錢三千萬布萬疋米六萬斛南蠻資費嵗錢三百萬布萬疋緜千斤絹三百疋米千斛近代莫比也尋給油絡俠望車又給班劍二十人入為都督揚南徐二州諸軍事中書監司空加兵置佐以前軍臨川王映府文武配司空府世祖即位進位太尉永明二年中詔曰漢之梁孝寵異列藩晉之文獻秩殊常序况乃地侔前准勲兼徃式雖天倫有本而因事增情冝廣田邑用申恩禮增封為四千户元嘉世諸王入齋閣得白服帬帽見人主唯出太極四廟乃備朝服自比已來此事一斷帝與嶷同生特相友睦宫中曲宴許依元嘉嶷固辭不奉勅唯車駕幸第乃白服烏紗㡌侍宴大明八年給皂輪車妃庾氏嘗有疾瘳帝幸後堂設金石樂宫人畢至每臨幸輙極日盡歡嶷疾篤表觧職不許賜錢百萬營功徳嶷又啟曰臣自嬰今患亟降天臨醫走術官泉開蔵府慈寵優渥備極人臣生年疾廹遽隂無幾願陛下審賢與善極夀蒼旻强徳納和為億兆御臣命違昌數奄奪恩憐長辭明世伏涕嗚咽薨日帝再視疾至薨乃還宫詔曰嶷明哲至親勲髙業始徳懋王朝道光區縣奄至薨逝痛酷抽割不能自勝奈何奈何今便臨哭九命之禮宜備其制斂以衮冕之服温明秘噐命服一具衣一襲䘮事一依漢東平王故事大鴻臚持節護䘮事太官朝夕送奠大司馬太傅二府文書悉停過葬竟陵王子良上啓曰臣聞春秋所以稱王母弟者以尊其所重故也是以禮秩殊品爵命崇異在漢則梁王備出警入蹕之儀在晉則齊王具殊服九命之贈江左以來尊親是闕故致衮冕之典廢而不傳實繇人缺其位非禮虧省齊王故事與今不殊締構王業功迹不異凢有變革隨時之宜者正縁恩情有輕重德義有厚薄若事籌前規禮無異則且梁齊闕令終之美猶饗褒贈之榮况故大司馬仁和著於天性孝弟終於立身節義表於勤王寛猛彰於御物奉上無艱劬之貎接下無毁傷之容淡矣止於清貞無喜愠之色悠然棲於静黙絶馳競之聲詩有云靡不有初鮮克有終夫終之者理實為難在於令行無廢斯徳東平樂於小善河間悅於詩書勲績無聞艱危不渉尚致卓爾不羣英聲萬代况今協賛皇基經綸覇始功業髙顯清譽踰彰冨貴隆重亷潔彌峻等古形今敦類兹美臣愚忖度未有斯例凡庶族同氣愛睦尚少豈有仰覩陛下垂友于之性若於此者乎共起布衣俱登天貴生平游處何事不同分甘均味何珍不等未嘗覩貌而天心不懽見形而聖儀不悦爰及臨危捨命親瞻喘息萬分之際沒在聖目號哭動乎天地感慟驚乎鬼神乃至撤膳移寢坐泣遷旦神儀損耗隔宿改容奉瞻聖顔誰不悲悚厯古所未聞記籍所不載既有若斯之大徳實不可見典服之贈不彰如其脫致虧忘追改為煩不令千載之下物有遺恨其徳不具美者尚荷嘉隆之命况事光先烈者寜可缺茲盛典臣恐有識之人容致其議且庶族近代桓温庾亮之類亦降殊命伏度天心已當有在又詔曰寵章所以表徳禮秩所以紀功慎終追逺前王之盛策累行疇庸列代之通誥故使持節都督揚南徐二州諸軍事大司馬領太子太傅揚州刺史新除中書監豫章王嶷體道秉哲經仁緯義挺清譽於弱齡發韶風於早日締綸覇業之初翼賛皇基之始孝睦著於鄉閭忠諒彰乎邦邑及秉徳論道總收神甸七教必荷六府咸理振風潤雨無愆於時候䘏民拯物有篤於矜懐雍容廊廟之華儀刑列郡之觀神凝自逺具瞻允集朕友于之深情兼家國方授以神圖委諸廟勝緝頌九紘陪禪五嶽天不憖遺奄焉薨逝哀痛傷惜震動乎厥心今先逺戒期龜謀襲吉宜加茂典以恊徽猷可贈假黄鉞都督中外諸軍事丞相揚州牧緑綟綬具九服錫命之禮侍中大司馬太傅王如故給九旒鸞輅黄屋左纛虎賁班劍百人輼輬車前後部羽葆皷吹葬送儀依東平王故事臨川獻王映太祖第三子出為都督荆湘等九州諸軍事鎮西將軍給皷吹一部永明二年給油絡車七年薨詔賜東園秘噐朝服一具衣一襲贈司空長沙威王晃太祖第四子世祖即位進號車騎將軍侍中如故給油絡車皷吹一部永明八年薨賜東園秘噐朝服一具衣一襲即本號贈開府儀同三司太祖嘗曰此我家任城也世祖縁此意諡曰威武陵昭王曄太祖第五子母羅氏從太祖在淮隂以罪誅曄思慕故見愛世祖即位為丹陽尹常侍將軍如故始不復置行事得自親政轉侍中護軍將軍給油絡車又給扶二人世祖遺詔為衞將軍開府儀同三司給皷吹一部隆昌元年薨賜東園秘噐朝服贈司空侍中如故給節班劍二十人鄱陽王鏘太祖第七子鏘和悌羙令有寵於世祖永明十一年為領軍將軍領軍之授齊室諸王所未為車駕逰幸常甲仗衛從恩待坎豫章王嶷其年給油絡車隆昌元年俄遷侍中驃騎將軍開府儀同三司領兵置佐桂陽王鑠太祖第八子性清羸有冷疾嘗枕卧世祖臨視賜床帳衾褥始興簡王鑑太祖第十子永明九年進為散騎常侍領石頭戍事世祖以與鑑乆别車駕幸石頭宴㑹賞賜竟陵王子良武帝第二子建元二年為丹陽尹制東宫官僚以下致敬子良永明元年徙為侍中都督南兖兖徐青冀五州征北將軍南兖州刺史持節如故給油絡車明年入為護軍將軍兼司徒領兵置佐侍中如故鎮西州三年給鼔吹一部四年進號車騎將軍五年進位司徒給班劍二十人至八年給與三望車及鬰林即位進位太傅增班劍三十人隆昌元年加殊禮劍履上殿入朝不趨賛拜不名其年薨欎林嘗慮子良有異志及薨甚恱詔給東園温明秘噐歛以衮冕之服東府施䘮位大鴻臚持節監護太官朝夕送祭又遣追崇假黄鉞侍中都督中外諸軍事太宰領大將軍揚州牧緑綟綬備九服錫命之禮使持節中書監王如故給九旒鸞輅黄屋左纛輼輬車前後部羽葆鼓吹挽歌虎賁班劍百人𦵏禮依晉安平王孚故事晉安王子𢡟武帝第七子永明十一年為使持節都督齊梁等四州二郡諸軍事征北將軍雍州刺史給皷吹一部豫章王䘮服未畢帝以邊州須威望許得奏之隋郡王子隆武帝第八子帝以子隆能屬文謂王儉曰我家東阿也儉曰東阿重出實為皇家藩屏永明八年為使持節都督六州諸軍事荆州刺史給鼔吹一部南康王子琳武帝子以母寵故最見愛太尉王儉因請婚武帝悦而許之諷羣臣奉寳物名好盡直數百金武帝為之報荅如此及應封而好郡已盡乃以宣城封之既而以宣城屬揚州不欲為王國改封南康公禇蓁為巴東公以南康為王國封子琳新吳侯景先太祖從子也武帝即位為侍中領左軍將軍尋兼領軍將軍景先事帝盡心故恩寵特宻初西還帝坐景陽樓台景先語故舊惟豫章王一人在席而已轉中領軍車駕射雉郊外行㳺景先常甲仗從亷察左右永明五年為征虜將軍丹陽尹揔率歩騎屯義陽遇疾卒帝傷惜之詔曰西信適至景先奄至䘮逝悲懐切割不能自勝今便舉哀賻錢十萬布二百疋景先䘮還詔曰新吳侯景先噐懐開亮幹局通敏綢繆少長義兼勲戚誠著夷險績茂所司方升寵榮用伸任寄奄至䘮逝悲痛良深贈侍中征北將軍南徐州刺史給皷吹一部假節鉞侯如故諡曰忠侯南豐伯赤斧太祖從祖弟也世祖親遇與蕭景先相比及卒無儲積無絹為衾帝聞之愈惋惜詔賻錢五萬上材一具布百疋蠟二百斤追贈金紫光禄大夫諡曰懿伯子頴胄起家秘書郎太祖謂赤斧曰頴胄輕朱被身覺其趨進轉美足慰人意遭父喪感脚疾數年然後能行世祖有詔慰勉賜醫藥頴胄好文弟頴基好武世祖登烽火樓詔賦詩合㫖帝曰卿文弟武宗室便不乏才明帝廢立賜頴胄以常所乘白􅀈牛中興元年為侍中尚書令監八州軍事行荆州刺史及卒和帝出臨詔賜侍中丞相本官如故前後部羽葆皷吹班劍三十人輼輬車黄屋左纛曲江縣公遥光太祖兄衡陽元王道度子明帝初即位誅賞諸事唯遥光共謀議建武二年進號撫軍將軍加散騎常侍給通幰車皷吹後加侍中中書令給仗永元元年給班劍二十人即本號開府儀同三司豐城縣公遥昌遥光弟也建武中官至征虜將軍豫州刺史永㤗元年卒帝愛遥昌兄弟如子甚痛惜之贈車騎將軍儀同三司帝以問徐孝嗣孝嗣曰豐城本資尚輕贈以班台如為小過帝曰卿乃欲存萬代凖則此我兄孤子不得與計南郡王昭業文恵太子長子永明七年有司奏給班劍二十人皷吹一部髙選友學十一年給皂輪三望車詔髙選國官巴陵王寳義明帝長子為南徐州刺史東昏即位進征北大將軍開府儀同三司給仗永元元年給班劍二十人梁長沙王業武帝長兄懿之子也仕齊至侍中尚書令征虜將軍為東昏侯所害和帝中興元年追贈侍中中書監司徒太后臨朝改贈太傅天監元年追崇丞相王爵給九旒鸞輅輼輬車黄屋左纛前後部羽葆皷吹挽歌二部虎賁班劔百人一依晉安平王故事臨川靖恵王宏太祖第六子天監元年為後軍將軍揚州刺史又給鼔吹一部普通七年三月以疾累表自陳詔許解揚州餘如故四月薨自疾至於薨輿駕七出臨視及葬詔曰侍中太尉臨川王宏噐宇冲貴雅量𢎞通爰初弱齡行彰素履逮于應務嘉猷載緝自皇業起基地惟介弟乆司神甸歴位台階論道登朝物無異議朕友于之至家國兼情方𢎞燮賛儀刑列辟天不憗遺奄焉弗永哀痛抽切震慟于厥心冝增峻禮秩式昭𢡟典可贈侍中大將軍揚州牧假黄鉞王如故并給羽葆皷吹一部增班劍為六十人給温明秘噐歛以衮服安成康王秀太祖第七子天監五年以右將軍加領軍中書令給皷吹一部十六年為雍州刺史寜蠻校尉十七年薨髙祖聞之甚痛惜遣皇子南康王績縁道迎候南平元㐮王偉太祖第八子齊和帝以為雍州刺史寜蠻校尉天監元年進督荆寜二州俄給皷吹一部十三年改為左光禄大夫加親信四十人嵗給米萬斛布絹五千匹藥直二百四十萬厨供月二十萬并二衛兩營雜役二百人先置防閣白直左右職局一百人偉末年疾浸劇不復出藩故俸秩加焉大通四年遷中書令大司馬五年薨詔歛以衮冕給東園秘噐又詔曰旌徳紀功前王令典慎終追逺列代通規故侍中中書令大司馬南平王偉噐宇宏曠監識𢎞簡爰在弱齡清風載穆翼佐草昧勲髙樊沔契闊艱難劬勞任寄及賛務論道𢎞兹衮職奄焉薨逝朕用震慟于厥心冝降寵命式昭茂典可贈侍中太宰王如故給羽葆皷吹一部并班劍四十人鄱陽忠烈王恢太祖第九子天監十一年為平西將軍荆州刺史給鼔吹一部十七年為侍中普通五年進號驃騎大將軍七年九月薨于州詔曰故使持節散騎常侍都督荆湘雍凉益寜南北秦八州諸軍事驃騎大將軍開府儀同三司荆州刺史鄱陽王恢風度開朗噐情凝質爰在弱嵗羙譽克宣洎于從政嘉猷載緝方入政論道𢎞燮台階奄焉薨逝朕用傷悼于厥心冝隆寵命以申朝典可贈侍中司徒遣中書舎人劉顯䕶喪事始興忠武王憺太祖第十一子天監初為平西將軍荆州刺史三年加皷吹一部十四年遷鎮右將軍荆州刺史十八年徴為侍中中撫將軍開府儀同三司領軍將軍普通三年十一月薨追贈侍中司徒驃騎將軍給班劍三十人羽葆皷吹一部册曰咨故侍中司徒驃騎將軍始興王夫忠為令徳武謂止戈于以用之載在前志王有佐命之元勲利民之厚徳契闊二紀終始不渝是用方軌往賢稽擇故訓鴻名美義允臻其極今遣大鴻臚程爽諡曰忠武魂而有靈歆兹顯號嗚呼哀哉西昌侯藻長沙王懿之子大通三年為中將軍太子詹事出為丹陽尹髙祖每嘆曰子弟並如迦葉吾復何憂迦葉者藻之小名也吳平侯景髙祖從父弟天監初為冠軍將軍南兖州刺史詔景母毛氏為國太夫人禮如王國太妃假金章紫綬十三年又徴為鎮軍將軍直殿省知十州損益事月加禄五萬十九年為安西將軍郢州刺史將發髙祖幸建興苑餞别為之流涕既還宫詔給鼔吹一部廬陵威王續髙祖第五子中大通二年為雍州刺史南蠻校尉平北將軍給皷吹一部邵陵雋王綸髙祖第六子普通七年拜侍中大通元年加信威將軍置佐史武陵王紀髙祖第八子授揚州刺史中書詔成武帝加四句曰貞白儉素是其清也臨財能譲是其亷也知法不犯是其慎也庶事無留是其勤也紀特為帝所愛南郡王大連簡文帝大同十年髙祖幸朱方與兄大臨並從髙祖各給馬試之俱得馳驟之節髙祖大悅他日謂太宗曰昨見大臨大連風韻可愛足以慰吾老年忠壯世子方等元帝長子也征河東王溺死世祖後追思其才贈侍中中軍將軍揚州刺史為招魂以哀之陳永修侯擬髙祖踈屬也文帝即位為丹陽尹天嘉元年卒贈領軍將軍凶事所須並官資給二年配饗髙祖廟廷宜黄侯慧紀髙祖之從孫也至徳二年遷雲麾將軍荆州刺史賜女妓一部南康愍王曇朗髙祖母弟忠壯王休先子也曇朗為質於齊為齊所害時與齊絶尚弗之知髙祖踐阼猶以曇朗襲封南康郡王奉忠壯王祀禮秩一同皇子天嘉二年齊人結好方始知之世祖詔曰夫追逺慎終抑聞前誥南康王曇朗明哲𢡟親藩維是屬入質北齊用紓時難皇運肇興未獲旋反永言跂望日夜不忘齊使始至凶問奄及追懐痛悼兼倍常情冝隆寵數以光常序可贈侍中安東將軍開府儀同三司南徐州刺史諡曰愍衡陽獻王昌髙祖第六子荆州䧟與髙祖俱遷闗右天嘉元年乃得還百寮上表曰扞城之寄匪親勿居冝啟服衡疑兼崇徽飾臣等參議請以為散騎常侍都督湘州諸軍事驃騎將軍湘州刺史衡陽郡王加給皂輪三望車後部皷吹一部班劍二十人啓可奉行三月入境詔令中書舍人縁道迎接丙子濟江于中流船壊以溺薨柩至京師上親出臨哭乃下詔曰夫寵章所以嘉徳禮數所以崇親乃厯代之通規固前王之令典新除使持節散騎常侍都督湘州諸軍事驃騎將軍湘州牧衡陽王昌明哲在躬珪璋早秀孝敬内湛聦睿外宣梁季艱虞宗社顛墜西京淪覆䧟身闗隴及鼎業初基外藩逆命聘問斯阻音介莫通睠彼機橋將隣烏白今者羣公戮力多難廓清輕傳入郛無勞假道周朝敦其繼好驂駕歸來欣此朝聞庶歡昏定報施徒語曽莫輔仁人之云亡殄瘁斯在奄焉薨殞倍增傷悼津門之慟空在桓岫之切不追静言念之心焉如割宜隆懋典以協徽猷可贈侍中假黄鉞都督中外諸軍事太宰揚州牧給東園温明秘噐九旒鑾輅黄屋左纛虎賁班劍百人輼輬車前後部羽葆鼓吹𦵏送之儀一依漢東平憲王齊豫章文獻王故事仍遣大司空持節迎護䘮事大鴻臚副其羽衛殯送所須隨繇備辦始興王伯茂文帝第二子帝纂位詔封始興王以奉昭烈王道談祀時舊制諸王受封未加戎號者不置佐史於是尚書八座奏曰夫增崇徽號飾表車服所以闡彰厥徳下變民望第二皇子新除始興王伯茂體自尊極神姿明頴玉映觽辰蘭芬綺嵗清暉美譽日茂月升道欝平河聲超衮植皇情追感聖性天深以本宗闕緒纂承藩嗣雖珪社是膺而戎章未襲豈所以光崇睿哲寵樹皇枝臣等參議冝加寜逺將軍置佐史詔曰可伯茂聰敏好學謙恭下士又以太子母弟帝深愛之是時征北軍人盜發晉郄曇墓大獲晉右將軍王羲之書及諸名賢遺迹文帝以伯茂好古多以賜之鄱陽王伯山文帝第三子帝深噐之髙祖時天下草創諸王受封儀注多闕及伯山受封帝欲重其事天嘉元年七月八座奏封伯山乃遣持節兼太宰蕭睿告于太廟王質告于大社十月帝臨軒册命策訖令王公以下讌于王第册府元龜卷二百七十六
