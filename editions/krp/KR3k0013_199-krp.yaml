  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_199-1a}
body:
  text: 册府元龜卷一百九十九宋王欽若等撰閏位部命相選將命相惟秦氏據有宇内孫劉三分天下宋蕭四代載祀三百東魏髙齊逮於梁室莫不咨求賢英置之宰弼財成國務彌綸統紀至乃備物典䇿以優其命數委任責成以寄其心膂賛萬樞以賦政總百官以承式時惟棟幹之重允助陶甄之化得賢之盛何代無之其或繇勲烈而踐衡石以恩幸而升公衮罹負乘之謗致鼎餗之傾者亦可以垂鍳者已秦始皇帝初為秦王以吕不韋為相國封十萬户號文信侯其後有相國昌平君昌文君史失其名及即皇帝號有丞相隗柸丞相王綰丞相李斯二世時去疾為右丞相李斯為左丞相斯已死以趙髙為中丞相事無大小輒決於髙蜀先主章武元年四月即皇帝位䇿諸葛亮為丞相録尚書事曰朕遭家不造奉承大統兢兢業業不敢康寕思盡百姓懼未能綏於戱丞相亮其悉朕意無怠補朕之闕助宣重光以昭明天下君其朂哉又以許靖為司徒䇿曰朕獲奉洪業君臨萬國夙夜惶惶懼不能綏百姓不親五品不遜汝作司徒其敬敷五教五教在寛君其朂哉秉徳無怠後主建興八年詔䇿諸葛亮曰街亭之役咎繇馬謖而君引愆深自貶抑重違君意聴順所守前年耀師馘斬王雙今嵗爰征郭淮遁走降集氐羌興復二郡威震凶暴功勲顯然方今天下騷擾元惡未梟君受大任幹國之重而乆自挹損非所以光揚洪烈矣今復君丞相君其勿辭十二年八月丞相亮卒以丞相留府長史蔣琬為尚書令總統國事亮宻表後主曰臣若不幸後事冝付琬十三年四月進蔣琬位為大將軍録尚書事以後軍師費褘為尚書時戰國多事公務煩猥褘識悟過人毎自讀書記舉目暫視已䆒其旨矣延熈二年三月進蔣琬位為大司馬六年十一月以尚書令費褘為大將軍録尚書事十年以衛將軍姜維與大將軍費褘共録尚書事十九年春進姜維位為大將軍吴大帝黄武元年以車騎長史孫邵為丞相四年六月以太常顧雍為丞相赤烏六年正月以上大將軍陸遜為丞相詔曰朕以不徳應期踐運王途未一姦宄充路夙夜戰懼不遑鍳寐惟君天資聰叡明徳顯融綂任上將佐國弭難夫有超世之功者必膺光大之寵懐文武之才者必荷社稷之重昔伊尹隆湯吕尚翼周内外之任君實兼之今以君為丞相使持節守太常博士授印綬君其茂昭明徳修乃懿績敬服王命綏靖四方於乎總司三事以訓羣僚可不敬與君其朂之其州牧都䕶領武昌事如故九年九月以驃騎將軍歩隲為丞相十二年四月以驃騎將軍朱據領丞相廢帝亮建興元年閏四月以太子太傅諸葛恪為太傅太常滕𦙍為衛將軍領尚書事二年十月以武衛將軍孫峻為丞相景帝休永安元年十月以大將軍孫琳為丞相十一月詔曰大將軍掌中外諸軍事事統煩多其加衛將軍御史大夫恩侍中與大將軍分省諸事五年十月以衛將軍濮陽興為丞相後主皓寳鼎元年八月以鎮西大將軍陸凱為左丞相常侍萬彧為右丞相三年二月以左右御史丁固孟仁為司徒司空建衡三年詔曰武昌督范慎勲徳俱茂朕所敬憑冝登上公以副衆望以為太尉天紀三年八月以軍師張悌為丞相牛渚都督何植為司徒執金吾滕循為司空宋髙祖永初元年六月以相國諮議叅軍王𢎞為侍中録尚書事二年正月以尚書僕射徐羡之為尚書令揚州刺史三年正月以尚書令徐羡之為司空録尚書刺史如故少帝即位初以尚書僕射傅亮為中書監尚書令司空徐羡之領軍謝晦輔政文帝元嘉元年八月進司空徐羡之為司徒江州刺史王𢎞位司空尚書令傅亮左光禄大夫三年正月以江州刺史王𢎞為司徒録尚書事九年三月進衛將軍王𢎞為太保加江州刺史檀道濟為司空孝武帝大明三年八月以南兖州刺史沈慶之為司空時王僧逹為中書令中失年月前廢帝景和元年八月以始興公沈慶之為太尉後廢帝即位初以尚書令袁粲䕶軍將軍褚淵共輔朝政元徽二年九月以袁粲為中書監領司徒褚淵為尚書令順帝昇明元年七月即位領軍將軍蕭道成出鎮東城輔政臣欽若等曰此後南齊太祖所進官爵竝具閏位勲業門梁陳二祖亦同以袁粲為中書監司徒二年二月以禇淵為中書監司空南齊太祖建元元年正月以司空褚淵為司徒武帝即位初以司徒褚淵録尚書事尚書左僕射王儉為尚書令輔政永明十一年正月以驃騎大將軍豫州刺史王敬則為司空海陵王即位初以車騎大將軍陳顯達為司空前司空王敬則為太尉明帝建武元年十月以司空陳顯達為太尉東昏侯即位初内外衆事無大小委中書監徐孝嗣右僕射江祏侍中江祀衛尉卿劉暄領軍蕭坦之始安王遥光時呼六貴皆宰相也永元元年八月以徐孝嗣為司空和帝中興元年十二月以征東大將軍蕭衍為大司馬録尚書事驃騎將軍揚州刺史梁髙祖天監元年四月以相國左長史王瑩為中書監二年六月以新除左光禄大夫謝朏為司徒尚書令九年正月以太常卿王亮為中書監十一年正月以驃騎將軍王茂為司空普通三年正月以尚書令袁昻為中書監中大通四年正月尚書令袁昻進位司空大同五年十二月以吴郡太守謝舉為中書監元帝承聖三年三月以司徒王僧辯為太尉僧辯為司徒時帝居王位承制除之䕶軍將軍郢州刺史陸法和為司徒敬帝即位初以太尉王僧辯為中書監録尚書事太平元年七月以開府儀同三司侯瑱為司空後梁宣帝即位以雍州刺史蔡大寳為侍中尚書令明帝嗣位以尚書令蔡大寳為司空中書監郢州刺史王操為侍中尚書令陳髙祖永定元年即位以梁州左民尚書沈衆為中書令二年正月以車騎將軍侯瑱為司空時尚書左僕射王通中書令謝哲竝兼太宰史失年月文帝即位初以司空侯瑱為太尉以南豫州刺史侯安都為司空以南徐州刺史徐度為侍中廢帝即位初以中軍大將軍徐度為司空光大元年三月以尚書左僕射沈欽為侍中尚書僕射宣帝大建八年二月以開府儀同三司吴明徹為司空帝即位後章昭逹為司空王厲為中書監史失年月後主時江縂為尚書令姚察沈文理為侍中史失年月東魏孝靜帝天平元年正月即位軍國政事皆歸於丞相髙歡以開府儀同三司髙盛為司徒髙昻為司空二年三月以司徒髙盛為太尉司空髙昻為司徒三年二月以司徒大行臺并州刺史髙澄入輔朝政興和元年正月以尚書令孫滕為司徒三年十一月以度支尚書胡僧敬為司空四年四月以尚書右僕射髙隆之為司空武定元年五月以吏部尚書侯景為司空二年三月以開府儀同三司孫滕為太保以髙澄為大將軍領中書監十一月以前大司馬婁昭為司徒三年十二月以司空侯景為司徒以中書令韓軌為司空軌為中書令史失其年月五年五月以開府儀同三司厙狄千為太師以録尚書事孫滕為太傅以汾州刺史賀拔仁為太保以司空韓軌為司徒以領軍將軍可朱渾道元為司徒六年三月以開府儀同三司髙岳為太尉七年十月以開府儀同三司潘相樂為司空十二年以并州刺史彭樂為司徒八年二月以尚書令髙隆之為太保北齊文宣帝天保元年六月以太師厙狄千為太宰司徒彭樂為太尉司空潘相樂為司徒開府儀同三司司馬子如為司空三年六月以前司空司馬子如為太尉五年八月以前司空尉粲為司徒粲為司空史失年月八年四月以太師咸陽王斛律金為右丞相前大將軍扶風王可朱渾道元為太傅開府儀同三司賀拔仁為太保九年十二月以太傅可朱渾道元為太師司徒尉粲為太尉冀州刺史段韶為司徒廢帝即位初以右丞相斛律金為左丞相司空段韶為司徒武成帝即位初以太尉尉粲為太保以豐州刺史婁叡為司空河清元年七月以大司馬段韶為太傅以司空婁叡為司徒以尚書令斛律光為司空三年三月以司空斛律光為司徒五年以前司徒婁叡為太尉以太傅段韶為太師十二月以太師段韶為太宰以司徒斛律光為太尉後主天統元年四月以太保賀㧞仁為太師太尉侯莫陳相為太保瀛州刺史尉粲為太尉二年十二月以太保侯莫陳相為太傅三年八月太上皇詔以太宰大司馬婁叡為太傅大將軍斛律光為太保四年三月以開府儀同三司徐顯秀為司空五年三月以司空徐顯秀為太尉十一月以太保斛律光為太傅大司馬武平元年二月以太傅斛律光為右丞相二年二月以録尚書事趙彦深為司空十一月以右丞相斛律光為左丞相四年四月以開府儀同三司趙彦深為司空六月以録尚書事髙阿那肱為司徒十二月以司徒髙阿那肱為右丞相六年閏八月以司空趙彦深為司徒以斛律阿列羅為司空臣欽若等按北齊書後主時和士開唐邕魏休叚孝言楊休之竝為中書監毗烈長又崔季舒張彫唐為侍中史失其年月梁太祖開平元年五月以唐朝宰臣張文蔚楊渉竝為門下侍郎平章事以御史大夫薛貽矩為中書侍郎平章事是月以清州節度使韓建守司徒平章事帝以建有文武材且詳於稼穡利害軍旅之事籌度經費欲盡詢焉恩澤特異于時罕有比者隨拜為上相賜賚甚厚二年四月以吏部侍郎于競為中書侍郎平章事以翰林奉旨學士張䇿為刑部侍郎平章事時帝在澤州拜二相於行在三年九月太常卿趙光逢為中書侍郎平章事翰林學士奉旨工部侍郎知制誥杜曉為尚書戸部侍郎平章事十一月戊午御文明殿册太傅張宗奭為太保韓建受册畢金吾仗引昇輅車儀仗導謁太廟訖赴尚書省上末帝即位初以御史大夫姚洎為中書侍郎平章事貞明二年八月以太子太保致仕趙光逢為司空兼門下侍郎平章事𢎞文舘大學士延資庫使充諸道鹽鐵轉運使十月以中書侍郎兼吏部尚書同平章事敬翔為右僕射兼門下侍郎平章事監修國史判度支以中書侍郎同平章事鄭珏為刑部尚書平章事集賢殿大學士判戸部臣欽若等曰敬翔庶人友珪時偽署為相鄭珏初相時史失其年月四年四月以吏部侍郎蕭頎為中書侍郎同平章事六年四月以尚書左丞相李琪為中書侍郎平章事選將夫席閏餘之數主征伐之柄曷嘗不慎擇英傑為之將領付以師旅之重委之討襲之事因之以夷勍敵剪逋㓂震揚武怒煇燿威靈而克昌於基緒而咸寧其守宇焉若夫詩禮兼資是為義府仁賢竝用叶于善經盖夫制中權握兵要為王者之爪士乃生民之司命鑿門之舉善敗攸繫聞鼙之思倚屬斯在固宜審其才致諒其誠心然後分之以注意之任責之以維揚之効者也秦始皇初為秦王既滅三晉走燕王而數破荆師秦將李信者少年壯勇甞以兵數千逐燕太子丹至於衍水中卒破得丹始皇以為賢勇於是始皇問李信吾欲攻取荆於將軍度用幾何人而足信曰不過用二十萬人始皇問王翦曰非六十萬人不可始皇曰王將軍老矣何怯也李將軍果勢壯勇其言是也隨使李信及蒙恬將二十萬南伐荆王翦言不用因謝病歸老於頻陽李信攻平與蒙恬攻寢今固始寢丘大破荆軍信又攻鄢郢破之於是引兵而西與蒙恬㑹城父荆人因隨之三夜不宿舎大破李信軍入兩壁殺七都尉秦軍走始皇聞之大怒自馳如頻陽見謝王翦曰寡人以不用將軍計李信果辱秦軍今聞荆兵日進而西將軍雖病獨忍棄寡人乎王翦謝曰老臣罷病悖亂唯大王更擇賢將始皇謝曰已矣將軍勿復言王翦曰大王必不得已用臣非六十萬人不可始皇曰唯聽將軍計耳於是王翦大破荆軍平荆地為郡縣蜀先主初為漢中王遷治成都當得重將以鎮漢川衆論以為必在張飛飛亦以心自許先主乃㧞牙門將軍魏延為督漢中鎮逺將軍領漢中太守一軍盡驚先主大㑹羣臣問延曰今委卿以重任卿居之欲云何延對曰若曹操舉天下而來請為大王拒之偏將十萬之衆至請為大王吞之先主稱善衆咸壯其言張飛為車騎將軍領司𨽻校尉進封西鄉侯䇿曰朕承天序嗣奉洪業除殘靖亂末盡厥理今㓂虜作害民被荼毒思漢之士延頸鶴望朕用怛然坐不安席食不甘味整軍誥誓將行天罰以君忠毅侔蹤召虎宣功遐邇故特顯命髙墉進爵監司于京其誕將天威柔服以徳伐叛以刑稱朕意焉詩不云乎匪疚匪棘王國來極肇敏戎功用錫爾祉可不勉與馬超為驃騎將軍領凉州牧進封漦鄉侯策曰朕以不徳獲繼至尊奉承宗廟曹操父子世載其罪朕用惨怛疢如疾首海内怨憤歸正反本暨于氐羌率服獯鬻慕義以君信著北土威武竝昭是以委任授君抗颺虓虎兼董萬里求民之瘼其明宣朝化懐保逺邇肅慎賞罰以篤漢祜以對于天下吴大帝時偏將軍領尋陽吕䝉克晥遷尋陽未幾而盧陵賊起諸將討擊不能擒大帝曰鷙鳥累百不如一鶚復命䝉討之䝉至誅其首惡餘皆釋放復為平民朱據字子範大帝咨嗟將率發憤嘆息追思吕䝉張温以為據才兼文武可以繼之繇是拜建義校尉領兵屯湖熟宋髙祖初譙縱叛亂自稱成都王帝以西陽太守朱齡石為益州刺史寕朔將軍臧熹下邳太守劉鍾蘭陵太守蒯恩等率衆二萬自江陵討縱初謀元帥僉難其人齡石資名素淺帝違衆㧞之授以麾下之半臧熹帝后弟也位出其右又𨽻焉及戰克㨗衆咸服帝之知人又美齡石之善於其事南齊太祖建元二年以柳世隆進號安南將軍是時魏冦夀陽帝勅世隆曰歴陽城大恐不可卒治宜近斷隔之深為保固處分百姓若不將家守城單身亦難可委信也尋又勅曰吾更歴陽外城若有賊至即勒百姓守之故應勝割棄也垣崇祖既破虜上欲罷倂二豫勅世隆曰比思江西蕭索二豫兩辦為難議者多云省一足一於事為便吾謂非乃乖謬卿以為云何可具以聞武帝永明二年江州蠻動勅寕朔將軍曹虎領軍戍尋陽除㳺擊將軍輔國軍主蕭景先為征虜將軍丹陽尹永明五年羌人桓天生引蠻虜於雍州界上司部以北人情騷動帝以景先諳䆒司土詔曰得雍州刺史張瓌啟事蠻虜相扇容或侵軼蠭蠆有毒宜時勦蕩可遣征虜將軍丹陽尹景先總率歩騎直指義陽可假節司州諸軍皆授節度景先至鎮屯軍城北百姓乃安牛酒來迎軍明帝時陳顯逹為太尉侍中時虜頻冦雍州衆軍不㨗失沔北五郡永泰元年乃遣顯逹北討詔曰晉氏中㣲宋祚繼謝藩臣外叛要荒内侮天未悔禍左衽亂華巢穴神州遂移年載朕嗣膺景業踵武前王靜言隆替思寕區夏但多難甫夷恩化肇洽興師擾衆非政所用思戢逺圖權緩北略冀戎夷知義懐我好音而㐫醜剽狡專事侵掠驅扇異類而蟻聚西偏乘彼自來之資撫其天亡之㑹軍無再駕民不重勞傳檄以定三秦一麾而平禹跡在此舉矣且中原士庶乆望皇威乞師請援結軌馳道信不可失時豈終朝宜分命方嶽因兹大號侍中顯逹可暫輟槐隂指授羣率中外纂嚴加顯逹使節向襄陽梁髙祖天監四年冬十月丙午北伐以中軍將軍揚州刺史臨川王宏都督北討諸軍事尚書右僕射柳惔為副普通二年秋七月丁酉假大匠卿裴邃節督衆軍北討五年六月庚子以員外散騎常侍元樹為平北將軍北青兖二州刺史率衆北伐六年春正月詔曰廟謨以定王略方舉侍中領軍將軍西昌侯淵藻可便親戎以前啟行鎮北將軍南兖州刺史豫章王綜董馭雄傑風馳電邁其餘衆軍計日差遣初中後師善得嚴辦朕當六軍雲動龍舟濟江五月壬子中䕶軍夏侯亶督壽陽諸軍北伐大通元年十二月乙卯以中䕶軍蕭淵藻為北討都督征伐大將軍鎮渦陽中大通六年冬十月丁卯以信武將軍元慶和為鎮北將軍率衆北伐孝元帝承聖二年十一月遣豫州刺史侯瑱據東闗壘徴吴興太守裴之横帥衆繼之王僧辯為車騎大將軍在揚州西魏相宇文泰遣兵及岳陽王衆合五萬將襲江陵元帝遣主書李膺徴僧辯於建業為大都督荆州刺史别勑僧辯云泰背盟忽便舉斧國家猛將多在下流荆峽之衆悉非勁勇公宜率衆貔虎星言就路倍道兼行赴倒懸也僧辯因命豫州刺史侯瑱等為前軍兖州刺史杜僧明等為後軍處分既畢乃謂膺云泰兵驍猛難與爭鋭衆軍若集吾便直指漢江截其後路凡千里匱糧尚有飢色况賊越數千里者乎此孫臏克龎涓時也陳宣帝時朝議北伐帝謂左僕射徐陵曰朕意已决卿可舉元帥衆議咸以中權將軍淳于量位重共著推之陵獨曰不然呉明徹家在淮左悉彼風俗將略人才當今亦無過者於是爭論累日不能决都官尚書裴忌曰臣同徐僕射陵應聲曰非但明徹良將裴忌即良副也是日詔明徹為大都督令忌監軍事遂克淮南數十州之地北齊文襄時髙岳討侯景未克文襄欲遣潘相樂副散騎常侍陳元康曰相樂緩於機變不如慕容紹宗且先王有命稱其堪敵侯景公但推赤心於此人則侯景不足憂也是時紹宗在逺帝欲召見之恐其驚叛元康曰紹宗知元康特䝉優待新使人來餉金以致其誠欵元康欲安其意故受之而厚答其書保無異也帝乃任紹宗遂以破景梁太祖開平元年八月以潞州軍前屯師旅壁壘未收乃别議戎帥於是以亳州刺史李思安充潞州行營都統五年正月詔曰徴陜州鎮國軍節度使楊師厚至京見于崇勲殿帝指授方略依前充北面都招討使恩賚甚厚使督軍進發册府元龜卷一百九十九
