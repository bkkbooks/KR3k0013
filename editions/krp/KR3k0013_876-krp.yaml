body:
  text: 册府元龜卷八百七十六宋王欽若等撰總録部方術范昱有言曰隂陽推歩之學往往見於墳記至於河雒之文龜龍之圖箕子之術師曠之書緯候之部鈐决之符皆所以探抽㝠賾參驗八區又有風角遁甲孤虚之術亦有以效於事也漢武之世頗好方術天下懐藝之士比比出焉東觀之記斯為博矣鼎國之後何嘗乏哉至或按劾鬼神推歩災異吉凶先覺禍福可移變化云為驚乎視聽蓋夫怪神之理聖人之罕言所謂民可使繇之非泯絶而不取也若乃極慮知變而不詭於俗窮理造微而不違於道斯深於術數者歟漢李少君故深澤候人主方候家人主方藥以祠竈榖道郤老方見武帝祠竈可以致福榖道辟榖食之道帝尊之常自謂七十能使物郤老物謂鬼物也其游四方徧諸侯人聞其能使物及不死更餽遺之少翁齊人以方見武帝帝有所幸李夫人卒帝思念李夫人不已少翁言能致其神廼夜張燈燭設帷帳陳酒肉而命帝居他帳遥望見好女如李夫人之貌還幄坐而歩夫人之神于帳中坐又出而徐歩又不得就視及致竈鬼之貌云廼拜少翁為文成將軍賞賜甚多以客見之文成言帝即欲與神通宫室被服非象神物神不至廼作畫雲氣車及各以勝日駕車辟惡鬼又作甘泉宫中為臺室畫天地太乙諸鬼神而致祭具以致天神欒大膠東人王家人故嘗與文成將軍同師已而為膠東康王尚方主方藥也康王後聞文成死而欲自媚於上乃遣欒大因樂成侯名登史不書姓求見言方天子既誅文成後悔其方不盡及見欒大大悅大敢為大言曰臣之師言黄金可成而河決可塞不死之藥可得仙人可致也於是帝使驗小方鬬棊自相觸擊是時帝方憂河決而黄金不就乃拜大為五利將軍居月餘得四印後漢尹敏建武二年上疏陳洪範消災之術時光武方草創天下未遑其事命敏待詔公車拜郎中郭憲以建武七年代張堪為光禄勲從駕南郊憲在位忽回向東北含酒三潠音巽噴也執法奏為不敬執法糾劾之官也詔問其故憲對曰齊國失火故以厭之比後齊果上火災與郊同日解奴辜張貂不知何郡人也皆能隱淪出入不由門户奴辜能變易物形以誑幻人麴聖卿河南人善為丹書符劾厭殺鬼神而使命之編盲意編姓盲意名亦與鬼物交通壽光侯者壽姓也風俗通曰壽于姚吳大夫章帝時人能劾百鬼衆魅令自縳見形其鄉人有婦為魅所病侯為劾之得大蛇數丈死於門外又有神樹人止者輙死鳥過者必墜侯復劾之樹夏枯落見大蛇長七八丈懸死其間帝聞而徴之乃試問之吾殿下夜半後常有數人綘衣被髪持火相隨豈能劾之乎侯曰此小怪易鋤爾帝偽使三人為之侯劾三人登時仆地無氣帝大驚曰非魅也朕相試爾解之而蘇劉根者潁川人隱居嵩山中諸好事者自逺而至就根學道太守史祈以根為妖妄乃收執詣郡數之曰汝有何術而誣惑百姓若果其神可顯一驗事不爾立死矣根曰實無他異頗能令人見鬼矣祈曰促召之使太守目覩爾乃為明根於是左顧而嘯有頃祈之亡父祖近親數十人皆反縳在前向根叩頭曰小兒無狀分當萬死顧而叱祈曰汝為子孫不能有益先人而反累辱亡靈可叩頭為吾陳謝祈驚懼悲哀頓首流血請自甘罪根坐黙而不應忽然俱去不知所在景鸞廣漢梓橦人學河洛圖緯數上書陳救災變之術郎宗字件綏安丘人也善京氏易風角星筭推歩吉凶嘗負笈荷擔賣卜給食微服間行人莫得知楊繇蜀郡成都人也少習易并七政元氣風雲占候為郡文學掾時有大雀夜集於庫樓上太守廉范以問繇繇對曰此占郡内當有小兵然不為害後二十餘日廣柔縣蠻夷反殺傷長吏郡發庫兵擊之又有風吹削哺哺當作柿音孚廢切顔氏家訓曰削則托也左傳曰削而投之是也史家假借為肝肺字今俗或作肺或作為反哺之哺學士因云是屏障之名非也風角書曰庶人之風揚塵轉削若是屏障何由可轉太守以問繇繇對曰方當有薦木實者其色黄赤頃之五官掾獻橘數包繇嘗從人飲勅御者曰酒三行便宜嚴駕既而趣去後主人舎有鬬相殺者請問何以知之繇曰向社中木上有鳩鬬此兵賊之象也其言多驗著書十餘篇終於家冷壽光可百五六十歳行容成公御婦人法容成公者能善補導之事取精於𤣥牝其要谷神不死守生養氣者也髪白復黑齒落復生御婦人之術謂握固不瀉還精補腦也常屈頸鷮息鷮音居妖反毛詩曰有集唯鷮毛萇注曰鷮雉也山海經曰女几之山多白鷮郭璞曰似雉長尾走且鳴也鬚髪盡白而色理如三四十時死於江陵叚翳廣漢新都人習易經明風角時有就其學者雖未至必豫知其姓名嘗告守津吏曰某日當有諸生二人荷擔問翳舍處者幸為告之後竟如其言又有一生來學積年自謂略究要術辭歸鄉里翳為合膏藥并一簡書封於筒中告生曰有急發視之生到葭萌與吏爭渡津吏撾破從者頭生開筒得書言到葭萌與吏鬭頭破者以此膏裹之生用其言創者即愈生歎服乃還卒業遂隱居終於家上成功者宓縣人其初行久而不還後歸語其家云我已得仙因辭家而去家人見其舉歩稍髙良久乃没云陳寔韓韶聞見其事王輔學公羊傳援神契嘗隱居野廬以道自娛辟公府舉有道對策拜郎中陳災異甄吉凶有驗拜議郎以病遜安帝公車徴不行卒於家李歴李邰弟之子好方術為新城長時天下旱縣界特雨官至奉車都尉樊英南陽人也善風角嘗有暴風從西方起英謂學者曰成都市火甚盛因含水西向漱之乃令記其日時客後有從蜀來云是日大火有黑雲卒從東起須㬰大雨火遂得滅於是天下稱其術英既善術朝廷每有災異詔輙下問變復之效所言多驗變災異復於常也安帝初徴為博士欒巴字叔元順帝時為豫章太守土多山川鬼怪小人常破貲産以祈禱巴素有道術能役鬼神乃悉毁壊房祀翦理姦巫房祀謂為房堂而祀於是妖異自消百姓始頗為懼終皆安之神仙傳曰廬山廟有神於帳中與人言語飲酒投杯能令宫亭湖中分風行船行者舉帆相逢巴未到十數日廟中神不復作聲郡中嘗患黄义鬼為百姓害巴到皆不知所在郡内無復疾疫遷沛相所在有績徴拜尚書正朝大㑹巴獨後到又飲酒西方噀之有司奏巴不敬有詔問巴巴頓首謝曰臣本縣成都市失火臣故因酒為雨以滅火臣不敢不敬詔即以驛書問成都成都答言正旦大失火食時有雨從東北來火乃息雨皆酒臭後忽一旦大風天霧晦暝對坐皆不相見失巴所在尋問之云其日還成都與親故别髙獲汝南新息人獲善天文曉遁甲能役使鬼神郡境大旱太守鮑昱自往問何以致雨獲曰急罷三部督郵監屬縣有三部每部督郵書掾一人明府當自北出三十里亭雨可致也昱從之果得大雨許俊善卜占之術多有顯驗時人方之前世京房自云少常篤病三年不愈乃謁大山請命大山主人生死故詣請命也行遇道士張巨君授以方術所著易林至今行於世張楷蜀郡成都人性好道術能作五里霧時關西人裴優亦能為三里霧自以不如楷從學之楷避不肯見桓帝即位優遂行霧作賊事覺被考引楷言從學術楷坐繫廷尉詔獄積二年常諷誦經籍作尚書注後以事無驗見原還家趙彦琅邪人少有術學延熹二年琅邪賊勞丙與太山賊叔孫無忌殺都尉攻没琅邪屬縣殘害吏民朝廷以南陽宗資為討冦中郎將仗鉞將兵督州郡合討無忌彦為陳孤虚之法以賊屯在莒莒有五陽之地謂城陽南武陽開陽門都安陽竝近莒宜發五陽郡兵郡兵謂山陽廣陽漢陽南陽丹陽郡之類也從孤擊虚以討之資具以狀上詔書遣五陽兵到彦推遁甲教以時進兵一戰破賊燔燒屯塢徐兖二州一時平夷樊志張者漢中南鄭人隱身不仕靈帝時嘗遊隴西時破羌將軍叚頴出征西羌請見志張其夕頴軍為羌所圍數重因留中三日不得去夜謂頴曰東南角無復羌宜乘虚引出住百里還師攻之可以全勝頴從之果以破賊於是以狀表聞又說其人既有梓愼焦董之識焦延壽董仲舒宜翼聖朝咨詢竒異於是有詔特徴㑹病終費長房汝南人也曾為京掾市中有老翁賣藥懸一壺於肆頭及市罷輒跳入壺中市人莫之見唯長房於樓上覩之異焉因往再拜奉酒脯翁知長房之意其神也謂之曰子明日可更來長房旦日復詣翁乃與俱入壺中唯見玉堂嚴麗㫖酒甘肴盈衍其中共飲畢而出翁約不聽與人言之後乃就樓上候長房曰我神仙之人以過見責今事畢當去子寧能相隨乎樓下有少酒與卿為别長房使人取之不能勝又令十人扛之猶不舉翁聞笑而下樓以一指提之而上上視器如一升許而二人飲之終日不盡長房遂欲求道而顧家人為憂顧念也翁乃斷一青竹度與長房身齊使懸之舍後家人見之即長房形也以為縊死大小驚號遂殯葬之長房立其傍而莫之見也於是遂隨從入深山踐荆棘於羣虎之中留使獨處長房不恐又卧於空室以朽索懸萬斤石於心上衆蛇競來齧索且斷長房亦不移翁還撫之曰子可教也復使食糞糞中有三蟲臭穢特甚長房意惡之翁曰子幾得道恨於此不成如何長房辭歸翁與一竹杖曰騎此任所之則自至矣既至即以杖投葛陂中也又為作一符曰以此主地上鬼神長房乘杖須㬰來歸自謂去家適經旬日而已十餘年矣即以杖投陂顧視則龍也家人謂其久死不信之長房曰往日所葬但竹杖爾乃發冡剖棺杖猶存焉遂能療醫衆病鞭笞百鬼及驅使社公或在他坐獨自恚怒人問其故曰吾責鬼魅之犯法者爾汝南歳常有魅偽作太守章服詣府門椎鼓者郡中患之時魅適來而逢長房為謁府君惶懼不得退便前解衣冠叩頭乞活長房呵之云便於中庭正汝故形即成老鼈也大如車輪頸長一丈長房復令就太守服付其一札以勅葛陂君魅叩頭流涕持札植於陂邊以頸繞之而死後東海君來見葛陂君因淫其夫人於是長房劾繫之三年而東海大旱長房至海上見其人請雨乃謂之曰東海君有罪吾前繫於葛陂今方出之使作雨也於是雨立注長房曾與人共行見一書生黄巾被裘無鞍騎馬下而叩頭長房曰還主馬赦汝死罪人問其故長房曰此貍也盗社公馬爾又嘗坐客而使使至宛市鮓須㬰還乃飯或一日之間人見其在千里之外者數處焉後失其符為衆鬼所殺徐登者閩中今泉州也人也本女子化為丈夫善為巫術趙炳字公阿東陽人能為越方東陽今婺州也抱朴子曰道士趙炳以氣禁人人不能起禁虎虎伏地低頭閉目便可執縳以大釘釘柱釘入尺許以氣吹之釘即躍出射去如弩箭之發異苑云趙俟以盆盛水吹氣作禁魚龍競越方善禁呪也時遭兵亂疾疫大起二人遇於烏傷溪水之上水經注吳寧溪出吳寧縣經烏傷之溪烏傷在今婺州義烏縣東也遂結言約共以其術療病各相謂曰今既同志且可各試所能登乃禁溪水水為不流炳復次禁樹樹即生荑荑者楊之秀也二人相視而笑共行其道焉登年長炳師事之貴尚清儉禮神唯以東流水為酌削桑皮為脯但行禁架所療皆除禁架即禁術也後登物故炳東入章安縣名屬㑹稽郡百姓未之知也炳乃故升茅屋梧鼎而爨主人見之驚懅梧支也懅忙也炳笑不應既而爨熟屋無損異又嘗臨水求渡船人不和之和猶許也炳乃張蓋坐其中長嘯呼風亂流而濟於是百姓神服從者如歸章安令惡其惑衆收殺之人為立祠室於永康至今蚊蚋不能入也甘始東郭延年漢武内傳曰延年字公游封君達三人者皆方士也率能行容成御婦人術或飲小便或自倒懸愛嗇精氣不極視大言甘始元放延年皆為曹公所録問其術而行之君達號青牛師封君達隴西人初服黄連三十餘年入烏舉山服水銀百餘年還鄉里如二十者常乗青牛故號青牛道士聞有病死者識與不識便以腰間竹管中藥與服或下針應手皆愈不以姓名語人聞魯女生得五嶽圖連年請求女生未見授并告節度三百餘歳乃入𤣥丘山去左慈字元放廬江人少有神道嘗在司空曹操坐操從容顧衆賔曰今日髙㑹珍羞略備所少吳松江鱸魚爾元放於下坐應曰此可得也因求銅盤貯水以竹竿餌釣於盤中須㬰引一鱸魚出操大拊掌笑㑹者皆驚操曰一魚不周坐席可更得乎放乃更餌鈎沉之須㬰復引出皆長三尺餘生鮮可愛操使自前鱠之周浹㑹者操又謂曰既已得魚恨無蜀中生薑爾放曰亦可得也操恐其近即易為所取因曰吾前遣人到蜀買錦可過勅使者增市二端語頃即得薑還并獲操使報命後操使蜀反驗問增錦之狀及時日早晚若符契焉後操出近郊士大夫從者百許人慈乃為齎酒一升脯一斤手自斟酌百官莫不醉飽操怪之使尋其故行視諸罏悉亡其酒脯矣操懐不喜喜音許吏反因坐上收欲殺之慈乃卻入壁中霍然不知所在或見於市者及捕之而市人皆變形與慈同莫知誰是後人逢慈於陽城山頭因復逐之遂走入羊羣操知不可得乃令就羊中告之曰不復相殺本試君術爾忽有一老羝屈前兩膝人立而言曰遽如許言何遽如許為事即競往赴之而羣羊數百皆變為羝竝屈前膝人立云遽如許遂莫知所取焉魏文帝典論語郤儉等事曰潁川郤儉能辟穀餌茯苓甘陵甘始亦善行氣老有少容廬江左慈知補導之術竝為軍吏初儉至之所伏苓價暴貴數倍議郎安平李覃學其辟穀䬸伏苓飲寒水中泄利殆至殞命後始來衆人無不鴟視狼顧呼吸吐納軍謀祭酒𢎞農董芬為之過差氣閉不通良久乃蘇左慈到又竟受其補導之術至寺人嚴峻往從問受奄豎眞無事於斯術也人之逐異乃至于是東阿王作辨道論曰世有方士吾王悉所招致甘陵有甘始廬江有左慈陽城有郤儉始能行氣導引慈曉房中之術儉善辟穀悉號三百歳卒所以集之於魏國者誠恐斯人之徒接姦宄以欺衆行妖慝以惑民豈復欲觀神仙于瀛州求安期于海島釋金輅而履雲輿棄六驥而美飛龍哉自予王與太子及于兄弟咸以為調笑不信之矣然始等知上遇之有常奉不過于員吏賞不加于無功海島難得而游六黻難得而佩終不敢進虚誕之言出非常之語余嘗試郤儉絶榖百日躬與之寢處行歩起居自若也夫人不食七日則死而儉乃如是然不必益壽可以療疾而不憚饑饉焉左慈善修房内之術差可終命然自非有志至精莫能行也甘始者老而有少容自諸術士咸共歸之然始辭繁寡實頗有怪言余嘗辟左右獨與之談問其所行温顔以誘之美辭以導之始語余吾本師姓韓字世雄嘗與師於南海作金前後數四投數萬斤金於海又言諸梁時西域胡來獻香罽腰帶割玉刀時悔不取也又言車師之西國兒生擘背出脾欲其食少而弩行也又言取鯉魚五寸一隻合其一煑藥俱投沸膏中有藥者奮尾鼓鰓游行沉浮有若處淵其一者已熟而可噉余時問言率可試不言是藥去此逾萬里當出塞始不自行不能得也言不盡於此頗難悉載故粗舉其巨怪者始若遭秦始皇漢武帝則復徐氏欒大之徒也吳劉惇字子仁平原人遭亂避地客游廬陵事孫輔以明天官達占數顯於南土每有水旱冦賊皆先時處期無不中者輔異焉以為軍師軍中咸敬事之號曰神明惇於諸術皆善尤明太乙皆能推演其事窮盡要妙著書百餘篇名儒刁𤣥稱以為竒惇亦寶愛其術不以告人故世莫得而明也趙達治九宫一筭之術究其微㫖達寶惜其術自闞澤殷禮皆名儒善士親屈節就學達祕而不告太史丞公孫滕少師事達勤苦累年達許教之者有年數矣臨當喻語而輒復止滕他日齎酒具候顔色拜跪而請達曰吾先人得此術欲圖為帝王師至仕來三世不過太史郎誠不欲復傳之且此術微妙頭乗尾除一筭之法父子不相語然以子篤好不倦今直以相授矣飲酒數行達起取素書兩卷大如手指達曰當寫讀此則自解也吾久廢不復省之今欲思論一過數日當以相與滕如期往至乃佯求索書驚言失之云女婿昨來必是渠所竊遂從此絶初大帝行師征伐每令達有所推歩皆如其言帝問其法達終不語由此見薄禄位不至介象字元則有諸方術吳主聞之徴象到武昌甚敬貴之稱為介君為起宅以御帳給之賜遺前後累千金從象學蔽形之術試還後宫及出殿門莫有見者又使象作變化種𤓰菜百果皆立生可食吳主共論鱠魚何者最美象曰鯔魚為上吳主曰論近道魚耳此出海中安可得耶象曰可得耳乃令人於殿中作方塪汲水滿之并求鈎象起餌之垂綸于塪中須㬰果得鯔魚吳主驚喜問象曰可食否象曰故為陛下取以作生鱠安敢取不可食之物乃使廚下切之吳主曰聞蜀使來得蜀薑作虀甚好恨爾時失此象曰蜀薑豈不易得願差所使者并付直吳主指左右一人以錢五十付之象書一符以著青竹杖中使行人閉目騎杖杖止便買薑訖復閉目此人承其言騎杖須㬰止已至成都不知是何處問人人言是蜀市中乃買薑于時吳使張温先在蜀既於市中相識甚驚便作書寄其家此人買薑畢捉書負薑騎杖閉目須㬰已還到吳廚下切鱠適了姚光有火術吳主身臨試之積荻數千束使光坐其上又以數千束荻裹之因猛風而燔之荻了盡謂光當已化為燼而光端坐灰中振衣而起把一卷書吳主取其書視之不能解也董奉字君異候官人士燮嘗病死已三日奉以一丸藥與服以水含之捧其頭揺捎之食頃即開目動手顔色漸復半日能起坐四日復能語遂復常晉郭璞字景純河東聞喜人有郭公者客居河東精於卜筮璞從之受業公以青囊中書九卷與之由是遂洞五行天文卜筮之術禳災轉禍通致無方雖京房管輅不能過也欲避地東南抵將軍趙固㑹固所乗良馬死固惜之不接賔客璞至門吏不為通璞曰吾能活馬吏驚入白固固趨出曰君能活吾馬乎璞曰得健夫二三十人皆持長竿東行三十里有丘林社廟者便以竿打拍當得一物宜急持歸得此馬活矣固如其言果得一物似猴將歸此物見死馬便嘘吸其鼻頃之馬起奮迅嘶鳴食如常不復見向物固竒之厚加資給行至廬江太守胡孟康被丞相召為軍諮祭酒時江淮清晏孟康安之無心南渡璞為占曰敗康不之信璞將促裝去之愛主人婢無由而得乃取小豆三斗繞主人宅散之主人晨見赤衣人數千圍其家就視則滅甚惡之請璞為卦璞曰君家不宜畜此婢可於東南二十里賣之愼勿爭價則妖可除也主人從之璞隂令人賤買此婢復為符投於井中數千赤衣人皆反縛一一自投於井中主人大悅璞擕婢去後數旬而廬江䧟宣城太守殷祐遷石頭督䕶璞復隨之時有鼯鼠出延陵璞占之曰此郡東南有妖人欲稱制者尋亦自死矣後當有妖樹生然若瑞而非瑞辛螫之木也儻有此者東南數百里必有作逆期明年矣無錫縣歘有茱萸四株交枝而生若連理者其年盗殺吳興太守袁琇或以問璞璞曰卯爻發而沴金此木不曲直而成災也王導深重之引參已軍事導嘗令作卦璞言公有震厄可命駕西出數十里得一柏樹截斷如身長置常寢處災當可消矣導從其言數日果震柏木粉碎璞素與桓彝友善彝每造之或值璞在婦間便入璞曰卿來他處自可徑前但不可厠上相尋爾必客主有殃彝後因醉詣璞正逢在厠掩而觀之見璞裸身被髪銜刀設醊璞見彝撫心大驚曰吾每屬卿勿來反更如是非但禍吾卿亦不免矣天實為之將以誰咎璞終嬰王敦之禍彝亦死蘇峻之難戴洋好道術妙解占候卜數吳末為臺吏知吳將亡託病不仕廬江太守華譚問洋曰天下誰當復作賊者洋曰王機尋而機反陳眕問洋曰人言江南當有貴人顧彦先周宣珮當是否洋曰顧不及臘周不見來年八月榮果以十二月十七日卒十九日臘玘以明年七月晦亡王導遇病召洋問之洋曰君侯本命在申金為土使之主而於申上石頭立冶火光炤天此為金火相爍水火相煎以故受害爾導即移居東府病遂差鎭東從事中郎張闓舉洋為丞相令史時司馬颺為烏程令將赴職洋曰君宜深愼下吏颺後果坐吏免官洋又謂曰卿雖免官十一月當作郡加將軍至期為太山太守振武將軍颺賣宅將行洋止之曰君不得至當還不可無宅颺果為徐龕所逼不得之郡元帝增颺衆二千使助祖逖洋勸颺不行颺乃稱病收付廷尉俄而因赦得出劉裔鎭尋陽問洋曰我病當差否洋曰不憂使君不差憂使君今年有大厄使君年四十七行年入庚寅太公隂謀曰六庚為白獸在上為客星在下為害氣年命與并必凶當忌十二月二十二日庚寅勿見客裔曰我當解職將君還野中治病洋曰使君當作江州不得解職裔曰温公不復還邪洋曰温公雖還使君故作江州俄如其言卜珝字子玉匈奴後部人少好讀易郭璞見而歎曰吾所不如也奈何不免兵厄珝曰然吾大厄在四十一位為卿相當受禍爾不爾亦為猛獸所害吾亦未見子之令終也璞曰吾禍在江南甚營之未見免兆雖然在南猶可延期住此不過時月珝曰子勿為公吏可以免諸璞曰吾不能免公吏猶子之不能免卿相也珝曰吾此雖當有帝王子終不復奉二京矣琅邪可奉卿謹奉之主晉祀者必此人也珝遂隱於龍門山劉元海僭號徴為大司農侍中固以疾辭元海曰人各有心卜珝之不欲在吾朝何異髙祖四公哉可遂其髙志後復徴為光禄大夫珝謂使者曰非吾死所也及劉聰嗣偽位徴為太常時劉琨據并州聰問何時可平珝答曰并州陛下之分今兹剋之必矣聰戲曰朕欲勞先生一行可乎珝曰臣所以來不及裝者正為是行也聰大悅署珝使持節平北將軍將行謂其妹曰此行也死自吾分後愼勿紛紜及攻晉陽為琨所敗珝卒先奔為其元帥所殺陳訓為都水參軍淮南周亢嘗問訓以官位訓曰君至卯年當剖符近郡酉年當有曲蓋亢曰脫如來言當相薦㧞訓曰性不好官惟欲得米爾後亢果為義興太守金紫將軍時劉聰王彌冦洛陽歴陽太守武瑕問訓曰國家大事如何訓曰胡賊三逼國家當敗天子野死今尚未也其後懐愍二帝果有平陽之酷焉或問其以明年吉凶者訓曰揚州刺史當死武昌大火上方節將亦當死至時劉陶周訪皆卒武昌大火燒數千家吳猛年四十邑人丁義始授其神方因還豫章江波甚急猛不假舟楫以白羽扇畫水而渡觀者異之庾亮為江州刺史嘗遇疾聞猛神異乃迎之問已疾何如猛辭以筭盡請具棺服旬日而死形狀如生未及大斂遂失其尸識者以為亮不祥之徴亮疾果不起幸靈幼有道術順陽樊長賔為建昌令發百姓作官船於建城山中吏令人各作箸一雙靈作而未輸或竊之焉俄而竊者心痛欲死靈謂之曰爾得無竊我箸乎竊者不應有頃逾急靈曰若爾不以情告我者今眞死矣竊者急遽乃首出之靈於是飲之以水病即立愈行人由此敬畏之船成當下吏以二百人引一艘不能動方請益人靈曰此已過足但部分未至爾靈請自牽之乃手執箸惟用百人而船去如流衆大驚怪咸稱其神於是知名有龔仲儒女病積年氣息財屬靈使以水含之已而强起應時大愈又吕猗母皇氏得痿痺病十有餘年靈療之去皇氏數尺而坐㝠目寂然有頃顧謂猗曰扶夫人令起猗曰老人得病累年奈何可倉卒起邪靈曰但試扶起於是兩人夾扶以立少選靈又令去扶即能自行由此遂愈於是百姓奔趣水陸輻輳從之如雲皇氏自以病久懼有發動靈乃留水一器令食之每取水輒以新水補處二十餘年水清如新塵垢不能加焉時髙悝家有鬼怪言語呵叱投擲内外不見人形或器物自行再三發火巫祝壓劾而不能絶適值靈乃要之靈於陌頭望其屋謂悝曰此君之家邪悝曰是也靈曰知之足矣悝固請之靈不得已至門見符索甚多謂悝曰當以正止邪而以邪救邪惡得已乎竝使焚之惟據軒小坐而去其夕鬼怪即絶靈所救愈多此類然不取報謝行不騎乗長不娶妻性至恭見人即先拜言輒自名凡草木之夭傷於山林者必起埋之器物之傾覆於塗路者必舉正之周旋江州間謂其士人曰天地之於人物一也咸欲不失其情性奈何制服人以為奴婢乎諸君若欲享多福以保性命可悉免遣之十餘年間賴其術以濟者極多後乃娶妻畜車馬奴婢受貨賂致遺於是其術稍衰所療得失相半焉南齊顧歡事黄老道解隂陽書為術數多効驗以太學博士徴不就梁沈僧昭為山隂縣令武陵王紀為㑹稽太守宴坐池亭蛙鳴聒耳王曰殊廢絲竹之聽僧昭呪厭十許口便息及日晚又曰欲其復鳴僧昭曰王歡已䦨今恣汝鳴即便喧聒後魏王早渤海南皮人明隂陽明元時喪亂之後多相殺害有人詣早求問勝術早為設法令各無咎由是州里稱之有東莞鄭氏因為同縣趙氏所殺其後鄭氏執得讐人趙氏又尅明晨㑹宗族當就墓所刑之趙氏求救於早早為占候并授以一符曰君今且還選壯士七人令一人為主者佩此符於雞鳴時伏在仇家宅東南二里許平旦當有十人相隨向西北行中有二人乘黑牛一黑牛最在前一黑牛應第七但捉取第七者將還事必無他趙氏從之果如其言乃是鄭氏五男父也諸子竝為其族所宗敬故和解二家趙氏竟免太武圍凉州未抜遣騎召之及至詔問何時當得此城早對曰陛下但移據西北角三日内必剋太武從之如期而剋時久不雨帝問早早曰今日申時必大雨比至未猶無片雲帝召早詰之早曰願更少時至申時雲四合遂大雨滂沱孫紹明隂陽術為右將軍大中大夫數曾與百寮赴朝東掖未開守門候旦紹於衆中引吏部郎中辛雄於衆外竊謂之曰此中諸人尋當死盡唯吾與卿猶享富貴雄甚駭愕不測所以未幾有河隂之難紹善推禄命事驗甚多知者異之北齊繇吾道榮琅邪人少好道法與其同類相求入太山潛隱具聞道術仍遊鄒魯之間習儒業聞晉陽有人大明法術乃尋之是人為人家傭力無識之者久乃訪知其人道家符水禁呪隂陽暦數天文藥性無不通解以道榮好尚乃悉授之是人謂道榮云我本恒嶽仙人有少罪過為天官所謫今限滿將歸卿宜送吾至汾水及河值水暴長橋壊船渡艱難是人乃臨水禹歩以一符投水中流便絶俄頃水積甚髙是人徐自沙石上渡唯道榮見其如是傍人咸云水如此長此人遂能浮過共驚異之道榮乃歸隱於琅邪山辟榖餌松术茯苓求長生之秘尋為文宣追往晉陽至遼陽山中有猛獸去馬十歩所追人驚怖將走道榮以杖畫地成火坑猛獸遽走俄值國廢道榮遂歸隋初卒綦毋懐文以道術事神武東魏武定初官軍與周文戰於邙山是時官軍旗幟盡赤西軍旗幟盡黑懐文曰赤火色黑水色水能滅火不宜以赤對黑土勝水宜改為黄神武遂改為黄所謂河陽幡者也懐文造宿鐵刀其法燒生鐵精以重柔鋌數宿則成剛以柔鐵為刀脊浴以五牲之溺淬以五牲之脂斬甲過三十札今襄國冶家所鑄宿柔鋌是其遺法作刀猶甚快利但不能頓截三十札也懐文又云廣平郡南幹子城是干將鑄劒處其土可瑩刀每云昔在晉陽為監館館中有蠕蠕客同館胡沙門指語懐文云此人别有異筭術乃指庭中一棗樹云令其布筭子即知實數乃試之并辨若干純赤若干赤白相半於是剥數之唯少一子筭者曰必不少但更撼之果落一實懐文位信州刺史孫正言嘗謂人曰我昔武定中為廣州士曹聞曹普演有言髙王諸兒阿保當為天子至髙徳之承之當滅阿保謂天保也徳之謂徳昌也滅年號承光即承之矣陸法和不知何許人也隱於江陵百里洲衣食居處一與苦行沙門同耆老自幼見之容色常定人莫能測也或謂出自嵩髙遍遊遐邇既入荆州汶陽郡髙要縣之紫石山無故捨所居山俄有蠻賊文道期之亂時人以為預見萌兆及侯景始告降於梁法和謂南郡朱元英曰貧道共檀越擊侯景去元英曰侯景為國立効師云擊之何也法和曰正自如此及景渡江法和時在青谿山元英往問曰景今圍城其事云何法和曰凡人取果宜待熟時固問之曰亦尅亦不尅景遣將任約擊梁湘東王於江陵法和乃詣湘東乞征約召諸蠻弟子八百人在江津二日便發湘東遣胡僧祐領千餘人與同行法和登艦大笑曰無量兵馬江陵多神祠人俗所祈禱自法和軍出無復一驗人以為諸神皆行故也至赤沙湖與約相對法和乘輕船不介胄沿流而下去約軍一里乃還謂將士曰聊觀彼龍睡不動吾軍之龍甚自踊躍即攻之若得待明日當不損客主一人而破賊然有惡處遂縱火船而逆風不便法和執白羽扇麾風風即返約衆皆見梁兵歩於水上於是大潰皆投水約逃竄不知所之法和曰明日午時當得及期而未得人問之法和曰吾前於此洲水乾時建一刹語檀越等此雖為刹實是賊標今何不向標下求賊也如其言果於水中見約抱刹仰頭裁出鼻遂禽之約言求就師目前死法和曰檀越有相必不兵死且於王有縁决無他慮王於後當得檀越力爾湘東果釋用為郡太守及魏圍江陵約以兵赴救力戰焉法和既平約往進見王僧辯于巴陵謂曰貧道已却侯景一臂其更何能為檀越宜即逐取乃請還湘東王曰侯景自然平矣無足可慮蜀賊將至法和請守巫峽待之乃總諸軍而往親運石以塡江三日水遂不流横之以鐵鎖武陵王紀果遣蜀兵來渡峽口勢蹙進退不可王琳與法和經略一戰而殄之軍次白帝謂人曰諸葛孔明可謂為名將吾自見之此城旁有其埋弩箭鏃一斛許因挿表令掘之如其言又嘗至襄陽城北大樹下畫地方二尺令弟子掘之得一龜長尺半以杖叩之曰汝欲出不能得已數百歳不逢我者豈見天日乎為授三歸龜乃入草初八疊山多惡疾人法和為採藥療之不過三服皆差即求為弟子山中多毒蟲猛獸法和授其禁戒不復噬螫所泊江湖必於峯側結表云此處放生漁者皆無所得或少獲輒有大風雷船人懼而放之風雨乃定晚雖將兵猶禁諸軍漁捕有竊違者中夜猛獸必來欲噬之或亡其船纜有小弟子戲截蛇頭來詣法和法和曰汝何意殺因指以示之弟子乃見蛇頭齚袴襠而不落法和使懴悔為蛇作功徳又有人以牛試刀一下而頭斷來詣法和法和曰有一斷頭牛就卿徴命殊急若不為作功徳一月内報至其人弗信少日果死法和又為人置宅圖墓以避禍求福嘗謂人曰勿繫馬於碓其人行過鄉曲門側有碓因繫馬於其柱入門中憶法和戒走出將解之馬已斃矣梁元帝以法和為都督郢州刺史封江乘縣公法和不稱臣其啓文朱印名上自稱居士後稱司徒元帝謂其僕射王褒曰我未嘗有意用陸為三公而自稱何也褒曰彼既以道術自命容是先知元帝以法和功業稍重遂就加司徒都督刺史如故部曲數千人通呼為弟子唯以道術為化不以法獄加人又列肆之所不立市丞牧佐之法無人領受但以空檻籥在道間上開一孔以受錢賈客店人隨貨多少計其估限自委檻中所掌之司夕方開取條其孔目輸之於庫又法和平常言若不出口時有所論則雄辯無敵然猶帶蠻音善為攻戰具在江夏大聚兵艦欲襲襄陽而入武關元帝使止之法和曰法和是求佛之人尚不希釋梵天王坐處豈規王位但於空王佛所與主上有香火因縁見主上應有報至故救援爾今既被疑是業定不可改也於是設供食具大䭔薄餅及魏舉兵法和自郢入漢口將赴江陵元帝使人逆之曰此自能破賊師但鎭郢州不須動也法和乃還州堊其城門著麤白布衫袴布邪巾大繩束腰坐葦席終日乃脫之及聞元帝敗滅復取前凶服著之哭泣受弔梁人入魏果見䭔餅焉法和始於百里洲造壽王寺既架佛殿更截梁柱曰後四十許年佛法當遭雷雹此寺幽僻可以免難及魏平荆州宫室焚燼總管欲發取壽王佛殿嫌其才短乃停後周氏滅佛法此寺隔在陳境故不及難文宣天保六年春清河王岳進平臨江法和舉州入齊文宣以法和為大都督十州諸軍事太尉公西南大都督五州諸軍事荆州刺史安湘郡公宋莅為郢州刺史官爵如故莅弟䔏為散騎常侍儀同三司湘州刺史義興縣公梁將侯瑱來逼江夏齊軍棄城而退法和與宋莅兄弟入朝文宣聞其有奇術虚心相見之備三公鹵簿於城南二十里供帳以待之法和遥見鄴城下馬禹歩辛術謂曰公既萬里歸誠主上虚心相待何作此術法和手持香鑪歩從路車至於館明日引見給通幰油絡網車伏身百人詣闕通名不稱官爵不稱臣但云荆山居士文宣宴法和及其徒屬於昭陽殿賜法和錢百萬物萬叚甲第一區田一百頃奴婢二百人生資什物稱是宋莅千叚其餘儀同刺史以下各有差法和所得奴婢盡免之曰各隨縁去錢帛散施一日便盡以官所賜宅營佛寺自居一房與凡人無異三年間再為太尉世猶謂之居士無疾而告弟子死期至時燒香禮佛坐繩牀而終浴訖將斂屍小縮止三尺許文宣令開棺視之空棺而已法和書其所居屋壁而塗之及剥落有文曰十年天子為尚可百日天子急如火周年天子遞代坐又曰一母生三天兩天共五年說者以為婁太后生三天子自孝昭即位至武成傳位後主共五年焉許遵高陽人明易善筮兼曉天文風角占相逆刺其驗若神高祖引為館客自言禄命不富貴不横死是以任性疏誕多所犯忤高祖嘗容借之河隂之役遵謂李業興曰彼為火陣我為木陣火勝木我必敗果如其言清河王岳以遵為開府記室岳封王以告遵遵曰蜜蜂亦作王岳後將救江陵遵曰此行致後凶宜辭疾勿去岳曰勢不免去正當與君同行遵曰好與生人相隨不欲共死人同路遂還岳至京尋喪荆次徳有術數預知爾朱榮成敗又言代魏者齊葛榮聞之故自號齊王待次徳以殊禮問其天人之事對曰齊當興東海出天子今王據渤海是齊地又太白與月并宜速用兵遲則不吉榮不從魏寧以善推禄命徴為館客武成親試之皆中張子信河内人也頗渉文學少以醫術知名嘗隱白鹿山時出遊京邑甚為魏收崔季舒所重武成大寧中徴為尚藥典御後主武平初又以大中大夫徴之聽其所志還山又善易筮及風角之術武衛奚永雒與子信對坐有鵲鳴庭樹鬭而墮焉子信曰不善向夕當有風從西南來厯此樹拂堂角則有口舌事今夜有喚必不可往雖勅亦以病辭子信去後果有風如其言是夜琅邪王五使切召永雒且云勅喚永雒欲起其妻苦留之稱墜馬腰折不堪動詰朝而難作後周衞元嵩蜀都人好言將來之事蓋江左寶誌之流武帝太和中著詩預論周隋廢興及唐家受命竝有徴楊伯醜臨孝恭劉祜俱以隂陽術數知名史竝不載官唐師市奴方術人也武徳七年市奴合金銀竝成高祖異之以示侍臣封徳彞進曰漢代方士及劉安等皆學術唯苦黄白不成今為食器可得不死高祖哂之明崇儼雒州偃師人崇儼年少時隨父任安喜令父之小吏有善役召鬼神者崇儼盡能傳其術乾封初應封岳舉授黄安丞㑹刺史有女病篤崇儼致他方殊物以療之其疾乃愈官至正諫大夫葉法善括蒼人自曾祖三世為道士皆有攝養占卜之術法善少傳符籙尤能厭劾鬼神高宗聞其名徴詣京師將加爵位固辭不受求為道士固留在道塲供待之甚厚時高宗廣徴諸方道術之士各合煉黄白法善上言金丹難就徒費財物有虧政理請覈其眞偽帝然其言因令法善試之繇是逐出九十餘人遂一切罷之法善於東都凌空觀設壇醮祭雒中士庶競往觀之俄頃數十人自投於火中觀者大驚救之而免法善曰此皆魑魅於吾法所攝爾問之果然法善悉為禁劾其病遂愈法善自高宗則天中宗殆五十年常來名山數召入禁中盡禮問道然排擠佛法議者或譏其向背以其術高終莫之測也睿宗即位稱法善有㝠助之力先天二年拜鴻臚卿封越國公仍依舊為道士止於京師之景龍觀又贈其父為歙州刺史當時尊寵莫與為比開元八年卒年九十桑道茂善太乙遁甲五行災異之說言事無不中代宗召之待詔禁中徳宗建中三年上言請城奉天為王者之居外象龜形内列六街徳宗素神道茂言遂命京兆尹嚴郢發衆數千與六軍之士雜往城之時屬盛夏而土功大起人莫知其故至四年十月避難於奉天方驗道茂之言後唐廣微者華州僧也知術數末帝在河中廣微嘗密謂房暠曰相公極貴然明年有大厄極危如得濟此厄事不可言明年果有楊彦温之變張濛岐州之瞽者自言知術數不龜不蓍言事太白山神其神祠元魏時崔浩廟時事否泰人之休咎濛若於神傳吉凶之言房暠泥於事神酷信之末帝在岐陽暠引濛謁見聞帝語乃駭然曰非人臣也令暠詢其時即傳神語曰三珠併一珠驢馬没人驅歳月甲庚午中興戊巳土暠請解曰神言予不知也長興四年五月府廨諸門無故自動人頗駭異遣暠及濛見暠來未交言先問暠衙署小異勿怪不出三日有恩命其夜報至封潞王及帝被疑除鎭甚懼再三質濛初濛曰且為備王保無患及王思同兵將至又召濛謂之曰爾言吾無患今天下兵來萃我城内無兵無食外無援助得無患乎濛曰王有天下不能獨力朝廷兵來迎王也王若疑臣臣唯一子未及冠請王致之麾下以質臣心及帝入雒受太后册曰御明堂宰相讀文維應順元年歳次甲午四月庚午朔帝廻視房曰張濛神言甲庚事不亦異乎帝令暠共術士解三珠一珠事言三珠三帝也驢馬無人驅失主也帝即位以濛為將作少監同正賜金紫周沙門遇堯浙東人也世宗酷好㸃化之術遇堯為帝面致其事及覽其所為則瑩澤可愛帝大嗟賞之故令攻而為器以賜近臣焉既而賜遇堯紫方袍號悟眞廣濟大師册府元龜卷八百七十六
