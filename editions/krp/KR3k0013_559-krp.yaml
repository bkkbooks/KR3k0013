body:
  text: 冊府元龜卷五百五十九宋王欽若等撰國史部論議北齊陽休之為通直散騎侍郎與魏收等修國史魏收立高祖本紀取平四胡之嵗為齊元收在齊州恐史官改奪其意上表論之武平中收還朝勑集朝賢議其事休之立議從天保為限斷魏收存日猶兩議未决收死後便動諷内外發詔從其議李徳林為通直散騎侍郎魏收與陽休之論齊書起元事勑集百司㑹議收與徳林書曰前者議文緫諸事意小如混漫難可領觧今便去隨事條列幸為㽞懷細加推逐凡言或者皆是敵人之議既聞人説因而探論耳徳林復書曰即位之元春秋常義謹按魯君息姑不稱即位亦有元年非獨即位得稱元年也議云受終之元尚書之古典謹按大傳周公攝政一年救亂二年伐殷三年踐奄四年建侯衞五年營成周六年制禮作樂七年致政成王論者或以舜禹受終為天子然則周公以臣禮而死此亦稱元非獨終為帝也蒙示儀文扶病省覽荒情迷識暫得發蒙當世君子必無横議唯應閣筆贊成而已輙謂前二條有益高議仰見議中不録謹以冩呈收重遺書曰惠示二事感佩殊深以魯公諸侯之事非小為疑息姑不書即位舜禹亦不言即位息姑雖攝當得書元舜禹之攝元理也周公居攝乃云一年救亂似不稱元自無大傳不得尋討一之與元其事何别更有所見幸可論之徳林答曰攝之與相其義一也故周公攝政孔子曰周公相成王魏武相漢曺植曰如虞翼唐或云高祖身未居攝灼然非理攝者專賞罰之名古今事殊不可以禮為㫁陸機見舜肆類上帝班瑞羣后便云舜有天下不須格於文祖也欲使晉之三王異於舜攝竊以為舜若堯死獄訟不歸便是夏朝之益何得不須格於文祖也若便用王者禮便曰即真則周公負扆朝諸侯霍光行周公之事皆帝乎斯不然必知高祖與舜不殊不㣲從士衡之謬或以為書元年者當時實録非追書也大齊之興實繇武帝謙匿受命豈直史也比觀論者聞追舉受命之元多有河漢但言追數受命之嵗情或安之似所怖懼者元字耳事類朝三是許其一年不許其元年也按易黄裳元吉鄭𤣥注云如舜試天子周公攝不殊傳雖無元字一之與元無異義矣春秋不言一年一月者欲使人君體元以居正此盖史之婉辭非一與元别也漢獻帝死劉備自尊崇陳壽蜀人以魏為賊寜肯蜀主未立已云魏武受命乎衡自尊本國誠如高議欲使三方鼎峙同為覇名習氏漢晉春秋意在是也正司馬炎兼并許其帝號魏之君臣呉人並以為賊寜肯當塗之世云晉有受命之徴史者編年也故魯號紀年墨子又云吾見百國春秋史又無有事而書年者是重年驗也若欲高祖事謙冲即須號令皆惟魏氏便是編魏年紀魏事此即魏末功臣之傳豈復皇朝帝紀者也陸機稱紀元立斷或以正始或以嘉平束晳議云赤雀白魚之事恐晉朝之議是并論受命之元非上代終之斷也公議云陸機不議元者是所未喻願更思之陸機以刋本著於虞書龕黎見於商典以蔽晉朝正始嘉平之議斯又謬矣唯可二代相渉兩史並書必不得以後朝創業之迹斷入前史若然則世宗高祖皆天保已前入魏氏列傳不作齊朝帝紀可乎此既不可彼復何證後周桺虬為太祖丞相府記室虬以史官宻書善惡未足懲勸乃上疏曰古者人君立史官非但記事而已盖所以為鑒誡也動則左史書之言則右史書之彰善癉惡以樹風聲故南史抗節表崔杼之罪董狐書法明趙盾之愆是知直筆於朝其來乆矣而漢魏以還宻為記注徒聞後世無益當時非所謂將順其美規救其惡者也且著述之人宻書其事縱能直筆人莫之知何止物生横議亦自異端互起故班固致受金之名陳夀有求米之論著漢魏者非一氏造晉史者至數家後代紛紜莫知凖的伏惟陛下則天稽古勞心庶政開誹謗之路納忠讜之言諸史官記事者請皆當朝顯言其狀然後付之史閣庶令是非明著得失無隠使聞事善者日修有過者知懼敢以愚管輕冒上聞乞以瞽言訪之衆議事遂施行唐劉允濟則天長安中為鳯閣舍人修國史允濟嘗云史官善惡必書言成軌範使驕主賊臣有所知懼此亦權重理合貧而樂道也昔班生受金陳夀求米僕視之如浮雲爾但百寮善惡必書足為千載不朽之美談豈不勝哉朱敬則長安中為正諌大夫平章事兼修國史敬則請擇史官上表曰國之要者在乎記事之官是以五帝𤣥風資其筆削三王盛事藉以垂名此才之難其難甚矣何以知其然昔平王東遷歴年數百齊桓之九合天下晉文之一戰諸侯秦穆逺覇西戎楚莊利盡南海禮樂人物間爾無聞今之所存獨載魯史向者魯無君子記傳則遺雄覇逺圖必墜於地可不惜哉只如齊周小國之主尚能㽞意於史冊齊神武嘗謂著作郎魏收曰卿勿見陳元康楊遵彥等在吾目前趨走謂吾以為勤勞我後代聲名在於卿手最是要事勿謂我不知及文宣即位又嘗勑收曰好直筆勿謂懼我終不作魏太武誅史官又周文帝之為相也納桺虬之説特命書法不隠其志在懲勸如此伏以陛下聖徳鴻業誠可垂範將來儻不遇良史之才則大典無繇而就也且董狐南史豈知生於往代而獨無於此時在乎求與不求好與不好爾今若訪得其善者伏願朂之以公忠期之以逺大更超加美職使得行其道則天下幸甚劉知㡬字子𤣥為太子中允修史中宗景龍中侍中韋巨源紀處納中書令楊再思兵部尚書宗楚客中書侍郎蕭至忠並監修國史知㡬以監修者多甚為國史之弊蕭至忠又嘗責知㡬著述無課知㡬於是求罷史任奏記於至忠曰僕㓜聞詩禮長渉藝文至於史氏之言尤所躭悦尋夫左史右史是曰春秋尚書素王素臣斯稱㣲婉志晦兩京三國班謝陳習闡其謩六朝江左王陸干孫紀其厯劉石僣號方䇿委於和張宋齊膺籙博史歸於蕭沈亦有汲塜古篆蟲穴殘編孟堅所亡葛洪傳其雜記休文所缺荀綽裁其拾遺凡此諸家其流盖廣莫不賾彼泉藪尋其枝葉原始要終備知之矣若乃劉峻作傳自述長於論才范曄為書盛言務其贊體斯又當仁不讓庶㡬前哲者焉然自䇿名士伍待罪朝列三為史臣再入東觀終不能勒成國典貽彼後來者何哉静言思之其不可有五故也何者古之國史皆出自一家如魯漢之邱明子長晉齊之董狐南史咸能立言垂之不朽藏之名山未聞藉以衆功方云絶筆惟後漢東觀大集羣儒著述無主條章靡立繇是伯度譏其不實公理以為可焚張蔡二子紏之於當代𫝊范兩家嗤之於後葉今者史司取士有倍東京人自以為荀袁家自稱為政駿每欲書一事載一言皆閣筆相視含毫不斷故白首可期而汗青無日其不可一也前漢郡國計書先上太史副上丞相後漢公卿所撰始集公府乃上蘭臺繇是史書所修載書為博爰自近古此道不行史臣編録唯自詢採而左右二史闕注起居衣冠百家罕通行狀求風俗於州郡視聽不該訪㳂革於臺閣簿籍難見雖使尼父再出猶且成其管窺况限以中才安能遂其博物其不可二也昔董狐之書法也以示於朝南史之書弑也執簡以往而近代史局皆通籍禁門幽居九重欲人不見尋其義者盖繇杜彼顔靣訪諸請謁故也然今館中作者多士如林皆願長喙無聞齰舌儻有五始初成一字加貶言未絶口而朝野俱知筆未栖毫而縉紳咸誦夫孫盛實録取嫉權豪干寳直言受譏朝士人之情也能無畏乎其不可三也古者刋定一史纂成一家體統各殊指歸咸别夫尚書之教也以疏通知逺為主春秋之義也以懲惡勸善為先史記則退處士而進奸雄漢書則抑忠臣而餙主闕斯並曩賢得失之例良史是非之凖作者言之詳矣頃史官注記多取禀監修楊令公則云必須直詞宗尚書則云宜多隐惡十羊九牧其命難行一國三公適從安在其不可四也竊以史置監修雖無古式尋其名號可得而言夫監者盖緫領之義如創紀編年則有斷限草傳叙事則有豐約或可畧而不畧或應書而不書此刋削之務也屬詞比事勞逸宜均揮鈆奮槧勤惰須等狀帙某篇付之此職某紀某傳歸之彼官此銓配之理也斯並宜明立科條審言區域儻人思自勉則書可立成今監之者既不指授修之者又無遵奉徒使爭學茍且務相推避坐變炎凉徒消嵗月其不可五也凡此不可其流實多一言以蔽三隅自反而時談物議烏得笑僕編次無聞者哉比者伏見明公每汲汲於勸誘勤於課責或云籍墳事重努力用心或云嵗序已淹何時輟手竊以綱維不正而督課徒勤雖威以刺骨之刑朂以懸金之賞終不可得也語曰陳力就列不能則止僕所以比者布心知己瀝懇羣公屢辭載筆之官願罷記言之職者正為此爾當今朝號得人國稱多士蓬山之下良直差肩芸閣之中英竒接武僕既功虧刻鵠筆未絶麟徒殫太官之膳虗索長安之米乞以本職還其舊居多謝簡書請避賢路惟明公足下哀而許之至忠惜其才不許觧史任宗楚客嫉其正直謂諸史官曰此人作書如是欲置我於何地也後禮部尚書鄭惟忠嘗問子𤣥曰自古已來文士多而史才少何也對曰史才須有三長世無其人故史才少也三長謂才也學也識也夫有學而無才亦猶有良田百頃黄金滿籝而使愚者營生終不能致於貨殖者矣如有才而無學亦猶思兼匠石巧若公輸而家無楩柟斧斤終不果成其宫室者矣猶須好是正直善惡必書使驕主賊臣所以知懼此則為虎傅翼善無可加所向無敵者矣脱茍非其才不可叨居史任李元紘為中書侍郎開元中詔右丞相張説在家修史元紘奏曰國史者記人君善惡國政損益一字貶褒千載稱之今張説在家修史呉兢又在集賢撰録今國之大典散在數處且太宗别置史館在於禁中所以重其職而秘其事望勒説等就史館参詳撰録則典冊舊章不墜矣從之沈既濟為左拾遺史館修撰既濟以呉兢撰國史以則天事為本紀奏議非之曰史氏之作本乎懲勸以正君臣以維邦家前端千古後法萬代使其生不敢差死不忘懼緯人倫而經世道為百王凖的不止屬辭比事以日繫月而已故善惡之道在乎勸誡勸誡之柄存乎褒貶是以春秋之義尊卑輕重昇降㡬㣲髣髴雖一字二字必有㣲㫖存焉况鴻名大統其可以貸乎伏以則天皇后初以聰明睿哲内輔時政厥功茂矣及𢎞道之際孝和以長君嗣位而太后以專制臨朝俄又廢帝或幽或徙既而握圗稱録移運革名北司鷰啄之蹤難乎備述其後五王建䇿皇運復興議名之際得無降損必將義以親隐禮從國諱茍不及損當如其常安可横絶彛典超居帝籍昔仲尼有言必也正名故夏殷二代為帝者三十世矣而周人通名之曰王呉楚越之君為王者百餘年而春秋書之為子盖高下自乎彼而是非稽乎我過者抑之不及者援之不以弱减不為僣奪握中持平不振不傾使其求不可得而蓋不可掩斯古君子所以損其名也夫則天體自坤順位居乾極以柔乘剛天紀倒張進以强有退非徳讓今史臣追書當稱之為太后不宜曰上孝和雖追母后之命降居藩邸而體元繼代本吾君也史追書宜稱曰皇帝不宜曰廬陵睿宗在景龍已前天命未集徒禀向制假臨大寳於倫非次於義無名史臣書之宜曰相王未宜曰帝若以得失既往遂而不舉則是非褒貶安所辨正載筆執簡謂之何哉則天廢國家歴數用周正朔廢國家太廟立周七廟鼎命革矣徽號易矣旂裳服色既以殊矣今安得以周氏年歴而列為唐書帝紀徴諸禮經是謂亂名且孝和繼天踐阼在太后之前而叙年製紀居太后之下方之躋僖是謂不智詳今考古並未為可或曰班馬良史也編述漢事立高后以續帝載豈有非之者乎答曰昔高后稱制因其曠嗣獨有分王諸吕負於漢約無遷鼎革命之甚况其時孝惠帝已殁孝文在下宫中二子非劉氏種不紀吕后將紀誰焉雖云其然議者猶為不可况遷鼎革命者乎或曰若天后不紀帝緒缺矣則二十二年行事何所繫乎曰孝和以始年登大位以季年復舊業雖尊名中奪而天命未改足以首事足以表年何所拘閡裂為二紀昔魯昭之出也春秋嵗書其居曰公在乾侯且君在雖失位不敢廢也今請併天后紀今孝和紀每於嵗首必書孝和所在以統之書曰某年春正月皇帝在房陵太后行某事改其制云云則紀稱孝和而事述太后俾名不失正而禮不違常名禮兩得人無間矣其姓氏名諱入宫之繇歴位之資才藝智畧别纂録入皇后傳列於廢后王庶人之下題其篇曰則天順聖武皇后云事雖不行而史氏稱之李翺為國子博士史館修撰翺以史記事不實奏曰臣謬得秉史館以記録為職夫勸善懲惡正言直筆紀聖朝功徳述忠賢事業載奸臣醜行以傳無窮者史官之任也凡人之事跡非大善大惡則衆無繇知之舊例皆訪問於人又取行狀謚議以為一據今之作行狀者非其門生即其故吏莫不虚加仁義禮智妄言忠肅惠和此不惟其心不實茍欲虚美於所受恩者而已也盖亦為文者既非游夏遷雄之列務於華而忘其實溺於詞而棄其理故為文則失六經之古風紀事則非史遷之實録不如此則詞句鄙陋不能自成其文章矣繇是事失其本文害於理而行狀不足以取信若使指事書實不餙虚言則必有人知其真偽不然者縱使門生故吏為之亦不可謬作徳善之事而加之矣臣今請作行狀者但指事説實直載其詞則善惡功跡皆據事實足以自見矣假令傳魏徴但記其諌事之詞自足以為正直如傳叚秀實但記其倒用司農寺印以追逆兵又以象笏擊朱泚自足以為忠烈矣若考功視行狀之不依此者不得受視依此乃下太常及牒史館太常定謚後亦以謚議牒送史館則行狀之言縱未可以一一皆信與其虚加妄言都無事實者猶山澤高下不同也史氏記録須得本末茍慿徃例皆是虚言則使史官何所為據伏乞下臣此奏使考功守行臣等要加事實輙敢陳論制可李徳裕為司空平章事奏時政記起居注記修史體例等伏以時政記長夀二年宰臣姚璹以為帝王謨訓不可闕於紀述史官踈逺無因得書請自今以後所論軍國政要宰臣一人撰録號為時政記厥後因循多闕紀述臣等商量爾後坐日每聞聖言如有慮及生靈事關興替可昭示百代貽謀後昆者及宰臣獻替謀猷有益風教並請依國朝故事其曰知印宰臣撰録連署名封印至嵗末送付史館起居注記比者不逐季撰録至有去官三五年後猶未送納者伏以每度延英奏事後向外傳説三事猶兩事虚謬豈有起居注記皆三數年後採拾得傳聞耳目已隔固非實事向後起居注記望每季初即送納自前一季文書與史館納訖具狀申中書門下史館受訖亦申報中書門下其起居改轉便望以注記遲速為殿最如有軍國大政傳聞疑誤仍許政事堂都見宰相等臨時酌量如事已施行非闗機宻者並一一向説所冀書存信實免有疑誤修史體例臣等伏見近日實録多云禁中言者伏以君上與宰臣及公卿言事皆須衆所聞見方合書於史䇿禁中之語向外何繇得之或得於傳聞多出邪佞便載史筆實累鴻猷向後實録中有如此類並請刋削更不得以此紀述又宰臣及公卿論事行與不行須有明據或奏議允愜必見褒稱或所論乖僻固有懲責在藩鎮獻表者有答詔居要官啓事者亦合著明並當昭然在衆人耳目或取捨在於堂案或與奪形於詔勑前代史書載名自奏議無不繇此近見實録多載宻疏言不彰其明聽事不顯於當時得自其家實難取信向後所載羣臣章奏其可否得失須朝廷共知者方可紀述宻疏並請不載如此則書之可法人皆守公愛惜之志不得褒貶之言必信伏見近日實録事多紕繆若詳求摭實須舉舊章從之韋籌為左拾遺開成三年八月進書史觧表共五通勑令史館商量進來者史館奏曰臣等謹按春秋尚書最為前史事言異貫義體兩存今韋籌所著意實即師古欲使本朝大典與千古同風然漢氏已還更立史法稽其指要事歸詳盡伏以聖唐馭宇向三百年聲教逺垂文物大備祖功宗徳傳諸不朽本紀實録之外復有注記典厯盖史氏職司大體簡畧乆已著定遽難變更臣等參酌古今須歸的當况歴代編紀名號實繁雖統制各殊悉傳示於後伏請以籌所進之書藏於史館待其著述功畢令與舊史兼行則國朝典法今古咸備從之晉曺國珍為左諌議大夫高祖天福四年國珍上章請於内外臣寮之中擇選才畧之士聚唐六典前後㑹要禮閣新儀大中統類律令格式等精詳纂集别為一部商議今古俾無漏畧目之為大晉政統用作成規報詔曰國珍職居諌諍志在恢𢎞當其鼎社開基乃欲象魏懸法請詳前代之編簡别創新朝之楷模以示將來甚為允當其詳議官宜差太子少師梁文矩左騎常侍張允大理卿張澄國子祭酒唐汭大理少卿高鴻漸國子司業田敏禮部郎中吕咸休司勲員外郎劉濤刑部員外郎李知損監察御史郭延升等一十人允汭等咸曰改前代禮樂刑憲為大晉政統則堯典舜典當以晉典革名列狀駮之曰作者之謂聖述者之謂明茍非聖明焉能述作若運因革故則事乃惟新或改正朔而變犧牲或易服色而殊徽號是以五帝殊時不相㳂樂三王易世不相襲禮止於近代率繇舊章比及前朝是滋其目多因行事之失改為立制之初或臣奏條君行可否皆表其年紀以姓名聚類分門成文作則莫不悉稽前典垂範後昆述自聖賢歴於朝代得金科玉條之號設亂言破律之防守而行之其來尚矣皇帝陛下運齊七政歴契千年爰從創業開基莫不積功累徳所宜直筆具載鴻猷若備録前代之編年目作聖朝之政統此則是名不正也夫名不正則言不順而媚時掠美非其實矣若翦截其詞此則是文不備也夫文不備則啓事端而禮樂刑政於斯亂矣若改舊條而為新制則未審何門可以刋削何事可以編聨既當革故從新又須廢彼行此則未知國朝能守而不失乎臣等同共參詳未見其可况臣等學慚該古識昧折中當君上順道師古之時無臣下亂名改作之犯則天下幸甚天下幸甚疏奏其事遂寢冊府元龜卷五百五十九
