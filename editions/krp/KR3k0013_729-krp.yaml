  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_729-1a}
body:
  text: 册府元龜卷七百二十九宋王欽若等撰幕府部辟署第四唐于頎字休甫河南人少以吏事聞累授京兆府士曹為尹史翽所知翽出鎭襄陽奏為御史充判官大歴中第五琦署為河東租庸糧料鹽鐵等使務元載為諸道營田使又署為郎官令於東都汝州開置屯田于頔字允元河南人始以千牛備身調華隂尉黜陟使劉灣辟為判官李元諒勇敢多計少從軍備禁衛積功勞至試太子詹事鎭國軍節度使李懐讓署奏鎮國軍副使使領州盧綸建中初為昭應令朱泚之亂咸寜王渾瑊充京城西面副元帥板綸為元帥判官檢校金部郎中呂元膺鄆州東平人質度瓌偉有公侯之器建中初䇿賢良對問髙第授陕州安邑尉同州刺史侯鐈聞其名辟為長春宮判官屬蒲賊侵軼鐈失所守元膺遂潜跡不務進取貞元初論惟明節制渭北延在賓席自是名逹於朝廷鄭雲逵滎陽人大歴初舉進士性果誕敢言客遊兩河以畫干朱泚泚恱表為判官授大理評事累諌議大夫奉天之難奔赴行在居數月李晟表為行軍司馬戎略多咨之賊平拜給事中趙植奉天人朱泚之亂徳宗幸奉天以家人奴客奮力拒守仍獻家財以助軍資賊平咸寕王渾瑊辟為推官貞元初遷鄭州刺史鄭滑節度使李融奏兼副使郗士美字和夫未冠為陽翟丞李抱真鎮潞州辟為從事雅有叅賛之績李鄘字建侯為李懐光所辟懐光叛鄘宻奏賊軍虚實及攻取之勢事泄懐光囚之獄中懐光死馬燧就獄致禮表為河東從事尋以言不行歸養雒中襄州節度嗣曹王臯致禮延辟署為從事崔從貞元初進士登第釋褐山南西道推官以父憂免䘮不應辟命乆之西川節度韋臯奏掌西山運務知卭州事劉闢阻命從拒守不從之闢平從事坐累多伏法唯從以拒闢免盧坦在宣州辟為團練副使胡証字啓中河東人舉進士貞元中登科渾瑊為河中節度使辟為從事自殿中侍御史拜韶州刺史以母年髙不可適逺改授太子舍人襄陽節度使于頔請為掌書記程异為華州鄭縣尉精於吏職剖析無滯杜雍之刺同州帥河中辟為賔佐韋綬字子章初為長安尉朱泚之亂變服乘驢赴奉天于頔鎮襄陽辟為賔佐叚平仲舉進士杜佑李復相繼鎭淮南皆表為掌書記復移鎭華州仍為從事劉伯芻登進士第志行脩謹淮南杜佑辟為從事穆員工文詞尚節義杜亞為東都留守辟為從事檢校員外郎路隨泌子也為潤州叅軍為李錡所困使知市事隨翛然坐市中不介意韋夏卿為東都留守聞而辟之由是聲名自振孟郊少隱於嵩山稱處士李翺分司雒中與之遊薦於留守鄭餘慶辟為賔佐餘慶鎭興元又奏為從事辟書下而卒竇羣為侍御史順宗時附王叔文為叔文之黨出為唐州刺史羣至唐州節度使于頔以故人待之署羣為副使表兼御史中丞賜金紫竇嘗字中行大歴十四年登進士第寓居廣陵之柳楊結廬種樹不求茍進以講學著書為事凡二十年不出貞元十四年杜佑鎮淮南奏授校書郎為節度叅謀馬總字㑹元為刑部侍郎元和十二年宰相裴度為淮西宣慰處置使奏總為宣慰副使司勲員外郎李正封都官員外郎馮宿禮部員外郎李宗閔等為兩使判官書記皆從之韓愈字退之元和中為右庶子時方討淮蔡兵乆無功丞相裴度兼淮西節度督軍於郾城奏愈守本官兼御史中丞為行軍司馬仍賜金紫旋以蔡州平隨度歸闕拜刑部侍郎崔戎字可大為藍田主簿為藩鎭名公交辟裴度領太原署為叅謀竇鞏字友封元和二年登進士第袁滋鎭滑州辟為從事滋改荆襄二鎭皆從之掌書記之任平盧薛平又辟為副使入朝為刑部郎中元稹觀察浙東奏為副使兼中丞賜金紫移鎭武昌鞏又從之終於鄂渚孔敏行字至之元和五年進士擢第呂元膺亷問岳鄂辟為賔佐丁毋憂而罷後元膺為東都留守移鎭河中敏行皆從之梁覲梁州城固人夫妻隱於城固南山山南西道節度使鄭餘慶髙其行辟為節度叅謀賈直言初從事於李師道師道不恭朝命直言冐刃說者二輿襯說者一師道訖不從及劉悟斬師道節制鄭滑得直言於禁錮之間又嘉其所為因奏置幕中悟遷於潞亦與之俱後穆宗以諌議大夫徴之悟拜章乞留復授檢校右庻子兼御史大夫依前充昭義軍行軍司馬張又新為左補闕與拾遺李續之尤蒙宰相李逄吉睠待指為鷹犬逢吉出為山南東道節度使請又新為行軍司馬續之為副使薛戎字元夫河中寳鼎人少有學術不求聞逹居於毗陵之陽羡山年踰四十不易其操江西觀察使李衡辟為從事使者三返方應召故相齊映代衡又留署職府罷歸之髙瑀少好論兵釋褐右金吾曾曹累辟諸府從事王質字華卿釋褐嶺南管記歴佐淮蔡許昌梓潼興見四府累奏兼監察御史入朝累官戸部員外郎舊府延薦檢校司封郎中賜紫金魚袋充興元節度副使崔咸少有林壑之志往往潜逰南山經時不返既冠連中文科尤長於篇詠好飲酒每風月孤靜吟嘯移時多悽愴流涕至酷醉則已鄭餘慶李夷簡皆辟於幕中如奉師反崔珦博陸人王質為宣州觀察使辟珦及劉蕡裴夷直趙哲為從事皆一代名流羅讓丁父憂䘮服既除尚麻衣茹荼不從四方之辟者十年李鄘為淮南節度就其家拜請從事除監察御史李徳裕字文饒元和初以父再秉國均避嫌不仕臺省累辟諸府從事張引靖罷相鎭太原辟為掌書記繇大理評事遷殿中侍御史李石元和十三年進士擢第從凉國公李聽歴四鎭從事後為兵部郎中令狐楚奏為太原節度副使韋澳字子斐太和六年擢進士第性貞退登第後十年不仕周墀鎭鄭滑辟為從事劉蕡寳歴二年擢進士第太和二年䇿試賢良不第令狐楚在興元牛僧儒在襄陽辟為從事待如師友鄭亞字子佐李徳裕在翰林亞以文干謁深知之出鎭浙西辟為從事鄭畋字台文亞之子也釋褐汴州節度推官大中朝白敏中令狐綯相繼秉政素與李徳裕相惡凡徳裕親舊多廢斥之畋不得偕於士伍咸通末令狐綯出鎭淮海劉瞻鎭北門辟為從事盧簡求字子藏釋褐江西王仲舒從事又從元􅍬為浙東江夏二府掌書記裴度鎮襄陽保釐東雒皆辟為賔佐入朝為監察御史裴度鎮太原復奏為記室令狐楚弱冠擢進士第桂州觀察使王拱愛其才辟為幕府懼不從請飛章而後致意父承簡時為太原功曹楚有庭闈之戀至桂林謝知不預晏逰乞解職奉養李説嚴綬鄭儋繼鎭太原髙其節行累辟為掌記鄭朗字有融長慶元年登進士甲科覆落柳公綽鎭襄陽首辟之朗後為名相公綽又辟盧簡辭崔璵夏侯孜韋長李拭皆至公卿柳璧進士第文格髙雅馬植鎭陳許辟為掌書記又從植汴州李瓉鎭桂州奏為觀察判官柳玭初辟髙湜度支推官踰年拜左補闕湜出鎭澤潞奏為節度副使入為殿中侍御史李尉鎮襄陽辟為掌書記湜再鎭澤潞復為副使李商隱少負竒才令狐楚罷相歴汴州興元節度辟為從事逰處之間未嘗相捨楚卒王茂元鎭涇原聞其才命為管記茂元移任俱之河陽茂元卒桂州鄭亞復奏為判官官至侍御史在嶺表累年大中十三年入朝京兆尹盧𢎞正奏署掾曹令典牋奏明年令狐綯作相商隱屢啓陳情綯不之省𢎞正鎭徐州又從為掌書記府罷復以文章干綯乃補太學博士㑹河南尹柳仲郢鎭東蜀辟為節度判官劉三復潤州人李徳裕為浙西觀察使三復以所業詣郡干謁徳裕閱其文倒屣迎之辟為從事徳裕三為浙西三復皆從太和中徳裕輔政用為員外郎居無何罷相復鎭浙西三復從之汝州刺史劉禹錫以宗人遇之深重其才嘗為詩贈三復序曰從弟三復三為浙右從事凡十餘年往年主公入相薦用登朝中復從公之京口未幾而罷昨以尚書員外郎奉使至潞旋承新命改轅而東三從公皆在舊地徵諸故事夐無其比因賦詩餞别以志之又從徳裕歴滑臺西蜀揚州累遷御史中丞楊收字藏之兄發為潤州從事因家金陵收得第東歸路繇淮右故相司徒杜悰鎭揚州延收署節度推官奏授校書郎自悰罷相鎭西川復管記室宰相馬植奏為渭南尉充集賢校理改監察御史收辭以兄尚從事侯府植嘉之收即宻逹意於西蜀願復為叅佐悰即表為節度判官植乃以收弟嚴代為校理周墀罷相鎭西蜀表嚴為掌書記墀至鎭而卒悰乃辟嚴為觀察判官兄弟同幕為兩使判官時人榮之劉鄴三復子也三復嘗為李徳裕浙西從事大中初徳裕貶逐鄴無所依以文章客逰江浙髙元裕亷察陜虢署為團練推官王蕘龜子也苦學善屬文以季父作相避嫌不就科試乾符初崔瑾亷察湖南崔涓鎭江陵皆辟為從事温庭筠太原人本名岐字飛卿大中初應進士累年不第徐商鎭襄陽往依之署為廵官李磎字景望大中十三年登進士第歸仁晦鎭大梁穆仁裕鎭河陽自監察殿中相次奏為從事王調為長安令鄭從讜罷相為太原尹北都留守河東節度兼行營招討制下許自擇叅佐乃奏調為副使兵部員外郎史館修撰劉崇龜為節度判官前司勲員外郎史館脩撰趙崇為觀察判官前進士劉崇魯充推官前左拾遺李渥充掌書記前長安尉崔澤充支使開幕之盛冠於一時中朝瞻望者目太原為小朝廷言名人之多也劉崇望登進士科王凝亷問宣歙辟為廵官崔安潜鎭許昌成都崇望昆仲四人皆在安潜幕下趙光裔為膳部郎中知制誥劉季述廢立之後旅遊江表以避患嶺南劉隱深重之奏為副使司空圖咸通中登進士第三司王凝於進士中尤竒之凝亷問宣歙為上客召拜殿中侍御史以赴闕遲留責授光祿寺主簿分司東都宰相盧擕罷免以賔客分司嘉其髙節擕入朝路繇分陜謂陜帥盧渥曰司空御史髙士也公其厚之渥即日奏為賔佐後為禮部郎中故相王徽鎭澤潞乃表圖為副使徽不赴鎭而止韋寂字處黙釋褐為萬年尉同州夏陽令崔裔知為循吏辟鹽鐡廵官梁張策為膳部員外郎華帥韓建辟為戎判及建領許州又為掌書記天復中䇿奉其主書幣來聘太祖見而喜曰張夫子且至矣即奏為掌記兼賜金紫孫隲滑臺人知書亦㣲有詞筆唐光啓中魏博從事公乘億以女妻之因教以牋奏程式時中原多難縫掖之士縮影竄跡不復自顯億既死魏帥以表章牋疏淹積兼月不能發一字或以隲為言即署末職主奏記事累遷職自支使掌記至節度判官敬翔字子振同州馮翊人唐平陽王暉之後也翔好讀書尤長刀筆應用敏㨗乾符中舉進士不第及黄巢䧟長安乃東出闗時太祖初鎭大梁有觀察使支使王發者翔里人也翔往依焉發以故人遇之然無繇薦逹翔乆之計窘乃與人為牋刺徃徃有警句傳於軍中太祖比不知書章檄喜淺近語聞翔所作愛之謂發曰知公鄉人有才可與俱來及見應對稱㫖即補右職每令從軍翔不喜武職求補文吏即署館驛廵官俾専掌檄奏龍紀元年六月以朝散大夫前太子中允為中大夫檢校水部郎中守揚州大都督府左司馬賜紫金魚袋翔始以書檄從軍每進規畫自經始蔡冦至于殄滅梁祖嘉其侍從禆賛之績特表其事遂有此授李振仕唐為台州刺史㑹盗據浙東不克之任以䇿干太祖太祖竒之辟為從事太祖兼領鄆州署天平軍節度副使韋震仕唐為右武衛將軍歸于太祖表為揚州左司馬又表為蔡州四靣都統判官尋奏授檢校左僕射充宣武節度副使謝瞳字子明為亳州團練使太祖征淮南過郡因求侍府幕表為宣義節度副使留後髙途字昭逺初為鄜州從事為鹽鐡使秦韜玉所知薦於太祖乃署宣武軍掌記遷汴宋亳觀察判官改平宣義兩府從事盧曾頗好書有所執守始為齊州防禦使朱瓊從事瓊降與之偕來太祖辟為宣義幕職李珽字公度為監察御史丁内艱憂闋再徴為御史以疾不起成汭鎭荆州辟為掌書記踰時乃就汭死襄帥趙凝復奏為掌記入為左補闕太祖為元帥復署為天下掌記一日大㑹將佐指珽曰此真書記也羅隱餘杭人也唐廣明中因亂歸鄉里節度使錢鏐辟為從事後唐任圜京兆人李嗣昭典兵於晉陽與圜逰處分義甚洽及鎮澤潞請為觀察判官制授廷評解褐賜朱紱王緘幽州劉仁恭故吏也少以刀筆直記室仁恭假以幕職令使鳯翔還經太原屬仁恭阻命武皇留之緘堅辭復命書詞稍抗武皇怒下獄詰之謝罪聽命乃署為推官歴掌書記從莊宗經略山東授檢校司空魏博節度副使趙光逢㓜嗜墳典動守規檢議者目之為玉界尺昭宗朝登進士第踰月辟度支廵官鳯翔支使豆盧革少直亂離避地鄜廷轉入山中王處直禮之辟於幕下有奏記之譽因牡丹㑹賦詩諷處直以葉枯為意言甚古雅漸加器仰轉節度判官趙鳯幽州人從劉守竒奔梁用守竒為博州刺史表鳯為判官何瓉閩人也天祐三年登進士第謁莊宗於晉陽一見受知辟河東推官漸轉留守判官張承業卒代知軍府處事明敏胥吏畏其清而服其能好㑹賓友飲饌精簡談笑婉洽外疎内宻事有所執性愎不回鄴中建號拜諫議大夫慮帝業不成堅乞判留守於北京詔下許之未行車駕已平梁苑瓉從至雒下郭崇韜欲留於兩掖為人所忌竟赴北京盧汝弼唐大順中登進士第宣歙觀察使裴樞辟為判官後為祠部員外郎知制誥從昭宗遷雒移疾退居客逰上黨過潞府為太原所攻節度使丁㑹歸降汝弼從㑹至太原武皇奏為節度副使累奏户部侍郎盧程天復末登進士第為鹽鐡廵官昭宗遷雒陽程客逰燕趙中山王處直禮遇未優故投于太原莊宗署為推官尋改支使後歴觀察判官李敬義衛公徳裕孫也嘗從事浙東退歸雒南平泉舊業昭宗遷都雒陽敬義為司勲員外郎辭疾不授乃為衛尉寺主簿後挈族客居衛州者累年莊宗定河朔遣使迎至魏州署北京留守判官孔邈兖州曲阜人乾寜五年登進士第除校書郎崔逺在中書奏萬年尉充集賢校理以親舅獨孤損方在廊廟避嫌不赴職謁羅紹威於鄴下辟為判官蕭希甫梁時登進士第之鎭州王鎔署叅軍後遁於易州落髪為僧莊宗搜揚賢俊幽州馬紹宏以希甫聞召至魏州辟為推官李襲吉乾符末為河東節度李都榷鹽判官時䘮亂之後衣冠多逃難汾晉間襲吉訪舊至太原武皇署為府掾出宰榆社光啓初武皇遇難上源記室歿焉既歸鎭辟掌奏者多不如㫖或有薦襲吉能文召試稱㫖即奏為掌書記三遷節度副使陳人少好學善屬文嘗客於浮陽㑹浮陽軍亂徙居大梁莊宗平梁郭崇韜遥領常山召居賔榻崇韜從魏王繼岌伐蜀署為招討判官藥縱之太原人少為儒明宗刺代州署為軍事衙推從明宗鎭邢州為掌書記歴天平宣武兩鎭節度副使馬郁幽州人劉仁㳟入燕用為掌書記唐天祐元年汴人冦滄景仁㳟求援於武皇武皇徴其兵同攻潞州仁㳟遣郁與監軍張居翰率師數萬赴㑹澤潞既平仁㳟為其子守光所囚兄守文又失滄景乃留郁不遣署為副留守累官至檢校司空秘書監武皇與莊宗禮遇俱厚嵗時給賜優異司空頲貝州清陽人景福中舉進士不第羅紹威為節度副大使頲以所業干之幕客公乘億為延譽羅𢎞信署為府叅軍辟館驛廵官改節度廵官歴掌書記張憲字允中晉陽人精力逰學莊宗嗣世補太原府司録叅軍天祐十三年授監察賜緋署魏博推官改掌書記魏博觀察判官鎭州平授魏博鎭冀十郡觀察判官胡装禮部尚書曾之孫莊宗署館驛廵官未幾遷節度廵官賜緋尋歴推官王正言鄆州人早孤貧為沙門密州刺史賀徳倫令歸俗署郡職徳倫鎭青州表為推官改鎭青州觀察判官周𤣥豹本燕人有袁許之術莊宗署𤣥豹北京廵官石知訥本梁時之走吏也漸厠簮組夏魯竒辟為河陽節度判官移任許州亦佐之晉趙瑩初依梁將康延孝延孝奔唐莊宗同光初用為鄭州防禦使表瑩為判官三年延孝為陜帥又署賔職髙祖為陜府兩使留後瑩時在郡以前官謁之一見如舊相識即奏署官髙祖歴諸鎭皆從之劉昫涿州人文學優贍隱居上谷太寜山與呂夢竒張麟結菴共處定州連帥王處直以其子都為易州刺史署昫為軍事衙推及都去任假五廻令都招昫至中山㑹其兄晅為節度衙推不踰嵗命為觀察推官馮玉字璟臣少應進士不第唐長興中宣徽使馮贇出鎭太原玉以宗盟之分徃依之贇乃奏玉為從事府罷入朝拜監察御史崔税梁永明三年舉進士主文薛廷珪愛其才擢升甲科開封尹王瓉表為從事専掌書奏瓉待之若親友呂琦幽州人勵志勤學遊於汾晉唐天祐中莊宗方開覇府翹佇賢士墨制授琦代州軍事判官秩滿歸太原監軍使張承業重琦器業禮遇尤厚㑹其子瓘領麟州刺史乃辟琦從事同光中趙徳均鎭滄州表琦為節度推官徳均移鎭幽州亦從之殷鵬字大舉大名人少而雋秀為鄉曲所稱弱冠擢進士第唐閔帝之鎭魏州聞其名辟為從事曹國珍字彦輔少值燕薊亂離因落髪被緇客于河西延州髙萬興兄弟皆好文辟為從事國珍嘗以文章自許求貢禮闈萬興飛表薦之梁永明中特勅進士及第還為萬興幕客且掌書奏朞年入為左拾遺史圭常山人後唐同光中任圜為眞定尹擢本府司録不應命郭崇韜領其地辟為從事及明宗代崇韜復以舊職縻之尹玉羽京兆長安人杜門隱居無名宦之意梁永明中劉鄩開幕鄜坊辟為保大軍節度推官歴雍汴滑兖從事孔崇弼登進士第為𢎞文校理昭宗幸雒陽河南尹張宗奭以崇弼名家子署為幕賔陳保極閩中人也少好學善屬文後唐天成中擢進士第泰王榮後聞其名辟為從事漢李崧深州饒陽人仕後唐為太常寺恊律郎王師伐蜀王繼岌為都統署都統掌書記蘇逢吉京兆人也父恱為髙祖從事因從容薦逢吉令事左右髙祖召見以神情爽惠甚憐之有頃擢為賔佐為節度判官李鏻少舉進士累舉不第客逰河朔入常山趙王鎔辟為從事常山平莊宗以鏻為覇府支使龍敏幽州人少為儒丐逰都邑莊宗定魏博敏聞故人馮道為覇府記室乃客于河中嵗内歸太原舘於馮道之家監軍使張承業從容謂道曰吾子鄉友南來何不相見遂得通刺㑹莊宗在魏州召道從軍承業即署敏為廵官典監軍奏記張允鎭州人㓜學為儒仕本州為叅軍張文禮之據州叛唐莊宗致討允隨文禮子處瑾請降於鄴不允與處瑾竝繋于獄鎭冀平宥之留于鄴署府功曹趙在禮嬰城叛署節度推官從事滄兖二鎭書記周馮道瀛州人唐天祐中劉守光署為幽府掾守光敗遁歸太原監軍使張承業辟為本院廵官尋為覇府從事莊宗歸寜太原置酒公宴舉酒謂張承業曰予今於此㑹取一書記先以巵酒辟之即舉酒屬道道以所舉非次抗酒辭莊宗曰勿謙抑無踰於卿也遂署太原掌書記馬𦙍孫同光末擢進士第唐末帝為潞王鎭河中𦙍孫客逰依之署為支使俄改記室潞王守河中留京師嵗餘𦙍孫不離于邸第長興中潞王自西京留守改節鳯翔𦙍孫累轉觀察判官和凝字成績十九登進士第滑師賀環知其名辟寘幕下蘇禹珪字𤣥錫以五經中第為潞并管記漢髙祖作鎭并門奏為亷判楊凝式為禮部員外郎三川守張宗奭見而嘉之請以本官充留守廵官王仁裕天水人入蜀為翰林學士蜀亡入雒復為秦州戎判秩滿歸田里時王思同鎭興元聞仁裕名奏辟為幕賔尋改西京留守判官司徒詡清河人少好讀書弱冠應鄉舉不第唐明宗鎭邢臺詡往謁之甚見禮遇命試吏歴須城令有能名長興初唐末帝鎭河中奏辟為從事賈緯眞定人舉進士不第歸河朔本府累署叅軍邑宰范延光鎭眞定表授趙州軍事判官劉皥後唐初投髙季興於荆南累為荆州攝官既而兄昫明宗朝為學士遣人召歸梁漢顒鎭鄧州辟為從事入為監察御史歴水部員外郎史館脩撰長興末宰臣趙鳯鎭邢臺表為節度判官張沆徐州人登進士第唐明宗子秦王好文每賔寮大集手自出題令面前賦詩少不如意則壊裂抵棄沆初通刺屬合座客各為南湖廳記謂沆曰聞生名久矣請為此文沆不獲已從之及羣士記成獨取沆所為勒之於石繇是署為河南府廵官秦王敗勒歸鄉里晉初桑維翰秉政沆以文干進用為著作佐郎集賢校理右拾遺維翰出鎭奏為記室張昭趙郡寜晉人後唐同光中依興唐尹張憲憲奏為從事及憲移河東留守與之俱行遇莊宗雒陽之變憲為部將苻彦超所害昭僅以身免册府元龜卷七百二十九
