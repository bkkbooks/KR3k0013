  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_093-1a}
body:
  text: 冊府元龜卷九十三宋王欽若等撰帝王部赦宥第十二後唐明宗長興元年二月乙卯郊祀畢還御五鳳樓宣制曰王者法天為子長人為君必在於上奉天明下從人欲奉天莫先於孝敬從欲莫先於矜寛則必上下叶和隂陽調序朕顧惟寡徳猥紹丕圖祗荷景靈敢不寅畏屬以域中作梗邊土多虞繼除梟獍之妖累殄豺狼之族阻行大禮于兹五年負芒刺以靡寕積氷湯而為懼今幸五兵偃戢百榖豐登謁清廟以寫心陟泰壇而瀝懇孝敬之道誠益勵於夙宵寛宥之懷固難忘於頃刻上承𤣥祐兾永無疆之休下念黔黎宜覃莫大之慶况天地交泰之始雷雨作解之初布澤益示於滂沱發號重新於渙汗滌瑕蕩穢屈法申恩宜改天成五年為長興元年可大赦天下應諸道見禁囚徒十惡五逆光火劫舎屠牛官典犯贓偽行印信合造毒藥外罪無輕重已發覺未發覺已結正未結正咸赦除之其天成四年十二月終已前諸道州府人户應有殘欠税物蠶鹽食鹽乾摧濕摧既係積年之欠俄逢作解之恩竝與免放諸州府營田户部院應欠租課房店利潤逃移人户死損牛畜或先遭剽劫及水澇處欠負斛㪷無所徴填已收納到家産財物其餘所欠竝與蠲除所在倉塲積年損壞使臣盤覆欠折尤多其主持專知官等據通收到産業物色外亦與放免應諸道商税課利撲斷錢額去處除納外年多蹙欠枷禁徴收既無抵當竝可放免諸道採造材木欠數定州材木錢及閿鄉船務遺火所司累行催促無可填納亦與放免先南北兩軍前倉塲持主損爛欠折及江河轉運抛失舟船竝斛㪷茭稈錢諸鎮欠少過軍準被粮草等據主持人見在家業勒收納外餘放所欠天成元年二月諸州般納到上供庫秤盤積欠物色并遭兵火燒劫及耀州前後身死刺史界分欠省庫錢物劫勒州司官吏賠填者竝特放免天成二年終諸色人於西川省庫内借過錢竝省司先差人收買羊馬欠折死損無填還及天成二年終已前諸道銅銀鐡冶銀錫水錫坑窟應欠課利兼木炭農具等塲欠負亦與放免諸州府或經水旱灾沴恐人户闕欠餱粮方值春時誠宜賑恤宜令逐處取去年納到新好屬省斛㪷各加賑貸候秋收日徴納完數應天下府州合徴秋夏苗税土地節氣各有早晚訪聞州縣官於省限前預先徴促致百姓主持送納博買供輸既不利其生民今特議其改革已令所司更展期限輔相之榮必資徳望公侯之貴盖選賢能欲展徽猷貴在彰顯内外羣臣職位帶平章事兼侍中中書令與改鄉名里號欲通和氣必在申寃将設公方實資奨善州縣官僚能雪寃獄活人生命者許非時選仍加階超資注官與轉服色己着緋者與轉兼官其朝臣及藩侯郡守等亡父母祖父母在并妻室未霑恩命者竝與追贈及叙封應有諸色私債納利已經一倍者只許徴本年外欠數竝放納利已經兩倍者本利竝放昭宗太祖荘宗時或有犯罪籍沒人若有子孫在者竝許識認上祖墳塋主祭庄田已係官及有主承佃不在識認之限河陽管内人户每畆上舊徴橋道錢五文今後竝放不徴諸道州府人户每畆上元徴麴錢五文今特放二文只徴三文敢以赦文前事告者以其罪罪之赦書有不該者所司各具條例聞奏夫施令覃恩比期及物苟有壅滯曷浣焦勞如聞近年赦書所在不廣宣布為人臣者豈若是乎其在輔弼公卿藩侯郡守各輸忠力副朕憂勤共致治平永躋仁夀仍令御史臺嚴加訪察無縱稽留赦書日行五百里告諭天下咸使聞知五月勅曰本朝列聖受冊徽號多施霑澤蕩滌瑕疵今縁纔過南郊不可便行大赦其中有恩未及者宜示優矜其諸色官員中或有經罰殿停替者宜竝許以停任時官資理選數赴調其諸徴科不了勒定州縣官等除已赴南郊行事該恩外慮有在外赴行事不及者宜竝準上許理選序貴普沾於恩惠免永滯其身名俾得自新皆期受任二年四月己巳勅㫖應諸色官曽貶官者昨遇郊天量移近地想能知過宜漸服勤其量移官等各與特恩流竄者更與寛宥乙卯勅乆愆時雨深疚予心雖遍䖍祈猶未溥足宜廣推恩之道更敷恤物之懷貴獲感通必彰靈應宜令諸道州府各委長吏親問刑獄省察寃濫應見禁囚徒除犯死刑外餘畫時䟽放除省司主持廻圖敗闕軍将及諸色人等見别指揮三司商量或有情可矜憫或非欺罔積年致有逋懸各具分析續行勅命并公私債負放至秋熟填納今年取者不在此限四年八月戊申冊尊號禮畢制曰朕聞為而不有曰天使而不知曰道下覆萬物中含兩儀難以常名加難以常徳報是故賢君哲后則而象之雖有唐堯之聰明不伐其善雖有夏禹之勤苦不矜其功朕善愧唐堯功慚夏禹屬六十年亂離之後承億兆人塗炭之餘兒童悉習於戰爭耆艾罕聞於聲教强吞弱吐禮壞樂墮凉徳𦕈躬豈易為治所頼王公卿士戮力一心善無細而不行惡無大而不去革彼積弊成斯小康夫化自心生平其心則化洽令從身出正其身則令行朕御兹九州迨今八載嘗懷戒懼罔敢怠荒每務推心感人謹身率下刑必有罪豈以喜怒而死生賞必有功豈以親讐而厚薄却雕鏤之靡麗慮滛巧以蕩心罷畋獵之游娯恐逸豫之敗度未能全臻於富庶未能盡偃於干戈誠宜業業以兢兢詎可自尊而自大中外文武不謀同辭謂朕𢎞清淨之風載以廣道樹生成之徳而推之以法天堅讓固辭至于數四遏之不止去而復來雖義乃爾心深可嘉也而名過於實良所惕焉既大舉於徽章宜溥覃於霈澤可大赦天下應八月四日昧爽已前在京天下州府見禁囚徒已結正未結正已發覺未發覺罪無輕重常赦所不原者咸赦除之長流人并諸色徒流人不計年月遠近已到配所竝放還或有亡命山澤及為事關連逃避人等竝放歸鄉一切不問如過百日不歸首者復罪如初在京諸道将士各與等第優給應貶降官未復資者咸與復資州縣官内有先為事勒停止者竝許參選殿犯者免其所殿長興三年正月一日已前諸道兩稅殘欠物色並宜減放或有先曽經灾沴處逃户却歸業者除見徵正税外不得諸雜科徭切委倍加安撫應係省司塲税倉庫今日已前諸色敗闕人等據其所有錢物家業盡底收納已上所欠並敗闕人並放其間未曾經磨勘㸃檢者宜令省司便與磨勘㸃檢準前處分將來永不得任使如是雖稱敗闕省司未見申報文状及見今勾當人已後敗闕於中錢榖或涉降赦文年分竝不得援此為例山林草澤之人雖頻命捜羅而尚慮沉滯委所在長吏切加採訪的有才氣義行者具以名聞必議量才任使在朝文武臣僚并諸色職員有直言極諌者如上封章盡當開納諸凡無主丘墓自兵革已來經發掘者宜令觀察使刺史差人量事掩瘞敢有赦前事相告者以罪罪之於戲滌瑕蕩穢宇宙繇是澄清布徳推恩遐邇以之胥悦所望藩垣羣后社稷諸臣既尊予以莫大之名當佐予以彌髙之徳日慎一日雖休勿休驅彼疲民置之夀域光爾在位顯我得人愍帝應順元年正月戊寅受朝於明堂殿大赦改元末帝清泰元年四月乙亥即位乙酉帝衮冕御明堂宣制曰王者司牧兆民寵綏四海爰屬統臨之始宜布渙汗之恩仰測天心俯從人欲所以春夏秋冬四時先布於發生草木禽魚萬彚乃期於蘇息伏念大行皇帝承天眷祐立極艱難繄予眇躬當佐興運櫛風沐雨從湯征而多歴勤劬匣劍櫜弓賛周道而克成底定爾後繼持玉節獲受桐珪事君必盡于忠誠為子益堅於孝道諒穹蒼之可鑒兾宗社之永寕旋屬杞國人憂荆山鼎就痛攀髯之靡及念同軌之将臻爰自汧岐徑朝伊雒所兾宿參蜃輅親奉山陵纔覲宫闈旋承告令百辟堅陳於勸請三讓莫諧六師共切於推崇羣情益固昔夏啟以謳謌有屬能承大禹之基漢文以将相叶心克嗣髙皇之業顧惟小子豈逮前王自纉鴻圖如登虎尾惟當慎終若始居安慮危保七百載之延昌致億兆人之開泰将布改元之令爰敷在宥之文宜改應順元年為清泰元年可大赦天下四月十六日昧爽已前内外見繫囚徒據罪已發覺未發覺已結正未結正罪無輕重常赦所不原者咸赦除之應左降官及徒流人與量移已量移者更與量移已放歸者量與叙録應内外文武臣寮節鎮州府等使刺史文武職員将校竝與加恩應自鳳翔扈駕員寮凡主兵主事者各賜功臣名見在京随駕并諸道馬歩将士竝與等第優給竝從别敕處分自二月十四日西來文武參佐沒於王事者各與追贈仍叙録子孫随駕前資文武官寮竝量才任使鳳翔民李存劉實罄出家財以助軍賞竝與命官起事之初鳳翔三城民户多遭燒燬竝宜本道撿視量給瓦木工價各令修葺自岐雍華陜已來王師所經踐履去道叄里内夏税竝與放免應三京諸州府長興三年十二月已前欠夏秋殘税竝與除放其鳳翔即自長興四月十二日終已前竝放二年五月乙巳御札曰王者父天子民深居髙視恭已以行道褒賢以勸功盖以上承天休下除民瘼率輦下以勸天下自一人而惠萬人為子為臣不可不察朕惟寡徳獲纉丕圖奉先聖之神靈荷皇天之眷祐寅畏夕惕罔敢遑寕思與将相王公良牧賢宰共敷政教同致雍熈繇是詳酌政刑捜求利病以今觀古夜思朝行才濟於時雖蒿萊而必采言干於道雖誹謗而必容然而近歲已來多事之後邊陲尚擾府庫未殷扞防必假於兵師供饋須資於民力既未能便停征伐固不可頓減賦税念乃疲羸勞於鑒寐今歲爰自初夏稍屬愆陽朝昏正積於焦勞祈請果垂于甘澤所宜行慶以答殊休言念狴牢之人屬此欝蒸之候苦毒之状所不能言况當長養之時特降哀矜之令應王京諸道州府見禁囚徒自五月十二日已前除五逆十惡光火劫舎持杖殺人官典犯贓偽行印信合造毒藥外委逐處長吏據已發覺未發覺已結正未結正不在追呼支蔓只正身招罪便疾速斷遣并見欠省司錢物外諸罪無輕重一切釋放應天下藩侯郡守令録等為我股肱作民父母必在精窮事理杜塞倖門副我憂勤察民疾苦刑獄不可以阿曲法令不可以滋章私不得害公利不得傷義長思砥礪共致隆平凡百庶官宜體朕意晉髙祖天福元年十一月己亥即位於晉陽御崇元殿肆赦改元制曰古者君臨大寶子育黎民爰當御歴之初宜布惟新之令将冀昭蘇品物蕩滌瑕疵大推作解之恩俾樂咸亨之運恭以明宗皇帝經綸草昧統御寰瀛垂衣而八表歸心負扆而十年無事必謂盤維永固鼎社無遷立萬代之基圖為百王之軌範洎遺弓劍遂起干戈逆䜿延灾宗英失守劫奪神器侮亂天常誅戮至親虐害無告顧予何咎忽有異謀無名而大舉甲兵不道而廣勞生聚寰中板蕩天下驚騷内外離心遐邇積怨嗷嗷士庶若無所依契丹皇帝不忘先朝特存舊好親提鋭旅逺殄羣兇未整鸛鵝盡殱蛇豕而復念中原之無主憫四海之倒懸欲泰羣情特申大義猥惟凉徳俾纂寶圖成命不廻固讓莫得殷湯以東征西怨乃踐帝圖夏禹以地平天成遂興王業矧予寡昧有愧推崇雖勉副羣心恭臨大位将何以祗膺眷祐統和人神以是馭朽興懷宵衣在念躋生民於富夀保社稷於延洪頒歴紀年既有遵於典冊推恩行慶将普及於幽遐宜改長興七年為天福元年大赦天下十一月九日昧爽巳前應在京及諸州郡邑罪犯及曽受偽命職掌官吏并見禁囚徒已結正未結正已發覺未發覺罪無輕重常赦所不原者咸赦除之應曽相連賊黨軍人百姓有奔竄山谷者一切不問任歸本貫如却願在軍者亦仰所司申送當令本軍收管易俗移風宜遵善教尊本敬始自有常規應明宗朝所行勅命法制仰所在遵行不得改易悉力為時罄財助國苟不推於恩信亦何示於賞酬自舉義已來應借率人户及經抄括商旅資財錢物委所司明置文籍候平定之後當議給還京城将士降附軍戎自舉義以來悉聞忠藎宜加賞賚以勸勤勞應在京諸軍将領兵士等候竝破賊寨當議各加優賞有沒於王事者各與贈官其子孫竝與量才叙用文武官寮等又輸推戴之誠宜示奨酬之道應在京及文武官寮及軍府将校并勸進官等兼前資官内自五月後來未曽分掌職任竝各與遷轉官資自五月後來已曽受官者不在此限其軍府諸色職掌将吏等已及押衞職者各與逓遷職次塩麥之利軍府所須倘不便放户人宜别從於條制所期濟衆無患妨公在京鹽貨元是官塲出糴自今後竝不禁斷一任人户馭使雜易仍下太原府更不得開塲糶貨其麴每斤與減價錢三十文恩推掩骼義顯燭幽允諧遐邇之心兾叶隂陽之序應自舉義已來或有因事抵法之人及九月十四日後殺戮賊冦所在暴露骸骨未有骨肉收認無主者委逐處長吏埋瘞弓旌聘士巖穴徴賢式光振鷺之班将起維駒之應山林草澤賢良方正隱逸之士委逐處長吏切加採訪咸以名聞當議量才叙任昨以冦戎乆在郊境頗傷禾稼賦租應近京畿五十里内委逐處令長撿覆當與免今秋税租差科於戲甘澤配天萬物以之膏潤震雷出地百卉繇是發生将欲道和氣於八方示深仁於三面永康聖歴普洽民心凡百庶寮洎方伯連帥克奉明恩勉揚厥職共臻至化稱朕意焉赦書日行五百里敢以赦前事言者以罪罪之布告中外咸使聞知閏十一月辛巳入雒壬午詔御史府促朝官入見勅曰朕逺提義旅尋尅皇都六部相次以奉迎兆庶畫時而安堵旋兹底定已遂廓清應文武百官等早列通班各懷忠節掩跡雖淪於汚俗推誠必候於維新但當共罄嘉謨副予虛佇虞秦可鑒在於用捨之間堯舜為心方務含𢎞之徳勉堅臣節深體朕懷其兩班臣寮應事偽庭者竝宜釋罪是日百辟謝恩於行宫之外甲申御文明殿受朝賀用唐禮樂制曰盖聞神無常祀惟徳是歆民無常懷非賢不乂歴數有歸者人祗共贊文明懷遠者龜筮叶從所以周開七百之基夏作三王之首伏自荘宗失馭天下分離萬國懷賢三靈改卜明宗皇帝潜符景運克紹寶圖一莅寰區八周星律偽主從珂始因微績序在維城遇大國之多艱以列藩而入統𠞰絶裔嗣屠害忠良臨大寶而罔以徳聞御諸侯而惟将威脅朕以明宗皇帝每𢎞厚遇益勵㣲誠無纎粟而使人可疑無絲毫而事君不謹豈期深苞禍釁暗抱猜嫌欲用奸謀擬相魚肉初以北門之事委朕一生忽将汶上之田遷予十乗二三其徳始終違心既欲害於無辜孰肻扶其不道而遇北朝皇帝英明鑒古威武冠今嫉彼不平閔予多難遂致累殱兇宼繼納降兵每借巨功俾成大業朕自興基構頗厯艱難兾兆億而保安敢興寐而輙怠今則重光日月再造乾坤宜覃在宥之恩以布鼎新之命可大赦天下今月二十九日昧爽已前應在京及諸州府凡有所禁囚徒已發覺未發覺已結正未結正罪無輕重常赦所不原者咸赦除之雷雨作解瑾瑜匿瑕宜加盪滌之恩用示包容之應中外諸色職掌官吏有受偽命者一切不問既除巨蠧亦愍俱焚難全者須正吕刑可恕者特開湯網偽庭賊臣張延朗劉延皓劉延朗等竝姦邪害物貪威㺯權罪已滿盈理難容貸除此三人已行勅命外其有宰臣馬𦙍孫樞宻使房暠宣徽使李専美河中節度韓昭裔等四人雖元事偽庭咸居重位每持忠慤不務詭随偽主不任才謀遂致傾覆朕昔在藩邸備所諳知今竝釋放一切不問應中外官寮之外有自舉義已來歸順者委中書門下别加任使應偽庭貶降官未量移者與量移已量移者與復爵受官亦與復資應徒流收管人竝放還伏以少帝地居嫡裔位纂洪圖王從珂始搆異謀非理屠害一家骨肉将正承祧之典式敦敬始之名宜令中書門下追尊定諡擇日禮𦵏妃孔氏宜行追冊祔塟應有宿舊臣寮竝與量加叙用昨者舉義之地稱師之邦必蹂踐於川原要矜蠲於輿賦其河東管内諸縣税租今年秋及來年夏税各與減放一半警蹕經過之地望幸雖榮蕃漢雜處之兵禁暴難備既頒渥澤須示優矜昨大将軍兵士自河東以至京畿㳂路擾踐之處宜委逐處長吏公當撿覆據頃畆特與蠲放今年秋税一半朕昨於霸府創置新軍救時昔在於從權䘏下今狗於所欲河東所有新招置義勝軍人竝放逐便賞罰二柄激勸萬方倘稽甄奨之恩何答勤劬之效應扈駕及相次歸順軍都竝與重加優賞但縁宫内庫藏虛乏宜令三司疾速抽徴諸道税物以充賞給其指揮使等竝與超轉官資五月後來已曽受恩命者亦與依資轉官髙懸朗日炤臨必備於遐陬大扇仁風亭育罔遺於纎芥應天下歸順節度使刺史下賔席郡職及将校等委中書門下各與改轉官資覆車難襲弊政宜遷恤鄉邑之瘡痍救民人之疾苦其北京管内鹽當户合納逐年鹽利昨者偽命指揮使每㪷須令人户折納白米一㪷五升極知百姓艱苦自後宜令人户以元納食鹽石㪷數目每㪷依時價計定錢數所取人户便隱折納一人湯沐之奉實在王畿兆民凋弊之風宜行仁恕其雒京管内逐年所配人户實鹽起從來年每斤特量減價錢十文應道州府所徴百姓正税斛㪷錢帛等除係省司文帳外所在州府竝不得裏私増添紐配税物應有懷才抱噐隱遁山林方切務於旁求宜遍行於捜訪委所在長吏備逹朝㫖具以名聞致仕官或筋力未衰才能可任将表乞言之敬難從歸老之心委中書門下商量奏聞當議昇擢義夫節婦孝子順孫委逐道奏聞當加旌表應自起義已來或盡節捐軀歿於王事宜加褒贈兼恤妻孥俾義激於忠貞庶恩霑於幽顯鳴諫鼓以俟讜言列柱石以申寃滯将聞善以自戒思與物以垂恩備著前規用光大業或直辭可貢或有理可矜各務奏陳皆當鑒納明宗朝屬之内宿舊之中或功名曽著於輿情或材氣可禆於公政宜委中書門下量才叙録關防凡有征税省司曽降條流慮多時而或有隱藏因肆赦而再頒條貫應諸道商税仰逐處将省司各收税條件文牒於本院前分明張懸不得收卷牓内該名目分數者即得收税如牓内元不該説著係税物色即不得收税宜令所在長吏常加覺察如敢有違條流不将文牓張懸将不合係税物色收税欺罔官法停滯商賈盡時具名申送竒伎滛巧往誥不容務實去華哲王所尚應有浮虛假偽之物不鬻於市肆委所在常加覺察犯者加重刑責士流之内有懷才抱器碩學殊能者委中書門下捜訪任使勿拘門地資厯於戲愛民如子王者之所以勃興損已從人𦕈躬而安敢自忽况朕驟主百靈之祀創開萬乗之基朽索在懷求衣益勵更頼庭中多士閫外諸侯咸罄良籌共禆不逮初寕鯨浪適啟龍圖冬陽開温炤之光春雨灑涵濡之澤惟新正令不宰𤣥功中外臣僚體予深意二年四月甲申入汴州丁亥制曰厯代省方盖觀風而設教前王展義皆利國以便民雖今古以有殊在皇上而無異朕艱難創業宵旰臨朝每軫念於瘡痍敢自辭於癯瘠近以浚郊粤壤梁苑名區乃舟車通㑹之都實人物殷繁之地春秋租税可贍給於兵師遠近蒸民免煩勞於饋運爰從清雒遂整鳴鑾六飛既議於按廵四海漸期於開泰今則已臨汴水宜順薰風思覃渙汗之恩特布如綸之命普安區宇首念狴牢况當長養之時曲示矜寛之澤應天福二年四月五日昧爽已前諸道州府見禁囚徒大辟已下罪無輕重竝從釋放凡關布澤務在及民宜加軫憫之恩俾遂蘇舒之望天福元年已前諸道州應係殘欠租税竝特除放諸道係徴諸色人欠負省司錢宜令自偽主清泰元年終已前所欠者據所通納到物業外竝與除放或水旱為灾䖝螟作沴儻無軫恤何致阜豐朕昨行至鄭州滎陽縣界路旁見有䖝食及旱損桑麥處委所司差人簡覆量與蠲免租税河陽管内酒户百姓應欠天福元年閏十一月二十五日已前不敷年額麴錢竝放其諸處應經兵火者亦與指揮當罪即誅式明常典既往可憫宜示深仁偽主清泰中臣僚内有從誅戮者竝許收𦵏要荒之内鄉黨之中宜𢎞養老之規式表問年之道天下百姓有年髙八十已上者與免一子差徭仍令逐處簡置上佐官過滎陽而因思紀信届夷門而尚想侯嬴著髙義者猶足歎嘉蹈忠節者固宜旌賞事資激勸恩在褒揚梁故滑州節度王彦章勅命當時致身所事凛千年之生氣流百代之令名宜令超贈太師子孫量才叙録亡命藏姦此自攙搶之際好生惡殺宜𢎞曠蕩之恩應諸道州府管界内有自偽命抽㸃鄉兵之時多是結集劫盗因此畏懼刑章藏隱山谷宜令逐處曉諭招携各令復業自今年四月五日已前為非一切不問如兩月後不來歸業者即令所在長吏嚴加捕逐復罪如初於戲撫俗安民御宇式明於敏政行慶施惠為君用顯於推誠况潜躍之時開創之始外則五侯九伯協力禆助内則四輔三公同心翼戴已寕華夏實頼忠良既光帶礪之勲無忘盤盂之誡凡百有位更竭乃誠共致隆平永輔寡昧布告遐邇宜體朕懷八月乙巳制曰雷雨作解表天道之推恩瑾瑜匿瑕顯國君之含垢顧惟師古敢怠𢎞仁關河既靜於昏霾綸綍宜覃於慶澤昨者張從賔輙萌逆節逺結叛臣釁起三城悲纒兩地占據我都邑䖍劉我士民丸泥欲閉於虎牢祅霧幾迷於鳳闕頼乾坤垂祐将相協謀渠魁送死於網羅兇黨咸膏於原野㨗音繼振惡蔓皆除宜施曠蕩之恩以撫驚騷之地仍頒霈澤徧及縲囚貴感召於淳和速盪平於氛祲天福二年八月二十五日昧爽已前天下見禁囚徒除十惡五逆光火劫舎持杖殺人合造毒藥官典犯贓欠負官錢外其餘不問輕重已發覺未發覺已結正未結正竝宜釋放應自張從賔作亂已來有曽被張從賔及張延播脅從染汚及符彦饒下随身軍将等兼安州王暉徒黨除已誅戮外竝從釋放一切不問尚恐無知之人暗有恐動物色委雒京留守河陽節度使明加察訪犯者重斷或無辜被害或狥節忘生既抱沉寃宜申贈典應自張從賔作亂已來諸色官寮内有沒於王事者竝與追贈有子孫量才叙録或是諸軍小節級長行已下沒於王事者具給本家三年糧賜有男成長者委侍司衞典諸軍内酌量安排富父舂喉須誅元惡文王𦵏骨式表至仁自張從賔作亂已來所在殺傷者竝委逐處差人收拾骸骨塟瘞張繼祚在䘮紀之中承逆豎之意顯從叛亂難貸刑章乃睠先臣實有遺徳遽兹乏祀深所軫懷其一房家業準法雖已籍沒所有先臣并祖及母墳荘祠堂竝可交付親的骨肉主張應有犯事人親的骨肉除已誅戮外竝放一切不問所有祖先墳塋亦仰準此交付負國者天地不容為逆者人神共怒永惟􅀈蠁實有感通昨出師之時将帥䖍禱頗聞隂祐成此戰功唐衞國公宜封靈顯王其餘鄭州并汜水管内神祠宜令長吏差官㸃撿如有隳損處便委量事修葺貴伸嚴飭以答隂功五嶽承天四瀆紀地自正當陽之位未伸望秩之儀宜令差官徧往告祭兼下逐州府量事修崇所有近廟山林仍宜禁斷採樵降黜之科既然不濫洗滌之道足使自新應自創業已來降黜者竝可放還兵興已來邊疆多事或因虜掠或偶滯留嵗序遷移家鄉迢逓魚腸鴈足常懸骨肉之恩月夕霜天必起桑榆之思宜令收贖俾遂歸還自梁朝後唐已來前後奉使及北京沿邊管界虜掠往向北人口宜令官給錢物差使齎持往彼一一收贖放歸本家興兵動衆盖殄元㓙伐罪弔民須安兆庶應内府管界内今年夏税近指揮只徴五分今以方駐兵師無不勞役竝宜蠲放於戲顧惟薄徳屬此多艱敢忘御朽之規思廣納汚之道爰敷渙汗貴洽蒸黎更在中外輔臣文武列辟同扶寡昧以致隆平告報寰區宜體朕懷三年九月己巳勑魏府城内馬歩諸軍将校員寮節級軍将長行及叅佐官員僧道百姓等朕以范延光是明宗舊臣與朕素敦分義因開懷而捨釋果瀝懇以歸明君臣之義宛然金石之言無改亦繇諸軍将士叅佐職員同輸歸向之誠共感懷柔之道備觀忠孝深所歎嘉将徧示於渥恩宜先行於慰撫表予大信安爾衆心應在城官員将校長行今日已前罪無輕重一切不問范延光已除授鄆州節度使賜鐡券封本郡王孫漢威等将校等第除授防禦團練刺史已各别行制勑命使往彼宣賜恩命仍令各取便路赴任恩命未到間仍且委薛霸充都廵撿使喬謹充副廵撿候范延光赴任後即可取便路發赴所任其餘将帥及參佐官吏随職員竝一一分析名銜奏聞當議各加渥澤其應在城馬歩軍将㕔子指揮散員親從左右義勇先鋒并入馬直有馬歩人神勇弩手鄭韜張進手下兵士并薛霸王建遣諸色将校衙隊名額軍都竝陞為侍衛親軍排連所有今年冬衣見闕綿數已指揮楊光逺收寨内綿勘㑹俵散應有先被張從賔脅從符彦饒驚擾及衛州黎陽陷失因兹走入及隔過官員使臣将士等兼自興師以來前後離背軍都住彼者竝不問罪其官員使臣等竝與録任其将士等各與依舊請受諸軍收管如有入城後遷轉職名者便據見守職名支給請受如有諸色人輙敢恐動竝當深罪在城将校及諸色官員應有物業為人請射者竝許給還依舊為主先有抽入城義軍竝放歸本家如是已配在諸軍者各随本人所願如願在軍者即依舊收管願歸農者即放歸本家所有府城四面人户三十里内與放二年秋夏租税三十里外委逐縣令佐專切㸃撿如實曽經砍伐桑柘毁折屋舎者分析申奏盡與蠲放租税切仰招携速令歸業應九月二十五日已前因事被殺之家不得更有論訟及相讐報妻孥家産已配沒者竝給還如有自去年七月十九日後來曽經在城将校及諸色人請射合干等或為配率柴薪或為自要供燒毁折却者只據九月二十五日後見在者舎宇交割其有已破除却間未數日不得更有論索如内有屬官舎宇亦仰準此指揮應自去年七月十九日已前有諸色商旅或城内與城外親情相識應是寄留諸色錢物羊馬牛畜等或經括率或以沒納入官或破罄盡不計是何公私官員寄付竝不許更有論索如敢以敕前事相告言及相讐報者以其罪罪之朕方啟基扄務安華夏每推誠而待物日仗信以懷來布兹誓言質諸天地天雄軍節度副使朝請大夫檢校刑部尚書賜紫金魚袋刑部李式可中大夫檢校尚書右僕射亳州團練使金紫光禄大夫檢校司徒貝州刺史孫漢威可檢校太保隴州防禦使天雄三城都廵檢使檢校户部尚書薛霸可撿校司空衛州刺史天雄軍馬歩都指揮使檢校工部尚書王建可檢校司空虢州刺史天雄軍内外馬軍都指揮檢校户部尚書樂元福可檢校司空深州刺史天雄軍内外歩軍都指揮使檢校兵部尚書繡州刺史元霸可檢校司空隨州刺史李式本延光舊客厯數鎮從之薛霸延光妻弟自餘皆同惡相濟之腹心也冊府元龜卷九十三
