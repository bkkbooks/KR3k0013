body:
  text: 册府元龜卷九百四十六宋王欽若等撰總録部失禮奢侈厚葬失禮夫禮者天之經地之義人之行也可使顚沛而求不可斯須而去仲尼有言非禮勿視非禮勿聽非禮勿言非禮勿動矧乎吉凶威儀之盛酬酢升降之繁享宴賔介之容贄弊籩豆之數過與不及皆為失也茍有失之譏誚及焉鄭公子忽以魯隱公八年四月甲辰如陳逆婦媯辛亥以媯氏歸甲寅入於鄭陳鍼子送女先配而後祖鍼子曰是不為夫婦誣其祖矣非禮也何以能育原壤孔子之故人其母死夫子助之沐椁沐治也原壤登木曰乆矣予之不託於音也木椁材也託寄也謂叩木以作音歌曰狸首之斑然執女手之卷然說人辭也夫子為弗聞也者而過之佯不知從者曰子未可以巳乎已猶止也夫子曰丘聞之親者毋失其為親也故者毋失其為故也叔孫武叔為魯大夫其母死武叔公子牙之六世孫名州仇毁孔子者既小歛舉者出尸出戸袒且投其冠括髮尸出戸乃變服失哀莭冠素委貌子游曰知禮嗤之國昭子為齊大夫母死問於子張曰葬及墓男子婦人安位子張曰司徒敬子之䘮夫子相男子西鄉婦人東鄉夾羡道為位夫子孔子也曰噫母噫不寤之聲母禁止之辭曰我䘮也斯沾斯盡也沾讀覘覘視也國昭子自謂齊之大家有事人盡視之欲人觀之法其所為爾專之賔為賔焉主為主焉專猶同也時子張相婦人從男子皆西鄉非也叔孫子栁魯人其父仲皮學子栁叔仲皮魯叔孫氏之族學敎也子栁仲皮之子叔仲皮死其妻魯人也衣衰而繆絰衣當為齊壞字也繆讀為不樛垂之樛絰士妻為舅姑之服也言雖魯鈍其於禮勝學叔仲衍以告告子柳言非也衍葢皮之弟衍或為皮請繐衰而環絰繐衰小功之縷而四升半之衰環絰弔服之絰時婦人好輕細而多服此者衍既不知禮之本子栁亦以為然而請於衍使其妻為舅服之曰昔者吾䘮姑姊妹亦如斯末吾禁也衍荅子栁也姑姊妹在室齊衰與婦為舅姑同末無也言無禁我欲其言行退使其妻繐衰而環絰婦以諸侯之大夫為天子之衰弔服之絰服其舅非漢翟方進為丞相身既富貴而後母尚在方進内行修餙供養甚篤其後母終既葬三十六日除服起視事以為身備漢相不敢踰國家之制漢制自文帝遺詔之後國家遵以為常大功十五日小功十四日緦麻七日方進自以大臣故云不敢踰制晉劉頌為光禄大夫頌嫁女臨淮陳矯矯本劉氏子與頌近親出養於姑改姓陳氏中正劉友譏之頌曰舜後姚虞陳田本同根系而世皆為婚禮律不禁今與此同義為婚可也友方欲列上為陳騫所止故得不劾謝安為太保性好音樂自弟萬䘮十年不聽音樂及登台輔朞䘮不廢音樂王坦之書喻之不從衣冠效之遂以成俗謝琰安子也為尚書右僕射領太子詹事加散騎常侍遭母憂朝廷疑其塟禮時議者云潘岳為賈充婦宜城宣君誄云昔在武侯䘮禮殊倫伉儷一體朝儀則均謂宜資給葬禮悉依太傅故事先是王珣娶萬女珣弟珉娶安女並不終由是與謝氏有隙珣時為僕射猶以前憾緩其事琰聞恥之遂自造輼輬車以塟議者譏之宋張暢為侍中領太子右衛率出為會稽太守暢愛弟子輯及暢臨終遺命與輯合墳時議非之後魏甄琛字思伯少敏悟閨門之内兄弟戲狎不以禮法自居後終於侍中贈司徒孫紹為太府少卿曾因朝見靈太后謂曰卿年老矣紹曰臣年雖老臣卿乃少太后笑之高肇為司徒父兄封贈雖久竟不改瘞孝莊延昌三年乃詔令遷塟肇不自臨赴唯其兄子猛改服詣代遷塟於鄉時人以肇無識哂而不責也隋鄭譯為上柱國沛國公有罪除名後徵見復其勲爵高祖令内史令李德林立作詔書高頴戲謂譯曰筆乾譯答曰出為方岳杖策言歸不得一錢何以潤筆帝大笑唐王珪為禮部尚書兼魏王師珪性簡傲薄於自奉准令三品已上並立私廟四時享祀焉珪通貴漸乆獨祭於寢下同庶人為法司所劾太宗優容弗之譴也因為其營造以愧其心珪職在秩宗儉不中禮時論以是少之吕諲乾元二年為武部侍郎同中書門下平章事丁母憂起復本官又遷黄門侍郎上元初同中書門下三品使有司送㦸至其宅既安之或曰此吉慶之事不宜以凶服受之諲遂權釋慘衣吉服當中而拜識者譏其失禮李晟為太尉貞元六年晟妾杜氏贈鄭國夫人初晟無正室側室王氏特封晋國夫人王氏無子而杜氏生子愿有詔為嫡子及杜之卒也追贈之詔云晟亡妻杜氏而晟實為之服緦議者以為准禮士妾有子而為之緦開元新禮無是服矣而晟擅舉復之後王氏卒晟奏給鹵簿又謂亡妻王氏亦服緦而已名實服紀俱爽頗為當時所誚李齊運貞元中為禮部尚書以妾衛氏為正室齊運冕服以備其禮時人鄙之王紹為兵部尚書紹名初與憲宗同憲宗繇為廣陵王順宗時詔下將册為皇太子數日而王紹上陳請改其名時議者或非之曰皇太子亦人臣也東宫之臣當請改爾奈何非其屬而遽請改名以避皇太子豈為以禮事上耶左司員外郎李藩曰歴代故事皆自不識大體之臣而失之因不可復正無足怪也是時韋貫之為監察御史名與上同獨不請改既而下詔以陸淳為給事宜改名質充皇太子侍讀貫之不得已乃上疏改其名宰相溺於風俗以為細事而不正之典章寢失比方前代難矣杜佑為淮陽節度使䘮妻㫒嬖妾李氏為正室封密國夫人親族子弟言之不從時論非之叚文昌西河人家于荆州長慶初為西川節度後為河南節度文昌於荆蜀皆有先祖故第至是贖為浮圖祠又以先人墳墓在荆州别營居第以置祖禰影堂歲時伏臘良晨美景享薦之後即以音樂歌舞繼之如事生者縉紳哂焉後唐李從璋為河中節度使眀宗長興四年七月從璋奏臣母亡請准式假仍請定服制從璋帝從子今屬籍如皇子而請為母服失禮也禮寺知其不可無所上聞而止奢侈禮與其奢大聖誨乎寧儉富不期侈前哲戒乎自至是知滿則招損欲敗乃度故以奢為不遜侈為大惡若乃營耳目之玩尚輿服之餙紛華之靡務在於宣驕泰逸之心唯矜於處樂以敗禮而為德豈制義以存誠至於力敝取亡體汰速戾且莫知其紀極亦唯日而不足是以楊子規其鬼瞰老氏謂之盗誇唯夫行之以𠂻約之以禮庶可保其中吉免彼惡終者矣慶封齊大夫奔魯獻車於季武子美澤可以鑑智伯晋大夫為室美士茁夕焉智伯曰室美夫對曰美則美矣抑臣亦有懼也智伯曰何懼對曰臣以秉筆事君志有之曰高山峻原不生草木松栢之地其土不肥今土木勝臣懼其不安人也宫成三年而智氏亡漢史丹大司馬車騎將軍高之子為左將軍盡得父財身又食大國邑重以舊恩數見褒賞重直用反賞賜累千金僮奴以百數後房妻妾數十人内奢淫好飲酒極滋味聲色之樂陳咸為冀州刺史歴楚内史北海東郡南陽太守所居調發屬縣所出食物以自奉養奢侈玉食玉食言美食如玉也後漢馬融為議郎達生任性不拘儒者之節居宇器服多存侈餙常坐高堂施絳紗帳前授生徒後列女樂弟子以次相傳鮮有入其室者魏何䕫為太子太傅遷太僕節儉之世最為豪汰李勝為議郎少遊亰師雅有才智與曹爽善眀帝禁浮華而人白勝堂有四窻八達各有主名用是被收以其所連引者多故得原禁錮數歲呉丼寧巴郡臨江人也為蜀郡丞棄官歸家其出入歩則陳車騎水則連輕舟侍從被文繡所如光道路住止常以繒錦維舟去或割棄以示奢也晋王愷武帝時為吏部尚書奉車都尉既為賈充所搆失職乃縱酒耽樂極滋味以自奉養初何邵以公子奢侈每食必盡四方珍饌愷乃踰之一食萬錢猶云無可下筯處夏侯湛為散騎常侍湛族為盛門性頗豪侈侯服玉食窮滋極珍石崇為衛尉財産豐積室宇寵麗後房百數皆曵紈綉珥金翠絲竹盡當時之選庖膳窮水陸之珍與貴戚王愷羊琇之徒以奢靡相尚愷以􅏁澳釡崇以蠟代薪愷作紫絲布歩障四十里崇作錦歩障五十里以敵之崇塗屋以椒愷用赤石脂崇愷爭豪如此武帝每助愷常以珊瑚樹賜之高二尺許枝柯扶疎世所罕比愷以示崇崇便以鐵如意撃之應手而碎愷既惋惜又以為疾已之寳聲色方厲崇曰不足多恨今還卿乃命左右悉取珊瑚樹有高三四尺者六七枝條幹絶俗光彩耀日如愷比者甚衆愷恍然自失崇為客作豆粥咄嗟便辦每冬得韭䓑虀常與愷出游爭入雒城崇牛迅若飛禽愷絶不能及愷每以此三事為恨乃密貨帳下問其所以荅云豆至難煑預作熟末客來但作白粥以投之爾韭䓑虀是𢷬韭根雜以麥苗爾牛奔不遲良由馭者逐不及反制之可聽蹁轅則駛矣於是悉從之遂爭長焉崇後知之因殺所告者崇以奢豪矜物厠上常有十餘婢侍列皆有容色置甲煎粉沉香汁有如厠者皆易新衣而出後崇既誅有司簿開崇水碓三十餘區倉頭八百餘人他珍寳貨賄田宅稱是宋謝靈運晋車騎將軍𤣥之孫襲封康樂公為瑯琊王大司馬行軍參軍性奢豪車服鮮麗衣裳器物多改舊制世共宗之咸稱謝康樂也阮佃夫為黄門侍郎封建城侯宅舍園池諸王邸第莫及妓女數十藝貌冠絶當時金玉錦繡之餙宫掖不逮也每製一衣造一物亰邑莫不效法焉於宅内開瀆東出十許里塘岸整潔汎輕舟奏女樂中書舍人劉休嘗詣之値佃夫出行中路相逢要休同返就席便施設一時珍羞莫不畢備凡諸火劑並皆始熟如此者數十種佃夫常作數十人饌以待賔客故造次便辦類皆如此晋世王石不能過也南齊到撝宋䕶軍彦之之孫襲封建昌公資籍豪富厚自奉養宅宇山池亰師第一伎妾姿藝皆窮上品才調流贍善納交遊庖厨豐腆多致賔客茹法亮為竟陵王司徒中兵參軍廣開宅宇杉齋光麗與延昌殿相埒延昌殿武帝中齋也宅後為魚池釣臺土山樓舘長廊將一里竹林花藥之美公家苑囿所不能及吕文度為外監專兵權既見委用廣開宅宇盛起土山奇禽怪樹皆聚其中後房羅綺王侯不能及陳休尚顯逹之子也為侍中鎭軍將軍家既豪富與王敬則諸兒並精車牛麗服餙當世快牛稱陳世子青王三郎烏吕文顯折角江瞿曇白鼻而皆陳集舍顯逹知此不恱及休尚為郢府主簿過九江别拜顯逹曰凡奢侈者鮮有不敗麈尾蠅拂是王謝家物汝不須捉此遂自即取於前燒除之梁朱异自貟外常侍累遷侍中异及諸子自潮溝列宅至青溪其中臺池翫好每暇日與賔客遊焉四方所饋財貨充積性恡嗇未嘗散施陳孫瑒為侍中五兵尚書右軍將軍其自居處頗失於奢豪庭院穿築極林前之致歌童舞女當世罕儔賔客塡門軒葢不絶後魏李世哲尚書左僕射崇之長子性輕率供奉豪侈王超為并州治中性豪華能自奉養每食必窮水陸之味隋樊略為司農卿性頗豪侈每食必方丈水陸必備虞孝仁為都水丞伐遼之役充使監運頗有功然性奢華以駱駞負函盛水養魚而自給唐范傳正為宣歙觀察使元和中受代至亰師憲宗聞其理第過侈薄之拜光禄卿傳正精悍有力好古自餙及為廉察頗事奢侈韋陟為吏部侍郎門地豪華早踐清列侍兒閹閽列侍左右者十數衣書藥食咸有典掌而輿馬童奴勢侔於王家陟自以才地人物坐取三公頗以簡貴自處善誘納後進其同列朝要視之蔑如也潘孟陽為戸部侍郎氣尚豪俊不拘小節居第頗極華峻憲宗微行至樂遊原見其宏敞工猶未已問之左右以孟陽對孟陽懼而罷工作性喜遊宴公卿朝士多與之遊晋史珪為樞密院學士日兩使故鄉而金裝煥赫衒其極餙有識無不哂之厚葬易曰古之塟者厚衣之以薪塟之中野不封不樹禮曰棺周於衣衣周於椁所以表藏掩之義思不毁之道也乃知舉稱其財斯為之禮至於後世因其侈心被以珠玉送以輿馬罄極工巧殫竭財力故仲尼興猶父之歎華元貽不臣之譏良有以乎齊桓公墓有水銀池金蠶數十簿珠襦玉匣繒綵不可勝數又云晋曹嶷為青州刺史愍帝建興中發齊景公及管仲冡尸並不朽繒帛可服珍寳巨萬華元樂舉俱為宋大夫宋文公卒始厚塟用蜃炭瘞車馬始用殉燒蛤為炭以瘞壙多埋車馬用人從葬重器備重猶多也椁有四阿棺有翰檜四阿四注椁也翰旁飾檜上飾皆王禮君子謂華元樂舉於是乎不臣臣治煩去惑者也是以伏死而爭今二子者君生則縱其惑謂殺母弟須死又益其侈是棄君於惡也何臣之為若言何用為臣桓魋為宋司馬自為石椁三年而不成孔子曰若是其靡也死不如速朽之愈也顔囘字子淵魯人也既死門人欲厚塟之孔子曰不可門人厚塟之子曰囘也視予猶父也予不得視猶子也非我也夫二三子也言顔路在聽門人厚塟之漢霍光為大司馬大將軍既薨夫人顯改光時所自造塋制而侈大之塋墓域也起三山闕築神道北臨昭靈南出承恩昭靈承恩皆舘名也盛飾祠室輦閣通屬永巷而幽良人婢妾守之冡上作輦閣之道及永巷董賢為大司馬哀帝令將作為賢起冡塋傍内為便房側栢題湊外為繳道周垣數里門闕罘罳甚盛及至東園秘器珠襦玉柙豫以賜賢無不備具及賢自殺其父恭不悔過乃復以砂畫棺作四時之色左蒼龍右白虎上著金銀日月玉衣珠璧至尊無以加原渉祖父自陽翟徙茂陵父哀帝時為南陽太守天下殷富大郡二千石死官賦歛送塟皆千萬以上妻子通共受之以定産業渉父死讓還南陽賻送繇是顯名渉自以為前讓南陽賻送身得其名而令先人墳墓儉約非孝也廼大治起冡舍周閣重門初武帝時亰兆尹曹氏塟茂陵民謂其道為亰兆阡渉慕之廼買地開道立表署曰南陽阡人不肯從謂之原氏阡後漢崔寔濟北相瑗子也瑗卒寔剽賣田宅起冡塋立碑頌塟訖資産竭盡因窮困以酤釀販鬻為業時人多以此譏之寔終不改亦取足而已不致盈餘晉桓温為大司馬塟女冡中有金巾箱織金蔑為嚴器又有金蠶銀繭等物甚多南齊宜都王鑑鎭姑熟於時人發冡得之後魏趙修宣武時為光禄勲修之塟父也百僚自王公以下無不弔祭酒犢祭奠之具塡塞門街於亰師為制碑銘石獸石柱皆發民車牛傳致本縣財用之費悉自公家凶吉車乗將百兩道路供給亦皆出官唐李義府為司列太常伯同東西臺三品義府改葬其祖父塋墓於永康陵側三原令李孝節私課丁夫車牛為其載土築墳晝夜不息於是高陵櫟陽富平雲陽華原同官涇陽等七縣以孝節之故懼不得已悉課丁車赴役高陵令張敬業恭勤怯懦不堪其勞死於塟所王公已下爭致贈遺其羽儀導從轜輴器服並窮極奢侈又㑹塟車馬祖奠供帳自灞橋屬於三原七十里間相繼不絶武德已來王公塟送之盛未始有也李光進代宗大厯中為檢校刑部尚書兼太子太保塟其母于亰城之南原將相致祭凡四十四幄窮極奢侈城内士庶觀者如堵册府元龜卷九百四十六
