body:
  text: 册府元龜卷三百六十九宋王欽若等撰將帥部攻取第二北齊堯雄仕東魏為車騎大將軍行豫州事時西魏以是育寶為豫州刺史據項城義州刺史韓顯據南頓雄率衆攻之一日拔其二城擒顯及長史丘岳寶遁走獲其妻妾將吏三千人皆傳送京師清河王岳初仕東魏為太尉時西魏將王思政守頴川郡城岳與行臺慕容紹宗儀同劉豐等率歩騎十萬攻之僃盡攻擊之術以潁川水灌城陷之斛律光文宣天保三年為晉州刺史東有周天柱新安牛頭三戍招引亡叛屬為㓂竊七年光率步騎五千襲破之又大破周儀同王敬儁等獲生口五百餘人雜畜千餘頭而還九年又率衆取周綘川白馬澮文翼城等四戍除朔州刺史十年除特進開府儀同三司二月率騎一萬討周開府曹廻公斬之柏谷城主儀同薛禹生棄城奔遁遂取文侯鎮立戍置柵而還至後主武平中為并州刺史詔率歩騎五萬出平陽道攻姚襄白亭城戍皆克之獲其城主儀同大都督等九人捕虜數千人又别封長樂郡公是月周遣其柱國紇平廣畧圍宜陽光率歩騎五萬赴之大戰於城下乃取周建安等四戍捕虜千餘人而還叱列平為開府天保中與諸將南討江淮克陽平郡段韶為左丞相後主武平二年二月周師來冦遣韶與右丞相斛律光太尉蘭陵王長恭同往捍禦以二月暮行逹西境有柏谷城者乃敵之絶險石城千仭諸將莫肯攻圍韶曰汾北河東勢為國家之有若不去柏谷事同痼疾計彼援兵㑹在南道今斷其要路救不能來且城勢雖髙其中甚狹火弩射之一旦可盡諸將稱善遂鳴皷而攻之城潰獲儀同薛敬禮大斬獲首虜仍城華谷置戌而還封廣平郡公是月周又遣將冦邉右丞相斛律光先率師出討韶亦請行五月攻服秦城周人於姚襄城南更起城鎮東接定陽又作深塹斷絶行道韶乃宻抽士卒從北襲之又遣人潛渡河告姚襄城中令内外相應渡者千有餘人周人始覺於是合戰大破之獲其儀同若干顯寶等諸將咸欲攻其新城韶曰此城一面阻河三面地險不可攻就令得之城地耳不如更作一城壅其路破服秦併力以圖定陽計之長者將士咸以為然乃從圍定陽其城主開府儀同楊範固守不下韶登山望城勢乃縱兵急攻之屠其外城大斬獲首級時韶病在軍中以子城未克謂蘭陵王長恭曰此城三面重澗險阻並無走路唯慮東南一處耳賊若突圍必從此出但簡精兵專守自足成擒長恭乃令壯士千餘人設伏於東南澗口其夜果如所䇿賊遂出城伏兵擊之大潰範等面縛盡獲其衆韶疾甚先軍還以功别封樂陵郡公斛律光舉為大都督率歩騎三千導衆軍西襲夏州克之張亮為幽州刺史時侯景叛除征西大將軍涼州刺史尚書右僕射西南道行臺攻梁江夏潁陽七城皆下之王懷為持節廣州諸軍事梁遣將湛僧珍楊暕來冦懐與行臺元景擊須城拔之擒暕莫多婁貸文為汾陜大都督與太保尉景攻東雍南汾二州克之斛律平為濟州刺史侯景渡江詔平為大都督率青州刺史敬顯雋左衛將軍厙狄伏連于畧定夀陽宿豫三十餘城事罷還州加開府進位驃騎大將軍後周楊􅎎初仕魏孝武時大軍東討授大行臺尚書率義衆先驅敵境攻其四戍拔之獨孤信為太子太傅涼州刺史宇文仲和據城不受代文帝令信率開府怡峯討之仲和據城固守信夜令諸將以衝梯攻其北信親帥壯士襲其西南逹明克之擒仲和虜其六千戸送于長安拜大司馬李遷哲為車騎大將軍從開府賀若敦討直涼金三州賊尋並平蕩仍與敦南出徇地遷哲先至巴州入其郛郭梁巴州刺史牟安民惶懼開門請降安民子宗徹等猶據琵琶城招諭不下遷哲攻而克之斬獲九百餘人齊王憲建義五年從武帝伐齊憲攻洪洞永安二城並拔之侯莫陳頴從滕王逌擊龍泉文城叛胡頴與柱國豆盧勣分路而進頴懸軍五百餘里破其三柵隋于仲文為大將軍髙祖初為丞相尉迥之亂遣仲文發兵討之迥將檀讓屯成武别將高士儒以萬人屯永昌仲文移書州縣曰大將軍至可多積粟讓謂仲文未能卒至方椎牛享士仲文知其怠選精騎襲之一日便至遂拔成武楊素為上開府成安縣公從王軌破陳將吳明徹於吕梁治東楚州事陳將樊毅築城於泗口素擊走之夷毅所築史祥為驃騎將軍伐陳之役從宜陽公王世積以舟師出九江道先鋒與陳人合戰破之進拔江州髙祖聞而大悅下詔褒之韓擒虎為廬州縂管大舉伐陳以為先鋒率五萬人宵濟襲取采石進攻姑熟半日而拔杜彦雲以行軍總管與韓擒虎伐陳軍至南陵賊屯據江岸彥雲遣儀同樊子葢率精兵擊破其柵獲船六百餘艘渡江擊南陵城拔之擒其守將許翼崔仲方仁夀末以代州總管被徴入朝㑹漢王諒餘黨據吕州不下煬帝令周羅㬋攻之中流矢卒乃令仲方代總其衆月餘拔之進位大將軍陳稜為武賁郎將大業六年與朝議大夫張鎮周發東陽兵萬餘人自義安汎海擊琉球國月餘而至分為五軍趨其都邑其王渴刺兠率衆數千逆拒稜遣鎮周為先鋒擊走之稜乗勝逐北至其栅渇刺兠背柵而陣稜盡鋭擊之従辰至未苦鬬不息渴刺兠自以軍疲引入柵稜遂填塹攻破其柵斬渴刺兠獲其子島搥虜男女數千而歸唐張士貴隋大業末髙祖起義為右光禄大夫拒屈突通於桃林使東畧地下同軌已東城堡攻克熊州遂鎮之太宗以大軍圍王世充士貴率兵攻景華宫城拔之李大亮為安撫大使攻王世充樊城鎮克之斬其將周大安下其城柵十四所并取沮華二州許紹為硤州刺史攻蕭銑荆門鎮克之杜伏威武徳四年五月攻王世充之梁郡克之田世康為黔州刺史攻蕭銑五州四海鎮皆克之劉世譲為行軍總管攻竇建徳黄州刺史克之周法明為黄州總管攻蕭銑安州克之獲其偽總管馬貴遷李仲文為行軍總管鎮并州劉武周頻遣兵入境仲文擊輙破之下城堡百餘所薛萬均為殿中少監副柴紹擊梁師都諸將見賊險固皆有憚色萬均謂之曰城中無氣鼓聲不徹此見破亡之候平在旦夕諸軍勿以為憂俄而師都見殺城降侯君集以貞觀十四年為交河道行軍總管擊髙昌王麴智盛師次田地城賊嬰城自固君集諭之不下其夜有星墜其城内詰朝攻之及午而克遣中郎將辛獠兒率勁騎為先鋒夜趨其都城君集以大軍繼進頓兵城下諭以禍福智盛致書於君集曰有罪於天子者先王也既咎深譴積身已喪亡智盛襲位未有愆闕所冀尚書赦之君集報曰若能悔過宜束手軍門智盛猶不出於是率諸城降者填其隍塹發抛車以攻之飛石雨下國人大懼智盛計無所出於是遣其將麴士義中郎趙曉居守親與綰曹麴徳俊出城自謁請改事大國君集諭令早降智盛詞色甚慢薛萬均忿然作色曰城當擊取小兒何足與言因麾兵而進戰士爭奮智盛大懼伏而言曰唯公之命於是開門降欵李勣為特進中書門下三品貞觀十九年授東道行軍大總管従太宗征遼攻盖牟城督軍疾戰砲車齊奮石下如雨梯衝逓進晝夜不輟拔盖牟城獲戸口二萬餘人倉糧十萬餘石又率騎攻遼東城城中有鏁甲銛矛有高麗云前燕時於天落下以保祐其城者高麗大城皆立朱蒙廟盖其先祖聞兵將至粉飾美女進朱蒙為婦日搥牛以祭之夷巫皷舞云朱蒙大悦城必克全聞我軍中有抛車飛三百斤石一里之外者甚懼之於是城上積木編板以戰數加繩網於其上以拒飛石勣列車發石以擊其城所遇盡潰又推撞車其樓閣無不傾倒晝夜不息者旬有三日焉克遼東城以為遼州又師次白巖城白巖城因山臨水疊石為之四面險絶其可攻之處纔六十歩勣又以衝車撞之所向摧潰飛石流矢雨集城中勣又攻市安城甚急城中每見太宗幡旗必乗城皷譟太宗甚怒勣曰請破城之日男子盡坑城内聞之人皆死戰詔令江夏王道宗督兵築土山攻其城東南隅髙麗亦禆城增雉以相抗詔遣衛兵畨次攻之日六七合抛石撞車壞其樓雉城中隨其壞處即立木柵道宗以樹條包壤為土托積土以為山其中開五道加木被土於其上不捨晝夜漸以逼城造山六旬用工五十萬山頂去其城數丈而俯臨城中道宗遣果毅傳伏愛領隊屯於山頂以防敵土山自髙而陊以排其城城壞㑹伏愛私離所部髙麗數百人自頺城而戰遂據有土山而塹斷人積火縈排以自固太宗大怒斬伏愛以狥命諸將擊之三日不能克蘇定方為平壤道大總管髙宗顯慶五年㧞百濟之真都城初定方率衆自城西濟海趨真都去城二十餘里賊傾國來拒大戰破之殺虜萬餘人追奔入郭其王義慈及太子隆奔于北境定方進圍其城義慈次子泰自立為王率衆還固守義慈嫡孫文思曰王與太子雖並出城而身見在叔總兵馬專擅為王假令漢退我父子當不全矣遂率其左右投城而下百姓従之泰不能止定方令兵士登城立幟於是泰開門頓顙請命龍朔元年定方為右驍衛大將軍㑹思結闕俟斤都曼先鎮諸胡擁其所部及疎勤朱俱般蔥嶺三國復叛詔定方為安撫大使率兵討之至業葉水而賊保馬頭川於是選精卒一萬人馬三千匹馳掩襲之一日一夜行三百里詰朝至城西十里都曼大驚率兵拒戰於城門之外賊師敗績退保馬保城王師進屯其門入夜諸軍漸至四面圍之伐木為攻具布列城下都曼自知不免面縳開門出降俘還信安郡王禕𤣥宗開元中為朔方節度使時石堡城為吐蕃所據侵擾河右勅禕與河西隴右計議取之禕到軍總率士伍克期攻之或曰此城據險又為吐蕃所惜今懸軍深入賊必併力拒守事若不捷退則狼狽不如按軍持重以觀形勢禕曰人臣之節豈憚艱險必其衆寡不敵吾則以死斷之茍利國家此身何足可惜於是督率諸將倍道兼進併力攻之遂拔石堡城斬獲首級并獲糧儲器械其數甚衆仍分據守以遏賊路帝聞之大悦始改石堡城為振武軍自是河隴諸軍遊弈拓地千餘里哥舒翰為隴右節度時吐蕃保石堡城路逺而險不拔天寶八載𤣥宗以朔方河東羣牧之衆十萬詔翰都統攻石堡城數日不克召其將髙秀巖張守瑜欲斬之秀巖請五日克之如期而拔曲環陜州人天寶中従哥舒翰攻拔石堡城收黄河九曲洪濟等城累授果毅别將崔旰以漢州刺史統西川兵出西山討吐蕃旰始次賊城周圍皆石礫攻具無所設唯東南隅環丈之地壤土可宂諜知之以告旰乃夜穿地道攻之再宿而拔其城因西拓地數百里下城砦數四蕃衆相語曰崔旰皆神兵也將更前進以糧盡還師時嚴武為劔南節度聞之大悦裝七寶輿迎旰入城都以誘士衆賞賚過厚旰後改名寧髙崇文憲宗元和初統神䇿軍討劉闢于西川城都北一百五十里有鹿頭山扼兩川之要闢築城以守又連八柵張犄角之勢以拒王師是日破賊二萬于鹿頭城下大雨如注不克登乃止明日又破于萬勝堆在鹿頭之東使梟將髙霞㝢親皷鹿頭扳緣而上矢石如雨又命敢死士連登奪其堆燒其栅栅中之賊殱焉遂據堆下瞰城中人物可數凡八大戰皆大捷賊揺心矣蜀既平詔刻石紀功於鹿頭山下劉従諌為昭義軍節度使文宗太和二年八月従諌引漳河水灌賊界深冀兩州梁朱珍自唐僖宗光啓初太祖置為諸軍都指揮使㑹滑州節度使安師儒戎政不治太祖命珍與李唐賓率步騎以經略之始入境遇大雪令軍士無得休息一夕馳至壁下百梯並昇遂乗其墉滑州平牛存節初為滑州遏後指揮使唐昭宗乾寧三年太祖東討鄆州存節領軍次故樂亭扼其要路都指揮使龎師古屯馬頰存節宻與都將王言謀入鄆壘存節遣王言夜伏勇士於州西以舩踰濠舉梯登陴既而王言不克入存節獨率伏軍負梯衝破其西壅城奪其濠橋諸軍俱進遂陷其城楊師厚為滑州節度使太祖北征令師厚以大軍攻棗强逾旬不能克太祖屢加督責師厚晝夜奮擊乃破之盡屠其城康懐英初為軍校唐昭宗光化元年従氏叔琮伐襄陽以一軍攻下鄧州天復元年太祖率軍迎昭宗於鳯翔李茂貞大將符道昭領兵萬餘屯武功懷英領前鋒之衆先登一皷而破之翌日太祖方至二年四月道昭復領大軍屯於虢縣之漠谷其建寨之所前臨巨澗後倚峻阜險不可升太祖遣懐英提騎數千急擊之道昭以懷英兵寡有俯視之意乃率甲士萬人絶澗以挑戰懷英始以千騎交鬬戰酣發伏以擊之岐大軍敗鄜師李周彛屯軍於三原以為茂貞聲援又命懷英討之周彛拔軍而遁追至梨團因攻下翟州擒其守來獻天祐三年各佐劉知俊破邠鳯之衆五萬於美原收十五餘寨乗勝引軍攻下鄜州以功授陜州節度使及太祖受禪加檢校太保開平元年夏命將大軍伐潞率衆晝夜攻城半月之間機巧百變懷英期於必取乃築壘環城濬鑿池塹然而屢為晉將周德威騎軍所撓懷英不敢即戰太祖乃以李思安代之降為行營都虞候王彦章為許州節度使北面行營副招討時晉帥陷鄆州中外大恐以彦章代戴思逺為北面招討使拜命之日促裝以赴滑臺遂自揚村砦浮河而下水陸俱進斷晉人徳勝之浮梁攻南城拔之晉人遂棄北城併軍保楊劉彦章以舟師㳂流而下晉人盡徹北城屋木編栰置歩軍於其上與彥章軍各行一岸每遇轉灘水匯即中流交鬬流矢雨集或舟栰覆北及楊劉凡百餘戰彥章急攻楊劉晝夜不息晉人極力固守垂陷者數四晉王親援其城彦章之軍重濠複壘晉人不能入晉王乃於博州東岸築壘以應鄆軍彦章聞之馳軍而至急攻其栅自旦及午其城將拔㑹晉王以大軍來援彦章乃退王檀為許州節度使貞明元年三月魏博軍亂晉王入魏州分兵攻下屬郡河北大擾檀受詔與開封尹劉鄩掎角進師以援河北檀攻澶州魏縣下之擒賊將李巖玉門開以獻頃之檀宻疏請以奇兵西趨河中自隂地開襲取晉陽末帝許之即馳兵而去師至晉陽晝夜急攻其壘并州幾陷既而蕃將石家才自潞州以援兵至檀引軍大掠而還劉鄩為鎮南軍節度使㑹蔣殷據徐州以叛朝廷以福王友璋鎮徐方殷不受代末帝遣鄩與鄆帥牛存節率兵攻之殷求援於淮夷偽吳楊溥遣大將朱瑾領衆赴援鄩逆擊破之城陷殷舉族自燔於火中得其尸梟首以獻後唐李嗣昭為蕃漢行營都指揮使唐昭宗天復中汾州刺史李瑭據城為叛嗣昭將兵攻城三月而拔斬李瑭進攻慈隰下之獲刺史唐禮小將張唐向𢎞于等又攻潞州梁祖聞嗣昭之師大至召葛従周謂曰并人若在髙平當圍而取之先須野戰勿以潞州為敵及聞嗣昭軍韓店梁祖曰進通嗣昭小字扼八議路此賊決與我鬬公等臨事制機勿落姦便賀德倫閉壁不出嗣昭日以鐵騎環城汴人不敢芻牧援路斷絶八月徳倫張歸厚棄城遁去遂取潞州符存審遥領邢洺磁團練使唐昭宗天祐十二年八月將兵五千討張源德於貝州時城中賊衆三千每夜分出剽掠州民苦之皆願塹其城以安耕作及存審至賊保壁自固因以八縣丁壯塹而圍之九月賊衆三千披甲出城我將甘言諭之俱釋兵解甲既而四面陳兵皆殺之貝州平董璋初仕梁為列校龍德末潞州李繼韜送欵於梁時潞將裴約方領兵戍澤州不徇繼韜之命據城以自固梁末帝遣璋率師攻陷之即以璋為澤州刺史李承嗣為雒州刺史及張濬之加兵於太原也時鳳翔軍營霍邑承嗣帥一軍攻之岐人夜遁追擊至趙城合大軍攻平陽旬有二日而拔師還改教練使檢校司徒李建及初従武皇為遼州刺史攻楊劉自寅至未汴軍嬰城拒守建及自負葭葦湮塹率先登梯遂拔之閻寳遥領天平軍節度使東南面招討等使時鎮州張文禮殺王鎔叛寶帥師進討收趙州進渡滹水擒賊黨張文順以獻又進逼真定結營西南隅掘塹柵以環之決大悲寺漕渠以侵其郛晉張廷藴初仕唐莊宗為帳前都指揮使兼左右羽林都虞候㑹潞州李繼儔嬰城叛詔遣明宗為招討使元行欽為都部署廷藴為前鋒軍至上黨日已暝矣憩軍方定廷藴首率勁兵百餘軰踰洫坎城而上守陴者不能禦尋斬闗延諸軍入焉明宗行欽逹明而始至其城已下楊光逺為宣武軍節度使判六軍諸衛事時范延光據鄴城叛光逺率兵討之光逺進攻城圍又奏賊城四面凍合壕水請添兵併力攻取尋分命使臣往諸道抽取齊赴魏州軍前光逺逼冦氏門置寨賊勢愈蹙漢史𢎞肇為都督率兵討代州平之初代州刺史王暉叛歸契丹𢎞肇一皷而拔之斬暉以狥趙暉為鳯翔兵馬都部署以討王景崇髙祖乾祐二年十二月暉上言前月十一日夜分命兵士燒賊城諸門鹿角戰具賊並不出鬬敵擇日攻城次三年正月上言十二月二十四日收復鳯翔景崇舉家自燔周景殷為雒州刺史太祖廣順元年十一月收復馬嶺闗曹英為侍衛步軍都指揮使總兵討慕容彦超於兖州梯衝塹壘頗有力焉㑹太祖親征併兵攻陷其城一説廣順二年兖州行營曹英言臣等部領大軍至兖州營于西門外尋令馬軍都指揮使王全斌壕寨使萬超城四面相度攻圍城勢二月又言塹地圍城第二重三月又言進洞屋二步差任漢謙充諸寨提舉使四月又言發火燒毁賊城敵樓七十間册府元龜卷三百六十九
