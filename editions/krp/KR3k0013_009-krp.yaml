body:
  text: 册府元龜卷九宋王欽若等撰帝王部繼統第一易曰大人以繼明照于四方孟軻亦云君子創業垂統為可繼也仲尼刪詩定書斷自唐虞以下故軒轅之前無所論次然學者多稱少昊乃黄帝之子逮乎堯舜皆其裔也則知黄帝之澤及後世淵源深逺然自帝嚳已往五材迭勝事畢纂緒此固不論及夏后氏之興櫛風沐雨乗四載拯横流鳥獸咸若烝民粒食功無間然子啟賢明用克永世商有祝網之仁誅暴之義元元欣戴亦惟舊矣雖太甲之顛仆典刑而流風善政浸于遺俗有賢臣援而正之終能篤紹基緒姬周之興瓜瓞成頌炎漢之慶大横叶兆自爾明聖代興光昭前烈七世之廟固可以觀徳者矣夏后啟禹之子禹東廵守至于㑹稽而終以天下授益禹崩三年之喪畢益讓帝禹之子啟而避居箕山之陽陽字一作隂避音壁禹子啟賢天下屬意焉禹雖授益益之佐禹日淺天下未洽故諸侯皆去益而朝啟曰吾君帝禹之子也於是啟遂即天子之位是為夏后帝太康啟子帝仲康太康弟帝相仲康子帝少康相子帝宁少康弟一云杼帝槐宁子帝芒槐子帝泄芒子帝不降泄子帝扄不降弟帝廑扄子帝孔甲不降子帝臯孔甲子帝發臯子帝履癸發子是為桀殷帝外丙湯之子湯太子太丁未立而卒乃立太丁之弟是為外丙帝仲壬外丙之弟帝太甲太丁之子成湯適長孫成湯既沒太甲元年史記稱湯沒太子太丁之子外丙即位三年立其弟仲壬與書差互伊尹作伊訓曰惟元祀十有二月乙丒伊尹祠于先王此湯終踰月太甲即位奠殯而吿奉嗣王祗見厥祖居位主喪侯甸羣后咸在在位次百官總已以聽於冡宰伊尹制百官以三公攝冡宰帝沃丁太甲子帝太庚沃丁弟帝小甲太庚子一云弟帝雍已小甲弟帝太戊雍已弟為殷中宗帝仲丁太戊子帝外壬仲丁弟帝河亶甲外壬弟帝祖乙河亶甲子帝祖辛祖乙子帝沃甲祖辛弟帝祖丁沃甲兄祖辛之子帝南庚祖丁弟沃甲之子帝陽甲祖丁子陽甲之時殷衰自仲丁以來廢適而更立諸弟子弟子或争相代立比九世亂於是諸侯莫朝帝盤庚陽甲弟自河北五遷至河南治亳號曰殷行湯之政百姓繇寧殷道復興諸侯來朝帝小辛盤庚弟帝小乙小辛弟帝武丁小乙子為殷髙宗帝祖庚武丁子帝祖甲祖庚弟帝廩辛祖甲子帝庚丁廪辛弟帝武乙庚丁子帝太丁武丁子帝乙太丁子帝受辛帝乙少子兄㣲子啟母賤不得嗣辛母正后遂為嗣辛立為帝天下謂之紂周成王武王太子太子代立是為成王王少周初定天下周公恐諸侯叛乃攝行政當國七年成王長周公反政北面就羣臣之位羣臣賦敬之周頌篇名以進戒嗣王康王成王太子成王顧命懼太子之不任乃命召公畢公率諸侯以相太子而立之成王既沒二公率諸侯以太子見於先王廟中吿以文王武王之所以為王業之不易務在節儉毋多欲以篤信臨之作顧命太子立是為康王遂誥諸侯作康王之誥既受顧命羣臣陳戒遂報誥之因事曰遂曰王出在應門之内出臯門立應門内之中庭南面太保率西方諸侯入應門左畢公率東方諸侯入應門右二公為二伯各率其所掌諸侯隨其方為位皆北面皆布乗黄朱賔稱奉圭兼幣曰一二臣衛敢執壤奠賔諸侯也舉奉圭兼幣之辭言一二見非一也為藩衛故曰臣衛來朝而遇國䘮遂因見新王敢執壤地所出而奠贄也皆再拜稽首王義嗣徳答拜諸侯拜送幣而首至地盡禮也康王以義繼先人明徳答其拜受其幣太保暨芮伯咸進相揖皆再拜稽首冡宰與司徒皆共羣臣諸侯並進陳戒不言諸侯以内見外曰敢敬告天子皇天改大邦殷之命上天改大國殷之王命謂誅紂也惟周文武誕受羑若克恤西土言文武大受天命而順之能憂我西土之民本其所起惟新陟王畢協賞罰戡定厥功用敷遺後人休惟周家新升王位當盡協和天下賞罰能定其功以遺後人今王敬之哉敬天道務崇先人之美張皇六師無壞我髙祖寡命言當張大六師之衆無壞我髙祖寡有之教命王若曰庶邦侯甸男衛順其戒而告之不言羣臣以外見内惟予一人釗報誥報其戒昔君文武丕平富不務咎言先君文武道大政化平美不務咎惡底至齊信用昭明于天下至行至中信之道因顯明于天下言聖德洽則亦有熊羆之士不二心之臣保乂王家言文武既聖則亦有勇猛如熊羆之士忠一不二心之臣共安治王家用端命於上帝皇天用訓厥道付畀四方君聖臣良受端直之命于上天天用順其道付與四方之國王天下乃命建侯樹屏在我後之人言文武乃施政令立諸侯樹以為藩屏傳王業在我後之人謂子孫今予一二伯父尚胥暨顧綏爾先公之臣服于先王天子稱同姓諸侯曰伯父言今我一二伯父庶㡬相與顧念文武之道安汝先公之臣服于先王雖爾身在外乃心罔不在王室言雖汝身在外土為諸侯汝心常當忠篤無不在王室熊羆之士勵朝臣此督諸侯也用奉恤厥若無遺鞠子羞當各用心奉憂其所行順道無自荒怠遺我稚子之羞辱稚子康王自謂也羣公皆既聽命相揖趨出已聽誥命趨出罷退諸侯歸國朝臣就次王釋冕反䘮服脫去黼冕反服喪服居倚廬昭王康王子穆王昭王子昭王南廵守不返卒于江上乃立子滿是謂穆王恭王穆王子懿王恭王子孝王恭王弟夷王懿王太子孝王終諸侯立之厲王夷王子宣王厲王太子厲王即位三十年好利以榮夷公為卿士用事召穆公虎諫不聽國人相與畔襲厲王王出奔於彘太子静匿召公之家國人圍之召公乃以其子代王太子召公周公二相行政十四年厲王死於彘太子静長於召公家二相並立之幽王宣王子平王幽王子幽王為犬戎所殺於是諸侯乃即申侯而共立故幽王太子宜臼是為平王以奉周祀桓王平王孫平王太子泄父蚤死立其子林是為桓王荘王桓王子釐王莊王子惠王釐王子襄王惠王子頃王襄王子匡王頃王子定王匡王弟簡王定王子靈王簡王子景王靈王子悼王景王子敬王景王子景王十八年后太子聖而早卒二十年景王愛子朝欲立之㑹崩子丐之黨與爭立國人立長子猛為王子朝攻殺猛為悼王晉人攻子朝而立丐是為敬王敬王猛母弟元王敬王子定王元王子一曰貞定王哀王定王子思王哀王弟哀王立三月思王弑哀王而自立考王思王弟思王立五月考王弑思王而自立威烈王考王子安王威烈王子烈王安王子顯王烈王弟慎靚王顯王子赧王慎靚王子漢惠帝髙祖太子髙祖十二年四月自太子即位文帝髙祖中子惠帝娶魯元公主女為皇后帝無子取後宫美人子名之以為太子惠帝晏駕太子立為皇帝年幼吕后臨朝四年幽之永巷立恒山王𢎞為皇帝八年太后喪諸吕謀為亂丞相陳平太尉周勃朱虛侯章既誅諸吕諸大臣相與隂謀以為少帝及三弟為王者皆非孝惠子復共誅之使人迎代王代王乃遣太后弟薄昭見勃勃等具言所以迎立王者昭還報曰信矣乃令宋昌驂乗乗車之法尊者居左御者居中又有一人處車中右以備傾側是以戎事則稱車右其餘則曰驂乘驂者三也盖取諸三人為名義耳張武等六人乗詣長安至髙陵止而使宋昌先之長安觀變昌至渭橋在長安北三里丞相已下皆迎昌還報代王乃進至渭橋羣臣拜謁稱臣代王下拜太尉勃進曰願請間間容也猶今言中間也請容暇之頃當有所陳不欲於衆顯論也宋昌曰所言公公言之所言私王者無私太尉勃乃跪上天子璽代王謝曰至邸而議之既入代邸羣臣從至上議願代王即天子位代王曰奉髙帝宗廟重事也寡人不佞不佞不材也不足以稱稱副也音尺孕切願楚王計宜者楚王名交髙帝弟也寡人弗敢羣臣皆伏固請代王西鄉讓者三南鄉讓者再讓羣臣也鄉讀曰嚮丞相平等皆曰臣伏計之大王奉髙祖宗廟社稷計不敢忽願大王幸聽臣等臣謹奉天子璽符再拜上代王曰宗室將相王列侯以為其宜寡人寡人不敢辭遂即天子位羣臣以次侍使太僕夏侯嬰東牟侯興居先清宫舊典天子行幸所至必遣静室令先按行清静殿中以虞非常奉天子法駕迎代邸法駕者侍中驂乗八車即御屬車三十六乗皇帝即日夕入未央宫夜拜宋昌為衛将軍領南北軍張武為郎中令行殿中行謂案行也還坐前殿大赦天下景帝文帝太子後七年六月丁未即皇帝位武帝景帝中子後三年正月甲子自太子即皇帝位昭帝武帝少子後元二年二月立為太子年八歳大司馬大将軍霍光等受遺詔輔少主政事一決於光初征和二年衛太子為江充所敗衛太子即戾太子也其母衛氏而燕王旦廣陵王胥皆多過失是時武帝年老帝母寵姬鉤弋趙媫妤武帝心欲以為嗣命大臣輔之察羣臣惟光任大責重可屬社稷廼使黄門畫者畫周公負成王朝諸侯以賜光至是武帝㳺五柞宫病篤光涕泣問曰如有不諱誰當嗣者武帝曰君未諭前畫意耶立少子君行周公之事光頓首讓曰臣不如金日磾日磾亦曰臣外國人不如光武帝以光為大司馬大将軍日磾為車騎將軍及太僕上官桀為左將軍搜粟都尉桑𢎞羊為御史大夫皆拜卧内牀下明日武帝晏駕遂即帝位元鳳四年正月丁亥帝加元服見于廟元服謂加冠也禮曰今月吉辰加爾元服元首也宣帝武帝曽孫衛太子孫也生數月遭巫蠱事坐收繫郡邸獄謂諸郡邸置獄也巫蠱獄收繫者衆故寄在郡邸獄因大赦廷尉監邴吉載送祖母史良娣家後有詔掖庭養視上屬籍宗正元平元年四月昭帝晏駕無嗣大将軍霍光請皇后徵昌邑王賀六月丙寅王受皇帝璽綬尊皇后曰皇太后癸巳光奏王賀淫亂請廢之㑹丞相以下議定所立廣陵王已前不用及燕刺王反誅其子不在議中近親唯有衛太子孫號皇曽孫在民間咸稱述焉光遂復與丞相楊敞等上奏曰禮曰人道親親故尊祖尊祖故敬宗太宗亡嗣擇支子孫賢者為嗣孝武皇帝曽孫病已武帝時有詔掖庭養視至今年十八師受詩論語孝經躬行節儉慈仁愛人可以嗣孝昭皇帝後奉承祖宗廟子萬姓臣昧死以聞皇太后詔曰可光遣宗正劉徳至曽孫家尚冠禮洗沐賜御衣太僕以軨獵車迎曾孫就齋宗正寺入未央宫見皇太后封為陽武侯已而光奉上皇帝璽綬謁于髙廟元帝宣帝太子黄龍元年十二月癸巳即皇帝位成帝元帝太子宣帝時為世嫡皇孫宣帝愛之竟寧元年六月己未自太子即皇帝位哀帝元帝庶孫定陶恭王子年十七徵為皇太子綏和二年四月丙午即皇帝位平帝元帝庶孫中山孝王子元夀二年六月哀帝晏駕大司馬董賢自殺太皇太后詔新都侯王莽為大司馬領尚書事七月遣車騎将軍王舜大鴻臚左咸使持節迎中山王九月辛酉中山王即皇帝位年九歳在位五年為莽所酖莽立宣帝元孫子嬰為皇帝年二歳嬰立三年為莽所廢後漢明帝光武第四子光武事具帝王中興門中元二年二月戊戌自皇太子即位章帝明帝第五子永平十八年八月壬子自皇太子即皇帝位和帝章帝第四子章和二年二月壬辰自皇太子即皇帝位殤帝和帝少子元興元年十二月辛未夜即皇帝位時誕育百餘日安帝清河王慶之子初封長安侯延平元年慶始就國鄧太后特詔留帝清河邸八月殤帝晏駕太后與兄車騎將軍鄧隲定策禁中其夜使隲持節以王青盖車迎帝齋於殿中皇太后御崇徳殿百官皆吉服羣臣陪位引拜帝為長安侯皇太后詔曰先帝聖徳淑茂早棄天下朕奉皇帝夙夜瞻仰日月星辰兾望成就豈意率然顛沛天年不遂悲痛斷心朕惟平原王素被痼疾念宗廟之重思繼嗣之統唯長安侯祐質性忠孝小心翼翼能通詩論篤學樂古仁惠愛下年已十三有成人之志親徳係後者莫宜于祐禮昆弟之子猶巳子春秋之義為人後者為之子不以父命辭王父命其以祐為孝和皇帝嗣奉承祖宗案禮儀奏又作策命曰惟延平元年秋七月癸丒皇太后曰咨長安侯祐孝和皇帝懿徳巍巍光於四海大行皇帝不永天年朕惟侯孝章帝世嫡皇孫謙恭慈順在孺而勤宜奉郊廟統承大業今以侯嗣孝和皇帝後其審君漢國允執其中一人有慶兆民頼之皇帝其勉之哉讀册畢太尉奉上璽綬即皇帝位年十三太后猶臨朝永初三年正月庚子皇帝加元服北鄉侯章帝孫濟北惠王夀之子安帝延光四年二月太后兄大鴻臚閻顯為車騎將軍定策禁中立之乙酉即皇帝位順帝安帝之子母李氏為閻皇后所害永寧元年立為皇太子延光三年安帝乳母王聖大長秋江京中常侍樊豐譖太子乳母王男厨監邴吉殺之太子數為歎息王聖等懼有後禍遂與豐京共搆陷太子太子坐廢為濟隂王明年三月安帝晏駕北鄉侯立濟隂王以廢出不得上殿親臨梓宫悲號不食内外羣僚莫不哀之及北鄉侯薨車騎將軍閻顯及江京與中常侍劉安陳達等白太后秘不發喪而更徵立諸侯國王子乃閉宫屯兵自守十一月丁巳京師及郡國十六地震是夜中黄門孫程等十九人共斬江京劉安陳達等迎濟隂王於徳陽殿西鐘下即皇帝位年十一近臣尚書以下從輦到南宫登雲臺召百官尚書令劉光等奏言孝安皇帝聖徳明茂早棄天下陛下正統當奉宗廟而姦臣交搆遂令陛下龍潛藩國羣僚逺近莫不失望天命有常北鄉不永漢徳盛明福祚孔彰近臣建策左右扶翼内外同心稽合神明陛下踐祚奉遵鴻緒為郊廟主承續祖宗無窮之烈上當天心下厭民望而即位倉卒典章多缺請條案禮儀分别具奏制曰可乃召公卿百僚使虎賁羽林士屯南北諸門閻顯兄弟聞帝立率兵入北宫尚書郭鎮與交鋒刅遂斬顯弟衛尉景戊午遣使者入省奪得璽綬乃幸嘉徳殿遣侍御史持節收閻顯及其弟城門校尉耀執金吾晏竝下獄誅冲帝順帝之子建康元年八月庚午自皇太子即皇帝位年二歳質帝章帝𤣥孫渤海王鴻之子永嘉元年正月冲帝晏駕太尉李固以清河王蒜年長有徳欲立之謂大將軍梁冀曰今當立帝宜擇長年髙明有徳任親政事者願将軍審詳大計察周霍之立文宣戒鄧閻之利幼弱冀不從乃立帝年八歳桓帝章帝曽孫蠡吾侯翼之子襲爵為侯本初元年梁太后徵帝到夏門亭將妻以女弟㑹質帝晏駕太后遂與兄大将軍冀定策禁中閏月庚寅使冀持節以王青盖車迎帝入南宫丁丒封建平侯其日即皇帝位年十五初李固議立嗣因引司徒胡廣司空趙戒先與冀書曰天下不幸乃遭大憂皇太后聖徳當朝統攝萬機明將軍體位忠孝憂存社稷而頻年之間國祚三絶今當立帝天下重器誠知太后垂心將軍勞慮詳擇其人務存聖明然愚情眷眷竊獨有懷逺尋先世廢立舊儀近見國家踐祚前事未嘗不詢訪公卿廣求羣議令上應天心下合衆望且永初以來政事多謬地震宫廟彗星竟天誠是將軍用情之日𫝊曰以天下與人易為天下得人難昔昌邑之立昏亂日滋霍光憂媿發憤悔之折骨自非博陸忠勇延年英發大漢之祀㡬将傾矣至憂至懼可不熟慮悠悠萬事唯此為大國之興衰在此一舉冀得書乃召三公中二千石列侯大議所立固廣戒及大鴻臚杜喬皆以為清河王蒜明徳著聞又屬最尊親宜立為嗣先是蠡吾侯志嘗取冀妹時在京師冀欲立之衆論既異憤憤不得志而未有以相奪中常侍曹騰等聞而夜往說冀曰將軍累世有椒房之親乗攝萬機賔客縱横多有過差清河王嚴明若果立則將軍受禍不久矣不若立蠡吾侯富貴可長保也冀然其言明日重㑹公卿冀意氣恼恼而言辭激切自胡廣趙戒以下莫不懾憚之皆曰惟大将軍命而固獨與杜喬堅守本議冀厲聲曰罷㑹固意既不從猶望衆心可立復議以書勸冀愈激冀乃說太后先策免固竟立蠡吾侯是為桓帝靈帝章帝孫解瀆亭侯萇之子襲侯爵永康元年十二月桓帝晏駕無子皇太后與父城門校尉竇武定策禁中使守光禄大夫劉儵持節将左右羽林至河間奉迎明年正月己亥帝到夏門亭竇武持節以王青盖車迎入殿中庚子即皇帝位年十二改元建寧元年四年春正月甲子帝加元服𢎞農王辨靈帝子中平六年四月戊午即皇帝位初靈帝何皇后生皇子辨王貴人生皇子協即獻帝也羣臣請帝立太子帝以辨輕佻無威儀不可為人主然皇后有寵兄進又居重權故久不決至是帝疾篤屬協於上軍校尉蹇碩碩既受遺詔且素輕忌於進兄弟及帝晏駕碩時在内欲先誅進而立協及進從外入碩司馬播隠與進有舊迎而目之進驚馳從他道歸營引兵入屯北郡邸因稱疾不入碩謀不行皇子辨乃即位年十七八月為董卓所廢獻帝靈帝中子中平六年九月甲戌司空董卓廢𢎞農王立帝年九歳興平元年正月甲子帝加元服魏明帝文帝太子黄初二年為齊公三年為平原王以其母誅故未建為嗣七年五月文帝疾篤乃立為皇太子丁巳即皇帝位齊王明帝養子初帝無子養王及秦王詢宫省事秘莫有知其所繇來者青龍三年封為齊王景初三年正月丁亥朔帝病甚乃立為皇太子是日即皇帝位大赦秋七月始親臨聽公卿奏事正始四年正月帝加元服髙貴鄉公文帝孫東海定王霖之子正始五年封剡縣髙貴鄉公嘉平五年九月齊王廢公卿議迎立公十月己丒公至于𤣥武館羣臣奏請舍前殿公以先帝舊處避止西廂羣臣又請以法駕迎公不聽庚寅公入于雒陽羣臣迎拜西掖門南公下輿將答拜儐者請曰儀不拜公曰吾人臣也遂答拜至止車門下輿左右曰舊乗輿入公曰吾被皇太后徵未知所為遂步至太極東堂見于太后其日即皇帝位於太極前殿百寮陪位者欣欣焉陳留王武帝孫燕王宇之子甘露三年封安次縣常道鄉公五年五月髙貴鄉公為成濟所弑公卿議迎立公六月甲寅入于雒陽見皇太后是日即皇帝位於太極前殿册府元龜卷九
