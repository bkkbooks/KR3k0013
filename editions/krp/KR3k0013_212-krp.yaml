body:
  text: 册府元龜卷二百十二宋王欽若等撰閏位部招諌納諫聼諫推誠招諫古之令王曷嘗不謀及黄髪詢于蒭蕘晝日以詢問命官而箴闕然後臻夫治也自大運中否羣雄擅命𤓰剖鼎峙分覇區域吳蜀而下逮乎朱梁或克己悔過疇咨善訓或災謫著見樂聞過咎或遵述古道以廣言路或延訪幽逺以詢闕政莫不發明詔布徳音勤勤懇懇而敷求讜議者已若乃納諌有如流之速從善有轉規之易斯固彌縫其闕馴致於道其如聞義不徙垂之空言者亦可恧歟吳大帝權初信任校事吕壹壹後姦罪發露伏誅帝引咎責躬乃使中書郎袁禮告謝諸大將因問時事所當損益禮還復有詔責數諸葛瑾歩隲朱然吕岱等曰袁禮還云與子瑜諸葛瑾字子山歩隲字義封朱然字定公吕岱字相見並以時事當有所先後各自以不掌民事不肯便有所陳悉推之伯言孫遜字承明潘濬字伯言承明見禮泣涕懇惻辭㫖辛苦至乃懐執危怖有不自安之心聞此悵然深自刻恠何者夫惟聖人能無過行明者能自見耳人之舉措何能悉中獨當已有以傷拒衆意忽不自覺故諸君有嫌難耳不爾何縁乃至於此乎自孤興軍五十年所役賦凡百皆出於民天下未定孽類猶存士民勤苦誠所貫知然勞百姓事不得已與諸君從事自少至長髮有二色以謂表裏足以明露公私分計足用相保盡言直諌所望諸君拾遺補闕孤亦望之昔衞武公年過志壮勤求輔弼每獨歎責且布衣韋帶相與交結分成好合尚汚垢不異今日諸君與孤從事雖君臣義存猶謂骨肉不復是過榮福喜戚相與共之忠不匿情智無遺計事統是非諸君豈得從容而已哉同船濟水将誰與易齊桓公諸侯之覇者耳有善管子未嘗不歎有過未嘗不諌諌而不得終諌不止今孤自省無桓公之徳而諸君諌諍未出於口仍執嫌難以此言之孤於齊桓良優未知諸君於管子何如耳乆不相見因事當笑共定大業整齊天下當復有誰凡百事要所當損益樂聞異計救所不逮赤烏十一年二月地仍震詔羣僚各厲精思朕過失無有所諱宋文帝元嘉五年詔曰朕承洪業臨饗四海風化未𢎞治道多昧求之人事鑒寢惟憂加頃隂陽違序旱疫成患仰惟災戒責深在予思所以側身克念讞獄詳刑上答天譴下恤民瘼羣后百司其各獻讜言指陳得失勿有所諱孝武帝即位詔曰世道未夷惟憂在國夫使羣善畢舉固非一才所議况以寡徳属衰薄之期夙宵寅想永懐待旦王公卿士凡有嘉謀善政可以移風訓俗咸逹乃誠無或依隠明帝㤗始二年詔曰夫秉機詢政立教之攸本舉賢聘逸𢎞化之所基故負鼎進䇿殷代以康釋釣作輔周祚斯乂朕甫承大業訓道未敷雖側忠規竚夢巖築而良圖莫薦竒士弗聞永鑒通古無忘宵寢今藩隅克晏敷化維始屢懐存治寔望箴闕王公卿士羣僚庶官其有嘉謀直獻捄俗濟時咸切事陳奏無或依隠南齊太祖建元三年詔曰王公卿士薦讜言武帝永明元年詔内外羣僚各舉朕違肆心規諌鬱林王隆昌元年正月詔百僚極諌得失明帝建武二年詔王公卿士内外羣僚各舉朕違肆心極諌東昏侯永元三年正月詔百官陳讜言梁武帝天監元年即位詔曰商俗甫移遺風尚熾下不上逹繇來逺矣升中馭索増其懔然可於公車府謗木肺石旁各置一函若肉食莫言山阿欲有横議投謗木函若從我江漢功在可䇿犀兕徒弊龍蛇方懸其次身髙才妙擯壓莫通懐傳吕之術抱屈賈之嘆理有皦然受困包匭夫大政侵小豪門陵賤四民已窮九重莫逹若欲自申並可投肺石函六年正月詔曰徑寸之寳或隠沙泥以人廢言君子斯戒朕聼朝宴罷思闡政術雖百辟卿士有懐必聞而蓄響幽遐未臻魏闕或屈以貧陋或間以山川頓足延首無因奏逹豈所謂浮沉靡漏逺近兼得者乎四方士民若有欲陳言刑政益國利民淪礙幽逺不能自通者可各詮條布懐於刺史二千石有可申採大小以聞十年七月詔曰昔公卿面陳載在前史令僕陛奏列代明文所以釐彼庶績成茲羣務晉氏陵替虗誕為風自此相因其失彌逺遂使武帳空勞無汲公之奏丹墀徒闢闕鄭生之履三槐八座殆有務之官宜有所論可入陳啓庶藉周爰少裨寡薄普通三年五月赦詔公卿百僚各上封事大同二年三月詔曰政在養民徳存被物上令如風民應如草朕以寡徳運屬時來撥亂反正倐焉三紀不能使重門不閉守在海外疆塲多阻車書未一民疲轉輸士勞邉防徹田爲糧未得頓止治道不明政用多僻百辟無沃心之言四聰闕飛耳之聼州輟刺舉郡忘共治致使失理負謗無由聞逹侮文弄法因事生姦胏石空陳懸鍾徒設書不云乎股肱惟人良臣惟聖寔頼賢佐救其不及凡厥在朝各獻讜言政治不便於民者可悉陳之若在四逺刺史二千石長吏並以奏聞細民有言事者咸為申達朕将親鍳以舒其過文武在位舉爾所知公侯将相隨才擢用拾遺補闕勿有所隠陳後主太建十四年二月詔曰昔睿后宰民哲王御㝢雖徳稱汪濊明能普燭猶復虗已乞言䧏情訪道髙咨嶽牧下聽輿䑓故能政若神明事無悔吝朕纂承丕緒思隆大業嘗懼九重已邃四聰未廣欲聽昌言不疲痺足若逢廷折無憚批鱗而口柔之辭儻聞於在位腹誹之意或隠於具僚非所以𢎞理至公緝熈帝載者也内外卿士文武衆司若智周政術心練治體救民俗之疾苦辨禁網之疎密者各進忠讜無所隠諱朕将虚已聽受擇善而行庶深鍳物情貞我王度至徳四年正月詔曰堯施諫皷禹拜昌言求之異等乆著前册舉以淹滯復聞昔典斯乃治道之深規帝王之切務朕以寡昧丕承鴻緒未明虚已日旰興懐萬機多紊四聰弗逹思聞謇諤採其謀略王公以下各薦所知傍詢管庫爰及輿皂一介有能片言可用朕親加聽覽俾茲啓沃北齊文宣帝即位詔曰有能直言正諫不避罪辜謇謇若朱雲諤諤若周舎開朕意沃朕心弼予一人利兼百姓者必當寵以榮禄待以不次孝昭帝即位詔謇正之士並聽進見陳事梁太祖乾化元年正月朔日有食之庚寅制曰兩漢已來日蝕地震百官各上封事指陳得失盖欲周知時病盡逹物情用緝國章以奉天誡朕毎思逆耳罔忌觸鱗将洽政經庶開言路况茲謫見當有咎徴其在列辟羣臣危言正諌極萬邦之利害致六合之殷昌毗予一人永建皇極二年詔曰謗木求規集囊貢事将裨理道豈限側言應内外文武百官及草澤並許上封事極言得失納諫書曰惟木從繩則正后從諫則聖則知君以虗受為徳臣以盡節為忠有國之謀猷立身之模範何莫繇斯者也觀夫閏位之君容納直言信用正諫或有寵而必棄或臨事而不行或營構而休工或畋遊而罷意得順流轉規之㫖獲享國永年之運垂於世也不亦羙乎秦始皇為秦王九年齊人茅焦說秦王曰秦方以天下為事而大王有遷母太后之名恐諸侯聞之繇此背秦也秦王乃迎太后於雍而入咸陽説苑曰秦始皇立茅焦為傅又爵之上卿太后大喜曰天下元直使敗復成安秦社稷使妾母子相見者茅焦之力也後居甘泉宫咸陽宫西宫也吴大帝以建安二十年征合肥率輕騎将往突敵長史張紘諫曰此乃偏将之任願抑賁育之勇懐覇王之計帝納紘言而止明年将復出軍紘又諫於是遂止不行薛綜為尚書僕射嘉禾中公孫淵䧏吴而復叛帝盛怒欲自親征綜上疏諫時羣臣多諫帝遂不行又選曹尚書陸瑁上疏諫帝覧瑁書嘉其詞理端切遂不行又大将軍陸遜上疏諫帝納用焉張休為右弼都尉帝常遊獵迨暮乃歸休上疏諫戒帝大善之潘濬為少府帝數射雉濬諫帝曰相與别後時或蹔出耳不復如徃日之數也濬曰天下未定萬機務多射雉非急弦絶括破皆能為害乞特為臣故息置之濬出見雉翳故在乃手自撤壊之帝由是自絶不復射雉劉基為大司農帝歡宴之末自起行酒虞翻伏地陽醉帝去翻起坐帝於是大怒手劍欲擊之時坐者莫不遑遽唯基起抱帝諫曰大王以三爵後殺善士雖翻有罪天下孰知之帝曰曹孟徳尚殺孔文舉孤於虞翻何有哉基曰孟徳輕害士人天下非之今大王躬行徳義欲與堯舜比隆何自喻於彼乎翻由是得免帝因勅左右自今酒後言殺者皆不得殺宋髙祖初平關中得姚興從女有盛寵以之廢事謝誨諫即時遣出文帝時雍州刺史張邵以黷貨下廷尉将致大辟左衞将軍謝述上表陳邵先朝舊勲宜蒙優貸帝手詔酬納焉述語子綜曰主上矜邵夙誠特加曲恕吾所啟謬㑹故特見酬納耳若此迹宣布則為侵奪主恩不可之大者也使綜對前焚之太祖後謂邵曰卿之獲免謝述有力焉何尚之為尚書右僕射時文帝行幸還多侵夕尚之表諫優詔納之南齊太祖建元初王僧䖍為丹陽尹郡縣獄相承有上湯去聲殺囚僧䖍上疏言之帝納其言武帝幸方山曰朕經始此山之南復為離宫之所故應有邁靈丘靈丘者山湖新林苑也太子詹事徐孝嗣答曰繞黄山欵牛首乃盛漢之事今江南未廣民亦勞止願陛下少更留神帝竟無所修立竟陵王子良永明末武帝将射雉子良上書諌雖不盡納而深見寵愛梁髙祖初為梁公納齊東昏侯余妃頗妨政事侍中范雲常以為言未之納也後與范雲同入卧内雲又諫曰昔漢髙祖居山東貪財好色及入關定秦財帛無所取婦女無所幸范増以為其志大故也今明公始定天下海内想望風聲奈何襲昬亂之蹤以女德為累王茂因起拜曰范雲言是公必以天下為念無宜留惜髙祖黙然雲便疏令以余氏賚茂髙祖賢其意而許之明日賜雲茂錢各百萬及在位敦睦九族優待朝士有犯罪者皆諷羣下屈法申之百姓有罪皆案之以法縁坐則老幼不免一人亡逃則舉家質作人既窮急姦宄益深後帝親祠南郊秣陵老人遮帝曰陛下為法急於黎庶緩於權貴非長乆之術誠能反是天下幸甚於是思有以寛之江子四為尚書右丞大同二年上封事極言治政得失髙祖詔曰古人有言屋漏在上知之在下朕所種過不能自覺江子四等封事詔尚書可時加檢校於有蠧患者便即勒停宜速詳啓勿致淹緩北齊孝昭帝每訪問左右冀獲直言曾問舍人裴澤在外議論得失澤率爾對曰陛下聰明至公自可逺侔古昔而有識之士咸言傷細帝王之度頗為未𢎞帝笑曰誠如卿言朕初臨萬机慮不周悉故致爾耳此事安可久行恐後又疎漏澤因被寵遇其樂聞過如此趙郡王濬小名湏拔與厙狄顯安侍坐於孝昭帝帝曰湏拔我同堂弟顯安我親姑子今序家人禮除君臣之敬可言我之不逮顯安曰陛下多妄言曰若何對曰陛下昔見文宣以馬鞭撻人常以為非而今行之非妄言邪帝握其手謝之又使直言對曰陛下太細天子更似吏帝曰朕其知之然無法來乆将整之以至無爲耳又問王晞晞答如顯安皆從容受納王晞為太子太傅孝昭帝斬人於前問晞曰此人合死不晞曰罪實合死但恨其不得死地臣聞刑人於市與衆棄之殿廷非殺戮之所帝改容曰自今當為王公改之武成帝先患氣因飲輙大發動右僕射和士開每諫不從屬帝氣疾發又欲飲士開淚下􅒣欷不能言帝曰卿此是不言之諌因不復飲聽納傳曰從善如登書曰有言逆於汝心必求諸道斯亦君人者聽納之難也自咸秦以迄江表逮於北齊莫不㨿萬乗之勢居兆民之上兵力雄盛威權獨運亦能垂采嘉謨延納讜議講求䇿略優容亮直已然之失改而不吝惟機之務謀無過舉用能克濟於勲業惟和於政典通下情而無壅熈百志而咸乂雖芻蕘之㣲咸獻其說在牧圉之賤並竭其誠而况於在廷師師之臣在位濟濟之士孰不盡忠而効智哉秦李斯初入秦拜為客卿㑹韓人鄭國來間秦以作涇溉渠已而覺秦宗室大臣皆言秦王曰諸侯人來事秦者大抵為其主游說間於秦耳請一切逐客李斯亦在逐中乃上書秦王乃除逐客之令吳大帝初為吳侯建安五年立十三年九月曹公入荆州劉琮舉衆降曹公得其水軍船歩兵數十萬将士聞之皆恐帝延見羣下問以計䇿議者咸曰曹公豺虎也然託名漢相挾天子以征四方動以朝廷為辭今日拒之事更不順且将軍大勢可以拒操者長江也今操得荆州奄有其地劉表治水軍䝉衝鬭艦乃以千數操悉浮以㳂江兼有歩兵水陸齊下此為長江之險已與我共之矣而勢力衆寡又不可論愚謂大計不如迎之周瑜曰不然操雖託名漢相其實漢賊也将軍以神武雄才兼仗父兄之烈割㨿江東地方數千里兵精足用英雄樂業尚當横行天下為漢家除殘去穢况操自送死而可迎之邪請為将軍籌之今使北土已安操無内憂能曠日持乆來爭疆塲又能與我交勝負於船楫可乎今北土既未平安加馬超韓遂尚在關西為操後患且舍鞍馬仗舟楫與吴越爭衡本非中國所長又今盛寒馬無槀草驅中國士衆逺渉江湖之間不習水土必生疾病此數四者用兵之患也而操皆冐行之将軍禽操宜在今日瑜請得精兵三萬人進住夏口保為将軍破之帝曰老賊欲廢漢自立乆矣徒忌二袁吕布劉表與孤耳今數雄已㓕惟孤尚存孤與老賊勢不兩立君言當擊甚與孤合此天以君受孤也帝拔刀砍前奏案曰諸将吏敢復有言當迎操者與此案同及㑹罷之夜瑜請見曰諸人徒見操書言水歩八十萬而各恐懼不復料其虚實便開此議甚無謂也今以實較之彼所将中國人不過十五六萬且軍已乆疲所得表衆亦極七八萬耳尚懐狐疑夫以疲病之卒御狐疑之衆數雖甚多未足畏得精兵五萬自足制之願将軍勿慮帝撫背曰公瑾卿言至此甚合孤心子布文表諸人各顧妻子挾持私慮深失所望獨卿與子敬耳卿與子敬程公便在前發孤當續發人衆多載資糧為卿後援卿能辯之者誠决邂逅不如意便還就孤孤當與孟徳决之後遂破曹公於赤壁陸遜為将時荆州士人新還仕進或未得所遜上疏曰昔漢髙受命招延英異光武中興羣俊畢至茍可以熈隆道教者來必逺近今荆州始定人物未逹臣愚慺慺乞普加覆載抽拔之恩令並獲自進然後四海延頸思歸大化帝敬納其言甘寜為周瑜吕䝉所薦逹於帝帝加異同於舊臣寜陳計曰今漢祚日㣲曹操彌憍終為簒盗南荆之地山陵形便江川流通誠是國之西勢也寜已觀劉表慮既不逺兒子又劣非能承業傳基者也至尊當早規之不可後操圖之圖之之計宜先取黄祖祖今年老昬耄已甚財榖並乏左右欺弄務於貨利侵求吏士吏士心怨舟船戰具頓廢不修怠於耕戍軍無法伍至尊今徃其破可必一破祖軍鼓行而西西㨿楚關大勢彌廣即可漸規巴蜀帝深納之吕䝉拜右䕶軍虎威将軍魯肅卒䝉西屯陸口肅軍馬萬餘盡以屬䝉與關羽分上接境知羽驍雄有并兼心且居國上流其勢難乆初魯肅等以為曹公尚存禍難始搆宜相輔恊與之同仇不可失也䝉乃宻陳計䇿曰今征虜守南郡潘璋住白帝蒋欽将游兵萬人循江上下應敵所在䝉為國家前據㐮陽如此何憂於操何頼於羽且羽君臣矜其詐力所在反覆不可以腹心待也今羽所以未便東向者以至尊聖明䝉等尚存也今不於彊壮時圖之一旦僵仆欲復陳力其可得邪帝深納其䇿又聊復與論取徐州意䝉對曰今操逺在河北新破諸袁撫集幽冀未暇東顧徐土守兵聞不足言徃自可克然地勢陸通驍騎所騁至尊今日得徐州操後旬必来爭雖以七八萬人守之猶當懐憂不如取羽全㨿長江形勢益張帝尤以此言為當䝉竟襲破羽張梁為揚武中郎将領江夏太守孫奐裨将帝在武昌欲還都建業而慮水道泝流二千里一旦有警不相赴及以此懐疑及至夏口於塢中大㑹百官議之詔曰諸将吏勿拘位任其有計者為國言之諸将或陳宜立栅夏口或言宜重設鐡鎻者帝皆以為非計時梁為小将未有知名乃越席而進曰臣聞香餌引泉魚重幣購勇士今宜明樹賞罰之信遣将入沔與敵爭利形勢既成彼不敢干也使武昌有精兵萬人付智畧者任将常使嚴整一旦有警應聲相赴作甘水城輕艦數十諸所宜用皆使備具如此開門延敵敵自不來矣帝以梁計為最得即超增梁位後稍以功進至沔中督宋武帝聞咸陽淪沒欲復北伐從事中郎謝晦諫以士馬疲怠乃止南齊太祖初徴顧歡為揚州主簿歡至穪山谷臣上表曰臣聞舉網提綱振裘持領綱領既理毛目自張然則道徳綱也物勢目也上理其綱則萬機時序下張其目則庶官不曠是以湯武得勢師道則祚延秦項忽道任勢則身戮夫天門開闔自古有之四氣相新絺裘代進今火澤易位三靈改憲天樹明徳對時育物搜揚仄陋野無伏言是以窮谷愚夫敢露偏管謹删撰老氏獻治綱一卷伏願稽古百王斟酌時用不以蒭蕘棄言不以人㣲廢道率土之賜也㣲臣之幸也幸賜一覽則上下交泰雖不求民而民恱不祈天而天應應天恱民則皇基固矣臣志盡幽深無與榮勢自足雲霞不湏禄養陛下既逺見尋求敢不盡言言既盡矣請從此退時員外郎散騎劉思效又表陳讜言曰宋自大明已來漸見彫弊徴賦有増於徃天府尤貧於昔兼軍警屢興傷夷不復戍役殘丁儲無半菽小民嗷嗷無樂生之色貴勢之流貨室之族陳服伎樂爭相奢麗亭池第宅競趣髙華至於山澤之人不敢採飲其水草貧富相輝損源尚未陛下宜發明詔吐徳音布恵澤禁邪偽薄賦歛省徭役絶竒麗之賂塞鄭衞之倡變歴運之化應質文之用不亦大哉又彭汴有鴟梟之巢青丘為狐兎之窟虐害踰紀殘暴日滋鬼泣舊泉人悲故壌童孺視編髮而慚生耆老看左袵而耻沒陛下宜仰答天人引領之望下弔沉黎傾首之勤授鉞衞霍之将遺䇿蕭張之師萬道俱前窮山蕩谷此即常山不足指而傾渤海不足飲而竭豈徒殘宼塵㓕而已哉帝詔曰朕夙夜惟寅思𢎞治道紓夢巖濱垂精管庫旰食縈懐其勤至矣吳郡顧歡散騎郎劉思效或至自丘園或越在冗位並能獻書金門薦辭鳳闕辨彰治體有恊朕心今出鎮外可詳擇所宜以時敷奏歡近已加旌賁思效可付選銓序以顯讜言劉繪為南康相郡事之暇專意講説太祖左右陳洪請假南還問繪在郡何以既而聞之曰南康是三州喉舌應湏治幹豈可以年少講學處之邪徴還為安陸王䕶軍司馬劉善明太祖初為淮南宣城二郡太守陳事十一條又諫起宣陽門表陳宜明守宰賞罰立學校制齋祀廣開賓舘以接荒民帝答曰具卿忠讜之懐夫賞罰以懲守宰餙舘以待遐荒皆古之善政吾所宜勉更撰齋祀或非易制國學之羙已勑公卿宣陽門今勅停寡徳多闕思復有聞明帝即位諮議参軍張忻㤗上書陳便宜二十條其一條言宜毁廢塔寺帝並優詔報答梁髙祖時朱异詣都上書言建康宜置獄司比廷尉勑付上書詳議從之舊制年二十五方得釋褐時异適二十一特勑擢為揚州議曹從事史鍾嶸南齊永元末除司徒行參軍天監初制度雖革而日不暇給嶸乃言曰永元肇亂坐弄天爵勲非即戎官以賄就揮一金而取九列寄片札以招六校騎都塞市郎将填街服既纓組尚為臧獲之事職惟黄散猶躬胥徒之役名實淆紊茲焉莫甚臣愚謂永元諸軍官是素族士人自有清貫而因斯受爵一宜削除以懲僥倖若吏姓寒人聽其門品不當因軍遂濫清級若僑雜傖楚應在綏撫正宜嚴㫁禄力絶其妨正直乞虗號而已謹竭愚忠不恤衆口勑付尚書行之北齊神武時髙仲宻之叛神武知其繇崔暹将殺之文襄匿暹為之請神武曰我為爾不殺然湏與苦手文襄出暹而謂陳元康曰暹若得杖不湏見我及暹見神武将觧衣受罰元康趣入止之因歴階升曰王方以天下付世子有一崔暹不能免其杖父子尚爾况世間人邪神武意觧曰不繇元康崔暹得一百乃捨之陽休之為度支尚書孝昭帝留心政道每訪休之治術休之答以明賞罰慎官方禁滛侈恤民患為致治之先帝深納之推誠夫知人則哲蓋王者之攸難任賢勿貳乃臨下之懿範所以當開創之期濟經綸之業自非開寛明之懐納義烈之士察其心腑鍳彼邪正則何以聞䜛間之辭不以介意觧就擒之虜咨以良䇿得訛言而撫慰用逆黨之才能蓋上能以誠信而自持下則感待遇之過望為之禦侮罔避艱難雖不能混一區宇大庇蒼黔而君臣之際亦可詠矣蜀先主初見諸葛亮與亮情好日密關羽張飛等不恱先主觧之曰孤有孔明猶魚之有水也願諸君勿復言羽飛乃止關羽河東觧人亡命奔涿郡先主於鄉里合徒衆羽與張飛為之禦侮先主為平原相以羽飛為别部司馬分統部曲先主與二人寝則同牀恩若兄弟而稠人廣坐侍立終日隨先主周旋不避艱難吳孫䇿與太史慈戰於神亭慈敗為䇿所執䇿素聞其名即觧縳請見咨問進取之術慈答曰破軍之将不足與論事䇿曰昔韓信定計於廣武今䇿决疑於仁者君何辭焉慈曰州軍新破士卒離心若儻分散難復合聚欲出宣恩安集恐不合尊意䇿長跪答曰誠本心所望也䇿又謂慈曰聞卿昔為太守刼州章赴文舉詣𤣥徳皆有烈義天下智士也但所託未得其人耳射鈎斬袪古人不嫌孤是卿知己勿憂不如意也出教曰龍欲騰翥先階尺水者也䇿又曰劉牧徃責吾為袁氏攻廬江其意頗猥理恕不足何者先君手下兵數千餘人盡在公路許孤志在立事不得不屈意於公路求索故兵再徃纔得千餘人耳仍令孤攻廬江爾時事勢不得不為行但其後不遵臣節自棄作邪僭事諫之不從丈夫義交茍有大故不得不離孤交求公路及絶之本末如此今劉繇䘮亡恨不及其生時與共論辨今兒子豫章不知華子魚待遇何如其故部曲復依隨之否卿則州人昔又從事寕能徃視其兒子並宣孤意於其部曲部曲樂來便與俱來不樂來者且安慰之並觀察子魚所以牧禦方規何似廬陵鄱陽人民親附之否卿手下兵宜将多少自繇意慈曰慈有不赦之罪将軍量同桓文待遇過望古人報生以死期於盡節沒而後已今並息兵兵不宜多将數十人自足以徃還也䇿曰明日中望君來還諸将皆疑䇿曰太史子義子義慈字青州名士以信義為先終不欺䇿明日大請諸将預設酒食立竿視影日中而慈至張昭為孫䇿長史撫軍中郎将昭每得北齊士大夫書疏専歸羙於昭昭欲嘿而不宣則懼有私宣之則恐非宜進退不安䇿聞之嘆笑曰昔管子相齊一則仲父二則仲父而桓公為覇者宗今子布賢我能用之其功名獨不在我乎大帝以張紘為㑹稽東部都尉遣之部或以紘本受北任嫌其志趣不止於此帝不以介意宋髙祖以太子詹事中書令傳亮任總國權聽於省見客神虎門外每旦車常數百輛劉粹毅族兄也粹盡心髙祖不與毅同髙祖欲謀毅衆並疑粹在夏口髙祖屢信之及大軍至粹竭其誠力事平封灄縣男食邑五百户孝武帝時王𤣥謨嘗討南郡王義宣人言𤣥謨在梁山與義宣通謀帝不能明後為雍州刺史聞訛言𤣥謨欲反帝知其虗馳使撫慰之又曰梁山風塵初不介意君臣之際過足相保聊復為笑伸卿眉頭𤣥謨性嚴未嘗妄笑人言𤣥謨眉頭未曾伸故帝以此戲之南齊太祖初鎮淮隂為宋帝所疑遺書結青州刺史王𤣥邈𤣥邈不相答和及罷州還太祖以經途又要之𤣥邈雖許既而嚴軍直過還都啓帝稱太祖有異謀太祖不恨也昇明中太祖引為驃騎司馬冠軍将軍太山太守𤣥邈甚懼而太祖待之如初陳顯逹為䕶軍将軍太祖即位後御膳不宰牲顯逹上熊烝一盤帝即以充飯梁髙祖初舉義師時馬仙琕為齊寜朔将軍髙祖使其故人姚仲賔說之仙琕於軍斬仲賔以殉義師至新林仙琕猶持兵於江西口抄運建康城䧟仙琕號哭經宿乃解兵歸罪髙祖勞之曰射鈎斬袪昔人弗忘卿勿以戮使㫁運茍自嫌絶也仙琕謝曰小人如失主犬後主飼之便復為用髙祖笑而羙之陳髙祖初為廣州中直兵参軍監江西督䕶梁大同中盧安興為廣州南江督䕶杜僧明與兄天合俱行安興死僧明復副其子子雄子雄討交州土豪李賁不克賜死子雄弟子略子烈與僧明天合周文育同謀攻廣州髙祖時在髙要率衆來討大破之殺天合生禽僧明及文育等髙祖並釋之引為主帥髙祖征交趾討元景仲僧明文育並有功韋載為義興太守髙祖誅王僧辨遣周文育襲載載嬰城自守相持數旬髙祖聞文育軍不利乃自将征之克水栅仍遣載族弟翽齎書喻載以誅王僧辨意并奉梁敬帝勅載得書乃以其衆降于髙祖髙祖厚加撫慰即以翽監義興郡所部将帥並隨才任使引載常置左右與之謀議文帝初為臨川王拒王琳於南皖時荀朗從帝㑹髙祖宴駕宣太后與舍人蔡景歴秘不發䘮朗弟暁在都知之乃謀率其家兵襲䑓事覺景歴殺曉仍繫其兄弟帝即位並釋之因厚撫慰朗令與侯安都共拒王琳琳平遷使持節安北将軍散騎常侍都督霍晉合三州諸軍事三州刺史陸子隆少慷慨有志功名起家東宫直後侯景之亂於郷里聚徒是時張彪為吳郡太守引為将帥彪徙鎮㑹稽子隆隨之及文帝討彪彪将沈泰吳寳真申縉等皆䧏而子隆力戰敗績文帝義之復使領其部曲抜為中兵参軍後主末魯廣逹為中領軍隋将韓擒虎之過江也逹長子世真在新蔡乃與其弟世雄及所部奔擒虎遣使致書以招廣逹廣逹時屯兵京師乃自劾廷尉請罪後主謂之曰世真雖異路中大夫公國之重臣吾所恃頼豈得自同嫌疑之間手賜黄金即日還營北齊神武為東魏丞相孝静帝興和中髙季式鎮永安戍髙慎以武牢叛遣信報季式季式得書驚懼即狼狽奔告神武神武信其至誠待之如舊文㐮帝輔政時清河王岳初與神武經綸天下家有私兵并蓄戎器儲甲千餘領至是岳以四海無事表納之帝敦至親之重推心相任云叔屬居肺腑職在維城所有之甲本資國用叔何疑而納之文宣之世亦頓請納又固不許册府元龜卷二百十二
