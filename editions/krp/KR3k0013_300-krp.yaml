  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_300-1a}
body:
  text: 冊府元龜卷三百宋王欽若等撰外戚部總序夫帝王之臨御區宇賢戚並用莫不有外親之助焉故后之父母列於三恪異姓伯叔紀於春秋築外館者異其禮章褒元舅者垂於雅什母妻有黨所以叙於人倫姻婭相謂于以垂於古訓而况席九五之勢當司牧之重内既本乎敦叙外亦資其左右太史公稱秦以前略矣靡得而紀焉漢氏之始非有功不侯中葉之後率用推恩之典封爵之數優被外屬班固作表以志其事東漢之世國紀數絶六后稱制委事父兄並居權要極其貴寵鼎國典午洎乎南北以迄於五代莫不因緣宫掖列居爵位其有總鈞樞之重握兵戎之政内侍帷幄參預謀議外臨征鎮式遏方面命數崇大寄任隆異藉親昵之要當倚屬之重富貴既極驕侈不期而自臻名勢既雄中外嚮風而胥附其或躬明哲之美秉謙抑之操深懐兢愓以戒乎泰盛動守清素以革乎侈心含忠履潔特表乎純亮折節下士姑務於延納敦尚儒術擅稽古之稱周旋諌諍厲匪躬之節以引翼為己任而薦用賢能以雍睦治家庭而綏和宗黨望實兼著操行特出以至内使寅亮之績而紀律用彰參議小大之務而謀猷允恊外宣保障之效而民夷是賴克揚威武之烈而勲庸以立名在載籍事先表聴其或貪墨無已陸梁自恣窮豪縱而無檢恃驕肆而弗恭殘賊忠賢懐蓄奸詐小則被譴譲之恥大則致夷滅之咎禍福之至召之惟人吉㓙之報發乎所履豈謬也哉漢制以列侯尚公主魏晉之尚主者皆拜駙馬都尉歴代遵之其淑慝之跡咸附於此凡外戚部二十有三門選尚昔者堯以二女嬪于虞周以太姬配胡公盖王姬之下嫁由古道也秦漢而降以選尚為重義取於承配勢極於崇盛曷嘗不慎擇世胄參求雋望或舊勛之族隆象賢之美或貴戚之懿篤因親之好自魏晉之後著之班籍預國婚之選者悉加駙馬之拜爵品通貴榮寵兼極自非履謙而思義共泰而處約者亦曷能克終而無咎哉漢張敖趙王耳子也耳薨敖嗣尚高祖長女魯元公主周勝之絳侯勃子也尚文帝女陳午堂邑侯嬰孫也尚文帝女館陶公主嫖曹夀相國參之後嗣平陽侯尚景帝女陽信公主是為平陽主後大將軍衞青既尊貴而壽有惡疾就國公主問列侯誰賢者左右皆言大將軍主笑曰此出吾家常騎從我奈何左右曰於今尊貴無比於是長公主風白皇后皇后言之武帝乃詔青尚平陽主平陽侯所尚故稱平陽主芒侯耏跖孫申尚孝景南宫公主元朔六年申坐與父御婢􅀈罪自殺國除林慮公主子昭平君尚武帝女夷安公主金日磾本匈奴休屠王太子磾音丁奚切休音許虯切屠音儲日磾以父不降見殺與毋閼氏弟倫俱沒入官輸黄門養馬時年十四矣久之武帝遊宴見馬方於宴遊之時而召閲諸馬後宫滿側日磾等數十人牽馬過殿下莫不竊視至日磾不敢磾長八尺二寸容貌甚嚴馬又肥好帝異而問之具以本狀對帝竒焉即日賜湯沐衣冠拜為馬監遷侍中駙馬都尉光祿大夫日磾既親近未嘗有過失薛宣為特進封高陽侯妻死而宣帝女敬武長公主寡居成帝令宣尚焉後漢李通素與光武相約結定謀議更始使通持節還鎮荆州通因娶光武女弟伯姬光武即位徴通為衞尉伯姬封寧平公主鄧晨初娶光武娣元漢兵敗小長安元及三女皆遇害元後追封諡為新野節義公主竇穆融長子也尚内黄公主穆代叔父友為城門校尉竇勲穆子也尚泚陽公主竇固融弟友之子也尚光武女湼陽公主為黄門侍郎梁松為太僕封延陵鄉侯尚光武女舞陽公主義王松統之子其傳云尚光武女舞陽公主又鄧訓傳舞隂公主子梁扈有罪訓與交通此云舞陽誤矣韓光為駙馬都尉尚光武女館陶公主紅夫郭璜況子也為長樂少府封陽安侯尚光武涓陽公主禮劉隂豐新陽侯就子也尚光武酈公主綬綬一作綏馮柱魴子也為將作大匠封陽邑侯尚明帝獲嘉公主姬馮順勤子也為大鴻臚尚明帝平陽公主奴耿襲弇弟舒之子也尚明帝隆慮公主迎迎或作延鄧乾震之子禹之孫也襲封髙宻侯尚明帝沁水公主致鄧蕃為侍中封昌安侯尚明帝平臯公主小姬蕃禹之孫也王度符子霸之孫也為黄門侍郎封軮侯尚明帝浚儀公主仲來稜為黄門侍郎征羌侯褒之世子也尚明帝武安公主惠馮由為黄門侍郎尚章帝平邑公主玉賈建為侍中襲封即墨侯參子膠東侯復之曾孫尚章帝臨潁公主利班始尚順帝姑隂城公主耿良弇𤣥孫一名無禁位至侍中尚濮陽公主來定為虎賁中郎將即歙曾孫厯之子也尚安帝妹平氏公主鄧褒禹之𤣥孫為少府尚舞隂公主耿援弇之孫為河陽太守尚桓帝妹長社公主伏完湛五世孫為輔國將軍封不其侯尚順帝女陽安公主華魏夏侯惇子楙厯位侍中尚書安西鎮東將軍尚太祖女清河公主楙在西時多畜伎妾公主與楙不和何晏進之孫也晏母尹氏為太祖夫人晏長於官省尚太祖女金鄉公主即晏同母妹荀惲彧之長子嗣亭侯官至虎賁中郎將尚太祖女安陽公主初文帝與平原侯植並有擬論文帝曲禮事彧及彧卒惲又與植善而與夏侯尚不穆文帝恨惲惲早卒子甝霬以外甥故猶寵待蜀諸葛喬亮兄瑾之第二子也亮以喬為已適子拜駙馬都尉又亮子瞻年十七尚公主拜駙馬都尉吳周循瑜之子大帝步夫人生二女長曰魯班字大虎次曰魯育字小虎循尚魯班循卒後配衞將軍全琮朱據為建義都尉黄龍元年遷都建業徴據尚公主魯育拜左將軍封雲陽侯主後配劉纂吳歴日纂先尚大帝中女早卒又以小虎為繼室顧邵雍之長子博覽書傳好樂人倫風聲流聞逺近稱之大帝妻以策女朱治子紀大帝以䇿女妻之以校尉領兵朱宣據孫也襲爵雲陽侯尚公主為驃騎將軍陸景抗子也尚毗陵侯公主皓之適妹拜騎都尉滕𦙍少有節操美儀容弱冠尚公主晉任愷少有識量尚魏明帝女齊長公主杜預尚武帝妹高陸公主起家拜尚書郎衞宣司空瓘之第四子也武帝勅宣尚繁昌公主瓘自以諸生之胄婚對微素抗表固辭不許王濟渾之子有當世名尚常山公主年二十起家拜中書郎華恒表孫也博學以清素為稱尚武帝女滎陽長公主拜駙馬都尉臣欽若等日駙馬都尉漢武帝置掌駙馬駙副也非正駕事皆為副馬多以宗室外戚為之至晉乃專拜尚公主者也王粹濬之孫武帝詔粹尚潁川公主粹至拜潁川太守盧湛清敏有思理好老莊善屬文選尚武帝女滎陽公主拜駙馬都尉未成禮而公主卒孫㑹秀之子年二十為射聲挍尉尚惠帝女河東公主㑹形貌短陋初與富室兒於城西牧馬百姓忽聞其尚主莫不駭愕王敦字處仲少有竒人之目尚武帝女襄城公主拜駙馬都尉傅宣祗子也尚𢎞農公主為御史中丞卒羊賁㬅子也尚明帝女南郡公主除祕書郎卒荀羡崧之子年十五將尚尋陽公主羡不欲連婚帝室仍逺遁去監司追不已乃出尚主拜駙馬都尉桓温字元子豪爽有風槩姿貌甚偉選尚南康長公主拜駙馬都尉王獻之字子敬起家州主簿秘書郎轉丞以選尚新安公主劉惔字真長尚明帝女廬陵公主謝混少有才譽善屬文孝武帝為晉陵公主求壻謂王珣曰主壻但如劉真長王子敬便足如王處仲桓元子誠可才小富貴便豫人家事珣對曰謝混雖不及真長不减子敬帝曰此便足混竟尚主宋王偃父嘏尚晉孝武帝女鄱陽公主偃尚高祖第二女吳興長公主王藻位東陽太守尚文帝第六女臨川長公主英媛何瑀尚武帝少女豫章公主謝緯述之第三子尚文帝第五女長城公主趙倩尚武帝第四女海鹽公主禇寂之叔度第二子為著作佐郎尚文帝第六女瑯琊公主徐逹之羡之子也尚高祖長女會稽公主逹之子湛之永初三年亦尚公主徐喬之羡之子也為竟陵王文學尚高祖第六女富陽公主徐孝嗣湛之孫也八歲襲爵枝江縣公孝武甚愛之詔尚帝女康樂公主王僧綽𢎞弟曇首之子年十三文帝引見下拜便流涕哽噎帝亦悲不自勝襲封豫章縣侯尚文帝長女東陽獻公主江恁湛之子尚文帝第九女淮陽長公主拜駙馬都尉江斆恁之子恁為文帝所殺斆㓜以戚屬召見孝武謂謝莊曰此兒方當為名器少有美譽桂陽王休範臨州辟迎主簿不就尚孝武女臨汝公主拜駙馬都尉南齊禇湛之仕宋尚高祖第七女始安哀公主拜駙馬都尉著作郎哀公主薨復尚高祖第五女吳郡宣公主湛之子淵復尚南郡公主姑姪二世相繼拜駙馬都尉何戢偃之子偃之被遇於武帝選戢尚山隂公主拜駙馬都尉徐演孝嗣長子尚武帝女武康公主梁王志司空僧䖍之子弱冠選尚孝武帝女安固公主拜駙馬都尉王亮父攸宋給事黄門侍郎亮以名家子宋末選尚公主拜駙馬都尉秘書郎王瑩光祿大夫懋之子選尚宋臨淮公主拜駙馬都尉何敬容以名家子弱冠選尚武帝女長城公主拜駙馬都尉謝覽朏弟濬之子也選尚錢唐公主拜駙馬都尉王暕齊太尉儉之子年數歳而風神警㧞弱冠選尚淮南長公主拜駙馬都尉殷均父叡為齊鎮北長史武帝與叡少舊故以女妻均即永興公主也天監初拜駙馬都尉謝謨齊吏部郎朓之子尚武帝女永世公主王實丹陽尹王榮少子尚武帝女安吉公主王琳侍中份之子為南平王文學尚義興公主拜駙馬都尉王銓琳之子美風儀尚占鑒尚武帝女永嘉公主拜駙馬都尉王茂璋為給事黄門侍郎尚武帝妹新安公主王溥銓之子尚簡文女餘姚公主張希領軍纉之子選尚簡文第九女海鹽公主張交侍中綰之子頗渉文學選尚簡文第十一女定陽公主袁憲簡文以憲貴遊公子尚帝女南沙公主柳偃吳興太守惲之子年十一詔尚長城公主拜駙馬都尉後梁蔡延壽侍中尚書令大寳子有識博渉經籍尤善當世之務尚宣帝女宣城公主歴中書郎尚書右丞王泛侍中錫之子少有令譽尚宣帝妹廬陵長公主歴秘書郎太子舍人宣城王友廬陵長史帝踐位授侍中吏部尚書陳侯淨藏瑱之子尚世祖第二女冨陽公主以公主除員外散騎常侍錢藏為陳留太守尚高祖長女永世公主柳朌偃之子尚文帝女富陽公主拜駙馬都尉沈君理美風儀博渉有識鑒武帝鎮南徐州深見器重命尚㑹稽長公主蔡凝為太子舍人以名公選尚信儀公主拜駙馬都尉到郁仲舉之子尚文帝妹信儀公主郁官至中書侍郎後魏賀紇始有勲於國尚平文女父野干尚昭成女遼西公主穆觀太尉侍中崇之子明元時綰門下中書出納詔命未嘗有所遺漏帝奇之尚宜陽公主拜駙馬都尉穆壽觀之子少以父任選侍東宮尚樂陵公主拜駙馬都尉穆平國壽之子襲爵尚城陽長公主拜駙馬都尉穆正國平國之弟尚長樂公主拜駙馬都尉穆伏干平國之子伏干襲爵尚濟北公主拜駙馬都尉穆羆伏干之弟伏干卒無子羆襲爵尚新平長公主拜駙馬都尉穆亮羆弟早有風度獻文時起家為侍御中散尚中山長公主拜駙馬都尉穆紹亮之子孝文以其貴臣世胄顧念之九歳除員外郎侍學東宮轉太子舍人十一尚瑯琊長公主拜駙馬都尉穆真太尉侍中崇之少子起家中散轉侍東宮尚長城公主拜駙馬都尉後勅離婚納文明太后姊尋除南部尚書穆泰真之子孝文時以功臣子孫尚章武長公主拜駙馬都尉典羽獵四曹事賜爵馮翊侯穆伯智泰之子八歳侍學東宮十歳拜太子洗馬散騎侍郎尚饒陽公主拜駙馬都尉姚黄眉興之子太宗昭哀皇后之弟姚泓滅黄眉間來歸國帝厚禮待之賜爵隴西公尚陽翟公主拜駙馬都尉賜𨽻户三百杜超字祖仁密皇后之兄少有節操泰常中為湘州别駕奉使京師時以法禁不得與后通問始光中太武思念舅氏以超為陽平公尚南安長公主拜駙馬都尉李盖中山人為左將軍南郡公初太武姊武威長公主故凉王沮渠牧犍之妻平凉州頗以公主通