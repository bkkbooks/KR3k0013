body:
  text: 册府元龜卷八百六十九宋王欽若等撰總録部明筭明地理圖畫博奕明筭自𨽻首作籌容成造厯後之學者不絶英華或妙盡其能或畧窮其理忘寢廢食精騖心游耳不聞於雷霆行或墜於坎窞嘗齠齓而耽昧射隱伏以㝠符小則括毫釐之形大則周天地之數聊屈指而洞明運隻筯而無爽若非苦志名山尋師逺道則何以臻此哉𨽻首作筭黄帝時人善筭漢張蒼明習天下圖書計籍又善筭律厯故令蒼以列侯居相府主領郡國上計者許商爲博士治尚書爲筭能度功用嘗著五行論厯藝文志有許商筭術三十六卷杜忠筭術十六卷後漢馬勤爲司徒八歲善計計筭術也桑𢎞羊武帝時以計筭幸年十三為侍中耿壽昌宣帝時爲大司農丞以善筭爲筭工得幸於帝張衡字平子爲尚書猶致思於天文隂陽厯筭王子山與父叔師到泰山從鮑子真學筭鄭𤣥造太學受業師事京兆第五元先始通春秋三統厯九章筭術三統厯劉歆所撰九章筭術周公作凢有九篇方田一粟布二差分三少廣四均輸五方程六傍要七盈不足八勾股九又因盧植事馬融融素貴𤣥在門下三年不得見會融集諸生考論圖緯聞𤣥善筭乃召見𤣥因質諸疑義後徴大司農不起魏王粲字仲宣爲侍中性善筭作筭術畧盡其理呉顧譚爲左節度每省簿書未嘗下筭徒屈指心計盡發疑謬下吏以此服之趙達明筭術事太帝帝令達筭作天子之後當復幾年達曰高祖建元十二年陛下倍之帝大喜左右稱萬歲果如達言黄武三年魏文帝在廣陵太帝令達筭之曰曹丕走矣雖然呉衰庚子歲帝曰幾何達屈指而計之曰五十八年帝曰今日之憂不暇及逺此子孫事也達治九宫一筭之術究其微旨是以能應機立成對問若神至計飛蝗射隱伏無不中効或難達曰飛者固不可校誰知其然此殆妄耳達使人取小豆數斗播之席上立處其數驗覆果信嘗過知故知故爲之具食畢謂之曰倉卒乏酒又無佳肴無以叙意如何達因取盤中隻箸再三縱横之乃言卿東壁有羙酒一斛又有鹿肉三斤何以辭無時適坐有他賓内得主人情主人慙曰以卿善射有無欲相試耳竟効如此遂出酒酣飲又有書簡上作千萬數著空倉中封之令達筭之達處如數云但有名無實其精微若是達又閒居無爲引筭自較乃嘆曰吾筭訖盡某年月日其終矣達妻數見達効聞而哭泣達欲弭妻意乃更歩筭言向者謬誤耳尚未也後如期死太帝聞達有書求之不得乃録問其女及發達棺無所得法術絶焉宋闗康之字伯愉河東陽人世居京口寓居南平昌少而篤學筭術妙盡其能太宗詔徴不起祖沖之爲長水校尉幼時善筭注九章造綴術數十篇後魏安豐王猛子延明爲尚書右僕射以河澗人信都芳工筭術引之在館共撰古今樂事九章十二圖高允爲太常明筭法爲筭術三卷殷紹長樂人少聰敏好隂陽術數游學諸方逹九章七曜太武時爲筭生博士太安四年夏上四序堪輿表曰臣以姚氏之世行樂伊川時遇游遁大儒成公興從求九章要術興字廣明自云膠東人也山居隱跡希在人間興時將臣南到陽翟九岸嵓沙門釋曇影間興即北還臣獨畱住依止影所求請九章影復將臣向長廣東山見道人法穆法穆時共影爲臣聞述九章數家雜要披釋章次意況大旨又演隱審五臟六腑心髓血脈商功大筭端部變化𤣥象上圭周髀練精鋭思藴習四年從穆所聞粗皆髣髴穆等仁矜特垂憂愍復以先師和公所注黄帝四序經文三十六卷各有三百二十四章專説天地隂陽之本其第一孟序九卷八十一章説隂陽配合之原第二仲序九卷八十一章解四時氣王休殺吉凶第三叔序九卷八十一章明日辰宿會相生爲表裏第四季序九卷八十一章具釋六甲刑􅍔禮德以此經文傳授於臣山神禁嚴不得賫出尋究經年粗舉綱要山居險難無以自供不堪窮迫心生懈怠以甲寅之年日維鶉火月呂林鍾景氣鬱盛感物懷歸奉辭影等自爾至今二十五載厯觀時俗堪輿八會經世已久傳寫謬誤吉凶禁忌不能僃悉或考良日而值惡會舉吉用凶多逢殃咎又史遷郝振中古大儒亦各撰注流行於世配會大小序述隂陽依如本經猶有所缺臣前在東宫以狀奏聞被景穆皇帝聖詔勑臣撰録集其要最仰奉明旨謹審先所見四序經文抄撮要畧當世所須吉凶舉動集成一卷上自天子下至庶人又貴賤階級尊卑差别吉凶所用㒺不畢備未及内呈先帝晏駕臣時狼狽幾至不測停廢以來經繇八載思欲上聞莫能自徹加年度齒頺餘齡日暮每懼殂殞顛仆溝壑先帝遺志不得宣行夙夜悲憤理難違匿依先撰録奏謹以上聞請付中祕通儒達士定其得失事若可施乞即班用其四序堪輿遂大行於世北齊許遵明易善筭高祖引爲館客後文宣無道日甚遵語人曰多折筭來吾筮此狂夫何時當死遂布筭滿牀大言曰不出冬初我乃不見遵果以九月死信都芳河澗人少明筭術爲州里所稱每精研究忘寢與食或墜坑坎嘗語人云筭之妙機巧精㣲我每一沉思不聞雷霆之聲也其用心如此初爲魏安豐王廷明所館延明家有羣書欲抄集五經筭事爲五經宗及古今樂事爲樂書又聚渾天欹器地動銅烏候風諸圖爲器准並令芳筭之會延明南奔芳乃自撰注芳注重差勾股撰史宗仍自注之合數十卷隋蕭言字文休爲上儀同博學多通尤精隂陽筭術劉炫爲旅騎尉撰筭術一卷行於世唐傅仁均爲太史令善厯筭李淳風爲太史令尤明天文厯筭隂陽之學與筭學博士梁永太學助敎王真儒等注釋五曹孫子等十部筭經分二十卷顯慶元年左僕射于志寧等奏之付國學行用僧一行姓張氏公謹之孫也初求訪師資以窮大衍至天台山國清寺見一院古松數十門有流水一行於門屏間聞院僧於庭布筭聲而謂其徒曰今日當有弟子自遠求吾筭法已合到門豈無人𨗳達也即除一筭又謂曰門前水當却西流弟子亦至一行承其言而趨入稽首請法盡授其術而門前水果却西流明地理夫天地幽微土圭銅渾以測之隂陽變化累黍吹管以候之故知律呂之本軒聖攸明卜筮之書秦虐不毁然則識地理授天時不可謂誣矣卜其宅兆則預辯吉凶相之居第則先言倚伏是知究青鳥之術善靈蔡之占其來久矣樗里子爲秦相卒塟於渭南章臺之東曰後百歲當有天子之宫夾我墓至漢興長樂宫在其東未央宫在西武庫正直其墓後漢袁安明帝建初八年遷太僕初父没母使安訪求塟地道逢三書生問安何之安爲言其故生乃指一處云塟此地當世爲上公須㬰不見安異之於是遂塟於所占之地故累世隆盛焉管輅少帝正始九年舉秀才隨軍西行過母丘儉墓下倚樹哀吟精神不樂人問其故輅曰林木雖茂無形可久碑誄雖羙無後可守𤣥武藏頭蒼龍無足白虎御尸朱雀悲哭四危以備法當滅族不過二載其應至矣卒如其言輅仕至少府丞晉羊祜爲征南大將軍開府儀同三司初有善相墓者言祜祖墓所有帝王氣若鑿之則無後祜遂鑿之相者見曰猶出折臂三公而祜因墮馬折臂位至三公魏舒字陽元少孤爲外家􅑔氏所養􅑔氏起宅相宅者云當出貴甥外祖母以魏氏甥小而慧意謂應之舒曰當爲外氏成此宅相久乃别居舒後果貴位至司徒陶侃微時丁艱將塟家中忽失牛而不知所在遇一老父謂曰前崗見一牛眠出汙中其地若塟位極人臣矣又相一山云此亦其次當世出二千石言訖不見侃尋牛得之因塟其處以所指别山與周訪父死塟焉果爲刺史著稱寧益自訪以下三世爲益州四十一年如其所言侃位至侍中太尉都督荆江雍梁交廣益寧八州諸軍事荆江二州刺史司馬郭璞遷尚書郎以母憂去職卜塟地於暨陽去水百許步人以近水爲言璞曰當即爲陸矣其後沙漲去墓數十里皆爲桑田璞又嘗爲人塟明帝微服往觀之因問主人何以塟龍角此法當滅族主人曰郭璞云此塟龍耳不出三年當致天子也帝曰出天子耶答曰能致天子問矣帝甚異之張裕曽祖澄當塟父璞爲占墓地曰塟某處年過百歲位至三司而子孫不蕃某處年幾減半位裁卿校而累世貴顯澄乃塟其劣處位至光禄年六十四而亡其子孫遂昌韓友字景先廬江舒人能圖宅相冡位至廣武將軍宋孔恭妙善占墓高祖微時塟皇考墓在丹徒之候山其地秦史所謂曲阿丹徒間有天子氣者也帝嘗與恭經墓歎之曰此墓何如孔恭曰非常地也帝繇是益自負南齊荀伯玉爲散騎常侍南濮陽太守因事伏法初善相墓者見伯玉家墓謂其父曰當出暴貴而不久也伯玉後聞之曰朝聞道夕死可矣死時年五十栁世隆爲左光禄大夫侍中曉術數於倪塘創墓與賔客踐履十往五往常坐一處及卒墓正取其坐處焉陳吳明徹父樹仕梁爲右將軍明徹年四十感墳塋未備時有伊氏者善占墓謂其兄曰君塟日必有乗白馬逐鹿者來經墳所此是最小孝子大貴之徵至時果有此應明徹即樹之最小子也明徹仕至司空唐僧泓者黄州人善葬法每行視山原即爲之圖張說深重之晉王建立遼州人有先人之墳在於榆社有崗重覆松榆藹然占者云後必出公侯後建立厯青鄆潞數鎮同平章事故建立生自爲墓恐子孫之有易也子守恩再厯方鎮後爲西京畱守圖畫古者河出圖雒出書聖人受之以昭瑞命則圖畫之作肇於此矣故周禮垂設色之文仲尼有後素之說雖曰藝成而下亦乃道在其中者焉乃有思及杳㝠工侔造化得諸形似之旨加之氣韻之妙觸類而長其徒實繁用能闡幽洞微窮神知變𦕈觀載籍代有其人論而次之式示於後史皇作圖史皇黄帝臣也圖謂畫物象也敬君齊狂卒也齊起九重之臺國中有能畫者賜之錢敬君嘗饑寒其妻端正敬君工畫臺去家日久思念其婦遂畫其像向之喜笑魏徐邈善畫作走水獺標於水濵羣獺集焉邈位至司空吳曹不興善畫大帝使畫屏風誤落筆㸃素因就以作蠅既進御帝以爲生蠅舉手彈之本志無官晉王獻之工草𨽻善丹青桓溫嘗使書扇筆誤落因畫作烏駮牸牛甚妙位至中書令顧愷之字長康猶善丹青圖寫特妙謝安深重之以爲有蒼生以來未之有也愷之每畫人成或數年不㸃目睛人問其故答曰四體妍媸本無缺少於妙處傳神寫炤正在阿堵中嘗恱一隣女挑之弗從乃圖其形於壁以棘針釘其心女遂患心痛愷之因致其情女從之遂密去其針而愈愷之每重嵇康四言詩爲之圖嘗云手揮五絃易目送歸鴻難每冩起人形妙絶於時嘗圖裴楷像頰上加三毫觀者覺神明殊勝又爲謝鯤像在石嵓裏云此子宜置丘壑中欲圖殷仲堪仲堪有目病固辭愷之曰明府正爲眼耳若明㸃曈子飛白拂上使如輕雲之蔽月豈不羙乎仲堪乃從之愷之嘗以一厨畫糊題其前寄桓𤣥皆其深所珍惜者𤣥乃發其厨後竊取畫而緘閉如舊以還之紿云未開愷之見封題如初但失其畫直云妙畫通靈變化而去亦猶人之登仙了無恠色晉義熈初師子國獻玉像形製殊特殆非人工此像在瓦棺寺先有徴士戴安道手製佛像五軀及長康畫維摩詰諸圖世人謂之三絶南齊何戢建元初爲左將軍呉興太守時高帝頗好畫戢有宋孝武所賜蟬雀扇善畵者顧景秀所畵時陸探微皆能畫歎其巧絶戢因王晏獻之帝令晏厚酬其意宋測不就徴辟善畫自圖阮籍遇蘇門於行障上坐臥對之又畫永業佛影臺皆爲妙作毛惠遠滎陽人善畫馬劉瑱彭城人善畫婦人當世俱爲第一殷蒨陳郡人劉瑱妹爲鄱陽王妃伉儷甚篤王爲明帝所誅妃追傷遂成錮疾醫所不療蒨善寫人與真不别瑱令蒨畫王形像并圖王平生所寵姬共照鏡狀如欲偶瑱乃密使媼妳示妃妃視畫竟乃唾之因罵云故宜其蚤死於是恩情即歇病亦除瘥此姬亦被廢苦因即以此畫焚之陳顧野王字希馮吳郡呉人宣成王爲揚州刺史野王及瑯琊王褒並爲賔客王甚愛其才野王好丹青善圖寫王於東府起齋乃令野王畫古賢命王褒書贊時人稱爲二絶陸探微吳人伏曼容素羙風彩高祖嘗以方嵇叔夜使探微畫叔夜像以賜之宗測優游齊侍中王秀之彌所欽慕乃令探微畫其形與已相對張繇呉人丹青之巧冠絶一時高祖於光宅寺造諸堂殿并瑞像周迴閣等窮於輪奐其圖諸經變並繇運手後魏蔣少游假散騎常侍與通直散騎常侍李彪使齊齊延昌師主顧元吉言於齊武帝曰臣知少游有班倕之巧今來必令模寫祖掖未可令反帝不從少游果圖畫而歸北齊廣寧王孝珩嘗於㕔事壁自畫一蒼鷹見者皆以爲真又作朝士圖亦當時之妙蕭放性好文詠頗善丹青因此在宫中披覽書史及近世詩賦監畫工作屏風等雜物見之遂被眷官至散騎常侍唐閻立本頗好學而以善畫知名尤工寫真秦府十八學士圖及貞觀中凌煙閣功臣圖並立本之跡也時人咸稱其妙太宗嘗與侍臣學士泛舟於春苑池中有異鳥隨波容與太宗悦之詔坐者爲詠召立本令寫之閣下傳呼云畫師閻立本到立本時爲主爵郎中奔走流汗俛伏池側手持丹粉瞻望坐賔深爲愧赧退而誡其子曰吾少好讀書幸免牆面縁情染翰頗及儕流惟以丹青見知躬厠役之務辱莫大焉汝宜深誡勿習此末伎也然立本性之所好欲罷不能也薛稷善畫博採古跡睿宗在籓畱意於小學稷於是特見招引位至中書侍郎叅知政事王維妙於繪事筆蹤措思叅於造化然創意經圖或有所缺至於雲峯石色絶跡天機非衆工之所及也人有奏樂圖者不知其名維視之曰霓裳第三疊第一拍也好事者集樂工按之一無差誤咸服其精思官至右丞韓滉尤工書兼善丹青以繪事非急務自晦其能未嘗傳之位至檢校左僕射平章事博奕仲尼云飽食終日無所用心不有博奕者乎爲之猶賢乎已蓋博奕之所從來久矣乃有專精厥藝獨善其事積日以臻乎妙用志以幾於神或以資豪舉之氣或以助閒宴之適流風雅尚清言高韻於是乎出焉其或篤於好尚遂成沉癖癈事棄業怠政墮官此昔人所以著論而致譏勤於埀誡者也井公邴人周穆王北入邴邴鄭邑與井公博三日而決井公疑其賢人而隱者故王就博奕秋齊人通國之善奕者荆軻燕人與魯勾踐博爭道勾踐怒而叱之軻黙而逃漢劇孟雒陽人好博多少年之戯吾丘壽王字子贛趙人年少以善格五召待詔博之類不用箭但行梟散格音各行五相各故言各陳遵祖父遂宣帝微時與之有故相遂博奕數負進及帝即位稍遷至太原太守賜璽書曰制詔太原太守官尊禄厚可以償博進矣後漢梁冀爲大將軍能彈棊藝經曰彈棊兩人對局白黒棊各六枚先列棊相當更先彈也其局以石爲之格五格五簺也簺行棊相簺謂之簺簺經曰簺有四塞白乗五是也五至即格不得行故謂之格五也六博楚辭曰琨蔽象棊有六博注云投六著行六棊故云六博鮑宏博經曰用十二棊六棊白六棊黒所擲頭謂之瓊瓊有五采刻爲一畫謂之塞刻爲兩畫者謂之白刻爲三畫者謂之黒一邊不刻者五塞之間謂之五塞意錢之戯一曰射意又曰射敷即攤錢也魏子山道王九真郭凱等善圍棊太祖皆與埓能王粲觀人圍棊局壊粲爲覆之棊者不信以帊蓋局更以他局爲之用相比較不誤一道位至侍中孔烓性便妍曉博奕太祖愛之每在左右杜幾與衛固少相侮狎共博爭道位至尚書僕射呉嚴武字子卿衛尉畯再從子也圍棊莫與爲軰謂之人絶蔡頴在太子和東宫侍從性好博奕太子以爲無益命中庶子韋曜著博奕論以諷之晉王質入山斫木見二童圍棋坐觀之及起斧柯已爛賈謐嘗侍愍懷太子奕棋爭道成都王頴在坐正色曰皇太子國之儲君賈謐何得無禮謐位至侍中王𨗳爲丞相嘗與其子悦奕棋爭道𨗳笑曰相與有𤓰葛那得爲爾耶祖納爲軍諮祭酒好奕棋王隱謂之曰禹惜寸隂不聞數棋納曰我亦忘憂耳周顗字伯仁爲王敦所殺敦坐有一叅軍摴蒲馬於博頭被殺因謂敦曰周家奕世令望而位不至公及伯仁將登而墜有似下官此馬阮簡爲開封令縣有刼賊外白之甚數簡方圍棊長嘯吏云刼急簡曰局上刼亦急其高率如此陶侃爲征西大將軍荆州刺史見諸叅佐戒以談戯廢事乃取其摴蒲博具投於江曰摴蒲者牧猪奴戯耳謝混女夫殷叡好摴蒲奪其妹姑物以還戯債爲大將軍王敦長史王恬多技藝與江霖俱善奕棋爲中興第一終會稽内史謝安爲衛將軍苻堅率衆次於淮淝京師震恐謝𤣥入問計安夷然無懼色答曰已别有旨既而寂然𤣥不敢言乃令張𤣥重請安遂命駕出山墅親朋畢集方與𤣥圍棋賭别墅安嘗棋劣於𤣥是日𤣥懼便爲敵手而又不勝𤣥等既破堅有捷書至安方對客圍棋看書既竟便攝放牀上了無喜色棋如故袁耽字彥道桓溫少時游於博徒資產俱盡尚有負進思自振之方莫知所出欲求濟於耽而耽在艱試以告焉耽畧無難色遂變服懷布㡌隨溫與債主戯耽素有藝名債者聞之而不相識謂之曰卿當不辨作袁彥道也遂就局十萬一擲直上百萬耽投馬絶呌探布㡌擲地曰竟識袁彥道否其通脱若此官至建威將軍厯陽太守葛洪寡玩好見人博戯曽不目盼乃至不知棊局道摴蒲齒名以爲句容令王獻之年數歲嘗觀門生摴蒲曰南風不競門生曰此郎亦管中窺豹時見一班獻之位至中書令桓𤣥强與人博奕取其田宅又云桓𤣥見人好園宅悉欲取之乃以摴博而賭劉毅嘗於東府聚摴蒲大擲一判應至數百萬餘人並黒犢以還惟宋高祖及毅在後次擲得雉大喜褰衣繞床呌謂同坐曰非不能盧不事此耳高祖惡之因按五木久之曰老兄試爲卿答既而四子俱黒其一子轉躍未定高祖厲聲喝之即成盧焉毅意殊不快然素黒其面如鐵色焉而乃和言曰亦知公不能以此見借毅後爲衛將軍荆州刺史以叛誅宋顏延之初仕晉爲鎮東司馬坐圍棊免官徐羨之頗工奕棋觀戯常若未解以爲司徒何承天素好奕棋頗用廢事太祖賜以局子承天奉表陳謝上答曰局子之賜何必非張武之金耶承天官至御史中丞臧質善蒲博意錢之戯官至車騎將軍江州刺史王景文爲右衛將軍坐與奉朝請毛法因蒲戯得錢百二十萬白衣領職范景達善彈棋居晉平王休祜左右羊𤣥保善奕棋棋品第三太祖與賭郡戯勝以補宣城太守謝𢎞微性無慍色末年與友人圍棋友人西南棊有死勢客曰西南風急或有覆舟友悟乃救之𢎞微大怒投局於地識者知其暮年之事爲侍中吏部尚書王𢎞字休元瑯邪臨沂人也少時嘗摴蒲公城子野舍及後位太保中書監有人就𢎞求縣辭訴頗切此人嘗以蒲戯得罪𢎞詰之曰君得錢會戯何用禄爲答曰不審公城子野舍何在𢎞黙然何尚之爲侍中中書令雅好棋呉郡禇裔年七歲便入高品及長冠絶當時而禇父榮期與臧質同逆禇應從誅尚之請曰禇奕棋之妙超古冠今魏犨犯令以材獲免父戮子宥其例甚多特乞與其微命使藝術不絶不許時人痛惜之又云尚之少好摴蒲既長而折節蹈道孟靈休善彈棋官至祕書監南齊蕭惠基爲給事中當時能棋人瑯邪王杭第一品呉郡禇思莊會稽夏赤松並第二品赤松思速善於大行思庄戯遲巧於鬭棋太祖使思莊與杭交賭自食時至日暮一局始竟帝倦遣還省至五更方決杭睡於局後寢思莊達曉不寐世或云思莊所品第致高縁其用思深久人不能對也杭思莊並至給事中永明中勑杭品棋竟陵王子良使惠基掌其事江斆爲祕書監領晉安王師斆圍棋第五品爲朝貴中最沈文季尤善塞及彈棋塞用五子官至平東將軍會稽太守梁王瞻爲侍中領驃騎將軍於棋尤善高祖每稱瞻有三術射棋酒也栁惲善奕棋帝每勑侍坐仍令定棋譜第其優劣官至呉興太守李安民擊鵲尾城有功明帝大會新亭樓勞諸軍主摴蒲官賭安民五擲皆盧帝大驚目安民曰卿面方如田封侯相也安民少時貧窶有人從門過相之曰君後當與天子交手共戯至是果騐陳司馬申有風槩年十四便善奕棋嘗隨父候吏部尚書到仲舉時梁州刺史隂子春領軍朱異在焉子春素知申即於坐所呼與爲對申每有妙思異觀而奇之因引申游處後卒爲右衛將軍散騎常侍陸瓊父雲公仕梁爲給事中黄門侍郎掌著作大同末雲公受梁武帝詔較定棋品到溉朱異以下並集瓊時年八歲於客前覆局繇是京師號曰神童後魏有范甯兒者善圍棋與李彪使齊齊武令江南上品王杭與甯兒制勝而還高光浮陽人善摴蒲李㓜序趙國人及雒陽丘何奴並工握槊此蓋胡戯近入中國云胡王有弟一人遇將殺之弟從獄中爲此戯以上之意言孤則易死也宣武以後大盛於時游肇爲侍中性亷謙不競撰儒棋以表其志甄琛舉秀才入都積歲頗以奕棋棄日乃志通夜不止有蒼頭嘗令秉燭或睡即加杖奴不勝楚痛乃白琛曰郎君辭父母仕宦京師若爲讀書執燭不敢暫辭乃以圍棋日夜不息豈是向京之意琛惕然慙慼後周薛端爲尚書右丞掌選事梁主蕭詧曽獻瑪瑙鐘太祖執之顧丞郎曰能擲摴蒲頭得盧者便與鐘已經數人不得頃至端乃執摴蒲頭而言曰非爲此鐘可貴但思露其誠耳便擲之五子皆黒帝大悦即以賜之王思政爲中軍大將軍從魏孝武西遷時太祖執政思政雖被任委自以非相府之舊每不自安太祖曽在同州與羣公宴集出錦罽及雜裬絹命諸將摴蒲取之物既盡帝又解所服金帶令諸人徧擲先得盧者與之次至思政乃歛容自誓一坐盡驚即㧞佩刀膝上茍不成盧將自殺拊髀擲之帝方令止已爲盧矣乃拜而受賜唐王叔文貞元末以棋待詔翰林順宗在東宫叔文常侍棋王倚善奕寶厯初爲待詔張賈自鴻臚卿出爲衢州刺史文宗顧謂賈曰聞卿大善長行賈知帝不喜博遂自解説乃曰公事之餘聊與賔客爲戯非有所好也帝曰豈謂好之而不妨事也顧師言為棋待詔大中八年日本國遣王子來朝王子善圍棋宣帝令師言與之對手王子出本國如揪玉局冷暖玉棋子時王子至三十三下師言懼辱君命汗手死心始敢落指王子亦凝目縮臂數四敬服不勝回謂禮賔曰此第幾手也禮賔詭曰第三手其實第一手也王子曰願見第一禮賔曰勝第三可見第二勝第二可見第一今欲躁見第一其可得乎王子撫局歎曰小國之一不敵大國之三信矣晉房知溫兖州瑕丘人初鎮將牛存節屯於郡好摴博每求辨彩者知溫以善博見推因得侍左右卒爲青州節度使鄭雲叟隱居華山好棋塞之戯遇同侶則以晝繼夜雖朔風大雪亦臨簷對局手足皸裂亦無倦焉天成中徴右拾遺不起册府元龜巻八百六十九
