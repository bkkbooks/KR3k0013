body:
  text: 册府元龜卷三百十一宋王欽若等撰宰輔部謀猷周書曰爾有嘉謀嘉猷則入告爾后于内爾乃順之於外是知調陰陽撫夷夏貞百度叙羣倫其注意也深其責言也重茍非内秉徳義發爲訓誥始終彌綸獻可替否何以熙帝載凝庻績代天治物俾民具瞻者哉肇自禹爲帝臣首叙六府臯陶稽古備陳九徳以義制事動罔不吉乃至啓沃交修存乎說命寅亮弼治紀乎周官興邦之言藹然垂裕漢魏而下世有賢佐或造膝以論機事或奏牘以振羣綱周旋慎重式昭永圖布在方册煥然可見矣虞舜在位大禹謨禹稱大大其功謨謀也曰若稽古大禹順考古道而言之曰文命敷于四海祗承于帝言其外布文徳教命内則敬承堯舜曰后克艱厥后臣克艱厥臣政乃乂黎民敏徳敏疾也能知爲君難爲臣不易則其政治而衆民皆疾修徳帝曰俞允若兹嘉言罔攸伏野無遺賢萬邦咸寧攸所也善言無所伏言必用如比則賢才在位天下安稽于衆舎己從人不虐無告不廢困窮惟帝時克帝謂堯也舜因嘉言無伏遂稱堯徳以成其義考衆從人矜孤愍窮凡人所輕聖人所重益曰都帝徳廣運乃聖乃神乃武乃文益因舜言又美堯也廣謂所及者逺聖無不通神妙無方文經天地武安禍亂皇天眷命奄有四海爲天下君眷親也奄同也言堯有此徳故爲天所命所以勉舜也禹曰惠迪吉從逆㓙惟影響迪道也順道吉從逆㓙吉㓙之報若影之隨形響之應聲言不虚也益曰吁戒哉儆戒無虞罔失法度先吁後戒欲使聽者精其言虞度也無虞度謂戒于無形秉法循度以有常罔遊于逸罔滛于樂滛過也㳺逸過樂敗徳之原富貴所忽故特以爲戒也任賢勿貳去邪勿疑疑謀勿成百志惟熈一意任賢果于去邪疑則勿行道義所存于心日以廣矣罔違道以干百姓之譽干求也失道求名古人賤之罔咈百姓以從己之欲咈戻也專欲難成犯衆興禍故戒之無怠無荒四夷來王言天子嘗戒慎無怠墮荒廢則四夷歸往之禹曰於帝念哉徳惟善政政在養民嘆而言念重其言爲政以徳則民懷之水火金木土榖惟修言養民之本在先修六府正徳利用厚生惟和正徳以率下利用以阜財厚生以養民三者和所謂善政九功惟叙九叙惟歌言六府三事之功有次序皆可歌樂乃徳政之致戒之用休董之用威勸之以九歌俾勿壞休美董督也言善政之道美以戒之威以督之歌以勸之使政勿壞在此三者而已帝曰俞地平天成六府三事允治萬世永賴時乃功水土治曰平五行叙曰成因禹陳九功而歎美之言是汝之功明衆臣不及伯益爲虞時禹征有苖苗民逆命益贊于禹曰惟徳動天無逺弗届贊佐屇至也益以此義佐禹欲其修徳致逺滿招損謙受益時乃天道自滿者人損之自謙者人益之是天之常道也帝初于歴山徃于田日號泣于旻天于父母仁覆愍下謂之旻天言舜初耕于歴山之時爲父母所疾日號泣于旻天及父母克己自責不責于人負罪引慝祗載見瞽瞍䕫䕫齊栗瞽瞍亦允若慝惡載事也䕫悚懼之貎言舜負罪引慝敬以事見于父母悚懼齋莊父亦順之言能以至誠感頑父至諴感神矧兹有苖諴和矧况也至和感神况冇苗乎言易感禹拜昌言曰俞班師振旅昌當也以益言爲當故拜受而然之遂還師兵入曰振旅言整衆也帝乃誕敷文徳逺人不服大布文徳以來之舞干羽于兩階干楯羽翳也皆舞者所執修闌文教舞文舞于賔主階間抑武事也七旬有苗格討而不服不討自來明御之者必有道三苗之國左洞庭右彭蠡在荒服之例去京師三千五百里臯陶爲士師爲帝舜謨曰允迪厥徳謨明弼諧迪道厥其也其古人也言人君當信蹈古人之徳謀廣聰明以輔諧其政禹曰俞如何然其言問所以行臯陶曰都慎厥身修思永歎美之重順修其身思爲常久之道也惇叙九族庶明勵翼邇可逺在兹言慎修其身厚次序九族則衆庶皆明其教而自勉勵翼戴上命近可推而逺者在此道也禹拜昌言曰俞以臯陶言爲當故拜受而然之臯陶曰都在知人在安民歎修身親親之道在知人所言任在能安民禹曰吁咸若時惟帝其難之言帝堯亦以知人安民爲難故曰吁知人則哲能官人安民則惠黎民懷之哲智也無所不知故能安人惠愛也愛則民歸也能哲而惠何憂乎驩兠佞人亂真堯憂其敗政故流放之何遷乎有苗何畏乎巧言令色孔壬孔甚也巧言静言庸違令色象恭滔天禹言有苗驩兠之徒甚佞如此堯畏其亂政故遷之臯陶曰都亦行有九徳言人性行有九徳以考察真偽則可知亦言其人有徳乃言曰載采采載行采事也稱其人有徳必言其所行某事某事以爲驗禹曰何問九徳品例臯陶曰寛而栗性寛𢎞而能莊栗柔而立和柔而能立事愿而恭慤愿而恭恪亂而敬亂治也有治而能謹敬也擾而毅擾順也致果爲毅直而溫行正直而氣溫和簡而㢘性簡大而有㢘隅剛而塞剛斷而塞實彊而義無所屈撓動必合義彰厥有常吉哉彰明吉善也明九徳之常以擇人而官之則政之善也日宣三徳夙夜浚明有家三徳九徳之中有其三宣布夙夜浚須也卿大夫稱家言能布日行三徳早夜思之須明行之可以爲卿大夫矣日嚴祗敬六徳亮采有邦有國諸侯日日嚴敬其身敬行六徳以信致政事則可以爲諸侯翕受敷施九徳咸事俊乂在官翕合也能合受三六之徳而用之以布施政教使九徳之人皆用事謂天子如此則浚徳治能之士並在官百僚師師百工惟時僚工皆官也師師相師法百官皆趨時赴功撫于五辰庶績其凝凝成也言百官皆撫順五行之時衆功皆成無教逸欲有邦不爲逸豫貪欲之教是有國者之常兢兢業業一日二日萬㡬兢兢戒慎業業危懼幾㣲也言當戒懼萬事之幾無曠庶官天工人其代之曠空也位非其人爲空官言人代天理官不可以天官私非其才天叙有典勑我五典五惇哉天次叙人之常性各有分義當勑正我五常之教使合于五厚厚天下天秩有禮自我五禮有庸哉庸常自用也天次秩有禮當用我公侯伯子男五等之禮以接之使有常同寅協恭和衷哉衷善也以五禮正諸侯使同敬合恭而和善天命有徳五服五章哉五服天子諸侯卿大夫士之服也尊卑彩章各異所以命有徳天討有罪五刑五用哉言天以五刑討冇罪用五刑宜必當政事懋哉懋哉言叙典秩禮命徳討罪無非天意者故人君居天官聽政治事不可以不自勉天聰明自我民聰明言天因民而降之福民所歸者天命之天視聽人君之行用氏爲聰明天明畏自我民明威天明可畏爾用民成其威民所叛者天討之是天明可畏之效逹于上下敬哉有土言天所賞罰惟善惡所在不避貴賤有土之君不可不敬懼臯陶曰朕言惠可底行其所陳九徳以下之言順于古道可致行禹曰俞乃言底可績然其所陳而美之日用汝言致可以立功臯陶曰予未有知思日贊贊襄哉言我未有所知未能思致于善以贊上古行事而言之因禹美之承以謙辭言之益稷禹稱其人因以名篇帝曰來禹汝亦昌言因臯陶陳九徳故呼禹使以陳常言禹拜曰都帝予何言予思日孜孜拜而嘆辭不言欲使帝重臯陶所陳言己思日孜孜不怠奉承臣功而已臯陶曰吁如何問所以孜孜之事禹曰洪水滔天浩浩懷山襄陵下民昏墊言天下民昏瞀墊弱皆因水灾予乘四載隨山刋木所載者四謂水乘舟陸乘車泥乘輴山乘樏隨行九州之山林刋槎其木開通道路以治水也暨益奏庶鮮食奏謂進于民鳥獸新殺曰鮮與益槎木獲鳥獸民以進食予決九州距四海濬畎澮距川距至也決九州名川道之至海一畝之間廣尺深尺方百里之間廣二尋深二仞曰澮澮畎深之至川以入海暨稷播奏庶艱食鮮食艱難也衆難得食處則與稷教民播種之決川冇魚鱉使民鮮食之懋遷有無化居化易也居謂所宜居積者勉勸天下徙有之無魚鹽徙山林樹木徙川澤交易其所居積烝民乃粒萬邦作乂米食曰粒言天下繇此爲治本臯陶曰俞師汝昌言言禹功甚當可師法禹曰都帝慎乃在位帝曰俞然禹言受其戒禹曰安汝止惟幾惟康其弼直言慎在位當安好惡所止慮念幾㣲以保其止其輔臣必用直人惟動丕應徯志徯待也帝先安所必動則天下大應之順命以待帝志以昭受上帝天其申命用休昭明也非但人應之又乃明受天之報施天又重命用美帝曰吁臣哉鄰哉鄰哉臣哉禹曰俞鄰近也言君臣道近相須而成帝曰臣作朕股肱耳目言大體若身予欲左右有民汝翼左右助也助我所有之民富而教之汝翼成我予欲宣力四方汝爲布力立治之功汝羣臣當爲之予欲觀古人之象欲觀以法象之服制日月星辰山龍華蟲日月星爲三辰華象草華蟲雉也畫三辰山龍華蟲于衣服旌旗作㑹宗彞㑹五采也以五采成此畫焉宗廟彞尊亦以山龍華蟲爲飾藻火粉米黼黻絺繡藻水草有文者火爲火字粉若粟水米若聚米黼若斧形黻若兩已相背葛之精者曰絺五色備曰繡以五采彰施于五色作服汝明天子服日月而下諸侯自龍衮而下黼黻士服藻火大丈粉米上得兼下下不得僣上以五采明施于五色作尊卑之服汝明制之予欲聞六律五聲八音在治忽以出納五言汝聽言欲以六律和聲音在察天下治理及忽怠者又以出納仁義禮智信五徳之言施于民以成化汝當聽審之予違汝弼汝無靣從退有後言我違道汝當以義輔正我無得面從我違而退後有言我不可弼欽四鄰庶頑讒說若不在時四近前後左右之臣勑使敬其職衆愚頑讒說之人若所行不在于是而爲非者當察之侯以明之撻以記之常行射侯之禮以明善惡之教笞撻不是者使記識其過書用識哉欲並生哉書識其非欲使改悔與其並生工以納言時而颺之工樂官掌誦詩以納諫當時正其義而颺道之格則承之庸之否則威之天下人能至于道則承用之任以官不從教則以刑威之禹曰俞哉帝光天之下至于海隅蒼生九天之下至于海隅蒼蒼然生草木言所及廣逺萬邦黎獻共惟帝臣惟帝時舉敷納以言明試以功車服以庸獻賢也萬國衆賢共為帝臣帝舉是而用之使陳布其言明之皆以功大小爲差以車服旌其能用之也誰敢不讓敢不敬應上惟賢是用則下皆敬應上命而讓善帝不時敷同日奏罔功帝用臣不是則逺近布同而日進於無功以賢愚並位優劣共流故無若丹朱傲惟慢游是好丹朱堯子舉以戒之傲虐是作罔晝夜頟頟傲戲而爲虐無晝夜常頟頟肆惡無休息罔水行舟朋滛于家用殄厥世朋羣也丹朱習于無水陸地行舟無度羣滛于家妻妾亂用是絶其世不得嗣予創若時娶于塗山辛壬癸甲創懲也塗山國名懲丹朱之惡辛日娶妻至于甲日即往治水不以私害公啓呱呱而泣予弗子惟荒度土功啓禹子也禹治水過門不入聞啓泣聲不暇子名之以大治度水土之功故弼成五服至于五千州十有二師五服侯甸綏要荒服也服五百里四方相距爲方五千里治洪水輔成之一州用三萬人功九州功九州二十七萬庸外薄四海咸建五長薄廹也言至海諸侯五國立賢者一人爲方伯謂之五長以相統治以奬帝室各廸有功苗頑弗即工帝其念哉九州五長各蹈爲有功唯三苗頑㓙不得就官善惡分别也帝曰廸朕徳時乃功惟叙言天下蹈行我徳是汝治水之功有次序敢不念乎商仲虺爲湯左相歸自夏至于大坰自三朡而還大坰地名仲虺作誥仲虺之誥仲虺臣名以諸侯相天子㑹同曰誥成湯放桀于南巢惟有慙徳湯伐桀武功成故以爲號南巢地名有慙徳慙徳不及古曰予恐來世以台爲口實恐來世論道我放天子常不去口仲虺乃作誥陳義告湯可無慙曰嗚呼惟天生民有欲無主乃亂民無君主則恣情欲必致禍亂惟天生聰明時乂言天生聰明是治民亂有夏昏徳民墜塗炭夏桀昏亂不恤下民民之危險若䧟泥墜火無救之者天乃錫王勇智表正萬邦纘禹舊服言天與王勇智應爲民主儀表天下法正萬邦維禹之功統其故服兹率厥典奉若天命天意如此俱當循典法奉順天命而已無所慙夏王有罪矯誣上天以布命于下言托天以行虐于民乃桀之大罪帝用不臧式商受命用爽厥師天用桀無道故不善之式用爽明也用商受王命以明其衆言爲主也簡賢附勢實繁有徒簡略也賢而無勢則略之不賢有勢則附之若是者繁多有徒衆無道之世所常也肇我邦于有夏若苗之有莠若粟之有粃始我商家國于夏世欲見剪除若莠生苗又若粃在粟恐彼鋤治簸颺小大戰戰罔不懼于非辜矧予之徳言足聽聞言商家小大憂危恐其非罪見威矧况也况我之道徳善言足聽聞乎無道之惡有道自然理惟王不邇聲色不殖貨利邇近也不近聲樂言髙簡不近女色言貞固殖生也不生資貨財利言不貪也既有聖徳兼有此行徳懋懋官功懋懋賞用人惟己改過不吝勉于徳者則勉之以官勉于功者則勉之以賞用人之言若自己出有過則改無所吝惜所以能成王業克寛克仁彰信兆民言湯寛仁之徳明信于天下乃葛伯仇餉初征自葛東征西夷怨南征北狄怨葛伯游行見農民之餉于田者殺其人奪其餉故謂之仇餉仇怨也是以不祀之罪伐之從此後遂征無道西夷北狄舉逺以言則近者該矣曰奚獨後予怨者辭也攸徂之民室家相慶曰徯予后后來其蘇湯所往之民皆喜曰待我君來其可蘇息民之戴商厥惟舊哉舊謂初征自葛時佑賢輔徳顯忠遂良賢則助之徳則輔之忠則顯之良則進之明王之道兼弱攻昩取亂侮亡弱則兼之闇則攻之亂則取之有亡形則侮之言正義推亡固存邦乃其昌有亡道則推而亡之有存道則輔而固之王者如此國乃昌盛徳日新萬邦惟懷志自滿九族乃離日新不懈怠自滿志盈溢焉王懋昭大徳建中于民以義制事以禮制心垂裕後昆欲王自勉明大徳立大中之道于民率羲奉禮垂優足之道示後世予聞曰能自得師者王求聖賢而事之謂人莫己若者亡自多足人莫之益亡之道好問則裕自用則小問則有得所以足不問專固所以小嗚呼慎厥終惟其始靡不有初鮮克有終故戒慎終如其始殖有禮覆昏暴有禮者封殖之昏暴者覆亡之欽崇天道永保天命王者如此上事則敬天安命之道伊尹相太甲作伊訓作訓以教道太甲惟元祀十有二月乙丑伊尹祠于先王此湯終踰月太甲即位奠殯而告奉嗣王祇見厥祖居位主䘮侯甸羣后咸在在位次百官總己以聽冡宰伊尹制百官以三公攝冡宰伊尹乃明言烈祖之成徳以訓于王湯有功烈之祖故稱焉曰嗚呼古有夏先后方懋厥徳罔有天災先后謂禹以下少康以上賢君言能以徳禳災山川鬼神亦莫不寧莫無也言皆安之暨鳥獸魚鱉咸若雖微物皆順之明其餘無不順于其子孫弗率皇天降災假手于我有命言桀不循其祖道故天下禍災借手于我有命商王誅討之造攻自鳴條朕哉自亳造哉皆始也始攻桀伐無道由我始修徳于亳惟我商王布昭聖武代虐以寛兆民允懷言湯布明武徳以寛政代桀虐政兆民以此皆信懷我商王之徳今王嗣厥徳罔不在初言善惡之由無不在初欲慎始立愛惟親立敬惟長始于家邦終于四海言立愛敬之道始于親長則家國並化終洽四海嗚呼先王肇修人紀從諌弗咈先民時若言湯始修爲人綱紀有過則改從諌如流必先民之言是順居上克明言理恕爲下克忠事上竭誠與人不求備檢身若不及使人必器之常如不及恐有過以至于有萬邦兹惟艱哉言湯操心常危懼而無過以至爲天子此自立之艱敷求哲人俾輔于爾後嗣布求賢哲使師輔于爾嗣王言仁及後世制官刑儆于有位言湯制治官刑法以儆戒百官曰敢有恆舞于宫酣歌于室時謂巫風常舞則荒滛樂酒曰酣酣歌則廢徳事鬼神曰巫言無政敢有狥于貨色恆于遊畋時謂滛風狥求也昩求財貨美色常遊行畋獵是滛過之風俗敢有侮聖言逆忠直逺耆徳比頑童時謂亂風狎侮聖人之言而不行拒逆忠直之規而不納耆年有徳疏遠之童稚頑嚚親比之是荒亂之風俗惟兹三風十愆卿士有一于身家必喪有一過則徳義廢失位亡家之道邦君有一于身國必亡諸侯犯此國亡之道臣下不匡其刑墨具訓于蒙士邦君卿士則以爭臣自規正臣不正君鑿其額涅以墨蒙士例謂下士以爭友僕𨽻自規正嗚呼嗣王祗厥身敬哉言常敬身念祖徳聖謨洋洋嘉言孔彰洋洋美善言甚明可法惟上帝不常作善降之百祥作不善降之百殃祥善也天之禍福惟善惡所在不常在一家爾惟徳罔小萬邦惟慶修徳無小則天下賚慶爾惟不徳罔大墜厥宗茍爲不徳無大言惡有類以類相致必墜失宗廟此伊尹至忠之訓肆命陳天命以戒太甲云徂后陳往古明君以戒王伊尹申誥于王曰嗚呼惟天無親克敬惟親言天于人無有親疎惟親能敬身者民罔常懷懷于有仁民所歸無常以仁政爲常鬼神無常享享于克誠言鬼神不係一人能誠信者享其祀天位艱哉言居天子之位難以此三者徳惟治否徳亂爲政以徳則治不以徳則亂與治同道罔不興與亂同事罔不亡言安危在所任治亂在所法終始慎厥與惟明明后明慎其所與治亂之機則爲明王明君先王惟時懋敬厥徳克配上帝言湯惟是終始所與之難勉修其徳能配天而行之今王嗣有令緒尚監兹哉令善也繼祖善業當夙夜庶幾視此配天之徳而法之若升髙必自下若陟遐必自邇言善政有漸如登髙升逺自下近爲始然後終致髙逺無輕民事惟難無輕爲力役之事必重難之乃可無安厥位惟危言當常自危懼以保其位慎終于始于始慮終于終思始有言逆于汝心必求諸道人以言拂違汝心必以道義求其意勿拒逆之有言遜于汝志必求諸非道遜順也言順汝心必以非道察之勿以自臧嗚呼弗慮胡獲弗為胡成一人元良萬邦以貞胡何貞正也言常念慮道徳則得道徳念爲善政則成善政一人天子也天子有大善則天下得其正君罔以辯言亂舊政利口覆國家故特慎焉臣罔以寵利居成功成功不退其志無限故爲之極以安之邦其永孚于休言君臣各以其道則國長信保于美也伊尹既復政厥辟還政太甲將告歸乃陳戒于徳告老歸邑陳徳以戒作咸有一徳言君臣皆有純一之徳以戒太甲曰嗚呼天難諶命靡常以其無常故難信常厥徳保厥位厥徳匪常九有以亡人能常其徳則安其位九有諸侯桀不能常其徳湯則伐而兼之夏王弗克庸徳慢神虐民言桀不能常其徳不敬神明不恤下民皇天弗保監于萬方啓迪有命言天不安桀所爲廣視萬方有天命者開道之眷求一徳俾作神主天求一徳使伐桀爲天地神祇之主惟尹躬暨湯咸有一徳克享天心受天明命享常也所征無敵謂之受天命以有九有之師爰革夏正爰於也於得九有之衆遂伐夏勝之改其正非天私我有商惟天佑于一徳非天私商而王之佑助一徳所以王非商求于下民惟民歸于一徳非商以力求民民自歸于一徳徳惟一動罔不吉徳二三動罔不凶二三言不一惟吉凶不僭在人惟天降災祥在徳行善則吉行惡則凶是不差徳一天降之善不一天降之災是在徳今嗣王新服厥命惟新厥徳其命王命新其徳戒勿怠終始惟一時乃日新言徳行始終不衰是乃日新之義任官惟賢才左右惟其人官賢才而任之非賢才不可任選左右必忠良不忠良非其人臣爲上爲徳爲下爲民言臣奉上布徳順下訓民不可官所私任非其人其難其慎惟和惟一其難無以爲易其慎無以輕之羣臣當和一心以事君政乃善徳無常師主善爲師徳非一方以善爲主乃可師善無常主協于克一言以合于能一爲常徳俾萬姓咸曰大哉王言一徳之言故曰大又曰一哉王心能一徳則一心克綏先王之禄永底烝民之生言爲王而令萬姓安此則能保安先王之寵禄長致衆民所以自生之道是明王之事嗚呼七世之廟可以觀徳天子立七廟有徳之王則爲祖宗其廟不毁故可觀徳萬夫之長可以觀政能整齊萬夫其政可知后非民罔使民非后罔事君以使民自尊民以事君自生無自廣以狹人匹夫匹婦不獲自盡民主罔與成厥功上有狹人之心則下無所自盡矣言先盡其心然後乃能盡其力人君所以成功傅說既相髙宗髙宗命説總百官在冢宰之位乃進于王曰嗚呼明王奉若天道建邦設都天有日月北斗五星二十八宿皆有尊卑相正之法言明王奉順此道以立國設都樹后王君公承以大夫師長言立君臣上下將陳爲治之本故先舉其始不惟逸豫惟以亂民不使有位者逸豫民上言立之主使治民惟天聰明惟聖時憲惟臣欽若惟民從乂憲法也言聖王法天以立教臣敬順而奉之民以從上爲治惟口起羞惟甲胄起戎甲鎧冑兠鍪也言不可輕教令易用兵惟衣裳在笥惟干戈省厥躬言服不可加非其人兵不可任非其才王惟戒兹允兹克明乃罔不休言王戒慎此四惟之事信能明政乃無不美惟治亂在庶官言所官得人則治失人則亂官不及私昵惟其能不加私昵惟能是官爵罔及惡徳惟其賢言非賢不爵慮善以動動惟厥時非善非時不可動有其善䘮厥善矜其能䘮厥功雖天子亦必讓以得之惟事事乃其有備有備無患事事非一事也無啓寵納侮開寵非其人則納侮之道無恥過作非恥過誤而文之遂成大非惟厥攸居政事惟醇其所居行皆如所言則王之政事純粹黷于祭祀時謂弗欽禮煩則亂事神則難祭不欲數數則黷黷則不敬事神禮煩則亂而難行髙宗之祀特豐數近廟故說因是以戒之王曰㫖哉說乃言惟服㫖美也美其所言皆可服行乃不良于言予罔聞于行汝若不善于所言則我無聞于所行之事說拜稽首曰非知之艱行之惟艱言知之易行之難以勉髙宗王忱不艱允協于先王成徳王之誠不以行之爲難則信合于先王成徳惟說不言有厥咎王能行善而說不言則有其咎罪王又曰來汝說台小子舊學于甘盤舉先王之道甘盤殷賢臣有道徳者既乃遯于荒野入宅于河既學而終廢業遯居田野河洲也其父欲使髙宗知艱苦故使居民間自河徂亳暨厥終罔顯自河徃居亳欲令其終故遂無顯明之徳也爾惟訓于朕志言汝當教訓于我而使我志通達若作酒醴爾惟麴蘖酒醴須麴蘖以成亦言我須汝以成也若作和羮爾惟鹽梅鹽鹹梅酸羮須鹹酸以和之爾交修予罔予棄予惟克邁乃訓交非一人之義邁行也言我能行汝教說曰王人求多聞時惟建事學于古訓乃有獲王者求多聞以立事學于古訓乃有所得也事不師古以克永世匪說攸聞事不法古訓而以能長世非說所聞言無是道惟學遜志務時敏厥修乃來學以順志務是敏疾其徳之修乃來允懷于兹道積于厥躬信懷此學志則道積于其身惟斆學半念終始典于學厥徳修罔覺斆教也教然後知困是學之半終始常念學則其徳之修無能自覺監于先王成憲其永無愆愆過也視先王成法其長無過其惟學乎惟說式克欽承旁招俊乂列于庶位言王能志學說亦用能敬承王志廣招俊乂使列衆官王曰嗚乎四海之内惟仰朕徳時乃風風教也使天下皆仰我徳是汝教股肱惟人良臣惟聖手足具乃成人有良臣乃成聖昔先正保衡作我先王保衡伊尹也作起也正長也言先世長官之臣乃曰予弗克俾厥后惟堯舜其心愧恥若撻于市言伊尹不能使其君如堯舜能則恥之若見撻于市故成其一夫不獲則曰時予之辜伊尹見一夫不得其所則以爲己罪佑我烈祖格于皇天言以此道左右成湯功至于天無能及者爾尚明保予罔俾阿衡專美有商汝庶幾明安我事則與伊尹同美惟后非賢不乂惟賢非后不食言君須賢治賢須君食其爾克紹乃辟于先王永綏民能繼汝君于先王長安民則汝亦有保衡之功說拜稽首曰敢對揚天子之休命對答也答受美命而稱揚之周召公爲太保作旅獒召公陳戒旅獒因獒而陳道義惟克商遂通道于九夷八蠻四夷慕化貢其方物九八言非一皆通道路無逺不及西旅底貢厥獒西旅之長致貢其獒犬髙四尺曰獒以大爲異太保乃作旅獒用訓于王陳貢獒之義以訓諫王曰嗚呼明王慎徳四夷咸賔言明王慎徳以懷逺故四夷無不賔服無有逺邇畢獻方物惟服食器用天下萬國無有逺近盡貢其方土所生之物惟可以貢服食器用者言不爲耳目華侈王乃昭徳之致于異姓之邦無替厥服徳之所致謂逺夷之貢以分賜異姓諸侯使無廢其職分寳玉于伯叔之國時庸展親以寳玉分同姓之國是用誠信其親親之道人不易物惟徳其物言物貴由人有徳則物貴無徳則物賤所貴在于徳徳盛不狎侮徳盛必自敬何狎易侮慢之有狎侮君子罔以盡人心以虛受人則人盡其心矣狎侮小人罔以盡其力以悦使民民忘其勞則力盡矣不役耳目百度惟貞言不以聲色自役則百度貞玩人䘮徳玩物喪志以人爲戲弄則䘮其徳以器爲戲弄則䘮其志志以道寧言以道接在心爲志發氣爲言皆以道爲本故君子勤道不作無益害有益功乃成不貴異物賤用物民乃足逰觀為無益竒巧為異物言明王之道以德義為益器用為貴所以化俗生民犬馬非其土性不畜非此土所生不畜以不習其用珍禽竒獸不育于國皆非所用有損害故不寳逺物則逺人格不侵奪其利則來服矣所寳惟賢則邇人安寳賢任能則近人安近人安則逺人至矣嗚呼夙夜罔或不勤言當早起夜寐常勤于德不矜細行終累大德輕忽小物積害毁大故君子慎其㣲為山九仞功虧一簣八尺曰仞喻向成也未成一簣是以聖人乾乾日昃慎終如始允迪兹生民保厥居惟乃世王言其能信蹈行此戒則生人安其居天子乃世世王天下武王雖聖猶設此誡况非聖人可以無戒乎其不免于過則亦宜矣召公既相雒宅作召誥曰王先服殷御事比介于我有周御事召公既述周公所言又自陳己意以終其戒言當先服治殷家御事之臣使比近于我有周治事之臣必協和乃可一節性惟日其邁和比殷周之臣時節其性令不失中則道化惟日其行王敬作所不可不敬德敬為所不可不敬之德則下敬承其命矣我不可不監于有夏亦不可不監于有殷言王當視夏殷法其歴年戒其不長我不敢知曰有夏服天命惟有歴年以能敬徳故多歴年數我不敢獨知亦王所知我不敢知曰不其延惟不敬厥德乃早墜厥命言桀不謀長久惟以不敬其德故乃早墜失其王命亦王所知我不敢知曰有殷受天命惟有歴年夏言服殷言受明受而服行之互相兼也殷之賢王猶夏之賢王所以歴年亦王所知我不敢知曰不其延惟不敬厥德乃早墜厥命紂早墜其命猶桀不敬其德亦王所知今王嗣受厥命我亦惟兹二國命嗣若功厥夏殷也繼受其王命亦惟當以此夏殷長短之命為監戒繼順其功德者而法則之王乃初服嗚呼若生子罔不在厥初生自貽哲命言王新即政始服行教化當如子之初生習于善則善矣自貽智命無不在其初生為政之道亦猶是也今天其命哲命吉凶命歴年今天制此三命惟人所修修敬德則有智則常吉則歴年惟不敬德則愚凶不常雖說天其實在人知今我初服宅新邑肆惟王其疾敬德天已知我王今初服政居新邑雒都故惟王其疾行敬德王其德之用祈天永命言王當其德之用求天長命以歴年其惟王勿以小民滛用非彛勿用小民過用非常欲其重民秉常亦敢殄戮用乂民亦惟果敢絶刑戮之道用治民戒以慎罰若有功其惟王位在德元順行禹湯所有成功則其惟王居位在德之首小民乃惟刑用于天下越王顯王在德元則小民乃惟用法于天下言法政于王亦有光明上下勤恤其曰我受天命丕若有夏歴年式勿替有殷歴年言當君臣勤憂敬德曰我受天命大順有夏之多歴年勿用廢有殷歴年庶幾兼之欲王以小民受天永命我欲王用小民受天長命言長有民拜手稽首曰予小臣敢以王之讐民百君子拜手首至手稽首首至地盡禮致敬以入其言言我小臣謙辭敢以王之匹民百君子治民者非一人言民在下自上匹之越友民保受王威命明徳言與匹民百君子于友愛民者共安受王之威命明徳奉行之王末有成命王亦顯臣下受安王命則王終有天成命于王亦昭著我非敢勤惟恭奉幣用供王能祈天永命言我非敢獨勤而已惟恭敬奉其幣帛用供待王能求天長命將以慶王多福必上下勤恤乃與小民受天永命周公相成王既成雒邑王拜手稽首誨言成王盡禮致敬于周公求教誨之言周公曰王肇稱殷禮祀于新邑咸秩無文言王當始舉殷家祭祀以禮典祀于新邑皆次秩不在禮文而祀之予齊百工伻從王于周予惟曰庶有事我整齊百官使從王于周行其典禮我惟曰庶㡬有善政事今王即命曰記功宗以功作元祀今王就行王命于雒邑曰當記人之功尊人亦當用功大小爲序有大功則列大杞謂功施于民者惟命曰汝受命篤弼丕視功載乃汝其悉自教工惟天命我周邦汝受天命厚矣當輔大天命視羣臣有功者記載之乃汝新即政其當盡自教衆官躬化之孺子其朋孺子其朋其往少子慎其朋黨少子慎其朋黨戒其自今以往無若火始熖熖厥攸灼序弗其絶言朋黨敗俗所宜禁絶無令若火始然燄燄尚㣲其所及灼然有次序不其絶事從微至著防之宜以初厥若彞及撫事如予惟以在周工其順長道及輔國事如我所爲惟用在周之百官往新邑伻嚮即有僚明作有功惇大成裕汝永有辭往行政化于新邑當使臣下各嚮就有官明爲有功厚大成寛裕之徳則汝常有歎譽之辭于後世公曰汝惟冲子惟終口呼汝惟童子嗣父祖之位惟其終美汝其敬識百辟享亦識其有不享享多儀儀不及物惟曰不享奉上謂之享言汝爲王其當敬識百君諸侯之奉上者亦識其有違上者奉上之道多威儀威儀不及禮物惟曰不奉上惟不役志于享凡民惟曰不享惟事其爽侮言人君惟不役志于奉上則凡人化之惟曰不奉上矣如此則惟政事其差錯侮慢不可治理也乃惟孺子頒朕不暇聽朕教汝于棐民彞我爲政常若不暇汝惟小子當分取我之不暇而行之聽我教汝于輔民之常而用之汝乃是不蘉乃時惟不永哉汝乃是不勉爲政汝是爲不可長哉欲其必勉爲可長篤叙乃正父罔不若予不敢廢乃命厚次序汝正父之道而行之無不順我所爲則天下不敢棄汝命常奉之汝往欽哉兹予其明農哉彼裕我民無逺用戾汝往居新邑敬行教化哉如此我其退老明教農人以義哉彼天下被寛裕之政則我民無逺用戾言皆來王若曰公明保予沖子成王順周公意請留之自輔言公當明安我童子不可去之公稱丕顯徳以予小子揚文武烈言公當留舉大明徳用我小子褒揚文武之業而奉順天奉答天命和恆四方民居師又當奉答天命以和恒四方之民居處其衆惇宗將禮稱秩元祀咸秩無文厚尊大禮舉秩大祀皆次秩無禮文而宜在祀典者凡此待公而行惟公德明光于上下勤施于四方言公明徳光于天地勤政施于四海萬邦四夷服仰公德而化之旁作穆穆迓衡不迷文武勤教四方旁求為敬敬之道以迎太平之政不迷惑于文武所勤之教言化洽予沖子夙夜毖祀言政化由公而立我童子徒早起夜寢慎其祭祀而已無所能也王曰公功棐廸篤罔不若時公之功輔道我已厚矣天下無不順而是公之功王曰公予小子其退即辟于周命公後我小子退坐之後使就君于周命立公後公當留輔我四方廸亂未定于宗禮亦未克敉公功言四方雖道治猶未定于禮禮未彰是亦未能撫順公之大功明不可以去廸將其後監我士師工公留教道將助我其今已後之政監篤我政事衆官委任之言誕保文武受民亂為四輔大安文武所受之民治之為我四維之輔明當依公王曰公定予往已公功肅將祗歡公留以安定我我從公言往至雒邑已矣公功以進大天下咸敬樂公功公無困哉我惟無斁其康事公勿替刑四方其世享公必留無去以困我哉我惟無厭其安天下事功無去以廢法則四方其世世享公之德周公拜手稽首曰王命予來承保乃文祖受命民拜而後言許成王留言王命我來成安汝文德之祖文王所受命之民是所以不得去越乃光烈考武王𢎞朕恭于汝大業之父武王大使我恭奉其道叙成王留己意孺子來相宅其大惇典殷獻民小子今所以來相宅于雒邑其大厚行典常于殷賢人亂爲四方新辟作周恭先言當治理天下新其政化爲四方之新君爲周家恭敬之王後世所惟見也曰其自時中乂萬邦咸休惟王有成績曰其當用是土中爲治使萬國皆被美徳如此惟王乃有成功予旦以多子越御事篤前人成烈答其師作周孚先我旦以卿大夫于御治事之臣厚率行先王成業當其衆心爲周家立信者之所推先也考朕昭子刑乃單文祖徳伻來毖殷乃命寧我所成明子法乃盡文祖之徳謂典禮也所以居土中是文武使已來慎教殷民乃見命而安之予以秬鬯二卣曰明禋拜手稽首休享周公攝政七年致太平以黒黍酒二器明潔致敬告文武以美享既告而致政成王留之予不敢宿則禋于文王武王言我見天下太平則潔告文武不經宿惠篤叙無有遘自疾萬年厭于乃徳殷乃引考汝爲政當順典常厚行之使有次序無有過用患疾之道者則天下萬年厭于汝徳殷乃長成爲周王伻殷乃承叙萬年其永觀朕子懷徳王使殷民上下相承有次序則萬年之道民其常觀我子孫而歸其徳矣勉使終之成王既即政周公作無逸曰嗚呼君子所其無逸歎美君子之道所在念徳其無逸豫君子且猶然况王者乎先知稼穡之艱難乃逸則知小人之依稼穡農夫之艱難事先知之乃謀逸豫則知小人之所依怗相小人厥父母勤勞稼穡厥子乃不知稼穡之艱難視小人不孝者其父母躬勤艱難而子乃不知其勞乃逸乃諺既誕否則侮厥父母曰昔之人無聞知小人之子既不知父母之勞乃爲逸豫逰戲乃叛諺無不恭已欺誕父母不欺則輕侮其父母曰古老之人所聞知周公曰嗚呼我聞曰昔在殷王中宗太戊也殷家中世尊其徳故稱宗嚴恭寅畏天命自度言太戊嚴恪恭敬畏天命用法度治民祗懼不敢荒寧爲政敬身畏懼不敢荒怠自安肆中宗之享國七十有五年以敬畏之故得夀考之福其在髙宗時舊勞于外爰暨小人武丁其父小乙使之久居民間勞是稼穡與小人出入同事作其即位乃或亮隂三年不言武丁起其即王位則小乙死乃有信黙三年不言言孝行著其惟不言言乃雍不敢荒寧在䘮則其惟不言䘮畢發言則天下和亦法中宗不敢荒怠自安嘉靖殷邦至于小大無時或怨善謀殷國至于小大之非政人無是有怨者言無肆髙宗之享國五十有九年髙宗爲政小大無怨故亦享國永年其在祖甲不義惟王舊爲小人湯孫太甲爲王不義久爲小人之行伊尹放之桐作其即位爰知小人之依能保惠于庶民不敢侮鰥寡在桐三年思戢用光起就王位于是知小人之所依依仁政故能安順于衆民不敢侮慢煢獨肆祖甲之享國三十有三年人甲亦以知小人之依故得久年此以徳優劣立年多少爲先後故祖甲在下殷家亦祖其功故稱祖自時厥後立王生則逸從是三王各承其後而立者生則逸豫無度生則逸不知稼穡之艱難言與小人之子同其敝不聞小人之勞惟耽樂之從過樂謂之耽惟樂之從言荒滛自時厥後亦罔或克夀以耽樂之故從是其後亦無有能夀考或十年或七八年或五六年或四三年髙者十年下者三年言逸樂之損夀周公曰嗚呼厥亦惟我周太王王季克自抑畏太王周公曾祖王季即祖言皆能以義自抑畏敬天命將說文王故本其父祖文王卑服即康功田功文王節儉卑其衣服以就其安人之功以就田功以知稼穡之艱難徽柔懿㳟懷保小民惠鮮鰥寡以美道和民故民和之以美政㳟民故民安之又加惠鮮于鰥寡之人自朝至于日中昃不遑暇食用咸和萬民從朝至日昃不暇食思慮政事用皆和萬民文王不敢盤于逰田以庶邦惟正之供文王不敢樂于逰逸田獵以衆國所取法則當以正道供待之故文王受命惟終身厥享國五十年文王九十七終中身即位時年四十七言中身舉全數周公曰嗚呼繼自今嗣王繼從今已往嗣世之王皆戒之則其無滛于觀于逰于逸于田以萬民惟正之供所以不敢過于觀逰逸豫田獵者用萬民當惟正身以供待之故無皇曰今日耽樂乃非民攸訓非天攸若時人丕則有愆無故自暇曰惟今日樂後日止夫耽樂者乃非所以教民非所以順天是人則大有過矣無若殷王受之迷亂酗于酒徳哉以酒爲凶謂之酗言紂心迷政亂以酗酒爲徳戒嗣王無如之周公曰嗚呼我聞曰古之人猶胥訓告胥保惠胥教誨嘆古之君臣雖君明臣良猶相訓告相安順相教訓以義方民無或胥譸張爲幻譸張誑也君臣以道相正故下民無有相欺誑幻惑也此厥不聽人乃訓之乃變亂先王之正刑至于小大此其不聽中正之君人乃教之以非法乃變亂先王之正法至于小人無不變亂言己有以致之民否則厥心違怨否則厥口詛祝以君變亂正法故民否則其心違怨其口詛祝言皆怨其上周公曰嗚呼自殷王中宗及髙宗及祖甲及我周文王兹四人廸哲言此四人皆蹈明徳以臨下厥或告之曰小人怨汝詈汝則皇自敬徳其有告之言小人皆怨詈汝者則大自敬増修善政厥愆曰朕之愆允若時不啻不敢含怒其人有過則曰我過百姓有過在予一人信如是之怨詈則四王不啻不敢含怒以罪之言當和悦此厥不聽人乃或譸張爲幻曰小人怨汝詈汝則信之此其不聽中正之君有人誑惑之言小人怨憾詛詈汝則信受之則若時不永念厥辟不寛綽厥心則如是信讒者不長念其爲君之道不寛緩其心言含怒亂罰無罪殺無辜怨有同是叢于厥身信讒含怒罰殺無罪則天下同怨讐之叢聚于其身周公曰嗚呼嗣王其監于兹視亂罰之禍以爲戒又作立政周公既致政成王恐其怠忽故以君臣立政爲戒立政言用臣當共立政故名篇周公若曰拜手稽首告嗣天子王矣順古道盡禮致敬告成王言嗣天子今以爲王矣不可不慎用咸戒于王曰王左右常伯常任準人綴衣虎賁周公用王所立政之事皆戒于王曰常所長事常所委任謂三公六卿準人平法謂士官綴衣掌衣服虎賁以武力事王皆左右近臣宜得其人周公曰嗚呼休兹知恤鮮哉歎此五者立政之本知憂得其人者少古之人廸惟有夏乃有室大競籲俊尊上帝古之人廸惟有夏禹之時乃有卿大夫室家大强猶乃招呼賢俊與共尊事上天廸知忱恂于九徳之行禹之臣蹈知誠信于九徳之行謂賢智大臣九徳臯陶所謀乃敢告教厥后曰拜手稽首后矣曰宅乃事宅乃牧宅乃準兹惟后矣知九徳之臣乃敢告教其君以立政后矣亦猶王矣宅居也居汝事六卿掌事者牧牧民九州之伯居内外之官及平法者皆得其人則此爲君矣謀面用丕訓徳則乃宅人兹乃三宅無義民謀所靣見之事無疑則能用大順徳乃能居賢人于衆官若此則乃能三居無義民大罪宥之四裔次九州之外次中國之外桀徳惟乃弗作往任是惟暴徳罔後桀之爲徳惟乃不作先王之法往所委任是爲暴徳之人故絶世無後亦越成湯陟丕釐上帝之耿命桀之昏亂亦于成湯之道得升大賜上天之光命王以天下乃用三有宅克即宅曰三有俊克即俊湯乃用三有居惡人之法能使就其居言服罪又曰能用剛柔正直三徳之俊能就其俊事言明徳嚴惟丕式克用三宅三俊言湯所以能嚴威惟可大法象者以能用三居三徳之法其在商邑用協于厥邑其在四方用丕式見徳湯在商邑用三宅三俊之道和其邑其在四方用是大法見其徳業言逺近化嗚呼其在受徳暋惟羞刑暴徳之人同于厥邦受徳紂字帝乙愛焉惟作善字而反大惡自强惟進用刑與暴徳之人同于其國並爲威虐乃惟庶習逸徳之人同于厥政乃惟衆習爲過徳之人同與其政言不任賢帝欽罰之乃伻我有夏式商受命奄甸萬姓天以紂惡故敬罰之乃使我周家王有華夏得用商所受天命同治萬姓皇天無親佑有徳亦越文王武王克知三有宅心灼見三有俊心紂之不善亦于文武之道大行以能知三有居惡之心灼然見三有賢俊之心以敬事上帝立民長伯言文武知三宅三俊故能以敬事上天立民正長謂郊祀天建諸侯立政任人準人牧夫作三事文武亦法禹湯以立政常任準人及牧治爲天地人之三事虎賁綴衣趣馬小尹趣馬掌馬之官言此三者雖小官長必慎擇其人左右攜僕百司庶府雖左右攜持器物之僕及百官有司主劵契臧吏亦皆擇人大都小伯藝人表臣百司小臣猶皆慎擇其人况大都小邑之長以道義爲表幹之臣及百官有司之職可以非其任乎太史尹伯庶常吉士太史下大夫掌邦六典之貳尹伯長官大夫及衆長常事之善士皆得其人司徒司馬司空亞旅此有三卿及次卿衆大夫則是文武未伐紂時舉文武之初以為法則夷微盧烝三亳阪尹蠻夷㣲盧之衆師及亳人之歸文王者三所為之立監及阪地之尹長皆用賢文王惟克厥宅心乃克立兹常事司牧人以克俊有德文王惟其能居心逺惡舉善乃能立此常事司牧人用能俊有德者文王罔攸兼于庶言庶獄庶慎惟有司之牧夫文王無所兼知于毁譽庶言及衆刑獄衆當所慎之事惟慎擇有司牧夫而已勞于求賢逸于任賢是訓用違庻獄庻慎文王罔敢知于兹是萬民順法用違法衆獄衆慎之事文王一無敢自知于此委任賢能而已亦越武王率惟敉功不敢替厥義德亦于武王循天惟文王撫安下之功不敢廢其義德奉遵父道率惟謀從容德以並受此丕丕基武王循惟謀從文王寛容之德故君臣並受此大父之基業傳之子孫也嗚呼孺子王矣歎稚子今以為王矣可不勤法祖考之德繼自今我其立政立事準人牧夫我其克灼知厥若丕乃俾亂維用今已往我其立政大臣立事小臣及準人牧夫我其能灼然知其順者則大臣乃使治之言知臣下之勤勞然後莫不盡心力也相我受民和我庶獄庶慎時則勿有間之能治我所受天民和于我衆獄之事如是則勿有以代之言不可復變自一話一言我則末惟成德之彦以乂我受民言政當用一善善在一言而已欲其口無擇言如此我則終惟有成德之美以治我所受之民嗚呼予旦己受人之徽言咸告孺子王矣歎所受賢聖說禹湯之美言皆以告稚子王矣繼自今文子文孫其勿誤于庶獄庶慎惟正是乂之文子文孫文王之子孫從今已往惟以正是之道治衆獄衆慎其勿誤自古商人亦越我周文王立政立事牧夫準人則克宅之克由繹之兹乃俾乂言用古商湯亦于我周文王立政立事用賢人之法能居之于心能用陳之此乃使天下治國則罔有立政用憸人不訓于徳是罔顯在厥世商周賢聖之國則無有立政用憸利之人者憸人不順于徳是使其君無顯名在其世繼自今立政其勿以憸人其惟吉士用勱相我國家立政之民惟以吉士用勉治我國家今文子文孫孺子王矣告文王之子孫言稚子已即政爲王矣所以厚戒其勿誤于庶獄惟有司之牧夫獨言衆獄有司欲其重刑慎官人其克詰爾戎兵以陟禹之迹其當能治汝戎服兵器威懐並設以升禹治水之舊迹方行天下至于海表罔有不服方四方海表蠻夷戎狄無有不服化者以覲文王之耿光以揚武王之大烈能使四夷賔服所以見祖之光明揚父之大業嗚呼繼自今後王立政其惟克用常人其惟能用賢才爲常人不可以天官有所私周公若曰太史順其事并告太史司㓂蘇公式敬爾由獄以長我王國忿生爲武王司㓂封蘇國能用汝敬汝所用之獄以長施行于我王國言王獄當求蘇公之比兹式有慎以列用中罰此法有所慎行必以其列用中罰不輕不重蘇公所行太史掌六典有廢置官人之制故告之也册府元龜巻三百十一
