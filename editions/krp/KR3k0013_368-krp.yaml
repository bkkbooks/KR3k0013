body:
  text: 册府元龜卷三百六十八宋王欽若等撰將帥部攻取夫用師伐叛有攻取之道所以摧堅壘而克敵成竒功而定霸者也葢夫梯衝之僃鉤援之設竭機械之智冐矢石之難先登以勵勇氣長圍以縱兵力皆所以振威武而寧禍亂焉三代而下本兵柄者或奉亂致討誓衆以進葢以乘墉傅堞以恣其攻擊樹梯鳴角以奮其勢固乃麾城有振槁之易畧地成益國之美茂功舉集威名震赫圖鍾石而兼著誓河山而不朽者曷嘗不繇是哉楚鬬廉帥師及巴師圍鄾鬬廉楚大夫鄧養甥聃甥帥師救鄾三逐巴師不克二甥皆鄧大夫鬬廉衡陳其師於巴師之中以戰而北衡横也分巴師為二部鬬廉横陳於其間以與鄧師戰而偽北北走也鄧人逐之背巴師而夾攻之楚師偽走鄧師逐之背巴師巴師攻之鄧師大敗鄾人宵潰郄叔虎晉大夫也晉獻公田見翟柤之氛翟柤國名氛祲氣象也㐫曰氛吉曰祥歸寢不寐欲伐翟柤也郄叔虎朝公語之語以寢不寐出遇士蒍曰今夕君寢不寐必為翟柤君若伐之可尅也子必言之士蒍以告公説乃伐翟柤郄叔虎將乘城乗升其徒曰棄政而役非其任也政職也役戌役郄叔虎曰旣無老謀而又無壮事何以事君壯事力役也言已無謀又恥無功被羽先升遂尅之羽鳥羽繫於背若今軍將負眊公子嬰齊字子重為楚令尹魯成公九年十一月帥師伐莒圍渠丘渠丘城惡衆潰奔莒戊申楚入渠丘月六日莒人囚楚公子平楚人曰勿殺吾歸而俘莒人殺之楚師圍莒莒城亦惡庚申莒潰月十八日楚遂入鄆莒無備故也荀罃晉大夫將中軍士匄佐中軍荀偃將上軍魯襄公十年夏四月戊午㑹于柤經書春書始行也戊午月一日荀偃士匄請伐偪陽而封宋向戌焉以宋常事晉向戌有賢行故欲封之為附庸荀罃曰城小而固勝之不武弗勝為笑固請丙寅圍之弗克諸侯之師久於偪陽荀偃士匄請於荀罃曰水潦將降懼不能歸向夏恐有久雨從丙寅至庚寅二十五日故曰久請班師班還也知伯怒知伯荀罃投之以機出於其間出偃匄之間曰女成二事而後告余二事伐偪陽封向戌余恐亂命以不女違既成改之為亂命女既勤君而興諸侯牽帥老夫以至于此既無武守無武功可執守而又欲易余罪曰是實班師不然克矣謂偃匄將言耳余羸老也可重任乎不任受女此責七日不克必爾乎取之言當取女以謝不克之罪五月庚寅月四日荀偃士匄帥卒攻偪陽親受矢石躬在矢石間甲午滅之荀吳晉大夫帥師伐鮮虞圍鼓鼔白狄之别種下曲陽縣有鼔亭甚急鼓人或請以城叛荀吳弗許使敵殺叛人増守僃圍鼓三月鼓人告食竭力盡而取之滅鼓而返不戮一人髙發齊大夫帥師伐莒初莒有婦人莒子亡其夫已為婺婦及老託於紀鄣紡焉以度而去之田紡纑連所紡以度城而藏之及師至則投諸外投繩城外或獻之子占子占使師夜縋而登縋繩登城登者六十人懸絶師鼓譟城上之人亦譟莒共公懼啓西門出齊師入紀秦白起為將攻韓拔九城斬首五萬田單為齊上將興師十餘萬將以攻翟往見魯仲連子仲連子曰將軍之攻翟必不能下矣田將軍曰單以五里之城十里之郭復振齊國何為攻翟不能下也及攻翟三月不下齊之童兒謡曰大冠如箕長劔拄頥攻翟不能下累於吾兵於是田單恐駭往見仲連子曰先生何以知單攻翟不能下也仲連子曰夫將軍即墨之時坐則織蕢立則杖鍤為士卒唱日恐宗廟亡失故將軍有死之心士卒無生之氣今將軍東有掖邑之封西有淄上之寶黄金横帶馳乎淄澠之間有以樂生而惡死也田單明日結髪袒于矢石之間乃援桴而鼓之翟人下之趙襄子晉大夫簡子子也簡子死未葬中牟入齊中牟自入臣於齊也已葬五日襄子起兵攻之圍未合而城自壊者十丈襄子擊金而退之軍法皷以進衆鉦以退之軍吏諌曰君誅中牟之罪而城自壞是天助我何故去之襄子曰吾聞之叔向曰君子不乘人於利不迫人於險使之治城城成而後攻之中牟聞其義乃請降漢周勃以中㳙從沛公下胡陵方與音房豫攻豐復攻碭破之下下邑先登賜爵五大夫攻蘭虞取之畧定魏地攻轅戚東緍以徃至栗取之攻齧桑先登下蘄城攻都闗定陶攻開封先至城下為多多謂功多又攻東郡尉於成武破之攻長社先登攻潁陽緱氏南攻南陽守齮破武闗攻秦軍於藍田樊噲以舍人從沛公攻胡陵方與擊泗水監豐下破之泗水郡名監謂監郡破之豐縣下嘗從沛公軍濮陽攻城先登斬首二十三級從攻陽城先登下戸牖後攻圉都尉陳留圍縣東郡守尉於成武又從攻秦軍出亳南今河南偃師湯亭是河間守軍於杠里破之杠音江從攻破楊熊於曲遇攻宛陵先登斬首八級捕虜四十四人從攻長社轘轅絶河津東攻秦軍尸鄉南攻秦軍於犨攻宛城先登攻武闗至霸上從入漢中還從攻雍斄城先登擊章平軍好畤攻城先登遷為將軍攻趙賁下郿槐里栁中咸陽栁中即細栁地灌廢丘最以水灌廢丘也從攻項羽屠煑棗攻鄒魯瑕丘薛彭越為魏相國項王與漢王相距滎陽越攻下睢陽外黄十七城酈商以所將四千人屬沛公於岐從攻長社先登從攻緱氏絶河津從下宛穰定十七縣别將攻旬闗漢中旬水上之闗受梁相國印從擊項羽攻胡陵夏侯嬰為太僕常奉車從攻胡陵降賜爵五大夫東攻濟陽下戸牖從攻南陽灌嬰為中謁者攻下外黄西收軍於滎陽韓信已定齊地使嬰别將攻博陽前至下相以東南僮取慮徐僮慮徐三縣名度淮盡降其城邑又攻苦譙二縣名追項籍至東城斬籍下東城歴陽度江破吳郡長吳下得吳守遂定吳豫章㑹稽還定淮北五十二縣靳歙以中㳙從沛公攻濟陽别西擊章平軍定隴西六縣後漢鄧禹從光武自薊至信都王郎起兵使禹發奔命得數千人令自將之别攻拔櫟陽禹為前將軍持節西入闗建武元年正月禹自箕闗將入河東箕關在今王屋縣東河東都尉守闗不開禹攻十日破之蓋延為虎牙將軍建武二年夏督駙馬都尉馬武等伐劉永先攻拔襄邑進取麻鄉遂圍永於睢陽數月盡收野麥夜梯其城入永驚懼引兵走出東門延追擊大破之岑彭為廷尉行大將軍事建武八年彭與蓋延耿弇圍隗囂於西城彭遂壅谷水灌西城城未没丈餘時以縑囊盛土為隄灌西城谷水從地中數丈涌出故城不拔囂將行巡周宗將蜀救兵到囂得出還冀漢軍退吳漢為大司馬從征董憲憲與龎萌走保胊漢進圍胊城明年城中穀盡憲萌潛出襲取贛音貢榆贛榆縣名今海州東海縣瑯琊太守陳俊攻之憲萌走澤中㑹漢下胊城盡獲其妻子祭遵為征虜將軍建武中新城蠻中山賊張滿屯結險隘為人害詔遵攻之遵絶其糧道滿數挑戰遵堅壁不出而厭新柏華餘賊復與滿合遂攻得霍陽聚遵乃分兵擊破降之明年春張滿饑困城拔生獲之耿弇為大將軍時張步據齊地弇總兵討之步使其大將費邑軍歴下又分守祝阿鍾城弇先擊祝阿自晨攻城未中而拔之故開圍一角令其衆得奔歸鍾城之人聞祝阿已潰大恐懼遂空壁亡去後弇軍臨淄西安之間張步都臨淄使弟𤣥武將軍藍將兵守西安弇視西安城小而堅藍兵又精未易攻也臨淄諸郡太守相與雜居人不專一其勢雖大而虚易攻弇内欲攻之告令軍中治取攻具後五日攻西安復縱生口令歸藍聞之晨夜守城至期夜半令軍皆蓐食會明咸請攻西安弇曰吾揚言欲攻西安令方自憂治城具而吾攻臨淄一日必拔吾得臨淄即西安孤必復亡矣且西安城堅精兵二萬人攻之未可卒下士卒必多死傷正使得其城張藍引兵入臨淄臨淄更彊吾深入敵境後無轉輸旬月間不戰而困諸君不見耳弇遂擊臨淄至日中破之藍聞臨淄拔果將其衆亡歸朱雋為鎮賊中郎將與荆州刺史徐璆共討黄巾擊賊帥趙𢎞斬之賊餘帥韓忠復據宛乞降雋不許因急攻連戰不克雋登土山觀之顧謂張超曰吾知之矣賊今外圍周固内營逼急乞降不受欲出不得所以死戰也萬人一心尤不可當况十萬乎其害甚矣不如徹圍并兵入城忠見圍解勢必自出則意散易破之道也既而圍解忠果出戰大擊破之郭典為鉅鹿太守與中郎將董卓攻黄巾賊張寶於下曲陽作圍塹而卓不肯典曰受詔攻賊有賊而已使諸將引兵屯東典獨於西當賊之衝晝夜進攻寶繇是守城不敢出時謂之語曰郭君圍塹董將不許幾令狐狸化為豺虎賴我郭君不畏彊禦轉機之間敵為窮虜猗猗惠君實完疆土袁紹為冀州牧時公孫瓚破擒劉虞盡有幽州之地乃盛修營壘樓觀數十臨易河通遼海獻帝建安三年紹大攻瓚遣子續請救於黒山諸帥而欲自將突騎直出傍西山以斷紹後長史闗靖諌曰今將軍將士莫不懷瓦解之心所以猶能相守者顧戀其老小而恃將軍為主故耳堅守曠日或可使紹自退若舍之而出後無鎮重易京之危可立待也瓚乃止紹漸相攻逼瓚衆日䠞乃却築三重營以自固四年春黒山賊帥張燕與續率兵十萬三道來救瓚未及至瓚乃宻使行人齎書告續曰昔周末喪亂僵屍蔽地以意而推猶為否也不圖今日親當其鋒袁氏之攻狀若鬼神梯衝舞於樓上皷角鳴於地中日窮月急不遑啓處鳥戹歸人滀水陵高滀水丑六切喻急也汝當碎首於張燕馳驟以告急父子天性不言而動言相感也且厲五千鐵騎於北隰之中下溼曰隰起火為應吾當自内出奮揚威武決命於斯不然吾亡之後天下雖廣不容汝足矣紹候得其書魏氏春秋候者得書紹與陳琳易其詞如期舉火瓚以為救至遂便出戰紹設伏瓚遂大敗復還保中小城自計必不全乃悉縊其姊妹妻子然後引火自焚紹兵趣登臺斬之闗靖見瓚敗歎恨曰前若不止將軍自行未必不濟吾聞君子陷人於危死同其難豈可以獨生乎乃䇿馬赴紹軍而死魏陳泰為征西將軍時蜀將姜維率衆侵魏依麴山築二城使牙門將句安李歆等守之聚羌胡質任等冦逼諸郡泰禦之謂諸將曰二城雖固去蜀險逺當須運糧羌夷患維勞苦必未肯附今圍而取之可不血刄而拔其城雖其救之山道險阻非行兵之地乃使鄧艾等進兵圍之斷其運道及城外流水安等挑戰不許將士窘困分糧聚雪以稽日月維果來救出自牛頭與㤗相對泰曰兵法貴在不戰而屈人今絶牛頭維無返道則我之禽也諸將各堅壘勿與戰自南度白水循水而東使諸將截其還路維懼遁走安等孤懸遂皆降吳董襲為偏將軍大帝討黄祖祖横兩蒙衝挾守沔口以栟閭大紲繫石為矴上有千人以弩交射飛矢雨下軍不得前襲與凌統俱為前部各將敢死百人人被兩鎧乘大舸船突入蒙衝襲身以刀斷兩紲蒙衝乃横流大兵遂進祖開門走兵進斬之吕蒙為偏將軍曹公遣朱光為廬江太守屯皖大開稻田又令間人招誘鄱陽賊帥使作内應蒙曰皖田肥美若一收熟彼衆必増如是數歲操態見矣宜早除之乃具陳其狀於是大帝親征皖引見諸將問以計䇿諸將皆勸作土山添攻具蒙趨進曰治攻具及土山必歴日乃成城僃既修外救必至不可圖也且乗雨水以入若留經日水必向盡還道艱難蒙竊危之今觀此城不能甚固以三軍鋭氣四面並攻不移時可拔及水以歸全勝之道也大帝從之蒙乃薦甘寧為升城都督督攻在前蒙以精鋭繼之侵晨進攻蒙手執枹鼔士卒皆騰踴自升食時破之既而張遼至夾石聞城已拔乃退程普與周瑜為左右督破曹公於烏林進攻南郡走曹仁又云周泰與瑜程普攻曹仁於南郡晉陶璜初仕吳歴顯位孫皓時交阯郡吏以郡内附武帝遣巴西馬融為交阯太守融病卒南中監軍霍弋又遣犍為楊穆代融與將軍毛炤等自蜀出交阯衆遣璜等距穆初霍弋之遣穆毛炤等與之誓曰若賊圍城未百日而降者家屬誅若過百日救不至吾受其罪穆等守未百日糧盡乞降璜不許給其糧使守諸將並諌璜曰霍弋已死不能救穆等必矣可須其日滿然後受降使彼得無罪我受有義内訓百姓外懷隣國不亦可乎穆等期訖糧盡救兵不至乃納之朱伺為威逺將軍討陳聲聲保董城伺率諸軍圍之遂重柴繞城作高櫓以勁弩下射之乃斷其水道城中無水殺牛飲血閻晉聲婦弟也乃斬聲首出降前燕慕容恪為侍中率兵討段龕於廣固恪圍之諸將勸恪宜急攻之恪曰兵法十圍五攻段龕恩結賊黨衆未離心今憑固天險上下同心若其促攻不過數旬雖能尅之但恐傷吾士衆當持久以取耳乃築室返耕嚴固圍壘終尅廣固又燕將吕護據野王隂通晉事覺恪率衆討之將軍傅顔言於恪曰前以廣固無險易守難攻故為長乆之䇿今賊形便不與往同宜急攻之以省千金之費恪曰護老賊經變多矣觀其為僃未易卒圖今圖之窮城樵採路絶内無蓄積外無強援不過十旬其斃必矣何必遽殘士卒之命而趣一時之利吾嚴濬圍壘休養士卒兵不血刄坐以制勝遂長圍守之凢經六月而野王潰宋劉勔為輔國將軍晉安王子勛反以殷琰為豫州假節督南豫數郡太宗遣勔率衆西討勔於是乃豎長圍治攻道於東南角并填塹東南角有高樓隊主趙法進計曰外若進攻必先攻樓樓若頺落旣傷將士又使人情沮壞不如先自毁之從其言勔用草茅苞土擲以塞塹擲者如雲城内以火箭射之草未及然後土續至一二日塹便欲滿趙法進復獻計以鐵珠子灌之珠子流滑悉緣隙得入草於是火然二日間草盡塹中土不過二三寸勔乃作大蝦蟇車載土牛皮蒙之三百人推以塞塹琰戸曹參軍虞挹之造礟車繫之以石車悉破壞後乃降梁韋叡為輔國將軍既破魏小峴城遂進討合肥先是右軍司馬胡畧等至合肥久未能下叡按行山川曰吾聞汾水可以灌平陽絳水可以灌安邑即此是也乃堰肥水親自夜率頃之堰成水通舟艦繼至魏初分築東西小城夾合肥叡先攻二城既而魏援將楊靈𦙍帥軍五萬奄至衆懼不敵請表益兵叡笑曰賊已至城下方復求軍臨難鑄兵豈及馬腹且吾求濟師彼亦徴衆猶如吳益巴丘蜀増白帝耳師克在和不在衆古之義也因與戰破之軍人少安初肥水堰立使軍主王懷靜築城於岸守之魏攻陷懷靜城千餘人皆没魏人乗勝至叡堤下其勢甚盛軍監潘靈祐勸叡退還巢湖諸將又請走保三义叡怒曰寧有此耶將軍死綏有前無却又令取繖扉麾幢樹之堤下示無動志叡素羸每戰不常騎馬以板輿自載督厲衆軍魏兵來鑿堤叡親與爭之魏軍却因築壘於堤以自固叡起鬬艦髙與合肥城等四面臨之魏人計窮相與悲哭叡攻具既成堰水又滿魏救兵無所用魏守將杜元倫登城督戰中弩死城遂潰俘獲萬餘級牛馬萬數絹滿十間屋悉充軍賞合肥平陳慶之為文德主帥率軍二千送豫章王綜入鎮徐州魏遣安豐王元明臨淮王元彧率衆二萬來拒元明先遣其别將丘大千築壘潯梁觀兵近境慶之進薄其壘一皷便潰後安西將軍元栁出征夀春除慶之假節總知軍事魏豫州刺史李憲遣其子長鈞别築兩城相拒慶之攻之憲力屈遂降慶之入據其城轉東宫直閣賜爵闗中侯鄧元起天監初為左將軍益州刺史時前益州刺史劉季連持兩端聞元起將至發兵拒守元起至巴西先遣將王元宗等破季連將李奉伯於新巴齊晩盛於赤水衆進屯西平季連始嬰城自守晩盛又破元起將魯方逹於斛石卒死者千餘人師咸懼元起乃自率兵稍進至蔣橋去成都二十里畱輜重於郫季連復遣奉伯晩盛二千人間道襲郫陷之軍僃盡没元起遣魯方逹之衆敗而反遂不能克元起捨郫逕圍州城柵其三面塹焉元起出巡視圍柵季連使精勇掩之將至麾下元起下輿持楯叱之衆辟易不敢進時益部亂日久民廢耕農内外苦饑人多相食道路斷絶季連計窮㑹明年髙祖使赦季連罪許之降季連即日開城納元起元起送季連於京城開郫乃降斬奉伯晩盛髙祖論平蜀勲復元起號平西將軍增封八百戸并前二千戸王僧辨為鎮衛將軍時湘州賊陸納等攻破衡州世祖命僧辨南討納等下據車輪夾岸為陣前斷水勢士卒驍猛皆百戰之餘僧辨憚之不敢輕進於是稍作連城以逼賊賊見不敢交鋒益懷懈怠僧辨因其無僃命諸軍水歩攻之親執旗皷以誡進止於是諸軍競出大戰於車輪與驃騎宜春侯循并力苦攻陷其二城賊大敗陳程文季為安逺將軍随都督吳明徹北討秦郡前江浦通塗水齊人並下大柱為杙柵水中明徹乃前遣文季領驍勇拔開其柵明徹率大軍自後而攻秦郡克之又别遣文季圍涇州屠其城進攻盱眙拔之吳明徹為征北大將軍北伐進逼夀陽齊遣王琳將兵拒守琳至與刺史王貴顯保其外郭明徹以琳初入衆心未附乗夜攻之中宵而潰齊兵退據相國城及金城明徹令軍中益修攻具又堰肥水以灌城城中苦濕多腹疾手足皆腫死者十六七㑹齊遣大將軍皮景和率衆數十萬來援去夀春三十里頓軍不進諸將咸曰堅城未拔大援在近不審明公計將安出明徹曰兵貴在速而彼結營不進自挫其鋒吾知其不敢出戰矣於是躬擐甲胄四面疾攻城中震恐一皷而克生擒王㑹王琳王貴顯扶風王可朱渾孝裕尚書盧潛左丞李騊駼送京師景和惶懼遁走黄法氍音俱為使持節散騎常侍都督南豫州諸軍事征南大將軍南豫州刺史大興北伐都督吳明徹出秦郡以法氍為都督出歴陽齊遣其歴陽王歩騎五萬來援於小峴築城法氍遣左衛軍樊毅分兵於大峴禦之大破齊軍盡獲人馬器械於是乃為拍車及歩艦豎拍以攻歴陽歴陽窘急就乞降法氍緩之則又拒守法氍親率士卒攻城施拍加其樓楪時又大雨城壞克之盡誅戍卒進兵合肥望旗降欵法氍止軍不令侵掠躬親自撫勞而與之盟並放還北以功加侍中後魏慕容白曜為征南大將軍督平東將軍長孫陵等討青州白曜攻歴城宋將崔道固不降白曜築圍以攻之長孫陵等既至青州沈文秀遣使請降軍人入其西郭頗有採掠文秀悔之遂嬰城拒守二年崔道固及兖州刺史梁鄒守將劉休賓並面縳而降白曜白曜皆釋而禮之送道固休賓及其寮屬于京師後乃徙二縣以居之自餘悉為奴婢分賜百官乃進討東陽入其西郭克之擒沈文秀凡獲倉粟八十五萬斛米三千斛弓九千張箭十八萬八千刀二萬二千四百甲胄各三千三百銅五千斤錢五十萬城内户八千六百口四萬一千吳蠻户二百始末三年築圍攻擊日日交兵雖士卒死傷無多怨叛督上土人租絹以為軍資不至侵苦三齊欣然安堵樂業克城之日以沈文秀抗倨不為之拜忿而撾撻唯以此見譏以功拜都督青齊東徐州諸軍事開府青州刺史淳于誕以孝明正光中秦隴反叛詔誕為西南道軍司馬假冠軍將軍别將從子午南出斜谷趣建安與行臺魏子建共叅經畧時梁益州刺史蕭猷遣將樊文熾蕭世澄等率衆數萬圍小劔戍益州刺史邴虬令魏子建拒之因轉營為文熾所掩統軍胡小虎崔珍寳並見俘執子建遣誕助討之誕勒兵馳赴相對月餘未能摧殄文熾軍行之谷東峯名龍鬚山置柵其上以為歸路誕以賊衆難可角力乃宻募壯士二百餘人令夜登山攻焚其柵及時火起烟焰漲天賊以還途不守連營震怖誕率諸軍鳴皷攻擊文熾大敗俘斬萬計擒世澄等十一人熾為元帥先走獲免源子雍為中軍將軍孝明以葛榮久逼信都詔假子雍征北將軍為北討都督時相州刺史安樂王鑒據鄴反勅子雍與都督李神軌先討之子雍行逹湯隂鑒遣弟斌之夜襲子雍軍不克奔敗而返子雍乘機繼進徑圍鄴城與裴衍神軌等攻鑒平之安頡為將軍宋朱循之城滑臺頡攻圍之糧盡將士熏鼠食之循之被圍既久母嘗悲憂忽一日乳汁驚出母號泣告家人曰我年老非復有乳汁時今如此兒必没矣果以其日克滑臺囚循之賀拔勝為荆州刺史將圍襄陽攻梁下迮戍克之擒其戍主尹道元俄又使人誘動蠻王問道期道期率衆起義梁雍州刺史蕭續遣軍擊道期為道期所敗漢南大駭勝又遣軍攻均口擒梁將莊思延又攻馮翊安定沔陽酇城並平之續遣將栁仲禮於穀城拒守勝攻之多所克捷河北盪為丘墟矣册府元龜卷三百六十八
