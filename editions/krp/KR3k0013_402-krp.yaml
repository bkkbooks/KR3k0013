body:
  text: 冊府元龜卷四百二宋王欽若等撰將帥部識畧易之贊知㡬能通於神化傳之述遠慮可消於憂患蓋夫融襟内徹精識獨運事表於先見智包於周防然後舉無遺䇿而動罔不吉者也春秋已來思戎旅者率多魁梧博達之士乃有深練治體詳識軍志眀世道之損益辨人倫之情僞英略宏逺嘉言灼敘故能整師經武克宣乎巨伐全身逺害以成乎令名流風餘論藹於民聼自非大雅之眀哲生民之先覺疇能及是哉荀林父晉大夫桓子也為中軍將魯宣公十二年楚師圍鄭晉師救鄭及河聞鄭既及楚平桓子欲還曰無及於鄭而勦民焉用之勦勞也楚歸而動不後動兵伐鄭隨武子曰善武子士㑹㑹聞用師觀釁而動釁罪也徳刑政事典禮不易不可敵也不為是征言征伐為有罪不為有禮楚軍討鄭怒其貳而哀其卑叛而伐之服而舍之徳刑成矣伐叛刑也柔服徳也二者立矣昔嵗入陳討徵舒今兹入鄭民不罷勞君無怨讟讟謗也政有經矣經常也荆尸而舉荆楚也尸陳也楚武王始更為此陳法遂以為名商農工賈不敗其業而卒乗輯睦歩曰卒車曰乗事不奸矣奸犯也蒍敖為宰擇楚國之令典宰令尹蒍敖孫叔敖軍行右轅左追蓐在軍之右者挾轅為戰備在左者追求草蓐為宿衛𫝊曰令尹南轅又曰改乗轅楚陳以轅為主前茅慮無慮無如今軍行前有斥候蹋伏皆持以綘及白為幡見騎賊舉綘幡見歩賊舉白幡備慮有無也茅眀也或曰時楚以茅為旗幟中權後勁中軍制謀後以精兵為殿百官象物而動軍政不戒而備物猶類也戒勅令也能用典矣其君之舉也内姓選於親外姓選於舊言親疎並用舉不失徳賞不失勞老有加恵賜老則不計勞旅有施舍旅客來者施之以恵舍不勞役君子小人物有服章尊卑别也貴有常尊賤有等威等威言差等禮不逆矣徳立刑行政成事時典從禮順若之何敵之見可而進知難而退軍之善政也兼弱攻昧武之善經也昧昏亂經法也子姑整軍而經武乎姑且也猶有弱而昧者何必楚仲虺有言曰取亂侮亡兼弱也仲虺湯左相薛之祖奚仲之後勺曰於鑠王師遵養時晦勺詩頌篇名鑠美也言美武王能遵天之道湏暗昧者惡積而後取之耆昧也耆致也致討於昧也武曰無競惟烈武詩頌篇名烈業也言武王兼弱取昧故成無疆之業撫弱耆昧以務烈所可也荀首晉大夫知莊子也楚圍鄭晉救鄭及河聞鄭既及楚平荀林父欲還士㑹曰善先縠曰不可以中軍佐濟知莊子曰此師殆哉周易有之在師坎下坤上師之臨兊下坤上臨師初六變而之臨曰師出以律否臧㓙此師卦初六爻辭律法否不也執事順成為臧逆為否今彘子逆命不順成故應不臧之㓙衆散為弱坎為衆今變為兊柔弱川壅為澤坎為川今變為兊為澤是川見壅有律以如已也如從也法行則人從法法敗則法從人坎為法象今為衆則散為川則壅失法之用從人之象故曰律否臧且律竭也竭敗也坎變為兊是法敗盈而已竭夭且不整所以㓙也水遇夭塞不得整流則竭涸也不行之謂臨兊變為澤乃成臨卦澤不行之物有帥而不從臨孰甚焉此之謂矣譬彘子之違命亦不可行果遇必敗遇敵也彘子尸之主此禍雖免而歸必有大咎晉師果敗眀年晉殺先縠荀罃晉大夫知武子也為中軍將魯襄公九年冬晉與諸侯之師伐鄭鄭從楚也鄭人恐乃行成與楚成也十年春諸侯之師城虎牢而戍之晉城梧及制士魴魏綘戍之鄭及晉平楚子囊救鄭十一月諸侯之師還鄭而南至於陽陵還繞也陽陵鄭地楚師不退知武子欲退曰今我逃楚楚必驕驕則可與戰矣武子荀罃欒黶曰逃楚者晉之恥也合諸侯以益恥不如死我將獨進師遂進己亥與楚師夾潁而軍潁水出城陽至下蔡入淮子蟜曰諸侯既有成行必不戰矣言有成去之志從之將退不從亦退從猶服也退楚必圍我猶將退也不如從楚亦以退之謂退楚宵渉潁與楚人盟夜渡畏晋知之欒黶欲伐鄭師伐渉潁者荀罃不可曰我實不能禦楚又不能庇鄭鄭何罪不如致怨焉而還致怨為後伐之資今伐其師楚必救之戰而不克為諸侯笑克不可命勝負難要不可命以必克不如還也丁未諸侯之師還侵鄭北鄙而歸欲以致怨楚人亦還鄭服故也趙鞅晉大夫趙孟也魯哀公十年帥師伐齊大夫請卜之趙孟曰吾卜於此起兵謂往嵗卜伐宋不吉利以伐姜故今興兵事不再令再令凟也卜不襲吉襲重也行也於是乎取犂及轅犂一名隰濟南有隰隂縣祝阿縣西有轅城毁髙唐之郭侵及賴而還中行穆伯晉大夫攻鼓弗能下鼓北翟邑餽間隃曰鼓之嗇夫間俞知之餽間隃晋人也請無罷武大夫而鼓可得也繆伯弗應左右曰不折一㦸不傷一卒而鼓可得也君奚為不使繆伯曰間隃為人佞而不仁若使間隃下之吾可以勿賞乎若賞之是賞佞人佞人得志是使晉國之武舍仁而為佞且得鼓將何用又云晉中行穆子率師伐翟圍鼓鼔人請以城畔穆子不受軍吏曰可無勞師而得城子何不為穆子曰非事君之禮也夫以城來者必將求利於我矣夫守而二心姦之大者也賞善罰姦國之憲法也許而弗予失信也若其予之賞大姦也姦而盈禄善將若何且夫翟之憾者以城來盈願晉豈其無是我以鼓敎吾邊鄙貳也夫事君者量力而進不以安賈貳令軍吏呼城儆將攻之未傅而鼓䧏也趙趙奢初治國賦㑹秦伐韓軍於閼與趙王召亷頗而問曰可救不對曰道逺險狹難救又召樂乗而問焉樂乗對如亷頗言又召問奢奢對曰其道逺險狹譬之猶两䑕鬬於穴中將勇者勝王乃令趙奢將救之漢韓信拜為大將軍漢王召信上坐曰丞相數言將軍何以敎寡人計䇿信謝因問王曰今東鄉向也爭權天下豈非項王邪王曰然信曰大王自料勇悍仁彊孰與項王漢王黙然良久曰弗如也信再拜賀曰唯信亦以為大王弗如也然臣嘗事項王請言項王為人項王意烏猝嗟千人皆廢猝千忽反然不能任屬賢將此特匹夫之勇也項王見人恭敬慈爱言語姁姁姁姁和好貎音許于切人有疾病涕泣分食飲至使人有功當封爵者印刓弊忍不能予此所謂婦人之仁也項王雖霸天下而臣諸侯不居關中而都彭城又背義帝約而以親愛王諸侯不平諸侯之見項王逐義帝置江南亦皆歸逐其主自王善地項王所過亡不殘滅多怨百姓百姓不附特刼於威彊服耳名雖為霸實失天下心故曰其彊易弱今大王誠能反其道任天下武勇何不誅以天下城邑封功臣何不服以義兵從思東歸之士何不散散謂四散而立功且三秦王為秦將章邯司馬欣董翳將秦子弟數嵗矣所殺亡不可勝計又欺其衆䧏諸侯至新安項王詐坑秦䧏卒二十餘萬人唯獨邯欣翳得脫秦父兄怨此三人痛入骨髓今楚彊以威王此三人秦民莫愛也大王之入武闗秋毫無所害除秦苛法與民約法三章耳秦民亡不欲得大王王秦者於諸侯之約大王當王關中關中民咸知之王失職入蜀民亡不恨者今大王舉而東三秦可傳檄而定也於是漢王大喜自以為得信晚遂聼信計灌嬰以列侯事恵帝及吕禄等欲為亂齊哀王聞之舉兵西吕禄等以嬰為大將軍往擊之嬰至滎陽乃謀曰諸吕舉兵關中欲危劉氏而自立今我破齊還報是益吕氏資也乃留兵屯滎陽使人諭齊王及諸侯與連和諭謂曉也以待吕氏之變而共誅之齊王聞之乃屯兵西界待約及綘侯等誅諸吕嬰自滎陽還衛青為大將軍平陵侯蘇建嘗責之曰大將軍至尊重而天下賢士大夫無稱焉言不為賢士大夫所稱譽願將軍觀古名將所招選者勉之哉勸令招賢薦士也青謝曰自魏其武安之厚賔客天子嘗切齒彼親待士大夫招賢絀不肖者人主之柄也人臣奉法遵職而已何與招士與讀曰豫驃騎亦方此意驃騎霍去病也為將如此方比類也趙充國為䕶軍都尉漢得匃奴䧏者言烏桓嘗發先單于塜匃奴惡之發二萬騎擊烏桓大將軍霍光欲發兵邀擊之以問充國充國以為烏桓間數犯塞今匃奴擊之於漢便又匃奴希㓂盗北邊幸無事蠻夷自相攻擊而發兵邀之招宼生事非計也後漢邳􅊮為和成太守時王郎亂河北世祖雖得上谷漁陽二郡之助而兵衆未合議者多言可因信都兵自送西還長安􅊮廷對曰議者之言皆非也吏民歌詠思漢久矣故更始舉尊號而天下響應三輔清宫除道以迎之一夫荷㦸大呼則千里之將無不捐城遁逃虜伏請䧏自上古以來亦未有感物動民如此者也又卜者王即假名因勢驅集烏合之衆遂震燕趙之地况明公奮二郡之兵揚響應之威以攻則何城不尅以戰則何軍不服今釋此而歸豈徒空失河北必更驚動三輔墮損威重非計之得者也若眀公無復征伐之意則雖信都之兵猶難㑹也何者眀公既西則邯鄲城民不肯捐父母背城主而千里送公其離散亡逃可必也世祖善其言而止即日拜􅊮為後大將軍宼恂為執金吾建武八年從光武擊隗囂而潁川盗賊羣起帝乃引軍還謂恂曰潁川迫近京師當以時定惟念獨卿能平之耳從九卿復出以憂國可知也恂對曰潁川剽輕聞陛下逺踰阻險有事隴蜀故狂狡乗間相詿誤耳如聞乗輿南向賊必惶怖歸死臣願執銳前驅即日車駕南征恂從至潁川盗賊悉降又隗囂將安定髙峻擁兵萬人據髙平第一髙平有第一城光武遣恂降之恂奉璽書至第一峻遣軍師皇甫文出謁辭禮不屈恂怒將誅文諸將諫曰髙峻精兵萬人卒多彊弩西遮隴道連年不下今欲降之而反戮其使無乃不可乎恂不應遂斬之遣其副歸告峻曰軍師無禮已戮之矣欲降急降不降固守峻惶恐即日開城門降諸將皆賀因曰敢問殺其使而降其城何也恂曰皇甫文峻之腹心其所取計者也今來辭意不屈必無降心全之則文得其計殺之則峻亡其膽是以降耳諸將皆曰非所及也祭遵為征虜將軍建武六年與建威大將軍耿弇虎牙大將軍蓋延漢忠將軍王常捕虜將軍馬武驍騎將軍劉歆武威將軍劉尚等從天水伐公孫述師次長安時車駕亦至而隗囂不欲漢兵上隴辭說解故帝召諸將議皆曰可且延囂日月之期益封其將帥以消散之遵曰囂挾奸久矣今若按甲引時則使其詐謀益深而蜀警倍増固不如遂進帝從之乃遣遵為前行擊囂將王元破之來歙為大中大夫建武八年詔歙屯長安悉監䕶諸將歙因上書曰公孫述以隴西天水為藩蔽故得延命假息今二郡平蕩則述智計窮矣宜益選兵馬儲積資糧昔趙之將帥多賈人髙帝懸之以重賞今西州新破兵人疲饉若招以財榖則其衆可集臣知國家所給非一用度不足然有不得已也帝然之於是大轉運糧詔於汧積榖六萬觓驢四百頭負䭾詔歙率征西大將軍異等入天水擊破公孫述馬援為伏波將軍既平交阯賊徵側等乃條奏越律與漢律駁者十餘事與越人申眀舊制以約束之自後駱越奉行馬將軍故事駱者越别名馮緄為車騎將軍討長沙蠻㓂時天下饑饉帑藏虚盡毎出征伐嘗減公卿俸禄假王侯租賦前後所遣將帥宦官輙陷以折耗軍資往往抵罪緄性烈直不行賄賂懼為所中乃上疏曰勢得容姦伯夷可疑茍曰無猜盗跖可信故樂羊陳功文侯示以謗書願請中常侍一人監軍財費尚書朱穆奏緄以財自嫌失大臣之節有詔勿劾班超為西域都䕶被徵以戊己校尉任尚為都䕶與超交代尚謂超曰君侯在外國二十餘年而小人猥承君後任重慮淺宜有以誨之超曰年老失智任君數當大位豈超所能及哉必不得已願進愚言塞外吏士非孝子順孫皆以罪過徙補邊屯而蠻夷懐禽獸之心難養易敗今君性嚴急水清無大魚察政不得下和宜蕩佚簡易寛小過總大綱而已超去後尚私謂所親曰我以班君當有竒䇿今所言平平耳尚至數年而西域反亂以罪被徵如超所戒梁商為大將軍永和四年徵䕶羌校尉馬賢為𢎞農太守以來機為并州刺史劉乗為梁州刺史並當之職商謂機等曰戎狄荒服蠻夷要服言其荒忽無常而統領之道亦無常法臨事制宜略依其俗今二君素性疾惡欲分眀白黒孔子曰人而不仁疾之已甚亂也况戎狄乎其務安羌胡防其大故忍其小過機等天性虐刻遂不能從到州之日多所擾發果以羌叛坐徵皇甫嵩字義真中平五年梁州賊王國圍陳倉復拜嵩為左將軍督前將軍董卓各率二萬人拒之卓欲速進赴陳倉嵩不聼卓曰智者不後時勇者不留决速救則城全不救則城滅全滅之勢在於此也嵩曰不然百戰百勝不如不戰而屈人之兵是以先為不可勝以待敵之可勝不可勝在我可勝在彼彼守不足我攻有餘孫子之文有餘者動於九天之上不足者陷於九地之下孫子兵法曰善守者藏於九地之下善攻者動於九天之上𤣥女三宫戰法曰行兵之道天地之寳九天九地各有表裏九天之上六甲子也九地之下六癸酉也子能順之萬全可保今陳倉雖小城守固備非九地之陷也王國雖彊而攻我之所不救非九天之勢也夫勢非九天攻者受害陷非九地守者不㧞國今已陷受害之地而陳倉保不㧞之城我可不煩兵動衆而取全勝之功將何救焉遂不聼王國圍陳倉自冬迄春八十餘日城堅固守竟不能拔賊衆疲敝果自解去嵩進兵擊之卓曰不可兵法窮㓂勿追歸衆勿廹司馬兵法之言今我追國是廹歸衆追窮㓂也困獸猶鬬蜂蠆有毒皆左氏傳文况大衆乎嵩曰不然前吾不擊避其銳也今而擊之待其衰也所擊疲師非歸衆也國衆且走莫有鬬志以整擊亂非窮冦也遂獨進擊之使卓為後拒連戰大破之斬首萬餘級國走而死卓大慙恨繇是怨嵩朱儁為鎮賊中即將南陽黃巾賊帥韓忠據宛城儁與荆州刺史徐璆南陽太守秦頡合兵圍之忠惶懼乞降司馬張超及徐璆秦頡皆欲聼之儁曰兵有形同而勢異者昔秦項之際民無定主故賞附以勸來耳今海内一統唯黃巾造㓂納降無以勸善討之足以懲惡今若受之更開逆意賊利則進戰鈍則乞降縱敵長㓂非良計也因急攻破之蓋勲為討虜校尉與宗正劉虞佐軍校尉袁紹同典禁兵勲謂虞紹曰吾仍見主上甚聰明但擁蔽於左右耳若共併力誅嬖倖然後徵拔英俊以興漢室功遂身退豈不快乎虞紹亦素有謀因相連結未及發而出為京兆尹段熲字紀眀桓帝時爲䕶羌校尉而東羌先零等自覆没征西將軍馬賢後朝廷不能討遂數冦擾三輔其後度遼將軍皇甫規中郎將張奐招之連年既降又叛桓帝召問紀眀曰先零東羌造惡反逆而皇甫規張奐各擁彊衆不時輯定欲熲移兵東討未識其宜可叅思術略紀眀因上言曰臣伏見先零東羌雖數叛逆而䧏於皇甫規者已二萬許落善惡即分餘㓂無㡬今張奐躊蹰久不進者當慮外離内合兵往必驚且自冬踐春屯結不散人畜疲羸自亡之勢徒更招降坐制彊敵耳臣以為狼子野心難以恩納勢窮雖服兵去復動唯當長矛挾脇白刃加頸耳計東種所餘三萬餘落居近塞内路無險折非有燕齊秦趙從橫之勢而久亂并凉累㓂三輔西河上郡已各内徙安定北地復至單危自雲中五原西至漢陽一千餘里匃奴種羌並擅其地是為癰疽伏疾留滯脇下如不加誅轉就滋大今若以騎五千歩萬人車三千輛三冬二夏足以破定無慮用費為錢五十四億如此則可令羣羌破盡匃奴長服内徙郡縣得反本土伏計永初中諸羌反叛十有四年用二百四十億永和之末復經七年用八十餘億費耗若此猶不誅盡餘孽復起於兹作害今不暫疲人則永寕無期臣庶竭駑劣伏待節度帝許之悉聼如所上竇太后臨朝破羌將軍張奐上言東羌雖破餘種難盡紀眀性輕果慮負敗難常宜且以恩降可無後悔詔書下紀眀復上言臣本知東羌雖衆而輭弱易制所以比陳愚慮思為永寕之筭而中即將張奐說虜彊難破宜用招降聖朝眀監信納瞽言故臣諫行奐計不用事勢相反遂懐猜恨信叛羌之訴飾潤辭意云臣兵累見折衂又言羌一氣所生不可誅盡山谷廣大不可空静血流汚野傷和致災臣伏念周秦之際戎狄為害中興以來羌㓂最盛誅之不盡雖降復叛今先零雜種累以反覆攻沒縣邑剽掠人物發塜露屍禍及生死上天震怒假手行誅昔邢為無道衛國伐之師興而雨臣動兵渉夏連獲甘澍嵗時豐稔人無疵疫上占天心不為災傷下察人事衆和師克自橋門以西雒川以東故宫縣邑更相通屬非為深險絶城之地車騎安行無應折衂案奐為漢吏身當武職駐軍二年不能平㓂虚欲修文戢武招降獷敵誕辭空說僭而無徵何以言之昔先零作㓂趙充國徙令居内煎當亂邊馬援遷之三輔始服終叛至今為梗故逺識之士以為深憂今傍郡户口單少數為羌所創毒而欲令降徒與之雜居是猶種枳棘於良田養虺蛇於室内也故臣奉大漢之威建久長之䇿欲絶其本根不使能殖本規三嵗之費用五十四億今適期年所耗未半而餘㓂殘燼將向殄滅臣毎奉詔書軍不内御願率斯言一以任臣臨時量宜不失權便魏李通為陽安郡尉太祖與袁紹相拒於官渡紹遣使拜通征南將軍劉表亦隂招之通皆拒焉通親戚部曲流涕曰今孤危獨守以失大援亡可立而待也不如急從紹通按劍叱之曰曹公眀哲必定天下紹雖彊盛而任使無方終為之虜耳吾以死不二即斬紹使送印綬詣太祖滿寵為奮威將軍從太祖征荆州還屯當陽吳大帝數擾邊郵復召寵還為汝南太守賜爵關内侯蜀軍圍㐮陽寵助征南將軍曹仁屯樊城拒之而左將軍于禁等軍以雨水長為蜀所没蜀急攻樊城樊城得水往往摧壊衆皆失色或謂仁曰今日之危非力之所可及蜀圍未合乗輕船夜走雖失城尚可全身寵曰山水速疾兾其不久聞蜀遣别將已在郟下自許以南百姓擾擾蜀所以不敢遂進者恐吾軍掎其後耳今若遁去洪河以南非復國家有也君且待之仁曰善寵乃沈白馬與軍人盟誓㑹徐晃等救至寵力戰有功蜀遂退後為征東將軍吳將孫布遣人詣揚州求降辭云道逺不能自致乞兵見迎刺史王凌騰布書請兵馬迎之寵以為必詐不與兵而為凌作書報曰知識邪正欲避禍就順去暴歸道甚相嘉尚今欲遣兵相迎然計兵少則不足相衛多則事必逺聞且先宻計以成本志臨時節度其宜寵㑹被書當入朝勅留府長史若凌欲往迎勿與兵也凌於後索兵不得乃單遣一督將歩騎七百人以迎之布夜襲擊督將迸走死傷大半太和三年領豫州刺史曹休從廬江南入合肥令寵向夏口寵上疏曰曹休雖眀果而希用兵今所從道背湖旁江易進難退此兵之窪地也若入無疆口宜深為之備寵表未報休遂深入賊果從無疆口斷夾石要休還路休戰不利退走㑹朱靈等從後來斷道與賊相遇賊驚走休軍乃得還後為征東將軍大帝嵗有來計青龍元年寵上疏曰合肥城南臨江湖北逺夀春賊攻圍之得據水為勢官兵救之當先破賊大輩然後圍乃得解賊往甚易而兵往救之甚難宜移城内之兵其西三十里有竒險可依更立城以固守此為引賊平地而掎其歸路於計為便䕶軍將軍蔣濟議以為既示天下以弱且望賊烟火而壊城此為未攻而自拔一至於此刼掠無限必以淮北為守帝未許寵重表曰孫子言兵者詭道也故强而示之以弱能而示之以不能驕之以利示之以懾此為形實不必相應也又曰善動敵者形之今賊未至而移城却内此所謂形而誘之也引賊逺水擇利而動舉得於外則福生於内矣尚書趙咨以寵䇿為長詔遂報聴張既為雍州刺史從太祖征張魯魯降太祖將拔漢中恐蜀先主北取武都氐以逼關中既曰可勸使北出就榖以避賊前至者厚其寵賞則先者知利後必慕之太祖從其䇿乃自到漢中引出諸軍令既之武都徙氐五萬餘出扶風天水界是時武威顔俊張掖和鸞酒泉黃華西平趜演等並舉郡反自號將軍更相攻擊俊遣使送母及子詣太祖為質求助太祖問既既曰俊等外假國威内生傲悖計定勢足後即反耳今方事定蜀且宜兩存而鬬之猶卞莊子之刺虎坐收其斃也太祖曰善嵗餘鸞遂殺俊武威王秘復反殺鸞文帝即王位既代鄒岐為凉州刺史西平趜光等殺其郡守諸將欲擊之既曰唯光等造反人未必悉同若便以軍臨之吏民羌胡必謂國家不别是非更使皆相持著此為虎𫝊翼也光等欲以羌胡為擾今先使羌胡抄擊重其賞募所虜獲者皆以畀之外沮其勢内離其交必不戰而定乃檄告諭諸羌光等所詿誤者原之能斬賊帥送首者當加封賞於是光部黨斬送光首其餘咸安堵如故徐晃為偏將軍太祖圍鄴易陽令韓範僞以城䧏而拒守太祖遣晃攻之晃至飛矢城中為陳成敗範悔晃輙降之既而言於太祖曰二袁未破諸城未下者傾耳而聼今日滅易陽眀日皆以死守恐河北無定時也願公降易陽以示諸城則莫不望風歸矣太祖善之韓浩為䕶軍太祖欲討柳城領軍史渙以為道逺深入非完計也欲與浩共諫浩曰今兵勢強盛威加四海戰勝攻取無不如志不以此時遂除天下之患將為後憂且公神武舉無遺䇿吾與君為中軍主不宜沮衆遂從破柳城改其官為中䕶軍置長史司馬臧霸為威虜將軍徐州刺史從太祖征吳於濡湏口與張遼為前鋒行遇霖雨大軍先及水遂長賊船稍進將士皆不安遼欲去霸止之曰公眀於利鈍寕肯捐吾等耶眀日果有令遼至以語太祖太祖善之拜揚威將軍假節鄧艾為城陽太守是時并州右賢王劉豹并為一部艾上言曰戎狄獸心不以義親彊則侵暴弱則内附故周宣有玁狁之㓂漢祖有平城之困毎匃奴一盛為前代重患自單于在外莫能牽制長卑誘而致之使來入侍繇是羌夷失統分散無主以單于在内萬里順軌今單于之尊日疏外寵之威寖重則胡虜不可不深備也聞劉豹部有叛胡可因叛割為二國以分其勢去卑功顯前朝而子不繼業宜加其子顯號使居鴈門離國弱㓂進録舊勲此馭邊長計也又陳羌胡與民同處者宜以漸出之使居民表崇亷恥之敎塞奸宄之路大將軍司馬景王新輔政多納用焉及為振威將軍兖州刺史上言曰國之所急惟農與戰國富則兵彊兵彊則戰勝然農者勝之本也孔子曰足食足兵食在兵前也上無設爵之勸則下無財畜之功今使考績之賞在於積粟富民則交㳺之路絶浮華之原塞矣陳泰字𤣥伯為征西將軍都督雍凉諸軍事雍州刺史王經與姜維戰敗保狄道城維圍之泰進軍與維戰維退泰毎以一方有事輙以虚聲擾動天下故希簡白上事驛書不過六百里司馬文王語荀顗曰元伯沉勇能斷荷方伯之重救將陷之城而不求益兵又希簡上事必能辦賊故也都督大將不當爾邪王昶為征南將軍都督荆豫諸軍事嘉平中太傅司馬宣王既誅曹爽乃奏愽問大臣得失王昶陳治略五事其一欲崇道篤學抑絶浮華使國子入太學而脩庠序其二欲用考試猶凖繩也未有舍凖繩而意正曲直廢黜陟而空論能否也其三欲令居官者乆於其職有治績則就増位賜爵其四欲約官實禄勵以亷恥不使與百姓争利其五欲絶侈靡務崇節儉令衣服有章上下有序儲榖蓄帛反民於樸詔書褒讚因使選百官考課事昶以為唐虞有黜陟之文而考課之法不垂周制冡宰之職大計羣吏之治而誅賞又無較比之制繇此言之聖主明於任賢略舉黜陟之體以委達官之長而總其統紀故能否可得而知也其大指如此王基為荆州刺史時母丘儉文欽作亂以基為行監軍假節統許昌軍適與景王㑹於許昌景王曰君籌儉等如何基曰淮南之逆非吏民思亂也儉等誑脇廹懼畏目下之戮是以尚聚耳若大兵臨偪必土摧瓦解儉欽之首不終朝而懸於軍門矣景王曰善又基督豫州諸軍事與司馬文王討諸葛誕誕平文王欲遣諸將輕兵深入招迎唐咨等子弟因釁以蕩覆吳㑹之勢基諫曰昔諸葛恪乗東關之勝竭江表之兵以圍新城城既不拔而衆死者大半姜維因洮上之利輕兵深入糧餉不繼軍覆上邽夫大捷之後上下輕敵則慮難不深今賊新敗於外又内患未弭是其脩備設慮之時也且兵出踰年人有歸志今俘馘十萬罪人斯得自歴代征伐未有全兵獨克如今之盛也武皇帝克袁紹於官渡自以所獲已多不復追奔懼挫威也文王乃止後襄陽太守胡烈表上吳賊鄧繇李光等同謀十八屯欲來歸化遣將張吳鄧生并送質任克期欲令郡軍臨江迎㧞大將軍司馬文王啓聞詔基部分諸軍使烈督萬人徑造沮水荆州義陽南屯宜城承書夙發若繇等如期到者便當因此震蕩江表基疑賊詐降誘致官兵馳驛止文王說繇等可疑之狀且當澄清未宜便舉重兵深入應之又曰夷陵東道當繇車御至赤岸乃得渡沮西道當出箭谿口乃趣平土皆山路險狹竹木叢蔚卒有要害弩馬不陳今者筋角弩弱水潦方降廢盛農之務徼難必之利此事之危者也昔子午之役兵行數百里而值霖雨橋閣破壊後糧腐敗前軍縣乏姜維深入不待輜重士衆饑餓覆軍上邽文欽唐咨舉吳重兵昧利夀春身没不反此皆近事之鑒戒也嘉平以來累有内難當今之宜當鎮安社稷撫寕上下力農務本懐柔百姓未宜動衆以求外利也得之未足為多失之傷損威重文王累得基書意疑尋勅諸軍已上道者且權停住所在湏後節度基又言於文王曰昔漢祖納酈生之說欲封六國寤張良之謀而趣銷印基謀慮淺短誠不及留侯亦懼襄陽有食其之謬文王於是遂罷軍嚴後繇等果不降蜀黃權為偏將軍魏太祖破張魯魯走入巴中權進謂先主曰若失漢中則三巴不振此為割蜀之股臂也於是先主以權為䕶軍率諸將迎魯魯已還南鄭北降曹公然卒破杜濩朴胡殺夏侯淵據漢中皆權本謀也趙雲為翊軍將軍先主既定成都時議欲以成都中屋舍及城外園地桑田分賜諸將雲駁之曰霍去病以匃奴未滅無用家為今國賊非但匃奴未可求安也湏天下都定各反桑梓歸耕本土乃其宜耳益州人民初罹兵草田宅皆可歸還令安居復業然後可役調得其歡心先主即從之後雲拒曹真敗於箕谷有軍資餘絹諸葛亮使分賜將士雲曰軍事無利何為有賜其物請悉入赤岸府庫湏十月為冬賜亮大善之諸葛亮為丞相南征所在戰捷遂至滇池南中平皆即其渠率而用之或以諫亮亮曰若留外人則當留兵兵留則無所食一不易也加夷新傷破父兄死䘮留外人而無兵者必成禍患二不易也又吏累有廢殺之罪自嫌釁重若留外人終不相信三不易也今吾欲使不留兵不運糧而綱紀粗定夷漢粗安故耳魏延為丞相諸葛亮前軍師在南鄭時魏安西將軍夏侯楙鎮長安亮與羣下計議延曰聞夏侯楙少主婿也怯而無謀今假延精兵五千員糧五千觓直從褒中出循秦嶺而東當子午而北不過十日可到長安楙聞延奄至必乗船逃走長安中惟有御史京兆太守耳橫門邸閣與散民之榖足周食也比東方相合聚尚二十許日而公從斜谷來必足以達此則一舉而咸陽以西可定矣亮以為此縣危不如安從坦道可以平取隴右十全必克而無虞故不用延計張嶷為撫戎將軍吳太傅諸葛恪已破魏軍大興兵衆以圖攻取侍中諸葛瞻丞相亮之子恪從弟也嶷與書曰東主初䘮帝實㓜弱太傅受付託之重亦何容易親以周公之才猶有管蔡流言之變霍光受任亦有燕蓋上官逆亂之謀賴成昭之眀以免斯難耳昔每聞東主殺生賞罰不任下人又今以垂没之命卒召太傅囑以後事誠實可慮加吳楚剽急乃昔所記而太傅離少主履敵庭恐非良計長算之術也雖云東家綱紀肅然上下輯睦百有一失非眀者之慮邪取古則今今則古也自非即君進忠言於太傅誰復有盡言者也旋軍廣農務行德恵數年之中東西並舉實為不晚願深採察恪竟以此夷族嶷識見多如是類廖化為右車騎將軍景耀五年姜維率衆出狄道化曰兵不戢必自焚伯約之謂也伯約維字智不出敵而力少於冦用之無厭將何以能立詩云不自我先不自我後今日之事也維果為鄧艾所破冊府元龜卷四百二
