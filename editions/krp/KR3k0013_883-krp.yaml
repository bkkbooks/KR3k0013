body:
  text: 冊府元龜卷八百八十三宋王欽若等撰總錄部形貌夫人之生也禀秀五行肖類天地故形為神之舍貌為情之華發於至靈彰乎遺體乃有英姿偉量奇骨異表魁岸磊落端厚篤雅頎長俊茂雄毅挺特蓋繇夫氣幹中立容止外著出乎其類夐然不羣為殊俗之聳畏蒙時君之欽賞有儀可象於斯為貴亦有器資𦕈小而識度宏逹同時異𣲖而形象克肖至于苛刻異狀兆自襁褓指物象而倫擬推善惡以斯驗布在方䇿咸足徵焉商伊尹倨身為阿衡中衍栢翳之後烏身人言一云人面烏喙太戊聞而卜之使御吉遂致使御而妻之晉文公重耳初為公子及曹曹共公聞其駢脅欲觀其裸浴薄而觀之宋華元睅其目皤其腹睅出目皤大腹宋公子鮑美而艶宋公子痤美而狠初宋苪司徒生女子赤而毛棄諸堤下共姬之妾取以入名之曰棄長而美平公入共姬納諸御嬖生佐惡而婉即元公也太子痤美而狠鄭子太叔美秀而文陳武子子彊也白晳黰鬚睂甚口甚口多口也子産日角晏平仲月角尾生犀角柳下惠史魚反角孔子長九尺有六寸人皆謂之長而異之狀類陽虎適鄭與弟子相失孔子獨立郭東門鄭人或謂子貢曰東門有人其顙似堯其項類臯陶其肩類子産自要以下不及禹三寸纍纍然若䘮家之狗王肅曰䘮家之狗主人哀荒不見飲食故纍然而不得意孔子生於亂世道不得行故纍然不得志之貌也韓詩外傳曰䘮家之狗旣斂而槨有席而祭顧望無人也子貢以實告孔子孔子欣然笑曰形狀末也而似䘮家之狗然哉然哉魯顓孫師字子張曽參曰堂堂乎張也難與並為仁矣言子張容儀盛而於仁道薄也有若魯人孔子弟子孔子既没弟子思慕有若狀似孔子弟子相與共立為師事之如夫子時也淳于髠齊之贅壻長不滿七尺優孟楚之樂人長八尺鄒忌脩八尺有餘容貎昳田文為齊相封孟嘗君文過趙趙平原君客之趙人聞孟嘗君賢出觀之皆笑曰始以薛公為魁然也今視之乃𦕈小丈夫爾漢張良字子房狀貌如美婦人後封留侯陳平長大美色而肥或説平於漢王曰平美丈夫如冠玉爾後至右丞相韓王信長八尺五寸張蒼為秦御史亡歸沛公畧地過陽武蒼當斬解衣伏質蒼長大肥白如瓠王陵見而怪其美乃言沛公公赦之後至丞相又云蒼父長不滿五尺蒼長八尺餘蒼子復長八尺及孫類長六尺餘公孫𢎞對䇿為第一召入見容貌甚麗拜為博士待詔金馬門東方朔長九尺三寸目如懸珠齒如編貝後至侍郎郭解為人短小精悍田千秋為高寢郎上急變訟戾太子寃武帝召見千秋長八尺餘體貌甚麗帝見而説之後至丞相霍光長財七尺三寸財與纔同白晳疏睂目美鬚髯後至大將軍金日磾長八尺二寸容貌甚嚴後至車騎將軍江充為人魁岸容貌甚壯武帝望見而異之謂左右曰燕趙故多竒士後為繡衣直指使者龔遂為渤海太守宣帝召見遂形貌短小帝見心内輕焉及對賜黄金乘傳去朱雲字子游長八尺餘貌甚壯以勇力聞後至槐里令直不疑狀貌甚美後至御史大夫王商為丞相長八尺餘身體鴻大容貌甚過絶人河平四年單于來朝引見白虎殿在未央宫中丞相商坐未央廷中單于前拜謁商單于將見天子而經未央廷中過也商起離席與言單于仰視商貌大畏之遷延却退天子聞而歎曰此真漢相矣樓䕶為人短小精悍後至天水太守嚴延年為人短小精悍後至河南太守薛宣好威儀容止可觀後至丞相息夫躬容貌偉麗為衆所異後至左曹光祿大夫後漢東平王蒼腰帶十圍李通父守為王莽宗卿師身長九尺容貌絶異蓋延字巨卿身長八尺後至左馮翊馬援為人明白鬚髪睂目如畵東觀記曰援長七尺五寸色理髮膚睂目容貌如畵後至伏波將軍銚期長八尺二寸容貌絶異矜嚴有威後至衛尉祭彤為人質厚重毅體貌絶衆後至太僕虞延字子大陳留人長八尺六寸腰帶十圍力能扛鼎後至司徒班超字仲升為人有大志不脩小節嘗行詣相者相者曰祭酒布衣諸生爾一坐所尊則先祭酒今稱祭酒相尊敬之詞也而當封侯萬里之外超問其狀相者曰生燕頷虎頸飛而食肉此萬里侯相也後為西域都䕶封定逺侯吳良為東平王所薦詔曰前見良鬚髪皓然衣冠甚偉求賢助國宰相之職今以良為議郎馮勤曽祖父揚兄弟形皆偉壯唯勤祖父偃長不滿七尺嘗自恥短陋恐子孫之似也乃為子伉娶長妻生勤長八尺三寸後至司徒耿秉有偉體腰帶八圍後至光䘵勲鄧衍以外戚小侯每豫朝㑹容姿趨歩有出於衆顯宗目之曰朕之容貌豈若此人特賜輿馬衍雖有容儀而無實行後至𤣥武司馬楊喬為尚書容儀偉麗賈逵身長八尺二寸諸儒為之語曰問事不休賈長頭為侍中李固字子堅司徒郃之子貌狀有竒表鼎角匿犀足履龜文鼎角者項有骨如鼎足也匿犀伏犀也謂骨當額上入髮際隱起也足履龜文者二千石見象書後至太尉盧植字子幹身長八尺二寸音聲如鐘後至尚書鄭𤣥身長八尺飲酒一斛秀睂眀目容儀温偉後徵大司農不赴臧洪體貌魁梧有異姿後至東郡太守傅爕身長八尺有威容後至漢陽太守郭泰身長八尺容貌魁偉聲如洪鐘後徵有道不起趙壹體貌魁梧身長九尺美鬚豪睂望之甚偉辟公府不就高獲字敬公為人尼首方面尼首首象尼丘山中下四方高也三公爭辟不應蔡邕為中郎將董卓多自狠用邕邕恨其言少從謂從弟谷曰董公性剛而遂非終難濟也吾欲東奔兖州苦道逺難逹且遯逃山東以待之何如谷曰君狀異常人每行觀者盈集以此自匿不亦難乎邕乃止公孫瓚遼西人為人美姿貌大音聲言事辯慧典畧曰瓚性辯慧每白事常兼數曹無有忘誤太守竒其才以女妻之魏志云侯太守妻之以女後至奮武將軍封薊侯劉表身長八尺餘姿貌温偉後至荆州牧馬騰長八尺身體洪大面鼻雄異後至衛尉袁紹㓜為郎容貌端正威儀進止動見倣效後至大將軍冀州牧魏孟逹容止可觀文帝甚器愛之以為散騎常侍領新城太守管寧長八尺美鬚睂累徵不起何夔曽祖父熈字孟孫身長八尺五寸體貌魁梧善為容儀舉孝廉為謁者贊拜殿中音動左右和帝佳之䕫長八尺三寸容貌矜嚴後至太僕崔琰聲姿高暢睂目疏朗鬚長四尺後遷中尉司馬朗祖父雋字元異博學好古倜儻有大度長八尺三寸腰帶十圍儀狀魁岸與衆有異鄉黨宗族咸景附焉後至潁川太守程昱字仲德長八尺三寸美鬚髯後至衛尉典韋形貌魁梧膂力過人後為校尉滿寵子偉以格度知名偉子長武偉弟子奮元康中至尚書令司𨽻校尉寵偉長武奮皆長八尺許褚字仲康長八尺餘腰帶十圍容貌雄毅後至武衛將軍王脩孫襃長八尺四寸容貌絶異終身不應徵聘樂進字文謙容貌短小膽烈過人從太祖為帳下吏後至盪㓂將軍何晏字平叔美姿容帝疑其傅粉賜湯餅令晏食之汗出流面拭之轉白後至尚書蜀諸葛亮少有逸羣之才英霸之器身長八尺容貌甚偉時人異焉後至丞相趙雲字子龍身長八尺姿顔雄偉為本郡所舉將義從吏兵詣公孫瓚後至鎮軍將軍彭羕字永年身長八尺容貌甚偉後為江陽太守譙周字允南身長八尺體貌素朴後為光祿大夫入魏封陽城亭侯馬超字孟起來降關侯書與諸葛亮問超人才可誰比類亮知關侯䕶前乃答之曰孟起與益徳爭先未若髯之絶倫關多鬚髯故亮謂之髯也超後至驃騎將軍凉州牧張裕饒鬚為益州從事吳諸葛恪長七尺六寸少鬚睂折額廣額大口高聲為大將太史慈長七尺七寸美鬚髯猿臂善射孫韶身長八尺儀貌都雅周瑜字公瑾長壯有姿貌後至偏將軍朱據有姿貌膂力後至驃騎將軍吕範字子衡汝南人有容觀姿貌邑人劉氏家富女美範求之其母嫌欲勿與劉氏曰觀吕子衡寧當乆貧者耶遂與之婚後至大司馬陳武字子烈年十八長七尺七寸後至校尉董襲字元代長八尺武勇過人後至偏將軍陳化字元耀氣幹剛毅長七尺九寸雅有威容後至太常晉樂廣字彥輔父方參魏征西將軍夏侯𤣥軍事廣年八歲𤣥嘗見廣在路因呼與語還謂方曰向見廣神姿朗徹當為名士卿家雖貧可令專學必能興卿門户也衛瓘嘗曰此人之氷鏡見之瑩然若披雲霧而覩青天也後至尚書令羊祜身長七尺三寸美鬚睂太原郭奕見之曰此今之顔子也後至征南大將軍石苞字仲容渤海南皮人也雅曠有智局容儀偉麗不修小節時人為之語曰石仲容姣無雙後至大司馬衛玠字叔寶年五歲風神秀異祖父瓘曰此兒有異於衆顧吾年老不見其長成耳總角乘羊車入市見者皆以為玉人觀之者傾都驃騎將軍王濟玠之舅也雋爽有風姿每見玠輒歎曰珠玉在側覺我形穢又嘗語人曰與玠同遊烱若明珠之在側朗然照人玠妻父樂廣有重名議者以為婦翁氷清女壻玉潤為太子洗馬懷帝末至建業京師人士聞其姿容觀者如堵玠勞疾遂甚永嘉六年卒時年二十七時人謂看殺衛玠王衍字夷甫神情朗秀風姿詳雅王敦過江嘗稱之曰夷甫處衆中如珠玉在瓦石間顧愷之作畵贊亦稱衍巖巖清峙壁立千仭其為人所尚如此衍弟澄嘗謂衍曰兄形似道而神峰太儁衍曰誠不如卿落落穆穆然也後為太尉王戎字濬冲㓜頴悟神彩秀徹視日不眩裴楷目之曰目爛爛如巖下電戎後為司徒戎子萬有美貌少而大肥戎令食糠而肥愈甚裴楷字叔則風神高邁容儀俊爽時人謂之玉人又稱見裴叔則如近玉山照映人也為中書郎出入宫省見者肅然改容後至光禄大夫開府儀同三司疾篤詔遣黄門郎王衍省疾楷廻眸矚之曰竟未相識衍深歎其神儁裴瓚字國寶楷子也為中書郎風神高邁見者皆敬之嵇康早孤有竒才逺邁不羣身長七尺八寸美詞氣有風儀而土木形骸不自藻餙人以為龍章鳳姿天質自然後至中散大夫趙至字景真代郡人嵇康每曰卿頭小而鋭瞳子白黑分明有白起之風矣後至幽州部從事潘岳字安仁美姿儀辭藻絶麗少時嘗挾彈出雒陽道婦人遇之者皆連手縈繞投之以果遂滿車而歸後至給事黄門侍郎夏侯湛字孝若美容觀與潘岳友善每行止同輿接茵京都謂之連璧後至散騎常侍阮籍字嗣宗容貌瓌傑志氣宏放後至歩兵校尉魏舒身長八尺二寸姿望秀偉文帝深器重之毎朝㑹罷目送之曰魏舒堂堂人之領袖也後至司徒陸機字士衡身長七尺其聲如鐘後至平原内史王育身長八尺餘鬚長三尺容貌絶異音聲動人王湛字處冲少有識度身長七尺八寸龍顙大鼻後至汝南太守劉卞字叔龍須昌人赤色大唇少言語自縣小吏至雍州刺史王裒少立操尚行已以禮身長八尺四寸容貌絶異音聲清亮辭氣雅正博學多能三徵七辟皆不就唐彬身長八尺後至雍州刺史庾敳長不滿七尺而腰帶十圍雅有逺韻後為太傅主簿王導耳豎垂多疾每自憂陳訓曰耳豎必壽亦大貴後至丞王矩字令武美姿容每游觀者盈路杜乂字𢎞理性純和美姿容有盛名於江左王羲之見而目之曰膚若凝脂眼如點漆此神仙人也桓彞亦曰衛玠神清杜乂形清後至丹陽丞王濛善𨽻書美姿容嘗覽鏡自照稱其父字曰王文開生如此兒邪居貧帽敗自入市買之嫗悦其貌遺以新帽後至中書郎王彪之字叔武年二十鬚鬢皓白時人謂之王白鬚後至儀同三司光禄大夫郗恢少襲父爵散騎侍郎累遷給事黄門侍郎領太子右衛率恢身長八尺美鬚髯孝武帝深器之以為有藩伯之望張光字景武身長八尺明睂目美音聲後至凉州刺史王恭美姿儀人多愛悦或目之云濯濯如春月柳又嘗被鶴氅歩雪而行孟昶窺見歎曰神仙中人後至平北將軍兖青二州刺史桓温生未朞温嶠見之曰此兒有竒骨可試使啼及聞聲曰真英物也年長豪爽有風槩姿貌甚偉面有七星少與沛國劉惔善惔嘗稱之曰温眼如紫石稜鬚作蝟毛磔孫仲謀晉宣王之流亞後至大司馬桓𤣥形貌瓌竒風神疎朗盧循諶之曽孫雙眸烱徹瞳子四轉後假廣州刺史劉牢之字道堅面紫赤色鬚目驚人而沈毅多計畫後至輔國將軍前趙劉義孫年十歲身長七尺五寸睂鬢如畵雖少罹屯難流躓殊荒而風骨俊茂爽朗卓然及長身長八尺三寸髮與身齊多力善射驍捷如風雲曜偽立為世子游子逺㓜有姿貌聰亮好學劉曜以為車騎大將軍後趙張謐美姿貌㓜有逸氣前秦苻融堅之季弟少而岐嶷夙成魁偉美姿度堅以為車騎大將軍王猛瓌姿儁偉博學好兵書苻堅以為丞相後秦尹緯身長八尺腰帶十圍魁梧有爽氣姚萇以為尚書僕射前燕慕容恪字𤣥恭皝之第四子也㓜沉深有大度皝未之竒也年十五身長八尺七寸容貌魁傑雄毅嚴重毎所言及輒經綸世務皝始異焉乃授之以兵及慕容儁嗣位以為侍中錄尚書事高瞻少而英爽有俊才身長八尺二寸慕容廆署為將軍韓恒字景山師事同郡張載載竒之曰王佐才也身長八尺一寸慕容儁以為揚烈將軍宋南郡王義宣為荆州刺史白晳美鬚睂長七尺五寸腰帶十圍謝晦美風姿善言笑睂目分明鬢髮如墨時謝混風華為江左第一嘗與晦俱在武帝前帝見之曰一時頓有兩玉人爾晦至荆州刺史謝莊太常𢎞微之子韶令美容儀文帝見而異之謂尚書僕射殷景仁領軍將軍劉湛曰藍田出玉豈虚也哉孝武選侍中四人並以風貌王彧與莊為一雙阮韜何偃為一雙嘗充兼假薛安都少以勇聞身長七尺八寸便弓馬後至左軍將軍王敬𢎞形狀短小而坐起端方後至左光禄大夫蓋道風姿貌端雅容止可觀中書郎范述見而竒之曰此荆楚仙人也南齊李安仁面方明帝大㑹新亭樓勞諸軍主摴蒲賭官錢安仁五擲皆盧帝大驚目安仁曰卿面方如田封侯狀也後至吳興太守安東將軍袁彖為侍中形體充腴有異於衆每從車駕射雉在郊野數人推扶乃能徙歩劉善明為征虜將軍身長七尺九寸質素不好聲色房法乘為交州刺史性方簡身長八尺三寸行出人上常自俯屈青州刺史明慶符亦長與法乘等朝廷唯此二人陸慧曉為吏部郎孝武欲用為侍中以形短小乃止沈文季為侍中風采稜岸善於進止吕僧珍為門下書佐身長七尺五寸容貌甚偉在同類中少所䙝狎曹軰皆敬之褚淵字彥囘美儀貌善容止俯仰進退咸有風則每朝㑹百僚逺國使莫不延首目送之明帝嘗歎曰褚彥囘能遲行緩歩便得宰相矣時人以方何平叔後至司徒何戢為吏部尚書美儀容動止與褚淵相慕時人呼為小褚公陸僚美姿容鬚睂如畵梁張緬尚富陽公主年十七身長七尺四寸睂目疎朗神采爽發後至侍中王茂字休逺身長八尺美容觀武帝布衣時見之歎曰王茂年少堂堂如此必為公輔之器後至驃騎將軍開府儀同三司褚向為侍中風儀端麗睂目如畫每公庭就列為衆所瞻望焉沈約左目重瞳子腰有紫痣後至尚書令何烱白晳美容貌從兄求點每稱之曰叔寶神清𢎞治膚清今觀此子復見衛杜在目後至治書侍御史任昉身長七尺五寸後至新安太守袁君正美風儀善自居處以貴公子得當世名譽後至吳郡太守何敬容為侍中身長八尺白晳美鬚睂性矜莊衣冠尤事鮮麗每公庭就列容止出人韋放字元直身長七尺腰帶八圍容貌甚偉歴北徐州刺史范岫身長七尺八寸恭敬儼恪進止以禮後至光禄大夫韋粲字長倩身長八尺容貌甚偉後至散騎常侍陶𢎞景身長七尺四寸神儀明秀朗目疎睂細形長耳後為奉朝請上表辭禄羊侃字祖忻少而雄偉身長七尺八寸後至侍中軍師將軍楊華少有勇力容貌雄偉後至左衛率蕭子顯為太尉錄事偉容貌身長八尺何點明目秀睂容貌方雅真素通羙不以門户自矜徵侍中不起柳仲禮身長八尺睂目疎朗後至扶風太守到溉身長八尺美風儀善容止後至金紫散騎常侍袁憲年十四為正言生祭酒到漑目送之愛其神彩劉訏尚書郎何烱嘗遇之於路曰此人風神頴俊蓋荀奉倩衛叔寳之流也命駕造門拒而不見族祖孝標與訏書稱訏及族兄歊曰訏超超越俗如半天朱霞歊矯矯出塵如雲中白鶴皆儉歲之粱稷寒年之纎纊訏嘗著糓皮巾披衲衣每遊山澤輒留連忘反神理閒正姿貌甚華在林谷之間意氣彌逺或有遇之者皆謂神人王暕年數歳而風神警㧞有成人之度父儉作宰相賓客盈門見暕相謂曰公才公望復在此矣後至尚書左僕射伏曼容素美風采宋明帝以方嵇叔夜後至臨海太守劉孝威氣調爽逸風儀俊舉江禄形貌短小神明俊發後梁薛暉河東人有才畧身長八尺形貌甚偉後至領軍將軍陳韓子髙㑹稽山隂人也家本微賤侯景之亂寓在京都景平文帝出守吳興子髙年十六為總角容貌美麗狀似婦人後至右衛將軍顧越長七尺三寸美鬚睂武帝嘗於重雲殿自講老子僕射徐勉舉越論義越抗首而請音響若鐘容止可觀帝深贊美之繇是擢為中軍宣城王記室叅軍謝哲字頴豫美風儀舉止藴藉襟情豁朗為士君子所重後至吏部尚書中書令侍中司徒左長史蕭允字叔佐風神凝逺通達有識鑒容止藴藉動合規矩後至安德宫少府王瑒字子璵沉靜有器局美風儀舉止藴藉馬樞目精洞黄能視闇中物後至侍中徐陵目有青精時人以為聰慧之相也後至太子太傅後魏封翼字君贊美容貌腰帶十圍以兄偉伯立節之勲除給事中李同軌體貌魁岸腰帶十圍後至中書侍郎陸希道字洪度有風貌美鬚髯後至荆州刺史冦讚少有清名身長八尺姿容嚴嶷非禮不動後至安南將軍崔浩為左光禄大夫浩纎妍潔白如美婦人髙允孫綽字僧裕少孤恭敏自立身長八尺腰帶十圍後至并州刺史乙乾歸為侍御中散大夫身長八尺有氣幹毛法仁為散騎常侍言聲壯大至於軍旅田狩唱呼處分振於山谷宇文延字慶壽體貌魁岸睂目疎朗後至散騎常侍柳崇方雅有器量身長八尺美鬚明目兼有學行後至河東太守柳援字乾䕶身長八尺儀望甚偉後至光禄大夫李秀之字鳳起為尚書都官郎秀之弟子雲字鳳昇本州治中子雲弟子羽字鳳除征南法曹子羽弟子岳字鳳跱大司馬祭酒兄弟並容貌魁偉風度審正李璨字世顯身長八尺五寸容貌魁偉後至建武將軍趙超宗身長八尺頗有將畧超宗弟令勝亦長八尺疎狂有膂力後至河東太守段暉字長祚身長八尺餘師事歐陽湯湯甚器愛之後為乞伏熾盤輔國將軍李冲年裁四十而鬢髮班白姿貌豐美未有衰狀後至尚書僕射鄭模字叔軌身長八尺圍亦如之崔接字顯賓容貌魁偉放邁自高不拘常簡後至樂陵太守崔孝演字伯則性通率美鬚髯姿貌魁傑後至瀛州西安府外兵叅軍崔孝直字叔廉身長八尺睂目疎朗早有志尚後除光禄大夫辭不赴蕭正表字公儀長七尺九寸睂目疎朗雖質貌豐美而性理短闇後至司空徐州刺史畢祖朽身長八尺腰帶十圍後至瀛州刺史邢巒美鬚髯姿貌甚偉州郡表貢拜中書博士崔光韶性嚴毅聲韻抗烈與人平談常若震厲至於兄弟議論外聞謂為忿怒然孔懷雍睦人少逮之後至廷尉卿裴禮和為謁者僕射身長九尺腰帶十圍於羣衆之中魁然有異李元䕶身長八尺美鬚髯少有武力後至齊州刺史王世弼為中山内史身長七尺八寸魁岸有壯氣路雄字仲畧容貌偉異以軍功為給事中髙祖曾對羣臣云路仲畧好尚書郎才僕射李冲云其人宜為武職遂停盧同字叔倫身長八尺容貌魁偉善於處世後至開府儀同三司張普恵字洪賑身長八尺容貌魁偉後至東豫州刺史劉道斌㓜而好學有器幹及長腰帶十圍鬚髯甚美後至岐州刺史魏蘭根身長八尺儀貌竒偉後至開府儀同三司山强美容貌身長八尺五寸為奏事中散張吾貴字吳子少聰慧有口辯身長八尺容貌奇偉不仕而終徐遵明身長八尺董徵身長七尺二寸好古學尚雅素後至平東將軍裴佗容貌魁偉隤然有器望後至中軍將軍北齊許惇為殿中尚書惇美鬚下垂至帶省中號長鬛公文宣嘗因酒酣握惇鬚稱美以刀截之唯留一握惇懼因不復敢長人又號齊鬚公馮偉節身長八尺衣冠甚偉見之者肅然敬憚郎基字世業身長八尺美鬚髯汎渉墳典後至海西鎮將房豹體貌魁岸美音儀後至樂陵太守路去病風神疎朗儀表瓌異官至成安令李祖昇顯祖李皇后之長兄儀容壞麗垂手過膝後至齊州刺史斛律光字明月馬面彪身神爽雄傑少言笑工騎射後至左丞相叱列平字殺鬼代郡西部人世為酋師有容貌鬚髯後至兖州刺史慕容比頤為南頓太守身長一丈腰帶九尺李繪字敬文及長儀貌端偉神情朗儁第五舅河間邢晏每與言歎其髙逺曰若披煙霧如對珠玉宅相之寄良在此甥歴中書侍郎丞相司馬每罷朝文武總集對揚王庭常令繪先發言端為羣僚之首音詞辨正風儀都雅聽者悚然文襄益加敬異又掌儀注慕容儼容貌出羣衣冠甚偉後至營州刺史司馬膺之字仲慶美鬚髯有風貌好學厚自封植神氣甚髙歴中書黄門侍郎髙隆之字延興身長八尺美鬚髯沈深有志氣後至録太保尚書事髙昻字敖曹㓜稚時便有壯氣長而俶儻膽力過人龍睂豹頸姿體雄異後至司徒崔㥄為七兵尚書清河邑中正趙郡李渾嘗讌聚名輩詩酒正讙譁㥄後到一坐無復談話者鄭伯猷歎曰身長八尺面如刻畫謦欬為洪鐘響胸中貯千巻書使人那得不畏服崔曕字彦通聰明有文藻善容止神彩凝然楊愔曰昔裴瓚在晉為中書侍郎神情髙邁每於禁門出入宿衞者肅然動容崔生堂堂之貌亦當無愧裴子皇建元年除給事黄門侍郎王琳體貌閒雅立髪委地喜怒不形於色後至特進侍中元文遙字行恭美姿貌有父風兼俊才位中書舍人待詔文林舘婁昭方雅正直大度深謀腰帶八圍弓馬冠時後至定州刺史劉禕聰敏機悟美姿儀為其舅北海王昕所愛顧座客曰可謂珠玉在傍覺我形穢後至睢州刺史後周長孫澄容貌魁岸風儀温雅後至絳州刺史竇熾性嚴明有謀畧美鬚髯身長八尺二寸後至雍州牧入隋為太傅唐瑾性温恭有器量博渉經史雅好屬文長八尺二寸容貌甚偉後至司宗中大夫庾信身長八尺腰帶十圍容止頽然有過人者後至司宗中大夫宇文神舉族兄安化公深器異之神情倜儻志畧英贍眉目疎朗儀貌魁梧有識欽之莫不許以逺大後至并州總管豆盧寧少驍果有志氣身長八尺美容儀善騎射後至大司寇楊忠美鬚髯身長七尺八寸狀貌魁偉武藝絶倫有將帥之畧後至荆州刺史叱列伏龜容貌魁偉腰帶十圍進止閒雅兼有武藝後至驃騎大將軍開府儀同三司劉亮少倜儻有從横計畧姿貌魁傑見者憚之後至車騎大將軍開府陳忻字永怡少驍勇有俠氣姿貌魁岸同類咸敬憚之後至雄州刺史元胄魏昭成帝之六世孫胄少英果多武藝美鬚睂有不可犯之色齊王憲見而壯之引致左右柳帶韋字孝孫深沉有度量少好學身長八尺三寸美風儀善占對周文辟為叅軍事李渾字金才姿貌瓌偉美鬚髯起家左侍上士隋李德林美容儀善談吐齊天統中兼中書侍郎於賓舘受國書陳使江總目送之曰此即河朔之英靈也竇榮定沉深有器局容貌瓌偉美鬚髯便弓馬初仕魏為千牛僃身周太祖見而竒之授平東将軍元暉字叔平鬚睂如畵進止可觀後至魏州刺史楊素字處道美鬚髯有英傑之表後至左僕射柳謇之字公正身長七尺五寸儀容甚偉風神爽亮進止可觀後至黄門侍郎韋藝為營州總管藝容貌瓌偉毎夷狄叅謁必整儀衛盛服以見之獨坐滿一榻蕃人畏懼莫敢仰視王世積字闡熈容貌魁岸腰帶十圍風神爽㧞有人傑之表後至上柱國郭榮容貌魁岸外疎内宻與其交者多愛之後至右候衛大將軍李景字道興容貌竒偉膂力過人美鬚髯高祖竒其壯武使袒而觀之曰卿相表當位極人臣後為右武衛大將軍劉元振少好任俠為州里所宗兩手各長尺餘臂垂過膝後以逆誅樊叔畧身長九尺志氣不凡終司農卿公孫景茂字元尉容貌魁梧少好學博渉經史後至淄州刺史于顗字元武身長八尺美鬚睂周大冡宰宇文䕶見而器之妻以季女後至吳州總管崔𢎞度膂力絶人儀貌魁岸鬚西甚偉後至檢校太府卿劉焯犀額龜背望高視逺聰敏沉深弱不好弄後至員外將軍段逹身長八尺美鬚髯後以王世充黨誅虞綽字士裕身長八尺姿儀甚偉後至著作佐郎楊𤣥感體貌雄偉美鬚髯後以逆誅唐薛舉容貌瓌偉㐫悍善射裴寂疎睂目偉姿容後至尚書左僕射劉文靜偉姿儀有器幹後至納言魏徵為太子太師狀貌不逾中人而素有膽智李靖姿貌瓌偉少有文武材畧後至開府儀同三司李緯自司農卿為民部尚書時房𤣥齡在京城留守㑹有自京師來者太宗問曰𤣥齡聞李緯拜尚書如何對曰𤣥齡但云李緯好髭鬚更無他語岑文本性沉敏有姿儀後至中書令高士廉風調温雅屬詞清潤姿儀端偉鬚睂如畵後至開府儀同三司李義琰高宗時為中書侍郎同中書門下三品身長八尺黑齒常之長七尺餘驍勇有謀後至左武衛大將軍張知謇儀質瓌偉睂目疎朗後至左衛將軍王晙氣貌雄壯時人謂之有熊虎之狀後至兵部尚書同中書門下三品蕭嵩美鬚髯儀形偉麗後為巾書令楊慎矜為御史中丞及兄慎餘為少府少監慎名為雒陽令皆偉儀形風韻高朗慎名嘗覽鏡見其鬚面神彩有過於人覆鏡歎惋曰吾兄弟三人盡長六尺餘有如此貌如此材而見容當代以期全難矣何不使我少體弱也李嗣業身長七尺壯勇絶倫後至北庭行營節度使張鎬風儀魁岸廓落有大志後為中書侍郎平章事魯炅身長七尺餘渉獵書史後至山南節度使李嘉寵冀州人其形長八尺五寸開元中本州以獻勅曰李嘉寵土風所育體幹出羣因其器用之宜俾在期門之次可武衛上士仍配左監門衛吉頊身長八尺陰毒敢言後至天官侍郎平章事安禄山垂肚過膝自稱得三百五十斤每朝見𤣥宗戲之曰朕適見卿肚幾垂至地祿山每行以肩膊左右擡挽其身方能移歩𤣥宗令前作胡旋舞疾如風祿山所乗驛每驛中間築換馬臺不然馬輒死驛家簡祿山所乘馬以土載五石能䭾馳者卽以高價市之䬴飼以待之鞍前更連置小鞍以乘其肚郭子儀長六尺餘體貌秀傑後至太尉尚父程千里身長七尺骨相瑰岸後至上黨郡長史崔光逺身長六尺餘目睛白黒分明後至劔南節度使毛若虚眉覆於眼性又殘忍後至御史中丞張孝恭奚種也猛毅魁渠長六尺餘性寛裕事親盡孝後為易定節度使朱泚㓜壯偉腰帶十圍李忠臣為汴州節度使嘗因奏對德宗謂之曰卿耳其大真貴人也忠臣對曰臣聞驢耳甚大龍耳卽小臣耳雖大乃驢耳也帝悦之李融為鄭滑節度姿貌魁岸齊暎貞元初為給事中白晳長大言音高朗德宗自興元還京師嘗令暎侍或馬前至城邑鎮守輒令暎宣詔令史奉敬元和中為朔方將形甚短小若不能勝衣崔𢎞禮字從周風貌魁偉自言有大志後至東都留守楊炎美鬚睂風骨峻峙文藻雄麗後至中書侍郎平章事郭釗偉姿容身長七尺方口豐下為人以莊默自處後至劔南節度使李揆美風儀善奏對後至中書侍郎平章事李晟年十八從軍身長六尺勇敢絶倫後至太府中書令馬燧姿度魁異長六尺二寸沈勇多智畧後至司徒侍中王武俊形體魁偉長六尺餘性寛裕後至成德軍節度使李元諒長大美鬚髯勇敢多計謀後至同華節度使李珙長六尺餘氣貌魁岸裴度為司徒中書令狀貌不踰中人而風彩俊爽占對雄辯觀聽者為之聳然蕭遘為中書侍郎平章事形神秀偉志操不羣少負大節以經濟為己任洎處台司風望尤峻奏對朗㧞天子器之康謙者善賈資產億計髭鬚長三尺過帶梁李思安性毅勇未弱冠身長七尺超然有乗時自奮之志後至相州刺史羅紹威為魏博節度使形貌魁偉有英傑氣趙昶形神灑落臨事有通變之才後至忠武軍節度使胡真體貌洪壯長七尺善騎射後至寧逺將軍節度使冦彥卿身長八尺隆準方面語音如鐘後至鄧州節度使劉知俊姿貌雄傑倜儻有大志後至同州節度使後唐李嗣昭形貌𦕈小而精悍有膽後為澤潞節度使盧文紀為太常卿形貌魁偉語音高朗占對鏗鏘健於飮啖奉使蜀川路繇岐下時淸泰帝為岐帥以主禮待之觀其儀形旨趣遇之頗厚孔邈兖州曲阜人文宣王四十一代孫身長七尺餘神氣温克綽有素風朱漢賓少有膂力形神壯偉膽氣過人後至太子少保致仕晉桑維翰身短面長殆非常人旣壯每對鑑自歎曰七尺之身不如一尺之面由是慨然有公輔之望後至中書令華温琪初事黃巢為供奉官巢敗奔至滑州以形貌魁岸懼不自容乃投白馬下流俄而浮至淺處又登桑自經枝折不死後果貴焉位至太子少保致仕張萬進白晢美鬚後至彰義軍節度使皇甫遇少好勇及壯虯髯善騎射後至華州節度使盧文進身長七尺飲㗖過人望之偉如也後至安州節度使張彥澤少有勇力目睛黃而夜有光色視瞻如猛獸焉後為相州節度使漢劉景巖昻藏巨準時人號為大鼻後至太子太師致仕周和凝㓜而聰敏姿狀秀㧞神彩射人後為太子太傅李懷忠形質魁壯勇敢出人後至左武衛上將軍冊府元龜卷八百八十三
