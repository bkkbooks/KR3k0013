body:
  text: 册府元龜卷三百四宋王欽若等撰外戚部忠直規諫賢行禮士論薦忠直匪躬守節之謂忠方正無邪之謂直然則忠無不直直在其忠是以君子本忠節以成身篤正直而立志道無不在徳必有鄰漢魏以還葭莩之戚或正辭排難非義莫干或竭節存誠惟善是與增霧露之潤明日月之輝旣受任而無慙亦國家而有頼垂於後也不其偉與漢竇嬰字王孫竇太后從兄子孝景即位爲詹事帝弟梁孝王太后愛之孝王朝因燕昆弟飲序家人昆弟之親不為君臣禮也是時帝未立太子酒酣帝從容曰千秋萬歲後傳王從千容反太后驩嬰引巵酒進帝曰天下者髙祖天下父子相傳漢之約也上何以得傳梁王太后由此憎嬰嬰亦薄其官自嫌其官輕薄之也因病免太后除嬰門籍不得請四年立栗太子栗姬之子故曰栗太子以嬰爲傅七年栗太子廢嬰爭弗能得謝病屏居藍田山下王商字子威宣帝時以舅子嗣封樂昌侯元帝時至右將軍光禄大夫是時成帝為太子定陶共王愛幸幾代太子共讀曰恭幾巨依切商爲外戚重臣輔政擁佑太子頗有力焉佑助也成帝即位甚敬重商徙為左將軍王音元后從父弟爲車騎將軍成帝時王氏爵位日盛唯音爲修整數諫正有忠節傅喜字稚遊哀帝祖母定陶傅太后從父弟哀帝初即位以喜爲衞尉遷右將軍是時王莽爲大司馬乞骸骨避帝外家帝既聽莽退衆庶歸望於喜喜從弟孔鄉侯晏親與喜等俱太后從父弟也而女為皇后帝舅陽安侯丁明皆親以外屬封喜執謙稱疾傅太后始與政事喜數諫之與音豫由是傅太后不欲令喜専政帝於是用左將軍師丹代王莽爲大司馬賜喜黄金百斤上將軍印綬以光禄大夫養病班穉成帝班媫妤之兄弟平帝時太后臨朝王莽秉政方欲文致太平言欲以文教致太平使使者分行音下更切風俗博采頌聲而穉無所上不稱符瑞及歌頌琅邪太守公孫閎言灾害於公府大司空甄豐遣屬馳至兩郡諷吏民遣言祥應而隠除灾害而劾閎空造不祥穉絶嘉應嫉害聖政皆不道太后曰不宣徳美宜與言灾害者異罰且後宫賢家我所哀也班媫妤有賢德故哀閔其家閎獨下獄誅穉懼上書陳恩謝罪願歸相印入補延陵園郎太后許焉食故禄終身繇是班氏不顯莽朝亦不罹咎王閎元后母弟平阿侯譚之子哀帝時爲中常侍時幸臣董賢爲大司馬寵愛貴盛閎屢諫忤㫖哀帝臨終以璽書綬付賢曰無妄以與人時國無嗣主内外憂懼閎白元后請奪之即帶劍至宣德後闥舉手叱賢曰宫車宴駕國嗣未立公受恩深重當俯伏號泣何事持璽綬以待禍至耶賢知閎必死不敢拒之乃跪授璽綬閎馳上太后朝廷壯之及王莽簒位濳忌閎乃出爲東郡太守閎懼誅常繫藥手内莽敗漢兵起閎獨完全東郡三十餘萬戸歸降更始後漢陰興光烈皇后母弟建武二年爲黄門侍郎守期門僕射典將武騎從征伐平定郡國興每從出入常操持小葢障翳風雨躬履塗泥率先期門光武所幸之所輒先入清宫甚見親信雖好施接賔然門無俠客與同郡張宗上谷鮮于裒不相好知其有用猶稱所長而達之友人張汜杜禽與興厚善以爲華而少實但私之以財終不爲言是以世稱其忠平樊鯈光武舅子明帝時爲長水校尉廣陵王荆有罪帝以至親悼傷之詔鯈與羽林監南陽任隗雜理其獄事竟奏請誅荆引見宣明殿帝怒曰諸卿以我弟故欲誅之即我子卿等敢爾邪鯈仰而對曰天下髙帝天下非陛下之天下也春秋之義君親無將將而誅焉是以周公誅弟季友鴆兄經傳大之臣等以荆屬託母弟陛下仁聖心加惻隱故敢請耳如令陛下子臣等專誅而已帝歎息良久鯈益以此知名馬廖以明德皇后弟爲羽林左監虎賁中郎廖性質誠忠愼不愛權勢聲名盡心納忠不屑毁譽魏卞蘭武宣皇后弟秉子為奉車都尉嘗苦酒消渴時明帝信巫女用水方使人持水賜蘭蘭不肯飲詔問其意蘭言治病自當以方藥何信於巫帝為變色後渴愈甚以至於亡故時人見蘭好直言謂帝面折之而蘭自殺其實不然吳朱據大帝時尚公主拜左將軍赤烏九年遷驃騎將軍遭二宫搆争據擁護太子言則懇至義形於色守之以死曰臣聞太子國之本根雅性仁孝天下歸心今卒責之將有一朝之慮昔晉獻用驪姬而申生不存漢武信江充而戾太子寃死臣竊懼太子不堪其憂雖立思子之宫無所復及矣晉胡奮字𤣥威武帝時爲鎭軍大將軍泰始末女爲貴人時楊駿以后父驕傲自得奮謂駿曰卿恃女更益豪耶歴觀前代與天家婚未有不滅門者但早晩事耳觀卿舉措適所以速禍駿曰卿女不在天家乎奮曰我女與卿女作婢耳何能損益時人皆爲之懼駿雖銜之而不能害賈模以惠帝皇后從兄爲侍中乃盡心輔弼推張華裴頠同心輔政數年之中朝野寜静模之力也王爽字季明孝武定皇后弟强正有志力厯給事黄門侍郎侍中孝武末王國寳夜欲開門入爲遺詔爽拒之曰大行宴駕皇太子未至敢入者斬乃止隋獨孤開逺元貞皇后之兄子也爲左千牛及宇文化及江都作逆開逺時在宿直遂率殿中數百人詣𤣥覽門請戰門已爲賊所據不得通兵士稍引去開逺遂被執化及義而不誅唐蕭瑀初仕隋爲内史侍郎既以后弟之親委之機務後數以言忤㫖漸見疎斥長孫無忌文徳皇后兄也嘗從太宗征討累除比部郎中及隱太子建成等謀害太宗無忌請先發誅之於是奉宻㫖詔房𤣥齡杜如晦等爲籌略及難作無忌與尉遲敬徳侯君集張公謹劉師立公孫武達獨孤彦杜公綽鄭仁泰李孟嘗等九人入𤣥武門討建成等平之王同皎尚中宗女拜駙馬都尉神龍中以武三思專權任勢謀爲逆亂乃招集壯士期以則天靈駕發引刼殺三思同謀人撫州司倉冉祖雍具以其計宻告三思三思乃遣校書郎李悛上言同皎濳謀殺三思後將擁兵詣闕廢黜皇后帝然之遂斬同皎於都臺驛前籍没其家臨刑神色不變天下莫不寃之睿宗即位令復其官爵執冉祖雍李悛並誅之吳湊大歴中以章敬皇后弟為金吾將軍代宗誅宰相元載時王縉楊炎王昂韓洄包佶韓㑹皆當從坐籍没湊百端救解以縉等罪未至極刑恐虧損聖徳由是各貶官而已湊兄淑建中初爲左金吾衞大將軍涇原兵叛駕幸奉天盧杞白志貞稱朱泚必當向順固無背叛之事德宗擇大臣可使者衆憚其行淑嘆息謂親友曰國難不能死非人臣也吾忝恩戚知死所矣遂請使焉及至京城賊泚勉勞如常儀淑退而泚逆謀已决因害淑於四方館之前帝聞而哀悼乆之郭釗元和末以懿安皇后兄爲司農卿時憲宗寢疾彌旬諸中貴人秉權廢立紛紛未定穆宗在東宫憂甚使人問謀於釗釗曰殿下身爲皇太子但朝夕侍膳謹守以俟又何他慮乎迄今稱得元舅之體規諌傳曰近臣盡規又曰工執藝事以諫然則諌諍之道臣子之事自上下下靡不由之况在懿親寧㤀忠藎其有葭莩近屬肺腑大臣位秩既崇委頼斯至或則握兵之要或則居帝之右或出入椒掖或陟降彤墀莫不義重君親理同休戚乃有秉純亮之操勵謇諤之志獻可替否以罄其深衷見危授命以全其大節至於朝政之愆缺國體之安危何嘗不進思盡忠彌縫其失孜孜以納誨惓惓以弼違言有逆於耳而拂於心事有利於上而益於國兹所謂親親之義知無不爲者焉史丹元帝時爲駙馬都尉以宣帝外屬親信之詔丹䕶太子家是時傅昭儀子定陶共王有材藝子母俱愛幸而太子頗有酒色之失母王皇后無寵建昭之後元帝被疾不親政事留好音樂或置鼙皷殿下天子自臨軒檻上隤銅丸以擿皷隤下也擿投也聲中嚴鼔之節莊嚴皷節也後宫及左右習知音者莫能爲而定陶王亦能之帝數稱其材丹進曰凡所謂材者敏而好學温故知新敏速疾也温厚也温故厚蓄故事皇太子是也若廼器人於絲竹皷鼙之間則是陳惠李微髙於匡衡可相國也陳惠李微二人皆黄門皷吹也於是帝黙然而笑竟寧元年帝寢疾傅昭儀及定陶王常在左右而皇后太子希得進見帝疾稍侵意忽忽不平稍侵言漸篤也平和也數問尚書以景帝時立膠東王故事是時太子長舅陽平侯王鳳爲衞尉侍中與皇后太子皆憂不知所出不知計所出丹以親宻臣得侍視疾候帝間獨寢時丹直入卧内頓首伏青蒲上以青規地曰青蒲自非皇后不得至此涕泣言曰皇太子以適長立十餘年名號繫於百姓天下莫不歸心臣子自託爲臣子見定陶王雅素愛幸今者道路流言爲國生意以爲太子有揺動之議審若此公卿以下必以死争不奉詔臣願先賜死以示羣臣天子素仁不忍見丹涕泣言又切至帝意大感喟然太息曰吾日困劣而太子兩王又少意中戀戀亦何不念乎然無有此議且皇后謹愼先帝又愛太子吾豈可違㫖駙馬都尉安所受此語丹即却頓首曰愚臣妄聞罪當死却退也離青蒲二席地帝因納謂丹曰吾病寖加恐不能自還寖漸也善輔道太子毋違我意丹嘘唏而起太子由是遂爲嗣矣班伯成帝時爲侍中光禄大夫伯况之子也况女爲帝媫妤帝自大將軍薨後王鳳也富平定陵侯張放淳于長等始愛幸出為微行行則同輿執御入侍禁中設宴飲之㑹及趙李諸侍中皆引滿舉白謂引取滿觴而飲舉觴告白盡杯也一説白者罰爵之名也飲有不盡者則以此爵罰之魏文侯與大夫飲酒令曰不釂者罰以大白談笑大噱噱笑聲也時乘輿幄坐張畫屏風畫紂醉踞妲己作長夜之樂帝以伯新起數目禮之視而作敬戒狀顧指畫而問伯紂爲無道至於是乎伯對曰書云乃用婦人之言何冇踞肆於朝肆放也陳也所謂衆惡歸之不如是之甚者子貢曰紂之不善不如是之甚也是以君子惡居下流天下之惡皆歸焉故伯引此爲言帝曰茍不若此此圖何戒伯曰沈湎于酒微子所以告去也微子殷之卿士封於微爵稱子也殷紂錯亂天命微子作誥告箕子比干而去紂其誥曰用沈酗于酒用亂敗厥德于下我其發出狂吾家耄遜於荒事見尚書微子篇式號式呼大雅所以流連也大雅蕩之詩曰式號式呼俾晝作夜言醉酒號呼以晝爲夜也流連言作詩之人嗟嘆而涕泣流連也而説者乃以流連爲荒亡葢失之矣大雅所以流連不謂飲酒之人也詩書滛亂之戒其原皆在於酒帝乃喟然嘆曰吾久不見班生今日復聞讜言讜言善言也放等不懌懌悅也稍自引起更衣罷出後漢樊鯈光武舅宏之子也爲長水校尉明帝時上言郡國舉孝亷率取年少能報恩者耆舊大賢多見廢棄宜敕郡國簡用良俊又議刑辟宜須秋月以順時氣帝並從之馬嚴伏波將軍援之兄子援小女爲明帝后章帝即位徵拜侍御史中丞其年冬有日食之灾嚴上封事曰臣聞日者衆陽之長食者陰侵之徵書曰無曠庻官天工人其代之言王者代天官人也故考績黜陟以明褒貶無功不黜則陰盛凌陽臣伏見方今刺史太守專州典郡不務奉事盡心爲國而司察偏阿取與自己同則舉爲尤異異則中以刑法不即垂頭塞耳採求財賂今益州刺史朱酺楊州刺史倪説凉州刺史尹業等每行考事輒有物故又選舉不實曾無貶坐是使臣下得作威福也故事州郡所舉上奏司直察能否以懲虚實今宜加防檢式遵前制舊丞相御史親治職事唯丙吉以年老優游不察吏罪於是宰府習為常俗更共罔養以崇虚名或未曉其職便復遷徙誠非建官賦禄之意宜勅正百官各責以事州郡所舉必得其人若不如言裁以法令傳曰太上以徳服民其次莫如猛故火烈則人望而畏之水懦則人狎而翫之爲政者寛以濟猛猛以濟寛如此綏御有體灾眚消矣書奏納其言而免酺等官馬廖援之子章帝時爲衞尉帝甚尊重之時皇太后躬履節儉事從簡約廖慮美業難終上疏長樂宫以勸成德政曰臣按前世詔令以百姓不足起於世尚奢靡故元帝罷服官成帝御浣衣哀帝去樂府然侈費不息至於衰亂者百姓從行不從言也夫改政移風必有其本傳曰吳王好劍客百姓多創瘢楚王好細腰宫中多餓死長安語曰城中好髙髻四方髙一尺城中好廣睂四方且半額城中好大袖四方全疋帛斯言如戲有切事實前下制度未幾後稍不行雖或吏不奉法良由慢起京師今陛下躬服厚繒斥去華飾素簡所安發自聖性此誠上合天心下順民望浩大之福莫尚於此陛下既已得之自然尤宜加以勉勗法太宗之隆德戒成哀之不終易曰不恒其德或承之羞誠令斯事一竟則四海誦德聲薰天地神明可通金石可勒而况於行仁心乎况於行令乎願置章坐側以當瞽人夜誦之音太后深納之朝廷大議輒以詢訪鄧康以和熹皇后從兄爲越騎校尉康以太后久臨朝政宗門盛滿數上書長樂宫諫諍宜崇公室自損私權言甚切至太后不從梁商爲大將軍女即順帝后也永和四年中常侍張逵蘧政等共譖商事敗伏誅辭所連染及在位大臣商懼多侵枉乃上疏曰春秋之義功在元帥罪止首惡故賞不僣溢刑不滛濫五帝三王所以同致康乂也竊聞考中常侍張逵等詞語多所牽及大獄一起無辜者衆死囚乆繫纎微成大非所以順迎和氣平政成化也宜蚤訖竟以止逮捕之煩帝乃納之罪止坐者竇武女爲桓帝后武於延熹中爲城門校尉時國政多失内官專寵李膺杜密等爲黨事考逮永康元年武上疏諫曰臣聞明主不諱譏刺之言以探幽暗之實忠臣不恤諫諍之患以暢萬端之事是以君臣並熙名達百世臣幸得遭聖明之世逄文武之化豈敢懐禄逃罪不竭其誠陛下初從藩國爰登聖祚天下逸豫謂當中興自即位以來未聞善政梁孫寇鄧雖或誅滅而常侍黄門續爲禍虐欺罔陛下競行譎詐自造制度妄爵非人朝政日衰姦臣日强伏尋西京放恣王氏佞臣執政終喪天下今不慮前事之失復循覆車之軌臣恐二世之難必將復及趙髙之變不朝則夕近者姦臣牢修造設黨議遂收前司𨽻校尉李膺太僕杜宻御史中丞陳翔太尉掾范滂等逮考連及數百人曠年拘録事無效驗臣推膺等建忠抗節志經王室此誠陛下稷契伊吕之佐而虛爲姦臣賊子之所誣抵天下寒心海内失望惟陛下留神澄省時見理出以厭人鬼喁喁之心臣聞古之明君必須賢佐以成政道今臺閣近臣尚書令陳蕃僕射胡廣尚書朱密荀緄劉祐魏朗劉矩尹勲等皆國之貞士朝之良佐尚書郎張陵嬀皓苑康楊喬邉韶戴恢等文質彬彬明達國典内外之職羣才並列而陛下委任近習專樹饕餮外典州郡内幹心膂宜以次貶黜按罪糾罰抑奪官爵欺國之封按其無狀誣罔之罪信任忠良平决臧否使邪正毁譽各得其所寶愛天官惟善是授如此咎徵可消天應可待間者有嘉禾芝草黄龍之見夫瑞生必於佳士福至實由善人在德爲瑞無徳爲灾陛下所行不合天意不宜稱慶書奏因以病上還城門校尉槐里侯印綬帝不許有詔原李膺杜宻等自黄門北寺若盧都内諸獄繫囚罪輕者皆出之魏卞蘭武帝卞后弟秉之子明帝時蘭見外有二難而帝留意於宫室嘗因侍從數切諫帝雖不能從猶納其誠欵蘭位至散騎常侍吳滕裔封都亭侯弱冠尚公主每上表陳及時宜及民間優劣多所輔弼晉庾氷以后兄輔政康帝即位求出鎭武昌臨發上疏曰臣因循蒙寵冠冕當世而志無殊操量不及逺頃皇家多難釁故頻仍朝望國器與時殱落遂令天眷不墜降及臣身俯仰伏事於今五年上不能光贊聖猷下不能緝熙朝政而陛下遇之過分求之不已復策敗駕之駟以冀萬里之功非天眷之隆將何以至此是以敢竭狂瞽以獻血誠願陛下暫屏旒纊以𢎞聽納今彊冦未殄戎車未戢兵弱於郊人疲於内㓂之侵軼未可量也黎庶之困未之安也羣才之用未之盡也而陛下崇髙事與下隔視聼察覽必寄之羣下羣下宜忠不引不進百司宜勤不督不勸是以古之帝王勤於降納雖日總萬幾猶兼聼將相或借訟輿人或求謗芻蕘良有以也况今日之弊開闢之極而陛下歴數屬當其運否剥之難嬰之聖躬普天所以痛心於既徃而傾首於將來者也實冀否終而泰屬運在今誠願陛下𢎞天覆之量深地載之厚宅冲虛以爲本勤訓督以爲務廣引時彦詢于政道朝之得失必闗聖聼人之情僞必逹天聼然後覽其大當以總國綱恭儉節用堯舜豈逺大布之衣衞文何人是以古人有云非知之難行之難非行之難安之難也願陛下既思日側於勞謙納其起予之情則天下幸甚矣臣朝夕服膺猶不能暢臨疏徘徊不覺辭盡後魏胡䖍字僧敬靈太后從子太后既再臨朝恩威不立鄭儼等汙亂宫掖僧敬因聚集親族遂涕泣諫曰陛下母儀海内豈宜輕脱如此太后太怒自是不召僧敬䖍爲吏部郎中太后好與家人禮與親戚宴戲䖍常致諌由是後宴䖍不得預焉賢行夫髙而不危動罔不吉葢貴而能降行之爲艱况夫漸潤皇孋託屬丹掖析圭分爵累紫重金而能敦尚素風裁損貴勢以恭肅而逮下以矜嚴而奉上極孝弟之性循遜讓之則表率於后族流譽於薦紳因能永列土之封免傾輈之歎傳所謂帝王有外戚之助者其以是夫漢竇長君文帝竇后兄廣國字少君后弟也后立家於長安絳侯灌將軍乃選長者之有節行者與居竇長君少君由此爲退讓君子不敢以富貴驕人衛青衛皇后弟爲大將軍青仁善喜士退讓王商字子威父武以宣帝舅封爲樂昌侯商少爲太子中庶子以肅敬敦厚稱父薨商嗣爲侯推財以分異母諸弟身無所受居喪哀戚於是大臣薦商行可以厲羣臣義足以厚風俗宜偹近臣由是擢爲諸曹侍中中郎將史丹字君仲父髙衛太子良娣兄子也宣帝時封樂陵侯丹以父任爲中庶子成帝時封左將軍丹爲人足知愷悌愛人心甚謹宻馮參字叔平姊成帝昭儀也參少爲黄門郎給事中爲人務嚴好修容儀進退恂恂甚可觀也參昭儀少弟行又敕偹以嚴見憚後漢馬光援之子也光爲衛尉援女爲明徳皇后光爲人小心周宻喪母過哀東觀記云光遭母喪哀痛感傷形骸骨立帝以是特親愛之樊鯈字長魚宏之子宏即世祖舅也鯈謹約有父風事後母至孝及母卒哀思過禮毁病不自支世祖嘗遣中書黄門朝暮送饘粥鯈位至燕侯陰嵩興從兄也建武中爲中書郎將監羽林十餘年以謹勅見幸陰慶興子也封鮦陽侯慶推田宅財物悉與弟員丹明帝以慶義讓擢爲黄門侍郎鄧閶和熹皇后之弟也母新野君寢疾與兄騭並上書求還侍養太后以閶最少孝行尤著特聼之賜安車駟馬及新野君薨隲等復乞身行服章連上太后許之既還里第並居塜次閶至孝骨立有聞當時鄧康和熹皇后從兄也少有操行順帝時爲太僕有方正稱名重朝廷梁商少以外戚爲郎中遷黄門侍郎順帝選商女爲后位大將軍商天資聰敏昭逹萬情舉措動作直推雅性務在誠實不爲華飾孝友著於閭閾明信結於友朋其在朝廷儼恪矜嚴威而不猛退食私館接賔待客寛和肅敬憂人之憂樂人之樂皆若在已輕視財貨不爲蓄積故衣裘裁足卒歳奴婢車馬供用而已朝廷由是敬憚委任焉每有饑饉輒載租糓於城門賑與貧餒不宣已惠晉羊祜字叔子景獻皇后同産弟祜年十二喪父孝思過禮事叔父耽甚謹位至征南大將軍開府儀同三司庾衮字叔褒明穆皇后伯父也少履勤儉篤學好問事親以孝稱咸寧中大疫二兄俱亡次兄毗復殆癘氣方熾父母諸弟皆出次於外衮獨留不去諸父兄强之乃曰衮性不畏病遂親自扶持晝夜不眠其間復撫柩哀臨不輟如此十有餘旬疫勢既歇家人乃反毗病得差衮亦無恙父老咸曰異哉此子守人所不能守行人所不能行歳寒然後知松栢之後凋始知疫癘之不能相染也後州郡察孝亷舉秀才清白異行皆不降志宋趙倫之字㓜成下邳僮人也武穆皇后之弟㓜孤貧事母以孝稱位至領軍將軍徐湛之母髙祖長女㑹稽公主湛之早孤及長頗渉文義善自衛侍事祖母及母並以孝謹聞位至尚書僕射領䕶軍將軍南齊江祐姑爲景皇后祐爲太子詹事勢冠當時然家行甚睦待子姪有恩意梁張𢎞榮字眞簡范陽方城人文獻皇后之從父弟也㓜以孝聞母嘗有疾五日不食𢎞榮亦不食母强爲進粥乃食母所餘遭母憂三年不食鹽菜幾至滅性兄弟友愛不忍暫離其室嘗同卧起世稱爲名家位至散騎常侍後魏姚黄眉太宗昭哀皇后之弟也黄眉尚陽翟公主爲太常卿卒黄眉寛和温厚希言得失太武悼惜之後周尉遲迥即宣帝皇后祖也性至孝色養不怠身常在外所得四時甘脆必先薦奉然後敢嘗位至柱國大將軍唐吳湊代宗之舅也大歴十四年以左金吾衞將軍左衞使乞罷官侍親時母老有疾特許之禮士外戚之貴顯莫盛於兩漢其或負器識當柄用靡不好彼功名傾諸將相進家居之時俊結赴義之俠少損威重而入閭巷設盛饌而盡歡談亦有閉戸以固辭弗奪其節投劾而憤去終加辟命禮士之道斯焉可觀漢竇嬰孝文竇后從兄子喜賔客破七國封魏其侯游士賔客争歸之田蚡孝景皇后同母弟武帝初即位蚡以舅封爲武安侯新用事卑下賔客進名士家居者貴之滯在里巷未仕者欲以傾諸將相傾謂踰越而勝之也上所鎭撫多蚡賔客計䇿王譚封平阿侯與成都侯商紅陽侯立曲陽侯根髙平侯逄時皆元后之同産皆通敏人事好士養賢傾財施予以相髙尚樓䕶爲天水太守數歳免家長安中商爲大司馬衞將軍罷朝欲候䕶其主簿諫將軍至尊不宜入閭巷商不聼遂徃䕶家家狹小官屬立車下久住移時天欲雨主簿謂西曹諸掾曰不肯强諫反雨立閭巷商還或白主簿語商恨以它職事去主簿終身廢錮後漢郭况建武中封綿蠻侯以后弟貴重賔客輻輳况恭謙下士頗得聲譽陰就建武中以后弟嗣父封新陽侯就以外戚貴顯深敬重馮衍衍遂與之交結就既慕朱暉賢自徃候之暉避不見復遣家丞致禮暉遂閉門不受就聞嘆曰志士也勿奪其節又與帝婿梁松皆慕楊政聲名而請與交友政每共言論嘗切磋懇至不爲屈撓時帝子沛獻王輔等皆好賔客請井丹不能致就以外戚别使人要刼之丹不得已既至就故爲設麥飯葱菜之食丹推去曰以君侯能供養故來何為如此就便設饌就起左右進輦丹曰昔桀人輦即此也坐上失色就去輦歡談終日乃去馬廖明帝永平中爲羽林左監虎賁中郎將與侍中竇憲並京師貴戚時江革為冬官中郎將廖等各奉書致禮馬防廖弟也章帝建初中為車騎將軍時傅毅以文雅顯於朝廷防請毅爲軍司馬待以師友之禮竇憲建初中以后兄爲侍中章帝謂憲曰卿寧知崔駰乎對曰班固數爲臣説之然未見也帝曰公愛班固而忽崔駰此葉公之好龍也試請見之駰繇此候憲憲倒屣迎門笑謂駰曰亭伯吾受詔交公公何得薄哉遂揖入爲上客梁商爲大將軍自以戚屬居大位毎存謙柔虚已進賢辟漢陽巨覽上黨陳龜爲掾屬李固周舉爲從事中郎於是京師翕然稱為良輔順帝委任焉何進女弟爲靈帝后進爲河南尹遷為大將軍司徒楊賜遣掾孔融奉謁賀進不時通融即奪謁還府投劾而去河南官屬耻之私遣劒客欲追殺融客有言於進曰孔文舉有重名融家傳曰客言於進曰孔文舉於時英雄特傑譬諸物類猶衆星之冇北辰百榖之冇黍稷天下莫不屬目也將軍若造怨此人則四方之士引領而去矣不如因而禮之可以示廣於天下進然之既拜而辟融舉髙第為侍御史宋蕭思話孝懿皇后弟子也宗戚令望早見任待凡歴十二使節監都督九焉愛才好士人多歸之論薦傳曰自古受命繼體之君非獨内德茂也葢亦有外戚之助焉夫肺腑之親河潤之族光寵隆極䙝慢常生而能爲國辨材屈身逮下推引髦乂登庸俊良降自漢興間世而有所以佑輔邦政恢崇帝圖宜乎表世適之助受加地之賞雖重金累紫葢無愧焉漢王鳳以元后兄爲大將軍時執金吾辛慶忌左遷酒泉太守歲餘鳳薦慶忌前在兩郡著功績徵入歴位朝廷莫不信鄉質行正直仁勇得衆心通於兵事明略威重任國柱石任堪也父破𦍑將軍武賢顯名前世有威西夷臣鳳不宜久處慶忌之右右上也乃復徵為光禄大夫執金吾後漢樊鯈字長魚父宏光武之舅也鯈爲長水校尉北海周澤琅邪承宫並海内大儒鯈皆以爲師友而致之於朝陰興光烈皇后之母弟與同郡張宗上谷鮮于裒不相好知其有用猶稱所長而逹之代吳漢爲大司馬興疾病光武親臨問以政事及羣臣能否興頓首曰臣愚不足以知之然伏見議郎席廣謁者陰嵩並經行明深踰於公卿興没後帝思其言遂擢廣爲光禄勲嵩為中郎將監羽林竇憲章徳皇后之兄和帝即位憲爲大將軍輔政以前太尉鄧彪有義讓先帝所敬而仁厚委隨委隨猶順從也故尊崇之以爲太傅令百官總已以聼帝既富於春秋憲自以外戚之重欲令少主頗涉經學以屯騎校尉桓郁累世帝師而性和退自守故上書皇太后曰禮記云天下之命懸於天子天子之善成乎所習習與智長則切而不勤化與心成則中道若性昔成王㓜小越在襁褓周公在前史佚在後太公在左召公在右中立聼朝四聖維之是以慮無遺計舉無過事孝昭皇帝八歳即位大臣輔政亦選名儒韋賢蔡義夏侯勝等入授於前卒成聖德近建初九年張酺魏應召訓亦講禁中伏惟皇帝陛下躬天然之姿宜漸教學而獨對左右小臣未聞典義昔五更桓榮親爲帝師子郁結髪敦尚繼傳父業故再以校尉入授先帝父子給事禁省更歴四世今白首好禮經行篤偹又宗正劉方宗室之表善爲詩經先帝所褒宜令郁方並入教授以崇本朝光示大化由是遷郁長樂少府復入侍講鄧騭以和熹皇后諸父爲大將軍安帝時遭元元之灾人士荒饑死者相望盗賊羣起四夷侵畔隲與弟𢎞悝閶等崇節儉罷力役推進天下賢士何熈祋諷羊祲李郃陶敦等列於朝廷故天下復安先是侍中魯丕免永初二年詔公卿舉儒術篤學者隲舉丕再遷復為侍中左中郎將何進以靈帝后父爲大將軍秉政徵海内名士荀攸等二十餘人舉孔融髙第爲侍御史晉禇裒康獻皇后父爲征北大將軍以政道在於得才宜委賢任能外敬舊齒乃薦前光禄大夫顧和侍中殷浩疏奏即以和爲尚書令浩爲揚州刺史梁張𢎞䇿文獻皇后從父弟從髙祖平建康天監初爲散騎常侍盡忠奉上知無不爲交友故舊隨才薦㧞縉紳皆趨焉唐楊國忠天寶中為右相太眞妃即從祖妹也國忠以聲名自髙搜天下竒傑聞張鎬名召見薦之自釋褐官拜左拾遺册府元龜卷三百四
