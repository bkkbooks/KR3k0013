body:
  text: 册府元龜卷七十四宋王欽若等撰帝王部命相第四唐文宗太和二年十二月制曰綏緝萬邦實資乎元首弼成庶績允屬於股肱將以導宣化源崇固理本立我皇極贊於時雍故任賢著於禹謀納誨彰於説命眷求懿德斯惟僉諧中散大夫守尚書兵部侍郎知制誥充翰林學士上輕車都尉賜紫金魚袋路隨性禀中庸氣含大雅身無擇行學不為人敏識周通宏才恢博挺然仁者之勇蔚為君子之儒祗事穆宗侍經内殿敷堯舜之大典暢周孔之遺風雅言玉音奥義冰釋潤色王度發揮聖聰出入禁闥踐履華貫位彌高而惟謹任愈重而滋恭逮及先朝復叅密命雍容侍從早以賦於甘泉左右便蕃未嘗言及温樹周旋九載始終一心直道匪躬讜言盈耳每訪謨猷之指用陳禆益之誠出不忘於詭辭退必聞於削藁器可經國忠能致君跡其公正之方用叶毗倚之任於戲干戈未息爾其𢎞智用以静冦攘役戍尚勤爾其宣柔服以懐戎狄均國賦以安阜百姓振朝綱以綜覈羣才退無後言動必慮善貞爾百度弼予一人寵以峻階委之極務往踐厥位時乃之休可正議大夫守中書侍郎平章事四年正月詔曰昔漢宣帝用魏丙以成中興之業我𤣥宗任姚宋以致開元之理其術無他得賢而已朕猥居大寶首渉五年宵旰靡遑憂勤至切將倚任於國柄宜登進於人傑俾其復運樞極載清化源斷自朕懐允膺僉屬武昌軍節度鄂岳蘄安黄申等州觀察處置等使金紫光禄大夫檢校吏部尚書同中書門下平章事使持節鄂州諸軍事鄂州刺史上柱國竒章郡開國公牛僧孺氣含元精體包大雅識用夷密襟靈沉粹窮聖賢㫖奥之學鋪邦國經緯之文蔚為名臣秀出羣萃長慶御歴登賢濟人廊廟有光臣工得職代天協理時乃之休先朝與能罷出征鎮甿俗丕變師旅太和宣力事君時乃之蹟朕飽聞器業虗佇風儀㑹曹參之促裝喜韓侯之來覲便殿延對前席與言通古今理亂之源知敎化損益之務其應如嚮不知所然是宜卿長夏官平章大政康濟四海毗予一人於戲君不能自為堯舜必待其臣以致之臣不能自為伊臯必待其君而任之致則期於盡力任固在於聳善然後上下交泰君臣相須爾其使百官得其人萬事得其序邪正之路必判清濁之流必分金堅一心柅制羣類無重否德予皆仰成可兵部尚書平章事七月詔曰出納大命宰司元化調四氣以統和天人貞百度以鎮安夷夏必資髦傑用委鈞衡朕嗣守丕圖思𢎞至理萬物之重屬於台臣仄席勤求冀禆不迨况素效久彰於密勿精才已得於詢謨擢自内庭授以衮職爰立佐佑斯為得人朝議郎守尚書右丞上柱國賜紫金魚袋宋申錫岳降全德天資正性處約居厚蹈中秉彜文每掇其菁華學必探其𤣥賾夙播休問拔乎羣倫自選入周行參我内署奉職恭肅率心坦夷藴冲用以究國經鋪訓詞以潤王度密贊彌久𢎞益滋多朕累因暇日召於别殿訪以大政觀其立誠而胷襟洞開肝膈無隱識精詞直實契虗求固可以掖持化權參决理本是用升於鼎鉉付以樞機繇仙闈總轄之司當宰輔具瞻之地熈此庶績弼予一人於戲元首以司牧萬方股肱以協贊皇極上推公以馭下臣竭忠以戴君際㑹交感而臻大化歴視前古何莫繇斯予方率是道以臨兆人爾宜悉乃心以成一德敬戒厥位永孚于休可正議大夫行尚書右丞平章事七年二月制曰弼亮鈞衡宣翼統紀明景化以凝庶績啓嘉謨以建大中爰求國楨以輔台德銀青光禄大夫守兵部尚書上柱國贊皇縣開國伯食邑七百户李德裕元精孕靈和氣毓德堅直成性清明保躬貞規澹夷敏識冲逺學宗九流之奥文師六義之宗令聞夙彰僉諧允屬自提綱栢署掌誥禁闈釐紀律詳平之司竭訏謨密勿之節洎察亷浙右總鎮滑臺再委旌旄輯安卭蜀克有殊政咸懐去思諒惟全才茂此聲績朕以疇庸之典彜訓所先入遷司馬之崇彌積濟川之望是宜納誨朝夕擢居股肱勉𢎞伊吕之勲以嗣良平之美業傳相印門襲戎旃紹絲綸内職之榮繼鼎鉉中樞之重珪紱之盛恩輝罕儔爾宜罄乃忠貞副我毗倚無忝承命服兹寵光可本官平章事七月制曰居端揆之任再踐國鈞稽筦𣙜之功兼司邦計爰崇舊德以緝新規簡自朕心用久僉屬金紫光禄大夫守尚書右僕射充諸道鹽鐵轉運等使上柱國代郡開國公食邑二千户王涯元精降靈體道秉哲恬智成性清貞保躬文行可以經邦風操可以鎮俗以明用晦處貴滋恭憲宗以禁署竭忠擢登輔弼先帝以台階宿望寵授旌旃隂陽燮調藩服寧謐機務允理政經交脩洎綜銓九流式序百禮提旌紀律統明貨泉法必便人事先體國聲績茂暢洽於羣謠朕以邊鄙防微猶存兵戍資儲之備供億尚繁頃者支費轉輸任分兩使量入制用誠患多門俾足食以豐財在省員而簡務是用合此二柄委於元僚正兹通變之初藉我股肱之重勉思率職無或憚煩敬戒乃心欽承休命可本官平章事充度支及諸道鹽鐵轉運使八年九月壬戌詔追興元節度使李宗閔赴闕十月庚寅詔曰職代天工望歸人傑必資求舊允副僉諧山南西道節度管内觀察處置等使兼興元尹銀青光禄大夫檢校禮部尚書同中書門下平章事上柱國襄武縣開國侯食邑一千戸李宗閔巖廊正人宗室全德才惟不器道實生知粹茂體隂陽之和周旋成禮樂之用外𢎞疎朗中實誠明白璧凝溫朱絲秉直文窮三變學洞九流早以忠規契于審象雅有𤣥畧能宣大猷底寧戎蠻協贊郊祀見可而進知難靡囘啓心嘗罄其嘉謀造膝必聞其法語行父事君志存於嫉惡臯陶承弼道逺于不仁康濟而金柅有倫燮調而玉燭無爽謇諤勵大臣之節端莊清至化之源脩明典章慎選方岳敷我利澤臻于至平自出鎮漢中既周星律世俗雖歌乎來暮國人頗詠于去思遂用徴還蓋從公望及延召宣室益加前籌是宜再渉中樞直脩衮職咨爾良輔其聽朕言夫天地交㤗則時合君臣訢和則國治脊求一德出納萬幾勉𢎞如水之心式副濟川之用命官罔及於私昵詔爵必俟于賢能俾庶績惟凝彜倫攸敘無忝注意敬之戒之可守中書侍郎平章事九年四月詔曰寅亮皇猷丹青景化爰從選衆之舉乃得非常之才前浙西道都團練觀察處置等使朝議大夫檢校禮部尚書持節潤州諸軍事兼潤州刺史御史大夫上柱國姑臧縣開國男食邑三百户賜紫金魚袋賈餗識逹韻孤學深行直眞和自立介特不羣能操至公每契中道聲逸羣聽善諧朕心自居京師尤彰望實亟召便殿屢陳嘉謀罄肝膈以納忠規推誠明而無外飾察言考事深用得之近命列藩益聞僉論固可以叅我大政陟于中樞天啓予懐賚此良弼爾其守法制平鈞衡貞王度以振國經釐百工以凝庶績舉直錯枉當官而行於戲為君之戒在知賢而不任為臣之患在保位而不言罔或依違虧吾則哲可中書侍郎平章事七月詔曰惟昔太宗聰明睿聖克致治平惟魏徴左右文祖叶建皇極矧朕寡薄思紹丕烈旁求魏徴之比寘諸巖廊庶禆不逮用底于道御史大夫李固言生于山東瑞此王國爰在下位早揚直聲介然無朋中立不懼文經邦俗行表人倫和嶠負棟梁之材辛毗有骨骾之操便蕃華貫光啓令圖日者徴自近郊延於便殿言多方格道不容囘嘉謀有倫正色無撓朱絃暢疏越之韻美玉呈特達之姿洎長憲臺彌彰休問固可以斟酌理本燮調化源疇咨僉同夢卜斯協命爾予翼倚為股肱登于黄樞參我大政爾當一乃心志罄貫忠貞澄清品流旌别淑慝俾四夷左袵咸寧吾教侯伯卿士各稱厥官罔曰難理惟其至公罔曰弗能惟其悉力欽哉戒哉無忝前良可門下侍郎平章事九月以刑部侍郎舒元輿本官平章事以兵部郎中知制誥翰林學士李訓為禮部侍郎平章事十一月詔曰朕嗣守丕圖務𢎞至理憂勤是切宵旰靡遑所以庶政萬機悉委丞相乃者失于任使妖沴遽生方思正人叅我大柄銀青光禄大夫守尚書右僕射上柱國滎陽郡開國公食邑三千户鄭覃天資直氣嶽降上才性惟端莊道本孤峻文含風雅學專儒𤣥通古今理亂之源逹教化損益之要歴踐華貫周旋大僚休問彰於縉紳故事滿於臺閣載居講度密勿内庭胷襟洞開肝膈無隱嘗奏讜議發言有先見之明每勵貞觀勇退守特立之節洎擢膺揆務總領庶官堅操不囘墜典咸舉盡瘁憂國竭忠戴君必能毗予一人康濟四海雅正之路既别清濁之流自分於戲秉兹鈞衡委乃髦碩爾其使萬事得其序百官得其人用賢罔不精立法罔不愼弼亮刑政燮和隂陽其聽朕言往踐厥位克紹先德巖廊有光可本官平章事初覃為翰林侍講學士每入見必以厚風俗黜朋比再三為帝言之終以為相又詔曰朕嗣位君臨精求至道日慎一日于今十年期輔佐之臣為我致理中立匪懈知無不為今得其人果副僉屬朝議郎尚書户部侍郎判度支上柱國賜紫金魚袋李石操履堅貞志業𢎞茂性合道要識通化源屢佐藩方備開勲績用司夕拜之任旋知尹正之榮爰委財征備宣成效是宜擢膺輔弼俾勵正能爾當勤成務之規率致君之道内貞百度外靖四方參毗萬幾課程庶績盡匪懈之節竭宣力之能大振朝綱兼司國計致億兆之庶富成方夏之乂安副予知臣勉茂休烈可守本官平章事仍依前判度支開成二年四月詔曰王者任賢能所以緝熈庶績舉正直期乎獻可弼違苟非懋兹四德何以光膺大任翰林學士將仕郎守尚書工部侍郎知制誥兼皇太子侍讀上騎都尉賜紫金魚袋陳夷行元精降靈厚載儲祉聚蓄英粹作時休祥懐道清貞執德謙茂行高嵩華𢎞苞容之偉量明洞水鏡韜妍媸於黙識貞已滋潔遇物能容雖墻岸孤峻而襟抱夷曠孝友為脩已之具文學職潤身之餘衆推全才時號端士頃在郎署雅有名稱是用擢居禁密禆輔導元良論辨見賢人之業教諭得名臣之體星官屢改才術彌彰古稱旁求於夢卜曷若選之於言行是用付以政柄登于台階任茲鈞衡之重處以臯䕫之秩人所注意予將仰成勉陳啓沃之術以副具瞻之望可守本官平章事三年正月制曰運行帝載翊賛天工必俟輔臣以宣至化將益秉鈞之重是兹竝命之求諸道鹽鐵轉運等使正議大夫守户部尚書上柱國𢎞農郡開國伯食邑七百戸賜紫金魚袋楊嗣復動必居正言惟在公峻若孤山清猶止水從政禀詩書之教承家建禮樂之源朝議郎守尚書户部侍郎判户部事上柱國賜紫金魚袋李珏質本温明才推俊茂智能周物𢎞本能容守和有君子之儒可大見賢人之業挺為國傑秀禀元精生必為時寶稱希代便藩清秩操履有嘗調黄鍾而協諧和朱絃而疏越或總戎重鎮或敷惠字人卒乘有輯時之功惸嫠著昭蘇之詠洎入司邦賦爰掌版圖事未成財公望猶欝是可以宰領樞務用弼予違叙彜倫而建大中罄計謀而調元氣乂寧華夏保合神人宜申補衮之規致我垂衣之理於戲孔明相鼎峙之國尚聞魚水之詞夷吾輔覇業之君猶致鴻翼之喻矧予祗荷丕搆雖未克前修造次之間而不忘遵道宵衣旰食一紀于兹災沴尚生於旱蝗黎元屢困於衣食中夜静慮若渉大川將求津涯俟爾而濟爾謂是靡以拂吾心而不行爾謂是靡以狥吾志而苟用開物成務俾乂於得時求賢審官寧我以多士則魚水鴻翼夫何足言勉副簡求無忝我休命嗣復可守本官平章事依前充諸道鹽鐵轉運使珏可本官平章事依前判户部十二月詔曰緝熈柄政亮采皇猷𢎞道德而輔昌圖調隂陽而平景緯我唯求舊人亦與能正位台階實資元老河東節度觀察處置等使開府儀同三司守司徒兼中書令大原尹北都畱守上柱國晉國公食邑三千戸實封三百戸裴度星辰禀秀山嶽炳靈文蔚采章量包江海負經邦之逺畧懐許國之明誠研幾而識洞蓍龜運籌而道光竹帛風雨一致儀刑四朝萬方所瞻百辟為憲洎揚旌鴈塞建節龍山謹管籥而戎塞烟清壯襟帶而軍牙氣肅虜絶南牧聲雄北門懿兹殊庸予所嘉歎是用專授衡軸俾清化源統和神人茂育區夏夫宰相之任作予股肱外可以懐柔四夷内可以親附百姓大可以贊亭毒阜生成小可以激貪亷正雅俗爾其休躅予不重言至於玉立巖廊風行號令端若植表為時指南開予胷襟廣我視聽實頼人傑代兹天工爰罷麾幢再操舟楫庶展乞言之禮豈唯論道之尊佇竭訏謀無忝毗倚可守司徒兼中書令武宗開成五年正月卽位二月制曰朕丕承寶圖思臻理古小大之政皆依輔臣選衆攸難得人而授中大夫守太常卿上柱國賜紫金魚袋崔鄆天資正性嶽降瓌材慎楊震之四知邁臯陶之九德抱負直質秀發英華動必蹈中言皆體要聚學每探於精賾馳騁九流摛文若奏乎笙簧抑揚三代鴻量難挹懿聲自高乃者入典訓詞出司俊造能用周密靡混妍媸銓總以明允為先亷察以澄清為重嘗踐其職顯有休功秩宗之選方澄公台之論彌鬱繇是酌其望實付以鈞衡恢予之規模廣予之耳目於戲宰相之任弼諧是資予欲使六氣均調惟爾贊予欲使萬方平乂惟爾謨予欲使臣寮得職惟爾諧予欲使邪正不亂唯爾翼予言罔慮於咈耳汝進無忘于沃心貞觀開元之法度具存房魏姚宋之規猷盡在咨爾丞相舉而行之可守本官平章事又以户部尚書判度支崔珙守本官平章事九月以淮南節度檢校左僕射李德裕為吏部尚書平章事會昌元年二月以淮南節度使檢校吏部尚書李紳為中書侍郎平章事四年六月以淮南節度使檢校司空杜悰為右僕射兼門下侍郎平章事仍判度支充鹽鐵轉運等使八月以兵部侍郎翰林學士承㫖崔𤣥為中書侍郎平章事五年三月以御史中丞兼兵部侍郎李囘守本官平章事五月以戸部侍郎崔元式平章事是歲李讓夷平章事又以兵部尚書鄭肅本官平章事本紀簡拜相月不獲宣宗以會昌六年三月即位四月以兵部侍郎翰林學士承㫖白敏中守本官平章事五月以劒南東川節度使檢校戸部尚書盧商為兵部侍郎平章事六月以戸部尚書諸道鹽鐵轉運使馬植守本官平章事大中元年七月以戸部侍郎翰林學士承㫖韋琮守本官平章事二年三月以禮部尚書諸道鹽鐵使馬植兵部侍郎判度支周墀竝守本官平章事十一月以户部侍郎判度支崔龜從守本官平章事三年四月以御史大夫崔𦙍為中書侍郎兵部侍郎判户部事魏扶守本官竝平章事四年十一月以戸部侍郎判本司事魏謩守本官平章事六年四月以禮部尚書諸道鹽鐵轉運等使裴休守本官平章事七年四月以御史大夫鄭朗為中書侍郎平章事十一月以户部侍郎判本司事令狐綯為兵部侍郎平章事十一年正月以工部尚書崔愼繇為中書侍即平章事六月以兵部侍郎判度支蕭鄴守本官平章事十二年正月以戸部侍郎判度支劉瑑守本官平章事五月以兵部侍郎諸道鹽鐵轉運等使夏侯孜守本官平章事十三年四月以翰林學士承㫖兵部侍郎蔣伸等守本官平章事懿宗咸通元年二月以河中節度使杜審權為兵部侍郎判度支尋守本官平章事以右僕射諸道鹽鐵轉運等使杜悰平章事二年九月以前兵部侍郎判度支畢諴為工部侍郎平章事四年三月以兵部侍郎判度支楊收守本官平章事十一月以兵部侍郎判度支曹確守本官平章事又以兵部侍郎高璩守本官平章事五年十一月以兵部侍郎蕭寘守本官平章事六年二月以御史大夫徐商為兵部侍郎平章事七年十一月以翰林學士承㫖户部侍郎路巖為兵部侍郎平章事八年三月以兵部侍郎于悰等守本官平章事十年正月以翰林學士戸部侍郎劉瞻守本官平章事十一年正月以翰林學士承㫖兵部侍郎駙馬都尉韋保衡守本官平章事十一月以禮部尚書王鐸守本官平章事十三年正月以禮部侍郎判度支劉鄴守本官平章事二月以御史中丞趙隱為户部侍郎平章事十四年四月以吏部侍郎蕭倣為兵部侍郎平章事僖宗乾符元年四月以兵部侍郎諸道鹽鐵轉運等使崔彦昭守本官平章事五月以吏部侍郎鄭備為兵部侍郎翰林學士户部侍郎盧㩦守本官平章事二年十一月以左僕射王鐸兼門下侍郎平章事三年二月以太常卿李蔚守本官平章事五年九月以吏部尚書鄭從謙守本官平章事六年四月以兵部侍郎崔沆為吏部侍郎户部侍郎翰林學士豆盧琢守本官竝平章事十二月以太子賓客分司盧㩦為兵部侍郎平章事廣明元年十一月以户部侍郎翰林學士王徽裴徹竝守本官平章事中和元年正月車駕在興元以翰林學士承㫖尚書户部侍郎蕭遘為兵部侍郎平章事三月車駕在成都以鳳翔節度使鄭畋為司空兼門下侍郎平章事七月以兵部侍郎判度支韋昭守本官平章事四年四月以兵部侍郎判度支鄭昌圖守本官平章事光啓二年三月以翰林學士承㫖工部尚書杜讓能為刑部尚書御史大夫孔緯為兵部侍郎竝平章事三年正月以兵部侍郎諸道租庸使張濬守本官平章事昭宗龍紀元年正月以翰林學士承㫖兵部侍郎劉崇望守本官平章事大順元年十二月以翰林學士承㫖兵部侍郎崔昭緯守本官御史中丞徐彦昭為户部侍郎竝平章事二年十二月以户部尚書鄭延昌為中書侍郎平章事判度支景福二年十一月以新除鳳翔節度使徐彦若復知政事戸部侍郎判户部事王摶本官平章事乾寧元年十月以翰林學士承㫖禮部尚書李磎為中書侍郎平章事宣制之日兵部郎中知制誥劉重魯出班而泣言磎姦邪黨附内府省不可居輔弼之地繇是制命不行是月以御史中丞崔商為兵部侍郎平章事二年六月以太子賓客孔緯為吏部尚書尋加守司空門下侍郎平章事緯時在華州屬太原李克用軍至而止以湖廣節度使王摶為中書侍郎平章事三年七月翰林學士承㫖尚書左丞陸扆為戸部侍郎平章事八月新除鎮東軍節度使王摶復知政事以京兆尹孫偓為兵部侍郎平章事四年二月以右散騎常侍鄭棨為禮部侍郎平章事五月以國子毛詩博士朱朴為右諫議大夫平章事光化元年正月車駕在華州以兵部侍郎崔逺為户部侍郎平章事二年正月以兵部尚書陸扆為兵部侍郎平章事三年九月以刑部尚書裴贄為中書侍郎兼刑部尚書以吏部侍郎裴樞為中書侍郎竝平章事天復二年十二月以禮部侍郎獨孤損為兵部侍郎平章事三年正月車駕自鳳翔還京工部尚書崔裔率百官迎謁即日降制以裔為守司徒兼門下侍郎平章事二月以新除廣南節度使裴樞為門下侍郎兼吏部尚書以户部侍郎王摶守本官竝平章事十二月以禮部尚書獨孤損為中書侍郎平章事天祐元年正月以翰林學士左拾遺柳璨為右諫議大夫以兵部尚書崔逺為中書侍郎竝平章事哀帝即位踰年不改元仍號天祐二年二月以吏部侍郎張文蔚尚書左丞楊渉竝為中書侍郎平章事後唐莊宗同光元年四月即位于魏是月以行臺左丞相豆盧革為門下侍郎平章事太清宫使以行臺右丞相盧程為中書侍郎平章事修國史時帝將行册禮簡求輔相詢于盧質對曰若以本朝士族取人則無踰定州節度判官豆盧革河東觀察判官盧程帝因詔赴行臺為右丞相至是改為行臺之命十一月以尚書左丞趙光裔為中書侍郎以尚書禮部侍郎韋説守本官竝平章事時盧程以狂妄免郭崇韜自勲臣拜議者以為國朝典禮故實須訪前代名家成法光裔有宰相器初薛廷珪李琪當武皇為晋王時常因為册使至太原故皆有夙望咸謂宜處台司崇韜採言事者陸廷珪朽老浮華無相業琪雖文學高傾險無士風皆不可相乃用光裔與韋説同制明宗天成元年五月制曰欲運隂陽賢者諒資於籌畫將烹鼎飪哲王取喩于鹽梅是知心恬淡則燮理無差意平正則調和靡慝王者以二儀為法百度是貞將施理國之規必慎代天之任其有鎮時望重濟物才高或早推房杜之風或暗合孫呉之略咸膺妙選適副旁求光禄大夫太子賓客上柱國滎陽郡開國侯食邑一千戸鄭珏禮樂成家鈞台接武珪璧耀無瑕之彩咸韶奏治代之音雅度不羣貞規抜俗為縉紳之楷範作文學之宗師厯踐華資嘗居重任舒卷罔渝于古道坦夷不易于冲襟允謂正人實符休運正議大夫守工部尚書上柱國樂安縣開國男食邑三百戸賜紫金魚袋任圜儒𤣥繼代簪組傳芳藴穰苴文武之才抱季子縱横之略早叅戎幕既備展於良謀洎厯尹京復廣敷于善政掩李牧防虞之術繼蕭何饋運之勞安北邊而顯頼殊功代西蜀而固資婉畫及康延孝忽從劒閣欲襲錦川統戎至及于三千破賊將踰于萬數奸兇盡戮卭蜀再寧靜十道之妖氛息三川之生聚逺提銳旅來赴上京適當纂紹之初尤騐忠貞之節而鬱于人望協彼僉諧宜膺竝命之榮允謂當仁之選或升書殿或掌國租兾伸致主之嘉猷别展富民之茂績於戲位尊百辟職總萬幾公忠則庶政惟和便辟則彜倫攸斁慎宣九德勉阜羣生珏可中書侍郎兼刑部尚書平章事集賢殿大學士圜可金紫光禄大夫中書侍郎兼工部尚書平章事判三司時帝初即位圜自蜀至安重誨不欲獨拜宰輔共議朝望一人共之孔循言珏貞明時乆在中書性畏慎而長者美詞翰好人物重誨即奏與圜竝命為相二年正月制曰昔舜命臯䕫百揆時敘湯命仲虺萬國咸寧道既合于君臣事實光于今古朕克相上帝敷佑下民惟順考于典墳俾旁求于彦傑升之廊廟付以鈞衡期共治于寰區兾永康於黎庶厥有明哲咸謂碩儒早隆佐命之功久負濟時之器必使膺兹大任弼我丕基既詢謀以僉同固朕志而先定爰行竝命是降寵靈端明殿學士朝議大夫守尚書兵部侍郎上柱國賜紫金魚袋馮道四凟凝休五行鍾秀積善克承于家訓揚名端守于素風孔門曽顔寧同懿行漢庭嚴樂詎比宏才温恭為君子之儒慤厚有大臣之體故自從龍契㑹倚馬摛詞首贊先朝紹隆丕業為善不伐有能不矜守亷貧則罔恥緼袍持慎審則靡言温樹自予纂嗣頼爾弼違爰精選于禁林乃特遷于秘殿愈陳規誡屢罄論思都正直以莫倫諒眞純而罕匹銀青光禄大夫守太常卿判吏部尚書銓事上柱國崔協星辰降彩軒冕聨榮禮樂禀于生知詩書博于時習輝華繼世可鄙荀陳清貴傳家固超王謝自登高第踐厯周行居省闈則職業備脩升憲府則朝綱克振近者委司選部命典秩宗轄彼銓衡則羣才適序調其律吕則雅音克諧既揚正始之風可騐中和之徳竝以功庸夙著問望彌高宜允副于具瞻俾顯當于爰立是命寵升黄閣光弼紫宸或居書殿之榮俱列户封之貴仍加峻級以示新恩道既叶于咨詢心乃符于啓沃於戲知人則哲予竊慕于前王事君盡忠爾已聞於當代更宜夙夜慎保初終使社稷以無憂期子孫之有頼往踐厥位汝惟戒哉道可正議大夫中書侍郎平章事充集賢殿學士協可中書侍郎平章事初豆盧革韋説得罪執政相與議宰相時經始之初言事者衆咸以孔循少侍宫禁諳故實知朝廷人士之才行安重誨多聽之循意不欲河朔人居相位初已援引鄭珏入中書至是任圜欲相李琪而鄭珏與琪梁時同在翰林為學士二人不相善故琪切齒孔循既以珏為門人亦排斥李琪謂重誨曰李琪非無藝學但不亷耳宰相人士之表儀但得眞端有器度足以輔弼矣朝論所與莫若崔恊重誨以為然後重誨内殿中書闕人欲擇丞相而帝曰誰可相者乃以崔協對任圜曰重誨未諳朝中人物被人欺賣如崔協者天下皆知少識文字時人呼為無字碑臣以陛下藩邸之年即囘天睠無才幸進比不知書一旦驟膺輔弼終朝若負芒刺以臣一人取笑足矣何容中書之内更益笑端帝曰宰相重位卿等更自詳審然吾在藩時識易州刺史韋肅人言名家待我常厚置于此位如何以肅苟未可則馮書記先朝判官稱為長者多才博學與物無競可以相矣書記即馮道也嘗為莊宗覇府書記帝素欵顔偶不記名但云書記朝退宰臣樞密使休于中興殿廊舍孔循不揖拂衣徑去曰天下事一則任圜圜乃何人崔恊暴死則已不死㑹居此位重誨私謂圜曰今正闕人協宜備員可乎圜公言何狹哉今朝廷有李琪者學際天人奕葉軒冕論才校藝可敵時軰百人而讒夫巧辨忌害其能必舍琪而相協何棄蘇合之丸取蛣蜣之轉也重誨笑而止然與循同職循曰言琪之短知協之長月餘乃下此制物論醜之三年三月癸亥以成德軍節度使王建立為檢校太尉尚書右僕射同中書門下平章事充集賢殿大學士判三司事長興二年三月制曰衡之平不欺于物水之止洞鑑于形厥有操心秤而無撓重輕掛人鏡而自分妍醜所以旁求多士果得正人符夢卜而惟吉之從舉賢良而不仁者逺命為余弼僉曰汝諧朝議大夫守太常卿上柱國隴西縣開國男食邑三百戸賜紫金魚袋李愚勁草凌風孤松抱雪向厯艱難之運再逢開㤗之期先皇帝擢在禁林輟隨征斾鋒鋩翰墨經劒閣而無競刋銘糞土珠金入刀州而未嘗闗夢罔矜諭蜀素藴致堯洎朕纘紹丕圖服勤内署慎密而不言温樹論思而守奉甘泉及掌文闈大開公道樹杏壇而重興四教厯蘭省而再陟二卿當祀周郊密承殷誥泥金而將期獻頌擊石而尋致來儀既厯試諸艱且爰立作相是命亞鳳池之貴位領虎殿之羣儒仍進崇階兼加好爵於戲久虗右席俾運前籌期偃戢於干戈致混同于書軌以毗乃辟正事惟醇則霖雨鹽梅于是乎在可正議大夫守中書侍郎平章事集賢殿大學士四年正月制曰端明殿學士正議大夫尚書兵部侍郎柱國彭城縣開國男食邑三百户賜紫金魚袋劉昫可中書侍郎平章事四月制曰朕聞燮理隂陽霖雨之功是託調和鼎鼐鹽梅之味攸憑蓋貞淳則克契二儀正直則允諧庶品必在懸衡秉志定鏡操心苟無爽于毫釐則潛符于造化將付代天之柄宜歸不世之才今得良臣庶臻治道端明殿學士中大夫尚書兵部侍郎上柱國賜紫金魚袋趙鳳丹山瑞彩赤厪靈鋒清明猶水鏡冰壺質厚若渾金璞玉動惟稽古靜可鎮時夢傳五色之毫文章煥爛力就三冬之志學藝縱横頃在禁林嘗傳職業始中原之大定屬萬國以來朝制命聨綿詔書疊委共歎立成之敏略無停綴之時洎朕承基復資演誥俄遷居于祕殿嘗密贊于鴻圖實頼謀猷每嘉經濟爰司貢部俾選儒徒果無遺逸之名足見搜羅之道昨朕將還雒邑特委浚郊一時權藉于殿邦朞月尋聞于報政恩威竝設賞罰皆明夷門無夜柝之喧梁苑遂春臺之樂克膺重寄允謂周才宜顯處于巖廊貴大施于陶冶黄扉峻秩粉署崇資兼煩筆削之功更代簡編之職勲階竝進爵邑維新足為爰立之榮在體勤求之意唯思啓沃端俟弼諧於戲應卜夢之祥當股肱之任闗羣生之休戚繫萬宇之安危社稷是平寰瀛繄頼勉勤夙夜無怠初終勿令伊説臯䕫咸擅美于前也可正議大夫門下侍郎兼工部尚書同平章事監修國史上柱國仍封天水縣開國男食邑三百戸末帝清㤗元年七月以檢校户部尚書守太常卿盧文紀為中書侍郎平章事帝素不悦馮道以奉山陵出鎮而用李琪劉昫昫則太察而寡合琪則氣剛而性褊每于議論動必相違所以恩澤稽留庶事停壅帝頗患之切擇輔臣採之于人又疑而未决乃書作相姓名置琉璃器中一夜燃香祝星辰清早以箸夾之首得文紀名故命之八月以尚書左丞姚顗為中書侍郎平章事十二月以㤗州節度使張延朗為中書侍郎平章事三年三月以翰林學士禮部侍郎馬𦙍孫為中書侍郎平章事初帝為潞王鎮河中時𦙍孫為記室畱守西京節度鳳翔累轉觀察判官及即位用為翰林學士户部郎中知制誥賜紫金魚未滿歲改中書舍人禮部侍郎皆𢃄禁職時藩邸舊臣韓昭𦙍房暠為樞密使劉延節李專美為宣徽使河南尹雍王重美不平之密奏曰馬𦙍孫者只令視草恐未得宜帝然之尋拜中書侍郎平章事晉高祖天福元年閠十一月制曰天有寶圖應運者文明之主國調金鉉入司者經緯之臣將兾大同須資良弼况謂建邦之始難虗納揆之官其有霸府舊僚前籌上密厯歲寒而斯久𢎞益嘗多經艱險而不渝忠貞彌篤式旌懿德宜舉徽章乃擇吉辰爰行竝命翰林學士承㫖知河東軍府事正議大夫尚書户部侍郎知制誥賜紫金魚袋趙瑩儒中端士席上正人襟靈而萬里坦夷行葉而四時繁茂洎陞簮履旦夕之婉畫喧人每侍籌帷遐邇之折衝在我翰林學士權知樞密使事正議大夫尚書禮部侍郎知制誥賜紫金魚袋桑維翰文塲翹楚學海波瀾撓澄不變于二風躁靜同歸于一德誠抱兼人之器諒懐經國之才十年伸揮翰之勞數鎮有從征之役而皆功参佐命績顕坐籌蕭曹逺接于英猷房杜近齊於芳烈成予丕業職爾元勲既協良辰難稽懋賞自董戎而居廊廟繇内翰而秉鈞衡乃用器能佇觀燮贊於戲優賢異典有國新恩勉伸禆救之謀共致升平之治事繁罔避言直勿辭永修魚水之觀以保雲龍之契瑩可金紫光禄大夫門下侍郎平章事集賢殿大學士依前權知樞密使事十二月制曰舜任五臣坐致穆清之化漢尊三傑克成王覇之基皆所以君臣義通上下情洽得以寅亮大化導揚休聲百工允釐垂衣裳而御宇萬方率服鑄劒㦸以為農式繇輔弼之功兆此隆平之運朕謬膺開創初統寰瀛炤臨將被於淳風宰制實慿於良輔其有功宣締構業紹經綸兩朝輸翊戴之勲萬彚仰陶鈞之力是宜重膺夢卜再踐廟堂俾光新造之邦共闡無為之化經邦致理翊戴功臣特進守司空上柱國始平郡公食邑二千五百戸食實封三百戸馮道禮天蒼璧鎮國元龜夏璜為稀世之珍軒鏡是辟邪之寶方諸才業良平有可差其肩較彼忠貞姚宋不得竝其轡可謂人臣之刀尺造化之丹青自明宗皇帝克紹基扄仰膺圖䜟於草昧皇靈之際有攀鱗附翼之功密贊皇猷静司帝誥出納奉命周旋八年持葛秤以定錙銖浮殷舟而拯沉溺四時成歲隂陽畢順於調燮九德不愆朝野咸推於表式繄於薄徳獲彼寵靈將惕勵以為懐恐負荷之弗克宜慿勲德共濟艱難是用重啓巖廊俾持埏埴水土之崇資不改𢎞文之大柄仍兼於戲造膝陳謀爾無辭於禆救開懐納諫朕不怠於聽從致社稷於昌期納生靈於壽域共臻至理勿墜前功唯于大臣不俟多訓可守司空兼門下侍郎平章事𢎞文館大學士三年正月以兵部侍郎判戸部李崧為中書侍郎平章事充樞密使五年八月以翰林學士承㫖戸部侍郎和凝為中書侍郎平章事漢高祖以開運四年二月即位稱天福十三年四月以河東節度判官蘇逢吉觀察判官蘇禹珪竝為中書侍郎平章事九月以吏部尚書竇貞固為司空兼門下侍郎平章事𢎞文館大學士以翰林學士行中書舍人李燾為中書侍郎兼戸部尚書平章事高祖有相燾意燾未拜前一日欲言事請見髙祖召與語燾曰國家新造丕圖内外藩輔並宜得人苟非其人無益招患今相輔位缺未審陛下欲命何人高祖曰竇貞固問其次曰李燾燾恐悚謝曰臣器狹性忠憂時過當輙有僭越敷奏然臣才薄地卑無輔弼之望幸勿以臣汚制書翌日制出拜平章事周太祖廣順元年正月即位以前太師齊國公馮道為中書令𢎞文館大學士六月以樞密使王㻐為左僕射兼門下侍郎平章事監脩國史充樞密使以樞密副使兵部侍郎范質為中書侍郎平章事以户部侍郎判三司李谷為中書侍郎平章事判三司顯徳元年正月制曰鴻遇順風比事者美良賢之任鵬征積水寓言者伸逺大之圖位非才而不居才非位而不展兩端相叩庶績方凝爰升佐命之臣以授調元之職端明殿學士通議大夫尚書戸部侍郎上柱國太原縣開國男食邑三百戸賜紫金魚袋王溥智出於衆行高於人茂學懿文而策名長才廣度以成器始歸霸府當效折衝洎翊造邦尋參宥密摛禁林之詞翰伸祕殿之論思履順持謙奉公處正紫宸三接在注意以方深黄閣九遷諒登庸而允協俾宣相業共贊皇猷食邑贈封功臣改號仍進階資之貴俱為輔弼之光爾其師克儉於焚機繼在公於補衮止辭而出奉義而行將聮賡載之歌長保䖍恭之位佩服兹訓式昭徳音可紫金光禄大夫中書侍郎平章事世宗以是月丙申即位七月癸巳制曰朕自履宸極思平㤗階出一令慮下民之未從行一事懼上𤣥之罔祐晨興夕惕終嵗于兹雖禮讓漸聞興行而風雨未之咸若豈刑政之斯闕而徳教之未敷哉繇是進用良臣輔宣元化雖朕志先定亦輿情具瞻爰擇嘉辰誕敷明命樞密院直學士中大夫尚書工部侍郎上柱國晉陽縣開國男食邑三百戸賜紫金魚袋景範昔佐先帝每罄嘉謨建事眇躬愈傾忠節奉上得大臣之體檢身為君子之儒一昨戎輅親征皇都是守贊勲賢於畱府副徴發於行營軍政所資國用無闕今則靈臺偃革宣室圖功思先朝欲用之言成聖考得賢之美俾參大政仍掌利權爾其明聽朕言往敷𤣥化予欲則埀象而清品彚爾則順天道以序彛倫余欲恤刑名而息戰爭爾則謹憲章而恢廟畧天人之際懸合軍民之事罔渝則國相之尊非爾孰處邦計之重惟才是藏勉思倜儻以致君勿效因循而保位佇聞成績用副虗懐可正議大夫中書侍郎平章事判三司册府元龜卷七十四
