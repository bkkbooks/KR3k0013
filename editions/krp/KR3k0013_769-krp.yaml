body:
  text: 册府元龜卷七百六十九宋王欽若等撰總錄部自述夫摛文奮藻修詞立誠蓋儒者之至業君子之盛德者也然則道有汚隆時有險易志之所藴用或未周則必垂訓成謨因文見意用彰敷述豈徒然哉故禮曰述者之謂明其是之謂也兩漢而下制用丕顯游揚藝圃博約詞林託理以寄其懐譬道以揚其已觸類而長馳思無窮著之于篇可得而覧也漢東方朔武帝時爲大中大夫乆之朔上書陳農戰彊國之計因自訟獨不得大官欲求試用其言專商鞅韓非之語也指意放蕩頗復詼諧數萬言終不見用朔因著論設客難已用位卑以自慰諭其辭曰客難東方朔曰蘇秦張儀壹當萬乗之主而都卿相之位都居也澤及後世今子大夫修先王之術慕聖人之義諷誦詩書百家之言不可勝記著於竹帛脣腐齒落服膺而不可釋好學樂道之効明白甚矣自以爲智能海内無雙則可謂博聞辯智矣然悉力盡忠以事聖帝曠日持乆官不過侍郎位不過執㦸意者尚有遺行耶同胞之徒無所容居其故何也東方先生喟然長息仰而應之曰是故非子之所能備也彼一時也此一時也豈可同哉夫蘇秦張儀之時周室大壞諸侯不朝力政爭權相禽以兵并爲十二國未有雌雄得士者彊失士者亡故談説行焉身處尊位珍寳充内外有倉廩澤及後世子孫長享今則不然聖帝流德天下震懾諸侯賔服連四海之内以爲帶安於覆盂天下均平合爲一家動發舉事猶運之掌賢與不肖何以異哉尊天之道順地之理無物不得其所故綏之則安動之則苦尊之則爲將卑之則爲虜抗之則在青雲之上抑之則在深泉之下用之則爲虎不用則爲䑕雖欲盡情效節安知前後夫天地之大士民之衆竭精談説竝進輻輳者不可勝數悉力募之困於衣食或失門户使蘇秦張儀與僕竝生於今之世曽不得掌故安敢望常侍郎乎天下無害雖有聖人安所施才上下和同雖有賢者無所立功故曰時異事殊雖然安可不務修身乎哉詩云鼓鐘于宫聲聞于外鶴鳴于九臯聲聞于天茍能修身何患不榮太公體行仁義七十有二乃設用於文武得信厥説師古曰設施也信讀曰伸封於齊七百歳而不絶此士所以日夜孳孳敏行而不敢怠也師古曰孳與孜同敏勉也辟若鶺鴒飛且鳴矣傳曰天不爲人之惡寒而輟其冬地不爲人之惡險而輟其廣君子不爲小人之匃匈而易其行天有常度地有常形君子有常行君子道其常小人計其功詩云禮義之不愆何恤人之言故曰水至清則無魚人至察則無徒冕而前旒所以蔽明黈纊充耳所以塞聰如淳曰黈音主謂以爲瑱用黈纊縣之也師古曰如説非也黈黄色也纊綿也以黄綿爲充用組縣之於冕垂两耳旁示不外聼非玉瑱之縣明有所不見聰有所不聞舉大德赦小過無求備於一人之義也師古曰論語曰仲弓問政於孔子孔子曰赦小過舉賢才周公謂魯公曰故舊無大故則不棄也毋求備於一人故朔引此言也士有百行功過相除不可求備也枉而直之使自得之揆而度之使自索之師古曰枉曲也索亦求也度音徒各反盖聖人教化如此欲自得之則敏且廣矣師古曰敏者疾也今世之處士魁然無徒廓然獨居魁讀曰塊上觀許由下察接輿計同范蠡忠合子胥許由堯讓以天下而恥聞之楚狂接輿佯狂匿跡范蠡佐勾踐功成而退子胥忠諫至死不易天下和平與義相扶寡耦少徒固其宜也耦合也徒衆也子何疑於我哉若夫燕之用樂毅秦之任李斯酈食其之下齊説行如流曲從如環所欲必得功若邱山海内定國家安是遇其時也子又何怪之邪語曰以筦闚天以蠡測海蠡匏瓢也以莛撞鐘謂槀莛也豈能通其條貫考其文理發其音聲哉考究也繇是觀之譬猶鼱鼩之襲狗鼱鼩小䑕孤豚之咋虎孤豚孤特之豚咋嚙也至則靡爾何功之有靡碎滅也爾語辭今以下愚而非處士雖欲無困固不得已此適足以明其不知權變而終惑於大道也揚雄字子雲哀帝時丁傅董賢用事諸附離之者或起家至二千石離著也時雄方草太𤣥有以自守泊如也泊安静也或嘲雄以𤣥尚白𤣥黒色也言雄作之不成其色猶白故無祿位也而雄解之號曰解嘲其辭曰客嘲揚子曰吾聞上世之士人綱人紀爲衆人之綱紀也不生則已生則上尊人君下榮父母析人之圭儋人之爵析亦分也儋荷負也懷人之符分人之祿紆青拖紫朱丹其轂青紫謂綬色紆縈也拖曳也今子幸得遭明盛之世處不諱之朝與羣賢同行同行謂同行列厯金門上玉堂有日矣金門金馬門也黄圗有大玉堂小玉堂殿也曽不能畫一竒出一䇿上説人主下談公卿目如燿星舌如電光一從一横論者莫當顧黙而作太𤣥五千文枝葉扶疎獨説十餘萬言扶疎分布也深者入黄泉髙者出蒼天大者含元氣纎者入無倫纎㣲之甚無等倫然而位不過侍郎擢纔給事黄門纔淺也言僅得之也意者𤣥得無尚白乎何爲官之拓落也拓落不耦也揚子笑而應之曰客徒欲朱丹吾轂不知一跌將赤吾之族也跌足失厝也見誅殺者必流血故云赤族往者周綱解結羣鹿爭逸謂戰國時諸侯也離爲十二合爲六七十二謂魯衛齊楚鄭燕秦韓趙魏中山也六七者齊趙韓魏燕楚六國及秦爲七也四分五剖竝爲戰國道其分離之意四分則交五而裂如田字士無常君國無定臣得士者富失士者貧矯翼厲翮恣意所存言來如鳥之飛任所息也故士或自盛以槖或鑿坏以遁也自盛以槖謂范雎也鑿坏謂顔闔也魯君聞顔闔賢欲以爲相使者往聘因鑿後垣而亡坏壁是故騶衍以頡頏而取世資衍齊人也著書所言皆天事故齊人曰談天衍逰諸侯所言則以爲迂闊逺於事情然終不屈嘗仕於齊位至卿頡頏上下不定也孟軻雖連蹇猶爲萬乘師連蹇難也言值世之屯難也今大漢左東海右渠搜前番禺後陶塗小國也駒駼馬出北海上今此云後陶塗則是北方國名也夲國出馬因以爲名今書夲國陶字有作椒者流俗所改東南一尉㑹稽東部都尉也西北一侯燉煌玉門闗侯也徽以紏墨制以質鈇言有罪則係於徽墨尤惡者則斬以鈇質也徽紏墨皆繩也質鍖也鈇莝刃也散以禮樂風以詩書風化也曠以歳月結以倚廬在倚廬行服三年也漢律以不爲親行三年服不得選舉以廬倚牆至地而爲之無楣柱天下之士雷動雲合魚鱗雜襲咸營于八區八區八方也家家自以爲稷契人人自以爲咎繇戴縰垂纓而談者皆擬於阿衡縰韜髪者也五尺童子羞比晏嬰與夷吾夷吾管仲也羞比之者以其不爲王者之佐當塗者升青雲失路者委溝渠旦握權則爲卿相夕失勢則爲匹夫譬若江湖之雀勃澥之鳥乗鴈集不爲之多雙鳬飛不爲之少乗鴈四鴈也雀字或作雁鳬字或作島島海中山其義兩通昔三仁去而殷虚論語稱㣲子去之箕子爲之奴比干諫而死孔子曰殷有三仁焉虛空也一曰虚讀曰墟言其亡國爲邱墟二老歸而周熾二老伯夷太公也子胥死而吳亡種蠡存而粤伯伯讀曰霸五羖入而秦喜樂毅出而燕懼五羖謂百里奚也買以羖羊之皮五故稱五羖也范雎以折摺而危穣侯蔡澤雖噤吟而笑唐舉噤吟頷頤之貌澤從唐舉相謂之曰聖人不相殆先生乎澤曰吾自知富貴故當其有事也非蕭曹子房平勃樊霍則不能安當其亡事也章句之徒相與坐而守之亦亡所患章句小儒也故世亂則聖哲馳騖而不足世治則庸夫高枕而有餘夫上世之士或解縛而相管仲也或釋褐而傅甯戚也或倚夷門而笑侯嬴也爲夷門卒秦伐趙趙求救無忌將十餘人往辭嬴嬴無所戒更還嬴笑之以謀告無忌也或横江潭而漁漁父也或七十説而不遇孔丘也或立談間而封侯薛分也或枉千乗於陋巷齊有小臣稷桓公一日三至而不得見從者曰可以止矣桓公曰士之傲爵祿者固輕其主主傲霸王者亦輕其士彼傲爵祿者吾庸敢傲霸王乎遂見之或擁帚彗而先驅鄒衍之燕昭王郊迎擁彗爲之先驅也彗以帚者也是以士頗得信其舌而奮其筆信讀曰伸窒隙蹈瑕而無所詘也君臣上下有釁乗毁隙乖離之漸則可遂見取也窒塞也當今縣令不請士郡守不迎師羣卿不揖客將相不俛眉自髙枕也俛低也言竒者見疑行殊者得辟辟罪法是以欲談者卷舌而固聲欲行者擬足而投跡卷屈也固閉也擬疑也鄉使上世之士處虖今世鄉讀曰嚮策非甲科行非孝㢘舉非方正獨可抗疏時道是非抗舉也謂上之也疏者疏條其事而言之髙得待詔下觸聞罷報聞而罷之又安得青紫且吾聞之也炎炎者滅隆隆者絶觀雷觀火爲盈爲實天収其聲地藏其熱炎炎火光也隆隆雷聲也人之觀火聼雷謂其盈實終以天収雷聲地藏火熱則爲虚無言極盛者亦滅亡也髙明之家鬼瞰其室鬼神害盈而福謙瞰視也攫拏者亡黙黙者存攫拏妄有摶執牽引也位極者髙危自守者身全是故知𤣥知黙守道之極爰静爰清游神之庭惟寂惟寞守德之宅世異事變人道不殊彼我易時未知如何或能勝之今子迺以鴟梟而笑鳯凰執蝘蜓而嘲龜龍蝘蜓蜥蜴也不亦病乎子徒笑我𤣥之尚白吾亦笑子病甚不遭臾跗與扁鵲也二人皆古之良醫者悲夫客曰然則靡𤣥無所成名乎靡亦無范蔡以下何必𤣥哉揚子曰范雎魏之亡命也折脅拉髂免於徽索髂骨也徽䋲也翕肩蹈背扶服入槖翕歛也激卬萬乗之主卬怒也言秦安得王獨太后穣侯爾卬讀曰仰界涇陽抵穣侯而代之界間其兄弟使䟽涇陽秦昭王弟貴用事也當也言當其際蔡澤山東之匹夫顉頤折頞涕涶流沬顉曲頤也西揖强秦之相搤其咽而亢其氣拊其背而奪其位蔡澤説范雎以功成而退禍福之機適值雎有間於主因薦以自代搤謂急持之咽頸亢絶也時也遇其時天下已定兵革已平都於雒陽婁敬委輅脱輓掉三寸之舌建不拔之䇿舉中國徙之長安不拔謂堅固不㧞也中國謂京師適也中其適五帝垂典三王傳禮百世不易叔孫通起於枹鼓之間解甲投戈遂作君臣之儀得也得其所甫刑靡敝秦法酷烈聖漢權制而蕭何造律宜也合其宜故有造蕭何律於唐虞之世則誖矣誖乖有作叔孫通儀於夏殷之時則惑矣有建婁敬之䇿於成周之世則繆矣有談范蔡之説於金張許史之間則狂矣夫蕭規曹隨隨從也言蕭何始作規模曹參因而從之留侯畫䇿陳平出竒功若泰山嚮若阺隤巴蜀人名山旁推委堕落曰阺雖其人之膽知哉亦㑹其時之可爲也非唯其人膽知乃㑹時之可爲也故爲可爲於可爲之時則從爲不可爲於不可爲之時則㓙若夫藺生収功於章䑓藺相如献璧於此䑓謂齎璧如秦秦不與趙地相如詭取其璧使人間以歸趙也四皓采榮於南山榮者聲名也一曰榮謂草木之英采取以充食公孫創業於金馬公孫𢎞對䇿金馬門驃騎發跡於祁連司馬長卿竊訾於卓氏東方朔割名於細君割損也言以肉遺細君是損割其名僕誠不能與此數公者竝故黙然獨守吾太𤣥雄既著太𤣥經客有難𤣥太深衆人之不好也雄解之號曰觧難其辭曰客難揚子曰凡著書爲衆人之所好也美味期乎合口工聲調於比耳比和也今吾子迺抗辭幽説閎意眇指眇讀曰妙獨馳騁於有亡之際而陶冶大鑪旁薄羣生旁薄猶言蕩薄也厯覧者兹年矣而殊不寤兹益也兹年言其乆不寤不曉其意亶費精神於此而煩學者於彼亶讀曰但譬盡者畫於無形弦者放於無聲殆不可乎放依也殆近也放甫往切揚子曰俞俞然也音踰若夫閎言崇議幽㣲之塗盖難與覧者同也昔人有觀象於天視度於地察法於人者天麗且彌地普而深麗著也日月星辰之所著也彌廣也普遍也昔人之辭迺玉迺金真寳美麗如金如玉彼豈好爲艱難哉勢不得已也獨不見夫翠蚪綘螭之將登虖天必聳身於蒼梧之淵不階浮雲翼疾風虚舉而上升則不能橶膠葛騰九閎橶挶也膠葛上清之氣也騰升也九閎九天之門橶音㦸挶君足切日月之經不千里則不能燭六合燿八紘燭炤也六合爲天地四方八紘八方之綱維也紘音宏泰山之髙不嶕嶢則不能浡滃雲而㪚歊烝嶕嶢髙貌也浡滃盛也滃雲氣貌歊烝氣上出也是以宓犠氏之作易也綿絡天地經以八卦文王附六爻因而重也孔子錯其象而彖其辭然後發天地之藏定萬物之基典謨之篇雅頌之聲不温純深潤則不足以揚鴻烈而章緝熙鴻大也烈業也緝繼續熙光明也盖胥靡爲宰胥相也靡無也言相師以無爲作宰者也寂寞爲尸道化以寂寞爲主大味必淡大音必希淡謂無五味也大語呌呌大道低回呌呌逺聲也低回紆衍也是以聲之𦕈者不可同於衆人之耳眇讀曰妙形之美者不可混於世俗之目混亦同也辭之衍者不可齊於庸人之聽衍旁廣也今夫絃者高張急徽追趨逐耆則坐者不期而附徽琴徽也所以表發撫抑之處也追趨逐耆隨所趨嚮愛嗜而追逐之也試爲之施咸池揄六莖發簫韶詠九成則莫有和也揄引也和應也是故鍾期死伯牙絶絃破琴而不肯與衆鼓􅚽人亡則匠石輟斤而不敢妄斵􅚽古之善塗塈者也施廣領大袖以仰塗而領袖不汙有小飛泥誤著鼻因令匠石揮斤而斵知石之善斵故敢使之也塈即今之仰泥也􅚽拔拭也故謂塗者爲獶人師曠之調鐘竢知音者之在後也晉平公鑄大鐘工者以爲調美師曠曰臣竊聼之知其不調也質於師涓而果知鐘之不調是師曠欲善調以爲後世之有知音孔子作春秋幾君子之前睹也幾讀曰兾老耼有遺言貴知我者希老子德經云知我者希則我貴矣此非其操與雄見諸子各以其知舛馳舛相背大氐皆詆訾聖人即爲恠迂折辯詭辭以撓世事大氐大歸也詆訾毁也迂逺也折分也詭異也言諸子之書大歸皆非毁周孔子之教爲巧辯異辭以攪亂時政也雖小辯務破大道而惑衆使溺於所聞而不自知其非也後漢班固字孟堅明帝永平中爲郎典校秘書專篤志於博學以著述爲業或譏以無功又感東方朔揚雄自喻以不遭蘇張范蔡之時曽不折之以正道明君子之所守故聊復應焉其辭曰賔戱主人曰盖聞聖人有一定之論烈士有不易之分亦云名而已矣唯貴得名也故太上有立德其次有立功夫德不得後身而特盛功不得背時而獨章是以聖哲之治棲棲皇皇不安之意也孔席不煗墨突不黔繇此言之取舎者昔人之上務著作者前列之餘事爾今吾子幸㳺帝王之世躬帶紱冕之服帶大帶也冕冠也浮英華湛道德湛讀曰沈華謂名譽也言外則有美名美譽内則履道崇德也矕龍虎之文舊矣矕被也易曰大人豹變其文蔚也言文章之盛乆也卒不能攄首尾奮翼鱗振拔洿塗跨騰風雲攄申也洿停水塗泥也以龍爲喻也使見之者景駭聞之者嚮震嚮讀曰響見影則駭聞響則震也徒樂枕經籍書紆體衡門紆屈也衡門横一木於門上上無所蔕下無所根獨攄意虖宇宙之外鋭思於毫芒之内潜神黙記嘗以年歳宇宙之内言宏廣也毫芒之内言細㣲也然而器不賈於當己用不効於一世賈讎也當己謂及己身尚在猶言當年也雖馳辯如濤波摛藻如春華大波曰濤摛布也藻文辭也猶無益於殿最意者且運朝夕之䇿定合㑹之計使存有顕號亡有美諡不亦優虖主人逌爾而笑曰逌笑貎也若賔之言斯所謂見埶利之華闇道德之實守突奥之熒燭未卬天庭而覩白日也爾雅東南隅謂之突西南謂之奥熒燭小光之燭曩者王塗蕪穢周失其御侯伯方軌戰國横騖於是七雄虓闞分裂諸夏七雄秦及六國也龍戰而虎爭㳺説之徒風颺電激竝起而救之其餘焱飛景附煜霅其間者盖不可勝載焱疾風也煜霅光貌也當此之時搦杇摩鈍鉛刀皆能壹㫁搦授也是故魯連飛一矢而蹶千金虞卿以顧盼而捐相印也齊圍燕燕將保於聊城魯連係帛書於矢射與之爲陳利害燕將得之泣而自殺秦時圍邯郸爲却五十里趙王以千金爲魯連夀不受魏齊爲秦所購迫急走趙趙相虞卿與齊有故然愍其窮於是解相印間行與奔魏公子無忌也蹷蹋也距也夫啾發投曲感耳之聲合之律度滛䵷而不可聽者非韶夏之樂也啾發啾啾小聲而發也投曲趨合屈曲也感耳動應衆庶之耳也然而合律度君子所不聼也滛䵷非正之聲也不謂䵷之鳴也因埶合變偶時之㑹風移俗易乖忤而不可通者非君子之法也雖偶當時之㑹而不可以移風易俗及至從人合之衡人散之亡命漂説覉旅騁辭漂浮也商鞅挾三術以鑚孝公李斯奮時務而要始皇三術王一霸二富國强兵三也彼皆躡風雲之㑹履顛沛之埶顛沛僵仆也據徼乗邪以求一日之富貴徼要也據可以要迎之時也徼字或作激發也朝爲榮華夕而焦悴福不盈眦旤溢於世當富貴之間視不滿目故言不盈眦也㓙人且以自悔况吉士而是賴乎賴利且功不可以虚成名不可以僞立韓設辯以徼君吕行詐以賈國賈市賈也説難既酋其身迺囚秦貨既貴厥宗亦墜酋雄也説難韓非書篇名也吕不韋初見子楚在趙而云此竒貨可居故班氏謂子楚爲秦貨爾是故仲尼抗浮雲之志孟軻養浩然之氣彼豈樂爲迂闊哉道不可以貳也迂逺也方今大漢灑掃羣穢夷險芟荒廓帝紘恢皇綱基隆於羲農規廣於黄唐其君天下也炎之如日威之如神函之如海養之如春函容也讀與含同是以六合之内莫不同原共流沐浴𤣥德原水泉之夲也流者其末流也禀卬太和枝附葉著卬讀仰也譬猶草木之殖山林魚鳥之毓川澤殖生也長也得氣者蕃滋失時者苓落苓與零同參天墜而施化豈云人事之厚薄哉今子處皇世而論戰國燿所聞而疑所覿覿見也欲從旄敦而度髙虖泰山懷汎濫而測深虖重淵亦未至也爾雅前髙曰旄邱如覆敦者敦邱側出曰汎泉上出曰濫泉賔曰若夫鞅斯之倫衰周之㓙人既聞命矣敢問上古之士處身行道輔世成名可述於後者黙而已虖主人曰何爲其然也若咎繇謨虞箕子訪周訪亦謀也言通帝王謀合聖神殷説夢發於傅巖周望兆動於渭濵齊甯激聲於康衢漢良受書於邳圻皆竢命而神交匪詞言之所信故能建必然之䇿展無窮之勲也近者陸子優繇新語以興優繇不仕也董生下帷發藻儒林劉向司籍辯章舊聞揚雄覃思法言太𤣥覃大也深也皆及時君之門闈究聖人之壼奥宫中門謂之闈宫中巷謂之壼婆娑乎術藝之場休息乎篇籍之囿以全其質而發其文用納乎聖聽烈炳於後人斯非其亞與亞次也與讀曰歟若迺伯夷抗行於首陽栁惠降志於辱仕辱仕謂爲士師三黜也顔躭樂於簞瓢孔終篇於西狩謂作春秋止於𫉬麟也聲盈塞於天淵真吾徒之師表也且吾聞之一隂一陽天墬之方迺文迺質王道之綱有同有異聖喆之常故曰慎修所志守爾天符委命共已味道之腴膄肥也神之聽之名其舍諸舍廢也諸之也言修志委命則神明聽之祐以福祿自然有名永不廢也賔又不聞龢氏之璧韞於荆石韞亦藏也隋侯之珠藏於蜯蛤虖厯世莫􅢂不知其將含景耀吐英精曠千載而流夜光也應龍潜於潢汙魚黿媟之應龍龍有翼者潢汙停水也蝶謂侮狎之不覩其能奮靈徳合風雲超怱荒而躆顥蒼也躆以足據持顥顥天元氣浩汗故曰顥天其色蒼蒼故曰蒼天故夫泥蟠而天飛者應龍之神也先賤而後貴者龢隋之珍也時闇而乆章者君子之貞也時闇有時而闇若迺牙曠清耳於管絃離婁𦕈目於毫分逢蒙絶技於弧矢班輸攉巧於斧斤逢蒙古善射者也班輸即魯公輸班也良樂軼能於相馭烏𫉬抗力於千鈞良王良也樂伯樂也軼與逸同相相馬也馭善馭也烏𫉬壯士也龢鵲發精於鍼石研桑心計於無垠和秦醫和也鵲扁鵲也研計研也一曰計兒亦曰計然桑桑𢎞羊也僕亦不任厠技於彼烈故宻爾自娱於斯文宻净也安也崔駰字亭伯少㳺太學嘗以典籍爲業未遑仕進之事時人或譏其太𤣥靜將以後名失實駰擬揚雄解嘲作達㫖以答焉其辭曰或説已曰易稱備物致用可觀而後有所合故能扶陽以出順隂而入備物致用易繫辭之文也可觀而有所合序卦之文也鄭𤣥注易乾鑿度曰陽起于子陰起於午天數大分以陽出離以隂入坎坎爲中男離爲中女太一之行從中男入從中女出因隂陽男女之偶爲終始也春發其華秋収其實有始有極爰登其質今子韞櫝六經服膺道術厯世而㳺髙談有日俯鉤深於重淵仰探達乎九乾九乾謂天有九重也窮至賾於幽㣲測潜隐之無源然下不歩卿相之廷上不登王公之門進不黨以讃已退不黷於庸人讃尤稱也獨師友道德合符曩真抱景特立與士不羣盖髙樹靡隂獨木不林隨時之宜道貴從凡老子曰和其光而同其塵故言道貴從凡于時太上運天德以君世憲王僚而布官太上明帝也憲法也僚官也言法三王而建官也臨雍泮以恢儒疏軒冕以崇賢天子辟雍諸侯泮宫皆所以立學垂教也率惇德以勵忠孝揚茂化以砥仁義砥礪也選利器於良材求鏌鋣於明智不以此時攀台階闚紫闥三台陛之三階三公之象也據髙軒望朱闕夫欲千里而咫尺未發八寸曰咫蒙切惑焉故英人乗斯時也知過萬人謂之英猶逸禽之赴深林蟲蚋之趣大沛蚋小蟲蚊之𩔖孟子曰汚池沛澤胡爲嘿嘿而乆沉滯也答曰有是言乎子茍欲勉我以世路不知其跌而失吾之度古者隂陽始分天地𥘉制制協韻音之設切皇綱亡緒帝紀乃設𫝊序厯數三代興滅昔大庭尚矣赫胥㒺識大庭赫胥竝古帝王號也尚逺也罔無也識記也淳樸散離人物錯乖髙辛攸降厥趣各違髙辛氏帝嚳也道無常稽與時張弛隨時弛張不考之於常道也失仁爲非得義爲是老子曰失道後徳失德後仁失仁後義失義後禮君子通變各審所履故士或掩目而淵潜莊子曰比人無澤與舜爲友以天下譲之無澤乃自投清冷之淵終身不反也或盥耳而山棲盥洗也或草耕而僅飽伯成子髙唐虞時爲諸侯舍去而耕禹徃見之則耕在野或木茹而長飢鮑焦衣木皮食木實或重聘而不來狂接輿者楚人也耕而食楚王聞其賢使者持金百鎰車二駟聘之曰願煩先生理江南接輿笑而不應使者去而逺徙莫知所之或屢黜而不去栁下惠爲士師三黜人曰可以去矣曰直道而事人何徃而不三黜也或冐訽以干進或望色而斯舉訽辱也伊尹蒙恥辱負鼎爼以干湯論語日色斯舉矣翔而後集或以役夫發夢於王公商髙宗夢得説乃使百工營求諸野得諸傅巖説賢而隐代胥靡築之以共食王公縂而言也爾雅皇王后辟公侯君也或以漁父見兆於元龜太公以釣于周渭水西伯將出卜之曰所𫉬非龍非驪非熊非羆所𫉬霸王之輔於是西伯獵果得太公渭水之陽與語大説元大也若夫紛繷塞路㓙虐播流方言云繷盛多人有昏墊之戹主有疇咨之憂昏瞀墊溺皆困水灾也尚書帝曰咨洪水滔天浩浩懷山㐮陵有能俾乂條垂藟蔓上下相求藟藤也於是乎賢人授手援世之灾孟子曰天下溺則援之以道嫂溺則援之以手也䟦渉赴俗急斯時也草行爲跋昔堯含慼而臯陶謨髙祖歎而子房慮謨謀也堯遭洪水咨嗟憂愁訪下人有能治者臯陶大禹陳其謨髙祖歎爲頂羽所敗下馬踞鞍而問子房曰吾欲捐關以東誰可與共功者子房曰九江王布彭越韓信即欲捐之此三人楚可破也禍不㪚而曹綘奮曹參及綘侯周勃皆從髙祖征伐以定天下也結不解而陳平權髙祖擊匈奴至白登被圍七日用陳平計得出及其䇿合道從克亂弭衝乃將鏤𤣥珪册顕功珪玉也銘昆吾之冶吕尚作周太師其功銘於昆吾之鼎也勒景㐮之鐘國語曰晉魏顆以其身退秦師于輔氏其勲銘于景鐘此兼言襄也與其有事則褰裳濡足冠挂不顧褰裳渉水也淮南子曰禹之逰時冠挂而不頋履遺而不取也人溺不拯則非仁也當其無事則躐纓整襟規矩其歩廣雅云躐持也言持纓整襟修其容止德譲不修則非忠也是以險則救俗平則守禮舉以公心不私其體今聖上之育斯人也樸以皇質雕以唐文孔子曰大哉堯之爲君煥乎其有文章故言唐文六合怡怡比屋爲仁壹天下之衆異齊品類之萬殊参差同量坯冶一陶坯土器未燒者羣生得理庶績其凝凝成也家家有以樂和人人有以自優威械藏而爼豆布六典陳而九刑厝械謂器械甲胄之属也厝謂置之不用也周禮太宰之職掌建邦之六典以佐王理邦國一曰治典二曰教典三曰禮典四曰政典五曰刑典六曰事典左傳周有亂政而作九刑齊茲兆庶出於平易之路雖有力牧之略尚父之厲力牧黄帝臣也尚父吕望也厲謂容巖厲伊臯不論奚事范蔡伊尹臯陶范雎蔡澤夫廣厦成而茂木暢逺求存而良馬縶廣厦成不求材故茂木條暢也逺求謂逺方珍異之物也存猶止息也言所求之物既止不資良馬之力也隂事終而水宿藏立冬之後盛德在水隂氣用事故曰隂事水宿謂北方七宿斗牛女虚危室璧也月令曰孟冬月昏危中仲冬昏璧中季冬昏婁中孟春昏參中水星伏不見也場功畢而大火入爾雅曰心爲大火詩豳風曰七月流火又曰九月場圃也方斯之際處士山積學者川流衣裳被宇冠盖雲浮譬猶衡陽之林岱隂之麓山南曰陽山北曰隂榖梁傳曰林屬於山曰麓伐尋抱不爲之稀蓺拱把不爲之數八尺曰㝷蓺殖也兩手曰拱數猶概數音疏角切悠悠㒺極亦各有得悠悠衆多也㒺極猶無窮也亦各有得言自以爲得也彼採其華我収其實舎之則藏已所學也彼彼衆人也論語曰用之則行舎之則藏故進動以道則不辭執珪而秉柱國吕氏春秋曰得伍員者位執珪又爵名也又曰柱國楚官猶秦之相國也復靜以理則甘糟糠而安藜藿夫君子非不欲仕也恥夸毗以求舉夸毗謂佞人足恭善爲進退非不欲室也惡登牆而摟處孟子曰踰東家牆而摟其處子則得妻不摟則不得妻則將摟之乎其字從手處子處女也呌呼衒鬻縣旌自表非隋和之寳也暴智燿世因以干祿非仲尼之道也因字一作回回邪也游不倫黨茍以徇已倫謂等倫黨謂朋黨狥營也言人非其𩔖茍以營已而已汗血競時利合而友汗血謂勞力也競時謂趍時也時合而友不以道義子笑我之沉滯吾亦病子屑屑而不已也屑屑猶區區也先人有則而我弗虧行有枉徑而我弗隨枉曲也徑道也臧否在予唯世所議固將因天質之自然誦上哲之髙訓詠太平之清風行天下之至順懼吾躬之穢德勤百畆之不耘尚書曰穢德彰聞禮記曰夫人情者聖王之田脩禮以耕之陳義以種之講學以耨之古者夫田百畆耘除草也縶余馬以安行俟性命之所存安行不奔馳天命之謂性言隐居以俟命昔孔子起威於夾谷晏嬰發勇於崔杼曹劌舉節於柯盟曹劌曹沬也以勇事魯莊公爲魯將與齊戰三敗莊公懼乃遂獻邑地以和猶以爲將齊桓公與莊公㑹于柯盟桓公與莊公既盟於壇上曹沬執匕首刼齊桓公左右莫敢動乃還魯之侯地卞嚴克㨗於疆禦新序曰卞莊子養母戰而三北交游非之國君辱之及母死三年齊與魯戰荘子請從遂赴敵而三𫉬甲首曰夫三北以養母也今志節小具而責塞矣吾聞之節土不以辱生遂反敵殺十人而死君子曰三北以塞滅世斷宗於孝未終范蠡錯執於㑹稽錯置執謂謀也史記曰吳王敗越於夫椒越王以餘兵五千保於㑹稽吳師追而圍之越王謂范蠡曰奈何蠡對曰卑辭厚禮以遺之勾踐乃命大夫種行成於吳膝行頓首曰勾踐請為臣妾吳王乃赦越王越王反國拊循其士范蠡曰可矣乃伐吴師敗越復棲吴王姑蘇之山伍員樹功於栢舉伍子胥名員楚人也子胥父誅於楚子胥挟弓矢而干吴王闔閭闔閭甚勇之爲興師伐楚于栢舉楚師敗績魯連辯言以退燕史記曰魯仲連齊人也燕將攻下齊聊城固保守之田單攻之不下魯仲連乃爲書遺燕將燕將見書泣三日自殺遂平聊城包胥單辭而存楚左傳曰楚昭王爲呉所敗奔随申包胥如秦乞師曰吳爲封豕長蛇以荐食上國寡君越在草莽使下臣吿急立依庭墻哭日夜不絶聲勺飲不入口七日而秦師乃出敗吳師而復楚國唐且華顛以悟秦唐且即唐雎也戦國䇿曰齊楚伐魏魏使人請救不至魏人有唐雎者年九十餘矣西見秦王秦王曰丈人忙然乃逺至魏來者數矣寡人知魏之急矣唐且曰夫魏萬乗之國也稱東藩者以秦之强也今齊楚之兵已在魏郊矣大王之救不至魏急且割地是王亡一萬乗之魏而强二敵之齊楚秦王悟遽發兵救魏爾雅曰顛頂也華顛謂白首也丼羅童牙而報趙丼羅下蔡人丼茂孫也年十二事秦相吕不韋秦使張唐徃相燕羅曰借臣車五乗請爲張唐先報趙不韋乃言之於始皇召見使甘羅於趙趙㐮王郊迎事見史記童牙爲㓜少也原衰見亷於壺飱昔趙衰爲原大夫故曰原衰左傳曰晉侯問原守於寺人勃鞮對曰昔趙衰以壺飱從徑餒而不食故使處原見音乎殿切孟宣収德於束脯吕覧曰昔趙孟宣將之綘見桑間有餓人孟宣止車下脯而食之再咽而能視孟宣問之曰汝何爲而餓若是對曰臣官於綘歸而粮絶羞行乞故至於此宣子與脯三朐拜受而弗敢食問其故曰臣有老母將以遺之孟宣曰食之吾更與汝乃復與脯二束吳札結信於邱木史記曰吳公子季札使過徐君好季札劒口不敢言季札知之爲使上國未獻洎還至徐徐君已死於是札解其寳劔繫之徐君冡樹而去展季效貞於門女展季栁下惠也韓詩外傳曰魯有男子獨處夜暴風雨至婦人趨而託之男子閉户不納曰吾聞男女不六十不同居婦人曰子何不學桞下惠也惠不驅逮門之女國人不稱其亂焉顔回明仁於度轂程嬰顯義於趙武程嬰解見馮衍傳度轂未詳僕誠不能編德於數者竊慕古人之所序張衡字平子順帝初再轉復爲太史令衡不慕當世所居之官輙積年不徙自去史職五載復還乃設客間作應間以見其志云間非也衡集云觀者觀余去史官五載而復還非進取之勢也惟衡内識利鈍操心不攻或不我知者以爲失志矣用爲間余余應之以時有遇否性命難求因兹以露余誠焉名之應間云有間余者曰盖聞前哲首務務於下學上達佐國理民有云爲也論語曰孔子曰下學而上逹注云下學人事上知天命也朝有所聞則夕行之立功立事式昭德音尚書曰立功立事可以永年逸詩曰祈招之愔愔式昭德音式用也昭明也是故伊尹思使君爲堯舜而民處唐虞彼豈虚言而已哉必旌厥素爾尚書伊尹曰予弗克俾厥后惟堯舜其心愧恥若撻于市旌明素猶志也咎單巫咸寔守王家咎單巫咸竝殷賢臣也尚書曰咎單作明居又曰巫咸保乂王家也申伯樊仲實幹周邦服衮而朝介圭作瑞申伯申國之伯也樊仲仲山甫也爲樊侯竝周宣王之卿士詩大雅曰維申及甫維周之翰翰幹也服衮謂申伯爲冢宰服衮冕之服也又曰錫爾介圭以作爾寳注云寳瑞也圭長尺二寸爲之介也厥跡不朽垂烈後昆不亦丕歟且學非以要利而富貴萃之貴以行令富以施惠惠施令行故易稱以大業易繫辭曰盛德大業至矣哉富有之謂大業繇日新之謂盛德也質以文美實繇華興器賴雕飾爲好人以輿服爲榮吾子悟德體道篤信安仁約己博藝無堅不鑚以思世路斯何逺矣論語曰篤信好學又曰仁者安仁又曰鑚之彌堅博我以文約我以禮曩滯日官今又原之日官史官左傳曰天子有日官爾雅曰原再也雖老氏曲全進道若退然行亦以需老子曰曲則全枉則正又曰夷道若顛進道若退易離卦曰需不進也必也學非所用術有所仰故臨川將濟而舟楫不存焉徒經思天衢内昭獨智固合理民之式也故嘗見謗于鄙儒天衢天道也言徒鋭思作靈憲渾天儀等深厲淺揭隨時爲義曽何貪於支離而習其孤技焉揭褰衣也音邱例切詩弼風曰深厲淺揭爾雅曰帶上爲厲繇膝以下曰揭言遭時制宜遇深水則厲淺則揭也易隨卦隨時之義大矣哉莊子曰朱泙曼學屠龍於支離盖單千金之家三年技成而無所用技音渠綺切責衡何獨妙思於機巧者也參音三輪可使自轉木雕猶能獨飛已垂趐而還故棲盍亦調其機而銛諸垂趐故棲謂再爲史官也盍何不銛利也諸之也間者言衡作三輪木雕尚能飛轉已乃垂趐故棲何不調其機關使利而髙飛邪傳子曰張衡能令三輪獨轉也昔有文王自求多福詩大雅文王篇曰永言配命自求多福也人生任勤不索何獲左傳曰人生在勤勤則不匱又曰不索何獲吾欲求之曷若卑體屈己美言以相尅尅勝也衡集作美言以市也鳴于喬木乃金聲而玉振之詩小雅曰伐木丁丁鳥鳴嚶嚶出自幽谷遷于喬木喻求仕遷於髙位振揚德音如金玉之聲孟子曰金聲而玉振用後勲雪前吝婞狠不柔以意誰靳也吝恥也左傳曰宋公靳之杜預云戯而相愧曰靳應之曰是何觀同而見異也君子不患位之不尊而患德之不崇不恥祿之不夥而恥智之不博方言曰凡物盛而多齊宋之郊謂之夥音和果切是故藝可學而行可力也天爵髙懸得之在命孟子曰仁義忠信樂善不倦此天爵也公卿大夫此人爵也案此謂天子髙懸爵位得者命也或不速而自懷或羨旃而不臻速召懷來旃之也求之無益故智者面而不思面偕也阽身以徼幸固貪夫之所爲未得而豫喪也阽危也枉尺直尋議者譏之盈欲虧志孰云非羞孟子陳代問孟子曰枉尺而直尋若可爲也孟子曰昔齊景公田招虞人以旌不至將殺之志士不忘在溝壑如不待招而徃何哉且夫枉尺而直尋者以利言也如以利則枉尋直尺而利亦可爲與趙岐注云志士守義者也君子固窮故虞人得其招尚不徃如何君子不得其招而妄見也尺小尋大不可枉大就小而以要名也於心有猜則簋飱饌餔猶不屑餐旌瞀以之猜嫌也簋食器也飱音孫詩云有蒙簋飱饌音士倦切餔音補故切竝謂食也屑猶介也以用也爰旌瞀餓人也一作爰精目列子曰東方有人焉爰精目將有適也而餓於道孤邱父之盜日邱見而下壺飱以餔之爰精目三餔而後能視曰子何謂者也我孤邱父之人邱也爰精目曰譆汝非盜邪吾義不食子之食也兩手據地而嘔之不出喀喀而死之也意之無疑則兼金盈百而不嫌辭孟軻以之孟子陳臻問曰前日齊王餽兼金一百而不受於宋餽七十鎰而受前日之不受是則今日之受非也孟子曰皆是也當在宋也予將有逺行行者必以贐予何爲不受若於齊則未有處也無處而餽之是貨之也焉有君子而可以貨取乎趙岐注云兼金好金也價兼倍於常者故曰兼金一百百鎰也三十兩爲鎰贐逺行者贈賂之禮也在齊時無事於義未有所處也義無所處而餽之是以貨賄而取我欲使我懷惠也士或解䄈褐而襲黼黻或委臿築而據文軒者度德拜爵量績受祿也解䄈褐謂甯戚也委臿築謂傅説也䄈音甞主切方言曰自關而西謂䄡䄖短者謂之䄈也輸力致庸受必有階受或作爰渾元初基靈軌未紀吉㓙紛錯人用朣朦朣朦言未悟也黄帝爲斯深慘有風后者是焉亮之察三辰於上跡禍福乎下經緯厯數然後天歩有常則風后之爲也史記曰黄帝迎日推䇿舉風后力牧以理人順天地之紀幽明之占又旁羅日月星辰春秋内事曰黄帝師於風后后善伏羲氏之道故推演隂陽之事藝文志隂陽流有風后十三篇當少昊青陽之末實或亂德人神雜擾不可方物重黎又相顓頊而申理之日月即次則重黎之爲也帝王紀曰少昊字清陽國語楚觀射父頊皥之衰也九黎亂德人神雜揉不可方物顓頊承之乃命南正重司天以属神命北正黎司地屬人重少昊氏之子黎顓頊氏之子人各有能因蓺授任鳥師别名四叔三正官無二業事不竝齊左傳郯子曰少皥鳥師而鳥名鳯皇氏厯正也𤣥鳥氏司分也伯趙氏司至也青鳥氏司啟也丹鳥氏司閉也又晉蔡墨曰少皥氏有四叔曰重曰該曰修曰熙實能金木及水使重爲勾芒該爲蓐収修及熈爲𤣥㝠四叔分主三正言其不兼業也晝長則宵短日南則景北夏至日北極而影短晝六十刻夜四十刻冬至日南極而影長夜六十刻晝四十刻易通卦驗曰冬至日晷長丈三尺夏至日晷長尺五寸謂立八尺表之隂也天且不堪兼况以人該之該備夫𤣥龍迎夏則凌雲而奮鱗樂時也渉冬則淈泥而潜蟠避害也説文曰龍鱗蟲之長能出入能大小能短長春分而登天秋分而入川言出入有時也賈逵注國語淈亂也淈音骨公旦道行故制典禮以尹天下懼教化之不從有人不理尹正也道行言道得申也流俗本作行道者非也仲尼不遇故論六經以俟來辟辟君也公羊傳曰孔子制春秋以俟後聖也恥一物之不知有事之無範所考不齊如何可一衡集考字作丁丁當也夫戰國交爭戎車競驅君若綴旒人無所麗麗附也公羊傳曰君若贅旒然旒旂旒也言爲下所執持西東燭武縣縋而秦伯退師燭之武鄭大夫也縋縣繩於城而下也左傳曰秦伯圍鄭鄭伯使燭之武夜縋而出説秦伯爲之退師魯連繫箭而聊城弛柝魯仲連齊人也時燕將守聊城仲連爲書係箭射聊城中燕將自殺見史記弛廢也柝行夜木也從徃則合横來則離安危無常要在説夫張儀説諸侯連和事秦爲横蘇秦説諸侯連兵拒秦爲從蘇秦徃則從合張儀來則從離咸以得人爲梟失士爲尤梟猶勝也猶人博逢梟則勝故樊噲披帷入見髙祖前漢書曰樊噲沛人也封舞陽侯髙帝甞病惡見人卧禁中詔户者無得入噲乃排闥直入流涕曰獨不見趙髙之事乎帝笑而起也髙祖踞洗以對酈生前漢書曰沛公方踞牀令兩女子洗足而見酈食其曰必欲聚徒合義兵誅無道不宜踞見長者於是沛公輟洗謝之當此之㑹乃黿鳴而鼈應也喻君臣相感贛易林曰黿鳴岐野鼈應於泉也故能同心勠力勤恤人隐隐病也國語曰勤恤人隐而除其害也奄受區夏遂定帝位皆謀臣之繇也故一介之䇿各有攸建子長諜之爛然有第前書音義曰諜譜第也與牒通司馬遷字子長作史記著功臣等傳爛然各有第序也夫女魃北而應龍翔洪鼎聲而軍容息女魃旱神也北猶退也應龍能興雲兩者也山海經曰蚩尤舉兵伐黄帝黄帝乃令應龍攻之冀州之野應龍蓄水蚩尤請風伯雨師從大風雨黄帝乃下天女曰風雨止遂殺蚩尤妖不得復上所居不雨妖亦魃也音歩末切聲或作新容或作客衡集容作害竝未詳也溽暑至而鶉火棲寒氷沍而黿鼉蟄棲息也禮記月令曰季夏土潤溽暑鶉火午之宿也三月在午六月在酉言當季夏之時鶉火退於酉沍凝也今也皇澤宣洽海外混同萬方億醜并質共劑若修成之不暇尚何功之可立質劑猶今分支契也并共猶言交通也周禮曰凡買賣者質劑焉大市以劑鄭𤣥注云兩書一札同而别之長曰質短曰劑劑音子隨切立事有三言爲下列下列且不可庶奚兾其二哉左傳魯叔孫豹曰太上有立德其次有立功其次有立言杜預注云立德黄帝堯舜也立功禹稷也立言史佚周任臧文仲于兹縉紳如雲儒仕成林及津者風攄失塗者幽僻遭遇難要趨偶爲幸世易俗異事勢舛殊不能通其變而一度以揆之易係辭曰通其變使人不能􅌒也斯契舡而求劔守株而待兎也契猶刻也吕氏春秋曰楚人有渉江者其劔自舟中墮於水遽契其舟曰是吾劔所從堕也舟已行而劔不行若此求劔不亦惑乎韓子曰宋人有耕者田中有株兎走觸之折頸而死因釋耕守株兾復得兎爲宋國笑也冐愧逞願必無仁以繼之有道者所不履也越王勾踐事此故厥緒不永史記曰越王勾踐伐吳興師吴王聞之悉發精兵擊越敗之於夫椒越王乃以餘兵五千保棲㑹稽此爲冐愧逞願自取敗也㨗徑邪至我不忍以投歩干進茍容我不忍以歙肩㨗疾歙斂也孟子曰阿意事貴脅肩所尊俗之情也歙亦脅也雖有犀舟勁檝猶人渉卬否有須者也前書曰羌戎弓矛之兵器不犀利音義曰今俗謂刀兵利爲犀犀堅也詩衛風曰招招舟子人渉卬否人渉卬否卬須我友卬我也須待也鄭𤣥注云人皆渉我友未至我獨待而不渉言室家之道非得所適貞女不行非得禮義婚姻不成喻仕當以道不求妄進姑以奉順敦篤守以忠信得之不休不獲不吝姑且也休美也吝恥也不見是而不惛居下位而不憂允上德之甞服焉惛猶悶也易曰不見是而無悶樂則行之憂則違之又曰居上位而不驕在下位而不憂也方將師天老而友地典與之乎髙睨而大談孔甲且不足慕焉稱殷彭及周耼帝王紀曰黄帝以風后配上台天老配中台五聖配下台謂之三公其餘知天規紀地典力牧甞先封胡孔甲等或以爲師或以爲將蓻文志隂陽有地典六篇殷彭即老彭殷賢人也睨視也髙視大談言不同流俗衡集作矢亦直也義通與世殊技固孤是求技巧也音枝本或作語也子憂朱泙曼之無所用吾恨輪扁之無所教也輪扁謂爲輪者名扁也扁音皮殄切莊子曰輪扁對齊桓公曰斵輪之法徐則甘而不同疾則苦而不入不疾不徐得之于手而應之心口不能言也臣不䏻以喻臣之子臣子亦不能受之於臣言泙曼屠龍既無所用輪扁教輪亦不能教人也泙音匹萌反子覩木雕獨飛愍我垂翅故棲吾感去鼃附鴟悲爾先笑而後號也鼃蝦蟇也音胡媧切旅上九曰先笑而後號咷裴豹以斃督燔書禮至以掖國作銘左傳曰晉欒盈復入於晉欒氏之力臣曰督戎國人懼之裴豹謂范宣子曰茍焚丹書我殺督戎宣子曰而殺之所不請於君焚丹書曰有如日乃殺之杜注曰盖豹犯罪没爲官奴以丹書其罪左傳衛伐邢禮至與國子巡城掖赴外殺之禮至自爲銘曰余掖殺國子莫敢止國子邢正卿禮至衛人仕邢爲大夫掖謂挟之而投於城外也衡集豹字作𨽻也弦髙以牛餼退敵墨翟以縈帶全城左傳曰秦師襲鄭及滑鄭商人弦髙將市於周遇之以牛十二犒師曰寡君聞吾子將出於弊邑敢犒從者秦孟明曰鄭有偹矣滅滑而還墨子曰公輸般爲雲梯以攻宋墨子解帶爲城以牒爲械公輸設九攻墨子九拒公輸之攻盡墨子之守有餘楚王曰善哉吾請無攻宋矣貫高以端辭顕義蘇武以秃節效貞貫髙趙相也端猶正也獨正言趙王不及髙帝賢而赦之蘓武使匈奴中持節卧起莭毛盡落並見前書也蒲且以飛矰逞巧詹何以沉鉤致精列子曰蒲且子之弋羽弓織繳乗風振之連雙鶬於青雲之際又曰詹何以獨絲爲綸芒針爲鈎荆蓧爲竿部粒爲餌引盈車之魚周禮曰矰矢用弋射鄭𤣥注云結繳於矢爲矰矰髙也奕秋以棊局取譽王豹以清謳流聲奕圍棊也局參所執之子秋名也孟子曰奕秋通國之善奕者又曰王豹處於淇而河西善謳僕進不能參名於二立退又不能匹群彼數子二立謂太上立德其次立功也上云立事有三言且不可庶况其二哉故言不能參名於二立之流也吕賢案古本作二立流俗夲及衡集立守名仁匹非也数子謂裴豹以下也愍三墳之既頺惜八索之不理左傳曰楚左史倚相能讀三墳五典八索九丘孔安國以爲三墳五典三皇之書八卦之説謂之八索此以下言不能立德立功唯欲立言而已庶前訓之可鑚聊朝隠乎柱史前書東方朔曰首陽爲詘柱下爲工應邵曰老子爲周柱下史朝隱終身無患是爲上也且韞櫝以待價踵顔氏以行止論語子貢曰有美玉於斯韞櫝而藏諸求善價而沽諸子曰我待價者也又子謂顔淵曰用之則行舍之則藏唯我與爾有是夫曽不慊夫晉楚敢告誠於知己孟子曽子曰晉楚之富不可及也彼以其爵我以吾義何慊也猶羡也音苦蕈切册府元龜卷七百六十九
