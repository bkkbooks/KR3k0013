body:
  text: 册府元龜卷七百八十四宋王欽若等撰總録部夀考洪範五福其一曰夀詩人之述黄耉易象之紀大耋皆其事也盖夫民禀天地之中以生其札瘥夭閼中道而殞者不可勝數矣乃有鮐背齯齒皤皤華皓而筋力靡耗精爽不衰以至飾巾待期啓手無恨此乃康寜終命盡其天年者歟傳之所載八十九十曰耄百年曰期頥人之享年及於耄期誠足貴矣三代而下悉用論次其有百嵗以上至數百嵗者豈特禀異氣哉周太公望吕尚者為太師佐武王平商而王天下封於營邱盖太公之卒百有餘年衞武公年九十五警於國人曰茍在朝者無謂我老而舍我也必恭恪於朝夕以警我聞一言志誦納之以訓道敏邱人齊人也桓公見之曰叟言年幾何對曰臣年八十三公曰美哉夀也老子周守藏室之吏也百有六十餘嵗或言二百餘歳以其修道而養夀也榮啓期年老白首衣弊服皷琴樂孔子問曰先生年老而窮何樂也啓期曰吾有三樂天生萬物以人為貴吾得為人一樂也人生以男為貴吾得為男二樂也人生命有傷夭吾年九十餘是三樂也貧者士之常死者人之終居常以守終何不樂乎唐祖魏人也年九十餘㑹齊楚約攻魏祖謂魏主曰老臣請西説秦令兵出可曰敬諾遂約車遣之見秦遽發兵救之漢東園公甪里先生綺里季夏黄公四人年皆八十有餘鬚睂皓白衣冠甚偉惠帝為太子卑辭安車因使辯士固請來以為客班壹避地於樓煩當孝惠高后時以財雄邉年百餘嵗以夀終伏生者伏生名勝濟南人故秦博士也孝文欲求能治尚書者天下無有聞伏生能治召之是時伏生年九十老不能行乃詔太常掌故鼂錯往受之張蒼為丞相免後口中無齒食乳女子為乳母妻妾以百數嘗孕者不復幸年百餘嵗迺卒馮唐文帝時為車騎都尉景帝立以唐為楚相武帝即位求賢良舉唐唐時年九十餘不能為官迺以子遂為郎申公楚人武帝遣使迎之至問治亂之事時年八十餘轅固生武帝時以賢良徵固已九十餘公孫宏武帝時為丞相御史大夫年八十終丞相位劉辟彊為光禄大夫守長樂衞尉時已八十矣蘇武為典屬國年八十餘神爵二年病卒趙充國為後將軍甘露二年薨年八十六夏侯勝為太子太傅年九十卒官韋賢為丞相致仕八十二薨孫賞為大司馬車騎將軍亦年八十餘以夀終嚴君平蜀人卜筮於成都年九十餘遂以其業終蜀人愛敬之貢禹為光禄大夫上書曰犬馬之齒八十一乞骸及身出居鄉里死無恨矣後漢樊重湖陽人貲至巨萬縣中推為三老年八十餘終郭伋為大中大夫卒時年八十六嚴光建武十七年復特徵不至年八十終於家郭丹為司徒坐考隴西太守鄧融事無所據策免卒於家年八十七伏恭為司徒乞骸骨年九十第五倫為司徒上䟽乞身卒年八十餘馮魴為執金吾建初三年以老病乞身帝許之其冬為五更詔魴朝賀就列侯位元和二年卒時年八十六禮天子父事老兄事五更魯恭為司徒以老病策免卒年八十一郭躬習小杜律為郡法曹掾用法平年九十五卒袁湯為太尉以災異策免卒年八十六薛包為侍中稱疾賜告歸年八十餘以夀終王堂為汝南太守免歸家年八十六卒李充為左中郎將年八十以為國三老安帝時嘗進見賜以几杖卒於家樓望少習嚴氏春秋為左中郎將年八十永元十二年卒於官蔡順以至孝稱舉孝亷不能逺離墳墓遂不就年八十終于家楊統位至光禄大夫年九十卒楊厚為侍中病免歸年八十二卒於家胡廣為太傅録尚書事時年已八十而心力克壯盛宏之荆州記曰菊水出穰縣芳菊被涯水極甘香谷中皆飲此水上夀百二十七八十者猶以為夭太尉胡廣所患風疾休沐南歸嘗飲此水後疾遂瘳年八十二薨也冷壽光年可百五十六歳行容成公御婦人法容成公能修補導之事取精於元牝其要谷神不死守生養氣者也髮白復黒齒落復生御婦人之術謂握固不㵼還精補脛也嘗屈頸鷮息鷮音居妖反詩曰有集惟鷮注曰鷮雉也山海經曰女几之山多白鷮郭璞曰似雉長尾白鬚髮盡白而色理如三四十時老死於江陵計子勲者不知何郡縣人皆謂數百歳唐虞魯女生者皆與華佗同時唐虞道赤睂張歩家居里落若與相及死於鄉里不其縣魯女生數説顯宗時事甚明了議者疑其時人也董卓亂後莫知所在折像廣漢人能通京氏易好黄老卒年八十四李邰為太尉策免年八十餘卒於家廖扶汝南人州郡公府辟召皆不就號北郭先生年八十終于家王真上黨人年且百歳視之靣有光澤似未五十者李尤少以文章顯為樂安相年八十三卒法真前後四徵終不降居友人郭正稱之曰可謂百世之師者矣乃共刋石頌之號曰元德先生年八十九中平五年以壽終檀敷補䝉令以郡守非其人棄家去年八十卒於家董扶學圖䜟為蜀郡屬國都尉去官還家年八十二張儉建安初徵為衛尉不得已而起儉見曹氏逆德已萌乃闔門懸車不豫政事歲餘卒於許下年八十四華佐一名旉舉孝亷辟大尉府皆不就曉養性之術年且百歳而猶有壯容時人以為仙甘始東郭延年封君達三人皆方士夀皆百餘歳及二百歳陳寔為太邱令中平四年年八十四卒于家楊彪為司徒免年八十四黄初六年薨趙岐為太常年九十餘建安六年卒先自為夀藏夀藏謂塚壙也稱夀者取其久逺之意也猶如夀宫夀器之類冡在今荆州古郢州城中也圗季札子産晏嬰叔向四像居賔位又自畵其像居主位為賛頌吳祐為河間相因自免歸家不復仕躬灌園蔬以經書教授年九十八卒張皓為司空年八十三卒魏田豫為衞尉稱疾乞遜位拜太中大夫食卿禄年八十二薨管寜累徵不至正始二年卒年八十四胡昭居陸渾山中嘉平二年公車特徴會卒年八十九拜子纂郎中焦先字孝然隠者也亡時年八十九矣一曰可百餘歳乃卒扈累字伯重京兆人初平中山東人有青牛先生者字正方客三輔年似五六十者人或親識之謂其已百餘歲矣累隨正方游學嘉平中年九十病亡張臶養志不仕學兼内外正始元年戴鵀之鳥巢臶門隂臶告門人曰夫戴鵀陽鳥而巢門隂此凶祥也乃援琴歌詠作詩二篇旬日而卒時年一百五歳蜀孟光為大司農嘗直言無所迴避為代所嫌後坐事免官年九十餘卒來敏以語言不節前後數貶削後主以敏為執愼將軍欲令以官重自警戒也年九十七景曜中卒杜瓊字伯瑜少受學於仕安精究安術後為太常年八十呉士燮為交趾太守在郡四十餘歲黄武五年年九十卒吕岱為大司馬九十六卒子凱嗣遺令殯以素棺䟽巾布褠葬送之制務從約儉凱皆奉行之晉太宰安平王孚泰始八年薨時年九十三王祥字休徵為太保疾篤著遺令訓子孫曰夫生之有死自然之理吾年八十有五啓手何恨劉寔為司空薨時年九十一鄭袤拜司空固辭以疾就第薨年八十五石鑒元康初為太尉年八十餘克壯慷慨自遇若少年時人美之顔含為光禄勲致仕二十餘年年九十三卒何琦養志衡門不交人事前後徵辟皆不就年八十二卒許孜元康中郡察孝亷不起巾褐終身年八十餘卒于家黄泓魏郡人為慕容暐太史靈臺諸署統暐敗以老歸家善天文祕術年九十七卒崔遊為氏池長以病免就家拜郎中卒年九十三續咸貞素好學為并州從事中郎没于石勒年九十七死于石季龍之世鮑靚為南海太守嘗見仙人隂君授道訣百餘歲卒戴作呉末為臺吏後託病不仕有神術年八十餘所占驗者不可勝紀陳訓厯陽人為諫議大夫去職還鄉善占候年八十餘卒丁潭為光禄大夫卒年八十譙秀巴西人遭蕭敬叛亂避難宕渠川中鄉人宗族馮依者以百數秀年八十衆人以其篤老欲代之負擔秀拒曰各有老弱當先營救吾氣力自足堪此不以垂朽之年累諸君也後十餘年卒於家年九十餘范粲陳留外黄人為太宰中郎後稱疾不出不言三十四年卒年八十四郭荷雒陽人明究群籍特善史書張祚徵為太子友上䟽乞還年八十四卒公孫永襄平人隠平郭南山年餘九十操尚不虧單道開好山居後入羅浮山獨處茅茨蕭然物外年百餘歲卒于山舍宋纎不應辟命張祚徵為太子友遷太傅不食而卒年八十二後秦姚興時西胡梁國兒為鎮北將軍封平輿男年八十餘卒宋傳隆為太常博學多通特精三禮卒年八十三營浦侯遵考髙祖族弟元徽初卒年八十二顧琛元徽中為員外常侍中散大夫卒年八十六劉鎭之閒居京口未嘗應召後以左光禄大夫徵不就元嘉二年年九十餘卒于家王元謨為南豫州刺史加都督性嚴刻少恩薨年八十一裴松之字世期為國子博士致仕卒年八十南齊徐伯珍隠居九嵓山家甚貧窶兄弟四人皆白首相對時人呼為四皓建武四年卒年八十四王琨為侍中卒年八十四沈鱗士字雲禎吳興武康人隠居不仕卒年八十六梁袁昻為司空侍中薨年八十賀瑒為歩兵校尉領五經博士天監九年遇疾卒于館時九十孫謙為零陵太守天監九年以年徵為光禄大夫既至高祖嘉其清潔甚禮異焉每朝見猶請劇自効高祖笑曰朕當使卿智不使卿力十四年詔曰光禄大夫孫謙清愼有聞白首不怠髙年舊齒宜加優秩可給親信二十人并給杖謙年逾九十强壯如五十者每朝㑹輙先衆到公門十五年卒于官時年九十二髙祖為舉哀甚悼惜之顧思逺鍾離人新渝侯映為北徐州刺史徵還思逺挺义行部伍中映見甚老使人問對曰年一百一十二歲凡七娶有子十二死亡畧盡今唯小者年已六十又無孫息家闕養乏是以行役映大異之召賜之食食兼於人簡其頭有肉角長寸許遂命後車載還都謁見天子與之言往事多異所傳擢為散騎侍郎賜以俸宅朝夕進見年一百三十卒又普通中北侵攻穣城城内有人年二百四十歳不復能食榖唯飲曾孫婦乳聞文帝命勞之賜以束帛荆州上津鄉人張元始年一百一十六歲膂力過人進食不異至年九十七方生兒兒遂無影將亡與人告别乃至山林樹木處處履行少日而終時人以為知命湘東王愛竒重異留其枕後魏元法僧為太尉始安王薨年八十三裴安祖河東聞喜人州辟主簿年八十三卒于家長孫嵩太武時為太尉北平王薨年八十長孫道生太武帝時為司空上黨王薨年八十二嚴稜太武帝時為中山太守有亷清之稱年九十卒于家冦讃為南雍州刺史讃在州十七年甚獲公私之譽年老表求致仕真君九年卒年八十六王憲為并州刺史及遷京師以憲元老特賜錦綉布帛錦綵珎羞禮膳獻文帝天安初卒年八十九李崇獻文帝時為北幽州刺史卒年八十一刁雍晉人為特進征南大將軍太和八年卒年九十五髙允太和三年為鎮南大將軍領中書監髙祖詔允議定律令雖年漸期頥而志識無損猶心存舊職捜考史書談説舊事了無所遺十一年卒年九十八尉元太和十三年為司徒以年老致仕十七年七月元疾篤髙祖親幸省疾八月元薨時年八十一羅結代人為侍中年一百七歲精爽不衰後詔聽歸老賜太東川以為居業并為築城即號曰羅侯城年一百二十歲卒梁祚為散令清貧守素不交勢貴年八十七太和十二年卒王琚閹人也髙祖時累遷散騎常侍養老於家常飲牛乳如處子太和二十年卒時年九十游明根髙祖時為五更太和二十三年卒於家年八十二爾朱代勤髙祖末假寕南將軍除泗州刺史卒年九十一新興公丕仕厯六世埀七十年位極公輔景明四年薨年八十二傅永為平東將軍光禄大夫熈平元年卒年八十三北齊侯莫陳相為太傅汾州刺史武平中薨於州年八十三斛律金為太師咸陽郡王天統三年薨年八十後周冦雋為驃騎將軍保定三年卒時年八十三髙祖嘆惜之熊安生字植之武帝宣政元年徵拜露門學博士下大夫其時年已八十餘尋致仕卒於家樂遜為東揚州刺史卒年八十二張羨為司城中大夫卒年八十四姚僧坦為太醫下大夫至隋開皇三年卒時年八十五隋沈重吳興武康人仕梁為太常卿後周大象二年來朝京師開皇三年卒年八十四裴政開皇中為襄州總管卒官年八十九楊慶字伯悦開皇中為儀同三司年八十九終於家庾季才為太史中大夫藝術精通後免職以半禄歸第所有祥異使人就家訪焉仁夀三年卒年八十八公孫景茂大業初為淄州刺史卒官年八十七桞儉大業末以上大將軍卒於家時年八十九敬肅字宏儉大業末以前潁川郡丞終於家時年八十唐裴矩貞觀初為民部尚書年八十而精爽不衰歐陽詢貞觀初厯太子率更令加銀青光禄大夫宏文館學士封渤海縣男年八十餘卒虞世南字伯施為祕書監後表請致仕優制許之仍授銀青光禄大夫宏文館學士禄尋卒年八十一褚亮為員外散騎常侍宏文館學士後致仕卒年八十八邱和為特進貞觀十一年卒年八十六傅奕貞觀中為太史令年八十餘卒於官李百藥貞觀中任宗正卿卒時年八十五張俊裔貞觀中為國子祭酒致仕卒年八十三上為之輟朝三日贈禮部尚書陪葬昭陵謚曰康趙宏智髙祖朝為國子祭酒崇賢館學士卒時年八十三張道鴻少逰名山得服食之術後居人間每餌金丹時年一百四十六歳甄權精曉藥術為天下之最初仕隋為祕書省正字後稱疾免貞觀十七年權年一百三歳太宗幸其家視其飲食訪以藥性因授朝散大夫孫思邈京兆華原人也自云開皇辛酉歳生至今年九十三矣詢之鄉里咸云數百歲人話齊周間事厯厯如眼見以此參之不啻數百歲人矣永淳元年卒李客師衞國公靖之弟為冠軍大將軍總章二年卒時年九十許敬宗髙宗朝為中書令又册拜太子少師久之抗表乞骸骨詔聽致仕加特進俸禄如舊及薨年八十一丘行恭為右武侯大將軍請致仕拜光禄大夫卒年八十賈敦實為懐州刺史永淳初以年老致仕及病篤子孫迎醫視之敦實曰未聞良醫能治也不肯服藥垂拱四年卒時年九十餘髙智周永淳中為左散騎常侍卒年八十二劉仁軌光宅初為文昌左相同鳯閣鸞臺三品卒年八十四王及善為内史聖厯二年拜文昌左相旬日薨年八十二唐休璟景雲中為朔方道行軍總管卒時年八十六蘓珦為太子賔客檢校詹事以年老致仕卒年八十一葉法善世為道士法善少傳符籙自高宗則天中宗睿宗殆五十年數詔入禁中法善生隋大業之丙子死於開元之庚子凡一百七歲嚴善思為左散騎常侍年八十五卒善思父延為徐州長史子向為太常員外卿皆年八十五卒向兄宙為趙郡司馬長向十歳向卒時宙並無恙張果不知何許人也時人傳其有長生祕術自云數百歲矣王友貞懐州河内人也為太子中舍人員外制置元宗在東宫表請禮徵之以年老竟辭疾不起年九十餘卒王希夷徐州滕人也孤貧好道常餌松栢葉及雜花㪚元宗東廵勅州縣以禮徵召至駕前時年已九十六令中書令張説訪以道義宦官扶入宫中與語甚悦授國子博士聽致仕尋夀終李元愷博學善天文口未嘗言之年八十餘夀終王知逺為道士年一百十六歲潘師正為道士師事王知逺永淳元年卒年九十八司馬承禎字子㣲河内温人為道士事潘師正傳其符籙及辟穀導引服餌之道卒于王屋山時年八十九信安郡王禕天寳二年十月薨年八十餘元宗聞而痛惜之孫逖父嘉之進士擢第又以書判㧞萃授蜀州新津縣主簿厯曲周襄邑二縣令以宋州司馬致仕卒時年八十二賀知章開元中為祕書監歸㑹稽夀終年八十六裴道慶為右僕射年九十餘終於位王縉為平章時元載用事縉卑附之元載得罪連坐貶處州刺史德宗登極徵為太子賔客東郡留守卒時年八十三邱為為散騎常侍致仕年八十餘而繼母尚無恙于邵貞元中終於江州别駕年八十一郭子儀為尚父太傅中書令建中二年薨年八十五蕭昕為太子少傅兼禮部尚書致仕貞元七年卒年九十一韋倫貞元中為太子少師致仕卒時年八十三嗣滕王湛然貞元中卒年八十四歸崇敬貞元中為兵部尚書致仕卒時年八十八張萬福貞元二十一年以左散騎常侍致仕元和元年卒年九十萬福自始從軍至卒禄食七十餘年未嘗一日病趙宗儒為太子太傅拜䟽請老詔以司空致仕卒年八十七趙昌元和六年自工部尚書為華州刺史候辭於麟德殿時年八十餘趨拜輕㨗占對詳明憲宗退而嘆異宣命宰臣宻訪其頥養之道以奏焉閻濟美為祕書監以年邁懸車上表陳乞授工部尚書致仕寳厯元年殁于家年近九十裴向以吏部尚書致仕享年八十贈太子少保張正甫以吏部尚書致仕卒年八十三柳公度善攝生年八十餘歩履輕便位至光禄少卿柳公權為太子少師卒年八十八王起為山南東道節度使在鎮二年以老疾求代不許卒於鎮時年八十八後唐錢鏐為尚書令吳越國王薨時年八十一馬縞長興四年為户部侍郎縞時年已八十及為國子祭酒八十餘矣形氣不衰許寂授工部尚書致仕卜居于雒時寂已年髙精彩猶健沖淡寡言時獨語竒怪可怪人莫知其際卒時年八十餘晉盧損為祕書監拜章辭位乃授戸部尚書致仕退居潁川時李鏻年將八十善服氣導引損以鏻之遐夀有道術酷慕之仍以潁川逼城市乃卜居陽翟立隠舍誅茅種藥山衣野服逍遥於隠几之間出則柴車鴻􅌁自稱具茨山人晩年與同遊五六人於大隗山中古宮觀址䟽泉鑿坯為隠所誓不復出山氣多寒被病而卒時年八十餘齒髪不衰而有壯容周宏知濬父延緘左武衞大將軍致仕年九十餘卒李建崇厯河陽邢州兵馬留後漢初入為右衞大將軍年逾七十神氣不衰建崇始自代北事後唐武皇至是四十餘年前後所掌兵麾下部曲多至節鉞零落殆盡唯建崇雖位不及藩屏而康强自適以至期耄太祖即位授左監門衞上將軍廣順三年春卒贈黔南節度使晉蕭愿為太子賔客愿唐宰相倣之曾孫也倣入相接賔之次愿為兒童之戯倣謂客曰予豈敢得位而喜所幸奕世夀考吾今又有曾孫在目前矣愿年七十餘其母猶在一門夀考人罕及者楊凝式為太子少師分司於雒廣順中表求致政尋以右僕射得請顯德初改左僕射又改太子太保並懸車以疾薨于第年八十五册府元龜卷七百八十四
