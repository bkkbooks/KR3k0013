body:
  text: 冊府元龜卷六百六十四宋王欽若等撰奉使部失指辱命挫辱專恣受賂失指夫荷皇華之任通二國之好而乏其専對之能失彼綏逺之指或吐詞過佞致終身而見踈或撫邊不恭召羣羌之抵冐請救兵而發其忿覆民災而言無損罔宣朝命不沃主心繇是自掇悔尤多從遣謫信史是載所以顯其顓蒙後生覽之猶或為之媿赧者矣魯隱公五年鄭伐宋入其郛宋人使來告命公聞其入郛也將救之問於使者曰師何及對曰未及國忿公知而故問責窮辭公怒乃止辭使者曰君命寡人同恤社稷之難今問諸使者曰師未及國非寡人之所敢知也漢公孫𢎞武帝時為博士使匃奴還報不合意奏事不合天子之意帝怒以為不能𢎞乃托病免歸義渠安國宣帝時為光禄大夫使行諸羌行音于更切先零豪言願時度湟水北零一音憐豪帥長也湟水出金城臨羌塞外東入河湟水之北是漢地湟音皇逐民所不田處畜牧安國以聞趙充國劾安國奉使不敬是後羌人旁縁前言抵冐度湟水旁依也抵冐犯突而前旁音歩浪切冐莫比切郡縣不能禁吳張温大帝時以輔義中郎將使於蜀既至詣闕拜章曰昔髙宗以諒闇昌殷祚於再興成王以㓜冲隆周徳於太平功冐溥天聲貫罔極今陛下以聰眀之姿等契往古總百揆於良佐參列精之炳燿遐邇望風莫不欣頼吳國勤任膂力清澄江滸願與有道平一宇内委心叶規有如河水軍事興煩使役乏少是以忍鄙倍之羞使下臣温通致情好陛下敦崇禮義未便恥忽臣自入逺境及即近郊頻蒙勞來㤙詔輙加以榮自懼悚怛若驚謹奉所齎函書一封蜀甚貴其才而大帝隂衘温稱羡蜀政後終斥之南齊茹法亮武帝時為竟陵王司徒中兵叅軍巴東王子響於荆州殺僚佐帝遣軍西上使法亮宣㫖慰勞安撫子響法亮至江津子響呼法亮法亮疑畏不肯往又求見傳詔法亮又不遣故子響怒遣兵破尹略軍事平法亮至江陵刑賞處分皆稱勑斷決軍還帝悔誅子響法亮被責唐髙表仁太宗時為新州刺史貞觀十一年十一月倭國使至太宗矜其路逺遣表仁持節撫之浮海數月方至表仁無綏逺之才與其王爭禮不宣朝命而還繇是復絶元彦冲𤣥宗時為陳留郡太守充河南道處置採訪使天寳十二載坐失移官詔曰元彦冲頃以宿名俾為連率澄清之内淑慝未分廵略之中紀綱不振至於洪河所歴湍悍是嘗毎軫朕懐恐為人患况先有處分早令隄防如聞脩塞之間責成官吏決溢之後致損黎甿曽不存撫便來朝計及别差廵問遽請旋歸字牧之方有損成寄去就之外未為得所豈可尚居雄鎮仍在輶軒宜從薄懲俾申後效可使持節南陽郡太守趙計代宗大厯末為御史㑹京畿水旱京兆尹黎幹奏損田户部侍郎判度支韓滉執奏幹不實乃命廵復時渭南縣令劉澡曲附度支且干善名以縣界田並無損白於府及户部分廵計不欲忤度支奏報協澡帝覽奏以為水旱咸均不宜渭南獨免申命侍御史朱敖再覆命渭南損田三千餘頃帝歎息久之大怒澡因謂敖曰縣令職在字人不損猶宜稱損損而不問豈存恤隱之意耶卿之此行可謂稱職下有司訊覆澡及計並伏罪乃貶澡為萬州南浦縣員外尉計為澧州員外司户叅軍成抗敬宗寳厯初為右庶子兼御史中丞充入吐蕃答賀正使而抗獻章請事漏署其名帝以其誠敬有乖恐不能將命故以光録卿李銑代焉抗貶饒州長史羅讓寳厯中為吏部郎中充滄州宣慰使是時李全略既死其子同㨗竊主兵事弔贈使迴朝廷又命讓等宣慰蓋欲示以威信兾其革心而讓與判官樂坤等至滄州莫能措一言授其書詔而歸殊失奉使之㫖李從簡文宗開成初為左金吾衛將軍兼御史中丞將命北庭不能専對貶復州刺史辱命傳曰使於四方不辱君命可謂士矣夫達一國之政繫一介之使或奉執圭之信或專持斧之威周旋揖讓之間觀聼㡬宜之際而乃辯對失禮稽違過期是為辱命不克奉公孔子曰誦詩三百不能專對亦奚以多為也仍叔為周大夫桓王使仍叔之子聘於魯仍叔之子弱也仍叔之子來聘童子將命無速反之心久留在魯華耦為宋大夫聘於魯文公與之宴辭曰君之先臣督得罪於宋殤公名在諸侯之䇿臣承其祀其敢辱君華耦督曽孫也督弑殤公在桓二年耦自以罪人子孫故不敢屈辱魯君對共宴㑹請承命於亞旅亞旅上大夫也魯人以為敏無故揚其先祖之罪是不敏魯人以為敏眀君子所不與也王叔為周卿士靈王使王叔陳叔愬戎於晉戎陵虣周室故告愬盟主晉人執之士魴如京師言王叔之貳於戎也王叔反有二心於戎失奉使之義故晉執之孫文子衛大夫聘於魯公登亦登禮登階臣後君一等叔孫穆子相趨進曰諸侯之㑹寡君未嘗後衛君體敵並登今吾子不後寡君寡君未知所過吾子其少安安徐也孫子無辭亦無悛容漢王翁孺武帝時為繡衣御史逐捕魏郡羣盗堅盧等黨與及吏畏懦逗遛當坐者翁孺皆縱不誅它郡御史暴勝之等奏殺二千石誅千石以下二千石者奏而殺之其一千石以下則得誅及通行飯食坐連及者大部至斬萬餘人翁孺以奉使不稱免車千秋為髙寢令上書訟戾太子寃立拜大鴻臚數月為丞相後漢使者至匃奴使者史不書姓名單于問曰聞漢新拜丞相何用得之言此人何以得為相也使者曰以上書言事故單于曰如是漢置丞相非用賢也妄一男子上書即得之矣使者還道單于語武帝以為辱命欲下之吏良久迺貰之魏邢貞史不書官文帝黃初二年使吳拜孫權為吳王貞入門不下車軍師張昭謂貞曰夫禮無不敬故法無不行而君敢自尊大豈以江南寡弱無方寸之刄故邢貞即遽下車後魏元孚為北道行臺孚持白虎幡勞阿那環於柔𤣥懐荒二鎮間阿那環衆號三十萬隂有異意遂拘留孚載以韞車日給酪一升肉一叚毎集其衆坐孚東廂稱為行臺甚加禮敬環遂南過至舊京後遣孚等還因上表謝罪有司以孚事下廷尉丞髙謙之云孚辱命處孚流罪盧度世為散騎侍郎使於宋宋孝武遣其侍中柳元景與度世接對度世應對失理還被禁劾經年乃釋東魏鄭伯猷為光禄大夫孝静元象初以本官兼散騎常侍使梁前後使人梁武令其侯王於馬射之日宴對申禮伯猷之行梁武令其領軍將軍臧盾與之相接議者以此貶之北齊魏收為通直散騎常侍副王昕聘梁收在舘遂買奴婢入舘其部下有買婢者收亦喚取遍行姦穢梁朝舘司皆為之獲罪人稱其才而鄙其行後唐李彦珣眀宗天成初為通事舍人常遣使東川至其境從人為董璋所收彦珣竄還以失敬故也烏昭遇為供奉官天成初使於両浙毎以朝廷事私於吳人仍目錢鏐為殿下自稱臣謁鏐行舞蹈之禮及使迴副韓玫具述其事李仁矩為客省使左衛大將軍天成中奉使東川張宴以召之仁矩貪於舘舍與娼妓酣飲日既中而不至大為璋所詬焉自是深銜之蘇繼顔為閤門副使長興四年六月繼顔自夏州使迴朝見初令繼顔入夏州宣諭與夏州押衙賈師温同行繼顔請繇蘆闗路入樞宻使謂之曰尚平闗路平北無蕃部結集蘆闗路險蕃部阻兵為患况與夏州牙將同行不如繇尚平闗為便繼顔堅請繇蘆闗及至蘆闗果為蕃部阻路繼顔遂以勅書手詔授賈師温令入夏州自於延州候師温而還既朝見眀宗怒其不親至夏州謂左右曰頃年楊彦温據河中令供奉官往宣諭不入河中顧望而還尋笞背長流蘇繼顔如何處斷延光等皆不對漢郭允眀為翰林祭酒使隠帝乾祐元年命允眀宣賜荆南髙保融旌節官誥允眀出自羣小舉動驕縱奉命之行令本司官健荷御酒數十甖至渚宫毎保融宴席之際惟厲聲索御酒自飲嘗出郭遣人歩量壕塹之深淺城壘之髙下以動保融多希贈遺張誼為中書舍人乾祐元年與兵部郎中馬承翰俱衘命於兩浙覩其驕僣之失形於譏誚兼乗醉有輕肆之言錢俶恥之摭其過以奏之朝廷以方務懐柔責授誼房州司户承翰慶州司户周李損為諫議大夫太祖廣順三年正月命使兩浙損受命之後過備行李務極華楚在朝親識及前任侯伯皆詣之強有假貸衆惮其利口兇率僶俛應副或有告王峻者峻召損深責之損拜謝而去又陳啟事願改前過仍有詛誓之語峻稍解然損亦如故有賣玉帶者邀價千緍應聲取之約以使迴償價遂帶之即路所經州府無不強貸遣人齎書青州借錢千緍属符彦卿移鎮天平遇之於路獻詩逰說懇求借貸彦卿辭以移任干祈不已終借三百緍及至青州又於知州張凝借貸及在郵驛行止穢雜張凝具事以聞太祖謂王峻曰李損所為如此爭堪更至海外峻乃請行貶逐尋改太府少卿李玼為兩浙弔祭使以代李損主客郎中盧振為两浙起復副使金彦英本東夷人為尚輦奉御奉使髙麗稱臣於夷王恭帝顯徳六年決杖一百配流商州挫辱古者兵交使在其間蓋所以尚禮義而重誠眀也䧏自周季忠信陵遲以侯衛而執王人以蠻夷而辱漢使暨南北分峙好問交通或仇怨之未平則禮遇之多闕茍執節靡屈蹈義不迴雖罹厥艱蓋非其恥若乃臨難而變矢謀不臧自貽其憂又誰咎也周㳺孫伯為大夫襄王十三年鄭人伐滑王使㳺孫伯詣滑鄭人執之漢郭吉史不書官武帝元封元年廵邊使吉風告單于曰能戰自將兵待邊不能亟南靣而臣單于大怒立斬主客而留吉不歸遷辱之北海上而單于終不肯為宼於漢邊蘇武為栘中廐監天漢元年武帝遣武以中郎將使持節使匃奴單于使衛律廹武䧏武終不可脅單于愈益欲䧏之迺幽武置大窖中絶不飲食天雨雪武齧雪與㫋毛并咽之數日不死匃奴以為神乃徙武北海上無人處使牧羝羝乳乃得歸其别官属常恵等各置他所趙徳為軍侯元帝時使罽賔與隂末赴相失失意也隂末赴鎻琅當徳琅當長鎻也若今之禁繫人鎻矣殺副已下數十餘人遣使者上書謝帝以絶域不録放其使者於縣度絶而不通張正為大中大夫成帝時夜郎王興相攻漢遣正和解興等不從命刻木象漢吏道旁謝之後漢伏隆為大中大夫光武拜隆光禄大夫復使於張歩即拜歩為東萊太守而劉永亦復遣使立歩為齊王歩貪受王爵遂執隆而受永封馬日磾為太尉獻帝時奉使袁術術從日磾借節觀之因奪不還備軍中十餘人使促辟之日磾謂術曰卿先代諸公辟士云何而言促之謂公府掾可刼得乎從術求去而術不遣既以失節屈辱憂恚而死吳張彌為太常大帝嘉和中與許晏使於公孫淵彌晏等具到襄平官属從者四百餘人淵欲圖彌晏先分其人衆置遼東諸郡縣以中使秦旦張羣杜徳黃疆等及吏兵六十人置𤣥莬郡旦等皆舍於民家仰其飲食積四十餘日旦等後踰城而走旦得達句驪句驪王遣人送還吳陳王瑜為侍中髙祖永定元年使於北齊以陳郡袁憲為副齊以王琳之故瑜即琳弟執而囚之文宣毎行載死囚以從齊人呼曰供御囚毎有他怒則召殺之以快其意瑜及憲並危殆數矣齊僕射楊遵彦憫其無辜毎祐䕶之天嘉二年還朝詔復侍中後魏盧昶為太子中舍兼員外散騎常侍昶與副使王清石等使南齊既至彼值眀帝即位於是孝文南討昶兄淵為别道將而齊以朝廷加兵遂酷遇昶等昶等本非骨梗聞南人云兄既作將弟為使者乃大恐怖淚汗交橫齊以腐米臭魚莝豆供之唐歐陽裔封南海公髙祖武徳九年三月突厥宼靈州裔為行人率行徒五十人將掩可汗牙帳謀泄為虜所拘崔漢衡為兵部尚書徳宗貞元三年閏五月充吐蕃㑹盟副使為吐蕃所執漢衡乃夷言謂執者曰我漢使崔尚書也結贊與我善汝若殺我結贊亦殺汝乃捨之盡驅而西行既已面縳各以一木自領至於身以毛繩三束之又以繩連其髪而牽之夜皆踣之於地以髪繩各繫於一橛又以毛罽都覆之守衛者卧其上以防其亡逸也至故原州結贊坐於帳中召與相見數讓國家因怒渾瑊曰武功之難皆我之力許以經州靈州相報竟食其言負我矣舉國所怨本刼是盟在擒瑊也吾遣人以金銀飾桎梧待瑊將獻於贊普既已失之虚致君等耳當遣君輩一二人歸報家族也吕温帶瘡亦至結贊嘉其義厚給賚之結贊率其衆屯於石門遣中官俱文珎渾瑊之將馬寕馬燧之將馬弇歸燧送漢衡鄭叔矩等囚於河州宰榮扶余准等或囚於故廓州故鄯州分囚之漢衡與同䧟者並至河州結贊令召之與孟日華中官劉延邕俱至石門而遣五騎送至境上且齎表請進及潘原李觀使止之有詔不許更納蕃使受其表而反其人晉盧損為左散騎常侍髙祖天福三年使於閩國王昶昶不郊迎不接見但遣其子繼恭陳主禮而已專恣周美行人漢稱使者皆慎選於王僚斯不辱於君命若乃通聘結好則保其歡心省風察俗則蘇其民瘼按姦糾慝則去其人患雖有專命之心亦符茍利之訓其或軌度靡遵威福自肆奮其胸臆忽彼簡書弊移於人罪盈於已以之掇咎又何逃焉以之圖全非所及爾漢張翁為車騎將軍長史昭帝時烏孫狂王復尚楚主解憂生一男鴟靡不與主和又暴惡失衆漢使衛司馬魏和意副侯任昌送侍子公主言狂王為烏孫所患苦易誅也遂謀置酒㑹罷使士拔劍擊之劍旁下不正下狂王傷上馬馳去其子細沉痩痩音捜㑹兵圍和意昌及公主於赤谷城數月都䕶鄭吉發諸國兵救之乃解去遣翁留驗公主與使者謀殺狂王狀主不伏叩頭謝翁捽主頭罵詈主上書翁還坐死韓昌為車騎都尉元帝時與光禄大夫張猛使匃奴呼韓邪單于昌猛見單于民衆益盛塞下禽獸盡單于足以自衛不畏郅支聞其大臣多勸單于北歸者塞下無禽則射獵無所得又不畏郅支故欲北歸舊處恐北去後難約束不可更共為言要昌猛即與為盟約曰自今以來漢與匃奴合為一家世世毋得相詐相攻有竊盗者相報行其誅償其物漢人為盜於匃奴匃奴人為盗於漢皆相告報而誅償有㓂發兵相助漢與匃奴敢先背約者受天不祥令其世世子孫盡如盟昌猛與單于及大臣俱登匃奴諾水東山諾水即今突厥地諾真水也刑白馬單于以徑路刀金留犁撓酒徑路匃奴寳刀也金契金留犁飯匕撓和也契金著酒中撓攪飲之契刻攪也音呼髙反以老上單于所破月氐王頭為飲器者共飲血盟昌猛還奏事公卿議者以為單于保塞為藩雖欲北去猶不能為厄害昌猛擅以漢國世世子孫與夷狄詛盟令單于得以惡言上告於天羞國家傷威重羞辱也不可行宜遣使往告祠天與解盟昌猛奉使無狀罪至不道不狀蓋無善狀帝薄其過以其罪過為之薄有詔昌猛以贖論勿解盟夏侯藩為中郎將與副校尉韓容使匃奴時帝舅大司馬驃騎將軍王根領尚書事或說根曰匃奴有斗入漢地直張掖郡斗絶也直當也生竒材木箭竿就羽就大鵰也黃頭赤目其羽可為箭竿音工旱反如得之於邊甚饒國家有廣地之實將軍顯功垂於無窮根為上言其利帝直欲從單于求之直猶正爾為有不得傷命損威詔命不行故云傷命也根即但以帝指曉藩令從藩所說而求之自以蕃意說單于求之藩至匃奴以語次說單于曰竊見匃奴斗入漢地直張掖郡漢三都尉居塞上士卒數百人寒苦候望久勞單于宜上書獻此地直斷閼之省兩都尉士卒數百人以復天子厚恩復亦報其報必大漢得此地必厚報賞單于單于曰此天子詔語邪將從使者所求也藩曰詔㫖也然藩亦為單于畫善計耳單于曰孝元皇帝哀憐父呼韓邪單于從長城以北匃奴有之此温偶駼王所居地也偶音玉口反駼音塗未曉其形狀所生請遣使問之所生謂之所出草木鳥獸為利藩容歸漢後復使匃奴至則求地單于曰父兄傳五世漢不求此地至知獨求何也已問温偶駼王匃奴西邊諸侯作穹廬及車皆仰此山材木謂諸小王為諸侯者效中國之言耳仰音牛向切且先父地不敢失也藩還遷為太原太守單于遣使上書以藩求地狀聞詔報單于曰藩擅稱詔從單于求地法當死更大赦二更經也音工衡反今徙藩為濟南太守不令當匃奴譙𤣥為中散大夫平帝元始四年選眀逹政事能化風俗者八人時並舉𤣥為繡衣使者持節與太僕任暉等分行天下觀覧風俗所至專行誅賞事未及終而王莽居攝後漢陳龜為五原太守順帝永和中拜使匃奴中郎將時南匃奴左部反亂龜以單于不能制下外順内畔促令自殺坐徵下獄免北齊司馬子如初仕東魏為北道行臺廵簡諸州守令已下委其黜陟子如至定州斬深澤縣令至兾州斬東光縣令皆稽留時漏致之極刑若言有進退少不合意便令武士頓曵白刃臨項士庶惶懼不知所為隋武威為右僕射文帝開皇九年持節廵撫江南得以便宜從事過㑹稽踰五嶺而還江表自晉已來刑法䟽緩代族貴賤不相陵越平陳之後牧人者盡改變之無長㓜悉使誦五敎威加以煩鄙之辭百姓嗟怨使還奏言江表依内州責户籍帝以江表初平召户部尚書張嬰責以政急時江南州縣又訛言欲徙之入闗逺近驚駭饒州吳世華起兵為亂生臠縣令㗖其肉於是舊陳率土皆反執長吏抽其腸而殺之曰更使儂誦五敎耶尋詔内史令楊素討平之王文同為常山郡丞煬帝大業中征遼東令文同廵察河内諸郡文同見沙門齊戒菜食者以為妖妄皆收繫獄北至河間召諸郡官人小有遲違者輙皆覆靣於地而箠殺之有沙門相聚講論及長老共為佛㑹者數百人文同以為聚結惑衆盡斬之又悉祼僧尼驗有淫狀非童男女者數十俱復將殺之郡中士女號哭於路諸郡驚駭各奏其事帝聞而大怒遣使者達奚善意馳勦之斬於河間以謝百姓讐人剖其棺臠其肉而噉之斯湏咸盡唐洪經綸徳宗建中初為黜陟使至東都訪聞魏州田悦食糧兵七萬人經綸素昧時機先以符停其兵四萬令歸農畝悦偽示順命即依符罷之既而大集所罷將士激怒之曰爾等久在軍旅各有父母妻子既為黜陟使所罷如何得衣食自資衆遂大哭悦乃盡出其財帛衣服厚給之各令還其部伍自此人堅叛心繇是罷職栢耆為諫議大夫文宗太和三年充德州行營諸軍計㑹使詔曰頃以徳州未下俾宣朝㫖慰勉勤瘁詢謀事機計日指程候其速達而所至留滯請兵自隨假勢張皇乗險縱恣奏報蔑聞擅入滄州專殺大將捕置逆挍潜送兇渠物議紛然逺近駭聽貶循州司户叅軍判官殿中侍御史沈亞之可䖍州南康縣尉周李玊為賛善大夫世宗將用師於西南用玊為轉運判官行次永興玊為人所說欲襲取歸安鎮鎮在永興之南距永興三百餘里山路險阻不通車馬雖𨽻於永興其實蜀宼之狡穴也玊素輕脫銳意邀功乃先以其事白於永興節度使王彦超彦超素知歸安路險深不之許玊稱奉宻㫖彦超無以阻之玊因移牒永興取本城兵士二百人徑往襲之既入山行數百里前阻隘路蜀㓂奄至軍士多死其逃歸者十無二三遂為其所虜焉受賂夫奉皇華之命乗使者之車不畏簡書罔思亷慎恣彼貪饕之性廣求賂遺之貲而使君命不行臣節靡著至於是也不亦鄙矣詩云貪人敗類其是之謂乎趙使者史失名姓亷頗既奔魏之大梁趙以數困於秦兵趙王思復得亷頗亷頗亦思復用於趙趙王使使者視亷頗尚可用否亷頗之仇郭開多與使者金令毁之趙使者既見亷頗亷頗為之一飯斗米肉十斤被甲上馬以示尚可用趙使還報王曰亷將軍雖老尚善飯然與臣坐頃之三遺矢矣趙王以為老遂不召漢司馬相如為中郎將使蜀其後人有上書言相如使時受金失官居嵗餘復召為郎晉李苾為侍御史恵帝元康中頻大饑百姓流移入漢川既至漢中上書求寄食巴蜀朝廷不許遣苾持節慰勞且監察之不令入劒閣苾至漢中受流人貨賂反為表曰流人千萬餘口非漢中一郡所能振贍東下荆州水湍迅險又無舟船蜀有倉儲又復豐稔宜令就食朝廷從之繇是散在益梁不可禁止宋沈勃為侍中時欲北討使勃還鄉里募人多受貨賄上怒下詔曰沈勃琴書藝業口有美稱而輕躁躭猶多罪愆比奢淫過度妓女數十輩沉酣放縱無復劑限自恃吳興土豪北門義故脅士庶告索無已又輙聼募將委役還西鄉計病叛遂有數百周旋門生競受贓貨少者至萬多者千金考計贓物二百餘萬便宜眀罰勑法以正典刑後魏翟黒子封遼東公有寵於太武奉使并州受布千疋事尋發覺黒子請計於著作郎髙允曰主上問我首為諱乎允曰公帷幄寵臣答詔宜實又入告忠誠罪必無慮中書侍郎崔覽公孫質等咸言首實罪不可測宜諱之黒子以覽等為親已而反怒允曰如君言誘我死何其不直遂與允絶黒子以不實對竟為太武所踈終獲誅戮胡莫寒孝文時為殿中尚書使西部勑勒簡豪富兼丁者為殿中武士而大納財貨衆怒殺莫寒及髙平假鎮將奚陵於是諸部悉勒悉叛閭文祖為中散孝文太和初南安王禎有貪累之響遣文祖詣長安察之文祖受禎金寳之貽為禎隱而不言事發殺之隋虞慶則為尚書右僕射突厥主攝圖將内附髙祖使慶則出使勑之曰我欲存立突厥彼送公馬但取五三匹攝圖見慶則贈馬千匹又以女妻之帝以慶則勲髙皆無所問唐栢耆為諫議大夫文宗太和初滄州李同㨗叛山東連兵日乆耆銜命宣慰大肆生平所欲廣受金帛妓女先是王稷為德州刺史自元和中家稱大富為同㨗之父全略刼之盡取其家金帛為己有及同㨗兵破耆又納稷之女為妓女宣慰使内養馬國亮奏耆於逆賊李同㨗處得人事奴婢大小共九人綾絹一千五百匹奏進止委所在長吏尋勘勒住分析聞奏帝赫怒俱竄殛及此受誅時人莫不稱快梁曹守當為廣州宣慰使迴進馬三匹銀二千两及香藥等合價凡四百餘萬夫王者之命降於侯國彼以賄受此以賄上君子惜之後唐史在德為著作郎末帝清泰中充太子少保致仕朱漢賔弔祭使賻絹數百疋就亳州賜之在德移文本州取木輿百餘擎張皇其事以邀饋遺漢賔之子悉力以奉之冊府元龜卷六百六十四
