body:
  text: 册府元龜卷二百七十四宋王欽若等撰宗室部友愛辨惠畏慎悔過友愛夫因心則友詩所美也教人以悌禮之經也若乃鍾天倫之愛厚同氣之親人無間言家敦輯睦故曰友于兄弟施於有政矧夫肺腑之親本枝之重而能恊比式好敦叙著稱以貴介之英修布衣之行長恵㓜順發於天性字孤撫弱篤於人倫棠棣繇是騰芳葛藟無所興刺也漢陽城侯德爲宗正家産過百萬則以振昆弟振舉救也與賑同楚王紓尤慈篤早失母同廬弟原鄉侯平尚㓜紓親自鞠養常與共卧起飲食及成人未嘗離左右病卒紓哭泣歐血數月亦殁舂陵侯敞謙儉好義盡推父時金寳財産與昆弟荆州刺史上其義行拜廬江都尉南陽郡是荆州所管故刺史上其行義也侯等助祭明堂以例益户二百敞以有行義拜為廬江都尉後漢趙孝王良字次伯光武之叔父也平帝時舉孝亷為蕭令光武兄弟少孤良撫循甚篤北海王睦靖王興子既嗣王爵悉推財産與諸弟雖王車服珍寳非列侯制皆以為分然後隨以金帛贖之濟南王香篤行好經書初叔父篤有罪不得封西平昌侯昱坐法失侯香乃上書分爵土封篤子丸昱子嵩皆為列侯東海王臻性敦厚有恩常分租秩賑給諸父昆弟國相籍褒具以狀聞順帝美之詔曰東海王臻和睦兄弟恤養孤弱至孝純備仁義兼宏朕甚嘉焉今加臻封五千户魏陳王植黄初四年封雍丘王其年朝京師是時待遇諸國法峻任城王彰暴薨諸王既懐友于之痛植及白馬王彪還國欲同路東歸以叙隔闊之思而監國使者不聼晉臨川獻王郁孝武世其兄㑹稽王世子道生初以無禮失㫖郁數勸以敬慎之道道生不納郁為之涕泣簡文帝深器異之宋晋熙王㫤文帝之子孝武孝建三年㫤兄竟陵王誕反伏誅前廢帝即位㫤為征北將軍徐州刺史道經廣陵上表曰竊聞淮南中霣眷求遺緒楚英流殛愛存丘墓並難結兩臣義開二主法雖事斷禮或情申伏見故賊劉誕稱戈犯節自貽逆命膏斧嬰戮在憲已彰但尋屬忝皇枝位叨列辟而一以罪終魂骸莫赦生均宗籍死同匹䜿族窆委雜封樹不修今嵗月逾邁愆流釁徃踐境興懐感事傷目陛下繼明升運咸與維新大徳方臨哀矜未及夫欒布哭市義犯雷霆田叔鉗赭志於夷戮况在天倫何獨無感伏願稽若前凖降申丹志乞薄改楄拊㣲表窀穸則朽骨知榮窮泉識荷臨紙哽慟辭不自宣詔曰征北表如此省之慨然誕及妻女並可以庻人禮葬并置守衛南齊豫章王嶷以弟長沙王晃蓄私仗武帝將糺以法嶷于御前稽首流涕曰晃罪誠不足宥陛下當憶先朝念白象白象晃小字也帝亦垂泣又武陵王曄亦嶷弟也曄數以言語忤武帝武帝幸嶷東田宴諸王獨不召曄嶷曰風景殊美今日甚憶武陵帝乃呼之曄善射屢發命中顧謂四座曰手何如帝神色甚恠嶷曰阿五曄髙帝第五子也常日不爾今可謂仰藉天威帝意乃釋竟陵王子良初送文恵太子𦵏夾石先是豫章王葬金牛山子良臨送望祖硎山悲嘆曰北瞻吾叔前望吾兄死而有知請葬兹地既薨遂葬焉曲江公遥欣子幾字徳𤣥年十嵗能屬文早孤有弟九人並皆穉小幾恩愛篤睦聞於朝野梁始興王憺為荆州刺史同母兄安成康王秀偏孤憺尤篤愛自天監中嘗以所得俸中分與秀秀稱心受之亦不辭多也昆弟之睦當世歸之憺天監十四年為都督荆湘雍寜梁南北秦七州諸軍事鎮右將軍荆州刺史秀將之雍州薨於道憺聞哀自投于地席藁哭泣不飲食者數日傾財産賻送部伍大小皆取足焉天下稱其悌後魏中山王英子熙少有文才而輕躁英深慮非保家主欲廢之而立第四子畧為世子宗議不聼畧又固請乃止臨淮王昌弟孚為冀州刺史後為葛榮所陷為榮所執兄祐為防城都督兄子子禮為錄事參軍榮欲先害子禮孚請先死以贖子禮叩頭流血乃捨之又大集將士議其死事孚兄弟各誣已引過争相為死又州人張孟都潘紹等數百人皆叩頭就法請活使君榮曰此魏之誠臣義士也凢同禁五百人皆得免北齊安德王延宗兄蘭陵王死妃鄭氏以頸珠施佛廣寧王使贖之延宗手書以諫而淚滿紙河間王死延宗哭之淚赤河間王孝琬兄河南王之死諸王在宫内莫敢舉聲唯孝琬大哭而出後周安化公深性仁愛從弟神舉神慶㓜孤深撫訓之義均同氣世以此稱焉隋觀徳王雄周時為䢴國公髙祖受禪封廣平王以䢴公别封一子雄請封弟士貴朝廷許之唐襄邑王神符淮安王通弟也㓜孤事兄以友悌聞韓王元嘉與其弟靈夔甚相友愛兄弟集見如布衣之禮信安郡王禕少有志尚撫繼母所生弟祗等以友愛稱褒信郡王璆許王素節子為宗正卿友弟聰敏宗子中有一善無不薦㧞故宗枝居省闥者多璆之所舉辨惠傳曰生而知之詩云克岐克嶷皆幼惠早成之謂也乃有席天宗之貴出帝者之胄流光慿厚藴靈毓徳肇自童丱逈彰聰悟强記黙識經目而不忘知幾㑹理發言而可述藻翰遒發知畧超邁挺老成之美有先見之明孝心夙著政術懸解嗜好絶俗才辯超世用能馳徽名于宗屏聳偉望於王室隆肺腑之懿增本支之睦者也周王孫滿魯僖公三十三年春秦師過周北門左右免胄而下王城之北門胄兠鍪兵車非大將御者在中故左右下御不下超乗者三百乗王孫滿尚幼觀之言于王曰秦師輕而無禮必敗謂過天子門不卷甲束兵超乗示勇輕則寡謀無禮則脫入險而脫又不能謀能無敗乎後秦師果為晉師敗于殽漢陽城侯徳楚元王交之後有智畧少時數言事召見甘泉宫武帝謂之千里駒言若駿馬可致千里也年齒㓜少故謂之駒魏陳思王植字子建年十嵗餘誦讀詩論及辭賦數十萬言善屬文鄧哀王冲字倉舒少聰察岐嶷生五六嵗智意所及有若成人之智時吳曽致巨象太祖欲知其斤重訪之羣下咸莫能出其理冲曰置象大船之上而刻其水痕所至稱物以載之則較可知矣太祖大悅即施行焉晋扶風武王駿字子臧宣帝子㓜聰慧年五六歳能書疏諷誦經籍見者竒之齊王立駿年八嵗爲散騎常侍侍講焉武陵王澹宣帝孫有罪徙遼東其子禧年五嵗不肯隨去曰要當為父求還無為俱徙陳訴厯年然後得還武陵王遵年十二右將軍桓伊嘗詣遵遵曰門何為通桓氏左右曰伊與桓温踈宗相見無嫌遵曰我聞人姓木邊便欲殺之况諸桓乎繇是少稱聰恵齊獻王攸字大猷文帝子少而岐嶷臨川獻王郁字深仁簡文帝子幼而敏恵其兄道生初以無禮失旨郁數勸以敬慎之道道生不納郁為之涕泣帝深器重之年十七而薨宋南譙王義宣子恢字景度既嫡長少而辯恵義宣甚愛重之年十一拜南譙王世子南齊臨川王映少而警悟美言笑喜容止江夏王鋒十嵗便能屬文宜都王鏗年十嵗時與吉景曜商畧先言徃行左右誤排柟瘤屏風倒壓其背顔色不異言談無輟亦不顧視巴陵王昭胄初為竟陵世子舅袁彖監吳興郡事坐過用禄錢免官付東冶昭胄時年八嵗見武帝而形容慘悴帝問其故昭胄流涕曰臣舅負罪今在尚方臣母悲泣不食已積日臣所以不寜帝曰特為兒赦之既而帝遊孫陵望東冶曰中有一好貴囚數日與朝臣幸冶履行庫藏因宴飲賜囚徒酒肉勅見彖與語明日釋之曲江公遥欣年七嵗出齋時有一左右小兒善弹飛鳥無不應弦墜落遥欣曰樂事多端何急彈此鳥自空中翔飛何闗人事無趣殺此生亦復不急左右感其言遂不復彈鳥時少年通好此事所在遂止竟陵王子良幼聰敏武帝為贛縣時與裴后不諧遣船送后還都已登路子良時年少在庭前不悦帝謂曰汝何不讀書子良曰孃今何處何用讀書帝異之即召后還縣南康縣侯子恪豫章王嶷第二子年十二和從兄司徒竟陵王髙松賦衛將軍王儉見而竒之子恪弟寜都侯子顯幼聰恵嶷異之愛過諸子梁鄱陽忠烈王恢字宏達太祖子幼聰頴年七嵗能通孝經論語義發擿無所遺吳平侯景字子炤髙祖從父弟八嵗居䘮以毁聞既長好學才辯能斷定襄侯祗美風儀幼有令譽南康簡王績髙祖子為南徐州刺史時年七嵗主者有受貨洗改解書長史王僧孺弗之覺績見而輙詰之便即時首服衆咸歎其聰警績子㑹理字長才少聰恵好文史年十一而孤特為髙祖所愛尋陽王大心簡文子年十三出為郢州刺史雖不親州務發言每合于理衆皆驚服建平王大球簡文子性明恵夙成初侯景圍京城髙祖素歸心釋教每發誓願嘗云若有衆生應受諸苦悉請身代當時大球年甫七嵗聞而驚謂母曰官家尚爾兒安敢辭乃六時禮佛亦云凢有衆生應受諸苦報悉大球代受其早慧如此西陽王大均簡文子年七嵗髙祖嘗問讀何書對曰學詩因命諷誦音韻清雅髙祖因賜王羲之書一卷陳衡陽獻王昌髙祖子為吴興太守時年十六昌雅性聰辨眀習政事髙祖遣陳郡謝哲濟陽蔡景歴輔昌為郡又遣吴郡杜之偉授昌以經書一覧便誦眀於義理剖析如流晋安王伯恭字肅之宣帝子初為平東將軍吳郡大守置佐史時伯恭年十餘嵗留心政事官曹治理南平王嶷字承嶽後主第二子方正有器局年數嵗風采舉動有若成人後魏任城王澄子順字子和九嵗師事樂安陳豐書王羲之小學篇數千言晝夜誦之旬有五日一皆通徹豐奇之白澄曰豐十五從師迄白首耳目所經未見此比江夏黄童不得無䨇也澄笑曰藍田生玉何容不爾彭城王勰字彦和獻文帝子少而岐嶷姿性不羣江陽王繼子爽字景喆少而機警尤為父寵愛清河王懌字宣文幼而敏恵孝文愛之元文遥昭成皇帝六世孫也敏恵夙成濟隂王暉業每云此子王佐才也暉業嘗大㑹賓客有人將何遜集初入雒諸賢皆贊賞之河間邢邵試命文遥誦之幾遍可得文遥一覽便誦時年十嵗濟隂王曰我家千里馬今定如何邢云此殆古未有北齊永安王浚字定樂神武第三子八嵗時問於博士盧景裕曰祭神如神在為有神耶無神耶對曰有神浚曰當云祭神神在何煩如字景裕不能答彭城王浟字子深神武第五子元象二年拜通直散騎常侍封長樂郡公博士韓毅教浟書見浟筆迹未工戲浟曰五郎書畫如此忽為常侍開國今日後宜更用心浟正色答曰昔甘羅幼為秦相未聞能書凡人惟論才具何如豈必動誇筆迹愽士當今能者何爲不作三公時年盖八嵗矣毅甚慙清河王岳子勱字敬徳幼聰敏美風儀以仁孝聞為髙祖所愛年七嵗襲爵後周齊煬王憲字毗賀突太祖第五子性通敏有度量雖在童齔而神彩嶷然世宗初除益州總管益寜巴瀘等二十四州諸軍事益州刺史進封齊國公邑萬户初平蜀之後太祖以其形勝之地不欲使宿將居之諸子之中欲有推擇遍問髙祖已下誰能此行並未及對而憲先請太祖曰刺史當撫衆治人非爾所及以年授者當歸爾兄憲曰才用有殊不闗大小試而無効甘受面欺太祖悅之以憲年㓜未之遣也世宗追遵先㫖故有此授時年十六憲子貴字乾福少聰敏渉獵經史尤便騎射始讀孝經便謂人曰讀此一經足為立身之本天和四年始十嵗封安定郡公邑一千五百户東平公神舉太祖族子早嵗而孤有夙成之量族兄安化公深器異之宇文深字奴干太祖族子性鯁直有器局年數嵗便累石為營伍併折草作旗旌布置行列皆有軍陣之勢父永遇見之乃大喜曰汝自然知此於後必為名將宋獻公震字彌俄突㓜而敏達年十嵗誦孝經論語毛詩尚書隋趙王杲煬帝子年七嵗聰令帝有所製詞賦杲多能誦之唐衛王𤣥覇髙祖第三子也幼而聰敏言詞辯恵有異常兒許王素節髙宗子六嵗封雍王能日誦古詩賦五百餘言受學於學士徐齊𣆀精勤不倦帝甚愛之永王璘𤣥宗子少聰敏好學夀王瑁𤣥宗子開元十五年封永王以年㓜小不於殿前引謝瑁纔八嵗請從諸兄行𤣥宗異而許之殿庭拜伏蹈舞深合禮法晋髙祖幼子重睿少帝嗣位初拜開封尹以年幼未出閣命左散騎常侍邊蔚知府事時少帝戯謂重睿曰已降銜命使臣有何例物待之重睿曰例物出於内庫臣何憂焉少帝許之畏慎中庸曰戒慎乎其所不覩恐懼乎其所不聞盖耳目之未能思言動之未必中是故夕惕若厲君子所以無咎日嚴祗肅大夫所以有家若乃聯輝本支席寵天族表頴悟於異禀挺淑哲於令器爵禄之重冠絶於等倫車服之崇輝映於表著復有權叅機要職分内外紀律斯在休戚攸繫而能處貴思降居安慮危裁損儀衛之容罔專賞罰之柄凡所興事必遵旨意至有罷去娱玩謝絶還徃特避盛勢靡求虚稱語黙兢慄出處端莊協克己之方得率性之理兹所謂淑人君子歟後漢清河孝王慶章帝子母曰宋貴人慶初立為皇太子後被譖廢慶時雖幼而知避嫌畏禍言不及宋氏帝更憐之勅皇后令衣服與太子齊等太子特親愛慶入則同室出則同輿慶小心孝恭自以廢黜尤畏事慎法每朝謁陵廟常夜分嚴装衣冠待明約勅官屬不得與諸王車騎競驅北海敬王睦性謙恭好士千里結交自名儒宿徳莫不造門繇是聲價益廣永平中法憲頗峻睦乃謝絶賓客放心音樂然性好讀書常為愛翫嵗終遣中大夫奉璧朝賀召而謂之曰朝廷設問寡人大夫將何辭以對使者曰大王忠孝慈仁敬賢樂士臣雖螻蟻敢不以實睦曰吁子危我哉此乃孤㓜時進趣之行也一云是吾㓜時狂憃之行也大夫其對以孤襲爵以來志意衰惰聲色是娛犬馬是好使者受命而行魏中山恭王衮少好學每兄弟游娛衮獨覃思經史文學防輔相與言曰受詔察公舉錯有過當奏及有善亦宜以聞不可匿其美也遂共表稱陳衮美衮聞之大驚懼責譲文學曰修身自守常人之行耳而諸君乃以上聞是適所以增其負累也且如有善何患不聞而遽如是是非益我者其戒慎如此晉安平獻王孚武帝時為太宰父子位極人臣子孫咸居大官出則旌旗節鉞入則貂蟬衮冕公族之寵未始有也享年九十然而夙夜謙恭常有履氷之懼元㑹詔孚輿車上殿帝親奉觴上夀如家人禮又給以雲母輦青盖車孚雖見尊寵不以為榮常有憂色宋臨川王義慶少善騎乘及長以世路艱難不復跨馬南齊豫章王嶷武帝時為侍中先是宋元嘉世諸王入齋閣得白服帬帽見人主自比以來此事一斷帝與嶷同生相友睦宫内曲宴許依元嘉嶷固辭啓自陳曰臣自還朝便省儀刀捉刀左右十餘亦省唯郊外逺行或復暫有入殿亦省服身今所牽仗二俠轂二白直共七八十人事無大小臣必欲上啓伏度聖心脫未委曲或有言其多少不附事實仰希即賜垂勅又啓揚州刺史舊有六白領合扇二白拂臣脫以為疑不審此當云何行園苑中乗轝出籬門外乗轝鳴角皆相仍如此非止於帯神州者未審此當云何方有行來不可失衷帝答曰儀刀捉刀不應省也俠轂白直乃可共百四五十以還正是耳亦不曽聞人道此吾自不使諸王無仗况復汝耶在私園苑中乗此非疑郊外鳴角及合扇并拂先乃有不復施用此來甚乆凡在鎮自異還京師先廣州乃立皷吹交部遂有輦事隨時而改亦復有可得依舊者汝若有疑可與王儉諸人量衷但令人臣之儀無失便行也又啓曰臣拙知自處闇於疑訪常見素姓扶詔或著布屫不意為異臣在西朝拜王儀飾悉依宋武陵事例有二鄣扇仍此下都脫不為疑小兒奴子並青布袴衫臣齋中亦有一人意謂外庶所服不疑與羊車相類曲荷慈㫖今悉改易臣昔在邊鎮不無羽衛自歸朝以來便相分遣俠轂白直格置三百許人臣頃所引不過一百常謂京師諸王不煩牽仗若郊外逺行此所不論有仗者非臣一人所以不容方幅啓省又因王儉備宣下情臣出入榮顯禮容優㤗第宇華曠事乖素約雖宋之遺製恩處有在猶深非服之慙威衛之請仰希曲炤帝答曰傳詔臺家人耳不足渉嫌鄣扇吾識及以來未見故有勅耳小兒奴子本非嫌也吾有所聞豈容不勅汝知令致物議耶吾已有勅汝一人不省俠轂但牽之吾昨不通仗事儉已道吾即令答不煩有此啓須閒言自更一二又啓曰違逺侍宴將踰一紀憂苦間之始得開顔近頻侍座不勝悲喜沾飲過量實欲仰示恩狎令自下知見以杜逰塵陛下留恩子弟此情何異外物政自强生間節聲其厚薄伏度或未上簡臣前在東田承恩過醉實思歎徃秋之謗故言啓至切亦令羣物聞之伏願已炤此心前侍幸順之宅臣依常乘車至仗後監伺不能示臣可否便互競啓間云臣逼突黄屋麾旄如欲相中推此用意亦何容易仰頼慈明即賜垂勅不爾臣終不知闇貽此累比日禁斷整宻此自常理外聲乃云起臣在華林輙捉御刀因此更嚴度情推理必不容爾為復上啓知耳但風塵易至和㑹實難伏願猶憶臣石頭所啓無生間縫此閒侍無次畧附茹亮口宣臣由來華素已具上簡每欲存衷意慮不周或有乖常且臣五十之年為翫幾時為此亦復不能以理内自剥北第舊邸本自甚華臣改修正而已小小製置已自抑簡往嵗収合得少雜材並蒙賜故板啓榮内許作小眠齋始欲成就皆補接為辦無乖格製要是檉柏之華一時新淨東府又有齋亦為華屋而臣頓有二處住止下情竊所未安訊訪東宫𤣥囿乃有柏屋製甚古拙内中無此齋臣乃欲壊取以奉太子非但失之於前且補接既多不可見移亦恐外物或為異論不審可有垂許送東府齋理否臣公家住止率爾可安臣之今啟實無意識亦無言者太子亦不知臣有此屋政以東宫無而臣自處之體不宜爾爾所啓蒙允臣便當敢成第屋安之不疑陛下若不炤體臣心便當永廢不修臣自謂今啓非但是自處宜然實為微臣徃事伏願必垂降許伏見以諸王舉貨屢降嚴㫖少拙營生已應上簡府州郡邸舍非臣私有今巨細所資皆是公潤臣私累不少未知將來罷州之後或當不能不試學營覔以自贍連年惡疾餘顧影單回無事畜聚唯逐手為樂耳帝荅曰茹亮今啓汝所懐及見别紙汝勞疾亦復那得不動何意為作煩長啓事凢諸普勅此意可尋當不闗汝一人也宜有勅事吾亦必道頃見汝自更委悉書不欲多及屋事慎勿强厝此意白澤亦當不解何意爾江夏王鋒明帝輔政時籓邸危懼江祏嘗謂王晏曰江夏王有才行亦善能匿迹以琴道授羊景之著名而江夏掩能於世非七絃而已百氏亦復如之鋒聞嘆曰江祏遂復為混沌畵眉欲益弊耳寡人聲酒是耽狗馬是好豈復有一毫於平生哉當時以為話言常忽忽不樂著脩柏賦以見志河東王鉉建武初為散騎常侍鎮軍將軍置兵佐建武之世髙武子孫憂危鉉朝見常鞠躬俯僂不敢平行直視梁南平王偉子靜何敬容欲以女妻之静忌其太盛拒而不納時論服焉南郡王大連與兄大臨並從髙祖征朱方髙祖問曰汝等習騎否對曰臣等未奉詔不敢輙習勅各給馬試之後梁宜都郡王大圜簡文帝子侯景之亂歸江陵時元帝多忌大圜恐䜛愬生焉乃屏絶人事門客左右不過三兩人不妄逰狎兄娣之間上牋而已嘗以讀詩禮書易為事後魏廣平文貞王匡景穆帝孫為洺州刺史嘗忤茹皓懼為所害亷慎自修甚有聲績北齊蘭陵王長恭在定陽其屬尉相願謂曰王既受朝寄何得如此貪殘長恭未答相願曰豈不繇芒山大㨗恐以威武見忌欲自穢乎長恭曰然相願曰朝廷若忌於此犯便當行罰求福反以速禍長恭泣下前膝請以安身術相願曰王前既有勲今復告㨗威聲大重宜屬疾在家勿預事長恭然其言未能退及江淮宼擾恐復為將嘆曰我昔面腫今何不發自是有疾不療後周代􅀢王達為荆州刺史所管澧州刺史蔡澤黷貨被訟贓狀分明達以其世著勲庸不可加戮若曲法貸之又非奉上之體乃令所司精加按劾宻表奏之事竟得釋終亦不言其處事周慎如此隋蔡王智積父景王昔髙祖龍濳時景王與髙祖不睦其太妃尉氏又與獨孤皇后不相諧以是智積常懐危懼每自貶損髙祖知其若是亦哀憐之人或勸智積治産業者智積曰昔平原露朽財帛苦其多也幸無可露何更營乎有五男止教讀論語孝經而已亦不令交通賓客或問其故智積答曰卿非知我者其意恐兒子有才能以致禍也開皇二十年徴還京第無他職任闔門自守非朝覲不出煬帝即位滕王綸以䜛搆得罪髙陽公智明亦以交逰奪爵智積愈懼大業七年授𢎞農太守委政寮佐清净自居悔過盖崇髙莫大於富貴而晏安斯為之酖毒若夫貴而思降冨而無驕乃良士之吉徳也其或慿藉威寵熏灼勢望未嘗知其憂懼寜復畏於盛滿溺於因習狥乎耳目自非大雅明哲上智不羣者又孰能無過哉乃有克己引咎悼心追悔折節改行銜媿沒齒春秋傳曰人孰無過過而能改善莫大焉易所謂不逺而復斯可尚也矣漢梁孝王文帝子也時鄒陽為上客羊勝公孫詭欲使王求為漢嗣王又嘗上書願賜容車之地徑至長樂宫自使梁國士衆築作甬道朝太后爰盎等皆建以為不可建謂立議天子不許梁王怒令人刺殺盎帝疑梁殺之使者冠盖相望責梁王梁王始與勝詭有謀陽爭以為不可故見䜛枚先生嚴夫子皆不敢諫先生枚乗夫子嚴忌及梁事敗勝詭死孝王恐誅廼思陽言深辭謝之初孝王怒下陽吏將殺之陽客㳺以䜛見禽恐死而負絫廼從獄中上書書奏孝王孝王立出之卒為上客膠東康王寄以孝景中二年立淮南王謀反時寄微聞其事私作兵車鏃矢樓車也所以看敵國營壘之虚實也又一說兵車止謂戰車耳鏃矢大鏃之矢今所謂兵箭者也戰守備備淮南之起及吏治淮南事辭出之辭語所連出其事寄於帝最親寄母王夫人即王后之妹於上為從母故寄於兄弟之中又更親也此下有恒山王云天子為最親其義亦同意自傷發疾而死不敢置後東平王宇事太后内不相得元帝遣使奉璽書勅諭之宇慙懼因使者頓首謝死罪願洒心自改後又殺姬胊臑有司奏請逮捕有詔削樊亢父二縣後三年天子乃詔有司曰盖聞仁以親親古之道也前東平王有闕闕謂過失也有司請廢朕不忍又請削朕不敢專惟王之至親未嘗忘於心今聞王改行自新尊脩經術親近仁人非法之求不以奸吏朕甚嘉焉傳不云乎朝過夕改君子與之其復前所削縣如故後漢梁節王暢少貴驕頗不遵法度又聽從官卞忌乳母王禮等謟媚言王當為天子暢心喜與相應答永元五年豫州刺史梁相舉奏不道考訊不服有司請徴詣廷尉詔獄和帝不許有司重奏除暢國徙九真帝不忍但削成武單父二縣暢慙懼上疏辭謝曰臣天性狂愚生在深宫長養傅母之手信惑左右之言及至歸國不知防禁從官侍史利臣財物熒惑臣暢無所昭見心悸自悔無所復及自謂當即時伏顯誅魂魄去身分歸黄泉不意陛下聖徳枉法曲平不聼有司曲平曲法申恩平處其罪横貸赦臣戰慄連月未敢自安上念以負先帝而令陛下為臣收汙天下汙惡也天下以帝赦王為惡故言收惡天下也誠無氣以息筋骨不相連臣暢知大貸不可再得自誓束身約妻子不敢復出入失繩墨不敢復有所横費租入有餘乞裁食睢陽糓孰虞蒙寜陵五縣還餘所食四縣臣暢小妻三十七人其無子者願還本家自選擇謹勅奴婢二百人其餘所受虎賁官騎及諸工技鼔吹蒼頭奴婢兵弩廐馬皆上還本署臣暢以骨肉近親亂聖化汙清流既得生活誠無心面目以㐫惡復居大宫食大國張官屬藏什物願陛下加大恩開臣自悔之門假臣小善之路令天下知臣蒙恩得去死就生頗能自悔臣以公卿所奏臣罪惡詔書常置於前晝夜讀誦臣小人貪見明時不能即時自引惟陛下哀臣令得喘息漏刻若不聽許臣實無顔以乆生下入黃泉無以見先帝此誠臣至心臣欲多還所受恐天恩不聼許節量所留於臣暢饒足詔報曰朕惟王至親之屬淳淑之美傅相不良不能防邪至令有司紛紜有言今王深思悔過端自克責朕惻然傷之志匪繇于咎在彼小人一日克己復禮天下歸仁王其安心静意茂率休徳易不云乎一謙而四益小有言終吉彊食自愛暢固譲章數上卒不許魏陳思王植任性而行不自彫勵飲酒不節嘗乗車行馳道中開司馬門出太祖大怒植内不自安及曹仁為闗侯所圍太祖以植為南中郎將行征虜將軍欲遣救仁呼有所勅戒植醉不能受命文帝即位植與諸侯並就國黃初二年監國謁者灌均希指奏植醉酒悖慢刼脅使者有司請治罪帝以太后故貶爵安鄉侯其年改封鄄城侯三年立為鄄城王四年徙封雍丘王其年朝京都上疏曰臣自抱釁歸藩刻肌刻骨追思罪戾晝分而食夜分而寢誠以天網不可重離聖恩難可再恃竊感相䑕之篇無禮遄死之義形影相弔五情愧赧以罪棄生則為古賢夕改之勸忍活茍全則犯詩人胡顔之譏伏惟陛下徳象天地恩隆父母施暢春風澤如時雨是以不别荆棘者慶雲之恵也七子均養者尸鳩之仁也舍罪責功者明君之舉也矜愚愛能者慈父之恩也是以愚臣徘徊於恩澤而不能自棄者也前奉詔書臣等絶朝心離志絶自分黄耉無復執圭之望不圖聖詔猥垂齒召至止之日馳心輦轂僻處西館未奉闕庭踊躍之懐瞻望反仄謹拜表獻詩二篇文帝嘉其辭義優詔荅勉之中山恭王衮明帝青龍中來朝犯京師禁為有司所奏削縣衮畏懼戒勅官屬愈謹帝嘉其意二年復所削縣樂陵王茂性傲狠無寵於太祖文帝太和元年徙封聊城公其年為王詔曰聊城公茂少不閑禮教長不務善道先帝以為古之立諸侯也皆命賢者故姬姓有未為侯者是以獨不王茂太皇太后數以為言如聞茂頃來少知悔昔之非合封茂為聊城王晉司馬彪字紹統髙陽王睦之長子也出後宣帝弟敏少篤學不倦然好色薄行為睦所責故不得為嗣雖名出繼實廢之也彪繇此不交人事而専精學習故得博覽羣籍終其綴集之務宋彭城王義康輔政十餘年素無學術闇于大體長史劉斌等以朋黨伏誅義康出鎮豫章帝遣沙門釋恵琳視之義康曰弟子有還理不恵琳曰恨公不讀數百卷書後以范曄謀反事免為庶人徙安城因讀書見淮南厲王長事廢書嘆曰前代乃有此我得罪為宜南齊豫章王嶷後房千餘人潁川荀丕獻書於嶷極言其失嶷咨嗟良乆為書荅之為之减遣梁蕭昱字子真髙祖從父弟也少而狂狷不拘禮度異服危冠交逰冗雜尤善屠牛業以為常於宅内沽酒好騎射位中書侍郎毎求試邊州帝以其輕脫無威望抑而不試遷給事黄門侍郎上表請自解帝手詔責之坐免官因此杜門絶朝覲普通五年坐於宅鑄錢為有司所奏下廷尉得免死徙臨海郡行至上虞有勅追還令受菩薩戒既至恂恂盡禮改意蹈道持戒尤精潔帝甚嘉之以為晉陽太守南平王恪位雍州刺史年少未閑庶務委之羣下百姓每通一辭數處輸錢方得聞徹賔客有江仲舉蔡逺王臺卿庾仲容四人俱被接遇並有蓄積故人間歌曰江千萬蔡五百正王新車庾大宅遂達武帝接之曰主人憒憒不如客尋以盧陵王代為刺史恪還奉見武帝以人間歌語之恪大慙不敢一言後折節學問所厯以善政稱後魏秦明王翰孫纂太武踐阼為定州刺史封中山王纂好酒愛佞政以賄成太武殺其親嬖人後悔過修謹拜内大將軍居官清約簡慎更稱亷平濟隂王欝孫暉業少險薄多與寇盗交通長乃變節渉子史亦頗屬文而慷慨有志節厯位司空太尉北齊永安簡平王浚及長嬉戯不節曾以屬請受納大見杖罰拘禁府獄既而見原後稍折節頗以讀書為務安徳王延宗為定州刺史驕縱多不法武成使撻之殺其昵近九人從是深自改悔唐彭王元則髙祖第十二子初為遂州都督坐事免及遷澧州折節自修甚著聲績後唐太祖母弟克柔養子嗣昭沈毅不羣初喜嗜酒太祖微申戒約自是終身不飲册府元龜卷二百七十四
