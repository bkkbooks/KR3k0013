body:
  text: 册府元龜卷五十九宋王欽若等撰帝王部興教化先王作教化民扶世道俗所以厚人倫端王政也莫不因其自然率其不及使天下敦本而興行回心而嚮道猶水之有源風之偃草也然而教化之流非可家至而人説也故因父子兄弟之親教之以孝弟本上下長幼之序朂之以慈恵夫婦之際化之節義農桑之功勉以勤苦故舉孝以為民極察亷以為民表或賜帛以敦奬或給復以令養是乃張四維明五教示大順建至治使民德歸厚風俗丕變不疾而速不嚴而化者繇斯道也書曰恵不恵懋不懋勉之之謂也詩曰爾之教矣民胥效矣其在是乎漢髙祖二年詔曰歲舉民年五十已上有修行能帥衆為善置以為三老鄉一人擇郷三老一人為縣三老與縣令丞尉以事相教復勿繇戍恵帝四年正月舉民孝弟力田者復其身文帝十二年三月詔曰孝悌天下之順也力田為生之本也三老衆民之師也㢘吏民之表也朕甚嘉此二三大夫之行今萬家之縣云無應令無孝悌力田之人可應察舉之令豈實人情是吏舉賢之道未備也其遣謁者勞賜三老孝者帛人五疋悌者力田二疋㢘吏二百石以上率百石者三疋自二百石以上每百石加三疋及問民所不便安而以户口率置三老孝悌力田常員計户口之數以率之增置其員廣教化也令各率其意以道民焉武帝建元元年四月詔曰古之立教鄉里以齒朝廷以爵扶世𨗳民莫善於德然則於鄉里先耆艾奉高年古之道也六十曰耆五十曰艾今天下孝子順孫願自竭盡以承其親外廹公事内乏資財是以孝心闕焉朕甚哀之民年九十以上有受粥之法給米粟以為糜粥為復子若孫令得身帥妻妾遂其供養之事元光元年十一月初令郡國舉孝㢘各一人孝謂善事父母者㢘謂清潔有㢘隅者元朔元年十一月詔曰深詔執事興舉孝㢘庶幾成風紹休聖緒今或闔郡而不薦一人其與中二千石禮官博士議不舉者罪有司奏議曰不舉孝不奉詔當以不敬論奏可元狩元年十二月詔曰朕嘉孝弟力田其遣謁者廵行天下賜孝者帛五疋悌者力田帛人三疋昭帝元鳯元年三月賜郡國所選有行義者涿郡韓福等五人帛人五十疋遣歸詔曰朕閔勞以官職之事其務行孝弟以教鄉里令郡縣常以正月賜羊酒有不幸者賜衣被一襲祠以中牢宣帝本始元年遣使者持節詔郡國二千石謹牧養民而風徳化地節三年十一月詔曰朕既不逮𨗳民不明反側晨興念慮萬方不忘元元唯恐羞先帝聖徳故並舉賢良方正以親萬姓歴載臻兹然而俗化闕焉傳曰孝弟也者其為仁之本與其令郡國舉孝弟有行義聞於鄉里者各一人四年二月詔曰𨗳民以孝則天下順今百姓或遭衰絰凶災而吏繇事使不得塟傷孝子之心朕甚憐之自今諸有大父母父母䘮者勿繇事使得収歛送終盡其子道神爵四年四月以潁川太守黄覇治行尤異賜吏民有行義者爵人三級力田一級貞婦順女帛元帝初元元年四月詔賜孝者帛五疋弟者力田三疋五年四月賜孝者帛人五疋悌者力田三疋永光二年二月詔賜孝悌力田帛有差建昭五年三月詔賜孝悌力田帛成帝建始元年二月賜孝弟力田帛各有差三年三月賜孝弟力田爵二級河平四年正月賜孝弟力田爵二級鴻嘉二年三月博士行鄉飲酒禮綏和元年二月賜孝弟力田帛有差哀帝即位賜孝弟力田帛平帝元始元年二月班教化禁淫祀放鄭聲六月復貞婦鄉一人鄉一人取其尤最者後漢光武建武三年以伏湛為司徒湛奏行鄉飲酒禮遂施行之明帝以中元二年二月即位四月賜孝弟力田爵人三級永平二年三月郡國縣道行鄉飲酒禮於學校三年二月賜天下孝弟力田爵人三級十二年賜天下孝弟力田爵人三級十七年五月賜天下孝弟力田爵人三級章帝以永平十八年八月即位十月賜孝弟力田爵人三級建武三年三月賜天下孝悌力田爵人三級四年四月賜孝弟力田爵人三級元和二年二月乙丑帝耕於定陶詔曰孝弟淑行也力田勞勤也國家甚體之其賜帛人一疋和帝永元八年賜天下孝弟力田爵人三級十二年三月賜天下孝弟力田爵人三級殤帝以元興元年十二月即位賜天下孝悌力田爵人三級安帝永初二年詔居鄉里有㢘清孝順之稱才任理人者國相歲移名與計偕上尚書公府通調令得外補移書也調選也三年正月賜孝弟力田爵人三級五年閏二月詔至孝與衆卓異者遣詣公車元初元年正月賜孝弟力田爵人三級三年十一月初聼大臣二千石刺史行三年䘮文帝遺詔以日易月於後大臣遂以為常至此復遵古制也六年二月詔賜貞婦有節義糓十斛甄表門閭旌顯厥行延光元年二月賜孝悌力田爵人三級順帝永建元年詔賜孝悌力田爵人三級四年正月賜孝悌力田爵人三級陽嘉元年正月詔賜孝悌力田爵人三級桓帝建和元年正月詔賜孝悌力田爵人三級魏陳留王咸熙元年令諸郡中正月六條舉淹滯一曰忠恪匪躬二曰孝敬盡禮三曰友于兄弟四曰勞身潔謙五曰信義可復六曰學以為己晉武帝㤗始三年十月詔聽士卒遭父喪者非在疆塲皆得奔赴四年班五條詔書於郡國一曰正身二曰勤百姓三曰撫孤寡四曰敦本息末五曰去人事六年十二月帝臨辟雍行鄉飲酒之禮詔曰禮義之廢久矣今乃復講肄舊典賜太常絹百疋承博士及學生牛酒咸寧三年復行其禮恵帝元康九年臨辟雍行鄉飲酒之禮後魏孝文太和十一年冬十月甲戌詔曰鄉飲之禮廢則長幼之叙亂孟冬十月民閑歳隙宜於此時𨗳以徳義可下諸州黨里之内推賢而長者教其里人父慈子孝兄友弟順夫和妻柔不率長教者具以名聞後周武帝天和元年詔諸有三年之䘮或負土成墳或寢苫骨立一志一行可稱揚者仰本部官司随事言上當加弔勉以勵薄俗隋髙祖開皇九年詔曰往以呉越之野羣黎塗炭干戈方用積習未寧今率土大同含生遂性太平之法方可流行凡我臣僚澡身浴徳開通耳目宜從兹始䘮亂已來緬將十載君無君徳臣失臣道父有不慈子有不孝兄弟之情或薄夫婦之義或違長幼失叙尊卑錯亂朕為帝王志存愛養時有臻道不敢寧息内外職位遐邇黎人家家自脩人人克念使不軌不法蕩然俱除兵可立威不可不戢刑可助化不可専行禁衛九重之餘鎮守四方之外戎旅軍噐皆宜停罷世路既夷羣方無事武力之子俱可學文人間甲仗悉皆除毁有功之臣降情文藝家門子姓各守一經令海内翕然髙山仰止京邑庠序爰及州縣生員受業升進於朝未有灼然明經髙第此則教訓不篤考課未精明勅所繇降兹儒訓煬帝大業八年四月詔孝弟力田義夫節婦並加旌異表其門閭唐髙祖武徳元年五月即位詔孝子順孫義夫節婦旌表其門閭孝悌力田鰥寡孤獨量加賑䘏四年七月詔孝子順孫義夫節婦所在詳列旌表其門閭太宗初即位詔節義之夫貞順之婦州郡列上旌表門閭貞觀三年四月詔孝義之家各賜米五石四年十月詔孝子順孫義夫節婦随事褒顯旌表門閭六年詔天下牧宰每年親率長幼行鄉飲酒之禮十三年正月詔孝子順孫義夫節婦咸表門閭十七年四月詔孝子順孫義夫節婦賜物有差髙宗永徽元年五月辛亥詔曰通䘮下逹聖哲貽訓緯俗經邦咸率兹道至於嬰蓼莪之巨痛懐顧復之深慈得自天經含生罔極者也爰自周餘七雄交爭逮乎漢末三方競峙金革亟動鉦鼓日聞先王典章掃地將盡遂令三邉武猛墨絰而扈戎麾士萃驍雄素冠而事廵警亦有内無繼體傍闕同氣几筵安寄奠酹不親廼睠於斯再深警歎朕膺兹景命君臨九野中區富教外俗承規宜有觧張以勵風俗衛士掌閑幕士等遭喪合期年上者宜聽終制三年六年正月詔孝子順孫義夫節婦咸表門閭顯慶二年三月詔曰如聞公主出適王妃作嬪舅姑父母皆降禮答拜此乃子道云替婦徳不修何以式序家邦儀刑列閫自今以後可明加禁斷使一依禮法若更有以貴加於所尊者令所司随事糾聞乾封元年有事於泰山詔孝子順孫義夫節婦表其門閭終身勿事永淳二年十二月詔孝子順孫義夫節婦表其門閭終身勿事中宗神龍元年九月詔曰在外百姓婚娶之家百兩未行二親俄殞停哀之際便即成婚遂輟苴絰之容敢伸花卺之禮寧戚之心安寄罔極之心闕如敗俗傷風莫過於此自今已後宜即懲革睿宗唐隆元年七月制鄉飲之禮為日已久宜令諸州每年遵行鄉飲之禮𤣥宗開元十一年封泰山禮畢詔孝子順孫義夫節婦旌表門閭終身勿事十七年四月謁乾陵禮畢詔孝子順孫義夫節婦旌表門閭二十年十一月詔孝子順孫義夫節婦旌表門閭終身勿事二十三年正月藉田禮畢詔孝子順孫義夫節婦並旌表其門天寳元年正月改元詔曰如聞百姓之内或有户髙丁多苟為規避父母在乃别籍異居宜令州縣勘㑹其一家之中有十丁已上者放兩丁征行賦役五丁已上者放乙丁即令同籍共居以敦風化三載十二月制曰自古聖王皆以孝理天下五常之本百行莫先行移於國則忠於長而為順有天下孝行過人鄉閭欽伏者宜令所繇郡縣長官具以名薦其有父母見在别籍異居虧損名教莫斯為甚親殁之後亦不得分析自今已後如有不孝不恭傷財破産者宜配𨽻磧西用清風教七載五月詔曰古者鄉有塾黨有序所以明尊卑之儀正長幼之序風化之道義在於此先置鄉學務令敦勸如聞郡縣之間不時訓誘閭巷之内多虧禮節致使言詞鄙䙝少長相陵有玷清猷何成雅俗自今已後宜令郡縣長官申明條式切加訓𨗳如有禮義興行及紀綱不立者委採訪使明為褒貶具状聞奏又詔曰式閭表墓追賢紀善事有勸於當時義無隔於異代其忠臣義士孝婦烈女史籍所載徳行彌髙者所在亦置一祠宇量事致祭十三載二月詔曰厚其風俗五教之㫖聿興賁於丘園十翼之風斯在其士庶間衆推孝弟累代義居髙尚確然隠遁岩穴者委採訪使博訪聞薦其孝義之人已經旌表雍睦無易純至有終著羙鄉閭深可嘉尚各賜勲兩轉肅宗初即位詔孝子順孫義夫節婦旌表其門閭至徳三年二月大赦詔天下孝義門各與一子官委採訪使具名聞奏量文武處分自逆賊已來有匹夫匹婦節義可量者並旌表其閭墓乾元元年四月詔百姓中有事親不孝别籍異財玷汚風俗虧敗名教先决六十配𨽻磧西有官品者禁身聞奏十月詔天下義夫節婦孝子順孫旌表門閭終身不事上元元年閏四月詔義夫節婦孝子順孫旌表門閭終身不事二年九月詔義夫節婦孝子順孫旌表門閭終身勿事三年建夘月辛亥詔孝子順孫義夫節婦旌表門閭終身不事代宗寶應元年四月即位五月詔孝悌力田諸州刺史宜搜揚聞薦二年七月詔孝悌力田本州各以名薦廣徳二年二月乙亥詔孝子順孫義夫節婦旌表門閭終身勿事大歴元年十一月詔孝悌力田未經薦用者委所在官長具以名聞五年六月詔孝子順孫義夫節婦事迹明著者特加旌表徳宗貞元四年詔孝悌力田聞於鄉里所在官長具名聞奏順宗以貞元二十一年正月即位二月詔曰孝子順孫義夫節婦旌表門閭重加優䘏四月又詔天下孝子順孫先旌表門閭者委所管州縣各加存䘏憲宗元和四年十月册皇太子大赦詔孝子順孫先旌表門閭者委所管州縣各加存䘏七年十月詔天下孝子順孫先旌表門閭者委所管州縣各加存䘏穆宗長慶元年三月幽州劉緫歸闕詔管内有節義因事亡殁者量加追贈七月詔孝子順孫義夫節婦事迹彰顯為衆知者量加存䘏昭宗天祐元年詔應天下有孝子順孫義夫節婦事迹彰顯為衆所知者仰所在長吏標録聞奏旌表門閭哀帝天祐四年四月詔孝子順孫義夫節婦有司以名聞必當旌表後唐荘宗同光元年四月即位制曰鄉里有孝子順孫義夫節婦委所在長吏録其節行以具奏聞盡㨿典章必行旌表教之為本義禮是先徳之所宗昭本在上其民間有曽經三世以上不分居者並與蠲免諸雜差徭十月詔其有義夫節婦孝子順孫並宜旌表門閭量加賑給二年二月詔曰義夫節婦孝子順孫並合搜揚以行旌表明宗天成二年十月辛丑詔許國之心忠貞為本承家之法孝友為先應天下有孝子順孫義夫節婦兄弟繼世義居者随處長吏聞奏當行旌表三年八月帝聞随鄧復郢均房之間父母骨肉有疾以竹竿遥致粥食於病者之側出嫁女父母有疾夫家亦不令知聞哀始奔䘮者勅曰萬物之中人曹為貴百行之内孝道居先凡戴北辰並遵皇化備聞南土多爽時風皆傾事鬼之心不守敬親之道於父母如此無行被日月何以立身弊久積於鄉閭化全繇於長吏昔西門豹一縣令耳尚能投巫百姓保女子之愛絶河伯之虞斷自一時傳於千古况位居侯伯化洽封廵豈不能宣北闕之風變南方之俗宜令随處觀察使刺史丁寧曉告自今後父母骨肉有疾者並湏日夕専切不離左右㸔侍使子奉其父母婦事其舅姑弟不慢於諸兄姪不怠於諸父如或不移故態老者卧病少者不勤侍養子女弟姪並加嚴斷出嫁女父母有疾不令其知者當罪其夫及舅姑四年三月中書奏孔子有言曰教以孝所以敬天下之為人父者教以悌所以敬天下之為人兄者教以忠所以敬天下之為人君者往聖深旨中古明規方當孝理之朝尤重人倫之本今後羣臣内有乞假覲省者欲請量賜茶藥所貴勸人之善表主之恩誠有益於皇猷且無損於國勢况在班行有父母者甚少既資風化動挂宸衷從之長興二年八月壬申勅朕聞教化之夲禮讓為先欲設規程在循典故葢以中興之始兆庶初安将使知方所以漸誘准儀制令道路街巷賤避貴少避長重避輕去避來有此四事承前每於道途立碑刻字令路人皆得聞見宜令三京諸道州府各遍下管内縣鎮准舊例於道路明置碑雕刻四件事文字兼於要㑹坊門及諸橋柱刻碑曉諭路人委本縣所繇官司共切廵察有敢犯者科違勅之罪貴在所為簡易所化𢎞多既禮教興行則風俗淳厚庶皆順序益致和平晉髙祖天福元年閏十一月壬午勅義夫節婦孝子順孫委逐道奏聞當加旌表六年八月詔孝子順孫義夫節婦並與旌表門閭少帝以天福七年六月即位七月制曰敦崇孝義旌表門閭式恢王化之基用正人倫之本應有孝子順孫義夫節婦委逐處長吏具名奏聞當議旌表漢髙祖乾祐三年正月制義夫節婦孝子順孫仰具奏聞即議旌表周太祖廣順元年正月即位制曰孝子順孫義夫節婦所宜旌表以勵時風二年十一月丙子詔曰應内外文武臣僚幕職州縣官舉選人等今後有父母祖父母亡殁未經遷葬者其主家之長不得輙求仕進所繇司亦不得申舉觧送如是卑幼在下者不在此限顯徳元年正月詔曰應孝子順孫義夫節婦州縣以名聞者並與旌表門閭世宗以是月丙申即位三月詔曰其有孝子順孫義夫節婦所宜旌表以厚人倫冊府元龜卷五十九
