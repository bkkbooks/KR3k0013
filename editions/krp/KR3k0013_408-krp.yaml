body:
  text: 冊府元龜卷四百八宋王欽若等撰將帥部退讓書曰謙受益𫝊曰上讓下競蓋先王之重知退而貴崇讓也其徳之盛歟乃有掌握兵要典司戎重膺元帥之寄受注意之任寵名斯集爵賞既渥而能逹倚伏之理節過亢之分深畏盛滿推避榮數稱引俊傑罄盡忠亮乃至求解禄秩願就休致懇辭政柄思去權位靡矜勲績不受封邑精意懇到孤風聳激老子曰知止不殆易曰卑而不可踰皆是之謂也故歴代之為將者能以功名始終進退而不失其正者何莫繇斯道也已漢張安世宣帝初為車騎將軍光禄勲時大將軍霍光薨御史大夫魏相上封事言安世與大將軍定䇿天下受其福宜尊其位以為大將軍帝亦欲用之安世聞指懼不敢當請間求見免冠頓首曰老臣耳妄聞言之為先事不言情不達事未施行而遽言之故曰先事也誠自諒不足以居大位繼大將軍後唯天子財哀以全老臣之命財與裁同帝笑曰君言太謙君而不可尚誰可者言君尚不可誰更可也安世深辭弗能得後數日竟拜大司馬車騎將軍領尚書事初宣帝以皇曽孫收養掖庭安世兄掖庭令賀侍養拊循恩甚宻焉及帝即位而賀已死帝追思賀恩欲封其家為恩徳侯置守冡二百家賀有一子蚤死無子子安世小男彭祖言養以為子彭祖又小與帝同席研書指欲封之先賜爵闗内侯安世深辭賀封又求損守冡户稍减至三十帝曰吾自為掖庭令非為將軍也安世乃不敢復言安世以父子封侯在位太盛乃辭禄詔都内别藏張氏無名錢以百萬數元康四年春安世病上䟽歸候乞骸骨天子報曰將軍年老被病朕甚憫之雖不能視事折衝萬里君先帝大臣眀於治亂朕所不及得數問焉言意所不及者即以問君何感而上書歸衛將軍富平侯印薄朕忘故薄猶嫌也君意嫌朕遺忘故舊而求去也非所望也願將軍強餐食近醫藥專精神以輔天年安世復強起視事後漢馬武初為更始振武將軍後降光武復使將其部曲至鄴武叩頭辭以不願世祖愈美其意李通為前將軍以天下略定通思欲避榮寵以病上書乞身詔下公卿羣臣議大司徒侯覇等曰王莽簒漢傾亂天下通懐伊吕蕭曹之謀建造大䇿扶助神靈輔成聖德破家為國忘身奉主有扶危存亡之義功德最髙海内所聞通以天下平定謙讓辭位夫安不忘危宜令通居職療疾欲就諸侯不可聴於是詔通勉致醫藥以時視事丁綝字㓜春潁川定陵人光武因略地潁陽以為偏將軍建武元年拜河南太守及封功臣帝令各言所樂諸將皆占豐邑美縣唯綝願封本鄉或謂綝曰人皆欲縣子獨求鄉何也綝曰昔孫叔敖勅其子受封必求墝埆之地今綝能薄功微得鄉亭厚矣帝從之封定陵新安鄉侯朱祐為建義大將軍建武中封鬲侯邑七千三百户祐自陳功薄而國大願受南陽五百户足矣不許竇憲和帝時為車騎將軍與北單于戰於稽落山大破之詔使中郎將持莭即五原拜大將軍封武陽侯食邑三萬户憲固辭封賜䇿許焉馮緄桓帝時為車騎將軍擊武陵蠻夷荆州平定詔賜錢十億固讓不受振旅還京師推功於從事吳張昭大帝時為綏逺將軍以老病上還官位及所統領更拜輔吳將軍班亞三司改封婁侯食邑萬户是儀為禆將軍守侍中欲復授兵儀自以非材固辭不受嚴畯為騎都尉横江將軍魯肅卒權以畯代肅畯前後固辭曰僕素書生不閑軍事非才而據殃咎必至發言慷慨至於流涕大帝乃聴焉嘉其能以實讓晉賈充為車騎將軍時吳將孫秀降拜為驃騎大將軍武帝以充舊臣欲改班使車騎居驃騎之右充固讓見聴魯芝為鎮東將軍青州刺史芝以年及懸車告老遜位章表十餘上武帝於是徵為光禄大夫位特進給吏卒門施行馬羊祜㤗始初為都督荆州諸軍事後加車騎將軍開府如三司之儀祜上表固讓曰臣伏聞恩詔㧞臣使同台司臣自出身以來適十數年受任内外每極顯重之任常以智力不可頓進恩寵不可久謬夙夜戰慄以榮為憂臣聞古人之言德未為人所服而受髙爵則使才臣不進功未為人所歸而荷厚禄則使勞臣不勸今臣身托外戚事連運會誡在過寵不患見遺而猥降發中之詔加非次之榮臣有何功可以堪之何心可以安之身辱髙位傾覆尋至願守先人弊廬豈可得哉違命誠忤天威曲從即復若此蓋聞古人申於見知大臣之節不可則止臣雖小人敢縁所蒙念存斯義今天下自服化以來方漸八年雖側席求賢不遺幽賤然臣不能推有德達有功使聖聴知勝臣者多未達者不少假令有遺德於版築之下有隱才於屠釣之間而朝議用臣不以為非臣處之不以為愧所失豈不大哉臣忝竊雖久未若今日兼文武之極寵等宰輔之髙位也且臣雖所見者狹據今光禄大夫李憙執節髙亮在公正色光禄大夫魯芝潔身寡欲和而不同光禄大夫李𦙍清亮簡素立身在朝皆服事華髪以禮終始雖歴位内外之寵不異寒賤之家而猶未蒙此選臣更越之何以塞天下之望少益日月是以誓心守節無茍進之志今道路行通方隅多事乞留前恩使臣得速還屯不爾留連必於外虞有闕匹夫之志有不可奪不聴其後詔以㤗山之南武陽牟南城梁父平陽五縣為南城郡封祜為南城侯置相與郡公同祜讓曰昔張良請受留萬户漢祖不奪其志臣受鉅平於先帝敢辱重爵以速官謗固執不拜帝許之祜毎被登進常守冲退至心素著故特見申於分列之外是以名德逺播朝野具瞻縉紳僉議當居台輔帝方有兼并之志仗祜以東南之任故寢之杜預為鎮南將軍都督荆州諸軍事預既平吳後還鎮累陳家世吏職武非其功請退不許劉𢎞恵帝時為鎮南將軍都督荆州諸軍事以平張昌功應封次子一人縣侯𢎞上疏固辭許之王𨗳懐帝永嘉末遷丹陽太守加輔國將軍𨗳上元帝牋曰昔魏武達政之主也荀文若功臣之最也封不過亭侯倉舒愛子之寵贈不過别部司馬以此格萬物得不局迹乎今者臨郡不問賢愚豪賤皆加重號輙有鼓蓋動見相凖時有不得者或為恥辱天官混雜朝望頽毁𨗳忝荷重任不能崇浚山海而開創亂源饕竊名位取紊彛典謹送鼔蓋加崇之物請從𨗳始庶令雅俗區别羣望無惑帝下令曰𨗳徳重勲髙孤所深倚誠宜表章殊禮而更約已冲心進思盡誠以身率衆宜順其雅志式允開塞之機拜寕逺將軍尋加振威將軍愍帝即位徵吏部即不拜𨗳後又拜右將軍揚州刺史監江南諸軍事遷驃騎將軍加散騎常侍都督中外諸軍領中書監録尚書事假節刺史如故𨗳以王敦統六州固辭中外都督劉琨愍帝時為大將軍都督并州諸軍事帝遣大鴻臚趙亷持節拜琨為司空都督并兾幽三州諸軍事琨上表讓司空受都督尅期與猗盧討劉聰王敦元帝建武初為征南大將軍中興建拜侍中大將軍江州牧遣部將朱軌趙誘伐杜曽為曽所殺敦自貶免侍中辭牧不拜尋加荆州牧敦上疏曰昔漢祖以神武革命開建帝業繼以文帝之賢纂承洪緒清虚𤣥黙擬迹成康賈誼嘆息以為天下倒懸雖言有抑揚不失事體今聖朝肇建漸振宏綱往段匹磾遣使求効忠節尚未有勞便以方州與之今靳眀等為國雪恥欲除大逆此之志望皆欲附翼天飛雖功大宜報亦宜有以裁之當杜漸防萌慎之在始中間不逞互生事變皆非忠義率以一朝之榮天下漸弊實繇於此春秋之時天子微弱諸侯奢侈晉文思崇周室至有求隧之請襄王讓之以禮聞義而服自爾諸侯莫敢越度臣謂前者冦賊未殄茍以濟事朝廷諸所加授頗多爵位兼重今自臣以下宜皆除之且以塞羣小矜功之望夷狄無厭之求若復遷延顧望流俗使奸狡生心遂相怨謗指摘朝廷讒諛蜂起臣有以知陛下無以正之此安危之機天下之望臣門户特受榮任備兼權重渥恩偏隆寵過公族行路厮賤猶謂不可臣獨何心可以安之臣一宗誤陛下傾覆亦將尋至雖復灰身剖心陛下追悔將何所及伏願諒臣至欵及今際㑹小解散之並授賢雋少慰有識各得盡其所懐則人思競勸矣州牧之號所不敢當輙送所假侍中貂蟬乂宜并官省職以塞羣小覬覦之望帝優詔不許又固辭州牧聴為刺史紀瞻為領軍王敦之逆元帝使謂瞻曰卿雖病但為朕卧䕶六軍賊平自表還家帝不許固辭不起詔曰瞻忠亮雅正識局經濟屢以年耆病久逡廵告誠朕深眀此操重違髙志今聴所執其以為驃騎將軍常侍如故服物制度一按舊典遣使就拜止家為府陶侃鎮武昌元帝以侃破新野平襄陽功拜大將軍劍履上殿入朝不趨讃拜不名上表固讓曰臣非貪榮於疇昔而虚讓於今日事有合於時宜臣豈敢與陛下有違理有益於聖世臣豈敢與朝廷作異臣嘗欲除諸浮長之事遣諸虚假之用非獨臣身而已若臣仗國威靈梟雄斬勒則又何以加成帝咸和七年侃疾篤上表遜位曰臣少長孤寒始願有限過蒙聖朝歴世殊恩陛下睿鑒寵靈彌泰有始必終自古而然臣年垂八十位極人臣啟手啟足當復何恨但以陛下春秋尚富餘㓂不誅山陵未反所以憤愾兼懐不能已巳臣雖不知命年時已邁國恩殊特賜封長沙隕越之日當歸骨國土臣父母舊葬今在尋陽縁存處亡無心分違已勒國臣脩遷之事刻以來秋奉迎窀穸葬事訖乃告老下藩不圖所患遂爾緜篤伏枕感結情不自勝臣間者猶謂犬馬之齒尚可小延欲為陛下西平李雄北吞石季龍是以遣毋丘奥於巴東授桓宣於襄陽良圖未叙於此長乖此方之任内外之要願陛下速選臣代使必得良才奉宣王猷遵成臣志則臣死之日猶生之年陛下雖聖姿天縱英竒日新方事之殷當賴羣儁司徒𨗳鑒識經逺光輔三世司空鑒簡素貞正内外惟允平西將軍亮雅量詳眀噐用周時即陛下之周召也獻替疇咨敷融政道地平天成四海幸賴謹遣左長史殷羡奉送所假節麾幢曲蓋侍中貂蟬太尉章荆江州刺史印𫝊棨㦸仰戀天恩悲酸感結以後事付右司馬王愆期加督䕶統領文武侃輿車出臨津就船眀日薨於樊谿時年七十有六郗鑒為司空鎮京口以寢疾上疏遜位曰臣疾彌留遂至沉篤自忖氣力差理難兾有生有死自然之分但忝位過才曽無以報上慙先帝下愧日月伏枕哀嘆抱恨黃泉臣今虗乏救命朝夕輙以府事付長史劉遐乞骸骨歸丘園惟願陛下崇山海之量宏濟大猷任賢使能事從簡易使康哉之歌復興於今則臣雖死猶生之日耳臣所統錯雜率多北人或逼遷徙或是新附百姓懐土皆有歸本之心臣宣國恩示以好惡處與田宅漸得少安聞臣疾篤衆情駭動若當北渡必啟㓂心太常臣謨平簡貞正素望所歸謂可以為都督徐州刺史臣亡兄息晋陵内史邁謙受養士甚為流亡所宗又是臣門户子弟堪任兖州刺史公家之事知無不為是以敢希祁奚之舉疏奏元帝以蔡謨為鑒軍司應詹為都督前鋒軍事䕶軍將軍假節都督時以王敦作逆朱雀橋南賊從竹格渡江詹與建威將軍趙𦙍等擊敗之斬賊率杜發梟首數千級賊平封觀陽縣侯食邑一千六百户賜絹五千匹上疏譲曰臣聞開國承家光啟土宇唯令徳元功乃宜封錫臣雖忝當一隊䇿無微略勞不汗馬猥以疏賤倫亞親宻暫厠被練列勤司勲乞迴謬恩聴其所守元帝不許庾亮為左衛將軍時王敦舉兵亮與諸將拒錢鳳及沈充之走吳興也元帝又假亮節都督東征諸軍事追充事平以功封永昌縣開國公賜絹五千四百疋固讓不受後亮鎮蕪湖時後將軍郭黙據湓口以叛亮表求親征於是以本官加征討都督率將軍路永毛寳劉仕等歩騎二萬㑹太尉陶侃討之亮還蕪湖不受爵賞侃移書曰夫賞罰黜陟國之大信竊怪矯情獨為君子亮曰元帥指撝武臣效命亮何功之有遂苦辭不受進號鎮西將軍又固讓初以誅王敦功封永昌縣公亮比陳讓疏數十上至是許之温嶠為江州刺史持節都督平南將軍鎮武昌先是王𨗳與嶠皆受元帝顧命及平蘇峻後朝議將留嶠輔政嶠以𨗳先帝所任固辭還藩復以京邑荒殘資用不給嶠措資蓄具器用而後旋於武昌毛穆之穆帝時為右將軍宣城内史假節鎮姑孰穆之以為戍在近畿無復軍警不宜加節上疏辭譲許之郗愔簡文初為輔國將軍㑹稽内史時大司馬桓温以愔與徐兖有故義乃遷愔都督徐兖青幽揚州之晉陵諸軍事領徐兖二州刺史假節雖居藩鎮非其好也俄屬桓温北伐愔請督所部出河上用子超計以已非將帥才不堪軍旅又固辭解職勸温并領已所統轉冠軍將軍㑹稽内史及簡文踐祚就加鎮軍都督浙江東五郡軍事久之以年老乞骸骨因居㑹稽徵拜司空詔書優美敦奬殷勤固辭不起謝𤣥孝武時為都督徐兖青司兾幽并七州軍事移鎮東陽城𤣥即路於道疾篤上䟽曰臣以常人才不佐世忽蒙殊遇不復自量遂從戎政驅馳十載不辭鳴鏑之險毎有征事輙請為軍鋒繇恩厚忘軀甘死若生也冀有毫釐上報榮寵天祚大晉王威屢舉實繇陛下神武英斷無思不服亡叔臣安恊賛雍熈以成天工而雰霧尚翳六合未朗遺黎塗炭巢窟冝除復命臣荷戈前驅董司戎首兾仰憑皇威宇宙寕一陛下致太平之化庸臣以塵露報恩然後從亡叔臣安退身東山以道養夀此誠已形於文㫖達於聖聴臣所以區區家國實在於此不謂臣愆咎夙積罪鍾中年上延亡叔臣安亡兄臣靖數月之間相繼殂背下逮稚子尋復夭昏哀毒兼纏痛百常情臣不勝禍酷暴集毎一慟殆斃所以含哀忍悲期之必存者雖哲輔傾落聖眀方融伊周嗣作人懐自厲猶欲申臣本志隆國保家故能豁其情滯同之無心耳去冬奉司徒道子告括嚢逺圖逮問臣進止之宜臣進不達事機以蹙境為恥退不自揆故欲順其宿心豈謂經略不振自貽斯戾是以奉送章節待罪有司執循常儀實有媿心而聖恩赦過黷法垂宥使抱罪之臣復得更鳴於所司木石猶感而况臣乎顧將身不良動與釁㑹謙徳不著害盈是荷先疾既動便至委篤陛下體臣疢重使還藩淮側甫欲休兵静衆綏懐善撫兼苦自療兾日月漸瘳繕甲俟㑹思更奮迅而所患沉頓有増無損今者惙惙救命朝夕臣之平日率其長短加以匪懈猶不能令政理宏宣况今内外天隔永不復接寕可卧居重任以招患慮追尋前事可為寒心臣之㣲身復何足惜區區血誠憂國實深謹遣兼長史劉濟重奉送節蓋章𫝊伏願陛下垂天地之仁拯將絶之氣特遣軍司鎮慰荒雜聴臣所乞盡醫藥消息歸誠道門兾神祗之祐若此而不差修短命也使臣得及視息瞻覩墳栢以此之盡公私真無恨矣伏枕悲慨不覺流涕詔遣髙手醫一人令自消息又使還京口療疾𤣥奉詔便還病又不差又上䟽曰臣同生七人凋落相繼唯臣一已孑然獨存在生荼酷無如臣比所以含哀忍痛希延視息者欲報之德實懐罔極庶蒙一瘳申其此志且臣孤遺滿目顧之惻然為欲極其求生之心未能自分於灰土慺慺之情可哀可愍伏願陛下矜其所訴霈然垂恕不令㣲臣衘恨泉壌表寢不報前後䟽十餘上久之乃轉授散騎常侍左將軍㑹稽内史桓豁為征西將軍進督交廣州軍事太元初遷征西大將軍開府豁上疏固讓曰臣聞三台麗天辰極以之増耀論道作弼王猷以之時雝必將仰參神契對揚成務宏易簡以翼化暢𤣥風於宗極故宜眀揚側陋登庸賢雋使版築有冲天之舉渭濵無垂竿之逸用乃功濟蒼生道光千載是以德非時望成典所不虚授功微賞厚賢達不以擬心臣實凡人量無逺致階藉門寵遂叨非據進不能闡揚皇風賛眀政道退不能宣力所蒞混一華戎尸素積載庸績莫紀是以敢冐成命歸陳丹欵伏願陛下迴神𤣥覽追收謬眷則具瞻革望臣知所免竟不許宋劉敬宣初自晉安帝元興中為輔國將軍既破桓歆遷建威將軍江州刺史敬宣固辭言於髙祖曰讐恥既雪四海清蕩所願反身草澤以終餘年恩遇不遺遂復僶俛即日所忝已為優渥且盤龍劉毅小字無忌何無忌也猶未遇寵賢如二弟位任尚卑一朝先之必貽朝野之責不許王𢎞太祖即位初以佐命功遷衛將軍初少帝景平二年徐羡之等謀廢立召𢎞入朝太祖即位以定䇿安社稷進位司空封建安郡公食邑千户𢎞上表固辭曰臣聞趙武稱隨㑹夫子之家事治言於晉國無隱情臣千載幸㑹謬荷榮遇雖以智能虛薄政績蔑聞而言無隱情竊所庶㡬向令天啟其心豫定大䇿而名編司勲功不見紀固將請不賞之罪懸龍蛇之書豈當稽違成命茍脩小節但功勤暴之四海進闕君子勞心之謀退微小人勞力之効而聖朝僣賞於上愚臣茍忝於下則為厚誣當時永貽口實竊財之誚比此為輕唯塵盛猷虧玷為大微躬所惜一朝亦盡非惟仰塵國紀實亦俯畏友朋憂心彌疹胡顔靡託且凡人之交尚申知己况在眀主可用理干所以敢遂愚狷守之以死乃見許加使持節侍中改監為都督進號車騎大將軍沈慶之孝武初以討魯爽功進號鎮北大將軍後遷開府儀同三司辭改封始興郡公户邑如故慶之以年滿七十固請辭事帝嘉其意許之以為侍中左光禄大夫開府儀同三司又固讓帝不許表疏數十上又靣陳曰張良名賢漢髙猶許其退臣有何用必為聖朝所湏乃至稽顙自陳言輙涕泣帝不能奪聴以郡公罷就第月給錢十萬米百斛衛史五人慶之於是又申前命復固辭南齊劉善眀齊臺初建為右衛將軍辭疾不拜司空褚淵謂善眀曰髙尚之事乃卿從來素意今朝廷方相委待詎得便學松喬耶善眀曰我本無宦情既逢知己所以戮力驅馳願在申志今天地廓清朝廷濟濟鄙懐既申不敢昧於富貴矣劉懐珍宋眀帝太始初為寕朔將軍遣王敬則破殷琰將劉從等四壘於橫塘等處懐珍乗勝逐北頓夀春長邏門宋眀帝嘉其功除羽林監屯騎校尉將軍如故懐珍請先平賊辭讓不受後仕齊太祖為左衛將軍散騎常侍魏軍㓂淮肥以本官加平西將軍屯漅湖為夀春勢援軍退懐珍既老以禁旅辛勤求為閒官轉光禄大夫常侍如故周盤龍為持節都督兖州㳂淮諸軍事以擊虜無功白衣領職八座尋奏復位加東平太守盤龍表年老才弱不可鎮邊求解職見許王奐太祖建元初為征虜將軍南都内史領南蠻校尉上表固讓南蠻曰今天地初闢萬物載新荆蠻來威巴濮不擾但使邊民樂業有司循務本府舊州日就殷阜昔游西土較見盈虛兼日者戎燼之後痍毁難復雖復緝以善政未及來蘇今復割撤大府制置偏校崇望不足以助強語實安能以相弊且資力既分職司増廣衆勞務倍文案滋煩非獨臣見其難竊以為國計非允見許於是罷南蠻校尉官進號前將軍梁蔡道恭為右衛將軍時髙祖舉義師於雍州道恭以破虜休烈之功遷中領軍固辭不受出為使持節右將軍司州刺史王國珍為右衛將軍辭不拜又授徐州刺史固乞留京師復賜金帛國珍又固讓髙祖勅答曰昔田子泰固辭絹糓卿體國情深良在可嘉尋詔徵為䕶軍將軍夏侯詳初仕齊為中領軍從髙祖舉義師時髙祖弟始興王憺留守襄陽詳乃遣使迎憺共叅軍國齊和帝加詳禁兵出入殿省固辭不受遷侍中尚書右僕射尋授使持節撫軍荆州刺史詳又固讓於憺韋叡以天監十四年出為平北將軍寕蠻校尉十五年拜表致仕優詔不許劉之亨大通六年出師南鄭之亨摠督衆軍杖節西土而致尅復後封臨江子固辭不拜初之亨之立功也軍士有功皆録唯之亨為蘭欽所訟執政因而䧟之故封賞不行但復本位而已久之帝讀陳湯傳恨其立功絶域而為文吏所詆宦者張増允曰外聞論者切謂劉之亨似之帝感悟乃封冊府元龜卷四百八
