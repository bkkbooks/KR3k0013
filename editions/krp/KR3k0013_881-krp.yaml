body:
  text: 冊府元龜卷八百八十一宋王欽若等撰總錄部交友交友之道其來尚矣自天子至於庻人未有不須友以成者也故傳有三益之訓易著斷金之象營道同術義表於切磋乆要不忘情見於生死又豈止逺方之為樂淡水之相成哉中古而下蓋有同德比義神交心炤或傾蓋以投分或刎頸而為歡靡思志操之異遂忘年齒之隔結髪以共仕納祿以偕徃敦風雨之信忘蓬蓽之賤通家而益厚弈世而逾親以至撫字孤孀拯濟危阨殺身以自誓抱節而不變斯皆古之不諂不凟相生相死之士歟管仲字夷吾潁上人也少時嘗與鮑叔牙游鮑叔知其賢管仲貧困常欺鮑叔終善遇之不以為言已而鮑叔事齊公子小白管仲事公子紏及小白立為桓公子紏死管仲囚焉鮑叔遂進管仲管仲旣用任政於齊齊桓公以覇九合諸侯一匡天下管仲之謀也管仲曰吾始困時嘗與鮑叔賈分財利多自與鮑叔不以我為貪知我貧也吾嘗為鮑叔謀事而更窮困鮑叔不以我為愚知時有利不利也吾嘗三仕三見逐於君鮑叔不以我為不肖知我不遭時也吾嘗三戰三走鮑叔不以我為怯知我有老母也公子紏敗召忽死之吾幽囚受辱鮑叔不以我為無恥知我不羞小節而恥功名不顯於天下也生我者父母知我者鮑子也鮑叔旣進管仲以身下之子孫世䘵於齊有封邑者十餘世嘗為名大夫天下不多管仲之賢而多鮑叔能知人也韓氏外傳鮑叔有疾管仲為之不食不内水漿寗戚患之曰鮑叔有疾而為之不内水漿無益於鮑叔又將自傷且鮑叔非君臣之恩父子之親為之不内水漿不亦失宜乎管子曰非子之所知也昔者吾嘗與鮑叔負販於南陽而見辱於市中鮑子不以我為不勇者知吾欲有名於天下吾與鮑子説諸侯三見而三不中不以我為不肖者知吾不遇賢主人吾與鮑子分財而多自與不以我為貪者知吾貧無有也生我者父母知我者鮑子士為知己者死馬為知御者良鮑子卒天下莫我知安用水漿誠有知者雖為之死亦何可傷乎晏嬰齊大夫孔子稱晏平仲善與人交乆而敬之季札吳公子也聘於鄭見子産如舊相識伍參楚大夫與蔡太師子朝友其子伍舉與聲子相善也聲子子朝之子伍舉子胥祖父椒舉也伍舉娶於王子牟王子牟為申公而亡獲罪出奔楚人伍舉實送之伍舉奔鄭將遂奔晉聲子將如晉遇之於鄭郊班荆相與食而言復故班布也布荆坐地共議歸楚事聲子曰子行也吾必復子申包胥楚大夫伍員與申包胥友其亡也謂申包胥曰我必復楚國復報也申包胥曰勉之子能復之我必能興之孟獻子魯大夫有友五人樂正裘牧仲五人者皆賢人無位者也獻子以其富貴下此五人五人屈禮而就之也曽子以子張死有母之䘮齊衰而徃哭之或曰齊衰不以弔以其無服非之曾子曰我弔也與哉於朋友哀痛甚而往哭之非若凡弔羊角哀左伯桃二人為死友欲仕於楚道阻遇雨雪不得行饑寒自度不俱生伯桃謂角哀曰俱死之後骸骨莫收内手捫心知不如子生恐無益而棄子之能我樂在樹中角哀聽之伯桃入樹中而死楚平王愛角哀之賢以上卿禮葬伯桃角哀夢伯桃曰蒙子之恩而獲厚葬正苦荆將軍冡相近今月十五日當大戰以决勝負角哀至期日陳兵馬詣其冡作三桐人自殺下而從之此殁身不負然諾之信青荓豫讓之友也為趙襄子參乘襄子游於囿中至於梁馬却不肯進襄子曰進視梁下前類有人類象青荓進視梁下豫讓却寢佯為死人叱荓曰去長者且有事言將殺趙襄子青荓曰少而與子友子且為大事而我言之失相與交友之道子將賊吾君而我不言失為人臣之道如我者唯死為可適可得死也退而自殺趙有處士毛公藏於博徒薛公藏於賣漿家魏公子無忌從此與二人結交游亷頗為趙將以藺相如為上卿羞不忍為之下宣言曰我見必辱之藺相如望見廉頗引車避匿廉頗聞之肉袒負荆至藺相如門謝罪曰鄙賤之人不知將軍寛之至此也卒相與為歡為刎頸之交張儀始嘗與蘇秦俱事鬼谷先王秦自以不及儀蘇秦已說趙王而得相約從親然恐秦之攻諸侯敗約後負念莫可使用於秦者乃使人微感張儀曰子始與蘇秦善今秦已當路子何不徃游以求通子之願張儀於是之趙上謁求見蘇秦蘇秦乃誡門下人不為通又使不得去者數日已而見之坐之堂下賜僕妾之食因而數讓之曰以子之材能乃自令困辱至此吾寧不能言而富貴子子不足收也謝去之張儀之來也自以為故人求益反見辱怒念諸侯莫可事獨秦能苦趙乃遂入秦蘇秦已而告其舍人曰張儀天下賢士吾殆弗如也今吾幸先用而能用秦柄者獨張儀可爾然貧無因以進吾恐其樂小利而不遂故召辱之以激其意子為我陰奉之乃言趙王發金幣車馬使人微隨張儀與同宿舍稍稍近就之奉以車馬金錢所欲用為取給而弗告張儀遂得以見秦惠王惠王以為客卿與謀伐諸侯蘇秦之舍人乃辭去張儀曰頼子得顯方且報德何故去也舍人曰臣非知君知君乃蘇君蘇君憂秦伐趙敗從約以為非君莫能得秦柄故感怒君使臣陰奉給君資盡蘇君之謀今君已用請歸報張儀曰嗟乎此吾在術中而不悟吾不及蘇君明矣吾又新用安能謀趙乎為吾謝蘇君蘇君之時儀何敢言且蘇君在儀寧渠能乎宋玉楚大夫初因其友無姓名而見於楚襄王襄王待之無以異宋玉讓其友其友曰夫薑桂因地而生不因地而辛婦人因媒而嫁不因媒而親子之事主未爾何怨於我宋玉曰不然昔者齊有良兎曰東郭俊蓋一旦而走五百里於是齊亦有良狗曰韓盧亦一旦而走五百里使之遙見而指屬則雖韓盧不及衆兎之塵若躡跡而縱緤則雖東郭俊亦不能離今子之屬臣也夫躡跡而縱緤與遙見而指屬與漢陳餘年少父事張耳與為刎頸交刎斷也刎頸交蓋言託契深重雖斷頸絶頭無所顧也後封代王相趙龔勝字君賓龔舍字君倩皆楚人相友並著名節故時號之楚兩龔勝位至大中大夫歸老於鄉里舍拜光禄大夫不起張釋之為廷尉持法平允中尉條侯周亞夫與梁相山都侯王恢咸結為親友繇此天下稱之汲黯善灌夫鄭當時及宗正劉棄疾黯位至主爵都尉蕭育為人嚴猛尚威居官數免稀遷少與陳咸朱博為友著聞當世徃者有王陽貢禹故長安語曰蕭朱結綬王貢彈冠言其相薦逹也始育與陳咸俱以公卿子顯名咸最先進年十八為左曹二十餘為御史中丞時朱博尚為杜陵亭長為咸育所攀援入王氏後遂並歴刺史郡守相及為九卿而博先至將軍上卿歴位多於咸育遂至丞相育與博後有隙不能終故世以交為難矣何武以射䇿甲科為郎與翟方進交志相友王吉與貢禹為友世稱王陽在位貢公彈冠彈冠者言入仕也言其取舍同也吉位諫議大夫傅喜封高武侯與鄭𤣥同門學相友善同門謂同師也陳遵少與張竦俱為京兆史竦博學通逹以廉儉自守而遵放縱不拘操行雖異然相親友哀帝之末俱著名字為後進冠為後進人士之冠首也後漢趙憙友善韓伯仲等數十人位太傅杜林字伯山與馬援同鄉里素相親厚援從南方還林馬適死援令子持馬一匹遺林曰朋友有車馬之饋可具以僃之林受之居數月林遣子奉書曰將軍内施九族外有賓客望恩者多林父子兩人食列卿禄嘗有盈今送錢五萬援受之謂子曰人當以此為法是杜伯山所以勝我也林位司空冦恂從光武破羣賊數與鄧禹謀議恂竒之因奉牛酒共交歡恂位執金吾臯𢎞為揚州從事家代為吳郡冠族少有英才與桓榮相善廉范與雒陽慶鴻為刎頸交時人稱曰前有管鮑後有慶廉范位至蜀郡太守孔僖曾祖父子建少遊長安與崔篆友善僖與篆孫駰復相友善僖位臨津令尹敏與班彪親善每相遇輒日旰忘食夜分不寢自以為鍾期伯牙莊周惠施之相得也敏位長安令梁鴻友人京兆高恢少好老子隠於華陰山中及鴻東游思恢作詩曰鳥嚶嚶兮友之期念高子兮僕懷思想念恢兮愛集兹二人遂不復相見恢亦高抗終身不仕王符安定臨涇人少好學有志操與馬融竇章張衡崔瑗等並友善馬實字伯騫勤結英雄所欲友接負笈荷擔不逺萬里山陽王暢未仕時實慕高名徃存之留暢門投刺暢欲不肯見使從者拒之云行歴未旋實留連日日徃伺之謂從者曰夫孝子事親行不踰日而至今不歸非孝子也欲待與相見如㐫於路徃而不返哭之以為死交暢聞其言歎息壯志因執其手揖行與入美談畢請入見母飮宴定好而見别陳重少與同郡雷義為友俱學魯詩顔氏春秋太守張雲舉重孝廉重以讓義前後十餘通記雲不聽義明年舉孝廉重與俱在郎署後俱拜尚書郎義坐事黜退重見義去亦以病免又云雷義舉茂才讓於陳重刺史不聽義遂徉狂披髮走不應命鄕里為之語曰膠漆自謂堅不如陳與雷也范冉冉或作丹陳留外黄人少為郡小吏與王奐親善奐後為考城令境接外黃屢遣書請冉冉不至及奐遷漢陽太守將行冉乃與弟協歩齎麥酒於道側設壇以待之冉見奐車徒絡驛遂不自聞惟與弟共辯論於路奐識其聲即下車與相揖對奐曰行路倉卒非陳闊之所可共到前亭宿息以敘分隔冉曰子前在考城思欲相從以賤質自絶豪友爾今子遠適千里㑹面無期故輕行相候以展訣别如其相追將有慕貴之譏矣便起告違拂衣而去奐瞻望弗及冉長逝不顧范式一名汜字巨卿少游太學為諸生與汝南張劭為友劭字元伯二人並告歸鄉里式謂元伯曰後二年當還將過拜尊親見孺子焉乃共尅期日後期方至元伯具以白母請設饌以候之母曰二年之别千里結言爾何相信之審邪對曰巨卿信士必不乖違母曰若然當為爾醖酒至其日巨卿果到升堂拜飮盡歡而别式仕為郡功曹後元伯寢疾篤同郡郅君章殷子徵晨夜省視之元伯臨盡歎曰恨不見吾死友子徵曰吾與君章盡心於子是非死友復欲誰求元伯曰若二子者吾生友爾山陽范巨卿所謂死友也尋而卒式忽夢元伯𤣥冕垂纓屣履而呼曰巨卿吾以某日死當以某時葬永歸黃泉子未我忘豈能相及式怳然覺悟悲歎泣下具告太守請徃奔䘮太守雖心不信而重違其情許之式未及到而䘮已發引旣至壙將窆而柩不肯進其母撫之曰元伯豈有望耶遂停柩移時乃見有素車白馬號哭而來其母望之曰是必范巨卿也巨卿旣至叩䘮言曰行矣元伯死生路異永從此辭㑹葬者千人咸為揮涕式因執紼而引柩於是乃前式遂留止冢次為修墳樹然後乃去崔瑗與扶風馬融南陽張衡特相友好瑗位濟北相吳祐字季英陳留長垣人舉孝廉將行郡中為祖道祐越壇共小史雍丘黄真歡語移時與結友而别功曹以祐倨請黜之太守曰吳季英有知人之明卿且勿言真後亦舉孝廉除新蔡長世稱其清節時公沙穆來游太學無資糧乃變服客傭為祐賃舂祐與語大驚遂共定交於杵臼之間祐以光禄四行遷膠東侯相時濟北戴宏父為縣丞宏年十六從左丞舍祐每行園常聞諷誦之音竒而厚之亦與為友卒成儒宗知名東夏官至酒泉太守申屠蟠友人陳羣馮雍坐事繫獄豫州牧黄琬欲殺之或勸蟠不肯行曰黄子琰琬之字也為吾故邪未必致罪如不用吾言雖徃何益琬聞之遂免雍罪蟠累徵不起荀淑博學有高行與李固李膺同志友善淑位朗陵侯相張皓字叔明治律春秋游學京師與廣漢鐔深漢中李郃蜀郡張霸共結為友善皓位司空宋楊女為章帝貴人被譖自殺楊免歸本郡郡縣因事復捕繫之楊友人前懷令山陽張峻左馮翊沛國劉均等奔走觧釋得以免罪逢萌北海都昌人與同郡徐房平原李子雲王君公相友善萌初為亭長後連徵不起岑晊南陽棘陽人有高才郭林宗朱公叔等皆為友晊後州郡察舉三府交辟並不就李膺性簡亢無所交接唯與同郡荀淑陳寔為師友位長樂少府李燮廉方自守所交皆舍短取長好成人之美時潁川荀爽賈彪雖俱知名而不相能燮並交二子情無適莫世稱其平正位河南尹趙岐亡命賣餅北海市中孫嵩游市見岐遂以俱歸嵩先入白母曰出行乃得死友迎入上堂饗之極歡藏岐複壁中數年位太常韓説舉孝廉與議郎蔡邕友善位江夏太守王烈太原人以潁川陳太丘為師二子為友時潁川荀慈明賈偉節李元禮韓元長皆就太丘學見烈器業過人歎服所履亦與相親繇是英名著於海内烈舉孝廉三府辟並不就郭㤗字林宗游於雒陽始見河南尹李膺膺大竒之遂相友善於是名震京師後歸鄉里衣冠諸儒送至河上車數千兩林宗唯與李膺同舟而濟衆賓望之以為神僊焉泰徵有道不就王允太原祁人也世仕州郡為冠蓋同郡郭林宗嘗見允而竒之曰王生一日千里王佐才也遂與定交位司徒陳羣字長文紀之子也魯國孔融才高倨傲年在紀羣之間先與紀友後與羣交更為紀拜繇是顯名仕魏至司空范康少受業太學與郭林宗親善位太山太守何顒與陳蕃李膺善時為宦者所䧟乃改姓名亡匿汝南間所至皆親其豪傑有聲荆豫之域袁紹慕之私與徃來結為奔走之交後辟司空府楊政嘗過馬武稱疾見政􅍟几據牀欲令政拜牀下入户前排武徑上牀坐武恨言語不懌政因把武臂責之曰卿蒙恩稱籓臣不思求賢報國而驕天下英俊㑹信陽侯至責數武乃合為朋友位左中郎將許鴻卿汝南人與同郡周伯靈交友伯靈早亡鴻卿養育其子閔仲叔恬靜養神弗役於物與周黨相友黨每與仲叔共含菽飮水以博士徵不就應順字華仲汝南人少與同郡許敬善敬家貧親老無子為敬去妻更娶位將作大匠袁紹好游俠與張孟卓何伯求吳子卿許子逺伍德瑜等皆為奔走之友紹位至冀州牧禰衡平原人建安初游許下孔融深愛其才衡始弱冠而融年四十遂與為交友魏傅嘏字蘭石自少與冀州刺史裴徽散騎常侍荀甝善徽甝早亡又與鎮北將軍何曾司空陳泰尚書僕射荀顗後將軍鍾毓並善相與綜朝事俱為名臣嘏位尚書僕射鍾繇荀攸相與親善攸先亡子㓜繇經紀其門户欲嫁其妾與人書曰吾與公逹攸字也曾共使朱建平相建平曰荀君雖少然當以後事付鍾君吾時啁之曰唯當嫁卿阿驚耳何意此子竟早殞没戲言遂驗乎今欲要嫁阿驚得善處追思建平之妙雖唐舉許負何以復加也繇位至太傅王凌與司馬朗賈逵友善位太守袁霸陳郡扶樂人渙從弟魏初為大司農與同郡何䕫並知名於時而霸子亮䕫子曾與渙子侃復齊聲友善杜恕為散騎黄門侍郎時李豐為常侍黄門郎袁侃見轉為吏部郎荀侯出為東郡太守二人皆恕之同班友善王朗𢎞通有性實與東平右姓王惠陽為碩交惠陽親拜朗母於其牀下朗旣仕至二千石而惠陽亦歴長安令酒泉太守故時人謂惠陽外似麤疏而内堅密能不顧朗之本末事朗母如己母為通度也華歆與北海邴原管寕俱游學三人相善時人號三人為一龍歆為龍頭原為龍腹寧為龍尾歆位太尉陳矯為郡功曹使過泰山泰山太守東郡薛悌異之結為親友戲謂矯曰以郡吏而交二千石鄰國君屈從陪臣游不亦可乎悌後為魏郡及尚書令皆承代矯蜀許靖汝南人始兄事潁川陳紀與陳郡袁煥平原華歆東海王朗等親善靖入蜀為司徒歆朗及紀並靖子羣魏初為公輔大臣咸與靖書申陳舊好情義欵至司馬徽字德操嘗造龎德公值其渡沔上祀先人墓德操徑入其室呼德公妻子使速作黍徐元直向云有客當來就我與龎公譚其妻子皆羅列拜於堂下奔走供役須臾德公還直入相就不知何者是客也德操年小德公十歳兄事之呼作龎公故世人遂謂龎公是德公名非也諸葛孔明毎至龎德公家獨拜牀下德公初不令止向朗字巨逹少師事司馬德操與徐元直韓德高龎士元皆親善位至丞相長史張裔蜀郡成都人也少與犍為楊恭友善位輔漢將軍張飛字益德少與關侯俱事先主關年長數歲飛兄事之位車騎將軍張嶷巴郡南充國人召為從事郡内士人龔祿姚伷位二千石當世有聲名皆與嶷友善徐庻字元直先名福福與石韜字廣元相親愛初平中中州兵起乃與韜南客荆州到又與諸葛亮特相善及荆州内附孔明與先主相隨去福韜俱來北至黄初中韜仕歴郡守典農校尉福至右中郎將御史中丞逮太和中諸葛亮出隴右聞元直廣元仕財如此乃歎曰魏殊多士邪何彼二人不見用乎楊戲性雖簡惰省畧未嘗以丼言加人然篤於故舊與巴西韓儼黎韜童㓜相親厚後儼痼疾廢頓韜無行見捐戲經紀振䘏恩好如故位射聲校尉吳張昭字子布與瑯琊趙昱東海王朗俱發名友善位輔吳將軍陸績字公紀時虞翻舊齒名盛龎統荆州令士年亦差長皆與績友善位偏將軍魯肅臨淮人也家富於財周瑜為居巢長將數百人故過候肅并求資糧肅家有兩囷米各三千斛肅乃指一囷與周瑜瑜益知其竒也遂相親結定僑札之分肅後使荆州到當陽與劉僃㑹時諸葛亮與相隨肅謂亮曰我子瑜友也卽共定交肅卒諸葛亦為發哀位横江將軍吕蒙為偏將軍領潯陽令魯肅代周瑜當之夏口過蒙屯下肅意尚輕蒙問肅曰與雲長為鄰將何計畧因為肅畫五䇿肅拊其背曰吕子明吾不知卿才畧所及乃至於此也遂拜蒙母結友而别聶友字文悌豫章人為郡功曹使至都諸葛恪友之時論謂顧子嘿子真其間無所復容恪欲以友居其間繇是知名顧邵為豫章太守初錢塘丁諝出於役伍陽羡張秉生於庻民烏程吳粲雲陽殷禮起乎微賤邵皆㧞而友之秉遭大䘮親為制服結絰邵當之豫章發在近路值秉疾病時送者百數邵辭賓客曰張仲節秉之字也有疾苦不能來别恨不見之暫還與訣諸君少時相待張溢為中郎聘蜀與諸葛全結金蘭之好嚴畯避亂江東與諸葛瑾歩隲齊名友善性質直純厚其於人物忠告善道志存補益位尚書令陳表少知名與諸葛恪顧譚張休等並侍東宫皆共親友尚書曁豔亦與表善位偏將軍吳範為人剛直頗好自稱然與親故交接有終始素與魏滕同邑相善滕嘗有罪大帝責怒甚嚴敢諫者死範謂滕曰與汝偕死滕曰死而無益何用死為範曰安能慮此坐觀汝邪乃髠頭自縳詣門下使鈴下以聞鈴下不敢曰必死不敢白範曰汝有子邪曰有曰使汝為吳範死子以屬我鈴下曰諾乃排閤入言未卒帝大怒欲便投以㦸逡廵走出範因突入叩頭流血言與涕並良乆意釋乃免滕滕見範謝曰父母能生長我不能免我於死丈夫相知如汝足矣何用多為位太史令吳祺與張温顧譚友善孫皎為征虜將軍善於交結與諸葛瑾至厚位征虜將軍吕岱親近吳郡徐原慷慨有才志岱知其可成賜巾褠與共言論後遂薦㧞官至侍御史原性忠壯好直言岱時有得失原輒諫諍又公論之人或以告岱岱歎曰是我所以貴德淵者也及原死岱哭之甚哀曰德淵吕岱之益友今不幸岱復於何聞過譚者美之位大司馬鄭曹有文學操行與陸雲善與雲時相往反高岱字孔文受性聰逹輕財貴義其友士㧞竒取於未顯所友八人無名氏皆世之英偉也冊府元龜卷八百八十一
