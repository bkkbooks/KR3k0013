body:
  text: 冊府元龜卷三百九十八宋王欽若等撰將帥部明天時擇地利撫士卒㝠助明天時執筒律以聼軍聲觀天文以察時變蓋吉凶之將至必朕兆之豫彰雖子産謂天道焉知鄭不復火而師曠歌南風弗競楚果無功故有推轂授符受詔引𨗳察隂陽之變辨星緯之祥避危就安候敵觀變若能旁擇地利兼取人和先勝而行何往弗利周太公從武王伐紂到邢丘軛折為三天雨三日不休武王懼召太公而問之曰紂未可伐乎太公曰不然軛折為三者軍當分為三也天雨三日欲洗吾兵也晉祖逖為鎮西將軍有妖星見於豫州之分逖見星曰為我矣方平河北而天欲殺我此乃不祐國也俄卒於雍丘謝艾為前凉張重華將石季龍遣將王擢麻秋等侵重華艾引兵出振武夜有二梟鳴于牙中艾曰梟邀也六博得梟者勝今梟鳴牙中克敵之兆也於是進戰大破之秋遣王擢畧地至於曲桞艾臨之艾建牙旗盟將士時索遐為軍正將軍有西北風吹旌旗東南指遐曰風為號令今能令旗指之天所贊也破之必矣軍次神鳥王擢與前鋒戰敗遁還河南南齊張欣泰武帝永明八年出為鎮軍中兵叅軍南平内史巴東王子響殺僚佐帝遣中庻子胡諧之西討使欣㤗為副欣㤗謂諧之曰今太嵗在西南逆嵗行兵兵家深忌不可戰戰必見危將軍此行勝既無名負誠可耻彼兇狡相聚所以為其用者或利賞逼威無繇自潰若且頓軍夏口宣示禍福可不戰而擒也諧之不從進屯江津尹略等見殺北齊曹魏祖為殿中將軍神武為東魏大將軍東魏孝静武定四年八月將西伐自鄴㑹兵於晉陽魏祖曰不可今八月西方王以死氣逆生氣為客不利主人則可兵果行傷大將軍神武不從九月神武圍玉壁五旬不㧞死者七萬人十一月神武輿疾班師隋長孫晟為上開府儀同三司鎮大利安撫新附髙祖仁夀元年晟表奏曰臣夜登城樓望見磧北有赤氣長百餘里皆如雨足下垂彼地謹驗兵書此名灑血其下之國必且破亡欲滅匈奴宜在今日詔楊素為軍元帥晟為受䧏使北伐二年軍次坎河值賊帥思力侯斤等領兵拒戰與大將軍梁黙擊走之轉戰六十里賊衆多䧏唐薛萬均為左屯衛將軍沃沮道行軍副總管從李靖等擊吐谷渾攻青海與弟萬徹率軍先通路遇虜于赤水萬均將十數騎擊走之追奔至青石山南大風折旗㧞木萬均謂左右曰虜將至矣各為備俄而虜至萬均直前斬一賊將於是大潰殺傷略盡進至圖倫磧而還與靖㑹於青海太宗聞而大悦璽書勉勞以功拜左屯衛大將軍薛仁貴為右威衛大將軍髙宗咸亨元年吐蕃入㓂帝以仁貴為邏娑道行軍大總管為吐蕃敗于大非川初仁貴謂人曰今年太嵗庚午嵗星在於䧏婁不應有事於西方軍行逆嵗鄧艾所以死于蜀吾知其必敗也裴行儉為禮部尚書尤曉隂陽算術兼有人倫之鑑凢遇賢俊無不甄採每制敵推兇必先期捷日調露元年突厥阿史徳温傅反髙宗以行儉為定襄道行軍大總管軍至單于之北際晩下營壕塹方周遽令移就崇岡將士皆云士衆已就安堵不可勞擾行儉不從更令促之比夜風雨暴至前設營所水深丈餘將吏驚伏問行儉曰何以知風雨也行儉笑曰自今日但依我節制何湏問我所由知也李晟德宗時為河中晉綘慈隰節度使京畿渭北鄜坊丹延招討使進討朱泚建中四年四月四日破賊初晟屯渭橋時熒惑守嵗久之方退賔介或勸曰今熒惑已退皇家之利也可速用兵晟曰天子外次人臣但當死節垂象髙逺吾安知天道耶至是謂叅佐曰前者士大夫勸晟出兵非敢拒也且軍可用之不可使之嘗謂五緯盈縮無准晟懼復來守嵗則我軍不戰而自潰矣叅佐嘆服皆曰非所及也後唐符存審為内外蕃漢馬歩總管莊宗天祐十七年汴將劉鄩攻同州朱友謙求援於我遣存審與嗣昭將兵赴之九月次河中進營朝邑時河中久臣於梁衷持兩端及諸軍大集芻粟暴貴嗣昭懼其翻覆將急戰以定勝負居旬日梁軍將逼我營㑹望氣者言西南有黒氣如闘鷄之狀當有戰陣存審曰我方欲决戰而形於氣象得非天贊歟是夜閲其衆詰旦進軍梁軍來逆戰大破之擇地利孟子曰天時不如地利孫子有六地之名而鼂錯亦論地形之便皆可舉矣古之良將未嘗不留意焉乃有據髙臨下伺其後至背水阻洲候其半渡或卒乗有飲齕之便或守城有金湯之固至乃出其不意據其必爭然後以逸待勞以少擊衆乗便而奮其力先人而奪其心以之遏㓂虐摧勍敵而勲績竝建威名日著豈非因形勢而制勝之效歟趙趙奢恵文王時治國賦秦師伐韓圍閼與趙遣奢救之軍士許歴曰先據北山上者勝後至者敗奢許諾即發萬人趨之秦兵後至爭山不得上奢縱兵擊之大破秦軍觧而走遂觧閼與之圍而歸王賜奢號馬服君以許歴為國尉漢張騫為校尉從大將軍擊匈奴騫嘗使大夏留匈奴中久道軍知善水草處軍得以無飢渴後漢馮異為征西大將軍建武六年諸將上隴為隗囂所敗乃詔異軍栒邑未及至隗囂乗勝使其將王元行廵將二萬餘人下隴因分遣廵取栒邑異即馳兵欲先據之諸將皆曰虜兵盛而新乗勝不可與争宜止軍便地徐思方略異曰虜兵臨境忸忕小利忸忕猶慣集也謂慣習前事而復為之也遂欲深入若得栒邑三輔動揺是吾憂也夫攻者不足守者有餘今我據城以逸待勞非所以争也濳往閉城偃旗鼓行廵不知馳赴之異乗其不意卒擊鼓建旗而出廵軍驚亂奔走追擊數十里大破之馬援為隴西太守建武十三年武都参狼羌與塞外諸種為冦殺長吏援將四千餘人擊之至氐道縣氐道屬隴西郡縣管蠻夷曰道羌在山上援軍據便地奪其水草不與戰羌遂窮困豪帥數十萬户亡出塞諸種萬餘人悉䧏於是隴右清靜二十四年援率中即將馬武耿舒孫永等征五溪蠻夷軍次下嶲縣名屬長沙故城在辰州沅陵縣有两道可入從壺頭則路近而水嶮壺頭山名在辰州沅陵縣從充則塗夷而運逺充縣名屬武陵光武初以為疑及軍至耿舒欲從充道援以為棄日費糧不如進壺搤其喉咽充賊自破以事上之帝從援䇿魏蔣濟為散騎常侍黃初三年與大司馬曹仁征吳濟别襲羡溪仁欲攻濡湏洲中濟曰賊據西岸列船上流而兵入洲中是為自内地獄危亡之道也仁不從果敗賈逵河東襄陵人初為綘州邑長郭援之攻河東所經城邑皆下逵堅守之初逵過皮氏曰爭地先據者勝及圍急乃使人間行送印綬歸郡且曰急據皮氏援既并綘衆將進兵逵恐其先得皮氏乃以他計疑援謀人祝奥援由是留七日郡從逵言故得無敗郭淮初為征西將軍夏侯淵司馬征漢中時蜀先主欲渡漢水來攻諸將議衆寡不敵欲依水為陣以拒之淮曰此示弱而不足挫敵非算也不如逺水為陣引而致之半濟而攻擊備可破也既陣先主疑不渡淮遂堅守亦無還心以狀聞太祖善之青龍二年蜀將諸葛亮出斜谷屯于蘭坡是時司馬宣王屯渭南淮䇿亮必爭北原宜先據之議者多謂不然淮曰若亮跨渭登原連兵北山隔絶隴道揺盪民夷此非國之利也宣王善之淮遂屯北原塹壘未成蜀兵大至淮逆擊之吳丁奉為諸葛恪部將魏諸葛誕胡遵等來伐攻東興恪率軍拒之及恪上岸時奉與唐咨吕據苖贊俱從山西上奉曰今軍行遲若敵據便地則難與爭鋒矣乃辟諸軍使下道率麾下三千人逕進時風便舉㠶二日至遂據徐塘天寒雪時魏諸將置酒髙㑹奉見其前部兵少相謂曰取封侯爵賞正在今日乃使兵觧鎧著胄持短兵敵人從而笑焉不為設備奉縱兵斫之大破敵前屯㑹據等至魏軍遂潰宋孟龍符仕晉為龍驤將軍從宋髙祖伐慕容超度峴超懼率卒四萬就其將叚暉等于臨胊謂其將公孫樓曰宜進據川源晉軍至而失水亦不能戰矣臨朐有巨蔑水去城四十五里樓馳騎據之龍符争據水源賊遂遁走沈林子晉末為建武將軍髙祖伐姚泓林子叅征西軍事統軍為前鋒從汴入河泓并州刺史河東太守尹昭據蒲坂林子於陜城與冠軍檀道濟同攻蒲坂龍驤王鎮惡攻潼關泓聞大軍至遣東平公姚紹争據潼關林子謂道濟曰潼關天阻所謂形勝之地鎮惡孤軍勢力危屈若使姚紹據之則難圖也及其未至當并力争之若潼關事㨗尹昭可不戰而服道濟從之乃棄蒲坂南向潼關後魏安同為外朝大人從道武征姚平於紫壁姚興悉衆救平同進計曰汾東有蒙坑東西三百餘里徑路不通姚興來必從汾西乗髙臨下直至紫壁如此則冦内外勢接宜截汾為南北浮橋乗西岸築圍西圍既固賊至無所施其智力矣從之興果視平屠滅而不能救後周李弼初為太祖部將東魏將齊神武伐西魏軍過蒲津渉雒至許原西魏將周文帝軍至沙苑齊神武聞文帝至引軍來㑹詰朝候騎告齊神武軍且至弼曰彼衆我寡不可平地置陣此東十里有渭曲可先據以待之遂軍至渭曲背水東西為陣合戰大破之隋賀婁子幹為上開府鎮蘭州開皇初突厥來㓂子幹拒之至可洛峐山與賊相遇賊衆甚盛子幹阻川為營賊軍不得水數日人馬甚憊縱擊大破之唐盛彥師武徳初鎮宜陽㑹李宻叛彥師率兵邀之令其衆曰唯我馬首是瞻遂踰雒水入南山令持弓弩者乗髙夾路持刀楯者伏於谿谷之間又令曰待賊半渡而擊之所部皆笑曰賊向雒州何為守此彥師曰吾籌之熟矣李宻聲往雒州其實欲南走襄城就張善相耳若賊先入谷我自後追之路險難以展力吾今先據要害此賊乃成擒也宻果至知有伏兵乃踰山南上彥師邀擊之薛萬鈞武徳中與羅藝守幽燕時竇建徳率衆十萬至危水萬鈞謂藝曰衆寡不敵今若出闘百戰百敗可令羸馬阻水背城為陣以誘之賊若渡水交兵請公以精騎百人伏於城側待其半渡而擊之破賊必矣藝從之建徳引兵渡水萬鈞擊破之周王峻為樞宻使廣順初河東劉旻攻晉州峻請行應援太祖用為行營都部署峻領大軍自綘赴晉州州南有澗曰蒙坑霍山以南最為險要其途甚狹地道無由得越峻心憂賊據之是日前鋒數報過蒙坑峻喜曰吾事濟矣撫士卒春秋傳曰禮樂慈愛衆所蓄也又曰惠則足以使人蓋古之善為將者曷甞不勤恤士衆察其勞苦絶甘而分少表㣲而惻隱救其􅂒瘵軫其傷夷本之於仁心推之以寛政好施以周急後已而不私用能猛鷙思柔獷悍懐徳百其勇以思報一其志以赴敵摧鋒冐難推堅若脆忘軀畢命視死如歸成茂功於一時垂休聞而不已自非觴豆之恵均及椒蘭之徳外薫誠眀發於精衷恩信淪於骨髓亦安能及是哉田穰苴為齊將扞燕晉之師士卒次舍井竈飲食問疾醫藥身拊循之悉取將軍之資糧享士卒身與士卒平分糧食最比其羸弱者三日而後勒兵病者皆求行争奮出為之赴戰晉師聞之為罷去燕師渡水而觧吳起為魏將與士卒最下者同衣食卧不設席行不騎乗親裹嬴糧與士卒分勞苦卒有病疽者起為吮之卒母聞而哭之人曰子卒也而將軍自吮其疽何哭為母曰非然也往年吳公吮其父戰不旋踵遂死於敵吳公今又吮其子妾不知其死所矣是以哭之文侯以起善用兵亷平盡能得士心乃以為西河守以拒秦韓李牧為趙北邊良將嘗居代鴈門備匃奴以便宜置利市租皆輸入莫府將軍征行無常處所在為治故言莫府莫大也為士卒費日擊數牛饗士習騎射謹烽火多間諜厚遇戰士秦王翦代李信擊荆荆聞王翦益軍而來乃悉國中兵以拒秦翦至堅壁而守之不肯戰荆兵數出挑戰終不出翦日休士洗沐而善飲食撫循之親與士卒同食乆之翦使人問軍中戲乎對曰方投石超一作枚距漢書甘延夀投石拔距絶於等倫范蠡兵法飛石重十二斤為機發行三百歩延夀有力能手投之距超距也於是翦曰士卒可用矣竟滅楚漢袁盎為隴西郡尉仁愛士卒士卒皆争為死李廣程不識俱為邊將然匈奴畏廣士卒多樂從而苦程不識廣將兵之絶處見水士卒不盡飲不近水不盡飱不嘗食寛緩不苛苛細也士以此爱樂為用蓋寛饒為衞司馬躬撫士卒視其飲食居處撫循疾置醫藥後漢王霸從光武平河北嘗與臧宫傅俊共營霸獨善撫士卒死者脱衣以殮之傷者躬親以養之鄧訓為將吏士嘗大病瘧轉易至數人訓身為之煑湯藥咸得平愈其無妻者為適配偶堅鐔為揚化將軍與右將軍萬修徇南陽㑹諸鄉人董訢數攻陷宛鐔引兵赴宛訢遂棄城而反鄧奉復反新野攻破吳漢萬修病卒鐔獨孤絶南拒鄧奉北當董訢一年間道路隔塞糧饋不至鐔食蔬菜與士卒共勞苦每急輙先當矢石身被三創以此能全其衆段紀明為破羌將軍紀明行軍仁爱下士軍間病者親自瞻省手為裹創在邊十餘年未嘗一日蓐寢與將士同苦故皆樂為死戰皇甫規為中即將討隴右而道路隔絶軍中大疫死者十三四規親入菴廬廵視將士三軍感恱東羌遂遣使乞䧏皇甫嵩為左車騎將軍平黃巾温䘏士卒甚得衆情每軍行頓止湏營幔修立然後就舍帳軍士皆食爾乃嘗飯吏有因事受賂者嵩更以錢物賜之吏懐慙或至自殺臧洪領青州刺史為袁紹所攻糧盡主簿啟内厨米三斗稍為饘粥洪曰何能獨食此耶使為薄粥遍頒人衆又殺其愛妾以食兵將兵將咸流涕無能仰視魏司馬朗與夏侯惇臧霸等征吴到居巢軍士大疫朗躬廵視致醫藥遇疾卒曹真為大將軍每征行與將士同勞苦軍賞不足輙以家財頒賜士卒皆願為用蜀鄧芝為大將軍二十餘年賞罰眀斷善䘏卒伍吳孫歆為邊將數十年善養士卒得其死力甘寕雖麤猛好殺然開爽有計略輕財敬士能厚養徤兒亦樂為用命晉劉𢎞為鎮南將軍都督荆州諸軍事嘗夜起聞城上持更者嘆聲甚苦呼省之年過六十羸疾無襦𢎞謫主者仍給常袍複帽陶侃為督䕶領江夏太守侃戎政齊肅凢有虜獲皆分士卒身無私焉周訪為安南將軍督梁州諸軍事善於撫納士衆皆為致死宋王鎮惡隨髙祖北伐時姚泓屯軍在長安城下猶數萬人鎮惡善撫士卒及身先士衆騰躍争先泓衆一時奔潰劉榮祖為輔國將軍為人輕財貴義善撫將士梁楊公則為左衛將軍義師東下屯領軍府所領相溪人性怯懦城内輕之以為易與每出盪突輙先犯公則壘公則奬勵將士尅獲更多馬仙琕自為將及居州郡能與士卒同勞逸身衣不過布帛所居無帷幕衾屏行則飲食與厮養最下者同其在邊境嘗單身濳入敵境知壁壘村落險要處所故戰多尅捷士卒亦甘心為之用髙祖雅爱敬服之王操為大將軍郢州刺史吳眀徹為㓂明帝出頓紀南操撫循將士莫不用命眀徹既退江陵獲全操之力也遷為侍中中衞將軍陳章昭逹為車騎大將軍遷司空薨昭逹性刻每奉詔出征必晝夜兼行然㕑膳飲食竝同於羣下將士亦以此附之魯悉逹梁末以侯景之亂遂糾率鄉人保新蔡郡招緝晉熈等五郡及敬帝即位王琳據有上流留異余孝頃周廸等所在蠭起悉逹撫綏五郡甚得民和士卒皆樂為之用後魏彭城公勃長子粟太武時督諸軍屯漢南粟亮直善馭衆撫䘏將士必與之同勞逸長孫翰太武時為安集將軍清正嚴眀善撫將士帝甚重之周觀為髙平鎮將善撫士卒號有威名房伯玉為武昌王府司馬孝文南伐徵為歩兵校尉直閣將軍中統軍善撫士卒孝文嘉之薛虎子為徐州刺史在州戍兵每嵗交代虎子必親自勞送喪給其斂帛韓茂為徐州刺史征南將軍為將善於撫衆勇冠當世為朝廷所稱楊逸為平東將軍光州刺史兵人從役必自送之或風日之中雨雪之下不堪其勞逸曽無倦色楊大眼為將撫廵士卒呼為小兒子及傷痍為之流涕辛纂為荆州軍司除驍騎將軍加輔國將軍善撫將士人多用命賊甚憚之北齊蘭陵王長恭貌柔心壯音容兼美為將躬勤細事每得甘美雖一𤓰數果必與將士共之趙郡王叡為定州刺史文宣詔叡領山東兵數萬監築長城于時盛夏六月叡在途中屏除蓋扇親與軍人同其勞苦而定州先有氷室每嵗藏氷長史宋欽道以叡冐犯暑熱遂遣轝氷倍道追送正值日中停車炎赫尤甚人皆不堪而送氷者至咸謂氷此時之要叡乃對之嘆息云三軍之人皆飲温水吾以何義獨進寒氷非追古名將實情所不忍遂至消液竟不一嘗兵人感悦遐邇稱歎後周宇文深魏末為大都督領宿衞兵卒孝武西遷既事起倉卒人多逃散撫循所部竝得入關以功賜爵長樂縣伯若干恵為右衞將軍性剛直有勇力容貌魁岸善于撫御將士莫不懐恩閻慶為撫軍將軍專行綏撫士卒未休未嘗先舍故能盡其死力梁椿為大將軍性果毅善於撫納所獲賞物分賜麾下故每踐敵場咸得其死力李遷哲為驃騎大將軍鎮白帝信州城先無倉儲信州今瓊州是也軍糧乏遷哲乃收葛根造粉兼米以給之遷哲亦取供食時有異膳即分賜兵士有疾患者又親加醫藥以此軍人感之人思効命隋劉方為交州道行軍總管仁而愛士有疾病者親自撫養唐李勣前後在軍所得金帛皆散之將士於是人皆為用所向多克捷郭孝恪為安西都䕶督西伊庭三州諸軍事其地髙昌之都限以長磧舊風斯在每年有流刑經往并州遣正兵守捍孝恪推誠撫御竝得其歡心成如璆為特進至徳二年関西節度郭英乂為賊所敗如璆代英乂收其餘卒於岐山撫其瘡痍招其逋散三軍之士有如挾纊便以其衆置興平軍於郿縣東原肅宗以如璆為使李芃為河陽三城鎮遏使撫勞備至資廪膳者必先軍士李景略為西受䧏城都防禦使廹塞苦寒地鹵瘠俗貧難處景略節用約已與士同甘苦將卒安之任廸簡代張茂昭為易定節度使初茂昭奢蕩不節公私殫罄廸簡始至欲饗士無所取給乃以糲食與士同之身居㦸門下凡周月軍吏感之請歸堂寢廸簡乃安其位李晟興元初以神䇿軍士討朱泚時轉輸不至盛夏軍士或衣裘褐晟必同勞苦每以大義奮激士皆流涕感悦卒無離叛者李光顔元和中為陳許節度使㑹討吳元濟詔光顔以本軍獨當一靣光顔性忠義善撫養士卒士卒樂為用殷侑為義昌軍節度滄濟徳等州觀察處置等使滄州經戰伐傷痍之後侑初至赤地千里遺骸滿于原野夐無人烟侑不以妻孥之官始至就空城悉力以視事攻苦食淡與士卒略同周嵗之後馴致墾葺詔加檢校吏部尚書奬其撫綏有方勤儉不懈也烏重𦙍歴河陽滄景節度使自為長帥能與下同甘苦所至立功桞公綽元和中鎮鄂州㑹討吳元濟軍既在行營公綽時令左右省其家如疾病養生送死必厚廪給之妻冶容不謹者沉之于江行卒相感曰中丞為我輩之家事何以報效故鄂人戰每克㨗梁氏叔琮為將帥養士愛民甚有能政後為鄜州留後尋領保大軍節度使後唐王建及有膽氣慷慨不羣臨陣鞠旅意氣横壯自莊宗至魏州建及都總内外牙銀鎗效節帳前親軍善於撫御所賞賜皆分給部下絶甘分少頗洽軍情晉吳蠻為復州防禦使二年罷歸㑹王令温以機事入奏執政者以蠻雲中之難有善守之功遂令乗軺而往既至大寒軍士無衣者悉衣之平生亷儉􅌩無資用以至壊帳幕以賙之其推心撫下如此孔知濬開運中為鳯州刺史河池據関防之要宻邛益兵少勢孤知濬撫士得宜人皆盡力故西疆無牧圉之失王廷裔為晉陽軍校以攻城野戰為務暑不息嘉樹之隂寒不處宻室之下與軍伍食不異味居不異適故莊宗於親族之中獨加禮遇㝠助書曰至諴感神蓋精誠内激勝氣焱厲則必金石為開風雲𤣥感者矣乃有握兵之要奉辭致討勢將危窘士至乏困或隣壌侵㓂羣心震恐誓師拒戰安危攸屬繇是懇到憤發仰祈㝠祐因以獲肸蠁之應得天心之助事彰於神異理符於感召夷傷之旅復振窮廹之途獲濟卒能克敵以成茂功乃建祠以旌其貺刋石以紀其迹䇿書所述咸可徵也漢李廣利為貳師將軍伐大宛被圍水絶廣利㧞刀刺山飛泉涌出後漢耿恭為戊巳校尉征匈奴於疏勒城固守匈奴遂於城下擁絶澗水恭於城中穿井十五丈不得水吏士渇乏笮馬糞汁而飲之笮謂壓笮也恭仰天歎曰聞昔貳師將軍㧞刀刺山飛泉涌出今漢徳神眀豈有窮哉乃整衣服向井再拜為吏士禱有頃水泉奔出衆皆稱萬嵗乃令吏士揚水以示虜虜出不意以為神眀遂引去晉㑹稽王道子為驃騎將軍禦符堅于夀春堅與符融登城而望王師見部陣齊整將士精鋭又望八公山草木皆類人形顧謂融曰此亦勍敵也何謂少乎憮然有懼色初朝廷聞堅入㓂道子以威儀鼓吹求助於鍾山之神奉以相國之號及堅之見草木狀神若有力焉宋沈攸之為冠軍將軍討晉安王子勛于鵲尾坡攸之繕治船舸材板不周計無所出㑹子勛將鄧琬送五千片榜供其將劉胡軍用俄而風潮奔迅榜後山出江胡等力不制自撞船艦殺沒數十人赴流而下來泊攸之等營於是材板大足梁王僧愔為譙州刺史征蕭勃聞兄僧辨死乃奔北齊㑹軍敗竄逸荒野莫知所之仰天曰讐耻不雪求欲身膏野草若精誠有感當得道路誓不受辱乃手㧞刀將自刎空中催令急去僧愔異之勉力馳進行一里許顧向處已有陳人踰越江山僅得歸齊後魏尉元為鎮南大將軍都督東道諸軍事皇興三年六月上表云臣於彭城遣别將以八日至睢口邀賊將陳顯達有戰士於營外五里芻牧見一白頭公乗白馬將杖呼之語稱至十八日辰必來到此語汝將軍領衆從東北臨入我當驅賊令走申時賊必大破宿豫淮陽皆尅無疑我當與汝國家淮畔為斷下邳城賊我當驅出不勞兵力後以十日此人復於彭城南戲馬臺東二里見白頭公亦乗白馬從東北來呼此人謂曰我與東海四瀆太山北嶽神共行淮北助汝主將蕩除已定汝上下喜不困忽然不見詔元於老人前後見所為壇表記之爾朱榮為大將軍討葛榮次襄垣遂令軍士列圍大獵有䨇兎起於馬前榮乃躍馬彎弓而誓之曰中之則擒葛榮不中則否既而竝應弦而殪三軍感悦及破賊之後即命立碑於其所號䨇兎碑北齊趙郡王叡為朔州刺史都督北燕等三州諸軍事有無水之處禱而掘井錅鍤纔下泉源湧出號曰趙王泉陸法和初仕梁為司徒時侯景遣將任約伐湘東王於江陵法和自請征之至沙湖與任約相對縱大舫於前而逆風不便法和執白羽扇以麾風即返於是約衆大潰約逃竄不知所之慕容儼為開府天保中梁司徒陸法和以郢州内附遣儼鎮城始入便為梁大都督侯瑱任約率水陸軍奄至城下儼隨方禦備瑱等不能尅又於上流鸚鵡洲上造荻葓竟數里以塞船路人信阻絶城守孤懸衆情危懼儼導以忠義又悦以安之城中先有神祠一所俗號城隍神公私每有祈禱於是順士卒之心乃相率祈請兾獲㝠祐湏臾衝風歘起驚濤湧激漂斷荻葓約復以鐵鏁連治防禦彌切儼還共祈請風浪夜驚復以斷絶如此者再三城中大喜以為神助瑱移軍於城北造柵置營焚燒坊郭産業皆盡約將戰士萬餘人各持攻具於城南置營壘南北合勢儼乃率歩騎出城奮擊大破之擒五百餘人後周竇榮定突厥沙鉢略㓂邊為行軍元帥率總管出梁州與虜戰於髙越原两軍相持地無水士卒渇甚至刺馬血而飲死者十二三榮定仰天太息俄而澍雨軍復振於是進擊數挫其鋒突厥憚之請盟而去隋張祥仁夀末為并州司馬漢王諒舉兵反遣其將劉建略地燕趙至井陘祥勒兵拒守建攻之復縱火燒其郭下祥見百姓驚駭其城側有西王母廟祥登城望之再拜號泣而言曰百姓何罪致此焚燒神有靈可䧏雨相救言訖廟上起雲湏臾驟雨其火遂滅士卒感其誠莫不用心城圍月餘李雄援軍至賊遂退走陳稜大業中為虎賁即將發東陽兵擊琉球國其日霧雨晦暝將士皆懼稜刑白馬以祭海神既而開霽唐裴行儉麟徳中為安撫大食使冊送波斯王途經莫賀延磧屬風沙晦冥導者益迷行儉命下營䖍誠致祭令告將吏井泉非遥俄而雲收雨静行數百歩水草甚豐後來之人莫知其處衆皆悦服比之貳師將軍王晙開元中為并州大都督府長史屬突厥默啜為九姓畨族號所殺其下酋長多欵塞投䧏置之河曲之内俄而小殺繼立小殺畨酋名䧏者漸叛勅晙帥并州兵濟河討之晙乃間行倍道以夜繼畫卷甲捨幕而往㑹夜於山中忽遇風雪甚盛晙恐失期仰天誓曰若事君不忠天討有罪眀靈所殛固自當之而士衆何辜今受難苦若誠心忠烈天鍳孔明當止雪廻風以濟戎事言訖風廻而雪止時叛者分為两道晙追及之殺一千五百餘人生獲一千四百餘人駝馬牛羊甚衆哥舒翰天寳七年為隴右節度築神威城於青海上旋為吐蕃所破又築城於青海中龍駒島上有白龍見遂名為龍應城吐蕃自此遁逃不復近青海十年王思禮肅宗至徳二年四月為関内節度使時北征奏師渡渭水於龍光渡睹水忽淺士馬既濟而其水復深一丈李兼徳宗貞元四年為江西都團練使奏建中四年臣任鄂州刺史逆賊李希烈之將童侍召率衆襲鄂州順風縱火邑屋將焚臣乃禱於城隍神倐忽風廻火烈賊潰遂擊破之連㧞黃沔二州請付史舘以答神意從之楊朝晟貞元中為邠寕節度使城方渠合道初軍次方渠無水師徒囂然遽有青蛇乗髙而下視其跡水隨而流朝晟令築城環之遂為停泉軍人仰飲以足圖其事上聞詔置祠焉温造為興元節度初往漢中遇大雨平地水深尺餘若不可進禱鷄翁山疾風驅雲即時晴霽後文宗聞其事㑹造為御史大夫入見得詳言當時靈貺明日下詔封鷄翁山神為侯趙昶為忠武軍防遏都指揮使時黃巢悉衆攻陳州昶因廵警假寢於闉闍恍惚間如有隂助昶異而恃之遲眀開門决戰人心兵勢又不可遏若有隂兵前導是日擒賊將數人斬首千餘級梁牛存節為同州節度使戒嚴軍旅常若敵至先是州内井水鹹苦人不可飲及并人岐人來廹州城咸以為兵士渇乏陷在旦夕存節乃肅拜䖍祝擇地鑿八十餘井其味皆甘冷繇是人馬汲濯有餘衆以為至誠之感自八月至三年春末人馬未嘗釋甲以至㓂退郴王友裕常從太祖於内黃逢魏之大衆北飛來命友裕射之跪曰今日以卜勝負必應弦而下及交鋒果大㨗袁象先初仕唐為宿州刺史充本州團練都統防遏都知兵馬使㑹淮㓂大至圍廹州城象先殫力禦備時兵未至頗懐憂懼一日乗城憇於樓堞之上怳然若寢夣人告曰我陳蕃也嘗板築是城舊第猶在今為軍舍當為我立廟即助公隂兵象先許之翼日淮㓂急攻其壘梯衝交進是日州城㡬陷頃之有大風雨居民望見城上甲兵無算㓂不敢廹即時退去象先方信有鬼神之助乃為之立祠至今里人禱祝不輟後唐李嗣昭為昭義節度使天祐四年六月梁將李思安將兵十萬攻潞州乃築夾城深溝髙壘内外重復援師不及軍民乏絶感鹽炭之出於地以濟飢民王鎔為鎮州節度使幽州李正威援赴于鎮鎔謁威於其舘威隂遣部下壯甲刼鎔抱持之鎔曰公戒部人勿造次吾國為晋人所侵垂將覆滅賴公濟援之力幸而獲存今日之事本所甘心即竝轡歸府舍鎔軍拒之遂殺威鎔本疎痩時年始十七當威竝轡之時雷雨驟作屋瓦皆飛有一人於缺垣中望見鎔識之遽挾於馬上肩之而去翼日鎔但覺頭偏痛乃因有力者所挾不勝其苦故也及訪之則曰墨君和皷刀之士也遂厚賞之藥彥稠長興中與康福率師自牛兒族入白魚谷追及皆叛黨項白馬盧家六族客户三族獲大首領連香八薩王都統悉郍埋摩侍御乞埋嵬悉逋等六十人兼黨類二千餘人獲駝馬牛羊數千計至晩師還野次其地無水軍士方渇俄有風雨自東立起是夜初更䧏雪二尺軍中以為神助冊府元龜卷三百九十八
