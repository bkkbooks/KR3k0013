body:
  text: 册府元龜卷六百七宋王欽若等撰學校部譔集太史公曰儒者六藝經傳以千萬數累世不能通其學當年不能究其理誠哉是言也由漢之後作者間出祖述不已踵武増華其文史之盛豈可遽數焉乃有博古之士好學不倦捃摭方䇿分别羣類列其部居成乎倫要俾肄業之儒開卷而獲益臨文之士沿波而達源至有承詔譔述篇籍咸叙備於萬乘之覧藏之秘室之府者又多乎哉原夫論次之意盖将以撮樞要而遵簡易豈易所謂學以聚之傳所謂知類通逹者與楚鐸椒為威王傅為王不能盡觀春秋采取成敗本四十餘章為鐸氏微漢劉向成帝時為光祿大夫是時帝元舅陽平侯王鳯為大将軍秉政倚太后專國權兄弟七人皆封為列侯時數有灾異向以為外戚貴盛鳯兄弟用事之咎而上方精於詩書觀古文詔向領校中五經秘書言中者以别於外向見尚書洪範箕子為武王陳五行陰陽休咎之應休美也向乃集合上古以來厯春秋六國至秦漢符瑞災異之記推迹行事連傳禍福著其占驗比類相從各有條目凡十一篇號曰洪範五行傳論奏之天子心知向忠精故為鳯兄弟起此論也然終不能奪王氏之權向又睹俗彌奢淫而趙衞之屬起微賤踰禮制趙皇后昭儀衞媫妤也向以為王教由内及外自近者始故採取詩書所載賢妃貞婦興國顯家可法則及孽嬖亂亡者孽庶也愛也序次為列女傳凡八篇以戒天子及采傳記行事著新序説苑凡五十篇奏之數上疏言得失陳法戒書數十上以助觀覽補遺闕帝雖不能盡用然内嘉其言常嗟歎之後漢應奉為司𨽻時竝下諸官府郡國各上前人像贊子劭乃連綴其名錄為狀人紀景鸞廣漢梓潼人也取河洛圖緯以類相從名為交集又撰禮内外記號曰禮略又抄風角雜書列其占驗作興道一篇州郡辟命不就荀爽集漢事成敗可以為鑒戒者謂之漢語位至司空魏文帝使諸儒撰集經傳隨類相從凡千餘篇號曰皇覧王象為㪚騎常侍受詔撰皇覽使象領秘書監象從延康元年始撰集數嵗成藏於秘府合四十餘部有數十篇通合八百餘萬字又云桓範為羽林左監劉劭為㪚騎侍郎竝受詔集五經羣書以類相從作皇覧高堂隆撰魏䑓雜訪議三卷位至光祿勲吳張温為太子傅撰三史略二十九卷晉張華為司空著博物志十篇行於世葛洪抄五經史漢百家之言方伎雜事三百一十卷金匱藥方一百卷肘後要急方四卷後為句漏令環濟撰帝王要畧十二卷祁嘉博通經籍張重華徴為儒林祭酒性和裕教訓不倦依孝經作二九神經應詹撰東宫舊事三卷位至平南将軍江州刺史宋范泰撰古今善言二十四篇位至侍中左光禄大夫顧長康為㪚騎常侍何翌為長水校尉元徽初表上所撰諫林上自虞舜下及晉武凡十二巻謝莊轉隋王誕後軍諮議竝領記室分左氏經傳隨國立篇製本方丈圖山川土地各有分理離之則州别郡殊合之則㝢内為一何承天為御史大夫宋世禮論有八百卷承天删減并合以類相從凡為三百卷南齊丘靈鞠為大中大夫製江左文章録序起太興訖元熙樓㓜瑜著禮捃遺三十卷㓜瑜教授不應徴辟陰顥撰瓊林二十卷崔慰祖嘗著海岱志起太公迄西晉人物為四十卷半未成臨卒與從弟緯書云海岱志良未周悉可冩數本付䕶軍諸從人一通及友人任昉徐寅劉洋仕至始安王記室梁庾詵撰晉朝雜事五卷總抄八十卷普通中詔以為黄門侍郎稱疾不起阮孝緒撰髙隠傳上自炎黄終於天監之末斟酌分為三品凡十卷中篇所載一百三十七人劉歊劉訏覽其書曰昔嵇康所贊缺一自擬今四十之數将待吾等成耶對曰所謂荀君雖少後事當付鍾君若素車白馬之日輙獲麟於二子歊訐果卒乃益二傳傳及孝緒亡訏兄潔錄其所遺行次篇末成絶筆之意云孝緒天監十二年徴不至張率為司徒掾直文德待詔省勅使抄一部書又撰婦人事二十餘條勒成百卷使工書人瑯琊王深吳郡范懷約禇洵等繕冩以給後宮張𬗟性愛墳籍聚書至萬餘卷抄後漢晉書衆家異同為後漢紀四十巻晉抄三十卷又抄江左集未及成卒位至御史中丞陸罩為中大夫初簡文在雍州撰法寶聨璧罩與羣賢竝抄掇區分者數嵗六年而書成命湘東王為序其作者有侍中國子祭酒南蘭陵蕭子顯等三十人以比王象劉劭之皇覽焉徐勉撰左丞彈事五卷在選曹撰選品五卷又以孔釋二教殊途同歸撰㑹林五十卷皆行於世位至右光祿大夫侍中衞将軍吳均為奉朝請勅撰通史起三皇訖齊代均草本紀二十卷庾仲容抄諸子書三十卷烈女傳三卷位至黟縣令陳陰僧仁為征南諮議撰梁撮要三十卷姚察著説林十卷位至吏部尚書顧野王撰通史要略一百卷位至黄門侍郎光祿卿張譏為國子博士兼東宮學士撰遊𤣥桂林二十四卷後主嘗勅入就其家冩入祕閣後魏道武天興四年十二月集博士儒生比衆經文字義類相從凡四萬餘字號曰衆文經淮王昌弟孚為尚書丞靈太后臨朝宦者干政孚乃總括古今名妃賢后凡為四巻奏之常山王暉為尚書左僕射暉雅好文學招集儒士崔鴻等撰錄百家要事以類相從名為科錄凡二百七十卷上起伏羲迄於晉宋凡十四代暉表上之王繼叔耽勤讀誦研綜經籍鈎深致遠多所博聞自周以降暨於魏世帝王傳代之由貴臣升降之緒皆撰錄品第商畧是非號曰略注合百餘篇好事者覽之咸以為善焉劉懋撰諸器物造作之始十五卷名曰物祖位至太尉司馬張彝為光禄大夫集庖犧至晉末凡十六代百二十八帝厯三千二百七十年雜事五百八十九合成五巻名曰厯帝圖崔浩為祭酒朝廷禮儀文䇿詔軍國書記盡關於浩浩能為雅説不長屬文而留心於制度科律及經術之言作家祭法次序五宗蒸嘗之禮豐儉之節義理可觀李謐涿郡人年十八詣太學受業後鳩集諸經廣校同異比三傳事例名春秋叢林十有二卷徴拜著作佐郎辭以授弟郁孫僧化識星分按天占以言灾異為通直㪚騎常侍永熙中出帝召僧化與中㪚大夫孫安都共撰兵法未就而帝入關遂罷李公繪潛居自持雅好著書撰古今異説記二十八卷趙語三卷北齊祖珽拜為尚書左僕射監修國史以後主屬文奏撰御覽武平三年二月詔珽及特進魏收等入文林館撰𤣥洲苑御覽後改名聖夀堂御覽八月御覽成勅付史閣後改為修文殿御覽凡三百六十卷初詔珽與收太子太師徐之才中書令崔劼㪚騎常侍張雕中書監陽休之監撰珽等奏追通直㪚騎侍郎韋道孫陸又太子舍人王邵衞尉丞李孝基殿中侍御史魏澹中㪚大夫劉仲威袁奭國子博士朱才奉車都尉陸道閑考功郎中崔子摳左外兵郎薛道衡并省主客郎中盧思道司空東閣祭酒崔德太學博士諸葛漢奉朝請鄭公超殿中侍御史鄭子信等入館撰書并勅蕭放蕭慤顔之推等同入撰例復令㪚騎常侍封孝琰前樂陵太守鄭元禮衞尉少卿杜臺卿通直㪚騎常侍王訓前兖州長史羊肅通直㪚騎侍郎馬元熙省三公郎中劉珉開府行叅軍李師上温君悠入館亦令撰書後命特進崔季舒前仁州刺史劉逖㪚騎常侍李孝貞中書侍郎李德林續入待詔尋又詔諸人各舉所知又有前濟州長史李翥前廣武太守魏謇前西兖州司馬蕭溉前幽州長史陸仁惠鄭州司馬江旴前通直㪚騎侍郎辛德源陸開明通直郎封孝謇太尉掾張德冲并省右民髙恭行司徒户曹叅軍古道子前司空功曹叅軍劉顗獲嘉令崔德儒給事中李元楷晉州治中陽師孝太尉中兵叅軍盧公順司空中兵叅軍周子深開府行叅軍王友伯崔君洽魏師謇竝入館待詔又勅右僕射叚孝言亦入御覧成後所撰錄人亦有不得待詔付司處分者凡此諸人亦有文學庸淺附㑹親識妄相推薦者十三四焉雖然當時操筆之徒搜求畧盡其外如廣平宋孝王信都劉善經輩三數人論其才性入館諸賢亦十三四不逮之也待詔文林亦是一時盛事故存錄其姓名荀士遜為中書侍郎號為稱職與李若等撰曲言行於世隋陸爽字開明髙祖受禪轉太子内直監尋遷太子洗馬與左庶子宇文愷等撰東宮典記七十卷杜臺卿開皇初被徴入朝臺卿嘗採月令觸類而廣之為書名玉燭寶典十二卷奏之賜絹二百疋位至著作郎樂運南陽淯陽人嘗願為一諌臣從容諷議而性訐直為人所排抵遂不被任用乃發憤錄夏殷以來諌諍事集而部之凡六百三十九條合四十一卷名曰諌苑奏上之文帝覧而嘉焉位至毛州髙唐令魏澹字彦深為太子舍人廢太子勇深禮遇之屢加優錫令撰笑苑詞林集世稱其博物劉祐奉詔撰兵書十卷名曰金韜上善之崔賾撰洽聞志七卷八代四科志三十卷位至越王長史于仲文為光禄大夫撰畧覧三十卷唐歐陽詢為給事中武德七年奉詔與裴矩陳叔達趙𢎞智令狐德棻文學袁郎等十數人同修藝文類聚李百藥初仕隋為禮部員外郎皇太子勇召為東宫學士令修五禮定律令撰陰陽書魏徴為祕書監貞觀五年撰羣書政要奏之今採其序例以明述作之意曰竊維載籍之興其來尚矣左史右史記事記言皆所以昭德塞違勸善懲惡故作而可紀薫風揚乎百代動而可法明戒垂乎千祀是以歴觀前聖撫運膺期莫不懔乎馭朽自彊不息乾乾夕惕義在兹乎近古皇王時有撰述竝皆包括天地牢籠羣有競採浮豔之詞爭馳迂誕之説騁末學之傳聞師雕蟲之小伎流宕忘返殊途同致雖辯周萬物愈失司契之源術總百端彌乖得一之㫖皇上以天縱之多才運生知之睿思性與道合動妙機神𤣥德潛通化前王之所未化損己利物行列聖所不能行瀚海龍庭之野竝為郡國扶桑若木之域咸襲纓冕天地成平外内禔福猶且為而不恃雖休勿休俯協堯舜式遵稽古不察貌乎止水将取鑒乎哲人以為六籍紛綸百家踳駁窮理盡性則勞而少功周覽汎觀則博而寡要故爰命臣等採摭羣書剪截浮放光昭訓典聖思所存務乎政術綴敘大畧咸發神衷雅致鈎深規摹宏遠網羅政體事非一日若乃欽明之后屈己以救時無道之君樂身以亡國或臨難知懼在危而獲安或得志而驕居成以致敗者莫不備其得失或立功樹惠貞心直道忘軀殉國身殞百年之中聲馳千載之後或大奸巨猾轉日廻天社䑕城狐反白作黑忠良由其放逐邦國因以危亡者咸亦述其終始以顯為臣不易其立德立言作訓埀範為綱為紀經天緯地金聲玉振騰實飛英雅論徽猷嘉言美事可以𢎞奬名教崇太平之基者固亦片善不遺将以丕顯皇極至於母儀嬪則懿后良妃叅徽猷於十亂著深誡於辭輦或傾城哲婦亡國豔妻候晨雞以先鳴待舉烽而後笑者時有所存以備勸戒自六經訖於諸子始五帝下盡晉年凡為五秩合五十卷本求政要故以政要為名但皇覽遍畧隨方類聚名目互顯首尾淆亂文義斷絶尋究為難今之所撰異乎先作總立新名各全舊體欲見本知末原始要終竝棄彼春華採兹秋實一書之内牙角無遺一事之中羽毛咸盡用之當今足以殷鍳前古傳之來葉可以貽厥孫謀引而伸之觸類而長盖亦言之者無罪聞之者足以自戒庶𢎞兹九德簡而易從觀彼百王不疾而速崇巍巍之盛業開蕩蕩之王道可久可大之功竝天地之貞觀日用日新之德将金鏡以長懸矣太宗覽之稱善勅皇太子諸王各傳一本賜徴帛二百疋又徴為特進以禮經遭秦滅學戴聖編錄條疏不次乃刪其所記以類相從為五十篇合二十卷名類禮太宗善之賜物一千段以其書藏秘府及賜皇太子諸王李襲譽為揚州總管長史撰忠孝圖二十卷貞觀十三年十一月奏之太宗覽而稱善髙士㢘為尚書右僕射貞觀十五年撰文思博要一千二百卷上之有詔藏之秘府時太學博士馬嘉運太常丞呂卞同修髙智周為祕書郎𢎞文直學士預撰瑶山玉彩文館詞林三遷蘭臺大夫李敬𤣥撰正論三卷位至揚州大都府長史杜正倫為中書侍郎兼左庶子撰春坊要錄四卷許敬宗為𢎞文館學士永徽中與李義府等奉勅於内殿撰東殿新書二百卷髙宗自製序其書自史記至晉書刪其繁詞勒成藏之書府元萬頃上元中為著作郎則天廣召文詞之士入禁中修撰萬頃與左史劉禕之范履氷苗神客右史周思茂胡楚賓等咸預其選前後撰列女傳臣軌百寮新誡樂書凡千餘卷姚璹永徽中為太子宮門郎博涉經史有才辯與司議郎孟利貞等奉令修瑶山玉彩書成遷祕書郎張昌宗為麟臺監聖厯中則天以御覽及文思博要等書多未周備令昌宗與麟臺少監李嶠廣召文學之士給事中徐彦伯水部郎中員半千等二十六人増損文思博要勒成一千三百卷於舊書外更加佛教道教及親屬姓氏方域等部至是畢功帝親製名曰三教珠英時左補闕崔湜同修韋叔夏神龍中為國子祭酒撰三禮要記三十卷行於代王方慶撰宮卿故事一卷位至太子左庶子徐堅為集賢院學士開元中勅堅等纂經史要事及厯代文章以類相從欲令皇子簡事綴文帝自定名為初學記是日撰成以獻帝稱善賜堅等絹三百疋張九齡為中書令開元二十七年二月九齡等撰六典三十卷成上之歸崇敬為國子司業大厯中與諸儒官同修通志崇敬知禮儀志衆稱允裴澄為國子司業貞元十二年表上乘輿月令十二卷蘇冕為京兆府士曹纘國朝政事撰㑹要四十卷杜祐為淮南節度使貞元十七年獻通典表曰臣聞太上立德不可庶幾其次立功道行當代其次立言見志後學由是往哲逓相祖述将施有政用乂邦家臣本以門資幼登官序仕非遊藝才不及人徒懷自彊頗翫墳籍雖履厯叨幸或職劇務繁竊惜光陰未嘗輟廢夫孝經尚書毛詩周易三傳皆父子君臣之要道十倫五教之宏綱如日月之下臨天地之大德百王是式終古攸遵然率多記言罕存法制愚管窺蠡測豈逹髙深輙肆荒唐誠為臆度每念懵學莫探政經畧觀厯代衆賢著論多陳紊失之弊或闕拯救之方臣既庸淺寧詳損益未原其始莫暢其終尚頼周氏典禮秦皇蕩滅不盡縱有繁雜且用凖繩至於往昔是非可為來今龜鑑布在方䇿亦麤研尋自頃纂修年涉三紀識寡思拙心昧詞蕪圖籍實多事目非少将謂功畢有愧乖疎固不足發揮大猷但微臣竭愚盡慮凡二百卷不敢不具獻上庶明鄙志所之塵瀆聖聰兢惶無措其書凡九門叙食貨十二卷選舉六卷職官二十二卷禮一百卷樂七卷兵六卷刑十七卷州郡十四卷邊防十六卷賀蘭正元貞元中為昭義軍節度使判官進用人權衡輔佐記各十卷舉選衡鏡三卷馬總為天平軍節度使總理道素優軍政多暇公務之餘手不釋卷所著奏議集年厯通厯子鈔等書百餘卷行於世唐次為禮部員外郎貞元八年坐竇叅出為開州刺史在巴峽間十餘年不獲進用西川節度使韋臯抗表請為副使德宗密諭臯令罷之次久滯蠻荒孤心抑鬱怨謗所積孰與申明乃採自古忠臣賢士遭罹讒謗放逐遂至殺身而君猶不悟其書三篇謂之辯謗畧上之德宗省之猶怒謂左右曰唐次乃方吾為古之昏主何自諭如此改䕫州刺史及憲宗即位與李吉甫同自峽内召還授次禮部郎中尋以本官知制誥正拜中書舍人卒憲宗明哲嫉惡尤惡人朋比傾䧟嘗閲書禁中得次所上書三篇賢而善之謂學士沈傳師曰唐次所集辯謗之書實君人者時宜觀覽朕思古書中多有此事次編錄未盡卿家傳史學可與學士類例廣之傳師與令狐楚杜元潁等分功修續廣為十卷號元和辯謗略優詔答之憲宗元和八年六月詔宰臣武元衡李吉甫李綘及舊相太子少傅判太常卿鄭餘慶禮部尚書權德輿各進舊書張正甫為集賢殿學士右散騎常侍寶厯二年進藝文類聚一百卷令狐楚為翰林學士憲宗以自古賢臣多受讒謗以至危亡因詔楚纂集厯代名臣受謗者為十卷名為元和辯謗畧書成帝嘉其該博李渤為著作佐郎罷官閒居東雒撰禦戎新錄二十卷以獻韋處厚穆宗時與路隨為翰林侍讀學士長慶二年處厚與隨撰六經法言二十卷書成表獻之曰臣聞三皇講道五帝講德三王講仁五覇講義所講不同同歸於理理道之極備於六經雖質文相變忠敬交用損益因時步驟不一然而釋三綱越五常而致雍熙者未之有也自秦火蕩爇孔壁穿蠧曲學異辯專門多惑營道之軌竝馳希聖之堂盖寡蕪文錯起浮義互生簡册混㪚篇卷繁積勞神於累代敝形於當年其知愈博其得愈少夫然通方之士逹識之儒且猶不為也况南面之尊司道之契豈不貪其精而遺其麤者乎伏惟文武孝德皇帝陛下精義神授博識天資山峻詞峯泉蓄學海膺休運則混六合而不讓思屈已則舞兩階而不疑故當希皇踵帝肩王轢霸可以區區近躅擬於聖德哉臣處厚臣隨採合易詩書左氏春秋孝經等因其本篇掇其精粹論紀先師微㫖今亦附於篇末總題曰六經法言合二十卷獻上取諸身必本於五事下通諸物兼暢於三才始九族以及於百姓刑室家以儀於天下聖君良主之往行哲人壯士之前言天人相與之際幽明交感之應窮理盡性之辯藥石攻磨之規堯舜禹湯文武理亂之道盡在君臣父子夫婦朋友之義必舉其興可以觀勸其違可以戒此其所存者也至如爻象錯綜陰陽難名比興箴誨幽隠難釋誥命訓論古今不合威儀類制命諸有司褒貶揚㩁歸諸史法此其所遺者也商鞅之説秦主歎帝道之難行太宗之納魏徴流王澤而廣被繇是言之道無遠近德無重輕能者挈之如毛羽不能者舉之如嵩岱今逢希代之君當難合之運故不能以百家邪説六國縱横秦漢刑名魏晉偷薄為盛時道厯代帝王皆務纂集魏稱皇覽梁著遍畧鄴中則有修文之作江左則有夀光之書但誇衒於聞見非垂謀於理本臣今所貴實異斯作陸賈奏甚卑之論尚稱善於髙皇方朔獻雜糅之説猶見知於武帝伏惟陛下機務之餘燕息之暇時降省覽天下幸甚帝覽其書稱善者久之賜處厚隨錦綵二百疋銀器二事崔郾為翰林侍講學士寶厯元年七月與髙重進纂要集十卷各賜綵錦二百疋銀器五事魏謇嘗鈔撮子書要言以類相從二十卷號曰魏氏手畧有文集十卷位至太子少保裴潾文宗時為右㪚騎常侍太和八年集厯代文章自梁昭明太子著文選外合於典雅者古今通選勒成三十卷目為太和通選并意義目錄一卷進上潾之所著偏僻時論以為不當王涯同平章事太和八年進月令圖一軸兵部尚書王起進自古帝王五位圖帝欲置於几案以便觀覽宣付起重以長卷冩進許康佐為翰林學士太和九年進纂集左氏傳三十卷髙重為國子祭酒太和九年進春和纂集四十卷鄭澣為翰林侍講學士文宗命撰經史要錄十二卷書成帝嘉其精博因以十九書語類帝親自發問澣應對無滯錫以金紫姚康為太子詹事大中五年十一月以所撰統史三百卷上之統史自開闢至隋末編年纂帝王美政善事詔令可利於時者至於時政鹽鐵筦𣙜和糴賑貸錢陌兵數虚實貯糧用兵利害邊事戎狄無不備載下至釋道燒煉妄求無驗皆載之崔鉉為左僕射平章事大順七年十月鉉上續㑹要四十卷修撰官楊紹復崔瑑薛逢鄭言等賜物有差梁末帝貞明末前衡州長史劉隲進所撰地里手鏡十卷晉曹國珍為左諫議大夫天福四年上言請於内外臣寮之中選才略之士聚唐六典前後㑹要禮閣新儀大中統類律令格式等精詳纂集俾無漏畧别為書一部目為大晉政綂從之其詳議官宜差太子少師梁文矩㪚騎常侍張允大理卿張澄國子祭酒唐汭大理少卿髙鴻漸國子司業田敏禮部郎中呂咸休司勲員外郎劉濤刑部員外郎李知損監察御史郭延升等一十人允文矩等咸曰改前代禮樂刑憲為大晉政統則堯典舜典當以晉典革名列狀駁之曰作者之謂聖述者之謂明苟非聖明焉能述作若運因革故則事乃維新或改正朔而變犧牲或易服色而殊徽號是以五帝殊時不相沿樂三王異世不相襲禮至於近代率由舊章比及前朝是滋其目多因行事之失改為立制之初或臣奏條章君行可否皆表其年月紀以姓名聚類分門成文作則莫不悉稽前典垂範後昆述言聖賢厯於朝代得金科玉條之號設亂言破律之防守而行之其來尚矣皇帝陛下運齊七政厯契千年爰從創業開基莫不積功累德行宜直筆具載鴻猷若備錄前代之編年目作聖朝之政統此則是名不正也夫名不正則言不順而媚時掠美非其實矣若剪截其詞此則是文不備也夫文不備則啓争端而禮樂刑政於斯亂矣若改舊條而為新制則未審何門可以刋削何事可以編聫既當革故從新又須廢彼行此則未知國朝能守而不失乎臣等同共叅詳未見其可疏奏嘉之其事遂寢張昭為兵部尚書世宗親征淮南表進所撰兵法其畧曰臣本書生不嫻武藝空忝穰苴之位慙無郄縠之能遽捧綸言令纂兵法雖彊三宮之説何稱九天之謀伏惟陛下玉斗纉戎金樓聚學九舜十堯之典不足揣摩三門五将之書無煩接要而猶申旦不寐乙夜縱觀留連於尺籍伍符探賾於楓天棗地以為人情貴耳而賤目儒者是古而非今以韓白之智有餘英衞之才不足寧悟渭水釣翁之學今廼椎輪圯橋神叟之言已為糟粕無足師模於鈐筭聊可挹酌於源流爰命下臣撮其樞要臣逖觀前代兵家所著篇部頗多自唐末亂離圗書流落今蘭臺祕府目錄空存其於討論固難詳悉今祗據臣家所有之書摭其兵要自軍旅制置選練教習安營結陣命将出師詭譎機權形勢利害賞罰告誓攻守巧拙星氣風角陰陽課式等部四十二門離為十卷管窺蠡測莫知穹渤之髙深獸走犬馳且副蒐苖之指使既成卷部須有籖題臣伏見前代奉詔撰論皆目為制㫖今輙準故事題為制㫖兵法臣留司都下不敢輙去班行謹差私吏齎詣行闕陳進詔曰朕昔覽兵書麤知前事将觀機要委卿撰述曽未踰時遠來呈進披尋之際備見精詳論戰法之大綱與孫吳而共貫頼卿博學副朕所懷宜示頒宣用明恩寵嘉奨在念再三不忘今賜卿衣着二百疋銀器一百兩册府元龜卷六百七
