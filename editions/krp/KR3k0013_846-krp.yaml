body:
  text: 冊府元龜卷八百四十六宋王欽若等撰總録部善射周官保氏之職敎國子以六藝其三曰射仲尼亦曰吾何執執射乎盖弦剡之制聖人所以威天下桑蓬之訓男子所以志四方射之時義逺矣哉中古以還乃有應機之命中挽彊徹札善其事而著稱者焉至或飲羽斃獸郤敵紓難威讋於羌虜身獲於榮爵亦比比有之詩曰舎矢如破又曰舎拔則獲皆善射之謂矣有窮后羿善射有窮國名后君也羿君之號逢蒙學射於羿盡羿之道賈大夫惡貌醜取妻而美三年不言御以如臯射雉獲之其妻始笑而言樂伯為楚大夫與晉戰於邲許伯御樂伯攝叔為右以致晉師晉人逐之左右角之張兩角後旁夾攻之樂伯左射馬而右射人角不能進矢一而已麋興於前射麋麗龜麗著也龜背文隆髙當心者晉鮑癸當其後使攝叔奉麋獻焉曰以嵗之非時獻禽之未至敢膳諸從者鮑癸止之曰其左善射其右有辭君子也既免止不復逐之養由基楚大夫善射去楊葉百歩而射百發百中楚共王及晉侯鄭伯戰於鄢陵潘尫之黨與養由基蹲甲而射之徹七札焉黨潘尫之子蹲聚也一發達七札言其能陷堅以示王曰君有二臣如此何憂於戰二子以射誇王王怒曰大辱國賤其不尚智謀詰朝爾射死藝言女以射自多必當以藝死也詰朝猶明朝是戰日及戰吕錡射共王中目王召由基與之兩矢使射吕錡中項伏􅋶􅋶弓衣以一矢復命後楚師薄薄迫也於險叔山冉謂基曰雖君有命為國故汝必射王有死藝命乃射再發盡殪楚王有白猨王自射之則摶矢而熈熈戲使養食其射之食其即繇基也始調弓矯矢未發猨擁樹號矣熊渠子夜行見寢石以為伏虎彎弓射之没金飲羽下視知其石也因復射之矢摧迸火商陽為工尹與陳棄疾追吳師及之工尹楚官名棄疾楚公子棄疾以魯昭八年帥師滅陳縣之楚人善之因號焉至二十年楚子狩於州來使蕩侯潘子司馬督囂尹午陵尹喜帥師圍徐以懼吳於時有呉師陵或作陵楚聲陳棄疾謂工尹商陽曰王事也子手弓而可手弓子射諸商陽仁不忍傷人以王事勸之射之斃一人韔弓不忍復射斃仆也韔韜也又及謂之又斃二人毎斃一人揜其目揜其目不忍視之止其御曰朝不坐燕不與殺三人亦足以反命矣朝燕於寢大夫坐於上士立於下然則陽與御者皆士也兵車參乗射者在左戈盾在右御在中矣孔子曰殺人之中又有禮焉公孫丁為衛獻公御公出奔齊孫氏追之初尹公佗學射於庾公差庾公差學射於公孫丁二子追公二子佗與差為孫氏逐公子魚曰射為背師不射為戮射為禮乎子魚庾公差禮射不求中射兩軥而還軥車軛卷者尹公佗曰子為師我則逺矣乃反之佗不從丁學故言逺始與公差俱退悔而還射丁公孫丁受公轡而射之貫臂貫佗臂洩聲子魯大夫齊師將納昭公使公子鉏率師從公圍成師與齊師戰於炊鼻季氏師距公炊鼻魯地齊子淵㨗從洩聲子射之中楯瓦瓦楯脊繇朐汰輈匕入者三寸入楯瓦也朐車軛輈車轅繇過也汰矢激也匕矢鏃也聲子射其馬斬鞅殪顔髙魯人定公侵齊門於陽州攻其門士皆坐列言無鬬志曰顔髙之弓六鈞三十斤為鈞六鈞百八十斤古稱重故以為異彊皆取而𫝊觀之陽州人出顔髙奪人弱弓籍丘子鉏擊之與一人俱斃子鉏齊人斃仆也偃且射子鉏中頰殪子鉏死顔息魯人定公侵齊門於陽州顔息射人中眉退曰我無勇吾志其目也以自矜公孫林鄭大夫齊輸范氏粟鄭子姚子般送之趙鞅禦之遇於戚鄭師大敗趙孟喜追鄭師姚般公孫林殿而射前列多死晉前列趙孟曰國無小言雖小國猶有善射者更嬴魏人與魏王處廡下有鴈從東方來更嬴虛發而鴈下漢李廣隴西人世世受射受射法文帝十四年匈奴大入蕭闗而廣以良家子從軍擊胡用善射殺首虜多為郎騎常侍廣為上郡太守匈奴侵上郡帝使中貴人從廣内臣之貴幸者勒習兵擊匈奴中貴人者將數十騎從将數十騎自隨在大軍前行而忽遇敵也見匈奴三人與戰射傷中貴人殺其騎且盡中貴人走廣走趣也廣曰是必射鵰者也廣乃從百騎往馳三人疾馳而逐之三人亡馬歩行行數十里廣令其騎張左右翼旁引其騎若鳥翼之焉而廣身自射彼三人者殺其二人生得一人果匈奴射鵰者也廣嘗出獵見草中石以為虎而射之中石没鏃視之石也他日射之終不能入矣廣所居郡聞有虎嘗自射之及居右北平射虎虎騰傷廣廣亦射殺之其射見敵非在數十歩之内度不中不發發即應弦而倒用此其將數困辱及射猛獸亦數為所傷廣為人長猨臂臂如猨臂通背其善射亦天性雖子孫他人學者莫能及廣呐口少言與人居則畫地為軍陳射闊狹以飲專以射為戲張隆景帝時為輕車武射以善射帝幸近之霍去病武帝時以皇后姊子年十八為侍中善騎射堂邑父胡人善射與張騫使月攴留匈奴中窮急射禽獸給食歸漢拜為奉使君吕布為奮武將軍時袁術遣將紀靈等攻劉備於徐州布救之屯沛城外請靈等與共饗飲布曰備吾弟也為諸君所困故來救之布性不喜合鬬但喜解鬬耳乃令軍候植㦸於營門布彎弓顧曰諸君觀布射㦸小支中者當各解兵不中可留决鬬布即一發正中㦸支靈等皆驚言将軍天威也魏成公英西域人從太祖出獵有三鹿走過前太祖命英射之三發三中皆應弦而倒太祖抵掌謂之曰事韓文約可謂盡節而孤獨不可乎成公英昔事韓遂遂字文約後詔英作凉州平隴右病卒王明山父凌坐楚王事司馬宣王誅之明山走向大原追軍及之時有飛鳥集桑樹隨低昻明山舉弓射之即倒追人乃止不復進蜀糜竺為安漢将軍子威官至虎賁中郎将威子炤虎騎監自竺至炤皆便弓馬善射御吳太史慈猨臂善射弦不虛發嘗從孫策討麻保賊賊於屯裏縁樓上行詈以手持樓棼慈引弓射之矢貫手著棼圍外萬人莫不稱善其妙如此位至折衝中郎将朱才字君業為偏將軍為人精敏善騎射大帝愛異之嘗侍從遊戲晉魏舒為後將軍鍾毓長史毓毎與參佐射舒嘗為畫籌而已後遇朋人不足以舒滿數毓初不知其善射舒容範閑雅發無不中舉坐愕然莫有敵者毓歎而謝曰吾之不足以盡卿才有如此射矣豈一事哉王濟字武子為河南尹未拜坐鞭王官吏免官王愷以帝舅奢豪有牛名八百里駮嘗瑩其蹄角濟請以錢千萬與牛對射而賭之愷亦自恃其能令濟先射一發破的因據胡牀叱左右速探牛心來須㬰而至一割便去尋以白衣領太僕卒楊濟字文通歴位鎮南征北將軍嘗從武帝較獵北邙下與侍中王濟俱著布袴褶騎馬執角弓在輦前猛獸突出帝命王濟射之應弦而倒須叟復一出濟受詔又射殺之六軍大呌稱快庾翼為都督征討諸軍事師次襄陽大㑹僚佐陳旌甲親授弧矢曰我之行也若此射矣遂三起三叠徒衆屬目其氣十倍謝尚為建武將軍江夏相時安西將軍庾翼鎮武昌尚數詣翼諮謀軍事嘗與翼共射翼曰卿若破的當以皷吹相賞尚應聲中之翼即以其副皷吹給之桓石秀善騎射發則命中位至寧逺将軍陳安為劉曜所圍突圍而出雙帶兩鞬左右馳射前燕慕容根善射嘗從慕容皝行獵有一野羊立於懸崖皝命左右射之莫有中者根自求射一發中之賈堅字世固彎弓三十石餘慕容恪取一牛置百歩上召堅使射堅曰少壯之時能令不中今已年老正可中之恪大笑射再發一矢拂脊一矢磨腹皆附膚落毛上下如一恪曰復能中乎堅曰所貴以下中為竒中之何難一發中之堅時年已六十餘矣觀者咸服其妙慕容翰皝之庶兄皝素忌之皝既嗣位翰北投宇文歸既而逃歸乃遣勁騎百餘追之翰遥謂追者曰吾既思戀而歸理無反面吾之弓矢汝曹足知無為相逼自取死也吾處汝國久願不殺汝汝可百歩豎刀吾射中汝便宜反不中者可來前也追騎解刀豎之翰一發便中刀鐶追騎乃散慕容盛初逃難東歸遇盗陜中盛曰我六尺之軀入水不溺在火不焦汝欲當吾鋒乎試豎爾手中箭百歩我若中之宜慎爾命如其不中當束身相授盗乃豎箭盛一發中之盗曰郎貴人之子故相試耳資而遣之宋劉榮祖北中郎將懐慎之子少好騎射為高祖所知及盧循攻逼懐慎戍在石頭時賊乗小艦入淮援柵高祖宣令三軍不得輙射賊榮祖不勝忿怒冒禁射之所中應弦而倒髙祖益竒焉卜天興父名祖髙祖聞其有幹力召補隊主從征伐天興善射弓力兼倍容貌嚴正笑不解顔太祖以其舊將子使敎皇子射位至廣威將軍臧熹習騎射志在立功嘗至漂陽縣令阮崇與熹共獵值虎突圍獵徒並奔散熹直前射之應弦而倒南齊垣僖伯少負氣豪俠妙解射雉尤為武帝所重以為直閣將軍柳世隆與瑯琊王贍博射嫌其皮闊乃摘梅帖鳥咮之上發必命中觀者驚駭位至左光祿大夫張敬兒年少便馬有膽氣好射虎發無不中位至開府儀同三司劉繪為寧朔将軍雖豪俠嘗惡武事雅善博射未嘗跨馬梁曹景宗新野人父欣之仕宋為徐州刺史景宗善騎射好畋獵嘗與少年數十人澤中逐麞鹿毎還騎赴鹿鹿馬相亂景宗於衆中射之人皆懼中馬足鹿應弦輙斃以此為樂未弱冠欣之於新野遣出州以匹馬將數人於中路卒逢蠻賊數百圍之景宗帶百餘箭乃馳騎四射每箭殺一蠻遂散走陳禇玠剛毅有膽决善騎射嘗從司空侯安都於徐州出獵遇有猛虎玠引射之再發皆中口入腹俄而虎斃位至御史中丞樊毅累葉將少習武善射毅弟猛幼俶儻既壯便弓馬位至䕶軍將軍後魏長孫頺嵩子也善騎射彎弓三百斤位至征南大將軍畋獵方山有兩狐起於御前詔頺射之百歩狐俱獲楊播為右衛將軍時孝文曜威沔水上已設宴帝與中軍彭城王勰賭射左衛元遥在勰朋内而播居帝邊遥射侯正中籌限已滿帝曰左衛籌足右衛不得不解播對曰仰恃聖恩庶幾必争於是彎弓而發其箭正中帝笑曰養由基之妙何復過是遂舉巵酒以賜播曰古人酒以養病朕今賞卿之能可謂今古之殊也奚康生少驍武彎弓十石矢異尋常宣武聞之故作大弓兩張長八尺把中圍尺有二寸箭麄殆如今之長笛送康生康生便集文武用之平射猶有餘力觀者以為絶倫康生為中堅将軍時蕭鸞置義陽招誘邊民康生復為綂軍從王肅討之進圍其城鸞将張休䕶自昇城樓言辭不遜肅令康生射之以强弓大箭望樓射窻扉即入應箭而斃彼民見箭皆云强弩以殺休䕶賞帛一千疋又頻箭再㨗其軍賞三階帛五百疋爾朱兆榮之從子驍勇善騎射榮曽送臺使見二鹿乃命兆前止授二箭曰可取此鹿供今食也遂停馬構火以待之俄而兆獲其一榮欲矜誇使人責兆曰何不盡取杖之五十位至領軍将軍領左右并州刺史賀拔岳初為太學生長以弓馬為事與父兄赴援懐朔賊王衛可瓌在城西三百餘歩岳乗城射之箭中瓌臂賊衆大駭㧞岳為西道都督能左右馳射與爾朱天光討万俟醜奴岳守長安時万俟醜奴遣大行臺尉遲菩薩向武功南渡渭水攻圍趣柵天光遣岳率騎一千馳往赴救菩薩攻柵已尅還據岐州岳以輕騎八百北渡渭水擒賊令殺掠其民以挑菩薩菩薩果率歩騎二萬餘人至渭水北岳以輕騎數十與菩薩隔水交言岳稱楊國威菩薩自言强盛往復數返菩薩乃自憍令省事傳語岳怒曰我與菩薩言卿是何人與我對語省事恃水應答不遜岳舉弓射之應弦而倒尉多侯弟子慶賔善騎射有将略髙祖時釋褐員外散侍郎稍遷左將大中大夫北齊斛律金朔州勑勒部人善騎射初為軍主與懐朔鎮将楊鈞送蠕蠕主阿那瓌還北瓌見金射獵深歎其工暴顯少經軍旅善於騎射魏末從孝莊帝出獵一日之中手獲禽獸七十三斛律光字明月羡字豐雒皆太師金之子少工騎射其父毎日令其出獵還即較所獲禽獸光所獲或少必麗龜達腋羡雖獲多非要害之所光嘗蒙賞羡或被捶撻人問其故金答云明蟾必背上著箭豐雒隨處即下手其數雖多去兄逺矣聞者咸服其言嘗從金西征周文帝長史莫者暉在行間光年十七馳馬射中之因擒於陣神武即擢授都督封永樂子又嘗從文襄出野見鴈雙飛來帝使馳射之二矢俱落又從於洹橋較獵見一大鳥雲表飛颺光引弓射之正中其頸此鳥形如車輪旋轉而下至地乃大鵰也文襄取而觀之深壯異焉承相屬邢子髙見而歎曰此射鵰手也當時轉號落鵰都督位至左丞相皮景和善騎射事神武為親信副都督武定二年征歩落稽文襄疑賊為有伏兵令景和将五六騎深入一谷中值賊百餘人便共格鬬戰景和射數十人莫不應弦而倒神武曽令射一野豕一箭而獲之深見嗟賞天統二年為侍中周通好之後冠盖來往嘗令景和對毎與使同射百發百中甚見推重元景安為車騎大将軍孝昭曽與功臣於西園醼射文武預者二百餘人設垜去堂百四十餘歩中的者賜以良馬及金玉錦綵等有一人射中獸頥去鼻寸餘唯景安最後有一矢未發帝令景安解之景安徐整容儀操弓引滿正中獸鼻帝嗟賞稱善特賞馬兩疋玉帛雜物又加常等後周寳熾仕魏為武厲将軍孝武即位蠕蠕等諸蕃並遣使朝貢帝臨軒宴之有䲭飛鳴於殿前帝素知熾善射因欲示逺人乃給熾御箭兩隻命射之䲭乃應弦而落諸蕃人咸歎異焉帝大悦賜帛五十疋太祖田於渭北令熾與晉公䕶分射走兎熾一日獲十七頭䕶十一頭宇文顯和性矜嚴頗渉經史膂力絶人彎弓數百斤能左右馳射顯和初從魏孝武入闗至溱水太祖素聞其善射而未之見也俄而水傍有一小鳥顯和射而中之太祖笑曰我知卿工矣其後引為帳内大都督宇文貴魏末從文帝在天遊園以金巵置侯上令公卿射中者即以賜之貴一發而中帝笑曰由基之妙正當爾耳位至小司徒王傑為驃騎大将軍魏恭帝元年從於謹圍江陵時柵内有人善用長矟戰士将登者多為所斃謹令傑射之應弦而倒登者乃得入餘衆繼進遂拔之謹喜曰濟我大事者在公此箭也李逺嘗校獵於莎柵見石於聚薄中以為伏兎射之而中鏃入寸餘就而視之乃石也太祖聞而異之賜書曰昔李将軍廣嘗有此事公今復爾可謂世載其徳雖熊渠之名不能獨擅其美位至柱國大将軍尉遲綱逈之弟逈率衆伐蜀綱從太祖送之於城西見一走兎太祖命綱射之誓曰若獲此兎必當破蜀俄而綱克兎而返太祖喜曰事平之日當賞汝佳口及克蜀賜綱侍婢二人嘗從太祖北狩雲陽值五鹿俱走綱獲其三每遊宴太祖以珍異之物令諸功臣射而取之綱所獲輙多位至陜州總管賀拔勝長於䘮亂之中尤工武藝走馬射飛鳥十中其五六後從太祖宴於昆明池時有雙鳬遊於池上太祖乃授弓矢於勝曰不見公射久矣請以為歡勝射之一發俱中位至太師李景為儀同三司驍勇善射平齊之役頗有力焉豆盧寧少驍果有志氣身長八尺美容儀善騎射以别將隨爾朱天光入闗以破萬侯醜奴嘗與梁企定遇於平凉川相與𨽻射乃於百歩懸莎草以射之七發五中企定時以為能贈遺甚厚賀若敦少有氣幹善騎射初從獨孤信於雒陽被圍敦彎弓三石箭不虚發位至中州刺史史雄大將軍寧之子年十四從寧於率毛山奉迎太祖仍從較獵弓無虚發太祖歎異之位至馭中大夫隋長孫晟善彈工射趫㨗過人初周室尚武貴遊子弟咸以相矜毎共馳射時皆出其下年十八為司衛上士晟使突厥嘗有二鵰飛而争肉突厥攝圖以兩箭與晟曰請射取之晟乃彎弓馳見羣鵰相攫遂一發而雙貫焉開皇中晟持節䕶突厥突厥悦附尋以突厥染干為意彌豆啓人可汗賜射於武安殿選善射者十二人分為兩朋啓人曰臣繇長孫大使得見天子今日賜射願入其朋許之給晟箭六隻發皆中鹿啓人之朋竟勝時有鳶羣飛髙祖謂晟曰公善彈為我取之十發俱中並應丸而落是日百官獲賚晟獨居多位至右驍衛将軍史萬嵗少趫㨗尉逈之亂萬嵗從梁士彦擊之軍次馮翊見羣鴈飛來萬嵗謂士彦曰請射行中第三者既射之應弦而落三軍莫不悦服位至河州刺史賀若弼為武侯大将軍嘗遇突厥入朝髙祖賜之射突厥一發中的帝曰非賀若弼無能當此於是命弼弼再拜而祝曰若赤誠奉國者當一發破的如其不然發不中也既射一發而中帝大悦顧謂突厥曰此人天賜我也蘇䕫少聰敏解騎射年十三從父至尚書省與安徳王雄馳射賭得雄駿馬而歸位至通議大夫崔彭為備身将軍髙祖嘗宴逹頭可汗使者於武徳殿有鴿鳴於梁上帝命彭射之既發而中帝大悦賜錢壹萬貫及使者反可汗復遣使於帝曰請得崔将軍一與相見帝曰此必善射聞於虜庭所以來請耳遂遣之及至匈奴中可汗召善射者數十人因擲肉於野以集飛鳶遣其善射者射之多不中復請彭射之彭連發數矢皆應弦而落突厥相顧莫不歎服可汗留彭不遣百餘日帝賂以綵繒然後得歸宇文忻年十二能左右馳射驍㨗若飛位至右領軍大将軍虞慶則幼而雄毅身被鎧帶兩鞬左右馳射本州豪俠皆敬憚之位至右武衛大将軍韓洪字叔明擒虎季弟平陳之役授行軍總管及陳平晉王大獵於蒋山有猛虎在圍中衆皆懼洪馳馬射之應弦而倒陳氏諸将觀於側莫不歎伏焉王大喜賜縑百疋唐張士貴本名忽㖀膂力絶人彎弓一百五十斤左右馳射矢不虚發屈突通雍州長安人為工部尚書檢身清正好武略善馳射平王世充功為第一馮盎討諸叛獠有賊數萬屯據險要不可攻逼盎持弓語左右曰盡吾此箭可知勝負連發七矢而中七人盎位至上柱國髙羅總管薛仁貴領兵擊九姓突厥於天山将行髙宗出甲令仁貴試之上曰古之善射有穿七札者卿且射五重仁貴射而洞之髙宗大驚更取堅甲以賜之時九姓有衆十餘萬令驍㨗數十人逆來挑戰仁貴發三矢射殺三人其餘一齊下馬請降仁貴恐為後患並坑殺之更就磧北討其餘衆擒其偽葉䕶兄弟三人而還軍中歌曰将軍三箭定天山戰士長歌入漢闗位至右領軍衛将軍李巨為夷陵太守安祿山反𤣥宗方擇将帥張垍言巨善騎射李晟少從軍於河西節度使王忠嗣擊吐蕃有驍将乗城拒鬬頗多殺士卒忠嗣募軍中能射者射之晟乃引弓一發而斃三軍大呼忠嗣厚賞之因撫其背曰此萬人之敵也位至太尉中書令王栖曜貞元初為浙西都知兵馬使從節度使韓滉入覲授左龍武将軍知軍事嵗餘為鄜坊節度觀察使久之檢校禮部尚書栖曜性謹厚善騎射始起兵渉冦境太深遇遊騎四合百歩内立表俾之環視發必破的虜相顧恐懼徐而解去嘗獵㑹稽山有白額獸卒起草中應弦而斃在蘇州嘗與諸文士遊虎丘寺平野霽日先一箭射空再發貫之江東文士自梁肅以下歌詠焉伊慎少以善騎射為果毅李光顔與兄光進以葛旃善騎射弟兄自幼皆師之葛旃獨許光顔之勇健已不能及位至河東節度使梁霍存從太祖圍濮州有賊外眺樓大詬太祖怒甚召存射之矢一發而屍隕其下賞賚甚厚胡貞江陵人也為寧逺軍節度使容州刺史貞體貌洪壯長七尺善騎射少為縣吏及在巢冦中推為名將隨巢渉淮浙陷許雒入長安及太祖以衆歸唐貞時為元從都將從至梁苑表授檢校刑部尚書後唐李嗣恩字武人騎射推於軍中嘗有時輩臂饑鷹矜其搏擊武人持鳴鏑一隻睹其狩獲暮乃多之位至諸軍都指揮使索自通少能騎射嘗於山墅射獵莊宗鎮太原時遇之於野詳其姓名即補右番㕔直軍使後因從獵射中走鹿轉指揮使張敬達小字生鐵少以騎射著名位至晉州節度使安元信少有勇力自後唐太祖領太原𨽻於麾下天祐三年梁人圍李嗣昭於上黨與上将周徳威救之一日徳威為敵所困梁之驍將有奉武者屢犯我軍元信飛一矢隨而斃之徳威軍遂振太祖聞之以所乗馬并器仗賜之奏加檢校司空明年莊宗解圍上黨承制授元信遼州刺史加檢校司徒米漢賔少時善射嘗因與同輩出獵指一飛鴈隨矢而落其鏃正中其臆臆上貫一金錢字有篆文示其郡之碩學皆無識者人甚異之繇是人皆號曰米落鴈一云嘗為落鴈軍校位至太子少保致仕晉陸思鐸初仕梁以善射日預其戰嘗於箭笴上而自鏤其姓名一日射中莊宗之馬鞍莊宗拔箭視之覩思鐸姓名因而記之及莊宗平梁思鐸以例來降莊宗出其箭以示之思鐸伏地待罪莊宗慰而釋之後為梁州刺史尤以挽强見稱明宗舉兵討荆南思鐸與其行時髙季興以舟兵拒我思鐸每發矢中敵人則洞胸達腋繇是前鋒稍挫不敢輕進諸軍咸壯之景延廣陜州人也為侍衛親軍都指揮使延廣少習射以挽彊見稱安重榮朔州人為成徳軍節度使嘗與北來蕃使並轡而行指飛鳥射之應弦而落觀者萬衆無不快抃蕃使因輟所乗馬以慶之繇是名振北狄自謂天下可以一箭而定漢郭謹字守節太原晉陽人乾祐初為彰徳軍節度使謹少從軍能騎射周李從敏唐明宗之諸子也沉厚寡言善騎射多計數初莊宗召見試弓馬用為衛内馬軍指揮使髙行周初仕後唐遷潁州團練使郡境北多鷙獸一日牧豎言有伏虎即跨馬彎弧視之虎見騎集厲吻而起行周矢一發洞胸而斃李建崇潞州人為左監門衛上將軍少從軍騎射事太祖為鐵林都將轉突騎飛騎二軍使從莊宗平定魏博諸州安叔千晉髙祖朝為振武節度使習騎射嘗備邊於塞上亦事太祖莊宗嘗率驍騎為前鋒慕容彦超為節度使起家事唐明宗為小豎明宗即位補供奉官幼習騎射既居近職監臨奉使熟於軍旅稍遷軍職漸至列校和凝十九仕梁登進士第滑師賀瓌知其名辟寘幕下凝尤善射時瓌與莊宗相拒於河上戰於胡柳陂瓌軍敗而北唯凝隨之瓌顧曰無相隨當自努力凝對曰大丈夫受主知有難不報非素志也但恨未有死所耳旋有一禆將來逐瓌凝叱之不止遂引弓以射應弦而死瓌獲免既而謂諸子曰昨非和公無以至此和公文武全才而有志氣後必享重位爾宜謹事之遂以女妻之繇此聲望益隆冊府元龜卷八百四十六
