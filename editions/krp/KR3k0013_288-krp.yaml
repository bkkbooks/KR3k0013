body:
  text: 册府元龜卷二百八十八宋王欽若等撰宗室部忠諫後漢東平王蒼光武之子眀帝永平四年春車駕近出觀覽城第尋聞當遂校獵河内蒼即上書諫曰臣聞時令盛春農事不聚衆興功傳曰田獵不宿食飲不享出入不節則木不曲直此失春令者也臣知車駕今出事從約省所過吏人諷誦甘棠之徳雖然動不以禮非所以示四方也惟陛下因行田野循視稼穡消揺仿佯弭節而旋皆逰散之意弭節猶按節至秋冬乃振威靈整法駕備周衛設羽旄詩云抑抑威儀惟徳之隅抑抑宻也臣不勝憤懣伏自手書乞詣行在所極陳至誠帝覽奏即還宫至章帝時欲為原陵顯節陵起縣邑蒼聞之遽上疏諌曰伏聞當為二陵起立郭邑臣前頗謂道路之言疑不審實近令從官古霸問湼陽主疾湼陽主光武女使還乃知詔書已下切見光武皇帝躬履儉約之行深覩始終之分懃懃懇懇以葬制為言故營建陵地具稱古典詔曰無為山陵陂池裁令流水而已孝眀皇帝大孝無違奉承貫行貫行謂一皆遵奉也至於自所營創尤為儉省謙徳之羙於斯為盛臣愚以園邑之興始自強秦古者丘壠且不欲其著眀况築郭邑建都郛哉上違先帝聖心下造無益之功虛費國用動揺百姓非所以致和氣祈年豐也又以吉㐫術數言之亦不欲無故繕修丘墓有所興起考之古法則不合稽之時宜則違人求之吉㐫復未見其福陛下履有虞之至性追祖禰之深思然懼左右過議以累聖心臣蒼誠傷二帝純徳之羙不暢於無窮也惟蒙哀覽帝從而止自是朝廷每有疑政輙驛使咨問蒼悉心以對皆見納用晉齊王攸文帝之子武帝時以比年饑饉議所節省攸奏議曰臣聞先王之教莫不先正其本務農重本國之大綱當今方隅清穆武夫釋甲廣分休假以就農業然守相不能勤心恤公以盡地利昔漢宣歎曰與朕理天下者惟良二千石乎勤加賞罰黜陟幽眀于時翕然用多名守計今地有餘羨而不農者衆加附業之人復有虚假通天下謀之則饑者必不少矣今宜嚴勑州郡檢諸虛詐害農之事督實南畆上下同奉所務則天下之榖可復古政豈患於暫一水旱便憂饑餒哉考績黜陟畢使嚴眀畏威懷惠莫不自厲又都邑之内游食滋多巧伎末業服飾奢麗富人兼羙猶有魏之遺弊染化日淺靡財害榖動復萬計宜申眀舊法必禁絶之使去奢即儉不奪農時畢力稼穡以實倉廩則榮辱禮節繇之而生興化反本於兹為盛轉鎮東大将軍扶風王駿以齊王攸出鎮駿表諫懇切以帝不從遂發病薨范陽王虓宣帝之姪孫元帝時河間王顒表立成都王頴為太弟頴為王浚所破虓與東平王楙鎮東将軍周馥等上言曰自愍懷被害皇儲不建委重前相輙失臣節是以前年太宰與臣永惟社稷之貳不可久空所以共啓成都王頴以為國副受重之後而弗克負荷小人勿用而以為腹心骨肉宜敦而猜佻薦至險詖宜逺而讒説殄行此皆臣等不聦不眀失所宗頼遂令陛下謬於降授雖戮臣等不足以謝天下今大駕還宫文武空曠制度荒破靡有孑遺臣等雖劣足以輔王室而道路之言謂張方與臣等不同既惜所在興異又以太宰惇徳允元著於具瞻每當義節輙為社稷宗盟之先張方受其指教為國効節昔年之舉有死無二此即太宰之良将陛下之忠臣但以受性強毅不達變通遂守前志已致紛紜然退思惟既是其不易之節且慮事翻之後為天下所罪故未即西還耳原其本事實無深責臣聞先代眀主未嘗不全䕶功臣令福流子孫自中間已来陛下功臣初無全者非獨人才皆劣其於取禍實繇朝廷䇿之失宜不相容恕以一旦之咎䘮其積年之勲既違周禮議功之典且使天下之人莫敢復為陛下致節者臣等此言豈獨為一張方寔為社稷逺計欲令功臣長守冨貴臣愚以為冝委太宰以關右之任一方事重及自州郡以下選舉授任一皆仰成若朝之大事廢興損益每輙疇咨此則二伯述職周召分陕之義陛下復行於今時遣方還郡令羣后申志時定王室如加方官請悉如舊此則忠臣義士有勸功臣必全矣司徒戎異姓之賢司空越公族之望並忠國愛主小心翼翼冝幹機事委以朝政安北将軍王浚佐命之𦙍率身履道忠亮清正逺近所推如今日大舉實有定社稷之功此臣等所以歎息歸髙也浚宜特崇重以副羣望遂撫幽朔長為北藩臣等竭力扞城藩屏皇家陛下垂拱而四海自正則四祖之業必隆於今日月之暉昧而復曜乞垂三思察臣所言又可以臣表西示太宰又表曰成都王失道為姦邪所誤論王之身不宜深責且先王遺軆陛下羣弟自元康以来罪戮相尋實海内所為匈匈臣等所以痛心今廢成都更封一邑宜其必許若廢黜尋有禍害既傷陛下矜慈之恩又令逺近恒謂公族無復骨肉之情此實臣等内省悲慙無顔於四海也乞陛下察臣忠欵宋建平王宏孝武帝時普責百官讜言宏議曰臣聞建國之道咸殊興王之政不一至於開諫致寧防口取禍固前王同軌後主共則秦殷之敗語戮刺亡周漢之盛謗升箴顯陛下以至徳神臨垂精思治進儒禮而崇寛教哀獄訟而黜嚴刑表忠行而舉貞節辟處士而求賢異脩廢官而出滯賞撤天膳而重農食禁貴逰而弛㩁酤通山澤而易關梁固已海内仰道天下知徳今復開不諱之塗奨直辭之路四海希風普天幸甚舉蒙採問敢不悉心謹條鄙見置陳如左辭理違謬伏用震讋夫用兵之道自古所慎頃者干戈未戢武備宜修而卒不素練兵非夙習且戎衛之職多非其才或以資厚素加或以禄薄帶帖或寵繇權門恩自私假既無将領虚尸榮禄至于邉城舉燧羽驛交馳而望其擐甲摧鋒立功閫外譬縁木求魚不可得矣嘗謂臨難命帥皆出倉卒驅烏合之衆𨽻造次之主貎踈情乖有若胡越豈能使其同力救危濟難故奔北相望覆敗繼有今欲改選将校皆得其人分臺見将各以配給領䕶一軍為其緫統令撫養士卒使恩信先加農隙校獵以習其事三令五申以齊其心使動止應規進退中律然後蓄鋭觀釁因時而動摧敵䧟堅折衝於外孫子曰視卒如赤子故可與之共死所以張拳効争先之心吮癰致必盡之命豈不繇恩著者士輕其生令眀者卒畢其力考心跡事如或有在妄陳膚知追懼乖謬江夏王義恭為太宰時竟陵王誕舉兵反孝武遣沈慶之討伐值雨不得攻城及晴孝武怒使太史擇日發将自濟江義恭上表諌曰誕素無才略畜飬又寡自拒王命士庶離散城内乏糧噐械不足徒頼免兵蒼頭三四百人造次相附恩怨夙結臣始短慮謂一旬可殄而假息流遷七十餘日上将受律羣蕃兵峙鋭卒精旅動以萬計大威所震未可成功臣雖凡怯猶懷憤悱陛下入剪封豕出討長蛇兵不血刃舉興七百而蕞爾小醜遂延晷漏致皇赫斯怒将動乗之此實臣下素食駑鈍之責行留百司莫不仰慙俯愧今盛暑被甲日費千金天威一麾孰不幸甚臣伏尋晉文王征淮南淹師出二百日方能制㓂今誕糇糧垂竭背逆者多慶之等轉悟遲重之非漸見乗巳之利且成㫖頗降必應旦夕夷殄愚又以廣陵塗近人信易達雖為江水約示不難且覩理者寡闇塞者衆忽見雲旗移次京都既當祇悚四方之志必有未達臣愚伏重思計今寕不當計小醜省生命以安遐邇之情又以長江險闊風波難期王者尚不乗危况乃汎不測之水今雖先天不違動干休慶龍舟所幸理必利渉然居安慮危不可不懼私誠欵欵冐啓赤心追用悚汗不自宣盡南齊竟陵王子良為㑹稽太守宋元嘉中皆責成郡縣孝武徴求急速以郡縣遲緩始遣臺使自此公役勞擾太祖踐阼子良陳之曰前臺使督逋切調恒聞相望於道及臣至郡亦殊不踈凡此軰使人既非詳慎勤順或貪險﨑嶇要求此役朝辭禁門情態即異暮宿村縣威福便行但令朱鼓裁完鈹槊微具顧眄左右叱咤自專擿宗斷族排輕斥重脅遏津埭恐喝𫝊郵破崗水逆商旅半引逼令倒下先過巳船浙江風猛公私畏渡脱舫在前驅令俱發呵䠞行民固其常理侮折守宰出變無窮既瞻郭望境便飛下嚴符但稱行臺未顯所督先訶疆寺却攝羣曹開亭正搨便振荆革其次絳標寸紙一日數至徴村切里俄刻十催四鄉所召莫辨枉直孩老士庶具令付獄或尺布之逋曲以當匹百錢之税且增為千或誑應質作尚方寄繫東冶萬姓駭廹人不自固遂漂衣敗力競致兼漿值今夕酒酣肉飫即許附申赦格眀日禮輕貨薄便復不入恩科筐貢微闕箠撻肆情風塵毁謗隨忿而發及其㹠蒜轉積鵞粟漸盈逺則分鬻他境近則託貿吏民反請郡邑助民由緩回刺言臺推信在所如聞頃者令長守牧離此每實非復近嵗愚謂凡諸檢課宜停遣使宻畿州郡則指賜勅令遥外鎮宰眀下條源既各奉别㫖人競自罄雖復䑓使盈湊㑹正屬所徒相疑僨反更淹懈凡預衣冠荷恩盛世多以闇緩貽愆少為欺猾入罪若類以宰牧乖政則觸事難委不容課逋上綱偏覺非才但賖促差降各限一期如乃事速應緩自依違糾坐之坐之之科不必須重但令必行期在可肅且兩装之船充擬千緒三坊寡役呼訂萬計每一事之發彌辰方辦粗計近逺率遣一部職散人領無减二十舟船所資皆復稱是長江萬里費固倍之較略一年脱得省者息船優役實為不少兼折奸减竊逺近暫安及王敬則為㑹稽太守㑹土民無士庶皆保塘役敬則以工力有餘悉評斂為錢送臺庫以為便子良啟曰伏尋三吳内地國之關輔百度所資民庶彫流日有困殆蠶農罕獲饑寒尤甚富者稍增其饒貧者轉鍾其弊可為痛心難以辭盡頃錢貴物賤殆欲兼倍凡在觸類莫不如兹稼穡難劬斛直數倍機杼勤苦疋裁三百所以然者實亦有繇年常歲調既有定期僮䘏所上咸是見直民間錢多剪鑿鮮復完者公家所受必須貟大以兩代一困於所貿鞭捶質繫益致無聊臣昔沗㑹稽粗閑物俗塘丁所上本不入官良繇陂湖宜壅橋路須通均夫訂直民自為用若甲分毁壞則年一脩改若乙限堅完則終嵗無役今郡通課此直悉以還䑓租賦之外更生一調致令塘路隳蕪湖源泄散害民損政實此為劇建元初狡虜逰魂軍用殷廣浙東五郡丁税一千乃有質賣妻兒以充此限道路愁窮不可聞見所逋尚多收上事絶臣等具啓聞即蒙蠲原而此年租課三分逋一明知擾民實自弊國愚謂塘丁一條冝還復舊在所逋䘏優量原除凡應受錢不限大小仍令在所折市布帛若民有雜物是軍國所需者聽隨價准直不必一應送錢於公不虧其用在私實荷其渥昔晉氏初遷江左草創絹布所值十倍於今賦調多少因時增减永初中官布一疋值錢一千而民間所輸聽為九百漸及元嘉物價轉賤私貨則束直六千官受則疋准五百所以每欲優民必為降落今入官好布疋堪百餘其四民所送猶依舊制昔為損上今為刻下氓庶空儉豈不繇之救民拯弊莫過减賦時和嵗稔尚爾虚乏儻值水旱寧可熟稔且西京熾彊實基三輔東都全固實頼三河歴代所同古今一揆石頭以外裁足自供府州方山以東深關朝廷根本夫股肱要重不可不恤宜蒙寛政少加優養略其目前小利取其長久大益無患民貲不殷國財不阜也宗臣重寄咸云利國竊如愚管未見可安帝不納又武帝新親政水旱不時子良宻啓曰臣思水潦成患良田沃壤變為汙澤農政告祥因髙肆務播植既周繼以旱虐黔庶呼嗟相視禠氣夫國資於民民資於食匪民何以能政臣每一念此寝不便席本始中郡國大旱宣帝下詔除民租今聞所在逋欠尚多守宰嚴期兼夜課切新税力尚無從故調於何取給正當相驅為盗耳愚謂逋租宜皆原除少降停恩微紓民命自宋道無章王風陵替竊官假號駢門連室今左民所檢動以萬數漸漬之来非復始適一朝洗正理致沸騰小人之心㒺思前恩董之以威反怨後罰獸窮則觸事在匪輕齊有天下日淺恩洽未布一方或饑當加優養愚謂自可依源削除未宜便充猥役且部曹檢校誠存精宻令史奸黠鮮不容情情既有私理或枉謬耳目有限羣狡無極變易是非居然可見詳而後取於事未遲眀詔深矜獄圄恩文累降今科網嚴重稱為峻察負罪罹諐充積牢户暑時欎蒸加以金鐵聚憂之氣足感天和民之多怨非國福矣頃土木之務甚為殷廣雖役未及民勤費已積炎旱致災或繇於此皇明載逺書軌未一縁淮帯江數州地耳以魏方漢猶一郡之譬以今比古復為逺矣何得不愛其民緩其政救其危存其命哉湘區奥宻蠻宼熾彊如聞南師未能挫戮百姓齊民積年塗炭疽食侵淫邉虞方重交州􅗥絶一垂實惟荒服恃逺後賔固亦常事自青徳啓運欵關受軄置之度外不足絓言今懸軍逺伐經途萬里衆寡事殊客主勢異以逸待勞全勝難必又縁道調兵以足軍力民丁烏合事乖習鋭廣州積嵗無年越州兵糧素乏加以發借必致驚擾愚謂叔獻所請不宜聽從取亂侮亡更俟後㑹雖緩嵗月必有可擒之理差息發動費役之勞劉楷見甲以助湘中威力既舉蟻宼自服又詔折租布二分取錢子良又啓曰臣一月入朝六登玟陛廣殿稠人裁奉顔色縱有所懷豈敢自達比天眚亟見地孽亟臻民下妖訛好生噂􅊱榖價雖和比室饑嗛縑纊雖賤駢門躶質臣一念此痛入心骨三吳奥區地惟河輔百度所資罕不自出宜在蠲優使其全富而守宰相繼務存掊刻圍桑品屋以准貲課致令斬樹發瓦以充重賦破民財産要利一時在所相承准令上直每至州臺使命切求懸急應充猥役必繇窮困乃有畏失嚴期自殘軀命亦有斬絶手足以避徭役生育弗起殆為常事守長不務先富民而唯言益國豈有民貧於下而國富於上耶又泉鑄嵗逺類多剪鑿江東大錢十不一在公家所受必須輪郭遂買本一千加子七百猶求請無地棰革相繼尋完者為用既不兼兩回復遷貿曾非委積徒令小民每嬰困苦且錢帛相半為制永久或聞長宰須令輸直進違舊科退容姦利八屬近縣既在京畿發借徴調實煩他邑民特尤貧連年失稔草衣藿食稍有流亡今農政就興宜蒙賑給若逋課未上許以申原兖豫二藩雖曰舊鎮往屬兵虞累棄鄉土宻邇㓂庭下無安志編草結菴不違凉暑扶淮聚洛靡有生向俱禀人靈獨絶温飽而賦斂多少尚均沃實謂凡在荒民應加蠲减又司市之要自昔所難頃来此役不繇才舉並條其重貲許以衒鬻前人增估求俠後人加税請代如此輪回終何紀極兼復交闗津要共相唇齒愚野未閑必加陵誑罪無大小横沒貲載凡求試榖帛類非㢘謹未解在事所以開容夫斷獄惟平畫一在制雖恩家得罪必冝申憲鼎姓貽諐最合從網若罰典惟加賤下辟書必蠲世族懼非先王立理之本尚書列曹上應乾象如聞命議所出先咨於都都既下意然後付郎謹冩關行愚謂郎官尤宜推擇宋運告終戎車屢駕寄名軍牒動竊數等故非分充朝資俸殷積廣越邦宰梁益郡邑参差調補實允事機且此徒冗雜罕遵王憲嚴加㢘視隨違彈斥一二年間可减大半永眀初玉輅為重葢又作麒麟頭采畫以馬首戴之子良啓曰聞車旗有章載自前史器必依禮服無舛法凡葢員象天軫方法地上無二天之儀下設兩葢之飾求之志録恐為乖衷又假為麟首加乎馬頭事不師古鮮或可施武帝好射雉子良諌曰鑾轝亟動天蹕屢巡陵犯風烟驅馳野澤萬乗至重一羽甚微貪甚微之驩忽至重之誡頃郊郛以外科禁嚴重匪直芻牧事罷遂乃窀掩殆廢且田月向登桑時告至士女吁嗟易生噂議棄民從欲理未可安曩時巡幸必盡威防領軍景先詹事赤斧堅甲利兵左右屯衛今馳騖外野交侍疎濶晨出晩還頓遺清道此實愚臣最所震迫狡虜玩威甫獲欵闗二漢全富猶加曲待如聞使臣頻亦怨望前㑹東官遂形言色昔宋氏遣使舊列階下劉纉銜使始登朝殿今既反命宜賜優禮伏謂中堂雲構寔惟峻絶檐陛深嚴事隔凉暑而别為一室如或有疑邉帯廣途訛言孔熾毁立之易過於轉圓若依舊通敞實允觀聽頃市司驅扇租估過刻吹毛求瑕廉察相繼被以小罪責以重備愚謂宜勅有司更詳優格臣年方朝賢齒未相及以管窺天猶知失得廊廟之士豈闇是非未聞一人為陛下憂國家非但靣從亦畏威耳臣若不啓陛下於何聞之永眀末又将射雉子良復諌曰忽聞外議伏承當更射雉臣下情震越心懷憂悚猶謂疑妄事不必然伏度陛下以信心明照所以傾金寳於禪靈仁愛廣洽得使禽魚養命於江澤豈惟國慶民懽乃以翺翔洽樂夫衛生保命人獸不殊重軀愛軆彼我無異故禮云聞其聲不忍食其肉見其生不忍見其死且萬乗之尊降同匹夫之樂夭殺無辜傷仁害福之本菩薩不殺壽命得長施物安樂自無恐怖不惱衆生身無患苦臣見功徳有此果報所以日夜劬勤厲身奉法實願聖躬康御若此每至寢夢脱有異見不覺身心立就燋爛陛下常日捨財脩福臣私心顒顒尚恨其少豈可今日見此事一損福業追悔便難臣此啓聞私心實切若是大事不可易改亦願陛下炤臣此誠曲垂三思况此嬉逰之間非闗當否而動輙傷生實可深慎帝雖不盡納而深見寵愛豫章王嶷為侍中揚州刺史唐㝢之賊起啓曰此叚小㓂出於兇愚天網宏罩理不足論但聖眀御世幸可不爾比藉聲聽皆云有繇而然豈得不仰啓所懷少陳心欵山海崇深臣獲保安樂公私情願於此可見齊有天下嵗月未久澤沾萬民其實未多百姓猶險懷惡者衆陛下曲垂流愛每存優旨但頃小大士庶每以小利奉公不顧所損者大撻籍檢工巧督䘏簡小塘藏丁匿口凡諸條制實長怨府此目前交利非天下大計一室之中尚不可精宇宙之内何可周視公家何嘗不知民多欺巧古今政以不可細碎故不為此實非乖理但識理者百不有一陛下弟兒大臣猶不皆能伏理况復天下悠悠萬品怨積聚黨兇迷相類止於一處何足不除脱復多所便成紜紜久欲上啟閒侍無因謹陳愚管伏願特留神思荅曰巧欺那可容宋世混亂以為是不蚊蟻何足為憂已為義勇所破官軍昨至今都應散滅吾政恨其不辦大耳亦何時無亡命邪後乃詔聽復籍魏任城王雲延興中獻文欲禪位於京兆王子推王公卿士莫敢先言雲進曰陛下方隆太平臨覆四海豈得上違宗廟下棄兆民父子相𫝊其来久矣皇魏之興未之有革皇儲正統聖徳夙章陛下必欲割捐塵務頥神清曠者冡嗣之寄宜紹寳厯若或欲捨儲宫輕移宸極恐非先聖之意駭動人情又天下是祖宗之天下而陛下輙改神器上乖七廟之靈下長姦亂之道此是禍福所繇願深思慎之太尉源賀又進曰陛下欲外選諸王而禪位皇叔臣恐春秋烝嘗昭穆有亂脱萬世後必有逆饗之譏深願思任城之言東陽公元丕等進曰皇太子雖聖徳夙彰然實冲㓜陛下富於春秋始覽機政普天景仰率土係心欲隆獨善不以萬物為意其若宗廟何其若億兆何獻文曰儲官正統受終文祖羣公相之有何不可於是傳位於孝文任城王澄為吏部尚書值車樹反叛孝文将欲討之澄表諌不宜親行㑹江陽王繼平之乃止宣武即位澄表曰臣参訓先朝藉規有日前言舊軌頗亦聞之又昔在恒代親習皇宗熟觀秘序庭無闕日臣每於侍坐先帝未嘗不以書典在懷禮經為事周旋之則不輟於時自鳳舉中京方隆禮教宗室之範每蒙委及四門之選負荷銓量自先皇升遐未遑脩述舉官虚荷四門之名宗人有闕四時之業青衿之緒於兹将廢臣每惟其事竊所傷懷伏惟聖畧宏逺四方罕務宴安之辰於是乎在何為太平之世而令子衿之歎興焉聖眀之日而使宗人之訓闕焉愚謂可勅有司脩復皇宗之學開闢四門之教使將落之族日就月将詔曰胄子崇業自古盛典國均之訓無應久廢尚書更可量宜脩立及孝眀時靈太后臨朝澄上表曰伏惟世宗宣武皇帝命将授旗隨陸啓顙運籌制勝淮漢自賔節用勞心志清六合是故纉武脩文仍世彌盛陛下當周康靖治之時豈得宴安於𤣥黙然取外之理要繇内強圗人之本先在自備蕭衍雖虐使其民而窺覦不已若遇我虚疲士民彫窘賊衍年老志張思播虺毒此之弗圗恐受其病伏惟陛下妙齡在位聖徳方昇皇太后縂御天機朝乾夕惕若留意於負荷忿車書之未一進賢㧞能重官人之舉標賞忠清旌養人之器脩干戈之用畜熊虎之士愛時鄙財輕寳重榖七八年間陛下聖畧方剛親王徳幹壯茂将相膂力未衰愚臣猶堪戎伍荷戈帯甲之衆蓄鋭於今燕弧冀馬之盛充牣在昔又賊衍惡積禍盈勢不能久子弟闇悖釁逆已彰亂亡之兆灼然可見兼弱有徴天與不逺大同之機宜須蓄備昔漢帝力疾討㓕英布髙皇卧病親除顯達夫以萬乗之主豈㤀宴安實以侵名亂正計不得已今宜慕二帝之逺圗以肅寧為大任然頃年以来東西㓂難艱虞之興首尾連接雖尋得翦除亦大損財力且饑饉之氓散亡莫保收入之賦不增出用之費彌衆不愛力以悦民無豐資以待敵此臣所以夙夜懷憂悚息不寧者也易曰何以守位曰仁何以聚人曰財財者非天不生非地不長非時不成非人不聚聚財如此之難守位若此之重興替之道焉可不慮又古者使民嵗不過三日食壮者之糧任老者之智此雖太平之法難卒而用然妨民害財亦不宜不戒今墉雉素脩廐庫崇列雖府寺膠塾少有未周大抵省府粗得庇憇理務寺塔足致䖍講道唯眀堂辟雍國禮之大来冬司徒兵至請籌量减徹專力經營務令早就其廣濟數施之財酬商互市之弊凡所營造自非供御切須戎仗急要亦宜微减以務阜積庻無横損民有全力夫食土簋而媯徳昭寝卑室而禹功盛章䑓麗而楚力衰阿宫壮而秦財竭存亡之繇灼然可覩願思前王一同之功畜力聚財以待時㑹靈太后鋭於繕興在京師則起永寧太上公等佛寺功費不少州各造五級佛圗又數為一切齋㑹施物動至萬計百姓疲於土木之功金銀之價為之踴上削奪百官事力費損庫藏兼曲賚左右日有數千澄故有此表雖卒不從常優禮答之清河王懌宣武初司徒髙肇以帝舅寵任擅權懌上言曰臣聞唯器與名不可以假人是故季氏旅泰宣尼以為深譏仲叔軒懸丘眀以為至誡諒以天尊地卑君臣道别宜杜漸防萌無相僣越至於减膳録囚人君之事今乃司徒行之詎是人臣之義且陛下脩政教解獄訟則時雨可降玉燭知和何使眀君失之於上奸臣竊之於下長亂之基於此在矣帝笑不應孝眀時有沙門惠憐者自云咒水飲人能差諸病病人就之者日有千數靈太后詔給衣食事力優重使於城西之南治療百病懌表諌曰昔新垣之奸不登於明堂五利之詐終嬰於顯戮故律深惑衆之科禮絶妖淫之禁皆所以大眀居正防遏姦邪昔在漢末有張角者亦以此術熒惑當時論其所行與今不異遂能眩誘生人致黄巾之禍天下塗炭數十年間角之繇也任城王澄子順屬靈太后頗事糚飾數出逰幸順面諍曰禮婦人夫䘮自稱未亡人首去珠玉衣不被綵陛下母臨天下年垂不惑過自脩飾何以示後世靈太后慙而不出還入宫責順曰千里相徵豈欲衆中見辱順曰陛下盛服炫容不畏天下所笑何恥臣之一言乎臨淮王孝友眀於政理嘗奏表曰令制百家為黨族二十家為閭伍家為比鄰百家之内有帥二十五徴發皆免苦樂不均羊少狼多復有蠶食此之為弊久矣京邑諸坊或七八百家唯一里正二史庶事無闕而况外州乎請依舊制三正之名不改而百家為四閭閭二比計族省十二丁物十二疋貲絹畧計見管之户應二萬族一嵗出貲絹二十四萬疋十五丁出一畨兵計得一萬六千兵此富國安人之道也古諸侯娶九女士有一妻二妾晉令諸王置妾八人郡公侯妾六人官品令第一第二品有四妾第三第四有三妾第五第六有二妾第七第八有一妾所以隂教聿脩繼嗣有廣廣繼嗣孝也脩隂教禮也而聖朝忽棄此數繇来漸久将相多尚公主王侯多娶后族故無妾媵習以為常婦人多幸生逢今世舉朝既是無妾天下殆皆一妻設令人強志廣娶則家道離索身事迍邅内外親知共相嗤恠凡今之人通無准節父母嫁女則教之以妬姑姊逢迎必相勸以忌持制夫為婦徳以能妬為女工自云受人欺畏他笑我王公猶自一心已下何敢二意夫妬忌之心生則妻妾之禮廢妻妾之禮廢則姦淫之兆興斯臣所以毒恨者也請以王公第一品娶八妾通妻以備九女稱事二品備七三四品備五五六品則一妻二妾限以一周悉令充數若不充數及待妾非禮其妻妬加捶撻免所居官其妻無子而不娶妾斯則自絶無以血食祖父請科不孝之罪離遣其妻臣之赤心義唯家國欲使吉㓙無不合禮貴賤各得其宜省人帥以出兵丁立倉儲以豐榖食設賞格以擒姦盗行典令以示朝章庻使足食足兵人信之矣又冐申妻妾之數正欲王侯将相功臣子弟苖裔滿朝傳祚無窮此臣之志也詔付有司議奏不同孝友又言今人生為皂𨽻𦵏擬王侯存沒異途無復節制崇壮丘壠盛飾祭儀隣里相榮稱為至孝又夫婦之始王化所先共食合瓢足以成禮而今之富者彌奢同牢之設甚於祭槃累魚成山有林木之像鸞鳳斯存徒有煩勞終成委棄仰惟天意其或不然請自兹以後若婚𦵏過禮者以違旨論官司不加紏劾即與同罪臨淮王彧孝荘時追崇父武宣王為文穆皇帝廟號肅祖母李妃為文穆皇后将遷神主於太廟以孝文為伯考彧表諌以為漢祖創業香街有太上之廟光武中興南頓立舂陵之寝元帝之於光武疏為絶服猶尚身奉子道入繼大宗髙祖之於聖躬親實猶子陛下既纂洪緒豈宜加伯考之名且漢宣之繼孝昭斯乃上後叔祖豈忘宗承考妣葢以大義斯奪及金徳将興宣王受寄景王意存毁冕文王心規裂冠雖祭則魏主而權歸晉室昆之與季實傾曹氏且子元宣王冡𦙍文王成其大業故晉武繼文祖宣景有伯考之稱以今類古恐或非儔髙祖徳溢寰中道超無外肅祖雖勲格宇宙猶曾奉贄稱臣穆后禀徳坤元復将配享乾位此乃君臣並筵嫂叔同室厯觀墳籍未有其事時荘帝意鋭朝臣無敢言者唯彧與吏部尚書李神嶲並有表聞詔報曰文穆皇帝勲格四表道邁百王是用考循舊軌恭上尊號王表云漢太上於香街南頓於舂陵漢髙不因瓜瓞之緒光武又無世及之徳皆身受符命不繇父祖别廟異寝於理何差文穆皇帝天睠人宅厯數有歸朕忝承下武遂主神器既帝業有統漢氏非倫若以昔况今不當移寝則魏太祖晉景帝雖王跡已顯皆以人臣而終豈得與餘帝别廟有闕餘序漢郡國立廟者欲尊髙祖之徳使饗遍天下非關大廟神主獨在外祠薦漢宣之父亦非勲徳所出雖不追尊不亦可乎伯考之名自是尊卑之序何必准古而言非類也復云君臣同列嫂叔共室當以文穆皇帝昔遂臣道以此為疑禮天子元子猶士禘祫豈不同室乎且晉之文景共為一代議者云世限七室主無定數昭穆既同眀有共室之理禮既有祔嫂叔何嫌禮士祖禰一廟豈無婦舅共室也若專以共室為疑容可更議遷毁荘帝既逼諸妹之請此詞意黄門侍郎常景中書侍郎邢子才所賛成也又追尊兄彭城王為孝宣皇帝彧又面諌曰陛下作而不法後世何觀歴尋書籍未有其事帝不從及神主入廟復勅百官悉陪從一依乗輿之式彧上表以為爰自中古迄於下葉崇尚君親褒眀功徳乃有皇號終無帝名今若去帝直留皇名求之古義少有依准又不納濟隂王暉業弟昭業頗有學尚位諌議大夫荘帝将幸雒南昭業立於閶闔門外扣馬諌帝避之而過後勞之北齊永安簡平王浚保定初進爵為王文宣末年多酒過浚謂親近曰兄舊来不甚了了自登阼已後識解頓進今因酒敗徳朝臣無敢諌者大敵未㓕吾甚以為憂欲乗驛至鄴靣諌不知用吾不人有知宻以白帝因見銜八年来朝從幸東山帝裸裎為樂雜以婦女又作狐掉尾戲浚進言此非人主所宜帝甚不悦浚又於屏處召楊遵彦譏其不諌帝時不欲大臣與諸王交通遵彦懼以奏帝帝大怒曰小人繇来難忍遂罷酒還宫河南王孝瑜文襄長子也武成嘗使和士開與胡后對坐握槊孝瑜諌曰皇后天下之母不可與臣下接手帝深納之後又言趙郡王父死非命不可親河間王孝琬文襄第三子天統中累遷尚書令初突厥與周師入太原武成避之而東孝琬扣馬諌請委趙郡王部分之必整齊帝從其言孝琬免胄将出帝使追還周軍退拜并州刺史册府元龜卷二百八十八
