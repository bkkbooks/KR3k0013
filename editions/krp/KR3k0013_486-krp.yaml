body:
  text: 册府元龜卷四百八十六宋王欽若等撰邦計部户籍遷徙户籍自黄帝疆理天下畫為萬國而户籍之制無聞焉禹湯之際聊可紀述施及周室六官竝建而司民掌登萬民之數自生齒以上皆書於版太宰之職聽閭里以版圖然後計口占數之法著矣秦民之後迄于漢世書年附籍因革或異鼎國而降逮於東晉僑居頗衆多仍舊號爾後南北之制並立㳂襲之典既殊隋令唐式斯可遵矣乃若比屋之登耗夫家之衆寡乘亂離之云瘼因而削減屬承平之寖乆復以富庶皆開卷而可覿焉信乎有司之傳史官之計不可以忽巳夏禹平水土為九州人口千三百五十五萬三千九百二十三周成王致理刑措人口千三百七十萬四千九百二十三莊王十三年五千里外非天子之御自太子公卿以下至于庶人凡一千一百九十四萬一千九百二十三人秦獻公十年為户籍相伍始皇十六年初令男子書年漢高帝初為沛公既至咸陽沛丞蕭何先入收秦丞相御史律令圖書藏之沛公具知天下阨塞户口多少強弱處民所疾苦者以何得秦圖書景帝二年令天下男子年二十始傅傅音附著也著名籍給公家徭役平帝元始二年人户千二百二十三萬三千口五千九百五十九萬四千九百七十八後漢光武中元二年户四百二十七萬九千六百三十四口二千一百萬七千八百二十桓帝永壽三年户千六百七萬七千九百六十口五千六百四十八萬六千八百五十六魏陳留王時户六十六萬三千四百二十三口四百四十三萬二千八百八十一又平蜀得户二十八萬口九十四萬天下户九十四萬三千四百二十三口五百三十七萬二千八百九十一蜀先主章武元年國有户二十萬男女口九十萬呉大帝赤烏三年國中户五十二萬男女口二百三十萬晉武帝時户一百九十二萬六千八百四口千三百八十六萬三千八百六十三太康元年平呉收其圖籍得户五十二萬三千男女口二百三十萬天下户二百四十五萬九千八百四口千六百一十六萬三千八百六十三有司又奏男子年十六已上至六十為正丁十五以下至十三六十已上至六十五為次丁十二以下六十六以上為老小不事元帝時百姓自抜奔者竝謂之僑人皆取舊壤之名僑立郡縣徃徃散居無有土著哀帝興寧二年三月庚戌朔大閱户人嚴法禁稱為庚戌制一說天下所在土著宋高祖初為晉侍中録尚書上表曰臣聞先王制治九土攸序分境畫疆各安其居在昔盛世人無遷業故井田之制三代以隆秦革斯政漢遂不改富強兼并於是為弊然九服弗擾所託成舊在漢西京大遷田景之族以實闗中即以三輔為鄉閭不復係之於齊楚自永嘉播越爰託淮海朝有興復之美民懐思本之心經略之圖日不暇給是以寧民緩治猶有未遑及至大司馬桓温以民無定本傷治為深庚戌土斷以一其業于時財阜國豐實由於此自兹迄今彌歴年載畫一之制漸用頺弛雜居流寓閭伍弗修王化所以未純民瘼所以猶在臣荷重任恥責實深自非改調更張無以濟治夫人情滯常難與慮始所謂父母之邦以為桑梓者誠以生焉終焉敬愛所託耳今所居累世墳壠成行敬恭之誠豈不與事而至請准庚戌土斷之科庶子本所𢎞稍與事著然後率之以仁義鼓之以威武超大江而跨黄河撫九州而復舊土則戀本之志乃速申於當年在始暫勤要終所以能易伏惟陛下垂矜萬民憐其所失永懐鴻鴈之詩思隆中興之業既委臣以國重期臣以寜濟若所啟合允請付外施行於是依界土斷惟徐兖青三州居晉陵者不在斷例諸流寓郡多被并省永初元年八月戊午詔先是開赦限内首出蠲租布二年先有狀黄籍猶存者聽復本注諸舊郡縣以北為名者悉除寓立於南者聽以南為號孝武大明八年户九十萬六千八百七十口四百六十八萬五千五百一是時王敬𢎞上言舊制人年十二半役十六全當以十三以上能自營私及公故以充役考之見事猶或未盡體有強弱不能稱耳循吏隠恤可無甚患庸愚守宰必有勤劇况值苛政豈可稱言至令逃竄求免胎孕不育乃避罪憲實亦由兹今皇化惟新四方無事役名之宜應存消息十五至十六宜為半丁十七為全丁帝從之後廢帝元徽元年詔曰分方正俗著自虞册川谷異制煥乎姬典故井遂有辨閭伍無雜用能七教克宣八政斯序雖綿代殊軌㳂革異儀或民懐遷俗或國尚興徙漢陽烈燕代之豪闗西熾齊楚之族竝通籍新邑即居成舊洎金行委御禮樂南移中州黎庶襁負揚越聖武造運道一閎區貽長世之規申土斷之制而夷險相因盈晦遞襲歳饉彫流戎役惰散違鄉寓境漸至繁積宜式遵鴻軌以為永憲庶阜俗昌民反風定保夷胥山之險澄瀚海之波括河圖於九服振玉軔於五都矣南齊太祖建元二年勑黄門郎虞玩之與驍騎將軍傅堅意簡定簿籍詔朝臣曰黄籍民之大紀國之治端自頃民俗巧偽為日已乆至乃竊注爵位盜易年月増損三狀貿襲萬端或户存而文書已絶或人在而反託死板停私而云𨽻役身強而稱六疾編户齊家少不如此皆政之巨蠧教之深疵比年雖却籍改書終無得實若約之以刑則民偽已逺若綏之以德則勝殘未易卿諸賢竝深明治體可各獻嘉謀以振澆化又臺坊訪募此制不近優刻素定閒劇有常宋元嘉以前兹役常滿大明以後樂補稍絶或縁冦難頻起軍䕃易多民庶從利役坊者寡然國經未變朝紀常在相揆而言隆替何速此急病之洪源晷景之切患以何科算革斯弊耶玩之上表曰宋元嘉二十七年八條取人孝建元年書籍衆巧之所始也元嘉中故光禄大夫傅隆年出七十猶手自書籍躬加隠校何必有石建之慎高柔之勤葢以世屬休明服道修身故耳今陛下日旰忘食未明求衣詔逮幽愚謹陳妄說古之共治天下惟良二千石今欲求治取正其在勤明令長凡受籍縣不加簡合封送州州簡得實方却歸縣吏貪其賂民肆其奸奸彌深而却彌多賂愈厚而答愈緩自泰始三年至元徽四年揚州等九郡四號黄籍共却七萬一千餘户于今十一年矣而所正者猶未及四萬神州奥區尚或如此江湘諸郡倍不可念愚謂宜以元嘉二十七年籍為正民惰法既乆今建元元年書籍宜更立明科一聽首悔迷而不反依制必戮使官長於簡校必令明洗然後上州永以為正若有虗昧州縣同科今户口多少不減元嘉而板募頓闕弊亦有以自孝建以來入勲者衆其中操干戈衛社稷者三分殆無一焉勲簿所領而詐注辭籍浮遊世要非官長所拘録復為不少尋蘓峻平後庾亮就温嶠求勲籍而嶠不與以為陶侃所上多非實録尋物之懐私無世不有宋末落紐此巧尤多又將位既衆舉䘏為録實潤甚微而人領數萬如此二條天下合役之身已據其大半矣又有改注籍狀詐入仕流昔為人役者今反役人又生不長髪便謂為道填街溢巷是處皆然或抱子并居竟不編户遷徙去來公違土斷屬役無滿流亡不歸寜䘮終身疾病長卧法令必行自然競反四鎮戍將有名寡實隨才部曲無辨勇懦署位借給巫媪比肩彌山滿海皆是私役行貨求位其塗甚易募役卑劇何為投補坊吏之所以盡百里之所以殫也今但使募制明信滿復有期民無逕路則坊可立表而盈矣為治不患無制患在不行不患不行患在不乆上省玩之表納之乃别置板籍官置令史限人一日得數巧以妨懈怠於是貨賂因緣籍注雖正猶強推却以充程限至世祖永明八年謫巧者戍縁淮各十年百姓怨望世祖乃詔曰夫簡貴賤辨尊卑者莫不取信於黄籍豈有假器濫榮竊服非分故所以澄革虗妄式允舊章然釁起前代過非近失既徃之諐不足追咎自宋昇明以來皆聽復注其有讁役邊疆各許還本此後有犯嚴加翦治梁高祖天監元年土斷南徐州諸僑郡縣陳文帝天嘉元年詔曰自頃䘮亂編户播遷言念餘黎良可哀惕其亡鄉失土逐食流移者今年内隨其適樂來嵗不問僑舊悉令著籍同土斷之例宣帝時户六十萬後主時户五十萬口二百萬後魏孝文太和十年二月甲戌初立黨里隣三長定民户籍魏初不立三長故民多䕃附䕃附者皆無官役豪強徴斂倍于公賦是年給事中李沖上言宜准古五家立一隣長五隣立一里長五里立一黨長取鄉人強謹者充從之十一年九月詔曰去夏以嵗旱民饑須遣就食舊籍雜亂難可分簡故依局割民閱户造籍欲令去留得實賑貸平均然乃者以來猶有餓死衢路無人收識良繇本部不明籍貫未實禀恤不用以至於此朕猥居民上聞用慨然可重遣精簡勿令遺漏一人孝明正光以前時惟全盛户口之數比晉太康倍而餘矣按晉太康元年户二百四十五萬三千八百今云倍而餘者則五百餘萬矣孝莊末爾朱之亂其後分為二國户三百三十七萬五千三百六十八北齊神武為東魏孝靜相興和中頻嵗大穰榖斛至九錢是時法網寛弛百姓多離舊居闕於徭賦神武乃命孫騰高隆之分括無籍之户得六十餘萬於是僑居者各勒還本屬武成河清三年定令乃命人居十家為比隣五十家為閭里百家為族黨男子十八以上六十五以下為丁十六以上十七以下為中六十六以上為老十五以下為小少帝承光元年為周師所滅有户三百三萬二千五百二十八口二千萬六千八百八十後周太祖為相創制六官載師掌任土之法辨夫家田里之數㑹六畜車乗之稽審賦役斂弛之節制畿疆修廣之域頒施惠之要審收産之政宣帝大象中户三百五十九萬口九百萬隋髙祖開皇二年受周禪有户三百六十萬乃頒新令男女三嵗以下為黄十嵗以下為小十七以下為中十八以上為丁以從課役六十為老乃免三年正月初令軍人以二十一成丁是時山東尚承齊俗機巧奸偽避役惰遊者十六七四方疲人或詐老或小規免雜賦髙祖乃令州縣大索貌閱户口不實者正長逺配而又開相糾之科大功以下兼令折籍各為户頭以防容隱於是計帳進二十四萬三千丁新附六十四萬一千五百户左僕射髙熲以人間課役雖有定分年常徴納除注常多長吏肆情文帳出沒復無定簿難以推校乃為輸籍定様請遍下諸州每年正月五日縣令廵人各隨便延五黨共為一團依様定户上下帝從之自是奸無所容矣十年五月詔曰魏末䘮亂㝢縣􅏨分役車嵗動未遑休息兵士軍人搆置坊府南征北伐居處無定家無完堵地罕苞桑常為流寓之人竟無鄉里之號朕甚愍之凡是居人可悉屬州縣墾田籍帳一與民同軍府統領宜依舊式焬帝即位詔男子以二十二成丁大業二年户八百九十萬七千五百三十六口四千六百一萬九千九百五十六唐高祖武德二年十二月七日勑百姓年五十者皆免課役六年三月令以始生為黄四嵗為小十六為中二十一為丁六十為老是月令天下户量其資産定為三等每嵗一造帳三年一造籍州縣留五比尚書省留三比九年三月詔天下户為三等未盡升降宜為九等太宗貞觀中户不滿三百萬二十年太宗問民部侍郎盧承慶歴代户口多少之數承慶叙夏殷之後迄於周隋皆有依據太宗嗟賞乆之高宗永徽三年七月二十二日帝問户部尚書高履行去年進户多少履行奏去年進户一十五萬髙宗以天下進户既多謂無忌曰比來國家無事户口稍多三二十年足堪殷實因問隋有㡬户今有幾户履行奏隋大業中户八百七十萬今户三百八十五萬帝曰自隋末亂離户口減耗邇來雖復蘇息猶大少于隋初五年二月勑天下二年一定户顯慶二年十月髙宗問中書令杜正倫隋有㡬户正倫奏大業初有八百餘萬户末年離亂至武德有二百餘萬户總章元年十月司空李勣破高麗國虜其王下城百七十户六十九萬七千二百配江淮以南山南京西儀鳳二年二月勑自今以後漢省籍及州縣籍則天延載元年八月勑諸户口計年將入丁老疾應免課役及給侍者皆縣親貌形狀以為定簿一定已後不得更貌疑有奸濫者聽隨時貌定以附手實證聖元年鳯閣舎人李嶠上表曰臣聞黎庶之數户口之衆而條貫不失按此可知者在于各有管統明其簿籍而已今天下之人流散非一或違背軍鎮或因緣逐糧茍免嵗時偷避徭役此等浮衣寓食積嵗淹年王役不供簿籍不挂或出入闗防或徃來山澤非直課調虗蠲闕於常賦亦自誘動愚俗堪為患禍不可不深慮也或逃亡之户或有簡察即轉入他境還行自容所司雖具條科頒其法禁而相看為例莫適遵承縱欲糾其愆違加之刑罰則百州千郡庸可盡科前既依違後仍積習簡獲者無賞停止者獲原浮逃不悛亦由於此今縱更捜簡而委之州縣則還襲舊蹤卒於無益臣以為宜令御史督察簡校設禁令以防之垂恩德以撫之施權衡以御之為制限以一之然後逃亡可還浮寓可絶所謂禁令者使閭閻可保逓相覺察前後乖避皆許自新仍有不出輙聽相告每糾一人隨事加賞明為科目使知勸沮所謂恩德者逃亡之徒乆離桑梓糧儲空闕田地荒廢即當賑其乏少助其修營雖有欠賦懸徭背軍離鎮亦皆捨而不問寛而勿徵其應還家而貧乏不能致者乃給程糧使逹本貫所謂權衡者逃人有絶家去鄉離本失業心樂所住情不願還聽於所在𨽻名即編為户夫顧小利者失大計存近務者䘮逺圖今之議者或不逹於變通以為軍府之地户不可移闗輔之人貫不可改而越闗繼踵背府相尋是開其逃亡而禁其割𨽻也就令逃亡者多不能總許割𨽻猶當計其户口等量為節文殷富者令還貧弱者令住簡責已定計科已明户無失編人無廢業然後按前躅申舊章嚴為防禁與人更始所謂限制者逃亡之人應自首者以符到百日為限限滿不出依法科罪遷之邊州如此則户無所遺人無所匿矣萬嵗通天元年七月二十二日勑天下百姓父母另外繼别籍者所析之户等第竝須與本户同不得降下其應入役者共計本户丁中用為等級不得以析生蠲免其差科各從析户祗承勿容遞相影䕶中宗神龍元年五月十八日制二十二成丁五十九免役因韋庶人所奏十一月户部尚書蘇瓌奏計户六百三十五萬六千一百四十一景龍二年閏九月勑諸籍應送省者附當州庸調車送若庸調不入京僱脚運送所須脚直以官物充諸州縣籍手實計帳常留五比省籍留九比其逺年依次除皇宗祖廟難毁其子孫皆於宗正附籍自外悉依百姓例睿宗景雲元年七月勑韋庶人所奏成丁入老宜停𤣥宗開元九年正月二十八日監察御史宇文融請簡察色役偽濫并逃户及籍田因令充使於是奏勸農判官數十人使還得户八十餘萬田亦稱是十二年八月宇文融除御史中丞充諸色安輯户口使十四年户部進計帳言今年管户七百六萬九千五百六十五十八年十一月勑天下户等第未平昇降須實比來富商大賈多與官吏徃還遞相憑囑求居下等自今以後不得更然如有囑請者所由牧宰録名封進朕當處分京都委御史外州委本道如有隱蔽不言隨事彈奏是月又勑諸户籍三年一造起正月上旬縣司責手實計帳赴州依式勘造鄉别為卷總寫三通其縫皆注某州某縣某年籍州名用州印縣名用縣印三月三十日納訖竝装潢一通送尚書省州縣各留一通所須紙筆裝潢竝皆出當户户口内外一錢其户每以造籍年預定為九等便注籍脚有析生新附者于舊户後以次編附二十年户部計帳管户七百八十六萬一千二百三十六口四千五百四十三萬一千二百六十五二十二年户部計帳管户八百萬八千七百一十二十四年三月勑朕以百姓為心固非一人獨理委之牧宰輯寜兆庶若考論政績在户口存亡不有甄明何憑賞罰自今以後天下諸州户口或刺史縣令自離任者竝宜分明交付州縣仍每至年終各具存亡及増加實數同申竝委採訪使重覆報省所司明為課最具條件奏聞隨事褒貶以旌善惡七月勑諸州逃人先除籍帳能自歸復業者其應徵當年租庸資課一事已上竝宜放免其隱漏舉首改正人等亦宜准此二十六年二月勑諸州應歸首復業比來每至年終皆當州録奏自今已後竝宜牒報本道採訪使同勘當道歸首人每州畧單數同一狀奏仍挾名報所由二十九年二月勑自今以後應造籍宜令州縣長令録事參軍審加勘覆更有疎遺者委所司具本判官及官長等名品録奏其籍仍冩兩本送户部三月勑天下諸州每嵗一團貌既以轉年為定復有籍書可憑何至勞煩不從簡易於人非便事資釐革自今以後每年小團宜停待至三年定户日一時團貌仍令所司條件處分天寳元年正月制節文如聞百姓之内或有户髙丁多茍為規避父母見在别籍異居宜令州縣仔細勘㑹其一家之中有十丁以上者放兩丁征行賦役五丁巳上者放一丁即令同籍共居以敦風教如更犯者准法科罪是年户八百三十四萬八千三百九十五口四千五百三十一萬一千二百七十二一云計户八百五十三萬五千七百六十三三年正月十六日勑天寳三年改為三載者所論前後年號一切為載其後造帳記嵗月云若干載自餘表狀文章竝准此二月二十五日制天下籍造四本京師東京尚書省户部各貯一本十二月二十五日赦文比者成童之嵗則挂輕徭既冠之年使當正役閔其勞苦用軫于懐自今以後百姓宜以十八已上為中男二十三已上成丁四載三月勑朕聽政之餘而精思理本意有所得庶益於人且什一而税前王令典農商異宜舊制猶闕今欲審其户等極貧乏之人賦彼商賈抑浮惰之業優劣之際有深察之明閭里之間無不均之歎頃以人不欲擾法貴從寛所以比來未全定户今已經數載産業或成適可因兹平於賦税自今已後每至定户之時宜委縣令與村鄉對定審於衆議察以資財不得容有愛憎以為髙下狥其虗妄令不均平使每等之中皆稱允當仍委太守詳覆如有不平縣令録奏量事貶降其鄉村對定之人便與節級科罪覆定之後明立簿書每有差科先從高等務兹不足庶叶彛倫是月户部郎中王鉷加勾當户口色役使七月勑今載諸郡因團貌宜便定户自今已後任依常式應察問對衆取平是載制天下籍造四本京師東京尚書省户部各貯一本五載六月勑自今以後應造籍帳及公私文書所言田地四至者改為路九載十二月二十九日勑天下郡縣雖一載定户每載亦有團貌計其轉年合入中男成丁五十九者任退團貌十二載正月勑應送東京籍宜停十三載計户九百六十一萬九千一百五十四肅宗至徳二載計户八百一萬八千七百一十乾元三年計户一百九十三萬一千三百二十五代宗寳應元年九月勑客户若住經一年已上自貼買得田地有農桑者無問於莊蔭家住及自造屋舎勒一切編附為百姓差科比居人例量減一半庶填逃散廣德元年七月赦天下男子二十五成丁五十五入老二年二月二十一日赦天下户口委輸刺史縣令據見在實户量貧富作等第差科不得依舊籍帳是年計户二百九十三萬三千一百二十五大歴四年八月勑名籍一家輙請移改詐冐規避多出此流自今以後割貫改名一切禁斷德宗以大歴十四年即位十一月己丑詔令前州府造籍者罷之初户部奏請令造籍從之尋以為未可故罷建中元年十二月定天下兩税户凡三百八十萬五千七十六貞元三年五月詔曰諸州户減耗三分去二其官員亦令減省憲宗元和二年十二月史官李吉甫等撰元和國計簿十卷總計天下方鎮凡四十八道管州府二百九十三縣一千四百五十三見定户二百四十四萬二百五十四其鳯翔鄜坊邠寜振武涇原銀夏靈塩河東易定魏博鎮冀范陽淮西淄青十五道七十一州竝不申户口數每嵗賦入倚辨止於浙西東宣歙淮南江西鄂岳福建湖南等道合四十九州一百四十萬户比量天寳供税之户四分有一天下兵戎仰給縣官八十三萬餘人比量士馬三分加一卒以兩户資一兵其他水旱所損徵科妄歛又在常役之外李吉甫等又云元和中户二百四十七萬三千九百六十三六年正月衡州刺史呂温奏當州舊額户一萬八千四百七除貧窮死絶老㓜單孤不支濟等外堪差科户八千二百五十七臣到後團定户税次簡責出所由隱藏不輸税户一萬六千七伏縁聖恩録臣在道州微効擢授大郡令撫傷殘臣昨尋舊案詢問閭里承前徵税竝無等第又二十餘年都不定户存亡孰察貧富不均臣不敢因循設法團定簡獲隱户數約萬餘州縣雖不増徵科所由己私自斂率與其潛資於奸吏豈若均助於疲人臣請作此方圓以救凋瘵庶得下免偏苦上不闕供勑宜付所司二月制自定兩税以來刺史以户口増減為殿最故有析户以張虗數或分産以繫户名兼招引浮客用為増益至于税額一無所加徒使人心易揺土著者寡觀察使嚴加訪察必令詣實穆宗以元和十五年正月即位勑天下百姓自屬艱難棄于鄉井户部版籍虗繫姓名建中元年以來改革舊制悉歸兩税法乆即弊奸濫益生自今以後宜准例三年一定兩税非論土著客居但據資産差卒長慶中户三百九十四萬四千五百九十五敬宗寳歴中户三百九十七萬八千九百八十二文宗大和中户四百三十五萬七千五百七十三開成二年正月户部侍郎判度支王彦威進所撰供軍圖其表畧曰起自至德乾元之後迄于貞元元和之際天下有觀察者十節度者二十有九防禦者四經畧者三掎角之師犬牙相制大都通邑無不有兵約計中外兵額又至八十餘萬長慶户口凡三百三十五萬而兵額又約九十九萬通計三户資奉一兵今計天下租賦一嵗所入總不過三千五百餘萬而上供之數三之一焉三分之中二給衣賜自留州使兵士衣食之外其餘四十萬衆仰給度支伏以時逢理安運屬神聖然而兵不可弭食或惟時憂勤之端兵食是切臣謬司邦計䖍奉睿圖輙纂事功庶禆聖覽四年計户都管四百九十九萬六千七百五十二武宗會昌中户四百九十五萬五千一百五十一五年八月制朕聞三代已前未常言佛漢魏之後像教寖興是逢季時傳此異俗且一夫不田有受其餒者一婦不織有受其寒者今天下僧尼不可勝數皆待農而食待蠶而衣貞觀開元亦常釐革剗除不盡流行滋多中外誠臣恊予正意濟人利衆予不讓焉天下還俗僧尼二十六萬五千餘人奴婢為兩税户十五萬人梁太祖開平三年中書侍郎同平章事判户部事于兢奏伏乞降詔天下州府各准舊章申送户口籍帳允之晉少帝開運元年八月勑夏秋徵科為帳籍一季一奏周世宗顯德五年十月命左散騎常侍艾穎等三十四人使于諸州簡定民租明年春使廻總計簡到户二百三十萬九千八百一十二定墾田一百八萬五千八百三十四頃淮南郡縣不在此數是月又詔諸道州府令團并鄉村大率以百户為團每團選三大户為耆老凡夫家之有奸盜者三大户察之民田之有耗登者三大户均之仍每及三載即一如是遷徙周官比長之職凡徙于國中及郊則從而授之若徙于他鄉則為之旌節而行之無節則内之圜土葢徙名移貫之制舊矣周室之後施於列國遷徙民籍斯可槩舉秦漢之後或充實闗輔或尊奉園邑繇是温房富室髙訾大族或應募而徙或占數以居時加厚賜以申善誘至於畏敵國之侵擾濟窮邊之虗弱破姦猾之伍革蠻貊之政則又僑置郡縣空其疆宇者焉若乃狥人之欲因地之利就寛曠而為樂返舊故而攸寧優其賑給加之蠲復斯固有如歸之美無失所之嘆也已周武王克商成周既成洛陽下都遷殷頑民殷大夫士心不則徳義之經故徙近王都教誨之周公以王命詔稱成王命告令之成王既踐奄遷其君于蒲姑已滅奄而徙其君及人臣之惡者于蒲姑蒲姑齊地近中國教化之所桓王十五年魯桓公七年夏盟向求成于鄭既而背之盟向二邑名隠公十一年王以與鄭故求為鄭成秋鄭人齊人衛人伐盟向王遷盟向之民于郊景王十二年魯昭公九年楚然丹遷城父人於陳以夷濮西田益之以夷田在濮水西者與城父人遷方城外人於許成十五年許遷葉調之許今許遷于夷故以方城外人實其處秦始皇二十八年徙黔首三萬户琅邪臺下三十六年徙民於北河榆中三萬家漢髙祖五年九月徙諸侯於闗中九年十一月徙齊楚大族昭氏屈氏景氏懐氏田氏五姓闗中與利田宅初劉敬使匈奴來因言匈奴河南白洋樓煩王白洋匈奴國名也去長安近者七百里輕騎一日一夕可以至言匈奴欲來為冦者秦中新破秦中謂闗中故秦地也新破謂經兵革之後未殷實也少民地肥饒可益實夫諸侯初起時非齊諸田楚昭屈景莫與皆二國之士族今陛下雖都闗中實少人北近胡冦東有六國強族一日有變陛下亦未得安枕而卧也臣願陛下徙齊諸田楚昭屈景燕趙韓魏後及豪傑名家且實闗中無事可以備胡諸侯有變亦足率以東伐此強本弱末之術也帝曰善乃使劉敬徙所言闗中十萬餘口景帝元年正月詔曰其議民欲徙寛大地者聽之武帝建元二年作茂陵邑三年春賜徙茂林者户錢二十萬田二頃元朔二年夏募民徙朔方十萬口又徙郡國豪傑及訾三百萬已上于茂陵初主父偃説帝曰茂陵初立天下豪傑兼并之家亂衆民皆可徙茂陵内實京師外消姦猾此所謂不誅而害除帝從之元狩五年徙天下奸猾吏民于邊猾狡也音乎八切元鼎六年開西南夷置郡縣徙吕氏以充之因名不韋縣謂秦徙呂不韋子弟于蜀漢故以為名是年分武威酒泉地置張掖敦煌郡徙民以實之元封元年東越殺王餘善降詔曰東越險阻反覆為後世患遷其民於江淮間遂虗其地三年秋分徙酒泉郡分謂不盡徙之也太始元年徙郡國吏民豪傑于茂陵雲陵此當言雲陽而轉冩者誤為陵耳茂陵帝所自起而雲陽甘泉所居故總使徙豪傑也鈎弋趙婕妤死葬雲陽至昭帝即位始尊為皇太后而起雲陵武帝時未有雲陵昭帝始元三年秋募民徙雲陵賜錢田宅四年夏徙三輔富人于雲陵賜錢户十萬宣帝本始元年春正月募郡國吏民貲百萬以上徙平陵二年春以水衡錢為平陵徙民起第宅水衡與少府皆天子私藏耳縣官公作當仰給司農今出水衡錢言宣帝即位為異政也元康元年徙丞相將軍列侯吏二千石貲百萬者杜陵成帝鴻嘉二年夏徙郡國豪傑貲五百萬以上五千户于昌陵賜丞相御史將軍列侯公主中二千石冡地第宅後漢光武建武十五年徙鴈門代郡上谷三郡民置常闗居庸闗以東前書曰代郡有常山闗上谷郡居庸縣有闗時胡冦數犯邊故徙之十七年趙憙為平原太守時平原多盜賊憙與諸郡討捕斬其渠帥餘黨坐者數十人憙上言惡止其身可一切徙京師近郡帝從之乃悉移置潁川陳留二十六年雲中五原朔方北地定襄鴈門上谷代八郡民歸於本土遣謁者分將施刑補理城郭發遣邊民在中國者布還諸縣皆賜以装錢轉輸給食東觀記曰時城郭丘墟掃地上悔前徙之安帝永初五年三月詔隴西徙襄武安定徙美陽北地徙池陽上郡徙衙順帝永建四年復安定北地上郡歸舊土獻帝建安十六年曹公西征初自天子西遷雒陽人民單盡其後鍾繇以侍中守司𨽻校尉持節督闗中諸軍繇徙闗中民又招納亡叛以充之數年民間户稍實曹公征闗中得以為資十八年曹公恐江濵郡縣為呉所略徵令内移民轉相驚自廬江九江蘄春廣陵户十餘萬皆東渡江江西遂虗合肥以南惟有皖城二十年曹公征張魯魯降雍州刺史張既説曹公抜漢中民數萬户以實長安及三輔其後與曹洪破呉蘭于下辯又與夏侯淵宋建别攻臨洮狄道平之是時太祖徙民以充河北隴西天水南安民相恐動擾擾不安既假三郡人為將吏者休課使治屋宅作水碓民心遂安魏文帝改長安譙許昌濮雒陽為五都令天下聽内徙復五年安後又増其復齊王以明帝景初三年正月即位六月以遼東東沓縣吏民渡海居齊郡界以故縱城為新沓縣以居徙民正始元年二月以遼東汶北豐縣民流徙渡海居齊郡之西安臨淄昌國縣界為新汶南豐縣以居流民蜀後主建興十四年徙武都氐王苻健及氐民四百餘户於廣都晉宣帝為驃騎大將軍都督雍州表徙冀州農夫佃上邽武帝大康中杜預為征南將軍初伐呉軍至江陵因兵威徙將士屯戍之家以實江北南郡故地各樹之長吏荆土肅然孝武帝大元元年十月移淮北流人於淮南後趙石勒之在襄國勒將逯音六明攻寗黒於茌平降之因破東燕酸棗而還徙降人二萬餘户於襄國又徙平原烏丸展廣劉哆等部三萬餘户於襄國劉琨長史李弦以并州降勒勒乃遷陽曲樂平户于㐮國置守宰而還又徙秦州郡部衆五千餘户于廣宗石季龍又徙遼西北平漁陽萬户于兖豫雍雒四州之地桞㳟為河東郡守以季龍末䘮亂乃率民南徙居于汝潁之間故世仕江表前秦苻堅既平鄴都徙闗東豪傑及諸雜夷十萬户于闗中處烏丸雜類于馮翊北地丁零翟斌于新安徙陳留東阿萬户以實青州諸因亂流移避仇逺徙欲還舊業者悉聽之後秦姚萇僭即位於長安乃徙安定五千餘户于長安萇與苻登相持時萇以安定地狹且逼苻登使姚碩德鎮安定徙安定千餘家于隂蜜姚興徙李閏羌三千家於安定尋徙新安及姚泓僭立羌酋黨容率所部叛遣撫姚讃討之容降徙其豪右數百萬于長安餘遣還李閏後燕慕容垂徙徐州流人千餘户于黎陽慕容衆黨率衆三萬伐髙句驪襲其新城南蘇皆尅之散其積聚徙其五千餘户于遼西後梁呂光初徙西海郡人於諸郡其後謡曰朔馬心何悲念舊中心勞燕雀何徘徊意欲還故巢頃之遂相扇動復徙于西河樂都宋文帝元嘉二十二年武陵王駿討緣沔蠻移一萬四千餘口于京都二十三年遷漢川流民于沔次二十七年使太子步兵校尉沈慶之自彭城徙流民數千家於𤓰步征北叅軍程天祚徙江西流民於南州亦如之二十八年冬徙彭城流民于𤓰步淮西流民於姑孰合萬許家孝武帝大明中孔靈符為丹陽尹山陽縣土境褊狹民多田少靈符表徙無貲之家於餘姚鄞鄮三縣界墾起湖田帝使公卿博議太宰江夏王義恭議曰夫訓農修本有國所同土著之民習玩日乆如京師無田不聞徙居他縣尋山隂豪族富室頃畝不少貧者肆力非為無處耕起空荒無救災歉又兼縁湖居民魚鴨為業及有居肆理無樂徙尚書令桞元景右僕射劉秀之尚書王瓉之顧凱之顔師伯嗣湘東王議曰富户温房無假遷業窮身寒室必應徙居葺宇疏臯産粒無待資公則公未易充課私則私卒難具宜募亡叛通䘏及與樂田者其往經創須粗修立然後徙居侍中沈懐文王景文黄門侍郎劉凱郗顒議曰百姓雖不親農不無資生之路若驅以就田則坐相違奪且鄞等三縣去治竝逺既安之民忽徙他邑新垣未立舊居已毁去留兩困無以自資謂宜適任民情從其所樂開宥逋亡且令就業若審成腴壤然後議遷太常王𤣥謨議曰小民貧匱逺就荒疇去舊即新糧種俱闕習之既難勸之未易謂宜微加資給使得肆勤明力田之賞申怠惰之罰光禄勲王昇之議曰逺廢之疇方翦荆棘率課窮乏其事彌難資徒粗立徐行無晩帝違議從其徙民竝成良業後魏道武天興元年正月車駕發自中山至于望都堯山徙山東六州民吏及徒何髙麗雜夷三十六萬百工伎巧十萬口以充京師二月詔給内徙新民耕牛計口受田十二月徙六州二十二郡守宰豪傑吏民二千家於代都二年陳郡河南流民萬餘口内徙遣使者存勞之明元泰常三年徙兾定幽三州徒何民於京師又娥清傳云清為給事黄門侍郎先是徒何民散居三州頗為民害詔清徙之平城清善綏撫徙者如歸太武始光四年帝率輕騎襲赫連昌徙萬餘家而還徙民在道多死其能到都者纔十六七延和元年車駕征馮文通徙營丘成周遼東樂浪帶方𤣥莵六郡民三萬家於幽州開倉以賑之太延元年詔長安及平涼民徙在京師其孤老不能自存者聽還鄉太平真君六年徙青徐之人以實河北又陸俟太武時與高涼王那渡河南畧地至濟南東平陵徙其民六千家實河北七年徙長安城内工巧二千家於京師獻文皇興三年徙青州民於京師孝文太和十九年詔遷雒之民葬河南不得遷河北於是代人南者悉為河南雒陽人宣武正始元年以苑牧公田分賜代遷之户孝明武泰元年鎮南將軍源子㳟勒衆渡淮徙民於淮北立郡縣置戍而還西魏文帝大統十二年獨孤信平涼州擒宇文仲和遷其民六千餘家於長安廢帝二年二月東梁州平遼遷其豪帥于雍州王欽若等曰按後周及北史西魏廢帝㳟帝年號皆無㳟帝元年以巴湘初附詔李賢為郢州刺史總監諸軍畧定乃遷江夏民二千餘户以實安州并築甑山城而還東魏孝靜天平元年遷都於鄴出粟一百三十六萬石以賑貧人是時六坊之衆從武帝而西者不能萬人餘皆北徙竝給常廪春秋二時賜帛以供衣服之費北齊神武帝為魏相命孫騰髙隆之分括無籍之户得六十餘萬於是僑居者各勒還本屬文宣天保八年議徙冀定瀛無田之人謂之樂遷于幽州范陽寛鄉之處百姓驚擾又以頻嵗不熟米糴湧貴矣後周武帝建德六年十二月行幸并州宫移并州軍人四萬户於闗中宣帝大象元年詔曰雒陽舊都今既脩復凡是元遷之户竝聽還雒州此外諸民欲徃者亦任其意河南幽相豫亳青徐七總管受東京六府處分隋煬帝大業元年三月丁未詔尚書令楊素納言楊逹將作大匠宇文愷營建東京徙豫州郭下居民以實之又詔徙天下富商大賈數萬家於東京唐髙祖初為唐王下令曰比年冦盜郡縣饑荒百姓流亡十不存一貿易妻子奔波道路雖加周給無救倒懸京師倉廩軍國資用罄以恤民便闕支擬今岷嶓欵服蜀漢沃饒閭里富於猗陶菽粟同於水火曩者儲蓄徵歛實繁帑藏猶殷宜垂拯濟木牛流馬非可轉輸樂土重遷理無從卜則窮通之道將由革變外内户口見在京者宜依本土置令以下下官部領就食劍南諸郡所有官物隨至糴給明立條格務使穏便秋收豐實更聽進止太宗貞觀元年朝議户數之處聽徙寛鄉陜州刺史崔善為上表曰畿内之民是謂户殷丁壯之人悉入軍府若聽移轉便出闗外此則虗近實逺非經通議其事遂止則天天授二年七月二十四日徙闗外雍同泰等七州户數十萬以實雒陽𤣥宗開元十六年十月勑州客户有情願屬縁邊州者至彼給良沃田安置仍給永年優復宜令所司即與所管客户州計㑹召取情願者隨其所樂具數奏聞敬宗寳歴元年五月勑黔首如有願於所在編附籍帳者宜令州縣優恤給與閒地二周年不得差遣册府元龜卷四百八十六
