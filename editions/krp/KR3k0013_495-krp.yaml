body:
  text: 冊府元龜卷四百九十五宋王欽若等撰邦計部田制昔黄帝之有天下也畫野分州列為萬國周公小司徒之職有井邑丘甸之制以建民中以裁軍賦公羊所謂頌聲繇什一而作孟軻亦稱仁政自經界而始皆井田之謂也及戰國異政謀臣變古王制既壊兼并遂起歴世彌久因時立法或限以自占之數或差其命秩之品原其創制改作之意率以敦本革弊為念葢將禁抑豪侈惠綏困窮在上者之心亦已勤矣然其舊典斯廢大道云䘮命令之出姦詐隨生雖齊之以刑亦不能勝矣故周之中正墜而莫舉漢之極盛邈不能及焉堯遭洪水天下分絶使禹平水土别九州分别疆理冀州厥土惟白壤無塊曰壤厥田惟中中田第五兖州厥土黑墳色黒而墳起厥田惟中下田第六青州厥土白墳厥田惟上下第三徐州厥土赤埴墳土黏曰埴厥田惟上中第二揚州厥土惟塗泥地泉濕也厥田惟下下第九荆州厥土惟塗泥厥田惟下中第八豫州厥土惟壤下土墳壚髙者壤下者壚壚疎也厥田惟中上第四梁州厥土青黎色青黑沃壤也厥田惟下上第七雍州厥土惟黄壤厥田惟上上第一九州之地定墾者九百一十萬八千二十頃周文王在岐今扶風郡岐山縣周平土之法以為理人之道地著為本地著謂安土也建司馬法六尺為步步百為畝畝百為夫夫三為屋屋三為井井十為通通十為成成十為終終十為同同方百里同十為畿畿方千里故丘有戎馬一匹牛三頭甸有戎馬四匹兵車一乘牛十二頭甲士三人步卒七十二人一同百里提封萬井戎馬四百匹車百乘此卿大夫采地之大者是謂百乘之家一封三百六十六里提封十萬井定出賦六萬四千井戎馬四千匹車千乘此諸侯之大者謂之千乘之國天子之畿内方千里提封百萬井足出賦六十四萬井戎馬四萬匹兵車萬乘戎卒七十二萬人故曰萬乘主也大司徒之職均土地以稽其人民而周知其數上地家七人可任者家五人中地家六人可任者家三人下地家五人可任者家二人均平也周猶徧也一家男女七人以上則授上地所養者衆也男女五人以下則授之以下地所養者寡也止以七人六人五人為率者有夫有婦然後為家自二人以至十人為上等七六五者為其中可任謂丁強任力役之事者出老者一人其餘男女強弱相半其大數乃經土地而井牧其田野九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都以任地事而令貢賦凡稅斂之事此為造都鄙也采地制汙田異於鄉遂也重立國小司徒為經之立其五溝五塗之界其制似井之字因取名焉孟子曰夫仁政者必自經界始經界不正井地不均穀禄不平是故暴君汚吏必慢其經界經界既正分田制禄可坐而定也謂隰臯之地九夫為牧二而當一井今造都授民田有不易有一易有再易通率二而當一是之謂井牧者夏少康有虞有田一成有衆一旅一旅之衆而田一成則井牧之法先古然矣凡夫為井者方一里九夫所理之田也此制小司徒經之同人為之溝洫相包乃成耳一丘之属相連比以出田稅溝洫為除水害四井為邑邑方二里四邑為丘丘方四里四丘為甸甸方八里旁加一里則方十里為一成積百井九百夫其中六十四井五百七十六夫出田稅三十六井三百二十四夫理洫四甸為縣方二十里四縣為都方四十里四都方八十里旁加十里乃得方百里為一同也稱萬井立萬夫其四千九十六井三萬六千八百六十四夫出田稅三千三百四井二萬七百三十六夫理洫三千三百井三萬三千四百夫理澮井田之法備於一同令止於都者采地食者皆四之一其制百里之國凡四都一都之田稅入於王五十里之國凡四縣一縣之田稅入於王二十五里之國凡四甸一甸之田稅入於王地事謂農牧衡虞也貢謂凡貢山澤之財賦謂出車徒給征役也任土之法以物地事授地職而待其政令任土者任其力勢所能生育且以制貢稅也物物色之亦知其所宜地事而授農牧衡虞使職之也以廛里任國中之地以場圃任園地以宅田士田賈田任近郊之地以官田牛田賞田牧田任逺郊之地以公邑之田任甸地以家邑之田任稍地以小都之田任縣地以大都之田任畺地謂廛里者若今邑居之里矣廛人居之里城里居也圃植果蓏之屬農於秋中為場桑圃謂之園宅田者致仕者之家所受之田也士相見禮曰宅者在國則曰市井之臣在野則曰草莽之臣仕者亦受田所謂圭田也孟子曰自卿以下必有圭田圭田五十畆賈田在市賈人其家所受田也官田庶人在官者其家所受田也牛田牧田畜牧之家所受田也賞田者賞賜之地也公邑謂六遂餘地也天子使大夫理之自此外餘地皆然家邑大夫之采地也小都者卿之采地大都者公之采地王子弟所食邑也畺五百里王畿界也皆言任者地之形實不方平如圖受田邑者逺近不得盡如而其所生育職貢止於是人受田上田夫百畆中田夫二百畆下田夫三百畆歲耕種者為不易上田休一歲者為一易中田休二歲者為再易下田三歲更耕之自爰其處爰於也更謂三歲即改與别家佃以均其厚薄也農夫已受田其家衆男為餘夫亦以口受田如比比例也士工商家田五口乃當農夫一人口二十畆也此謂平土可以為法者也若山林藪澤原陵淳鹵之地淳盡也㵼鹵之田不生五榖也各以肥磽多少為差磽磽确瘠薄之田也人年二十受田六十歸田七十以上上所養也十歲以下上所長也十一以上上所強也勉強所之令習事也魏文侯時李悝作盡地力之教李悝文侯臣也以為地方百里提封九萬頃除山澤邑居參分去一為田六百萬畮治田勤謹則畮益三升升當言三斗謂致田勤則畮加三斗也不勤則損亦如之地方百里之增減輙為栗百八十萬石矣秦孝公任商鞅鞅以三晉地狹人貧三晉謂韓魏趙今河東道之地秦地廣人寡故草不盡墾地利不盡出於是誘三晉之人利其田宅復三代無知兵事而務本於内而使秦人應敵於外故廢井田制阡陌任其所耕不限多少孝公十二年之制數年之間國富兵強天下無敵又載秦孝公用商君壊井田開阡陌急耕戰之賞雖非古道猶以務本之故傾鄰國帝雄諸侯然工制遂減僭差亡度庶人之富累鉅萬而貧者食糟糠有國強者兼州域而弱者䘮社稷王欽若等曰按史記云秦昭襄王四年為田開阡陌今兩載之始皇三十一年使黔首自實田漢文帝令博士諸生作王制云天子之田方千里象日月之大亦取晷同也此謂縣内以禄公卿大夫元士公侯田方百里伯七十里子男五十里不能五十里者不合於天子附於諸侯曰附庸天子之三公之田視公侯天子之卿視伯天子之大夫視子男天子之元士視附庸皆象星辰之大小不合謂不朝㑹小者曰附庸附庸者以國事附於大國未能以其名通也視猶比也元善也善士謂命士也此地因夏爵三品之制也梅伯春秋變周之文從殷之質合伯子男以為一則殷爵三等者公侯伯也周武王初定天下更立五等之爵増以子男而猶因殷之地以九州之界尚狹也周公攝政致太平大九州之界制禮成武王之意封王者之後為公及有功之諸侯大者地方五百里其次侯四百里其次伯三百里其次子男二百里其次元士百里所因殷之諸侯亦以功黜陟之其不合者皆益之地為百里焉是以周世有爵尊而國小者有爵卑而國大者唯天子畿内不增以禄羣臣不為王治民制農田百畆百畆之分上農夫食九人其次食八人其次食七人其次食六人下農夫食五人庶人在官者其禄以是為差也農夫皆受田於公田肥磽有五等收入不同也庶人在官謂府史胥徒官長所除不命於天子國君者分或為糞方一里者為田九百畆一里方三百步方十里者為方一里者百為田九萬畆方百里者為方十里者百為田九十億畆億今十萬方千里者為方百里者百為田九萬億畆萬億今萬萬也自恒山至於南河千里而近冀州域自南河至於江千里而近豫州域自江至於衡山千里而遥荆州域自東河至於東海千里而遥徐州域自東河至於西河千里而近亦冀州域自西河至於流沙千里而遥雍州域西不盡流沙南不盡衡山東不盡東海北不盡恒山凡四海之内斷長補短方三千里為田八千萬億一萬億畆九州大計方百里者為田九十億畆山陵林麓川澤溝瀆城郭宫室塗巷三分去一其餘六十億畆以一大國為率其餘所以受民也山足曰麓古者以周尺八尺為步今以周尺六尺四寸為步古者百畆當今百四十六畆三十步古者百里當今百二十一里六十步四尺二寸二分周尺之數未詳聞也按禮制周猶以十二寸為尺葢六國時多變亂法度或言周尺八寸則步更為八八六十四寸以此計之古者百畆當今百五十六畆二十三步古者百里當今百二十五里方千里者為方百里者百封方百里者三十國其餘方百里者七十又封方七十里者六十為方百里者二十九方十里者四十其餘方百里者四十方十里者六十又封方五十里者百二十為方百里者三十其餘方百里者十方十里者六十名山大澤不以封其餘以為附庸閒田諸侯之有功者取其閒田以禄之其有削地者歸之閒田天子之縣内方千里者為方百里者百封方百里者九其餘方百里者九十一又封方七十里者二十一為方百里者十方十里者二十九其餘方百里者八十方十里者七十一又封方五十里者六十二為方百里者十五方十里者七十五其餘方百里者六十四方十里者九十六武帝詔賈人有市籍及家屬皆無得名焉一人有市籍則身及家内皆不得有三也以便農敢犯令沒入田貨又趙過為捜粟都尉過能為代田一畮三甽歲代處故曰代田古法也后稷始甽田以二耜為耦併兩耜而耕廣尺深尺曰甽長終畮一畮三甽一夫三百甽而播種於甽中播布也種為榖子也苗生葉以上稍耨隴草耨足也因隤其土以附苗根隤謂下之也故其詩曰或芸或芓黍稷儗儗小雅甫田之詩儗儗盛貌芸除草也芓附根也言苗稍壯每耨輙附根比盛暑隴盡而根深能風與旱故儗儗而盛也其耕耘下種田器皆有便巧率十二夫為田一井一屋故畮五頃九夫為井三夫為屋夫百畮於古為十二頃古百步為畮漢時三百四十步為畮古千二百畮則得今五頃周耦犂二牛三人一歲之收過常縵田畮一斛以上縵田謂不為甽者也善者倍之善為甽者又過縵田一斛以上過使教田太常三輔太常主諸陵有民亦謂課田種大農置工巧奴與從事為作田器二千石遣令長三老力田及里父老善田者受田器學耕種養苗狀為法意狀也民或苦少牛亡以趨澤趨及也澤雨之潤澤也故平都令光王欽若等曰先史失其姓教過以人輓犂輓引也過奏光為丞教民相與庸輓犂庸功也言換功而作也義亦與庸賃同率多人者田日三十畮少者十三畮以故田多墾闢過試以離宫卒田其宫壖地離宫别處之宫非天子所常居也壖餘也宫壖地謂外垣之内内垣之外也諸縁河壖地廟垣壖地其義皆同守離宫卒閑而無事因令於壖地為田也課得榖皆多其旁田畮一斛以上令命家田三輔公田令使也命者教也令離宫卒教其家田公田也又曰命謂爵命者命家謂受爵命一爵為公士以上令得公田優之也又教邊郡及居延城居延長掖縣也時有甲卒也是後邊城河東𢎞農三輔太常民皆便代田用力少而得榖多成帝時安昌侯張禹占鄭白之渠四百餘頃他人兼并者皆類此而人稱困矣哀帝即位師丹輔政建言古之聖王莫不設井田然後治廼可平建立也立其議也孝文皇帝承亡周亂秦兵革之後天下空虚故務勸農桑帥以節儉民始充實未有并兼之害故不為民田及奴婢為限不為作限制今累世承平豪富吏民訾數鉅萬而貧弱愈困葢君子為政貴因循而重改作重難也所以有改者將以救急也亦未可詳宜畧為限詳謂死盡也天子下其議丞相孔光大司空何武奏請諸侯王列侯皆得名田國中列侯在長安公主名田縣道及關内侯吏民名田皆毋過三十頃諸侯王奴婢二百人列侯公主百人關内侯吏民三十人期盡三年犯者沒入官時田宅奴婢賈為減賤丁傳用事董賢隆貴皆不便也丁傳及董賢兩家皆不便此事也詔書且須後須待也遂寢不行平帝元始中凡郡國一百三縣邑千三百一十四道三十二侯國二百四十一地東西九千三百二里南北萬三千三百六十八里提封田一萬萬四千五百一十三萬六千四百五頃其一萬萬二百五十二萬八千八百八十九頃邑居道路山川林澤羣不可墾其三千三百二十九萬九百四十七頃可墾定墾田八百二十七萬五百三十六頃民户千二百二十三萬三千六十二口五千九百五十九萬四千九百七十八漢極盛矣據户千二百二十三萬三千每户得田六十七畆百四十六步有奇王莽動欲慕古不度時宜分裂州郡改職作官下令曰漢民減輕田租三十而稅一嘗有更賦罷癃咸出雖老病者復出口筭而豪民侵陵分田刼假分田謂貧者無田而取富人田耕種共分其所收地假亦謂貧人賃富人之田也刼者富人刼奪其稅侵欺之也厥名三十實什稅五也富者驕而為邪貧者窮而為姦俱陷於辜刑用不錯錯置也今更名天下田曰王田奴婢曰私屬皆不得賣買其男口不滿八而田過一井者分餘田與九族鄉黨犯令法至死制度又不定吏縁為姦天下謷謷然陷刑者衆中郎區博諫莽曰區姓也音一侯切井田雖聖王法其廢久矣周道既衰而民不從秦知順民之心可以獲大利也故滅廬井而置阡陌遂王諸夏訖今海内未厭其弊今欲違民心追復千載絶迹復音扶目切雖堯舜復起而無百年之漸弗能行也天下初定萬民新附誠未可施行莽知民怨廼下書曰諸食王田皆得賣之勿拘以法犯私買賣庶人者且一切勿治後漢光武建武十五年以天下墾田多不實又戸口年紀互增減詔天下諸州郡簡覆田頃人戸年紀而刺史太守多不平均或優饒豪右侵刻羸弱百姓嗟怨遮道號呼河南尹張伋及諸郡守十餘人坐度田不實下獄死和帝元興元年墾田七百三十二萬一百七十頃八十畆百四十步安帝延光四年墾田六百九十四萬二千八百九十頃一十三畆八十步順帝建康元年定墾田六百八十九萬六千二百七十一頃五十六畆九十四步據建康元年戸九百九十四萬六千九百九十每戸合得田七十畆有奇冲帝永嘉元年墾田六百九十五萬七千六百七十六頃二十畆八十步質帝本初元年墾田六百九十三萬一百二十三頃三十八畆晉武帝平吳之後有司奏詔書王公以國為家京城不宜復有田宅今未暇作諸國邸當使城中有往來處近郊有芻藁之田今可限之國王公侯京城得有一宅之處近郊田大國十五頃次國十頃小國七頃城内無宅城外有者皆聽留之又制官品第一至於第九各以貴賤占田品第一者占五十頃第二品四十五頃第三品四十頃第四品三十五頃第五品三十頃第六品二十五頃第七品二十頃第八品十五頃第九品十頃而又各以品之髙卑蔭其親屬多者及九族少者三族宗室國賓先賢之後及士人子孫亦如之而又得䕃人以為衣食客及佃客品第六已上得衣食客三人第七第八品二人第九品及舉輦跡禽前驅繇基彊弩司馬羽林郎殿中冗從武賁殿中武賁持椎斧武騎武賁持鈒冗從武賁命中武賁武騎一人其應有佃客者官品第一第二者佃客無過十五戸第三品十戸第四品七戸第五品五戸第六品三户第七品二戸第八品九品一戸是時天下無事賦稅平均人咸安其業而樂其事又制男子一人占田七十畆女子三十畆其外丁男課田五十畆丁女十畆次丁男半之女則不課宋武帝孝建三年制内外官有田在近道聽遣所給吏僮附業大明初揚州刺史西陽王子尚上言山湖之禁雖有舊科民俗相因替而不奉熂山封水保為家利自頃以來頽弛日甚富彊者兼領而占貧弱者薪蘇無託乃至渙採之地亦又如兹斯實治之深弊也又宜損益舊條更申常制有司簡壬辰詔書擅占山澤彊盜律論贓一丈以上皆棄市尚書左丞羊希以壬辰之制其禁嚴刻事既難遵理與時弛而占山封水漸染復滋更相因仍便成先業一朝頓去易致嗟怨今更判革立制五條凡是山澤先嘗熂燼種養竹林雜果為林仍及陂湖江海魚梁鰌鮆場嘗加功修作者聽不追奪官品第一第二聽占山三頃第三第四品二頃五十畆第五第六品二頃第七品八品一頃五十畆第九品及百姓一頃皆依定格卜貲簿若先已占山澤得更占足若非前條舊業一不得禁有犯者水土一尺以上並計贓依常盜律論停除晉咸康二年壬辰之科從之明帝泰始三年復郡縣公田梁髙祖大同七年十一月詔曰用天之道分地之利葢先聖之格訓也凡是田桑廢宅沒入者公收之外悉以分給貧民皆使量其所能以受田分如聞頃者豪家富室多占取公田貴價就稅以與貧民傷時害政為蠧以甚自今公田悉不得假與豪家已假者特聽不追若富室給貧民種糧共營作者不在禁例後魏大武初為太子監國曾令有司課畿内之人使無牛家以人牛力相貿墾殖鋤耨其有牛家與無牛家一牛種田二十畆償以耘鋤功七畆如是為差至於老小無牛家種田七畆老少者償以鋤功二畆皆以五口下貧家為率各列家别口數所種頃畆明立簿目所種者於地首標題姓名以辨播殖之功大平真君九年下詔均給天下人田諸男夫十五以上受露田四十畆不栽樹者謂之露田婦人二十畆奴婢依良丁牛一頭受田三十畆限四牛所授之田率倍之三易之田再倍之以供耕作及還受之盈縮人年及課則受田老免及身沒則還田奴婢牛隨有無以還受課桑田不在還受之限但見人倍田分于數雖盈不得以充露田之數不足者以露田充倍諸初受田者男夫一人給田二十畆課種桑五十樹棗五株榆三根非桑之土夫給一畆依法課蒔榆棗各依根限三年種畢奪其不畢之地於桑榆地分雜蒔餘果及多種桑榆者不禁諸應還之田不得種桑棗果種者以違令論地入還分諸桑田皆為代業身終不還嘗從見口有盈者無受無還不足者受種如法盈者得賣其盈不足者得買所不足不得賣其分亦不得買過所足諸麻布之土男夫及課列給麻田十畆婦人五畆奴婢依良皆從還受之法諸有舉戸老小殘疾無受田者年十一以上須疾者各受一半夫田年踰七十者不還所受寡婦守志者雖免課亦受婦田諸還受田常以正月若始受田而身亡及買賣奴婢牛者皆至明年正月乃得還受諸土廣人稀之處隨力所及官借人種蒔後有來居者依法封受諸地狹之處有進丁受田而不樂遷者則以家桑田為正田分又不足不給倍田又不足家内人别減分家桑之鄉准此為法樂遷者聽逐空荒不限異州他郡唯不聽避勞就逸其地足之處不得無故而移諸人有新居者三口給地一畆以為居室奴婢五口一畆男女十五以上因其地分口課種矣五分畆之一諸一人之分正從正陪從陪不得隔越他畔進丁受田者常從所近若同時俱受先貧後富再陪之田放此為法諸逺流配謫無子孫及戸絶者墟宅桑榆盡為公田以供授受之次給其所親未給之間亦借其所親諸宰人之官各隨所給公田刺史十五頃太守十頃治中别駕各八頃縣令郡丞六頃更代相付賣者坐如律文成時主客給事中李安世以民困饑流散豪戸多有占奪安世乃上疏曰臣聞量地畫野經國大式邑地相叅致治之本井稅之興其來日久采田之數制之以限葢欲便土不曠功民罔避力雄擅之家不獨豐腴之美單陋之夫亦有頃畆之分所以恤彼貧微抑兹貪欲同富約之不均一齊民於編戸竊見州郡之民或因年儉流移棄賣田宅漂居異鄉事涉數世子孫既立始返舊墟廬井荒毁桑榆改殖事已歴逺易生假冒強宗豪族肆其侵凌逺認魏晉之冢近引新舊之驗又年載稍久鄉老所惑羣證雖多莫可取據各附親知互有長短兩證徒具聽者猶疑爭訟遷延連紀不判良疇委而不開柔桑枯而不採僥倖之徒興繁多之獄作欲令家豐歲儲人給資用其可得乎愚謂今雖桑井難復宜更均量審其經術令分藝有准力業相稱細民獲資生之利豪右靡餘地之盈則無私之澤乃播均於兆庶如阜如山可有積於比戸矣又所爭之田宜限年斷事久難明悉屬今主然後虚妄之民絶望於覬覦守分之事永免於凌奪矣帝深納之後均田之制起於此矣孝文帝太和元年冬十月丁未詔曰朕承乾在位十有五年每覽先王之典經論百代儲蓄既積黎元永安爰暨季葉斯道凌替富強者並兼山澤貧弱者望絶一廛致令地有遺利民無餘財或爭畆畔以亡身或因饑饉以棄業而欲天下太平百姓豐足安可得哉今遣使者循行州郡典守均給天下之田授以主業以充為勸課農桑興萬民之本十四年十二月壬午詔依准丘井之式遣使與州郡宣行條制隠口漏丁即聽附實若朋附豪勢陵抑孤弱罪有常行比齊給授田令仍依魏朝每令十月普令轉授成丁而受丁老而退不聽賣易武成帝河清三年詔每歲春月各依鄉土早晩課人農桑自春及秋男子十五以上皆布田畆桑蠶之月婦女十五以上皆營蠶桑孟冬刺史聽審教之優劣定殿最之科品人有人力無牛或有牛無人力者須令相便皆得納種使地無遺利人無游手又令男子率以十八受田輸租調二十充力役六十六退田免租調京城西面諸坊之外三十里内為公田受公田者三縣代遷戸執事官一品以下逮於羽林武賁各有差其外畿郡華人官第一品以下羽林武賁以上各有差職事及百姓請墾田者為永業田奴婢受田者親王止三百人嗣王二百人第二品嗣王以下及庶姓王百五十人正三品以下及皇宗百人七品以下八十人八品以下至庶人六十人奴婢限外不給田者皆不輸其方百里外及州人一夫受露田八十畆奴婢依良人限數與在京百官同丁牛一頭受田六十畆限止四牛每丁給永業二十畆為桑田其田中種桑五十根榆三根棗五根不在還受之限非地田者悉入還受之限土不宜桑者給麻田如桑田法關東風俗傳曰其時强弱相凌恃勢侵奪富者連畛踰陌貧無立錐之地昔漢氏募人從田恐遺墾課令就良美而齊民全無斟酌雖有當年權格時暫施行爭地文案有三十年不了者此田授受無法者也其賜田者謂公田及諸横賜之田不問貧賤一人一頃以共芻秣自宣武出獵以來始以永賜得聽買賣遷鄴之始濫職衆多所得公田悉從貿易又天保之代曾遥壓首人田以充公簿比武平以後横賜諸貴亦已盡矣又河渚山澤有可耕墾肥饒之處悉是豪勢或借或請編戸之人不得一壟糾賞者依令口分之外知有買匿聽相糾列還以此地賞之至有貧人實非賸長買匿者茍貪錢貨詐吐壯丁口分以與糾人亦既無田即便逃走帖賣者帖荒田七年熟田五年錢還地還依令聽許露田雖復不聽賣買賣買亦無重者貧戸因王課不濟率多貨賣田業亦有懶惰之人雖存田地不肯肆力在外浮遊乃至賣其口以供稅課比來頻有還人之格欲以招慰逃散假便暫還即賣所得之地地盡還之一繇懸聽其賣帖園田故也廣占者依令奴婢諸田亦與良人相似以無田之良口比有地之奴牛宋世良天保中獻書請以富家牛地先給貧人其時朝列稱其合理後周文帝霸政之初創六官司均掌田里之政令凡人口十以上宅五畆口七以上宅四畆口五以下宅三畆有室者田百四十畆丁者田百畆隋令自諸王以下至於都督皆給永業田各有差多者至百頃少者至三十頃其丁男中男永業露田皆遵後齊之制並課樹以桑榆及棗其田宅率三口給一畆開皇十二年文帝以天下戸口歲增京輔及三河地少而人衆衣食不給議者咸欲徙就寛鄉帝乃發使四出均天下之地其狹鄉每丁纔至二十畆老小又少焉太常卿蘇威立議以為戸口滋多民田不贍欲減功臣之地以給民王誼奏曰百官者歴世勲賢方蒙爵土一旦削之未見其可如臣所慮正恐朝臣功徳不建何患民田有不贍帝然之竟寢威議十四年詔省府州縣皆給公廨田不得治生與人爭利煬帝大業中天下墾田五千五百八十五萬四千四十一頃其時有戸八百九十萬也千五百二十六則户合墾田五頃餘恐本史之非實唐𤣥宗開元十八年宣州刺史裴耀卿論時政上疏曰竊見天下所簡客戸除兩州計㑹歸本貫以外更合所在編附年限向滿須准居人更有優矜即此輩僥倖若全徵課稅即目擊未堪竊料天下諸州不可一例處置且望從寛鄉有剰田州作法竊計有剰田者不減三四十州取其剰田通融支給其剰地者三分請取一分已下其浮戸任其親戚鄉里相就每十戸已上共作一坊每户給五畆充宅并為造一兩口屋開巷陌立閭伍種桑棗築園蔬使緩急相助親隣不失丁别量給五十畆已上為田任其自營種卒其戸於近坊更供給一頃以為公田共令營種每丁一月役功三日計十丁一年共得三百六十日營公田一頃不啻得足計早收一年不減一百石使納隨近州縣除役三百六十日外更無租稅既是營田戸且免征行安樂有餘必不流散官司每丁納收十石其粟更不别支用每至不熟年計别三十價然後支用計一丁一年還出兩石已上亦與正課不殊則官收其役不為矜縱人緩其稅又得安舒倉廩日殷久逺為便其狹鄉無剰地客戸多者雖此法未該准式許移窄就寛不必須要留住若寛鄉安置得所人皆恱慕則三兩年後皆可改塗棄地盡作公田狹鄉總移寛處倉儲既實水旱無憂二十三年九月詔曰天下百姓口分永業田頻有處分不許買賣典貼如聞尚未能斷貧人失業豪富兼并宜更申明處分切令禁止若有違犯科違勑罪二十五年制田廣一步長二百四十步為畆畆百為頃自秦漢以降即二百四十步為畆非獨始於唐蓋具令文耳國家程式雖則具存今所纂録不可悉載丁男給永業田二十畆口分田八十畆其中男年十八以上亦依丁男給老幼篤疾廢疾各給口分田四十畆寡妻妾合給分田三十畆先永業者通充口分之數黄小中丁男女及老男篤疾廢疾寡妻妾當戸者各給永業田二十畆口分田二十畆應給寛鄉並依所定數若狹鄉新受者減寛鄉口分之半其給口分田者易田則倍給寛鄉三易以上者仍依鄉法易給也其永業田親王百頃職事官正一品六十頃郡王及職事官從一品各五十頃國公若職事官正二品各四十頃郡公若職事官從二品各三十五頃縣公若職事官正三品各二十五頃郡侯若職事官從三品各二十頃縣侯若職事官正四品各十五頃伯若職事官從四品各十頃子若職事官正五品各八頃男若職事官從五品各五頃上柱國三十頃柱國二十五頃上䕶軍二十頃䕶軍十五頃上輕車都尉十頃輕車都尉七頃上騎都尉六頃騎都尉四頃驍騎尉飛騎尉各八十畆雲騎尉武騎尉各六十畆其散官五品以上同職事給兼有官爵及勲具應給者唯從多不並給若當家口分之外先有地非狹鄉者並即回受有䞉追收不足者更給諸永業田皆傳子孫不在收授之限即子孫犯除名者所承之地亦不追每畆課種桑五十根以上榆棗各十根以上三年種畢鄉土不宜者任以所宜樹充所給五品以上永業田皆不得狹鄉受任於寛鄉隔越射無主荒地充即買蔭陽田充者雖狹鄉亦聴其六品以下永業即聽本鄉取還公田充願於寛鄉取者亦聽應賜人田非指的處所者不得狹鄉給其應給永業人若官爵之内有解免者從所解者追即解免不盡者隨所降品追也其除名者依口分例給自外及有賜田者並追若當家之内有官爵及少口分應受者並聽迴給有䞉追收其因官爵應得永業未請及未足而身亡者子孫不合追請諸襲爵者唯得承父祖永業不合别請若父祖未請及未足而身亡者減始受封者之半給其州縣界内所部受田悉足者為寛鄉不足者為狹鄉諸狹鄉田不足者聽於寛鄉遥受應給園宅地者良口三口以下給一畆每三口加一畆賤口五口給一畆每五口加一畆並不入永業口分之限其京城及州縣郭下園宅不在此例諸驛封田皆隨近給每馬一匹給地四十畆若驛側有收田處匹别各減五畆其傳遞馬每匹給田二十畆諸庶人有身死家貧無以供葬者聽賣永業田即流移者亦如之樂遷就寛鄉者并聽賣口分賣充住宅邸店碾磑者雖非樂遷亦聽私賣也諸買地者不得過本制雖居狹鄉亦聽依寛制其賣者不更請凡賣買皆須經所部官司申牒年終彼此除附若無文牒輙賣買財沒不追地還本主諸以工商為業者永業口分田各減半給之在狹鄉者並不給諸因王事沒落外蕃不還有親屬同居其身分之地六年乃追身還之日隨便先給即身死王事者其子孫雖未成丁身分地勿追其因戰傷入篤疾廢疾者亦不追減聽終其身諸田不得貼債及質違者財沒不追地還本主若從逺役外任無人守業者聽貼債及質其官人永業田及賜田欲賣及貼債者皆不在禁限諸給口分田務從便近不得隔越若因州縣改𨽻地入他境及犬牙相接者聽依舊受其城居之人本縣無田者聽隔縣受雖有此制開元之季天寳以來法令寛弛兼并之弊有踰於漢成哀之間矣親王出藩者給地一頃作園若城内無可開拓者於近城便給如無官田取百姓地充其地給好地替天寳十一載十一月乙丑詔曰周有均土之宜漢存墾田之法將欲明其經界定其等威食禄之家無廣擅於山澤貿遷之伍罕爭利於農收則歲有豐穰人無胥怨永言致理何莫繇兹如聞王公百官及富豪之家比置庄田恣行吞併莫懼章程借荒者皆有熟田因之侵奪置牧者唯指山谷不限多少爰及口分永業違法賣買或改籍書或云典貼致令百姓無處安置乃别停客戸使其佃食既奪居人之業實生浮惰之端逺近皆然因循亦久不有釐革為弊慮深其王公百官勲蔭等家應置庄田不得踰於式令仍更從寛典務使𢎞通其有同籍周朞以上親俱有勲蔭者每人占地頃畆任其累計某蔭外有餘如舊是無勲蔭地合賣者先用鐵買得不可官收限勑到百日内容其轉賣其先不合蔭又蔭外請射兼借荒及無馬置牧地之内并從合蔭者並不在占限官還主其口分永業地先合買賣若有主來理者其地雖經除附不限載月近逺宜並却還至於價值准格並不合酬備既縁先已用錢審勘責其有契騐可憑特宜官為出錢還其買人其地若無主論理不須收奪庶使人皆摭實地悉無遺百姓知復於田疇蔭家不失其價值此而或隠罪必無容又兩京去城五百里内不合置牧地地内熟田仍不得過五頃已上十頃已下其有餘者仰官收應縁括簡共給授田地等並委郡縣長官及本判官録事相知勾當並特給復業並無籍貫浮逃人仍據丁口量地好惡均平給授便與編附仍放當載租庸如給未盡明立簿帳且官收租佃不得輙給官人親識工商富豪兼并之家如有妄請受者先决一頓然後准法科罪不在官當蔭贖有能糾告者地入糾人各令採訪使按覆具狀聞奏使司不糾察與郡縣官同罪自今已後更不得違法買賣口分永業田及諸射兼借公私荒廢地無馬妄請牧田併潛停客戸有官者私營農如輙有違犯無官者决杖四十有官者録奏取處分又郡縣官人多有任所寄庄言念貧弱慮有侵損先已定者不可改移自今已後一切禁斷今所括地授田務欲優矜百姓不得妨奪致有勞損客戸人無使驚擾縁酬地價值出官錢支科之間必資總統仍令兩京出納使楊國忠充使都勾當條件處置凡在士庶宜悉朕心十四載受田千四百三十萬三千八百六十二頃一十三畆其載戸八百九十餘萬計定墾之數每戸各一頃六十餘畆代宗寳應元年四月勅百姓田地比者多被殷富之家官吏吞併所以逃散莫不繇兹宜委縣令切加禁止若界内自有違法當倍科責五月十一日勅逃戸不歸者當戸租賦停徵不得卒攤隣親髙戸廣徳二年四月勅如有浮客情願編附請射逃人物業者便准式據丁口給授如二年已上種植家業成者雖本主到不在却還限任别給授大歴元年制逃亡失業萍泛無依時宜招綏使安鄉井其逃戸復業者宜給復二年不得輙有差遣如有百姓先貨賣田宅盡者宜委本州縣取逃死户田宅量丁口充給徳宗建中四年六月判度支戸部侍郎趙贊請置大田天下田計其頃畆官收十分之一擇其上腴樹桑環之曰公田公桑自王公至於匹庶差借其力得榖絲以給國用詔從其說贊熟計之自以為非便皆寢不下憲宗元和四年十二月監察御史裏行元稹牒同州奏均田狀當州自於七縣田地數内均配兩稅元額頃畆并請分給諸色職田州使官田與百姓其草粟脚錢等便請於萬戸上均卒又均攤左神䇿郃陽鎮軍田粟及時放百姓稅麻并除去斛斗錢草零數等利宜分析如後當州兩稅地右件地并是貞元四年簡責至今已是二十六年其間人戸逃移田地荒廢又近河諸縣每年河路侵沙苑側近日有礫填掩百姓稅額已定皆是虚頭徴卒其間亦有豪富兼併廣占阡陌十分田地纔稅二三致使窮獨逋亡賦稅不辦州縣轉破實在於斯臣自到州便欲差官簡量又慮疲人煩擾昨因農務稍暇臣遂設法各令百姓自通手狀又令里正書手等傍為穏審並不遣官吏擅到村鄉百姓等皆知臣欲一例均平所通田地畧無欺隠臣便據所通悉與除去逃戸荒地及河侵沙掩等地其餘見定頃畆然取兩稅額地數通計七縣沃瘠一例作分數抽稅自此貧富强弱一切均平徴斂賦租庶無逋欠三二年外此州實冀稍較完全當州京官及州縣官職田公廨田并州使官田驛等右臣當州百姓田地每畆只稅粟九升五合草四分地頭𣙜酒錢共出二十一文已下其諸色職田每畆約稅粟三斛草三束脚錢一百二十文若是京官上司職田又頃百姓變米雇脚搬送比量正稅近於四倍加徴既縁差稅至重州縣遂逐年抑配百姓租佃或有隔越村鄉被配一畆二畆者或有身居市井亦令虚頭出稅者其公廨田官田等所稅輕重約與職田相似亦是抑配百姓租田疲人患苦無甚於斯伏准長慶元年七月赦文京兆府職田令於萬戸上均配正與臣當州事宜相類臣今因重配元額稅地便請盡將此色田地一切給與百姓任為永業一依正稅粟草及地頭𣙜酒錢數納稅其餘所欠職田斛㪷錢草等只於夏稅地上每畆各加一合秋稅地上每畆各加六合草一分其脚錢只收地頭𣙜酒錢上分釐充數便足百姓元不加配其上司職田合變米送城者比縁百姓出車牛及零碎舂碾動踰春夏送納不得到城臣今便於當州近城縣納粟官為變碾取本色脚錢州司和雇情願車牛搬載差綱送納計萬戸所加至少使四倍之稅永除上司職禄及時公私俱受其利當州供左神䇿郃陽鎮軍田粟二千石右自置軍鎮以來准勅令取百姓髙荒田地一百頃給充軍田其時縁田地零碎軍司佃田不得遂令縣司每畆出粟二㪷其粟並是一縣百姓秋稅上加配偏當重斂事實不均臣今已於七縣應稅地止量事配率自此亦冀均平當州朝邑等三縣代納夏陽韓城兩縣率稅又准元和十三年勅縁夏陽韓城兩城殘破量減逃户率稅每年攤配朝邑澄城郃陽三縣代納錢六百七貫九百二十一文斛㪷三千一百五十二石一㪷三升三合草九千九束零並不計臣今因令百姓自通田地落下兩縣已減元額稅地請更不令三縣代納差科當州稅麻又當州從前稅麻地七十五頃六十七畆四壠每年計麻一萬一千八百七十四斤四兩充州司諸色公用臣昨因均配均稅簡尋三數十年兩稅文案只見逐年配率麻地並不言兩稅數内為復數外既無條勑可憑以今一切放免不稅當州所徵斛㪷并草及地頭等錢奇零分數又從前所徵斛㪷升合之外有抄勺圭撮錢草則分釐毫銖案牘交加不可勘筭人戸輸納元無奇零蹙數所成盡是姦吏欺没臣令所徴斛㪷並請成合草亦並請成束錢並請成文在百姓分數元無所加於官司簿書永絶姦詐其蹙數粟麥草等便充填所欠職田等數其錢當州每畆元稅二十文三分六釐人戸納二十一文釐數臣今只收元納二十一文釐零數將充職田脚錢二千六百餘貫便足更不分外攤徴迴姦吏隠欺之贓除百姓重斂之困如此處置庶有利宜以前逐件謹具利宜如前其兩稅元額頃畆并攤配職田分數及蹙文分合等草錢斛㪷數謹具後件分析以前件如前伏以當州田地鹻鹵瘠薄兼帶山原通計十畆不敵京畿一二加以簡責年深貧富偏併稅額已定徴率轉難臣昨所奏累年逋懸其弊實繇於此臣今並已均於稅又免配佃職田里閭之間稍合蘇息伏縁請配職田地充百姓永業事須奉勅處分冀永有遵憑穆宗長慶元年正月勅節文應諸道管内百姓或因水旱兵荒流離死絶見在桑産如無親承佃委本道觀察使於官健中取無庄田有人丁者據多少給付便與公驗任充永業不得令有力職掌人妄為請射其官健仍借種糧放三年租稅武宗㑹昌元年正月制安土重遷黎民之性茍非難窘豈至流亡將欲招綏必在資産諸道頻遭災沴州縣不為申奏百姓輸納不辦多有逃移長史懼在官之時破失人戸或恐務免正稅減尅料錢只於見在户中分外攤配亦有破除逃戸産業已無歸還不得見戸每年加配流亡轉多自今已後應州縣開成五年已前逃户並委觀察使刺史差强明官就村鄉詣實簡勘桑田屋宇等仍勒長令切加簡校租佃與人勿令荒廢據所得與納戸内徴稅有餘即官為收貯待歸還給付如欠少即與收貯至歸還日不須徴理自今年已後二年不歸復者即仰縣司召人給付承佃仍給公驗任為永業其逃戸錢草斛㪷等就留使錢物合十分十三分已上者並仰於當州使雜給用錢内方圓權落下不得尅正員官吏料錢及館驛使料遞乗作人課等錢仍本戸歸復日漸復元額宣宗大中二年正月制所在逃戸見在桑田屋宇等多時暫時東西便被鄰人與所繇等計㑹推云代納稅錢悉欲砍伐毁折及願歸復多已蕩盡因致荒廢遂成閒田從今已後如有此色勒鄉村老人與所繇并隣近等同簡校勘分明分析作狀送縣入案任隣人及無田産人且為佃事與納稅如五年不來復業者便任佃人為主逃戸不在論理之限其屋宇桑田樹木等權佃人逃戸未歸五年不得輙有毁除斫伐如違犯者據限口量情科責并科所繇等不簡校之罪懿宗咸通十一年七月十九日勅諸道州府百姓承佃逃亡田地如已經五年須准承前赦文便為佃主不在論理之限仍令所司准此處分後唐明宗天成四年夏詔曰今年夏苗委人戸自供手狀具頃畆多少仍以五家為保委無隠漏攢連手狀送於本州本州具帳送省州縣不得差人簡括如或人戸隱欺許令保内陳告其田並令倍長興二年六月詔諸道觀察使均補苗稅將有力人戸出剰田苗補貧下不迨頃畆有司者排段簡括自今年起為定額九月戊子午前鄜州縣令竇延岡上利見營田務有元屬田戸一任管係如是後來投務乞行止絶勑㫖凡致營田比召浮客若取編戸實紊常規如有係稅之人宜令却還本縣應諸州府營田務只許耕無主荒田及召浮客此後若敢違越官吏并投名稅戸重加懲斷三年二月樞密使奏城南稻田務每年破錢二千七百貫獲地利纔及一千六百貫所得不如所亡請改種雜田三司使亦請罷稻田欲其水利併於諸碾以資變造從之愍帝應順元年正月諸處籍沒田宅並屬户部除賜功臣外禁請射晉髙祖天福三年六月己丑金部郎中張鑄奏臣聞國家以務農是本勸課為先用廣田疇乃資倉廩臣竊見所在鄉村浮居人戸方思墾闢正切耕耘種木未滿於十年樹榖未臻於三頃似成産業微有生涯便被縣司繫名定作鄉村色役懼其重斂畏以嚴刑遂捨所居却思他適覩兹阻隔何以舒蘇既乖撫䘏之門徒有招擕之令伏乞皇帝陛下明示州府特降條流應所在無主空閑荒地一任百姓開耕候及五頃已上三年外即許縣司量户科徭如未及五頃已上者不在搔擾之限則致荒榛漸少賦稅增多非唯下益蒸黎實亦上資邦國從之漢隱帝乾祐三年左補闕淳于希顔上言竊以久不簡田且仍舊額無妨耕稼雖知有勸於農民復恐不均於衆望三五年中時一通括兼以州縣遭水旱處比有訴論差使封量不宜便有出剰請今後差官能敷元額已不虧官凡出剰求功請不收附所以知朝廷愛民之意炤物之仁周太祖廣順三年九月戊寅朔勑京兆府耀州庄宅三百渠使所管庄宅並屬州縣其本務職員節級一切停廢除見管水磑及州縣鎮郭下店宅外應有係官桑土屋宇園林車牛動用並賜見佃人充永業如己有庄田自來被本務或形勢影占令出課利者並勒見佃人為主依例納租條理未盡處委三司區分仍遣刑部員外郎曹匪躬専往㸃簡割屬州縣十一月勑廢衞州共城縣稻田務並歸州縣任人佃蒔宜令戸部郎中趙延休往彼相度利害及所定租賦聞奏先時三司奏年課無幾官牛疫死因廢營田故有是命世宗顯徳二年五月乙未詔曰起今後應有逃戸庄田並許人請射承田供納租稅如三周年内本户來歸者其桑土不以荒熟并庄園并交還一半五周年内歸業者三分交還一分如五周年外歸業者其庄田除本戸墳塋外不在交還之限五年八月庚子命殿中侍御史張藹於京城四面按行稻田之地十月庚寅命殿中侍御史張藹於鄭州界制置稻田是月周世宗因覽唐同州刺史元稹均田之法始議重定天下民租申命纂其法制繕寫為圖遍賜於諸侯詔曰朕以寰宇雖安烝民未泰當乙夜觀書之際校前賢阜俗之方近覽元稹長慶集見在同州時所上均田表校當時之利病曲盡其情俾一境之生靈咸受其賜傳於方冊可得披尋因令裂素成圖直書其事庶公王觀覽觸事經心利於國而便於民無亂條制背於經而合於道盡繫變通但要適宜所務濟世繄乃勲舊奕庇黎元今賜卿元稹所奏均田圖一面至可領也是月賜諸道詔曰朕以干戈既弭寰海漸寧言念黎元務令通濟須議普行均定所貴永適重輕卿受任方隅深窮理本必能副寡昧平分之意察鄉閭致弊之源明示條章用分憂寄竚聆集事允屬推公今差使臣往彼簡括餘從别勑處分乃命右散騎常侍艾頴等三十四人使於諸州簡定民租明年春諸道使臣迴總計簡到戸二百三十萬九千八百一十二定墾田一百八萬五千八百三十四頃淮南郡縣不在此冊府元龜卷四百九十五
