body:
  text: 册府元龜巻九百五十五宋王欽若等撰總錄部知舊贈遺託孤知舊傳曰人惟求舊又曰久要不㤀蓋古之君子義重雅游或相善於膠庠或比居於邑里嵗月其邁窮逹以殊而能推引其材贈問以禮患難相濟終始不渝展其誠心敦彼雅俗傳曰故舊不遺則民不偷其是之謂與魯季友如陳𦵏原仲原仲季友之舊也漢司馬相如歸成都而家貧無以自業素與臨卭令王吉相善吉曰長卿久宦游不遂而困遂達也来過我於是相如往舎都亭臨卭所治都之亭臨卭令繆為恭敬繆詐也日往朝相如相如初尚見之後稱病使従者謝吉吉愈益謹肅臨卭多富人卓王孫僮客八百人僮謂奴程鄭亦數百人程鄭亦人姓名言富亞王孫者也乃相謂曰令有貴客為具召之具謂酒食之具召請也并召令令既至卓氏客以百數至日中請司馬長卿長卿謝病不能臨臨卬令不敢嘗食身自迎相如相如為不得已而强往示衆人以此意也一坐盡傾皆傾慕其風采也後為孝文園令後漢朱勃字叔陽年十二能誦詩書嘗候馬援兄况勃衣方領能矩步辭言嫻雅援裁知書見之自失况知其意乃自酌酒慰援曰朱勃小器速成智盡此耳卒當従汝禀學勿畏也勃未二十右扶風請試守渭城宰及援為將軍封侯而勃位不過縣令援後雖貴嘗以舊恩而卑侮之勃愈身自親及援遇讒唯勃能終焉魏孟建字公威少與諸葛亮俱游學亮後出祁山答司馬宣王書使杜子緒宣意于公威也杜畿為河東太守與衛固少相侮狎固嘗輕畿畿嘗與固博而争道畿嘗謂固曰仲堅固字也我今作河東也固褰衣罵之及畿之官而固為郡功曹張時故任京兆畿迎司𨽻與時㑹華隂時畿相見於儀當各持版時嘆曰昨日功曹今為郡將軍也杜贄舉孝㢘除郎中轉補校書贄與母邱儉鄉里相親故為詩與儉求仙人藥一丸欲以感切儉求助也儉復答詩贄竟不得遷卒于秘書曹嘉元康中與石崇俱為國子博士嘉後為東筦太守崇為征虜將軍監青徐軍事屯於下邳嘉以詩遺崇蜀關侯為盪寇將軍與魏將徐晃宿相愛關攻曹仁于樊曹公遣晃救曹仁關與晃遥共語但說平生不及軍事須㬰晃下馬宣令得闗雲長頭者賞金千斤關侯驚怖謂晃曰大兄是何言耶晃曰此國之事耳趙雲為牙門將軍與魏將夏侯惇戰於博望生獲夏侯蘭蘭是雲鄉里人少小相知雲白先主活之薦蘭明於法律以為軍正雲不用自近其愼慮類如此劉巴字子初始曹公辟為掾使招納長沙零陵桂陽㑹先主畧有三郡不得反遂逺適交阯更姓為張與交阯太守士爕計議不合乃繇䍧牱道去為益州郡所拘留太守欲殺之主簿曰此非常人不可殺也主簿請自送至州見益州牧劉璋父焉昔為巴父祥所舉孝㢘見巴驚喜每大事輙以咨訪楊戲出領梓潼太守入為射聲校尉篤于舊故居誠存厚與巴西韓儼黎韜童幼相親厚儼因疾廢頓韜無行見捐戲經紀振卹恩好如初吳滕裔伯父耽父胄與楊州刺史劉繇州里通家以世擾亂渡江依繇耽至車騎右司馬胄太帝待以賓禮裔至丞相嚴畯為衛尉廣陵劉潁與畯有舊潁精學家巷大帝聞徵之以疾不就其弟畧為零陵太守􅌰官潁往赴喪帝知其詐病急驛收録畯亦馳語潁使還謝帝怒廢畯而潁得免罪王導為丞相咸和中衛玠改塋于江寧導教曰衛洗馬明當改葬此君風流名士海内所瞻可脩薄祭以敦舊好梁陳伯之為江州刺史伯之與豫章人鄧繕永興人戴永忠並有舊繕經藏伯之息膺禍伯之尤德之及在州用繕為别駕永忠記室參軍後唐王延歴徐宋鄆青四鎮従事長興初同鄉里馮道趙鳯在相位擢拜左補闕踰年以水部員外郎知制誥就改郎中正拜中書舎人賜金紫趙鳯初落髪為僧與遊方者雜處至太原頃之劉守竒歸莊宗周德威軍於涿州莊宗命守竒軍佐之鳯鄉人從守竒奔梁梁用守竒為博州刺史表鳯為判官劉賛初仕梁為租庸巡官莊宗入汴租庸副使孔謙以賛鄉黨表為鹽鐵判官李崧始辟鎮州范延光管記與宰臣李愚従莊宗皇子繼岌伐蜀有舊擢為拾遺俄而延光入代安重誨為樞密使奏崧以本官為本院學士韓惲明宗天成初改祕書監俄而馮道為丞相與惲俱莊宗龍潜佐幕之舊以惲性謹厚尤左右之尋遷禮部尚書周申師厚少為兖州牙將與王峻相善洎太祖登極師厚以峻為樞密使兼輔相每旭旦于峻馬首望塵而拜訴覊旅乞任使久之偶西凉請帥太祖詔宰臣擬議訪諸率府率供奉官之間竟無願者峻遂以師厚奏之太祖曰西凉䧟在西戎不欲强之冀從人所欲峻問師厚曰爾領一節制可否師厚駭愕之亦不之信峻以其事諭之師厚欣然求往翊日制下不宣于朝遽得環衛之任俾鎮西凉錫賚繒帛駞馬旌節以遣之張義為監察御史廣順二年十月賜緋魚笏王峻之奏也義唐三司使延朗之子也峻嘗事延朗故有是請贈遺周禮君有匪頒臣有好予故贈遺之義存乎典制乃有因締交之厚持出境之歡或旌其臧謀或重其髙節中雅素之㫖表軫卹之心是亦非主乎財蓋成於禮而已然則妄與之誡先賢所惡私受之責良吏攸記故知介潔之士亦所慎焉吳公子札聘於鄭見子産如舊相識與之縞𢃄子産獻紵衣焉昭屠伯衛大夫也魯合諸侯於平邱次於衛地晉叔鮒求貨于衛淫芻蕘者欲使衛患之而致貨衛人使屠伯饋叔向羮與一箧錦曰諸侯事晉未敢攜貳况衛在君之宇下屋宇之下言近也而敢有異志芻蕘者異於他日敢請之請止之叔向受羮反錦受羮示不逆其意且非貨韓宣子晉大夫也有環其一在鄭商宣子謁諸鄭伯子産弗與四月鄭六卿餞宣子於郊宣子私覲於子産以玉與馬曰子命起舎夫玉是賜我玉而免吾死也敢不藉手以拜以玉馬藉手拜謝子産趙孟晉大夫也越圍吳趙孟使楚隆至吳王拜稽首曰寡人不佞不能事越以為大夫憂拜命之辱與之一簟珠簟小笥使問趙孟問迂也曰勾踐將生憂寡人寡人死之不得矣季康子魯大夫饋藥孔子拜而受之曰丘未達不敢嘗未知其故故不敢嘗禮也公西赤字子華孔子弟子也子華使于齊冉子為其母請粟子曰與之釡六斗四外曰釡請益曰與之庾十六斗日庾冉子與之粟五秉十六斛曰秉五秉合為八十斛子曰赤之適齊也乗肥馬衣輕裘吾聞之也君子周急不繼富非冉有與之太多原思為之宰弟子原憲思字也孔子為魯司冦以原憲為家邑宰與之粟九百辭九百九百斗辭讓不受子曰毋禄法所得當受不讓以與爾隣里鄉黨乎五家為隣二十五家為里萬二千五百家為鄉五百家為黨孔子之衛遇舊館人之喪前日君所使舎己入而哭之哀出使子貢說驂而賻之賻助喪用也騑馬曰驂子貢曰于門人之喪未有所說驂說驂於舊館無乃已重乎言說驂太重比于門人㤙為偏頗夫子曰予鄉者入而哭之遇于一哀而出涕遇見也舊館人㤙雖輕我入哭見主人為我盡一哀是以厚恩待我我為出涕恩重宜有施惠予惡夫涕之無從也小子行之客行無他物可以易之者使遂以徃孟子名軻鄒人也弟子陳臻問曰前日于齊王餽兼金一百而不受於宋餽七十鎰而受於薛餽五十鎰而受前日之不受是則今日之受非也今日之受是則前日之不受非也夫子必居一於此矣兼金好金也其價倍於惡者故謂之兼金百鎰也古者以一鎰為一金鎰二十兩也孟子曰皆是也當在宋也予將有逺行行者必以贐辭曰餽贐予何為不受贐送行者贈賄之禮也時人為之贐也當在薛也予有戒心辭曰聞戒故為兵餽之予何為不受戒有備戒不虞之心也時有惡人欲害孟子孟子戒備薛君聞戒此金可鬻以作兵備故餽之我何為不受也若于齊則未有處也無處而餽之是貨之也焉有君子而可以貨取乎漢陸賈為大中大夫吕太后用事以病免為丞相陳平畫謀交驩太尉周勃平乃以奴婢百人車馬五十乗錢五百萬遺賈為食飲費司馬相如與妻文君歸成都文君當壚賣酒之處壘土為壚以居酒瓮四邊隆起其一靣髙形如鍛壚故名壚耳雜作卓王孫文君父也恥之為杜門不出杜塞也昆弟諸公更謂王孫曰更互也有一男兩女所不足者非財也言不患少財也今文君既失身於司馬長卿長卿故倦遊倦疲也言疲厭遊學博物多能也雖貧其人材足依也且又令客奈何相辱如此言縣令之客不可以辱也卓王孫不得已己止也分與文君僮百人錢百萬及其嫁時衣被財物文君乃與相如歸成都買田宅為富人居後至孝文園令李陵為騎都尉戰敗降匃奴見蘇武陵惡自賜武謂若示巳於匃奴中富饒以夸武使其妻賜武牛羊數十頭後漢杜林字伯山扶風人徵為侍御史與馬援同鄉里素相親厚援従南方還時林馬適死援令子持馬一疋遺林曰朋友有車馬之饋可且以備乏林受之居數月林遣子奉書曰將軍内施九族外有賓客望恩者多林父子兩人食列卿禄常有盈今送錢五萬援受之謂子曰人當以此為法是杜伯山所以勝我也晉孔沉字德度累辟不就從兄坦以裘遺之辭不受坦曰晏平仲儉祀其先人豚肩不掩豆猶狐裘數十年卿復何辭於是受而服之宋禇叔度為廣州刺史以黷貨免還至都凡諸舊友有一靣之欵無不厚加贈遺王𢎞之徵為通直散騎常侍不就從兄敬𢎞嘗解貂裘與之即着以採藥許瑶之居在永興罷建安郡丞還家以綿一斤遺郭原平原平不受送而復反者前後數十瑶之乃自往曰今嵗過寒而建安綿好以此奉尊上耳原平乃拜而受之南齊袁彖為安西長史庾易有髙尚之節永明三年詔徵太子舎人不就以文義自樂彖欽其風通書致遺易以連理杭竹翹書格報之張融字思光吳郡吴人也年弱冠道士同郡陸脩静以白鷺羽麈尾扇遺融曰此既異物以奉異人後魏李元忠除驃騎大將軍儀同三司曽貢文襄玉蒲桃一盤文襄報以百縑其見賞重如此爾朱榮父新興髙祖時為右將軍每入朝諸王公朝貴競以珍玩遺之新興亦報以名馬唐陸贄為華州鄭縣尉罷秩東歸省母路繇夀州刺史張鎰有時名贄往謁之及辭遺贄錢百萬曰願備太夫人一日之膳贄不納唯受新茶一丳而已曰敢不承君厚意及為中書舎人翰林學士母卒侍喪於河南豐樂佛寺四方以賻贈為詞厚致金帛贄絲毫無受惟與劍南節度使韋臯布衣友善臯以事奏聞每有所致輙稱詔以受之李愬西平王晟之子也為魏博節度使穆宗長慶元年幽鎮復亂愬以玉帶寶劍與深州刺史牛元翼遣使謂之曰吾先人嘗以此劍立大勲吾又以此劍平蔡冦今鎮人叛逆公宜用此剪之元翼承命感激乃以劍及帶令於軍中報之曰願以衆從竭其死力託孤夫以篤信行義顧惟君子託孤寄命亦在知人傾腹心於生平之日奉然諾於緜邈之期身魂有主遺育不孤豈非信乎可謂仁矣求諸千載其人蓋稀風烈所存瞻詠何已申舟楚大夫也楚子使聘于齊楚子曰無假道于宋申舟無畏亦使公子馮聘於晉不假道於鄭申舟以孟諸之役惡宋文十年楚子田孟諸無畏抶宋公僕曰鄭昭宋聾昭至也聾闇也晉使不害我則必死王曰殺女我伐之見犀而行犀申舟子以子託王示必死及宋宋人止之華元曰過我而不假道鄙我也鄙我亡也以我北其邊鄙是與亡國同殺其使者必伐我伐我亦亡也亡一也乃殺之樂祁宋大夫也言於景公曰諸侯唯我事晉今使不徃晉其憾矣樂祁告其宰陳寅以與公言告之陳寅曰必使子往他日公謂樂祁曰唯寡人說子之言子必往陳寅曰子立後而行吾室亦不亡寅知晉政多門往必有難故使樂祁立後而行唯君亦以我為知難而行也見溷而行溷樂祁子也見於君立以為後趙朔晉大夫盾之子也司寇屠岸賈將作亂誅靈公之賊盾已死矣欲誅其子朔韓厥止賈賈不聽厥告朔令亡朔曰子必能不絶趙祀死不恨矣韓厥許之及賈誅朔程嬰公孫杵臼之藏其孤趙武也厥知之晉公病卜大業之不遂多為祟韓厥稱成季之功今後無祀以感景公景公問曰尚有世乎厥於是言趙武而復與之田邑漢趙貢為琅邪太守行縣見不其丞薛宣甚説其能從宣歴行屬縣還至府令妻子與相見戒曰贛君贛君薛宣字至丞相我兩子亦中丞相史宣為丞相除贛君兩子為史後漢張堪素有名稱嘗於太學見朱暉甚重之接以友道乃把臂曰欲以妻子相託朱生暉以堪先達舉手未敢對自後不復見堪堪後為漁陽太守卒暉聞其妻子貧困乃自往候視厚賑贍之暉後至尚書令魏蒯越字異度後漢時為章陵守封樊亭侯建安十九年卒臨終與太祖書託以門户太祖報書曰死者及生生者不愧孤少所舉行之多矣魂而有靈亦將聞孤此言也蜀馬超為左將軍臨殁上疏曰臣門宗三百餘口為孟德所誅盡惟有從弟岱當為微宗血食之繼深託陛下餘無復言晉王恭為平北將軍兵敗初見執遇故吏戴耆之為姑孰令恭私告之曰我有庶兒未舉在乳母家卿為我送寄桓南郡耆之遂送之於夏口桓𤣥撫飬之為立喪弔祭焉南凉秃髪傉檀僣號凉王後秦姚興凉州刺史王尚遣主簿宗敞来聘敞父爕吕光時自河湟太守入為尚書郎見傉檀于廣武執其手曰君神爽宏放逸氣凌雲命世之傑也必當克清世難恨吾年老不及見耳以敞兄弟託君至是傉檀謂敞曰孤以常才謬為尊先君所見稱毎自恐有累大人氷鏡之明乃忝家業竊有懐君子詩云中心藏之何日㤀之不圖今日得見卿也敞曰大王仁侔魏祖存念先人雖朱暉眄張堪之孤叔向撫汝齊之子無以加也酒酣語及平生傉檀曰卿魯子敬之儔恨不與卿共成大業耳陳姚察為吏部尚書察與謝貞友善及貞病篤察往省之問以後事貞曰孤釁禍集將隨灰壤族子覬等粗自成立已有疏付之固不足仰塵厚德即日迷喘時不可移便為永訣弱兒年甫六嵗名靖字依仁情所不能㤀敢以為託耳是夜卒勅賻米一百斛布三十疋後主問察曰謝貞有何親屬察因唘曰貞有一子年六嵗即有勅長給衣糧唐孫思邈見太子詹事盧齊卿於童幼齊卿請問人倫之事思邈曰汝後五十年位登方伯吾孫當為屬吏可自保也後齊卿為徐州刺史思邈孫溥果為徐州蕭縣丞册府元龜巻九百五十五
