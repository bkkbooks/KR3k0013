  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_003-1a}
body:
  text: 册府元龜卷三宋王欽若等撰帝王部名諱周官小史掌王之名諱名諱之起繇周道也上古帝王敦尚質樸名號雖建制度未備故堯舜則有放勲重華之名而禹湯又去唐虞之文從髙陽之質以名為號先儒之説或以為名或以為字或以為諡而尚書所紀即皆褒徳之稱盖傳述之異也自漢以來所記詳矣至若貴易諱而難知避五行之勝伏亦皆有㫖焉黄帝名曰軒轅盖受國於有熊居軒轅之丘因以為名又以為號又云作軒冕之服故謂之軒轅少昊名摯字青陽顓頊髙陽帝嚳髙辛髙陽髙辛皆所興之地名顓頊與嚳皆以字為號上古質故也帝摯帝堯名放勲帝舜名重華夏禹名文命帝啓帝太康帝仲康帝相帝少康帝宁一作杼帝槐帝芒帝泄帝不降帝扄帝廑帝孔甲帝皐帝發帝履癸是為桀殷湯名履字天乙帝外丙帝仲壬帝太甲帝沃丁帝太庚帝小甲帝雍己帝太戊帝仲丁帝外壬帝河亶甲帝祖乙帝祖辛帝沃甲帝祖丁帝南庚帝陽甲帝盤庚帝小辛帝小乙帝武丁帝祖庚帝祖甲一作帝甲帝廩辛帝庚丁帝武乙帝太丁帝乙帝辛是為紂周文王昌武王發成王誦康王釗昭王瑕穆王滿恭王繄扈一作伊扈懿王囏一作囏孝王辟方一单名方夷王燮厲王胡宣王静幽王宫湼平王宜臼桓王林莊王佗釐王胡齊惠王閬襄王鄭頃王壬臣匡王班定王瑜簡王夷靈王泄心景王貴悼王猛敬王丐元王仁一曰赤元王定王介一曰具定王哀王去病思王叔考王嵬威烈王午安王驕烈王喜顯王扁慎靚王定赧王延漢髙祖皇帝諱邦字季邦之字曰國臣下所避以相代也惠帝諱盈之字曰滿文帝諱恒之字曰常景帝諱啓之字曰開武帝諱徹之字曰通昌邑王諱賀臣欽若等曰史氏不載其諱字昭帝諱弗之字曰不帝初為皇太子名弗陵後但名弗以二名難諱也宣帝諱詢字次卿詢之字曰謀帝初名病已盖以夙遭屯難而多病故名之欲其速差也元康二年詔曰聞古天子之名難知而易諱也今百姓多上書觸諱以犯罪者朕甚憐之其更諱詢諸觸諱在令前者赦之元帝諱奭之字曰盛成帝諱驁之字曰俊帝初生於太子宫為世嫡皇孫宣帝愛之字曰太孫哀帝諱欣之字曰喜平帝諱衎之字曰樂帝初名箕子元始二年詔曰皇帝二名通於器物箕用器也故云通于器物今更名合於古制使太師光奉太牢告祠髙廟後漢光武皇帝諱秀字文叔秀之字曰茂初光武生濟陽縣舎是嵗縣界有嘉禾生一莖九穗因名曰秀眀帝諱莊之字曰嚴章帝諱炟丁逹切之字曰著和帝諱肇之字曰始殤帝諱隆之字曰盛改河内隆慮為林慮安帝諱佑之字曰福順帝諱保之字曰守冲帝諱炳之字曰明質帝諱纉之字曰繼桓帝諱志之字曰意靈帝諱宏之字曰大獻帝諱協字伯和協之字曰合靈帝以帝似己故名之魏文帝諱丕字子桓眀帝諱叡字元仲齊王諱芳字蘭卿髙貴鄉公諱髦字彦士陳留王諱奐字景眀初為嘗道鄉公名璜甘露五年五月己丑髙貴鄉公卒皇太后立之詔曰古者人君之為名字難犯而易諱今嘗道鄉公諱字甚難避其令朝臣博議改易列奏遂改之晉武帝諱炎字安世惠帝諱𠂻字正度懐帝諱熾字豐美愍帝諱鄴字彦旗建興元年即位改建鄴為建康改鄴為臨漳元帝諱睿字景文眀帝諱紹字道畿成帝諱衍字世根康帝諱岳字世同穆帝諱聃字彭子哀帝諱丕字千齡簡文帝諱昱字道萬孝武帝諱曜字昌明安帝諱徳宗字徳宗恭帝諱徳文字徳文後魏道武帝諱珪明元帝諱嗣太武帝諱燾文成帝諱濬獻文帝諱𢎞孝文帝諱宏宣武帝諱恪孝明帝諱詡孝莊帝諱子攸前廢帝亦曰節閔諱恭字修業後廢帝諱朗字仲哲孝武帝亦曰出帝諱循字孝則西魏文帝諱寳炬廢帝諱欽恭帝諱廓後周愍帝諱覺字陀羅尼明帝諱毓小名統萬突太祖長子太祖臨夏州生帝統萬城因以名焉武帝諱邕字禰羅􅀢宣帝諱贇靜帝諱闡初名衍隋髙祖諱堅小名那邏延焬帝諱廣一名英小字阿𡡉長夀元年立為皇太子改廣川縣為長河縣恭帝諱侑唐髙祖諱淵太宗諱世民幼時有相者云未年二十當濟世安民髙祖以為神隂採濟世安民之義遂以名焉武徳九年立為皇太子令曰依禮二名義不偏諱尼父逹聖非無前指近代以來曲為節制兩字兼避廢闕已多率意而行有違經誥今宜依據禮典務從簡約仰效先哲垂法將來其官號人名及公私文籍有世及民兩字不連讀者並不須避至髙宗即位乃改民部為户部以避之髙宗諱治即位初有司請改治書侍御史為御史中丞諸州治中為司馬治禮郎為奉禮郎帝以貞觀時不廢先帝二字不許有司奏曰先帝二名禮不偏諱上既單名臣子不敢指斥從之顯慶五年正月壬寅詔曰孔宣設教正名為首戴聖貽範嫌名不諱比見鈔寫古典至於朕名或缺其㸃畫或隨便改换恐六籍雅言會意多爽九流通義指事全違誠非立書之本意自今以後繕寫舊典文字竝宜使成不須隨義改易中宗諱顯儀鳯二年十月封英王改名哲聖歴元年册為皇太子復名顯神龍元年正月即位改顯政殿為昭慶殿顯徳殿為章徳殿顯聖侯廟為昭聖侯廟睿宗諱旦初名旭輪總章二年封冀王單名輪永淳三年始改名旦𤣥宗諱隆基先天二年正月詔改隆州為閬州自餘州縣等名有與皇帝名同者便令所司改定至寳歴元年正月太常寺禮院上言𤣥宗廟諱准故事祧遷後不當更諱制可之肅宗諱亨初名嗣昇開元十五年改名浚二十三年改名璵二十八年改名紹有獻書者言宋太子名卲惡其聲類天寳三載又改名亨代宗諱豫初名俶乾元元年十月立為皇太子因降誕日豫州奏百姓李氏有嘉禾生及是册禮肅宗詔改名豫寳應元年即位改豫州為蔡州泗州宿豫縣改為宿遷縣兖州方與縣改為魚臺縣洪州豫章縣改為鍾陵縣豫寧縣改為武寧縣古州樂豫縣改為樂山縣徳宗諱适大厯十四年即位改括州為處州括蒼縣為麗水縣順宗諱誦憲宗元和二年八月刑部奏改律巻第八為鬭競律咸通十二年分司侍御史李谿進狀曰臣准西臺牒及金部稱奉六月二十七日勑内園院郝景全事奏狀内訟字音與廟諱同奉勑罰臣一季俸者右臣官位至卑得蒙罰俸屈與不屈不合有以事至分眀别闗理體若便隱黙恐負聖時願陛下寛其罪戾使得盡言臣前奏狀稱准勑因事告事旁訟他人是咸通十一年十月十三日勅語臣狀中具有准勅字非臣自撰辭句臣謹按禮不諱嫌名又按職制律諸犯廟諱嫌名不坐注云謂若禹與雨疏云謂聲同而字異注疏重復至易分曉伏惟睿文英武明徳至仁大聖廣孝皇帝陛下眀過帝堯孝踰大舜豈自發制勅而不避諱哉故是審量禮律以為無妨耳即引陛下勑文而言不敢擅有移改不謂内園使有此論奏也臣之罰俸實為小屈然今者非敢訴此罰俸也實以從來制勑及百官表奏曾有避嫌名例而因臣致罰即舊章自此有援引勅格者亦須委曲迥避便成訛弊臣今已罰俸不合上聞臣聞趙充國為將不嫌伐一時事以為漢家後法魏徴為相不存形迹以致貞觀太平臣雖未及將相忝為陛下持憲之臣豈可以論俸為嫌而使國家勅命有誤也且順宗廟諱萬國儀刑誠不可同於小事願陛下留意察納别下明勅使自後章奏遵禮律處分則天下幸甚勅尋免所罰憲宗諱純初名淳貞元二十一年册為皇太子始更之永貞元年即位改桂州純化縣為慕化縣蒙州純義縣為正義縣又改淳州為睦州還淳縣為清溪縣横州淳風縣為從化縣淳于姓改為于以音與帝同名故也古者不諱嫌名禹與雨丘與蓲臨文不諱文王名昌武王名發周詩曰克昌厥後又曰一之日觱發魯莊公名同春秋曰同盟于幽襄公名午書曰陳侯午卒之類是也古今時變故廣避焉穆宗諱同于真宗初名宥元和七年立為皇太子始更之十五年即位改常岳為鎮岳常州為鎮州定州常陽縣為曲陽縣常王房子孫為泜王房敬宗諱湛文宗諱昻初名涵即位更之武宗諱炎初名瀍㑹昌六年三月制曰王者照臨萬㝢名豈尚于難知敬順五行理宜避于勝伏徴諸前史義實炳然昔炎漢之興雒傍去水所都名號猶乃避之况我國家祚昌土徳豈可以王氣勝于君名所以憲宗繼眀之初貴以捨水必有㝠數協于禎祥漢宣帝柔服北夷𢎞其祖業功徳之盛侔於周宣御厯十年乃從美稱朕逺追大漢之事近稟聖祖之謀爰擇嘉名式遵令典庶承天意永保鴻休宜改名為炎仍令所司擇日分命宰臣告天地宗廟其舊名中外奏章不得更有迥避告報遐邇咸遂聞知宣宗諱忱初名怡即位更之懿宗諱漼初名温大中十三年八月立為皇太子始更之僖宗諱儇初封晉王名儼咸通十四年七月立為皇太子乃更之昭宗諱敏初名傑龍紀元年十一月辛亥將有事於圜丘始更之哀帝諱祝初封輝王名祚天祐元年八月立為皇太子監國乃更之即位先是太常寺有止皷兩字樂器上字犯御名中書門下奏臣等謹按故事漢室以北山改郡蓋為文皇國朝以復姓稱于實縁憲祖或易建康之縣或更昭穆之音皆因踐祚之初合舉避行之典按爾雅釋樂篇皷謂之止敔謂之籈今者陛下肇承丕祚始值遷都凡厥惟新式叶正始竊詳爾雅肇亦訓始臣等商量望改為肇從之後唐莊宗諱存朂眀宗諱亶初名嗣源天成元年六月勅曰古者酌禮以制名懼廢於物難犯而易避貴便於時况徴彼二名抑有前例以太宗文皇帝自登寶位不改舊稱時即臣有世南官有民部靡聞曲避止禁連呼朕猥以𦕈躬託于人上止遵聖範非敢自尊應文書内所有二字但不連稱不得迥避如是臣下之名不欲與君親同字者任自改更務從私便庶體朕懐二年正月制曰王者祇敬宗祧統臨寰宇必順體元之典特新制義之文朕以𦕈躬獲承丕構襲三百年之休運繼二十聖之耿光馭朽納隍夕惕之心罔怠法天師古日躋之道惟勤今則載戢干戈混同書軌荷𤣥穹之睠佑契兆庶之樂推簡玉泥金非敢期於薄徳耕田鑿井誠有慕於前王將陳享謁之儀即備郊丘之禮宜更稱謂永耀簡編今改為亶凡在中外宜體朕懐宣記百寮稱賀兼差官告郊廟社稷清泰二年五月中書門下奏准天成元年正月十六日勑本朝列聖及四廟諱近日中外表疏偏旁文字皆闕㸃畫凡當出諱止避正呼儻迥避於偏旁則虧闕於文字宜從朴素庶便公私凡廟諱但迥避正文其偏旁文字不在减少㸃畫今定州節度使楊壇檀州金壇縣等名酌情制義竝請改之其表章文案偏旁字闕㸃畫凡臣寮名涉偏旁亦請改之詔曰偏旁文字音韻懸殊止避正呼不宜全改楊壇宜賜名光逺其餘依奏愍帝諱從厚小字菩薩奴末帝諱從珂清泰二年中書言御名上一字與諸王相連太宗𤣥宗故事人臣諸王合避相聨字單名從之晉髙祖諱敬塘少帝天福七年勅應殿名及州縣名職名等有與髙祖諱犯者悉改之明堂為宣徳殿唐州為沁州思唐州為思化州密州附唐縣為膠西縣蔚州興唐縣為靈山縣博州堂邑為河濵髙唐為濟城定州唐縣為博陵莫州唐興為宜州真定府行唐為永昌堂陽為蒲澤彭州唐化為彭山蜀州唐興為鄉城道州延唐為延喜福州福唐為南臺夀州盛唐為來化鄂州唐年為臨江杭州錢唐為錢江唐山為横山台州唐興為台興隨州唐城為漢東代州唐林為廣武漢州金堂為漢城合州䂖鏡為仙覽復州竟陵為景陵中書政事堂為㕔堂後官諸房頭為錄事餘竝為主事所有諸邑人姓名犯者竝改又改陜府甘棠驛為通津驛少帝諱重榮漢髙祖本名知逺即位初前邠州節度使折從逺改名從阮乾祐元年勑曰朕祇膺景命肇啓鴻圖適當建號之初宜舉正名之典夫名以制義義以出禮禮以體政政以養民載考格言抑有彛訓顧性寡昧敢忘率循但君父之名貴於易避臣子之敬難以斥尊苟觸類以妨言必迂文而害理况宗廟方建禋祀匪遙祝嘏將期於正辭稱謂所宜於稽古爰從改革庶叶典章凡百臣寮當體朕意今改名暠故茲札示想宜知悉少帝諱承祐周太祖諱威廣順元年正月即位相州張彦成澶州李洪義侍衛步軍指揮使曹英前陳州刺史馬令琮慶州刺史郭彦欽皆以名下一字與御名同改為成義英琮欽二月涇州節度使史康懿言臣名下一字與御名同改之三月詔鄧州軍額改為武勝軍靈武屬郡宜改為環州避御名也八月環州刺史雷彦洪以名下一字犯御名改之十二月御史臺奏唐景雲三年改左右屯衛大將軍為威衛又唐髙宗名治其時改治書御史為御史中丞諸州治中為司馬蓋臣子上書合避名也請諸衛中舊是屯衛者復舊名從之世宗諱榮册府元龜卷三
