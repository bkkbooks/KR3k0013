body:
  text: 册府元龜卷九百六十宋王欽若等撰外臣部土風第二墮婆登國在林邑南其風俗與訶陵畧同種稻毎月一熟亦有文字書之貝多葉其死者口實以金又以金釧貫於四肢然後加以婆律膏及檀沉龍腦等香積薪以燔之殊奈國在林邑南去交阯海行二月餘日習俗文字與婆羅門同絶遠未嘗朝中國唐貞觀初始通盤盤國在林邑西南海曲中人皆學婆羅門書甚敬信佛法婆利國在林邑東南海中洲上去廣州二月日行國界東西五十日行南北二十日行有一百三十六聚土氣暑熱如中國之盛夏穀一歲再熟草木常榮海出文螺紫貝有石名蚶貝羅初採之柔軟及刻削為物乾之遂大堅强其國人披吉貝如帊及為都縵王乃用斑絲布以瓔珞繞身頭著金冠高尺餘形如弁綴以七寶之飾帶金裝劍偏金高坐以銀蹬支足侍女皆為金花雜寶之飾或持白眊拂及孔雀扇王出以象駕輿輿以雜香為之上施羽蓋珠簾其導從吹螺擊皷問其先及年數不能記焉而言白淨王夫人即其國女也又云其地延袤數千里國人善投輪其大如鏡中有竅外鋒如鋸逺以投人無不中其餘兵器與中國畧同俗類眞臘物産同於林邑其殺人及盜截其手姦者鏁其足期年而止祭祀必以月晦盤貯酒餚浮之流水毎十一月必設大祭海出珊瑚有鳥名舍利解人語人皆黑色穿耳附璫王戴花冠形如皮弁裝以眞珠瓔珞身坐金牀侍女有金花寶鏤之飾或持白眊拂孔雀扇行則駕象鳴金擊皷吹蠡為樂男子皆拳髪被言貝布横幅以遶腰有吉貝草緝其花以作布麄者名吉貝細者名白疊陀洹國在墮和羅西北其國海行五月至廣州土無蠶桑以白疊朝霞布為衣五穀皆稻麥麻豆獸有白象猪羊牛俗皆屋居其父母死停喪在室輒數日不食燔屍已後男女並剔頭臨池洗浴然後進食狼牙修國在南海中其界東西三十日行南北二十日行去廣州二萬四千里土氣物産與扶南畧同偏多􅀢沈婆律香等其俗男女皆袒而被髪以吉貝為干縵其王及貴臣乃加雲霞布覆胛以金繩為絡帶金鐶貫耳女子則披布以瓔珞繞身其國以黑磚為城重門樓閣王出乘象有幡眊旗皷罩白盖兵衛甚嚴干陀利國在南海洲上其俗與林邑扶南畧同出斑布吉貝檳榔檳榔特精為諸國之極烏滸南方夷號也其俗食人以鼻飲水口中進噉如故赤土國本扶南之别種在南海中水行百餘日其俗皆穿耳翦髪無跪拜之禮以香油塗身其俗敬佛尤重婆羅門婦人善髻於項後男女通以朝霞朝雲雜色布為衣豪富之室恣意侈靡為金鎻非王賜不得服用毎婚嫁擇吉日女家先期五日作樂飲酒父執女手以授婿十日乃配焉既娶即分財别居惟幼子與父同居父母兄弟死則剔髪素服就水上搆竹為棚棚内積薪以屍置上燒香建幡吹蠡擊皷以送之縱火焚薪遂落於水貴賤皆同惟國王燒訖收灰貯以金瓶藏於廟屋冬夏常濕雨多霽少種植無時特宜稻穄白豆黑麻自餘物産多同於交阯以甘蔗作酒雜以紫𤓰根酒色黄赤味亦香美亦以椰漿為酒斯調國有火洲在南海中其上有野火春夏自生秋冬自死而有木生於其中而不消也枝皮夏活秋冬死則皆枯瘁其俗嘗冬採其皮以為布色小青黒若塵垢汚之便投火中則更鮮明也崑崙之墟有炎火之山山上有鳥獸草木皆生於炎火之中故有火浣布非此山草木之皮則其鳥獸之毛也大食國在南海中其國男夫黑色多鬚鼻大而長似婆羅門婦人白晢亦有文字出駝馬驢騾羖羊等其馬大於諸國兵刃勁利其俗勇於戰闘好事天神而土多沙石不堪耕種惟食駝馬等肉俱紛摩地那山在國之西國南隣於大海其王移穴中黑石寘之於國占城國其衣服制度大畧與大食國同所乘皆象馬粒食稻米肉食水兕山羊之類獸之竒者有犀牛禽之大者有孔雀長眞國烏武獠也其地多毒物饒瘴癘其中毒者皆口噤不得餌藥故多自鑿去齒亦稱鑿齒之民焉䍧牱蠻地多雨潦俗好巫鬼禁忌寡畜産又無蠶桑故其郡最貧句町縣有桄榔木可以為麵百姓資之桄榔木外皮有毛似栟櫚而散生其木剛作鋘鋤利如鐵中石更利惟中蕉根乃致敗耳皮中有似擣稻米片又似麥麵中作餅餌廣志曰桄榔樹大四五圍長五六丈洪直旁無枝條其顛生葉不過數十似㯶葉破其木肌堅難傷入數寸得麵赤黄蜜緻可食者也又云土氣鬱熱多霖雨稻粟再熟無徭役惟征戰之時乃相屯聚刻木為契其法刼盜者三倍還贓殺人者出牛馬三十頭乃得贖死以納死家風俗物産畧與東謝同卭都夷漢武帝以為越嶲郡其土地平原有稻田青蛉縣禺同山有碧雞金馬光景時時出見禺同山在今褒州揚波縣王褒碧雞頌曰持節使王褒謹拜南崖敬移金精神馬縹碧之雞處南之荒深谿回谷非土之鄉歸來漢德漢德無疆亷平唐虞澤配三皇華陽國志曰碧雞光景人多見之前書音義曰金形似馬碧形似雞也俗多逰蕩而喜謳歌略與䍧牱相類豪帥放縱難得制御莋都夷漢武帝所開以為莋都縣其人皆被髪左衽言語多好譬類居處畧與汶山夷同土出長年神藥仙人山圖所居焉哀牢驃人皆穿鼻儋耳其渠帥自謂王者耳皆下肩三寸庶人則至肩而已土沃美宜五穀蠶桑知染采文繡罽毲帛疊蘭干細布織成文章如綾錦有梧桐木華績以為布幅廣五尺潔白不受垢汙先以覆亡人然後服之其竹節相去一丈名曰濮竹出銅鐵鉛錫金銀光珠虎魄水晶琉璃軻蟲蚌珠孔雀翡翠犀象猩猩貊獸雲南縣有神鹿兩頭能食毒草冉駹夷其王侯頗知文書而法嚴重貴婦人黨母族死則燒其尸土氣多寒在盛夏冰猶不釋故夷人冬則避寒入蜀為傭夏則違暑反其邑衆皆依山居止累石為室高者至十餘丈為卭籠又土地剛鹵不生粟穀麻菽惟以麥為資而宜畜牧有旄牛無角一名童牛肉重千斤可為眊出名馬有靈羊可療毒又有食藥鹿鹿麑有胎者其腸中糞亦可療毒又有五角羊麝香輕毛毼雞牲牲毼雞似雉而大青色有毛闘敵死乃止其人能作旄氊斑罽青頓毞毲羊羧之屬青頓毲羧並未詳字書無此二字周書伊尹為四方獻令曰正西崑崙狗國鬼親枳已闒茸貫匈雕題離丘漆齒請令以丹青白旄紕罽龍角神龜為獻湯曰善何承天纂文曰紕氐罽紕音卑疑反毞即紕也特多雜藥地有鹹土煑以為鹽麡羊牛馬食之皆肥東謝蠻在黔安之東地方千里其俗無文書惟刻木為約巢居谷飲刀劍不離其身頭冠熊皮披猛獸之革西趙蠻在東謝蠻之南其風俗物産與東謝同悉立國在吐蕃西南戸五萬勝兵五萬人其地有城邑村落咸依谿澗男人以繪綵纒頭衣氈褐婦人以辮髪著短褐婚姻簡畧不行財貺以蒸報為俗畜多水牛羖羊雞豕穀宜秔稻麥豆饒甘蔗諸果死者葬於中野不封不樹喪制以黑為衣一年就吉刑有刖劓覊事吐蕃自古未通中國唐貞觀二十年遣使獻方物東女國西羌之别種在雅州西北風俗寛緩人性馴良其主及諸官皆奕葉相𫝊十一月為歲首死者墓而不墳竪為標記無喪紀之禮所居起重樓層屋王至九層國人至六層其王服青毛綾裙下領衫上披青袍其袖委地冬則羔裘飾以文錦為小鬟髻飾之以金耳垂璫足履􅤼􅝿俗重婦人而輕丈夫文字同於天竺毎至十月令巫者齎楮詣山中散糟麥於空大呪呼鳥俄而有鳥如雞飛入巫者之懐因剖腹而視之毎有一穀來歲必登若有霜雪必多災異其俗信之名為鳥卜其居喪服飾不改為父母喪則三年不櫛沭貴人死者或剥其皮而藏之納骨於瓶中糅以金屑而埋之國王將葬其大臣親屬殉死者數十人昆明夷部落在黔州西南三千里山路險阻住止高欄亦有羊馬其俗椎髻跣足首領披虎皮下者披氈獠者南蠻之别種也自漢中達笻笮川洞之間所在皆有種其俗多散居山谷不辨姓氏又無名字所生男女惟以長幼次第之其丈夫稱阿謩阿叚婦人阿夷阿等之類皆其語之次第稱謂也喜則羣聚怒則相殺雖父子兄弟亦手刃之迭相掠賣不避親戚被賣者號呌不服竄逃避之乃將買人指為捕逐若追亡叛獲便縳之但經被縳者即服為奴𨽻不敢更稱良矣俗畏鬼神尤尚淫祀巫祝有賣其昆季妻孥盡者乃自賣以供祭焉往往推一首帥為主亦不遠相綂攝自江左及中州遞有巴蜀多恃險不賓後周太祖平梁益之後令所在撫慰其與華民雜居者亦頗從賦役然天性暴亂旋致擾動毎歲命隨近州鎮出兵討之獲其口以充賤𨽻謂之為壓獠焉南平獠地與智渝南涪四州相接部落四千餘戸土氣多瘴癘山有毒草沙虱蝮虵人並樓居登梯而上號為欄干男子左袵露髪徒跣婦人横布兩幅穿中而貫其首名為通裙其人美髪為髻鬟垂於後以竹筒如筆長三四寸斜穿其耳貴者亦有珠璫土多女少男為婚之法女氏必先貨求男族貧人無以嫁女多賣與富人為婢俗皆婦人執役松外蠻在西洱河其土有稻麥粟豆種穫亦與中國同而以十二月為歲首菜則葱韮蒜菁果則桃李柰有絲麻女工蠶織之事出絁絹絲布麻幅廣七寸染色有緋帛蠶以正月生三月熟畜有馬牛猪羊雞犬飯用竹筲搏之而噉羮用烏柸形若雞彛有船無車男子以氈及皮為帔女子絁布為裙衫仍披氊皮以帔頭髻有髪一盤而成形如髽男女皆跣至於死喪哭泣棺槨襲歛無不畢備三年之内穿地為坎殯於舍側上作小屋三年之後出而葬之以蠡蚌封棺令其耐濕豪富者殺馬牛祭祀親戚必㑹皆齎牛酒助焉多者至數百人父母皆斬衰布衣不澡遠者至四五年近者二三年然後即吉其被人殺者喪主以麻括髪而墨面衣服不緝雖服内不廢婚嫁娶妻不避同姓富室娶嫁金銀各數十兩馬牛羊皆數十頭酒數十瓶女之所齎金銀將徒亦稱是婿不親迎女至其家亦有拜謁尊卑之禮其俗有盜竊殺人淫穢之事尊長即立一長木為擊皷警共㑹其下强盜者衆共殺之若賊宗富强但燒其屋宅奪其田業而已不至於死穿窬盜者九倍徵贓處女孀妻淫泆不坐有夫而淫男女俱死男子不跨有夫女子之衣若姦淫之人其族强者輸金銀請和妻則棄之其兩殺者死家族即報復力不能敵則授其部落舉兵相攻之驃國西當極遠之地其俗有君臣長幼之序好生惡殺其土宜菽粟稻梁無麻麥其理無刑名桎梏之具犯罪者以竹五本束之復犯者撻其背數止五輕者止三殺人者戮之男女七歲則落髪止寺舍依桑門至二十不悟佛理乃復長髪為居人其衣服悉以白氊為朝霞繞腰而已不衣繒帛云出於蠶為其傷生也唐貞元中來獻其國樂凡十曲與樂工三十五人來朝樂曲皆演釋氏經論之詞意西域且末國治且末城有蒲萄諸果西域自且末以往皆種五穀土地草木畜産作兵畧與漢同至梁號末國勝兵萬餘戸土人翦髪著氊㡌小袖衣為衫則開頸而縫前多牛羊驢騾于闐國在且末西北多玉石玉石玉之璞也一曰石之似玉也又云地多有水潦沙石氣温宜稻麥蒲桃有水出玉名曰玉河國人善鑄銅器其治曰西山城有屋室市井菓蓏菜蔬與中國等尤信佛法王所居室加以朱畫王冠金幘如金胡公㡌與妻並坐接客國中婦人皆辮髪衣裘袴其人㳟敬相見則跪其跪則一膝至地書則以木為筆札以玉為印國人得書戴於首而後開札一說城南五十里有賛摩寺者云是羅漢比丘比盧旃所造石上有辟支佛徒跣之跡于闐西五百里有比摩寺云是老子化胡成佛之所俗無禮義多賊盜淫縱王錦㡌金䑕冠妻戴金花其王髪不令人見俗云若見王髪年必儉土多麻麥粟稻五菓多園林嚈噠國在于闐之西本王舍城城中多寺塔皆飾以金風俗與突厥畧同其俗有兄弟共娶一妻夫無兄弟者其妻戴一角㡌若有兄弟者依其多少之數更加角㡌焉衣服加以瓔珞頭皆翦髪其語與蠕蠕高車及諸胡不同無城邑依隨水草以氊為屋夏遷涼土冬逐煖處分諸妻各在别所相去或二百三百里其王廵歴而行每月一處冬寒之時三月不徙其國無車有輿多駞馬用刑嚴急偷盜無多少皆腰斬盜一責十死者富豪累石為藏貧者掘地而埋隨身諸物皆置塜内其人凶悍能戰鬬西域康居于闐沙勒安息及諸小國三十許皆役屬之朱居國在于闐西其人山居有麥多林果咸事佛語與于闐相類焉太平國在于闐國南其人辮髪氊裘畜牧為業地多風雪冰厚丈餘所出物産頗與吐蕃同俗無文字但刻木結繩而已刑法嚴峻其酋豪死抉出其腦實以珠玉割其藏易以黄金假造金鼻銀齒以人為殉卜以吉辰藏諸巖穴他人莫知其處多殺㹀牛羊馬以充祭禮葬畢服除渴盤陁國于闐西小國也風俗與于闐相類衣吉貝布着長身小袖袍小口袴地宜小麥資以為糧多牛馬駱駞羊等出好氊文字同於婆羅門鉢和國在渴盤陁西其土尤寒人畜同居穴地而處又有大雪山望若銀峯其人惟食餅麵飲麥酒服氊裘波知國在鉢和西南土狹人貧依託山谷有三池傳云大者有龍王次者有龍婦小者有龍子行人經之設祭乃得過不祭多遇風雪之困賖彌國在波知南山居不信佛法專事諸鬼神烏秅國山居田石間有白草累石為室民接手飲自高山下谿澗中飲水故接連其手如猿之飲出小步馬小細也細步言其能蹀足即今所謂百步千跡者也有驢無牛西夜國與胡異其種類羌氐行國言不土著也隨畜産逐水草往來子合國土地出玉石一名漂沙地生白草有毒國人煎以為藥傅箭鏃所中即死蒲犂國寄田莎車種俗與子合同依耐國南與子合接俗相與同少榖寄田䟽勒莎車無雷國衣服類烏孫俗與子合同難兠國種五榖蒲萄諸果有銀銅鐵作兵與諸國同屬罽賓罽賓國地平温和有苜蓿雜草竒木檀櫰梓竹漆櫰音懐即槐之類也葉大而黒也種五榖葡萄諸果糞治園田地下濕生稻冬食生菜其民巧雕文刻鏤治宫室織罽刺文繡好治飲食有金銀銅錫以為噐市列市有列肆亦如中國也以金銀為錢文上為騎馬形澷下為人靣形出封牛水牛象大狗沭猴孔雀犎牛頂上隆起者也郭義恭廣志云罽賓大狗大如驢赤色數里揺鞉以呼之沭猴即彌猴也珠璣珊瑚琥珀璧琉璃魏畧云大秦國出黒白赤黄青緑縹紺紅紫十種琉璃此盖自然之物采澤光潤踰於衆玉其色不常今俗所用皆銷冶石汁加以衆藥灌而為之尤虚脆不貞實非眞物它畜與諸國同一說罽賓在葱嶺南踰懸度經熱坂其地暑濕人皆乘馬土宜秔稻多甘蔗葡萄草木凌寒不死尤信佛法南去舍衛國三千五百里至隋為漕國國法嚴整殺人及盜賊者皆死其俗淫祠葱嶺山有順天神者儀制極華金銀鍱為屋以銀為地祠者日有千餘人祠前有一魚脊骨其孔中通騎馬出入國王戴金魚頭冠坐金馬座土多稻粟豆麥饒象馬犎牛金銀鑌鐵氍毹朱砂青黛安息青木等香石蜜牛蜜墨鹽阿魏白附子烏弋山離國地暑熱莽平有草莽而平坦其草木畜産五穀果菜食飲宫室市列錢貨兵器金珠之屬皆與罽賓同而有桃㧞獅子犀牛桃㧞一名符㧞似鹿長尾一角者或為天鹿兩角者或為辟邪俗重妄殺其錢獨文為人頭幕為騎馬以金銀飾仗仗謂所持兵器也條支國臨西海暑濕田稻有大鳥卵如甕又出獅子犀牛犎牛孔雀安息國治番兠城番音盤土地風氣物類所有民俗與烏弋罽賓同亦以銀為錢文獨為王面幕為夫人面王死輒更鑄錢有大鳥爵大爵項似鷹身蹄似橐駝色蒼舉頭高八九尺張翅丈餘食大麥其屬小大數百城地方數千里最大國也臨媯水商賈車船行旁國書革旁行為書記横行為書記也今西方胡國及南方林邑之徒書皆横不直下革謂皮之不柔者大月氐治監氏城一作藍氏城土地風氣物類所有民俗錢貨皆與安息同出一封槖駞脊上有一封封者言其隆高若封土也國本行國也隨畜移徙與匈奴同俗後魏大武時其國人商販京師自云能鑄石為五色瑠璃於是採礦山中於京師鑄之既成光澤乃美於西方來者乃詔為殿容百餘人光色映徹觀者見之莫不驚駭以為神明所作自此國中琉璃遂賤人不復珍之康居國與大月氐同俗東覊事匈奴為匈奴所覊牽也風俗及人貌衣服畧同大宛地和煖饒桐栁葡萄多牛羊出好馬奄蔡國大畧與康居同俗大宛國治貴山城土地風氣物類民俗與大月氏安息同大宛左右以葡萄為酒富人藏酒至萬餘石久者至數十歲不敗俗耆酒馬耆苜蓿耆讀曰嗜宛别邑七十餘城多善馬馬汗血言其先天馬子也大宛國有高山其山上有馬不可得因取五色母馬置其下與集生駒皆汗血因號曰天馬子也自宛以西至安息國雖頗異言然大同自相曉知也其人皆深目多鬚髯善市賈争分銖貴女子女子所言丈夫乃决正其地皆絲漆不知鑄鐵器及漢使亡卒降教鑄作它兵器得漢黄白金輒以為器不為幣一說土宜稻麥其俗娶婦先以金同心指環為聘又以三婢試之不男者絶婚姦淫有子皆卑其母與人馬乘不調墜死者馬主出歛具休循國治烏飛谷民俗衣服類烏孫因畜隨水草本故塞種也捐毒國治衍敦谷衣服類烏孫隨水草依葱嶺本塞種也莎車國有鐵山出青玉阿鉤羌國在莎車西南土有五穀諸果市用錢為貨止立宫室有兵器土出金珠波路國在阿鉤羌西北其地濕熱有蜀馬土平物産國俗與阿鉤羌同小月氐國本大月氐之種在波路西南先居酉平張掖之間衣服與羌同其俗以金銀錢為貨隨畜牧移徙亦類匃奴尉頭國治尉頭谷田畜隨水草衣服類烏孫烏孫國地莽平多雨寒山多松􅚰􅚰音武元切木名其心似松不田作種樹樹植也隨畜逐水草與匈奴同俗多馬富人至四五十匹民剛惡貪狠無信多寇盜悅般國在烏孫西北其風俗言語與高車同而其人清潔於胡俗翦髪齊眉以䬾餬塗之昱昱然光澤日三澡潄然後飲食其國南界有火山傍石皆燋鎔流地數十里乃凝堅人以為藥即石硫黄也姑墨國北與烏孫接出銅鐵雄黄温宿國土地所有與鄯善諸國同鄯善國本名樓蘭地沙鹵少田寄田仰穀旁國寄於他國種田又糴旁國之穀仰音牛向切國出玉多葭葦檉栁胡桐白草檉栁楊栁也白草似莠乾時白色胡桐似桐民隨畜牧逐水草有驢馬多槖駞能作兵與婼羌同婼音而遮切婼羌國隨畜牧逐水草不田作仰鄯善且末穀頼以自給也山有鐵自作兵兵有弓矛服刀劍甲服刀柏髀也柏音貊髀音俾又音陛龜兹國在白山之南能鑄冶有鈆其刑法殺人者死刼賊則折其臂并刖一足賦稅凖地徵租無田者則稅銀錢婚姻喪葬風俗物産與焉耆畧同惟氣候少温為異又出細氊麞皮氍毹饒沙鹽緑雄雌黄胡粉及良馬犎牛等一說有城郭屋宇耕田産牧為業男女皆翦髪垂與項齊惟王不翦髪學胡書及婆羅門書笇計之事尤重佛法其王以錦蒙項著錦袍金寶帶坐金獅牀土多稻粟菽麥饒銅鐵鉛安息香葡萄酒富室至數百石焉耆國在車師南近海水多魚其俗丈夫翦髪婦人衣襦著大袴婚姻同華夏好貨利任姦詭王有侍衛數十人皆倨慢無尊卑之禮小人貧無綱紀法令兵有弓刀甲矟婚姻畧同華夏死亡者皆焚而後葬其服制滿七月則除之丈夫翦髪以為首飾文字與婆羅門同俗事天神并崇信佛法尤重二月八日是日其國咸依釋教齋戒行道焉氣候寒土田良沃穀有稻麥菽粟畜有駝馬牛羊養蠶不以為絲惟充綿纊俗尚葡萄酒兼愛音樂南去十餘里有魚鹽蒲葦之饒山國其山出鐵民山居寄田糴穀於焉耆危須西羌所居無常依隨水草地少五穀以産牧為業其俗氏族無定或以父名母姓為種號十二世後相與婚姻父没則妻後母兄亡則納婺嫂故國無鰥寡種類繁熾不立君臣無相長一强則分種為酋豪弱則為人附落更相抄暴以力為雄殺人償死無他政令其兵長在山谷短於平地不能持久而果於觸突以戰死為吉利病終為不祥堪耐寒苦同之禽獸雖婦人産子亦不避風雪性堅剛勇猛得西方金行之氣焉湟中月氐胡被服飲食言語畧與羌同章求㧞國或云章揭㧞本西羌種也在悉立西南居四山之内近代移出山西地接東天竺遂改衣服變西羌之俗因而附焉其地廣袤八九百里勝兵一千餘人居無城郭好為寇掠商旅患之大秦國一名犁鞬在海西有松栢諸木百草人俗力田作多種樹樹植也蠶桑皆髠頭而衣繡乘輜軿白盖小車出入擊皷建旌旗幡幟所居城中有五宫其王日㳺一宫聽事五日而後徧常使一人持囊隨王車人有言事者即以書投囊中王至宫發省理其枉直各有官曹文書置三十六將皆㑹議國事其王無有常人皆簡立賢者國中災異及風雨不時輒廢而更立受放者甘黜不怨其民人皆長大平正有類中國故謂之大秦土多金銀竒寶有夜光璧明月珠駭雞犀通天犀有一白理如綖者以盛米置於羣雞中雞欲往啄米至輒驚駭故南人名之為駭雞犀珊瑚琥珀琉璃琅玕朱丹青碧刺金縷繡織成金鏤罽雜色綾作黄金塗火浣布又有細布或言水羊毳野蠶繭作之也合㑹諸香煎其汁以為蘇合丸外國諸珍異皆出焉以金銀為錢銀錢十當金錢一與安息天竺交市於海中利有十倍其人質直市無二價穀食常賤國用富饒隣國使到其界首者乘驛詣王都至則給以金錢終無盜賊寇警而道多猛虎獅子遮害行旅不百餘人齎兵器輒為其所食又言有飛橋數百里可渡海北諸國所生竒異玉石諸物譎怪多不經故不記一說大秦國出細絺織成細布言用水羊毳名曰海西布此國六畜皆出水或云非獨用羊毛也亦用木皮或野蠒絲織成氍毹音瞿俞毾㲪音搨登罽帳之屬皆好其色又鮮於海東諸國所作也又嘗利得中國絲解之以為胡綾紋數與安息諸國交市於海中海水苦不可食故往來者希到其國中山出九色次玉石一曰青二曰赤三曰黄四曰白五曰黑六曰緑七曰紫八曰紅九曰紺今伊吾山中有九色石即其類漢順帝陽嘉三年時䟽勒王臣槃獻海西青石金帶各一又今西域舊國云罽賓條支諸國出琦石即次玉石也大秦多金銀銅鐵鉛錫神龜白馬朱髦駭雞犀瑇瑁𤣥熊赤螭辟毒䑕大貝車渠瑪瑙南金翠爵羽翮象牙符采玉明月珠夜光珠眞白珠琥珀珊瑚赤白黑緑黄青紺縹紅紫十種琉璃球琳琅玕玫瑰水精雄黄雌黄碧五色玉黄白黑緑青紫紅綘紺黄金縹琉黄十種氍毹五色毾㲪五色九色首下毾㲪金縷繡雜色綾金塗布緋持布發陸布緋持渠布火浣布阿羅得布巴則布度代布温宿布五色桃布綘地金織帳五色斗帳一微木二蘇合狄提迷迷兠納白附子薫陸鬱金芸膠薫草木十二種香册府元龜卷九百六十
