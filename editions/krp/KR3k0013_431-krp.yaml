body:
  text: 册府元龜卷四百三十一宋王欽若等撰將帥部器度讓功不伐勤戎事器度夫分閫之權注意斯在必局量之淵曠乃士衆之協從夫器博則周通度遠則閒暇通而能暇是謂能軍以此貞師何用不克夫注鉤者憚常人之大情處險如夷君子之高致是故甘寢秉羽武德茂昭投壺雅歌軍聲益振非寛肅眀達之士其疇能與於此哉後漢吴漢為大司馬每從征伐諸將見戰陳不利或多惶懼失其常度漢意氣自若方整厲器械激揚吏士班超為將兵長史征西域時衞侯李邑護送烏孫使者始到于闐上書盛毁超擁愛妻抱愛子安樂外國超遂去妻章帝知超忠乃令邑詣超受節度詔超若邑任在外者便留與從事超即遣邑将烏孫侍子還京師軍司馬徐幹謂超曰邑前親毁君欲敗西域今何不縁詔書留之更遣他吏送侍子乎超曰是何言之陋也以邑毁超故今遣之内省不疚何恤人言快意留之非忠臣也吕布為左将軍部將郝萌反攻布下邳府㕔事閤外閤堅不得入布因與高順出討之萌敗走還故營萌將曹性反萌與對戰萌刺傷性性斫萌一臂順斫萌首牀輿性送詣布布問性言萌受袁術謀謀者悉誰性言陳宫同謀時宫在坐上面赤旁人悉覺之布以宫大将不問也性言萌常以此問性言吕将軍大将有神不可擊也不意萌狂惑不止布謂性曰卿健兒也善養視之創愈使安撫萌故營領其衆孔融為青州刺史建安元年為袁譚所攻自春至夏戰士所餘裁數百人流矢雨集戈矛内接融隱几讀書談笑自若魏賈逵為建威将軍初與曹休不善太和二年伐吳休先戰敗逵兼道進軍多設旗皷為疑兵賊遂退逵據夾石以兵糧給休休軍乃振休猶挾前意欲以後期罪逵逵終無言時人益以此多逵蜀黄權降魏為鎮南將軍文帝察權有局量欲試驚之遣左右詔權未至之間累催相屬馬使奔馳交錯於道官屬侍從莫不辟魄而權舉止顔色自若馬忠為庲降都督加安南將軍忠為人寛濟有度量但詼啁大笑忿怒不形於色吴周瑜為偏将軍性度恢廓大率為得人程普頗以年長數凌侮瑜瑜折節容下終不與校普後自敬服而親重之謂人曰與周公瑾交若飲醇醪不覺自醉時人以其謙讓服人如此瑜字公瑾晉陶侃為荆州刺史蘇峻之亂詔假中書令庾亮節都督征討諸軍事亮戰敗携其三弟懌條翼南奔温嶠乃與嶠推侃為盟主侃至尋陽既有憾於亮議者咸謂侃欲誅執政以謝天下亮甚懼及見侃引咎自責風止可觀侃不覺釋然乃謂亮曰君侯修石頭以擬老子今日反見求邪便談宴終日兵既至石頭亮遣督䕶王彰擊峻黨張曜反為所敗亮送節傳以謝侃侃答曰古人三敗君侯始二當今事急不宜數耳又曰朝政多門用生國禍䘮敗之來豈獨繇峻也王忱為荆州刺史時桓𤣥在江陵𤣥常詣忱通人未出乘輿直進忱對𤣥鞭門幹𤣥怒去之忱亦不留嘗朔日見客仗衞甚盛𤣥言欲獵借數百人忱悉給之𤣥憚而服焉宋劉道規晉末為荆州刺史盧循寇逼京邑道規遣司馬王鎮之及揚武将軍檀道濟廣武将軍到彥之等赴援朝廷至尋陽為賊黨荀林所破循即以林為南蠻校尉分兵配之使乘勢伐江陵揚聲云徐道覆已克建鄴而桓謙自長安入蜀譙縱以謙為荆州刺史厚加資給與其大将譙道福俱寇江陵正與林會林屯江津謙軍枝江二寇交逼分絶都邑之間荆楚既桓氏義舊並懷異心道規乃會諸軍告之曰桓謙今在近畿聞諸君頗有去就之計吾東來文武足以濟事若欲去者本不相禁因夜開城門達曉不閉衆咸憚服莫有去者初謙至枝江江陵士庶皆與謙書言城内虚實咸欲謀為内應至是參軍曹仲宗檢得之道規悉焚不視衆於是大安劉勔為將善撫将士以寛厚為衆所依将軍王廣之求勔所自乘馬諸将竝忿廣之貪冒勸勔以法裁之勔懽笑即時解馬與廣之宗慤為豫州刺史監五州諸軍事先是鄉人庾業家盛富豪方丈之膳以待賔客而慤至設以菜葅粟飰謂客曰宗軍人慣噉麤食慤致飽而去至是業為慤長史帶梁郡慤待之甚厚不以前事為嫌唐裴行儉高宗朝累為将有功嘗令醫合藥請犀角麝香送者誤遺失已而惶懼潛竄又有勅賜馬及新鞍令史馳驟馬到鞍破令史亦逃行儉竝委所親招到謂曰爾曹豈相輕邪皆錯誤耳初平都支遮匐大獲瓌寳蕃酋将士咸願觀之行儉因宴徧出歴視有碼碯盤廣二尺餘文彩殊絶軍吏王休烈捧盤厯階趨進躡衣跌足便倒盤亦隨碎休烈驚惶叩頭流血行儉徐謂之曰爾非故也何至於是更不形顔色黑齒常之為左威衞大将軍常有所乘馬為兵士所損副使牛師奨等請鞭之常之曰豈可以損私馬而決官兵乎竟赦之高仙芝為四鎮北庭兵馬使天寳六年仙芝虜勃律王及公主自奏捷書仙芝軍還節度使夫蒙靈詧都不使人逆勞罵仙芝曰安得不待我處分懸奏㨗書據此罪當斬但縁新立大功不欲處置中使邉令誠具奏其狀制授仙芝代靈詧為節度使徵靈詧入朝靈詧大懼仙芝每日見之趨走如故靈詧入朝益不自安将軍程十里為副都䕶大将軍畢思琛為靈詧押衙并行官王滔康懷順陳奉忠等嘗搆譛仙芝於靈詧仙芝既領事謂千里曰公面似男子心似婦人何也乂謂思琛曰此胡敢來我城東一千石種子庄被汝将去汝憶之乎琛對曰此是中丞見乞仙芝曰吾此時懼汝作威福豈是憐汝而與之我欲不言恐汝懐憂言了無事矣又呼王滔等至捽下将笞良久皆釋之繇是軍情不懼郭子儀為河中節度使麾下若李懷光軰數十人皆王侯重貴子儀頥指進退如僕𨽻幕府之盛近代無比始與李光弼齊名雖威略不逮而寛厚得人過之董晉貞元中為東都留守會汴州節度使李萬榮疾甚其子廼為亂以晉為宣武軍節度營田汴宋觀察使晉既受命惟將幕官傔從等十數人都不召集兵馬既至鄭州宣武軍迎候將吏無至者晉將校左右及鄭州官吏皆懼共勸晉云鄧惟恭承萬榮病疾之甚遂總領軍州事今相公到此尚不使人迎候其情状豈可料耶恐須且遲廻以候事勢晋曰某奉命為汴州節度使即合准勅赴官何可妄為逗留人皆憂其不測晉猶恬然未至汴州十數里鄧惟恭方來迎候晉俾其不下馬既入仍委惟恭以軍政衆服晉眀於事體機變而未測其深淺初萬榮既逐劉士寧代為節度使委兵於惟恭以其同鄉里及疾甚李廼將為亂惟恭乃與監軍同謀縛廼送歸朝廷惟恭自以當便代居其位故不遣候吏以疑懼晉心兾其不敢進不虞晉之速至晋已近方遽出迎之賈躭為義成軍節度使時淄青李納雖去偽王號外奉朝㫖而心常蓄并吞之計納兵士數千人自行營歸路出滑州大将請城外館之躭曰與人隣道奈何野處其士卒乎因使盡納之淄青将士皆心服焉躭好獵善射每出獵從騎不過百人往往獵于納之界中納聞之大喜故懐其德而不敢有異心後唐錢鏐帥吳越學書好吟咏賔佐羅隱好譏諷嘗戲為詩言鏐微賤時騎牛操梃之事鏐亦怡然不怒其通恕如此張全義初仕梁為西京留守天下兵馬副元帥河南尹判六軍諸衞守太尉中書令魏王治於府廨名位之重冠絶中外時崔沂自禮部尚書帶本官充西京副留守沂至客将白以副使當有庭禮沂曰張公官位至重然嘗帶府尹之名不知副留守見尹之儀何如全義知之遽引見沂勞曰彼此有禮俱老矣勿更勞煩李從曮為鳳翔節度管内觀察處置等使蜀平繼岌命部署王衍一行東下至岐監軍使柴重厚不與符節促令赴闕從曮至華下聞内難歸領明宗詔誅重厚從曮以軍民不攪重厚之力也不以前事為隙上表論救事雖不允時議嘉之晉史翰為節度使幕客有闗徹者狂率酣醟一日使酒怒目謂翰曰眀公昔刺覃懐與徹主客道至事無不可今領節鉞數不相容且書記趙礪險詖之人也脅肩謟笑黷貨無厭而公待之甚厚徹今請死近聞張彥澤臠張式未聞史翰斬關徹恐天下談者未能比類翰不怒引滿自罰而慰勉之寛厚如此讓功書曰汝惟不伐天下莫與汝爭功則知居将帥之任專斧鉞之權必在推功讓賢先人後已以恊注意之重允符率下之宜後入見於范文晉國以覇坐樹美於馮異漢室攸興故可垂美於竹帛保全於茅土者也郤克為晉大夫将中軍士燮将上軍欒書将下軍及齊師戰于鞍齊師敗績晋師歸郤伯見公曰子之力也夫對曰君之訓也二三子之力也臣何力之有焉郤伯郤克范叔見勞之如郤伯對曰庚所命也克之制也爕何力之有焉荀庚将上軍時不出范文子上軍佐代行故稱帥以讓欒伯見公亦如之對曰爕之詔也士用命也書何力之有焉詔告也欒書下軍帥故推功上軍𫝊言晉将帥克讓所以能勝齊公叔痤為魏将與韓趙戰澮北擒樂祚魏王説郊迎以賞田百萬禄之公叔痤反走再拜辭曰夫使士卒不崩直而不倚橈棟而不辟者此吴起餘教也臣不能為也前脉地形之險阻決利害之備使三軍之士不迷惑者巴寧㸑襄之力也縣賞罰於前使民昭然信之於從者王之明法也見敵之可也皷之不敢怠倦者臣也王特為臣之右手不倦賞臣可也若以臣之有力臣何力之有乎王曰善於是索吳起之後賜之田二十萬王曰公叔豈非長者哉既為寡人勝強敵矣又不遺賢者之後不揜能士之迹公叔何可無益乎故又與田四十萬加之百萬之上使百四十萬漢衞青元朔五年将三萬騎出高闕得右賢裨王十餘人裨王小王也若言裨将也衆男女萬五千餘人畜數十百萬於是引兵而還至塞武帝使使者持大将軍印即軍中拜青為大将軍益封青八千七百戸而封青子伉為宜春侯子不疑為隂安侯子登為發干侯青固謝曰固謂再三也臣幸得待罪行間賴陛下神靈軍大捷皆諸将校力戰之功也陛下幸已益封臣青子在繈緥中未有勤勞上幸裂地封為三侯非臣待罪行間所以勸士力戰之意也伉等三人何敢受封帝曰我非忘諸校功也今固且圖之乃召御史封諸侯尉後漢馮緄為車騎將軍討平荆州蠻賊振旅還京師推功於從事中郎應奉薦以為司隷校尉而上書乞骸骨朝廷不許皇甫嵩為左中郎將與右中郎將朱儁討潁川汝南陳國諸賊悉破平之嵩乃上言其状而以功歸儁於是進封西鄉侯魏任城威王彰漢末為北中郎将行驍騎将軍討烏丸九戰而勝北方悉平及軍還時太祖在長安召彰詣行在所彰自代過鄴太子謂彰曰卿新有功今西見上宜勿自伐應對常若不足者彰到如太子言歸功諸将太祖喜執鬚曰黄鬚兒竟大竒也彰鬚黄故以呼之王基督豫州討諸葛誕平之朝廷以淮南初定轉基為征東將軍都督揚州諸軍事進封東武侯基上疏固讓歸功參佐繇是長史司馬等七人皆侯顧衆為義興太守蘇峻反王師敗績衆還吴潛圖義舉吴國内史蔡謨乃檄衆為本國督䕶揚威将軍峻平論功衆以承檄奮義推功於謨謨以衆倡謀非已之力俱表相讓論者美之宋臨川王道規晉末為荆州刺史與劉毅何無忌破桓𤣥桓謙桓振平江陵道規推毅為元功無忌為次功自居其末沈璞為旴𣅿太守後魏攻之不拔乃退走時将軍臧質與璞共守質以璞城主令其露板璞性謙虚歸功於質令質露板後徵還為淮南太守賞賜豐厚日夕讌見朝士有言璞功者帝曰臧質姻戚又年位在前旴𣅿元功當次之璞每以謙自牧惟恐賞之居前此士燮之意也黄回為冠軍南瑯琊濟陽二郡太守建平王景素反回率軍前討假節城平之日回軍先入又以景素讓張倪奴回增邑五百户進號征虜将軍陳章昭達性嚴刻每奉命出征必晝夜倍道然有所尅㨗必推功将帥後周楊檦仕西魏為車騎将軍時𢎞農為東魏守檦從太祖攻㧞之然自河以北猶附東魏檦父猛先為邵郡白水令檦與其豪右相知請㣲行詣邵郡舉兵以應朝廷太祖許之檦遂行與土豪王覆憐等隂謀舉事宻相應㑹者三千餘人内外俱發遂拔邵郡擒郡守程保及縣令四人竝斬之衆議推檦行郡事檦以因覆憐成事遂表覆憐為邵郡守以功授大行臺左丞隋高熲為左領軍大将軍伐陳為元帥長史陳平以功授上柱國高祖嘗從容命熲與賀若弼言及平陳事熲曰賀若弼先獻十策後於蔣山苦戰破賊臣文吏耳焉敢與猛将論功帝大笑時論嘉其有讓唐李勣厯武候監門大將軍并州都督每行軍用師頗任籌筭事㨗之日多推功於下以是人皆為用所向多尅捷馬燧為河陽三城使大厯十一年汴州李靈曜反詔燧與淮西節度使李忠臣合軍討之燧累擊破之是時河陽兵冠諸軍魏博田承嗣遣田悦将兵救靈曜忠臣與戰不利請救於燧燧引竒兵擊破之田悅疋馬遁去靈曜知悦敗以百騎夜走汴州悉降燧讓功於忠臣忠臣素暴戾燧不欲入汴城乃引退舍於板橋李元諒為鎮國軍節度興元初詔元諒與副元帥李晟進収京邑兵次于滻西賊悉衆來攻元諒先士卒奮擊大破敗之進軍至菀東與晟力戰隳菀垣而入賊聯戰皆敗遂復京師元諒讓功於晟出屯於章敬佛寺不伐汝惟不矜大禹之謨訓願無伐善顔子之庶幾矧夫居爪牙之任奉斧鉞之權安危攸係社稷是賴不伐之德善莫大焉觀其戰勝而相讓功就而弗居或歸美於朝廷或推賞於僚佐謙恭為裕滿假是懲故能福禄無疆功名有煒與夫斗筲為量覆敗相仍者不侔矣晉郤克范爕欒書伐齊敗齊師于鞍師還郤伯見公曰子之力也夫對曰君之訓也二三子之力也臣何力之有焉范叔見勞之如郤伯對曰庚所命也克之制也爕何力之有焉荀庚将上軍時不出范文子上軍佐代行故稱帥以讓欒伯見公亦如之對曰爕之詔也士用命也書何力之有焉晉師之歸也范文子後入武子曰無為吾望爾也乎武子士㑹文子之父對曰師有功國人喜以迎之先入必屬耳目焉是代帥受名也故不敢武子曰吾知免矣知其不益已禍孟子側字反魯孟氏族也齊伐魯孟孺子洩帥右師冉求帥左師及戰齊師于郊齊師自稷曲稷曲郊地名師不踰溝樊遲曰非不能也不信子也請三刻而踰之與衆三刻約信如之衆從之師入齊師冉求之師右師奔齊人從之逐右師陳瓘陳荘涉泗二陳齊大夫之側後入以為殿抽矢策其馬曰馬不進也不欲伐善後漢賈復為偏将軍諸將每論功自伐復未嘗有言光武曰賈君之功我自知也馮異為偏将軍後光武破王郎封應侯異為人謙退不伐行與諸将相逢輒引車避道進止皆有表識軍中號為整齊每所止舍諸將竝坐論功異常獨屏樹下軍中號曰大樹将軍朱祐為建義大将軍為人質直尚儒學将兵率衆多受降以克定城邑為本不存首級之功魏李典字曼成為捕虜将軍好學問貴儒雅不與諸将爭功晉唐彬為弋陽太守監巴東諸軍事加廣武将軍上征吴之策甚合武帝意後與王濬共伐吴彬屯據衝要為衆軍前驅每設疑兵應機制勝陷西陵樂鄉多所擒獲自巴陵沔口以東諸賊所聚莫不震慴倒戈肉袒彬知賊寇已殄孫皓将降未至建鄴二百里稱疾遲留以示不競果有先到者争物後到者爭功于時有識莫不高彬此舉成都王頴為鎮北大将軍齊王冏舉義討趙王倫頴發兵應冏及誅倫迎天子反正頴拜謝曰此大司馬臣冏之勲臣無預焉見訖即辭出不復還營便謁太廟出自東陽城門遂歸鄴周訪為安南将軍梁州刺史訪威風既著逺近悦服智勇過人為中興名将性謙虚未嘗論功伐或問訪曰人有小善鮮不自稱卿功勲如此初無一言何也訪曰朝廷威靈将士用命訪何功之有士以此重之桓伊為都督豫州将軍事西中郎将與謝𤣥謝琰破苻堅進號右軍将軍伊性謙素雖有大功而始終不替宋王鎮惡行龍驤将軍西伐姚泓入賊境戰無不㨗率水軍自河入渭直至渭橋棄船登岸身先士卒即陷長安城於㶚上奉迎帝勞之曰成吾霸業者卿也謝曰此眀公之威諸将之力帝笑曰卿欲學馮異耶蕭惠基厯中書黄門郎奉使至蜀降益州兵賊邵虎等時千餘部曲竝欲論功惠基毁除勲簿竟無所用或問其意惠基曰我若論其勞則駈馳無已豈吾素懐之本耶南齊劉懐珍平原人宋文帝時本州辟主簿元嘉二十八年亡命司馬順則聚黨東揚州遣懷珍将數千人掩討平之文帝召問破賊事状懷珍讓功不肯當親人恠問焉懐珍曰昔國于尼恥陳河間之級吾豈能論邦域之㨗哉時人稱之梁馬仙琕為寧朔将軍每戰勇冠三軍與諸将論議口未嘗言功人問其故仙琕曰丈夫為時所知當進不求名退不逃罪乃平生愿也何功可論馮道根性謹厚木訥少言累遷左右上将軍能檢御部曲所過村陌将士不敢虜掠每征伐終不言功其部曲或怨非之道根喻曰眀王自鑒功之多少吾將何事武帝嘗指道根示尚書令沈約美其口不論勲約曰此陛下之大樹将軍也後魏邢巒為度支尚書宣武時豫州民白皁生殺刺史司馬悦以城南叛詔巒與中山王英討之既平豫州巒振旅還京師帝臨東堂勞之曰卿役不踰時尅清妖醜鴻勲碩美可謂無愧古人巒對曰此是陛下聖略威靈英等将士之力臣何功之有帝笑曰卿非直一月三㨗所足稱竒乃存士伯欲讓功而不處後周蔡祐字承先為大将軍從太祖征伐常終無所競太祖每歎之嘗謂諸将曰承先口不言勲孤當代其論叙其見知如此元定仕後魏為河北大都督有勇略每戰必陷陣然未嘗自言其功太祖深重之諸将亦稱其長者唐韋待價為盧龍府果毅将軍時辛文陵率兵招慰高麗行到吐䕶真水高麗掩其不備襲擊敗之待價與中郎将薛仁貴受詔經略東蕃因率所部救之文陵苦戰賊漸退軍始獲全待價被重創流矢中其左足竟不言其功渾瑊德宗貞元中為河中節度使兼中書令忠勤謹慎每将士獻一物必躬親省視每受恩賜如在帝前位窮将相無矜大之色方於漢之金日磾是以深為帝所信重尚可孤為商州節度使與李晟及駱元光三節度之軍収京城可孤之軍為先鋒京師平以功陞可孤檢校右僕射封馮翊郡王增邑通前八百户可孤性謹愿沉毅既有勲勣衆會之中未嘗言功勤戎事夫為将者勤勞王家所以厲臣節整飭器械所以修戎政故不戒而備受命則行斯蓋磨礪以須夙夜匪懈者之所為也况專閫外之寄将略攸施必将身先以率下士至而應變奪人之勢無失於預防後時之譏不貽於深咎故勉勉以率職翼翼以從事俾夫寇讐畏憚卒乘申警雖行之惟艱故鮮有敗事傳曰以勞定國詩曰不懈于位蓋恭命之将嘗從事於斯矣漢程不識為未央衞尉與李廣俱以邉太守将屯及出擊胡不識吏治軍簿至眀軍不得自便雖煩擾虜亦不得犯後漢吴漢為大司馬性彊力每從光武征伐帝未安漢恒側足而立諸将見戰陳不利或多惶懼失其常度漢意氣自若方整厲器械激揚士吏帝時遣人觀大司馬何為還言方修戰攻之具乃歎曰吴公差彊人意隱若一敵國矣叚紀眀為破羗将軍征羗在邉十餘年未嘗一日蓐寝與将士同苦故皆樂為死戰魏鄧艾為征西将軍艾修治守備積穀彊兵值歲㓙旱又為區種身被烏衣手執耒耜以率将士上下相感莫不盡力艾持節守邉所統萬數而身不離僕虜之勞親執士卒之役蜀諸葛亮為丞相益州牧與司馬宣王對於渭南亮使至宣王問其寝食及其事之煩簡不問戎事使對曰諸葛公夙興夜寐罰二十以上皆親覽焉吴孫韶字公禮為廣陵太守遷鎮北将軍在邉數十年自大帝西征還都武昌韶不進見者十餘年帝還建業乃得朝覲帝問青徐諸屯要害近遠人馬衆寡魏将帥姓名盡具識之所問咸對帝悦曰吾乆不見公禮不圖進益乃爾加領幽州牧假節晉陶侃為寧逺将軍南蠻校尉荆州刺史侃在州無事輒朝運百甓於齋外暮運於齋内人問其故答曰吾方致力中原過爾優逸恐不堪事其勵志勤力皆此類也侃性聰敏勤於吏職恭而近禮愛好人倫終日歛膝危坐閫外多事千緒萬端罔有遺漏逺近書疏莫不手答筆翰如流未嘗壅滯引接疎逺門無停客嘗語人曰大禹聖者乃惜寸隂至於衆人當惜分隂豈可逸逰荒醉生無益於時死無聞於後是自棄也庾翼為都督江荆司雍梁益六州諸軍事安西将軍荆州刺史代兄亮鎮武昌翼以年少超居大位遐邇屬目慮其不稱每竭志能勞謙匪懈戎政嚴眀經略深逺數年之中軍國充實人情翕然稱其才自河以南皆懷歸附宋宗越為南濟隂太守善立營陣每數萬人止頓越自騎馬前行使軍人隨其後馬止營成未嘗參差梁張齊為信武将軍巴西梓潼二郡太守齊在益部累年討擊蠻獠身無寧歲其居軍中能親勞辱與士卒同其勤苦自畫頓舍城壘皆委曲得其便調給衣粮資用人人無所困乏韋叡為輔國将軍每晝接客旅夜算軍書三更起張燈達曙撫循其衆常如不及陳蔡徵為安右将軍隋軍濟江後主以徵有幹用令權知中領軍徵日夜勤苦備盡心力後主喜焉謂曰事寧有以相報程文季為安遠将軍隨都督吴眀徹北討秦郡眀徹遣文季圍涇州屠其城進攻旴𣅿㧞之前後文季克城壘率背水為堰土木之功動踰數萬每置陣役人文季必先諸将夜即早起迄暮不休軍中莫不服其勤幹北齊莫多婁敬顯為領軍将軍強直勤幹少以武力見知恒從斛律光征討數有戰功光每命敬顯前驅安置營壘夜中巡察或達旦不眠臨敵置陣亦令敬顯部分将士造次之間行伍整肅深為光所重封子繪為衞将軍平陽太守時大軍討復東雍平紫壁及喬山谷鋒蜀等子繪常以太守前驅慰勞徵兵運粮軍士無乏後周韓杲為虞候都督每從太祖征行常領候騎晝夜巡察略不眠寝隋郭榮為左光禄大夫從軍攻遼東城榮親蒙矢石晝夜不釋甲胄百餘日煬帝每令人窺諸将所為知榮如是帝大悦每勞勉之唐蘭謨為武候大将軍為人嚴毅勤恪監領之處乃至忘於寢食士卒多厭弊之每侍從太宗常不離左右竇軌為益州道行臺左僕射每臨戎對寇或經旬月身不解甲張儉拜榮州都督太宗将有事遼東儉率藩兵先行儉軍至遼西為水汎長未渡帝以為畏懦追赴行在所儉詣雒陽面陳利害因説水草好惡山川險易帝甚悦王忠嗣為河東節度採訪使每軍出給士卒軍器必題其姓名於上遺失驗其名以罪之人皆自勸李晟為闗内副元帥臨下眀察每理軍必曰某有某勞某能某事雖厮養小善必記姓名張建封為徐泗濠等州節度既創置軍伍建封觸類躬親王鍔為太原節度使時方討鎮州鍔緝綏訓練軍府稱理後唐李存賢為幽州節度使時契丹強盛城門之外鞠為胡貊援軍自瓦橋闗萬衆防衞與胡騎一日數戰存賢曉夕警備廢寝與食鄭琮事武皇為五院軍小校屢有軍功荘宗在河上為馬歩都虞候戎伍之事一覩不忘每所詰問應答如流故所在知名郭崇韜為樞宻使荘宗與汴軍戰於楊劉勢甚危廹崇韜率師至博州斬伐林樹徹廬舍渡河明約束庀役徒設版築晝夜不息崇韜據胡床指揮於葭蘆間忽覺袴中冷視之乃蛇也其忘疲勵力也如是漢史𢎞肇為許州節度使時高祖委以禁戎留扈京邑屬杜重威據鄴為亂車駕親狩命𢎞肇從行自九月駐師及重威歸命凡三月𢎞肇擐甲在野晝巡宵警與士卒均其甘苦無所間然時人推其威而有愛乃近代之良将也劉詞為沁州團練使在郡臨事之暇必披甲枕戈而卧人恠而問之詞曰我以勇登爵不可一日而忘本也若國家遇邉事信其温飽則筋力有怠何以申毫髪之報此其意也後從少帝禦北虜於河橋每出師則躡屩負戈以為前導所向無不披靡六師壮之冊府元龜卷四百三十一
