body:
  text: 册府元龜卷四百九十七宋王欽若等撰邦計部河渠後魏太武太平真君五年征南將軍為薄骨律鎮將刁雍表曰臣蒙寵出鎮奉辭西藩總統諸軍戸口殷廣又總勒戎馬以防不虞督課諸屯以為儲積夙夜惟憂不遑寧處以今年四月末到鎮時以夏中不及東作念彼農夫雖復布野官渠乏水不得廣殖乘前以來功不充課兵人口累率皆饑儉畧加檢行知此土稼穡艱難夫育民豐國事須大田此土之雨正以引河為用觀舊渠堰乃是上古所制非近代也富平西南三十里有艾山南北二十六里東西四十五里鑿以通渠似禹舊迹其兩岸作溉田大渠廣十餘步山南引水入此渠中計昔為之髙於水不過一丈河水激急沙土漂流今日此渠髙於前河水二丈三尺又河水侵射往往隳頽渠溉髙懸水不可得雖復諸處案舊引水水亦難求今艾山北河中有洲渚分為二西河小狹水廣百四十步臣今求入來年正月於河西髙渠之北八里分河支下五里平地鑿廣十五步深五尺築其兩岸令髙一丈北行四十里還入古髙渠即循而北復八十里合百二十里大有良田計用四千人四十日渠得成訖所欲鑿新渠口河下五尺水不得入今求從小河東南岸邪斷到西北岸計長二百七十步廣十步髙二丈絶斷小河二十日功計得成畢合計用功六十日山之水盡入新渠水則充足溉官私田四萬餘頃一旬之間則一遍水凢四溉榖得成實官課嘗充民亦豐贍詔曰卿憂國愛民知欲更引河水勸課大田宜便興立以尅就為功何必限其日數也有可以便國利民者動静以聞王欽若等曰史不書月孝文太和十五年五月丁酉詔六鎮雲中河西及闗内六郡各脩水田通渠溉灌楊椿宣武時為都官尚書監脩白渠隄堰崔楷正始中為左中郎將時冀定數州頻遭水害楷上疏曰臣聞有國有家者莫不以萬姓為心故矜傷軫於造次求瘼結於寢興黎民阻饑唐堯致歎衆庶斯饉帝乙罰己良以為政與農實繋民命水旱緣兹以得濟夷險用此以獲安頃東北數州頻年滛雨長河激浪洪波汨流川陸連濤原隰通望彌漫不已汎濫為災戸無擔石之儲家有藜藿之色華壤膏腴變為舄鹵粟麥禾黍化作萑蒲斯用痛心徘徊澘然佇立也昔洪水為害四載流於夏書九土既平攸同紀自虞誥亮由君之勤恤臣用劬勞日昃忘飡宵分廢寢伏惟皇魏握圖臨宇總契裁極道敷九有徳被八荒槐階棘路實維英哲虎門麟閣實曰賢明天地涵和日月光耀自此定冀水潦無嵗不饑幽瀛川河頻年汎溢豈是陽九厄㑹百六鍾期故以人事而然非為運極昔魏國鹹舄史起哂之兹地荒蕪臣實為耻不揆愚瞽輙敢陳之計水之湊下浸潤無間九河通塞屢有變改不可一凖古法皆循舊隄何者河决瓠子梁楚㡬危宣防既建水還舊迹十數年間戸口豐衍又决屯氏兩川分流東北數郡之地僅得支存及下通靈鳴水田一路往昔膏腴十分病九邑居凋離墳井毁滅良由水大渠狹更不開瀉衆流壅塞曲直之所致也若量其逶迤穿鑿涓澮分立堤堨所在踈通預沃其路令無停蹙隨其高下必得地形土木參切務得便省使地有金隄之堅水有非常之備鈎連相注多置水口從河入海逺邇逕通瀉其嶢潟泄此波澤九月農罷量役計功十月昏正立匠表度縣遣能工摩畫形勢郡發明使籌察可否審地推岸辨其脉流樹板分崖練厥從往别使案簡分剖是非瞰睇川原明審通塞當境脩治不勞役逺終春自罷未須乆功即以髙下營田因於水陸水種秔稲陸藝桑麻必使室有乆儲門豐餘積斯實上葉禦災之方亦為中古井田之利即之近事有可比倫江淮之南地勢洿下雲雨陰霖動彌旬月遥途逺運唯用舟艫南畆菑畬微事耒耜而衆庶未為饉色黔首罕有饑顔豈天徳不均致此偏法故是地勢異圖有兹豐餒臣既郷居水際目覩荒殘每思鄭白屢想王李夙宵不寐言念皇家愚誠丹欵實希効力有心營爝乞暫施行使數州士女無廢耕桑之業聖世洪恩有賑饑荒之士詔曰頃年水旱為患黎民阻饑静言念之昃不遑食覽此事條深恊在慮但計畫功廣非朝夕可合宜付外量聞事遂施行楷用功未就詔還追罷裴延雋孝明時為幽州刺史范陽郡有舊督亢渠徑五十里漁陽燕郡有故房陵諸堰廣袤三十里皆廢毁多時莫能脩復時水旱不調民多饑餒延雋謂疏通舊蹟勢必不可成乃表求營造遂躬自履行相度水形隨力分督未㡬而就溉田百萬餘頃為利十倍百姓至今頼之崔亮為雍州刺史奏於張方橋東堰谷水造水碾磨數十區其利十倍國用便之東魏孝静興和三年十月發夫五萬人築漳堰三十五日罷北齊楊裴魏興和中為廷尉少卿石濟河溢橋壞裴脩治之又移津於白馬河中起石潭兩岸造關城累年乃就斛律羡為幽州道行臺僕射導高梁水北合易京東㑹於潞因以灌田邉儲嵗積轉輸用省公私獲利後周賀蘭祥拜大將軍太祖以涇渭溉灌之處渠堰廢毁乃命祥脩造富平堰開渠引水東注於雒用溉既畢民獲其利武帝保定二年正月初於蒲州開河渠同州開龍首渠以廣溉灌隋高祖開皇二年三月開河渠引杜陽水於三畤原以李詢為都官尚書領太僕元暉督其役溉舄鹵之地數千頃民頼其利四年詔曰京邑所居五方輻輳重關四塞水陸艱難大河之流波瀾東注百川海濵萬里交通雖三門之下或有危慮但發自小平陸運至陜還從河水入渭川無反上流控引汾晉舟車來去為益殊廣而渭川大小水力無常流淺沙深即成阻閡計其途逺數百而已動移氣序不能往復汎舟之役人亦告勞朕君臨區㝢興利除害公私之弊情所愍之故東發潼關西引渭水因藉人力開通漕渠量事計功易可成就己令工匠廵厯渠道觀地理之宜審終乆之義一得開鑿萬代無毁可使官及私家方舟巨舫晨昏運漕㳂沂不停旬日之功堪有億萬誠知時當炎暑動致疲勞然不有暫勞安能永逸宣告人民知朕意焉初帝每憂轉運不給柱國于仲文請决渭水開渠漕帝然之使仲文摠其事又命郭衍為開渠漕大監與宇文愷部率水工鑿渠引渭水經大興城臣欽若等曰即長安城也北東至於潼關漕運四百餘里關内頼之名曰富民渠一云廣通渠五年九月改鮑陂曰桂陂㶚水曰滋水七年四月於揚州開山陽瀆以通漕運十五年六月詔鑿底柱盧賁為懐州刺史决沁水東注名曰利民渠又派入温縣名曰温潤渠以溉舄鹵民頼其利煬帝以仁壽四年七月即位十一月丙申發丁男數十萬掘塹自龍門東接長平汲郡抵臨清關渡河至浚儀襄城逹於上雒以置關防大業元年三月發河南諸郡男女百餘萬開通濟渠自西苑引谷雒水逹於河自板渚引河逹於淮四年正月乙巳詔發河北諸郡男女百餘萬開永濟渠引沁水南逹於河北通涿郡閻毗為起部郎煬帝將興遼東之役自雒口開渠逹涿郡以通漕毗督其役唐高祖武德六年寧民令顔旭開渠引南山水入京城至石門谷有温泉湧出七年同州治中雲得臣開渠自龍門引黄河溉灌六千餘頃八年水部郎中姜行本請於隴州開五節堰引水以通運漕詔許之高宗永徽元年薛大鼎為滄州刺史州界有無棣河隋末填廢大鼎奏開之引魚鹽於海百姓歌之曰新河得通舟楫利直逹滄海魚鹽至昔日徒行今騁駟美哉薛公德滂被大鼎又以州界卑下遂决長蘆及彰衡等三河分泄夏潦境内無復水災楚王靈龜永徽中為魏州刺史開永濟渠入新市控引商旅百姓利之裴行方永徽中為撿校幽州都督引瀘溝水廣開稻田數千頃百姓頼以豐給咸亨三年於岐州陳倉縣東南開渠引渭水入昇原渠通船栰京故城京故城即故長安城漢惠帝所築在今大興城之西北苑中則天大足元年六月於東都立德坊南穿新潭安置諸州租船中宗神龍三年滄州刺史姜師度於薊州之北漲水為溝以備契丹之冦又約舊渠傍海穿漕號為海南運糧𤣥宗開元二年河南尹李傑奏河汴之交有梁公堰年乆堰破江淮運不通傑調發汴鄭丁夫以濬之省功速就公私深以為利刻石水濵以紀其績八年九月詔曰昔史起溉漳之䇿鄭國鑿涇之利自兹厥後聲塵缺然同州刺史姜師度識洞於㣲智研未兆匪躬之節所懷必罄奉公之道知無不為頃職大農首開溝洫嵗功猶昧物議紛如縁其忠欵可嘉委任仍舊暫停九列之重假以六條之察白藏過半續用斯多食乃人天農為政本朕故兹廵省不憚祁寒將申勸䘏之懐時冐風霜之弊今原田彌望畎澮連属繇來榛棘之所遍為秔稻之川倉庾有京坻之饒關輔致畆畬之潤本營此地欲平人民百姓未閑三農虚棄以官令開發冀令逓相教誘功既成矣思與之共其屯田内先有百姓挂籍之地比來召作主亦量准頃畆割還其官屯熟田如同州有貧下欠地之户自辦工力能營種者准數給付餘地且依前官取師度以功特加金紫光禄大夫賜帛三百疋十年六月博州黄河隄壊湍泳永旱洋溢不可禁止詔博州刺史李畬冀州刺史裴子餘趙州刺史柳儒乘傳旁午分理兼命按察使蕭嵩總其事十五年正月令將作大匠范安及簡校鄭州河口㪷門先是雒陽人劉宗器上言請塞汜水舊汴河口於下流滎澤界開梁公堰置㪷門以通淮汴拜佐衞帥府胄漕至是新渠塞行舟不通貶宗器焉安及遂發河南府懐鄭汴滑三萬人疏决兼舊河口旬日而畢十六年正月以魏州刺史宇文融兼撿挍汴州刺史依前充河南北溝渠隄堰渉九河使融上請言禹貢九河舊道興役甚多事竟不就二十七年河南採訪使汴州刺史齊澣以江淮漕運經淮水波濤有沉損遂開廣濟渠下流自泗州虹縣至楚州淮隂縣北十八里合於淮而踰時畢功既而以水浚急行旅艱險旋即停廢却繇舊河二十八年九月魏刺史盧暉開通濟渠自石灰窠引流至州城而西却注魏橋二十九年陜州刺史李齊物避三門河路浚急於其北鑿石渠通運船為漫流河泥旋填淤塞不可漕而止天寳元年命陜郡太守韋堅引灌水開廣運於望春亭之東以通河渭京兆尹韓朝宗又分渭水入自金門置潭於西市西街以貯材木二年三月帝幸望春樓觀新潭㑹羣臣張樂既暮旋宫帝覩舟楫之利甚勤乃詔曰古之善政貴於足食將欲富國必先利人朕於關輔之間尤資殷贍比來輸轉未免艱辛故致此潭以通漕運萬代之利一朝而成將乆懐於永圖豈茍求於縱觀其陜郡太守韋堅始終撿校夙夜勤勞賞於有功則惟常典宜特與三品及三品京官兼太守其判官等即量與改轉仍委韋堅具名録奏應役人夫各酬庸直兼放今年地租且起運初畢舟楫已通其押運綱既渉逺途又能先至各賜一中上考船夫等共賜錢二千貫以充宴樂三載韋堅開漕河自苑西引渭水因古渠至華隂入渭引永豐倉及三門倉米以給京師名曰廣運潭以堅為天下轉運使灞滻二水通㑹於漕渠代宗廣德二年三月以太子賔客劉宴兼御史大夫充東都河南江淮已來轉運使仍與河南副元帥計議開决汴河永㤗二年九月帝御安福門樓觀新開漕渠初京兆尹黎幹以京城木炭價重具以利便陳於帝前請自南山谷口鑿渠通於城内至薦福寺東街北抵景風延喜門入于苑濶八尺深一丈以運木炭至是幹濳貯􅔓船檝師以為水戲冀悦於帝乆之竟無成功大厯十二年京兆尹黎幹奏曰臣得畿内百姓連狀陳涇水為碾磑擁隔不得溉田請决開鄭白支渠復秦漢水道以溉陸田收數倍之利乃詔發使簡覆不許碾磑妨農幹又奏請脩六門堰許之十三年正月壊京畿白渠磑八十餘所以妨奪農業也帝思致理之本務於養人以田農者生民之原苦於不足碾磑者興利之業主於并兼遂發使行其損益之由僉以為正渠無害支渠有損乃命府縣凡支渠磑一切罷之先是大厯初李栖筠為工部侍郎時關中沃野千里舊資鄭白二渠為豪家貴戚壅隔上流置私碾百餘所以收末利農夫所得十奪六七栖筠舉奏其弊悉毁折之人大頼焉公望充積又一云帝以是年有詔毁除白渠水支流碾磑以妨民溉田昇平有脂粉磑兩輪所司未敢毁撤公主見代宗訴之帝謂主曰吾行此詔蓋為蒼生耳爾豈不識我意耶可為衆率先公主即日命毁由是勢門碾磑八十餘所皆毁之德宗建中元年正月浚豐州之陵陽渠時楊炎為相議開陵陽渠發京畿人於西域就役閭里騷擾炎不習邉事請於豐州屯田人頗苦之時京兆尹嚴郢嘗從事朔方曉其利害乃具五城舊屯及兵募倉儲等數奏曰案舊屯沃饒之地今十不耕一若力可墾闢不俟浚渠其諸屯水利可種之田甚廣蓋功力不及因致荒廢今若發兩京關輔人於豐州浚渠營田徒擾兆庶必無其利臣不敢逺引他事請以内園植稲明之上秦地膏腴田稱第一其内園丁皆京兆人於當處營田月一替其易可見然每人月給錢八千糧食在外内園丁猶僦募不占奏令府司集事計一丁嵗當錢九百六十米七斛二斗計所僦丁三百毎嵗合給錢二萬八千八百貫米二千一百六十斛不知嵗終收獲㡬何臣計所得不補所費况二千餘里發人出塞屯田一嵗方替其糧穀從太原轉餉運直至多又每人須給錢六百三十米七斛二斗私出資費數又倍之據所收必不登本而關輔之人不免流散是虚畿甸而無益軍儲天寳已前屯田事殊臣至愚不敢不熟計惟當審察疏奏不報郢又上書奏曰伏以五城舊屯其數至廣臣前已掲名聞奏訖其五城軍士若以今日所運開渠之糧貸諸城官田至冬輸之又以所送開渠功直布帛先給田者至冬令據時估輸榖如此即關輔免於徵發五城豐厚力農闢田比之浚渠十倍之利也時炎方用事郢議不省卒開陵陽渠而竟棄之貞元七年八月夏州開延化渠引烏水入庫狄澤溉田二百餘頃十三年引龍首渠水自通化門入至太清宫前于頔貞元中為湖州刺史因行縣至長城方山下有水曰西湖南朝疏鑿溉田三千頃嵗乆堙廢頔命設隄塘以復之嵗獲秔稲蒲魚之利人頼以濟李景畧貞元中為豐州刺史西受降城使鑿感應永清二渠溉田數百頃公私利焉憲宗元和三年正月鹽鐡使李巽奏江淮堰埭頃年李錡在浙西奏屬本道今請却歸本司從之六月巽又上言江淮公私堰埭因循權置者二十二所並罷之六年五月京兆尹奏准勑差右神策子弟穿淘洨渠功并造斗門及買渠地價請官中與磑户分出八年三月常州刺史孟簡開漕古孟瀆長四十一里得沃壤四千餘頃五月以神策軍士脩城南之洨渠十二月魏博觀察使田𢎞正奏准詔開衛州黎陽縣古黄河道從鄭滑觀察使薛平之請也先是滑州嵗多水災其城西去黄河二里毎夏雨漲溢則浸壊城郭水及羊馬之半平詢諸將吏得古河道於衛州黎陽縣界遣從事裴𢎞㤗以水患告於𢎞正請開古河用分水力𢎞正遂與平皆上聞詔許之乃於鄭滑兩郡徵役萬人鑿古河南北長十四里東西濶六十歩深一丈七尺引舊河以注新河滑人遂無水患詔褒美平仍加𢎞㤗𢎞正官以奬監作之功焉是月鹽鐡使王播進供陳許琵琶溝年三運圖先是中官李重秀奉命視之還言可以通漕至堰城下北頴口水運千里而近及帝覽圖詔韓𢎞發卒以通汴河於是船勝三百石者皆得入頴十四年五月御史臺奏據山南東南東道觀察使孟簡狀奏稱得復州刺史許志雍狀請於復郢二州界内脩築鄭敬古隄兼塞斷鸕鷀港壅截界水開地有利於當道又據荆南觀察使裴武奏稱山南東道築堤及塞鸕鷀港有害於當道勑江漢分流各有港路兩界但合論此不合勞人築堤今水潦為虞則慮先及低下其鸕鷀港宜令孟簡即與决開其師子港塞來年月深乆更委兩道計㑹詳盡本末事理李聽元和中為靈武節度使境内有光祿渠廢塞嵗乆將議屯田詔聽復開舊渠溉田千餘頃至今頼之穆宗長慶二年八月鹽鐡轉運使王播進新開頴口圖一軸温造長慶中自起居舎人出為朗州刺史至則開復鄉渠九十七里溉田二千頃郡人名渠曰右使渠敬宗寳厯元年十二月河陽節度使崔𢎞禮上言於秦渠下闢荒田二百頃嵗收粟二萬斛從寳厯二年减去度支所給數二年正月鹽鐡轉運使上言揚州城内管河通江淮漕運或時遇旱淺即行李艱難舳艫接連擁積成弊動經旬朔不及程期非唯供輸是憂兼亦商旅難濟今請從羅城南閭門古七里港開河渠向東屈曲取禪智寺橋東通舊管河長一十九里其所役工價並於當使方圓羡餘支遣從之七月勑鄠縣漢陂宜令尚食使收管不得令雜入探補其水任百姓溉灌平原等三鄉稲田仍勿奪碾磑之用文宗大和元年六月命中使付京兆府宜令脩高陵界白渠斗門任百姓取水溉田十一月京兆府奏准御史中丞温造等奏脩醴泉富平等十縣渠堰斗門等准貞元初以京兆少尹郭隆充渠堰使於涇陽縣衆善寺置院往來勾當今請差少尹韋文恪充渠堰使便令自揀擇清強官三人專令廵撿脩造從之二年閏三月京兆府奏准内出様造水車訖時鄭白渠既役又命江南徵造水軍匠帝於禁中親指凖乃分賜畿内諸縣令依様制造以廣溉種四年十二月鹽鐡轉運使王涯奏請開揚州南郭外七里港别為河以通漕運及商賈舟船東北至禪智寺橋東四里復與河合約長十九里用功十五餘萬從之五年六月己卯陳許節度使高璠奏脩築許州繞城城水堤及開渠溝周廻一百八十里畢工王起大和中鎮襄陽脩淇堰以灌田一境利之僖宗光啟元年三月詔曰食乃人天農為國本兵荒益乆漕輓不通而關中鄭白兩渠古今同利四萬頃沃饒之業億兆人衣食之源比者權豪競相占奪堰高磑下足明棄水之由稲浸稑澆乃見侵田之害今因流散尚可經營宜委京兆尹選强幹僚屬廵行鄉里逐便相度兼利公私或署職特置使名假之權寵或力田逓升科級許免征徭因務勸公冀能兼蓄亦宜速具聞奏梁太祖開平二年春正月荆州奏聞白小河此河環遶州郭以導大江近年壅塞舟楫不通是時疏之頗為民便運漕商賈之利復如曩嵗後唐莊宗同光二年四月癸酉蔡州朱勍奏開淘雒河到故雒城七月甲辰右監門衛上將軍婁繼英督汴滑兵士脩酸棗縣堤連年河水溺曹濮故也三年正月壬子青州符習承命左役徒修酸棗縣堯堤初偽廷决此堤引河水東注至於鄆濮以限我軍自是民罹水患帝先遣婁繼英領諸軍脩塞尋而復壊乃命習以濟厥功二月雒京奏朱殷脩築月波隄畢功引水入新開河三月己亥西京奏制置三白渠起置營田務一十一壬寅符習奏脩堯堤水口畢七月丁未鄴都副留守張憲奏御河漲溢慮漂溺城池已於石灰窯口開故河道以分水勢四年七月乙卯汴州孔循奏汴河汎漲恐漂沒城河已於城西城東權開壕口引水入古河五年正月租庸使奏鄴都差夫一萬五千於衛州界脩河堤又於宋州創㪷門明宗天成三年正月陳州奏開頴河四年十二月庚申脩雒河北岸宣差左衛上將軍李承約祭之張敬詢為滑州節度使長興初敬詢以河水連年溢堤乃自酸棗縣界至濮州廣隄防一丈五尺東西二百里長興三年三月幽州奏重開府東南河路一百五十里濶九十歩以通漕運五月幽州進呈新開東南河路圖自王馬口至淤口長一百六十五里濶六十五歩深一丈二尺可勝漕船千石四年二月辛酉濮州進重脩堤圖備載㳂河地理名帝指示行臺砦麻石砦德勝南北城鐡邱帝愀然興歎曰吾佐先朝定天下於此堤塢間大小數百戰時事如昨奄忽十年遽閲此圖令人悲歎又指一丘阜曰此吾擐甲之臺也是年四月靈武奏開渠白河引黄河水入大城溉田末帝清㤗元年七月河中言取去秋草七千圍堙塞堤堰晉高祖天福二年九月判詳定院梁文矩奏以前汴州陽武縣主簿左墀進策十七條可行者有四其一請於黄河夾岸防秋水暴漲差上户充堤長一年一替委本縣令十日一廵如怯弱處不早處治旋令修補致臨時渝决有害秋苗既失王租俱為墮事堤長刺史縣令勒停勑曰脩葺河岸深䕶田農每嵗差堤長撿廵深為濟要逐旬遣縣令㸔行稍恐煩勞堤長可差縣令宜止三年二月楊光逺進黄河衝注水勢圖六年九月前鄴都皇城使張延美進表陳利便請開淘相州界天平渠通濟運從之仍委自往計度七年三月己未宋州節度安彦威奏到滑州脩河堤時以瓠子河漲溢詔彦威督諸道軍民自豕韋之北築堰數十里給私財以犒民民無散者竟止其害鄆曹濮頼之以功加邠國公詔於河决之地建碑立廟四月詔曰近年以來大河頻决漂盪人户妨廢農桑言念蒸黎因兹凋弊凢居牧守皆委山河既已在封廵所宜專切起今後宜令㳂河廣晉開封府尹逐處觀察防禦使刺史等並兼河堤使名額任便差選職員分擘勾當有堤堰薄怯水勢衝注處預先計度不得臨時失於防䕶漢隱帝乾祐二年有補闕盧振上言臣伏見汴河兩岸堤堰不牢毎年潰决正當農時勞民功役以臣愚管㳂汴水有故河道陂澤處置立㪷門水漲溢時以分其勢即澇嵗無漂沬之患旱年獲澆溉之饒庶㡬編甿差免勞役三年遣前棣州刺史周景殷河隂淘杼汴口又令鄭州䟽引郭西水入中牟渠以增蔡水漕運李欽明為司勲員外郎是年欽明言臣伏以百姓轉食餽運舟車之利苦樂相懸臣竊見蔡水嘗有漕運多是括借舟船破溺者棄在水邉不許脩葺又不給付以臣愚見乞容陳許蔡三州人戸制造舟船不用括取以備差僱水路可至合流鎮及陳州蔡水未及水匱十數里水小岸狹或時乾淺臣伏請開决汴水取定力禪院西一半并港穿大城向南至㪷門可費三五千工自水匱蔡水路纔五六里水勢便於開决陳蔡漕運必倍嘗年私下往來更豐財貨此之利便實益轉輸周太祖廣順三年正月辛未詔樞宻使王峻廵視河堤峻請行故從之三月澶州言天福十一年黄河自觀城縣界楚里材堤决東北經臨黄觀城兩縣隔絶村鄉人户今觀城在河北隔三村在河南今臨黄在河南隔八村在河北官吏節級徵督賦租取路於州橋迂曲僅數百里每事多違程限其兩縣所隔村鄉擬廻换管係所冀便於徵督修堙補堤岸河流復故兩縣仍舊收管從之五月遣客省副使齊藏珍等三人簡視魚池常樂驛原武河堤六月鄭州夫一千五百人脩原武河堤宿州言遣虎犍廂主何徽率兵往靈河脩堤八月淄州臨河鎮淄水决鄒平長山人四千堙塞是月河隂新堤壊三百歩遣中使於賛往相度脩治九月滑州白重贊言臣自部署堙塞六名鎮河堤世宗顯德元年十一月戊戌命宰臣李穀往鄆齊管内相度脩築河堤二年三月壬午李榖治河堤廻見先是河水自楊劉北至博州界一百二十里連嵗東岸而為派者十有二焉復滙為大澤漫漫數百里又東北壊古堤而出注齊棣淄青至于海澨壊民廬舎占民良田殆不可勝計流民但收野稗捕魚而食朝廷連年命使視之無敢議其工者帝嗟東民之病故命輔相親督其事凡役徒六萬三十日而罷四年四月詔疏汴水一派北入於五丈河又東北逹於濟至是齊魯之舟楫亦逹於京師矣五年三月世宗在淮南㑹濬汴口導其流而逹於淮汴河自唐室之季為淮賊所决自埇橋東南悉滙為汚澤帝於二年冬將議南征即詔徐州節度使武行德發其部内丁夫因其古堤疏而導之東至於泗上是時人皆竊議以為無益惟帝不然之曰二三年之後當知其利矣至是果符聖慮由是江淮舟楫果逹於京師萬世之利其斯之謂乎十二月戊寅以工部郎中何㓜冲為司勲郎中充關西渠堰使仍命於雍耀之間疏涇水以溉稲田六年正月甲子命侍衛都虞侯韓通往河隂按行河堤二月丙子朔命樞宻使王朴往河隂縣按行河堤及脩汴口水門壬午命侍衛都指揮使韓通宣往徽南院使呉延祚發徐宿宋單等州丁夫數萬以濬汴河甲申命馬軍都指揮使韓令坤自京東道汴水入於蔡河又命歩軍都指揮使袁彦濬五丈河分遣使臣發畿内及滑亳等州丁夫數千以供其役册府元龜卷四百九十七
