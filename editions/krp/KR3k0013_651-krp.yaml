  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_651-1a}
body:
  text: 册府元龜卷六百五十一宋王欽若等撰貢舉部清正謬濫清正古者有興賢之書比其德行道藝而獻之於王王再拜而受乃知詳選之道不其重與洎乎奔競斯作登顯多濫乃有疾時態之流宕考才能於端實稽以經術抑其浮華權要之地請托不行當宁賞嘆縉紳稱尚為國選士斯無媿焉故史稱得賢者有賞不肖者有罰良有謂矣唐王師旦為考功員外郎兾州進士張昌齡王公理並有俊才聲振京邑而師旦考其文策全下舉朝不知所以及奏第等太宗恠無昌齡等名因召師旦問之對曰此輩誠有詞華然其體性輕薄文章浮豔必不成令器臣若擢之恐後生相效有變陛下風雅帝以為名言後並如其言韓休為起居舍人奉制考制舉人䇿執心公正取捨平允不為豪右所奪遷給事中韋陟為禮部侍郎好接後輩尤鍳於文雖詞人後生靡不諳練曩者主司取與皆以一塲之善登其科目不盡其才陟先責舊文仍令舉人自通所工詩筆先試一日知其所長然後依常式考覆片善無遺美聲盈路席豫為考功員外郎典舉得士為時所稱潘炎為禮部侍郎衞次公弱冠舉進士炎目為國士擢居上第常衮代宗大厯中為禮部侍郎時宫中劉忠翼權傾内外涇原節度馬璘又累著功勲恩寵莫二各有親戚貢舉及兩館生衮皆執理不與人皆畏之陸贄德宗時為兵部侍郎知貢舉時崔元翰梁肅文藝冠時贄輸心於肅與元翰推薦藝士升第之日雖衆望不愜然一歲選士纔十四五數年之内居臺省清近者十餘人髙郢貞元末為禮部侍郎時應進士舉者多務朋游馳聲名每歲各州府薦送後唯追奉讌集罕理其業郢性專尤疾其風既領職拒絶請托雖同列通熟無敢言者志在經藝專考程試凢三歲掌貢士進幽獨抑聲華浮濫之風翕然一變權德輿貞元十七年為中書舍人以本官知禮部貢舉來年眞拜侍郎凢三歲掌貢士至今號為得人韋貫之為右補闕憲宗元和元年與中書舍人張𢎞靖考制策第其名者十八人其後多以文稱遷為吏部員外郎三年策賢良之士又與戸部侍郎楊於陵左司郎中鄭敬都官郎中李益同為考策官貫之奏居上第者三人是三人言實指切時病不顧忌諱雖同考策者皆難其詞直貫之獨署其奏遂出為果州刺史道黜巴州刺史及為禮部侍郎凢二年所選士人大抵抑浮華先行實由是趨競者稍息許孟容為兵部侍郎權知禮部貢舉頗抑浮華衞次公為中書舍人元和二年權知禮部貢舉斥浮華進貞實不為時力所揺鄭澣遷禮部侍郎選㧞秀士時號得人王起武宗㑹昌中正拜左僕射復知貢舉起前後四典貢部皆選當代詞藝之士有名於時人皆賞其精鍳狥公也崔郾為禮部侍郎東都試舉人凢兩歲掌貢士平心閱試賞㧞藝能所擢者無非名士至大中咸通代為輔相名卿者十數崔瑾為尚書郎知制誥懿宗咸通中知貢舉選㧞頗為得人尋拜禮部侍郎周和凝仕後唐為翰林學士知貢舉貢院舊例放牓之日設棘於門及閉院門以防下第不逞者凝令徹棘啟門是日寂無喧者所放多才名之士時議以為得人明宗益加器重王延後唐清㤗中為中書舍人權知貢舉有崔頎者恊之子也授偃師主簿頎卑屑棄去數年應進士延將入貢院見舊相吏部尚書盧文紀文紀素與恊不睦謂延曰舍人以謹重聞於時所以老夫去冬與諸相首以長者聞奏然此一途取事者頗多面目說者云越人善泅生子方睟乳母浮之水上或駭然止之乳母曰其父善泅子必無溺今若以名下取徴泅之類也舍人當求實才以副公望延退而嗤曰盧公之言為崔頎也縱與其父不恱致意何至此耶來春以頎登甲科其仁而狥公皆此類也張昭初仕晉為左丞少帝開運三年命知貢舉來歲屬契丹犯闕而諸侯受賂請託甚峻昭未嘗揺動但務公平時皆服其鎭靜得鉅儒之體謬濫舉不失徳則曰能焉稱匪其人誠為濫矣况夫論辨多士總覈羣材為治亂之本源實邦國之大計固宜責以名實審其否臧揚于王庭縻以好爵其有知識非遠采擇不明心志既紛藝文莫辨附囘天之勢采畫地之名棄實務華雜良以楛物議非允官謗是興先茅之賞莫承籍槀之愆用及其或制度乖正仕進違方既啟幸端亦附于此後漢順帝陽嘉元年尚書令左雄議改察亷之制限年四十以上儒者試經學文吏試章奏如有顔囘子竒之類不拘年齒於是濟隂太守胡廣等十餘人皆坐謬舉免黜晉惠帝永寧元年正月趙王倫僭位是歲賢良方正直言秀才孝亷良將皆不試計吏及四方使命之在京邑者太學生年十六以上及在學二十年皆署吏部縣二千石令長赤在職者皆封侯郡綱紀並為孝亷縣綱紀為亷吏四月帝既復祚以國有大慶天下秀孝一皆不試時河東猗氏人王接舉秀才接以為恨元年初制揚州歲舉二人諸州一人時以天下䘮亂務存慰勉遠方孝秀不復策試到即除署既經畧粗定乃詔試經有才不中舉者免其太守其後孝秀莫敢應命有送至京師者皆以疾辭南齊太祖東昏侯時因襲宋代限年之制鄉舉里選不覈才德其所進取以官婚胄籍為先遂令甲族以二十登仕後門以三十試吏故有増年矯貎以圖進者其時士人皆厚結姻援奔馳造請寖以成俗唐𤣥宗開元八年考功員外郎李納以舉人不實貶沁州司馬時北軍勲臣葛福順有子舉明經帝聞之故試其子牆面不知所對由是坐貶德宗貞元五年禮部侍郎劉太眞貶信州刺史太眞性怯懦詭隨其掌貢舉宰臣姻族方鎭子弟先收擢之又常叙陳少遊勲績擬之桓文大招物議因有斯貶十一年禮部侍郎呂渭知貢舉結附戸部侍郎判度支裴延齡延齡之子操舉進士文詞非工渭擢之登第為正人嗤鄙渭連知三舉後因入閣遺失請託文記遂出為潭州刺史穆宗元和十五年正月即位是年禮部侍郎李建知貢舉進取信非其人又惑於請託故其年不為得士竟以人情不洽遽改為刑部侍郎長慶元年勑今年禮部侍郎錢徽所放進士鄭朗等一十四人宜令中書舍人王起主客郎中知制誥白居易等重試覆落十人三月丁未詔曰國家設文學之科本求才實茍容僥倖則異至公訪聞近日浮薄之徒扇為朋黨謂之闗節干擾主司每歲策名無不先定永言敗俗深用興懐鄭朗等昨令重試乃求深僻題目以觀學藝淺深孤竹管是祭天之樂出於周禮正經閱其程試之文都不知其本事詞律鄙淺蕪纇亦多其孔温業等三人粗通可與及第其餘落下今後禮部舉人宜准開元二十五年勑及第人所試雜文并策先送中書門下詳覆貶錢徽江州刺史武宗㑹昌五年諫議大夫陳商權知貢舉放及第二十七人三月勑戸部侍郎翰林學士白敏中重試覆落七人宣宗大中九年吏部試宏辭舉人漏洩題目為御史臺所劾侍郎裴諗改國子祭酒郎中周敬復罰兩月俸料考試官刑部郎中唐扶出為䖍州刺史監察御史馮顓罰一月俸料其登科人並落下十四年中書舍人裴坦知貢舉奏放進士三十人考試官庫部員外郎崔芻言放宏詞登科一人時舉子尤盛進士過千人然中第者皆衣冠士子是歲有鄭羲則故戸部尚書瀚之孫裴𢎞故相休之子魏簹故相扶之子令狐滈故相綯之子餘不能遍舉皆以門閥取之惟陳河一人孤平負藝第於牓末諫議大夫崔瑄上䟽曰伏見新及第進士令狐滈是河中節度使檢校司空同中書門下平章事令狐綯男舊名夀改名滈竊聞頃年暫曽罷舉自父當重位而權在一門求請者詭黨風趨妄動者邪朋雲集每歲貢闈登第在朝清列除官事望雖出於綯取捨悉由於滈喧然如市傍若無人威振寰中勢傾天下及綯去年罷相出鎭其日令狐滈於禮部納卷伏以舉人文卷皆湏十月已前送納豈可父身尚居樞務男私挾其解名干撓主司侮㺯文法若宰相子弟總合應舉即不合繼絶數年如宰相子弟不合應舉即何預有文解公然輕易隠蔽聖聰將陛下朝廷為綯滈家事伏恐奸欺得路孤直杜門非唯取笑士流抑亦大傷風教伏請下御史臺子細推勘納卷及取解月日聞奏臣職當諌署分合上聞䟽留中不出梁太祖開平三年五月勑禮部所放進士薛鈞是左司侍郎薛延珪男方持省轄固合避嫌其薛鈞宜令所司落下乾化中翰林學士鄭珏連知貢舉鄴中人聶嶼與鄉人趙都俱隨鄉薦都納賄於珏人報翌日登第嶼聞不㨗詬來人以嚇之珏懼亦俾成名後唐莊宗同光三年三月勑今年新及第進士符蒙正等宜令翰林學士承㫖盧質就本院覆試仍令學士使楊彦珞監試其月勑禮部所放進士符蒙正等四人既慊羣情實干浮議近令覆試俾塞輿言及再覧符蒙正庇成僚等程試詩賦果有疵瑕若便去留慮乖激勸儻無升降即昧甄明况王徹體物可嘉屬辭甚妙桑維翰殊無疵繆稍有功夫其王徹升為第一桑維翰第二符蒙正第三成僚第四禮部侍郎裴皥放明宗天成四年中書舍人知貢舉盧詹進納春關狀内漏失五經四人姓名罰一月俸晉髙祖天福三年崔梲權知貢舉時有進士孔英者行醜而才薄宰相桑維翰素知其為人深惡之及梲將鏁院禮辭於維翰維翰性嚴語簡謂梲曰孔英來也蓋慮梲悞放英故言其姓名以扼之也梲性純直不復禀覆因黙記之時英又自稱是宣尼之後每凌轢於方埸梲不得已遂放英登第牓出人皆諠笑維翰聞之舉手自抑其口者數四蓋悔其言也周世宗顯德二年禮部侍郎劉温叟知貢舉三月壬辰勑尚書禮部貢院奏今年新及第進士李覃嚴說何儼武允成王汾閭丘舜卿楊徽之任惟吉趙隣幾周度張愼㣲王翥馬文劉選程浩李震等一十六人所試詩賦文論策等國家設貢舉之司求英俊之士務詢文行方中科名比聞近年已來多有濫進或以年勞而得第或因媒勢以出身今歲所放舉人試令㸔驗果見紕繆湏至去留其李覃何儼揚徽之趙隣幾等四人宜放令及第其嚴說武允成王汾閭丘舜卿任惟吉周度張愼㣲王翥馬文劉選程浩然李震等一十二人藝學未精並宜勾落且令苦學以俟再來温叟失於選士頗屬因循據其過尤合行譴謫尚可見恕特與矜容温叟放罪其將來貢舉公事仍令所司别具條種聞奏四年屯田員外郎知制誥扈蒙試進策入鄉貢進士叚宏等内叚宏賜同三傳出身先是詣匭言事者甚衆命蒙以時務策試之蒙選中者四人帝覧之命樞宻副使王朴覆試唯留宏一人而已蒙由是坐奪俸一月五年右諌議大夫劉濤知貢舉三月詔曰比者以近年貢舉頗是因循頻詔有司精加試練所冀去留無濫優劣昭然昨據貢院奏今年新及第進士等所試文字或有否臧爰命詞臣再令考覈庶涇渭之不雜免玉石之相參其劉垣單貽慶李頌祭緯張覲等詩賦稍優宜放及第王汾據其文詞亦未精當念以湏曽剝落特與成名熊若谷陳保衡皆是遠人深可嗟念亦放及第郭峻趙保雍楊丹安元度張盻董咸則杜思道等未甚苦辛並從退落更修進以俟將來濤選士不當有失用心可責授右贊善大夫俾省過以戒當官先是濤於東京放牓後率其新令及第進士劉垣已下一十五人來赴行在具以其所試詩賦進呈帝覽之以其詞多紕繆命翰林學士李昉覆試故有是命册府元龜卷六百五十一
