body:
  text: 册府元龜卷二百七宋王欽若等撰閏位部恩宥恩宥書曰文王作罰刑茲無赦故有國者哀其下民觸法抵禁乃有赦焉葢與人更始而開自新之路也自吳蜀創國江左建號或易姓革命之始出師飲至之辰日蝕地震之變立後封子之慶莫不推恩肆眚以流惠澤乃有一歲至于再三者此又數而失中非御民之術也諸葛武侯有云劉景升季玉父子歲歲赦宥何益於治斯實鉅賢嘉話可垂世而為戒矣蜀先主章武元年四月丙午即皇帝位於成都武擔之南是月大赦改元後主建興元年五月襲位於成都大赦改元延熈元年正月立皇后張氏大赦改元六年十一月大赦臣欽若等曰自此已下不書降赦因依者史氏闕文九年秋大赦臣欽若等曰自此已下不書月者史氏闕文十二年四月大赦十四年冬大赦十七年正月大赦十九年元子瓉為新平王大赦二十年大赦景耀元年史官言景星見於是大赦改元四年十月大赦炎興元年夏大赦改元吳大帝權黄武三年八月赦死罪黄龍元年四月丙申南郊即皇帝位是日大赦改元三年十二月丁卯大赦改明年元為嘉禾嘉禾二年正月詔曰朕以不徳肇受元命夙夜兢兢不遑假寢思平世難救濟黎庶上答神祇下慰民望是以眷眷勤求俊傑將與戮力共定海内茍在用心與之偕老今使持節督幽州領青州牧遼東太守燕王公孫淵也久脅賊虜隔在一方雖乃心於國其路靡緣今因天命逺遣二使欵誠顯露章表殷勤朕之得此何幸如之雖湯遇伊尹周獲吕望世祖未定而得河右方之今日豈復是過普天一統於是定矣書不云乎一人有慶兆民頼之其大赦天下與之更始其明下州郡咸使聞知特下燕國奉宣恩詔令普天率土備聞斯慶赤烏三年四月大赦五年正月立子和為太子大赦八年八月大赦十年十月赦死罪大元元年五月立皇后潘氏大赦十一月大赦神鳳元年二月大赦改元廢帝亮建興元年四月即尊號大赦改元二年十月大饗武衛將軍孫峻伏兵殺大將軍諸葛恪於殿堂大赦太平元年十一月己酉大赦改元二年四月臨正殿大赦始親政事九月甲申大赦時吳侯基在内盗乗御馬收伏獄亮問侍中刁𤣥曰盗乗御馬如何𤣥對曰科應死然魯王早終惟陛下哀原之亮曰法者天下所共何得阿以親親故耶當思惟可以釋此者奈何以情相逭乎𤣥曰舊赦有大小或天下亦有千里五百里赦隨意所及亮曰解人不當爾耶乃赦宫中基以得免景帝休永安元年十月即位初御正殿大赦改元五年八月戊子立子雨單為太子大赦七年正月大赦七月壬午大赦後主皓元興元年七月嗣位大赦改元甘露元年四月蔣陵言甘露降於是改年大赦寳鼎元年八月所在言得大鼎於是改年大赦二年春大赦建衡元年十月大赦二年大赦三年監軍虞汜蒼梧太守陶璜破交阯擒殺晉所置守將九貞日南皆還屬大赦鳳皇元年八月樂鄉都督陸抗平西陵取歩闡大赦二年九月改封淮陽為魯東平為齊又封陳留等九王凡十一王大赦天册元年吳郡言掘地得銀長一尺廣三分刻上有年月字於是大赦改元天璽元年吳郡言臨平湖自漢末草穢壅塞今更開通長老相傳此湖塞天下亂此湖開天下平又於湖邉得石凾中有小石青白色長四寸廣二寸餘刻上作皇帝字於是改元大赦天紀二年七月立成紀等十一王大赦四年春立中山代等十一王大赦宋髙祖永初元年六月既受晉禪設壇于南郊告天禮畢備法駕幸建康宫臨太極前殿詔曰夫世代迭興承天統極雖遭遇異途因革殊事若乃功濟區宇道振生民興廢所階異世一揆朕以寡薄屬當艱運藉否終之期因士民之力用獲拯溺救世撥亂寧民業未半古功參曩烈晉氏以多難仍遘厯運已移欽若前王憲章令軌用集大命于朕躬惟徳匪嗣辭不獲申遂祇順三靈饗兹景祚燔柴于南郊受終于文祖猥當與能之期爰集樂推之運嘉祚肇開隆慶惟始思俾休嘉惠兹兆庶其大赦天下改晉元熈二年為永初元年賜民爵二級鰥寡孤獨不能自存者人榖五斛逋租宿債勿復收其有犯鄉論清議贓汙滛盗一皆蕩滌洗除與之更始長徒之身特皆原遣亡官失爵禁錮奪勞一依舊凖八月立王太子義符為皇太子詔曰朕承歴受終猥饗大命荷積善之祚藉士民之力七廟備文率繇令範先後祇嚴獲遂宣訓烝嘗肇建情敬無違加以儲宫備禮皇基彌固國慶家禮爰集旬日豈予一人獨荷兹慶其見刑罪無輕重可悉原赦限百日以今為始先因軍事所發奴僮各還本主若死亡及勲勞破免亦依限還直二年正月辛酉親祠南郊大赦天下三年正月甲辰朔制罪無輕重悉皆原降四月己未帝以疾瘳大赦天下少帝以永初三年五月癸卯即位大赦景平元年正月己亥朔大赦改元文武進位二等七月以旱詔赦五歲以下罪人文帝元嘉元年八月丁酉於中堂即皇帝位大赦改元文武賜位二等逋租宿債勿復收二年正月丙寅親祠南郊大赦天下三年正月荆州刺史謝晦反帝親率六師西征大赦天下閏正月丙戌皇子劭生二月乙卯繫囚見徒一皆原赦四年正月乙亥朔曲赦都邑百里内二月行幸丹徒三月丙子詔丹徒五歲刑以下皆悉原遣六年三月丁巳立皇子劭為皇太子戊午大赦天下賜文武位一等八年六月乙丑大赦天下十年正月己未大赦天下孤老六疾不能自存者人賜糓五斛七月曲赦益梁秦三州十一年四月梁秦二州刺史蕭思話破氐楊難當梁州平五月丁卯曲赦梁南秦二州劒閣北十二年正月辛酉大赦天下十三年三月己未司空江州刺史檀道濟有罪伏誅庚申大赦天下十四年正月辛卯親祠南郊大赦天下文武賜位一等孤老六疾不能自存者人賜糓五斛十六年十二月乙亥皇太子冠大赦天下十七年十月戊子前丹陽尹劉湛有罪伏誅大赦天下文武賜爵一級十九年四月甲戌帝以久疾愈始奉灼祀大赦天下二十一年正月己亥大赦天下詔諸逋債在十九年以前一切原除去歲失收者籌量申减尤弊之處遣使就郡縣隨宜賑卹凡欲附農而糧種匱乏者竝加給貸二十三年四月丁未大赦天下二十四年正月甲戌大赦天下文武賜位一等囚繫降宥逋負寛减各有差孤老六疾不能自存者人賜糓五斛二十六年二月車駕陸幸丹徒謁京陵二月丁巳詔曰朕違北京二十餘載雖云宻邇瞻塗莫從今因四表無塵時和歲稔復獲拜奉舊塋展罔極之恩饗讌故老申追逺之懐固以義兼於桑梓情加於過沛永言慷慨感慰實深聿宣仁惠覃被率土其大赦天下復丹徒縣僑舊今歲租布之半所經縣蠲田租之半二千石官長竝勤勞王務宜有霑錫登城三戰及大將戰亡之家老病單弱者普加贍卹遣使廵行百姓問所疾苦孤老鰥寡六疾不能自存者人賜糓五斛二十七年十一月丁未以魏軍來侵大赦天下二十八年十一月壬寅曲赦二兖徐豫青冀六州孝武帝以元嘉三十年正月自武陵王舉兵向闕誅元㐫劭四月己巳即位於新亭大赦天下文武賜爵一等從軍者二等贓汙清議悉皆蕩除高年鰥寡孤㓜六疾不能自存者人賜糓五斛逋租宿債勿復收長徒之身優量降宥五月克定京邑元㐫劭及諸同逆伏誅甲午曲赦京邑二百里内竝蠲今年租税孝建元年正月己亥朔親祠南郊改元大赦天下七月丙申朔日蝕丙辰大赦天下文武賜爵一級逋租宿債勿復收二年六月甲子以國哀除釋大赦天下九月詔曰國道再屯艱虞畢集朕雖寡徳終膺鴻慶惟新之祉實深百王而惠宥之令未殊常渥永言勤慮寤寐載懐在朕受命之前凡以罪徙放悉聴還本犯釁之門尚有存者子弟可隨才署吏三年正月壬子立皇太子妃何氏甲寅大赦天下大明元年正月辛亥朔改元大赦天下賜髙年孤疾粟帛各有差二年六月丙申詔曰往因師旅多有逋亡或連山染逆懼致軍憲或辭役憚勞茍免刑罰雖約法從簡務思𢎞宥恩令驟下而逃伏猶多豈習愚為性狃惡難反將在所長吏宣導乖方可普加寛申咸與更始三年七月己巳克廣陵斬竟陵王誕辛未大赦天下臣欽若等曰誕為司空南兖州刺史有罪貶爵誕不受命據廣陵城反至是誅之四年正月乙亥躬耕藉田大赦天下尚方繫囚及逋租宿債大明元年以前一皆原除力田之民隨才叙用孝弟義順賜爵一級孤老貧疾人榖十斛藉田職司優加霑賚百姓乏糧種隨宜貸給十二月辛巳幸廷尉寺凡囚繫咸悉原遣丁未幸建康縣原放獄囚五年二月癸巳閱武詔曰頃化弗能孚而民未知禁逭役違調起觸刑網凡諸逃亡在昧爽以前悉皆原散已滯囹圄者釋還本役近籍新制在所承用殊謬實多可普更符下聽以今為始若先已犯制亦同蕩然七月曲赦雍州九月行幸琅邪郡囚繫悉原遣六年正月辛卯親祠南郊是日又崇祀明堂大赦天下七年二月帝廵南豫南兖二州壬寅詔曰朕受天慶命十一年於兹矣憑七廟之靈𫉬上帝之力禮横四海威震八荒方廵三湘而奠衡嶽祀九河而簡云岱今恢覽功成省風畿表觀民六合蒐較長州騰砂飛礫振嶽盪海星烏合序攝提協節入獻鬯典饁獸傾郊敬舉王公之觴廣納士民之夀八風循通卿雲叢聚盡天罄瑞率宇竭歡思散太極之泉以福無方之外可大赦天下十一月帝在南豫州丙子赦本州殊死以下廵幸所經詳减今歲田租十二月丙午行幸歴陽甲寅大赦天下南豫州别署勑繫長徒一切原散其兵期考襲讁戌悉停臣欽若等曰考謂考課襲謂襲爵也前廢帝以大明八年閏五月庚申即位大赦天下永光元年正月乙未朔改元大赦天下景和元年九月親討徐州刺史義陽王昶昶奔於魏十月癸亥曲赦徐州而還十一月壬寅立皇后路氏四廂奏樂赦揚南徐二州丁未皇子生少府劉勝之子也大赦天下贓汙淫盗悉皆原除賜為父後者爵一級明帝㤗始元年十二月丙寅即皇帝位詔曰髙祖武皇帝徳洞四瀛化綿九服太祖文皇帝以大明定基世祖孝武皇帝以下武寧亂日月所照梯山航海風雨所均削袵襲帶所以業固盛漢聲溢隆周子業㐫嚚自天忍悖成性子業即廢帝也人面獸心見於髫日反道敗徳著自比年其狎侮五常怠棄三正矯誣上天毒流下國開闢所未有書契所未聞再罹遏宻而無一日之哀齊斬在躬方深北里之樂虎兕難押馮河必彰遂誅滅上宰躬釁逆之酷虐害國輔究孥戮之刑子鸞同生以昔憾放殄敬猷兄弟以睚眦殱夷徵逼義陽將加屠膾陵辱戚藩檟楚妃主奪立左右竊子置儲肆􅒬于朝宣滛于國事穢東陵行汙飛走積釁罔極日月滋深比遂圖犯𤣥宫志窺題凑將肆梟獍之禍騁商頓之心又欲鴆毒崇憲虐加諸父事均宫閫聲遍國都而䲭梟小竪莫不寵暱朝廷忠誠必也戮挫收掩之㫖虓虎結轍掠奪之使白刄相望百寮危氣首領無有全地萬姓摧心妻子不復相保所以鬼哭山鳴星鈎血降神器殆於馭索景祚危於綴旒朕假寐凝憂泣血待旦慮太宗之基於焉而冺武王之業將墜于淵頼七廟之靈藉八代之慶巨滑斯殄鴻沴將褰皇綱絶而復紐天緯缺而更張猥以寡薄屬承乾統上緝三光之重俯顧庶民之艱業業矜矜若履氷谷思與億兆同此維新可大赦天下改景和元年為㤗始元年賜民爵二級鰥寡孤獨不能自存者榖人五斛逋租宿債勿復收犯鄉論清議贓汙滛盗竝悉洗除長徒之身特賜原遣亡官失爵禁錮舊勞一依舊典其昏制謬封竝皆刋削二年正月吳郡太守顧琛吳興太守王曇生義興太守劉延熙晉陵太守袁標山陽太守程天祚竝舉兵反二月曲赦吳郡吳興義興晉陵四郡晉陵平癸未曲赦浙江東五郡三月癸丑曲赦揚南徐二州囚繫凡逋亡一無所問四月丁酉曲赦豫州八月建安王休仁討江郢荆雍湘等五州平定之晉安王子勛等竝賜死同黨皆伏誅九月乙酉曲赦江郢荆雍湘五州守宰不得離職癸丑六軍戒嚴大赦天下賜民爵一級十月戊寅立王太子昱為皇太子曲赦揚徐二州十二月乙丑詔曰近衆藩稱亂多染釁科或誠係本朝事縁逼廹混同證錮良以悵然夫天道尚仁徳刑竝用雷霆時至雲雨必解朕眷言靜念思𢎞風澤凡應禁削皆從原蕩其文武堪能隨才銓用三年正月癸卯曲赦豫州南豫二州二月丙申曲赦青冀二州八月癸卯詔曰法網之用期世而行寛惠之道因時而布况朕尚徳戡亂依仁馭俗是宜每就𢎞簡以隆至治而頻罹兵革繇賦未休軍民巧偽興事甚多蹈刑入憲諒非一科至乃假名戎伍竊爵私庭因戰散亡託懼逃役且往者淪逼雖經累宥逋竄之黨猶為實繁宵言永懐良兼矜疚思所以重播至澤覃被區宇可大赦天下九月庚午曲赦徐兖青冀四州四年正月己未親祠南郊大赦天下三月妖賊攻廣州龍驤將軍陳伯紹討平之五月乙丑曲赦廣州五年五月躬耕籍田大赦天下賜力田爵一級六年二月癸丑皇太子納妃甲寅大赦天下巧注巧注調巧偽注名軍中以免徭役也從軍不在赦例七年四月辛丑詔减天下死罪一等凢勑繫悉遣之八月庚寅帝以疾愈大赦天下後廢帝以㤗豫元年四月己亥即位大赦天下元徽元年正月戊寅朔改元大赦天下壬寅詔曰夫緩法昭恩裁風茂典蠲憲伏眚訓俗彛義朕臨馭宸極寅制氓㝢式存寛簡思孚矜惠今開元肆有萬品惟新凡兹遷斥宜均𢎞洗自元年以前貽罪徙放者悉聽還本鄉二年五月江州刺史桂陽王休範舉兵反討平之丁酉詔京邑二縣埋藏所殺竝賊戰亡者復同京城是日解嚴犬赦天下文武賜位一等十一月帝加元服大赦天下賜民男子爵一級為父後及三老孝悌力田者爵二級鰥寡孤獨篤癃不能自存者榖人五斛年八十以上加帛一疋大酺五日賜王公以下各有差四年正月己亥躬耕籍田大赦天下賜力田爵一級貸貧民糧種七月南徐州刺史建平王景素據京師反乙未克京城斬景素其日解嚴丙申大赦天下封賞各有差原放京邑縣元年以前逋調五年六月甲戌誅司徒左長史沈勃等大赦天下臣欽若等曰勃多寶貨帝往刼而誅之事具閏位部暴虐門順帝昇明元年七月壬辰即位改元大赦天下賜文武位二等十二月荆州刺史沈攸之等舉兵反司徒袁粲據石頭尚書令劉秉赴之甲戌大赦天下二年二月沈攸之平曲赦荆州十一月壬寅立皇后謝氏减死罪一等五歲刑以下悉原南齊太祖建元元年四月甲午受禪南郊禮畢大駕還宫臨太極前殿詔曰五徳更紹帝迹所以代昌三正迭隆王度所以改耀世有質文時或因革其資元膺歴經道振民固以異術同揆殊流共貫者矣朕以寡昧屬值艱季推肆勤之誠藉樂治之數賢能悉心士民致力用獲拯溺龕亂一匡天下業未參古功殆侔昔宋氏以陵夷有徵厯數攸及思𢎞樂推永鍳崇替爰集天禄于朕躬惟志菲薄辭弗獲命遂欽從天下式昭景命祇受正于文祖升禋鬯于上帝猥以寡徳光宅四海纂革代之蹤託王公之上若渉淵水罔知所濟寳祚初啓洪慶惟新思俾利澤宣被億兆可大赦天下改宋昇明三年為建元元年賜民爵二級文武位二等鰥寡孤獨不能自存者人榖五斛逋租宿債勿復收有犯鄉論清議贓汙盗滛一皆蕩滌洗除先注與之更新長徒勅繫之囚特皆原遣亡官失爵禁錮舊勞一依舊典又詔曰宸運肇創寳命惟新宜𢎞慶宥廣敷蠲貸刼賊餘口没在臺府者悉原放諸負釁流徙竝聽還本鄉六月甲申立皇太子見刑入重者降一等竝申前赦恩百日七月詔曰交趾兆景獨隔書朔斯乃前運方季負海不朝因迷遂往歸欵莫繇曲赦交州部内李叔獻一人即撫南土文武詳才選用竝遣大使宣揚朝恩以試守武平大守行交州府事李叔獻為交州刺史二年正月戊戌朔大赦天下六月癸未詔昔歲水旱曲赦丹陽二吳義興四郡遭水尤劇之縣元年以前三調未克虚歴已畢官長局吏應供償備外詳所除宥三年六月壬子大赦時豫章王嶷發江陵有疾至京師未瘳帝憂慮為之大赦四年二月帝不豫庚辰詔原京師囚繫有差世祖武帝以建元四年三月壬戌即位大赦六月甲申立皇太子長懋詔申癸酉赦恩百日永明元年正月辛亥祠南郊大赦改元三月丙申詔曰朕自丁荼毒奄更周忌瞻言負荷若墜淵壑而逺圖尚蔽政刑未洽星緯失序隂陽愆度思播光澤兼酬天𤯝可申辛亥赦恩五十日以期訖為始京師囚繫悉皆原宥三署徒優量降遣都邑鰥寡尤貧詳加賑䘏戊寅詔四方見囚罪無輕重及刼賊餘口長徒勑繫悉皆原赦六月丙寅詔凡坐事應復治者在建元四年三月以前皆原二年八月丙午詔申京師獄及三署見徒量所降宥三年正月辛卯祠南郊大赦都邑三百里内罪應入重者降一等餘依勑制劾繫之身降遣有差賑䘏二縣貧民四年閏正月辛亥躬耕籍田詔曰思俾休和覃茲黔皁見刑罪殊死以下悉原宥五年四月殷祀太廟詔繫囚見徒四歲刑以下悉原遣五年减為三歲京邑罪身應入量降一等六年正月壬午詔二百里内獄同集京師克日聽覽自此以外委州郡訊察三署徒𨽻詳所原釋七年正月辛亥祠南郊大赦京邑貧民普加恩賜八年七月癸卯詔曰隂陽舛和緯象愆度儲宫嬰患淹歴旬晷思仰祗天戒俯紓民瘼可大赦天下九年正月辛丑祠南郊詔京師見繫囚詳量原遣十一年正月癸丑詔京師見繫囚詳所原遣鬱林王隆昌元年正月丁未改元大赦海陵王延興元年七月丁酉即帝位詔曰太祖髙皇帝英謨光大受命作齊世祖武皇帝宏略冠世繼暉下武世宗文皇帝清明懿鑠四海宅心竝徳漏下泉功昭上象聲教所覃無思不洽洪基式固景祚方融而天歩多阻運鍾否剥嗣君昏忍暴戾滋多侮棄天經悖滅人紀朝野重足遐邇側視民怨神恫宗祧如綴頼忠謨肅舉霄漢廓清俾三后之業絶而更紐七百之慶危而復安猥以冲人入纂乾緒載懐馭朽若墜諸淵思與黎元共綏戬福大赦改元文武賜位一等明帝建武元年十月癸亥即帝位詔曰皇齊受終建極握鏡臨宸神武重輝欽明懿鑠七百攸長盤石斯固而王度中愆天階薦阻嗣命多違藩釁孔棘宏圖景厯將墜諸淵宣徳皇后逺鍳崇替憲章舊典疇咨台揆允定靈筞用集寳命命予一人猥以虚薄纉承大業仰繫鴻丕顧臨億兆永懐先構若履春氷寅憂夕惕罔識攸濟思與萬國播此惟新大赦天下改元宿衛者普轉一階其餘文武賜位二等逋租宿債換負官物在建武元年以前悉皆除放刼賊餘口在臺府者可悉原放負釁流徙竝還本鄉二年正月辛未詔京師繫囚殊死可降為五歲刑三署見徒五歲以下悉原放十月納皇太子妃禇氏大赦四年正月庚午大赦永㤗元年正月癸未朔大赦逋租宿債在四年之前皆悉原除四月甲寅改元赦三署囚繫原除各有差文武賜位二等東昏侯永元元年正月改元大赦四月乙巳立皇太子大赦賜民為父後爵一級八月丙辰振州刺史始安王遥光據東府反曲詔京邑九月壬戌以頻誅大臣大赦天下臣欽若等曰大臣謂僕射江祐侍中江祀也二年四月平西將軍崔慧景於廣陵舉兵襲京師江夏王寳𤣥以京城納之豫州刺史蕭懿斬慧景詔曲赦京邑南徐兖二州三年正月辛亥祀南郊大赦天下三月戊子曲赦江州安城廬陵二郡為蕭頴冑起兵廬陵七月癸巳曲赦荆雍二州和帝初封南康王為荆州刺史永元二年十一月南雍州刺史蕭衍奉王舉義於江陵乃下教曰吾躬率晉陽翦此㓙孽戎事方勤宜覃惠澤所領繫囚見徒罪無輕重殊死以下皆原遣先有位署即復本職將吏轉一級從征身有家口停鎮給廪食諸雜役見在諸軍帶甲之身克定之後悉免為民其功効賞報别有科條三年正月乙巳王受宣徳太后命為宣王相國大赦唯梅䖝兒茹法珍等不在赦例中興元年三月即帝位于江陵改元大赦册府元龜卷二百七
