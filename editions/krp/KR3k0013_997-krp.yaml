body:
  text: 册府元龜卷九百九十七宋王欽若等撰外臣部狀貌技術勇鷙悖慢怨懟殘忍狀貌夫戎狄蠻夷各處其極東西南北咸有所稟豈惟嗜慾不同抑亦形貌有異盖天意所以分夷夏别族類也或自傳譯狀彼酋帥或因朝貢驗彼使人良史存之亦圗式之盛也夏禹時汪罔氏之君曰防風氏禹致群臣於㑹稽山防風氏後至殺而戮之防風氏違命後至故禹殺之陳尸為戮其節専車骨一節其長専車専擅也周頃王時鄋瞞國君長狄僑如防風之後漆姓弟兄三人佚宕中國佚猶更也瓦石不能害肌膚堅強瓦石打摘不能虧損叔孫得臣最善射者也射其目一云富父終甥摏其喉以戈殺之身横九畆廣一歩長百歩為一畆九畆五丈四尺斷其首而載之眉見於軾兵車之軾髙三尺三寸漢武帝時匈奴休屠王太子金日磾休音許明切屠音儲磾音低長八尺二寸容貌甚嚴晉吐谷渾之子吐延身七尺八寸雄􅐾魁傑羗虜憚之號曰項羽梁毗騫國王身長丈二頸長三尺自古以來不死南方號曰長頸王國後魏光城蠻田益宗身長八尺雄果有將畧貌狀舉止有異常蠻北齊突厥木可汗俟斤狀貌竒異面廣尺餘其色赤黄眼若琉璃後周突厥燕都狀貌多竒異面廣尺餘其色甚赤眼若琉璃隋文帝時突厥葉護可汗長頥僂背眉目踈朗唐太宗貞觀中以阿史那思摩為利苾可汗建牙於阿北思摩者頡利族人也始畢處羅以其貌似胡人不類突厥非阿史那族類故歴處羅頡利世常為夾畢特勒終不得典兵髙帝顯慶四年蝦夷國遣使入朝其使鬚長四尺龍朔三年百濟西部人黒齒常之來降常之長七尺餘驍勇有謀畧徳宗時吐蕃徐舎人為大將身長六尺餘赤髪大目技術夫究技術之妙所以事於上通方術之㫖所以濟乎物中古而下代有其人若乃生蠻貊之邦稟雋異之氣性識聰悟講習精篤或作為幻戲或研覈星歴或餌藥以養命或鑄金而擅譽以至留神書畫玩志博奕莫不萃止中國盛一時之觀聽者焉漢西域大宛諸國武帝時有使随漢使來觀漢廣大以黎軒眩人獻於漢眩讀為幻即今吞刀吐火植瓜種樹屠人截馬之術皆是也烏弋山離人善眩讀眩為幻後漢撣國安帝永寧初遣使朝賀獻樂及幻人能變化吐火自支解易牛馬頭又善跳丸數乃至千自言海西人海西即大秦唐婆羅門方士郡羅延婆婆寐自言夀二百嵗有長生之術太宗深加禮待館之於金颷門内造延年之藥罽賔國王葛邏達支特勒元宗開元七年遣使獻天文經及秘要藥方吐火羅國支汗那王帝賖開元七年上表獻解天文人大慕闍其人智専幽深問無不知伏乞天恩喚取慕闍親問臣等事意諸教法知其人有如此之藝能望請令共其供奉并置一法堂依本教供養其長男吉獵顚倭國以徳宗建中初遣大使真人興能自明州路奉表獻方物風調甚髙善書翰其本國紙似蠶繭而𦂳滑人莫能名日本國以宣宗文中三年遣王子來朝王子善圍碁帝令待詔顧師言與之對手王子出本國如揪玉局冷暖玉碁子盖玉之倉者如楸木色冷暖者言冬温夏凉人或過說非也時王子至二十三下師言懼辱君命汗手死心始敢落指王子亦凝目縮臂數四竟伏不勝回謂禮賔曰此第㡬手也禮賔曰第三非其第一手也王子曰願見第一手禮賔曰勝第三可見第二勝第二可見第一今欲􅏥見第一者其可乎王子撫局歎曰小國之一不敵大國之三信矣後唐契丹東丹王歸中國明宗賜姓名贊華尤好畫及燒金煉汞之術始泛海歸朝載書數千巻自随樞宻使趙延夀每求假異書及醫經皆中國無者永康王兀欲即東丹之長子也後改名聿好行仁惠善丹青尤精飲藥勇鷙夫蠻夷戎狄其俗不同桀驁荒獷所稟亦異殺伐為事争奪為功莫不以材力相先鷙勇相尚角騎射之工競馳逐之利名出種族氣凌部落又豈知仁義為善哉漢匈奴冒頓頭曼莫切單于太子初質於月支而匈奴急擊月支月支欲殺冒頓冒頓盗其善馬騎亡歸頭曼以為壯令將萬騎烏桓豪人扶潄官勇健每與鮮卑戰輒陷敵詔賜號率衆君西西羗無弋爰劍曽孫忍子研至豪健故羗中號其後為研種從爰劍種五世至研研最豪健自後以研為種號十三世至燒當復豪健其子孫更以燒當為種號後漢句驪王宫勇壯數犯邊境夫餘王其先北夷索小離國王侍兒見天上有氣大如鷄子來降因以有身生子名曰東明長而善射王忌其猛欲殺之因走至夫餘而王焉魏髙句麗王位宫其曾祖名宫生能開目視其國人惡之及長大果㓙虐數㓂鈔國見殘破今王生墮地亦能開目視人句麗呼相似為位似其祖故名之為位宫有力勇便鞍馬善獵射鮮卑投鹿侯從匈奴軍三年其妻在家有子投鹿侯歸恠欲殺之妻言嘗晝行聞雷震仰天視而雹入其口因呑之遂姙身十月而産此子必有竒異且長之投鹿侯因不信妻乃語家令收養焉號檀石槐長大勇健智畧絶衆年十四五異部大人卜賁邑鈔取其外家牛羊檀石槐策騎追擊所向無前悉還得所亡繇是部落畏服施法禁曲直莫敢犯者遂推以為大人烏丸蹋頓驍武邊長老皆比之冒頓恃其阻逺敢受亡命以雄百蠻晉吐延吐谷渾之子也性俶儻不羣嘗慷慨謂其下曰大丈夫生不在中國當髙光之世與韓彭吳鄧並驅中原定天下雌雄使名垂竹帛而潜竄窮山隔在殊俗不聞禮教於上京不得策名於天府生與麋鹿同羣死作氈裘之鬼雖偷觀日月獨不愧於心乎性猜忍而負其智不能恤下為羗酋姜聰所刺劍猶在其身謂其將紇㧞泥曰竪子刺吾吾之過也上負先公下愧士女所以控制諸羗者以吾故也吾死之後善相葉延速保白蘭言終而卒宋突厥攝圗一號沙鉢畧勇而得衆北夷皆歸附之獵扵常代之間畧一日手殺鹿十八頭齎尾舌以獻又云攝圗才吾之子長而且雄國人皆知莫敢拒者唐馮盎髙州良徳人代為本郡太守領武徳初廣新二州賊帥髙法澄況寳徹等並受林士宏節度殺害随官盎率兵擊破之既而寳徹兄子智臣又聚兵於新州自為渠帥盎趍往之兵交盎却兠鍪大呼曰爾等頗知我否賊多棄戈肉袒而拜其徒潰擒寳徹智臣等嶺外遂定貞觀中羅寳諸洞獠叛詔令盎率部落二萬為諸軍先鋒時有賊數萬屯㩀險要不可攻逼盎持弩語左右曰盡吾此箭可知勝負連發七矢而中七人賊退走因縱兵乗之斬首千餘級馮智載髙州都督盎之子也少有籌畧撫衆得其效死川洞酋師多願𨽻之大業末随父至雒陽仍領本鄉驍果宿衛及江都難作智載結其所部逃還是時群盜蜂起嶺嶠路絶智載具戰所向無前至髙凉俚師推之以為謀主尋而盎至拒守者不之前智載就迎乃獲進囘紇菩薩勁勇有膽氣每對敵臨陣必身先士卒西突厥葉護可汗勇而有謀善攻戰晉髙麗國王王武勇而多力能伸屈鐵鈎悖慢傳云夷蠻要服戎狄荒服要服者貢荒服者王古之制也逮漢而降夷狄寖驕種類滋蕃悍驁難制其有穹廬之長椎髻之豪懐之以文而不賔和之以親而不庭要之以盟而無信餌之以貨而無猒或肆用桀心専圗荐食亡蕃服之禮任忿鷙之性不式戎索踞俟王臣雍閼逺人誘納亡命為抄掠之患形䙝嫚之辭故聖王畜之若鳥獸敺之若蟁蝱示之以威武接之以禮讓羈縻而不絶者誠制御之逺畧也漢尉佗為南越王髙祖以中國初定使陸賈賜尉佗印賈至他魋結魋音椎箕踞見賈匈奴單于武帝征和四年遣使遺漢書云南有大漢北有強胡胡者天之驕子也不為小禮以自煩令欲與漢闓大闗取漢女為妻闓讀烏闗同嵗給遺我蘖酒萬石稷米五千斛以蘖為酒味尤亂稷粟米也雜繒萬疋它如故約則邊不相盜矣漢遣使者報送其使單于使左右難漢使者曰漢禮義國也貳師道前太子發兵反何也使者曰然廼丞相私與太子爭鬬太子發兵欲誅丞相丞相誣之故誅丞相此子弄父兵罪當笞小過爾孰與冒頓單于身殺其父代立嘗妻後母禽獸行也單于留使者三嵗乃得還朝鮮王衛蒲傳子至孫右渠蒲死傳子子傳孫右渠者其孫名也所誘漢亡人滋多又未嘗入見真畨辰國欲上書見天子又雍閼弗通辰謂辰韓之國也雍讀曰壅罽賔國武帝時始通其王烏頭勞自以絶逺漢兵不能至數剽殺漢使剽切也音頻妙切烏孫昆莫居西域武帝時令張騫齎金幣往賜見騫如單于禮昆莫自比於單于騫大慙謂曰天子致賜王不拜則還賜還賜謂將賜物還歸漢也昆莫起拜其它如故南夷且蘭君武帝時南粤反帝使馳義侯因犍為發南夷兵且蘭君恐逺行旁國虜其老弱恐發兵與漢行後其國空虚而旁國来冦鈔取其老弱也乃與其衆反殺使者及犍為太守郅支單于既殺漢使谷吉自知負漢又聞呼韓邪益強遂西奔康居康居王以女妻郅支郅支亦以女予康居康居甚尊敬郅支欲倚其威以脅諸國倚音於綺切郅支數借兵擊烏孫深入至赤谷城殺畧民人敺畜産敺與驅同下皆類此烏孫不敢追西邊空虚不居者且千里郅支單于且以大國威名尊重又乗勝驕不為康居王禮怒殺康居王女及貴人人民數百或支解投都頼水中支解謂截其四支也都頼郅支水名發民作城日作五百人二嵗乃已又遣使責闔蘇大宛諸國嵗遺胡廣云康居北可一千里有國名奄蔡一名合蘇然則闔蘇即奄蔡也歳遺者年常所獻進之物遺弋季切不敢不予漢遣使三軰至康居求谷吉等死死尸也郅支困辱使者不肯奉詔而因都護上書言居困屈顧歸計疆難遣子侍故為此言以調戲也歸計謂歸附而受計䇿也其驕嫚如此樓蘭最在東垂近漢當白龍堆乏水草常主發導負水儋糧送迎漢又數為吏卒所冦徴艾不便與漢通艾讀曰又也後復為匈奴反間間音居莧切數遮殺漢使康居成帝時遣子侍漢貢獻然自以絶逺獨驕嫚不肯與諸國相望都護郭舜數上言本匈奴盛時非以兼有烏孫康居故也及其稱臣妾非以失二國也漢雖皆受其質子然三國相輸遺交通如故亦相候伺見便則發合不能相親信離不能相役使以今言之結配烏孫竟未有益反為中國生事然烏孫既結在前今與匈奴俱稱臣義不可拒而康居驕黠訖不肯拜使者訖竟也都護吏至其國坐之烏孫諸使下王及貴人先飲食已乃飲㗖都護吏飲音盡禁切㗖音徒濫切故為所省以夸旁國言故不省視漢使也以此度之何故遣子入侍其欲賈市為好辭之詐也匈奴百蠻大國於百蠻之中最大國也今事漢甚備聞康居不拜且使單于有自下之意言單于見康居不事漢以之為髙自以事漢為太卑而欲改志也宜歸其侍子絶勿復使不通使令其國也以章漢家不通無禮之國南匈奴單于以光武建武初彭寵反畔扵漁陽南匈奴單于與共連兵復權立盧芳使人居五原帝初平諸夏未遑外事至六年始令歸徳侯劉颯使匈奴匈奴亦遣使來獻漢復令中郎將韓統報命賂遺金幣以通舊好而單于驕踞自比冒頓對使者辭語悖慢南齊太祖建元一年芮芮主遣使貢獻貂皮雜物與帝書欲伐魏謂帝足下自稱吾獻獅子皮袴褶皮如虎皮色白毛短時有賈胡在蜀見之云此非獅子皮乃扶㧞皮也隋倭國王多思此煬帝大業四年遣使朝貢使者曰聞海西菩薩天子重興佛法故遣朝拜兼沙門數十人來學佛法其國書曰日出處天子致書日沒處天子無恙云云帝覽之不恱謂鴻臚卿曰蠻夷書有無禮者勿復以聞唐突厥始畢可汗髙祖舉義兵遣兵助軍及平京師自恃其功益驕踞前後賞賜不可勝紀其使者至長安頗多横恣帝以中原未定每優容之突厥頡利初嗣立承父兄之資兵馬強盛有憑陵中國之志髙祖以中原初定不遑外畧每優容之賜與不可勝計頡利言辭悖傲求請無厭吐蕃以貞觀中遣使求婚太宗未之許及破土谷渾諸羗乃率其衆二十餘萬頓於松州西境遣使貢金甲云来迎公主又謂屬曰若大國不嫁公主扵我即當入㓂遂進攻松州龜兹王伐疊貞觀中臣扵西突厥安西都護郭孝恪來伐焉耆龜兹發兵援助自是職貢頗闕伐疊死其弟訶黎布失畢代立漸失蕃禮朱邪孤注以髙宗永徽二年殺招討使果毅都尉單道恵而與賀魯連和突厥黙啜以中宗神龍二年殺我行人假鴻臚卿臧思言帝以思言對賊不屈節特贈鴻臚卿吐蕃以𤣥宗開元中自恃兵強每通表䟽求敵國之禮言詞悖慢帝甚怒之囘紇以肅宗寳應三年閠正月己酉夜十有五人犯金口光門突入鴻臚寺門司不能禁囘紇登里可汗毗伽闕可汗少子也代宗初即位以史朝義尚在河雒遣中使劉清潭徴兵扵囘紇乃以雍王為兵馬元帥以殿中監樂子昂與前朔方節度魏琚為左右廂兵馬使以中書舎人韋少華充元帥判官兼掌書記給事中李進兼御史中丞充元帥行軍司馬東㑹囘紇時囘紇營扵陜州黄河北雍王領子昂等從而見之可汗責雍王不扵帳前舞蹈禮倨子昂辭以元帥是嫡孫兩宫在殯不合有舞蹈囘紇宰相及車鼻將軍庭詰曰唐天子與登里可汗約為兄弟今可汗即雍王叔叔姪有禮數何得不舞蹈子昂苦辭以身有慘禮不合行人報云元帥即唐太子也太子即儲君也豈有中國儲君向外國可汗前舞蹈相拒乆之車鼻遂引子昂李進少華魏琚各搒捶一百少華琚一日而死以王少年未諳事放歸本營吐蕃以代宗大歴二年十一月遣其首領論立界和蕃使薛景仙來朝景仙奏曰臣見吐蕃賛普于延葛川語臣云請以鳳林闗為界帝不答囘紇以大歴六年正月扵鴻臚寺擅出坊市掠人子女所繇官禁止反怒毆以三百騎犯含光門朱雀門是日皇城諸門盡閉帝使中使劉清潭宣慰乃止七年七月癸巳擅出鴻臚寺入坊市強逐長安縣令邵說於含光門之街奪說所乗馬去而說脫身避走所繇不能禁九年九月壬寅鴻臚寺囘紇擅出寺白晝殺人所繇禽之特詔免罪又十年九月戊申囘紇白晝刺人扵東市人執之拘扵萬年縣其首領赤心聞之自鴻臚寺馳入縣獄劫囚而出砍傷獄吏渤海以憲宗元和二年進奉端午使楊光信逃歸潼闗吏執以至鞫扵内仗黠戞斯以武宗㑹昌初破囘紇自稱李陵之後與國同姓令達干等十人送太和公主至塞上烏介途遇黠戞斯使逹干等並被殺太和公主却歸烏介可汗乃質公主同行南度大磧至天徳界奏請天徳城與公主居怨懟夫戎狄無厭本乎桀驁之性國家有道存夫羈縻之方然而恃險與逺財利是顧制御或失驕慢遂滋揚言怨尤輕背約束大即㓂盗如故小亦偃蹇自恣斯蓋蠻貊之常態邊塞所預防者也漢南粤王尉陀髙后時有司請禁粤闗市鐵器陀曰髙皇帝立我通使物今髙后聽讒臣别異蠻夷鬲絶器物鬲與隔同此必長沙王計欲倚中國擊滅南海并王之自為功也扵是陀乃自尊號為南粤武帝匈奴郅支單于宣帝時郅支以呼韓邪破弱降漢不能自還西收右地㑹漢發兵送呼韓邪單于郅支繇是遂西破呼偈堅昆下令呼偈小國名在匈奴北偈起利切令音零兼三國而都之怨漢擁護呼韓邪而不助已困辱漢使者江迺始等匈奴烏珠留若鞮單于漢末王莽奏中國不得有二名因使使者以諷單于宜上書慕化為一名漢必厚賞單于從之後莽易單于故印故印文曰匈奴單于璽更曰新匈奴單于章詔令上故印綬單于遂解故印綬授漢使受新印綬不解視印飲食至夜乃罷漢使陳饒謂諸將帥曰單于如視印見其變改必求故印此非詞說所能拒也既得而復失之辱命莫大焉不如椎破故印以絶禍根乃引斧椎壊之明日單于果遣人求故印漢使示以故印匃奴求稅烏桓不得重以印文改易故怨恨㓂擊諸國莽扵是分匈奴為十五單于後漢莎車國王賢遣使貢獻請都護光武以問大司空竇融以為賢父子兄弟相約亊漢𣢾誠又至宜加號位以鎮安之帝乃因其使賜賢西域都護印綬及車旗黄金錦繡燉煌太守裴遵上言夷狄不可假以大權又令諸國失望詔書收還都護印綬更賜賢以漢大將軍印綬其使不肯易遵迫奪之賢繇是始恨而猶詐稱大都護匈奴建武中聞漢購求盧芳貪得財帛乃遣芳還降望得其賞而芳以自歸為功不稱匈奴所遣單于復恥言其計故賞遂不行繇是大恨入㓂尤深二十年遂至上黨扶風天水二十一年冬復㓂上谷中山殺畧鈔掠甚衆北邊無復寧歳唐南詔蠻髙宗時其渠帥來朝其後孫閤羅鳳立襲雲南王時鮮于仲通為劍南節度使張䖍陀為雲南太守仲通褊急䖍陀又遣人罵辱之羅鳳忿怨因攻圍䖍陀殺之自是閤羅鳳北臣吐蕃黙啜則天時冊立為特進頡跌利施大單于立功報國可汗初髙宗咸亨中突厥諸部来降附者多處之豐勝靈夏朔代等州謂之降户黙啜至是又索降户及單于都護府之地兼請農器種子則天初不許黙啜大怨言辭甚慢尸利佛誓國王渤順𤣥宗開元十年遣使獻表論邊吏凌侮言甚切至囘紇以代宗大歴之後恃功屢遣使督和市繒帛十三年㓂太原徳宗即位使中官梁文秀吿哀且修舊好可汗移地不為禮徳宗建中二年十二月入蕃使判官常魯與吐蕃使論悉諾羅等至自蕃中初至蕃魯與其使崔漢言曰来勅云所貢獻物並領訖今賜外甥少物信至領取我大蕃與唐國舅甥爾何得以臣禮見處又所欲定界雲州之西請以賀蘭山為界其􅉀約請依景龍二年吐蕃尚結賛徳宗貞元中陷夏州檢校左庶子兼御史中丞崔澣為入吐蕃使澣至鳴沙與尚結賛相見詔問其違約陷鹽夏州之故對曰本以定界碑被牽倒恐二國背􅉀相侵故造境上請修舊好又蕃軍頃年破朱泚之衆扵武功未獲酬償所以來爾殘忍慘毒安忍疾之已甚桀驁荒獷死而不弔其有族類斯熾威儀罔攝天資狡惡不常喜怒甚者滅親以自立次乃虐衆以求附聚封割而為樂肆焚灼而逞志芥視老弱獸飲膏血服習㓙器暴殄天物間以小怒亦成淫罰中國所以懲禦備守盖謂此也漢匈奴冒頓單于為太子時作鳴鏑音嫡髐箭也髐音呼交切習勒其騎射勒其所部騎皆習射也令曰鳴鏑所射而不悉射者斬行獵獸有不射鳴鏑所射斬之已而冒頓以鳴鏑自射善馬左右莫敢射冒頓立斬之居頃之復以鳴鏑自射其愛妻左右或頗恐不敢射復斬之匈奴握衍朐音劬鞮單于初立㓙惡盡殺虛閭權渠單于時用亊貴人邢未央等立二嵗暴虐殺伐國中不附魏髙句麗王位宫生而目開能視國人惡之及長大果㓙虐數㓂鈔國見殘破晉林邑王文以前王范逸妻妾悉置之髙樓從巳者納之不從者絶其食永和三年率衆攻陷日南太守夏侯覽以尸祭天隋吐谷渾王吕夸在位百年屢因喜怒廢其太子而殺之其後太子懼見廢辱遂謀執吕夸而降請兵扵邊吏秦州總管河間王引請將兵應之上不許太子謀洩為其父所殺唐賨王吐蕃賛府姓不夜名器宗弄讃太宗時為其君長用刑嚴峻喜怒無常每月異國賔客驅野馬犁牛扵前弄讃馳以劍斬之首墜於前側用以為歡突厥可汗黙啜則天時攻定州殺刺史孫彦髙焚燒百姓廬舎虜掠男女無少長皆殺之則天乃立廬陵王為皇太子充河北道行軍大元帥軍未發而黙啜盡殺所掠趙定等州男女八九萬人從五迴道而去所過殘殺不可勝紀囘紇登里可汗代宗即位初助國討史朝義既至東京以賊界肆行殘忍士女懼之皆登聖善寺及白馬寺二閣以避之囘紇縱火二閣傷死者計萬累旬火不㓕後唐契丹東丹王歸中國明宗賜姓李名賛華嚴刻馭下姬僕小有過者即挑目火灼妻夏氏畏其慘毒竟離婚為尼又好飲人血左右姬媵多刺其臂以吮之晉契丹阿保機少帝天福九年入㓂陷具博及畧諸縣邑所至皆撫寧之給以符牒賞以服章及戚城小戰不勝博州大䘐青州阻絶遂大怒華人所俘百姓屠死者不可勝紀成擒軍士皆炮烙之開運二年又犯廣晉州西北界邢雒磁三州虜殺殆盡束藴扵大桑樹炷火燒之仍詫樹曰我知紫披襖出扵爾身豈容汝活邪漢髙祖初自汴北回陷相州殺留後梁暉遂屠其城翌日北去命髙唐英鎮之唐英閱城中遺民得男女七百人而已乾道中王繼宏鎮相州扵城中得髑髏十五萬殺人之數從可知也册府元龜巻九百九十七
