body:
  text: 册府元龜卷一百八十七宋王欽若等撰閏位部勲業第五梁太祖神武元聖孝皇帝宋州碭山縣人也未冠而孤母王氏携養寄於蕭縣人劉崇之家帝既壯以雄勇自負唐僖宗乾符中關東薦饑羣賊嘯聚黄巢因之起於曹濮饑民願附者凡數萬帝乃辭崇家與仲兄存俱入巢軍以力戰屢㨗得補為隊長唐廣明元年十二月甲申黄巢陷長安遣帝領兵屯於東渭橋是時夏州節度使諸葛爽率所部屯于櫟陽巢命帝招諭爽爽遂降於巢中和二年二月巢以帝為東南面行營先鋒使令攻南陽下之六月帝歸長安巢親勞於㶚上七月巢遣帝西拒邠岐鄜夏之師於興平所至皆立功二年二月巢以帝為同州防禦使使自攻取帝乃自丹州南行以擊左馮㧞之遂據其郡時河中節度使王重榮屯兵數萬糾合諸侯以圖興復帝時與之鄰封屢為重榮所敗遂請濟師於巢表章十上為偽軍使孟楷所蔽不逹又聞巢軍勢䠞諸校離心帝知其必敗九月帝遂與左右定計斬偽監軍使嚴貴舉郡降於重榮重榮即日飛章上奏時僖宗在蜀覧表而喜曰是天賜予也乃詔授帝左金吾衞大將軍充河中行營副招討使仍賜名全忠自是帥所部與河中兵士偕行所向無不克㨗三年三月僖宗制授帝宣武軍節度使依前充河中行營副招討使仍令候收復京闕即得赴鎭四月巢軍自藍關南走帝與諸侯之帥俱收長安乃率部下一旅之衆仗節東下七月丁卯入於梁苑是時帝年二十有二時蔡州刺史秦宗權與黄巢餘孽合從肆虐共圍陳州乆之僖宗乃命帝為東北面都招討使時汴宋連年阻饑公私俱困帑廪皆虗外為大敵所攻内則驕軍難制交鋒接戰日甚一日人皆危之惟帝銳氣益振是歲十二月帝領兵於鹿邑與巢衆相遇縱兵擊之斬首二千餘級乃引兵入亳州因是兼有譙郡之地四年春帝與許州田從異下諸軍同收瓦子寨殺賊數萬衆是時陳州四面賊寨相望驅虜編氓殺以充食號為舂磨寨帝分兵翦撲大小凡四十戰四月丁巳收西華寨賊將黄鄴單騎奔陳帝乘勝追之鼔噪而進會黄巢遁去遂入陳州刺史趙犨迎於馬前俄聞巢黨尚在陳北故陽壘帝遂逕歸大梁是時河東節度使李克用奉僖宗詔統騎軍數千同謀破賊與帝合勢於中牟北邀擊之賊衆大敗於王滿渡多束手來降時賊將霍存葛從周張歸厚張歸霸皆匍匐於馬前悉宥而納之遂逐殘宼東至於宛句五月甲戌帝與晉軍振旅歸汴舘克用於上源驛既而備犒宴之禮克用乘醉任氣帝不平之是夜命甲士圍而攻之會大雨雷電克用因得於電光中踰垣遁去惟殺其部下數百人而已六月陳人感觧圍之惠為帝建生祠堂於其郡是歲黄巢雖沒而蔡州秦宗權繼為巨孽有衆數萬攻陷鄰郡殺掠吏民屠害之酷更甚巢賊帝患之七月遂與陳人共攻蔡賊於溵水殺數千人九月己未僖宗就加帝檢校司徒同平章事封沛郡侯食邑千户光啓元年春蔡賊掠亳潁二郡帝帥師以救之遂東至於焦夷敗賊衆數千生擒賊將殷鐵林梟首以狥于軍而還三月僖宗自蜀還長安改元光啓四月戊辰就加帝檢校太保增食邑千五百戸十二月河中太原之師逼長安觀軍容使田令孜奉僖宗出幸鳳翔二年春蔡賊益熾時唐室㣲弱諸道州兵不為王室所用故宗權得以縱毒連陷汝洛懷孟唐鄧許鄭圜幅數千里殆絶人煙惟宋亳滑潁僅能閉壘而已帝累出兵與之交戰然或勝或負人甚危之三月庚辰僖宗降制就封帝為沛郡王是月僖宗移幸興元五月嗣襄王温僣即帝位於長安改元為建貞遣使齎偽詔至汴帝命焚之于庭未幾襄王果敗七月蔡人逼司州節度使鹿宴𢎞使來求救帝遣葛從周等率師赴援師未至而城陷宴𢎞為蔡賊所害十一月滑州節度使安師儒以怠於軍政為部下所殺帝聞之乃遣朱珍李唐實襲而取之由是遂有滑臺之地十二月僖宗降制就加帝檢校太傅改封呉興郡王食邑三千户是歲鄭州為蔡賊所陷刺史李璠單騎來奔帝宥而納之以為行軍司馬宗權既得鄭益驕帝遣裨將邏於金隄驛與賊相遇因擊之賊衆大敗追至武陽橋斬首千餘級帝毎與蔡人戰於四郊既以少擊衆常出竒以制之但患師少未快其㫖宗權又以已衆十倍於帝恥於頻敗乃誓衆堅決以攻夷門既而獲蔡之謀者備知其事遂謀濟師焉三年春二月乙巳承制以朱珍為淄州刺史俾募兵於東道且慮蔡人暴其麥苖期以夏首回歸珍既至淄棣旬日之内應募者萬餘人又潛襲青州獲馬千匹鎧甲稱是乃鼓行而歸四月辛亥逹於夷門帝喜曰吾事濟矣是時賊將張晊屯於北郊秦賢屯於版橋各有衆數萬樹栅相連二十餘里其勢甚盛帝謂諸將曰此賊方今息師蓄銳俟其時必來攻我况宗權度吾兵少又未知珍來謂吾畏懼止於堅守而已今出不意不如先擊之乃親引兵攻秦賢寨將士踊躍爭先賊果不備連㧞四寨斬首萬餘級時賊衆以為神助庚午賊將盧塘領萬餘人於圃田北萬勝戍夾汴水為營跨河為梁以扼運路帝擇精銳以襲之是日昏霧四合兵及賊壘方覺遂突入掩殺赴水死者甚衆盧塘自投于河河南諸賊連敗不敢復駐皆併在張晊寨自是蔡冦皆懷震讋往往軍中自相驚亂帝旋師休息大行犒賞繇是軍士各懷憤激毎遇敵無不奮勇五月丙子出酸棗門自卯至未短兵相接賊衆大敗追斬二十餘里僵仆相枕宗權恥敗益縱其虐乃自鄭州親領突將數人徑入張晊寨其日晩大星殞於賊壘有聲如雷辛巳兖鄆滑軍士皆來赴援乃陳兵於汴水之上旌旗器甲甚盛蔡人望之不敢出寨翼日分布諸軍齊攻賊寨自寅至申斬首二萬餘級會夜收軍獲牛馬輜重生口器甲不可勝計是夜宗權晊遁去遲明追之至陽武橋而還宗權至鄭州乃盡焚其廬舎屠其郡人而去始蔡人分兵冦陜雒孟懷許汝皆先據之因是敗也賊衆恐懼咸棄之而遁帝乃愼選將佐俾完緝壁壘為戰守之備於是逺近流亡復歸者衆矣是時揚州節度使高駢為裨將畢師鐸所害復有孫儒楊行密互相攻伐朝廷不能制乃就加帝檢校太尉兼領淮南節度使九月亳州裨將謝殷逐刺史宋衮自據其郡帝親領軍屯於太清宮遣霍存討平之帝之禦蔡㓂也鄆州朱宣兖州朱瑾皆領兵來援及宗權既敗帝以宣瑾宗人也又有力於巳皆厚禮以歸之宣瑾以帝軍士勇悍私心愛之乃密於曹濮界上縣金帛以誘之帝軍利其貨而赴者甚衆帝乃移檄以讓之自朱宣來詞不遜乃命朱珍侵曹伐濮以懲其姦未幾珍伐曹州執刺史丘禮以獻遂移兵圍濮兖鄆之釁自茲而始矣十月僖宗命水部郎中王贊撰紀功碑以賜帝是月帝親騎數千巡師於濮上因破朱瑄援軍於范縣丁未攻陷濮州刺史朱裕單騎奔鄆尋為鄆人所敗踰月乃還十二月僖宗遣使賜帝鐵劵又命翰林承㫖劉崇望撰德政碑以賜帝閏月甲寅帝請行軍司馬李璠權知淮南留後乃遣大將郭言領兵援送以赴揚州文德元年正月帝率師東赴淮海行次宋州聞楊行密已拔揚州遂還是時李璠郭言行至淮上為徐戎所扼不克進而還帝怒遂謀伐徐二月丙戌僖宗制以帝為蔡州四面行營都綂繇是諸鎭之師皆受帝之制度三月庚子昭宗即位是月蔡人䂖璠領萬衆以剽陳亳帝遣朱珍率精騎數千擒璠以獻四月戊辰魏博樂彦禎失律其子從訓出奔相州使來乞師帝遣朱珍領上軍濟河連收黎陽臨河二邑既而魏軍推小校羅𢎞信為帥𢎞信既立遣使送欵於汴帝優而納之遂命班師是月河南尹張全義襲李罕之於河陽克之罕之單騎出奔因乞師於太原李克用為發萬騎以援之罕之遂收其餘衆與晉軍合勢急攻河陽全義危急遣使求救於汴帝遣丁㑹牛存節葛從周領兵赴之大戰於溫縣晉人與罕之俱敗於是河橋觧圍全義歸於河陽因以丁㑹為河陽留後五月己亥昭宗制以帝檢校侍中增食邑三千户戊辰詔改帝鄉曰衣錦鄉里曰沛王里是月帝以兼有洛孟之地無西顧之患將大整師徒畢力誅蔡㑹蔡人趙德諲舉漢南之地以歸於朝廷且遣使送欵於帝仍誓戮力同討宗權帝表其事朝廷因以德諲為蔡州四面副都統又以河陽保義義昌三節度為帝行軍司馬兼糧料應接使至是帝領諸侯之師㑹德諲以伐蔡敗蔡賊於汝水之上遂傅其城五日之内樹二十八寨以環之盖象列㝛之數也時帝親臨矢石一日飛矢中其左腋血漬單衣顧謂左右曰勿洩九月以糧運不繼遂班師是時帝知宗權殘孽不足為患遂移兵以伐徐十月先遣朱珍領兵與時溥戰於呉康鎭徐人大敗連收豐蕭二邑溥携散騎馳入彭門帝命分兵以攻宿州刺史張友携符印以降既而徐人閉壁堅守遂命龎師古屯兵守之而還是月蔡賊孫儒攻陷揚州自稱淮南節度使龍紀元年正月龎師古攻下宿遷縣進軍於呂梁時溥領軍二萬晨壓師古之軍而陣師古促戰敗之斬首二千餘級溥復入於彭門二月蔡將申叢遣使來告縳秦宗權於帳下折其足而囚之矣帝即日承制以叢為淮西留後未幾叢復為都將郭璠所殺是月璠執宗權來獻帝遣行軍司馬李璠牙校朱克讓檻進於長安既至昭宗御延喜樓受俘即斬宗權於獨柳樹下蔡州平昭宗詔加帝食實封一百户賜莊宅各一區三月又加帝檢校太尉兼中書令進封東平王賞平蔡之功也大順元年四月丙辰宿州小將張筠逐刺史張紹光擁衆以朋時溥帝率親軍討之殺千餘人筠遂堅守乙卯時溥出兵暴碭山縣帝遣朱友裕以兵襲之敗徐軍三千餘衆獲沙陁援軍石君和等三十人斬於宿州城下六月辛酉淮南孫儒遣使修好於帝帝表其事請以淮南節度授于儒焉辛未昭宗命帝為宣義軍節度使充河東東面行營招討使時朝廷宰臣張濬將兵討太原故也八月甲寅昭義都將馮霸殺沙陁所署節度使李克恭來降帝請河陽節度使朱崇節為潞州留後戊辰李克用自率蕃漢步騎數萬以圍潞州帝遣葛從周率驍勇之士夜中啣枚犯圍而入於潞九月壬寅帝至河陽遣都將李讜引軍趨渾潞行至馬牢川為晉人所敗帝又遣朱友裕張全義率精兵至渾州北以為應援既而崇節從周棄潞來歸戊申帝廷責諸將敗軍之罪斬李讜李重裔以狥遂班師焉十月乙酉帝自河陽赴滑臺時奉詔將討太原先遣使假道于魏魏人不從先是帝遣行人雷鄴告糴于魏既而為牙軍所殺羅𢎞信懼故不敢從命遂通好於太原十二月辛丑帝遣丁㑹葛從周率衆渡河取黎陽臨河又令龎師古霍存下淇門衛縣帝徐以大軍繼其後二年春正月魏軍屯於内黄丙辰帝與之接戰自内黄至永定橋魏軍五敗斬首萬餘級羅𢎞信懼遣使持厚幣請和帝命止其焚掠而歸其俘𢎞信繇是感悅而聽命焉乃收軍屯於河上八月己丑帝遣丁會急攻宿州刺史張筠堅守其壁會乃率衆於州東築堰壅汴水以浸其城十月壬午筠遂降宿州平十一月丁未曹州禆將郭紹賓殺刺史郭饒舉郡來降是月徐將劉知俊率衆二千來降自是徐軍不振十二月兖州朱瑾領軍三萬㓂單父帝遣丁會領大軍襲之敗於金鄉界殺二萬餘衆瑾單馬遁去景福元年正月遣丁會於兖州界徙其民數千户於許州二月戊寅帝親征鄆先遣朱友裕屯軍於斗門甲申次衛南有飛鳥止於峻堞之上鳴噪甚厲副使李璠曰將有不如意之事是夜鄆州朱瑄率歩騎萬人襲朱友裕於斗門友裕㧞軍南去乙酉帝晨救斗門不知友裕之退前至斗門者皆為鄆人所殺帝追襲鄆至瓠河不及遂領兵於村落間時朱宣尚在濮州丁亥遇朱宣率兵將歸於鄆遂來衝擊帝策馬南馳為賊所追甚急前有浚溝躍馬而過張歸厚援矟力戰於其後乃免時李璠與都將數人皆為鄆軍所殺五月丙午遣朱克譲率衆暴兖鄆之麥十一月遣朱友裕率兵攻濮州下之擒刺史邵儒以獻濮州平遂命移軍伐徐州二年八月帝遣龎師古移兵攻兖駐於曲阜與朱瑾屢戰皆敗之十二月師古遣先鋒葛從周引軍以攻齊州刺史朱威告急于兖鄆既而朱宣以援兵至遂固其壘乾寧元年二月帝親領大軍繇鄆州東路北次於魚山朱宣覘知即以兵徑至且圖速戰帝整軍出寨時宣瑾已陣於前須臾東南風大起帝軍旌旗失次甚懼失色帝即令騎士揚鞭呼嘯俄而西北風驟發時兩軍皆在草莽中帝因令縱火而煙燄亘天乗勢以攻賊陣宣瑾大敗殺萬餘人餘衆擁入清河因築京觀於魚山之下駐軍數日而還二年正月癸亥遣朱友恭帥師復伐兖遂塹而圍之未幾朱宣自鄆率歩騎援糧欲入于兖友恭設伏以敗之盡奪其餉於高呉因擒蕃將安福順安福慶二月己酉帝領親軍屯於單父以為友恭之援四月濠夀二州復為楊行密所陷是時太原遣將朱嚴兒李承嗣以萬騎馳入於鄆朱友恭遂歸於汴八月帝領親軍伐鄆至大仇遣前軍挑戰設伏於梁山以待之既而獲蕃将史完府奪馬數百匹朱宣脱身遁去復入於鄆十月帝駐軍於鄆齊州刺史朱瓊遣使請降瓊即瑾之從父兄也帝因移軍至兖瓊果來降未幾瓊為朱瑾所紿掠而殺之帝即以其弟玭為齊州防禦使十一月朱宣復遣將賀環柳存及蕃将何懷寶等萬餘人以襲曹州庶觧兖州之圍也帝知之自兖領軍䇿馬先路至鉅野南追而敗之殺戮将盡生擒賀環柳存何懷寶及賊黨三千餘人是日申時狂風暴起塵沙沸湧帝曰此乃殺人未足耳遂下令盡殺所獲囚俘風亦止焉翼日縶賀環等以示于兖帝素知環名乃釋之惟斬何懷寶於兖城之下乃班師十二月葛從周領兵復伐兖既至與朱瑾戰於壘下殺千餘衆擒其将孫漢筠已下二十人遂旋師三年正月河東李克用既破邠州欲謀爭覇乃遣蕃将張汚落以萬騎寨於河北之莘縣聲言欲救兖鄆魏博節度使羅𢎞信患之使來求援四月辛酉河東泛漲将壞滑城帝令決隄岸以分其勢為二河夾滑城而東為害滋甚是月帝遣許州刺史朱友恭領兵萬人渡淮以便宜從事時洪鄂二州累遣使求援故有是行五月命葛從周統軍屯于洹水以備蕃軍六月李克用帥蕃漢諸軍營于斥丘遣其男落落將鐵林小兒三千騎薄於洹水從周與戰大敗之生擒落落以獻克用悲駭請修舊好以贖其子帝不許遂執落落送于羅𢎞信斬之越七日我軍還屯陽畱以伐鄆八月復壁於洹水是時昭宗幸華州遣使就加帝檢校太師守中書令四年正月帝以洹水之師大舉伐鄆辛卯營于濟水之次龎師古令諸將撤木為橋乙未夜師古以中軍先濟聲振于鄆朱宣聞之棄壁夜走葛從周逐之至中都北擒宣并其妻男以獻尋斬汴橋下鄆州平乙亥帝入於鄆以朱友裕為鄆州兵馬留後時帝聞朱瑾與朱儼兒在豐沛間捜索糧饋惟留康懷英以守兖州帝因乗勝遣葛從周以大軍襲兖懷英聞鄆失守俄又我軍大至乃出降朱瑾朱儼兒遂奔淮南兖海沂密等州并平乃以葛從周為兖州留後八月陜州節度使王珙遣使來乞師是時珙弟琦實為蒲帥迭相憤怒日尋干戈而珙兵寡故來求援帝遣張存敬楊師厚等領兵赴陜既而與蒲人戰于猗氏大敗之九月帝以兖鄆既平將士雄勇遂大舉南征命龎師古以徐宿宋滑之師進趨清口葛從周以兖鄆曹濮之衆徑赴安豐淮人遣朱瑾領兵以拒師古因決水以浸軍遂為淮人所敗師古殁焉葛從周行及濠梁聞師古之敗亦命班師光化元年正月帝遣葛從周統諸將畧地於山東遂次于邢洺三月昭宗以帝兼領天平軍節度使餘如故四月滄州節度使盧廷彦為燕軍所攻棄城奔于魏魏人送于汴是月帝以大軍至鉅鹿屯於城下敗晉軍萬餘衆於青山口俘馬千餘匹丁卯遣從周分兵攻洺州斬刺史邢善益擒將五十餘人五月己巳邢州刺史馬師素棄城遁去辛未惠州刺史袁奉滔自剄而死五日之内連下三州因以葛從周兼邢州昭義軍節度留後帝遂班師是時襄州節度使趙匡凝聞帝軍有清口之敗密附於淮夷七月帝遣氏叔琮率師伐之未幾其泌州刺史趙璠越墉來降隨州刺史趙琳臨陣就擒二年正月淮南楊行密舉全呉之衆精甲五萬以伐徐州帝領大軍禦之行密聞帝親征乃收軍而退時幽州節度使劉仁恭大舉蕃漢兵號十萬以伐魏遂攻陷貝州州民萬餘户無少長悉屠之進攻魏州魏人來乞師帝遣朱友倫張存敬李思安等先屯于内黄帝遂親征三月與燕軍戰于内黄北燕軍大敗殺二萬餘衆奪馬二千餘匹擒都將單無敵已下七十餘人是月葛從周自山東領其部衆馳以救魏翼日乘勝諸將張存敬已下連破八寨遂逐燕軍北至於臨清擁其殘㓂於御河溺死者甚衆仁恭奔於滄州六月帝表丁㑹為潞州節度使以李罕之疾亟故也又遣葛從周繇固鎭路入于潞州以援丁會七月壬辰朔海陳漢賓擁所部三千奔于淮南戊戌晉人陷澤州帝遣召葛從周於潞留賀德倫以守之未幾德倫為晉人所逼遂棄潞而歸繇是潞州復為晉人所有十一月陜州都將朱簡殺留後李璠自稱留後送欵于帝三年四月遣葛從周以兖鄆滑魏之師伐滄州五月庚寅攻德州㧞之梟刺史傅公和於城上己亥進攻浮陽六月燕師劉仁恭大舉來援從周與諸將逆戰于乾寧軍老鴉隄大破之殺萬餘衆俘其將佐馬愼交已下百餘人既而以連雨遂班師八月河東遣李進通襲滔洺州執刺史朱紹宗帝遣葛從周自鄴縣渡漳水屯于黄龍鎭親領中軍渉洺而寨晉人懼而宵遁洺州復平九月帝以仁恭進通之入㓂也皆繇鎭定為其嚢橐即以葛從周為上將以伐鎭州遂攻下臨城渡滹沱以環其城帝領親軍繼至鎭帥王鎔懼納質請盟仍獻文繒二十萬以犒戎士帝許之十月晉人以帝宿兵於趙遂南下大行急攻河陽留後侯言與都將閻寶力戰固守僅而獲全十一月以張存敬為上將自甘陵發軍北侵幽薊連拔瀛莫二郡遂移軍以攻中山定帥王郜以精甲二萬戰于懐德亭盡殪之郜懼奔于太原遲明大軍集于城下郜季父處直持印鑰乞降亦以繒帛三十萬為獻帝即以處直代郜領其鎭焉是月燕人劉守光赴援中山寨于易水之上繼為康懷英張存敬等所敗斬獲甚衆繇是河朔知懼皆弭伏焉是歲唐佐軍中尉劉季述幽昭宗於東宮内立皇子德王裕為帝仍遣其養子希度來言願以唐之神器輸於帝時帝方在河朔聞之遽還于汴大計未決會李振自長安使廻因言於帝曰夫竪刁伊戻之亂所以資覇者之事也今閹豎幽辱天子王不能討無以令諸侯帝悟因請振復使于長安與時宰潛謀反正天復元年正月乙酉朔唐宰相崔裔潛使人以帝密㫖告於侍衛軍將孫德昭已下令誅左右中尉劉季述王仲先等即時迎昭宗於東内御樓反正癸巳降制進封帝為梁王酬反正之功也昭宗之廢也汴之邸吏程巖牽昭宗衣下殿帝聞之召巖至汴折其足送于長安杖殺之是時河中節度使王珂結援於太原帝怒遣大將張存敬率將渉河繇含山路鼓行而進戊申攻下絳州壬子晉州刺史張漢瑜舉郡來降帝即以大將侯言權領晉州何絪權領絳州晉絳平己未大軍至河中存敬命繚其垣而攻之壬戌蒲人颺素幡以請降庚午帝至河中以張存敬權領河中軍府事河中平帝乃東遷是月李克用遣牙將張特來聘請尋舊好帝亦遣使報命三月癸未朔帝歸自河中是月遣大將賀德倫氏叔琮領大軍以伐太原叔琮等自大行路入魏博都將張文恭自磁州新口入葛從周以兖鄆之衆自土門路入洺州刺史張歸厚以本軍自馬嶺入定州刺史以本軍自飛狐入晉州侯言自隂地入澤州刺史李存璋棄郡奔歸太原叔琮引軍逼潞州節度使遷乞降河東屯將李審建王周領歩軍一萬騎二千詣叔琮歸命乃進軍趨太原四月乙卯大軍出石會關營於洞渦驛都將白奉國自井陘入收承天軍張歸厚引兵至遼州刺史張鄂迎降氏叔琮日與諸軍至陽城下城中雖時出精騎來戰然危蹙至甚將謀遁矣會叔琮以芻糧不給遂班師五月癸卯昭宗以帝兼領䕶國軍節度使河中尹六月庚申帝發自大梁丁卯視事於河中七月甲寅帝東還梁邸十月戊戌奉密詔赴長安是時朝廷既誅劉季述以韓全誨張𢎞彦為兩軍中尉袁易簡周敬容為樞密使是時軍國大政專委宰相崔𦙍毎事裁抑宦官宦官側目崔一日於便殿奏欲盡去之全誨等屬垣聞之嘗於昭宗前祈哀自訴自是昭宗勑崔毎有密奏令進囊封全誨等乃訪京城美婦人十數以進使求宮中隂事昭宗不悟崔謀漸泄中官視崔眥裂以重賂丼言誘藩臣以為城社時因讌聚則相向流涕時崔掌三司貨泉全誨等教禁兵伺崔出聚而呼譟訴以冬衣減損又於昭宗前訴之昭宗不得已罷崔知政事崔怒急召帝請以兵入輔故有是行戊申行次河中同州留後司馬鄴華之幕吏也舉郡來降辛亥駐軍於渭濱華帥韓建遣使奉牋納欵又以銀三萬兩助軍是日行次零口癸丑聞長安亂昭宗為閹宦韓全誨等刼遷西幸鳳翔盖避帝之兵鋒也翼日遂命旋師夕次于赤水乙卯大軍集于華州下城韓建惶駭失措即以城降丙辰帝表建權知忠武軍事促令赴任同華二州平是時唐太子太師盧知猷等二百六十三人列狀請帝速請迎奉己未遂帥諸軍發自赤水壬戌次于咸陽偵者云天子昨暮至岐山旦日宋文通扈蹕入其闉矣是時岐人遣大將符道昭領兵萬人屯於武功以拒帝帝遣唐懷英敗之虜甲士六千餘衆乙丑次于岐山文通遣使奉書自陳其失請帝入覲丙辰及岐闉文通渝約閉壁不獲通復次于岐山是時昭宗累遣使齎朱書御札賜帝遣帝收軍速還本道帝診之曰此必文通全誨之謀也皆不奉詔癸酉飛章奉辭且移軍北伐乙亥至邠州節度使李繼徽舉城降繼徽因請去文通所賜李姓復本宗楊氏又請納其帑以為質帝皆從之仍易其名曰崇本邠州平己丑唐丞相崔裔京兆尹鄭元規至華州以速迎奉為請許之二年正月帝復次於武功岐人堅壁不下乃迴軍於河中二月聞晉軍大舉南下聲言來援鳳翔帝遣朱友寧帥師㑹晉州刺史氏叔琮以禦之帝以大軍繼其後三月友寧叔琮與晉軍戰于晉州之北大敗之生擒克用男廷鸞帝喜謂左右曰此岐人之所恃也今既如此岐之變不乆矣四月岐人遣符道昭領大軍屯于虢縣康懷帥驍騎敗之丁酉唐丞相崔裔自華來謁帝屢述艱運危急事不可緩又慮羣閹擁昭宗幸蜀且告帝為之動容崔將辭啓宴于府署帝舉酒崔情激於哀因自持樂版聲曲以侑酒帝甚悅座中以良馬珍玩賚之既行命諸將繕戎具五月丁巳帝復西征六月丁丑次於虢縣癸未與岐軍大戰自辰至午殺萬餘衆擒其將校數百人乗勝遂逼其壘七月丙午岐軍復出求戰帝軍不利是月遣孔勍帥師取鳳隴成三州皆下之是時岐人相率結寨於諸山以避帝軍帝分兵以討之浹旬之内竝平之九月甲戌帝以岐軍諸寨聨結稍盛因親統千騎登高診之是時帝以岐人堅壁不戰且慮師老思欲旋斾以歸河中因密召上將數人語其事時親從指揮使高季昌獨挺出抗言曰天下雄傑窺此舉者一歲矣今岐人已困願少俟之帝嘉其言因曰兵法以正理以竒勝竒者詐也乘機集事必由是乎乃命季昌密募人入岐以紿之尋有騎士馬景堅願應命且曰是行也必無生理願戮其孥帝悽然止其行景固請乃許之明日軍出諸寨屏匿如無人景因躍馬西走直叩岐闉詐以軍怨東遁為告且言列寨尚留萬餘人俟夕將遁矣宜速掩之李茂貞信其言遽啓二扉悉衆來宼時諸軍已介馬待之中軍一皷百營俱進又分遣數騎以據其闉岐人進不能駐其趾退不能入其壘殺戮蹂踐不知其數茂貞繇是䘮膽但閉壁而已十一月癸卯鄜帥李周彜統兵萬餘人屯于岐之北原與城中舉烽以相應翼日帝以周彜既離本部鄜畤必無守備因命孔勍乗虛襲下之甲寅鄜州平周彜聞之收軍而遁茂貞既失鄜州之援愕然有瓦觧之懼繇是議還警蹕誅閹寺以自贖焉三年正月甲寅岐人啓壁昭宗降使宣問慰勞兼傳密㫖尋又命翰林學士韓渥趙國夫人龎顔齎詔押賜帝紫金酒器御衣玉𢃄丙辰華州留後李存審遣飛騎來告青州節度使王師範遣牙將張厚輦甲胄弓槊詐言來獻欲盜據州城事覺已擒之矣是日師範又遣其將劉鄩盜據兖州丁巳昭宗遣中使押送軍容使韓全誨已下三十餘人首級以示帝甲子昭宗發離鳯翔幸左劒寨權駐蹕帝營帝素服待罪昭宗命學士傳宣免之帝即入見稱罪拜伏者數四既而促召升殿密邇御座且曰宗廟社稷是卿再造朕與親屬是卿再生因觧所御玉帶面以賜帝亦以玉鞍勒馬金器紋錦御饌酒果等躬自拜進焉及翠華東行帝匹馬前導十餘里宣令止之己巳昭宗至長安謁太廟御長樂樓禮畢謂帝曰朕生入舊京是卿之力也自古救君之危曾無有如是者况今日再及清廟得親奉觴酒奠於先皇帝室前卿之德朕知不能報矣即召帝執手聲淚俱發者乆之翼日誅宦官第五可範等五百餘人于内侍省三月庚辰制以帝為守太尉兼中書令宣武宣義天平䕶國等軍節度使諸道兵馬副元帥加食邑三千戸實封四百户仍賜回天再造竭忠守正功臣戊戌帝建斾東還昭宗御延熹樓送之既醉遣内臣賜帝御製楊柳詞五首三月戊午至大梁時以青州未平命軍士休澣以俟東征四月丙子帝巡師於臨胊亟命逼其城與青州戰于城下大敗之是夕淮將王景仁以所部援軍宵遁帝遣楊師厚追及輔唐殺千人乘勝攻下密州八月戊辰以伐叛之柄委于楊師厚帝乃東還九月癸卯師厚率大軍與王師範戰于臨胊青軍大敗殺萬餘人并擒師範弟既克卯時徙寨以逼其城辛亥偏將劉重覇擒棣州刺史邵播來獻播師範之謀主也帝命斃之戊午師範舉城請降青州平翼日分命將校畧地於登萊淄棣等州皆下之繇是東漸至海皆為梁土也帝復命師範權知青州軍事師範乃請以錢二十萬貫犒軍帝許之十月辛巳䕶駕都指揮使朱友倫因擊鞠墮馬卒于長安節至帝大怒以為唐室大臣欲謀叛已致友倫暴死十一月丁酉青將劉鄩舉兖州來降鄩王師範之將也師範令竊據兖州乆之及聞師範降鄩乃歸命帝以鄩善事其主待之甚優尋署為元帥府都押牙權知鄜州留後天祐元年正月己酉帝發自大梁西赴河中京師聞之為之震懼是時將議迎駕東幸洛陽慮唐室大臣異議帝乃密令䕶駕都指揮使朱友諒矯昭宗命收宰相崔裔京兆尹鄭元規等殺之時又邠岐兵士侵逼京畿帝因是上表堅請昭宗幸洛昭宗不得已而從之帝乃率諸道丁匠財力同搆洛陽宮不數月而成二月乙亥昭宗駐蹕於陜帝自河中來覲謁見行營因灑涕而言曰李茂貞等竊謀禍亂將迫乘輿老臣無狀請陛下東遷為社稷大計也昭宗延命於寢室見何皇后面賜酒器及衣物何后謂帝曰此後大家大婦委身於全忠矣因􅒣欷泣下後數日帝開宴於陜之私第請駕臨幸翼日帝辭歸洛陽昭宗開内宴時有宮人與昭宗附耳而語韓建躡帝之足帝遽出以為圖已因連上章請車駕幸洛三月丁未昭宗制以帝兼判左右神䇿及六軍諸衛事是時昭宗累遣中使及内夫人傳宣謂帝曰皇后方在草蓐未任就路欲以十月幸洛帝以陜州小藩非萬乘乆留之地時以四月内東幸閠月丁酉昭宗發自陜郡壬寅次于糓水是時昭宗左右唯小黄門及打毬供奉内園小兒共二百餘人帝猶忌之是日密令醫官許昭逺告變乃設饌於别幄召而盡殺之皆坑于幕下先是選二百餘人形貌大小一如内園人物之狀至是使一人擒二人縊於坑所即蒙其衣及戎具自飾昭宗初不能辨乆而方察自是昭宗左右前後皆梁人矣甲辰車駕至洛都帝與宰相百官導駕入宮乙卯昭宗以帝為宣武宣義䕶國忠武四鎭節度使時帝請以鄆州授張全義故有此命五月丙寅昭宗宴羣臣曰昨來御樓前一夜亡失赦書頼梁王收得副本不然誤事宰執不得無過矣是日宴次昭宗入内召帝於内殿曲宴帝不測其事不敢奉詔又曰卿不欲來即令敬翔入來帝密遣翔出乃止己巳奉辭東歸乙亥至大梁六月帝遣都將朱友裕率師討邠州節度使楊崇本叛故也癸丑帝西征遂朝於洛陽七月甲子昭宗宴帝於文思踘塲乙丑帝發東都壬申至河中八月壬寅昭宗遇弑於大内遺制以輝王祝為嗣乙巳帝自河中引軍而西癸丑次於永夀邠軍不出九月辛未班師十月癸巳至洛陽詣西内臨於梓宮前畢祗見于嗣君辛丑制以帝至自西征十一月辛酉光州遣使來求援時光州歸欵於帝尋為淮人所攻故來乞師戊寅帝南征度淮次于霍丘大掠盧夀之境淮人乃棄光州而去二年正月庚申進攻夀州夀人堅壁不出丁亥帝自霍丘班師二月辛卯帝至自南征甲午青州節度使王師範至大梁帝待以賓禮尋表授河陽節度七月辛酉天子賜帝迎鑾紀功碑樹于洛陽庚午遣大將軍楊師厚率前軍討趙匡凝于襄州辛未帝南征表匡凝罪狀請削奪官爵八月楊師厚進收唐鄧復郢隨均房等七州帝駐軍漢江北自循江干徑度濟師之所九月甲子師厚於隂谷江口造梁以濟師匡凝率兵二萬振于江濱師厚麾兵進擊襄人大敗殺萬餘衆乙丑匡凝焚其州率親軍載輕舸㳂漢而遁丙寅帝濟江至中流舟壞將沒者數四比及岸舟沉是日入襄城帝因周視府署其帑藏悉空惟於西廡下有一亭忩户儼然扄鎻甚密遂令破鏁啓扉中有一大匱緘鐍甚至又令破其匱内有金銀數百錠帝因歎曰亂兵既入公私財貨固無孑遺矣此帑當有隂物主之不令常人所得俟我以有之邪遂以百餘錠賜楊師厚襲荆州留後趙匡明并城上峽奔蜀荆襄二州平帝以都將賀環權領荆州楊師厚權領襄州即表其事十月丙戌朔天子以帝為諸道兵馬元帥辛卯帝自㐮州引軍由光州路趨淮南將發敬翔切諫請班師以全軍勢帝不聽壬辰次於棗陽遇大雨頗阻師行之勢軍至壽春夀人堅壁清野以待帝帝乃退舎於正陽十一月丙辰大軍北濟帝至汝隂深悔淮南之行躁撓尤甚丁卯帝至自南征辛巳天子命帝為相國總百揆以宣武宣義天平䕶國天雄武順佑國河陽義武昭義保義武昭武定㤗寧平盧匡國武寧忠義荆南等二十一道為魏國進封帝為魏王入朝不趨劒履上殿讃拜不名兼備九錫之命癸未唐中書門下奏中書印已送相國中書公事權用中書省印甲申中書門下奏天下州縣名與相國魏王家諱同者請易之十二月乙酉朔帝讓相國魏王九錫之命丙戌京百司各差官齎本司須知孔目並印赴魏國送納甲午天子以帝堅譲九錫之命乃命宰相柳璨來使且述揖讓之意焉丁酉帝又讓九錫之命詔畧曰但以鴻名難掩懿實須彰宜且狥於奏陳未便行於典册又改諸道兵馬元帥為天下兵馬元帥是時帝以唐朝百官服飾多闕乃製造逐色衣服請朝廷等第賜之其所給俸錢仍請自來年正月全支三年正月幽滄稱兵將宼于魏魏人來乞師且以牙軍驕悍謀欲誅之遣親吏臧延範密告于帝帝隂許之乙丑北征先是帝之愛女適羅氏是月卒於鄴城因以兵仗数千實於槖中遣客將馬嗣勲領長直軍千人雜以工匠丁夫肩其槖而入于魏聲言為帝女以設祭魏人信而不疑庚午夜嗣勲率其衆與羅紹威親軍數百人同攻牙軍遲明盡殺之死者七千餘人泊于嬰孺亦無留者是日帝次于内黄聞之馳騎至魏時魏之大軍方與帝軍同伐滄州聞牙軍之死即時奔還帝之軍追及厯亭殺賊幾千餘衆乃擁大將史仁遇保于高唐帝遣兵圍之是月天子詔河南尹張全義部署修製相國魏王法物三月甲寅天子命帝總判鹽鐡度支户部等三司事帝再上章切譲之乃止四月癸未攻下高唐軍民無少長皆殺之生擒逆首史仁遇以獻命支觧之未幾又攻下澶博貝衛等州皆謂魏軍殘黨所據故也是時晉人圍邢州刺史牛存節堅壁固守帝遣符道昭帥師救之晉人乃遁去五月帝畧地于洺州既而復入于魏七月己未自魏班師是日收復相州自是魏境悉平壬申帝歸自魏八月甲辰以滄州未平復命北征九月丁卯營于長蘆一夕帝夣白龍附于兩肩左右瞻顧可畏怳然驚悟十月辛巳邠州楊崇本以鳳翔邠寧涇鄜秦隴之衆合五六萬來冦屯于美原列十五寨其勢甚盛帝命同州節度使劉知俊都將康懷英帥師禦之知俊等大破邠㓂殺二萬餘衆奪馬三千餘匹擒其列校百餘人楊崇本胡章僅以身免十一月庚戌康懷英乘勝進軍遂收鄜州十二月乙丑帝以文武常參官毎月一五九日赴朝奏請備廊飡詔從之閏月晉人燕人同攻潞帥丁㑹舉城降于太原帝聞之遂自長蘆班師以寨内糗糧山積帝命焚之滄帥劉守文以城中絶食因致書于帝乞留餘糧以救饑民帝為留十餘囷以與之四年正月丁亥帝迴自長蘆次于魏州節度使羅昭威以帝迴軍慮有不測之患由是供億甚至因密以天人之望切陳之帝雖拒而不納然心德之壬寅帝至自長蘆甲辰天子遣御史大夫薛貽矩來傳禪代之意貽矩謁帝陳北面之禮帝揖之升階貽矩曰殿下功德及人三靈所卜已定皇帝方議裁詔行舜禹之事臣安敢違既而拜伏於砌下帝側躬以避之四月内出傳國寶玉册受禪寶及文物儀仗朝于梁國改元開平册府元龜卷一百八十七
