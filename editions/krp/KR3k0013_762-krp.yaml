body:
  text: 册府元龜卷七百六十二宋王欽若等撰總錄部忠義第三北齊高乾仕魏為司徒中兵遷員外孝莊在藩乾濳相託附兄弟本有從横志及爾朱殺害人士乾謂天下遂亂乃率河北流人於河濟之間受葛榮官爵屢敗齊州士馬莊帝尋遣右僕射元羅廵撫三齊乾兄弟相率出降朝廷以乾為給事黄門侍郎爾朱榮以乾不應居近要莊帝聽乾解官歸鄉里榮死乾馳赴雒陽莊帝見之大喜時爾朱黨擁兵在外莊帝以乾為金紫光祿大夫河北大使令招集鄉閭為表裏形援乾垂涕奉詔弟昂㧞劔起舞請以死自效俄而爾朱兆入雒尋遣其監軍孫白鷂百餘騎至冀州託言普徵民馬欲待乾兄弟送馬因收之乾既有報復之心白鷂忽至知將見圖乃先機定䇿濳勒壯士襲據州郡殺白鷂執刺史元仲宗推封隆之權行州事為莊帝舉哀三軍縞素乾昇壇誓衆辭氣激揚涕泪交下將士莫不哀憤昂初為魏直閣將軍昂以冦難尚繁非一夫所濟乃請還本鄉招集部曲仍除通直常侍加平北將軍所在義勇競來投赴尋值京師不守遂與父兄據信都起義劉海寶少輕俠然為州里所愛高昂之起義也海寶率鄉閭襲滄洲以應昂昂以海寶權行滄州事前范陽太守刁整心附爾朱遣弟子安壽襲殺海寶弟叔宗仍歸於昂中興初高祖除前將軍廷尉少卿封隆之魏永安中為河内太守加持節後將軍假平北將軍當郡都督未及到郡屬爾朱兆入雒隆之以父遇害常懐報雪因此遂持節東歸圖為義舉時高乾告隆之曰爾朱暴逆禍加至尊弟與兄等並荷先帝殊常之眷豈可不出身為主以報讐雪恥乎隆之對曰國恥家怨痛入骨髓乗機而動今實其時遂與乾等定計夜襲州城克之乾等以隆之素為鄉里所信乃推為刺史隆之盡心慰撫人情感悅尋高祖自晉陽東出隆之遣子繪奉迎於滏口高祖甚悅之既至信都集諸州郡督將僚吏等議曰逆賊爾朱兆窮凶極虐天地之所不容人神之所擯棄今所在蜂起此天亡之時也欲與諸君剪除凶羯其計安在隆之對曰爾朱暴虐天亡斯至神怒民怨衆叛親離雖握重兵其强易弱而大王乃心王室首揭義旗天下之人孰不歸仰願大王勿疑中興初拜左光祿大夫後周韓雄少敢勇膂力絶人自魏孝武西遷雄便慷慨有立功之志大統初遂與其屬六十餘人於雒西舉兵數日間衆至千人與河北行臺楊琚共為犄角抄掠東魏所向克獲徒衆日盛州縣不能禦之東魏雒州刺史韓賢以狀聞鄴乃遣其軍司慕容紹宗率兵與賢合勢討雄戰數十合雄衆畧盡兄及妻子皆為賢所獲將以為戮乃遣人告雄曰若雄至皆免之雄與其所親謀曰奮不顧身以立功名者本望上申忠義下榮親戚今若忍而不赴人謂我何既免之後更思其計未為晩也於是遂詣賢軍即隨賢還雒乃濳引賢黨謀欲襲之事泄遁免時太祖在宏農雄至上謁太祖嘉之封武陽縣侯楊寛父均初仕魏為北道大行臺恒州刺史寛從均以功拜行臺郎中廣陽王深與寛素相委昵深犯法得罪寛被逮捕孝莊帝時為侍中與寛有舊藏之於宅遇赦得免除宗正丞北海王顥少相器重時為大行臺北征葛榮欲啟寛為左右丞與參謀議寛辭以孝莊厚恩未報義不見利而動顥未之許顥妹婿李神軌謂顥曰楊寛義士也匹夫猶不可奪志况義士乎王今强之以行亦恐不為人用顥乃止孝莊踐阼拜通直散騎侍郎盧光初仕魏為員外侍郎及孝武西遷光於山東立義遥授大都督晉州刺史大統六軍擕家西入太祖深禮之除丞相府記室參軍柳霞仕後梁為大將軍開府儀同三司梁宣帝踐帝位於江陵以襄陽歸周霞乃辭宣帝曰陛下中興鼎運龍飛舊楚臣昔因幸會早奉名節理當以身許國期之始終自晉氏南遷臣宗族蓋寡從祖太尉世父儀同從父司空並位望隆重遂家於金陵唯留先臣獨守墳栢嘗誡臣等使不違此志今襄陽既入北朝臣若陪隨鑾蹕進則無益塵露退則有虧先㫖伏願曲垂鑒炤亮臣此心宣帝不違其志遂許之因留鄉里以經籍自娯太祖世宗頻有徵命霞固辭以疾及宣帝殂霞舉哀行舊君之服保定中又徵之霞始入朝侯植後魏正光中起家奉朝請尋而天下大亂盜賊蜂起植乃散家財募勇討賊以功拜統軍隋柳機初仕後周為華州刺史高祖作相徵還京師時周代舊臣皆勸禪讓機獨義形於色無所陳請房彦謙仕齊為齊州主簿及周師入鄴齊王東奔以彦謙為齊州治中彦謙痛本朝傾覆將糾率忠義濳謀翊輔事不果而止齊亡歸於家榮建緒仕周為載師下大夫與高祖有舊高祖為丞相建緒拜息州刺史將之官時高祖隂有禪代之計因謂建緒曰且躊躇當共取富貴建緒自以周之大夫因義形於色曰明公此㫖非僕所聞高祖不恱建緒遂行開皇初來朝帝謂之曰卿亦悔否建緒稽首曰臣位非徐廣情類楊彪帝笑曰朕雖不解書語亦知卿此言不遜也周羅㬋仕陳為散騎常侍煬帝為晉王伐陳羅㬋督巴峽緣江諸軍事以拒秦王俊軍不得渡相持踰月遇丹陽䧟陳主被擒上江猶不下晉王遣陳主手書命之羅㬋與諸將大臨三日放兵士散然後乃降高祖慰喻之許以富貴羅㬋垂泣而對曰臣荷陳氏厚遇本朝淪亡無節可紀陛下所賜獲全為幸富貴榮祿非臣所望高祖甚器之陶世模仁壽初為嵐州司馬漢王諒反刺史喬鍾葵將赴之世模以義拒之臨之以兵辭氣不撓鍾葵義而釋之軍吏請曰若不斬模何以壓衆心於是被囚及諒平拜開府授大興令骨儀煬帝末為京兆郡丞衛𤣥領京兆内史唐公義兵至而𤣥恐禍及已遂稱老病無所干預儀與世師同心叶契父子並誅其後遂絶馮慈明大業末攝江都郡丞事李宻之逼東都詔慈明遣兵擊宻為宻黨崔樞所執宻延與坐諭以舉兵之意慈明曰直道事人有死而已不義之言非所敢對宻厚禮之冀其從己慈明濳使奉表江都及致書東都留守論賊形勢宻知其狀義而釋之出至營門為賊帥翟讓所瞋責慈明勃然曰天子使我來正欲除爾軰不圖為賊黨所獲我豈從汝求活耶欲殺何湏罵詈譲益怒亂刀斬之梁郡通守楊汪上狀煬帝歎惜之贈銀青光祿大夫拜其二子怦惇俱為尚書承務郎唐任瓌年十九初仕陳為衡州司馬都督王勇甚敬異之委以州府之務屬隋師滅陳瓌勸勇據嶺南求陳氏子孫立以為帝勇不能用以嶺外降隋瓌乃棄官而去盧祖尚光州人隋末宇文化及作亂州人請祖尚為刺史祖尚時年十九昇壇㰱血以誓其衆泣涕歔欷悲不自勝衆皆感激呂子臧隋末為南陽郡丞高祖遣馬元規撫慰山南子臧堅守不下元規遣使諷諭之前後數軰皆為子臧所殺及煬帝被弑高祖遣其女壻薛君倩齎手詔諭㫖子臧於是為煬帝發䘮成禮而後歸國拜鄧州刺史封南陽郡公王景暠河東聞喜人初呂崇茂之反宋金剛又冦澮州景暠率鄉黨千餘家據險而抗賊卒得保全太宗嘉之令檢校桐鄉令景暠苦辭不受改為驃騎將軍又不受高祖聞而徵之及見勞之曰卿固守忠誠克全鄉曲國有常典所以授官卿每辭不受何也景暠對曰抗拒逆人臣之常分臣不敢以為功桐鄉則臣之本縣州里之情臣不能無阿曲所以辭高祖善其對勞之曰卿識理者國有彛典豈得遂卿本意於是封為桐鄉侯加位開府焉王雄誕呉王杜伏威之將伏威入朝留輔公祐鎮江南而兵馬屬於誕公祐將為逆奪其兵拘之别室遣西門君儀諭以反計雄誕曰當今方太平呉王又在京輦國家威靈無逺不被公何得為族滅事邪雄誕有死而已不敢聞命公祐知不可屈遂縊殺之楊初成虢州人也天后廢中宗為廬陵王初成偽稱郎將矯制於都市募人欲迎廬陵王於房州事覺坐斬家口籍没中宗即位下制曰虢州人故楊初成徃者運屬殷憂志懐忠讜將迎六飛之駕反罹五刑之罰身既伏誅家又從坐言念誠節深可哀矜宜有褒榮式稱忠順可贈左驍衛翊府左郎将周憬壽春人為武當丞與王同皎叶謀誅武三思及事泄遁於比干廟中自刎而死臨終謂左右曰比干古之忠臣也儻神道聰明應知周憬忠而死也韋后亂朝樹寵邪侫武三思干上犯順虐害忠臣吾知其滅亡不久也可懸吾頭於國門觀其身首異門而出蘇安恒為習藝舘内教節愍太子之弑也武三思言安恒預其謀遂下獄死睿宗即位贈諌議大夫燕欽融為許州司戸叅軍時韋庻人干預國政盛封拜羣從子弟又與悖逆庻人及駙馬武延秀中書令宗楚客等將危社稷欽融上奏其事庻人怒勸中宗召欽融廷見撲殺之郎岌定州人上書備陳韋庻人及宗楚客為亂之狀韋庻人又勸帝殺之安金藏京兆長安人為太常工人睿宗為皇嗣得侍左右有誣告皇嗣濳有異謀者則天令來俊臣窮鞫其狀左右不勝楚毒皆欲自誣認金藏大呼謂俊臣曰公即不信金藏之言請剖心以明皇嗣不反即引佩刀自剖胷五臟並出流血被地因絶而仆則天聞之令輿入宫中遣醫人却内五臟以桑白皮為線縫合之經宿金藏始蘇則天親臨視之歎曰吾有子不能自明不如爾之忠也即令俊臣停推張玠兖州人少豪俠輕財重客安禄山反令偽將李廷偉率蕃兵脅下城邑至魯郡太守韓擇木具禮郊迎置於郵舘玠率豪士張貴君孫邕段綘等集兵將殺之擇木怯懦大懼唯員外司兵張孚然其計遂殺庭偉并其黨數十人擇木方遣使上聞擇木張孚皆受官賞玠因遊蕩江南不言其功趙復為永樂尉至徳二年三月朔方節度使郭子儀大破賊於潼關復與河東郡司戸韓旻司士徐吴及宗子李藏鋒先陷賊中同謀翻城為内應候官軍至開門納之斬賊軍數千級偽蒲州刺史崔乾祐獨以麾下數千騎走收其散卒圍安邑欲保之百姓等偽降開城門納乾祐軍設伏於其内縱賊千餘騎入縣門發盡殺之唯乾祐未入得脫走楊務欽本安慶緒將也至徳六年二月内務欽等為賊守陜郡濳圖歸順河東太守馬承光以兵應之務欽殺城中賊將不同己者即日翻城為我守陜兼收太倉郡中金帛器械山積賊聞之遂令賊將安武臣領兵攻務欽苦戰而死郡中百姓並為賊所屠令狐彰為左衛員外郎將祿山叛逆以本官隨賊黨張通儒赴京師通儒偽署為城内左街使王師收復二京隨通儒等遁走河朔又陷逆賊史思明偽署為博州刺史及滑州刺史令統數千兵戍滑臺彰感激忠義思立名節乃濳謀歸順會中官楊萬定監滑州軍彰遂募勇士善於水者俾乗夜渉河逹表奏於萬定請以所管賊一將兵馬及州縣歸順因萬定以聞自祿山搆逆為賊首者未有舉州向化肅宗得彰表甚恱賜書慰勞時彰移鎮杏園渡遂為思明所疑思明乃遣所親薛岌統精卒圍杏園攻之彰乃明示三軍曉以逆順衆心感附悉力為用因與賊兵戰大破之潰圍而出遂以麾下將士數百人隨萬定入朝肅宗深奬之禮甚優厚賜甲第一區名馬數乗并幄帳什器頗盛拜御史中丞兼滑州刺史滑亳魏博等六州節度仍加銀青光禄大夫鎮滑州委平殘冦李惟簡成徳軍節度寶臣之子建中年王武俊誅其兄惟岳乃械送京師徳宗拘之於客省防伺甚峻朱泚之亂惟簡斬關而出奔及行在率兵與賊戰有功加御史中丞扈從興元叅從功臣之號封武安郡王張子良為潤州兵馬使李錡叛使子良與李奉先田少卿領兵分路收宣池等州三將夙有向順志而錡甥袁行立亦思向順其宻謀多决於行立乃廻戈趨城執錡以歸順鄭嘗為新蔡節度判官時節度留後呉少誠日務完聚不奉朝命嘗及大將楊冀謀逐少誠以聼命於朝使試校書郎劉渉假為手詔數十濳致於大將李嘉節申州刺史張伯元等二十餘人將因少誠之出閉城門以拒之屬少誠將出餞中官嘗等遂乃舉事或以告之者遂殺李嘉節等由是各持偽詔請罪誠皆宥之遣使殺張伯元於申州其大將宋旻曹濟奔於京師李觀為坊州防遏使以憂免居盩厔别業廣徳初吐蕃入冦鑾駕之陜觀於盩厔率鄉里子弟千餘完守黑水之西戎人不敢近劉悟為淄青牙門右職元和末詔討李師道遣悟將兵拒魏博軍而數促悟戰悟未及進馳使召之悟度使來必殺己乃偽疾不出令都虞侯徃迎之使者果以誠告云奉命殺悟以都虞侯代之都虞侯即時先還悟劾之得其實遂召諸將與謀曰魏博兵强出戰必敗今天子所謀者司空一人而已悟與公等皆為所驅廹使就其死何如殺其來使整戎以取鄆州轉危亡為富貴邪衆咸曰善唯都將所命悟於是立斬其使以兵趣鄆圍其内城兼以火攻其門不數刻梟師道首以獻時十四年二月九日也悟自淄青都知兵馬使兼監察御史擢拜檢校工部尚書兼御史大夫義成軍節度使封彭城郡王仍賜實封五百戸錢二萬貫莊宅各一區辛讜故太原尹雲京之孫咸通十年龎勛亂徐泗時杜慆守泗州賊極力攻之讜寓居廣陵乃仗劒拏小艇趨泗口貫賊栅入城見慆賊三面攻城王師結壘于洪源驛讜夜以小舟穿賊壘至洪源驛見監軍郭厚本論泗州危急且宜速救厚本然之淮南都將王公弁謂厚本曰賊衆我寡無宜輕舉當候可行讜坐中㧞劒瞋目謂公弁曰賊百道攻城陷在旦夕公等奉詔赴援而逗留不進心欲何為即欲揮劒向公弁厚本持之讜望泗州大哭者經日帳下為之流涕厚本義其心選甲士三百隨讜入泗州夜半斬賊栅大呼由水門而入賊軍大駭既知援兵入乃退舍後唐李愚唐末為假官滄州盧彦威署為安陵簿丁憂去職服闋隨計之長安屬關輔亂離頻年罷舉客於蒲津之間光化中軍容劉季述王奉先以昭宗頻害宦者同謀廢立月餘諸侯無奔問者愚時在華隂聞其事私心痛憤乃求見華帥韓建致書喻以禍福其大㫖曰僕關東一布衣爾幸讀書為文毎見君臣父子之際有傷殺害義之事嘗痛心切齒恨不得抽腸渉血肆之市朝明公居近關重鎮君父幽辱月餘坐視兇逆而忘勤王之舉僕所未喻也僕竊計中朝輔弼雖有志而無權外鎮諸侯雖有權而無志唯明公忠義社稷是依徃年車輅播遷號泣迎奉累嵗供饋再復朝廟義感人心至今歌詠此時事勢尤異前時明公地處要衝位兼將相自宫闈變故已渉旬時若不號令率先以圖反正遲疑未决一朝山東侯伯唱義連衡鼓行而西明公欲求自安如何决䇿此必然之勢也不如馳檄四方喻以逆順軍聲一振則元兇破而浹旬之間二䜿之首傳於天下計無便於此者建深禮遇之堅辭還山墅建草檄欲布於諸鎮事未集而崔中書殺二兇昭宗反正周李澣初仕晉為翰林學士晉末契丹犯闕明年春隨廬帳北行北主永康王善待之永康入國以澣華人不令隨從留住幽州供給亦厚永康為述軋所殺述律代立部族首領多被戮永康妻弟曰蕭海真亦謂之蟬得舍利為幽州節度使與澣相善每與澣言及中國意深慕之澣嘗㣲以言挑之欣然遂納會定州節度使遣諜者田重覇繼徃幽州偵邏軍事毎令濳至澣所宻謀還計澣亦致書於定帥致謝定帥表其事太祖哀澣覊離異域嘗有南歸之意乃令田重覇齎詔賜之兼令澣兄太子賔客濤宻通家問澣得詔甚感太祖恩因重覇廻致謝曰田重覇至伏蒙聖慈特頒明詔降日中之文字慰天外之流離别述宸慈俾傳家信如見骨肉倍感君親又奏隂事曰昨田重覇至為無與蕭海真詔勑秪有兄濤家書不敢將出方欲遣田重覇却囘至五月四日海真差中門使趙珮傳語臣云昨擬差人齎絹書上南朝皇帝請發兵來兼取得姚漢英等奏狀所貴聽信其絹文印押了未封被趙珮懐内遺失交下憂怕不知所為臣既認實心遂喚趙珮通事李觧里來呈與書詔當時聞於海真極喜引臣竊謝尋喚重覇於私宅相測至五月二十六日又喚重覇於衙内一宿今月四日令趙珮將銀十兩令與重覇兼傳語與臣云我心如鐵石但令此人且廻諸事宿時一一説與己今口奏候南朝有文字來則别差人去今因奏陳皆據目前所得至於機事兵勢權謀非臣愚為敢陳鄙欵伏乞妙延良弼周訪嘉謀斷於宸衷用叶廟勝又與濤書言契丹述律事云今王驕騃唯好擊鞠耽於内寵固無四方之志觀其事勢不同已前親宻貴臣尚懐異志即㣲弱可知不敢備奏一則煩文一則恐渉為身計大好乗其亂弱之時計亦易和若辦得來討唯速若且和亦唯速將來必不能力為可東也册府元龜卷七百六十二
