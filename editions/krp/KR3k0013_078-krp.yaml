body:
  text: 册府元龜卷七十八宋王欽若等撰帝王部委任第二隋髙祖初為丞相時竇榮定為左右宫伯使鎭守天臺總統露門内兩廂仗衛帝宿禁中遇尉遲逈初平朝廷頗以山東為意拜榮定為雒州總管以鎮之宇文忻為豫州總管高祖龍潛時與忻情好甚恊及為丞相恩顧彌隆尉遲逈作亂以忻為行軍總管從韋孝寛擊之時兵屯河陽諸軍莫敢先進帝令高熲馳驛監軍與熲宻謀進取者惟忻而已李徹字廣達高祖受禪為左武衛將軍及晉王之鎭并州也朝廷妙選正人有文武才幹者為之寮佐帝以徹前代舊臣數持軍旅詔徹總晉王軍事進爵齊安郡公時蜀王秀亦鎭益州帝謂侍臣曰安得文同王子相武如李廣達者乎其見重如此韋世康初仕後周為司會中大夫尉遲逈之作亂高祖憂之謂世康曰汾絳舊是周齊分界因此亂階恐生搖動今以委公善為吾守因授絳州刺史以雅望鎭之闔境清肅開皇中為吏部尚書因侍宴再拜陳譲曰臣無尺寸之功位亞台鉉今犬馬齒臷不益明時恐先朝露無以塞責願乞骸骨退避賢能帝曰朕夙夜庶幾求賢若渇兾與公共治天下以致太平今之所請深乖本望縱令筋力衰謝猶屈公卧治一隅於是出拜荆州總管時天下唯置四大總管并揚益三州竝親王臨統唯荆州委於世康時論以為羙于仲文開皇初為行軍元帥統十二部總管帝以尚書文簿繁雜吏多奸計令仲文勘錄省中事其所發摘甚多帝嘉其明斷厚加勞賞達奚長孺為荆州總管三十六州軍事高祖謂之曰江陵要害國之南門今已委公朕無慮也令狐熈為汴州刺史高祖以嶺南夷越數為反亂徴拜桂州總管十七州諸軍事許以便宜從事刺史以下官得承制補授給帳内五百人賜帛五百疋發傳送其家李雄字毗盧為鴻臚卿晉王出鎭并州以雄為河北行臺兵部尚書高祖謂雄曰吾兒既少更事未多以卿兼文武才今推誠相委吾無北顧之憂矣雄頓首而言曰陛下不以臣不肖寄臣以重任臣雖愚固心非木石謹當竭誠效命以答鴻恩歔欷流涕帝慰諭而遣之高熲平陳後以功授上柱國熲遜位高祖詔曰公識鑒通逺器略優深出參戎律廓清淮海入司禁旅實委心腹自朕受命嘗典機衡竭誠陳力心迹俱盡此則天降良輔翊贊朕躬幸無辭費也其優奬如此未幾尚書都事姜曄楚州行參軍李君才竝奏稱水旱不調罪繇高熲請廢黜之二人俱得罪而去親禮愈密王誼為大内史時汾州嵇胡為亂誼率兵擊之高祖弟越王盛譙王儉雖為總管竝受誼節度其見重如此楊异高祖用為呉州總管時煬帝為晉王鎭揚州詔令异每嵗一與王相見評論得失規諷疑闕宇文述自開皇中伐陳為行軍總管陳王既擒而蕭瓛蕭巖據東吳之地擁兵拒守高祖與述詔曰公鴻勲大業名髙望重奉國之誠久所知悉金陵之㓂既以清蕩而呉會之地東路為遥蕭巖蕭瓛竝在其處公率將戎旅撫慰彼方振揚國威宣布朝化以公明略乘勝而往風行電掃自當稽服若使干戈不用黎庶獲安方副朕懐公之力也煬帝大業中為左衛大將軍與蘇威常興選舉參預朝政貴重委任與蘇威等其親愛則過之蘇威自高祖時拜開府儀同兼納言民部尚書復兼大理卿京兆尹御史大夫治書侍御史梁毗以威領五職而安繁戀劇無舉賢自代之心抗表劾威高祖曰蘇威朝夕孜孜志存逺大舉賢有闕何遽廹之顧謂威曰用之則行舍之則藏惟我與爾有是夫及高祖幸并州命與高熲同總留事俄追詣行在所使决民訟後為左光祿大夫煬帝即位以威先朝舊臣漸加委任後嵗餘復為納言與左翊衛大將軍宇文述黄門侍郎裴矩御史大夫裴藴内史侍郎虞世基參掌朝政時人稱為五貴煬帝即位數月拜伊州刺史楊約為内史令約有學術兼達時務帝甚任之後數載加官右光祿大夫吐萬緒自高祖時為夏州總管煬帝之在藩也頗見親遇及為太子引為右虞侯率及帝嗣位漢王諒時鎭并州帝恐其為變拜晉絳二州刺史王辯為武賁郎將及山東盜賊起上谷魏刁兒自號歴山飛衆十餘萬刼掠燕趙煬帝引辯升御榻問以方略辯論取賊形勢帝稱善曰誠如此計賊何足憂也於是發從行卒歩騎三千擊敗之賜黄金二百兩長孫晟為上開府儀同三司安撫突厥還遇煬帝即位帝引晟於大行前委以内衙宿衛知門禁事即日拜左領軍元文都大業中為大府卿帝漸任之甚有當時之譽柳肅為工部侍郎煬帝大見親任每行幸遼東嘗委之於涿郡留守獨孤楷為并州總管遇疾喪明上表乞骸骨帝曰先朝舊臣歴職二代高風素望卧以鎭之無勞躬親簿領也遣其長子凌雲監省郡事其見重如此樊子蓋為凉州刺史兼武威太守大業三年入朝帝引之内殿特䝉褒羙五年煬帝西巡詔加子蓋右光祿大夫子蓋表自陳曰臣自南裔即適西垂嘗為外臣未居内職不得陪屬車奉丹陛溘死邊城没有遺恨唯陛下察之帝曰公侍朕則一人而已委以西方則萬人之敵宜識此心六年朝於江都宫還除民部尚書時處羅可汗及高昌王欵塞復以子葢檢校武威太守應接二蕃後帝幸遼東子葢為東都留守車駕至高陽追詣行在所既而引見帝顧謂子葢曰朕遣越王留守東都示以皇枝盤石社稷大事終以委公特宜持重戈甲五百人而後出此亦勇夫重閉之義也無賴不軌者便誅鋤之凡可施行無勞形迹今造玉麟符以代銅獸又指越代二王曰今二孫委公與衛文昇耳宜選貞良宿徳有方幅者教習之動静之節宜思其可於是賜以良田甲第衛𤣥為刑部尚書大業九年煬帝幸遼東使𤣥與代王侑留守京師拜為京兆内史尚書如故許以便宜從事勅代王侑待以師傅之禮會楊𤣥感圍逼東都𤣥率歩騎七萬與宇文述等擊破之還鎭京師帝謂之曰闗右之任一委於公公安社稷乃安公危社稷亦危出入須有兵衛坐卧常宜自牢勇夫重閉此其義也今特給千兵以充侍從賜以玉麟符𤣥自以年老上表乞骸骨帝使内史舍人封徳彛馳諭之曰京師國本王業所基宗廟園陵所在藉公耆舊卧以鎭之朕為國計義無相許故遣徳彛口陳指意𤣥乃止唐高祖武徳元年以蕭瑀為中書令時軍國草創方隅未寧高祖雅相禮重委以心腹凡諸政事瑀悉闗掌内外諮禀日有千數陳奏便宜多見允納高祖每臨軒聽政常引瑀賜升御榻而坐與言呼之為蕭郎國典朝儀亦責成於瑀太宗入纂春宫以瑀為太子太保太宗之伐遼東也以雒邑衝要襟帶闗河以瑀為雒陽宫留守竇誕為太常卿加上柱國高祖諸少子荆王元景等未出宫者十餘王所有國司家産之事悉付誕檢校焉韋仁壽為南寧州都督入朝貢方物高祖大悦仁壽復請徙居南寧以兵鎭守有詔特聽以便宜從事令益州給兵送之叚徳操為左武衛將軍延州總管徴令入朝賞勞甚厚及建成北討高祖問其方略又勞之曰今者之行以公為北道主人勉其經略以就功名也太宗時李勣為并州大都督府長史在并州凡十六年令行禁止號為稱職帝謂侍臣曰隋煬帝不能精選賢良安撫邊境唯築長城以備突厥情識之惑一至於此朕今委任李勣於并州遂使突厥畏威遁走塞垣安静豈不勝逺築長城耶盧承慶為民部侍郎太宗令承慶兼檢校兵部侍郎仍知五品選事承慶辭曰選事職在尚書臣今掌之便是越局帝不許曰朕今信卿卿何不自信也楊㳟仁為特進貞觀五年十一月以恭仁行雒州都督太宗謂之曰雒陽要重古難其人朕之子弟多恐非所任特以委公也劉蘭貞觀十一年為右領軍將軍及太宗行幸雒陽以蜀王愔為夏州都督又以蘭為長史愔不之藩而蘭總其事封平原郡公尋領檢校代州都督將軍如故高士廉為尚書右僕射貞觀十五年駕幸洛陽庶人承乾監國士廉攝太子少師太宗手詔士廉曰端拱三州不憂闗中者唯卿是屬蕭何之鎭寄情非淺後加開府儀同三司平章政事車駕問罪遼陽皇太子於定州監國以士廉攝太子太傅仍典朝政璽書勞問不絶房𤣥齡為司空太傅知門下省事及太宗親幸遼東以𤣥齡為京城留守降手詔曰公當蕭何之任朕無西顧之憂矣軍戎器械戰士糧廪竝委𤣥齡處分發遣在路表奏相望每上言敵不可輕尤宜戒慎竇静鎭夏州時擒頡利處其部衆於河南靖以為不便上封事諫之雖未從之太宗嘉其忠謇答以優詔曰北方之務悉以相委以卿為寧朔大使撫鎭華戎朕無北顧之憂矣李大亮為左衛大將軍高宗居春坊以大亮兼領太子右衛率俄兼工部尚書身居三職宿衛兩宫太宗每出巡幸多令大亮居守韋挺為太常卿父冲在隋嘗為營州總管有經略高麗遺文會太宗將伐遼東挺以聞奏太宗甚悦遂令挺先運軍糧河北諸州皆取挺節度仍許以便宜行事帝親觧貂裘及内廐馬二疋賜之羣公祖道朝野以為榮楊𢎞禮為中書舍人太宗有事遼東以𢎞禮有文武材擢拜兵部侍郎専典兵機之務時諸宰相並在定州留輔太子唯有禇遂良許敬宗及𢎞禮在行在所掌知機務姜確貞觀中拜宣威將軍守屯衛將軍攝將作如故確性恭勤雖祁寒暑雨未嘗暫懈太宗以是益加任使及營建昭陵確又參典塋制以勞正授左屯衛將軍自此之後轉䝉親顧𤣥武門宿衛及園苑之務皆以為之其屯營飛騎亦分𨽻於確每有逰幸即領騎而從焉高宗時張行成為尚書右僕射加授太子少傅因旱抗表請致仕高宗手詔不許仍賜以宫女黄金器物行成又固請乞骸骨帝曰公我之故舊腹心柰何舍我而去因愴然流涕行成不得已復起視事張文瓘為侍中性嚴正諸司奏議多所紏劾高宗甚親委之或時卧疾在家朝廷每有大事帝必問諸宰臣與文瓘議未奏云未議者則遣其籌之奏云已議者皆報可李晦為雍州長史高宗幸雒陽以晦為京師留守臨行帝謂晦曰闗中之事一以付卿但法律跼之不可以成官政令式之外有異績利於人者隨事即行不須聞奏劉仁軌為太子太傅同中書門下三品高宗幸東都皇太子京師監國遣仁軌及與侍中裴炎中書令薛元超留輔太子二年赴東都又令太孫重炤京師留守仍令仁軌為副𢎞道元年復拜尚書左僕射同中書門下三品文明元年太孫被廢特令仁軌専知留守事仍與仁軌書曰昔漢以闗中之事専仗蕭何今者託公亦猶於古所希耆徳敬朂乃誠薛元超為中書令兼太子左庶子高宗幸東都太子於京師監國因留元超以侍太子帝臨行謂元超曰朕之留卿如去一臂但吾子未閑庶務闗西之事悉以委卿所寄既深不得不然也裴炎為侍中高宗幸雒陽令炎留輔太子兼知禮部尚書事薛仁貴為吐蕃所敗坐除名尋而高麗餘衆相率復叛詔起仁貴為鷄林道總管以經略之上元中坐事徙象州會赦歸高宗思其功尋復召見謂曰往九成宫遭水無卿已為魚矣卿又北伐九姓東擊高麗漠北遼東咸遵聲教者竝卿之力也卿雖有過豈可相忘有人言卿烏海城下故不擊賊致使失利朕所恨者唯此事耳今西邊不静𤓰沙路絶豈可高枕鄉邑不為朕指揮耶於是授𤓰州長史中宗時魏元忠為侍中檢校兵部尚書中宗居諒闇多不視事軍國大政獨委元忠者數月𤣥宗時薛納為隴右防禦使開元二年賜納旌節勑王􅀈臧懐亮王海賔楊楚客等竝受納節度防禦吐蕃如臨時進退致失權宜便以軍法從事四年以納攝御史大夫持節朔方軍大總管討叛如軍將等臨敵有不用命便以軍法從事李光弼為太原尹兼太原及北軍州節度使開元十七年正月光表請入朝帝降書曰朔川兵馬飛狐要害委卿經略隨事防虞比來東夷頗盡誠欵如聞突厥常欲侵漁部落漸移向東固亦須有備豫凡秋防操練今正其時卿若入朝誰當處置宜識此意且未須來肅宗時房琯為吏部尚書平章事先是至徳元年九月上皇遣琯等奏皇帝册書至順化郡肅宗以琯素有重名虛心待之琯亦以天下之務為己任有諫事者獨决之諸宰皆避位莫敢言郭子儀為司空至徳初廣平王為元帥統大將軍東征以子儀為副實總軍政後子儀為司徒中書令充朔方邠寧鄜坊等道節度肅宗以子儀久為大將得士卒心命鎭絳州詔授朔方河中北庭潞澤州節度行營兵馬副元帥時肅宗不康引子儀入卧内以河東之事委之子儀流涕哽咽受命而去代宗初僕固懐恩為工部尚書帝思清河隴以懷恩曉知邊事俾充隴右節度使未行議東征殘冦又改靈州大都䕶充朔方行營節度使封大寧郡王兼絳州刺史大夫工部尚書如舊尋遷同中書門下平章事時回紇可汗親率甲兵求自效囘紇可敦懷恩之女也以是尤委任之馬璘為四鎮北庭行營以及邠寕節度使代宗以犬戎寖驕嵗犯郊境涇州最邊戎冦乃詔璘移鎮涇州為涇源節度使涇州刺史四鎭北庭行營節度使如故復以鄭潁二州𨽻之辛雲京為河東節度使代宗以北門委之及薨追悼發哀為之流涕李抱玉為鳳翔節度使時吐蕃每歲犯境代宗以岐陽國之西門寄在抱玊恩寵無比遷同中書門下平章事又兼山南西道節度使河西隴右山南西道副元帥判梁州事連統三道節制兼領鳳翔潞梁三大府秩處三公張光晟為單于都䕶兼御史中丞振武軍使代宗宻謂之曰北蕃縱横日久當思所禦之計光晟既受命至鎭威令甚行李勉為滑亳等州觀察使永平軍節度等使代宗以勉兼汴州刺史充汴宋等八州節度觀察留後時以汴州節度都虞侯李靈耀擅殺兵馬使濮州刺史孟鑒潜結田承嗣為援故有是命徳宗時崔祐甫代常衮為門下侍郎平章事尋轉中書侍郎脩國史仍平章事帝初即位庶務皆委宰臣祐甫染疾轝入中書卧而承旨或休假在第每除拜大命必密咨以决焉李興翰為鹽州兵馬使貞元十九年以為鹽州刺史保塞軍使左神䇿行營兵馬使其劒南東川西川兵在州者皆俾興翰主焉鹽州軍使便宜得専達於上鹽州自此不𨽻夏州憲宗時高崇文為神䇿行營節度使憲宗元和元年劒南西川劉闢反憲宗命崇文討闢詔應赴西川應援將士等竝取高崇文處分杜佑為司徒同平章事嵗餘請致仕憲宗以佑筋力未衰面令自今已後每日依往例入朝視事田𢎞正為魏博節度使同平章事元和十四年制受檢校司徒兼侍中依前魏州大都督府長史充魏博等州即度使始𢎞正入覲乞遂留闕下表凡三入帝謂之曰昨韓𢎞至朝稱疾懇辭戎務朕不得不從今卿復請留止意誠可尚然魏土樂卿之政隣境服卿之威為我長城不可辭也乃還鎮穆宗長慶二年四月裴度自河東節度除東都留守至闕除淮南節度初度發太原中途得朱克融王庭凑復書皆許退兵度不敢發以其書奏穆宗喜因遣使宣慰克融并廷凑入深州取牛元翼又令先於途中命度更發書與廷凑度書因言朝謝後即歸守留務中使見書慮廷凑知度東歸無兵權即背前約遽請度易其即歸之辭并上其書草穆宗方憂深州之圍得度前後書喜甚及度至又自有以悟帝恩待益至故復得兵符敬宗寶歴元年四月以前神䇿軍大將軍知軍事兼御史大夫康志睦為檢校工部尚書兼青州刺史御史大夫充平盧軍節度淄青等州觀察使志睦父日知興元初為趙州刺史時成徳軍節度使李寶臣死其子惟岳不奉朝命曰知帥麾下蕃漢歩騎二千人自趙歸闕徳宗深嘉之歴授官秩至晉慈隰等州節度使睦以父勲於將為神䇿累遷本軍大將軍至是帝以修謹可委又本忠臣子弟特授此鎭然制下後人情甚不協諫官繼有章疏帝竟不為之止及在鎮頗有理聲後唐莊宗以郭崇韜為樞宻使侍中兼修國史時為宦官所惡帝甚不平及客省使李嚴自蜀使㢠且言王衍政荒民怨人不為使可以鼓行平定其致書侮嫚帝心怒之下詔諸蕃和市戰馬選練兵甲議擇將帥明宗為天下兵馬總管典兵柄廷議當委西征崇韜自以位重勢危將立功以制閹豎乃宻奏曰契丹侵軼北面須藉大臣全倚總管鎮禦燕趙臣伏念興聖宫使地當儲副未立殊功宜依本朝故事以親王為元帥付以討伐之權示威名於天下帝方愛繼岌即曰小子䝉幼安能獨行卿當為予擇其副貳崇韜未奏帝曰朕熟思之無踰於卿是日以繼岌為西南面行營都統以崇韜為諸道兵馬招討使部駕下諸軍六萬發雒陽軍將發帝御嘉慶殿置酒宴西征諸將舉酒囑崇韜曰繼岌小子未習軍機唯卿久從吾征伐兵家變略事之得失屬之於卿無累小子崇韜謝之而發安元信從莊宗定魏博元城之戰尅㨗居多移為博州刺史與梁軍對壘得勝遷元信為右廂排陣使王處直引契丹背盟北邊俶擾以元信久在邊用為大同軍節度使袁建豊為内衙副指揮使時北討劉守光建豐常先士卒轉都教練使權蕃漢總管莊宗入鄴以心腹幹能選為魏府都廵檢使明宗時安重誨為樞宻使三上表乞觧機務詔不允復面奏乞與臣一鎮以息謗議明宗不悦重誨奏不已明宗怒謂曰放卿出朕自有人即令武徳使孟漢瓊至中書與宰臣商量重誨事馮道言曰諸人苟惜安令觧樞務為便趙鳳曰大臣豈可輕動公失言也道等因附漢瓊奏曰此斷自宸旨然重臣不可輕議移改繇是兼命范延光為樞密使重誨如故范延光為樞宻使上表陳情乞觧樞務優詔不允令皇城使翟光鄴宣㫖云卿避重難則便矣誰當荷重難者勿復興言要遂陳請十年為予致太平後即允卿辭避帝御中興殿延光稱疾甚上表陳情帝謂樞宻使趙延夀曰延光又貢章疏懇求退避其意如何莫是朕之失徳不可扶持否延夀曰延光位高責重畏懼滿盈所以求退與舊臣迭處祗如臣素無才術因緣戚屬冒昧渥恩自掌樞宻常多憂惕所希舊臣迭處然後乞在散班不謂延光先有陳情延光之心臣知之矣固不願逺違宸扆須避樞機但以此職望重責深動貽官謗向來處者罕有保全所謂人之所畏不可不畏帝曰卿言是也然家國之事仗卿等披榛故人總欲捨予予誰共治卿見延光道予此語勉就公參又令中使楊敬達就延光第宣㫖延光又上第三章陳乞優答不允朱𢎞昭為山南東道節度使長興四年九月詔為檢校太尉同中書門下平章事充樞宻使制下𢎞昭面訴曰臣厮養之才智謀極短遇陛下興運驟至方鎮常懼不任况内秉大權必孤奬擢伏乞别選才能上叱之曰公輩皆欲去朕左右怕在眼前養爾輩何為𢎞昭退謝不敢復言符彦超為汾州刺史同光末為魏州軍亂天下騷動詔彦超北京巡檢朝廷先令内養吕鄭二人監兵及倉庫明宗入雒皇弟存詔單騎入河東與吕鄭謀殺彦超張憲據城自衛彦超知之彦超部下殺吕鄭存詔於衙城明宗又令其弟龍武都虞侯彦卿來安撫遂請彦超入朝自雪六月彦超入覲明宗便殿召見撫諭曰河東無事賴爾盡心也翌日授建雄軍留後未行屬弟曹州刺史彦饒殺宣武亂軍安輯汴州明宗甚喜召彦超曰吾與爾父為先朝立社禝我於倉皇中軍民推戴又得爾兄弟氣力我更何憂却為我往河東撫育耆舊授檢校司徒北京留守太原尹閔帝時宋令詢自帝在藩時補為客將知書樂善動皆繇禮長興中閔帝連殿大藩遷為都押牙參輔閫政甚有時譽閔帝深委之末帝時符彦饒清泰初以右千牛衛上將軍充左右嚴衛都指揮使彦饒舊典禁軍明宗朝立定亂之功今春以伯氏安州不治而入宿衛帝親舊也故復委任之安叔千新授振武節度使賜赴鎮帝面諭狂虜侵冦以爾知虜情狀所以委任賜戎服金帶銀器其牙兵賜物有差又賜茶五百斤馬五十匹漢高祖時楊邠為樞密使上章以樞宻萬幾平章四輔官要事重心力不堪乞觧樞機冀逃咎悔帝命中使宣諭邠曰樞機之職捨卿用誰忽有此章莫有人離間卿否宣次宣徽北院使吳䖍裕在旁颺言曰樞宻重地難以久處俾後來者迭居相公辭譲是也宣使還具言䖍裕道此即日出䖍裕為鄭州防禦使周世宗顯徳四年冬再幸淮甸命樞宻使王朴兼東京留守京邑庶務悉以便宜制之比及入蹕都下肅如也册府元龜卷七十八
