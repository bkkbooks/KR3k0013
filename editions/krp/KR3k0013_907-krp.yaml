  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_907-1a}
body:
  text: 册府元龜卷九百七宋王欽若等撰總錄部薄葬夫葬也者藏也藏也者欲人之不得見也及夫易之大過著棺槨之象周之冢人爲丘封之制乃有衣衾飲食芻靈明器之物爲之差降以辨其貴賤焉愼終之禮於是乎在觀夫歴代而下智識之士莫不念反真速朽之理思過侈傷生之異故以冒榮爲愧或以愛民爲念或激昂忠欵形憂國之言或奮厲奇節成矯俗之過至有死非其罪發於感憤志有所存著乎治命皆賢逹卓爾之操可以埀世而作範焉若乃儉不中禮偪下已甚此固異夫仲尼所謂稱家之有無者也成子高寢疾成子高齊大夫國成伯高父也慶遺入請曰子之病革矣如至乎大病則如之何觀其意革急也遺慶封之族子高曰吾聞之也生有益於人死不害於人吾縱生無益於人吾何以死害於人乎哉我死則擇不食之地而葬我焉不食不墾延陵季子吳公子也適齊於其反也其長子死葬於羸博之間季子名札魯昭二十七年吳公子札聘於上國是也季子讓國居延陵因號焉春秋傳謂延陵延州來羸博齊地今泰山縣也孔子曰延陵季子吳之習於禮者也往而觀其葬焉往弔之其坎深不至於泉以生如死其斂以時服以行時之服不改制節旣葬而封廣輪揜坎其高可隱也示節也輪從也隱據也封可手據謂高四尺許晏子齊大夫晏子之葬親也遣車一乗及墓而反言其大儉偪下非之言其既定則歸不畱賓客有事也漢張湯爲御史大夫坐爲長史朱買臣等所搆自殺兄弟欲厚葬之母曰湯爲天子大臣被惡言死何厚葬爲載以牛車有棺無椁楊王孫者孝武時人也學黄老之術家累千金厚自奉養生亡所不致及病且終先令其子曰吾欲臝葬以反吾真臝者不爲衣衾棺椁反歸也真者自然之道也必亡易吾意死則爲布囊盛尸入地七尺旣下從足引脱其囊以身親土其子欲黙而不從重廢父命重難欲從之心又不忍乃往見王孫友人祁侯祁侯繒賀之孫承嗣者名它祁侯與王孫書曰王孫若疾僕廹從上祠雍未得詣前詣至也至前言未見也願存精神省思慮進醫藥厚自持竊聞王孫先令臝葬令死者亡知則已若其有知是戮尸地下將臝見先人竊爲王孫不取也且孝經曰爲之棺椁衣衾是亦聖人之遺制何必區區獨守所聞願王孫察焉王孫報曰蓋聞古之聖王緣人情不忍其親故爲制禮今則越之言踰禮而厚葬也吾是以臝葬將以矯俗也夫厚葬誠亡益於死者而俗人競以相高靡財殫幣腐之地下靡散也單盡也或乃今日入而明日發此真與暴骸於中野何異且夫死者終生之化而物之歸者也歸者得至化者得變是物各反其真也反真㝠㝠亡形亡聲乃合道情夫飾外以華衆厚葬以鬲真使歸者不得至化者不得變是使物各失其所也且吾聞之精神者天之有也形骸者地之有也文子稱天氣爲魂延陵季云骨肉下歸於土是以云然精神離形各歸其真故爲之鬼鬼之爲言歸也其尸塊然獨處豈有知哉褁以幣帛鬲以棺椁支體絡束口含玉石欲化不得鬱爲枯腊千載之後棺衾朽剥乃得歸土就其真宅繇是言之焉用乆客言不用乆爲客也昔帝堯之葬也窽木爲匱葛藟爲緘空木爲匱即櫝字也櫝小棺也葛藟蔓也一曰藟以草名葛之類也緘束也其穿下不亂泉上不泄殠故聖王生易尚死易葬也尚崇也言生死皆儉約也不加功於亡用不損財於亡謂謂名稱也亦指趣也今費財厚葬畱歸鬲至死者不知生者不得是謂重惑於戲吾不爲也祁侯曰善遂葬朱雲初爲博士杜陵令後居鄠田病不呼醫藥遺言以身服斂棺周於身土周於椁棺周於身小棺裁容身也土周於椁冢壙裁容椁也爲丈五墳葬平陵東郭外龔勝爲光祿大夫臨卒勑以棺斂䘮事衣周於身棺周於衣勿隨俗動吾塜種栢作祠堂若葬多設器備則恐被掘故云動吾冡也亦不得種栢及作祠堂皆不隨俗何竝爲頴川太守疾病召丞掾作先令書先爲令書曰告子恢吾生素餐日乆死雖當得法賻勿受公食吏死官得法賻凡贈終者布帛曰􅉠葬爲小椁亶容下棺禮三重椁趙簡子曰不設属辟下卿之罰也或曰但下棺無餘器物也言止作小椁纔容下棺而已無令高大也恢如父言後漢樊宏爲壽張侯卒遺勑薄葬一無所有以爲棺柩一藏不宜復見如有腐敗傷孝子之心使與夫人同墳墓藏光武善其令以書示百官因曰今不順壽張侯意無以彰其徳謚爲恭侯吳漢爲大司馬夫人先死薄斂小墳不作祠堂王堂爲汝南太守免歸家卒遺令薄斂瓦棺以葬張酺爲司徒病臨危勑其子曰顯節陵掃地露祭欲率天下以儉吾爲三公既不能宣揚王化令吏人從制豈可不務節約乎其無起祠堂可作槀葢廡施祭其下而已祭遵爲征虜將軍臨死遺誡牛車載䘮薄葬雒陽鄭𤣥卒遺令薄葬鄧訓爲䕶羗校尉三子悝宏閶竝太后弟也宏疾病遺言悉以常服不得用錦衣玉匣悝閶相繼竝卒皆遺言薄葬不受爵贈太后竝從之張霸爲侍中疾卒遺勑諸子曰昔延州使齊子死羸博因坎路側遂以葬焉今蜀道阻遠不宜歸塋可止此葬足藏髪齒而已務遵速朽副我本心人生一世但當畏敬於人若不善加已直爲受之諸子承命葬於河南梁縣因遂家焉周磐字堅伯學古文尚書洪範五行初爲重合令後棄官歸鄉里教授門徒常千人年七十三歲朝㑹集諸生講論終日因令其二子曰吾日者夢見先師東里先生與我講於隂堂之奥東南隅謂之奥堂幽暗之室又入其奥死之象也旣而長嘆豈吾齒之盡乎若命終之日桐棺足以周身外椁足以周棺斂形懸封濯衣幅巾編二尺四寸簡寫堯典一篇并刀筆各一以置棺前示不忘聖道其月望日無病忽終學者以爲知命焉趙岐爲太常將卒先自爲壽藏壽藏謂冡壙也稱壽者取其乆遠之意也猶如壽官壽器之類冡在今荆州古郢城中也圗季札子產晏嬰叔向四像居賓位又自畫其像居主位皆爲讚頌勑其子曰我死之日墓中聚沙爲牀布簟白衣散髪其上覆以單被即日便下下訖便掩趙咨爲議郎抗疾京師將終告其故吏朱祗蕭建等使薄斂素棺藉以黄壤欲令速朽早歸后土不聽子孫改之乃遺書勑子𦙍曰夫含氣之倫有生必終葢天地之常期自然之至數是以通人逹士鑒兹性命以存亡爲晦明生死爲朝夕故其生也不爲娛亡也不為戚夫亡者元氣去體身魂游散反素復始歸於無端既已消仆還合糞土土爲棄物豈有性情而欲制其厚薄調其燥濕邪但以生者之情不忍見形之毁乃有掩骼埋窆之制易曰古之葬者衣之以薪藏之中野後世聖人易之以棺椁棺椁之造自黄帝始爰自陶唐逮及虞夏猶尚簡樸或瓦或木及至殷人而有加焉周室因之制兼二代復重以牆翣之飾表以旌銘之儀招復含斂之禮殯葬宅兆之期棺椁周重之制衣衾稱襲之數其事煩而害實品物碎而難備然而秩爵異級貴賤殊等自成康以下其典稍乖至於戰國漸至頽陵法度衰毁上下僭雜終使晉侯請隧秦伯殉葬陳大夫設參門之木宋司馬造石椁之奢爰暨暴秦違道廢德滅三代之制興滛邪之法國貲糜於三泉人力單於酈墓玩好窮於糞土伎巧費於窀穸自生民以來厚終之敝未有若此者雖有仲尼重明周禮墨子勉以古道猶不能禦也是以華夏之士爭相陵尚違禮之本事禮之末務禮之華棄禮之實單家竭財以相營赴廢事生而營終亡替所養而爲厚葬豈云聖人制禮之意乎記曰䘮雖有禮哀爲主矣又曰䘮與其易也寧戚今則不然并棺合椁以爲孝悌豐貲重禭以昭惻隱吾所不取也昔舜葬蒼梧二妃不從豈有匹配之㑹守常之所乎聖主明王其猶若斯况於品庶禮所不及古人時同即㑹時乖則别動静應禮臨事合宜王孫祼葬墨夷露骸皆逹於性理貴於速變伯鸞父没卷席而葬身亡不反其尸彼數子豈薄至親之恩亡忠孝之道邪况我鄙闇不德不敏薄意内昭志有所慕上同古人下不爲咎果必行之勿生疑異恐爾等目厭所見耳諱所議必欲改殯以乖吾志故遠采古聖近揆行事以悟爾心但欲制坎令容棺椁歸即葬平地無墳勿卜時日葬無設奠勿畱墓側無起封樹於戲小子其勉之哉吾蔑復有言矣朱祗蕭建送䘮到家謝丞書曰咨在京師病困故吏蕭建經營之咨豫自買小素棺使人取乾黄土細摶篩之聚二十石臨卒謂建曰亡後自着所冇故巾單衣先置土於棺内尸其中以擁其上子𦙍不忍父體與土并合欲更改殯祗建譬以顧命於是奉行時稱咨明逹梁商順帝時爲大司馬病篤勑子冀等曰吾以不德享受多福生無以輔益朝廷死必耗費帑藏衣衾飯唅玉匣珠貝之属何益朽骨百僚勞擾紛華道路祗増塵垢雖云禮制亦有權時方今邊境不寧盗賊未息豈宜重爲國損氣絕之後載至家舍即時殯斂以時服皆以故衣無更裁制殯已開塜塜開即葬祭祀如存無用三牲孝子善述父志不宜違我言也及薨帝親臨䘮諸子欲從其誨朝廷不聽盧植爲尚書初平三年卒臨困勑其子儉葬於土穴不用棺椁附體單帛而已袁閎司徒安之𤣥孫累徵聘舉召皆不應臨卒勑其子曰勿設殯棺但着疏布單衣幅巾親尸於板牀之上以五百墼爲藏杜安爲巴郡太守卒官時薄斂素器不漆子自將軍州郡賢之表章墳墓馬融爲南郡太守卒于家遺令薄葬謝夷吾爲下邳令將卒勑其子曰漢末當亂必有發掘露體之禍使懸棺下葬墓不起墳楊震爲太尉既爲樊豐等所譛收太尉印綬遣歸本郡行至城西夕陽亭乃慷慨謂其諸子門人曰死者士之常分吾蒙恩居上司疾姦臣狡猾而不能誅惡嬖女傾亂而不能禁何面目復見日月身死之日以雜木爲棺布單被裁足葢形勿歸冢次勿設祭祀因飲酖而卒李固爲太尉坐忤梁冀意免遂爲冀所誣自殺臨終勑子孫素棺三寸幅巾殯斂於本郡墝埆之地不得還墓塋汚先公兆域張奐爲太常後坐禁錮年七十八遺命曰吾前後仕進十要銀艾不能和光同塵爲讒邪所忌通塞命也始終常也但地底㝠㝠長無曉期而復纒以纊緜牢以釘密爲不喜爾幸有前窀朝殞夕下措屍靈牀幅巾而已奢非晉文儉非王孫推情從意庶無咎吝諸子從之范冉冉或作丹嘗辟太尉府不行中平二年卒於家臨命遺令勑其子曰吾生於昏闇之世値乎滛侈之俗生不得救世濟時死何忍自同於世氣絕便斂斂以時服衣足蔽形棺足周身斂畢便穿穿畢便埋其明堂之奠干飯寒水飯食之物勿有所下墳封高下令足自隱知我心者李子堅王子炳也今皆不在制之在爾勿令鄉人宗親有所加焉苻融陳畱浚儀人州郡舉孝廉公府連辟皆不就妻亡貧無殯斂鄉人欲爲具棺服融不肯受曰古之亡者棄之中野唯妻子可以行志但即土埋藏而已謝承書頼川張元祖志行士也往弔融妻亡知其如此謂言足下欲尚古道非不淸妙但禮設棺椁制杖章孔子曰吾從周便推所乗臝車牛命融以給殯融受而不辭也魏韓暨爲司徒臨終遺言曰夫俗奢者示之以儉儉則節之以禮歴見前代送終過制失之甚矣若爾曹敬聽吾言斂以時服葬以土藏穿畢便葬送以瓦器慎勿有増益又上疏曰生有益於民死猶不害於民况臣備位台司在職日淺未能宣揚聖德以廣益黎庶寢疾彌畱奄即幽㝠方今百姓農務不宜勞役乞不令雒陽吏民供設䘮具懼國典有常使臣私願不得展從謹冐以聞惟蒙哀許帝得表嗟嘆王觀爲司空上印綬薨於家遺令葬足容棺不設明器不封樹裴潛爲太常遺令儉葬墓中惟置一靈坐瓦器數枚其餘一無所設沐竝有高節年六十餘自慮身無常豫作終制誡其子以儉葬曰告雲儀等夫禮者生民之始教而百世之中庸也故力行者則爲君子不務者終爲小人然非聖人莫能履其從容也是以富貴者有驕奢之過而貧賤者譏於固陋於是養生送死茍竊非禮繇斯觀之陽虎璵璠甚於暴骨桓魋石椁不如速朽此言儒學撥亂反正鳴鼓矯俗之大義也未臻夫窮理盡性陶冶變化之實論也若能原始要終以天下爲一區萬物爲芻狗該覽𤣥通求形影之宗同禍福之素一生死之命吾有慕於道矣夫道之爲物惟恍惟忽壽爲欺魄夭爲鳬没身淪有無與神消息含悦隂陽甘夢太極奚以棺椁爲牢衣裳爲纒屍繫地下長幽桎梏豈不哀哉昔莊周闊逹無所適莫又楊王孫祼體貴不乆客爾至夫末世緣生怨死之徒乃有含珠鱗押玉牀象袵殺人殉以壙穴之内錮以紵絮藉以蜃炭千載僵燥託類神仙於是大教陵遲競以厚葬謂莊子爲放蕩以王孫爲戮屍豈復識古有衣薪之鬼而野有狐狸之胔乎哉吾以才質滓濁汚於淸流昔忝國恩歴試宰守所在無效代匠傷指狼跋首尾無以雪恥如不可求從吾所好今年過耳順奄忽無常茍得獲没即以吾身襲於王孫矣上冀以贖市朝之逋罪下以親道化之靈祖顧爾幼昬未知臧否若將逐俗抑廢吾志私稱從令未必爲孝而犯魏顆聽治之賢爾爲棄父之命誰或矜之使死而有知吾將屍視至嘉平中病甚臨困又勑豫掘塪戒氣絕令二人舉屍即塪絕哭泣之聲止婦女之送禁弔祭之賔無設粟米之奠又戒後亡者不得入藏不得封樹妻子皆遵之郝昭爲將軍將亡遺命戒其子凱曰吾爲將知將不可爲也吾數發塜取其木以爲攻戰具又知厚葬無益於死者也汝必斂以時服且人生有處所爾死復何在邪今去本墓遠東西南北在汝而已徐晃爲右將軍病篤遺令斂以時服高堂隆爲光祿勲卒遺令薄葬斂以時服蜀丞相諸葛亮遺命葬漢中定軍山因山爲墳塜足容棺斂以時服不須器物司馬朗爲兖州刺史與臧霸等征吳至居巢遇疾臨卒謂將士曰刺史蒙國厚恩督司萬里微功未效而遭此疫癘既不能自效孤負國恩身没之後其布衣幅巾斂以時服勿違吾志也吳呂岱爲大司馬卒遺令殯以素棺疏巾布褠葬送之制務從儉約子凱皆奉行之是儀爲尚書僕射寢疾遺令素棺斂以時服務從省約年八十卒張昭爲輔吳將軍卒遺令幅巾素棺斂以時服諸葛瑾卒遺命令素棺斂以時服事從省約晉石苞爲大司馬侍中臨薨豫爲終制曰延陵薄葬孔子以爲逹禮華元厚葬春秋以爲不臣古之明義也自今死亡者皆斂以時服不得兼重又不得飯含爲愚俗所爲又不得爲設牀帳明器也定窆之後復土滿坎一不得起墳種樹昔王孫祼葬矯時其子奉命君子不譏况於合禮典者邪諸子皆奉遵遺令又斷親戚故吏設祭王祥爲太保疾篤著遺令訓子孫曰夫生之有死自然之理吾年八十有五啓手何恨不有遺言使爾無述吾生値季末登庸歴試無毗佐之勲没無以報氣絕但洗手不須沐浴勿纒尸皆澣故衣隨時所服賜山𤣥玉佩衞氏玉玦綬笥皆勿以斂西芒上土自堅貞勿用甓石勿起墳隴穿深二丈椁趣容棺勿作前堂布几筵置書箱鏡奩之具棺前但可施牀榻而已夏侯湛爲散騎常侍將沒遺命小棺薄斂不修封樹論者謂湛雖生不砥礪名節死則儉約令終是深逹存亡之理皇甫謐著論爲送終之制名曰𤣥晏先生以爲存亡天地之定制人理之必至也故禮六十而制壽至於九十各有等差防終以素豈流俗之多忌者哉雖未至壽然嬰疾彌紀仍遭䘮難神氣損劣困頓數年矣常懼夭隕不期慮終無素是以畧陳至懷夫人之所貪者生也所惡者死也雖貪不得越期雖惡不可逃遯人之死也精歇形散魂無不之故氣屬於天寄命終盡窮體反真故尸藏於地是以神不存體則與氣升降尸不乆寄與地合形神形不隔天地之性也尸與土并反真之理也今生不能保七尺之軀死何故隔一棺之土然則衣衾所以穢尸棺椁所以隔真故桓司馬石椁不如速朽季孫璵璠比之暴骸文公厚葬春秋以爲華元不臣楊王孫親土漢書以爲賢於秦始皇如令魂必有知則人鬼異制黄泉之親死多於生必將備其器物用待亡者令若以存况終非即靈之意也如其無知則空奪生用損之無益而啓奸心是昭露形之禍増亡者之毒也夫葬者藏也藏者欲人之不得見也而大爲棺椁備増存物無異於埋金路隅而書表於上也雖甚愚之人必將笑之豐財厚葬以啓奸心或剖破棺椁或牽曳形骸或剝臂採金環或捫腸求珠玉焚如之刑不痛於是自古及今未有不死之人又無不發之墓也故張釋之曰使其中有欲雖錮南山猶有隙使其中無欲雖無石椁又何戚焉斯言逹矣吾之師也夫贈終加厚非爲死也生者自爲也遂生意於無益棄死者之所屬知者所不行也易稱古之葬者衣之以薪葬之中野不封不樹是以死得歸真亡不損生故吾欲朝死夕葬夕死朝葬不設棺椁不加纒斂不修沭浴不造新服殯唅之物一皆絕之吾本欲露形入地以身親土或恐人情染俗來乆頓革理難今故觕爲之制奢不石椁儉不露形氣絕之後便即時服幅巾故衣蘧蒢褁尸麻約二頭置大牀上擇不毛之地穿坑深十尺長一丈五尺廣六尺坑訖舉牀就坑去牀下尸平生之物皆無自隨唯齎孝經一卷示不忘孝道蘧蒢之外便以親土土與地平還其故草使生其上無種樹木削除使生跡無處自求不知不見可欲則奸心不生終始無怵惕千載不慮患形骸與后土同體魂爽與元氣合靈真篤愛之至也若亡有前後不得移祔祔葬自周公來非古制也舜葬蒼梧二妃不從以爲一定何必周禮無問師工無信卜筮無拘俗言無張神坐無十五日朝夕上食禮不墓祭但月朔於家設席以祭百日而止臨必昏明不得以夜制服常居不得墓次夫古不崇墓智也今之封樹愚也若不從此是戮尸地下死而重傷魂而有靈則寃悲没世長爲恨鬼王孫之子可以爲誡死誓難違幸無改焉而竟不仕太康三年卒子童靈方囘等遵其遺命徐苖高密淳于人公府五辟愽士再徵皆不就永寧三年卒遺命濯巾澣衣榆棺雜塼露車載尸葦席瓦器而已太宰安平王孚臨終遺令曰有魏貞士河内温縣司馬孚字叔逹不伊不周不夷不惠立身行道終始若一當以素棺單椁斂以時服其家遵孚遺㫖所給器物一無施用顔含爲右光祿大夫將卒遺命素棺薄斂庾峻爲侍中諌議大夫臨終勑子珉朝卒夕殯幅巾布衣葬勿擇日珉奉遵遺命斂以時服杜夷爲國子祭酒臨終遺命子晏曰吾少不出身頃雖見覊錄冠舄之飾未嘗加體其角巾素衣斂以時服殯葬之事務從簡儉亦不須茍取矯異也宋王徽累官至義興太守固辭病卒遺令薄葬不設轜旐鼓梚之屬施五尺床爲靈二宿便毁以常所彈琴置床上何長史來以琴與之何長史者偃也無子家人遵之廬陵王紹薨遺令斂以時服素棺周身太祖從之張邵爲征虜將軍雍州刺史臨終遺命祭以菜菓葦席爲轜車諸子從焉江夷爲湘州刺史散騎常侍卒遺命薄斂蔬奠務存儉約南齊崔慰祖爲始安王記室始安王遙光謀逆慰祖繫尚方臨卒與從弟緯書令以棺親土不須塼勿設靈座沈麟士吳興武康人建武中以著作郎太子舍人徵不起及卒以楊王孫皇甫謐深逹生死而終禮矯俗乃自爲終制遺令氣絶剔被取三幅布以覆屍及斂仍移布於屍下以爲斂服反被左右両際以周上不復制覆被不須沐浴唅珠以本裙衫先所着褌凡二服上加單衣幅巾履枕棺中唯此依土安用孝經既殯不復立靈座四節及祥權鋪席於地以設𤣥酒之奠人家相承漆棺今不復爾亦不須旐成服後即葬作塜令小後祔更作小冢於殯合葬非古也塜不須聚土成墳使上與地平王祥終制亦爾葬不須轜車靈舫魌頭也不得朝夕下食祭奠之法至于葬唯淸水一盃子彝奉而行之州里皆稱歎焉王秀之爲吳興郡守卒遺令朱服不得入棺祭則酒脯而已世人僕妾直靈助哭當繇䘮主不能淳至欲以多聲相亂魂而有知吾當笑之梁王敬裔爲大中大夫卒遺命不得設復魄旌旐一蘆䕠藉下一枝覆上吾氣絶便沐浴籃輿載尸還忠侯大夫𡑞中若不行此則戮吾尸於九泉敬裔外甥許惠詔因阮研以聞詔曰敬裔令其息崇素氣絶便沐浴藉以二蘆䕠鑿地歸身葬忠侯𡑞此逹生之格言賢夫玉匣石椁遠矣然子於父命亦有所從有所不從今崇素若信遺意土周淺薄屬辭不施一朝見侵狐鼠戮死已甚父可以訓子子亦不可行之外内易棺此自奉親之情藉土而葬亦通人之意宜兩捨兩取以逹父子志棺周於身土周於椁去其牲奠斂以時服一可以申情二可以稱家禮教無違生死無辱此故當爲安也孫讓爲光祿大夫臨終遺命諸子曰吾少無人間意故自不求聞逹而仕歴三代官成兩朝如我資名或蒙贈謚自公體耳氣絶即以幅巾就葬每存儉率比見轜車過精非吾志也士安束以蘧蒢王孫祼入厚地雖是匹夫之節取於人情未允今使棺足周身壙足容柩旐書爵里無曰不然旒表命數差可停息直僦轜牀裝之以䕠以常所乘者爲魂車他無所用焉第二子貞巧乃織細䕠裝轜以篾爲鈴佩雖素而華帝爲舉哀甚悼惜之張緒爲國子祭酒南郡王師及卒遺命作蘆葭轜車引柩靈上置之水香火不設祭孔休源爲金紫光祿大夫卒遺令薄葬節朔薦蔬菲而已到溉爲金紫光祿大夫與張綰劉之遴友密臨終託張劉勒子孫薄葬之禮曰氣絶便斂斂以法服先有冢毳斂竟便葬不須擇日凶事必存約儉孫姪不得違言韋叡爲散騎常侍䕶軍將軍以疾卒於家遺令薄葬斂以時服蕭琛爲侍中卒遺令諸子與妻同墳異藏祭以蔬菜葬日止車十乘事存率素劉苞爲太子洗馬臨終呼友人南陽劉之遴託以䘮事務從儉率劉訏平原人刺史辟主簿不就卒於從兄敦舍臨終執敦手曰氣絶便斂斂畢即埋不須立靈筵勿設饗祀無求繼祀敦從而行之劉杳爲歩兵校尉知著作臨終遺命斂以法服載以露車還葬舊墓隨得一地容棺而已不得設靈筵祭醊其子遵行之劉歊隱居山林以山水書籍爲娛著革終論其辭曰死生之事聖人罕言之矣孔子曰精氣爲物遊魂爲變知鬼神之情狀與天地相似而不違其文約其㫖妙其事隱其意深未可以臆斷難得而精覈聊肆狂瞽請試言之夫形慮合而爲生魂質離而稱死合則起動離則休寂當其動也人皆知其神及其寂也物莫測其所趣皆知則不言而義顯莫測則逾辨而理微是以勛華曠而莫陳姬孔抑而不説前逹往賢互生異見季札云骨肉歸於土魂氣無不之莊周云生爲徭役死爲休息尋此二説如似相反何者氣無不之神有也死爲休息神無也原憲云夏后氏用明器示民無知也殷人用祭器示民有知也周人兼用之示民疑也考之記籍騐之前志有無之辨不可歴言若稽諸内教判乎釋部則諸子之言可尋三代之禮無越何者神爲生本形爲生具死者神離此具而即非彼具也雖死者不可復反而精靈逓變未嘗滅絶當其離此之日識用廓然故夏后明器示其弗反即彼之時魂靈知滅故殷人祭器顯其猶存不反則合乎莊周猶存則同乎季札各得一隅無傷厥義故周人有兼用之禮尼父發遊魂之唱不其然乎若廢偏携之論探中途之㫖則不仁不智之譏於是乎可息夫形也者無知之質也神也者有知之性也有知不獨存依無知以自立故形之於神逆旅之館也及其死也神去此而適彼也神已去此舘何用存速朽得理也神已適彼祭何所施祭則失理也而姬公孔子之教不然者其有以乎葢禮樂之興出於澆薄俎豆綴兆生於俗弊施靈筵陳棺椁設饋奠建丘壟葢欲令孝子有追思之地爾夫何補於已遷之神乎故上古衣之以薪棄之中野可謂遵盧赫胥皇熊炎帝蹈於失理哉是以子羽沈川漢伯方壙文楚黄壤士安麻索此四子者得理也忘教也若從四子而越遊則平生之志得矣然積習坐常難卒改革一朝肆志儻不見泥今欲翦截煩厚務存儉易進不祼尸退異常俗不傷存者之念有合至曰之道孔子云斂手足形旋葬而無椁斯亦貧者之禮也余何陋焉且張奐止用幅巾王肅唯盥手足范冉斂畢便葬奚珍無設筵几文度故舟爲椁子廉牛車載柩叔起誡絶墳壠康成使無卜吉此數公者尚或如之况於吾人而尚華㤗今欲髣髴景行以爲軌則儻合中庸之道庶免徒費之譏氣絶不須復魂盥洗而斂以一千錢市治棺單故裙衫衣巾枕履此外送往之具棺中常物及餘閣之祭一不得有所施世多信李彭之言可謂惑矣余以孔釋爲師差無此惑斂訖載以露車歸於舊山隨得一地地足爲塪塪足容棺不須塼甓不勞封樹勿設祭享勿置几筵無用茅君之虛坐伯夷之杆水其蒸嘗繼嗣言象所絕事止余身無傷世教家人長幼内外姻戚凡厥友朋爰及寓所咸願成余之志幸勿奪之明年疾卒顧憲之固辭官寵居家授大中大夫臨終爲制以勑其子曰夫出生入死理均晝夜生既不知所從來死亦安識所往延陵所云精氣上歸於天骨肉下歸於地魂氣則無所不之良有以也雖復茫昧難徵若要非妄百年之期迅若馳隙吾今豫爲終制瞑目之後念竝遵行勿違吾志也莊周澹臺逹生者也王孫士安矯俗者也吾進不及逹退無所矯常謂中都之制允理愜情衣周於身示不違禮棺周於衣足以蔽身入棺之物一無所須載以輴車覆以粗布爲使人勿惡也漢明帝天子之尊猶祭以杆水脯糗范史雲烈士之高亦奠以寒水乾飰况吾卑庸之人其可不節䘮也䘮易寧戚自是親親之情禮奢寧儉差可得繇吾意不須常施靈筵可止設香燈使致哀者有慿爾朔望祥忌可權安小牀蹔設几席唯下素饌勿用牲牢蒸嘗之祠貴賤罔替備物難辨多致疎怠祠先人自有舊典不可有闕自吾以下祠止用蔬食時菓勿同於上世也亦令子孫四時不忘其親爾孔子云雖菜羔𤓰祭必齊如也本貴誠敬豈求備物哉陳謝貞之爲丹陽丞以母憂去職加招遠將軍固辭後卒貞之病亟遺疏告族子凱曰吾少罹酷罰十四傾外䕃十六鍾太淸之禍流離絕國二十餘載號天蹐地遂同有感得還侍奉守先人墳墓於吾之分足矣不悟朝廷採拾空薄累致淸階縱其殞絶無所酬報今在憂棘晷漏人盡斂手而歸何所多念氣絶之後若直棄之草野依僧家尸陁林法是吾所願止恐過於獨異爾可用薄版周身載以露車覆以葦席坎山而埋之又吾終𦕈兄弟無他子孫靖年幼少未閑人事但可三月施小牀設香水盡鄉兄弟相厚之情即除之無益之事勿爲也周宏直遷太常卿光祿大夫加金章紫綬遇疾且卒乃遺疏勑其家曰吾今年已來筋力减耗可謂衰矣而好生之情曽不自覺唯務行樂不知老之將至今時制云及將同朝露七十餘年頗經豐足啓手告全差無遺恨氣絶已後便買市見材材必須小形者使易提掣斂以時服古人通制但下見先人必須備禮可著單衣裙衫故履既應待養宜備紛帨或逄善友又須香烟棺内唯安白布手巾粗香爐而已其外一無所用卒于家後魏任城王雲爲雍州刺史薨於州遺令薄葬勿受贈襚諸子奉遵其㫖崔寛卒遺令薄葬斂以時服程駿爲秘書令病篤乃遺命曰吾存尚儉薄豈可沒爲奢厚乎昔王孫祼葬有感而然士安蘧蒢頗亦矯厲今世既休明百度循禮彼非吾志也可斂以時服明器從古遂卒韓麒麟爲冠軍將軍齊州刺史卒遺勑其子殯以素棺事從儉約北齊薛淑累遷尚書僕射卒臨終勑其子斂以時服踰月便葬不聽干求贈官自制䘮車不加彫飾但用麻爲流蘇繩用網絡而已明器等物竝不令置廣陽王嘉薨遺命薄葬李宣茂卒遺命薄葬宋遊道爲大府卿天保元年卒遺令薄葬不立碑表不求贈謚後周薛端爲基州刺史未幾卒遺誡薄葬州府贈遺勿有所受韋敻高尚不仕以年老豫誡其子等曰昔士安以蘧蒢束體王孫以布囊繞尸二賢高逹非庸才能繼吾死之日可斂舊衣勿更新造便棺足周尸牛車載柩墳高四尺壙深一丈其餘煩雜悉無用也朝晡奠食於事彌煩吾不能頓絕汝軰之情可朔望一奠而已仍薦蔬素勿設牲牢親友欲以物弔祭者竝不得受吾常恐臨終恍惚故以此言預戒汝軰瞑目之日勿違吾志也李彥爲驃騎大將軍開府儀同三司臨終遺誡其子等曰昔人以窽木爲櫝葛藟爲緘下不亂泉上不泄臭此實吾平生之志也但事既矯枉爲世所譏今可斂以時服葬於墝塉之地勿用明器塗車及儀衞等爾其念之朝廷嘉焉不奪其志柳霞爲驃騎大將軍開府霍州刺史臨終遺誡薄葬其子等竝奉行之姚察爲太子内舍人大業二年終於東都遺命薄葬務從率儉其畧曰吾家世素士自有常法吾意斂以法服竝宜用布土周於身又恐汝等不忍行此必不爾須松板薄棺纔可周身土周於棺而已葬日止粗車即送厝舊塋北唐李勣爲司空遇疾謂弟弼曰吾見人多埋金玉亦不須爾唯以布裝露車載我柩棺中斂以常服唯加朝衣一副死儻有知望得著此奉見先帝明器唯作馬五六匹下帳用縵布爲頂白紗爲裙其中著十箇木人示依古禮芻靈之義此外一物不用傅奕臨終誡其子曰古人祼葬汝宜行之高士廉爲開府儀同三司申國公遺命曰生死之義自然之道葬者藏也欲人不知厚殉増墳吾所未取啓手之後墓中無内餘物唯置衣一襲及平生所好之書示先王之訓可用終身諸子遵而行之蕭瑀爲金紫光祿大夫宋國公臨終遺言曰生而必死理之常分氣絶後可著單服一通以充小斂棺内施單席而已冀後速朽不得别加一物無假卜日唯在速辦自古聖哲非無此等爾宜勉之諸子聿遵先志襲斂在於率儉蘇瓌睿宗朝爲左右僕射同中書門下三品及薨遺令薄葬及祖載之日官給仗外唯有布車一乗論者稱之令狐楚爲山南西道節度臨終誡諸子曰吾生何益於人無請謚號無受軍府賵贈葬以布車一乗無或加飾無用鼓吹銘誌能叙事者則爲之無擇高位李夷簡自布衣至將相以直道著聞將終不亂深以違禮厚葬爲戒謂浮屠法非先儒敎身殁之後釋氏有爲功德一皆止之不許建神道碑但誌墓而已議者謂其立身行道有始有卒盧承慶爲金紫光祿大夫臨終誡其子曰死生至理亦猶朝之暮吾死斂以常服晦朔無薦牲葬勿卜日器用陶漆棺而不椁墳高可識碑志著官號年月無用虛文贈幽州都督謚曰定册府元龜卷九百七
