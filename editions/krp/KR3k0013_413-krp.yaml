body:
  text: 冊府元龜卷四百十三宋王欽若等撰將帥部禮賢薦賢召募訓練禮賢夫受閫寄身師律明七徳之要居萬夫之長而能忘公侯之勢下蓬蓽之賤謙謙以自牧孳孳如不及斯乃見義之勇道存其間耳矧夫倜儻竒士智慮輻凑徳服鄉人名動肉食固宜傾心折節改容倒屣或優以賔客之禮或尊以師友之位欣慕景仰每先置幣勤接推奉乃至解驂周爰諮詢以圖逺馭豈止下避席豐肴醴以邀一時之譽者乎皇瑗宋大夫也取師於雍丘使有能者無死惜其能也以郟張與鄭羅歸鄭之有能者漢韓信為左丞相漢王與兵萬人擊趙信知成安君不用廣武君李左車䇿遂撃破趙擒趙王歇信乃令軍毋斬廣武君有生得之者購千金頃之有縛而至麾下者信解其縛東鄉坐西鄉對而師事之衞青為大將軍既益尊姊為皇后然汲黯與亢禮或説黯曰自天子欲令羣臣下大將軍下音胡嫁反大將軍尊貴誠重君不可以不拜黯曰夫以大將軍有揖客反不重邪言能降貴以禮最為重也大將軍聞愈賢黯數請問以朝廷所疑遇黯加於平日霍光為大司馬大將軍時楊敞給事幕府為軍司馬光愛厚之後漢竇融為河西大將軍班彪避地河西融以為從事深敬待之接以師友之道彪乃為融畫䇿事漢總西河以拒隗囂袁紹總兵冀州遣使要鄭𤣥大㑹賔客𤣥最後至乃延升上坐𤣥身長八尺飲酒一斛秀眉明目容儀温偉紹客多豪俊並有才説見𤣥儒者未以通人許之兢設異端百家互起𤣥依方辯對咸出問表皆得所未聞莫不嗟服時臧洪與張超起義尊王室及衆散超遣洪詣大司馬劉虞謀值公孫瓉之難至河間遇幽冀二州交兵使命不達而紹見洪又竒重之與結交友好㑹青州刺史焦和卒紹使洪領青州以撫其衆魏鍾㑹為大將軍伐蜀蜀蔣琬子斌為綏武將軍漢城䕶軍㑹至漢城與斌書曰巴蜀賢智文武之士多矣至於足下諸葛思逺譬諸草木吾氣類也桑梓之敬古今所敦西到欲奉瞻尊大君公侯墓當灑掃墳塋奉祀致敬願告其所在斌答書曰知惟臭味意眷之隆雅托通流未拒來謂也亡考昔遭疾疢亡於涪縣卜云其吉遂安厝之知君西邁乃欲屈駕修敬墳墓視予猶父顔子之仁也聞命感惨以増情思㑹得斌書報加歡意義及至涪如其書云後主既降鄧艾斌詣㑹於涪待以交友之禮蜀董允為侍中領虎賁中郎將統宿衛允嘗與尚書令費褘中典軍胡濟等共期游宴嚴駕已辦而郎中襄陽董恢詣允修敬恢年少官微見允停出逡廵求去允不許曰本所以出者欲與同好游談也今君已自屈方展濶積捨此之談就彼之宴非所謂也乃命解驂禕等罷駕不行其守正下士凡此類也晉周浚為折衝將軍揚州刺史随王渾伐吴吴平賔禮故老捜求俊乂吴人悦服初吴之未平也浚在弋陽吴將蔡敏守於沔中其兄珪為将在秣陵與敏書曰古者兵交使在其間而聞疆場之上往往有襲奪互市甚不可行弟慎無為小利而忘大備也候者得珪書以呈浚浚曰君子也及渡江求珪得之問其本鄉曰汝南人也浚戲之曰吾固疑吴無君子而卿果吾鄉人庾亮為平西將軍以范汪博學多通善談名理命為恭軍汪復恭亮征西將軍轉州别駕為亮佐使十有餘年甚相欽待桓温為征西大將軍辟謝安為司馬安既到温甚喜言生平歡笑竟日既出温問左右頗嘗見我有如此客不温後詣安值其理髪安性遲緩久而方罷使取幘温見留之曰令司馬著幘進其見重如此又温為大司馬時瞿硎先生者不得姓名亦不知何許人也太和末嘗居宣城郡界文脊山中山有瞿硎因以為名焉温嘗往造之既至見先生被鹿裘坐於石室神無忤色温及僚佐數十人皆莫測之乃命伏滔為之銘贊竟卒於山中滔為温叅軍温深加禮接每宴集之處必命滔同游桓冲為車騎将軍聞南陽人劉驎之名請為長史驎之固辭不受冲嘗到其家驎之於樹條桑使者致命驎之曰使君枉駕光臨宜先詣家君冲聞大媿於是乃造其父父命驎之然後方還拂短褐與冲言話父使驎之於内自持濁酒蔬菜共賔冲勑人代驎之酌酒父辭曰若使從者非野人之意也冲慨然至昏乃退王敦為大將軍荆州牧以郭舒為恭軍轉從事中郎敦重舒公亮給賜轉豐數詣其家表為梁州刺史又謝鯤為敦長史每與畢卓王尼阮放羊曼桓彝阮孚等縱酒敦以其名髙雅相賔禮謝鯤為領軍將軍時羊欣為㑹稽王世子元顯後軍府舍人此軄本用寒人欣意貌恬然不以髙卑見色論者稱之欣嘗詣鯤鯤拂席改服然後見之時鯤族子霛運在坐退告族兄瞻曰望蔡臣欽若等曰鯤襲封望蔡公見羊欣遂易衣改席欣由此益知名梁沈約為鎮軍時有彭城人劉孺美風彩性通和雖家人不見其喜愠本州召迎主簿起家為中軍法曹行恭軍約聞其名引為主簿嘗與逰宴賦詩大為約所嗟賞曹景宗為領軍將軍為人自恃尚勝雖公卿無所推稱唯韋叡年長且州里勝流特相敬重同讌御筵亦曲躬謙遜陳王僧辯為征東將軍時許亨為從事中郎時晉安王承制授給事黄門侍郎亨奉諜辭府僧辯荅曰省告承有朝授良為徳舉卿志操惇深文藝該洽學優而官自致青紫况久羈駿足將成頓轡禆輔虚暗期寄實深既欣㳺處用忘勞屈而枳棘栖鵷嘗以増嘆夕郎之選雖為清顯位以才升固無自媿且卿始云知命方騁康衢未有執㦸之疲便深夜行之慨循復來翰殊用憮然古人相思千里命駕素心不殊寧限城闉存顧之深荒慙無已又沈禮明為吴興令侯景将宋子仙據吴興使召禮明委以書記之任禮明固辭子仙怒命斬之或救獲免子仙愛其才終逼之令掌書記及子仙為僧辯所敗僧辯素聞其名於軍中購得之酬所獲者鐵錢十萬自是羽檄軍書皆出於禮明又張種有孝行侯景之亂奉其母東奔久之得達鄉里俄而母卒種時年五十而毁瘠過甚又迫以凶荒未獲時𦵏服制雖畢而居處飲食常若在䘮及景平僧辯以狀奏聞起為貞威將軍治中從事史并為具𦵏訖種方即吉僧辯又以種年老傍無嗣息賜之以妾及居處之具又徐陵為通直散騎常侍奉使於齊齊拘留不遣齊送貞陽侯蕭淵明乃遣陵隨還僧辯初拒境不納淵眀復致書皆陵詞也又淵明之入僧辯得陵大喜接待饋遺其禮甚優後魏爾朱榮為車騎將軍時尖山人侯淵機警有膽略孝明末年六鎮饑亂淵随杜雒周南冦後與妻兄念賢背雒周歸榮路中遇冦身被苫褐榮賜其衣帽厚待之以淵為中軍副都督常從征伐屢有戰功又賀㧞允亦尖山人也初為積射将軍歸榮允父子兄弟並以武藝知名榮素聞之見允待之甚厚後周李逺初仕魏為武騎常侍及爾朱天光西伐乃配逺精兵使為鄉導天光欽逺才望特相引接除伏波将軍長城郡守原州大中正宇文神舉為司武大夫時幽州人盧昌期等反神舉討之齊黄門侍郎盧思道亦在反中賊平見獲解衣將伏法神舉素欽其才名乃釋而禮之即令草露布其待士禮賢如此于謹為柱國時王褒仕梁元帝為左僕射文學優贍當時已被推挹及王師圍江陵褒都督城西諸軍事及城陷褒從元帝入子城猶欲固守俄而元帝出降褒遂與衆俱出見謹謹甚禮之韋孝寛為總管絳州刺史裴文舉以㢘約自守孝寛特相欽重每以談論不覺膝前於席隋賀若弼平陳之役與蕭摩訶戰大破之麾下開府員明擒摩訶至弼命左右牽斬之摩訶顔色自若弼釋而禮之唐李勣貞觀初為并州長史時張文瓘舉明經補并州恭軍勣深禮之又李義琰弱冠舉進士累補太原尉勣深禮之宇文士及為涼州都督折節禮士涼士服其威恵郭子儀為闗中副元帥乾元中蔣沅為陸渾盭厔咸陽髙陵四令當軍旅之後瘡痍未平沅竭心撫綏所至安輯子儀每統兵由其縣必戒軍吏曰蔣令清嚴幹辦供億固當有素士衆得蔬飯見饋則已無撓清政呂崇賁為河西節度時楊炎釋褐掌書記先時神烏縣令李大簡因酒辱炎至是與大簡同在使府炎執縛大簡以鐵鞭鞭之血流於地㡬死崇賁愛其才不之問李勉歴嶺南滑亳汴宋節度使禮賢下士終始盡心以名士李廵張恭為判官卒於幕三嵗之内每遇宴飲必設虚位於筵次陳膳執酹辭色悽愴論者美之李抱真為昭義軍節度使欲招致天下賢雋聞人之才善必令持貨幣千里邀致之至與語無可采者漸退之鄭餘慶為山南西道節度使辟崔咸於幕中奉如師友烏重𦙍官至横海軍節度使善待僚佐體分周密曲盡禮敬故當時名士咸願依焉令狐楚為河陽懐孟節度使李商隠以所業文干之年纔及冠楚以其少俊深禮之令與諸子逰楚鎮天平汴州從為廵官歳給資装令随計上都牛僧孺為山南東道節度使以劉賁為從事待如師友梁羅紹威為魏博節度使紹威本名將家貴居裂土雅好儒術善為七言詩重宗人隠隠時為錢塘賔介遣使以叔事之有所編目曰偷江東集竟薦隠除給事中不赴議者美之後唐王思同明宗時為同州節度使未㡬移鎮隴右思同好文士無賢不肖必館接贈遺嵗費數十萬在秦州累年邊民懷恵華戎寧息晉張廷藴後唐荘宗時為帳前歩軍都虞候諸軍濠寨使而性重文士下汶陽日首獲鄆帥戴思逺判官趙鳳許之曰爾状貎必儒人也勿隠其情鳳具言之尋引薦於明宗明宗令送付行臺除鳳翰林學士趙在禮為晉昌節度使好延士大夫周王饒為相州節度使每接賔佐必怡聲緩氣恂恂如也故士君子亦以此多之薦賢周書曰舉能其官惟爾之能蓋夫稱善以益國推賢以成務者良臣之業也而况居將帥之任當倚注之重出征入輔安危之所寄干城宿衞心膂之攸託而能博訪遺逸咨求髦彦薦之天子揚於王庭使其飛聲垂光經物集事成賔門穆穆之美致思皇濟濟之盛此其左右王室丹青神化不亦多乎哉漢氏而下比比而有皆足以激昂風烈聳勸來者自非同聲之相應善人之舉類亦安能及是哉漢夏侯嬰封滕公髙祖十一年七月淮南王黥布反帝問諸將滕公言故楚令尹薛公有籌䇿帝召見薛公言布形勢帝善之封薛公千户衞青為大将軍咸宣以佐史給事河東守青使買馬河東宣充使而於河東買馬也見宣無害言於武帝徴為廏丞官事辦張安世為衞将軍蘇武以故二千石與計謀立宣帝與音豫賜爵闗内侯食邑三百户久之安世薦武明習故事奉使不辱命先帝以為遺言宣帝即時召武待詔宦者署少府屬官有宦者令丞以其署親近故令於此待詔也數進見復為右曹典屬國蕭望之為前将軍周堪為諸吏光禄大夫領尚書事時劉更生年少於望之堪然二人重之薦更生宗室忠直明經有行擢為散騎宗正給事中與侍中金敞拾遺於左右四人同心輔政王鳳為大将軍元帝時陳咸為石顯奏髠為城旦成帝初即位鳳以咸前指言石顯短有忠直節奏請咸補長史又薛宣為宛句令鳳聞其能薦宣為長安令治果有名後漢鄧禹為大將軍時吴漢歸光武於廣阿拜偏將軍漢為人質厚少文造次不能以辭自達禹及諸將多知之數相薦舉及得召見遂相親信嘗居門下光武將發幽州兵夜召禹問可使行者禹曰間數與吳漢言其人勇鷙有智謀諸將鮮能及者即拜漢大将軍持節北發十郡突騎光武行至信都以銚期為禆将與傅寛吕宴俱屬禹狥傍縣禹以期為能獨拜偏將軍授兵二千人寛宴各數百人還言其狀光武甚善之使期别狥真定宋子攻㧞樂陽槀肥壘樂陽縣名屬常山郡今恒州槀城縣故城在縣西肥壘故肥子國也漢以為縣故縣在今藁城縣西南並屬真定國及禹西征闗中定河東張宗詣禹自歸禹聞宗素多權謀乃表為偏將軍後光武南定河内而更始大司馬朱鮪等盛兵據雒陽又并州未安光武難其守問於鄧禹曰諸将誰可使守河内者鄧禹曰昔髙祖任蕭何於闗中無復西顧之憂所以得專精山東終成大業今河内帶河為固户口殷實北通上黨南迫雒陽寇恂文武備足有牧人御衆之才非此人莫可使也乃拜恂河内太守行大将軍事弓里戍光武時為騎都尉将兵平定北州到太原歴訪英俊大人問以策謀時温序仕州從事戍見奇之上疏薦焉徴為待御史鄧隲為大将軍時詔公卿舉儒術篤學者隲舉前侍中魯丕再遷復為侍中左中郎将再為三老梁商為大将軍疾篤順帝親臨幸問以遺言對曰人之將死其言也善臣從事中郎周舉清髙忠正可重任也由是拜舉諌議大夫何進為大将軍廣漢董扶少游太學學圖䜟還家講授進表薦扶曰資游夏之徳述孔氏之風内懐焦董消復之術方今并涼騷擾西戎蠢叛宜勑公車特召待以異禮諮謀竒䇿於是靈帝徴扶即拜侍中在朝稱為儒宗甚見器重又公車徴荀爽為進從事中郎進恐其不至迎薦為侍中及進敗而詔命中絶段熲為破羌将軍表言樊志張既有梓慎焦董之識宜翼聖朝咨詢竒異於是有詔特徴㑹病終皇甫規為度遼将軍至營數月上書薦中郎將張奐以自代曰臣聞人無常俗而政有治亂兵無強弱而将有能否伏見中郎将張奐才略兼優宜正元帥以從衆望若猶謂愚臣宜充軍事者願乞冗官以為奐副朝廷從之以奐代為度遼将軍規為使匃奴中郎将及奐遷大司農規復代為度遼将軍魏王朗為将軍時黄巾起鮑信招合徒衆干禁附從焉及太祖領兖州禁與其黨俱詣為都伯屬朗朗異之薦禁才任大将軍太祖召見與語拜軍司馬張郃河間鄭人也太祖時為征西車騎将軍雖武将而愛樂儒士嘗薦同鄉卑湛明經行修詔曰昔祭遵為将奏置五經大夫居軍中諸生雅歌投壺今将軍外勤戎旅内存國朝朕嘉將軍之意令擢湛為博士夏侯獻為中領軍時公孫淵斬孫權使復歸魏帝將遣使獻表曰公孫淵昔年敢違王命廢絶計貢者實挾兩端既恃險阻又怙孫權故敢䟦扈恣睢海外宿舒親見賊權軍衆府庫知其弱少不足憑恃是以决計斬賊之使又髙句麗濊貊與淵為仇並為寇鈔今外失吴援内有胡寇心知國家能從陸道勢不得不懐惶懼之心因斯之時宜遣使示以禍福奉車都尉鬷𢎞武皇帝時始奉使命開通道路文皇帝即位欲通使命遣𢎞将妻子還歸鄉里賜其車牛絹五百疋𢎞以受恩歸死國朝無有還意乞留妻子身奉使命公孫康遂稱臣妾以𢎞奉使稱意賜爵闗内俟𢎞性果烈乃心於國夙夜拳拳念自竭効冠族子孫少好學問博通書記多所闗渉口論速㨗辯而不俗附依典誥若出胸臆加仕本郡常在人右彼方士人素所敬服若當遣使以為可使𢎞行𢎞乃自舊土習其國俗為説利害辯足以動其意明足以見其事才足以行之辭足以見信若其計從雖酈生之降齊王陸賈之説尉佗亦無以逺過也若進逺路不宜釋騏驥将已篤疾不宜廢扁鵲願察愚言桓範為中領軍表薦尚書徐宣曰臣聞帝王用人度世授才爭奪之時以䇿略為先分定之後以忠義為首故晉文行舅犯之計而賞雍季之言髙祖用陳平之智而托後於周勃也竊見尚書徐宣體忠厚之行秉直亮之性清雅特立不拘世俗確然難動有社稷之節歴位州郡所在稱職今僕射缺宣行掌後事腹心任重莫宜宣者帝遂以宣為左僕射趙儼為驃騎将軍正始中胡昭養志不仕以經籍自娱儼與尚書黄休郭彝散騎常侍荀覬鍾毓太僕庾嶷𢎞農太守何楨等遞薦昭曰天真高潔老而彌篤𤣥虚静素有夷皓之節宜䝉徴命以勵風俗蜀諸葛亮後主建興初封武鄉侯三年春率衆南征其秋乃治戎講武以俟大舉五年率諸軍北駐漢中臨發上疏曰先帝創業未半中道而殂今天下三分益州疲弊此誠危急存亡之秋也然侍衞之臣不懈於内忠志之士忘身於外者蓋追先帝之殊遇欲報之於陛下也誠宜開張聖聽以光先帝遺徳恢𢎞志士之氣不宜妄自菲薄引喻失義以塞忠諫之路也宫中府中俱為一體陟罰臧否不宜異同若有作姦犯科及為忠善者宜付有司論其刑賞以昭陛下平明之治不宜偏私使内外異法也侍中侍郎郭攸之費禕董允等此皆良實志慮忠純是以先帝簡㧞以遺陛下愚以為宫中之事事無大小悉以諮之然後施行必能禆補闕漏有所廣益将軍向寵性行淑均曉暢軍事試用於昔日先帝稱之曰能是以衆議舉寵為督愚以為營中之事悉以諮之必能使行陣和睦優劣得所親賢臣逺小人此先漢所以興隆也親小人逺賢臣此後漢所以傾頺也先帝在時每與臣論此事未嘗不歎息痛恨於桓靈也侍中尚書長史叅軍此悉貞良死節之臣願陛下親之信之則漢室之隆可計日而待也臣本布衣躬耕於南陽茍全性命於亂世不求聞達於諸侯先帝不以臣卑鄙猥自枉屈三顧臣於草廬之中諮臣以當世之事由是感激遂許先帝以驅馳後值傾覆受任於敗軍之際奉命於危難之間爾來二十有一年矣先帝知臣謹慎故臨終寄臣以大事也受命以來夙夜憂慮恐付托不效以傷先帝之明故五月渡瀘深入不毛今南方已定兵甲已足當奬率三軍北定中原庶竭駑鈍攘除奸凶興復漢室還於舊都此臣所以報先帝而忠陛下職分也至於斟酌損益進盡忠言則攸之禕允之任也願陛下託臣以討賊興復之效不效則治臣之罪以告先帝之靈責攸之禕允等之慢以彰其咎陛下亦宜自謀以諮諏善道察納雅言深追先帝遺詔臣不勝受恩感激今當逺離臨表涕泣不知所言吴周瑜為偏将軍還江陵病困上疏曰當今天下方有事役是瑜乃心夙夜所憂願至尊先慮未然然後康樂今既與曹操為敵蜀主近在公安邊境密邇百姓未附宜得良将以鎮撫之魯肅智略足任乞以代瑜瑜隕踣之日所懷盡矣江表傳載初瑜病困與大帝牋曰瑜以凡才昔受討逆殊特之遇委以腹心遂荷榮任統御兵馬志執鞭䇿自効戎行規定巴蜀次取襄陽思賴威靈謂若在握至以不謹道遇暴疾昨日醫療日加無損人生有死修短命矣誠不足惜但恨微志未展不復奉教命矣方今曹公在北疆場未静𤣥徳寄寓有似養虎天下之事而未知終始此朝士旰食之秋至尊垂慮之日也魯肅忠烈臨事不茍可以代瑜人之将死其言也善儻或可采瑜死不朽矣案此牋與本傳所載音㫖雖同其辭微異耳即拜肅奮武校尉代瑜領兵瑜士衆四千餘人奉邑四縣皆屬焉吕蒙為左䕶軍虎威將軍屯陸口将圖闗侯稱疾詣建業陸遜屯蕪湖往見蒙曰雲長接境如何逺下後不當可憂也蒙曰誠如來言然我病篤遜曰彼矜其驍氣陵轢於人始有大功意驕志逸但務北進未嫌於我兼相聞病必益無備今出其不意自可擒制若見至尊宜好為計蒙曰彼素勇猛既難為敵且已據荆州恩信大行兼始有功膽勢益盛未易圖也蒙至都大帝問誰可代卿者䝉對曰陸遜意思深長才堪負重觀其規慮終可大任而未有逺名非彼所忌無復是過若用之當令外自韜隠内察形便然後可克大帝乃召遜拜偏將軍右都督代蒙全琮為衞將軍陳熾少有志操能計筭琮表稱熾任大將軍赴召道卒晉羅憲仕蜀為巴東太守劉禪降入朝進位冠軍将軍假節從帝宴於華林園詔問蜀大臣子弟後問先軰宜時叙用者憲薦蜀郡常忌杜軫夀良巴西陳夀南郡髙軌南陽吕雅許國江夏費恭琅琊諸葛京汝南陳裕即皆叙用咸顯於世王胡之為北平将軍司州刺史初任吴興郡郡人沈勁父充與王敦搆逆為部曲將吴儒所殺勁少有節操哀父死於非義志欲立勲以雪先恥年三十餘以刑家不得仕進胡之深異之及遷將軍將鎮洛陽上疏曰臣當藩衞山陵式遏戎狄雖義督羣心人思自百然方剪荆棘奉宣國恩艱難多病非才不濟吴興男子沈勁清操著於鄉邦貞固足以幹事且臣今西文武義故吴興人最多若令勁恭臣府事者見人既悦義附亦衆勁父充昔雖得罪先朝然其門户累䝉曠蕩不審可得特垂沛然許臣所上否詔聽之庾亮為征西將軍秘書郎王羲之為恭軍累遷長史亮臨薨上疏稱羲之清貴有鑒裁遷寜逺將軍江州刺史宋檀道濟為征南大将軍白太祖稱沈慶之忠謹曉兵帝使領隊防東掖門稍得引接出入禁省吴喜為輔國将軍劉休為其府録事恭軍喜稱休才進之明帝得在左右後魏穆亮為仇池鎮将氐豪楊卜自延興以來從軍征伐二十一戰前来鎮將抑而不聞亮表卜為廣業太守豪右咸悦境内大安徴為侍中尚書左僕射慕容白曜為征南将軍恭軍韓麒麟美姿容善騎射白曜進攻外城師人多傷及城潰白曜將坑之麒麟諌從之皆令復業齊人大悦後白曜表麒麟為冠軍將軍與房法夀為冀州刺史元乂為領軍李志為輔國将軍志博學有才幹所在著績桓叔興外叛南荆荒毁乂舉志才任撫綏擢為南荆州刺史蕭寳夤為開府西道行臺權景宣天水顯親人也少聰悟有氣侠宗黨皆歎異之年十七寳夤見而竒之表為輕車将軍北齊趙郡公琛為大将時崔季舒年十七為州主簿琛所器重言之於神武親簡丞郎補季舒大行臺都官郎吏後周獨孤信為驃騎大将軍於洛陽被圍賀若敦彎弓三石箭不虚發信大竒之乃言於太祖太祖異之引置麾下授都督王思政為并州刺史鎮玉壁太祖命舉代己者思政乃進所部都督韋孝寛其後東魏来冦孝寛卒能全城時論稱其知人唐李勣武徳初為武候大将軍後遷左監門大將軍時張亮為檢挍定州别駕勣數薦亮於太宗房元齡亦言之於是引為車騎将軍漸蒙顧遇委以心膂劉仁願為熊津都督既破百濟餘衆仁願至京師髙宗謂曰卿在海東前後請奏皆合事宜而雅有文理卿本武將何得然也對曰皆是劉仁軌之詞非臣所及也帝深歎賞之因超加仁軌六階正授帶方州刺史并賜京城宅一區厚賚其妻子遣使璽書勉之初仁軌坐事除名配軍効力至是復用上官儀謂人曰劉仁軌雖遭削黜而能盡其忠劉仁願秉節制而能推其賢可謂皆君子也令狐彰為義成軍節度使臨終舉能自代表曰伏見吏部尚書劉宴工部尚書李勉智識忠貞堪委大事伏願陛下速令檢校上副聖心以勉代之李晟為河中尹河中晉絳慈隰節度使京畿渭北鄜坊商華兵馬副元帥既平朱泚表舉守節不為泚所廹脅者程鎮之劉廼蔣沅趙驊薛岌等數十人李峴為江陵節度使監察御史嚴郢坐按甲秦芝事貶建州後徴復舊官道由江陵峴乃署奏行軍司馬兼領留府劉總為幽州節度使頻獻表章請出家為僧分割當管土地又以張𢎞靖嘗節制河東以和易為理河東與幽州接壤素聞其風河朔之人久苦暴虐總思有以寛濟之遂舉𢎞靖自代詔從之梁張漢傑為控鶴指揮使薊門人陳乂少好學善屬文因避亂客於浮陽轉移於大梁漢傑延於私邸表授太子舍人後唐郭崇韜為樞密使㑹魏王征蜀崇韜為副将發上疏曰陛下委臣以戎事仗将士之忠孝憑陛下之威靈鼔行而西庶㡬集事如蜀川平定陛下擇帥撫臨以臣料之信厚善謀事君有禮則北京副留守孟知祥有焉願陛下使之為帥如臣出征之後宰輔闕人則鄴都副留守張憲有披荆草昧之勞為人謹重而多識其次則吏部尚書李琪御史中丞崔居敬皆中朝士族富有文學陛下擇才相之臣亦無敢謬舉餘則臣所不知召募昔周作井田兵賦是出甲卒之數備存等威盖天子有六軍諸侯大國三軍次國二軍小國一軍乃其制也其後齊之技擊魏之武卒秦之鋭士亦皆出於簡練焉經界既壞兵農異制尺籍伍符非用古道故漢氏而下或召募壯勇以備戎行至乃乗四方之叛渙因羣冦之充斥或整旅以拒敵或交兵而决勝繇是選求驍果申之勸賞以至取夷落之義從收山澤之亡命備諸牙爪充乎伍列推誠信以深結勵精悍而無前咸可以供時使而盡其死力者矣漢陳立為䍧牁太守夜郎王興妻父翁指興子邪務反立奏募諸夷與都尉長史分将攻之後漢岑彭為征南大將軍公孫述遣其將任滿田戎程汎將兵據荆門虎牙横江水起浮橋鬬樓立攅柱絶水道結營山上以拒漢兵彭數攻不利彭乃令軍中募攻浮橋先登者上賞於是偏将軍魯竒應募而前時大風狂急彭竒船逆流而上直衝浮橋而攅柱鉤不得去竒等乗勢殊死戰因飛炬焚之風怒火盛橋樓摧燒彭復悉軍順風並進所向無前蜀兵大亂溺死者數千人斬任滿生獲程汎而田戎亡保江州何進為大将軍遣張遼詣河北募兵得千餘人還又遣上軍校尉蹇碩司馬張楊歸本州募兵得千餘人因留上黨撃山賊魏程昱漢末為振威将軍太祖討袁氏昱乃収山澤亡命得精兵數千人乃引軍與太祖㑹黎陽討袁譚袁尚譚尚破走拜昱奮武将軍封安國亭侯曹洪從太祖討董卓為卓将徐榮所敗還奔譙洪與揚州刺史陳温善洪将家兵千餘人就温募兵得廬江上甲二千人東到丹陽復與數千人與太祖㑹龍亢蜀吕乂為巴西太守丞相諸葛亮連年出軍調發諸郡多不相救乂募取兵五千人詣亮慰諭簡制無逃竄者吴凌統為偏将軍統以山中人尚多壮悍可以威恩誘也大帝令東占且討之命勑屬城凡統所求皆先給後聞統素愛士士亦慕焉得精兵萬餘人全琮為奮威校尉授兵數千人使討山越因開募召得精兵萬餘人出牛渚晉馬隆泰始中為司馬督時梁州為虜所沒武帝曰誰能為我討此虜乎隆曰臣能平之臣請募勇士三千人鼓行而西虜何足滅哉帝許之隆募限腰引弩三十六鈞立標簡試自旦至中得三千五百人隆曰足矣祖逖元帝為晉王時自軍諮祭酒拜奮威将軍豫州刺史給千人廪布三千疋不給鎧仗使自招募仍將本流徒部曲百餘家渡江屯於淮陰起冶鑄兵器得二千餘人而後進桓宣為都督沔北前鋒征討軍事平北将軍司州刺史假節鎮襄陽石季龍使騎七千渡沔攻之庾亮鎮荆州遣司馬王衍期輔國将軍毛寳救宣賊三面為地窟攻城宣募精勇出其不意殺傷數百多獲鎧馬賊解圍退走謝𤣥為前将軍鎮廣陵苻堅方盛𤣥多募勁勇劉牢之與東海何謙琅琊諸葛偘樂安髙衡東平劉軌西河田雒晉陵孫無終等以驍猛應選南齊劉道隆為梁州刺史與義陽王征北恭軍垣崇祖同行使還下邳召募後魏王肅初自齊歸於道武為輔國将軍長史時詔討齊於義陽聽招募壮勇以為爪牙其募士有功賞加常募一等其從肅行者六品已下聽先擬用然後表聞若投化之人聽五品已下即優授於是假肅節行平南将軍蕭寳夤為鎮東将軍配兵一萬據東城又任其募天下壯勇得數千人唐景宣初為東郡太守建義元年為持節都督於東郡召募僑奮之民三千人渡河随便為柵准望臺軍李瑒為伏波將軍随蕭寳夤西征以瑒為統軍假寧逺将軍瑒徳洽鄉閭招募雄勇其樂從者數百騎瑒傾家賑恤率之西討楊椿為左衞将軍兼尚書右僕射馳驛詣并肆賫絹三萬疋募召常朔流民揀充軍士後為雍州刺史於時蕭寳夤等兵敗涇岐及豳悉已䧟賊扶風以西非復國有椿乃鳩募内外得七十餘人遣兄子録事叅軍偘率以防禦爾朱榮為直寢逰擊将軍正光中四方兵起遂散畜牧招合義勇給其衣馬薛循義初為北海王顥綂軍時有詔能募得二千人者用為别將於是循義還河東仍歴平陽𢎞農諸郡合得七千餘人即假安北將軍西道别将北齊髙昂初仕魏為直閣将軍昂以冦難尚繁非一夫所任義勇競来投赴尋值京師不守遂與父兄據信都起義隋崔𢎞度初仕周為上大将軍及尉遲迥作亂以𢎞度為行軍總管從韋孝寛討之𢎞度募長安驍雄數百人為别隊所當無不披靡李子雄為廣州刺史煬帝時漢王諒作亂帝疑幽州總管竇抗有貳乃遣子雄馳至幽州止傳舍召募得千人唐王長諧隋末從太宗舉義平西河郡遂為太守召募得數千人與大軍西㑹以為右一綂軍從破宋老生進授光禄大夫封常清為伊西節度使天寳末入朝㑹安禄山反常清奏曰禄山領兇徒十萬徑犯中原太平斯久民不知戰然事有逆順勢有竒變臣請走馬赴東京開府庫募驍勇挑馬箠渡河計日取逆豎之首懸闕下𤣥宗方憂壯其言翌日以常清為范陽節度使俾募兵東討其日常清乗驛赴東京召募旬日得六萬傭保市井之流李抱真大歴末為澤潞留後密揣山東當有變上黨且當兵衝是時乗戰餘之地土瘠賦重人益困無以養軍士乃集户丁男三選其一有才力者免其租徭給弓矢令之曰農之隙則分曹角射歳終吾當㑹試及期按簿而徴之都試以示賞罰復命之如初比三年則皆善射抱真曰軍可用矣於是舉部内之鄉兵得成卒二萬既不廩費府庫益實乃繕兵甲為戰具遂雄視山東是時稱昭義歩兵冠諸軍白志貞建中末為神䇿軍使徳宗將討李希烈乃募兵京師以志貞為之使於是郭子儀壻端王傅吴仲孺家財累巨萬以召募有急懼不自安乃上表請遣其子率奴馬以應募徳宗善從之超授其子五品官由是志貞請令故節度團練觀察等使并常為是官者家出男子馬奴備戎装以討希烈各與其男官豪家不肖子幸之貧而有知者苦之由是京師人心震揺不保家室嚴礪元和初為山南西道節度使奏當軍将士請共置一萬二千其數内二千三百八十六人新加從之吕元膺元和中為東都防禦使請募置三河子弟以衞宫城東畿西南瀕鄧虢山谷曠而多麋及猛獸人人習射獵而不利耕蠶春夏以其族黨遷徙無常處俗呼為山棚前留守權徳輿知其可縻而用將請之㑹詔徴還故元膺繼請焉李聽長慶初為靈監節度使奏請於淮南忠武武寧軍防秋兵中取三千人衣賜月糧等於當道自召一千五百人馬軍驍勇者以備戎狄每五千人為一社每一馬死共補之使其永無缺減從之王承元太和中為鳳翔節度使奏當軍應管兵三萬人内軍一千五百騎今更添置一千五百騎請度支給衣糧草料王智興太和中為徐州節度使奏請新招子弟一千八百人衣糧崔𦙍天復中同平章事奏六軍十二衞名額空存實無兵士京師侍衞亦籍親軍請每軍重召募一千五百人共置六千六百人從之乃令六軍諸衞副使京兆尹鄭元規立格招收於市朱瑾為兖州節度使募驍勇數百人㸃雙鴈於其頰立為鴈子都後唐安重榮為鄭州廵檢清泰元年上言召募騎軍五千人自出鎧馬從之漢孫方諫為定州節度使上言所部屯兵數少欲召募牙兵千人乞度支給衣糧訓練禮曰孟秋天子命将帥選士勵兵簡練俊傑以申嚴武備之謂也必在蒐乗補卒鞠旅陳師既節制之有聞故號令而無失握兵之要勵衆之權何莫由斯道者也子文楚大夫也魯僖二十七年楚子將圍宋使子文治兵於暌子文時不為令尹故云使治兵習號令暌楚邑終朝而畢不戮一人終朝自旦及食時也子文欲委重於子玉故略其事子玉復治兵於蔿子玉為令尹蒍楚故邑終日而畢鞭七人貫三人耳漢李陵為騎都尉將勇敢五千人教射酒泉張掖以備胡蜀諸葛亮為丞相後主建興十年亮教兵講武吴吕䝉為别部司馬大帝料諸少將兵少而用薄者欲并合之蒙隂賒費為兵作絳衣行縢及簡日陳列赫然兵人練習大帝見之大悦増其兵晉周訪為安南将軍梁州刺史屯襄陽訪練兵簡卒欲宣力中原與李矩郭黙相結慨然有平河雒之志梁夏侯為持節督南豫州諸軍事有部曲萬人馬二千匹並服習精强為當時之盛北齊唐邕為䕶軍邕以軍民教習田獵依令十一月月别三圍以為人馬疲弊奏請每月兩圍武成從之唐馬燧代宗大歴末為河東節度使是時鮑訪自百井敗軍之後兵馬寡弱騎士少燧乃悉召將吏牧馬厮役得數千人悉補騎卒教之數月皆為精騎造甲者必令長短三等稱其所衣以便進趨又造戰車以狻猊象刺㦸於後行則載兵甲止則為軍陣或塞險阨以遏奔衝器械無不犀利居一年陳兵三萬開廣場以習戰陳教其進退李觀為四鎮北廷行營涇原節度使在鎮四年雖有拓境之績訓卒儲糧亦稱寧輯段佑為涇原節度使練兵保邊亦為西蕃畏憚髙崇文為長武軍使積榖練兵軍聲大振順宗永貞元年冬劍南劉闢阻兵詔崇文為左神䇿行營節度使綂諸鎮兵以討之崇文在長武訓卒五千常若寇至及是中使至長武寅時宣命卯時出師器用無闕王鍔為太原節度使時方討鎮州輯綏訓練軍府稱治崔孔禮為河陽節度時整練戈矛頗修戎備後唐康義誠為襄州節度使明宗長興二年五月上言數閱棹船修戰備也冊府元龜卷四百十三
