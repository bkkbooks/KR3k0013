body:
  text: 册府元龜卷六百二十九宋王欽若等撰銓選部總序夫先王建國法天制官故勞大者其禄厚功多者其爵尊能治衆者其官大是以量其才用程其器能考之以言試之以職惟善是授共格于治者也而銓選之任衡鑑是司歴世以來資地尤重故曰周禮天官大宰掌建邦之六典以佐王理邦國其官即今之吏部而職任頗異也又曰夏官之屬有司士下大夫二人掌羣臣之版古書版為班書或為版名籍也歳登下其損益之數謂用功過黜陟者也辨其年歳與其貴賤年數多少知其老少周知邦國卿大夫士庶子之數以詔王理告王所尚進退矣以徳詔爵有賢者之徳乃詔以爵以功詔禄理有功然後詔以禄以能詔事以乆奠食能者成事乃食之王制曰論定然後官之任官然後爵之位定然後禄之奠音定也乃今銓選之義矣漢丞相東曹主二千石長吏遷除亦其事也成帝初置尚書四人六百石分為四曹吏曹尚書典選舉又曰常侍曹主公卿事至後漢光武分為六曹常侍曹為吏部曹主選舉祠祀漢末又改三選部專掌選舉事靈帝時以侍中梁鵠為選部尚書於此始見㑹名魏改選部為吏部而主選事陳羣延康元年始建九品官人之法拜吏部尚書晉與魏同宋時吏部尚書領吏部刪定三公比部四曹孝武不欲威權在下大明二年分吏部尚書二人以輕其任後還置一吏部尚書後魏北齊置吏部掌褒崇選補考功主爵三曹後周置大冡宰卿一人屬官有吏部中大夫一人領司勲上士等隋初復曰吏部尚書至唐氏建國吏部尚書侍郎掌銓選之職掌天下衆官之選授凡職官銓綜之典權衡殿最之法悉以咨之其屬有四曰吏部主爵司勲考功冠於中臺盡總職務而奉行其制命凡中外百司之事繇於所屬皆質正焉其取士則以三類觀其異一曰徳行二曰才用三曰勞効徳均以才才均以勞其優者擢而升之否則量以退焉所以正權衡明與奪抑貪冐進賢能也然後據其狀以覈之量其資以擬之五品以上皆召問而制授焉六品以上常叅之官則勑授晉供奉官及員外官監察御史其餘則各量資注擬置吏部尚書一人正三品龍朔二年改吏部尚書為司列太常伯咸亨元年復為吏部尚書光宅元年改為天官尚書神龍元年復舊天寳十一載三月又改為文部掌文官選事總判吏部司封勲考四曹事至徳二載十二月復為吏部尚書侍郎二人正四品比周之天官小宰中大夫也隋煬帝置以貳尚書之職唐朝因之武徳七年二月省貞觀二年正月復置龍朔二年改為司列少常伯總章元年加一員咸通元年復為吏部侍郎掌選補流内六品以下官是為銓衡之任凡初仕進者無不仰屬選集之際勢傾天下列曹之中資位尤重光宅元年為天官侍郎神龍元年復為吏部天寳十一載三月為文部侍郎至徳二載十二月復為吏部總章中添一員為二員本員為中銓新加員為東銓永昌元年三月又加一員聖歴二年五月减二員乾元二年八月改中銓為西銓郎中二員晉魏巳來妙於時選其他曹郎功髙者遷為吏部然而或有侍郎或有郎中或曰尚書郎或曰某曹郎稱號不同所職一也齊謝朓王儉為吏部郎是也隋初諸曹郎皆謂之侍郎煬帝三年分置六司侍郎其後遂改諸曹侍郎但曰郎其吏部郎改為選部郎唐初改為選部郎中武徳五年改為吏部郎中龍朔二年改為司列大夫咸通元年復舊又有員外郎二人從六品比周官太宰屬官有上士今員外之職也宋百官階次員外郎美遷為尚書郎隋開皇六年置一人煬帝三年改為選部承務郎武徳三年復舊加置一人一員判廢置一員判南曹在尚書吏部為前行兵部次之選入者以為美自魏晉以來凡吏部官屬悉髙於諸曹焉開元以前以兵部尚書權位尤美則宰相多所兼領而從容衡軸不自銓綜其選試之任皆侍郎專之尚書通署而已或分領其事則列為三銓開元四年六月勅員外郎御史并供奉官直進名勑授自此始不在吏部尚書掌其一侍郎分其二尚書所掌謂之尚書銓侍郎所掌為中銓一為東銓各有卬其尚書銓掌六品七品選侍郎銓掌八品九品官選景雲元年宋璟為尚書始相通與侍郎分職開元十三年以封岳廻選限逼宇文融請分置十銓尋罷之寳應初李峴為江陵尹知江淮選補使後峴罷相又為本曹尚書知江淮選舉置銓于洪州興元元年侍郎劉滋亦於江南典選以便於人後皆廢焉其東銓者貞觀元年京師榖貴始分人於雒州置選至開耀元年以闗外道理迢逓河雒之邑天下之中始詔東西二曹兩都分簡留放既畢同赴京師謂之東選其南選先以桂黄交黔等州都督府所奏擬士人首領任官未甚精選乃令五品以上强明清正官充南選使以補仍令御史同徃注擬其有應任五品以上官者皆使人供所管都督府相知其條景行藝能政術堪稱所職之狀開奏故謂之南選然或廢或置不常其任其小銓郎中員外主之謂之南曹載初元年加置聖厯三年省開元三年兵吏部各專定人判南曹尋又一人專判貞元元年又以二人同判十二年又一人判自唐至五代正官或闕並以他官權領其條章之所改易考課之所登降或公望尤著或利刅無虗揚清直之聲有振㧞之跡稽諸史䇿其事燦然至於濫承委任貪黜貨賄亦列於左以取鑒焉凡銓選部八門云條制夫唐虞之時建官惟百夏商官倍成周之制其屬尤繁然選舉之道猶所未立逮夫漢氏之代始察孝廉吏事侵廣科第仍設故調補之制所為増多然而邪偽萌生隄防漸峻是以東京申交互之禁當塗立品制之法晉宋而下㳂革不同固亦銓綜有條清濁適序誠有國之成憲官人之要道也乃至羣下奏議或匪見從咸用論次以著其事云漢景帝後元二年詔曰今訾筭十以上廼得官廉士筭不必衆有市籍不得官無訾又不得官朕甚愍之訾筭四得官亡令廉士乆失職貪夫長利訾嶲錢也筭一百二十七也古者疾吏之貪衣食足知榮辱限訾十筭乃得為吏十筭十萬也賈人有財不得為吏廉士無訾又不得官故減訾四筭得官宣帝黄龍元年四月詔曰舉廉吏誠欲得其真也吏六百石位大夫有罪先請秩禄上通足以効其賢材自今以來毋得舉吏六百石者不得復舉為廉吏也元帝永光元年二月詔丞相御史舉質樸敦篤而有行者光禄歳以此科第郎從官始令丞相御史舉此四科人以擢用之而見在郎及從官又令光禄歳行此科考較定其第髙下用知其人賢否也後漢光武建武十二年詔三公舉廉吏各一人左右將軍歳察廉吏三人中二千石各二人光禄歳舉郎茂才四行各一人察廉吏各一人廷尉大司農二人將兵將軍歳察廉吏各二人安帝永初二年九月詔王官屬墨綬下至郎謁者王國有中大夫秩比六百石謁者比四百石郎中二百石其經明任博士居鄉里有廉清孝順之稱才任理人者國相歳移名與計偕上尚書府通調令得外補移書也調選也延光二年八月庚午初令三署郎通逹經術任牧民者視事三歳以上皆得察舉順帝陽嘉元年閏十二月令諸以詔除為郎年四十以上課試如孝廉科者得叅廉選歳舉一人桓帝以本初元年六月即位七月詔曰孝廉廉吏皆當典城牧民禁姦舉善興化之本嘗必繇之詔書連下分明懇惻而在所翫習遂至怠慢選舉乖錯害及元元頃雖頗繩正猶未懲改方今淮夷未殄軍師屢出百姓疲瘁困於徴發庶望羣吏惠我勞民蠲滌貪穢以祈休祥其令秩滿百石十載以上有殊才異行仍得叅選贓吏子孫不得察舉杜絶邪偽請託之原令廉白守道者得信其操各明守所司將觀厥後建和初時議以郡州相阿人情比周乃制婚姻之家及兩州之人不得相臨遂復有三牙法三牙謂婚姻之家及兩州不得交牙為官時史弼遷山陽太守其妻鉅野薛氏女以三牙自上專拜平原相是也魏文帝嗣王位延康元年吏部尚書陳羣以天朝選用不盡人才乃立九品官人之法州郡皆置中正以定其選擇州郡之賢有識鑒者為之區别人物等其髙下慎杜右云九品之制初因後漢建安中天下兵見衣冠士族多離本在欲徴源流慮難委悉魏氏革命州郡縣具置大小中正各取本處人在諸府公卿及臺省郎吏有徳充才盛者為之區别所管人物定為九等其有言行修著則升進之或從五升四從七升六倘或道義虧缺則降下之或自五退六自六退七使部不能審覈天下人才士庶故委中正叙等級慿之授受謂免取失及洪弊也唯能知其閥閱非辨其賢愚所以劉毅云下品無髙門上品無寒士南朝至梁陳北朝至周隋選舉之法雖互用損益而九品及中正至開皇中方罷晉依魏氏九品之制内官吏部尚書司徒左長史外官州有大中正郡國有小中正皆掌選舉若吏部所用必下中正徵其人居及父祖官名宋文帝元嘉中限年三十而仕郡縣以六周而代刺史或十餘年及孝武即位仕者不復拘老㓜守宰以三周為滿南齊武帝永明元年三月詔曰宋徳將季風軌陵遲列宰庶邦彌失其序遷謝遄速公私彫弊泰運初基草昧惟始思述先範永隆治本蒞民之職一以小滿為限其有聲績克舉厚加甄異理務無庸隨時代黜和帝中興二年二月丙寅詔梁國初建宜湏綜理可依舊選諸要職悉依大朝之制梁王上表曰臣聞以言取士士飾其言以行取人人竭其行所謂才生於世窮逹惟時風流遂徃馳騖成俗媒孽夸衒利盡錐刀遂使官人之門肩摩轂擊豈直暴蓋露冠不避寒暑遂乃戢屨杖䇿風雨必至良繇鄉舉里選不師古始稱肉度骨遺之管庫加以山河梁畢闕興滅之思金張許史忘舊業之替吁可覆哉且夫譜牒訛誤詐偽多緒人物雅俗莫肯留心是以賀襲良家即成冠族亡脩邉幅便為雅士負俗未深遽遭寵擢墓木巳拱方被徽榮故前世選官皆歴選簿應在貫魚自有銓次曹籍升降行能臧否或素定懐抱得之餘論故得倩通賔客無事掃門頃世道陵夷禮流乖失其有勇退志進懐質抱真者選部或以未經朝謁難於進用或有晦善藏聲自埋衡蓽又以名不素著絶其階緒必湏盡㓨投狀然後弹冠則是驅廹廉撝奬成澆競愚謂今自選曹宜精隠括依舊人立簿使冠裳無爽名實弗違庶人識崖涘造請自息且聞中間立格里族以二十登仕後門以過立試吏求之愚懐抑有未逹何者設官分職惟才是務若八元立年居皂𨽻而見抑四方弱冠處鼎族而宜甄是則世禄之家無意為善布衣之士肆心為惡豈所以宏奬風流希向後進此實巨蠧尤宜刋革不然將使同人有路傍之泣晉臣興漁獵之歎且俗長浮競人寡恬退若限歳登朝必増年就官故貌實昬童籍已踰立滓穢名教於斯為甚總司内外憂責是任朝政得失義不容隠伏願陛下康聖淑之姿降聽覽之末則彛倫自穆憲章惟允詔依表施行梁武帝天監初無中正詔年二十有五方得入仕其後又詔凡九流常選年未三十不通一經者不得為官若有才同甘顔勿限年次至七年詔於州郡縣置州望郡宗鄉豪各一人專典搜薦無復膏梁寒素之隔普通七年詔凡州歳舉二人大郡一人敬帝太平二年復令諸州各置中正仍舊訪舉選皆湏中正押上然後量授不然則不徐勉天監初官名手有省置勉撰立選簿奏之有詔施用其制開九品為十八班自是貪冐茍進者以財貨取通守道淪退者以貧寒見没矣陳依梁制凡年未三十不得入仕唯經學生䇿試得第諸州迎主簿西曹佐奏及嘗為挽郎得未壯而仕諸郡唯正王為丹陽尹經迎得出身者亦然庶姓尹則否有髙才異行殊勲别降恩㫖叙用者不在常例凡選無定時隨缺則補官有清濁以為昇降從濁得清則勝於遷若有遷授吏部先為白牒列數十人名尚書與叅掌者共署奏勑或可或否其可者則下於選曹量貴賤别内外隨才補用以黄紙録名入座通署奏可乃出以付於典書其名帖鶴頭板修容釐儀送所授之家其别發詔除者即宣付詔局草奏聞勑可黄紙冩出門下門下答詔請付外施行又書可付選司行名得官者不必皆待名到但聞詔出明日即入謝後詣尚書上省拜授若拜三公則臨軒凡拜官皆在午後初武帝承侯景喪亂之後綱維頽壊制度未立百官無復考較殿最之法但更年升遷驟班進秩法無可稱者後徐陵孔奐為吏部尚書有其次序永定二年詔曰梁時舊仕亂離播越始還朝廷多未銓序又起兵已來軍勲甚衆選曹即條文武簿及郎將應九流者量其所擬於是隨材擢用者五十餘人後魏州郡皆有守正掌選舉每以季月與吏部銓擇可不文成和平三年詔曰朕承洪緒統御萬國垂拱南面委政羣司欲緝熈治道以致寕一夫三代之隆莫不崇尚年齒今舉選之官多不以次令班白處後晩進居先豈所謂彛倫攸叙者也諸曹選補宜各先進勞舊才能初崔若為冀州相薦冀定相幽并五州士數十人各起家為郡守景穆帝謂浩曰先召之人亦州郡選也在職已乆勤勞未答令先補前召外在郡縣以新召者為郡吏又守令宰人使更事者浩固爭而遣之髙允聞之謂東宫博士管括曰崔公其不免浮乎逞其非而較勝於上何以能濟又李孝伯起郡人交曾理鄭氏禮左氏春秋郡三辟功曹不就門人勸之曽曰功曹之職雖曰鄉選髙第猶是郡吏耳北面事人亦何容易任郡主簿到官月餘日乃歎曰梁叔敬有云州郡之職徒勞人耳道之行行身之優也遂還家又郭祚為吏部尚書持操潔清重惜官位至於銓㧞假令得人必能悉乆之然下筆即云此人便已貴矣繇是事頗為稽滯當時每招怨濫然所㧞申者量才稱職時又以此稱之其後中正所銓但在門第吏部彛倫仍不才舉孝文太和元年八月詔工商皂𨽻各有厥分而有司縱濫或染清流自今户内有工役者唯上本部丞以下准次而授若階籍元勲以勞定國者不從此制十六年七月詔曰王者設官分職垂拱責成振綱舉紀衆目斯理朕徳謝知人豈能一鑒見識徒乖為君委授之義自今選舉毎以季月十九年十二月示品令為大選之始二十年三月詔諸州中正各舉其鄉之茂望年五十以上守素衡門者授以長令宣武正始二年四月詔曰任賢明治自昔通規宣風贊務實惟多士而中正所銓但存門第吏部彛倫乃不才舉遂使英徳罕昇司務多滯不精厥選將何考陟也入座可審議徃代貢士之方擢賢之體必令才舉並申資望兼致延昌元年十二月詔守宰為御史所彈遇赦免者及考在中第皆代之孝明熈平初尚書考功郎陽固奏諸秀孝中第者聽叙自固始也二年八月詔庶族子弟年未十五不聽入仕是年尚書左丞盧同以朝政修飾人多竊冐軍功閲吏部勲書因加簡覈得竊階者三百餘人同乃表言竊見吏部勲簿多皆改換中兵奏案並復乖舛臣聊爾校練已得三百餘人明知隠而未露者動有千數愚謂罪雖恩免猶湏刋定請遣一都令史與令僕省事各一人摠集吏部中兵二局勲簿對勾奏案若名級相應者於黄素楷書大字俱件階數令本曹尚書以朱印印之神龜元年正月詔以雜役之户或冐入清流所在職人皆五人相保無人任保者奪官還没三年二月詔武官得依資入選先是征西將軍冀州大中正張彛之子仲瑀上封事請武夫不使在清品於是武夫怨怒各封武賁千餘人焚第毆傷彛殺其子始均仲瑀被創竄免詔斬其尤兇者八人餘大赦以安之乃下此詔既而官員少而應調者多選曹無以處之吏部尚書崔亮乃奏為格制官不問愚賢以停解日月為斷雖復官湏此人停日後者終不得取雖庸才下品年月乆者則先擢用于時沉滯者皆稱其能前廢帝普泰元年三月詔曰頃官方失序乃令沙汰定員簡棄已有判决退下之徒微亦可愍諸在簡下者可特優一級皆授將軍預參選限隨能選用四月詔員外諫議大夫步兵校尉奉車都尉羽林監給事中貴射將軍奉朝請殿中將軍宫門僕射殿中司馬督治禮郎十一官得俸而不給力老人外選者依常格其未老欲外選者聽解其七品以上朔望入朝若正員有闕隨才進補前員外簡退變階考退之稱事簡下者仍優一級後廢帝中興元年十一月詔曰王度剏開彛倫方始所班官秩不改舊章而無識之徒因兹僥倖謬增軍級虗名顯位皆言前朝所授理難推抑自非嚴為條制無以防其偽竊諸有虗増官號為人發糾罪從軍法若人格簡覈無名者退為平民終身禁錮北齊孝昭皇建二年詔内外執事官從五品以上三府主簿録事參軍諸王文學侍御史廷尉三官尚書郎中中書舎人每在三年之内各舉一人或夙在朝倫沉屈未用或先官後進今見停散或白屋之人巾褐未釋其髙才良器允文允武理識深長幹具通濟操履凝峻學業宏贍諸如此軰隨取一長無待兼資方允舉限表薦之文指論事實隨能量用必陳所堪不得髙談謬加褒飾所舉之人指在一職三周之内有犯死罪以下刑罪以上舉主准舉人之犯各罰其金自鞭以下舉主勿論若未經三載而更轉通計後官日月合滿三周凡所舉人必主事立功禆益時政不限年之逺近舉主之賞亦當非次被舉之人别當擢授其違限不舉依式罰金又擁旄作鎮任總百城分符共理職司千里凡部統理宜委悉刺史於所管之内下郡太守縣令丞尉府佐録事叅軍以降州官州都主簿以下但霑在吏職及前為官並白人等並聽表薦太守則曹掾以下及管内之人亦聽表舉其大州中州下州畿内上郡中郡並三年之内各舉一人其不入品州並自餘郡守不在舉限後周宣帝大成元年詔自刺史僚佐州吏則自署府官則命於朝廷隋高祖開皇七年制工商不得入仕十四年十一月制州縣佐吏三年一代不得重任髙祖以典吏乆居職肆情為姦故有此制十五年十二月詔文武官以兩考交代又制百官不得計考増級其功徳行能有昭然乃擢之煬帝大業八年詔曰頃自班朝理人乃繇勲叙㧞之行陣越自勇夫蠧政害人實繇於此自今以後諸授勲官者並不得因授文武職事唐制凡選始於孟冬終於季春先時五月頒格於郡縣示人科限而集之初皆投狀於本郡或故任所述罷免之繇而上尚書省限十月至省乃考覈資序郡縣郷里名籍父祖官名内外族姻年齒形貌優劣課最譴負刑犯必具焉以同流者五五為聯以京官五人為保一人為識皆列名結欵不得有刑家之子工賈殊類及假名承偽冐升降之徒應選者有知詐冐而糾得三人以上者優以授之其試之日搜索防援棘籬機察如禮部舉人之法也其擇人有四事一曰身取其體貌豐偉二曰言取其言詞辨正三曰書取其指法遒美四曰判取其文理優長四事可取則先乎徳行徳均以才才均以勞其六品以降計資量勞而擬其官五品以上不試列名上中書門下制勑處分凡選始集而試觀其書判已試而銓察其身言已銓而注詢其便利而擬其官已注而唱示之不厭者得反通其辭也曰更其官而告之如初又不厭者亦如之三唱而不服聽各集服者以類相從攅之為甲先簡僕射乃上門下省給事中讀之黄門侍郎省之侍中審之不審者皆得駁下既審然後上門下主者受㫖而奉行焉各給以符而印其上謂之告身其文曰尚書吏部告身之印自出身之人至于公卿皆給之武官則受於兵部兵部武選亦然課試之法如舉人之制取其軀幹雄偉應對詳明有驍勇材藝及可為統帥者若文吏求為武選取身長六尺以上籍年四十以下強勇可以統人者武夫求為文選取書判精工有理人之才而無殿犯者凡官巳受成皆殿廷謝恩其黔中嶺南閩中郡縣之官不繇吏部以京官五品以上一人充使就補御史一人監之四歳一徃謂之南選凡居官以年為考六品以下四考為滿太宗貞觀元年正月侍中攝吏部尚書杜如晦上言曰比吏部擇人惟取言辭刀筆不悉景行數年之後惡跡始彰雖加刑戮而百姓巳受其弊上曰如何可以得人如晦對曰兩漢取人皆行著州閭然後入用今每年選集尚數千人厚貌飾詞不可知悉選司但配其階品而已所以不能得才魏徵亦曰知人之事自古為難故考績黜陟察其善惡今欲求人必湏審訪才行兼美始可任用上將依古法令本州辟召㑹功臣將行世封其事遂止二年正月吏部侍郎劉林甫以隋代赴選者以十一月為始至春而畢選限既促選司多不究悉時赴選漸衆林甫請四時聽選隨到注擬當時甚以為便十六年七月太宗謂褚遂良曰公等為朕捜訪賢徳以輔儲宮爰及諸王成求正士且事人歳乆即分義情深非意闚𨵦多繇此作其王府官寮具限以四考十九年十一月吏部尚書馬周以吏部四時提衡畧無休暇奏請所繇文解十月一日赴省三月三十日畢髙宗顯慶二年黄門侍郎知吏部選事劉祥道上疏曰今選司取士傷多且濫每年入流數過一千四百人是傷多也雜色入流不加銓簡是傷濫也古之選者為官擇人不聞取人多而官員少也今官員有數入流無限以有數供無限遂令九流繁總人隨歳積謹約准所須人量支年别入流者今内外文武官一品以下九品以上一萬三千四百六十五員畧舉大數當一萬四千人壯室而仕耳順而退取其中數不過支三十年此則一萬四千人三十年而畧盡若年别入流者五百人三十年便得一萬五千人准頃者一萬三千四百六十五人足充所湏之數况三十年之外在官者尤多此便有餘不慮其少今年當入流者遂逾一千四百計應湏數外常餘兩倍又常選者仍停六七千人更復年别新加實非處置之法望請釐革稍清其選中書令杜正倫亦言入流者多為政之弊公卿以下憚於改作事竟不行總章二年司列少常伯裴行儉以承平既乆選人漸多始設長名姓厯牓引銓注等法又定州縣昇降官資髙下以為故事其後莫能革二年十月勑司戎諸色考滿入選司列諸色考滿入流人並兼試一經一史然後授官咸亨三年正月許雍雒二州人任本部上元三年八月詔桂廣交黔等州都督府比來所奏擬士人任官揀擇未甚得所宜准舊例至應選補時差内外官位五品以上清正官之使選補仍令御史同往注擬其有應任五品以上官者奏取處分開耀元年四月十一日勑吏部兵部選人漸多及其銓量十放六七既疲於來徃又虚費資糧宜付尚書省集京官九品以上詳議崇文舘直學士崔融議曰今皇家兩曹妙選三官備設收其梓杞搴其蕭稂其有狀犯贓私罪當懲貶者此等既未合得伏望許同選例限以歳年諸色入流每年叅選資品未著技藝未工此亦望所司選例録以選勞又選人每年長名當至正月半後伏望速加銓簡促以程期因其物情亦何疲於來徃順其人欲亦何費於資糧又所銓簡以徳行為上功夫次之折衷之方庶幾此道尚書右僕射劉仁軌奏曰謹詳衆議條目雖廣其大畧不越數途多欲使常選之流及負譴之類遞立年限如不令赴集便是壅自新之路塞取俊之門或請增置具僚廣授官之數加習藝業峻入仕之科亦恐非宏奬之通規乖省員之茂躅徒云變更實恐紛擾但昇平日乆人物滋殖解巾從事抑有多人頃歳以來據員多闕臨時雖有權攝終是不能總備望請尚書侍郎依員補足髙班畢品准試分銓則留放速了限速則公私無滯應選者暫集逺近無聚糧之勞合退者早歸京師無索米之弊既循舊軌且順人情如更有不便隨事釐革其殿負及初選其選踐自知未合得官等色情願不集即同選勞曹司商量乆長安穏融又議選事曰闗外諸州道理迢遞河雒之邑天地之中伏望詔東西二曹兩都分簡留放既畢同赴京師則天天册萬歳元年十月二十二日勑品藻人物銓綜士流委之選曹責成斯在且人無求備用匪一途理宜才地並昇輪轅兼採或收其履歴或取其學行糊名考判立格注官既乖委任之方頗異銓衡之術朕厲精思化仄席求賢必使草澤無遺方圓曲盡改弦易調革故鼎新載想緝熈之崇式佇清通之効其嘗選人自今以後宜委所司依常例銓注其糊名入試及令學士考判宜停萬歳通天元年八月制文武官加階應入五品者並須出身歴十二考以上無私犯進階之時見居六品官及七品以上清官者其應入三品者取出身二十五考以上亦無私犯進階之時見居四品官者自外縱計階應入並不在進限如有竒材異術别効殊功者不拘此例神功元年十月勑選司抑塞者不湏請不理狀任經御史臺論告不得取於餘司喧訴有凌突選司非理喧悖者注簿量殿尤甚者仍於省門集選人决三十仍殿五六選其年閏十月二十五日勑八寺丞九寺主簿三監丞簿城門符寳郎通事舍人大理司直評事左右衛千牛衛金吾衛左右率府羽林衛長史直長太子通事舎人親王掾屬判司叅軍京兆河南太守判司赤丞簿尉御史臺主簿校書正字詹事主簿協律奉禮太祝等出身入仕既有殊途望秩常班湏從甄異其有從流外及視品官出身者不得任前件官其中書主書門下録事尚書都事七品官中亦為𦂳要一例不許頗乖勸奬其考詞有清幹景行吏用文理者選日揀擇取厯十六年以上者聽量擬左右金吾長史及寺監丞聖厯元年二月二十二日勑選人無故三試三注唱不到者不在銓試重注之例其過門下三引不過者亦不在更注之限其日又勑文武選人簡日厯不獲者宜牒中書門下為簡如又不獲若在曹有官甲前後相衘可明者亦聽為叙三年正月三十日勑監察御史左右拾遺赤縣尉主簿大理評事兩畿縣丞主簿尉經三任以上及内外官經三任十考以上不改舊品者選叙日各聽量隔品處分餘官必湏以次授任不得超越大足元年正月十五日勑選人應留不湏要論考第若諸事相似即先書上考必書判遼落又無善狀者雖帶上考亦宜量放七月二十九日勑桂廣泉建連賀福韶等州縣既是好處所有闕官宜依選例省補中宗神龍元年李嶠韋嗣立同居選部多引用權勢求取聲望因請置員外官一千餘員繇是僥倖者趨進其員外官悉恃形勢與正官爭事百司紛競至有相毆擊者及嶠復入相乃深悟其失又見朝野喧議乃上疏曰自寳命中興鴻恩溥及唯以爵賞為惠不擇才能任官授級加階朝廷多改正闕不足加以員外非復求賢助理多是為人擇官接武隨肩填曹溢府無益政化虗請俸禄在京則府庫之殫竭在外則黎庶被其侵漁伏願徵惜班榮稍减除授使匪服之議不興於聖朝能官之謡復光於曩載疏奏上乃詔减員外官不令釐務也册府元龜卷六百二十九
