body:
  text: 册府元龜卷一百九十一宋王欽若等撰閏位部法制政令法制夫有國家者曷甞不制事典立軌度因時變而建民極者哉嬴秦之世多所改作洎南北迭王以訖于梁亦復損益前訓有所更創斟酌物宜於焉垂法盖以申畫一之文著惟行之令一統類而嚴紀律也史氏所記咸得而徴焉秦始皇帝二十六年制曰朕聞太古有號毋謚中古有號死而以行為謚如此則子議父臣議君也甚無謂朕弗取焉自今已来除謚法朕為始皇帝後世以計數二世三世至千萬世傳之無窮分天下以為三十六郡郡置守尉監更名民曰黔首一法度衡石丈尺車同軌書同文三十一年十二月更名臘曰嘉平太原真人茅盈内紀曰始皇三十一年九月庚子盈曽祖父濛乃於華山之中乗雲駕龍白日升天先是其邑謡歌曰神仙得者茅初成駕龍上升入太清時下𤣥洲戲赤城繼世而徃在我盈帝若學之臘嘉平始皇聞謡歌而問其故父老具對此仙人之謡歌勸帝求長生之術於是始皇欣然乃有尋仙之志因改臘曰嘉平吳大帝時令諸居任遭三年之䘮皆須交代乃去然多犯者嘉禾六年使羣臣議立制胡綜以為宜定大辟之科又使代未至不得告告者抵罪顧雍等同綜議從之其後吳令孟仁聞䘮輙去陸遜陳其素行減死一等自此遂絶宋髙祖永初元年七月壬子詔曰反叛滛盜三犯補冶士本謂事三犯終無悛革主者頃多并數衆事合而為三甚違立制之㫖宜更申明八月詔曰諸處冬使或遣或不事役宜省今可悉停唯元正大慶不得廢耳郡縣遣冬使詣州及都督府者亦宜同停閏八月詔曰主者處按雖多所諮詳若衆官命議宜令明審自頃或總稱叅詳扵文漫畧自今有厝意者皆當指名其人所見不同依舊繼啓二年三月制限荆州府置將不得過二千人吏不得過一萬人州置將不得過五百人吏不得過五千人兵士不在此限孝武帝即位初置殿門及上閤門孝建元年江夏王義恭與驃騎大將軍竟陵王誕奏曰臣聞佾懸有數等級異儀珮笏有制卑髙殊序斯盖上哲之洪模範世之明訓而時至彌流物無不敝僣侈繇俗軌度非古晉代東徙舊法淪落侯牧典章稍與事曠名實一差難以卒變章服崇濫多歴年所今樞機更造皇風載新耗弊未充百用思約宜備品式之律以定損益之條臣等地居枝昵位叅台輔遵正之首請以爵先致貶之端宜從戚始輙因暇日共叅愚懐應加省易謹陳九事雖懼匪衷庶竭微欵伏願陛下聽覽之餘薄垂照納則上下相安表裏和穆矣詔付外詳有司奏曰車服以庸虞書茂典名器慎假春秋明誡是以上方所制漢有嚴律諸侯竊服雖親必罪降於頃世下僣滋極器服装餙樂舞音容通於王公達於衆庶上下無辨民志靡一義恭所陳實允禮度九條之格猶有未盡謹共附益凡二十四條聽事不得南向坐施帳并藩國官正冬不得跣登國殿及夹侍國師傳令及油㦸公主王妃傳令不得朱服轝不得重棡鄣扇不得雉尾劍不得鹿盧形槊眊不得孔雀白氅夹轂隊不得絳襖平乗誕馬不得過二匹胡伎不得綵衣舞伎正冬著袿衣不得装面冬會不得鐸舞柸柈舞長蹻透狭舒劒博山縁大橦升五按自非正冬會奏舞曲不得舞諸妃主不得著緄帶信幡非臺省官悉用絳郡縣内史相及封内官長於其封君既非在三罷官則不復追敬不合稱臣宜從下官而已諸鎮常行車前後不得過六隊白直夹轂不在其限刀不得過銀銅為餙諸王女封縣主諸王子孫襲封之王妃及封侯者夫人行竝不得鹵簿諸王子繼體為王者婚䘮吉凶悉依諸國公侯之禮不得同皇弟皇子車非軺車不得油幢平乗舫皆下兩頭作露平形不得擬象龍舟悉不得朱油帳􅟈不得作五花及監筍形詔可二年制中丞與尚書令分道雖丞郎下朝相值亦得斷之餘内外衆官皆授停駐大明元年三月制大臣加班劒者不得入宫城門二年十二月諸王及妃主庶姓位從公者䘮事聽設凶門餘悉斷六年九月制沙門致敬人主七年四月詔曰自非臨軍戰陣一不得専殺其罪甚重辟者皆如舊先上須報有司嚴加聽察犯者以殺人罪論五月詔曰自今刺史守宰動民興軍皆須手詔施行唯邉隅外警及姦釁内發變起倉卒者不從此例長沙王道憐孫祗大明中為中書郎太宰江夏王義恭領中書監服親不得相臨表求解職世祖詔曰昔二王兩謝俱至崇禮自今三臺五省悉同此例沈統大明中為著作佐郎先是五省官所給幹僮不得雜役太祖世坐以免官者前後數百人統役輕過差有司奏免世祖詔曰自頃幹僮多不祗給主可量聽行杖得行幹杖自此始也明帝泰始元年詔諸將吏二千石以下遭三年䘮聽居終寧庶人復除徭役三年制太子乗象輅六年制太子元正朝賀服衮冕九章衣南齊武帝永明七年十月詔曰三季澆浮舊章陵替吉凶奢靡動違矩則或裂錦繡以競車服之餙塗金鏤石以窮塋域之麗至班白不婚露棺累葉茍相姱衒罔顧大典可明為條制嚴勒所在悉使畫一如復違犯依事紏奏永明中世祖以婚禮奢僣勅諸王納妃上御史六宫依禮正棗栗脯脩加以香澤花粉其餘衣物皆停唯公主降嬪則止遺舅姑而已明帝建武元年十一月革永明之制依晉宋舊典太子以師禮敬少傅梁武帝天監三年都令使王謹之列自江左以来郊廟祭祀帝已入齋百姓尚哭以為乖禮何佟之等奏按禮國門在臯門外今之籬門是也今古殊制若禁凶服不得入籬門為太逺宜以六門為斷詔曰六門之内士庶甚多四時蒸嘗俱斷其哭若有死者棺器湏来既許其大而不許其細也致齊日去廟二百歩斷哭北齊文宣帝受禪詔曰頃者風俗流宕浮競日滋家有吉凶務求殊異婚姻葬䘮之費車服飲食之華動竭嵗資以營日富又奴僕帶金銀婢妾衣羅綺始以剏出為竒後以過前為麗上下貴賤無復等差今運屬惟新思蠲徃弊反朴還淳納民軌物可量事具立條式使儉而獲中梁太祖開平元年四月詔在京百司及諸軍州縣印一例鑄換其篆文則各如舊八月詔曰朝廷之儀封册為重用報勲烈以降隆榮固合親臨式光典禮彛章久缺自我復行今後毎封冊大臣宜令有司備臨軒之禮稱朕意焉九月勅以近年文武官諸道奉使皆於所在分外停住踰年渉嵗未聞歸闕非唯勞費州郡抑且侮慢國經臣節既虧憲章安在自今後兩浙福建廣州南安邕容等道使到發許任一月湖南洪鄂黔桂許任二十日荆襄同雍鎮定青滄許任十日其餘側近不過三五日凡来徃道路㨿逺近里數日行兩驛如遇疾患及江河阻隔委所在長吏具事由奏聞如或有違當行朝典命御史㸃檢糾察以儆慢官二年七月帝曰車服以庸古之制也貴賤無别罪莫大焉應内外將相許以銀餙鞍勒其刺史都將内諸司使以降祗許用銅冀定尊卑永為條制仍令執法官糾察之八月兩浙錢鏐奏請重鑄換諸州新印三年七月勅大内皇墻使諸門素来未得嚴謹將令整肅湏示條章宜令控鶴指揮應於諸門各添差控鶴官兩人守帖把門其諸司使并諸司諸色人竝勒扵左右銀臺門外下馬不得將領行官一人輙入門裏其逐日諸道奉進客省使扵千秋門外排當􅀈勒控鶴官舁擡至内門前凖例令黄門殿直以下舁進輙不得令諸色一人到千秋門内其章善門仍令長官關鏁不用逐日開閉是日又勅皇墻大内本尚深嚴宫禁諸門豈宜輕易未當條制交下因循茍出入之無常且公私之不便湏加鈐轄用戒門閭宜令宣徽院使等切准此處分八月勅建國之初用兵之罷諸道章表皆繫軍機不欲滯留用防緩急其諸道所有軍事申奏宜令至右銀臺門委客省畫時引進諸道公事即依前四方館准例收接十月勅司門過所先是司門郎中貟外郎出給今以冦盜未平恐漏姦詐令宰臣趙光逢専判凡諸給過所先具狀經中書㸃檢判下即本判郎官㨿狀出給四年正月勅公事難於稽遅居處悉皆遥逺其逐日當直中書舎人及吏部司封知印郎官少府監及篆印文兼書冩告身人吏等竝宜輪次於中書側近宿止四月帝過朝邑見鎮將位在縣令上問左右或對曰宿官秩髙帝曰令長字人也鎮使捕盜耳且鎮將多是邑民柰何得居民父母上是無禮也至是勅天下鎮使官秩無髙卑位在邑令下九月勅魏博管内刺史比来州務竝委督郵遂使曹官擅其威權州牧同扵閑冗俾循通制宜塞異端竝宜依河南諸州例刺史得以専達議者曰唐朝憲宗時烏重裔為滄州節度使嘗稱河朔六十年能抗拒朝命者以奪刺史格與縣令職而自作威福且若二千石各得其柄又有鎮兵雖安史挟姦豈能㨿一墉而叛㢤遂奏以所管徳棣景三州各還刺史職分州兵卒𨽻收管是後雖幽鎮魏三州以河北舊風自相更襲在滄州一道獨禀命受代自重裔制置使然也則梁氏之更張正合其事矣十一月乙巳詔曰關防者所以譏異服察異言也况天下未息兵民多姦改形易衣覘我戎事比者有諜皆以詐敗而未嘗罪所過地叛將逃卒竊其妻孥而影附使者亦未嘗詰其所經今海内未同而緩法弛禁非所以息奸詐止奔已也應在京諸司不得擅給公驗如有出外湏執憑繇者其司門過所先湏經中書門下㸃檢宜委宰臣趙光逢専判出給俾繇顯重冀絶姦源仍下兩京河陽及六軍諸衛御史臺各加鈐轄公私行李復不得帶挟家口向西其襄鄧鄜延等道竝同處分五年二月詔左右金吾大將軍待制官各奏事乾化元年五月詔左右銀臺門朝㕘諸司使庫使已下不得帶從人出入親王許一二人執條版手簡餘悉止門外闌入者抵律閽守不禁與所犯同先時門通内無門籍且多勲戚車騎衆者尤不敢呵察至是有一客星凌犯上言者遂令止格末帝龍徳元年春正月癸巳詔諸道入奏判官宜令御史臺㸃檢各從正衙退後便扵中書門下公㕘辭謝如有違越具名衘聞奏應面賜章服仍令各門使取本官狀申中書門下受勅後方可給入新銜政令漢髙帝伐秦繼周以火承木說者謂秦為閏位而蜀吳宋齊暨乎朱梁厥義均矣其立政其施令出於君而被於民者或適一時之宜或為子孫之法載於方䇿亦有可觀然而史遷紀秦陳夀志吳蜀其事多畧宋齊而下乃章章焉古人有言非知之艱行之惟艱若鬱林東昏之時雖有政令顧其治何如哉秦始皇十六年九月初令男子書年三十三年初縣禁不得祠蜀後主建興二年春閉關息民吳大帝黄武五年春令曰軍興日久民離農畔父子夫婦不能相䘏孤甚憫之今北虜縮竄方外無事其下州郡有以寛息嘉禾三年正月詔兵久不輟民困於役嵗或不登其寛諸逋勿復督課太元元年十二月詔省徭役減征賦除民所患苦宋髙祖永初元年六月即位詔曰夫銘功紀勞有國之要典慎終追舊在心之所隆自大業創基十有七載世路迍邅戎車嵗動自東徂西靡有寧日實頼將帥竭心文武盡効寧内拓外迄用有成威靈逺著冦逆消蕩遂當揖讓之禮猥享天人之祚念功檢勞無忘鑒寐凡厥誠勤宜同國慶其酬賞復除之科以時論舉戰亡之身厚加賻贈七月丁亥詔原放刼賊餘口沒在臺府者諸徙家竝聽還本土又運船不復下諸郡輸出悉委都水别量臺府所須皆别遣主帥與民和市即時裨直不復更責租民求辦又停廢虜車牛不得以官威假借又以市稅繁苦優量減降從征關雒殞身戰塲幽沒不反者贍賜其家二年正月丙寅詔斷金銀塗己卯禁䘮事用銅釘四月己卯朔詔曰滛祠惑民費財前典所絶可竝下在所除諸房廟其先賢及以勲徳立祠不在此例文帝元嘉四年三月壬寅禁斷夏至日五絲命縷之屬富陽令諸葛闡之之議也八年三月戊申詔曰頃軍役殷興國用増廣資儲不給百度尚繁宜存簡約以應事實内外可通共詳思務令節儉十七年十一月詔曰州郡估稅所在市調多有煩刻山澤之利猶或禁斷役召之品遂及稚弱諸如此比傷治害民自今咸依法令務盡優免如有不便即依事别言不得茍趣一時以乖隠䘏之㫖主者明加宣下稱朕意焉孝武帝以元嘉三十年四月即位七月辛酉詔曰百姓勞弊徭賦尚繁言念守文宜崇約損凡用非軍國宜悉停功可省細作并尚方雕文靡巧金銀塗餙事不關實嚴為之禁供御服膳減除逰侈水陸捕採各順時月官私交市務令優衆其江海田池公家規固者詳所開弛貴戚競利悉皆禁絶孝建元年正月戊申詔曰首食尚農經邦本務貢士察行寧朝常道内難甫康正訓未洽衣食有仍耗之弊選造無觀國之美昔衛文勤民髙宗恭黙卒能収賢嵓穴大殷季年朕毎側席疚懐無忘鑒寐凡諸守莅親民之官可詳申舊條勤盡地利力田善畜者所在具以名聞褒甄之科精為其格四方孝秀非才勿舉獻荅允值即就銓擢若止無可採猶賜除署若有不堪酬奉虚竊榮薦遣還田里加以禁錮尚書百官之元本庶績之樞機丞郎列曹局司有在自頃事無巨細悉歸令僕非所謂衆材成構羣能濟業者也可更明體制咸責厥成糾覈勤惰嚴施賞罰大明二年閏十二月庚子詔曰夫山處嵓居不以魚鼈為禮頃嵗多虞軍調繁切違方設賦本濟一時而主者玩習遂為常典杶幹瑶琨任土作貢積羽羣輕終致深弊永言𢎞革無替朕心凡寰衛貢職山淵採捕皆當詳辨産殖考順嵗時勿使牽課虚懸暌忤氣序庶簡約之風有孚於品性恵敏之訓無漏於幽仄七年五月丙子詔曰自今刺史守宰動民興軍皆湏手詔施行唯邉隅外警及奸釁内發變起倉卒者不從此例七月丙申詔曰江海田池與民共利歴嵗未久浸以弛替名山大川徃徃占錮有司嚴加檢糾重明舊制八年正月甲戌詔曰東境去嵗不稔宜廣商貨逺近販鬻米者可停道中雜稅其以仗自防悉勿禁前廢帝以大明八年閏五月即位六月辛未詔曰朕以𦕈身夙紹洪業敬御天威欽對靈命仰遵凝緒日鑒前圖實可以拱黙守成貽風長世而寳位告始萬㝢改屬惟徳弗明昧於大道思宣睿範𢎞兹簡恤可具詢執事詳訪民隠凡典令宻文繁而傷治闗市僦稅事施一時而姦吏舞文妄興威福加以氣緯殊方偏頗滋甚宜其寛徭輕憲以救民切御府諸署事不湏廣雕文篆刻無施於今悉宜并省以酬民願蕃王貿貨一皆禁斷外便具條以聞明帝泰始三年八月丁酉詔曰古者衡虞置制蝝夭不収川澤産育登器充御所以繁阜民財養遂生徳頃商販逐末競早争新折未實之果收豪家之利籠非膳之翼為戲童之資豈所以還風尚本損華務實宜修道布仁以革斯蠧自今鱗介羽毛肴核衆品非時月可採器味所湏可一皆禁斷嚴為科制六年十二月癸巳以邉難未息制父母䧟異域悉使婚宦南齊太祖建元元年四月詔曰自廬井毁制農桑易業鹽鐵妨民貨鬻傷治歴代成俗流蠧嵗滋思拯遺弊革末反本使公不専利氓無失業二宫諸王悉不得營立屯邸封畧山湖太官池籞宜停稅入五月辛未詔曰設募取將懸賞購士盖出權宜非曰常制頃世道艱險浸以成俗且長逋逸開罪山湖是為黥刑不辱亡竄無咎自今以後可斷衆募武帝永明七年二月詔曰春頒秋斂萬邦所以惟懐柔逺能邇兆民所以允殖鄭渾宰邑因姓立名王濬剖符户口殷盛今産子不育雖炳常禁比聞所在猶或有之誠復禮以貧殺抑亦情繇俗澹宜節以嚴威敦以惠澤主者尋舊制詳蠲䘏之宜務存優厚四月詔曰婚禮下達人倫攸治周官有媒氏之職國風興及時之詠四爵内陳義不期侈三鼎外列事豈存奢晚俗浮麗厯兹永久毎思懲革而民未知禁乃聞同牢之費華泰尤甚膳羞方丈有過王侯富者扇其驕風貧者恥躬不逮或以供帳未具動致推遷年不再來盛時忽往宜為節文頒之士庻竝可擬則公朝方樏供設合卺之禮無虧寧儉之儀斯在如故有違繩之以法永明中勅親近不得輒有申薦人士免官寒人鞭一百鬱林王隆昌元年正月辛亥詔詢訪獄市博聽謡俗傷風損化各以條聞主者詳為條格海陵王即位詔曰周設媒官趣及時之制漢務輕徭在休息之典所以布徳𢎞教寛俗阜民朕君制八紘志敷九恵而習俗之風為弊未改静言多愠無忘婚嫁宜嚴更申明必使禽幣以時摽梅息怨正厨諸役舊出州郡徴吏民以應其數公獲二旬私累數朔又廣陵年常逓出千人以助淮戍勞擾為煩抑亦苞苴是育今竝可長停别量所出諸使材長路都防城直縣為劇尤深亦宜禁斷延興元年八月乙卯申明織成金薄綵花錦綉履之禁明帝建武元年詔曰守職之吏多違舊典存私害公實興民蠧今商旅稅石頭後渚及夫鹵借倩一皆停息所在凡厥公宜可即符斷主曹詳為其制憲司明加聴察十月詔曰自今雕文篆刻嵗時光新可悉停省十一月詔曰邑宰禄薄俸微不足代耕雖任土常貢亦為勞費自今悉斷東昏侯初即位詔辨括選序訪搜貧屈永元元年詔研䇿秀孝考課百司梁髙祖初為南齊大司馬録尚書事下令曰永元之季乾維落紐政實多門有殊衞文之世權移扵下事等曹公之時遂使閹尹有翁媪之稱髙安有法堯之㫖鬻獄販官錮山䕶澤開塞之機養成小醜直道正義擁抑彌年懐怨抱理莫知誰訴姦吏因之筆削自巳豈直賈生流涕許伯哭泣而已哉今理運惟新政刑得所矯革流弊實在兹日可通檢尚書衆曹東昏時諸諍訟失理及主者淹停不時施行者精加訊辨依事議奏天監元年詔曰成務𢎞風肅厲内外實繇設官分職互相懲糾而頃者拘常准以見失方奏多容違惰莫肯執咎憲綱日弛漸以為俗令端右可以風聞奏依元熙舊制四年正月丙午省鳯皇銜書伎六年正月己卯詔曰夫有天下者義非為己凶荒疾厲兵革水火有一於斯責歸元首今祝史請禱繼諸不善以朕身當之永使災害不及萬姓俾兹下民長蒙寧息不得為朕祈福以増其過時班逺邇咸令遵奉九年五月己亥詔曰朕逺聽思治無忘日昃而百司羣務其途不一隨時適用各有攸宜若非總會衆言無以備兹親覽自今臺閣省府州縣鎮戍應有職僚之所時共集議各陳損益具以奏聞十五年正月己巳詔曰觀時設教王政所先兼而利之實惟務本移風致治咸繇此作頃因革之令隨事必下而張弛之要未臻厥宜民瘼猶繁亷平尚寡所以竚旒纊而載懐朝玉帛而興歎可申下四方政有不便於民者所在具條以聞守宰若清潔可稱或侵漁為蠧分别奏上將行黜陟長吏勸課躬履隄防勿有不修致妨農事關市之賦或有未允外時㕘量優減舊格十七年正月丁巳朔詔曰夫樂所自生含識之常性厚下安宅馭世之通規矜恤庶民無忘待旦亟𢎞生聚之畧毎布寛恤之恩而編户未滋遷徙尚有輕去故鄉豈其本志資業殆闕自返莫繇巢南之心亦何能弭今開元發嵗品物惟新思俾黔黎各安舊所使居無曠土邑靡㳺民鷄犬相聞桑柘交畛凡天下之民有流移他境在天監十七年正月一日以前可開㤙半嵗悉聽還本蠲課三年其流㝢過逺者量加程日若有不樂還者即使著籍為民准舊課輸若流移之後本鄉無復居宅者村司三老及於親属即為詣縣占請村内官地官宅令相容受使戀本者還有所託凡坐市埭諸職割盜褰減應被籍者其田宅車牛是民生之具不得悉以沒入皆優量分留使得自止其商賈富室不得頓相兼并遁叛之身罪無輕重竝許首出還復民伍若有拘限自還本役為之條格咸使知聞普通三年五月詔四方民所疾苦咸即以聞大同五年三月己未詔曰朕四聰既闕五職多蔽或可外牒或致紕繆凡有政事不便扵民者州郡縣即皆時言勿得欺隠使有怨訟當境任失而今而後以為永凖六年八月辛未詔曰經國有體必詢諸朝所以尚書置令僕丞郎旦旦上朝以議時事前共籌懐然後奏聞頃者不爾毎有疑事倚立求决古人有云主非堯舜何得發言便是故放勲之聖猶咨四嶽重華之叡亦待多士豈朕寡薄所能獨斷自今尚書中有疑事前扵朝堂參議然後啟聞不得習常其軍機要切前湏詔審自依舊典七年十二月壬寅詔曰古人云一物失所如納諸隍未是切言也朕寒心消志為日久矣毎當食投箸方眠撤枕獨坐懐憂憤慨申旦非為一人萬姓故耳州牧多非良才守宰虎而傅翼楊阜以是憂憤賈誼所以流涕至於間謀求取萬端或供厨帳或供厩庫或遣使命或待賓客皆無自費取給於民又復多遣逰軍稱為防遏姦盗不止暴掠繁多或求供設或責脚歩又行刼縱更相枉逼良人命盡富室財殫此為怨酷非止一事亦頻勅禁斷猶自未已有司明加聽採隨事舉奏又復公私𫝊屯邸治爰至僧尼當其地界止應依限守視乃至廣加封固越界分斷水陸採捕及以樵蘇遂致細民措手無所自今有越界禁斷者禁斷之身以軍法從事若是公家創内止不得輙自立屯與公競作以收私利至百姓樵採以供煙㸑者悉不得禁及以採捕亦勿呵問若不遵承皆以死罪結正十一年三月庚辰詔曰皇王在昔澤風未逺故端居𤣥扈拱黙嵓廊大道既淪澆波斯逝動競日滋情偽彌作朕負扆君臨百年將半宵漏未分躬勞政事白日西浮不遑飱飯退居猶被布素含咀匪過藜藿寧以萬乗為貴四海為富惟欲億兆康寧下民乂安雖復三思行事而百慮多失凡逺近分置内外條流四方所立屯傳邸治市埭桁度津稅田園新舊守宰逰軍戍邏有不便扵民者尚書州郡各速條上當隨言除省以舒民患太清元年八月乙丑王師北伐以南豫州刺史蕭淵明為大都督詔曰今汝南新復嵩潁載清瞻言遺黎有勞鑒寐宜覃寛恵與之更始縁邉初附諸州部内百姓先有負罪流亡逃叛入北一皆曠蕩不問徃諐幷不得挟以私讐而相報復若有犯者三加裁問元帝承聖元年四月既平侯景下令曰軍容不入國國容不入軍雖子産獻㨗戎服從事亞夫不拜義止將兵今匈醜殱夷逆徒殄潰九有既截四海乂安漢官威儀方陳盛禮衛多君子寄是瞻式便可解嚴以時宣勅敬帝太平元年九月詔曰饑寒流移勒歸本土陳文帝天嘉元年詔曰汙罇土皷誠則難追畫卵雕薪或可刪革梁氏末世奢麗已甚芻豢厭於胥史歌鍾列於管庫土木被朱丹之采車馬餙金玉之珍逐欲澆流遷訛遂逺朕自諸生頗為内足而家敦退素室靡浮華觀覽時俗嘗所扼腕今妄假時乗臨馭區極属當淪季思聞治道菲食卑宫自安儉陋俾兹薄俗獲反淳風雕鏤淫餙非兵器及國容所湏金銀珠玉衣服雜玩悉皆禁斷六年詔曰梁室多故禍亂相尋兵甲紛紛十年不解不逞之徒虐流生氣無頼之屬暴及徂魂江左肇基王者攸宅金行水位之主木運火徳之君時更四代嵗逾二百若有經綸王業縉紳民望忠臣孝子何世無之而零落山丘變移陵谷咸皆剪伐莫不侵殘玉杯得於民間漆簡傳於世載無復五株之樹罕見千年之表自天祚光啟恭惟揖讓爰暨朕躬聿修祖武雖復旌旗服色猶行把宋之邦車駕廵逰𦕈瞻河雒之路故喬山之祀蘋藻弗虧驪山之墳松栢常守唯戚藩舊壟士子故塋掩殣未周樵牧猶衆或親屬流𨽻負土無期子孫㝠滅手植何寄漢髙祖留連於無忌宋祖惆悵於子房丘墓生哀性靈共惻者也朕所以興言永日思慰幽泉繼前王侯自古忠烈墳冡被發絶後者可檢行修治墓中樹木勿得樵採庶幽顯咸暢稱朕意焉宣帝太建四年八月戊寅詔曰國之大事受賑與戎師出以律禀䇿於廟所以乂安九有克成七徳自頃掃滌羣穢廓清諸夏乃貔貅之戮力亦帷帳之運籌雖左袵已戡干戈載戢呼韓来謁亭鄣無驚但不教民戰是謂棄之仁必有勇無忘武備磻溪之傳韜訣榖城之授神符文叔懸制戎規孟徳頗言兵畧朕既慙暗昧良皆披覽兼昔經督戎備嘗行陳齊以七歩肅之三鼓自得胷襟指掌可述竝令條制凡十三科宜即班宣以為永凖臣欽若等按毛喜傳喜宣帝初為黄門侍郎帝将議北伐勑喜撰軍制凡十三條詔頒行天下十一年五月乙巳詔曰昔軒轅命于風后力牧放勲咨爾稷契朱虎冕旒垂拱化致隆平爰逮漢列五曹周分六職設官理務各有攸司亦幾刑措十世彌永竝頼羣才用康庶績朕日昃劬勞思𢎞治要而機事尚擁政道未凝夕惕于懐罔知攸濟方欲仗兹舟楫委成股肱徴名責實取寧多士自今應尚書曹府寺内省監司文案悉付局㕘議分判其軍國興造徴發選序三獄等事先須詳計然後啟聞凡諸班次務令清乂約法守制較若畫一不得前後乖舛自相矛楯致有枉滯紆意儛文糾聽所知靡有攸赦十二月己巳詔曰昔堯舜在上茅屋土堦禹湯為君藜杖韋帶至如甲帳珠珞華榱璧璫未能雍熙徒聞侈欲朕企仰前聖思求訟平政道多違澆風靡乂至今貴里豪家金鋪玉舄貧居陋巷彘食牛衣稱物平施何其遼逺爟烽息役輿賦兼勞文吏姦貪妄動科格重以旗亭關市稅歛繁多不廣都内之錢非供水衡之費逼遏商賈營謀私蓄静懐衆弊宜事改張弗𢎞王道安拯民蠧今可宣勒主衣尚方諸堂署等自非軍國資湏不得繕造衆物後宫僚列若有㳺長掖廷啟奏即皆量遣太子秘戲非會禮經樂府倡優不合雅正竝可刪改市估津稅軍令國章更湏詳定唯務平允别觀離宫郊闕野外非常饗宴勿復修治并勅内外文武車馬宅舎皆循儉約勿尚奢華違我嚴規抑有刑憲所繇具為條格標榜宣示喻朕心焉後主以太建十四年嗣位四月庚子詔曰朕臨御區宇撫育黔黎方欲康濟澆薄蠲省繁費奢僣乖衷實宜防斷絓縷金銀薄及庻物化生土木人綵花之属及布帛幅尺短狭輕疎者竝傷財廢業尤成蠧患又僧尼道士挟邪左道不依經律民間淫祀祅書諸珍恠事詳為條制竝皆禁絶癸卯又詔曰中嵗克定淮泗爰渉青徐彼土酋豪竝歸欵罄誠分遣親戚以為質任今舊土淪䧟復成異域南北阻逺未得會同念其分乖殊有愛戀夷狄吾民斯事一也何獨譏禁使彼離析外不即簡任子館及東館并帶保任在外者竝賜衣糧頒之酒食遂其鄉路所之阻逺便發遣船仗衛送必令安達若已預仕官及别有事義不欲去者亦隨其意東魏孝静天平元年十月自雒遷都于鄴十二月詔曰内外解嚴百司悉依舊章從容雅服不得以袴衫從事北齊文宣帝天保元年六月詔曰自今以後諸有文啟論事竝陳要宻有司悉為奏聞武成帝太寧元年詔曰王者所用唯在賞罰賞貴適理罰在得情然理容進退事渉疑似盟府司勲或有開塞之路三尺律令未窮畫一之道思文王之官人念宣尼之止訟刑賞之宜思獲其所自今諸應賞罰皆賞疑從重罰疑從輕後主天統四年十二月詔細作之務及所在百工悉罷之梁太祖開平元年六月癸亥詔以前朝官僚譴逐南荒積年未經昭雪其間有懐抱材器為時所嫉者深負寃抑仍令録其名姓盡復官資兼告諭諸道令津致赴闕如已亡歿竝許歸葬以明恩蕩十二月棣州蒲臺縣百姓王知嚴妹以亂離并失怙恃因舉哀追感自截兩指以祭父母帝以遺體之重不合毁傷言念村閭何知禮教自今後所在郡縣如有截指割股不用奏聞是年諸道多奏軍人百姓割股青齊河朔尤多帝曰此若因心亦足為孝但茍免徭役自殘肌膚欲以庇身何能療疾竝宜止絶二年詔禁戢諸軍節級兵士及供奉官受㫖殿直以下各修禮敬三年正月幸西京勅近年以風俗未泰兵革且繁正月燃燈廢停已久今属創開鴻業初建雒都方在上春務達陽氣宜以正月十四十五十六日夜開坊市門一任公私燃燈祈福八月勅所在長吏放雜差役兩稅外不得妄有科配自今後州縣府鎮凡使命經過若不執勅文劵竝不得妄差人驢及取索一物已上又今嵗秋田皆期大稔仰所在切加條流本分納稅及加耗外勿令更有科索切戒所繇人更不得於鄉村乞託擾人九月制内外使臣復命未見便歸私第者朝廷命使臣下奉行唯扵辭見之儀合守敬恭之道近者凡差出使徃復皆越常規或已辭而尚在本家或未見而先歸私第但從已便莫稟王程在禮敬而殊乖置典章而私舉宜令御史臺别具條流事件具黜罰等奏聞是月河中奏准宣詔使有銅牌者所至即易騎以遣十一月甲午祀南郊戊戌制曰夫嚴祀報本所以通神明流澤覃休所以恵黎庶斯盖邦家不易之道皇王自昔之規敢斁大猷兹惟古義粤朕受命于今三年何嘗不寅畏晨興焦勞夕惕師唐虞之典上則扵乾功挹夏殷之源下涵扵民極欲使萬方有裕六氣無愆然而志有所未孚理有所未達致姦宄作釁旱霪為災驕將守邉擁牙旗而背義積隂馭氣陵玉燭以干和載考休徴式昭至警朕是以仰髙俯厚靡惜於責躬履薄臨淵冀昭於𤣥覽兢兢慄慄夙夜匪寧及夫動干戈而必契靈誅陳犧牲而克章善應茍非天垂丕祐神賛殊休則安可致夷兇渠就不戰之功變沴戾氣作有年之慶况靈旗北指䘮犬羊扵亂轍之間飛騎西臨下鄜翟若走丸之易息一隅之煙燧復千里之封疆而又掃蕩左馮討除峴首故得外戎内夏益知天命之攸歸喙息跂行共識皇基之永固仰懐昭應欲報無階爰因南至之辰親展圜丘之禮兹惟大慶必及下民乃𢎞渙汗之私以錫疲羸之幸所冀漸臻蘇息亟致和平噫朕自臨御以来嵗時尚爾氛昏未殄討伐猶頻甲兵湏議於餽糧飛輓頻勞於編户事非獲已慮若納隍宜所在長吏倍切撫綏明加勉諭毎官中抽差徭役禁猾吏廣歛貪求免至流散靡依凋弊不濟宜令河南府開封府及諸道觀察使切加鈐轄刺史縣令不得因縁賦歛分外擾人凡關庶獄每尚輕刑只候纔罷用軍必當便議優給徳音節文内有未該者宜令所司類例條件聞奏四年五月甲辰詔曰竒邪亂正假偽奪真既刑典之不容宜犯違而勿赦應東西兩京及諸道州府制造假犀玉真珠腰帶璧珥并諸色售用等一切禁斷不得輙更造作如公私人家先已有者所在送納長吏對面毁棄如行勅後有人故違必當極法仍委所在州府差人檢察收捕明行處斷是時兩京豪族至于賤𨽻必假犀玉之詐雖有嚴令亦不能禁止六月己未朔詔軍鎮勿起土功九月戊寅頒奪馬令先是王師擊賊獲馬皆令上獻至是乃止之盖欲邀其奮擊之効也五年正月庚寅制曰扈氏不恭固難去戰鬼方未服尚或勞師其蟻聚餘妖狐鳴醜類棄天常而拒命據地險以偷生言事討除将期戡定問罪止誅扵元惡挺災可憫扵遺黎毎念傷痍良深愧歎應天兵所至之地宜令将帥節級嚴戒軍伍不得焚燒廬舎開發丘壠毁廢農桑驅掠士女使其背叛之俗知子弔伐之心又制曰戎機方切國用未殷養兵湏藉於賦租輓粟尚煩于力役所在長吏不得因縁徴發自務貪求茍有故違必行重典立法垂制詳刑定科傳之無窮守而勿失中書門下所奏新定格式律令已頒下中外各委所在長吏切務遵行盡革煩苛皆除枉濫用副哀矜之㫖無違欽恤之言乾化二年正月宣上元夜任諸寺及坊市各㸃影燈金吾不用禁夜近年以来以都下聚兵太廣未嘗令坊市㸃燈故也冊府元龜卷一百九十一
