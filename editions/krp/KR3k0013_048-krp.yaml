body:
  text: 册府元龜卷四十八宋王欽若等撰帝王部謙德從人欲謙德老子稱夫唯不居是以不去帝王代天地之工臨億兆之上鑒昭齊於三光長育同乎四時謙恭成徳振矜不萌巍巍之功蕩蕩之化民何得而稱焉故抑其頌述自云德薄然後丕猷益茂聖烈益隆焉後漢光武建武七年四月詔上書者不得言聖中元元年京師醴泉湧出飲之者痼疾皆愈惟眇蹇者不瘳又有赤草生於水崖郡國頻上甘露羣臣奏言地祗靈應而朱草萌生孝宣帝每有嘉瑞輙以改元神爵五鳳甘露黄龍列為年紀盖以感致神祗表彰徳信是以化致昇平稱為中興今天下清寧靈物仍降陛下情存損挹推而不居豈可使祥符顯慶没而無聞宜令太史撰集以傳來世帝不納常自謙無徳每郡國所上輙抑而不當故史官罕得記焉明帝永平六年四月詔曰先帝詔書禁人上事言聖而間者章奏頗多浮詞自今若有過稱虛譽尚書皆宜抑而不省示不為諂子嗤也十五年案地圖將封皇子悉半諸國馬后見而言曰諸子食數縣於制不已儉乎帝曰我子豈宜與先帝子等乎歳給二千萬足矣章帝建初七年十月岐山得銅器形如酒罇獻之又獲白鹿帝曰上無明天子下無賢方伯人之無良相怨一方斯器亦曷為來哉和帝元興元年自竇憲誅後帝躬親萬㡬每灾異輙延問公卿極言得失前後符瑞八十一所自言徳薄皆抑而不宣魏武令曰孤始舉孝㢘年少自以本非巖穴知名之士恐為海内人之所見嗤思欲為一郡守好作政教以建立名譽使世上明知之故在濟南始除殘去穢平心選舉違迕諸常侍以為強豪所忿恐致家禍故以病還去官之後年紀尚少顧視同歳中年有五十未名為老内自圖之從此却去二十年待天下清乃與同歳中始舉者等耳故以四時歸鄉里於譙東五十里築精舍欲秋夏讀書冬春射獵求低下之地欲以泥水自蔽絶賔客徃來之望然不得如意後徴為都尉遷典軍校尉意遂更欲為國家討賊立功欲望封侯作征西將軍然後題墓道言漢故征西將軍曹侯之墓此其志也而遭値董卓之難興舉義兵是時合兵能多得耳然嘗自損不欲多之所以然者兵多意盛與強敵爭儻更為禍始故汴水之戰數千後還到揚州更募亦復不過三千人此其本志有限也後領兖州破降黄巾三十萬衆又袁術僭號於九江下皆稱臣名門曰建號門衣被皆為天子之制兩婦預爭為皇后志計已定人有勸術使遂即帝位露布天下答言曹公尚在未可也後孤討擒其四将獲其人衆遂使術窮亡觧沮發病而死及至袁紹據河北兵強勢盛孤自度勢實不敵之但計投死為國以義滅身足垂於後幸而破紹梟其二子又劉表自以為宗室包藏奸心乍前乍却以觀世事據有荆州孤復定之遂平天下身為宰相人臣之貴已極意望已過矣今孤言此若為自大欲人言盡故無諱耳設使國家無有孤不知幾人稱帝幾人稱王或者人見孤強盛又性不信天命之事恐私心相評言有不遜之志妄相忖度每用耿耿齊桓晉文所以垂稱至今日者以其兵勢廣大猶能奉事周室也論語云三分天下有其二以服事殷周之徳其可謂至徳矣夫能以大事小也昔樂毅走趙趙王欲與之圖燕樂毅伏而垂泣對曰臣事昭王猶事大王臣若獲戾放在他國没世然後已不忍謀趙之徒𨽻况燕後嗣乎胡亥之殺蒙恬也恬曰自吾先人及至子孫積信于秦三世矣今臣将兵三十餘萬其勢足以背叛然自知必死而守義者不敢辱先人之教以忘先王也孤每讀此二人書未曽不愴然流涕也孤祖父以至孤身皆當親重之任可謂見信者矣孤及子植兄弟過於三世矣孤非徒對諸君說此也嘗以語妻妾皆令深知此意孤謂之言顧我萬年之後汝曹皆當出嫁欲令傳道我心使人皆知之孤此言肝鬲之要也所以勤勤懇懇叙心腹者見周公有金縢之書以自明恐人不信之故然欲孤便爾委捐所典兵衆以還執事歸就武平侯國實不可也何者誠恐已離兵為人所禍也既為子孫計又已敗則國家傾危是以不得慕虛名而處實禍此所以不得為也前朝恩封三子為侯固辭不受今更欲受之非欲復以為榮欲以為外援為萬安計孤聞介推之避晉封申胥之逃楚賞未嘗不捨書而歎有以自省也奉國威靈仗鉞征伐推弱以克強處小而禽大意之所圖動無違事心之所慮何向不濟遂蕩平天下不辱主命可謂天助漢室非人力也然封兼四縣食户三萬何徳堪之江湖未靜不可讓位至於邑土可得而辭今上還陽夏柘苦三縣户二萬但食武平萬户且以分損謗議少減孤之責也晉宣帝以武功初封舞陽昆陽郾及臨潁四縣邑萬户子弟十一人皆為列侯帝勲徳日盛而謙恭愈甚以大常常林鄉邑舊齒見之每拜嘗戒子弟曰盛滿者道家之所忌四時猶有推移吾何徳以堪之損之又損之庶可以免乎後魏孝文時北海王詳行中領軍留守後朝於行宫帝引見之詳慶平沔北帝曰朕以畿南未清神麾蹔動沔北數城竝皆柔服此乃是将士之効非朕之功詳對曰陛下徳邁唐虞功徽周漢自南之風於是乎始又帝有事於方澤質明羣臣問起居帝曰昨日方澤殊自大暑遇天雲䕃宻行人差得無弊咸陽王禧對曰陛下徳感天地故靈物凝彩雖復雨師灑道風伯清塵豈過於此帝曰伊洛南面之中此乃天地氤氲隂陽風雨之所交㑹自然之應非寡徳所能致此前廢帝普泰元年四月有龍跡自宣陽門西出復入城羣臣入賀帝曰國将興聽於民将亡聽於神但當君臣上下克己為治未足恃此為慶後周武帝建徳六年八月鄭州獻九尾狐皮肉銷盡骨體猶具帝曰瑞應之來必昭有徳若使五品時叙四海和平家識孝慈人知禮讓乃能致此今無其時恐非實録乃命焚之唐高祖初即位言自稱名與貴臣每同榻而坐納言劉文靜進諫曰昔晉元帝初立嘗與朝臣共坐王導奏曰太陽俯同萬物欲使蒼生将何仰照今至尊自卑屈羣下何以自安諸臣入朝皆升御坐乖乾坤之定位誠願陛下改之帝曰昔漢光武與嚴子陵同臥乃至加足於帝腹諸公竝舊齒名賢平生親友今雖應天受命而宿昔之志何可忘之連榻同餐適盡歡愛公宜勿為謙也太宗貞觀六年秘書少監虞世南上聖徳論手詔答曰卿所論太高但朕甚寡薄恐有識者窺卿為後人所笑卿引古昔無為而治朕未敢擬倫比之近代乍踰之耳卿覩朕之始未見朕之終宜付秘書若朕能慎終如初則可為也如違此道不用後代笑卿焉十二年著作郎鄧隆上表請編録御製詩集太宗冲讓不許𤣥宗開元十三年潞州獻瑞應圖帝謂宰臣曰朕徃在潞州但靖恭所職不記此事今既固請編録卿喚取藩邸舊寮問其實事然後脩圖肅宗初為皇太子将行册命有司進儀注有中嚴外辨之禮及所御衣服有絳紗衣帝以逼尊極辭不敢受公卿議太師蕭嵩左丞相裴耀卿奏此乃舊儀古今通用皇太子因心謙讓不欲混同請改外辨為外備其中嚴停絳紗衣請為朱明服詔可其議東宮舊合乘輅至殿門帝自宮歩至代宗為廣平王天寳末為天下兵馬元帥至徳二載九月丁亥受命東討統朔方安西囘紇南蠻大食之衆二十萬鼔行而前将行百寮拜送於朝堂帝答拜既出當闕不乘馬歩出水馬門而後登車觀者美之憲宗元和十四年宰臣裴度紀述淮西初日用兵及東平就誅聖謨𤣥算憂勤始終後因賜宴跪獻于帝請内印出付使臣編錄帝覽而言曰此事果行似出于朕懐非所欲也遂抑而不允周太祖初踐祚志懐謙揖藩岳老臣多不稱名與鄆州高行周詔即呼齊王行周上章陳讓世宗顯徳二年九月甲子賜宰臣樞宻使侍衞諸将以下食於萬歳殿帝因曰兩日以來至甚寒沍朕於宫闈之中食珍羙之膳但以無功及民何以仰答大貺雖躬親庻政日覧萬㡬亦恐無以勝任當須手執耒耜與民同力不然親當矢石為人除害稍可安心耳又曰朕不為賜卿等食因事興言實自責也三年十二月己卯帝謂侍臣曰昨觀有司進呈取定本年正旦御殿衣冠鎮圭覧之不覺驚懼且恩信未及於天下徳澤未洽於兆民何以堪此盛事宰臣奏曰陛下兢慎如此何慮恩徳不及於逺人哉從人欲夫同欲盡濟古典之格言惟惠之懐人心之必至是以惟辟作福守位以仁勤恤以宣其詞曲成以濟其務浹醲化於綿宇洽太和於元氣使夫廣運之徳酌而不竭含生之類各得其所則知以人為心盖帝王之盛徳也至若一夫不獲有商所以啓其基小物不遺宗周所以隆其祚以阿衡師保之助宣股肱佐佑之力足以永固鴻業垂光無窮况夫司牧當陽神機獨運流𤣥澤之腴潤漸羣靈之骨髓覆幬之施有不可形容者焉書曰人之所欲天必從之盖愛民甚矣漢高帝六年将封張良帝自擇齊三萬户良曰始臣起下邳與上㑹留此天以臣授陛下陛下用臣計幸而得中臣願封留足矣乃封良為留侯武帝征和三年故城父令公孫勇與客胡倩等謀反倩千見切倩詐稱光禄大夫從車騎數十言使督盗賊止陳留傳舍太守謁見欲収取之淮陽太守田廣明覺知發兵皆捕斬焉而公孫勇衣繡衣乘駟馬車至圉圉使小史侍之亦知其非是守尉魏不害與廏嗇夫江徳尉史蘇昌共収捕之上封不害為當塗侯徳轑陽侯轑音遼昌蒲侯四人俱拜於前小史竊言武帝問言何對曰為侯者得東歸不帝曰汝欲不貴矣言汝意欲歸不吾今貴汝謂賜之爵也汝鄉名為何對曰名遺鄉帝曰用遺汝矣遺弋季切於是賜小史爵關内侯食遺鄉六百户後漢光武建武六年令諸侯就國髙陽侯耿純上書自陳前在東郡案誅涿郡太守朱英親屬今國屬涿誠不自安制書報曰侯前奉公行法朱英文吏曉知義理何時當以公事相是非然受堯舜之罰者不能愛己也更擇國土令侯無介然之憂乃更封純為東光侯章帝時琅琊王京國中有城陽景王祠吏人奉祠神數下言宫中多不便利京上書願徙宫開陽以華盖南武陽厚丘贛榆五縣易東海之開陽臨沂帝許之和帝永元十二年西域都䕶班超自以乆在絕域年老思歸上疏曰臣聞太公封齊五世塟周狐死首丘代馬依風夫周齊同在中土千里之間况於逺處絶域小臣能無依風首丘之思哉蠻夷之俗畏壯侮老臣超犬馬齒殱常恐年衰奄忽僵仆孤魂棄捐昔蘇武留匈奴中尚十九年今臣幸得奉節帶金銀金銀謂印也金印紫綬銀印青綬也䕶西域如自以夀終屯部誠無所恨然恐後世或名臣為没西域臣不敢望到酒泉郡但願生入玉門關臣老病衰困冒死瞽言謹遣子勇隨獻物入塞及臣生在令勇目見中土而超妹同郡曹夀妻昭亦上書請超曰妾同産兄西域都䕶定逺侯超幸得以㣲功特蒙重賞爵列通侯位二千石天恩殊絕誠非小臣所當被蒙超之始出志捐軀命冀立㣲功以自陳效㑹陳睦之變道路隔絕超以一身轉側絕域曉譬諸國因其兵衆每有攻戰輙為先登身被金夷不避死亡賴蒙陛下神靈且得延命沙漠至今積三十年骨肉生離不復相識所與相隨時人士衆皆巳物故超年最長今且七十衰老被病頭髪無黒兩手不仁不仁猶不遂也耳目不聰明扶杖乃能行雖欲竭盡其力以報塞天恩迫於歳暮犬馬齒索蠻夷之性悖逆侮老而超旦暮入地久不見代恐開姦宄之源生逆亂之心而卿大夫咸懐一切莫肻逺慮如有卒暴超之氣力不能從心便為上損國家累世之功下棄忠臣竭力之用誠可痛也故超萬里歸誠自陳苦急延頸踰望三年於今未蒙省録妾竊聞古者十五受兵六十還之亦有休息不任職也縁陛下以至孝理天下得萬國之歡心不遺小國之臣况超得備侯伯之位故敢觸死為超求哀匄超餘年一得生還復見闕庭使國家無勞逺之慮西域無倉卒之憂超得長蒙文王塟骨之恩子方哀老之惠田子方魏文侯之師也見君之老馬棄之曰少盡其力老而棄之非仁也於是収而養之詩云民亦勞止汔可小康惠此中國以綏四方超有書與妾生訣恐不復相見妾誠傷超以壯年竭忠孝於沙漠疲老則便捐死於曠野誠可哀憐如不蒙救䕶超後有一旦之變冀幸超家得蒙趙母衛姬先請之貸妾愚戇不知大義觸犯忌諱書奏帝感其言乃徴超還馬防扶風人明徳皇后兄弟也初封潁陽侯後徙封翟鄉侯以江南下濕上書乞歸本郡和帝聼之魏武帝族子曹真為大将軍少與宗人曹遵鄉人朱讃竝事帝遵讃早亡真愍之乞分所食邑封遵讃子詔曰大司馬有叔向撫孤之仁篤晏平乆要之分君子成人之美聼分真邑賜遵讃子爵關内侯各百户晉惠帝時太傅楊駿輔政備禮聘劉殷殷以母老固辭駿於是表之優詔遂其高志聴終色養勅所在供其衣食蠲其徭賦賜帛二百疋榖五百斛明帝時王舒為荆州刺史其子允之隨在西府及舒授㑹稽内史欲令允之仕舒請曰臣子尚少不樂早官帝許隨舒之會稽康帝初顧和遷尚書僕射以母老固辭詔勅特諭暮出朝還其優遇如此簡文帝時郗愔有高名為太常固讓不拜深抱冲退樂補遠郡從之出為輔國將軍㑹稽内史孝武帝時桓秘以免官退居墓所放志田園好遊山水後起為散騎常侍凢三表自陳詔曰秘受遇先朝是以延之而頻有讓表以栖尚告誠兼有疾疢是用増歎可順其所執後魏孝明時田隨興為平原太守隨興情貪邊官不願内地改授弋陽汝南二郡太守後周宣帝時上洛豐陽人泉企世襲本縣令企年十二鄉人皇平陳合等三百餘人詣州請企為縣令州申上時吏部尚書郭祚以企年少未堪宰民請别選遣終此一限令企代之宣帝詔曰企向成立且為本鄉所樂何為捨此世襲更求一限遂依所請隋文帝時杜臺卿以患聾不堪吏職請修國史帝許之除著作郎煬帝時楊約拜淅陽太守其兄子𤣥感時為禮部尚書與約恩義甚篤既愴分離形於顔色帝謂之曰公比憂悴得非為叔耶𤣥感再拜流涕曰誠如聖㫖帝思約廢立之功繇是徴入朝唐太宗貞觀八年以所擒頡利館於太僕廩食之頡利性不好屋下嘗於庭中施穹廬而居焉鬱鬱不得志與其家人相對悲歌而泣太宗見其羸憊授虢州刺史以彼土多麞而縱其畋獵庶不失物性頡利辭不願往繇是拜大将軍賜以田宅及卒詔其國人塟之從其俗禮焚屍於灞水之東于伯億仕隋為左翊衞歸朝為朝散大夫每掌廵徼精勤不倦及歳在懸車乃抗表云臣雖年合致仕而筋力尚强猶堪驅䇿太宗嘉其任率聽復舊位薛頤為太史令頤清靜每厭人間囂滓因帝與語乃自陳其情願於昭陵側搆一茅宇以終餘生太宗嘉而從之因度為道士拜中大夫為置紫府觀於九峻之下申其高尚焉張柬之神龍初為中書令監修國史罷知政事其年秋表請歸襄州養疾許之仍特授㐮州刺史其子著作郎􅀈亦令從父往将行中宗親賦詩祖道又令羣公餞送於定鼎門外𤣥宗開元六年河南參軍鄭銑虢州朱陽縣丞郭仙舟投匭獻詩勅曰觀其文理是崇道法至於時用不切事情宜各從所好竝罷官度為道士二十三年中天竺國僧善之無畏三藏以年老請還本國許之二十七年以廣州刺史持節嶺南經畧使宋鼎為潞州都督府長史鼎以兄嘗臨慶州喪逝上表陳情乞移理他州特詔許焉徳宗建中初姜公輔為拾遺翰林學士以侍母家貧求為京兆府户曹參軍從之學士如故憲宗時白居易為拾遺翰林學士當改官帝謂崔羣曰居易官卑俸薄拘於資地不能超等其官可以自便居易因奏曰臣聞姜公輔為内職求為京兆府判司為奉親也臣有老母家貧養薄乞如公輔於是除京兆府户曹參軍學士如故元和七年六月癸丑以給事中劉伯芻為虢州刺史以疾求出故也敬宗時薛放為禮部尚書兼集賢殿學士閨門之内尤推孝睦孤孀百口苦俸薄因召對懇求外任其時以節制無闕乃授以江南西道觀察使宣宗太中十年三月宰相崔慎繇為劒南西川節度副大使翌日帝㣲行至新豐柳陌見一布衣抱膝而嘆帝以昇平稍久京師豐稔僅比開元之時上下無愁苦之音因怪而問曰子何不足以至於斯布衣曰我本卬人觀光至此有巢南之想又為槖装所迫今聞崔相國出鎮西川欲預其行無雙縑以遺其掌事者故有此歎帝曰子可明旦相伺於此當奉其闕及旦勅慎繇将歸劒門路人見者莫不感涕其愛人也如此後唐莊宗同光元年十月勅邇聞京百官俸錢至薄骨肉數多支贍不充朝夕難遣偽庭時刻削嚴急不敢披陳今既混同是行優䘏下御史臺在班行有欲求外職或要分司各許中書門下投狀奏聞明宗長興二年八月太傅致仕王建立太子少保致仕朱漢賔上章求歸鄉里勅曰凡為食禄無不盡忠既以縣車永期樂道若妨養性豈是優賢况非繫滯之名宜遂逍遥之便宜依應内外致仕官自此凡要出入不在拘束之限李賛華為滑州節度使長興四年七月壬辰明宗御廣夀殿顧謂賛華曰卿離鎮累月徃來申報勞擾民吏宜早歸鎮賛華曰臣本武夫不樂内職願留宿衞京師帝曰卿既厭藩方則從所欲其元支俸料依舊全給鎮守不可闕帥吾别命鎭将可乎賛華拜抃稱謝曰臣之願也晉高祖天福二年以沂州刺史李繼忠為單州刺史帝以繼忠勲舊之後數月之中連改三郡從其欲也六年八月前平盧軍節度行軍司馬顔衎為駕部郎中充䀋鐵判官時衎在外地堂帖追令赴朝衎以母氏髦年無人侍奉狀聞中書尋有勅只守本官周太祖廣順元年三月丁卯西頭供奉官咸師範奏弟師朗先為亳州蒙城鎮将因懐驚疑遁過淮外臣與東頭供奉官師睿二人時在定州監押兵士及在雍州攻城各拘職任隱帝勅書安撫臣冒死上訴縁祖父墳墓荘田㸃檢入官至今屬營田户部嵗時骨肉祭拜無所臣叨為人子孝道難忘遂於生前便虧祀饗敕下本州其咸師範物業竝宣賜二年考城縣民乞開縣城南門東門從之先是修縣城閉塞之縣民以南臨宋亳北接曹澶商賈徃来以此便之三年四月滄州言控鶴官仇超補當州捉生都頭先是太祖東征廵案賊壘慕容彦超設虎落以䕶城帝宣諭諸州廂軍内果敢之士拔去鹿角者仇超仗一大斧伐鹿角而徑登賊城為守陴者傷三指而下帝奬其勇健觧其甲鎧唯衣一犢鼻賜以錦袍超謝訖携斧又登賊壘芟夷懸撞之類而旋帝擢之在控鶴官之列間日思其驍果宣問願陳力之所超曰父嘗任滄州捉生都頭苟得之平生畢矣故與是職九月以前青州節度副使王沼為邢州副使沼故鎮帥王武俊之家父鋋趙州刺史沼事荘宗累為諸司使出為行軍副使罷平盧副使年七十餘求歸鄉里或言沼貧悴者乃召還京何福進以僕馬遣之再授副戎而思鄉之情不復已也顯徳元年正月青州節度使常思言被病請罷鎮歸京尋醫從之册府元龜卷四十八
