  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_490-1a}
body:
  text: 册府元龜卷四百九十宋王欽若等撰邦計部蠲復第二後魏道武天興元年正月車駕自鄴還中山詔大軍所經州郡復貲租一年山東民租賦之半二年八月除州郡民租賦之半明元神瑞二年六月幸赤城復租一年南次石亭幸上谷復田租之半七月還宫復所過田租之半泰常二年十一月復州租稅臣欽若等曰史失州名三年三月詔以范陽去年水復其租稅八月鴈門河内大雨水復其租税四年四月南廵狩幸鴈門賜所過無出今年租賦五月朔觀漁于灅水車駕還復一年租稅八月辛未東廵甲申車駕還宫所過復一年田租七年九月幸嶠山十月車駕還宫復所過田租之半太武初即位南州大水百姓阻饑劉潔奏加哀矜帝從之於是復天下一嵗租賦始光四年十二月行幸中山復所過田租之半神䴥三年十一月帝幸紐城赦秦雍之民賜復七年四年二月平赫連定還宫戰士賜復十年延和三年二月詔曰朕承綂之始羣凶縱逸西方未賔所在逆僣蠕蠕陸梁於漠北鐵佛肆虐於三秦是以旰食忘寢抵掌扼腕期在掃清逋殘寧濟萬寓故頻年屢征有事西北連輸之役百姓勤勞廢失農業遭罹水旱致使生民貧富不均未得家給人足或有寒窮不能自贍者朕甚愍焉今四方順軌兵革漸寧宜寛徭賦與民休息其令州郡縣隱括貧富以為三級其富者租賦如常中者復二年下窮者復三年刺史守宰當務盡平不得阿容以㒺政治明相宣約咸使聞知大延三年二月行幸幽州還幸上谷遂至代所過復田租之半太平真君四年六月詔復人貲賦三年其田租嵗輸如常牧守不得妄有徴發文帝太安四年三月觀馬射於中山所過郡國賜復一年和平四年十月以定相二州霣霜殺稼丐民田租獻文以和平六年即位詔曰夫賦歛煩則民財匱課調輕則用不足是以什一而稅頌聲作矣先朝權其輕重以惠百姓朕承洪業上惟祖宗之休命夙興待旦惟民之恤欲令天下同於逸豫而徭賦不息何以息煩去苛拯濟黎元者哉今兵革不起畜積有餘諸有雜調一以丐民孝文延興二年十二月詔以代郡事同豐沛代民先配邉戍者皆免之三年二月戊午太上皇帝至自北討詔死王事者復其家十一月詔以河南牧守多不奉法致新邦之民莫能上達其有鰥寡孤獨貧不自存者復其雜徭年八十已上一子不從役是嵗州鎮十一水旱丐民田租四年州鎮十三大饑丐民田租承明元年八月甲申以長安二蠶多死丐民稅之半太和三年王叡為吏部尚書見幸於文明太后詔與東陽王丕同入八議並受復除四年秋七月壬子改作東明觀詔㑹京師耆老復家人不徭役六年二月辛卯詔曰靈丘郡土既偏塉又諸州路衝官司所經供費非一往年廵行見其勞瘁可復民租調十五年乙未詔曰蕭道成逆亂江淮戈旗頻舉七州之民既有征運之勞深乖輕徭之義朕甚愍之其復常調三年八月分遣大使廵行天下遭水之處丐民租賦七年春正月丁卯詔青齊光東徐四州之民户運倉粟二十石送瑕丘瑯邪復租笮一年是年茍頺為司空河東王文明太后詔曰頺為台鼎論道是寄歴奉四朝庸績彌逺宜加崇異以彰厥功自兹已後可永受復除十年十二月詔以汝南潁川大饑丐民田租十一年五月詔復七廟子孫及外戚緦服以上賦役無所與十七年六月帝將南伐詔給兖徐南豫陜岐東徐雒豫七州軍糧十八年十二月癸卯詔中外戒嚴戊申復優代遷之户租賦三歳辛亥車駕南伐齊丁夘詔緣路之民復田租一歲十九年四月丁未帝自南伐齊廻曲赦徐豫二州其運漕之士復租賦三年辛亥以齊蕭氏民降者給復十五年六月詔復軍事從駕渡淮者租賦三年乙卯曲赦梁州復民田租三嵗二十二年二月帝南伐齊至新野詔以穰民首歸大順終始若一者給復三十年標其所居曰歸義鄉次降者給復十五年三月詔以荆州諸郡民初降次附復同穰十月帝北伐叛人發縣瓠曲赦二豫復民田租一嵗宣武景明二年三月詔曰比年以來連有軍旅役務既多百姓彫弊宜時矜量以拯民瘼正調之外諸妨害損民一時蠲罷九月免壽春營户為揚州民正始元年九月詔諸州蠲停徭役不得横有徴發四年十二月詔兵士鍾離沒落者復一房田租三年延昌二年十月詔以恒泗地震民多死傷蠲兩河一年租稅十二月丐雒陽河陰二縣租賦孝明熙平元年七月詔兵士征硤石者復租賦一年二年五月詔曰揚州硤石荆山新淮鄼城兵士戰沒者追給歛財復一房五年若無妻復其家一人二年孝昌元年九月乙卯詔减天下租調之半孝莊建義元年四月復天下租役三年出帝太昌元年四月齊獻武王上言建義之家往為爾朱氏籍沒者悉皆蠲免帝以世易復除東魏孝靜興和元年九月發畿内十萬人城鄴四十日罷十月詔築城之夫給復一年北齊神武為東魏相國武定二年三月以冬春亢旱請孝静蠲縣責文宣以魏武定八年五月受禪改元天保詔曰冀州之渤海長樂二郡先帝始風之國義旗初起之地并州之太原青州之齊郡霸業所在王命是基君子有作貴不忘本思深恩洽蠲復田租齊郡渤海可並復一年長樂復二年太原復三年天保八年自夏至九月河北六州河南十三州畿内八郡大蝗詔今年遭蝗之處免租九年七月詔趙燕瀛定南營五州及司州廣平清河二郡去年螽澇損田兼春夏少雨苗稼薄者免今年租賦武成河清三年十二月周將尉遲逈冦雒陽及段韶大破尉遲逈等解雒陽圍丁卯帝至雒陽免雒州經周軍處一年租賦後主天統三年九月太上皇帝臣欽若曰武成以河清四年傳位稱太上皇帝詔諸寺署所管雜保户姓髙者天保之初雖有優效權假力用未免者今可悉蠲雜户任屬縣一凖平人十一月以晉陽大明殿成大赦免并州居城太原一郡來年租賦四年七月詔使巡省河北諸州無雨處境内偏旱者優免租調後周閔帝元年三月壬子詔曰浙州去嵗不登厥民饉饑朕用愍焉經行縣免一年租調九月辛未詔免長城役者一年租賦武帝保定二年五月以南陽宛縣三足烏所集免今年役及租賦之半建徳三年十二月詔荆襄安延夏五州總管内其貧下户給復三年四年正月詔刺史守令宜親勸農逋租懸調兵役殘功並宜蠲免六月詔東南道四總管内自去年以來新附之户給復三年宣帝以宣政元年六月即位詔山東流民新復業者及突厥侵掠家口破亡不能存濟者竝給復一年八月於西郊詔長安萬年二縣民在京城者給復三年大象二年詔江左諸州新附民給復二十年隋文帝開皇六年辛夘以闗内七州旱免其賦稅九年以江表初定給復十年自餘諸州並免當年租賦十二年有司上言庫蔵皆滿帝曰朕既薄賦於人又大經賜用何得爾也對曰用處常出納處常入略計每年賜用至數百萬段曽無減損於是乃更闢左蔵之院搆屋以受之下詔曰既富而教方知㢘恥寧積於人無蔵府庫河北河東今年田租三分減一兵減半功調全免十三年四月制戰亡之家給復一年十八年七月詔以河南八州水免其課役煬帝即位以户口益多府庫盈溢乃除婦人及奴婢部曲之課大業元年七月制戰亡之家給復十年十月己丑赦江淮已南揚州給復五年舊總管内給復三年二年四月辛亥御端門大赦免天下今年租賦三年四月甲申頒律令大赦天下闗内給復三年四年八月辛酉親賜恒岳河北道郡守畢集大赦天下車駕所經郡縣免一年租調五年六月帝幸張掖御觀風行殿赦隴右諸郡給復一年行經之所給復二年八年四月赦詔以征遼凱旋其諸郡供軍事者並給復一年其所役丁夫匠至涿郡者復二年至臨榆闗已西者復三年至栁城郡已西者復五年至通定鎮已西者復七年至度遼鎮者復十年遼左之民仍給復十年九年正月大赦改博陵為髙陽郡給復一年唐髙祖武徳元年五月即位赦制義師所行之處給復三年自餘給復一年三年九月詔陜鼎熊穀四州給復二年四年七月詔以平王世充竇建徳其天下民庶給復一年幽州管内久隔寇戎給復二年五年五月勅荆州遭蕭銑之亂百姓無出今年田租七年四月詔揚越之民新霑大化見在民户給復一年太宗以武徳九年八月甲子即位赦制闗内蒲芮虞秦陜鼎六州免二年租自餘率土普給復二年九月遣雍州牧楊恭仁等分行突厥所掠之處損失家産及踐苗稼者皆復之貞觀元年夏山東諸州大旱詔無出今年租賦四年十月幸隴州詔岐隴二州户民無出今年租賦十一年正月乙夘復雍州人無出一年租賦二月幸雒陽宫三月詔免雒州管内一年租賦十二年二月幸長春宫以舊經鎮復朝邑縣無出今年租賦降囚免徙十三年正月朝於獻陵免其縣人一年租十四年正月幸魏王泰宅免延康里百姓無出今年租髙宗上元二年正月勅雍岐同華隴等州給復一年自餘諸州咸亨年遭旱澇䖝霜損免之家雖經豐稔家產未復宜更免一年租三年三月甲辰車駕自汝州温湯還東都詔免汝州田租之半儀鳯三年十月詔以來年正月幸東都闗内百姓宜免一年庸調及租并地子稅草其當道諸縣特免二年永隆二年正月己亥詔雍岐華同四州六等以下户宜免兩年地稅河南河北澇損户常式蠲放之外特免一年調八月丁卯朔河南河北大水詔百姓乏食者任往江淮南就食仍遣使分道賑給之屋宇壊倒者給復一年則天萬嵗通天二年十月以定州北平義豐兩縣被契丹侵掠堅守不降改北平為狥忠義豐為立節其守城百姓並給復一年長安四年四月則天幸興泰宫曲赦壽安縣百姓給復一年福昌伊闕二縣免今年租賦之半中宗神龍元年正月即位赦制諸州百姓免今年租賦七月制河南百姓被水漂損者給復一年景龍三年十一月南郊禮畢大赦闗中諸州無出今年地稅是月幸温湯新豐百姓給復一年帝又幸始平送金城公主出降吐蕃詔始平縣百姓給復一年四年正月金城公主出降吐蕃二月曲赦詔天下百姓免今年租半𤣥宗開元二年十二月甲辰詔曰惟此新豐温湯是出古之順豫義兼廵省頃者觀風數臨兹地以察寃滯詢于故老閭里歡康田疇墾闢况冬隆積雪春期有年且誦王逰果符時邁雖千乘萬騎咸給於主司而累月再來頗勤於除掃宜下復蠲之令慰其望幸之心新豐縣百姓免一年雜差科五年二月行幸至東都制河南府百姓給復一年河南河北遭澇及蝗蟲無出今年租八年二月詔曰朕臨御寰極永思政理黄屋成屈已之勞紫宸多在予之念嘗恐㣲物或失大道未臻私奉睿圗載深寅畏去年諸處並多水旱嵗儲不給生業靡安言念下人用増憂旰天下遭損州逋租懸調及勾徴特宜放免十一年正月行幸北郡詔太原府境内百姓宜給復一年九等户給復三年元從家給復五年其家籍見存終身免征役二月壬子祠后土于汾陰勑管壇一鄉給復一年辛未鑾駕至京師其行過處縁頓及營幕所損百姓青苖並令本州檢勘以正倉酬直懐澤兩州已免地稅潞州太原府亦有給復其汾晉蒲絳同華京兆河南供頓户並宜免今年地稅鄭衞雒相儀沁磁隰等州佐助夫雖則役日不多終是往還辛苦各免户内今年差科十三年正月詔曰元率地稅以置義倉本防儉年賑給百姓頻年不稔逋租頗多言念貧人將何以濟今獻春布澤務叶時和自開元十二年閏十二月以前所有未納懸欠地稅宜放免十一月封泰山禮畢其行幸州縣供頓劬勞百姓並免一年租賦兖州免二年租賦十七年十一月謁橋陵詔天下百姓無出今年地稅之半如巳徴物聽折來年逋租懸調在百姓腹内者一切放免京兆府供頓縣免今年地稅十八年正月親迎氣於東郊禮畢制曰天下百姓今年地稅並諸色勾徴欠負等色在百姓腹内未納者並一切矜免十九年十一月庚申幸東都壬子勑供頓州百姓及充夫匠及雜祗供人等宜放今年地稅自餘户等免今年地稅之半二十年九月戊辰河南道宋滑兖鄆等州大水傷禾稼特放今年地稅十月幸北都曲赦太原給復三年十一月庚申祀后土畢大赦制天下遭損免州及供頓州無出今年地稅如巳徴納聽折來年逋租懸調貸糧種子欠負官物在百姓腹内者並宜放免諸州自開元十七年已前所有貸糧種子欠負官物百姓腹内者亦宜准此孝子順孫義夫節婦終身勿事管壇一鄉百姓給復三年二十一年五月以皇太子納妃詔長安萬年兩縣百姓及今月當畨人等並免其家今年地稅二十二年二月秦州地震廨宇廬舎䧟壊壓殺四千餘人詔壓死家復一年一家二人已上死者給復二年十一月勑曰百姓屢空朕孰與足言念於此良所疚懐如聞京畿及闗輔有損田百姓等屬頻年不稔乆乏糧儲雖今嵗薄收未免辛苦宜從蠲省勿用虚弊至如州縣不急之務差科徭役并積年欠負等一切並停其今年租八等已下特宜放免地稅受田一頃已下者亦宜放免二十三年正月乙亥籍田畢詔天下諸州貸糧種子並宜放免京兆河南府逋懸欠負亦宜放免天下色役及貢賦先令中書門下均融減省宜速與條奏六月戊子制鰥寡惸獨免今年地稅之半江淮南有遭水旱處委本道使賑給之二十四年十月甲子自東都還京至陜州詔曰朕永懐西土陵寢在焉至自東都誠慰㒺極兼茲廵省且無怨思徯予之望多謝哲王飲至之規豈忘前典其供頓州應縁夫役差科並免今年地稅二十六年秋七月己巳册忠王璵為皇太子大赦天下制曰至於磧西之人途路遥逺往復疲弊頗異諸軍其中願長往者已别有處分訖年鎮向滿應合放還未到之間稍宜假其家内諸色差科並宜放免如有營農不自辦者州縣量事助借各使存濟京畿近輔百姓所出雖庶務間省終異諸州其百姓等應單貧下户者特放今年半租率土之内賜酺三日二十七年二月己巳加尊號大赦制天下百姓宜放今年地稅二十八年十月戊辰詔曰如聞徐泗之間絲蠶不熟雖庸課已納慮百姓艱辛今年地稅特宜放免天寳元年正月丁未朔御勤政樓受朝賀禮畢赦制如聞百姓之内或有人户髙丁多茍為規避父母在乃别籍異居且令州縣勘㑹其一家之中有十丁已上者放兩丁征行賦役五丁已上放一丁六載正月詔天下百姓今載地稅並去載應損郡逋租懸調諸色勾徴變換等物及請延限並宜一切放免征行之家毎令存䘏差科之際或未優矜自今已後並准飛騎例蠲免七載五月甲戌册尊號畢大赦詔天下百姓今載地稅并諸色勾徴欠負等色在百姓腹内未納者并一切放免十四載八月辛卯天長節大赦制曰聖人積不涸之倉王者用無窮之府支計茍足多賦何為天下百姓今載租庸並宜放免天下諸郡逃户所欠租庸應復業者其親隣已代出租庸不在徴賠之限肅宗以天寳十五載七月即位於靈武改元至徳詔諸勾徴逋租懸調及官錢在百姓腹内並與放免至徳元載十月駕至彭原郡十二月詔彭原郡百姓給復二年二載十二月詔以討安禄山陣亡人家給復二年諸郡縣或隔絶賊境則困於幽殘或犒宴官軍則弊於賦役其本載租庸三分放一其天下百姓應諸色人勾徴及欠負官物一切放免太原乆遭圍逼給復三載上黨三度被攻給復五載其南陽潁川靈昌睢陽雍丘等郡縣堅壁多時力窮方下絶食尚守情亦可矜宜各給復三載其好畤奉先兩縣進退禦冦徴求復多各給復三載蜀郡上皇親幸萬乘乆居明年租賦宜依常式起復再給復三載三載正月册尊號禮畢赦詔天下百姓今年租庸並放其百司府縣諸色雜供各宜減半其雜徭役非要切者一切並停其州因城䧟被殺戮殘毁者委本道使勘責取實各量免其二年租賦其流亡户復業者委本道使與刺史勾當賑給并與種子犂牛仍免三年租賦乾元元年四月享廟禮畢詔天下百姓除正租庸外一切不得别有使役十月册成王為皇太子詔天下孝子順孫義夫節婦終身勿事二年二月丁亥詔天下州縣應欠租庸課稅𫝊馬粟貸糧種子糴糶變稅及營田少作諸色勾徴納未足者一切放免其正義等倉及諸色攤徴亦宜准此其至徳二年十二月三十日已前和糴和市并欠負官物及諸色官錢欠利常平義倉欠負五色一切放免三年二月詔其天下百姓灼然單貧交不存者緣租庸先立限長行每鄉量降十丁猶恐編户之中懸罄者衆限數既少或未優矜其實不支濟者宜令每鄉量更矜放閏四月御明鳯門詔義夫節婦孝子順孫終身勿事上元二年正月詔曰冦孽未平軍戎當備甿庶之内征賦猶繁朕所以親帥公卿躬行節儉而詔書屢下蠲免葢多至國計軍儲取給而已猶欲累加損抑以惠黔黎以委中書門下勾當令度支使與諸供司一切減省應可蠲免每司各條件聞奏當使施行三年九月詔義夫節婦孝子順孫終身勿事元年建卯月御明鳯門詔孝子順孫義夫節婦終身勿事代宗寳應元年四月即位五月丁酉詔天下百姓逋租懸調貸糧種子諸色欠負官物一切放免二年七月改元廣徳制曰百姓逋租懸調及一切欠負官物等自寳應元年二月三日已前並放免一户之中有三丁放一丁庸調地稅依舊每畆稅二升應徴稅租刺史縣令據見在户徴科其逃亡死絶者不得虚攤隣保河北百姓復三年應是廻訖行營經歴處免今年租稅廣徳二年二月己亥親拜南郊祀昊天上帝禮畢大赦天下制其寳應元年十二月三十日已前諸色逋欠在百姓腹内者並宜放免孝子順孫義夫節婦終身勿事三月辛丑詔河南府給復二年十一月癸卯蠲免越州今年半租温州台州明州各給復一年永泰元年正月御含元殿改元制自廣徳元年已前天下百姓所欠負官物一切放免在官典膳内者不在免限其百姓除正租庸外不得更别有科率二年十一月庚辰勑曰古者量其國用而立稅典必以經費用之輕重公田之籍可謂通制履畆而稅斯誠弊法期於折𠂻以便于時億兆不康君孰與足故愛人之體先以博施富國之源必在均節朕自臨宸極比屬艱虞嘗欲闡敦朴之風守冲儉之道每念黎庶思致和平而邉事猶殷戎車屢駕軍興取給皆出邦畿九伐之師尚勤王畧千金之費重困吾人乃者尊冉有之言守周公之制什而稅一務於行古今則編户流亡而墾田減稅計量入之數甚倍徴之法納隍之懼當宁軫懐慮失三農憂深萬姓務從省約稍異蠲除用申勤䘏之㫖以救惸婺之弊其京兆府所奏今年秋稅八十二萬五千石數内宜減放一十七萬五千石委黎幹據諸縣户口地數均平放免仍分明牓示百姓令知當户所減斛斗數訖奏聞其青苗地頭錢亦宜三分放一先欠永泰元年地頭錢十四萬九千一百四十一貫並宜放免朕當躬儉節用䘏我黎元中夏漸寧庶有康濟宣示百姓知朕意焉大歴元年十一月甲子日長至帝御含元殿改元制其逃户復者宜給復三年二年正月既平周智光智光為同華節度元年十二月叛詔曰求瘼䘏隠諒在憂勤罷賦省徭與之休息况因師旅供億頗繁故孝武悔征伐之事魏文隆田租之復同華兩州百姓等項以賊臣背叛制在兇威淫刑以逞厚歛無度閭閻之内杼軸其空朕盰食増懐納隍自咎將問干紀之罪遂興無戰之師哀我斯人困於日費有牛酒壺漿之犒有資糧屝屨之供凋殘之餘何以堪此言念刑弊豈忘優矜宜給復二年一切蠲免放仍委刺史縣令勞倈安集庶可小康宣示百姓使知朕意三年六月辛丑詔曰夏后氏五十而貢殷人七十而助周人百畆而徹其稅皆什一也故謂之天下中正而頌聲作矣乃者因三代之制定其稅典務於行古庶以便人屬以外攘四夷嵗㑹戎事軍國用度公儲匱乏役費薦至近於倍征而吏或奉法不謹失我字人之意孤惸者資有厚歛豪富者貸以輕徭動而生奸浸而流弊稅之什一其實大半致有去父母之邦逃庸保之役流離逋蕩靡室可依阽於死亡而莫之省每一念至良深憫惻頃以釐改從其便安置沃塉之差寛賦歛之重今邦畿之内宿麥非稔去秋墾田又減常嵗昨者徴稅其數頗多朕以萬姓不安三農將廢憂勤鬰切中夜以興思以康濟庶臻其道每欲悉免量入將悉其困而未解兵嚴猶資日費用蠲常數以䘏疲人其京兆府於今年所率夏麥宜於七萬石内五萬石放不徴二萬石容至晩田就後已雜色斛斗續納仍委京兆府尹崔昭差少尹李椅于頎等分縣廵撫必躬必親宣示朝章令悉朕意四年三月詔特免京兆府百姓今年稅錢十一月乙卯詔京兆府今年稅量放十萬石仍令京兆尹即與合審勘會不支濟户先矜放百姓應納地稅及草等各隨使送納不得勞人其諸司丁役及掌閑彍騎等宜委中書門下勘會其先出資並官出錢充不湏更有科率甲子詔曰比屬秋霖頗傷苗稼百姓種麥其數非多如聞村閭不免流散其大歴五年夏麥所稅特宜與減常年稅是月乙亥勑曰王者以冡宰制國用司㑹質嵗成必視豐荒之年以均賦入之數自近古以來天下郡縣或有水旱之處則亦減其田賦休其力役不急之務不便於時亦皆節省以惠窮乏上天眷命屬朕黎元敢不敬承勵于勤恤躬自儉薄刑于家邦非上薦宗廟下資軍旅未嘗私于所奉更有徴求藏之於人孰謂不足乃者屬減邦賦以勸農耕而四時㒺借九扈皆敘近自闗右達于海隅溥其百榖之穰寧止三年之積非朕寡徳所能臻茲葢祖宗景靈被此嘉貺仰荷殊慶兢懐益深而淮南數州獨罹災患秋夏無雨田萊卒荒閭閻艱食百價皆震永念於此良増憮然我念憂傷終夜不寐且有蠲貸安用流亡其准上今年租庸地稅㫖支米等宜三分放二分十二年元載主書卓英倩家在金州英倩附托元載權侔上列及載大法英倩坐誅英倩弟英璘遂盗官器伏擁子弟據險要以拒朝命帝發禁兵千人及山南西道兵千人分道討之王師至英璘黨大潰是州以英倩之故頗至殘傷特詔給復二年十一月庚辰詔曰朕以黎元者君之肢體傷之則惨怛賦稅者國之衣食均之則贍濟然特圗其本先假貧人使之獲安斯謂富國所以底慎財用蠲省征徭期致理於太寧庶自邇而及逺如聞巴南諸州自頃年以來西有蕃夷之冦南有羌戎之聚嵗㑹戎事城出革車子弟困於征徭父兄疲於餽餉賦益煩重人轉流亡荒田既多頻嵗仍儉户口凋耗居邑蕭然去桑梓之重遷保山林以自活念性命於俄頃或逡廵於敓攘傳不云乎窮斯濫矣顧共閭井夫豈不懐哀我矜人葢非獲已朕之不徳自咎良深其邕蓬渠集壁光通開等州宜放二年租庸及諸色徴科亦宜蠲免仍委本道觀察使及刺史縣令切加招撫册府元龜卷四百九十
