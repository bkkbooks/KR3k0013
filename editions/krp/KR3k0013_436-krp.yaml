body:
  text: 册府元龜卷四百三十六宋王欽若等撰將帥部繼襲夫五材竝用去兵之甚難四國于蕃謀帥之為重中葉而下乃有父死子繼兄終弟及代領其衆以濟厥功者矣若夫世篤忠烈家傳武畧纉乃舊服嗣專征之柄聿脩厥徳振象賢之業克嗣前烈不隕家聲者斯可稱焉至於雖讀父書未練軍政紆恩澤之拜緫麾符之重徒藉世資非繇徳舉兹亦膠柱調瑟之謂歟呉孫瑜漢末為奮威將軍領丹陽太守為衆所附至萬餘人建安二十年瑜卒時弟皎為征虜將軍督夏口又并其軍皎善於交結委廬江劉靖以得失江夏李允以衆事廣陵呉碩河南張梁以軍旅傾心親待莫不自盡二十四年皎卒弟奐代統其衆以揚武中郎將領江夏太守在事一年遵皎舊迹禮劉靖李允吳碩張梁及江夏閭舉等竝納其善嘉禾三年奐卒子承嗣以昭武中郎將代奐統兵領郡赤烏六年承卒無子庶弟壹奏奐後襲業為將孫賁漢末為征虜將軍領豫章太守在官十一年卒子鄰嗣字公逹雅性精敏㓜有令譽九嵗代領豫章在郡垂二十年討平叛賊政績脩理凌操為破賊校尉從大帝討夏口中流矢死子統年十五左右多稱述者帝亦以操死國事拜統别部司馬行破賊都尉使攝父兵統卒二子烈封年各數嵗帝内飬於宫後追錄統功封烈亭侯還其故兵烈有罪免封復襲爵領兵孫河為將軍屯京城時丹陽太守孫翊遇害河馳赴宛陵為都督媯覽郡丞戴員所殺河子韶年十七收河餘衆繕治京城起樓櫓脩噐備以禦敵大帝聞亂從椒丘還過丹陽引軍歸吳夜至京城下營試攻驚之兵皆乗城傳檄備警讙聲動地頗射外人帝使曉諭乃止明日見韶甚喜之即拜承烈校尉統河部曲食曲阿丹徒二縣置長吏一如河舊歩隲為驃騎將軍都督西陵二十年鄰敵敬其威信赤烏十一年卒子協嗣統隲所領加撫軍將軍協卒子璣嗣侯協弟闡繼業為西陵督加昭武將軍封西亭侯諸葛瑾為大將軍領豫州牧赤烏四年卒子融代父攝兵業駐公安部曲吏士親附之疆外無事朱績為建中都尉叔父才卒績領其兵朱桓為前將軍領青州牧以恚恨遂托狂發詣建業治病使子異攝領部曲桓卒異拜都騎都尉代桓領兵陸遜為上大將軍卒子抗時年二十拜建武校尉領遜衆五千人送葬東還詣都謝恩抗累遷大司馬荆州牧鳳皇三年卒子晏及弟景𤣥機雲分領抗兵晏為禆將軍夷道監景為偏將軍中夏督機為牙門將全綜為綏南將軍領東安太守嘉禾十二年卒子懌嗣襲業領兵鍾離牧為前將軍領武陵太守卒官子禕嗣代領兵晉羅憲為陵江將軍監巴東軍事領武陵太守泰始六年卒子襲為陵江將軍統其父部曲至廣漢太守王遜為南夷校尉寧州刺史卒遜在州十四年州人復立遜中子堅行州府事詔除堅為南夷校尉寧州刺史假節魏浚為揚威將軍假河南尹為劉曜所得遂死之族子該領其衆懐帝以該為武威將軍綂城西雍凉人使討劉曜成帝時卒從子雄綂其衆祖逖為奮威將軍豫州刺史卒於雍丘以逖弟約代領其衆周訪為南中郎將督梁州諸軍梁州刺史大興三年卒子撫督梁州之漢中巴西梓潼隂平四郡軍事加進鎮西將軍在州三十餘年興寧三年卒子楚監梁益二州假節世在梁益甚得物情太和中梁州刺史楊亮失守楚遣其子瓊討平之是嵗楚卒瓊代楊亮為梁州刺史建武將軍領西戎校尉桓温以梁益多冦周氏世有威稱復除撫弟光子仲孫監梁豫益州之三郡自訪以下三世為益州四十一年邵續為平北郡將軍假節冀州刺史後為石季龍所得元帝既聞續没下詔曰邵續忠烈在公推誠慷慨綏集荒餘憂國忘身功勲未遂不幸陷没朕用悼恨於懐所統任重宜時有代其部曲文武已共推其息緝為營主續之忠誠著於公私今立其子足以安衆一以續本位即授緝使緫率所統效節國難雪其家仇宋檀祗晉末從髙祖克京城叅建武軍事至羅落橋從父建武將軍憑之戰沒之後乃以憑之所領兵配祗京邑既平叅領軍將軍事梁夏侯䕫為持節督豫淮陳頴建霍義七州諸軍事豫州刺史有部曲萬人馬二千匹竝服習精强為當時之盛大同四年卒子譒領其父部曲為州助防刺史陳歐陽頠長沙臨湘人有聲南土蕭勃死後嶺南擾髙祖授頠安南將軍衡州刺史始興縣侯未至嶺南頠子紇已尅定始興及頠至嶺南皆攝伏仍進廣交越成定明新髙合羅愛建徳宜黄利安石雙十九州諸軍事鎮南將軍平越中郎將廣州刺史紇頗有幹畧天嘉中除黄門侍郎員外散騎常侍累遷安逺將軍衡州刺史襲封陽山郡公都督交廣等十九州諸軍事廣州刺史在州十餘年威惠著於百越程靈洗為安西將軍都督郢巴武三州諸軍事郢州刺史子文季果决有父風弱冠從靈洗征討必前登䧟陣領中直兵出為臨海太守及靈洗卒文季盡領其衆起為超武將軍胡頴為左將軍吳興太守弟鑠亦隨頴將軍天嘉元年頴卒鑠統其衆歴東海豫章二郡太守徐度為鎮南將軍湘州刺史以其子敬成監郡天嘉四年度自湘州還朝士馬精鋭敬成盡領其衆隨章昭達征陳寳應晉安平除貞武將軍豫章太守後魏長孫嵩代人父仁昭成時為南部大人嵩寛雅有噐度年十四代父統軍皮豹子為都督秦雍荆梁益五州諸軍事開府仇池鎮將豹子子喜孝文初拜侍中都督秦雍荆梁益五州諸軍事開府仇池鎮將以其父豹子昔鎮仇池有威信故也後周王思政為大將軍䧟於東魏其子康沉毅有度量後為太祖親信思政䧟後詔以因水城䧟非戰之罪增邑三千五百户以康襲爵太原公除驃騎大將軍侍中開府儀同三司十六年王師東討加康使持節大都督以思政所部兵皆配之李遷哲為大將軍率金上等諸州兵鎮襄陽建徳三年卒子敬猷還統父兵起家大都督累遷大將軍唐李抱玉寳應中為澤潞陳鄭節度使從父弟抱貞以澤州刺史為節度留後凡八年抱玉卒抱貞仍領留後徳宗即位拜檢校工部尚書充昭義軍節度等使田神功為宋州節度使大歴元年入覲二月宋州兵叛盜官庫財物而潰神功歿於京師以神功之弟曹州刺史神玉權知汴州留後田承嗣為魏愽等州節度使大歴十三年卒從子悦為中軍兵馬使勇冠三軍承嗣愛其才及將卒命悦知軍事代宗用悦為節度留後尋加魏愽等七州節度使興元元年承嗣子緒殺悦後奔出北門大將曹俊孟希祐等領從數百追及之遥呼之曰節度使須郎君為之他人固不可也乃以緒歸衙推為留後徳宗因授緒魏愽節度使貞元十二年卒子節度副使季安年纔十五軍人推為留後徳宗因授節度使李正已為平盧淄青節度等使建中二年卒子節度觀察留後納擅緫兵政興元元年四月歸順詔加檢校工部尚書充平盧淄青節度等使貞元八年納死軍中以納子青州刺史師古代其位而上請徳宗因授起復右金吾大將軍同正員充平盧及青淄齊節度等使南承宗為徐海沂宻都團練觀察使興元元年卒以其子明應起復知軍事劉怦為幽州節度使長子濟以兼御史中丞充行軍司馬貞元元年怦卒軍人習河朔舊事請濟代父為帥徳宗從之累加檢校兵部尚書程日華為横海軍使檢校工部尚書兼滄州刺史貞元二年卒其子兵馬使試殿中監懐直自知留後事朝廷嘉父之忠起復授檢校工部尚書權知横海軍事尋授節度使懐直荒於畋獵數日方還其從父兄懐信因衆怒閉門不内懐直因來朝覲除龍武統軍懐信代為横海軍節度支度營田滄景觀察留後十三年九月正授節度使二十一年七月卒以其子副使兼御史中丞大夫執恭為起復左驍衛將軍滄州刺史横海軍節度使張孝忠為義武軍節度易定滄等州觀察使子昇雲以父䕃官累至檢校工部尚書貞元七年孝忠卒徳宗以邕王諒為義武軍節度使以昇雲為定州刺史充節度觀察留後賜名茂昭九年正授節度使張建封為徐泗濠節度等使貞元十六年卒判官鄭通誠權知留後使軍衆請於朝廷乞授建封子愔旄節乃割濠泗二州𨽻淮南授愔起復右驍衛將軍同正兼徐州刺史充本州團練使順宗初正授武寧軍節度使王武俊為成徳軍節度使長子士真以檢校工部尚書為副使貞元十七年武俊卒士真充成徳軍節度鎮冀深趙徳棣等州觀察等使長子承宗以御史大夫為副大使元和四年士真卒三軍推承宗為留後請割徳棣二州上獻乃授成徳軍節度使李愿元和末為武寧軍節度使到鎮㑹鄆帥不恭奉命攻討屠城下邑繼有所聞朝廷甚多之無何有疾召以其弟愬代領其任田𢎞正為魏博等州節度使穆宗初鎮州王承宗卒以𢎞正為成徳軍節度使明年七月軍亂遇害時𢎞正子布自河陽三城節度移鎮涇原乃急詔布至起復為魏博節度使乗傳之鎮劉悟為昭義軍節度使寳歴元年卒遺表請以其子從諫繼纉戎事敬宗下大臣議僕射李絳以澤潞内地與河北三鎮事理不同不可許宰相李逢吉中尉王守澄曲為奏請自將作監主簿起復金吾大將軍充昭義節度副大使觀察等留後二年加金吾大將軍充昭義節度等使王廷湊為成徳軍節度使子元逵為鎮州右司馬兼都知兵馬使太和八年十一月廷湊卒三軍推元逵主軍事請命於朝乃起復檢校工部尚書充成徳軍節度使子紹鼎為節度副使鎮州左司馬知府事大中十一年二月元逵卒授紹鼎起復檢校工部尚書充成徳軍節度使其年七月卒子景崇為嫡時年㓜宣宗以昭王汭為成徳軍節度副使以紹鼎弟鎮府左司馬知府事紹懿為御史中丞充成徳軍節度觀察留後尋正授節度使嵗餘卒初紹懿既立以景崇為都知兵馬使督府左司馬知府事及紹懿數月疾篤召景崇謂之曰亡兄以軍政托予比俟汝成立今危惙如此殆將不救汝雖年㓜勉自負荷下禮藩鄰上奉朝㫖俾吾兄家業不墜惟汝之才也言已而卒時監軍在席具奏其治命宣宗嘉之詔授檢校右散騎常侍充成徳軍節度觀察留後尋正授節度使中和二年十一月卒子鎔始十嵗三軍推為留後行軍司馬竇權夷與三軍等進奏曰臣等有狀詣監軍院請故使男節度副使鎔權知軍府事尋蒙監軍使李彦融列鎔所請勾當訖僖宗因授旄鉞檢校工部尚書何進滔為魏博節度使開成初卒子𢎞敬襲其位文宗就加節制咸通初卒子全皥嗣之懿宗尋降符節子孫相繼四十餘年張仲武為盧龍軍節度使大中元年卒子直方以節度副使襲父位張允伸為盧龍軍節度使大中十三年卒允伸領鎮凡二十三年子簡㑹以節度副大使檢校工部尚書權主留後李全忠光啓初為盧龍軍節度使尋卒子威自襲父位稱留後韓允中為魏愽節度使乾符元年卒子簡自節度副使檢校工部尚書起復為節度觀察留後踰月正授節度使王重榮為河中節度使光啓三年六月為部下常行儒所害行儒推其弟重盈為帥太原節度使隴西郡王後唐武皇表聞僖宗授以旄鉞乾寧初重盈卒軍府推重榮兄重簡子行軍司馬珂為留後尋授節度使趙犨為忠武軍節度使大順中卒初犨以仲弟昶為防遏都指揮使同心王事共力軍功乃下令盡以軍州事付於昶遂上表乞骸詔授昶兵馬留後數月犨卒昶遷節度使乾寧三年卒昶弟翊自行軍司馬知忠武軍留後尋正授節度使王處存為義武軍節度使乾寧二年九月卒三軍以河朔舊事推其子副大使郜為留後朝廷從而命之授以旄鉞光化三年郜奔太原三軍推處存母弟處直為留後汴帥梁太祖表授旄鉞羅𢎞信為魏愽節度使光化三年遇旱雩祭於郭璞祠暴卒八月制以𢎞信子節度副使紹威起復雲麾將軍充本軍兵馬留後尋授節度使紹威梁開平中卒子周翰繼為魏愽節度使孟方立為邢洺節度使龍紀元年六月卒三軍推其弟洺州刺史遷為留後後唐李仁福世為夏州牙將本拓䟦氏之族拓䟦思敬唐僖宗時為夏州節度使破黄巢有功賜姓李氏思恭卒弟思諫繼之開平二年思諌卒三軍立其子彛昌為留後尋起復正授旄鉞三年彛昌遇害時仁福為蕃部都指揮使本州軍吏迎立為帥梁祖降制授定難軍節度使長興四年卒子彛超嗣明宗制授定難軍節度使清泰二年卒弟彛興時為夏州行軍司馬三軍推為留後末帝聞之正授定難軍節度使彛興乾徳五年卒子光叡繼其位韓遜為靈武節度梁貞明初卒三軍推其子洙為留後末帝聞之起復正授靈武節度使天成四年卒朝廷以其弟澄為朔方軍節度觀察留後李茂貞為鳳翔節度使同光二年卒遺奏其長子彰義軍節度使從曮知鳳翔軍府事莊宗詔起復授鳳翔節度管内觀察處置等使髙萬興為彰武保大兩鎮節度使同光三年十二月卒於位以其子保大軍馬歩軍都指揮使允蹈權典留後天成初起復檢校太傅充延州節度使長興初允蹈移鎮邢州堂弟允權以膚施令罷歸延州漢髙祖即位初郡兵逐其帥周宻以允權知留後事尋拜節度使髙季興為荆南節度使天成二年卒以其子行軍司馬從誨知軍府事明宗尋命起復授荆南節度使漢乾祐元年卒子保融嗣其位保融建隆元年卒保朂自行軍司馬襲保朂四年卒保融子繼冲襲馬殷為湖南節度使長興二年卒初殷既病差教練使歐𢎞奏云臣病疾多時不任公事乞以男武順軍節度副使充洪鄂等道四面行營副都統希聲充本鎮節度使明宗降制以希聲為潭州大都督府長史充武安靖江等軍節度湖南管内觀運等使希聲未周歳又卒三軍又立其弟朗州節度使希範知留後事襲位明宗制授武安軍節度使漢初薨於位子岳奴年㓜希範弟節度副使希廣襲其位漢髙祖制授檢校太師兼中書令充武安軍節度使錢鏐為吳越國王長興三年薨其子元瓘時為鎮海鎮東等軍節度使兼中書令先是鏐既年鏐欲立嗣召諸子使各論功皆讓於元瓘及鏐病篤召將吏於庭謂之曰予病不起矣吾兒皆懦恐不能與爾將吏為帥與爾軰訣矣須當自擇將吏號泣言曰大令公有軍功多賢行仁孝已領兩鎮王何苦言及此鏐曰此渠定堪否曰衆等願奉賢帥即出管鑰數箱於前謂其子元瓘曰三軍言爾可奉領取此物鏐薨元瓘遂襲父位四年遣將作監李鍇起復元瓘官爵晉天福六年薨子佐襲父位漢初以疾薨弟倧襲位未踰年為大將胡進思所逐遷於别第以甲士援送幽於義和院時倧異母弟俶為温州刺史衆既無帥進思即迎俶立之乾祐元年授檢校太師兼中書令充鎮海鎮東等軍節度使晉曹議金為歸義軍節度𤓰沙等州觀察等使天福五年二月卒以其子元徳襲其位折從阮為永安軍節度武勝等州觀察等使乾祐二年舉族入覲少帝命其子徳扆為府州團練使授從阮武勝軍節度使周馮暉為靈武節度使廣順二年卒子繼業朔方衙内都虞候暉亡三軍請知軍府事因授檢校太保充朔方兵馬留後册府元龜卷四百三十六
