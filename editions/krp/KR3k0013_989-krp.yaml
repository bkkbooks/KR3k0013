body:
  text: 册府元龜巻九百八十九宋王欽若等撰外臣部備禦第二漢成帝河平元年單于遣右臯林王伊邪莫演等奉獻朝正月既罷遣使者送至蒲坂河東之縣也伊邪莫演言欲降即不受我我自殺終不敢還歸使者以聞下公卿議議者或言宜如故事受其降光禄大夫谷永議郎杜欽以為漢與匈奴數為邉害故設金爵之賞以待降者今單于詘體稱臣列為北藩遣使朝賀無有二心漢家接之宜異於往時今既享單于聘貢之質享當也質誠也而更受其逋逃之臣是貪一夫之得而失一國之心擁有罪之臣而絶慕義之君也假令單于初立欲委身於中國未知利害假令猶言或當也私使伊邪莫演詐降以卜吉凶受之虧徳沮善沮壊也音材汝切今單于自䟽不親邉吏或者設為反間欲因而生隙間音居莧反受之適合其䇿使得歸曲而直責歸曲于漢而以直義来責也此誠邉境安危之原師旅動静之首不可不詳也不如勿受以昭日月之信抑詐諼之謀懐附親之心便諼詐辭也音許逺反對奏天子従之遣中郎将王舜往問降狀伊邪莫演曰我病狂妄言耳遣去歸到官位如故不肯令見漢使哀帝建平四年單于上書願朝五年帝被病或言匈奴従上㳺来厭人㳺猶流也河水従西北来故曰上㳺也亦曰上㳺亦總謂地形耳不必係於河水也厭音一渉反自黄龍竟寜時單于朝中國輙有大故大故謂國之大䘮帝繇是難之以問公卿亦以為虚費府帑府物所聚也帑蔵金帛之所也音它莾反又音奴可且勿許單于使辭去未發黄門郎揚雄上書諫曰臣聞六經之治貴於未亂兵家之勝貴於未戰已亂而後治之戰之闘而後獲勝則不足貴二者皆微微謂精妙也然而大事之本不可不察也今單于上書求朝國家不許而辭之臣愚以為漢與匈奴従此隙矣本北地之狄五帝所不能臣三王所不能制其不可使隙甚明臣不敢逺稱請以秦以来明之以秦始皇之彊蒙恬之威帶甲四十餘萬然不敢窺西河廼築長城以界之㑹漢初興以髙祖之威靈三十萬衆困于平城士或七日不食時竒譎之士石畫之臣甚衆石大也又曰石言堅固如石也畫計䇿也卒其所以脫者世莫得而言也卒終也莫得而言謂自免之計其事醜惡故不傳又髙皇后甞忿匈奴羣臣庭議樊噲請以十萬衆横行匈奴中季布曰噲可斬也妄阿順㫖於是大臣權書遺之以權道為書順辭以荅之然後匈奴之觧結中國之憂平及孝文時匈奴侵暴北邉侵騎至雍甘泉京師大駭發三将軍屯細桞棘門覇上以備之數月廼罷孝武即位設馬邑之權欲誘匈奴使韓安國将三十萬衆徼於便墬徼要也音工完切墬古見也匈奴覺之而去徒費兵勞師一虜不可得見况單于之面乎其後深惟社稷之計規恢萬載之䇿恢大也廼大興師數十萬使衛青霍去病操兵前後十餘年操持也音千萬反於是浮西河絶大幕破寘顔襲王庭窮極其地追奔逐北封狼居胥山禪於姑衍以臨瀚海積土為封而又禪祭虜名王貴人以百數自是之後匈奴震怖益求和親然而未肯稱臣也且夫前世豈樂傾無量之費役無罪之人快心於狼望之北哉匈奴中地名也以為不一勞者不久佚不蹔費者不永寜佚與逸同是以忍百萬之師以摧餓虎之喙運府庫之財填盧山之壑而不悔也喙口也摧百萬之師於獸口也盧山匈奴中山也喙音許稱反至本始之初匈奴有桀心桀堅也言其起立不順欲掠烏孫侵公主廼發五将之師十五萬騎獵其南而長樂侯以烏孫五萬騎震其西皆至質而還質信也謂所期處時鮮有所獲鮮少也音先踐反徒奮揚威武明漢兵若雷風耳雖空行空反尚誅兩将軍故北狄不服中國未得髙枕安寝也逮至元康神爵之間大化神明鴻㤙博洽而匈奴内亂五單于争立日逐呼韓邪擕國歸死扶伏稱臣伏音蘭北反然尚覊縻之計不顓制顓與專同專制謂以為臣妾也自此之後欲朝者不距不欲者不强强音其两切何者外國天性忿鷙鷙狠也音竹二反形容魁徤負力怙氣難化以善易肄以惡其彊難詘其和難得故未服之時勞師逺攻傾國殫貨伏尸流血破堅㧞敵如彼之難也既服之後慰薦撫循交接賂遺威儀俯仰如此之備也往時甞屠大宛之城蹈烏桓之壘探姑繒之壁姑繒謂西南種也在益州籍蕩姐之場羌属籍猶蹈也姐音紫艾朝鮮之旃拔兩越之旗近不過旬月之役逺不離二時之勞離歴也三月為一時固己犁其庭掃其穴犁耕也郡縣而置之雲徹席巻後無餘菑菑古災字也唯北狄為不然直中國之堅敵也三垂比之懸矣前世重之滋甚未易可輕也今單于歸義懐欵誠之心欲離其庭陳見於前此乃上世之遺䇿神靈之所想望國家雖費不得已者也奈何距以来厭之辭踈以無日之期消往昔之恩開将来之隙夫欵而隙之使有恨心負前言縁往辭言單于因縁往昔和好之辭以怨漢也歸怨於漢因以自絶終無北面之心威之不可諭之不能焉得不為大憂乎夫明者視於無形聰者聴於無聲誠先於未然即蒙恬樊噲不復施棘門細桞不復備馬邑之䇿安所設衛霍之功何得用五将之威安所震先於未然謂計䇿素定禦難折衝不然一有隙之後雖智者勞心於内辯者轂擊於外轂擊言使車交馳其轂相擊也猶不若未然之時也且往者圗西域制車師圖謀也置城郭都護三十六國費嵗以大萬計者財用之費一嵗數百萬也豈為康居烏孫能踰白龍堆而冦西邉哉龍堆形如土龍身無頭有尾髙大者二三丈卑者丈餘皆東北向相似也在西域中廼以制匈奴也夫百年勞之一日失之費十而愛一臣竊為國不安也唯陛下少留意於未亂未戰以遏邉萌之禍書奏天子寤焉召還匈奴使者更報單于書而許之賜雄帛五十匹黄金十斤嚴尤為王莽将莽分匈奴地立呼韓邪十五子尤諫曰臣聞匈奴為害所從来久矣未聞上世有必征之者也後世三家周秦漢征之然皆未有得上䇿者也周得中䇿漢得下䇿秦無䇿焉當周宣王時獫狁内侵至於涇陽命将征之盡境而止其視戎狄之侵譬猶蟁蝱之螫敺之而已蟁古蚊字也蝱音盲螫音式亦切敺與驅同故天下稱明是為中策漢武帝選将練兵約齎輕粮深入逺戍約少也少齎衣裝雖有克獲之功胡輙報之兵連禍結三十餘年中國罷耗匈奴亦創艾罷讀曰疲耗損也創音初同反艾讀曰乂次下亦同也而天下稱武是為下䇿秦始皇不忍小耻而輕民力築長城之固延袤萬里袤長也音茂轉輸之行起於負海彊境既完中國内竭以䘮社稷是為無䇿今天下遭陽九之戹比年饑饉西北邉尤甚發三十萬衆具三百日糧東援海岱南取江淮然後乃備援引也音爰計其道里一年尚未集合兵先至者聚居暴露師老械弊勢不可用此一難也邉既空虚不能奉軍粮内調郡國不相及属此二難也調發也音徒釣反属音之坎反計一人三百日食用糧十八斛非牛力不能勝牛又當自齎食加二十斛重矣胡地沙鹵多乏水草以往事揆之軍出未滿百日牛必物故且盡物故謂死也餘糧尚多人不能負此三難也胡地秋冬甚寒春夏甚風多齎鬴鍑薪炭重不可勝鬴古釡字也鍑釡之大口者也鍑音富食餔飲水以厯四時有疾疫之憂是故前世伐胡不過百日非不欲久勢力不能此四難也輜重自隨則輕銳者少重直用反其下亦同不得疾行虜徐遁逃勢不能及幸而逢虜又累輜重累音力瑞反如遇險阻銜尾相隨衘馬銜也尾馬尾也言前後單行不得並驅虜要遮前後危殆不測此五難也大用民力功不可必立臣伏憂之今既發兵宜縦先至者令臣尤等深入霆擊且以創艾胡虜謂率道見之兵且以擊虜莽不聼尤言轉兵榖如故天下騷動後漢光武建武七年詔驃騎大將軍杜茂北屯田晋陽廣武以備胡冦九年正月隗囂死司徒掾班彪上言今凉州部皆有降羌羌胡被髮左袵而與漢人雜處習俗既異言語不通數為小吏黠人所見侵奪窮志無聊故致反叛夫蠻夷冦亂皆為此也舊制益州部置蠻夷騎都尉幽州部置領烏桓校尉凉州部置護羌校尉皆持節領護理其怨結嵗時循行問所疾苦又數遣使騎通動静使塞外羌夷為吏耳目州郡因此可得儆備今宜復如舊以明威防帝従之即以牛邯為護羌校尉持節如舊十二年十二月叅狼羌冦武都隴西太守馬援討降之時朝臣以金城破羌之西塗逺多冦議欲棄之馬援上言破羌以西城多完牢易可依固其田土肥壌灌溉流通如令羌在湟中則為害不休不可棄也帝然之於是詔武威太守令悉還金城客民歸者三千餘口使各反舊邑援奏為置長吏繕城郭起塢候開𨗳水田勸以耕牧郡中樂業是嵗朱茂屯田晋陽盧芳據髙栁與匈奴連兵冦邉帝遣謁者叚忠将衆郡施刑配茂鎮守北邉因發邉卒築亭候脩𤇺火又發委輸金帛繒絮供給軍士并賜邊民冠盖相望茂亦建屯田驢車轉運遣驃騎大将軍杜茂将衆郡施刑屯邊施讀曰弛施觧也謂有赦令去其鉗鈇赭衣謂之弛刑築亭候亭候伺候望敵之所脩𤇺燧十三年二月遣捕虜将軍馬武屯虖沱河以備匈奴時帝以盧芳與匈奴烏桓連兵冦盗尤數縁邉愁苦詔上谷太守王霸將弛刑徒六千餘人與杜茂治飛狐道堆石布土築起亭障自代至平城三百餘里是嵗匈奴冦河東州郡不能禁於是漸徙幽并邉人於常山闗居庸闗以東匈奴左部遂復轉居塞内朝廷患之増縁邉兵郡數千人大築亭候脩𤇺火二十一年冬鄯善王車師王等十六國皆遣子入侍奉獻願請都䕶帝以中國初定未遑外事乃還其侍子厚加賞賜後鄯善王上書願復遣子入侍更請都護都護不出誠迫於匈奴天子報曰今使者大兵未能得出如諸國力不従心東西南北自在也於是鄯善車師復附匈奴二十二年烏桓擊破匈奴匈奴北徙幕南地空詔罷諸邉郡亭候吏卒二十四年正月匈奴薁鞬日逐王比自立為呼韓邪單于欵塞稱藩願扞禦北虜事下公卿議者皆以為天下初定中國空虚夷狄情偽難知不可許五官中郎將耿國獨曰臣以為宜如孝宣故事受之令東扞鮮卑北拒匈奴率厲四夷完復邉郡使塞下無晏開之警萬世有安寧之䇿也帝從其議遂立比為南單于繇是烏桓鮮卑保塞自守北虜逺遁中國少事二十五年遼西烏桓大人郝旦等九百二十二人率衆向化封其渠帥為侯王君長者八十一人皆居塞内布於㳂邉諸郡為漢偵候助擊匈奴鮮卑時司徒掾班彪上言烏桓天性輕黠好為冦賊若久放縱而無總領者必復侵掠居人但委主降掾吏恐非所能制臣愚以為宜復置烏桓校尉誠有益於附集省國家之邉慮帝從於是始復置校尉於上谷甯城開營府并領鮮卑賞賜質子嵗時互市焉及明章和之世皆保塞無事二十六年南匈奴與北單于戰不利乃詔單于徙居西河羙稷因使中郎将叚郴及副校尉王郁留西河擁護之為設宫府従事史掾史令西河長史嵗将騎二千弛刑五百人助中郎將衛䕶單于冬屯夏罷自後以為常及悉復縁邉諸郡二十七年南單于稱臣烏桓鮮卑並来入朝帝令太尉趙熹典邉事思為久長規熹上復縁邉諸郡幽并二州繇是而定謂建武六年徙雲中五原人於常山居庸間至二十六年復令還雲中五原東觀記曰草創茍合未有還人盖熹至北請徙之明帝永平八年三月初置度遼将軍屯五原㬅栢曼栢縣在今勝州銀城縣先是遣越騎司馬鄭衆使北匈奴南部湏十骨都侯等知漢與北虜交使懐嫌怨欲畔鄭衆覺之乃上言宜更置大将以防二虜交通繇是始置度遼營以中郎将吴堂行度遼将軍事副校尉来苗左校尉閻章右校尉張國将黎陽虎牙營士屯五原曼柏光武以幽兾将相兵克定天下故於黎陽立營以謁者監領兵騎五千又遣騎都尉秦彭将兵屯羙稷十月詔三公募郡國中都官死罪繫囚减罪一等勿笞詣度遼将軍營屯朔方五原之邉縣妻子自隨便占著邉縣占著謂附名籍父母同産欲相代者恣聼之凡徙者賜弓弩衣糧十六年二月遣太僕祭肜出髙闕髙闕山名因以名塞在朔方北奉車都尉竇固出酒泉駙馬都尉耿秉出居延本匈奴地名也武帝因以名縣属張掖郡在甘州張掖縣東北駙馬都尉来苗出平城伐北匈奴竇固破呼衍王於天山呼衍匈奴王號天山即祁連山一名雪山又名折羅漢山在伊州留兵屯伊吾盧城本匈奴地名既破呼衍即其地也置宜来都尉以為屯田伊州職縣伊吾故城是也九月丁卯詔命郡國中都官死罪繫囚减死罪一等勿笞詣軍營屯朔方燉煌妻子自随父母同産欲求從者恣聼之十七年八月令武威張掖酒泉燉煌張掖故匈奴昆邪王地也張國臂掖故曰張掖故城在甘州張掖縣西北及張掖属國繫囚右趾已下在兵者皆一切勿治其罪詣軍營十一月遣奉車都尉竇固駙馬都尉耿秉騎都尉劉張出燉煌崑崙塞崑崙山名因以為塞在今肅州酒泉縣西南山有昆侖之體故名之擊破白山虜於蒲類海上逐入車師白山冬夏有雪故名曰白山匈奴謂之天山過之皆下馬拜焉去蒲類百里内騎都尉劉張出擊車師請耿恭為司馬與奉車都尉竇固及従弟駙馬都尉秉破降之始置西域都護戊己校尉乃以耿恭為戊己校尉屯後王部金蒲城謁者闗寵為戊己校尉屯前王桞中城屯各置數百人章帝初即位戊己校尉闗寵屯京師前王城耿恭屯後王城北匈奴圍之闗寵上書求救帝乃詔公卿合議司空第五倫以為不宜救司空鮑昱議曰今使人於危難之地急而棄之外則縦蠻夷之暴内則傷死難之臣誠令權時後無邊事可也匈奴如復犯塞為冦陛下将何以使將又二部兵人裁各數千匈奴圍之厯旬不下是其寡弱盡力宜救也可令燉煌酒泉太守各將精騎二千多其幡幟倍道兼行以赴其急匈奴疲極之兵必不敢當四十日間足還入塞帝然之建初元年春酒泉太守叚彭大破車師於交河城帝不欲疲弊中國以事夷狄乃迎還戊己校尉不復遣都護二年三月甲辰罷伊吾盧屯兵元和二年武威太守孟雲上書北虜既已和親而南部復徃抄掠北單于謂漢欺之謀欲犯邉宜還其生口以安慰之詔百官議朝堂公卿皆言夷狄譎詐求欲無厭既得生口當復妄自誇大不可開許太僕袁安獨曰北虜遣使奉獻和親有得邉生口者輙以歸漢此明其畏威而非先違約也雲以大臣典邉不宜負信於戎狄還之足示中國優貸而使邉人得安誠便司徒桓虞改議從安太尉鄭𢎞司空第五倫皆恨之𢎞因大言激厲虞曰諸言當還生口者皆為不忠虞廷叱之倫及大鴻臚韋彪各作色變容司𨽻校尉舉奏安等皆上印綬謝帝詔報曰久議沉滯各有所志葢事以議従䇿繇衆定誾誾衎衎得禮之容寢嘿抑心更非朝廷之福君何尤而深謝其各冠履帝竟従安議章和元年四月丙子令郡國中都官繫因减死一等詣金城戍七月詔死罪囚犯罪在丙子赦前而後捕繫者皆减死勿笞詣金城戍九月壬子詔郡國中都官繫囚減死罪一等詣金城戍和帝永元二年大将軍竇憲復出屯武威明年北單于為左校尉耿䕫所破道走烏孫塞北地空餘部不知所属憲自矜巳功欲結恩北虜乃上立降者左鹿蠡王阿佟為北單于置中郎将領護如南單于故事事下公卿議太尉来繇太常丁鴻光禄勲耿秉等十人議可許袁安與任隗奏以為光武招懐南虜非謂可求安内地正以權時之筭可得扞禦北狄故也今朔漠既定宜令南單于反其北庭并領降衆無縁復更立阿佟以増國費宗正劉方大司農尹睦同安議事奏未以時定安懼憲計遂行乃獨上封事曰臣聞功有難圖不可豫見事有易斷較然不疑伏惟光武皇帝本所以立南單于者欲安南定北之䇿也恩徳甚備故匈奴遂分邉境無患孝明皇帝奉承先意不敢失墜赫然命將爰伐塞北至乎章和之初降者十餘萬人議者欲置之濵塞東至遼東太尉宋繇光禄勲耿秉皆以為失南單于心不可先帝従之陛下奉承洪業大開疆宇大将軍逺帥討伐席卷北庭此誠宣明祖宗崇立𢎞勲者也宜審其終以成厥初伏念南單于屯先父舉衆歸徳自蒙㤙以来四十餘年三帝積累以遺陛下陛下深宜遵述先志成就其業况屯首唱大謀空盡北虜輟而弗圖更立新降以一朝之計違三世之規失信於所飬建立於無功繇秉實知舊議而欲背棄先㤙夫言行君子之樞機賞罸理國之綱紀論語曰言忠信行篤敬雖蠻貊行焉今若失信於一屯則百蠻不敢復保誓矣又烏桓鮮卑新殺北單于凡人之情咸畏仇讎今立其弟則二虜懐怨兵食可廢信不可去且漢故事供給南單于費直嵗一億九十餘萬西域嵗七千四百八十萬今北庭彌費其費過倍乃是空盡天下而非䇿建之要也詔下其議安又與憲更相難折憲險急負勢言辭驕訐至詆毁安稱光武誅韓歆戴渉故事安終不移大司徒歆坐非帝讀隗囂書自殺大司徒􅍱坐殺大倉令下獄死憲竟立匈奴降者右鹿蠡王於除鞬為單于後遂反叛卒如安策安以天子㓜弱外戚擅權每朝㑹進見及與公卿言國家事未甞不噫嗚流涕自天子及大臣皆恃頼之八年八月辛酉詔郡國中都官繫囚减死一等詣燉煌十二年四月日南象林蠻夷二千餘人冦掠百姓燔燒官寺郡縣發兵討擊斬其渠帥餘衆乃降於是置象林将兵長史以防其患十四年二月乙卯脩故西海郡平帝時金城塞外羌獻地以為西海郡也光武建武中省金城入隴西郡至是復繕脩之金城即蘭洲縣也徙金城西部都尉以戍之安帝永初四年二月丁巳南匈奴冦常山乙丑初置長安雍二營都尉官京兆席牙扶風都尉以京州近羌殺犯三輔将兵衛護國陵扶風都尉居雍縣故俗人稱雍營焉西羌傳云虎牙都尉居長安五年二月先零羌入冦河東至河内百姓相驚多奔南度河使北軍中侯朱寵将五營士屯孟津詔魏郡趙國常山中山繕作塢候六百一十六所建光元年髙句􅌐王宫死子遂成立𤣥莵太守姚光上言欲因其喪發兵擊之議者皆以為可許尚書陳忠曰宫前桀黠光不能討死而擊之非義也宜遣弔問因責譲前罪赦不加誅取其後善帝従之明年遂成還漢生口詣𤣥莵降詔曰遂成等桀逆無状當斬斷爼醢以示百姓幸㑹赦令乞罪請降鮮卑濊貊連年冦鈔驅略小民動以千數而裁送數十百人非向化之心也自今以後不與縣官戰闘而自以親附送生口者皆與贖直縑人四十疋小口半之遂成死子伯固立其後濊貊率服東陲少事是嵗初置漁陽營兵伏侯古今注曰置營兵千人也延光二年張璫為燉煌太守上書陳三䇿以為北虜呼衍王甞展轉蒲類秦海之間專制西域共為冦鈔今以酒泉属國吏士二千餘人集昆侖塞先擊呼衍王絶其根本因發鄯善兵五千人脅車師後部此上計也若不能出兵可置軍司馬将士五百人四郡供其犁牛榖食出據桞中此中計也如又不能則宜棄交河城鄯善等悉使入塞此下計也朝廷下其議尚書陳忠上䟽曰臣聞蠻夷之冦莫甚北虜漢興髙祖窘平城之圍太宗屈供奉之耻故孝武憤怒深惟久長之計遣虎臣浮河絶漢窮破虜庭當斯之役黔首隕於狼望之北財幣縻於盧山之壑府庫殫竭杼柚空虚筭至舟車貲及六畜夫豈不懐慮久故也遂開河西四郡以隔絶南羌收三十六國斷匈奴右臂是以單于孤恃鼠竄逺蔵至於宣元之世遂備藩臣闗徼不閉羽􅊾不行繇此察之戎狄可以威服難以化狎西域内附日久區區東望扣闗者數矣此其不樂匈奴慕漢之效也今北虜已破車師勢必南攻鄯善棄而不救則諸國従矣若然則虜財賄恣増膽勢益殖威臨南羌與之交連如此河西四郡危矣河西既危不救則百倍之役興不訾之費發矣議者但念西域絶逺恤之煩費不見先世一心勤勞之意也方今邉境守禦之具不精内郡武衛之備不脩燉煌孤危逺来告急復不輔助内無以慰勞吏人外無以威示百蠻蹙國减土經有明誡臣以為燉煌宜置校尉案舊増四郡屯兵以西撫諸國庶足折衝萬里震怖匈奴帝納之乃以班勇為西域長史将弛刑徒五百人西屯桞中勇遂破平車師初曹宗為燉煌太守時北匈奴復率車師後部王共攻班等遂擊走其前王鄯善逼急求救於曹宗因此請出兵擊匈奴報索班之耻復欲進取西域鄧太后不許但令置護西域副校尉居燉煌復部營兵三百人覊縻而已其後北虜連與車師入冦河西朝廷不能禁議者因欲閉玉門陽闗以絶其患璫為太守遂建三䇿三年九月詔郡國中都官死罪繫囚减罪一等詣燉煌隴西及度遼營漢官儀度遼将軍屯五曼柏縣順帝永建元年五月詔幽并凉州刺史使各實二千石以下至黄綬年老劣弱不任軍事者上名嚴𠡠障塞繕設屯備立秋之後簡習戎馬十月辛巳詔减死罪以下徙邉丁亥鮮卑犯邉遣黎陽營兵出屯中山北界告幽州刺史及令縁邉郡増置歩兵列屯塞下調五營弩師郡舉五人令教習較射調選也五營五校也謂長水歩兵射聲胡騎車騎等五校尉也先是朔方以西障塞多不修復鮮卑因此數冦南部殺斬将王匃奴有左右斬将王單于憂恐上言求復障塞帝従之乃遣黎陽營兵出屯中山北界増置縁邉諸郡兵别屯塞下教習戰射五年十月丙辰詔郡國中都官死罪繫囚皆减罪一等詣北地上郡安定戍永和元年武陵太守上書以蠻夷率服可比漢人増其租賦議者皆以為可尚書令虞詡獨奏曰自古聖王不臣異俗非德不能及威不能加知其獸心貪婪難率以禮是故覊縻而綏撫之附則受而不逆叛則棄而不追先帝舊典貢稅多少所繇来久矣今猥増之必有怨叛計其所得不償所費必有後悔帝不從其冬澧中漊中蠻果争貢市非舊約遂殺卿吏舉衆反叛明年春蠻二萬人圍充城八千人冦夷道遣武陵太守李進討破之斬首數百級餘皆降服二年日南象林徼外蠻夷區憐等反賊勢轉盛侍御史賈昌使在日南與州郡并力討之嵗餘兵榖不繼帝以為憂明年詔公卿百官及四府掾属問其方略皆議遣大将發荆揚兖豫四萬人赴之大将軍從事中郎李固駮曰若荆揚無事發之可也今二州盗賊盤結不筭武陵南郡蠻夷末輯長沙桂陽數被徴發如復擾動必更生患其不可一也又兖豫之人卒被徴發逺赴千里無有還期詔書廹促必致叛亾其不可二也南州水土濕暑加有瘴氣致死亾者十必四五其不可三也逺渉萬里士卒疲勞比至嶺南不復堪闘其不可四也軍行三十里馬程而去日南九千餘里三百日乃到計人粟五升用米六十斛不計将吏驢馬之食但負甲自致費便若此其不可五也設軍到所在死亾必衆既不足禦敵當復更發此為刻割心腹以補四肢其不可六也九真日南相去千里發其吏民猶尚不堪何况勞苦四州之卒以赴萬里之艱哉其不可七也前中郎将尹就討益州叛羌益州諺曰虜来尚可尹来殺我後就徴還以兵付刺史張喬喬因其將吏旬月之間破殄冦虜此發将無益之效州郡可任之騐也宜更選有勇略仁恵任将帥者以為太守刺史悉使共住交趾令日南兵單無榖守既不足戰又不能可一切従其吏民北依交趾事静之後乃命歸本還幕蠻夷使自相攻轉輸金帛以為其資有能反間致頭首者許以封侯列土之賞故并州刺史長沙祝良性多勇决又南陽張喬前在益州有破虜之功皆可任用昔文帝就加魏尚為雲中守哀帝即拜襲舎為太山太守冝即拜良等便道之官四府悉從固議即拜祝良為九真太守張喬為交趾刺史喬至開示慰誘並皆降散良到九真單車入賊中設方略招以威信降者數萬人皆為良築起府寺繇是嶺外復平五年大将軍梁商以羌胡新反黨衆初合難以兵服宜用招降乃上表曰匈奴冦畔自知罪極窮烏困獸皆知救死况種類繁熾不可殫盡今轉運日増三軍瘦苦虚内給外非中國之利竊見度遼将軍馬續素有謀謨且與邉日久深曉兵要每得續書與臣䇿合宜令續深備髙壁以㤙信招降宣示購賞明為期約如此則醜類可服國家無事矣帝従之乃詔續招降畔虜商又移書續等曰中國安寧忘戰日久良騎野合交鋒接矢决勝當時戎狄之所長而中國之所短也彊弩乗城堅營固守以待其衰中國之所長也而戎狄之所短也宜務先所長以觀其變議備開賞宣示反悔勿貪小功以亂大謀是年九月令扶風漢陽築隴道塢三百所置屯兵桓帝建和元年十一月辛巳减天下死罪一等徙邉戍和平元年十一月辛巳减天下死罪一等徙邉戍永興元年十一月詔减天下死罪一等徙邉戍二年閏九月减天下死罪一等徙邉戍永夀三年四月九真蠻夷叛太守兒式討之戰歿遣九真都尉魏郎擊破之復屯據日南靈帝熹平五年夏育上言鮮卑冦邉自春以来三十餘發請徴幽州諸郡兵出塞擊之一冬二春必能擒滅朝廷未許先是護羌校尉田晏坐事論刑被原欲立功自効乃請中常侍王甫求得為将甫因此議遣兵與育并力討賊帝乃拜晏為破鮮卑中郎将大臣多有不同乃召百官議朝堂議郎蔡邕議曰書戒猾夏易伐鬼方周有獫狁蠻荆之師漢有闐顔澣海之事征討殊類所繇尚矣然而時有同異勢有可否故謀有得失事有成敗不可齊也武帝情存逺略志闢四方南誅百越北討强胡西伐大宛東并朝鮮因文􅕺之蓄藉天下之饒數十年間官民俱匱至乃興鹽鐡酤𣙜之利設告緡重稅之令民不堪命起為盗賊闗東紛擾道路不通繡衣直指之使奮鐡鉞而並出既而覺悟乃息兵罷役封丞相為富民侯故主父偃曰夫務戰勝窮武事未有不悔者也夫以世宗神武将帥良猛財富充實所拓廣逺猶有悔焉况今人財並乏事劣昔時乎自匈奴遁逃鮮卑彊盛據其故地稱兵十萬財力勁徤意智益生如以闗塞不嚴禁網多漏精金良鐡皆為賊有漢人逋逃為之謀主兵利馬疾過於匈奴昔叚紀明良将習兵善戰有事西羌猶十餘年今育晏才䇿未必過叚鮮卑種衆不弱于曩時而虚計二載自許有成若禍結兵連豈得中休當復徴發衆人轉運無己是為耗竭諸夏并力蠻夷夫邉垂之患手足之疥搔中國之困胷背之瘭疽方今郡縣盗賊尚不能禁况此醜虜而可伏乎昔髙祖忍平城之耻吕后棄慢書之詬方之於今何者為甚天設山河秦築長城漢起塞垣所以别内外異殊俗也茍無䠞國内侮之患則可矣豈無蟲螘狡冦計争往来哉雖或破之豈可殄盡而方令本朝為之旰食乎夫專勝者未必克挟疑者未必敗衆所謂危聖人不任朝議有嫌明主不行也昔淮南王安諫伐越曰天子之兵有征無戰言其莫敢較也如使越人蒙死以逆執事厮輿之卒有一不備而歸者雖得越王之首而猶為大漢羞之而欲以齊民易醜虜皇威辱外夷就如其言猶已危矣况乎得失不可量耶昔珠崖郡反孝元皇帝納賈損之言而下詔曰珠崖背畔今議者㦯曰可討或曰棄之朕日夜思惟羞威不行則欲誅之通於時變復憂萬民夫萬民之饑與逺蠻之不討何者為大宗廟之祭㓙年猶有不備况避不嫌之辱哉今闗東大困無以相贍又當動兵非但勞民而已其罷珠崖郡此元帝所以發徳音也夫恤民救急雖成都列縣尚猶棄之况障塞之外未甞為民居者乎守邉之術李牧善其略保塞之論嚴尤申其要遺業猶在文章俱存循二子之䇿守先帝之規臣曰可矣帝不從遂遣夏育出髙柳田晏出雲中匈奴中郎将藏旻率南單于出鴈門各將萬騎三道出塞二千餘里檀石槐命三部大人各帥衆逆戰育等大敗䘮其節傳輜重各将數十騎奔還死者十七八三将檻車徴下獄贖為庶人光和三年十月巴郡板楯蠻復叛冦掠三蜀及漢中諸郡帝遣御史中丞蕭授督益州兵討之連年不能剋帝欲大發兵乃問益州計吏考以征討方略漢中上計程包對曰板楯七姓射殺白虎立功先世復為義人其人勇猛善於兵戰昔永初中羌入漢川郡縣破壊得板楯救之羌死敗殆盡故號為神兵羌人畏忌傳語種軰勿復南行至建和二年𦍑復大入實賴板楯連㩁破之前車騎将軍馮緄南征武陵雖受丹陽精兵之銳亦倚板楯以成其功近益州郡亂太守李顒亦以板楯討而平之忠功如此本無惡心長吏鄉亭更賦至重僕役箠楚過於奴虜亦有嫁妻賣子㦯乃至自剄割雖陳寃州郡而牧守不為通理闕庭悠逺不能自聞含怨呼天叩心窮谷愁苦賦役困罹酷刑故邑落相聚以致叛戾非有謀主僣號以圗不軌今但選明能牧守自然安集不煩征伐也帝從其言遣太守曹謙宣詔赦之即皆降伏中平二年漢陽賊邉章韓遂與羌胡為冦東侵三輔時遣車騎将軍皇甫嵩西討之嵩請發烏桓三千人北軍中侯鄒靖上言烏桓衆弱宜募鮮卑事下四府大将軍掾韓卓議以為烏桓兵寡而與鮮卑世為仇敵若烏桓被發則鮮卑必襲其家烏桓聞之當復棄軍還救非唯無益於實乃更沮三軍之情鄒靖居近邉塞究其態詐若令靖募鮮卑輕騎五千必有破敵之效車騎将軍掾應劭駮之曰鮮卑隔在漢北犬羊為羣無君長之帥盧落之居而天性貪暴不拘信義故數犯障塞且無寜嵗唯至互市乃来靡服茍欲中國珍貨非為畏威懐徳計獲事足旋踵為害是以國家外而不内葢為此也往者匈奴反叛度遼将軍馬續烏桓校尉王元發鮮卑五千餘騎又武威太守趙坤亦率鮮卑征討叛羌斬獲醜虜既不足言而鮮卑越溢多為不法裁以軍令則忿戾作亂制御少緩則陸梁殘害刼居人鈔商旅噉人牛羊略人兵馬得賞既多不肯去復欲以物買鐡邉将不聴便取練帛聚欲燒之邉将恐怖畏其反叛辭謝撫順無敢拒違今狡冦未殄而羌為巨害如或致悔其可追乎臣愚以為可募隴西羌胡守善不叛者簡其精勇多其牢賞太守李参沈静有謀必能奨属得其死力當思漸消之略不可倉卒望也韓卓復與劭相難反覆於是詔百官大㑹朝堂皆從劭議册府元龜卷九百八十九
