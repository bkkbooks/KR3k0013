body:
  text: 册府元龜卷三百六十五宋王欽若等撰將帥部機畧第五後周段永初仕後魏孝武時為左光祿大夫時有賊魁元伯生西自崤潼東至鞏雒屠陷塢壁所在為患孝武遣京畿大都督婁昭討之昭請以五千人行永進曰此賊無城栅唯以冦抄為資取之在速不在衆也若星馳電發出其不虞精騎五百足矣帝然其計於是命永代昭以五百騎倍道兼進遂破平之李賢初仕後魏孝武時為左都督安東將軍還鎮原州大統二年州民豆盧狼害都督大野樹兒等據州城反賢乃招集豪傑與之謀曰賊起倉卒便誅二將其勢雖盛其志已驕然其政令莫施唯以殘剝為業夫以覊旅之賊而馭烏合之衆勢自離解今若從中擊之賊必喪膽如吾計者指日取之衆皆從焉賢乃率敢死士三百人分為兩道乗夜皷譟而出羣賊大驚一戰而敗狼乃斬關遁走賢輕與三騎追斬之遷原州長史尋行原州事四年莫折後熾結連賊黨所在冦掠賢率鄉兵與行涇州事史寧討之後熾列陣以待賢謂寧曰賊聚結嵗久徒衆甚多數州之人皆為其用我若總一陣併力擊之彼既同惡相濟理必總萃於我其勢不分衆寡莫敵我便救尾無以制之今若令諸軍分為數隊多設旗皷掎角而前以脅諸栅公别統精兵直指後熾按甲而待莫與交鋒後熾欲前則憚公之鋭諸柵欲出則懼我疑兵令其進不得戰退不得走以候其懈擊之必破後熾一敗則衆柵不攻自拔矣寧不從屢戰頻北賢乃率數百騎徑掩後熾營收其妻子僮𨽻五百餘人并輜重等屬後熾與寧戰勝方欲追奔忽聞賢至乃棄寧與賢接戰賢手斬十餘級生獲六人賊遂大敗後熾單騎遁走師還以功賞奴婢四十口雜畜數百餘頭于謹初為後魏元纂鎧曹從事率二千騎追討茹茹為賊所圍謹乗駿馬一紫一騧賊所先識乃使二人各乗馬突陣而出賊以為謹也皆争逐之謹乃入塞後為西魏驃騎大將軍從太祖攻齊神武于邙山大軍不利謹率其麾下偽降立於路左齊神武軍乗勝逐北不以為虞追騎過盡謹乃自後擊之齊軍大亂以此大軍得全率兵鎮潼關進位柱國大將軍李穆為西魏并州總管以功授都督河橋之戰太祖所乗馬中流矢驚逸太祖墜於地軍中大擾敵人追及之左右皆奔散穆乃以䇿抶太祖因大罵曰爾曹主何在爾獨住此敵人不疑是貴人也遂捨之而過穆以馬授太祖遂得俱免李弼為西魏秦州刺史從太祖東討雒陽弼前驅東魏將莫多婁貸文率衆来至榖城弼遣軍士鼔譟曳柴揚塵貸文以為大軍至遂敗斬之虜其衆韓雄為西魏東徐州刺史時東魏東雍州刺史郭叔畧與雄接境頗為邉患䧺密圖之乃輕將十騎夜入其境伏於道側遣都督韓仕於叔畧城東假東魏人衣服詐若自河陽叛投關西者叔畧出馳之雄自後射之再發咸中遂斬叔畧首李逺初為西魏驃騎大將軍時東魏北豫州刺史髙仲密請舉州来附北齊神武屯兵河陽太祖以仲密所據遼逺難為應接諸軍皆憚此行逺曰北豫逺在賊境髙歡又屯兵河陽常理而論實難救援但兵務神速事貴合機古人有言不入虎宂焉得虎子若以竒兵出其不意事或可濟脱有利鈍故是兵家之常如其顧望不行便無克定之日太祖嘉曰李萬嵗逺字萬嵗所言差彊人意乃授行臺尚書前驅東出太祖率大軍繼進乃潛師而往拔仲密以歸尉遲迥為西魏大將軍侯景之渡江梁元帝時鎮江陵既以内難方殷請修隣好其弟武陵王紀在蜀稱帝率衆東下將攻之梁元帝大懼乃移書請救又請伐蜀太祖曰蜀可取矣取蜀制勝在兹一舉乃與羣公㑹議諸將多有異同唯迥以為紀既盡鋭東下蜀必空虚王師臨之必有征無戰太祖深以為然謂迥曰伐蜀之事一以委汝計將安出迥曰蜀與中國隔絶百有餘年恃其山川險阻不虞我師之至宜以精兵鋭騎星夜襲之平路則倍道兼行險途則緩兵漸進出其不意衝其腹心蜀人既駭官軍之臨速必望風不守矣於是乃令迥督開府元珍乙弗亞万俟吕陵始叱奴興綦連宇文昇等六軍甲士一萬二千騎萬匹伐蜀王悦為西魏大行臺尚書從大將軍逹奚武征梁漢軍出武令悦説其城主楊賢悦乃貽之書賢於是遂降悦又白武云白馬衝要是必争之城今城守寡弱易可圖也若蜀兵更至攻之實難武然之即令悦率輕騎徑趣白馬悦示其禍福梁將深悟遂以城降時梁武陵王蕭紀果遣其將任珍竒欲先據白馬行次關城聞其已降乃還及梁州平太祖即以悦行刺史事楊紹為西魏車騎大將軍從大將軍逹奚武征漢中時梁蕭循固守梁州紹以為懸軍敵境圍守堅城曠日持久糧饟不繼城中若致死於我懼不能歸請為計以誘之乃頻至城下挑戰設伏待之循初不肯出紹又遣人罵辱之循怒果出兵紹率衆偽退城降以功授輔國大將軍宇文測為西魏大都督行綏州事先是每嵗河冰合後突厥即来冦掠常預遣居民入城堡以避之測至皆令安堵如舊乃於要路數百處並多積柴仍逺道斥候知其動静是年十二月突厥從連谷入冦去界數十里測命積柴之處一時縱火突厥謂有大軍至懼而遁走自相蹂踐委棄雜畜及輜重不可勝數測徐率所部收之分給百姓自是突厥不敢復至測因請置戍兵以備之楊􅎎行建州事東魏遣太保尉景攻陷正平復遣行臺薛循義率兵與斛律俱㑹於是敵衆漸盛􅎎以孤軍無援且腹背受敵謀欲拔還復恐義徒背叛遂偽為太祖書遣人若從外送来者云已遣軍四道赴援因令人漏洩使所在知之又分土人義首令領所部四出抄掠擬供軍費􅎎分遣訖遂於夜中拔還邵郡朝廷嘉其權以全軍即授建州刺史史寧為西魏涼州大都督宕昌叛羌獠甘逐其王彌定而自立寧擊走之彌定遂得復位寧以未獲獠甘密欲圖之乃揚聲欲還獠甘聞之復招引叛羌依山起柵欲攻彌定寧謂諸將曰此羌入吾術中當進兵擒之耳諸將思歸咸曰生羌聚散無常依據山谷今若追討恐曠日無成且彌定還得守藩將軍功已立矣獠甘勢弱彌定足能制之以此還師䇿之上者寧曰一日縱敵數世之患豈可捨將滅之冦更煩再舉人臣之禮知無不為以此諸君不足與計事也如更沮衆寧豈不能斬諸君邪遂進軍獠甘衆亦至與戰大破之生獲獠甘狥而斬之并執鞏亷王送闕賀若敦為西魏驃騎大將軍討陳將侯瑱于湘州時土人亟乗輕船載米粟及籠雞鴨以餉瑱軍敦患之乃偽為土人裝船伏甲士於中瑱兵人望見謂餉船之至逆来争取敦甲士出而擒之敦軍數有叛人乗馬投瑱者輒納之敦又别取一馬牽以趣船令船中逆以鞭鞭之如是者再三馬便畏船不上後伏兵於江岸遣人以招瑱軍詐稱投附瑱便遣兵迎接競来牽馬馬既畏船不上敦發伏掩之盡殪此後實有饋餉及亡命奔瑱者猶謂敦之設詐逆遣扞擊並不敢受以故糧援既絶人懐危懼敦於是分兵抄掠以充資費恐瑱等知其糧少乃於營内多為土聚覆之以米集諸營軍士人各持囊遣官司部分若欲給糧者因召側近村民陽有所訪問令於營外遥見随即遣之瑱等聞之良以為實乃據守要險欲曠日以老敦師敦又増修營壘造廬舍亦以持久湘羅之間遂廢農業瑱等無如之何權景宣為西魏車騎大將軍鎮荆州與開府楊忠拔安陸随郡久之随州城民吴士英等殺刺史黄道玉因聚為冦景宣以英等小賊可以計取之若聲其罪恐同惡者衆迺與英書偽稱道玉凶暴歸功英等英果信之遂相率而至景宣執而戮之散其黨與陸騰為驃騎大將軍江州刺史陵州木籠獠恃險麄獷每行抄刼詔騰討之獠既因山為城攻之未可拔騰遂於城下多設聲樂及諸雜伎示無戰心諸賊果棄其兵仗或攜妻子臨城觀樂騰知其無備密令衆軍俱上諸賊惶懼不知所為遂縱兵討擊盡破之斬首一萬級俘獲五千人後為隆州總管鐵山獠抄斷内江路使驛不通騰乃進軍討之欲至鐵山乃偽還師賊不以為虞遂不守備騰出其不意擊之應時奔潰一日下其三城斬其魁帥俘獲三千人招納降附者三萬户韋孝寛為驃騎大將軍鎮玉壁建徳之後武帝志在平齊孝寛乃上疏陳三䇿其第一䇿曰臣在邉積年頗見間隙不因際㑹難以成功是以往嵗出軍徒有勞費功績不立由失機㑹何者長淮之南舊為沃土陳氏以破亡餘燼猶能一舉平之齊人歴年赴救喪敗而反内離外叛計盡力窮𫝊不云乎讎有釁焉不可失也今大軍若出軹關方軌而進兼與陳共為掎角并令廣州義旅出自三鵶又募山南驍鋭沿河而下復遣北山稽胡絶其并晉之路凡此諸軍仍令各募關河之外勁勇之士厚其爵賞使為前驅岳動川移雷駭電激百道俱進並趨虜庭必當望騎奔潰所向摧殄一戎大定實在此機其第二䇿曰若國家更為後圖未即大舉宜與陳人分其兵勢三鵶以北萬春以南廣事屯田預為貯積選其驍悍立為部伍彼既東南有敵戎馬相持我出竒兵破其疆埸彼若興師赴援我則堅壁清野待其去逺還復出師常以邉外之軍引其腹心之衆我無宿舂之費彼有奔命之勞一二年中必自離叛且齊氏昬暴政出多門鬻獄賣官唯利是視荒淫酒色賊害忠良闔境嗷然不勝其弊以此而觀覆亡可待然後乗間電掃事等摧枯其第三䇿曰竊以大周土宇跨據關河蓄席卷之威持建瓴之勢太祖受天明命與物更新是以二紀之中大功克舉南清江漢西戡巴蜀塞表無虞河内底定唯彼趙魏獨為榛梗者正以有事二方未遑東畧遂使漳滏遊魂更存餘晷昔勾踐亡吴尚期十載武王取亂猶煩再舉今若更存遵養且復相時臣謂宜還崇隣好申其盟約安人和衆通商恵工蓄鋭養威觀釁而動斯則長䇿逺馭坐自兼并也書奏武帝遣小司冦淮南公元衛開府伊婁謙等重幣聘齊爾後遂大舉再駕而定山東卒如孝寛䇿後為徐州總管尉遲迥反於相州詔孝寛伐之以小司冦叱列長文為相州刺史先令赴鄴孝寛續進至朝歌迥遣大都督賀蘭貴齎書候孝寛孝寛留貴與語以察之疑其有變遂稱疾徐行又遣人至相州求醫藥密以伺之既到湯隂逢長文奔還孝寛兄子魏郡守藝又棄郡南走孝寛審知其狀乃馳還所經橋道皆令毁撤驛馬悉擁以自随又勒驛將曰蜀公將至可多備餚酒及芻粟以待之迥果遣儀同梁子康將數百騎追孝寛驛司供設豐厚所經之處皆輒停留繇是不及時或勸孝寛以為京雒虚弱素無守備河陽城内舊有鮮卑八百人家並在鄴見孝寛輕来謀欲應迥孝寛知之遂密造東京官司詐稱遣行分人詣雒受賜既至雒陽並留不遣因此離觧其謀不成齊王憲武帝建德五年為前鋒東伐憲守雀鼠谷帝親圍晉州憲進兵尅洪洞永安二城更圖進取齊人焚橋守險軍不得進遂屯於永安齊主聞晉州見圍乃將兵十萬自来援之時柱國陳王純屯千里徑大將軍永昌公椿屯雞栖原大將軍宇文盛守汾水關並受憲節度憲密謂椿曰兵者詭道去留不定見機而作不得遵常汝今為營不須張幕可伐柏為菴示有形勢令兵去之後賊猶致疑也齊主分軍萬人向千里徑㑹被勅追還率兵夜返齊人果謂柏菴為帳幕不疑軍退翌日始悟李雄領左後軍從太子西征吐谷渾雄率歩騎二千督軍糧於洮河為賊所持數日雄患之遂與偽和虜備稍觧縱竒兵擊破之賜奴婢百口封一子為侯隋宇文弼初仕後周為侯莫陳昶監軍率兵擊突厥弼謂昶曰黠虜之勢来如激矢去如絶絃若欲追躡良為難及宜選精騎直趨祁連之西賊若收軍必自蓼泉之北此地險隘兼復下濕度其人馬三日方度緩轡追討何慮不及彼勞我逸破之必矣若邀此路真上䇿也昶不能用之西取合黎大軍行遲虜已出逹奚長孺初仕後周為左前軍勇猛中大夫與烏丸軌圍陳將吴明徹於吕梁陳遣驍將劉景率勁勇七千来為聲援軌令長孺逆拒之長孺於是取車輪數百繫以大石流之清水連轂相次以待景軍景至船艦礙輪不得進長孺乃縱竒兵水陸俱發大破之俘數千人及獲吴明徹以功進位大將軍張威初仕後周為京兆尹髙祖輔政時王謙作亂髙祖以威為行軍總管從元帥梁睿擊之軍次通谷謙守將李三王擁勁兵拒守睿以威為先鋒三王初閉壘不戰威令人詈侮以激怒之三王果出陣威令壯士奮擊三王軍潰大兵繼至於是擒斬四千餘人進至開逺謙將趙儼衆十萬連營三十里威鑿山通道自西嶺攻其背儼遂敗走追至成都與謙大戰威將中軍及謙平進位上柱國于仲文初為後周大將軍尉遲迥之亂仲文大破迥將檀讓軍進攻梁郡迥守將李子寛遯走初仲文在蓼堤諸將皆曰軍自逺来士馬疲弊不可決勝仲文令三軍趣食列陣大戰既而破賊諸將皆請曰前兵疲不可交戰竟而尅勝其計安在仲文笑曰吾所部將士皆山東人果於速進不宜持久乗勢擊之所以制勝諸將皆以為非所及也迥將席毗羅衆十萬屯於沛縣將攻徐州其妻子在金郷仲文遣人詐為毗羅使者謂金郷城主徐善浄曰檀讓明日午時到金鄉將宣蜀公令賞賜將士金鄉人謂為信然皆喜仲文簡精兵偽建迥旗幟倍道而進善浄望見仲文軍且至以為檀讓乃出迎謁仲文執之遂取金郷諸將多勸屠之仲文曰此城是毗羅起兵之地當寛其妻子其兵可自歸如即屠之彼望絶矣衆皆稱善於是毗羅恃衆来薄官軍仲文背城結陣去軍數里設伏於麻田中兩陣纔合伏兵發俱曵柴鼔噪塵埃漲天毗羅軍大潰仲文乗之賊皆投洙水而死水為之不流獲檀讓檻送京師河南悉平毗羅匿滎陽人家執斬之𫝊首闕下宇文忻為後周豫州總管從韋孝寛討尉遲迥迥背城結陣與官軍大戰官軍不利時鄴城士女觀戰者數萬人忻與髙熲李詢等謀曰事急矣當以權道破之於是擊所觀者大囂而走轉相騰籍聲如雷霆乃𫝊呼曰賊敗矣衆軍復振齊力急擊之迥軍大敗而走梁睿為益州總管髙祖開皇初突厥方彊恐為邉患乃陳鎮守之䇿十餘事上書奏之曰竊以戎狄作患其来久矣防遏之道自古為難所以周無上算漢收下䇿以其倏来忽往雲屯霧散彊則騁其犯塞弱又不可盡除故也今皇祚肇興宇内寧一唯有突厥種類尚為邉梗此臣所以廢寢與食寤寐思之昔匈奴未平去病辭宅先零尚在充國自劾臣才非古烈而志追昔士謹條安置北邉城鎮烽候及人馬糧貯戰守事意如别謹并圖上呈伏惟裁覽髙祖嘉歎久之答以厚意王長述為信州總管開皇初獻平陳之計修營戰艦為上流之師髙祖善其能頻加賞勞下書曰每覽髙䇿深相嘉歎命將之日遂以公為元帥也髙熲為左領軍大將軍開皇初髙祖嘗問熲取陳之策熲曰江北地寒田收差晩江南土熱水田早熟量彼收穫之際徴士馬聲言掩襲彼必屯兵禦守足得廢其農時彼既聚兵我便解甲再三若此賊以為常後便集兵彼必不信猶豫之頃我乃濟師登陸而戰兵氣益倍又江南土薄舍多竹茅所有儲積皆非地窖密遣行人因風縱火待彼修立復更燒之不出數年自可財力俱盡帝行其䇿由是陳人益弊長孫晟為左勲衛車騎將軍開皇中䕶突厥染干於朔州時别部有達頭恐怖又大集兵詔晟部領降人為秦州行軍總管取晉王節度出討達頭與王相抗晟進䇿曰突厥飲泉易可行毒因取諸藥毒水上流達頭人畜飲之多死於是大驚曰天雨惡水其亡我乎因夜遁晟追之斬首千餘級俘百餘人畜數千頭賀若弼為吴郡總管開皇中大舉伐陳以弼為行軍總管先是弼畫七䇿其一請廣陵頓兵一萬畨代往来陳人初見設備後以為常及大兵南伐不復疑也其二使兵緣江射獵人馬喧噪及兵臨江東人以為獵也其三以老馬多買陳船而匿之買弊船五六十艘於瀆内陳人覘以為國内無備其四積葦荻於揚子津其髙蔽艦及大兵將渡乃卒通瀆於江其五塗戰船以黄與枯荻同色故陳人不預覺之其六先取京口倉儲速據白土岡置兵死地故一戰而克其七臣奉勅兵以義舉及平京口俘五千餘人便悉給糧勞遣付其勅書命别道宣喻是以大兵渡江無不草偃十七日之間南至林邑東至滄海西至象林皆悉平楊素開皇中為伐陳行軍元帥時陳南康内史吕仲肅屯岐亭正據江峡於北岸鑿巖綴鐵鏁三條横截上流以遏戰船素與大將軍劉仁恩登陸俱發先攻其栅仲肅軍夜潰素徐去其鏁仲肅復據荆門之延洲素遣巴蛋卒千人乗五牙四艘以拍竿破賊千餘艦遂大破之俘甲士二千餘人仲肅僅以身免仁夀中又以左僕射為行軍元帥出擊突厥于雲中連破之突厥退走率騎追躡至夜而及之將復戰恐賊越逸令其騎稍後於是親將兩騎并降突厥二人與虜並行不之覺也候其頓舍未定趣後騎掩擊大破之白屯磧南無復虜庭矣来䕶兒為上開府開皇中髙智慧據江南反以子總管統兵随楊素討之賊據浙江岸為營周亘百餘里船艦初渡江鼓噪而進言於素曰吴人輕鋭利在舟檝必死之賊難與争鋒公且嚴陣以待之勿與接刄請假竒兵數千潛渡江掩破其壁使退無所歸進不得戰此韓信破趙之䇿也素以為然䕶兒乃以輕船數百置登江岸襲破其營因縱火煙焰漲天賊顧火而懼素因是一鼓破之智慧將逃於海䕶兒追至閩中餘黨皆平何稠為員外散騎侍郎開皇末桂州俚李光仕聚衆為亂詔稠召募討之師次衡嶺遣使者諭其渠帥洞主莫崇解兵降欵桂州長史王文同鏁崇以詣稠所稠詐宣言曰州縣不能綏養致使邉民擾叛非崇之罪也乃命釋之引崇共坐并從者四人為設酒食而遣之崇大悦歸洞不設備稠至五更掩入其洞悉發俚兵以臨餘賊象州逆帥杜條遼羅州逆帥龎靖等相繼降欵周法尚仁夀中為行軍總管討遂州叛獠平之巂州烏蠻反攻陷州城詔令法尚便道擊之軍將至賊棄州城散走山谷間法尚捕不能得於是遣使慰諭假以官號偽班師日行二十里軍再舍潛遣人覘之知其首領盡歸栅聚飲相賀法尚選歩騎數千人襲擊破之獲其渠帥數千人虜男女萬餘口捷聞賜奴婢百口物三百段蜀馬二十匹後為定襄太守大業初煬帝幸榆州法尚朝於行宫内史令元夀言於帝曰漢武出塞旌旗千里今御營之外請分為二十四軍日别遣一軍發相去三十里旗幟相望鐘鼓相聞首尾連注千里不絶此亦出師之盛者也法尚曰不然兵亘千里動間山川卒有不虞四分五裂腹心有事首尾未知道阻且長難以相救雖是故事此乃取敗之道也帝不懌曰卿意以為如何法尚曰結為方陣四面外拒六宫及百姓家口並住其間若有變起當頭分抗内引竒兵出外奮擊車為壁壘重設勾陣此與據城理亦何異若戰而捷抽騎追奔或戰不利屯營自守臣謂牢固萬全之䇿也帝曰善楊義臣仁夀末為朔州總管煬帝即位漢王謀作亂并州時代州總管李景為漢王將喬鍾葵所圍詔義臣救之義臣自以兵少悉取軍中牛驢得數千頭復令兵數百人人持一皷潛驅之澗谷出其不意義臣晡後復與鍾葵戰兵初合命驅牛驢者疾進一時鳴鼓塵埃漲天鍾葵軍不知以為伏兵發因而大潰縱擊破之李子雄為驃騎大將軍後坐事免煬帝初漢王諒亂帝疑幽州總管竇抗有貳拜子雄為冀州刺史馳至幽州止𫝊舎召募得千餘人抗恃素貴不時相見子雄遣人諭之後二日抗從鐵騎二千来詣子雄所子雄伏甲請與相見因擒抗遂發幽州兵歩騎三萬自井陘以討諒時諒遣大將軍劉建畧地燕趙正攻井陘相遇於抱犢山下力戰大破之史祥為右衛將軍煬帝即位漢王諒發兵作亂遣其將綦良自滏口徇黎陽塞白馬津余公理自大行下河内帝以祥為行軍總管軍於河隂久不得濟祥謂軍吏曰余公理輕而無謀才用素不足稱又新得志謂其衆可恃恃衆必驕且河北人先不習兵所謂擁市人而戰以吾籌之不足圖也乃令軍中脩攻具公理使諒知之果屯兵於河陽内城以備祥祥於是艤船南岸公理聚甲以當之祥乃率精鋭於下流潛渡公理率衆拒之祥至沮水兩軍相對公理未成列祥縱擊大破之東趣黎陽討綦良等良列陣以待兵未接良棄軍而走於是其衆大潰祥縱兵乗之殺萬餘人唐李仲文武德初為行軍總管擊劉武周于雀鼠谷為其將黄子英所擒因詐危篤守者不以為意子英牧豎本關中人思欲西歸隂結仲文仲文因謂守者曰吾瘡臭君幸一扶我出營洗之守者數人扶之至水向牧豎以子英駿馬數匹来詣仲文所仲文洗訖將入營人又扶之仲文曰媿君相扶詐若不自安者牧豎因曰公可乗馬去仲文佯為不敢牧豎固請之仲文與牧豎各乗一馬將至營門遂鞭馬而遁營中大囂賊競追之行數十里迷逆失道追人且至於是棄馬竄林莽間㑹暝追騎各去仲文遂得還西京上表請罪髙祖慰諭之復令帥師以拒賊盛彦師武徳初為行軍總管與史萬寳鎮宜陽以拒東㓂及李密之叛將出山南萬寳以密威名不敢拒謂彦師曰李密驍賊也又輔以王伯當決䇿而叛其下兵士思欲東歸若非計出萬全則不為也兵在死地殆不可當彦師笑曰請以數千之衆邀之必梟其首萬寳曰計將安出對曰軍法尚詐不可為公説之便領衆踰熊耳山南傍道而止令弓弩者夹路乗髙刀楯者伏於溪谷令曰待賊半渡一時齊發弓弩據髙縱矢刀楯即亂出薄之或問之曰聞李密欲向雒州而公入山何也彦師曰密聲言往雒實走襄城就張善相耳必當出人不意若賊入谷口我自後追之山路險隘無所展力一夫殿後必不能制今吾先得入谷擒之必矣李密既度陕州以為餘不足慮遂擁衆徐行果踰山南渡彦師擊之密衆首尾斷絶不得相救遂斬李密追擒伯當以功封葛國公拜武衛大將軍羅士信武德中為新安道行軍總管及大軍至雒陽士信以兵圍王世充千金堡其中人大罵之士信怒夜遣百餘人將嬰兒數十從南而来至於堡下詐言從東都来投羅總管也因令嬰兒啼噪既而佯驚曰此千金堡吾輩錯矣忽然而去堡中謂是東都逃人遽出兵追之士信伏五千人於路側候其開門奮擊遂破之無遺類任瓌武德中為河南道安撫大使至宋州屬徐圓朗據兖州反曹戴諸州咸應之副使栁濬勸瓌退保汴州瓌笑曰栁公何怯也老將居邉甚久自當有計非公所知圓朗俄又引兵將圍虞城瓌遣崔樞張公謹自鄢陵領諸州豪右質子百餘人守虞城以拒之濬又諫曰樞與公謹並世充之將及諸州質子父兄皆反此必為變瓌不答樞至則分配質子並與土人合隊居守賊既稍近質子有叛者樞因斬其隊帥城中人懼曰質子父兄悉来為賊賊之子弟安可城守樞因縱諸縣各殺質子梟首于門外遣使報瓌瓌陽怒曰遣諸將去者欲招慰耳何罪而殺之退謂濬曰固知崔樞辦之既遣縣人殺賊質子寃隙已大吾何患焉樞果拒却圓朗事平遷徐州刺史楊武通武德三年為將軍擊王行本于河東乃掘圍以逼之武通謂掘圍者曰若見賊但退走以避之行本果出兵掘圍者走行本奔趨之武通率騎横出擊之賊衆潰因縱兵乗勝殺七百人自此兵勢漸弱河間王孝恭武德三年以趙郡王為䕫州總管時蕭銑據江陵孝恭獻平銑之䇿髙祖嘉納令大造舟楫教習水戰以圖銑孝恭召巴蜀首領子弟量材授用致之左右外示引擢而實以為質也尋授荆湘道行軍總管統水陸十二總管發自硖州進軍江陵攻其水城尅之所得船散於江中諸將皆曰虜得賊船當藉其用何為棄之無乃資賊邪孝恭曰不然蕭銑偽境南極嶺外東至洞庭若攻城未拔援兵復到我則内外受敵進退不可雖有舟楫何所用之今銑緣江州鎮忽見船舸亂下必知銑敗未敢進兵来去覘伺動淹旬月因緩其救吾尅之必矣銑救兵至巴陵見船被江而下果狐疑不敢輕進既内外阻絶銑於是出降李靖為開府武德三年蕭銑據荆州髙祖授靖行軍總管兼攝河間王孝恭行軍長史髙祖以孝恭未更戎旅三軍之任一以委靖其年八月集兵於䕫州銑以時屬秋潦江水汎漲三峡路險必謂靖不能進遂休兵不設備九月靖乃率師而進將下峡諸將皆請停兵以待水退靖曰兵貴神速機不可失今兵始集銑尚未知若乗水漲之勢倏然至城下所謂疾雷不及掩耳此兵家上䇿縱彼知我倉卒徵兵無以應敵此必成擒也孝恭從之進兵至夷陵銑將文士𢎞率精卒數萬屯清江孝恭欲擊之靖曰士𢎞銑之健將士卒驍勇今新失荆門盡兵出戰此是救敗之師恐不可當也宜且泊南岸勿與争鋒待其氣衰然後奮擊破之必矣孝恭不從留靖守營率師與賊合戰孝恭果敗奔于南岸賊委舟大掠人皆負重靖見其軍亂縱兵擊破之獲其舟艦四百餘艘斬首及溺水計萬餘人輔公祏之反也詔趙郡王孝恭東討勅追靖入朝面受方畧令靖副趙郡王其東道副元帥李勣任瓌等並受節度公祏遣水軍總管馮恵亮率舟師三萬頓于當塗栅斷江口築城又遣陸軍總管陳正通有衆二萬據當塗南路亦造栅自固並蓄力養鋭以抗大軍孝恭乃集諸將㑹議皆云恵亮正通並握彊兵為不戰之計城栅既固卒不可攻請直指丹陽丹陽既破恵亮等可不戰而擒孝恭欲從其議靖曰公祏精兵雖在水陸二道然其自統之兵亦是勁勇恵亮等城栅尚不可攻公祏既保石頭豈應易拔若我師至丹陽留停旬月進則石頭未平退則歸路已絶此便腹背受敵恐非萬全之計然恵亮正通皆是百戰餘賊必不憚於野戰止為公祏立計令其持重今若攻其城栅乃是出其不意滅賊之機唯在此舉靖乃率李勣黄君漢等水陸俱進苦戰破之恵亮等奔走殺傷及溺死者萬餘人靖率輕兵先至丹陽公祏餘衆雖多不戰擁兵東走並相次擒獲龎玉武德中為梁州總管遇巴州山獠相聚為亂玉進兵討之梟其魁帥王多馨餘黨皆散移兵集州其苻陽白石二縣反獠據嶮自守兵不得進軍糧且盡其二縣熟獠與反者先為州里互有親戚皆言賊不可擊請玉班師玉徐云知之揚言曰秋榖將熟百姓不得收刈一切供軍非平賊吾不返也聞者大懼因謂曰大軍不去食吾榖盡吾徒皆餓死矣何得措手耶其中壯士入賊營各求其所親與相要結斬賊渠帥衆遂分散玉随而捕之無往不尅髙祖嘉之賜以名馬劉世讓武德中為廣州總管將之任髙祖問以備邉之䇿世讓答曰突厥南冦徒以馬邑為其中路爾如臣所計請於崞城置一智勇之將多儲金帛有来降者厚賞賜之數出竒兵畧其城下芟踐禾稼敗其生業不出嵗餘彼當無食馬邑不足圖也髙祖曰非公無任此者乃使馳驛往經畧之劉蘭為夏州都督府司馬武德中梁師都以突厥之師頓於城下蘭偃旗卧鼓不與之争鋒賊徒宵遁蘭追擊破之柴紹為右驍衛大將軍武徳中吐谷渾與黨項俱来㓂邉命紹討之虜據髙臨下射紹軍中矢下如雨紹乃遣人彈胡琵琶二女子對舞虜異之駐弓矢而相與聚觀紹見虜陣不整密使精騎自後擊之虜大潰斬首五百餘級薛萬均為幽州禆將武德中竇建德率衆十萬来㓂范陽總管羅藝逆拒之萬均謂藝曰衆寡不敵今若出門百戰百敗當以計取之可令羸兵弱馬阻水背城為陣以誘之觀賊之勢必渡水交兵萬均請精騎百人伏於城側待其半渡擊之破賊必矣藝從其言建德果引軍渡水萬均邀擊大破之楊恭仁為梁州總管武徳中突厥頡利可汗率衆數萬奄至州境恭仁随方備禦多設疑兵頡利懼而退走屬𤓰州刺史賀拔威擁兵作亂朝廷憚逺未遑征討恭仁乃募驍勇倍道兼進賊不虞兵至之速尅其二城恭仁悉放俘虜賊衆感其寛恵遂相率執威而降張長遜武德初為五原太守封范陽郡公時髙祖遣使者髙世静致重幣於始畢可汗路經長遜所適㑹可汗死世静奉詔停留不進處羅可汗聞而大怒將入冦騎已至河長遜令世静出塞申國厚禮處羅乃意解解兵而去册府元龜卷三百六十五
