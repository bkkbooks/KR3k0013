body:
  text: 冊府元龜卷二十八宋王欽若等撰帝王部奉先傳曰慎終追逺民徳歸厚矣孟子曰君子不以天下儉其親故王者富有四海風化兆庻莫不推因心之孝奉如在之靈聚昭穆而舉禘祫祖有功而宗有徳申嚴配於上帝飭廟貌於都邑脩奉陵寢追述徽烈潔粢豐盛作樂陳舞順時序而薦享率諸侯以助祭于以見滌濯静嘉肅雍顯相烝烝之義罄乃明馨穰穰之福降於肹蠁至於親行祭弔祗載神主緬懐里社益樹枌榆斯又尊尊之至昭明䇿書者也有虞氏禘黄帝而郊嚳祖顓頊而宗堯禘郊祖廟謂祭禮以配食也有虞以前尚徳故配用有徳者臣欽若等按史記舜名重華父曰瞽瞍瞽瞍父曰蟜牛蟜牛父曰句望句望父曰敬康敬康父曰窮蟬窮蟬父曰帝顓頊顓頊父曰昌意昌意父曰黄帝自黄帝至舜凡九世也夏后氏禘黄帝而郊鯀祖顓頊而宗禹夏氏以下稍用其姓代之臣欽若等按史記禹之父曰鯀鯀之父曰顓頊殷人禘嚳而郊𠖇祖契而宗湯臣欽若按史記帝嚳生契為殷祖自契之至𡨕六世也𡨕為司𤣥勤其官事死於水中殷人郊之太甲脩徳諸侯咸歸故稱太宗太戊時殷復興諸侯歸之故稱中宗祖庚時嘉武丁之以祥雉為徳立其廟為髙宗遂作髙宗肜日及訓武丁脩政行徳天下咸驩殷道復興故商頌那祀髙祖成湯也烈祖祀中宗也𤣥鳥殷武祀髙宗也長發大禘也周文王之祭也事死者如事生思死者如不欲生忌日必哀稱諱如見親祀之忠也如見親之所愛思死者如不欲生言思親之深也武王立追尊古公為太王季歴為王季九年上祭於畢一作十一年畢文王墓也東觀兵至於孟津為文王木主載以車中軍武王自稱太子發言奉文王以伐不敢自専也十一年王既克殷一作十三年柴於上帝祈於社設奠於牧室遂率天下諸侯執豆籩逡奔走追王太王亶父王季歴文王昌不以卑臨尊也上治祖禰尊尊也下治子孫親親也旁治昆弟合族以食序以昭穆别之以禮義人道竭矣成王即位周公相王王道大洽制禮作樂禘嚳而郊稷祖文王而宗武王郊祀后稷以配天宗祀文王於明堂以配上帝四海之内各以其職来助祭故周頌思文后稷配天也天作祀先王先公也清廟祀文王也我將祀文王於明堂也執競祀武王也豐年秋冬報也有瞽始作樂而合乎祖也潜季冬薦魚春獻鮪也雝禘太祖也大雅生民尊祖也后稷生於姜嫄文武之功起於后稷故推以配天焉其詩曰后稷肇祀庻無罪悔以迄于今王既即政以朝享之禮告於祖廟故周頌閔予小子嗣王朝於廟也烈文諸侯助祭也載見諸侯始見於武王廟也訪落嗣王謀於廟也王既在新邑烝祭嵗文王騂牛一武王騂牛一王命作冊逸祝冊惟告周公其後王賓殺禋咸格王入太室祼漢髙帝五年二月追尊先媪曰昭靈夫人十年八月令諸侯王皆立太上皇廟於國都恵帝以髙祖十二年五月即位上髙祖尊號曰髙皇帝令郡國諸侯王立髙祖廟是年帝為東朝長樂宫及間徃數蹕煩民作複道方築武庫南奉常叔孫通奏事因請間曰陛下何自築複道髙帝寢衣冠月出㳺髙廟子孫奈何乗宗廟道上行哉帝懼曰急壊之通曰人主無過舉今已作百姓皆知之矣願陛下為原廟渭北衣冠月出㳺之益廣宗廟大孝之本帝乃詔有司立原廟帝常出游離宫叔孫通曰古者有春嘗果方今櫻桃熟可獻願陛下出因取櫻桃獻宗廟帝許之文帝以髙后八年閠九月即位前元年十月辛亥見於髙廟景帝元年十月詔曰盖聞古者祖有功宗有徳制禮樂各有繇歌者所以發徳也舞者所以明功也髙廟酎奏武徳文始五行之舞武徳髙祖所作也文始舜舞也五行周舞也武徳者其舞人執干戚文始舞執羽籥五行舞冠冕衣服法五行色也孝恵廟酎奏文始五行之舞孝文皇帝臨天下通闗梁不異逺方除誹謗去肉刑賞賜長老收恤孤獨以遂羣生減嗜欲不受獻罪人不孥不誅亡罪不私其利也除宫刑出羙人重絶人之世也朕既不敏弗能勝識此皆上世之所不及而孝文皇帝親行之徳厚侔天地利澤施四海靡不獲福明象乎日月而廟樂不稱朕甚懼焉其為孝文皇帝廟為昭徳之舞以明休徳然後祖宗之功徳施於萬世永永無窮朕甚嘉之其與丞相列侯中二千石禮官具禮儀奏丞相臣嘉等奏曰申屠嘉也陛下永思孝道立昭徳之舞以明孝文皇帝之盛徳皆臣等愚所不及臣謹議曰功莫大於髙皇帝徳莫盛於孝文皇帝髙皇帝廟宜為帝者太祖之廟孝文皇帝廟宜為帝者太宗之廟天子宜世世獻祖宗之廟郡國諸侯宜各為孝文皇帝立太宗之廟諸侯王列侯使者侍祠天子所獻祖宗之廟請布天下制曰可武帝元封五年三月祀髙祖於明堂以配上帝太始四年三月壬午祀髙祖於明堂以配上帝癸巳祀孝景皇帝於明堂昭帝以後元二年二月即位謁髙廟七月尊趙媫伃為皇太后起雲陵媫妤先𦵏于雲陽就雲陽為起雲陵始元元年夏又為太后起園廟雲陽陵三年秋募民徙雲陵四年六月徙三輔富人雲陵賜錢戸十萬元鳯四年正月丁亥帝加元服見於髙廟宣帝以元平元年七月即位謁髙廟本始元年六月詔曰故皇太子在湖未有號謚湖縣名太子死於湖因即𦵏焉歲時祠其議諡置園邑有司奏請禮為人後者為之子也故降其父母不得祭尊祖之義也陛下為孝昭帝後承祖宗之祀制禮不踰閑謹行視孝昭帝所為故皇太子起位在湖史良娣冡在慱望苑北親史皇孫位在廣明郭北諡法曰諡者行之迹也愚以為親諡宜曰悼皇母曰悼后比諸侯王園置奉邑三百家故皇太子諡曰戾置奉邑二百家史良娣曰戾夫人置守冡三十家園置長丞周衛奉守如法以湖閿鄉邪里聚為戾園長安白亭東為戾后園廣明成鄉為悼園皆改葬焉二年六月庚午尊孝武廟為世宗廟武帝廵狩所幸之郡國皆立廟焉初帝欲褒先帝詔丞相御史曰朕以𦕈身蒙遺徳承聖業奉宗廟夙夜惟念孝武皇帝躬仁義厲威武北征匈奴單于逺遁南平氐羌昆明甌駱兩越東定濊貉朝鮮廓地斥境立郡縣百蠻率服欵塞自至珍貢陳於宗廟恊音律造樂歌薦上帝封太山立明堂改正朔易服色明開聖緒尊賢顯功興滅繼絶褒周後備天地之禮廣道術之路上天報貺符瑞並應寳鼎出白麟獲海効鉅魚神人並見山稱萬歲功徳茂盛不能盡宣而廟樂未稱朕甚悼焉其與列侯二千石博士議有司遂請尊孝武帝廟為世祖廟奏盛徳文始五行之舞天子世世獻以明盛德武帝廵狩所幸郡國凡四十九皆立廟如髙祖太宗焉元康元年五月立皇考廟益奉明園戸為奉明縣廣明縣也時有司復言禮父為士子為天子祭以天子悼園宜稱尊號曰皇考立廟因園為寢以時薦享焉益奉明園民滿千六百家以為奉明縣尊戾夫人曰戾后置園奉邑及益戾園各滿三百家又改𦵏衛后追諡曰思后置園邑三百家長丞周衛奉守焉元帝以黄龍元年十二月癸巳即位謁髙廟建昭五年六月庚申復戾園七月庚子復太上皇寢園原廟髙祖已自有廟在長安城中恵帝更于渭北作廟謂之原廟昭靈后武安王昭哀后衛思后園昭靈后髙祖母也武安王髙祖兄也哀后髙祖妹也衛后戾太子母也竟寕元年三月癸未復孝恵皇帝寢廟園孝文太后孝昭太后寢園初永光四年九月罷衛思后園及戾園十月罷祖宗廟在郡國者諸陵分屬三輔五年十二月毁太上皇孝恵皇帝寢廟園建昭元年冬罷孝文太后孝昭太后寢園先是貢禹奏言古者天子七廟今孝恵孝景廟親盡宜毁及郡國廟不應占禮宜正定天子是其議未及施行而禹卒其後丞相韋𤣥成等議太上孝恵廟皆親盡宜毁奏可明年𤣥成復言孝文太后孝昭太后寢祠園宜如禮勿復修奏可後歲餘帝寢疾夢祖宗譴罷郡國廟帝少弟楚孝王亦夢焉至是帝疾連年遂盡復諸所罷寢廟園皆修祀如故是年五月帝又毁太上皇孝恵孝景廟並太后廟成帝以竟寕元年六月即位謁髙廟河平元年九月復太上皇寢廟園是時愽士平當上書臣聞孔子曰如有王者必世而後仁世三十年三十年之間道徳和洽制禮興樂災害不成祸亂不作今聖漢受命而王繼體承業二百餘年孜孜不怠政令清矣然風俗未和隂陽未調災害數見意者大本有不立與何徳化休徵不應之乆也祸福不虛必有因而至者焉宜深迹其道而務脩其本昔者帝堯南面而治先克明峻徳以親九族而化及萬國孝經曰天地之性人為貴人之行莫大於孝孝莫大於嚴父嚴父莫大于配天則周公其人也夫孝子善述人之志周公既成文王之業而制禮作樂修嚴父配天之事知文王不欲以子臨父故推而序之上極于后稷以配天此聖人之徳亡以加于孝也髙皇帝聖徳受命有天下尊太上皇猶周文武之追王太王王季也此漢之始祖後嗣所宜尊奉以廣盛徳孝之至也書云王稽古建功立事可以永年傳於亡窮太誓之辭帝納其言故下詔復太上皇寢廟園哀帝以綏和二年四月丙午即位謁髙廟尊定陶恭王為恭皇建平二年四月詔曰漢家之制推親親以顯尊尊定陶恭皇之號不宜復稱定陶立恭皇廟于京師六月庚申帝太后丁氏喪詔曰朕聞夫婦一體詩云榖則異室死則同穴王風大車昔季武子成寢杜氏之殯在西階下請合𦵏而許之事見禮記檀弓篇附𦵏之禮自周興焉孔子曰合𦵏非古自周公以来未之有改也郁郁乎文哉吾從周孝子事亡如事存帝太后宜起陵恭皇之園遂𦵏定陶平帝以元夀二年九月辛酉即位謁髙廟元始四年正月郊祭髙祖以配天宗祀孝文以配上帝夏尊孝宣廟為中宗孝元廟為髙宗世世獻祭五年正月祫祭明堂諸侯王二十八人列侯百二十人宗室子九百餘人徴助祭後漢光武建武元年六月即位八月癸丑祀髙祖太宗世宗於懐宫二年正月立髙廟於雒陽四時祫祀髙祖為太祖文帝為太宗武帝為世宗如舊餘帝四時春以正月夏以四月秋以七月及臘一歲五祀光武都雒陽只合祖廟以下至平帝為一廟藏十一帝主于其中元帝次第八光武第九元帝為祖廟後遵而不改是年以皇祖皇考墓為昌陵置陵令守視後改為章陵因以舂陵為章陵縣三年正月辛巳立親廟雒陽祀父南頓君以上至舂陵節侯四廟二月己未以赤眉降祠髙廟受傳國璽十月壬申立舂陵祠園廟五年七月丁丑幸沛祠髙祖原廟詔修復西京園陵六年四月丙子幸長安始謁髙廟遂有事十一陵十年正月脩理長安髙廟八月幸長安祠髙祖遂有事十一陵十一年二月己酉幸南陽還幸長陵祠園陵十五年四月戊申以太牢告祠宗廟十七年十月甲申幸長陵脩園廟祠又為舂陵宗室起祠堂十八年三月壬午祠髙廟遂有事十一陵十月庚辰幸宜城還祠章陵立考侯康侯廟北園陵置嗇夫嗇夫職本主知賦役多少平其差品園陵置之知祭祀徴求諸事詔零陵郡奉祠節侯戴侯廟以四時及臘歲五祀焉置嗇夫佐吏各一人十九年正月庚子追尊孝宣皇帝曰中宗始祠昭帝元帝於太廟成帝哀帝平帝於長安舂陵節侯以下四世於章陵時五官中郎將張純與太僕朱浮奏議禮為人子事太宗降其私親禮之設施不授之與自得之異意當除今親廟四孝宣皇帝以孫後祖為父立廟於奉明曰皇考廟獨羣臣侍祠事下公卿博士議郎大司徒涉等議宜立平帝哀帝成帝元帝廟奉所代今親廟父祖以上親入廟兄弟以下使有司祠宜為南頓君立皇考廟祭上至舂陵節侯羣臣奉祠時議有異不著上可渉等議詔曰以宗廟處所未定且祫祭髙廟其成哀平且祠祭長安故髙廟其南陽舂陵歲時各且因故園廟祭祠園廟去太守治所逺者在所令長行太守事侍祠惟孝宣帝有功德其上尊號曰中宗於是雒陽髙廟四時加祭孝宣孝元五帝其西廟成哀平三帝主四時祭於故髙廟東廟京兆尹侍祠冠衣車服如太常祠陵廟之禮南頓君以上至節侯皆就園廟南頓君稱皇考廟鉅鹿都尉稱皇祖考廟鬰林太守稱皇曾祖考廟節侯稱皇髙祖考廟在所郡縣侍祠二十二年閏正月幸長安祠髙廟遂有事十一陵二十六年詔張純定祫禘之禮遂以合祭髙廟為常中元元年四月幸長安祀長陵十月甲申使司空告祠髙廟曰髙皇帝與羣臣約非劉氏不王吕太后賊害三趙専王吕氏頼社稷之靈禄産伏誅天命幾墜危朝更安吕太后不宜配食髙廟同祧至尊薄太后母德慈仁孝文皇帝賢明臨國子孫頼福延祚至今其上薄太后尊號曰髙皇后配食地祗遷吕太后廟主於園四時上祭明帝即位以光武皇帝撥亂中興更為起廟上尊號曰世祖廟蔡邕表志孝明立世祖廟以明再受命祖有功之義後嗣遵儉不復改立皆藏主其中聖明所制一王之法也自執事之吏下至學士莫能知其所以兩廟之意誠宜具録本事建武乙未元和丙寅詔書下宗廟儀及齋令宜入郊祀志以為典式以元帝於光武為穆故雖非宗不毁也後遂為常永平元年正月帝率公卿以下朝於原陵如元㑹儀二年正月辛未宗祀光武皇帝於明堂帝及公卿列侯始服冠冕衣裳玉佩絇屨以行事漢官儀曰天子冠通天諸侯王冠逺遊三公諸侯冠進賢三梁卿大夫尚書二千石博士冠兩梁二千石以下至小吏冠一梁天子公卿特進諸侯祀天地明堂皆冠平冕天子十二旒三公九卿諸侯十其纓如其綬色𤣥衣纁裳周禮曰王祀昊天上帝則服大裘而冕祀五帝亦如之三禮圖曰冕以三十升布染而為之廣八寸長尺六寸前圓後方前下後髙有俛伏之形故謂之冕欲人之位彌髙而心彌下故以名焉董巴輿服志曰顯宗初服冕衣裳以祀天地衣裳以𤣥上纁下乗輿備文日月星辰十二章三公諸侯用山龍九章卿以下用華虫七章皆五色采乗輿刺繡公卿以下皆織成陳留襄邑獻之徐廣輿服注曰漢明帝案古禮備其服章天子郊廟衣皂上絳下前一幅後四幅衣畫而裳繡禮記曰古之君子必佩玉君子于玉比徳焉天子佩屦白玉諸侯佩山𤣥玉大夫佩水蒼玉世子佩瑜玉周禮人掌王赤舄青絇鄭𤣥注曰赤舄為冕服之舄也絇屦鼻頭以青絲飾之三禮圖曰屦複下曰舄其色各随裳色十月甲子西廵狩幸長安祠髙廟遂有事於十一陵三年十月烝祭光武廟冬祭日烝衆也冬物畢成可祭者衆初奏文始五行武徳之舞甲子車駕從皇太后幸章陵十一年閠四月甲午南廵狩幸南陽祠章陵十五年三月辛邜幸大梁至定陶祠定陶恭王陵十七年正月當謁元陵夜夢先帝太后如平生歡既寤悲不能寐即案歴明旦日吉遂率百官及故客上陵其日降甘露於陵樹帝令百官采取以薦㑹畢帝從席前伏御牀視太后鏡奩中物感動悲泣令易脂澤裝具左右皆泣莫能仰視焉是年公卿百官以帝威徳懐逺祥物顯應乃並集朝堂奉觴上夀帝曰其敬舉觴太常擇吉日䇿告宗廟和帝以章和二年二月壬辰即位三月辛酉有司上奏孝章皇帝崇𢎞洪業徳化普洽垂意黎民留念稼穡文加殊俗武暢方表咸惟人面無思不服巍巍蕩蕩莫與比隆周頌曰於穆清廟肅雍顯相請上尊廟曰肅宗其進武徳之舞制曰可四月丙子謁髙廟丁丑謁世祖廟永元十年十一月癸邜祠髙廟遂有事十一陵九年追諡帝母梁貴人曰恭懐皇后貴人父竦為章徳竇后所䧟坐誅貴人娣妹以憂卒后養帝為己子及后喪未及𦵏而梁貴人姊嬺上書陳貴人枉殁之狀太尉張酺司徒劉方司空張奮上奏依光武黜吕太后故事貶太后尊號不宜合𦵏先帝百官亦多上言者帝手詔曰竇氏雖不遵法度而太后常自減損朕奉事十年深惟大義禮臣子無貶尊上之文恩不忍離義不忍虧案前世上官太后亦無降黜其勿復議於是合𦵏敬陵帝以貴人酷殁歛𦵏禮闕乃改殯於承光宫上尊諡曰恭懐皇后追服喪制百官縞素與姊大貴人俱𦵏西陵義比敬園以竇后配食章帝恭懐后别就陵寢祭之十五年十月戊申幸章陵祠舊宅園廟殤帝延平元年三月甲申尊孝和皇帝廟曰穆宗安帝以延平元年八月癸丑即位九月庚子謁髙廟辛丑謁光武廟永初元年三月𦵏清河孝王王名慶安帝之父也贈龍旂虎賁建光元年三月有司上言清河孝王至徳淳懿載育明聖承奉丕祚為郊廟主漢興髙皇帝尊父為太上皇宣帝號父為皇考序昭穆置園邑太宗之義舊章不忘宜上尊號曰孝徳皇皇妣左氏曰孝徳皇后祖妣宋貴人追諡曰敬徳皇后乃告祠髙廟使司徒持節與大鴻臚奉䇿書璽綬清河追上尊號又遣中常侍奉太牢祠典䕶禮儀侍中劉珍等及宗室列侯皆徃會事尊陵曰甘陵廟曰昭廟置令丞設兵車周衛比章陵復以廣川益清河園敬徳後陵曰敬北陵延光三年二月丙子東廵狩丁丑告陳留太守祠南頓君光武皇帝於濟陽辛邜幸太山癸巳告祠二祖六宗二祖四宗前已觧詔又孝元髙宗孝章肅宗四月乙丑還宫假於祖禰十月行幸長安四月乙未祠髙廟遂有事十一陵遣使者祠太上皇於萬年四年三月庚申幸宛帝不豫令大將軍耿寳行太尉事祠章陵園廟告長沙零陵太守祠定王節侯鬰林府君是月安帝晏駕初帝以纔害大臣廢太子及是無上宗之奏後自建武以来無毁者故遂常祭因以其陵號稱恭宗也順帝以延光四年十一月丁巳即位壬申謁髙廟癸酉謁光武廟永建二年六月己酉追尊諡皇妣李氏為恭愍皇后𦵏於恭北陵先是李氏為閻太后鴆殺瘞在雒陽城北帝初不知莫敢以聞及太后𦵏左右白之帝感寤發哀親到瘞所更以禮殯之尊諡于䇿書金匱蔵于世祖廟三年七月丁酉茂陵園寢災帝縞素避正殿辛亥使太常王龔持節告祠茂陵永和元年正月己巳宗祀明堂二年十月行幸長安十一月丙午祠髙廟丁未遂有事十一陵漢安元年正月癸巳宗祀明堂冲帝以建康元年八月即位九月有司奏孝順皇帝𢎞秉聖哲龍興統業稽乾則古欽奉鴻烈寛裕宴宴宣恩以極躬自菲薄以崇𤣥黙遺詔貽約顧念萬國衣無制新玩好不飾塋陵損狹不起寢廟遵履前制敬勑有司孝經曰愛敬盡於事親而徳教加于百姓詩云敬慎威儀惟民之則臣請上尊號曰敬宗廟天子世世獻奉藏主祫祭進武徳之舞如祖宗故事奏可質帝以永嘉元年正月丁巳即位甲申謁髙廟乙酉謁光武廟桓帝以本初元年閏六月庚寅以河間孝王孫即位七月辛巳謁髙廟光武廟時梁太后攝政以冲質二帝皆不享夀用殤帝故事就陵寢祭凡祠廟命三公分祭之九月戊戌追尊皇祖河間孝王曰孝穆皇夫人趙氏曰孝穆皇后廟曰清廟陵曰樂成陵皇考蠡吾侯曰孝崇皇廟曰烈廟陵曰慱陵尊帝母匽氏為博園貴人臣欽若等曰事具帝王尊親門皆置令丞使司徒持節奉䇿書璽綬祠以太牢建和二年四月丙子封帝弟顧為平原王奉孝崇皇祀元嘉二年四月甲寅孝崇皇后匽氏喪以帝弟平原王石為喪主歛以東園畫梓夀器玉匣飯含之具禮儀制度比恭懐皇后使司徒持節大長秋奉弔祠賻錢四十萬布四萬疋中謁者僕射典䕶喪事侍御史䕶大駕鹵簿詔安平王豹河間王建渤海王悝長社益陽二長公主與諸國侯三百里内者及中二千石二千石令長相皆㑹𦵏將作大匠復土繕廟合𦵏博陵延熹元年六月丙戌分中山置博陵郡以奉孝崇皇園陵博陵城今在瀛州博野縣也後徙安平二年十月行幸長安甲午祠髙廟十一月庚子有事十一陵靈帝建寕元年正月庚子即位二月辛酉上孝桓皇帝尊號廟曰威宗庚午謁髙廟辛未謁世祖廟閠二月甲午追尊皇祖淑為孝元皇夫人夏氏為孝元皇后陵曰敦陵廟曰靖廟皇考萇為孝仁皇尊夫人董氏為慎園貴人陵曰慎陵廟曰夐廟皆置令丞使司徒持節之河間奉䇿書璽綬祠以太牢常以歲時遣中常侍持節之河間奉祠是時京都四時所祭髙廟五主世祖廟七主少帝三陵追尊后三陵凡牲用十八太牢殷祭之歲出祖廟主皆合于髙廟如毁廟三太牢皆有副牲故髙廟三主親毁之後亦俱殷祭之歲奉祠自建武以來闗西諸陵以轉久逺但特牲祠帝每長安謁諸陵乃太牢祠雒自陽諸陵至靈帝皆以晦望二十四氣伏臈及四時祠廟日上飯太常送用物園令食監典省其親陵所宫人随鼓漏理被枕具甾水陳嚴具獻帝興平元年加元服有司奏立長秋宫詔曰朕禀受不𢎞遭值禍亂未能紹先以光故典皇母前薨未卜宅兆禮章有闕中心如結三歲之慼盖不言吉且湏其後初帝母王羙人為何皇后所殺於是有詔乃奏追尊王羙人為靈懐皇后改𦵏文昭陵儀比敬恭二陵初平中相國董卓左中郎將蔡邕等以和帝已下功徳無殊而有過差不應為宗及餘非宗者追尊三后皆奏毁之四時所祭髙廟一祖二宗及近帝四凡十一帝册府元龜卷二十八
