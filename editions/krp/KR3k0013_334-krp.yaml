body:
  text: 册府元龜卷三百三十四宋王欽若等撰宰輔部譴讓夫委質事君陳力就列有官守焉有言責焉其或因職事之墮廢被公朝之訶譴寘於司敗時惟國典矧乃輔弼之任左右厥辟宣翼統紀表正倫類百工承式庻民爾瞻茍有任非其人心或附下懐情不盡越職舉事屬灾異之著見或水旱之作沴爕治攸繫措置失宜至或論議非當謗咎交集賦歛無藝蠧弊隨生繇是賜以璽書責以吏事乃有賜車馬以就第上印綬而歸田其致詰之深或引决為謝者葢有之矣若乃秉心無苟本乎納忠守道居常因以蒙毁者亦奚愧焉漢蕭何髙帝時為相國為民請曰長安地陿上林中多空地棄願令民得入田毋收藁為獸食稾禾租也言人恣田之不收其稾税也帝大怒曰相國多受賈人財物為請吾苑乃下何廷尉械繫之數日王衞尉侍衞尉名字史失之也侍謂侍天子也前問曰相國胡大罪陛下繫之暴也事具縂録部救患門上不懌是日使使持節赦出何張蒼文帝時為丞相任人為中候蒼有所保舉而其人為中候之官大為姦利帝以為讓遂病免衛綰景帝時為丞相三嵗武帝立建元中丞相以景帝病時諸官囚多坐不辜者而君不任職天子不親政則丞相當理之而綰不申其寃免之石慶武帝時為丞相元封四年關東流民二百萬口無名數者四十萬名數若今户籍公卿議欲請徙流民于邊以適之適讀曰讁帝以為慶老謹不能與其議與讀曰豫乃賜丞相告歸而案御史大夫以下議為請者慶慙不任職上書曰臣幸得待罪丞相疲駑無以輔治城郭倉廩空虚民多流亡罪當伏質上不忍致法願歸丞相侯印乞骸骨歸避賢者路帝報曰間者河水滔陸滔漫也髙平曰陸漫音莫干切泛濫十餘郡隄防勤勞弗能陻塞陻音因朕甚憂之是故廵方州東方諸州禮嵩嶽通八神以合宣房自言致禮中岳通敬八神合宣房者於宣房塞决河也濟淮江歴山濵海濵海者循海涯而行也濵音賔又音頻問百年民所疾苦惟吏多私徴求無已惟思也已止也去者便居者擾故為流民法以禁重賦言百姓去其本土者則免於吏徴求在舊居者則見役調故為流人設法又禁吏之重賦也一曰去者為吏出使居人以自便也乃者封泰山皇天嘉貺神物並見貺賜也見顯示也朕力荅氣應未能承意言自脩以報瑞應恐未承順上天意是以切比閭里知吏姦邪比校考也音頴寢切委任有司然則官曠民愁盗賊公行曠空也人不舉職是空其官往年覲明堂赦殊死無禁錮咸自新與更始今流民愈多計文不改郡上計文書自文飾不改正也君不䋲責長吏而請以興徙四十萬口揺蕩百姓蕩動也孤兒㓜年未滿十嵗無罪而坐率㓜年無罪坐為父兄所率而并徙朕失望焉今君上書言倉庫城郭不充實民多貧盗賊衆請入粟為庻人慶自以居相位而不能理請入栗已罪退為庻人夫懐知民貧而請益賦懐此心動危之而辭位揺動百姓使其危急而自欲去也欲安歸難乎以此危難之事欲歸之於何人君其反室若此自謂理當然者可還家慶素質見詔報反室自以為得許欲上印綬掾史以為見責甚深而終以反室者醜惡之辭也或勸慶宜引决令自殺慶甚懼不知所出遂復起視事慶乃以謹得終田蚡武帝時為丞相薦人或起家至二千石權移主上帝廼曰君除吏盡未吾亦欲除吏凡言除者除去故官就新官嘗請考工地益宅帝怒曰遂取武庫是後廼退考工少府之屬官也主作器械上責其請故謂之曰何不遂取武庫蚡乃止暴勝之武帝時為御史大夫戾太子軍敗南奔覆盎城門得出長安城南出東頭第一門曰覆盎城門一號社門會夜司直田仁部閉城門坐令太子得出城丞相劉屈氂欲斬仁勝之謂丞相曰司直吏二千石當先請柰何擅斬之丞相釋仁釋放也帝聞而大怒下吏責問御史大夫曰司直縱反者丞相斬之法也大夫何以擅止之勝之惶恐自殺蕭望之宣帝時為御史大夫司農中丞耿夀昌奏設常平倉帝善之望之非夀昌丞相丙吉年老上重焉望之又奏言百姓或乏因盗賊未止二千石多材下不任職三公非其人則三光為之不明今首嵗日月少光首嵗嵗之初首謂正月也咎在臣等上以望之意輕宰相言三公非其人又言咎在臣等是其意毁丞相乃下侍中建章衛尉金安上光禄勲楊惲御史中丞王忠并詰問望之三人同共問之望之免冠置對天子繇是不說繇讀與由同説讀曰悦後丞相司直緐延夀緐音婆奏侍中謁者良使承制詔望之望之再拜已良與望之言望之不起因故下手伏地而言也而謂御史曰良禮不備故事丞相病明日御史大夫輒問病朝奏事會庭中差居丞相後丞相謝大夫少進揖今丞相數病望之不問病會庭中與丞相鈞禮不為前後之差也時議事不合意望之曰使年寧能父我耶寧能與吾父母同邪知御史有令不得擅使望之多使守史自給車馬之杜陵䕶視家事自給車馬者令其自乗私車馬也少史冠法冠為妻先引少史曹史之下者也先引謂尊車前又使賣買私所附益凡十萬三千使其史為望之家有所賣買而史以其錢增益之用潤望之也案望之大臣通經術居九卿之右本朝所仰右上也至不奉法自脩倨慢不遜攘攘古讓字受所監臧二百五十以上二百五十以上者當時律令坐罪之次若今律條言一尺以上一匹以上矣請逮捕繫治帝於是䇿望之曰有司奏君責使者禮遇丞相亡禮廉聲不聞敖慢不遜敖讀曰傲亡以扶政帥先百僚君不深思陷於茲穢朕不忍致君于理使光禄勲惲䇿詔左遷君為太子太傅授印其上故印使者使者即謂楊惲也命惲授太𫝊印而望之以大夫印上於惲便道之官君其秉道明孝正直是與帥意亡諐靡有後言黄霸宣帝時為丞相樂陵侯史髙以外屬舊恩侍中貴重霸薦髙可太尉天子使尚書詔問䩗太尉官罷乆矣丞相兼之所以偃武興文也如國家不虞邊境有事如或也左右之臣皆將率也夫宣明教化通逹幽隠使獄無寃刑邑無盗賊君之職也將相之官朕之任焉言欲拜將相事在其朕也侍中樂陵侯髙帷幄近臣朕之所自親具知其材質君何越職而舉之尚書令受丞相對霸免冠謝罪數日乃决乃得免罪自是後不敢復有所請于定國元帝初為丞相貢禹為御史大夫帝始即位關東連年被灾害民流入關言事者歸咎于大臣言事者上書陳事也帝於是數以朝日引見丞相御史五日以聼朝故云朝日也入受詔條責以職事曰惡吏負賊妄意良民賊發不得恐負其殿故妄疑善人致其罪也至亡辜死或盗賊發吏不亟追而反繫亡家亟急也不急追賊反禁繫失物之家後不敢復告以故寖廣寖漸也民多寃結州郡不理連上書者交於闕廷二千石選舉不實是以在位多不任職謂令長丞尉民田有灾害吏不肯除收趣其租以故重困趣讀曰促重音值用切關東流民饑寒疾疫已詔吏轉漕虚倉廪開府藏相賑救賜寒者衣至春猶恐不贍贍足也今丞相御史將欲何施以塞此咎塞補也悉意條狀陳朕過失悉盡也定國上書謝罪永光元年春霜夏寒日青亡光上復以詔條責曰侍郎有從東方來者言民父子相棄以遭饑饉不能相飬丞相御史案事之吏匿不言邪將從東方來者加增之也何以錯謬至是錯眩也謬違也謂吏及東方人言不相同也欲知其實方今年嵗未可預知也即有水旱其憂不細公卿有可以防其未然救其已然者不各以誠對言能防救與否宜各以實對母有所諱定國惶恐上書自劾歸侯印乞骸骨帝報曰君相朕躬不敢怠息息謂自休息萬方之事大錄于君大録縂錄也能無過者其惟聖人方今承周秦之敝俗化陵夷言頽替也民寡禮誼隂陽不調灾咎之發不為一端而作聖人推類以記不敢專也况於非聖者乎非聖人者言常人日夜惟思所以未能盡明所以所由也言何由致此災經曰萬方有罪罪在朕躬君雖在職何必顓焉顓與專同不專繇君也其勉察郡國守相郡牧非其人者毋令乆賊民永執綱紀務悉聰明彊食慎疾悉盡也定國遂稱病篤固辭帝乃賜安車駟馬黄金六十斤罷就第王商成帝時為丞相帝元舅大司馬大將軍王鳯顓權行多驕僭商論議不能平會日有蝕之大中大夫蜀郡張匡上書言商作威作福從外制中取必於上言意欲望行必果之於是左將軍史丹等奏請詔謁者召商詣若盧詔獄若盧獄名屬少府黄門北寺帝素重商知匡言多險制曰勿治鳯固争之於是制詔御史葢丞相以徳輔翼國家典領百寮協和萬國為職任莫重焉今樂昌侯商為丞相出入五年未聞忠言嘉謀而有不忠執左道之辜䧟于大辟前商女弟内行不修奴賊殺人疑商教使為商重臣故抑而不窮今或言商不以自悔而反怨懟朕甚傷之惟商與先帝有外親未忍致于理其赦商罪使者收丞相印綬薛宣成帝時代張禹為丞相時帝好儒雅而宣經術又淺帝亦輕焉會廣漢郡盗賊羣起丞相御史遣掾吏逐捕不能克帝乃拜河東都尉趙䕶為廣漢太守以軍法從事數月斬其渠帥鄭躬渠大也降者數千人廼平會卭成太后終喪事倉卒吏賦歛以趍辦二日邛成太后宣帝王皇后也趍讀曰趣倉卒曰趍其後帝聞之以過丞相御史遂册免宣曰君為丞相出入六年忠孝之行率先百僚朕無聞焉不聞其有此行也朕既不明變異數見嵗比不登倉廩空虗比頻也登成也年榖不成百姓饑饉流離道路疾疫死者以萬數人至相食盗賊並興羣職曠廢是朕之不徳而股肱不良也廼者廣漢羣盗横决殘賊吏民朕惻然傷之數以問君君對輒不如其實西州鬲絶㡬不為郡鬲與隔同㡬矩依切三輔賦歛無度酷吏並緣為姦並歩浪切侵擾百姓詔君案驗復無欲得事實之意九卿以下咸承風㫖同時䧟于謾欺之辜咎繇君焉謾誑也音謾又音莫于切繇讀與由同有司法君領職觧嫚法謂據法以劾也觧讀曰懈嫚與慢同開謾欺之路傷薄風化無以帥示四方不忍致君于理其上丞相髙陽侯印綬罷歸尹志成帝時為御史大夫以河决館陶方畧疏濶帝切責之自殺翟方進成帝時為丞相綏和二年春熒惑守心議曹李尋奏記言應變之權君侯所自明往者數白三光垂象變動見端九年之中而日三食熒惑守心山川水泉反理視患元延中岷山摧壅江江水不流山地之鎮宜固而摧水逆流反於常理所以示人患也視讀曰示民人訛謡斥事感名斥事甘泉溢之事也有言溢者後果井水溢感名燕燕尾涎涎是也三者既效可謂寒心今提揚眉矢貫中提攝提星也揚眉楊芒角也矢枉矢也綏和元年正月枉矢從東南入北斗攝提與斗杓建寅貫攝也提中又云矢一星貫中者謂正直弧中狼奮角弓且張狼一星奮角者有芒角也狼芒角盗賊起天弓九星不欲明明猶張也兵起之象金歴庫土逆度庫在軫南金太白也歴武庫則兵起土鎮星也逆度逆行也輔湛沒火守舍北斗第四星旁一小星曰輔沉沒不見則天下之兵銷三十日為守舍謂日月所經宿舍也一曰火守舍熒惑守心湛亦曰沉萬嵗之期近慎朝暮萬嵗之期謂死也慎朝暮者言其事在朝夕上無惻怛濟世之功下無推讓避賢之效欲當大位為具臣以全身難矣具謂具位之臣無功與徳也大責日加安得但保斥逐之戮言其事重不但斥逐而已闔府三百餘人唯君侯擇其中與盡節轉凶三百餘人謂丞相之官屬也方進憂之不知所出會郎賁麗善為星賁姓也麗名也賁音肥言大臣宜當之帝廼召見方進還歸未及决帝遂賜册曰皇帝問丞相君有孔子之慮孟賁之勇朕嘉與君同心一意庶㡬有成惟君登位于今十年災害並臻民被饑餓加以疾疫溺死闗門牡開元延元年章門函谷門牡自亡失國守偹盗賊黨軰黨衆多吏民殘賊毆殺良民毆擊也音一口切斷獄嵗多前上書言事交錯道路懐姦朋黨相為隠蔽皆忘忠慮羣下洶洶更相嫉妬更工衡切其咎安在觀君之治無欲輔朕冨民便安元元之念間者郡國榖雖頗熟間謂近者以來百姓不足者尚衆前去城郭未能盡還夙夜未嘗忘焉朕惟往時之用與今一也謂財用也百寮用度各有數君不量多少一聴羣下言用度不足奏一切增賦税城郭堧及園田過更算馬牛羊一切權時堧城郭旁地也凡田入多益其税也百人為卒取一人所贍嘗為之月用二千使人直之謂之過更有牛馬羊頭數出税筭千輸二十也堧人緣切增益鹽鐡變更無常朕既不明隨奏許可後議者以為不便制詔下君君云賣酒醪後請止未盡月復奏議令賣酒醪朕誠怪君何持容容之計無忠固意容容隨衆上下也將何以輔朕帥道羣下而欲乆蒙顯尊之位豈不難哉蒙謂也傳曰髙而不危所以長守貴也欲退君位尚未忍君其熟念詳計塞絶姦源憂國如家務便百姓以輔朕朕既已改君其自思彊食慎職使尚書令賜君上尊酒十石養牛一君審處焉方進即日自殺漢儀注有天地大變天下大過皇帝使侍中持節乗四白馬賜上尊酒十斛牛一頭䇿告殃咎使者去半道丞相即上病使者還未白事尚書以丞相不起病聞孔光成帝時為御史大夫帝無繼嗣至親有同産弟中山孝王及同産弟子定陶王在帝議立嗣丞相翟方進等以定陶王宜為嗣光獨以中山王宜為嗣以議不中意左遷廷尉光後為丞相定陶王立是為哀帝帝祖母傅太后欲與成帝母稱尊號羣下多順㫖唯師丹與光持不可丹以罪免光自先帝時議繼嗣有持異之隙矣又重忤傅太后㫖重直用切繇是傅氏在位者與大司空朱博為表裏共毁譛光後數月遂䇿免光曰丞相者朕之股肱所以共承宗廟統理海内共讀曰恭輔朕之不逮以治天下也朕既不明灾異重仍仍頻也重直用切日月無光山摧河决五星失行是章朕之不徳而股肱之不良也君前為御史大夫輔翼先帝出入八年卒無忠言嘉謀今相朕出入三年憂國之風復無聞焉隂陽錯謬嵗比不登比頻也天下空虗百姓饑饉父子分㪚流離道路以十萬數然而百官羣職曠廢姦軌放縱盗賊並起或攻官寺殺長吏數以問君君無怵惕憂懼之意對毋能為言盗賊不能害是以羣卿大夫咸惰哉莫以為意咎繇君焉君秉社稷之重緫百寮之任上無以弼朕之闕下不能綏安百姓書不云乎毋曠庻官天工人其代之於虖於讀曰烏虖讀曰呼君其上丞相博山侯印綬罷歸何武成帝末為大司空與丞相翟方進多所舉奏號為煩碎不稱賢公因遣吏歸迎後母會哀帝即位吏恐道路有盗賊後母留止左右或譏武事親不篤左右為天子側近之臣哀帝亦欲改易大臣遂䇿免武曰君舉錯煩苛不合衆心錯置也音千故切孝聲不聞惡名流行無以率示四方其上大司空印綬罷歸就國師丹哀帝時為大司空初丹議帝母祖母定陶恭王后不合為共皇太后恭王既追尊為恭皇帝又議不宜立廟京師丹繇是寖不合帝意寖漸也會有上書言古者以龜貝為貨今以錢易之民以故貧宜可改幣帝以問丹丹對言可改章下有司議皆以為行錢以來乆難卒變易丹老人忘其前語後從公卿議又丹使吏書奏吏私寫其草丁傳子弟聞之使人上書告丹上封事行道人徧持其書帝以問將軍中朝臣皆對曰忠臣不顯諌大臣奏事不宜漏泄令吏民傳寫流聞四方臣不宻則失身宜下廷尉治事下廷尉廷尉劾丹大不敬遂䇿免丹曰夫三公者朕之腹心也輔善相過表率百寮和合天下者也朕既不明委政于公間者隂陽不調寒暑失時變異婁臻婁古屢字山摧地震河决泉涌流殺人民百姓流連無所歸心司空之職尤廢焉君在位出入三年未聞忠言嘉謀而反有朋黨相連不恭之名乃者以挺力田議改幣章示君挺音從鼎切引拔也謂持拔異力田之人優寵之也君内為朕建可改不疑共立此議也以君之言博考朝臣君乃希衆雷同外以為不便令觀聴者歸非於朕朕隠忍不宣為君受愆朕疾夫比周之徒比類昧切虚偽壊化浸以成俗故屢以書飭君飭與敕同㡬君省過求已㡬音兾省視也自求諸已不尤人也而反不受退有後言及君奏封事傳於道路布聞朝市言事者以為大臣不忠辜䧟重辟獲虛采名謗譏匈匈流于四方腹心如此謂疏者何殆謬於二人同心之利焉將何以率示羣下附親逺方朕惟君位尊任重慮不周宻懐諼迷國諼詐也音虗袁切進退違命反覆異言甚為君耻之非所以恭承天地永保國家之意以君嘗託傳位未忍考於理已詔有司赦君勿治其上大司空髙樂侯印綬罷歸王崇哀帝時為御史大夫數月是時成帝舅安成恭侯夫人放居寡共養長信宫放者夫人之名共音供坐呪詛下獄崇奏封事為放言放外家觧氏與崇為昏婚姻之家哀帝以崇為不忠誠䇿詔崇曰朕以君有累世之羙故踰列次謂自祖及父皆有名也在位以來忠誠憂國未聞所繇繇與由同由從也反懐詐諼之辭諼詐言也音虚爰切欲以攀救舊姻之家大逆之辜舉錯専恣錯置也不遵法度亡以示百寮左遷為大司農後漢侯霸光武時為司農薦前梁令閻揚素有譏議帝嫌之既見霸奏疑其有姦大怒賜霸璽書曰崇山幽都何可偶崇山南裔也幽都北裔也偶對也言將殺之不可得流徙也黄鉞一下無處所斧鉞以黄金飾之所以戮之欲以身試法耶將殺身以成仁耶使尚書馮勤奉䇿至司徒府勤還陳霸本意申釋帝意稍觧虞延明帝時為司徒會楚王英謀反隂氏欲中傷之使人私以楚謀告延延以英藩戚至親不然其言又欲辟幽州從事公孫𢎞以𢎞交通楚王而止並不奏聞及英事發覺詔書切讓延遂自殺鄭𢎞章帝時為太尉奏尚書張林阿附侍中竇憲而素行贓穢又上雒陽令楊光憲之賔客在官貪殘並不宜處位書奏吏與光故舊因以告之光報憲憲奏𢎞大臣漏泄宻事帝詰讓𢎞收上印綬𢎞自詣廷尉詔敇出之因乞骸骨歸未許卒司馬苞安帝時為太尉劉愷為司空元初二年五月甲戍詔曰朝廷不明政事失中災異不息憂心悼懼被蝗以來七年于茲而州郡隠匿裁言頃畆裁與纔同古字通今羣飛蔽天為害廣逺所言所見寧相副耶三司之職内外是監旣不聞奏又無舉正天灾至重欺罔􅖄大今方盛夏且復假貸以觀厥後假貸猶寛容也盛夏不可加刑罰故且寛容其務消救災眚安輯黎元吳陸遜大帝時為丞相時太子有不安之議遜懇陳適庻之分而遜外甥顧譚顧承姚信並以親附太子枉見流徙太子太傅吳粲坐數與遜交書下獄死帝累遣中使責讓遜遜憤恚卒梁何敬容為尚書令侍中叅掌機宻坐妾弟費慧明為導倉丞夜盗官米為禁司所執送領軍府時河東王譽為領軍將軍敬容以書觧慧明譽即封書以奏焉髙祖大怒付南司推劾御史中丞張綰奏敬容協私罔上合棄市刑詔特免職後魏廣陵王羽孝文時為太子太保錄尚書事言考課事帝詔曰雖考内未宣績已乆著故明堂月令載公卿大夫論考屬官居職區分著三公尚書三載殿最之義此之考内已為明矣但論考之事理在不輕問績之方應關朕聽輒爾輕發殊為躁也每考之義應在年終既云此年何得春初也今始惟夏且待至秋後領廷尉卿帝謂羽曰汝之淺薄固不足以况晉之巨源考之今世民斯下矣汝始為廷尉及初作尚書内外瞻望以吾有弟自往秋南斾之後近小人逺君子在公阿黨虧我皇憲出入無章動乖禮則計汝所行應在下下之第帝又謂羽曰汝既是宸極之弟而居樞端之任汝自在職以來功勤之績不聞於朝阿黨之音頻干朕聴汝之過失已備積於前不復能别叙今黜汝錄尚書廷尉但居特進太保隋髙熲為左僕射文帝素不平熲時上柱國王積以罪誅當推覈之際乃有宫禁中事云於熲處得之帝欲成熲之罪聞此大驚時上柱國賀若弼刑部尚書薛胄民部尚書斛律孝卿兵部尚書栁述等明熲無罪帝愈怒皆以之屬吏自是朝臣無敢言者熲竟坐免以公就第唐髙士廉為侍中太宗貞觀初在職嵗餘黄門侍郎王珪有宻奏附士廉以聞士廉寢而不言坐是獲譴出為安州大都督楊師道為中書令庻人承乾逆謀之洩也師道與長孫無忌房𤣥齡同按其獄師道假子趙節與承乾通謀師道㣲諷太宗兾活之繇是獲譴獄未竟不令視事後數日太宗謂侍臣曰師道任寄不輕無心體國翻溺情於假子豈可更居股肱之任於是拜吏部尚書裴寂為司空有沙門法雅怨望出妖言伏法寂辭相連坐免歸蒲州俄追入闕未㡬有狂人自稱信行寓居汾隂言多妖妄嘗謂寂家童曰裴公有天分于時信行已死寂監奴恭命以其言白寂寂惶懼不敢聞奏隂呼恭命殺所言者恭命縱令亡匿寂不之知寂遣恭命收納封邑得錢百餘萬因用而盡寂怒將遣人捕之恭命懼而上變太宗謂侍臣曰裴寂有死罪四焉位為三公與妖人言辭相渉罪一也事發之後乃負氣憤怒稱國家有天下是其所讓罪二也巫言有天分匿而不奏罪三也隂行誅殺以㓕口罪四也我殺之非無辭矣議者多言流配朕其從衆乎於是從交州蕭瑀為特進參預朝政瑀嘗請出家太宗謂曰甚知公素愛桑門今者不能違意瑀旋踵奏稱臣頃思量不能出家太宗以對羣臣吐言而取舍相違怒之瑀尋稱足疾時詣朝堂但不入見太宗謂侍臣曰瑀豈不得其所乎而自嫌如此遂降詔曰朕無聰明於元首期託徳於股肱思欲去偽歸真除澆反朴至於佛教非意所遵雖有國之常經固敝俗之虛誕何則求其道者未驗福於將來循其教者翻受辜於既往至若梁武窮心於釋氏簡文鋭意於法門傾帑藏以給僧祗殫人力以增塔廟及乎三淮沸浪五嶺騰烟假餘息於熊蹯引殘魂於雀鷇子孫覆亡而不暇社稷俄頃而為墟報施之徵何其謬也而前太子太保宋國公瑀踐覆車之餘軌襲亡國之遺風棄公就私未明𨼆顯之際身俗口道莫辨邪正之心循累葉之殃源祈一躬之福本上以違忤君主下則扇惑浮華往前朕謂張亮云卿能好佛何不出家瑀乃端然自應請先入道朕即許之㝷復不用一回一惑在於瞬息之間自可自否變於帷扆之内所謂乖棟梁之大體豈具瞻之量乎朕猶𨼆忍至今瑀尚全無悛改宜即去茲朝闕出牧小藩可商州刺史李義府髙宗龍朔三年四月除名長流巂州詔曰右丞相兼行殷王府長史河問郡公李義府緣茲小技累升顯地塵露之益未表於銓流公廉之譽有紊于彞典泄禁中之語鬻寵授之朝恩交占候之人輕朔望之哀禮蓄財黷貨實玷衣冠稔惡嫉賢載虧正道特以任使多年未忍加其重罰冝從遐棄以肅朝倫韋安石為尚書左僕射同中書門下三品睿宗景雲二年十月御承天門引安石及兵部尚書門下三品郭元振左御史大夫同中書門下三品竇懐貞侍中李日知兵部侍郎同中書門下三品平章事張説制責之曰自頃已來政教尤闕時或水旱人多困弊府庫益竭寮吏日滋僶俛政途罔然如失豈惟朕之薄徳固亦輔佐非材安石可尚書左僕射東都留守元振可吏部尚書懷貞可左御史大夫日知可户部尚書説可尚書左丞並停知政事張嘉貞𤣥宗開元十一年為中書令嘉貞弟嘉祐以黷貨聞嘉貞素服待罪不得入謁帝詔曰中書令張嘉貞備位宰臣夙承恩命不能勵其公節以訓私門其弟嘉祐頃緣奬授遷在清秩馮寵自肆黷貨有彰豈可仍踐台階儀刑百辟貶居藩守俾肅朝倫可幽州刺史杜暹李元紘同為相開元十七年六月制曰出納王言發揮綸翰宰相之任選衆惟賢撿校黄門侍郎同中書門下平章事杜暹中書侍郎同中書門下平章事李元紘等咸勵忠貞用登樞揆雖清以自牧而道則未𢎞不能同心戮力以祗帝載而乃肆懷相短以玷朝倫朕緣事醜股肱情惟𨼆蔽掩其惡而不率遂其過而彌彰將何以緝叙三光儀刑百辟冝回中禁俾列専城暹可荆州刺史元紘可曹州刺史姜公輔為諫議大夫同中書門下平章事從徳宗幸山南車駕至城固縣唐安公主薨帝之長女昭徳皇后所生性聰敏仁孝所鍾愛初詔尚韋宥未克禮㑹而遇播遷乃薨帝悼尤甚詔所司厚其葬禮公輔諫曰非乆復京城公主必須歸葬今於行路且冝從儉以濟軍士徳宗怒謂翰林學士陸贄曰唐安夭亡不欲此為塋壠且令造一塼塔功費甚微不合闗宰相論列姜公輔忽進章都無道理但欲指朕過失以自取名朕比擢㧞為腹心乃負朕如此贄對曰公輔官是諫議職居宰衡獻替固其職分本立輔臣置之左右朝夕納誨意在防微而輔弼之乃其所也陛下以造塔役費㣲小非宰相所論之事但問理之是非豈論事之大小若造塔為是役雖大而作之何傷若造塔為非費雖小而言者何罪帝又曰卿未㑹朕意朕以公輔材行共宰相都不相當在奉天時已欲罷免後因公輔辭退朕已面許㝷屬懐光背叛遂且因循容至山南公輔知朕必擬改官所以固論造塔賣直取名處此用心豈是良善朕所惆悵者只緣如此贄雖再三救䕶帝怒不已乃罷為左庻子鄭餘慶貞元十四年拜中書侍郎平章事餘慶通究六經深㫖奏對之際多以古義𫝊之善度支使于䪹毎奏事餘慶皆議可未幾䪹以罪貶時又嵗旱人饑徳宗與宰相議將賑給禁衛六軍事未行為中書主吏所洩餘慶貶郴州司馬後唐李琪仕梁為尚書左丞平章事與蕭頃同為宰相頃掎摭其咎㑹琪除吏是試攝名銜衆署之後改試為守為頃所奏未帝大怒將投荒裔而為趙巖張漢傑所援罷相為太子少保盧文紀為平章事從末帝親征太原謁陵畢休於仗舍顧文紀曰朕在藩邸時謂卿有相業獨排羣議用卿為輔弼不於此時傾竭留待何時又曰宰相安邊境撫四夷今石敬瑭負恩北胡市利卿不運畧為國銷禍致朕親征文紀再拜謝不敢對册府元龜卷三百三十四
