body:
  text: 册府元龜巻九百五十六宋王欽若等撰外臣部總序夫東方曰夷被髪而文身南方曰蠻雕題而交阯西方曰戎被髪而衣皮北方曰狄衣羽毛而穴居古者制夷蠻為要服制戎翟為荒服要服者貢荒服者王葢要荒皆王者之外二臣也其在上古簡册未造四夷之事湮滅㒺紀至於陶唐有山戎獫狁薫鬻之狄虞舜始請流共工于幽陵以變北狄放讙兠于崇山以變南蠻遷三苗于三危以變西戎殛鯀于羽山以變東夷命皋陶為士以掌猾夏之禁及禹定九州舜乃南撫交阯西放西戎析枝渠捜氐羌北發山戎息慎東長鳥夷夏太康失德夷人始畔是時夷有九種竹書紀年云夏后泄二十一年命犬夷白夷赤夷𤣥夷風夷陽夷后相二年征黄夷七年于夷來賔少康即位方夷來賔是也后相即位乃征畎夷七年然後賔少康已後夷人世服王化賔于王門獻其樂舞帝桀不道諸侯内侵畎夷入居邠岐之間商湯革命伐而定之至於仲丁藍夷作冦武丁即位征西戎鬼方而克之武乙衰弊東夷侵盛分遷淮岱漸居中土犬戎寇邊周古公亶父踰梁山而避於岐洎于王季遂伐西落鬼戎及始呼翳徒之戎皆克之文王為西伯又伐畎戎至武王伐紂𦍑夷㑹于牧野肅慎來獻定都酆鎬乃放逐戎夷涇洛之北後周公征管蔡遂定東夷洎穆王伐畎戎得白狼白鹿以歸自是荒服不至又云穆王西征畎戎獲其五王遂遷戎于太原是時周道衰弱徐夷僭號王命楚文王克之時楚又克荆蠻而服屬之懿王之時獫狁内侵厲王不道淮夷入寇蠻荆為讎宣王中興乃命將帥征蠻荆平淮夷伐獫狁城朔方而四夷賓焉幽王之亂畎戎復入居涇渭之間秦襄公伐平之平王東遷四夷交侵中國齊桓公攘之後山戎伐燕齊桓公走之襄王時戎翟犯雒邑東至衛境侵盜尤多晉文公修霸業乃興師伐之攘戎狄居于西河周雒之間號曰赤翟白翟是時秦晉自𤓰州遷陸渾戎于伊川遷九姓之戎于渭汭東及轘轅曰陰戎其後隴以西有緜諸畎戎狄獂邽冀之戎岐梁涇漆之北有義渠大荔烏氏昫衍之戎渭南有驪戎伊雒間有揚拒泉皐之戎穎首以西有蠻氏之戎晉北有林胡樓煩之戎燕北有東胡山戎而淮夷越遷瑯邪陵暴諸夏後晉悼公使魏絳和戎翟戎翟朝晉陰戎之種遂以滋廣與晉戍周後陸渾戎叛晉晉荀吳滅之楚靈王會申淮夷來盟自後楚遂執蠻氏盡囚之秦厲公滅大荔取其地楚悼王并蠻越有洞庭蒼梧之地趙襄子踰句注破戎翟以臨胡貉韓魏稍并伊雒陰戎滅之其遺脫者皆西走踰汧隴自是中國無戎寇惟餘義渠種焉後最為强盛屢為秦患秦昭王起兵滅之以其地置隴西北地上郡又伐楚掠取蠻夷為黔中郡築長城以距胡趙武靈王胡服習騎射破林胡樓煩自代並陰山下至高闕為塞置雲中雁門代郡其後燕有賢將秦開襲破東胡却地干里燕遂築長城自造陽至襄平以拒胡秦始皇滅六國驅羌戎出塞北却匈奴築長城渡河以陰山為塞散淮夷為民户畧定揚粤破西南夷通五尺道盡置吏焉洎諸侯叛秦中國擾亂匈奴得寛復稍渡河南與中國界於故塞楚將軍莊蹻王滇龍川令趙佗王南粤燕人滿王朝鮮漢初匈奴冐頓强盛悉復収秦所奪地遂侵燕代時漢方與項羽相距未暇禦邊乃棄西南夷而關蜀故徼約朝鮮為外臣保塞漢平定天下匈奴復寇馬邑踰句注攻太原至晉陽漢高帝親將兵往擊之遂約和親是後數背約盟侵盜代地孝惠高后時匈奴南粤數為邊患文帝時匈奴或入居河南地為寇漢兵擊走之復入朝那蕭關至彭陽漢遂發兵出塞即還不能有所殺匈奴日以驕歲入邊殺畧人民雲中遼東最盛而陸賈說南粤奉藩稱臣景帝時乃與匈奴通關市給遣之時時小入盜邊無大冦西羌研種亦求徙于狄道安固武帝即位初邊陲無警洎馬邑失䇿匈奴乃歲入盜邊于是天子尚威武勤逺畧命衛霍將兵深入大敗其衆匈奴逺遁幕南無王庭是時南誅兩越東抜濊貊朝鮮以為郡通西南夷䍧牱夜郎等為置吏通西域三十六國逐西羌渡河湟以其地置酒泉等郡隔絶胡羌相通之路又以公主妻烏孫以分匈奴西方之援國置䕶羌校尉以䕶先零等羌洎貳師不利漢始不復出兵昭帝時匈奴犯塞後漢兵破烏桓匈奴震恐遂不能出兵而西南夷氐人數叛皆破平之宣帝即位發五將軍兵十餘萬出塞討匈奴又䕶發烏孫兵從西方入以助漢兵匈奴逃遁死傷不可勝數自是衰耗日削洎五單于爭立君長多降漢甘露三年呼韓邪單于遂入朝于甘泉宫始置都䕶督察西域諸國而先零又冦金城皆討降之置金城屬國以處之自後賓服元帝時竟寧河平中匈奴單于再入朝哀帝即位烏孫大昆彌與單于共入朝時西域分為五十五國皆通貢獻王莽之亂蠻夷愁擾匈奴復入塞貊人冦邊粤嶲蠻夷自立為王西域怨叛與中國絶後漢建武初東夷高句驪濊貊倭韓萬里朝獻西域遣使内屬光武不許之而武陵蠻夷特盛侵冦州郡匈奴來獻復與烏桓冦鈔不絶二十三年南北二單于立南單于欵塞稱臣願為藩蔽漢嘉其意割并州北界以安之自是二虜相侵漢地晏然矣二十五年烏桓向化鮮卑始通驛使羣蠻乃平哀牢夷内屬然自後羣蠻西南夷種滋多叛服不一明帝永平初鮮卑歸附北匈奴復入寇盜又脅西域諸國寇河西漢兵遂取伊吾盧地置宜禾都尉復通西域于闐諸國並遣子入侍西域自絶六十五載乃復通焉章帝建初元年武陵澧中蠻畔擊降之元和初北匈奴衰耗逺引而去西域叛漢乃迎還戊己校尉留軍司馬班超於于闐綏集諸國和帝永元元年漢兵大破北單于而鮮卑轉據其地得匈奴遺種其族漸盛尤為邊患三年班超遂定西域至于海瀕通驛四萬里安帝永初元年西域背叛攻圍都䕶遂棄西域三年南單于叛烏桓鮮卑羣蠻為冦諸羌競起為患尤横自後或降或畔延光中復以班勇為西域長史通西域自建武至是後西域三絶三通順帝永建二年勇復降焉耆等十七國而烏孫葱嶺已西遂絶桓帝永壽元年南匈奴復畔與烏桓鮮卑寇邊擊降之永興已後西域浸以疎慢矣靈帝末天下大亂單于統數干騎與白波賊合寇河内鮮卑烏桓為冦尤甚魏太祖乃分塞下匈奴為五部徙居太原諸縣其西域大國朝貢畧如漢氏故事時烏桓鮮卑强盛後太祖乃破烏桓徙其餘種於中國明帝青龍中鮮卑種落離散邊陲差安雖時有寇鈔不能復相役屬矣景初中誅公孫淵始通東夷收樂浪帶方之郡海表謐然時西南卭笮則界于蜀南蠻交阯則界于吳皆時有叛服晉武帝受禪四夷入貢者二十三國塞外匈奴二萬餘落向化使與晉人雜居河西惠帝之後大為中國之患自是羌虜戎羯盜居内地建國僭號凡十有六國而南徼蠻夷宼鈔不絶宋齊至於梁陳與後魏北齊分據中夏蠻徼海夷則朝貢于南羌胡夷狄則賓屬於北種族國邑之號日以蕃滋服叛朝貢之事不可悉紀而漠北惟蠕蠕最為强盛後周突厥復强與吐谷渾數為邊患西域時通使聘隋混一南北與吐谷渾和親朝貢歲至時突厥二可汗爭立隋討達頭可汗而立啓民可汗因之和親北鄙以寧煬帝好兵勤逺西域至者三十餘國取吐渾地為郡縣高昌王突厥可汗西突厥處羅可汗皆詣闕貢獻高麗再征而服大業之末中國叛亂華人奔突厥者甚衆其族遂熾而西突厥亦跨有西域諸國唐高祖起兵突厥遣兵助平京城武德初突厥來貢未幾入宼并汾至于渭濱太宗與之盟而退時薛延陁漸雄于漠北貞觀中西突厥數易主西域諸國多叛之而内屬時又党項請降太宗命置崌奉巖逺四州以處之俄而吐蕃連羊同破吐谷渾党項白蘭諸羌率衆入宼松州遂約和親自是賓服未幾囘紇破薛延陁併其衆五年唐兵破突厥擒頡利可汗降者僅十萬置定襄雲中二都督府以統其部衆時塞北惟囘紇為雄太宗又置燕然等六府七州以統之九年討降吐谷渾十三年破高昌以其地置西州及安西都䕶府十四年虜焉耆王二十一年擒龜兹王西域震服高宗永徽元年擒車鼻可汗而突厥盡為封疆之臣置單于瀚海二都䕶府以統之二年擒西突厥賀魯分其種落置崑陵濛池二都䕶府以領之自是西域諸國皆通於中國六年囘紇遣兵助討高麗龍朔二年吐蕃滅吐谷渾咸亨已後吐蕃復畔宼邊掠有諸羌之地西䧟四鎮地方萬餘里調露元年突厥復畔則天長壽元年始大破吐蕃收四鎮之地乃於龜兹復置安西都䕶府以鎮之聖歴中突厥寇邊為害尤極久視元年又大破吐蕃吐蕃請和中宗初突厥愈强盛寇邊而吐蕃貢獻請和親睿宗即位乃以河西九曲地賜吐蕃以其地肥饒堪頓兵於是復畔明皇初突厥萬餘帳來降屢遣使朝獻吐蕃數寇邊境䧟𤓰州囘紇斷安西路開元十六年大破吐蕃二十四年又掩吐蕃不備而破之自是朝貢不至數為宼盜天寳末盡徵河隴朔方之兵入靖國難於是邠州之地盡為吐蕃所據肅宗在靈武與囘紇和親囘紇遣兵助國討逆由是朝貢不絶而劍南西川諸州陷於吐蕃代宗即位復徵囘紇兵討史朝義賊平令還廣德中吐蕃犯上都永㤗元年吐蕃囘紇吐谷渾党項入寇王畿囘紇復降請擊吐蕃破之自是吐蕃屢寇邊境雖頻破之而其勢寖盛十年囘紇寇太原德宗即位與囘紇和親歸吐蕃俘虜置和蕃使與之盟誓以紓邊難興元中吐蕃復寇陷鹽夏等州貞元三年又刦平凉之盟自是吐蕃侵軼寇掠尤甚邊無寧日五年以後漸為邊將所破然猶䧟北庭麟州順宗以後吐蕃請和至憲宗元和十三年復擾邊境穆宗即位與囘紇和親吐蕃復請盟於京城之西是後朝貢繼至武宗時囘紇黠戞斯犯東陘已北宣宗大中初囘紇破弱遂轉徙於磧西吐蕃宰相尚恐熱以泰原安樂等州并石門等七關欵塞僖宗光啟中契丹王習爾稍强盛時中原多故習爾遂役屬達靼奚室韋等諸部入宼其後為幽州劉守光所破十年不敢犯塞昭宗天祐四年宼雲中後唐武皇帝與之連和又吐渾數叛旋亦歸服達靼亦依於武皇時中原罹亂燕人多入於虜天祐末契丹阿保機遂建大號署百官為城郭梁祖建號契丹遣使求封册梁祖不許而其衆滋盛後唐莊宗時匈奴數為邊患吐渾微弱聚居蔚州界皆授中國官爵河西党項突厥吐蕃朝貢不絶明宗即位遣使修好於契丹時虜主德光始建年紀未幾復宼北鄙為邊兵所破數年不敢窺邊洎晉祖求援於契丹遂割幽朔雲應等州以賂之自是吐渾遂屬於契丹終高祖世畧無釁隙開運衰敝遂䧟京闕漢高祖初屢誅吐渾酋長其種遂衰契丹入宼邢州周太祖時契丹遣使貢獻未幾其國亂久絶南牧之意太祖又自陘州安國鎮至西凉府沿路三處置州以吐蕃首領為刺史以總之世宗顯德中親征關南復瀛莫雄霸等州留兵以戍守自是河朔無宼患然自唐武德後至五代侵犯邊境役屬諸蕃者惟突厥吐蕃等數族爾自餘蠻夷皆不能為邊患悉朝貢不絶若夫種類之起國邑之建風土之異職位之别承襲之次象譯之等盛衰叛服之狀交侵仇怨之迹至于欵塞内附遣使入貢交通好問臨涖盟載修建警備求請饟給助國討叛納質請朝遂和親之榮收互市之利膺封拜之典承隆寵之數以至材畧形貌德行伎藝及暴慢苛忍之性怨望奸偽之事咸列於逐門今但叙其歴代大畧以冠於篇云凡外臣部三十四門種族夫四裔者居中國之外禀一氣而生性别域殊未始滅絶天之覆露必將有以自唐虞而下見於書傳兩漢所紀最為詳悉然弱則卑伏而内附强則桀驁而難制遷徙霧舉居無城郭之處蕃滋星散布諸虚曠之野迭衰迭盛不可得而去者葢所以乖隔方隅扞蔽諸夏之為也是以古之聖人務於含養俾列要荒覊縻不絶勿使侵擾而已矧其保姓受氏分疆畫野亦有神明之逺裔不專主於怪誕參考類次披文而可見焉東方夷有九種曰畎夷于夷方夷黄夷白夷赤夷𤣥夷風夷陽夷故孔子欲居九夷也朝鮮衛王滿故燕人自始全燕時嘗畧屬真畨番音普寒切一作莫遼東有番汗縣戰國時燕國畧得此地漢興屬燕燕王盧綰反入匈奴滿亡命聚黨千餘人椎結讀曰槌髻蠻夷服而東走出塞度浿水稍役屬直番浿水在樂浪縣音普葢切朝鮮蠻夷及故燕齊亡在者王之燕齊之人亡居此地及直番朝鮮蠻夷皆屬滿也都王險地名臣欽若等按後漢書濊及沃沮句驪本皆朝鮮之地以渠帥為侯王元無族夫餘國本濊地也初北夷索離國王出行索或作槖音度雒切其侍兒於後􅗖身􅗖人鳴切王還欲殺之侍兒曰前見天上有氣大如雞子來降我因以有身王囚之後遂生男王令置于豕牢牢圏豕以口氣嘘之不死復置于馬蘭蘭即攔也馬亦如之王以為神乃聽母收養名曰東明東明長而善射王忌其猛復欲殺之東明奔走南至掩淲水今高麗中有善斯水疑此水是以弓擊水魚鱉皆聚浮水上東明乘之得度因至夫餘而王之焉高句驪亦作麗音離東夷相傳以為夫餘别種凡有五族有消奴部一作㳙奴絶奴部順奴部灌奴部桂婁部高驪五部一曰内部一名黄部即桂婁部也二曰北部一名後部即絶奴部也三曰東部一名左部即順奴部也四曰南部一名前部即灌奴部也五曰西部一名右部即消奴部也一說夫餘王嘗得河伯女因閉於室内為日所炤引身避之日影又逐既而有孕生一卵大如五升夫餘王棄之與犬犬不食與豕豕不食棄於路牛馬避之棄於野衆鳥以毛茹之王剖之不能破遂還其母母以物褁置煖處有一男破而出及長字之曰朱䝉朱䝉善射夫餘之臣謀殺之乃東走北至紇升骨城遂居焉號曰高句驪以高為氏水貊句驪别種依小水為居因名百濟本夫餘王之後有仇台者復為高麗所破以百家濟海因號百濟新羅本辰韓種也其國在高麗東南居漢時樂浪之地或稱斯羅其王本百濟人自海逃入新羅遂王其國一說本弁韓之苖裔也濊國南與高句麗接耆舊自謂與句麗同種馬韓古之辰國也韓有三種馬韓最大共立其種為辰王辰韓在馬韓之東其耆老自言秦之亡人避苦役適韓國馬韓割東界地與之其名國為邦號為弧賊為寇行酒為行觴相别為徙有似秦語故或名之為秦韓倭人在帶方東南大海之中自謂太伯之後昔夏少康之子封於㑹稽斷髪文身以避蛟龍之害今倭人好沉沒捕魚蛤文身亦以厭大魚水禽後為女王國夷洲及澶洲傳言秦始皇遣方士徐福將童男女數千人入海求蓬萊神仙不得徐福畏誅不敢還遂止此洲世世相承有數萬家人民挹婁肅慎之後裔也其國在不咸山北在夫餘東北千有餘里日本國者倭國之别種也以其國在日邊故以日本為名南越王尉佗者真定人姓趙氏秦時為南海龍川令二世時南海尉任囂死佗行南海尉事秦滅佗自立為南越武王閩越王無諸東越之别種及越東海王揺者其先皆越王句踐之後也姓騶氏騶一作駱秦已并天下皆廢為君長以其地為閩中郡諸侯叛秦無諸揺率越歸鄱陽令吳芮所謂鄱君者也漢五年復立無諸為閩越王王閩中故地都冶孝惠三年舉高帝時越功曰閩君揺功多乃立揺為東海王在吳郡東南海濱都東甌今之永寧世俗號為東甌王林邑國本漢時象林縣後漢末縣功曹姓區有子曰連殺令自立為王子孫相承其後王無嗣外孫范熊代立丹丹國隋時聞焉在夕夕羅磨羅國西北振州東南王姓刹利名尸陵伽扶南國其王本是女子字葉柳時有外國人混潰者先事神夢神賜之弓又教載舶入海混潰旦詣神祠得弓遂隨估人汎海至扶南外邑葉柳率衆禦之混潰舉弓葉柳懼遂降之於是混潰納以為妻而據其國後裔衰微子孫不紹其將范尋後世王扶南矣真臘國一云直臘隋時通焉在林邑西北本扶南之屬多摩長國唐顯慶中遣使朝貢其使云某王先祖骨利龍之子也骨利嘗得大鳥卵剖之得一女子容色殊妙因以為妻今王尸羅劬傭即其後也赤土國扶南之别種也其王姓瞿曇氏名富利多塞不知有國近逺稱其父釋王位出家為道傳位於富利多塞也朱江國其王姓刹氏名質多斯那自其祖漸已强盛至質多斯那遂兼扶南而有之長沙武陵蠻者槃瓠之後也始高辛氏有犬戎之宼帝患其侵暴而征伐不尅乃訪募天下有能得犬戎之將吳將軍頭者購黃金千鎰邑萬家又妻以少女時帝有畜狗其毛五采名曰槃瓠魏畧曰高辛氏有老婦居王室得耳疾挑之乃得物大如繭婦人盛瓠中覆之以槃俄頃化為犬其文五色因名曰槃瓠下令之後槃瓠遂啣人頭造闕下羣臣怪而眕之乃吳將軍首也眕候視也帝大喜而計槃瓠不可妻之以女又無封爵之道議欲有報而未知所宜女聞之以為帝皇下令不可違信因請行帝不得已乃以女配槃瓠槃瓠得女負而走入南山之上石壁室中所處險絶人跡不至今辰州盧溪縣西有武山黄閔武陵記曰山高可萬仭山半有槃瓠石室可容數萬人中有石牀槃瓠行跡今案山窟前有石羊石獸古跡竒異尤多望石窟大如三間屋遥見一石仍似狗形蠻俗相傳云是槃瓠象也於是女解去衣裳為僕鑒之結著獨力之衣僕鑒獨力皆未詳流俗本或有改鑒字為䜿者妄穿鑿者也帝悲思之遣使尋求輙遇風雨震晦使者不得進經三年生子一十二人六男六女槃瓠死後因自相夫妻織績木皮染以草實好五色衣服製裁皆有尾形于寳晉記曰武陵長沙盧江郡夷槃瓠之後也雜處五溪之内槃瓠慿山阻險每每嘗為害揉雜魚肉叩槽而號以祭槃瓠俗稱赤體横裙即其子孫其母後歸以狀白帝於是使迎致諸子衣裳斑斕語言侏離侏離蠻夷語聲也好入山壑不樂平曠帝順其意賜以名山廣澤其後滋蔓號曰蠻夷外癡内黠安土重舊以先父有功母帝之女田作賈販無關梁符傳租稅之賦優寵之故蠲其賦役也荆州記曰沅陵縣居酉口有上就武陽二鄉惟北是槃瓠子孫狗種也二鄉在武溪之北有邑君長皆賜印綬冠用獺皮名渠率曰精夫相呼為姎徒說文曰姎女人自稱姎我也音鳥黨切此以上並見風俗通也其後號荆雍州蠻槃之後也分建種落布在諸郡縣荆州置南蠻雍州置寧蠻校尉以領之西南夷夜郎者初有女子浣於遯水有三節大竹流入足間聞其中有號聲剖竹視之得一男子歸而養之及長有武才自立為夜郎侯以竹為姓見華陽國志武帝元鼎六年平南夷為䍧牱郡夜郎侯迎降天子賜其王印綬後遂殺之夷獠咸以竹王非血氣所生甚重之求為立後䍧牱太守吳霸以聞天子乃封其三子為侯死配食其父今夜郎縣有竹王三郎神是也地里志曰夜郎縣有遯水東至廣鬱華陽國志云遯水通鬱林有三郎祠皆有靈響又云竹王所捐破竹於林今王祠竹林是也王嘗從人止大石上命作羮從者白無水王以劍擊石出水今竹王水是也滇王者滇音顛地有滇池因為名莊蹻之後也始楚威王時使畧巴邑黔中以西黔中即今黔州是其地本巴人也蹻楚莊王苖裔蹻至滇池三百里旁平地肥饒數千里池旁地也以兵威定屬楚欲歸報㑹秦擊奪楚巴黔中郡道塞不通因乃以其衆王滇變服從其俗以長之為其師長也哀牢夷者其先有婦人名沙壹居于牢山嘗捕魚水中觸沉木若有感因懷􅗖十月産子男十人後沉木化為龍出水上少頃忽聞龍語曰若為我生子今悉何在九子見龍驚走獨小子不能去背龍而坐龍因䑛之其母鳥語謂背為九謂坐為隆因名子曰九隆及後長大諸兄以九隆能為父所䑛而黠遂共推以為王後牢山下有一夫一婦復生十女子九隆兄弟娶以為妻後漸相滋長種人皆刻畫其身象龍衣文皆著尾自此以上並見風俗通也九隆死世世相繼哀牢傳曰九隆代代相傳名號不可得而數至於禁高乃可記名禁高死子吸代吸死子建非代建非死子哀牢代哀牢死子桑藕代桑藕死子如承代如承死子柳貌代柳貌死子扈桑代乃分置小王往往邑居散在谿谷冉駹夷者漢武元鼎六年以為文山郡其山有六夷七羌九氐各有部落東謝蠻者在黔安之東南蠻之别種也松外蠻在西洱河其部落大者五六百户小者二三百户無大君皆不相統有數十姓以楊李趙董之家各擅一屬自云其先本漢人自夜郎滇池以西皆云莊蹻之餘種也巴郡南郡蠻本有五姓巴氏樊氏䐺氏音審相氏鄭氏皆出於武落鍾離山世本曰廩君之先故出誣誕也其山有赤黑二穴巴氏之子生於赤穴四姓之子生於黑穴未有君長俱事鬼神乃共擲劍於石穴約能中者奉以為君巴氏子務相乃獨中之衆皆歎又令各乗土船約能浮者當以為君餘姓悉沉惟務相獨浮因共立之是為廪君乃乘土船從夷水至鹽陽荆州圖曰副夷縣有温泉古老相傳此泉元出鹽於今水有鹽氣縣西一獨山有石穴有二大石並立穴中相去可一丈俗名為陰陽石陰石常濕陽石常燥盛𢎞之荆州記曰昔廪君浮夷水射鹽神于陽石之上案今施州清江縣水一名鹽水源出清江縣西都亭山水經云夷水巴郡魚復縣注云水色清炤分十丈沙石蜀人見澄清因名清江也鹽水有女神謂廪君曰此地廣大魚鹽所出願留共居廪君不許鹽神暮輙來取宿旦化為蟲與諸蟲羣飛掩蔽日光天地晦㝠積十餘日廪君思其便因射殺之天日開明世本日廪君使人操青縷以遺鹽神曰嬰此即相宜云與女俱生不宜將去鹽神受此而嬰之廪君即立陽石上應青縷而射之中鹽神死天乃大開也廪君於是君乎夷城四姓皆臣之廪君死魂魄世為白虎巴氏以虎飲人血遂以人祠焉及秦惠王并巴中以巴氏為蠻夷君長世尚秦女其民爵土不更有罪得以爵除其君長歲出賦二千一十六錢三歲一出義賦千八百錢其民户出幏布八丈二尺雞羽三十鍭説文幏南蠻夷布也音公亞切毛詩四鍭既均儀禮鍭矢一乘鄭元曰鍭猶候也候物射之也三十鍭一百四十九俗本幏作蒙鍭作鏃並誤也漢興南郡太守靳彊請一依秦時故事至建武二十三年南郡潳山蠻雷遷等始反叛潳音屠宼掠百姓遣武威將軍劉尚將萬餘人討破之徙其種人七千餘口置江夏界中今沔中蠻是也僬僥國後漢時通焉自言我海西人海西即大秦也獠者葢南之别種也自漢中達卭笮洲洞之間所在皆有其種多散居山谷中不辨姓氏雲南本鳥蠻之别種䝉氏蠻謂王為詔自言哀牢之後代居蒙舍州為渠帥在漢永昌故郡東姚州之西哥羅國漢時聞焉在槃槃東南亦曰哥羅富沙羅國云其王姓天梨天鉢羅附國者蜀郡西北二千餘里即漢之南夷也有嘉良夷即其東部所居種姓自相率領土俗與附國同西㸑南寧之渠帥也其王自云本河東安邑人七世祖仕晉為南寧太守屬中國亂遂王蠻夷梁元帝時南寧州刺史徐文盛徵詣荆州有㸑瓚者遂據南寧之地白馬蜀之西冉駹以東君長以十數白馬最大皆氐類也東女國西羌之别種以西海中復有女國故稱東女焉西域大月氐本行國也居燉煌祁連間匈奴冐頓單于攻破月氐老上單于殺月氐月氐乃逺去過大隴西擊大夏而臣之其餘小衆不能去者保南山羌號小月氐初月氐為匈奴所滅分其國為體宻雙靡貴霜肸頓都宻凡五部翎侯一云小月氐國都富樓沙城其王本大月氐王寄多羅子也寄多羅為匈奴所逐西徙後令其子守此城因號小月氐罽賓國北與大月氐接匈奴破大月氐大月氐西君大夏而塞王南君罽賓君謂為之君也塞種分散往往為數國即所謂釋種者也亦語頗有輕重自疏勒以西北休循捐毒之屬皆故塞種也烏孫國東與匈奴西北與康居西與大宛南與城郭諸國相接本塞地大月氐居其地後烏孫昆莫破大月氐大月氐徙西臣大夏而烏孫昆莫居之故烏孫民有塞種大月氐種龜兹國者西域之舊國者也後漢光武時其王名𢎞為莎車王賢所殺滅其族賢使其子則羅為龜兹王國又殺則羅匈奴立龜兹貴人身毒為王西夜國王號子合東與皮山西南與烏秅北與莎車西與蒲犁接蒲犁及依耐無雷國皆西夜類也西夜與胡異其種類羌氐行國言不土著也中天竺國一名身毒身毒即天竺葢傳譯音字不同其實一也從月支高附以西南至西海東至盤越列國數千里每國置王其名雖異皆身毒也或云摩伽國亦云婆羅門昔有婆羅門領徒衆千人肄業於樹下樹神降之遂為夫婦宫室自然而立僮僕甚盛於是使役百神築壘以繞之經日而就此後有阿育王復使鬼壘石為宫闕皆雕文刻鏤非人所及阿育王頗行苛政置炮炙之刑謂之地獄今城中見有其迹焉獅子國天竺旁國也其國舊無人民止有鬼神及龍居之諸國商估來共市易鬼神不見其形但出珍寳顯其所堪價商人依價取之諸國人聞其土樂因此競至或有停住者遂成大國波斯國其先有波斯匿王者子孫以王父字為氏因為國號大食國大波斯之别種也隋大業中有波斯胡人牧駞於俱紛摩地那之山忽有獅子從地踊出人語謂胡人曰此山西有三穴穴中大有兵器汝可取之至穴中有刀及矟甚多石上有文教其反叛於是紏合亡命渡恒曷水刼奪商旅其衆漸盛遂割據波斯西境自立為王波斯拂菻各遣兵討之反為所敗其王姓大食名噉密莫未膩至唐高宗時來朝貢自云有國已三十四年歴三王矣蒲類本大國也前西域屬匈奴而其王得罪單于單于怒徙蒲類人六千餘口内之匈奴右部阿惡地因號曰阿惡國南去車師後部馬行九十餘日人口貧羸逃亡山谷間故留為國湟中月氐胡其先大月氐之别也舊在張掖酒泉地月氐王為匈奴冐頓所殺餘種分散西踰葱嶺其羸弱者南入山阻依諸羌居止遂與共婚姻康國者康居之後也遷徙無常不恒故地然自漢以來相承不絶其王本姓温月氐人也舊居祈連山北昭武城因被匈奴所破西踰葱嶺遂有其國支庶各分王故康國左右諸國並以昭武為姓示不忘本也鏺汗國都葱嶺之西五百餘里古渠捜國也王姓昭武字阿利浹安國漢時安息國也王姓昭武氏與康國同族何國都那密水南數里舊是康居地也其王姓昭武亦康國王之族類漕國在葱嶺之北漢時罽賓國也其王姓昭武字順達康國王之宗族烏那曷國都烏滸水西舊安息之地也王姓昭武亦康國種類穆國都烏滸河之西亦安息之故地與烏那曷為隣其王姓昭武亦康國之種類也史國都獨莫水南十里舊康居之地也其王姓昭武亦康國王之支庶俗同康國米國都那密水西舊康居之地也無王其城主姓昭武康國王之支西羌之本出自三苖姜姓之别也其國近南岳及舜流四凶徙之三危三危山在今沙州燉煌縣東南河關之西南𦍑地是也其俗氏族無定或以父名母姓為種號秦厲公時有無弋爰劍者為秦所拘執以為奴𨽻不知爰劍何戎之别也後得亡歸而秦人追之急藏於巖穴中得免羌人云爰劍初藏穴中秦人焚之有景象如虎為其蔽火得以不死既出又與劓女遇於野遂成夫婦女恥其狀被髪覆靣羌人因以為俗遂俱亡入三河間諸羌見爰劍被焚不死怪其神共畏事之推以為豪河湟間少五穀多禽獸以射獵為事爰劍教之田畜遂見敬信廬落種人依之者日益衆羌人謂奴為弋以爰劍常為奴𨽻故因名之其後世世為豪至爰劍曾孫忍之時秦獻公初立欲復穆公之迹兵臨渭首滅狄䝠戎䝠音丸忍季父卭畏秦之威將其衆種人附落而南出賜支河禹貢所謂析支也曲西數千里與羌絶逺不復交通其後子孫分别各自為種任隨所之或為氂牛種越巂羌是也或為白馬種廣漢羌是也或為參狼種武都羌是也忍及弟舞獨留湟中並多娶妻婦忍生九子為九種舞生十七子為十七種羌之興盛從此起矣及忍子研立時秦孝公雄强威服羌戎孝公使太子駟率戎狄九十二國朝周顯王研至豪健故羌中號其為後研種及秦始皇務并六國以諸侯為事兵不西行故種人得以繁息從爰劍種五世至研研最豪健自後以研為種號十三世至燒當復豪健其子孫更以燒當為種號西羌自爰劍後子孫支分凡百五十種其九種在賜支河首以西及在蜀漢徼北前史不載口數惟參狼在武都勝兵數千人其五十二種衰少不能自立分散為附落或絶滅無後或引而逺去其八十九種惟研種最强勝兵十餘萬其餘大者萬餘人小者數千人更相鈔盜盛衰無常順帝時勝兵合可二十萬人發羌唐旄等絶逺未嘗往來氂牛白馬羌在蜀漢其種别名號皆不可紀知也一云白蘭白狗皆西羌别種也黄牛羌南與白馬隣各有種類孕身六月而生党項羌者三苖之裔也其種有宕昌白狼皆自稱獮猴種又云西羌之别種魏晉後西羌微弱其後連吐谷渾有大部落衆皆强盛其族有招祅等唐時有六府部落曰野利越詩野利龍兒野利厥律兒黄野海梅野萃等居慶州者號為東山部落居夏州者號平夏部落宕昌國在河南國之東南益州之西北隴西之西羌種也其先葢三苖之裔高昌國闞氏為主其後為河西王沮渠茂䖍弟無諱襲破之其王闞爽奔于芮芮無諱據之稱王一世而滅國人又推麴氏為王名嘉滑國者車師之别種也後漢永建元年八滑従班勇擊北虜有功勇上八滑為後部親漢侯白題國王姓支名史稽毅其先葢匈奴之别也氐人有王所從來久矣自漢開益州置武都郡排其種人分竄山谷間或在福禄或在􅊈隴左右其種非一稱槃瓠之後或號青氐或號白氐或稱蚺氐此葢蟲之類而處中國人即其服色而名之也其自相號曰葢雅各有王侯多受中國封拜漢建安中興國氐王阿貴白項氐王萬千各有部落萬餘至十六年從馬超為亂超破之後阿貴為夏侯淵所攻滅萬千西南入蜀其部落不能去皆降國家分徙其前後兩端者置扶風美陽今之安夷撫夷二部䕶軍所典是也其太守善分留天水安南界今之廣平魏郡所守是也其俗語不與中國同及羌離胡各自有姓姓如中國之姓矣此葢昔所謂西戎在於邽冀獂道者也今雖都統於郡國然故自有王侯在其墟落間又故武都地陰平街左右亦有一萬餘落貲虜本匈奴也匈奴名奴婢為貲始建武時匈奴衰分去其奴婢亡匿在金城武威酒泉北黑水西畜牧逐水草抄盜涼州部落稍多有數萬不與東部鮮卑同也其種非一有大胡有丁令或頗有羌雜處由本無奴婢故也畧陽清水氐楊氏秦漢以來世居隴右為豪族漢獻帝建安中有楊騰者為部落大帥騰子駒勇健多計畧始徙仇池武興國本仇池宋文帝時楊難當自立為秦王帝遣裴方明討之難當奔魏其兄子文德聚衆茄盧宋因授以爵位魏又攻之文德奔漢中從弟僧嗣又自立復盛茄盧卒文德弟文洪為白水太守屯武興宋世以為武都王武興之國自此始矣鄧至羌者羌之種也有像舒治者世為白水酋帥乃自稱王焉契苾力何之先鐵勒别部之酋長也父葛隋大業中繼為特勒以地逼吐谷渾所居隘狹又多瘴癘遂入龜兹居於熱海之上河南王者其先出自鮮卑慕容氏初慕容雒干干有二子庶長曰吐谷渾嫡曰廆雒干卒廆嗣位吐谷渾避之西徙上隴度抱罕出凉州西南至赤水而居之地在河南故以為號其後吐谷渾孫葉延頗識書記自謂曾祖奕雒干始封昌黎公葢公孫之子也禮以王父字為氏因姓吐谷渾亦為國號至其末孫阿豺始通江左宋元嘉末阿豺弟子慕延又自號河南王吐蕃在吐谷渾之西本西羌别種南涼秃髪利鹿孤之後以秃髪為國音訛故曰吐蕃利鹿孤初有子曰樊尼奔沮渠䝉遜署臨松郡丞䝉遜滅建國西土改姓勃窣野嚈噠國大月氐之種類也亦高車之别種悅般國在烏孫西北去代一萬九百三十里其先匈奴北單于之部落也焉耆國其王姓龍名鳩鳲卑那即前涼張軌所討龍熈之嗣北狄匈奴其先夏后氏之苖裔曰淳維匈奴始祖名殷時始奔北邊唐虞以上有山戎獫狁薫鬻皆匈奴别號獫音險鬻音弋六切居於北邊其後周文王伐畎夷畎音土犬切又曰昆或作混緄二字並工本切混緄畎聲相近耳山海經云黄帝生苗龍苖龍生融吾融吾生弄明弄明生白犬白犬有二牝牡是為畎戎穆王伐畎戎宣王伐獫狁秦襄公齊桓公伐山戎至於晉文公攘戎翟居於西河圁雒之間圁音嚚水名水聲之和因名也出上郡即今銀州銀水是也雒水亦謂之漆沮也號曰赤翟白翟春秋所書晉師滅赤狄潞氏卻缺獲白翟子者而秦穆公得繇余西戎八國服於秦故隴以西有緜諸畎戎狄獂之戎皆在天水界即緜諸道及獂道是也獂音垣在岐梁涇漆之北有義渠大荔烏氏朐衍之戎此漆水在新平荔音𨽻氐音支朐音許于切而晉北有林胡樓煩之戎燕北有東胡山戎烏桓之先也後為鮮卑各分散谿谷自有君長往往而聚者百有餘戎然莫能相一趙襄子踰句注而破之并代以臨胡貉貉音莫泊切秦始皇時匈奴單于曰頭曼音莫安切姓攣鞮氏攣音力全切鞮音丁奚切其大臣皆世官呼衍氏蘭氏呼衍即今鮮卑姓呼者是也蘭今亦有之其後有須卜氏此三姓其貴種也西晉時北狄以部落為類其入居塞者有屠各種鮮支種寇頭種烏譚種赤勒種桿蛭種黑狼種赤沙種鬱鞞種萎莎種秃童種勃蔑種羌渠種賀頼種鍾跂種大樓種雍屈種真樹種力羯種凡十九種皆有部落相雜錯屠各最豪貴故得為單于統領諸種南匈奴醢落尸逐鞮單于北者醢音火兮切北單于名也呼韓邪單于之孫烏珠留若鞮單于之子也自呼韓邪後諸子以次立至比季父單于輿時以北為右薁鞮日逐王部領南邊及烏桓薁音於六切鞮音几言切後漢建武二十四年冬自立為呼韓邪單于是年十二月癸丑匈奴始分為南北單于烏桓者本東胡也桓亦作丸漢初匈奴冐頓滅其國餘類保烏桓山因以為號焉氏姓無常以大人健者名字為姓鮮卑亦東胡之餘也别保鮮卑山因號焉漢初亦為冐頓所破逺竄遼東塞外與烏桓相接後漢建武二十三年始通譯使桓帝時鮮卑檀石槐者其父投鹿侯初從匈奴軍三年其妻在家生子投鹿侯歸怪欲殺之妻言常晝行聞震雷仰天視而雹入其口因吞之遂姙身十月而産此子必有竒異且宜長視投鹿侯不聽遂棄之妻私語家令收養焉名檀石槐其後盡據匈奴故地東西萬四千餘里蠕蠕葢匈奴之别種也南史謂之芮芮姓郁久閭氏後魏神元之末掠騎有得一奴髪始齊眉忘本姓名其主字曰木骨閭言首秃也木骨閭與郁久閭聲相近故後子孫因以為氏木骨閭既壯免奴為騎卒穆帝時坐後期當斬臣欽若等曰神元穆帝皆後魏追封年號亡匿廣漠谿谷間收合逋逃得百餘人依純突隣部木骨閭死子車鹿㑹雄健始有部衆自號為柔然後太武以其無知狀類於蟲故改其號為蠕蠕突厥之先平涼雜胡也姓阿史那氏後魏太武滅且渠氏阿史那以五百家奔茹茹世居金山工於鐵作金山狀如兠鍪俗呼兠鍪為突厥因以為號或云其先國於西海之上為隣國滅男女無少長盡殺之至一兒不忍殺刖足斷臂棄於大澤中有一牝狼每銜肉至其所此兒因食之得以不死其後遂與狼交狼有孕焉彼隣國者復令人殺此兒而狼在其側使者將殺之其狼若為神所憑歘然至于海東止於山上其山在高昌西北下有洞穴狼入其中遇得平壤茂草地方二百餘里其後狼生十男其一姓阿史那氏最賢遂為君長故牙門建狼頭纛示不忘本也又云突厥之先出於索國在匈奴之北其部落大人阿謗歩兄弟十七人其一曰伊質泥師都狼所生謗歩等性亦愚癡國遂被滅泥師都既别感異氣能徵召風雨娶二妻云夏神冬神之女一孕而生四男其一變為白鴻其一國於阿輔水之間號為契骨其一國於處析水其一居跋斯處析施山即其大兒也山上仍有阿謗歩種類並多寒露大兒為出火温養之咸得全濟遂共奉大兒為主號為突厥即訥都六設也都六有十妻所生子皆以其母族為姓阿史那是其小妻之子也都六死十母子内欲擇立一人乃相率於大樹下共為約曰向樹跳躍能最高者推立阿史那子年幼而跳最高諸子遂奉以為主號阿賢設此說雖殊然皆狼種也其後曰土門部落稍盛始至塞上市繒絮願通中國西突厥者突厥木杵可汗之子大邏便沙鉢也與沙鉢畧有隟古隙字因分為二其國則烏孫之故地也其人雜有都陸及弩失畢歌羅祿處月處密伊吾等諸種沙陁突厥本西突厥之别種也唐則天萬歲通天中有黑離軍討擊使沙陁金山為金滿州都督其後又有沙陁骨咄支沙陁盡忠等十餘人皆官至將軍仍兼金滿州都督元和三年迴鶻破涼州吐蕃意沙陁致之欲西徙以散弱其類沙陁遂舉帳東來轉戰三千餘里本出甘州有九千餘人五月到靈州者小纔二千餘人槖駞千餘頭馬六七百匹餘皆戰死餒死及散失范希朝時為靈武節度為市牛羊孳息群牧鳳翔興元太原等數道後得迸落之餘歸之靈州四年八月范希朝移鎮太原詔沙陁舉軍隨之希朝奏選一千二百人為軍其餘種落本欲置之大同川其川接生奚路慮河氷合其衆西走遂居之於襄州谷中退渾者本吐谷渾之族音訛曰退渾唐至德後吐蕃彊盛乃徙居陰山赫連鐸則退渾之酋帥咸通中以從康承訓破龎勛有功補陰山都督都波國鐵勒之别種也霫匈奴之别種也稽胡一曰歩落稽葢匈奴别種劉元海五部之苖裔也或云山戎赤狄之後離石以西安定以東方七八百里居山谷間種落繁熾高車葢古赤狄之别種也或云其先匈奴之人也其種有狄氏袁紇氏斛律氏斛批氏䕶氏異竒斤氏又曰高車之族有十二姓一曰泣伏利氏二曰吐盧氏三曰乙旃氏四曰大連氏五曰窟賀伏氏六曰達薄于氏七曰阿崘氏八曰莫允氏九曰俟分氏十曰副伏羅氏十一曰乞袁氏十二曰右升沛氏破六韓匈奴單于之裔也右金蠡王潘六奚没於魏其子孫遂以潘六奚為氏後人訛誤以為破六韓世領部落鐵勒之先匈奴之苖裔也種類最多自西海之東依據山谷往往不絶獨雒河北有僕骨同羅韋紇抜也古覆羅並號俟斤蒙陳吐如紇斯結渾斛薛等諸姓勝兵二萬伊吾以西焉耆之北傍白山則有契弊薄落職乙咥蘇婆那曷鳥灌紇骨也咥於尼灌等勝兵可二萬金山西南有薛延陁咥勒兒十槃達契等一萬餘兵康國北傍阿得水則有訶咥易嶻撥怱比干具海曷比悉何嗟蘇柭也未渴達等有三萬許兵傍嶷海東西有蘇路羯三索咽篾促薛忽等諸姓八千餘拂䔉東則有恩屈阿蘭北褥九離伏温昏等二萬人北海南則都波等雖姓氏各别總謂鐵勒並無君長屬東西兩突厥薛延陁者鐵勒之别部也本姓薛氏其先擊滅延陁而有其衆因號為薛延氏又云與薛部雜居因號薛延陁可汗姓壹利咄氏代為强族初茹茹之滅也並屬於突厥至隋開皇中啓民滅都濫鐵勒亡敗依于西藩至曷婆那可汗徵稅無度鐵勒咸怨遂以延陁之祖乙失以為野咥可汗居燕末山及射匱之立也又臣於突厥乃去可汗之號而部落中分在鬱督軍山者東屬於姑畢在貪汗山者西屬於葉䕶國亂乙失鉢之孫曰夷男率其部落七萬餘家東歸於頡利回紇其先匈奴之裔也在後魏時號為鐵勒部落後謂之特勒特勒始有僕骨同羅韋紇拔也古覆羅並號俟斤後稱回紇有時健俟斤死其子曰菩薩部落以為賢而立之囘紇之盛繇菩薩之興焉至唐貞觀二十年太宗受其降欵為置六府七州以囘紇部為瀚海府拜其俟利發吐迷度為都督又以多覽為燕然府僕骨為金微府拔野古為幽陵府同羅為龜林府思結為廬山府渾部為皐蘭州斛薩為高闕州阿跌為雞田州契苾為榆溪州白霫為寘顔州開元中囘紇漸盛有九姓部落一曰藥羅葛即可汗之姓二曰胡咄葛三曰啒羅勿四曰貊歌息訖五曰阿勿嘀六曰葛薩七曰斛嗢素八曰藥勿葛九曰爰耶勿每一部落一都督後破拔息密收一部落破葛邏禄收一部落各置都督一人統號十一部落契丹古匈奴之種也其君長姓大賀氏唐貞觀二十二年蕃長窟哥率所部内屬乃置松漠府以窟哥為都督賜姓李氏昭宗時其王欽德政衰有别部酋長耶律按巴堅者最推雄勁族帳漸盛代欽德為王奚本東部胡之種也為慕容氏所破遺落者竄匿松漠之間曰庫莫奚初臣於突厥後稍强盛分為五部一曰辱紇主二曰莫賀弗三曰契箇四曰木昆五曰室得每部俟斤一人為其帥隨逐水草頗同突厥有阿㑹氏五部中為盛諸部皆歸之唐貞觀二十二年酋長可度者率所部内屬乃置饒樂府以可度者為都督賜姓李氏天祐初契丹兵力漸盛室韋奚霫霫亦匈奴之别種也皆受制焉虜政苛虐奚之首領去諸怨之以别部内附徙於媯州依北山而居漸至數千帳故有東西奚之號去諸卒子掃刺代立室韋者契丹之别種也其國無君長有大首領十七人並號莫賀弗世管攝之而附於突厥至唐有九部焉所謂嶺西室韋山北室韋黄頭室韋並大如者室韋小如者室韋婆萵烏戈切室韋訥北室韋駱駞室韋並在柳城郡之東北近者三千五百里逺者六千二百里其北大山之北曰大室韋靺鞨者肅慎之苖裔也邑落俱有酋長不相總一凡有七種其一號粟末部與高麗相接勝兵數千多驍武每宼高麗中其二曰汨咄部在粟末之北勝兵七千其三曰安車骨部在汨咄東北其四曰拂湼部在汨咄東其五曰號室部在拂湼東其六曰黑水部在安車骨西北其七曰白山部在粟末東南黑水靺鞨後魏謂之勿吉有酋帥突地稽者隋末率其部落千餘家内屬處之營州煬帝授以遼西太守唐武德初以其部落置幽州以突地稽為總管開元十三年置黒水府以其首領為都督十六年賜姓李氏又其部類凡有七種一號曰粟末部二曰汨咄部三曰安車骨部四曰拂湼部五曰號室部六曰黑水部七曰白山部渤海靺鞨大祚榮本高麗别種也唐開元中高麗滅祚榮家屬東保桂婁之故地據東牟山築城居之祚榮驍勇善用兵靺鞨之衆及高麗餘燼稍稍歸之冊府元龜卷九百五十六
