body:
  text: 册府元龜卷五百五十四宋王欽若等撰國史部總序古之王者世有史官君舉必書書法不隠所以慎言行示勸戒也自伏羲始造書契神農之世民風尚樸官設未備黄軒之臣曰倉頡取象鳥跡以作文字記諸言行竹册而藏之史官之作蓋自此始一云黄帝得圖書於河洛史皇倉頡状焉又云沮誦倉頡為左右史夏商皆有太史古之太史雖以著述為宗而兼掌厯象夏太史終古當桀之暴知其将亡乃執其圖法奔於商商太史高勢知紂之亂載其圖法奔於周周監二代竝建衆職春官宗伯之屬有太史掌建邦之六典下大夫二人上士四人小史掌邦國之志中士八人下士十有六人内史掌王之八柄之法以詔王治中大夫一人下大夫二人上士四人中士八人下士十有六人外史掌書外令四方之志及三皇五帝之書上士四人中士八人下士十有六人皆有府史胥徒之屬文武之時有史佚穆王有内史作穆天子傳宣王有史籕幽王有太史伯陽一云老子為柱下史惠王有内史過襄王有内史叔興父諸侯亦各有國史齊有南史子余史囂晉有太史屠黍見晉之亂亦以其圖法歸周又有太史趙太史董狐史墨史蘇衞有史華龍滑魯有太史克左丘明楚有左史倚相及史老秦穆公十三年初有史以紀事魯又有外史鄭有太史而無名者而晉大夫趙鞅亦有書過之臣乃陪臣之僭也戰國之世咸有史官秦趙㑹澠池各命侍史書事齊田文每對賔客令紀於屏風皆其事也秦并天下有太史令御史之名太史令胡母敬作愽學章御史張蒼掌柱下方書之類是也漢武帝始置太史公位在丞相上以司馬談為之天下文書先上太史副上丞相談卒子遷嗣宣帝改為太史令行太史公文書其修撰之職以官領之太史之官唯知占候而已又有禁中起居注注宫中起居之任王莾改置柱下五史秩如御史聽事侍旁記其言行此又起居之職也漢氏中興圖籍多在東觀故使名儒著作其中有其名而尚未有官明帝時班固傅毅為蘭臺令史與雒陽令陳宗等四人著作東觀皆他官兼著作之名終漢之世率以他官修史又有起居注馬皇后撰禁中起居之類是魏明帝太和中詔置著作郎一人佐郎一人竝𨽻中書省專掌國史亦有他官兼領衞覬以侍中充著作是也其後增佐郎為三人中書著作郎專修國史而起居注無聞焉吳蜀分據亦各有史職蜀有王崇補東觀吳有左國史薛瑩右國史華覈太史令丁孚韋曜等參撰國書晉因魏制而中書著作郎雖掌史注亦為兼官著作郎俗謂之大著作荀朂以中書監孫盛以秘書監孫綽以㪚騎常侍竝領著作惠帝元康二年改中書著作為秘書著作專掌史任𨽻秘書省後雖别置署而所𨽻如故佐郎八人秘書監自調補之哀帝興寧二年省四人孝武康寧元年復置八人晉制佐著作郎始到必撰名臣入傳僭偽諸國亦有史職前趙劉聰有左國史撰其國君臣紀傳前凉張駿亦令史臣撰國書於東苑後蜀西凉紀事委之門下南凉置國紀祭酒使撰録時事自餘偽主多置著作官前趙和苞後燕董統之類是也宋因晉制改佐著作郎為著作佐郎掌國史兼集起居注宋室初建以未有名臣可作傳其制遂廢齊太祖建元二年初置史官歷梁陳國史起居之任多以他官兼領齊以㪚騎常侍檀超驃騎記室江淹掌史職侍中王思逺掌起居注梁周捨為尚書吏部郎掌國史裴子野為著作郎仍兼掌國史及起居注之名自齊梁至陳佐郎多為令僕子起家之選史職率以他官領之後魏置起居令史每行幸宴㑹則在御左右記録帝言及賔客訓答後又别置修起居注二人以他官領之而𨽻於集書省北齊别置起居省後周六官之建春官府置外史掌王言及作動之事以為國誌即起居之職也又有著作上士二人中士四人即佐郎之任皆掌綴國録起居著作之任自此分矣而著作不參史氏隋復置著作郎一人佐郎八人𨽻秘書省掌國史集注起居煬帝置起居舎人二員𨽻内史省以古有内史外史今著作如外史遂置起居官以掌其内焉唐高祖武德初因舊制史官𨽻秘書省著作局置郎二人佐郎四人太宗貞觀初省起居舎人改置起居郎二人𨽻門下省省中每日仗退後帝與宰臣參議政事令起居郎一人執簡記録三年别置史舘於禁中專掌國史以他官兼領卑品有才亦以直舘命宰臣監修𨽻門下省著作局始罷領史職是年又於中書置祕書内省以脩五代史高宗顯慶二年置起居舎人二員𨽻中書省分掌左右龍朔二年改郎為左史舎人為右史咸亨元年復舊武后天授二年又為左右史長壽二年始修時政紀自永徽以後左右史唯得對仗承旨仗下後謀議皆不聞是年宰相姚璹上言以為帝王謨訓不可遂無紀述若不宣自宰相史官疎遠無得而書之遂請仗下後所言軍國政要宰相一人撰録為時政紀神龍初復以左右史為起居郎舎人每皇帝御殿對立於殿下左郎右舎人有命臨陛聽退而書之以為起居注凡册命啓奏封拜薨免悉載之以送史舘明皇開元二十五年移史館於中書省北以其地切樞密記事附近也憲宗元和四年令登朝官入館者竝為修撰不過三員官高者一人為判官非登朝者竝為直館其宰相常以一人監修國史亦有只監修國史景龍中以侍中紀處訥中書令楊再思兵部侍郎宋楚客中書侍郎蕭志忠竝修國史頓置四人代宗朝宰相元載憲宗朝宰相齊抗竝兼修國史史官受任於外亦或兼領史職就治所修撰及有許在家修史者開元八年以并州大都督府長史燕國公張説兼修國史齎史夲就并州隨軍修撰其後詔説致仕在家修史吳兢遷荆州司馬令就治所修唐書沈傳師湖南觀察使齎憲宗實録就領修撰五代官局因循無改原夫史氏之職肇於上世所以記人君之言動載邦國之美惡著為典式垂之來裔申褒貶之微旨為懲勸之大法故其司筆削之任慎良直之選歷代審官莫斯為重今之所紀者凡推擇簡任之尤異討論撰述之始末家世職業之嗣掌揚㩁讐對之裁議冲識方正以無忒恩遇寵待而隆厚咸用標次以彰厥善其有踈畧差戾受嗤於作者搆虗失實有紊乎書法乃至以鄙淺之識貽叨據之誚亦用參紀申儆于後其有注録之部次譜籍之名學方志之辨析世績之敷述皆司籍之事資博聞之益咸用綴緝以成倫要凡國史部十有三門選任公正恩奨選任自軒轅之世即置史官蒼頡沮誦實居其職爾後夏終商摯周任佚籕秦胡母氏漢司馬遷皆司記事之任竝有良史之目逮于後漢乃命鴻碩入直東觀撰述國史謂之著作歴代而下其選彌重或以文學為時主之稱或以才識因名臣之薦至有成書於外郡終老於册府其所寄任亦可知也然則胡母而上不聞司馬父子是謂私作今之論著以班固為之首後漢班固明帝時為蘭臺令史與前睢陽令陳宗長陵令尹敏司𨽻從事孟冀共成世祖夲紀遷為郎典校秘書固又撰功臣平林新市公孫述事作列傳載紀二十八篇奏之帝乃復使終成前所著書劉珍安帝時為謁者僕射永寧元年詔珍與校書劉騊駼作建武以來名臣傳李尤為諫議大夫受詔與謁者僕射劉珍等俱撰漢記劉騊駼臨邑侯復子也騊駼及從兄平望侯毅竝有才學永寧中鄧太后召毅及騊駼入東觀與謁者僕射劉珍著中興以下名臣烈士傳張衡字平子南陽人少善属文安帝雅聞衡善術學公車特徴拜郎中再遷為太史令順帝初再轉復為太史令自去史職五載復還先是永初中謁者僕射劉珍校書郎劉騊駼等著作東觀撰著漢記因定漢家禮儀上言請衡參論其事㑹並卒而衡常歎息欲終成之馬融桓帝時為南郡太守免官復拜議郎在東觀著述邊韶字孝先陳留浚儀人以文學知名桓帝時為臨潁侯相徴拜大中大夫著作東觀伏無忌為侍中屯騎校尉元嘉中詔無忌與黄景崔寔等共撰漢記崔寔為大將軍梁冀司馬與邊韶延篤等著作東觀延篤傳又載篤為議郎與朱穆邊韶共著作東觀楊彪靈帝熹平中以博習舊聞公車徴拜議郎與馬日磾盧植蔡邕等著作東觀荀悦為黄門侍郎獻帝好典籍嘗以班固漢書文繁難省乃令悦依左氏傳體以為漢紀三十篇詔尚書給筆札辭約事詳論辨多美吳韋曜為黄門侍郎廢帝即位諸葛恪輔政表曜為太史令撰吳書華覈為左國史後主時覈上疏曰臣聞五帝三王皆立史官叙録功美垂之無窮漢時司馬遷班固咸命世大才所撰精妙與六經俱傳大吳受命建國南土大皇帝末年命太史令丁孚郎中項峻俱非史才其所撰作不足紀録至少帝時更差韋曜周昭薛瑩梁廣及臣五人訪求往事所共撰立備有本末昭廣先亡曜負恩蹈罪瑩出為將復以過徙其書遂委滯迄今未撰奏臣愚淺才劣適可為瑩等記注而已若使撰合必襲孚峻之跡懼墜大皇帝之元功損當時之盛美瑩渉學既博文章尤妙同寮之中瑩為冠首今見吏雖多經學記述之才如瑩者少是以慺慺為國惜之實欲使卒垂成之功編於前史之末奏上之後退塡溝壑無所復恨後主遂召瑩還為左國史晉傅𤣥魏末為郎中與東海繆施俱以時譽選入著作撰集魏書華嶠惠帝元康初為尚書後以嶠博聞多識屬書典實有良史之志轉秘書監中書散騎著作及治禮音律天文數術南省文章門下撰集皆典統之華暢嶠少子也嶠漢書十典未成秘書監繆徽奏暢為著作佐郎卒成十典虞預為著作郎除散騎常侍仍領著作著晉書四十餘卷干寳為著作郎時中興草創未置史官中書監王遵上疏曰夫帝王之迹莫不秘書著為令典垂之無窮宣皇帝廓定四海武皇帝受禪于魏至徳大勳等蹤上聖而紀傳不存於王府徳音未被乎管絃陛下聖明當中興之盛宜建立國史撰集帝紀上敷祖宗之烈下紀佐命之勳務以實録為後代之凖厭率土之望悦人神之心斯誠雍熈之至美王者之𢎞基也宜備史官勑佐著作郎干寳等漸就撰集元帝納焉寶於是始領國史王隱字處叔陳郡人建興中過江太興初元帝召隱及郭璞俱為著作郎令撰晉史朱鳳晉陵人吳震吳人單族有史才秘書監華譚薦二人擢補著作佐郎竝皆稱職謝沉除尚書度支郎何充庾氷竝稱沉有史才遷著作郎撰晉書三十餘卷徐廣東筦人孝武時為員外散騎常侍領著作尚書奏曰左史述言右官書事乘志顯於晉鄭春秋著乎魯史自聖代有造中興記者道風帝典煥乎史䇿而太和以降世歷三朝𤣥風聖迹儵為疇古臣等參詳宜勑著作郎徐廣撰成國史於是勑廣撰集焉遷驍騎将軍領徐州大中正轉正員常侍大司農仍領著作如故勒成晉紀上之因乞解史任不許宋王韶之琅邪臨沂人私撰晉陽秋成時人謂之宜居史職即除著作郎使續後事裴松之為尚書部郎仁威記室參軍出為諸暨令元嘉中受詔續何承天宋史未及成而卒何承天元嘉十六年除著作佐郎撰國史荀伯子少好學博覽經傳為員外散騎侍郎著作郎徐廣重其才學舉伯子及王韶之竝為佐郎助撰晉史南齊丘巨源少舉丹陽郡孝亷為宋孝武所知大明五年勑助徐爰撰國史檀超為散騎常侍司徒右長史建元二年初置史官以超與驃騎記室江淹掌史職王思遠高宗時為侍中掌優策及起居注梁任孝㳟以外祖丘它與高祖有舊高祖聞其有才學召入西省撰史裴子野撰宋畧成吏部尚書徐勉言之於高祖以為著作郎掌國史及起居注除通直正員外郎著作如故勑使撰方國使圖周興嗣天監中為員外散騎侍郎佐撰國史十二年遷給事中撰史如故劉沓天監初為太學博士佐周捨撰國史至大通初為東宫通事舎人勑代裴子野知著作郎陸雲公為尚書儀曹郎頃之即入直壽光省以本官知著作郎事俄除著作郎累遷中書黄門郎竝掌著作沈峻為五經博士時中書舎人賀琛奉勑撰梁史乃啓峻及孔子袪補西省學士助撰録書成入兼中書通事舎人後魏鄧穎為中書侍郎太武詔太常崔浩集諸文學撰述國書穎與浩弟覽等俱參著作事崔浩為光禄大夫太武詔浩曰昔皇祚之興世隆北土積德累仁多歷年載澤流蒼生義聞四海我太祖道武皇帝協順天人以征不服應期撥亂奄有區夏太宗承綂光隆前緒釐正刑典大業維新然荒域之外猶未賓服此祖宗之遺志而貽功于後也朕以眇年獲奉宗廟戰戰兢兢如臨深谷故即位之初不遑寧處揚威朔裔掃定赫連逮于神䴥始命史職注集前功以成一代之典自爾以來戎旗仍舉秦隴尅定徐兖無塵平遁宼於龍川討孽豎於凉域豈朕一人獲濟於此頼宗廟之靈群公卿士宣力之效也而史闕其職篇籍不著每懼斯事之墜焉公德冠朝列言為世範小大之任望君存之命公留臺綜理史務述成此書務從實録浩於是監秘書事以中書侍郎高允散騎侍郎張偉參著作續成前紀至於損益褒貶折衷潤色浩所摠焉高允與司徒崔浩述成國記以本官領著作郎隂仲達武威姑臧人少以文學知名司徒崔浩啓仲達與叚承根云二人俱凉土才華同修國史除秘書著作郎叚承根好學機辯有文思而性疎薄司徒崔浩見而竒之以為才堪著述言之太武請為著作郎引以同事高讜為游擊將軍與崔浩共參著作遷中書侍郎程駿為著作郎獻文皇帝中除密郡太守尚書李敷奏曰夫君之使臣必湏終効駿實史才方申直筆千里之任十室可有請留之數載以成前籍後授方伯愚以為允書奏從之李輔字伯尚少有重名孝文毎云此李氏之千里駒勑撰太宗起居注尋遷秘書丞一韓顯宗為著作郎孝文曾謂顯宗及程靈虬曰著作之任國言是司卿等之才朕自委悉中省之品卿等所聞若取之古人班馬之徒固自遼闊若求當代文學之能卿等應推崔孝伯袁飜少以才學擅美一時宣武景明初李彪在東觀飜為徐紇所薦彪引兼著作佐郎以參史事游雅字伯度為東雍州刺史徴為秘書監委以國史之任崔光本名孝伯字長仁為著作郎與秘書丞李彪參撰國書宣武初為侍郎初光與李彪共撰國書太和之末彪改著作專以史事任光彪尋以罪廢宣武居諒闇彪上表求成魏書詔許之彪遂以白衣於秘書省著述光雖領史官以彪意在專功表解侍中著作以讓彪宣武不許李彪字道固為秘書丞分領著作事于忠為衞尉卿詔與吏部尚書元暉度支尚書元康河南尹元萇等推定歷代姓族李琰之為彭城王勰行臺參軍尋為侍中李彪啓著作郎修國史累轉黄門郎修國史房景先為員外郎侍中穆紹啓景先撰世宗起居注陽休之荘宗時為輕車將軍李神雋監起居注休之與河東裴伯茂范陽盧元明河間邢子明等俱入撰次後為太保長孫稚府属尋勑與魏收李同軌等修國史北齊杜臺卿字少山文筆尤工見稱當世以中書黄門侍郎兼大著作修國史魏收字伯起後魏節閔時為散騎侍郎尋勑典起居注并修國史後為神武府属崔暹言於文襄曰國史事重公家父子霸王功業皆湏具載非收不可文襄啓收兼散騎常侍修國史武定二年除正常侍領兼中書侍郎仍修史神武謂收曰卿勿見陳元康等在吾目下趨走謂吾以為勤勞我世身名在卿手勿謂我不知尋加兼著作郎天祐元年除中書令兼著作郎二年詔撰魏史帝使收専其任又詔平原王高隆之摠監之署名而已帝勑收曰好直筆我終不作魏太武誅史官孫搴字彦舉少厲志勤學為國子助教太保崔光引修國史權㑹文義該洽兼明風角𤣥象被尚書符追著作修國史監知太史局事後周柳虬為秘書丞時秘書雖領著作不參史事自虬為丞始令監掌焉隋姚察仕陳累遷戎昭将軍知撰梁史事後主纂業勑兼東宫通事舎人将軍知撰史如故高祖開皇九年詔授秘書丞别勑成梁陳二代史薛徳音道衡之從子有雋才起家為游騎尉佐魏澹修魏史成遷著作郎劉炫河間人少以聰敏見稱為郡禮曹從事以吏幹知名奉勑與著作郎王劭同修國史初劭為著作佐郎以母憂去職在家著齊書時制禁私撰史為内史侍郎李元操所奏帝怒遣使收其書覧而悦之於是起為員外散騎侍郎修起居注劉焯以儒學知名舉秀才射策甲科與著作郎王劭同修國史潘徽為晉王揚州博士煬帝嗣位詔徽與著作佐郎陸從典太常博士褚亮歐陽詢等助越公楊素撰魏書㑹素薨而止唐蕭瑀為中書令武德五年十二月詔曰司典序言史官記事考論得失究盡變通所以裁成義類懲惡勸善多識前古貽鑒將來伏羲以降周秦斯及兩漢相傳三國竝命迄于晉宋載籍備焉自有魏南徙乘機撫運周隋禪代歷世相仍梁氏稱邦跨據淮海齊遷龜鼎陳建宗枋莫不自命正朔緜歴歲祀各殊徽號刪定禮儀至於發跡開基受終告代嘉謀善政名臣奇士立言著績無乏於時然簡牘未編紀傳咸闕炎凉已積謡俗遷訛餘烈遺風泯焉將墜朕握圖馭宇長世字民方立典謨永垂憲則顧彼湮落用深軫悼有懐撰次實資良直中書令蕭瑀給事中王敬業著作郎殷聞禮可修魏史侍中陳叔達秘書丞令狐德棻太史庾儉可修周史兼中書令封德彞中書舎人顔師古可修隋史大理卿崔善為中書舎人孔紹安太子洗馬蕭德言可修梁史太子詹事裴矩兼吏部郎中祖孝孫前秘書監魏徴可修齊史秘書監竇璡給事中歐陽詢秦王文學姚思廉可修陳史務加詳覈博採舊文義在不刋書法無隱房𤣥齡為司空貞觀二十年詔宜令修國史所更撰晉書詮次舊文裁成義類俾夫湮落之誥咸使發明其有所須可依修五代史故事若少學士亦量追取於是房𤣥齡與中書令禇遂良太子左庶子許敬宗掌其事又召中書舎人來濟著作郎陸元仕劉子翼守主客郎中盧承基太史令李淳風太子舎人李義府薛元超起居郎上官儀主客員外郎崔行功刑部員外郎辛𤣥馭著作佐郎劉裔之光禄主簿楊仁卿御史主簿李延壽校書郎張文㳟竝當時属文士分功撰録許敬宗為中書令敬宗先受詔與中書侍郎許圉師太史令李淳風著作佐郎楊仁卿著作郎顧裔等撰貞觀二十三年已後至顯慶三年實録顯慶四年二月撰成二十卷劉仁軌為左庶子同中書門下三品咸亨四年三月詔仁軌與吏部侍郎同中書門下三品李敬𤣥中書侍郎郝處俊黄門侍郎高如周等竝修國史仁軌等於是引左史李仁實專掌其事武三思為特進則天長安三年正月勑宜令三思與納言李嶠正諫大夫朱敬則司農少卿徐彦伯鳳閣舎人魏知古崔融司封郎中徐堅左史劉知幾直史館吳兢修唐史採四方之志成一家之言長懸楷則以貽勸誡魏元忠為中書令神龍元年十二月制左散騎常侍静德郡王武三思與元忠及禮部尚書祝欽明及史官太常少卿徐彦伯秘書少監栁冲國子司業崔融中書舎人岑羲徐堅等修則天實録吳兢勵志强學博通經史魏元忠朱敬則居相輔薦兢有史才堪居近侍因令直史館修國史累遷右補闕與韋承慶崔融劉子𤣥撰則天實録張説為并州大都督府長史開元八年詔曰肇有書契是興簡册所以彰平得失示以懲勸非夫詳而有體辨而不華含陽秋之蘊摠墳誥之賾豈能光我司典崇其立言右羽林軍将軍攝御史大夫權檢校并州大都督府長史持節天平軍節度大使燕國公張説多識前志學于舊史文成微婉詞潤金石諒可以昭振風雅光揚軌訓可兼修國史仍齎史本就并州修撰柳芳肅宗朝為史官與同職韋述受詔添修吳兢所撰國史未竟而亡于休烈為工部侍郎修國史宰臣李揆嫉之改為國子祭酒休烈性本淳謹怡然自適代宗即位甄别名品宰臣元載稱之乃拜右散騎常侍依前兼修國史令狐峘愽貫羣書有口辯楊綰為禮部侍郎修史引入史館自華原尉拜拾遺累遷禮部侍郎貶衡州别駕貞元初李泌為相召拜右庶子史館修撰又貶吉州别駕監修國史奏峘所撰代宗實録一分請於貶所畢功張薦字孝舉少精史傳大歴中浙西觀察使李涵表薦其才可掌史任乃詔授左司禦率府兵曹參軍既至關下以母老疾不拜命母喪闋禮部侍郎于劭舉前事以聞召充史館修撰兼陽翟尉累遷工部侍郎卒薦聰明强記無不通貫自始命至嘗兼史館修撰在史館二十餘年蔣乂初名武貞元九年自前河南府王屋縣尉為右拾遺史館修撰德宗重難其職制未下前召見於延英殿方命官元和四年為秘書少監兼史館修撰奉詔與獨孤郁韋處厚同修德宗實録路隨為翰林侍講學士諫議大夫韋處厚為中書舎人長慶二年十月勑隨處厚嘗在史館才行可稱伏以憲宗實録未修灼資論撰宜兼充史館修撰仍分日入史館修實録未畢之間且許不入内署仍放朝參沈傅師為翰林學士中書舎人史館修撰預修憲宗實録長慶三年出為湖南觀察使中書侍郎平章事監修國史杜元頴奏臣自去年奉詔命各據見在史官分修憲宗實録今縁沈傅師改官若更求人選擇非易其沈傅師當分雖捜羅未周條目紀綱已粗有緒竊以班固居鄉里而繼成漢書陳壽處私家而專精國志𤣥宗國史張説在本鎮兼修代宗編年令狐峘自外郡奏上遠考前代近參本朝皆可明徴實有成例其沈傅師一分伏望勑就湖南修畢先送史舘與諸史官參詳然後聞奏庶使官業責成有終始之效傳聞摭實無同異之差制可蔣係乂子也太和二年為右拾遺史舘修撰與同職沈傅師鄭瀚陳夷行李漢等奉詔撰憲宗實録四年書成奏御轉尚書工部員外郎遷本司郎中皆兼史職宇文籍以咸陽尉直史館與韓愈同成順宗實録遷監察御史後又為駕部員外郎史職與韋處厚路隨沈傅師同修憲宗實録王彥威為諌議大夫太和六年二月以彥威及户部郎中楊漢公祠部員外郎蘓滌右補闕裴休竝以本官充史舘修撰故事史官不過三員少或止於兩員至是四人竝命時論深以為非李讓夷為諫議大夫開成元年四月以讓夷竝權知起居舎人事先是宰臣於閣内奏起居舎人李襄有痼疾請替帝曰朕聞禇遂良為諫議大夫嘗兼此官卿可盡言今諫議大夫姓名宰臣李石遂奏李讓夷馮定孫簡蕭俶帝曰讓夷可也孟穆為户部郎中大中八年七月監修鄭郎奏當館修撰直館共四員准故事以通籍者為直館伏以修史重事合選廷臣秩序或卑筆削不稱其直館伏請停廢更添修撰二員從之其舊直館萬年尉張範涇陽尉李節勒守本官以穆及駕部員外郎李渙竝充修撰通舊為四員分修四季之事蔣偕有史才為補闕史館修撰咸通中與同職盧耽牛藂等受詔修文宗實録柳玭為吏部侍郎昭宗大順中宰相監修國史杜讓能以宣宗懿宗僖宗三朝實録未修乃奏玭及右補闕裴廷裕左拾遺孫泰駕部員外郎李商太常博士鄭光庭等十五人分修之後唐張昭長興四年七月以前都官員外郎知制誥史館修撰復為尚書職方員外郎依前知制誥著作郎直史館張守吉為右補闕竝充史館修撰著作佐郎尹拙為左拾遺王慎徽為右拾遺竝依前直史館國朝舊事以本官直館者皆為畿縣尉今以諫官直史館自拙等始從監修國史李愚奏也晉趙瑩為相監修國史天福六年二月勑曰有唐遠自高祖下暨明宗紀傳未分書志或闕今耳目相接尚可詢求若歲月更深何由尋訪宜令户部侍郎張昭起居郎賈緯秘書少監趙熈吏部侍郎鄭受益左司員外郎李為光等修撰唐史仍令宰臣趙瑩監修其年四月瑩奏所修唐史首尾二十一朝緜歴三百餘載其於筆削斯實難辦必藉羣才司分事任張昭等五人奉勑同撰内起居郎賈緯丁憂去官竊以刑部侍郎呂琦侍御史尹拙皆富典墳嘗親簡牘勸善懲惡雅符班馬之規廣記備言必稱董南之職上祈聖鑒俾共編修詔從之以琦為户部侍郎以拙為倉部員外郎與張昭等同修唐史漢賈緯為諫議大夫乾祐二年二月勑曰載唐虞之盛傳彼古文明得失之由存乎信史恭惟高祖皇帝受天厯數纉漢基圖戎虜蠻夷懾靈旗而内附禮樂征伐建王道於大中功格於上𤣥化行乎率土將欲示其軌範約彼春秋接高光紀聖之書續班馬紀言之典廢而不舉闕孰甚焉左諫議大夫賈緯左拾遺竇儼右拾遺王紳等才學淵深論辯蜂起分職方提於直筆編年允屬於鴻儒宜令緯等同修高祖實録呈進仍令宰臣蘇逄吉監修周張昭為兵部尚書顯德三年十二月勑太祖聖皇帝實録并梁均帝唐清泰二主實録宜差張昭修宜同修官委張昭定名奏請四年正月昭上言奉勑編修太祖實録及唐梁二末主實録今請國子祭酒尹拙太子詹事劉溫叟同於史舘編修公正夫簡牘之興得失攸紀善惡無隱曲直遂分是故勸沮於斯人見信於來裔其或紀言動之任舉春秋之旨雖微婉之斯在亦纎芥之必書故使哿矣之言足徴於龜鑑直哉之筆若列於日星斯蓋得執簡之餘芳書法之遺懿者已董狐為晉太史晉趙穿襲殺靈公於桃園虞翻曰園名也而迎趙盾趙盾素貴得民知靈公少侈民不附故為弑君盾復位晉太史董狐書曰趙盾弑其君以視於朝盾曰弑者趙穿我無罪太史曰子正卿而亡不出境反不能誅國亂非子而誰孔子聞之曰董狐古之良史書法不隱不隱盾之罪宣子良大夫也為法受惡聞義則服杜預曰言其為法受屈也惜也出疆乃免齊太史失姓名崔杼弑其君荘公光立景公而相之太史書曰崔杼弑其君崔子殺之其弟嗣書而死者二人嗣續也并前有三人死其弟又書乃舎之南史氏聞太史盡死執簡以徃聞既書矣乃還傳言齊有史崔杼之罪所以聞吳韋曜為孫皓侍中領任國史皓欲為父和作紀曜執以和不登帝位宜名為傳如是者非一漸見責怒晉孫盛歴著作郎秘書監著晉陽秋詞直理正稱良史焉既而大司馬桓溫見之怒謂盛子曰枋頭誠為失利何至乃如尊君所説若此史遂行自是闗君門户事其子遽拜謝因請刪改之時盛年老還家性方嚴有軌憲雖子孫斑白而庭訓愈峻至此諸子乃共號泣稽顙請為百口切計盛大怒諸子遂爾改之盛冩兩定本寄于慕容雋大元中孝武帝博求異聞始於遼東得之以相考校多有不同書遂兩存焉趙泉車敬俱為苻堅著作郎堅母少寡將軍李威有辟陽之寵史官載之堅收起居注及著作所録而觀之見其事慙怒乃焚其書而大撿史官將加其罪泉敬等已死乃止宋王韶之為黄門侍郎領著作韶之為晉史序王詢貨殖王欽作亂詢子𢎞欽子華竝貴韶之懼為所陷深結徐羡之傅亮南齊劉祥為長沙王鎮軍權諮議參軍撰宋書譏斥禪代尚書令王儉密以啓聞帝銜而不問後周柳虬為西魏秘書監修起居注太祖既廢魏帝立恭帝大饗羣臣虬執簡書於朝曰廢帝文皇帝之嗣子年七歲文帝言於安定公即周太祖曰是子才繇于公不才亦繇于公宜勉之公既受兹重寄居元輔之任又納女為皇后遂不能訓誨有成致令廢黜負文皇帝付囑之意此咎非安定公而誰太祖乃令太常盧辨作誥諭公卿曰嗚呼我羣后暨衆士維文皇帝以襁褓之嗣托於予訓之誨之庻厥有成而予罔能弗變厥心庸此乎廢墜我文皇帝之志嗚呼茲咎予其焉避予實知之矧爾衆人之心哉惟予之顔豈惟今厚將恐來世以予為口實唐杜正倫太宗貞觀二年為給事中兼知起居注太宗嘗謂侍臣曰朕每日坐朝欲出一言即思此言於百姓有利益不所以不敢多言正倫進曰君舉必書言存左史臣職當修起居注不敢不盡愚直陛下若一言乖於道理則千載累於聖德非直當今有損於百姓願陛下慎之太宗大悦賜綵絹二百疋褚遂良為諌議大夫知起居注貞觀十六年四月太宗謂遂良曰卿知起居注書何等事大抵人君得見否遂良曰今之起居古之左右史書人君言事且記善惡以為鑒誡庻幾人主不為非法不聞帝王躬自觀史太宗曰朕有不善卿必記之耶遂良曰守道不如守官臣職當載筆君舉必記黄門侍郎劉洎曰設令遂良不記天下之人皆記之矣太宗曰然七月太宗又謂遂良曰爾知起居比來記我行事善惡遂良曰今四海太平為行事耳然史官之設君舉必書善既必書過亦無隱呉兢開元中為著作郎兼修史時黄門侍郎同中書門下平章事張説因至史館讀則天實録見論證對魏元忠事乃謂兢曰劉五修實録劉五即子元也論齊魏公事殊不相饒假與説毒手當時説驗知是兢書之所以假託於劉子𤣥兢從容對曰是兢書之非劉公修述草本猶在其人已亡不可誣枉於幽魂令相公有怪耳同修史官蘇宋等見兢此對深驚異之乃歎曰若取人情何名為直筆于休烈為太常少卿修國史至德二年肅宗謂休烈曰君舉必書朕有過卿書之否休烈對曰臣聞禹湯罪已其興勃焉有德之君不忘書過臣不勝大慶鄭朗為起居郎太和九年十二月文宗御紫宸殿與宰臣鄭覃李石等議政宰臣既退帝命朗等適所記録者將來一觀朗對曰臣執筆所記便目為史臣聞自古帝王不合觀史帝曰故事何在朗曰臣不敢遠徴故實甞聞太宗皇帝欲親覽國史用知得失諫議大夫朱子奢上表云史官所述義歸盡善若至曾𤣥已後或非上智中主庸君飾非護短見極陳善惡恐致史官何地逃刑又聞褚遂良對曰今之起居古之左右史以記人君言行善惡必書庻幾不為非法不聞帝王躬自觀史帝又謂朗曰適來所記是且直書未有否臧一見無爽朗乃進所紀帝畧覽曰卿宜門外重冩録進來其日晩内出詔宣示宰臣曰適來鄭朗等奏朝來所紀之事擬不進夫人君之言良史善惡必書或有平生之閒話不關理道之體要垂諸將來實為愧恥異日臨朝庻幾稍改何妨一見以戒醜言魏謩為起居舎人開成四年十月文宗於紫宸殿對百寮遣閣門使就謩取注記謩奏曰臣以自古置此以為聖王鑒戒陛下但為善事勿冀臣不書如陛下所行錯誤臣不書之天下之人皆得書之臣以陛下為太宗文皇帝乞陛下許臣比職褚遂良帝曰我向前亦曾取㸔謩曰自是向前起居不詳故事臣今豈得陷陛下為非法若陛下一覽之後自此文字須有廻避如此則善惡不直非史也遺後代何取信遂止恩奨軒后以史名官晉卿因籍命氏文籍旣興官守攸重其所繇來遠矣逮乎漢氏之世則天下計書先上太史副上丞相其後列鴻都藏室之署分東觀秘府之局典司著撰裁正編簡鼎國江左以迄于五代未嘗不建官分職克慎其選焉蓋髦士俊民乗時間作而當世之君莫不隆其禮命形於詔奨或蕃錫加等或崇進異數以至推恩而延賞追美以飾終發乎嘆想形於悼惜蓋夫鴻碩之老良直之士所任重而其才難不可以不欽尚者後漢高彪除郎中校書東觀遷内黄令帝勑同僚臨送祖于上東門詔東觀畫彪形像以勸學者吳華覈遷東觀令領右國史覈上疏辭讓後主答曰得表以東觀儒林之府當講校文藝處定疑難時皆名學碩儒乃任其職乞更選英賢聞之以卿研精墳典博覽多聞可謂悦禮樂敦詩書者也當飛翰騁藻光贊時事以越揚班張蔡之儔怪乃謙光厚自菲薄宜勉修所職以邁先賢勿復紛紛梁蕭子雲為太子舎人撰東宫新記奏之勑賜束帛陳杜之偉為大匠卿遷大中大夫仍勑撰梁史永定三年卒高祖甚悼惜之詔贈通直散騎常侍賻錢五萬布五十疋棺一具尅日舉哀後魏韓顯宗為著作佐郎孝文曾謂顯宗及程靈虬曰著作之任國史是司卿等之文朕自委悉中省之品卿等所聞若欲取况古人班馬之徒固自遼闊若求之當世文學之能卿等應推崔孝伯又謂顯宗曰見卿所撰燕志及在齊詠大勝比來之文北齊魏收散騎常侍修國史武定三年除正常侍領兼中書侍郎仍修史神武謂收曰卿勿見陳元康等在吾目下趨走謂吾以為勤勞我世身名在卿手勿謂我不知尋加兼著作郎隋郎茂大業中為尚書左丞撰州都圖經一百卷奏之賜帛三百段裴矩為吏部尚書大業初西域諸蕃塞與中國互市煬帝遣矩監其事矩撰西域圖三卷入朝奏之帝大悦賜物五百叚唐房𤣥齡為左僕射貞觀十年正月與侍中魏徴散騎常侍姚思廉太子右庻子李百藥孔穎達守禮部侍郎令狐徳棻守中書侍郎岑文本中書舎人許敬宗等撰成周隋陳齊梁等五代史詣闕上之太宗勞之曰朕覩前代史書彰善癉惡足為將來之戒秦始皇奢滛無度志存隱惡焚書坑儒用緘談者之口隋煬帝雖好文儒尤疾學者前世史籍竟無所成數代之事殆將泯絶朕意則不然將欲覽前王之得失為在身之龜鏡公軰以數年之間勒成五代之史深副朕懷極可嘉尚於是進級班賜各有差高士廉為吏部尚書貞觀十二年與黄門侍郎韋挺禮部侍郎令狐徳棻兼中書侍郎岑文本撰氏族百卷太宗稱善頒賜進級各有差敬播為著作郎與司空房𤣥齡給事中許敬宗貞觀十七年上所撰高祖今上實録各二十卷𤣥齡以下班賜進級各有差禇遂良為中書令貞觀二十年詔修晉書以司空房𤣥齡及遂良太子左庻子許敬宗掌其事又詔中書舎人來濟著作郎陸元仕劉子翼守主客郎中盧承基太史令李淳風太子舎人李義府薛元超起居郎上官儀主客員外郎崔行功刑部員外郎辛元馭著作佐郎劉裔之光禄主簿楊仁卿御史主簿李延壽校書郎張文恭竝當時屬文之士分功撰録莫不博考前文傍求遺逸芟夷繁雜舉其精要又令前雅州刺史令狐徳棻太子司議郎敬播主客員外郎李懐安屯田員外郎李懐儼詳其條例重加考正以臧榮緒晉書為本捃摭諸家傳記而附益之數載而書就頒賜加級各有差長孫無忌為太尉受詔與史官同續修貞觀實録永徽五年閏五月畢功詣闕表上之起貞觀十五年至二十三年五月勒成二十卷帝覽而歔欷無忌等賜爵加級布帛各有差于志寧為太子太傅尚書左僕射先詔太尉長孫無忌與志寧及中書令兼太子詹事崔敦禮與禮官國子祭酒崇賢館文士令狐徳棻中書侍郎兼檢校右庻子𢎞文館學士李義府著作郎崇賢館學士劉裔之著作郎楊仁卿起居郎𢎞文館直學士顧裔符璽郎李延壽兼秘書郎𢎞文館直學士張文恭等修撰國史依紀傳之體凡八十一卷顯慶元年七月勒成無忌等詣闕上之詔無忌已下加爵賜布有差許敬宗為中書令與中書侍郎許圉師著作郎楊仁卿等受詔撰貞觀二十三年以後至顯慶三年至公凡成二十卷顯慶四年二月畢功奏上之封敬宗子曰為新城縣男國子祭酒令狐徳棻進封彭陽縣公中書侍郎許圉師封平恩縣公太史令李淳風封昌樂縣男著作郎北平縣男楊仁卿著作郎餘杭縣男顧裔竝加朝議大夫竝賞修實録之功也李延壽為符璽郎撰南北史一百八十卷卒高宗詔曰故符璽郎李延壽藝文該洽材兼良史撰政典一部詞殫直筆雖其人已亡功有可録宜賜其家絹五十疋仍令詳正所冩兩本付秘書一本賜皇太子武三思為左散騎常侍静徳郡王與中書令齊國公魏元忠禮部尚書魯郡公祝欽明及史官太常少卿徐彦伯秘書少監柳冲韋承慶國子司業崔融中書舎人岑羲徐堅撰則天大聖皇后實録為三十卷編次文集一百二十卷神龍二年五月奏之帝稱善降璽書勞問三思賜物二千段魏元忠賜物千段仍封其子衛王諮議參軍昇為任城縣男祝欽明進爵魯國公賜物八百段徐彦伯等各賜爵二等賚物五百段竇懐貞為左僕射與侍中魏知古中書令蕭至忠崔湜中書侍郎陸象先左散騎常侍柳冲太子詹事徐堅左庻子劉子元先天二年三月奏上所修姓族系録二百卷懐貞已下加爵賜物各有差劉子𤣥為左散騎常侍修國史開元四年與吳兢撰則天實録四十卷成以聞又引古義白於執政宰相姚崇奏曰伏見貞觀十七年監修國史房元齡與史官給事中許敬宗著作佐郎敬播修高祖實録二十卷成制封𤣥齡一子為縣男賜物一千段敬宗一子為高陽縣男賜物七百段敬播改授太子司議郎賜物五百段仍竝降璽書褒美又神龍二年五月監修國史中書令魏元忠與史官太常少卿徐彥伯國子司業崔融等修則天實録三十卷成制封元忠一子為縣男賜物一千段彥伯等各賜爵二等物五百段自餘卑官加兩階物段准處分仍竝降璽書褒美今史官劉子𤣥吳兢等撰睿宗實録又重修則天中宗實録竝成進訖准撰太宗實録例益修官已下加爵及賜命子元等經臣援引古今欲臣聞奏臣謹尋故事例有恩賞事屬當時不可為准子𤣥等始末修撰誠亦勤勞叙事紀言所縁雖重承恩賞賜固不在多子元吳兢望各賜物一百段許之一云子元以修則天實録封言巢縣子吳兢神龍中與韋承慶劉子元等撰則天實録成轉起居郎俄遷水部郎中丁憂還鄉里開元三年服闋抗疏言曰臣先修史已成數十卷自停職家貧無紙札乞終餘功乃拜諌議大夫依前修史開元六年七月表乞典郡曰臣自掌史東觀十有七年歲序徒淹勤勞莫著不能勒成大典垂誡将來顧省微躬乆妨賢路乞罷今職别就他官至於治人之政在兢尤所詳曉望令試典一郡刺舉外臺必當効績循良不負朝寄又兢父致仕已來俸料斯絶所冀禄秩稍厚甘脆有資烏鳥之誠幸垂矜察帝親札報曰天子臨書是為盛業史官秉筆必佇良才著作彊記洽聞時議咸許牧州典郡此類何求豈轉要以從閑乃迴難而就易私願或惬公道若何八年詔其父鄭州長史處敬為鳳州刺史仍聽致仕以兢修國史故也賈躭為宰相貞元十四年躭獻九州圖并别録通録十卷徳宗賜内廐馬一匹錦綵二百疋銀缾盤各一十七事躭又上海内華夷圖及古今郡國縣道四夷述徳宗覽而善之賜錦綵二百疋袍段六錦帳二銀缾盤各一銀榼二馬一匹令狐峘為起居舎人撰𤣥宗代宗實録順宗初卒元和三年以修實録功追贈工部尚書裴垍監修國史元和五年十二月與諸史官進徳宗實録五十卷憲宗覽而稱善乃賜垍繒錦三百疋及銀器等以秘書少監史館修撰蒋武後名乂為諌議大夫直史館密縣尉樊紳為左拾遺内供奉咸陽縣尉韋處厚為右拾遺内供奉萬年縣丞林寳為太常博士竝仍舊職李吉甫為宰相元和八年二月進所撰元和州郡圖三十卷賜錦綵二百疋銀椀盤各一路隨為翰林侍講學士諫議大夫韋處厚為中書舍人長慶二年十月勑隨等常在史館才行可稱伏以憲宗實録未修切資論撰宜兼史館修撰其學士如故又勑路隨韋處厚且止後分日入史館修實録未畢之間且許不入内署仍放朝參至太和四年三月隨以宰相監修國史表上憲宗實録賜隨及見在史史官司封郎中蘇景裔起居舎人陳夷行屯田員外郎李漢右拾遺蒋係各錦綵銀器有差王彥威為户部侍郎判度支撰唐典自武徳終永貞成一部七十卷文宗嘉之賜以錦綵銀器李紳為宰相監修國史㑹昌三年與修撰官鄭亞等再修憲宗實録畢進上賜銀器錦綵有差魏謩為中書侍郎平章事監修國史大中八年修文宗實録四十卷上之史官給事中盧躭太常少卿蒋偕司勳員外郎王渢右補闕盧告膳部員外牛藂皆頒賜銀器錦綵序遷職秩後唐趙鳳為宰相監修國史天成四年上新修懿祖獻祖太祖紀年録共二十卷荘宗實録三十卷鳳及修撰張昭遠吕咸休各賜繒綵銀器等晉姚顗後唐門下侍郎平章事監修國史清泰三年上明宗實録三十卷同修撰官中書舎人充史館修撰張昭逺授尚書禮部侍郎中書舎人充史館修撰李詳加中大夫上柱國竝依前充職户部郎中充史館修撰程渥授右諫議大夫左拾遺充史館修撰吳承範授左補闕充職右拾遺直史館楊昭儉授殿中侍御史各頒賜有差漢賈緯仕晉為起居郎天福六年奏曰伏覩史館唐高祖至代宗已有紀傳徳宗至文宗亦存實録武宗至隂濟廢帝凡六代唯有武宗實録一卷餘皆闕落臣今采訪遺文及耆舊傳説編成六十五卷目為唐年補遺録以備将來史官修述臣聞裴子野之修宋略爰在梁時姚思亷之纂陳書乃於唐世咸因䘮墜景有研尋皇帝陛下與日齊明固天縱聖華山歸馬崇文之道已行虎殿延儒質疑之論斯啓一昨聿宣綸誥精擇史官以李氏受終想唐年遺事雖追名上號其制相沿而創法定儀於文或異恐謡俗之訛變致信實以湮沉将緝亡書以修墜典臣乆居職分深恥闕遺今録淺聞别陳短序伏冀特廻睿鑒俯念愚衷芸閣蓬山誠莫裨於良直蹄涔掬土願少助於高深請下有司用當取證帝覽之嘉歎賜器皿幣帛趙熈為兵部郎中天福六年與吏部侍郎張昭受詔修唐史開運中竟畢其功熈授右諫議大夫昭加金紫光禄大夫進封開國子增食邑二百戸賞筆削之功也一云開運二年史館上新修前朝李氏書賜監修宰臣劉胊修史官張昭直館王仲等繒綵銀器各有差周張昭為兵部尚書與太子詹事劉温叟等顯徳五年撰太祖實録三十卷上之賜物有差冊府元龜卷五百五十四
