body:
  text: 册府元龜卷四百二十二宋王欽若等撰將帥部推誠任能推誠夫誠之至者金石為開信之篤者豚魚咸及況於人乎乃有居師帥之重當金鼔之任因叛臣之猶豫乘麾下之疑問或逼近强寇部曲懐於反側或招降壯士指顧定其向背於是精懇内激勇節兼厲冐不測之險而敵人推服絶持疑之意而偏禆效命坦懐以御下而羣心以安至誠以任人而奇功乃集自非明識邁衆周物而不殆宏量超世獨見而無惑脫畧常瑣之態逈臻㡬繋之表者豈足與議哉魏張遼為禆將軍太祖遣與夏侯淵圍昌狶於東海數月糧盡議引軍還遼謂淵曰數月已來每行諸圍狶輙屬目視遼又其射矢更稀此必狶計猶豫故不力戰遼欲挑與語儻可誘也乃使謂狶曰公有命使遼𫝊之狶果下與遼語遼為說太祖神武方以徳綏四方先附者受大賞狶乃許降遼遂單身上三公山入稀家拜妻子狶乃歡喜隨詣太祖太祖遣狶還責遼曰此非大將法也遼謝曰以明公威信著於四海遼奉聖㫖必不敢害故也晉李矩永嘉初為汝陰太守時大尉荀藩承制建行臺假矩滎陽太守尋表元帝加矩冠軍將軍領河東平陽太守劉琨承制假揚威將軍魏浚河南尹時藩行臺在密縣浚詣藩諮謀軍事藩甚恱要矩同㑹矩將夜赴之矩客屬以浚不可信不宜夜徃矩曰忠臣同心將何疑乎及㑹客主盡歡浚因與矩相結而去劉𢎞為南蠻校尉荆州刺史鎭南大將軍㑹陳敏寇揚州引兵欲西上𢎞乃解南蠻以授前北軍中候蔣超統江夏太守陶侃武陵太守苖光以大衆屯於夏口侃與敏同郡又同嵗舉吏或有間侃者𢎞不疑之乃以侃為前鋒督䕶委以討敏之任侃遣子及兄子為質𢎞遣之曰賢叔征行君祖母年高便可歸也匹夫之交尚不負心何況大丈夫乎陳敏竟不闚境謝尚為豫州刺史都督江西淮南諸軍事時後秦姚襄初為石祗驃騎將軍與高昌李歴戰於麻田馬中流矢頼其弟萇以免晉處襄於譙城遣其弟為佐單騎度淮見尚於夀春尚命去仗衛幅巾以待之一面交欵便若平生宋劉道規為荆州刺史桓𤣥餘黨荀林屯江津桓謙軍屯枝江二寇交逼久絶都邑之問荆楚既桓氏義舊並懐異心道規乃㑹將士告之曰桓謙今在近畿聞諸君頗有去就之計吾東來文武足以濟事若欲去者本不相禁因夜開城門逹曉不閉衆咸憚服莫有去者盧循逼京邑循黨荀林伐江陵桓謙自蜀寇江陵雍州刺史魯宗之率衆數千自襄陽來赴或謂宗之未可測道規乃單馬迎之宗之感恱王景文為江州刺史晉安王子勛起兵以夾轂隊主焦度為先鋒及事敗逃宫亭湖中為寇賊朝廷聞其勇甚憂患之使景文誘降度等度將部曲出首景文以為已鎭南參軍尋領中直兵厚待之梁潯陽王大心為江州刺史進號平南將軍侯景寇京邑大心招集士卒逺近歸之初厯陽太守莊鐵以城降侯景既而又奉其母來奔大心以鐵舊將厚為其禮軍旅之事悉以委之仍以為豫章内史侯景數遣軍西上寇抄大心輙令鐵撃破之賊不能進王僧辯為左衛將軍將兵討河東王譽譽將周鐵虎有膂力譽委遇甚重僧辯於陣擒獲命烹之鐵虎呼曰侯景未滅何以殺壯士僧辯奇其言乃宥之還其麾下及侯景西上鐵虎從僧辯剋任約獲宋子仙每戰皆有功後魏王羆為大都督鎭華州西魏師與東魏師戰河橋不利東魏降卒趙青雀據長安城所在莫有固志羆乃大開州門召城中軍民謂之曰如聞朝廷敗績不知吉凶諸人相驚咸有異心王羆受委於此以死報恩諸人若有異圖可來見殺必恐諸城䧟没者亦任出城如有忠誠能與王羆同心者可共固守軍民見其誠信皆無異志後周趙㫤為大都督行南秦州事又加驃騎大將軍開府儀同三司㫤自以被拔擢居將帥之任傾心下士虜獲氐羌撫而使之皆為㫤盡力文帝曰不煩國家士馬而能威服氐羌者趙㫤有之矣隋李景為代州總管時漢王諒作亂景發兵拒之司馬馮孝慈司法參軍吕玉並驍勇善戰儀同三司侯莫陳崇又多謀畫上拒守之術景知將士可用其後推誠於此三人無所闗預惟在持重時出撫循而已月餘朔州總管楊義臣以兵來援合撃大破之唐田留安武徳中為魏州總管劉黑闥之亂也來攻州城於時山東豪猾多殺長吏以應賊百姓洶洶人懐異志凡諸守將以腹心自衛多所猜防繇是上下情隔怨叛者多留安獨撫結所部示無疑阻但有白事者無問疎逺皆至卧内每謂人曰吾與卿軰同為國守自宜一心無為疑貳也欲棄同即異背順歸逆亦任卿軰斬吾頭而去矣城中父老遞相戒勵子弟曰公以赤心相付何得負之繇是人情遂固郭子儀鎭河中永泰元年僕固懐恩復率蕃虜來寇子儀使喻廻紇曰公等頃年逺渉萬里剪除兇逆恢復二京是時子儀與公等周旋艱難何日可忘今忽棄舊好助一叛臣何其誤也且僕固懐恩棄君忘親於公等何有廻紇曰謂令公歿矣不然何以及此令公誠在安得而見之子儀將出諸將皆曰戎狄不可信也請無徃子儀曰虜有數十倍之衆今力不可敵奈何且至誠感神況虜軰乎諸將請選鐵騎五百為從子儀曰此適足為害也乃𫝊呼令公來虜初疑皆持滿注矢以待之子儀乃以十數騎徐出免胄而勞之曰安乎久同忠義何至於是廻紇皆捨兵下馬拜曰是我父也子儀招首領等各飲以酒與之重錦歡言如初李抱眞興元初為昭義軍節度使與李懐光同討田恱時朱滔王武俊皆反朱泚既汙宫闕李希烈䧟大梁朱滔悉幽薊軍借兵廻鶻擁衆五萬南向以應泚攻圍貝州初羣賊附於希烈無何希烈僭偽有臣屬羣賊心羣心稍離帝自奉天下罪已之詔悉赦羣賊抱真乃遣門客賈林以大義說武俊合從撃朱滔武俊許之時兩軍尚相疑抱眞乃以數騎徑入武俊營其將去也賓客皆止之抱眞遣軍司馬盧𤣥卿勒軍部分曰僕今日此舉係天下安危僕死不還領軍士以聽朝命亦惟子奮勵士馬東嚮雪僕之恥亦惟子言訖而去武俊設備甚嚴抱眞曰朱泚希烈僭竊大位朱滔攻圍貝州此軰皆欲凌駕吾屬足下既不能自振數賊之間舍九葉天子而北面反虜乎聖上奉天下罪已之詔可謂禹湯之主也因言及播越持武俊哭涕泗交下武俊亦哭感動左右因退卧武俊帳中酣寢久之武俊感其不疑待之益恭指心仰天曰此身已許公死敵矣飯訖結為兄弟而别約明日合戰撃破朱滔於經城以功加檢校司空實封五百户馬燧為河陽節度與成徳軍節度王武俊澤潞節度李抱眞同討田恱時抱眞欲殺懐州刺史楊鉥楊鉥奔燧燧納之且奏其無罪抱眞不勝其怒及王武俊逼趙州抱眞分麾下二千人戍邢州燧大怒曰殘賊未除降宜戮力剪撲今分兵歸守本地我寧能獨戰死耶欲引歸李晟諭燧曰初奉詔北討三師齊進李尚書以邢州與趙接壤分兵守之誠未有害且其精卒驍騎盡在於此矣今公遽自引去奈衆議何燧乃疋馬詣抱眞壘與之交歡請釋舊憾時洛州刺史周昻請入朝燧因奏以洛州隸抱眞請盧𤣥卿為刺史兼充魏博招討之副李晟所將神䇿兵馬前時隸抱眞又請兼隸燧以示叶同詔並從之興元初詔燧及渾瑊駱元光同討李懐光於河中燧與渾瑊駱元光韓遊環合軍次於長春宫懐光遣驍將徐廷光以精卒六千守城兵械甚嚴燧度長春不下則懐光自固攻之則曠日持久死傷必甚乃挺身至城下呼廷光廷光素懼燧威名則拜於城上燧度廷光心已屈乃謂之曰我來自朝廷可西面受命廷光復西拜又曰公等皆朔方將士祿山已來首立大勲四十餘年功伐最高奈何棄祖父之勲力為滅族之計耶從吾言非止免罪富貴可圖也賊徒皆不對燧又曰爾以吾言不誠今相去數歩爾當射我乃披襟示之廷光感泣俯伏軍士亦泣先一日賊將尉珪率兵二千以焦籬堡降燧廷光道既絶乃率其下出降燧以數騎徑入城處之不疑莫不畏服衆大呼曰吾復得為王人矣路恕嗣恭子也嗣恭為江南西道都團練觀察使大厯中領南衙將哥舒晃叛詔嗣恭致討授恕檢校工部員外郎得以軍前便宜從事俄而降者繼路於是擢降將伊愼敬晃推心用之賊平恕功居多年纔三十為懐州刺史栁公綽為北都留守河東節度使北虜遣梅祿將軍李暢以馬萬匹來市託云入貢所經州府守帥假之禮分嚴其兵備留館則戒卒於外懼有襲奪太原故事出兵迎之暢及界上公綽使牙將祖孝恭單馬勞問待以修好之意暢感義出涕徐驅道中不妄馳獵及闢牙門令譯引謁宴以常禮及市馬而還不敢侵犯陘北有沙陀部落自九姓六州皆畏避之公綽至鎭召其酋朱邪執宜直抵雲朔塞下治廢栅十一所募兵三千付之留屯塞上以禦匈奴其妻母來太原者請母梁國夫人對酒食問遺之沙陀感之深得其效李愬為唐鄧節度討淮西呉元濟擒賊將丁士良召入與語詞氣不撓愬異之因釋其縛置為促生將士良感之乃曰賊將呉秀琳擁衆數萬不可遽破者用陳光洽之謀也士良能擒光洽以降秀琳愬許之與兵果擒光洽後五日秀琳與其衆五千人來降愬令其降卒有父母者及孤兒未葬悉給財帛以歸之衆皆號泣願為愬死連下城栅擒賊將栁野矛李嘗凑張希岸梁希果愬每怡其氣色親加撫循故山川之險易城鎭之逺邇盡知一旦召諸將曰賊之興橋栅鎭將李祐者奇士我能取之獲祐則元濟為擒必矣乃命部將史用誠馬少良親指教以遣之未㡬果擒祐祐氣畧兼人前後累殺傷王師衆怒請烹之愬不許愬乗間嘗召祐及李忠義屏人而語或至夜分忠義亦降將也本名憲愬改之軍中多以諫愬愬益親祐始募敢死者三千以為突將愬自教習之將襲元濟㑹雨水自五月至十月所在陂澤潰溢不可行行營諸軍皆以愬不殺祐為言慮其誘覆官軍簡牒日至且言得賊諜具其事云云愬無以止之乃持祐泣曰豈天不欲平此賊何爾我一身而見奪於衆口愬又慮諸軍先以謗聞則不能全祐矣乃械祐以送京師先表請釋且言必殺祐則無與成功者比祐至京師詔釋以還愬愬甚喜署為散兵馬使授刀使佩之夜則倚以廵警或夜入愬帳中言事愬因留對舉酒徃徃逹旦聽者時聞祐涕泣聲尋署六院兵馬使時舊軍令有舍賊諜者屠其家愬除其令因使厚之諜反以情告愬益知其虚實是時陳許節度使李光顔勇冠諸軍賊悉其衆出當光顔之師繇是愬乗其無備以十月將襲蔡州先七日使判官鄭澥告師期於裴度乃以李祐帥突將三千為先鋒李忠義副之愬自帥中軍三千人田進誠以後軍三千殿而行初出文成栅衆請所向愬曰東六十里而止至賊境曰張柴圍入之而盡殺其衆令軍士少息分食繕覊靮甲胄發刃彀弓復建斾而出是夜陰晦雨雪大風裂旗斾馬慓而不能躍士卒苦寒抱戈僵仆者道路相望其川澤梁徑險夷張柴已東師人未嘗蹈其境皆謂投身不測初出張柴諸將請所止愬曰入蔡州取元濟也諸將失色監軍使駐馬哭曰果落祐計中矣愬不聽促進師其下皆謂必不還然以愬之令無敢為身計者愬道分五百人斷洄曲路橋其夜凍死者十二三又分五百人斷朗山路自張柴行七十里比至懸弧城夜半雪愈甚城傍有鵝鴨池愬令驚撃之以雜其聲賊恃吳房朗山之固晏然無一人知者李祐李忠義持钁坎城而先登敢銳者從之盡殺守門卒而登其門留撃柝者以安之及雞鳴雪亦止愬以衆入止元濟外宅田進誠續至乃合衆攻其子城子城防卒及雜役者尚千餘人乗城拒戰初有告元濟元濟不信又告曰城䧟矣元濟曰是洄曲子弟歸求寒衣耳及出聽聞號令云常侍傳語乃曰是何常侍乃得至此遽操弓挾刃麾其左右奴僕盡乗城而自督戰愬計元濟猶望董重質來救乃訪重質家安䘏之使其子持書禮召重質重質見子言城已䧟及元濟孤窘之狀又見李祐軰恕死已立奇功乃慨然單騎歸愬白衣叩伏愬前愬揖登階待以賓禮與之食時田進誠既毁其城外門得甲仗庫易其器甲明日復薄城焚其城南門百姓争負薪藁以委之元濟城上請罪進誠授梯而下之愬得元濟檻送京師不戮一人其為元濟執事帳下及廚廐之間盡復其職使之不疑乃屯軍鞠場以候裴度裴度為彰義節度招撫等使既平淮陽蔡人大恱舊令途無偶語夜不燃燭人或以酒食相過從者以軍法論度乃約法惟盜鬭殺外餘盡除之其徃來者不復以晝夜為限於是蔡之遺黎始知有生人之樂度以蔡卒為牙兵或以為反側之子其心未安不可自去其備度笑而答曰吾受命為彰義軍節度使元惡就擒蔡人即吾人也蔡之父老無不感泣申光之民即時平定賈躭為義成軍節度使是時淄青李納雖去偽王號外奉朝㫖而心常蓄併吞之謀納兵士數千人自行營歸路繇滑州大將請城外館之躭曰與人隣道奈何野處其兵士因館之城内淄青將士皆心服之令狐楚為河陽三城節度時烏重𦙍移鎭滄景以河陽銳卒三千為紀綱之僕士卒不願去土中路潰散復不敢歸屯於境上時楚未至聞之即疾驅赴鎭潰卒亦已次城北將大寇掠楚軍楚單車出迎諭以逆順兵士遂弛弓釋甲用之先驅以歸憲宗素嘉其功旋急詔徵拜中書侍郎同平章事梁李茂貞為鳯翔節度性至寛有部將符昭者人或告其謀變茂貞親至其家去牙爪熟寢經宿而還任能夫良將之為政也豈特專握旄節獨運智力故必虚懐容衆推已及物不憑勢以自大不固祿而忌進思得能者引以共濟則有取於鄉閭拔自卒乗隨其指顧備用非一或采幕府之俊委以經畧或選偏裨之傑置諸顔行或聽僉議之攸歸或敦素志之所慕大者列奏以請小者便文自命至有釋去前憾待如親友捨諸過咎聽效謀勇輪轅之用各適宜稱務取奇勝曷嘗廢人故雖盜之穿窬亦無棄其蛛螯之巧耳子發為楚將好求技道之士楚有善為偷者徃見曰聞君求技道之士臣偷也願以技賫一卒賫備也足也子發聞之衣不給𢃄冠不暇正出見而禮之左右諫曰偷者天下之大盜也何以禮之君曰此非左右之所得與無㡬何齊興兵伐楚子發將帥以當之兵三却楚賢良大夫皆盡其計而悉其誠齊師愈强於是市偷進請曰臣有薄技願為君行之子發曰諾不問其辭而遣之偷則夜解將軍之帷帳而獻之子發因使人歸之曰卒有出薪者得將軍之帷使使歸之於執事明日又復徃取其枕子發又使人歸之明日又復徃取其簪子發又使人歸之齊師聞之大駭將軍與軍吏謀曰今日不去楚軍恐取吾頭則還師而去漢李廣利為貳師將軍伐大宛分校尉王申生等軍别至郁成郁成城守不肯給食攻殺申生等郁成國名貳師令搜粟都尉上官桀徃攻破郁成郁成降其王亡走康居桀追至康居康居乃出郁成王與桀後漢祭遵為征虜將軍屯良鄉拒漁陽太守彭寵因遣䕶軍傅𤣥撃破寵將李豪於潞馬防行車騎將軍事建初二年撃金城隴西保塞羌軍到冀而羌豪布橋等圍南部都尉於臨洮道險防乃别使兩司馬將數百騎分為前後軍擊破之羌又敗戊己校尉耿恭司馬及隴西長史於和羅谷防遣司馬夏駿將五千人從大道又潛遣司馬馬彭將五千人從間道衝其心腹又令將兵長史李調等將四千人從其西三道俱撃破之竇憲為大將軍永元二年將兵鎭武威憲以䕶羌校尉鄧訓曉羌胡方畧上求俱行魏鍾繇為司𨽻校尉鎭闗中袁尚拒太祖於黎陽遣所置河東太守郭援并州刺史高幹及匈奴單于取平陽發使西與闗中諸將合從繇遣新豐令張既說將馬騰等既為言利害騰等從之遣子超將兵萬餘人與繇㑹撃幹援大破之斬援首幹及單于皆降蜀諸葛亮為丞相大將軍率諸軍北駐漢中以魏延為督前部領丞相司馬以楊儀為長史延善養士卒勇猛過人又性矜高當時皆避下之惟儀不假借延延以為至忿有如水火儀嘗規畫分部籌度糧榖不稽思慮斯須便了軍戎節度取辨於儀亮深惜儀之才幹憑魏延之驍勇嘗恨二人之不平不忍有所偏廢也吳孫皎為征虜將軍督夏口委廬江劉靖以得失江夏李允以衆事廣陵吳碩河南張梁以軍旅而傾心親待莫不自盡孫瑜為奮威將軍領丹陽太守自溧陽徙屯牛渚瑜以永安人饒初為襄安長無錫人顔連為居巢長使招納廬江二郡各得降附晉羊祜為征南大將軍開府時王濬參祜征南軍事祜深知之祜兄子暨白祜曰濬為人志大奢侈不節不可專任宜有以裁之祜曰濬有大才將欲濟其所欲必可用也轉車騎從事中郎識者謂能舉善焉後濬為益州刺史徵拜右衛將軍祜雅知濬有奇畧乃密表留濬於是重拜益州刺史庾翼為安西將軍鎭武昌時將兵都尉錢頎陳事合㫖翼拔為五品將軍宋宗慤為廣州刺史時始興王征北長流參軍沈懐逺坐納王鸚鵡為妾徙廣州慤欲殺之㑹南郡王義宣反懐逺頗閑文筆慤欲討義宣使造檄書并銜命至始興與始興相沈法系論起義事事平慤具為陳請繇此見原南齊沈文季為僕射建武二年魏軍寇夀春詔文季領兵鎭夀春以寧朔將軍張稷為副魏衆稱百萬圍城累日經畧處分文季悉委稷焉張冲以郢州刺史督河北軍事時武寧太守鄧元起戍三闗累與冲書求旋軍冲報書曰足下在彼吾在此表裏之勢所謂金城湯池一旦捨去則荆棘生焉乃表元起為平南中兵叅軍事蕭頴胄為和帝相國左長史號鎭軍將軍義師起頴胄引樂藹及宗史劉坦任以經畧後魏李崇為都督孝明時六鎭反叛詔輔國將軍費穆為别將𨽻崇北伐都督崔暹失利崇將班師㑹諸將議曰朔州是北道之衝賊之咽喉若此處不全則并肆危矣今欲選諸將一人留以鎭守不知誰堪此任僉曰無過穆者崇乃請為朔州刺史李平孝明時以鎭軍大將軍為行臺拒梁師於硤石詔陽固為行臺七兵郎中平奇固勇敢軍中大事悉與謀之又命固節度水軍固設奇計先期乗賊獲其外城蕭寳夤為車騎大將軍開府西道行臺啓統軍李瑒為左丞仍為别將軍機戎政皆與參決上黨王天穆録尚書事主客郎中温子昇嘗一日不直天穆捶撻之子昇遂逃遁及天穆將討邢杲召子昇同行子昇未敢應天穆謂人曰吾欲收其才用豈懐前忿也今復不來便須南走越北走胡耳子昇不得已而見之加伏波將軍為行臺郎中天穆深知賞之安樂王鑒為北道大行臺至鄴以賊衆强未得前遣使徵趙郡人武愍表授武騎常侍假節别將鎭鄴城東郭葛榮之圍信都餘黨南抄陽平以北皆為賊有鑒命愍為前驅别討之頗有斬獲北齊清河王岳率師南伐至於江上梁司徒陸法和儀同宋􅉅等率其部下以郢州城内附岳乃集諸軍議曰城在江外人情尚梗必須才畧兼濟智勇過人方可受此寄耳衆咸共推開府慕容儼岳以為然遂遣鎭城後周齊王憲初封齊公與晉公䕶東征北齊欲以隆州刺史陸騰為副趙公招在蜀復留之晉公䕶與招書曰今朝廷令齊公掃蕩河雒欲與此人同行汝彼無事且宜借吾也於是命騰馳𫝊入朝副憲東討隋楊素為内史令未㡬吳郡沈𤣥懀浙江賊帥高智惠等作亂以素為行軍總管討之素以開府魚俱羅壯勇請與同行每戰有功加俱羅上開府李景為代州總管時漢王諒作亂景發兵拒之司馬馮孝慈司法叅軍吕玉並驍勇善戰儀同三司侯莫陳崇又多謀畫工拒守之術景知將士可用其後推誠於此三人無所闗預惟在閣持重時出撫循而已月餘朔州總管楊義臣以兵來援合撃大破之唐河間王孝恭武徳中為信䕫二州總管時李靖亦奉使江南以䇿干孝恭孝恭善之委以軍事於是繕器械悉召犍牂巴渝首領子弟量才授職典左右兵杜希望為河西節度使時王忠嗣從軍河西以功檢校代州刺史坐法貶東陽府左果毅㑹希望謀取新城或言忠嗣之才足以輯事希望奏聞詔追忠嗣赴河西既下新城忠嗣之功居多授左威衛郎將專知行軍兵馬張守珪為幽州大都督兼范陽節度使安祿山盜羊事發守珪怒追捕至欲撃殺之祿山大呼曰大夫不欲滅奚契丹兩蕃耶而殺壯士守珪奇其貎壯其言遂釋之令與兩蕃將史思明捉生祿山素習山川井泉嘗以撃賊領麾下十數騎出即生擒奚契丹數十人守珪轉奇之每加兵令徃必倍擒賊而還後為守珪偏將隨征戰所向皆摧靡守珪遂養為巳子哥舒翰為隴西節度使以王思禮為押衙天寳二三載吐谷渾蘇毗主有誠欵翰至磨環川應接之思禮墜馬損脚翰謂中使李大宜曰思禮既損脚更欲何處去十四載安祿山反翰奏思禮為開府儀同三司兼大常卿同正員充元帥兵馬都使軍事每獨與思禮決之吕諲上元初為荆南節度使諲初為隴右判官素諳諸將及赴任又奏數十人為押衙兵馬使自隨皆伏其威惠郭子儀為東都及山南東道河南諸道行營元帥時史思明判官邵說厯事思明朝義掌兵事朝義之敗説降於軍前子儀愛其才留於幕嚴武初為劍南西川節度使薦崔寧為利州刺史及武再任過利州心欲辟寧為部將以利非屬部寧難輒去俾寧自籌寧曰節度使張獻誠見忌且又好利誠皆重賄之寧可以從大夫矣武至劍南遺獻誠奇錦珍貝價兼百金獻誠大悦武又有書欲召寧獻誠然之寧即日稱疾棄官之劍南武奏為漢州刺史路嗣恭為江南西道都團練觀察使大厯八年嶺南將哥舒晃殺節度使吕崇賁反五嶺騷擾詔加嗣恭兼嶺南節度觀察使嗣恭擢流人孟瑶敬冕使分其務瑶主大軍當其衝冕自間道輕入招集勇敢得八千人以撓其後二人皆有全䇿詭計出其不意遂斬晃及誅其同惡萬餘人築為京觀俚洞之宿惡者皆族誅之五嶺削平李寳臣為成徳軍節度使與朱滔戰於瓦橋嘗慮滔來攻故乃以飛狐城高陽軍使張孝忠為易州刺史選精卒七千配焉前後十年威惠甚著李希烈為淮西節度使時吳少誠為荆南節度使庾凖為衙門將凖入覲從至襄漢見梁崇義不繇憲度知有異志少誠密計有成擒之畧將自陳於闕下屬希烈初授節度銳意立功見少誠深與計慮乃以少誠所見録奏有詔慰飭不次封通義郡王未㡬崇義違命希烈受制專征以少誠為前鋒遂平崇義劉元佐建中初為宋亳節度使召平盧軍使劉政臣子全諒入軍中為將以勇果騎射聞元佐以宗姓厚遇之累署都知兵馬使嗣曹王臯為湖南都團練觀察使擢團練營將王鍔使招邵州武崗叛將王國良有功表為邵州刺史及臯改江南西道節度至州乃大集將吏令曰嘗有功而未申者可别為行有䇿謀及器能可以佐軍者亦别為行於是裨將伊愼李伯潛劉旻皆自占臯察愼等詞氣甚壯又知其前功乃悉補大將又擢王鍔委之中軍以馬彛許孟容為之賓介繕甲兵具戰艦得軍三萬餘李希烈南侵臯請鍔屬以勁兵三千鎭尋陽臯自以全軍歸九江既襲得蘄州盡以衆渡乃表鍔為江州刺史充都虞侯先是伊愼將江西兵從李希烈平襄州及希烈反懼臯任之乃陰遣遺之鏁甲又詐為愼書徃復置於境徳宗聞即遣中使斬慎臯表請捨慎令自効㑹與賊夾江為軍中使又至臯乃勉之令以功自贖賜之以所乗馬及器甲令將前鋒而率軍繼之責其有功果大破之斬首數百愼方得免罪及臯為荆南節度使表鍔為江陵少尹兼御史中丞欲列於賓倅馬尋裴泰鄙鍔請去乃復以為都虞候馬燧為河東節度署奏李自良為代州刺史兼御史大夫仍為軍候自良勤恪有義燧深委信之魏博田恱叛燧與李抱眞同討自良嘗為河東軍大將摧鋒䧟陣遂破田恱及討李懐光於河中自良專為都將前後戰功居多燧之立功名繇自良叶輔之力也李晟建中末為副元帥討朱泚時諫議大夫鄭雲逵自奉天來奔京兆司録李敬仲持府印攝節度判官又以懐光舊將唐朝臣保潼闗請以河中五州節度授朝臣戴休顔唱義以奉天從順請以鄜坊四州節度授休顔徳宗皆從之韓全義貞元末為神䇿行營節度長武城使時兵馬使高崇文隨全義鎭長武理軍有聲全義入覲委崇文掌行營節度留務長武城使積粟練兵軍聲大震嚴礪元和初為山南西道節度時西川劉闢阻兵礪儲備有素㧞嚴秦為都將畧獻俘馘繇是加檢校左僕射栁公綽元和中為鄂岳都團練觀察使吳元濟據蔡州叛王師討伐詔公綽以鄂岳兵五千𨽻安州刺史李聽率赴行營公綽曰朝廷以吾儒生不知兵耶即日上奏願自征行許之公綽自鄂濟湘江直抵安州李聽以廉使之禮事之公綽謂之曰公所以屬鞬負弩者豈非為兵事耶若去戎容被公服兩郡守耳何所統攝乎以公名家曉兵若吾不足以指揮則當赴闕不然吾且署職名以兵法從事矣聽曰惟公所命即署聽為鄂岳都知兵馬使中軍先鋒行營馬歩軍都虞候三牒授之乃選卒六千屬聽戒其部校曰行營之事一決都將聽感恩畏威如出麾下裴度以丞相東征淮蔡奏高崇文子嘉王傅承簡以本官兼御史中丞為其軍都押衙淮西平詔以郾城上蔡遂平三縣為殷州治郾城用承簡為刺史李愬為唐鄧節度討淮西擒吳元濟將李祐祐有膽畧愬釋其死厚遇之而衆情歸怨愬因送祐京師且上表救之而朝廷遣祐還愬大喜即以三千精兵屬之祐所言無有疑者故破蔡之日宻謀多出於祐淄青李師道再叛乃移愬為武寧軍節度使愬至徐方理兵有方畧時蔡將董重質貶秦州司户愬上表請恕重質於軍前驅候即詔徴還送武寧軍愬乃署牙將烏重𦙍為河陽三城節度使討吳元濟於淮西請寧州刺史曹華為懐汝節度行營副使華前後數十戰大破賊於青陵城賊平授棣州刺史封陳留郡王册府元龜卷四百二十二
