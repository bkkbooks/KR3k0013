body:
  text: 冊府元龜卷九百六十六宋王欽若等撰外臣部繼襲小雅著似續之訓春秋有世及之義盖所以象賢濟美克承基緒者也雖復要荒之外戎蠻之國亦乃崇樹世嫡襲其位號傳國延祚享年永乆其間知人如宋宣讓國如魯隠愛才如呉謁得位如晉文雖曰夷狄有足稱者自餘女子為後彊臣逆取是不一姓何常之有系而言之亦所以紀其興㓕之迹矣東夷朝鮮自武王封箕子其後四十餘年至朝鮮侯凖自稱王漢初燕人衛滿擊破凖而自王朝鮮傳國子孫右渠髙句驪漢初其王髙朱蒙死子如栗立如栗死子莫來立漢武既滅朝鮮以髙句驪為縣王莾更名下句驪侯後漢建武八年遣使朝貢光武復其王號裔孫宫建光元年死子遂成立遂成死子伯固立伯固死有二子長子㧞竒小子伊夷摸㧞竒不肖國人便立伊夷摸為王伊夷摸死子位宫立始位宫曽祖宫生而目開能視國人惡之及長凶虐國以殘破及位宫亦生而視人髙麗呼相似為位以為似其曽祖宫故名位宫其後位宫𤣥孫乙弗利立乙弗利死子釗立釗為百濟所殺至後魏大武時釗曽孫璉遣詣安東奉表貢方物封璉為遼東郡公髙句驪王太和十五年璉死年百餘嵗孫雲立神龜中雲死世子安立安死子延立延死子成立成死子湯立周武帝封湯為遼東王隋髙祖改封髙麗王湯死子元嗣唐髙祖武徳二年元弟建武遣使朝貢貞觀十六年西部大人盖蘇文殺建武立其弟大陽子藏為王十七年太宗封藏為遼東郡王儀鳳中改朝鮮王永淳初藏卒垂拱二年封藏孫寳元為朝鮮郡王聖歴元年改為忠誠國王後唐同光天成中其王姓髙長興三年其王曰王建晉開運二年建卒子武嗣漢乾祐末武卒子昭立百濟晉義熈十二年封其王餘映為百濟王宋元嘉七年其王餘毘復修職貢以映爵號授之毘死子慶代立慶死子牟都立牟都死子牟大立梁普通二年其王餘隆遣使朝貢五年隆死子明襲其王號北齊武平元年以其王餘昌為百濟王隋開皇中昌死子璋立唐髙祖武徳七年冊為𢃄方郡公百濟王貞觀十五年璋卒子義慈遣使告哀太宗冊義慈襲其王號顯慶五年左衛大將軍蘇定方大破其國虜義慈及太子隆送於京師龍朔元年百濟僧道琛舊將福信遣使往倭國迎故王子扶餘豐立為王髙宗命𢃄方州刺史劉仁軌討之詔以扶餘隆為熊津都督遣還本國儀鳯二年進𢃄方郡王其百濟本地漸為新羅所據隆不敢還遂卒則天以其孫敬襲封帯方郡王新羅王本百濟人自海逃入新羅遂王其國傳世三十至金真平隋開皇十四年封樂浪郡公新羅王唐貞觀五年真平卒無子立其女善徳為王襲樂浪郡公新羅王號二十一年善徳卒立其妹真徳為王永徽五年真徳卒弟相國金春秋嗣龍朔元年春秋卒詔其子太府卿法敏嗣開耀元年法敏卒其子政明嗣天授三年政明卒其子理洪嗣長安二年理洪卒立其弟興光為新羅王開元二十五年興光卒其子承慶襲天寳二年承慶卒其子憲英襲大厯二年憲英卒其子乾運襲建中四年乾運卒無子國人立其上相金良相為王貞元元年良相卒立上相敬信為王襲其官爵敬信良相從兄弟也十四年敬信卒其子先亡國人立敬信嫡孫俊邕為王十六年俊邕卒其子重興立元和七年重興卒立其相金彦昇為王太和五年彦昇卒其子景徽嗣後唐同光元年其王金朴英長興四年權知國事金溥並遣使朝貢倭國後漢光和中有女王名卑彌呼魏正始中卑彌呼死更立男王國中不服更相誅殺復立卑彌呼宗女臺與為王其後復立男王並受中國爵命晉安帝時倭王贊死弟彌立彌死子濟立宋元嘉二十年濟死世子興立興死弟武立隋開皇二十年其王姓阿每字多利思北孤號阿軰雞彌遣使朝貢南越王趙佗漢髙帝十一年立為南越王建元四年佗卒孫胡為南越王胡薨太子嬰齊立先是嬰齊入宿衛在長安時取邯鄲樛氏女生子興及即位上書請立樛氏女為后興為嗣及嬰齊薨太子興代自尉佗王凡五世九十三嵗而亡閩越王無諸漢髙帝五年立為閩越王王閩中故地建元六年其王郢擊南越為其弟餘善所殺詔立無諸孫繇君丑為越繇王奉閩越先祭祀餘善已殺郢威行於國國人多屬竊自立為王繇王不能制天子聞之因立餘善為東越王與繇王並處元封元年為漢所滅東海王揺漢恵帝三年立為東海王都東甌世從號為東甌王後數世為閩越所滅林邑國漢末象林縣功曹姓區有子連殺令自立為王子孫相承其後王無嗣外孫范熊代立熊死子逸立南齊時夷人范當根純簒奪林邑自立為王後林邑王范陽邁子孫范諸農率種人攻當根純復得本國梁天監九年其王范天凱立十三年病死弼毳䟦摩立唐武徳六年其王曰范至貞觀四年其王曰范頭黎並遣使朝貢頭黎死子范鎮龍代立鎮龍為國人所殺乃立頭黎女婿婆羅門為王後大臣及國人感思舊王乃廢婆羅門而立頭黎之嫡女為王一説永徽總章中其王曰鉢迦舍䟦摩先天開元中其王建多達摩天寳中其王盧陁羅並遣使朝貢至徳後改稱環王國不以林邑為號永泰元年林邑王諸農入朝海中遭風溺死代宗以其子文欵為假節都督縁海軍事安南將軍林邑王赤土國其王姓瞿曇氏名利富多塞稱其父釋王位出家為道傳位于利富多塞朱江國其王姓刹氏名質多斯那自其祖漸已强盛至質多斯那遂兼扶南而有之質多斯那死子伊奢那先代立西南夷東謝蠻其首領謝元深世為酋長唐貞觀三年元深與南謝首領謝強來貢貞元十三年西南蕃大酋長繼襲蠻州刺史宋鼎左右大首領卭州刺史謝汕隨牂牱朝貢西趙蠻首領趙氏世為酋長唐貞觀三年以其地置明州首領趙磨為刺史牂牱蠻首領謝龍羽唐武徳三年授牂州刺史封夜郎公開元十年大酋謝元齊死詔立其孫嘉藝襲其官封二十五年大酋長趙君道來朝貢貞元七年授其酋長趙主俗官南詔王姓蒙氏唐初有蒙舍龍生迦獨龎迦獨生細奴羅髙宗時來朝細奴邏生邏盛則天時來朝開元初邏盛死子盛邏皮立盛邏皮死子皮邏閤立𤣥宗封越國公賜名歸義其後破洱河蠻以功冊授雲南王天寳七載歸義卒詔立子閤羅鳳襲雲南王大歴十四年閤羅鳳死子迦異先死乃立迦異子是為異牟尋元和三年異牟尋死冊其子驃信蒙蒙閤勸為南詔其後有龍蒙盛蒙􅀢顛皆為南詔西羌無弋爰劍者秦厲公時諸羌推以為豪其後世世為豪從爰劍種五世至研研最豪徤自後以研為種號十三世至燒當復豪健其子孫更以燒當為種號自燒當至𤣥孫滇良世居河北大允谷滇良死子滇吾立滇吾降漢子東吾立乃入居塞内氐者西夷之别種後漢建安中有楊騰者為部落大帥騰子駒徙仇池地方百頃因以為號魏拜為百頃王至其孫名飛龍無子養外甥令狐戊捜為子晉元康中羣氐推以為主愍帝以為驃騎將軍封左賢王戊捜死子難敵統位自號左賢王屯下辯弟堅頭分部曲號右賢王屯河池難敵死子毅立自號左賢王下辯公以堅頭子槃為右賢王河池公毅族兄初襲殺毅并有其衆自立為仇池公永和十年改封初為天水公十一年初為小弟宋奴所殺初子國誅宋奴復自立為仇池公十二年國從叔俊復殺國自立國子安奔苻生俊乃稱藩於晉及死子世自立為仇池公太和三年以世為秦州刺史弟統為武都太守世死統廢世子纂自立纂黨襲殺統自立為仇池公遣使詣闕簡文帝以纂為秦州刺史咸安元年苻堅遣楊安伐纂克之徙其民於闗中空百頃之地先是宋奴之死二子佛奴佛狗逃奔苻堅堅以女妻佛奴子定拜為尚書領軍堅之敗定奔隴右徙居歴城招夷夏千餘家自稱龍驤將軍仇池公稱藩於晉孝武以為秦州刺史後魏登國四年遂有秦州之地號隴西王後為乞伏乾歸所殺無子佛狗子盛先為監國守仇池遂襲位自號征西將軍秦州刺史仇池公諡定為武王義熙初以盛為征西大將軍仇池公盛死私諡曰惠文王子𤣥統位始光四年拜𤣥為征西大將軍北秦州刺史武都王𤣥死私諡孝昭王子保宗統位初𤣥臨終謂弟難當曰今境候未寜方須撫慰保宗冲昧吾授卿國事其無墜先勲難當固辭請立保宗以輔之保宗既立難當妻姚氏謂難當曰國險宜立長君返事孺子非乆計難當從之廢保宗而自立太武拜難當為征南大將軍秦梁二州刺史南秦王難當為宋將裴方明所敗棄仇池奔上邽太武遣中山王辰迎之方明既尅仇池以保宗弟保熾守之河間公齊擊走之氐羌立保宗弟文徳屯于濁水太武遣中山王辰迎之文成時拜難當營州刺史卒諡曰忠和子小眼襲爵例降為公拜天水太守卒子公熈襲爵初宋將裴方明既尅仇池以保宗弟保熾守之尋為後魏河間公齊擊走氐羌立保宗弟文徳屯於濁水又為皮豹之所擊保宗之執也子元和奔宋以為武都白水太守元和據城歸順文成嘉之拜征南大將軍武都王内徙京師元和從叔僧嗣復自稱武都王於葭蘆僧嗣死從弟文度自立為武興王孝文初征西將軍皮歡喜攻葭蘆破之文度弟䑕自立為武興王奉表謝罪孝文拜鼠都督南秦州刺史征西將軍西戎校尉武都王䑕死從子後起統位孝文復以䑕爵授之後起死以䑕子集復為武興王集死子紹先立紹先年㓜委事二叔集起集義後為建武將軍傅竪眼所破執紹先送京師遂滅其國魏末天下亂紹先奔還武興復自立為王紹先死子辟邪立周太祖討平之乃以大將軍宇文貴為都督興州刺史宕昌羌後魏時有梁勒者世為酋帥得羌豪心乃自稱王焉勒孫彌忽太武初遣子彌黄奉表求内附拜為宕昌王彌忽死孫彪子立彪子死彌治立彌治死子彌機立東女國本西羌之别種俗以女為王號為賔就唐武徳中其王湯滂氏垂拱二年其王歛臂天授三年其王俄琰兒爾並遣使朝貢天寳元年封其王趙曵夫為歸昌王是後以男子為王貞元九年其王湯立悉内附授歸化州刺史吐蕃本西羌之種國人號其王為贊普唐永徽元年贊普賓王弄讚薨弄讚子早死其孫繼立復號贊普時年㓜國事皆委於其相禄東贊禄東贊死其子欽陵復専其國儀鳯四年不夜贊普卒嫡子噐弩悉弄即大臣麴薩苦之甥也先與薩苦往年同徵發兵馬聞䘮歸國繼位為贊普時年八嵗其弟年六嵗時在欽陵之軍國人以欽陵彊盛又欽奉之為主欽陵廹於大義竟與薩苦恊心器弩悉弄位始定神龍元年器弩悉弄卒諸子爭立乆之國人立其子棄𨽻蹜贊為贊普時年七嵗天寳十四載贊普乞黎蘇籠獵贊死大臣立其子婆悉籠獵贊為贊普貞元十三年卒長子立一嵗卒元和十二年㑹昌二年皆以贊普卒來告西域罽賔國漢武帝時其王烏頭勞死子代立遣使奉獻唐顯慶三年遣使朝貢訪其國俗云王始祖馨孽今曰曷擷支父子傳位已十二代其年改其城為脩鮮府龍朔初授其王都督十一州諸軍事開元七年冊其王為葛邏達支特勒二十七年其王烏散特勒灑以年老上表請嫡子拂菻罽婆嗣位許之天寳四載又册其子勃匐准為襲罽賔及烏萇國王仍授右驍衛將軍烏孫漢武帝時其昆莫有十餘子中子大祿彊善將將衆萬餘騎别居大禄兄太子太子有子曰岑陬太子蚤死謂昆莫曰必以岑陬為太子昆莫哀許之大祿怒乃收其昆弟將衆畔謀攻岑陬昆莫與岑陬萬餘騎令别居昆莫亦自有萬餘騎以自備國分為三大總覊屬昆莫後尚江都公主昆莫年老欲使岑陬尚公主公主不聼天子令從其風俗岑陬遂妻公主昆莫死岑陬代立岑陬者官號也名軍湏靡昆莫王號也名獵驕靡後書昆彌云岑陬胡婦子泥靡尚小岑陬且死以國與季父大禄子翁歸靡曰泥靡大以國歸之翁歸靡既立號肥王復尚楚主觧憂生三男兩女元康二年上書願以漢外孫元貴靡為嗣得令復尚漢公主乃以觧憂弟相夫為公主遣之未出塞聞翁歸靡死貴人共從本約立岑陬小子泥靡代為昆彌號狂王其後為翁歸靡胡婦子烏就屠所殺烏就屠自立為昆彌詔立元貴靡為大昆彌烏就屠為小昆彌元貴靡死子星靡代為大昆彌星靡死子雌栗靡代小昆彌烏就屠死子拊離代立拊離為弟日貳所殺漢遣使者立拊離子安日為小昆彌後為降民所殺漢立其弟末振將代末振將恐為大昆彌雌離靡所并使貴人烏日領詐降刺殺之漢立雌栗靡季父公主孫伊秩靡為大昆彌漢没入小昆彌侍子在京師者乆之大昆彌翎侯難栖殺末振將以其兄安日子安黎靡代為小昆彌是嵗元延二年也拘彌國後漢永建四年其王興為于闐王放前所殺自立其子為拘彌王陽嘉元年燉煌太守徐繇遣疏勒王擊破于闐更立興宗人成國為拘彌王熹平四年于闐王安國攻拘彌殺其王戊己校尉西域長史各發兵輔立拘彌侍子定興為王于闐國後漢永平中其王休莫覇死兄子廣得立永建六年其王放前遣侍子貢獻大月氏國漢時貴霜翎侯丘就郤自立為王國號貴霜丘就郤年八十餘死子閻膏珍代為王莎車國漢宣帝時烏孫公主小子萬年莎車王愛之莎車王無子死死時萬年在漢莎車國人計欲自託于漢又欲得烏孫心乃上書請萬年為王萬年既立暴惡國人不說莎車王弟呼屠徵殺萬年自立漢烈侯馮奉世發兵擊殺之更立它昆弟子為莎車王至元帝時其王延嘗為侍子長於京師王莽天鳳五年延死諡忠武王子康代立後漢建武九年康死諡宣成王弟賢代立賢為于闐王廣徳所虜匈奴遣兵將賢質子不居徵立為莎車王廣徳又攻殺之更立其弟齊黎為王章帝元和三年降漢疏勒國後漢永平十六年龜茲王建殺疏勒王成自以龜茲左侯兠題為疏勒王是年漢遣軍司馬班超刼縳兠題而立成之兄子忠為疏勒王元初中其王曰安國以舅臣磐有罪徙于月氏後安國死無子母持國政與國人共立臣磐同産弟子遺腹為疏勒王臣磐聞之請月氏王曰安國無子種人㣲弱若立母氏我乃遺腹叔父也我當為王月氏遣兵送還疏勒國人素敬愛臣磐又畏憚月氏即共奪遺腹印綬迎臣磐立為王至靈帝建寜元年疏勒王為其季和得所射殺和得自立為王龜茲國漢時其王絳賔以烏孫公主為夫人絳賔死六子丞徳自謂漢外孫成帝時往來尤數隋大業中其王姓白氏曰蘇尼咥唐武徳初其王蘇伐勃駃並遣使來朝勃駃卒子蘇伐疊代立號時徤莫賀俟利發疊死其弟訶黎布失畢代立貞觀末阿史那社爾伐龜茲縶其王送於京師立其弟葉䕶為王永徽七年又以訶黎布失畢為右驍衛大將軍尋放還蕃撫其餘衆依舊為龜茲王顯慶二年立其王嗣子白素稽為龜茲王授右驍衛大將軍仍遣使就加冊命開元七年其王白漢苾卒以其嫡子孝節襲位車師都尉國漢時其王太子曰軍宿匈奴欲以為質軍宿焉耆外孫不欲質匈奴亡走焉耆車師王更立子烏貴為太子後為車師王為子工所撃亡走烏孫烏孫留不遣使上書願留其車師王備國有急可從西道以擊匈奴漢許之於是漢召故車師太子軍宿在焉耆者立以為王髙車國者漢車師前王之庭也後魏時蠕蠕立闞伯周為髙昌王太和初伯周死子義成立為從兄首歸所殺首歸自立為髙昌王五年為髙車王阿伏至羅所殺以燉煌人張孟明為王為國人所殺更以馬儒為王以鞏顧麴嘉二人為左右長史儒又通使後魏請内屬人皆戀土不願東遷相與殺儒立嘉為王延昌中以嘉為持節平西大將軍𤓰州刺史泰品縣開國伯嘉死子堅立堅死子伯雅立唐武徳二年伯雅死子文泰嗣貞觀十四年稱疾不朝太宗命吏部尚書侯君集征之泰死子智盛嗣立君集遂㧞其城置安西都䕶府焉耆國隋大業中其王姓龍名突騎支唐貞觀十四年安西都䕶郭孝恪發兵擊之虜突騎支獻於雒陽太宗赦其罪留於京師其國乃立薛婆阿那支號為瞎于阿史那社爾之討龜茲也阿那支率兵龜茲共禦大軍社爾擒而斬之立龍婆伽利為王即突騎支弟也永徽三年龍婆伽利死其國人請立前王突騎支為王髙宗許之加授右武衛將軍令還本蕃開元七年其王龍嬾突薨以其焉吐拂延襲位波斯國其王初嗣位便宻選諸子才堪承統者名字封而藏之王死後大臣與王之羣子共發封而視之奉所書名為王唐貞觀二十一年其王伊嗣俟龍朔元年其國王卑路斯並遣使朝貢髙宗列其地疾陵城為波斯都督府授卑路斯為都督大食國隋大業中其王名䧩蜜莫末膩自云有國已四十四年歴三主矣一說隋開皇中大食族中有孤列種代為酋長孤列有二姓一號盆尼奚深一號盆尼末換後有摩訶末者勇徤多智衆立之為王摩訶末後十四代至末換殺其兄為部人所殺遂求得奚深種阿蒲羅㧞立之阿蒲羅㧞卒立其弟阿蒲恭拂恭拂卒子迷地立迷地卒子牟栖立牟栖卒弟論立是嵗貞觀二年也石國唐顯慶三年列其地為大宛府以其王䧩吐屯攝舍提於屈昭穆為都督開元初封其王莫賀咄吐屯為石國王九年其王曰伊吐屯屈勒天寳五載封其王子那偈車鼻施為懐化王吐火羅國唐永徽三年列其地為月氐府以其葉䕶阿史那烏濕波為都督開元七年其葉䕶曰支汗那十七年冊其首領骨咄祿頓達度為葉䕶天寳八載其葉䕶失里忙伽羅並遣使朝賀康國本康居之苖裔唐武徳七年其王曰屈术支顯慶三年其王曰拂呼髪是年髙宗列其地為康居府以拂呼髪為都督萬嵗通天元年則天封其大首領篤婆鉢提為王鉢提尋卒又冊立其子泥濕師師為王泥濕師師卒冊立其子突昏為王開元十九年其王烏勒卒上表請封其子咄曷為曹國王許之二十七年烏勒卒遣使冊咄曷襲其父位史國唐顯慶三年列其所治為佉沙州以其王昭武失阿曷為刺史開元十五年其王曰阿忽必多延屯二十七年卒冊立其子阿忽鉢為王二十九年其王斯謹提立册府元龜卷九百六十六
