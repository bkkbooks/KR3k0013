body:
  text: 册府元龜卷一百六十一宋王欽若等撰帝王部命使周官小行人之職達六節辨五物以周知天下之故其往也賦皇華以遣之其還也歌四牡以勞之盖所以重宣命之寄慰于役之勤斯古道也得非王者居九重之深御四海之廣慮下情之未達懼一物之失所繇是慎擇其人俾專厥任若乃察謡俗采方言賑䘏孤窮興舉孝秀辨庶士之淑慝平羣盜之俶擾至有乾文謫見天灾流行或推賜租之恩或舉申究之典斯皆因時立制以禆政治者也周平王四十九年使凡伯聘魯桓王六年使南季聘魯十三年使宰渠伯紏聘魯宰官渠氏伯紏名也王官之宰當以才授而伯紏攝父之職出聘列國故書名譏之十三年使仍叔之子來聘魯漢武帝元狩元年詔曰朕嘉孝悌力田哀夫老眊孤寡鰥獨或匱於衣食甚憐愍焉其遣謁者巡行天下存問致賜曰皇帝使謁者賜縣三老孝者帛人五疋鄉三老弟者力田帛人三疋年九十以上及鰥寡孤獨帛人二疋絮三斤八十以上米人三石有寃失軄使者以聞縣鄉即賜毋贅聚贅會也令勿擅徵召會聚六年六月詔曰日者有司以幣輕多姦幣錢也輕者若一馬直二十萬是為幣輕而物重也農傷而末衆又禁兼并之塗故改幣以約之更去半兩錢行五銖錢皮幣以檢約姦邪稽諸往古制宜於今廢期有月而山澤之民未諭夫仁行而從善義立則俗易意奉憲者所以導之未明與將百姓所安殊路而撟䖍吏因乗勢以侵蒸庶邪撟與矯同其字從手矯託也䖍固也妄託上命而堅固為邪惡者也何紛然其擾也今遣博士大等六人分循行天下存問鰥寡廢疾無以自振業者貸與之諭三老孝悌以為民師舉獨行之君子徵詣行在所朕嘉賢者樂知其人廣宣厥道士有特招使者之任也士有殊才異行當特招者任在使者分别之詳問隱處亡位及寃失職姦猾為害野荒治苛者舉奏郡國有所以為便者上丞相御史以聞元鼎二年九月詔曰仁不異逺義不辭難今京師雖未為豐年山林池澤之饒與民共之今水潦移於江南迫隆冬至朕懼其饑寒不活江南之地火耕水耨方下巴蜀之粟致之江陵遣博士中中博士名也等分循行諭吿所抵無令重困吏民有振救饑民免其戹者具舉以聞天漢二年秋泰山琅邪羣盜徐勃等阻山攻城阻山者依山之險以自固也道路不通遣直指使者暴勝之等衣繡衣持斧分部逐捕刺史郡守以下皆伏誅昭帝始元元年九月遣故廷尉王平等五人前為此官今不居者皆謂之故也持節行郡國舉賢良問民所疾苦寃失職者宣帝本始元年正月遣使者持節詔郡國二千石謹牧飬民而風徳化元康四年正月遣太中大夫彊等十二人循行天下存問鰥寡覽觀風俗察吏治得失舉茂材異倫之士五鳯四年四月辛丑晦日有蝕之詔曰皇天見異以戒朕躬是朕之不逮吏之不稱也以前使使者問民所疾苦復遣丞相御史掾二十四人循行天下舉寃獄察擅為苛禁深刻不改者元帝初元元年四月詔曰朕承先帝之聖緒獲奉宗廟戰戰兢兢間者地數動而未静懼於天地之戒不知所繇繇與由同方田作時朕憂蒸庶之失業臨遣光禄大夫褒等十二人上自臨勅乃遣之循行天下存問耆老鰥寡孤獨困乏失職之民延登賢俊招顯側陋因覧風俗之化相守二千石誠能正躬勞力宣明教化以親萬姓則六合之内和親庶幾虖無憂矣書不云乎股肱良哉庶事康哉布吿天下使明知朕意建昭四年夏四月詔曰朕承先帝之休烈夙夜慄慄懼不克任間者陰陽不調五行失序百姓饑饉惟蒸庶之失業臨遣諫大夫博士賞等二十一人循行天下存問耆老鰥寡孤獨乏困失職之人舉茂材特立之士相將九卿其帥意毋怠使朕獲觀教化之流焉成帝建始三年九月詔曰廼者郡國被水灾流殺人民多至千數京師無故訛言大水至吏民驚恐奔走乗城殆苛暴深刻之吏未息元元寃失職者衆遣諫大夫林等循行天下河平四年三月遣光禄大夫博士嘉等十一人行舉瀕河之郡水所毁傷困乏不能自存者陽朔二年秋關東大水流民欲入函谷天井壺口五阮關者勿苛留遣諫大夫博士分行視鴻嘉元年春二月詔曰朕承天地獲保宗廟明有所蔽徳不能綏刑罰不中衆寃失職趨闕吿訴者不絶是以陰陽錯謬寒暑失序日月不光百姓蒙辜朕甚憫焉書不云乎即我御事罔克耆夀咎在厥躬此尚書文侯之命篇中辭也言我周家用事者無能有耆老賢者使國危亡罪咎在其用事者也又曰咎在厥躬平王自謂故引之以自責耳方春生長時臨遣諫大夫理等天子自臨􅎁而遣舉三輔三河𢎞農寃獄公卿大夫部刺史明申敕守相稱朕意焉永始三年春正月己夘晦日有蝕之詔曰天灾仍重朕甚懼焉惟民之失職臨遣太中大夫嘉等循行天下存問耆老民所疾苦其與部刺史舉惇樸遜讓有行義者各一人平帝元始元年正月遣諫大夫行三輔舉籍吏民以元夀二年倉卒時横賦斂者償其直二年九月使謁者大司馬掾四十四人持節行邉遣執金吾侯陳茂假以鉦鼓將帥乃有鉦鼔今茂官輕兵少又但往諭曉之耳所以假鉦鼓者欲重其威也四年遣大僕王惲等八人置副假節分行天下覽觀風俗後漢光武建武二年使太中大夫伏隆持節安輯青徐二州招張歩降之二十九年二月遣使者舉寃獄出繫囚安帝延光三年遣侍御史分行青冀二州灾害督錄盜賊順帝漢安元年八月遣侍中杜喬光禄大夫周舉守光禄大夫郭遵馮羨欒巴張綱周栩劉班等八人分行州郡班宣風化舉實臧否建康元年正月詔曰隴西漢陽張掖北地武威武都自去年九月已來地百八十震山谷坼裂壊敗城寺殺害民庶夷狄叛逆賦役重數内外怨曠惟咎歎息其遣光禄大夫案行宣暢恩澤恵此下民勿為煩擾靈帝熹平五年四月使侍御史行詔獄亭部理寃枉原輕繫休囚徒獻帝初平三年四月誅董卓遣使者張种撫慰山東八月遣太尉馬日磾及太僕趙岐持節慰撫天下魏文帝初嗣魏王遣使者循行郡國有違理掊克暴虐者舉其罪黄初六年遣使者循行許昌以東盡沛郡問民所疾苦貧者賑貸之高貴鄉公正元元年十月遣侍中持節分適四方觀風俗勞士民察寃枉失職者晉武帝㤗始二年春正月遣兼侍中侯史光等持節四方循省風俗除禳祝之不在祀典者四年詔刺史二千石長吏曰古之王者以歳時廵狩方岳其次則二伯術軄不然則行人順省故雖幽遐側微心無壅隔下情上通上指逺諭至於鰥寡罔不得所用垂風遺烈休聲猶存朕在位累載如臨深谷夙興夕惕明發不寐坐而待旦思四方水旱灾𤯝為之惕然勤躬約已欲令事事當宜常恐衆吏用情誠心未著萬機兼猥慮有不周政刑失謬而弗獲備覧百姓有過在予一人惟嵗之不易未遑卜征廵省之事下之未又其何以恤之今使使持節侍中副給事黄門侍郞䘖命四出周行天下親見刺史二千石長吏申諭朕心訪求得失損益諸宜觀省政教問人間患苦周典有之曰有萬姓之利害為一書其禮俗政事刑禁之逆順為一書其暴亂作慝犯令為一書其禮喪凶荒厄貧為一書其康樂和親安平為一書每國辨異之以返命於王舊章前訓今率繇之還具條奏俾朕昭然鑒於幽逺若親行焉大夫君子其各悉乃心敬乃事嘉言令圖苦言至戒與使者盡之無所隱諱方將虛心以俟其勉哉朂之稱朕意焉其無忽是年又遣使者侯史光循行天下太元七年十二月遣侍御史廵遭水諸郡後魏道武天興元年八月遣使循行郡國舉奏守宰不法者親覽察黜陟之三年正月分命諸官循行州郡觀民風俗察舉不法四年二月分命使者循行州郡聽察詞訟糾劾不法天賜元年四月詔尚書郞中公孫表使於江南以觀桓𤣥之釁也值𤣥敗而還明元即位詔都兵將軍山陽侯奚斤廵行諸州問民疾苦撫恤窮乏永興三年春詔北新侯安同等持節廵行并定二州及諸山居雜胡丁零問其疾苦察舉守宰不法其寃窮失軄彊弱相凌孤寒不能自存者各以事聞泰常三年春詔九州之民隔逺京邑時有壅滯守宰至不以聞今東作方興或有貧乏失農務者其遣使者廵行天下省諸州觀民風俗問民疾苦守宰治行諸有不能自申皆因以聞七年九月分遣使者循行天下州郡觀察風俗太武太平真君元年正月分遣侍臣循行州郡觀察風俗問民疾苦文成太安元年六月詔曰夫為治者因宜以設官舉賢以任軄故上下和平民無怨謗若官非其人姦邪在位則政教凌遲至於彫薄思明黜陟以隆治道今遣尚書穆伏真等三十人廵行州郡觀察風俗入其境農不墾殖田畝多荒則徭役不時廢於力也耆老飯蔬食少壯無衣褐則聚斂煩數匱於財也閭里空虛民多流散則綏導無方疎於恩也盜賊公行劫奪不息則威禁不設失於刑也衆謗竝興大小嗟怨善人隠伏佞邪當途則為法混淆昏於政也諸如此比黜而戮之善於政者褒而賞之其有阿枉不能自申聽詣使吿狀使者檢治若信清能衆所稱美誣告以求直反其罪使者受財斷察不平聽詣公車上訴其不孝父母不順尊長為吏姦暴及為盗賊各具以名上其容隠者以所匿之罪罪之孝文延興二年十一月分遣使者廵省風俗問民疾苦三年十一月詔以河南七州牧守多不奉法致新邦之民莫能上達遣使者觀風察獄黜陟幽明四年十一月分遣侍臣循河南七州觀察風俗撫慰初附太和二年八月分遣使者考察守宰問民疾苦六年八月分遣大使廵行天下遭水之處丐民租賦貧儉不自存者賜以粟帛八年正月詔隴西公元琛尚書陸叡為東西二道大使褒善罰惡十四年二月詔遣侍臣循行州郡問民疾苦十八年冬十月分遣侍臣廵問民所疾苦二十一年正月己亥遣兼侍中張彛崔光兼散騎常侍劉藻廵方省察問民疾苦黜陟守宰宣揚風化宣武以太和二十三年四月即位六月分遣侍臣廵行郡國問民疾苦考察守令黜陟幽明文武應求道著丘園者皆加褒禮又云宣武時遣使廵行四方以直閣將軍薛曇寳為持節兼散騎常侍龍驤將軍南道大使景明二年正月帝始親政詔曰朕幼承寳厯艱憂在疚庶事不親風化未洽今始覽政務義協惟新思使四方風從率善可分遣大使黜陟幽明是年以源懐為車騎大將軍詔為使持節加侍中行臺廵行常燕湖三州賑給貧乏策採風俗考論殿最事之得失皆先决後聞正始二年六月詔尚書李崇太府卿于忠散騎常侍游肇諫議大夫鄧羡崇忠使持節并兼侍中羡兼黄門俱為大使糾斷外州畿内其守令之徒咎失彰露者即便施决州鎮重職聽為表聞七月詔曰朕纂馭寳厯於今七載徳澤未敷鑒燭不逺知人之寃瘼所在猶滋而糾察之獄未暢於下賢愚靡分皂白均貫非所以革民耳目使善惡勵心今分遣大使省方廵檢随其愆負與風響相符者即加糾黜以明雷霆之威以申旄軒之舉因以觀風辨俗採訪功過褒賞賢者糾罰淫慝理窮恤弊以稱朕心三年四月詔遣使者廵慰北邉酋庶孝明熙平二年正月詔遣大使廵行四方問疾苦恤孤寡黜陟幽明又詔選曹舉用必在得才廣求栖遁共康治道州鎮城隍各令嚴固齋會聚集糾執妖諠囹圄皆令造屋桎梏務在輕小工巧浮迸不得隱藏絹布繒綵長短合式偷竊軍階亦悉沙汰籍貫不實普使紏案聽自歸首逋違加罪冬十月庚寅遣尚書長孫稚兼尚書鄧羡元纂等廵撫百姓正光元年四月詔尚書長孫稚廵撫北藩觀察風俗孝昌元年徐州刺史元法僧以城叛入梁梁遣蕭綜來據彭城時遣大都督安豐王延明督臨淮王彧討之盤桓不進乃詔尚書三公郎兼司州别駕前軍將軍辛雄副太常少卿元晦為使給齊庫刀持節乗驛催軍有違即令斬决肅宗謂雄曰誨朕家諸子摽以親懿籌䇿機計仗卿取勝耳到軍勒令竝進徐州綜送降欵孝昌末魏蘭根為光禄大夫河北流人南度以蘭根兼尚書使齊濟青兖四州安撫置縣郡孝莊建義元年五月以尚書右僕射元羅為東道大使征東將軍光禄勲元欣副之廵方黜陟先行後聞後周閔帝元年正月即天王位詔曰上天有命革魏於周致予一人受兹大號予惟古先聖王罔弗先於省視風俗以求民瘼然後克治矧予𦕈𦕈又當草昧若弗尚於達四聰明四目之訓者其有聞知哉有司宜分命方别之使所在廵撫五教何者不宣時政有何不便得無修身潔己才堪佐世之人而不為上所知寃枉受罰幽辱於下之徒而不為上所理孝義貞節不為有司所申鰥寡孤獨不為有司所恤暨黎庶衣食豐約賦役繁省灾癘所興水旱之處竝宜具聞若有年八十已上所在就加禮餼明帝元年六月遣使分行州郡理囚徒察風俗掩骸埋胔武成二年二月以車騎大將軍儀同三司冀攜為大使廵厯州郡察風俗理寃滯還拜小御武帝保定元年二月遣大使廵察天下五年七月遣大使廵察天下天和五年四月遣大使廵察天下建徳五年正月詔曰朕克己思治而風化未𢎞永言前古載懐夕惕可分遣大使周省四方察訟聽謡問民恤隠其獄犴無章侵漁黎庶随事究驗條錄以聞若政績有施治綱克舉及行宣圭蓽道著丘園竝須檢審依名謄奏其鰥寡孤獨實可哀矜亦宜賑給務使周贍六年平齊詔曰東夏既平王道初被齊氏弊政餘風末殄朕劬勞萬幾念存康濟恐清浄之志未形四海下民疾苦不能上達寢興軫慮用切于懐宜分遣使人循方慰撫觀風省俗宣揚治道有司明立條科務在𢎞益宣帝即位遣大使廵察諸州隋髙祖開皇元年即位遣八使廵省風俗三年十一月發使廵省風俗詔曰朕君臨區宇深思治術欲使生人從化以徳代刑求草萊之善旌閭里之行民間情偽咸欲備聞已詔使人所在賑恤揚鑣分路將遍四海必令為朕耳目如有文武才用未為時知宜以禮發遣朕將銓擢其有志節髙妙越等超倫亦仰使人就加旌異令一行一善奨勸於人逺近官司遐邇風俗巨細必紀還日奏聞庶使不出户庭坐知萬里四年八月甲午遣十使廵省天下六年正月遣民部尚書蘇威廵省山東十年八月遣柱國襄陽郡公韋洸上開府東萊郡公王景竝持節廵撫嶺南百越皆服十五年七月遣邳國公蘇威廵省江南十七年三月遣治書侍御史栁彧皇甫誕廵省河南河北仁夀元年遣十六使廵省風俗煬帝大業元年正月發八使廵省風俗下詔曰昔者哲王之治天下也其在愛民乎既富而教家給人足故能風淳俗厚逺至邇安治定功成率繇斯道朕嗣膺寳厯撫育黎獻夙夜戰兢若臨川谷雖則聿遵先緒弗敢失墜永言政術多有缺然况以四海之逺兆民之衆未獲親臨問其疾苦每慮幽仄莫舉寃屈不申一物失所乃傷和氣萬方有罪責在朕躬所以寤寐増歎而夕惕載懐者也今既布政惟始宜存寛大可分遣使人廵省方俗宣揚風化薦㧞淹滯申達幽枉孝悌力田給以優復鰥寡孤獨不能自存者量加賑濟義夫節婦旌表門閭髙年之老加其版授竝依别條賜以粟帛篤疾之徒給侍丁者雖有侍飬之名曽無賙贍之實明加檢校使得存養若有名行顯著操履修潔及學業才能一藝可取咸宜訪採將身入朝所在州縣以禮發遣其有蠧政害民不便於時者使還之日具錄奏聞二年遣十使併省州縣唐髙祖武徳元年六月遣太僕卿宇文明達招慰山東之地七月遣黄臺公瑗安撫山南之地十月詔曰隋徳下衰政荒民散九州輻裂四海𤓰分元元無辜飼豺狼之吻惵惵黔首罹兵革之灾朕祗膺寳圖救其危墜一物失所情深納隍今趙魏之人俱承大化海岱之境思禀朝章然而尚迫冦戎受拘凶暴經途遐阻末由自達宣風布教必佇循良柔服招攜事資明恕右翊衛大將軍上柱國淮安王神通地惟近屬功參運始仗節建旟允當重寄可山東道安撫大使其山東諸軍事竝受節度二年閏二月詔曰隋末道消運為陽九盜賊蜂起饑饉薦臻四海之民墜於塗炭是以上天降鑒爰命朕躬綏靜黎元克定凶醜府庫倉廪所在開發流冗之民隨加鎮撫言念亭育監寐匪忘然年榖不登民多困乏一物失所有甚納隍宜加存問救其疾苦可令皇太子建成廵京城側近諸縣秦王廵京城以東右僕射裴寂廵京城以西詣彼閭閻見其耆老觀省風俗亷察吏民乏絶之徒量加賑給如有寃滯竝為申理髙年疾病就致束帛是月遣馬邑都城李靖前鹿城縣令元無竭慰撫嶺南四月遣大理卿郞楚之安撫山東夏侯端安撫淮左奏九韶樂設宴而遣之五月遣黄門侍郞楊恭仁安撫河西之地三年二月詔曰朕承天明命撫育萬方康俗濟民無忘監寐西蜀僻逺控接巴夷厥土沃饒山川遐曠往者隋末喪亂盜冦交侵流寓之民遂相雜撓游手墮業其類實煩奪攘矯䖍因此而作王業伊始務從草創牧宰庶寮随事遷易州縣分析權宜廢置然而王道未洽民瘼猶存静言思之夙興軫念澄源正本義在更張可令秦州總管鄼國公軌御史大夫滑國公無逸為益州道安撫大使宣揚朝典進擢亷平貶黜苛暴申理寃滯孝悌貞節表其門閭鰥寡孤獨量加贍恤事有便宜竝委處分四年六月既征王世充遣驍衛將軍盛彦師安撫河南之地九年七月遣諫議大夫魏徵宣慰山東太宗貞觀三年五月旱六月令中書舎人杜正倫崔敦禮守給事中尹文憲張𤣥素等往關内諸州分道撫慰問人疾苦見禁囚徒量事斷决人有寃枉不能自申者随狀理之事有不便於人及官人貪殘為患者竝具狀還日以聞困窮之徒比雖賑贍仍有乏絶者亦量加支給在京見禁囚徒亦令所司量事斷决務從寛簡稱朕意焉六年三月幸九成宮發使存問髙年鰥寡七年七月遣大理少卿李𢎞節太子中允張𤣥素都水使者長孫師廵撫嶺南八年正月詔曰昔者明王之御天下也内列公卿允釐庶績外建侯伯司牧黎元唯懼淳化未敷名教或替故有廵狩之典黜陟幽明行人之官存省方俗用能遐邇遂性情偽無遺時雍之宜率繇兹道朕祗膺寳命臨御帝圖禀過庭之義方荷上𤣥之嘉祉四荒八表無思不服而夙興夕惕勤躬約已日慎一日雖休勿休欲萬國歡心兆民有頼推誠待物近取諸身實謂羣官受拜咸能自勵乃聞連帥刺舉或乖共理之寄縣司主吏甚多黷貨之罪有一於此責在朕躬是用終夜憮然昃景輟食宜遣大使分行四方申諭朕心延問疾苦觀風俗之得失察政刑之苛弊耆年舊齒孝悌力田義夫節婦之家疾廢惸嫠之室須有旌賞賑贍聽以倉庫物賜之若有鴻材異學留滯末班哲人竒士隠倫屠釣宜精加捜訪進以殊禮務盡使乎之㫖俾若朕親覿焉於是分遣蕭瑀李靖楊恭仁王珪竇静李大亮劉徳威皇甫無逸韋挺李襲譽張亮杜正倫趙𢎞智等廵省天下十八年十一月庚辰遣使齎璽書詣鄭汝懐澤四州廵問髙年宴賜各有差二十年正月丁丑遣大理卿孫伏伽黄門侍郞禇遂良尚書左丞楊纂太子詹事張行成太僕少卿蕭銑光禄少卿馮怦司農卿達奚懐義雍州司馬李督眘給事中張叡册御史中丞唐臨中書舍人崔仁師栁奭太子中允宇文節太子中舍人賀㧞𤣥壹萬年縣令宋行質長安縣令李乾祐户部郞中劉翁勃刑部侍郞劉燕客王昕尚藥奉御長孫知人大理正郭文宗李鏡𤣥等以六條廵察四方各以澄清為務多所貶黜舉奏及使者還詣闕稱寃者前後相屬因令禇遂良以其類具狀以聞帝親自臨决牧宰已下以能官進擢者二十人以罪死者七人其流罪以下及免黜者數百十人八月幸靈州所經州縣竝遣使存問老疾并加賑恤九月遣霍王府長史段寳𤣥滄州别駕張開諒同州别駕張文會等三道使廵察嶺南諸州二十二年六月令陕州刺史孫伏伽於河南太子詹事張行成於河北渭州親見父老存撫百姓從軍之家州縣為之營農三十三年八月以晉州地震令尚書郞中一人充使存問舍宅損壊者給復一年髙宗永徽四年十月甲辰遣使存問鰥寡惸獨不能自存者五年正月詔工部侍郞王儼往河北簡行遭水諸州乏絶者賑貸之仍慮囚徒顯慶元年正月令宗正卿隴西郡王博文刑部尚書長孫祥大理卿叚寳𤣥於畿内諸州廵撫百姓給貸乏絶二年十月幸許州遣少府少監鄭欽泰等分往許汝州及所經縣省録囚徒并捜訪孝義及經學之士龍朔元年十二月戊寅詔諸州霜旱蟲澇之處分道遣使存問賑給并慮囚徒三年八月詔分遣大使廵察問人疾苦黜陟官吏乾封二年十月遣守大司憲樂彦瑋司平少常伯皇甫公議太子左中䕶楊思敬兼西臺舍人李䖍澤等分往長安萬年城外諸縣廵問百姓親檢校田苗賑給乏絶總章二年四月令左肅機兼檢校沛王府長史皇甫公議往慮岐州諸縣囚徒量事原免之三年二月遣使存問諸州逐糧百姓漸令復業仍令州縣檢校優恤之其未情願歸者聽之咸亨二年十一月幸許汝等州分遣通事舍人員外郎御史存問所經州縣老疾及鰥寡􅑏獨仍復見禁囚徒等儀鳯二年十二月詔黄門侍郞同中書門下三品來甞為河南道大使中書侍郞同中書門下三品薛元超為河北道大使尚書左丞崔知悌國子司業鄭祖𤣥為河南道大使分道廵撫申理寃屈賑貸乏絶册府元龜卷一百六十一
