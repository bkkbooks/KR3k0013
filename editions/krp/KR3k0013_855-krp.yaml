body:
  text: 册府元龜卷八百五十五宋王欽若等撰總録部曠達縱逸曠達夫夷情得喪忘懐榮辱外儻蕩以無簡中恬漠而自適簡易威儀脫畧富貴抗心俗表不屑物議任放肆志率詣不羈窮厄靡動其情哀樂罔嬰其慮斯皆晏然自得不以世務為累者已其有望實既重才位兼著不以名徳驕物不以事任經懐體寛裕以安異同狥譚宴以賞勝㑹亦有靡脩小節不求當世事扵文酒之適極乎山泉之致兹乃處閒曠齊物我一端之士也其或不勵風操惟任縱誕禮法之所見誚名教之所不容者蓋亦無取焉栁下惠為魯士師不羞汙君不卑小官進不隠賢必以其道遺佚而不怨阨窮而不憫故曰爾為爾我為我袒裼裸裎於我側爾焉能凂我哉栁下惠魯公族大夫也姓展名禽字季栁下是其號也進不隠已之賢才必欲行其道也憫懣也云善而已惡人何能汙我也故油油然與之偕而不自失焉援而止之而止援而止之而止者是亦不屑去已後漢禰衡字正平平原人少有才辯建安初逰許下魏太祖聞衡善擊鼓乃召為鼓史因大㑹賓客閱試音節諸史過者皆令脫其故衣更着岑牟單絞之服岑牟鼔角士胄也絞蒼黄之色次至衡衡方為漁陽參撾蹀𨄌而前一云衡撃鼓作漁陽參槌蹋地來前躡皷足槌及撾並擊鼔杖也參撾是撃鼔之法容態有異聲節悲壯聽者莫不慷慨衡進至太祖前而止吏訶之曰鼓史何不改裝而敢輕進乎衡曰諾扵是先解衵衣衵近身衣也次釋餘服裸身而立徐取岑牟單絞而着之畢復參撾而去顔色不怍晉嵇康字叔夜善鍜向秀為之佐相對欣然旁若無人康嘗採藥遊山澤㑹其得意忽焉忘反時有樵蘓者遇之咸謂為神仙位至中㪚大夫劉伶字伯倫放情肆志嘗以細宇宙齊萬物為心澹黙少言不妄交㳺與阮籍嵇康相遇欣然神觧擕手入林初不以家産有無介意嘗乗鹿車擕一壺酒使人荷鍤而隨之謂曰死便埋我其遺形骸如此位至建威叅軍阮籍字嗣宗任性不羈喜怒不形於色或閉戸視書累月不出或登山臨水經日忘歸為文帝從事中郎聞步兵營厨人善釀有貯酒三百斛乃求為步兵校尉遺落世事雖去佐職嘗往府内著達莊論及大人先生傳阮咸字仲容任達不拘與叔父籍為竹林之逰當世禮法者譏其所為咸與籍居道南諸阮居道北北阮富而南阮貧七月七日北阮盛曬衣服皆錦綺粲目咸以竿挂大布犢鼻扵庭人或怪之答曰未能免俗聊復爾耳咸與從子修特相善毎以得意為歡諸阮皆能飲酒咸至宗人間共集不復用杯觴斟酌以大盆盛酒圓坐相向大酌更飲時有羣豕來飲其酒咸直接其上便共飲之位至始平太守阮瞻字千里咸子也為太子舍人善彈琴人聞其能多往求聴不問貴賤長㓜皆為彈之神氣冲和而不知向人所在内兄潘岳毎令鼓琴終日達夜無忤色繇是識者歎其恬澹不可榮辱阮脩字宣子性簡任不修人事絶不喜見俗人遇便捨去意有所思率爾褰裳不避晨夕至或無言但欣然相對嘗步行以百錢拄杖頭至酒店便獨酣暢雖當世富貴而不肯顧家無儋石之儲晏如也與兄弟同志嘗自得於林阜之間仕至太子洗馬張翰字季膺任心自適不求當世或謂之曰卿乃可縱適一時獨不為身後名邪答曰使我有身後名不如即時一杯酒人貴其曠達位至大司馬東曹掾王長文為梁王彤丞相從事中郎在雒出行輙着白旃小障以載車當時異焉顧和為司徒王導揚州從事曰旦當朝未入停車門外周顗遇之和方擇蝨夷然不動顗既過顧指和心曰此中何物和曰此中最是難測地顗入謂導曰卿州吏中有一令僕才導亦以為然謝尚為司徒王導府掾始到府通謁導以其有勝㑹謂曰聞君能作鴝鵒舞一坐傾想寜有此理不尚曰唯便着衣幘而舞導令坐者撫掌擊節尚俯仰在中旁若無人其率詣如此周顗字伯仁性寛裕王導甚重之嘗枕顗膝而指其腹曰卿此中何所有也答曰此中空洞無物然足容卿輩數百人導亦不以為忤又扵導坐傲然嘯詠導云卿欲希嵇康邪顗曰何敢近捨明公逺希嵇阮位至尚書左僕射庾亮字元規在武昌諸佐吏殷浩之徒乗秋夜往共登南樓俄而不覺亮至諸人將起避之亮徐曰諸君少住老子於此處興復不淺便據胡床與浩等談詠竟坐其坦率行已多此類也位至司空桓伊善音樂盡一時之妙為江左第一有蔡邕柯亭笛嘗自吹之王徽之赴召京師泊舟清溪側素不與徽之相識伊扵岸上過舡中客稱伊小字曰此桓野王也徽之便令人謂伊曰聞君善吹笛試為我一奏伊是時已貴顯素聞徽之名便下車踞胡床為作三調弄畢便上車去客主不交一言位至䕶軍將軍桓石秀為江州刺史居潯陽性放曠嘗弋釣林澤不以榮爵嬰心也孫綂字承公㓜與弟綽及從弟盛過江誕任不羈而善屬文時人以為有楚風征北將軍褚裒聞其名命為叅軍辭不就家於㑹稽性好山水乃求為鄴令轉在呉寜居職不留心碎務縱意㳺肆名山勝川靡不窮究郄超字景興少卓犖不羈有曠世之度交㳺士林毎存勝狀仕至司徒左長史王徽之字子猷雅性放誕好聲色嘗與弟獻之共讀高士傳讃獻之賞井丹髙潔徽之曰未若長卿慢世也其傲逹若此及獻之卒徽之奔喪不哭直上靈牀坐取獻之琴彈之乆而不調歎曰嗚呼子敬人琴俱亡徽之嘗為大司馬桓温叅軍蓬首㪚帶不綜府事又為車騎桓冲騎兵冲問卿署何曹對曰似是馬曹又問管幾馬曰不知馬何繇知數又問馬比死多少曰未知生焉知死謝奕字無奕與桓温善温辟為安西司馬猶推布衣好在温坐岸幘笑詠無異常日温曰我方外司馬王猛字景畧桓温入闗猛被褐而詣之一面談當世之事捫蝨而言旁若無人後為苻堅相宋陶潜字淵明閒靜少言不慕榮利性嗜酒而家貧不能常得親舊知其如此或置酒招之造飲輙盡期在必醉既而退曽不恡情去留仕至彭澤令鄭鮮之字道子性好逰行命駕或不知所適隨御者所狎位至尚書右僕射范泰字伯倫好酒不拘小節通率任心雖在公言不異私室高祖甚賞愛之位至侍中左光禄大夫國子祭酒王敬𢎞素高退左右嘗使二老婢戴五絛五辮着青紋袴襦餙以朱粉女適尚書僕射何尚之弟述之敬𢎞嘗往何氏㸔女值尚之不在寄齋中臥俄頃尚之還敬𢎞使二婢守閣不聴尚之入云正熟不堪相見若可且去尚之扵是移於他室位至侍中沈慶之為司空毎朝賀嘗乗猪鼻無􅎻車左右從者不過三五人騎馬履行園田止一人視馬而已毎農桑劇月或時無人遇之者不知三公也及加三望車謂人曰我毎逰履田園有時與人馬成三無人則與馬成二今乗此車安所之乎及几杖並與讓焉袁粲好飲酒善吟諷獨酌園亭以此自適居負南郭時杖策獨逰為中書令領丹陽尹位望雖重不以事務經懐嘗歩履白楊郊野間道遇一士大夫便呼與酣飲明日此人謂被知顧到門求通粲曰昨飲酒無偶聊相要爾竟不與相見嘗作五言詩云放迹雖中宇循寄乃滄洲蓋其志也南齊張欣泰為隨王子隆鎮西中兵叅軍子隆深相愛重數與談宴武帝怒召還都屏居家巷置宅南崗下面松山欣泰負弩射雉恣情閒放聲伎雜藝頗多開觧梁何點字子晳廬江灊人雖不入城府而遨㳺人世不簮不帶或駕柴車躡草履恣心所適致醉而歸張盾字士宣以謹重稱為無錫令遇刼河側刼以刀斫其頰眉咄咄不易餘無所言於是生資皆盡不以介懐為湘東王記室出為富陽令廓然獨處無所用心身死之日家無遺財惟有文集并書千餘卷酒米數甕而已江革為度支尚書以强直為權勢所疾除光禄大夫領步兵校尉南北兖二州大中正優㳺閒放以文酒自娯曹景宗新野人也善騎射好畋獵武帝時為侍中領軍將軍出行嘗欲褰車帷幔左右輙陳以位望隆重人所具瞻不宜然景宗謂所親曰我昔在郷里騎快馬如龍與年少陪數十騎拓弓弦作霹靂聲箭如餓鴟呌平澤中逐麞鹿數肋射之渇飲其血饑食其脯甜如甘露漿覺耳後風生鼻頭出火此樂使人忘死不知老之將至今來揚州作貴人動轉不得路行開車幔小人輙言不可閉置車中如三日新婦遭此悒悒使人無氣謝幾卿為軍師長史坐軍敗免官閒居宅在白楊石井朝中交好者載酒從之賓客滿坐時左丞庾仲容亦免歸二人意志相得並肆情誕縱或乗露車歴㳺郊野既醉則執鐸挽歌不屑物議焉後魏劉獻之博陵饒陽人愽觀衆籍見名法之言掩卷而笑曰若使楊墨之流不為此書千載誰知其小也曾謂其所親曰觀屈原離騷之作自是狂人死其宜矣何足惜也吾嘗謂濯纓洗耳有異人之迹哺糟歠醨有同物之志而孔子曰我則異於是無可無不可誠哉斯言實獲我心晆夸少有大度不拘小節耽志書傳未曽以世務經心好飲酒浩然物表司徒崔浩奏徵為中郎辭疾不赴北齊邢劭字子才初仕後魏為中書令元羅青州司馬遂在青土終日酣賞盡山泉之致齊受禪為太常卿中書監攝國子祭酒雖望實兼重不以才位傲物脫畧簡易不脩威儀車服器用充事而已有齋不居坐臥嘗在一小屋果餌之屬或置之梁上賓至下而共噉天資質素特安異同士無賢愚皆能顧接對客或觧衣覓蝨且與劇談劭事寡嫂甚謹養孤子恕慈愛特深在兖州有都下信云恕疾便憂之廢寢食顔色貶損及卒人士為之傷心痛悼雖甚竟不再哭賓客弔慰抆淚而已其高情達識開遣滯累所未有也宋游道仕後魏為司州治中從事時將家還鄴㑹霖雨行旅擁扵河梁游道於幕下朝夕宴歌行者曰何時節作此聲也游道答曰何時節不作此聲固大癡李元忠仕東魏興和末為侍中雖居要任初不以物務干懐惟以聲酒自娯大率嘗醉家事大小了不闗心園庭之内羅種菓藥親朋尋詣必留連宴賞每挾彈攜壺遨逰里閈遇㑹飲酌蕭然自得拜儀同三司孫騰司馬子如嘗詣元忠逢其方坐葛巾擁被對壺獨酌庭室蕪曠使婢卷兩褥以質酒肉呼妻出衣不曳地二公相視歎息而去大餉米絹受而㪚之王晞為常山王并州司馬性閒淡寡欲雖戎馬填閭未嘗以世務為累良辰美景嘯詠遨逰登山臨水以談讌為事人士謂之物外司馬後周韋夐京兆杜陵人高尚不仕其子瓘行隨州刺史因疾物故弟孝寛子總復於并州戰歿一日之中凶問俱至家人相對悲慟而夐神色自若謂之曰死生命也去来常事亦何足悲援琴撫之如舊隋李貞為蒙州刺史吏民安之自此不復留意扵文筆問其故慨然歎曰五十之年倐然而過鬢垂髪素筋力已衰宦情文情一時盡矣悲夫然毎暇日輙引賓客弦歌對酒終日為歡唐李白字太白少有逸才志氣宏放飄然有超世之志天寶待詔翰林白既嗜酒日與酒徒醉扵酒肆嘗沉醉殿上引足令高力士脫靴繇是斥去乃浪迹江湖終日沉飲時侍御史崔宗之謫官金陵與白詩酒唱和嘗月夜乗舟自采石達金陵白衣宫錦袍扵舟中顧瞻笑傲旁若無人杜甫字子美為嚴武劎南節度叅謀簡校尚書工部員外郎扵成都浣花里結廬枕江縱酒嘯詠與田畯野老相狎蕩無拘簡武過之有時不冠其傲誕如此栁渾為監察御史憲臺執法之地動循儀軌渾性放曠不甚簡束其寮長局吏咸忿其踈縱渾既不樂乞守外職執政惜其才因奏為左補闕其後為相封宜城男及免相數日與親故尋勝讌賞醉而方歸時李勉盧翰皆以退罷居私第相謂吾方栁宜城悉是拘俗之人矣白居易初對策高第擢入翰林欲奮厲効報兼濟生靈蓄意未果望風為當路者所擠流徙江湖四五年間幾淪蠻瘴自是宦情衰落無意扵出處唯以逍遙吟詠為事後為刑部尚書致仕後唐丁㑹字道隠壽春人㓜放蕩縱横不治農産嘗隨哀挽者學紼謳猶嗜其聲位至昭義節度使晉鄭雲叟南燕人家本東郡隠居華山妻兒繼已凋謝毎聞凶訃一哭而已盧詹性剛直議論不避豪貴執政者嘗惡之天福初拜禮部尚書分司雒下與右僕射盧質㪚騎常侍盧重俱在西都數相過從三人俱嗜酒好逰山水塔廟林亭花竹之地無不同往酣飲為樂人無以間厠雒中朝士目為三盧㑹嘗委順性命不營財利身死之日家無衣物𦵏具不給俟其君賜方卜𦵏事縱逸夫人禀五常之性首萬物之靈清濁殊分賢愚異致所以貴賤有位動靜有常故不可以一槩而量之則有放曠為懐誕縱成志不䕶細行罔媿時譏或寓興扵山林威儀不整或傲情於朝市禮法罔修是以大禮有環珮之節前哲有韋弦之戒傲不可長其斯之謂與漢司馬相如為文園令初相如客臨卭富人卓王孫為具召之并召令相如至酒酣臨卭令前奏琴曰竊聞長卿好之願以自娯長卿相如字奏進也相如辭謝為鼓一再行行謂曲引也古樂府長歌行短歌行此其義也是時卓王孫有女文君新寡好音故相如繆與令相重而以琴心挑之寄心於琴聲以挑動之也挑徒了反相如時從車騎雍容間雅間讀曰閑甚都都閑美之稱也詩鄭風有女同車之篇云洵美且都山有抉蘓之篇又云不見子都則知都者美也及飲卓氏弄琴文君竊從戸窺心說而好之說讀曰悅悅其人而好其音也恐不得當也當與對偶之既罷相如乃令侍人重賜文君侍者通殷勤文君夜亡奔相如陳遵為公府掾公府掾史率皆羸車小馬不上鮮明而遵獨極輿馬衣服之好門外車騎交錯又日出醉歸曹事數廢西曹以故事適之案舊法令而罰之也適讀曰謫侍曹輙詣寺舍曰陳遵卿今日以某事適遵曰滿百乃相聞故事有百適者斥後漢桓譚性嗜倡樂簡易不修威儀而喜非毁俗儒繇是多見排詆哀平間位不過郎賈逵為侍中世稱為通儒然不修小節當時以此頗譏焉故不至大官虞延陳留東昏人性敦朴不拘小節又無郷曲之譽位至司徒孔融為少府與蔡邕素善邕卒後有虎賁士貌類於邕融毎酒酣引與同坐曰雖無老成人且有典刑魏陶謙字㳟祖少孤始以不羈聞於縣中年十四猶綴帛為幡乗竹馬而戯邑中兒僮皆隨之後至徐州刺史游楚為隴西太守蜀冦至堅守徵拜駙馬都尉楚不學問而性好逰遨音樂乃畜歌者琵琶箏簫毎行悉將以自隨所在摴蒲投壺歡欣自娯數歲復出為北地太守年七十餘卒管輅字公明平原人容貌粗醜無威儀而嗜酒飲食言戯不擇非類故人多愛之而不敬也蜀何祗字君肅少寒貧為人寛厚通濟體甚壯大又能飲食好聲色不持節簡時人少貴之者仕至犍為太守呉潘璋字文珪魏郡發干人大帝為陽羡長始往隨帝性博蕩嗜酒居貧好賖酤債家至門輙言後豪富相還帝竒愛之胡綜汝南固始人為偏將軍兼左執法性嗜酒酒後歡呼極意或推引杯觴搏撃左右大帝愛其才弗之責也晉阮籍字嗣宗陳留尉氏人也容貎瓌傑志氣宏放傲然獨得任性不羈而喜怒不形於色或閉戸視書累月不出或登臨山水經日忘歸博覽羣籍猶好荘老嗜酒能嘯善彈琴當其得意忽忘形骸時人多謂之癡及帝輔政籍嘗從容言扵帝曰籍平生曽逰東平樂其風土帝大悅即拜東平相籍乗驢到郡壊府舍屏鄣使内外相望法令清簡旬日而還籍性至孝母終正與人圍棋對者求止籍留與决賭既而飲酒二斗舉聲一號吐血數升及将葬食一蒸肫飲二斗酒然後臨訣直言窮矣舉聲一號因又吐血數升毁瘠骨立殆致滅性裴楷往弔之籍㪚髪箕踞醉而直視楷弔唁畢便去籍任性不羈嫂嘗歸寜籍相見與别或譏之籍曰禮豈為我設邪鄰家少婦有美色當壚沽酒籍嘗詣婦飲醉便臥其側籍既不自嫌其夫察之亦不疑兵家女有才色未嫁而死籍不識其父兄徑往哭之盡哀而還其外坦蕩而内淳至皆此類也王廙字世將為荆州别將廙性雋乂率嘗從南下且自潯陽迅風飛帆暮至都倚舫樓長嘯神氣自適王導謂庾亮曰世將為時識事亮曰正足舒其逸氣耳孫楚字子荆年四十餘始叅鎮東軍事王濟卒將𦵏時賢無不畢至楚雅敬濟而後来哭之甚悲賓客莫不垂涕哭畢向靈牀曰卿嘗好我作驢鳴我為卿試作之體似聲真賓客皆笑楚顧曰諸君不死而令王濟死乎胡母輔之字彦國性嗜酒任縱不拘小節為樂安太守與郡人光逸晝夜酣飲不視郡事成都王頴為太弟召為中庻子遂與謝鯤王澄阮修王尼畢卓俱為傲達謝鯤為王敦大將軍長史毎與畢卓王尼阮放羊曼桓彛阮孚等縱酒敦以其名文高雅相賓禮光逸字孟祖樂安人祖為博昌小吏縣令使逸送客冐寒舉體凍濕還遇令不在逸觧衣炙之入令被中臥令還大怒將加嚴罰逸曰家貧衣單沾濕無可代若不暫温勢必凍死奈何惜一被而殺一人乎君子仁愛必不爾也故寢而不疑令竒而釋之後以世難避亂渡江復依胡母輔之初至屬輔之與謝鯤阮放畢卓羊曼阮彛阮孚㪚髪裸裎閉室酣飲已累日逸將排戸入守者不聽逸便扵戸外脫衣露頂於狗竇中窺之而大呌輔之驚曰他人必不能爾必我孟祖也遽呼入遂與飲不捨晝夜時人謂之八達胡母謙之字子光輔之子也才學不及父而傲縱過之至酣醉嘗呼其父字輔之亦不以介意談者以為狂輔之正酣醉謙之闚而厲聲曰彦國年老不得為爾將令我尻背東壁輔之歡笑呼入與共飲其所為如此年未三十而卒阮孚初辟太傅府遷騎兵屬避亂渡江元帝以為安東叅軍蓬髪飲酒不以正務嬰心時帝既用申韓以救世而孚之徒未能棄也雖然不以事任處之轉丞相從事中郎終日酣縱嘗為有司所按帝毎優容之瑯琊王褒為車騎將軍鎮庾陵髙選僚佐以孚為長史帝謂曰卿既綂軍府郊壘多事宜節飲也孚答曰陛下不以臣不才委之以戎旅之重臣僶俛從事不敢有言者竊以今王蒞鎮威風赫然皇澤遐被賊冦斂迹氛祲既澄日月自朗臣亦何可爝火不息正應端拱嘯詠以樂當年爾後為黄門侍郎㪚騎常侍以金貂換酒復為所司彈劾帝宥之王戎為人短小任率不修威儀官至司徒王敦謝鯤庾敳阮修皆為王衍所親善號為四友而亦與王澄狎又有光逸胡母輔之等亦豫焉酣讌縱誕窮歡極娯敦為大將軍張翰字季鷹呉人有清才善屬文而縱任不拘時人號為江東步兵㑹稽賀循赴命入雒經呉閶門於船中彈琴翰初不相識乃就循言譚便大相欣悅問循知其入雒翰曰吾亦有事北京便同載即去而不告家人後辟齊王掾棄官歸同郡顧榮素好琴及卒家人嘗置琴扵靈座翰哭之慟既而上床歎曰顧彦先復能賞此否因又慟既已不弔喪主而去王澄為荆州刺史澄將之鎮送者傾朝澄見樹上鵲巢便脫衣上樹探鷇而弄之神氣肅然旁若無人劉琨謂澄曰卿形雖㪚朗而内實動狹以此處世難得其死黙然不答郭璞雅性輕易不修威儀嗜酒好色時或過度著作郎于寳嘗戒之曰此非適性之道也璞曰吾所受有本限用之嘗恐不得盡卿乃憂酒色之為害乎袁耽字彦道少有才氣俶儻不羈為士類所稱桓温少時游於博徒資産俱盡尚有負進思自振之方莫知所出欲求濟扵耽而耽在艱試以告焉耽畧無難色遂變服懐布㡌隨温與債主戲耽素有藝名債者聞之而不相識謂之卿當不辦作袁彦道也遂就局十萬一擲直上百萬耽投馬絶呌探布帽擲地曰識袁彦道不其通脫若此謝奕與桓温善辟為安西司馬猶推布衣好在温坐岸幘笑詠無異常日桓温曰我方外司馬奕毎因酒無復朝廷禮嘗逼温飲温走入南康主門避之主曰君若無狂司馬我何由得相見奕遂攜酒就㕔事引温一兵帥共飲曰失一老兵得一老兵亦何所怪温不之責王忱太原中出為荆州刺史都督荆益寜三州軍事建武將軍假節忱自恃才氣放酒誕節慕王澄之為人末年猶嗜酒一飲連月不醒或裸體而游毎歎三日不飲便覺形神不相親婦父嘗有慘忱乗醉弔之婦父慟哭忱與賓客十許人連臂被髪裸形而入繞之三匝而出其所行多此類王徽之卓犖不拘為車騎將軍桓冲騎兵叅軍嘗從冲行值暴雨徽之因下馬排入車中曰公豈得獨擅一車時呉中一士大夫家有好竹欲觀之便出座竟造竹下諷嘯良乆主人洒掃請坐徽之不顧將出主人乃閉門徽之更以此賞之盡歡而去又嘗居山隂夜雪初霽月色清朗四望皓然獨酌酒詠左思招隠詩忽憶戴逵逵時在剡便夜乗小船詣之經宿方至造門不前而反人問其故徽之曰本乗興而行興盡而反何必見安道耶宋顔延之好飲酒不䕶細行年三十猶未婚又嘗乗羸牛笨車逢子竣鹵簿即屏住道側又好騎馬遨逰里巷遇知舊輙據鞍索酒得酒必頺然自得位至光禄范曄為尚書吏部郎時彭城太妃薨將𦵏祖夕僚故並集東府曄弟廣淵時為司徒祭酒其日在直曄與司徒左西屬王深宿廣淵許夜中酣飲開北牖聴挽歌為樂義康大怒左遷曄宣城太守沈昭畧字茂隆性狂儁不仕公卿使酒仗氣無所推下嘗醉晚日負杖攜家賓子弟至婁湖苑逢王景文子約張目視之曰汝王約乃肥而癡約曰汝沈昭畧耶何乃瘦而狂昭畧撫掌大笑曰瘦已勝肥狂又勝癡奈何王約奈汝癡何謝靈運為侍中陳疾退居扵㑹稽因父祖之資生業甚厚奴僮既衆義故門生數百鑿山浚湖功役無已尋山陟嶺必造幽峻巖嶂千里莫不備盡登躡嘗着木屐上山則去前齒下山去其後齒嘗自始寜南山伐木開徑直至臨海從者數百人臨海太守王琇驚駭謂為山賊徐知是靈運乃安又要琇更進琇不肯靈運贈琇詩曰邦君難地險旅客易山行在㑹稽亦多徒衆驚縣邑也王敬𢎞為天門太守山郡無事恣其逰戱累日不回王僧達性好鷹犬與閭里少年相馳逐又躬自屠牛位至中書南齊張欣泰為直閣步兵校尉戍羽林監欣泰通陟雅俗交結多是名士下直輒逰園池着鹿皮冠衲衣錫杖挾素琴有以啓世祖者世祖曰將家兒何敢作此舉止丘靈鞠宋世聞名甚盛入齊頗减蓬髪弛縱無形儀不治家業王儉謂人曰丘公仕宦不進才亦退矣位至長沙王車騎長史大中大夫卞彬為右軍將軍家貧出為南康郡丞彬頻飲酒擯棄形骸作蚤蝨賦序曰余居貧布衣十年不製衣一袍之緼有生所託資其寒暑無與易之為人多病起居甚疎縈寢敗絮不能自釋兼攝性懈情懶事皮膚澡刷不謹澣沐失時四體㲰㲰加以臭穢故葦蓆蓬纓之間蚤蝨猥流淫癢渭灌無時怒害探揣獲撮日不替手蝨有喭言朝生暮孫若吾之蝨者無湯沐之慮絶相弔之憂晏聚乎乆襟爛布之裳復不懃之討捕孫孫息息三十五歲焉其畧言皆實録也為車騎記室彬性飲酒以瓠壺瓢勺抗皮為肴饈着帛冠十二年不改易以大瓠為火籠什物多諸詭異自稱卞田居婦為傅蠶室或諫曰卿都不操名器何繇得升彬曰擲五木子十擲輙鞬豈復擲子之拙吾好擲正極此爾禇蕡辭爵讓與弟蓁仍居幕下及王儉薨乃騎水牛出弔以牛繫門外柱入哭盡哀而退家人不知也梁王籍為大司馬從事中郎遷中㪚大夫猶不得志遂徒行市道不擇交逰庾仲容博學少有令名頗任氣使酒好危言高論士友以此少之唯與王籍謝幾卿情好相得二人時亦不調遂相追隨誕縱謀飲不復持簡操乆之復為諮議叅軍出為黝縣令謝幾卿為尚書左丞性通脫意行不拘朝憲嘗預樂逰苑宴不得醉而還因詣道邊酒壚停車褰幔與車前三騶對飲時觀者如堵幾卿處之自若後以在省署夜著犢鼻褌與門生登閣道飲酒酣呼為有司紏奏坐免官劉緩字舍度為湘東王中録事虚逺有氣調風流迭宕名高一府嘗云不須名位所須衣食不用身後之譽唯重目前知見周𢎞正為㪚騎常侍夏月著犢鼻褌承朱衣為有司所彈其作為如此後魏薛裔字豫孫父為立中將軍性豪爽盛營園宅賓客聲伎以恣嬉逰柳逺字季雲性麤疎無拘簡時人或謂之栁癲好彈琴耽酒時有文詠為肅宗挽郎北齊司馬膺之家富扵財厚自封殖王元景邢子才之流以夙素重之以其疎簡傲物竟天保世淪滯不齒裴英起聰慧滑稽好劇譚不拘儀簡劉逖字子長少而聰敏好弋獵騎射以行樂為事愛交逰善戱謔郡辟為功曹顔之推好飲酒多狂縱不修邊幅時論以此少之位至黄門侍郎後周盧柔性聰好學頗使酒誕節為世所譏誚後仕至開府儀同三司唐李伯藥以䕃補三衞隋太子勇召入東宫補通事舍人伯藥少時疎放好與綺紈公子相追以詩酒為務十年不徙官所與交者亦當時有名之士李客師特進衛國公靖季弟也少任俠善騎射嘗以馳射為事不事大業末為涿郡倉曹書佐太守崔𢎞度甚愛狎之毎與之為弋獵絲竹之賓貞觀初拜右武衞將軍累封丹陽郡公尋以年老致仕退居昆明之别業然而馳射不衰四時縱禽無暫休息京城并南山四至灃水鳥獸皆識之毎出則鳥鵲之類千萬為羣隨逐噪之時臨昆明池鳧鴈亦皆㪚去郊野號為鳥賊卒時年九十餘贈幽州都督陪𦵏昭陵唐敬嗣則天初為房州刺史好摴蒲飲酒其孫汪無學術頗有祖風開元末為蜀州唐安令與楊國忠博徒相得賀知章為祕書監晩年猶縱恣無復規簡自號四明狂客又稱祕書外監遨逰里巷醉後屬辭動成卷軸文不加㸃咸有可觀路恕為懷州刺史累遷賓客常侍弟有佳林園自貞元初李紓包佶輩迄扵元和末僅四十年朝之名卿咸從之逰髙歌縱酒不屑外意未嘗問家人事人亦以和易稱之楊元卿少孤慷慨有才畧及冠尚漂蕩江嶺之表縱逰放言時人謂之狂生元卿官至太子太保崔咸為祕書監少有林壑之志往往潛逰南山經時不反既冠連中文科猶長於篇詠好飲酒毎風月孤靜吟嘯移時多悽愴流涕至酣醉則已鄭餘慶李夷簡皆辟扵幕中如奉師友後唐馬郁在武皇幕累官至簡校司空祕書監武皇與莊宗禮俱厚歲時給賜優異監軍張業本朝舊人權貴任事人士脅肩低首候之郁以滑稽侮狎其往如歸有時直造臥内毎賓僚宴集承業出珍果陳列於前者食之必盡承業私戒主膳者曰他日馬監至唯以乾藕子置前而已郁至窺之知其不可啖異日出鞾中一鐵撾碎而食之承業大笑曰為公異饌勿敗餘食按其俊率如此晉盧詹天福初拜禮部尚書分司雒下與右僕射盧質㪚騎常侍盧重俱在西都數相過從三人俱嗜酒好逰山水塔廟林亭花竹之地無不同往酣飲為樂人無間然雒中朝士目為三盧㑹嘗委順性命不營財利開運初卒扵雒陽詹家無長物𦵏具不給少帝聞之賜布帛百叚粟麥百斛方能襄其𦵏事贈太子少保楊凝式天保中為太子賓客尋以禮部尚書致仕居伊雒之間不以晝夜為拘恣其狂逸多所干㤓自居留已降咸以俊才耆徳莫之責也册府元龜卷八百五十五
