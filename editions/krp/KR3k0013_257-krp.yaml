body:
  text: 册府元龜卷二百五十七宋王欽若等撰儲宫部建立第二唐髙祖既受隋封為唐王義寧元年十一月恭帝以隴西公建成為唐國世子武德元年五月髙祖即位六月庚辰立世子建成為皇太子即隠太子也九年六月癸亥詔曰儲貳之重式固宗祧一有元良以貞萬國天䇿上將大尉尚書令陜東道大行臺尚書益州道行臺尚書令雍蒲二州都督領十二衛大將軍中書令上柱國秦王世民器質冲逺風猷昭茂宏圖夙著羙業日隆孝惟德本周於百行仁為重任以安萬物王迹初基經營締搆戡翦多難征討不庭嘉謀特舉長筭必尅敷政大邦宣風區隩功髙四履道冠二南任總機衡庶績惟允職兼内外彛章載穆遐邇屬意朝野具瞻宜乗鼎業允膺守器可立為皇太子即太宗也太宗以武德九年八月甲子即位十月癸亥尚書八座奏請立儲貳詔曰尚書奏議以為少陽作二元良治本䖍奉宗祏式固邦家中山王承乾地居嫡長天姿峻嶷仁孝純深業履昭茂早聞叡哲㓜觀詩禮允茲守器養德春宫朕欽承景業嗣膺保位憲則前王思隆正緒宜依衆請以答僉望可立承乾為皇太子貞觀八年二月己巳皇太子承乾加元服十七年四月乙酉廢太子承乾為庻人丙戌詔曰昔者哲王受圖上聖垂範建儲兩以奉宗廟總監撫以寧國家既義出於至公亦事兼於權道故以賢而立則王季興周以貴而升則明帝定漢詳諸方册豈不然乎并州都督右武候大將軍晉王治地居茂親才惟明德至性仁孝淑質惠和夙著夢日之祥早流樂善之譽好禮無倦強學不怠今承華虚位率土繫心疇咨文武咸所推戴古人云知子莫若父知臣莫若君朕謂此子寔允衆望可以則天作貳可以守器承祧永固百世以寧萬國可立治為皇太子所司備禮册命即髙宗也甲午臨軒授皇太子册己亥御兩儀殿皇太子侍側陳孝德以戒之謂侍臣曰朕御天下十有七載遂得太子一詣寢門知子唯父久已體之然初立以長不能廢棄今者喪敗其自取之矣初承乾之將廢也魏王泰日入奉侍太宗面許立為太子因謂侍臣曰泰昨入見自投我懷中云臣今日始得與陛下為子更生之日也臣有一孽子臣百年之後當為陛下殺之傳國晉王父子之道故當天性我見其如此甚憐之禇遂良進曰陛下大失言伏願審思無令錯誤也安有陛下百年之後魏王持國執柄為天下之主而能殺其愛子傳國於晉王者乎陛下日者立承乾為太子而復寵愛魏王禮數有踰於承乾者良由嫡庻不分所以至此殷監不逺足為龜鏡陛下今日既立魏王泰伏願陛下别安置晉王始得安全耳太宗涕泗交下曰我不能因起入内太宗以晉王仁孝心所鍾愛又以太原瑞石文云李治萬吉意以為嗣而未發言泰任數知太宗愛晉王因謂之曰汝善於元昌今敗得無有憂色晉王憂之見於顔色太宗怪而屢問方言其故太宗慨然有悔立泰之言矣是日太宗御兩儀殿羣官盡出詔留司徒長孫無忌司空房𤣥齡兵部尚書李勣諫議大夫褚遂良謂曰我三子一弟所為如此我心無聊因自投於牀引佩刀無忌等爭趨抱持太宗手中爭取佩刀以授晉王無忌等請太宗所欲曰我欲立晉王無忌曰謹奉詔有異議者臣請斬之太宗謂晉王曰汝舅許汝也宜拜謝晉王因下拜太宗謂無忌等既符我意未知物論何如無忌等又曰晉王仁孝天下屬心乆矣伏乞召問百僚必無異辭若不手舞同音臣負陛下萬死妃嬪列於紗窻内傾耳者數百人聞帝與無忌等立晉王議定一時嚂呌響振宫掖太宗於是御太極殿召文武六品以上曰承乾悖逆泰亦敗類朕所觀之皆不可立欲選諸子尤仁孝者立為冡嗣爾其為朕明言衆咸言晉王忠孝仁愛文德皇后之子立為儲君無所與讓皆騰躍歡呌不可禁止太宗見衆情所與顔色甚恱是日泰從百餘騎至永安門詔門司盡辟其騎令引泰於肅章門入出𤣥武門幽於北苑髙宗永徽三年七月丁巳立陳王忠為皇太子忠髙宗長子永徽元年拜雍州牧時王皇后無子其舅中書令柳奭説后謀立忠為太子以忠母賤冀其親已后然之奭與尚書右僕射褚遂良侍中韓瑗諷太尉長孫無忌左僕射于志寧等固請立忠為儲后髙宗許之顯慶元年正月辛未立代王𢎞為皇太子先是永徽六年十一月丁卯禮部尚書許敬宗奏曰臣聞元儲以貴立嫡之義尤彰罔敢同名正本之文逾顯所以内崇宗廟外重郊社取鍳前王行之自乆陛下憲章千古含育萬邦爰立聖慈母儀天下繼而皇后生子合處少陽出自塗山是謂吾君之嗣夙聞胎教宜展問豎之心乃復獲宗降居藩邸從然養德猶韜甲舘之符未纂承華尚阻商山之道是使前星匿彩瑶岳韜峯臣愚誠竊所未喻且今之守器素非皇嫡永徽爰始國本未生權引彗星越外明兩近者元妃載誕正嗣降神重光有融爝暉宜息安可以茲傍統叨據温文國有諍臣孰逃其責謹按春秋左氏傳云隱公元年春不書即位攝也昔宋武公生仲子有文在其手曰為魯夫人故仲子歸于我生桓公是以隱公立而奉之自營莵裘遜而歸老孔子褒其讓嫡旌于此事之書又束觀漢史云光武皇帝子疆居長建武之初為皇太子及皇后隂氏有子曰莊繇是疆不自寧固求遜位帝乃從之封疆為東海王竟以莊為太子是為孝明皇帝竊惟息姑克讓可以思齊劉疆守藩宜遵徃軌追蹤太伯不亦休哉踵武延陵故常安矣寧可反植枝幹乆易位於天庭倒襲裳衣使違方於震位蠢爾黎庻云誰係心垂裕後昆将何播美又且父子之際人所難言事或批鱗必嬰嚴憲臣竊為身計茍且隨流尸祿偷榮固知無咎伏自思忖荷盼先朝引於陋巷之中申以後車之禮雲臺畫象十有八人三紀于茲唯臣僅在趨事陛下綿歴二坊叨處調䕶之流濫齒正人之伍䕃璇華於望苑雕朽木以為容推鑾轂於天衢偶雞樹而徒老常思自勉少報洪恩既屬天歩康寧效湛族而無所太階平晏須焚宗而靡由今兹冡嗣執珪下枝當璧孟侯淪屈大典未申臣既分職文昌典司嘉禮位均宗伯弗敢曠官效命之秋宜在茲日所以思不出位輕呌帝閽冐嚴威干斧鉞㤀忌諱竭精誠天或弗違從其至理朝聞夕殞抃若登僊如塞讜言譴其芻瞽煎膏染鼎亦所丼心仍望奉見指陳彛典及召見帝曰卿朕之伯夷也立嫡之義在禮何如對曰正基本則萬事理皇太子國之本也本獨未正萬國無所係心據禮最為不可且在東宫者所出本㣲今知國家已有正屬必不自安竊位而懷自疑恐非宗廟之福願陛下熟計之帝曰忠己自讓對曰能為太伯願速從之四年十月丙午皇太子𢎞加元服後薨謚字敬皇帝上元二年六月戊寅立雍州牧右衛大将軍雍王賢為皇太子即章懷太子也調露二年八月己丑立左衛大将軍雍州牧共王哲為皇太子改名顯即中宗也永淳元年二月戊午立皇孫重照為皇太孫重照中宗長子開耀二年生於東内殿髙宗甚悦及滿月立為皇太孫後避則天諱改名重潤降封邵王中宗嗣聖元年二月壬子以永平王成器為皇太子後改名憲降封寧王謚曰讓皇帝神龍二年七月戊申立左衛大将軍衛王重俊為皇太子時以除遂不行册禮即節愍太子也睿宗唐隆元年六月丁未以平王隆基有安社稷之功立為皇太子即𤣥宗也制曰舜去四㓙而功格天地武有七德而戡定黎民故知有大勲者受神明之福仗髙義者為匕鬯之主朕恭臨寶位亭育寰區以萬物之心為心以兆人之命為命雖承繼之道咸以冡嫡居尊而無私之懷必推功業為首然後可保安社稷永奉宗祧第三子平王隆基孝而克忠義而能勇比以朕居藩邸䖍守國彛貴戚中人都無引接羣邪害正凶黨實繁利口巧言䜛説罔極韋温延秀朋徒競起晉卿楚客交搆其間潜結囘邪排擠端善正人集木君子阽危愒日視隂朝不保夕擁羽林萬騎率左右屯營先害朕躬并及太平公主中外良士咸擬勦屠隆基密聞其期先難奮發挺身鞫旅衆應如歸呼噏之間兇渠殄㓕安七廟於幾墜濟羣生於将殞方舜之功過四比武之徳逾七靈祇毓徳昆弟樂推一人元良萬邦已定為副君者非此而誰可立為皇太子有司擇日備儀注册命初睿宗即位議立皇太子以宋王成器長而平王有誅韋氏之功意乆不定成器辭曰儲副者天下之公器時平則先嫡長國難則歸有功若乖其宜則海内失望非社稷之計臣敢以死請而平王聞之累日涕泣固讓言甚切至諸王等咸以平王有社稷大功神祗僉屬羣臣又曰除天下之禍者享天下之福拯天下之危者受天下之安平王有聖德定天下宜膺主鬯以副羣心睿宗乃從之平王又抗表讓曰臣聞立嫡以長古之制也豈以臣有薄効虧失彛章伏願稽古而行臣之願也睿宗不許王又累表懇辭睿宗固拒之𤣥宗開元二年十二月辛未立郢王嗣謙為皇太子制曰樹之后王所以輯寧黎獻前立儲副所以安固宗祧故能崇四術之科為萬國之本長㓜君臣之序齒胄知歸温文恭敬之風羣生攸屬古之制也其在茲乎郢王嗣謙聰睿夙成端莊特秀三雍禮樂必也生知五官詞藻居然暗合體道為器非假於學問資靈授德自符於神觧夏弦春誦地義天經立人之道既彰為子之誠皆著今昇平在運域中咸寧将有事於元良固不踰於三善宜光近日之敏俾則前星之耀來年正月四日傋禮册為皇太子所司准式七年十一月皇太子將加元服下制曰元良所以主匕鬯奉社稷貞于萬國祝以三加皇太子居長德之地務親仁之道爰就師保克修志業寢門問安而資敬大學齒胄而徴善大猷且酌元服宜申史稱周頌之年傳紀魯襄之禮粤若敬始謂之成人逮茲建正式展嘉事可以來年正月加元服所司擇日奏聞禮官博士詳考故實允符令典八年正月甲子皇太子加元服乙丑皇太子謁太廟十三年制皇太子嗣謙改名鴻二十六年以罪廢為庻人二十六年六月庚子制曰大寶曰位實在其丕承萬邦以貞必建於眀兩朕嗣守鴻業祗嚴永圖恭惟匕鬯之主豈捨人神之望開府儀同三司兼單于大都䕶河北河東行軍元帥朔方軍節度使兼關内支度營田鹽池押諸藩部落等大使上柱國忠王璵天假聰明生知仁孝君親一致友悌二成温文之德合於古訓敬愛之風聞於天下嘗以視其所以察其所安考言有章詢事皆中知子者父允叶於元良以長則順且符於舊典宜膺擇嗣之舉俾受升儲之命可立為皇太子即肅宗也仍取來月内擇日册命所司准式七月己巳帝御宣政殿㑹九品以上文武百官册皇太子忠王璵帝第三子自皇太子瑾得罪廢為庻人王長而最賢遂立為皇太子肅宗乾元元年五月庚寅詔成王俶宜立為皇太子改名豫即代宗也所司擇日行册禮七月壬午皇太子於宣政殿謝册命十月甲辰帝御宣政殿册皇太子代宗廣德二年正月己卯立元帥尚書令雍王适為皇太子甲子雍王表曰臣性本凡愚識無乆逺夙承訓誨未逹禮經俾踐元良是輕主鬯顧惟孱懦何以克堪然臣頃總戎麾恭慿睿畧在臣何力妄欲貪天且五帝三王立嗣殊制王者家天下以傳子帝者官天下以傳賢胡有居五帝之時行三王之禮臣雖不敏竊謂非宜乃知古之正統不以年樹俊不以嫡明矣若以臣居嫡而廢德在長而捨賢恐大道淳風隱而不見伏以天下之公器不可虚渉宗廟之宏綱不可輕舉伏惟陛下敦三善之本審萬國之貞不可以私授為心但可以推賢為慮則陛下享唐虞之德臣䝉伯邑之名乞回聖慈俯寢恩命帝詔答曰立嫡以長繼統惟賢三代成規百王令典惟爾元子敬而温文孝叶天經學深義府克奉趨庭之訓遂成麟趾之才項總元戎式平巨猾外蕃受律羣帥叶謀咸推兎苑之賢允負龍樓之拜宜膺德舉勿用勞謙乙丑又上表陳謙答詔不允即宜斷表二月己巳帝御宣政殿册皇太子先是寶應二年五月宰臣及文武百僚上表請立皇太子兩表不從宰臣等又上言曰伏見儲貳未立明兩虚位累有陳請愚誠不從陛下以郊壘多虞羗戎侵軼即茲大典姑務安邉誠聖主憂勤謙讓之心非國家固本乆逺之計易曰重明以麗乎正乃化成天下書曰一人元良萬邦以貞謹案歴代哲王守邦建國未有不先定冡嗣以叶羣情然後修禮文緝刑政於是諸侯以秩進戎狄以義敘匕鬯以時主監撫以事明宗祀之本不可蹔闕今大盗初㓕先零猖狂時號艱虞人懷底定而守嫡不建繼體未孚天下顒顒實有所望陛下固辭未免億兆揺心伏願逺圖百代之謀俯遂羣臣之請必冀四夷向化萬國歸誠帝手詔答曰卿等謨明廟堂夾輔王室請正長嫡以崇儲副稱元良之貞固天下之本比調主鬯誠哉是言但以黎庻不康甲兵乆頓憂勞旰昃姑務息人與衆共守斯為急務册命之禮輟而未行方俟有年用申盛典高秋𤣥月平秋不遥因其萬物之成繼以重離之照子孫逢吉是謂大同待至此時依卿所請宜悉朕懷至是乃降册命德宗以大歴十四年正月即位十二月乙卯詔曰主器者莫若長子繼明者必建儲兩既以傳重亦以崇本則君親之大義帝王之𢎞範無先於此矣朕以𦕈身纘承丕緒夕惕祗畏惟懷永圖承八葉之耿光居四海而稱大則匕鬯之主粢盛之重樹元貴嫡有邦之先宣王誦生知古制既賢且長聰明敏慱温恭孝友不自滿假率由憲章慶發髙禖兆申甲觀為子之道惟父能知審其觀志宜承大統固能總戎監撫載乎鼎實不絶馳道謙敬益崇問安必自於因心入學固知其讓齒升茲上嗣庻貞萬國可立為皇太子即順宗也宜令所司擇日備禮册命建中元年正月册皇太子順宗以貞元二十一年正月即位三月癸巳詔曰萬國之本屬在元良主器之重歸于長子所以固社稷正邦統古之制也廣陵郡王淳孝友莊敬慈仁忠恕博厚以容物見明而愛人祗服訓詞文皆合雅講求典禮學必承師言有令聞動無違德朕獲纘丕緒祗若大猷惟懷永圖用建儲貳以承宗廟以奉粢盛爰舉舊章俾膺茂典宜册為皇太子改名純即憲宗也仍令有司擇日備册命四月己丑帝御宣政殿册皇太子時帝即位已乆而臣下未有親奏對者内外咸言王伾王叔文專行斷决日有異説又屬頻隂雨皆以為羣小用事之應及將行册禮之夕雨乃止至行事之時天景晴朗有慶雲見識者以為天意有所歸及覩皇太子儀表班行悚動退無不相慶至有感而泣者其日道路觀悦逓相傳告中外有屬焉憲宗元和四年閏三月丁卯詔曰朕聞君天下者纘承統業何常不樹建儲貳固安邦家况長子有主器之義元良貞立國之道上以嚴宗社之慶下以順長乆之宜歴考前載率由斯道鄧王寧性與忠敬生知孝友秉寛明之度體慈愛之心學師訓謨詞尚經雅動皆中禮慮不違仁稽以舊章允膺上嗣朕獲纘丕緒夙夜䖍恭常懼神明未歆政理多闕曠茲茂典亟渉歳時今屬方隅甫寧品物咸遂覽皇王之制詢卿士之謀時瞻大猷莫此為重是用授之匕鬯位以青宫欽惟永圖俾服休命宜册為皇太子即惠昭太子也仍令有司擇日備禮册命四月令皇太子居少陽院其年有司將行册禮以孟夏孟秋再卜日臨事皆以雨罷至十月方就廷册六年太子薨七年七月乙亥制曰承廟祧之尊固邦國之本重其緒業貞以元良斯今古之通制也乃者春宫曠位已渉歳時將恐禆獻闕主鬯之儀膠庠虚齒學之道其何以懷寧方夏章示教源稽諸徃册用舉彛典遂有孝敬忠肅寛明惠和遵保傅之言佩經訓之㫖友于兄弟睦于宗親慱愛而恕已以誠慎行而餙躬以禮載觀所履克茂厥猷宜升儲闈以對休命朕祗若成憲惟懷永圖法二王垂統之秩紹十聖重光之烈致嚴禋配俾奉粢盛式昭上嗣之宗庻恊明離之吉宜册為皇太子改名常即穆宗也仍令有司擇日備禮册命十月壬寅帝即宣政殿册皇太子百寮退謁皇太子于崇明門幕殿凡三再拜太子皆答拜宫寮拜則受之又赴興慶宫進名奉賀皇太后穆宗長慶二年十二月癸巳制曰朕聞王者敬承宗祧欽若天命必建元子用寧邦家所以光恊繼明嚴當主鬯朕纘承聖緒寅奉丕圖永惟國本之安爰在皇儲之重而青宫乆闕望苑未開何以表式元良昭宣鴻業稽於徃册用舉彛章長男景王湛孝愛恭和忠敬誠肅慈惠特禀寛仁夙彰言通典謨動協儀矩睦友宗屬遵承傅道克修令問日茂嘉猷宜踐儲闈以承休命朕以君尊父嚴每推乾道聞詩學禮用首人倫嘉翼翼於誠心覩烝烝於孝敬克稱知子無讓前修俾奉粢盛式昭元嗣宜册為皇太子即敬宗也仍令有司擇日備禮册命乙未宰臣百寮並賀皇太后于興慶宫丙午帝御紫辰殿册皇太子故事册太子御宣政前殿時以帝體未康慮勞登御故從便也是日備宫懸於紫宸殿廷列而内仗於兩閣門内羣臣辨色序立於宣政門外俄就外廊食訖始具冠服劍履入日月華門列位於正衙辰後一刻方入閤帝臨軒後以中官列侍太子歩自崇明門以宫寮翼從駙馬二人扶整衣冠禮儀使導以進及樂作扇開羣臣拜訖太子進至龍墀東西再拜受册攝中書令杜元頴跪讀册文以授太子再拜蹈舞乃出歸于崇明門幕殿羣臣賀皇帝訖退詣崇明謁皇太子太子命舉簾執笏答拜宫寮拜則受之禮畢羣臣赴興慶宫稱賀初穆宗因擊毬暴得風恙機務稍壅外庭不知宫中安否者三日京師人情恟然右僕射裴度三上䟽請立儲嗣兩省官及翰林學士亦繼陳封章門下侍郎平章事李逄吉與同列因樞宻中使梁守謙劉𢎞規王守澄同議遂迎置景王於少陽院然後固請穆宗御紫宸殿以安衆心乃以十二月五日入閣率百寮稱賀因請立皇子景王為儲后感激嗚咽聞者莫不涕零班退又獨進曰景王先聖皇太后嫡長子至正且順事無可疑伏望即賜宣下臣謹便令有司擇日册命時穆宗不能言微有許諾之意逢吉還中書草奏封進時同列杜元頴先赴太廟宿齋逢吉後出光範門以所進言請立太子不言請立景王遽廻馬追之獨改奏状以進翊日詔下遂以景王為皇太子文宗太和六年十月甲子詔曰禮重承祧義存繼體思崇守器必務建儲王者所以固大本而貞萬國也魯王永温仁寛明聰敏孝愛動合至性居無放心樂善承顔曠度容衆恭勤詩書之教率由忠愿之風懿茲徽猷光我上嗣朕纂奉寶位丕寧聖圖欽若舊章同建儲貳爰俾主鬯以率問安統正龍樓之榮昭宣甲觀之兆宜膺茂典允屬元良宜册為皇太子仍令所司擇日備禮册命太子帝長子也母曰王昭儀帝自即位承敬宗盤㳺荒怠之後恭儉惕慎以安天下以晉王謹愿且欲建為儲貳未幾晉王薨帝哀悼甚不復言東宫事乆之方有是命中外慶悦七年八月庚寅御宣政殿册皇太子禮畢百寮詣興慶宫賀太皇太后義安太后又詣光順門賀皇太后開成三年十月太子薨開成四年十月制曰古先哲王之有天下也何嘗不正國本而成天序建儲兩而主重器朕以寡昧祗荷丕圖䖍恭寅畏思固鴻業慎擇全懿曠于旬時而卿士獻謀龜筮告吉以為少陽虚位願舉盛儀列聖垂休俾合予志選賢而立式表無私敬宗皇帝第六男陳王成美天假忠孝日新道德温文合雅謙敬保和裕端明之體度飭尚書之訓辭言皆中禮行不違仁是可以順考舊章欽若成命授之匕鬯以奉粢盛宜廻朱邸之榮俾踐青宫之重可以為皇太子宜令所司擇日備禮册命自青宫虚位將相大臣百職言者拜章面陳凡累月帝遂册立陳王宋立與夷之志也五年正月文宗暴疾兩軍中尉仇士良等矯詔立頴王為皇太弟廢太子為陳王五年正月己卯制曰朕顧𦕈身獲承丕構嚴恭寅畏十有五年雖宇内小康而大道猶鬰方思砥礪期臻治平而天不祐予夙嬰疾疹政既多闕心不自安近者凝沍所侵乆而寖劇臣寮愛我内外一心禱祀畢為藥䂖備至亟換旬月有加無瘳懼不能躬總萬機日釐庻政稽于古訓謀及大臣用建親賢以貳神器親弟頴王炎朕昔在藩邸與同師訓動成儀矩深禀寛仁俾奉昌圖必諧人欲可立為皇太弟即武宗也應軍國政事便令勾當是日兩軍自十六宅迎帝赴少陽院百官謁于東宫思賢殿分命羣臣告天地社稷武宗㑹昌六年三月遺詔立光王怡為皇太叔權勾當軍國政事改名忱即宣宗也宣宗大中十三年八月遺詔立長子鄆王温為皇太子監國改名漼即懿宗也懿宗咸通十四年七月制立第五男晉王儼為皇太子改名儇即僖宗也僖宗文德元年三月遺詔立夀王傑為皇太弟時帝暴疾不豫羣臣以吉王最賢又在壽王之上將立之惟軍容使楊復恭請立夀王後改名即昭宗也昭宗乾寧四年二月丙辰帝在華州節度使韓建表請立太子己未制德王裕宜册為皇太子天祐元年八月為蒋𤣥暉所害天祐元年八月遺詔曰輝王祚㓜彰岐嶷長實端良裒然不羣予所鍾愛必能克奉丕訓以安兆人宜立為皇太子改名柷監軍國事即哀帝也冊府元龜卷二百五十七
