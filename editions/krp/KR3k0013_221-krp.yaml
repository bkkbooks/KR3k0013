body:
  text: 冊府元龜卷二百二十一宋王欽若等撰僣偽部勲伐非常之績待豪俊而後成不世之才因艱虞而斯顯莫不扶大義以立節上忠本朝掃羣兇而戡難外勤逺略於是多士慕嚮四遠向風用能赫然奮庸光於當世使其念徳不怠居安思危知乎天不可逃盈難乆恃收邪謀于改物頓禍心于問鼎考存亡之至數審邪正之大倫則康定之功參伊周而論徳忠厚之節亘鍾鼎以垂芳者矣此之不為亡於何有觀其通變之略制勝之謀寧前智而後愚固百慮而一致蓋善惡詭趣安危異效其故何哉逆順之勢殊而億兆之心異也前凉張軌初為晉散騎常侍欲求凉州公卿亦舉軌才堪御遠恵帝永寧初出為䕶𦍑校尉凉州刺史于時鮮卑反叛寇盗縱横軌到官即討破之斬首萬餘級遂威著西州化行河右以宋配陰充氾瑗陰澹為股肱謀主永興中鮮卑若羅拔能皆為冦軌遣司馬宋配撃之斬㧞能俘十餘萬口威名大震恵帝遣加安西將軍封安樂鄉侯邑千户於是大城姑臧懷帝永嘉初㑹東𦍑校尉韓稚殺秦州刺史張輔軌少府司馬楊裔言於軌曰今日韓稚逆命擅殺張輔明公杖鉞一方宜懲不恪此亦春秋之義諸侯相滅亡桓公不能救則桓公恥之軌從焉遣中督䕶氾瑗率衆二萬討之先遺稚書曰今王綱紛撓牧守宜戮力勤王適得雍州檄云卿稱兵内侮吾董任一方義在伐叛武旅三萬駱驛繼發伐木之感心豈可言古之行師全國為上卿若單馬軍門者當與卿共平世難也稚得書而降軌後患風口不能言使子茂攝州事酒泉太守張鎮潜引秦州刺史賈龕以代軌宻使詣京師請尚書侍郎曹袪為西平太守圖為輔車之勢軌别駕麴晁欲專威福又遣使詣長安告南陽王模稱軌廢疾以請賈龕而龕將受之其兄讓龕曰張凉州一時名士威著西州汝何徳以代之龕乃止更以侍中爰瑜為凉州刺史治中楊澹馳詣長安割耳盤上訴軌之被誣模乃表停之晉昌張越凉州大族䜟言張氏覇凉自以才力應之從隴西内史遷凉州刺史越志在凉州遂託病歸河西陰圖代軌乃遣兄鎮及曹袪麴佩移檄廢軌以軍司杜耽攝州事使耽表越為刺史軌令曰吾在州八年不能綏靖區域又值中州兵亂秦隴倒懸加以寢患委篤實思歛迹避賢但負荷任重未便輙遂不圖諸人横興此變是不明吾心也吾視去貴州如脱屣耳郤遣主簿尉髦奉表詣闕便速脂轄將歸老宜陽長史王融參軍孟暢蹋折鎮檄排閣入諌曰晉室多故人神塗炭實頼明公撫寧西夏張鎮兄弟敢肆凶逆宜聲其罪而戮之不可成其志也軌黙然融等出而戒嚴武威太守張琠遣子坦馳詣京表曰魏尚安邊而獲戾充國盡忠而被譴皆前史之所譏今日之明鑒也順陽之思劉陶守闕者千人刺史之莅臣州若慈母之於赤子百姓之愛臣軌若旱苗之得膏雨伏聞信惑流言當有遷代民情嗷嗷如失父母今戎夷猾夏不宜騷動一方尋以子實為中督䕶率兵討鎭遣鎭外甥太府主簿令狐亞前喻鎭曰舅何不審安危明成敗主公西河著徳兵馬如雲此猶烮火已焚待江漢之水溺于洪流望越人之助其何及哉今數萬之軍已臨近境今唯全老親存門户輸誠歸官必保萬全之福鎭涕流曰人悮我也乃委罪功曹魯連而斬之詣實歸罪南討曹袪走之張坦至京師帝優詔勞軌依模所表命誅曹袪軌大悦赦州内殊死已下命實率尹員宋配歩騎三萬討袪别遣從事田迥王豐率騎八百自姑臧西南出石驢據長寧袪遣麴晁拒戰于黄阪實詭道出浩亹戰于破𦍑軌斬袪及牙門田囂遣治中張閬送義兵五千及郡國秀孝貢計器甲方物歸於京師張實初仕晉為議郎及還姑臧以討曹袪功封建武亭侯進爵福祿縣侯累除西中郎將領䕶羌校尉父軌卒州人推實攝位愍帝因下策書授持節都督涼州諸軍事涼州刺史西平公實遣都䕶王該送諸郡貢計獻名馬方珍經史圖籍于京師㑹劉曜逼長安實遣將軍王該率衆以援京城帝嘉之拜都督陜西諸軍事實知劉曜逼遷天子大臨三日遣太府司馬韓璞滅冦將軍田齊撫戎將軍張閬前鋒都䕶隂預歩騎一萬東赴國難命討虜將軍陳安故太守賈騫隴西太守吳紹各統郡兵為璞前驅戒璞曰前遣諸將多違機信所執不同致有乖異内不和親焉能服物今遣卿督五將兵事當如一體不得令乖異之問達孤耳也璞次南安諸𦍑斷軍路璞與張閬夾撃大敗㑹愍帝訃問至南陽王保鎮上邽自稱晉王遣使拜寔征西大將軍儀同三司増邑三千户俄而保為陳安所敗氐𦍑皆應之保窮迫遂去上邽遷祁山寔遣將韓璞歩騎五千赴難陳安退保綿諸保歸上邽未幾保復為安所敗使詣實乞師實遣宋毅赴之而安退㑹保為劉曜所逼遷于桑城將謀奔寔寔以宗室之望若至河右必動物情遣其將陰監逆保聲言翼衞寔禦之也㑹保薨其衆散奔凉州者萬餘人寔繇是恃險遠頗自驕恣張茂嗣其兄寔為凉州牧晉元帝永昌初使將軍韓璞率衆取隴西南安之地以置秦州張駿嗣其季父茂為凉州牧觀兵新鄉狩于北野因討軻没虜破之又使其將楊宣率衆越流沙伐龜茲鄯善於是西域並降初戊巳校尉趙貞不附于駿駿撃擒之以其地為髙昌郡及石勒殺劉曜駿因長安亂復收河南地至于狄道置武衞石門侯和漒州甘松五屯䕶軍與勒分境前趙劉元海初仕晉為建威將軍五部都督封漢光鄉侯恵帝元康末坐部人叛出塞免官成都王頴鎮鄴表元海行寧朔將軍監五部軍事恵帝失馭寇盗蜂起元海從祖故北部都尉左賢王劉宣等竊議曰昔我先人與漢約為兄弟憂泰同之自漢亡以來魏晉代興我單于雖有虗號無復尺土之業自諸侯王下同編户今司馬氏骨肉相殘四海鼎沸興邦復業此其時矣左賢王元海姿噐絶人幹宇超世天若不恢崇單于終不虗生此人也于是宻共推元海為大單于乃使其黨呼延攸詣鄴以謀告之元海請歸㑹葬頴弗許乃令攸先歸告宣等招集五部引㑹宜陽請胡聲言應頴實背之也頴為皇太子以元海為太弟屯校尉恵帝伐頴次於蕩陰頴假元海輔國將軍督北城守事及六軍敗績頴以元海為冠軍將軍封盧奴伯并州刺史東瀛公騰安北將軍王俊起兵伐頴元海説頴曰今二鎮䟦扈衆餘十萬恐非宿衞及近都士庶所能禦之請為殿下還説五部以赴國難頴曰五部之衆可以保發不縱能發之鮮卑烏丸勁速如風雲何易當耶吾欲奉乗輿還雒陽避其鋒鋭徐傳檄天下以逆順制之君意何如元海曰殿下武皇帝之子有殊勲於王室威恩光洽四海欽風孰不思為殿下没命投軀者哉何難發之有乎王浚豎子東瀛踈屬豈能與殿下争衡耶殿下一發鄴宮示弱於人雒陽可復至乎縱達雒陽威權不復在殿下也紙檄尺書誰為人奉之且東胡之悍不踰五部願殿下勉撫士衆靖以鎮之當為殿下以二部摧東瀛三部梟王浚二豎之首可指日而懸矣頴悦拜元海為北單于參丞相軍事元海至左國城劉宣等上大單于之號二旬之間衆已五萬都于離石王浚使將軍祈𢎞率鮮卑攻鄴頴敗挾天子南奔雒陽元海曰頴不用吾言軍自奔潰真奴才也然吾與之有言矣不可不救於是命右於陸王劉晏左獨鹿王劉延年率歩騎二萬將討鮮卑劉宣等固諌曰晉為無道奴𨽻御我是以右賢王猛不勝其忿屬晉綱未弛大事不遂右賢塗地單于之恥也今司馬氏父子兄弟自相魚肉此天厭晉徳授之於我單于積徳在躬為晉人所服方當興我邦族復呼韓邪之業鮮卑烏丸可以為援柰何拒之而拯仇敵今天假手於我不可違也違天不祥逆衆不濟天與不取反受其咎願單于勿疑元海曰善當為崇岡阜何能為培塿乎夫帝王豈有常哉大禹出於西戎文王生於東夷顧惟徳所授耳今見衆十餘萬皆一當晉十鼔行而摧亂晉猶拉枯耳上可成漢髙之業下不失為魏氏雖然晉人未必同我漢有天下世長恩徳結於人心是以昭烈﨑嶇於一州之地而能抗衡於天下吳又漢氏之甥約為兄弟兄亡弟紹不亦可乎且可稱漢追尊後主以懷人望乃遷於左國城逺人歸附者數萬永興元年元海乃為壇於南郊僣即漢王位立漢髙以下三祖五宗神主以祭之東瀛公騰使將軍聶𤣥討之戰于大陵𤣥師敗績騰懼率并州二萬餘户下山東所在為冦元海遣其建武將軍劉曜冦太原泫氏屯留長子中都皆䧟之二年騰又遣司馬瑜周良石鮮等討之次於離石汾城元海遣其武牙將軍劉欽等六軍拒瑜等四戰瑜皆敗欽振旅而歸遂進據河東攻冦蒲阪平陽皆䧟之元海入都蒲阪懷帝永嘉二年元海僣即皇帝位遷都平陽後趙石勒晉末以胡奴招集王陽䕫安支雄冀保吳豫劉膺桃豹逯明等八騎為羣盗後郭敖劉徵劉寳張曀僕呼延莫郭黒略張越孔豚趙鹿支屈六等又赴之號為十八騎復東如赤龍騄驥諸苑中乗苑馬逺掠繒寳以賂汲桑及成都王頴敗乗輿于蕩陰逼恵帝如鄴宫王浚以頴凌辱天子使鮮卑撃之頴懼挾帝南奔雒陽帝復為張方所逼遷于長安闗東所在兵起皆以誅頴為名河間王顒懼東師之盛欲輯懷東憂乃奏議廢頴是歳劉元海稱漢王于黎亭頴故將陽平人公師藩等自稱將軍起兵趙魏衆至數萬勒與汲桑帥牧人乘苑馬數百騎以赴之桑始命勒以石為姓勒為名焉藩拜為前隊督從攻平昌公模於鄴模使將軍馮嵩逆戰敗之藩濟自白馬而南濮陽太守茍晞討藩斬之勒與桑亡潜苑中桑以勒為伏夜牙門帥牧人刼掠郡縣繋囚又招山澤亡命多附勒勒率以應之桑乃自號大將軍稱為成都王頴誅東海王越東瀛公騰為名桑以勒為前驅屢有戰功署爲掃虜將軍忠明亭侯桑進軍攻鄴以勒為前鋒都督大敗騰將馮嵩因長驅入鄴遂害騰殺萬餘人掠婦女珍寳而去濟自延津南撃兖州越大懼使茍晞王瓉等討之桑勒攻幽州刺史石尠於樂陵尠死之乞活田禋帥衆五萬救尠勒逆戰敗禋與晞等相持於平原陽平間數月大小三十餘戰戰互有勝負越懼次于官渡為晞聲援桑勒為晞所敗死者萬餘人乃收餘衆將奔劉元海冀州刺史丁紹要之于赤橋又大敗之桑奔馬牧勒奔樂平王師斬桑于平原時胡部大張㔨督馮突莫等擁衆數千壁于上黨勒往從之深為所昵因説㔨督曰劉單于舉兵誅晉部大拒而不從豈能獨立乎曰不能勒曰如其不能者兵馬皆有所屬今部落皆已被單于賞募往往聚議欲叛部大而歸單于矣宜早為之計㔨督等素無智略懼部衆之貳已也乃潜隨勒單騎歸元海元海署㔨督為親漢王莫突為都督部大以勒為輔漢將軍平晉王以統之勒於是命㔨督為兄賜姓石氏名之曰㑹言其遇巳也烏丸張伏利度亦有衆三千壁于樂平劉元海屢招而不能致勒偽獲罪於元海因奔伏利度利度大悦度結為兄弟使勒率諸胡寇掠所向無前諸胡畏服勒知衆心之服已也乃因㑹執伏利度告諸胡曰今起大事我與伏利度孰堪為主諸胡咸以推勒勒於是釋伏利度率其部衆歸元海加勒督山東征討諸軍事以伏利度之衆配之元海使劉聦攻壺闗命勒率所統七千為前鋒都督劉琨遣䕶軍黄秀等救壺闗勒敗秀於白田秀死之勒遂䧟壺闗元海命勒與劉零閻羆等七將率衆三萬冦魏郡頓丘諸壘壁多䧟之及元海僣號授勒平東大將軍於是勒并軍冦鄴鄴潰執魏郡太守王粹于三臺進攻趙郡中立進軍攻鉅鹿常山䧟冀州郡縣堡壁百餘衆至十餘萬使其將張斯率騎詣并州山北諸郡縣説諸胡羯曉以安危諸胡懼勒威名多有附者進軍常山分遣諸將攻中山慱陵髙陽諸縣降之者數萬人分命諸將攻諸未下及叛者降三十餘壁置守宰以撫之進冦信都害冀州刺史王斌於是車騎將軍王堪北中郎將裴憲自雒陽率衆討勒勒燒營并糧廻軍拒之次于黄牛壘魏郡太守劉矩以郡附于勒勒使矩統其壘衆為中軍左翼勒至黎陽裴憲棄其軍奔于淮南王堪退堡倉垣勒與閻羆攻潴圏苑市二壘䧟之并綂其衆潜自石橋濟河攻䧟白馬東襲鄄城因攻倉垣遂渡河攻廣宗清河平原陽平諸縣降勒者九萬餘口復南濟河時劉聦攻河内勒率騎㑹之攻武徳及元海死劉聦授勒并州刺史汲郡公劉粲率衆四萬冦雒陽勒率騎二萬㑹之遂至雒川粲出轘轅勒出成臯闗圍陳留太守王瓉於倉垣為瓉所敗退屯文石津將北攻王浚㑹浚將王甲始率遼西鮮卑萬餘騎敗趙固于津北勒乃燒船棄營濟河攻襄城先是雍州流人王如侯脱嚴嶷等起兵江淮間聞勒之來也懼遣衆一萬屯襄城以拒勒勒撃敗之盡俘其衆勒至南陽屯于宛北山如懼勒之攻襄也使送珍寳車馬犒師結為兄弟勒納之如與侯脱不平説勒攻脱勒夜令三軍鷄鳴而駕晨壓宛門攻之旬有三日而尅嚴嶷率衆救脱至則無及遂降于勒勒斬脱囚嶷送于平陽盡并其衆軍勢彌盛勒南冦襄陽䧟江西壘壁三十餘所留刁膺守襄陽躬率精騎三萬攻王如憚如之盛遂趣襄城如知之遣弟璃率騎二萬五千詐言犒軍實欲襲勒勒迎撃滅之北冦新蔡進䧟許昌初東海王越率雒陽之衆二十萬討勒越薨于軍衆推太尉王衍為主率衆東下勒輕騎追及之衍軍大潰勒分騎圍而射之相登如山無一免者因率精騎三萬入自成臯闗㑹劉曜王彌冦雒陽䧟之勒出轘轅屯于許昌劉聦授勒征東大將軍幽州牧固辭將軍不受先是彌納劉􅚐之説將先誅勒東王青州使暾徵其將曹嶷於齊勒遊騎獲􅚐得彌所與嶷書勒殺之宻有圖彌之計矣㑹彌將徐邈輙引部兵去彌彌漸削弱及勒之獲茍晞也彌惡之為卑辭使謂勒曰公獲茍晞而赦之何其神也使晞為公左彌為公右天下不足定勒謂張賔曰王彌位重言卑恐其遂成前狗意也賔曰觀王公有青州之心桑梓本邦固人情之所樂明公獨無并州之思乎王公遲廻未發者懼明公踵其後已有窺明公之志但未獲便耳今不圖之恐曹嶷復至共為羽翼後雖欲悔何所及邪徐邈既去軍勢稍弱觀其控御之懷猶盛可誘而滅之勒以為然勒時與陳午相攻於蓬闗王彌亦與劉瑞相持甚急彌請救於勒勒未之許張賔進曰明公嘗恐不得王公之便今天以其便授我矣陳午小竪何能為冦王彌人傑將為我害勒因廻軍擊瑞斬之彌大悦謂勒深心推奉無復疑也勒引師攻陳午于肥澤司馬上黨李顯説勒曰公天生神武當平定四海士庶皆仰屬明公望濟于塗炭有與公争天下者公不早圖之而返攻我曹流人我曹鄉黨終當奉戴何遽見逼乎勒心然之詰朝引退詭請王彌讌于巳吾彌長史張嵩諌彌勿就恐有專誅孫峻之禍彌不從既入酒酣勒手斬彌而并其衆啓聦稱彌叛逆之狀聦署勒鎮東大將軍督并幽二州諸軍事領并州刺史持節征討都督校尉開府幽州牧公如故茍晞王瓉謀叛勒勒害之以將軍左伏肅為前鋒都尉攻掠豫州諸郡臨江而還屯于葛陵降諸夷楚署將軍二千石以下税其義糓以供軍士勒侵夀春無功而還行達東燕聞汲郡向氷有衆數千壁于枋頭勒將於棘津北潜渡懼氷邀之㑹諸將問計張賔進曰如聞氷船盡在瀆中未上枋内可簡壯勇者千人詭道潜渡襲取其船以濟大軍大軍既濟氷必可擒也勒從之使支雄孔萇等從文石津縳筏潜渡勒引其衆自酸棗向棘津氷聞勒軍至始欲内其船㑹雄等已渡屯其壘門下船三十餘艘以濟其軍令主簿鮮于豐挑戰設三伏以待之氷怒乃出軍將戰而三伏齊發夾擊攻之又因其資軍遂振豐長驅寇鄴攻北中郎將劉演于三臺演部將臨深牟穆等率衆數萬降於勒劉聦署勒為冀州牧進封上黨郡公邑五萬户時廣平游綸張豺擁衆數萬受王浚假署保據苑鄉勒使夔安支雄等七將攻之破其外壘浚遣督䕶王昌及鮮卑段就六眷末柸匹磾等部衆五萬餘以討勒時城隍未脩乃于襄國築隔城重栅設障以待之就六眷屯于渚陽勒分遣諸將連出挑戰頻為就六眷所敗又聞其大造攻具勒顧謂其將佐曰今冦來轉逼彼衆我寡恐圍不解外救不至内糧罄絶縱孫吳重生亦不能固也吾將簡練將士大陣於野以决之何如諸將皆曰宜固守以疲冦彼師老自退追而擊之蔑不克矣勒顧謂張賔孔萇曰君以為何如賔萇俱曰聞就六眷尅來月上旬送死北城其大衆遠來戰守連日以我軍勢寡弱謂不敢出戰意必懈怠今段氏種衆之悍末柸尤最其卒之精勇悉在末柸所可勿復出戰示之以弱速鑿北壘為突門二十餘道候賊列守未定出其不意直衝末柸帳敵必震惶計不及設所謂迅雷不及掩耳末柸之衆既奔餘自摧散擒末柸之後彭祖可指辰而定勒笑而納之即以萇為攻戰都督造突門于北城鮮卑入屯北壘勒候其陣未定躬率將士皷譟于城上㑹孔萇督諸突門伏兵俱出擊之生擒末柸就六眷等衆遂奔散萇乘勝追擊枕尸三十餘里獲鎧馬五千匹就六眷收其遺衆屯于渚陽遣使求和送鎧馬金銀并以末柸三弟為質而請末柸諸將並勸勒殺末柸以挫之勒曰遼東鮮卑健國也與我素無怨讐為王浚所使耳今殺一人結怨一國非計也放之必悦不復為浚用矣於是納其質遣石季龍盟就六眷于渚陽納為兄弟就六眷等引還使参軍閻綜獻捷于劉聦建興元年石季龍攻鄴三臺鄴潰劉演奔于廪丘將軍謝胥田青郎牧等率三臺流人降于勒勒以桃豹為魏郡太守以撫之時王浚署置百官奢縱滛虐勒有吞并之意遣其舍人王子春董肇等多齎珍寳奉表推崇浚為天子浚大悦勒於是輕騎襲幽州晨至薊叱門者開門升其㕔事命甲士執浚送襄國市斬之以晉尚書劉翰行幽州刺史劉聦以平幽州之勲署勒大都督陜東諸軍事驃騎大將軍勒之在襄國劉聦疾甚驛召勒為大將軍錄尚書事受遺詔輔政勒固辭乃止聦又遣其使人持節署勒大將軍持節鉞都督侍中校尉二州牧公如故増封十郡不受聦死其子粲襲偽位其大將軍靳凖殺粲於平陽勒命張敬率騎五千為前鋒以討凖勒統精鋭五萬繼之據襄陵北原羗羯降者四萬餘落凖數挑戰勒堅壁以挫之劉曜自長安屯于蒲阪曜復僣號署勒大司馬大將軍加九錫増封十郡并前十三郡進爵趙公勒攻凖于平陽小城平陽大尹周置等率雜户六千降于勒巴帥及諸羗羯降者十餘萬落徙之司州諸縣凖使卜泰送乗輿服御請和勒與劉曜競有招懷之計乃送泰于曜使知城内無歸曜之意以挫其軍勢曜潜與泰結盟使還平陽宣慰諸部落勒疑泰與曜有謀欲斬泰以速降之諸將皆曰今斬卜泰凖必不復降就令泰宣漢要盟於城中使相率誅斬凖必懼而速降矣勒乆乃從諸將議遣卜泰入平陽與凖將喬春馬忠等起兵攻凖殺之推靳明為盟主遣泰及卜𤣥奉傳國六璽送于劉曜勒大怒遣令史羊升使平陽責明殺凖之狀明怒斬升勒怒甚進軍攻明明出戰勒擊敗之枕尸二里明築城門堅守不復出戰勒遣其左長史王修獻捷于劉曜晉彭城内史周堅害沛内史周黙以彭沛降于勒石季龍率幽冀州兵㑹勒攻平陽劉曜遣軍征東劉暢救明勒令舍師於蒲上靳明率平陽之衆奔于劉曜曜西奔粟邑勒焚平陽宫室使裴憲石㑹修復元海聦二墓收劉粲以下百餘尸𦵏之徙軍儀樂器于襄國劉曜又遣其使人郭氾等持節署勒太宰領大將軍進爵趙王増封七郡并前二十郡出入警蹕冕有十二旒乗金根車駕六馬如曹公輔漢故事勒舍人曹平樂因使留仕於曜曰大司馬遣王修等來外表至䖍内覘大駕彊弱謀待修之返將輕襲乘輿時曜勢實殘弊懼修宣之曜大怒追汜等還斬修于粟邑停太宰之授勒怒甚下令曰孤兄弟之奉劉家人臣之道過矣若微孤兄弟豈能南面稱朕哉根基既立便欲相圖天不助惡使假手靳凖孤惟事君之體當資舜奉瞽叟之義故復推崇令主齊好如初何圖長惡不悛殺奉誠之使帝王之起復何常哉趙王趙帝孤自取之名號大小豈其所節耶於是置大醫尚方御府諸令及挈壺署石季龍與張敬張賔及諸將佐百餘人勸勒稱尊號勒五讓而後許之石季龍初以勒從子拜征虜將軍御衆嚴而不煩莫敢犯者指授攻討所向無前故勒寵之信任彌隆仗以專征之任勒之居襄國署季龍為魏郡太守鎮鄴三臺攻劉演于廪丘支雄逯明擊寗黒于東武陽陷之黒赴河而死徙其衆萬餘于襄國郡續使文鴦救演季龍退止盧闗津避之文鴦弗能進屯于景亭兗豫豪右張平等起兵救演季龍夜棄營設伏於外揚聲將歸河北平等以為信然入于空營季龍廻擊敗之遂䧟廪丘演奔文鴦軍獲演弟啟送于襄國累封中山公攻段匹磾于厭次降之又統中外精卒四萬討徐龕攻陷之又統中外歩騎四萬討曹嶷于廣固降之及劉曜子熙等去長安奔于上邽勒遣季龍討之季龍尅上邽進攻集木且羗于河西尅之俘獲數萬秦隴悉平勒僣號天王以季龍為太尉守尚書令進封中山王冊府元龜卷二百二十一
