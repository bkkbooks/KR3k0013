body:
  text: 册府元龜卷六百四宋王欽若等撰學校部奏議第三唐房𤣥齡太宗時為左僕射貞觀二年十二月與國子博士朱子奢建議云武徳中詔釋奠於太學以周公為先聖孔子配享臣以周公尼父俱稱聖人庠序置奠本縁夫子故晉宋梁陳及隋大業故事皆以孔丘為先聖顔囘為先師歴代所行古今通允伏請停祭周公升夫子為先聖以顔囘配享詔從之許敬宗為太子右庶子檢校中書侍郎貞觀二十年詔曰左丘明卜子夏公羊高糓梁赤伏勝髙堂生戴聖毛萇孔安國劉向鄭衆杜子春馬融盧植鄭𤣥服䖍何休王肅王弼杜預范寗賈逵總二十四座春秋二仲行釋奠之禮初以儒官自為祭主直云博士姓名昭告于先聖又州縣釋奠亦以博士為主敬宗奏曰按禮記文王世子凡學春官釋奠於先師鄭注云官謂詩書禮樂之官也彼謂四時之學將習其道故儒官釋奠各於其師既非國學行禮所以不及先聖至於春秋二時合樂之日則天子視學命有司典禮即總祭先聖先師焉秦漢釋奠無文可檢至於魏武則使太常行事自晉宋已降時有親行而學官主祭全無典實且名稱國學樂用軒懸尊俎威儀盖皆官備在於臣下理不合專况凡在小神猶皆遣使行禮釋奠既准中祀據理必湏禀命今請國學釋奠令國子祭酒為初獻祝詞稱皇帝謹遣仍令司業為亞獻其諸州刺史為初獻上佐為亞獻博士為終獻縣學縣令為初獻丞為亞獻博士既無品秩諸主簿及尉通為終獻若有闕竝以次差攝州縣釋奠既請刺史縣令親獻主祭望准祭社同給明衣脩附禮令以為永則長孫無忌為太尉高宗顯慶二年七月十一日議曰按新禮孔子為先聖顔囘為先師又准貞觀二十一年以孔子為先聖更以左丘明等二十二人與顔回俱配尼父於太學竝為先師今據永徽令聞改用周公為先聖遂黜孔子為先師顔回丘明竝為從祀謹按禮記云凡學春官釋奠於其先師鄭𤣥注曰官謂詩書禮樂之官也先師者若漢有高堂生樂有制氏詩有毛公書有伏生可以為師者又禮記曰始立學釋奠于先聖鄭𤣥注曰若周公孔子也據禮為定昭然自别聖則非周即孔師則偏善一經漢魏以來取捨各異顔囘孔子互作先師宣父周公迭為先聖求其節文逓有得失所以貞觀之末親降綸言依禮記之明文酌康成之奧說正夫子為先聖加衆儒為先師永垂制於後昆革往代之紕繆而今新令不詳制㫖輙事刋改遂違明詔但成王幼年周公踐極制禮作樂功比帝王所以禹湯文武成王周公為六君子又説明王孝道乃述周公嚴配此即姬旦鴻業合同王者祀之儒宫就享實貶其功仲尼生衰周之末極文䘮之弊祖述堯舜憲章文武𢎞聖教於六經闡儒風於千世故孟軻稱生民以來一人而已自漢已降奕葉封侯崇奉其聖迄於今日胡可降兹上哲俯於先師且丘明之徒見行其學貶為從祀亦無故事今請改令從詔於義為允其周公仍依别禮配享武王詔從之陳子昻梓潼射洪人則天光宅元年昻上疏曰臣竊獨有私恨者惟陛下之欲興崇大化而不知國家大學之廢積歳月乆矣學堂荒穢畧無人蹤詩書禮樂罕聞習者陛下明詔尚未及之愚臣所以私恨也臣聞天子立太學所以聚天下賢英為政教之首君臣上下之禮於是興焉揖讓尊俎之節於此生焉是以天子得賢臣由此也今則荒廢失之於本而求之於末豈可得哉君子三年不為禮禮必壊三年不為樂樂必隳奈何天子之政而輕禮樂哉陛下何不詔天子胄子使歸大學而習業乎斯亦國家之大務也韋嗣立為鳯閣舍人聖歴二年十月嗣立上疏曰臣聞禮記曰化民成俗必由學乎學之於人其用益博故立太學以教於國設庠序以化於邑王之諸子卿大夫士之子及國之俊選皆造焉故自天子至於庶人未有不湏學而成者國家自永淳以來國學廢散胄子棄缺時輕儒學之官莫存章句之選貴門後進競以僥倖升班寒族常流復因凌替弛業考試之際秀茂罕登驅之臨人何以從政又垂拱已後文明在辰盛典洪休日書月至因籍際㑹入仕尤多陛下誠能下明制發徳音廣開庠序大敦學校三舘生徒即令追集王公已下子弟不容别求仕進皆入國學伏膺訓典崇飾舘廟尊尚儒師盛陳奠菜之儀宏敷講説之㑹使士庶觀聽有所發揚引奬道徳於是乎在則四海之内靡然向風矣劉子𤣥𤣥宗開元初為左庶子上孝經注義曰謹按俗所行孝經題曰鄭氏注爰在近古皆云鄭康成而魏晉之朝無有此説至江左晉穆帝永和十一年及孝武太元元年再聚羣臣共論經義有荀昶撰集孝經諸説始以鄭氏為宗自宋梁以來多有異論陸澄以為非𤣥所注請不藏於秘省王儉不依其請遂得見傳於時魏齊則立於學官著在律令盖由魯俗無識故致斯訛舛然則孝經非𤣥所注其驗十有二條據鄭君自注云遭黨錮之事逃難注禮黨錮事觧注古文尚書毛詩論語為袁譚所逼未至元城乃注周易都無注孝經之文其驗一也鄭君卒後弟子追論師所注述及應對時文謂之鄭志其言鄭所注者惟有毛詩尚書周易都不言孝經其驗二也又鄭志目錄記鄭之所注五經之外有中候書傳七政論乾象厯六藝論毛詩譜答臨碩難禮臨姓碩名時為學官駁許慎異義發墨守箴膏肓及答甄子然等書寸紙片言莫不悉載若有孝經之注無容匿而不言其驗三也鄭之弟子教授門徒祖述師言更相問答編錄其語謂之鄭記惟載詩書禮易論語其言不及孝經其驗四也趙商作鄭先生碑銘具稱諸所注義駁論亦不言注孝經晉中經簿周易尚書尚書中侯尚書大傳毛詩周禮儀禮禮記論語凡九書皆云鄭氏注名𤣥至於孝經則稱鄭氏觧無名𤣥二字其驗五也春秋緯演孔圗云康成注三禮詩易尚書論語其春秋則有評論宋均詩緯序云先師北海鄭司農則均是𤣥之傳業弟子也師所注述無容不知云春秋孝經維有評論𤣥之不注於此特明其驗六也又宋均孝經緯注引鄭六藝論敘孝經云𤣥又為之注司農論如是而均無聞焉有義無辭令余昏惑舉鄭之語而云無聞其驗七也宋均春秋緯注云𤣥為春秋孝經畧説則非注之謂所言𤣥又為之注者汎辭耳非實事其序春秋亦云𤣥又為之注寜可復責以實注春秋乎其驗八也後漢史書存於代者有謝承薛瑩司馬彪袁崧等其為鄭𤣥傳者載其所注皆無孝經其驗九也王肅孝經傳首有司馬宣王之奏𤣥奉詔令諸儒注述孝經以肅説為長若先有鄭注應言及而都不言鄭其驗十也王肅注書發揚鄭短凡有小失皆在聖證若孝經此注亦出鄭氏被肅攻擊者最應煩多而肅無言其驗十一也魏晉朝賢辨論時事鄭氏諸注無不得隠未有一言引孝經之注其驗十二也凡此証驗易為討覈而代之學者不覺其非乗彼謬説競相推舉諸觧不立學官此注獨行於代觀夫言語鄙陋義理乖疎固不可以示彼後來傳諸不朽如古文孝經孔傳本出孔氏壁中語甚詳正無俟商㩁而曠代亡逸不復流行至隋開皇十四年侍書學生王孝逸於京市陳人處買得一本送與著作郎王邵以示河間劉炫仍令較定而此書更無兼本難可依慿炫輙以所見率意刋改因著古文孝經稽疑一篇以為此書經文盡正傳義甚美而歴代未常置於學官良可惜也然則孔鄭二家雲泥致隔今綸音發問較其短長愚請行孔廢鄭於義為允又今俗所行老子是河上公注其序云河上公者漢文帝時人結草菴於河曲乃以為號前所以注老子授文帝因冲空上天此乃不經之鄙言流俗之虗語按漢書藝文志注老子者二家河上所釋無聞焉爾豈非注者欲神其事故假造其説邪然其理乖謬雖使纔别朱紫粗分菽麥亦皆􅅓其過謬而况有識者乎豈如王弼英才俊識賾微索隠考其所注義㫖為優必黜河上公昇王輔嗣在於學者實得其宜又按漢書藝文志易有十三家而無子夏作傳者至梁阮氏七錄始有子夏易六卷或云韓嬰作或云丁寛作然據漢書藝文志韓易有二篇丁易有八篇求其符㑹則事殊隳刺者矣以東魯伏膺文學與子㳺齊列西河告老名行將夫子連蹤歳越千齡時經百代其所著述沉翳不行豈非後來假慿先哲亦猶石崇謬稱阮籍郭璞濫名周寳必欲行用深以為疑子𤣥又上言曰臣才雖下劣而學實優長竊自不遜以為近古已來未之有也當以鄭氏孝經河上公老子二書訛舛不足流行孔王兩家實堪師授每懐此意其願莫從伏見去月十日勑令所司詳定四書得失具狀聞奏臣等草議請行孔王二書牒禮部訖但今庸儒淺識聞見不周可與共成難與慮始盖孔父有言曰行夏之時乘殷之輅服周之冕此則今古循環愚智往復豈前者必是而後者獨非乎是以老篇莊子興於晉代公羊糓梁寢於魏日春秋左氏因元凱而方著尚書孔傳至光伯而始行斯皆尙好不同晩乃覺悟承習既乆近輙弛張伏惟開元皇帝陛下常以九重餘隙窮覽文藝百氏詳觀游心經典爰降綸綍俯逮芻蕘臣輙以愚識上符睿㫖伏望明恩曲垂炤察如將為允請即班行不可使隨流腐儒參論其義景寅中書門下奏曰劉子𤣥奏注孝經請廢鄭依孔注老子請停河上公行王易傳非子夏所造者子𤣥博識誠則純儒全非衆家亦則未可且孝經鄭義行已多時老子河注用亦云乆并子夏易傳文不折於片言望竝付所司令諸儒與子𤣥對質定必湏理勝義成不得飾詞爭辨論定聞奏是時尚書禮部奏議曰臣得國子博士司馬貞等議稱今文孝經是漢河間王所得顔芝本劉向以本參較古文省煩除惑定為此一十八章其注相承云是鄭𤣥所作而鄭志及目録等不載故往賢共疑焉惟荀昶范曄以為鄭注故昶集觧孝經具載此注而其事云以鄭為主是先逹博選以此注為優且其注縱非鄭氏所作而義亦敷暢頗將為得雖數處小有隠實亦未爽經通其古文二十二章元出孔壁先是安國作傳後遭巫蠱代未之行荀昶集注之時尚有孔傳中國遂亡其本近儒欲崇古學妄作此傳假稱孔氏輙穿鑿改更偽作閨門一章劉炫詭隨妄稱其善且閨門之義近俗之語必非仲尼正説按其章云閨門之内具禮矣乎嚴親嚴兄妻子臣妾繇百姓徒役之句凡鄙不合經典又分庶人章從故自天子已下别為章乃加子曰二字然故者連上之詞既為章首不合言故是古文既亡後人妄開此等數章以應二十二章之數非但經文不眞抑亦傳文淺偽又注云因天之時就地之利暴其肌體朝暮從事露髪塗足少而習之其心安焉此語雖旁出諸子引之為注何言之鄙俚乎與鄭𤣥所云分别五土視其高下高田宜黍稷下田宜稻麥優劣懸殊曽何等級今議者欲取近儒詭説殘經缺傳而廢鄭注理實未可望請准令式孝經鄭注與孔傳依舊俱行又得議稱老子道德者是謂𤣥言注家雖多罕窮厥㫖河上盖愚虗之號漢史實無其人然其注以養神為宗以無為為體其詞近其理𢎞小足以脩身潔誠大可以寜人安國故顧歎曰河上公雖曰注書即史立教皆沒畧逺體指明近用斯可謂知言矣王輔嗣雅善𤣥談頗採道要窮神明乎槖籥守静黙於𤣥牝其理暢其㫖微在於𤣥學頗謂所長至若近人立教脩身𢎞道則河上為得今望請王河二注令學者俱行又得議稱謹按劉向七畧有子夏傳但此書不行已乆今所存者多失眞本又荀朂中經簿子夏傳四卷或云丁寛所作是先逹疑非子夏矣又隋書經籍志云子夏傳殘缺梁氏六卷今兩卷是其書錯謬多矣王儉七志引劉向七畧云易傳子夏韓氏而載薛虞記又今秘庫有子夏傳薛虞記其傳文質畧指趣非逺無益後學不可將帖正經伏奉今年三月十日勑曰孝經者德教所先自則天以來獨宗鄭氏遺㫖今則無文又子夏易傳近無習者輔嗣注者亦甚甄明諸家所傳互有得失獨據人説能無短長令儒官詳定所長令明經者依習若將理等亦可兼行其作易者兼帖子夏易傳詳其可否奏聞者又奉四月九日勑曰太子左庶子劉子𤣥奏孝經注請廢鄭依孔老子注請停河上公行王輔嗣易傳非子夏所造者付臣所司令諸儒與子𤣥對質定詳必湏理勝義成不得飾詞爭辨者臣等國子博士司馬貞太學博士郄嘗通等十人對如前子𤣥請依諸儒為定馬懐素開元初為秘書監以書籍散逸條流無敘懐素上疏曰南齊已前墳籍舊編王儉七志已後著述其數盈多隋志所書亦未詳悉或古書近出前志闕而未編或近人相傳浮詞鄙而猶記若無編錄難辨淄澠望簡括近書篇目并前志所遺者續王儉七志藏之秘府於是召學渉之士國子博士尹知章等分部撰録并刋正經史粗創首尾李元瓘為國子司業開元八年三月上言三禮三傳及毛詩尚書周易等竝聖賢微㫖生人教業必事資經逺則斯道不墜今明經所習務在出身咸以禮記文少人皆諳讀周禮經邦之軌則儀禮莊敬之楷模公羊糓梁歴代宗習今兩監及州縣以獨學無友四經殆絶既事資訓誘不可因循其學生望請各量配作業并貢人預試之日習周禮儀禮公羊糓梁竝請帖十通五許其入䇿以此開勸即望四海均習九經該備從之又奏先聖孔宣父廟先師顔子配座今其像立侍准禮授坐不立授立不跪况顔子道亞生知才先入室旣當配享其儀見立請據禮文合從侍坐又四科弟子閔子騫等竝服膺儒術親承聖教復列像廟堂不參享祀謹簡祠令何休范寗等二十二賢猶沾從祀豈有升堂入室之子猶不沾配享之餘望請春秋釋奠列享在二十二賢之上七十子文翁之壁尚不缺如豈有國庠遂無圗繪請命有司圗形於壁兼為立贊庶敦勸儒風光崇聖列曽參孝道可崇猶受經於夫子望准二十二賢預享從之楊瑒為國子祭酒開元十七年三月上言曰太學者教人務禮樂敦詩書也古制卿大夫子弟及諸侯歳貢小學之異者咸造焉故曰十五入大學學先聖禮樂而知朝廷君臣之禮班以品類分以師長三德以訓之四教以睦之人旣知勸且務通經學成業著然後爵命加焉以之効職則知禮節以之蒞人使識亷讓則棫樸之咏興也伏聞承前之例監司每年應舉者常有千數簡試取其尤精上者不過二三百人省司重試但經明行脩即與擢第不限其數自數年以來省司定限天下明經進士及第每年不過百人兩監惟得一二十人若常以此數而取臣恐三千學徒虗廢官廪兩監博士濫縻天祿臣竊見流外入仕諸色出身每歳尚二千餘人方於明經進士多十餘倍自然服勤道業之士不及胥吏浮虗之徒以其効官豈識於先王之禮義國家大啓庠序廣置教道厚之以政始訓之以士先豈徒然哉將有以也陛下設學校務以勸進之有司為限約務以黜退之臣之微誠實所未曉臣伏見承前以來制舉遁迹丘園孝悌力田者或試時務䇿一道或通一經粗明文義即放出身亦有與官者此國家恐其遺才至於明經進士服道日乆請益無倦經䇿旣廣文辭極難監司課試十已退其八九考功及第十又不收其一二若長以為限恐儒風漸墜小道將興若以出身人多應須諸色都减豈在獨抑明經進士也𤣥宗甚然之歸崇敬為國子祭酒兼集賢學士代宗大歴五年皇太子欲以仲秋之月於國學行齒胄之禮崇敬以國學及官名不稱請改國學之制兼更其名曰禮記王制曰天子學曰辟雍又五經通義云辟雍養老教學之所也以形制言之雍壅也辟璧也雍水環之圓如璧形以義理言之辟明也雍和也言以禮樂明和天下禮記亦謂之澤宫射義云天子將祭必將習射於澤宫故前代文士亦呼云璧池亦曰璧沼亦謂之學省後漢光武立明堂辟雍靈臺謂之三雍宫至明帝躬行養老於其中晉武帝亦作明堂辟雍靈臺親臨辟雍行鄉飲酒之禮又别立國子學以殊士庶永嘉南遷惟有國子學不立辟雍北齊立國子寺隋初亦然至煬帝大業十三年改為國子監今國家富有四海聲名文物之盛惟辟雍獨缺伏請改國子監為辟雍省又以祭酒之名非學官所宜按周禮師氏掌以媺詔王教國子請改祭酒為大師氏立正三品又司業者義在禮記云樂正司業長也言樂官之長司主此業爾雅云大板謂之業按詩周頌設業設簴崇牙樹羽則業是懸鍾磬之簨簴也今太學既不教樂於義則無所取請改司業一為左氏一為右氏位正四品上又以五經六籍古先哲王政理之式也國家創業制取賢之法立明經發微言於衆學釋回増美選賢與能自艱難以來取人頗易考試不求其文義及第先取於帖經遂使顓門業廢請益無從師資禮虧傳授義絶今詩以禮記左傳為大經周禮儀禮毛詩為中經尚書周易為小經各置博士一員其公羊榖梁文疏既少請共准一中經通置博士一員所擇博士兼通孝經論語依慿章疏講觧分明注引旁通十問得九兼徳行純潔文詞雅正儀刑規範可為師表者令四品以上各舉所知在外者給驛年七十已上者蒲輪其國子太學四門三舘各立五經博士品秩上下生徒之數各有差其舊博士助教直講經直及律舘算舘書舘助教請皆罷省其教授之法學生置監謁同業師其所執贄段修一束清酒一壺布衫一段其色隨師所服出中門延入與坐割脩斟三爵而止乃發箧出經摳衣前請師為依經辨理畧舉一隅然後就室每朝晡二時請益師亦二時居講堂説釋道義發明大體兼教以文行忠信之道示以孝悌睦友之義旬省月試時考歳貢以生徒及第多少為博士考課上下其有不率教者則夏楚扑之國子之不率教者則申禮部移為太學生太學之不變者移為四門四門之不變者復本役終身不齒雖率教九年而學不成者亦歸之州學其禮部考試之法請無帖經但於所習經中問大義二十得十八為通兼論語孝經各問十得八兼讀所問文注義疏必令通熟者為通一又於本經問時務䇿三道通三為及第其中有孝行聞於鄉閭者舉觧具言於習業之下省試之日觀其所實義少兩道亦請兼收其天下鄉貢亦如之習業考試止於明經名得第者授官之資與進士同若此則教義日深而禮讓興别強不犯弱衆不暴寡此由太學中來者也詔下尚書集百寮定議以聞議者以為省者禁也非外司所宜名周禮代掌其職者曰氏國學非代官不宜為太師氏其餘大抵以俗習既乆重難改作其事不行徳宗建中三年二月崇敬奏上丁釋奠其日准舊例合集朝官講論五經文義自大厯五年以前常行不絶其年八月以後權停講論今既日逼恐湏復舊依奏宇文炫為右補闕以德宗貞元三年正月上言請京畿諸縣鄉村廢寺竝為學竝上制置事三十餘件疏奏不報裴肅貞元中為國子司業奏爾雅為六經文字之楷老子是聖人𤣥微之㫖請勒天下明經進士五經及明一經進士五經及諸科舉人依前習道徳經者宜准天寳元年勑處分應合習爾雅者竝准舊式初天寳元年尊崇道教以老子乃𤣥元皇帝微言奥㫖不可列為小經令有司以爾雅代老子至貞元五年四月宰臣又議云所習爾雅多是草木鳥獸之名無益理道又令舉人停爾雅改習道徳經至是又改焉武少儀為國子司業貞元十七年五月訛言云外人妄談禁中事神威軍令將吏分捕入軍中鞫問時國子監學生何竦曹夀被收少儀上疏言太學生何竦曹夀等今月十四日有兩人稱是神威軍官徤本軍奏進止令追其人亦不言姓名緣神威是禁軍稱奉進止所由不敢隨去臣亦不敢牒問經今二日更不見廻臣伏以何竦曹夀等學生之中素無異迹皆勤藝業臣職在監臨頗所諳悉察訪逰處不渉非違今忽被軍中宻收恐横被詿誤太學生胄多來自逺方自見追此二人不知其故咸聞驚懼莫敢保安何竦等儻情理難容伏乞明示罪狀加以刑法如或枉遭誣執伏計必盡其辭冀無濫罰人知懲警臣謬當承乏職令生徒令其干犯國章敢逃罪責由是何竦曹夀得釋馮伉為國子祭酒憲宗元和元年四月伉奏應觧補學生等國家崇儒本於勸學既居庠序宜在交脩有其藝業不勤逰處非類樗蒲六博酗酒喧爭凌慢有司不脩法度有一於此竝請觧退又有文章帖義不及格限頻經五年不堪申送者亦請觧退其禮部所補學生到日亦請准格帖試然後給厨後每月一度試經年等第不進者停厨庶以止姦示其激勸又准格九年不及第者即出監訪聞比來多改名却入起今已後如有此類請送法司准式科處勑㫖從之元和二年八月國子監奏准勑今月二十四日諸州府鄉貢明經進士見訪宜令就國學官講論質定疑義仍令百僚觀禮者伏恐學官職位稍卑未足飾揚盛事伏請選擇常叅官有儒學者三兩人與學官有儒學者庶聖朝盛典輝映古今於是命兵部郎中蔣武考功員外郎劉伯芻著作郎李蕃太常博士朱頴郯王府諮議章庭規同赴國子監講論是年十二月國子監奏兩京諸舘學生總六百五十員請每舘定額如後兩監學生總五百五十員國子舘八十員太學舘七十員四門舘三百員廣文舘六十員律舘二十員書舘十員算舘十員又奏伏見天寳以前國舘學生其數至多竝有員額至永泰後四監置五百五十員東監近置一百員未定每舘員額今謹具定額如後伏請下禮部准額補置勑㫖依奏鄭餘慶為太子少師判國子祭酒事元和十三年十一月餘慶以太學荒墜日乆生徒不振遂奏請率文官俸祿脩廣兩京國子監時論美之十四年十二月餘慶又奏請京見任文官一品以下九品以上及外使兼京正員官者每月所請料錢請率計每貫抽一十文以充國子監脩造先師廟及諸室宇繕壁經公廨雜用之餘益充本錢諸色隨便宜處置臣以為歴事文吏無非孔徒所取至微足以資學教化之根本人倫之紀綱陛下文徳武功戡亂除暴事超歴代道冠百王國學毁壊荒蕪盖以兵戎日乆而葺修未暇也今㓂難滌蕩天下砥平爰俾耆臣叨領儒職臣兢於受命敢不肅恭伏念旬時莫過於此伏望天㤙便賜允許仍令戸部每月據數竝以實錢付國子監其東都留司京官亦准數率錢便充東都國子監脩理制可韋乾度為國子祭酒穆宗長慶二年閏十月奏當監四舘學生每年有及第闕員其四方有請補學生人竝不曽先於監司陳狀便自投名禮部計㑹補署監司因循日乆官吏都簡舉但准禮部開牒收管有乖太學引進之路臣既忝守官請起今已後應四舘有闕其每年請補學生者須先經監司陳狀稱請替某人闕監司則先考試通畢然後具姓名申禮部仍稱堪充學生如無監司觧申請不在收管之限舊例每給付厨房動多喧競請起今以後當監進士明經等待補署畢關牒到監司則重考試其進士等若重試及格當日便給厨房其明經等考試及格後待經監司觧送則給厨房庻息喧争當監四館學生有及第出監者便將本住房轉與親故其合得房學生則無房可給請起今以後學生有及第出監者仰館子先通狀納房待有新補學生公試畢後便給令居住當監承前並無專知館博士請起今以後每館衆定一人知館事如生徒無故喧競者仰館子與業長通狀領過知館博士則准監司條流處分其中事有過悮衆可容恕監司自議科决如有悖慢師長彊暴鬬打請牒府縣錮身遞送鄉貫勑㫖冝依文宗太和五年十二月國子祭酒裴通奏當司所授丞簿及諸博士助教直講等謹按六典云丞掌判監事凡六學生每有業成上于監者以其業與司業祭酒試之明經帖經口試䇿經義進士帖一中經試雜文䇿時務徴事注云其試法皆依考功口試明經帖限通八以上明法明算皆通九以上主簿掌印從檢凡學生有不率師教者則舉而免之其頻三年下第九年在學無成者亦如之注云假如違程限及作樂雜戯者同准彈琴習射不禁諸博士助教皆分經教授學者每授一經必令終講未終不得改業諸博士助教皆云諸學生讀經文通熟然後授文講義每旬放一日休假前一日博士考試其試讀書每千言内試一帖帖三言講義者每二千言内問大義一條總試三條通二為及第通一及全不通者斟量决罰謹具當司官吏及學生令典條件如前伏望勑下有司允臣所奏勑㫖宜依七年八月國子監起請准今月九日德音節文令監司於諸道搜訪名儒置五經博士一人者伏以勸學專門復古之制博採計當年講授多少以為考課等級應補當司諸學生等按學令儒術以備國庠作事之初湏有奬進伏請五經博士秩比國子博士今左氏春秋禮記周易尚書毛詩為五經論語爾雅孝經等編簡既少不可特立學官更請依舊附入中經勑㫖依奏其年十二月勑於國子監講堂兩廊創立石壁九經并孝經論語爾雅共一百五十九卷字様四十卷鄭覃為相兼國子祭酒文宗開成元年覃奏請置五經博士各一人緣無祿俸請依王府例給祿粟從之開成二年八月國子監奏得覆定石經字體官翰林待詔唐𤣥度狀准太和七年二月五日勑覆九經字體者今所詳覆多依司業張參五經文字為准其舊字様歳月將乆畫㸃參差傳冩相承漸致乖誤今竝依字書與較勘同商較是非取其適中纂錄為新加九經字様一卷請附於五經様之末用證紕誤勑㫖依奏馮審為國子祭酒宣宗大中五年十一月審奏孔子廟堂碑是太宗皇帝建立睿宗皇帝書額備稱唐徳具贊鴻猷文翰顯然貞石斯在洎武后權政國號濳移竊於篆額中間謬加大周二字豈可尚存偽號以紊清朝疑誤將來傳流僣謬其大周兩字伏乞天恩許令琢去謹錄奏聞勑馮審所請刋正説文頗叶事體宜依皮日休以懿宗咸通中舉進士尚書二首其一請以孟子為學科詞曰臣聞聖人之道不過乎經經之降者不過乎史史之降者不過乎子子不異乎道者孟子也捨是而子者必斥乎經史為聖人之賊也夫孟子之文燦若經傳天惜其道不燼於秦自漢代得其書常置博士以顓其學故其文繼乎六藝光乎百氏得眞聖人之㣲㫖也不然者何其道煜煜於前而其書汲汲於後得非道拘乎正文失於奥有好邪者憚正而不舉嗜淺者鄙奥而無稱邪盖仲尼愛文王如嗜昌歜以取味後之人將愛仲尼者其嗜在乎孟子矣夫古之士以湯武為逆取者其不讀孟子乎以楊墨為逹智者其不讀孟子乎由是觀之孟子之功利於人亦不輕矣今有司除茂才至明經外其次有熟莊周列子書者亦登於科其誘善也雖深而懸科也未正夫莊列之文荒唐之文也讀之可以為方外之士習之可以為洪荒之民安有能汲汲以救時補教為志哉伏請命有司去莊列之書以孟子為主有能精通其義者其科選視明經同茍若是也不謝漢之博士矣孔緯為相兼國子祭酒昭宗大順元年二月緯奏文宣王祠廟經兵火焚毁有司釋奠無所請内外文臣各於本官料錢上每一緡抽十文助修國學從之後唐叚顒為太常丞明宗天成二年三月奏請國學五經博士各講本經以申横經齒胄之義四年十二月國子監奏伏以國家開設庠序比要教授生徒所以日就月將知討論之不廢卜禘視學明考校之有程先生旣以親臨學士豈宜他適盖以頃者監名雖補各以私便無常且居㒺離羣則學能敬業終成孤陋誰為琢磨但希託迹為梯媒只以多年為次第罔思蟻術惟俟鶯遷忍淹違養之時徒積觀光之歳今國家化被流沙漸海政敷有截無疆大扇素風恢張至道是以重興數仭分設諸官教且有常業成無忒而况時物甚賤舘舍尤多諒無懸磬之虞足得撞鐘之問但自學徒所好可以教亦隨機既欲成名必湏精業如有好春秋者教之以属辭比事三體五情尊王室而討不庭昭沮勸而起新舊其所異同者則引之以二傳也如有好禮者則教之以恭儉莊敬長幼尊卑言揖讓而知獻酬明冠昏而重䘮祭其所㳂革者則證之以二禮也如有好詩者則教之以溫柔敦厚辨之以草木蟲魚美盛徳而刺滛昏歌風雅而察正變如有好書者則教之以疏通知逺釋之以訓誥典謨思帝徳而敬王言稽古道而統皇極如有好易者則教之以潔浄精㣲戒之以躁動競進體十翼而分彖爻應吉凶而先擬議也至於歴代子史備述變通既属異端誠非教本但以適當凝凍將近試期欲講小經以消短景今已請尚書博士田畝講勘論語孝經行莫大於事親道莫逾於務本如有京中諸官子弟及外道舉人况四門博士趙著見講春秋若有聽人從其所欲顓俟放牓别啓諸經既溫故而知新惜寸隂而輕尺璧顓經者若能口誦碩學者又得指歸自然縻好爵以當仁䇿科名而得俊幸不孤於選士冀有益於化風從之王騫為刑部郎中天成二年七月奏請採訪圗籍呂或休為左補闕天成四年五月上書請勑諸道興崇學校李超為著作郎長興元年十月奏秘書監空有省名而無廨署藏書之府無屋一間無書一卷非人文化成之道請依六典創修之楚馥為尚書博士長興三年奏請皇子習尚書知君臣父子之義漢司徒詡為禮部侍郎乾祐三年上言臣聞致理之方咸資稽古多聞之道詎捨羣書歴代已來斯文不墜石渠􅅫閣今則闕於芸編百氏九流在廣頒於搜訪唐朝竝開三舘皆貯百家開元之朝羣書大備離亂之後散失頗多臣請國家開獻書之路凡天下文儒衣冠舊族有收得三舘亡書許投舘進納據卷帙多少少則酬之以緡帛多則酬之以官資自然五六年間庶㡬粗備從之册府元龜卷六百四
