body:
  text: 册府元龜卷二百八十宋王欽若等撰宗室部領鎮第三梁臨川靖恵王宏字宣達太祖第六子髙祖義師下宏至新林奉迎拜輔國將軍建康平西遷平郎將中䕶軍領石頭戍軍事天監元年為使持節散騎常侍都督揚南徐二州諸軍事後將軍揚州刺史四年冬權以宏為都督南北兖北徐青冀豫司霍八州北討諸軍事八年為持節都督揚南徐二州諸軍事司空揚州刺史十七年以公事左遷侍中普通元年復為持節都督揚南徐二州諸軍事太尉揚州刺史安成康王秀太祖第七子髙祖義師至新林秀與諸王侯並自拔赴軍髙祖以秀為輔國將軍是時東昏弟晉熈王寳嵩為冠軍將軍南徐州刺史鎮京口長史范岫行府州事遣使降且請兵髙祖以秀為冠軍長史南東海太守鎮京口城建康平仍為使持節都督南徐兖二州諸軍事南徐州刺史天監二年徴領石頭戍軍六年出為持節都督江州諸軍事平南將軍江州刺史七年遷都督荆湘雍益寧南北梁秦等州諸軍事平西將軍荆州刺史十一年徵為侍中中衞將軍領宗正卿石頭戍事十三年復出為使持節散騎常侍都督郢司霍三州諸軍事安西將軍郢州刺史十六年遷使持節都督雍梁南北秦四州郢州之竟陵司州之隨郡諸軍事鎮北將軍寜蠻校尉雍州刺史便道之鎮秀子機嗣安成王普通二年自寜逺將軍㑹稽太守遷眀威將軍丹陽尹三年遷持節湘衡桂三州軍事寜逺將軍湘州刺史南平元襄王偉太祖第八子髙祖義師起南康王承制板為冠軍將軍留行雍州開府事齊和帝詔以偉為使持節都督雍梁南北秦四州郢州之竟陵司州之隨郡諸軍事寜蠻校尉雍州刺史天監元年進督荆寜二州四年徙都督南徐州軍事南徐州刺史五年至都改為撫軍將軍丹陽尹六年遷持節都督揚南徐二州諸軍事右將軍揚州刺史未拜進號中權將軍七年以疾表解州改為侍中中撫軍知司徒事九年遷䕶軍石頭戍軍事是年出為使持節散騎常侍都督江州諸軍事鎮南將軍江州刺史鄱陽忠烈王恢太祖第九子天監元年為侍中前將軍領石頭戍軍事二年出為使持節都督南徐州諸軍事征虜將軍南徐州刺史四年改都督郢司二州諸軍事後將軍郢州刺史七年進號雲麾將軍進督霍州十年徴為侍中䕶軍將軍石頭戍軍事十一年使持節都督荆湘雍益寧南北梁南北秦九州諸軍事平西將軍荆州刺史十三年遷散騎常侍都督益寜南北秦沙等州諸軍事鎮西將軍益州刺史便道之鎮十八年為使持節散騎常侍都督荆湘雍梁益寜南北秦八州諸軍事征西將軍開府儀同三司荆州刺史始興忠武王憺字僧達太祖第十一子髙祖為雍州刺史請與憺同行義師起南康王承制以憺為冠軍將軍與南平王偉留守和帝將發江陵詔以憺為使持節都督荆湘益寜南北秦六州諸軍事平西將軍荆州刺史天監七年還朝八年為平北將軍䕶軍領石頭戍軍事是秋出為持節散騎常侍都督南北兖徐青冀五州諸軍事鎮北將軍南兖州刺史九年春遷都督益寜南梁南北秦沙六州諸軍事鎮西將軍益州刺史十四年遷都督荆湘雍寧南梁南北秦七州諸軍事鎮右將軍荆州刺史長沙王業髙祖長兄宣武王懿子天監二年襲封長沙王六年遷左驍騎將軍尋為中䕶軍領石頭戍軍事七年出為使持節都督南兖兖徐青冀五州諸軍事仁威將軍南兖州刺史九年除中書令改授安後將軍鎮琅邪彭城二郡領南琅邪太守十年徴為安右將軍散騎常侍十四年復為䕶軍領南琅邪彭城鎮于琅邪復徴為中書令出為輕車將軍湘州刺史業弟西昌侯藻天監元年出為持節都督益寜二州諸軍事冠軍將軍益州刺史十年為左驍騎將軍領南琅邪太守入為侍中十一年出為使持節都督雍梁秦三州竟陵隨二郡諸軍事仁威將軍寜蠻校尉雍州刺史十二年徴為使持節都督南兖兖徐青冀五州諸軍事兖州刺史頻莅數鎮民吏稱之大通元年遷侍中中䕶軍時渦陽始降乃以藻為使持節北討都督征北大將軍鎮于渦陽三年為中將軍太子詹事出為丹陽尹大同五年出為使持節督南徐州刺史永陽王伯㳺髙祖次兄敷之子天監元年四月詔曰兄子伯㳺雖年識未𢎞意尚粗可浙東奥區宜須撫莅可督㑹稽東陽新安永嘉臨海五郡諸軍事輔國將軍㑹稽太守襲封永陽郡王衡陽嗣王元簡髙祖第四弟暢之子天監三年襲封除中書郎遷㑹稽太守十三年入為給事黄門侍郎出為持節都督廣交越三州諸軍事平越中郎將廣州刺史還為太子中庻子遷使持節都督郢司霍三州諸軍事信武將軍郢州刺史桂陽王象長沙宣武王第九子出繼桂陽王融起家寜逺將軍丹陽尹出為持節督司霍郢三州諸軍事征逺將軍鄂州刺史尋遷湘衡二州諸軍事輕車將軍湘州刺史除中書侍郎俄以本官行石頭戍軍事遷侍中太子詹事未拜改授持節督江州諸軍事信武將軍江州刺史呉平侯景髙祖從父弟也天監元年封仍為持節都督北兖徐青冀四州諸軍事冠軍將軍南兖州刺史七年遷左驍騎將軍兼領軍管天下兵要尋出為使持節督雍梁南北秦郢州之竟陵司州之隨郡諸軍事信武將軍寜蠻校尉雍州刺史十一年徴右衛將軍領石頭戍軍事十二年復為使持節督南北兖北徐青冀五州諸軍事信威將軍南兖州刺史十三年徴為領軍將軍直殿省十七年太尉揚州刺史臨川王宏坐法免詔曰揚州應須緝理宜得其人侍中領軍將軍呉平侯景才任此舉可以安右將軍監揚州並置佐史即宅為府十九年出為使持節散騎常侍都督郢司霍三州諸軍事安西將軍郢州刺史景弟昌天監六年自豫章内史寜朔將軍遷使持節督廣交越桂四州諸軍事輔國將軍平越中郎將廣州刺史九年分湘州置衡州以昌為持節督廣州之綏建湘州之始安諸軍事信武將軍衡州刺史昌弟昻天監初自司徒右長史出為輕車將軍監南兖州徴為琅邪彭城二郡太守復以輕車將軍出為廣州刺史南康簡王績髙祖第四子天監八年出為輕車將軍領石頭戍軍事十年遷使持節都督南徐州諸軍事南徐州刺史進號仁威將軍十六年徴為宣毅將軍領石頭戍軍事十七年為使持節都督南兖兖徐青冀五州諸軍事南兖州刺史普通四年徴為侍中雲麾將軍領石頭戍軍事五年出為使持節都督江州諸軍事江州刺史丁董淑儀憂居䘮過禮髙祖手詔勉之使攝州任固求解職乃徴授安右將軍領石頭戍軍事績子㑹理嗣為南康王年十五拜輕車將軍湘州刺史又領石頭戍軍事遷侍中兼領軍將軍尋除宣惠將軍丹陽尹置佐史出為使持節都督南北兗北徐青冀東徐譙七州諸軍事平北將軍南兖州刺史廬陵威王續髙祖第五子天監十六年自㑹稽太守為都督江州諸軍事雲麾將軍江州刺史普通元年徴為宣毅將軍領石頭戍軍事三年為使持節都督南徐梁秦沙四州諸軍事西中郎將南徐州刺史大通三年又為使持節都督雍梁秦沙四州諸軍事平北將軍寜蠻校尉雍州刺史給皷吹一部大同元年為使持節都督江州諸軍事安南將軍江州刺史三年徵為䕶軍將軍領石頭戍軍事五年為驃騎將軍開府儀同三司又出為使持節都督荆郢司雍西北秦梁巴華九州諸軍事荆州刺史邵陵攜王綸髙祖第六子普通元年領石頭戍軍事尋為江州刺史五年以西中郎將權攝南兖州中大通元年為丹陽尹大同七年出為使持節都督郢定霍司四州諸軍事平西將軍郢州刺史尋遷為安前將軍丹陽尹中大同元年出為鎮東將軍南徐州刺史綸子永安侯確太清中為南中郎將廣州刺史尋陽王大心太宗第二子髙祖大同元年出為使持節都督郢南北司定新五州諸軍事輕車將軍郢州刺史七年徴為侍中兼石頭戌軍事太清元年出為雲麾將軍江州刺史南海王大臨太宗第四子大寳元年出為使持節都督揚南徐二州諸軍事安南將軍揚州刺史南郡王大連字仁靖太宗第五子大同十年以侍中兼石頭戍軍事太清元年出為使持節輕車將軍東陽州刺史安陸王大春字仁經太宗第六子大同中以為寜逺將軍知石頭戍軍事大寳元年為使持節雲麾將軍東陽州刺史新興王大莊太宗第十三子大寳元年為使持節都督南徐州諸軍事宣毅將軍南徐州刺史西陽王大鈞太宗第十四子大寳元年出為宣恵將軍丹陽尹二年監揚州武寜王大威太宗第十五子大寳二年為信威將軍丹陽尹建平王大球太宗第十七子大寳二年為輕車將軍兼石頭戍軍事陳冝黄侯慧紀髙祖之從孫光大元年以功除持節通宜散騎常侍宣逺將軍豐州刺史太建十年呉眀徹北討敗績以慧紀為持節智武將軍縁江都督兖州刺史尋除使持節散騎常侍宣毅將軍都督郢巴二州諸軍事至德二年遷使持節散騎常侍雲麾將軍都督荆信二州諸軍事荆州刺史始興王伯茂世祖第二子永定三年自寜逺將軍除使持節都督南琅邪彭城諸軍事彭城太守進號宣恵將軍揚州刺史天嘉三年除鎮東將軍開府儀同三司東揚州刺史鄱陽王伯山世祖第三子天嘉六年為縁江都督平北將軍南徐州刺史光大元年徙為鎮東將軍東揚州刺史太建元年徴為中衛將軍中領軍六年又為征北將軍南徐州刺史尋為征南將軍江州刺史至徳四年出為持節都督東揚豐二州諸軍事東揚州刺史晉安王伯恭世祖第六子太建元年為中衛將軍揚州刺史六年出為安南將軍南豫州刺史十四年出為安南將軍湘州刺史衡陽王伯信世祖第七子天嘉元年為宣恵將軍丹陽尹禎眀元年出為鎮南將軍西衡州刺史廬陵王伯仁世祖第八子太建七年遷冠軍將軍中領軍尋為平北將軍南徐州刺史江夏王伯義世祖第九子太建初為宣恵將軍東揚州刺史尋為宣毅將軍持節散騎常侍都督合霍二州諸軍事合州刺史武陵王伯禮字用之世祖第十子太建初為雲旗將軍持節都督呉興諸軍事呉興太守永陽王伯智世祖第十二子累遷尚書左僕射出為使持節都督東揚豐二州諸軍事平東將軍領㑹稽内史桂陽王伯謀世祖第十三子太建中為信威將軍丹陽尹十年加侍中出為持節都督呉興諸軍事東中郎將呉興太守豫章王叔英髙宗第三子太建元年為宣恵將軍都督東揚州諸軍事東揚州刺史五年進號平北將軍南豫州刺史十一年為鎮前將軍江州刺史長沙王叔堅髙祖第四子太建四年自東中郎將呉郡太守為宣毅將軍江州刺史七年進號雲麾將軍郢州刺史未拜轉為平越中郎將廣州刺史尋為平北將軍合州刺史八年復為平西將軍郢州刺史十一年入為翊左將軍丹陽尹是年進號驃騎將軍開府儀同三司揚州刺史至徳三年出為征西將軍荆州刺史建安王叔卿髙宗第五子太建四年授東中郎將東揚州刺史七年為雲麾將軍郢州刺史九年進號平南將軍湘州刺史後主即位進號安南將軍宜都王叔眀字子昭髙宗第六子太建七年授東中郎將東揚州刺史十三年出為使持節雲麾將軍南徐州刺史河東王叔獻髙宗第九子太建七年為散騎常侍軍師將軍都督南徐州諸軍事南徐州刺史新蔡王叔齊髙宗第十一子太建中出為東中郎將東揚州刺史晉熈王叔文髙宗第十二子太建中為輕車將軍揚州刺史至徳元年授持節都督江州刺史二年遷信威將軍督湘衡武桂四州諸軍事湘州刺史始興王叔重髙宗第十四子至徳元年為仁威將軍揚州刺史明年加使持節都督江州諸軍事江州刺史岳陽王叔慎髙宗第十六子至徳四年拜侍中智武將軍丹陽尹禎眀元年出為持節都督湘衡桂武四州諸軍事智武將軍湘州刺史義陽王叔達髙宗第十七子禎眀元年除丹陽尹南平王嶷後主第二子至徳元年自南琅邪彭城二郡太守遷揚州刺史進號鎮軍將軍尋為使持節都督郢荆湘三州諸軍事征西將軍郢州刺史永嘉王彦後主第三子至徳中為忠武將軍南徐州刺史進號安南將軍持節都督江巴東衡三州諸軍事江州刺史南海王䖍後主第五子禎眀二年出為平北將軍南徐州刺史信義王祗後主第六子至徳中為壯武將軍使持節都督智武將軍琅邪彭城二郡太守㑹稽王莊後主第八子至徳中為翊前將軍除使持節都督揚州諸軍事揚州刺史後魏曲陽侯素延桓帝之後道武征討諸部初定并州為刺史中山平拜幽州刺史宜都王目辰桓帝之後孝文即位除雍州刺史鎮長安司徒石平文帝之𤣥孫也從太武南討至𤓰歩山進位尚書令雍州刺史松滋侯萇平文帝之後宣武時為北中郎將帶河内太守歴位度支尚書侍中雍州刺史萇子華孝莊初除齊州刺史後除濟州刺史孝静初除南兖州刺史河間公齊烈帝𤣥孫也齊孫志字猛略宣武時除荆州刺史孝眀帝時為揚州刺史衛王儀昭成帝孫從道武征伐有功中山平道武將還代都置中山行臺詔儀守尚書令以鎮之儀子中山簡王纂始五歲道武命養於宫中恩與皇子同太武踐阼除定州刺史儀孫沛郡公禎孝文時拜南豫州刺史陳留景王崇昭成曽孫道武時拜荆州刺史崇孫琛位鎮朔二州刺史隴西公崘昭成帝之後文成即位除秦州刺史淮南靖王他道武孫太武時除使持節都督豫雒河南諸軍事鎮南將軍開府儀同三司鎮虎牢從征於懸瓠破之拜使持節都督雍秦二州諸軍事鎮西將軍開府儀同三司雍州刺史鎮長安時宋侵南鄙以他威信素著復為虎牢鎮都督大將髙宗時轉使持節都督京州諸軍事鎮西大將軍他子篤自光禄勲卿出除平北將軍幽州刺史他孫法壽自中散大夫出除龍驤將軍安州刺史法壽弟法僧自司馬掾除龍驤將軍益州刺史後徴拜光禄大夫出為平東將軍兖州刺史轉安東將軍徐州刺史淮南康王世遵靖王曽孫也宣武時拜前軍將軍行幽州事兼西中郎將又行青州事尋遷驍騎將軍出為征虜將軍幽州刺史孝眀時為荆州刺史尋加前將軍沔南蠻首及襄陽民望入宻信引世遵請以襄陽内附世遵表求赴應朝議從之詔加世遵持節都督荆州及沔南諸軍事平南將軍加散騎常侍後除平北將軍定州刺史武昌成王提道武孫太武時拜使持節鎮東大將軍平原鎮都大將在任十年大著威名後與淮南王他討平吐京叛胡遷使持節車騎大將軍統萬鎮都大將子簡王平原獻文時蠕蠕犯塞從駕擊之平原戰功居多拜假節都督齊兖二州諸軍事鎮南將軍齊州刺史孝文時遷都督秦雍梁益四州軍事征南大將軍開府雍州刺史鎮長安原子悼王鍳孝文時出為征虜將軍齊州刺史宣武初以本將軍轉徐州刺史鍳兄和襲鍳爵為河南王孝眀時出為輔國將軍凉州刺史鍳弟馗自太僕少卿出除安西將軍東秦州刺史南平安王渾道武孫為廣平王連後太武時拜假節都督平州諸軍事領䕶東夷校尉鎮東大將軍儀同三司平州刺史鎮和龍在州綏導有方徙凉州鎮將都督西戎諸軍事領䕶西域校尉渾子哀王纂孝文時出為安北將軍平州刺史纂弟之子武貞王仲冏孝文時出為輔國將軍光州刺史遭母憂還孝昌末除秦州刺史江陽武烈王繼南平王霄之子為江陽王根後孝文時除使持節安北將軍撫㝠鎮都大將轉都督柔𤣥撫㝠懷荒三鎮諸軍事鎮北將軍柔𤣥鎮大將入為左衛將軍兼侍中又兼中領軍留守雒京尋除持節平北將軍鎮攝舊都宣武時除征虜將軍青州刺史轉平北將軍恒州刺史繼子羅為平東將軍青州刺史梁武遣將㓂邉又為撫軍都督青光南青三州諸軍事入為宗正卿出帝時除使持節驃騎大將軍開府儀同三司梁州刺史樂安王範眀元子太武以長安形勝之地乃拜範衞大將軍開府儀同三司長安鎮都大將範子簡王良文成時襲王爵拜長安鎮都大將雍州刺史東平王翰太武子自中軍大將軍鎮枹罕以信恵撫衆羗戎敬服子道符襲爵中軍大將軍献文踐阼拜長安鎮都大將臨淮懿王提太武孫為梁州刺史提子孝友襲爵臨淮王累遷滄州刺史廣陽懿烈王嘉太武孫孝文時拜徐州刺史後為尚書左僕射與咸陽王禧等輔政遷司州牧嘉子忠武王深孝眀時拜肆州刺史歴恒州刺史入為侍中右衛將軍定州刺史深子文獻王湛孝静初累遷冀州刺史入為侍中後行司州牧京兆王子推景穆帝子初為侍中征南大將軍長安鎮都大將秦雍之人服其威惠孝文即位拜侍中開府儀同三司青州刺史子推子大興襲爵拜長安鎮都大將大興弟饒陽男遥孝眀帝時自左光禄大夫仍領䕶軍遷冀州刺史大興子暹莊帝初為南兖州刺史累遷秦州刺史普㤗元年除凉州刺史太興孫文王悰孝静時累遷司州牧青州刺史任成康王雲景穆帝子和平五年封拜使持節侍中征東大將軍和龍鎮都大將獻文時除都督徐兖二州縁淮諸軍事征東大將軍開府徐州刺史後為冀州刺史留心政事甚得下情孝文嘉之遷使持節都督陜西諸軍事征南大將軍長安鎮都大將軍雍州刺史子文宣王澄孝文時除都督梁益荆三州諸軍事征南大將軍梁州刺史後轉征東大將軍開府徐州刺史甚有聲績從坐公事免官尋兼吏部尚書鎮州刺史宣武時出為平西將軍梁州刺史辭以母老除安東將軍相州刺史復固辭改授安西將軍雍州刺史尋徵赴季秋講武除都督淮南諸軍事鎮南大將軍開府揚州刺史鎮北大將軍定州刺史澄子順為給事黄門侍郎時元义威勢尤盛順曽不詣乂至於朝論得失順嘗鯁言正議曾不阿旨由此見憚出除平北將軍恒州刺史轉為安東將軍齊州刺史澄弟嵩宣武時以武衛將軍兼侍中出為平南將軍荆州刺史又除平北將軍恒州刺史轉平東將軍徐州刺史又轉安南將軍揚州刺史嵩子衛縣男世儁自河南尹除鎮東將軍青州刺史嵩弟瞻自宗正少卿龍驤將軍光州刺史遷平東將軍兖州刺史册府元龜卷二百八十
