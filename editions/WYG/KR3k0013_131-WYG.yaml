body:
  text: 册府元龜巻一百三十一宋王欽若等撰帝王部延賞第二唐𤣥宗開元元年十二月詔國初以來宰相及食實封功臣子孫一應沈翳未承恩者量才擢用二年正月制曰崔𤣥暐張柬之等往以神龍之初保乂王室奸臣所忌讁居炎海流落變衰感激忠義𤣥暐嗣子吏部郎中璩清才雅韻謹守專直柬之嫡孫毖祖考繼歿遺孤可傷彼勲業之下淪佇名賢之必復是得景倩而悲仲宣者也髙皇封樂毅之後武帝求蕭何之裔斯不逺哉昭於徳音緬懷前烈宜加後命璩毖並可朝散大夫四月以太常寺大祝蘇乂為左補闕追父勲也勅曰蘇乂其父往處台衡實為柱石直言正色挫彼㐫邪頃者念功錫以真賦兄頲又遵先誡固辭令賞泣血披誠不忍移奪自家刑國父忠子孝宜有褒崇寵及兄弟諌官之任允屬象賢可右補闕十月王海賓為安豐軍使先鋒與吐蕃戰歿嗣初名訓年始九嵗以父死於王事起復拜朝散大夫尚輦奉御賜名忠嗣養於禁中累年與皇太子在忠王邸令與之游處六年侍中宋璟亡父𤣥撫褒贈邢州刺史𤣥撫初贈岐州長史及璟登宰輔之任脩祔廟之禮帝乃特以伯牧光寵焉并贈其母崔氏為安平郡夫人八年隴右諸軍節度大使郭知運為幽州都監王晙討平六州胡康待賓等拜左武衛大将軍授一子官九年十二月勑中書門下六尚書御史大夫諸衛大将軍及食實封功臣并二品已上官咸以勳業受國寵榮徳之所效澤之所延其亡父無五品已上官者並宜褒贈十三年十一月封襌禮畢制曰朕永惟王業翳頼舊勳元首股肱其猶一體自武徳以來功臣宰輔或名存王府遺嗣沉淪或身無大故銜屈泉壤宜令所司訪擇申理唐興立功官又徃屬艱難能盡忠義今成大禮何日忘之宜各與一子出身十七年十一月追贈中書令蕭嵩亡父故渝州長史灌為吏部尚書門下平章事裴光庭父故禮部尚書行儉為太尉二十四年正月勑諸道採訪使信安郡王禕嗣魯王道堅牛仙客宋詢劉日正班景倩唐昭各賜一子官賞其廵察之勞也是年中書舍人孫逖自以通籍禁闈其父官纔邑宰乃上表陳情曰臣父嘉之幸遇眀時早勤學業出身入仕四十餘年歴官五政經考二十未能亨通纔及令長臣夙荷嚴訓累登清秩頻遷省闥又拜掖垣地近班榮臣則過量途遥日暮父乃后時在公府有偷榮之責於私庭無報徳之效反慚烏鳥徒厠鴛鴻伏望降臣一外官特乞微恩稍霑臣父𤣥宗優詔奨之授嘉之宋州司馬致仕二十九年二月上謂宰臣曰洪州人鄔𤣥宗往在文眀年中傳𤣥元皇帝真誥於天后曰我國祚無窮當千萬君遂遭禁錮因茲淪䘮宜與追贈以慰泉壤其子瓊亦依資授一官天寳四載十二月隴右節度使皇甫惟眀與一子五品官賞功也七載八月詔尚書左僕射兼右相史部尚書李林甫曽祖故長平郡王靈州道行軍大總管叔良贈太子少保祖華陽郡開國公寕州刺史孝斌贈兵部尚書十載正月河西節度使鴻臚卿員外置同正員攝御史中丞權知朔方節度事安思順罷朔方節度加特進攝御史大夫仍與一子官河西節度等使餘如故賞功也安西四鎮節度特進兼鴻臚卿員外置同正員攝御史中丞髙仙芝生擒突騎施可汗吐蕃大首領及石國王并可敦及傑師来獻上御勤政樓㑹羣臣引見加仙芝開府儀同三司攝御史大夫仍與一子五品官餘並如故賞功也十一載十一月以殿中少監安慶宗為太僕卿慶宗禄山之子以父任寵之是年哥舒翰為隴右節度使收石堡城獻功於朝詔與一子五品官十二載又與一子五品官十三載又賜一子五品官十二載三月制曰褒徳紀功前王之令典􅎖忠追逺有國之能事况乎嗣生大賢為朕良弼應五百之數該二八之羙調元而星辰以理論道而隂陽以和而寵命未𢎞稱謂猶褊非所以崇推恩之重廣延賞之義也右相兼文部尚書判度支魏國公楊國忠亡父贈持節魏郡諸軍事守魏郡太守珣赤泉儲祉白環繼業膺積慶而誕徳鍾具羙而挺生枝茂者根深流長者源濬是降英裔阜成兆人熈載而百度惟清審衡而九流式序佐我𤣥化格于皇天信為名賢實禀庭訓雖思人愛樹已有疇庸之策而因條振葉宜益封崇之事俾以建旟之寵仍超曵履之榮既旌徽烈用光泉壤可贈武部尚書鄭國公母張氏可贈鄭國夫人十二月以安禄山男慶緒為衛尉卿詔曰王者出師登壇擇将忠臣受任幹蠱成功則君賞其勤父成其訓名教斯在寵秩是崇銀青光禄大夫鴻臚卿員外置同正員兼廣陽郡太守同范陽節度副使上柱國栁城縣開國男安慶緒門傳忠孝之義庭禀韜鈐之畧志氣剛决固敵是求遂使榆塞息警栁城罷鋒百勝深謀舉無遺策可旌上将之功用叶中行之吉可特進行衛尉卿兼廣陵太守餘如故十三載二月詔武徳功臣及貞觀初宰輔等緬想忠義感㑹風雲用集大勳肇興王業其有子孫零落冠冕陵夷無任官守者宜令所司勘責依資與一人京官唐初功臣績參締搆録勞念舊每寘于懐普恩之外宜放一子出身如已有出身所司依資與一官十四年賜朔方節度副使靈武郡大守攝御史大夫安思順祖左玉鈐衛郎将史失其名為武部尚書考右羽林軍大将軍波主為太子太師十五年帝在成都詔文部尚書平章事房琯與子官盧從愿為吏部侍郎典選六年前后無及之者帝嘉之特與一子官從愿上疏乞囬恩贈父乃贈其父吉陽丞敬一為鄭州長史牛仙客為工部尚書同中書門下三品贈其父意為禮部尚書祖㑹為涇州刺史張延賞中書令張嘉貞之子初名寳符召見賜名延賞取賞延于世之義特授左司禦率府兵曹參軍王君㚟判凉州都督封晉昌伯拜其父為少府監仍聴致仕帝又嘗於廣逺樓引君㚟及妻夏氏設宴賜以金帛肅宗至徳二年十二月御丹鳳樓大赦詔武徳開元及蜀郡靈武元從功臣有先亡沒死王事者並加優贈各與子孫一人官其赴蜀郡靈武元從官及在路扈從官三品已上與一子官四品已下與一子出身六品已下量與進改乾元元年正月大赦詔陷在賦境為其殺戮身死者三品已上各與追贈仍各與一子官五品已上一子出身六品已下量事追贈其元從聖皇天帝至成都府文武官五品已上宜與一子官六品已下超資進改聖皇至成都府后到官及靈州寕州首末扈從三品已上與一子官五品已上放一子出身情願回授周親及親近亦聴唐元功臣身亡沒者子孫一人加一階其諸道節度下将士三品已下與一子官六品已上放一子出身自開元已来宰輔之家不為逆賊所汚者與子孫一人官是月又以朔方節度副使開府儀同三司鴻臚卿論誠節可襲撥川郡王食實封一百戸仍與一子三品官鉗耳大福封雒郊郡開國公實封一百户李懐讓封沂國公食實封一百户一子五品官舍利如珍食邑封一百户與一子五品官王仲昇封沛國公與一子五品官吕崇賁封鄆國公與一子五品官周皎封汝南郡開國公哥舒翰封朔方郡開國公與一子五品官白延崇封夀春郡開國公與一子五品官荼公榮封豫章郡開國公與一子五品官李靖封清河郡開國公食實封一百户與一子五品官劉感義封彭城郡開國公與一子五品官上元元年九月涇原兩州團練兵馬使元從特進兼羽林軍大将軍同正員李元忠死王事帝以其子承恩襲其官爵代宗寳應元年十二月封朔方節度使僕固懐恩妻賀魯氏為凉國夫人賜實封二百户以功寵之也二年正月戊子制曰功崇望重加以服章徳厚流光延其􅅷賞爰益苴茅之典並眀幹蠱之才副元帥太尉兼侍中都知河南淮南淮西山南東道諸節度行營事上柱國臨淮郡李光弼元勳濟代公輔推賢宣大化之神眀總専征之師律自出征移鎮距海負河連率百城旌旗千里東郊誓衆雅繼魯侯之功北伐擁旄首稱漢将之畧髙牙罷設重鼎斯調尤知武庫之寳實在雲臺之右疇其真食羙以保家僉議允諧舊章斯舉敬哉有土更載丹書之盟鯉也趨庭宜升紫綬之寵可加食實封二百户仍與一子官階三品餘並如故二月乙未以河北副元帥僕固懐恩兵馬使髙輔成為檢校太子少傅兼御史中丞賜實封三百户與一子五品官朔方都知兵馬使僕固㻛檢校太子少師封定襄郡王賜實封五百户莊宅各一所與一子五品官朔方右廂兵馬使髙彦崇檢校太子賓客賜實封三百户莊宅各一所與一子五品官廣徳元年七月上尊號大赦改元制河北副元帥僕固懐恩宜兼太保仍與一子三品官二子四品官河南副元帥李光弼與一子三品官幽州節度使李懐仙與一子三品官李抱玉郭英乂辛雲京侯希逸田神功孫志直白孝徳令狐彰各與一子五品官李寳臣薛嵩田承嗣張獻誠等各與一子五品官魚朝恩寄崇師律程元振勳髙佐命仍與一子五品官僕固㻛髙彦崇渾白進李建義李光逸楊崇光李懐光張如岳白元光温如雅拓㧞澄必髙暉盧欽文成惟良曹楚玊等各與一子五品官加實封一百户仍各賜鐵劵以名蔵太廟畫像於凌煙閣并㓂難已来将相勳業髙者其名籍圖畫亦准此子儀與一子四品官苗晉卿劉晏裴遵慶元載各與一子四品官并階加實封一百户儀王及彭王已下男未有官者並准舊例與官及封永穆并長樂已下公主及郡縣主嗣郡王等各與一子官皇親五等已上諸親三等已上各與一子出身二王後各與一子官諸道節度觀察使立功将士其父兄在無官者依子文武與官已歿者追贈陣亡将士襲父官爵二年郭子儀為闗内河東副元帥加尚書令上表陳讓詔荅所讓者依仍以其子晞兼御史大夫嘉其父讓也大厯三年二月以試太常卿郭曜為太子賓客曜子儀長子特拜正員三品寵之也四年三月追贈宰臣王縉祖故太常寺協律郎胄為兵部尚書祖母程氏為趙國夫人杜鴻漸祖故益州長史慎行為尚書左僕射祖母蕭氏為滕國夫人元載祖故左衛郎将敬同為兵部尚書祖母劉氏為沛國夫人李抱玉祖左武衛郎将文成為吏部尚書祖母張氏冀國夫人及載亡母李氏為凉國夫人推恩也十一月滑亳節度使令狐彰淄青節度使李正巳並遣男朝謁詔以彰男建兼御史中丞正巳男納兼侍御史仍賜金紫十年七月詔劍南西川節度使崔寕賜一子五品官賞功也十二年四月詔曰往者大盗亂華梁宋偏罹其害危城絶援折骸累月南霽雲真心壮節凌邁臧洪殞命敵塲凛然生氣宜以其子為歙州别駕七月詔曰頃者逆豎靈耀阻兵大梁淮西都虞候試太常卿贈揚州大都督張自勉往觀釁焉奉議正詞無所屈撓賊臣肆忿斃於鈇鑕朕用憫焉雖錫命之恩已旌窀穸而賞延之典宜及子孫可追贈實封五十户是年賜朔方都知兵馬使李懐光亡母甘露寺尼正則諡智母禪師官給𦵏事寵武臣也徳宗以大厯十四年五月即位六月御丹鳳樓大赦天下詔武徳已来宰相功臣名跡崇髙并至徳已来将相功效明著已亡歿者量加贈諡子孫沉翳者量與官諸州刺史及嘗參官父現在未有官者量與五品致仕官及階父母亡歿與贈官及邑號戊子贈驍衛将軍代國公安金蔵兵部尚書授其子承恩銀青光禄大夫試殿中監兼廬州長史建中四年四月贈故魏博節度都虞候兼御史中丞衛嘗寕太子太師賜實封二百户委馬燧懐光境上以禮致祭仍與抱真李芃孝忠日知等訪其妻孥親族具以名聞有子者便以父官爵授之子孫三代已来過犯者減一等論所賜實封載之典册勿令廢絶是年敬長皇后弟吳淑使于朱泚泚謀逆已决因害淑于客館之前徳宗聞而哀悼久之淑嫡子與正員五品官興元元年六月京畿副元帥李晟平朱泚收京師拜司徒詔贈晟父欽太子太保母王氏代國夫人七月李懐光擁兵河中以給事中孔巢父充宣慰使遇害徳宗聞而驚悼久之授一子正員官是月御丹鳳樓大赦天下詔司徒兼中書令晟與一子五品正員京官侍中瑊與一子六品正員京官駱元光尚可孤韓遊瓌戴休顔各與一子七品正員官諸道節度使及行在都知兵馬使都虞候扈從左右金吾六軍大将軍各與一子八品正員官都團練使觀察使各與一子官貞元元年十一月癸夘日南至祀圜丘禮畢詔曰司徒晟宜與一子五品正員官是年河東節度使馬燧平河中李懐光徳宗下詔褒羙遷光禄大夫兼侍中仍與一子五品正員官渾瑊為河中同陕虢等州節度既平李懐光以功加檢校司空與一子五品正員官并階二年四月李希烈平詔曰叛臣希烈竊據淮沂師旅一興綿聨莫觧勞服者從役不暇受汚者無路自新通邑化為丘墟遺骸遍於原野每念及此心傷涕流自昔勞師者靡有不悔以虞舜之聖屈於苖人漢武之强弊於戎虜矧乎徳猶不逮力或未全我其永懐亦以自警乃者下哀痛之詔布寛大之恩普天載新殊化畢宥然而尚勞師旅禦捍封陲有累嵗離棄室家有經時不觧甲胄忠雖為國咎實在君子民若斯寕不知愧頼将相士旅一其誠心􅁬揚武威慎固疆宇逺人思服元惡就誅蒸黎方致於安寕役戍永期於休息懋官以旌羙賜宴以勞旋賞不踰時蓋遵彞典都統檢校司空平章事劉𤣥佐宜與子孫一人五品正員官節度使檢校右僕射李澄檢校兵部尚書曲環檢校户部尚書李臯兼御史大夫樊澤等各與子孫一人七品正員官都防禦使工部尚書賈耽都團練使御史大夫盧𤣥卿張建封等各與子孫一人八品正員官檢校司空平章事李抱真檢校司空平章事李納檢校右僕射平章事韓滉工部尚書田緒等各遣将士五千人赴河南行營同討不庭厥有成績抱真納滉各與子孫一人六品正員官緒與子孫一人八品正員官三年七月詔曰乃者吐蕃犯塞毒我生靈俶擾隴東深入河曲朕以兵戎粗定傷痍未瘳務息戰伐之謀将遂通和之請亦知戎醜志在貪婪重違修睦之詞廼允尋盟之㑹果為隠匿變發壝宫縱犬羊兇狡之羣乘文武信誠之衆蒼黄陥沒深用惻然此皆繇朕之不眀致其若此既無徳於萬㝢實有愧於四方宵旰貽憂何嗟而及今兵部尚書崔漢衡等皆國之良士朝之藎臣嬰縶穹廬眇然殊域念其家室或未離於屢空禄以錫男庶或資於薄俸漢衡宜與一子七品官司勳員外郎鄭叔矩檢校户部郎中路泌殿中侍御史韓弇及大将孟日華辛榮李至言范澄王良賁樂演眀陽皆權文成等各與一子八品官試石金吾兵曹參軍袁同直前榆次尉裴頲及副兵馬使以上各與一子九品官仍委本使即具名銜聞奏四年正月一日赦書天下刺史與一子正員官七月詔以太尉兼中書令西平郡王晟長子試大理評事兼監察御史愿為銀青光禄大夫太子賓客仍賜上柱國唐制公卿嫡嗣皆自命而后言於有司帝以晟功髙特為命嫡且寵異以兩階勳俾其父子並建門㦸六年十一月庚午南郊畢詔宰相及東都留守六軍統軍諸道節度使神策神武金吾六軍都團練防禦觀察使京兆河南尹正員尚書御史臺長官太常卿各與一子官故尚父子儀與一子五品正員官如己五品已上量與改轉贈太尉秀實與一子官張廵許逺南霽雲顔真卿顔杲卿各與一子正員官七年二月授張廵男去疾許逺男峴南霽雲男承嗣顔真卿男頵杲卿孫謨之官旌忠烈之後也五月門下侍郎平章事竇參祖尚衣奉御瑾特贈揚州大都督父綘州聞喜尉審言特贈吏部尚書祖母叚氏追封武威郡太夫人母母氏追封鄭國太夫人參將附祖禰新廟故特加寵贈九年十一月乙酉日南至郊祀禮畢大赦天下故尚父子儀贈太師晟贈太尉秀實各與一子六品正員官是年詔曰前利州刺史狄博濟惟乃曾祖梁文恵公啟佑天后定紹復之策幽賛中興宜錫祚裔垂於無窮矧博濟郡人懐之理有異等可衛尉少卿十一年十一月辛亥以前太子賓客李愿為左領軍大將軍李憑為右威衛大將軍依前兼中丞皆太尉晟之子以免䘮故晟諸子同日授官者凡九人十四年贈故衡州刺史王繹洪州都督以其弟緯故也順宗初即位制曰武徳以来配饗功臣及張廵許逺南霽雲顔真卿杲卿等子孫中各與一人正員官故尚父子儀贈太師晟太尉秀實子孫中各與一人正員官五品及諸州府長史及京嘗參官父現在未有官者並與五品致仕官及階父歿母存者與邑號父母亡歿量與追贈陜州元從寳應功臣興元元從奉天定難功臣賜爵勳有差亡歿者與追贈中書門下節度東都留守度支鹽鐵等使京兆郡觀察招討等使及神策神威金吾六軍將大將軍英武成逺鎮國軍使隴右經畧軍使節度留後各與一子官憲宗元和元年正月册尊號詔中書門下及外使宰相與一子七品官東都留守六軍大将等與一子出身東宫並與改官其撰册文官等各與一子官及勳爵有差二年正月辛夘有事于南郊大赦天下制故尚父子儀太師晟太尉秀實及顔真卿杲卿張廵許逺南霽雲及配饗功臣與一子官及出身有差七月録配饗功臣之後以蘇瓌孫繋為京兆府司録參軍崔𤣥暐孫元方張説孫嶅並為監察御史狄仁傑孫𤣥範為左拾遺詔曰朕惟承累聖之業追先正之勞濟于艱難代有勳烈既而夲根已逺枝葉稍零詔書屢勤于褒餙有司不忘于遴簡一命宰府載𢎞捜揚録其先功果復良嗣蘇繋等咸以茂學懿行朂于前修皆人之領袖族之狐趙類能而舉各命以官或任以糺䋲或參于諌烈庻乎旌太傅之徳將擬南城之封紹鄼侯之裔不俟東門之感忠義獲寵古今同之后數日又得敬暉孫元亮袁恕巳孫徳師相次録用三年四月戊寅諡張柬之為文貞桓彦範為忠烈敬暉為貞烈崔𤣥暐為文忠袁恕己為忠烈先是柬之曾孫曛以諡事詣中書陳訴宰臣上聞因令有司授曛官仍定柬之等諡焉五年三月以贈給事王澹之子璋為左清道率府曹參軍澹因李鑄為亂遇害故録其嗣是年劉濟為幽州節度使討鎮州王承宗累破樂夀等縣賞功頗厚仍與一子孫六品官者凡四人六年七月御延英對宰臣李吉甫奏曰臣伏見代宗時滑州節度令狐彰臨終上表悉以土地兵甲籍上朝廷遣諸子隨表歸闕代宗以彰遺表宣示百寮付史館當時在位者聞之無不感歎今惟有次子通在臣每感彰同時河朔諸鎮傳子傳孫無不燻灼數代唯彰忠義感激奉國忘家遣子入朝以土地歸于先帝貞元中長子建坐事死施州㓜子運亦無罪流死于歸州欲使忠義者何所激勸今通幸存得遇眀聖伏乞陛下召對與語如堪進用望稍優奨帝因語宰臣曰徳宗英靈冠于百王但臨事剛斷宰臣不能規諫朕比在藩邸雖則㓜年記得數事未副外望豈非宰臣懐禄畏避不言遂令四方傳説此是宰臣有負先聖卿等當以此為鑒戒因授通賛善大夫九年八月庚寅録功臣之后以左神策軍華原鎮遏兵馬使兼御史大夫康志寕為檢校左騎常侍兼左龍武軍將軍知軍事河南府永寕縣令李晏為京兆府髙陵縣令左神策正將楊嶼為袁州司馬薛之逵䕫州司馬蘇縝為隴州司馬李克展為鳳翔府倉曹李融為常州司户李仲謩為襄州司倉田知清為冀王府功曹李元正為循王府功曹詔曰君臣運合故徇國以毁家勸賞義眀故褒功而顯節存則酬其爵禄歿則録其子孫然後忠義不遺典章斯在故兹晉隰等州觀察使檢校兵部尚書康日知故徐州刺史兼御史大夫李洧等一十家皆有茂功蔵于盟府故命採訪后嗣光賁前人今志寕等或服戎著績或從官有成或投跡運府之中或滯才州縣之職咸加甄録各茂官榮庻乎受禄者無忘于聿修懐忠者使知其必報勉膺寵擢無替前勞十二年七月贈著作郎權皇太子太保臯前贈秘書監至是因子徳輿相為立家廟復有是贈十三年正月赦書故尚父子儀贈太師晟贈太尉秀實及顔真卿杲卿張廵許逺南霽雲與一子官及出身有差十四年三月以撫州司馬同正令狐通為右衛将軍給事中崔植封詔上言通嘗刺夀州用兵失律前罪未塞不宜遽加奨用命宰臣諭植以通父彰有功不忍棄其子詔遂行七月帝御宣政殿册尊號禮畢大赦天下故尚父子儀贈太師晟贈太尉秀實及張廵許逺南霽雲顔真卿杲卿子孫各與官及出身是月宣武軍節度使韓𢎞與一子七品正員官九月辛丑以魏博田𢎞正之兄相州刺史田融為檢校刑部尚書兼太子賓客東都留守穆宗以元和十五年正月即位二月御丹鳳樓大赦詔中書門下及節度等使東都留守度支鹽鐵使京兆尹諸軍使等賜一子官有差武徳巳来配饗及第一等功臣并張廵許逺南霽雲顔真卿杲卿等尚父子儀贈太師晟贈太尉秀實子孫中與一子官有差其中有才行堪在臺省者量才敘用六月舉勳賢之後堪任臺省官者以大理正段文通為殿中侍御史渭南縣尉郭承嘏為監察御史前淮南營田副使顔顒為水部員外郎長安縣丞顔諗為大理正又以宰臣韓𢎞祖望贈右僕射父海贈太師令狐楚祖崇豪贈吏部尚書父承簡贈禮部尚書蕭俛祖華贈太保父嘗贈吏部尚書叚文昌祖懐皎贈給事中父諤贈左僕射其祖母及母並加封贈又封蕭俛母韋氏岐國太夫人是月魏博節度使檢校司徒兼侍中田𢎞正祖延惲贈吏部尚書父庭玠贈右僕射淮南節度使檢校左僕射平章事李夷簡祖察言贈兵部尚書父自仙贈右僕射河東節度使檢校左僕射兼門下侍郎平章事裴度祖有鄰贈右僕射父淑贈太子太保幽州節度使檢校司空平章事劉總祖惲贈太師其祖母及母並加封爵贈是年邠寕節度使李光顔来朝詔與一子正員四品嘗參官長慶元年正月辛亥赦詔故尚父汾陽王及贈太師晟贈太尉秀實各與一子官八品顔真卿杲卿張廵許逺南霽雲各與一子出身武徳以来功臣子孫量加奨用中書門下及節度使帶平章事者各與一子八品正員官祖父母及父母並與贈官封父歿母存者與邑號已贈已封者更與追贈及邑號禮儀使大禮使度支鹽鐵使京兆尹各與一子出身文武嘗參官并致仕及諸道節度觀察經畧等使及神策等諸軍使父見存者量與致仕官母存者與邑號父母亡歿與贈官及邑號東都留守及諸道節度觀察經畧等使神策金吾大軍将軍威逺鎮國軍使各與一子出身四月以幽州劉總籍土地歸闕授其弟約及男等一十一人官領郡符加命服者五人升朝班佐環衛者六人是月贈廬江縣令崔嬰甫吏部侍郎嬰甫宰相植之父也植出繼伯父祐甫及是以情上請故特追贈七年大赦制撰册文官中書侍郎平章事崔植與一子正員官四年八月以太僕寺主簿李宏為河南府兵曹掾獲嘉令蔣鄅為伊陽令安史之亂宏祖憕鄅祖清皆著名節故特制寵之敬宗即位初大赦詔元和已来兩河節度使全家歸闕者如張茂昭王承元程權劉總田宏正等五家各與一子正員官寳厯元年正月以前右補闕魏猗為湖州司馬猗文貞公徴之孫也朝廷以忠賢之后寵為諌官猗病不克拜故有是命二年四月以姚元崇𤣥孫前京兆府富平縣尉合為監察御史以宋璟曾孫前太常寺大樂署令堅為京兆府富平縣尉文宗太和元年正月赦詔今年正月十四日上皇太后尊號及朕受册進寳撰即位册文承㫖宣制等官各與一子正員七品官是月平盧軍節度使康至睦上言故莱州刺史李庭逺當李師古節制東平之日庭逺為屬郡屢陳忠順以沮奸兇繇是父子二人俱為師古所害其㓜子可舉纔十嵗逐在海中至今猶在臣已署軍職請兼授管内一官遂以淄州髙苑縣主簿命之又詔涇原節度使李祐與一子五品正員官二年三月尚書右僕射同中書門下平章事裴度進封太原郡公中書侍郎同中書門下平章事韋處厚進封靈昌郡公裴度竇易直各請封爵回授一男六月以故中書令褚遂良五代孫䖍為汝州臨汝縣尉内史狄仁傑曾孫前鄉貢眀經元封為懐州修武縣尉故侍中宋璟曾孫渤為岳州沅江縣尉故中書侍郎平章事李元紘曾孫㐾為鄧州向城縣尉詔曰禇遂良五代孫䖍等朕詳觀列聖紀册祖宗盛業燦然在前其或道有汚崇政有善否未始不繋乎當時輔弼嘗因便殿言諸宰臣勉其禆益協心推戴且以去嵗乙巳登應門敷大號俾疇賢相以訪遺裔或才噐擅價各列官業或血食不繼宗祊已蕪如遂良之委笏面諍名垂史書仁傑之恢復廟社事形先覺宋璟之文吏骨鯾功叅治平元紘之守規畫一時成有裕其胄僅存不絶如髪各授邑吏使其自試十月授故侍中魏徴四代孫可則鄧州南陽縣尉侍中魏知古曾孫處訥潭州湘鄉縣尉故左僕射裴冕曾孫行實虢州司功參軍詔曰武徳已来輔相之臣以道致君以勞定國若贈司空徴故侍中知古贈太尉冕語其功次皆在第一清風餘祉宜及乎後昆爾等乃其曾孫式叶捜奨俾奉貽謀之慶用覃延賞之恩各命以官勉思祖徳三年五月滄州平庚寅加李祐銀青光禄大夫檢校左僕射仍賜一子五品正員官并加實封三百户四年七月丙戌以故中書令蕭瑀五代孫耽故尚書左僕射同中書門下三品蘇瓌四代孫翔故中書侍郎同中書門下平章事陸象先四代孫量並為釋褐叅軍文學五年七月癸夘録國初功臣衛國公李靖等七家裔嗣命之以官九年十月以前同州長春宫廵官試秘書省校書郎魏謩為右拾遺帝因讀貞觀政要思文貞公魏徴之徳訪其後得謩而不次用之開成元年正月故詔河朔節將以州縣歸國者有張茂昭田𢎞正程權各與一子官子弟堪任使者委中書門下量加引用又詔曰劉總王承元元和中以河朔郡縣歸朝廷悉宜以新赦書張茂昭例賜一子正員官閠五月癸丑以前殿中監渾鐬為夀州刺史鐬太師瑊子也宰相以瑊扶危之勳諸子凋落賞延之道宜加優寵初以夀州為請帝曰鐬勳臣子豈可牧人仲尼以為不如多與之邑今我念其先子女玉帛無愛焉使之鮮服羙食可也宰臣以鐬常為郡有幹勤之名屢薦之故有是命三年四月以鄧州南陽縣尉魏可則為櫟陽縣尉時帝於閣内召起居舍人魏謩對問文貞之疇績因訪其族裔故有是命又以博陵王崔𤣥暐曾孫前商州防禦判官兼殿中侍御史郢為監察御史以平陽王敬暉曾孫前試太子通事舍人元膺為河南縣丞以漢陽王張柬之𤣥孫前宜城縣尉憬為夀安縣尉以南陽王袁恕己曾孫鄉貢進士徳文為秘書省校書郎初御史中丞狄兼謩帝前語及叔祖仁傑與五王協心禆賛王室帝因問其后捜揚奨擢唯桓彦範之后訪無其人五月戊辰以故棣州刺史欒濛男存固為鄆州夀張縣主簿大和初李同㨗阻兵滄景濛不從其亂為同㨗所囚舉家遇害存固年少隠於吏家因得脱免至是録濛忠節故命以官十一月己未以前河東縣尉長孫鈞為河中府猗氏縣令制云朕每覽國史見太尉無忌之事未嘗不廢巻咨嘆遐想其人訪其裔孫用申甄奨四年十月丙辰海州節度使劉約上言王鍔之子故徳州刺史王稷在任有善政郡人愛之為李全畧所殺家無遺類有男叔泰年五嵗郡人宋忠獻潜收養之今已成長臣察知其事忠獻已補軍職叔泰送歸其宗詔王鍔累朝宣力王稷一旦捐軀湏録遺孤㣲申憫念王叔泰委吏部與九品官令主祭祀昭宗天祐元年大赦詔武徳以来立功効節著在策書者並與捜訪子孫繼嗣量材敘用後唐莊宗同光元年十月平汴州詔歿王事者如有子孫成立堪任使者並量材甄録二年八月壬午以檢校户部尚書守邢州長史郭廷誨可檢校右僕射守左衛大將軍檢校工部尚書左武衛将軍同正郭廷信可簡校右僕射守左驍衛大将軍皆樞宻使崇韜之子也朱友謙初仕梁為河東節度使莊宗誅汴孽自河中来朝以其子同州節度使令徳為遂州節度使令錫為許州節度使諸子二千石者六七将校割符者五六恩寵之盛時無比隆眀宗天成二年二月勅朕以握圖御宇應運承祧副億兆之歡心頼英雄之叶力雖疇庸之命已徧及於勳賢而延賞之恩宜更加於骨肉應諸道節度使男及親嫡骨肉未霑恩命者特許上聞五月勅朕自恭承景運祗荷丕圖念寰海生靈録勳賢骨肉承家莫尚於孝報國莫大於忠忠孝兩全古今所重在朝文武臣僚并諸道節度刺史等有父母者宜徧加恩澤使天下之為人父者知感為人子者知恩競揚家國之風顯著君臣之道三年二月己丑勅准二年五月十二日勅中外臣僚及諸道節度使等有父母者并許加恩例凡居臣下盡抱公忠共為朝廷各榮家族具慶者繼頌恩渥俾光晨耀昏既亡者宜澤泉扄以光封樹應中外羣臣諸道節度防禦團練刺史等父母亡歿者并與追贈追封五月丁巳勅自家刑國内平外成天子立言備有闗睢之樂春秋垂訓非無石窌之封况夫尊於朝妻貴於室所宜從爵各顯家肥朝臣及諸道節度使妻室未有稱號者宜各加恩四年正月幽州節度使趙徳鈞奏臣孫羙年五嵗黙念何論孝經今於汴州敘解就試勅都尉之子太尉之孫能念儒書備彰家訓不勞就試特與成名宜賜别勅及第仍附今年春牓長興元年二月郊祀畢下制曰其朝臣及藩侯郡守等亡父母祖父母及父母在并妻室未霑恩命者與追贈及敘封又以故汴州馬歩軍都指揮使馬彦超男夀哥為雒州長史仍改名承祚彦超天成初為汴州都指揮使朱守殷將謀叛逆引彦超計事彦超不從為守殷所害及誅守殷帝念彦超能執節守義而延賞其子六月甲戌以魏徴八代孫韶為安定縣主簿八月千牛副使檢校刑部尚書夏光鋭起復雲麾將軍檢校右僕射為澤州刺史光銳即故遂州節度使魯竒之子也朝廷念勳故有是命張希崇為汝州防禦使母先為尼賜紫衣師號末帝清泰二年九月詔曰安崇賛父有力於皇家著之青史雖然得罪於先朝此日特行於延賞况頻逢赦宥可繼烝嘗亦欲忠義之士知朕念勳之㫖擢為上佐爾惟勉旃特授孟州司馬崇賛故眀宗朝樞宻使重誨之子也故有是命三年二月以太子正字夏光隠為國子太學博士故遂州節度使魯竒之子以父歿於本州以死持董璋而毁族故有是命晉髙祖天福二年二月勅曰朕以爰膺寳厯方啟金行既風教之誕敷諒寰區之漸泰而繇股肱元輔藩郡重臣咸著大功同為至治雖列地顯爵盡布新恩而追逺奉先猶􅃜舊典宜示褒功之寵俾袪風樹之悲自在朝文武百僚至見任刺史先代未封贈者據品秩與封贈已封贈三代者與加封贈又在朝宰臣已下臣僚外任刺史已上母妻未敘封已敘封等朕以削平禍亂開創基扄漸成銷偃之期永協興隆之運亦繇左右元輔中外勳臣弼予一人宅是四海茂績雖彰於王室覃恩未及於私門徳盛母儀貴而因子禮優婦道榮必從夫宜加渙汗之恩顯示封崇之典其未敘封者據品秩與敘封巳敘封國號者與進封七月丁夘勅曰朕聞王者懐於有仁所以享靈長之運賞延於世所以勸忠烈之臣唐開府儀同三司守太尉兼中書令西平王上柱國岐國公食邑三千户食實封一千五百户贈太師諡曰忠武李晟五代孫職以爾上祖西平王昔在徳宗皇帝幸梁汴之嵗而有保定大功中興返正扶持社稷之力載諸史氏予嘉乃徳日篤不忘宜升五代之孫裨陟六聮之位光乃前烈煥乎後昆可將仕郎耀州司户參軍八月制曰或無辜被害或徇節忘生既抱沉寃宜伸贈典應自張從賓作亂已来諸色員僚内有死於王事者並與追贈有子孫者量材敘録十月戊戌詔曰恩隆加等故有眀文道在恤孤宜𢎞異渥自去年出師已来諸軍將校有歿於王事者其子孫並與量材敘録六年八月壬寅制應河東起義之初佐命及收復鄴都汜水立功臣寮將校等其亡歿者更與追贈子孫已有職官者與遷改未有身名者與敘用少帝開運中以宰臣桑維翰長子坦為屯田員外郎次子塤為秘書郎維翰謂同列曰漢代三公之子為郎廢已久矣近或行之甚諠外議乃抗表固讓不受尋改坦為大理司直塤為秘書省正字議者羙之漢隠帝乾祐元年以宰臣楊邠子右賛善大夫廷侃為比部員外郎宰臣蘇逢吉從兄前洺州團練推官晏為司門員外郎周太祖廣順二年三月補故控鶴指揮使郭超長男重均充左畨殿直次男重友充右畨殿直以父歿王事故也世宗顯徳三年十二月辛巳贈故開封府襄邑縣令劉居方右補闕仍賜其男士衡北學究出身居方累宰大邑甚得撫字之要帝知之故特加贈典而復賞其子焉四年五月甲寅以江南偽命前夀州衙内都指揮使劉崇讃為檢校太保懐州刺史崇讃故鄆州節度使仁贍子也以其父舉夀陽来降故有是命册府元龜卷一百三十一
