body:
  text: 冊府元龜卷三百九十四宋王欽若等撰將帥部勇敢夫勇敢強有力者聖王之所貴也天下有事用之於戰勝則無敵矣是故為三軍之帥專四征之任也非抗威奮厲孔武有力何以率乎下非致師當寇先登敢死何以成其功㢤歴代而下當其任者固有英果邁衆臨敵賈勇冐矢石而靡惮袵金革而無厭推鋒蹈刅雄呼直盪用能摧堅陣破勍宼扶危紓難樹勲揚烈圖鍾鼎而不朽載䇿府而垂裕詩曰舍命不渝傳曰率義之謂勇蓋與夫暴虎憑河死而無悔者異矣髙固齊大夫也魯成公二年三卿帥師㑹晉師及齊侯戰於鞌鞌齊地髙固入晉師桀石以投人桀擔禽之而乗其車既獲其人因釋已車而載所獲者車繫桑本焉以徇齊壘將至齊壘以桑樹繫車而走以自異曰欲勇者賈余餘勇賈買也言已勇有餘故賣也解張晉大夫鞍之戰邴夏御齊侯逢丑父為右晉解張御郤克鄭丘緩為右齊侯曰余姑翦滅此而朝食姑且也翦盡也不介馬而馳之介甲也郤克傷於矢流血及屨未絶鼓音中軍將自執旗鼔故雖傷而擊鼓不息曰余病矣張侯曰自始合矢貫余手及肘余折以御左輪朱殷豈敢言病吾子忍之張侯解張也朱血色血色久則殷殷音近烟今人謂赤黒為殷色言血多汚車輪御猶不敢息緩曰自始合茍有險余必下推車子豈識之然子病矣以其不識已推車張侯曰師之耳目在吾旗鼓進退從之此車一人殿之可以集事殿鎮也集成也若之何其以病敗君之大事也擐甲執兵固即死也擐貫也即就也病未及死吾子勉之左并轡右援枹而鼔馬逸不能止師從之晉師從卻克車齊師敗績逐之三周華不注華不注山名孟孺子速魯人也襄公十六年秋齊侯圍郕郕魯孟氏邑貳晉故伐魯孟孺子速徼之孟獻子之子莊子速也徼要也齊侯曰是好勇去之以為之名速遂塞海陘而還海陘魯隘道渉佗晉大夫魯定公十年晉趙鞅圍衛報夷儀也齊為衛伐晉夷儀故伐衛以為報初衛侯伐邯郸午於寒氏邯郸廣平縣也午晉邯郸大夫寒氏即五氏也城其西北隅而守之宵􅑒午衆宵散及晉圍衛午以徒七十人門於衛西門殺人於門中曰請報寒氏之役衛開門與午鬬渉佗曰夫子則勇矣然我往必不敢啟門亦以徒七十人旦門焉歩左右皆至而立如植至其門下歩行左右然後立待如立木不動示整日中啟門乃退冉求魯人哀公十一年齊國書帥師伐魯孟孺子洩帥右師冉求帥左師戰於郊獲甲首八十冉求所得齊人不能師不得整其師宵諒曰齊人遁諒周也冉有請從之三季孫弗許冉有用矛於齊師故能入其軍孔子曰義也言能以義勇冉有冉求也彌庸吳王孫也魯哀公十三年越子伐吳為二隧隧道也疇無餘謳陽自南方二子越大夫先及郊吳太子友王子地王孫彌庸夀於姚自泓上觀之觀越師泓水名彌庸見姑蔑之旗姑蔑越地今東陽大宋縣彌庸父為越所獲故姑蔑人得其旌旗曰吾父之旗也不可以見讐而弗殺也太子曰戰而不克將亡國請待之彌庸不可屬徒五千屬㑹也王子地助之戰彌庸獲疇無餘地獲謳陽荀瑶晉大夫知伯襄子也魯哀公二十三年荀瑶伐齊荀瑶荀躒之孫智伯襄子齊髙無㔻帥師禦之智伯視齊師馬駭遂驅之曰齊人知余旗其謂余畏而反也及壘而還戰於犁丘犁丘濕也齊師敗績知伯親擒顔庚顔庚齊大夫顔涿聚漢黥布六人六縣名章邯之滅陳勝布引兵擊秦左右校破之引兵而東擊景駒秦嘉等布常冠軍言其驍勇為衆軍之最樊噲初號武威君時沛公從百餘騎因項伯靣見項羽謝無有閉關事項羽既饗軍士中酒飲酒之中也不醉不醒故謂之中亞父欲謀殺沛公令項莊拔劒舞坐中欲擊沛公項伯常屏蔽之時獨沛公與張良得入坐樊噲居營外聞事急迺持盾入初入營營衛止噲營衛謂營壘之守衛者噲直撞入立帳下謂以盾撞擊人項羽目之問爲誰張良曰沛公參乗樊噲也項羽曰壯士賜之巵酒彘肩噲既飲酒拔劒切肉食之項羽曰能復飲乎樊噲曰臣死且不辭豈特巵酒乎且沛公先入定咸陽暴師霸上以待大王時項羽未爲王故高紀云以待將軍大王今日至聼小人之言與沛公有隙臣恐天下解心疑大王也項羽黙然沛公如厠麾噲去既出沛公留車騎獨騎馬噲等四人歩從從山下走歸覇上軍而使張良謝項羽亦因遂已已止也無誅沛公之心曹參沛人也髙祖為沛公參以中涓從攻轅戚及亢父先登北救東阿擊章邯軍䧟陣夏侯嬰為太僕從擊陳豨黥布軍䧟陣郤敵周勃沛人也髙祖為沛公初起勃以中涓從攻胡陵下方與方與反與戰郤敵又下下邑先登擊章邯車騎殿攻齧桑先登殿之言填也謂鎮軍后以扞敵勃擊破章邯之殿兵也殿音丁見切酈商以將軍從擊燕王臧荼戰龍脫地名在燕趙之地先登䧟陣破荼軍易下易縣也郤敵又從擊黥布攻其前垣垣方陣也䧟两陣得以破布軍李廣為上郡太守匃奴侵上郡景帝使中貴人從廣内臣之貴幸者勒習兵擊匃奴中貴人者將數十騎從將數十騎自隨在大軍前行而忽遇敵也見匃奴三人與戰射傷中貴人殺其騎且盡中貴人走廣走趨也廣曰是必射鵰者也鵰大鷙鳥也一名鷲黒色翮可以為箭羽廣乃從百騎徃馳三人疾馳逐之也三人亡馬歩行行數十里廣令其騎張左右翼旁引其騎若鳥翼然而廣身自射彼三人者殺其二人生得一人果匃奴射鵰者也後為郎中令將四千騎出右北平博望侯張騫將萬騎與廣俱異道行數百里匃奴左賢王將四萬騎圍廣廣軍士皆恐廣乃使其子敢往馳之敢從數十騎直貫胡騎出其左右而還報廣曰敵騎易與耳軍士乃安為圜陣外鄉胡急擊矢下如雨漢兵死者過半漢矢且盡廣乃令持滿毋發注矢於弓弩而引滿之不發矢也而廣身自以大黄射其禆將黄肩弩即黃間也大黃其大者也殺數人敵兵益解㑹暮吏士無人色言懼甚而廣意氣自如自如猶云如舊益治軍廵部曲正行陳也軍中服其勇也眀日復力戰而博望侯亦至匃奴乃解去霍去病大將軍衛青姊少兒之子再從大將軍受詔予壯士為票姚校尉與輕勇騎八百直棄大將軍數百里赴利斬捕首虜過當言計其所將人數則捕首虜為多而過於所當也一曰漢軍失亡者少殺獲匃奴數多故曰過當也李陵廣之孫武帝以為陵有廣之風使將八百騎深入匃奴二千餘里過居延視地形不見虜還拜為騎都尉趙充國為人沉勇有大略武帝時以假司馬從貳師將軍擊匃奴大為虜所圍漢軍乏食數日死傷者多充國廼與將士百餘人潰圍䧟陳貳師引兵隨之遂得解身被二十餘創貳師奏狀詔徵充國詣行在所武帝親視創嗟歎之辛慶忌為校丞隨長羅侯常恵屯兵烏孫赤谷城與歙侯戰歙即翕字也歙侯烏孫官名䧟陣郤敵後漢王常為漢中將軍從光武進攻下邳常部當城門戰一日數合賊反走入城常追廹之城上射矢雨下帝從百餘騎自城南髙處望常戰力甚馳遣中黃門詔使引還賊遂降來歙為中部將與征虜將軍祭遵襲略陽遵道病還分遣精兵隨歙合二千餘人伐山開道從番須回中番須回中並地名番音盤武帝元封四年幸雍通回中道前書音義曰回中在汧汧今隴州汧源縣也徑至略陽斬隗囂守將金梁因保其城囂大驚曰何其神也張宗為偏將軍從鄧禹軍到栒邑赤眉大衆且至禹以栒邑不足守欲引師進就堅城而衆人多畏賊追憚為後拒禹乃書諸將名於竹簡署其前後亂著笥中令各探之宗獨不肯探云死生有命張宗豈辭難就逸乎禹歎息謂曰將軍有親弱在營奈何不顧宗曰愚聞一卒畢力百人不當萬夫致死可以横行宗今擁兵數千以承天威何遽知其必敗乎遂留為後拒諸營既引兵宗方勒厲軍士堅壘以死當之禹到前縣議曰以張將軍之衆當百萬之師猶以小雪投沸湯雖欲戮力其勢不全也乃遣歩騎二千人反還迎宗宗引兵始發而赤眉卒至宗與戰郤之乃得還營於是諸將服其勇還到長安夜將銳士入城襲赤眉中矛貫脾又轉攻諸營堡為流矢所激皆㡬至於死馮異為征虜將軍時隗囂死其將王元周宗等復立囂子純猶總兵據冀光武復令異行天水太守事與諸將共攻冀不能拔欲且還休兵異固持不動常為衆軍鋒賈復為都䕶將軍從光武擊青犢於射犬大戰至日中賊陳堅不郤光武傳召復曰吏士皆饑可且朝飯復曰先破之然後食爾於是被羽先登所向皆靡賊乃敗走諸將咸服其勇又北與五校戰於真定大破之復傷創甚光武大驚曰我所以不令賈復别將者為其輕敵也果然失吾名將復病尋愈追及光武於薊相見甚懽大饗士卒令復居前擊鄴賊破之復從征伐未嘗喪敗數與諸將潰圍解急身被十二創帝以復敢深入希令逺征而壯其勇節常自從之故復少方靣之勲呉漢擊蜀未破上書請復自助上不遣呉漢光武即位拜為大司馬常修弓戰之具毎當出師朝受詔夕即引道初無辦嚴之日嚴即裝也陳俊為安集掾從光武擊銅馬於青陽進至滿陽拜疆弩將軍與五校戰於安次俊下馬手接短兵所向必破追奔二十餘里斬其渠帥而還光武望而歎曰戰將盡如是豈有憂㢤臧宫初為校尉從光武征戰諸將多稱其勇及至河北以為偏將軍從破羣賊數䧟陣却敵後為輔威將軍討公孫述於蜀前後收得節五印綬千八百是時大司馬吳漢亦乗勝進營逼成都宫連屠大城兵馬旌旗甚盛乃乗兵入小雒郭門歴成都城下至吳漢營飲酒髙㑹漢見之甚懽謂宫曰將軍向者經虜城下震揚威靈風行電照然窮宼難量還營願從他道矣宫不從復路而歸賊亦不敢近之耿弇為大將軍從光武擊破銅馬髙湖赤眉青犢又追尤來大槍五幡於元氏弇常將精騎為軍鋒輙破走之後遷建威大將軍討張歩鋒交乃自引精兵以橫突歩陳大破之有飛矢中弇股以佩刀截之左右無知至暮罷眀旦復勒兵出大戰自旦及昏大破之殺傷無數銚期為偏將軍從光武擊王郎將兒宏劉奉於鉅鹿下期先登䧟陣手殺五十餘人被創中額攝幘攝猶正也復戰遂大破之拜虎牙大將軍又從擊青犢赤眉於射犬賊襲期輜重期還擊之手殺傷數十人身被三創而戰方力遂破走之祭遵為征虜將軍與諸將入箕關南擊宏農厭新栢華蠻中賊弩中遵口洞出流血衆見遵傷稍引退遵呼叱止之士卒戰皆自倍遂大破之祭彤為遼東太守虜毎犯塞彤常為士卒先鋒數破走之景丹為偏將軍號奉義侯從光武擊王即將兒宏等於南䜌兒音五兮切即兵迎戰漢軍退郤續漢書曰南䜌賊迎擊上營得上鼓車輜重數乗也丹等縱突騎擊大破之追奔十餘里死傷者縱橫丹還光武謂曰吾聞突騎天下精兵今乃見其戰樂可言邪堅鐔為揚化將軍與右將軍萬脩狥南陽諸縣而堵鄉人董訢反宛城獲南陽太守劉驎鐔乃引兵赴宛選敢死士夜自登城斬關而入訢遂棄城走還堵鄉鄧奉復反新野攻破吳漢時萬脩病卒鐔獨孤絶南拒鄧奉北當董訢毎急輙先當矢石身被三創以此能全其衆馬武為振威將軍從擊尤來五幡等敗於慎水武獨殿還䧟陣故賊不得廹及進至安定次小廣陽武常為軍鋒力戰無前諸將皆引而隨之故遂破賊又與建威大將軍耿弇西擊隗囂漢軍不利引下隴囂追急武選精騎還為後拒身被甲持㦸奔擊殺數千人囂軍乃退馬援為伏波將軍援常有病梁松來候之援不言松由是恨之及武威將軍劉尚擊武陵五溪蠻夷深入軍没援因復請行時年六十二光武愍其老未許之援自請曰臣尚能披甲上馬帝令試之援據鞍顧盻以示可用帝笑曰矍鑠㢤是翁也矍鑠勇貌也遂遣援率中郎將馬武耿舒劉匡孫永等將十二郡募士及㢮刑四萬餘人征五溪魯竒為偏將軍時公孫述遣其將任滿田戎程汎將數萬人乗枋箄下江關擊破馮駿及田鴻李元等遂拔夷道夷陵據荆門虎牙横江水起浮橋鬬樓立攅柱絶水道結營山上以拒漢兵南征大將軍岑彭數攻之不利於是裝直進樓舩冐突露橈數千艘乃命軍中募攻浮橋先登者上賞於是偏將軍魯竒應募而前時天風狂急彭竒舩逆流而上直衝浮橋而攅住鈎不得去又云時天東風其攅住有反把鈎舩不得去竒等乗勢殊死戰因飛炬焚之風怒火盛橋樓崩燒彭復悉軍順風並進所向無前蜀兵大亂耿秉為駙馬都尉眀帝永平十七年詔舉奉軍都尉竇固合兵萬四千騎復出白山擊車師車師有後王前王前王即後王之子其庭相去五百餘里固以後王道逺山谷深士卒寒苦欲攻前王秉議先赴後王以為并力根本則前王自服固計未决秉奮身而起曰請行前乃上馬引兵北入衆軍不得已遂進並縱兵抄掠斬首數千級收牛馬十餘萬頭遂䧏前後王定車師而還秉性勇壯而簡易於是軍行常自披甲在前梁慬孝殤延平初為西域副校尉受詔當屯金城聞羌轉宼三輔廹近園陵即引兵赴擊之轉戰武功美陽関慬臨陣被創不顧連破走之盡還得所掠生口獲馬畜財物甚衆羌遂奔散朝廷嘉之數璽書勞勉委以西方事令為諸軍節度李膺為烏丸校尉時鮮卑數犯塞膺嘗䝉矢石毎破之虜甚憚懾謝承書曰膺嘗率歩騎臨陣交戰被創痍拭血進戰遂破寇斬首二千級蓋勲靈帝中平中為漢陽長史時叛羌圍䕶羌校尉夏育於畜官勲與州郡合兵救育至狐槃為羌所破勲收餘衆百餘人為魚麗之陳羌精騎夾攻之急士卒多死勲被三創堅不動乃指木表表標也曰必尸我於此句就種羌滇吾句就𦍑别種也句音古侯切素為勲所厚乃以兵扞衆曰蓋長史賢人汝曹殺之者為負天勲仰罵曰死反虜汝何知促來殺我衆相視而驚滇吾下馬與勲不肯上遂為賊所執羌戎服其義勇不敢加害送還漢陽馬騰字夀成靈帝末為軍司馬先是涼州刺史耿鄙任信姦吏民王國等及氐羌反叛州郡募發民中有勇力者欲討之騰在募中州郡異之署為軍行事典領部衆討賊有功吕布為奮威將軍布既殺董卓卓部曲將李傕郭汜等復舉兵攻長安城汜在城北布開城門將兵就汜言且却兵但身决勝負汜布乃獨共對戰布以矛刺中汜汜後騎遂前救汜汜布遂各两罷布歸袁紹紹與布擊張燕於常山燕精兵萬餘騎數千布常御良馬曰赤兎能馳城飛塹時人語曰人中有吕布馬中有赤兎與其徤將成亷魏越等十數騎一日或至三四馳陳皆斬首而出連戰十數日遂破燕軍公孫瓉為遼東屬國長史嘗從數十騎出行塞下卒逢鮮卑數百騎瓉乃退入空亭約其從者曰今如奔走則死盡矣乃自持两刄矛馳出衝賊殺傷數十人瓉左右亦亡其半遂得免閻健行後名豔字彦眀少有健名始為小將隨韓約建安初與馬騰相攻擊騰子超亦號為健健行嘗刺超矛折因以折矛檛超項㡬殺之丁原為執金吾粗略有勇善射受使不辭有警急追宼虜輙在前魏曹仁為督騎太祖征張繡仁别狥旁縣虜其男女二千餘人太祖軍還為繡所追軍不利士卒喪氣仁率勵將士甚奮太祖壯之遂破繡後封都亭侯從太祖平荆州以仁行征南將軍留屯江陵拒吳將周瑜瑜將數萬衆來攻前鋒數千人始至仁登城望之乃募得三百人遣部曲將牛金逆與挑戰賊多金兵少遂為所圍長史陳矯俱在城上望見金等垂没左右皆失色仁意氣奮怒甚謂左右取馬來矯等共援持之謂仁曰賊衆盛不可當也假使棄數百人何苦而將軍以身赴之仁不應遂被甲上馬將麾下壯士數十騎出城去賊百餘歩廹溝矯以為仁當住溝上為金形勢也仁徑渡溝直衝入賊圍金等乃得解衆未盡出仁復直還突之拔出金兵亡其數人賊衆乃退矯等初見仁出皆懼及見仁還乃歎曰將軍真天人也三軍服其勇太祖益壯之轉封安平亭侯李通為征南將軍時蜀主劉備與周瑜圍曹仁於江陵别遣關羽絶北道通率衆擊之下馬拔鹿角入圍且戰且前以迎仁軍勇冠諸將張遼為盪宼將軍從太祖征袁尚於柳城卒與虜遇遼勸太祖戰氣甚奮太祖壯之自以所持麾授遼遂擊大破之斬單于蹋頓及陳蘭梅成叛太祖討之蘭入潜山中有天柱山遼遂進軍斬蘭成首太祖論功曰登天山履峻險遼之功也贈封假節孫權率十萬衆圍合肥遼募其敢死者八百人登鋒䧟陣大破之于禁為裨將軍從太祖還官渡與袁紹連營起土山相對紹射營中士卒多死傷軍中懼禁督守土山力戰氣益奮紹破授偏將軍許禇為都尉從太祖征張繡先登斬首萬計遷校尉又從討韓遂馬超於潼関其後太祖與遂超等單馬㑹語左右皆不得從唯將禇赴㑹超負其力隂欲前突太祖素聞禇勇疑從騎是禇乃問太祖曰公有虎侯安在太祖顧指禇禇瞋目盻之超不敢動乃各罷後數日㑹戰大破超等禇身斬首級遷武衛中郎將軍中以禇力如虎而癡故號曰虎癡典韋拜司馬時太祖討吕布於濮陽布有别屯在濮陽西四五十里太祖夜襲比眀破之未及還㑹布救兵至三靣掉戰時布身自搏戰自旦至日昳數十合相持急太祖募䧟陣韋先占將應募者數千人皆重衣两鎧棄楯但持長矛撩戰時西靣又急韋進當之賊弓弩亂發矢至如雨韋不視謂等人曰虜來十歩乃白之等人曰十歩矣又曰五歩乃白等人懼疾言虜至矣韋手持十餘㦸大呼起所抵無不應手倒者布衆退㑹日暮太祖乃得引去拜韋都尉引置左右將親兵數百人常繞大帳韋既壯武其所將皆選卒毎戰鬬常先登䧟陣遷為校尉好酒食飲噉兼人毎賜食於前大飲長歠左右相屬數人益乃供太祖壯之太祖征荆州至宛張繡迎䧏太祖甚恱延繡及其將帥置酒髙㑹太祖行酒韋持大斧立後刅徑尺太祖所至之前韋輙舉斧目之竟酒繡及其將帥莫敢仰視後十餘日繡反襲太祖營太祖出戰不利輕騎引去韋戰於門中賊不得入兵遂散從他門並入時韋校尚有十餘人皆殊死戰無不一當十賊前後至稍多韋以長㦸左右擊之一义入輙十餘矛摧左右死傷者略盡韋被數十創短兵接戰賊前摶之韋雙挾两賊擊殺之餘賊不敢前韋復前突賊殺數人創重發瞋目大罵而死賊乃敢前取其頭傳觀之覆軍就視其軀孫觀為青州刺史從太祖征吳於濡須口假節攻孫權為流矢所中傷左足力戰不顧太祖勞之曰將軍被創深重而猛氣益奮不當為國愛身乎轉振威將軍創甚遂卒田豫文帝初為䕶烏丸校尉烏丸王骨進桀黠不恭豫因出塞案行單將麾下百餘騎入進部進逆拜遂使左右斬進顯其罪惡以令衆衆皆怖慴不敢動便以進弟代進自是胡人破膽威震沙漠夏侯霸淵之子淵為蜀所害故霸常切齒欲有報蜀意文帝黃初中為偏將軍子午之役霸召見為前鋒進至興世圍安營在曲谷中蜀人望知其是霸也指下兵攻之霸手戰鹿角間賴救至然後觧孫禮齊王正始初為揚州刺史伏波將軍時吳大將全琮帥數萬衆來侵宼時州兵休使在者無㡬禮躬勒衞兵禦之戰於芍陂自旦及暮將士死傷過半禮犯蹈白刅馬被數創手秉枹鼓奮不顧身賊衆乃退蜀關公為先主别部司馬曹公東征先主奔袁紹禽公以歸拜偏將軍紹遣大將軍顔良攻東郡太守劉延於白馬曹公使張遼及公為先鋒擊之公望見良麾蓋䇿馬刺良於萬衆之中斬其首還紹諸將莫能當者遂解白馬圍及先主西定益州拜公董督荆州事公嘗為流矢所中貫其左臂後創雖愈毎至隂雨骨嘗疼痛醫曰矢鏃有毒入於骨當破臂作創刮骨去毒然後此患乃除爾公便舉臂令醫劈之時公適請諸將飲食相對臂血流離盈於盤器而公割炙引酒言笑自若張飛字益徳為中即將曹公入荆州先主奔江南曹公追之一日一夜及於當陽之長阪先主聞曹公卒至棄妻子走使飛將二十騎拒後飛據水斷橋瞋目橫矛曰身是張益德也可來共決死敵皆無敢近者故遂得免黃忠初為劉表中即將及曹公克荆州假行禆將軍後從先主入蜀自葭萌受任還攻劉璋忠常先登䧟陣勇毅冠三軍益州既定拜討虜將軍又於漢中定軍山擊夏侯淵淵衆甚精忠摧鋒必進勸率士卒金鼓振天讙聲動谷一戰斬淵趙雲為翊軍夏侯淵敗曹公爭漢中地運米北山下數千萬囊黃忠以為可取雲兵䕶忠取米忠過期不還雲將四十騎輕行出圍迎視忠等值曹公揚兵大出雲為曹公前鋒所擊方戰其大衆至勢偪遂前突其陣且戰且却曹公軍散已復合雲䧟敵還趣圍將張著被創雲復馳馬還營迎著曹公軍追至圍沔陽長張翼在圍内欲閉門拒守而雲入營更大開門偃旗息鼓曹公疑雲有伏兵引去雲雷鼔振天惟以弓弩於後射曹公軍曹公軍驚駭自相蹂踐墮漢水中死者甚多先主眀旦自來至雲營圍視昨戰處曰子龍一身都是膽也軍中號雲為虎威將軍吳周泰字㓜平九江下蔡人也與蔣欽隨孫策為左右服事恭謹數戰有功策入㑹稽署别部司馬授兵權愛其為人請以自給䇿討六縣山賊權住宣城使士自衛不能千人意尚忽略不治圍落而山賊數千人卒至權始得上馬而賊鋒刅已交於左右或斫中馬鞍衆莫能自定唯泰奮激投身衛權膽氣倍人左右由泰並能就戰賊既解散身被十二創良久乃蘇是日無泰權㡬危殆䇿深德之程普為丹陽都尉從孫䇿征討䇿常攻祖郎大為所圍普與一騎共蔽扞䇿驅馬疾呼以矛突賊賊披䇿因隨出後拜盪宼中郎將凌操輕俠有膽氣孫䇿初興毎從征伐常冠軍履鋒黃蓋初為郡吏孫堅舉義兵蓋嘗從之堅薨又隨䇿及大帝擐甲周旋蹈刅屠城諸山越不賔有宼讐難理之縣輙用蓋為守長潘璋為武猛校尉合肥之役張遼奄至諸將不備陳武闘死宋謙徐盛皆披走璋身次在後便馳進橫馬斬謙盛兵走者二人兵皆還戰大帝甚壯之拜偏將軍周瑜為中䕶軍時曹仁圍甘寕於夷陵寕告急於周瑜瑜用吕蒙計留凌統以守其後身與蒙上救寕寕圍既解乃渡屯北岸克期大戰瑜親跨馬櫟陣㑹流矢中右脅瘡甚便還後仁聞瑜卧未起勒兵就陣瑜乃自興案行軍營激揚吏士仁繇是遂退凌統行破賊都尉從大帝征江夏統為前鋒與所厚徤兒數十人共乗一舩常去大兵數十里行入右江斬黃祖將張碩盡獲舩人還以白大帝引軍兼道水陸並集時吕䝉敗其水軍而統先搏其城於是大獲大帝以統為承烈都尉又從破皖拜盪宼中郎將從征合肥為右部督時大帝徹軍前部已發魏將張遼等奄至津北權使追還前兵兵去已逺勢不相及統率親近三百人䧟圍扶扞大帝出敵已毁橋橋之屬者两版大帝䇿馬驅馳統復還戰左右盡死身亦被創所殺數十人度大帝已免乃還橋敗路絶統被甲潜行大帝既御舩見之驚喜統痛親近無返者悲不自勝大帝引袂拭之呼其字曰公績亡者已矣茍使卿在何患無人統創甚大帝遂留統於舟盡易其衣服其創賴得卓氏良藥故得不死董襲為大帝偏將軍大帝討黃祖祖橫两蒙衝挾守沔口以栟閭大紲繫石為矴上有千人以弩交射飛矢雨下軍不得前襲與凌統俱為前部各將敢死百人人被两鎧乗大舸舩突入蒙衝裏襲身以刀斷两紲䝉衝乃橫流大兵遂進祖便開門走兵追斬之明日大㑹大帝舉觴屬襲曰今日之㑹斷紲之功也徐盛為中即將督校兵曹公出濡須從大帝禦之魏嘗大出橫江盛與諸將俱赴時乗蒙衝遇迅風舩落敵岸下諸將恐懼未有出者盛獨將兵上突斫敵敵披退走有所傷殺風止便還大帝大壯之甘寕巴郡臨江人後歸大帝遂授兵屯富口後隨魯肅鎮益陽拒關羽羽號有三萬人自擇選銳士五千人投縣上流十餘里有淺瀨云欲夜渉渡肅與諸將議寕時有三百兵乃曰可復以五百人益吾吾往對之保羽聞吾咳唾不敢渉水渉水即為吾禽肅便選千兵益寕寕乃夜往羽聞之住不渡而結砦後名其處為關羽瀨營大帝嘉寕功拜西陵太守後從攻皖為升城督寕手持練身縁城為吏士先卒破獲朱光拜折衝將軍後曹公出濡須寕為前部督受勅出斫敵前營大帝特賜米酒衆殽寕乃料賜手下百餘人食食畢寕先以銀盌酌酒自飲两盌乃酌與其都督都督伏不肯持時寕引白削置膝上呵謂之曰卿見知於至尊孰與甘寕甘寕尚不惜死卿何以獨惜死乎都督見寕色厲即起拜持酒次通酌兵各一銀盌至二更時銜枚出斫敵敵驚動遂退寕益貴増兵二千人又云曹公出濡須號歩騎四十萬臨江飲馬大帝率衆七萬應之使寕領三千人為前部都督大帝宻勅寕使夜入魏軍寕乃選手下徤兒百餘人徑詣曹公營下拔鹿角壘入營斬得數十級北軍驚駭鼓譟舉火如星寕已還入營作鼓吹稱萬嵗因夜見大帝大帝大喜曰足以警駭老子否聊以觀卿膽耳即賜絹千匹刀百口大帝曰孟徳有張遼孤有興霸足相敵也停住月餘北軍便退後從攻合肥㑹疫疾軍旅皆已引出唯車下虎士千餘人并吕蒙蔣欽凌綂及寕從大帝逍遥津北張遼覘望知之即將歩騎奄至寕引弓射敵與綂等死戰寕厲聲問鼓吹何以不作壯氣毅然大帝尤嘉之丁奉廬江安豐人少以驍勇為小將屬甘寕陸遜潘璋等數隨征伐戰闘常冠軍毎斬將搴旗身被瘡痍稍遷偏將軍㑹稽王即位為冠軍魏諸葛誕等攻東興諸葛恪率兵拒之及恪上岸奉與將軍唐咨吕據留贊等俱從山西上奉曰今諸軍行遲若敵據便地則難與爭鋒矣乃辟諸軍使下道帥麾下三千人徑進時北風舉㠶二日至遂據徐塘天寒雪敵諸將置酒髙㑹奉見其前部兵少相謂曰取封侯爵賞正在今日乃使兵解鎧著胄持短兵敵人從而笑焉不為設備奉縱兵斫之大破敵前屯㑹據等至魏軍遂潰遷滅宼將軍魏將文欽來䧏以奉為虎威將軍從孫峻至夀春迎之與敵追軍戰於髙亭奉跨馬持矛突入其陣中斬首數百獲其軍器進封安豐侯太平二年魏大將軍諸葛誕據夀春來䧏魏人圍之遣朱異唐咨等往救復使奉與黎斐解圍奉為先登屯於黎漿力戰有功朱績字公緒為建忠都尉領督父兵隨太常潘濬討五溪以膽力稱遷偏將軍留贊為屯騎校尉諸葛恪征東贊為前部合戰先䧟陣大敗魏師遷左將軍贊為將臨敵必先被髪呌天因抗音而歌左右應之畢乃進戰戰無不克晉吳彦字士則初為小將吳大司馬陸抗竒其勇略將擢用之患衆情不允乃㑹諸將宻使狂人拔刀跳躍而來坐上諸將皆懼而走唯彦不動舉几禦之衆服其勇乃擢用焉周訪為振武將軍征杜弢而賊從青草湖宻鈔官軍又遣其將張彦䧟豫章焚燒城邑王敦時鎮湓口遣督䕶繆㽔李恒受訪節度共擊彦㽔於豫章石頭與彦交戰彦軍退走訪率帳下將李午等追破彦其臨陣斬彦時訪為流矢所中折前两齒形色不變郭黙為右將軍黙為人勇健嘗身被重甲跳三丈矛時人莫不憚之陶輿侃之兄子為武威將軍及侃與杜弢戰敗賊以桔槔打没官軍舩艦軍中失色輿率輕舸出其上流以擊之所向輙尅賊又率衆將焚侃輜重輿又擊破之自是毎戰輙尅賊望見輿軍相謂曰避陶武威無敢當者桓石䖍有才幹矯㨗絶倫為寕遼將軍嘗從桓温入關叔冲為苻健所圍垂没石䖍躍馬赴之拔冲於數萬衆中而還莫敢抗者三軍歎息威震敵人朱伺為眀威將軍石勒夏口之戰伺用鐵靣自衛以弩的射賊大帥數人皆殺之賊挽舩上岸於水邊作陣伺逐水上下以邀之箭中其脛氣色不變諸軍尋至賊潰追擊之皆乗舩投水死毛寳為廬江太守祖約遣祖焕桓撫等欲襲湓口陶侃使寳擊之先是桓宣背約南屯馬頭山為焕撫所攻求救於寳衆以宣本是約黨疑之宣遣子戎重請寳即隨戎赴之未至而賊已與宣戰寳軍懸兵少器杖濫惡大為焕撫所破寳中箭貫髀徹鞍使人蹋鞍拔箭流血滿鞾夜奔船所百餘里望星而行到先哭戰亡將士洗瘡訖夜還救宣寳至宣營而焕撫亦退又與陶侃等討蘇峻峻既死匡術以苑城䧏侃使寳守南城鄧嶽守西城賊遣韓滉攻之寳登城射殺數十人滉問寳曰君是毛廬江邪寳曰是滉曰君名壯勇何不出闘寳曰君若健將何不入闘滉笑而退劉遐性果毅便弓馬開豁勇壯值天下大亂遐為塢主毎擊賊率壯士䧟堅摧鋒冀方比之張飛關羽鄧遐為冠軍將軍勇力絶人氣蓋當時時人方之樊噲數從桓温征伐襄陽城北沔水中有蛟嘗為人害遐遂拔劍入水蛟龍繞其足遐揮劍截蛟數叚而出劉牢之為謝𤣥參軍𤣥鎮廣陵牢之領精銳為前鋒百戰百勝蔡裔仕偽趙為振武將軍少有武力呼聲若雷嘗有盗入室裔撫几一呼賊衆皆殞時人憚之宋檀韶為寕朔將軍從征廣固率向彌胡藩等五十人攻臨朐城克之及圍廣固慕容超夜燒樓當韶圍分䧏城䧟之日韶率所領先登劉懐肅為振武將軍劉道規司馬桓振襲江陵荆州刺史司馬休之出奔懐肅自雲杜馳赴書夜兼行七日而至振勒兵三萬旗幟蔽野躍馬橫矛躬自突陣流矢傷懐肅額衆懼欲奔懐肅瞋目奮戈膽氣益壯於是士卒爭先臨陣斬振首江陵既平休之反鎮執懐肅手曰㣲子之力吾無所歸矣胡藩為鎮軍參軍從髙祖征司馬休之加建武將軍領㳺軍於江津徐逵之敗没髙祖怒甚即日於馬頭岸渡江而江津岸峭壁立休之臨岸置陣無繇可登髙祖呼藩令上藩有疑色髙祖奮怒命左右録來欲斬之藩不受命顧曰藩寕前死爾以刀頭穿岸少容脚指於是徑上隨之者稍多既得登岸殊死戰賊不能當引退因而乗之一時奔散劉榮祖以戰功參太尉軍從討司馬休之彭城内史徐逵之敗没諸將意阻榮祖請戰愈厲髙祖乃解所著鎧以授之榮祖率所領䧟陣身被數創㑹賊破走加振武將軍尋參世子征虜軍事劉康祖為左軍將軍太祖北伐蕭斌王𤣥謨沈慶之入河康祖率豫州軍出許洛𤣥謨等敗歸魏軍引大衆南渡南平王鑠在夀陽帝患為所圍召康祖速反康祖迴軍未至夀陽數十里㑹魏永昌王庫仁真以長安之衆八萬騎與康祖相及於尉武康祖凡有八千人軍副胡盛之欲附山依險間行取至康祖怒曰吾受命本朝掃蕩河洛宼今自送不復逺勞王師敵兵雖多實易摧滅吾兵精器練去夀陽裁數十里援軍尋至亦何患耶乃結車營而進魏軍四靣來攻大戰一日一夜殺戮填積薛安都世祖孝建初為輔國將軍時豫州刺史魯爽反安都與副將譚金追爽於小峴爽自與腹心壯騎斷後譚金先薄之不能入安都望見爽便躍馬大呼直往刺之應手而倒左右范雙斬爽首爽累世驍猛生習戰陣咸云萬人敵安都单騎直入斬之而反時皆云關羽之斬顔良不是過也沈慶之世祖大眀中為車騎大將軍討竟陵王誕毎攻城輙身先士卒帝戒之曰卿為統任當令處分有方何蒙楯城下身受矢石耶脫有傷挫為損不少武念新野人蕭思話為雍州遣龎道符統六門田念為道符隨身隊主後太府以念有徤名且家富有馬召出為將世祖臨雍州念領隊奉迎時沔中蠻反世祖之鎮縁道討伐部伍至大嚴堤數千人忽至矢射平乗雨下念馳赴奮擊即時摧退即擢為叅軍督䕶其後毎軍旋常有戰功殷孝祖眀帝㤗始中為統軍屯軍鵲洲沈冲之謂陶亮曰孝祖驍將一戰便死孝祖與賊合戰常以鼔蓋自隨軍中人相謂曰殷統軍可謂死將矣今與賊交鋒而以羽儀自顯欲不斃得乎王宜興眀帝㤗始中為將在夀陽關擊魏師毎以少制多挺身深入無所畏惮虜衆值宜興皆引避不敢當册府元龜卷三百九十四
