  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_322-1a}
body:
  text: 册府元龜卷三百二十二宋王欽若等撰宰輔部出鎮昔陸賈有言曰天下安注意相天下危注意將漢宣亦云邊境有事左右之臣皆將相也蓋夫天子之宰弼諧庻績居乎内則鎮國家撫百姓使卿大夫各任其職處乎外則握兵要司民政俾郡國縣道承其風雖分任迭處而周旋委賴其義均矣自旦奭以降斯可槩舉施及唐室並建戎鎮繇台衡而領旌纛者或以式遏㓂亂或以均被勞逸出入更踐悉得而數焉周周公旦召公奭成王時為三公自陜以西召公主之自陜以東周公主之陜者蓋今𢎞農陜縣是也畢公髙康王時分居理成周郊分别民之居里異其善惡成定東周郊境使有䕶作畢命言畢公見命之書曰惟十有二年六月庚午朏康王即位十二年六月三日庚午越三日壬申王朝歩自宗周至於豐朏至三日壬申王朝行自宗周至于豐宗周鎬京豐文王所都以成周之衆命畢公保釐東郊用成周之民衆命畢公使安理治正東郊令得所王若曰嗚呼父師惟文王武王敷大徳於天下用克受殷命王述其事告畢公代周公為太師為東伯命之言文武布大徳於天下故天祐之用能受殷之王命惟周公左右先王綏定厥家言周公助先王安定其家毖殷頑民遷於雒邑宻邇王室式化厥訓慎殷頑民恐其叛亂故使于雒邑宻近王室用化其教既歴三紀世變風移四方無虞予一人以寧言殷民遷周已經三紀世代民易頑者漸化四方無可虞之事我天子用安矣十二年曰紀父子曰世道有升降政繇俗革不臧厥臧民罔攸勸天道有上下交接之義政教有因俗改更之理民之俗善以善養之俗有不善厥法御之若不善其善則民無所勸惟公懋徳克勤小物弼亮四世正色率下罔不祗師言言公勉徳能勤小物輔佐文武成康四世為公卿正色率下下人無不敬仰師法嘉績多于先王予小子垂拱仰成公之善功多大先人之美我小子為王垂拱仰公于理言其上顯父兄下施孫子王曰嗚呼父師今予祗命公以周公之事徃哉今我敬命公以周公所為之事言非周公所為不敢任公徃治旌别淑慝表厥宅里彰善癉惡樹之風聲言當識别頑民之善惡表異其居里眀其為善病其為惡立其善風揚其善聲弗率訓典殊厥井疆俾克畏慕其不循教道之常則殊其井居田界使知畏為惡之禍慕為善之福所以宣勸申畫郊圻慎固封守以康四海郊圻雖舊所規畫當重分明之又當謹慎堅固封疆之守備以安四海京圻安則四海安矣政貴有常辭尚體要不惟好異政以仁義為常辭以理實為要故貴尚之若異于先王君上所不好商俗靡靡利口惟賢餘風未殄公其念哉紂以靡靡利口惟賢覆邦家今殷民利口餘風未絶公其念之我聞曰世禄之家鮮克由禮以蕩陵徳實悖天道特言我聞自古有之世有禄位而無禮教少不以放蕩陵邈有徳者如此寔亂天道敝化奢麗萬世同流言敝俗相化車服奢麗雖相去萬世若同一流兹殷庻士席寵惟舊怙侈滅義服美於人此殷衆士居寵日久怙悖奢侈以滅徳義服飾過制美於其民者言僭上驕淫矜侉將由惡終雖收放心閑之惟艱言殷衆士驕恣過制務其所能以自侉大如此不變將用惡自終雖今順從周制未必厭服以禮閑禦其心惟艱資富能訓惟以永年惟徳惟義時乃大訓不由古訓于何其訓以富資而能順義則惟可以常年命矣惟有徳義是乃大順若不用古訓典籍于何其能順乎王曰嗚呼父師邦之安危惟兹殷士不剛不柔厥徳允修言邦國所以安危惟在和此殷士而已治之不剛不柔寛猛相濟則其徳政信修治惟周公克慎厥始惟君陳克和厥中惟公克成厥終周公遷殷頑民以消亂階能慎其始君陳𢎞周公之訓和其中畢公闡二公之烈成其終三后恊心同底于道道洽政治澤潤生民三君合心為一終始相成同致于道道至普洽政化治理其徳澤恩施乃浸潤生民言三君之功不可不尚四夷左袵罔不咸賴予小子永膺多福言東夷西戎南蠻北狄被髮左袵人無不皆恃賴三君之徳我小子常受多福公其惟時成周建無窮之基亦有無窮之聞公其惟以是成周之治為國家立無窮之基業于公亦有無窮之名聞于后世子孫訓其成式惟乂言後世子孫順公之成法惟以治嗚呼罔曰弗克惟既厥心人之為政無曰不能惟在盡其心而已罔曰民寡惟慎厥事無曰人少不足治也惟在慎政事無敢輕之欽若先王成烈以休于前政敬順文武成業以美于前人之政所以勉畢公後漢劉虞為幽州牧靈帝遣使就拜太尉封容丘侯晉石苞為驃騎將軍都督揚州諸軍事武帝踐祚遷大司馬加侍中自諸葛誕破滅苞便鎮撫淮南士馬强盛以威惠服物陳騫為太尉都督揚州諸軍事轉大司馬咸寧三年求入朝詔聽留京城賈充武帝時為侍中尚書令氐𦍑叛帝深以為慮侍中任愷因進說請充鎮關中乃下詔曰秦凉二境比年屢敗胡虜縱暴百姓荼毒遂使暴類扇動害及中州雖復吳蜀之冦未嘗至此誠繇所任不足以内撫夷夏外鎮醜逆輕用其衆而不能盡其力非得腹心之重推轂委成大救其弊恐為患未已每慮斯難忘寢與食侍中尚書令車騎將軍賈充雅量𢎞高逹見眀逺武有折衝之威文懐經國之慮信結人心名震域外使權統方任綏静西夏則吾無西顧之憂而逺近獲安其以充為使持節都督秦凉二州諸軍事侍中車騎將軍如故假羽葆皷吹給第一駙馬㑹荀朂侍宴論太子婚姻事因言充女才質令淑宜配儲宫及京師大雪軍不得發既而皇儲當婚遂不行劉琨為并州刺史愍帝遣兼大鴻臚趙廉拜琨司空都督并冀幽三州諸軍事元帝轉琨為侍中太尉餘如故陶侃為侍中太尉荆州刺史後都督江州領刺史移鎮武昌郄鑒成帝時為司空侍中賊帥劉徵聚衆千數浮海抄東南諸縣鑒遂如京口加都督揚州之晉陵吳郡諸軍事庾氷成帝時為中書監揚州刺史都督揚豫兖三州軍事征虜將軍假節康帝即位又進車騎將軍氷懼權盛乃求外出㑹弟翼當伐石季龍於是以本號除都督江荆寧益梁交廣七州豫州之四郡軍事領江州刺史假節鎮武昌以為翼援桓温為侍中大司馬都督中外諸軍事又加揚州牧録尚書事鎮姑孰又領徐兖二州刺史温北伐還發州人築廣陵城移鎮之後還鎮姑孰王坦之孝武帝時為中書令與謝安共輔少主尋遷丹陽尹俄授都督徐兖青三州諸軍事北中郎將徐兖二州刺史鎮廣陵謝安孝武帝時為中書監驃騎將軍加侍中都督揚豫徐兖青五州幽州之燕國諸軍事假節後為征討大都督以摠統功進拜太保安方欲混一文軌上疏求自北征乃進都督揚江荆司豫徐兖青冀幽并寧益雍梁十五州諸軍事加黄鉞後㑹稽王導子専權而姦諂頗相扇搆安出鎮廣陵之歩丘築壘曰新城以避之王恭孝武帝時自中書令為都督青兖幽并冀五州諸軍事前將軍兖青二州刺史宋謝晦少帝時為中書令與徐羡之傅亮等共輔朝政帝既廢晦乃行都督荆湘雍益寧南北秦七州諸軍事撫軍將軍領䕶南蠻校尉荆州刺史袁粲前廢帝時為司空順帝初即位粲鎮石頭梁王茂為司空髙祖天監十三年九月以茂為驃騎將軍開府儀同三司都督江州諸軍事江州刺史陳侯瑱為太尉文帝天嘉元年二月出鎮湓城以拒周軍唐陸象先景雲初為中書侍郎平章事先天三年出為益州大都督長史仍為劒南道按察使王晙開元十一年為兵部尚書同中書門下三品出鎮朔方制曰周建司馬以申元法漢用丞相兼撫四夷伐叛柔服於是乎在朔方古郡寔曰新邦雖夷狄已平河縣無事境鄰戎馬地雜坰牧瞻言備豫深仗威謀王晙學綜九流才苞七徳武稱敵國文乃時宗憂邊之誠所懷必盡奉上之道知無不為出則守于四方入則式是百辟辨兹旗物制我封疆賞不失勞舉無遺徳俾慿廟堂之策克平邦國之事可持節兼朔方軍節度大使其河西隴右河東河北諸軍征馬並委晙檢察置之杜暹開元四年為黄門侍郎平章事十七年出為荆州大都督府長史崔渙天寶十五載為黄門侍郎平章事至徳二載出為餘杭太守江東採訪禦等使張鎬至徳元載為中書侍郎平章事二載出為河南節度使王縉廣徳二年正月為黄門侍郎同平章事八月加侍中持節都統河南淮西山南東道諸節度行營事兼東都留守縉讓侍中從之杜鴻漸廣徳二年為黄門侍郎平章事永泰二年兼成都尹持節充山南西道劍南東川等道副元帥充劒南西川節度等使平郭英乂之難也裴冕永泰四年自左僕射平章事充南都留守河南淮西山南東道副元帥代王縉張鎰建中二年七月為中書侍郎平章事二年四月出為鳯翔尹隴右節度使杜佑貞元十九年為檢校司空平章事元和二年出為河中尹河中晉絳等州節度使平章事如故袁滋永貞元年七月為中書侍郎平章事八月以西川劉闢擁兵自擅出為東西兩川山南西道安撫大使十月加檢校吏部尚書平章事成都尹劍南西川節度觀察等使滋懼而不進貶吉州刺史杜黄裳永貞元年為門下侍郎平章事元和二年正月制曰昔周之周召出為二伯是以宗公而領方面也鄭之桓武入作三事是以諸侯而宰邦政也然則荷中外之寵享崇髙之名不有盛徳孰膺寵命門下侍郎同中書門下平章事杜黄裳道惟無方才則不器陋齷齪之廉謹本誠眀而坦夷澄波納寛瑞玉凝素夙以令望更厯達官論議必通於大經損益咸酌於中制代所凖的朝之羽儀爰授樞衡俾居左右所緝者墜典所陳者格言色無面從志不枉撓𢎞兹冒逺之化啓彼夷兇之征將眀則然忠利斯在惟股肱之郡有節制之師兵威外接於太平地形内錯於左輔是用謀帥僉歸碩人藉台陛之素風執戎鉞以莅衆示以嚴重廣其封疆罷平陽之十連復元侯之四履超鼎列足仍參廟謨増二象之光輝霈一方之膏雨大邦雄屏羣后所瞻爾其敬哉無替舊績可檢校司空依前同中書門下平章事兼河中尹充河中晉絳慈隰等州節度等使武元衡元和二年二月為門下侍郎平章事十月詔曰地有西蜀國之奥區百濮羣蠻外匝于封域䨇流重阻内固於襟帶形勝所属統綏惟艱近者剪其兇魁鎮以元勲實有威惠至于和寧而匪遑啓居累布丹懇激戀闕之深志將執珪而展儀誰其代之尤在能者乃聽僉議輟兹台臣大中大夫守門下侍郎同中書門下平章事兼判户部侍郎事蕭縣開國伯武元衡器惟𢎞深行本端敬珪玉不琢雷風有常夙彰嘉聞亟歴華貫乃司邦憲有遂物之誠乃踐地官有阜財之積益振公望克諧朕心擢於鼎司授以大柄謨繇外而不伐懼繇衷而自彰展代工之勤𢎞冒物之化以道則直以心則和丙吉雅通於國體山甫誠補於衮職朝夕有恪毗予一人眷兹西南憂寄方切非寛大無以莅衆非慈惠無以厚生非誠信無以撫夷蠻非忠賢無以奠邦國故我心膂膺兹重任外分兵符以副於俞徃中佩相印不離於具瞻峻秩爰首於六官崇階更登於七命且示加等仍疏大封勉承寵光無替朕命可銀青光禄大夫檢校吏部尚書兼門下侍郎同中書門下平章事成都尹劍南西川節度等使仍封臨淮郡開國公李吉甫元和二年二月為中書侍郎平章事二年九月出為檢校兵部尚書兼中書侍郎平章事充揚州大都督府長史淮南等節度觀察使是月吉甫赴鎮揚州故事宰臣出鎮帝御通化門樓餞送百僚序班張𢎞靖元和元年為中書侍郎平章事十一年正月出為檢校吏部尚書兼太原尹北都留守河東節度觀察等使李逢吉元和十一年為門下侍郎平章事十二年九月制曰蜀門南次梁部東分地束江南境緜賨濮非志懐端重不可委以察廉非識度𢎞深不可付以節制聿求公望爰自輔臣門下侍郎同中書門下平章事李逢吉文以發華行惟居厚忠懇每形於造膝直方斯見於匪躬自處台席載移星琯温然徳器休有素風觀其勤本於仁足以敷王澤考其守歸於正足以奉師貞乃眷梓潼兹惟奥壤用去將眀之任俾効藩宣之功予欲頒正典於一隅故兼以夏卿之位予欲布憲章於列郡故假以副相之權爾其儉節以訓俗澄清以檢吏因土風之剛悍使勇且知方就物産之殷充俾既富而教茍能積實期有遐聞於戲朕於大臣進退示全其恩禮爾之報國始終宜竭其肺肝身雖逺出於山川心豈近忘於夙夜服兹休命俞徃戒哉可檢校兵部尚書兼御史大夫充劍南東川節度副大使知節度事静戎軍等使時朝廷方討淮西宰相裴度身請自督戰憲宗乃下制以度為淮西節度逢吉與度不叶乃罷逢吉知政事出為東川御史寶歴二年十二月又自右僕射平章事出為檢校司空平章事充山南東道節度使李夷簡為門下侍郎平章事元和十三年七月出為檢校尚書左僕射平章事充淮南節度等使裴度元和十三年為門下侍郎平章事十四年四月制曰忠利於國者效積而事章器用於物者志逺而任重况入調鼎鼐出鎮藩垣荷中外之寵榮膺文武之重寄將允僉望命兹輔臣門下侍郎同中書門下平章事晉國公裴度量惟𢎞深道在兼濟大璞藴連城之價長材負構厦之姿言必公忠義本誠罄自居鈞軸叶賛機謀匪躬以務其將眀憂國不忘於造次當夷兇淮蔡仗節於師旅之間及殄冦青齊運籌於帷幄之内勤勞靡替𢎞益居多績用是嘉撝冲逾懇東夏雄屏寔惟晉陽控大鹵之山川司北門之管鑰横制獯虜逺清疆陲是以輟獻納於沃心撫方隅於注意倚屬攸切勲庸可宣舟楫嘗賴其弼予鈇鉞願觀其莅衆勵山甫之恪徳成方叔之壯猷式副具瞻勉揚休問務既兼於左揆秩仍踐於中台爾其戒哉以服嘉命可檢校尚書左僕射兼門下平章事太原尹北都留守充河東節度等使文宗大和四年九月又自司徒平章軍國重事加侍中出為山南東道節度使崔羣元和十四年十二月自中書侍郎平章事出為湖南都團練觀察使韓𢎞元和十四年八月自宣武軍節度使入為司徒兼中書令十五年六月出為河中尹充河中晉絳慈隰等州節度使叚文昌穆宗即位初為中書侍郎平章事長慶元年二月出為檢校刑部尚書同平章事成都尹劍南西川節度等使杜元穎長慶元年為户部侍郎平章事三年十月帶平章事除成都尹劍南西川節度使穆宗御安福門臨餞元頴之鎮牛僧孺為中書侍郎平章事寶歴元年正月出為檢校禮部尚書平章事充武昌軍節度使僧孺居相位三年嘗以寵過為懼自前年十月抗疏乞罷帝以先朝舊相園寢未終不許及穆宗祔廟畢又如前拜章帝以郊禮在近職當輔導不許至是又固陳乞帝乃嘉其退讓特建武昌軍額而命之太和四年復為兵部尚書平章事六年十一月制為檢校左僕射揚州大都督府長史淮南節度使李程敬宗即位初為吏部侍郎平章事加中書侍郎寳歴二年九月出為檢校兵部尚書同中書門下平章事兼太原尹北都留守充河東節度觀察使竇易直敬宗即位初為户部侍郎平章事累加左僕射太和四年十月出為檢校左僕射同平章事充山南東道節度等使路隨太和二年為中書侍郎平章事加門下侍郎九年四月以檢校尚書左僕射同平章事充鎮海軍節度等使李宗閔太和三年為吏部侍郎平章事加中書侍郎七年六月出為檢校禮部尚書平章事興元尹山南西道節度使李徳裕太和七年為兵部尚書平章事八年十月以檢校兵部尚書同平章事兼興元尹山南西道節度管内觀察處置等使武宗即位初授門下侍郎同平章事累加太尉㑹昌元年宣宗即位出為檢校太尉同平章事江陵尹充荆南節度使李固言太和九年為門下侍郎平章事九月以檢校兵部尚書兼興元尹充山南西道節度等使開成元年四月復入為門下侍郎平章事判户部二年十月出為劍南西川節度依前守門下侍郎平章事李石太和九年為中書侍郎平章事開成三年正月制曰翼亮之臣寄任攸重九功未叙則宜立於廟堂百度既貞則兼制於方嶽中外迭處式寵才賢中書侍郎同中書門下平章事李石元精降祥河嶽鍾秀文含大雅學茂全經叡智通理亂之源達識究古今之變望鬱人傑居為國楨頃者嘉其多能俾調鼎實動必隨道知無不為每竭慮於謀猷思致予於堯舜嘗司轉漕仍摠財役盤錯之難鋩刄不滯増台輝之光彩揚鳯沼之波瀾墜典咸修逺方畢服夙夜匪懈光我樞垣近者情在進賢願辭衮職誠不易奪朕所難違乃眷荆門東南巨鎮山川重險舟車要衝比罷節符是遵權便台臣徃莅宜復前規俾登大將之壇仍持上相之印尹正望府兼視雄藩增榮峻階無忝朕命可中書侍郎同中書門下平章事兼江陵尹充荆南節度管内觀察等使陳夷行武宗即位初為中書侍郎平章事累加右僕射㑹昌三年八月出為檢校司空兼河中尹充河中節度使李紳㑹昌元年為中書侍郎平章事累加左僕射兼門下侍郎四年七月出為檢校司空同平章事揚州大都督府長史充淮南節度副大使知節度事李回㑹昌五年為兵部侍郎平章事累加門下侍郎六年出為成都尹劍南西川節度使鄭肅㑹昌五年為兵部尚書平章事累遷門下侍郎宣宗即位初為河中尹節度使白敏中宣宗即位初為兵部侍郎平章事累加司空門下侍郎大中五年四月檢校司徒同平章事出鎮邠寧招討南山平夏時新復河湟故遣重臣撫之盧商宣宗即位初為兵部侍郎平章事加工部尚書大中元年八月出為武昌軍節度使夏侯孜大中十二年五月為兵部侍郎平章事累加右僕射門下侍郎咸通五年以檢校司空平章事成都尹劍南西川節度副大使知節度事周墀大中二年為兵部侍郎平章事加中書侍郎三年三月出為檢校刑部尚書劍南東川節度使崔龜從大中二年為户部侍郎平章事加中書侍郎兼吏部尚書五年十一月出為檢校左僕射充宣武軍節度使令狐綯大中五年為兵部侍郎平章事累加右僕射咸通元年二月以檢校司空平章事河中尹充河中節度使魏謩大中五年為户部侍郎平章事累加門下侍郎兼户部尚書十年以檢校户部尚書平章事出為成都尹劍南西川節度副大使知節度事裴休大中六年為兵部侍郎平章事加中書侍郎兼禮部尚書十年為檢校户部尚書宣武軍節度使崔慎繇大中十年為中書侍郎平章事十二年二月出為檢校禮部尚書充劍南東川節度副大使知節度事杜審權咸通元年為兵部侍郎平章事累加右僕射兼門下侍郎尋出為檢校司空鎮海軍節度使畢諴咸通二年為兵部尚書平章事加工部尚書四年十一月以疾辭位除檢校吏部尚書河中尹充晉絳慈隰節度使楊收咸通四年三月為兵部侍郎平章事累加門下侍郎兼户部尚書八年三月以檢校兵部尚書充浙江西道觀察使曹確咸通四年十一月以兵部侍郎平章事加門下侍郎兼户部尚書十一年以病求免除檢校司空平章事充鎮海軍節度等使徐商咸通六年二月為兵部侍郎平章事累加門下侍郎兼刑部尚書十年正月以檢校兵部尚書出為江陵尹荆南節度等使路巖咸通七年為兵部侍郎平章事累加左僕射兼門下侍郎十二年四月以檢校司徒為成都尹充劍南西川節度使于琮咸通八年三月為兵部侍郎平章事累加右僕射兼門下侍郎十三年二月以檢校司空充山南東道節度等使劉瞻咸通十年為戸部侍郎平章事加中書門下兼刑部尚書十一年九月以檢校刑部尚書同平章事兼江陵尹充荆南節度等使王鐸咸通十一年為禮部尚書平章事加吏部尚書乾符元年正月以檢校左僕射同平章事充宣武軍節度使二年復為右僕射平章事五年以鐸守司徒平章事兼江陵尹荆南節度使充諸道兵馬都統劉鄴咸通十三年為戸部侍郎平章事累加吏部尚書兼門下侍郎僖宗即位初以檢校左僕射同平章事兼揚州大都督府長史充淮南節度副大使知節度事趙隠咸通十三年為戸部侍郎平章事加中書侍郎兼刑部尚書乾符三年三月以檢校吏部尚書出為浙江西道都圑練觀察等使李蔚乾符三年為太常卿平章事加門下侍郎兼吏部尚書五年九月以檢校右僕射出為東都留守鄭從讜乾符五年為吏部尚書平章事加門下侍郎廣眀元年二月以檢校司空平章事兼太原尹北都留守充河東節度使韋昭度中和三年為吏部尚書平章事加司空門下侍郎昭宗即位以昭度檢校司徒平章事兼成都尹劍南西川節度副大使知節度事劉崇望龍紀元年為兵部侍郎平章事加吏部尚書平章事大順二年汴州朱全忠與徐帥時溥争衡全忠謀兼徐泗表請重臣鎮徐乃以崇望為武寧軍節度使崔𦙍乾寧元年為兵部侍郎平章事加中書侍郎乾寧二年三月以檢校尚書左僕射同平章事河中尹充河中節度等使再入朝三年七月復以左僕射兼廣州刺史充清海軍節度領南東道觀察處置等使徐彦若大順元年為戸部侍郎平章事加中書侍郎二年七月以檢校右僕射同平章事兼鳯翔尹隴州節度使時李茂貞求兼領山南昭宗將加兵問罪故以彦若代之終不赴鎮光化三年九月自守太保兼門下侍郎除檢校太尉同平章事充清海軍節度嶺南東道管内觀察等使王溥景福二年為户部侍郎平章事加中書侍郎乾寧元年十月為湖南節度使二年六月復平章事三年五月自門下侍郎兼户部尚書出為檢校尚書左僕射同平章事充鎮東軍節度等使八月復入相裴樞光化三年為中書侍郎平章事加吏部尚書天復三年十月以檢校右僕射同平章事充清海軍節度等使是月復入相獨孤損天復三年為兵部侍郎平章事累加門下侍郎兼户部尚書天祐二年三月檢校尚書左僕射同平章事兼安南都䕶充静海軍節度等使梁韓建開平元年為司徒平章事累加侍中太保四年三月除陳許節度使仍令中書不議除替後唐趙鳯眀宗時為門下侍郎兼吏部尚書平章事長興三年出為檢校太傅同中書門下平章事充安國軍節度等使安重誨眀宗時為太尉中書令充樞宻使長興中以檢校太師兼中書令充河中節度使晉王建立初仕後唐眀宗使為右僕射中書侍郎平章事天成四年出為青州節度使桑維翰髙祖時為中書侍郎平章事天福四年七月出為檢校司空兼侍中相州節度使周馮道初仕後唐天成中為中書侍郎平章事累加門下侍郎左僕射末帝即位出為同州節度使未幾入為司空晉髙祖入雒為首相累加司徒兼侍中少帝即位加太尉復出為同州節度使册府元龜卷三百二十二
