body:
  text: 册府元龜卷八百九十九宋王欽若等撰􅄣錄部致政昔周任有言曰陳力就列不能者止故七十致仕謂之禮經縣車之義垂於載籍由古道也商周之世施及戰國蓋有引年請老致其官政保厥休問流光後裔漢氏而下公卿庻尹年耆德修事立名遂乃能顧義知止上封稱疾願乞骸骨奉還印綬或以避遠寵勢克念退藏或以固守名節懼罹汚染捨去榮爵式遵典訓而當世之君曷嘗不厚其恩紀異其禮秩加之體貌形於敦奬所以重老成而厲風俗者焉商伊尹將告歸乃陳戒于德告老歸邑陳德以戒既致仕老終以三公禮葬石碏衛大夫也公子州吁有寵而好兵公弗禁公莊公石碏諌弗聽言將立為太子則宜早定若不早定州吁必為禍桓公立乃老桓公戴媯之子老致仕也祁奚晉大夫請老老致仕韓獻子厥晉大夫告老公族穆子有廢疾穆子韓厥長子為公族大夫將立之代厥為卿辭曰請立起也起無忌弟宣子也既使宣子朝遂老韓厥致仕孟軻為齊卿致為臣而歸辭齊卿而歸其室也漢石奮景帝末上大夫祿歸老于家以嵗時為朝臣豫朝請也周仁武帝時為郎中令以先帝臣重之重謂敬難之仁乃病免以二千石祿歸老張歐歐音驅為御史大夫老篤請免武帝寵以上大夫祿歸老于家家陽陵疎廣宣帝時為太子太傅疎受為太子少傅在位五嵗廣謂受曰吾聞知足不辱知止不殆功遂身退天之道也今仕宦至二千石宦成名立如此不去懼有後悔豈如父子相隨出關歸老故鄉以壽命終不亦善乎受叩頭曰從大人議即日父子俱移病移病謂移書言病也滿三月賜告廣遂稱篤上疏乞骸骨帝以其年篤老皆許之加賜黄金二十斤皇太子贈以五十斤公卿大夫故人邑子設祖道供張東都門外長安東郭門也祖道餞行也供音一共切張音竹亮切送者車數百兩辭决而去及道路觀者皆曰賢哉二大夫或歎息為之下泣韋賢字長孺魯國鄒人也本始三年代蔡義為丞相時賢七十餘為相五嵗地節三年以老病乞骸骨賜黄金百斤罷歸加賜第一區丞相致仕自賢始史丹字君仲為將軍前後十六年永始中病乞骸骨帝賜䇿曰左將軍寢病不衰病不損也願歸治疾朕愍以官職之事久留將軍使躬不瘳使光祿勲賜將軍黄金五十斤安車駟馬其上將軍印綬宜專精神務近醫藥以輔不衰丹歸第數日薨杜延年為御史大夫是時四夷和海内平延年視事三嵗以老病乞骸骨宣帝優之使光祿大夫持節賜延年黄金百斤牛酒加致醫藥延年遂稱病篤賜安車駟馬罷就第趙充國為後將軍乞骸骨賜安車駟馬黄金六十斤罷就第朝廷每有四夷大議常與叅兵謀問籌䇿焉邴漢哀帝時以清行徴用至太中大夫又徴龔勝為光祿大夫王莽秉政勝與漢俱乞骸骨䇿曰惟元始二年六月庚寅光祿大夫太中大夫耆艾二人以老病罷太皇太后使謁者僕射䇿詔之曰蓋聞古者有司年至則致仕所以恭讓而不盡其力也今大夫年至矣朕愍以官職之事煩大夫其上子若孫若同産同産子一人同産兄弟也同産子即兄弟子也大夫其修身守道以終高年賜帛及行道舍宿嵗時羊酒衣袗皆如韓福故事福涿郡人昭帝時以德行徴之京師賜束帛遣歸所上子男皆除為郎於是勝漢遂歸老于鄉里班况成帝時為左曹越騎校尉一女為媫妤致仕就第貲累千金後漢劉昆受施氏易於沛人戴賔光武時為光祿勲授皇太子及諸王小侯五十餘人二十七年拜騎都尉三十年以老乞骸骨詔賜雒陽第舍以千石祿終其身劉隆建武中為驃騎將軍行大司馬事隆奉法自守視事八嵗上將軍印綬罷賜養牛上樽酒十斛稻米一斗得酒一斗為上樽稷米一斗為中樽粟米一斗為下樽也以列侯奉朝請鄧彪章帝時為太尉清白為百僚式視事四年以疾乞骸骨元和三年賜䇿罷贈錢三十萬在所以二千石奉終其身又詔太常四時致宗廟之胙河南尹遣丞存問常以八月旦奉羊酒鄭均字仲虞建初六年公車特徴再遷尚書後以病乞骸骨拜議郎告歸因稱病篤帝賜以衣冠元和初詔曰議郎鄭均束脩安貧恭儉節整前在機宻以病致仕守善貞固黄髪不怠其賜均義榖千斛劉愷安帝時為司徒視事五嵗永寧元年稱病上書致仕有詔優許焉加賜錢三十萬以千石祿歸養胡廣桓帝初為太尉錄尚書事以病遜位又拜司空告老致仕周榮和帝時為山陽太守以老病乞身卒於家張儉建安初徴為衛尉不得已而起儉見曹氏世德已萌乃闔門懸車不豫政事嵗餘卒于許下魏劉放文帝時為中書監時大將軍曹爽專事多變易舊章嘆曰吾累世􅂪寵加以豫聞屬託今縱不能輔弼時事可以坐受素餐之祿邪遂固稱疾詔曰君掌機宻三十餘年經營庻事勲著前朝暨朕綂位動頼良謀是以曩者増崇寵章同之三事外帥羣官内望讜言屬以年耆疾篤上還印綬前後鄭重辭㫖懇切天地以大順成德君子以善恕成仁重以職事違奪君志今聽所執賜錢百萬使兼光祿勲少府親䇿詔君養疾于第君其勉進醫藥頥神和氣以永無疆之祚置舍人官騎加以日秩肴酒之膳焉田豫明帝時為衛尉屢乞遜位太傳司馬宣王以為豫克壯書喻未聽豫書答曰年過七十而以居位譬猶鐘鳴漏盡而夜行不休是罪人也遂固稱疾篤拜太中大夫食卿祿呉陳化大帝時為太常兼尚書令年出七十乃上疏乞骸骨遂居章安卒於家石偉字公操舉茂才賢良方正皆不就景帝即位特徴偉累遷至光祿勲及後主即位朝政昏亂偉乃辭老耄痼疾乞身就拜光祿大夫晉王祥武帝時為太保以年老疲耄累乞遜位帝不許祥固乞骸骨詔聽以睢陵公就第位同保傅在三司之右祿賜如前詔曰古之致仕不事王侯今雖以國公留居京邑不宜復苦以朝請其賜几杖不朝大事皆諮訪之王覽為宗正卿頃之以疾上疏乞骸骨詔聽之以太中大夫歸老鄭袤字林叔在魏為太常陳留王景元初疾病失明屢乞骸骨不許袤前後辭讓遣息稱上送印綬至于十數久之見許以侯就第鄭冲為太傳抗表致仕詔曰太傳韞德深粹履行高潔恬遠清虚確然絶世艾服王事六十餘載忠肅在公慮不及私遂應衆舉歴登三事仍荷保傅之重綢繆論道之任光輔奕世亮兹天工廸宣謀猷𢎞濟大烈可謂朝之俊老衆所具瞻者也朕昧于政道庻事未康挹仰耆訓導揚厥􅂪庻賴顯德緝熈有成而公屢以年高疾篤致仕告退惟從公志則朕孰與諮謀譬彼涉川㒺知攸濟是用未許迄于累載而高讓彌篤至意難違覽其盛指俾朕憮然夫功成弗有上德所隆成人之美君子與焉豈必遂朕慿賴之心以枉大雅進止之度哉今聽其所執以壽光公就第位同保傅在三司之右公宜頥精養神保御太和以䆒遐福其賜几杖不朝古之哲王欽祗國老憲行乞言以彌縫其闕若朝有大政皆就諮之又賜安車駟馬第一區錢百萬絹五百疋牀帷簟褥置舍人六人官騎二十人以世子徽為散騎常侍使常優游定省祿賜所供䇿命儀制一如舊典而有加焉劉毅字仲雄為左僕射年七十告老久之見許以光祿大夫歸第門施行馬後司徒舉毅為清州大中正尚書以毅懸車致仕不宜勞以碎務傅祗為衛尉以風疾遜位就拜常侍食卿祿秩賜錢及牀帳等尋加光祿大夫門施行馬華表為太常卿數嵗以老病乞骸骨詔曰表清貞履素有老成之美久幹王事靖恭匪懈而以疾固辭章表懇至今聽如所上以為太中大夫賜錢二十萬牀帳褥席祿賜與卿同門施行馬劉宴為太傅惠帝太安初寔以老病遜位賜安車駟馬錢百萬以侯就第羅含字君章穆帝升平中南郡公桓遇引為郎中令後徴為廷尉長沙相年老致仕加中散大夫門施行馬王述為散騎常侍尚書令於西海公太和二年以年廹懸車上疏乞骸骨曰臣曽祖父魏司空昶白牋於文皇帝曰昔與南陽宗世林共為東宮官屬世林少得好名州里瞻敬及其年老汲汲自勵恐見廢棄時人或共笑之若天假其壽致仕之年不為此公婆娑之事情㫖慷慨深所鄙薄雖是牋書乃實訓誡臣忝端右而以疾患禮敬廢替猶謂可有差理日復一日而年衰疾痼永無復瞻華幄之期乞奉先誡歸老邱園不許述竟不起宋臧壽為太常武帝永初三年致仕拜光祿大夫加金章紫綬范泰少帝時為散騎常侍領國子祭酒景平中以常侍致仕解國子祭酒傅隆為太常致仕拜光祿大夫歸老在家文帝元嘉三年輕舟逰東陽任意行止不關朝廷有司劾奏之帝不問也顔延之文帝時為太常表求致仕曰臣聞行百里者半於九十言其末路之難也愚心嘗謂為虚方今乃知其信臣人薄寵厚宿塵國恩而雪效無從榮牒増廣歴盡身彫日刑官次雖容載有塗而妨穢滋積早欲啟請餘筭屏蔽醜老但時制行及歸慕無餘是以腆冐愆非簡息干黷耗歇難支質用有限自去夏侵暑此秋節變頭齒眩疼根痼漸劇手足冷痺左脾尤甚素不能食頃向减半本猶頼服食比倦悸遠晩年疾所摧願景引日臣班叨有卿生户封典肅祗朝校尚恧匪任而陵廟衆事有以疾怠宮府覲慰轉闕躬親息㚟庸微過宰近邑同澤爰降實加將監臣乞解所職隨就藥養伏願聖慈特垂矜許禀恩明世負執㝠暮仰叩端闈上戀㒺極不許明年乃致仕南齊虞玩之㑹稽餘姚人武帝時為黄門郎以久官年老上表告退曰臣聞負重致遠力窮則止竭誠事君智盡必傾理固然也四十仕進七十懸車壯則驅馳老宜休息臣生於宋老於齊世歴三代朝市再易臣以宋元嘉二十八年為王府行佐於兹三十年矣自頃以來衰耗漸篤為性不懶惰而倦怠頓來耳目失聰明而聾矒轉積脚不支身喘不緒氣景刻不推朝晝不保大功兄弟四十有二人通塞壽夭唯臣獨存朝露末光寧堪長久且知足不辱臣已足矣禀命饑寒不求富貴銅山由命臣何恨焉久甘之矣直道事人不免縲紲屬遇聖明知其非罪臣之幸厚矣授命於道消之辰效節於百揆之日臣忠之効也慶隆於文明之初荷澤於天飛之運臣命之偶也不謀巧官而位至九卿德慙李陵而忝居門下堯舜無窮臣亦通矣年過六十不為夭矣榮期之三樂東平之一善臣俱盡之矣經昏踐亂渉艱履危仰聖德以求全慿賢輔以申節未嘗厭屈於勲權畏溺於狐䑕臣立身之本於斯不虧在其壯也當官不讓及其衰矣毫露靡因伏願慈臨賜臣骸骨非為希高慕古愛好林泉特以丁運孤貧養禮多闕風樹之感夙自纒心庻天假其辰得二三年間掃守邱墓以此歸全始終之報遂矣詔從之梁范述曽仕齊為永嘉太守東昏時拜中散大夫還鄉里高祖踐祚乃輕舟詣闕仍辭還東夏侯詳為光祿大夫侍中天監二年年七十抗表致仕詔解侍中進位特進後魏冦讚太武時為南雍州刺史讚在州十七年甚獲公私之譽年老表求致仕許之羅結為長秋卿年一百一十詔聽歸老賜大寗東川以為居業并築城即號曰羅侯城朝廷每有大事騎馬詢訪焉高允為中書令獻文初以老疾頻上表乞骸骨詔不許於是乃著告老詩又兼太常遷中書監懷州刺史至孝文太和二年又以老乞還鄉里十餘章上帝卒不聽許遂以疾苦告歸其年詔以安車徴允勑州郡發遣至都拜鎭軍大將軍領中秘書事固辭不許扶引就内改定皇詔畢衆敬孝文時為兖州刺史徴還京師以篤老乞還桑梓朝廷許之衆敬臨還獻眞珠璫四具銀裝劔一口刺虎矛一枚仙人文綾一百疋文明太后與帝引見於皇信堂賜以酒饌車一乘馬三匹絹二百疋勞遣之尉元為司徒頻表以年老乞身詔曰元年尊識遠屢表告退朕以公秉德清挹體懷平隠仁雅淵廣謀猷是仗方委之以政用康億兆故頻文累札仍違冲志而謙光逾固三請彌切若不屈從高謨復何以成其美德也已許其致仕主者可出表付外如禮申遂元詣闕謝老引見於庭命升殿勞宴賜𤣥冠素服源賀為侍中太尉以年老辭位詔不許後又上書稱病篤乞骸骨至于再三乃許之朝有大議皆就詢訪游明根為大鴻臚卿以年踰七十表求致仕詔不許頻表固請乃詔曰明根風度清粹志尚貞敏温恭静宻乞言是寄故抑其高蹈之操至于再三表請殷勤不容違奪便已許其告謝可出前後表付外依禮施行引明根入見帝曰卿年耆德茂服勤累朝歴職内外並著顯績逮于耆老履道不渝是以釐革之始委以禮任遲能遷德匡贊於朕然高尚悠邈便爾言歸君臣之禮於斯而畢眷德思仁情何可已夫七十致仕典禮所稱位隆固辭賢者逹節但季俗陵遲斯道弗繼卿獨秉冲操居今行古有魏以來首振頽俗進可以光我朝化退可以榮慰私門明根對曰臣桑榆之年鐘鳴漏盡陛下之澤首領獲全待盡私庭下奉先帝陛下大恩臣之願也但犬馬戀主不勝悲塞因泣不自勝帝命令進言别殷勤仍為流涕爾朱代勤為肆州刺史賜爵梁郡公以老致仕嵗賜帛百疋以為常高閭宣武時為太常卿累表遜位詔曰閭貞幹早聞儒雅素著出納清華朝之雋老以年及致仕固求辭任宜聽解宗伯遂安車之禮特加優授崇老成之秩可光祿大夫金印紫綬使散騎常侍兼吏部尚書邢巒就家拜授及辭引見於東堂賜以餚羞訪之大政以其先朝儒舊告老求歸帝為之流涕詔曰閭歴官六朝著勲五紀年禮政辭義光進退歸軒首路感悵兼懷安駟籝金漢世榮貺可賜安車几杖輿馬繒綵衣服布帛事從豐厚百寮餞之猶昔羣公之祖二疏也閭進陟北邙山望闕表以示戀慕之誠楊椿莊帝時為太保侍中每辭遜不許上書頻請歸老詔曰椿國之老成方所尊尚遽以高年願言致仕顧懷舊德是以未從但告謁頻頓辭理彌固以兹難奪又所重違今便允其雅志可服侍中朝服賜服一具衣一襲八尺床帷几杖不朝乘安車駕駟馬扶傳詔二人仰所在郡縣時以禮存問安否方乖詢訪良用撫然椿奉詔於華林園帝下御座執椿手流涕曰公先帝舊臣實為元老今四方未寧理須諮訪但高尚其志决意不留既難相違深用悽愴椿亦歔欷欲拜莊帝親執不聽於是賜以絹布給羽林衛送羣公百寮餞於城西張方橋行路觀者莫不稱歎邢邵出帝時為散騎常侍以衛將軍國子祭酒還鄉詔所在特給兵力五人并令嵗一入朝以備顧問東魏常景為秘書監儀同三司孝靜武定時以老疾去官詔曰几杖為禮安車致養敬齒尊賢其來尚矣景藝業該通文史淵洽年彌五紀歴事三京祿俸無餘家徒壁立宜從哀恤以旌元老可特給右光祿事力終其身後周寇雋初仕西魏為車騎大將軍儀同三司加散騎常侍大綂末以年老乞骸骨文帝弗許遂疾篤不復朝覲孟信為太子少師後遷太子太傅儒者榮之特加車騎大將軍儀同三司散騎常侍辭老請退文帝不奪其志賜車馬几杖衣服床帳卒於家贈冀州刺史謚曰戴庫狄峙文帝時自宜州刺史入為太子少師以年老乞骸骨詔許之樊深為縣伯中大夫加開府儀同三司武帝建德初乞骸骨詔許之朝廷有疑議常召問焉蔣昇字鳳起好天文𤣥象之學保定中為太中大夫以年老請致仕詔許之加定州刺史卒於家張羡為司城中大夫為當時所重後以年老致仕於家樂遜為遂伯中大夫天和中遜以年在懸車上表致仕優詔不許於是賜以粟帛及錢等授湖州刺史後除汾隂郡守遜以老病固辭詔許之乃改授東揚州刺史仍賜安車衣服及奴婢等又於本郡賜田十頃儒者以為榮隋李穆高祖開皇中為太師乃上表乞骸骨詔曰朕方臨㝢内方籍嘉猷養老乞言實懷虚想七十致仕本為常人至若呂尚以期頥佐周張蒼以華皓相漢高才命世不拘常禮遲得此心留情規訓公年既耆舊筋力難煩今勒所司敬蠲朝集如有大事須共謀議别遣侍臣就第詢訪周揺為幽州􅄣管六載徙為壽州初自以年老乞骸骨高祖召之既引見勞之曰公積行累仁歴仕三代克終富貴保兹遐壽良足善也賜坐褥歸於第嵗餘終于家杜臺卿為著作郎嵗餘以年老致仕詔許之特優其禮終身給祿趙芬為蒲州刺史上表乞骸骨徴還京師賜以二馬軺車几杖被褥歸于家皇太子又致巾帔賀若誼為靈州刺史數嵗上表乞骸骨詔許之公孫景茂河間府阜城人開皇末為道州刺史以年老致仕崔仲方煬帝大業中為信都太守上表乞骸骨優詔許之敬肅為潁川郡丞大業末乞骸骨優詔許之唐李綱高祖武德中為太子少保後數載復乞骸骨優詔許之楊恭仁為雒州都督太宗貞觀七年正月戊申詔曰尊賢尚德義存致治高秩厚禮允屬勲庸左光祿大夫行揚州大都督長史觀國公恭仁識宇凝正風度夷簡器惟瑚璉望重縉紳歴官有聲嵗寒若一而志在虚靜固求閑任辭理懇至確乎難奪宜成其美加兹寵命可特進時恭仁以疾乞骸骨故有此授虞世南自太宗即位為著作郎兼𢎞文館學士時世南年已衰老抗表乞骸骨不許後為秘書監貞觀十二年表請致仕優制許之仍授銀青光祿大夫𢎞文館學士祿賜防閤並同京官職事李靖為右僕射以足疾上表乞骸骨言甚懇至太宗遣中書侍郎岑文本謂曰朕觀自古已來身居富貴能知止足者甚少不問愚智不能自知才雖不堪强欲居職縱有疾病猶自勉强公能識逹大體深足可嘉朕今非直成公雅志亦欲以公為一代楷模乃下優詔加授特進聽在第攝養賜物千叚尚乘馬兩匹祿賜國官府佐並依舊給患若小瘳每三兩日至門下中書平章政事尋賜靖靈壽杖助足疾也李客師為右武衛將軍以年老致仕退居昆明之别業栢季纂為司農卿以年老屢乞骸骨不許久之拜虞州刺史又表自陳羸老因聽以本祿歸于家竇盧寛為左衞大將軍陳縣公以年老致仕改封苪國公劉宏基為衛尉卿以年老乞骸骨拜輔國大將軍朝朔望祿賜同於職事張俊裔為睦州刺史因入朝乞骸骨太宗召問曰朕與卿刺史資以自養何謂即求致仕張對曰年老筋力不逮望得還私第時見闕庭太宗曰卿氣力猶强欲何官也張陳謝不敢太宗曰朕昔從卿讀書卿今日從朕求官但言所欲不相違也時國子祭酒缺張奏言之因授國子祭酒俄遷散騎常侍又請致仕許之加金紫光祿大夫聽朝朔望尉遲敬德為鄜夏二州都督後抗表乞骸骨授開府儀同三司令朝朔望太宗征高麗為左一馬軍總管從破高麗於駐蹕山軍還依舊致仕敬德末年篤信神仙方飛錬金石服食雲母粉穿築池臺崇餙綺羅常奏清商樂以自奉養不與外人交通李百藥為宗正卿及懸車告老怡然自得穿池築山文酒讌賞以舒平生之志鮮于紹自降州刺史除同州刺史高宗特召見慰勉之紹辭曰臣今年八十五視聽昏耄豈可妄叨榮寵自貽罪譴乞許臣致仕高宗曰卿氣力尚强可且為我撿校紹固辭竟許之盧承慶為刑部尚書總章中以年老請致仕許之仍加金紫光祿大夫劉仁軌為右相請致仕許之仍加金紫光祿大夫聽朝朔望李勣為司空平定高麗迴以疾謝職加金紫光祿大夫聽致仕許敬宗咸亨中為太子少師請致仕許之加授特進仍令朔望朝叅如其氣力能來勿拘朔望之制李義琰永淳中為中書侍郎中書門下三品以足疾乞骸骨詔許之及將歸東都田里公卿已下祖餞於通化門外時人比漢之二疏韋思謙則天垂拱中為納言以年老致仕許之王及善垂拱中為春官尚書秦州都督府長史以老病請致仕加授光祿大夫朱敬則長安中為正諌大夫同鳳閣鸞臺平章事以老疾請致仕許之姚璹長安中為冬官尚書仍西京留守累表乞骸骨聽許致仕薛元超中宗嗣聖初為中書令以疾致仕加授金紫光祿大夫張仁愿睿宗景雲初為朔方總管以年老致仕特給全祿俸又拜兵部尚書加光祿大夫依舊致仕李日知𤣥宗先天中知以刑部尚書罷知政事頻乞骸骨請致仕許之元懷景為工部尚書開元中詔曰懷景朝廷舊德光隂遲暮宜聽致仕遂其頥攝盧懷愼為黄門監稱疾辭職詔曰留侯多病漢皇許其頥養呂􅂪未瘳呉主因而􅆭戚此則古之義也撿校吏部尚書黄門監盧懷愼大才宏識資忠履信學窮墳典言緯邦國朕之繫頼人所具瞻頃者忘身狥公積勞為病竭誠抗表固辭在職方欲省其謀慮專於導引且慿針艾之術副朕鹽梅之期聽以去官許其養疾蘇珦為太子賔客撿校詹事以年老致仕薛訥為朔方軍大總管沈勇寡言臨大敵而益壯以年老特聽致仕張廷珪以少府監為太子詹事康子元以前太子左庻子集賢殿侍講為秘書監並致仕敦舊恩也張説以前尚書左丞相致仕修國史兼集賢院學士俸料等並依右丞相給宋璟為尚書右丞相以年老累上表曰臣聞力不足者老則更衰心無主者疾而尤廢臣昔聞其語今驗諸身况且兼之何能為也臣自㧞跡幽介欽屬聖明才不逮人藝非經國復以久承驅䇿歴叅試用命偶時來榮因嵗積遂得再升台座三入冡司進階開府増封本郡所更中外已紊彛章洎居端揆左叨名職何者丞相官師之長任重昔時愚臣衰朽之餘用慙佗日位則逾盛人則浸微盡知其然何居而可頃所以僶俛為政蒼黄不言實懷覆載之德冀竭涓塵之效今積羸成憊沈痼莫瘳耳目更昏手足多廢顧將殞越寧遂宿心安可以茍狥大名仍尸重祿且留章綬不上闕庭議刑此乖禮法何設伏惟陛下審能以授為官而擇察臣之懇辭矜臣之不逮使得罷歸私第養疾衡門上弭官謗下知死所則歸全之望獲在愚臣養老之恩成於聖代日暮途遠天高聽卑瞻望軒墀伏増感戀謹奉表陳乞手詔許之仍令全給俸祿璟乃退歸東都私第屏絶人事以就醫藥趙昇卿為華州刺史以年老累表陳乞優詔許之除國子祭酒致仕盧從愿為太子賔客以老抗表乞骸骨乃拜吏部尚書致仕給全俸祿孟温為太子賔客以年齒衰暮表求辭秩詔許之除禮部尚書致仕全給俸祿蕭嵩為青州刺史請老以太子太師歸第常於林園植菓合藥修鍊優游閑養不交人事自贍十有餘年信安郡王禕天寳中為太子少師以年老聽致仕張守節為太子右諭德集賢院侍制肅宗上元初乞骸骨辭職還鄉以頴王傅致仕賜手詔曰卿父子相從大膺儒術既精且博其道可師出入禁庭勤勞侍讀嵗月滋久𢎞益頗多今以暮年俾令致仕仍加子職用資孝養兼賜紫金魚袋賜絹三百疋儒者為榮苖晉卿為侍中太保代宗廣德中罷知政事又詔以太保致仕邱為德宗建中年為太子右庻子以左散騎常侍致給俸祿之半為蘇州嘉興人年已八十餘而繼母尚無恙累表請致仕歸養辭日特賜金紫之服以寵之後為丁母䘮蘇州疑所給請於觀察使韓晃晃以為授官致仕本不理務特令給祿以惠養老臣也不在䘮為異命仍舊給之惟春秋二時羊酒之直則不給程式無文見充折𠂻穆寧建中年為秘書少監强毅不能事權貴多辭病居家德宗居奉天寧詣行在改右庻子車駕還京師寧曰可以行吾志矣因移病罷歸東都後就拜秘書監致仕李涵貞元中為左散騎常侍以尚書右僕射致仕涵高平王道立曽孫也簡素恭愼有名宗室孔述睿為右庻子史館修撰以疾上表請罷官德宗不許詔報之曰朕以卿德重朝端行敦風俗不言之教所頼攸深未依來請想宜悉也述睿再三上表懇讓遂改太子賔客賜紫金魚袋許其致仕馬炫為刑部侍郎以老病陳請除兵部尚書致仕蕭昕為太子少傳兼禮部尚書以工部尚書致仕韋建以前太子少詹事為秘書監致仕嗣郢王藻為左千中大將軍以太子賔客致仕郄高卿為左庻子集賢學士以年老乞身表三上除太子詹事致仕復辭東歸德宗召見屢加褒歎賜以金紫公卿大夫皆撰詩序出祖於都門縉紳以為美談薛萃為浙西觀察使以左散騎常侍致仕時有年過懸車而不知止者唯萃年至而無疾請告角巾東雒時甚高之關播為刑部尚書遷兵部播固辭疾請罷官改太子少師致仕韋倫為太子少保以年踰七十懇上表請罷官改太子少師致仕歸崇敬為散騎常侍翰林學士充皇太子侍讀累表辭以年老乞骸骨改兵部尚書致仕崔芊為左贊善大夫太子侍直累乞還山以太子左諭德致仕放還山張萬福為右金吾將軍以左散騎常侍致仕萬福典九郡皆有惠愛年九十祿食七十餘年未嘗一日病孔戣以尚書左丞累表請老詔以禮部尚書致仕優詔褒美仍令所司嵗致羊酒如漢禮徴士故事韓章憲宗元和中為工部尚書以太子少保致仕高郢為兵部尚書以尚書右僕射致仕初郢再表乞骸骨不許又上言曰臣聞勞生佚老天理自然蠕動翾飛日入皆息自非貢禹之守經據古趙喜之正身匪懈韓暨之志節高潔山濤之道德模表縱過常期詎為貪冐其有當仁不讓急病忘身豈止君命猶宜自舉故以魏待秦師唐睢請約車西説漢謀邉將充國對無踰老臣臣郢下才久辱高位由是得請杜佑為司徒平章事累致仕不許居數嵗乞骸骨表上乃以太保致仕制曰宣力濟時為臣之懿躅辭榮告老行已之高風况乎任重公台義深翼贊秉冲讓之志堅金石之誠敦諭既勤所執彌固則當遂其𠂻懇進以崇名尚請優賢斯王化之本也金紫光祿大夫守司徒同中書門下平章事兼崇文館大學士充太清宮使上柱國岐國公食邑三千户杜佑巖廊上材邦國茂器藴經通之識履温厚之姿寛裕本乎性情謀猷彰乎事業博聞强學知歴代沿革之宜為政惠人審羣黎利病之要由是再司邦用累歴藩方出總戎麾入和鼎實聿膺重寄歴事先朝左右朕躬夙夜匪懈命以詔册登之上公肅恭在庭華髪承弁兹可謂國之元老人之具瞻者也朕纘承丕業思𢎞景化選勞求舊期致時雍方申引翼之儀遽抗懸車之請而又固辭年疾乞就休閑已而復來星琯屢變有不可抑良用耿然永惟古先哲王君臣之際臣有耆艾以求其退君有優賜以狥其情乃輟鄧禹敷教之功仍増王祥輔導之秩俾養浩然之氣安於敬止之鄉庻乎頥神保和永綏福履仍加階級以厚寵章其惟敬哉兹謂全致可光祿大夫太保致仕宜朝朔望是日帝遣中使就佑宅宣賜絹五百疋錢五百貫范希朝為河東節度等使太原尹北都留守率師討鎭州無功既耄且病事不治除左龍武軍綂軍以太子太保致仕閻濟美為秘書監穆宗長慶中以年逾懸車上表陳乞授工部尚書致仕後以恩例進太子少傅致仕如前李夷簡為淮南節度使疾告老朝廷以未及懸車不之許夷簡堅請凡四表乃以右僕射兼太子少師仍許分司東都蓋遂其志也楊於陵為撿校右僕射兼太子太傅文宗太和初以尚書左僕射致仕俸料仍全給於陵上表讓全給俸料許之蕭俛為撿校尚書左僕射兼太子少師分司東都太和五年表請致仕詔曰俛代炳台曜躬茂天爵文可以經緯邦俗行可以感通神祗夷澹粹和精深敏直以忠讜侍從於憲祖以器能弼諧於穆宗臯陶陳九德之謨楊震有四知之愼進退由道周旋令名近以師傅之重疇于舊德俾從優禮冀保頥貞而抗疏辭疾勇退知止常亦敦諭確乎難奪遂兹牢讓厚我時風俾進秩於端寮仍加榮於貴綬疊示光寵式彰名臣於戲昔干木偃息猶藩魏君子房嗇神亦扶漢嗣無使二哲專美於前始終懿圖敬服休命可銀青光祿大夫守尚書左僕射致仕八年十一月庚戌以尚書左僕射致仕蕭俛為太子太傅俛自相位求罷優游雲泉帝以師傅官重因以命之十二月甲申詔曰不待年而來謝於理身之道則至矣其如朝廷之望何銀青光祿大夫新授太子太傅上柱國襲徐國公蕭俛朕以肇建元良精求師傅遐想漢朝故事韋元成石慶並當時名德咸為此官兼以元子㓜冲愼於教誡欲以累汝發明古今冀忠孝之道日聞於耳特輟左右至於林廬聞爾高蹈翛然屏絶進趣遠遣令弟還吾詔書天爵自優㝠鴻方逺不轉之意堅然若山循省來章致煩為愧終以望之之秩遂其疎廣之心勵俗激貪所補多矣目益於政寄聲以聞亦有望於舊臣也可太子太傅致仕裴向為大理卿宰相遵慶之子本以名相子以學行自􅅚謹守其門風歴官多有愛利及人太和中以年過致仕朝廷優異乃以吏部尚書致仕於新昌里第薛平為河中節度撿校司徒在河中凢六年召拜太子太保明年上疏乞老以司徒致仕錢徽為華州刺史周嵗告老遂以吏部尚書致仕李逢吉撿校司徒兼尚書左僕射以守司徒致仕盧紹為工部尚書兼太子少保以年耆乞骸授太子太保致仕兄渥亦以重德告老家于華隂紹與渥遨遊林泉陶樂度嵗子弟皆顯逹辭祿歸養時人榮之鄭居中以中書舍人致仕居中少有時名敭歴清貞晩年尤薄名利以疾辭官恣逰名山一日搦管為詩纔書五字曰雲山逰已徧紙猶在手筆忽墮地而終梁葛從周以前泰寧軍節度使除撿校司徒兼左金吾上將軍致仕從周病風不任朝謁故也韋震唐末為河南尹兼六軍諸衛副使以病瘖守太子太保致仕太祖受禪改太子太傅裴廸唐末太常卿受禪之嵗拜尚書右僕射後一年上章告老為司空致仕張䇿開平中為中書侍郎同平章事中風於私第太祖命使宣問翌日除刑部尚書致仕後唐薛廷珪仕梁為禮部尚書同光初莊宗平定河南以年老除太子少師致仕賈馥為鴻臚少卿年纔七十上表請致仕許之乃以鴻臚卿致仕賜紫金魚袋遂歸鎭州結茅齋於别墅自課兒孫耕牧為事李德休為吏部侍郎權知左丞未幾乃上章乞致仕從之以禮部尚書致仕孔邈為諫議大夫以年老致仕張貽範為蜀中書令右金吾衛使明宗天成初除兵部尚書致仕趙仁貞天成初以右驍衛將軍除大將軍致仕鄭珏為相以老病耳疾不任中書事四上章請老明宗惜之久而方允乃授開府儀同三司行尚書左僕射致仕仍賜鄭州莊一區天成四年二月明宗自汴還京珏莊在圃田賜錢二十萬馬溉以前代州刺史除左衛上將軍致仕苖暐以前將作監内作使守光祿卿致仕戴思遠以前洋州節度使除守太子少保致仕孔勍以前河陽節度使兼侍中請老除太子太師致仕任圜為太子少保表請致仕勑宜以本官致仕兼許尋醫范約為右監門衛將軍除左驍衛大將軍致仕裴思禮以前蓬州刺史除右千牛衛大將軍致仕趙光逢以司徒除太保致仕仍封齊國公符習以太子太師致仕習家素貧求歸田里許之乃歸招慶縣時其子令謙為趙州刺史習飛鷹痛飲私逰田里不集朋徒不過郡邑如此累年安重覇長興中虢州刺史除監門衛上將軍致仕蕭蘧長興中太子賔客除户部尚書致仕李斌以前代州刺史除左驍衛將軍致仕李光憲以太子賔客除禮部尚書致仕賈知瑜以前遼州刺史除驍衛大將軍致仕梁使頵以前鄧州節度使除太子少師致仕目病也晉王建立後唐長興中以澤潞節度使除太傅致仕祕宏遇眞定中山人瓊之父也善射歴本軍偏校後唐莊宗兼有其地命為爪牙從戰河上有功累官至慶州刺史後年老求退終於家尹玉羽後唐清泰中為光祿少卿退歸秦中朝宰臣張延朗手書而召高卧不從謂人曰庻孽代宗不可仕也及高祖入雒即受詔而來以所著自然經五卷貢之且告其老即日璽書褒美頌其器幣授少府監致仕月給俸錢三萬及冬春二時服陳元為太府卿高祖天福中以耄期上表求退以光祿卿致仕卒於晉陽朱漢賔初仕後唐明宗長興二年七月以前建雄軍節度使除太子少保致仕漢賔與安重誨連婚姻由是連領節鎭及重誨伏誅乃請致仕非其志也高祖即位為二潞州平陽節度使舊有風痺乃上表求退朝廷允之以太子少保致仕漢賔還雒陽有第在懷仁里北限雒水南枕通衢層屋連甍修木交幹笙歌羅綺日以自娯養彼天和保其餘齒乃近朝知止之良將也張行求天福中以前沂州刺史除右監門衛上將軍致仕裴皥為工部尚書以耄年乞骸加右僕射致仕西歸京洛逍遥自娯梁文矩天福二年七月以太子少保表求致政勑曰昔魏舒人之領䄂以二揆而解官劉寔邦之宗模自三公而遜位所以審去就之常分保始終之令圖成功退身盡善盡美太子少保梁文矩為仁由已以道事君烈士狥名久輸忠於象闕逹人知足堅請老於莵裘東路角巾南窓羽扇爾思高致朕實喜之進登保傅之班永顯君臣之義可太子太保致仕漢盧撰高祖乾祐中為右散騎常侍撰患風痺難於拜起每致拜一坐再至班列中有多口而笑之者謂諸御史曰此而不彈㑹當於稠人廣衆之中辱之主上若問即以不供職為奏撰聞懼而上章乃除户部侍郎致仕周顔衍晉開運中自御史中丞求假侍養以户部侍郎得請歸於汶上太祖廣順初徴拜兵部侍郎俄入為端明殿學士自王俊貶官之後授吏部侍郎解職至是累表乞骸帝勉而從之尋退老於東平簮綬送之祖帳相望時論美之安審暉太祖廣順中為邢州節度使居無何目疾暴作上章請代歸於京師養疾累年拜太子太師封魯國公致仕白文珂廣順末以前西京留守兼中書令除太子太師致仕進封韓國公漢開創文珂時為河東節度副使累歴藩鎭從太祖討蒲潼至是三上章告老故以國公宮師寵之宋彦筠漢乾祐二年自邠寧節度使上章乞致仕為僧不允至世宗顯德元年八月以太子少師鄖國公改太子太師致仕以其仕退而從其志也世宗曰白文珂宋彦筠皆耆年舊勲拜章請老非唯知其止足抑亦勵其貪競朕每佇想亦甚多之今宜各賜茶藥錢帛仍遣使就加撫問宰相范質對曰貴老念勲古存盛典竊惟近世廢之久矣陛下復能行之實為國家美事陳暉顯德三年十二月以前原州刺史為左衛大將軍致仕以暉武士引年休退故優其環拱之秩以寵之司徒詡顯德末以太卿致仕帝以雅樂淪廢議欲恢復正聲詡年老多病不能蒞事故有是命册府元龜卷八百九十九
