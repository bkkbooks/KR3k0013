body:
  text: 册府元龜卷一百七十五宋王欽若等撰帝王部悔過罪已悔過易曰不逺復無祇悔傳曰過而能改善莫大焉葢君人者居兆民之上總萬樞之劇雖復達聰明目逖覽虚受無適無莫不將不迎其或姦佞之言類夫忠信誣構之状成乎疑似事決機而欲速刑失中而致濫而乃洗然革慮霈然出令深悟不追之悔亟救已然之非剪滅㓙醜追痛賢彦發於明詔垂之話言史傳所記咸得而叙矣商太甲既立不明不明居䘮之禮伊尹放諸桐湯葬地不知朝政故曰放三祀十有二月朔湯以元祀十一日終至此二十六月服闕伊尹以冕服奉嗣王歸亳冕冠也踰月即吉服王拜手稽首曰予小子不明于德自底不類君而稽首於臣謝前過類善也闇於徳故自致不善欲敗度縱敗禮以速戾于厥躬速召也言已故縱情欲毁敗禮義法度以召罪于其身天作孽猶可違自作孽不可逭孽災逭逃也言天災可避自作災不可逃既往背師保之訓弗克於厥初尚頼匡救之德圖維厥終言已往之前既不能修德於其初今庶幾頼敎訓之德謀終於善悔過之辭漢景帝既誅鼂錯謁者僕射鄧公為校尉擊吳楚還上書言軍事見帝帝問曰道軍所來道路從吳軍所來也又曰道軍所來即是從軍所來耳無煩更說道路也聞鼂錯死吳楚罷不鄧公曰吳為反數十嵗矣發怒削地以誅錯為名其意不在錯也且臣恐天下之士拑口不敢復言矣帝曰何哉鄧公曰夫鼂錯患諸侯强大不可制故請削之以尊京師萬世之利也計畫始行卒受大戮卒竟也内杜忠臣之口外為諸侯報仇杜塞也臣竊為陛下不取也於是帝喟然長息曰公言善吾亦恨之迺拜鄧公為城陽中尉武帝時李陵為騎都尉擊匈奴詔强弩都尉路博德將兵半道迎陵軍博德羞為陵後距奏言方秋未可與戰帝怒疑陵悔不欲出而敎博德上書乃詔博德引兵走西河遮鈎營之道胡來要害道令博徳迎之詔陵九月發出遮虜障後陵既敗帝悔陵無救曰陵當發出塞詔强弩都尉令迎軍坐預詔之得令老將生姦詐坐預詔强弩都尉路博徳迎陵博德老將生姦詐至令陵見沒也迺遣使勞賜陵餘軍得脫者戾太子以巫蠱事自經死久之巫蠱事多不信武帝知太子惶恐無他意而田千秋復訟太子寃帝遂擢千秋為丞相而族滅江充家焚蘇文於横橋上横橋即横門渭橋也及泉鳩里加兵刃於太子者初為此地太守後族之帝憐太子無辜乃作思子宫及歸來望思之臺於湖言已望而思之庶太子之魂歸來也其臺在今湖城縣之西閿鄉之東基址猶存天下聞而悲之元帝時前將軍蕭望之被石顯所譖飲鴆而死帝聞之驚拊手曰曩固疑其不就牢獄果然殺吾賢傅是時大官方上晝食帝乃輟食為之涕泣哀慟左右慟動也於是召顯等責問以議不詳詳審也皆免冠謝良久然後已望之有罪死有司請絶其爵邑有詔加恩長子伋嗣為關内侯天子追念望之不忘每嵗時遣使者祠祭望之冡成帝永始元年七月詔曰朕執德不固謀不盡下言不博謀於羣下過聽將作大匠萬年過誤也萬年言解萬年也言昌陵三年可成作治五年中陵司馬殿門内尚未加功天子之藏壙中無司馬殿門也此謂陵上寢殿及司馬門時皆未作之故曰尚未加功中陵陵中正寢也天下虛耗耗損也百姓罷勞客土疏惡取他處土以増髙為客土也終不可成朕惟其難怛然傷心惟思也夫過而不改是謂過矣其罷昌陵勿徙吏民令天下無有揺動之心哀帝建平二年六月寢疾待詔夏賀良等言赤精子之䜟漢家厯運中衰當再受命宜改元易號詔以建平二年為太初二年號曰陳聖劉太平皇帝漏刻以百二十為度月餘帝疾自若賀良等復欲妄變政事大臣爭以為不可許賀良等奏言大臣皆不知天命宜退丞相御史以觧光李尋輔政帝以其言不騐遂下賀良等吏下詔曰朕獲保宗廟為政不徳變易屢仍恐懼戰栗未知所繇待詔賀良等建言改元易號増益漏刻可以永安國家朕信道不篤過聽其言過誤也幾為百姓獲福卒無嘉應久旱為災以問賀良等對當復改制度皆背經誼違聖制不合時宜夫過而不改是謂過矣六月甲子詔書非赦令也皆蠲除之准赦令不改餘皆除之賀良等反道惑衆姦態當窮竟皆下獄光禄勲平當光祿大夫毛莫如與御史中丞廷尉雜治當賀良等執左道亂朝政當為處正其罪名傾覆國家誣㒺主上不道賀良等皆伏誅李尋及觧光減死一等徙敦煌郡後漢光武時郭憲字子横為光祿勲建武八年車駕西征隗囂憲諌曰天下初定車駕未可以動憲乃當車㧞佩刀以斷車靷帝不從遂上隴其後潁川兵起乃回駕而還帝歎曰恨不用子横之言龎萌時為侍中萌為人遜順甚見信愛帝甞稱曰可以託六尺之孤寄百里之命者龎萌是也拜為平狄将軍與葢延共擊董憲時詔獨下延而不及萌萌以延譖已自疑遂反帝聞之大怒乃自將討萌謂諸将曰吾嘗以龎萌為社稷之臣將軍得無笑其言乎明帝時有人單辭告朱浮事者帝大怒賜浮死長水校尉樊儵言於帝曰唐堯大聖兆人獲所尚優逰四凶之獄厭服海内之心使天下咸知然後殛罰浮事雖昭明而未達人聽宜下廷尉章著其事帝亦悔之大司農韓歆以直言被責自殺歆數有重名死非其罪衆多不厭帝乃追賜錢糓以成禮葬之成禮盛禮也言不以非命而降其塟禮安帝時太尉楊震被譖自殺時連有災異帝感震之枉乃下詔䇿曰故太尉震正直是與俾佐時政而青蠅玷素同兹在藩上天降威災𤯝屢作爾卜爾筮惟震之故朕之不德用彰厥咎山摧棟折我其危哉今使太守丞以中牢具祠魂而有靈儻其歆享桓帝時張角為左道妖惑小民御史劉陶與樂松袁貢連名上疏宜下明詔重募角等賞以國土帝殊不悟明年張角反亂海内鼎沸帝思陶言封中陵鄉侯魏太祖為公時北征三郡烏丸大破之引兵自柳城還時寒且旱二百里無復水軍又乏食殺馬數千匹以為糧鑿地入三十餘丈乃得水既還科問前諌者衆莫知其故人人皆懼公皆厚賞之曰孤前行乗危以儌倖雖得之天所佐也顧不可以為常諸君之諫萬安之計是以相賞後勿難言之太祖既殺華佗後愛子倉舒病困太祖歎曰吾悔殺華佗令此兒彊死也又太祖嘗置較事時盧洪趙達等使察羣下法曹掾髙柔諫曰設官分職各有所司今置較事既非居下之㫖又達等數以憎愛擅作威福宜簡治之太祖曰卿知達恐不如吾也要能刺舉以辨衆事使賢人君子為之則不能也昔叔孫通用羣盜良有以也達等後姦利發太祖殺之以謝於柔晉景帝為魏相嘉平中雍州刺史陳泰求敕并州并力討胡帝從之未集而鴈門新興二郡以為將逺役遂驚反帝謝朝士曰此我過也非𤣥伯之責𤣥伯泰字於是魏人愧恱人思其報元帝時為平東將軍以賀循嘗為吳國内史與循言及吳事時因問曰孫皓常燒鋸截一賀頭是誰邪循未及言帝悟曰是賀邵也循流涕曰先父遭遇無道循創巨痛深無以上達帝甚愧之三日不出後魏道武時崔逞初以慕容燕尚書亡歸帝以為御史中丞詔與常山王遵為書失㫖遂賜逞死後荆州刺史司馬休之等數十人為桓𤣥所逐皆将來奔至陳留南分為二軰一奔長安二歸廣固帝初聞休之等來降大悦後怪其不至詔兖州尋訪獲其從者問其故皆曰國家威聲逺被是以休之等咸欲歸闕及聞崔逞被殺故奔二處帝深悔之自是士人有過者多見優容大武時李順以使沮渠蒙遜崔浩言其受金又言姑臧事不寔帝怒遂殺之順死後數年其從弟孝伯為大武知重居中用事及浩之誅大武怒甚謂孝伯曰卿從兄往雖誤國朕亦未能便至此繇浩譖毁朕忿遂盛殺卿從兄者浩也崔浩為司徒既被誅後帝北伐時宣城公李孝伯疾篤傳者以為卒帝聞而悼之謂左右曰李宣城可惜又曰朕自失言崔司徒可惜李宣城可哀孝文時李韶為太子右詹事尋出為安東將軍兖州刺史太子恂廢為庶人帝自鄴還洛韶朝於路言及恂事帝曰卿若不出東宫或未至此後周大祖既平郢都衣冠士人多沒為賊太史庾季才散所賜物購求親故帝問何能若此季才曰僕聞魏克襄陽先招異度晉平建業嘉得士衡臣欽若等曰異度蒯越字士衡陸機字也代國求賢古之道也今郢都覆敗君信有罪縉紳何咎皆為賤𨽻鄙人羈旅不敢獻言誠竊哀之故購耳太祖乃悟曰吾之過也微君遂失天下之望因出令免梁俘為奴婢者數千人宣帝昏暴滋甚京兆丞樂運陳八事切諫帝大怒将戮之内史元巖等救而獲免翌日帝頗感悟召運謂之曰朕昨夜思卿所奏寔是忠臣先皇聖明卿數有規諫朕既昏暗卿復能如此乃賜御食以罷之朝之公卿初見帝盛怒莫不為運寒心後見獲宥皆相賀以為幸免虎口隋煬帝東征耿詢上書曰遼東不可伐師必無成功帝大怒命左右斬之何稠苦諫得免及平壤之敗帝以詢言為中以詢守太史丞唐太宗貞觀中太常少卿祖孝孫以敎宫人聲樂不稱㫖為帝所讓王珪及温彦博諫曰孝孫妙觧音律非不用心但恐陛下顧問不得其人以惑陛下視聽且孝孫雅士陛下忽為敎女樂而怪之臣恐天下怪愕太宗怒曰卿皆我之腹心當進忠獻直何乃附下㒺上反為孝孫言也彦博拜謝珪獨不拜曰臣本事前宫罪已當死陛下矜恕性命不以不肖置之樞近賞以忠直今臣所言豈是為私不意陛下忽以疑事誚臣是陛下負臣臣不負陛下帝黙然而罷翌日帝謂房𤣥齡曰自古帝王能納諫者固難矣昔周武王尚不用伯夷叔齊宣王賢主杜伯猶以無罪見殺夙夜庶幾前聖恨不能仰及古人昨責彦博王珪朕甚悔之公等勿以此而不進直言也盧祖尚為瀛洲刺史咸稱政理時朝政前後牧作交州者多使勲戚憑恃阻逺率為愆過知其幹畧於是徵令入朝引之内殿恩禮殊厚太宗謂之曰交州重鎮自非宗枝莫處其任然朕子弟不才恐不稱職今以委卿無辭逺也一二年便當召卿祖尚拜謝而出既而悔之自言性不飲酒以瘴癘為託太宗令杜如晦申諭之祖尚固辭不肯奉詔又遣其妻兄周範殷勤曉之曰常人之交猶篤言信卿許天子安可退而致辭又不納於是引見太宗親問其故祖尚對益堅太宗怒曰我使人不得何以為政法令不可以不行驕臣不可以不罰因命左右曳出斬之于朝堂尋亦大悔命所司復其官䕃張藴古為大理正貞觀中河内人李好德風疾瞀亂有妖妄之言詔按其事藴古奏好德癲病有徵法不當坐侍書御史權萬紀劾藴古貫屬相州好德之兄厚德為其刺史情在阿縱奏事不實太宗曰吾嘗禁盖琮於獄而藴古與琮奕碁今復阿縱好德是亂吾法也遂斬東市既而悔之因下制令死刑雖令即決仍當三覆奏文宗以荘恪太子宴逰敗度不可敎導欲加廢黜迫於公卿之議乃止太子終不悛改至開成三年暴薨時傳云太子德妃之出也晩年寵衰賢妃楊氏恩渥方深懼太子他日不利於已故日加誣譖太子終不自辨明也太子既薨帝意追悔四年因㑹寧殿宴小兒尋竿有一夫在下憂其墮地有若狂者帝問之乃其父也因感泣謂左右曰朕富有天下不能全一子遂召樂官劉楚才女樂張十千即所昵宫人也等責之曰䧟引太子皆爾軰也今已有太子更欲踵前也立命擒去案詰前事誅之後漢荘宗初為晉王既誅從事司空頲尋以悔之明年駐軍於河上軍校郭夜乂者有罪將伏誅行欽已下惜其驍勇列拜以救之帝厲聲曰殺司空頲時爾等何不救也其追惜之意如此明宗天成三年正月丁巳内出御札曰朕聞堯舜有恤刑之典貴務好生禹湯申罪已之言庶明知過今月七日據廵簡軍使渾公兒口奏稱有百姓二人以竹竿習戰鬪之事昨朕初聞奏報實所不容率爾傳宣令付石敬塘處置今旦安重誨敷奏方知悉是幼童為戲載聆讜議方覺失刑循揣再三愧惕非一亦以渾公児狂誣頗甚石敬塘詳覆稍乖致人當枉法而殂處朕於有過之地今減常膳十日以謝幽寃其石敬塘是朕懿親合施規諫既兹錯誤宜示省循可罰一月俸渾公児決脊杖二十仍削其在身職銜配流登州嘗知所在其小児骨肉各賜絹五十疋粟麥各百石便令如法埋葬兼此後在朝及諸道州府凡有極刑並湏仔細裁遣不得因循付中書門下百僚進表稱賀末帝清泰三年千春節魏國長公主自河東入覲既上壽辭歸帝酒酣謂曰何不且留闕下促去欲與石郎反邪時以晉髙祖去年為總管廵忻州軍亂欲推崇髙祖為天子髙祖斬其魁首奏之故有是詔以戲之及醒左右具告深悔焉罪已書曰萬方有罪在予一人詩曰謂天盖髙不敢不局斯戒懼之謂矣盖夫居司牧之重為神祇之主克相上帝以綏四方其或民之多辟自投於罪罟天或降災以至於謫見事有過舉之失嵗罹荐饑之患德敎之靡究風化之或愆乃復歸過於躬引咎自責周旋抑畏不遑寧處以至貶損奉飬之具咨求忠讜之議發於感涕以致其誠心形於詔令以申乎誕告天地之眚勿移於股肱民庶之戾不加乎刑辟用能精忠内激善氣交應羣倫奪而思效星象滅而韜芒盛德孔昭大勲舉集傳所謂禹湯罪已其興也勃焉兹不誣也夏禹見罪人下車泣而問之左右曰夫罪人不順效使然焉君王何為痛之至於斯禹曰堯舜之時民皆用堯舜之心為心今予為君而百姓各以其心為心是以痛之啟與有扈戰于甘而不勝有扈夏同姓諸侯也六卿請復之請復戰也夏后曰不可吾地不淺淺褊也吾民不寡寡少也戰而不勝是吾德薄而敎不善也於是乎處不重席食不貳味琴瑟不張張施也鐘鼓不脩脩設也子女不飾不文飾也親親長長親親長長敬長者也尊賢使能朞年而有扈服服從也商湯既黜夏命作湯誥曰罪當朕躬弗敢自赦惟簡在上帝之心其爾萬方有罪在予一人自責化不至予一人有罪無以爾萬方無用爾萬方言非所及漢文帝二年十一月癸卯日有食之詔曰朕聞之天生民為之置君以飬治之人主不德布政不均則天示之災以戒不治乃十一月晦日有食之適見于天災孰大焉朕獲保宗廟以微𦕈之身託於士民君公之上天下治亂在予一人惟二三執政猶吾股肱也朕下不能治育羣生以累三光之明其不德大矣令至其悉思朕之過失令謂此詔書及知見所不及匄以啟告朕匄音盖乞也武帝時衛太子為江充所譖敗久之髙寢郎田千秋上急變訟太子寃所告非常故云急變帝見而說之後拜丞相始視事見帝連年治太子獄諸罰尤多羣下恐懼思欲寛廣帝意慰安衆庶廼與御史中二千石共上壽頌德美勸帝施恩惠緩刑罰玩聽音樂飬志和神為天下自虞樂虞與娛同帝報曰朕之不德自左丞相與貳師陰謀逆亂巫蠱之禍流及士大夫謂與太子戰死者也朕日一食者累月廼何樂之聽痛士大夫常在心既事不咎言既往之事不可追咎雖然巫蠱始發詔丞相御史督二千石求捕督察視也廷尉治未聞九卿廷尉有所鞫也鞫問也曩者江充先治甘泉宫人轉至未央椒房椒房殿名皇后所居也以椒塗壁取其温而芳也以及敬聲之疇李禹之屬謀入匈奴有司無所發丞相親掘蘭䑓蠱驗所明知也至今餘巫頗脫不止巫往往尚為蠱也隂賊侵身逺近為蠱朕愧之甚何夀之有敬不舉君之觴謹謝丞相二千石各就舘謝告也舘官舍也書曰無偏無黨王道蕩蕩周書洪範之辭也毋有復言魏文帝黄初二年六月戊辰晦日有食之有司奏免太尉詔曰災異之作以譴元首而歸過股肱豈禹湯罪已之義乎其令百官各處其職後有天地之𤯝勿復劾三公後魏孝明孝昌二年六月詔曰自運屬艱棘歴載於兹烽驛交馳旌鼓不息祖宗盛業危若綴旒社稷洪基殆將淪墜朕威德不能遐被經畧無以及逺俾令蒼生罹此塗炭何以茍安黄屋無愧黔黎今便避居正殿蔬飱素服當親自招募収集忠勇其有直言正諫之士敢決狥義之夫二十五日悉集華林東門人别引見共論得失頒告内外咸使聞知隋髙祖嘗遇關中饑遣左右視百姓所食有得豆屑雜糠而奏之者帝流涕以示羣臣深自咎責為之撤膳不御酒肉者殆將一期唐髙祖武德二年二月武功人嚴甘羅行刧為吏所拘髙祖謂曰汝何為作賊甘羅言饑寒交切所以為盜髙祖曰吾為汝君使汝窮乏吾之罪也因命捨之太宗貞觀二年三月己巳謂侍臣曰水旱不調皆為人君失德朕之不修天當責朕百姓何罪而尚多窮困聞有鬻男女者朕甚愍焉於是遣御史大夫杜淹廵關内諸州出御府金寳贖之還其父母十七年廢太子承乾帝自制文詣太廟陳謝曰臣上蒙穹昊明命中頼宗社餘祉自惟不德濫承寳位既乏元首之能實乖敎子之道遂有承乾不軌君集無君元昌懷逆祐亦好亂臣暗昧既彰誡誘多闕負罪引慝慚懼増深謹造庭階躬申拜謝後隴右山摧大蛇屢見山東及江淮多大水帝以問秘書監虞世南對曰春秋時山摧晉侯召伯宗而問焉對曰國主山川故山摧川竭君為之不舉除服乗縵徹樂出次祝幣以禮焉梁山晉所主也晉侯從之故得無害漢文帝元年齊楚地二十九山同日推大水出令郡國無來貢獻施惠於天下逺近歡洽亦不為災後漢靈帝時青蛇見御座晉惠帝時大蛇長三百步見齊地經市入廟案蛇宜在草野而入市朝所以可為怪耳今蛇見山澤葢深山大澤必有龍蛇亦不足怪也又山東足雨雖則其常然陰滛過久恐有寃獄宜省繫囚庶幾或當天意且妖不勝德唯修德可以銷變帝以為然因遣使者賑恤饑餒申理獄訟多所原宥後有星孛于虚危歴于氐百餘日乃滅帝謂羣臣曰天見彗星是何妖也世南曰昔齊景公時有彗星見公問晏嬰對曰公穿池沼畏不深起䑓榭畏不髙行刑罰畏不重是以天見彗星為公誡耳景公懼而修德後十六日而星沒臣聞天時不如地利地利不如人和若德義不修雖獲麟鳳終是無補但政事無闕雖有災變何損於時然願陛下無以功髙古人而自矜伐勿以太平漸久而自驕怠慎終如始彗星雖見未足為憂帝斂容謂曰吾之撫國良無景公之過但吾纔弱冠舉義兵年二十四平天下未三十而居大位自謂三代以降撥亂之主莫臻於此重以薛舉之驍雄宋金剛之鷙猛竇建德跨河北王世充據雒陽當此之時足為勁敵皆為我所擒及逢家難復決意安社稷遂登九五降服北夷吾頗有自矜之意以輕天下之士此吾之罪也上天見變良為是乎秦始皇并六國隋煬帝冨四海既驕且逸朝夕而敗吾亦何得自驕也言念於此不覺惕然震懼德宗興元元年正月制曰致禮興化必在推誠忘已濟人不吝改過朕嗣服丕構君臨萬邦失守宗祧走在草莽不㤀率德誠莫追於既往永言思咎期有獲於將來明徵其義以示天下小子懼德不嗣㒺敢怠荒然以長於深宫之中暗於經國之務實習易溺居安忘危不知稼穡之艱難不恤征伐之勞苦澤靡下究情未上通事既擁隔人懐疑阻猶昧省已遂用興戎徵師四方轉餉千里賦車籍馬逺近騷然行齎居送衆庶勞止或一日屢交鋒刃或連年不觧甲胄祀奠之主室家靡依死生流離怨氣凝結力役不息田萊多蕪暴令峻於誅求疲甿空於杼柚轉死溝壑離去鄉閭邑里丘墟人烟斷絶天譴於上而朕不寤人怨於下而朕不知遂致亂階變興都邑賊臣乗釁肆逆㴞天曽莫知愧敢行凌偪萬品失序九廟震驚上累於祖宗下負於臣庶痛心􅌤貌罪寔在予永言愧悼若墜泉谷頼天地降祐人祇叶謀將相竭誠爪牙宣力羣盜斯屏皇維載張將𢎞永圗必布新令朕晨興夕惕惟念前非乃者公卿百僚用加虚美以聖神文武之號被蒙暗寡昧之躬固辭不獲俯遂羣議昨因内省良所矍然體隂陽不測之謂神與天地合德之謂聖豈伊淺劣所敢當仁文者所以化成武者所以定亂朕自臨御於今六載化之不被亂是用興豈可茍狥羣情猥當徽號重予不德益用懐慙自今以後中外所上書奏不得更言聖神文武之號餘具帝王赦宥門貞元二年十二月詔曰昔我皇祖光宅天下底綏四方修德以安邊恱近而來逺朕嗣守丕構始務息人頃以西蕃載申信約葢欲惠康庶士協静封陲而戎狄無厭大棄明義入我河曲害我生靈鹽夏兩州淪䧟蕃醜哀此蒸庶家業流離去父母之邦捐骨肉之愛繇朕薄德俾人罹殃興言疚懐若墜焚灼側身惕慮豈敢遑寜所宜省躬深自咎戒今視朝避正殿十五日百僚奏事悉於延英處分庶答天譴用惕深衷咨爾三事大夫洎于百辟所宜一乃心力共弼予違式佇嘉謀克清寇患宣示中外使悉朕懐晉髙祖天福四年十二月丁巳御便殿謂宰臣馮道曰日大雪害民五旬不止京城之下十八神祠六寺二觀悉令祈禱了無其騐得非朕之涼德不儲神休者乎道對曰陛下克已恭儉無荒無怠推恩四海必合天心但愛民慎刑始終如一雖景宿之變水旱之沴亦將警聖人而成其德也帝曰朕聽斷有悞卿當再三止之安静小心共相保守因令出薪炭米粟給軍士貧民等周世宗顯德二年正月甲戌謂侍臣曰去嵗齊州臨邑民來訴災沴尋命使臣遍與通簡所望供輸咸得均濟昨聞廣種植户民不欲通簡咸忿其訴災者至有潛爇其家産者朕自聞之極深軫憫侍臣對曰時季已來民多狡惡帝曰非民之狡盖朕治之未至亦猶親人之官未當耳此後尤宜精求令長免使黎民受弊册府元龜卷一百七十五
