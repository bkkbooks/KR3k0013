body:
  text: 册府元龜卷三百二十八宋王欽若等撰宰輔部諌諍第四唐桓彦範神龍初為侍郎嘗表論時政數條其大略曰昔孔子論詩以闗雎為始言后妃者人倫之本理亂之端也故皇英降而虞道興任姒歸而姬宗盛桀奔南巢禍階妹喜魯桓㓕國惑以齊媛伏見陛下毎臨朝聽政皇后必施帷幔坐於殿上豫聞政事臣愚歴選列辟詳求徃代帝王有與婦人謀及政者莫不破國亡身傾輈繼路且以隂乗陽違天也以婦凌夫違人也違天不祥違人不義繇是古人譬以牝鷄之晨惟家之索易曰無攸遂在中饋言婦人不得豫於國政也伏願陛下覧古人之言察古人之意上以社稷為重下以蒼生在念宜令皇后無徃正殿干豫外朝専在中宫聿修隂教則坤儀式固鼎命惟永又曰臣聞京師喧喧道路籍籍皆云胡僧慧範矯託佛教詭惑后妃故得出入禁闈撓亂時政陛下又輕騎㣲行數幸其室上下媟黷有虧尊嚴臣嘗聞興化致理必繇進善康國寜人莫大棄惡故孔子曰執左道以亂政者殺假鬼神以危人者殺今範之罪不殊於此也若不急誅必生變亂除惡務本去邪勿疑伏願天聰早加裁貶䟽奏不納時有墨勑授方術人鄭普思秘書監葉净能國子祭酒彦範苦言其不可帝曰既已用之無容便止彦範又對曰陛下自龍飛寳位遽下制云軍國政化並依貞觀故事昔貞觀中嘗以魏徴虞世南顔師古為秘書監孔頴逹為國子祭酒至如普思等是方伎庸流豈足以比蹤前烈臣恐物議謂陛下官不擇才濫以天秩加於私愛惟陛下少加慎擇帝竟不納蕭至忠神龍初為中書令節愍太子誅武三思後有三思黨與宗楚客紀處訥令侍御史冉祖雍奏言安國相王及鎮國太平公主亦與太子連謀舉兵請收付制獄中宗召至忠令按其事至忠泣而奏曰陛下富有四海貴為天子豈不能保一弟一妹受人羅織廟社存亡實在於此臣雖至愚竊為陛下不取漢書曰一尺布尚可縫一斗粟尚可舂兄弟二人不相容願陛下詳察此言且徃者則天皇后欲令相王為太子王累日不食請迎陛下固讓之誠天下𫝊說足明冉祖雍等所奏咸是搆虚中宗深納其言而止景龍中上䟽陳時政曰臣聞王者列職分司為人求理求理之道必在用賢得其人則公務克修非其才則厥官如曠官曠則事廢事廢則人殘漸至陵遲率繇於此頃者選曹授職政事官人或係才昇多非徳進皆因依貴要互為粉飾茍得是務曽無逺圖上下相䝉誰肯言及臣聞官爵者公器也恩倖者私恵也只可金帛富之粱肉食之以存私澤也若以公噐為私用則公議不得而勞人解體以小私而妨至公則私謁門開而正言路塞憸人逓進君子道消日消月脧卒見凋弊者為官非其人也昔漢館陶公主為子求官明帝謂曰郎官上應列宿出宰百里茍非其人必受其殃賜錢十萬而已此則至公之道不虧私恩之情無替良史直筆将為美談於今稱之不輟其口者也當今列位已廣冗員倍多祈求未厭日月增數陛下降不貲之澤近戚有無涯之請賣官利己鬻法狥私臺寺之内朱紫盈滿官秩益輕恩賞彌數纎利之軰冐進而莫識亷隅方雅之流知難而歛分丘隴則才者莫用用者不才二事相形十有其五故人不効力而官匪其人欲求其理實亦難遂臣竊見宰相及近侍要官子弟多居美爵此並勢要親戚罕有才藝遞相囑託虛踐官榮詩云東人之子職勞不賚西人之子粲粲衣服私人之子百寮是試或以其酒不以其漿鞙鞙佩􅀈不以其長此言王政不平衆官廢職私家之子列試於榮班不任其才徒長其飾佩臣愚伏願陛下想居安思危之義行改絃易張之道貴惜爵賞審量才識官無虚授人必為官進大雅於樞近退小人於閑僻政令惟一威恩以信私不害公情無撓法則天下幸甚臣伏見貞觀永徽故事宰相子弟多居外職者非直抑彊宗分大族亦以退不肖擇賢才伏願陛下逺稽舊典近尊先聖特降明勑令宰相以下及諸司長官子弟並改授外官庶望分職四方共寜百姓表裏相統遐邇乂安䟽奏不納張説先天二年為紫㣲令自則天末年冬為潑寒胡戯中宗嘗御樓以觀之至是因蕃夷入朝又作此戯說上䟽諌曰臣聞韓宣適魯見周禮而歎孔子㑹齊數倡優之罪列國如此况天朝乎今外蕃請和選使朝謁所望節以禮樂示以兵威雖曰戎夷不可輕易焉知無駒支之辨繇余之賢哉且潑寒胡戯未聞典故裸體跳足盛徳何觀揮水投泥失容斯甚法殊魯禮䙝類齊優恐非干羽柔逺之義樽爼折衝之道願擇芻言特罷此戯𤣥宗納之自是此戯乃絶宋璟開元初為侍中時開府儀同三司王仁皎卒及将築墳皎子駙馬都尉守一請同昭成皇后父竇孝諶故事其墳髙五丈一尺璟及蘇頲請一依禮式帝初從之翼日又命准孝諶舊例璟等上言曰夫儉徳之恭侈惡之大髙墳乃昔賢所誡厚𦵏實君子所非古者墓而不墳葢此道也凡人子於哀迷之際則不以禮制為思故周孔設齊斬緦免之差衣衾棺槨之度賢者俯就私懐不果且蒼梧之野驪山之徒善惡分區圖史所載衆人皆務奢靡而獨能革之斯所謂至徳要道也中宫若以為言則此理故可敦諭在外或云竇太尉墳甚髙取則不逺者縱令徃日無極言者其事偶行令出一時故非常式貞觀中文徳皇后嫁所生女長樂公主奏請儀注倍於長公主魏徴諌云皇帝之姑姊妹為長公主皇帝之女為公主既有長字合髙於公主若加於長公主事甚不可引漢明故事云羣臣欲封皇子為王帝曰朕子豈敢與先帝子等時太宗嘉納文徳皇后奏降中使致謝於徴此則乾坤輔佐之間綽有餘裕豈若韋庻人父追加王位擅作鄷陵禍不旋踵為天下笑則犯顔逆耳阿意順㫖不可同日而言也况今之所載豫作紀綱情既無窮故為之制度不因人以揺動不變法以愛憎所謂金科玉條葢以此也比來蕃夷等軰及城市間人逓以奢靡相髙不將禮儀為意今以后父之寵開府之榮金穴玉衣之資不憂少物髙墳大寢之役不畏無人百事皆出於官一朝亦可以就而臣等區區不已屢以上聞諒欲成朝廷之政崇國母之德化浹寰區聲光竹素倘中宫情不可奪陛下不能苦違即准令一品合陪陵塟者墳髙三丈以上四丈以下降勑將同陪陵之例即極是髙下得宜帝謂璟等曰朕毎事嘗欲正身以成綱紀至於妻子情豈有私然人所難言亦在於此卿等乃能再三堅執成朕美事足使萬代之後光揚我史策乃遣使齎綵練四百匹分賜之張鎬至徳中平章事時有供奉僧内置道塲晨夜念佛動數百人聲聞禁外鎬知之奏曰臣聞天子修福當在安養蒼生靖一風化未聞區區僧教以致太平伏願陛下以無為為心不以小乗撓聖慮也肅宗甚然之張鎰建中年為中書侍郎平章事時故尚父郭子儀子婿太僕卿趙縱家奴當千發縱隂事縱下御史當千下於内侍省於是鎰上䟽諌曰伏見趙縱為奴所告下獄人皆震懼未測聖情貞觀二年太宗謂侍臣曰比有奴告其主謀逆此極弊法特須禁斷假令有謀反者必不獨成自有他人論之豈藉其奴告也自今以後奴告其主者皆不須受便令斬决繇是賤不得干貴下不得陵上教化之本既正悖亂之漸不生為國之經百代難改欲全其體實在防㣲頃者長安令李濟得罪因奴萬年令霍晏得罪因婢愚賤之軰悖慢成風主反畏之動遭誣告充溢府縣莫能斷决建中元年五月二十八日詔准闘競律諸奴婢告主非謀叛已上者同首法並准律處分自此奴婢復順獄訴稍息今趙縱事非叛逆奴實奸兇奴在禁中縱獨下獄考之於法或恐未正將帥之功莫大於子儀人臣之位莫髙於尚父歿身未幾墳土僅乾兩壻前已當辜趙縱今又下獄設令縱實抵法所告非奴纔經數旬連罪三壻錄勲念舊猶或可容况在科程本宜宥免陛下方討羣賊大用武臣雖見寵於當時恐息望於他日太宗之令典尚在陛下之明詔始行一朝背違不與衆守於教化恐失於刑法恐煩所益悉無所傷至廣臣非私趙縱非惡此奴叨居股肱職在輔弼斯事大體敢不極言伏乞聖慈納臣愚懇於是帝以縱所告雖重左貶而已當千杖殺之鎰乃令召子儀家僮數百人以死奴示之姜公輔興元初為諌議大夫平章事從徳宗至梁州唐安公主卒帝憐而厚𦵏之公輔諌以為不久克復京師必將遷主喪以歸今方䝉塵於外兵士闕乏不如薄葬帝不納權徳輿元和初平章事時運糧使董溪于臯謩盗用官錢詔流嶺南行至湖外宻令中使皆殺之他日徳輿上䟽曰竊以董溪等當陛下憂山東用兵時領糧料供兵重務聖心委付不比尋常敢負恩私恣其􅂍犯使之萬死不足塞責𢎞寛大之典流竄太輕陛下合改正罪名兼責臣等踈畧但詔令已下四方聞知不書明刑有此處分竊觀衆情有所未諭伏以自陛下臨御以來每事以誠實與天地合徳與四時同符萬方之人沐浴皇澤至如于董所犯合正典章明下詔書與衆同棄即人各懼法人各謹身臣誠知其罪不容誅又是已過之事不合論辨上煩聖聽伏以陛下聖徳天縱度越前古頃所下一詔舉一事皆合理本皆順人心伏慮他時更有此比但要有司窮鞫審定罪名或致之極法或使自盡罰一勸百孰不甘心巍巍聖朝事體非細臣每於延英奏對退思陛下求理之言生逄聖明感涕自賀况以愚滯朴訥聖鑒所知伏唯恕臣迂踈察臣丹懇李吉甫元和中平章事京兆尹元義方奏故永昌公主准禮合起祠堂請其制度初貞元中義陽義章二公主墓所皆造祠堂一百二十間費錢數萬至是監䕶使啓其制憲宗時令義方减舊制之半吉甫奏曰伏以永昌公主稚年天枉舉代同悲况於聖情固所鍾念然陛下猶减制造之半示折中之規昭儉訓人實越今古竊以祠堂之設禮典無文盖徳宗皇帝恩出一時事因習俗當時人間不無竊議昔漢章帝時欲為光武原陵明帝顯節陵各起邑屋東平王蒼上䟽言其不可東平則光武之愛子明帝之愛弟賢王之心豈惜費於父兄哉誠以非禮之事人君所當慎也今者依義陽公主欲起祠堂恐不如量置墓戸以充奉守從之李絳元和中平章事憲宗謂宰臣曰朕讀聖祖𤣥宗實録見開元致理及天寳衰亂事出一主而興替頓殊何也絳對曰臣聞理生於危心亂生於肆志𤣥宗自天后朝出居藩邸常蒞官守接時賢於外知人事之艱難臨御之始得姚崇宋璟任之二臣者皆忠正上才動以致君堯舜為心𤣥宗亦乗思理之初勵精聴納故當時賢能在位左右前後皆尚直誠是以君臣交泰内外寜謐開元二十年以後泊於天寳李林甫楊國忠為相専引柔佞之人分居要劇茍媚於上不聞直言嗜欲轉熾國用不足奸臣説以興利武士説以開邉天下擾動奸盗乗隙遂至兩都覆敗天下沸騰乗輿播遷幾至難復葢小人啓導縱逸生驕致之也至今兵宿兩河西疆削盡甿户凋耗府藏空虚皆繇天寳喪亂以至於此安危理亂實係時主所行陛下思廣天聰親監國史垂意精賾鍳於化源實天下幸甚臣等不勝慶悦伏望毎以既徃得失用為元龜擇善去弊必臻至理帝深然之時教坊忽稱宻㫖取良家士女及衣冠别第妓人京師囂然絳謂同列曰此事大虧損聖徳須有論諌或曰此嗜欲間事自有諫官論列絳曰居常相公嘗病諫官論事此難事即推與諌官可乎遂極䟽論奏翼日延英帝舉手謂絳曰昨見卿狀所論採擇事非卿盡忠於朕何以及此朕都不知外間之事此是教坊罪過不喻朕意以至於此朕縁丹王以下四人院中都無侍者朕令於工樂中及閭里有情願者厚其錢帛只取四人四王各與一人伊不㑹朕意便如此生事朕今科罰其所取人並放歸若非卿言朕寜知過失崔羣元和末平章事憲宗嘗謂宰臣曰朕讀𤣥宗實錄見開元初鋭意求理至十五六年則似稍懈至開元末又似不及中年其故何也崔羣對曰𤣥宗生長人間身經屯難故即位之初知人疾苦躬恤庶政有姚崇宋璟盧懐慎輔以道徳蘇頣張嘉貞李元紘杜暹韓休張九齡皆孜孜守正以故稱理其後承平日乆安於逸樂漸逺正士而近小人宇文融以聚歛媚上心李林甫以姦邪惑上志而終之以楊國忠故及於亂今陛下以開元初為法以天寳末為戒是乃社稷無疆之福也時皇甫鏄以諂刻欺弊在相位故羣以是詞諷焉李程長慶末平章事敬宗即位帝既富有春秋畋獵之暇好治宫室甞命為别殿以資宴逰及庀徒蕆事功用至廣程諌曰自古聖帝明王率資儉徳以化天下况諒隂之内豈宜興作願陛下悉以見在瓦木及工役之費迴奉陵寢乃勑度支所進脩造屋宇木石一物以上宜付山陵収管仍令般送陵所便充造作程兼請置侍讀學士帝皆嘉納李逢吉寳歴中平章事敬宗自臨御以来常欲東幸宰相及諸大臣等無不切諌而帝意益堅嘗正色謂宰臣曰朕去意已定其從官宮人等悉令内備糗粮必不擾百姓逢吉等頓首言曰陛下貴為天子富有四海天下一家何徃不可况東都千里而近宫闕具存廵省逰幸固有常典但陛下法駕一動事須備儀千乗萬騎不可减省縱不令費用絶廣亦須使豐儉合宜豈得自備糗糧以失大體臣等所以為不可者祗以干戈未甚戢邊鄙未甚寜切恐人心揺動伏乞陛下上為宗廟下為庻人稍廻聖慮則天下幸甚非惟臣等幸甚上竟不聽乃命貟外郎盧貞檢計人情大擾雒中居第及物價頓貴數百倍執事相繼獻䟽亦並不省朝廷方憂恐之㑹裴度自興元入相因别對具奏云國家建立都邑葢備廵逰然自艱難以來此事遂絶東都宫闕及六軍營壘百司廨宇悉已荒廢陛下必欲行幸亦須緩緩修葺一年半嵗後方可議行上曰羣臣皆云不合去若如卿言即不去亦得何止後期旋又朱克融史憲誠各請以丁匠五千人助修東都宰臣因之復諌乃罷裴度寳歴中平章事以敬宗坐朝稍稀上䟽曰比者陛下每月約六七遍坐朝天下人心無不知陛下躬親庻政乃至河北賊臣逺聞亦皆慴懼今自兩月以來入閣及開延英稍稀或恐大叚公事須諮禀睿謀者有所壅滯陛下稍示憂勤乘凉數座廣加延問使得盡誠俄又以帝坐朝稍晩上䟽曰伏以頥飬聖躬在於順適時候若飲食有節寢興有常四體惟和萬夀可保謹按道書春夏早起取鷄鳴時秋冬晏起取日出時葢在陽則欲及隂凉在隂則欲及陽煖今陛下憂勤庶政親覧萬幾每御延英召臣等奏對方属盛夏宜在清晨如至已午之間則當炎赫之際雖日昃忘食不憚其勞仰瞻旒扆亦似煩熱臣等已曾陳論竊望聽納不勝懇迫之至鄭覃開成初平章事文宗因與宰臣論詩句工拙覃諌曰臣聞詩者孔子所刪三百篇是也厥後以五字為句起於降將之篇皆斐然狂簡未得聖裁不足為帝王耽翫夫小雅大雅或美或刺皆國人所作非帝王自為是以王者採詩考其風俗仲尼刪定以為世規近如陳後主隋煬帝皆工章句不知王業大端願陛下不取也李徳裕太和中平章事時文宗欲以李訓為諌官徳裕諌曰李訓小人不可在陛下左右頃年惡跡天下皆知無故用之必駭視聽文宗曰人誰無過俟其悛改朕以逢吉所託不忍負言徳裕曰聖人有改過之議訓天性姦邪無悛改之理帝乃顧王涯商量别與一官乃授四門助教後唐盧文紀清泰初平章事上䟽諌曰臣聞事君盡忠孔子激揚於直道無功受祿周書譏諷於曠官敢因灾沴之時輙貢傾輸之懇臣伏見比年以來朝廷多故人事則兵䘮禍亂天時則水旱虫霜若非陛下拯溺救焚移灾作福則生靈受弊宗社何依今則區宇甫安人神胥恱但以自夏愆陽及秋霖雨上勞聖慮過切閔傷葢屬當否數之辰尤費消禳之力雖斯民鮮福亦天道使然為君之難實見於此臣聞沉潜剛克髙明柔克是君宜執柔以御下臣當剛正以報君庶幾上下和平君臣訢合臣思徳宗初置學士本不以文翰是供葢獻納論思朝夕延問至於補過拾遺之職是曰諌官日請諌紙時政有失無不極言望陛下聼政之餘時召學士諌官詢謀政道俾獻讜言明書黜陟之科以責語言之効書云乂時𤾉若肅時雨若以洪範言之係於君徳臣請嚴禋於宗廟社稷精禱於岳瀆神祗進忠良退不肖除宼盗恤惸嫠慎刑章明舉選任賢勿貳去邪勿疑王道砥平無偏無黨中外除改請守舊規長興四年以前勑命繁碎者請重選擇如新勑不及舊章便請却依前代如舊章不如新勑便釐革施行倘不阻於奏陳庻漸臻於理體詔曰盧文紀早踐班行迭更顯重動惟稽古言必為時當朕求治之初首居輔弼之位能竭事君之節以申報國之勞引經義而究其本根合時事而先於條貫請宣學士兼召諌臣言隂陽序理之端人事調和之本又嚴脩祀典精事神祗宜令有司依奏䖍潔所云進忠良而退不肖除宼盗而恤惸嫠雖責在朕躬亦資於調燮刑法舒慘宜令大理寺御史臺明慎詳讞勿至寃誣選賢退愚宜令三銓選部精覈慎選所兾得人新舊制勑宜令御史臺與三司官貟詳擇以聞周馮道初仕後唐明宗時平章事長興初帝御中興殿道奏曰陛下宫中無事逰幸近郊則可矣若夫御馬涉歴山險萬一馬足蹉跌則貽陛下之憂臣聞千金之子坐不垂堂百金之子立不倚衡彼千金百金之㣲細尚猶惜其身保其産而况富有四海貴為天子自輕於彼千金百金之子哉願陛下居安慮危動存戒慎上歛容謝之退令小黄門至中書勑道錄奏所對垂堂語道因註其説以聞四年帝對宰臣曰諸州鎮數上言有螟蝗民力尚貧將来何以得濟道奏曰天灾流行古今嘗所不免自陛下臨御八年七年豐稔今嵗聖躬違豫嵗亦㣲灾乃知九州四海民之消長繫陛下一人之運也雖然嵗小饉不足煩聖慮所願玉體和平生靈慶賴乞陛下寢膳之間動留調衛道因指御前菓食曰如食桃不康翼日見李而思戒可也禮云飲食男女人之大欲存焉陛下幸思而戒之初帝因御幸暴得風虚之疾道不敢斥言因奏事諷悟帝意册府元龜卷三百二十八
