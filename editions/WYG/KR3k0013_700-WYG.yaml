body:
  text: 册府元龜卷七百宋王欽若等撰牧守部貪黷夫天子所與共治者惟良二千石爾嗟乎風敎陵遲亷恥凋䘮見得思義㡬何人哉狥利之夫厚顔斯甚荷析圭剖符之寵膺百城千里之寄而乃割剥氓庶讐斂貨財見金而不見人知得而不知䘮識多積之可樂闇厚亡之難悔貫盈惡稔顛沛隨之故君子辭富以求安知足以逺辱者豈狥名安節至性之所存抑失身殄祀古人之攸戒也繇漢以來居長人之任彰貪墨之迹者悉條著於篇云漢居益昌嗣湘城侯臣欽若等按南粤傳桂林監居翁注姓居名翁益昌即其子也而功臣表云監居翁誤也為九真太守坐盜使人出買犀奴婢贓百萬以上不道誅陳咸為南陽太守其治放嚴延年其亷不如所居調發屬縣所出食物以自奉養調徒均切奢侈玉食玉食羙食如玉也後漢歐陽歙自汝南太守徵為大司徒坐在汝南贓罪千餘萬發覺下獄羊元羣罷北海郡贓罪狼藉郡舍溷軒有竒巧乃載之以歸溷軒厠室侯參中常侍覽之兄為益州刺史民有豐富者輒誣以大逆皆誅滅之沒入財物前後累億計太尉楊秉奏檻車徵於道自殺京兆尹逺逢於旅舍閱㕘車三百餘兩皆金銀錦帛珍玩不可勝數韋毅為陳留太守桓帝延熹九年坐贓自殺左昌為梁州刺史靈帝中平初北地羌胡與邊章等寇亂隴右昌等因軍興斷盜數十萬斷謂割截漢陽長史盖勲固諌昌怒乃使勲别屯河陽以拒賊鋒河陽縣屬天水郡欲因軍事罪之而勲數有戰功昌坐斷盜徵晉石崇為荆州刺史崇頴悟有才氣而任俠無行簡在荆州刼逺使商客致富不貲孫盛為桓温從事中郎出補長沙太守以家貧頗營資貨部從事至郡察知之服其髙名而不劾之盛與温牋而辭㫖放蕩稱州遣從事觀採風聲進無威鳳來儀之羙退無鷹鸇搏擊之用徘徊湘川將為恠鳥温得盛牋復遣從事重按之贓私狼藉檻車收盛到州捨而不罪周仲孫為寧州刺史在州貪暴人不堪命後秦周班為姚興始平太守以黷貨誅於是郡國肅然北涼隗仁為沮渠蒙遜髙昌太守為政有威恵之稱然頗以愛財為失宋劉式之為宣城淮南二太守在任贓貨狼藉揚州刺史王𢎞遣從事檢校從事呼攝吏民欲加辨覆式之召從事謂曰治所還白使君劉式之於國家粗有微介偷數百萬錢何有況不偷耶吏民及文書不可得從事還具白𢎞𢎞曰劉式之便如此亦可繇此得停裴方眀為頴川南平昌太守皆坐贓私免官褚叔度為廣州刺史在任四年廣營資貨賄財豐積坐免官禁錮終身劉道錫為廣州刺史坐貪縱過度自杖治中荀齊文垂死乘輿出城行與阿尼同載為有司所紏值赦徵又以赦後餘贓收下廷尉被宥王僧達為吳郡太守吳郭西䑓寺多富沙門僧達求須不稱意乃遣主簿顧曠率門義刼寺内沙門竺法瑶得數百萬桓閎為交州刺史閎罷州還資財鉅萬孝武末年貪慾刺史二千石罷任還都必限使獻奉又以蒱戯取之要令罄盡乃止閎還至南州值眀帝即位擁南資為富人後為益州刺史蜀還之貨亦數千金先送獻物傾西州之半眀帝猶嫌其少及閎至都詣廷尉自薄先詔獄官留閎於是悉送資財然後被遣凡蠻夷不受鞭罰輸財賣罪謂之賧時人謂閎被賧刺史南齊崔慧景為梁南秦二州刺史在州蓄聚多獲珍貨王洪範為魯郡太守多取贓賄為州所按大懼棄郡奔建鄴梁王筠為臨海太守在郡侵刻還資有芒屩兩舫他物稱是為有司奏不調累年江祿為武寧郡守頗育資産積錢於壁壁為之倒迮銅物皆鳴人戲之曰所謂銅山西傾雒鐘東應者也湘東王恨之既深以其名祿改字曰榮財以志其忿蕭恭為雍州刺史武帝以雍為邊鎮運數州粟以實儲恭乃多取官米還贍私宅又恭典籖陳保印侵刻百姓為荆州刺史廬陵王所啟被詔徵還在都朝謁白服隨例帝曰白衣者為誰對曰前衡山侯恭帝厲色曰不還我陳保印吾當白汝未巳而保印實投湘東王改其姓名袁逢恭竟不叙用缺為湘州刺史頗好積聚多寫圖書數萬巻有油二百斛米四千石他物稱是曹景宗為郢州刺史在州鬻貨聚斂於城南起宅長隄以東夏口以北開街列門東西數里而部曲殘横民頗厭之蔡樽為臨海太守百姓楊元孫以婢採蘭時與同里黄權約生子酧乳哺直權死後元孫就權妻吳贖婢母子五人吳背約不還元孫訴樽判還本主吳能為卒賂樽妾遂改判與吳元孫撾登聞皷訟之為有司所劾時樽已去郡雖不坐而常以為恥陳庾持監臨海郡以貪縱失民和為山盜所刼幽執十旬文帝遣劉澄討平之乃獲免後魏元志為楊州刺史耽好聲妓後為雍州刺史逾尚華侈聚斂無極聲名遂損元仲景為涼州刺史貪暴無極欲窺府人及商胡富人財物詐作一䑓符誣諸豪等云欲加賞一時屠戮所有資財生口悉沒自入元汎字普安為營州刺史性貪殘人不堪命相率逐之汎走平州元誕為齊州刺史在州貪暴大為人患牛馬騾驢無不逼奪家之奴𨽻悉廹取良人為婦有沙門為誕採藥還見誕問外消息對曰惟聞王貪願王早代誕曰齊州七萬家吾到來一家未得三斗錢何得言貪耶為御史中尉元纂所紏㑹赦免武昌王鑒為齊州刺史兄和罷沙門歸俗棄其妻子納一寡婦曹氏為妻曹氏年齒已長携男女五人隨鑒至歴城干亂政事和與曹及五子七處受納鑒皆順其意言無不從於是獄以賄成取受狼藉齊人苦之鑒治名大損鄧羡為東魏郡太守兼齊州長史在治十年經三刺史以清勤著稱齊人懐其恩徳號曰良二千石及代還大受民吏送遺頗以此為損後為郢州刺史鎮義陽在州鋭於聚斂又納賄於于忠徴為給事黄門侍郎王雲為兖州刺史坐受所部荆山戍主桂受財貨又取官絹因染割易御史糾劾付廷尉遇赦免寇臻為𢎞農太守坐受賂為御史所彈遂廢卒於家寇治臻之子也為河州刺史在任數年城民詣都列其貪狀十六條㑹赦免崔康為廣平内史大納財貨為清論所鄙鄭羲為安東將軍西兖州刺史多有受納政以賄成性又嗇恡民有禮餉者皆不與杯酒臠肉西門受羊酒東門酤賣之以李冲之親法官不知糾羲子懿為齊州刺史好勸課善斷決雖不潔清義然後取百姓猶思之羲兄洞林為濮陽太守坐貪穢除名洞林兄子平城為東平太守性清狂使酒為政貪殘平城子伯猷為南青州刺史在州貪惏妻安豐王元延眀女専為聚斂貨賄公行潤及親戚戸口逃散邑落空虚乃誣陷良民云欲反叛籍其資財盡以入已誅其丈夫妻女配沒百姓怨苦聲聞四方為御史糾劾死罪數十條遇赦免因以頓廢齊文襄王作相每誡厲朝士嘗以伯猷及崔叔仁為喻鄭雲字道漢歴雁門濮陽二郡貪穢狼藉以納賄為事劉騰為安州刺史坐選舉受財為御史所糾因暴病卒趙超宗為汝南太守多所受納徙河東太守卒官超宗長子叔隆為中山内史在郡無徳政専以貨賄為事薛道次為秦州刺史帶隴西太守後為榮陽太守遷肆州刺史所在貪穢在州彌甚納賄於司空劉騰以求羙官未得而騰死髙雙為清河太守黷貨將刑在市遇赦免後為太尉史俄出為涼州刺史専肆貪暴以罪免既納貨髙肇復起為幽州刺史又以貪穢被劾罪未判遇赦復仕未㡬而卒李遷哲崇之子也崇性好財貨家資巨萬營求不息遷哲為相州刺史亦無清名鄴雒市廛收擅其利時論所鄙遷哲初至州斥逐細人遷徙佛寺逼買其地廣興第宅百姓患之崇北征之後徵兼太常卿御史髙道穆毁發其罪過張纂為樂陵太守在郡多所受納聞御史至棄郡逃走於是除名乃卒傅敬和竪眼之子竪眼前為益州刺史朝廷以其父有遺恵復以敬和為益州聚斂無已好酒嗜色逺近失望崔延治為安北將軍并州刺史在州貪汙聞於逺近李子貞為兖州刺史坐貪汙賜死賈智為滄州刺史貪縱甚為民害李洪之為秦益二州刺史洪之素非亷清每多受納時孝文始建祿制法禁嚴峻司察所聞無不窮糾遂鎖洪之赴京孝文臨太華庭集羣官有司奏洪之受贓狼藉又以酷暴孝文親臨數之以其大臣聽在家自裁髙遵為齊州刺史選召寮吏多所取納又其妻胡氏家在齊州母弟舅甥共相憑屬争求貨利嚴暴非理殺害甚多貪酷之響孝文頗聞之及車駕幸鄴遵自州來朝㑹有赦宥遵臨還州請辭帝於行宫引見誚讓之遵自陳無負帝厲聲曰若無遷都赦必無髙遵矣又卿非惟貪惏又虐於刑法自謂何如齊陰王猶不免於法卿何人而為此行自今宜自謹約還州仍不悛革齊州人孟僧振至雒訟遵詔廷尉少卿劉述窮鞫皆如所訴先沙門道登過州遵以道登荷寵於帝多奉以貨深託仗之道登屢因言次申咨救遵帝不省納遂詔述賜遵死時遵子元榮詣雒訟寃猶恃道登不時還赴道登知事決方乃遣之安樂王長樂為定州刺史多不奉法以貪暴徵詣京師子銓宣武初為涼州刺史在州貪穢政以賄成許彦自散騎常侍出為相州刺史在州受納多違法度詔書切讓之然以彦腹心近臣弗之罪也崔暹為南兖州刺史盜官瓦贓汙狼藉為御史中尉李平所糾免官後行豫州事尋即真坐遣子析戸分𨽻三縣廣占田宅藏匿官奴障恡陂葦侵盜公私為御史中尉王顯所彈免官胡泥為定州刺史以刑罰酷濫受納貨賄徵還戮之張赦提為幽州刺史頗縱妻段氏多有受納令僧尼因事通請貪虐流聞中散李真香出使幽州訪牧守政績真香驗按其罪赦提懼死欲逃其妻姑為太尉東陽王丕妻恃丕親貴自許詣丕申訴求助謂赦提曰當為訴理幸得申雪願且寛憂不為異計赦提以此差自解慰段乃陳列真香昔嘗因假而過幽州知赦提有好牛從索不果今為臺使心脇前事故威逼部下考楚過極横以無辜證成誣罪執事恐有不盡使駕部令趙秦州重往究訊事狀如前處赦提大辟孝文詔賜死於第北齊元垣為冀州刺史専務聚斂每百姓納賦除正税外别先青絹五疋然後為受王則為雒州刺史性貪惏在州取受非法舊京諸像毁以鑄錢茲時世號阿陽錢皆出其家後為徐州刺史取受狼藉鎖送晉陽文襄恕其罪常山王演孫彦道為徐州刺史坐奪商人財物免官段孝言為齊州刺史以贓賄為御史所劾遇赦免爾朱渾元為并州刺史以貪汙劾特見原斛律武都為梁兖二州刺史所在並無政績惟事聚斂侵漁百姓司馬消難為北豫州刺史鎮武牢消難博涉史傳有風神然不能亷潔在州為御史所劾張保雒為滄州刺史封敷城郡王在州聚斂免官削奪王爵任胄為東郡太守家本豐財又多聚斂動極豪華賔客往來將迎至厚尋以贓汙為有司所劾庫狄伏連為鄭州刺史鄙恡愚狠無治民政術及居州任専事聚斂薛修義為齊州刺史以黷貨除名堯傑為南兖州刺史多所取受然性果決吏民畏之封延之為青州刺史好財利在州多所受納盧勇為齊州刺史好財利多所受納後行梁州事除散騎常侍為夏陽太守段業告其在州聚斂被禁止送梁州窮治未竟遇疾卒於禁所王紘為北豫州刺史所歴皆好聚斂然性和直吏民不甚患之韓軌為瀛州刺史在州聚斂為御史糾劾削除官爵廣陽王深為鎮州刺史在州多所受納政以賄成私家有馬千匹者必取百匹以此為常深子湛孝静初為冀州刺史所在聚斂風政不立崔叔仁為頴州刺史以貪黷為御史所劾興和中賜死於宅崔季叔為齊州刺史坐遣人渡淮平市亦有贓賄事為御史所劾㑹赦不問隋靈賁為齊州刺史民饑榖米踊貴閉人糴而自糶之坐是除名張威為青州總管在州頗治産業遣家奴於民間鬻蘆荻根其奴縁此侵擾百姓帝深加遣責坐廢於家王仁恭為馬邑太守時天下大亂百姓饑餒道路隔絶仁恭頗改舊節受納貨賄又不敢輒開倉廪賑恤百姓唐席辨貞觀中為滄州刺史辨雖有幹畧而性貪鄙時所部長蘆令李太辨恣行侵奪賄賂盈門按察既知屢加誚讓太辨懼求媚於辨送縑二百疋羅三十疋以遺之辨遂納之反加顧遇事發詔朝集便臨觀而戮之太辨亦伏法李敬業為眉州刺史中宗嗣聖元年坐贓貶授栁州司馬左感意為廓州刺史開元二年坐贓杖殺張嘉貞開元初為定州刺史至州於恒嶽廟中立頌嘉貞自為其文乃書於治其碑用白石為文素質黒文甚為竒麗先是嶽祠為逺近祈賽有錢百萬嘉貞自以為頌文之功納其數萬蕭執珪為嵐州刺史盧季珣為復州刺史崔憬為銀州刺史開元八年並坐貶詔曰先王制法度立師長將以為理也夫刺史者受方岳之寄為吏人之表以宣法則以樹風敎故得人則河潤九里京師蒙其福非才則虐流百城黎庶受其害所以漢宣云與我共理者其惟良二千石歟中大夫前守嵐州刺史蕭執珪通議大夫前守復州刺史盧季珣中散大夫前守銀州刺史崔憬等各藉階資謬居藩牧不率法度情匪在公憑此尸素黷其貨賄豈有奉條察之委居道化之先顓利無厭貪以敗類固上行而下效豈澄源以正本有靦面目實虧風憲雖罪無所漏已寘刑章而情頗難容宜從逺謫執珪宜除名配𨽻營府即差使所在馳驛領送至彼不得東西季珣可恩州司馬憬可施州司馬并員外置同正員即發遣赴任仍頒於郡國以勵在官崔較為河南尹開元八年貶代州都督受賄故也李邕為陳州刺史開元十三年車駕東封迴邕於汴州謁見獻詞賦甚稱㫖頗自矜􅃷中書令張説甚惡之俄而陳州贓濫事發下獄鞫訊罪當死許州人孔彰上書救之請以身代邕罪疏奏㑹赦減死貶為欽州遵化縣尉彰亦配嶺南盧暉為魏州刺史開元二十九年坐贓詔云暉素為妄庸幸承資地早升清列爰典大藩不能勵彼公心少申答效而咨其鄙識莫顧亷隅黷貨無厭蠧政斯甚或増加賦斂或減截官錢入己之贓六百餘貫自外所犯數倍於兹況又役使人工殆三十萬復有何要輒化為勞慢法狥私觸類非一朕志存撫育情切好生特寛斧鑕之誅俾從流放之典可長流富州百姓與朕共理伊邇列城自頃以來每加優異凡在逺近固合周知豈有受恩而不盡節炤鑒若此咸宜勉之無或效尤自投於網王琚為鄴郡太守天寶五載坐贓詔云琚久經任使歴典籓條恃朝廷之見寛冐憲法而無憚凡所􅊩職罕著善聲自頃移官益彰喧訟志由貪敗政以賄成所犯贓私動盈千計正名論罪合寘流刑宥過推恩猶從貶任可江華郡司馬員外置劉巨鱗為南海太守充嶺南五府經畧採訪處置等使坐贓下獄死李宓為雲南太守犯贓貶為灃陽郡慈利縣丞員外置韋陟為河東太守天寶十三年貶為臨賀郡桂嶺縣尉員外置仍馳驛發遣陟天寶初自吏部侍郎出為襄陽鍾離義陽三郡太守楊國忠専政徴為河東太守本道採訪使陟以名位素著怏怏久失職及臨闗輔冀有任用而性頗侈豪所􅊩不修清亷之操遂恣其利欲盛以河東土物入饋權要為部人所發詔下御史訊鞫陟時朝謁在華清宫惶怖不安乃厚遺御史中丞吉温求救於祿山事泄為國忠奏貶温亦坐貶灃州長史李巨肅宗乾元初為河南尹於城市橋梁出入車牛皆税錢以供國用頗有乾沒士庶怨之後與妻張氏不睦張氏即皇后從父妺宗正卿李遵搆之發其贓貶為遂州刺史張萬頃為廣州刺史上元二年以贓貶巫州龍標縣尉員外置長任李鼎自鳳翔入為衞尉卿寶慶六年貶為思州長史員外置坐贓也鼎守鳳翔以賄聞雖去職姦狀皆露既行賜死於路李佚為宣州刺史代宗永泰二年坐贓二十四萬集衆杖殺籍沒其家黎幹大歴八年復拜京兆尹兼御史大夫幹自以為得志無心内理貪暴益甚狥於財色薛邕為宣州刺史徳宗建中初盜官貨計錢萬萬殿中侍御史員寓因私憾而奏舉之故貶官無㡬又配流象州崔穆為黔中觀察使貞元十一年部人告穆贓二十七萬貫及他犯遣監察御史李直方往州覆按劉贊貞元十二年為宣州刺史天下殷贍處也贊厚斂殖貨以務貢獻用求恩寵又不訓子弟童稚者便以驕傲為事路怤為涪州刺史貞元十四年以贓追奪兩官仍勿齒三五年陽履為永州刺史貞元十六年觀察使吕渭奏履犯贓令三司使推鞫履又表自言當州營備錢物上獻為觀察使所鞫按令中使王文凑就州取履至京師三司使訊其所妄破用履云市馬進訖及訊其馬於何人處買及價直齒歳履答狀馬主東西南北貴公子也今不知所在言馬齒歳按禮經齒路馬者當誅今不敢言其他狀欵多如此類徳宗悦其進奉之言不責也但令免官而已鄭式瞻為衢州刺史貞元十七年死於州獄初鹽鐵使李錡於衢州即山鑿銀式瞻誣銀工杖殺十餘人人怨之觀察使舉奏發御史就鞫之坐贓二千貫笞四十流崖州詔未至而死張登為漳州刺史貞元十七年死於州獄登暴狼貪冐擅賦百姓沒買州人為奴婢者三十人姦亂禆將家財非一其不堪辱有縊死者部人蔡化訴於闕下詔命就鞫遂幽死陳審為眀州刺史貞元十九年坐贓配流崖州臧渙為韶州刺史元和四年以賄聞貶賀州司馬王仲周為眀州刺史元和四年坐贓貶韶州司戸劉文翼為瀘州刺史元和四年坐贓貶為崖州登邁縣尉陳當為榮州刺史元和五年貶為羅州吳川縣尉以坐贓故也張愻為將作少監元和五年貶為朗州長史愻前為蘄州刺史坐贓為觀察使郗士美所奏李少和前為江西觀察使元和七年勑曰李少和職奉察亷迹乖周慎除替已後猶取公錢或交換未填或轉移私費今除已填納贓數外尚欠三千七百餘貫身已淪沒不可徵收宜放免李宙為丹王府長史元和七年以前任復州刺史坐贓貶為賀州司戸參軍孟嘗謙為安州刺史元和八年坐在郡貪濁弋獵擾人貶栁州司馬李將順為袁州刺史元和九年坐以官錢貿易以求利且擅興工役貶循州司戸參軍李彦輔為簡州刺史元和十年坐賍貶韶州司馬龎説為忠州刺史元和十年貶為端州司户説嘗改易其州庫門以内向用便迴貨故及貶馬平陽為州刺史元和十年以貪虐貶為韶州司戸夏侯至為汴州刺史元和十年以貪虐貶潮州司戸李逢為台州刺史元和十二年坐贓貶康州司户參軍啖異為集州刺史元和十二年坐贓貶封州司戸參軍崔祝為鄭州刺史元和十二年御史䑓奏祝坐贓三萬餘貫勑崔祝抵犯刑章宜加貶逐緣其身居憂服未可授官宜且於康州安置待服滿日處分其贓充進助者仍令度支收管本道觀察使覺察不早特宜釋放祝於當州顧召行營車除充佑給付又擅出州倉粟麥貴貨之以利入己及觀察使舉聞發御史按之乃以助軍進奉為名晝夜促進祝父老病聞御史按祝竟以憂死祝既除名所至遲留又錮身配流康州第五申為資州刺史元和十四年坐贓貶連州司馬崔勵為卭州刺史元和十四年坐贓決杖流驩州宋君平為涪州刺史元和十五年坐贓削官一任楊朗為鄭州刺史元和十五年坐贓削官一任徵十斤銅唐慶前為夀州刺史長慶四年刺史楊歸厚告論慶違赦勑科配百姓税錢及破用官庫錢物等事慶犯正入己贓四千七百餘貫勑唐慶入己贓僅五千貫據罪定刑實難全宥但以惟新之日政務從寛要示含容俾從流竄宜除名長流崖州李彤自鄧州刺史入為司農少卿長慶四年貶吉州司馬員外同正彤前在鄧州坐贓錢百餘萬仍自刻石紀功號為善政碑觀察使栁公綽以事聞故有是命元稹以穆宗長慶中為浙東觀察使既放意娱㳺稍不修邊幅以黷貨聞於時梁張思慎為蔡州刺史以貪貨大失民情後唐李存儒為衞州刺史為梁將段凝所陷存儒控御無術誅斂州民防城之卒皆徵月課縱其歸去段凝知其若此夜渡舟師詰旦登城存儒不之覺李鄴為亳州刺史眀宗天成二年詔配崖州長流百姓所在賜自盡鄴為政貪汙有奴為人轉金冀迴公道奴匿其金鄴知遂殺之其家人上論訴其私事遂伏法成景宏為曹州刺史受倉吏百緡天成三年七月勑成景宏位列百城秩膺八命在旌旃而甚至於委任以非輕所宜均我詔條副余優寄而乃罔遵􅉓憲輒恣貪求差廪吏以非公取貨財而潤己纔行鞫勘果伏罪尤宜行竄逐之文以示澄清之道可貶綏州司戸參軍續勑長流宥州韓知章為漢州刺史天成四年以在任日恣誅求達於聖聰勒歸私第盧質為滄州節度使長興四年奏薦滄景觀察判官靳詡雪得寃獄乞行恩奬詡父名儒滄州市井之富民也家財鉅萬前後鎮帥無不受其賂者先是應聖節靳儒來朝帝見之於後樓下儒因言其子詡為本道觀察判官月限已滿乞量留一年帝即從之又薦押牙郝寓帝曰寓乃何人朝廷事有大臣朕不自由爾無宜多言也詡商販之子不數年至本州從事質書生備位亷察而受賂薦許人士醜之晉李彦珣為坊州刺史髙祖天福五年十二月犯枉法贓特勑免官彦珣久臨翟道苛暴不法結怨所部宜君縣民唐璘與李婦争田彦珣納賄數十萬曲斷其事故李婦詣御史府上訴按詰伏罪法寺詳斷以上奏勑曰李彦珣頃委分符不能求瘼既受贓而枉法合准律以定刑特與含𢎞聊示懲戒宜奪一任官送虢州收管周安審信歴許兖二鎮所至以聚斂為務民甚苦之葉仁魯為萊州刺史貪暴特甚吏民不勝其苦受代日遁離本州及為部民所訟下獄鞫之仁魯伏罪贓汙狼藉趙鳳為單州刺史以進奉南郊為名率斂部民財貨為人所訟張順為楚州刺史顯徳五年十二月己丑賜死於都城外順發身戎伍累遷虎㨗廂主歴登汝楚三州防禦使在楚州日嘗𨼆落下碇税錢五十餘萬官庫絲綿二千餘兩及縱其部下侵民民甚苦之為轉運判官馮瓚所奏下御史府訊之得實故寘於法焉册府元龜卷七百
