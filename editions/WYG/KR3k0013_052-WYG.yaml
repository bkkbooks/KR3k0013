body:
  text: 册府元龜卷五十二宋王欽若等撰帝王部崇釋氏第二唐肅宗至德中内置道塲供奉僧晨夜念佛動數百人聲聞禁外中書侍郎平章事張鎬知之奏曰臣聞天子修福當在安養含生靖一風化未聞區區僧教以致太平伏願陛下以無為為心不以小乗撓聖慮也肅宗甚然之上元二年四月甲申詔於唐興寺設髙座講論二教七月癸巳於景龍觀設髙座講論道釋二教代宗寳應元年八月癸酉詔曰道釋二教用存善誘至於像設必在尊崇如聞州縣公私多借寺觀居止因兹䙝黷切宜禁斷務令清肅其寺觀除三綱并老病不能支持者餘並仰毎日二時行道禮拜如有弛慢並量加科罰時天下公私等事多借寺觀居止代宗恐其䙝黷因詔又詔曰教宗清淨禮避嫌疑其僧尼道士非本師教主及齋㑹禮謁不得妄託事故輙有往来非時聚㑹並委所繇官長勾當所有犯者准法處分亦不得因兹攪擾分明告示咸使知悉廣德元年七月壬子大赦改元制河南河北偽度僧尼道士女冠並與正度二年四月壬申以𤣥宗諱日度僧道凡數百人乙酉以肅宗諱日度僧道凡數百人永泰元年九月於京城資聖西明兩寺置百髙座講仁王經内出二寳輿中命有力者衣金甲舁出又結彩為菩薩神王及八部鬼神羊車鹿車牛車内侍魚朝恩䕶送宰臣及百官列班於光順門觀禮宰臣等表請依班序節級率錢以資僧供二七日而罷又詔宰臣及兩省五品已上官尚書省四品已上官御史大夫中丞諸司長官並於西明寺行香修齋奏樂竟日而罷俄以吐蕃回紇入冦罷百髙座講經十月復講經於資聖寺大厯三年正月乙丑帝幸章敬寺行香凡度僧尼一千人二月辛丑萬年縣鎮國寺有胡僧純陀自言六百歳臨終遣弟子詣闕以衣鉢𫝊奉皇帝帝遣中官以紫衣賜之又遣中官弔祭并䕶塟事是月興善寺不空三蔵上言寺院佛塔先因地震陷折今将增修下見古埏得一小棺其長尺餘發而視之凡積十餘重棺皆金寳装餙中有舎利骨及佛髪一條色青而拳其長數尺每棺一鎻規製妙絶有殷仲文題賛處甲辰内出寳輿具威儀迎入内道塲奉之七月特賜章敬寺盂蘭盆時寺宇新成帝増罔極之思勅百官詣寺行香四年正月帝以章敬皇太后忌辰度僧尼道士凡四百人是月以修功德使大濟禪師廓清檢校殿中監廓清京城興唐寺僧也以修功德承恩特賜袈裟及廐馬出入禁中無時初賜號大濟至是又寵以班秩京師諸僧咸憚之二月南天竺國僧三藏文殊德上言廣州南界蕃人新營兩寺望賜寺名詔以寳應廣德二名賜之七月庚申文成殿置道塲為萬姓祈福是日佛見光相自子至丑乆而不㪚六宫近侍咸覩文武百官尚書左僕射裴冕等表賀曰聖德動天湛恩育物齋心甲夜稽首梵筵助𤣥造於慈元登蒼生以夀域休徵允答聖功契符騰神光於玉毫發睟容於金殿宫中咸覩夜後如初臣等得奉殊祥無任歡欣之至伏請編諸史册宣示中外手詔荅曰朕嗣守鴻業恭臨寳位夕惕若厲蹈乎春氷啓三乗之真如為萬姓以作福大雄感應示現毫光茂對禎祥多慙薄德卿等百辟勤修庶政休徵薦集慶慰當深所請編之史册宣示中外者依七年正月興善寺僧特進試鴻臚卿三蔵不空獻所翻譯佛經特許編入一切經目不空表曰爰自㓜年承事先師大𢎞三教和尚二十有四載禀授瑜伽法門後遊五天尋求所未授者外諸經論更重學習凡得梵本瑜伽真言經論五百餘部奉為國家詳譯聖言廣崇福祐天寳五載却至上都奉𤣥宗皇帝恩命於宫内建立灌頂道塲所齎梵經盡許翻譯及肅宗皇帝配天繼聖特奉綸音於内道塲建立護摩及灌頂法又為國譯經助宣皇化其所譯金剛灌頂瑜伽法門是成佛速邪之路其修行者必能頓超凡境逹於彼岸餘部真言諸佛方便其徒不一所譯諸大乗經典皆是上資邦國息滅災厄星辰不愆風雨順序仰恃佛力輔成國家謹纉集前後所翻譯自開元至今凡一百一卷七部以聞詔下有司宣付中外八年正月乙未勅天下寺觀僧尼道士不滿七人者宜度滿七人三七人已上者更度一人二七人以下者更度三人五月庚子以太宗諱日命有司修四千僧齋於服成寺八月戊午修一萬僧齋於慈恩寺為萬姓祈福九年丙戌以肅宗諱日度僧尼道士凡二百餘人六月癸未興善寺僧試鴻臚寺卿不空三藏卒輟朝三日不空西域胡僧也敏智多聞學通釋氏經論曉知蕃漢音㫖翻譯貝葉經凡數萬言帝甚敬之及卒乃下詔曰大道之行同合於異相王者至理摠歸於正法方化成之齊􅆀何儒釋之殊塗故前代帝王罔不崇信法教𢎞闡與時偕行特進試鴻臚卿大興善寺三蔵沙門大廣智不空我之宗師人之舟楫超詣三學坐離于見聞修持萬行常示於化滅執律捨縳䕶戒為儀繼明善教之志来受人王之請朕在先朝早聞道要及當付囑常所歸依每毎執經内殿開法前席凭几同膠序之禮順風比崆峒之問而妙音圎演宻行内持待叩如流自涯皆悟滌除昏妄調伏魔寃天人洗心於度門龍鬼受職於神印固以氣消災厲福致吉祥實惟𢎞我之多寧止利吾之美當有命秩用伸優禮而得師為盛味道滋深思復強名載明前志夫妙界有荘嚴之士内品有果地之儀本乎尚德敬順時典可開府儀同三司仍封肅國公贈司空諡曰大辯正廣智不空三藏和尚德宗貞元四年八月御通化門觀章敬寺迎御書院額并皷吹閱神策馬技五年三月詔曰釋道二教福利羣生館宇經行必資嚴㓗自今州府寺觀不得宿客居住屋宇破壊各隨事修葺八月詔天下諸上州並宜國忌日准式行香六年二月乙亥詔葬佛骨扵岐陽初岐陽有佛指骨寸餘塟於無憂王寺或奏請出之以示衆帝乃出之置於禁中精舎又送於京師佛寺傾都瞻拜施財物累鉅萬是日命中官送歸岐陽左神策行營節度使鳯翔尹邢君牙迎䕶葬於舊所八年七月丁卯幸章敬寺九年五月賜故杭州徑山寺僧法欽諡曰大覺禪師六月詔定國忌日寺觀齋僧道人數有差十二年九月右神策等軍上言宴設堂去年臘日蒙車駕臨幸請置寺以貞元鎮國為名從之又詔虢州閿鄉縣龍興寺故阿足師宜諡大圎禪師十三年四月於曲江南彌勒閣置寺以貞元普濟為名七月右神䇿軍中尉霍仙鶴患特賜馬十匹令諸寺設齋祈福十月景公寺僧寂寛等於京兆府状訴綱維乾俊等典賣承前勅賜御衣府司推勘所典賣並縁常住寺用禁繫乾俊等奏請科罪帝曰本来施與寺家之物若自盗竊法律有文今乃不為私情事縁常住正當施與之意豈合書以罪名若施與而令存乃是勞力寺家殊非本施之意僧之言告乃是無知更欲科繩深所無謂宜並釋放十四年正月南天竺國先進華嚴經殊梵本僧般若三蔵領到令保夀寺僧智柔圎照道監虛舟智通等十八人同於崇福寺翻譯成四十卷十六年四月以故第二祖恵可禪師賜諡為大祖禪師憲宗元和二年九月乙巳許成都府置聖夀南平二佛寺三年三月辛亥河中僧恵琳撰一切經音并目録一百三卷表獻之六年正月丁巳勅諫議大夫孟簡給事中劉伯芻工部侍郎歸登右補闕蕭俛同就醴泉佛寺閱翻譯大乗本心地觀經十年三月甲申西明佛寺僧遷寺中之毘沙門神像於開業寺帝命假之騎軍前後翼衞其徒以幢盖引侍凡數里不絶觀者傾都五月詔京城寺觀講宜准興元元年九月一日勅處分諸畿縣講宜勒停其觀察使節度州每三長齋月任一寺一觀置講餘州悉停惡其聚衆且虞變也十二年二月丙申置元和聖夀佛寺於右神䇿軍五月賜興福寺絹布一百端疋十三年四月甲寅幸興福寺賜絹三百疋辛酉西市百姓於芳林門為無遮僧齋命中使以香施之十二月庚戌僧惟應等辭赴鳳翔法門寺迎佛骨命高品中使杜英琦監焉是月癸亥命中使齎香監領宫人十三人赴臨臯驛迎佛骨先是功德使奏鳳翔府法門寺有䕶國真身塔塔内有釋迦牟尼佛指骨一節其本𫝊以為當三十年一開開則嵗豐人安至来年合發詔許之及至又命中使領禁兵與僧徒迎䕶開光順門以納之留禁中二日乃送京城佛寺十四年四月乙卯御勤政樓觀都人設僧齋之會陳雜樂百戲日入而罷穆宗以元和十五年正月即位二月河東節度使裴度奏今月四日五臺山佛光寺側慶雲現中有金人乗狻猊領徒千萬如金仙状自己至申方滅長慶三年八月自複道逹興慶宫至通化門賜丐僧等絹二百疋遣中使劉克明以錢二百五十貫絹二百五十疋賜𢎞福寺以發新鐘十一月幸通化門觀作毘沙門神因賜絹五百疋十二月以錢一千貫賜章敬寺又賜毘沙門神額曰毘沙天王導以幡幢帝御望仙門觀之遂舉樂雜戲角抵極歡而罷敬宗寳厯元年二月己卯賜化度寺經院金字額寳厯聖福之院功德使具雜戲聲樂迎以赴寺帝御日迎樓觀之丁亥詔兩街佛寺置方等受戒壇塲自三月十日至四月十日停仍令兩街功德使各選擇有戒行僧謂之大德者考試僧能暗記經一百五十紙尼能暗記經一百紙即令與度此事停廢已乆所在長吏方喜耕織者稍衆今忽重置盖寳夀寺僧法真因道塲修功德奏論得請也八月己丑蓬莱殿㑹沙門道士共四百人賜食兼給茶絹有差二年三月庚午鄭滑觀察使李聼上言隋大業初髙祖神堯皇帝任鄭州刺史日為太宗文皇帝疾恙祈福於滎陽縣大海佛寺其荅如響因建一石像像下刋紀其事凡十六字歳月旣逺盡翳於土壤中今滎陽縣令李元慶新加嚴餙刺史張仲方立石為文不敢不奏文宗太和元年十月江西奏洪州道一禪師元和中賜諡大寂其塔未蒙賜額詔賜名圎證之塔二年七月浙西道觀察使李德裕奏潤州鶴林寺故禪師𤣥素𫝊牛頭山第五祖智威心法是徑山大覺之師伏請依釋門例賜諡號塔額勅宣賜諡大律禪師大寳般若之塔十月河中觀察使薛平奏中條山蘭若營造之初有兩泉湧出今因降誕請號為太和寺許之開成二年二月甲辰王彥進准宣索内典目録十二卷乙巳以太宗皇帝先置毘沙門神及功德在蓬莱殿是日移出配諸寺安置三月甲戌以彗星見命京師諸佛寺開仁王經道塲宣宗以㑹昌六年即位五月勅上都添僧尼寺一所每寺三十人大中元年閏三月帝御紫宸殿謂宰臣曰佛雖異方之教深助理本所可存而勿論不欲過毁以傷令德乃遣下詔有㑹昌中靈山古迹招提棄廢之地並令復之委長吏擇僧之髙行者居焉懿宗咸通十四年三月詔曰兩街僧道於鳳翔法門寺迎佛骨四月八日佛骨至京自開逺門逹安福門迎禮之迎入内道塲二日出於京城諸寺士女雲合威儀盛餙古無其比遂下制赦京畿及天下見禁囚徒後唐荘宗同光二年九月勅天下應有本朝所造寺觀宜令所在長吏取寺司常住物添修至萬夀節日須畢其功十一月甲戌河南尹張全義奏萬夀節於嵩山開琉璃戒壇度僧百人勅張全義首冠王臣心明佛性資善𢎞於淨衆増福聚於皇基将欲壇啓琉璃人銓鴛鷺實彰忠節宜示允俞十二月乙亥幸廣化寺祈雪二年正月幸鄴都登黎陽山燔香於大像前五月戊申幸龍之廣化寺開佛塔請雨明宗天成元年十一月勅佛氏之教其来乆矣旣為空寂之門不無髙潔之士自淳風乆㪚至道莫隆漸容遊惰之徒雜處緇黄之衆罔尊禁戒唯切經求託形勢以擾人蓄資財而潤已将思縱志肯樂聚居多於閭巷之間别搆住持之所妄陳福業潛誘聾愚或移動居人或侵并物業如斯之弊其徒日繁朕方靜寰區務康黎庶貴臻有益共洽無私宜令徧行告諭應今日已前修盖得寺院無令毁廢自此已後不得輙有建造如要願在僧門亦冝准佛法條例官壇受戒不得擅私剃度二年九月益州孟之祥令僧五人持佛牙長一寸六分云僖宗幸蜀時留之今屬應聖嘉節願資夀命宣示近臣十月五臺山王子寺主僧人廷果狀稱為先師廣法大師誠恵建塔請名諡為法雨大師慈雲之塔四年八月澤州盤亭山千峯禪寺僧洪宻狀奏當院創感應舎利塔一所乞賜塔額乃賜號為圎空之塔長興四年七月命中使押絹五百疋施五臺山僧齋料末帝清泰元年七月遣供奉官鄭延遂往鳳翔詔胡僧阿闍黎初帝在籓屢與僧言闍黎行髙知前事帝深重之九月詔鳳翔發遣僧佑聖大師至京師二年正月千秋節樞宻使趙延夀獻金繒并大乗經十卷忻州刺史劉處讓獻金字法華經一部太原多僧舎資福一宗尤事禪譯文武間好佛者多凑其門帝頗宗奉及鎮河中鳳翔僧知數者數言帝有金輪之位岐僧阿闍黎言事多從故延夀處讓有是貢獻四月丙寅河中棲巖寺𢎞福院僧恵鍳言先師在龍潛時施財起塔奏號靈應之塔師未有諡詔賜諡真寂丁卯遣供奉官李彦驥鳳翔法門寺飯僧尼道俗帝舊游故也乙酉功德使言左右街僧録可肇報在京諸寺院童子行者於千春節考録及限各給得文許令披剃及僧尼沙彌年滿二十受具戒伏乞開置官壇縁四月十五日僧門結夏至七月十五日方滿至千春節前開置戒壇從之時功德使奏每年誕節諸州府奏薦僧道其僧尼欲立講論科講經科表白科文章應制科持念科禪刹聲讃科道士女冠經法科講論科文章應制科表白科聲讃科焚修科以試其能否從之八月杭州錢元瓘言襲爵四年曽無顯効受鳳池之真命降龍册以雙封臣特於府城外造寺一所前百歩起樓號奉固其寺額乞以龍册為名詔曰錢元瓘效忠建寺比為誕節齋僧龍册為名未稱勤懇冝號千春寺十月鳳翔言僧阿闍黎卒帝嗟惜之命翰林學士為誌石三年遣供奉官劉處賔往鳳翔法門寺四月八日設大齋㑹晉髙祖天福二年正月勅西天中印土摩竭陀舎衞國大菩提寺三藏陀闍黎賜紫沙門室利縳羅上靺下刺宜賜號𢎞梵大師十一月于闐國僧曼哥羅賛嘗羅賜紫號昭梵大師三年十一月庚午西京左右街僧録可肇等齎佛牙到闕宣付汴京收掌十二月戊子勅河陽邢州潛龍舊宅先令選名僧住持宜賜院額其河陽曰開晉禪院邢州曰廣法禪院四年二月庚子以天和節僧尼賜紫衣師號者一百有五寺宇賜名額者凡二十有三襄州香界延州衆寳邢州普㑹相州安福懐州普䕶鳯翔寳蓮鄭州妙香棣州淨念洺州天花汾州普照雒京廣福鳳州𢎞利京兆悟空并州定果徐州空寂宋州普福遼州澄節許州菩提靖教陳州花臺定業東京金明善㑹十二月丙辰勅凡為精舎将結勝縁清虛則神亦相依混亂則人皆不重其或偶然乗興率爾棲心鄉村接漁獵之家􅆵里定屠沽之户佛雖無染僧豈不輕宜崇釋梵之因永肅人天之化所有自前院宇即且依舊住持今後城郭村坊一切不得創造五年二月甲子天和節道釋賜紫衣師號者凡九十人寺宇賜名額者凡二十五所東京寳繩寳像寳花法林西京恵雪京兆普靜兖州等覺𤣥機蔡州吉祥懐州妙理襄州䕶國許州定水貝州寳刹博州金繩耀州宻行代州仁夀鄴州感化潞州妙士定州毘城岐州善覺遺相澤州解空慈州集聖鄆州真覺四月癸卯建金界寺於五臺立峻極院於嵩嶽六年二月戊午天和節道釋賜紫衣師號者凡百三十有四寺宇賜名額者凡五十有九東京淨聖資夀西京仁聖青蓮延慶北京靜覺鳳翔𢎞化定州法海孟州興恵趙州興法襄州延夀延州興果相州妙勝潞州慈雲汝州清凉安州竺乾陕州仁夀邢州閑心濮州樂夀五月甲辰加隰彌陀國僧㗌哩以佛牙汎海而至十二月壬子遣内班史延韜部署僧十四人宗城縣開置道塲以鎮人為安重榮脅制而有殺戮崇其福事七年正月遣内班衞延韜鎮州開置水陸道塲三月壬子天和節三京諸道州府奏僧尼道士乞紫衣師號凡百人寺觀名額五十餘處悉從之五月乙未秦州侯益奏臣頃歳曽為偏將往伐叛逆有願如范延光歸降兵無血刅即於招討使楊光逺中軍寨建一佛刹自後延光果能歸欵克契發心光逺尋施錢三百貫文與臣共力營葺今修成天王院一所乞賜名額勅以福順天王院為名少帝開運二年六月定州奏據郎山招收指揮使孫方簡狀當山有僧院地居山谷道扼鄉閭自蕃戎騷動已来邉界驚移之後多聚强壮自辦戈矛毎遇賊軍皆獲勝㨗其郎山為易州之中路滿縣之隣封通此往来最為要害乞賜院額者勅以勝福之院為名漢隠帝乾祐二年太子率更令李守瓊上言二事其一沙門著紫比非佛門貴務奢華以邀名利諸處奏薦盖出顔情以臣愚見不敢便望止絶毎歳誕節前據所奏薦便令其身隨薦章詣闕令功德使召兩院僧官考試所業長短以行恩澤庶絶濫舉之門周太祖廣順二年十一月以在京潛龍宅為佛宫賜額號天聖禪寺三年十一月中印寺僧法進賜紫衣世宗顯德元年三月親征河東四月丁巳幸團栢谷佛寺賜主寺僧紫衣九月以潛龍宫為皇建禪院遣沙門清興主之是月齊州沙門義楚進釋氏六帖三十卷義楚少負名操亦通儒學将佛書麗事以類相從擬白氏儒書所集帝覧而嘉之賜以紫衣其書付史館四年十月賜京城内新四寺額以天清顯靜顯寧聖夀為名五年四月征淮南囘戊午至泗州幸普光王寺賜寺僧帛有差六月庚午内出御衣六百餘事錢四十萬羅縠百疋分賜兩街僧道令僧道修寺觀六年四月幸滄州駐蹕於乾寧軍賜城内二寺名額一曰迎鑾二曰順聖從寺僧之請也册府元龜卷五十二
