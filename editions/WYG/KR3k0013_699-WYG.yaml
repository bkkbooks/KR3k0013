body:
  text: 冊府元龜卷六百九十九宋王欽若等撰牧守部枉濫譴讓枉濫以私害公厥政用壊依勢作威其下安仰自漢承秦弊訓俗務刑酷暴餘風薫蕕相尚故有任氣以逞文致其罪懐詭詐以巧詆挾釁隙以􅄷報倚法以削論死非一覆盆曷炤往愬莫獲亦有識用不敏聽斷罔審不辜是殺寃氣由集天監在下咎徵乃見自兹以降世或有之秉心姦回虐下滋甚乃至誣搆其狀本非服辯憑縱所欲顓在規求政以賄成民用愁歎是知長人之寄可不慎柬其循良哉漢張敞為京兆九歳坐與光祿勲楊惲厚善後惲坐大逆誅公卿奏惲黨友不宜處位等比皆免比例也音必寐切而敞奏獨寢不下天子惜敞故留所奏事不出敞使賊捕掾絮舜有所案驗賊掾主捕賊者也絮姓也音女居切又人餘切舜以敞劾奏當免不肯為敞竟事私歸其家人或諌舜舜曰吾為是公盡力多矣今五日京兆耳安能復案事敞聞舜語即部吏收舜是時冬月未盡數日按事吏書夜驗治舜竟致其死事舜當出死敞使主簿持敎告舜曰五日京兆竟何如冬月已盡延命乎言汝不欲望延命乎乃棄舜市東海太守史不書姓名郡有孝婦少寡亡子養姑甚謹姑欲嫁之終不肯姑謂鄰人曰孝婦事我勤苦哀其亡子守寡我老久絫丁壯奈何絫古累字也音力瑞切其後姑自經死不欲累婦故自殺姑女告吏婦殺我母吏捕孝婦詞不殺吏驗治孝婦自誣服具獄上府府郡之曹府也上音時掌切吏于公以為此婦養姑十餘年以孝聞必不殺也太守不聽于公争之弗能得乃抱其具獄哭於府上具獄者獄案已成其文備具也因辭疾去太守竟論殺孝婦郡中枯旱三年后太守至卜筮其故于公曰前孝婦不當死太守强殺之咎黨在是乎黨音他郎切於是太守殺牛自祭孝婦冡因表其墓天立大雨歳熟郡中以此大敬重于公汝南太守史失其名欲枉殺人決曹掾周燕諌不聽遂殺囚而黜燕嚴延年為涿郡太守衆人所謂當死者一朝出之所謂當生者詭殺之詭違正理而殺也吏民莫能測其意深淺戰栗不敢犯禁按其獄皆文致不可得反致至密也言其文案整密也反音皤山夀為商利侯代郡太守宣帝元康元年坐故劾十人罪不直免翟義為南陽都尉行太守事收宛令劉立立與曲陽侯有親立家輕騎馳從武闗入語曲陽侯曲陽侯白成帝帝以問丞相方進遣吏勑義出宛令宛令已出吏還白狀方進曰小兒未知為吏也其意以為入獄當輒死矣謂其不知立有所持挾以自免脱後漢㑹稽太守史不書姓名郡人孟嘗仕為戸曹吏上虞有寡婦至孝養姑姑年老夀終夫女弟先懐嫌忌乃誣婦厭苦供養加鴆其母列訟縣庭郡不加尋察遂結竟其罪嘗先知枉狀備言於太守不為理嘗哀泣外門因謝病去婦竟寃死自是郡中連旱二年禱請無所獲後太守殷丹到任訪問其故嘗詣府具陳寡婦寃誣之事因曰昔東海孝婦感天致旱于公一言甘澤時降宜戮訟者以謝寃魂庶幽枉獲申時雨可期丹從之即刑訟女而祭婦墓天應時澍雨榖稼以登曹紹中常侍曹節從子也靈帝時為東郡太守建寧中青蛇見前殿大風拔木郎中謝弼上封事左右惡其言出為廣陵府丞去官歸家紹忿疾於弼遂以它罪收考掠案死獄中時人悼傷焉段紀眀為司𨽻校尉初蘇不韋父謙為李暠掠死獄中不韋既復暠之􅄷後太傅陳蕃辟不韋為郡五官掾初𢎞農張奐睦於蘇氏而紀眀與暠素善後奐與紀眀有隙及紀眀為司𨽻以禮辟不韋不韋懼稱病不詣紀眀既積憤於奐因發怒乃追咎不韋前報暠事以為暠表治謙事被報見誅君命天也而不韋􅄷之又令長安男子告不韋多將賔客奪舅財物遂使從事張賢等就家殺之乃先以鴆與賢父曰若賢不得不韋便可飲此賢到扶風郡守使不韋奉謁迎賢即時收執并其一門六十餘人盡誅滅之諸蘇以是衰破及紀眀為陽球所誅天下以為蘇氏之報焉侯參中常侍侯覽之兄為益州刺史民有豐富者輒誣以大罪皆誅之沒入其財周紆為齊相頗嚴酷顓任刑法坐殺無辜左轉博平令魏公孫度漢末為𤣥莬郡吏稍遷冀州刺史以謡言免同郡徐滎為董卓中郎將薦度為遼東太守曩度起𤣥莬小吏為遼東郡所輕先是屬國公孫昭守襄平令召度子康為伍長度到官立收昭笞殺於襄平市郡中名豪大姓田韶等宿遇無恩皆以法誅所夷滅百餘家郡中震慄東伐髙句驪西擊烏丸威行海外故西河太守李敏郡中知名惡度所為恐為其所害乃將家屬入於海度怒掘其父塜剖棺焚尸誅其宗族晉顧夀交阯太守參弟也參卒夀求領州州人不聽固求之遂領州夀乃殺長史胡肇等又將殺帳下督梁碩走得免起兵討擒之付夀母令鴆殺之南齊謝瀹為吳興太守長城縣民盧道優家遭刼誣同縣殷孝悌等四人為刼乃收付縣獄考正孝悌母駱詣登聞訴稱孝悌為道優所誹謗横劾為刼一百七十人連名保徵在所不為申理瀹聞孝悌母訴乃啟度建康獄覆道優理窮欵首依法斬刑有司奏免瀹官後魏趙郡王謐為岐州刺史孝眀初䑓使元延到其州界以驛邏無兵攝使簡覈隊主髙保願列言所有之兵王皆私役謐聞而大怒鞭保願等五人各二百數日之間謐召近州夫閉城四門内外嚴固捜掩城中楚掠備至又無事而斬六人合城恟懼衆遂大呼屯門謐登樓毁梯以自固人士散走城人分守四門靈太后遣㳺擊將軍王靖馳驛喻之城人既見靖至開門謝罪奉送管鑰乃罷謐州趙邕為幽州刺史在州與范陽盧氏為婚女父早亡其叔許之而母不從母北平陽氏携女至家蔵避規免邕乃拷掠陽叔遂至於死陽氏訴寃䑓遣中散大夫孫景安研簡事狀邕坐處死㑹赦得免唐鄭式瞻為衢州刺史初鹽鐵使李錡於衢州郎山鑿銀式瞻誣銀工杖殺十餘人人寃之杜亞徳宗時為東都留守惡大將令狐運㑹賊發雒城之北運適與其部下畋於北部亞意其為盜遂執訊之逮繫者四十餘人監察御史楊寰按其事亞以為不直密表陳之寰遂得罪亞將逞其宿怒且以得賊為功上表指眀運盜之狀帝信而不疑宰臣以獄大宜審奏請覆之命侍御史李元素就決亞迎以獄成告元素驗之五日盡釋其囚以還亞大驚且怒親追送馬上責之元素不答亞遂上疏又誣奏元素元素還奏言未畢帝怒曰出俟命元素曰臣未盡詞帝又曰且去元素復奏臣一出不得復見陛下乞容盡詞帝意稍緩元素盡言運寃狀眀白帝乃寤曰非卿孰能辯之後數月竟得真賊元素由是為時器重杜兼貞元中為濠州刺史性浮險豪侈矜氣屬徳宗厭兵革姑息戎鎮至軍郡刺史亦難於更代兼探上情遂練卒修武占召勁勇三千人以聞乃得自恣錄事叅軍韋賞團練判官陸楚皆以守職論事忤兼密誣奏二人通謀扇動軍中忽有制使至兼率官吏迎於驛中前呼韋賞陸楚出宣制使殺之賞進士擢第楚兖公象先之孫皆名家有士林之譽一朝以無罪受戮郡中股慄天下寃嘆之李紳文宗開成中鎮維揚有顔氏女殊色為㳺客吳湘所聘吴湘即江都縣尉也與紳争婚顔氏紳怒其無禮拾賍罪奏而殺之非㳺客也紳屢求之意欲遺李徳裕為湘所拒乃誣以他罪害之顔氏尋亦自裁後唐韋堅知徐州事百姓楊知元詣闕訟堅知元割耳稱寃堅賂權勢請知元歸本道推劾洎至枉殺之憤痛之聲聞於逺邇張全義為河南尹四十年少長軍中不眀刑法立性樸滯凡百姓有詞訟取先訴者得理以是人多屈濫為時所非周趙鳳為單州刺史鳳既剛忿不仁得位逾熾刑獄之間尤為不道嘗斷殺賊丁鸞而納其室又民家女趙哥者許嫁李誨未成婚鳳逼納之母楊辭以女許嫁不可鳳叱之與三縑携之入第楊號泣告訴鳳怒召李誨及行媒崔氏并楊氏三人俱決杖五十經兩月餘楊氏又號於州門鳳出趙哥見楊子母俱鞭臀十七仍配趙哥為州妓又鳳妻兄劉遷納州民馮氏女為妾馮氏母詣州訟遷鳳召遷與馮氏母俱杖之馮氏訴有娠鳳鞭背十七逓之外鎮又成武縣僧智源弟子智佺竊智源錢十八千告官勘鞫伏罪其弟子誣師與尼姦械繫智源六十餘日須令伏姦鞭眷十七盡沒其資財又單州民張翰張珪姚誨等訴男張𢎞滋等被趙鳳巡捕時拷捶令伏與賊通納賂方免譴讓秦開郡縣之制漢重牧守之選崇其服章授以符契自兹厥後其寄彌隆所以分字烝黎大暢王澤其有馮朱旛之軾據黄堂之坐遐棄厥職罔思其憂忘䘏緯之義昧守器之道奉制令而不謹決爰書而多誤或巽懦不事沉湎自安投刄乖方代庖違舊虧損於儀序受譏於謡詠以致綱紀廢墜圖籍參互枹鼓競發獄訟滋豐虧共治之規煩切責之詔既速官謗用干刑書皆著於篇以警厥後云漢嚴助武帝時為㑹稽太守數年不聞問無善聲賜書曰制詔㑹稽太守君厭承眀之廬承眀廬在石渠閣外直宿所止曰廬勞侍從之事懐故土懐思也出為郡吏㑹稽東接於海南近諸越越種非一故言諸北枕大江間者濶絶久不聞問具以春秋對毋以蘇秦從横從音子容切助恐上書謝稱春秋天王出居於鄭不能事母故絶之周恵王之子襄王也弟叔帶有寵於恵后恵后欲立之故襄王避難而出奔也僖公二十四年經書天王出居於鄭公羊傳曰王者無外此其言出何不能事母者臣事君猶子事父母也臣助當伏誅陛下不忍加誅願奉三年計最舊法當使丞奉歳計令躬自欲入奉也又曰最凡要也詔許吾丘夀王武帝時為東郡都尉是時軍旅數發年歳不熟多盜賊詔賜夀王璽書曰子在朕前之時智畧輻凑無方而室若車輪之歸於轂也以為天下少雙海内寡二及至連十餘城之守任四千石之重郡守都尉皆二千石以夀王為都尉不置太守兼於二任故云四千石也職事並廢盜賊從横從音子容切甚不稱在前時何也夀王謝罪謁言其狀復徵入為光祿大夫侍中黄柔武帝時為汝南太守坐知民不用赤側錢為賦免為鬼薪時並令以充賦而汝南不奉詔令公孫度武帝時為南陽太守坐詔徵鉅野令史成詣公車度留不遣免為城旦郝賢武帝時為上谷太守坐入戎卒財物計謾免上財物之計簿而欺謾不實公孫戎奴武帝時為上黨太守坐發兵擊匈奴不以聞免黄覇宣帝時為京兆尹坐發民治馳道不先聞又發騎士詣北軍馬不適士闗西人謂補滿為適馬少士多不相補滿也劾之軍興運貶秩有詔歸頴川太守官以八百石居治如其前鮑宣為豫州牧歳餘丞相司直郎欽奏宣行部乘傳去法駕行音下更切傳音張戀切駕一馬言其單率不依典制也舍宿鄉亭為衆所非宣坐免歸家後漢王梁光武時為河南尹梁穿渠引糓水注雒陽城下東瀉鞏川及渠成而水不流七年有司劾奏之梁慚懼上書乞骸骨乃下詔以梁前將兵征伐衆人稱賢故擢典京師建議開渠為人興利旅力既愆迄無成功旅衆也愆過也言衆力已過而功不成百姓怨讟談者諠譁雖蒙寛宥猶執謙退君子成人之羙論語載孔子之言也其以梁為濟南太守任延光武時為九真太守視事四年徵詣雒陽以病稽留左轉睢陽令後為武威太守坐擅誅差不先上左轉召陵令謝庾吾章帝時為鉅鹿太守後以行春乘柴車從兩吏冀州刺史上其儀序失中有損國典左轉下邳令晉袁耽為歴陽太守成帝咸康初石季龍㳺騎十餘匹至歴陽耽上列不言騎少時胡寇强盛朝野危懼王導以宰輔之重請自討之既而賊騎不多又已退散導止不行朝廷以耽失於輕妄黜之宋袁豹晉末為丹陽尹坐使徒上錢降為太尉諮議參軍張永眀帝時為左將軍㑹稽太守有賔客謝方童阮頃何逵之等竊其權贓貨盈積方童等下獄死永乃降號冠軍將軍檀韶為瑯邪内史坐六門内乘輿白衣領職蔡興宗為安西將軍郢州刺史坐詣尚書切論以何始真為諮議叅軍初不被許後又重陳帝怒貶號平西將軍南齊王琨初仕宋眀帝時為吳郡太守坐在郡用朝舍錢三十六萬營餉二宫諸王及作絳襖奉獻軍用左遷光祿大夫後為㑹稽太守坐誤竟囚降號冠軍將軍王倫之為豫章太守武帝幸瑯邪城倫之與光祿大夫全景文等二十一人坐不參承為有司奏免官裴昭眀眀帝時為廣陵太守帝以其在事無所啟奏代還責之昭眀曰臣不欲競執闗鍵故耳後魏陳建文成帝時為幽州刺史假秦郡公帝以建貪暴惰弱遣使就州罰杖五十皮喜為散騎常侍豫州刺史詔讓其在州寛怠以飲酒廢事威不禁下遣使者就州決以杖罰韓均獻文時為冀州刺史都督定冀相三州軍事均懐新附之民咸受優復然舊人姦逃者多往投焉均表陳非便朝議罷之言後均所統刼盜頗起詔書誚讓之王襲孝文時為并州刺史車駕詣雒路幸其治民庶多為立銘置於大路虚相稱羙或云襲所敎也帝聞而召問之對不以實因是面被責讓尚書奏免其官准降號二等元修義孝眀時為秦州刺史表陳庶人禧庶人愉等請宥前愆賜塟陵城靈太后曰收塟之恩事由上㫖藩岳何得越職干陳元弼孝眀時為河東太守太原太守韓伯華為弼所辱其姪子熙乃泣訴朝廷詔遣按簡弼遂大見詰讓隋梁彦光髙祖開皇初為相州刺史鄴都雜俗人多變詐為之作歌稱其不能理化帝聞而譴之韋冲開皇中為南寧州總管兄子伯仁隨冲在府掠人之妻士卒縱暴邊人失望髙祖聞之大怒令蜀主秀按其事益州太守元巖性方正按冲無所寛貸竟坐免官長孫平開皇中為相州刺史在州數年㑹正月十五日百姓大戲畫衣裳為鍪甲之象帝怒而免之唐顧少連徳宗時為京兆尹京兆上言好畤風雨雹傷夏麥幅員二十餘里帝命縣吏與品官同覆視不實詔罰少連已降有差裴行立為費州刺史憲宗元和四年閠三月勑行立違制書迂路詣觀察使宜罰一月俸料觀察使郗士羙不舉奏罰一季俸裴瑾為金州刺史以上供違㫖條限為度支所奏罰一季俸料屬官免殿者八人栁公綽為湖南觀察使崔芃為江南觀察使元和七年三月勑公綽崔芃所進絹等所司奏聞各有欠少事縁貢獻皆合精詳致使闕遺固非審慎栁公綽宜罰兩季俸料崔芃罰一季俸袁滋為襄州觀察使有李洪者嘗為前觀察使于頔推官按罪深刻以奉頔之指使有小卒吏為洪所鞫不勝其忿因抽佩刀以斫洪數瘡頔為洪殺卒吏歸洪於汝州及頔坐事降責則洪之前過益彰既配流之出襄州軍吏謀刼洪以殺之滋知之慮其亂因杖洪十五而後上聞為御史所舉罰一月俸料李銛為京兆尹坐縱獄罰一月俸初鄠縣人崔易簡與堂兄立數以財競他日陰使奴殺立而埋之有發其事者易簡博陵右族且多姻戚之援銛因其殺立而不使窮究罰推官而杖其典及縣尉陳中師移攝法曹重按之帝命御史䑓覆得其情且言奴殺立而易簡酬以錢帛具獄上奏故罰之王遂為鄧州刺史元和九年御史䑓奏遂輒詣觀察使有違前後勑文遂坐罰一季俸趙宗儒為河中尹晉絳慈隰等節度觀察使元和九年赴鎮後擅用供軍錢八千貫坐罰一月俸烏重裔令狐楚魏義通並為懐州刺史穆宗長慶元年六月知懐州河南節度參謀兼監察御史韋珩奏論當州元和九年秋至十四年夏准聖㫖額外加徵并節度使司簡見苖徵子及草等共計五百六十萬三千五百八十石束勑曰前刺史烏重𦙍等並位居守土職在牧人加税縱緣軍須豈得不先聞奏遇赦雖當原宥亦合量有科懲烏重裔令狐楚魏義通等宜各罰一月俸料知州官釋放劉遵古為京兆尹長慶二年六月詔曰遵古官守尹寺所寄非輕奏事之間先須摭實闕於詳審須示薄懲宜罰一月俸料遵古前奏于方等陰事及有詔獄遂令所由潜羅元稹私第為稹所斥故坐罰崔元畧為京兆尹兼御史大夫敬宗寶歴元年四月詔元畧宜削兼御史大夫元畧為京兆尹誤用詔條畿内放錢萬七千貫侍御史蕭徹於閣門彈奏詔命刑部郎中趙元亮大理正元從質侍御史温造鞫其事不謬故有是命殷侑為江西觀察使寶歴二年三月侑上言請於洪州寶歴寺置僧尼戒壇勑殷侑故違制令擅置戒壇須示薄懲用警方任罰一季俸料其戒壇勑停沈傳師為江西觀察使文宗太和三年十月奏當道未具戒僧尼等願因降誕之月於當州開方等道塲凡私度之人皆與正度詔曰不度僧尼累曾有勑傳師既為藩守合奉條詔誘致迷妄須示薄懲罰一月俸料戒僧勒停陳君奕為鳳翔節度使文宗開成元年九月己卯詔罰君奕兩月俸以舊制西藩非賀正賀冬繼好使臣不至論屈熱等不由三事而來節度使宜留之奏聽朝㫖君奕不遵舊制故有是罰李頴為鄭州刺史開成三年六月詔曰鄭州中牟縣私置壇塲度僧一百六十人並抑勒歸邑役其刺史李頴罰一季俸料攝縣令前管城縣令叔良停攝官仍殿本官兩選鄭復為京兆尹開成四年六月勑罰復攝祭在郊外信宿不辭䑓丞御史中丞髙元裕舉舊事以請故也裴𢎞泰為鄭滑節度使開成四年十一月𢎞泰奏慶成節日放當州囚徒以資聖夀詔曰𢎞泰以慶成令節擅放纍囚雖曰竭誠且為干禁恐開後例須示薄懲宜罰一月俸料後唐孔知鄴眀宗天成三年為濮州刺史先為船糧妄稱迯却人戸奉勑大駕省巡六師屯聚覽有司所奏慮軍食稍虧須議轉般然後供贍事非獲已理在權行而濮州地里匪遥戸民不少纔承㫖命廣奏逋逃及降條流却申齊足頗驚聞聽猶涉因循盖撫馭之無方致黎氓之暫惑既乖體國何以濟時尚緣裝發已齊轉納將畢聊從薄罰以誡衆多孔知鄴罰一月俸曹廷隱為齊州防禦使天成三年以舉奏失實配流永州張進為鄭州防禦使咸繼威為副使眀宗長興元年五月勑自張進等或位分符竹或職倅郡城殊乖警備之方致此敓􅜙之苦更容虚誑不戢元隨須舉憲章以為懲戒宜勒停見任以盜掠城中居人故也藥縱之為磁州刺史縱之迂疎在郡弛於撫馭每王人經繇傲睨不接藉藉言之歳餘罷之馮暉為興州刺史末帝清泰初配同州衙前安置暉為興州屯乾梁蜀人來侵暉自屯所奔歸鳳翔故有是責康承詢為丹州刺史清泰三年閠十一月停任配流鄧州時承詢奉詔率義軍赴延州義軍亂承詢奔鄜州故有是責晉郭重義為内園使留守雒京髙祖天福二年七月勑重義先因張從賔作亂之時收田承肇妻女入宅宜收身定罪以聞者詔決杖勒停所職慕容彦超天福中為濮州刺史違法配歛貸官麥造麴俵配部民及移典頴州為濮民所訟詔下御史䑓獄彦超伏罪漢祖鎮并州上章救解朝廷不得已曲法減死配流房州王徹為懐州刺史天福中坐斷獄不平罰征馬十匹陳延福為房州刺史少帝開運二年為民任行通所論創置支計司迴圖錢物及改移市井末利下御史䑓鞫云其支計迴圖是本州舊事改移市井充公家使用勑曰陳延福位居牧守首被訟論移市肆以創迴圖已彰生事假役夫而科採捕猶驗擾人但以稱贍本州云承累政雖除姦革弊全昧經心而案罪計贓未眀人已聊從懲罰用顯含洪宜罰征馬十匹放周趙鳳為單州刺史太祖廣順三年十二月御史䑓奏鳳在任日殘虐百姓非理科率十六事勑趙鳳驟承委寄合禀憲章臨民不利於撫綏率性但聞於􅇯暴㳂淮巡寇當年之殘忍難名近郡頒條在任之貪虐猶甚奪部民之妻女率州戸之資財招納賊徒搔擾生聚爾不奉法國有常刑其趙鳳宜削奪在身官爵賜自盡石仁贇為申州刺史世宗顯徳五年十一月責授右清道府率先是命諸道州府悉於京師創修邸院時仁贇方為郡守不時禀命故黜之册府元龜卷六百九十九
