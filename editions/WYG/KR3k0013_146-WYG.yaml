body:
  text: 冊府元龜卷一百四十六宋王欽若等撰帝王部䘏下周官大司徒之職以慈幼養老賑窮恤貧寛疾之道佐天子保安萬民傳亦云孤獨矜寡天民之窮而無告者也皆有常餼盖任天下之重司生民之命一夫不獲其所若已推之溝中斯堯舜之用心也中代而下哲王繼踵取憲前軌勤恤人隠乃有哀其惸獨軫其凶沴賜糓帛以助其養葺廬舍以寧其居流徙者加之存撫夭札者與之藏斂復丁年以待老寛鄉遘以利民獸為暴者為之驅除行所過者賦以直物蒐狩之所及戒其侵暴寒暑之遘厲資以醫砭以至羣司百執恪居朝夕或畏景流爍嚴颷栗烈塗潦洳沮亦免其朝謁斯皆在人上者厚下安宅表微惻隠之至也詩曰哿矣富人哀此􅑏獨易所謂損上益下民説無疆者是之謂歟漢文帝十三年六月賜天下孤寡布帛絮各有數景帝元年正月詔曰間者嵗比不登民多乏食夭絶天年朕甚痛之郡國或磽陿無所農桑􅌛畜磽謂磽确瘠薄也陿隘也􅌛謂食養之也畜牧放也廣薦草莽水泉利而不得從麋鹿食曰薦一曰草稠曰薦深曰莽其議民欲徙寛大地者聽之武帝元狩元年四月詔朕哀夫老眊孤寡鰥獨八十曰眊老稱也一曰眊不眀之貎或匱於衣食甚憐愍焉其遣謁者巡行天下存問致賜致送至也九十已上及鰥寡孤獨帛人二疋絮三斤八十以上米人三石六年六月遣博士禇等六人禇大也分循行天下存問鰥寡廢疾無以自振業者貸與之元封元年十月行所廵至博奉髙蛇丘歴城梁父加年七十已上孤寡帛人二疋二年春幸緱氏遂至東萊四月還祠泰山至瓠子臨決河賜所過孤獨髙年米人四石六年三月幸汾隂祠后土神光三燭賜天下貧民布帛人一疋太始三年二月行幸東海琅琊登之罘浮大海冬賜行所過户五千錢鰥寡孤獨帛人一疋昭帝始元四年七月詔曰比嵗不登民匱於食流庸未盡還流庸謂去其本鄉而行為人庸作往時令民共出馬其止勿出諸給中都官者且減之元鳯二年六月詔曰朕閔百姓未贍前年減漕三百萬石頗省乘輿馬及苑馬以補邊郡三輔傳馬其令郡國毋斂今年馬口錢所謂租及六畜也宣帝地節三年三月詔曰鰥寡孤獨髙年貧困之民朕所憐也前下詔假公田貸種食其加賜鰥寡孤獨髙年帛二千石嚴教吏謹視遇毋令失職職常也失職謂失其常業也四年九月詔曰朕惟百姓失職不贍遣使者循行郡國問民所疾苦吏或營私煩擾不顧厥咎朕甚閔之今年郡國頗被水災已賑貸鹽民之食而賈咸貴衆重困其減天下鹽賈元康元年三月以鳯凰集泰山甘露降未央宫賜鰥寡孤獨帛二年三月以鳯凰甘露降集賜天下鰥寡孤獨髙年帛三年春以神爵數集泰山賜鰥寡孤獨髙年帛四年三月詔以神爵集長樂未央宫賜鰥寡孤獨帛各一疋神爵元年三月改元賜鰥寡孤獨髙年帛四年二月以修興泰一五典后土之祠神光顯著賜鰥寡孤獨髙年帛五鳯三年三月以鸞鳯又集長樂官加賜鰥寡孤獨髙年帛一元帝初元元年四月賜鰥寡孤獨帛人二疋五年四月賜鰥寡孤獨帛人二疋永光二年三月賜鰥寡孤獨髙年帛三年三月賜鰥寡孤獨髙年帛四年十月詔曰安土重遷黎民之性骨肉相附人情所愿也頃者有司縁臣子之義奏徙郡國民以奉園陵令百姓逺棄先祖墳墓破業失産親戚别離人懐思慕之心家有不安之意是以邊陲被虛耗之害關中有無聊之民非久長之䇿也詩不云乎民亦勞止汔可小康恵此中國以綏四方今所為初陵者勿置縣邑使天下咸安土樂業亡有動揺之心布告天下令眀知之五年秋潁川水出流殺人民吏從官縣被害者與告從官即上侍從之官也言凡為吏為從其官本縣有被害皆與休告士卒遣歸成帝建始元年三月賜鰥寡孤獨錢帛各有差河平四年三月遣光禄大夫博士嘉等十一人行舉瀕河之郡廵行而舉其状瀕水厓也瀕河言傍河也水所毁傷困乏不能自存者財振貸財與裁同謂量其等差而賑貸之其為水所流壓死不能自葬令郡國給槥櫝葬埋槥櫝謂小棺已葬者與錢人二千避水它郡國在所冗食之冗散禀食使得生活不占著户給役使也謹遇以文理無令失職陽朔二年秋闗東大水詔流民欲入函谷天井壺口五阮闗者勿苛留天井在上黨髙都壺口在壺闗五阮在代都苛細刻也遣諫議大夫博士分行視鴻嘉元年二月詔加賜鰥寡孤獨髙年帛四年正月詔水旱為災闗東流冗者衆冗散失其事業也青幽冀部尤劇朕甚痛焉已遣使者循行郡國流民欲入闗輙籍内録其名籍而内之所之郡國謹遇以理之往也務有以全活之思稱朕意哀帝以綏和二年四月即位是年秋詔曰廼者河南潁川郡水出流殺人民壊敗廬舍遣光禄大夫循行舉籍舉其名籍賜死者棺錢人三千平帝元始二年四月郡國大旱民疾疫者舍空邸第為置醫藥舍止也賜死者一家六尸以上葬錢五千四尸以上三千二尸以上二千起官寺市里募徙貧民縣次給食至徙所賜田宅什器假與犂牛種食又起五里於長安城中民居之里宅二百區以居貧民四年二月賜天下鰥寡孤獨髙年帛後漢光武建武六年正月詔曰往嵗水旱蝗蟲為災榖價騰踊言踊貴也人用困乏朕惟百姓無以自贍惻然愍之其命郡國有榖者給廪廪賜榖也髙年鰥寡孤獨及老癃無家属貧不能自存者如律漢律令云二千石勉加循撫無令失職二十二年九月詔曰日者地震南陽尤甚賜郡中居人壓死者棺錢人三千吏人死亡或在壊垣毁屋之處而家羸弱不能収拾者其以見錢榖取傭為尋求之二十九年二月丁巳朔日有食之賜天下鰥寡孤獨老癃貧不能自存者粟人五斛三十年五月大水賜天下鰥寡孤獨老癃貧不能自存者粟人六斛眀帝永平二年十月行養老禮詔有司其存耆耋恤幼孤恵鰥寡稱朕意焉三年二月立皇太子賜天下鰥寡孤獨老癃貧不能自存者粟人五斛十二年五月賜天下鰥寡孤獨老癃貧無家属不能自存者粟人三斛十七年五月賜天下鰥寡孤獨老癃貧不能自存者粟人三斛十八年四月詔自春已来時雨不降宿麥傷旱秋種未下其賜天下鰥寡孤獨老癃貧不能自存者粟人三斛章帝以永平十八年八月即位十月大赦賜鰥寡孤獨老癃貧不能自存者粟人三斛建初元年正月詔三州郡國方春東作恐人稍受廪往来煩劇或妨農耕廩給也稍謂少少給之不頻與也其各實覈尤貧者計所貸并與之流人欲歸本者郡縣其實廪令足還到聼過止官亭無孤舍宿長吏親躬無使貧弱遺脱小吏豪右得容姦妄詔書既下勿得稽留刺史眀加督察尤無状者三年三月立皇后賜鰥寡孤獨老癃貧不能自存者粟人五斛四年四月立皇太子賜鰥寡孤獨老癃貧不能自存者粟人五斛元和元年二月詔曰自告疫以来榖食連少其令郡國募人無田欲徙地界就肥饒者恣聼之到在所賜給公田為雇耕傭賃種􅀈􅀈糧也與餉同貰與田器勿収租五嵗除筭三年其後欲還本鄉者勿禁三年正月詔曰盖君人者視民如父母有􅉃怛之愛有忠利之教匍匐之救其嬰兒無父母親属及有子不能養食者廪給如律和帝永元三年十月行幸長安賜行所過鰥寡孤獨篤癃貧不能自存者粟人三斛五年二月詔曰去年秋麥入少恐民食不足其上尤貧不能自給者户口人數往者郡國上貧民以衣履釡鬵為貲而豪右得其饒利方言曰甑自闗而東謂之鬵貧人既計釡甑以為貲財懼於役重多即賣之以避利税豪富之家乗賤買故得其饒利詔書實覈欲有以益之而長吏不能躬親及更徴召㑹聚令失農作愁擾百姓若復有犯者二千石先坐八年二月立皇后賜天下鰥寡孤獨篤癃貧不能自存者粟五斛十二年二月詔賜被災諸郡鰥寡孤獨不能自存者及郡國流民聼人陂池漁採以助蔬食三月詔曰比年不登百姓虛匱匱乏也京師去冬無宿雪以其經冬故言宿也今春無㴻雨黎民流離困於道路其賜鰥寡孤獨老癃貧不能自存者粟人三斛十五年閏正月詔流民欲歸還本而無糧食者所過實廪之疾病加致醫藥其不欲還歸者勿强元興元年十二月立皇太子賜天下鰥寡孤獨老癃貧不能自存者粟人三斛安帝永初元年十一月勅司𨽻校尉冀并二州刺史民訛言相驚棄損舊居老弱相㩦窮困道路其各勑所部長吏躬親曉諭若欲歸本郡在所為封長檄不欲勿强封謂印封之也長檄猶今長牒也欲歸者皆給以長牒為騐元初六年二月詔曰夫政先京師後諸夏月令仲春養幼小存諸孤季春賜貧窮賑乏絶省婦使婦使謂組紐之事表貞女所以順陽氣崇生長也其賜尤貧困孤弱單獨榖人三斛四月㑹稽大疫遣光禄大夫将太醫循行疾病死者賜棺木除田租口賦永寧元年四月賜鰥寡孤獨貧不能自存者榖人三斛十一月郡國三十五地震或拆裂遣光禄大夫按行賜死者錢人二千延光元年三月改元大赦加賜鰥寡孤獨老癃貧不能自存者粟人三斛是嵗京師及郡國二十七雨水大風殺人詔壓溺死者年七嵗以上錢人二千其壊廬舍己失榖食粟人三斛若一家人皆災害而弱小存者郡縣為収斂之順帝永建元年正月大赦賜鰥寡孤獨老癃貧不能自存者粟人五斛二年二月詔荆豫兖冀四州流冗貧人所在安業之疾病致醫藥三年正月京師地震漢陽地裂詔實覈傷旱者賜年七嵗已上錢人二千一家被害郡縣為収斂四年正月帝加元服賜鰥寡孤獨老癃不能自存者帛人一疋八月以五州雨水遣使實覈死亡収斂廪賜陽嘉元年正月立皇后賜鰥寡孤獨老癃貧不能自存者粟人五斛十一月甲申望都蒲隂狼殺女子九十七人詔賜狼所殺者錢人三千永和二年十月行幸長安所過鰥寡孤獨貧不能自存者賜粟人五斛三年二月京城及金城隴西地震山摧地䧟遣使按行三郡賜壓死者七嵗以上錢人二千一家皆被害為収斂之建康元年正月辛丑詔曰隴西漢陽張掖北地武威武都自去年九月已来地百八十震山谷拆裂壊敗城寺殺害民庶夷狄叛逆賦役重數内外怨曠惟咎歎息其遣光禄大夫按行宣暢恩澤恵此下民勿為煩擾質帝本初元年二月庚辰詔曰九江廣陵二郡數罹冦害殘夷最甚生者失其資業死者暴尸原野昔之為政一物不得其所若已為之况我元元嬰此困毒方春戒節賑濟之厄掩骼埋胔之時其調北郡見榖出廪窮弱収葬骨骸務加理䘏以稱朕意五月海水溢使謁者按行収葬樂安北海人為水所漂沒死者桓帝建元元年正月大赦賜鰥寡孤獨老癃貧不能自存者粟人五斛三年十一月詔曰朕攝政失中災眚連仍三光不眀隂陽錯序監寐寤歎疢如疾首監寐言雖寢而不寐也寤覺也今京師厮舍死者相枕郡縣阡陌處處有之甚違周文掩胔之義其有家属而貧無以葬者給直三千喪主布三疋若無親属可於官壖地葬之表識姓名為設祠祭又徙在作部疾病致醫藥死亡厚埋藏民有不能自流及振移者廪榖如科州郡檢察務崇恩施以康我民元嘉元年正月京師疾疫使光禄大夫将醫藥按行永興二年六月詔司𨽻校尉部刺史曰蝗災為害水變仍至五榖不登人無宿儲其令所傷郡國種蕪菁以助人食永夀元年六月雒水溢又南陽大水詔被水死流失屍骸者令郡縣鉤求収葬及所唐突壓溺物故七嵗已上賜錢人二千永康元年八月六州大水勃海溢詔州郡賜溺死者七嵗以上錢人二千一家皆被害者悉為収斂靈帝建寧四年三月大疫使中謁者廵行致醫藥熹平二年正月大疫使使者廵行致醫藥光和二年春大疫使常侍中謁者廵行致醫藥魏眀帝太和六年三月癸酉東廵所過存問髙年鰥寡孤獨賜榖帛晉武帝太始七年六月大雨霖伊雒河溢流居人四千餘家殺三萬餘人有詔賑貸給棺咸寧二年七月河南魏郡暴水殺百餘人詔給棺三年三月帝将射雉慮損苖而止太康元年三月改元大赦詔恤孤老困窮恵帝永平元年五月賜鰥寡孤獨帛人三疋眀帝太寧三年三月立皇太子賜鰥寡孤獨帛人二疋成帝咸和元年二月改元大赦賜鰥寡老孤米人二斛康帝建元元年正月改元賑恤鰥寡孤獨魏帝升平元年八月立皇后賜鰥寡孤獨米人五斛五年五月戊戌大赦賜鰥寡孤獨不能自存者粟人五斛海西公太和六年四月賜窮獨米五斛簡文帝咸安元年十一月即位賜鰥寡孤獨米人五斛孝武帝太元五年六月以比嵗荒儉大赦其鰥寡孤獨老不能自存者人賜米五斛安帝義熙元年正月賜鰥寡孤獨榖人五斛後魏道武天興元年正月庚子自中山行幸常山之真定次趙郡之髙邑遂幸於鄴民有老不能自存者詔郡縣賑恤之太武太延元年二月詔長安及平凉民徙在京師其孤老不能自存者聼還鄉里三年二月幸幽州存孤老問民疾苦獻文皇興四年三月詔曰朕思百姓病苦民多非命眀發不寐疢深疾首是以廣集良醫逺採名藥欲以救䕶兆民可宣告天下民有病者所在官司遣醫就家診視所湏藥物任醫量給之孝文延興三年九月詔曰今京師及天下囚未判在獄致死無近親者給衣衾棺櫝葬之不得暴露太和三年十一月賜京師貧窮髙年疾患不能自存者衣服布帛各有差五年二月大赦賜窮孤不能自存者榖帛各有差六年三月辛巳幸武州山石窟寺賜窮老者衣服四月甲申賜畿内鰥寡孤獨不能自存者粟帛有差七年四月壬子幸崞山賜所過鰥寡不能自存者衣服粟帛十二年正月詔曰鎮城流徙之人年滿七十孤单窮獨雖有妻妾而無子孫諸如此等聼觧名還本諸犯死刑者父母祖父母年老更無成人子孫旁無朞親者具状以聞十三年四月詔曰昇樓散物以賚百姓至使人馬騰踐多有毁傷今可斷之以本所費之物賜窮老貧獨者十七年七月立皇太子賜鰥寡孤獨不能自存者粟人五斛九月幸并州詔雒懐并肆所過四州恤鰥寡孤獨各有差十八年正月南廵詔相兖豫三州恤鰥寡孤老各有差八月幸懐朔武川撫寘柔𤣥等四鎮問人疾苦貧窘孤老者賜以粟帛又詔禦夷城人年滿七十已上及廢疾之徒較其元犯以准新律事當徒坐者聼一身還鄉又令一子扶養終命之後乃遣歸邊自餘之處如徒之犯年八十已上皆聼還十一月詔冀定二州恤鰥寡各有差十二月南伐詔郢豫二州恤鰥寡孤老各有差十九年四月曲赦徐豫二州恤孤寡老疾各有差六月南伐還詔車駕所經者恤孤寡老疾各有差十月幸鄴還詔曲赦相州恤孤老痼疾各有差二十年七月丁亥詔疾苦六極人神所矜宜時訪恤以窮廢鰥寡困乏不能自存者眀加矜恤令得存濟又詔夫婦之道生民所先仲春奔㑹禮有違式男女失時者以理㑹之二十一年五月幸長安還汎渭入河詔孤寡鰥貧為賜榖帛九月丙申詔曰哀窮恤老王者所先鰥寡六疾尤宜矜愍可勑司州雒陽之民年七十以上無子孫六十已上無期親貧不能自存者給以衣食及不滿六十而有廢痼之疾無大功之親窮困無以自療者皆於别坊遣醫救䕶給太監帥四人豫請藥物以療之宣武景眀二年三月詔曰比年以来連有軍旅役務既多百姓凋弊宜時矜量以拯民瘼正調之外諸坊調損民一時蠲罷永平三年十月詔曰朕乗乾御歴年周一紀而道謝擊壤教慙刑厝至於下民之㷀鰥疾苦心常愍之此而不恤豈為民父母之意也可勑太常於閒敞之處别立一館使京畿内外疾痼之徒咸令居處嚴勑監署分帥療治考其能否而行賞罰雖齒數有期修短分定然三疾不同或賴針石庶秦扁之言理騐今日矣又經方浩博流傅處廣應病投藥率難窮究更令有司集諸醫工尋篇推簡務存精要取三十餘卷以班九服郡縣備寫布下鄉邑使知救患之術耳延昌元年四月詔曰肆州地震䧟裂死傷甚多言念毁沒有酸懐抱亡者不可復追生病之徒宜加療救可遣太醫折傷醫并給所湏之藥就治之六月詔曰去嵗水災今春炎旱百姓饑餒救命靡寄雖經􅅙月不能養績今秋輸将及郡縣其於責辨尚書可嚴勒諸州量民貲産眀加檢㸃以救艱敝二年十二月詔以鎮肆地震人多罹災其有課丁役盡老幼单立家無受復各賜廪米以接来稔孝眀熙平元年十二月詔雒陽河隂及諸曹雜人年七十已上鰥寡貧困不能自存及年雖少而痼疾長廢窮苦不濟者宰司研實具列以奏聞神龜元年正月詔賜京畿及諸州鰥寡孤獨栗帛出帝太昌元年五月丁未詔曰無侮惸獨事炳前經恵此鰥寡聲留往冊朕以薄徳作民父母乃眷元元寤言增歎今理運惟新哀矜伊始如有孤老疾病無所歸依者有司眀加隠括依格賑贍後周眀帝武成元年六月大霖雨詔遭水者有司時廵檢簡條例以聞武帝建徳三年十月詔蒲州民遭饑交絶者令向郿城以西及荆州管内就食六年二月平齊詔曰毋侮㷀獨事顯前書哀彼矜人恵流往訓偽齊末政昏虐實繁哭甚稽天毒流比屋無罪無辜係虜三軍之手不飲不食僵仆九逹之間朕為民父母職養黎人甚念泣辜誠深罪已除其苛政事属改張宜加寛宥兼行賑䘏其癃殘孤老饑餒絶食不能自存者仰刺史守令及親民長司躬自檢校無親属者所在給其衣食務使存濟隋髙祖開皇十四年八月闗中大旱人饑行幸雒陽因令百姓山東就食從官竝准見口賑給不以官位為限十二月東廵狩闗中户口就食雒陽者道路相属帝勑斥候不得輙有驅逼男女參厠於仗衞之間遇逢扶老㩦幼者輙引馬避之慰勉而去至艱險之處見負擔者遽令左右扶助之冊府元龜卷一百四十六
