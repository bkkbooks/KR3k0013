body:
  text: 册府元龜卷四百三十四宋王欽若等撰將帥部獻㨗大雅云江漢湯湯武夫洸洸經營四方告成于王周禮曰大司樂王師大獻令奏愷樂若夫奉專征之寄董伏順之師授鉞登壇為萬夫之長班師振旅成七徳之功漢魏以還簡䇿具載則有内承廟筭外震戎容拓土開疆斬俘獻馘至于尅隣國之勍敵破異俗之餘妖或殱厥叛臣或收其故地所以見帝王之神武宣邦國之威靈傳曰飲至䇿勲此之謂矣魯僖公既伐淮夷十三年使武臣獻馘故泮水之詩曰矯矯虎臣在泮獻馘晉文公齊師宋師秦師及楚人戰于城濮魯僖公二十八年楚師敗績七月丙申振旅愷以入于晉愷樂也獻俘授馘飲至大賞授數也獻楚俘於廟漢韓信髙祖為漢王時信以左丞相擊魏虜魏王豹定河東請漢王願益兵三萬人北舉燕趙漢王與兵萬人遣張耳與俱進擊趙代信破代擒夏説閼與夏説代相閼與邑名又破趙軍擒趙王歇用廣武君䇿發使燕燕從風而靡乃遣使報漢因請立張耳王趙以撫其國趙充國宣帝時為後將軍征諸羗奏言羗本可五萬人軍凡斬首七千六百級降者三萬一千二百人溺河湟饑餓死者五六千人定計遺脱與煎鞏黄羝俱亡者不過四千人羗靡忘等自詭必得詭責也自以為憂責言必能得之請罷屯兵奏可充國振旅而還陳湯元帝時為西域副校尉湯與使西域都䕶騎都尉甘延夀誅郅支單于上疏宜縣槀街事下有司丞相衡御史大夫延壽並奏以為郅支及名王首更歴諸國蠻夷莫不聞知月令春掩骼埋胔之時宜勿縣車騎將軍許嘉右將軍王商以為春秋夾谷之㑹優施笑君孔子誅之方盛暑首足異門而出宜縣十日廼埋之有詔將軍議是後漢冦恂字子翼為河内太守光武建武元年更始將朱鮪聞光武北而河内孤使討難將軍蘇茂副將賈彊將兵三萬餘人攻温恂勒軍擊破之追斬賈彊茂兵投河死者數千人生獲萬餘人時光武傳聞朱鮪破河内有頃恂檄至大喜曰吾知冦子翼可任也耿弇為建威將軍建武五年詔弇討張歩歩奔平夀平夀縣名屬北海郡在青州北海縣乃肉袒負斧鑕於軍門鑕鍖也示必死弇傳歩詣行在所馬援為伏波將軍建武十七年交趾女子徵側及女弟徵貳反璽書拜援將軍以扶樂侯劉隆為副都督樓船將軍叚志等擊之十九年斬徵側徵貳傳首雒陽魏諸葛誕為鎮東大將軍時吳大將軍孫峻等號十萬至夀春誕拒擊破之斬吳左將鍾㑹為鎮西將軍常道鄉公景元四年十一月與征西將軍鄧艾同伐蜀蜀主劉禪詣艾降遣使勅姜維等從東道詣㑹降㑹上言曰姜維與張翼廖化董厥等逃死遁走欲趣成都臣輒遣司馬夏侯咸䕶軍胡烈等徑從劔閣出新都大渡截其前叅軍爰􅒷將軍句安等躡其後叅軍皇甫闓將軍王買等從涪南出衝其腹臣據涪縣為東西勢援維等所統歩騎四五萬人擐甲厲兵塞川填谷數百里中首尾相繼憑恃其衆方軌而西臣𠡠咸闓等令分兵據勢廣張羅網南杜走吳之道西塞成都之路北絶越逸之徑四面雲集首尾竝進蹊路斷絶走伏無地臣又手書申喻開示生路羣冦困逼知命窮數盡解甲投戈面縳委質印綬萬數資噐山積昔舜舞干戚有苖自服牧野之師商旅倒戈有征無戰帝王之盛業全國為上破國次之全軍為上破軍次之用兵之令典陛下盛徳侔蹤前代翼輔忠明齊軌公旦仁育羣生義征不譓殊俗向化無思不服師不踰時兵無血刄萬里同風九州共貫臣輒奉宣詔命導揚恩化復其社稷安其閭伍舎其賦調弛其征役訓之徳禮以移其風示之軌儀以易其俗百姓欣欣人懐逸豫后來其蘇義無以過吳朱然為車騎將軍大帝赤烏九年征桓山魏將李典等聞然深入率歩騎六千斷然後道然夜出逆之軍以勝反先是歸義馬茂懐姦覺誅帝深忿之然臨行上疏曰馬茂小子敢負恩飬臣今奉天威事蒙克㨗欲令所懐震耀逺近方舟塞江使足可觀以解上下之忿惟陛下識臣先言責臣後效帝時抑表不出然既獻㨗羣臣上賀帝乃舉酒作樂而出然表曰此家前初有表孤以為難必今果如其言可謂明於見事也遣使拜然為佐大司馬右軍師晉王濬為龍驤將軍武帝太康元年三月濬以舟師平吳至於建業之石頭孫皓大懼面縳輿櫬降於軍門濬持節解縳焚櫬送于京都孫皓平振旅桓豁為右將軍廢帝太和二年擊南陽反人趙㑹於宛城走之進獲慕容暐將趙槃送於京師宋杜慧度為交州刺史輔國將軍髙祖永初元年率文武萬人南討林邑所殺過半前後被抄畧悉得還本林邑乞降輸生口大象金銀古貝等乃釋之遣長史江悠奉獻㨗沈林子領建熙令封資中侯從髙祖伐羗參西軍事悉署三府中兵為前鋒與冠軍檀道濟同攻潼闗姚泓聞大軍至遣偽康平公姚紹舉闗右之衆設重圍守之林子率麾下數百人犯其西北紹衆小靡乗其亂而薄之紹乃大潰俘虜以千數悉獲噐械資實時將破賊皆多其首級而林子獻㨗書至每以實聞髙祖問其故林子曰夫王者之師本有征無戰豈可復増張虜獲以自誇誕梁曹景宗為右衛將軍武帝天監五年魏軍攻徐州詔景宗攻破之生擒五萬餘人收其軍糧噐械積如山岳牛馬驢騾不可勝計景宗乃捜軍所得生口萬餘人馬千匹遣獻㨗蘭欽為左衛將軍欽南征夷獠擒陳文徹所獲不可勝計獻大銅鼓累代所無陳侯瑱為司空髙祖永定二年二月壬午督衆軍自江入合肥焚齊舟艦三月丙申至自合肥衆軍獻㨗後魏安頡為冠軍將軍太武神䴥四年宋將檀道濟王徳東走諸將追之至歴城而還頡獻宋俘萬餘人甲兵三萬波權喜為征西將軍孝文太和元年十月宋葭蘆戍主楊文度遣弟􅇡襲䧟仇池十二月權喜攻䧟葭蘆斬文度傳首京師傅永為豫州王肅建武將軍平南長史太和中南齊將裴叔業率王茂先李定等來侵楚王戍永適還州肅令永討之獲叔業傘扇鼓幕申仗萬餘兩月之中遂再獻㨗孝文嘉之党法宗為揚州小峴戍主宣武景明三年法宗襲南齊大峴戍破之擒其龍驤將軍邾菩薩送之京師爾朱榮為河北都督畿内諸軍事孝荘建義元年十月榮破葛榮檻送於京師帝臨閶闔門榮稽顙謝罪斬於都市費穆為大都督建義元年十月大破梁軍擒其將曹義宗檻送京師上黨王天穆為大將軍以永安元年四月大破邢杲於齊州之濟南杲降送京師斬於東市北齊彭樂為都督從神武西征樂使告㨗虜西魏臨洮王東蜀郡王榮宋江夏王升鉅鹿王闡譙郡王亮詹事趙善督將僚佐四十八人皆係頸反接手臨以刄歴兩陣而唱名焉唐李勣為右武候大將軍髙祖武徳四年統河南山東之兵以拒王世充及從太宗平竇建徳降世充振旅而還論功行賞太宗為上將李勣為下將勣與太宗俱服金甲乗戎輅告㨗於太廟又從太宗破劉黑闥徐圓朗累遷左監門大將軍圓朗重據兖州反授勣河南大總管以討之尋獲圓朗斬首以獻高宗總章元年命勣為遼東道行軍總管虜高麗王藏及男建男産裂其諸城竝為州縣振旅而還令勣便道以髙藏及男建獻於昭陵禮畢備軍容入京城獻太廟總章元年十二月以髙麗平獻俘於含元殿大㑹勣及部將以下大陳設於庭侯君集為交河道行軍大總管討髙昌國太宗貞觀十四年十二月旋師執髙昌王麴智盛獻㨗于觀徳殿阿史那社尒為崑丘道行軍大總管征龜茲太宗貞觀二十三年執龜茲王訶利布失畢及其相那利等獻於社廟髙偘為左翊衛郎將髙宗永徽元年九月執突厥車鼻可汗獻太廟蘇定方為行軍大總管征賀魯髙宗顯慶三年十一月定方俘賀魯到京師帝謂侍臣曰賀魯背恩今欲先獻俘於昭陵可乎許敬宗對曰古者出而凱還則飲至策勲於廟若諸侯以王命討不庭亦獻俘於天子近代征伐克㨗亦用斯禮未聞獻俘于陵所也伏以園寢嚴敬義同清廟陛下孝思所發在禮無違亦可行也十五日還獻於昭陵十七日告於大社皇帝臨軒大㑹文武百僚夷狄君長定方戎服操賀魯獻于樂懸之北帝責之不能對攝刑部尚書長孫冲跪於階下奏曰伊麗道獻俘賀魯請付所司大理官屬受之以出詔免其死五年定方為左驍騎大將軍討思結闕俟斤都曼獻俘于東都帝御乾陽殿定方操都曼等以獻法司請斬之定方請曰都曼反叛罪合誅夷臣欲生致闕庭與之有約述陛下好生之徳必當待以不死今既面縛待罪臣望與其餘命帝曰朕屈法申恩全卿信誓乃令宥之定方從幸太原制授熊津道行軍大總管討百濟賊師敗績定方等將士引百濟王扶餘義慈太子隆小王孝演孫文思及偽將五十八人皆操右袂抑首以獻竝釋放之裴行儉為定襄道大總管髙宗永隆二年十月行儉等獻定襄所獲突厥俘囚阿史那伏念及温傅等五十四人斬於都市初行儉討伏念待以不死侍中裴夷害其功乃奏曰伏念為副將程務珽逼逐窮急而降帝乃命斬于都市封行儉為聞喜縣公行儉嘆曰渾濬前事古今耻之但恐殺降之後無復來者因稱疾不出建安王攸宜為清邊道大總管則天萬嵗通天二年七月攸宜平契丹凱旋詣闕獻俘李楷固為左玉鈐衛將軍則天久視元年楷固及右武威衛將軍駱務整討契丹餘衆擒之獻俘於含樞殿則天大悦冀良琛為忠萬州討擊使睿宗景雲二年良琛獻俘山賊悉平郭知運為隴右節度使𤣥宗開元五年知運大破吐蕃虜獲囚獻於闕下帝悉免而撫之分配諸州為編户語郭知運及諸將曰吐蕃孤恩負約忘義卿等受委逆挫羣兇焚溺之餘俘獲仍衆覽今獻㨗深用嘉焉王君􅎢為隴右節度使鄯州都督開元十二年君􅎢破吐蕃來獻戎㨗帝置酒于内殿享之謂曰卿能振國威恢邊破敵誠節既著俘獲又多疇庸策勲已有策命卿及將士等竝宜飲至兼有賜物各宜領取張守珪為幽州節度副大使開元二十二年守珪大破林胡遣使獻㨗擇日告廟二十八年八月二十日勅幽州節度奏破奚契丹宜擇日告廟自後諸軍每有克㨗必先告廟葢嘉運為磧西節度使開元二十八年嘉運俘吐火先可汗來獻帝特捨之授以官爵皇甫惟明為隴右節度使𤣥宗天寳五載五月己巳惟明以所獲吐蕃突厥俘來獻太廟哥舒翰為隴右節度使天寳八載翰收隴右石堡城獻功于朝帝御丹鳳樓㑹羣臣下制褒奨髙仙芝為西安四鎮節度天寳十載仙芝生擒突騎施可汗吐蕃大首領及右國王并可敦及羯帥來獻帝御勤政樓㑹羣臣引見楊國忠為劔南節度使天寳十一載國忠破吐蕃數十萬衆於雲南獻俘於廟表曰臣國忠言頃以南蠻閣羅鳳敢背皇恩吐蕃與其潛謀欲於瀘南結聚窺窬越嶲草竊昆明繇是西山諸部及八國子弟知其狡詐同請討除臣當戎行祗奉睿略破吐蕃雲南救兵六十餘萬屠㧞隰州等三所大城擒俘虜六千三百臣以劔山迢逓不可盡來遂簡丁壮千餘并投降首領昨三日於勤政樓奉獻已降殊恩臣又以男女口二百人六日於躍龍門進納陛下以生成之徳不限華夷詔臣曰夫王者之義子育為先每行干紀之誅嘗軫在予之念吐蕃遺孽頻有負恩其君則然其人何罪且全其生理遂彼物情其所獻口并宜釋放逓還本國以直報怨於是乎在微臣於是何幸親奉徳音聞所未聞以忻以感伏惟陛下含𢎞庶品康濟羣生大敷恩信下格昏迷自皇王以來未有如今日者也天下幸甚豈惟諸戎特望宣付史官頒示中外許之安禄山為范陽節度使天寳十四載禄山奏破奚五千騎并破契丹勃朱蜀活等部落賊等除戮之外應獲生口駞馬牛羊甲仗共一百三十二萬叚子璋為越嶲太守肅宗至徳二年三月太上皇在蜀郡叚子璋俘所獲吐蕃生口來獻詰責而捨之萬敵為南陽都知兵馬使至徳二年八月破賊馬軍二千人歩軍二萬餘人與興平軍使李奐斬賊括簡使十數人傳首至鳳翔府郭子儀肅宗時為朔方節度使乾元元年十月子儀告㨗收新鄉縣獲萬餘人馬六千餘匹進圍衛州十一月壬申兵部尚書王思禮奏相州城下破賊二萬人兼獲旗幟噐械二年二月丁未朔子儀破逆賊執其將軍車昻獻俘於朝狥於東西兩市而斬之七月子儀擒逆賊將安太清送闕下子儀至代宗朝為闗東副元帥大歴三年九月子儀率兵五萬自河東移鎮奉天戊戍子儀靈州破吐蕃六萬餘衆文武百僚入賀于紫宸殿京師解嚴十月丁邜子儀至自奉天行營八年十月子儀奏大破吐蕃十萬餘衆己巳文武百官入賀于紫宸殿庭衛伯玉為鎮西行營節度使乾元三年正月伯玉獻俘百餘人至闕下有詔解縳而赦之李光弼為朔方副元帥乾元三年四月奏三月二十九日懐州城下破逆賊安太清馬歩四千餘人今月二日又于河陽西渚東灘破逆賊史思明兵馬三千餘人前後斬一千五百餘級生擒逆賊姪女婿偽衛前兵馬使李秦璧及偽驃騎大將軍特進已下七十餘人田神功為平盧節度都知兵馬使上元元年六月神功奏鄭州城下破賊四千餘衆生擒逆賊大將四人牛馬驢及噐械不可勝數二年二月神功生擒逆賊劉展來獻王仲鼎為淮西申蘄黄沔等州節度使兼知鄭汴等一十三州節度都勾當處置使上元元年九月仲鼎奏破逆賊史思明下將思庭金二萬餘衆斬首二萬餘級獲賊噐械二千餘事元年建丑月仲鼎奏建子月十三日曹州刺史常休明破逆賊偽將軍薛蕚史盡忠李建盧等馬歩三萬餘衆獲噐械二萬餘事熊元皓為兖州刺史上元元年十二月奏破兖鄆史思明下逆賊二千人魚朝恩為陜州觀軍容使元年建丑月奏神策軍節度兵馬建子月六日平逆賊永寧縣鹿脊岡城及破澠池福昌長水等縣一萬餘衆生擒二千餘人斬首三千餘級獲馬畜噐械共五萬已上來瑱為山南節度使鄧州刺史元年建丑月瑱奏斬汝州逆賊五千餘衆牛馬驢并噐械等不可勝數成公意為鄜州刺史奏破勾扇党項賊斬獲偽勅使驃騎將軍都督石金徳等共三千餘衆斬首六百餘級兼獲偽勅文牒并噐械衣装雜物等共三千餘事牛羊雜畜甚衆又檢校鄜州兵馬使内給事林明俊奏破党項一千餘衆斬首四百餘級并驢駞馬噐械甚衆僕固懐恩代宗初為朔方節度使懐恩上言幽州平河北州縣盡平史朝義為亂兵所戮傳首上都馬璘為邠寧節度使代宗大歴三年八月吐蕃大將尚贊摩冦牢州璘破二萬餘衆擒其俘以獻之李勉大歴十一年為汴宋節度使未行汴州將李靈曜阻兵北結田承嗣使姪悦將鋭兵戍之詔勉與李忠臣馬燧等攻討大破之悦僅以身免靈曜北走騎將杜如江擒之勉以獻代宗褒賞甚厚鮮于叔明大歴十一年為劔南西川節度使奏吐蕃冦黎雅兩州大破之㑹南蠻閣羅鳳來援于望漢城生擒吐蕃大籠官論噐然獻于闕下王武俊為成徳軍節度兵馬使徳宗建中三年閏正月武俊殺賊李惟岳傳首京師輔良交為安南都䕶建中三年七月良交斬李孟秋等絳人傳首來獻孟秋為演州司馬與絳州刺史李被岸等舉兵叛自稱安南節度使良交攻殺之哥舒曜為汝州節度使建中四年三月曜收復汝州生擒李希烈偽署刺史周冕以獻斬其將楊謹欽張文江傳首京師李晟為神策軍使徳宗興元元年五月徳宗在梁州賊朱泚為晟等所敗走涇州晟遣衛前將兼御史大夫張少烈上收京師露布至百僚稱賀帝覽之感泣百官皆出涕因上夀稱萬嵗曰晟䖍奉聖謨盪滌兇慝雖古之樹勲力復都邑者往往有之至於不驚宗廟不易市肆長安人不識旗鼓安堵如初三代已來未之有也帝笑曰天生李晟為社稷萬人不為朕也百官再拜而退甲辰幽州將徤韓旻梁庭芳朱惟禮等於寧州彭原縣西斬逆賊朱泚傳首來獻劉洽為宋亳節度興元元年十一月洽與曲環并淄青將李欽瑶大破李希烈軍於陳州城下殺獲逆衆三萬五千人擒其大將翟崇揮以獻命斬於皇城西南隅戊午洽復大破賊收復汴州希烈奔蔡州擒其偽署將相鄭賁劉敬宗張伯元呂子嵒李達于以獻牛名俊為朔方部將徳宗貞元元年八月名俊斬李懐光自降於馬燧河中𫝊懐光首以獻韓全義為夏州節度貞元十四年全義上言破吐蕃衆於鹽州西北韋臯為劔南西川節度十七年九月上言大破吐蕃于雅州是月臯復上言破吐蕃于雅州嚴礪為山南西道節度使憲宗元和元年九月奏破劉闢賊兵二千人於神后縣生擒蠻將牛文悦十月戊子西川行營神策軍使髙崇文檻送逆賊劉闢至京西臨髙驛左右神策兵士迎之以帛繫首及手足曵而入帝御安興樓受俘馘令中使于樓下詰闢反狀闢曰臣不敢反五院子弟為惡臣不能制又遣詰之曰朕遣中使送旌節官誥何故不受闢乃伏罪令獻太廟郊社狥于市即日戮于子城西南隅趙昌為嶺南節度使元和二年四月昌進􅌦笇儋振萬安五州三十二洞歸降圖是日宰臣表賀請付史官從之張子良為潤州大將元和二年節度李錡反子良及李奉仙白少卿裴行立等生擒錡至闕下帝御興安門親詰其反狀錡曰臣本不反張子良教臣帝曰汝以宗臣為統帥子良為惡何不斬之而後入錡不能對命獻太清宫太廟太社即與其男師囘竝腰斬於子城之西南隅劉濟鎮幽州節度元和五年正月討鎮州王承宗濟奏下饒陽縣并獻虜獲六月又奏收安平縣李光顔為忠武軍節度使元和十一年正月奏連敗淮西吳元濟之衆憲宗大悦賜告㨗使婢奴銀錦郗士美為昭義軍節度使元和十一年二月以進討鎮州王承宗所獲賊首三百來獻詔梟於通化門外二日田𢎞正為魏博節度元和十一年七月𢎞正奏破鎮州賊于南宫縣殺二千餘人六月又奏淄青兵馬攻棣州磁石鎮當軍與賊交戰殺獲六百餘人十四年二月壬戌奏今月九日淄青節度都知兵馬使劉悟斬逆賊李師道并男二人淄青兖鄆等十二州平甲子御宣政殿受賀己巳田𢎞正遣使獻逆賊李師道之首命左右軍兵衛之先獻于太廟郊社帝御興安門百僚于樓下列位稱賀李愬為唐鄧節度使元和十二年十月愬奏以九月二十六日圍蔡州吳房縣攻其城毁之斬首千餘級十月丁夘愬帥師入蔡州執賊帥吳元濟以聞淮西平辛巳御宣政殿受朝賀九品已上及宗子四夷之使皆㑹乙酉詔曰吳元濟豺狼醜類敢悖天常不知覆露之恩輒肆猖狂之計拒捍成命焚刼鄰封詿誤我平人殘傷我赤子縣邑黎庶號呼屢聞朕為人父母豈得不興愧亦嘗告諭曽靡悛心稔慝延災日滋月甚所以命貔貅之旅致原野之誅雷霆所當巢穴盡覆獲此兇竪正其刑書與衆棄之兹為國典宜准法處斬其餘支黨竝從别勅處分十一月丙戌朔御興安門文武百官分序街之左右六軍備衛詔以吳元濟獻于太廟太社畢徇東西市斬于城西南隅桂仲武為安南都䕶元和十五年六月奏三月二十九日收尅安南賊黨楊清等處置訖八月甲戍仲武送逆將楊清首至長樂驛命中使就􅄟之十二月癸未容州奏破黄洞賊萬餘衆收營栅三十六穆宗長慶元年正月戊午容州上言破黄家賊二千人李進誠為靈武節度使穆宗長慶元年二月奏於太石山下破吐蕃三千騎殺戮二百六十七人駞馬牛羊衣甲稱是王智興鎮徐州長慶二年正月智興獲李師道男明安獻之文宗太和二年三月智興奏于棣州界破賊五百餘人燒却棣州三面城門九月智興奏于黄河北陽信縣破滄州賊收得鹽船五隻鹽三萬石智興奏剋棣州入州城收城内兵馬三千四百人百姓一萬五百人僧共一百二十人州縣官六員官典九人印一十二面錢物六百九萬件疋米粟等一萬一千石衣甲噐械一十七萬事牛驢馬共一百九十頭芻草四萬五千束庚寅宰臣以破賊率百僚於閣内稱賀又對宰臣等於延英殿十一月丁巳智興奏羗兵馬使李君謀領兵五百人過河深入賊界夜破賊無棣縣殺戮一千五百五十人進所收棣州倉庫印一十二面銅牌六面烏重𦙍為鄆州節度文宗太和元年九月奏破滄州李同㨗賊衆二千餘人十月壬辰又奏破賊三千餘人斬首五百人李載義為幽州節度太和元年十月奏破滄州賊六千人戮殺一千五百人生擒一百五十人即時召其奏事官對于麟徳殿賜錦綵銀噐二年十月壬午又奏於長蘆縣破賊二萬生擒四百三十人三年正月又奏攻破滄州長蘆縣殺賊五千餘人生擒七百五十五人内二百八十五人是鎮州賊其縣已差兵固守二月奏于木刀溝南鎮破賊二萬人圖一軸康志睦為淄青節度使太和元年十一月志睦奏破滄州賊兵千餘人獲賊糧鹽船一十五隻史憲誠為魏博節度使太和二年七月憲誠上言大破滄州賊于平原縣北殺戮一千餘人生擒大將三十二人八月奏于棣州平原縣北破滄州賊二萬餘人殺戮三千餘人九月奏於長河縣破賊栅一所十月奏於平原縣破滄州賊一萬三千餘人殺戮三千五百人又奏于平原縣北破賊二萬餘人又奏收徳州平原縣桞公濟為易定節度使太和二年八月壬戍公濟于新樂縣界破鎮州王廷凑賊衆二萬人殺戮三千人宰臣奏表陳賀九月公濟又奏於鎮州博野縣破賊四千五百餘人燒除却村栅一十五所十月壬午公濟奏於行唐縣破賊三千餘人十一月公濟奏云十月二十日自領兵士下賊堅固砦又於砦東與賊交戰大破賊衆五萬餘人殺戮三萬人劉從諌為昭義軍節度使太和二年八月乙夘從諌奏於臨城縣破鎮州賊二千餘人癸未奏於趙州昭慶縣南破鎮州賊二千餘人殺戮一千餘人李祐鎮滄州太和三年祐自領兵馬及行營諸軍再收徳州平原縣破賊三千餘人即時召宰相入中書命中使以㨗宣告三月又奏破滄州賊二萬人殺戮三千人四月庚戌又連破二萬餘人殺戮一千五百人丙子又奏破徳州城城内將卒三千餘人走投鎮州又奏得李同㨗書求降并以書上聞五月己夘朔宰臣稱賀於紫宸殿下徳州故也又奏李同㨗母阿孫妻阿崔男元逹并差人押送上都崔𢎞禮為鄆州節度使太和三年五月庚辰𢎞禮奏宣慰使栢耆領當道及幽州兵馬入滄州當時取得李同㨗出滄州訖丙戌滄州逓進宣慰使栢耆表二封并露布一卷丁亥左右軍各出馬歩七百五十人起長樂驛防押李同㨗首至興安樓前立仗宰相率百僚敘立於樓前同㨗自違命及就誅勞問罪之師凡三嵗焉李徳裕為劔南西川節度使太和五年九月徳裕上言收復吐蕃先䧟維州城使差兵馬鎮守呂義忠為河東監軍武宗㑹昌四年二月義忠擒太原叛將楊弁及兄弟同謀大將等五十四人獻于闕下皆斬之郭誼為澤潞大將㑹昌四年八月辛巳朔殺逆賊劉禎傳首京師帝御興安門獻于宗廟社稷百官樓前稱賀髙駢為南都䕶軍懿宗咸通七年九月駢上奏收復交州盡平蠻賊積嵗所侵故地是日帝受百僚賀楊復光為天下兵馬都監僖宗中和二年復光進收復京國表曰頃者妖興霧市嘯聚叢祠而岳牧藩侯備盜不謹謂大同之運嘗可容奸謂無事之秋縱其長惡賊首黄巢因得充盈窟穴蔓延萑蒲驅我蒸黎狥其㐫逆展鋤鸖以成鋒刅殺耕牛以恣燔炮魑魅晝行虺蜴夜噬自南海失守湖外䘮師飬虎災深馴梟逆大物無不害惡靡不為豺狼貽朝市之憂瘡痏及腹心之痛遂至流毒百姓盗汚兩京衣冠啣塗炭之悲郡邑起丘墟之嘆萬方共怒十道齊攻仗九廟之威靈殄積年之㓙醜河中節度使王重榮神資壯烈天付機謀誓立功名志安家國至於屯田待敵率士當衝收百姓十餘萬家降賊黨三萬餘衆法能持重功遂晚成久稽原野之刑未快雷霆之怒自收同華逼近京師夕􅇏髙照於國門游騎頻臨於㶚岸既知四隅斷絶百計奔衝如窮鳥觸籠似飛蟲赴燭鴈門節度使李諱神傳將畧天付忠貞機謀與武藝皆優臣節共本心相稱殺賊無非手刅入陣率以身先可謂雄才得名飛將自統本軍南下與臣同力前驅雖在寢飱不忘冦孽今月八日遣衙隊前鋒楊守宗河中騎將白志遷横野軍使滿存躡雲都將丁行存朝邑鎮將康師貞忠武黄頭軍使龎從等三十都隨李諱自光泰門先入京師力摧兇冦又遣河中將劉譲王􅅛冀君武孫珙忠武將喬從遇鄭滑將韓從威荆南將軍屠悰滄州將賈滔易定將張仲慶夀州將張行方天徳將顧彦朗左神策弩手甄君楚公孫勝左横衝軍使楊守亮躡雲都將髙周彛忠順都將胡真絳州監軍毛宣伯聶𢎞裕等七十都繼進賊尚為堅陣來抗官軍鴈門李諱率勵驍雄整齊金革呌噪而聲將動瓦喑嗚而氣欲吞砂寛列戈矛宻張羅網於是麾軍背擊八騎横衝日明而劔曜飛輪風急而旗開走電使賊如浪便可塞流使賊如山亦須折角蹂踐則横屍入地奔騰則積血成川楊守宗等齊驅直入合勢夾攻從夘至申羣兇大潰自望春宫前䠞殺至昇陽殿下攻圍戈不濫揮矢無虛發其賊一時奔遁南入商山徒延漏刅之生佇作飲頭之噐伏自收平京闕三面皆立大功若破敵摧兇鴈門實居其首其餘將佐同效驅馳兼臣所部二萬餘人數嵗櫛風沐雨既兹平盪竝録以聞李承嗣為河東軍校中和二年承嗣為前鋒討黄巢於華隂黄巢令偽客省使王汗㑹軍機於黄揆承嗣擒之以獻時溥為徐州節度使中和三年七月溥進表行在獻黄巢首級於行廟受百僚賀其年五月溥遣將張友與尚讓之衆掩捕之至狼虎谷巢將林言斬巢及二弟鄴揆等七人首級并妻子送徐州王重榮鎮河中光啓二年僖宗幸興元邠州節度使朱玫立嗣襄王煴於京城十二月敗奔河中為重榮斬首以獻帝御興元城南門閲俘受賀時太常博士殷盈孫獻議曰伏以為煴違背宗社僣竊乗輿已就誅夷所宜慶賀然物議之間或有未允臣按禮經公族有罪獄既具有司聞於君曰某之罪在大辟君曰赦之如是者三有司走出致刑君復使謂之曰雖然固當赦之有司曰不及矣君為之素服不舉樂三日今偽煴皇族也雖犯誅死之罪宜就屠戮其可以朝羣臣而賀乎臣以為煴廹脅之際不能守節効死而乃甘心逆謀宜黜為庶人絶其屬籍其首級仍委所在以庶人禮葬其大㨗之慶當以朱玫首級到日稱賀從之李璠為汴州行軍司馬昭宗龍紀元年二月璠檻送賊秦宗權并妻趙氏以獻帝御延喜門受俘百僚稱賀以之狥市告廟社斬于獨桞趙笞死宗權初為蔡州節度中和三年巢賊走闗東宗權遂戰不利因與合從為盗巢賊既誅宗權復僣稱帝號後唐閻鍔武皇牙將也武皇初為河東節度使昭宗乾寧二年武皇討邠州王行瑜行瑜急困與其妻子部曲五百餘人潰圍出奔至慶州為部下所殺其家二百口并詣行營乞降武皇命鍔獻於京師十二月甲申朔昭宗御延喜門受俘馘百僚樓前稱賀册府元龜卷四百三十四
