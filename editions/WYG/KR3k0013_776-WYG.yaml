body:
  text: 册府元龜卷七百七十六宋王欽若等撰總錄部名望夫爲萬物之靈禀五行之秀而不能馳聲於當年揚名於没世者奚足謂之賢哉故有德美淵騫英華發越扶義倜儻懷才超㧞志節抗邁公廉絶俗經術深厚風裁詳雅由兹而稱於儕伍聞於州里著於官次顯於朝廷布於天下流於絶域者蓋有之焉其或同時接武齊名並駕爲游談之矜式聳士類之慕向傳所謂死而不朽者皆是之謂歟子産鄭人簡公二十三年諸公子争寵相殺又欲殺子産公子或諫曰子産仁人鄭所以存者子産也勿殺乃止澹臺滅明事孔子既以受業南游至江從弟子三百人設取予去就名施乎諸侯晏平仲嬰者萊之夷維人也事齊靈公莊公景公三世顯名於諸侯越范蠡三徙成名於天下非茍去而已所止必成名卒老死於陶故世傳曰陶朱公吳起衛人魏武侯封起爲西河守甚有聲名甘茂下蔡人起下蔡閭閻顯名諸侯漢張耳陳餘皆大梁人張耳少時爲魏公子無忌客與陳餘兩人魏之名士也陳渉起蘄至陳張耳陳餘上謁渉上謁若今之通名渉及左右生平數聞耳餘賢未嘗見見即大喜陸賈勸陳平交驩太尉周勃以此游漢廷公卿間廷謂朝廷名聲藉甚言狼藉甚盛孝文即位爲大中大夫季布楚人也布弟季心聲聞關中嘗殺人亡吳從爰絲匿長事爰絲言以兄長之禮事也弟畜灌夫籍福之屬嘗爲中司馬中尉司馬中尉郅都不敢加少年多時竊借其名以行詐自稱爲心之賓客徒黨也當是時季心以勇聞布以諾聞關中後爲河東守韓安國爲人多大畧知足當世取舍舍止也取舍言可取則取可舍則舍而出於忠厚貪財利然所推舉皆廉士賢於己者於梁舉壷遂臧固至它皆天下名士於梁舉二人至於他邑所舉皆名士也士亦以此稱慕之惟天子以爲國器官至御史大夫鄭當時字莊陳人也脱張羽於阨梁孝王將楚祖之弟也聲聞梁楚間後爲大司農未嘗名吏與官屬言若恐傷之聞人之善言進之上惟恐後山東諸公以此翕然稱鄭莊鄒陽齊人與吳嚴忌牧乗等俱仕吳皆以文辯著名爲梁上客而卒灌夫字仲孺潁隂人吳楚反時夫父孟爲校尉戰死夫不肯隨䘮歸奮曰願取吳王若將軍頭以報父讐於是乃從奴十餘騎入吳軍至戲下亡其奴獨與一騎歸夫身中大創十餘適有萬金良藥故得無死創少瘳又請復往將軍壯而義之恐亡夫乃言太尉太尉周勃也太尉固止之吳軍破夫以此名聞天下後至燕相漢李陵少爲侍中建章監善騎射愛人謙下士甚得名譽楊惲司馬遷外孫也以材能稱好交英俊諸儒名顯朝廷官至光祿勲尹翁歸爲政􅢖任刑其在公卿之間清潔自守語不及私然温良謙退不以行能驕人甚得名譽於朝廷爲右扶風病卒辛慶忌遷校尉將吏士屯焉耆國還爲謁者尚未知名元帝初補金城長史舉茂材遷郎中車騎將軍朝廷多重之者補爲校尉遷張掖太守徙酒泉所在著名雋不疑治春秋爲郡文學進退以禮名聞州郡官至京兆尹趙廣漢爲潁川太守威名流聞匈奴降者言匈奴中皆聞廣漢名邴曼容漢兄之子也亦養志自修其名過出於漢官至六百石輒免去樓䕶字君卿爲京兆吏甚得名譽䕶爲人短小精辯論議嘗依名節與谷永俱爲五侯上客長安號曰谷子雲之筆札樓君卿之唇舌䕶官至天水太守永至大司農杜欽字子夏少好經書家富而目偏盲故不好爲吏茂陵杜鄴與欽同姓字俱以材能稱京師故衣冠謂欽爲盲杜子夏以相别欽惡以疾見詆廼爲小冠高廣才三寸才與纔同由是京師更謂欽爲小冠杜子夏而鄴爲大冠杜子夏欽不仕鄴官至凉州刺史龔勝字君賓龔舍字君情皆楚人也兩人相友並著名節故世謂之楚兩龔勝官至光祿大夫舍亦至光祿大夫稱病不起揚雄少時從嚴君平游巨而仕京師顯名除爲郎給事黃門紀逡王思琅邪人薛方子容齊人郇越呂仲郇相稚賓太原人唐林子高唐尊伯高沛郡人皆成帝至王莽時清名之士也皆以明經飭行顯名於世飭謹也陳遵字孟公少與張竦相親友哀帝之末俱著名字爲後進冠爲後進人之冠首也所到衣冠懷之惟恐在後時列侯有與遵同姓字者每至入門曰陳孟公坐中莫不震動既至而非因號其人曰陳驚坐遵官至河内都尉後漢張湛自太子太傅退居中東門侯舍故時人號曰東門君承宮爲左中郎將名播匈奴時北單于遣使求得見宫明帝勅自整飾宮對曰夷狄眩名非識實者也臣狀醜不可以示逺宜選有威容者帝乃以大鴻臚魏應代之祭肜子孫多爲邊吏者皆有名稱崔駰少游太學與班固傅毅同時齊名官至長岑長馮豹好儒學以詩春秋教麗山鄉里爲之語曰道德彬彬馮仲文位至尚書卓茂與同縣孔休陳留蔡勲安衆劉宣楚國龔勝上黨鮑宣六人同志不仕王莽時並名重當時光武即位以爲太傅王扶爲議郎有節行臨邑侯劉復著漢德頌盛稱扶爲名臣第五種字與先少勵志義爲吏冠名州郡官至兖州刺史李咸字元貞汝南人累經州郡以廉幹知名在朝清忠權倖憚之鄧彪字智伯與同郡宗武伯翟敬伯陳綏伯張弟伯同志好齊名南陽號曰五伯彪位至太傅錄尚書事栢彬字彦林少與蔡邕齊名舉孝廉拜尚書郎召馴俶儻不拘小節以志義聞鄉里號之曰德行恂恂召伯春仕至光祿勲樓望操節清白著稱鄉里仕至左中郎將周澤字稚都孫堪字子稚堪行類於澤故京師號曰二稚澤位至太常堪至侍中騎都尉韓融少能辯理而不爲章句學聲名甚盛五府並辟位至太僕荀爽字慈明眈思經史慶弔不行徵命不應潁川爲之語曰荀氏八龍慈明無雙後遭黨錮隱於海上又南遁漢濱積千餘言以著述爲事遂稱爲碩儒位至司空袁閬字奉高數辭公府之命不修異操而致名當時金元休名尚京兆人與同郡韋休甫第五文休俱著名號爲三休尚獻帝初爲兗州刺史東之郡而魏太祖已臨兗州尚依袁術術僣號欲以尚爲太尉不敢顯言私使諷之術亦不敢强也建安初尚逃還爲術所害黃香博學經典究精道術能文章京師號曰天下無雙江夏黃童官至魏郡太守矯愼隱遁山谷與馬融蘇章鄉里並時融以才博顯名章以廉貞爲稱然皆推先愼賈彪少游京師志節慷慨與同郡荀爽齊名後至新息長董扶少游太學與鄉人任安齊名仕至蜀郡屬國都尉侯瑾嘗以禮自牧徵召不到覃思著述西河人敬其才而不敢名之皆稱爲侯君公車徵不至蘇純字栢公有高名性强勁而持毁譽士友咸憚之至乃相謂曰見蘇栢公患其教責人不見又思之三輔號爲大人大人長者之稱尊信者也仕至南陽太守何顒少游學雒陽顒雖後進而郭林宗賈偉節等與之相好顯名太學後辟司空府郭泰字林宗太原介休人也不應辟召桓帝時太學諸生三萬餘人郭林宗賈偉節爲其冠與李膺陳蕃王暢更相褒重學中諸生曰天下模楷李元禮不畏强禦陳仲舉天下俊秀王叔茂海内希風之流遂共相標榜指天下名士爲之稱號上曰三君次曰八俊次曰八顧次曰八及次曰八厨猶古之八元八愷也竇武劉淑陳蕃爲三君君者言一世之所宗也李膺荀昱杜密王暢劉祐魏朗趙典朱㝢爲八俊俊者言人之英也郭林宗宗慈巴蕭夏馥范滂尹勲蔡衍羊陟爲八顧顧者言能以德行引人者也張儉岑晊劉表陳翔孔昱范康檀敷翟超爲八及及者言其能導人追宗者也度尚張邈王孝劉儒胡母班秦周蕃向何王章爲八厨厨者言能以財救人者也劉表字景升山陽人少知名號八俊仕至荆州牧張璠漢紀曰表與同郡人張隱薛郁王訪宣靖公褚恭劉祗田林爲八交或謂之八顧漢末名士錄云表與汝南陳翔字仲麐范滂字孟博魯國孔昱字世元渤海范康字仲貞山陽檀敷字文友張儉字元節南陽岑晊字公孝爲八友胡母班字季皮太山人少與山陽度尚東平張邈等八人並輕財赴義振濟人士世謂之八厨李膺爲司隷校尉是時朝廷日亂紀綱頽弛膺獨持風裁以聲名自高士有被其容接者名爲登龍門鍾瑾李膺姑子好學慕名有退讓風與膺同年俱有聲名辟州府未嘗屈志杜密轉太僕黨事既起免歸本郡與李膺俱坐而名行相次故時人亦稱李杜焉前有李固杜喬故言亦也竇武少以經行著稱嘗教授於大澤中不交時事名顯關西後至大將軍鍾浩潁川長社人時郡中先輩爲海内所歸者蒼梧太守定陵陳稚叔黎陽令潁隂荀淑及皓少府李膺嘗宗此三人曰荀君清識難尚陳鍾至德可師淑至朗陵侯相棄官歸皓累徵不就陳實與子紀高名並著而紀弟諶又配之世號曰三君每宰府辟命率皆同時羔雁成羣丞掾交至豫州百姓皆圖畫實紀諶之形象實至太邱長紀至大鴻臚諶史不載官叚紀明武威姑臧人與皇甫威明張然明並知名顯達京師稱爲凉州三明云任安字定祖少游太學受孟氏易兼通數經又從同郡楊厚學圖䜟究極其術時人稱曰欲知仲桓問任安又曰居今行古任定祖趙壹舉郡上計到京師河南尹羊陟與司徒袁逢共稱薦之名動京師士大夫想望其風采十辟公府不就王烈通識逹道秉義不回以潁川陳大兵爲師二子爲友時潁川荀慈明賈偉節李元禮韓元長皆就陳君學見烈器業過人歎服所履亦與相親由是英名著於海内孔融與平原陶邱洪陳留邊讓並以俊秀爲後進冠蓋融持論經理不及讓等而逸才宏博過之融官至少府大中大夫洪辟太尉府讓至九江太守魏李豐字安國故衛尉李義子也文帝時以父任召隨軍始爲白衣時年十七八在鄴下名爲清白識别人物海内翕然莫不注意後隨軍在許昌聲稱日隆其父不願其然遂令閉門勅使斷客明帝在東宫豐在文學中及即尊位得東吳降人問江東聞名士爲誰降人云聞有李安國者是時豐爲黃門郎明帝問左右所在左右以豐對帝曰豐名乃被於吳越邪位至中書令華歆平原人與北海邴原管寧俱游三人相善時人號三人爲一龍歆爲龍頭原爲龍腹寧爲龍尾歆至太尉原至五官將長史寧至大中大夫固辭不受張泰鉅鹿人爲鴻臚龎廸扶風人爲河南尹以清賢稱荀綽冀州記曰鉅鹿張邈字邵虎祖父泰字伯陽有名於魏父字叔連為遼東大守著自然好學論在嵇康集爲人宏深有遠識恢恢然使求之者莫之能測也官厯二守後爲城陽太守未行而卒邢顒字子昻太祖辟爲冀州從事時人稱之曰德行堂堂邢子昻位至太常徐宣字寳堅廣陵海西人避亂江東又辭孫䇿之命還本郡與陳矯並爲綱紀二人齊名而私好不協然俱見器於太守陳登位至侍中光祿大夫鮑勛清白有高節知名於世後至宮正趙儼潁川陽翟人與同郡辛毗陳羣杜襲並知名號曰辛陳杜趙云毗官至衛尉羣儼並至司空襲至尚書大中大夫滿寵字子偉以格度知名官至衛尉徐邈同郡韓觀曼游有鑒識器幹與邈齊名而在孫禮盧毓先邈位至司𨽻校尉王昶字文舒太原晉陽人也少與同郡王浚俱知名浚年長昶兄事之位至司空韓暨爲大鴻臚暨爲大賢韓宣在後爲鴻臚亦稱職故鴻臚中爲之語曰大鴻臚小鴻臚前後治行曷相如沐並字德信爲三府長史時吳使朱然諸葛瑾攻圍樊城遣舡兵於峴山東斫材牂牁兵人作食有先熟者呼後熟者言共食來後熟者答曰不也呼者曰汝欲作沐德信邪其名流布播於異域如此雖自華夏不知者以為前世人也蜀習禎字文祥襄陽人有風流善談論名亞龎統而在馬良之右子忠亦有名仕至南廣漢太守蔣琬字公琰零陵湘鄉人弱冠與外弟泉陵劉敏俱知名琬至大司馬敏至右䕶軍費禕字文偉江夏鄳人與汝南許叔龍南郡董允齊名禕位至大將軍允侍中守尚書令楊戲字文然爲武陽人少與巴西程祁公引巴郡楊汰季儒蜀郡張表伯逹並知名戲每推祁以爲冠首丞相諸葛亮深器之仕至射聲校尉姜維字伯約爲大將軍時蜀官皆天下英俊無出維右吳徐陵字元大爲零陵太守朝廷待以列卿之位故虞翻與書曰元大受上卿之遇叔向在晉未若於今其見重如此周瑜時年二十四吳中皆呼爲周郎後至偏將軍領南郡太守顧邵字孝則博覽書傳好樂人倫少與舅陸續齊名而陸遜張敦朴靜皆亞焉邵仕至豫章太守續至偏將軍遜至丞相敦至海昏令靜至剡令歩隲字子山大帝爲討虜將軍召爲主記歲餘隲以疾免與琅邪諸葛瑾彭城嚴畯俱游吳中並著聲名爲當時英俊位至驃騎將軍領冀州牧顧譚爲太子友時四方之傑畢集太傅諸葛恪以雄竒蓋衆而譚以清識絶倫獨見推重自太尉范愼謝景羊徽之徒皆以秀稱其名而悉在譚下位至太常晉應貞字吉甫善談論以才學稱夏侯元有盛名貞詣元元甚重之位至散騎常侍鄒湛字潤甫以才學知名爲征南從事中郎深爲羊祜所器重胡威字伯武一名貔貅淮南壽春人父質以忠清著稱少與鄉人蔣濟朱績俱知名於江淮間官至青州刺史何曽字頻考陳國陽夏人父魏太僕陽武亭侯曽少襲爵好學博聞與同郡袁侃齊名曽位至太宰侍中侃至尚書歐陽建字堅石世爲冀方右族雅有理思才藻富贍擅名北州時人爲之語曰勃海赫赫歐陽堅石仕至馮翊太守石浚字景倫清儉有鑒識敬愛人物位至黃門侍郎爲當世名士傳祗字子莊父嘏魏太常祗性至孝早知名以才識明練稱位至侍中遷司徒不拜劉毅幼有孝行少厲清節然好臧否人物王公貴人望風憚之位至尚書僕射光祿大夫裴憲爲侍中王浚承制以爲尚書䧟石勒爲右光祿大夫司徒太傅封安定郡公憲厯官無幹績之稱然在朝元黙未嘗以物務經懐但德重名高動見尊禮王罕字子綸愷子也㓜有門風才望不及愷以淑行致稱爲清平佳士和嶠少有風格慕夏侯元之爲人厚自崇重有盛名於世朝野許其能整風俗理人倫位至尚書令王濟字武子少有逸才風姿英爽氣蓋一時好弓馬勇力甚絶人善易及莊老文詞俊茂伎藝過人有名當世與姊夫和嶠及裴楷齊名位至侍中河南尹秦秀字元良少敦學行以忠直知名終於博士華嶠字叔駿才學深博少有令名位至秘書監散騎常侍山簡濤之子也性温雅有父風後與譙國嵇紹沛郡劉謨宏農楊淮齊名位至征南將軍鎭襄陽王元衍之子少慕簡曠亦有俊才與衛玠齊名元衍爲陳留太守玠後至太子洗馬荀闥字道明亦有名稱京都謂之語曰雒中英英荀道明羊曼任達頽縱好飲酒温嶠庾亮阮放栢彛同志友善並爲中興名士時州里稱陳留阮放爲宏伯高平郗鑒爲方伯泰山胡母輔之爲達伯濟隂卞壷爲裁伯陳留蔡謨爲郎伯阮孚爲誕伯高平劉綏爲委伯而曼爲䵬伯凡八人號兗州八宿蓋擬古之八雋也曼位至前將軍放至揚威將軍交州刺史鑒至太尉輔之至揚武將軍湘州刺史壷至領軍將軍謨至司徒不拜孚至鎭南將軍廣州刺史綏至荆州刺史江統字應元靜黙有遠志時人為之語曰嶷然稀言江應元與鄉人蔡克俱知名位至黃門侍郎散騎常侍劉與字慶孫雋朗有才局與弟琨並尚書郭奕之甥名著當時京師爲之語曰雒中奕奕慶孫越石與官至潁川太守琨官至司空廣武侯祖逖字士雅博覽書記該渉古今往來京師見者謂逖有贊世才具官至豫州刺史華軼字彦夏少有才氣聞於當世汎愛博納衆論羙之官至江州刺史劉琨少得雋朗之名與范陽祖納俱以雄豪著名琨位至司空納至光祿大夫劉眈字敬道少有行檢以義尚流稱爲宗族所推位至特進金紫光祿大夫周馥字祖宣浚從父弟也父㽔安平太守馥少與友人成公簡齊名俱起家爲諸王文學裴楷字叔則明悟有識量弱冠知名尤精老易少與王戎齊名位至光祿大夫開府儀同三司戎至司徒裴秀少好學有風操八歲能屬文時人爲之語曰後進領袖有裴秀裴王二族盛於魏晉之世時人以爲八裴方八王徽比王祥楷比王衍康比王綏綽比王澄瓚比王敦遐比王導頠比王戎邈比王元秀位至司空顧榮字彦先吳國吳人爲南士著姓祖雍吳丞相父穆宜都太守榮機神頴悟弱冠仕吳爲黃門侍郎太子輔義都尉吳平與陸機兄弟同入雒時人號爲三俊例拜爲郎中徐邈姿性端雅勤行勵學博渉多聞少與鄉人臧壽齊名後至驍騎將軍諸葛恢字道明潁川荀闔字道明陳留蔡謨字道明與恢俱有名譽號曰中興三明時人爲之語曰京都三明各有名蔡氏儒雅荀葛清恢位至侍中金紫光祿大夫薛兼字令長丹陽人父瑩有名吳朝吳平爲散騎常侍兼清素有器宇少與同郡紀瞻廣陵閔鴻吳郡顧榮㑹稽賀循齊名號爲五俊初入雒司空張華見而竒之曰皆南金也兼瞻並位至散騎常侍鴻仕吳至尚書榮至鎭東軍司散騎常侍循至太常禇翜字謀逺以才藝楨幹稱襲爵關内侯張輔字世偉南陽西鄂人漢河間相衡之後也少有幹局與後母兄劉喬齊名輔爲馮翊太守喬至豫州刺史索靖字幼安敦煌人官至游擊將軍靖少有逸羣之量與鄉人汜哀張甝索紒索永俱詣太學馳名海内號稱敦煌五龍牽秀字成叔武邑觀津人也祖招魏雁門太守秀博辯有文才性豪俠弱冠得美名爲太保衛瓘尚書崔洪所知秀位至中書令衛瓘貞靜有名理以明識清允稱位至太保裴頠爲人宏雅有逺識博學稽古履行高整自少知名位至尚書僕射荀羨字令則崧之子清和有準年十五尚尋陽公主拜駙馬都尉弱冠與琅邪王齊名周顗少有重名廣陵戴若思東南之羙舉秀才入雒素聞顗名往候之終坐而出不敢顯其才辯位至䕶軍將軍祖約逖之弟永嘉末隨逖過江元帝稱制引爲掾屬與陳留阮孚齊名位至右將軍散騎常侍胡母輔之與王龍王敦庾敳俱爲太尉王衍所昵號曰四友譙獻之巴西南充人有重名於西土衛玠字叔寳風神秀異玠妻父樂廣有海内重名議者以爲婦翁冰清女壻玉潤玠好言元理王澄及王元王濟並有盛名然皆出玠下世云王家三子不如衛家一兒於時中興名士惟王承及玠爲當時第一玠官至太子洗馬王承字安期湛之子也弱冠知名太尉王衍雅貴異之比南陽樂廣爲東海太守去官東渡江及至建業爲元帝鎮東府從事中郎甚見優禮承少有重譽而推誠接物盡宏恕之理故衆咸親愛焉渡江名臣王道衛玠周顗庾亮之徒皆出其下王謐字雅逺有羙譽與譙國栢裔王綏齊名位至侍中楊州刺史周玘字宣佩强毅沉斷有父風而文學不及閉門潔已不妄交游士友咸望風敬憚焉故名重一方位至建武將軍南郡太守庾冰字季堅兄亮以名德流訓冰以雅素垂風諸弟相率莫不好禮爲世論所重亮常以爲庾氏之寳冰位至車騎將軍江州刺史孔愉字敬康與同郡張茂字偉康丁潭字世康齊名時人號曰㑹稽三康愉位至鎭軍會稽内史周密字泰元性虚簡時人稱爲清士位至尚書郎孔衍宗人夷吾有美名博學不及衍渉世聲譽過之元帝以爲主簿王坦之字文度弱冠與郄超俱有重名時人爲之語曰盛德絶倫郄嘉賓江東獨歩王文度嘉賓超小字也坦之仕至北中郎將徐兗二州刺史超至司徒左長史王忱字元逹弱冠知名與王恂俱流譽一時厯位驃騎長史嘗造其舅范寗與張元相遇寗使與元語元正坐斂袵待其有發忱竟不與言元失望便去寗讓忱曰張元吳中之秀何不與語忱笑曰張祖希欲相識自可見詣寗謂曰卿風流俊望真後來之秀忱曰不有此舅焉有此甥既而寗使報元元束帶造之始爲賓主忱位至建武將軍龔壯字子瑋巴西人也潔已自守與鄉人譙秀齊名不仕而卒禇裒少有簡貴之風與京兆杜乂俱有名冠於中興位至衛將軍徐兗二州刺史謝韶字穆度方之子少有名時謝氏尤彦秀者稱封胡羯末封謂韶胡謂朗羯謂𤣥末謂川皆其小字也韶位至車騎司馬朗至東陽太守𤣥至左將軍川早卒謝安寓居會稽累辟不就時安弟萬爲西中郎將總藩任之重安雖處衡門其名猶出萬之右自然有公輔之望處家常以儀範訓子弟能爲雒下書生詠有鼻疾故其音濁名流愛其詠而不能及或掩鼻以效之位至太保袁宏有三子其季曰明子有父風最知名官至臨賀太守謝𤣥爲㑹稽内史時吳興太守晉寧侯張𤣥之亦以才學顯自吏部尚書與𤣥同年之郡而𤣥之名亞於𤣥時人稱爲南北二𤣥論者羙之習鑿齒字彦威襄陽人也少有志氣博學洽聞以文章著稱後至荆州别駕孔沉與魏顗虞球虞存謝奉並爲四族之俊王珉爲侍中代王獻之爲長兼中書令二人素齊名世謂獻之爲大令珉爲小令㕁僧施字惠脱襲爵南昌公弱冠與王總綏栢裔齊名累居清顯仕至南蠻校尉吳隱之字處黙羙姿容善談論博渉文史以儒雅標名位至光祿大夫加金章紫綬單裔爲征西長史遂顯於朝廷時惟單與吳隱之以寒素博學知名於世王恭字孝伯少有美譽清操過人自負才地高華常有宰輔之望與王忱齊名友善慕劉惔之爲人謝安常曰王恭人地可以爲將來伯舅位至北平將軍兗青二州刺史宋謝莊少有美才文帝元嘉二十七年魏冦彭城魏遣尚書李孝伯來使與鎭軍長史張暢共語孝伯訪問莊及王徽其名聲遠布如此後莊爲中書令金紫光祿大夫王景文美風姿好言理少與陳郡謝莊齊名位至中書監領太子太傅謝超宗陳陽夏人也祖靈運臨川内史父鳯元嘉中坐靈運事同徙領南早卒超宗元嘉末得還與惠休道人來往好學有文辭盛得名譽仕至臨川太守袁覬好學善屬文有清譽於世官至司徒從事中郎張敷好讀元言與高士南陽宗少文談繫象少文每屈麈尾歎曰吾道東矣於是名價日重後爲司徒左長史江夷字茂遠少自操勵爲後進之羙位至吏部尚書吳郡太守蔡廓爲祠部尚書年位並輕而爲時流所推重每至歲時皆束帶到門王宏字休光少好學以清怡知名與尚書僕射謝鯤善位至太保顔延之與陳郡謝靈運俱以辭彩齊名自潘岳陸機之後文士莫及也江左稱顔謝焉所著並傳於世延之位至金紫光祿大夫孔本少骨骾有風力以是非爲己任口吃讀書早知名初舉揚州秀才補主簿後至輔國將軍行會稽郡事王敬宏所居舍亭山林環周備登臨之羙時人謂之王東山褚炫爲中書侍郎司徒右長史順帝時炫以清尚與劉侯謝朏江斆入殿侍文義號爲四友册府元龜卷七百七十六
