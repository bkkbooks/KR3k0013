body:
  text: 册府元龜卷二百二十宋王欽若等撰僭偽部形貌聰識令德才藝形貌夫人之生也鍾五行之秀肖二儀之形所禀雖同厥貌則異乃有偶晉室之衰圯幸中原之俶擾保聚羣黨僭竊位號雖邪謀㓙徳有亂於天常而竒姿偉狀或同於人傑斯所以資彼姦雄之氣成其悖戾之咎耳故仲尼有言曰以貌取人失之子羽是知取人之道不在乎形貌也眀矣前凉張軌字士彦有器望姿儀前趙劉淵字元海左手文有其名猿臂善射膂力過人姿儀魁偉身長八尺四寸鬚長三尺餘當心有赤毫毛三根長三尺六寸劉和字𤣥泰元海子身長八尺劉聰字𤣥眀形體非常左耳有一白毫毛長二尺餘甚光澤劉曜字永眀身長九尺三寸垂手過膝生而眉白目有赤光鬚髯不過百餘根而皆長五尺弱冠游於雒陽坐事當誅亡匿朝鮮遇赦而歸自以形質異衆恐不容於世乃隱迹管涔山後趙石勒字世龍初名􅂒上黨武郷羯人長而壯健父老及相者皆曰此胡狀貌竒異志度非常其終不可量也勸邑人厚遇之而賣與茌平人師懽為奴有一老父謂勒曰君魚龍髪際上四道已成當貴為人主懽亦竒其狀貌而免之石虎字季龍年六七嵗有善相者曰此兒貌竒有壯骨貴不可言年十八身長七尺五寸冉閔字永曾身長八尺勇力絶人前燕慕容廆字奕雒瓌㓜而魁岸美姿貌身長八尺雄傑有大度慕容皝字元真龍顔版齒身長七尺八寸慕容雋字宣英骨相不常身長八尺二寸姿貌魁偉前秦苻生字長生生無一目為兒童時祖洪戱之問侍者曰吾聞瞎兒一淚信乎侍者曰然生怒引佩刀自刺出血曰此亦一淚也洪大驚鞭之苻堅字永固臂垂過膝目有紫光祖洪愛之名曰堅頭每曰此兒姿貌魁偉質性過人非常相也後秦姚襄字景國年十七身長八尺五寸臂垂過膝後蜀李特字𤣥休身長八尺雄武善騎射沉毅有大度李雄字仲雋身長八尺三寸美容貌少以烈氣聞每周旋鄉里識達之士皆器重之李勢字子仁身長七尺九寸腰帶十四圍善於俯仰時人異之後凉吕光字世期身長八尺四寸目重瞳子左肘有􅁏印吕隆字永基美姿貌善騎射南燕慕容垂字道眀少岐嶷有器度身長七尺四寸手垂過膝慕容徳字𤣥眀年未弱冠身長八尺二寸姿貌雄偉額有日角偃月重文慕容超字祖眀身長八尺腰帶九圍精彩秀發容止可觀夏赫連勃勃字屈子身長八尺五寸腰帶十圍性辨慧美風儀姚興見而竒之深加禮敬宋髙祖入長安遣使遺勃勃書請通和好使者還言勃勃容儀瓌偉英武絶人髙祖歎曰吾所不如也蜀王建字光圗隆眉廣顙龍睛虎視常於武當山遇僧處嘗謂建曰子骨相甚貴何不從軍自求豹變而乃區區為盗綴賊之號閩王審知身長七尺六寸紫色方口隆凖聰識夫鍾五行之秀為萬物之靈者其人矣乎自晉室板蕩羣雄肇亂竊據郡國僭稱位號者比比而有雖復乘夫否運内包逆節亦有性識頴悟器局閎逺稽古好學摛文屬辭或留神於政治或騁辨於談議或折節自勗或發言垂戒至於揣摩事幾必有於先見褒貶前哲差出於衆意斯亦豪爽自負超越倫萃者哉前凉張駿幼而竒偉晉愍帝建興四年封覇城侯十嵗能屬文卓越不覊及嗣位勤脩庶政摠御文武咸得其用逺近嘉詠號曰積賢君前趙劉元海嘗謂同門生朱紀范隆曰吾每觀書𫝊當鄙隋陸無武綘灌無文道繇人𢎞一物之不知者固君子之所耻也二生遇髙皇而不能建封侯之業兩公值文帝而不能開庠序之美惜哉於是遂學武事妙絶於衆劉曜㓜而聰慧有竒度年八嵗從父元海獵於西山遇雨止樹下迅雷震樹旁人莫不顛仆曜神色自若元海異之曰此吾家千里駒也從兄為不亡矣後趙石勒雅好學雖在軍旅嘗令儒生讀史書而聴之每以其意論古帝王善惡朝賢儒士聴者莫不歸美焉嘗使人讀漢書聞酈食其勸立六國後大驚曰此法當失何得遂成天下至留侯諌乃曰頼有此耳其天姿英達如此前秦符堅七嵗聰敏好施舉止不踰規矩每侍其祖父洪側輙量洪舉措取與不失機候髙平徐統遇堅於路異之執其手曰符郎此官之御街小兒敢戱於此不畏司𨽻縳耶堅曰司􅝗縳罪人不縳小兒戯也及即偽位出逰覇陵顧謂羣臣曰漢祖起自布衣廓平四海佐命功臣孰為首乎權翼進曰漢書以蕭曹為功臣之冠堅曰漢祖與項羽争天下困於京索之間身被七十餘創通中六七父母妻子為楚所囚平城之下七日不火食頼陳平之謀太上妻子克全免匈奴禍二相不得獨髙也雖有人狗之喻豈黄中之言乎於是酣飲極歡命羣臣賦詩又時匈奴左賢王衛辰遣使降於堅遂請田内地堅許之雲朔䕶軍賈雍遣其司馬徐斌率騎襲之因縱兵掠奪堅怒曰朕方脩魏綘和戎之術不可以小利忘大信昔荆吳之戰事興􅅙婦澆𤓰之恵梁宋息兵夫怨不在大事不在小擾邉動衆非國之利也所獲資産其悉以歸之免雍官以白衣領䕶軍遣使脩和示之信義辰於是入居塞内貢獻相尋又遣符雒等伐代王渉翼揵其子翼圭縳父請降堅曰翼揵荒俗未􅄁仁義令入太學習禮以翼圭執父不孝遷之於蜀散其部落堅嘗之太學召渉翼揵問曰中國以學養性而人夀考漠北噉牛羊而人不夀何也翼揵不能答又問卿種人有堪將者可召為國家用對曰漠北人能捕六畜善馳走逐水草而已何堪為將又問好學否對曰若不好學陛下用教何為堅善其對又聞桓温廢海西公也謂羣臣曰温前敗海上後敗枋頭十五年間再傾國師六十嵗翁舉動如此不能思愆免退以謝百姓方廢立以自恱將如四海何諺云怒其室而作色於父者其桓温之謂乎又梁熙遣使西域稱揚堅之威徳并以繒綵賜諸國王於是朝獻者十有餘國大宛獻天馬千里駒皆汗血朱鬛五色鳯膺麟身及諸􅎇異五百餘種堅曰吾思漢文之返千里馬咨嗟美詠今所獻馬其悉返之庶克念前王髣髴古人矣乃命羣臣作止馬詩而遣之示無欲也其下以為盛徳之事逺同漢文於是獻詩者四百餘人符登初為長安令坐事黜為狄道長及闗中亂去縣歸毛興登兄同成言於興請以登為司馬嘗在行部登度量不羣好為竒畧同成嘗謂之曰汝聞不在其位不謀其政無數干時將為愽識者不許吾非疾汝恐或不喜人妄預耳自是可止汝後得政自可專意時人聞同成言多以為疾登而抑蔽之登乃屏跡不妄交游興有事則召之戯謂之曰小司馬可坐評事登出言輙析理中興内服焉然敬憚而不能委任前燕慕容廆嘗從容言曰獄者人命之所懸也不可以不慎賢人君子國家之基也不可以不敬稼穡者國之本也不可以不急酒色便佞亂徳之賊也不可以不戒乃著家令數千言以申其旨後秦姚興既僭位晉大司馬桓𤣥遣使来聘請辛恭靖何澹之興留恭靖而遣澹之謂曰桓𤣥不推計歴運將圗簒逆天未忘晉必將有義舉以吾觀之終當傾覆卿今馳徃必逢其敗相見之期遲不云逺未幾桓𤣥誅澹之等奔於興後凉吕光年十嵗與諸童兒逰戱邑里為戰陣之法儔類咸推為主部分詳平羣童歎服後燕慕容盛少沈敏多謀畧符堅誅慕容氏盛年十二随慕容永東如長子謂叔父柔曰今﨑嶇於鋒刃之間在疑忌之際愚則為人所猜智則危甚巢幕當如鴻鵠髙飛一舉萬里不可坐待罟網也於是與柔及弟㑹間行東歸於慕容垂後遼西太守李郎在郡十年威制境内盛疑之累徵不赴以母在龍城未敢顯叛乃隂引魏軍將為自安之計因表請發兵以距㓂盛曰此必詐也召其使而詰之果騐又嘗引中書令常忠尚書陽璆秘書監郎敷於東堂問曰古来君子皆謂周公忠聖豈不謬哉璆曰周公居攝政之重而能達君臣之名及流言之謗致烈風以悟主道契神靈義光萬代故累葉稱其髙後王無以奪其美盛曰常令以為何如忠曰昔武王疾篤周公有請命之誠流言之際義感天地楚撻伯禽以訓就王徳周公為臣之忠聖達之美詩書以来未之有也盛曰異哉二君之言朕見周公之詐未見其忠聖也昔武王得九齡之夢白文王文王曰我百爾九十我與爾三焉及文王之終已騐武王之夀矣武王之筭未盡而求代其死是非詐乎若惑於天命是不聖也據攝天位而丹誠不見致兄弟之間有干戈之事夫文王之化自近及逺故曰刑于寡妻至於兄弟周公親違聖父之典而蹈嫌疑之蹤戮罰同氣以逞私忿何忠之有乎但時無直筆之史後儒承其謬談故也忠曰啟金縢而返風亦足以眀其不詐遭二叔流言之變而能大義滅親終安宗國復子眀辟輔成大業以致太平制禮作樂流慶無窮亦不可謂非至徳也盛曰卿徒因成文而未原大理朕今相為論之昔周公自后稷積徳累仁至於文武文武以大聖應期遂有天下生靈仰其徳四海歸其仁成王雖幼統洪業而卜世脩長加吕召毛畢為之師傅若無周公攝政王道足以成也周公無故以安危為己任専臨朝之權闕北面之禮管蔡忠存王室以為周公代主非人臣之道故言公將不利於孺子周公當眀大順之莭陳誠義以曉羣疑而乃阻兵都邑擅行誅戮不臣之罪彰於海内方貽王鴟鴞之詩歸非於主是何謂乎又周公舉事稱告二公足眀周公之無罪而坐觀成王之疑此則二公之心亦有猜於周公也但以踈不間親故寄言於管蔡可謂忠不見於當時仁不及於兄弟知羣望之有歸天命之不在已然後返政成王以為忠耳大風㧞木之徵乃皇天祐存周道不忘文武之徳是以赦周公之始愆欲成周室之大美考周公之心原周公之行乃天下之罪人何至徳之謂也周公復位二公所以杜口不言其本心者以眀管蔡之忠也又謂常忠曰伊尹周公孰賢忠曰伊尹非有周公之親而功濟一代太甲亂徳放於桐宫思愆改善然後復之使主無怨言臣無流謗道存社稷美溢来今臣謂伊尹之勲有髙周旦盛曰伊尹以舊臣之重顯阿衡之任太甲嗣位君道未洽不能竭忠輔導而放黜桐宫事同夷羿何周公之可擬乎郎敷曰伊尹處人臣之位不能輔制其君恐成湯之道墜而莫就是以居之桐宫與小人從事使知稼穡之艱難然後返天位此其忠也盛曰伊尹能廢而立之何不能輔之以至於善乎若太甲性同桀紂則三載之間未應便成賢后如其性本休眀義心易發當務盡規賛之理以弼成君徳安有人臣幽主而據其位哉且臣之事君惟力是視奈何挟智蔵仁以成君惡夫太甲之事朕已鑒之矣太甲至賢之主也以伊尹歴奉三朝績無異稱將失顯祖委授之功故匿其日月之眀受伊尹之黜所以濟其忠貞之美夫非常之人然後能立非常之事非常人之所見也亦猶泰伯之三讓人無得而稱焉敷曰泰伯三以天下讓至仲尼而後顯其至徳太甲受謗於天下遭陛下乃申其美因而談讌賦詩賜金帛各有差南凉秃髪傉擅利鹿孤之弟初姚興遣使拜車騎將軍傉擅少機警有才畧其父竒之謂諸子曰傉擅眀識幹藝非汝等軰也是以諸兄不以授子欲𫝊之於傉擅後為赫連勃勃所敗姚興以傉擅外有陽武之敗内有邉梁之亂遣其尚書郎韋宗来觀釁傉擅與宗論六國縱横之規三家戰争之畧逺言天命廢興近陳人事成敗機變無窮辭致清辨宗出而歎曰命世大才經綸名教者不必華宗夏士撥煩理亂澄氛濟世者亦未必八索九丘五經之外冠冕之表復自有人車騎神機秀發信一代之偉人繇余日磾豈足為多也令徳六軍起纛五馬渡江先王維桑分割有素中州舊物吞噬無餘二趙四燕蝟毛而起三秦五凉􅅙食以生李特王蜀赫連稱夏竊帝圗王時聞令徳連衡共誓各負英獻書云萬夫之長可以觀政矧據有土宇僭稱名器宜欲有拳拳之善以服蚩蚩之心前凉張重華自稱凉州牧輕賦斂除闗稅省園囿以恤貧窮張天錫數宴園池政事頗廢盪難將軍校書祭酒索商上䟽極諫天錫答曰吾非好行行有得也觀朝榮則敬才秀之士翫芝蘭則愛徳行之臣覩松竹則思貞操之賢臨清流則貴㢘潔之行覽蔓草則賤貪穢之吏逢飈風則惡㓙狡之徒若引而伸之觸類而長之庶無遺漏矣西凉李暠字𤣥盛少而好學性沈敏寛和美器度暠既遷於酒泉沮渠蒙遜每年侵㓂不止𤣥盛志在以徳撫其境内但與通和立盟弗之較也又與辛景辛恭靖同志友善景等歸晉遇害江南𤣥盛聞而弔之前趙劉曜嘗燕羣臣於東堂語及平生泫然流涕遂下書曰蓋褒徳惟舊聖后之所先念恵録孤眀王之常典是以世祖草創河北而致封於嚴尤之孫魏武勒兵梁宋追慟於橋公之墓前所贈大司徒烈愍公崔岳中書令曹恂晉陽太守王忠太子洗馬劉綏等或識朕於齠齔之中或濟朕於艱窘之極言念君子實傷我心詩不云乎中心蔵之何日忘之岳漢昌之初雖有褒贈屬否運之際禮章莫備今可贈岳使持節侍中大司徒遼東公恂大司空南郡公綏左光禄大夫平昌公忠鎮軍將軍安平侯並加散騎常侍但皆丘墓夷滅申哀莫繇有司其速班訪岳等子孫授以茅土稱朕意焉初曜弱冠逰於雒陽坐事當誅與曹恂奔於劉綏綏匿之於書匱載送於王忠忠送之朝鮮嵗餘饑窘變姓名客為縣卒岳為朝鮮令見而異之推問所繇曜叩頭自首流涕求哀岳曰卿謂崔元嵩不如孫賔碩乎何懼之甚也今詔捕卿甚峻百姓間不可保也此縣幽僻勢能相濟縱有大急不過解印綬與卿俱去耳吾既門衰無兄弟之累身又薄祐未有兒子卿猶吾子弟也勿為過憂大丈夫處身立世鳥獸投人要欲濟之而况君子乎給以衣服資供書傳曜遂從岳質通疑滯恩顧甚厚岳從容謂曜曰劉生姿宇神調命世之才也四海脫有微風揺之者英雄之魁卿其人矣曹恂雖於屯厄之中事曜有君臣之禮故皆徳之後趙石勒大興三年偽稱趙王下令曰武鄉吾之豐沛萬嵗之後魂靈當歸之其復之三世又少時遇危難賴郭敬而濟後勒攻乞活李惲於上白斬之將坑其降卒見郭敬而識之曰汝郭季子乎敬叩頭曰是也勒下馬執其手泣曰今日相遇豈非天耶賜衣服車馬署敬上將軍悉免降者以配之又時大旱勒親臨廷尉録囚徒五嵗刑以下皆輕决遣之重者賜酒食聴沐浴一須秋論還未及宫㴻雨大降石季龍時冀州八郡大蝗司𨽻請坐守宰季龍曰此政之失和朕之不徳而欲委咎於守宰豈禹湯罪已之義耶司𨽻不進讜言佐朕不逮而歸咎無辜所以重吾之責可白衣領司𨽻前秦苻堅既平慕容暐自鄴如枋頭讌諸父老改枋頭為永昌縣復之終世又遣驍騎吕光率兵七萬討定西域光發長安堅送於建章宮謂光曰西戎荒俗非禮義之邦覊縻之道服而赦之示以中國之威導以王化之法勿極武窮兵過深殘掠又所司奏劉蘭討蝗幽州經秋冬不滅請徵下廷尉詔獄堅曰災降自天殆非人力所能除也此自朕之政違所致蘭何罪焉後秦姚萇僭即偽位後大雪下書深自責罰散後宫文綺珍寳以供戎事身食一味妻不重采立太學禮先賢之後敗符登於安定東置酒髙㑹諸將咸曰若值魏武王不令此賊至今陛下將牢太過耳萇笑曰吾不如亡兄有四身長八尺五寸臂垂過膝人望而畏之一也當十萬之衆與天下争衡望麾而進前無横陣二也温古知今講論道藝駕馭英雄收羅雋異三也董率大衆履險若夷上下咸􅁢人盡死力四也所以得建功立業䇿任羣賢者正望筭畧中一片耳羣臣咸稱萬嵗姚興時西秦乞伏乾歸為其下人所殺子熾磐新立羣下咸勸興取之興曰乾歸先已返善吾方當招懐因䘮伐之非朕本志也興性儉約車馬無金玉之飾臣下化之莫不敦尚清素又客星入東井所在地震前後一百五十六公卿抗表請罪興曰災譴之来咎在元首近代或歸罪三公甚無謂也公等其悉冠履復位後興以日月薄蝕災眚屢見降號稱王下書令羣公卿士將牧守宰各降一等於是其太尉趙公旻等五十三人上䟽諫曰伏惟陛下勲格皇天功濟四海威靈振於殊域聲教暨於遐方雖成湯之隆殷基武王之崇周業未足比諭方當廓靖江吳告成中岳豈宜過垂冲損違皇天之眷命乎興曰殷湯夏禹徳冠百王然猶順守謙冲未居崇極况朕寡昧安可以處之哉乃遣旻告於社稷宗廟大赦改元𢎞始賜孤老鰥寡粟帛有差年七十已上加衣杖姚泓字元子既僭即帝位將封宫臣十六人五等子男姚讃諌曰東宫文武自當有守忠之誠未有赫然之効何受封之多乎泓曰懸爵於朝所以懲勸来効標眀盛徳元子遭家不造與功臣同此百憂獨享其福得不愧於心乎讃黙然姚紹進曰陛下不忘報徳封之是也古者敬其事命之以始須来春然後議之乃止時姚懿以叛被囚姚恢復叛姚紹率輕騎先赴難使姚洽司馬國璠將歩卒三萬赴長安恢從曲牢進屯杜成紹與恢相持於靈臺姚讃聞恢漸逼留寜朔尹雅為𢎞農太守守潼闗率諸軍還長安泓謝讃曰元子不能崇眀徳義導率羣下致禍起蕭牆變生同氣既上負祖宗亦無顔見諸父懿始搆逆滅亡恢復擁衆内叛將若之何讃因攘􅃑大泣曰臣不滅此賊終不持面復見陛下於是班賜軍士而遣之讃大破恢并其二弟殺之泓哭之悲慟𦵏以公禮後蜀李雄僣即帝位巴都嘗告急云有東軍雄曰吾常慮石勒䟦扈侵逼琅邪以為耿耿不圖乃能舉兵使人欣然雄之雅譚多如此類雄後遣安北李稚中領軍李琀討楊難敵難敵遣兵斷其歸道四面攻之獲琀稚死者數千人琀稚雄兄蕩之子也雄深悼之不食者數日則流涕深自咎責焉西秦乞伏乾歸遣其將乞伏益州討姜乳於上邽邉芮王松夀言於乾歸曰益州屢有戰功嘗有驕色未宜専任乾歸卒遣之益州果敗乾歸曰孤違蹇叔以至於此將士何為孤之罪也皆赦之北燕馮䟦㓜而懿重少言寛仁有大度飲酒一石不亂三弟皆任侠不修行業惟䟦恭慎勤於家産父母器之南凉秃髪傉擅僭號凉王姚興凉州刺史王尚遣主簿宗敞来聘敞父爕吕光時自湟河太守入為尚書郎見傉擅於廣武執其手曰君神爽宏㧞逸氣凌雲命世之傑也必當尅清世難恨吾年老不及見耳以敞兄弟託君至是傉擅謂敞曰孤以常才謬為尊先君所見稱每自恐有累大人氷鏡之眀及忝家業竊有懐君子詩云中心蔵之何日忘之不圗今日得見卿也敞曰大王仁侔魏祖存念先人雖朱暉眄張堪之孤叔向撫女齊之子無以加也酒酣語及生平傉擅曰卿魯子敬之儔恨不與卿共成大業耳才藝夫僣稱名號據有山河長百萬之氓跨數州之域生殺在手彊弱繇心或學通經史暗㑹孫吳或藝精騎射兼該象緯而又飾之以詞翰輔之以度量彊眀政事固多才藝亦可謂人傑矣不然曷以臣伏黨類駕馭羣豪者乎前凉張軌少眀敏好學有器望張祚博學雄武有政事之才西凉李暠少而好學性沉敏寛和美器度通渉經史尤善文義及長頗習武藝誦孫吳兵法前趙劉元海㓜好學師事上黨崔游習毛詩京氏易馬氏尚書尤好春秋左氏傳孫吳兵法畧皆誦之史漢諸子無不綜覽猿臂善射膂力過人劉和好學夙成習毛詩左氏春秋鄭氏易劉聰幼而聰悟好學愽士朱紀大竒之年十四究通經史兼綜百家之言孫吳兵法靡不誦之工草𨽻善屬文著述懐詩百餘篇賦頌五十餘篇十五習擊刺猿臂善射彎弓三百斤膂力驍㨗冠絶一時劉粲少而雋傑才兼文武劉曜㓜而聰慧有竒度性拓落髙亮與衆不羣讀書志於廣覽不精思章句善於属文工草𨽻雄武過人鐵厚一寸射而洞之於時號為神射尤好兵書畧皆闇誦弱冠游於洛陽坐事當誅亡匿朝鮮遇赦而歸隠迹管涔山以琴書為事後趙石勒長而壯健有膽力雄武好騎射石季龍尤善彈趫捷便弓馬勇冠當時前燕慕容皝雄毅多權畧尚經學善天文慕容雋慱觀圖書有文武幹畧慕容恪幼而謹厚深沈有大度雄毅嚴重每所言及輙經綸世務前秦符洪多權畧驍武善騎射符健勇果便弓馬符生力舉千鈞雄勇好殺手格猛獸走及奔馬擊刺騎射冠絶一時符堅博學多才藝有經濟大志符丕少而聰慧好學博綜經史父堅與言將畧嘉之命鄧羌教以兵法文武材幹亞於符融符登少而雄勇有壯氣不修細行長而折節謹厚頗覽書𫝊後秦姚襄雄武多才藝眀察善撫納士衆愛敬之姚泓博學善談論尤好詩詠受經於博士淳于岐後蜀李特雄武善騎射沉毅有大度李流少好學便弓馬東羌校尉何攀稱流有賁育之勇舉為東羌督李期聰慧好學弱冠能屬文李夀敏而好學雅量豁然少尚禮容異於李氏諸子父雄竒其才以為足寄重任後凉吕簒少便弓馬好鷹犬吕隆善騎射後燕慕容寳自為太子砥礪自修敦崇儒學工談論善属文慕容盛驍勇剛毅有伯父全之風烈慕容雲沈深有局量厚重希言慕容寳之為太子雲以武藝給事侍東宫西秦乞伏國仁年十嵗驍勇善騎射彎弓五百斤四部服其雄武乞伏乾歸雄武英傑沉雅有度量乞伏熾磐性勇果英毅臨機能斷北凉沮渠蒙遜博渉羣史頗曉天文雄傑有英畧滑稽善權變南燕慕容徳博觀羣書性清慎多才藝吳楊行宻少孤貧有膂力日行三百里唐末秦宗權擾淮右頻冦廬夀郡將募能致戰擒賊者計級賞之行宻以膽勇應募徃必有獲蜀王建機畧拳勇出於流軰後蜀孟知祥自幼温厚知書樂善冊府元龜卷二百二十
