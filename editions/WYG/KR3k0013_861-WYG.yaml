body:
  text: 册府元龜卷八百六十一宋王欽若等撰總録部筆札自結繩既代迄於夏商蟲篆鳥跡以紀庶物其後篆籕殊體草隸繼作踵事變本增華競逐世之學者研精極慮克臻其妙各自名家乃至馳聲於天臺流譽於絶域傑出於衆為時所珍自非心術之幽通天機之異禀又曷能窮妙墨之深致為藝圃之殊觀哉漢陳遵為校尉性善書與人尺牘主皆藏弆以為榮弆亦藏也後漢崔瑗為濟北相瑗子寔為尚書並善草書張超為車騎將軍别部司馬善於草書妙絶時人世共傳之張芝太常奐之子字伯英少持髙操公車有道徵皆不至號張有道尤好草書學崔杜之法家之衣帛必書而後練臨池學書水為之黑下筆必為楷則號怱怱不暇草書為世所寳寸紙不遺韋仲將謂之草聖也芝及弟昶字文舒並善草書先是杜伯䖍崔子玉以工草書稱於前代趙襲與羅暉拙書見􅅓於芝芝頗自矜髙與朱賜書云上比崔杜不足下方羅趙有餘也孫敬少時畫地學書書日進焉楚國先賢傳曰敬好學嘗閉戸號為閉戸先生魏梁鵠字孟皇漢末師宜官𨽻書為最甚矜其能每書輙削焚其札鵠乃益為版而飲之酒候其醉而竊其札鵠卒以攻書至選部尚書太祖欲為雒陽令鵠以為北部尉鵠後依劉表及荆州平太祖募求鵠鵠懼自縳詣門署軍假司馬使在祕書以勤書自效太祖嘗縣著帳中及以釘壁玩之謂勝宜官魏宫殿題署皆鵠書也韋誕為郎中除武都太守以書不之郡轉侍中雒陽鄴許三都宮觀始就命誕銘題以為承制以御筆墨皆不任用因奏曰夫工欲善其事必先利其器用張芝筆左伯紙及臣墨兼此三具又得臣手乃可以逞徑丈之勢小則方寸千言衛覬典著作好古文鳥篆𨽻草無所不善一云尤工古文筆跡精絶劉廙為五官將文學文帝器之命廙通草書胡昭字孔明養志不仕善史書與鍾繇邯鄲淳衛覬韋誕並有名尺牘之迹動見模楷焉王凌為太尉少子明山最知名善書多技藝人得其書皆以為法吳張紘為㑹稽東部都尉既好文學又善楷篆嘗與孔融書融遺紘書曰前勞手筆多篆書每舉篇見字欣然獨笑如復覩其人也張昭字子布為輔吳將軍少善𨽻書皇象字休明廣陵江都人㓜工書時有張子並陳梁甫能書甫恨遒並恨峻象斟酌其間甚得其妙中國善書者不能及也晉荀朂為光禄大夫領祕書監始書師鍾胡法鍾繇胡昭也衛瓘為尚書令與尚書郎燉煌索靖俱善草書時人號為一臺二妙漢末張芝亦善草書論者謂瓘得伯英筋靖得伯英肉瓘子恒為黄門郎善草𨽻書為四體書勢曰昔在黄帝創制造物有沮誦蒼頡者始作書契以代結繩盖覩鳥跡以興思也因而遂滋則謂之字有六義焉一曰指事上下是也二曰象形日月是也三曰形聲江河是也四曰㑹意武信是也五曰轉注老考是也六曰假借令長是也夫指事者在上為上在下為下象形者日滿月虧效其形也形聲者以類為形配以聲也㑹意者止戈為武人言為信也轉注者以老夀考也假借者數言同字其聲雖異文意一也自黄帝至三代其文不改及秦用篆書焚燒先典而古文絶矣漢武時魯恭王壊孔子宅得尚書春秋論語孝經時人以不復知有古文謂之蝌斗書漢世祕藏希得見之魏初傳古文者出於邯鄲淳恒祖敬侯衛覬也寫淳尚書後以示淳而淳不别至正始中立三字石經轉失淳法因蝌斗之名遂效其形太康元年汲縣人盜發魏襄王冡得策書十餘萬言案敬侯所書猶有髣髴古書亦有數種其一卷論楚事者最為工妙恒竊恱之故竭愚思以賛其美愧不足厠前賢之作冀以存古人之象焉古無别名謂之字勢云黄帝之史沮誦蒼頡眺彼鳥跡始作書契紀綱萬事垂法立制帝典用宣質文著世爰暨暴秦滔天作戾大道既冺古文亦滅魏文好古世傳丘墳歴代莫發真偽靡分大晉開元𢎞道敷訓天垂其象地耀其文其文乃耀粲矣其章因聲㑹意類物有方日處君而盈其䖍月執臣而虧其旁雲委蛇而上布星離離以舒光木卉苯䔿以垂頴山岳峨嵯而連崗蟲跂跂其若動鳥似飛而未揚觀其錯筆綴墨用心精専勢和體均發止無間或守正循塗矩折規旋或方員靡則因事制權其曲如弓其直如弦矯然特出若龍騰於川森爾下頺若雨墜於天或引筆奮力若鴻鴈髙飛邈邈翩翩或縱肆阿那若流蘇懸羽靡靡緜緜是故逺而望之若翔風厲水清波漪漣就而察之有若自然信黄唐之遺跡為六藝之範先籀篆盖其子孫𨽻草乃其曾𤣥覩物象以致思非言辭之所宣昔周宣王時史籕始著大篆十五篇或與古同或與古異世謂之籀書者也及平王東遷諸侯立政家殊國異而文字乖形秦始皇帝初兼天下丞相李斯乃奏益之罷不合秦文者斯作蒼頡篇中車府令趙高作爰厯篇太史令胡母敬作博學篇皆取史籀大篆或頗省改所謂小篆者或曰下丕人程邈為衙獄吏得罪始皇幽繫雲陽十年從獄中作大篆少者增益多者損減方者使圓圓者使方奏之始皇始皇善之出以為御史使定書或曰邈所定乃隸字也自秦壊古文有八體一曰大篆二曰小篆三曰刻符四曰蟲書五曰摹印六曰署書七曰殳書八曰隸書王莽時使司空甄豐較文字部改定古文復有六書一曰古文孔氏壁中書也二曰竒字即古文而異者也三曰篆書秦篆書也四曰佐書即隸書也五曰繆篆所以摹印也六曰鳥書所以書幡信也及許慎撰說文用篆書為正以為體例最可得而論也秦時李斯號為二篆諸山及銅人銘皆斯書也漢建初中扶風曹喜少異於斯而亦稱善邯鄲淳師焉畧究其妙韋誕師淳而不及也太和中誕為武都太守以能書留補侍中魏氏寳器銘題皆誕書也漢末又有蔡邕采斯喜之法為古今雜形然精宻閑理不如淳也邕作篆勢曰鳥遺跡皇頡循聖作則制斯文體有六篆為真形要妙巧入神或龜文鍼列櫛比龍鱗紆體放尾長短複身頺若黍稷之垂頴藴若蟲蛇之棼緼揚波振撆鷹跱鳥震延頸脅翼勢似凌雲或輕筆内投微本濃末若絶若連似水露縁絲凝垂下端從者如縣横者如編杳杪邪趣不方不圎若行若飛跂跂翾翾逺而望之若鴻鵠羣游絡繹遷延廹而視之端際不可得見指撝不可勝原研桑不能數其詰屈離婁不能覩其郤間般倕揖讓而辭巧籕誦拱手而韜翰處篇籍之首目􅙾斌斌其可觀摘華豔於紈素為學藝之範先嘉文徳之𢎞懿愠作者之莫刋思字體之頫仰舉大畧而論旃秦既用篆秦事繁多篆字難成即令隸人佐書曰隸字漢因行之獨符印璽幡信題署用篆隸書者篆之捷也上谷王次仲作楷法至靈帝好書時多能者而師宜官為最大則一字徑丈小則方寸千言甚矜其能或時不持錢詣酒家飲因書其壁顧觀者以讐酒討錢足而滅之每書輙削而焚其柎梁鵠乃益為版而飲之酒候其醉而竊其柎鵠卒以書至選部尚書宜官後為袁術將今鉅鹿宋子有耿球碑是術所立其書甚工云是宜官也梁鵠奔劉表魏武帝破荆州募求鵠鵠之為選部也魏武欲為雒陽令而以為北部尉故懼而自縳詣軍門署軍假司馬在祕書以勤書自效是以今者多有鵠手跡魏武帝懸著帳中及以釘壁玩之以為勝宜官今宮殿題署多是鵠書鵠宜為大字邯鄲淳宜為小字鵠謂淳得次仲法然鵠之用筆盡其勢矣鵠弟子毛𢎞教於祕書今八分皆𢎞法也漢末有左子邑小與淳鵠不同然亦有名魏初有鍾胡二家為行書法俱學之於劉徳升而鍾氏小異然亦各有巧今大行於世云作隸勢曰鳥跡之變乃惟佐隸蠲彼繁文崇此簡易厥用既𢎞體象有䖍煥若星陳鬰若雲布其大徑尋細不容髪隨事從宜靡有常制或穹窿恢廓或櫛比鍼列或砥平繩直或蜿蛋膠戾或長邪角趣或規旋矩折修短相副異體同勢奮筆輕舉離而不絶纎波濃㸃錯落其間若鐘簴設張庭燎飛煙嶃巖􅏭嵯髙下屬連似崇臺重宇層雲冠山逺而望之若飛龍在天近而察之心亂目眩竒姿詭譎不可勝原研桑所不能計宰賜所不能言何草篆之足筭而斯文之未宣豈體大之難覩將祕奥之不傳聊俯仰而詳觀舉大較而論旃漢興而有草書不知作者姓名至章帝時齊相杜度號善作篇後有崔瑗崔寔亦皆稱工杜氏結字甚安而書體微痩崔氏甚得筆勢而結字小疎𢎞農張伯英者因而轉精甚巧凡家之衣帛必書而後練之臨池學書池水盡黑下筆必為楷則號怱怱不暇草書寸紙不見遺至今世尤寳其書韋仲將謂之草聖伯英弟文舒者次伯英又有姜孟穎梁孔逹田彦和及韋仲將之徒皆伯英弟子有名於世然殊不及文舒也羅叔景趙元嗣者與伯英並時見稱於西州而矜巧自與衆頗惑之故英自稱上比崔杜不足下方羅趙有餘河間張超亦有名然雖與崔氏同州不如伯英之得其法也崔瑗作草書勢曰書契之興始自頡皇寫彼鳥跡以定文章爰暨末葉典籍彌繁時之多僻政之多權官事荒蕪勦其墨翰惟作佐隸舊字是删草書之法盖又簡畧應時諭指用於卒廹兼功並用愛日省力純儉之變豈必古式觀其法象俯仰有儀方不中矩員不副規傾左揚右望之若﨑竦企鳥峙志在飛移狡獸暴駭將奔未馳或􅣺􅚍㸃􅚭狀似連珠絶而不離畜怒怫鬱放逸生竒或凌邃惴慄若據髙臨危旁㸃邪附似蜩螗挶枝絶筆收勢餘綖糾結若杜伯揵毒縁􅇖螣蛇赴穴頭沒尾垂是故逺而望之隤焉若沮岑崩崖就而察之一畫不可移機微要妙臨時從宜畧舉大較髣髴若斯索靖為尚書郎與尚書令衛瓘俱以善草書知名武帝愛之瓘筆勝靖然有楷法逺不能及靖靖作草書狀其辭曰聖皇御世隨時之宜蒼頡既生書契是為蝌斗鳥篆類物象形叡哲變通意巧滋生損之隷草以崇簡易百官畢修事業並麗盖草書之為狀也婉若銀鈎漂若驚鸞舒翼未發若舉復安蟲蛇虯蟉或往或還類阿那以羸形歘奮釁而桓桓及其逸遊盻嚮乍正乍邪騏驥暴怒逼其轡海水窊隆揚其波芝草蒲萄還相繼棠棣融融載其華𤣥熊對踞於山嶽飛燕相追而差池舉而察之又似乎和風吹林偃草扇樹枝條順氣轉相比附􅆼嬈亷苫隨體散布紛擾擾以猗靡中持疑而猶豫𤣥螭狡獸嬉其間騰猨飛鼺相奔趣凌魚奮尾蛟龍反據投空自竄張設牙距或若登髙望其類或若既往而中顧或若俶儻而不羣或若自簡於常䖍於是多才之英篤藝之彦役心精微耽此文憲守道兼權觸類生變離析八體靡形不判去繁存微大象未亂上理開元下周謹案騁辭放手雨行氷散髙音翰厲溢越流漫忽班班而成章信竒妙之煥爛體磊落而壯麗姿光潤以粲粲命杜䖍運其指使伯英廻其腕著絶世於紈素垂百世之殊觀李充為丞相掾累遷中書侍郎善楷書妙參鍾索世咸重之李式充從兄也為侍中善楷隸辛謐為太子舍人兼散騎常侍工草隸書為時楷法王羲之為右軍將軍㑹稽内史尤善隸書為古今之冠論者稱其筆勢以為飄若游雲矯若驚龍羲之甞詣門生家見棐几滑淨因書之真草相半後為其父誤刮去之門生驚懊者累日又甞在蕺山見一老姥持六角竹扇賣之羲之書其扇各為五字姥初有愠色因謂姥曰但言是王右軍書以求百錢邪姥如其言人競買之他日姥又持扇来羲之笑而不答其書為世所重皆此類也每自稱我書比鍾繇當抗衡比張芝猶當鴈行也曾與人書云張芝臨池學書池水盡黑使人耽之若是未必後之也羲之書初不勝庾翼郗愔及暮年方妙嘗以章草答庾亮而翼深歎伏因與羲之書曰吾昔有伯英章草十紙過江顛狽遂乃亡失嘗嘆妙迹永絶忽見足下答家兄書煥若神明頓還舊觀王凝之羲之子也為左將軍㑹稽内史亦工草隸王獻之凝之弟也為中書令始七八歳時學書父羲之密從後掣其筆不得歎曰此兒後當復有大名嘗書壁為方丈大字羲之甚以為能觀者數百人後為謝安長史安嘗問曰君書何如君家尊答曰故當不同安曰外論不爾答曰外人那得知時議者以為羲之草隸江左中朝莫有及者獻之骨力逺不及父而頗有媚趣桓𤣥雅愛其父子書各為一帙置左右以玩之謝安字安石為太保善行書宋孔琳之為祠部尚書以草書擅名羊欣為中書郎尤長隷書初欣年十二父不疑為烏程令時王獻之為吳興太守甚知愛之獻之嘗夏月入縣欣着新練裙晝寢獻之書裙數幅而去欣本工書因此彌善徐希秀為游撃將軍甚有學觧亦閑篆隸正費禪靈二寺碑即希秀書也蕭思話為中書令丹陽縣尹工書學於羊欣得草妙南齊劉繪為中書郎撰能書人名自云善飛白言論之際頗好矜衒周顒為國子博士以從外氏車騎將軍臧質家得衛恒散隸書法學之甚工文惠太子使顒書𤣥圃茅齋壁國子祭酒何𦙍以倒薤書求就顒換之顒笑而答曰天下有道丘不與易也王僧䖍為尚書令弱冠善隸書初宋文帝見其書素扇歎曰非惟跡逾子敬王獻之字方當器雅過之晉泰始中出為吳興太守秩中二千石晉世王獻之善書為吳興郡及僧䖍攻書又為郡論者榮之昇明中為尚書令嘗為飛白書題尚書省壁曰圓行方止物之定質修之不已則溢髙之不已則慄馳之不已則躓引之不已則逸是故去之宜疾當時嗟賞以比座右銘及太祖即位與僧䖍賭書畢謂僧䖍曰誰為第一僧䖍曰臣書第一陛下亦第一一云臣書人臣中第一帝書帝中第一帝曰卿可謂善自為謀矣示僧䖍古跡十一帙就求能書人名僧䖍得民間所有帙中所無者吳大帝景帝歸命侯書桓𤣥書及王丞相導領軍洽中書令珉張芝索靖衛伯玉張翼十一卷奏之又上羊欣所撰能書人名一卷又為論書曰宋文帝書自云可比王子敬時議者云天然勝羊欣功夫少於欣王平南廙右軍叔過江之前以為最亡曾祖領軍書右軍云弟書遂不減吾變古制今惟右軍領軍不爾至今猶法鍾張亡從祖中書令書與子敬云弟書如騎騾駸駸恒欲䖍驊騮前庾征西翼書少時與右軍齊名右軍後進庾猶不分在荆州與都下人書云小兒軰賤家雞皆學逸少書須吾下當比之張翼王右軍自書表晉穆帝令翼寫題後答右軍當時不别久後方悟云小人㡬欲亂真張芝索靖韋誕鍾㑹二衛並得名前代無以辯其優劣惟見其筆力驚異耳張澄當時亦呼有意郗愔章草亞於右軍嘉賔草亞於二王𦂳媚過其父桓𤣥自謂右軍之流論者以比孔琳之謝安亦入能書録亦以自重為子敬書嵇康詩羊欣書見重一時親受子敬行書尤善正乃不稱名孔琳之書天然放縱極有筆力規矩恐在羊欣後丘道䕶與羊欣俱面受子敬故當在欣後范􅁮與蕭思話同師羊欣後小叛既失故歩為復小有意耳蕭思話書羊欣之影風流趣好殆當不減筆力恨弱謝綜書其舅云𦂳生起是得賞也恨少媚好謝靈運書乃不倫遇其合時亦得入流賀道力書亞丘道䕶庾昕書學右軍亦欲亂真矣又著書傳於世王慈僧䖍子也為東海太守謝超宗嘗謂之曰卿書何如䖍公慈曰我之不得仰及猶雞之不及鳯也時人以為名答超宗鳯之子梁蕭㡬字徳𤣥為尚書左丞善草隷書王志初仕齊為吏部尚書善藁隸當時以為楷法齊游撃將軍徐希秀亦號能書嘗謂志為書聖殷均字季和尚武帝女永興公主拜駙馬都尉善隸書為當時楷法南鄉范雲樂安任昉並稱貴之顔協為湘東王記室少博渉羣書工於草隸飛白吳人范懐約能𨽻書協學其書殆過真也荆楚碑碣皆協所書時有㑹稽謝善勛能為八體六文方寸千言京兆韋仲善飛白並在湘東王府府中以協優於韋仲而減於善勛蕭子雲為侍中善草𨽻書為世楷法自云善效鍾元常王逸少而微變字體答勅曰臣昔不能拔賞隨世所貴規摹子敬多歴年所年二十六著晉史至二王列傳欲作論草隸法言不盡意遂不能成畧指論飛白一勢而已十許年来始見勅㫖論書一卷商畧筆勢洞徹字體又以逸少之不及元常猶子敬之不及逸少自此研思方悟𨽻式始變子敬全範元常逮爾以来自覺功進其書迹雅為髙祖所重嘗論子雲書曰筆力勁駿心手相應巧踰杜䖍美過崔寔當與元常並驅争先其見賞如此百濟國使人至建業求書逢子雲出為東陽太守維舟將發使人於渚次候之望船三十許歩拜行前子雲遣問之答曰侍中尺牘之美逺流海外今日所求惟在名跡子雲乃為停船三日書三十紙與之蕭特子雲子也為太子舍人亦善草書髙祖嘗論子雲曰子敬之書不及逸少近見特迹遂逼於卿蕭乾子雲兄子也乾字思惕善隸書得叔父子雲之法仕陳為五兵尚書到沆為北中郎將諮議叅軍勤學工篆隸劉孝綽為祕書監善草隸自以書似父乃變為别體陳蔡景歴好學善尺牘工草隸觧褐諸王府佐趙知禮為右衛將軍善隸書王彬字思文為祕書監好文章善篆隸與兄志齊名時人為之語曰三真六草為天下寳蕭引為金部侍郎善隸書為當時所重宣帝甞披奏事指引署名曰此字筆勢翩翩似鳥之欲飛引謝曰此陛下假其毛羽耳毛喜為光禄大夫少好學善草隸謝貞為招逺將軍掌中宮管記初貞年十三工草隸蟲篆徐僧權為梁東宫通事舍人領祕書以善書知名後魏谷渾字元冲道武時以善隷書為内侍左右崔宏字𤣥伯濳之子也位至天部大人爵為公尤善草隸行押之書為世摹楷𤣥伯祖恱與范陽盧諶並以博藝知名諶法鍾繇恱法衛瓘俱習索靖之草皆盡其妙諶傳子偃偃傳子邈恱傳濳濳傳𤣥伯世不替業故魏初重崔盧之書又𤣥伯之行押書特精巧而不見遺跡崔簡字冲亮𤣥伯子也一名覺為中書侍郎叅著作事好學少以善書知名崔浩𤣥伯子天興中為著作郎道武以其工書嘗置左右浩既工書人多託寫急就章從少至老初不憚勞所書盖以百數必稱馮代彊以示不敢犯國其謹也如此浩書體勢及其先人而妙巧不如也世寳其跡多裁割綴連以為模楷崔衡字伯玉學崔浩書頗亦類焉獻文天安元年擢為内祕書中散班下詔命及御所覽書多其跡也崔挺為中書侍郎以工書受勅於長安書文明太后父燕宣王碑賜爵泰昌子崔濳仕慕容暐為黄門侍郎為兄渾誄其手筆本草宣武初著作佐郎王遵業買書於市而遇得之計誄至是將二百載寳其書迹深藏祕之東魏武定中遵業子松年以遺黄門郎崔季舒人多摹楷之左光禄大夫姚元標以工書知名於時見濳書謂過於己也江式為殄冦將軍符節令以書文昭太后尊號諡册特除奉朝請仍符節令式篆體尤工雒京宫殿諸樓觀題皆式書也江順和式兄子也為征虜將軍亦工篆書先是太和中兖州人沈法㑹能隸書宣武之在東宮𠡠法㑹侍書已後隷迹見知於閭里者甚衆未有如崔浩之妙盧淵為祕書監自逺祖志法鍾繇書傳業累世世有能名至邈以上兼善草跡淵習家法代京宫殿多淵所題白馬公崔𤣥伯亦善書世傳衛瓘體魏初工書者崔盧二門呂温字晞陽為上黨太守善書李思穆為營州刺史工草隷為當時所稱竇遵為尚書郎善楷篆北京諸碑及臺殿樓觀宮門題署多遵書也柳僧習善隸書敏於當時為裴植征虜府司馬劉仁之粗渉書史真草筆跡頗號工便御史中尉元昭引為御史裴敬憲為太學博士學博才清工隸草書髙遵為中書侍郎頗有筆札詣長安刋燕宣王廟碑進爵安昌子郭祚為雍州刺史少習崔浩之書尺牘文章見稱於世劉懋為太尉司馬善草隸多識竒字王繇為給事中東莱太守有文才尤善草隷北齊杜弼為征虜府墨曹叅軍典管記弼長於筆札每為時軰所推蕭慨好學攻草隷書南土中稱為長者歴著作佐郎待詔趙仲將為散騎常侍學渉羣書善草𨽻雖與弟書書字楷正云草不可不觧若施之於人即似相輕易若當家卑㓜又恐其疑所在宜爾是以必湏隸筆源楷字那延為黄門郎善草隸書張景仁㓜孤家貧以學書為業遂工草隸書選補内書生與魏郡姚元標潁川韓毅同郡袁買奴滎陽李超等齊名世宗並引為賔客天保八年勅教太原王紹徳書除開府行叅軍後主在東宮世祖選善書人性行淳謹者令侍書景仁遂被引擢小心恭慎後主愛之呼為博士劉顗好文學工草書為司空功曹待詔文林館後周王襃字子淵初在梁為國子祭酒蕭子雲襃之姑夫也時善草隸襃少以姻戚去来其家遂相模範俄而名亞子雲並見重於世趙文深字徳本為太祖丞相府法曹叅軍少學楷𨽻雅有鍾王之則筆勢可觀當時碑牓唯文深及冀儁而已平江陵之後王襃入關貴遊等翕然並學襃書文深之書遂被遐棄文深慙恨形於言色後知好尚難反亦改習襃書然竟無所成轉被譏議謂之學歩邯鄲焉至於碑牓餘人猶莫之逮王襃亦每推先之宮殿樓觀皆其跡也遷縣伯下大夫加儀同三司世宗令至江陵書景福寺碑漢南人士亦以為工梁主蕭詧觀而美之賞遺甚厚天和元年路寢寺初成文深以題牓之功增邑二百戸除趙郡守文深雖居外任每湏題牓輙復追之隋竇慶頗工草隸官至河東太守房彦謙為司隸刺史善草隸人有得其尺牘者皆寳玩之閻毘為殿内少監能篆書草隸尤善為當時之妙唐楊師道為中書令少善草隸虞世南為祕書監同郡沙門智永善學王羲之書世南師焉妙得其體繇是聲名籍甚歐陽詢為太子率更令初學王羲之書後漸更變其體筆力險勁為一時之絶時人得其尺牘文字咸以為楷範焉其八分龍爪古篆世無及之飛白尤妙議者方於蕭子雲髙麗甚重其書甞遣使求之髙祖嘆曰不意詢之書名逺播夷狄彼觀其跡固謂其形貌魁梧也褚遂良為尚書右僕射博學文史尤工隸草父友歐陽詢甚重之太宗嘗謂魏徵曰虞世南死後無人可與論書徵曰禇遂良下筆遒勁甚得王逸少體太宗即日召令侍書太宗嘗出御府金帛購求王羲之書跡天下爭齎古書詣闕以獻當時莫能辯真偽遂良備論所出一無舛誤自是漸承恩遇每事顧問之裴行儉為吏部侍郎工草書髙宗以縑素百卷令冩文選一部嘗謂人曰禇遂良非精筆佳墨未嘗輙書不擇筆墨而妍捷者唯余及世南耳行儉撰草書雜體數萬言並傳於代王方慶為鸞臺侍郎同鳯閣鸞臺平章事家多書籍則天甞訪求右軍遺跡方慶奏曰臣十代從伯祖羲之書先有四十餘紙貞觀十二年太宗購求先臣並已進之唯有一卷見在今又進臣十一代祖導十代祖洽九代祖珣八代祖曇首七代祖僧綽六代祖仲寳五代祖騫髙祖規祖褒并九代三從伯祖晉中書令獻之已下二十八人書共十卷則天御武成殿示羣臣仍令中書舍人崔融為寳章集以叙其事復賜方慶當時以為榮鍾紹京初為司農録事以工書直鳯閣則天時明堂門額九鼎銘及諸宮門牓皆紹京所題王知敬則天時為麟臺少監以工書知名盧鴻一少有學業頗善籕篆楷隸隱於嵩山薛稷尤工隸書自貞觀永徽之際虞世南禇遂良書跡後罕繼者稷外祖魏徵家富圖籍多有虞禇舊跡稷精模倣筆力遒麗當時無及之者終為太子少保韋陟為吏部尚書㓜有文彩與弟斌篤志勤學以筆札知名賀知章為祕書監善草隸好事者供其牋翰每紙不過數十字共傳寳之時有吳郡張旭亦與知章相善旭尤善草書而好酒毎醉後號呼狂走索筆揮灑變化無窮若有神助時人號為顛知章始與旭遊於人間每見人家㕔舘好牆壁及屏障忽忘機興發落筆數行如蟲篆飛走雖古人之張索不如也然旭稍過於知章張廷珪為太子詹事素與陳州刺史李邕親善邕所撰碑碣必請廷珪八分書甚為時人所重顔真卿字清臣瑯邪臨沂人五代祖之推北齊黄門侍郎真卿少勤學孝敬有文詞工書官至太子太師徐浩肅宗時為中書舍人浩屬詞贍給又工楷隸韓滉字太冲少好學弱冠强學尤工書位至檢校僕射平章事封晉國公袁滋工篆籕雅有古法元和中為中書侍郎平章事柳公權初為夏州李聽掌書記穆宗即位入奏事召見謂之曰我於佛寺見卿筆跡思之久矣即日拜右拾遺充翰林侍書學士公權初學王書徧閱近代筆法體勢勁媚自成一家當時公卿大臣家碑版不得公權手筆者人以為不孝外夷入貢皆别署貨貝曰此購柳書上都西明寺金剛經碑備有鍾王歐虞禇陸之體尤為得意文宗夏與學士聮句公權詩曰薰風自南来殿閣生微凉文宗諷此兩句令公權題於殿壁字方圎五寸帝視之嘆曰鍾王復生無以加之大中初轉少師中謝日宣宗召升殿御前書三紙軍容使西門季𤣥捧硯樞密使崔巨源過筆一紙真書十字曰衞夫人傳筆法於王右軍一紙行書十一字曰永禪師真草千字文得家法一紙草書八字曰謂語助者焉哉乎也賜錦綵瓶盤等銀器仍令自書謝狀勿拘真行帝尤竒惜之裴潾為兵部侍郎少篤學善隸書盧知猷為太子太師尤工書落簡飛翰人爭模倣周馬𦙍孫為太子詹事嗜八分書題署酬答必存其蹟楊凝式以右僕射致仕凝式善於筆札居壁藍牆之間往往恣其題紀册府元龜卷八百六十一
