body:
  text: 册府元龜卷五宋王欽若等撰帝王部創業易曰雲雷屯君子以經綸孟子曰天下溺援之以道其創業之謂乎神農以前為而不有功成不居故無得而稱焉炎帝下衰諸侯放恣蚩尤貪暴害於有衆黄帝修徳治兵順天行罰諸侯百姓咸所欣戴遂應土徳之運而有天下非夫聰明睿智神武而不殺者其孰能與於此商周開基其義益顯湯誥曰有夏昏徳民墜塗炭天乃錫王勇知表正萬邦泰誓曰予有臣三千惟一心啇罪貫盈天命誅之故云為淵敺魚者獺也為叢敺爵者鸇也為湯武敺民者桀與紂也漢魏以䧏豪傑竝馳莫不英謀沈斷雄圖逺馭乘時以建義任能以協力撥亂反正與民休息天人合符乃膺大寶有以知天造草昧王業之艱難也黄帝初受國於有熊氏軒轅之丘因以為名軒轅之時神農氏世衰易稱庖犧氏没神農氏作是為炎帝教民耕農故號曰神農諸侯相侵伐暴虐百姓而神農氏弗能征於是軒轅乃習用干戈以征不享諸侯咸來賓從而蚩尤最為暴莫能伐蚩尤古天子孔子三朝記曰蚩尤庶人之貪者炎帝欲侵諸侯諸侯咸歸軒轅軒轅乃修徳振兵治五氣五行之氣蓺五種蓺樹也詩云蓺之荏菽周禮曰穀宜五種鄭𤣥曰五種黍稷菽麥稻也撫萬民度四方度四方而安撫之教熊羆貔貅貙虎以與炎帝戰於阪泉之野阪泉地名也在上谷三戰然後得其志蚩尤作亂不用帝命於是黄帝乃徵師諸侯與蚩尤戰於涿鹿之野涿鹿山名在涿郡又曰在上谷遂禽殺蚩尤皇覽曰蚩尤冡在東平郡壽張縣闞鄉城中髙七丈民嘗十月祀之有赤氣出如疋絳帛名為蚩尤旗肩髀冡在山陽郡鉅野縣重聚大小與闞冡等傳言黄帝與蚩尤戰于涿鹿之野黄帝殺之身體異處故别葬之而諸侯咸尊軒轅為天子代神農氏是為黄帝天下有不順者黄帝從而征之平者去之披山通道披他本一作陂字蓋當為詖詖者旁其邊之謂也披語成合今世然古今不必同也未嘗寜居東至于海登丸山丸作凡在瑯琊朱虗縣及岱宗西至於空峒山名在隴右登鷄頭南至于江登熊湘南伐至于召陵登熊山湘山在長沙益陽縣北逐葷粥匈奴傳曰唐虞以上有土戎獫狁葷粥居於北蠻合符釡山而邑于涿鹿之阿遷徙徃來無嘗處以師兵為營衞帝舜年二十以孝聞三十而堯問可用者四嶽咸薦舜曰可於是堯乃以二女妻舜以觀其内使九男與處以觀其外舜居嬀汭内行彌謹堯二女不敢以貴驕事舜親戚甚有婦道堯九男皆益篤一年而所居成聚二年成邑三年成都堯乃試舜五典百官皆治昔髙陽氏有才子八人蒼舒隤敳檮戭大臨尨降庭堅仲容叔逹世得其利謂之八凱凱和也髙辛氏有才子八人伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍世謂之八元元善也此十六族者世濟其羙不隕其名至於堯堯未能舉舜舉八凱使主后土君治九土之宜以揆百事莫不時序舉八元使布五教於四方父義母慈兄友弟恭子孝内平外成昔帝鴻氏有不才子帝鴻黄帝也不才其苖裔驩兠也掩義隠賊好行凶慝天下謂之渾沌少皥氏金天氏也有不才子毁信惡忠崇飾惡言天下謂之窮竒謂共工氏也其行窮而好竒顓頊氏有不才子不可教訓不知話言天下謂之檮杌檮杌頑凶無儔匹之貌謂鯀也此三族世憂之至于堯堯未能去縉雲氏姜姓炎帝之苗裔也有不才子貪於飲食冒于貨賄天下謂之饕餮天下惡之比之四凶舜賔于四門乃流四凶之族遷于四裔四裔之地去王城四千里以禦魑魅魑魅人面獸身四足好惑人山林異氣所生以為人害於是四門辟言毋凶人也舜入於大麓烈風雷雨不迷堯乃知舜之足授天下使舜攝行天子政廵狩堯三年䘮畢讓堯子丹朱而天下歸舜遂踐天子位夏禹初為司空與益后稷奉帝堯命命諸侯百姓興人徒以傅土傅作敷土也行山表木定髙山大川定其差秩祀禮所視也名山大川五嶽四凟之屬禹傷先人父鯀功之不成受誅鯀治水九年而功弗成舜殛之乃勞身焦思居外十三年過家門不敢入陸行乘車水行乘船泥行乘橇橇或作蕝形如箕㰅行泥上山行乘檋一作橋謂以鐡如錐頭長半寸施之履下以上山不蹉跌也左凖繩右規矩左右言常用也載四時所行不違四時之宜也以開九州通九道陂九澤度九山令益予衆庶稻可種卑濕命后稷予衆庶難得之食食少調有餘相給以均諸侯禹乃行相地宜所有以貢及山川之便利東漸於海西被于流沙朔南曁朔北方也聲教訖於四海于是帝錫禹𤣥圭以告成功於天下天下於是太平始舜薦禹於天為嗣舜三年䘮畢禹辭辟舜之子商均于陽城今潁川陽城是天下諸侯皆去商均而朝禹禹遂即天子位殷湯初為夏方伯得專征伐葛伯不祀湯始伐之孟子曰湯居亳與葛伯為隣地里志曰葛今梁國寜陵之葛鄉湯曰子有言人視水見形視民知治不伊尹曰明哉言能聼道乃進君國子民為善者皆在王官勉哉勉哉湯曰汝不能敬命予大罰殛之無有攸赦作湯征當是時夏桀為虐政淫荒而諸侯昆吾氏為亂湯乃興師率諸侯伊尹從湯湯自把鉞以伐昆吾遂伐桀湯曰格汝衆庶來女悉聼朕言匪台小子台我也敢行舉亂有夏多罪予惟聞女衆言夏氏有罪予畏上帝不敢不正不敢不正桀之罪而誅之今夏多罪天命殛之今女有衆女曰我君不恤我衆舎我嗇事而割政奪民農功而為割剝之政女其曰有罪其奈何夏王率止衆力率奪夏國桀之君臣相率遏止衆力使不得事農相率割剝夏之邑居有衆率怠不和衆民相率怠惰不和同曰是日何時䘮予與女皆亡尚書大傳曰桀云天之有日猶吾之有民日有亡哉日亡吾亦亡矣夏徳若兹今朕必往爾尚及予一人致天之罰予其大理女尚書理字作賚賚賜也女毋不信朕不食言女不從誓言予則孥戮女無有攸赦以告令師作湯誓於是湯曰吾甚武號曰武王詩曰武王載斾有䖍秉鉞毛萇曰武王湯也桀敗於有娀之墟桀犇於鳴條夏師敗績湯遂伐三㚇俘厥寳玊三㚇國名桀走保之今定陶地俘取也義伯仲伯作典寳二臣作典寳一篇言國之常寳也湯既勝夏欲遷其社不可欲變置社稷而後世無及句龍者故不可而止作夏社言夏社不可遷之義伊尹報一云伊尹報政於是諸侯畢服湯乃踐天子位平定海内周文王為西伯崇侯虎譛於紂紂乃囚西伯於羑里閎夭之徒患之乃求有莘氏美女驪戎之文馬有熊九駟他竒怪物因商嬖臣費仲而獻之紂紂大悦曰此一物足以釋西伯况其多乎乃赦西伯賜之弓矢斧鉞使得征伐西伯乃獻雒西之地以請去炮烙之刑紂許之西伯隂行善諸侯皆來决平於是虞芮之人地里志虞在河東太陽縣芮在馮翊臨晉縣有獄不能决乃如周入界耕者皆譲畔民俗皆譲長虞芮之人未見西伯皆慙相謂曰吾所爭周人所恥何往為祗取辱耳遂還俱譲而去諸侯聞之曰西伯乃受命之君明年伐犬戎山海經曰有人人面獸身名曰犬戎明年伐密須密須氏姑姓之國安定隂密縣是明年敗耆國一作阢殷之祖伊聞之懼以告帝紂紂曰不有天命乎是何能為明年伐邘邘城在野王縣西北音于明年伐崇侯虎而作豐豐在京北鄠縣東有靈臺去長安南數十里自岐山而徙都豐時文王之道被于南國美化行乎江漢之域無思犯禮求而不可得也紂時淫風徧于天下維江漢之域先受文王之教化故有漢廣之詩言徳廣及也文王之化行乎汝墳之國婦人能閔其君子猶勉之以正也言此婦人被文王之化厚事其君子故有汝墳之詩言其道化行也衰亂之俗微貞信之教興彊暴之男不能侵陵貞女衰亂之俗微貞信之教興者此殷之末世周之盛徳當文王與紂之時故有行露之詩周南之國化文王之政在位皆節儉正直徳如羔羊羔羊之化在位卿大夫競相從化皆如羔羊故有羔羊之詩召南之國被文王之化男女得以及時故有摽有梅之詩天下大亂彊暴相陵遂成淫風被文王之化雖當亂世猶惡其無禮故有野有死麕之詩鵲巢之化行人倫既正朝廷既治天下純被文王之化則庶類蕃殖蒐田以時仁如騶虞則王道成也故有騶虞之詩文王之用師率殷之叛國以事紂養是闇昧之君以佐其惡是周道大興而天下大歸往矣故酌之詩曰於鑠王師遵養時晦時純熈矣是用大介鑠美遵率養取晦昧也介助也太子發立是為武王武王即位太公望為師周公旦為輔召公畢公之徒左右王師脩文王緒業九年武王上祭于畢畢文王墓地名也東觀兵至于盟津譙周云史記武王十一年東觀兵十二年尅紂為文王木主載以軍中車武王自稱太子發言奉文王以伐不敢自專乃告司馬司徒司空諸節諸節謂諸受持節有司也齊栗信哉予無知以先祖有徳臣小子受先功一云子小子受先公功畢立賞罰以定其功遂興師師尚父號曰總爾衆庶與爾舟楫後至者斬武王渡河中流白魚躍入于王舟中魚者介鱗之物兵象也白者殷家之正色言殷之兵衆與周之象也武王俯取以祭既渡有火自上復于下至于王屋流為烏其色赤其聲魄王屋王所居屋流行也魄然安定意也書説云烏有孝名武王率父大業故烏瑞臻赤者周之正色也是時諸侯不期而㑹盟津者八百諸侯皆曰紂可伐矣武王曰女未知天命未可也乃還師歸居二年聞紂昏亂暴虐滋甚殺王子比干囚箕子太師庇少師强抱其樂器而犇周於是武王徧告諸侯曰殷有重罪不可以不畢伐一作滅乃遵文王遂率戎車三百乘虎賁三千人虎賁勇士稱也若虎賁言其勇也甲士四萬五千人以東伐紂十一年十二月戊午師畢渡盟津諸侯咸㑹曰孳孳無怠武王乃作太誓告于衆庶今殷王紂乃用婦人之言自絶于天毁壊其三正動逆天地人也離逷其王父母弟王父母弟祖父母之族必言母弟舉親者言之也乃斷棄其先祖之樂乃為淫聲用變亂正聲怡悅婦人故今予發維共行天罰勉哉夫子夫子丈夫之稱不可再不可三二月一作正此建丑之月殷之正月周之二月也甲子昧爽昧𡨕爽明早旦也武王朝至於商郊牧野乃誓癸亥夜陳甲子朝誓之武王左杖黄鉞右秉白旄鉞以黄金飾斧左手杖鉞示無事於誅右手把旄示有事於教令以麾曰逺矣西土之人嗟我有國冡君冢大也司徒司馬司空亞旅師氏亞次旅衆大夫也其位次卿師氏大夫官以兵守門千夫長百夫長師率卒率及庸蜀羗髳微纑彭濮人八國皆蠻夷戎狄羗在西蜀矛微在巴蜀纑彭在西北庸濮在江漢之南纑一作盧稱爾戈稱舉也比爾干立爾矛予其誓王曰古人有言牝雞無晨牝雞之晨惟家之索索盡也婦人知外事雌代雄鳴則家盡也今殷王紂維婦人言是用自棄其先祖肆祀不答肆祭名答報也昬棄其家國遺其王父母弟不用乃維四方之多罪逋逃是崇是長是信是使言紂棄其賢臣而尊長逃亡罪人信用之也俾暴虐于百姓以姦宄于商國今予發維共行天之罰今日之事不過六歩七歩乃止齊焉今日戰士不過六歩七歩乃比相齊言當旋進一心也夫子朂哉不過于四伐五伐六伐七伐乃止齊焉伐謂擊刺也少則四五多則六七以為例也勉哉夫子尚桓桓如虎如羆如豺如離此訓與螭同于商郊不禦克犇以役西土禦疆禦謂疆暴也克殺也不得暴殺紂師之犇走者當以為周之役也勉哉夫子爾所不勉其於爾躬有戮誓已諸侯兵㑹者車四千乘陳師牧野帝紂聞武王來亦發兵七十萬人距武王武王使師尚父與百夫致師周禮環人掌致師鄭𤣥曰致師者致其必戰之志也古者將戰先陳勇力之士犯敵焉春秋傳曰楚許伯御樂伯攝叔為古以致晉師許伯曰吾聞致師者御靡旌摩壘而還樂伯曰吾聞致師者左射以菆代御執轡御下兩馬掉鞅而還攝叔曰吾聞致師者右入壘折馘執俘而還皆行其所聞而復以大卒馳帝紂師帝一作啇紂師雖衆皆無戰之心心欲武王亟入紂師皆倒兵以戰以開武王武王馳之紂兵皆潰畔紂紂走反入登于鹿臺之上䝉衣其珠玉自燔于火而死武王持太白旗以麾諸侯諸侯畢拜武王武王乃揖諸侯諸侯畢從武王至啇商國百姓咸待於郊於是武王使羣臣告語商百姓曰上天䧏休商人皆再拜稽首武王亦答拜入至紂死所武王自射之三發而後下車以輕劒擊之以黄鉞斬紂頭縣太白之旗已而致紂之嬖妾二女二女皆經自殺武王又射三發擊以劒斬以𤣥鉞司馬法曰夏執𤣥鉞宋均曰𤣥鉞用鐵不磨礪縣其頭小白之旗武王已乃出復軍其明日除道修社及商紂宮及期百夫荷罕旗以先驅蔡邕獨斷曰前驅有九旒雲罕東京賦曰雲罕九旒薛綜曰旒旗名武王弟叔振鐸奉陳常軍周公旦把大鉞畢公把小鉞以夾武王散宜生太顚閎夭皆執劍以衞武王既入立于社南大卒之左右畢從毛叔鄭奉明水周禮曰司烜氏以鑑取水於月鄭𤣥曰鑑鏡屬也取月之水欲得隂陽之潔氣陳明水以為𤣥酒衞康叔封布兹兹者藉席之名諸侯病曰負兹召公奭贊采師尚父牽牲尹佚筴祝曰殷之末孫季紂殄廢先王明徳侮蔑神祗不祀昏暴商邑百姓其章顯聞于天皇上帝於是武王再拜稽首曰膺大命革殷受天明命武王又再拜稽首乃出封商紂子禄父殷之餘民武王為殷初定未集乃使其弟管叔鮮蔡叔度相禄父治殷已而命召公釋箕子之囚命畢公釋百姓之囚表商容之閭命南宮括散鹿臺之財發鉅橋之粟以賑貧弱萌𨽻命南宮括史佚展九鼎保玉保玉作寳命閎夭封比干之墓命宗祝享祠于軍乃罷兵西歸行狩記政事作武成武功成也封諸侯班賜宗􅉓作分殷之器物漢髙祖初為泗上亭長為縣送徒驪山秦始皇葬驪山故郡國送徒士往作徒多道亡自度比至皆亡之到豐西澤中夜皆解縱所送徒縱放也曰公等皆去吾亦從此逝矣逝往也徒中壯士願從者十餘人秦二世元年秋七月陳渉起蘄音機縣名屬沛國至陳自立為楚王郡縣多殺長吏以應渉九月沛令欲以沛應之掾主吏蕭何曹參參為掾何為主吏曰君為秦吏今欲背之沛子弟恐不聼願君召諸亡在外者可得數百人因以刼衆刼謂威脅之衆不敢不聼乃令樊噲召髙祖髙祖之衆已數百人矣於是樊噲從髙祖來沛令後悔恐其有變乃閉城城守音狩守其城也欲誅蕭曹蕭曹恐踰城保髙祖保安也就髙祖以自安髙祖乃書帛射城上與沛父老曰天下同苦秦乆矣今父老雖為沛令守諸侯竝起今屠沛屠謂破取城邑誅殺其人如屠六畜然沛今共誅令擇可立立之以應諸侯即室家完不然父子俱屠無為父老乃帥子弟共殺沛令開城門迎髙祖欲以為沛令髙祖曰天下方􅅰諸侯竝起今置將不善一敗塗地謂肝腦塗地也吾非敢自愛恐能薄能才也本獸名能行鹿足堅中强力故人有才者皆為能也不能完父兄子弟此大事願更擇可者蕭曹皆文吏自愛恐事不就後秦種族其家謂誅及種族也盡譲髙祖諸父老皆曰平生所聞劉季竒怪當貴卜筮之莫如劉季最言髙祖數譲衆莫肯為髙祖乃立為沛公祠黄帝祭蚩尤於沛廷而釁皷釁血祭也凡殺牲以血祭者皆為釁於是少年豪吏如蕭曹樊噲等皆為収沛子弟得三千人是月項梁與兄子羽起呉田儋與從弟榮横起齊自立為齊王韓廣自立為燕王魏咎自立為魏王二世二年十月十月秦正月也沛公攻胡陵屬山陽方與音房預亦屬山陽還守豐秦泗州監平將兵圍豐泗州今沛郡秦時御史監郡平其名也三日出與戰破之令雍齒守豐十一月沛公引兵之薛秦泗州守壯兵敗於薛秦時郡置守尉監此泗州有監有守壯其名也走至戚屬東海沛公左司馬得殺之得司馬名也沛公還軍亢父亢音抗父音甫屬任抗城至方與十二月雍齒反為魏守豐魏人周市略地豐沛雍齒不欲屬沛公故為魏守沛公攻之不克正月東陽寗君秦嘉寗君秦嘉二人寗姓時號為君立景駒為楚王在畱畱縣名沛公往從之道得張良遂與俱見景駒請兵以攻豐時章邯從陳别將從謂進計也司馬尼將兵北定楚地尼古夷字章邯司馬也屠相至碭相縣名碭郡名東陽寗君沛公引兵西與戰蕭西蕭縣之西不利還收兵聚畱二月攻碭三日拔之收碭兵得六千人與故合九千人三月攻下邑抜之下邑縣名還擊豐不下四月項梁擊殺景駒秦嘉止薛沛公往見之項梁益沛公卒五千五大夫將十人五大夫第九爵名沛公還引兵攻豐抜之雍齒奔魏六月沛公如薛如往也與項梁共立楚懐王孫心為楚懐王六國為秦所并楚最無罪故求其後立之以祖謚為號順民望也沛公攻亢父章邯圍田榮於東阿沛公與項梁共救田榮大破章邯東阿田榮歸沛公項羽追北北敗也至城陽攻屠其城軍濮陽東復與章邯戰又破之章邯復振振起也振迅而起守濮陽環水沛公項羽去攻定陶八月田榮立田儋子市為齊王定陶未下沛公與項羽西略地至雍丘與秦軍戰大破之斬三川守李繇還攻外黄外黄未下章邯擊項梁九月沛公項羽方攻陳畱聞梁死士卒恐乃與將軍呂臣引兵而東徙懐王自盱台都彭城台音怡呂臣軍彭城東項羽軍彭城西沛公軍碭後九月即閏九月懐王并呂臣項羽軍自将之以沛公為碭郡長封武安侯将碭郡兵初懐王與諸將約先入定關中者王之當是時秦兵彊嘗乘勝逐北諸將莫利先入關不以入關為利言畏秦也獨羽怨秦破項梁奮勢願與沛公西入闗懐王諸老將皆曰項羽為人慓悍祸賊慓疾悍勇好為祸害而殘賊也嘗攻襄城襄城無噍類噍音砟笑反言無有活而噍食者也所􅂈無不殘滅且楚數進取前陳王項梁皆敗陳王陳渉也不如更遣長者扶義而西扶助也亦作杖告諭秦父兄秦父兄苦其主乆矣今誠得長者往毋侵暴宜可下項羽不可遣獨沛公素寛大長者卒不許羽而遣沛公西収陳王項梁散卒乃道碭至陽城與扛里二縣名扛音江攻秦軍壁破其二軍三年十月沛公攻破東郡尉於武成尉郡都尉也本謂之郡尉至景帝時改曰都尉十二月沛公引兵至栗沛郡縣遇剛武侯應邵注云楚懐王將剛侯陳武又云魏將柴武也孟康皆非之顔師古云史失其名姓唯識爵號臣欽若等曰剛武未詳官爵名氏奪其軍四千人并之與魏將皇欣武滿軍合攻秦軍破之二月沛公從碭北攻昌邑遇彭越越助攻昌邑未下三月攻開封未抜西與秦將楊熊㑹戰白馬縣名屬東郡又戰曲遇東曲音丘羽反遇音顒地名大破之楊熊走之滎陽二世使使斬之以狥四月南攻潁川屠之因張良遂略韓地時趙别將司馬卭卭音五剛反方欲渡河入闗沛公乃北攻平隂絶河津南戰雒陽東軍不利從轘轅至陽城收軍中馬騎六月與南陽守齮戰犨東犨縣名也齮音乂犨音昌繇反破之畧南陽郡南陽守走保城守宛沛公用其舎人陳恢言受齮䧏封為殷侯引兵西無不下者至丹水髙武侯鰓襄侯王陵䧏還攻朝陽遇畨君别將梅鋗畨音婆鋗音呼𤣥反與偕攻析酈二縣名析今内鄉酈故菊潭皆降所過毋得鹵掠秦民喜遣魏人寗昌使秦八月沛公攻武闗趙髙殺二世使人來約分王闗中沛公不許又擊破秦嶢闗軍漢元年十月張倉傳云髙祖以十月至霸上故因秦以十月為嵗首沛公至霸上秦王子嬰素車白馬係頸以組封皇帝璽符節䧏軹道旁軹道亭名諸將或言誅秦王沛公曰始懐王遣我固以能寛容且人已服䧏殺之不祥乃以屬吏遂西入咸陽欲止宮休舎樊噲張良諌乃封秦重寳財物府庫還軍霸上蕭何盡収秦丞相府圖籍文書十一月召諸縣豪傑曰父老苦秦苛法乆矣誹謗者族偶語者棄市偶對也吾與諸侯約先入關者王之吾當王關中與父老約法三章耳殺人者死傷人及盗抵罪餘悉除去暴秦法吏民皆按堵如故凡吾所以來為父兄除害非有所侵暴毋恐且吾所以軍霸上待諸侯至而定要束耳乃使人與秦吏行至縣鄕邑告諭之秦民大喜爭持牛羊酒食獻享軍士沛公譲曰倉粟多不欲費民民又益喜惟恐沛公不為秦王或說沛公曰秦富十倍天下地形彊今聞章邯䧏項羽羽號曰雍王王闗中即來沛公恐不得有此可急使守函谷闗毋内諸侯軍稍徵闗中兵以自益距之沛公然其計從之十二月項羽果率諸侯兵欲西入闗闗門閉聞沛公已定闗中羽大怒使黥布等攻破函谷闗遂至戲下亞夫范増説羽曰沛公居山東時貪財好色今聞其入闗珍物無所取婦女無所幸此其志不小吾使人望其氣皆為龍成五色此天子氣急擊之勿失於是饗士旦日合戰沛公用項伯張良謀來謝得免項羽使報懐王懐王曰如約謂令沛公王闗中項羽怒陽尊懐王為義帝自立為西楚霸王更立沛公為漢王王巴蜀漢中漢王怒羽之背約欲攻之丞相蕭何諫乃止夏四月諸侯罷􅃧下各就國羽使卒三萬人從漢王楚子諸侯人之慕從者數萬人從杜南入蝕中蝕音力入漢中川谷名張良辭歸韓漢王送至褒中因說漢王燒絕棧道以傋諸侯盗兵且示項羽無東意漢王既至南鄭諸将及士卒皆歌謳思東歸多道亡還者韓信為治粟都尉亦亡去蕭何追還之因薦於漢王曰必欲爭天下非信無可與計事者於是漢王齋戒設壇塲拜信為大将軍問以計䇿信對曰項羽背約而王君王於南鄭是遷也吏卒皆山東之人日夜企而望歸及其鋒而用之可以有大功天下已定民皆自寜不可復用不如决䇿東向因陳羽可圖三秦易并之計漢王大悦遂聽信䇿部署諸将留蕭何收巴蜀租給軍糧食五月漢王引兵從故道出襲雍雍王邯迎擊漢陳倉雍兵敗還走戰好畤又大敗走廢丘漢王遂定雍地東如咸陽引兵圍雍王廢丘而遣諸將略地塞王欣翟王醫皆降漢項羽聞漢王并關中而齊梁畔之羽大怒乃以故吳令鄭昌為韓王距漢令蕭公角擊彭越越敗角兵時張良狥韓地遺羽書曰漢欲得關中如約即止不敢復東羽以故無西意而北擊齊九月漢王遣将軍薛歐王吸出武闗因王陵兵從南陽迎太公呂后於沛羽聞之發兵距之陽夏不得前二年十月項羽使九江王布殺義帝於郴十一月漢王還都櫟陽使諸将畧地二月癸未令民除秦社稷立漢社稷三月為義帝發䘮􅃝而大哭發使告諸侯擊楚之殺義帝者四月田榮弟横収得數萬人立榮子廣為齊王羽雖聞漢東既擊齊欲遂破之而後擊漢漢王以故得刼五諸侯兵恒山河南魏韓殷也東伐楚到外黄彭越将三萬人歸漢漢王拜越為魏相令定梁地漢王遂入彭城收其貨賂美人日置酒髙㑹羽乃從蕭晨擊漢軍而東至彭城日中大破漢軍早擊之至日中大破漢軍皆走廹之榖泗水二水皆在沛郡彭城地漢軍皆南走山走趣也楚又追擊至靈璧東睢水上睢音雖漢軍郤為楚所擠擠排也又音子奚反多殺漢卒十餘萬皆入睢水睢水為之不流殺人多填於水中漢王乃與數十騎遁去太公呂后間求漢王間行而求之反遇楚軍楚軍與歸羽常置軍中呂后兄周呂侯將兵居下邑漢王從之稍収士卒軍碭蕭何發闗中老弱未傅者詣軍傅著也音附言著於名籍給公家徭役也韓信亦収兵與漢王㑹漢兵復大振與楚戰滎陽南京索間破之築甬道屬河以取敖倉粟魏王豹謁歸視親疾至則絶河津反為楚六月漢王還櫟陽八月如滎陽以韓信為左丞相與曹參灌嬰俱擊魏九月信等虜魏王豹定魏地信使人請兵三萬願以北舉燕趙東擊齊南絶楚糧道漢王與之三年十二月黥布歸漢漢王俱收兵至成臯項羽數侵奪甬道漢軍乏食四月漢王請和割滎陽以西為漢羽欲聼之厯陽侯范増曰漢易與耳今不取後必悔之羽乃急圍滎陽漢王患之用陳平計以黄金四萬斤間疏楚君臣項羽果疑范増増大怒而去五月漢將軍紀信詐為漢王出䧏以誑楚軍故得出滎陽至成臯自成臯入闗收軍復軍成臯八月臨河南鄕軍小脩武欲復戰郎中鄭忠説止漢王髙壘深塹勿戰漢王聽其計使盧綰劉賈將卒二萬人騎數百渡白馬津入楚地佐彭越燒楚積聚所畜軍糧芻槀之屬復擊破楚軍燕郭西燕縣名古南燕國攻下睢陽外黄十七城四年十月漢王項羽相與臨廣武之間而語羽欲與漢王獨身挑戰漢王數羽數責其罪也曰吾始與羽俱受命懐王曰先定闗中者王之羽負約王我於蜀漢罪一也羽矯殺卿子冠軍自尊罪二也卿子時人相褒尊之意猶言公子也時宋義為上將軍故言冠軍矯詐也羽當以救趙還報而擅刼諸侯兵入闗罪三也懐王約入秦無暴掠羽燒秦宫室掘始皇帝冡收私其財罪四也又彊殺秦䧏王子嬰罪五也詐坑秦子弟新安二十萬王其將章邯等為王也罪六也皆王諸將善地而徙逐故主令臣下爭畔罪七也出逐義帝彭城自都之奪韓王地并王梁楚多自與罪八也使人隂殺義帝江中罪九也夫為人臣而殺其主殺其已降為政不平主約不信天下所不容大逆無道罪十也吾以義兵從諸侯誅殘虐使刑餘罪人擊公言輕賤也何苦乃與公挑戰羽大怒伏弩射中漢王漢王因馳入成臯羽為髙爼置太公其上髙爼几之上也俎者所以薦肉示欲亨之故置俎上告漢曰今不急下吾亨太公漢王曰吾與若俱北面受命懐王約為兄弟吾翁即汝翁翁謂父也必欲亨廼翁幸分我一杯羮廼亦汝也古者以杯盛羮今之側杯有兩耳者是也羽怒欲殺之項伯曰天下事未可知且為天下者不顧家雖殺之無益但益怨耳羽從之十一月漢王西入闗至櫟陽畱四日復入廣武八月項羽食盡韓信又進兵擊楚漢使侯公説羽乃與漢約中分天下割洪溝以西為漢洪溝在滎陽東南二十里以東為楚九月歸太公呂后羽解而東歸五年十月漢王追項王至陽夏南上軍與齊王韓信魏相國越期㑹擊楚十一月劉賈入楚地圍壽春十二月圍羽垓下羽夜聞漢軍四面皆楚歌知盡得楚地羽與數百騎走以是兵大敗灌嬰追斬羽東城楚悉定獨魯不下漢王引天下兵欲屠之為其守節禮義之國乃持羽頭示其父兄魯乃䧏詔曰兵不得休八年萬民與苦甚與讀曰預言相干與也今天下事畢其赦天下􅌞死已下魏太祖初為典軍校尉後漢中平六年董卓既廢𢎞農王而立獻帝京都大亂表太祖為驍騎將軍欲與計事太祖乃變易姓名間行東歸卓歸遂殺太后及𢎞農王太祖至陳畱散家財合義兵將以誅卓冬十二月始起兵已吾已吾縣名屬陳畱郡世語曰陳畱孝廉衞兹以家財資太祖始起兵有衆五千人初平元年正月後將軍袁術冀州牧韓馥豫州刺史孔伷兖州刺史劉岱河内太守王匡渤海太守袁紹陳畱太守張邈東郡太守橋瑁山陽太守袁遺濟北相鮑信俱同時起兵衆各數萬討董卓紹問太祖曰若事不輯則方面何所可據公曰足下意以為何如紹曰吾南據河北阻燕代兼夷狄之衆南向以争天下庶可以濟乎公曰吾任天下之智力以道御之無所不可推紹為盟主於是太祖行奮武將軍二月卓聞兵起乃徙天子都長安卓畱屯雒陽遂焚宫室是時紹屯河内邈岱瑁遺屯酸棗術屯南陽伷屯潁川馥屯鄴卓兵彊紹等莫敢先進太祖曰舉義兵以誅暴亂大衆已合諸君何疑向使董卓聞山東兵起倚王室之重據二周之險東向以臨天下雖以無道行之猶足為患今焚燒宮室刼遷天子海内震動不知所歸此天亡之時也一戰而天下定矣不可失也遂引兵西將據成臯邈遣將衞兹分兵随太祖到滎陽汴水遇卓将徐榮與戰不利士卒傷死甚多太祖為流矢所中所乘馬被創從弟洪以馬與太祖得夜遁去榮見太祖所将兵少力戰盡日謂酸棗未易攻也亦引兵還太祖還到酸棗諸軍兵十餘萬日置酒高㑹不圖進取太祖責譲之因為謀曰諸軍聽吾計使渤海引河内之衆臨孟津酸棗諸將守成臯據敖倉塞轘轅大谷全制其險使袁將軍率南陽之軍臣欽若等曰袁將軍紹也軍丹析入武闗以震三輔皆髙壘深壁勿與戰益為疑兵示天下形勢以順誅逆可立定也今兵以義動持疑而不進失天下之望竊為諸君恥之邈等不能用太祖兵少乃與夏侯惇等詣揚州募兵刺史陳温丹陽太守周昕與兵四千餘人還到龍亢士卒多叛至銍建平復収兵得千餘人進屯河内劉岱與橋瑁相惡岱殺瑁以王肱領東郡太守袁紹與韓馥謀立幽州牧劉虞為帝太祖拒之二年七月黑山賊于毒白繞睢固等睢音申随反十餘萬衆略魏郡東郡王肱不能禦太祖引兵入東郡擊白繞於濮陽破之袁紹因表太祖為東郡太守三年春擊睢固又大破之青州黄巾衆百萬入兖州殺任城相鄭遂轉入東平劉岱與戰為賊所殺鮑信與州吏萬潛等至東郡迎太祖領兖州牧遂進兵擊黄巾於壽張東破之追至濟北乞䧏冬受降卒三十餘萬男女百餘萬口收其精鋭者號為青州兵四年春太祖軍鄄城袁術與紹有隙荆州牧劉表斷術糧道術引兵入陳畱屯封丘使將劉祥屯匡亭太祖擊祥術救之與戰大破之興平元年夏使荀彧程昱守鄄城太祖征陶謙拔五城遂略地至東海㑹張邈與陳宮叛迎呂布郡縣皆應布攻鄄城不能下西屯濮陽太祖圍之濮陽大姓田氏為反間太祖得入城燒其東門示無反意及戰軍敗布騎得太祖而不知是問曰曹操何在太祖曰乘黄馬走者是也布騎乃釋太祖而追黄馬者門火猶盛太祖突火而出復進軍攻之與布相守百餘日九月太祖還鄄城布到乘氏為其縣人李進所破二年春太祖襲定陶濟隂太守呉資保南城未抜㑹布至又擊破之建安元年七月楊奉韓暹以天子還雒陽太祖遂至雒陽衞京都天子假太祖節鉞錄尚書事雒陽殘破董昭等勸太祖都許九月車駕出轘轅而東以太祖為大将軍封武平侯二年九月袁術侵陳太祖東征破之術走渡淮三年九月東征呂布屠彭城獲其相侯諧進至下邳布自將騎逆擊大破之追至城下用荀攸郭嘉計决泗沂水以灌城月餘布将宋憲等執陳宫舉城䧏生擒布宮皆殺之四年春張楊將楊醜殺楊睦固又殺醜以其衆屬袁紹屯射犬射犬地名太祖進軍臨河因使楊故長史薛洪河内太守繆尚畱守自將兵北迎袁紹太祖遂濟河圍射犬洪尚率衆䧏五年十月破袁紹於官渡乃上言曰大將軍鄴侯袁紹前與冀州牧韓馥立故大司馬劉虞刻作金璽遣故任長畢瑜詣虞為説命錄之數又紹與臣書曰可都鄄城當有所立擅鑄金銀印孝亷計吏皆往詣紹從弟濟隂太守敘與紹書云今海内䘮敗天意實在我家神應有徵當在尊兄南兄臣下欲使即位南兄言以年則北兄長以位則北兄重便欲送璽㑹曹操㫁道紹宗族累世受國重恩而凶逆無道乃至如此輙勒兵馬與戰官渡乘聖朝之威得斬紹大将淳于瓊等紹衆大潰棄軍渡河遂收其輜重圖書􅎇寳虜其衆六年九月南征劉備備聞太祖自行走奔劉表七年五月袁紹死小子尚代九月太祖征之連戰尚敗八年三月攻其郭大破之尚夜遁九年四月尚將沮鵠守邯鄲沮音菹太祖擊拔之十年正月攻袁譚平冀州四月黑山賊張燕率其衆十餘萬䧏十一年正月征髙幹平壺闗十二年七月引軍出盧龍塞外使張遼為先鋒虜衆大潰斬蹋頓及名王已下胡漢䧏者二十餘萬口十三年七月征劉表表卒其子琮代屯襄陽九月太祖到新野琮遂䧏十七年正月天子命太祖賛拜不名入朝不趨劔履上殿十八年五月天子使御史大夫郄慮持節䇿命為魏公七月始建魏社稷宗廟二十一年五月進爵為王二十五年正月文帝即位追尊武皇帝廟號太祖文帝太祖太子後漢建安十六年為五官中郎将副丞相二十二年為魏太子二十五年嗣位為丞相魏王改建安二十四年為延康元年五月馮翊山賊鄭甘王炤率衆降六月辛亥治兵於東郊庚午遂南征七月孫權遣使奉獻蜀將孟逹率衆降武都民王楊僕率種人内附居漢陽郡十一月遂受漢禪册府元龜卷五
