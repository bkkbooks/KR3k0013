body:
  text: 册府元龜卷二百九十一宋王欽若等撰宗室部立功第二北齊清河王岳中興初為武衛將軍髙祖與四明戰于韓陵髙祖將中軍高昻將左軍岳將右軍中軍敗績賊乗之岳舉麾大呼横衝賊陣髙祖方得回師表裏奮擊因大破賊武定元年為晉州刺史侯景叛文襄徴岳共圖取景之計而梁乗間遣其貞陽侯明率衆於寒山擁泗水灌彭城與景為犄角聲援岳總率諸軍南討與行臺慕容紹宗等擊明大破之臨陣擒明及其大將胡貴孫其餘俘馘數萬景乃擁衆於渦陽與左衛將軍劉豐等相持岳還軍追討又破之景單騎逃竄又為使持節河南總管大都督統慕容紹宗劉豐等討王思政於長社思政嬰城自守岳等引洧水灌城紹宗劉豐為思政所獲闗西出兵援思政岳内外防禦甚有謀筭城不沒者三板會文襄親至城乃下獲思政等以功别封真定男任城王湝為清州刺史崔蔚波等夜襲州城湝部分倉卒之際咸得齊整撃賊大破之蘭陵武王長恭為并州刺史突厥入晋陽長恭盡力擊之芒山之敗長恭為中軍率五百騎再入周軍遂至金墉之下被圍甚急城上人弗識長恭免胄示之面乃下弩手救之於是大㨗武士共謌謠之又為叚韶討栢谷又攻定陽前後以戰功别封鉅鹿長樂樂平髙陽等郡公安徳王延宗後主世為太尉及平陽之役後主自禦之命延宗率右軍先戰城下擒周開府宗珽及大戰延宗以麾下再入周師莫不披靡諸軍敗延宗軍獨全後周章武公導太祖入闕常從征伐太祖討侯莫陳悦以導為都督鎮原州及悦走故塞導追斬之傳首京師魏文帝之東伐留導為華州刺史及趙青雀于伏徳慕容思慶等作亂導自華州率兵擊之擒伏德斬思慶進屯渭橋㑹太祖軍事平進爵章武公晉蕩公䕶初從太祖擒竇㤗復𢎞農破沙苑戰河橋並有功為鎮東將軍後與于謹征江陵為前鋒攻城鎮擒候騎斷江津收舟艦以待大軍之至圍而尅之襄陽蠻帥向天保等萬有餘落恃險作梗及師還䕶率軍討平之宇文貴為大將軍時羌酋傍乞鐵忽因梁企定之反據有渠株川與渭州人鄭五醜扇惑諸羌同反太祖令貴討平之斬鐵忽五醜於渠株川置岷州朝廷美其功遂於粟坂立碑以紀其績齊煬王憲保定中為雍州牧及晉公䕶東伐以尉遲逈為前鋒圍洛陽憲與逹奚武王雄等軍於邙山自餘諸軍各分守險要齊兵數萬奄出軍後諸軍恠駭並各退散唯憲與雄等率衆拒之雄為齊人所斃三軍震懼憲親自督勵衆心乃安天和四年齊將斛律明月率衆四萬築壘洛南五年憲涉洛邀之明月遁走憲追之及於安業屢戰而反是歳明月又率大衆於汾北築城西至龍門六年憲率衆二萬出自龍門齊將新蔡王王康徳以憲兵至潜軍宵遁憲乃西歸仍掘移汾水水南堡壁復入於齊人謂畧不及逺遂弛邊備憲乃渡河攻其伏龍等四城二日盡拔又進攻張壁克之獲其軍實夷其城壘斛律明月時在華谷弗能救也乃北攻姚襄城陷之時汾州又見圍日久糧援路絶憲遣柱國宇文盛運粟以饋之憲自入兩乳谷襲克齊柏社城進軍姚襄齊人嬰城固守憲使柱國譚公㑹築石殿城以為汾州之援齊平原王段孝先蘭陵王髙長恭引兵大至憲命將士陣而待之將軍韓歡為齊人所乗遂以奔退憲身自督戰齊衆稍却㑹日暮乃各收軍髙祖東征憲衆為前軍趣黎陽髙祖親圍河隂未克憲攻拔武濟進圍洛口拔其東西二城高祖疾乃班師五年大軍又東伐憲以精騎二萬復為前鋒守雀䑕谷髙祖圍晉州憲進兵剋洪洞永安二城及師還憲為後拒齊主自率衆來追至於髙梁橋憲以精騎二千阻水為陣與開府宇文忻各統精卒百騎為殿以拒之斬其騎將賀蘭豹子山褥瓌等百餘人齊衆乃退憲渡汾而及髙祖於玉壁髙祖又令憲率兵六萬還援晉州齊主攻圍晉州晝夜不息間諜還者或云已陷憲乃遣柱國越王盛大將軍尉遲迥開府宇文神舉等輕騎一萬夜至晉州憲進據䝉坑為其後援知城未陷乃歸涑川尋而高祖東轅次於髙顯憲率所部先向晉州明日諸軍大集稍逼城下齊人亦大出兵陣于營南高祖召憲馳往觀之憲反命曰易與耳請破而後食帝悦曰如汝所言吾無憂矣内史栁虯私謂憲曰賊亦不少王安得輕之憲曰受委前鋒情兼家國掃此逋寇事等摧枯商周之事公所知也賊雖衆其如我何既而諸軍俱進應時大潰其夜齊主遁走憲輕騎追之既及永安髙祖續至齊人收其餘衆復據髙壁及洛汝砦髙祖命攻洛汝破之明日與憲大軍㑹于介休齊主遂奔鄴留其從兄安徳王延宗據并州延宗因僭􅃅髙祖圍其城憲攻其西靣克之擒延宗明年進尅鄴城齊任城王湝廣寕王孝珩據信都有衆數萬髙祖復詔憲討之仍令齊主手書與湝曰朝廷遇緯甚厚諸王無恙叔若釋甲則無不優待湝不納乃大開賞募多出金帛沙門求為戰士者亦數千人憲軍過趙州湝令間諜二人覘視形勢候騎執以白憲憲乃集齊之舊將遍示二人又謂之曰吾所争者大不在汝等今放汝還可即充我使乃與湝書曰山川有間每深勞佇仲春戒節納履惟宜承始届兩河仍圖三魏二者交戰想無虧徳昔魏厯云季海内横流我太祖撫運乗時大庇黔首皇上嗣膺下武式隆景業興稽山之㑹總盟津之師雷駭唐郊則野無横陣雲騰晉水則地靡嚴城襲魏之酋既奔竄於草澤竊號之長亦委命於旌門徳義振於無垠仁風被於有截彼朝宿將舊臣良家戚里俱升榮寵皆縻好爵是使臨漳之下効死争驅營丘之前奮身畢命此豈惟人事抑亦天時冝訪之道路無俟傍説吾以不武任總元戎受命安邊路指幽兾列邑名藩莫不屈膝宣風導禮皆荷來蘇足下髙氏令王英風夙著古今成敗備諸懐抱豈不知一木不維大厦三諌可以逃身哉且殷㣲去商侯服周代項伯背楚賜姓漢朝去此弗圖茍殉亡轍家破身殞為天下笑又足下諜者為候騎所拘軍中情實具諸執事知以弱卒𤨏甲欲抗堂堂之師縈帶汚城兾保區區之命戰非上計無待卜疑守乃下䇿或未相許已勒諸軍分道並進相望非逺慿軾有期兵交命使古今通典不俟終日所望知幾也憲至信都登張耳冢以望之俄而湝領軍尉相願偽出略陣遂以衆降相願湝之心腹也衆駭因破之擒湝及孝珩汝南公慶從武帝㧞晉州齊兵大至慶與齊王憲輕騎覘卒與賊窘憲挺身而進慶退據汾橋衆賊争進慶射之所中人馬必倒賊乃稍却及拔髙壁尅并州下信都禽髙湝功並居㝡焉宇文神舉為司武上大夫武帝親戎北伐令神舉與原國公姚願等率兵五道俱入帝至雲陽疾甚乃班師幽州人盧昌期祖英伯等聚衆據范陽反詔神舉率兵討擒之又屬稽胡反叛入㓂西河神舉又率衆與越王盛討之時突厥與稽胡連和遣騎赴救神舉以竒兵擊之突厥敗走稽胡於是欵服即授并潞肆石等四州十二鎮諸軍事并州總管隋河間王𢎞髙祖即位初突厥屢為邊患以𢎞為行軍元帥率衆四萬出靈州道與虜相遇戰大破之斬數千級賜物二千段拜寧州總管衛昭王爽髙祖大舉北伐爽為元帥時河間王宏豆盧勣竇榮定髙頴虞慶則等分道而進俱受爽節度親率李元節等四將出朔州遇涉鉢略可汗於白道接戰大破之虜獲千餘人驅馬牛羊鉅萬涉鉢略可汗中重瘡而遁髙祖大悦賜爽實食梁安縣千户蔡王智積大業中為𢎞農太守楊𤣥感作亂自東都引軍而西智積謂官屬曰𤣥感聞大軍將至欲圖關中若成其計則根本固矣當以計縻之使不得進不出一旬自可擒耳及𤣥感以軍至城下智積登陴詈辱之𤣥感怒甚留攻之城門為賊所燒智積乃更益火賊不得入數日宇文述等援軍至合擊破之越王侗大業中楊𤣥感作亂之際與民部尚書樊子葢拒之及𤣥感平朝於髙陽拜髙陽太守唐淮安王神通隋末義師起隋人捕之神通乃與京師大俠史萬寳河東裴勣栁崇禮等舉兵應義師遣使與司竹賊帥何潘仁連結潘仁奉平陽公主而至神通與之合勢進下鄠縣衆踰一萬髙祖聞之大悦授光祿大夫從平京師為宗政卿武徳二年攻字文化及之魏縣斬其武賁郎將王敏童等獲其將軍季臼文俘二千餘人襄邑王神符武徳四年為并州總管突厥頡利可汗率衆來㓂神符出與戰於汾水東敗之斬首五百級虜其馬二千匹又戰於沙河之北獲其乙利達官并可汗所乗馬及甲獻之由是召拜太府卿河間王孝恭髙祖定京師拜左光祿大夫為山南道招尉大使自金州出于巴蜀招㩦以禮降附者三十餘州孝恭進擊朱粲破之武徳三年將圖蕭銑以孝逸為荆湘道行軍總管統水陸十二總管發硤州進軍江陵攻其水城尅之髙祖大悦拜孝恭荆州大總管使畫工貌而視之荆襄雖定嶺表尚未悉平孝恭分遣使撫􅇺嶺南四十九州皆來欵附及輔公祏據江東反發兵㓂夀陽命孝恭為行軍元帥以擊之七年孝恭自荆州趣九江時李靖李勣黄君漢張鎮州盧祖尚並受孝恭節度公祏遣其偽將馮惠亮陳當時領水軍屯于博望山陳正通徐紹宗率步騎于青林山孝恭至堅壁不與鬭使竒兵斷其糧道賊漸餒夜薄我營孝恭安臥不動明日縱羸兵以攻賊壘使盧祖尚率精騎列陣以待之俄而攻壘者敗走賊出追奔數里遇祖尚軍與戰大敗之正通棄營而走復與馮惠亮保梁孝恭乘勝攻之破其梁山别鎮赴水死者數千人正通率六軍夜遁總管李勣又下廣陵城㧞楊子鎮公祏窮䠞棄丹陽東走孝恭命騎追之至武康擒公祏及其偽僕射西門君儀等江南悉平自大業末羣䧺競起皆為太宗所平謀臣猛將並在麾下罕有别立勛庸者唯孝恭著方面之功聲名甚盛厚自崇重欲以威名鎮逺築宅於石頭廬徼以自衛淮陽王道𤣥武徳元年授右金牛將軍從太宗擊宋金剛于介州先登陷陣時年十五太宗壯之賞物千叚後討王世充頻戰皆㨗竇建徳至武牢太宗輕騎誘賊令道𤣥率伏兵於道左㑹賊至追擊破之又從太宗轉戰于汜水麾戈陷陣直出賊衆披靡復衝突而歸太宗大悦命副乗以給之道𤣥又從太宗赴賊再出飛矢亂下箭如蝟毛猛氣益厲射人無不應弦而倒東都平拜洛州總管江夏王道宗武徳元年從太宗討劉武周戰於介州一戰滅之從平竇建徳破王世充屢有殊效五年授靈州總管梁師都據夏州遣弟洛児引突厥兵數萬至于城下道宗閉門拒守伺隙而戰賊徒大敗髙祖聞而嘉之貞觀三年為大同道行軍總管遇李靖襲破頡利可汗頡利以十餘騎來奔其部道宗引兵逼之徴其執送頡利頡利以數騎夜走匿於荒谷沙鈐羅懼馳追獲之遣使送于京師以功賜實封六百户為刑部尚書及吐谷渾㓂邊詔右僕射李靖為崑丘道行軍大總管道宗與吏部尚書侯君集為之副賊聞兵至走入嶂山已行數千里諸將議欲息兵道宗固請追討李靖然之而君集不從道宗遂率偏師并行倍道去大軍十日追及之賊據險苦戰道宗潛遣千餘騎踰山襲其後賊表裏受敵一時奔潰貞觀五年突厥斛薛部叛於靈州道宗與霍國公紫詔追擊破之虜男女六畜萬餘後大軍討髙麗令道宗與李靖為前鋒濟遼水克葢牟城逢賊兵大至軍中僉欲深溝保險待太宗至徐進道宗曰不可賊赴急逺來兵實疲頓恃衆輕我一戰必摧昔耿弇不以賊遺君父我既職在前軍當須清道以待輿駕李靖然之乃與壯士數十騎直衝賊陣左右出入靖因合擊大破之太宗至深加賞勞齊王元吉武德四年從太宗討王世充時竇建德兵援世充太宗自出拒之留元吉與屈突通圍世充於東都世充出兵拒戰元吉設伏擊破之斬首八百級生擒其大將軍樂仁昉甲士千餘人吴國公孝逸則天朝為左衛將軍光宅元年徐敬業據揚州作亂孝逸為左玉鈐衛大將軍揚州大總管督軍以討之孝逸引軍至淮而敬業方南攻潤州遣其弟敬猷屯兵淮隂偽將韋超據都梁山以拒孝逸都將馬敬臣擊斬賊之别率尉遲昭夏侯瓉超乃擁衆憑山以自固孝逸乃進兵擊超賊衆壓伏官軍登山急擊之殺數百人日暮圍解超銜枚夜遁孝逸引兵擊淮隂又破敬猷之衆時敬業廻軍屯於下阿溪以拒官軍孝逸渡溪以擊之敬業初勝後敗孝逸乗勝追奔數十里敬業窘廹與其黨擕妻子逃入海曲孝逸進據揚州盡捕斬敬業等振旅而還以功進授鎮軍大將軍信安王褘𤣥宗開元十五年為左金吾大將軍朔方節度副大使知莭度事先是石堡城為吐蕃所據侵擾河右詔褘與河西隴右議取之褘到軍總率士卒克期攻之或曰此城據險又為吐蕃所惜今懸軍深入賊必併力據守事若不㨗退則狼狽不如按軍持重以觀形勢褘曰人臣之節豈憚艱險必期衆寡不敵吾則以死繼之茍利國家此身何惜於是督率諸軍倍道兼進并力攻之遂㧞石堡城斬獲首級并獲糧儲器械其數甚衆仍分兵據守以遏賊路帝聞之大悦始改石堡城為振武軍十九年契丹衙官可突干殺其王邵固率部落降于突厥𤣥宗以忠王為河北道行軍元帥以討奚及契丹兩蕃以褘為副王既不行褘率戸部侍郎裴耀卿等諸副將分道統兵馬出於范陽之北大破兩蕃之衆擒其酋長餘黨竄入山谷軍還以功加開府儀同三司禕子峘從𤣥宗幸蜀健児郭千仭夜謀亂帝御𤣥英樓招諭不從峘與六軍兵馬使陳𤣥禮等討平之以功加金紫光祿大夫岐王範先天中以左羽林大將軍從𤣥宗討竇懐真蕭至忠等以功加賜實封滿五千户建寧王倓先天中以秘書監從𤣥宗幸蜀肅宗為太子倓兄弟典親兵扈從車駕渡渭百姓遮道乞留太子太子諭之曰至尊奔播吾不忍違離左右俟吾見上奏聞倓於行宮謂太子曰逆胡犯順四海亂離不因人情何以興復夫有國家者大孝莫若存社稷今從至尊入蜀則散關以東非復皇家所有何以維屬人情殿下宜購募豪傑暫往河西收拾戎馬㸃集防邊將卒不下十萬人光弼子儀全軍河朔謀為興復計之上也廣平王亦贊成之於是令李國輔奏聞𤣥宗欣然聼納乃分從官士卒以遣之時敗卒膽破兵仗不完太子既北上渡渭一日百戰倓自選驍騎數百衞從每蒼黄顛沛之際血戰在前太子或過時不得食倓涕泗不自勝太子尤憐之諸軍屬目焉嗣曹王臯徳宗建中年為江西道節度使時李希烈反臯繕甲兵戰艦將兵二萬餘與賊夾江為陣令伊慎將先鋒臯率軍繼之大破賊斬首數百級賊又樹堡栅於蔡山臯度峻險不可攻乃聲言西取蘄州理戰艦分傍南涯與舟師泝江而上賊以老弱守栅引軍循江隨戰艦南北與臯兵相直去蔡山三百餘里臯令步兵登舟順流東下不日拔蔡山賊還救間一日方至大破之因進拔蘄州降其將李良乂取黄州斬級千餘兵益振舒王為元帥加臯前軍兵馬使徳宗居奉天淮南節度使陳少遊强取鹽銕錢其使包佶以財幣泝江次于岐口時希烈已屠汴州又遣驍將杜少誠將步騎萬餘來㓂蘄黄將絶江道臯遣伊慎將七千衆禦之遇于永安戍慎列三柵相去纔四里列鼓角於中栅少誠至分兵圍之部隊未嚴聲鼔而三栅齊出奮擊不為行陣賊亂少誠敗走斬首萬級封尸為京觀以功加銀青光禄大夫進封五百户又遣伊慎王鍔將兵圍安州州城阻溳水為固攻之累日不下希烈遣甥劉戒虗將歩騎八千來援臯命李伯潛分師迎擊於應山獲戒虗及大將二禆將二十斬首千餘面縛戒虗等之城下乃使人説之賊曰得大將及賔佐一二人為信當降臯乃使王鍔馬彞繩城而入城中大呼乃出降希烈又遣兵援隨州臯令伊慎擊於厲鄉大破之復平静白鴈等闗希烈懼乃戢兵貞元初為江陵節度使江漢倚臯為固未幾李思登以隨州降凡下州四縣十七大小十餘陣未嘗敗衂梁郴王友裕唐末為宣武軍牙校景福元年總大軍伐徐時朱瑾領兖鄆之衆為徐戎外援陣於皷門南石佛山下友裕進兵擊之斬獲甚衆瑾領殘黨宵遁安王友寧唐末太祖鎮汴累將軍職從太祖征討繼立軍功為柳州刺史太祖迎昭宗於岐下遣友寧部兵先歸於梁以備守禦屬青帥王師範搆亂以闗東諸鎮兵悉在岐隴欲乗虚竊發自齊魯至於華下羅布姦黨詐以委輸貢奉為名隂與淮南并門結好㑹有青人詣裴廸言其狀廸以事告友寧不俟命乃率兵萬餘人東討師範遣其弟將兵圍齊州友寧引兵救之青㓂大敗奪馬四千蹄斬首數千級宻王友倫年十九為宣武軍校太祖征兖鄆友倫勒所部兵收勦聚糧榖以濟軍須幽滄軍至内黄友倫以前鋒夜渡河擊賊奪馬千匹擒斬甚衆因引軍徃八議闗卒逢晉軍萬餘騎友倫乃分布兵士多設疑軍因聲鼓誓衆士伍奮躍追斬數千里後李罕之以上黨來歸為晉軍所圍太祖遣友倫總步騎數萬越險救應遂大破晉軍天復元年岐隴用兵晉人乗虚侵於北鄙友倫率從兵三萬徑往􅈨山晉人望塵奔逸友倫吴氏叔琮等躡其轍追至太原摩壘挑戰獲牛馬萬餘二年領所部兵西赴鳳翔前後累接戰以功為寧逺軍節度使後唐李克讓武皇仲弟咸通中從獻祖討龎勛以功為振武都校及王仙芝陷荆襄朝廷徴兵克讓率師平賊以功為金吾將軍李克脩武皇從父弟武皇入闗討黄巢克脩為先鋒破黄揆於華隂敗尚讓於梁田坡戰黄巢於光順門每戰皆㨗其年潞州牙將安居受來乞師請復昭義武皇遣將以兵從與孟方立戰於銅鞮不利武皇乃令克脩將兵繼進遂平潞州斬其刺史李殷鋭武皇表克脩為昭義節度使光啟二年九月克脩出師山東收復邢洺十一月㧞故鎮孟方立遣將吕臻來援戰於焦崗大敗之擒吕臻俘斬萬計進拔武安臨洺諸屬縣乗勝圍邢州鎮州王容出師三萬援邢洛克脩軍乃退及李罕之來歸武皇授以澤州刺史與克脩合勢進攻河陽連嵗出師以苦懷孟方立遣將奚忠信將兵三萬襲㓂遼州克脩設伏於遼之東山大敗賊軍擒忠信以獻克脩子嗣肱少有膽略累立戰功夾城之役從周徳威為前鋒時兄嗣弼為昭義副使與李嗣昭守城兄弟内外奮戰忠力威壯感動三軍潞圍乃解以功加檢校僕射天祐八年與李存審援河中敗汴軍于胡堡壁獲汴將龎讓十年與李存審屯趙州擊汴人於觀津時梁祖新屠􅀥彊其將賀徳倫急攻蓨縣梁祖率師五萬合勢營於蓨之西嗣肱自下博率騎三百薄晩與梁之樵芻者相雜日既晡入梁軍營門諸騎相合大譟弧矢星發虓􅀈馳突汴人不知所為營大擾既暝歛騎而退是夜梁祖燒營而遁解蓨之圍以功特授蔚州刺史十九年新州刺史王郁叛入􅆻丹嗣肱進軍定媯儒武等三州乃授山北都團練使李克寧武皇季弟初從起雲中為奉誠軍使赫連鐸之攻黄花城也克寧從武皇登城血戰三日矢盡備竭殺賊萬計燕軍之攻蔚州克寧勉力嬰城拒敵晝夜輟寢食者旬日後奔逹靼部及入闗逐黄㓂凡征行無不衛從魏王繼岌莊宗子同光三年伐蜀以繼岌為都統郭崇韜為招討使十月戊寅至鳯州武興軍節度使王承㨗以鳯興文扶四州降甲申至故鎮康延孝收興州時偽蜀主王衍率親軍五萬在利州分步騎之軍三萬遂戰於三泉康延孝李嚴以勁騎三千犯之蜀軍大敗斬首五千級餘各奔潰王衍聞其敗也棄利州奔歸西川斷吉栢津浮梁而去己丑繼岌至興州為蜀東川節度使宋光葆以梓綿劔龍普等州來降武定軍節度使王承肇以洋蓬壁三州符印降興元莭度使王宗威以梁開通渠麟等五州符印送降階州王承岳納符印秦州節度使王承休棄城而遁辛丑繼岌過利州甲辰至劍州己酉至綿州王衍遣使上牋乞降丁巳並入成都自興師出洛至定蜀計七十五日走丸之勢前代所無李從諲明宗弟頻領親軍數戰有功官至檢校司空李從璟明宗長子從莊宗於河上累有戰功莊宗器賞之用為金槍指揮使册府元龜卷二百九十一
