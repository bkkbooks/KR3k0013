彦澤到闕進朝見謝恩馬九匹又進馬五十匹并銀鞍轡黒漆銀錢子馬面人鐵甲弓箭袋渾銀裝劍共五十副又進駱駞二十頭己邜又進馬五十匹供御金鍍銀鞍轡一副庚辰又進馬五十匹金鞍轡全人馬甲弓箭各五十副彦澤在前任擅討吐蕃部族為其所敗遂括境内馬千餘匹以補其數至是頻有是獻四月己巳新授龍武軍大将軍張彦澤進謝恩馬十匹五月甲申朔荆南遣使進賀端午白金茜緋簟扇等物少帝以天福七年七月即位十一月兩浙錢𢎞佐遣使進鋌銀五千兩絹五千疋絲一萬兩謝恩封呉越國王又貢細甲弓弩箭扇子等又貢蘇木二萬斤乾薑三萬斤茶二萬五千斤及祕色甆器鞋履細酒糟薑細紙等回鶻托都督已下進碙砂千八百斤犛牛尾一千斤白布一萬疋斜褐一百段玉梳玉裝刀子等物十二月福建王延羲遣使進鋌銀二千兩花皷六面謝降恩命又進象牙十株紅蕉二百疋蟬紗二百疋餅香沉香煎香共六百斤胡椒六百斤肉豆䓻三百斤箭榦二萬隻謝賜國信又進鋌銀四千兩貢蕉二十疋海蛤十斤扇子靴裁具等充端午天和節正冬獻賀又直進鋌銀一千兩葛一萬疋細蕉二百疋粉薑五千斤象牙十株蠟面茶二百斤大茶五千斤又進鹽鐵度支户部三司葛一萬六千六百疋及諸口味等八年十月鎮州節度使杜重威直進馬五十匹十一月宻州刺史張瓘奏膠西縣孝行鄉諸城村百姓于希得蛇吐珠一顆進之時無慰答亦無錫賚議者非之開運二年十月湖南進供御細絹六千疋衣着白羅一百疋筒卷白羅十疋錦綺褥面十牀錦綺背十合淮南進羅縠一百疋謝恩賜御馬三年九月前青州防禦使翟光業進絹一千疋綿三千兩絲七千兩十月河府侯益進馬五十匹是月陜府焦繼勲進馬四十匹絹一千疋是月華州安審信進馬四十匹太子太師致仕劉景巖進馬三十匹鳯翔李從儼進馬四十匹十月兩浙錢𢎞佐進謝恩授守太尉册命銀五千兩綾五千疋絹一萬疋又茶一萬八百斤腦源茶三萬四千斤又進乳香黄散香共一千斤又進乾薑三萬斤蘇木三萬斤箭笴一萬莖諸色戎仗等物又進啟聖節金大排方座龍腰帶一條御衣一襲十六事金花銀器一千五百兩御服錦綺綾羅五百疋漢髙祖天福十二年荆南髙從誨賀登極進金花銀器一千兩異紋綺錦法錦三百疋筒卷白羅二百疋白花羅一百疋絨毛暖座兩枚九錬純鋼手刀一口乾祐元年六月壬寅髙從誨貢金器二百兩銀器千兩細綿五十疋繡錦六銖五十段羅二百疋龍腦二斤以首過自新故書十月丁酉湖南馬希廣貢除夜逰春圖女俠畵障真珠枕及端午金銀彫装物色帝年未及冠服玩好奢甞為七寳枕玉枕玉缸缾盤之類而湖湘貢侈物益蕩其心十一月兩浙貢茶三萬四千斤及香藥兵仗湖南貢茶五萬斤十二月癸未史𢎞肇獻錢萬緡馬二十匹以助軍討叛又朗州節度馬希蕚獻銀器千五百兩降詔奨飾仍諭之云所修職貢舊有規程念航深梯險之勞重違卿意在誘善勸忠之道本實朕心今後凢有進獻可與希廣商量庶叶雍和不爽體制隠帝乾祐二年九月壬寅湖南馬希廣獻絹二萬疋銀一萬五千兩玳瑁寳裝龍鳳板牀盤龍椅子蹋牀子銀戯龍二銀食器六十八事真珠花銀果子其銀共千兩是年宰相侍衛使三司使以犬戎犯河朔獻馬自三匹至二十匹周太祖廣順元年正月荆南髙保融貢銀一千兩法錦二十疋賀登極癸巳寒食節帝出𤣥化門設御幄遥拜諸陵開封府袁義獻熟羊酒食丁巳宰臣馮道已下獻馬賀皇太子授鎮寕軍節度使己未昭義常思貢錢三十萬賀太子鎮澶州又直進錢二千五百貫布二千五百疋粟七千石故史𢎞肇弟𢎞福貢馬五匹綿綵五百疋謝禮𦵏兄𢎞肇漢末𢎞肇楊邠王章遇害帝𦵏以王禮喪事並官給四月宰臣樞宻宣徽使各獻馬賀册徳妃荆南髙保融貢銀二千兩謝加恩别進請開宴絹一千疋金酒器重五十兩素羅花羅花縠子各百疋長金線絨毛暖十二壬子兖州慕容彦超獻龍鳯鞍轡御馬縑帛賀册徳妃髙保融又貢端午銀絹青于扇等五月甲子鎮州武行徳來朝獻粟二萬石七月邠州侯章進馬三十匹甲申慕容彦超上章謝賜西京興教坊第一區長男衙内指揮使繼勲遥領明州刺史次男繼雲轉官進絹千疋絲三千兩别進永夀節祝夀絹二千疋十二月荆南獻銀五百兩慕容彦超獻馬二匹皆賀正也二年三月鄆州髙行周進助軍絹五千疋并戎装器仗五百事四月丁未潞州㐮垣縣民張紹先等八人詣闕獻羊酒以除放去年殘稅謝恩也五月車駕親征兖州次曹州鄭孔璋獻銀射盌百䨇衣著三百疋鄆澶宋許四鎮各獻茶藥是月甲子旦次成武鄆州髙行周自鎮來朝貢絹三十疋及器械單州許進來朝獻食丙寅次張康鎮徐州王晏來朝進馬七匹戊寅青州節度使符彦卿來朝獻馬十三匹己邜又進錦綵三千疋軍糧萬石六月丁亥廻次鄆州髙行周進錢絹請開宴又進車駕廵􅄑絹五千疋錢五百萬戊子宴于行宫行周以金酒器鞍馬為夀辛邜次澶濮滑州扈彦珂來朝王殷獻馬十匹三千金酒器八月昭義節度使常思來朝獻絹三千疋銀千兩粟二萬斛草三萬圍九月戊午故髙行周男前鄆州衙内指揮使髙懐徳進馬五十五匹壬戌靈武節度使留後馮繼業獻馬百匹謝弔祭定州進所獲契丹馬六千一百匹十一月甲寅兩浙錢𢎞俶遣判官貢奉御衣犀帶金銀裝兵仗金銀器綾絹茶香藥物祕色甆器鞍屐海味酒等凉州申師厚進馬一百一十六匹詔還其直閑廐使史孔福獻馬謝却賜涇州物産十二月鄭州防禦使王進以迎侍母親到郡獻馬謝恩進母先往易州離兵革失其所在近於北蕃訪獲而歸之故喜而稱謝戊子邠州侯章罷鎮至闕獻馬百匹絹五千疋三年正月樞宻使王峻獻戰馬二十匹宰臣獻三司李糓所傷臂漸損難任拜起進朝見馬親除天平軍節度使符彦卿進謝近鎮馬十匹帛二十疋及軍器等丁邜朗州獻茶二萬斤宰臣樞宻宣徽内諸司使禁軍将校諸藩鎮皆進奉賀皇子嘉禮二月延州衙内指揮使髙紹基獻馬四十二匹紹基父死擅知軍政潛有覬望及軍屯近鎮故懼而獻奉三月又獻馬五十匹駞三十頭銀千兩金器百兩三月髙懐徳進絹三千疋銀三千兩金酒器六副馬十五匹勅賜亡父行周諡及立碑四月丙寅宋州節度使常思入朝獻縑銀匹兩各二千五百大絁綾五百疋又鳯翔趙暉來朝進馬一百一十七匹絹五千疋銀五千兩賜襲金帶又西凉府節度使牛師厚遣都知兵馬使拓䟦貞美等四十九人朝貢駞馬又鳯翔趙暉進牽櫳官衙隊一百九十五又進絹三千疋金三百兩五月甲申宴于廣政殿宋州常思獻上夀金酒器同州薛懐譲獻銀五百兩馬五匹十一月乙巳㐮州安審琦獻銀萬兩助郊祭乙亥兩浙錢𢎞俶貢謝恩綾絹二萬八千疋銀器六千兩綿五萬兩茶三萬五千斤御衣兩襲通犀帶戯龍金帶香藥甆器銀装甲仗法酒海味等戊寅涇州節度使史懿朝見獻駞馬二百銀千兩癸邜鄭州防禦使王萬敢獻助郊祭絹二千疋六年六月大名府王殷貢絹萬疋棣州何祿進獻供用羅綺二千五百疋荆南髙保融進白龍腦法錦金酒器紅六銖段五十白羅花羅熟縠鹿胎袴段六銖襜面等各一百九錬神鋼陷金銀刀劍各一十二月辛亥諸州府進南郊助祭鞍馬綵帛金銀等世宗顯徳三年二月丁亥荆南節度使髙保融進御衣金帶九鍊純鋼手刀弓箭等十一月丙辰呉越王錢俶進銀五千兩綾一萬疋又進天清節金花銀器千五百兩又御服金帶錦綺綾羅等五年二月幸揚州壬申呉越王錢俶進御衣犀帶綾絹白金香藥等又進供軍稻米二十萬石四月呉越王錢俶進綾絹各二萬疋銀一萬兩稱謝恩賜國信閏七月癸丑呉越王錢俶遣使朝貢進銀五千兩絹二萬疋銀器三千兩細衣段二千連又御衣盤龍犀帶等八月呉越王錢俶進銀五千兩絹萬疋稱賀車駕還京又進龍舩一隻天禄舩一隻皆以白金飾之帝幸新河亭命宰臣及從官已下觀呉越所進龍舟時京師庶士觀者如堵十一月呉越王錢俶進茶三萬四千八百斤綿五萬兩及香藥器甲等十二月呉越王錢俶進銀五千兩絹三萬疋綿十萬兩稱謝恩賜國信又進賀正錢一千貫絹一千疋册府元龜卷一百六十九
