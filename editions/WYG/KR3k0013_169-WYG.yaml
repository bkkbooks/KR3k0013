body:
  text: 册府元龜卷一百六十九宋王欽若等撰帝王部納貢獻夫貢之不供國有常典獻或無藝人必告勞是故王者取彼樂輸嘉其奉上宰旅歸其時事王府受其底貢大則謂之述職小則㑹其時事是以無有逺邇賦以重輕既靡嘆于無時亦曷謂其勿受故禮曰各以所有傳曰史不絶書故始則列于籩實終則資于國用其或守土者聚歛為徳希寵者悉索其賦雖甚盛徳猶或忽諸徴于前篇盖亦有矣斯則明識者可俯而觀也漢髙帝十二年十月帝過沛留置酒十餘日乃去沛中虛縣比白之邑西獻獻牛酒也之往也皆往邑西競有所獻故獻中空無人後漢明帝永平十一年漅湖出黄金廬江太守以獻漅湖有金廬州合肥縣東南漅音子小切章帝建初七年十月岐山得銅器形似酒罇獻之魏陳留王咸熈元年六月鎮西将軍衛瓘上雍州兵於成都縣獲璧玉印各一印文似成信字孫盛以為公孫述自以起成都號曰成二玉之文殆述所作也唐髙祖武徳元年十二月乙亥豐州總管張良遜獻騄耳馬二匹二年十月凉州刺史安修仁獻百年蘇云餌之可延夀𤣥宗天寳元年五月平凉郡獲古鐵鼎獻之九月益州獻三熟蠶繭𦂳白浄與春蠶不殊代宗永泰二年山南西道節度使梁州刺史張獻成獻名馬二匹絲絹雜貨共計十萬大厯二年二月汴宋節度使田神功至自汴州獻馬十匹金銀器五十床繒綵一萬疋六月山南劍南副元帥黄門侍郎平章事杜鴻漸自成都府召至鴻漸獻金銀器五十床錦羅十五床麝香臍五石徳宗貞元元年十二月户部奏今年見到貢物總一百五十六州府十一年齊暎為江西都團練觀察使暎甞自以為相無大過當復入用乃多進獻及為金銀器以希㫖先是禁中銀缾大者髙五尺餘及李兼為江西觀察使又獻髙六尺者至是年帝降誕日及端午暎獻髙八尺餘者十二年宣歙圑練使劉贊卒贊初委遇副使嚴綬政事多所咨訪贊卒綬掌留務竭府藏以進獻繇是有恩入拜尚書刑部員外郎天下賔佐貢獻專逹自綬始也未幾河東節度使李悅嬰疾事曠弛行軍司馬鄭儋代總軍政選綬代儋為司馬遷檢校司封郎中是時姑息四方諸侯未甞移代物故即以其軍司馬為帥徳宗甞嘉綬之前日進獻記其姓名故驟蒙選任未一嵗儋卒拜綬銀青光禄大夫檢校工部尚書兼太原尹御史大夫北都留守充河東節度度支營田觀察處置等使興元初克復京師後府藏空虚諸道之有進奉以資經費復時有宣索其後諸賦既平朝廷無事常賦之外進奉不息韋臯劒南有日進李兼江西有月進注亞揚州劉贊宣州王緯李錡浙西皆競為進奉以固恩澤貢入之奉皆曰臣於正稅外方圓亦曰羨餘節度觀察使或託言宻㫖乘此盜貿官物諸道謫罰官吏刻削禄廩入其財通津逺道者稅之蒔蔬藝果者稅之死亡者稅之節度觀察交代或先期稅入以為進奉然十獻其二三耳其餘沒入者不可勝紀也其後裴肅為常州刺史乃鬻薪炭貨案牘口價之上皆規利焉嵗餘進奉無㡬遷浙東觀察使天下刺史進奉自裴肅始劉贊卒於宣州嚴綬為判官傾軍府資用進奉無㡬徴拜刑部員外郎天下判官進奉自嚴綬始天下貢賦根本既出江淮時江淮人甚困而聚歛不息十七年衢州刺史鄭式瞻進絹五千疋銀二千兩帝曰式瞻坐事已詔御史按問進物宜付左藏庫憲宗元和四年四月命中使劉承謙宣副度支近有勑文不盡進奉其山南東道節度使裴筠所進銀器六十事共一千五百六兩宜准數收管送納左藏庫八年八月汴州節度使韓𢎞進絹五百疋九月淮西節度使呉少陽獻征馬三百疋十三年四月荆南節度使王諤之子稷進永寜里宅及宣義里亭子時議以諤起兵間因縁際㑹累居大鎮厚殖財貨營第宅頗逾侈又請京兆府籍坊以廣亭榭朝廷業以優待姑容其専既沒而入於官司固其所也十四年五月涇原節度使王濳進銀三千兩熟絹綾五千疋涇州宻邇戎境其上無百姓其軍皆仰給度支舊矣至若無名上獻雖呉蜀沃富猶取諸人以于媚不免于譏責今則盗削軍食以充貢獻而求恩澤盖以時急於財勢使然也七月宣武軍節度使韓𢎞進絹二十五萬疋絁三萬疋銀器二百七十事左右軍中尉各進錢一萬貫馬二匹自淮右宿兵以來度支鹽鐡及四方進獻不已始曰助軍宼平則曰賀禮其后又曰助賞設及帝加尊號又陳獻賀之禮九月考功郎蕭祐詣右銀臺進古今書畵二十卷穆宗以元和十五年正月即位八月澤潞節度使辛祕進貀七頭五坊使進貀八頭非常獻也十二月江西觀察使王仲舒進臘日箭三千隻非常例也長慶元年三月范陽節度使劉總進馬一萬五千匹二年九月鄜坊節度使崔從上言當管軍士因斸薪得古銅器十四面有篆文隨表獻之十二月韓𢎞孫紹宗進亡祖白身口五人馬十匹槖駞十頭絹五千疋銀二千錠及器物刀劒弓箭等三年二月西川叚文昌進繒羅等四千八百疋敬宗以長慶四年正月即位二月庚子西川節度使杜元頴進罨畵打毬衣五百事八月淮南節度使王播進宣索銀粧奩二十月淮南淮西又各進宣索銀粧奩三寳厯元年六月以檢校右僕射兼户部尚書薛華為檢校司空兼河中尹御史大夫充河中節度觀察使華理青齊有政績時論方洽及是進絹萬疋旋有此拜議者甚惜十月荆南節度使王潛於賀冬進獻常數外别進絹一萬七千疋是月昭義監軍使進豽三頭十二月荆南節度使王潛又進賀正常進外别貢綾絹一萬疋二年七月鹽鐡使王播進羡餘絹五十萬疋十月幽州節度使李載義進馬腦鞍一具十一月昭義節度使劉從諫進貀三頭文宗太和元年三月太原節度使李種進宣索馬鞍一百具奉先朝之命也四方諸色貢獻類是者衆不復舉三年十月故鄆州烏重𦙍男從𢎞奏請進助南郊絹一萬疋生馬一百匹請降中使交領五年正月詔天下方鎮端午進奉雜綵匹縀等從今後竝令進生白綾絹八年十一月太原節度使李載義進楊志誠馬千匹懿宗咸通七年七月沙州節度使張義朝進丼峻山青骹鷹四聨延慶節馬二匹吐蕃女子二人僧曇延進大乘百法明門論僖宗光啟元年閏三月鎮州王鎔進耕牛一千頭戎器九千三百事昭宗乾寜元年正月鳯翔李茂貞來朝獻妓女三十人天祐元年十二月廣州劉隐進佛哲國訶陵國羅越國所貢香藥後唐莊宗同光元年十一月偽永平軍節度使張筠遣其弟籛即蘭切進馬三十匹銀二千兩御衣千段是月宿州朱保諲進本朝十二列聖寫真及𤣥宗封㤗山圖二年正月鳯翔節度使李茂貞進龍鳯玉帶是月涇原節度使李曮進寳装針珥錦綵於皇后宫及河南尹張全義諸藩鎮進暖殿物貢羊馬等二月福建節度使王審知遣使奉貢三月淮南楊溥遣其右威衛上将軍許確進賀郊天銀二千兩錦綺羅一千二百疋細茶五百斤象牙四株犀角十株五月故秦王李茂貞遣使王修進遺留禮物水晶鞍盤龍玉帶馬瑙酒盃翡翠爵琉璃瓶玳􅈘唾盂銀蓮花座珊瑚樹一株軍器繒絲錦等九月兩浙錢鏐遣使錢詢貢方物銀器越綾呉綾越絹龍鳯衣絲鞋屐子進萬夀節金器盤龍鳯錦織成紅羅縠袍襖衫段五色長連衣段綾絹金稜祕色甆器銀装花櫚木厨子金排方盤龍帶御衣白龍瑙紅地龍鳯錦被紅藤龍鳯箱等十月湖南進羅浮柑子福建節度使王審知進萬夀節并賀皇太后到京金銀象牙犀珠香藥金装寳帶錦文織成菩薩幡等是月湖南馬殷進萬夀節銀龍鳯䧟花漆浴斛一盤龍御衣龍鳯蹙金􅀈腰龍鳯装箭箙龍鳯朱背弓紅絲弦金鍍頭箭銀千兩又安義孔勍進寳装酒器十二月淮南呉國主楊溥遣使王權進賀正金花銀器錦絲千段御衣金器洎太后禮物三年二月桂州馬賨貢方物是月車駕在鄴庚午皇后劉氏生辰王都樞宻使各進上夀物錦綵金銀器又河中李繼麟進縑銀為宴資又湖南馬殷進羅浮柑子五月吴越王錢鏐獻孔雀二又淮南吴越國主遣使王浩獻重午物銀錦紗縠細茶簟扇龍鳯紗紋厨諸州府各貢端午物九月徐州進九鍊神鋼刀劍各一十月兩淮錢鏐留後錢元瓘蘇州節度錢元璙各貢進金銀錦綺數千件御服犀帶九經書史漢唐書共四百二十三卷四年正月鎮州知州梁文矩奏准宣進花果樹栽及樂官梅審鐸等并已赴闕是月兩浙錢鏐貢佛頭螺子青一山螺子青十婆薩石蟹子四空青四其表不題又沙州節度使曹義全進謝賜旌節官誥玉鞍馬二玉團碙砂散玉鞍轡鉸具安西白㲲胡錦䧺黄波斯國紅地松樹眊裼胡桐淚金星舉大鵬沙二月沙州曹義全進和市馬百匹羚羊角碙砂氂牛尾又進皇后白玉符金青符白玉獅子指環金剛杵𤓰州刺史慕容歸盈貢馬明宗天成元年五月西都知府張籛進魏王繼岌打毬馬七十二匹九月壬申河中進百司紙三萬張詔紙二萬張舊制也十一月戊辰户部侍郎王權奏毎年正仗天下貢物陳于殿庭屬户部司引進切以近年以來未甚齊整本二百餘州貢物今止六十餘州伏以任土勤王本朝故事異申尊奨所謂駿奔伏乞遍下諸州請依貢式陳進正仗之日所貴整齊從之是月淮南偽呉主楊溥遣使魯思郾來賀帝登極持銀千兩金百兩綾一千二百疋茶三百觔受之二年四月呉主楊溥差右威衛将軍雷峴進銀千兩綾羅錦綺千疋修重午之禮九月潞王從珂鎮河中進青氊帳一頂制度極廣并隨帳諸物竝金銀裝雕鏤龍鳯甚有竒功帝嘉賞之十月帝将幸汴州潞王從珂自河中聞大駕廵􅄑進銀装逍遥子一頂十一月福建節度使王延鈞進犀牙香藥海味等三年五月西川進助大禮錢五千萬白熟布十萬疋十月前北京皇城使李繼中弟姪三人進馬二百五匹金器八百兩銀萬兩家機錦百疋白羅三百疋綾三千疋絹三千疋繼中者故昭義帥嗣昭之子少有心疾其母楊夫人自潞州積聚百萬輦于荆州私第繼韜之叛沒之于官莊宗南郊助太平賞給繼韜伏法其母又輦及晉者餘百兩至楊氏卒其弟湘州刺史繼能潞府司馬繼襲聞哀俱至繼中等詣官告變繼能繼襲伏法弟姪等遂得分其所聚故有是獻十一月安重誨以生辰諸處人事得馬五十匹進充内廐四年正月青州于登州崖得風飄到新羅舩進其寳貨五月甲午東川進助南郊錢十萬貫八月乙丑兩浙錢鏐使袁韜進銀五千兩茶二萬七千斤謝恩加其諸子官十月戊戌福建王延鈞進謝恩銀器六千五百兩金器一百兩錦綺羅共三千疋并犀牙玳􅈘真珠龍腦笏扇白㲲紅㲲香藥等又進謝恩進封母為魯國太夫人銀四千五百兩茶蕉海蛤通檊箭等長興元年五月靈武進野駞峰二枚十月福建王延鈞進賀郊禮畢銀七千兩及蕉牙香藥金器百兩三年三月西京奏百姓侯可洪于楊廣城内掘得玉四團差三橋鎮使朱廷義呈進賜廷義絹二十疋可洪等絹二百疋别賜價錢二百貫四年十月己巳夏州李彛超進馬五十匹是月前秦州節度使劉仲殷受代歸京獻馬七十匹廢帝清㤗元年五月壬戌平盧軍節度使房知温來朝及與諸将歸鎮宴于長春殿始奏樂知温獻奉數萬計七月辛丑前邠州節度使康福入朝獻金龍鞍勒馬十一匹九月辛酉兩浙錢元瓘獻銀五千兩綾絹五千疋又元瓘弟蘇州中呉軍節度使元球及諸弟領安南桂廣節度使元球等四人共貢銀七千兩綾絹七千疋十月丙戌皇子河南尹重美洋王從璋涇王從敏宣徽使李専美獻煖帳羊酒爐缾火具襄州趙在禮獻青氊帳紅錦織成龍鳯煖帳甲寅河南尹重美又獻冬服綿綺綾羅三百疋十二月戊戌靈武張希崇獻拒霜韲三器馬十八匹控鶴都指揮使李重謙獻馬十匹時征馬少親将首率也二年九月甲寅兩浙貢茶香綾絹三萬六千計是月杭州錢元瓘進銀綾絹各五千兩疋錦綺五