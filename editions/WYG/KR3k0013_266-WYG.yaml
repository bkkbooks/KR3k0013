body:
  text: 册府元龜卷二百六十六宋王欽若等撰宗室部儀貌材藝儀貌洪範五事其一曰貌盖所謂發乎容止著乎儀表者也矧乃託體霄極毓質扃禁粹靈攸藴光華允集乃有竒姿雋彩孤標傑出聳羣庶之瞻仰増藩戚之焜燿至或風度閒曠舉措詳緩威稜峻發眄睞雄毅斯固有儀可象望之儼然者已其於禀肖魁怪方牘所記者亦傋載云後漢東平王蒼光武子為人美鬚髯腰帯十圍明帝甚愛重之詔曰向者問東平王處家何等最樂王言為善最樂其言甚大副是腰腹矣下邳王衍明帝子有容貌章帝即位常在左右蠡吾侯翼章帝子河間王之後元初六年徴詣京師鄧太后竒翼美儀容以為平原懐王後魏鄧哀王冲容貌姿美有殊於衆太祖時特見寵異晉長沙王乂身長七尺南陽王世子保體質豐偉嘗自稱重八百斤清河康王遐字深度美容儀有精彩武帝愛之宋廬陵王義真美儀貌神情秀徹南郡王義宣白晳美鬚眉長七尺五寸腰帯十圍南齊豫章王嶷身長七尺八寸善持容範文物衛從禮冠百僚每出入殿省皆瞻望嚴肅嶷弟宜都王鑑身長七尺狀似嶷咸以國噐許之隨郡王子隆年二十一而體過充壯常服茹藘丸以自消損西陽王子明丰姿明凈士女觀者咸嗟嘆之臨汝侯坦之肥黒無鬚語聲嘶時人號為蕭瘂梁南康王恪弟定襄縣侯祗美風儀㓜有令譽鄱陽王範世子嗣容貌豐偉腰帶十圍宜豐侯修為衞尉卿美姿貌毎屯兵周衛武帝視之移輦臨川静惠王宏身長八尺美鬚眉容止可觀永陽嗣王伯㳺美風神善𤣥言安陸王大春簡文子體貌瓌偉腰帶十圍武寧王大威簡文子美風儀眉目如畫陳衡陽王昌髙祖子容貌偉麗精神秀朗鄱陽王伯山字静之文帝子偉容儀舉止閒雅喜愠不形於色文帝深噐之新安王伯固文帝子生而龜胷目通睛晳白形狀眇小而俊辯善言論建安王叔卿字子弼宣帝子性質直有材噐容貌甚偉宜都王叔明字子昭宣帝子儀容美麗舉止和弱狀若婦人後魏上黨王天穆性和厚羙形貌其子儼亦美材貌華山王鷙容貎魁壯腰帶十圍東陽王丕淮南王他淮陽王元三人皆壯偉腰帶十圍大耳秀眉鬚鬢班白百僚觀瞻莫不祇聳望都公頺昭帝之後大武以頺美儀容進止可觀使迎左昭儀於蠕蠕秦明王幹子儀長七尺五寸容貌甚偉美鬚髯陽平王他身長八尺美姿貌南平王霄長九尺腰十圍貌魁偉雅有風則貞白卓然甄成縣伯禹淮南王顯之子容貌魁偉章武王彬子融字永興儀貌壯麗衣冠甚偉性通率有豪氣永昌王徤明元子姿貌魁壯所在征戰常有大功臨淮王彧美風韻善進止衣冠之下雅有容則京兆王悰字魏慶善容貌風望儼然城陽王鸞字宣明身長八尺腰帶十圍北海王詳字季豫美容儀善舉止陽平王新成子欽為尚書右僕射欽色尤黒故時人號黒靣僕射濟南王彧姿制閒裕吐發流靡本名亮字仕明後啓求改名詔曰仕明風神運吐嘗自比荀文若可名彧以取定體相倫之美琅邪王誦有名人也見之未嘗不心醉忘疲彭城王勰字彦和獻文子美容貌善風儀端嚴若神折旋合度出入言笑觀者忘疲齊郡王簡字叔亮文成子母沮渠牧犍女簡貌類外祖咸陽王禧弟樹字秀和一字君立美姿貌位宗正卿後奔梁梁武尤噐之封為魏郡王清河王懌字宣仁文宗子㓜而敏慧美姿貌孝文愛之彭城王勰甚噐異之並曰此兒風神外偉黄中内潤若天假之年比二南矣北齊襄城王清神武子容貌甚美弱年有噐望南康王孝瑜文襄子容貌魁偉精彩雄毅蘭陵王孝瓘文襄子貌柔心壯音容兼美安徳王延宗文襄子容貌充壯坐則仰偃則伏人笑之乃赫然奮發趙郡王叡髙祖弟之子身長七尺容儀甚偉清河王嶽字洪畧髙祖從父弟長而敦直姿貌嶷然沉深有噐量隋蜀王秀髙祖子有膽氣容貌瓌瑋美鬚髯多武藝為朝臣所憚觀徳王雄髙祖族子美姿儀有噐度雍容閒雅進止可觀齊王暕字世朏煬帝子美容儀踈眉目少為髙祖所愛趙王杲煬帝子聦令美容儀燕王倓字仁安元徳太子子美姿儀煬帝於諸孫中特所鍾愛常置左右越王侗字仁謹元徳太子子美姿儀性寛厚唐江王元祥髙祖子體質洪大腰帶十圍飲啖亦兼數人時韓王元嘉虢王鳯魏王恭狀貌亦偉不逮於元祥滕王元嬰子渉壯貌類胡而豐碩濮王泰太宗子帝以其腰腹洪大趨拜稍難令乗小輿至於朝所申王撝睿宗子儀形瓌偉善於飲啖夏悼王一𤣥宗子生而美秀帝鍾愛無比名之為一永王璘𤣥宗子貌陋視物不正晉髙祖㓜子重睿肖髙祖故尤鍾愛漢魏王承訓字徳輝髙祖之長子少温厚美姿儀髙祖尤鍾愛材藝周官保氏以六藝教國子仲尼有言曰游於藝又曰吾何執執御乎執射乎盖夫生民之秀自天攸縱靡不多能者矣矧乃鍾靈帝胄毓質宗翰憑席深厚英華發越至有博綜衆藝精覈數術旁通懸解俱臻其妙盖出夫性習之自然志行之餘力也雖異乎詩書之雅言信義之成徳亦猶賢於飽食終日無所用心者歟周周公旦多材多藝漢楚元王交多材藝淮南王安為人好書皷琴不喜弋獵狗馬馳騁燕王旦壯大雄偉為人辦畧好星厯數術廣川王去惠王越之子景帝孫也好方技博奕定陶恭王康多材藝習知音樂後漢北海王睦光武兄伯升孫也善史書當世以為楷則及寢疾明帝驛馬令作草書尺牘十首牘書版也蓋長一尺因以名焉陳王寵善弩射十發十中中皆同處寵射其秘法以天覆地載叅連為竒又有三微三小三㣲為經三小為緯經緯相將萬勝之方然要在機牙中平中黄巾賊起國人素聞王善射不敢反叛樂成靖王黨聪慧善史書喜正文字魏陳侯仁太祖從弟也少好弓馬邵陵侯貞太祖族子嘗獵為虎所逐顧射虎應聲而倒任成王彰太祖子少善射御膂力過人手格猛獸好擊劔陳思王植太祖子太祖遣邯鄲淳詣植植初得淳甚喜延入坐不先與談時天暑熱植因呼常從取水自澡訖傅粉遂科頭拍􅃝胡舞五椎鍛跳丸擊劔誦俳優小説數千言訖謂淳曰邯鄲生何如邪於是乃更着衣幘整儀容與淳評説混元造化之端品物區别之意然後論羲皇以來賢聖名臣烈士優劣之差次頌古今文章賦咏及當官政事宜所先後又論用武行兵倚伏之勢乃命厨宰酒炙交至坐席黙然無與伉者及暮淳歸對其所知嘆植之材謂之天人吴建侯慮字子智太子發弟也少敏慧有材藝大帝噐愛之晉通吉亭侯勲宣帝弟恂曽孫便弓馬能左右射以勇聞齊王攸文帝子善尺牘為世楷模宋江夏王義恭善騎射解音律長沙王道憐子義融厯五兵尚書領軍有質幹善於用短楯南齊臨川王映髙帝子善騎射解聲律工左右書左右射映子州陵侯㳺亦好音樂解絲竹雜藝長沙王晃髙帝子便弓馬武帝嘗幸鍾山晃從駕以馬矟刺道邊枯孽帝令左右數人引之銀纒皆卷聚而矟不出乃令晃復馳馬㧞之應手便出每逺州獻駿馬帝輙令晃於華林中調試之武陵王煜髙帝子初髙帝在淮隂雖為方伯而居處貧諸子學書無紙筆煜常以指畫空中及畫掌學字遂工篆法少時又無碁局又破荻為片縱横以為碁局指㸃行勢遂至名品射為當時獨絶琅邪王瞻亦稱善射而不及煜也武帝幸豫章王嶷東田宴諸王獨不召煜嶷曰風景殊美今曰甚憶武陵帝乃呼之煜善射屢發屢中顧謂四座曰手何如帝神色甚怪嶷曰阿五常日不爾今可謂仰藉天威帝意乃釋後於華林賭射帝勅煜疊破凡放六箭五破一皮賜錢五萬江夏王鋒髙帝子年四歳宋蒼梧王欲害鋒髙帝匿於張氏舍鋒好學書張家無紙札乃倚井欄為書書滿則洗之已復更書如此者累月乂晨興不肯拂牕塵而先畫塵上學為書字五歳髙帝使學鳯尾詔一學即工髙帝大悦以玉麒麟賜之曰麒麟賞鳯尾矣好琴書盖亦天性嘗覲武帝賜以寳裝琴乃於御前鼓之大見賞帝謂鄱陽王鏘曰闍黎琴亦是桞令之流亞時桞世隆為尙書令善彈琴風韻清逺其人事事有意吾欲試以臨人鏘曰昔鄒忌鼓琴威王委以國政乃出為南徐州刺史工書為當時藩王所推南郡王昭業亦稱工謂武帝曰臣書固應勝江夏王武帝荅曰闍黎第一法身昭業第二法身闍黎鋒小名宜都王鏗髙帝子善射常以棚大濶曰終日射侯何難之有乃取甘蔗挿地百歩射之十發十中魚復侯子響武帝子勇力絶人開弓四斛力數在園池中帖馬馳走竹樹下身無虧傷竟陵王子良孫賁能書善畫於扇上圖山水咫尺之内便覺萬里為遥曲江公遥欣子幾善草𨽻書新浦縣侯子雲善草𨽻書為時楷法自云善效鍾元常王逸少而㣲變字體子特亦善草𨽻祁陽縣侯子範子乾善𨽻書得叔父子雲之法梁廬陵王續武帝子少英果膂力絶人馳射應發命中武帝嘆曰此我之任城也常馳射於帝前續中兩麞冠於諸人帝大悦邵陵王綸武帝子尤工尺牘汝南侯堅綸之長子亦善草𨽻永安侯確綸次子少驍勇尤工楷𨽻公家碑碣皆侯書之又習騎射與兵法武陵王紀武帝子便騎射尤工舞矟頗學觀占善風角南安侯駿長沙王懿孫也善草𨽻晩更習武膂力絶人河東王譽昭明太子子㓜有驍勇馬上用弩南郡王大連簡文子少俊爽能屬文舉止風流雅有巧思妙達音樂兼善丹青髙帝幸朱方大連與兄大臨並從髙祖問曰汝等習騎不對曰臣等未奉詔不敢輙習勅各給馬試大連兄弟據鞍往還各得馳驟之節髙祖大悦即賜所乗馬及為啓謝詞又甚美忠烈世子方等元帝子少聪敏有俊才善騎射尤長巧思陳遂興侯詳善書記談論清雅始興王伯茂文帝子世祖深愛之是時征北軍人於丹徒盗發晉郗曇墓大獲晉右將軍王羲之書及諸名賢遺跡事覺其書並没縣官藏於秘府世祖以伯茂好古多以賜之繇是大工草𨽻甚得右軍之法長沙王叔堅宣帝子少傑黠尤好數術卜筮風角鎔金琢玉並究其妙後魏淮陵侯大頭烈帝之後也善騎射暨陽子可悉陵年十七從大武獵遇一猛獸遂空手搏之以獻帝曰汝才力絶人當為國立功立事勿如此也又從平凉州沮渠茂䖍令一驍將與陵相擊兩槊皆折陵抽箭射之墜馬陵恐其救至未及㧞劔以刀子戾其頸使身首異處帝壯之髙凉王孤多才藝有志畧彭城公勃善射御衛王儀有筭畧少能舞劔騎射膂力絶人弓將十石陳留王䖍矟大稱異時人云衛王弓桓王矟新蔡公幹儀子也善弓馬以騎從明元於白登之東北有䨇鴟飛鳴於上帝命左右射之莫能中鴟旋飛稍髙幹以二箭下䨇鴟帝賜之御馬弓矢金帶一以旌其能軍中於是號幹為射鴟都將上黨王天穆射有名陳留王䖍武力絶人每以矛細短大作之猶患其輕復綴鈴於刄下其弓力倍加常人嘗以矟刺人遂貫而髙舉又嘗以一手頓矟於地馳馬偽退敵人爭取引不能出䖍引弓射之一箭殺二三人揺矟之徒亡魂而散徐乃令人取矟而去河南王曜道武子嘗射雀於帝前中之帝驚嘆焉及長武藝絶人永昌王徤明元子才藝比陳留桓王而智畧過之從大武襲蠕蠕越涿邪山詔徤殿後矢不虗發中皆應弦而斃威震漠北彭城王粟弟渾少善弓馬大武嘉之㑹有諸方使命渾射獸三頭發皆中之舉坐咸以為善陽豐侯庫汗渾子也為羽林中郎將從北廵有兎起乗輿前命庫汗射之應弦而斃大武悦賜一金兎以旌其能南平王渾道武孫好弓馬射鳥輙厯飛而殺之日射兎得五十頭時皆嘆異焉大武嘗命左右分射勝者中的籌滿詔渾解之三發皆中太武大悦噐其藝能嘗引侍左右賜馬百匹僮數十人新興王俊明元子少善騎射多藝南安王英性識聰敏慱聞強記便弓馬解吹笛㣲曉醫術北海王詳獻文子嘗從車駕至文成射銘之所孝文停駕詔諸弟及侍臣皆試射逺近唯詳箭不及文成箭所十餘歩孝文嘉之拊掌欣笑遂詔勒銘親自為制晉陽縣伯贊弟淑彎弓三百斤善騎射東阿公順任城王澄子篤志愛古解鼓琴彭城王邵獻文孫也少有氣節善武藝濮陽王順善射孝武在洛於華林園戯射以銀酒巵容二升許懸於百歩外命善射者十餘人共射中者即以賜之順發矢即中帝大悦並賞金帛順仍於箭孔處鑄一銀童足蹈金蓮手持剗炙遂勒背上序其射功北齊趙郡王琛神武弟少便弓馬有志氣永南王俊神武子豪爽有氣力善騎射為文襄所愛上黨王渙神武子力能扛鼎材武絶倫每謂左右曰人不可無學但不為慱士耳故讀書頗知梗槩而不甚耽習河南王孝瑜字正徳文襄長子覆棊不失一道廣寧王孝珩文襄子愛賞人物有技藝嘗於㕔事壁自畫一蒼鷹見者皆以為真又作朝士圖亦當時之妙絶後周東平公神舉文帝族子父顯和膂力絶人彎弓數百斤能左右馳射從孝武入關至溱水帝素聞其善射而未之見俄而水傍有一小鳥顯和射中之帝笑曰我知卿工矣神舉尤工騎射汝南王慶神舉弟沉深有噐局善射有膽氣好格猛獸從武帝伐齊與賊爭進慶射之所中人必倒賊乃稍却代王達文帝子性果决善騎射齊殤王憲之子貴字乾福少聰敏尤便騎射年十一從憲獵於鹽州一圍之中手射野鳥及鹿一十五隋義城公處綱髙祖族父也生長北邉少習騎射滕穆王瓚子綸字斌籕性𢎞厚頗解鍾律齊王暕字世朏煬帝子頗渉經史尤工騎射唐漢王元昌髙帝子性警悟有勇力工騎射頗渉文史兼能𨽻書霍王元軌髙祖子少善騎射初為吴王時嘗從太宗逰獵遇羣獸命射之矢不虚發獸無遺者太宗撫其背曰汝才藝過人恨今無所施耳當天下未定我得汝豈不要乎徐王元禮髙祖子少恭謹善騎射琅邪王冲越王貞長子好文學善騎射厯陳壽慱州刺史皆有能名江都王緒霍王元軌長子少好學有雋才能書畵騎射為一時之絶吴王恪太宗第三子少善騎射太宗甚愛之濮王泰太宗第五子少好學善屬文工草𨽻待賢禮士深為太宗所愛紀王慎太宗第十子慎好學解天文明練吏事皇族中與越王貞齊名時人號為紀越光王琚𤣥宗子有才力善騎射永王璘𤣥宗第十六子少聰敏善草𨽻齊王倓肅宗子英毅有才畧善騎射梁朱友倫太祖仲兄存次子㓜歳從師讀書稍長學歐陽詢筆蹟甚得其體勢弱冠有壯志甞侍立帝側陳自試之請帝笑曰昔之東阿今復爾耳册府元龜卷二百六十六
