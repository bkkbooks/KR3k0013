  text: 册府元龜卷二十三宋王欽若等撰帝王部符瑞第二後魏道武登國六年十二月帝獵親獲鹿一角召問羣臣皆曰鹿當二角今一角是諸國將并之應也皇始元年十一月黄星又見先是有大黄星出於昴畢之間天興二年七月并州獻白兎是月并州獻白雉是月獲嘉禾於平城縣異莖同潁八月廣寗送嘉禾一莖十一穗平城南十里郊嘉禾一莖九穗告于宗廟三年四月有木連理生于代郡天門關之路左五月東廵狩廣寗有白兎見于乗輿前獲之八月渤海蓨縣東光縣木連理各一十二月豫州上言木連理生於河内之沁縣四年正月并州獻白兎是月上黨郡獻白雉明元泰常三年正月渤海上言東光縣木連理是月渤海郡高城縣獻白雉三月渤海郡南皮縣獻白雉二六月頓丘郡獲白兎八月嘉禾生於渤海郡東光縣是月廣寗郡上言木連理十一月中山行唐縣獻白雉四年正月新興郡獻白雉十二月又獻白雉二五年白雉見於河内郡七年九月温泉出于涿鹿人有風寒之疾飲者多愈八年五月鴈門獻白雀太武始光三年五月雒州獻黑兎四年六月丼露降于太學神䴥元年二月定州獲白䴥鹿白䴥鹿又見于樂陵因以改元是月相州獻白雉是月丼露降于范陽郡九月章武郡獻白兎是月滄水郡獻白雀十月魏郡獻白兎二年二月上黨郡獻白雉四月丼露降于鄴六月丼露降於平城宮七月嘉禾生於魏郡安陽縣三本同穎三年二月白鹿見於代郡倒刺山三月丼露降于鄴七月冀州獻白龜四年二月渤海郡獻白兎九月滎陽郡上言木連理五月丼露降於河西延和二年三月樓煩南山木連理三年三月樂安王範獲玉璽一文曰皇帝璽以獻九月上谷郡上言木連理太延元年二月魏郡上言木連理四年十二月相州獻白鹿五年二月遼西上言木連理太平真君元年四月丼露降于平原郡二年七月天有黄光洞炤議者僉謂榮光也七年二月靑州獻白兎四月戊子毁鄴城五層佛圖於泥像中得玉璽二其文皆曰受命於天旣壽永昌其一刻其旁曰魏所受漢傳國璽八年五月鴈門郡獻白雀是月雒州送白鹿文成興安二年六月營州送大龜興光元年二月有雲五色所謂景雲太平之應也太安二年七月丼露降於常山郡十月白鹿見于京師西􅁐三年三月有白狼一見於太平郡議者曰古今瑞應多矣然白狼見於成湯之世故殷道用興太平嘉名也又先帝本封之國而白狼見焉無窮之徵也和平二年七月丼露降于京師三年四月河内人張超於壞樓所城北故佛圖處獲玉印以獻印方二寸其文曰富樂日昌永保無疆福禄日臻長壽萬年玉色光潤模制精巧百僚咸曰神明所授非人爲也詔天下大酺三日十月雲中獲白兎四年閏月鄴縣獲白兎三月冀州獻白雉孝文延興元年十一月秘書令楊崇奏鍾律郎李生於京師見長生連理樹是月泗州秀容民獲麟以獻十二月徐州竹邑戍士邢德於彭城南一百二十里得蓍一株四十九枝下掘得大龜獻之詔曰龜蓍與經文相合所謂靈物也德可賜爵五等二年正月靑州獻白雉二月白雉見於扶風郡四月幽州獻白鵲三年五月白雀見於代郡六月京師獲大龜四年正月靑州獻白雀九月白雀見中山五年正月白雉見於上谷郡四月白兎見於代郡承明元年六月㤗州獻白鹿八月白鹿見於雲中是月齊州獻嘉禾是月上谷郡民獻玉印上有蛟龍文是月定冀二州俱獻白鵲九月京兆民獻靑玉璧一雙文色炳煥是月并州上言木連理相去一丈二尺中有五枝相連十一月定州獻白鵲是月冀州獻白鳩太和元年正月白鹿見於秦州靑州二月秦州獻白雉三月白雉見于秦州是月白鹿見於秦州是月武川鎮獻玉印青質素文其文曰太昌是月冀州上言木連理六月雍州周城縣獻白兎是月雍州獻玉印又長安鎮獻玉印一上有龜紐下有文字色甚鮮白有殊常玉十一月白雉見於安定郡二年三月白鷰見於并州七月白烏見於凉州九月有鼎出於雒州滍雒水送於京師是月白烏見於京師十一月徐州獻白雉是月雒州獻白鵲是月徐州獻黑狐是月泰州獻五色狗十二月懷州獻白麞三年正月統萬鎮獻白雉三月齊州獻五色狗其色如畫是月吐京鎮獻黄兎是月泗州獻一角鹿是月白烏見於豫州五月獲白狐五月白麞見於豫州是月白雀見於豫州六月撫𡨕鎮獲白狐以獻七月定州鉅鹿民獻玉印二方七分上有文字九月齊州獻嘉禾是月白烏見於秦州十月徐州獻嘉瓠一蒂兩實四年正月南豫州獻白雉是月南豫州獻白鹿五年六月上邽鎮將上言於鎮城西二百五十里射獵於營南千水中遂得玉車釧三枚二靑一赤制狀甚精八月常山獻嘉禾六年三月豫州獻白雉七年六月靑州獻三足烏是月定州獻嘉禾八年正月上谷郡惠化寺醴泉涌四月白鷰集于京師是月代郡獻白鷰六月徐州獻白兎是月徐州獲黑狐以獻是月齊州淸河郡獻白雉十年三月冀州獲九尾狐以獻十一年十一月冀州獲九尾狐以獻十三年正月司州河州各獻白狐狸是月淸河武城縣獻白雀十一月滎陽獻三足烏十四年六月懷州獻三足烏十七年正月幽州獻白雉四月瀛州獻白雉五月冀州獻三足烏六月京師木連理是月兖州獻白烏十八年十月河南上言鞏縣木連理是月瀛州獻白兎十九年六月司州平陽郡獲白烏以獻七月司州獲白鹿麑以獻二十年二月兖州獻白雉六月司州獻白鹿是月豫州獻三足烏二十一年七月汲郡獻黑兎是月京師獲白兎二十三年正月華州獻白麏二月凉州獻赤烏六月冀州獻三足烏七月瀛州獻白鳩八月滎陽郡獻白鳩荆州獻白鷰閏月正平郡獻白鷰十月并州上言百節連理生懸甕山濟州上言木連理十二月瀛州上言木連理是月司州獻白烏是月獲黒兎宣武景明元年四月荆州獻白鹿五月徐州獻