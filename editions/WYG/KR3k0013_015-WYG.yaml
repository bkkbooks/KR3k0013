body:
  text: 册府元龜卷十五宋王欽若等撰帝王部年號傳曰履端於始序則不愆自三代之際五行更王雖三統循環迭舉嵗首至于紀年摽歴未聞他制逮漢之文景始有前後之稱施及孝武肇創建元之號厥後或章述徳美昭著祥異或弭災厭勝計功稱伐或一號而不易或一嵗而屢改其有矯時遵古但紀嵗歴者亦不逺而復斯乃前王因時立制後代㳂襲而不可易者也漢文帝即位十七年改元後元年新垣平候日再暈以為吉祥故改元以來延年之祚也盡七年景帝前元年盡七年中元年盡六年後元年盡三年武帝即位建元元年盡五年元光元年以長星見故為元光盡六年元朔元年朔始也言更為初始也盡六年元狩元年獲白麟因改元曰元狩有司言元宜以天瑞命不宜以一二數得諸瑞以名年一元曰建建元元年是二元以長星曰光以有長星之光故曰元光元年今郊得一角獸曰狩云盡六年元鼎元年得寳鼎故因是改元盡六年元封元年始封泰山故改元盡六年太初元年初用夏正以正月為嵗首故改元為太初盡四年天漢元年時頻年苦旱故改元為天漢以祈甘雨大雅有雲漢之詩周大夫仍叔所作也以美宣王遇旱災修徳勤政而能致雨故依以為年號盡四年太始元年言蘯滌天下與民更始故以冠元盡四年征和元年言征伐四夷而天下和平也盡四年後元年盡二年昭帝始元元年盡其年元鳯元年三年中鳯凰比下東海海西樂鄉於是以冠元焉盡六年元平元年盡六年宣帝本始元年盡四年地節元年以先者地震山崩水出於是改年曰地節欲令地得其節盡四年元康元年盡四年神雀元年帝幸河東祠后土有神雀集改元盡四年五鳯元年先者鳯凰五至因以改元盡四年甘露元年盡四年黃龍元年漢儀注云此年二月黄龍見廣漢郡故改元盡六年元帝初元元年盡五年永光元年盡五年建昭元年盡五年竟寧元年呼韓邪單于願保塞邉竟得以安寧故以冠元盡其年成帝建始元年盡四年河平元年三月詔曰河決東郡流漂二州兖州豫州之地挍尉王延世隄塞輒平其改元為河平賜天下吏民爵各有差盡四年五月陽朔元年六月以山陽火生石中改元言陽氣之始盡四年鴻嘉元年盡四年永始元年盡四年元延元年盡四年綏和元年盡二年哀帝建平元年盡四年元夀元年盡二年平帝元始元年盡五年孺子嬰居攝元年王莽鴆平帝立之年二嵗盡三年為莽所篡後漢光武建武元年六月己未即皇帝位于鄗大赦改元盡三十二年三月中元元年二月柴望岱宗登封㤗山禪于梁父四月改元盡二年明帝永平元年盡十八年章帝建初元年盡八年元和元年盡三年章和元年七月詔曰朕聞明君之徳啓廸鴻化緝熙康乂光照六幽緝熈光明也六幽謂六合幽隠之處訖惟人面靡不率俾仁風翔于海表威霆行乎鬼區鬼區即鬼方然後敬恭明祀膺五福之慶獲来儀之貺朕以不徳受祖宗𢎞烈乃者鳳凰仍集麒麟並臻甘露宵降嘉榖滋生芝草之類嵗月不絶朕夙夜祗畏上天無以彰于先功今改元和四年為章和元年盡二年和帝永元元年盡十六年元興元年四月庚午大赦改元盡其年殤帝延平元年盡其年安帝永初元年盡七年元初元年正月甲子改元盡六年永寧元年四月丙寅立皇太子改元盡其年建光元年盡其年延光元年二月丙午大赦改元盡四年順帝永建元年延光四年十一月中黄門孫程等十九人斬江京等迎立帝自濟隂王即皇帝位明年正月改元盡六年陽嘉元年三月庚寅帝臨辟雍饗射大赦改元盡四年永和元年正月己巳宗祀明堂登雲臺大赦改元盡六年漢安元年正月癸巳宗祀明堂大赦改元盡二年建康元年四月辛巳立皇太子大赦改元盡其年冲帝永嘉元年建康元年八月庚午自皇太子即位明年正月改元盡其年質帝本初元年永嘉元年正月丁巳封建平侯其月即皇帝位明年正月改元盡其年桓帝建和元年本初元年閏六月庚寅自蠡吾侯即皇帝位明年正月改元盡三年和平元年正月甲子大赦改元盡其年元嘉元年正月癸酉大赦改元盡二年永興元年五月丙申大赦改元盡二年永夀元年正月戊申大赦改元盡三年延熹元年正月庚戌大赦天下改元盡九年永康元年六月庚申大赦改元盡其年靈帝建寧元年永康二年正月自觧瀆亭侯即皇帝位改元盡四年熹平元年正月己巳大赦改元盡六年光和元年盡六年中平元年是年破黄巾賊十二月改元盡六年𢎞農王光熹元年中平六年四月即位改元盡其年七月昭寧元年八月改元盡其年獻帝永漢元年昭寧元年九月即位改元是年十二月詔除光熹昭寧永漢三號還復中平六年初平元年盡四年興平元年正月辛酉大赦改元盡二年建安元年正月癸酉郊祀上帝於安邑大赦改元盡二十四年延康元年三月改元盡其年十月禪於魏按甲子世祖建武元年乙酉嵗中興盡庚子合一百九十六年魏文帝黃初元年十一月庚午帝自魏王登壇即阼百官陪位事訖降壇視燎成禮而反改延康為黃初盡七年明帝太和元年盡六年青龍元年正月甲申青龍見郟之摩陂井中二月丁酉幸摩陂觀龍於是改元盡五年景初元年正月壬辰山荏縣言黄龍見於是有司奏以為魏得地統宜以建丑之月為正三月定歴改年為孟夏四月初文皇帝即位以受禪于漢正因循漢正朔弗改帝在東宫若論以為五帝三王蜼同氣共祖禮不相襲正朔自宜改變以明受命之運及即位優斿者久之史官復著言宜改乃詔三公特進九卿中郎将大夫博士議郎千石六百石博議議者或不同帝㨿古典甲子詔曰夫太極運三辰五星於上元氣轉三統五行於下登降周旋終則又始故仲尼作春秋於三㣲之月每月稱王以明三正迭相為首今推三統之次魏得地統當以建丑之月為正月考之羣議厥義章矣其改青龍五年三月為景初元年四月盡三年齊王以景初三年正月丁亥即位十二月詔曰烈祖明皇帝以正月棄背天下臣子永惟忌日之哀其復用夏正雖違先帝通三統之義斯亦禮制所繇變改也又夏正於數為得天正其以建寅之月為正始元年正月以建丑月為後十二月盡九年嘉平元年四月乙丑改元盡六年九月高貴鄉公正元元年嘉平六年十月司馬昭廢齊王迎立即皇帝位是月改元盡三年五月甘露元年五月鄴及上谷並言甘露降下八月丙申改元盡五年五月陳留王景元元年甘露五年五月己丑司馬昭使成濟弑高貴鄉公六月甲寅自安次縣嘗道鄉公即位大赦改元盡四年咸熙元年盡二年十二月禪于晉按甲子魏自庚子嵗建國至乙酉合四十六年晉武帝泰始元年十二月丙寅設壇於南郊帝升壇受禪禮畢即雒陽宫幸太極前殿大赦改元盡十年咸寧元年正月戊午􅃋大赦改元盡五年太康元年二月平吳大赦改元盡十年太熙元年正月辛酉朔改元盡其年三月惠帝永熙元年太熈元年四月自太子即位大赦改元盡其年永平元年春正月乙酉朔臨朝不設樂詔曰朕夙遭不造淹恤在疚頼祖宗遺靈宰輔忠賢得以𦕈身託于羣后之上昧於大道不明於訓戰戰兢兢夕惕若厲乃者哀迷之際三事股肱惟社稷之重率遵翼室之典猶欲長奉先皇之制是以有永熙之號然日月踰邁已渉新年開元易紀禮之舊章其改永熙二年為永平元年盡其年二月元康元年永平元年二月誅太𫝊楊駿大赦改元盡九年永康元年正月癸亥朔大赦改元盡其年永寧元年四月乗輿反正大赦改元盡其年十一月太安元年十二月大赦改元盡二年永興元年正月大赦改元永安七月大赦改元建武十一月大赦改元復為永安十二月大赦改元永興盡二年光熙元年六月辛未大赦改元盡其年懐帝永嘉元年光熈元年十一月自太弟即位明年正月癸丑朔大赦改元盡七年正月愍帝建興元年永嘉七年正月懐帝為劉聰所弑四月壬申即位大赦改元盡五年元帝建武元年三月辛卯即晉王位大赦改元盡其年太興元年三月癸丑即皇帝位大赦改元盡四年永昌元年正月己卯大赦改元盡其年明帝太寧元年盡三年成帝咸和元年二月丁亥大赦改元盡九年咸康元年正月庚午朔帝加元服大赦改元盡八年康帝建元元年盡二年穆帝永和元年正月甲戌朔皇太后設白紗帷於太極殿抱帝臨軒改元盡十二年升平元年正月壬戌朔帝加元服大赦改元盡五年哀帝隆和元年正月壬子大赦改元盡其年興寧元年二月己亥大赦改元盡三年廢帝太和元年盡六年簡文帝咸安元年十一月己酉即皇帝位乙卯改元盡二年孝武帝寧康元年正月己丑朔改元盡三年太元元年正月壬寅朔帝加元服大赦改元盡二十一年安帝隆安元年正月己亥朔帝加元服改元盡五年元興元年正月庚午朔大赦改元盡三年義熙元年正月帝在江陵大赦改元二月反正盡十四年恭帝元熈元年正月壬辰朔改元盡二年九月禪于宋後魏道武登國元年正月戊申即代王位郊天建元大赦於牛川四月改稱魏王盡十年皇始元年七月左司馬許謙上書勸進尊號始建天子旌旗出入警蹕於是改元盡二年天興元年十二月己丑臨天文殿司徒進璽綬百官咸稱賀大赦改元盡六年天賜元年盡六年十月明元帝永興元年十月即位大赦改元盡五年神瑞元年正月辛酉以祥瑞頻集大赦改元盡二年泰常元年四月大赦改元盡八年太武帝始光元年泰常八年十月自泰平王監國即位盡四年神䴥元年二月改元盡四年先是定州獻白䴥鹿又見于樂陵因以改元立皇太子延和元年正月丙午謁於太廟大赦改元盡三年太延元年正月甲申大赦改元盡五年太平真君元年六月丁丑皇孫生大赦改元盡十一年正平元年六月壬戌改元盡二年文成帝興安元年正平二年十月戊申即位大赦改元盡二年興光元年七月庚子皇子生辛丑大赦改元盡其年太安元年六月壬戌曲赦京城改元盡五年和平元年正月甲子朔大赦改元盡六年獻文帝天安元年和平六年五月甲辰即位踰年改元盡其年皇興元年八月戊申皇子生大赦改元盡五年八月孝文帝延興元年皇興五年八月丙午即位大赦改元盡五年承明元年六月辛未上皇終壬申大赦改元盡其年太和元年正月乙酉詔曰朕夙承寳業懼不堪荷而天貺具臻地瑞竝應風和氣晼天人交協豈朕冲昧所能致哉實賴神祗七廟降福之助今三正告初祗感交切宜因陽始令協典章其改今號為太和元年盡二十三年宣武帝景明元年太和二十三年四月自皇太子即帝位明年正月大赦改元盡四年正始元年二月丙寅大赦改元盡四年永平元年八月丁卯大赦改元盡四年延昌元年四月乙酉大赦改元盡四年孝明帝熙平元年延昌四年正月丁巳即位踰年改元盡二年神龜元年二月己酉詔以神龜表瑞大赦改元盡二年正光元年七月辛卯帝加元服大赦改元盡五年孝昌元年六月癸未大赦改元盡三年武泰元年正月丙寅大赦改元盡其年二月孝荘帝永安元年四月即位改建義元年九月乙亥以平葛榮大赦天下改為永安元年盡三年長廣王建明元年永安二年十月自太原太守行并州刺史為爾朱世隆等推立改元盡二年二月禪于前廢帝前廢帝亦謂之節閔普泰元年建明二年二月己巳即位改元盡其年後廢帝中興元年建明二年十月即位信都升壇焚燎大赦改元盡二年四月遜位于出帝西魏武帝亦謂之出帝永熙元年中興二年四月戊子即位大赦改元太昌元年十二月丁亥大赦天下改太昌為永興又以太宗年號尋改元永熙盡三年文帝大統元年永熙三年閏十二月自南陽王為宇文泰所推立明年改元盡十七年廢帝元年大統十七年三月自皇太子即位明年去年號稱元年盡三年正月為宇文泰所廢恭帝元年廢帝三月正月自齊王為宇文泰所立盡三年十二月庚子禪位于周後周閔帝元年正月辛丑即天王位稱元年盡二年明帝元年閔帝元年九月自岐州刺史寧都郡公即天王位稱元年盡二年武成元年八月己亥改天王稱皇帝追尊文王為帝大赦改元盡二年自武成以前不立年號武帝保定元年正月戊申詔曰寒暑亟周奄及徂嵗改元命始國之典章朕承寳圗宜遵故實可改武成三年為保定元年帝自武成二年四月即位踰年改元盡五年天和元年正月癸未大赦改元盡六年建徳元年三月丙辰大赦改元盡六年宣政元年三月壬辰改元盡其年初改宣政梁主蕭巋離合其字為宇文亡日其年六月終宣帝大成元年宣政元年六月即位正月朔受朝於露門大赦改元盡其月大象元年二月傳位太子大赦改元盡二年初改大象梁王蕭巋又離合其字曰太子冢明年而終静帝大定元年正月壬午詔曰朕以不天夙遭殛罰光隂遄􅄩遽及此辰窮慕纒綿言增號絶踰祀革號憲章前典可改大象三年為大定元年盡其年二月遜位于隋隋高祖以後周大定元年二月甲子自相國受禪即位改元開皇元年盡二十年仁夀元年正月乙酉朔大赦改元盡四年建徳元年三月誅大冡宰宇文䕶大赦改元盡六年煬帝大業元年以仁夀四年七月即位明年正月改元盡十三年初改大業識者惡之曰於字離合為大苦未也尋而天下䘮亂率土遭塗炭之酷焉恭帝義寧元年大業十三年十一月壬戌自代王為唐公所立大赦改元盡二年五月禪于唐唐高祖武徳元年五月甲子即皇帝位於太極殿大赦天下改隋義寧二年為唐武德元年盡九年太宗以武徳九年八月即位明年正月乙酉詔曰朕遐觀方册歴選前聖大道既隐至公斯革莫不思樹風聲用隆龜鼎太皇膺籙受圗功成治定鄙聖人之餘事顧天下而窅然永言俗累高居物表爰以大寳俯授㣲躬自肅奉神器亟移灰律三正在旦萬國來庭長世之術既𢎞惟新之命方始體元居正今則其時可改武徳十年為貞觀元年盡二十二年高宗以貞觀二十三年五月即位明年正月辛丑詔曰比者恭膺寳位乃叶天時繼奉休命必因正朔太宗文皇帝龔行天罰寧一區夏宏功無外盛烈難名攀望徽猷哀盈園寝朕以寡徳守兹神器仰憑堂構俯暢生靈酌彼彛倫道兼文武方今孟陬獻蔀常儀佇歴三元首事萬國来庭宜遵經國之典以叶陽秋之義可改貞觀二十四年為永徽元年盡六年顯慶元年正月辛未立代王𢎞為皇太子壬申大赦改元盡六年二月龍朔元年二月乙未晦以百濟初平又益緜等五州皆言龍見於是改元盡三年麟徳元年正月以絳州麟見於介山含元殿前銀臺閣内並覩麟趾改元盡二年乾封元年正月戊辰朔有事於泰山壬申御朝觀壇受賀大赦改元盡三年二月縂章元年三月明堂成大赦改元盡三年三月咸亨元年三月京師旱大赦改元盡五年七月上元元年八月追尊高祖太宗大赦改元盡三年十月儀鳯元年十一月陳州上言鳳凰見於宛丘縣大赦改元盡四年六月三年四月戊申以旱大赦天下改来年正月一日為通乾元年二月又詔停明年通乾之號以反語不善故也調露元年六月大赦改元盡二年七月永隆元年八月乙丑立英王哲為太子大赦改元盡二年九月開耀元年十月乙丑曲赦定襄軍改元盡二年正月永淳元年二月癸未以皇太子誕皇孫滿月大赦改元盡二年十一月𢎞道元年十二月丁巳大赦改元盡其月中宗以𢎞道元年十二月甲子自皇太子即位明年正月改元嗣聖是年二月則天皇后廢帝為廬陵王立豫王旦大赦改元文明元年其年九月甲寅大赦改元光宅元年二年正月丁未朔以徐敬業平大赦改元垂拱元年五年正月乙卯朔饗祀明堂大赦改為永昌元年二年十一月庚辰朔日南至饗明堂大赦改為載初元年用周正朔以十一月為正月十二月為臘月正月為一月十月為年終其年九月壬午則天革命稱周廢豫王為皇嗣賜姓武大赦改為天授元年三年四月丙申大赦改為如意元年九月庚子大赦改為長夀元年三年五月則天僭號越古金輪聖神皇帝大赦改元為延載元年二年正月辛巳朔則天僭加號慈氏大赦改為證聖元年是年九月甲寅則天加號天册大赦改為天冊萬嵗元年二年三月重造明堂成號為通天宫大赦改為萬嵗通天元年二年九月大享天宫大赦改為神功元年二年正月壬戌大赦改為聖歴元年三年五月癸丑大赦改為乆視元年二年正月丁丑以成州有佛跡見改為大足元年其年十月則天幸長安大赦改為長安元年盡四年神龍元年正月壬午朔大赦改元是月甲戌則天歸政於中宗盡三年八月景龍元年九月庚申御太極殿受神龍皇帝尊號大赦改元盡四年五月温王唐隆元年六月即位大赦改元韋庶人臨朝盡其月遜位于睿宗睿宗景雲元年十月册𤣥宗為皇子是日有景雲之瑞改元盡二年太極元年正月戊子幸滻東親籍田己丑大赦改元盡其年四月延和元年五月戊寅有事于北郊辛巳大赦改元盡其年四月𤣥宗先天元年八月自皇太子受太上皇傳位大赦改元盡二年十一月開元元年十一月上尊號為開元神武皇帝十二月庚寅大赦改元盡二十九年天寳元年正月丁未朔御勤政樓受朝賀大赦改元三年改年為載盡十五載肅宗以天寳十五載七月甲子即位於靈武改元至徳盡二年乾元元年正月乙巳帝於興慶殿奉太上皇尊號曰太上至道大聖皇帝禮畢大赦改元盡三年四月上元元年閏四月己卯御鳴鳳門大赦改元盡其年八月元年九月壬寅制曰欽若昊天定時成嵗春秋五始義在體元惟以紀年更無潤色至于漢武飾以浮華非前王之茂典豈永代而為則三代受命正朔皆殊宗周之王實得天綂陽生元氣之本律首黃鍾之尊制度可存叶用斯在自今已後朕號唯稱皇帝其年號但稱元年上元之號其以今年十一月為嵗首便數建丑建寅每月以所建為數盡其年三月寳應元年四月詔曰上天降寳獻自楚州神明生歴數之符合璧定妖災之氣縂集瑞氣祗承鴻休因以體元叶乎五紀其元年改為寳應元年建巳月為四月依舊以正月一日為嵗首受兹福應佇以升平是月太子即位代宗以寳應元年四月即位二年七月壬寅羣臣上尊號壬子大赦改元為廣徳盡二年永泰元年正月癸巳朔御含元殿受朝賀下制改元盡二年十月大歴元年十一月甲子日長至御含元殿大赦改元盡十四年徳宗以大歴十四年五月即位明年正月丁邜朔御含元殿受朝賀下詔改為建中盡四年興元元年正月癸酉朔御含元殿受朝賀大赦改元盡一年貞元元年正月丁酉朔御含元殿受朝賀大赦改元盡二十一年七月順宗以貞元二十一年正月即位八月庚子傳位於皇太子大赦改元永貞盡其年憲宗以永貞元年八月即位明年正月改元元和元年盡十五年穆宗以元和十五年正月丙午即位明年正月辛丑郊祀禮畢大赦改元為長慶盡四年敬宗以長慶四年正月癸酉即位明年正月辛亥親祀昊天上帝禮畢御丹鳯樓大赦改元寳歴文宗以寳歴二年十二月乙巳即位明年二月乙巳御宣政殿大赦改元太和盡十年開成元年正月辛丑朔帝常服御宣政殿受賀遂大赦改元盡五年武宗以開成五年正月即位明年正月庚戌郊廟禮畢大赦改元㑹昌盡六年宣宗以會昌六年十月即位明年正月戊申郊廟禮畢大赦改元大中盡十三年懿宗以大中十三年八月十三日即位明年十一月丁未郊廟禮畢大赦改元咸通盡十四年僖宗以咸通十四年七月二十日即位明年十一月庚寅郊廟禮畢大赦改元乾符盡七年廣明元年正月帝御宣政殿改元盡二年六月中和元年七月帝至蜀改廣明二年為中和元年議者以去年改元廣明咸謂廣在唐脚之下而有日月非其祥也故至是改曰中和塞浮議焉盡五年二月光啟元年三月丁卯車駕至京師己巳御宣政殿大赦改元識者曰啓字口戴戈亂未息也盡四年正月文徳元年二月戊子御承天門大赦改元盡其年昭宗以文徳元年三月八日即位明年正月御武徳殿受朝賀宣制大赦改元龍紀盡其年大順元年正月戊子朔御武徳殿受朝賀宰臣百官上徽號禮畢大赦改元盡二年景福元年正月丙午朔御武徳殿受朝賀大赦改元盡二年乾寧元年正月乙丑朔御武徳殿受朝賀大赦改元盡五年四月光化元年正月己巳朔以立后改元盡四年二月天復元年三月甲戌有事於宗廟是日御長樂門大赦改元盡四年天祐元年閏四月謁太廟禮畢御光政門大赦改元哀帝以天祐元年八月即位不改元盡四年三月後唐荘宗以天祐二十年四月己巳即位唐自天祐四年禪于梁至是十八年帝在太原只稱天祐改同光二年盡四年明宗以同光四年四月即位改元天成盡四年長興元年二月乙卯祀圜丘禮畢大赦改元盡四年閔帝以長興四年十二月即位明年正月戊寅御明堂殿大赦改元應順盡其年末帝以應順元年四月即位改元清泰盡三年晉高祖以清泰三年十一月即位改元天福盡七年少帝以天福七年六月十三日即位九年七月辛未朔御崇元殿大赦改元開運盡三年是日宣赦未畢㑹大雷雨匆遽而罷都下震死者數百人明徳門内震落石龍之首識者以為石乃國姓蓋不祥之甚漢高祖以開運四年二月即位于晉陽謂羣僚曰帝王稱謂孤已廹於羣情而遜避無所其國號正朔未忍遽改繇是降制以少帝開運四年敘天福十二年行事盖以心奉前朝執至義也盡其年乾祐元年正月乙卯大赦改元盡其年隐帝諱承祐以乾祐元年二月即位初高祖欲改年號中書門下進擬乾和二字高祖改為乾祐至是與帝名相符帝亦不改盡三年周太祖以乾祐四年正月即位改元廣順盡四年顯徳元年春正月乙未祀圜丘禮畢御明徳殿大赦改元世宗以顯徳元年正月丙申即位不改元恭帝以顯徳六年六月甲午即位不改元盡其年册府元龜卷十五
