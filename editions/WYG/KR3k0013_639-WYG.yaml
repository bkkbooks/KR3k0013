body:
  text: 冊府元龜卷六百三十九宋王欽若等撰貢舉部總序三代貢舉之制始于鄉大夫其升于司徒曰秀士升于太學曰俊士升于司馬曰進士然則鄉大夫暨于司馬皆貢舉之官也秦之制無聞焉漢髙祖始詔御史中執法下郡守勸勉賢者詣相國府署行義年文帝詔諸侯王公卿郡守舉賢良能直言極諫者元帝又詔丞相御史舉質樸敦厚遜讓有行又詔列侯舉茂才又舊儀刺史二千石察舉茂才尤異此則漢之諸侯王丞相御史九卿列侯刺史郡守皆有舉士之制而丞相之府實司其事武帝令太常籍博士弟子有秀才異等輙以名聞又光禄勲銓第郎吏嵗舉秀才亷吏此則太常光禄勲别有舉士之制也至成帝初置尚書常侍曹主公卿又置二千石曹掌郡國二千石則尚書主選舉之始也後漢三公將軍光禄勲廷尉司農中二千石司𨽻州牧嵗舉茂才亷吏郡國嵗舉孝亷三公上尚書輙勞其舉將又大學試明經弟子此與西漢之制畧同其後改常侍曹為吏曹亦曰選部又公府西曹主府吏置用東曹主二千石長史選除于時選舉之制於郡國屬功曹於公府屬東西曹於尚書屬吏部而尚書令僕總之魏司空陳羣以為天臺選用不悉人才每郡擇有鑒照者除為中正目狀人才澄汰九品又置州都總其事應璩所謂百郡立中正九州置都士又吳亦有大公平若魏之州都而蜀無聞焉晉宣帝除九品州置大中正大中正之職掌訪問鄉邑考績徳行以定上格下格選平正無禮力貶清議晉令大小中正為内官聴月二㑹議上東門外州及郡國亦舉孝亷秀才其在天臺則吏部州則别駕西曹郡國則功曹主其事宋齊亦如之而宋文帝不欲重權在下故分置二吏部尚書以散其權梁無中正天監中州置州望郡置郡宗鄉置鄉豪各一人専典捜薦無復膏梁寒素之隔普通七年又詔州郡嵗舉人敬帝復令諸州各置中正選舉皆中正押上然後量試不然則否陳亦如之後魏州郡皆有中正掌選舉每以季月與吏部銓擇可否其秀才對䇿居中上表敘之崔浩為冀州大中正薦冀定相幽并五州士數十人各起家為郡守自太和以前精選中正徳髙鄉國者充之其邊州小郡人物單𦕈者則併附佗州其在僻陋則闕而不置當時稱為簡當頗曰得人及宣武孝明之時州無大小必置中正既不可悉得其人故有蕃落庸鄙操銓覈之權而選敘頽紊正始初乃罷諸郡中正而吏部之職皆如往制北齊選舉亦㳂後魏凡州縣皆置中正中書䇿秀才集書䇿貢士考功䇿亷良天子常服乘輿坐朝堂中楹秀孝各以班草對字有脱誤者呼起立席後事有濫劣者飲墨水一升文理孟浪者奪席脱容刀孝昭帝孝建二年詔内外執事官每三年之内各舉一人居白屋巾褐未釋亦舉之後周初蘇綽為六條詔書其四曰擢賢良懲魏齊之失罷門資之制其所察舉頗加精慎武帝平齊詔山東縣舉明經幹理宣帝亦詔州舉髙才博學者為秀才郡舉經明行修者為孝亷依六官之制建吏部中大夫掌選舉小吏部下大夫一人以貳之隋開皇七年制諸州嵗貢士十八年又詔京官五品已上總管刺史以主行修謹清平幹濟二科舉人皆吏部主之初漢魏之郡佐史皆刺史二千石辟署北齊多繇中用故州郡辟士之權移於朝廷後周復遵古制及隋皆歸吏部故朝廷貢舉之制盛矣唐循隋制諸郡貢士常貢之科有秀才有明經有進士有明法有明書有明筭自京師崇文舘國子監郡縣皆有學焉每嵗仲冬國子郡縣課試其成者長吏㑹屬僚設賓主陳俎豆備管弦牲用少牢行鄉飲酒歌鹿鳴之詩徴耆艾敘少長而觀焉就餞而與計偕其不在學而舉者謂之鄉貢至尚書省始繇户部集閲而闗於考功課試可者為第武徳舊制以考功郎中監試貢舉貞觀已後則考功員外郎専掌之武后載初元年䇿問貢舉人于雒城殿前試貢舉人自此而始長安二年又教人習武藝每嵗如明經進士之法行鄉飲酒之禮送于兵部明皇開元二十四年制令禮部侍郎專掌貢舉初因考功員外李昻詆訶進士李權文章大為權所凌訐朝議以郎官地輕故移於禮部又詔應試進士等唱第訖具所試送中書門下詳覆是年始置禮部貢舉印其後禮部侍郎闕人亦以佗官主之謂之權知貢舉其知貢舉者皆朝廷美選二十九年京師又置宗𤣥舘諸州置道學生有差道學生謂之道舉課試與明經同先是掌貢舉官親族皆於禮部差郎官考試有及第者尚書覆定及第者仍别奏謂之奏移送吏部令考功員外試練侍郎覆定及第者仍别奏謂之别頭舉人代宗永泰元年始置兩都貢舉禮部侍郎官號皆以兩都為名每嵗兩地别所及第至大厯十一年停東都貢舉徳宗貞元十六年又罷别頭舉人文宗太和元年又權於東都置貢舉又有制詔舉人皆摽其目而搜揚之志烈秋霜詞殫文律抱器懷能茂才異等才膺管樂道侔伊召賢良方正軍謀宏逺明於體用逹於吏理之類始於顯慶盛於開元貞元皆試於殿廷乘輿親臨觀之試已糊其名於中考之䇿髙者特授美官其次與出身又有吏部科目曰宏詞㧞萃平判官皆吏部主之又有三禮三傳三史五經九經開元禮等科有官階出身者吏部主之白身者禮部主之其吏部科目禮部貢舉皆各有考官大抵銓選屬吏部貢舉屬禮部崇文舘生屬門下省國子學生屬國子監州府鄉貢屬長官職司在功曹司功五代因之夫以賢為寳得士者昌聖賢之談邦國之制也貢舉之設王政攸先方冊所傳舊章不墜或有公直以馳譽精識以知名不狥乎朋家咸求乎藝實故能若水鑒之皦衡石之平増臺閣之輝副文儒之望亦有昧於逺體拘乎小節或鄭雅而靡辨或涇渭而共流以公器而狥私恩採虚聲而損至學俾白駒以興刺使嘉魚而絶詠斯為蠧政良足憤惋今乃紀善惡之迹著得失之效用為勸沮以示方來凡貢舉部七門條制夫郷舉里選辨論官材盖成周之制也所以洽烝髦之詠成思皇之美藹藹而多吉士焉及諸侯力政家邦異俗歛才之道閴而無聞漢室龍興首議聘士其後増設科目詳延英彦至乃限郡國以所舉之數威守相以蔽賢之罰馳單車以博訪詔有位以薦能計偕續食既優其待遇署職補吏復著於品式課試之典亦増損之有殊年族之制固因革之斯異稽於前志咸用論次以為貢籍故事云周官大司徒職教萬民而賓興之一曰六徳二曰六行三曰六藝詩書禮樂謂之四術四術既修九年大成凡士之有善鄉先論士之秀者升諸司徒曰選士司徒論選士之秀者而升諸學曰俊士既升而不征者曰造士大樂正論造士之秀升諸司馬曰進士司馬論進士之賢者及鄉老郡吏以賢能之書皆獻於王登於天府蔵於祖廟内史書其貳而行焉書其貳謂冩其副本在其職也則鄉老鄉大夫舉賢能而賓其禮司徒教三物而興諸學司馬辨官材以定其論太宰詔廢置而持其柄内史贊予奪而貳於中司士掌其版而知其數論定然後官之任官然後爵之位定然後禄之盖擇材取士如此之詳也漢髙帝十一年二月下詔曰賢士大夫既與我定有天下而不與吾共安利之可乎有肯從我逰者吾能尊顯之以布告天下御史中執法下郡守其有稱意明徳者必身勸為之駕有賢者郡守身自往勸勉令至京師駕車遣之遣詣相國府署行義年行狀年紀也有而弗言覺免年老癃病勿遣恵帝四年正月詔舉人孝悌力田者復其身武帝建元元年十月詔天下舉賢良方正直言極諫之士其理申商韓非蘇秦張儀之言亂國政皆罷之申商韓非刑名之學蘇張縱横之説竝不用也元光元年十一月舉賢良董仲舒對策請令諸侯列卿郡守二千石各擇其吏人之賢者嵗貢各二人以給宿衛且以觀大臣之能所貢賢者有賞不肖者有罰夫如是諸侯吏二千石皆盡心於求賢天下之士可得而官使也授之以官以使其材也無以日月為功實試賢能為上量材而授官録徳而定位録謂存録也則亷恥殊路賢不肖異處矣帝因是令郡國舉孝亷各一人孝者善事父母者也亷謂清潔有㢘隅者也五年詔徴吏民有明當代之務習先聖之術者縣次續飡令與計偕計者上計簿使也郡國每嵗遣詣京師上之偕者俱也令所徵之人與上計者俱來而縣次給之食也元朔元年十一月詔曰公卿大夫所使總方畧一統類廣教化美風俗也夫本仁祖義褒徳録賢勸善刑暴五帝三王所繇昌也朕夙興夜寐嘉與宇内之士臻於斯路故旅耆老加恵於耆老之人若賓旅也復孝敬選豪俊講文學稽叅政事祈進民心深詔執事興亷舉孝庶幾成風紹休聖緒夫十室之邑必有忠信三人竝行厥有我師今或至闔郡而不薦一人是化不下究而積行君子壅於上聞也二千石官長紀綱人倫將何以佐朕燭幽隐勸元元厲蒸庶崇鄉黨之訓哉且進賢受上賞蔽賢蒙顯戮古之道也其與中二千石禮官博士議不舉者罪有司奏議曰古者諸侯貢士一適謂之好徳再適謂之賢賢三適謂之有功乃加九錫不貢士一則黜爵再則黜地三則黜爵地畢矣夫附下罔上者死附上罔下者刑與聞國政而無益於民者斥在上位而不能進賢者退此所以勸善黜惡也今詔書昭先帝聖緒令二千石舉孝亷所以化元元移風易俗也不舉孝不奉詔當以不敬論不察亷不勝任也當免奏可凡郡國之官非傅相其他既自置置又調屬僚及部人賢者舉為秀才亷吏而貢於王庭多拜為郎居三署無常員或至千人屬光禄勲故鄉校牧守居閑待詔或郡國貢選公車徴起悉在焉光禄勲復於三署中銓第郎吏嵗舉秀才亷吏出為佗官以補缺員五年六月公孫𢎞以儒術為丞相天下之學士靡然向風時太常孔臧等議曰請為博士官置弟子五十人復其身太常擇民年十八以上儀狀端正者補博士弟子郡國縣道邑有好文學敬長上肅政教順鄉里出入不悖所聞令相長丞上屬所二千石謹察可者與訃偕詣太常得受業如弟子一嵗皆課能通一藝以上補文學掌故缺其髙第可以為郎中太常籍奏即有秀才異等輙以名聞其不事學若下材及不能通一藝罷之而請諸能稱焉孝昭始元初遣故廷尉王平等五人前為此官今不居官皆謂之故持節行郡國舉賢良後漢光武十二年詔三公舉茂才各一人監御史司𨽻州牧嵗舉茂才各一人章帝建初元年詔曰夫鄉舉里選必累功勞今刺史守相不明真偽茂才孝亷嵗以百數漢曰秀才後漢避光武諱故曰茂才魏復曰秀才既非能者而當授之政事甚無謂也每尋前代舉人貢士或起畎畝不繫閥閲敷奏以言則文章可採明試以功則理有異迹文質彬彬朕甚嘉之始復用前漢丞相故事以四科辟士武帝因董仲舒之言立制故事在丞相府今復用之第一科補西曹南閣祭酒二科補儀曹三科補四辟八表四科補賊曹凡所舉士先試之以職乃得充選其徳行尤異不宜試職者疏於佗狀舉非其人兼不舉者罪和帝時大郡口五六十萬舉孝亷二人小郡二十萬并有蠻夷者亦舉二人帝以為不均下公卿會議司徒丁鴻司空劉方上言凡口率之科宜有偕品蠻夷雜錯不得為數自今郡國率二十萬口嵗舉孝亷一人四十萬二人六十萬三人八十萬四人百萬五人百二十萬六人不滿二十萬二嵗一人不滿十萬三嵗一人帝從之又制縁邊郡口十萬以上嵗舉孝亷一人不滿十萬二嵗舉一人五萬以下三嵗一人永元十四年司空徐防上疏曰臣以為博士及甲乙試䇿宜從其家章句開五十難以試之解釋多者為上第引文明者為髙説若不依先師義有相伐伐謂自相攻伐也皆正以為非五經各取上第六人論語不宜射䇿雖所失或久差可矯革東觀記防上疏曰試論語本文章句粗通度物以射䇿兾令學者務本有所一心専精師門思核經意事得其實道得其真於此𢎞廣經術尊崇聖業有益於化雖從來久大經衰㣲學問蹇淺誠宜反本以矯其失詔書下公卿皆從防言安帝永初二年九月詔居鄉里有亷清孝順之稱才任理人者國相嵗移名與計偕上尚書公府通調令得外補順帝永建六年七月以太學新成試明經下第者補弟子増甲乙科員各十人除郡國耆儒九十人補舍人九月初令郡國舉孝亷限年四十以上諸生通章句文史能牋奏乃得應選其有茂才異行若顔淵子竒不拘年齒時尚書左雄上言郡國孝亷古之貢士則宰民宣恊風教若有面牆則無所施用孔子曰四十不惑禮稱强仕請自今孝亷年不滿四十不得察舉皆先詣公府諸生試家法文吏課牋奏副之端門練其虚實以觀異能以美風俗有不承科令者正其罪法若有茂才異行若顔淵子竒自可不拘年齒帝從之於是班下郡國又云尚書僕射胡廣以雄議改察舉之制限年四十以上儒者試經學文吏試章奏與尚書史敞郭䖍奏駁曰選舉因才無拘定制漢承周秦兼覽殷夏祖徳師經叅雜伯􅁤聖主賢臣世以制理貢舉之制莫或因革今以一臣之言剗奏舊章利便未明衆心莫厭愚以為可宣下百官叅其同異帝不從尚書令黄瓊又以雄所上孝亷之選専用儒學文吏於取士之義猶有所遺乃奏増孝弟及能從政者為四科事竟施行桓帝建和元年詔諸學生年十六以上比郡國明經試次第上名髙第十五人上第十六人為郎中中第十七名為太子舍人下第十七人為王家郎永夀二年詔復課試諸生補郎舍人其後復制學生滿二嵗試通二經者補文學掌故其不能通二經者湏後試復隨軰試試通一經者亦得為文學掌故考滿二嵗試能通三經者擢其髙第為太子舍人其不得第者後試復隨軰試第復髙者亦得為太子舍人己為太子舍人滿二嵗能通四經者擢其髙第為郎中其不得第者後試復隨軰試第復髙者亦得為郎中滿二嵗試能通五經者擢其髙第補吏隨才而用其不得第者後試復髙亦得補吏魏文帝黄初二年正月初令郡國口滿十萬者嵗察孝亷一人其有秀異無拘户口三府議舉孝亷本以徳行不復限以試經司徒華歆以為䘮亂以來六籍墜廢當務存立以崇王道夫制法者所以經盛衰今聴孝亷不以經試恐學業遂從此而廢若有秀異可特徴用患於無其人何患不得哉帝從其言又魏郡潁川典農中郎將裴潜奏通貢舉比之郡國繇是農官進仕路泰三年正月詔曰今之計考古之貢士也十室之邑必有忠信若限年然後取士是吕尚周晉不顯於前世也其令郡國所選勿拘老幼儒通經術吏逹文法到皆試用有司糾正不以實者明帝太和四年二月詔曰世之質文隨教而變兵亂以來經學廢絶後生進趣不繇典謨豈訓導未洽將進用者不以徳顯乎其郎吏學通一經才任牧民博士課試擢其髙第者亟一用其浮華不務道本者皆罷退之晉元帝初制揚州嵗舉二人諸州各一人先是以兵亂務存慰悦逺方孝秀到不䇿試普皆除署至是帝申明舊制皆令試經有不中舉者制刺史太守免官大興三年秀孝多不敢行其有到者竝託疾帝欲除署孝亷而秀才如前制尚書郎孔坦奏議曰臣聞經邦建國教學為先移風崇化莫尚斯矣古者且耕且學三年而通一經以平康之世猶假漸漬積以日月自䘮亂以來十有餘年干戈載揚俎豆禮戢家廢講誦國闕庠序率爾責試竊以為疑然宣下以來渉歴三載累遇慶㑹遂未一試揚州諸郡接近京都懼累其君父多不敢行其逺州邊郡掩誣朝廷冀於不試冐昧來赴既到審試遂不敢會臣愚以不㑹與不行其為闕也同若當徧加除署是為肅法奉憲者失分僥倖投射者得官頽風傷教懼於是始夫王言如絲其出如綸臨事改制示短天下人聴有惑臣竊惜之愚以王命無二憲制宜信去年察舉一皆試䇿如不能試言不拘到遣歸不署又秀才雖以試䇿亦記問經義茍所未學實難闇通不足復曲碎乖例違舊造異謂因其不㑹徐更革制可申明前下崇修學校普延五年以展講習鈞法齊訓示人軌則夫信之與法為政之綱施之家室猶弗可二况經國之典而可翫黷乎帝納焉聴孝亷申至七年秀才如故宋制丹陽吳郡會稽吳興四郡嵗舉二人餘郡各一人凡州秀才郡孝亷至皆䇿試天子或親臨之及公卿所舉皆屬于吏部序才銓用凡舉得失各有賞罰失者其人宜加禁錮年月多少隨辜議制晉末諸州郡所遣秀才孝亷多非其人髙祖作相表天子申明舊制依舊䇿試文帝元嘉中限年三十而仕孝武即位仕者不復拘老幼明帝泰始三年都令史駱宰議䇿秀孝格五問竝得為上四三為中二為下一不合與第尚書郎謝超宗議以為片辭折獄寸言挫衆魯史褒貶孔論興言皆無俟繁而後秉裁夫表事之淵析理之㑹豈必委牘方切治道非患對不盡問患以常文弗竒必使一通峻正寜劣五通而常與其俱竒一亦宜採詔從宰議南齊習宋代限年之制然而鄉舉里選不覈才徳其所進取以官婚胄籍為先遂令甲族以二十登仕後門以三十試吏故有増年矯貌以圖進者其時士人皆厚結姻援奔馳造請浸以成俗和帝時梁髙祖為相上表曰聞中間立格甲族以二十登仕後門以過立試吏求之愚懐抑有未逹何者設官分職惟才是務若限嵗登朝必増年就官故貌實幼童籍已踰立滓穢名教於斯為甚詔依表施行梁初無中正制年二十有五方得入仕天監四年正月詔曰今九流常選年未三十不通一經不得解褐若有才同甘顔勿限年次五年正月詔曰在昔周漢取士方國頃代彫訛幽仄罕被人孤地絶用隔聴覽士操淪胥因茲靡勸豈其嶽瀆縱靈偏有厚薄實繇知與不知用與不用耳朕以菲徳君此兆民而兼明廣炤屈於當户飛耳長目不及四方永言愧懐無忘旦夕凡諸郡國舊族邦内無在朝位選官捜括使郡有一人七年二月詔於州郡縣置州望郡宗鄉豪各一人専掌捜薦八年五月詔曰學以從政殷勸往哲禄在其中抑亦前事朕思闡治綱每敦儒術輔閭闢舘造次以之故負褒成風甲科間出方當置諸周行飾以青紫其有能通一經始末無倦者策貫之後選可量加敘録雖復牛監羊肆寒品後門竝隨才試吏勿有遺隔陳依梁制凡年未三十不得入仕唯經學生䇿試得第諸州迎主簿西曹左奏及常為挽郎得未壯而仕諸郡惟正王為丹陽尹經迎得出身者亦然庶姓尹則否有髙才異行殊勲别降恩㫖敘用者不在常例後魏孝文延興二年六月詔頃者州郡選貢多不以實碩人所以窮處幽仄鄙夫所以超分妄進豈所謂旌賢樹徳者也近年貢舉尤為猥濫自今年貢舉所遣皆須盡州郡之髙才極鄉閭之俊選太和十五年八月詔諸州舉秀孝先盡才學宣武詔庶族子弟年未十五不聽入仕封軌為考功郎中奏請遣四門博士明經學者簡試諸州學生詔從之孝明熈平元年初聴秀才對䇿第居中上敘之荘帝初詔求徳行文藝政事强直者縣令郡守刺史皆敘其志業且以表聞待三人以上縣令太守刺史賞一階舉非其人者黜一階北齊選舉多沿後魏之制其課試之法中書䇿秀才集書䇿考貢士考功郎中䇿亷良天子常服乘輿出坐於朝堂中楹秀孝各以班草對字有脱誤者呼起立席後書有濫劣者飲墨水一升文理孟浪者奪席脱容刀後周文帝霸府時蘇綽為六條詔書其四曰擢賢良綽深思本始懲魏齊之失罷門資之制其所察頗加精慎武帝建徳六年七月詔山東諸州舉有才者上縣六人中縣五人下縣四人赴行在所共論政理得失九月詔東土諸州儒生明一經已上竝舉送那郡以禮發遣宣帝宣政元年八月詔制九條宣下郡州其八曰州舉髙才博學者為秀才郡舉經明行修者為孝亷上州上郡嵗三人下州下郡嵗一人隋文帝開皇七年正月制諸州嵗貢三人十六年六月制工商不得進仕十八年八月詔京官五品以上及總管刺史竝以志行修謹清平幹濟二科舉人唐貢士之法多循隋制上郡嵗三人中郡二人下郡一人有才能者無常數其常貢之科有秀才有明經有進士有明法有書有算自京師郡縣皆有學焉每嵗仲冬郡縣舘監課試其成者長吏㑹屬僚設賓主陳俎豆備管弦牲用少牢行鄉飲酒禮歌鹿鳴之詩徴耆艾敘少長而觀焉既餞而與計偕其不在舘學而舉者謂之鄉貢舊令諸郡雖一二三人之限而實無常數到尚書省給繇户部集閲而闗于考功課試可者為第初秀才科第最髙試方畧䇿五條有上上上中上下中上凡四等貞觀中有舉而不第者坐其州長繇是廢絶自是士族所趨嚮惟明經進士二科而已其初止試䇿貞觀八年詔加進士試讀經史一部開元二十四年以後復有秀才舉其時以進士漸難而秀才本科無貼經及雜文之限反易於進士主司以其科廢久不欲収奨應者多落之三十年來無登第者至天寳初禮部侍郎韋陟始奏請有堪此舉者乃令官長時考其常年舉送者竝停九年五月二十日勅自今已後明經兼習周禮若儀禮者於本色内量減一選髙宗上元二年正月勅明經加試老子䇿二條進士加試帖三條儀鳳三年五月勅自今已後道經孝經竝為上經貢舉人竝湏兼通其餘經及論語任依常式調露二年四月劉思立除考功員外郎先時進士但試策而已思立以其膚淺奏請帖經及試雜文自後因以為常永隆二年八月詔曰學者立身之本文者經國之資豈可假以虚名必湏徴其實效如聞明經射䇿不讀正經抄撮義條纔有數卷進士不尋史傳惟誦舊䇿共相模擬本無實才所司考試之日曽不簡練因循舊例以分數為限至於不辨章句未渉文者以人數未充皆聴及第其中亦有明經學業該深者惟許通六進士文理華贍者竟無甲科銓綜藝能遂無優劣試官又加顔面或容假手更相嘱請莫憚糾繩繇是僥倖路開文儒漸廢興亷舉孝因此失人簡賢任能無方可致自今已後考功試人明經試帖取十帖得六已上者進士試雜文兩首識文律者然後竝令試䇿仍嚴加捉搦必材藝灼然合昇髙第者竝即依令其明法并書算貢舉人亦量准此例即為常式永淳二年三月初令應詔舉人竝試䇿三道即為永例則天載初元年二月十四日試貢舉人于洛城殿前數日畢殿前試人自茲始也長夀二年二月令貢舉人習則天所撰臣軌停通老子道徳經十月左拾遺劉承慶上疏曰伏見比年已來天下諸州所貢物至元日皆陳在御前惟貢人獨於朝堂拜列但孝亷秀異國之英才既隨方物以充嵗貢宜同珍幣列見王庭豈得金帛羽毛昇於玉陛之下賢良文學棄彼金門之外恐所謂貴財而賤義重物而輕人甚不副陛下好道之心尊賢之意伏請貢舉人至元日引見列在方物之前以播充庭之禮從之長安二年正月初令天下諸州有練習武藝者每年准明經進士例舉送中宗神龍二年二月制貢舉人停習臣軌依舊習老子𤣥宗開元六年二月制曰我國家敦古質斷浮豔禮樂詩書是𢎞文徳綺羅珠翠深革弊風必使情見於詞不用言浮於行比來選人試判舉人對策剖析案牘敷陳奏議多不切事宜廣張華飾何大雅之不足而小能之是􅃷自今已後不得更然七年三月制曰孝經者徳教所先自頃已來獨宗鄭氏孔氏遺㫖今則無聞又子夏易傳近無習者輔嗣注者亦甚甄明諸家所傳互有得失獨據一説能無短長其令儒官詳定所長令明經者習讀若將理等亦可兼行其習易者兼帖子夏易傳共為一部亦詳其可否奏聞五月太子左庶子劉子𤣥奏孝經註請廢鄭依孔老子注請停河上公行王輔嗣易傳非子夏所造禮部奏議請准令式孝經鄭註與孔傳依舊俱行子夏易傳無益後學不可將帖正經勑曰朕以全經道䘮大義久乖淳感之性浸㣲流遁之原未息是用旁求廢簡逺及缺文欲使發揮異説同歸善道永惟一致之用以開百行之端間者諸儒所傳頗乖通義敦孔學者兾鄭門之息滅尚今文者指古傳為誣偽豈朝廷竝列書府以廣儒術之心乎况孔鄭大宗固多殊趣諸生㑹議曽無所申而推求小疵其細已甚聚訟之訛人無則焉其何鄭二家可令仍舊行用王孔所註傳習者希宜存繼絶之典頗加奨飾子夏𫝊逸篇既廣前令帖易者停八年七月國子司業李元瓘上言三禮三𫝊及毛詩尚書周易等竝聖賢㣲㫖生徒教業必事資經逺則斯道不墜今明經所習務在出身咸以禮記文少人皆諳讀周禮經邦之軌則儀禮荘敬之楷模公羊榖梁厯代宗習今兩監及州縣以獨學無友四經殆絶既事資訓誘不可因循其學生望請各量配作業并貢人預試之日習周禮儀禮公羊榖梁竝請帖十通五許其入䇿以此開勸即望四海均習九經該備從之十六年十二月二十四日國子祭酒楊㻛奏今之舉明經者主司不詳其述作之意每至帖試必取年頭年月孤經絶句自今已後考試者盡帖平文以存大典又曰今之明經習左氏者十無一二恐左氏之學廢又周禮儀禮公羊穀梁亦請量加優奨遂下制明經習左氏及通周禮等四經者出身免任散官十七年三月國子祭酒楊㻛上言曰伏聞承前之例每年應舉常有千數及第兩監不過一二十人臣恐三千學徒虚費官廪兩監博士濫靡天禄臣竊見入仕諸色出身每嵗向二千餘人方於明經進士多十餘倍自然服勤道業之士不及胥吏以之效官豈識先王之禮義陛下設學校務以勸進之有司為限約務以黜退之臣之㣲誠實所未曉今監司課試十已退其八九至及第十又不収一二若長以此為限恐儒風漸墜小道將興若以出身人多應須諸色都减豈在獨抑明經進士也帝然之二十一年御注老子成詔天下每嵗貢士減尚書論語䇿而加老子焉二十二年三月制曰博學多才道術醫藥舉人等先令所司表薦兼自聞逹勅限以滿湏加考試博學多才舉人限今年四月内集道術醫藥舉人限閏三月内集其博學科試明三經兩史已上帖試稍通者多才科試經國商畧大䇿三道并試雜文三道取其詞氣髙者道術醫藥舉取藝業優長試練有效者宜令所繇依節限處分二十三年十月制曰文學政事必在考言孝悌力田必湏審行頃從一概何謂四科其孝悌力田舉人宜各自疏比來事迹為鄉閭所委者朕當案覆别有處分二十四年三月制曰每嵗舉人求士之本専典其事寧不重歟頃年以來惟考功郎所職位輕務重名實不倫欲盡委長官又銓選猥積且六官之列體骨是同况宗伯掌禮宜主賓薦自今已後每嵗諸色舉人及齋郎等簡試竝於禮部集既衆務煩雜仍委侍郎専知二十五年正月制曰致理興化必在得賢强識博聞可以從政且今之明經進士則古之孝亷秀才近日以來殊乖本意進士以聲韻為學多昧古今明經以帖誦為功罕窮㫖趣安得為敦本復古經明行修以此登科非選士取賢之道也其明經自今已後每經宜帖十取通五已上免舊試一帖仍案問大義十條取通六已上免試經䇿十條令答時務䇿三首取粗有文性者與及第其進士宜停小經准明經例帖大經十帖取通四已上然後准例試雜文及䇿考通與及第其明經中有明五經以上試無不通者進士中兼有精通一史能試䇿十條得六已上者委所司奏聴進止其應試進士等唱第訖具所試雜文及䇿送中書門下詳覆其所問明經大義日仍須對同舉人考試庶能否共知取舍無媿有功者逹可不勉與此詔因侍郎姚奕奏也二十六年正月丁丑制曰古者鄉有序黨有塾将以𢎞長儒教誘進學徒化人成俗率繇於是斯道久廢朕用憫焉宜令天下州縣每一鄉之内里别各置學仍擇師資令其教授其諸州鄉貢明經進士每年引見訖更令國子監謁先師所司設食學官等為之開講質問疑義且公侯之緒皆禀義方學禮聞詩不應失墜容其徼倖是長慢游如聞比來𢎞文崇文學生縁是貴胄子孫多有不専經業便與及第深謂不然自今已後宜一依令式試壬辰詔曰孝悌力田風化之本茍有其實未必求名比年将同舉人考試詞䇿便與及第以常為科是開僥倖之門殊乖敦勸之意自今已後不得更然其兼著狀迹殊尤者委所繇長官時以名薦朕當别有處分更不湏隨考使例申送二十九年正月於京師置崇𤣥舘諸州置道學生徒有差京都各百人諸州無常員習老荘文列謂之四子䕃第與國子監同謂之道舉舉送課試與明經同凡舉司課試之法帖經者以所習經掩其兩端中間惟開一行裁紙為帖凡帖三子隨時増損可否不一或得四得五得六者為通後舉人積多故其法益難務欲落之至有帖孤章絶句疑似參互者以惑之甚者或上抵其注下餘一二字使尋之難知謂之例援既甚難矣而舉人則有注聫孤絶索幽隐為詩賦而誦習之不過十數篇則難者悉詳矣其於平文大義或多牆面焉冊府元龜卷六百三十九
