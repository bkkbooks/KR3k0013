body:
  text: 册府元龜卷八百七十七宋王欽若等撰總録部方正剛方正夫言必先信行必中正非義不茍合臨難不茍免居之有常死而後已斯方正之士也三代而下世道交䘮在公寡秉彛之臣居鄉乏不貳之老故其負特立之操者必出其類而有聞乎時焉自尼父之生於周末厯聘不遇未嘗枉尺以全其道由是之後賢英繼武乃有危言髙論㒺念媮合直躬守節不屈當塗遇事肆于劇談處衆持於正色意或小忤投劾而徑歸志之所存擯死而無變以至神姦屏伏頓消乎氣燄兇逆嚴憚為弭於雄稜斯蓋稟五行之秀為萬夫之特純一耿介潔白貞固中立不倚確乎其有常徳者歟孔子過衛衛大夫王孫賈問曰與其媚於奥寧媚於竈何謂也子曰不然獲罪於天無所禱也澹臺滅明魯人事孔子既受業退而修行不由徑非公事不見卿大夫柳下惠為魯士師士師典獄之官三黜人曰子未可以去乎曰直道而事人焉往而不三黜茍直道而事人所至之國俱當復三黜枉道而事人何必去父母之邦田子方魏文侯之師也文侯之子子撃逢子方於朝歌引車避下謁田子方不為禮子撃因問曰富貴者驕人乎且貧賤者驕人乎子方曰亦貧賤者驕人爾夫諸侯而驕人則失其國大夫而驕人則失其家貧賤者行不合言不用則去之楚越若脱蹝然奈何其同之㢤子撃不懌而去漢轅固齊人也以治詩孝景時為博士後為清河太傅免武帝初即位後以賢良徵諸儒多嫉之曰固老罷歸之時已九十餘矣公孫𢎞亦微仄目而視固固曰公孫子務正學以言無曲學以阿世辛茂為水衡都尉慶忌之子也其兄通為䕶羗校尉遵為函門門都尉皆有將帥之風元始中安漢公王莽秉政見慶忌本大將軍鳳所成三子皆能欲親厚之是時莽方立威柄用甄豐甄邯以自助豐邯新貴威震朝廷茂自負名臣子孫兄弟並列不甚屈事兩甄後漢賈復字君文南陽冠軍人也封膠東侯加位特進復為人剛毅方直多大節申屠剛字巨卿扶風人性剛直忠正志節􅎨厲後為大中大夫以病去官卒范滂字孟博汝南征羗人也太守宗資署為功曹後牢循誣言鈎黨鉤引也滂坐黄門北寺獄獄吏謂曰凡坐繋皆祭臯陶滂曰臯陶賢者古之直臣知滂無罪將理之於帝謂天帝也如其有罪祭之何益衆人亦止太原閔貢字仲叔建武中應司徒侯霸之辟既至覇不及政事徒勞苦而已仲叔恨曰始蒙嘉命且喜且懼今見眀公喜懼皆去以仲叔為不足問耶不當辟也辟而不問是失人也遂辭出投劾而去案罪曰劾自受其劾伏而去也投猶下也今有投辭投牒之言也蓋勲為潁川太守徵還京時河南尹朱雋為董卓陳軍事卓折雋曰我百戰百勝决之於心卿勿妄説且汙我耳勲曰昔武丁之眀猶求箴諫况如卿者而欲杜人之口乎卓曰戲之耳勲曰不聞怒言可以為戲卓乃謝雋仇覽字季智陳留考城人也初入太學時諸生同郡符融有髙名與覽比宇賓客盈室覽常自守不與融言融觀其容止心獨奇之乃謂曰與先生同郡壌鄰房牖今亰師英雄四集志士交結之秋雖務經學守之何固覽乃正色曰天子脩設太學豈但使人游談其中髙揖而去不復與言後徵方正遇疾而卒公沙穆字文乂北海膠東人居建成山中依林阻為室獨宿無侣時暴風震雷有聲於外呼穆者三穆不與語有頃呼者自牖而入音狀甚怪穆誦經自若終亦無他妖異時人奇之終卒為遼東屬郡都尉趙昱字元逹琅耶人清已疾惡濳志好學雖親友希得見之為人耳不邪聼目不妄視太僕种拂舉為方正魏張承河内脩武人也與兄範避地揚州袁術僃禮招請範稱疾不往術不彊屈也遣承與相見術問曰昔周室陵遲則有桓文之霸秦失其政漢接而用之今孤以土地之廣士民之衆欲徼福齊桓擬迹髙祖何如承對曰在徳不在彊夫能用徳以同天下之欲雖由匹夫之資而興霸王之功不足為難若茍僭擬干時而動衆之所棄誰能與之術不悦是時太祖將征冀州術復問曰今曹公欲以弊兵數千敵十萬之衆可謂不量力矣子以為何如承乃曰漢徳既衰天命未改今曹公挾天子以令天下雖敵百萬之衆可也術作色不懌承去之後魏武定冀州遣使迎範以疾留彭城遣承詣太祖太祖表為諫議大夫杜恕畿之子也少與馮翊李豐俱隨父任摠角相善及各成人豐砥礪名行以要世譽而恕誕節直意與豐殊趣豐竟馳名一時京師之士多為之游説而當路者或以豐名過其實而恕被褐懐玉也由此為豐所不善恕亦任其自然不力行以合時豐已顯任朝廷恕猶居家眀帝以恕大臣子擢拜散騎侍郎數月轉補黄門侍郎常林為太常晉宣王以林鄉邑耆徳每為之拜或謂林曰司馬公貴重君宜止之林曰司馬公自欲敦長幼之叙為後生之法貴非吾之所畏拜非吾之所制也言者踧踖而退初林少與司馬京兆善太傅每見林輙欲跪林止之曰公尊貴矣上也及司徒缺太傅有意欲以林補之徐璆字孟玉廣陵人少履清爽立朝正色晉樂廣為河南尹先是河南官舎多妖怪前尹皆不敢處正寝廣居之不疑嘗外户自閉左右皆驚廣獨自若顧見墻有孔使人掘墻得貍而殺之其怪亦絶陳夀字承祚巴西安漢人少好學師事同郡譙周仕蜀為觀閣令史宦人黄皓專弄威權大臣皆曲意附之夀獨不為之屈由是屢被譴黜謝鯤字幼輿陳國陽夏人也為東海王越恭軍事謝病去職避地豫章嘗行經空亭中夜宿此亭舊每殺人將曉有黄衣人呼鯤字令開户鯤憺然無懼色便于窓中度手牽之髀斷視之鹿也尋血獲焉爾後此亭無復妖怪宋臧燾字徳仁東莞莒人也初從髙祖平亰邑桓𤣥奔走髙祖使燾入宫收圗書器物封閉府庫有金飾樂器髙祖問燾卿得無欲此乎燾正色曰皇上幽逼播越非所將軍首建大義劬勞王家燾雖復不肖無情于樂髙祖笑曰聊以戲卿爾永初三年為光禄大夫卒蔡興宗為征西將軍荆州刺史被徵還都時右軍將軍王道隆任叅内政權重一時躡履到興宗前不敢就席良久方去竟不呼坐元嘉初中書舎人狄當詣太子詹事王曇首不敢坐其後中書舎人𢎞興宗為太宗所愛遇帝謂曰卿欲作士人得就王球坐為吏部尚書乃當判爾殷劉殷景仁為尚書僕射劉湛為領軍將軍並執重權並雜無所益也若往詣球可稱㫖就席及至球舉扇曰君不得爾宏還依事啓聞帝曰我便無如此何至是興宗復爾道隆等以興宗彊正不欲使擁兵上疏改為中書監孔季恭為吳興太守加冠軍先是吳興頻䘮太守云項羽神為卞山王居郡㕔事二千石常避之季恭居㕔事竟無害也南齊蔡約為司徒左長史髙祖為録尚書輔政百僚脱履到席約躡履不改帝謂江祏曰蔡氏故是禮度之門故自可悦祏曰大將軍有揖客復見于今梁劉㲄字仲寳晉丹陽尹真長七世孫也少方正有器局何遠為東陽太守為受罰者所謗坐免歸遠性耿介無私曲居人間絶請謁不造詣與貴賤書疏抗禮如一其所㑹遇未嘗以顔色下人以此多為俗士所疾惡其清公實為天下第一居郡數見可欲終不變其心妻子饑寒如下貧者及去東陽歸家經年歳口不言榮辱士類益以此多之傅昭為安成内史安成自宋以来兵亂郡舎號凶及昭為郡郡内人夜夢見兵馬鎧甲甚盛又聞有人云當避善人軍衆騰虛而逝夢者驚起俄而疾風暴雨倐忽便至數間屋俱倒即夢者所見軍馬踐踏之所也自後郡舎遂安咸以昭正直所致陳徐孝克東海郯人也禎眀元年入為都官尚書自晉以来尚書官僚皆擕家屬居省省在臺城内下舎門中有閣道東西􅘳路通於朝堂其第即都官之省西抵閣道年代久遠多有鬼怪每昏夜之際無故有聲光或見人着衣冠從中出須㬰復没或門閣自然開閉居者多死亡尚書周􅔸卒於此省孝克代􅔸便即居之經渉兩載妖變皆息時人咸以為貞正所致張種字士苗吳郡人祖辨宋司空右長史廣州刺史父略梁太子中庶子臨海太守種少恬靜居處雅正不妄交遊旁無造請時人為之語曰宋稱敷演梁則卷充清虛學尚種有其風卒為金紫光禄大夫後魏崔光韶博學彊識尤好理論至于人倫名教得失之間㩁而論之不以一毫假物裴他字元化河東聞喜人性剛直不好俗人交遊其投分者必當時名稱清白任直卒為中軍將軍北齊魏蘭根為定州長流叅軍丁母憂居䘮有孝稱將𦵏恒山郡境先有董卓祠祠有柏樹蘭根以卓凶逆無道不應遺祠至今乃伐柏以為椁材人或勸之不伐蘭根盡取之了無疑懼許文經勤學方雅身無擇行口無戲言位殿中侍御史後周王軌太原人也性質直慷慨有遠量臨事彊正人不敢干卒為柱國徐州都督盧光為京兆郡舎先是數有妖怪前後郡將莫敢居者光曰吉凶由人妖不妄作遂入居之未幾光所乗馬忽升㕔事升牀南首而立又食器無故自破光並不以介懐其精誠守正如此唐鄭珣瑜字元伯鄭州滎陽人也性公直嚴重少言未嘗以私託人而人望其風亦不敢干以私所居皆有理績後免相為吏部尚書卒武儒衡字庭碩宰相元衡從父弟才度俊偉氣直貌莊言不妄發與人交友終始不渝相國鄭餘慶不事華潔後進趨其門者多垢衣敗服以望其知而儒衡謁見未嘗輙易所好但與之正言直論餘慶因以重之官至兵部侍郎晉桑維翰字國僑雒陽人也少時所居嘗有魑魅家人咸畏之維翰往往被竊其衣撮其巾櫛而未嘗改容後卒為中書令崔税字子文博陵安平人初為王瓚開封府從事性恬淡不汲汲於榮利非公事不造權政之門剛仲尼有言曰剛毅木訥近仁又曰吾未見剛者則剛之為用其至矣哉中古而下乃有蹈道經徳據法守禮激昂其志節奮厲其武健或人不我用則死堅陣以如歸或時無已知則陷淫刑而不悔或納忠而陳鯁議或守正而懋貞規或凌折于豪右或擯斥乎姦佞以至對萬乗之至尊亢志無撓蒙一慙之不忍拂衣竟去臨危難而靡變保氣節而克終斯皆禀絶異之姿懐卓爾之操者矣若乃任威忤物好氣自恃殞絶扵小忿馳騁于末流者固在夫君子之後爾林不狃魯士也齊國書帥師伐魯師及齊師戰于郊魯右師奔齊人從之林不狃之伍曰走乎不狃魯士五人為伍敗而欲走不狃曰誰不如我不如誰而欲走曰然則止乎不狃曰惡賢言皆無戰志惡足為賢徐歩而死徐行而死言魯非無壯士但季孫不能使陽處父晉大夫聘于衛反過寗寗嬴從之寗晉邑汲郡修武縣嬴逆旅大夫及温而還其妻問之嬴曰以剛尚書曰沈濳剛克髙明柔克沈濳猶滯溺也髙明亢爽也言各當以剛柔勝已本性乃能成全也此在洪範今謂之周書夫子一之其不沒乎陽子性純剛天為剛徳猶不干時寒暑順况在人乎且華而不實怨之所聚也言過其行故犯而聚怨不可以定身剛則犯人余懼不獲其利而離其難是以去之魏齊魏相也亾之信陵君信陵君初猶豫未肯見因侯嬴之言駕如野迎之魏齊聞信陵君之初難見之怒而自剄漢周昌為人彊力敢直言自蕭曹等皆卑下之位至御史大夫郅都為中尉時丞相條侯至貴居也居大傲讀與倨同而都揖丞相汲黯為主爵都尉是時太后弟武安侯田蚡為丞相中二千石拜謁蚡弗為禮黯見未嘗拜揖之李廣武帝時為前將軍與右將軍趙食其合軍出東道惑失道後大將軍使長史持糒醪遺廣糒乾飯也醪汁滓酒也糒音備醪音牢因問廣食其失道狀曰青欲上書報天子失軍曲折曲折猶委曲也廣未對大將軍長史急責廣之幕府上簿之往也簿文狀也音歩户反廣曰諸校尉亾罪乃者我自失道吾今自上簿至幕府謂其麾下曰廣結髪與匈奴大小七十餘戰今幸從大將軍出接單于兵而大將軍從廣部行回遠又迷失道豈非天哉且廣年六十餘終不能復對刀筆之吏矣遂引刀自剄百姓聞之知與不知老壯皆為垂泣甯成為濟南都尉而郅都為守始前數都尉歩入府因吏謁守如縣令其畏都如此及成往直凌都出其上都素聞其聲善遇與結歡蕭望之字長倩大將軍霍光秉政長史邴吉薦儒生王仲翁與望之等數人皆召見先是左將軍上官桀與蓋主謀殺光光既誅桀等後出入自備吏民當見者露索去刀兩吏挾持望之獨不肯聼自引出閣曰不願見吏牽持匈匈光聞之告吏勿持於是光獨不除用望之而仲翁等皆補大將軍史又元帝曰蕭太傅素剛望之終于太子太傅蕭育字次君為茂陵令㑹課第六而漆令郭舜殿見責問育為之請扶風怒曰君課第六纔自脫何暇欲為左右及罷出傳召茂陵令詣後曹當以職事對賊曹决曹皆名後曹忿其為漆令言故以職事責之育徑出曹書佐隨牽育育按佩刀曰蕭育杜陵男子何詣曹也遂趨出欲去官明旦詔召入拜為司𨽻校尉後漢祭彤以太僕將萬騎與南單于左賢王信伐北匈奴期至涿邪山信初有嫌于彤行出髙闕塞九百餘里得小山乃妄言為涿邪山彤到不見虜而還坐逗留畏懦下獄免彤性沈毅内重自恨見誑無功出獄數日嘔血死髙獲與光武有素舊師事司徒歐陽歙歙下獄當斷獲冠鐵冠帶鐵鑕詣闕請歙帝雖不赦而引見之謂曰敬公朕欲用子為吏宜改常性獲對曰臣受性於父母不可改之於陛下出便辭去申屠剛性剛直忠正志節抗厲建武初徵拜侍御史遷尚書令謇謇多直無所屈撓戎良字子恭濟隂人年十八為郡門下吏良儀容偉麗太守諸葛豐使閤裏寫書從者誣良與婢通良刳腹引出腸肝示豐范滂汝南征羗人也坐黨事繋黄門北寺獄獄吏謂曰凡坐繋皆祭臯陶滂曰臯陶賢者古之直臣知滂無罪將理之於帝如其有罪祭之何益衆人由此亦止獄吏將加掠拷滂以同囚多嬰病乃請先就格遂與同郡袁忠爭受楚毒桓帝使中常侍王甫以次辯詰滂等皆三木囊頭暴於階下餘人在前或對或否滂忠於後越次而進王甫詰曰君為人臣不惟忠國而共造部黨自相褒舉評論朝廷虚搆無端諸所謀結並欲何為皆以情對不得隐餙滂對曰臣聞仲尼之言見善如不及見惡如探湯欲使善善同其清惡惡同其汙謂王政之所願聞不悟更以為黨甫曰卿更相拔舉迭為脣齒有不合者見則排斥其意如何滂慷慨仰天曰古之循善自求多福今之循善身陷大戮身死之日願埋滂於首陽山側上不負皇天下不愧􅆥齊甫慜然為之改容乃得並觧桎梏仕為郡功曹許敬汝南平興人有史誣君者㑹於縣令坐敬拔佩刀斷席曰敬不忍與惡人同席陶謙性剛直有大節少舉孝㢘拜尚書郎除舒令郡守張磐同郡先軰與謙父友意殊親之而謙耻為之屈與衆還城因以公事進見坐罷磐常私還入與謙飲宴或拒不為留嘗以舞屬謙不為起因彊之及舞又不轉磐曰不當轉耶曰不可轉轉則勝人由是不樂卒以搆隙後謙為揚武都尉時邊章韓遂為亂司空張温銜命征討又請謙為叅軍事接遇甚厚而謙輕其行事心懐不服及軍罷還百寮髙㑹温屬謙行酒謙衆辱温温怒徙謙於邊或説温曰陶恭祖本以材略見重于公一朝以醉飲過失不蒙容貸遠棄不毛厚徳不終四方人士安所歸望不如釋憾除怨克復初分於以遠聞徳美温然其言乃追還謙謙至或人謂謙曰足下輕辱三公罪自已作今蒙釋宥徳莫厚矣宜降志卑辭以謝之謙曰諾又謂温曰陶恭祖今深自罪責思在變革謝天子禮畢必詣公門公宜見之以慰其意時温於公門見謙謙仰曰謙自謝朝廷豈為公耶温曰恭祖癡病尚未除耶遂為之置酒待之如初李法漢中人性剛而有節終于汝南太守蓋勲為議郎董卓廢少帝自公卿以下莫不卑下於卓惟勲長揖爭禮見者皆為失色卓以為越騎校尉卓又不欲令典禁兵復出為潁川太守未及至郡徵還京師時河南尹朱雋為卓陳軍事卓折雋曰我百戰百勝决之於心卿何妄説且汙我耳勲曰昔武丁之眀猶求箴諫况如卿者而欲杜人之口乎卓曰戲之爾勲曰不聞怒言可以為戲卓乃謝雋勲雖強直不屈而内厭於卓不得意疽發背而死朱雋拜大司農獻帝詔雋與太守楊彪等十餘人譬郭汜令與李傕和汜不肯遂留質雋等雋素剛即日發病卒魏陳宫字公臺東郡人也剛直壯烈漢末天下亂始隨魏太祖後自疑乃從吕布為布畫筞布每不從其計太祖軍至彭城陳宫謂布宜逆撃之以逸撃勞無不克也布曰不如待其来攻蹙著泗水中及太祖軍攻之急布於白門樓上謂軍士曰卿曹無相困吾自首當眀公宫曰逆賊曹操何等眀公今日降之若卵投石豈可得全也下邳敗軍士執布及宫太祖皆見之與語平生故布有求活之言太祖謂宫曰公臺卿平常自為智計有餘今竟何如宫顧指布曰但坐此人不從宫言以至於此若其見從亦未必為擒也太祖笑曰今日之事當云何宫曰為臣不忠為子不孝死自分也太祖曰卿如是奈卿老母何宫曰宫聞將以孝治天下者不害人之親老母之存否在眀公也太祖曰若卿妻子何宫曰宫聞將施仁政於天下者不絶人之祀妻子之存否亦在眀公也太祖未復言宫曰請出就戮以眀軍法遂趨出不可止太祖泣而送之宫不還顧宫死後太祖待其家皆厚於初審配字正南魏郡人為袁紹治中别駕紹死袁尚使配守鄴太祖攻之太祖出行圍配伏弩射之幾中及城䧟生獲配太祖謂曰吾近行圍弩何多也配曰猶恨其少太祖曰卿忠於袁氏亦自不得不爾也有意欲活之配意氣壯烈終無辭遂斬之何䕫初為太祖司空掾屬太祖性嚴掾屬公事往往加杖䕫常畜毒藥誓死無辱是以終不見及夏侯𤣥為太常被收下廷尉鍾毓弟㑹年少于𤣥𤣥不與交𤣥在囹圄㑹因欲狎而友𤣥𤣥正色曰鍾君何相偪如此也徐英字伯濟馮翊著姓為郡功曹張既初為郡小吏英嘗自鞭既二十建安初英為蒲阪令英性剛爽自負族氏勝既於鄉里名行在前加以前辱既雖知既貴顯終不有求於既既雖得志亦不顧計本原猶欲與英和嘗因醉欲親狎英故抗意不納英由此遂不復進用故時人善既不挟舊怨而壯英之不撓文欽為揚州刺史亾入吳為都䕶假節鎮北大將軍欽性剛雖在他國不能屈節下人自吕據宋異等諸大將皆憎疾之惟孫峻常左右之蜀嚴顔為劉璋將巴郡太守張飛至江州生獲顔謂曰大軍至何以不降敢逆戰乎顔對曰卿等無狀侵奪我州我州但有斷頭將軍無降將軍也飛怒曰牽去砍頭顔色不變曰斫頭便斫頭何為怒也飛義之引為賓客晉王遜為寧州刺史李雄遣將李驤渡瀘水㓂寧州遜使將軍姚崇㸑琛拒之戰於堂狼大破驤等崇追至瀘水透水死者千餘人崇以道遠不敢渡水遜以崇不窮追也怒囚群帥執崇鞭之怒甚髮上衝冠冠為之裂夜中卒周處仕吳為東觀左丞孫皓末為無難督及吳平王渾登建業宫釃酒既酣謂吳人曰諸君亡國之餘得無慼乎處對曰漢末分離三國鼎立魏滅於前吳亡於後亡國之慼豈惟一人渾有慙色王尼字孝孫初入雒詣東海王越不拜越問其故尼曰公無宰相之能是以不拜因數之言甚切後東瀛公騰辟為車騎府舎人不就何無忌東海郯人也少有大志忠亮任氣人有不稱其心者輙形於言色位至鎮南將軍南齊裴顗少有異􅍾宋眀帝㤗始中於總眀觀聼講不譲劉秉席秉用為恭軍順帝昇眀末為奉朝請齊臺建世子裴妃須外戚譜顗不與遂分籍卞延之弱冠為上虞令有剛氣㑹稽太守孟凱以令長裁之憤不能容脱幘投地曰我所以屈卿者正為此幘爾今已投之卿以一世勲門而傲天下國士拂衣而去梁任昉少好學早知名初宋丹陽尹劉秉辟為主簿時昉年十六以氣忤秉子久之為奉朝請江子一為戎武將軍南津校尉弟子四歴尚書金部郎大同初遷右丞兄弟性並剛烈沈瑀為尋陽太守仍為蕭頴逹長史太守如故瑀性倔彊每忤頴逹頴逹銜之天監八年因入諮事辭又激厲頴逹作色曰朝廷用君作行事耶瑀出謂人曰我死而後已終不能傾側靣從是日於路為人所殺多以為頴逹害焉子績累訟之遇頴逹亦尋卒事遂不窮竟陳孔夐仕梁為南昌侯相值侯景亂京城䧟朝士並被拘縶或薦夐於賊侯子監子監命脱桎梏厚遇之令掌書記時景軍悉恣其凶威子監景之心腹委任又重朝士見者莫不卑俯屈折夐獨傲然自若無所下或諫夐曰當今亂世人思茍免獯羯無知豈可抗之以義夐曰吾性命有在雖未能死豈可耴媚凶醜以求全乎官至金紫光禄大夫領宏範宫衛尉卿袁憲仕梁為太子舎人及武帝作相除司徒户曹初謁遂抗禮長揖中書令王勵謂憲曰卿何矯衆不拜録公憲曰於理不應致拜衛尉趙知禮曰袁生舉止詳中故有陳汝之風傅繹為中書通事舎人文筆典麗然性本彊不持簡􅍾負才使氣凌侮人物朝士多銜之㑹施文慶沈客卿以便佞親幸專制衡軸而繹益疎文慶等因共譖繹受髙麗使金後主收繹下獄繹素剛因忿恚乃於獄中上書曰夫人君者恭事上帝子愛下民省嗜欲遠諂佞未眀求衣日旰㤀食是以澤被區宇慶流子孫陛下頃来酒色過度不䖍郊廟之神專媚淫昏之鬼小人在側宦竪弄權惡忠直若仇讐視耕民如草芥後宫曵綺繡廐馬餘菽粟百姓流離僵尸蔽野貨賂公行帑蔵虛耗神怒民怨衆叛親離恐東南王氣自斯而盡書奏後主大怒頃之意稍解遣使謂繹曰我欲救卿卿能改過否繹對曰臣心如靣臣面可改則臣心可改後主於是益怒令宦者李善慶窮治其事遂賜死獄中北齊魏愷少抗直有才辯除青州長史固辭不就楊愔以聞文宣大怒謂愔曰何物漢子我與官不肯就明日將過我自共語是時文宣已失徳朝廷皆為之懼而愷情貌坦然文宣切責之仍云死與長史孰優任卿選一處愷答云能殺臣者是陛下不受長史者是愚臣伏聼眀詔文宣謂愔云何慮無人作官職其用此漢何為不放其還家永不用收採由是積年沉廢唐李大亮外若不能言而内剛烈不可干以非義或面陳是非心無屈撓位至兵部尚書薛萬徹為寧州刺史坐房遺愛同謀伏罪臨刑大言曰薛萬徹健兒也留為國家效死萬徹豈得坐房遺愛而殺之乎遂解衣謂監刑者疾斫執刀者斬之不殊萬徹叱之因何不加刀三刀乃絶王思禮為哥舒翰兵馬使征九曲後期翰欲引斬之續命使釋之思禮徐言曰斬則斬却喚何物諸將壯之竇参代宗時為大理司直按獄江淮次揚州節度使陳少游驕蹇不郊迎令軍吏傳問参正詞譲之少游悔懼促詣参参不俟濟江還奏合㫖晉王權為兵部尚書髙祖得契丹屈節以事之馳驛乗軺道路交織一日勅權為使權以前世累為將相未嘗有稱臣於戎虜者謂人曰我雖不才今耄矣豈能稽顙於窮廬之長乎違詔得罪亦所甘心由是停住周王樸為樞密使樸性敏鋭然傷於太剛每稠人廣坐之中正色髙談少敢觸其鋒者故時人雖服其機辨而無温克之譽册府元龜卷八百七十七
