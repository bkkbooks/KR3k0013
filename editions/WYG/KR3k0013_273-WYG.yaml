body:
  text: 册府元龜卷二百七十三宋王欽若等撰宗室部智識智者心之符天下之達徳也大則周物而不遺小則見事於未兆折獄辨惑存乎明識而振振公族源深慿厚天姿英異不亦多乎繇漢已來可得而舉或神鋒炤朗智慮淵妙竒謀先見越出世類至於封章奏議練達治體者左右應對脗合事機决政務而撥其煩閱簿領而糾其繆權宜以救急精辦而垂裕逮夫明哲保身卷舒繇道觸類而長其流實潔非夫天下之至精又孰能與於此也漢陽城侯徳有智畧少時數言事召見甘泉宫武帝謂之千里駒言若駒馬可致千里也年齒㓜少故謂之駒後漢北海靖王興為人有明畧為𢎞農太守明帝器重興每有異政輒乘驛問焉興子敬王睦少好學博通書傳中興初禁網尚濶而睦性謙恭好士千里交結自名儒宿德莫不造門繇是聲價益廣永平中法憲頗峻睦乃謝絶賔客放心音樂然性好讀書嘗為愛翫歲終遣中大夫奉璧朝賀中大夫王國官也大夫比六百石掌奉王使京都奉璧賀正月及使諸國本皆持節後去節召而謂之曰朝廷設問寡人朝廷謂天子也大夫將何辭以對使者曰大王忠孝慈仁敬賢樂士臣雖螻蟻敢不以實睦曰吁子危我哉此乃孤㓜時進趣之行也東觀記續漢書並云是吾㓜時狂惷之行也大夫其對以孤襲爵以來志意衰惰聲色是娱犬馬是好使者受命而行其能屈伸若此清河王慶中傅衛訢私為臧盜千餘萬詔使按理之并責慶不舉之狀慶曰訢以師傅之尊選自聖朝臣愚惟知言從事聽不甚有所糾察章帝嘉其對悉以訢臧財賜慶魏陳思王植上䟽陳審舉之義曰臣聞天地恊氣而萬物生君臣合德而庶政成五帝之世非皆知三季之末非皆愚用與不用知與不知也既時有舉賢之名而無得賢之實必各援其類而進矣諺曰相門有相將門有將夫相者文德昭者也將者武功烈者也文德昭則可以輔國朝致雍熈稷契夔龍是也武功烈則可以征不庭威四夷南仲方叔是也昔伊尹之為媵臣至賤也吕尚之處屠釣至陋也及其見舉於湯武周文誠道合志同𤣥謀神通豈復假近習之薦因左右之介哉書曰有不世之君必能用不世之臣用不世之臣必能立不世之功殷周二王是也若夫齷齪近歩遵常守故安足為陛下言哉故隂陽不和三光不暢官曠無人庶政不整者三司之責也疆場騷動方隅内侵没軍喪衆干戈不息者邊將之憂也豈可虛荷國寵而不稱其任哉故任益隆者負益重位益髙者責益深書稱無曠庶官詩有職思其憂此其義也陛下體天貞之淑聖登神機以繼統冀聞康哉之歌偃武修文之美而數年以來水旱不時民困衣食師徒之發歲嵗增調加東有覆敗之軍西有殪殁之將至於蚌蛤浮翔於淮泗鼲鼬讙譁於林木臣每念之未嘗不輟食而揮餐臨觴而搤腕矣昔漢文發代疑朝有變宋昌曰内有朱虛東牟之親外有齊楚淮南琅邪此則磐石之宗願王勿疑臣伏惟陛下逺覽姫文二虢之援中慮周成召畢之輔下存宋昌磐石之固昔騏驥之於吳阪可謂困矣及其伯樂相之孫郵御之形體不勞而坐取千里蓋伯樂善御馬明君善御臣伯樂馳千里明君致太平誠任賢使能之明效也若朝士惟良萬機内理武將行師方難克弭陛下可得雍容都城何事勞動鑾駕暴露於邊境哉臣聞羊質虎皮見草則悦見豺則戰忘其皮之虎也今置將不良有似於此故語曰患為之者不知知之者不得為也昔樂毅奔趙心不忘燕亷頗在楚思為趙將臣生乎亂長乎軍又數承教於武皇帝伏見行師用兵之要不必取吳孫而闇與之合竊揆之於心嘗願得一奉朝覲排金門蹈玉陛列有職之臣賜須㬰之間使臣得一散所懷攄舒藴積死不恨矣被鴻臚所下發士息書期㑹甚急又聞豹尾已建戎軒騖駕陛下將復勞玉躬擾挂神臣思誠竦息不遑寧處願得䇿馬執鞭首當塵露撮風后之竒接孫吳之要追慕卜商起予左右効命先軀畢命輪轂雖無大益冀有小補然天髙聽逺情不上通徒獨望青雲而拊心仰高天而歎息耳屈平曰國有驥而不知乘焉皇皇而更索昔管蔡放誅周召作弼叔魚陷刑叔向佐國三監之釁臣自當之二南之輔求必不逺華宗貴族藩王之中必有應斯舉者故傳曰無周公之親不得行周公之事唯陛下少留意焉近者漢氏廣建藩王豐則連城數十約則饗食祖祭而已未若姫周之樹國五等之品制也若扶蘇之諫始皇淳于越之難周青臣可謂知時變矣夫能使天下傾耳注心者當權者是矣謀能移主威能懾下豪右執政不在親戚權之所在雖疏必重勢之所去雖親必輕蓋取齊者田族非吕宗也分晉者趙魏非姬姓也惟陛下察之茍吉專其位㐫離其患者異姓之臣也欲國之安祈家之貴存共其榮没同其禍者公族之臣也今反公族疏而異姓親臣竊惑焉臣聞孟子曰君子窮則獨善其身達則兼善天下今因臣與陛下踐冰履炭登山浮澗寒温燥濕髙下共之豈得離陛下哉不勝憤懣拜表陳情若有不合乞且藏之書府不便滅棄臣死之後事或可思若有毫釐少挂聖意乞出之朝堂使夫慱古之人糾臣表之不合義者如是則臣願足矣帝輒優文答報植子濟北王志字允恭好學有才行晉武帝初為中撫軍迎常道鄉公於鄴志夜與帝相見帝與語從暮至旦甚器之都亭侯仁初為議郎督騎從太祖圍壺關太祖令曰城拔皆坑之連月不下仁言於太祖曰圍城必示之活門所以開其生路也今公告之必死將人自為守且城固而糧多攻之則士卒傷守之則引日乆今頓兵堅城之下以攻必死之虜非良計也太祖從之城降晉新野王歆為荆州都督將之鎭與齊王冏同乘謁陵因説冏曰成都至親臣欽若等曰成都王頴也同建大勲今宜留之與輔政若不能耳當奪其兵權冏不從俄而冏敗歆懼自結於成都秦王柬武帝子帝嘗幸宣武場以三十六軍兵簿令柬料較之柬一省便摘脫謬帝異之於諸子中尤見寵愛後為大將軍録尚書事時楊駿伏誅既痛舅氏覆滅甚有憂危之慮屢述武帝㫖請還藩而汝南王亮留輔政及亮與楚王偉被誅時人謂柬有先識譙王承元帝時為散騎常侍領左軍將軍王敦有無君之心表疏輕慢帝夜召承以敦表示之曰王敦頃年位任足矣而所求不已言至於此如之何承曰陛下早裁之難將作矣帝以承為湘州刺史時王敦據上流承赴任行達武昌釋戎備見王敦敦與之宴欲觀其意謂承曰大王雅素佳士恐非將帥才也承曰公未見知耳鈆刀豈不能一割乎承以敦欲測其情故發此言敦果謂錢鳯曰彼不知懼而學壯語此之不武何能為也聽承之鎮宋長沙王義欣鎭壽陽時淮西河北長吏悉敘勞人武夫多無政術義欣陳之曰江淮左右土塉民疎頃年以來荐饑相襲百城彫弊於今為甚綏牧之宜必俟良吏勞人武士不經政術統内官長多非才授東南殷實猶或簡能况賔接荒垂而可輯柔頓闕願勅選部必使任得其人庶不勞而治廬陵王義真鎭東城高祖始踐祚義真色不悦侍讀博士蔡茂之問其故義真曰安不忘危休泰何可恃江夏王義㳟孝武世以西陽王子尚有盛寵解揚州以避之乃進位太宰領司徒義恭嘗慮為孝武所疑及海陵王休茂於襄陽為亂乃上表曰古先哲王莫不廣植周親以屏帝宇諸侯受爵亦願永固邦家至有管蔡梁燕致禍周漢上乖顯授之恩下忘血食之業夫善積慶深宜享長乆而歴代侯王甚乎匹庶豈異姓皆賢宗室悉不賢生於深宫不覩稼穡左右近習未値田蘇富貴驕奢自然而至聚毛折軸遂及危禍漢之諸王並置傅相猶不能禁逆七國連謀實繇强盛晉氏列封正足成永嘉之災尾大不掉終古同疾不有更張則其源莫救日者庶人恃親殆傾王業去歲西冦藉寵幾敗皇基不圖襄楚復生今釁良以地勝兵勇奬成㐫惡前事之不忘後事之明兆陛下大明紹祚垂法萬乘臣年邁意塞無所知解忝皇族耆長慚慨内深思表管見禆崇萬一竊謂諸王貴重不應居邊至於華州優地時可蹔出既已有州不須置府若位登三事止乎長史掾屬若宜鎮御别差扞城大將若情樂冲虚不宜逼以戎事若崇文好武尤宜禁塞僚佐文學足充話言遊從之徒一皆勿許文武從鎭以時休止妻子之累不煩自隨百僚脩詣宜遵晉令悉須宣令齊到備列賔主之則衡泌之士亦無煩干候貴王器甲於私為用盖寡自金銀裝刀劔戰具之服皆應輸送還本曲突徙薪防之有素庶善者無懼惡者止姦彭城王義康為司徒録尚書事聰識過人一聞必記嘗所暫遇終身不忘稠人廣席標題所憶以示聰明人物益以此推服之南齊豫章王嶷太祖第二子太祖帶南兖州鎭軍府長史在鎭憂危既切期渡江北起兵嶷諫曰主上狂㐫人不自保單行道路易以立功外州起兵鮮有尅勝物情疑惑必先人受禍今于此立計萬不可失㑹蒼梧王殞太祖報嶷曰大事已判汝明可早入及為荆州刺史禪讓之間世祖欲速定大業嶷依違其事黙無所言建元元年太祖即位赦詔未至嶷先下令蠲除國内昇明二年以前逋負後出鎭東府先是王藴薦部曲六十人助為城防實以為内應也嶷知藴懷貳不給其仗散處外省及難作搜簡皆已亡去始興王鑑為益州刺史城北門嘗閉不開鑑問其故於虞悰答曰蜀主多夷暴有時抄掠至城下故相承閉之鑑曰古人云善閉無關揵且在徳不在門即令開之戎夷慕義自是清謐梁鄱陽忠烈侯王恢在荆州嘗從容問賔客曰中山好酒趙王好吏二者孰愈臣欽若等曰中山王勝趙王彭祖皆漢景帝子也衆未有對者顧謂長史蕭琛曰漢時王侯藩屏而已視事親民自有其職中山聽樂可得任性彭祖代吏近於侵官今之侯王不守藩國當佐天子臨民清白其優乎坐者咸服長沙嗣王業㓜而明敏識度過人南海王大臨字仁宣為輕車將軍琅邪彭城二郡太守時侯景亂為使持節宣惠將軍屯新亭俄又徴還屯端門都督城南諸軍事時議者皆勸收外財物擬共賞賜大臨獨曰物乃賞士而牛可犒軍命取牛得千餘頭城内頼以享士及為吳郡太守張彪起義於會稽吳人陸令公潁州庾孟卿等勸大臨走投彪大臨曰彪若成功不資我力如其撓敗以我說焉不可徃也後魏陳留王崇性沉厚初衛王儀坐事賜死後道武欲敦宗親之義詔引諸王子弟入宴常山王素等三十餘人咸謂與衛王相坐疑懼皆出逃遁將奔蠕蠕唯崇獨至道武見之甚悦厚加禮賜遂寵敬之素等於是亦安樂平王丕明元子初馮𢎞之奔高麗太武詔遣送之高麗不遣太武怒將討之丕上疏以為和龍新定宜優復之使廣脩農植以饒軍實然後進圖可一舉而滅帝納之乃止元城侯屈明元時居門下出納詔命性明敏善奏事每合上㫖永昌王徤所在征伐皆有大功才藝比陳留桓王而智畧過之常山王素為内都大官太武即位務從寛征罷雜調有司奏國用不足固請復之唯素曰臣聞百姓不足君孰與足帝善而從之髙陽王雍初封潁川王加侍中征南大將軍或説雍曰諸王皆待士以營聲譽王何以獨否雍曰吾天子之子位為諸王用聲名何為東陽王丕獻文時為侍中司徒公時有諸疑事三百餘條勅丕制决率皆合允及為太尉録尚書事孝文文明太后重年敬舊存問周渥丕聲高氣朗博記國事享宴之際嘗居坐端必抗首大言敘列既徃成敗帝后敬納焉咸陽王禧為冀州刺史後朝京師孝文謂王公曰皇太后平日以朝儀闕然遂命百官更欲撰緝今將舉脩遺志卿等謂可行不當各盡對無以面從禧對曰儀制之事用舍各隨其時而人可使由之不可使知之臣謂宜述先志備行朝式孝文然之任城王澄為徐州刺史朝於京師引見於皇信堂孝文詔澄曰昔鄭子産鑄刑書而晉叔向非之此二人皆是賢士得失竟誰對曰鄭國寡弱介於強鄰民情去就非刑莫制故鑄刑書以示威雖乖古式合今權道隨時濟世子産為得而叔向譏議示不忘古可與論道未可與權孝文曰任城當欲為魏之子産也澄曰子産道合當時聲流竹素臣何敢庶幾陛下以四海為家宣文徳以懐天下江外之阻車書未一季世之民易以威伏難以理治愚謂子産之法猶可蹔用大同之後便以道化之孝文心方革變深善其對笑曰非任城無以識變化之體朕方創改朝制當與任城共萬世之功耳及為尚書孝文外示南討意在謀遷齊於明堂左介詔太常卿王諶親令龜易筮南伐之事其兆遇革孝文曰此是湯武革命順人之卦也羣臣莫敢言澄進曰易言革者更也將欲應天順人革君臣之命湯武得之為吉陛下帝有天下重光累葉今日卜征乃可伐叛不得云革命此非君人之卦未可全為吉也孝文厲聲曰此象云大人虎變何言不吉也澄曰陛下龍興既久豈可方同虎變孝文勃然作色曰社稷在我任城而欲阻衆也澄曰社稷誠知陛下之社稷然臣是社稷之臣子豫參顧問敢盡愚衷孝文既鋭意必行澄此對乆之乃解曰各言其志亦復何傷車駕還宫乃召澄未及昇階遥謂曰向者之革卦今更欲論之明堂之忿懼衆人競言阻我大計故厲聲怖文武耳想解朕意也乃獨謂澄曰今日之行誠知不易但國家興自北土徙居平城雖富有四海文軌未一此間用武之地非可文治其欲移風易俗信為甚難崤函故宅河雒王里因兹大舉光宅中原任城意以為何如曰伊雒中區均天下所據陛下制御華夏輯平九服蒼生聞此應當大慶孝文曰北人戀本忽聞將移能不驚擾也澄曰此既非常之事當非常人所知唯須决之聖懷此輩亦何能為也孝文曰任城便我之子房加撫軍大將軍太子少保又兼尚書左僕射及駕幸雒陽定遷都之䇿孝文詔曰遷移之㫖必須訪衆當遣任城馳驛向代問彼百司論擇可否近日論革今眞所謂革也王其勉之既至代都衆聞遷詔莫不驚駭澄援引今古徐以曉之衆乃悦服澄遂南馳還報會車駕於滑臺孝文大悦曰若非任城朕事業不就也時南齊雍州刺史曹虎請以襄陽内附分遣諸將車駕將自赴之豫州又表虎奉誠之使不復重來孝文乃引澄及咸陽王禧彭城王勰司徒馮誕司空穆亮鎭南李冲等議之孝文曰比得邊州表云襄陽慕化朕將鳴鑾江沔為彼聲勢今復表稱更無後信於行畱之計竟欲如何禧等或云宜行或言宜止孝文曰衆人紛紛意見不等朕莫知所從必欲盡畱行之勢便言理俱暢者宜有客主共相起發任城與鎭南為應畱之議朕當為宜行之論諸公俱坐聽得失長者從之於是孝文曰二賢試言畱計也冲對曰臣以徒御草創人斯樂安内而應者未審不宜輕爾動發孝文曰襄陽欵問似當是虚亦知初遷之民無宜勞役脱歸誠有實即當乘其悦附逺則有會稽之會近則畧平江北如其送欵是虚且可遊廵淮楚問民之瘼使彼土蒼生知君德之所及復何所損而惜此一舉脫降問是實而停不撫接不亦稽阻欵誠毁朕大畧也澄曰降問若審應有表質而使人一返静無音問其詐也可見今代遷之衆人懐戀本細累相携始就雒邑居無一椽之室家闕擔石之糧而使怨苦即戎泣當白刃恐非歌舞之師也今兹區宇初搆又東作方興正是子來百堵之日農夫肆力之秋宜寛彼逋誅急此民疾且三軍已援無稽赴接茍其欵實力足納撫待尅平襄沔然後動駕今無故勞涉空為徃返必挫損天威更成賊膽願上覽盤庚始遷之艱難下矜詩人由庚之至詠輯寧新邑惠康億兆而司空亮以為宜行公卿皆同之澄謂亮曰公在外見旌鉞既張而有憂色每聞談論不願此行何得對聖顔更如斯之語也面背不同事涉欺佞非所謂論道之徳更失國士之體或有傾側當繇公輩侍臣李沖曰任城王可謂忠於社稷願陛下深察其言臣等在外皆憚征行惟貴與賤不謀同辭仰願聖心裁其可否孝文曰任城適以公等從朕有如此論不從朕者何必皆忠而通識安危也小忠是大忠之賊無乃似諸澄曰小忠要是竭盡㣲欵不知大忠者竟何據孝文曰任城脫居台輔之任欲令大忠在已也澄曰臣誠才非台弼智闕和鼎脱得濫居公鉉庶當官而行不負愚志孝文大笑澄又謂亮曰昔汲黯於漢武前面折公孫食脱粟飯卧布被云其詐也於時公孫謙讓下之武帝嘆曰汲黯至忠公孫長者二人稱賢公既道均昔士願思長者之言孝文笑曰任城欲自比汲黯也且所言是公未知得失所在何便謝司空也駕遂南伐宣武時總督揚江二州伐梁獲其冠軍將軍張惠炤後梁武有移求換惠炤澄表請不許詔付八座會議尚書令廣陽王嘉等奏宜還之詔乃聽還後果復冦邊孝明時澄以北邊鎭將選舉既輕恐賊虜闚邊山陵危廹奏求重鎭將之選脩警備之嚴詔不從賊虜入㓂至於舊都鎭將多非其人所在叛亂犯逼山陵如澄所慮彭城王勰孝文時為中書令孝文與侍臣昇金墉城顧見堂後桐竹曰鳯凰非梧桐不栖非竹實不食今桐竹並藏詎能降鳯乎勰對曰鳯凰應德而來豈桐竹能降孝文曰何以言之勰曰昔在虞舜鳯凰來儀周之興也鸑鷟鳴於岐山未聞降桐食竹孝文笑曰朕亦未望降之也後從孝文征沔北為使持節都督南征諸軍事中軍大將軍開府詔曰明便交敵可勅將士肅爾軍儀勰於是親勒大衆須臾有二大鳥從南而來一向行宫一向幕府各為人所獲勰言於孝文曰始有一鳥望旗顚仆臣謂大吉高祖戲之曰鳥之畏威豈獨中軍之畧吾亦分其一耳此乃大善兵法咸說至明便大破齊將崔惠景蕭衍其夜大雨帝曰昔聞國軍獲勝每逢雲雨今破新亭南陽及摧此賊果降時潤誠哉斯言勰對曰水德之應逺稱天心宣武時為太師議律令勰與髙陽王雍八座朝士有才學者每旦集參論軌制應否之宜而勰夙侍孝文兼聰達博見凡所裁决時彦歸仰清河王懌宣武初為尚書僕射懌才長從政明於斷决剖判衆務甚有聲名廣陽王嘉之子深孝明時以沃野鎮人破六韓㧞陵反叛臨淮王彧討之失利詔深為北道大都督受尚書令李崇節度及李崇徴還深專總戎政拔陵避蠕蠕南移渡河先是别將李叔仁以拔陵來逼請求迎援深赴之前後降附二十萬人深與行臺元纂表求恒州北别立郡縣安置降户隨宜賑賚息其亂心不從詔遣黄門郎楊置分散之於冀定瀛三州就食深謂纂曰此輩復為乞活矣禍亂當繇此作既而鮮于修禮叛於定州杜雒周反於幽州常山王素孫暉宣武初為黄門侍郎初孝文遷雒舊貴皆難移時欲和衆情遂許冬則居南夏便居北宣武頗惑左右之言外人遂有還北之問至於牓賣田宅不安其居暉乃請間言事具奏所聞曰先皇移都以百姓戀土故發冬夏二居之詔權寧物意耳乃是當時之言實非先皇深意且比來遷人安居歲乆公私計立無復還情伏願陛下終高祖既定之業勿信邪臣不然之説從之北齊趙郡王琛子叡閑習吏職有知人之鑒後周齊王憲字毘賀突太祖嘗賜諸子良馬唯其所擇憲獨取其駮者太祖問之對曰此馬色類既殊或多駿逸若從軍征伐牧圉易分太祖喜曰此兒智識不凡當成重器後從獵隴上經官馬牧太祖每見駮馬輒曰此我兒馬也因令左右取以賜之汝南公慶字神慶深沉有器局少以聰敏見知初受業東觀頗涉經史既而謂人曰書記姓名而已安能乆事筆硯為腐儒業乎時文州賊亂慶應募從征以功授都督隋河間王宏性明悟有文武幹畧數從征伐累遷開府儀同三司觀德王雄高祖族子也有器度或奏高熲朋黨者高祖詰雄於朝雄對曰臣忝衛宫闥朝夕左右若有朋附豈容不知至尊欽明睿哲萬機親覽熲用心平允奉法而行此乃愛憎之理惟陛下察之高祖深然其言唐河間王孝恭性寛恕退謙無驕矜自伐之色嘗悵然謂所親曰吾所居宅㣲為壯麗非吾心也將賣之别營一所粗令充事而已身殁之後諸子若才守此足矣如其不才冀免他人所利也初為山南道招慰大使自金州出于巴蜀招擕以禮降附者三十餘州孝恭進擊朱粲破之諸將曰此食人賊也為害實深請坑之孝恭曰不可自此以東皆為冦境若聞此事豈有來降者乎盡赦而不殺繇是書檄所至相繼降欵又輔公祏據江東反發兵冦壽陽命孝恭為行軍元帥以擊之孝恭自荆州趣九江時李靖李勣黄君漢張鎭州盧祖尚並受孝恭節度將發與諸將宴集命取水忽變為血在坐者皆失色孝恭舉止自若徐諭之曰禍福無門唯人自召自顧無負於物諸君何見憂之深公祏惡積禍盈今承廟算以致討盌中之血乃公祏授首之徴遂盡飲而罷時人服其識度而能安衆後公祏窮蹙棄揚州東走孝恭命騎將追之至武康擒公祏及其偽僕射西門君儀等數十人致於麾下江南悉平江夏王道宗為禮部尚書時侯君集立功於高昌濳有異志道宗嘗因侍宴從容曰君集知小言大舉止不倫以臣觀之必為戎首太宗曰何以知之對曰見其恃有微功深懷矜伐恥在房𤣥齡李靖之下雖為吏部尚書未滿其志非毁時賢常有不平之語太宗曰豈可臆度浪生猜貳其功勲才用無所不堪朕豈惜重位但次第未到耳俄而君集謀反太宗笑謂道宗曰君集之事果如公所揣霍王元軌為定州刺史突厥之入冦也州人李嘉運與賊相連謀為内應髙宗令收按其黨元軌以強寇在境人心不安唯殺嘉運餘無所及因自劾違制髙宗覽表大悦謂使者曰朕亦悔之向無王則失定州矣後因入朝屢上疏陳時得失多所禆益高宗甚尊重之及在外藩朝廷每有大事或密制問焉潁王璬天寳末禄山之亂璬為劔南節度大使初奉命之藩卒遽不皇受節綿州司馬史賁進説曰王帝子也且為節度大使今之藩而不持節單騎徑進人何所瞻請建大槊䝉之油囊為旌節狀先驅道路足以威衆璬笑曰但為眞王何用假旌節嗣曹王臯多智數善因事以自便奉太妃鄭氏以孝聞晉趙王萬詮子敬暉生而龎厚剛毅雄直有器局行不繇徑臨事多智故髙祖於宗屬之中獨優禮厚遇册府元龜卷二百七十三
