body:
  text: 册府元龜卷八百六十二宋王欽若等撰總録部起復䘮從哀制縁情之禮斯在恩繇義斷移孝之文足徵故晉侯始墨以從戎子騫腰絰而服事奪情順變其来尚矣西漢而下則有居丞弼之任亮采乎邦家處爪牙之權式遏於亂畧以至引籍於扄禁彯纓於文陛奄丁艱疚聿去班列繇是舉兹彛典復其舊貫若乃賜子優渥存問周至斯又示優賢之㫖勉狥公之節者已漢翟方進成帝時為丞相以後母終既𦵏三十六日除服起視事以為身備漢相不敢踰國家之制漢制自文帝遺詔之後國家遵以為常大功十五日小功十四日緦麻七日方進自以大臣故云不敢踰制後漢趙喜明帝時代虞延行太尉事後遭母憂上疏乞身行䘮禮帝不許遣使者為釋服賞賜恩寵甚渥耿恭永平中為騎都尉恭母先卒追行䘮制有詔使五官中郎將齎牛酒釋服張酺和帝時為太尉父卒既𦵏詔遣使齎牛酒為釋服桓榮字叔元順帝時為太傅以母憂自乞聽以大夫行䘮踰年詔使者賜牛酒奪服即拜光禄大夫晉賈充文帝時為侍中以母憂去職詔遣黄門侍郎慰問又以東南有事遣典軍將軍楊囂宣諭使六旬還内鄭黙武帝時為散騎常侍以父䘮去官尋起為廷尉山濤為太常遭母䘮歸鄉里武帝詔曰吾所共致化者官人之職是也方今風俗陵遲人心揺動宜崇明好惡鎮以退讓山太常雖居諒闇情在難奪方今務殷何得遂其志邪其以濤為吏部尚書濤辭以䘮病表章懇切㑹元皇后薨遂扶輿還雒逼廹詔命自力就職張華拜中書令後加散騎常侍遭母憂哀毁過禮中詔勉勵逼令攝事傅咸北城泥陽人也惠帝時為御史中丞本郡中正遭繼母憂去官頃之起以議郎長兼司𨽻校尉咸前後固辭不聽𠡠使者就拜咸復送還印綬公車不通催使攝職咸以身無兄弟䘮祭無主重自陳乞乃使於官舍設靈座咸又上表曰臣既駑弱不勝重任加在哀疾假息日闋陛下過意授非所堪披露丹欵歸窮上聞謬詔既往終然無改臣雖不能滅身以全禮教義無靦然虚忝隆寵前受嚴詔視事之日私心自誓隕越為報以貨賂流行所宜深絶切𠡠都官以此為先而經彌日月未有所得斯繇陛下有以奬勵慮於愚戇將必死繫故自掩以避其鋒耳在職有日既無赫然之舉又不應弦垂趐人誰復憚故光禄大夫劉毅為司𨽻聲震内外逺近清肅非徒毅有王臣匪躬之節亦繇所奏見從威風得伸也詔曰但當思必應䋲中理威風自伸何獨劉毅也張闓元帝時為丞相從事中郎以母憂去職既𦵏帝强起之闓固辭疾篤優命敦逼遂起視事桓石䖍孝武時為寧逺將軍南頓太守以父憂去職尋而苻堅又冦淮南詔曰石䖍文武器幹卻戎有方古人絶哭金革弗避況在餘哀豈得辭事可授奮威將軍南平太守司馬元顯會稽王道子之世子道子妃薨孝武下詔曰會稽王道子元顯風令光懋乃心所寄誠孝性蒸蒸至痛難奪然不以家事辭王事陽秋之明義不以私恨違公制中代之變禮故閔子腰絰山王逼屈良以至慼繇中軌容著外有禮無時賢哲斯順湏妃𦵏畢可居職如故宋毛循之武帝時為右將軍居父憂時盧循逼京邑循之服未除起為輔國將軍尋加宣城内史戍姑孰王誕為吳國内史以母憂去職武帝征劉毅起為輔國將軍誕固辭軍號墨絰從行劉粹為江夏相母憂去職俄而武帝討司馬休之起粹為寧朔將軍竟陵太守統水軍入河徐湛之會稽公主子也湛之遷冠軍將軍丹陽尹進號征虜將軍加散騎常侍以公主憂不拜過𦵏復授前職湛之表啓固辭又詣廷尉受罪武帝詔獄官勿得受然後就命固辭常侍許之殷景仁文帝元嘉中為侍中丁母憂𦵏竟起為領軍將軍固辭詔使綱紀代拜中書舍人周﨣輿載還府顔竣孝武時代謝莊為吏部尚書領太子左衛率未拜丁憂起為右將軍丹陽尹如故沈懐明明帝泰始初居父憂起為建威將軍東征南討有功封吳興縣子食邑四百戸袁粲後廢帝初為尚書令元徽元年十一月母憂去職十二月還攝本任加衛將軍褚淵為中書監䕶軍將軍元徽四年十月母憂去職十一月詔攝本任南齊崔惠景為冠軍將軍同州刺史母䘮詔起復本任蕭景先為侍中兼領軍將軍遭母䘮詔起爲領軍將軍蕭赤斧為長史兼侍中祖母䘮去職起為冠軍將軍寧蠻校尉張敬兒為南陽太守遭母䘮還家朝廷疑桂陽王休範密為之備乃起敬兒為寧朔將軍越騎校尉楊公則為扶風太守武帝永明中母憂去官雍州刺史陳顯達起為寧朔將軍復領太守梁沈約為侍中遭母憂起為鎮軍將軍丹陽尹置佐史丘仲孚初仕齊為于湖令有能名以父䘮去職明帝即位起為烈武將軍曲阿令仲孚入梁為江夏太守行郢州州府事遭母憂起攝職鄭紹叔為衛尉卿以母憂去職紹叔有至性髙祖甞使人節其哭頃之起為冠軍將軍右軍司馬樂藹為龍陽相以父憂去職吏民詣州請之𦵏訖起焉夏侯䕫為右衛將軍丁所生母憂去職時魏南兖刺史劉明以譙城入附詔遣鎮北將軍元樹帥軍應接起䕫為雲麾將軍韋粲為歩兵校尉入為東宮領直丁父憂去職尋起為招逺將軍復為領直謝徵為鴻臚卿髙祖中大通元年以父䘮去職續又丁母憂詔起為貞威將軍還攝本任服闋除尚書左丞沈瑀為尚書駕部郎兼右丞以母憂去職起為振武將軍餘姚令陳姚察為建安王諮議將軍丁憂去職俄起為戎昭將軍知撰梁史事固辭不免轉太子僕父凶問自長安到江南察母䘮制始除後主慮加毁頓遣使戒諭尋以忠毅將軍起兼東宮通事舍人察志在終䘮頻有陳讓並抑而不許又進表其畧曰臣私門釁禍備罹殃罰偷生晷漏冀申情禮而尫疹相仍苴枲穢質非復人流將畢苫壤豈期朝恩曲覃被之纓紱宮闈祕奥趨奏便繁寧可以兹荒毁所宜叨預伏願至徳孝治矜其理奪使殘魂喘息以遂餘生詔答曰省表具懐卿行業淳深聲譽素顯理狥情禮未膺刀筆但參務承華良所期寄允兹抑奪不得致辭也陳亡入隋為祕書丞丁後母杜氏䘮觧職仁夀二年詔曰前祕書丞北絳郡開國公姚察强學待問博極群典修身立徳白首不渝雖在哀疚宜奪情禮可員外散騎常侍侯安都遷司空征北將軍南徐州刺史父文捍為始興内史卒於官世祖徴安都還京師為發䘮尋起復本官徐儉後主立授和戎將軍惠宣晉熙王長史行丹陽郡國事俄以父憂去職尋起為和戎將軍周確為東宮通事舍人丁母憂去職及歐陽紇平越起為中書舍人命於廣州慰勞服闋為太府卿歴太子中庶子尚書左丞太子令以父憂去職尋起為貞威將軍吳令確固辭不之官謝貞為南平王友以母憂去職頃之𠡠起還府仍加招逺將軍掌記室貞累啓固辭𠡠報曰省啓具懐雖知哀煢在疚而官候得才禮有權奪可便力疾還府也貞哀毁羸瘠終不能之官舍後魏陽平王新成長子頥累遷懐朔鎮大將軍督三道諸軍事北討未發遭母憂孝文詔遣𫝊詔侍臣以金革敦喻既殯而發趙郡王幹太妃韓氏薨孝文詔曰季代多務情縁理奪幹既居要任銓衡是荷豈容遂其私志致曠所司可遣黄門郎敦喻命勉從王事朕尋當與之相見拜使持節都督南豫郢東荆三州諸軍事征南大將軍開府豫州刺史元英為梁州刺史父憂觧任孝文討漢陽起英為左衛將軍于忠為左中郎將以父憂去職未㡬起復本官遷司空長史冦臻為中川太守孝文初母憂未闋以𢎞農大盜張煩等賊害良善徵為都尉與荆州刺史公孫初頭等追翦之拜振武將軍陸叡為尚書令衛將軍尋以母憂觧令孝文將有南伐之事以本官起之改授征北將軍叡固辭請終情禮詔曰叡猶執私痛致違往㫖金革方馳何宜曲遂也加領衛尉可重勑有司速令敦喻崔逰為梁州刺史以母憂觧任正光中起除右將軍南秦州刺史固辭不免張彛為黄門母憂觧任孝文幸冀州遣使弔慰詔以驍騎將軍起之還復本位奚康生為南青州刺史遭母憂蕭梁遣將宋黑率衆冦擾彭城起為别將持節假平南將軍領南青州諸軍撃走累遷涇州刺史遭父憂起為平西將軍西中郎將辛雄為尚書三公郎公能之名甚盛以母憂去任卒哭右僕射元欽奏雄起復為郎髙恭之字道穆莊帝初為太尉長史領中書舍人遭母憂去職帝令中書舍人温子昇就宅弔慰詔攝本任表辭不許范紹為都水使者丁母憂去職值義陽初復起紹除寧逺將軍郢州龍驤軍長史帶義陽太守泉企為豐陽令以母憂去職縣中父老表請慇懃詔許之復起本任加討冦將軍樊子鵠為驃騎大將軍遭母憂去職前廢帝聞其在雒陽無宅凶費不周賚絹四百疋粟五百石以本官起之令狐熙為小駕部河隂之役詔令墨縗從事還授職方下大夫襲爵彭陽縣公北齊斛律光太師金之長子為司徒大將軍天統三年六月以父䘮去官其月詔起光及其弟羡並復前任宋齊而下逮於梁室雖眷命攸屬而運一非正乃斛律羡太師金之子為幽州行臺僕射丁父憂去官與兄光並被起復任還鎮燕薊髙隆之為侍中尚書右僕射丁母艱觧任尋詔起為并州刺史封子澮為中書舍人丁母憂觧職尋復本任為大行臺吏部郎中以父䘮去職髙祖西討起為大都督領冀州兵赴鄴趙彦深為司徒丁母憂尋起為本任官封孝琰為祕書郎文宣天保元年為太子舍人出入東宮甚有令望丁母憂觧任除晉州法曹參軍尋徵還復除太子舍人崔贍初為相府司馬天保初兼並省吏部郎中尋丁父憂起為司徒屬崔季舒天保初為侍中兼左僕射大被恩遇乾明初楊愔以文宣遺㫖停其僕射遭母䘮觧任起復除光禄勲兼中兵尚書後周獨孤信拜領軍將軍仍從復𢎞農破沙苑改封河内郡公俘虜中有信親屬始得父凶問乃發䘮行服尋起為大都督在隴右歳久啓求還朝文帝不許或有自東魏来者又告其母凶問信發䘮行服陳哀請終禮制又不許於是追贈信父庫者司空公追封信母費連氏恒山郡君梁彦光為少馭下大夫母憂去職毁瘁過禮未㡬起令視事帝見其毁甚嗟嘆久之頻䝉慰喻王謙太保雄之子以父功累遷驃騎大將軍開府孝閔踐祚雄從晉公䕶東討為齊人所斃朝議以謙父殞身行陣特加殊寵乃授謙柱國大將軍以情禮未終固辭不拜髙祖手詔奪情襲爵庸公邑萬戸蔡祐為大都督原州刺史遭父憂請終䘮紀弗許遷車騎大將軍儀同三司于翼為司會中大夫遭父䘮過禮為時軰所稱尋有詔起令視事泉仲遵為三荆二廣十三州諸軍事行荆州刺史尋遭母憂請終䘮制不許李徳林為通直散騎侍郎丁母艱去職勺飲不入口五日朝廷嘉之纔滿百日奪情起復徳林以羸病屬病請急罷歸隋韋夀初仕後周為京兆尹以父䘮去職髙祖受禪起令視事于宣道為内史舍人丁父憂水漿不入口者累日獻皇后每令中使敦諭歳餘起令視事免䘮拜車騎將軍賀婁子幹為雲州刺史以母憂去職朝廷以榆門作鎮非子幹不可尋起視事韋世康為吏部尚書丁父憂去職未朞起令視事世康固請乞終私制帝不許韋冲為石州刺史以母憂去職俄而起為南寧州緫管持節撫慰復遣柱國王長述以兵繼進冲上表固辭詔曰西南夷裔屢有生梗每相殘賊朕甚愍之已命戎徒靖撫邊服以開府器幹堪濟識畧英遠軍旅重事故以相任知在艱疚日月未多金革奪情盖有通式宜自抑割即膺往㫖杜整為左武衛將軍在職數年以母憂去職起令視事髙熲為左領軍大將軍母憂去職二旬起令視事熲流涕辭讓優詔不許柳述冀州刺史機之子兵部尚書丁父艱去職未㡬起攝給事黄門侍郎事襲爵建安郡公蘇威拜尚書左僕射其年以母憂去職柴毁骨立帝𠡠威曰公徳行髙人情寄殊重大孝之道盖同俯就必湏抑割為國惜身朕之於公為君為父宜依朕㫖以禮自存未㡬起令視事固辭優詔不許宇文㢸為并州刺史俄以父艱去職尋詔起之張衡為揚州掾以母憂去職歳餘起授揚州總管司馬賜物二百叚崔仲方為司農少卿以父艱去職未朞起為虢州刺史大業中為上郡太守以母憂去職歳餘為信都太守柳彧為尚書虞部侍郎以母憂去職未㡬起為屯田侍郎固讓弗許樊子盖為嵩州刺史母憂去職未㡬起授齊州刺史固辭不許皇甫誕為尚書右丞以母憂去職未㡬起令視事陳孝意煬帝大業中為御史以母憂去職未㡬起授鴈門郡丞在郡菜食齋居朝夕哀臨每發聲未甞不絶倒柴毁骨立見者哀之辛公慶為内史侍郎丁母憂未㡬起為司𨽻大夫虞世基遷内史侍郎以母憂去職哀毁骨立有詔令視事拜見之日殆不能起帝令左右扶之哀其羸瘠詔令進肉世基食輙悲哽不能下帝使謂之曰方相委任當為國惜身前後敦勸者數矣帝重其才親禮逾厚専典機宻閻毗有巧思為殿内丞帝深委信之尋以母憂去職未朞起令視事郎茂為民部侍郎數歳以母憂去職未朞起令視事唐劉徳威為檢校雍州别駕往齊州推齊王祐祐殺長史權萬紀徳威却據齊州遣使以聞詔徳威使發河南兵馬經畧遭母憂哀毁殆不勝䘮十八年起為遂州刺史薛萬徹為車騎將軍母憂去職俄起為右衛將軍劉師立貞觀中檢校岐州都督丁母憂去職岐州父老上表請留之太宗下優詔不許赴哀令更聽後起兼岷州都督房𤣥齡授太子太傅遭繼母憂去官尋有詔敦勉起復司空太傅知門下省事武敏之為左侍御兼蘭臺太史丁母憂奪情授本官李敬言為司烈少常伯家艱去官八月奪情為西臺侍郎仍檢校右中䕶司烈少常伯同為西臺三品歐陽通率更令詢之子儀鳯中遷中書舍人襲封渤海縣男丁母憂去職尋起復本官每入朝必徒跣至皇城門外及直在省則席地藉藁非公事不言亦未甞啓齒歸家必衣縗絰號慟無常自武帝已来起復而能哀戚合禮者無如通比王勮則天長夀中為鳯閣舍人兼知𢎞文館學士丁母憂觧官起復本職張說為工部侍郎說丁母憂起復授黄門侍郎說上表曰臣弱年早孤母氏慈訓得紹基構忝列簮裾從官歴年晨昏多闕播遷逺裔離别又苦顧復無答報養何追心所摧感語不能喻甫至冬中禮及祥禫今已春暮瞻言㡬何是臣事朝廷日長戀几筵日短乞寢嚴命許遂私情訴哀祈天所望矜遂手制答曰卿操烈寒松心横勁草累遷臺閣咸播聲猷不屈二兇之威獨全一至之節每念嘉歎無忘寢興但青璅位隆黄樞寄切爰奪苴麻之禮擢居審省之曹朝命已行即宜斷哀又累表固辭言甚切至優制方許焉是時人多趨競或以起復為榮而說能固節懇辭竟終其䘮制自是大為有識者所稱馬秦客為左散騎常侍丁母憂觧職秦客既甞隂通禁掖故居䘮經旬日餘又起復本職邠王守禮為前光禄卿丁母憂起復左金吾衛將軍盧懐慎為中書侍郎丁母憂起復為兵部侍郎嗣鄂王邕為鄂州刺史丁母憂起復為衛尉卿皇甫翼為潞州大都督長史家艱去職起復為揚州大都督長史充淮南道採訪使陸象先為刑部尚書以繼母憂免官起為同州刺史韓休為禮部侍郎兼知制誥出為虢州刺史歳餘以母艱去職尋起復為左庶子兼知制誥累表乞終䘮制詞甚懇至許之服闋除工部侍郎仍知制誥王鉷為御史中丞充京畿關内採訪處置使并戸口色役等使鉷丁家艱起復行御史中丞使並如故呂諲為武部侍郎同中書門下平章事以肅宗乾元二年十月丁母憂十一月起復權知門下省事兼判度支事又加充勾當度支使渾瑊為右武鋒使𨽻郭子儀會瑊父釋之戰死起復本官為朔方行營左廂兵馬使郭英义為右羽林軍大將軍加特進以家艱去職時選將帥東討逆賊史思明乃以英义起復為陜州刺史充陜西節度潼關防禦使尋加御史大夫兼神策軍節度使衛伯玉為荆南節度使江陵尹代宗大厯五年以内憂去職故命殿中監王昂代之王昂既行伯玉諷荆南大將楊休等拒昂昂乞留伯玉優詔許之乃起復本官令狐彰為滑亳節度觀察等使大厯五年夏丁母憂起復本官使如故侯希逸為檢校尚書右僕射淮陽郡王白孝徳為檢校刑部尚書昌化郡王並以私艱去職大厯十一年九月並復舊官李㴠髙平王道立曾孫也有名宗室寳應元年初平河朔拜㴠右庶子兼中丞河北宣慰使丁母憂起復本官而往每至州縣郵驛公事之外都不發言蔬飯水飲席地而息使還固請罷官終䘮制代宗以其毁瘠許之嚴震為鳯州刺史丁母憂起復本官仍充興鳯兩州團練使吳奏章敬皇后弟為金吾將軍大厯末丁繼母憂罷徳宗建中初出為起復為右衛將軍兼通州刺史崔元諒為鎮國軍節度使丁母䘮加右金吾上將軍起復本官樊澤為襄州節度丁母憂起復舊任楊朝晟為邠寧節度丁母憂授左金吾大將軍同正邠州刺史御史大夫李納為淄青節度使檢校司徒平章事丁家艱貞元三年夏起復左金吾上將軍同正餘如故駱元光以前華州潼關節度使檢校尚書右僕射元光丁家艱貞元三年夏起復為右金吾上將軍同正餘如故劉𤣥佐前宣武軍節度檢校司空平章事遭丁家艱貞元四年起復左金吾上將軍同正劉濟為幽州節度使丁家艱貞元四年八月起復左衛上將軍餘如故王武俊為成徳軍節度使檢校司徒平章事遭家艱貞元五年四月起復右金吾上將軍餘如故杜佑為淮南節度檢校禮部尚書丁母憂貞元六年起復左金吾大將軍同正餘如故劉庭保為左神策大將軍遭内艱貞元九年十月起復本官檢校如故以終䘮路寰為檢校左庶子兼楚州刺史貞元十一年八月起復左衛將軍同正兼洪州刺史御史中丞江南西道都團練觀察使張茂昭孝忠之子貞元中為定州刺史充北平軍使是歳孝忠卒於位詔茂昭起復左衛大將軍同正員充義武軍節度使累遷僕射司空又丁母谷氏䘮貞元十二年四月起復左金吾衛大將軍餘如故張茂宗茂昭之弟貞元中許尚主以主㓜待年茂宗母亡遺命請結嘉禮徳宗念茂昭之勲詔曰古稱俯就是謂通䘮恩之所加禮亦有變銀青光禄大夫前行光禄卿員外置同正員駙馬都尉張茂宗華胄恭仁温良美茂當申下嫁之命式寵舊勲之家頃屬待年俄聞在疚以其倚門之訓且在遺言築館之期當從先近俾叅秩於環衛以承榮於湯沐可雲麾將軍起復左衛將軍員外置同正員駙馬都尉諫官蔣義等上䟽以為自古未有起復尚主者徳宗曰卿所言者禮也今人家皆有借吉成婚嫁者卿何苦諫又復執奏徳宗不納田季安為魏慱節度副使試光禄少卿御史大夫貞元十二年八月起復左金吾衛將軍同正兼魏博等節度營田觀察使依前兼御史大夫又丁母憂元和元年九月起復為左金吾衛上將軍餘並如故李師古為平盧淄青節度等使丁母憂貞元十二年十月起復左金吾衛大將軍同正餘如故楊朝晟為邠寧慶節度度支營田觀察使邠州刺史丁母憂貞元十三年二月起復左金吾衛大將軍劉昌為宣武軍節度劉𤣥佐兵馬使累加檢校工部尚書丁母憂加起復左金吾衛大將軍贈其母梁國夫人張敬則為鳯翔節度使憲宗元和元年七月起復為左金吾衛員外大將軍依前充節度等使盧從史為義軍節度使元和四年四月起復左金吾衛大將軍同正員餘如故從史丁父憂朝廷未議起復屬鎮州王士真卒子承宗自繼父位從史竊獻誅承宗計以希上意用是起復及詔下討賊隂與承宗通謀流死嶺南程執恭為横海軍節度使丁母憂元和四年九月起復左金吾衛大將軍同正員餘如故劉總為幽州盧龍軍節度使丁母憂元和八年起復左金吾衛大將軍員外置餘如故張克恭弟克從克勤茂昭之子也元和六年十二月並授起復官奬其先父忠順也吳少陽丁母憂元和九年七月起復淮西節度使杜叔良為朔方節度使丁母憂元和十年九月起復右金吾衛將軍同正員依前充節度等使韓公武為鄜坊節度使丁母憂起復右金吾衛大將軍同正員依前充鄜坊節度觀察使謝少莒敬宗寳厯二年以前陵州刺史起復為雲麾將軍左驍衛將軍同正兼州刺史少莒本中和官劉克明之私屬也克明用事少莒附會得領郡符宰相不能遏後以母䘮去任執政者恐歸京師又肆干撓故以金革之命復前任焉杜悰文宗太和八年以前鳯翔節度使檢校禮部尚書駙馬都尉起復為檢校戸部尚書充忠武軍節度陳許觀察使李玭太和九年以前左金吾衛將軍起復為金吾衛大將軍同正兼黔州刺史充黔州觀察經畧等使王元比太和九年以鎮州大都督府司馬權勾當節度事元逵起復授寧逺將軍守左金吾衛大將軍檢校工部尚書充成徳軍節度鎮冀深趙等州觀察等使册府元龜卷八百六十二
