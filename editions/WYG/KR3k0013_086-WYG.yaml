body:
  text: 册府元龜卷八十六宋王欽若等撰帝王部赦宥第五唐𤣥宗開元二十七年二月己巳加尊號開元聖文神武皇帝大赦天下制曰夫執大象建皇極者必藉彞訓而受鴻名所以應乎天而順乎人也朕嗣守丕業二十七年受命之初既􅈾明號尚多祗懼已謂崇髙而公卿宗子緇黄耆艾披誠瀝懇詣闕上言僉以為乃聖乃文祖宗大烈恭惟纉服必在欽承願以休名施於薄德抑而不許凡已十年爰迨於今又陳入請上追奉先之義下稽從衆之言将從至公不可固拒以今日敬請大號曰開元聖文神武皇帝勉從典訓良増感懼惟新之號既不私於朕躬非常之澤宜普覃於率土大赦天下自開元二十七年二月七日昩爽以前大辟罪已下罪無輕重已發覺未發覺已結正未結正繫囚見徒常赦所不免者咸赦除之自開元已來諸色應緣㾗累人等咸從洗滌令許自新所司更不須以此為累其有别勅停官及亡官失爵者放歸不齒之類量加收叙左䧏官及諸色流人並稍量移近處朕毎於黎甿常恐失所求其賑困乏必在及時比來諸州或有傷損處所請賑給例逼春農比及奏報又淹時月既無救於懸絶亦何成於惠養自今已後毎年至秋收後即宜遣使分道宣慰仍與採訪使及州縣相知廵檢百姓間或有乏絶不自支濟者應須蠲放及賑給便量事處置訖奏聞天下百姓宜放今年地稅古者三載考績黜陟幽明允叶大猷以勸天下諸道所通善状但優仕進之輩與為選調之資責實存名或乖古義自今日已後諸道更不須通善状毎至三年朕當自擇使臣觀察風俗有清白政理著聞者當别擇用宗廟致敬必先於如在神人所依無取於非族深惟至理用切因心其應縁太廟五享於宗子及嗣郡王中揀擇有德望者令攝三公行事其異姓官吏不須令攝其草澤間有殊才異行文堪經國為衆所知不求聞逹者所繇州長官以禮徴送皇太子璵男及慶王琮已下男宜並封授官邠王守禮寕王憲各與一子三品官其内外文武官三品已上賜爵一級四品已下各加一階長公主公主及嗣王郡王各與一子官郡主縣主各放一子出身二王後及諸方蕃客宜各賜物諸致仕官量與進改依前致仕天下侍老百嵗已上版授下州刺史婦人版授郡君賜粟五石綿帛五段九十已上版授上州司馬婦人版授縣君賜粟三石綿帛三段八十已上版授縣令婦人版授鄉君賜粟兩石綿帛兩段京城父老等宜共賜物三千段僧尼等賜物一萬匹天下寺觀毎六齋日宜轉讀經典懲惡勸善以聞大教率土之内賜酺三日二十九年五月庚戌帝夢𤣥元皇帝告以休期􅀞真容布告天下制曰道有三寳慈居一焉欽若至言爰兹宥過天下見禁囚徒其十惡罪及造偽頭首并謀殺妖訛宿宵人等特宜免死配流嶺南官人犯贓㨿情狀輕重量事貶䧏餘一切放免且夫愛人之義長之育之務在清净合於簡易至於州縣造籍之年因團定戸皆據資産以為升䧏其有小葺園廬粗致蓄積多相糺訐便被加等朕情惟敦本義在勸農欲使野絶遊人國無曠土安可得也自今嵗已後且三五年間未須定户其中或有家資破散簡覆非虛則不可循舊差科量事與䧏今者真容應見古所未聞福雖始於邦家慶宜均於士庻其親王公主郡縣主内外文武官等並是賜錢至休假之辰宜以素飡用申慶樂諸道節度使及将士等亦準此其兩京諸州父老亦量賜錢同此歡宴其錢以當處官物充伊爾公卿逮于黎獻宜勉崇𤣥化共復淳源宣布遐邇明知朕意天寳元年正月丁未朔御勤政樓受朝賀大赦天下制曰古先哲王之致理也皆上順天心下稽人事時令賛發生之德靈符恊紀年之稱考彼前載斯為大猷恭惟烈祖𤣥元皇帝天寳賜慶象帝之先埀裕後人重光五聖自朕嗣守丕業洎三十年實頼宗祏䧏靈昊穹孚祐萬方無事六府惟脩寰宇晏如庻臻於理然則乾元在上仁覆為德皇王臨下惠化攸先思𢎞善貸用廣慈育遵道寳而建元暢𤣥風而不宰况屬陽和布氣獻嵗發生宜覃在宥之恩式䧏惟新之澤可大赦天下改開元三十年為天寳元年正月一日昩爽已前大辟罪已下罪無輕重已發覺未發覺已結正未結正繫囚見徒常赦所不原者咸赦除之諸色左䧏官並流人未經量移者亦與量移陽春布和鳥獸孳育宜禁麛卵以遂生成自今已後毎年春天下宜禁弋獵如聞百姓之内或有人户髙丁多苟為規避父母在乃别籍異居宜令州縣勘㑹其一家之中有十丁巳上者放兩丁征行賦役五丁巳上放一丁即令同籍共居以敦風化天下侍老八十已上者宜委州縣官毎加存問仍量賜粟帛侍丁者令其養老孝假者矜其在䘮比者王政優容俾申情理而官吏不依令式多雜役使自今已後不得更然國之急務莫若求才頃者數遣捜揚士庻尚慮遺逸更宜精訪以副虛懐其前資及白身人中有儒學博通及文詞秀逸或有軍謀越衆或有武藝絶倫者委所在長官具以名薦若乃𢎞我風化實惟方岳必佇其人以膺共理其京文武官五品已上清資並郎官據資歴人才堪為刺史者各人封狀自舉但文宣埀訓事必正名而黄鉞古來以金為飾金者應五行之數有肅殺之威去金稱黄理或未當其黄鉞宜改為金鉞副武威之義焉内外文武官九品已上各賜勲兩轉前王重典在乎祭祀况屬惟新事宜昭告五嶽四瀆名山大川諸靈迹及自古帝王忠臣義士並令所繇州縣致祭二月丙申合祭天地於南郊制天下囚徒罪無輕重並放免流人移近處左䧏官依資叙用身死貶處者量加追贈文武官三品已上加一爵四品已下加一階三載正月丙申朔御含元殿受朝賀下制曰履端正名義取埀範體元設教在乎變通雖㳂革從宜罔不稽古朕纉復興運㳟守睿圗甞恐至化猶微淳風尚薄未能臻華胥之俗登可封之人故未眀求衣日昃忘食厲精為理思致雝和歴觀載籍詳求前制而唐虞之際焕乎可述用是欽若舊典以恊惟新可改天寳三年為載今春事将興陽和布澤發號施令之日革故履新之時宜𢎞在宥之恩以助生成之化其天下見禁囚徒應雜犯罪死者宜各䧏一等自餘一切放免其十惡及造偽妖妄頭首官吏犯贓並姦盗等害政既深情難容恕不在免限凡諸郡縣仍令太守縣令勸課農桑其先處分太守縣令在任有増减户口成分者所繇司量為殿最自今已後太守縣令兼能勾當租庸毎載加數成分者特賜以中上考如三載之内皆成分所司録奏超資與處分其丁户仍須案實不得取虛挂之名使新鄰代納受其艱弊凡在黎獻實資存恤一失生業則流庸不歸毎軫於懐深可矜憫諸色當蓄人應送資課者當郡具申尚書省勾覆如身至上處勿更抑令納資致使往來辛苦從閏二月至六月已來其當上人中有單貧老弱者委郡縣長官與所繇計㑹便放營農諸軍征鎮及有尫羸疾病者委節度使速擇放還中外庻僚勉修其職各副朕意宣布遐邇咸使知聞三月壬申制曰王者法天惠人順時行令是惟舊典用致和平朕臨御萬邦於兹三紀宵衣旰食思𢎞至化尚恐天下郡縣囹圄滯留不即疏决以傷和氣今三農在時宜助生育庻覃寛宥之澤以恊上𤣥之心其天下見禁囚徒應合死配流嶺南流已下罪并見徒一切放免其責保在外及追捉未獲者並同見禁例處分其京城内宜令中書門下即分往疏决應合流人便配訖聞奏其東京及北京兼諸郡各委所繇長官準此處分即宣示中外咸使知聞十二月癸丑親祠九宫貴神於東郊禮畢大赦天下制曰九宫嚴祀百代莫修豈日給之不暇将明靈之有待朕當扆君臨握圗纉業毎聽政中昃疇咨讜言觀書乙夜以求摭實勵精為理三紀於兹上荷宗廟延祥克開厥後下頼股肱恊德以致雝熈而鱗鳯龜龍近逰郊藪蠻夷戎狄逺輸琛貢乘時來之休運恢皇王之逺圗是以圜丘方澤之儀升中告類之禮無典不舉靡神不懐恭惟九宫明祠尚闕載深兢惕用建靈壇爰以元辰親執奠獻恊青春發生之慶祈黔庻啟佑之福今至誠式展大禮云備瑞景和風神心如荅無疆之祉豈獨在予非常之澤宜覃率土可大赦天下自天寳三載十二月二十五日昩爽已前大辟罪已下罪無輕重已發覺未發覺已結正未結正繫囚見徒並赦除之其十惡死罪造偽頭首謀殺攻刼及官典犯贓不在此限朕深惟善政實在養人作法務從於寛簡任事必量於齒力比者成童之嵗即挂輕徭既冠之年便當正役憫其勞苦用軫於懐自今已後天下百姓宜以十八已上為中男二十三已上成丁毎載庸調八月徴收農功未畢恐難濟辦自今已後延至九月三十日為限諸軍行人逺為邉扞修短之分雖有定期從役而終良深軫念其陣亡及在軍亡歿骸骨尚未還貫者宜令節度使給其棺櫬逓歸本鄉其家内無人付親收葬仍令所繇郡縣量事優恤使得濟辦自古聖王皆以孝理五常之命百行莫先移於國而為忠事於長而為順永言要道孝行過人鄉閭欽伏者宜令所繇州郡長官具以名薦其有父母見在别籍異居虧損名教莫斯為甚親歿之後亦不得分拆自今已後如有不孝不恭傷財敗産者宜配𨽻磧西用清風教朕惟熈庻績博訪逸人豈惟振㧞罪淹以期於大用亦欲褒崇髙尚将敦於薄俗虛佇之懐蓋若於此其有髙蹈不仕遁跡丘園為逺近所知未經薦舉者委所在長官以禮徴送又崇德追逺式閭封墓用旌前烈以恊大猷自古聖帝明王名臣烈士陵墓有頺壊者宜令管内量事修葺仍明立標記禁其樵採天下侍老百嵗已上賜綿帛五段粟三石八十已上三段粟兩石仍令郡縣長官存問給付亞獻太子亨宜賜物二千疋終獻慶王琮一千疋正衣夾侍各五百疋親王三百疋新封建郡王及國公一百疋賢妃三百疋長公主各三百疋公主各二百疋嗣郡王各一百疋中書門下三品竭心翊戴𢎞益實多各與一子官如先已授官量與一人改轉内外文武三品已上賜爵一級四品已下各與一階一品賜物七十疋三品已上六十疋五品已上賜物四十疋六品已上二十段諸道節度使各賜物一百疋三京留守及二王後各八十疋採訪使各六十疋諸蕃客共賜二千疋其唐元功臣締搆之初竭其忠欵欽功念舊情所不忘普恩之外更加一階其身歿者各贈一官皇親五等已上及九廟子孫諸親三等已上未出身者與一子出身其前資者選日稍優與處分見任者更賜勲兩轉應天下賜酺三日六載正月戊子有事於南郊禮畢下制曰昭事昊穹必惟殷祀盖順帝則而成政也肅雍清廟必惟嚴享蓋繼先志而為孝也則累聖之德在人元陽之和在候思所以逹眀靈之景貺廸皇王之大猷者矣朕夕惕宵衣奉天纉業勉思政道惟懐永圖頼百辟庻官輔予不逮聲朔無逺車書靡殊加以乾符坤珍日來月徃感福應之尤盛懼眀祠之未殷且資父事天因親設教㳂情以逹禮廣敬以推尊時享之誠寧宜異數日舉之饋豈忘事生是以疇咨故典率循新禮對越上靈聿追嚴配既而崇牙宿設眀德惟馨敬爾臣工駿奔執豆陟䧏至止樂編禮成精意上協神休下荅宜廣維祺之福以覃作解之恩其天下見禁囚徒除十惡死罪及官典犯贓自餘一切放免自天寳元年已前流人及配𨽻効力左䧏官非反逆縁坐其並量移近處其中有年齒衰暮情可哀矜者仍聴致仕朕承大道之訓務好生之德施令約法以去極刑議罪執文猶存舊目既措而不用亦惡聞其名自今已後斷絞斬刑者宜除削此條仍令法官約近例詳定處分三皇五帝道冠開闢創物垂範功濟生靈繼天之徳在墳典而昭著勤人之祀於禮文而尚闕永言龜鏡宜示欽崇其三皇宜置一廟五帝亦置一廟即令所司卜擇吉地營建仍以時致祭其廟令太常寺檢校諸廟之主禮有遵於合祭同等則祔義亦取於旁通惠宣等太子雖官為立廟比來子孫自祭或時物有闕禮儀不備興言及此良用憮然宜與隠太子及懿德太子列次諸室擇揀一寛處同為廟一應祭祀及樂饌等並令官供毎差祭官宜依常式仍都置廟官及丞等自餘所廢廟官等並宜減省奠獻既昭感思増逺恭惟隂教以集禎祥自獻祖宣荘皇后張氏已下祖父未有贈官及一房子孫沉翳所司即以名聞将展褒崇以申追慕王業之功羣才佐命中興之後元宰恊心且配食廟庭必重勲德循名册府尚有闕遺緬懐茂功用増禮典自今已後大廟配享功臣髙祖室宜加裴寂劉文静太宗室加長孫無忌李靖杜如晦髙宗室加禇遂良髙季輔劉文軌中宗室加狄仁傑魏元忠王同皎文武之道既惟並用宗敬之義不可獨闕其鄉貢武舉人上省先令謁太公廟毎拜大将及行師克㨗亦宜告猷今勝殘在運無事為心顧此朝儀當符至理既時非旰食将至升平而廷設殺刑何成在宥其毎日立仗食設杖鋜等並宜停廢立身揚名所以廣孝流根自葉亦在推恩既切因親之心須開議事之制其内外文武官五品已上官父祖無資䕃者其所䕃宜同子孫用䕃之例五服之紀宜所跂及三年之數以報免懐齊斬之殊雖存出母之制顧復之慕何申孝子之心其出嫁母宜終服三載祭祀之典犧牲所備将有逹於䖍誠蓋不資於廣殺况牛之為畜人實有頼既功施播種亦力被於車輿此比餘生尤可矜憫但前聖有作難為盡廢明神克享亦在深仁自今已後毎大祭祀應用騂犢宜令所司量減其數仍永為常式崇我祖訓其惟道門将以福助生靈𢎞拯天下諸觀道士等如聞人數全少修行多闕其欠少人處宜度滿七人並取三十已上灼然有道行經業者充仍令所繇長官精加試練採訪使重覆勿使踰濫度訖挾名奏聞其諸觀有絶無人處亦量度三兩人準此簡試選賢擇能甞慮不廣三府之辟則唯採於大名四科之薦蓋不通於小學今承平既乆仕進多端必欲逺賁弓旌載空巖穴片善必録末技無遺天下諸色人中通明一藝已上各任薦舉仍委所在郡縣長官精加試練灼然超絶流軰逺近所推者具名送省仍委尚書及左右丞諸司委御史中丞更加對試務取名實相副一時奏聞四瀆五嶽雖差秩序興雲播潤蓋同利物崇號所及錫命宜均其五嶽既已封王四瀆當升公位逓從加等以荅靈心其河瀆宜封靈源公濟瀆封清源公江瀆封廣源公淮瀆封長源公仍令所司擇日差使告祭自古聖帝明王忠臣烈士陵墓有頺毁者先令修葺并禁樵採嵗月深乆摧壊或多宜令所繇郡縣申明前勅處分並五嶽及諸名山大川並令所在長官致祭諸郡義倉本防水旱如聞多有費損妄作破除自今已後毎郡差一上佐專知除賑給百姓之外更不得輙将雜用天下百姓今載應損郡逋租懸調諸色勾徴變换等物及諸延限者並宜一切放免征行之家毎令存恤差科之際或未優矜自今已後並準飛騎例蠲免天下侍老百嵗已上賜綿帛五段粟三石八十已上綿帛三段粟二石仍令所在長官存問各即分付亞獻太子亨賜物二千疋終獻慶王琮賜物一千疋京文武官各賜帛有差天下賜酺三日七載五月壬午册尊號畢御勤政樓大赦天下制曰惟天法道惟后奉天既合德以䧏符必執象以明本則上𤣥眷命有以丕承大寳鴻名斯為公義朕纉宗社之重掦文武之烈克勤匪懈服道齊心允廸𤣥猷聿求至理日慎一日三紀於兹矣區夏大寜靈祇集貺而公卿宗子耆艾法流僉曰玉芝白魚神言瑞景天之應也敦信興禮務本崇儒人之應也化洽而風俗還淳氣和而疵癘不作天啟道運其何讓焉上荅元符願増徽號披誠詣闕累上封章至請愈勤懇詞難奪以今日敬􅈾典册曰開元天寳聖文神武應道皇帝式副人神感懼交集宜廣恩於善貸俾恊慶於惟新可大赦天下自天寳七載五月三十日昩爽已前大辟罪已下罪無輕重已發覺未發覺已結正未結正繫囚見徒當赦除之其左䧏官及流移配𨽻安置罰鎮効力之數並稍與量移亡官失爵放歸不齒及諸色被停與替非衰老疾病者宜令所司量加收叙人和年登休運斯屬輕徭省賦惠政攸先将洽小康必𢎞厚貸其天下百姓來載租庸並宜放免及諸色勾徴等亦一切放免自古帝王建邦受命必敬先代以循舊章周備禮文既存三恪之位漢從損益唯立二王之後自兹已䧏且復因循将廣繼絶之恩式𢎞復古之道宜於後魏子孫中簡擇譜屬灼然相承者一人委所司勘責準酅公例定為三恪陵廟所奏典職惟崇事雖更於有司任豈循於常秩其宗正卿宜與太常卿同品其少卿及丞亦宜準此又上古之君存諸號氏雖事先書契而道著皇王緬懐厥初寧忘咸秩其三皇已前帝王宜於京城共置一廟仍與三皇五帝廟相近以時致祭自古受命之主創業之君皆經濟艱難戡定禍亂雖道謝於往古乃功施於生人用率典章亦從禋祀其歴代帝王肇迹之處未有祠宇者宜令所繇郡縣量置一廟以時享祭仍取當時将相德業可稱者三人配祭仍並圖􅀞立像如先有祠宇霑享祭者亦宜準此式閭表墓追賢紀善事有勸於當時義無隔於異代其忠臣義士孝婦烈女史籍所載德行彌髙者所在亦置一祠宇量事致祭古者鄉有塾黨有庠所以明尊卑之義正長㓜之序風化之道義在於兹先置鄉學務令敦勸如聞郡縣之間不時訓誘閭巷之内多虧禮節致使言詞鄙䙝少長相凌有黷清猷何成雅俗自今已後宜令郡縣長官申明條式切加訓道如有禮義興行及紀綱不立者委採訪使明為褒貶具状聞奏道教之設淳化之源必在𢎞闡以敦風俗頃列四經之科将冠九流之道雖及門求進頗有其人而覩奥窮微罕聞逹者豈專精難就為勸奨未𢎞天下諸色人等有通道德經及南華等四經任於所在自舉各委長官考試申送其崇𤣥舘生自今已後毎至選日宜減於常例次為留放朕毎以道元有屬思竭精誠經教所在豈忘崇奉且宗其道者師其人行其道者尊其禮晉琅琊王公府舍人楊眞人䕶軍長史許真人丹陽上計掾許真人皆道著妙門感通𤣥闕䧏髙真之迹為上清之宗後漢張天師教逹元和德宗太一正一之道幽賛生靈梁中散大夫貞白陶先生髙尚塵表博逹𤣥㣲綜輯眞經傳授後學並令有司審定子孫将有封植以隆眞嗣天師册為太師貞白册贈太保其洞宫山各置壇祠宇毎處度道士五人並取近山三十户蠲免租稅差科永供灑掃諸郡有自古得道昇仙之處雖先令醮祭循慮未周宜毎處度道士二人其靈迹殊尤功應逺大者度三人永修香火其茅山紫陽觀取側近二百户太平崇元二觀各一百户並蠲免租稅差科長充修葺灑掃應天下靈山仙迹並宜禁斷樵採弋獵如聞山林學道之士毎被捜括且法之防邪本有所以至於宿宵妖訛亡命聚衆誘䧟愚人故令禁斷郡縣遂一槩迫逐使志道之士不得安居自今已後審係清潔更不得恐動以廢修行其五嶽四瀆名山大川各令本郡長官致祭朕刻意眞經䖍誠至道兾慿𤣥祐永錫黔黎毎朝禮三清則宵衣忘寝或齋戒一室則蔬食精專不以勤躬為倦務以狥物為心况於宰殺尤加惻隠自今已後毎月十齋日不得輙有宰殺又閭閻之間例有私社皆殺生命以資宴集仁者之心有所不忍永宜禁斷且因親設教式本於人倫自葉流根必逮於榮養内外文武職掌官有五品已上其父老見在無官者宜授各一官仍令致仕其祖母見在準母例處分京官五品已下正員如父母已沒未有官者宜追贈所司勘㑹即與處分睦親之義因心不忘前開府儀同三司竇􅞓頃以容納㣲人頗虧憲典永懐舅氏追感渭陽宜申國恩再復榮秩可開府儀同三司仍放優閒不須朝㑹王澤無私豈殊於中外天瑞有慶頻屬於京輦寛大之典則以博覃施惠之恩特申曲被其京城父老宜各賜物十段七十已上仍版授本縣令其妻版授縣君六十已上版授本縣丞天下侍老百嵗已下版授下郡太守婦女版授郡君九十已上版授上郡司馬婦人版授縣君八十已上版授縣令婦人版授鄉君仍並即量賜酒麫内外見任文武官九品已上宜各賜勲兩轉其京文武官見在京及致仕並陪位官諸方通表使及月畨官等一品賜物一百疋二品三品八十疋四品五品五十疋六品七品三十疋八品九品二十段兩京留守各八十疋其節度採訪使並諸充官使未回者並同在京例賜物貴妃楊氏禀性柔和因心忠孝克愼閨壼蹈禮循詩加以勤志𤣥宗協誠舉奉率勵宫掖以廸關雎宜賜物三千疋嬪御等賜物有差其大眞觀雖已度人住持尚少宜更度道士七人太子亨宜更賜物二千疋慶王琮已下各賜物有差率土之内賜酺三日八載閏六月丁邜羣臣上尊號帝御含元殿受册禮畢大赦天下制曰自昔皇王受命必䧏於元符天人協心乃彰於大號朕纉承𤣥緒䖍奉睿圖何甞不精意眞宗專心庻政幸以方隅底定風雨時若人和嵗稔且洽於時雍極瑞殊祥荐臻於昭應故得玉芝再産秘牒𤣥通至道䧏休先聖儲祉顧惟菲德曷以克當是以祗薦崇名永掦洪烈郡公百辟援義比事誠請不已固辭不獲以今日敬膺典禮曰開元天地大寳聖文神武應道皇帝徽章載茂寅畏増添宜因稽古之典式布惟新之澤可大赦天下自天寳八載閏六月五日昩爽已前大辟罪已下罪無輕重已發覺未發覺已結正未結正繫囚見徒常赦所不免者咸赦除之朕永惟風教漸兾還淳至於𢎞貸之名亦思復古其天下百姓丈夫户頭者宜各賜爵一級征鎮之役其來乆矣雖存素備諒在變通頃者用兵蓋非獲已今西戎摧殄北虜歸䧏南蠻東夷咸來稽顙亦可謂四海無事萬里廓清減戍息人思𢎞善貸其軍鎮兵非切要可均減者宜令本鎮節度使與所司商量處置奏聞其百姓有頻鎮經戍者已後差㸃之次不在此限髙年給復義存養老因時定式務廣仁恩其天下百姓丈夫七十五以上婦人七十以上宜各給一人充侍仍自揀擇至八十已上依常式處分唐虞省刑畫冠不犯秦漢制法宻網維煩理亂之源得失斯在朕常想淳古務崇敦朴刑期不濫政協無為豈惟守於升平庻有臻於大道頃者詳諸條目已從推究至於結斷尚慮深刻所貴從寛示其知禁宜令中書門下與刑部大理寺法官審更詳定法律之間有所不便者具條目聞奏禘祫之禮以存序位質文之變蓋取隨時國家系本仙宗業承聖祖重熈累盛既錫無疆之休合享祭神思𢎞不易之典自今已後毎遇禘祫並於太清宫聖祖前設位序正上以明陟配之禮欽若𤣥宗下以盡䖍恭之誠無違至道比來毎縁禘祫時廢時享事雖適於從宜理或虧於必備已後毎縁禘祫其甞享無廢又奉先追逺禮惟昭後崇福展敬義在因心自今已後獻祖宣皇帝宣荘光皇帝光懿皇后忌日宜令京城一日設齋太祖景皇帝景烈皇后代祖元皇帝元貞皇后忌日京城三日行道𤣥宗妙本實偹㣲言垂範傳䇿将𢎞至化朕所以發求道之使逺令捜訪因聽政之餘親加尋繹既判訛謬爰至簡編必闡掦以敦風教今内出一切道經宜令崇𤣥舘即繕冩分送諸道採訪使令管内諸郡轉冩其官本便留採訪郡一大觀持誦聖人埀訓蓋先於道學者宗本必有其師文宣王與聖祖同時俱為教首雖考言比德理在難名而問禮叙經跡彰親授思廣在三之義用崇得一之尊宜於太㣲宫聖祖前更立文宣王遺像與四真人列侍左右且道䧏真符天有成命藏之於宻則取固名山彰之以類則發祥星洞况靈仙所集宜表殊真太白山可封為神應公所繇四時祭祀其金星洞改為嘉祥洞所管華陽縣仍置一祠宇仙人䑓下置一觀兩京并十道於一大郡亦宜置一觀並以真符玉芝為名毎觀度道士七人修持香火户部侍郎兼御史中丞王鉷以才授委以忠奉上頃命精求𤣥記克協神心宜旌廼誠俾正章綬特與三品其李渾等三人既親傳真誥因獲元符當有甄明用旌福應宜令中書門下量其所能具状聞奏當别處分又九州之鎮實著禮經三代之典必崇望秩事既屬於報功義有符於錫命其九州鎮山除入諸嶽外並宜封公仍各置祠宇先已有祠宇者量更増修儲慶發祥當申昭報宜令所在長官各陳祭禮名山大川亦量事致祭天下侍老並量賜爵一級四品已上加一階其京文武官在京及諸色陪位官通表使等賜帛有差率土之内賜酺三日十載正月甲午有事於南郊大赦天下制曰皇天眷命必順於五行哲后馭時實遵於三統考古之道何莫繇斯朕欽若上𤣥嗣守丕業察璿衡以齊政念稼穡以勸人日慎一日四十載於兹矣何甞不夙夜祗畏憂勞在懐思致黎元臻夫至理幸以刑清俗阜天成地平萬方底寕羣物咸遂雖慙大化且謂小康此皆至道儲祉宗社敷祐豈予菲薄而克致焉然則上稽歴象傍採輿議爰以土位承漢火行是慿大易之辭用紹前王之烈禎祥累應正閏攸分不改舊章惟新景運屬獻歳初吉乘時布和是用展祀崇禮竭誠昭報庻協發生之序載覃雷雨之澤可大赦天下自天寳十載正月十一日昩爽已前大辟罪已下罪無輕重已發覺未發覺已結正未結正繫囚見徒常赦所不免者咸赦除之其左䧏官及流移配𨽻安置罰鎮効力之類並稍量移近處其官已覆資至叙用之日不須為累其流人配𨽻并一家往者所犯人情非切害身已亡歿其家口放還流人及左䧏官考滿載滿丁憂服滿者亦準例稍與量移其亡官失爵放還不齒其諸色放停解考免與替人等非犯贓者宜令所司勘責量加收叙其衰老疾病者仍與致仕官天下百姓今載地租并諸色勾徴欠負等色在百姓腹内未納者並一切放免且京兆府及三輔三郡百役殷繁自今已後應差防丁屯丁宜令所繇支出别郡禮者所以訓導人俗昭事明祗所宜増修以㑹其本况國之大典在於精禋必資備禮以彰遵奉自今已後設祭南郊薦獻太清薦享太廟其太尉行事前一日於致齋所具羽儀鹵簿公服引入朕親授祝版乃赴清齋用展誠敬夫孝子奉親極敬惟愛歿有思戚霜露之感愈深祭以嚴恭烝甞之敬如在且廟者貌也取像存焉是禮繇於情因心則感太廟宜置内官以備嚴奉仍於廟外别造一院安置庻申罔極之思無忘事生之禮嶽瀆山川藴靈毓粹雲雨之澤利及生人春秋之義存乎祀典况正其運序式遵咸秩其五嶽四瀆及諸鎮山宜令專使分往置祭其名山大川及諸靈迹并自古帝王及得道昇仙忠臣義士孝婦烈女有祠廟者各令郡縣長官逐便致祭其有陵墓屋宇頺毁者量事修葺合應禁樵採宜申明四海攸廣百川朝宗德乃靈長道惟善利永言澤潤義在封崇其四海宜並封王仍差使備禮册祭毎順時行令奉道施法天心不違靈鑑不逺且去載長至庚子御辰今兹建元辛卯應歴立春乃標於嵗首上已更協於清明此氣序和調乾坤交㤗既正東方之位咸歸啟運之祥則政貴𢎞通上符天意况法以輔德刑以閉邪豈在煩苛必資簡易朕永懐至理思至還淳毎懐哀矜之心屢申寛大之詔實欲人皆知禁化洽無為頃者已令法官毎刋刑典夫共理親人在於郡守縣令今二千石朝廷精擇得其人縣令委之選司慮未盡善孰若連職同官見有踪跡宜令天下太守各舉堪任縣令一人善惡賞罰必及所舉所司仍明作條例毎捜羅賢俊旌賁丘園猶慮遁跡藏名安卑守位瞻言及此寤寐思焉其諸色人中有懐才抱噐未經薦舉者委在長官審訪具名録奏禮之王制埀範作程亦既觀德訓人孝敬故天子七廟諸侯五廟大夫三廟士一廟孝享奉先亦各有辨今三品已上乃許立廟永言廣敬載感於懐其京官上員四品清望官及四品五品清官並許立私廟京官五品已上正員清資官階相當並五品已上正員外清官父母先亡歿無官號者並與追贈又父有封爵合傳授子孫或縁申請遲違準式遂停承襲如有此色自開元以來宜令所司審加勘責灼然合襲者特宜許襲天下侍老百嵗已上賜綿帛五段粟五石八十已上綿帛三段粟三石丈夫七十五已上婦人七十已上綿帛二段粟兩石大清宫道士各賜物三十段陪位道士共賜五百段亞獻太子賜物二千疋終獻榮王琬賜物一千段文武百官及有職掌各賜帛有差率圡之内賜酺三日十三載二月甲戌御興慶殿受册尊號為開元天地大寳聖文神武證道孝德皇帝禮畢御勤政樓大赦天下制曰王者事天明事地察修身慎行孝德彰矣故風化天下和睦興焉致敬宗廟祖考來格是則禮莫大於嚴享孝莫大於揚名有以通於神明有以廣於四海朕承真之道纉聖之業欽若先訓惟懐永圖寳儉寳慈無為而理自南自北有截來威五教聿興家服仁孝四靈咸盛物應純誠百郡公卿萬方夷夏僉奉𤣥貺徴長發於真源屢薦鴻名願昭彰於至德封章守闕於再於三加以聖祖錫符𤣥中啟廸天心埀裕榮光䧏臨敢不丕承固執冲讓乃展因心之義以𢎞推尊之典䖍上册禮齋肅思誠入室僾然敢忘於目出户而聽庻㡬有聞掦美諡於無疆展永懐於罔極且敬從拜後禮既尊先式副羣心以允成義以今日敬膺典册曰開元天地大寳聖文神武證道孝德皇帝大號載崇祗若増懼宜因布和之序式𢎞在宥之澤可大赦天下自天寳十三載二月九日昩爽已前大辟罪已下罪無輕重已發覺未發覺已結正未結正繫囚見徒常赦所不免者咸赦除之官人犯入已贓不可更令却上後不須為累其左䧏官並稍量移近處反逆縁坐流配之色宜與量移其王鉷李林甫柴崇躍阿布思等並寄任非輕苞藏特甚原情議法深所難容况日月未淹罪坐尤重即從寛宥何以懲肅應縁親累流配者並不在該及之限左䧏官承前遭憂皆不得離任孝行之道所未𢎞通情理之間深可哀恤如有此類宜並放歸仍申省計至服滿之日準法處分自今已後編入甞式其中有非反逆縁坐及情理切害有父母年老不任相隨無昆弟養者許停官歸侍及有身已衰老乆罹譴責願停官者委本道採訪使簡擇具名牒中書門下然後放還鰥寡惸獨之絶者量加賑給三載黜陟百王令典殿最之迹亷問攸歸欲更别遣使臣慮有煩擾今載宜委本道採訪使具官人善惡奏聞以申勸阻自臨御以來四十餘年棫樸延想寤寐求賢林藪無遺旌招不絶猶慮升平已乆䇿業増多至於徴求或遺僻陋其博通墳典洞曉𤣥經清白著聞詞藻宏麗軍謀出衆武藝絶人者任於所在自舉仍委郡縣長官精加銓擇必取才實相副者奏聞朕尊榮先諡霜露増感於以孝思無忘錫類其内外見任官階俱是三品已上父未有五品官及無官已亡歿者宜各贈五品官及母無邑號者亦與追贈其見任四品五品清官官階俱是五品已上者亡父母先無官號亦準此追贈且厚其風俗五教之㫖聿興賁於丘園十翼之風斯在其士庻間衆推孝弟異代義居髙尚確然隠遁巖穴者委採訪使博訪聞薦其孝義之人已經旌表雍睦無易純至有終著美鄉閭深可嘉尚各賜勲兩轉以彰德行天下侍老百嵗已上版授本郡太守婦人版授郡夫人各賜綿帛五段粟三石八十已上版授本縣令婦人版授縣君各賜綿帛兩段粟兩石大清宫闕聖祖仙居頻䧏休徴屢貽啟廸不有優異豈表殊常其本宫道士宜各賜物三十段道門威儀王虛真賜物五十段陪位大德各賜物二十段因心推崇増山美諡惟官統職必在正名今以大常尊事宗廟安可别署為名禮不逼尊情期逹敬五陵署改為臺其獻陵臺等五令及丞并升一階以彰崇奉五嶽四瀆及名山大川并靈迹之處先賢祠廟各委郡縣長官致祭其有陵墓祠宇頺壊者量情修葺亞獻皇太子亨賜一千段終獻榮王琬賜物五百段其餘各賜階爵有差其郡守縣令職在親人必務公勤以康黎庻凢所推擇皆竭乃誠寵錫之間須甄異等普恩之外太守等並賜爵一級縣令賜勲兩轉庻期勉勵以表朕心其京文武官一品賜物一百疋二品八十疋三品七十疋四品五品五十疋六品七品各三十疋八品九品各二十疋北京留守節度採訪使並京官準勅出使未廻者所賜物並同見在例左相陳希烈純粹之道載穆朝廷大儒之風式瞻師表且協和時令翊賛升平柔嘉其德克壮元老與一子五品官賜物五百疋攝太尉奠瓉上册書寳册讀册右相楊國忠當朝正色百僚綱紀亷節遺身三階柱石况發揮孝理潤色鴻猷金玉王廷典禮増緝不有殊等何用為勸宜與一子三品官仍與一子五品官更賜物五百段左僕射安禄山以真一之心摠文武之任出清北路入賛南宫既押登歌又揮寳册與一子官更賜物四百疋攝太尉張均太清宫祠及修儀注等使普恩之外又賜物一百疋武德功臣及貞觀初宰輔等緬想忠義感㑹風雲用集大勲肇興王業其有子孫零落冠冕陵夷無任官宦者宜令所司勘責依資與一人京官唐元勲臣績㕘締搆録勞念舊毎寘於懐普恩之外宜放一子出身如已出身所司依資與一官率圡之内賜酺三日十四載八月辛卯是月天長節上御勤政樓宴羣臣下制曰朕臨馭萬邦迨今四紀曷甞不䖍誠至道鋭心庻政昊穹孚祐俗致升平仁夀之域漸登太和之風斯在比嵗小有僣亢頗非豐稔遂使開倉賑乏空圄恤刑兼蠲徭省賦故得家給人足頃者農功正興而霑澤頻阻言念黎獻匪遑底寕是用發於精誠庻乎昭鍳至誠上逹膏雨應期俾夏苗如雲秋穫不日周覧原野宛同茨梁豈惟有慰朕懐實亦克符人慶此皆上𤣥垂貺宗社䧏靈豈曰朕躬所能通感屬天長令節盛德在金爰因歡慶之辰用申雷雨之澤其天下見禁囚徒有犯十惡及謀殺偽造頭首罪至死者特宜免死配流嶺南逺惡處自餘一切釋放故聖人積不涸之泉王者用無窮之府支計苟足多賦何為天下百姓今載租庸並宜放半所運糧儲本資國用大倉今既餘羡江淮轉輸艱勞務在從宜何必舊數其來載水運入京宜並停如聞天下諸郡逃户有田宅産業妄被人破除並縁欠負租庸親隣貨賣及其歸復無所依投永言此流須加安輯應復業者宜並給還縱已代出租庸不在徴陪之限書云咸秩羣望詩曰懐柔百神永惟明徴豈忘昭報今秋稼穡頗勝常年實頼靈祗福臻稔歳其五嶽四瀆所在山川及得道升仙靈迹之處宜委郡縣長官至秋後各令醮祭務崇嚴潔式展誠享無廣屠宰以備牲牢其天下侍老宜各量賜米麥又親人之要令長為重比雖精選未盡徴求卓魯之才或遺蒲宻之化安寄宜令京官五品已上正員文官三品已上正員武官及郎中御史各舉堪任縣令一人具名申省委有司試擇奏授其有善惡賞罰與舉主並同僚作期限一時令集王制下士視上農周政庻士陪禄若衣食既足則亷耻乃知至於資用靡充或貪求不已敗名冒法實此之繇輦轂之下尤難取給其在兩京文武九品已上正員既親於職務可謂勤心自今已後毎月給俸食雜用防閤庻僕等宜十分為率加二分其同正員官加一分仍永為常式其南衙九品已上并京兆府畿令等宜共賜物二萬疋左右龍武軍各賜一千疋其唐元功臣念言勲舊宜異常倫兩軍各賜物二千疋餘各有差庻生成之澤自葉而流根慶賞之恩繇𠂻以暢物宜宣示遐邇知朕意焉十五載八月庚辰𤣥宗至蜀郡癸未大赦天下制曰朕以薄德嗣守神噐何甞不乾乾惕勵勤念蒼生至於水旱或愆則禱祠請罪邉鄙微擾則齋戒思過聿來四紀人亦小康蓋祖宗之靈卿大夫之助也是以推心将相不疑於物而奸臣兇黨負信背恩創剥我黎元暴亂我函夏皆朕不明之過豈復尤人哉楊國忠厚歛害時已肆諸原野安禄山亂常搆禍尚逋其斧鉞朕用廵巴蜀訓勵師徒命元子北畧朔方諸王分守重鎮合其兵勢以定中原将盪滌煩苛大革前弊思與億兆約法惟新上以奉宗廟神祇下以寧華夷動植可大赦天下其天寳十五載八月一日昩爽已前大辟罪已下常赦所不免者咸赦除之自兵興已來有破家者一切與雪流人一切放還左䧏官各還舊資内外文武官節級賜階爵安禄山脅從官有能改過自新背逆歸順並原其罪優與官賞册府元龜卷八十六
