body:
  text: 册府元龜卷一百五十七宋王欽若等撰總録部知音第二宋宗炳字少文南陽人妙善琹書謂人曰撫琴動操欲令衆山皆響古有金石弄為諸桓所重桓氏亡其聲遂絶惟炳傳焉文帝遣樂師楊觀就炳受之數徵詔竝不應顔師伯頗觧聲樂位至尚書僕射領丹陽尹范􅁮善彈琵琶能為新聲文帝欲聞之屢諷以㣲㫖􅁮偽若不曉終不肯為帝彈嘗宴飲歡適謂􅁮曰我欲歌卿可彈􅁮乃奉㫖帝歌既畢􅁮亦止絃位至右將軍太子詹事謝稚善吹笙官至西陽太守何承天能彈筝帝賜銀裝筝一靣位至御史中丞蕭思話善彈琴為侍中領左衛將軍甞從文帝登鐘山北嶺中道有盤石清泉帝使於石上彈琴因賜銀鍾酒謂曰相賞有松石間意張永為右光禄大夫曉音律孝武問永以太極殿前鐘聲嘶永荅鐘有銅滓乃扣鐘求其處鑿而去之聲遂清越戴顒字仲若父逵善琴書顒竝傳之凡諸音律皆能揮手㑹稽剡縣多名山故世居剡下顒及兄勃竝受琴於父父没所傳之聲不忍復奏各造新弄勃五部顒又制長弄一部竝傳於世衡陽王義季亟從之遊顒服其野服不改常度為義季鼔琴竝新聲變曲其三調遊絃廣陵止息之流皆與世異顒合何嘗白鵠二聲以為一調號為清曠中書令王綏甞㩦客造之勃等方進豆粥綏曰聞君善琴試欲一聴不荅綏恨而去顒隠遁有髙名沈懐逺吳興人大明中懐逺被徙廣州造繞梁其器與箜篌相似逺亡其器亦絶南齊褚淵善彈琵琶武帝在東宫賜淵金鏤柄銀柱琵琶太祖曲江宴羣臣數人各使効伎藝淵彈琵琶王僧䖍彈琴阮文季歌張敬兒舞王敬則拍王儉曰臣無所解惟知誦書因跪帝前誦相如封禪書帝笑曰此盛徳之事吾何以堪之淵位至司徒領驃騎將軍録尚書事王僧䖍為尚書令僧䖍解音律以朝廷禮樂多違古典民間競造新聲雜曲時太祖輔政僧䖍上表宜命有司緝理遺逸悉加補綴事見納蔡仲熊濟陽人也師事劉瓛學禮博聞瓛講月令畢謂學生嚴植曰江左以来隂陽律數之學廢矣吾今講此曾不得其髣髴仲熊謂人曰凡鍾律在南不容復得調平昔五音金石本在中土今既来南土氣偏陂音律􅆾爽仲熊官至尚書左丞蕭惠基永明中為太常加給事中自宋大明以来聲伎所尚多鄭衛淫俗雅樂正聲鮮有好者惠基觧音律尤好魏三祖曲及相和歌每奏帝輙賞恱不能已梁王冲為南郡太守曉音律習歌舞柳惲既善琴嘗以今聲轉棄古法乃著清調論具有條流惲初宋世有嵇元榮羊葢竝善彈琴云傳戴安道之法惲幼從之學特窮其妙竟陵王聞而引之以為法曹行叅軍雅被賞狎王嘗置酒後園有晉謝安鳴琴在側授惲惲彈為雅弄子良曰卿巧越嵇心妙臻羊體良質美手信在今辰豈可當世稱奇足可追蹤古烈累遷太子洗馬惲父世隆善彈琴世稱桺公雙璅為士流第一惲每奏其父曲常感思復變體偹寫古曲甞賦詩未就以筆挿捶琹坐客過以筯扣之惲驚其哀韻乃製為雅音後傳擊琴始自於此卞華字昭丘孤貧好學江左以来鍾律絶學至華乃通焉位至尚書儀曹郎吳令後魏陳仲孺神龜初自南歸國頗閑樂事請依前漢京房立准以調八音有司問仲孺言前被符問京房准定六十律之後雖有器存曉之者尠焉後漢熹平末張光等猶不能定絃之急緩聲之清濁仲孺自受何師出何典籍而云能曉答曰仲孺在江左之日頗愛琴又嘗覽司馬彪所撰續漢書見京房准衍成數昭然而張光等不能定仲孺不量庸昧竊有意焉遂竭愚思鑚硏甚乆雖未能測其㣲妙至無聲韻頗有所得度量衡厯皆出黄鍾雖造管察氣經史偹有但氣有盈虗黍有巨細差之毫釐失之千里自非管應時候聲騐吉凶則是非之源諒亦難定此則非仲孺淺識所敢聞之至於准者本以代律取其分數調較樂器則宫商易辨若尺寸小長六十宫商相與㣲濁若分數如短則六十徵羽類皆小清語其大本居然㣲異至於清濁相宜諧㑹歌管皆得應合雖積黍騐氣取聲之本清濁諧㑹亦須有方若閑准意則辨五聲清濁之韻若善琴術則知五調調音之體叅此二途以均樂器則自然應和不相奪倫如不練此必有乖謬按後漢順帝陽嘉二年冬十月行禮辟雍奏應鍾始復黄鍾作樂器隨月律是為十二之律必須次第為宫而商角徵羽以類從之尋調聲之體宫商宜濁徵羽用清若依公孫崇止以十二律聲而云還相為宫清濁悉足非惟未練五調調器之法至於五聲次第自是不足何者黄鍾為聲氣之元其管最長故以黄鍾為宫太蔟為商林鍾為徵則一往相順若均之八音猶須錯採衆聲配成其美若以應鍾為宫大吕為商㽔賔為徵則徵濁而宫清雖有其韻不成音曲若以夷則為宫則十二律中惟得取中吕為徵其商角羽竝無其韻若以中吕為宫則十二律内全無所取何者中吕為十二之竅變律之首依京房書中吕為宫乃以去滅為商執始為徵然後方韻而崇乃以中吕為宫猶用林鍾為商黄鍾為徵何繇可諧仲孺以為調和樂器文飾五聲非唯不妙若如嚴崇父子心賞清濁是則為難若依案見尺作准調絃緩急清濁可以意推爾但音聲精㣲史傳簡畧舊誌惟云准形如瑟十三絃隠間九尺以應黄鍾九寸調中一絃令與黄鍾相得按盡以求其聲聲遂不辨准須柱以成柱有髙下絃有粗細餘十二絃復應若為致令攬者迎前拱手又按房准九尺之内若一十七萬七千一百四十七分一尺之内為萬九千六百八十三分又復十之是為於准一寸之内亦有萬九千六百八十三分然則於准一分之内乘為二千分又為小分以辨强弱中間至促雖離朱之明猶不能窮而分之雖然仲孺私曾考騐但前却中柱使入准嘗尺分之内則相生之韻已自應合然分數既㣲器宜精妙其准面平直須如停水其中絃一柱髙下須與二頭臨岳一等移柱上下之時不使離絃不得舉絃又中絃粗細須與琴宫相類中絃須施軫如琴以軫調聲令與黄鍾一管相合中絃下依數盡出六十律清濁之節其餘十二絃須施柱如筝又凡絃皆須素張使臨時不動即於中絃按盡一周之聲度著十二絃上然後依相生之法以次運行取十二律之商徵商徵既定又依琴五調調聲之法以均樂器其琴調以宫為主清調以商為主平調以角為主五調各以一聲為主然後錯採衆聲以文飾之方如錦繡自上代来消息調准之方竝史文所畧出仲孺愚思若事有乖此則音不和平仲孺尋准之分數精㣲如彼定絃緩急艱難若此而張光等視掌尚不識藏中有准既未識其器又安能施絃也且燧人不師資而習火廷夀不束脩以變律故云知之者欲教其無從心達者體知而無師茍有毫釐所得皆闗心抱豈必要經師授然後為竒哉但仲孺自省庸淺才非一足下可粗識音韻纔言其理致爾時尚書蕭寳寅又奏金石律呂制度調均自古以来尠或通曉仲孺雖粗述書文頗有所說而學不師授云出已心又云舊器不任必須更造然後克諧上違用舊之㫖輕欲制造臣切思量不合依許詔曰禮樂之事非常人所眀可如其所源懐為車騎大將軍雅知音律雖在白首至安居之暇常自操絲竹髙允好音樂每至伶人絃歌鼔舞常擊節稱善位至中書令柳諧善鼔琴以新聲手勢京師士子翕然從學除著作佐郎裴靄之字幼重好琴書其内弟柳諧善鼔琴靄之師諧而㣲不及也官至平東將軍汝南太守趙煦字賔有好音律以善歌聞於世位至秦州刺史北齊李搔字徳沈少聰敏善音律曾採諸聲别造一器號曰八絃時人稱其思理位至尚書議郎鄭述祖能鼔琴自造龍唫十弄云嘗夢人彈琴寤而寫得當時以為絶妙位至兖州刺史爾朱文畧聰明雋爽多所通習文襄嘗令隂永興於馬上彈胡琵琶奏十餘曲試使文畧寫之遂得其八帝戲之曰聰眀人多不夀耉梁郡以父蔡為梁王襲封梁其慎之文畧對曰命之修短皆在明公帝愴然曰此不足慮也李神威幼有風裁好音樂撰集樂書近於百卷位至尚書左丞後周斛斯徵為太常卿解音律樂有錞于者近代絶無此器或有自蜀得之皆莫之識徵見之曰此錞于也衆弗之信徵遂依于寳周禮注以芒筒捋之其聲極清衆乃歎服徵仍取以合樂焉長孫紹逺為太常卿廣召工人創造樂器土木絲竹各得其宜唯黄鍾不調紹逺每以為恨嘗因退朝經韓使君佛寺前過聞浮圖三層之上有鳴鐸焉忽聞其音雅合宫調取而配奏方始克諧紹逺乃啓明帝行之隋蘇䕫與鄭鐸何妥議樂得罪議寢不行著樂志十五篇以見其志數載拜太子舍人以罪免居數年仁夀十年詔天下舉達禮樂之源者晉王昭時為雍州牧舉䕫應之與諸州所舉五十餘人謁見帝望䕫謂侍臣曰惟此一人稱吾所舉位至光禄大夫長孫覽尤曉鍾律位至涇州刺史萬寳嘗父大通從梁將王琳歸於齊後復謀還江南事泄伏誅繇是寳嘗被配為樂戸因而妙達鐘律遍工八音造玉磬以獻於齊又嘗與人方食論及聲調時無樂器寳嘗因取前食器及雜物以箸扣之品其髙下宫商畢諧於絲竹大為時人所賞然歴周洎隋俱不得調開皇初沛國公鄭譯等定樂初為黄鍾調寳嘗雖為伶人譯等每召與議然言多不用後譯樂成奏之帝召寳嘗問其可否寳嘗曰此亡國之音豈陛下之所宜聞帝不悦寳嘗因極言樂聲哀怨淫放非雅正之音請以水尺為律以調樂器帝從之寳嘗奉詔遂造諸樂噐其聲率下鄭譯調二律并撰樂譜六十四卷具論八音旋相為宫之法改絃移柱之制為八十四調一百四十四律變化終於一千八百聲時人以周禮有旋宫之義自漢魏以来知音者皆不能通見寳嘗特創其事皆哂之至是試令為之應手成曲無所凝滯見者莫不嗟異於是損益樂器不可勝紀其聲音雅淡不為時人所好太常善聲者多排毁之寳嘗嘗聴太常所奏樂泫然而泣人問其故寳嘗曰樂聲滛厲而哀天下不乆相殺將盡時四海全盛聞其言者皆謂為不然大業之末其言卒驗後無人贍遺竟餓而死及將死也取其所著書而焚之曰何用此為見者於火中探得數卷見行於世時論哀之寳嘗死開皇之世鄭譯何妥盧賁蘇䕫蕭吉竝討論墳籍撰著樂書皆為當時所用至於天然識樂不及寳嘗逺矣安馬駒曹妙達王長通郭全樂等能造曲為一時之妙多習鄭聲而寳嘗所為皆歸於雅此軰雖公議不附寳嘗然皆心服謂以為神曹妙達安馬駒皆北齊人開皇初以藝逰王公之門新聲變曲傾動當世天子不能禁也帝嘗令妙達理郊廟樂成寫傾杯行天之聲鄭譯知鐘律位至上柱國王令言樂人也好妙達音律大業末煬帝將幸江都令言之子嘗從於戸外彈胡琵琶作翻調安公子曲令言時卧室中聞之大驚蹶然而起曰變變急呼其子曰此曲興自早晚其子對曰頃来有之令言遂歔欷流涕謂其子曰汝慎無從行帝必不反乎問其故令言曰此曲宫聲往而不反夫宫者君也吾所以知之唐張文收善音律嘗覽蕭吉樂譜以為未甚詳悉乃取歴代公革截竹為十二律吹之備盡旋宫之義太宗召文收於太常令與少卿祖孝孫叅定雅樂太樂有右鐘十二近代用其七餘有五鐘俗號啞鐘莫能通者文收吹律調之聲皆響徹時人咸服其妙尋授恊律郎總章中潤州得玉磬以獻文收扣其一曰是音其歳閠月造者得月數當十三今闕其一於黄鍾東九尺掘得焉下州求之如其言而得也趙師字邪利天水人也善琴貞觀初獨歩上京嘗云吳聲清婉若長江廣流綿綿徐逝有國士之風蜀聲躁急若擊浪奔雷亦一時也李嗣真為始平令皇太子賢使樂工於東宫新作寳慶之曲曲成而工者奏於太清觀嗣真謂道士劉槩輔儼曰此樂宫商不和君臣相阻之徵也角徵失次父子不恊之兆也殺聲既多哀調又苦國家無事則太子受其咎也居數月而賢廢槩儼奏其事擢嗣真為太常丞使知五禮儀注嗣真私謂人曰禍猶未巳上風柔緩日侵不親庶務事無巨細决於中宫持權與人収之不易宗室雖衆皆在散位居中制外其勢不敵吾恐諸王藩翰皆為中宫所蹂踐矣且自隋以来樂府堂堂之曲再言堂者是堂氏冄受命也若中宫僣擅復歸子孫則為受命矣近日閭巷又有側堂堂撓堂堂之謡側者不正之辭撓者不安之稱吾見患難之作不復乆矣唐承周隋離亂之後樂懸散失獨無徵音國性所闕知者莫敢聞達其事天后末嗣真為御史大夫嘗宻求之不得一旦秋爽聞碪聲有應者在今弩營是當時英公宅又數年無繇得之其後敬業舉兵敗天后潴其宫嗣真乃求得喪車一鐸入而振之於東南隅果有應者遂掘之得石一叚裁為四具補樂懸之散闕今享宗廟郊天柱簨簴者乃嗣真所得者也裴知古為太常令神龍元年正月則天享太廟知古謂萬年令元行冲曰金石諧和當有吉慶之事其在唐室子孫乎其月中宗即位知古路逢乘馬者聞其聲切云此人當墜馬好事者隨觀之行未半里馬驚墜殆死嘗觀人迎婦聞佩玉聲曰此婦人不利姑是日姑有疾其知音皆此類也衛道弼近代言樂為最天下莫能以聲欺者曹紹䕫次之弼䕫皆為太樂令享北郊監享御史有怒於䕫欲以樂不和為之罪雜扣鐘聲使䕫闇名之無誤繇是反欵伏又雒陽有僧房中磬日夜自鳴僧以為怪懼而成疾求術士百方禁之終不能已紹䕫素與僧善来問疾僧具以告俄擊齋鐘磬復作聲紹䕫笑曰明日可設盛饌當相為除之僧雖不信紹䕫言冀其或效乃具饌以待紹䕫食訖出懐中錯鑪聲數處而去遂絶僧告問其所以紹䕫云此磬與鐘律合故擊彼此應僧大喜疾亦愈姚誾梁國公崇之姪孫妙於絲竹位至城父令王維博學多藝人有得奏樂圖不知其名維視之曰霓裳第三疊第一拍也好事者集樂工按之一無差忒咸服其精思官至尚書右丞宋沇善音律太常乆亡徵調沇考鐘律得之李勉罷相為太子太師善鼓琴好属詩妙知音律能自製琴又巧思衛次公為渭南尉次公善鼔琴京兆尹李齊運使其子交歡意次公誨之琴次公不許繇是終身未嘗操絃位至淮南節度使杜式方為太常寺主簿明練鐘律有所考定深為卿髙郢所賞韓皋生知音律嘗觀彈琴至止息歎曰妙哉􅄞生之為是曲也其當晉魏之際乎其音主商商為秋聲秋也者天將揺落肅殺其嵗之晏乎又晉乘金運商金聲此所以知魏之季而晉將代也慢其商絃與宫同音是臣奪君之義也所以知司馬氏之將簒也司馬懿受魏明帝顧託後嗣反有簒奪之心自誅曹爽逆節彌露王陵都督揚州謀立荆王彪母丘儉王欽諸葛誕前後相繼為揚州都督咸有興復魏室之謀皆為懿父子所殺叔夜以揚州故廣陵之地彼四人者皆魏室文武大臣咸敗於廣陵散言魏氏散亡自廣陵始也止息者晉雖暴興終止息此也其哀憤躁蹙疾痛廹脅之音盡在於是矣永嘉之亂其應乎叔夜撰此將貽後代之知者且避晉魏之禍所以託之神鬼也皋之於音可謂至矣位至左僕射東都留守崔令卿為太常丞文帝欲造雲韶樂曲召令卿對令卿指陳根本兼言聲音之道帝歎異乆之遷太僕卿令卿善吹律盡批其管使如簫焉以吹之諧於金石絲竹之音自近代通於聲律者無與令卿為比雲朝霞文宗朝以善吹笛進文宗為新聲雅樂朝霞能承意變聲頗符帝㫖為教坊副使李可及咸通中伶官善音律尤能轉喉為新聲音辭曲折聽者忘倦京師屠酤少年效之謂之拍彈時同昌公主除䘮懿宗與郭淑妃悼念不已可及為作歌百年舞曲舞人皆盛飾珠翠仍畫魚龍地衣以列之曲終樂闋珠翠覆地詞語悽惻聞者流涕又嘗於安國寺作菩薩蠻舞帝益憐之周王仁裕初仕晉為司封郎中仁裕為文之外亦曉音律天福五年八月戊申宴羣臣於永福殿樂奏黄鍾仁裕曰音不純肅聲不和振其將有爭者乎或問之曰奚以知其然對曰夫樂有天地辰宿有軌數形色有隂陽逆順有離合隱見天數五地數六六五相合十一月而生黄鍾黄鍾者同律之主五音之元宫也子寅卯巳未酉戌謂之羽子寅辰午未酉亥謂之宫子丑卯巳未申戌謂之角子卯辰巳未酉戌謂之商四者靡靡成章峻而且厲鄭衛之音此之謂也雖髙有所忽㣲中有所闕漏與夫推歴生律以律合吕九六之偶旋相為宫三正生天地之美七宗固隂陽之序者於其通人神宣嵗功生成軌儀之徳紀協長大之算則精粗異矣在乎審治亂察盛衰原性情應形兆則殊途而同歸也三正者一為天二為地三為人七宗者黄鍾為宫太簇為商姑洗為角林鍾為徵南吕為羽應鍾為變宫㽔賔為變徵角為木商為金宫為土變徵為日變宫為月徵為火羽為水龍角元龜天豕井候主乎角平亢河鼔婁聚輿鬼主乎商天根須女庖爼烏喙主乎宫辰馬隂虚旄頭天都主乎變徵大火丘封天髙烏摶主乎變宫龍尾元室四兵天倡主乎徵天津東璧參代輹車主乎羽角之數六十有四商之數七十有二宫之數八十有一變徵之數五十有六變宫之數四十有二徵之數五十有四羽之數四十有八極商之數九十陽之數一百二十有八隂之數一百一十有二五音之數畢矣神無形而有化處乎聲數之間故昭之以音合之以筭音以定主筭以求象觸於耳而徹於心繇是而知也夫何疑哉王朴為樞宻使朴多所該綜至如星緯聲律莫不畢殫其妙所撰大周欽天厯及律准并行於世册府元龜卷八百五十七
