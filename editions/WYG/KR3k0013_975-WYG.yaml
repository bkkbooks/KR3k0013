body:
  text: 册府元龜卷九百七十五宋王欽若等撰外臣部褒異第三唐𤣥宗開元十年正月壬子蠻大酋長張化誠大酋望楊大充並來朝以化誠為左領軍衛員外將軍放還蕃以大充為右驍衛翊府員外中郎將留宿衛三月丁卯突厥騎施大首領葛邏昆池等八人來朝並授將軍賜紫袍金帯放還蕃四月丁酉契丹首領松漠府都督李欝干為松漠郡王奚首領饒樂府都督李魯蘇為饒樂郡王各賜物一千匹銀器七十事及錦袍鈿帯等五月戊午突厥遣大首領阿史徳􅚐泥熟來求和授右驍衞大將軍員外置放還蕃閏五月癸巳黒水酋長親屬利稽來朝授勃州刺史放還蕃勃蕃中州也七月甲戍契丹遣使大首領楷落來朝授郎將放還蕃丙子奚遣其兄奴黙俱及聓鏁高來朝皆授將軍賜紫袍銀鈿𢃄金魚袋留宿衛九月己巳大拂湼靺如價及鐵利大拂湼買取利等六十八人來朝並授折衝放還蕃突厥大首領可還拔䕶他滿逹干來朝授將軍放還蕃堅昆大首領伊悉鉢舍友者畢施頡斤來朝授中郎將放還蕃十月己亥鐵利靺鞨可婁計來朝授郎將放還蕃十一月辛未渤海遣使其大臣味勃計來朝并獻鷹授大將軍賜錦􅂁金魚袋放還蕃十二月戊午黒水靺鞨大酋長倪屬利稽等十人來朝並授中郎將放還蕃十一年三月辛巳北庭十姓大首領沙羅烏卒來朝授郎將放還蕃四月己未吐蕃首領張甘松來降授員外鎭將留宿衛奚首領李日越等來朝授員外折衝留宿衛七月戊辰突厥大首領阿史那瑟鉢逹干等三十二人來朝授瑟鉢逹干大將其屬並授郎將放還蕃十一月甲戍突厥遣其大臣可邏拔䕶他滿庭于來朝授將軍紫袍金𢃄放還蕃堅昆大首領俱力貧賀忠頡斤來朝授郎將放還蕃越喜靺鞨勃施計拂湼靺鞨朱施䝉鐵利靺鞨倪處梨俱來朝並授郎將放還蕃十二年二月丙申鐡利靺鞨洖池蒙來朝授將軍放還越喜靺鞨奴布利等十二人來朝並授郎將放還蕃兀部落佐破等十一人來朝並授果毅放還蕃拂湼靺鞨大首領魚可蒙來朝授郎將放還蕃乙巳奚遣大首領李奚奴等十人來賀正渤海靺鞨遣其臣賀祚慶來賀正新羅遣其臣金武勲來賀正勃律遣大首領蘇磨羅來賀正並進階㳺撃將軍各賜帛五十疋放還蕃丙辰黒水靺鞨大首領屋作箇來朝逹莫婁大首領諾皆諸來朝並授折衝放還蕃丁巳契丹遣使湼禮來賀正并獻方物授將軍賜綵一百疋放還蕃三月癸酉遣使齎絹綿八萬叚分賜奚及契丹勅曰公主出降蕃王本擬安養部落請入朝謁深慮勞煩朕知割恩抑而未許思加殊惠以慰遠心奚有五部落宜賜物三萬段其中取二萬段先給征行逰奕兵及百姓餘一萬段與東光公主饒樂王衙官刺史縣令契丹有八部落宜賜物五萬段其中取四萬段先給征行逰奕兵士及百姓餘一萬叚與燕公主松漠王衙官刺史縣令其物雜以絹布務令均平給訖奏聞五月辛酉新羅賀正使金武勲還蕃上降書謂新羅王金興光曰卿每承正朔朝貢闕庭言念所懷深可嘉尚又得所進雜物等並踰越滄波䟦渉草莾物既精麗深表卿心今賜卿錦􅂁金帯及綵素共二千疋以答誠獻至宜領也乙酉鐡利來朝並授折衝放還蕃松漠府契丹遣使來朝饒樂府奚遣使獻麝香並授折衝放還蕃七月壬戌突厥遣使哥解頡利發獻方物求婚宴于朝堂賜帛五十疋丁丑尸利佛誓國王遣使俱摩羅獻侏儒二人價耆婦女一人雜樂人一部及五色鸚鵡授摩羅折衝賜帛一百疋放還蕃八月庚子制曰尸利佛誓國三尸利陁羅拔麾逺脩職貢載勤忠欵嘉其乃誠宜有褒賜可遥授左威衛大將軍賜紫􅂁金鈿𢃄十二月辛卯突厥遣使裴啜羅來朝授郎將還蕃戊午突厥遣其大臣阿史徳􅚐泥熟來朝授將軍賜紫􅂁金𢃄魚袋放還蕃十三年正月辛丑契丹奚遣使來賀正旦獻方物並授中郎將賜紫袍銀鈿𢃄放還蕃黑水靺鞨遣其將五郎子來賀正旦獻方物授將軍賜紫袍金𢃄魚袋放還蕃丙午大食遣其將蘇黎等十二人來獻方物並授果毅賜緋袍銀帯放還蕃三月丙午鐡利靺鞨大首領封阿利等一十七人來朝越喜靺鞨苾利施來朝黒水靺鞨大首領烏素可蒙來朝佛湼靺鞨薛利蒙來朝並授折衝放還蕃四月甲子渤海首領謁徳黒水靺鞨諾箇蒙來朝並授果毅放還蕃五月渤海王大武毅之弟大昌勃價來朝授左威衛員外將軍賜紫袍金𢃄魚袋留宿衛黒水部落職紇蒙等二人來朝授中郎將賜紫袍銀帯金魚袋放還蕃七月戊申波斯首領穆沙諾來朝授折衝留宿衛突厥首領采施裴羅來朝授折衝放還蕃十四年正月壬午突厥遣其大臣臨河逹干康思琮來朝授將軍放還蕃丙午奚御史郡王父李綴進位右武衛員外大將軍及奚弱水州刺史李高進階鎭軍大首領曰走等二百餘人並授郎將及契丹衙官熟蘇進階鎭軍大將軍契丹縣令屬固家進位右領軍員外大將軍契丹部落寃離等百餘人並授郎將各賜紫袍放還蕃以陪位泰山脩行賞之典也乙亥突騎施可汗遣首領阿句支來獻馬授中郎將放還蕃突厥遣首領􅎤跌裴啜等七千餘人來朝並授折衝放還蕃辛亥突厥遣使執失頡利發等三百餘人來賀東封並授果毅放還蕃三月丙戍契丹遣其臣邵固來朝授郎將放還乙酉渤海靺鞨王大都利來朝四月癸丑契丹遣大首領李濶池等六人來朝皆授折衝留宿衛乙丑渤海靺鞨王大都利來朝授左武衛大將軍員外置留宿衛勃羅遣使金忠臣來賀正賜帛百疋放還蕃五月戊子新羅遣其弟金欽質來朝授郎將放還蕃乙未契丹部落刺史普固都及將軍顒歌皆獻戎㨗授固都將軍顒歌郎將各賜帛百疋放還蕃六月甲寅奚遣阿布高來朝授中郎賜紫袍金魚袋放還蕃七月癸卯丹部落刺史出利縣令蘇固多等來朝授出利將軍固多郎將並放還蕃十一月己卯吐火羅遣使持健來朝授中郎將賜紫􅂁金魚袋己亥突厥遣其大臣梅禄啜來朝授將軍賜紫􅂁金鈿𢃄放還蕃十五年正月壬午笮州大首領鄧封奬白州大首領董芳檐並來朝咸授折衝放還蕃辛卯新羅遣使來賀正授奉御賜緋袍銀𢃄魚袋放還蕃二月辛亥鐡利靺鞨米象來朝授郎將放還蕃羅和異國大城主郎將波斯阿拔來朝賜帛百疋放還蕃因遣阿拔齎詔書宣慰于佛誓國王仍賜錦袍鈿𢃄及薄寒馬一匹三月丁酉契丹遣首領諾括來送質子并獻方物授郎將放還蕃四月丁未勅曰渤海宿衞王子大昌勃價及首領等乆留宿衞宜放還蕃庚申封大昌勃價襄平縣開國男賜帛五十疋首領已下各有差先是渤海王大武藝遣男利行來朝并獻貂䑕至是乃降書與武藝慰勞之賜綵練一百疋六月乙丑瀚海大首領康移棧䫻來朝授左領軍衛將軍賜紫袍銀鈿𢃄金魚袋放還蕃十一月己酉契丹大首領承嗣來朝授中郎將放還蕃丙辰鐡利靺鞨首領失伊蒙來朝授果毅放還蕃十六年二月庚午奚質子右領軍衛將軍李如越卒制贈左驍衞大將軍官造靈轝給逓還奚三月戊申金蒲州都督沙陁輔國之母䑕尼施氏封為鄯國夫人辛亥大食首領提卑多等八人來朝並授郎將放還蕃四月己巳䕶密國王遣米國大首領米忽汗來朝且獻方物授將軍賜紫袍金𢃄放還戎癸未渤海王子留宿衛大都利行卒贈特進兼鴻臚卿賜絹三百疋粟三百石命有司弔祭官造靈轝歸蕃壬申蠻大首堅洪充垂來朝授中郎將留宿衛七月丙辰新羅金興光使從弟金嗣宗來朝且獻方物授果毅留宿衛八月丁丑契丹廣化王李邵固遣其子諾括來朝授大將軍賜紫袍金𢃄放還蕃奚大首領特没干來朝授中郎將賜紫袍金𢃄放還蕃己卯突厥大首領屈逹干來朝授將軍放還蕃九月壬寅突厥大首領葛邏禄伊難如裴等來朝並授中郎將賜紫袍銀鈿𢃄放還蕃渤海靺鞨菸夫須計來朝授果毅放還蕃十月丁丑勃律大首領吐毛檐没師來朝授折衝賜紫袍金𢃄放還蕃奚首領李窟何來朝授左威衞將軍賜紫袍金𢃄放還蕃丙戍吐蕃莾悉曩等來朝授鎮將賜緋遣之十一月乙酉右羽林軍大將軍兼安西副大都䕶四鎭節度等副大使謝知信卒贈涼州都督賻物五百段官造靈轝給逓還鄉十七年正月庚戌骨咄俟斤遣男骨都施來朝獻馬二疋授郎將賜帛三十段放還蕃甲寅米國遣獻胡旋女子三人及豹子各一賜帛百疋以遣之三月甲子渤海靺鞨王大武藝使其弟大胡雅來朝授㳺擊將軍賜紫袍金𢃄留宿衛三月壬寅䕶密國大首領烏鶻逹干來朝吐火羅葉䕶骨咄國並遣使來朝癸卯渤海靺鞨遣使獻鯔魚賜帛二十疋遣之己巳奚及契丹遣使來朝皆賜紫袍金𢃄放還蕃五月壬寅契丹遣衙前將軍粹來朝授懷化大將軍賜紫袍金𢃄放還蕃六月癸丑突騎施大首領葉支阿布思來朝授郎將賜紫􅂁金𢃄魚袋八月丁卯渤海靺鞨王遣其弟大琳來朝授中郎將留宿衛九月乙未大食國遣使來朝且獻方物賜帛百疋放還蕃十八年正月戊寅吐蕃靺鞨遣其弟大郎雅來朝賀正獻方物波斯國王及新羅國王各遣使來朝賀正各賜帛有差壬子大佛湼靺鞨兀異來朝獻馬四十疋授左武衛折衝賜帛三十叚留宿衛二月甲戌新羅國王金興光遣姪志滿獻小馬五疋狗一頭金二千两頭髮八十两海豹皮十張乃授志滿太僕卿員外置同正員絹一百疋紫袍銀鈿𢃄魚袋留宿衛戊寅突厥遣使哥解骨支車鼻頡斤來朝獻方物渤海靺鞨遣使智蒙來朝且獻方物馬三十疋授中郎將賜絹二十疋緋袍銀𢃄放還蕃四月戊戌米國石國吐蕃突厥各遣使來朝貢並賜帛有差放還蕃五月戊申契丹遣使獻馬十二疋賜帛放還蕃己酉渤海靺鞨遣使烏那逹利來朝獻海豹皮五張貂䑕皮三張瑪瑙盃一馬三十匹授以果毅賜帛放還蕃壬午黒水靺鞨遣使阿布思利來朝獻方物賜帛放還蕃六月戊午黒水靺鞨大首領倪屬利稽等十人來朝並授中郎將放還蕃九月乙丑靺鞨遣使來朝獻方物賜帛放還蕃十月庚戌新羅國遣使來朝貢獻方物賜帛有差甲寅䕶密國王羅眞擅來朝獻方物賜帛兼袍銀鈿𢃄留宿衞十一月甲子波斯首領穆沙諾來朝獻方物授折衝留宿衛丁卯突厥首領米旅裴羅來朝授折衝放還蕃壬申契丹奚遣使來朝且獻方物賜帛放還蕃十九年二月辛丑室韋遣使賀正授將軍放還蕃癸卯遠蕃靺鞨遣使賀正授將軍放還蕃戊午新羅遣其臣金志良來賀正授太僕少卿員外置賜帛六十匹放還蕃降書與新羅金興光曰所進牛黃及金銀等物省表具知卿二明慶祚三韓善鄰時稱仁義之鄉代著勲賢之業文章禮樂聞君子之風納欵輸忠効勤王之節固蕃維之鎭衛諒中外之儀表豈殊方悍俗可同年而語耶加以慕義克勤述職愈謹梯山航海無倦於阻脩獻幣貢琛有常於歲序守我王度垂諸國章乃眷懇誠深可嘉尚朕每晨興佇念宵衣待賢想見其人以光啓沃俟卿覯止允副所懷今使至知嬰疾苦不遂祗命言念遐濶用增憂勞時候暄和想痊復也今賜卿綵綾五百疋帛二千五百疋宜即領取己未渤海靺鞨遣使來朝正授將軍賜帛一百疋還蕃壬申突厥遣其大首領哥解骨支比施頡斤等五十人來朝並授折衝賜帛五十疋放還蕃四月辛巳突厥可汗弟闕特勒卒帝降書弔之曰皇帝問突厥苾伽可汗國家惠綏黎蒸保乂函夏無有遠邇思致和平俾有厥休共登仁壽之域既罹于咎豈忘匍匐之救況可汗乆率忠順屢通欵誠既和好克脩固災患是恤今聞可汗闕特勒没喪良用撫然想友愛情深家國任切追念痛惜何可為懷今申弔賻并遣致祭喻意㫖薦兹禮物是年十一月詔金吾將軍張去逸都官郎中吕向賫璽書入戎弔并為立碑文帝自為碑文仍立祠刻石為像六月甲午突厥大首領蘇農屈逹干來朝授郎將賜帛五十疋放還蕃十月癸巳突厥遣其大臣蘇農屈羅逹干等二十四人來朝並授郎將各賜帛六十疋放還蕃領西室韋遣使來朝賜帛五十疋放還蕃渤海靺鞨王其大姓取珎等百二十人來朝並授果毅各賜帛三十疋放還蕃二十年正月壬子奚國義王遣其首領佃蘇等來朝並授將軍賜帛有差放還蕃庚申新羅遣使賀正奚遣使賀正並授郎將賜帛有差放還蕃二月癸巳突厥首領烏鶻逹干來朝賜帛二十疋放還蕃三月壬戌西南蠻蒙崇先來朝授郎將賜帛三十匹放還蕃室韋大首領薛勃海恍來朝授郎將賜帛五十疋放還蕃七月庚子突厥可汗堂弟阿支監擦來朝授將軍放還蕃八月庚戍波斯王遣首領潘那蜜與大徳僧及烈來朝授首領為果毅賜僧紫袈裟一副及帛五十疋放還蕃二十一年正月庚申命太僕卿員外置同正員金思蘭使于新羅思蘭本新羅之行人恭而有禮因留宿衛及是委以出疆之任且便之也三月乙卯突厥遣使斯壁紆思鮮闕等十六人來朝並授郎將賜帛六十匹放還蕃閏三月辛卯箇失密王木多筆遣大徳僧物理多年來獻表詔引物理多年宴于内殿賜絹五百疋數日放還蕃四月壬戍奚首領屬鶻留來朝授果毅賜絹四十疋留宿衛突厥大使烏鶻逹干來朝宴于内殿授將軍賜帛一百疋放還八月甲辰骨咄王遣大首領如逹干來朝授郎將放還蕃九月丙子䕶密國眞檀來朝宴于内殿授左金吾衛將軍員外賜紫袍𢃄魚袋等七事及帛百疋放還蕃戊寅突厥遣其大臣牟伽難逹干等十二人來朝並授郎將賜綵六十疋放還蕃十二月乙未新羅王興光遣姪志亷來朝謝恩也初帝賜興光白鸚鵡雄雌各一隻及紫羅繡袍金銀鈿器物瑞文錦五色羅綵共三百餘段興光表曰伏惟陛下執象開元聖文神武應千齡之昌運致萬物之嘉祥風雲所通咸承至徳日月所炤共被深仁臣地隔􅅫壺天慈洽遠鄉暌華夏睿澤覃幽伏覩瓊文跪披玉匣含九霄之雨露𢃄五彩之鵷鸞辨慧靈禽素蒼两妙或稱長安之樂或傳聖主之恩羅錦彩章金銀寳鈿見之者爛目聞之者驚心原其獻欵之功實繇先祖錫此非常之寵延及末孫㣲効若塵重恩如岳循涯揣分何以上酬詔饗志亷内殿賜以束帛石汗那王易米施遣大首領婆延逹干來朝授中郎將放還蕃癸丑大食王遣首領摩思覧逹干等七人來朝並授果毅各賜絹二十疋放還蕃二十二年正月壬子新羅王興光大臣金端竭丹來賀正帝於内殿宴之衛尉少卿員外賜緋襕袍平漫銀𢃄及絹六十疋放還蕃三月乙酉突厥遣其大臣斯壁紆思鮮闕來朝授左金吾衛大將軍員外賜紫衣銀袍繡半臂金鈿𢃄魚袋七事絹二百疋金銀器六事放還蕃癸丑西南蠻大酋率蒙歸義遣使獻麝香牛黄降書慰勉賜絹二千疋雜綵二百疋衣一副以酬之六月丙申林邑國遣使獻沈香賜帛三十疋放還蕃乙卯突騎施遣其大首領何羯逹來朝授鎭副賜緋袍銀𢃄及帛四十疋留宿衛十二月庚戍突厥毗伽可汗小殺為其大臣梅禄啜所毒而卒帝悼之輟朝三日勅曰情義所在禮固隨之豈限華夷唯其人耳突厥毗伽可汗頃者雖處絶域嘗以臣子事朕聞其永逝良用悼懷務廣宿恩以制權禮宜令所司擇日舉哀甲寅於雒城南門舉哀命宗正李佺申弔祭焉二十三年二月癸卯新羅賀正副使金榮死贈光禄少卿契丹蕃中郎可突于死贈左衛將軍四月甲午勃律國大首領拔含伽來朝授郎將賜帛五十疋放還蕃辛丑突厥首領觸木日昆黙逹干等四十二人來朝並賜緋袍銀𢃄放還蕃閏十一月壬辰新羅王遣從弟大阿飱金相來朝死于路帝深悼之贈衛尉卿十二月己卯契丹遣使渴胡等來朝授果毅留宿衛二十四年三月乙酉渤海靺鞨王遣其弟蕃來朝授太子舍人員外賜帛三十疋放還蕃辛卯突厥首領薩合朱來降授折衝員外置借緋魚袋留宿衛八月甲寅突騎施遣大首領胡禄逹干來求和許之宴于内殿授右金吾將軍員外置賜錦衣一副帛及綵一百疋放還蕃九月丁丑封于闐國王尉遲伏闍逹室氏為于闐妃十一月癸酉靺鞨首領聿棄計來朝授折衝賜帛五百疋放還蕃二十五年正月甲午大佛湼靺鞨首領九異來朝授中郎將放還蕃波斯王子繼忽娑來朝授中郎將放還蕃二月戊辰新羅國金興光卒先是二十二年以渤海靺鞨寇登州興光發兵助討破以功遂授興光開府儀同三司寧海使及卒帝悼惜乆之贈太子太保遣贊善大夫攝鴻臚少卿邢璹往其國行弔祭册立嗣子之禮帝親制詩序太子以下及百僚咸賦詩送璹帝謂璹曰新羅號為君子之國頗知書記有類中華卿至彼宜闡揚經典使知大國儒敎之盛又聞其多善奕棊因令善棊人楊季膺與璹等至彼大為蕃人所敬愛厚賂而還四月丁未渤海遣其臣公伯計來獻鷹鶻授將軍放還蕃八月戊申渤海靺鞨大首領多蒙固來朝授左武衛將軍賜紫袍金𢃄及帛一百疋放還蕃二十六年二月癸丑吐火羅遣大首領伊難如逹干羅底賝來獻方物授果毅賜緋袍銀𢃄魚袋及帛三十疋放還蕃六月丁未党項鶻攬支來降授果毅借緋魚袋與隴右節度驅使辛亥突厥遣大首領烏鶻逹干來朝授果毅放還蕃七月庚寅突厥首領特賜莫賀咄頡斤來朝授左金吾衛大將軍員外置賜錢錦袍繡半臂及帛三百疋放還蕃二十七年二月丙子突厥大首領延陁俱末啜刺逹干來朝授將軍賜紫袍金𢃄放還蕃二月丁未渤海王弟大朂進來朝宴于内殿授左武衛大將軍員外置同正賜紫袍金𢃄及帛一百疋留宿衛十月乙亥渤海遣使其臣優福子來謝恩授果毅賜紫袍銀𢃄放還蕃二十八年正月骨吐國大首領多攬逹干彌羯搓來朝授果毅放還蕃二月辛酉以突騎施部落處木昆匐延闕律啜為右驍衛員外大將軍阿史那洪逹為太僕員外卿三月癸卯冊新羅國王金承慶妻金氏為新羅王妃乙巳骨吐國遣大首領多博勤逹干刺勿來朝命有司享之賜帛六十匹放還落四月庚申吐蕃首領來歸賓等三人來降並授執㦸留宿衛辛未冊十姓可汗阿史那斯妻李氏為交河公主壬申冊于闐王尉遲珪妻蒍氏為于闐王妃七月乙巳首吐國大首領多攬逹干彌羯槎來朝授果毅放還蕃二十九年二月己巳渤海靺鞨遣其臣失阿利來賀正越喜靺鞨遣其部落烏舍利來賀正黒水靺鞨遣其臣阿布利稽來賀正皆授郎將放還蕃乙未婆羅門申天竺國王子承恩來朝授㳺擊將軍放還蕃四月丙寅突厥登利可汗死遣首領􅎤跌末思頡斤來告哀授頡斤果毅賜紫袍金𢃄放還蕃十二月丙申大食首領和薩來朝授左金吾衛將軍賜紫袍金鈿𢃄放還蕃天寳元年正月丁巳石國王遣使上表乞授長男那居車鼻施官詔拜大將軍賜一年俸料六月丙申賜三姓葉䕶都磨度闕頡斤鐡劵曰於戲善於國者賞必加焉自古哲王率繇是道咨爾三姓葉䕶左羽林軍大將軍員外置同正員咄禄仳加都磨度闕頡斤素稱驍悍兼藴智謀當蘇禄之時雖力有所屈而懇誠之至乃朕則知元惡既除効勤彌亮果能率衆相與歸降斯盡節於朝廷且立功於疆場信義若此嘉尚良深是用授卿寵章榮彼蕃部今賜卿丹書鐡劵傳之子孫永固河山有如日月可不愼歟十月己卯投降吐蕃白拘國四品籠官蘇唐封及狗舟川五品籠官薛阿封等各賜紫袍銀鈿𢃄金魚袋及帛三十疋癸未托悉密可汗大首領來朝賜錦袍金鈿𢃄魚袋及帛四十匹庚辰帝御花蕚樓出宫女讌毗伽可汗妻可敦及男女等賞賜不可勝紀二年正月丁卯契丹刺史匐從之等一百二十人奚刺史逹利胡等一百八十人並來朝冊勲皆授中郎將賜紫袍金鈿𢃄金魚袋放還蕃二月己丑解蘇國阿徳悉遣大首領車鼻施逹干羅頓毅等二十人來朝且獻方物各授中郎將賜紫袍金𢃄魚袋放還蕃七月癸亥渤海王遣其弟蕃來朝授左領軍衛員外大將軍留宿衛十二月乙巳新羅王遣弟來賀正授左清道率府員外長史賜緑袍銀𢃄放還蕃三載七月癸酉封曹國王米國王康國王母可敦並為郡夫人四載三月戊寅九姓首領囘鶻思力裴羅及弟阿悉爛頡斤殺斬白眉可汗傳首京師授裴羅右驍衛員外將軍頡斤右武衛員外將軍策勲也七月乙酉小勃律遣僧大徳三藏伽羅密多來朝授右金吾衛員外中郎將放還蕃八月戊申突厥伽可汗妻史氏内屬封賓國夫人仍每載賜錢百貫以充粧粉五載十月癸巳三葛邏禄苾伽葉䕶頓阿波移健啜遣使朝貢授葉䕶為左武衛大將軍員外置依舊在蕃其使賜二色綾袍金𢃄七事放還蕃七載八月庚戍悒怛國遣使朝貢授將軍賜二色綾袍金𢃄魚袋七事放還蕃戊午勃律國王蘇失利芝及三藏大徳僧伽羅密多並來朝授伽羅密多鴻臚員外卿放還蕃賜蘇失利芝紫袍金𢃄留宿衛給官宅八載八月乙亥䕶密國王羅眞檀來朝請宿衛授左武衛將軍留宿衛景子十姓突騎施遣使來朝授中郎將賜錦袍金𢃄魚袋二事放還蕃十月丁卯九姓勃曵固大毗伽都督黙每等十人來朝並授特進賜錦袍金鈿𢃄魚袋七事放還蕃十一載正月甲申米越長史宻利稽來朝授右衛將軍放還蕃二月丙申三葛邏禄遣使來朝賜錦袍金鈿𢃄魚袋七事放還蕃八月丙子囘鶻遣使來朝賜文武百官縑帛有差九月壬戍歸仁國遣使朝貢授中郎將賜紫袍金𢃄魚袋七事放還蕃十二月己卯黒衣大食謝多訶密遣使來朝授左金吾衛員外大將軍放還蕃舍磨國寧遠國並遣使來朝皆賜錦袍金𢃄魚袋七事放還蕃十二載七月辛亥黒衣大食遣大酋望二十五人來朝並授中郎將賜紫袍金𢃄魚袋放還蕃九月辛亥文單國王子率其屬二十六人來朝並授其屬果毅都尉賜紫金魚袋隨何履光于雲南征討事訖聽還蕃甲寅葛邏禄葉䕶頓毗伽生擒阿布思制授開府儀同三司封金山王依舊充葉䕶禄俸於北庭給其葉䕶妻及母並封為公國夫人十二月丁亥䕶密國遣大首領朝貢賜錦袍金𢃄魚袋七事事畢放還蕃十二載四月丙戌突騎施黒姓可汗及黒衣大食吐火羅右可汗郡俱位國並遣使來朝各賜帛有差放還蕃丁亥寧國及九姓廻紇米國並遣使來朝各賜錦袍金𢃄放還蕃五月壬寅帝以葛邏禄葉䕶有擒阿布思之功特降璽書曰卿歸心向化守節安邊嘗獻忠誠無失蕃禮見不善如鷹鸇之逐鳥雀嫉為惡似農夫之除蔓草信義若此嘉歡良多阿布思負恩至深為衆所棄卿能為擒獲送其形骸且此賊投卿本縁窮蹙茍欲延命元非好心卿密察奸謀俾其就戮卿之智畧難可比方又聞數男今見在彼種類既惡留用何為儻藴習頑兇攪擾蕃落處置不及追悔無繇可宜送來絶其後患卿今載已前俸禄並令京軍給付後慮其遼遠任於北庭請受所請印信並譯語人官並依來表今則别有少物賜卿至宜領取十四載三月丁卯陁拔國遣其王子自㑹羅來朝授右武衛員外中郎將賜紫袍金𢃄魚袋七事留宿衛康國王石國副王並遣使朝貢各授折衝都尉賜紫袍金𢃄魚袋七事放還蕃四月癸巳以投降蘇毗王子悉諾邏為左驍衛員外大將軍封懷義王賜姓李名忠信其屬官賜各有差六月壬子以寧遠國王子竇薛裕為左武衛員外將軍賜金袍鈿𢃄魚袋七事放還蕃册府元龜卷九百七十五
