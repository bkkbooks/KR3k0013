body:
  text: 册府元龜卷七十九宋王欽若等撰帝王部慶賜公羊傳云觸石而出膚寸而合不崇朝而雨天下者其泰山之雲乎夫王者渙然出令沛然施恩浹洽於四方􅆂濡於萬物其為大也豈直斯乎禮云立春之日賞公卿諸侯大夫於朝行慶施恵下及兆民季春之月布德行恵命有司發倉廪賜貧窮振乏絶開府庫出幣帛周天下勉諸侯立夏之日乃行慶賜無不欣悦書云大賚於四海而萬姓悦服又云一人有慶兆民賴之詩云蓼蕭澤及四海也此皆經義之著明者焉至若合醵以昭慈酺飲以宣恵牛酒穀帛以振孤窮賜爵版授以寵耆老盖班王澤和人心表治道之隆平示生民之愷樂者也然則古人有言羔豚而祭百官皆足太牢而祭不必有餘取其平施之義耳周武王克殷散鹿臺之財發鉅橋之粟大賚於四海萬姓悦服漢高祖為漢王二年二月賜民爵爵者禄位民賜爵有罪得以減也五年五月詔曰軍吏卒會赦其亡罪而亡爵及不滿大夫者皆賜爵為大夫故大夫以上賜爵各一級其七大夫以上皆令食邑非七大夫以下皆復其身及户勿事復其身及一户之内皆不徭賦也恵帝即位賜民爵一級中郎郎中滿六嵗爵三級四嵗二級中郎省中郎也外郎滿六嵗二級外郎散郎也中郎不滿一嵗一級外郎不滿二嵗賜錢萬謂作郎未經一嵗二嵗耳宦官尚食比郎中宦官閽寺也尚主也舊有五尚尚冠尚帳尚衣尚席主天子物曰尚主文書曰尚書又有尚符璽郎也漢儀注省中有五尚而内官婦人有諸尚謁者執楯執㦸武士騶比外郎執楯執㦸親近陛衛也武士力士也高祖使武士縳韓信是也騶騎也本廐之御者後又為騎因謂騶騎太子御驂乗賜爵五大夫舍人滿五嵗二級武士騶以上皆舊侍從天子之人也舍人以上太子之官屬賜給喪事者二千石錢二萬六百石以上萬五百石二百石以下至佐史五千律有斗食佐吏若今曹史書佐也自五百石下至於佐史皆賜五千今又言二百石者審備其等也視作斥上者將軍四十金斥上壙上也斥開也開土地為冡壙故以斥言之四十金四十斤金也近上二千石賜錢二萬此言四十金實金也下凡言黄金真金也不言黄謂錢也食貨志黄金一斤直萬錢諸賜言黄金者皆與之金不言黄者一金與萬錢也二千石二十金六百石以上六金五百石以下至佐史二金減田租復十五税一漢家初十五稅一儉於周十税一也中間廢今復之一云秦作阿房之宫收大半之賦遂行至此乃復十五而税一元年十二月賜民爵户一級五年九月長安城成賜民爵户一級文帝即位下詔曰丞相太尉御史大夫間者諸吕用事擅權謀為大逆欲危劉氏宗廟賴將相大臣列侯宗室誅之皆伏其辜朕初即位其赦天下賜民爵一級女子百户牛酒男賜爵女子賜牛酒賜爵者一家之長得之也女子謂賜爵者之妻子率百户共得牛若干頭酒若干石無定數也酺五日漢律三人已上無故羣飲罰金四兩今恩詔横賜得令聚會飲食五日酺布也言天子布恩於天下史記趙恵文王三年大赦置酒大酺五日景帝元年四月赦天下賜民爵一級三年十二月立皇子端為膠西王勝為中山王賜民爵一級四年六月赦天下賜民爵一級七年二月丁巳立膠東王徹為皇太子賜民爵一級中元年夏四月大赦天下賜民爵一級五年六月大赦天下賜民爵一級後元年三月大赦天下賜民爵一級中二千石諸侯相爵右庻長夏大酺三年正月皇太子冠賜民為父後者爵一級武帝建元元年二月赦天下賜民爵一級年八十復二筭九十復甲卒二算復二口之算也復甲卒不豫革車之賦也元光元年四月赦天下賜民長子爵一級二年九月令民大酺五日元朔三年秋令民大酺五日元狩元年四月丁卯立皇太子賜中二千石爵右庶長民為父後者一級又詔曰朕嘉孝悌力田哀夫老眊孤寡鰥獨或匱於衣食甚憐愍焉其遣謁者廵行天下存問致賜曰皇帝使謁者賜縣三老孝者帛人五匹鄉三老弟者力田帛人三匹年九十以上及鰥寡孤獨帛人二匹絮三斤八十以上米人三石有寃失職使者以聞縣鄉即賜毋贅聚贅會也各遣就所居處賜之勿會聚六年十月賜丞相以下至吏二千石金千石以下至乗從者帛乗騎諸從者也蠻夷錦各有差元鼎元年夏五月赦天下大酺五日四年十月行幸雍五畤賜民爵一級百户牛酒元封元年四月上登封太山還詔曰其以十月為元封元年行所巡至博奉高蛇丘歴城梁父民田租逋賦貸已除加年七十以上孤寡帛人二匹四縣無出今年算賜天下民爵一級女子百户牛酒自博至梁父凡五縣今云四縣毋出算者奉高一縣素以供神非筭限也二年四月上祠泰山塞決河還赦所過徒賜孤獨高年米人四石六月甘泉宫生芝九莖賜雲陽都百户牛酒都謂縣之所居在宫側者且賜不徧其境内故止稱其都非謂天子之都也五年夏四月詔曰朕巡荆揚輯江淮物會大海氣以合泰山輯合也物神也㑹合海神之氣合致於泰山然後修封總祭饗也上天見象増修封禪其赦天下所幸縣無出今年租賦賜鰥寡孤獨帛貧窮者粟六年三月祠后土賜天下貧民布帛人一匹太初二年三月行幸河東祠后土令天下酺五日太始三年春正月行幸甘泉二月幸東海登之罘浮大海冬賜所過户五千錢鰥寡孤獨帛人一匹二月令天下大酺五日昭帝始元元年春二月黄鵠下建章宫太液池中公卿上夀賜諸侯宗室金錢各有差七月赦天下賜民百户牛酒四年六月皇后見高廟賜長公主丞相將軍列侯中二千石以下及郎吏宗室錢帛各有差徙三輔富人雲陵賜錢户十萬五年六月賜中二千石以下至吏民爵各有差元鳳二年夏四月上自建章宫徙未央宫大置酒賜郎從官帛及宗室子錢人二十萬吏民獻牛酒者賜帛人一匹四年正月丁亥帝加元服見於高廟賜諸侯王丞相大將軍列侯宗室下至吏民金帛牛酒各有差賜中二千石以下及天下民爵毋收四年五年口賦三年以前逋更賦未入者皆勿收賜天下酺五日宣帝元年七月即位十一月壬子立皇后許氏賜諸侯王以下金錢至吏民鰥寡孤獨各有差本始元年五月鳳凰集膠東千乗赦天下賜吏二千石諸侯相下至中都官宦吏六百石爵各有差自左更至五大夫賜天下人爵一級孝者二級女子百户牛酒租税勿收二年六月尊武帝廟為世宗廟賜民爵一級女子百户牛酒四年三月乙卯立皇后霍氏賜丞相以下至都郎吏從官金錢帛各有差赦天下地節三年四月戊申立皇太子大赦天下賜御史大夫爵闗内侯中二千石爵右庶長天下當為父後者爵一級賜廣陵王黄金千斤諸侯王十五人黄金各百金列侯在國者八十七人黄金各人二十斤元康元年三月詔曰廼者鳳凰集泰山陳留甘露降未央宫朕未能章先帝休烈恊寜百姓承天順地調序四時獲䝉嘉瑞賜兹祉福夙夜兢兢靡有驕色内省匪懈永惟罔極書不云乎鳳凰來儀庶尹允諧其赦天下徒賜勤事吏中二千石以下至六百石爵自中郎吏至五大夫佐史以上二級民一級女子百户牛酒加賜鰥寡孤獨三老孝弟力田帛所賑貸勿收二年二月乙丑立皇后王氏賜丞相以下至郎從官錢帛各有差三月以鳳凰甘露降集賜天下吏爵二級民一級女子百户牛酒鰥寡孤獨高年帛三年春以神雀數集泰山賜諸侯王丞相將軍列侯二千石金郎從官帛各有差賜天下吏爵二級民一級女子百户牛酒鰥寡孤獨高年帛四年三月詔曰廼者神雀五采以萬數集長樂未央北宫高寢甘泉泰畤殿中及上林苑朕之不逮寡於徳厚屢獲嘉祥非朕之任其賜天下吏爵二級民一級女子百户牛酒加賜三老孝弟力田帛人二匹鰥寡孤獨各一匹神爵元年三月行幸河東祠后土詔曰朕承宗廟戰戰栗栗惟萬事統統緒也未燭厥理廼元康四年嘉穀𤣥稷降於郡國神爵仍集金芝九莖産於承徳殿銅池中允真獻竒獸南郡獲白虎威鳳為寶朕之不明震於珍物獲珍物而心驚動也飭躬齋精祈為百姓東濟大河天氣清浄神魚舞河幸萬嵗宫神雀翔集朕之不徳懼不能任其以五年為神雀元年賜天下勤事吏爵二級民一級女子百户牛酒鰥寡孤獨高年帛所賑貸物勿收行所過毋出田租四年二月詔曰廼者鳳凰甘露降集京師嘉瑞竝見修興泰一五帝后土之祠祈為百姓䝉祉福鸞鳳萬舉蜚覽翺翔集止於旁齋戒之暮神光顯著薦鬯之夕神光交錯或降於天或登於地或從四方來集於壇上帝嘉饗海内承福其赦天下賜民爵一級女子百户牛酒鰥寡孤獨高年帛五鳳元年正月皇太子冠皇太后賜丞相將軍列侯中二千石帛人百匹大夫人八十匹夫人六十匹又賜列侯嗣子爵五大夫男子為父後者爵一級三年三月詔曰往者匈奴數為邊㓂百姓被其害朕承至尊未能綏安匈奴虛閭權渠單于請求和親病死右賢王屠耆堂代立骨肉大臣立虛閭權渠單于子為呼韓邪單于擊殺屠耆堂諸王竝自立分為五單于更相攻擊死者以萬數畜産大耗十八九人民饑餓相燔燒以求食因大乖亂單于閼氐閼氐音焉支子孫昆弟及呼遫累單于名王右伊秩訾且渠當户以下伊秩訾且渠當户皆匈奴官號也訾音于移切且音子余切將衆五萬餘人求降歸義單于稱臣使弟奉珍朝賀正月北邊晏安靡有兵革之事朕飭躬齋戒郊上帝祠后土神光竝見或興於谷燭燿齋宫十有餘刻甘露降神雀集已詔有司告祠上帝宗廟三月辛丑日鸞鳳又集長樂宫東闗中樹上門外闗内行馬之裏樹飛下止地文章五色留十餘刻吏民竝觀朕之不敏懼不能任婁䝉嘉瑞婁古屢字獲兹祉福書不云乎雖休勿休祇事不怠公卿大夫其朂哉減天下口錢赦殊死以下賜民爵一級女子百戸牛酒大酺五日加賜鰥寡孤獨髙年者帛甘露二年詔曰廼者鳳凰甘露降集黄龍登興醴泉滂流枯槁榮茂神光竝見咸受禎祥其赦天下減民筭三年一筭減錢三十也賜諸侯王丞相將軍列侯中二千石金錢各有差賜民爵一級女子百户牛酒鰥寡孤獨高年帛三年二月詔曰廼者鳳凰集新蔡羣鳥四面行列皆鄉鳳凰立以萬數其賜汝南太守帛百匹新蔡長吏三老孝弟力田鰥寡孤獨各有差賜民爵二級毋出今年租元帝初元元年四月賜宗室有屬籍者馬一匹至二駟二駟八匹三老孝者帛五疋弟者力田三疋鰥寡孤獨二疋吏民五十户牛酒二年正月行幸甘泉郊泰畤賜雲陽民爵一級女子百户牛酒四月丁巳立皇太子賜御史大夫爵闗内侯中二千石左庶長天下當為父後者爵一級列侯錢各二十萬五大夫十萬四年正月行幸甘泉郊泰畤三月行幸河東祀后土赦汾隂徒賜民爵一級女子百户牛酒鰥寡孤獨高年帛行所過無出租賦五年四月賜宗室有屬籍者馬一匹至二駟三老孝者帛人五疋弟者力田三疋鰥寡孤獨二疋吏民五十户牛酒永光二年正月行幸甘泉郊泰畤赦雲陽徒賜民爵一級女子百户牛酒高年帛行所過毋出租税三月賜吏六百石以上爵五大夫勤事吏二級民一級女子百户牛酒鰥寡孤獨高年帛二年二月賜民爵一級女子百户牛酒鰥寡孤獨高年三老孝弟力田帛又賜諸侯王公主列侯黄金中二千石以下至中都官長吏各有差吏六百石以上爵五大夫勤事吏各二級建昭五年二月賜民爵一級女子百户牛酒三老孝弟力田帛竟寧元年正月皇太子冠賜列侯嗣子爵五大夫天下為父後者爵一級成帝建始元年二月賜諸侯王丞相將軍列侯王太后公主王主天子女曰公主秩比公也王主諸侯王之女也則公主謂王主者王自主婚謂公主者父自主婚也吏二千石黄金宗室諸官吏千石以下至二百石及宗室子有屬籍者三老孝弟力田鰥寡孤獨錢帛各有差賜吏民五十户牛酒三