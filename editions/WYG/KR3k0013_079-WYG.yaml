既新恵澤宜洽文武百官各増四級是月丙子大射於正武殿賜百官各有差二年五月庚午以山南衆瑞並集百官及軍人普汎二級天和元年正月癸未改元百官並加四級三年三月癸卯皇后阿史那氏至自突厥行親迎之禮丁未大會百寮及四方賔客於路寢賜衣馬錢帛各有差建徳元年四月癸巳立魯王贇為皇太子百官各有封級十一月庚戌行幸羌橋集京城以東諸軍都督以上頒賜有差十二月壬申行幸斜谷集京城以西諸軍都督以上頒賜有差二年六月壬子皇孫衍生文武官普加一階三年十月行幸同州十一月戊子至自同州大會衛官及軍人以上賜錢帛各有差六年三月丙午以平齊論定諸軍􅈴置酒於齊太極殿會軍士以上頒賜有差宣帝大象二年二月丁亥賜百官及民大酺隋文帝開皇二年十月庚寅帝疾愈享百寮於觀徳殿賜錢帛皆任其自取盡力而出三年三月庚申宴百僚班賜各有差四年八月以秦王俊納妃宴百僚班賜各有差八年九月丁丑宴南征諸將班賜各有差九年四月庚戌帝御廣陽門宴平陳將士班賜各有差初大軍出時勅有司曰亡國物我一不以入府可於苑内築五垜當悉賜文武百官大射以取之及是帝御𤣥堂大射陳其奴婢貨賂㑹王公文武官七品以上武職領兵部督以上及諸考使以射之十二年十一月辛亥有事於南郊壬子宴百僚班賜各有差十七年二月壬寅以河東王昭納妃宴羣臣班賜各有差五月庚申宴百僚於玊女泉班賜各有差十九年正月戊寅大射武徳殿宴賜百官煬帝大業五年二月戊申帝自東都還丙辰宴􅂄舊四百人於武徳殿班賜各有差六年四月丁未帝在江都宴淮南父老班賜各有差七年二月己未升釣臺臨揚子津大宴百僚頒賜各有差八年四月丙申赦詔高年之老賜以粟帛兼賜天下大酺十一年正月乙卯大會蠻夷設魚龍曼延之樂班賜各有差唐高祖武徳元年五月甲子即位戊辰宴羣臣賜帛有差七月己未賜百僚及義士布帛各有差八月庚子宴設三品以上賜雜綵各有差十一月己酉太宗降薛仁杲帝聞而大悦因置酒高㑹奏九部樂賜羣臣錢各有差癸亥太宗凱旋獻俘甲子帝置酒宴旋師及骨咄禄特覲於𤣥武門賜帛各有差十二月乙酉幸周氏坡過故莊丙戌校獵置酒高會極歡而罷賜錢絹各有差二年二月癸巳宴羣臣奏九部樂賜錢各有差極歡而罷五月戊辰宴并州從五品以上於仁夀殿帝極歡賜帛各有差三年四月壬戌太宗平開州悉復故地帝大悦置酒含章殿宴羣臣極歡遣入御府賜繒綵皆重負而出六月癸丑幸昆明池宴從官賜錢各有差八月庚戌宴羣臣奏九部樂於庭賜布帛各有差四年四月壬寅皇太子建成北討班師帝於𤣥武門宴勞將士賜帛各有差五月丁丑以太宗平王世充獻㨗於京師宴羣臣賜帛各有差七月戊辰宴羣臣奏九部樂於庭帝舉酒屬百官極歡乃罷賜錢帛各有差九月癸亥賜五品以上射於武徳殿賞金銀綾綺各有差閏十月乙卯幸稷州己未次於武功舊莊從官賜錢各有差庚申召父老故吏男女數百人置酒高會賜帛各有差五年正月辛丑賜羣臣大射於𤣥武門賚綵帛各有差壬子幸昆明池宴從官賜帛各有差三月己酉宴羣臣及京城父老賜帛各有差七月丙戌以太宗征劉黑闥班師宴旋師賜帛各有差六年三月己丑宴五品以上於昭徳殿賜帛各有差四月己未幸故宅改名通義宫置酒高㑹賜從官帛各有差十月甲辰宴羣臣賜物各有差慶有年也七年三月己卯幸琅琊公主第宴從官五品以上賚各有差四月癸卯宴羣臣賜帛各有差丙午宴王公親屬於文明殿帝賦詩王公逓上夀賜帛各有差七月壬子幸東宫從官下至胥徒頒賜有差八年正月甲寅幸太宗第宴五品以下賜帛各有差二月甲午幸齊王元吉第宴五品以上賚物各有差五月乙巳宴五品以上及外戚於内殿賜綵極歡而罷十二月庚辰狩於鳴犢泉之野辛巳還宫宴從官賚物綵帛各有差九年六月癸亥立太宗為皇太子所司具禮以時册命宴羣臣賜帛各有差又詔凡厥庶政事無大小悉委皇太子斷决既溥天同慶宜加恵澤為父後者若有􅈴爵皆令襲繼諸赤牒擬授職事官見任者竝即為真其已得贊者參選之日聽依階叙文武官人節級頒賜務存優給稱朕意焉七月高祖傳位於太宗稱太上皇後四年乃徙居大安宫於是親侍輿輦百僚陪從太上皇甚悦置酒高會極歡而罷賜物各有差太宗後與公卿謁太上皇於戢武殿置酒為歡乙夜方散賜帛各有差後太宗演武於城西太上皇親勞將士置酒於故未央宫宴三品以上極夜方散賜物各有差册府元龜卷七十九
