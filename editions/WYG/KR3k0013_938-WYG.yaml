body:
  text: 册府元龜卷九百三十八宋王欽若等撰總録部姦佞第二唐封倫字德彝彝少聰明多狡筭頗渉書史初仕隋釋褐為州都俄以䕃補左翼衛外如謹厚内殊險詖當官處政必協姦謀因從楊素行軍以諂事素甚異之遂妻之以從妹後素受委營仁壽宮又引德彝為土工監及文帝幸宮所見制度侈麗大怒曰楊素不誠矣殫百姓之力雕餙離宮為吾結怨於天下也素惶恐慮將獲譴德彝曰公當勿憂待皇后至必有恩詔明日果召素入對獨孤后勞之曰公大用意知吾夫妻年老無以娛心盛餙此宮實為孝順素退問德彝曰卿何以知之對曰至尊性儉故視見而怒然雅聽后言皇后婦人也惟麗是好后心旣悅聖慮必移所以知耳素歎服曰揣摩之才非吾所及也素負勲恃貴多所陵侮唯激賞德彝因撫其牀曰封郎後時必當據吾此座李安儼初事隱太子及太子敗率兵拒戰太宗以為忠於所事故任用之至中郎將典屯兵於北門甚見親委其弟思暕為太子通事舎人貞觀中太子承乾因思暕以致賂安儼亦深自託於承乾嘗言於太宗曰皇太子及諸王陛下處置未為得所且太子國之本也伏願深其思慮以安天下之情太宗曰我識卿意我兒雖患脚猶為長嫡豈可捨嫡立庶乎安儼以白承乾大喜又令左右遺以黄金趙元楷武德中為交河道行軍總管時侯君集為元帥馬病蟲顙元楷以脂霑其膿而齅之以諛君集為御史所劾左遷括州刺史姚璹則天朝為桂州都督府長史時則天雅好符瑞璹至嶺南訪諸山川草樹其名號有武字者皆以為上應國姓列奏其事則天大悅召拜天官侍郎宗秦客者蒲州河東人則天從父姊之子也垂拱中潛動則天革命稱帝繇是累遷内史李思文為司僕少卿垂拱元年表請改姓武氏則天許之迦葉志忠中宗朝右驍衛將軍知太史事志忠上表曰昔髙祖未受命時天下歌桃李子太宗未受命天下歌秦王破陣高宗未受命天下歌堂堂天后未受命天下歌武媚娘伏惟應天皇帝未受命時天下歌英王石州順天皇后未受命時歌桑條韋也女六合之内齊首蹀足應四時八節之㑹歌舞同歡豈與夫簫韶九成百獸率舞同年而語哉伏惟皇后降帝女之精合為國母主蠶桑之事以安天下后妃之德於斯為盛謹進桑條歌十二篇伏請宣布中外進入樂府皇后先蠶之事以享宗廟帝悅而許之時賜志忠莊一區雜綵七百段太常少卿鄭愔又引而申之播於舞詠亦受厚賞兵部尚書楚客又諷補闕趙延禧表陳符命解桑條以為十八之符請頒示天下編諸史册帝大悅鄭愔謟事張易之兄弟厯殿中侍御史易之伏誅愔左授宣州叅軍尋坐贓逃歸東都諂事武三思及韋氏悖逆庶人歴遷吏部侍郎李繁宰相泌之子泌為相薦夏縣處士北平陽城為諫議大夫城深德泌及殁戸部尚書裴延齡巧佞有恩竊弄威權朝臣無不側目城忠正之士尤忿嫉之一日盡疏其過欲宻論奏以繁故人子謂可親信遂示其疏草兼請繁繕寫繁旣寫訖悉能記之其夕乃徑詣延齡具述其事延齡聞之卽時請對盡以城章中所欲論告節目一一自解及城疏入德宗返以為妄不為之省李訓本名仲言宰相揆之族孫訓從父逢吉為宰相以訓陰險善計事極親厚之後竟以武釗之獄流于嶺表數歲㑹赦還丁母憂居于東雒時逢吉為留守思復柄用逢吉雖暮年以怨裴度故嘗憤鬱不快每召訓㳺說訓揣知逢吉意即以竒計動之且言已與鄭注善逢吉聽其言因攘袂奮臂謂訓即日能就其謀因遺訓金帛數百萬訓居䘮服中持之西來因得以厚自交結遂因鄭注委質于中尉王守澄鄭注絳州翼城人始以藥術游揚長安中權豪間日有知遇注者或云本姓魚冒姓鄭氏時人亦號為魚鄭及注之用事天下有水族之號焉元和十二年李愬為襄州節度使注以客詣愬愬得其秘藥因厚過之署為節度衙推愬遷鎮徐州注從之赴職軍中利害愬往往與之参議注詭賊陰狡善探人意㫖至是與愬籌畫未嘗不暗㑹其機巧然挾竒任數專作威福軍府多害之時王守澄為徐州監軍使一日以軍中之苦白于愬愬曰彼誠如此然實竒才也將軍試召之與語茍不合意去之未晚也愬即召注令詣監軍所守澄欲見之初尚遅難及延坐與語機辯釋然盡中其意即延入于中堂翼日守澄反以誠欵託注於愬請全䕶之愬即加署注節度廵官齒諸賔列自此注遂委身於權幸之伍矣及守澄入總樞宻當長慶寶歴之際國政多專於守澄注晝伏夜動攘竊販賣於其間初則䜛邪姦巧之徒附之以圖進取數年之後要官權臣爭凑其門累從山東京西諸軍歴衛左評事御史又以檢校庫部郎中兼侍御史從昭義劉從諫軍為節度副使旣陰以罪誣奏宋申錫時之守道居正者始側目視之注有口辯機數過人賣官鬻權積財累巨萬復能糞土金帛居京師善和里宅通永巷重檐複壁陰召引京師不肖及四方節將豪猾通問往來日招權利間日赴軍與守澄欵昵語必移時或通夕無寐李訓旣附注以進承間遂入謁于帝時之輕浮躁進者盡趨於注矣太和九年夏自太僕卿除工部尚書翰林侍讀學士是時李訓亦居内庭二人相挾日侍帝前說帝以昇平之䇿帝益惑其說當是時訓注之權赫於天下内外呼吸噂沓賢不肖昇黜混亂而注自謂弛張變化一時無比然識者知其所挾非正必能致亂于時及京師急變注自岐陽將親兵五百餘人至闕下行至扶風聞李訓等敗走注即歸鎮憂惑不安將欲舉兵詣闕監軍使張仲清已得宻詔乃紿注而召之注恃其兵衛即云就召監軍使伏勇卒以待之注至坐定斬其首持以號令注之親兵乃自散逸盡殺其家属無孑遺初未得注京師憂恐至是人人慶快焉王叔文初自順宗為太子時以碁進太子又學書於王伾二人俱待詔翰林數侍太子碁叔文譎詭多計順宗嘗與諸侍讀及叔文等論時政及宮市事順宗曰寡人方欲極言之衆皆稱贊獨叔文無言旣退順宗獨自留叔文謂曰向者君奚獨無言豈有意耶叔文曰叔文幸􅂪太子有所見教不以聞太子職當視膳問安不宜及外事陛下在位久如疑太子收人心何以自解順宗大驚因涕泣曰非先生寡人無繇知此遂大愛幸與王伾兩人相依附俱出入東宮韓中僕射臯之從父弟兇狂喜酒博以罪斥逐元和中量移宣州管内縣尉㑹赦得還觀察使元錫遂以䟽薦之中陰結内倖用事者因為錫通逹錫厚輸其貨謀領大權未幾果以詔徵既非公望又陰迹稍露至闕累召對于延英於是諫官及在位者屢以疏論竟沮其謀復舊任雖未加黜責人亦賀帝聽允公議後梁張褘以司徒致仕庶人友珪偽鳳歴元年禕著南郊賦一篇來獻以金帛賜之後唐蘇循在唐為禮部尚書首贊梁祖受九錫又其子楷駮昭宗諡號敬翔惡其為人父子放歸田里乃寓居河中積年㑹莊宗將副人望求唐室舊臣遣使自河中徵赴鄴都初監軍使張承業惜經國之費未欲上議即尊之事諸將賔僚無敢言者及循至鄴入衙城拜魏帥㕔謂之拜殿翌日獻畫日筆三十管冀悅帝心其謟進如此承業聞之怒㑹河東節度副使盧汝弼卒因以代之明年春偶食蜜雪而卒陳乂為給事中充樞宻直學士性姦險好為隂計始在梁事張漢傑滅宗莊宗時佐郭崇韜伐蜀而郭又覆族至是朱宏昭拔用之不兩月宏昭及禍其時僻政拙謀而又有力焉張文禮初鎮州大將也自燕歸於王鎔察鎔不親政事遂曲事當權者以求衒逹每對鎔自言有將才孫吳韓白莫已匹也鎔賞其言大悅為小校給遺甚厚與姓為義男改名德明自是調發兵馬每將軍令何澤為太僕少卿致仕長興四年八月自河陽遣婢宜子投匭上書請立秦王從榮為皇太子澤前任吏部郎中舊曾與宰相趙鳳使府同院為判官因是舊數泣告於鳳求為給諫鳳怒其躁佞除授秘書少監堂吏有姓何者私報澤澤卽稱新授秘書少監臣澤上章訴屈大畧云臣伏尋近例自郎中拜給諫者即崔憓張延雍皆自郎官拜諫議况臣在郎署粗有勤勞無罪左遷有同排擯事下中書宰臣執奏何澤新命未下便敢稱謂開天不知澤何處授此官位誣㺯朝綱法當不敬繇是命太僕少卿致仕退居河陽澤性好内侍婢十餘凢公私請託多令諸婢出入至於掌閽待客􅂺無形迹旣乆退居心常鬱鬱年七十餘求進未已旣見從榮位望隆盛帝又多病自素與執政私憾欲報仇於一時即令婢宜子詣闕投匭上章大畧曰立儲之事人所難言内外大臣不忍輕議臣所以冒死以聞又云臣前在班行不求致仕乃是宰執抑臣屏退所以不盡臣才明宗覽澤表不悅私謂近臣曰羣臣欲立儲君吾自歸河東養老雖然不得已令大臣商議大臣聞帝所言不敢可否即議加從榮大元帥之命俄而致從榮不軌之變繇澤啓其釁端也叚凝梁末為招討使乞降累授兖州節度使初謁見莊宗因伶人景進通貨於宫掖又天性姦佞巧言飾智善候人意契丹冦幽州命宣徽使李紹宏監䕶軍以禦北虜凝與董璋戍瓦橋闗凝巧事紹宏紹宏嘗乘間奏凝蓋世竒才可以大任屢請以兵柄委之郭崇韜奏曰凝亡國敗軍之將姦謟難狀不可信也凝在藩鎮私用庫物數萬計有司促償中㫖貰其負孔循㓜孤流落洛都市人李讓畜之然性黠慧讓以軍功為朱温所寵温以譲為子號朱友譲循又姓朱循漸長成尤頴悟朱温選為綱紀温之乳媪掌事者而循親之乳媪為之義母媪之外夫趙氏循又隨媪夫姓曰趙名殷衡昭宗自鳳翔還京左右前後皆朱温之腹心時殷衡年十七八為宣徽副使及東遷雒都殷衡與蔣𤣥暉張廷範等受朱温宻㫖同弑昭宗輝王即位蔣𤣥暉為樞宻使因事與殷衡不相協時朱温欲受九錫即禪輝王位朱温在宿州行營𤣥暉自往咨謀其事稍遅留朱温怒𤣥暉㑹殷衡至温問不行九錫之繇殷衡曰𤣥暉與張廷範同謀恢復唐家向何皇后前同立盟誓以此故不欲王速行九錫温怒是日遣使與殷衡同來遂殺何皇后及蔣𤣥暉張廷範柳璨等十餘族殷衡以功為權樞宻副使朱温之世掌要宻權莊宗末知汴州軍州事㑹明宗自鄴城南趨夷門莊宗東出汜水循西則奉表迎奉亦遣人北輸宻欵張遵誨為客省使明宗將有事于南郊為脩儀仗法物使初遵誨以歴位尹正與安重誨素亦相欵心有望於節鉞重誨嘗視法物於脩行寺因過遵誨之第遵誨於中堂出女妓珍幣以為壽有彈筝妓尤善欲以奉重誨時樞宻學士史圭閻至等在席素惡遵誨之阿䛕有不平之色重誨曰吾自有妓媵不煩掠美於人自是左右益言其短及郊禋畢以為絳州刺史鬱鬱不樂離京之日白衣乘馬於隼旗之下至郡無幾而卒石知訥為殿中少監本梁時之走吏也以姦險自進漸厠簪組夏魯竒辟為河陽節判移任許州亦佐之及魯竒權知襄州知訥為殿中少監尚居于許下朱守殷叛知訥走人勸魯竒棄其城而歸許州漢上戍兵幾將為亂朝廷知之詰其所自魯竒沮之而知訥貶憲州司戸尋與温韜同詔賜死怨刺古者行人之官每歲孟春振木鐸狥于路采耴怨刺之詩以聞于天子故五子之歌風雅之什率多怨誹風刺之言也騷人已來作者間出其或含忠履潔遭罹䜛搆越世高蹈捨去榮祿痛國政之頽廢嫉時風之澆競因廢滯而形賦詠發憤懣而譏公卿至於遷斥流落窮愁困辱詞人才子往往而有何甞不摭靈均之遐韻襲長沙之逸軌託文以示諷因言以見志斯可哀也已若乃負釁而忘悔長傲而自棄鮮克内省形於詆訾傳所謂居下流而訕上者乃仲尼之所惡焉夏王太康失邦啟子也盤于逰田不恤民事為羿所逐不得反國昆弟五人須于雒汭作五子之歌太康五弟與其母待太康於雒水之北怨其不反故作歌曰太康位以逸豫尸主也主以尊位為逸豫不勤滅厥德黎民咸貳君䘮其德則衆民皆貳其心矣乃盤遊無度盤樂遊逸無法度畋于有雒之表十旬弗反雒水之表水之南十日曰旬田獵過百日不還有窮后羿因民弗忍距于河有窮國名羿諸侯名距太康於河不得入國遂廢之厥弟五人御其母以從御侍也言從畋徯于雒之汭五子咸怨待太康怨其乆畋失國述大禹之戒以作歌述循也歌以叙怨其一曰皇祖有訓民可近不可下皇君也君祖禹有訓戒近謂親之下謂失分民惟邦本本固邦寧言人君當固民以安國予視天下愚夫愚婦一能勝予言能畏敬小民所以得衆心一人三失怨豈在明不見是圖三失過非一也不見是謀備其㣲予臨兆民懔乎若朽索之馭六馬十萬曰億十億曰兆言多懔危貌朽腐也腐索馭六馬言危懼甚為人上者柰何不敬能敬則不驕在上不驕則高而不危其二曰訓有之内作色荒外作禽荒作為也迷亂曰荒色女色禽鳥獸甘酒嗜音峻宇彫牆甘嗜無厭足峻高大彫餙畫有一于此未或不亡此六者棄德之君必有其一有一必亡况兼有乎其三曰惟彼陶唐有此冀方陶唐帝堯氏都冀州統天下四方今失厥道亂其紀綱乃底滅亡言失堯之道亂其法制自致滅亡其四曰明明我祖萬邦之君有典有則貽厥子孫君萬國為天子典謂經籍則法貽遺也言仁及後世關石和鈞王府則有荒墜厥緖覆宗絶祀金鐡曰石供民器用通之使和平則官民足言古制存而太康失其業以取亡其五曰嗚呼曷歸予懐之悲曷何也言思而悲萬姓仇予予將疇依仇怨也言當依誰以復國乎鬱陶乎予心顔厚有忸怩鬱陶言哀思也顔厚色愧忸怩心慙慙愧於仁人賢士弗慎厥德雖悔可追言人君行已不慎其德以速滅敗雖欲悔其可追及乎言無益周伯夷叔齊孤竹君之二子父卒兄弟讓位歸於周武王已平殷亂天下宗周而伯夷叔齊耻之義不食周粟隱于首陽山首陽山在河東蒲坂華山之北河曲之中采薇而食之及餓而死作歌曰登彼西山兮采其薇矣以暴易暴兮不知其非矣神農虞夏忽焉沒兮我安適歸矣吁嗟徂兮命之衰矣遂餓死於首陽山召穆公康公後也作民勞五章刺厲王也厲王時賦斂重數繇役煩多人民勞苦輕為姦宄彊凌弱衆暴寡作寇害故穆公以刺之又作蕩八章傷周室大壊也厲王無道天下蕩蕩無綱紀文章故作此詩也凢伯凢國伯爵周公之裔也汲郡共縣東南有凢城為王卿士作板八章刺厲王也其詩曰上帝板板下民卒癉出話不然為猶不逺板板反也癉病也話善言也猶道也言王為政反先王與天之道天下之民皆病其出善言而不行也芮伯畿内諸侯字良夫為王卿士作桑柔十六章刺厲王也其詩曰菀彼桑柔其下侯旬捋采其劉瘼此下民旬言隂均也劉爆爍而希也瘼病也謂桑之柔濡其葉菀然茂盛人庇隂其下者均得其所已捋采之則爆爍而䟽人息其下則病於爆爍也衛武公作抑十二章刺厲王亦以自警也其詩曰抑抑威儀維德之隅抑抑宻也隅亷也又作賔之初筵五章刺時也幽王荒廢媟近小人飲酒無度天下化之君臣上下沈湎淫液武公旣入而作是詩也其詩曰彼醉不臧不醉反耻言彼醉則已不善未醉者耻罰之家父為周大夫家父字也失其姓作南山十章刺幽王也其詩曰赫赫師尹不平謂何又曰昊天不平我王不寧言太師尹氏為政不平使我王不得安寧也凢伯為王大夫臣欽若等曰前凢伯為卿士此為大夫蓋二人也皆失其名作瞻卬七章刺幽王大壊也其詩曰瞻卬昊天則不我惠言幽王為政不愛我下民也又作召旻七章刺幽王大壊也旻閔也閔天下無如召公之臣也孟子寺人也作巷伯七章刺幽王也寺人傷於䜛故作是詩也巷伯奄官寺人内小臣也奄官掌王后之命於宮中為近故謂之巷伯與寺人之官相近䜛人譛寺人寺人又傷其將及巷伯故以名篇譚大夫失其姓名作大東七章刺亂也東國困於役而傷於財譚國在東故其大夫尤苦征役之事者也作是詩以告病焉蘇公作何人斯八章刺暴公也蘇暴皆畿内國名暴公為卿士而譖蘇公焉故蘇公作是詩以絶之其詩曰伊誰云從維暴之云云言也謂譖我也言從誰生乎乃暴公所言也鄭公子素作清人三章刺文公也高克好利而不顧其君文公惡而欲逺之不能使高克將兵而禦狄于竟臣欽若等曰高克鄭大夫也清者高克所師之邑名陳其師旅翺翔河上乆而不召衆散而歸高克奔陳公子素惡高克進之不以禮文公退之不以道危國亡師之本故作是詩也介子推晉人從文公出亡周流天下文公反國介子推不肯受賞自為賦詩曰有龍于飛周徧天下五虵從之為之承輔承佐也輔維也龍君也以喻文公虵臣也喻趙衰狐偃賈佗魏犨介子推也故曰五虵也龍反其鄉得其處所四虵從之得其露雨露雨膏澤也一虵羞之槁死於中野懸書文公門而伏於山下文公聞之曰譆此必介子推也避舍變服令士庻人曰有能得介子推者爵上卿田百萬百萬畝或遇之山中有釡蓋登問焉曰請問介子推安在應之曰夫介子推茍不欲見而欲隱吾獨焉知之遂背而行終身不見申叔儀吳大夫魯哀公㑹晉侯及吳子於黄池申叔儀乞糧於公孫有山氏公孫有山魯大夫舊相識曰佩玉繠兮余無所繫之繠然服餙備也已獨無以繫佩言吳王不恤下㫖酒一盛兮余與褐之父睨之一盛一器也睨視也褐寒賤之人言俱得視不得飲楚屈原名平為楚懐王左徒上官大夫與之同列爭寵讒之王怒而疏屈平屈平疾王聽之不聰也讒謟之蔽明也邪曲之害公也方正之不容也故憂愁幽思作離騷離騷者猶離憂也夫天者人之始也父母者人之本也人窮則反本故勞苦倦極未嘗不呼天也疾痛慘怛未嘗不呼父母也屈平正道直行竭忠盡智以事其君讒人間之可謂窮矣信而見疑忠而被謗能無怨乎屈平之作離騷蓋自怨生也國風好色而不淫小雅怨誹而不亂若離騷者可謂兼之矣上稱帝嚳下道齊桓中述湯武以刺世事明道德之廣崇治亂之條貫靡不畢見其文約其辭㣲其志潔其行廉其稱文小而其指極大舉類邇而見義逺其志潔故其稱物芳其行廉故死而不容自疎濯淖汚泥之中蟬蛻於濁穢以浮游塵埃之外不獲世之滋垢皭然泥而不滓者也皭疎淨之貌推此志也雖與日月爭光可也屈原旣被遷至於江濵被髪行吟澤畔顔色憔悴形容枯槁漁父見而問之曰子非三閭大夫歟三閭之職掌王族三姓曰昭屈景序其譜属率其賢良以厲國士何故而至此屈原曰舉世混濁而我獨清衆人皆醉而我獨醒是以見放漁父曰夫聖人者不凝滯於物而能與世推移舉世混濁何不隨其流而揚其波衆人皆醉何不餔其糟而啜其醨何故懐瑾握瑜而自令見放為屈原曰吾聞之新沐者必彈冠新浴者必振衣人又誰能以身之察察受物之汶汶者乎蒙垢敝寧赴長流而葬乎江魚腹中耳又安能以皓皓之白而蒙世之蝹蠖乎乃作懐沙之賦懐石自投汨羅以死漢賈誼為長沙王太傅旣以適去意不自得及度湘水湘水出零陵陽海山北流入江也為賦以弔屈原屈原楚賢臣也被讒放逐作離騷賦離遭也憂動曰騷遭憂而作此辭其終篇曰已矣國亡人莫我知也遂自投江而死誼追傷之因以自諭楊惲宣帝時以光祿勲免為庻人家居治産業起室宅以財自娛歲餘其友安定太守西河孫㑹宗與惲書諫戒之惲答書曰家本秦也能為秦聲婦趙女也雅善鼔瑟奴婢歌者數人酒後耳熱仰天拊缶缶瓦器即今盆類秦人擊之以節歌而呼烏烏其詩云田彼南山蕪穢不治種一頃豆落而為萁人生行樂耳須富貴何時山高而在陽人君之象也蕪穢不治言朝廷之荒亂也一頃百畆以喻百官也言豆者真實之物當在囷倉零落在野喻己見放棄也萁豆莖也曲而不直言朝臣皆謟䛕也須待也後漢梁竦字叔敬少習孟氏易弱冠能教授後坐兄松事與弟恭俱徙九眞旣徂南土厯江湖濟沅湘感悼子胥屈原以非辜沈身乃作悼騷賦繫𤣥石而沉之應奉為司𨽻校尉黨事起臣欽若等曰桓帝時牢脩上書誣告李膺等部黨奉在黨中以疾自退追愍屈原因以自傷著感騷三十篇數十萬言趙壹漢陽西縣人也恃才倨傲為鄕黨所擯作刺世疾邪賦以舒其怨憤晉魯褒字元道南陽人好學多聞以貧素自立元康之後紀綱大壊褒傷時之貪鄙乃隱姓名而著錢神論以刺之其畧曰錢之為體有乾坤之象内則其方外則其圓其積如山其流如川動靜有時行藏有節市井便易不患耗折難折象壽不匱象道故能長乆為世神寶親之如兄字曰孔方失之則貧弱得之則富昌無翼而飛不足而走解嚴毅之顔開難發之口錢多者處前錢少者居後處前者為君長居後者為臣僕君長者豐衍而有餘臣僕者窮竭而不足詩云哿矣富人哀此㷀獨錢之為言泉也無逺不往無幽不至京邑衣冠疲勞講肄厭聞清談對之睡寐見我家兄莫不驚視錢之所祐吉無不利何必讀書然後富貴昔呂公欣悅於空版漢祖克之於嬴二文君解布裳而被錦繡相如乘高蓋而解犢鼻官尊名顯皆錢所致空版致虗而况有寔嬴二雖少以致親宻繇此論之謂為神物無德而尊無勢而熱排金門入紫闥危可使安死可使活貴可使賤生可使殺是故忿争非錢不勝幽滯非錢不㧞怨讐非錢不解令聞非錢不發雒中朱衣當途之士愛我家兄皆無已已執我之手抱我終始不計優劣不論年紀賓客輻輳門常如市諺曰錢無耳可使鬼凡今之人惟錢而已故曰軍無財士不來軍無賞士不往仕無中人不如歸田雖有中人而無家兄不異無翼而欲飛無足而欲行蓋疾時者共傳其文褒不仕莫知其所終惠帝末忠賢路絶䜛邪得路更相薦舉天下為之反常高平王沉作釋時論盧江杜嵩作任子春秋皆疾時之作也㑹稽王道子孝武世輔政時有人為雲中詩以指斥朝廷曰相王沉醉輕出敎命捕賊千秋干豫朝政王愷守常國寶馳競荆州大度散誕難名盛德之流法護王寗仲堪仙民特有言詠東山安道執操高抗何不徵之以為朝匠荆州謂王忱也法護即王珣寗即王恭仙民即徐邈字安道戴逵字也宋顔延之為太子中庶子時劉湛殷景仁專當要任湛恨延之言於彭城王義康出為永嘉太守延之甚怨憤乃作五君詠以述竹林七賢山濤王戎以貴顯被黜詠嵇康曰鸞翮有時鎩龍性誰能馴詠阮籍曰物故不可論塗窮能無慟詠阮咸曰屢薦不入官一麾乃出守詠劉伶曰韜精日沉飲誰知非荒宴此四句蓋自序也湛及義康以其辭㫖不遜大怒時延之已拜欲黜為逺郡太祖與義康詔曰降延之為小邦正謂其在都邑豈動物情罪過彰著亦士庶共悉直欲選代令思愆里閭猶復不悛當驅往東土乃至難恕自可隨事録治殷劉意咸無異也以光祿勲車仲逺代之延之與仲逺世素不協屏居閭巷不豫人間者七載梁江革子從簡少有文情年十七作採荷調以刺何敬容為當時所賞後魏東阿縣公順與城陽王徽不協順疾徽聞之為蠅賦以刺焉崔纂字叔則博學有文才景明中自太學博士轉員外散騎侍郎既不為時知乃著無談子論以刺焉常景為門下錄事淹滯積歲不至顯官以蜀司馬相如王褒嚴君平揚子雲等四賢皆有高才而無重位乃託意以讚之其讚司馬相如曰長卿有􅃩才直致不羣性鬱若春煙舉皎如秋月映逰梁雖好仁仕漢常稱病清身非我事窮逹委天命其讚王子淵曰王子挺秀質逸氣干青雲明珠旣絶俗白鵠盡驚羣才世茍不合遇否途自分空枉碧雞命徒獻金馬文其讚嚴君平曰嚴公體沉静立志明霜雪味道綜㣲言端蓍演妙說才屈羅仲口位結李强舌素尚邁金貞清標陵玉徹其讚揚子雲曰蜀江導清流揚子挹餘休含光絶後彦覃思邈前脩世輕文不賞𤣥談物無求當途謝權寵置酒獨閒逰隋盧思道字子行初仕後周為掌教上士高祖為丞相遷武陽太守非其好也為孤鴻賦以寄其情思道自恃才地多所陵轢繇是官塗淪滯既而又著勞生論指切當時劉炫以教授為務勑令事蜀王秀遷延不往秀大怒枷送益州既而配為帳内炫因擬屈原卜居為筮塗以自寄册府元龜卷九百三十八
