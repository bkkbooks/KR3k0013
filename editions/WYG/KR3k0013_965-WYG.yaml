body:
  text: 册府元龜卷九百六十五宋王欽若等撰外臣部封册第三唐𤣥宗天寳元年正月封女國王趙曵夫為歸昌王授左金吾衛大將軍佛逝國王劉滕未恭為賔義王授右金吾衛大將軍暔國王楊多過為懷寜王授左羽林軍大將軍並員外置各賜帛八十疋放還部落六月冊突騎施大纛官都磨度闕頡斤為三姓葉䕶仍授左羽林軍大將軍冊曰維天寳元年嵗次壬午六月甲戌朔二十二日乙未皇帝詔曰於戯王者無外不隔遐方必揆忠欵是加寵命咨爾骨咄祿毗伽都磨度闕頡斤代襲榮望名擅驍騎信義有聞部衆稱美往在蕃任受制兇威元惡已除能革心而向化牙纛既立克輔主以歸懷嘉爾誠心載崇賞秩是用命爾為三姓葉䕶往欽哉爾其祗奉典冊懋明忠順善翊君長勉樹勲庸可不慎歟二年五月新羅王金承慶卒弟憲英襲位制曰故開府儀同三司使持節大都督鷄林州諸軍事兼持節寜海軍使新羅王金承慶弟憲英奕葉懷仁率心常禮大賢風教條理尤明中夏􅁤儀衣冠素襲馳海琛而遣使準雲吕而通朝代為純臣累效忠節頃者兄承土宇没而絶嗣弟膺繼及抑惟常經是用賔懷優以冊命宜因舊業俾承蕃長之名仍加殊禮載錫漢官之號可襲兄新羅國王開府儀同三司使持節大都督鷄林州諸軍事兼充持節寜海軍使三年閏二月封陁㧞薩憚國王為恭化王冊曰維天寳三年嵗次甲申閏二月乙未朔二十二日丙辰皇帝詔曰於􅃧王化所及禮在於懷柔蕃部有歸義存于冊命咨爾陀㧞薩憚國王阿魯施多志懷恭順深達智謀賔以使臣修其職貢信義昭著深可褒稱是用命爾為恭化王爾其祗奉典冊懋遵風教忠勤自勵始終無違用率於遐邦以宣我朝命可不慎歟六月封突騎施伊里底宻施骨咄祿毗伽為十姓可汗册曰維天寳三年嵗次甲申六月癸巳朔十二日甲辰皇帝詔曰於􅃧覆燾之徳豈隔於華夷綏懷之道實貴於忠順咨爾突騎施伊里底密施骨咄祿毗伽承其宗緒達於智謀能和衆心以致寜静載執蕃禮逺效懇誠節義昭明深可嘉尚是用命爾為十姓可汗往欽哉爾其膺􅅷典冊祗奉朝化蹈此忠信保於始終用主於逺方以光其寵命可不慎歟七月封九姓葉䕶男賀獵為燕郡王是月賜曹國王號為懷徳王米國王為恭順王康國王為欽化王四載七月安國王屈底波遣使朝貢遂封屈底波為歸義王九月命􅄢賓國王男勃匐準襲父位冊曰維天寳四年嵗次乙酉九月乙卯朔二十二日丙子皇帝詔曰於􅃧逺方恭順褒錫宜優累代忠勤寵章斯及咨爾􅄢賔國王男勃匐準宿承信義早竭欵誠寜彼下人二蕃安靜繼其舊業萬里來朝秉節不渝懇懷彌著愿情之至深可嘉焉是用冊命襲􅄢賔國王及烏萇國王仍授左驍衛將軍往欽哉爾其肅恭典冊保尚忠義承膺於寵命以率於遐蕃可不慎歟五載四月封奚王娑固為昭信王仍授饒樂府都督契丹王楷雒為恭仁王仍授松漠府都督六載二月封陁抜斯單國王忽魯汗為歸信王羅利支國王伊思俱習為義寜王岐蘭國王盧薛為義賔王湼蒲國王謝没為奉順王渤達國王摩俱􅧣思為守義王都盤國王謀思徤摩訶延為順徳王阿没國王俱般胡没為恭信王沙蘭國王卑畧斯威為順禮王七載雲南王蒙歸義卒詔立其子閤羅鳳襲雲南王八載七月冊十姓突騎施移撥為可汗冊曰爵以疇庸徳以懷逺乃建蕃國抑惟舊章十姓突騎施移撥可汗骨咄祿毗伽俱支効欵輸誠志稱勇烈克保忠貞之節且兼射御之能信義無愆邉隅是頼加以不從惡黨逺慕華風言念爾勞載懷嘉尚睠茲部伍必仗材雄宜式拜於寵命俾有膺於殊禮可冊為十姓突騎施移撥可汗九載三月冊朅帥國王勃特没兄素迦為王冊曰於戯賞勞之制必崇名器懷柔之典無替疇庸咨爾朅帥國王勃特没兄素迦代竭忠誠僻居遐裔夙懷智識早聞勇義頃以勃特没於鄉不孝於國不忠而卿抱屈既深乆被淪棄今惡黨已殄兇結就擒卿遂能輸忠赤於朝廷表仁惠於蕃部永言効節宜膺旌賞是用冊爾為朅帥國王爾其丕荷國恩克修蕃禮子孫萬代長保寵榮豈不美歟可不慎歟十一載正月壬寅冊骨咄國王羅全節為葉䕶冊曰維天寳十一載嵗次壬寅正月己卯二十四日壬辰皇帝詔曰於戯疇賞懋功無隔於中外懷荒䘏逺諒歸於典謨咨爾骨咄國王羅全節夙遵聲教志尚忠節作捍邉疆勤効斯著頃者以羣醜撥動方欲脅從而忠懇不渝始終彌固言念於此嘉尚良深是用授爾驃騎大將軍仍冊為葉䕶爾其祗膺典禮慎守封疆貽慶子孫受茲寵錫豈不美歟十二載九月以骨咄祿三姓毗方伽頡利發為左羽林軍大將軍員外置同正員又以骨咄祿毗伽為突騎施可汗是月葛邏祿葉䕶頓毗伽生擒阿布思制曰葛邏祿葉䕶頓毗伽特稟英姿擅雄荒服威信馭衆智畧超羣仗𢎞義以立節竭至誠而嚮順逆虜阿布思丘山積釁天地匪容未就誅夷仍茲䑕竄遂能率引弓之旅佐轉戰之師生縛兇渠咸殱醜類雖不長元惡顧神理之必誅而與我同仇乃忠勇之斯美疇其茂積寵以殊榮可開府儀同三司封金山王依舊充葉䕶祿俸於北庭給其葉䕶妻及母並封為國夫人十月封石國王男邦車俱鼻施為懷化王十四載四月以投降蘇毗王子悉諾邏為左驍衛員外大將軍封懷義王賜姓李名忠信其屬官賜各有差肅宗至徳二年十二月詔曰功濟艱難志存邦國萬里絶域一徳同心求之古今所未聞也廻紇葉䕶特禀英姿挺生竒畧言必忠信行表温恭才為萬人之敵位列諸蕃之長屬兇醜亂常中原未静以可汗有弟兄之約與國家興父子之軍奮其智謀討彼兇逆一皷作氣萬里摧鋒二旬之間兩京克定力㧞山嶽精貫風雲蒙犯曽不辭其勞急難無以渝其分固可縣之日月傳之子孫豈惟列土之封誓河之賞夫位之崇者司空第一名之大者封王最髙可司空仍封忠義王每載送絹二萬疋至朔方軍宜差使領受乾元元年七月冊命回紇可汗為英武威逺毗伽可汗仍令堂弟漢中王瑀充使代宗廣徳元年七月冊回紇可汗為登里頡咄登密施舎俱録英義建功毗伽可汗可敦冊為婆墨光親麗華毗伽可敦可汗可敦及左右内外宰相已下共加實封二千户令御史大夫王翊持節就牙帳禮冊左右殺胡祿都督等並封為王諸都督一十一人並封國公大歴二年二月以新羅王金憲英卒國人立其子乾運為王遣其臣金隠居請加冊命詔以倉部郎中歸崇敬兼御史中丞持節齎冊書弔冊之以乾運為開府儀同三司新羅王仍冊乾運母為太妃六年十一月文單國王来朝詔曰周有越裳重譯漢有槃木獻詩逺方来儀從古所記文單國副王婆彌慕我中朝之化方通南極之風義在撫柔禮當加等可開府儀同三司試殿中監徳宗建中元年六月以京兆尹源休持節冊廻紇頓莫賀為武義成功可汗帝初嗣位使中官梁文秀告哀廻紇修舊好可汗移地徤不為禮九姓胡素屬廻紇者又陳中國便利以誘其心可汗乃舉國南下將乗我䘮其宰相頓莫賀達干諌曰唐大國也且無負於我前年入太原獲羊馬數萬計可謂大㨗矣以道途艱難比及還國傷耗殆盡今若舉而不㨗將安歸乎可汗不聼頓莫賀乗人心之危因擊殺之并殺其親信及九姓胡所誘来者凡二千人頓莫賀自立號為合骨咄祿毗伽可汗使其酋長建達干随梁文秀来朝故命持節冊拜焉貞元元年正月以祕書丞孟昌源為國子司業兼御史中丞新羅弔祭冊立使先是建中四年新羅王金乾運卒無子國人立其上相金良相為王至是詔授良相檢校太尉都督雞林州刺史寜海軍使遣昌源弔冊之是年新羅王金良相卒其上相金敬信為王詔令襲其官爵敬信即從兄弟也四年四月封東蠻鬼王驃旁苴夢衝苴烏星等為和義順政等郡王驃旁等自陷嶲州臣於吐蕃絶朝貢者二十餘年及是劍南節度韋臯招誘之始棄吐蕃内附来朝特封為郡王且衣以冠𢃄仍給兩林勿鄧等部落印而遣之五年十二月回紇汨咄禄長壽天親毗伽可汗薨詔以鴻臚卿郭鋒充冊廻紇忠貞可汗使七年三月以鴻臚少卿康鋋兼御史大夫冊廻紇可汗及弔祭使先是六年四月忠貞可汗國人所慕立其子為可汗遣達北勒梅祿將軍告哀且請冊新君故有是命九年七月東女國王湯立悉來朝授立悉銀青光祿大夫歸化州刺史是年哥隣國王董卧庭來朝至綿州卒贈武徳州刺史命其子利羅為保寜都督府長史襲哥隣王十年五月以西川歸化蠻悉嗟為左驍衛將軍同正是月加工部員外郎袁滋兼御史中丞賜紫金魚袋持節冊南詔使南詔異牟尋即雲南王閣羅鳳之孫天寳中閣羅鳳北臣吐蕃命為賛普鍾號曰東帝給以金印大歴十四年卒異牟尋嗣立至是乃去吐蕃所立帝號請復南詔舊名帝嘉之賜以金印銀窠其文曰貞元冊南詔印十二月封南詔清平官檢校左散騎常侍尹求寛為髙溪郡王十一年二月令内常侍殷志瞻將冊書往渤海冊大嵩璘為渤海王忽汗州都督嵩璘渤海大欽茂之子襲父位也五月冊拜廻紇騰里邏羽錄没密施合胡祿骨咄祿毗伽懷信可汗以祕書少監史館修撰張薦兼御史中丞充使十四年三月加渤海郡王兼左驍衛大將軍忽汗州都督大嵩璘銀青光祿大夫檢校司空冊為渤海國王依前忽汗州都督大嵩璘父欽茂以開元二十六年襲其父武藝忽汗州都督渤海郡王左金吾大將軍天寳中累加特進太子詹事賔客寳應元年進封渤海國王大歴中又累拜司空太尉及嵩璘襲位但授其郡王將軍嵩璘遣使叙禮故更加冊命焉十一月以朔方靈州同節度副使左金吾衛大將軍同正兼詳太常卿慕容復襲長樂府都督青海國王烏地野㧞勒豆可汗十六年四月以故開府儀同三司檢校太尉使持節充寜海軍使上柱國新羅國王金敬則嫡孫權知國事俊邕可襲祖開府檢校太尉鷄林州大都督等新羅國王令司封郎中兼御史中丞韋丹持節冊命丹至鄆州聞俊邕卒其子立詔丹還十九年正月授黎州廓清道蠻首領襲恭化郡王劉志遼試太常卿順宗以貞元二十一年正月即位三月立新羅嗣王金重熈為開府儀同三司檢校太尉使持節大都督鷄林州諸軍事鷄林州刺史兼持節充寜海軍使上柱國其母和氏為太妃其妻朴氏為妃遣兵部郎中兼御史大夫季方充使四月封彌臣嗣王道勿禮為彌臣國王五月加忽汗州都督渤海王大嵩璘金紫光禄大夫檢校司徒憲宗以永貞元年八月即位時廻紇懷信可汗卒使來告䘮十一月冊命可汗為愛登里邏汨徳没施俱錄毗伽可汗以鴻臚少卿兼御史中丞孫杲充弔祭冊立使元和元年二月授入朝奚王梅落銀青光祿大夫檢校司空饒樂郡王放還蕃國十月加忽汗州都督渤海國王大嵩璘檢校太尉十二月以南詔異牟卒冊其子驃信酋蒙閣勸為南詔遣諌議大夫叚平仲司封郎中李逄吉充副使并鑄元和冊南詔印從平仲所請也三年五月以廻鶻騰里野合俱祿毗伽可汗卒命使冊九姓回鶻可汗為愛登里囉汨没密施合毗伽保義可汗以前山南西道節度使栁晟為檢校工部尚書兼將作監持節充使六月沙陀突厥七百人携其親屬歸於振武節度使范希朝尋授其大首領曷勒阿波左武衛大將軍同正員兼隂山府都督祕書監四年正月以故渤海國王大嵩璘男元瑜為銀青光祿大夫檢校祕書監充忽汗州都督冊為渤海國王十月以投來奚王没辱孤為右領軍衛將軍員外同正充幽州盧龍軍節度平州逰奕兵馬使仍賜姓李氏七年七月以新羅王金重熈卒立其相金彦昇遣使來告詔以彦昇為開府儀同三司檢校太尉使持節大都督鷄林州諸軍事兼持節充寜海軍使上柱國封新羅國王妻真氏冊為妃仍令有司准式兼命職方員外郎攝御史中丞崔延充使八年正月以故渤海國王大元瑜長弟權知國務言義為銀青光禄大夫檢校祕書監忽汗州都督冊為渤海國王遣内侍李重旻充使十一年五月南詔龍蒙盛卒遣使請冊立其君長命少府少監李銳兼御史中丞持節冊立左賛善大夫許堯佐副之十三年四月以知渤海國務大仁秀為銀青光祿大夫檢校祕書監忽汗州都督冊為渤海國王十五年閏正月加忽汗州都督渤海國王大仁秀金紫光祿大夫檢校司空穆宗長慶元年四月以囘紇毗伽保義可汗卒正衙冊囘鶻君長為登羅羽祿没密施句主録毗伽可汗以少府監裴通充使三年九月南詔遣使朝貢以京兆少尹韋審規為冊立南詔使敬宗寳歴元年五月命使冊立九姓廻鶻愛登里囉骨没密施合毗伽昭禮可汗遣品官田務豐領國信文宗太和四年七月以投來奚王茹羯為守右驍衛將軍員外置同正員五年正月以權知渤海國王務大彛震為銀青光禄大夫檢校祕書監兼忽汗州都督冊為渤海國王四月以新羅金彦昇卒詔其子景徽為開府儀同三司檢校太尉使持節鷄林州諸軍事充雞林州大都督寜海軍等使仍賜上柱國封為新羅王復封其母朴氏為新羅太妃妻真氏為王妃命太子左諭徳兼御史中丞源寂持節弔祭冊立七年四月制曰王者運神功以清九有敷至徳以柔四夷雖萬國建邦皆有君長而一時縟禮特厚親隣用昭絶漠之榮式示徽章之貴克膺盛典允屬雄材咨爾九姓廻鶻愛登里羅汨没密施合句祿毗伽彰信可汗代濟公忠時推英毅剛明有守信實不渝總北方勁悍之師慕中華清净之化克昭前訓實懷逺圖慶叶承家願申永好彼無侵軼此務綏安兩國咸歡六姻彌重事大之義而合志春秋相嚮之誠而皎如日月使臣旁午贄幣交馳詞意綢繆禮貌恭恪是嘉誠欵宜錫寵光必能䖍受新恩纂乃舊服今遣使寜逺將軍右金吾衛將軍兼御史大夫上柱國賜紫金魚袋唐宏實副使中大夫將作少監兼御史中丞賜紫金魚袋嗣澤王容等持節備禮冊為九姓囘鶻愛登里羅汨没密施合句祿毗伽彰信可汗於戯海内四極惟唐舊封天下一家與我同􅁤舉茲典冊布於神明爾其慎固封疆祗守名器罔墜先烈載揚令猷欽承禮文以作來範武宗㑹昌二年六月封天徳降到囘鶻首領唱没斯為懷化郡王賜牙旗豹尾尋加檢校工部尚書兼歸義軍使制曰囘鶻代雄絶漠名振北蕃而乃厭金革之彊慕朝廷之禮頻襲冠帶思覩漢儀蟬蛻自取其潔清豹變獨蔚於文彩不有豪傑孰啟壯圖唱没斯禀氣隂山降精斗極生知忠孝神授兵鈐自强之心隐如敵國銳上之氣森若戈矛果能因亂布誠覩機立節深叶懷柔之志不因告諭之詞昔者取士殊隣秦能致覇得賢異壤晋實用材是宜優以寵光處之權貴褒納忠之顯效賜歸義之美名俾建斾於新軍示絶席於諸將勉修臣節服我官榮九月制契丹新立王屈戍可雲麾將軍守右武衛將軍員外制同正員仍賜新印篆其文曰奉國契冊之印宣宗大中元年四月冊黠戞斯酋領為英武誠明可汗國曰堅昆以鴻臚卿李業充使後唐莊宗同光元年賜隂山府都督白承福於中山北石門為柵號寜朔奉化兩府以都督為節度使賜姓李名紹魯二年四月回鶻權知可汗仁美遣使來貢制曰囘鶻可汗仁美代襲驍雄生知義烈秉北方忠順之氣為南靣沙漠之君自列聖有國之初便申盟誓及肅宗中興之運繼立勲庸爾來貢奉不違戎馬無警一心常保於甥舅萬里或結於姻親今則興服之初琛賮俄至仍聞撫寜七部兼且控制諸蕃終姓之道無渝信言必復嗣緒之文斯在典冊宜行俾紹前修且明乆要宜封為英義可汗仍令所司擇日備禮冊命乃以太原少尹李彦圖檢校工部尚書為冊使明宗天成元年十月以嶲州山後兩林百蠻都鬼主右武衛大將軍李卑晚為寜逺將軍大渡河南山前印州六姓都鬼主懷安郡王勿鄧摽莎為定逺將軍三年二月命使冊廻鶻權知可汗仁裕為順化可汗長興三年五月制權知髙麗國事王建可特進檢校太保使持節𤣥莵州都督上柱國封髙麗國王充大義軍使末帝清泰元年七月癸丑檢校刑部尚書𤓰州刺史慕容歸盈轉檢校尚書左僕射時𤓰沙附廻鶻來朝貢令使歸故有斯命晉髙祖天福三年十月制曰于闐國王李聖天境控西陲心馳北闕頃屬前朝多事乆阻來庭今當寳歴開基乃勤述職請備屬籍宜降冊封將引來逺之恩俾樂無為之化宜冊封為大寳于闐國王仍令所司擇日備禮冊命以供奉官張光鄴充使四年三月制曰囘鶻可汗仁裕雄臨朔野䖍奉中朝一方之烽燧蔑聞萬里之梯航繼至自當開創益效傾輸備觀尊奬之心爰降冊封之命宜封為奉化可汗擇日備禮冊命遣衛尉卿邢徳昭持節使之六年五月制曰王者法二象以覆載齊七麗以炤臨既符有道之文是布無私之化其有誠懸象闕路越鯨津首傾拱極之心乆勵事君之節得不示四時之信同萬國之風用顯英賢俾行典禮大義軍使特進檢校太保使持節𤣥莵州都督上柱國髙麗王王建天資間傑神授機謀宇量矜嚴靈襟洞達志堅金石操凛雪霜每切朝宗常勤事大守三韓之重地仁義兼修定百濟之彊隣恩威並振暨朕握圖御宇膺籙開基遣猶子以朝天備彰忠節改名臣而稱賀益證深誠而又敘立國之繇述連姻之舊慕予正朔顯爾籌謀是用時舉徽章聿覃豐澤階升一品位統三師加以户封兼其真食勉膺寵命以保令猷可開府儀同三司檢校太師依前使持節𤣥莵州都督充大義軍使食邑一萬户食實封一千户髙麗國王八月遣光祿卿張澄國子博士謝攀往冊命焉少帝開運二年十二月以權知髙麗國事王武為特進檢校太保使持節𤣥莵州都督上柱國充大義軍事兼御史大夫髙麗國王仍命光祿卿范政太子洗馬張季凝就行冊命周太祖廣順二年二月制權監髙麗國事王昭可特進檢校太保使持節𤣥莵州都督上柱國充大義軍使封髙麗王仍令所司請禮冊命以衛尉卿劉曍充冊使通事舎人顧彦浦副之曍卒於路彦浦溺海而死以太僕少卿王演借衛尉卿充髙麗國冊禮使右衛率府吕繼贇借將作少監充使副世宗顯徳二年十一月以髙麗國遣廣評侍郎荀質來賀登極授其國王王昭開府儀同三司檢校太尉制曰姬旦分疆肅慎列明堂之位武王尊徳朝鮮受箕子之封矧乃代守東藩材稱間世襲衣冠而奉正朔瞻象魏以走梯航推誠逺慕於華風重譯來朝於興運嘉乃丕績宜覃懋恩特進檢校太尉使持節𤣥莵州都督大義軍節度使上柱國髙麗國王王昭地控辰韓風行日域命氏本神僊之族炳靈分象緯之精為仁自契於太平既觀繇已述職罔殊於諸夏來奉充庭朕嗣守鴻圖方崇王道禮樂征伐之柄盡出𦕈躬山河帶礪之盟思傳不朽但遵聲教豈限遐遥俾光燾土之封更假自天之寵於戯儀同三事無先開府之尊冠聳四梁愈見上公之貴琢蒼玉為爾珮餙豐貂為爾冠用報好音且彰柔逺爾其仰宣朝命下慰州民泛濟水為恩波還同在藻指家山於緱嶺免詠式㣲永為屬國之賔無闕外臣之禮可授開府儀同三司檢校太尉依前使持節𤣥莵州諸軍事行𤣥莵州都督充大義軍使髙麗國王勲如故恭帝以顯徳六年即位加髙麗國王王昭檢校太師食邑三千户册府元龜卷九百六十五
