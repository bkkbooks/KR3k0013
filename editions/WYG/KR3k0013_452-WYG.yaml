body:
  text: 册府元龜卷四百五十二宋王欽若等撰將帥部識闇易曰惟幾也故能成天下之務矧乃總司戎重為之將領專閫外之事制軍中之命進退禀於申令勝敗繇乎指顧乃有率意獨任靡稽於衆溺情偏聽自䧟於惡妄作過舉遂流於口實當斷不决爰搆於厲階因而失律敗師致輿尸之咎䘮軀齰舌貽没世之羞者蓋有之矣至或聽反間以害忠賢信卜筮而愆期㑹昧於應變之畧失於防㣲之㫖者又豈可勝道哉書所謂自用則小昔人有言曰愚者闇於成事其斯之謂歟昭公二十三年邾人城翼翼邾邑還將自離姑離姑邾邑從離姑則道經魯之武城公孫鉏曰魯將御我鉏邾大夫欲自武城還循山而南至武城而還依山南行不欲過武城徐鉏丘弱茅地三子邾大夫曰道下遇雨將不出是不歸也謂其山道下泥遂自離姑遂過武城武城人塞其前以兵塞其前道斷其後之木而弗殊邾師過之乃推而蹷之遂取邾師獲鉏弱地定公四年冬蔡侯吳子唐侯伐楚舍舟於淮汭吳乗舟從淮來過蔡而舍之自豫章與楚夾漢豫章漢東江北地名左司馬戍謂子常曰子沿漢而與之上下沿緣也緣漢上下遮使勿渡我悉方城外以毁其舟以方城外人毁吳所舍舟還塞大隧直轅冥阨三者漢東之隘道子濟漢而伐之我自後擊之必大敗之旣謀而行武城黑謂子常黑楚武城大夫曰吳用木也我用革也用軍器不可乆也不如速戰史皇謂子常楚人惡子而好司馬史皇楚大夫司馬沈尹戍若司馬毁吳舟於淮塞城口而入城口三隘道之摠名是獨克吳也子必速戰不然不免乃濟漢而陳自小别至於大别禹貢漢水至大别南入江然則此二别在江夏界三戰子常知不可欲奔知吳不可勝也史皇曰安求其事求知政事難而逃之將何所入子必死之初罪必盡説言致死以克吳可以免貪賄致㓂之罪漢陳餘為成安君時韓信欲東下井陘擊趙趙王歇及餘聞漢且襲之聚兵井陘口號稱二十萬廣武君李左車説成安君曰聞漢將韓信渉西河虜魏王禽夏説新喋血閼與今乃輔以張耳議欲以下趙言其立計議如此此乗勝而去國逺鬬其鋒不可當臣聞千里餽糧士有饑色言難繼也樵蘇後㸑師不宿飽今井陘之道車不得方軌騎不得成列方軌謂併行也列行列也行數百里其勢糧食必在後願足下假臣竒兵三萬人從間路絶其輜重間路微小路也足下深溝高壘勿與戰彼前不得鬬退不得還吾竒兵絶其後野無所掠鹵不至十日兩將之頭可致戲下願君留意臣之計必不為二子所擒矣成安君儒者嘗稱義兵不用詐謀竒計謂曰吾聞兵法什則圍之倍則戰言多十倍者可以圍敵多一倍者戰可勝今韓信兵號數萬其實不能千里襲我亦罷矣今如此避弗擊後有大者何以距之諸侯謂吾怯而輕來伐我不聽廣武君䇿信使間人窺知其不用間人㣲伺之也還報則大喜乃敢引兵遂下竟擒趙王歇斬成安君龍且為楚將時韓信擊齊渡河襲歴下軍至臨菑齊王走高宻使使至於楚請救信已定臨菑東追至高宻西楚使龍且將號稱二十萬救齊齊王龍且并軍與信戰未合或説龍且曰漢兵逺鬬窮㓂戰鋒不可當也齊楚自居其地戰兵易敗散不如深壁令齊王使其信臣招所亡城城聞王在楚來救必反漢漢二千里客居齊齊城皆反之其勢無所得食可無戰而降也龍且曰吾平日知韓信為人易與爾寄食於漂母無資身之䇿受辱於跨下無兼人之勇不足畏也且救齊而降之吾何功今戰而勝之齊半可得自謂當得封齊之半地也何為而止遂與信戰為信所敗擊刺殺之後漢吳漢為大司馬從光武上隴遂圍隗囂於西城帝勑漢曰諸郡甲卒但坐費糧食若有逃亡則沮敗衆心宜悉罷之漢等貪并力攻囂遂不能遣糧食日少吏士疲役逃亡者多及公孫述救至漢遂退敗袁紹為大將軍與曹公相持於官渡許攸進曰曹操兵少而悉師拒我許下餘守勢必空弱若分遣輕軍星行掩襲許昌則操必成擒如其未潰可令首尾奔命破之必也紹不能用果敗張温為車騎將軍出屯美陽會董卓與邊章等戰無功温召卓又不時應命旣到而辭對不遜時孫堅為温參軍勸温陳兵斬之温曰卓有威名方倚以西行堅曰明公親帥王師威振天下何恃於卓而頼之乎堅聞古之名將仗鉞臨衆未有不斷斬以示威武者也故穰苴斬莊賈魏絳戮楊干今若縱之自虧威重後悔何及温不能從而卓有懷忌恨温後果及於難吕布為兖州牧初入兖州書與袁術術報書曰昔董卓作亂破壊王室禍害術門户術舉兵關東未能屠裂卓將軍誅卓送其頭首為術掃滅讎恥使術明目於當世死生不愧其功一也昔將金元休向兖州甫詣封丘為曹操之所拒破流離迸走㡬至滅亡將軍破兖州術復明目於遐邇其功二也術生年已來不聞天下有劉備備乃舉兵與術對戰術慿將軍威靈得以破備其功三也將軍有三大功在術術雖不敏奉以生死將軍連年攻戰軍糧苦少今送米二十萬斛迎逢道路非直此止當駱驛復致若兵器戰具他所乏少大小唯命布得書大喜遂造下邳後兵敗䧏曹操遂為操所殺公孫瓉為前將軍統内外衣冠子弟有才秀者必抑困使在窮苦之地或問其故答曰今取衣冠家子弟及善士富貴之皆自以為職當得之不謝人惠也所寵遇驕恣者類多庸兒若故卜數師劉緯臺販繒李移子賈人樂何當等三人與之定兄弟之誓自號為伯謂三人者為仲叔季富皆巨億或取其女以配己子嘗稱古者曲周灌嬰之屬以譬後為袁紹之兵所擊瓉軍敗乃走還易京固守瓉别將有為敵所圍義不救也其言曰救一人使後將恃救不力戰今不救此後將當念在自勉是以袁紹始北擊之時瓉南界上别營自度守則不能自固又知必不見救是以或自殺其將帥或為紹兵所破遂令紹軍徑至其門瓉為團塹十重於塹裏築京皆高五六丈為樓其上中塹為京特高十丈自居焉積穀三百萬斛英雄記曰瓉諸將家家各作高樓樓以千計瓉作鐵門居樓上屏去左右婢妾侍側汲上文書瓉曰昔謂天下事可指麾而定今日視之非我所决不如休兵力田畜穀兵法百樓不攻今吾樓櫓千重食盡此穀足知天下之事矣欲以此弊紹紹遣將攻之瓉自知終敗盡殺其妻子乃自殺魏劉勲初為廬江太守勲時兵彊於江淮之間孫䇿惡之遣使卑禮厚幣以書説勲曰上繚宗民數欺下國忿之有年矣擊之路不便願因大國伐之上繚甚實得之可以富國請出兵為外援勲信之又得策珠寳葛鉞喜悦外内盡賀而劉曄獨否勲問其故對曰上繚雖小城堅池深攻難守易不可旬日而舉則兵疲於外而國内虗䇿乗虗而襲我則後不能獨守是將軍進兵於敵退無所歸若軍必出禍今至矣勲不從興兵伐上繚䇿果襲其後勲窮踧遂奔太祖王凌鎮揚州旣有謀立楚王彪太傅司馬懿統大軍討之凌與太傅書曰卒聞神軍宻發已在百尺雖知命窮盡遲於相見身首分離不以為恨前後遣使有書未得還報企踵西望無物以譬昨遣書之後便乘船來相迎宿丘頭旦發於浦口奉被露布赦書又得二十三日况累紙誨示聞命驚愕五内失守不知何地可以自處僕乆忝朝恩歴試無效統御戎馬董齊東夏事有闕廢中心犯義罪在二百妻子同縣無所禱矣不圖聖恩天覆地載横䝉視息復覩日月亡甥令狐愚携惑羣小之言僕即時呵抑使不得竞其語旣人已知神明所監夫罪事無隂卒至發露知此梟夷之罪也生我者父母活我者子也又重曰身䧟刑罪謬蒙赦宥今遣掾送印綬頃至當如詔書自縛歸命雖足下私之官法有分及到如書太傅使人解其縛凌旣蒙赦加怙舊好不得自疑徑乘小船自趨太傅太傅使人逆止之住船淮中相去十餘丈凌知見外乃遥謂太傅曰卿直以折簡召我我當敢不至耶而乃引兵軍來乎太傅曰以卿非肯逐折簡者故也凌曰卿負我太傅曰我寧負卿不負國家遂使人送來西凌自知罪重試索棺釘以觀太傅意太傅給之臨行到項夜呼掾屬與訣曰行年八十身名並滅耶遂自殺文欽為前將軍揚州刺史欽曹爽邑人也時與大將軍司馬師戰時殿中人姓尹字大目少為曹氏家奴嘗侍在帝側大將軍將俱出大目知大將軍一日突出啟云文欽本是明公腹心但為人所誤耳又天子鄉里大目昔為文欽所信乞得追解語之令還與公復好大將軍聽遣大目單身往乗大馬被鎧胄追文欽遥相與語大目心實欲曹氏安謬言君侯何若若不可復忍數日也欲使欽解其㫖欽殊不悟乃更厲聲罵大目汝先帝家人不念報恩而反與司馬氏作逆不顧上天天不祐汝乃張弓傅矢欲射大目大目涕泣曰世事敗矣善自弩力也蜀劉璋為益州牧璋焉之子也初焉以張魯為督義司馬住漢中及璋繼為州牧而張魯稍驕恣不承順璋璋殺魯母及弟遂為讎敵璋累遣龎羲等攻魯所破魯部曲多在巴西故以羲為巴西太守領兵禦魯後羲與璋情好携隙趙韙稱兵内向衆散見殺皆繇璋明斷少而外言入故也英雄記曰先是南陽三輔人流入益州數萬家收以為兵名曰東州兵璋性寛柔無威畧東州人侵暴舊民璋不能禁政令多闕益州頗怨趙韙素得人心璋委任之韙因民怨謀叛乃厚賂荆州請和隂結州中大姓與俱起兵還擊璋蜀郡廣漢犍為皆應韙璋馳入成都巴東將人畏威咸同心并力助璋皆殊死戰遂破反者進攻韙於江州韙將龎樂李冀反斬韙又别駕張松勸璋迎先主駕璋從之遣法正請先主璋主簿黄權陳其利害從事廣漢王累自倒縣於州門以諫璋一無所納勑在所供奉先主入境如歸先是先主與璋會涪北至葭萌南還取璋鄭度説璋曰左將軍縣軍襲我兵不滿萬士衆未附野穀是資軍無輜重其計莫如盡驅巴西梓潼民内涪水以西其倉廪野穀一皆燒除高壘深溝静以待之彼至請戰勿許乆無所資不過百日必將自走走而擊之則必擒耳先主聞而惡之以問正正曰終不能用無可憂也璋果如正言謂其羣下曰吾聞拒敵以安民未聞勤民以避敵也於是黜度不用其計吳歩隲為驃騎將軍領冀州牧都督西陵上表言曰北降人王潜等説北相部伍圖以東向多作布囊欲以盛沙塞江以大向荆州夫備不豫設難以應卒宜為之防大帝曰此曹衰弱何能有圖必不敢來若不如孤言當以牛千頭為君作主人後有吕範諸葛恪為説隲所言云每讀歩隲表輙失笑此江與開闢俱生寧有可以沙囊塞理也濮陽興為衛將軍永安三年都尉嚴宻建丹陽湖田作浦里塘詔百官會議咸以為用功多而田不保成惟興以為可成遂㑹諸兵民就作功傭之費不可勝數士卒死亡或自賊殺百姓大怨之晉王渾為安東將軍時前趙劉元海為侍子在雒陽屬王彌從雒陽東歸元海餞彌於九曲之濱齊王攸時在九曲北聞而馳遣視之見元海在焉言於武帝曰陛下不除劉元海臣恐并州不得乆寧渾進曰元海長者渾為君王保明之且大晉方表信殊俗懐逺以徳如之何以無萌之疑殺人侍子以示晉徳不𢎞帝曰渾言是也㑹豹卒以元海代為左部帥賈充為太尉錄尚書事時武帝伐吳詔充為使持節假黄鉞大都督為諸軍節度及王濬之克武昌也充遣使表曰吳未可悉定方夏江淮下濕疾疫必起宜詔諸軍以為後圖雖腰斬張華不足以謝天下華豫平吳之䇿故充以為言中書監荀朂奏宜如充表帝不從杜預聞充有奏馳表固爭言平在旦夕使及至轘轅而孫皓已降吳平軍罷帝遣使侍中程咸犒勞賜充帛八千疋增益八千戸充本無南伐之謀固諫不見用及師出而吳平孫皓降於王濬充未之知方抗表請班師充表與告㨗同至朝野以充位居人上智出人下王浚為司空領冀州初石勒為臣於浚而隂勒兵襲之軍達易水浚督䕶孫絳馳白浚將引軍拒勒㳺統禁之浚將佐咸請出擊勒浚怒曰公來正欲奉戴我也敢言擊者斬乃命設饗以待之勒晨至薊北門者開門疑有伏兵先驅牛羊數千頭聲言上禮實欲塡諸街巷使兵不得發浚乃懼或坐或起勒升其㕔事命甲士執之斬於襄國市張光為材官將軍梁州刺史鎮漢中時逆賊王如餘黨李運楊武等自襄陽將三千餘人入漢中光遣參軍晉邈率衆於黄金距之邈受運重賂勸光納運光從之邈以運多珍貨又欲奪之復言於光曰運之徒屬不事田農但營器仗意在難測可掩而取之光又信焉遣邈衆討運不尅光乞師于氐王楊茂搜搜遣子難敵助之難敵求於光光不與楊武乃厚賂難敵謂之曰流人寳物悉在光處今伐我不如伐光難敵大喜聲言助光内與運同光弗之知也悉遣援卒助邈運與難敵夾攻邈等援為流矢所中死賊遂大盛牽秀為尚書河間王顒甚親任之關東諸軍奉迎大駕以秀為平北將軍領馮翊秀與顒將馬瞻等將輔顒以守關中顒宻遣使就東海王越求迎越遣將麋晃等迎顒時秀擁衆在馮翊晃不敢進顒長史楊騰前不應越軍懼越討之欲取秀以自效與馮翊大姓諸嚴詐稱顒命使秀罷兵秀信之騰遂殺秀於萬年郄隆為揚州刺史趙誘為主簿隆被齊王冏檄使起兵討趙王倫隆欲承檄舉義而諸子姪並在雒陽欲坐觀成敗恐為冏所討進退有疑會羣吏計議誘說隆曰趙王簒逆海内所病今義兵飈起其敗必矣今為明使君計莫若自將兵徑赴許昌上策也不然且可留後遣猛將將兵㑹盟亦中䇿也若遣小軍隨形助勝下䇿耳隆曰我受二帝恩無所偏助止欲保州而已誘與治中留寳王簿張褒等諫隆若無所助變難將生州亦不可保也隆猶豫不决遂為其下所害桓冲為西鎮以賊㓂方强故移鎮上明謂江東力弱止可保固封疆自守而已又以將相異宜自以徳望不逮謝安故委之内相而四方鎮扞以為己任又與朱序欵宻俄而序投於賊冲深用愧惋旣而苻堅盡國内侵冲深以根本為慮乃遣精鋭三千來赴京都謝安謂三千人不足以為益而欲外示閒暇聞軍在近固不聽報云朝廷處分已定兵革無闕西藩宜以為防時安已遣兄子𤣥及桓伊等諸軍冲謂不足以為廢興召佐吏對之歎曰謝安乃有廟堂之量不嫻將畧今大敵垂至方遊談不暇雖遣諸不經事少年衆又寡弱天下事可知吾其左袵矣俄而聞堅破大勲克舉又知朱序因以得還冲本疾病加以慚恥發病而卒殷浩為中軍将軍北征許雒師次壽陽潜誘苻健大臣梁安雷弱兒等使殺健許以關右之任初降人魏脱卒其弟憬代領部曲姚襄殺憬以并其衆浩大惡之使龍驤將軍劉啟守譙遷襄於梁旣而魏氏子弟往來壽陽襄益猜懼俄而襄部曲有欲歸浩者襄殺之浩於是謀誅襄會苻健殺其大臣健兄子眉自雒陽西奔浩以為梁安事㨗意苻健已死請進屯洛陽修復園陵使襄為前驅冠軍將軍劉洽鎮鹿臺建武將軍劉遯據倉垣又求解揚州專鎮雒陽詔不許浩旣至許昌㑹張遇反謝尚又敗績浩還壽陽後復進軍次山桑而襄反浩懼棄輜重退保譙城器械軍儲皆為襄所掠士卒多亡叛浩遣王啟劉彬之擊襄於山桑並為襄所殺謝琰為衛將軍徐州刺史時孫恩作亂詔琰與輔國將軍劉牢之俱討孫恩逃於海島朝廷憂之以琰為會稽内史都督五郡軍事琰旣以資望鎮越土議者謂無復東顧之虞及至郡無綏撫之能而不為武備將帥皆諫曰强賊在海伺人形便宜振揚仁風開其自新之路琰曰苻堅百萬尚送死淮南况孫恩奔衂歸海何能復出若其復至正是天不養國賊令速就戮耳遂不從其言恩後果復冦浹口入餘姚破上虞進及邢浦劉義眞鎮關中而佛佛虜夜逼交至沈田子旣殺王鎮惡王脩又殺田子義眞年少賜與左右不節脩嘗裁减之左右並怨因是白義眞曰鎮惡欲反故田子殺之脩今殺田子是又欲反也義眞乃使左右劉乞等殺脩前秦苻丕堅之子也堅敗於淮南丕時鎮鄴堅使慕容垂至鄴垂請入鄴城拜廟丕不許乃潜服而入亭吏禁之垂怒斬吏燒亭而去石越言於丕曰垂之在燕破國亂家及投命聖朝蒙超常之遇忽敢輕侮方鎮殺吏焚亭反形已露終為亂階將老兵疲可襲而取之丕曰淮南之敗衆散親離而垂侍衛聖躬誠不可忘越曰垂旣不忠於燕其肯盡忠于我乎且其亡虜也主上寵同勲舊不能銘澤誓忠而首謀為亂今不擊之必為後害丕不從越退而告人曰公父子好存小仁不顧天下大計吾屬終當為鮮卑虜矣後果自立為燕王梁熈為凉州刺史時苻堅旣死子丕新立安西吕光自西域還師至于宜禾熈謀閉境拒之高昌太守楊翰言於熈曰吕光新定西國兵强器鋭其鋒不可當也度其事意必有異圖且今關中擾亂京師存亡未知自河已西迄於流沙地方萬里帶甲十萬鼎峙之勢實在今日若光出流沙其勢難測高梧谷口水險之要宜先守之而奪其水彼旣窮獨自然投戈如其以逺不守伊吾之關亦可拒也若度此二要雖有子房之䇿難為計矣地有所必爭眞此機也熈弗從美水令犍為張統説熈曰主上傾國南討覆敗而還慕容垂擅兵河北泓冲㓂逼京師丁零雜虜䟦扈關雒州郡姦豪所在風扇王綱弛絶人懐利己今吕光廻師將軍何以抗之熈曰誠深憂之未知計之所出統曰光雄果勇毅明畧絶人今以蕩西域之威擁歸師之鋭鋒若猛火之盛於原弗可敵也將軍世受殊恩忠誠夙著立勲王室宜在於今行唐公雒上之從弟勇冠一時為將軍計者莫若奉為盟主以攝衆望推忠義以總率羣豪則光無異心也資其精鋭東兼毛興連王統楊璧集四川之衆掃兇逆於諸夏寧帝室於關中此桓文之舉也熈又不從殺雒於西海以子𦙍為鷹揚將軍率衆五萬拒光於酒泉敦煌太守姚靜晉昌太守李純以郡降光𦙍及光戰於安彌為光所敗武威太守彭濟執熈迎光光殺之建武西郡太守索泮奮威督洪池以南諸軍事酒泉太守宋皓等並為光所殺宋殷孝祖為兖州刺史撫軍將軍泰始二年與賊合戰嘗以鼓盖自隨軍中人相謂曰殷統軍可謂死將矣今與賊交鋒而以羽儀自標題若善射者十士攅射欲不斃得乎是日於陣為矢所中死劉秉為左僕射兼領軍將軍與齊太祖共掌機事蒼梧廢秉出議於路逢弟韞韞開車迎問秉曰今日之事當歸邪秉曰吾等已讓領軍矣韞搥胷曰君肉中詎有血耶南齊陳裔叔初從太祖征伐有功封當陽縣子後為太子左率啟世祖以鍜箭􅀈用鐵多不如鑄作東冶令張侯伯以鑄􅀈鈍不合用事不行梁鄧元起為平西將軍益州刺史任庾黔婁蔣光濟以州事並勸為善元起舅子梁矜孫性輕脱與黔婁志行不同乃言於元起曰城中稱有三刺史節下何以堪之元起由此疎黔婁光濟而治迹稍損朱异為領軍時北齊侯景為豫州牧據壽春將圖不軌鄱陽王範鎮合肥及司州刺史羊鴉仁俱累啟稱景有異志异曰侯景數百叛虜何能為並抑不奏聞而愈加賞賜所以姦謀益果陳周敷梁末與周廸起義兵討侯景後為豫章太守時江南酋帥多不入朝敷天嘉二年遂詣闕進號安西將軍賜皷吹還鎮豫章周廸以敷素出己下超居顯貴甚不平遂反為敷所破五年廸又收合餘衆還襲東興世祖遣都督章昭達征廸敷又從至定川縣與迪相對迪貽敷書曰吾昔與弟戮力同心宗從匪他豈規相害今願伏罪還朝因弟披露心腑先乞挺身共立盟誓敷許之方登壇為廸所害年三十五詔曰使持節散騎常侍都督南豫章縁江諸軍事鎮南將軍豫州刺史西封縣開國侯敷受任遐征淹時違律虗禁奸詭遂貽䘮仆但夙著勤誠亟勞戎旅猶深惻愴愍悼于懷可存其弟量加賻䘏後魏劉潔太武時車駕西伐潔為前鋒沮渠筏揵弟董來率萬餘人拒戰於城南潔信卜者之言日晨不協擊鼔却陣故後軍不進董來得入城羅雲為給事中時西部勅勒叛詔雲與汝隂王天賜討之為前鋒勅勒詐降雲信之副將元伏曰勅勒色動恐有變今不設備將為所圍雲不從勑勒襲殺雲天賜僅得自全元石為都將招慰淮南遣鄭羲參石軍事石引軍東討汝隂汝隂太守張超城守不下石率精鋭攻之不尅遂退至陳項議欲還軍長社待秋擊之諸將心樂早還咸稱善計羲曰今張超驅市人負擔石蟻聚窮城命不延月宜安心守之超食已盡不降當走可翹足而待成擒也而欲棄還長社道塗懸逺超必修城深塹多積薪穀將來恐難圖矣石不納遂旋師長社至冬復往攻超超果設備無功而還歴年超死楊文長代戍食盡城潰乃尅之竟如羲䇿裴粲為驃騎大將軍膠州刺史時青叛賊耿翔受梁假署㓂亂三齊粲高談虗論不事防禦之術翔乗其無備掩襲州城左右白言賊至粲云豈有此理左右又言已入州門粲徐云耿王可引上聽事自餘部衆且付城民其不達時變如此尋為翔所害送首於梁崔延伯為左衛將軍與行臺蕭寳寅同討万俟醜奴自涇州緣原北上衆軍將出討賊未戰之間有賊數百騎詐持文書云是降簿乞且緩師寳寅延伯謂其事實逡廵未閱俄而宿勤明達率衆自東北而至乞降之賊從西競下諸軍前後受敵延伯上馬突陣賊勢摧挫便爾逐北徑造其營賊奔輕騎延伯軍兼歩卒兵力疲怠賊乃乘間得入排城延伯軍遂大敗後周尉遲逈為相州都督以開府小御正崔達拏為長史餘委任亦多用齊人達拏文士無籌畧舉措多失紀綱不能有所拯救唐鄭仁泰為鐵勒道行軍大總管仁泰旣降鐵勒部落副將楊志追討之反為所敗有候騎告仁泰曰賊輜重在近畜牧被野可往而擒也仁泰領騎一萬四千人卷甲輕齎倍道赴之遂踰大磧至仙蕚河竟不見賊糧且盡遂勒兵而還士卒饑甚又遇大雪凝凍棄其戈甲殺馬以食之强弱自為伍前後分散馬盡人皆相食比入境餘兵纔八百人薛訥𤣥宗初突厥屢為邊患訥建議請出師討之開元二年夏詔與左監門將軍杜賓客定州刺史崔宣道等率衆二萬出檀州道以討契丹杜賓客以為時屬炎暑將士負戈甲齎資糧深入㓂境恐難為制勝中書令姚元崇亦以為然訥獨曰夏月草茂羔犢生息之際不費糧儲亦可漸進一舉振國威靈不可失也時議咸以為不便𤣥宗方欲威服四夷特令訥同紫㣲黄門三品總兵擊契丹議者乃息六月師至灤河遇賊時旣蒸暑諸將失計會盡為契丹等所覆訥脱身走免歸罪於崔宣道及蕃將李思敬等八人詔盡令斬之特免杜賓客之罪下制曰并州大都督府長史兼檢校左衛大將軍和戎大武等諸軍州節度大使同紫㣲黄門三品薛訥總戎禦邊建議為首暗於料敵輕於接戰張我王師衂之虜境觀其疇昔頗嘗輸罄每欲資忠報主見義忘身特緩嚴刑俾期來效宜放其罪所有官爵等並從除削鮮于仲通為劔南節度使天寳七載閤羅鳯襲雲南王無何張䖍陀為雲南太守仲通􅄶急寡謀䖍陁矯詐遇之不以禮舊事南詔嘗與其妻子謁見都督䖍陁皆私之又有所徵求閤羅鳯皆不應䖍陁遣人罵辱之仍宻奏其罪惡閤羅鳯忿怨因發兵反攻圍䖍陁殺之時天寳九載也明年仲通率兵出戍嶲州閤羅鳯遣使謝罪仍與雲中錄事參軍姜茹芝俱來請還其所虜掠且言吐蕃大兵壓境若不許當歸命吐蕃雲南之地非唐有也仲通不許囚其使進軍逼太和城為南詔所敗鄧景山為河東節度使有一偏將抵罪當死諸將各代謝罪景山不許又其弟請以身代其兄罪景山又不許弟請納馬一匹以贖兄罪景山許其減死衆咸怒謂景山曰我等人命輕於一馬乎景山慙且怒叱令速出衆不肯去遂亂崔光逺乾元中為魏州節度使將軍李處崟拒賊敗投光逺賊隨至城下反間之曰處崟召我來何為不出光逺乃腰斬處崟處崟素善戰衆皆倚之及死人用危懼李惟岳為成德軍節度使疑王武俊武俊謂惟岳曰先相公委任武俊以遺大夫兼有理命今披肝膽為大夫者武俊耳又士真即大夫妹婿保無異志今勢危急若不坦懐待之若更如康日知即大事去矣惟岳曰我待武俊自厚不獨先公遺㫖繇是無疑後終為武俊所殺楊襲古為北庭節度使貞元六年冬吐蕃率葛祿白眼之衆來㓂北庭廻鶻大相頡于迦斯率衆援之頻戰敗績吐蕃攻圍頗急北庭之人旣苦廻紇是嵗乃舉城降之於吐蕃沙陀部落亦䧏襲古與麾下二千餘人出奔西州頡于迦斯不利而還七年秋又悉其丁壯五六萬人將復北庭仍召襲古偕行俄為吐蕃葛禄等所擊大敗死者大半頡于迦斯收合餘燼晨夜奔還襲古之衆僅餘六七百人將復入西州頡于迦斯紿之曰與我同至牙帳當送君歸本朝也襲古從之及牙帳留而不遣竟殺之陸長源為宣武節度董晉為行軍司馬長源好滋章云為數請改易舊事務從削刻晉初皆許之及案牘已成晉乃令且罷又委錢穀支計於判官孟叔度叔度輕佻好慢易軍人人皆惡之晉卒後未十日汴州大亂殺長源叔度等張𢎞靖為宣武節度使俄以劉總累求歸闕且請𢎞靖代已制加檢校司空平章事充盧龍軍節度使𢎞靖之入幽州也薊人無老㓜男女皆夾道而觀焉河朔軍帥冐寒暑多與士卒同無張蓋安輿之别𢎞靖久富貴又不知土風入燕之時遂肩輿於三軍之中薊人頗駭之𢎞靖又以祿山思明之亂始自幽州欲於事初盡革其俗乃發祿山墓毁其棺柩人尤失望從事有韋雍張宗厚數軰復輕肆嗜酒嘗夜飲醉歸燭火滿街前後呵叱薊人所不習之事又雍等詬責吏卒多以反虜名之薊人不勝其憤遂相率以叛遷𢎞靖於薊門館執韋雍張宗厚軰數人皆殺之續有張徹者自逺使廻軍人以其無過不欲加害將遷置館中徹不知其心謂亦不免遂索𢎞靖所在大罵軍人亦為亂兵所殺明日吏卒稍稍自悔悉詣館後請𢎞靖為帥願改心事之凡三請𢎞靖卒不對軍人乃相謂曰相公無言是不捨吾曹必矣軍中豈可一日無帥遂取朱洄為兵馬留後朝廷旣除洄子克融為幽州節度使乃貶𢎞靖為撫州刺史李道古為鄂岳觀察使初李聽為安州刺史隨鄂岳觀察使柳公綽討吳元濟軍中動靜悉用聽謀軍勢遂壯及道古為㢘察聽為所間故鄂軍不振李茂貞為鳯翔節度使梁太祖伐河中河中王珂使人告茂貞曰聖上初返正詔藩鎮無相侵伐同輔王室朱公不顧國家約吏卒遣大軍急攻敝邑則朱公之心可見矣敝邑若亡則同華邠岐非諸君所能保也天子神器拱手而授人矣此自然之勢也公可與華州令公早出精鋭固潼關以應敝邑僕自量不武請於公之西偏永為鎮守此地請公有之關西安危國祚延促計公此舉也茂貞比昧逺圖書至不報後唐史彦瓊本伶人也莊宗同光末以彦瓊為武徳使在魏州時有自貝州來者言亂兵將犯都城廵檢使孫鐸等急趨彦瓊之第告曰賊將至矣請給鎧仗登城拒守彦瓊曰今日賊至臨潼計程六日晚至為備未晚孫鐸曰賊來㓂我必倍道兼行一朝失機悔將何及請僕射率衆登陣鐸請以勁兵千人伏於王莽河逆擊之賊旣挫勢須至離潰然後可以剪除如俟其兇徒傅於城下必慮姦人内應則事未可測也彦瓊曰但訓士守城何須即戰時彦瓊疑孫鐸等有他志故拒之是夜三更賊果攻北門彦瓊時以部衆在北門樓聞賊呼譟即時驚潰彦瓊單騎奔京師晉李彦縚為陳州節度使每在少帝側昇降將相但與宦官近臣締結致外情不通陷君於危亡之地嘗謂人曰朝廷所設文官將何用也且欲澄汰徐而廢之周馬希蕚鎮湖南屬馬希廣破城之後谿洞蠻軍縱兵發火向時府署廨舍連闥洞房焚蕩俱盡積世府庫所畜皆為蠻兵剽掠所存空城而已希蕚于灰燼中自稱主帥但以得位自矜殊無鴟鴞惜巢之意與所眤羣小狎逰日夜縱酒歌呼軍中将校以其殘害骨肉無心悔禍上下不悦終至於敗册府元龜卷四百五十二
