body:
  text: 册府元龜卷二百七十五宋王欽若等撰宗室部褒寵古之有天下者莫不封建宗子夾輔王室親之以脤膰之禮厚之以寳玉之賜既以旌賢而彰徳亦以修睦而申恩成周以來或加之殊禮推以蕃錫異其車服之數厚以宴私之意寵遇官屬增給騎從徙國益賦􅅷賞延世圖像以昭其美下詔以揚其善乃至耆年尊屬優以几杖之賜送終即逺殊其窀穸之制極禮命之優渥聳籓維之風望皆所以彊幹固本興仁宣化法敦族於唐典遵立愛於商訓者也周公旦武王弟歸政成王欲老成王留之為太師履赤舄赤舄人君之盛履也周公既卒成王乃命魯得郊祭文王魯有天子禮樂者以褒周公之徳也又分魯公以大輅大旂魯公伯禽大輅金輅錫同姓之諸侯車也交龍為旂周禮同姓以封夏后氏之璜封父之繁弱封父古諸侯也繁弱大弓名以昭周公之明徳衛康叔封武王弟也成王賜衛寳祭噐以彰有徳分康叔以大路少帛綪茷旃旌少帛雜帛也綪茷大赤取染草名也通帛為旂析羽為旌大吕鐘名唐叔虞武王子成王分唐叔以大路宻須之皷宻須國名闕鞏甲名沽洗鐘名魯公康叔唐叔三叔者有令徳故昭之以分物漢楚元王交髙祖同父少弟六年立為楚王文帝尊寵元王子生爵比皇子元王生子封爵皆比皇子所以為尊寵也濟北王勃淮南厲王長子初封衡山王七國反吳使者至衡山衡山王不應堅守無二心孝景四年吳楚已破衡山王朝帝以爲貞信乃勞苦之曰南方卑濕徙王王於濟北以褒之梁孝王武文帝子竇太后少子太后愛之賞賜不可勝道得賜天子旌旗從千乗萬騎江都易王非景帝子吳楚反時非年十五上書自請擊吳景帝賜非將軍印擊吳吳已破以軍功賜天子旌旗淮南王安菑川王志元朔二年冬皆賜几杖母朝廣陵王胥武帝子昭帝初立益封胥萬三千户元􅃫中入朝復一萬户賜錢二千萬黄金二千斤安車駟馬寳劔及宣帝即位封胥四子聖曾寳昌皆為列侯又立胥小子𢎞為髙宻王所以褒賞甚厚陽城侯徳楚元王曾孫少時數言事召見甘泉宫武帝謂之千里駒地節中以親親行謹厚封為陽城侯子安民為郎中右曹宗家以徳得官宿衛者二十餘人甘露三年單于始入朝帝思股肱之美乃圖畵其人麒麟閣法其形貌署其官爵姓名凡十一人其八曰宗正陽城侯劉徳皆有功徳知名當世是以表而揚之明著中興輔佐列於方叔召虎仲山甫焉淮陽王欽宣帝子成帝即位以淮陽王屬為叔父敬寵之異於它國楚孝王囂宣帝子成帝河平中入朝時被疾天子閔之下詔曰盖聞天地之性人為貴人之行莫大于孝楚王囂素行孝順仁慈之國以來二十餘年纎介之過未嘗聞朕甚嘉之今乃遭命離於惡疾夫子所痛曰蔑之命矣夫斯人也而有斯疾也朕甚閔焉夫行純茂而不顯異則有國者將何朂哉書不云乎用徳章厥善今王朝正月詔與子男一人俱従王入朝也其以廣戚縣户四千三百封其子勲為廣戚侯河間王良獻王後也脩獻王之行太后薨服䘮如禮哀帝下詔褒揚曰河間王良䘮太后三年為宗室儀表其益封萬户後漢城陽王祉光武族兄建武二年封賜乗輿御物車馬衣服十一年疾病上城陽王璽綬願以列侯奉先人祭祀帝自臨其疾安成侯賜光武族兄以列侯奉朝請帝以賜有恩信故親厚之數蒙宴私時幸其第恩賞特異賜輙賑與故舊無有遺積帝為營冡起祠廟置吏卒如舂陵孝侯成武侯順與光武同里閈少相厚成武邑户最大租入倍宗室諸家建武十一年卒帝使使者迎䘮親自臨弔杼秋侯劉般宣帝𤣥孫建武十九年行幸沛詔問郡中諸侯行能太守薦言般束脩至行為諸侯師帝聞而嘉之乃賜般緡錢百萬繒二百匹二十年復與車駕㑹沛因從還雒陽賜榖什物留為侍祠侯永平元年徙封居巢侯就國數年揚州刺史觀恂薦般在國口無擇言行無怨惡宜蒙旌顯明帝嘉之十年徴般行執金吾事從至南陽還為朝侯明年兼屯騎校尉時五校官顯職閒而府寺寛敞輿服光麗伎巧畢給故多以宗室肺腑居之每行幸郡國般常将長水胡騎從帝即位以為長樂少府建初二年遷宗正般妻卒厚加賵贈及賜冡塋地於顯節陵下東海恭王彊光武長子建武十九年封為東海王二十八年就國帝以彊廢不以過去就有禮故優以大封兼食魯郡合二十九縣賜虎賁旄頭宫殿設鐘簴之懸擬於乗輿彊臨之國數上書譲還東海又因皇太子固辭帝不許深嘉嘆之以彊章宣示公卿初魯恭王好宫室起靈光殿甚壯麗是時猶存故詔彊都魯永平元年彊病顯宗遣中常侍鉤盾令將太醫乗驛視疾詔沛王輔濟南王康淮陽王延詣魯及薨臨命上疏謝曰臣蒙恩得備藩輔特受二國宫室禮樂事事殊異巍巍無量訖無報稱而自修不謹連年被疾為朝廷憂念皇太后陛下哀憐臣彊感動發中數遣使者太醫令丞方伎道術絡驛不絶臣伏惟厚恩不知所言臣内省視氣力羸弱日夜浸困終不復望見闕庭奉承帷幄孤負重恩銜恨黄泉身既夭命孤弱復為皇太后陛下憂慮誠悲誠慙息政小人也猥當襲臣後必非所以全利之也誠願還東海郡天恩愍哀以臣無男之故處臣三女小國侯此宿昔常計今天下新罹大憂惟陛下加供養皇太后數進御食臣彊困劣言不能盡意願並謝諸王不意永不復相見也天子覽書悲慟從太后出幸津門亭發哀使大司空持節䕶喪事大鴻臚副宗正將作大匠視䘮事贈以殊禮升龍旄頭鸞輅龍旂虎賁百人詔楚王英趙王栩北海王興舘陶公主比陽公主及京師親戚四姓夫人小侯皆㑹葬帝追惟彊深執謙儉不欲厚葬以違其意於是特詔中常侍杜岑及東海傅相曰王恭謙好禮以徳自終遣送之物務從約省衣足歛形茅車瓦噐物减於制以彰王卓爾獨行之志將作大匠留起陵廟東平王蒼光武子好經書雅有智思明帝甚愛重之及即位拜為驃騎將軍置長史掾史員四十人位在三公上四府掾史皆無四十人今特置以優之蒼上疏乞上驃騎將軍印綬退就藩國優詔不聼其後數陳乞辭甚懇切永平五年乃許還國而不聼上將軍印綬以驃騎長史為東平太傅掾為中大夫令史為王家郎加賜錢五千萬布十萬疋六年冬帝幸魯徴蒼從還京師明年蒼乃歸國特賜宫人奴婢五百人布二十五萬疋及珍寳服御噐物蒼為人美須髯腰帯八圍明帝手詔國中傅曰日者問東平王處家何等最樂王言為善最樂其言甚大副是要腹矣今送列侯印十九枚諸王子年五嵗已上能趨拜者皆令帯之十五年春行幸東平賜蒼錢千五百萬布四萬疋章帝即位尊重恩禮踰於前世諸王莫與為比建初元年地震蒼上便宜三事帝曰朕親自覽讀反覆數周心開目明矌然發矇韋昭注國語目有眸子而無見曰矇間吏人奏事亦有此言但明智淺短或謂儻是復慮為非何者灾異之降縁政而見今改元之後年饑人流此朕之不徳感應所致又冬春旱甚所被尤廣雖内用克責而不知所定得王深策快然意解詩不云乎未見君子憂心冲冲既見君子我心則降思惟嘉謨以次奉行冀蒙福應彰報至徳特賜王錢五百萬六年冬蒼上疏求朝明年正月帝許之特賜裝錢千五百萬其餘諸王各千萬帝以蒼冒渉寒露遣謁者賜貂裘說文曰貂䑕屬也大而黄黑出丁零國及大官食物􅈿果使大鴻臚竇固持節郊迎帝乃親自循行邸第豫設帷帳其錢帛噐物無不充備下詔曰禮伯父歸寜乃國儀禮曰覲禮諸侯至於郊王使皮弁用璧勞侯氏侯氏亦皮弁迎於帷門之外再拜天子賜舍曰賜伯父舍同姓西面北上異姓東面北上侯氏禆冕釋幣於禰乘墨車載龍旂弧韣乃朝以瑞玉有繅天子貟斧扆曰伯父實來余一人嘉之又奉束帛匹馬再拜侯氏降天子辭於侯氏曰伯父無事歸寜乃邦侯氏再拜稽首而歸也詩云叔父建爾元子詩魯頌之文也叔父謂周公也建元子謂封伯禽也敬之至也昔蕭相國加以不名優忠賢也見前漢王莽傳况兼親尊者乎其沛濟南東平中山四王讚皆勿名讚謂讚者不唱其名蒼既至升殿乃拜天子親荅之舊典諸王女皆封鄉主乃獨封蒼五女為縣公主三月大鴻臚奏遣諸王歸國帝特留蒼賜秘書列仙圖道術秘方至八月飲酎畢有司復奏遣蒼乃許之手詔賜蒼曰骨肉天性誠不以逺近為親疎然數見顔色情重昔時念王乆勞思得還休欲署大鴻臚奏不忍下筆顧授小黄門中心戀戀惻然不能言大臚奏王歸國小黄門受詔者於是車駕祖送流涕而訣復賜乗輿服御􅈿寳輿馬錢布以億萬計蒼還國疾病馳遣名醫小黄門侍疾使者冠盖不絶於道又置驛馬千里傳問起居明年正月薨詔遣大鴻臚持節五官中郎將副監喪及將作使者凡六人令四姓小侯諸王主悉㑹詣東平奔喪賜錢前後一億布九萬疋及葬策曰惟建初八年三月己夘皇帝曰咨王丕顯勤勞王室親受策命昭於前世出作藩輔克慎明徳率禮不越傳聞在下昊天不弔不報上仁俾屏余一人夙夜焭焭靡有所終今詔有司加賜鑾輅乗馬龍旂九斿虎賁百人奉送王行匪我憲王其孰離之魂而有靈保兹寵榮鳴呼哀哉元和三年行東廵狩幸東平宫帝追感念蒼謂其諸子曰思其人至其鄉其處在其人亡因泣下沾襟遂幸蒼陵為陳虎賁鑾輅龍旂以章顯之祠以太牢親拜祠坐哭泣盡哀賜御劍于陵前中山王焉光武子以郭太后少子故獨留京師顯宗永平二年冬諸王來㑹辟雍事畢歸藩詔焉與俱就國從以虎賁官騎焉疏辭譲明帝報曰凡諸侯出境必備左右故夾谷之㑹司馬以從今五國各官騎百人稱娖稱娖謂齊整也前行皆北軍胡騎便兵善射弓不空發中必决眥夫有文事必有武備所以重藩職也王其勿辭帝以焉郭太后偏愛特加恩寵獨得徃來京師永元二年焉薨自中興至和帝時皇太子始封薨者皆賻錢三千萬布三萬疋嗣王薨賻錢千萬布萬疋是時竇太后臨朝竇憲兄弟擅權太后及憲等東海王出也故睦於焉而重於禮加賻錢一億詔濟南東海二王皆㑹大為修冡塋開神道平夷吏人冡墓以千數作者萬餘人發恒山鉅鹿涿郡柏黄楊雜木三郡不能備復調餘州郡工徒及送致者數千凡徴發揺動六州十八郡制度餘國莫及瑯邪孝王京光武之子性恭孝好經學顯宗尤愛幸賞賜恩寵殊異莫與為比楚王英光武子少時好逰俠通賔客晚節更喜黄老學為浮屠齋戒祭祀明帝永平八年詔令天下死罪皆入縑贖英遣郎中令奉黄縑白紈三千疋詣國相曰託在藩輔過惡累積歡喜大恩奉送縑帛以贖愆罪國相以聞詔報曰楚王誦黄老之微言尚浮屠之仁惻潔齋三月與神為誓何嫌何疑當有悔吝其還贖以助伊蒲塞桑門之盛饌伊蒲塞即優婆塞也中華翻為近住言受戒行堪近僧住也桑門即沙門因以班示諸國中傅下慱侯張齊武王縯孫以善議論永平十六年與奉車都尉竇固等並出擊匈奴後進者多害其能數被􅉲訴建初中卒章帝下詔褒揚之復封張子它人奉其祀下邳王衍明帝子永平十五年封衍有容貎章帝即位常在左右建初初冠詔賜衍師傅已下官屬金帛各有差清河王慶章帝子建初四年立為皇太子十年廢為清河王母宋貴人自殺慶時雖㓜而知避嫌畏禍言不敢及宋氏帝憐之勅皇后令衣服與太子齊等太子特親愛入則共室出則同輿及太子即位是為和帝待慶尤渥諸王莫得為比常共議私事永元四年移幸于北宫章徳殿講於白虎觀慶得入省止宿中傅衛訢私為贓盗千餘萬詔使案理之并責慶不舉之狀慶曰訢以師傅之尊選自聖朝臣愚唯知言從事聼不甚有所糾察帝嘉其對悉以訢贓財賜慶殤帝即位諸王就國鄧太后特聼清河王置中尉内史賜什物皆取乘輿上御以外家宋衍等並為清河中大夫鄧太后以殤帝襁抱留慶長子祜居清河邸後立是為安帝慶薨遣司空持節與宗正奉弔祭使車騎將軍鄧隲護䘮事又使長樂謁者僕射中謁者二人副護喪事賜龍旂九斿虎賁百人儀比東海恭王太后使掖庭丞送安帝生母左姬喪與王合葬廣丘濟北恵王夀章帝子立三十一年薨永初以後戎狄叛亂國用不足始封王薨减賻錢為千萬布萬疋嗣王薨五百萬布五千疋時惟夀最尊親特賻錢三千萬布三萬疋東海王臻恭王彊曾孫性敦厚有恩常分租秩賑給諸父昆弟國相籍褒具以狀聞順帝羙之制詔大將軍三公大鴻臚曰東海王臻以近藩之尊少襲王爵膺受多福未知艱難而能克已率禮孝敬自然事親盡愛送終竭哀降儀從士寢苫三年和睦兄弟恤養孤弱至孝純備仁義兼𢎞朕甚嘉焉夫勸善厲俗為國所先曩者東平孝王敞兄弟行孝䘮母如禮有增户之封詩云永世克孝念兹皇祖今增臻封五千户臻弟儉五百户光啓土宇以酬厥徳彭城王和性至孝太夫人薨行喪陵次毁瘠過禮傅相以聞桓帝詔使奉牛酒迎王還宫魏任城王彰武帝子黄初初就國詔曰先王之道庸勲親親並建母弟開國承家故能藩屏大宗禦侮厭難彰前受命北伐清定朔土厥功茂焉增邑五千并前萬户四年朝京都疾薨于邸諡曰威至葬賜鑾輅龍旂虎賁百人如漢東平王故事陳思王植武帝之子初封雍丘王黄初六年文帝東征還過雍丘幸植宫增户五百彭城王據武帝子初封義陽文帝以南方下濕又以據太妃彭城人徙封彭城中山恭王衮武帝子黄初三年封北海王其年黄龍見鄴西漳水衮上章贊頌詔賜黄金十斤詔曰昔唐叔歸禾東平獻頌斯皆骨肉贊羙以彰懿親王研精墳典躭味道真文雅煥炳朕甚嘉之王其克慎明徳以終令聞衮有令徳青龍三年秋得疾病詔遣太醫視病殿中虎賁齎手詔賜珍膳相屬又遣太妃沛王林並就省疾及薨詔沛王林留訖葬使大鴻臚持節典護䘮事宗正弔祭賻贈甚厚安陽鄉侯休太祖族子少值䘮亂渡江至吳太祖舉義兵北歸見太祖太祖謂左右曰此吾家千里駒也使與文帝同止見待如子嘗從征伐使領虎豹騎宿衛及為鎮南將軍假節都督諸軍事車駕臨送帝乃下輿執手而别陳侯仁太祖從弟也為征南將軍以從事鄢陵侯彰北征烏九文帝在東宫為書戒彰曰為將奉法不當如征南邪及即王位拜仁車騎將軍督都荆揚益州諸軍事増邑二千并前三千五百戸追賜仁父熾諡曰陳穆侯置守冡十家邵陵侯真太祖族子也明帝時為大將軍蜀諸葛亮圍祁山真督諸軍事亮圍陳倉已有備而不能克增邑并前二千九百户四年朝雒陽遷大司馬賜劍履上殿入朝不趨真病帝自幸其第省疾真薨帝追真功詔曰大司馬蹈履忠節佐命二祖内不恃親戚之寵外不驕白屋之士可謂能持盈守位勞謙其徳者也其封真五子為列侯武安侯爽邵陵侯真子少以宗室謹重明帝在東宫甚親愛之及即位累遷城門校尉加散騎常侍轉武衛將軍寵待有殊齊王即位賜劍履上殿入朝不趨贊拜不名晋安平王孚宣帝次弟武帝受禪拜太宰持節都督中外諸軍有司奏諸王未之國者所置官屬權未有備帝以孚明徳屬尊遂備置官屬焉又以孚内有親戚外有交逰惠下之費而用不豐奉絹二千疋元㑹詔安平王孚乘輿車上殿帝於阼階迎拜既坐帝親奉觴上夀如家人禮帝每拜孚跪而止之又給以雲母輦青盖車孚雖見尊寵不以為榮常有憂色孚薨武帝於太極東堂舉哀三日詔曰王勲徳超世尊寵無二期頤在位朕之所倚庶永百齡諮仰訓導奄忽殂隕哀慕感切其以東園温明秘器朝服一具衣一襲緋練百匹絹布各五百疋錢百萬榖千斛以供䘮事諸所施行皆依漢東平獻王蒼故事帝再臨喪親拜盡哀及葬又幸都亭望柩而拜哀動左右給鑾輅輕車介士虎賁百人吉㐫導從二千餘人前後鼓吹配饗太廟平原王幹宣帝子武帝踐祚給鼓吹駙馬二匹加侍中之服太康末加侍中特假金章紫綬班次三司恵帝即位劔履上殿入朝不趨瑯邪武王伷宣帝子太康四年薨疾篤賜牀帳衣服錢帛秔粱等物遣侍中問焉扶風武王駿宣帝子咸寜中以氐户在國界者增封給羽葆皷吹病薨追贈大司馬加侍中假黄鉞汝南王亮宣帝子武帝踐祚封扶風王三年徙封汝南王鎮南大將軍都督豫州諸軍事開府假節之國給追鋒車皁輪犢車錢五十萬徴為侍中武帝寢疾出為大司馬假黄鉞大都督督䂊州諸軍事出鎮許昌加軒懸之樂六佾之舞楊駿誅亮為太宰録尚書事入朝不趨劍履上殿增掾屬十人給千兵百騎為楚王瑋矯詔所殺瑋死追復爵位給東園温明秘噐朝服一襲錢三百萬布萬疋絹三百疋喪禮如安平王故事廟設軒懸之樂義陽王望安平王子泰始三年詔進位太尉中領軍如故上太尉軍司一人參軍事六人騎司馬五人又增置官騎十人并前三十假羽葆皷吹髙陽元王珪安平王子㤗和十年薨詔遣兼大鴻臚持節監護䘮事贈車騎將軍儀同三司珪有羙譽於世而帝甚悼惜之彭城穆王權宣帝弟東武城侯馗子武帝受禪為北中郎將内都督鄴城守諸軍事泰始中入朝賜衮冕之服太原王瓌安平王孫泰始二年就國四年入朝賜衮冕之服遷東中郎將十年薨詔曰瓌乃心忠篤智噐雅亮歴位文武有幹事之績出臨封土夷夏懐附鎮守許都思謀可紀不幸早薨朕甚悼之今安厝在近其追贈前將軍齊獻王攸文帝子景帝無後命攸為嗣武帝踐祚封齊王太康三年詔曰齊王攸明徳清暢忠允篤誠以母弟之親受台輔之任佐命立勲劬勞王室宜登顯位以稱具瞻其以為大司馬都督青州諸軍事侍中如故假節將本營千人親騎帳下司馬大軍皆如舊增皷吹一部官騎滿二十人置騎司馬五人明年詔攸曰惟我有晋受天明命光建羣后越造王國于東土錫兹青社用藩翼我邦家茂哉無怠以永保宗廟又詔下太常議崇錫之物以濟南郡益齊國又以攸子寔為北海王於是備物典策設軒懸之樂六佾之舞黄鉞朝車乗輿之副從焉攸薨詔喪禮依安平王孚故事廟設軒懸之樂配饗太廟河間王顒太原王瓌子初襲父爵咸寜三年改封河間少有清名輕財愛士與諸王俱來朝武帝嘆顒可以為諸國儀表西陽郡王羕汝南王亮子永嘉南渡元帝承制拜撫軍大將軍及元帝踐祚進位侍中太保以羕屬尊元㑹特為設牀太興初録尚書事尋領大宗師加羽葆斧鉞班劍六十人進位太宰及王敦平領太尉明帝即位以羕宗室元老特為之拜明帝寢疾羕與王導同受顧命輔成帝時帝㓜冲詔羕依安平獻王孚故事設牀帳於殿上帝親拜迎汝南王祐汝南王亮孫永安中從恵帝北征帝遷長安祐反國及帝還雒以征南兵八百人給之特置四部牙門秦王柬武帝子於諸子中尤見寵愛以左將軍居齊獻王故府甚貴寵為天下所屬目元康元年薨朝野痛惜之葬禮如齊獻文王攸故事廟設軒懸之樂武陵王晞元帝子穆帝即位累遷太宰太和初加羽葆皷吹入朝不趨贊拜不名劍履上殿固譲瑯邪王煥元帝子鄭夫人所生母有寵元帝特所鍾愛疾篤帝為之徹膳及薨年二嵗帝悼念無已將𦵏以煥既封列國加以成人之禮詔立㐫門栢歴備吉凶儀服營起陵園功役甚衆㑹稽王昱元帝子太和元年進位丞相録尚書事入朝不趨讃拜不名劍履上殿給羽葆鼓吹班劍六十人昱固譲㑹稽王道子簡文子大元初進驃騎將軍録尚書六條事領司徒謝安薨詔領揚州刺史録尚書假節都督中外諸軍事衛府文武一以配驃騎府固譲不受公卿又奏進位丞相揚州牧假黄鉞羽葆皷吹並不受安帝即位有司奏進位太傅假黄鉞備殊禮又不受後並世子元顯俱為桓𤣥所害及𤣥敗大將軍武陵王遵承㫖下令曰故太傅公阿衡二世契闊皇家親賢之重地無與二驃騎大將軍内總朝維外宣威畧志蕩世難以寜國祚天未靖亂禍酷備鍾悲動區宇痛貫人鬼感惟永往心情摧隕今皇祚反正幽顯式叙宜崇明國體以述舊典便可追崇太傅為丞相加殊禮一依安平獻王故事追贈驃騎為太尉加羽葆皷吹丞相墳塋翳然飄薄非所須南道清通便奉迎神柩太尉宜便遷改可下太史詳吉日定宅兆於是遣通直常侍司馬珣之迎道子柩於安成時寇賊未平䘮不時達義熈元年合葬於王妃陵追諡㑹稽文孝王道子世子元顯曰忠武陵忠敬王遵威王子桓𤣥簒位安帝蒙塵於尋陽義旗興宻詔遵總攝萬機及安帝反正更拜太保加班劍二十人義熙四年薨詔賜東園温明秘噐朝服一具衣一襲錢百萬布千疋策贈太傅葬加殊禮琅邪王徳文安帝母弟元興初桓𤣥執政進位太宰加衮冕之服綠綟綬桓𤣥平拜大司馬領司徒加殊禮義熙二年置左右長史司馬從事中郎四人加羽葆鼓吹十二年詔曰大司馬明徳懋親太尉道勲光大並徽序彞倫燮和二氣髦俊引領思佐鼎飪而雅尚冲挹四門弗闢誠合大雅謙虗之道實違急賢贊世之務昔蒲輪載徴異人並出東平開府竒士嚮臻濟濟之盛朕有欽焉可勅二府依舊辟召必將明􅏡俊乂嗣軌前賢矣於是始辟召掾屬時太尉裕都督中外諸軍詔曰大司馬地隆任重親賢莫二雖府受節度可身無致敬册府元龜卷二百七十五
