body:
  text: 冊府元龜卷二百九十九宋王欽若等撰宗室部專恣害賢禍敗專恣傳曰専命則不孝書曰縱敗禮斯皆惡之大者焉若夫聨暉帝裔託體皇極宜乎念胏附之重遵磐石之訓保厥土宇作為屛翰其有忘戒策之訓背師傅之教窮滋味之好極游觀之美昧稼穡之理重私嬖之欲以至不式王命廢亂典常虐用下民暱愛近習殘賊不道崇侈無厭干有司之議抵王者之禁至於幽廢誅削而不悔焉於戲魯哀有言謂罔知乎憂懼仲尼立教俾深戒乎性習者良可述夫漢陽丘侯偃景帝四年坐出國界耐為司冦常山憲王舜景帝少子驕淫數犯禁膠西于王端數犯法漢公卿數請誅之景帝弗忍而端所為滋甚廬江王賜以邊越使使相交邉越者邉界與越相接也濟川王明武帝建元三年坐殺中傅廢遷房陵濟東王彭離武帝時坐殺人廢徙上庸臨江愍王榮坐侵廟壖地為宫自殺江陽侯仁宣帝元康元年坐役使附落免祝兹侯延年棄印綬出國免廣陵厲王胥動作無法度南陵侯慶坐為沛郡太守横恣罔上下獄疾死長沙刺王建徳宣帝時坐獵縱火燔民九十六家殺二人以縣官事怨内史教人誣告以棄市罪削八縣廣川王去本始三年坐悖虐聽后昭信讒言燔燒烹煮生剖剝人距師之諫殺其父子凡殺無辜十六人至一家母子三人廢徙上庸去道自殺東平思王宇元帝初就國壯大通姧犯法後漢楚王英光武建武十五年封英少時好游俠交通賔客東海静王政明帝時中山簡王薨政詣中山㑹葬私取簡王􅁎徐妃又盗迎掖庭出女豫州刺史魯相奏請誅政有詔削薛縣濟南安王康在國不循法度交通賔客後人上書告康招來州郡􅀈猾漁陽顔忠劉子産等又多遺其綿繒帛按圖書謀議不軌事下考案削五縣趙惠王乾安帝時坐白衣出司馬門削中丘縣王宫門有兵衛亦為司馬門東觀記曰乾私出國到魏郡鄴易陽止宿亭令奴金盜取亭席金與亭佐孟常爭言以刃傷常部吏追逐乾藏逃金絞殺之懸其屍道邉樹相國舉奏詔書削中丘縣河間惠王政傲狠不奉法憲順帝以沈景為相國謁王王不正服箕踞詔書讓政魏任城王楷坐私遣官屬詣中尚方作禁物削縣二千户臨淄侯植嘗乘車行馳道中開司馬門出太祖大怒彭城王據明帝景初元年坐私遣人詣中尚方作禁物削二千户東平靈王徽青龍二年使官屬撾壽張縣吏為有司所奏詔削縣一户五伯趙王幹私通賔客為有司所奏東海定王霖性麤暴閨門之内婢妾之間多所殘害吳齊王奮居武昌廢帝初諸葛恪不欲諸王處濵江兵馬之地徙奮於豫章奮怒不從命又數越法度晉竟陵王楙都督兖州刺史在州徴求不已郡縣不堪命東安王繇誅楊駿之際屯雲龍門兼統諸軍是日誅賞三百餘人皆自繇出東夷校尉文俶父欽為繇外祖諸葛誕所殺繇慮俶為舅家之患是日亦以非罪誅俶彭城王𤣥㑹庚戍制不得藏户𤣥匿五户桓温表𤣥犯禁收付廷尉而宥之通吉亭侯勲領西戎校尉為政暴虐至於治中别駕及州之豪右言語忤意即於坐梟斬之或引弓自射西土患其凶虐譙郡王文思性凶暴多殺弗辜好獵燒人墳墓數為有司所糾會稽思世子道生性踈躁不修行業多失禮度竟以幽廢而卒宋彭城王義康以大將軍領司徒辟召掾屬義康素無術學闇於大體自謂兄弟至親不復存君臣形迹率心逕行曾無猜防私置僮部六千餘人不以言臺四方獻饋皆以上品薦義康而以次者供御文帝嘗冬月噉柑歎其形味並劣義康在坐曰今年柑殊有佳者遣人還東府取大柑大供御者三寸竟陵王誕文帝子孝武性多猜頗相疑憚而誕造立第舍窮極工巧園池之美冠於郡縣多聚才力之士實之第内精甲利器莫非上品武昌王渾少王而凶戾嘗出石頭怒左右人㧞防身刀斫之後為中書令祼身露頭往散騎省戲因彎弓射通直郎周朗中其枕為笑樂出為雍州刺史至鎮與左右人作文檄自號楚王號年為元光元年備置百官以為戲笑海陵王休茂性急疾欲自專司馬庾深之每禁之常懐忿怒南郡王義宣鎮荆州十年兵強財富既首創大義威名著於天下凡所求欲無不必從朝廷所下制度意所不同者一不遵承嘗與孝武酒先自酌飲封送所餘其不識大體如此江夏王義恭鎮彭城魯郡孔子舊廟有栢樹二十四株經歴漢晉其大連抱有二株先倒折士人崇教莫之敢犯義恭悉遣人伐取父老莫不歎息後為太宰錄尚書事領丹陽尹侍中義恭遊行或三五百里孝武恣其所之東至吳郡登虎山又登無錫縣烏山以望太湖晉平王休祐狠戾強梁前後忤明帝非一在荆州時左右范景逹善彈碁帝召之休祐留不遣怒詰責之曰汝剛戾如此豈為下之義南齊廬陵王子卿為荆州刺史在鎮營造服飾多違制度遷南豫州刺史之鎮道中戲部伍為水軍武帝聞之殺其典籖徴還魚復侯子響初為輔國將軍豫章王嶷無子養子響既出繼車服異諸王毎入朝忿怒拳打車壁後為荆州刺史數在齋内殺牛置酒與左右聚樂令内人私作錦袍絳襖欲餉蠻交易器仗梁邵陵王綸為揚州刺史綸素驕縱欲盛器服遣人就市賖買錦綵絲布數百疋擬與左右職局防閤為絳衫内人帳幔百姓並闗閉邸店不出臺續使少府市綵經時不能得勅責府丞何智通具以聞因被責還第恒遣心腹馬客戴子髙戴􅆶李撤趙智英等於路尋目智通於白馬巷逢之以槊刺之刃出於背智通以血書壁作邵陵字乃絶遂知之武帝懸錢百萬購賊有西州遊軍將宋鵲子條姓名以啟勅遣舍人諸曇粲領齋仗五百人圍綸第於内人檻中禽􅆶撤智英及子髙子髙驍勇踰墻突圍遂免𤓰等智通子敞之割炙食之即載出新亭四面火炙之燋熟敞車載錢設鹽蒜顧百姓食撒一臠賞錢一千徒黨并毋肉遂盡綸鏁在第舍人諸曇粲并主帥領仗身守視免為庶人豐城侯泰為譙州刺史江北人情獷强前後刺史並綏撫之泰至州便遍發人丁使擔腰輿扇繖等物不限士庶恥為者重加刑多輸財者即放免之於是人皆思亂及侯景至人無戰心乃先覆敗後梁河間王岑位至太尉性簡貴及後王嗣位自以望重屬尊頗有不法陳南康王方泰為都督豫章郡諸軍事豫章内史在郡不修民事秋滿之際屢放部曲為刼又縱火燒邑居因行暴掠代至又淹留不還武陵王伯禮為雲旗將軍持節都督吳興諸軍事吳興太守在郡恣行暴掠驅録民下逼奪財貨前後委足百姓患之始興王叔陵為揚州刺史治在東府事務多關涉省閤執事之司承意順㫖即諷上進用之㣲致違忤必抵以大罪重者至殊罪死道路籍籍皆言其有非常志長沙王叔堅為驃騎將軍時後主患瘡不能視事政無大小悉委叔堅决之於是勢傾朝野叔堅因肆驕縱事多不法㑹稽王莊性嚴酷年數歲左右有不如意輙剟刺其面或加燒爇後魏清河王紹道武長子兇狠險悖不遵教訓好輕遊里巷刼剥行人斫射犬豕以為戯樂樂浪王萬夀孫長命襲爵坐殺人賜死國除長命子忠孝明時復爵為太常少卿出帝泛舟天池忠著紅羅􅃭繡作領碧紬袴錦為緣帝謂曰朝廷衣冠應有常式何為着此百戲衣忠曰臣少來所愛情存綺羅歌衣舞服是臣所願帝曰人之無良有至於此安樂王長樂為定州刺史頓辱衣冠多不奉法百姓詣闕訟之孝文罸杖三十廣陽王深孝明帝時為常山刺史在州多所受納政以賄成私家有馬千匹者必取百匹以此為常濟隂王誕為齊州刺史在州貪暴大為人患牛馬騾驢無不逼奪家之奴𨽻悉廹取良人為婦有沙門為誕採藥還見誕問外消息對曰惟聞王貪願王早代誕曰齊州七萬家吾來一家未得三十錢何得言貪元麗為雍州刺史為政嚴酷其妻崔氏誕一男麗遂出州獄死囚及徒流案未申臺者一時放免元乂先納靈太后妹為室孝明帝初太后臨朝乂為侍中領軍既在門下兼摠禁兵深為靈太后所信委太傅清河王懌以親賢輔政參决機事以乂恃寵驕盈志欲無限懌裁之以法乂輕其為人毎欲斥黜之令黄門胡度等誣吿懌置毒藥御食中殺之假為靈太后辭遜之詔乂遂與太師高陽王雍等輔政嘗直禁中孝明呼為姨夫自後專緫機要巨細决之威振於内外百僚重跡相州刺史中山王熈抗表起義以討乂為名不果見誅乂尋遷衛將軍餘如故靈太后與孝明讌於西林園日暮還宫右衛將軍奚康生復欲圗乂不克而誅是後孝明徙御徽音殿乂亦入居殿右既在密近曲盡佞媚以承上㫖遂蒙寵信出入禁中恒令勇士持刀劍自先後公私行止彌加威防又於千秋門外厰下施木闌檻有時出入止息其中腹心防守以備竊發人物求見者遥對之而已自劉騰死後防衛㣲緩乂頗亦自寛時宿於外毎日出遊留連他邑靈太后微察知之乂積習生常無復虞慮其所親諌乂亦不納元謐除大司農卿遷幽州刺史謐妃胡氏靈太后從女也坐毆其妃免官後除都官尚書車駕出拜圎丘謐與妃乘赤馬犯鹵簿為御史所彈靈太后特不問元和為東郡太守先是郡人孫天恩家豪冨嘗與和爭地遣奴客打和垂死至此和誣天恩與北賊來往父子兄弟一時俱戮資財田宅皆没官天恩宗族欲詣闕訴寃以和乂之親不敢告列清河王懌弟悦為侍中太尉臨拜日就懌子亶求懌服玩之物不時稱㫖乃杖之百下北齊上黨王渙與常山王演等築伐惡諸城遂聚鄴下輕薄凌犯郡縣為法司所糾文宣戮其左右數人渙亦被譴安徳王延宗為定州刺史以囚試刀驗其利鈍驕縱多不法隴西王紹亷兄紹義為清都尹未及理事紹亷先徃喚囚悉出率意决遣之唐襄邑郡王神符為揚州都督少威嚴不為羣下所肅後因入朝多將公廨錢帛以供私費又令所在親昵統軍知府留事太宗謂神符曰公廨府官供有多取豈㢘潔耶且都督入朝在府長史以下官屬備具何縁别任武人以為留守然以戚屬不之罪也漢王元昌為梁州都督在州頗違憲法太宗手勅責之初不自咎更懐怨望滕王元嬰高宗時為金州刺史驕縱逸遊動作失度帝與書誡之後為洪州都督又數犯憲章蜀王愔為岐州刺史愔常非理毆擊所部縣令又畋獵無度數為非法越王貞高宗時歴揚州刺史都督相州刺史安州都督所在暱狎群小聽受讒言官僚有正直者多被貶退又放恣奴客侵暴部人繇是皆鄙其行梁嗣廣王友諒繼歴藩郡多行不法後唐秦王從榮為大元帥從榮乃請以嚴衞捧聖歩騎兩指揮為秦府衙兵自毎入朝以數百騎從行出則張弓挾矢馳騁盈巷既受元帥之命即令其府屬僚佐及四方遊士各試檄淮南書一道陳已將廓清宇内之意初言事者請為親王置師傅明宗顧問近臣執政以從榮名勢既隆不敢忤㫖即奏云王官宜委從榮乃奏刑部侍郎劉賛為王傅又奏翰林學士崔稅為元帥府判官明宗曰學士代予詔令不可擬議從榮不悦退謂左右曰既付以元帥之任而阻予請僚佐又未諭制㫖也復奏刑部侍郎任贊從之害賢古者庶子之官實掌公族教之以孝悌申之以睦友然後邦國有倫而衆嚮方矣夫本支之戚暱莫加焉茅土之胙厚莫重焉榮祿寵章暉其顧盼膏粱紈綺充其嗜好有能富而知禮高而思危固姻睦之親識為善之樂者葢云鮮矣矧自王政不綱懿親道廢麟趾之風缺棣華之賦興小則席寵寢深恣陵蕩之志大則分封踰溢萌負恃之心至使正士抗辭假尋斧於遺論忠臣發忿翦滋蔓於禍基裁正所申觖望斯作惡直醜正怨天尤人茍慘毒之所加殆夷㓕而無類禍敗之始常必繇之是用徴彼舊聞列其行事覆車之軌昭然可觀漢梁孝王武與景帝皆竇太后所生景帝廢栗太子太后心欲以梁王為嗣大臣及袁盎等有所關説於帝太后議格音閣孝王不敢復言太后以嗣事後立膠東王為太子梁王怨盎及議臣乃使羊勝公孫詭之屬謀隂使人刺殺袁盎及他議臣十餘人吳孫綝堅弟靖之曽孫為侍中武衞將軍領中外諸軍事廢帝太平二年朱異假節為大都督救夀春圍不解還軍為綝所枉害吳録載綝要異相見將往乃陸抗止之異曰予通家人耳當何所疑乎遂往綝使力人於坐上取之異曰我吳國忠臣有何罪乎乃拉殺之晉齊王冏惠帝時為大司馬以順陽人王豹為主簿冏驕縱失天下心豹致牋於冏詞甚切直冏令曰得前後白事具意輙别思也㑹長沙王乂至於冏案上見豹牋謂冏曰小子離間骨肉何不銅駞下撲殺冏既不能嘉豹之䇿遂納乂言乃奏豹曰臣忿姦㓙肆逆皇祚顛墜與成都長沙新野共興義兵安復社稷唯欲戮力皇家與親親宗室腹心從事此臣宿夜自誓無負神明而主簿王豹比有白事敢告異端謂臣忝備宰相必遘危害慮在一旦不祥之聲可蹻足而待欲臣與成都分陜為伯盡出藩王上誣聖朝鑒御之威下長妖惑疑阻衆心噂􅊱背憎巧賣兩端訕上謗下讒内間外遘惡導奸坐生猜嫌昔孔丘佐魯乃誅少正子産相鄭先戮鄧析誠以交亂名實若趙高詭怪之類也豹為臣不忠不順不義輙勅都街考竟以明邪正豹將死曰懸吾頭大司馬門見兵之攻齊也衆庶寃之又奏殿中御史桓豹奏事不先經冏府即考竟之於是朝廷側目海内失望矣楚王瑋武帝子也初衞瓘為太保錄尚書事與汝南王亮共輔朝政亮奏遣諸王還藩與朝臣廷議無敢應者唯瓘贊其事瑋繇是憾焉賈后素怨瓘且忌其方直不得騁已淫虐又聞瓘與瑋有隙遂謗瓘與亮欲為伊霍之事啓惠帝作手詔使瑋免瓘等官黄門齎詔授瑋瑋性輕險欲騁私怨夜使清河王遐收瓘左右疑遐矯詔咸諌曰禮律刑名台輔大臣未有此比且請距之須自表得報就戮未晚也瓘不從遂與子恒嶽裔及孫等九人同被害趙王倫宣帝子也惠帝時諂事賈后裴頠甚惡之倫數求官頠與張華復固執不許繇是深為倫所怨倫又日懐篡逆欲先除朝望因廢賈后之際遂與華同被誅時年三十四二子嵩該倫亦欲害之梁王彤東海王越稱頠父秀有勲王室配食太廟不宜㓕其後嗣故得不死又解系為雍州刺史揚烈將軍西戎校尉㑹氐𦍑叛時倫為征西將軍系與倫討之倫信用佞人孫秀與系爭軍事更相表奏朝廷知系守正不撓而召倫還系表殺秀以謝氐𦍑不從倫秀譖之系坐免官以白衣還第閉門自守及張華裴頠之被誅也倫秀以宿憾收系兄弟梁王彤救系倫怒曰我於水中見蟹且惡之况此人兄弟輕我耶此而可忍孰不可忍彤苦爭之不得遂害之并戮其妻子河間王顒鎮關中皇甫重為秦州刺史重弟商為長沙王乂參軍顒將李含先與商重有隙毎衘之及此説顒曰商為乂所任重終不為人用宜急除之以去一方之患可表遷重為内職因其經長安乃執之重知其謀乃露檄上尚書以顒信任李含將欲為亂召集隴上士衆以討含為名乂以兵革累興今始寧息表請遣使詔重罷兵徴含為河南尹含既就徴重不奉詔顒遣金城太守游楷隴西太守韓稚等四郡兵攻之成都王頴與顒起兵共攻乂以討后父尚書僕射羊𤣥之及商為名乂以商為左將軍河東太守領萬餘人於闕門距張方為方所斫顒軍遂進乂既屢敗乃使商間行齎帝手詔使游楷盡罷兵令重進軍討顒商行過長安至新平遇其從甥素憎商以告顒顒捕得商殺之乂既敗重猶堅守閉塞外門城内莫知而四郡兵築土山攻城重輒以連弩射之所在為地窟以防外攻權變百端外軍不得近城將士為之死戰顒知不可㧞乃上表求遣御史宣詔諭之令降重知非朝廷本意不奉詔獲御史騶人問曰我弟將兵來欲至未騶云已為河間王所害重失色立殺騶於是城内知無外救遂共殺重東海王越惠帝幸長安河間王顒欲挾天子令諸侯越將起兵奉迎天子以太弟中庶子繆播父時故吏委以心膂播從弟右衛率𦙍顒前妃之弟也越遣播𦙍詣長安説顒令奉帝還雒約與顒分陜為伯播𦙍素為顒所敬信既相見虚懐從之顒將張方自以罪重懼為誅首謂顒曰今據形勝之地國富兵強奉天子以號令誰敢不服顒惑方所謀猶豫不决方惡播𦙍為越游説隂欲殺之播等亦慮方為難不敢復言時越兵鋒甚盛顒深憂之播𦙍乃復説顒急斬方以謝可不勞而安顒從之於是斬方以謝山東諸侯顒後悔之又以兵距越屢為越所敗帝反舊都播亦從太弟還雒契闊艱難深相親狎及太弟即帝位是為懐帝以播為給事黄門侍郎俄轉侍中徙中書令任遇日隆專管詔命時越威權自己帝力不能討心甚惡之以播𦙍等有公輔之量又盡忠故委以心膂越懼為己害因入朝以兵入宫執播等於帝側帝歎曰奸臣賊子無世無之不自我先不自我後哀哉起執播等手涕泗歔欷不能自禁越遂害之朝野憤惋咸曰善人國之紀也而加虐焉其能終乎及越薨帝贈播衛尉祠以少牢成都王穎既以陸機為將時宦人孟玖弟超並為穎所嬖寵超領萬人為小都督未戰縱兵大掠機錄其主者超將鐵騎百餘人直入機麾下奪之顧謂機曰貉奴能作督不機司馬孫拯勸機殺之機不能用超宣言於衆曰陸機將反又還書與玖言機持兩端軍不速决及戰超不受機節度輕兵獨進而没玖疑機殺之遂譖機於穎言其有異志將軍王闡郝昌公師藩等皆玖所用與牽秀等共證之穎大怒使秀密收機將害陸雲江統蔡克力諌穎遲迥者三日盧志又曰昔趙王殺中䕶軍趙凌赦其子驤驤詣明公而擊趙即前事也蔡克入至穎前叩頭流血曰雲為孟玖所怨逺近莫不聞今果見殺罪無彰驗將令群心疑惑竊為明公惜之僚屬隨克入者數十人流涕固請穎惻然有宥雲色孟玖扶穎入催令殺雲後東海王越討穎移檄天下亦以機雲兄弟枉害罪狀㑹稽世子元顯㑹稽王道子之子也車武子為吏部尚書元顯有過武子與江績密言於道子將奏之事泄元顯逼令自裁俄而武子卒朝廷傷之梁武陵王紀僭號於蜀司馬王僧畋直兵參軍徐怦並固諫紀以為貳於已皆殺之後魏襲常山王素孫昭孝文時為殿中郎坐事停廢宣武時昭從弟暉親寵用事稍遷左丞孝明即位于忠執政昭為黄門侍郎又曲事之忠專權擅威枉陷忠賢多昭所指導唐齊王祐太宗第五子祐不率憲章屢為非法太宗以權萬紀為能轉齊王長史祐既暱近羣小畋遊無度萬紀驟諌不聽内懷憂憤乃條列祐罪因脇令表首祐懼而從之遣萬紀通表太宗遂厚賞萬紀而深責於祐萬紀還祐大怒曰長史賣我也勸我令首而自以為功必且殺之快心耳㑹祐以萬紀奏而被遣羣小不逞因而扇祐遂加害焉韋文振性質重初以校尉從太宗征伐及祐出閣太宗以文振素在左右謹直選授祐府典軍祐令專典馬方欲寄心腹文振每事進諌祐所不納即語萬紀論之祐内深忿疾而外且任使及殺萬紀日文振懼縱轡馳走追行數里被箭不能復前因而遇害禍敗孽惟自作無可逭之理命或㓙折亦威用之數載諸方策昭然可見若乃居茂親之地膺夾輔之重邪僻中積狂悖外恣或因縁間隙潛蓄以異謀或壊亂紀法卒成於大憝乃有災祥豫見殃咎隨作亡身覆族貽誚終古以至非辜告逝發憤自殞者咸用編次焉漢梁懐王揖文帝少子也五年一朝凡再入朝因墮馬死無子國除梁孝王武景帝弟竇太后少子也栗太子廢太后心欲以梁王為嗣袁盎等有所關説於景帝太后議格格音閣梁王怨袁盎謀隂使人刺殺袁盎帝繇此益疏王王歸國意忽忽不樂北獵梁山有獻牛足出背上孝王惡之六月中病熱六日薨臨江王榮孝景之子也坐侵廟壖地為宫帝徴榮榮行祖於江陵北門既上車軸折車廢江陵父老流涕竊言曰吾王不反矣榮至詣中尉府對簿中尉郅都簿責訊王王恐自殺廣陵厲王胥武帝子也昭帝時見帝年少無子有覬欲心而楚地巫鬼胥使下神祝詛及宣帝即位胥復使巫祝詛如前胥宫園中棗樹生十餘莖莖正赤葉白如素池水變赤魚死有䑕晝立舞王后廷中胥謂姬南等曰棗水魚䑕之怪甚可惡也居數月祝詛事發覺有司按驗胥惶恐以綬自絞燕刺王旦武帝子也昭帝立旦遂招來郡國奸人賦斂銅鐵作甲兵數閲其車騎材官卒建旌旗鼓車旄頭先敺敺與驅同郎中侍從者著貂羽黄金附蟬皆號侍中令群臣皆裝是時天雨虹下屬宫中飲井水水泉竭厠中豕群出壊大官竈烏鵲鬪死䑕舞殿端門中殿上户自閉不可開天火燒城門大風壊宫城樓折㧞樹木流星下墮后姬以下皆恐王驚疾王客呂廣等知星為王言當有兵圍城期在九月十月王愈憂恐天子使使者賜燕王璽書旦得書即以綬自絞東平煬王雲宣帝子東平思王之子也哀帝時無鹽危山土自起覆草如馳道狀又瓠山石轉立雲及后謁自之石所祭治石象瓠山立石束倍草并祠之倍草黄倍草也建平三年息夫躬孫寵等共因幸臣董賢等告之是時哀帝被疾多所惡事下有司逮王后謁下獄驗治言使巫傅恭婢合歡等祠祭祝詛上為雲求為天子雲又與知災異者高尚等指星宿言上疾必不愈雲當得天下石立宣帝起之表也有司請誅王有詔廢徙房陵雲自殺謁棄市晉趙王倫僭即位親祠太廟遇大風飄折麾盖時有雉入殿中自太極東階上殿驅之更飛西鐘下有頃飛去又倫於殿上得異鳥問皆不知名累日向夕宫西有素衣小兒言是服劉鳥倫使錄小兒并鳥閉置牢室明旦開視户如故並失人鳥所在倫目上有瘤時以為妖焉後齊王冏河間王顒成都王穎起兵討倫倫軍敗惠帝反正賜倫死齊王冏為大司馬輔政長沙王乂發兵攻冏府擒冏斬於閶闔門外初冏之盛也有一婦人詣大司馬府求寄産吏詰之婦人曰我截齊便去耳識者聞而惡之又謡曰著布袒腹為齊持服俄而冏誅長沙厲王乂武帝第六子也齊王冏專權乂起兵相攻冏敗斬之成都王穎遣刺客圗乂又殺之乂前後破穎軍斬獲六七萬人戰久粮乏城中大饑東海王越收乂送金墉城穎炙而殺之初乂執權之始雒下謡曰草木萌芽殺長沙乂以正月二十五日廢二十七日死如謡言焉南齊南郡王子夏武帝第二十三子初武帝夢金翅鳥下殿庭摶食小龍無數乃飛上天明帝時其夢乃驗明帝誅武帝諸子唯臨賀王子岳及弟六人在後帝毎嘆曰我及司徒諸兒子皆不長髙武子孫日長大永泰元年誅子岳等子夏最㓜被誅時年七歲始安王遥光太祖次兄始安貞王道生子也明帝建武中進號撫軍將軍帝以親近單少憎忌高武子孫欲並誅之遥光畫計叅議河東王鉉等七王見殺遥光意也東昏即位遥光懼稱疾不復入臺先是遥光行還入城風飄儀繖出城外遥光慮見殺乃起兵戰不利還小齋帳中着衣帢坐秉燭自炤令人反拒齋閤皆重關左右並踰屋散出臺軍主劉國寳時當伯等先入遥光聞外兵至吹滅火扶匐下床軍人排閤入於闇中牽出斬首遥光未敗一日城中皆夢群蛇緣城四出各共説之咸以為異後魏樂平王丕明元之子也後坐事以憂死丕之薨及日者董道秀之死也高允遂著筮論曰昔明元末起白臺其高二十餘丈樂平王嘗夢登其上四望無所見王以問日者董道秀筮之曰大吉王黙然有喜色後事發王遂憂死而道秀棄市南安王楨為相州刺史孝文太和二十年五月至鄴入城日暴風大雨凍死者十餘人禎又以旱祈雨于羣神鄴城有石虎廟人奉祀之禎告虎神像云三日不雨當加鞭罰請雨不驗遂鞭像一百是月疽發背薨北齊瑯琊王儼武成第三子也後主武平二年出儼居北宫五日一朝儼遂率京畿軍士三千人屯千秋門帝率宿衛至千秋門欲追殺之儼徒駭散帝㧞儼帶刀環亂築儼頭良久乃釋之儼之未獲罪也鄴北城有白馬佛塔是石季龍為澄公所作儼將修之巫曰若動此浮圖北城失主不從破至第一級得白蛇長數丈回旋失之數旬而敗廣武王長弼少名阿伽性麤武出入城市好敺擊行路時人皆呼為阿伽郎君後為營州刺史在州無故自驚走叛亡入突厥竟不知死所隋齊王暕煬帝子也妃韋氏早卒暕遂與妃姊元氏婦通遂産一女外人皆不得知隂引喬令則於第内酣宴令則稱慶脱暕帽以為歡樂召相工令遍視後庭相工指妃姊曰此産子者當為皇后王貴不可言時國無儲嗣暕自謂次當得立又以元徳太子有二子内常不安隂挾左道為厭勝之事事既發帝大怒斬令則等數人妃姊賜死暕自是恩寵日衰從帝在江都宫元會暕具法服將朝無故有血從裳中而下又坐齋中見羣䑕數十至前而死視皆無頭尋為宇文化及亂兵所殺唐燕王忠高宗長子為梁州都督轉房州刺史年漸長大常恐不自安或私衣婦人之服以備刺客又數有妖夢常自占卜事發廢為庻人梁友寜太祖之姪也為嶺南西道節度使友寧督諸軍進逼營丘月餘不能㧞與晉人戰于石樓王師小却友寧旁自峻阜馳騎以赴敵所乘馬蹶而仆遂没於陣友寧將戰之前一日有大白蛇蟠於帳中友寧心惡之遇害焉冊府元龜卷二百九十九
