body:
  text: 冊府元龜巻五百八十六宋王欽若等撰掌禮部奏議第十四唐長孫無忌為太尉顯慶元年六月與脩禮官等奏曰伏見祀令以髙祖太武皇帝配五天帝於明堂太宗文皇帝配五人帝亦在明堂之側座臣等謹尋方冊厯考前規宗祀明堂必配天帝而伏羲五代本配五郊預入明堂自緣從祀今以太宗作配理有未安伏見永徽二年七月制建明堂追奉太宗已遵嚴配當時髙祖先在明堂禮司致惑竟未遷祀率意定議遂便著令乃以太宗文皇帝降配五人帝雖復亦在明堂不得對越天帝深乖明詔之意又與先典不同謹按孝經云孝莫大於嚴父嚴父莫大於配天昔者周公宗祀文王於明堂以配上帝伏惟詔意義在於斯今所司殊為失㫖又尋漢魏晉宋厯代禮儀並無父子同配明堂之義祭法云周人禘嚳而郊稷祖文王而宗武王鄭𤣥注曰禘郊祖宗謂祭祀以配食也禘謂祭昊天於圓丘郊謂祭上帝於南郊祖宗謂祭五帝五神於明堂也尋鄭此注乃以祖宗合為一祭又以文武共在明堂連在配祀良為謬矣故王肅駁曰古者祖宗自是不毁之名非配食於明堂者也審如鄭義則孝經當言祖祀文王於明堂不得言宗祀矣凡宗者尊也周人旣祖其廟又尊其祀孰謂祖於明堂者乎鄭引孝經以觧祭法而不曉周公本意殊非仲尼之義㫖也又解宗武王云配勾芒之類是謂五神位在堂下武王降位失君叙矣又按六韜曰武王伐紂雪深丈餘有五車二馬行無轍迹詣營求謁武王怪而問焉太公對曰此必五方之神來受事耳遂以其名召入各以其職命焉亦旣克殷風調雨順豈有生來受職殁則配之降尊敵卑理不然矣故春秋外傳曰禘郊宗祖報五者國之典祀也傳言五者故知各是一事非謂祖宗合祀於明堂也臣謹上考殷周下洎貞觀並無一代兩帝同配於明堂唯南齊蕭氏以武明昆季並於明堂配食事乃不經未足援據又檢武德時令以元皇帝配於明堂兼配感帝至貞觀初緣情革禮奉祀髙祖於明堂奉遷世祖專配感帝此卽聖朝故事已有逓遷之典取法宗廟古之制焉伏惟太祖景皇帝締搆有周建絶代之丕業啓祚汾晉創厯聖之洪基德邁發生道符立極又世祖元皇帝潜鱗韜慶屈道事周導濬發之靈源肇光澤之垂裕稱祖清廟萬代不遷請停配祀以符古義伏惟髙祖太武皇帝躬受天命奄有神州創制改物體元居正為國始祖抑有舊章昔者炎漢髙帝當塗太祖皆以受命例並配天請遵故實奉祀髙祖於圓丘以配昊天上帝伏惟太宗文皇帝道格上𤣥功靖下瀆拯率土之塗炭布大造於生靈請准詔明堂以配上帝又請依武德故事兼配感帝作主斯乃遠協孝經近申詔意從之是年九月又奏曰惟武德初撰衣服今乗輿祀天地服大裘冕九旒臣無忌志寧敬宗等謹按郊特牲云周之始郊日以至被衮以象天戴冕藻十有二旒則天數也而此二禮俱說周郊衮與大裘事乃有異按月令孟冬天子始裘明以御寒理非當暑若啓蟄祈糓冬至報天行事服裘義歸通允至於季夏迎氣龍見而雩炎熾方隆如何可服謹尋厯代唯服衮章與郊特牲義㫖相協按周廷輿服志云漢明永平二年詔採周官禮記始制祀天地服天子備十二章沈約宋書志云魏晉郊天亦皆服衮又王智深宋記曰明帝詔云以大冕純玉藻𤣥衣郊祀天地後魏周齊迄于隋氏勘其禮令祭服悉同斯則百王通典炎凉無妨復焉祀經事無乖舛今請憲章故實郊祀天地皆服衮其大喪請停仍改禮令又改新祀皇帝祭社稷服絺冕四旒三章祭日月服𤣥冕三旒衣無章謹按令文是四品五品之服此卽三公亞獻皆服衮衣孤卿助祭服毳及鷩斯典章數同於大夫君少臣多殊為不可據周禮云祀昊天上帝則服大裘而冕五帝亦如之享先王則衮冕享先公則鷩冕祀四望山川則毳冕祭社稷五祀則絺冕諸小祀則𤣥冕又云公侯伯子男孤卿大夫之服衮冕以下皆如王之服所以三禮義宗遂有三釋一云公卿大夫助祭之日所著之服降王一等又云悉與王同求其折衷俱未通允但名位不同禮亦異數天子以十有二為節義在法天豈有四旒三章翻為御服若諸臣助祭冕與王同便是貴賤無分君臣不别如其降王一等則王著𤣥冕之時臣次服爵弁旣屈天子又貶公卿周禮此文久不施用亦猶祭祀之位立尸侑君親之拜臣子覆巢設硩簇之官去鼃置蟈氏之職唯施周代事不通行是故漢魏以來下迄隋代相承舊事唯用衮冕今新禮親祭日月乃服五品之服臨事施行極不穩便請遵厯代故實諸祭並用衮冕詔可之二年七月又奏曰謹按禮記祭法云聖王之制禮也法施於人則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能捍大患則祀之又云堯舜禹湯文武皆有功烈於人及日月星辰人所瞻仰非此族也不在祀典唯此帝王合與日月同例嘗加祭享義在報功爰及隋代並遵斯典漢髙祖祭法無文但以前代迄今多行秦漢故事始皇無道所以棄之漢祖立法垂裕於後自隋以下亦在祀例大唐稽古垂化網羅前烈唯此一祀咸秩未申新禮及令無祭先代帝王之令請聿遵故實三年一祭以仲春之月祭唐堯於平陽以契配祭虞舜於河陽以咎繇配祭夏禹於安邑以伯益配祭殷湯於偃師以伊尹配祭周文王於酆以太公配祭武王於鄗以周公召公配祭漢高祖於長陵以蕭何配又准貞觀二十一年詔以孔子為先聖更以左丘明等二十一人與顔子俱配尼父於太學並為先師今據永徽令文改用周公為先聖遂出孔子降為先師顔回丘明並無從祀謹按禮記云凡學春秋官釋奠於先師鄭𤣥云官謂詩書禮樂之官也先師者若漢禮有高堂生樂有制氏詩有毛公書有伏生可以為之又禮記云始立學釋奠于先聖鄭注曰若周公孔子也據理為定昭然自别聖則因天合德師則偏善一經漢魏以來取舍各異顔回夫子互作先師宣父周公更為先聖求其節文遽有得失所以貞觀末親降綸言依禮記之明文酌成康之典記正夫子為先聖加衆儒為先師永垂制於後昆革徃代之紕繆而今不詳制㫖輒事刋改遂違明詔但成王幼年周公踐極制禮作樂功比帝王所以禹湯文武成王周公為六君子又說明堂孝道乃述周公嚴配此即姬旦鴻業合同王者祀之儒館實貶其功仲尼生衰周之末拯文喪之弊祖述堯舜憲章文武引聖敎於六經闡儒風於前代故孟軻稱生靈以來一人而已自漢以降奕葉封侯崇奉其聖迄於今日胡可降兹上哲俯入先師又且丘明之徒見行其學貶為從祀亦無故事請改令從詔於義為允其周公仍依别禮配享武王詔並可之隴西郡王博文為司禮太常伯龍朔二年八月司文正卿蕭嗣業嫡繼母改嫁而卒請申心制有司奏稱據令繼母改嫁及父為長子並不改官乃下勅曰雖云嫡母終是繼親據禮緣情須有定制付所司議定奏之博文等奏議曰緬尋䘮服母名斯定嫡繼慈養皆在其中惟出母之制時言妻之子明非生已皆則無服是以令著母嫁之夫又云出妻之子出言其子以别所生嫁則言母通苞養嫡俱當觧任並合心䘮其不觧者惟有繼母之嫁繼為名止據前妻之子嫡於諸孽禮無繼母之文申令今旣見行嗣業禮申心制然奉勅議定方垂永則今有不安亦須釐正切以嫡繼慈養皆非所生嫁雖比岀稍輕於父終為義繼繼母之嫁旣殊慈母嫡義同繼豈合心喪望請凡非所生父母卒而嫁為父後者無服非承重者杖朞並不心喪亦同繼母有符情禮無玷舊章又心喪之制唯施厭降杖朞之服悉不觧官而令文三年齊衰亦入心喪例杖朞觧官文有妻喪之舛又依禮庻子為其母緦麻三月旣是所生母服准例亦合觧官令文漏而不言於事終須附入旣與嫡母等嫁同不令條總講議改理之繼其禮及律疏有相關者亦請准此改正嗣業旣嫡母改醮不合觧官從之孫茂道為司禮少常伯龍朔二年九月奏稱准令諸臣九章服君臣冕服章數雖殊飾龍名衮尊卑相亂望請諸臣九章衣以雲及麟代龍升山為上改名為冕又依舊令六品七品著綠八品九品著青青深亂紫非卑品所服望請依舊六品七品著綠八品九品著碧朝叅之處並依此制非常朝叅處聽兼服黄從之劉祥道為司禮太常伯麟德二年上言准禮封壇舊儀當以奉嘗卿為亞獻昔三代六卿位重故得佐祠爰至兩漢尚書秩卑亦以九卿行事自魏晉以降事歸臺省九卿皆為嘗伯屬官今登封大禮不以三公八座行事而用九卿無乃徇虗言而忘故事也帝從其議乃詔封祠日以司徒徐王元禮為亞獻祥道為終獻李敬貞為羅含府果毅麟徳二年將封泰山敬貞上言曰淮南子云方諸隂燧大蛤磨拭令熱以向月則水生以銅盤受之下水數石王充論衡云陽燧取火於日方諸引水於月相去甚遠而火至水來者氣感之騐也漢舊儀云八月飲酧車駕夕牲以鑒方諸取水於月陽燧取火於日周禮考工記云有六齊金錫相半謂之鑒燧之齊鄭𤣥注云方鑒燧取火於日月之器也准鄭此注則水火之器皆以金錫為之今司宰有陽燧形如圓鏡以取明火隂鑒形如方鏡以取明水比年祠祭皆用陽燧取火應時得之以隂鑒取水未有得者常用井水代之請准淮南論衡以方諸取之則禮神之物備矣帝令奉嘗與敬貞考騐其事敬貞又言周禮金錫相半自是造鏡之法鄭𤣥錯解以為隂鑒之制又先嘗以八九月望夜取蛤一尺二寸者依法試之自人定至夜半得水數斗卽與淮南論衡所說符同奉嘗奏曰封禪祭祀卽須明水實樽敬貞所陳檢較有故實又稱先經試騐請令敬貞取巨蛤便付泰山與所司考騐從之詔曰古今典制文質不同至於制度皆隨代革唯祭祀天地獨不改章斯乃自處於厚奉天以薄又今封禪卽用玉牒金繩器物之間復有瓦樽越席一時行禮文質頓乖駁而不備深為未當其封祀降壇所設上帝后土位先設藁秸瓦瓶瓢杯等並宜改用茵褥罍爵每事從文其諸郊祀亦宜准此程𤣥素為殿中侍御史總章元年高麗平將有事於南郊前一夕帝備法駕舉於太壇東北隅之壝外奉嘗旣頒儀注時𤣥素監察事謂奉嘗卿裴明禮博士陸遵楷曰准儀注祭之日皇帝就次未升壇先引太尉奠玉升自午階禮以别同異辯嫌疑為太尉人臣之責皇帝在次而先升午階可改也乃詣齋宫上奏曰臣伏見儀注皇帝升壇及䧏並繇午階初引太尉奠玉亦從南陛臣不敢廣陳典故以煩聖覽必謂君王不可與臣下同階太尉奠玉請從卯階依西獻禮則登降有數君臣道存從之夜漏五刻下奉嘗明禮又報奏帝不許曰我不讀書此誰之過也史璨為太常博士上元三年十月有司祫享于太廟璨奏議曰按禮緯三年一祫五年一禘公羊傳云五年而再殷祭兩文雖互其義畧同禮記正義引鄭𤣥祫禘志云春秋僖公三十三年十二月薨文公二年八月丁卯大享於太廟公羊傳云大享者何祫也是三年喪畢新君二年當祫明年春禘於羣廟僖公宣公八年皆有禘則後禘去前禘五年以此定之則新君二年祫三年禘又昭公十一年齊歸薨至十三年喪畢當祫為平丘之㑹冬公如晉至十四年祫十五年禘傳云有事于武官是也至十八年祫二十年禘二十三年祫二十五年禘昭公二十五年有事于襄公是也如上所云則禘後隔三年而祫已後隔二年而禘此則雅合禮經不違傳義自禘祫之祭依璨議定賈大隱為太常博士儀鳳二年太嘗以仲春告祥瑞於太廟高宗令禮官徵求故實大隱對曰古者祭以首時薦用仲月近代相承元日奏祥瑞二月告于廟蓋緣告必有薦便於禮也又簡貞觀以來勅令無文禮司因循不知所起高宗令依舊行焉蘇知機為太常博士是年上言曰去龍朔二年司禮少嘗伯孫茂道奏請諸臣九章服與乗輿冕服章數雖殊飾龍名衮尊卑相亂望請諸臣九章衣以雲及麟代龍升山為上仍正冕名當時竟未施行今請制大明十二章乗輿服之如日月星辰龍或山火麟鳳𤣥龜雲水等象鸞冕八章三公服之毳冕六章三品服之黼冕四章五品服之詔下有司詳議崇文舘學士校書郎楊烱奏議曰古者太昊庖犧氏仰以觀象俯以察法造書契而文籍生焉次有黄帝軒轅氏長而敦敏成而聰明垂衣裳而天下理其後數遷五德君非一姓體國經野建邦設都文質所以再而復正朔所以三而改夫改正朔者謂夏后氏建寅殷人建丑周人建子至於以日繫月以時繫年此則三王相襲之道也夫易服色者謂夏后氏尚黑殷人尚白周人尚赤至於山龍華蟲宗彛藻火粉米黼黻此又百代可知之道也謹按虞書曰予欲觀古人之象日月星辰山龍華蟲作㑹宗彛藻火粉米黼黻絺繡繇此言之則其所從來者尚矣夫日月星辰者光明炤下土也山者布散雲雨象聖王澤霑下人也龍者變化無方象聖王應機布敎也華蟲者雉也身被五采象聖王體兼文明也宗彛者虎蜼也以剛猛制物象聖王神武定亂也藻者逐水上下象聖王隨世代之應也火者陶冶烹飪象聖王至德日新也粉米者人恃以生象聖王物之所頼也黼者能斷割象聖王臨事能决也黻者兩已相背象君臣可否相濟也及有周氏乃以日月星辰為旌旗之飾又登龍於山登火於宗彛於是乎製衮冕以祀先王九章者法陽數也以龍為首章衮者卷也龍德神異應變潛見表聖王深沈逺制卷舒神化也又制鷩冕以祭先公鷩者雉也有耿介之志表公賢才能守耿介之節也又制毳冕以祭四望四望者岳瀆之神也虎蜼山林所生明其象也制絺冕以祭社稷社稷者土榖之神也粉米繇是而成象其功也又制𤣥冕以祭羣小祀也百神異形難可遍擬但取黻之相背異名也夫以周公之才美也故化定制禮功成作樂夫以孔宣之將聖也故行夏之時服周之冕先王之法服乃此之自出矣天下之能事又於是乎異矣今表狀請奏大明冕十二章乗輿服之者謹按日月星辰者已施於旌旗矣龍山火米者又不喻於古矣而云麟鳳有四靈之名𤣥龜有負圖之應雲有紀官之號水有盛德之祥此盖别表休徵終是無踰比象然則皇王受命天地興符仰觀則璧合珠連俯察則銀黄玉紫曁南宫之粉壁不足寫其形狀罄東觀之鉛黄無以紀其名實固不可畢陳於法服也雲也者龍從之氣也水也者藻之自生也又不假别為章目也此蓋不經之甚也又鸞冕八章三公服之鸞者天子之瑞也非三公之德也鷹鸇鷙鳥也適可以辯祥刑之職也熊羆猛獸也適可以旌武臣之力也又稱藻為水草無所法象引張衡賦云蔕倒茄於藻井披紅葩之狎獵謂為蓮花取其文彩者夫茄者蓮莖若以蓮代藻變古從今旣不知草木之名亦未達文章之制此又不經之甚也又毳冕六章三品服之者按此王者祀四望之服名也今三品乃得同王之毳冕而三公不得同王之衮名豈惟顛倒衣裳抑亦自相矛楯此又不經之甚也又黼冕四章五品服之考之於古則無其名騐之於今則無章首此又不經之甚也若夫禮惟從俗則命為制令為詔秦皇之故事猶可以適於今也夫義取隨時則出稱警入稱蹕乃漢國舊儀猶可以行於代矣亦何取於變周公之軌物改宣尼之法度者哉繇是竟寢知機所請韋萬石為太常少卿儀鳳三年奏曰明堂大享帝准古禮鄭𤣥義祀五天帝王肅義祀五行帝貞觀禮依鄭𤣥義祀五帝顯慶以來新脩禮昊天上帝奉乾封二年勅祀五天帝又奉制并祀昊天上帝者伏奉上元三年三月勅五禮行用已久並依貞觀年禮定又奉去年勅顯慶已來新脩禮多有事不師古其禮並依周禮行事者今用樂須定所祀之神未審定依何禮臣以去年十二月錄奏至今未奉進止所以樂章不足上令廣召學者更參議元萬頃為鳳閣舍人則天垂拱元年七月有司議圓丘方丘及南郊明堂嚴配之禮成均助敎孔𤣥義奏議曰謹按孝經云孝莫大於嚴父嚴父莫大於配天旣言莫大於配天明祀尊大之天昊天是也物之大者莫大於天推父比天與之相配行孝之大莫過於此以明尊嚴之極也又易云先王以作樂崇德殷薦之上帝以配祖考鄭注上帝天帝也故知昊天之祭合祖考並配請奉太宗文武聖皇帝高宗天皇大帝配昊天上帝於圓丘義符孝經周易之文也神堯皇帝肇基王業應天順人請配感帝於南郊義符大傳之文也又按祭法云祖文王而宗武王祖始也宗尊也所以名祭為尊始者明一祭之中有此二義又孝經云宗祀文王於明堂文王言祖而云宗也亦是通武王之義故知明堂之祭配以祖考請奉文武聖皇帝高宗天皇大帝配祭於明堂義符周易及祭法之文也太子右諭德沈伯儀議曰謹按禮有虞氏禘黄帝而郊嚳祖顓頊而宗堯夏后氏禘黄帝而郊鯀祖顓頊而宗禹殷人禘嚳而郊冥祖契而宗湯周人禘嚳而郊稷祖文王而宗武王鄭𤣥注云祖宗謂祭祀以配食也禘謂祭昊天於圓丘祭上帝於南郊曰郊祭五帝五神於明堂曰祖宗伏尋嚴配之人於此最為詳備虞夏則郊嚳殷人則捨契郊冥去取旣差前後乖次得禮之序莫尚於周禘嚳郊稷不聞於二王明堂宗祀始兼於兩配咸以文王武王父子殊别文王為父上主五帝武王對父下配五神孝經云嚴父莫大於配天則周公其人也若周公宗祀文王於明堂以配上帝不言嚴武王以配天則武王雖在明堂理未齊於昭配稱天宗祀義獨主於尊嚴雖同兩祭終為一主故孝經緯曰后稷為天地主文王為五帝宗也必若一神兩祭千祠萬獻蘋蘩禮􅉻於數此則神無二主之道禮崇一配之義切尋貞觀永徽共遵專配顯慶之後始創兼尊必順古而行實謂從周為美髙祖神堯皇帝請配圓丘方丘太宗文武聖皇帝請配南郊北郊高宗天皇大帝德邁九皇功開萬㝢制禮作樂告禪昇中率土共休普天同頼雖莫大之孝理當總配五天萬頃與鳳閣舍人范履氷等議曰伏惟高祖神堯皇帝鑿乾構象闢土開基太宗文武聖皇帝紹統披元脩機闡極高宗天皇大帝𢎞祖宗之大業廓文武之宏規三聖重光千年接旦神功叡德罄南面而難稱盛烈鴻猷超古今而莫擬豈徒錙銖堯舜糠粃殷周而已哉謹按見行禮昊天上帝等五祠所咸奉高祖神堯皇帝太宗文武聖皇帝兼配今議者引祭法周易孝經之文雖近稽古之詞殊失因心之㫖但子之事父臣之事君孝以承志忠而順美竊惟兼配之禮待禀先聖之懐爰取訓於通規遂申情於大孝詩云昊天有成命二后受之易曰殷薦之上帝以配祖考敬尋厥㫖本合斯義今若遠摭遺文近乖成典拘常不變守滯莫通便是臣黜於君遽易郊丘之位下非於上靡遵弓劒之心豈所以申太后哀感之誠循皇帝孝思之德慎終追遠良謂非宜嚴父配天寧當若是伏據見禮高祖神堯太宗文武聖皇帝今旣先配五祀理當依舊先改高宗天皇大帝齊尊耀魄等䆳含樞潤三葉之宏規開萬代之鴻業重規疊矩在功烈而無差享地郊天豈祠祝之有别請奉高宗天皇大帝歴配五祠制從萬頃議韋叔夏為春官郎中天授二年十月奏言謹按禮明堂大享唯禮五方五帝故月令季秋令云是月也大享帝則曲禮所云大享不問卜鄭𤣥注云謂徧祭五帝於明堂莫適卜是也又按祭法云祖文王而宗武王鄭𤣥注云祭五帝五神於明堂曰祖宗故孝經云宗祀文王於明堂以配上帝據此文明堂正禮唯五帝配以宗祖及五帝五官神等自外餘神並不合預伏唯陛下追遠情深崇禮志切故於明堂享祀加昊天上帝皇地祇重之以先后配享此乃補前王之闕典𢎞嚴配之䖍誠徃以神都郊壇未建乃於明堂之下廣祭衆神蓋議出權時非不刋之典也謹按禮經其内官中官等五岳四瀆諸神並合從祀於二至明堂總奠事乃不經然則宗祀配天雜與小神同薦於尊嚴之道理有不安望請每歲元日唯祀天地大神配以帝后其五岳以下請依禮於冬夏二至從方丘圓丘庶不煩黷從之王方慶為鸞臺侍郎萬歲通天二年七月清邊道大總管建安王攸宜平契丹凱旋詣闕獻俘内史王其善以為軍将入城例有軍樂今旣屬孝明皇帝忌月請備而不奏方慶奏曰臣謹按經但有忌日而無忌月晉穆帝納后用九月九月是康帝忌月于時疑下太常禮官荀納議稱禮只有忌日無忌月語若有忌月合有忌歲益無理據當時從納所議軍樂是軍容與常樂不等臣謂振作於事無嫌從之聖歴元年方慶又奏議曰唯今朞喪大功未塟並不得預朝賀仍終喪不預宴㑹比來朝官不遵禮法身有哀慘陪預朝㑹手舞足蹈公違憲章名敎旣􅉻實㸃皇化伏望申明令式更令禁斷從之冊府元龜卷五百八十六
