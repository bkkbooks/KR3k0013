body:
  text: 冊府元龜卷四百十六宋王欽若等撰将帥部傳檄第二宋袁豹為髙祖太尉長史髙祖遣益州刺史朱齡石伐蜀使豹為檄文曰夫順徳者昌逆徳者亡失仁與義難以求安憑阻負險鮮克有成詳觀自古隆替有數故成都不世祀華陽無興國日者王室多故夷羿遘紛波振塵駭覃及遐裔蕞爾譙縱編尸黔首同惡相求是崇是長肆反噬於州相播毒害於民黎俾我西服隔閡皇澤自義風雷靡天光輝及昭晰舊物烟煴區宇以庶務草創未遑九伐自是以來奄延十載而野心不革伺隙乗間招聚逋叛共相封殖侵擾我蠻獠揺蕩我疆陲我是以有冶州之役醜類盡殪匹馬無遺桓謙折首譙福烏逝奔伏窠穴引頸待戮當今北狄露晞南冦埃掃朝風載韙庶績其凝康哉之歌日熙比屋之隆可詠孤職是經略思一九有眷彼禹跡願言載懷奉命西行途戾荆郢瞻望巴漢憤慨交深清江原於濫觴澄氛祲於井絡誅叛柔逺今也其時即命河間太守蒯恩下邳太守劉鍾精勇二萬直指成郡龍驤将軍臧喜戎卒二萬進自墊江益州刺史朱齡石舟師三萬電曜外水遣輔國将軍索懇總漢中之衆濟自劍道振威将軍朱容子提寧州之鋭渡瀘而入神兵四臨大網宏掩衝翼千里金鼔萬張組甲貝胄景渙波屬華夷百蠻雲會霧臻以此攻戰誰與為敵况又奉義而行以順而動者哉今三硤之隘在我境内非有岑彭荆門之險罙入其阻平衢四達實無鄧艾綿竹之難山川之形抑非曩日攻守難易居然百倍當全蜀之强士民之富子陽不能自安於庸僰劉禪不敢竄命於南中荆邯折謀伯約挫鋭故知成敗有數非可智延此皆益土之前事當今之元龜也盛如盧循强如容超凌威南海跨制北岱樓船萬艘掩江蓋汜鐵馬千羣充原塞隰然廣固之攻陸無完雉左里之戰水靡全舟或顯戮京畿或𫝊首萬里故知逆順有勢難以力抗斯又目前殷鑒深切著明者也梁益人士咸明王化雖驅迫於時本非奥主從其淫虐日月増播刑殺非罪死以澤量而待命冦讐之戮崎嶇豺狼之吻豈不遡誠南凱延首東雲普天有來蘇之望而一方懷後予之怨王者之師以仁為本捨逆取順爰自三驅齊斧所加縱身而已其有衿甲反接自投軍門者一無所問士子百姓列肆安堵審擇吉凶自求多福大信之明皦若朝日如有迷復姦邪守愚不改火燎孟諸芝艾同爓河決金隄淵丘同體雖欲悔之亦将何及巴陵王休若為鎮東将軍明帝即位召行㑹稽郡事孔覬為太子詹事以平西司馬庾業代之覬與吳郡太守顧琛據郡同反吳興太守王曇生義興太守劉延熙晉陵太守袁標一時響應帝以庾業代延熙為義興加建威将軍以延熙為休若鎮東長史業至長塘湖即與延熙合帝遣建威将軍沈懷明東討尚書張永係進休若董統東討軍事移檄東土曰蓋聞釁集有兆禍至無門倚伏之來實惟人致故囂述貪亂終殄宗祀昌憲搆氛旋潤斧鉞斯則昭章記牒鑒戒今古者也自國步時艱三綱道盡神歇靈繹璿業綴旒皇上二雄集瑞英叡應歴鳳儀熛昇龍輝電舉盪穢紫樞不俟條牧之誓凝政中㝢不肆漂杵之威是以墜維再造虧天重搆幽明裁紀標配斯光而羣凶恣虐協扇童孺蕞爾東陲復淪醜跡即回從慝蜂動蟻附聖圖霆發神威四臨羽驛所屆義旅雲屬欃鉞所麾逆徒冰泮勝負之效皎然已顯司徒建安王英猷冠世督率元戎驃騎山陽王風略夙昭撫莅中陳或飛霜江蠡或騰焱荆河金甲燭大庭囂聲震海浦前将軍吳興太守張永東南標秀協贊戎機建威将軍沈懷明鎮東中兵叅軍劉亮武衛将軍夀寂之霜鋭五千熊行虎步龍驤将軍王牧之龍驤将軍頓生鐵騎連羣風驅電邁右軍将軍齊王射聲校尉姚道和樓艦千艘覆川蓋汜左軍将軍垣恭祖步兵校尉杜幼文冗從僕射全景文員外散騎侍郎孫超之並率虎旅駱驛雲赴殿中将軍杜敬真殿中将軍陸攸之建武将軍吳喜甲楯一萬分趣義興猥承人乏總司戎統聳劍東雲馳憤海曲歕氣則白日盡晦刷馬則清江倒流以此伐叛何勍不勦以此柔服何順不懷愍彼羣迷弗辨堯桀拒轍之臂擬雷霆之衝已枯之葉當霜颷之墜尺豎所謂寒心匹婦所為歎息夫因禍致慶資敗為成前監不忘後事明筮若能相率歸順投兵効欵則福鍾當年慶覃來裔孰如身轘宗屠鬼餒魂泣者哉詳鏡安危自求多福購生禽顗食邑千五百户開國縣侯生擒顧琛千尸開國縣侯斬送者半賞時将士多是東人父兄子弟皆已附逆帝因送軍普加宣示曰朕方務徳簡刑使四罪不相及助順同逆者一以所從為斷卿等當深達此懷勿以親戚為慮也衆於是大悦帝又以吳喜為建武将軍東討至永世得庾業劉延熙書送同逆尋陽王子房檄文與喜曰知統戎旅已次近路卿所在著名今日何為立忠於彼耶想便倒戈共受河山之賞喜報書曰前驅之人忽奉來翰搜盡狂惑良深悵念聖主以神武撥亂徳盛勲髙羣逆狡扇滅此晷刻君等勲義之烈世荷國恩事愧鳴鶚不懷食葚今練勒所部星言進邁相見在近不復多陳山陽王休祐為都督豫江司三州豫州刺史殷琰反休祐出鎮歴陽督䕶國将軍劉勔討之琰軍累敗休祐與琰書曰君本文弱素無武幹是逺近所悉且名器清顯不應復有分外希覬近者之事當是劫於凶豎不能守節今大軍長驅已造城下勢孤援絶禍敗交至顧昔情欵猶有惻然聖上垂天地之仁開不世之澤好生惡殺遐邇所聞顧琛王曇生等皆軍敗迸走彼早乞活尚蒙恩恕宴處私門今神鋒所臨前無横陣况窮城弱衆殘傷之餘而欲自固乎若開門歸順自可不失富貴将佐大小並保榮爵何故茍困士民自求韲膾身膏斧鑊妻息並盡老兄垂白東市受刑耶幸自思之信言不爽有如皎日太宗又遣王道隆齎詔宥琰罪勔又與琰書曰昔景和凶悖行絶人倫昏虐險穢諫諍杜塞遂毁陵廟芟刈百寮縱毒窮凶靡有紀極於是人神迴遑莫能自保中外士庶咸願一統予職在直衛目所備覩主上神機天發指麾尅定横流塗炭一朝太平扶危拯急實冠終古而四方持疑成此乖逆資斧所臨每從偃簡足下以衣冠華胄信槩夙昭附戾從違猶見容養賢兄長史階升清列賢子參軍亦秉國綱間者進軍宛唐計繇劉順退衆閉城當是未了過蒙朝恩謬充将帥早承風素情有依然今皇威逺申三方蹙弱勝敗之勢皎然可覽王御史昨至主上勅驃騎教賢兄賢子書今悉遣送百代以來未見𢎞恩曲宥乃至於此且朝廷方宣示大義惟新王道何容標虚亂於士女失國信於一州以足下明識陳見想必不俟終日如有孤背亭毒弗忘屠陷者便當窮兵肆武究法極刑将恐貴門無復祭祀之主墳隴乏掃洒之望進謝忠臣退慚孝子名實兩喪沒有餘責扶力略白幸加研覽琰本無反心事繇力屈叔寶等有降意前後屢遣送誠牋而衆心持疑莫能相一故歸順之計每愆塞嬰城愈固其後琰将皇甫道烈栁倫等二十一人開門出降勔因此又與琰書曰栁倫來奔具相申述方承足下跡纒穢亂心秉忠誠憫然窮愁不親戎政去冬開天之始愚迷者多如足下流比進非社稷宗臣退無顧命寄托朝廷既不偏相嫌責足下亦復無所獨愧程天祚已舉城歸順龎孟虬亦繼迹奔亡劉胡困於錢溪袁覬欲戰不得推理揆勢亦安能久且南方初起連州十六擁徒百萬仲春以來無戰不北摧陷殄滅十無一二南憑袁顗弱卒北恃足下孤城以兹定業恐萬無一理方今國網疎略示舉宏維此日相白想亦已具矣且倫等皆是足下腹心牙爪所以攜手相捨非有怨恨也亦知事不可濟禍害已及故耳夫擁數千烏合抗天下之兵傾覆之狀豈不易曉假令六蔽之人猶當不為其事况復足下少祖名教疾沒世無稱者耶所以復有此白者實惜華州重鎮鞠為茂草兼傷貴門一日屠滅足下若能封府庫開四門宣語文武示以禍福遣咫尺之書表達誠欵然後素車白馬來詣轅門若令足下髮膚不全兒姪凋耗者皇天后土實聞此言至辭不華寧復多白南齊張欣泰為軍主明帝建武二年圍鍾離城欣泰隨崔惠景赴救移魏廣陵侯曰聞攻鍾離是子之深䇿可無謬哉兵法云城有所不争豈聞之乎我國家舟舸百萬覆江横海所以按甲於今不至欲以邊城疲魏士卒我且千里運糧行留俱弊一時霖雨川谷涌溢然後乗帆渡海百萬齊進子復奚以禦之乃今魏主以萬乗之重攻此小城是何謂歟攻而不拔誰之恥耶假令能拔子守之我将連舟千里舳艫相屬西過夀陽東接滄海仗不再請糧不更取士卒偃卧起而接戰乃魚鼈不通飛鳥斷絶偏師淮左其不能守皎可知矣如其不拔吾将假法於魏之有司以請子之過若挫兵夷衆攻不卒下驅土填隍拔而不能守則魏朝名士其當别有深致乎吾所未能量昔魏之太武佛狸傾一國之衆攻十雉之城死亡大半僅以身返既智屈於金墉亦雖拔而不守皆昨昔所為至今為笑前鑒未逺已忘之乎和門邑邑戲載往意豫章王嶷為荆州刺史會梁州刺史范柏年被誅其親将李烏奴恐懼叛入氐中仇池楊文𢎞納之烏奴率亡命千餘人攻梁州為刺史王𤣥邈所破復走還氐中嶷遣兵討烏奴檄本郡能斬送烏奴首者本郡田宅事業悉賜之又與氐族平羌校尉沙州刺史楊廣香書曰夫廢興無謬逆順有恒古今共貫賢愚同察梁州刺史范柏年懷挾詭態首鼠兩端既已被伐盤桓稽命遂潛遣李烏奴叛楊文𢎞扇誘邊疆荒雜柏年今已梟擒烏奴頻被摧破計其餘燼行自消夷今遣參軍行晉壽太守王道寳參軍事行北巴西新巴二郡太守任湜之行宕渠太守王安會領鋭卒三千遄塗風邁浮川電掩又命輔國将軍三巴校尉明惠昭巴郡太守魯休烈南巴西太守栁𢎞稱益州刺史𫝊琰並簡徒競鶩選甲争馳雍州水步行次魏興并山東僑舊會于南鄭或汎舟墊江或飛旍劍道腹背飈騰表裏震擊文𢎞容納叛戾専為淵藪外侮皇威内凌國族君奕世忠欵深識理順想即起義應接大軍以為掎角討滅烏奴尅建勤勞茂立誠節沈攸之資十年之積擁百旅之衆師出境而城潰兵未戰而自屠朝廷無遺鏃之費士民靡傷痍之弊况蕞爾小豎方之蔑如其取殱殄豈延漏刻忝以寡昧分陜司蕃清氛蕩穢諒惟任職此府器械山積戈旗林聳士卒剽勁蓄鋭積威除南勦冦豈俟徵習但以剪伐萌苗弗勞洪斧撲彼蚊蚋無假多力皇上聖哲應期恩澤廣被罪止首惡餘無所問賞罰之科具寫如别使道寶步出魏興分軍泝墊江俱會晉夀蕭穎胄為冠軍将軍西中郎将東昏侯誅戮羣公雍州刺史蕭衍奉南康王即帝位於江陵遥廢東昏侯為涪陵王使蕭穎胄夏侯詳移檄告京師百官曰西中郎府長史都督行留諸軍事右軍南郡太守南豐縣開國侯蕭穎胄司馬征虜将軍新興太守夏侯詳告京邑百官諸州郡牧守夫運不常夷有時而陂數無常剥否極則亨昔商邑中微彭韋投袂漢室方昏虚牟効節故風聲永樹卜世長久者也昔我太祖髙皇帝徳範生民功格天地仰緯彤雲俯臨紫極世祖嗣興克光前業雲雨之所沾被日月之所出入莫不舉踵來王交臂納貢鬱林昏迷顛覆厥序俾我大齊之祚翦焉将墜髙宗明皇帝建道徳之盛軌垂仁義之至蹤紹二祖之鴻基繼三五之絶業昧旦丕顯未明求衣故奇士盈朝異人輻湊若迺經禮緯樂之文定鼎作雒之制非雲如醴之祥白質黑章之瑞諒以則天比大無得稱焉而嗣主失綱窮肆凌暴十愆畢行三風咸襲居喪而無哀貌在蹙而有喜容酣酒嗜音罔懲其侮讒賊狂邪是與比周遂令親賢攖荼毒之誅宰輔受葅醢之戮江僕射蕭領軍徐司空沈僕射曹右衛或外戚懿親或皇室令徳或時之宗望或國之虎臣並勲彰中興功比周召秉鈞贊契受遺先朝咸以名重見疑正直貽斃害加黨族虐及嬰孺曽無渭陽追逺之情不顧本支殱落之痛信必見疑忠而獲罪者百姓業業罔知攸暨崔惠景内逼淫刑外不堪命驅亡命之民為免死之計倒戈迴刃還指宫闕城無完守人有異圖蕭令君勲濟宗祀業極蒼旻四海蒙太平之徳億兆憑再造之基江夏王拘迫威强牽制巨力迹屈當時迺心可亮竟不能内恕深情顯加鴆毒蕭令君自以親惟族長任實宗臣至誠苦言朝夕獻入讒醜交搆漸見疎疑浸潤成災奄離怨酷用人之功以寧社稷刈人之身以騁淫濫台輔既誅姦小競用梅蟲兒茹法殄妖忍愚戾窮縱醜惡販鬻主威以為家勢熒惑嗣主恣其妖虐宫女千餘躶服宣淫孽臣數十袒裼相逐帳飲寰肆之間宵游街陌之上提挈羣豎以為歡笑劉山陽僭受凶㫖規肆狂逆天誘其衷即就梟翦夫天生蒸民樹之以君使司牧之勿使失性豈有尊臨㝢縣毒遍黔首絶親戚之恩無君臣之義功重者先誅勲髙者速斃九族内離四夷外叛封境日蹙戎馬交馳帑藏既空百姓已竭不䘏不憂慢游是好民怨於下天懲於上故熒惑襲月孽火燒宫妖水表災震蝕告沴七廟阽危三才莫紀大懼我四海之命永淪於地南康殿下體自髙宗天挺英睿食葉之徵著於弱年當璧之祥兆乎綺嵗億兆顒顒咸思戴奉且勢居上游任總連帥家國之否寧濟是當幕府身備皇宗情荷顧託憂深責重誓清時難今命冠軍将軍西中郎諮議領中直兵參軍軍主楊公則寧朔將軍領中兵參軍軍主王法度冠軍將軍諮議參軍軍主龎翽輔國将軍諮議參軍領别駕軍主宗史輔國将軍諮議參軍樂藹等領勁卒三萬凌波電邁逕造秣陵冠軍将軍領諮議中直兵參軍軍主蔡道恭輔國将軍中直兵參軍右軍府司馬軍主席闡文輔國将軍中兵參軍軍主汪漾之寧朔将軍中兵參軍軍主朱斌中直兵參軍軍主宗冰之建威将軍中直兵參軍軍主朱景舒寧朔将軍中直兵參軍軍主庾域寧逺将軍軍主庾略等破甲二萬直指建業輔國将軍武寧太守将軍軍主鄧元起輔國将軍前軍将軍軍主王世興等鐵騎一萬分趣白下征虜将軍領司馬新興太守夏侯詳寧朔将軍諮議參軍軍主栁忱寧朔将軍領中兵參軍軍主劉孝慶建威将軍軍主江陵令江銓等帥組甲萬騎駱驛繼發雄劍髙麾則五星從流長㦸逺指則雲虹變色天地為之矞皇山淵以之奔沸幕府親貫甲胄授律中權董帥熊羆之士十有五萬鉦鼓紛紜雷動荆南寧朔将軍南康王友蕭穎達領虎旅三萬抗威後拒蕭雍州勲業蓋世謀猷淵肅既痛家禍兼憤國難泣血枕戈誓雪怨酷精卒十萬已出漢川張郢州節義慷慨悉力齊奮江州邵陵王湘州張行事王司州皆逺近懸契不謀而同並勒驍猛指景風驅舟艦魚離萬里蓋水車騎雲屯平原霧塞以同心之士伐倒戈之衆盛徳之師救危亡之國何征而不服何誅而不克哉今兵之所指惟在梅蟲兒茹法殄二人而已諸君徳載累世勲著先朝屬無妄之時居道消之運受迫羣豎念有危懼大軍近次當各思拔迹來赴軍門檄到之日有能斬送蟲兒法殄首者封二千戸開國縣侯若迷惑凶黨敢拒軍鋒刑兹無赦戮及宗族賞罰之信有如皎日江水在此余不食言梁丘遲為太尉臨川王宏記室髙祖天監中安東将軍江州刺史陳伯之叛入魏魏以為平南将軍都督淮南諸軍事詔宏北討宏命遲私與之書曰陳将軍足下無恙幸甚将軍勇冠三軍才為世出棄燕雀之小志慕鴻鵠以髙翔昔因機變化遭逢明主立功立事開國承家朱輪華轂擁旄萬里何其壯也如何一旦為奔亡之虜聞鳴鏑而股戰對穹盧以屈膝又何劣耶尋君去就之際非有他故直以不能内審諸已外受流言沈迷猖獗以至於此聖朝赦罪論功棄瑕録用推赤心於天下安反側於萬物将軍之所知非假僕一二談也朱鮪涉血於友于張繡剚刃於愛子漢主不以為疑魏君待之若舊况将軍無昔人之罪而勲重於當代夫迷塗知反往哲是與不逺而復先典攸髙主上屈法申恩吞舟是漏将軍松柏不剪親戚安居髙臺未傾愛妾尚在悠悠爾心亦何可述今功臣名将鴈行有序懷黄佩紫贊帷幄之謀乗軺建節奉疆場之任並刑馬作誓𫝊之子孫将軍獨靦顔借命馳驅異域寧不哀哉夫以慕容超之强身殱東市姚泓之盛面縳西都故知霜露所均不棄異類姬漢舊邦無取雜種北虜僭盜中原多歴年所惡積禍盈理至燋爛况偽嬖昏狡自相夷戮部落攜離酋豪猜貳方當繫頸蠻邸懸首藁街而将軍魚游於沸鼎之中燕巢於飛幕之上不亦惑乎莫春三月江南草長雜花生樹羣鶯亂飛見故國之旗鼓感生平於疇日撫弦登陴豈不愴恨所以㢘公之思趙将吳子之泣西河人情之自然也将軍獨無情哉想早勵良圖自求多福伯之乃於潯陽擁衆八千歸國後魏慕容白曜為征南将軍自瑕丘進攻宋歴城乃為書以諭之曰天棄劉彧禍難滋甚骨肉兄弟自相誅戮君臣上下無復紀綱薛安都常珍奇畢衆敬等深覩存亡翻然歸義故朝廷納其誠欵委以南藩皆目前之見事東西所備聞也彼無鹽戍主申纂敢縱姦慝劫奪行人官軍始臨一時授首房崇固守斗城尋即潰散自襄陽以東至於淮海莫不風靡服從正化謂東陽歴城有志之士上思安都之榮顯下念申纂之死亡追悔前惑改圖後悟猥總戎旅掃定此方濟黄河知十二之虚説臨齊境想一變之清風躊躇周覽依然何極故先馳書以喻成敗我皇魏重光累業徳懷無外威武所撫無不披靡固非三吳弱卒所能擬抗况於今者勢以土分劉彧威不制秣陵政不出閫外豈復能浮江越海赴危救急哉後周賀蘭祥為大司馬明帝武成初吐谷渾侵凉州詔詳與宇文貴總兵討之詳乃遣其軍司檄吐谷渾曰夫二氣既分三才定位樹之以君本為黔首豈使悖義違道肆於民上昔魏氏不綱羣方幅裂豺狼横噬龜玉已毁喋喋黔黎咸墜塗炭我先皇神武應期一統天下東龕南翦無思不服天降有周世篤英聖遂廓洪基奄荒萬國固則神臯西岳險則百二猶在卿士師師羣后率職故知三靈之所睠集四隩之所來蘇也彼國世於西陲作藩於魏值中原政亂遂阻皇風首䑕兩端伺我邊隙我先皇含垢藏疾仍存聘享欲睦之以鄰好申之以婚姻彼國包藏禍心屢違盟約外結仇讐自貽近患是故往年致突厥之師也自爾迄今蜂蠆彌毒入我姑臧俘我河縣芟夷我菽麥䖍劉我蒼生我皇武以止戈文以懷逺徳覃四海化溢八荒以彼惡稔禍盈故命龔行九伐武臣猛将天張雷動皆六郡良家三秦精鋭揮戈擐甲同萃龍沙柱國博陵公祥貴戚重臣乃文乃武受賑廟堂元戎啓行大傅燕國公謹英猷不世應變無窮仗旄指麾為其謀主柱國化政公貴早播威聲奇正兼設直取龍涸濟自南河突厥與國睦親同恥反道驅引弓之民總穹廬之衆解鞍成山雲蒸霧合往嵗王師西伐成都不守桴鼔南臨江陵底定鑿空萬里闢地千都荒服畏威膜拜厥角成敗之機較然可見若能轉禍為福深識事宜君臣相率輿襯稽顙則爵等優除永藩西服如其徘徊危邦覬延時漏覆宗湮祀良助寒心幸思嘉謀以圖去就遂與吐谷渾廣定王鍾留王等戰破之因拔其洮陽洪和二城以其地為洮州撫安西土振旅而還齊王憲為前鋒尅齊鄴城齊任城王楷廣陵王孝珩據信都有衆數萬武帝復詔憲討之楷令間諜二人覘視形勢候騎執之憲集齊舊将徧示二人又謂曰吾所争者不在汝等今放汝還可即充我使乃與楷書曰山川有間每深勞佇仲春戒節納履惟宜承兹始屆兩河仍圖三魏二者交亂想無虧徳昔魏歴云季海内横流我太祖撫運乗時大庇黔首皇上嗣膺下武式隆景業興稽山之會總盟津之師雷駭唐郊則野無横陣雲騰晉水則地靡嚴城襲魏之英既奔竄於草澤竊號之長亦委命於旌門徳義振於無垠仁風被於有截彼朝宿将舊臣良家戚里俱升榮寵皆縻好爵是使臨漳之下効死爭驅營丘之前奮身畢命此豈惟人事抑亦天時宜訪之首路無俟傍説吾以不武任總元戎受命安邊路指幽冀列邑名藩莫不屈膝宣風遵禮皆荷來蘇足下髙氏令王英風夙著古今成敗備諸懷抱豈不知一木不維大厦三諫可以逃身哉且殷微去商侯服周代項伯背楚賜姓漢朝去此弗圖茍殉亡轍家破身殞為天下笑又足下諜者為候騎所拘軍中情實具諸執事知以弱卒瑣甲欲抗堂堂之師縈帶扞城冀保區區之命戰非上計無待卜疑守乃下策或未相許已勒諸軍分道并進相望非逺憑軾有期兵交命使古今通典不俟終日所望知機隋皇甫績為蘇州刺史髙智慧等作亂江南州民顧子元發兵應之因以攻績相持八旬子元素感績恩於冬至日使奉牛酒績遺子元書曰皇帝握符受籙合極通靈受揖讓於唐虞棄干戈於湯武東踰蟠木方朔所未窮西盡流沙張騫所不至𤣥漠黄龍之外交臂來王葱嶺榆闗之表屈膝請吏曩者偽陳獨阻聲教江東士民困於荼毒皇天輔仁假手朝廷聊申薄伐應時瓦解金陵百姓死而復生吳會臣民白骨還肉惟當懷音感徳行歌擊壤豈宜自同吠主飜成反噬卿非吾民何須酒禮吾是隋将何容外交易子析骸未能相告况足食足兵髙城深塹坐待强援綽有餘力何勞踵輕弊之俗作虚偽之辭欲阻臣民之心徒感驍雄之志以此見期必不可得卿宜善思活路曉諭黎元能早改迷失道非逺子元得書於城下頓首陳謝楊素援兵至合擊破之拜信州總管十二州諸軍事唐王茂元鎮河陽會澤潞劉從諫死子稹拒命武宗遣詣鎮以書誥諭以利病禍福之宜茂元與稹書曰前以肺肝布諸簡素仰承復命猶事枝詞夫豈告者之不忠抑乃聴者而未審擇福莫若重擇禍莫若輕一去不迴者良時一失不復者機事噫嘻執事誰與為謀延首北風心焉如灼是以再陳禍福用釋危疑言不避煩理在易了丁寧懇切至於再三者誠以僕與先太師相國俱沐天光並為藩后昔云與國今則親鄰而大年不登同盟未至飯具纔畢襚衣莫陳乃眷後生遽垂先訓遷延朝命迷失臣職不思先轂之忠将復欒書之族僕𨽻之所共惜兒女之所同悲况僕擁節臨戎援旗誓衆封疆甚邇音問猶存忍欲賣之以為巳功問之以開戎役将祛未寤欲罷不能願思苦口之言以定束身之計昔先太尉相國嘗陷亂邦不從逆命翻身歸國全家受封居韓之西為國屏藩棄代之際人情帖然太師相國以早赴軍牙久從征斾事君之節日著居喪之禮又彰故乃奨其象賢仍以舊服納職修貢十五餘年於唐室為忠臣於劉氏為孝子人之不幸天亦難忱加其壯室之年奄有壞梁之歎主上深固義烈是降絲綸俾足下還朝聴國家後命其義甚著其恩莫偕昨者秘不發喪已當踰月安而拒詔則於忠臣已失失忠於國失孝於家望此用人繇兹保族是亦坐薪言泰巢幙云安智士之所寒心謀夫之所齚舌矧於僕者得不動心竊計足下之懷執事之論當以趙氏傳於魏氏襲侯欲以逡巡希恩顧望謀立爾夫事殊者趣異勢别者跡暌胡不度其始而議其終搴其華而尋其實願為足下一二而陳之夫趙魏二侯於其先也親則父子於其人也職則副戎賞罰得以相參恩威得以相抗義願事順故朝廷推而與之今足下之於太師也地則猶子職非副戎賞罰未嘗相參恩威未嘗相抗稽喪則於義爽拒詔則於事乖比趙魏二侯信事殊而勢别矣此施之於足下則有自立之罪擅命之尤得失之間其理甚白又詳足下未必不恃太師之好賢下士重義輕財吳國之錢往往而有梁園之客比比而來将倚以為藩屛託以為羽翼使以謀取使以數求細而思之此又非計夫山髙則羝羊自至泉深則沈玉自來已立然後人歸身正然後士附語有之曰政亂則勇者不為鬭徳薄則賢者不為謀故吳濞有姦而鄒陽去燕惠無徳而樂生奔晉寵大夫卒成分國之禍衛多君子執救渡河之灾此之前車得不深鏡憲代四祖文明繼興當時燕趙中山淮陽齊魯結連者幾姓旅拒者幾侯咸逆天用人背惠忘徳據指掌之地謂可逃刑倚親戚之私謂能取信一旦地空家破首裂支分闇者不能為謀明者固以先去悔而莫及末如之何先太尉與李洧尚書齊之密戚楊太保與蘇肇給事蔡之懿親並據要地方州領精甲鋭卒及其王師萃止我武惟揚則割地驅人以降送欵輸誠而入非不念密戚非不念懿親非不知恩非不懷惠直以順逆是迫死生實難能與其同休不能與其共戚故也况足下大未侔齊蔡久未及李吳将以其人動於不義僕恐夙沙之國縛主之卒重生彭寵之家不義之侯更出又計足下當恃太行九折之險部内數州之饒兵士尚强倉儲且足謂得以久謀其更安危哉此心自棄何逺昔者李抱真相國用彼州之人破朱滔於燕困田悦於魏連兵轉戰綿嵗經時而潞人夫死不敢悲子死不敢哭何者李相國奉討逆之命為勤王之師義著而誠順故也及盧從史釋喪就位賣降冀功将乗討伐之時欲肆凶邪之性計未就而人神已怒事未立而兵衆已離以萬夫之長困一卒之手驅轞北闕棄屍南荒而潞之人猶老者捫胸少者扼捥謂朝廷不加顯戮深為失刑其故何哉以從史不義不暱去安就危衆黜其謀下不為用故也二帥去就非因𫝊聞鳩杖之人鮐背之叟知其本末尚能言之則太行之險固不為悖者之守數州之衆固不為邪者之徒此又不足恃也由此言之則以何名墮家聲何事稽君命何道求死士何計固人心此僕所以對案忘餐推枕不寐為足下惜為足下危而不知其所以然也况太師比者養牛添卒畜馬訓兵旁招武幹之才中舉将軍之令然而聴於逺近頗有是非雖朝廷推赤心𢎞大度然而不逞者已有異圖之説横議者屢興悖惡之疑人之多言亦可異也誰為來者猶宜弭之今足下背季父引進之恩失大朝文誥之令則是實先太師之浮議彰昭義軍之有謀為人姪則致叔父於不忠為人孫則敗乃祖於無後亦何面對燕趙之士見齊魯之人耶又計足下爰自始初造次為慮今兹追改懼有後艱此左右者不明而咨詢之未盡也乃者李尚書祐董常侍質之輩並親為賊将拒我官軍納質於匪人効用於戎首久乃來復尚蒙殊恩皆受圭符咸領旗鼓不能悉數厥徒實繁豈有足下藉兩代之餘資委數萬之舊旅俛首聴命舉宗効誠則朝廷又豈以一日之稽遲片辭之疑異遂致足下於不測阻足下之後圖故事具存可以明驗幸請自求多福無辱前人䕶龍旐以歸雒師秉象笏而朝魏闕必當勲庸繼代富貴逼身無為鄰道所資使作他人之福儻尚淹歸欵未整來轅戎臣賈勇以争先天子赫斯而降怒金玦一受牙璋四馳魏衛壓其東南晉趙出於西北拔距投石者數踰萬計科頭㦸干者動以千羣兼馳攙虎之材官仍率射鵰之都督雷電大擊沙石可吞兵用火焚城兼水灌魏趣邢郡趙兼洛州介二大郡之間是古平原之地車甲盡輸於異境糗糧反聚於他人恃河北而河北無儲倚山東而山東不守以兩州之餓殍抗百道之奇兵比累卵而未危寄孤根於何所則老夫不佞亦有志焉願驅敢死之徒以從諸侯之末下飛狐之口入天井之闗巨浪難防長飈易扇此際必當驚地底之鼓角解樓上之梯衝喪貝躋陵飛走之期須絶投戈散地灰釘之望斯窮自然麾下平生盡忘舊愛帳中親信即起他謀辱先祖之神靈為明時之戮笑静言其漸良以驚魂今故再遣使車重申丹素幸惟鑒前代之成敗訪用事之賔僚思反道敗徳之難念順令畏威之易恃以吉日蹈兹坦途勿餒劉氏之魂勿汚潞人之俗封帛增歎含毫益酸延望還章用以上表成敗之舉惟慎圖之鄭畋鎮鳳翔黄巢臨長安詔京西諸道行營都統時畿内諸鎮禁軍尚數萬賊巢汚京師後衆無所歸畋承制招諭諸鎮将校皆萃岐陽畋分財以結其心與之盟誓期正王室又傳檄天下曰鳳翔隴西節度使檢校尚書左僕射同中書門下平章事充京西諸道行營都統上柱國熒陽郡開國公食邑二千戸鄭畋移檄吿諸藩鎮郡縣侯伯牧守将吏曰夫屯亨有數否泰相㳂如日月之蔽虧似隂陽之愆伏是以漢朝方盛則莽卓肆其姦兇殷道未衰而羿澆騁其殘酷不無僭越尋即誅夷乃知妖孽之生古今難免代有忠貞之士力為恢復之謀我國家應五運以乗乾躡三王之垂統綿區飲化匝宇歸仁十八帝之鴻猷銘於神鼎三百年之睿澤播在人謡加以政尚寛𢎞刑無枉濫翼翼勤行於王道孜孜務恤於生靈足可𫝊寶祚於無窮而御瑶圖於不朽近嵗螟蝗作害旱暵延灾因令無賴之徒遽起亂常之暴雖加討逐猶肆猖狂草賊黄巢奴僕下才豺狼醜類寒耕熱耨不勵力於田疇媮食靡衣務偷生於剽奪結連凶黨驅迫平人始擾害於里閭遂侵凌於郡邑屬以藩臣不武戎士貪財徒加討逐之名實作遷延之役致令滋蔓累有邀求聖上愛育情深含𢎞道廣指萬方而罪已用百姓以為心假以節旄委之藩鎮冀其悛革免困疲羸而殊無犬馬之誠但恣蟲蛇之毒䖍劉我征鎮覆沒我京都凌辱我衣冠屠殘我士庶視人命有同於草芥謂大寶易取如奕棋而乃竊據宫闈偽稱名號爛羊頭而拜爵續狗尾以命官燕巢幙以誇安魚在鼎而猶戲殊不知五侯抑怒期分項羽之屍四塚既成待𦵏蚩尤之骨猶復廣侵田宅濫蓄貨財茫茫赤縣僅同夷貉之鄉惴惴黔黎若在狴犴之内固以人神共怒行路傷心畋謬領藩垣榮兼将相每枕戈而待旦嘗泣血以忘飱誓與義士忠臣共翦狐鳴狗盜近承詔命會合諸軍皇帝親御六師即離三蜀霜戈萬隊鐵馬千羣雕虎嘯以風生應龍驤而雲起淮南髙相公會闗東諸道百萬雄師計以夏初會於闗内畋與涇原節度使程宗楚秦州節度使仇公遇等已驅組練大集闗畿爭麾隴上之蛇矛待掃闗中之蟻聚而吐蕃黨項以久濡皇化深憤國讐願以沙漠之軍共獻盪平之捷此際華戎合勢藩鎮連衡旌旗煥爛於雲霞劍㦸晶熒於霜雪莫不持繩待試賈勇争先思垂竹帛之功誓雪朝廷之恥矧兹殘孽不足殄滅况諸道世受國恩身膺好爵皆貯興邦之略咸傾致主之誠自函雒搆氛鑾輿避狄莫不指銅駞而眥裂望玉壘以魂消聞此勤王固宜投袂更希憤激速殄冦讐永圖社稷之勲以報君親之徳迎鑾返正豈不休哉時駕在坤維音驛阻絶以為朝廷無能復振及畋𫝊檄而諸藩聳動各治勤王之師巢賊聞之懼自是賊騎不過東西當時非畋扼賊之衝褒蜀危矣樂彦禎鎮魏博時甚有軍政好延儒術之士有公乗億李山甫者當時之英彦也皆置於幕下襄王煴偽為監國太原汴州兩軍方盛慮窺伺河朔因欲與幽鎮歃血為連衡掎角之備乃致書諭兩鎮曰光啓三年正月五日魏博節度使開府儀同三司檢校司空同中書門下平章事樂彦禎謹齋戒三日致書於二鎮足下葢聞天生蒸民而樹之君以司牧百姓主握二柄禮樂征伐之所興勍冦奸雄之所懼是以大君有率臨之典羣后承専制之權内守憲章外憑教命其或大盜移國黎民墜塗身居戎閫之榮手綰兵符之重傍觀喪亂坐俟危亡既虧社稷之謀又失子孫之計此亦義夫之所慷慨烈士之所咄嗟敢以狂愚伏陳英悟伏以我國家啓運開國承家創基三百春秋億兆臣妾自羣兇蟻聚中㝢土分乗輿奔走於道途宗廟荒凉於草莽今者監國雖立朝綱已頽皇祚莫知其所安蒼生莫知其所訴天子之威不能加四海諸侯之力不能保一方弱者危而强者吞雄則飛而雌則伏竟亦身殞名滅國家破離咸有其繇取鑒非逺大約以諸藩捨本就末忘義背盟謀不相從言不相信國是以間敵繇此興與其俱亡曷若共霸論桓文之事則人未敢先為魯衛之邦則誰為不可是以研詳典故揆度事機輒敢指陳庶裨權略今者秦宗權起於纎蠧漸恣狂鋒南苞荆襄北跨河雒屠城拔邑暴物害人使父子不得相全夫妻不得相保血肉塗地荆榛蔽天不織而衣人之衣不耕而食人之食凶酷之甚古今所無竊據要津下視諸鎮而又河東軍擁旄重地受國深恩稔宴安以未移縱貪婪而不息奄有上黨又吞覃懷張皇威聲凌脅蕃屛皆蓄併吞之志盡懷僭大之謀非謂未萌已觀成釁况孟津之衆尋驗保姦汝水之戎果明濟惡仍且海内皆困河南盡饑切料凶狂倍生窺顧若不早為之計必慮悔不可追非宜坐以俟危拱而受制或一隅失所則諸鎮可虞唇既亡而齒必寒皮不存而毛安附欲從事始先度禍胎将去本根要傾巢窟况大河之内常山之陽東極海隅北亘蕃部奥壤如砥列城似林億萬衆之甲兵百千羣之鐵馬建牙樹屏仗鉞分麾周封者盡是賢侯漢拜者莫非名将彼唱此和連衡合從豈能西不如太原南不如蔡賊非惟可恥誠亦堪悲蓋繇久屬昇平素無交結慮為姦人鬭謀或致鄰道猜嫌思我同心共為永計今請常山太尉幽州司空荆州司空滄州留守常侍各命至親兒姪或弟兄二人擇地築壇卜日赴會嚴修齋戒䖍告神祗歃血誓詞藏之盟府然後以兹五鎮共為一家有事則同謀有征則同舉扶持王室掃盪賊臣收陷失之土疆開朝貢之道路其為大義莫尚於斯謹請當道李山甫判官奉書陳請呼天告盟指日為誓䖍聴明命以行壯圖社稷幸甚生靈幸甚時鎮州王鎔復書曰近承新使伏覩羽書側聆計國之規實激懦夫之志竊自運貽百六禍遍寰區羣盜薦興生靈無庇朝章國典誰為稟命之人黷武窮兵孰是勤王之旅咸以乗虚窺伺觀釁憑凌以掠奪為功以殺傷為務皇威所不能制天道所未能誅或徑越大河或竊居方鎮縱狼貪而未已畜虺性以難馴内雖以効順為名外皆以亂常無懼遂至跨州連郡十室九空良繇諸侯各固一方不思同力自致喪牛之悔久虧刑馬之盟近則方布腹心冀完虞虢今明公諭之以長策示之以壯圖結五鎮以齊盟俾一家而不異竊惟髙義實邁前修顧魯衛以同歡誠敦夙契在江黄而列會願接下風况當道處河朔之中最為唇齒據親睦之分寧異金蘭固當顒俟捧盤無渝匪石然以事闗久逺議非一方必决定否臧審其同異待鄰藩符會則决副相蹤後唐魏王繼岌莊宗同光三年為都統西討西川軍至鳳翔馳檄喻蜀郡曰捨過論功王者示好生之道轉禍為福聖人垂善變之文矧彼蜀民代承唐徳𤣥宗朝以兵興河塞久駐金鑾僖宗時以盜起中原曽停玉輅蜀之乃祖乃父或士或民而皆内稟忠貞外資驍果武負闗張之氣文𫝊揚馬之風迎大駕以涉岷峨合諸軍而定闗輔忠義冠乎日月勲業著乎山河凡在幽遐皆所𫝊達不幸龜龍忽去蛇豕尋生遇此匪人據斯重地蜀主先父出身陳許擁衆巴庸接王室之頻遷保邊隅而自大蓋屬昭宗皇帝方兹播越正切撫綏洗彼瑕疵潤之雨露綰紅斾碧幢之貴兼鳳池雞樹之榮狂兕逢山漸展横行之志鳴梟出穴曽無返哺之聲拔本塞源見利忘義加以結連同惡聚集羣凶當天步多艱莫展扶持之節及坤維暫絶却為僭偽之謀烈士聞之撫膺懦夫見之攘臂洎兹餘裔益奮殘妖閹豎擅權而勲賢結舌不稼不穡奢侈者何啻千門内淫外荒塗炭者已餘萬室而更納其短見侮我大朝輒横拒轍之臂擬舉投羅之翼我皇帝仰膺𤣥䜟再造皇圖四時順而玉燭明萬彚安而金繩正惟兹蜀土敢隔朝風連營虧恤養之恩比屋困煩苛之政每聞殘酷深所憫傷是命車徒以申弔伐步卒則矗如山列騎車則迅若雷奔振雄聲而聒動乾坤騰鋭氣而動揺河嶽彼若率兵赴死我則無陣不摧彼若據壘偷生我則無城不拔却慮髙低士庶逺近封巡不早迴翔終同覆滅故今曉示貴在保全應三川管内有以藩鎮降者即授之節度有以州郡降者即授之刺史有以鎮縣降者即付之主守有能見機知變誅斬偽命将帥以其藩鎮城池降者亦以其官授之如列陣交鋒之際有以萬人已上降者授之節度五千人已上授之大郡三千人已上授之次郡一千人已上授之主将有蜀城将校誅斬偽主首領降者授以方鎮如蜀主王衍首過自新以三川歸國即授之方面其同謀将校當加列爵有舊在本朝文武官或負罪流落在蜀者茍能率衆歸朝一切不問大軍所行之處不得焚燒廬舍剽掠馬牛所有降人倍加安撫所罪者一人僭偽所救者萬姓瘡痍况蜀主宗枝成都父老較其罪狀良可矜寛只如偽梁挾我皇威窺吾大寶為四十年之巨冦覆十九葉之丕基昨國家平定中原只誅元惡列藩牧伯咸不替移闔境生靈一無騷擾雖蜀中遐僻亦合𫝊聞各宜審計變通速謀歸向據兹事件得以旌酬勿謂無言竟貽後悔故兹示諭各宜知悉時排陣斬斫使康延孝将勁騎三千步兵萬人為前鋒招撫使李嚴與延孝同行散人齎檄以喻蜀部冊府元龜卷四百十六
