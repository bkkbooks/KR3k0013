body:
  text: 册府元龜卷九百五十二宋王欽若等撰總録部忌害交構交惡忌害行近於名藝放扵利近名則多忌放利則多害誠先民之共患也大道既隠推讓多缺至有處乎先則抑其後居乎下則攻其上忌兼容之戒起自私之謀患埒巳之寵惡髙衆之技讒之未勝則浸潤以取信力之不足則朋附以合勢造搆其端媒蘖成罪或縁疑似而成状或伺不意而竊發甚者至扵戕害次亦不免疏棄何長短相形髙下相傾而至扵是乎盖夫木秀於林風必摧之行髙扵人衆必非之良可以太息者已鮑牧國夏髙張皆齊大夫也齊景公尊穰苴爲大司馬已而鮑氏髙國之屬害之譛扵景公退穰苴苴發疾而死公叔魏武侯時尚公主爲相時吳起爲西河守甚有聲名公叔害吳起公叔之僕曰起易去也公叔曰奈何其僕曰吴起爲人節㢘而自喜名也君因先與武侯言曰夫吳起賢人也而侯之國小又與强秦壤界臣竊恐起之無留心也武侯即曰奈何君因謂武侯曰試延以公主起有留心則必受之無留心則必辭矣以此卜之君因召吳起而與歸即令公主怒而輕君吳起見公主之賤君也則必辭扵是吴起見公主之賤魏相果辭魏武侯武侯疑之而弗信也吳起懼得罪遂去即之楚李醯爲秦太醫令時扁鵲名聞天下過邯鄲聞貴婦人即爲帶下醫過雒陽聞周人愛老人即爲目耳痺醫来入咸陽聞秦人愛小児即為小兒醫隨俗為變醯自知技不如扁鵲也使人刺殺之龎㳙仕魏為恵王将軍初涓與孫臏俱學兵法涓既事魏恵王爲将軍而自以為能不及孫臏乃隂使召孫臏至涓恐其賢于已疾之則以法刑斷其兩足而黥之李斯楚上蔡人入秦爲廷尉斯與韓非俱事荀卿斯自以爲不如非非觀往者得失之變作孤憤五蠧人或傳其書至秦秦王見孤憤五蠧之書曰嗟乎寡人得見此人與之游死不恨矣斯曰此韓非之所著書也秦因急攻韓韓王始不用非及急乃遣非使秦秦王悦之未親信李斯姚賈害之毁之曰韓非韓之諸公子也今王欲并諸侯非終爲韓不為秦此人之情也今王不用久留而歸之此自遺患也不如以過法誅之秦王以爲然下吏治非李斯使人遺非藥使自殺韓非欲自陳不得見秦王後悔之使人赦之非已死矣蜀陳祗爲尚書令龎統子宏字巨卿剛簡有臧否輕傲扵祗為祗所抑卒扵涪陵太守晋馮紞得幸武帝爲左衛将軍承顏悦色寵愛日隆羊祜貞慤心無私疾惡邪佞紞與荀朂之徒甚忌之孔顥爲文帝相府叅軍魯國唐彬以州别駕奉使詣相府僚佐稱之於帝薦為掾屬帝問顥顥忌其能不答後辟爲鎧曹帝甚重之他日謂顥曰近見唐彬卿受蔽賢之責矣荀朂字公曽潁川人歴中書監張華将舉著作郎陳夀爲中書郎朂忌華而疾夀遂諷之部遷夀為長廣太守夀辭母老不就虞預爲著作郎時王隐撰晉史預亦私撰晉書而生長東南不知中朝事數訪于隐并借隐所著書竊寫之所聞漸廣是後更疾隠形扵言預既豪族交結權貴共爲朋黨以斥隠竟以謗免黜歸扵家宗澹為荆州别駕王敦使従事中郎郭舒守武昌澹忌舒才能數譛之扵王廙廙疑舒與甘卓同密以白敦敦不授髙官南齊王秀之爲隨王子隆長史子隆鎮荆州好辭賦數集僚友文學謝朓以文才尤被賞愛秀之以朓年少相動密以唘聞世祖勅曰侍讀虞雲自宜常應侍接朓可還都朓道中為詩寄西府曰常恐鷹隼擊秋菊委嚴霜寄言罻羅者寥廓已髙翔梁朱异為鎮軍時徐摛為太子家令應對眀敏髙祖甚加歎異更被親狎寵遇日隆异不恱謂所親曰徐叟出入兩宫漸来逼我須早爲之所遂承間白髙祖曰摛年老又愛泉石意在一郡以自怡養髙祖謂摛欲之乃召摛曰新安大好山水任昉等並經為之卿為我臥治此郡中大通三年遂出為新安太守後魏游雅性剛戅好自矜誕陵獵人物為秘書監因議論長短忿儒者陳奇遂陷竒至族議者深責之袁翻累遷都官尚書與范陽祖瑩位望通顯文筆之美見稱先逹以著作佐郎邢劭藻思華贍深共嫉之每雒中貴人拜職多憑劭為謝章表嘗有一貴勝初授官大事賓食翻與劭俱在坐翻意主人託其為讓表遂命劭作之翻甚不恱毎告人云邢家小児嘗傭作章表自買黄紙寫而送之劭恐為翻所害乃辭以疾許彦嘗師事王早眀隂陽尤善風角宣武甚喜之早苦以疾久乞歸郷里詔許之遂終扵家或言許彦以其術勝恐終妨巳故譎令歸耳北齊顔之推武成河清末領中書舍人帝甚加恩接顧遇逾厚為勲要者所嫉常欲害之隋蘇夔為大子洗馬以鍾律自命萬寳常妙達鍾律䕫尤忌之􅇪父威方用事凡言樂者皆附之而短寳常數詣公卿怨望蘇威因詰寳常所為何所傳受有一沙門謂寳常曰上雅好符瑞有言徵祥者上皆恱之先生當言從胡僧受學云是佛家菩薩所傳音律則上必恱先生所為可以行矣寳常然之遂如其言以答威威怒曰胡僧所傳乃是四夷之樂非中國所宜行也其事遂寝劉暉為太史令時張胄𤣥博學多通尤精術數冀州刺史趙炤薦之髙祖徵授雲騎尉直太史叅議律歴事時軰多出其下繇是暉等甚忌之然暉言多不中胄𤣥所推歩甚精宻帝異之令楊素與術數立議六十一事事皆舊法之難通者令暉與胄𤣥等辯析之暉杜口一無所答胄𤣥通者四五焉宇文述為左衛大将軍煬帝大業中與御史大夫裴蘊黄門侍郎裴矩等皆受詔叅軍選事多納賄賂士流嗟怨楊恭仁為吏部侍郎獨雅正自守不為蘊等所容繇是出為河南道大使討捕盗賊唐杜伏威與輔公祐少相愛狎公祐年長伏威每兄事之軍中咸呼為伯畏敬與伏威等伏威潜忌之偽署其養子闞稜為左将軍王雄誕為右将軍推公祐為僕射外示尊崇而隂奪其兵權公祐知其意怏怏不平乃與故人左遊仙僞學道辟榖以遠其事竇軌為益州刺史時韋仁夀為南寜州都督軌害其功託以蜀中山獠反叛未遑逺畧不時發遣經嵗餘仁夀卒温彦博為御史大夫李靖既擒突厥頡利可汗彦博害其功譛靖軍無綱紀致令虜中竒寳􅄆于亂兵之手太宗大加責讓靖頓首謝久之太宗謂云隋将史萬嵗破達頭可汗有功不賞以罪致戮朕則不然當赦公之罪録公之勲詔加左光禄大夫賜絹千疋置食邑通前五百戸未㡬太宗謂靖曰前有人䜛公今朕意已悟公勿以爲懐賜帛二千疋拜尚書右僕射李敬𤣥為中書舍人朱敬則以詞學擅名與左史江融尚書左僕射魏元忠特相友善咸亨中髙祖聞而召見與語甚奇之将加擢用為敬𤣥所毁遂授洹水尉劉栖楚為京兆尹有覬覦相位之意戸部侍郎崔元畧方在位次對又多逰裴度門栖楚恐礙巳以計摧之乃按舉山陵時錢物以汚之後唐周𤣥豹本燕人初為僧後歸俗天祐中馮道自劉守光府掾歸太原監軍使張承業重其文章履行甚見待遇時𤣥豹善人倫之鑒與道不合謂承業曰馮生無前程公不可過用管記廬質聞之曰我曽見杜黄裳司空冩真圖道之狀貌酷類焉将来必副大用𤣥豹之言不足信也承業尋薦為覇府從事叚􅆦為樞密承㫖時興唐尹張憲位望既髙郭崇韜将兵征蜀以手書告憲曰允中張憲字允中避事久矣余受命西征已奏還公黄閣憲報曰庖人之代尸祝所謂非吾事也時徊當權任事以憲従龍舊望不欲憲在朝廷㑹孟知祥鎮蜀川選北京留守徊揚言曰北門國家根本非重徳不可輕授今之取才非憲不可趨時者因附徊勢巧中傷之又曰憲有相業然國祚中興宰相在天子面前得失可以改作一方之事制在一人惟北面事重乃授憲銀青光禄大夫撿挍吏部尚書太原尹北京副留守知留守事交構䜛言亂國詩人之所惡見利忘義君子之不取戰國而下長是厲階莫不騁離堅合異之辯成以白爲黒之説是非紛揉邪正淆混惟聽覽之不至則禍亂之隨作繇是害賢蠧政交兵構難觸類而長不可徧舉得非稟邪沴之氣受隂狡之性狂簡日恣顛越無悔垂諸編簡貽誚於後者乎齊公孫閱見騶忌子以鼓琴見齊威王取相印封成侯後忌子與田忌不善閱謂成侯忌曰公何不謀伐魏田忌必将戰勝有功則公之謀中也戰不勝非前死則後北而命在公矣扵是成侯言扵威王起兵擊魏大敗之桂陵扵是齊最强扵諸侯自稱為王以令天下閱又謂成侯忌曰公何不令人操十金卜扵市曰我田忌之人也吾三戰而三勝聲威天下欲爲大事吉乎不吉乎卜者出因令人捕為之卜者騐其辭扵王之所田忌聞之因遂率其徒襲攻臨淄成侯不勝而出犇漢谷永為安定太守時帝諸舅皆脩經書任政事平阿侯譚年次當繼大将軍鳳輔政尤與永善陽朔中鳳薨鳳病困薦従弟御史大夫音以自代帝從之以音為大司馬車騎将軍領尚書事而平阿侯譚位特進領城門兵永聞之與譚書曰君侯躬周召之徳執管晏之操敬賢下士樂善不倦下胡亞切宜在上将久矣以大将軍在故抑鬱扵家不得舒憤今大将軍不幸早薨絫親疏序材䏻宜在君侯絫古累字累親疏謂積累其次而計之拜吏之日京師士大夫悵然失望此皆永等愚劣不能褒揚萬一言萬分之一屬聞以特進領城門兵属近也音之欲反是則車騎将軍秉政雍容扵内而至戚賢舅執管籥扵外也愚竊不爲君侯喜宜深辭職自陳淺薄不足以固城門之守収太伯之讓保謙謙之路太伯王季之兄也讓不為嗣而適吴越闔門髙枕為智者首願君侯博覽者叅之叅詳其事小子為君侯安此譚得其書大感遂辭讓不受領城門職由是譚音相與不平後漢陳珪為沛相初袁術遣韓裔以僣號事告吕布因求迎婦布遣女隨之珪恐術報布成姻則徐揚合從為難未已扵是珪說布曰曹公奉迎天子輔贊國政将軍宜與恊同策謀共存大計今與袁術結姻必受不義之名将有累卵之危矣布亦素怨術而女已在塗乃追還絶婚執裔送許曹操殺之珪欲使子登詣曹操布固不許㑹使至拜布爲左將軍布大喜即聽登行并令奉章謝恩登見曹操因陳布勇而無謀輕扵去就宜早圖之操曰布狼子野心誠難久養非卿莫究其情僞即増珪秩中二千石拜登廣陵太守臨别操執登手曰東方之事便以相付令隂合部衆以爲内應始布因登求徐州牧不得登還布怒㧞㦸斫杌曰卿父勸吾協同曹操絶婚公路今吾所求無獲而卿父子並顯重但為卿所賣耳登不為動容徐對之曰登見曹公言養将軍譬如養虎當飽其肉不飽則将食人公曰不如卿言如養鷹饑即爲用飽則颺去其言如此布意乃解魏楊脩與陳思王植為友時太祖遣太子及植各出鄴城一門密勅門不得出以觀其所爲太子至門不得出而還脩先戒植若門不出侯侯受王命可斬守者植従之故脩遂以交搆賜死晉李含為河間王顒長史顒殺前安西叅軍夏侯奭送齊王冏使與趙王倫遣張方率衆赴倫皆其謀也後顒聞三王兵盛乃加􅅤龍驤将軍統督䕶席薳等鐵騎廻遣張方軍以應義師天子反正含至潼關而還初梁州刺史皇甫商為趙王倫所任倫敗去職詣顒顒慰撫之甚厚含諌顒曰商倫之信臣懼罪至此不宜數與相見商知而恨之及商當還都顒置酒餞行商因與含忿争顒和釋之後含被徵為翊軍校尉時商叅齊王冏軍事而夏侯奭兄在冏府稱奭立義被西藩枉害含心不自安冏右司馬趙驤又與含有隙冏将閱武含懼驤因兵討之乃單馬出奔扵顒矯稱受宻詔顒即夜見之乃説顒曰成都王至親有大功還藩甚得衆心齊王越親而専執威權朝廷側目今檄長沙王令討齊使先聞扵齊齊必誅長沙因傳檄以加罪則冏可擒也既去齊立成都除逼建親以安社稷大勲也顒従之遂表請討冏拜含為都督統張方等率諸軍以向雒陽含屯隂盤而長沙王乂誅冏含等旋師初含之本謀欲并去乂冏使權歸扵顒含因得肆其宿志既長沙勝齊顒潁猶各守藩志望未允顒表含爲河南尹時商復被乂任遇商兄重時為秦州刺史含疾商滋甚復與重搆隙顒自含奔還之後委以心膂復慮重襲已乃使兵圍之更相表罪侍中馮蓀黨顒請詔重還商說又曰河間之奏皆李含所交搆也若不早圖禍将至矣且河間前舉繇含之謀乂乃殺含郭猗為劉聰中宫僕射劉聰以弟乂為皇太弟猗等皆寵幸用事靳凖合宗内外諂以事之郭猗有憾扵劉乂謂聰子粲曰太弟扵主上之世猶懐不逞之志此則殿下父子之深仇四海蒼生之重怨也而主上過垂寛仁猶不替二尊之位一旦有風塵之變臣竊為殿下寒心且殿下髙祖之世孫主上之嫡統凡在含齒孰不係仰萬機事大何可與人臣昨聞太弟與大将軍相見極有言矣若事成許以主上為太上皇大将軍為皇太子乂又許衛君為大單于二王已許之矣二王居不疑之地並握重兵以此舉事事何不成臣謂二王茲舉禽獸之不若也背父親人人豈親之今又茍貪其一切之力耳事成之後主上豈有全理殿下兄弟故在忘言東宫相國單于在武陵兄弟何肯與人許以三月上巳因讌作難事淹變生宜早爲之所春秋傳曰蔓草猶不可除况君之寵弟乎臣屢唘主上主上性敦友于謂臣言不實刑臣刀鋸之餘而䝉主上殿下成造之恩故不慮逆鱗之誅每所聞必言冀垂採納臣當入言之願殿下不泄密表其状也若不信臣言可呼大將軍従事中郎王皮衛軍司馬劉惇假之恩顧通其歸善之路以問之必可知也粲深然之猗密謂皮惇曰二王逆状主相巳具知之矣卿同之乎二人驚曰無之猗曰此事必無疑吾憐卿親舊并見族耳於是歔欷流涕皮惇大懼叩頭求哀猗曰吾爲卿作計卿能用不二人皆曰謹奉大人之教猗曰相國必問卿卿但云有之若責卿何不先唘卿即答曰臣誠負死罪然仰惟主上聖性寛慈殿下篤扵骨肉恐言成詿偽故也皮惇許諾粲俄而召問二人至不同時而辭若畫一粲以為信然初靳凖從妹為乂孺子滛扵侍人乂怒殺之而屢以嘲凖凖深慙恚説粲曰東宫萬機之副殿下宜自居之以領相國使天下知早有所繫望也至是凖又說粲曰昔孝成距子政之言使王氏卒成簒逆可乎粲曰何可之有凖曰然誠如聖㫖下官亟欲有所言矣但以徳非更生親非皇宗恐忠言暫出霜威已及故不敢耳粲曰若但言之凖曰聞風塵之言謂大将軍衛将軍及左右輔皆謀奉太弟尅季春搆變殿下宜為之備不然恐有商臣之禍粲曰為之奈何凖曰主上愛信扵太弟恐卒聞未必信也如下官愚意宜緩東宫之禁固勿絶太弟賔客使輕薄之徒得與交遊太弟既素好待士必不思防此嫌輕薄小人不能無逆意以觀太弟之心小人有始無終不能如貫髙之流也然後下官為殿下露表其罪殿下與太宰拘太弟所與交通者考問之窮其事原主上必以無将之罪罪之不然今朝望多歸太弟主上一旦晏駕恐殿下不得立矣扵是粲命卜抽引兵去東宫後遂廢乂宋劉湛為太子詹事殷景仁遷尚書僕射湛代為領軍與景仁素善皆被遇扵髙祖俱以宰相許之湛尚居外任㑹王宏華曇首相繼亡景仁引湛還朝共叅政事湛既入以景仁位遇本不踰巳而一旦居前意甚憤憤知文帝信仗景仁不可移奪乃深結司徒彭城王義康欲倚宰相之重以傾之元嘉十二年景仁復遷中書令䕶軍将軍僕射如故尋復以僕射領吏部䕶軍如故湛愈忿怒義康納湛言毁景仁於文帝文帝遇之益隆景仁對親舊歎曰引之令入入便噬人乃稱疾解職表疏累上不見許使停家養病發詔遣黄門侍郎省疾湛議遣人若刼盜者于外殿殺之以爲太祖雖知當不能傷至親之愛帝㣲聞之遷景仁扵西掖門外晉鄱陽主第以爲䕶軍府密邇宫禁故其計不行湛初入朝委任甚重日夕引接恩禮綢繆及晩節驅煽義康凌轢朝廷帝意雖内離而接遇不改景仁卧疾者五年収湛之日景仁使拂拭衣冠寝疾既久左右皆不曉其意其夜上出華林園延賢堂召之景仁猶稱脚疾小床輿以就坐誅討處分一皆委之謝靈運為太子左衛率廬陵王義真少好文籍與靈運情欵異常少帝即位權在大臣靈運搆煽異同非毁執政司徒徐羡之等患之出為永嘉太守唐武昭者本陳留人性險誕元和中王師討淮西以䇿謁丞相裴度及度都督軍因得署軍職至郾城又遣昭使蔡冦懼之以兵而昭神色不變益竒之後至太原奏為石州刺史無何昭除王府官以地􅄆鬱悒日與李渉茅彚在長安中以義俠相許是時宰臣李逄吉李程不協而此軰皆乗隙集已𤣥逰其門李仍叔素依附李程知昭不得志易以鼓怨亦誑昭云程欲與昭官爲逄吉所阻昭果恨怒與劉審及張少騰潛說謀害逢吉之計後審乃以昭之言告扵張權輿權輿遂告逄吉召審求其状因令茅彚致昭到所居之第深相結納而疑怨之意並息居數月少騰漏扵再榮再榮遂以状密告因成其獄李仲言於逄吉為近從子當此際亦欲助逢吉以傾程乃隂戒茅彚曰言武昭與李程同謀則活否則死彚曰寃死甘心誣人以自免所不為也初逄吉之遇茅彚甚厚嘗與彚書云足下當字僕曰自求僕字足下曰利見文字徃復畧無虚日其間叅謀議之密受金帛之賜不宜示扵衆者近十餘幅異哉逄吉與程俱在相位而日與闒茸微類如此欵密既眀具詞皆牽連天下之人無不指笑晉孟承誨為閤門副使累遷宣徽使官至撿挍司空太府卿右武衛大将軍少帝嗣位以植性纎巧善扵希㫖復與權臣宦官密相表裏凡朝廷恩澤美使必承誨為之漢髙從誨為荆南節度使乾祐元年遣人押送朗州馬希蕚奏事官沈從進至京師乞加恩命希蕚初與潭州馬希廣争立希廣用歐𢎞練張仲荀謀厚賂朝廷請不行朗州恩命及從誨革面自新又援引希蕚求通扵朝葢欲離間潭郎成其覆亡之禍也朝廷知其意累降詔示諭又詔希蕚希廣和解之又云乾祐三年湖南馬希廣上言臣當道去九月内量發兵士往朗州招安戸民不料偶失威嚴遂中姦便須謀補卒爰議班師朗州自聞當道抽退已来狂謀益甚又探得荆南繼差人下淮南與廣州三處結構荆南欲取澧朗州廣南攻桂州淮南欲取湖南兼即日淮南支鄂州管内租税衷私令荆南供給朗州且如山結連可知事勢其朗州已入附扵淮甸又納欵扵荆南興破家亡國之心作𤓰剖豆分之勢兼誘草賊燒却近封顧基扄而危若綴旒視黎庶而困於塗地弦衰柱促言發涕流伏乞聖慈念以臣四世勤王三面受敵欲興師旅動礙冦讎望特降絲綸聊差貔虎亦知朝廷北面托落分兵處多故不敢大段撓於兵力只乞差借許蔡卿軍三五千人馬一千騎内得王師二千来人夾帶南渡只到澧州屯駐以斷淮南與荆南援助之路不勞血刅只仗朝廷則當道出兵不難尅復安危繫慮翰墨難窮庶囘雷電之光以救盪平之揵謹差押衙焦文諌馳奏披瀝以聞後贊爲飛龍使乾祐末宰相楊邠侍衛親軍使史宏肇執權贊以久次未遷頗懐怨望乃與樞密承㫖聶文進等搆變及難作贊與同黨更侍帝側剖判戎事且防間言北郊兵敗贊竄歸兖州慕容彦超執之以獻有司鞫贊伏罪周太祖命誅之周齊蔵珍行濠州刺史及張永徳與李重進互有間言蔵珍亦嘗游說扵重進洎夀陽兵囘諸将中有以蔵珍之言上奏者世宗怒因急召赴闕至是以其冐稱撿挍官因以斃之葢不欲暴其惡跡也交惡夫良士之入官也故當秉至公之誠蘊好賢之志同享君禄共熈庶政而悖之者交懐忌前之心惟圖自安之計以巳長而格物或素貴而驕人戾其情好發彼隂伏論交既定因賄財而輕絶位在巳上乃讒搆而被絀豈惟小人之逞志信乃有國之不幸秦誓曰人之有技􅎱疾以惡之人之彦聖而違之俾不通遠哉斯言可以戒也魯季桓子嬖臣曰仲梁懐與陽虎有隙陽虎欲逐懐公山不狃止之不狃為季氏宰其後懐益驕陽虎執懐桓子怒陽虎因囚桓子與盟而釋之陽虎繇此益輕季氏漢爰盎爲吳相王厚遇盎盎素不好晁錯錯所居坐盎輙避盎所居坐錯亦避兩人未嘗同堂語朱買臣爲丞相長史張湯為御史大夫始買臣與嚴助俱侍中貴用事湯尚為小吏趨走買臣等前後湯以廷尉治淮南獄排陷嚴助買臣怨湯及買臣為長史湯數行丞相事知買臣素貴故陵折之買臣見湯坐床上弗為禮言不動容以禮之也為音于偽切買臣怨常欲死之致死以害之後遂告湯隂事湯自殺帝亦誅買臣戴長樂爲太僕而光禄勲楊惲性刻害好發人隂伏同位有忤巳者必欲害之以其能髙人繇是多怨於朝廷與長樂相失惲卒以是敗卒終也後漢孔融為少府時曹公忌融御史大夫山陽郗慮字鴻豫少受學于鄭𤣥獻帝常時見慮融問融曰鴻豫何優長融曰可與適道未可與權慮舉笏曰融昔宰北海政散人離其權安在遂與融互相長短以至不睦曹操以書和解之許劭字子将汝南平輿人為郡功曹邵邑人李逵壯直有髙氣劭初善之而後為隙又與從兄靖不睦時議以此少之魏徐宣廣陵人也與同郡陳矯並為綱紀二人齊名而私好不恊孫禮涿郡人位至司空與盧毓同郡時軰而情好不睦為人雖互有長短然名位畧齊盧毓為僕射典選舉疾病遜位為司空薨蜀楊儀為尚書先主稱尊號東征吳儀與尚書令劉巴不睦左遷遥署𢎞農太守吳孫綝輔政遷大将軍初孫峻從弟慮與誅諸葛恪之謀峻厚之至右将軍無難督受節葢平九官之事綝遇慮薄扵峻時慮怒與将軍王惇謀殺綝綝殺惇慮服藥死晉牽秀累遷司空從事中郎與帝舅王愷素相輕侮愷諷司𨽻荀愷奏秀夜在道中載髙平國守士田興妻秀即表訴被誣論愷穢行文辭亢厲以譏詆外戚於時朝臣雖多證眀其行而秀盛名美譽繇是而損遂坐免官王羲之為㑹稽内史時驃騎將軍王述少有美譽與羲之齊名而羲之甚輕之繇是情好不協述先為㑹稽以母喪居郡境羲之代述止一弔遂不重詣述每聞角聲謂羲之當候已輙灑掃而待之如此者累年而羲之竟不顧述深以為恨及述為楊州刺史将就徵周行郡界而不過羲之臨發一别而去先是羲之嘗謂賓友曰懐祖正當作尚書耳懐祖述字投老可得僕射更求㑹稽便自邈然及述䝉顯授羲之恥為之下遣使詣朝廷求分㑹稽為越州行人失辭大為時賢所􅀏既而内懐愧歎謂其諸子曰吾不减懐祖而位遇懸邈當繇汝等不及坦之故耶前秦王猛苻堅時為司徒録尚書事親寵愈密朝政莫不繇之特進樊世氐豪也有大勲於苻氏負氣倨傲衆辱猛曰吾軰與先帝共興事業而不預時權君無汗馬之勞何敢專管大任是爲我耕稼而君食之乎猛曰方當使君爲宰夫城門不爾者終不䖏扵世也猛言之於堅堅怒曰必須殺此老氐然後百僚可整俄而世入言事堅謂猛曰吾欲以楊璧尚主璧何如人也世勃然曰楊璧臣之婿也婿已久定陛下安得令之尚主乎猛讓世曰陛下帝有海内而君敢競婚是爲二天子安有上下丗怒起将擊猛左右止之世遂醜言大罵堅因此發怒命斬之扵西廐自是公卿以下無不憚猛焉宋劉瑀為左衛将軍年位本在何偃前孝武初偃為吏部尚書瑀圖侍中不得與偃同從郊祀時偃乗車在前瑀䇿駟居後相去數十􅇍瑀蹋馬及之謂偃曰君轡何疾偃曰牛駿馭精所以疾耳偃曰君馬何遲曰騏驥罹扵覊絆所以居後偃曰何不着鞭使致千里答曰一蹙自造青雲何至與駑馬争路然甚不得意謂所親曰人仕宦不出當入不入當出安能長居戸限上因求益州及行甚不得意顔師伯爲尚書僕射時廢帝失徳與尚書令栁元景潛謀廢立初師伯専斷朝事時沈慶之亦預朝政而師伯不與之叅懐謂令史曰沈公爪牙者耳安䏻預政事慶之聞而切齒乃洩其謀尋伏誅南齊桓僖伯爲直閣将軍與王文和俱任頗以勢凌之後出爲巴西梓潼二郡太守時文和為益州刺史謂僖伯曰每憶昔日俱在閤下卿時視我如我今日見卿因誣其罪馳信唘之入輙遣蕭寅代僖伯為郡僖伯亦别遣唘臺閉門待報寅以兵圍之齊眀帝輔政知其無罪不欲乖文和乃勅僖伯解郡還為寅軍所攝束手受害梁謝超宗為義興太守王瑩代超宗超宗去郡與瑩交惡既還間瑩於其父懋懋言之於朝廷以瑩供養不足坐失郡廢棄久之後魏于烈宣武帝時為領軍將軍咸陽王禧惡其剛直出爲恒州刺史烈不願藩牧頻表乞停輙優答弗許烈乃謂彭城王勰曰殿下忘先帝南陽之詔乎而逼老夫乃至扵此遂以疾固辭袁翻字景翔陳郡項人也父宣有才筆為宋青州刺史沈文秀府主簿皇興中東陽平隨文秀入國而大将軍劉昶每提引之言是其外祖淑之近親令與其府諮議叅軍袁濟為宗宣時孤寒甚相依附及翻兄弟官顯與濟子洸演遂各陵競洸等乃經公府以相排斥房法夀初爲清河太守王𤣥邈司馬起兵討崔道固及道固歸宋乃罷兵道固慮法夀扇亂百姓遂切遣之而法夀外託裝而内不欲行㑹從弟崇吉在升城為慕容白曜所破母妻沒於白曜軍崇吉還舊宅法夀與崇吉年志粗相諧協而親則從祖兄弟也崇吉以母妻見獲託法夀為計法夀既不欲南行恨道固逼切又矜崇吉情理時道固以兼治中房靈賔督清河廣川郡事戍盤陽法夀遂與崇吉潛謀襲靈賔克之仍歸欵于白曜以贖母妻白曜遣將軍長孫觀等自大山南入馬耳闗以赴盤陽還崇吉母妻北齊魏收爲中書監孝昭皇建元年除兼侍中右光禄大夫仍儀同監史收先副王昕使梁不相協睦時昕弟晞親密而孝昭别令陽休之兼中書在晉陽典詔誥收留在鄴盖晞所爲收大不平謂太子舍人盧詢祖曰若使卿作文誥我亦不言及除祖珽爲著作郎欲以代收司空主簿李翥文詞士也聞而告人曰詔誥悉歸陽子烈著作復遣祖孝徵文史頓失恐魏公發背劉逖武成時爲儀同三司武成殂出為江州刺史祖珽執政徙爲仁州刺史祖珽既出徵逖待詔文林館初逖與珽以文義相得結雷陳之契又爲弟俊娉珽之女珽之将免彦深等也先以造逖仍付密唘令其奏聞彦深等頗知之先自申理珽繇此疑逖告其所為及珽被出逖遂遣弟離婚其輕交易絶如此隋李渾字金才太師郕國公穆第十子初以國賦之半許其妻兄宇文述得奉穆嗣二嵗之後不以俸物與述述大恚之因醉乃謂其友人于象賢曰我竟為金才所賣死且不忘渾亦知其言繇是有隙唐楊纂貞觀中為吏部侍郎副特進蕭瑀為河東道廵察大使與瑀不恊屢相表奏瑀因以䕶罪纂拜尚書右丞崔隠甫為河南尹張說為相素與崔日知友善說薦之奏請授御史大夫𤣥宗不許遂以為左羽林衛大将軍而以隠甫爲御史大夫隠甫繇是與說不恊吳通𤣥貞元初召充翰林學士遷起居舎人知制誥與陸贄吉中孚韋執誼等同視草陸贄富詞藝時承徳宗重顧經厯艱難通𤣥弟兄又以東宫侍上繇是争寵頗相嫌恨贄性􅄶急屡於上前短通𤣥又言承平時工藝書􅀞之徒待詔翰林比無學士祗自至徳後天子召集賢學士于禁中草書詔因在翰林院待進止遂以爲名奔播之時道途或預除改權令草制今四方無事百揆時序制書職分宜歸中書舍人學士之名理須停寢贄以通𤣥援引朋黨扵禁中協力排巳故欲廢之徳宗不許㑹贄權知兵部侍郎知貢舉乃正拜之罷内職皆通𤣥譛之後唐郭崇韜與馬紹宏同為内職及荘宗即位崇韜以紹宏素在巳上舊人准制即奏澤潞監軍張居翰同掌樞密以紹宏為宣徽使紹宏大失所望泣涕憤欎崇韜乃置内勾使應三司財賦皆令勾覆令紹宏領之冀塞其心紹宏怏恨不已聶嶼爲鄴都留守判官與吕敬怡吕夢竒不足又改河東節判及至嘗鄙其土風薄其人士或達扵安重誨值敬怡入司密勿與夢竒同搆殺之周李温羙爲衛尉少卿廣順三年七月責授房州司戸叅軍温羙家在青州夀光縣先充祭海使便道歸家其家人與本縣主稅吏馮繼勲交惡温美具事條白節度使苻彦卿言商税不公請下獄鞫劾繼勲又言温美私過彦卿具奏及温美下臺推劾伏罪馮繼勲配流環州温美貶房陵册府元龜卷九百五十二
