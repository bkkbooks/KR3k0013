body:
  text: 册府元龜卷七百四十一宋王欽若等撰陪臣部規諌第二老古晉之農夫也晉文公逐麋而失之問老古曰吾麋何在老古以足指曰如是往公曰寡人問子子以足指何也老古振衣而起曰壹不意人君如此也虎豹之居也厭閒而近人故得魚鱉之居也厭深而之淺故得諸侯厭衆而亡其國詩曰維鵲有巢維鳩居之君故不歸人將居之於是文公恐歸遇欒武子欒武子曰獵得獸乎而有悅色文公曰寡人逐麋而失之得善言故有悅色欒武子曰其子安在曰吾未與來也欒武子曰處上位而不恤其下驕也緩令急誅暴也取人之言而棄其身盗也文公曰善還載老古與俱歸子上楚令尹也楚成王將以商臣為太子訪諸子上子上曰君之齒未也齒年也言尚少而又多愛黜乃亂也楚國之舉常在少者舉立也且是人也蠭目而豺聲忍人也能忍行不義不可立也弗聽樂豫宋大夫也宋昭公將去群公子樂豫曰不可公族公室之枝葉也若去之則本根無所庇廕矣葛藟猶能庇其本根葛之能藟蔓繁滋者以本枝廕庇之多故君子以為比謂詩人取以喻九族兄弟况國君乎此諺所謂庇焉而縱尋斧焉者也縱放也必不可君其圖之親之以德皆股肱也誰敢擕貳若之何去之不聽穆襄之族率國人以攻公穆公襄公之子孫昭公所欲去者殺公孫固公鄭於公宫二子在公宫故為亂兵所殺六卿和公室叔仲惠伯魯大夫也穆伯公孫敖也如莒莅盟且為襄仲逆女見之美自娶之仲請攻之公將許之惠伯諫曰臣聞之兵作於内為亂於外為冦冦猶及人亂自及也今臣作亂而不禁以啓冦讎若之何公止之惠伯成之平二子使仲舎之舎不娶公孫敖反之還莒女復為兄弟如初從之士季晉大夫隨㑹也晉靈公不君宰夫胹熊蹯不熟殺之𡨕諸畚使婦人載以過朝畚以草索為之菅屬趙盾士季見其手問其故而患之將諌士季曰諌而不入則莫之繼也㑹請先不入則子繼之三進及溜而後視之士季隨㑹也三進伏公不省又前也公知欲諌故佯不見曰吾知所過矣將改之稽首而對曰人誰無過過而能改善莫大焉詩曰靡不有初鮮克有終夫如是則能補過者鮮矣君能有終則社稷之固也豈惟群臣頼之又曰衮職有闕惟仲山甫補之能補過也衮君之上服闕過也言服衮者有過則惟仲山甫能之君能補過衮不廢矣常服衮也孫息晉大夫也晉靈公造九層臺費用千億謂左右曰敢有諌者斬孫息求見靈公張弩持矢見之謂之曰子欲諌邪孫息曰臣不敢諌也臣能累十二博棊加九雞子於其上公曰吾未嘗見也子為寡人作孫息即正顔色定志意以棊子置下雞子置其上左右慴息靈公曰危哉孫息曰復有危於此者公曰願復見之息曰九層之臺三年不成男不得耕女不得織國用空虚户口减少吏人叛亡隣國謀議將興兵公乃壞臺一云晉平公為九層之臺又曰叔向見司馬侯之子撫而泣曰自其父之死吾蔑與事君矣昔者其父始之我終之我始之夫子終之無不可者是女齊事君必有規諌必諌作臺洩冶陳大夫也陳靈公與孔寧儀行父通於夏姬皆𠂻其衵服以戲於朝二子陳卿夏姬鄭穆公女陳大夫御叔妻𠂻懷也衵服近身衣洩冶諌曰公卿宣滛民無效焉宣示也且聞不令君其納之納藏衵服公曰吾能改矣公告二子二子請殺之公弗禁遂殺洩冶蘇從楚大夫也楚莊王侣即位三年不出號令日夜為樂令國中曰有敢諌者死無赦伍舉入諌莊王左抱鄭姬右抱越女在鍾皷之間伍舉曰願有進隱隱謂隱藏之意曰有鳥在於阜三年不蜚不鳴是何鳥也莊王曰三年不蜚蜚將冲天三年不鳴鳴將驚人舉退矣吾知之矣數月滛益甚蘇從乃入諌王曰若不聞令乎對曰殺身以明君臣之願也於是罷滛樂聽政所誅者數百人所進者數百人任伍舉蘇從以政國人大說一云楚莊王莅政三年不治社稷危國將亡士慶問左右羣臣曰王莅事政三年不治而好隱戲社稷危國將亡胡不入諌左右曰子其入士慶入再拜而進隱曰有大鳥來上南山之陽三年不蜚不鳴不審其故何也王曰子其去矣寡人知之矣士慶曰臣言亦死不言亦死愿聞其說王曰此鳥不蜚以長羽翼不鳴以觀群臣之慝是鳥雖不蜚蜚必冲天雖不鳴鳴必驚人士慶稽首曰所愿聞已王大說士慶之問而拜之以為令尹授之相印申叔時楚大夫也楚莊王為陳夏氏亂故伐陳夏姬子徵舒弑靈公謂陳人無動將討於少西氏少西徵舒之祖子夏之名遂入陳殺夏徵舒轘諸栗門轘車裂也栗門陳城門因縣陳城陳以為楚縣申叔時使於齊反復命而退王使讓之曰夏徵舒為不道殺其君寡人以諸侯討而戮之諸侯縣公皆慶寡人楚縣大夫皆僭稱公女獨不慶寡人何故對曰猶可辭乎王曰可哉曰夏徵舒弑其君其罪大矣討而戮之君之義也抑人亦有言曰牽牛以蹊人之田抑詞也蹊徑也而奪之牛牽牛以蹊者信有罪矣而奪之牛罰已重矣諸侯之從也曰討有罪也今縣陳貪其富也以討召諸侯而以貪歸之無乃不可乎王曰善哉吾未之聞也反之可乎對曰可哉吾儕小人所謂取諸其懐而與之也叔時謙言小人意淺謂譬如取人物於其懷而還之為愈於不還乃復封陳鄉取一人焉以歸謂之夏州申公巫臣楚大夫也楚莊王討陳夏氏欲納夏姬巫臣曰不可君召諸侯以討罪也今納夏姬貪其色也貪色為滛滛為大罰周書曰明徳愼罰文王所以造周也明徳務崇之之謂也愼罰務去之之謂也若興諸侯以取大罰非愼之也君其圖之王乃止孫叔敖楚令尹也楚莊王將興師伐晉告士大夫曰有敢諌者至死無赦孫叔敖曰臣聞畏鞭箠之嚴而不敢諌其父非孝子也懼鈇鉞之誅而不敢諌其君非忠臣也於是遂進諌曰臣園中有榆其上有蟬蟬方奮翼悲鳴欲飲清露不知螳螂之在後曲其頸欲攫而食之也螳螂方欲食蟬而又不知黄雀在後舉其頸欲噣而食之也黄雀方欲食螳螂不知童子挾彈丸在榆下迎而欲彈之童子方欲彈黄雀不知前有深坑後有掘也此皆言前之利而不顧後害者也又莊王問叔敖曰寡人未得所以為國是也孫叔敖曰國之有是衆非之所惡也臣恐王之不能定也王曰不定獨在君乎亦在臣乎孫叔敖曰國君驕士曰士非我無道安富士驕君曰國非士無道安強人君或至失國而不悟士或至饑而不進君臣不合國是無道定矣夏桀殷紂不定國是而以合其取舎者為是以為不合其取舎者為非故致亡而不知莊王曰善哉願相國與諸侯士大夫共定國是寡人豈敢以褊國驕士民哉田賛衣儒衣而見荆王楚莊王也荆王曰先生之衣何其惡也田賛對曰衣又有惡於此者荆王曰可得而聞耶對曰甲惡於此王曰何謂也對曰冬日則寒夏日則熱衣無惡於甲者也賛也貧故衣惡也今大王萬乘之主也富厚無適而好衣人以甲臣竊為大王不取也意者為其義邪甲者兵之事折人之首刳人之腹墮人城郭係人子女其名尤甚不榮意者為其貴邪茍慮害人人必慮害之茍慮危人人亦必慮危之其貴人甚不安之二者為大王無取焉荆王無以應也詹何楚人也楚莊王問詹何曰治國柰何對曰何明於治身而不明於治國楚王曰寡人得立宗廟社稷願學所以守之詹何對曰臣未聞身治而國亂者也亦未嘗聞身亂而國治者也故本在於身不敢對以末楚王曰善優孟楚之樂人也嘗以談笑諷諌楚莊王有愛馬衣以文繡置之華屋之下席以露牀㗖以棗脯馬病肥死使群臣䘮之欲以棺槨大夫禮葬之左右争之以為不可王下令曰有敢以馬諌者罪至死優孟聞之入殿門仰天大哭王驚而問其故優孟曰馬者王所愛也以楚國堂堂之大何求不得而以大夫禮葬之薄請以人君禮葬之王曰何如對曰臣請雕玉為棺文梓為槨楩楓豫章為題湊以木累棺外木頭皆内向故曰題湊發甲卒為穿壙老弱負土齊趙陪位於前韓魏翼衞其後楚莊王時未有趙韓魏三國廟食大牢奉以萬户之邑諸侯聞之皆知大王賤人而貴馬也王曰寡人之過一至此乎為之柰何優孟曰請以大王六畜葬之以壠竈為棺銅厯為槨齎以薑棗薦以木蘭祭以糧稻衣以火光葬之於人腹腸於是王乃使以馬屬太官無令天下乆聞也士渥濁晉大夫士貞子也晉林父帥師與楚戰於泌晉師敗績晉師歸桓子林父也請死晉侯欲許之士貞子諌曰不可城濮之役晉師三日糓在僖二十八年文公猶有憂色左右曰有喜而憂如有憂而喜乎言憂喜失時公曰得臣猶在憂未歇也歇盡也困獸猶鬬况國相乎及楚殺子玉子玉得臣公喜而後可知也喜見於顔色曰莫余毒也已是晉再克而楚再敗也楚是以再世不競成王至穆王今天或者大警晉也警戒也而又殺林父以重楚勝其無乃乆不競乎林父之事君也進思盡忠退思補過社稷之衞也若之何殺之夫其敗也如日月之食焉何損於明晉侯使復其位伯宗晉大夫也楚子圍宋宋人使樂嬰齊告急於晉晉侯欲救之伯宗曰不可伯宗晉大夫古人有言曰雖鞭之長不及馬腹言非所繫天方授楚未可與争雖晉之強能違天乎諺曰高下在心度時制宜川澤納汙受汙濁山藪藏疾山之有林藪毒害者居之瑾瑜匿瑕匿亦藏也雖美玉之資亦或居藏瑕穢國君含垢忍垢耻天之道也晉侯恥不救宋故伯宗為説小惡而損大徳之喻君其待之待楚衰乃止里革魯太史克也魯宣公夏濫於泗淵濫漬也漬罟於泗水之淵以取魚泗在魯城北里革斷其罟而棄之罟網曰古者大寒降土蟄發降下也寒氣初下謂季冬建丑之月大寒之後也土蟄發謂孟春建寅之月令孟春蟄虫始震魚上氷獺祭魚水虞於是乎講罛罶取名魚登川禽而嘗之寢廟行諸國人助宣氣也水虞漁師也掌川澤之禁令講習也罛魚網罶笱也名魚大魚川禽鱉蜃之屬諸之也時陽氣起魚陟負氷故令國人所以助宣氣也月令季冬始魚乃嘗魚先薦寢廟鳥獸孕水虫成孕懷子謂春時獸虞於是乎禁罝羅矠魚鱉以為夏槁獸虞掌鳥獸之禁令罝兎罟羅鳥罟禁禁不得施矠槁乾也夏不得取於此時刺魚鱉以為夏儲助生阜也阜長也鳥獸方孕故取魚鱉助生物鳥獸成水蟲孕水虞於是乎禁罝䍡設穽鄂罝當為罜罝䍡小網穽坑也鄂作格所以誤獸也謂立夏鳥獸已成水虫懐孕之時禁魚鱉之網設取獸之物以實廟庖畜功用也以獸實宗廟庖㕑而長魚鱉畜四時功足國財用也且夫山不槎蘖槎斫也以株生曰蘖澤不伐夭草木未成曰夭魚禁鯤鮞鯤魚子鮞未成魚獸長麑䴠鹿子曰麑麋子曰䴠鳥翼鷇多翼成生哺曰鷇未乳曰多蟲舎蚳蝝蚳蟻子可以為醢蝝蝮蜪可食舍不取也蕃庻物也古之訓也蕃息今魚方别孕不教魚長又行網罟貪無藝也别别於雄而懷子藝極也公聞之曰吾過而里革正我不亦善乎是良罟也為我得法良善使有司藏之使吾無忘諗言見此罟則不忘里革言諗告也師存侍師樂師名存曰藏罟不如寘里革於側之不忘也寘置晉人殺厲公晉人欒書中行偃邉人以告邉人疆埸之司也成公在廟成公魯宣公之子墨肱公曰臣弑其君誰之過也大夫莫對里革曰君之過也夫君人者其威大矣君天也故其威大失威而至於弑其過多矣過不積不至於弑且夫君也者將牧民而正其邪者也若君縱私囘而棄民事囘邪民旁有慝無由省之慝惡省察益邪多矣若以邪臨民陷而不振陷墜振救用善不肯專則不能使至於殄㓕而莫之恤也國安用之桀奔南巢南巢揚州之地巢伯之國今廬江居巢是紂踣于京踣斃也京殷京師厲流於彘周厲王彘晉地幽滅於戲幽王為西戎所殺戲戲山在西周皆是術也術道也失威多過之道夫君也者民之川澤也行而從之美惡皆君之由民何能為焉以君喻川澤民喻魚也魚從川之美惡以為肥瘠季文子季孫行父也魯大夫也魯成公如晉晉侯見公不敬公至自晉欲求成於楚而叛晉季文子曰不可晉雖無道未可叛也國大臣睦而邇於我邇近也諸侯聽焉未可以貳聽服也史佚之志有之周文王大史曰非我族類其心必異楚雖大非吾族也其肯字我乎公乃止苖賁皇晉大夫也晉侯盟諸侯於斷道齊侯使高固晏弱蔡朝南郭偃㑹晏弱桓子及歛盂髙固逃歸晉人執晏弱於野王執蔡朝於原執南郭偃于温野王縣今屬河内苖賁皇使見晏桓子賁皇楚鬬椒之子楚滅鬬氏而賁皇食邑於苖地晏弱時在野王故因使而見之歸言於晉侯曰夫晏子何罪昔者諸侯事吾先君皆如不逮言汲汲也舉言羣臣不信諸侯皆有貳志舉亦皆也齊君恐不得禮不見禮待故不出而使四子來左右或沮之沮止也曰君不出必執吾使故高子及歛盂而逃夫三子者曰若絕君好寧歸死焉為是犯難而來吾若善逆彼彼齊三人以懐來者吾又執之以信齊沮吾不旣過矣乎過而不改而又乆之以成其悔何利之有焉使反者得辭反者高固謂得不當來之辭而害來者以懼諸侯將焉用之晉人緩之逸士爕晉大夫范文子也晉厲公與楚子戰於鄢陵楚子敗績宵遁晉入楚軍三日糓食楚粟三日也范文子立於戎馬之前曰君㓜諸臣不佞佞才也何以及此君其戒之戒勿驕周書曰惟命不於常有徳之謂言勝無常命惟徳是與魏絳晉大夫魏莊子也無終子嘉父使孟樂如晉無終山戎國名孟樂其使臣因魏莊子納虎豹之皮以請和諸戎欲戎與晉和晉侯曰戎狄無親而貪不如伐之魏絳曰諸侯新服陳新來和將觀於我我徳則睦否則擕貳勞師於戎而楚伐陳必弗能救是棄陳也諸蕐必叛諸蕐中國戎禽獸也獲戎失蕐無乃不可乎夏訓有之曰有窮后羿夏訓夏書有窮國名后君也羿有窮君之號公曰后羿何如怪其言不次故問之對曰昔有夏之方衰也后羿自鉏遷於窮石因夏民以代夏政禹孫大康滛放失國夏人立其弟仲康仲康亦微弱仲康卒子相立羿遂代相號曰有窮鉏羿本國名恃其射也羿善射不修民事而滛于原獸滛放原野棄武羅伯因熊髠龎圉四子皆羿之賢臣而用寒浞寒浞伯明氏之讒子弟也寒國北海平壽縣東有寒亭伯明其君名伯明后寒棄之夷羿收之夷氏信而使之以為已相浞行媚於内内宫人而施賂於外愚弄其民欺罔之而虞羿於田樂之以㳺田樹之詐慝以取其國家樹立也外内咸服信浞詐羿猶不悛悛改也將歸自田羿獵還家衆殺而烹之以食其子食羿子其子不忍食諸死於窮門殺之於國門靡奔有鬲氏靡夏遺臣事羿者有鬲國名今平原鬲縣浞因羿室就其妃妾生澆及豷恃其讒慝詐偽而不德於民使澆用師滅斟灌及斟尋氏二國夏同姓諸侯仲康之子后相所依樂安壽光縣東南有灌亭北海平壽縣南有斟亭處澆於過處豷於戈過戈皆國名也東萊掖縣北有過鄉戈在宋鄭之間靡自有鬲氏收二國之燼燼遺民以滅浞而立少康少康夏后相之子少康滅澆於過后杼滅豷於戈后杼少康子有窮由是遂亡失人故也浞因羿室故不改有窮之號昔周辛甲之為太史也命百官官箴王闕辛甲周武王太史闕過也使百官各為箴辭戒王過於虞人之箴虞人掌田獵曰芒芒禹迹畫為九州芒芒逺貌畫分也經啟九道啟開九州之道民有寢廟獸有茂草各有攸處德用不擾人神各有所歸故徳不亂在帝夷羿冐於原獸冐貪也忘其國恤而思其麀牡言但念獸武不可重重猶数也用不恢於夏家羿以好武雖有夏家而不能恢大之獸臣司原敢告僕夫獸臣虞人告僕不敢斥尊虞箴如是可不懲乎於是晉侯好田故魏絳及之柳莊衛大夫獻公出奔反於衛及郊將班邑於從者而后入欲賞從者以懼居者獻公以魯襄十四年出奔齊二十六年復歸于衛柳莊曰如皆守社稷則孰羈靮而從如皆從則孰守社稷言從守若一靮紖也君反其國而有私也毋乃不可乎言有私則生恐弗果班師曠字子野晉太師也衛公出奔師曠侍於晉侯晉悼公也晉侯曰衛人出其君不亦甚乎對曰或者其君實甚良君將賞善而刑滛養民如子蓋之如天容之如地民奉其君愛之如父母仰之如日月敬之如神明畏之如雷霆其可出乎夫君神之主而民之望也若困民之主匱神乏祀百姓絕望社稷無主將安用之弗去何為天生民而立之君使司牧之勿使失性有君而為之貳貳卿佐使師保之勿使過度是故天子有公諸侯有卿卿置側室側室支子之官大夫有貳宗貳宗宗子之副貳者士有朋友庶人工商皁𨽻牧圉皆有親暱以相輔佐也善則賞之賞謂宣揚過則正之患則救之救其難也失則革之革更也自王以下各有父兄子弟以補察其政補其愆過察其得失史為書謂太史君舉則書瞽為詩瞽盲者為詩以風刺工誦箴諌工樂人也誦箴諌之辭大夫規誨規正諫誨其君士傳言士卑不得徑達聞君過失傳告大夫庶人謗庶人不與政聞君過得誹謗商旅於市旅陳也陳其貨物以示時所貴尚百工獻藝獻其技藝以喻政事故夏書曰遒人以木鐸狥於路逸書遒人行人之官也木鐸木舌金鈴狥於路求歌謡之言官師相規官師大夫自相規正工執藝事以諫所謂獻藝正月孟春於是乎有之諫失常也有遒人狥路之事天之愛民甚矣豈其使一人肆於民上肆放也以從其滛而棄天地之性必不然矣石言於晉魏榆魏榆晉地晉侯晉平公也問於師曠曰石何故言對曰石不能言或馮焉謂有精神馮依石而言不然民聽濫也濫失也抑臣又聞之抑疑辭曰作事不時怨讟動於民則有非言之物而言今宫室崇侈民力彫盡彫傷也怨讟竝作莫保其性性命也民不敢自保其性命石言不亦宜乎於是晉侯方築虒祁之宫虒祁地名在絳西四十里臨汾水叔向曰子野之言君子哉君子之言信而有徵故怨遠於其身怨咎逺其身也小人之言僣而無徵故怨咎及之詩曰哀哉不能言匪舌是出惟躬是瘁不能言謂不知言理以僣言見退者其言非不縱舌出以僣而無信自取瘁病故哀之哿矣能言巧言如流俾躬處休其是之謂乎哿善也巧言如流謂非正言而順敘以聽言見答者言其可嘉以信而有徵自取安逸師曠緣問流轉終歸於諫故以比巧言如流也當叔向時詩義如此故與今說詩者小異是宫也成諸侯必叛君必有咎夫子知之矣晉平公閒居師曠侍坐平公曰子生無目甚矣子之墨墨也師曠對曰天下有五墨墨而臣不得與一焉平公曰何謂也師曠曰群臣行賂以採名譽百姓侵寃無所告愬而君不悟此一墨墨也忠臣不用用臣不忠下才處高不肖臨賢而君不悟此二墨墨也姦臣欺詐空虚府庫以其少才覆塞其惡賢人逐姦邪貴而君不悟此三墨墨也國貧民罷上下不和而好財用兵嗜欲無饜謟䛕之人容容在傍而君不悟此四墨墨也至道不明法令不行吏民不正百姓不安而君不悟此五墨墨也國有五墨墨而不危者未之有也墨墨耳何害乎國家哉范獻子晉大夫也魯昭公如晉莒牟夷以牟婁及防兹來奔莒人愬于晉愬魯受牟夷晉侯平公也欲止公范獻子曰不可人朝而執之誘也討不以師而誘以成之惰也為盟主而犯此二者無乃不可乎請歸之間而以師討焉間暇也乃歸公屠蒯晉宰夫也晉荀盈如齊逆女自為逆還卒於戲陽槐郡内黄縣北有戲陽城殯於絳未葬晉侯飲酒樂平公也膳宰屠蒯趨入請佐公使尊公之使人執尊酌酒請為之佐許之公許也而遂酌以飲工工樂師師曠也曰汝為君耳將司聰也樂所以聰耳辰在子卯謂之疾日疾惡也紂以甲子䘮桀以乙卯亡故國君以為忌日君徹宴樂學人舍業為疾故也君之卿佐是謂股肱股肱或虧何痛如之言痛疾過於忌日女弗聞而樂是不聰也不聞是義而心樂又飲外嬖叔外都大夫之嬖者曰女為君目將司明也職在外故主視服以旌禮旌表也禮以行事事政令事有其物物類也物有其容容貌也今君之容非其物也有卿佐之䘮而作樂歡㑹故曰非其物而女不見是不明也亦自飲也曰味以行氣氣以實志氣和而志充志以定言在心為志發口為言言以出令臣實司味二御失官而君弗命臣之罪也工與嬖叔侍御君者失官不聦明公說徹酒初公欲廢知氏而立其外嬖為是悛而止叔向晉大夫也晉平公射鴳不死竪襄搏之失公怒拘將殺之叔向聞之夕君告之叔向曰君必殺之昔吾先君唐叔射兕于徒林殪以為大甲以封於晉今君嗣吾先君唐叔射鴳不死搏之不得是揚吾君之耻也君其必速殺之勿令逺聞君忸怩顔乃趨赦之固桑晉船人也晉平公浮西河中流而嘆曰嗟乎安得賢士與共此樂者固桑一云蓋胥進對曰君言過矣夫劍產於越珠產江漢玉產崑山此三寳者皆無足而致今君茍好士則賢士至矣平公曰固桑來吾門下食客者三千餘人朝食不足暮收市租暮食不足朝收市租吾尚可謂不好士乎固桑對曰今夫鴻鵠髙飛冲天然其所恃者六翮耳夫腹下之毳背上之毛增去一把飛不為高下不知君之食客者六翮耶將腹背之毳也平公黙然而不應焉郭榮齊大夫也晉伐齊師至於楊門齊侯靈公也駕將走郵棠郵棠齊邑太子與郭榮扣馬太子光也曰師速而疾略也言欲略行其地無乆攻意將退矣君何懼焉且社稷之主不可以輕輕則失衆君必待之將犯之大子抽劒斷鞅乃止叔仲昭伯魯大夫叔仲帶也襄公入楚及漢聞康王卒欲還叔仲昭伯曰君之來也非為一人也一人謂康王為其名與其衆也名謂為大國有盟主之名也衆略地多兵甲衆今王死其名未改其衆未敗何為還諸大夫皆欲還子服惠伯曰不知所為姑從君乎惠伯魯大夫仲孫他之子子服椒也姑且也叔仲曰子之來也非欲安身也為國家之利也故不憚勤遠而聽於楚憚難非義楚也畏其民與衆也義楚非必楚有義而徃夫義人者固慶其喜而弔其憂况畏而服焉慶猶賀喜福也聞畏而徃聞䘮而還茍芉姓實嗣其誰代之任䘮芉楚姓嗣嗣世任當也誰當代之當䘮為主者乎言必自當之故不可不往弔也王大子又長矣執政未改執政令尹司馬改易予為先君來死而去之其誰曰不如先君言我為楚先君故來聞死而去後嗣臣子誰肯自謂德不如先君將為䘮舉聞䘮而還其誰曰非侮也舉動也如在國聞楚有䘮將為之舉動而往况已至漢聞喪而還其誰言魯不輕侮之也事其君而任其政其誰由已貳任當由從也言楚臣方事其君而當其政誰肯從已時而使諸侯有㩦貳者乎求說其侮而亟於前之人其讎不滋大乎說猶除也滋益亟疾也言楚之君臣求除其輕侮已者將亟疾於前之人其讎不益大乎說侮不懦執政不二帥大讎以憚小國其誰云待之懦弱憚難也言楚人欲除侮慢之耻不懦弱其執政之臣無二心以楚大讎為魯作難其誰能待之待猶禦也若從君而走患則不如違君以避難走之且夫君子計成而後行二三子計乎有禦楚之術而有守國之備乎則可也可可還若未有不如往也乃遂行榮成伯名欒魯大夫也魯襄公如楚反及方城聞季武子襲卞方城楚北山卞魯邑季武子取之以自予公欲還出楚師以伐魯伐季氏言魯者季氏專魯國也成伯曰不可君之於臣其威大矣不能令於國而恃諸侯諸侯其誰暱之暱親若得楚師以伐魯魯既不違夙之取卞也必用命焉守必固矣夙武子名言夙取卞時魯人不違是聴用其命必同心而守故曰固矣若楚之克魯克勝諸姬不獲闚焉而况君乎彼無亦置其同類以服東夷而大攘諸夏將天下是王而何德於君其予君也無亦亦也同類同姓攘却也言楚亦將自置其同姓於魯以取天下不予君若不克魯君以蠻夷伐之而又求入焉必不獲矣不如予之予之以卞予武子也夙之事君也不敢不悛悛改醉而怒醒而喜庸何傷庸用也言公欲伐魯若人醉而怒今止若醒而喜用何傷乎君其入也乃歸薳子馮楚令尹也吳人召舒鳩人反楚舒鳩楚屬國召欲與共伐楚楚子師於荒浦荒浦舒鳩地使沈尹壽與師祁犁讓之二子楚大夫舒鳩子敬逆二子而告無之且請受盟二子復命王欲伐之薳子曰不可彼告不叛且請受盟而又伐之伐無罪也姑歸息民以待其卒卒終也卒而不二吾又何求若猶叛我無辭有庸乃還彼無辭我有功司馬侯晉大夫也楚靈王使椒舉如晉求諸侯椒舉致命曰寡君使舉曰君有惠賜盟于宋宋盟在襄二十七年曰晉楚之從交相見也以歲之不易不易言有難寡人願結驩於二三君欲得諸侯謀事補闕使舉請問君若茍無四方之虞虞度也則願假寵以請於諸侯欲借君之威寵以致諸侯晉侯平公也欲勿許司馬侯曰不可楚王方侈天或者欲逞其心以厚其毒而降之罰未可知也其使能終亦未可知也晉楚惟天所相相助也不可與争君其許之而修德以待其歸若歸於德吾猶將事之况諸侯乎若適滛虐楚將棄之棄不以為君吾又誰與争公曰晉有三不殆其何敵之有殆危也國險而多馬齊楚多難多簒殺之難有是三者何鄕而不濟對曰恃險與馬而虞隣國之難是三殆也四嶽東嶽岱西嶽華南嶽衡北嶽常三塗在河南陸渾縣南陽城在陽城縣東北大室在河南陽城縣西南荆山在新城汙鄉縣南中南在治平武功縣南九州之險也是不一姓雖是天下至險無德則滅亡冀之北土燕代馬之所生無與國焉恃險與馬不可以為固也從古以然是以先王務修德音以享神人享通也不聞其務險與馬也隣國之難不可虞也或多難以固其國啓其疆土或無難以䘮其國失其守宇於國則四垂為宇若何虞難齊有仲孫之難而獲桓公至今賴之仲孫公孫無知事在莊九年晉有里㔻之難而獲文公是以為盟主里克㔻鄭事在僖九年衛邢無難敵亦䘮之閔二年狄滅衛僖二十五年衛滅邢故人之難不可虞也恃此三者而不修政德亡於不暇又何能濟君其許之紂作滛虐文王惠和殷是以隕周是以興夫豈争諸侯乃許楚使使叔向對曰寡君有社稷之事是以不獲春秋時見言不得自往也諸侯君實有之何辱命焉一說晉悼公與司馬侯升臺而望曰樂夫對曰臨觀之樂則樂矣德義之樂則未公曰何謂德義對曰諸侯之為日在君側以其善行以其惡戒可謂德義矣公曰孰能對曰羊舌肹習於春秋乃使叔向傅太子彪平公也册府元龜卷七百四十一
