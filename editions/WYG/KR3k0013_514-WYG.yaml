body:
  text: 册府元龜卷五百十四宋王欽若等撰憲官部剛正書曰剛而塞強而義詩曰靖恭爾位好是正直矧夫風憲之任抨彈攸屬所以案舉不法表正庶尹震肅綱紀奮揚威望而能雅志公亮峻節猋厲舉遵直道無所屈撓善善惡惡不吐不茹使邪臣知懼懦夫有立須復逆忤貴倖搆聚怨隙被以巧詆䧟於深文亦無憚焉斯古人所謂執徳不回當官有守者也漢嚴延年為御史掾舉侍御史時大將軍霍光廢昌邑王尊立宣帝宣帝初即位延年劾奏光擅廢立無人臣禮不道奏雖寢然朝廷肅焉敬之諸葛豐特立剛直元帝擢為司𨽻校尉時侍中許章以外屬貴幸奢滛不奉法度賔客犯事與章相連豐案劾章欲奏其事適逢許侍中私出豐駐車舉節詔章曰下欲收之章廹窘馳車去豐追之章因得入公門自歸上歸自乞哀於天子也豐亦上奏於是收豐節司𨽻去節自豐始豐上書謝曰臣豐駑怯文不足以勸善武不足以執邪陛下不量臣能否拜為司𨽻校尉未有以自効復秩臣為光禄大夫官尊貴重非臣所當處也又廹年數衰暮常恐卒填溝渠無以報厚徳使論議士譏臣無補長獲素飱之名素空也言不舉職務空食禄俸而已故常願捐一旦之命不待時而斷姦臣之首縣於都市編書其罪編謂聯次簡牘也使四方明知為惡之罰然後却就斧鉞之誅誠臣所甘心也夫以布衣之士尚猶有刎頸之交今以四海之大曽無仗節死誼之臣率盡茍合取容阿黨相為念私門之利忘國家之政邪穢濁溷之氣上感於天是以災變數見百姓困乏此臣下不忠之效也臣誠耻之亡已凡人情莫不欲安存而惡危亡然忠臣直士不避患害者誠為君也今陛下天覆地載物無不容使尚書令堯臣欽若等曰堯史不載姓賜臣豐書曰夫司𨽻者刺舉不法善善惡惡非得專之也免處中和順經術意恩深徳厚臣豐頓首幸甚臣竊不勝憤懣願賜清宴惟陛下裁幸帝不許是後所言益不用盖寛饒為司𨽻校尉刺舉無所廻避平恩侯許伯入第許伯皇太子外祖也入第者治第新成始入居之丞相御史將軍中二千石皆賀寛饒不行許伯請之乃往從西階上東鄉特坐言自尊抗無所屈也許伯自酌曰盖君後至寛饒曰無多酌我我乃酒狂丞相魏侯臣欽若等曰魏侯魏相也笑曰次公醒而狂何必酒也坐者皆屬目卑下之屬猶佯也酒酣樂作長信少府檀長卿起舞為沐猴與狗鬭沐猴獮猴坐皆大笑寛饒不說仰視屋而歎曰美哉然富貴無常忽則易人此如傳舍所閱多矣言如客舍行客輙過之故多所歴也唯謹慎為得乆君侯可不戒哉因起趨出劾奏長信少府以列卿而沭猴舞失禮不敬帝欲罪少府許伯為謝良乆帝乃解孫寳字子嚴哀帝即位為諫大夫遷司𨽻初傅太后與中山孝王母馮太后俱事元帝有郤以當熊事慙而嫉之傅太后使有司考馮太后令自殺衆庶寃之寳奏請覆治傅太后大怒曰帝置司𨽻主使察我馮氏反事明白故欲擿觖以揚我惡擿觖謂挑發之也我當坐之帝乃順㫖下寳獄尚書僕射唐林争之上以林朋黨比周左遷敦煌魚澤障候大司馬傅喜光禄大夫龔勝固爭帝為言太后出寳復官鄭賔眀法律為御史事貢公貢禹也名公直㳙勲為司𨽻校尉時北地浩商為義渠長所捕亡義渠北之縣也商被縣長捕而逃亡長取其母與猳猪連繫都亭下以深辱之猳牡豕也商兄弟㑹賔客自稱司𨽻掾長安縣尉殺義渠長妻子六人亡丞相御史請遣掾史與司𨽻校尉部刺史并力逐捕察無狀者無狀謂商及義渠長本狀之遣曲也奏可勲奏言春秋之義王人㣲者序乎諸侯之上尊王命也臣幸得奉使以督察公卿以下為職今丞相宣薛宣也請遣掾史以宰士督察天子奉使命大夫謂丞相掾史為宰士者言其宰相之屬官而信為士也奉使命大夫謂司𨽻也甚誖逆順之理誖乖也宣本不師受經術因事以立姦威案浩商所犯一家之禍耳印書欲專權作威乃害於國不可之大者周書洪範云臣之有作福作威乃㓙于乃國害于厥躬故引之願下中朝特進列侯將軍以下正國法度議者以為丞相掾不宜移書督趣司𨽻㑹浩商捕得伏誅家屬徙合浦後漢鮑永建武中為司𨽻校尉辟扶風鮑恢為都官從事恢亦抗直不避彊禦帝常曰貴戚且宜歛手以避二鮑何敞為侍御史章帝時尚書僕射郅夀譏刺竇憲等辭㫖甚切憲怒䧟壽以買公田誹謗下吏當誅敞上䟽理之曰臣聞聖王闢四門開四聰延直言之路下不諱之詔立敢諫之旗聽歌謠於路諍臣七人以自鑒炤考知政理違失人心輙改更之故天人並應傳福無窮臣伏見尚書僕射郅壽坐於臺上與諸尚書論擊匈奴言議過差及上書請買公田遂繫獄考劾大不敬臣愚以為夀機密近臣匡救為職若懷黙不言其罪當誅今夀違衆正議以安宗廟豈其私邪又臺閣平事分爭可否雖唐虞之隆三代之盛猶謂諤諤以昌不以誹謗為罪請買公田人情細過可裁隠忍壽若被誅臣恐天下以為國家横罪忠直賊傷和氣忤逆隂陽臣所以敢犯嚴威不避夷㓕觸死瞽言非為壽也忠臣盡節以死為歸臣雖不知壽度其甘心安之誠不欲聖朝行誹謗之誅以傷晏清之化杜塞忠直垂譏無窮臣敞謬豫機宻言所不宜罪名明白當塡牢獄先壽僵仆萬死有餘書奏壽得减死論宋意為司𨽻校尉和帝永元初大將軍竇憲兄弟貴盛歩兵校尉鄧壘河南尹王調故蜀郡太守廉范等羣黨出入憲門負勢放縱意隨違舉奏無所廻避由是與竇氏有隙周䊸初為洛陽令部吏止奸亭長霍延遮止㧞劍肆詈皇后弟竇篤坐免後為御史中丞又坐免竇氏貴盛兄弟秉權睚眦宿怨無不僵仆篤等以䊸公正而怨隙有素遂不敢害永元五年徴為御史中丞諸竇雖誅而夏陽侯瓌猶尚在朝䊸疾之復乃上䟽曰臣聞臧文仲之事君也見有禮於君者事之如孝子之養父母見無禮於君者誅之如鷹鸇之逐鳥雀案夏陽侯瓌本出輕薄志在邪僻學無經術而妄搆講舍外招儒徒實㑹姦桀輕忽天威侮慢王室又造作廵狩封禪之書惑衆不道當伏誅戮而主者營私不為國計夫涓流雖寡浸成江河爝火雖㣲卒能燎野履霜有漸可不懲革宜尋吕産專竊之亂永惟王莽簒逆之禍上安社稷之計下解萬夫之惑華松為司𨽻校尉是時貴戚專勢有司軟弱莫敢糾罰松奏馬氏三侯羣豪歛手桓典拜侍御史是時宦官秉權典執政無所廻避應奉為司𨽻校尉糾舉姦偽不避豪戚以嚴厲名虞詡順帝永建中為司𨽻校尉數月間奏太傅馮石太尉劉熹中常侍程璜陳秉孟生李閏等百官側目號為苛刻時中常侍張防特用權勢每請託受取詡輙按之而屢寢不報詡不勝其憤乃自繫廷尉奏言曰昔孝安皇帝任用樊豐遂交亂嫡統幾亡社稷今日張防復弄威柄國家之禍將重至矣臣不忍與防同朝謹自繫以聞無令臣襲楊震之跡震為樊豐所譖而死書奏防流涕訴帝詡坐論輸左校防必欲害之二日之中傳考四獄獄吏勸詡自引詡曰寧伏歐刀以示逺近歐刀刑人之刀也詡子顗與門生百餘人候中常侍高梵車訴言枉狀梵入言之即日赦出詡李膺桓帝時拜司𨽻校尉時張讓弟朔為野王令貪殘無道至乃殺孕婦聞膺厲威嚴懼罪逃還京師因匿兄讓第舍藏於合柱中膺知其狀率將吏卒破柱取朔付洛陽獄受辭畢即殺之讓訴寃於帝詔膺入殿御親臨軒詰以不先請便加誅辟之意膺對曰昔晉文公執衛成公歸于京師春秋是焉禮云公侯有罪雖曰宥之有司執憲不從昔仲尼為魯司㓂七日而誅少正卯今臣到官已積一旬私懼以稽留為愆不意獲速疾之罪誠自知釁責死不旋踵特乞留五日尅殄元惡退就鼎鑊始生之願也帝無復言顧謂讓曰此汝弟之罪司𨽻何愆乃遣出之自此諸黄門常侍皆鞠躬屏氣休沭不敢復出宫省帝怪問其故竝叩頭泣曰畏李校尉韓演為司𨽻校尉奏中常侍左悺罪惡及其兄太僕南鄉侯稱請託州郡聚歛為姦賔客放縱侵犯吏民悺稱皆自殺演又奏中常侍具瑗兄沛相恭贓罪徴詣廷尉瑗詣獄謝上還東武侯印綬詔貶為都鄉侯袁紹為司𨽻校尉董卓議欲廢立謂紹曰天下之主宜得賢明每念靈帝令人憤毒董侯獻帝也似可今當立之紹曰今上富於春秋未有不善宣於天下若公違禮任情廢嫡立庶恐衆議未安卓按劍叱紹曰豎子敢然天下之事豈不在我我欲為之誰敢不從紹跪對曰此國之大事請出與太傅議之卓復言劉氏種不足復遺紹勃然曰天下徤者豈惟董公横刀長揖徑出懸節於上東門而奔冀州魏王觀字偉臺明帝幸許召觀為治書侍御史典行臺獄時多有倉卒喜怒而觀不阿意順㫖吳徐愿為侍御史性忠壯好直言晉何曽魏世為司𨽻校尉撫軍校事尹模慿寵作威姦利盈積朝野畏憚莫敢言者曽奏劾之朝廷稱焉時歩兵校尉阮籍負才放誕居䘮無禮曽面質籍于文帝座曰卿縱情背禮敗俗之人今忠賢執政綜核名實若卿之曹不可長也因言於帝曰公方以孝治天下而聽阮籍以重哀飲酒食肉於公座宜擯四裔無令汚染華夏帝曰此子羸病若此君不能為吾忍邪曽重引據辭理甚切帝雖不從時人敬憚劉毅魏末辟司𨽻都官從事京邑肅然毅將彈河南尹司𨽻不許曰攫獸之犬鼷䑕蹈其背毅曰既能攫獸又能殺䑕何損於犬投傳而去武帝咸寧初為司𨽻校尉糾正豪右京師肅然司部守令望風投印綬者甚衆時人以毅方之諸葛豐盖饒寛二人太子朝鼓吹將入東掖門毅以為不敬止之於門外奏劾保傅以下詔赦之然後得入帝常因南郊禮畢喟然問毅曰卿以朕方漢何帝也對曰可方桓靈帝曰吾雖德不及古人猶克己為政又平吳㑹混一天下方之桓靈其已甚乎對曰桓靈賣官錢入官庫陛下賣官錢入私門以此言之殆不如也帝大笑曰桓靈之世不聞此言今有直臣故不同也散騎常侍鄒湛進曰世談以陛下比漢文帝人心猶不多同昔馮唐答文帝云不能用頗牧而文帝怒今劉毅言犯順而陛下歡然以此相較聖德乃過之矣帝曰我平天下而不封禪焚雉頭裘行布衣禮卿初無言今於小事何見褒之甚湛曰臣聞猛虎在田荷戈而出凡人能之蜂蠆作於懷袖勇夫為之驚駭出於意外故也夫君臣有自然之尊卑言語有自然之逆順向劉毅始言臣等莫不變色陛下發不世之詔出思慮之表臣之喜慶不亦宜乎時景皇后從父弟羊琇為中護軍琇輙乗羊車毅糾劾其罪琇典禁兵放恣犯法每為有司所貸毅劾之應至重刑武帝以舊恩直免官而已劉暾為侍御史武庫火尚書郭彰率百人自衞而不救火暾正色詰之彰怒曰我能截君角也暾勃然謂彰曰君何敢恃寵作威作福天子法冠而欲截角乎求紙筆奏之彰伏不敢言衆人解釋乃止彰久貴豪侈每出輙從百餘人自此之後務從簡素後兼中丞奏免尚書僕射等十餘人朝廷嘉之遂以即真崔洪武帝世為御史治書時長樂馮恢父為𢎞農太守愛少子淑欲以爵傳之恢父終服闋乃還鄉里結草為廬陽瘖不能言淑得襲爵恢始仕為博士祭酒散騎常侍翟嬰薦恢高行邁俗侔繼古烈洪奏恢不敦儒業令學生畨直左右雖有讓侯㣲善不得稱無倫輩嬰為浮華之目遂免嬰官朝廷憚之尋為尚書左丞時人為之語曰叢生棘刺來自博陵在南為鷂在北為鷹傅𤣥為司𨽻校尉性峻急不能有容每有奏劾或值日暮捧白簡整簪帶竦踊不寐坐而待旦於是貴逰懾伏臺閣生風劉喬為御史丞齊王冏腹心董艾勢傾朝廷百僚莫敢忤㫖喬二旬之中奏劾艾罪釁者六艾諷尚書右丞茍晞免喬官周處字子隠為御史中丞凡所糾劾不避寵戚奏征虜將軍石崇大將軍梁王肜等正繩直筆權豪震肅杜錫為衞將軍長史趙王倫簒位以為治書御史孫秀求交於錫而錫距之秀雖衘之憚其名高不敢害江績為御史中丞奏劾無所屈撓㑹稽世子元顯專政夜開六門績宻啓㑹稽王道子欲以奏聞道子不許車𦙍亦曰元顯驕縱宜禁制之道子黙然元顯聞而謂衆曰江績車𦙍間我父子遣人宻讓之俄而績卒朝野悼之司馬恬為御史中丞值海西廢簡文帝登阼未觧嚴大司馬桓温屯中堂吹警角恬奏劾温大不敬請科罪温視奏歎曰此兒乃敢彈我真可畏也恬忠正有幹局在朝憚之宋荀伯子為御史中丞莅職勤恪有匪躬之稱立朝正色凡所奏劾莫不深相呵毁其言切直鄭鮮之仕晉為御史中丞性剛直不阿强貴明憲直繩甚得司直之體外甥劉毅權重當時朝野莫不歸附鮮之盡心高祖獨不屈意於毅毅甚恨焉義熈六年鮮之使治書侍御史丘洹奏彈毅曰上言𫝊詔羅道盛輙開牋遂盗發宻事依法棄市奏報行刑而毅以道盛身有侯爵輙復停宥案毅勲徳光重任居次相既殺之非已無縁生之自由又奏之於先而弗請於後閫外出疆非此之謂中丞鮮之於毅舅甥制不相糾臣請免毅官詔無所問孔琳之為御史中丞明憲執法無所屈撓傅隆為御史中丞當官而行甚得司直之體南齊王思逺明帝輔政為御史中丞時臨海太守沈昭畧贓私思逺依事劾奏帝及思逺從兄晏昭畧叔父文季請止之思逺不從案事如故袁昂為御史中丞時尚書令王晏弟詡為廣州多納財貨依事劾奏不憚權豪當時號為正直梁陸杲為御史中丞性婞直無所顧望山隂令虞肩在職贓汙數百杲奏收治中書舍人黄陸之以肩事託杲杲不答高祖聞之以問杲杲答曰有人帝曰卿識陸之不杲答曰臣不識其人時陸之在御側帝指示杲曰此人是也杲謂陸之曰小人何敢以罪人屬南司陸之失色領軍將軍張稷是杲從舅嘗以公事彈稷稷因侍宴訴高祖曰杲是臣親通小事彈臣不貸高祖曰杲職司其事卿何得為嫌杲在臺號稱不畏强禦到洽為御史中丞彈糾無所顧望號為勁直張綰再為御史中丞加通直散騎常侍綰再為憲司彈糾無所遁避張緬為御史中丞居憲司推繩無所顧望號為勁直江革為御史中丞彈奏權貴一無所避劉潛為御史中丞在職彈糾無所顧望當時稱之劉覽為尚書左丞當官清正無所私姊夫御史中丞褚湮從兄吏部郎孝綽在職頗通贓貨覽劾奏竝免官孝綽怨之常謂人曰犬嚙行路覽嚙家人陳袁憲為御史中丞時豫章王叔英不奉法度逼取人馬憲依事劾奏叔英由是坐免黜自是朝野皆嚴憚焉徐陵為御史中丞時安成王頊為司空以帝弟之尊勢傾朝野直兵鮑叔叡假王威權抑塞辭訟大臣莫敢言者陵聞之乃為奏彈道從南臺官屬引奏案而入元帝見陵服章嚴肅若不可犯為歛容正坐陵進讀奏狀時安成王殿上侍立仰視世祖流汗失色陵遣殿中御史引王下殿遂劾免侍中中書監自此朝廷肅然徐儉為御史中丞儉性公平無所阿附尚書令江總望重一時亦為儉所糾劾後王深委任之褚玠為御史中丞剛毅有膽决甚有直繩之稱册府元龜巻五百十四
