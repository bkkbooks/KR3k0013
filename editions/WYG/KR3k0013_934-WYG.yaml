body:
  text: 册府元龜卷九百三十四宋王欽若等撰總録部告訐夫上安本朝下銷逆黨臣之令節也其或挾逼上之勢懐間釁之心職為亂階侵敗王畧有能先其未兆輙以上聞俾兹兇頑旋就剪滅則勲庸之績忠厚之誠有足稱矣然或釁生讐隙事廹困窮計慮遂萌變告斯作雖繩愆紏繆有補於公家而撫臆論心盖縁於私忿與夫奮身衛國輸誠愛君者固有間矣盖所謂同功而異情者也漢韓信舍人弟史不書姓名楚漢春秋云舍人謝公也髙帝十年以陳豨反帝自將而徃信稱病不從隂使人之豨所而與家臣謀夜詐赦諸官徒奴欲發兵襲吕后太子部署已定舍人得罪信信囚欲殺之舍人弟上書變告信欲反狀於吕后吕后乃與蕭相國謀詐令人從帝所來稱豨已破信入賀使武士縳斬之賁赫為中大夫時黥布封淮南王髙后誅淮隂侯布心恐醢梁王越徧賜諸侯布見醢大恐隂令人部取兵候伺旁郡警急布有所幸姬疑與賁亂欲捕赫赫上變言布謀反帝以其言語蕭相國蕭相國因請繋赫微驗之布見赫以罪亡上變已疑其言國隂事漢使又來頗有所驗遂發兵反雷被為淮南王安郎中令安謀為反其后荼太子遷及女陵擅權奪民田宅妄致繫人太子學劍自以為人莫及聞雷被巧召與戲被誤中太子太子怒被恐此時有欲從軍者輙詣長安被即願奮撃匃奴太子數惡被王使郎中令斥免欲以禁後元朔元年被遂亡之長安上書自明事下廷尉河南令治淮南相怒壽春丞留太子逮不遣劾不敬王請相相不聽王使人上書告事下廷尉治從迹連王王使人候司公卿請逮捕治王王恐欲發兵㑹赦其罪削二縣以故不發主父偃始為布衣時嘗游燕趙及其貴發燕趙王國隂事大臣畏其口遺賂累千金趙王恐其國患欲上書言其隂事為居中不敢發及其為齊相出闗即使人上書告偃受諸侯金以故諸侯子多以得封者及偃至齊以王姦事動王王自殺武帝聞之大怒以為偃刼其王令自殺廼徴下吏治偃服受諸侯之金實不刼殺齊王遂族誅之江充本名齊有女弟善鼓琴歌舞嫁之趙太子丹齊得幸於敬肅王為上客久之太子疑齊以已隂私告王與齊忤使吏逐捕齊不得收繋其父兄按驗皆棄市齊遂絶迹亡西入闗更名充詣闕告太子丹與同産姊及王後宫姦亂交通郡國豪猾攻剽為姦剽灱也音必切吏不能禁書奏天子怒遣使者詔郡發吏卒圍趙王宫收捕太子丹移繋魏郡詔獄與廷尉雜治法至死趙王彭祖帝異母兄也上書訟太子辠言充逋逃小臣苟為姦譌激怒聖朝譌古訛字也欲取必於萬乗以復私怨取必謂必取勝也後雖烹醢計猶不悔臣願選從趙國勇敢士選取勇敢之士以自随從軍擊匈奴極盡死力以贖丹罪帝不許竟敗趙太子朱安世陽陵人京師大俠也公孫賀為丞相子敬聲為太僕武帝征和中擅用北軍錢千九百萬發覺下獄是時詔捕陽陵朱安世不能得賀請自逐捕安世以贖敬聲罪帝許後果捕得安世安世聞賀欲以贖子笑曰丞相禍及宗矣安世遂從獄中上書告敬聲與陽石公主私通及使人巫祭祠詛上且上甘泉當馳道埋偶人祝詛有惡言下有司案驗賀窮所犯遂父子死獄中巫蠱之禍起自朱安世成於江充劉成封鉼侯時昭帝初立燕王旦言帝非武帝子大臣所共立天下宜共伐之使人傳行郡國以揺動百姓齊孝王孫劉澤等結謀發兵臨淄與旦起成知澤等謀告之青州刺史雋不疑收捕澤以聞有詔燕王旦勿治而澤等皆伏誅燕倉為稻田使者楊敞為大司農昭帝元鳳中倉知上官桀等反謀以告敞敞素謹畏事不敢言乃移病卧以告諫大夫杜延年延年以聞桀皆伏誅蒼與延年皆封敞以九卿不輙言故不得侯張章長安男子也大將軍霍光薨光子禹與兄子雲山怨望有邪謀雲舅李竟所善張赦見雲家卒卒音倉卒之卒謂竟曰今丞相魏相也與平恩侯許廣漢也用事可令太夫人言太后先誅此兩人移徙至尊在太后耳章告之事下廷尉後有詔止勿捕山等愈恐又謀廢天子而立禹事發誅死詔曰男子張章先發覺以語期門董忠忠告左曹楊惲惲告侍中金安上惲召見對狀後章上聞侍中史髙金安上建發其事封章為博成侯戴長樂為太僕楊惲為光禄勲長樂者宣帝在民間時與相知及即位㧞擢親近長樂嘗使行事肄宗廟兼行天子事先肄習威儀也肄音代二切還謂掾吏曰我親面見受詔副帝肄秺侯御曰我副帝肄而秺侯廼為御御謂御車秺音丁故切人有上書告長樂非所宜言事下廷尉長樂疑惲教人告之亦上書告惲罪髙昌侯車犇入北掖門犇古奔字惲語富平侯張延壽曰聞前曾有犇車抵殿門抵觸也音丁只切門闗折馬死而昭帝晏駕今復如此天時非人力也左馮翼韓延壽有罪下獄惲上書訟延壽郎中丘嘗謂惲曰聞君侯訟韓馮翼當得活乎曰事何容易脛脛者未必全也脛脛直貌也我不能自保真人所謂䑕不容穴銜窶數者也䑕所以不容穴也坐銜窶數自妨故不得入穴也窶數戴器也窶音其羽切數音山羽切楊惲自云今之訟人人亦於己有妨又中書謁者令宣持單于使者語視諸將軍中朝二千石視讀曰示惲曰冐頓單于得漢美食好物謂之殠惡單于不来明甚惲上觀西閣上畫人指桀紂畫謂樂昌侯王武曰天子過此一二問其過可以得師矣畫人有堯舜禹湯不稱而舉桀紂惲聞匈奴降者道單于見殺惲曰得不肖君大臣為畫善計不用自令身無處所若秦時但用心小臣誅殺忠良竟以滅亡令親任大臣即至今爾古與今如一丘之貉言其同類也貉獸也似狐而善睡貉乎各切惲妄引亡國以誹謗當世無人臣禮又語長樂曰正月以來天隂不雨此春秋所記夏侯君所言夏侯勝諫昌邑王曰天久隂不雨臣下必有謀上者春秋無久隂不雨之異也因論久隂附著之矣行必不至河東矣后土祠在河東天子歲祀之以主上為戲語尤悖逆絶理事下廷尉廷尉定國考問左驗明白定國于定國也左證左也言當時在其左右見此事者也奏惲不服罪而召戸將尊戸將官名主户衛属光禄也欲令戒􅅚富平侯延壽􅅚與敕同富平侯張延壽也曰太僕定有死罪數事朝暮人也惲幸與富平侯婚姻今獨三人坐語侯言時不聞惲語自與太僕相觸也尊曰不可惲怒持大刀曰蒙富平侯力得族罪惲言富平侯依太僕言而證也則我得罪至於族滅深怨之之詞也毋泄惲言令太僕聞之亂餘事惲幸得列九卿諸吏宿衛近臣上所信任與聞政事與讀曰預不竭忠愛盡臣子義而妄怨望稱引為妖惡言大逆不道請逮捕治上不忍加誅有詔皆免惲長樂為庻人嚴延年為河内太守府丞義史不書姓年老頗悖素畏延年恐見中傷延年本嘗與義俱為丞相史實親厚之無意噉傷也饋遺之甚厚義愈益恐自筮得死卦忽忽不樂取告至長安書言延年罪名十事已拜奏因飲藥自殺以明不欺事下御史延年坐棄市息夫躬河陽人也長安孫寵與躬哀帝時俱上書待詔帝被疾始即位而人有告中山孝王太后詋詛帝太后及弟宜鄉侯馮參皆自殺其罪不明是後無鹽危山有石自立開道躬與寵謀曰上亡繼嗣體久不平闗東諸侯心爭隂謀今無鹽有大石自立聞邪臣託徃事以為大山石立而先帝龍興言邪人有此私議東平王雲以故與其后日夜祠祭詋詛上欲求非望而后舅伍宏反因術以毉技得幸出入禁門霍顯之謀將行於杯杓荆軻之變必起於帷幄事勢若此告之必成察國姦誅主讐取封侯之計也躬寵乃與中郎右師譚右師姓譚名共因中常侍宋宏上變事告焉上惡之下有司案驗東平王雲雲后謁及伍宏等皆坐誅謁者后之名也帝擢寵為南陽太守譚潁川都尉宏躬皆光祿大夫左曹給事中是時侍中董賢愛幸帝欲侯之遂下詔云躬寵因賢以聞封賢為髙安侯寵為方陽侯躬為宜陵侯食邑各千戸縣右師譚爵闗内侯食邑千戸髙康以明易為郎及王莽居攝東郡太守翟誼舉兵誅莽事未發康候知東都有兵私語門人門人上書言之後數月翟誼兵起莽召問對受師髙康莽惡之為惑衆斬康後漢梁郁太學生也時孔僖與崔駰友善同遊太學習春秋因讀吳王夫差時事僖廢書歎曰若是所謂畵虎不成反為狗者駰曰然昔孝武皇帝始為天子年方十八崇信勝道師則先王五六年間號聖文景及後恣已忘其前之為善僖曰書傳若此多矣鄰房生梁郁儳和之曰儳謂不與之言而傍對也記曰無儳言儳音士鍳切如此武帝亦是狗邪僖駰黙然不對郁怒恨之隂上書告駰僖誹謗先帝刺譏當世事下有司駰詣吏受訊僖上書自訟得免朱濟丁盛並為尚書郎時張俊有才能與兄龕並為尚書郎年少勵鋒氣濟盛立行不修俊欲舉奏之二人聞恐因郎陳重雷義徃請俊俊不聽因共私賂侍史使得其私書與袁敞子遂封上之皆下獄當死俊自獄中占獄吏上書自訟書奏而俊獄已報廷尉將出榖門臨行刑鄧太后詔馳騎以减死論俊假名上書謝曰臣辜恩負義自䧟重刑情斷意訖無所復望廷尉鞠遣毆刀在前棺絮在後魂魄飛揚形容已枯陛下聖澤以臣嘗在近密識其狀貎傷其眼目留心曲慮特加偏覆䘮車復還白骨更肉披棺發椁起見白日天地父母能生臣俊不能使臣俊當死復生陛下徳過天地恩重父母誠非臣俊破碎骸骨舉宗腐爛所報萬一臣俊徒也不得上書不勝去死就生驚喜踴躍觸冒拜章當時皆哀其文朝廷繇此薄敞罪而隐其死以三公禮𦵏之復其官習授南郡人婁圭少與曹公有舊圭與授同載見曹公出授曰父子如此何其快爾子伯圭字曰居世間當自為之而但觀他人乎授乃白之遂見誅蜀馬超為左將軍彭羕左遷為江陽太守羕聞當逺出私情不悦徃詣超超問羕曰卿才具秀㧞王公相待至重謂卿當與孔明孝直諸人齊足並驅寧當外授小郡失人本望乎羕曰老革荒悖何復道邪枮皮去毛曰革古者以革為兵故語稱兵革革摧兵也羕罵備為老革猶言老兵也又謂超曰卿為其外我為其内天下不足定也超覊旅歸國常懐危懼聞羕言大驚黙然不荅羕退具表羕詞於是收羕付有司誅死晉周嵩以諫元帝忤㫖出為新安太守嵩怏怏不悦臨發與散騎郎張嶷在侍中戴邈坐褒貶朝士又詆毁邈邈密表之帝召嵩入責之曰卿矜豪傲慢敢輕忽朝廷繇吾不徳故爾嵩跪謝曰昔唐虞至聖四凶在朝陛下雖盛明御世亦安能無碌碌之臣乎帝怒收付廷尉華嘗以嵩大不敬棄市論嶷以扇和減罪除名時嵩兄顗方貴重帝隐忍久之補廬陵太守宋沈慶之為開府儀同三司辭位以始興郡公就第時廢帝狂悖無道衆並勸慶之廢立及栁元等連謀以告慶之慶之與江夏王義恭素不厚發其事帝誅義恭元景等以慶之為侍中太尉封次子為中書郎文季建安縣侯食邑千戸南齊謝脁為南東海太守行南徐州事啓王敬則反謀帝甚善賞之遷尚書吏部郎後魏李訢為相州刺史受納民財及商胡珎寶兵民告言尚書李敷與訢少長相好每左右之或有勸以奏聞敷不言獻文聞訢罪狀檻車徴訢拷劾抵罪時敷兄將見踈斥有司諷訢以㫖嫌兄弟之意令訢告列敷等隠罪可得自全訢深所不欲且弗之知也乃謂其女壻裴攸曰吾與李敷族世雖逺情如一家在事既有此勸竟如何也昨來每欲為此取死引簮自刺以帶自絞而不能絶耳亦不知其事攸曰何為他死也敷兄弟事釁可知有馮闡者先為敷所敗其家切恨之但呼闡弟問之足知委曲訢從其言又趙郡范標具條列敷兄弟事狀有司以聞敷坐得罪詔訢貪冐罪應死以紏李敷兄弟故得降免有司百鞭髠刑配為厮役賈智字顯智少有膽决孝明孝昌中告毛謐等逆靈太后嘉之除伏波將軍薛季孝静武定三年正月中告開府儀同三司爾朱文暢開府司馬任胄都督鄭仲禮中府主簿李世林前開府參軍房子逺等謀賊齊神武因十五日夜打蔟懐刃而入文暢等並伏誅北齊崔暹為僕射時崔悛為七兵尚書每以籍地自矜暹聞而銜之髙祖𦵏後悛又竊言黄頷小兒堪當重任不暹外兄李慎以悛言告暹暹啓文襄絶悛朝謁悛要拜道左文襄發怒曰黄頷小兒何足拜也於是鎻悛赴晉陽而訊之司馬子如為尚書令文襄入輔朝政内稍嫌之尋以贓賄為御史中尉崔暹所劾詔削官爵時崔季舒為黄門侍郎勢傾崔暹暹嘗於朝堂屏人拜之曰若得僕射皆叔父之恩權重如此及文襄遇難文宣將赴晉陽黄門郎楊休之勸季舒從行曰一日不朝其間容刀季舒性愛聲色心在閒放遂不請行欲恣其行樂子如縁宿憾及尚食典御陳山提等共通狀繇是季舒及暹各鞭二百徙北邊天保初文宣知其無罪追為將作大匠祖珽字孝徴文宣令直中書省掌詔誥珽通密狀列中書侍郎陸元䂓勑令裴英推問元䂓以應對忤㫖被配甲坊除珽尚藥丞廢帝初普選勞舊除為章武太守㑹楊愔等誅不之官受著作郎數上密啓為孝昭所忿勅中書門下二省斷珽奏事又雒上王思宗之子元海後妻陸大姬甥也大姬即後主女侍中也後主武平中與珽共執朝政元海多以大姬密語告珽珽求領軍元海不可珽乃以其所告報大姬姬怒出元海為鄭州刺史翟嵩為汲郡太守畢義雲為御史中丞豪横不平頻被怨頌嵩啓列義雲從父兄僧明先任京畿吏負官債不受其屬立限灱徴繇此挾嫌遣御史過郡訪察欲相推繩又坐私藏工匠家有十餘機織錦并坐金銀器物及被禁止尋見釋隋胡僧不知名氏元諧為寧州刺史王誼為上柱國誼有功於國與諧俱無任用每相徃來胡僧告諧誼謀反髙祖按其事無逆狀慰諭而釋之又有告諧與從父弟上開府滂臨澤侯田鸞上儀同祁緒等謀反帝令案其事有奏諧謀令祁緒勸黨項兵即斷巴蜀時廣平王雄左僕射髙頴二人用事諧欲譛去雲左執法星動已四年矣狀一奏髙頴必死又言太白犯月光芒相炤主殺大臣即雄必當之諧嘗與滂同謁帝諧私謂滂曰我是主人殿上者賊也因令滂望氣滂曰彼雲似蹲狗足鹿不如我軰有福徳雲聞帝大怒諧滂鸞緒並伏誅籍没其家何妥為國子博士與蘇威子議樂事各有所持妥恚遂奏威與禮部尚書盧愷吏部侍郎薛道衡尚書左丞王宏考功侍郎李同和等共為朋黨省中呼王宏為世子李同和為叔言二人如威之子弟也復言威以曲道任其從父弟徹肅等罔冐為官又國子學請蕩隂人王孝逸為書學博士威属盧愷以為其府參軍帝令蜀王秀上柱國虞慶則等親治之事皆驗帝以宋書謝晦𫝊中朋黨事令威讀之威惶懼免冠頓首帝曰申謝已晩矣於是免威官爵以開府就第知名之士坐威得罪者百餘人皇甫孝諧安定人凉州總管王世積之親信也世積拜凉州總管未幾孝諧有罪吏捕之亡抵世積世積不納繇是有憾孝諧竟配防桂州事總管令狐熈熈又不之禮甚困窮因徼倖上變稱世積嘗令道人相其貴不道人荅曰公當為國主謂其妻曰夫人當為皇后又凉州其所親謂世積曰河西天下精兵處可以圖大事也世積曰凉州土曠人稀非用武之國繇是被徴入朝案其罪有司奏左衛大將軍元旻右衛大將軍元胄左僕射髙穎並與世積交通受其名馬之贈世積竟坐誅旻胄等免官拜諧為大將軍趙釋柱者虞慶則之婦弟也開皇中嶺南人李賢據州反時虞慶則為桂州總管以釋柱為隋府長史釋柱先與慶則愛妾通恐事彰乃宣言曰慶則不欲此行遂聞於文帝先是朝臣出征帝宴皆别禮賜遣之及慶則南討辭帝帝色不悦慶則繇是怏怏不得志暨平賢至潭州臨桂鎮慶則觀眺山川形勢曰此誠險固加以足糧若守得其攻不可拔遂使釋柱詣馳京奏觀上顔色釋柱至京因告慶則謀反帝案驗之慶則於是伏誅拜釋柱為柱國陳峴少驍勇事章大寶為帳内部曲告大寶反叛拜譙州刺史李元操為内史侍郎王邵為著作佐郎以母憂去職在家著北齊書時制禁私撰史為元操所奏帝怒遣使收其書覽而悦之於是起為員外散騎侍郎修起居注楊汪為荆雒二州刺史時髙祖謂諫議大夫王逹曰卿為我覔一好左丞逹遂私於汪曰我當薦君為左丞若事果當以良田相報也汪以逹所言奏之逹竟以獲罪卒拜汪為尚書崔彦武為魏州刺史辛徳源素與武陽太守盧思道友善時相徃來彦武奏徳源潜為交結恐有姦繇是謫令從軍討南寧歲餘而還丘和煬帝時為蒲州刺史以宇文述方被任遇和傾心附之又以發武陵公元胄罪拜代州刺史唐紇于承基刺客也常山王承乾為皇太子詔壯士左衛副率封師進及承基等謀令殺魏王泰不克而止尋與漢王元昌兵部尚書侯君集等謀反將縱兵入西宫㑹承基外連齊王祐反繫獄當死遂告其事太宗命司徒長孫無忌等參鞫之廢承乾為庻人元昌賜自盡君集等伏誅張亮倜儻有大度外敦厚而内懐詭詐大業末年李密畧地榮汴亮仗䇿從之未被任用屬軍中有謀反者亮告之密以為至誠署驃騎將軍𨽻於李勣房遺直𤣥齡之長子也𤣥齡次子遺愛尚髙陽公主坐反誅遺直攻訐遺愛及主云懼國家刑憲罪盈惡稔恐累臣私門太宗令所司案驗遂别獲主等反端而以遺直頗言主愆兼以𤣥齡素著勲勣得免為𨽻廢於家崔擢為雍州司功李乾祐為司刑太常伯嘗舉擢為尚書郎事既不果私以告擢其後擢有犯遂告乾祐泄禁中以贖罪乾祐坐免立於九成朝堂之間凍中被拽卒喬琳為監察御史同院畢耀初與琳嘲誚徃復因成釁隙遂以公事相告訐坐貶巴州員外司户王再榮太常丞于敏役人也再榮於憲宗元和八年二月詣銀臺門告敏父司空頔與梁正言錢以謀出鎮即日收頔孔目官沈璧并家僮十數人於内侍獄鞫問于頔待罪於右仗以御史中丞薛存誠刑部侍郎王播大理卿武少儀為三司使是日晩繋敏於臺獄沈璧王再榮並自内侍獄出付臺司案初正言貪詐自擅勇於射利梁守謙方知樞密正言每詭謂人吾與樞密宗盟分至頗得闗説頔久失職惑其言厚致財賄以圖任用其後正言之詐漸露于敏責其資於市邸誘致正言之僮奴支解棄於溷中㑹再榮發其事故敗王士則武俊之子為邢州刺史自承宗不容諸父士則奔京師拜驍騎將軍元和中盗殺武元衡士則及其弟士平告曰承宗使之既而案成其獄李賞穆宗長慶中故司空于頔之子方欲以譎謀求進乃言於宰相元稹稱有奇士王昭于友明等三人賞家青鄆函遊深趙之間且與賊黨通熟可反間而出元翼賞言于方知裴度為元稹所忌乃授稹指使厚賂刺客王昭等令潛刃度詔三司按鞫無騐而前事盡露於是度稹皆罷史志忠左神䇿軍吏也長慶四年告妖賊馬文忠謀逆捕獲之有詔并執其黨品官李文徳等七人同鞫于内仗安再榮者衛尉卿劉遵古役人也再榮敬宗寶歴元年九月丁丑告前袁王府長史武昭謀害右僕射平章事李逢吉庚辰詔侍御史温造刑部郎中李行修大理正元從職充三司案武昭獄上言准勑推勘安再榮所告張少騰等三人擬潛害宰臣李逢吉事闗連人並案問得實勑前袁王府長史武昭及弟彚役人張少騰宜付京兆府各决痛杖一頓處死前水部郎中李行叔可道州司馬待服闋起任河陽節度掌書記秘書省校書郎李仲言流象州左金吾衛兵曹參軍弟彚流崖州太學博士李渉流康州大理卿遵古役人安再榮山人劉審等三人續議優奬昭本陳留人性險誕元和中王師討淮西以䇿謁丞相裴度及度督軍因得署軍職至郾城又遣昭使蔡㓂懼之以兵而昭神色不變益奇之後至太原奏為石州刺史無何昭除王府官以地散鬱悒日與李渉弟彚在長安中以義俠相許是時宰臣李逢吉李程不叶而此軰皆乗隙售已干遊其門李仍叔素依附李程知昭不得志易以鼓怒怨亦誑昭云程欲與昭官為所阻昭果恨怒與劉審及張少騰潛説謀害逢吉之計後審乃以昭之言告於張權輿權輿遂告逢吉昭審本其狀因令弟彚致昭到所居與之深相結納而疑怨之意並息居數月少騰漏語於再榮遂以狀密告因成其獄仲言於逢吉為近從子當此際亦欲助逢吉以傾程乃隂誡弟彚曰言武昭與李程同謀則活否則死彚曰寃死甘心誣人以自免所不為也初逢吉遇弟彚甚厚嘗與彚書云足下嘗字僕曰自求僕字足下曰利見文字徃復畧無虚日其間參謀議之密受金帛之賜不宜示於衆者近十餘幅異哉逢吉與程俱在相位而日與闒茸微類如此欵密獄既明具詞皆牽連天下之人無不指笑詔授劉審郢州長壽縣主簿安再榮石龍為武軍長史賞告武昭之功也後唐張繼業為河陽兩使留後莊宗同光三年六月繼業上疏稱弟繼孫本姓郝有母尚在父全義飬為假子令官衙内兵士自皇帝到京繼孫私藏兵甲招置部曲欲圖不軌兼私家滛縱無别無義臣若不自陳恐累家族勑有善必賞所以勸忠孝之方有惡必誅所以絶姦邪之迹其或罪狀騰於衆口醜行布於近親湏舉朝章兾明國法汝州防禦使張繼孫本非張氏子孫自小丐飬以至成立備極顯榮而不能酬撫育之恩履謙恭之道擅行威福嘗恣姦兇侵奪父權惑亂家事從鳥獸之行畜梟獍之心有識者所不忍言無頼者實為其黨而又横征暴斂虐法峻刑藏兵器於私家殺平人於廣陌罔思悛改難議矜容宜竄逐於遐方仍歸還於姓氏俾我勲賢之族永除汚穢之風凡百臣僚宜體朕命可貶房州司户參軍同正兼勒復本姓尋賜自盡仍籍没資産周陳正者頴州鄉兵也廣順三年正月正告指揮使王懐殷謀逆鞫之誣告詔本州决杖張景陽同州郃陽州民也景陽詣闕訟節度薛懐讓不公册府元龜卷九百三十四
