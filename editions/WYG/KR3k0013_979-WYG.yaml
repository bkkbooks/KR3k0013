body:
  text: 册府元龜卷九百七十九宋王欽若等撰外臣部和親唐高宗永徽三年八月吐谷渾𢎞化長公主表請入朝遣左驍衛將軍鮮于濟往迎之十一月𢎞化長公主來朝顯慶三年冬十月庚申吐蕃贊普遣使來請婚仍獻金毬􅄢及㹈牛尾調露二年十月吐蕃文成公主遣大臣論塞調旁求告䘮并請和親帝不許之遣郎將宋令文往吐蕃㑹贊普之葬則天長壽三年二月西平大長公主還蕃公主者太宗族妹貞觀中吐蕃遣使請婚至是來朝設歸寧之禮焉臣欽若等曰按唐書太宗貞觀十五年文成公主出降吐蕃弄讚至高宗永隆元年公主卒實録所載西平大長公主檢和親事迹未獲長安二年四月吐蕃遣使獻馬千疋金二千兩以表求婚則天許之㑹贊普卒六月突厥黙啜遣使莫達干請以女妻皇太子制令皇太子男平恩王重俊義與王重明等延立見之黙啜遣大臣移力貪汗入朝獻馬千匹及方物以謝許親之意則天讌之於宿羽亭太子相王及朝集使三品已上並預㑹重賜以遣之後中宗卽位黙啜入宼靈州鳴沙縣中宗下制絶其婚中宗神龍三年四月詔以所養嗣雍王守禮女金城公主出降吐蕃贊普景龍二年四月和蕃使左驍衛大將軍楊矩奏言吐蕃先遣使來此迎公主兼學漢語今欲放還吐蕃於事不便伏望報之云其使已死帝曰凡事湏示人以信宜應實詞報之使無猜貳遂放其使還二年十一月吐蕃贊普遣其大臣尚贊吐蕃來迎女四年正月庚午制曰聖人布化用百姓為心王者垂仁以八荒無外故能光宅遐邇財成品物繇是隆周理歴啓柔逺之圖強漢乗時建和親之義斯蓋御㝢長策經邦茂範朕受命上靈克纂洪業摠三才而統極混六合以為家聲教所覃建木􅀥林之外提封爰亘弱水流沙之表悠然至道高詠薫風載戢干戈大張禮樂庶㡬前烈克致和平睠彼吐蕃僻在西服皇運之始早申朝貢太宗文武聖皇帝德侔覆載情深億兆思偃兵甲遂通姻好數十年間一方清净自文成公主往嫁其國因多變革我之邊隅亟興師旅彼之蕃落頗聞彫弊頃者及祖母可敦酋長等屢披誠欵積有歲時思託舊親請崇姻好金城公主朕之小女長自宫闈言適逺方豈不鍾念但朕為人父母志恤黎元若允誠祈更敦和好則邊上寧晏兵役休息遂割深慈為國大計受築外舘聿􅈾嘉禮彼吐蕃贊普卽以今月二十七日朕深自送於郊外帝乃召侍中紀處訥謂曰昔文成公主出降則江夏王送之卿雅識蕃情有安邊之略可為朕充此使也處訥拜謝旣而以不練邊事固辭帝又令中書侍郎趙彦昭往昭以為旣充外使恐其失權寵殊不恱司農卿趙履温私之曰公國之宰輔而為一介之使不亦鄙乎彦昭曰計將安出履温因為陰託安樂公主宻奏留之丁丑命驍衛大將軍楊矩充送金城公主使己卯幸始平縣以送金城公主辛巳設帳殿於百頃洎則引王公宰臣及吐蕃使人入宴中坐酒闌命吐蕃使進前諭以公主騃㓜割慈逺嫁之日帝悲泣􅒣欷乆之因命從臣賦詩餞别改始平為金城又改其地為鳳池鄉愴别里公主旣至吐蕃别築一城以居之睿宗景雲二年十一月突厥黙啜可汗遣使請和親詔以宋王成器女為金仙公主許嫁之黙乃遣其男楊我支特勒來朝太極元年正月帝御安福門宴之俄而帝傳位親竟不成𤣥宗先天二年七月金城公主上言吐蕃贊普之母死乃命左清道率李璥攝宗正卿持節使于吐蕃㑹葬也八月突厥遣王子楊我支來求婚以蜀王女南和縣主下嫁于楊我支降書謂可汗曰朕欲可汗恩義稠疊故與王子更重結親想可汗逺聞當喜慰也開元二年四月辛巳突厥可汗遣使上表求婚自稱曰乾和永清大駙馬天上得果報天男突厥聖天骨咄禄可汗上皇帝曰府君皇帝乙酉定公主出降十月突厥黙啜遣使求婚帝降書謂曰我與突厥素來通婚好和計之道豈是今日頃為小女且緩其期亦可汗之久無報也今者若眞心請來歲未賖任自擇日當遣公主嫁可汗遣一王子來此宿衛以申兩國之好豈不美耶十月命左驍衞郎將尉遲環使吐蕃宣恩于金城公主四年八月吐蕃請和從之賞賜金城公主及贊普錦帛器物等蕃酋皆嘉公主奉表謝恩曰金城公主奴奴言仲夏盛熱伏惟皇帝兄起居萬福御膳勝常奴奴奉見舅甥平章書云還依舊日重為和好既奉如此進止奴奴還同再生下情不勝喜躍伏蒙皇帝兄所賜信物並依數奉領謹獻金盞羚羊衫叚青長毛􅄢各一奉表以聞十二月詔曰固安縣主取來年二月五日出適奚都督李大酺湏早支料造作宜令河東少尹慕容珣充男家禮㑹使雒陽令薛曦為副少監李尚隱充女家禮㑹使河南縣令鄭璿為副五年三月吐蕃贊普又遣使奉表請和金城公主上表曰金城公主奴奴言季夏極熱伏惟皇帝兄御膳勝常奴奴甚平安願皇帝兄勿憂此間宰相向奴奴道贊普甚欲得和好亦疑親署誓文往者皇帝兄不許親署誓文奴奴降蕃事縁和好今乃搔動實將不安和矜憐奴奴逺在他國皇帝兄親署誓文亦非常事卽得兩國久長安穩伏惟念之八月詔曰故東平王外孫正議大夫復州司馬楊元嗣第七女譽叶才明體光柔順葭莩懿戚敦睦有倫蕣華靡顔德容兼茂屬賢王慕義于以賜親納女問名滋焉迨吉宜昇外舘之寵俾耀邊城之地可封永樂出降契丹松漠郡王李失活婚之夜遣諸親高品及兩蕃大首領觀花燭又詔封從外生女辛氏為固安公主出降奚王饒樂郡王李大酺是月又以史懷道女為金河公主以妻突厥騎施可汗蘇禄先是蘇禄頗善綏撫有衆二十萬遂雄西域之地尋遣使來朝三年制授左羽林軍大將軍金方道經略大使位特進遣侍御史觧忠順齎璽書册立為忠順可汗至是毎年遣使來朝獻帝乃以主妻之九年突厥黙啜遣使請和乞與帝為子許之仍請尚公主但厚賜遣之十年契丹松漠郡王鬱于入朝請婚封從妹夫帝更令慕容嘉賔女燕郡主以妻之明年鬱于死弟吐于伐立復以燕郡主妻之是年奚饒樂郡王魯蘇入朝仍以固安公主為妻而公主與嫡母不和逓相論告詔令離婚復以成安公主之女韋氏為東光公主以妻之十二年三月遣使齎絹錦八萬段分賜奚及契丹詔曰公主出降蕃王本擬安養部請入朝謁深慮勞煩朕固割恩抑而未許因加殊惠以慰逺心奚有五部落宜賜物三萬叚先給征行遊奕兵及百姓餘一萬叚與東光公主饒樂王衙官刺史縣令契丹有八部落宜賜物五萬叚其中取四萬叚先給征行有遊奕兵士及百姓餘一萬叚與燕郡公主松漠王衙官刺史縣令其物雜以絹布務令均平給訖奏聞七月突厥黙啜遣使哥觧頡利發獻方物可汗慕義向風益以嘉尚我國家金帛子女務通和親然一為婚姻將傳永久契約湏重禮數宜周今來人旣輕禮亦未足所以未定日月令其且還如和好不移誠信無改凡有所請必當不違國家信若四時恩同天地一言則定何誓如之必能結之神明彌表彼之誠契旣無猜阻任擇其宜諸所有商量今已親語哥觧更欲遣使恐致勞煩令寄可汗錦袍鈿帶銀盤胡鉼至宜領取八月謝䫻國王特勒遣使羅火㧞來朝火㧞奏曰謝䫻國去箇失宻國一千五百里其失宻國去吐蕃金城公主居處七日路程公主去年五月遣漢使二人偷道向箇失宻國傳言曰汝赤心向漢我欲走出投汝容受我否箇失宻王聞其言大喜報曰公主但來竭心以待時箇失宻王又遣使報臣國王曰天子女欲走來投我國必恐吐蕃兵馬來逐我力不敵乞兵於我卽冀吐蕃破散公主得達臣國王聞之極歡遣使許諾于箇失宻王令臣入朝面取進止帝甚然之賜帛百疋放還蕃十三年𤣥宗將東封遣中書直省袁振攝鴻臚卿往突厥告其意黙啜小殺與其妻及聞特勒瞰欲谷等環帳中設宴謂振曰吐蕃狗種唐國與之為婚奚及契丹舊是突厥之奴亦尚唐家公主突厥前後請結和親獨不蒙許何也振曰可汗旣與皇帝為子父子豈合婚姻小殺等曰兩蕃亦蒙賜姓猶得尚主但依此例有何不可且入蕃公主皆非天子之女今之所求豈問眞假頻請不得實亦羞見諸蕃振許為奏請小殺乃遣其大臣阿史得頡利發入朝貢獻扈從東廵東封廻上為頡利發設讌厚賜而遣之竟不許其和親是年契丹立李盡忠弟邵固為主其冬車駕東廵邵固詣行在所封皇從外生女陳氏為東華公主以妻之十四年正月改封契丹松漠郡王李邵固為廣化王奚饒樂郡王李魯蘇為奉誠王仍封宗室外甥女二人為公主各以妻之制曰李邵固等輸忠保塞乃誠奉國屬外中于天無逺而不届華裔靡隔等数有加宣錫休名俾承慶澤按本紀唐書與實録年月不同故兩存之十八年十月吐蕃遣其大臣各悉獵來朝請固和好之約且獻書曰伏惟皇帝舅宿親又蒙降金城公主遂和同為一家天下百姓普皆安樂中間為張𤣥表李知古等東西兩處先動兵馬侵抄吐蕃邊將所以互相征討迄至今日遂城釁隙外生以先代天成公主今金城之故深失尊卑豈敢失禮又縁年小狂被邊將䜛搆鬭亂令舅致恠伏乞垂察追留死將萬足承前数度使人入朝皆被邊將不許所以不敢自奏去冬公主遣使婁衆失力將狀專往蒙降使着公主來外生不勝喜賀謹遣使諭論各悉獵及副使押衛將軍浪些紇夜悉獵入朝取進止兩國事悉獵所共外生蕃中已處分邊將不許抄掠若有漢人來投便令却送伏望皇帝舅逺察赤心許從舊好長令百姓快樂如蒙聖恩千萬歲外生終不敢先違盟誓謹奉進金胡餅一金盤一金椀一瑪瑙杯一零羊衫叚一謹充徵國之禮金城公主又别進金鴨盤盞新品物等先是忠王友皇甫惟明因奏事面陳通和吐蕃之便帝然其言因令惟明及内侍張元方充使往聘惟明至吐蕃具宣帝意贊普等欣然請和政令各悉獵隨惟明入朝乃詔曰吐蕃向化遣使入朝旣懷舊恩請繼前好今縁公主在彼又復蕃客欲還使于四方必資德望鴻臚卿崔琳乆歴朝序備曉政途好謀而成臨事能斷俾御國命以赴蕃庭宜令持節引入吐蕃使所司准式發遣又以琳為御史大夫以奉使入蕃寵之也又降書與吐蕃贊普外生曰朕君臨㝢縣子育黎元因百姓以為心懼萬方之有罪昔文成逺嫁將以寵光彼國豈無武力蓋取曲成尋以紛紜有侵亭障重以婚姻之故旋師衽席之間又降金城以敦前好所期疆塲無壘書軌攸同更聞權在強臣遂復違約失順干戈未息道路稱歎今有使臣逺來方悉忠誠彌固舅甥之禮萬里如初恊和之勤一心逾亮義節可尚情見乎詞朕以公主在蕃親愛之極縱有違負之過詎移骨肉之恩深明至懷知得良筭至於止戈為武國之大猷懐逺以德朕之本意中外無隔夷夏混齊託聲教於殊方躋含靈于仁壽朕之深㫖來使具知劍南去年生羌就戮雖邊將有此舉動是彼使來以前自茲已後更無討襲諸軍所守侵掠並停今故使御史大夫崔琳往申信約所有陳請咸不相違并所進器物並依數領得今寄多少信物至宜領取又降書金城公主逺降殊方底寧蕃落載懷貞順之道深明去就之宜能知其人而獻其欵忠節克著嘆美良深所進物等並領得今寄公主少多信物至宜領取所請物並一依來奏文吐蕃使奏云公主請毛詩禮記左傳各一部制令秘書省冩與之正字于休烈上疏諫言不可疏奏不省二十一年二月金城公主上言請以今年九月一日樹碑于赤嶺定蕃漢兩界時李暠使于吐蕃金城度其還期暮秋故有是請及樹之日詔張守珪李行褘與吐蕃使莽布及同觀樹焉旣樹吐蕃遣其臣隨漢使分往劍南及河西磧西歴告邊州使曰兩國和好無相侵掠漢使隨蕃使入蕃告亦如之其碑文曰維大唐開元二十一年嵗次壬申舅甥修其舊好同為一家往日貞觀十年初通和好逺降文成公主入蕃已後景龍二年重為婚媾金城公主因茲降蕃自此以來萬事休帖間者邊吏不謹互有侵軼越在遐荒因之隔閡今遵永舊咸與維新帝式臧用不違厥㫖因以示赤嶺之外其所定邊界一依舊定為封守為羅斥候通關梁大矣哉皇天無私惟聖作又故違聖者逆也所以降雷霆之威率聖者順也所以漸雲雨之施休咎之理順逆之繇若斯之明矣昔先帝含𢎞愛至從聘所以一内外之禮等華夷之觀通朝覲之往來成舅甥之宴好則我先帝之德不可忘也頃者𤓰州之役宥而不討者蓋捨之先迷而歸之畜復夫恃安則逸逸則棄禮棄禮則㤀信㤀信者暴蔑之心生也故春秋時人㤀盟誓之典有如日有如河我之今日罔不稽古幽蕃臣魁渠實曰警戒無或背渟徳習凶梗侵擾我河湟窺覘我亭障無或恣業驚馳咆哮剽掠我牛馬蹂踐我農穡漢家軍領亦不得兵馬相侵我家用不奄襲爾城守覆墜爾師徒壅塞爾道路烟滅爾部落不以兵强而害義不以為利而棄言則我無爾詐爾無我虞信也司慎盟羣祀莫不聽命然後走正朔宜百福偕爾命祚泱泱乎仁夀之風矣休哉法尚一正無二正之極爾惟脩代好彌永年忠於人則信於神俾我唐受無疆之福爾亦荷有永之謀用懐爾逺人不寶爾逺物至聖之仁也銘曰言念舊好義不忒兮道路無壅烽遂息兮指河為誓子孫億兮有渝其誠神明殛兮是年七月吐蕃遣宰相論紇野賛等來朝且通和好金城公主獻表曰妹奴奴言李行褘至奉皇帝兄正月勑書伏承皇帝萬福奴惟加嘉躍今得舅甥和好永無改張天下黔庶並皆安樂然去年崔琳迴日請置府李行褘至及尚他辟迴其府事不蒙進止伏望皇帝兄商量矜奴所請吐蕃賛普獻書曰使人李行禕至奉書又尚他辟迴日所令傳語並且承命且漢與吐蕃俱是大國又復先來宿親自合同和天下蒼生悉皆快活賛揚盛徳當無盡期及至久長亦無改變恐彼此邊界黎庶不委長和慮有惡人妄生亂意請彼此差使相監從沙州已來洮州已來分明報告使無疑慮即將永定今奉皇帝金銓馬腦胡瓶羚羊衫段金銀鉼盤器等以充國信又云二十八年十一月金城公主薨吐蕃遣使來告喪公主景龍四年出降賛普既至蕃中吐蕃遣使因請河西九曲之地為金城公主湯沐邑楊矩遂奏與之吐蕃既得九曲之地草肥復懐背叛頻寇河隴開元十七年朔方大總管信安王偉率兵按石壁城大虜吐蕃於是吐蕃頻使求和詔忠王友皇甫惟明及内使張元方使于吐蕃惟明既見賛普及公主皆欣然請和盡出貞觀以來勅書以示惟明乃遣重臣各悉獵同惟明入朝賛普既獻寶物公主又獻金鴨盤雜器等物悉獵頗曉書記先是迎公主長安當時朝廷皆稱辨才及是帝引入内宴與語甚禮之詔御史大夫崔琳充使宣諭於赤嶺各分樹界碑約不相侵後吐蕃不受破之自後戰攻不息是嵗公主薨吐蕃遣使告哀仍請和不許使到數月始命有司為公主於光順門外發哀輟朝三日三十二年四月突厥遣使來朝謝婚表曰自遣使入朝已來甚好和同一無虛誑蕃漢百姓皆得一處養畜資生種田未作今許降公主皇帝即是阿助卑下是兒一種受恩更有何惡謹使可解粟必謝婚他滿達干請期獻馬四十匹充押亟天寶三載十二月封宗女為和義公主降寧逺國制曰呼韓來享位列侯王烏孫入和義通姻好懐柔之道今古攸同寧逺國奉化王驃騎大將軍爛達干志慕朝化誓為邊扞漸聲教而有孚勤職貢而無闕誠深内附禮異殊隣爰錫嘉偶特申殊渥四從弟前河南府告成縣令㕘第四女質稟幽閑性惟純懿承姆師之訓道寔宗人之光儀固可以保合戎庭克諧邦選宜膺逺好以寵名蕃可封和義公主降寧逺國奉化王四載三月封外孫女獨孤氏為靜樂公主降松漠都督崇順王李懐節封外甥女楊氏為宜芳公主出降饒樂都督懐信王李延寵九月奚及契丹酋長各殺公主舉部以叛肅宗至徳元年八月囘紇首領至請和親兼封安禄山九月封故邠王第五男承寀為燉煌王使囘紇仍令僕固懐恩送至囘紇部落請和親封囘紇女為毗加公主十月迴紇首領來朝請和親詔燉煌王承寀赴囘紇結親二年九月囘紇大首領入朝燉煌王承寀加開府儀同三司拜宗正卿納囘紇公主為妃是嵗吐蕃又遣使請和親上詔給事中南巨川以修戎好報命乾元元年六月囘紇使達亥阿波刺史入朝迎公主詔授開府儀同三司七月丁亥詔曰朕聞古之聖王臨御天下功懋受賞道無隔於華夷義存有孚信必全於終始故能徳被寰宇化延殊俗是以周稱柔逺克著濟時之圖漢結和親式𢎞長久之䇿繇來尚矣朕抵若元命永惟稽古内申九命勉膺嗣夏之期外接百蠻庶廣懐荒之澤頃自兇渠作亂宗社阽危回紇時表忠誠載懐奉國所以兵踰絶漠力徇中原亟除青犢之妖實賴烏孫之助而先有情欵永固姻好今兩京抵定百度惟貞奉皇輿而載寧纉鴻業而攸重斯言可復厥徳難忘爰申降主之禮用答勤王之志且骨肉之愛人情所鍾離逺之懐天屬尤切況將適異域寧忘軫念但上緣社稷下為黎元遂抑沐慈為國大計是用築慈外舘割白中闌將成萬里之婚莫定四方之業以其誠信所立家國攸寧義以制名飾崇寵號宜以幼女封為寧國公主應緣禮㑹所司准式其降蕃日仍令堂弟銀青光禄大夫殿中監漢中郡王瑀充冊命英武威逺毗伽可汗使以堂姪正議大夫行右司郎中上柱國上邽縣公賜紫金魚袋巽為副特差重臣開府儀同三司尚書左僕射冀國公裴冕送至界首凡百姓臣庶宜悉朕懐戊子漢中郡王瑀加特進太常卿攝御史大夫右司郎中巽改尚書兵部郎中兼御史中丞鴻臚少卿兼充寧國公主禮㑹使癸巳以冊立囘紇英武威逺毗伽可汗帝御宣政殿漢中王瑀受命甲子帝送寧國公主咸陽磁門驛十一月甲子回紇使三婦人謝寧國公主之聘也寧國公主既降迴紇又以榮王女媵之及寧國來歸榮王女為可敦迴紇號為小寧國公主厯英武英威二可汗及天親可汗出居於外英威一子為天親所殺三年正月回紇可汗使大臣俱六莫賀達干等入朝奉表起居公主代宗大厯四年五月冊僕固懐恩小女為崇徽公主視同第十女下嫁囘紇可汗為可敦遣兵部侍郎李􅉼兼御史大夫持節于囘紇冊可敦以繒帛二萬疋遣之六月丁酉崇徽公主辭赴囘紇宰臣已下百寮送至中渭橋徳宗貞元三年八月丁酉囘鶻可汗遣首領啜達干多覽將將軍合關達干等來貢方物且請和親帝許以咸安公主嫁之命見于麟徳殿且令齎公主畫圖就示可汗以馬價絹五萬還之許互市而去四年十月戊子囘紇寧國公主及使至帝御延喜門觀之禁婦人及車輿觀者時迴紇可汗喜於和親其禮甚恭上言昔為兄弟今為子聓子聓半子也此猶父彼猶子若患西戎子當除之又罵辱吐蕃使者及使宰相等率衆千餘及其妹骨咄禄毗伽公主姨妹迷外骨咄禄公主及職使大首領等妻妾凡五十六婦人來迎可敦凡遣人千餘納聘馬三千匹帝令朔州及太原分留七百匹其宰首領皆至分舘鴻臚將作癸巳使見於宣政殿乙未帝召囘紇公主及使者對於麟徳殿各有頒賜庚子詔以咸安公主出降囘紇可汗仍特置官屬視親王壬寅以殿中監嗣滕王湛然為咸安公主婚禮使十一月乙巳加嗣滕王湛然檢校禮部尚書兼御史大夫丁未加送咸安公主及冊囘紇可汗使關播檢校右僕射公主帝第八女也初王師平史朝義北虜微有功恃此不脩蕃臣禮至是囘紇武義成功可汗始遣使獻方物仍求結親并請改紇字為鶻帝與宰相議許之以公主降焉今使冊可汗為勇猛分相智惠長受天親可汗冊公主為孝順端正智慧長夀可敦御製詩送之天親可汗卒子忠身可汗立忠身卒奉誠可汗立奉誠卒國人立其相是為懐信可汗皆從胡法繼尚公主憲宗元和八年囘鶻遣使伊難珠來請和親十二年囘鶻又遣摩尼僧寺等八人至帝使有司計之禮費約五百萬貫時方内有誅討計時度費未遂其請以摩尼常為囘鶻信奉使宰臣言其不可詔宗正少卿李誠使于囘鶻太常博士殷侑副之諭其來請之意穆宗即位初囘鶻遣使合達干等來請和親許之長慶元年五月丙申囘鶻都督宰相公主摩尼等五百七十三人入朝迎公主詔於鴻臚寺安置癸亥勅太和公主出降囘鶻為可敦宜令中書舍人王起赴鴻臚寺宣示之初囘鶻自咸安公主殁後屢歸欵請欲繼前好久未之許至元和末其請彌切憲宗以北虜有勲勞於王家又西戎比嵗為邊患遂許以女妻之帝即位踰年至是乃封第十妹為太和長公主出降之甲子以左金吾衞大將軍胡証檢校戸部尚書持節充送公主入囘鶻及加冊可汗使光禄寺卿李憲加兼御史中丞充副使太常博士殷侑改殿中侍御史充判官以前曹州刺史李鋭為太府卿兼御史大夫持節赴囘鶻充婚禮使宗正少卿嗣寧王子鴻兼御史中丞充副使以虞部員外郎陳鴻為判官六月乙亥加李憲御史大夫戊寅囘鶻奏以一萬騎出北庭一萬騎出安西柘吐蕃以迎太和長公主歸國丙戌太和長公主出降囘鶻宜特置府其官屬宜准親王府例七月乙夘正衙冊太和長公主為囘鶻可敦辛酉長公主發赴囘鶻國帝以半仗御通化門臨送百僚章敬寺前立班儀衞頗盛士女傾城觀焉十月豐州奏囘鶻五百騎至界首以迎公主十一月甲寅振武節度使張惟清奏准詔發兵三千人赴蔚州數内已發一千人訖餘二千人待太和公主出界即發遣又奏得天徳軍轉牒云囘鶻七百六十人將馳馬及車相次至黄盧泉迎公主豐州刺史李佑奏迎公主囘鶻三千騎於栁泉下營二年正月癸夘駙馬都尉鄭何送太和公主至囘鶻還十月金吾大將軍胡証送太和公主還初公主囘鶻牙帳尚可信宿可汗遣數百騎來請與公主先從他道去胡証曰不可虜使曰前咸安公主來時去花門數百里即先去今何獨拒我証曰我奉天子詔送公主以授可汗今未見可汗豈宜先往虜使乃止既至虜廷乃擇吉日冊公主為囘鶻可敦可汗先昇樓東嚮坐設氊幄於樓下以居公主使羣胡主教公主以胡法公主始解唐服而衣胡衣以一嫗侍出樓前西嚮拜可汗坐而視公主再俯拜訖復入氊幄中解前所服而被可敦服通裾大襦皆茜色金飾冠如角前指復出樓前俯拜可汗如初禮虜先設大輿曲扆廡前設小座相者引出公主昇輿囘鶻九相分負其輿隨日右轉於廷者九公主乃降輿昇樓與可汗俱東嚮坐自是臣下朝拜謁并拜可敦可敦自有牙帳命二相公出入帳中証等將歸可敦宴之帳中留連號啼者竟日可汗因贈漢使以厚貺冊府元龜卷九百七十九
