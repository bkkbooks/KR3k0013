body:
  text: 冊府元龜卷一百四宋王欽若等撰帝王部訪問王者作民父母富有寰海念九圍之至廣當萬機之且繁若非明四目逹四聰詢於芻蕘延夫雋造或西清之閒燕或宣室之論思博採風謡廣求民瘼則何以察牧守之亷濁覽古今之廢興究洪範之㫖以叙彝倫探治化之典以益神智加夫納讜議為治平之本誡諂䛕乃䘮亂之源俾上心繇是下浹下情得以上通靡不繇斯道也書曰好問則裕自用則小葢百王之攸戒者矣舜好問而好察邇言邇近也近言而善易以進人察察而用也周武王既克殷訪箕子曰於乎維天隂隲下民相協厥居天不言而黙定下民助合其居使有常生之資也我不知其􅂜倫攸叙言我不知天所以定民之常道次序何繇箕子對曰在昔鯀湮洪水汨陳其五行湮塞汨亂也治水失道是亂陳五行帝乃震怒不􅂌洪範九疇彛倫攸斁帝天也天以鯀如是乃震動其威怒不與天道大法九類言王問所繇敗也鯀則殛死禹乃嗣興春秋傳曰舜之誅也殛鯀其舉也興禹天乃錫禹洪範九疇彛倫攸叙天與禹雒出書也神龜負文而出列於背有數至於九禹遂因而第之以成九類成王問政於尹逸曰吾何徳之行尹佚史佚也而民親其上對曰使之時而敬順之王曰其度安至曰如臨深淵如履薄氷王曰懼哉王人乎尹逸曰天地之間四海之内善之則吾畜也不善則吾讐也昔夏商之時臣反讐桀紂而臣湯武宿沙之民皆自攻其君而歸神農伏羲神農之間有共工宿沙霸天下者也此世之所明知也如何其無懼也漢景帝時袁盎為吳相病免雖居家帝時使人問籌䇿武帝時魯人申公見帝帝問以治亂之事申公已八十餘老對曰為治不在多言顧力行何如耳董仲舒為江都相廢在家朝廷如有大議使使者及廷尉張湯就其家而問之其對皆有法宣帝時趙充國為右將軍罷就第朝廷每有四夷大議常與參兵謀問籌䇿焉元帝時京房為郎永光建昭間西羌反日蝕又久眚亡光隂霧不精精謂日光清明也房數上疏先言其將然屢中天子悅之數召見問房成帝建始三年冬日食地震同日俱發詔舉方正直言極諫之士帝特復問太常丞谷永永對曰日食地震皇后貴妾専寵所致後永為凉州刺史當之部時有黑龍見東萊帝使尚書問永受所欲言元延元年永為北地太守時有災異尤數永當之官帝使衛尉淳于長受永所欲言後漢光武數引公卿郎將列於禁坐禁坐猶御坐也廣求民瘼觀納風謡又嘗召見諸郡計吏問其風土及前後守令能否蜀郡計掾樊顯進曰漁陽太守張堪昔在蜀郡其仁以惠下威能討姦前公孫述破時珍寳山積捲握之物足富十世而堪去職之日乗折轅車布被囊而已帝聞良久歎息拜魚復長魚復縣屬巴郡張純為五官中郎將明習故事建武初每有疑議輙以訪純後兼虎賁中郎將數被引見一日或至數四范升為博士數詔引見每有大議輙訪問明帝時竇固代魏應為大鴻臚帝以其曉習邊事每被訪問楊仁補北宮衛士令明帝引見問當世政迹仁對以寛和任賢抑除驕戚為先順帝時楊厚為侍中特蒙引見訪以時政桓帝時劉渉河間欒城人為侍中虎賁中郎桓帝以渉宗室之賢特加敬異每有疑事嘗宻諮問之魏文帝時臧霸為執金吾位特進每有軍事嘗諮訪焉王肅為祕書監明帝嘗問曰漢桓帝時白馬令李雲上書言帝者諦也是帝欲不諦當何得不死肅對曰但為言失逆順之節原其本意皆欲盡心念存補國且帝者之威過於雷霆殺一匹夫無異螻蟻寛而宥之可以示容受切言廣徳宇於天下故臣以為殺之未必為是也帝又問司馬遷以受刑之故内懐隱切著史記非貶孝武令人切齒對曰司馬遷記事不虛美不隱惡劉向揚雄服其善記事有良史之才謂之實録漢武帝聞其􅄒史記取孝景及已本紀覽之於是大怒削而投之於今此兩紀有録無書後遭李陵事遂下遷蠶室此為隱切在孝武而不在於史遷也髙堂隆為侍中領太史令崇華殿災明帝詔問隆此何咎於禮寧有祈禳之義乎對曰夫災變之發皆所以明教誡也惟率禮修徳可以勝之易傳曰上不儉下不節孽火燒其室又曰君高其室天火為災此人君苟餙宮室不知百姓空竭故天應之以旱火從高殿上起也上天降鍳故譴告陛下宜増崇人道以答天意昔太戊有桑榖生於朝武丁有雊雉登於鼎皆聞災恐懼側身修徳三年之後逺夷朝貢故號曰中宗高宗此則前代之明鍳也今案舊占災火之發皆以臺榭宮室為誡然今宮室之所以尤廣者實繇宮人猥多之故宜簡擇留其淑懿如周之制罷省其餘此則祖乙之所以訓高宗高宗之所以享逺號也詔問隆吾聞漢武帝時栢梁災而大起宫殿以厭之其義云何隆對曰臣聞西京栢梁既災越巫陳方建章是經以厭火祥乃夷越之巫所為非聖賢之明訓也五行志曰栢梁災其後有江充巫蠱衛太子之事如志之言越巫建章無所厭也孔子曰災者修徳應行精祲相感以戒人君是以聖主覩災責躬退而修徳以消復之今宜罷散民役宫室之制務從約節内足以待風雨外足以講禮儀清掃所災之處不敢於此有所立作萐莆嘉禾必生此地以報陛下䖍恭之徳豈可疲民之力竭民之財實非所以致符瑞而懐逺人也帝遂復崇華殿時郡國有九龍見故改曰九龍殿陵霄闕始搆有鵲巢其上帝以問隆對曰詩云維鵲有巢維鳩居之今興宫室起陵霄闕而鵲巢之此宫室未成不得居之象也天意若曰宫室未成將有他姓制御之斯乃上天之戒也夫天道無親惟與善人不可不深防不可不深慮夏商之季皆繼體也不欽承上天之明命惟讒諂是從廢徳適欲故其亡也忽焉太戊武丁覩災竦懼祗承天戒故其興也勃焉今若休罷百役儉以足用増崇徳政動遵帝制則除普天之所患興兆民之所利三王可四五帝可六豈惟殷宗轉禍為福而已哉臣備腹心苟可以繁祉聖躬安存社稷臣雖灰身破族猶生之年也豈憚忤逆之災而令陛下不聞至言乎於是帝改容動色晉武帝時曹志為國子博士志陳思王植子帝嘗閱六代論問志曰是卿先王所作邪志對曰先王有手所作目録請歸尋按還奏曰按録無此帝曰誰作志曰以臣所聞是臣族父冏所作以先王文高名著欲令書傳於後是以假託帝曰古來亦多有是顧謂公卿曰父子證明足以為審自今已後可無復疑鄭黙為散騎常侍武帝問以政事對曰勸稼穡務農桑為國之具選人得才濟世之道居官久職政事之宜明慎黜陟勸戒之繇崇尚儒素化道之本如此而已矣帝善之明帝時侍中王導侍坐帝問前世所以得天下導乃陳帝創業之始及文帝末高貴鄉公事帝以面覆牀曰若如公言晉祚復安得長逺穆帝時虞喜博學累以博士常侍徵不就永和初有司奏稱十月殷祭京兆府君當遷祧室征西豫章潁川三府君初毁主内外博議不能決時喜在㑹稽朝廷遣就喜諮訪焉後魏道武時李先為博士帝問先曰天下何者最善可以益人神智先對曰唯有經書三皇五帝治化之典可以補王者神智又問曰天下書籍凡有幾何朕欲集之如何可備對曰伏羲創制帝王相承以至於今世傳國記天之祕緯不可計數陛下誠欲集之嚴制天下諸州郡縣搜索備送主之所好集亦不難帝於是班制天下經籍稍集崔𤣥伯為黄門侍郎道武幸鄴厯問故事於𤣥伯應對若流帝善之帝又引問古今舊事王者制度治世之則𤣥伯陳古人亦或譏作者之體及明君賢臣往代廢興之繇甚合帝意孝文太和十三年二月庚子引諸臣訪政道得失損益之宜李沖為南部尚書時議禮儀議律令潤餙辭㫖刋定輕重孝文雖自下筆無不訪決焉髙祐為祕書令孝文從容問祐曰比水旱不調五榖不熟何以止災而致豐稔對曰昔堯湯之運不能去陽九之㑹陛下道同前聖如其小旱何但當旌賢佐政敬授民時則災自消禳矣又問止盜之方祐曰昔宋均樹徳猛獸不過其鄉卓茂善教蝗虫不入其境彼盜賊者人也苟訓之有方寧不易息當須守宰貞良則盜止矣韓顯宗為中書侍郎後與員外郎崔逸等參定朝儀孝文曽詔諸官曰自近代已來髙卑出身皆有常分朕意一以為可復以為不可宜相與量之李沖對曰未審上古已來置官列位為欲為膏梁子弟為欲益治賛時帝曰自然為治沖曰若欲為治陛下今日何為専崇門品不有㧞才之詔帝曰苟有殊人之伎不患不知然君子之門假使無當世之用者要自徳行純篤朕是以用之沖曰傅嵓呂望豈可以門地見舉帝曰如此濟世者希祕書令李彪曰師旅寡少未足為援意有所懐不敢盡言於聖日陛下若専以門地不審魯之三卿孰若四科帝曰猶如向解顯宗進曰陛下光宅雒邑百禮惟新國之典章指此一選臣既學識浮淺不能援引古今以證此議且以國事論不審侍中祕書監令之子必為祕書郎頃來為監令者子皆可為不帝曰卿何不論當世膏腴為監令者顯宗曰陛下以物不可類不應以貴承貴以賤襲賤帝曰若有高明卓爾才具超出者朕亦不拘此例後為本州中正後周武帝時于翼為安州總管建徳四年帝将東伐朝中未有知者遣納言盧韞等前後乗驛三詣翼問䇿焉翼賛成之唐太宗貞觀元年閏三月壬申帝謂蕭瑀曰朕少好弓矢自謂能盡其妙近得良弓十數以示弓工弓工乃曰皆非良材也朕問其故工曰木心不正則脉理皆邪弓雖剛勁而遣箭不直非良弓也朕始悟焉朕以弧矢定四方用弓多矣而有天下日淺為治之意固未及弓弓猶失之何况於治乎自是亟延􅂄老問之政術京官五品已上更宿中書内省每延與語詢訪外事務知百姓疾苦政教之得失焉丙子太子少保李綱進謁帝以其年老令在左右扶之命與同坐訪以致治安民之道綱對曰伏見陛下徳化天下既就昇平老臣愚淺誠無所及帝固問之因言曰假臣三兩日當更奏上十二年九月帝顧謂侍臣曰帝王之業也草創與守文孰難司空房𤣥齡進對曰天地草昧羣雄競起攻破乃平戰勝乃克繇此言之草創為難至如守文惟在心耳心若行善何難之云侍中魏徵對曰帝王之起必承衰亂覆滅昏狡百姓樂推四海歸命天授人與飜為不難然既得之後志趣驕逸百姓樂靜而行役不休百姓凋殘而役務不息有國之弊嘗繇是起以斯而言守文為難帝曰昔房𤣥齡從我定天下備嘗辛苦出萬死而遇一生所以見草創之難也魏徵日與我安天下慮生驕逸之端必陷危亡之地所以見守文之難也今草創之難既已往矣守文之難者當思與公等慎之𤣥齡等拜手曰陛下發徳音臣等不勝欣慶十五年二月帝謂侍臣曰守天下難易魏徵曰甚難帝曰任賢能受諫諍即可何謂為難徵曰自古帝王在憂危之間則任賢受諫及至安樂心懐寛怠恃安樂而欲寛怠言事者唯令兢懼安而能懼豈不為難九月癸酉詔集刺史以上升殿親問之曰卿等在州何以撫教定州刺史薛獻對曰老者國家所敬臣每存恤之少者國家所養臣每勸戒之田疇雖荒漸加墾闢禮義既行産業咸振此皆禀之聖化非臣等之力帝曰如公之所奏足稱循良清淨為政朕所望於公等也十月帝問特進魏徵曰朕為人主仰止前烈至於積徳累仁豐功厚利四者帝王以為稱首朕皆庶幾自勉之苦不能自見不知於朕之身何等為優徵曰徳仁功利陛下兼而有之然内平禍亂外除戎狄是陛下之功安堵黎元各有生業是陛下之利繇此言之功利居多耳十六年八月丁酉帝謂侍臣曰當今國家何等最急各為我言之中書侍郎岑文本曰傳稱道之以徳齊之以禮繇斯而言禮也為急高宗永徽五年四月帝問侍臣曰隋煬帝既承文帝之後人心已定遂爾狼狽當時朝臣亦有諫不太尉無忌對曰當時亦有諫者煬帝不能用向揚州日有兩人諫竝寘極法帝又問曰三品以上亦有諫者不無忌對曰三品縱有諫諍外人多不知蘇威獻五子之歌亦為極諫遂三葉除名至如宇文述等既見寵佞拒諫末年全無敢言者化及反後殺虞世基裴藴責其不諫藴對化及曰公先人好佞故諫不行耳此是天将廢隋長其為惡故不諫以至于亡帝嗟嘆久之顯慶元年四月帝謂侍臣曰馭下之道前王深以為難朕思育黎庶計古先帝王應有其要公等可思此術為我具論之中書令來濟對曰臣聞齊桓公出遊見一饑寒老人命食之老人曰請遺天下食公遣遺衣老人曰請遺天下衣桓公曰府庫有限安能周及老人曰君能春不奪農時人即有食夏不奪桑務人即足衣繇此言之省其徭役人自安矣近者為山東役丁年别有數萬人将煩擾取庸雇人復恐非宜臣望量事遣之天下幸甚帝從之三年十月帝因於古長安城遊覽問侍臣曰朕觀故城舊基宮室似與百姓雜居自秦漢已來幾代都此侍中許敬宗對曰秦都咸陽郭邑連跨渭水故云渭水貫都以象天河至漢惠帝始築此城其後苻堅姚萇後周並都之帝又問昆明池是漢武帝何年中開鑿敬宗對曰武帝遣使通西南夷而為昆明滇池所閉欲伐昆明國故因鎬之舊澤以穿池用習水戰元狩三年事也帝因令敬宗與𢎞文學士具檢秦漢已來厯代宮室處所以奏其年代麟徳二年三月帝謂侍臣曰吾聞隋煬帝廵遊無度志在華侈不憂人力供頓之外獻食者多州縣官人更相誇尚所進之餘埋之於野此事虛實煬帝亦頗知乎許敬宗曰隋時李安期家有一孔雀卵遂貴買以充獻食自此競覔珍竒無所愛恡咸亨三年四月帝問中書令閻立本黄門侍郎郝處俊伊尹負鼎爼于湯應是補緝時政不鑄鼎所縁復在何國将為國之重器厯代傳寳立本以古義對𤣥宗開元五年正月将幸東都而太廟屋壊帝召宋璟蘇頲問其故璟等奏言陛下三年之制未畢誠不可行幸且停幸東都帝又召姚崇問曰朕臨發京邑太廟無故摧壊恐神靈誡以東行不便邪崇對曰太廟殿屋本是苻堅時所造隋文帝創立新都移宇文廟故殿造此廟國家又因隋舊制歲月滋深朽蠧而毁山有朽壊尚不免摧既久來枯木合時摧折偶與行期相㑹不是縁行乃摧以臣愚見舊廟既朽爛不堪修理望移神主於太極殿安置更改造新殿以申誠敬車駕依前徑發帝曰卿言正合朕意乃幸東都天寳二年十一月天下諸州朝集使見於温泉宮勑曰古者諸侯歲時朝覲将以陳其政理用申考績今卿等受委親民逺來㑹計經途冐渉曽並安好朕每憂勤念兹黎庶憫其徭役未遑流寓莫歸是以當宁興嘆中宵忘寝永言共理實冀分憂凡有百姓及鰥寡孤獨并乏絶之戸征鎮之家凡可矜恤卿等此來若何為養今年稼穡大率少似不豐閭閻之間有貯積否至於百姓間事朕欲委曲盡聞卿等逺來疲勞卒難備對且聽尋親知續當序進以問風化代宗寳應元年十月元帥雍王帥師東討帝御延英殿大㑹南北軍諸将問以東征之事帝曰安不忘危前王所戒脫有不利卿等以為何如諸将咸曰睿謀先定軍必大捷帝曰逆豎負恩滅義殘害生人宗廟之靈亦宜授首以朕薄徳敢望殊勲所頼一二爪牙共成功業居安之慮祗畏良深卿等並藴将畧豈無所見開府儀同三司管崇嗣進曰元帥親征囘紇助我保有萬勝願陛下勿以為憂帝曰是何言哉卿固未足以論右金吾大将軍薛景先進曰臣素無䇿畧儻或退衂臣願募勇士一二萬人摧鋒先死耳帝曰忠壯之言也卿昔鳯翔之功何嘗一日忘之左金吾大将軍長孫全緒進曰陛下憂深謀逺詢于芻蕘臣愚以為賊若出城交戰破之必矣若入河陽城不得與戰回紇不曉攻城相持旬月則恐離貳須先為之圖何者賊已受圍官軍且休養士卒張勢以守之或以交鋒賊自然退陳留援絶河北氣沮乃分命光弼等軍南取汴州抱玉等軍往收河北不出旬日必捷書繼至是先斷其手足也然後縱間城中元惡之與脅從必相疑貳則殄滅之勢固可知也帝曰卿言甚善可條以進來遂命同關陜太等州軍戒嚴徳宗貞元中張建封為徐泗濠等州節度來朝京師時詔書務免百姓諸色逋欠錢物等帝以問建封奏曰凡逋欠錢物皆是累年積月無可徵收今雖下此詔百姓亦無裨益時河東節度李說華州刺史盧徵皆中風疾口不能言足不能行但信左右胥吏以為政建封皆奏之帝嘉焉憲宗元和二年七月謂宰臣曰當今政教所施何者為急李吉甫對曰為政所急諒非一端自非事舉其中固不可臻於至理然國以人為本親人之任莫先牧宰寔繋一方若廉察得人委之臨列羣臣承式政化自宣苟或非才為蠧實甚繇是而言觀察刺史之任為切自昔唐虞三載考績三考黜陟故得久於其事風化可成而末代命官多輕外任選授之際意存沙汰委以藩部自然非才刺史數廣益非選擇加以更代促遽人無安志迎送之費竭耗不供此最為弊聖慮所及實窮政本伏望慎守良制改革前失則四海蒙福人無苟且之心矣帝深然之三年十一月帝問宰臣為理之要裴垍對曰先正其心帝深然之六年三月帝謂宰臣曰為政寛急何先權徳輿對曰聖王設刑法本以佐徳化期於無刑仲尼有云政寛則民慢慢則糺之以猛猛則民殘殘則施之以寛寛以濟猛猛以濟寛政是以和古人有云上失其道民散久矣如得其情則哀矜而勿喜聖賢折獄衆疑之罪與五刑之疑皆赦是以有流宥之典有金贖之制所貴導徳齊禮不務威刑秦任法律視人如草芥及趙高傅胡亥教以刑法不斬劓人則夷人之三族即位未幾天下大潰漢興高祖除秦苛制與人約法三章文景二帝恭儉愛人始蠲去肉刑惻隱之教洽于人心當時風俗敦朴公卿恥言人過刑獄衰息國家自高祖革隋以寛代虐及太宗文皇帝大聖至仁見明堂圖始禁鞭背之制列聖承遵徳厚成俗是以雖天寳季年大盜連起以及建中河朔悖亂皆坐自擒滅人心歸於本朝此誠厚下感恩之所致也帝曰朕嘗讀貞觀政要見太宗文皇帝立言行事動本至仁當時四海欣戴以致昇平後代雖有拒命之臣不能動衆實寛仁所致誠符公等之言也此既為政大本當與公等同心務之徳輿等拜賀而出七年二月癸巳帝謂宰臣曰卜筮之事聖賢亦固言之然當時習者或中或否聞近俗尤崇此術何也李絳對曰臣聞古先聖王設卜筮者葢以畏天命不敢専是以将有為有行或有大疑必先謀及於心及卿士及庶人然後卜筮五者皆從謂之大同三從二逆亦可興事葢以叅考天人用彰大順又以聰明英爽不貳以典司之令蓍龜必以誠既得象又究以極數叅諸人謀然後能中故卜筮可以示人不可以助於教虞書所謂朕志先定詢謀僉同鬼神其依龜筮叶從明先誠也春秋左氏傳述穆姜将之東宮史卜之曰吉姜自諗之曰㓙竟如其言明實不與兆協也語曰人而無恒不可以作巫醫詩云我龜既厭不我告猶明黷神也必卜至誠應順之事而聰明精微者執之然後能至焉末俗浮偽幸以徼福正行慮危邪謀覬勝持疑昏惑謂小數能決之而愚夫愚婦假時日鬼神者欲利欺詐叅之見聞用以刺射小近之事舉衆神而異之繇是風俗近巫流蕩忘返此誠弊俗也聖㫖所及實辨邪源但存而不論弊斯息矣且傳曰吉㓙繇人書曰惠廸吉從逆㓙如影響又曰天道福善禍淫易曰履信思乎順又以尚賢自天祐之吉無不利視履考祥休咎可知矣豈候愚人小數欺誕之說以邀無妄之福乎上深然其言九年九月己亥帝謂宰臣曰朕頃在籓邸常見侍讀言及建中歲朱泚盜據宮闕徳宗皇帝播遷梁漢累月艱危鑾輿乃復每用追憤至今不忘然未言賊臣兆亂之繇卿等詳記之否李吉甫對曰徳宗皇帝建中之初躬行慈儉首任崔祐甫為宰相推誠託付動遵正道損乗輿車服減太官常膳罷竒巧鷹犬之貢外國獻馴象以為勞費傷物之性放之於江澤聽覽萬機孜孜不怠於時四方企望至理及祐甫殁而繼其任者或非其人忠諍不聞小人乗間邀功求便以苟媚當時以為河朔未賔宜用力取甘言先入主聽致惑是時討李希烈物力已耗趙賛司國計纎𤨏削急曽無逺慮以為國用不足宜賦取於下以資軍蓄與諫官陳京等更陳計䇿賛請稅京師居人室宅據其間架差等計入陳京又請籍列肆商賈資産以分數借之宰相同為欺㒺遂行其計及詔出之後中外沸騰人懐怨誹時又配王公已下及常在方鎮之家僮及馬以助征行公私囂然矣朱泚前自范陽入覲已嘗厯隴州節度統卒備邊此際初罷鎮在京素蓄姦謀又窺時病建中四年十月詔徵涇原兵數千東討希烈使姚令言主之軍次滻川有司供頓當肉食皆給蔬菜兵士素憚東征又怨刻薄遂偶語竊忿漸至喧呼令言號令止之衆又不聽遂彎弓射令言不中令言馳入上變而亂軍遂斬關皷譟入城徳宗聞難作遽以數百騎與順宗西趣奉天京師震駭而亂軍迎泚稱尊號公卿已下狼狽奔赴行在為賊屠戮或累日不食既逹奉天賊泚遂自㓂縣城雲梯地道百端競作頼渾瑊為将設拒而李懐光自河朔擁兵數萬來援賊乃解圍而懐光又以勢逼自疑旋肆醜言徳宗懼其與賊通謀一夕赴梁漢以深阻自固明年五月李晟自渭橋收京師輿駕乃旋山東諸将聞京師亂各還軍而希烈益熾懐光又據河中叛歲餘乃剪滅于時天下至危畧無寧處因之蝗蟲為災斗米至一千二百人或相食饑旱之災於此為甚徳宗乃下哀痛之詔責躬諭衆人心稍安徵其亂階實繇輕用兵又信小人剥下之言以至危亂古人譬兵猶火不戢自焚又曰長國家而務財用者必自小人使之為國家災害竝至與其有聚歛之臣寧有盗臣誠以其為上歛怨也陛下為理勵精深究理道追念前朝之失用為元龜居安思危實天下幸甚帝嗟嘆數四稱陳京趙賛為賊臣者久之十一年正月以淮西久宿兵詔宰臣集百寮議今用兵已久利害相半不知進兵攻討退兵固守至於赦宥合有良規直言可行不必引古亦欲觀卿士才用宜各具議狀以聞十三年六月甲寅集文武百寮于中書勑李師道潜包逆心偽陳誠懇縁自淮西用兵已後愆釁屢起累有疏陳請捨兇逆隂通信使數致帛書又逆黨訾嘉珍等飜取兇徒謀燒雒邑中使李重秀宣諭到本道又縱官健凌暴況又聞近去十年六月傷害宰輔之事端本實啟潜謀凡此罪名皆當不赦師道自知過咎難掩羣言累遣崔承寵王𤣥同将表請令長子入侍兼獻沂宻海三州今忽飜然盡變前意應所陳列無非妄言其師道并軍将健兒表共三道語頗悖慢宜出宣示遂命百寮議可征可赦以聞十四年三月帝謂宰臣曰聽受之間大是難事推誠選任謂所任委者必合悉心及至臨事亦聞皆有頗曲朕臨御已來歲月漸久雖不明不敏然見物理漸詳每欲於事察審比令學士編録古今疑謗相類者成一書昨已披閱見曖昧似是之事頗為鑒戒崔羣等奏曰無情曲直辨之實難孔子所謂衆好之衆惡之必察焉誠以巧言浸潤微昧難覺故古之鞫獄皆五聽三訊慮其寃誣擇賢任之嚴法斷之使人務誠直理歸公正則亦何繇致蔽偽也陛下覽古今惑聽之說以廣聰明鑒往慎來實天下幸甚穆宗長慶元年正月帝饗太廟禮畢復齋於郊壇行宮出朱雀門命宰臣行馳道中以備顧問八月帝謂宰臣曰國家貞觀中致理和平葢太宗文皇帝躬行至徳以啟王業及至開元累有内難𤣥宗臨御興復不易而一朝聲名最盛厯年最久何以致之也崔植對曰前代創業之君多起自民間知百姓疾苦初致丕業皆能勵精太宗皇帝又特禀上聖之資同符堯舜是以貞觀一朝四海寧泰又有房𤣥齡杜如晦魏徵王珪之軰為輔佐股肱動得直言事無不理主聖臣賢固當如此𤣥宗雖守文繼體常經天后朝夕危懼久遘危難開元初得宋璟姚崇委之為政此二人皆上才正直動必推公又每盡忠言致君於道璟嘗自寫尚書無逸一篇為圖以獻𤣥宗置之内殿出入觀省咸記在心每歎古人至言後代莫及故任賢戒欲朝夕孜孜開元之末因無逸圖損壊始以山水圖代之自後既無座右箴規又姦臣用事希恩養育訖于天寳實兆亂萌建中初徳宗皇帝嘗問先臣開元天寳間事先臣具以此事陳奏臣在童丱即聞其說信知古人以韋弦作戒其益𢎞多陛下既留神思理伏望亦以無逸為元龜則天下幸甚帝深善其言十一月帝謂宰臣曰前史稱漢文帝惜十家之産而罷露臺又云身衣弋綈履革舄集上書囊以為殿帷何太儉也信有此乎崔植對曰良史所記必非妄言漢興承亡秦暴酷之後項氏戰爭之餘海内彫詘生人勞疲漢文仁明之主起自代邸知稼穡之艱難是以即位之後躬行儉約繼以景帝亦遵此風繇是海内之人咸樂其生家給户足迨至武帝公私殷富用能出師征伐威行四方錢至貫朽粟至紅腐上下侈靡資用復竭末年稅及舟車人不聊生户口減半乃下哀痛之詔封丞相為富民侯史皆記之固是實事且蠶耕之勤出自人力用之無節何繇以致富彊據武帝嗣位之初物力豐殷前代無比固當因文帝儉約之致也帝曰卿言善但患行之為難耳二年帝謂兵部侍郎薛放曰為學經史何先放對曰經者古先聖人至言多仲尼所發明皆天人之至理誠萬代不刋之典也史則厯記成敗雜書善惡各録當時之事亦足以鑑其興亡然得失相叅是非無所凖的固不可與六籍為比倫也帝曰六經所上不一志學之士白首不能盡道如何得其意要乎對曰論語者六經之華孝經者人倫之本窮理之要真可為聖人至言是以漢朝論語首列學官光武令虎賁之士皆習孝經𤣥宗親為孝經注解皆使當時大理四海久安葢人知孝慈氣感和樂之所致也帝曰聖人謂孝經為至徳要道其信然矣文宗即位召見太子太傅趙宗儒訪以理道對曰堯舜之化慈儉而已陛下守而勿失帝嘉納之開成元年五月乙卯帝御紫宸殿問宰臣曰為政之道自古所難李石對曰朝廷法令行即理臣聞文王陟降在上陛下推赤誠上逹于天何憂不理帝曰至理繇人為復繇時李固言曰陛下求理之心天所降也行之即為時運鄭覃曰繇聖帝繇忠臣是皆繇人石曰亦繇時運且九廟聖靈鍾徳於陛下乃時也陛下行己之道則是繇人若言盡繇人則前代帝王盡有徳行者當亂離不可制止之時又焉得不繇運帝然之二年二月帝御紫宸殿謂宰臣鄭覃李固言李石曰順宗實録似未詳實史官韓愈不是當時人否石曰韓愈貞元末屈為四門博士帝曰司馬遷與任安書全是怨望所以漢武本紀事多不實覃曰漢武中年後大發戎馬拓土開邊生人耗竭糧饟不給本紀所述亦非過言石曰史筆不直率多無後鄭覃所陳志在幾諫欲陛下究竟盛徳故言漢武不屈帝曰靡不有初鮮克有終此誠可為戒覃因曰伏知陛下一夜觀書無不該渉然經典要切不過一二百言聖意所存靡不有初鮮克有終此二句實可寝食佩服固言曰聖人為理兢兢業業而已帝曰聞外郡其有無政處卿亦知否固言曰臣見說鄧州王堪衰耄頗甚隨州鄭襄亦無政術帝曰王堪豈不是貞元中御史否時三院御史只此一人猶在又問唐州是趙蕃否宰臣皆曰是覃曰王堪臣見是舊人舉為刺史鄭襄比來守官亦無敗事若言外郡不理臣亦更有所聞事未詳審不敢指說宰相退召起居張次宗問刺史次宗曰王堪實衰耄恐須與替御史中丞狄廉謩奏本司事帝亦以三郡訪之廉謩曰王堪比亦廉直但耄已及之鄧州疆土濶舘驛多須有才力方可集事又數道防秋兵路出鄧州饋餉之繁不供是懼唐州趙蕃未聞有過隨州鄭襄臣素不識又問鄧州有何土産對曰所出止於麤紬絹與三數種藥列在貢籍至如南都賦襄橙鄧橘亦無其實葢以廉謩常為鄧州刺史也京兆尹歸融謝賜府司錢五萬貫又奏所賜錢半充司農寺菜價訖帝因問融曰蔬糲糲字有頼音乎融曰有頼音又問糲當是極粗飯否融曰此葢近於脫粟三年十一月癸酉帝御紫宸殿問宰臣曰天寳後事實不可當時姚宋在否李珏曰此時已罷珏又曰𤣥宗謂羣臣曰我自即位不曽枉誅一人不知任林甫破人家不少陳夷行曰陛下不可移權與人多時楊嗣復曰夷行此言未了并惑陛下頃太宗用房𤣥齡十六年魏徵十五年何嘗有變臣以為用房魏多時不為不理用邪佞一日不可耳四年閏正月戊申閤内帝問宰臣曰人言䜟詞豈實有乎嗣復曰光武好䜟多以䜟決事於是䜟書大行為後代笑班叔皮著王命論以止庸妄亂姦者之心李珏曰䘮亂之時佐命者務稱符命致理之代只合推諸人事帝深然之三月丁丑帝於紫宸殿問宰臣曰南朝惟以寫經造佛為功徳此豈為功徳耶楊嗣復曰古稱博濟生人謂之功布澤無私謂之彼豈足稱功徳哉鄭覃曰功徳莫大於濟生人帝曰功濟生人徳及後嗣宜哉四月帝於紫宸殿謂宰臣曰天后朝用人自布衣便與宰相當時還得力否嗣復曰天后與今日事異深行刑辟輕用官爵乃自圖之計爾若厯試方見其用當艱難之時則要㧞擢今既無事且循資級古人云三綱失序㧞士為相四夷交侵㧞卒為将此葢不得已之時非理平之事六月帝問宰臣左丞韋温不許郎官姚最赴上如何楊嗣復曰韋温志在銓擇清流姚最亦不聞有缺落事自行殿中授職鹽鐵判官元崇之系復有公才今乃奨之如有公才即不為清流恐無人作官似敦晉之風嗣復又曰使府判官今人數猥多徒有縻費臣欲條流帝曰莫限及人才否嗣復曰有人才自别但澄去滓弊者菁華自出帝曰蕭復為相難言者必言貞元之賢相也卿其志之宣宗雅好儒術毎上殿與朝士從容未嘗不論及前代興亡後唐明宗天成三年十一月帝顧侍臣而言曰自古鐵劵其事如何趙鳯對曰此則帝王誓之賜其子子孫孫長享爵禄帝曰先朝所賜惟三人耳崇韜繼恩尋皆族滅朕之危疑似朝露耳嗟嘆久之趙鳯曰帝王執信故知不必銘金鏤石帝曰敢不深誡四年七月帝御中興殿對宰臣帝問馮道曰外邊有何事道曰無事帝曰何云無事道曰政平訟理人安歲稔故無事八月帝御中興殿宰臣論時政何者為切馮道對曰務惜生靈為切臣記近代詞人為古調詩云二月賣新絲五月糶新榖救得眼前瘡剜却心頭肉我願君王心化作光明燭不炤綺羅筵偏炤逃亡屋此詩意雖俚淺規諫殊深臣諷誦之實覺有理帝深納之九月帝御中興殿顧謂宰臣曰時事近日如何馮道奏曰臣省事已來無歲不聞戰伐葢政令不一王綱弛紊伏自陛下纂隆五載服之以武威懐之以文徳任賢不貳去邪不疑天下歸心人知耻格近歲已來可謂無事趙鳯進曰詩云靡不有初鮮克有終願陛下常以此道始終則運祚無窮矣長興三年二月帝顧謂宰臣曰近日時事何如馮道對曰京城人户轉多時物至賤前代或移徙户口以實京師今不假如此聖意所感也廢帝在位尤好咨詢乃詔宣徽使李専美端明殿學士李崧呂琦樞密直學士薛文遇天文趙延乂等更直於中興殿庭設穹廬每至宵分與之評議漢高祖天福十二年十月帝北廵幸蘧伯玉廟駐蹕賜臣寮酒帝曰朕早聞伯玉知非之名何以立廟於此宰臣對曰此地古衛國蒲城伯玉則蒲人也少有名徳為鄉里所稱其君靈公惑於夫人南子蔽於宦官雍渠賢者罕獲其用大夫史鰌疾亟戒其子曰我知蘧伯玉賢而不能舉於國為罪人也若死君必親弔當為我陳屍於庭具而言之冀其信我而用伯玉也靈公尋擢為大夫國繇是理故魯仲尼兩入衛以伯玉為主人伯玉死里人思之故為設祠其後載於祀典因而不絶帝聞之感嘆者久之周世宗顯徳二年四月臨軒顧謂宰臣曰朕聽政之餘思政教未敷區宇未混中宵輟寐若納于隍竊觀厯代君臣治國家臨下事上之道深為不易又念自唐晉失徳之後亂臣黠虜僣竊暴慢者多今中夏雖漸小康吳蜀幽并尚未平蕩聲教有限朕實疚懐宜諭臣寮各述論䇿宜尊經濟之畧副予求賢致理之志也於是命翰林承㫖徐台符已下二十餘人各撰為君難為臣不易論平邊䇿各一首以進帝皆親覽焉其平邊䇿率皆以修文徳來逺人為意翰林學士陶榖竇儀御史中丞楊昭儉比部郎中王朴等四人即以江淮封境密邇我疆請用師以取之帝自高平克捷之後嘗訓兵講武思混一天下及覽其䇿欣然聽納繇是圖南之意益堅矣冊府元龜巻一百四
