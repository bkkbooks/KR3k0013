body:
  text: 冊府元龜卷五百三十五宋王欽若等撰諌諍部直諌第二漢東方朔武帝時待詔於公車而大中大夫吾邱夀王與待詔能用筭者二人舉籍阿城以南舉計其數而為簿籍也阿城本秦阿房宫也以其墻壁崇廣故俗呼為阿城盩厔以東宜春以西提封頃畝及其賈直提封亦謂提舉四封之内總計其數也欲除以為上林苑屬之南山屬連也又詔中尉左右内史表屬縣草田欲以償鄠杜之民時未為京兆馮翊扶風故云中尉及左右内史也草田謂荒田也吾邱夀王奏事帝大說朔時在旁進諌曰臣聞謙遜静慤天表之應應之以福驕溢靡麗天表之應應之以異今陛下累郎臺恐其不髙也郎堂下周屋弋獵之䖏恐其不廣也如天不為變則三輔之地盡可以為苑何必盩厔鄠杜乎中尉及左右内史則為三輔矣非必謂京兆馮翊扶風也奢侈越制天為之變上林雖小臣尚以為大也夫南山天下之阻也南有江淮北有河渭其地從汧隴以東商雒以西商與上雒二縣也汧汧水也隴坻也厥壤肥饒漢興去三河之地止覇産以西都涇渭之南此所謂天下陸海之地髙平曰陸關中地髙故稱耳海者萬物所出言關中山川物産饒富是以謂之陸海也秦之所以虜西戎兼山東者也其山出玉石金銀銅鐵豫章檀柘異類之物不可勝原原本也言說不能盡其根本此百工所取給萬民所仰足也又有秔稲梨栗桑麻竹箭之饒土宜薑芋水多䵷魚芋草名其葉似藕荷而長不圎其根正白可食䵷即蛙字也似蝦蟇而小長脚盖人亦取食之貧者得以人給家足無饑寒之憂故豐鎬之間號為土膏其價畝一金今規以為苑絶陂池水澤之利而取民膏腴之地上乏國家之用下奪農桑之業棄成功就敗事損耗五穀是其不可一也且盛荆棘之林而長養麋鹿廣狐兎之苑大虎狼之墟又壊人塜墓發人室廬令幼弱懐土而思耆老泣涕而悲是其不可二也斥而營之垣而囿之騎馳東西車騖南北又有深溝大渠夫一日之樂不足以危無限之輿一日之樂謂田獵也無限之輿謂天子富貴無隄限也是其不可三也故務苑囿之大不恤農時非所以彊國富人也夫殷作九市之宫而諸侯畔紂於宫中綴設九市靈王起章華之臺而楚民􅄆楚靈王作章華之臺納美人以實之卒有乾谿之禍也章華臺在華容地也秦興阿房之殿而天下亂糞土愚臣忘生觸死逆盛意犯隆㫖罪當萬死不勝大願帝廼拜朔為大中大夫後為中郎武帝為竇太主竇太后女故云太主置酒宣室使謁者引内董君是時朔陛㦸殿下辟㦸而前曰董偃有斬罪三安得入乎曰何謂也朔曰偃以人臣私侍公主其罪一也敗男女之化而亂婚姻之禮傷王制其罪二也陛下富於春秋積思於六經留神於王事馳騖於唐虞折節於三代偃不遵經勸學反以靡麗為右奢侈為務盡狗馬之樂極耳目之欲行邪枉之道徑􅁋辟之路是乃國家之大賊人主之大蜮偃為􅁋首其罪三也昔伯姬燔而諸侯憚奈何乎陛下上黙然不應良久曰吾業以設飲食後而自改朔曰不可夫宣室者先帝之正䖏也非法度之政不得入焉故􅁋亂之漸其變為簒是以豎刁為􅁋而易牙作患慶父死而魯國全管蔡誅而周室安上曰善有詔止更置酒北宫引董君從東司馬門東司馬門更名東交門賜朔黄金三十斤董君之寵繇是日衰司馬相如為郎嘗從武帝至長楊獵是時天子方好自擊熊豕馳逐埜獸相如因上䟽諌其辭曰臣聞物有同類而殊能者故力稱烏獲㨗言慶忌勇期賁育臣之愚竊以為人誠有之獸亦宜然今陛下好陵阻險射猛獸猝然遇逸材之獸駭不存之地犯屬車之清塵輿不及還轅人不暇施巧雖有烏獲逢蒙之技不得用枯木朽株盡為難矣是胡越起於轂下而羗夷接軫也豈不殆哉雖萬全而無患然本非天子之所宜近也且夫清道而後行中路而馳猶時有衘橜之變况乎渉豐草騁坵墟前有利獸之樂而内無存變之意其為害也不亦難矣夫輕萬乗之重不以為安樂出萬有一危之塗以為娱臣竊為陛下不取盖明者逺見於未萌而智者避危於無形禍固多藏於隱微而發於人之所忽者也故鄙諺曰家纍千金坐不垂堂此言雖小可以諭大臣願陛下留意幸察帝善之令狐茂壺關三老也武帝末戾太子殺江􅂶舉兵長安中太子兵敗亡不得帝怒甚羣下憂懼不知所出茂上書曰臣聞父者猶天母者猶地子猶萬物也故天平地安隂陽調和物乃茂成父慈母愛室家之中子乃孝順隂陽不和則萬物大傷父子不和則室家䘮亡故父不父則子不子君不君則臣不臣雖有粟吾豈得而食諸昔者虞舜孝之至也而不中於瞽瞍孝己被謗伯竒放流骨肉至親父子相疑何者積毁之所生也繇是觀之子無不孝而父有不察今皇太子為漢適嗣承萬世之業體祖宗之重親則皇帝之宗子也江充布衣之人閭閻之𨽻臣耳陛下顯而用之銜至尊之命以迫蹵皇太子造飾奸詐羣邪錯謬是以親戚之路鬲塞而不通太子進則不得上見退則困於亂臣獨寃結而亡告不忍忿怒之心起而殺充恐懼逋逃子盜父兵以救難自免耳臣竊以為無邪心詩曰營營青蠅止于藩愷悌君子無信䜛言䜛言罔極交亂四國往者江充䜛殺趙太子天下莫不聞其罪固宜陛下不省察深過太子以太子為罪過而深責之發盛怒舉大兵而求之三公自将臣欽若等曰謂丞相劉屈氂也智者不敢言辯士不敢說臣竊痛之臣聞子胥盡忠而忘其號比干盡仁而遺其身忠臣竭誠不顧鉄鉞之誅以陳其愚志在正君安社稷也詩云取彼譛人投畀豺虎唯陛下寛心慰意少察所親毋患太子之非亟罷甲兵無令太子久亡臣不勝惓惓出一旦之命待罪建章闕下書奏天子感寤夏侯勝為光禄大夫昌邑王嗣立數出每出逰戯也勝當乗輿前諌曰天久隂而不雨臣下有謀上者陛下欲出何之王怒謂勝為妖言縛以屬吏屬委也吏白大将軍霍光光不舉法是時光與車騎将軍張安世謀欲廢昌邑王光譲安世以為泄語安世實不言廼召問勝勝對言在洪範傳曰皇之不極厥罸常隂時則下人有代上者惡察察言惡謂忌諱也察謂計謀不敢明顯言之故云臣下有謀光安世繇此遂重儒者王吉舉孝亷為郎補若盧右丞遷雲陽令舉賢良為昌邑中尉而王好逰獵驅馳國中動作亡節吉上䟽諌曰臣聞古者師日行三十里吉行五十里詩云匪風發兮匪車揭兮顧瞻周道中心怛兮說曰是非古之風也發發者是非古之車也揭揭者盖傷之也今者大王幸方輿曽不半日而馳二百里百姓頗廢耕桑治道牽馬臣愚以為民不可數變也昔召公述職當民事時舎於棠下而聽斷焉是時人皆得其所後世思其仁恩至虖不伐甘棠之詩也大王不好書術而樂逸游馮式訢衘馳驅不止口倦乎叱咤手苦於箠轡身勞乎車輿朝則冒霧露晝則被塵埃夏則為大暑之所暴炙冬則為風寒之所匽薄數以輭脆之玉體犯勤勞之煩毒非所以全夀命之宗也又非所以進仁義之隆也夫廣厦之下細㫋之上明師居前勸誦在後上論唐虞之際下及殷周之盛考仁聖之風習治國之道訢訢然發憤忘食日新厥徳其樂豈衘橛之間哉休則俛仰詘信以利形進退歩趨以實下吸新吐故以練臧専意積精以適神於以養生豈不長哉大王誠留意如此則心有堯舜之志體有喬松之夀美聲廣譽登而上聞則福禄其臻而社稷安矣皇帝仁聖至今思慕未怠於宫館囿池弋獵之樂未有所幸大王宜夙夜念此以承聖意諸侯骨肉莫親大王大王於屬則子也於位則臣也一身而二任之責加焉恩愛行義纎芥有不具者於以上聞非享國之福也臣吉愚戅願大王察之王賀雖不遵道然猶知敬禮吉乃下令曰寡人造行不能無惰中尉甚忠數輔吾過使謁者千秋賜中尉牛肉五百斤酒五石脯五束其後復放縱自若吉輙諌争甚得輔弼之義雖不治民國中莫不敬重焉久之昭帝崩亡嗣大将軍霍光秉政遣大鴻臚宗政迎昌邑王吉即奏書戒王昌邑以行􅁋亂廢宣帝頗修武帝故事宫室車服盛於昭帝時外戚許史王氏貴寵而上躬親政事任用能吏吉上䟽言得失曰陛下躬聖質總萬方帝王圗籍日陳于前惟思世務将興太平詔書每下民欣然若更生臣伏而思之可謂至恩未可謂本務也言天子如此思治百姓為之更生然未盡政務之本也欲治之主不世出言有時遇之不常值也公卿幸得遭遇其時言聽諌從然未有建萬世之長策舉明主於三代之隆者也其務在於期㑹籍書斷獄聽訟而已此非太平之基也臣聞聖主宣徳流化必自近始朝廷不備難以言治左右不正難以化逺民者弱而不可勝愚而不可欺也聖主獨行於深宫得則天下稱誦之失則天下咸言之行發於近必見於逺故謹選左右審擇所使左右所以正身也所使所以宣徳也詩云濟濟多士文王以寧此其本也春秋所以大一統者六合同風九州共貫也今俗吏所以牧民者非有禮義科指可世世通行者也獨設刑法以守之其欲治者不知所繇以意穿鑿各取一切權譎自任故一變之後不可復修也言其弊深難久行也是以百里不同風千里不同俗户異政人殊服詐偽萌生刑罰亡極萌生言其争出如草木之初生質樸日銷恩愛寖薄孔子曰安上治民莫善於禮非空言也王者未制禮之時引先王之禮宜於今者而用之臣願陛下承天心發大業與公卿大臣延及儒生述舊禮明王制敺一世之民躋之仁夀之域以仁撫下則羣生安逸而夀考則俗何以不若成康夀何以不若髙宗髙宗殷王武丁也享國百年也竊見當世趨務不合於道者謹條奏唯陛下財擇焉吉意以為夫婦人倫大綱夭夀之萌也繇之而生故云萌也世俗嫁娶太早未知為人父母之道而有子是以教化不明而民多夭聘妻送女亡節則貧人不及故不舉子又漢家列侯尚公主諸侯則國人承公主娶天子女曰尚公主國人娶諸侯女曰承公主尚承皆卑下之名也使男事女夫詘於婦逆隂陽之位故多女亂古者衣服車駕貴賤有章以褒有徳而别尊卑今上下僣差人人自制言無節度是以貪財誅利不畏死亡周之所以能致治刑措而不用者以其禁邪於㝠㝠絶惡於未萌也㝠㝠言未有端緒又言舜湯不用三公九卿之世而舉臯陶伊尹不繼世而爵也言臯陶伊尹非三公九卿之世不仁者逺任用賢人放出䜛佞今使俗吏得任子弟子弟以父兄任為郎率多驕驁不通古今至於積功治人亡益於民此伐檀所為作也伐檀詩篇名刺不用賢也宜明選求賢除任子之令外家及故人可厚以財不宜居位去角氐減樂府省尚方尚方主功作也明示天下以儉古者工不造琱琢商不通侈靡非工商之獨賢政教使之然也民見儉則歸本本立而末成其指如此帝以其言迂濶不甚寵異也鄭昌愍為諌大夫宣帝時盖寛饒上書坐劾誹謗昌愍傷寛饒忠直憂國以言事不當意而為文吏所詆挫上書訟寛饒曰臣聞山有猛獸藜藿為之不采國有忠臣姦邪為之不起司𨽻校尉寛饒居不求安食不求飽進有憂國之心退有死節之義上無許史之屬下無金張之託職在司察直道而行多仇少與上書陳國事有司劾以大辟臣幸得從大夫之後官以諌為名不敢不言帝不聽遂下寛饒吏寛饒引佩刀自剄北闕下衆莫不憐之蕭望之宣帝時為大行治禮丞大将軍霍光薨子禹復為大司馬望之以霍氏彊盛上䟽乞口陳災異下少府問状望之對以為春秋昭公三年大雨雹是時季氏専權卒逐昭公鄉使魯君察於天變宜亡此害今陛下以聖徳居位思政求賢堯舜之用心也然而善祥未臻隂陽不和是大臣任政一姓擅執之所致也附枝大者賊本心私家盛者公室危本心樹之本枝也唯明主躬萬機選同姓舉賢材以為腹心與參政謀令公卿大臣朝見奏事明陳其職以考功能如是則庶事理公道立奸邪塞私權廢矣對奏天子拜望之為謁者貢禹為諌大夫元帝初即位數虗已問以政事虗已謂聽受其言也是時年嵗不登郡國多困禹奏言古者宫室有制宫女不過九人秣馬不過八匹秣養也謂以粟米飯也牆塗而不琱木摩而不刻車輿噐物皆不文畫苑囿不過數十里與民共之任賢使能什一而稅亡它賦歛繇戍之役使民嵗不過三日千里之内自給千里之外置貨職而已言天子以畿内賦歛自供千里之外令其以時入貢不欲煩勞也故天下家給人足頌聲並作至髙祖孝文景皇帝循古節儉宫女不過十餘廐馬百餘匹孝文皇帝衣綈履革綈厚繒噐無琱文金銀之餙後世争為奢侈轉輾益甚臣下亦相放效衣服履絝刀劒亂於主上主上時臨朝入廟衆人不能别異甚非其宜然非自知奢僣也昔魯昭公曰吾何僣矣今大夫僣諸侯諸侯僣天子天子過天道其日久矣承衰救亂矯復古化在於陛下正曲曰矯臣愚以為盡如太古難宜少放古以自節焉論語曰君子樂節禮樂論語稱孔子曰益者三樂樂節禮樂樂道人之善樂多賢友也方今宫室已定亡可奈何矣其餘盡可減損故時齊三服官輸物不過十笥三服官主作天子之服在齊地笥盛衣噐也方今齊三服官作工各數千人一嵗費數鉅萬蜀廣漢主金銀噐嵗各用五百萬三工官官費五千萬三工官謂少府之屬官考工室也右工室也東園匠也止言蜀漢主金銀噐是不入三工之數也東西織室亦然廐馬食粟将萬匹臣禹嘗從之東宫從天子往太后宫也見賜杯案盡文畫金銀飾非當所以賜食臣下也東宫之費亦不可勝計天下之民所為大饑餓死者是也今民大饑而死死又不塟為犬豬食食人之骨也人至相食而廐馬食粟若其大肥氣盛怒至乃日歩作之日日行歩而動作之以􅄆􅂶其氣王者受命於天為民父母固當若此乎天下不見邪武帝時又多取好女至數千人以填後宫及棄天下昭帝㓜弱霍光専事不知禮正妄多藏金銀財物鳥獸魚鼈牛馬虎豹生禽凡百九十物盡瘞藏之又皆以後宫女置於園陵大失禮逆天心又未必稱武帝意也昭帝晏駕光復行之至孝宣皇帝時陛下惡有所言不能自言減省之事羣臣亦随故事甚可痛也故使天下承化取女皆大過度諸侯妻妾或至數百人豪富吏民畜歌者至數十人是以内多怨女外多曠夫曠空也室家空也及庻衆塟埋皆虗地上以實地下其過自上生自從也上謂天子也皆大臣不循故事之􅖄也唯陛下深察古道從其儉者減損乗車服御噐物三分去二産子多少有命審察後宫擇其賢者留二十餘人悉歸之言人産子多少自有定命非繇廣妾媵也故請上留二十餘人及諸陵園女亡子者宜悉遣獨杜陵宫人數百誠可哀憐也廐馬可亡過數十匹獨舎長安城南苑地以為田獵之囿舎置也獨留置之其餘皆廢去自城西南至山西至鄠皆復其田以與貧民方今天下饑饉可亡大自減損以救之稱天意乎天生聖人盖為萬民非獨使自娱樂而已也故詩曰天難諶斯不易惟王上帝臨女毋貳爾心大雅大明之詩也諶誠也上帝亦天也言承天之意此誠難矣王者之命不妄改易天嘗降監信可畏也毋貳爾心機事難矣勿猶豫也當仁不讓論語稱孔子曰當仁不讓於師故引之也獨可以聖心參諸天地揆之往古揆度也不可與臣下議也若其阿意順指随君上下上下猶言髙下謂茍順從也臣禹不勝拳拳不敢不盡愚心天子納善其忠翼奉東海人元帝初元二年二月戊午地震其夏齊地人相食七月丁酉地復震因赦天下舉直言極諌之士奉奏封事曰臣聞之於師曰天地設位懸日月布星辰分隂陽定四時列五行以視聖人名之曰道聖人見道然後知王治之象故畫州土建君臣立律歴陳成敗以視賢者名之曰經賢者見經然後知人道之務則詩書易春秋禮樂是也易有隂陽詩有五際君臣父子兄弟夫婦朋友也又詩内傳曰五際邜酉午戌亥也隂陽始終際㑹之嵗此則有變改之政也春秋有灾異皆列終始推得失考天心以言王道之安危至秦乃不說傷之以法是以大道不通至於滅亡今陛下明聖深懐要道燭臨萬方布徳流恵靡有闕遺罷省不急之用振救困貧賜醫藥賜棺錢恩澤深厚又舉直言求過失盛徳純備天下幸甚臣奉竊學齊詩聞五際之要十月之交篇知日蝕地震之效昭然可明猶巢居知風穴䖏知雨亦不足多適所習耳臣聞人氣内逆則感動天地天變見於星氣日蝕地變見於竒物震動所以然者陽用其精隂用其形猶人之有五藏六體五藏象天六體象地故藏病則氣色發於面體病則欠申動於貎今年太隂建於甲戌律於庚寅初用事歴以甲午從春太隂在甲戌則太嵗在子十一月庚寅日黄鍾律初起用事也歴中甲寅律得參陽性中仁義情得公正亷貞甲庚皆三陽甲在東方為仁庚在西方為義戌為公正寅午為亷貞木數三寅在東方木位之始故曰參陽也百年之精嵗也正以精嵗本首王位日臨中時接律而地大震其後連月久隂雖有大令猶不能復大令謂虚倉廩開府庫之屬也復補也隂氣盛矣古者朝廷必有同姓以明親親必有異姓以明賢賢此聖王之所以大通天下也同姓親而易進異姓䟽而難通故同姓一異姓五廼為平均今左右亡同姓獨以舅后之家為親異姓之臣又䟽二后之黨滿朝非特䖏位勢尤奢僣過度吕霍上官足以卜之甚非愛人之道又非嗣後之長策也隂氣之盛不亦宜乎臣又聞未央建章甘泉宫才人各以百數皆不得天性若杜陵園其已御見者臣子不敢有言雖然太皇太后之事也諸侯王國與其後宫宜為設員出其過制者此損隂氣應天救邪之道也今異至不應灾将随之其法大水極隂生陽反為大旱甚則有火灾春秋宋伯姬是矣唯陛下財察明年夏四月乙未孝武園白鶴館灾奉自以為中上䟽曰臣前上地震之效曰極隂生陽恐有火灾不合明聽未見省答臣竊内不自信今白鶴館以四月乙未時加於邜月宿亢災與前地震同法臣奉廼深知道之可信也不勝拳拳願復賜問卒其終始上復延問以得失匡衡臣欽若等曰衡姓本犯太祖廟諱上字也元帝時為給事中是時有日蝕地震之變帝問以治政得失衡上䟽曰臣聞五帝不同禮三王各異教民俗殊務所遇之時異也陛下躬聖徳開太平之路閔愚吏民觸法抵禁抵觸也比年大赦比頻也使百姓得改行自新天下幸甚竊見大赦之後姦邪不為衰止今日大赦明日犯法相随入獄此殆導之未得盖保民者陳之以徳義示之以好惡保養也陳施也孝經曰陳之以徳義而民莫遺其親示之以好惡而民知禁故衡引以為言也觀其失而制其宜故動之而和綏之而安今天下俗貪財賤義好聲色尚侈靡亷耻之節薄􅁋辟之意縱綱紀失序䟽者踰内䟽者妻妾之家内者同姓骨肉也踰謂過越也親戚之恩薄婚姻之黨隆茍合徼幸以身設利不改其原設施也原本也雖嵗赦之刑猶難使錯而不用也嵗赦請每嵗一赦也錯置也臣愚以為宜壹曠然大變其俗孔子曰能以禮讓為國乎何有論語載孔子之言謂能以禮讓治國則其事甚易也朝廷者天下之楨幹也公卿大夫相與循禮恭讓則民不争循順也好仁樂施則下不暴上義髙節則民興行寛柔和恵則衆相愛四者明王所以不嚴而成化也何者朝有變色之言則下有争闘之患上有自専之士則下有不讓之人上有克勝之佐則下有傷害之心上有好利之臣則下有盜竊之民此其本也言下之所行皆取化於上也今俗吏之治皆不本禮讓而上克暴或忮害好䧟人於罪忮堅也謂酷害之心堅也貪財而慕勢故犯法者衆姦邪不止雖嚴刑峻法猶不為變此非其天性有繇然也非其天性自惡繇上失於教化耳臣竊考國風之詩周南召南被聖賢之化深故篤於行而亷於色篤厚也謂樂得淑女以配君子憂在進賢不􅁋其色之類鄭伯好勇而國人暴虎詩鄭風大叔于田之篇曰䄠禓暴虎獻于公所将叔無狃戒其傷汝䄠禓肉袒也暴虎空手以摶之也公鄭荘公也将請也叔荘公之弟大叔也狃快也言以荘公好勇之故大叔肉袒空手摶虎取而獻之國人愛大叔故請之曰勿快為之恐傷汝也秦穆貴信而士多從死秦穆公與羣臣飲酒酣公曰生共此樂死共此哀於是奄息仲行鍼虎許諾及公薨皆從死黄鳥詩所為作也陳夫人好巫而民􅁋祀胡公夫人武王之女太姬無子好祭鬼神鼔舞而祀故其詩云坎其擊鼔宛邱之下無冬無夏值其鷺羽晉侯好儉而民畜聚唐風山有樞之詩序云刺晉昭公也不能修道以正其國有財不能用有鐘鼔不能以自樂其詩曰子有衣裳弗曵弗婁子有車馬弗馳弗驅宛其死矣它人是愉故其俗皆吝嗇而積財也太王躬仁而邠國貴恕太王周文王之祖即古公亶父也國於邠修徳行義戎狄攻之欲得地與人人人皆怒欲戰古公曰以我故戰殺人父子而君之予不忍也乃與其私屬度漆沮之梁山止於岐下及它旁國聞古公仁亦多歸之邠即今邠州是其地也言化太王之仁故其俗皆貴誠恕繇此觀之治天下者審所上而已上謂崇尚也今之偽薄忮害不讓極矣臣聞教化之流非家至而人說之也言非家家皆到人人勸說之也賢者在位能者布職朝廷崇禮百僚敬讓道徳之行繇内及外自近者始然後民知所法遷善日進而不自知是以百姓安隂陽和神靈應而嘉祥見詩曰商邑翼翼四方之極夀考且寧以保我後生商頌殷武之詩也商邑京師也言商邑之禮俗翼翼然可則倣乃四方之中正也王則夀考且安以此全守我子孫也此成湯所以建至治保子孫化異俗而懐鬼方也鬼方逺方也今長安天子之都親承聖化然其俗習無以異於逺方郡國来者無所則或見侈靡而放效之放依也此教化之原本風俗之樞機宜先正者也臣聞天人之際精祲有以相盪祲謂隂陽氣相侵漸以成灾祥者也善惡有以相推事作乎下者象動乎上隂陽之理各應其感隂變則静者動陽蔽則明者晻静者動謂地震也明者晻謂日蝕也水旱之灾随類而至今闗東連年饑饉百姓乏困或至相食此皆生於賦歛多民所共者大而吏安集之不稱之效也陛下祗畏天戒哀閔元元大自減損省甘泉建章宫衛罷珠崖偃武行文将欲度唐虞之隆絶殷周之衰度過也絶謂除其惡政也諸見罷珠崖詔書者莫不欣然人自以将見太平也宜遂減宫室之度省靡麗之飾考制度修内外近忠正逺巧佞放鄭衛進雅頌舉異材開直言任温良之人退刻薄之吏顯潔白之士昭無欲之路昭亦明也覽六藝之意察上世之務明自然之道博和睦之化以崇至仁救失俗易民視救正也易變也令海内昭然咸見本朝之所貴道徳𢎞於京師淑問揚乎疆外淑善也問名也然後大化可成禮讓可興也帝說其言遷衡為光禄大夫谷永成帝時為􅈵州刺史奏事京師訖當之郡時有黒龍見東莱帝使尚書問永受所欲言永有所言令尚書即受之永對曰臣聞王天下有國家者患在上有危亡之事而危亡之言不得上聞如使危亡之言輙上聞如若也有即上聞則商周不易姓而迭興三王不變改而更用夏商之将亡也行道之人皆知之晏然自以若天有日莫能危自謂如日在天而無有能傷危也是故惡日廣而不自知大命傾而不寤易曰危者有其安者也亡者保其存者也言安必思危存不忘亡乃得保其安存也陛下誠垂寛明之聽無忌諱之誅使蒭蕘之臣得盡所聞於前不懼於後患直言之路開則四方衆賢不逺千里輻輳陳忠羣臣之上願社稷之長福也漢家行夏正夏正色黒黒龍同姓之象也夏以建寅為正萬物在地中色黒今黒龍見同姓象也龍陽徳繇小之大言因小以至大故為王者瑞應未知同姓有見本朝無繼嗣之慶多危殆之隙欲因擾亂舉兵而起者邪将動心冀為後者殘賊不仁若廣陵昌邑之類臣愚不能䖏也䖏謂斷决也去年九月黒龍見其晦日有食之今年二月己未夜星隕乙酉日有食之六月之間大異四發二而同月臣欽若等曰謂一月之内兩度災異也三代之末春秋之亂未嘗有也臣聞三代所以隕社稷喪宗廟者皆繇婦人與羣惡沈湎於酒書曰乃用婦人之言自絶于天周書太誓之辭婦人妲己言紂用妲己之言自取殘㓕非天之絶也四方之逋逃多罪是崇是長是信是使亦太誓之辭也崇尊也言紂容納逃亡多罪之人親信使用尊而長之詩云燎之方揚寜或㓕之赫赫宗周褒姒烕之小雅正月之詩烕亦㓕也言火燎方熾寧有能㓕之者乎而宗周之盛乃為褒姒所㓕怨其甚也易曰濡其首有孚失是未濟上九爻辭言躭樂無節飲酒濡首有信之道於是遂失也濡濕也秦所以二世十六年而亡者養生泰奢奉終泰厚也二者陛下兼而有之臣請畧陳其效易曰在中饋无攸遂家人六二爻辭饋食也言婦人之道居中主食遜順而已无所必遂言婦人不得與事也詩曰懿厥悊婦為梟為鴟匪降自天生自婦人大雅瞻仰之詩懿美也悊智也言幽王以悊婦為美實乃為梟鴟也婦謂褒姒下也梟鴟惡鳥之聲故以諭焉又言此禍亂非從天而以寵褒姒之故生災建始河平之際許班之貴傾動前朝許皇后及班婕妤之家熏灼四方賞賜無量空虚内藏女寵至極不可上矣上猶加也今之後起天所不享什倍于前謂趙李本從卑賤起也廢先帝法度聽用其言官秩不當從釋王誅從放也釋解也王誅謂王法當誅者驕其親屬假之威權從横亂政刺舉之吏莫敢奉憲又以掖廷獄大為亂阱穿地為坑阱以拘繫人也亂者言其非正而又多也榜箠㿊扵炮烙㿊痛也炮烙紂所作也膏塗銅柱加之火令罪人行其上輙堕炭中笑而以為樂也絶㓕人命主為趙李報徳復怨復亦報也反除白罪建治正吏罪之明白者反而除之吏之公正者建議劾治也多擊無辜掠立迫恐掠笞服之立其罪名至為人起責分利受謝言富貴有錢假託其名代之為主放與它人以取利息而共分之或受報謝别取財物生出死入者不可勝數是以日食再既既盡也以昭其辜昭明也王者必先自絶然後天絶之陛下棄萬乗之至貴樂家人之賤事謂私畜田及奴婢賤物也厭髙美之尊號好匹夫之卑字成帝好微行更作私字以相呼崇聚僄輕無義羣小以為私客僄疾也數離深宫之固挺身晨夜與小人相随烏集雜㑹飲酒吏民之家言聚􅄆不常如烏鳥之集也亂服共坐流湎媟嫚溷淆無别閔免遁樂晝夜在路閔免猶黽勉也遁流遁也典門户奉宿衛之臣執干戈而守空宫公卿百僚不知陛下所在積數年矣王者以民為基民以財為本財竭則下畔下畔則上亡是以明王愛養基本不敢窮極使民如承大祭言當畏慎今陛下輕奪民財不愛民力聽邪臣之計去髙敞初陵捐十年功緒緒謂功作之端次改作昌陵反天地之性因下為髙積土為山發徒起邑並治宫館大興繇役重増賦歛徴發如雨言其多也役百乾谿費儗驪山儗比也言勞役之功百倍於楚靈王費財之廣比於秦始皇也靡敝天下靡􅄆也五年不成而後反故又廣旴營表旴大也發人塜墓斷截骸骨暴揚尸柩百姓財竭力盡愁恨感天灾異屢降饑饉仍臻仍頻也流􅄆冗食餒死於道以百萬數冗亦􅄆也餒餓也公家無一年之蓄百姓無旬日之儲上下俱匱無以相救詩云殷監不逺在夏后之世大雅蕩之詩也願陛下追觀夏商周秦所以失之以鏡考已行鏡謂鑒炤之考校也有不合者臣當伏妄言之誅言帝之所為違於節儉皆與永言同漢興九世百九十餘載繼體之主七皆承天順道遵先祖法度或以中興或以治安至於陛下獨違道縱欲輕身妄行當盛壮之隆無繼嗣之福有危亡之憂積失君道不合天意亦已多矣為人後嗣守人功業如此豈不負哉方今社稷宗廟禍福安危之機在於陛下陛下誠肯發明聖人之徳昭然逺寤畏此上天之威怒深恐危亡之徴兆蕩滌邪辟之惡志勵精致政専心反道反猶還也絶羣小之私客免不正之詔除除謂除補為官者悉罷北宫私奴車馬媠出之具媠出媠游也克己復禮毋貳微行出飲之過貳謂重為之也以防迫切之禍深惟日食再既之意抑損椒房玉堂之盛寵椒房皇后所居玉堂嬖幸之舎也毋聽後宫之請謁除掖庭之亂獄去炮烙之䧟阱誅戮佞邪之臣及左右執左道以事上者以塞天下之望且寝初陵之作止諸繕治宫室闕更減賦盡休力役闕亦謂減削之更謂更卒也存䘏振救困乏之人以彌逺方彌安也厲崇忠直放退殘賊無使素餐之吏久尸厚禄以次貫行固執無違貫聨續也謂上所陳衆條諸事宜次第相續行之不當更違異也夙夜孳孳婁省無忌婁省自觀省也舊愆必改新徳既章章明也纎介之邪不復載心則赫赫大異庶㡬可銷天命去就庻㡬可復去就者言去離無徳而就有徳社稷宗廟庶㡬可保唯陛下留神反覆熟省臣言臣幸得備邉部之吏不知本朝瞽言觸忌諱罪當萬死成帝性寛而好文辭又久無繼嗣數為微行多近幸小臣趙李臣欽若等曰謂趙皇后李倢伃之親也從微賤専寵皆皇太后與諸舅夙夜所常憂至親難數言故推永等使因天變而切諌勸帝納用之永自知有内應展意無所依違展申也每言事輙見答禮加禮而答之至上此對帝大怒衛将軍商宻擿永令發去擿謂發動也帝使侍御史收永勑過交道廐者勿追交道廐去長安六十里近延陵御史不及永還帝意亦觧自悔後為光禄大夫給事中元延中為北地太守時災異尤數永當之官帝使衛尉淳于長受永所欲言永對曰臣永幸得以愚朽之材為大中大夫備拾遺之臣從朝者之後進不能盡思納忠輔宣聖徳退無披堅執銳討不義之功猥蒙厚恩仍遷至北地太守絶命隕首身膏野草不足以報塞萬分陛下聖徳寛仁不遺易忘之臣垂周文之聽下及蒭蕘之愚有詔使衛尉受臣永所欲言臣聞事君之義有言責者盡其忠有官守者修其職臣永幸得免於言責之辜有官守之任當畢力遵職養綏百姓而已不宜復闗得失之辭忠臣之於上志在過厚是故逺不違君死不忘國昔史魚既沒餘忠未訖委柩後寝以屍達誠汲黯身外思内發憤舒憂遺言李息經曰雖爾身在外乃心無不在王室臣永幸得給事中出入三年雖執干戈守邉陲思慕之心常存于省闥是以敢越郡吏之職陳累年之憂臣聞天生蒸民不能相治為立王者以統理之方制海内非為天子列土封疆非為諸侯皆以為民也垂三統列三正去無道開有徳不私一姓明天下迺天下之天下非一人之天下也王者躬行道徳承順天地博愛仁恕恩及行葦籍稅取民不過常法宫室車服不踰制度事節財足黎庻和睦則卦氣理效五徴時序百姓夀考庻草蕃滋符瑞並降以昭保佑失道妄行逆天暴物窮奢極欲湛湎荒􅁋婦言是從誅逐仁賢離逖骨肉羣小用事峻刑重賦百姓愁怨則卦氣悖亂咎徴著郵上天震怒灾異屢降日月薄蝕五星失行山摧川潰水泉湧出妖孽並見茀星耀光饑饉荐臻百姓短折萬物夭傷終不改寤惡洽變備不復譴告更命有徳詩云乃眷西顧此惟予宅夫去惡奪弱遷命賢聖天地之常經百王之所同也加以功徳有厚薄期質有修短時世有仲季天道有盛衰陛下承八世之功業當陽數之標季渉三七之節紀遭無妄之卦運直百六之災阨三難異科雜焉同㑹建始元年以来二十載之間羣災大異交錯蜂起多於春秋所書八世著記久不塞除重以今年正月己亥朔日有食之三朝之㑹嵗月日三者之始故曰三朝四月丁酉四方衆星白晝流隕七月辛未彗星横天乗三難之際㑹畜衆多之災異因之以饑饉接之以不贍彗星極異也土精所生流隕之應出於饑變之後兵亂作矣厥期不久隆徳積善懼不克濟内則為深宫後庭将有驕臣悍妾醉酒狂悖卒起之敗北宫苑囿街巷之中臣妾之家幽閒之䖏徴舒崔杼之亂外則為諸夏上将有樊並蘓令陳勝項梁奮臂之禍内亂朝暮日戒諸夏内亂則禍在朝暮諸夏則日戒有兵舉兵以火角為期以熒惑芒角為期安危之分界宗廟之至憂臣永所以破膽寒心預言之累年下有其萌然後變見於上願陛下正君臣之義無復與羣小媟黷燕飲中黄門後庭素驕慢不謹嘗以醉酒失臣禮者悉出勿留勤三綱之嚴修後宫之政抑逺驕妬之寵崇近婉順之行加惠失志之人懐柔怨恨之心保至尊之重秉帝王之威朝覲法出而後駕陳兵清道而後行無復輕身獨出飲食臣妾之家三者既除内亂之路塞矣諸夏舉兵萌於民饑饉而吏不䘏興於百姓困而賦歛重發於下怨離而上不知易曰屯其膏小貞吉大貞凶易屯卦九五爻辭也膏者所以潤人肌膚爵禄亦所以養人者也小貞臣也大貞君也遭屯難飢荒君當開倉廪振百姓而反吝則凶臣吝嗇則吉論語曰出内之吝謂之有司傳曰饑而不損兹謂泰厥災水厥咎亡訞辭曰闗動牡飛臣欽若等曰牡所以下閉者也以鐵為之若今之鏁也辟為無道臣為非厥咎亂臣謀簒易訞也之辭王者遭衰難之世有饑饉之災不損用而大自潤故凶百姓困貧無以共求愁悲怨恨故水城闗守國之固固将去焉故牡飛徃年郡國二十一傷於水災禾黍不入今年蠶麥咸惡百川沸騰江河溢決大水汎濫郡國五十有餘比年喪稼時過無宿麥百姓失業流􅄆群軰守闗大異較炳如彼水災浩浩黎庶窮困如此宜損常稅小自潤之時言所潤益於己者當減小之而有司奏請加賦甚繆經義逆於民心布怨趨禍之道也牡飛之状殆為此發古者穀不登虧膳災屢至損服凶年不塈塗明王之制也詩云凡民有喪扶服救之論語曰百姓不足君孰與足臣願陛下勿許加賦之奏益減大官導宫中御府均官掌畜廩賦用度止尚方織室京師郡國工服官發輸造作以助大司農流恩廣施振贍困乏䦕闗梁内流民恣所欲之以救其急立春遣使者循行風俗宣布聖徳存䘏孤寡問民所苦勞二千石勑勸耕桑毋奪農時以慰綏元元之心防塞大姦之隙諸夏之亂庶㡬可息臣聞上主可與為善而不可與為惡下主可與為惡而不可與為善陛下天然之性䟽通聰敏上主之姿也少省愚臣之言感寤三難深畏大異定心為善損忘邪志毋二舊愆厲精致政至誠應天則積異塞於上禍亂伏於下何憂患之有竊恐陛下公志未專私好頗存尚愛羣小不肯為耳對奏天子甚感其言成帝末年頗好鬼神亦以無繼嗣故多上書言祭祀方術者皆得待詔祠祭上林苑中長安城旁費用甚多然無大貴盛者永說帝曰臣聞明於天地之性不可惑以神怪知萬物之情不可罔以非類諸皆仁義之正道不遵五經之法言而盛稱竒怪鬼神廣崇祭祀之方求報無福之祠及言世有仙人服食不終之藥遥興輕舉登遐倒景覽觀縣圃浮游蓬莱耕耘五徳朝種暮穫翼氏風角五徳東方甲南方丙西方庚北方壬中央戊種五色禾於地而耕耘也與山石無極黄冶變化堅氷淖溺方士詐以藥石若䧟氷凡投之氷上氷即消液因假為神仙道使然也化腹中五倉之術者思身中有五色腹中有五倉存則不飢皆姦人惑衆挾左道懐詐偽以欺罔世主聽其言洋洋滿耳若将可遇求之盪盪如繫風捕景終不可得是以明王距而不聽聖人絶而不語昔周史萇𢎞欲以鬼神之術輔尊靈王㑹朝諸侯而周愈微諸侯愈叛楚懐王隆祭祀事鬼神欲以獲福助郤秦師而兵挫地削身辱國危秦始皇初并天下甘心於神仙之道遣徐福韓終之屬多齎童女入海求仙采藥因逃不還天下怨恨漢興新垣平齊人少翁公孫卿欒大等皆以仙人黄冶祭祀事鬼神使物入海求神采藥貴幸賞賜累千金大尤尊盛至妻公主爵重位絫震動海内元鼎元封之際燕齊之間方士瞋目㧖掔言有神仙致福之術者以萬數其平等皆以術窮詐得誅夷伏辜至初元中有天淵玉女鉅鹿神人轑陽侯師張宗之姦紛紛復起夫周秦之末三五之隆已嘗専意􅄆財厚爵禄竦精神舉天下以求之矣曠日經年靡有毫釐之驗足以揆今經曰享多儀儀不及物惟曰不享周書雒誥之辭也言祭享之道唯以潔誠若多其容儀而不及禮物則不為神所享也論語曰子不語怪神唯陛下拒絶此類毋令姦人有以窺伺者上善其言冊府元龜卷五百三十五
