body:
  text: 冊府元龜卷三百九十三宋王欽若等撰將帥部威名第二北齊万俟洛字受洛干從髙祖與西魏戰於河隂諸軍北渡洛以一軍不動謂西人曰万侯受雒干在此能來可來也西人畏而去髙祖以雄壯名其所營地為迴洛城洛慷慨有氣節勇銳冠時當世推為名將李宻為襄州刺史在州十餘年甚得安邊之術威信聞於外境髙祖頻䧏手書勞問并賜口馬慕容紹宗東魏末為徐州刺史侯景叛紹宗與大都督髙岳等討之時景軍甚衆前後諸將往者莫不為其所輕及聞紹宗與岳將至深有懼色謂其屬曰岳所部兵精紹宗舊將宜共慎之王則為三荆二襄南雍六州都督則有威武邊人畏服之上黨王渙以文宣天保六年率衆送梁王蕭眀還江南仍破東關斬梁時進裴之橫等威名甚盛盧潜在淮南十三年任總軍民太尉大樹風績甚為陳主所憚陳主與其邊將書云盧潜猶在夀陽聞其何當還北此虜不死方為國患卿宜深備之髙昻為軍司大都督統七十六都督時鮮卑共輕中華朝士惟憚服於昻東方老為南益州刺史領宜陽太守頻為二郡出入數年境接羣蠻又隣西敵至於攻城野戰率先士卒屢以少制衆西人憚之斛律光為大將軍左丞相與祖珽穆提婆不協誣光謀反殺之光自結髪從戎未嘗失律深為隣敵所懾憚罪既不彰一旦屠滅朝野痛惜之周武帝聞光死大喜赦其境内後入鄴追贈柱國公指詔書曰此人若在朕豈能至鄴初宜陽之役光謂周人曰歸我七年人不然取爾十倍周人即歸之在西境築定誇諸城馬上以鞭指畫所取地皆如其言拓地五百里而未嘗伐功獨孤永業為雒州刺史行臺尚書周人宼雒州永業每先鋒以寡敵衆周人憚之武成河清末徵為太僕卿以乞伏貴和代之於是西境蹙弱河雒人情騷動傅伏為東雍州刺史後降於周周帝謂後主曰朕前三年教習兵馬決意往取河隂正為傅伏能守城不可動是以收軍而退公當時賞授何其薄也賜伏金酒巵後周李弼魏末為爾朱天光别將從天光西討破万侯醜奴弼嘗先鋒䧟陣所向披靡賊咸畏之皆曰莫當李將軍蔡祐為平東將軍與齊神武戰於邙山祐時著眀光鐵鎧所向無前敵人或曰此是鐵猛獸也皆遽避之獨孤信魏末為隴右十一州大都督秦州刺史信有竒謀大略太祖初啟霸業唯有關中之地以隴右形勢故委信鎮之既為百姓所懐聲震隣國東魏將侯之南奔梁也魏收為檄梁文矯稱信據隴右不從宇文氏乃亡為關西之憂欲以威梁人其為隣國所重如此韓果魏末為帥都督從大軍破稽胡於北山胡地險阻人跡罕至果進兵窮討散其種落稽胡憚果勁徤號為着趐人太祖聞之笑曰着趐之名寕减飛將韋瑱為𤓰州刺史胡人畏威不敢為宼公私安靜夷夏懐之陸騰為隆州總管蠻獠反所在蜂起山路險阻難得掩襲騰遂量山川形勢隨便開道蠻獠畏威承風請服所開之路多得古銘並是諸葛亮桓温舊道王德從太祖征伐累有戰功河渭間種羌屢叛以徳有威名拜河州刺史羣羌率服怡峯為車騎大將軍與諸將征討毎皆克㨗沈毅有膽得士卒心當時號為驍將逹奚寔為大行臺即中鎮潼關及潼關失守即與大都督楊山武拒魏於關東魏人甚憚之陳忻為驃騎大將軍時東魏為雒州刺史獨孤永業號有智謀往來境上倚伏難測忻與韓雄等常令間諜觀其動静齊兵每至輒擊破之故永業深憚忻等不敢為宼王軌為上大將軍觧徐州之圍擒陳將吳眀徹遂為徐州總管軌性嚴重善謀略兼有吕梁之㨗威振敵境陳人甚憚之于翼為幽州總管先是突厥屢為宼抄居民失業翼素有威武兼嚴斥侯自是不敢犯塞百姓安之楊標為建州刺史鎮車箱及齊神武闈玉壁乃命侯景趣齊子嶺標恐入寇邵郡率騎禦之景聞標至斫木斷路者六十餘里猶驚而不安遂退還河陽其見憚如此裴寛為車騎大將軍鎮孔城十三年與齊雒州刺史獨孤永夀相對永業有計謀多譎詐若聲言春發秋乃出兵或掩蔽消息倐忽而至寛毎揣知其情出兵邀擊無不克之永業嘗戒其所部曰但好慎孔城自外無足慮其見憚如此裴孝仁為長寕鎮將扞禦齊人甚有威邊之略梁士彦以軍功拜儀同三司武帝將有事東夏聞其勇決自扶風郡守除九曲鎮將進位上開府封建威縣公齊人甚憚之宇文神舉自京兆尹出為熊州刺史齊人憚其威名後周崔宏度說之子襲爵為安平縣公至隋開皇初為襄州總管宏度素貴御下嚴急所在令行禁止盗賊屏跡後梁蕭琮來朝帝以宏度為江陵總管鎮荆州陳人憚之不敢窺境隋源雄初仕後周為朔州總管突厥有來宼掠雄輙捕斬之深為北夷所憚韓擒虎有文武才用夙著威名為廬州總管委以平陳之任甚為敵人所憚陳平後突厥來朝髙祖謂之曰汝聞江南有陳國天子乎對曰聞帝命左右引突厥詣擒虎前曰此是執得陳國天子者擒虎厲然顧之突厥惶恐不敢仰視其有威容如此楊素為行軍元帥伐陳率水軍東下舟艫被江旌甲曜日素坐平乗大舩容貌雄偉陳人望之曰清河公即江神也清河素所封郡長孫晟為秦州道行軍總管取晉王節度出討突厥達頭晟追之斬首千餘級王引晟同宴有突厥達官來預坐説言突厥之内大畏長孫總管聞其弓聲謂為霹靂見其走馬稱為閃電王笑曰將軍震怒威行域外遂與雷霆為比一何壯㢤師旋授上開府儀同三司魚俱羅為豐州總管初突厥數入境為宼俱羅輙擒斬之自是突厥畏懼屏跡不敢畜牧於塞下杜彦為雲州總管突厥來宼彦輙擒斬之北夷畏憚胡馬不敢至塞後為朔州總管突厥復宼雲州髙祖令楊素擊走之是後猶恐為邊患以素為突厥所憚復拜雲州總管李寛驍勇善戰幹略過人自周及隋數經將領至柱國蒲山郡公號為名將李克開皇中頻以行軍總管擊突厥有功後為朔州總管甚有威名為敵所憚賀婁子幹為上大將軍開皇中虜寇泯洮二州子幹以行軍總管勒兵赴之賊聞而遁去髙祖以子幹曉習邊事授榆關總管十鎮諸軍事嵗餘拜雲州刺史甚為虜所憚史萬嵗為河内刺史開皇末突厥達頭可汗犯塞帝令晉王廣及楊素出靈武道漢王諒與萬嵗出馬邑道萬嵗率柱國張定和大將軍李藥王楊義臣出塞至大斤山與敵相遇逹頭遣問曰隋將為誰侯騎報史萬嵗突厥復問曰得非燉煌戍卒乎先是萬嵗除名配燉煌為戍卒毎與戍主同行輙入突厥數百里名讋北夷侯騎曰是也逹頭聞之懼而引去萬嵗馳追百餘里乃反擊大破之斬數千級逐北入磧數百里虜遁而還吐萬緒為青州總管頗有治名嵗餘突厥寇邊朝廷以緒有略徙為朔州總管甚為北夷所憚楊武通數以行軍總管討西南夷有功拜左武衛大將軍時党項羌屢為邊患朝廷以其有威名歴岷蘭二州總管以鎮之來整榮國公䕶兒之子為武賁即將尤驍勇善撫士衆討擊羣盗所向皆㨗諸賊甚憚之為作歌曰長白山頭百戰塲十十五五抱長鎗不畏官軍千萬衆只畏榮公第六即隂世師拜張掖太守先是吐谷渾及党項羌屢為侵掠世師至郡有來宼者親自捕擊輙擒斬之深為戎狄所憚元胄歴豫亳等州刺史開皇中突厥屢為邊患朝廷以胄素有威名拜靈州總管北夷甚憚之韓僧夀以行軍總管擊突厥於鷄頭山破之後為蔚州刺史突厥甚憚之達奚長儒為夏州總管六州方鎮都將事匃奴憚之不敢窺塞賀若誼為涇州刺史時突厥屢為邊患朝廷以誼素有威名拜靈州刺史誼時年老而筋力不衰猶能重鎧上馬為夷狄所憚李崇為幽州總管突厥犯塞崇輙破之奚霫契丹等懾其威略爭來内附王辯為武賁即將賊帥郝孝徳孫宣雅時季康竇建徳魏刀兒等往往屯聚大至十萬小至數千寇掠河北辯進兵擊之所在皆㨗深為羣賊所憚唐闞稜齊州人隋末杜伏威據有江淮之地署稜為左將軍從伏威入朝拜左領軍將軍遷越州都督及輔公祏僣號稜從軍討之與陳正通相遇陣方接稜脫兠鍪謂賊衆曰汝不識我邪何敢來戰其衆多稜舊之所部繇是各無鬬志或有還拜者李大恩為代州總管率兵鎮鴈門突厥頡利可汗與苑君璋尋率兵圍之大恩拒戰賊遂敗走俄而突厥復以盛兵來寇大恩遣刺史王孝基出戰一軍皆没賊進圍崞縣大恩衆寡不敵據城自守賊憚其勇亦不敢逼月餘引兵而去河間王孝恭髙祖武徳中歴總大藩專制方靣及平輔公祏之後吳楚尅定閩越服從威名大盛李靖武徳中副河間王孝恭平蕭銑輔公祏後為東南道行臺兵部尚書髙祖每云李靖是蕭銑輔公祏膏肓古之名將韓白衛霍豈能及也程名振貞觀末為平壤道行軍總管前後攻沙卑城破獨山陣皆以少擊衆稱為名將薛仁貴髙宗顯慶中與辛文陵破契丹於黒山上元中坐事徙象州㑹赦歸髙宗思其功尋召拜右領軍衛將軍檢校代州都督又率兵擊突厥元彌等於雲州斬首萬餘級獲生口二萬餘人駝馬牛羊三萬餘頭賊聞仁貴復起為將素憚其名皆奔散不敢當之黒齒常之開耀年為河源軍副使在軍七年吐蕃深畏憚之不敢復為邊患程務挺則天文眀中為左武衛大將軍單于道安撫大使督軍以禦突厥務挺善於綏禦威信大行偏禆已下無不盡力突厥甚憚之相率遁走不敢近邊及則天就軍斬之籍没其家突厥聞務挺死所在宴樂相慶仍為務挺立祠毎出師攻戰即祈禱焉唐休璟聖歴中為梁州都督假節隴右諸軍州大使久視元年吐蕃大將麴莾布支率衆數萬屯於洪源谷將圍昌松縣休璟以竒兵出其不意掩擊大破之斬首三千餘級是後吐蕃使朝宴於太極殿屢覘視休璟則天問其故對曰往嵗洪源戰時此將軍雄猛無比殺臣將士甚衆故欲識之則天益加歎異䧏璽書勞勉擢拜右武衛大將軍賀蘭進眀元宗天寳中為北海太守本郡招討使禄山亂進眀訓兵千人引之渡河以張平原之勢收河北郡縣賊徒振懼朝廷壯之來瑱為頴川郡太守充招討使肅宗以瑱有武略尤加任委遷兼御史大夫比收河雒屢挫賊鋒賊頻來攻皆為瑱所敗賊等懼之號為來嚼鐵郭子儀為中書令領河東副元帥河中節度鎮河中代宗永泰元年僕固懐恩率諸蕃雜虜及山賊任敷鄭庭郝德劉開元等三十餘萬南宼先後數萬人略同州期自華隂趨藍田以扼南路懐恩率重兵殿其後京師震恐急徵子儀子儀至涇南而虜已合子儀大軍僅萬人而雜虜圍之數重子儀使李國臣髙昇拒其東魏楚王當其南陳迴光當其西朱元宗當其北子儀率甲騎三千出没於左右前後虜見而問曰此誰也報曰郭令公迴紇曰令公存乎僕固懐恩謂吾天可汗已棄四海令公殂謝中國無主故從其來今令公存天可汗存乎子儀報曰皇帝萬夀無疆迴紇皆曰懐恩欺我子儀使喻之曰公等頃年逺渉萬里剪除兇逆恢復二京是時子儀與公等周旋艱難何日可忘今忽棄舊好助一叛臣何其誤也且僕固懐恩棄君忘親於公等何有迴紇曰謂令公没矣不然何以及此令公誠在安得而見之子儀將出諸將皆曰戎狄不可信也請無往子儀曰虜有數十倍之衆今力不敵奈何且至誠感神况虜軰乎諸將曰請選鐵騎五百為從子儀曰此適足為害也乃傳呼曰令公來虜初疑皆持滿注目以待之子儀乃以十數騎徐出免胄而勞之曰安乎久同忠義何至於是迴紇皆捨兵䧏馬拜曰是吾父也子儀招首領等飲以酒與之重錦歡言如初子儀性忠信事上誠盡田承嗣方跋扈狼傲無禮子儀嘗遣使至魏州承嗣輙望拜之指其膝謂使者曰兹膝不屈於人若干嵗矣今為公拜李靈曜據汴州公私財賦皆遏絶獨子儀封幣經其境莫敢留必持兵衛送其為豺虎所服如此李光弼為江北副元帥議者稱自艱難已來唯光弼行軍治戎沉毅有籌略將帥中第一後為河南淮南山南東道荆南等道副元帥出鎮臨淮時田神功平劉展後逗留於楊府尚衡殷仲卿相攻於兖鄆來瑱旅拒於襄陽朝廷患之及光弼輕騎至徐州史朝義退走田神功遽歸河南尚衡殷仲卿來瑱皆懼其威名相繼赴闕崔寕蜀之偏將初蜀劔山賊擁絶不通道代宗憂之嚴武薦寕為利州刺史既至山賊遁散繇是有名辛雲景大歴中為太原節度迴紇恃舊勲知朝廷優容之每入我界必肆貪狼之性至太原雲景以戎狄之道待之虜畏雲景莫不􅅥息數年間太原大理無烽警之虞叚秀實大歴末為四鎮北庭行軍涇原鄭頴節度使三四年間吐蕃不敢犯塞陽恵元徳宗建中初為神䇿京西兵馬使忠勇果毅多權略稱為名將張萬福建中初以和州刺史宿衛李正已反將斷江淮路令兵守埇橋渦口江淮進奉舩千餘隻泊渦口下不敢過德宗以萬福為濠州刺史召見謂曰先帝改卿名正者所以表卿也朕以為江淮草木亦知卿威名若從先帝所改恐賊不知是卿身也復賜名萬福慰遣之萬福馳至渦口立馬岸上發進奉舩淄青兵士倚岸睥睨不敢動諸道舩繼進改泗州刺史李晟興元初為神策軍使與河中節度使李懐光同討朱泚每將合戰必自異衣錦裘繡㡌前行親自指導懐光望見惡之乃謂晟曰將帥當持重豈自表飾以㗖賊也晟曰晟久在涇原軍士頗相畏服故欲令其先識以奪其心爾及其克京城至於白華忽有賊騎千餘出於官軍之背晟以麾下百餘騎馳之左右呼曰相公來賊聞之驚潰及為四鎮北庭行營副元帥吐蕃相尚結贊頗多詐謀尤惡晟乃相與議云唐之名將李晟與馬燧渾瑊爾不去三人必為我憂乃行反間遣使因馬燧以請和既請和即請盟復欲因盟以虜瑊因以賣燧馬燧興元初為河東節度領晉慈隰節度兵馬副元帥徳宗詔燧及渾瑊駱元光同討李懐光於河中燧與渾瑊駱元光韓逰瓌合軍次於長春宫懐光遣驍將徐廷光以精卒六千守城兵械甚嚴燧度長春不下則懐光自固攻之則曠日持久死傷必甚乃挺身至城下呼廷光廷光素懼燧威名則拜於城上李觀貞元初為右龍武將軍四鎮北庭行營副元帥李晟表為涇原節度使吐蕃深畏之郝玼貞元中為臨涇鎮將勇敢無敵聲振虜廷後為涼州刺史玼出自行間前無堅敵在邊三十年毎戰得蕃俘必刳剔而歸其屍蕃人畏之如神贊普下令國人曰有生得郝玼者賞之以等身金蕃中兒啼者呼郝名以懼之十三年檢校右散騎常侍渭州刺史御史大夫充涇原行營節度平涼鎮遏都知兵馬使封保定郡王吐蕃畏其威紀綱欲圖之朝廷慮失驍將移授慶州刺史竟終牖下李景略貞元中為侍御史豐州刺史西授䧏城使豐州北扼迴紇迴紇使來中國豐乃其通道前為刺史者多懦弱虜使至則敵禮抗坐時迴紇遣梅録將軍隨中官薛盈珍入朝景略思以氣制之郊迎傳言欲先見中使梅録初未喻景略既見盈珍乃使人謂梅録曰知可汗初殞欲申弔禮乃登髙隴位以待之梅錄俯僂前哭景略因撫之曰可汗棄代助爾號慕虜之驕容盛氣索然盡矣遂以父行呼景略自此迴紇使至景略皆坐拜之於庭中繇是甚有威名後為河東節度李說行軍司馬迴紇使梅録將軍入朝說置宴㑹有梅録爭上下坐說不能遏景略叱之梅録前過豐州者也識景略語音疾趨前拜曰非豐州李端公耶不意在此不拜麾下久矣何其瘠也又再拜遂命之居次坐將吏賔客顧景略皆嚴憚王佖貞元中為神䇿將軍吐蕃寇涇原佖伏卒擊尚結贊㡬獲之繇是深為所畏范希朝貞元中為振武節度使異蕃雖䑕竊狗盗必殺無赦戎虜甚憚之曰有張光晟苦我久矣今聞是乃更姓名而來其見畏如此積十四年皆保塞而不為橫希朝自近代號為名將人多比之趙充國段佑貞元末為涇原節度使練卒保邊為西蕃畏憚劉澭貞元末為保義軍節度隴右經略等使蕃戎畏之不敢為宼郗士美以憲宗元和初為昭義節度使討王承宗於時四靣七八鎮聚兵十餘萬士美兵事最理威聲甚振承宗大懼指期有破亡之勢㑹詔班師至今两河間稱之野詩良輔元和中為鳳翔大將與靈武大將史敬奉涇原將郝玼各以名雄邊上吐蕃嘗謂漢使曰唐國既與大蕃和好何妄語也問曰何謂妄語曰若不妄語何因遣野詩良輔作隴州刺史其畏憚如此裴度以穆宗長慶二年自河東節度除東都留守至闕又以度為司空平章事充淮南節度使初度發太原中途得朱克融王廷凑復書皆許退兵度不敢發以其書奏穆宗穆宗喜因遣中使宣慰克融并廷凑入深州取牛元翼又令先於途中命度更發書與廷凑度書因言朝謝後即歸留務中使見書慮廷凑知度東歸無兵權即背前約遞請度易其即歸之辭并上其書草穆宗方憂深州之圍得度前後書喜甚及度至又自有以悟帝恩待益至故復得兵符段文昌為西川節度使同平章事文昌少在西蜀素熟蜀人情至是用寛政嚴靜有斷蠻夷畏服長慶二年雲南宼黔中觀察使崔元畧上言朝廷憂之不及乃詔報文昌文昌走一介之使以遏之蠻寇遂退薛平為平盧軍節度使敬宗寳歴元年五月加檢校左僕射兼户部尚書不踰月復檢校司空初元和十四年誅李師道分其地為三鎮其一淄青齊登萊五州平領之及長慶元年幽鎮叛杜叔良統橫海全軍討伐不勝棣州為賊所窘朝廷乃委平以偏師援棣州平即遣將李叔佐以兵五百救之居數月刺史王稷餽給稍薄兵士怨怒叔佐不能戢宵潰而歸仍推突將馬狼兒為帥行及青城鎮刼鎮將李自勸并其衆以至愽昌鎮復刼其鎮兵共得七千餘人徑取青州城城中兵少力所不敵平悉府庫并家財厚賞二千精卒逆擊之仍先以騎兵掩其家屬輜重賊衆惶惑反顧因大敗狼兒與其同惡千數輩脫身竄匿餘黨䧏稍後者猶斬於鞠塲其眀日狼兒亦就擒戮繇是逺近畏服平之威略平在鎮六周嵗兵甲犀利井賦均一至是入覲百姓遮道乞留數月乃得出時人以為近日節制罕有平比張仲武為幽州節度大破回鶻烏介可汗繇是威加北狄李罕之僖宗末為河南尹每討賊無不擒之曽縱兵於蒲䧏之地有山曰摩雲土人設堡於上號摩雲寨前後不能攻取罕之至則下焉自此目為李摩雲梁王重師唐僖宗文德中董左右長劍軍太祖伐上蔡重師力戰有功及討兖鄆擢為都指揮使重師枕戈擐甲五六年於齊魯間凡經百餘戰繇是威振敵人王彦章累典禁兵從太祖征伐所至有功嘗持鐵鎗衝堅䧟陣敵人畏之目之為王鐵鎗後唐莊宗初為晉王聞彦章授招討使自魏州急赴河以備衝突至則徳勝南城已為所拔晉王嘗曰此人可畏當避其鋒一日晉王領兵廹潘張寨大軍隔河未能赴援彦章援鎗登舩比舟人解之招討使賀瓌止之不可晉王聞彦章至抽軍而退其驍勇如此牛存節開平中為鄆州節度使慷慨有大節野戰壁守皆其所長威名聞於境外謝彦章以末帝貞眀中為排陣使賀瓌為北靣招討使與彦章同領大軍駐於行臺寨與晉人對壘彦章時領騎軍與之挑戰晉人或望我軍行陣整肅則相謂曰必两京太傅在此也不敢以名呼其為敵人所憚如此是時咸謂賀瓌能將歩軍彦章能領騎士後彦章為賀瓌疑之㑹為行營馬歩都虞候朱珪所誣瓌遂與珪協謀因享士伏甲以殺彦章及僕州刺史孟審澄别將侯温裕等於軍因謀叛晉人聞之喜曰彼將帥如是亡無日矣審澄温裕亦善將騎軍然所領不過三千騎多多益善唯彦章有焉後唐史建瑭為招徳軍校梁將李思安之圍上黨也建瑭為前鋒與總管周徳赴援時汴人夾城深固援路斷絶建瑭日引精騎設伏擒生夜犯汴營驅斬千計敵人不敢蒭牧皆相戒曰宜避史先鋒周徳威小字陽五從武皇為内衙軍副光化二年三月汴將氏叔宗率衆逼太原有陳章者以虓勇知名衆謂之夜乂言於叔宗曰晉人所恃者周陽五願擒之請賞以郡陳章嘗乗驄馬朱甲以自異武皇戒徳威曰我聞陳夜乂欲取爾求郡宜善備之徳威曰陳章大言未知鹿死誰手他日致師戒部下曰如陣上見陳夜乂爾等但走徳威㣲服挑戰部下偽退陳章縱馬追之徳威背揮鐵撾擊墮馬生擒以獻繇是知名徳威身長靣黒笑不改容凡對敵列陣凛凛然有肅殺之風中興之朝號為名將及其殁也人皆惜之符存審少在軍中識機知變行軍出師法令嚴眀决䇿制勝動無遺悔功名與周德威相匹皆近代之良將也安金全為騎將時梁國未平两軍對壘汴之㳺騎毎出必為金全所獲故賊之偵邏者咸懼之目為五道蓋比隂鬼將有五道之名以取人命故也夏魯竒初在梁事王彦章為軍吏與主將不協遂歸於莊宗以為䕶衛指揮使故城之戰軍中識魯竒皆憚之曰此乃夏七也北師嘗言王彦章驍勇畏之魯竒曰王鐵鎗膽如芥子吾最知之無足可畏晉李承約初仕後唐為黔南節度使數年之間巴邛蠻蜃不敢犯境漢朱漢賔為安州節度使至郡期年敵不敢犯一境賴之周安審暉仕晉為鄧州節度晉祖幸鄴安重榮據常山起兵襄陽帥安從進與之連謀南北俱起從進率襄漢之衆攻南陽州無城壁僅守署衙而已賊逼城下審暉登陴召賊帥而讓之以審暉家世戰將聞其言愧畏而去從進不能止二安平就加太尉冊府元龜卷三百九十三
