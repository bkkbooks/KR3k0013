body:
  text: 冊府元龜卷一百四十四宋王欽若等撰帝王部弭災第二唐髙祖武徳二年閏二月乙卯詔曰酒醪之用表節制於懽娱芻豢之滋致甘㫖於豐術然而沈湎之輩絶業忘資惰窳之民騁嗜奔慾方今烽燧尚警兵革未寧年榖不登市肆騰踴趣末者衆浮冗尚多肴羞麴蘖重増其費救弊之術要在權宜闗内諸州官民宜斷屠酤四年三月帝以旱故親録囚徒俄而澍雨太宗貞觀元年七月闗東河南隴右及縁邊諸州霜害秋稼九月辛酉詔曰蟲霜為害風雨不時政道未康咎徴斯在朕祗奉眀命撫育黔黎憂愍之至實切懐抱輕徭薄賦務本勸農必望民殷物阜家給人足而隂陽不和氣候乖舛永言罪巳撫心多愧河北燕趙之際山西并潞所管及蒲虞之郊豳延以北或春逢亢旱秋遇霜滛或蟊賊成災嚴凝早降有致饑饉慚惕無忘特宜矜恤救其疾苦可令中書侍郎温彦博尚書右丞相魏徴治書侍御史孫伏伽檢校中書舍人辛諝等分往諸州馳驛檢行其苖稼不熟之處使知損耗多少户口乏糧之家存問若為支計必當細勘速以奏聞待使人還京量行賑濟十月丁酉以嵗饑減膳三年四月丙午以旱甚避正殿六月詔曰朕以𦕈身祗膺大寳託王公之上居億兆之尊勵志克己詳求至治兢兢業業四載于兹矣上不能使隂陽順序風雨以時下不能使禮樂興行家給人足而關輔之地連年不稔自春及夏亢陽為虐雖復潔誠祈禱靡愛斯牲膏雨愆應田疇廢業斯乃上𤣥貽譴在予一人元元何辜罹此災害朕是用食不甘味寢不安席瞻西郊而載惕仰雲漢而疚心内顧諸已永懐前載既眀不自見徳不被物豈賞罰不衷任用失所将奢侈未革苞苴尚行者乎文武百辟宜各上封事極言朕過勿有所隠是月遣開府儀同三司長孫無忌左僕射房𤣥齡工部尚書叚綸刑部尚書韓仲良祈雨於名山大川八年七月隴右山摧大蛇見山東河南淮海之地多大水帝以問祕書監虞世南曰是何祥也脩何術可以禳之對曰蛇見山澤盖深山大澤必有龍蛇亦不足恠也山東足雨雖則其常隂􅆭過久恐有寃獄伏願科省係囚庶㡬或當天意且妖不勝徳唯修徳可消變帝然之遣使者分道賑恤餓人申理獄訟多所原免十月彗星見帝謂羣臣曰天見彗星是何妖也秘書監虞世南對曰昔齊景公時有彗星見公問晏子晏子對曰公穿池沼畏不深起臺榭畏不髙行刑罰畏不重是以天見彗星為公誡景公懼而修徳後十六日而星沒臣聞天時不如地利地利不如人和若政徳不修麟鳯數見終是無補但使百姓安樂朝無闕政雖有災變何損于時然願陛下勿以功髙古人而自矜大勿以太平漸久而自驕怠慎終如始彗星未足為憂帝曰吾之治國良無景公之過但吾纔弱冠舉義兵年二十四平天下未三十而居大位自謂三代以降撥亂之主莫臻於此重以薛舉之驍雄宋金剛之鷙猛竇建徳跨河北王世充據雒陽當此之時足為勍敵而皆為我所擒及逢家難吾復决意安社稷遂登九五降服北夷吾頗有自矜之志以輕天下之士此吾之罪也上天見變良為是乎秦始皇平六國隋煬帝富四海既驕且逸一朝而敗吾亦何得自驕言念于此不覺惕焉懼矣温彦博進曰昔宋公一言彗星三徙陛下見變而懼災其消乎十一年七月車駕廵雒陽詔以水災諸司供進悉令減省凡在供役量事停廢十五年六月有星孛于太微宫帝既罷封禪于是避正寢減常饌申以祗誡星退乃復十七年三月甲子以久旱詔曰去冬之間雪無盈尺今春之内雨不及時載想田疇恐乖豐稔農為政本食乃人天百姓嗷然萬箱何兾昔頽城之婦隕霜之臣至誠所通感應天地今州縣獄訟常有寃滯者是以上天降鑒延及兆庶宜令覆囚使至州縣科簡刑獄以申枉屈務從寛宥以布朕懐庶使桑林自責不獨美於殷湯齊郡表墳豈自髙於漢代六月癸巳以旱不視朝乙巳謂侍臣曰殷湯周宣求雨懇禱昔聞其語今見其心比望雲蒸雨濃重於金膏玉液又詔曰朕以寡徳祗膺寳命而政慙稽古誠闕動天和氣愆于隂陽亢旱渉於春夏靡愛斯牲莫降雲雨之澤詳思厥咎在予一人今避兹正殿以自剋責尚食常膳亦宜量減京官五品已上各進封事極言無隠朕将親覽以答天譴髙宗永徽五年正月以時旱手詔京官文武九品已上及朝集使各進封事極言厥咎顯慶元年二月上封人奏稱去嵗粟麥不登百姓有食糟糠者帝命取所食物視之驚嘆手詔曰上封人所進食極惡情之憂灼中宵輙寐永言給足取愧良深夫國以人為本以食為天百姓不足君孰與足朕臨御天下于今七年每留心庶績軫慮農畝而政道未凝仁風猶缺致令九年無備四氣有乖遂使去秋霖滯便即罄竭所以佇西郊而結念眷東作以勞懐豈下乏農夫上甘珍饌宜令所司常進之食三分減二羣臣奏言伏見手詔以近畿諸州百姓少食特為減膳去年雖不善熟未是大饑陛下憂勞情深發使賑給復為減膳在外黎庶不勝喜慶帝曰比日亦聞百姓食少不足為至是今所見者乃非人所食物朕聞天子以百姓心為心豈有見有如此一身獨供豐饌自見此食憂歎不能已也三月澍雨百寮請復常膳許之四年七月以亢旱避正殿總章元年四月丙辰彗星見於五車帝避正殿御延福殿前東廊事令中御減膳太常停樂仍令内外文武九品已上各上封事極言得失勿令有隠太子少師許敬宗等奏稱星雖孛而光芒小此非國𤯝不足上勞聖慮請御正殿復常膳帝曰朕獲奉宗廟臨馭億兆謫見于天誠朕之不徳也不從所請敬宗等又奏曰陛下至仁被物克享靈心東封告成休徴應兆伐叛懐柔無逺不屆若不上符天意豈能致此雖有髙麗一隅上阻王命天軍問罪殄滅有期謫見東北當其分野上𤣥星象見彼咎徴臣等不勝慶悦帝曰天道既逺非人所測我為萬國主豈可推過於小蕃哉戊辰彗星滅二年二月戊辰以旱親慮京城囚徒其天下見禁囚委當州長官慮之仍令所司分禱名山大川咸亨元年三月以嵗旱榖貴詔司成𢎞文崇賢館及書筭律醫胡書等諸色學生并别勑修撰寫經書官典及書手等官供食料者宜並權停其有職任者各還本司自餘放歸本貫秋熟已後更聼進止八年以時旱親慮囚徒多有原宥仍令沛王賢慮諸司囚周王顯慮雒州及兩縣囚上元二年四月久旱避正殿減膳徹懸兼令百官極言得失勿有所隠仍令禮部尚書楊思敬往中嶽以申祈禱三年七月彗星見于東井光芒長至三丈掃中台指文昌宫帝避正殿詔中殿徹膳太常停樂兼減食粟之馬遣使慮岐州及京城囚徒内外文武官各進封事勿有所隠八月青州大風齊淄等七州大水詔停此中尚梨園等作坊減少府監雜匠放還本邑兩京及九成宫土木工作亦罷之天下囚徒委諸州長官慮之儀鳯三年四月朔以旱避正殿親慮京城繫囚悉原宥之永隆二年正月己亥詔曰朕聞受上天之命者其道在乎愛人處皇王之位者其功先於濟物然則所修在徳池籞可以假貧人所寳惟賢珍玩不足奉諸已自朕臨馭天下三十餘年永念黎元情深撫育頻頒制命猶未遵行所有差科尚多勞擾闗中地狹衣食難周山東遭澇糧儲或少刺史縣令寄以字人長史司馬職惟毗賛若能恤隠求瘼清直無私則囹圄于是空虛鰥寡自然蘓息而在外官司罕能奉法志存苟且不舉綱維欲使訟息刑清家給人足無為而化其路何繇今當勵精求政先身理物救乏賙無自邇及逺凡在寮庶宜識至懐其殿中太僕寺馬並令減送羣牧諸方貢獻物及供進口味百司支料並宜量事減省雍岐華同四州六等已下户宜免兩年地税河北澇損户常式蠲放之外特免一年調其有屋宇遭水破壊及糧食乏絶者令州縣勸課助修并加給貸永淳元年正月朔以年饑受朝賀而不設㑹放雍州諸府兵士於鄧綏等州就榖中宗神龍二年正月以旱親録囚徒多所原宥其東都及天下諸州委所在長官詳慮又遣使祭五嶽四瀆并諸州名山大川能興雲雨者五月以旱避正殿尚食減膳睿宗延和元年七月丙戌以炎旱命減膳囚徒並决斷勿使寃滯土木之功並停𤣥宗先天二年六月以久霖雨告乾陵及太廟帝減膳避正殿開元二年正月闗中饑下詔曰朕聞諸易曰先天而天不違後天而奉天時天且弗違况於人乎因斯而言則君事於天養於人行月令順時物也朕以不徳恭膺斯運静言詢政每用憂勞属獻嵗發春東風觧凍土膏脉散草樹自樂而天久不雨元元何辜孰可以授農事拯彼饑者豈布徳利施慶恵尚不及歟豈掩骼埋胔無麛無卵尚不及歟豈名山大川修祭命祀尚不及歟欽若令典惟増所懼緬懐大猷思補其闕有司可稽春令以稱朕心其有直諫昌言宏益政理者朕将親覽罔或隠避不急之務一切停息見禁囚徒速令處置宜從寛大勿使稱寃本州本軍刺史軍将境内所有名山大川能興雲致雨者並宜祈祭其有僵屍暴骸無主収歛者亦仰埋掩量致祭訖各具狀奏聞應湏酒脯宜用官物古者雪寃婦於東海問刑人于北寺則以旱之故應時如響至于山不童澤不竭使霈然以降興而致之復何逺也将逹精誠務修蠲潔俾幽坎遂性飛走從宜則冀天之愛人月離于畢顒顒之望感而遂通布告遐邇令知此意二月帝親慮囚徒宰臣等奏曰陛下亢旱親降徳音減膳徹樂朝野之人無任欣感然食粟之馬在厩猶多臣請馬料日減其半廻給饑户則人畜偕濟免供億之乏許之四月壬子以久雨命有司禜京城門三年五月戊申以旱故下詔曰司牧生人愛之如子睠兹災旱倍切憂勤将理政不眀邪寃囚有滯邪疵癘道長邪隂陽氣隔邪何崇朝宻雲布未洽也載加寅畏弗敢荒寧誠不動天歎深罪已思從避減以塞愆尤俾月離有期星退何逺朕今避正殿減常膳仍令諸司長官各言時政得失以輔朕之不逮天下見禁囚徒中或以痛自誣者各令長官審加詳覆疑有寃濫随事案理仍告於社稷備展誠祈諸州旱處有山川能興雲致雨者亦委州縣官長速加禱祀四年五月甲辰詔曰今年蝗蟲暴起乃是孶生所繇官司不早除遏信蟲成長開食田苖不恤人災自為身計向若信其拘忌不有指麾則山東田苖掃地俱盡使人等至彼催督其中猶有推託以此當委官員責實若有勤勞用命保䕶田苖湏有褒貶以眀得失前後使人等審定功過各具所繇州縣長官等姓名聞此蟲若不盡除今年還更生子委使人分州縣計㑹勿使遺類是時山東諸州蝗蟲五月末在處生子陂澤鹵田尤甚縣官或随處掘穽埋瘞放火焚滅殺百萬餘石餘皆高飛凑海蔽天掩野㑹潮水至盡漂死焉蝗蟲積成堆岸及為鵶鳶白鷗練鵲所食種類遂絶八月詔河南北檢校蝗蟲使狄光嗣康敬昭髙道昌賈彦璿等宜令待蟲盡看刈禾有次第然後入京奏事恐山澤之内或遺子息農隙已後各令府州縣長檢校仍告按察使如来年廵察更令蟲出所由官量事貶降六年七月帝以亢旱不御正殿於小殿視事詔曰皇天應人必有所謂此月少雨盖非徒然深慮繫囚或有寃滯京城内諸司見禁囚徒並以来日過朕将親慮所司量准舊典其杖以下情不可恕者速決自餘即放却七年五月朔日有食之帝素服以候變徹樂減膳令中書門下省察囚繫及天下水旱之州皆令賑恤不急之務一切停罷七月詔曰今月之初雖降時雨自此之後頗愆甘液如聞側近禾豆微致焦萎深用憂勞式資祈請丘禱則久常典宜遵即令禮部侍郎王闕太常少卿李暠分往華嶽河瀆祈求甲申親慮囚於宣政殿事非切害悉原之詔曰朕以匪徳嗣膺丕命雖日慎為誡政期以康而天災流行誠或未感自孟秋在候雨澤愆足永念農畝用懐宵旰在予之責萬方何罪視人如傷一物増怵且夫修政之要恤刑之重雖得情勿喜寧僣無濫将恐此輩猶有寃人或傷於和而作此厲法惟明慎事藉躬親故爰加案省開其幽滯雖士師不寃時稱閱實而愚者自䧟朕甚愍焉故屈常法特申寛典丙戌詔曰爰自春首頗愆甘澤眷兹近甸将損嘉苖人天謂何夙夜増怵豈刑罰莫省罪獄其紛儻致吁嗟是生炎亢故京師囚繫親慮原減而郡縣狴牢将何慎恤平分之道載軫于懐天下諸州見繫囚徒宜令所繇長官便慮有司即此類作條件處分九年夏五月己未勅諸州水旱時有其五嶽四瀆宜令所司差使致祭自餘名山大川及古帝王并名賢将相陵墓並令所司州縣長官致祭仍各修飾洒掃十二年七月河東河北旱命中書舍人冦泚宣慰河東道給事中李昇期宣慰河北道百姓有匱乏者量事賑給帝親禱于内壇場三日曝立十四年六月丁未以久旱分命六卿祭山川詔曰五嶽視三公之位四瀆當諸侯之秩載于祀典亦為國章方属農功頗増旱暵䖍誠徒積神道未孚用申靡愛之勤兾通能潤之感宜令工部尚書盧從愿祭東嶽河南尹張敬忠祭中嶽御史中丞兼户部侍郎宇文融祭西嶽及西海河瀆太常少卿張九齡祭南嶽及南海黄門侍郎李暠祭北嶽右庶子何鸞祭東海宗正少卿鄭繇祭淮瀆少詹事張晤祭江瀆河南少尹李暈祭北海及濟瀆且潤萬物者莫先乎雨動萬物者莫先乎風眷彼靈神是稱師伯雖有常祀今更陳祈宜令光禄卿孟温祭風伯左庶子吴兢祭雨師各就壇壝務加崇敬但羞蘋藻不假牲牢應縁奠祭尤宜精潔壬戌以旱及風災命官及州縣長官上封事指言時政得失無有所隠十六年九月以久雨帝思宥罪緩刑乃下制曰古之善為邦者重人之命執法之中所以和氣洽嘉生茂今秋京城連雨隔月恐耗其膏粒而害于粢盛抑朕之不眀何政之闕也永惟久雨者隂氣凌陽寃塞不暢之所致也持獄之吏不有刑罰生於刻薄輕重出於愛憎邪詩曰此宜無罪汝反収之刺壊法也書曰與其殺不辜寧失不經眀慎刑也好生之徳可不務乎兩京及諸州繫囚應推徒已下罪並宜釋放死罪及流各減一等庶得解吾人之愠結迎上天之福祐布告遐邇知朕意焉二十一年四月以久旱命太子少保陸象先户部尚書杜暹等七人往諸道宣慰賑給仍令黜陟官吏疎决囚徒天寳十二年八月京師連雨二十餘日米涌貴令中書門下就京兆大理疎决囚徒十四載三月詔曰近日以来時雨未降在於宿麥慮有所傷雖憂勤之心不忘於黎庶而精誠之至冀展於靈祗宜令太子太師陳希烈祭𤣥㝠光禄卿李憕祭風伯國子祭酒李麟祭雨師仍取今年二十三日各申誠請務令蠲潔如朕意焉又詔曰闗輔郡邑霈澤屢施京城在近時雨未降是用軫慮匪寧于懐其諸郡壇雖已勤請攸資遍祭庶逹誠心宜令吏部侍郎蒋烈今月二十五日祭天皇地祗給事中王維等分祭于五星壇務申䖍潔以副朕懐肅宗至徳二年三月癸亥大雨至癸酉不止帝令恤獄緩刑詔三司條件疎理處分甲戌雨止乾元元年五月己亥亢旱隂陽人李奉先自大眀宫出金龍及紙錢太常音樂迎之送於曲江池投龍祈雨宰相及禮官並於池所行祭禮畢奉先投龍於池二年三月癸亥以久旱徙東西二市於是祭風伯雨師修雩祀壇為泥人土龍及望祭名山大川而祈雨代宗永泰元年七月以久旱遣近臣分録大理京兆囚徒三年六月庚子以大旱分遣左僕射裴冕等禱祝川瀆及徙市閉諸坊門祀風伯雨師是日乃雨大歴四年自四月雨連霖至秋京師米斗至八百官出米二萬石分場出糶貧人閉坊市北門置土臺及黄幡以祈晴是日雨止徳宗貞元元年五月癸卯命右庶子裴諝殿中少監馬錫鴻臚少卿韋俛分禱終南秦嶺諸山以祈雨十二月丁亥詔曰朕以𦕈身繼眀列聖不能纂修先志以洽昇平馴致冦戎屢興兵革上𤣥降警蝗旱為災年不順成人方歉食言念於此實用傷懐是以齊心别宫與人祈榖雖陽和在候而黔首無聊稱慶于予竊所不敢其米年正月一日朝賀宜罷二年正月壬辰朔以關輔荒饉停朝賀之禮丙申詔曰朕以薄徳託于人上勵精思理期致雍熈而鑒之不眀百度多缺傷痍未瘳而征役荐起流亡既甚而賦斂彌繁人怨上聞天災下降連嵗蝗旱盪無農収惟兹近郊遭害尤甚豈非昊穹作沴深警予𠂻跼蹐憂慙罔知攸措今榖價騰踊人情震驚鄉閭不居骨肉相棄流離殞斃所不忍聞公私之間廪食俱竭既無賑恤猶復徴求財殫力盡捶楚仍及弛征則軍莫之贍厚取則人何以堪念兹困窮痛切心骨思所以濟浩無津涯補過實在於増修救患莫加于息費致咎之本既繇朕躬謝譴之誠當自朕始尚食每日所進御膳宜各減一半應宫内人等每月唯供給糧米一千五百石其飛龍厩馬從今已後至四月三十日並減半料京兆尹應科徴諸色名目一切並停如有能減有均無賙救貧乏者當授以官秩五月百寮上表請復御膳先以旱蝗冦盜充斥故從貶省至是從之六年三月以旱故遣使分禱山川是春京畿闗輔河南大無麥苖十一年五月以旱故令禮部尚書董晉廵覆百司禁囚十二年四月以久旱令百司速决囚徒十五年三月以久旱令李巘鄭雲逵於炭谷秦嶺祈雨四月以久旱令隂陽術士陳混嘗吕廣順及摩尼師祈雨十九年正月至於六月不雨分公卿望祈于嶽鎮海瀆名山大川精禱于太社太稷太廟天皇地祗及山川能出雲為雨者六月詔曰京師近郊時雨未洽慮囹圄寃滯致傷和氣是用軫於朕心其御史臺大理寺及京兆府等諸司繫囚中書門下與有司亟議條理寃滯以聞憲宗元和七年三月庚午以旱故詔京畿内禁囚徒據罪輕重宜疎理處分八年六月辛丑命出宫人二百車許人得娶以為妻以水害誡隂􅄹故也冊府元龜卷一百四十四
