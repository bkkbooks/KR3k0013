body:
  text: 册府元龜卷四十宋王欽若等撰帝王部文學好文文學書稱堯之德曰文思舜之德曰文眀禹之德曰文命而咸以稽古著於典謨之首是知王者嚮眀而治經緯天地臨炤百官未有不尚於文德者也故河圖雒書聖作而明述股肱元首君唱而臣和商周而下簡策具存或受學甘盤或觀書乙夜采薇之詠發於文王黄竹之歌成於穆滿過沛宫而擊筑横汾水而興辭是皆帝王之文也易曰觀乎人文以化成天下禮曰君子如欲化民成俗其必繇學乎若乃聽㫁之餘清閒之宴留神文雅煥乎成章汎濫典籍取鑑古義以茲為務者固有益於政治誠聖哲之用心其或攻乎異端溺於小巧肆情閨闥流蕩淫靡者亦足以為戒也伏羲氏仰觀象於天俯觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始畫八卦以通神明之德以類萬物之情虞舜作歌曰勑天之命惟時惟幾乃歌曰股肱喜哉元首起哉百工熙哉殷湯作盤銘曰苟日新日日新又日新周文王重易六爻作上下篇漢髙帝十二年過沛留置酒沛宫悉召故人父老子弟佐酒發沛中兒得百二十人敎之歌上擊筑自歌曰大風起兮雲飛揚威加海内兮歸故鄉安得猛士兮守四方令兒皆和習之藝文志載帝歌詩二篇武帝元狩元年十月行幸雍祠五畤獲白麟作白麟之歌元鼎四年六月得寳鼎后土祠旁秋馬生渥洼水中作寳鼎天馬之歌元鼎五年得鼎汾陰作歌元封二年芝生丼泉齊房作芝房之歌二年至瓠子臨决河命從臣將軍㠯下皆負薪塞河堤作瓠子之歌五年冬南廵狩至於盛唐自尋陽浮江親射蛟江中獲之舳艫千里薄摐音千松反陽而出作盛唐摐陽之歌太初四年貳師將軍廣利斬大宛王首獲汗血馬來作西極天馬來歌太始三年二月行幸東海獲赤鴈作朱鴈之歌四年四月幸不其祠神人于交門宫若有鄉坐拜者作交門之歌又自造賦一篇後漢明帝制五家要說章句令桓郁校定於宣明殿華嶠書曰帝自制五行章句此言五家即謂五行之家也魏武帝剏造大業文武並施御軍三十餘年手不捨書晝則講武策夜則思經傳登髙必賦及造新詩被之管絃皆成樂章作氣出唱詞精列詞度関山詞薤露詞蒿里詞對酒詞陌上桑詞短歌行秋胡行苦寒行塘上行善哉行歩出東西門行又特好兵法抄集諸家兵法名曰接要又注孫武十三篇皆傳於世文帝年八歲能屬文有逸才遂博貫古今經傳諸子百家之書初為魏公太子時聞鍾繇有玊玦欲得之而難密使臨菑侯轉因人說之繇即送之與繇書曰夫玉以比德君子見美詩人晉之垂棘魯之璵璠宋之結緑楚之和璞價越萬金貴重都城有稱疇昔流聲將來是以垂棘出晉虞虢雙擒和璧入秦相如抗節竊見玊書稱美玊白若截肪黒譬純漆赤擬鷄冠黄侔蒸栗側聞斯語未覩其狀雖德非君子義無詩人髙山景行私所仰慕然四寳邈焉以逺秦漢未聞有良匹是以求之曠年未遇厥眞私願不果饑渇未副近見南陽宗惠叔稱君侯昔有美玦聞之驚喜笑與抃俱當自白書恐傳言未審是以令舎弟子建因荀仲茂轉言鄙㫖乃不忽遺厚見周稱鄴騎既到寳玦初至捧跪發匣爛然滿目猥以䝉鄙之姿得觀希世之寳不煩一介之使不損連城之價既有秦昭章臺之觀而無藺生詭奪之誑嘉貺益腆敢不欽承後繇為相國以五熟釡鼎範因太子鑄之釡成太子與繇書曰昔有黄之三鼎周之九鼎咸以一體使調一味豈若斯釡五味時芳葢鼎之烹餁以享上帝以養聖賢昭德祈福莫斯之美故非大人莫之能造故非斯器莫宜盛德今之嘉釡有逾茲美夫周之尸臣宋之考父衞之孔悝晉之魏顆彼四臣者並以功德勒名鍾鼎今執事寅亮大魏以隆聖化堂堂之德於斯為盛誠太常之所宜銘彞器之所宜勒故作斯銘勒之釡口庶可贊揚洪美垂之不朽銘曰於赫有魏作漢藩輔厥相惟鍾實幹心膂靖恭夙夜匪遑安處百寮師師楷茲度矩又常與元城令吳質書曰季重無恙途路雖局官守有限願言之懐良不可任足下所治僻左書問致簡益用増勞每念昔日南皮之逰誠不可忘既妙思六經逍遥百氏彈棊間設終以博奕髙談娛心哀箏順耳馳騖北塲旅食南館浮甘𤓰於清泉沉朱李於寒水皦日既殁繼以朗月同乘並載以遊後園輿輪徐動賔從無聲清風夜起悲笳㣲吟樂往哀來凄然傷懐余顧而言茲樂難常足下之徒咸以為然今果分别各在一方元瑜長逝化為異物每以念至何時可言方今㽔賔紀辰景風扇物天氣和暖衆果具繁時駕而游北遵河曲從者鳴笳以啓路文學託乗於後車節同時異物是人非我勞如何今遣騎到鄴故使枉道相過行矣自愛二十三年太子又與質書曰歲月易得别來行復四年三年不見東山猶歎其逺况乃過之思何可支雖書疏往反未足解其勞結昔年疾疫親故多罹其災徐陳應劉一時俱逝痛何可言邪昔日游處行則連輿止則接席何嘗須臾相失每至觴酌流行絲竹並奏酒酣耳熱仰而賦詩當此之時忽然不自知樂也謂百年已分長共相保何圖數年之間零落略盡言之傷心頃撰其遺文都為一集觀其姓名已為鬼録追思昔游嘗在心目而此諸子化為糞壤可復道哉觀古今文人類不䕶細行鮮以名節自立而偉長獨懐文抱質恬淡寡欲有箕山之志可謂彬彬君子矣著中論二十餘篇成一家之業辭義典雅足傳於後此子為不朽矣德璉常斐然有述作意才學足以著書美志不遂良可痛惜間歴觀諸子之文對之􅋞淚既痛逝者行自念也孔璋章表殊健微為繁冨公幹有逸氣但未遒耳至其五言詩妙絶當時元瑜書記翩翩致足樂也仲宣獨自善於辭賦惜其體弱不足起其文至於所善古人無以逺過也昔伯牙絶絃于鍾期仲尼覆醢於子路愍知音之難遇傷門人之莫逮也諸子但為未及古人亦自一時之雋也今之存者已不逮矣後生可畏來者難誣恐吾與足下不及見也行年已長大所懐萬端時有所慮至乃通夕不瞑何時復類昔日已成老翁但未白頭耳光武言年已三十在軍十年所更非一吾德雖不及年與之齊以犬羊之質服虎豹之文無衆星之明假日月之光動見瞻仰何時易邪恐永不復得為昔日游也少壯真當努力年一過往何可攀援古人思秉燭夜㳺良有以也頃何以自娛頗復有所造述不東望於邑裁書叙心建安末疫癘大起時人雕傷太子感歎與所素敬者大理王朗書曰生有七尺之形死為一棺之土唯立德揚名可以不朽其次莫如著篇籍疫癘數起士人雕傷余獨何人能全其壽故論撰所著典論詩賦葢百餘篇又使諸儒撰集經傳隨類相從凡千餘篇號曰皇覽黄初六年常行幸廣陵故城臨江觀兵於馬上為詩帝天資文藻下筆成章博聞廣識才藝兼該帝自叙曰余唯喜彈棊略盡其妙少為之賦上雅好詩書文籍雖在軍旅手不釋卷每每定省從容嘗言人少好學則思專長則善忘長大而能勤學者唯吾與袁伯業耳余是以少誦詩論及長備歴五經四部史漢諸子百家之言靡不畢覽嘗嘉漢文帝之為君寛仁𤣥黙務欲以德化民有賢聖之風時文學諸儒或以為孝文雖賢其於聰明通達國體不如賈誼帝繇是著太宗論曰昔有苗不賔重華舞以干戚尉佗稱帝孝文撫以恩德吳王不朝錫之几杖以撫其意而天下賴安乃𢎞三章之敎愷悌之化欲使曩時累息之民得濶步髙談無危懼之心若賈誼之才敏籌畫國政特賢臣之器管晏之資豈若孝文大人之量哉三年之中以孫權不復班太宗論於天下示不願征伐也他日又從容言曰顧我亦有所不取於漢文帝者三殺薄昭幸鄧通慎夫人衣不曳地集上書囊為帳帷以為漢文儉而無法舅后之家但當養育以恩而不當假借以權既觸罪法又不得不害矣其欲秉持中道以為帝王儀表者如是明帝大和四年詔太傅三公以帝典論刻石立於廟門之外魏初人疑無火浣布文帝以為火性酷烈無含生之氣著之典論明其不然之事絶智者之聽及明帝立詔三公曰先帝昔著典論不朽之格言其刋石於廟門之外及太學與石經並以永示來世景初三年西域使至而獻火浣布焉於是刋滅此論天下笑之帝又作陌上桑詞燕歌行善哉行折楊柳行煌煌京雒行明帝作苦寒行善哉行歩出夏門行擢歌行高貴鄉公嘗與中䕶軍司馬望侍中王沈散騎常侍裴秀黄門侍郎鍾㑹等講宴於東堂并屬文論名秀為儒林文人沈為文籍先生望㑹亦各有名號帝性急召欲速秀在内職到得及時以望在外特給追鋒車虎賁卒五人每有集㑹望輒奔馳而至甘露元年二月宴羣臣於太極東堂與侍中荀顗尚書崔贊袁亮鍾毓給事中中書令虞松等並講述禮典遂言帝王優劣之差帝慕夏少康因問顗等曰有夏既衰后相殆滅少康收集夏衆復禹之績髙祖拔起隴畆驅帥豪雋芟夷秦項包舉㝢内斯二主可謂殊才異畧命世大賢者也考其功德誰宜為先顗等對曰夫天下重器王者天授聖德應期然後能受命創業至於階縁前緒興復舊績造之與因難易不同少康功德雖美猶為中興之君與世祖同流可也至如髙祖臣等以為優帝曰自古帝王功德言行互有髙下未必創業者皆優紹繼者咸劣也湯武髙祖雖俱受命聖賢之分所覺懸殊少康殷宗中興之美夏啓周成守文之盛論德較實方諸漢祖吾見其優未見其劣顧所遇之時殊所名之功異耳少康生於滅亡之後降為諸侯之𨽻崎嶇逃難僅以身免能布其德而兆其謀卒滅過戈過戈二國名克復禹績祀夏配天不失舊物非至德宏仁豈濟斯勲漢祖因土摧之勢仗一時之權專任智力以成功業行事動靜多違聖檢為人子則數危其親為人君則囚繫賢相為人父則不能衞子身殁之後社稷幾傾若與少康易時而處或未能復大禹之績也推此言之宜髙夏康而下漢祖矣諸卿且論詳之翌日講業既畢顗亮等議曰三代建國列土而治當其衰弊無土崩之勢可懐以德難屈以力逮至戰國強弱相兼去道德而任智力故秦之弊可以力爭少康布德仁者之英也髙祖以力智者之雋也仁智不同二帝殊矣詩書述殷中宗髙宗皆列大雅少康功美過於二宗其為大雅明矣少康為優宜如詔㫖贊毓松等議曰少康雖積德累仁然上承大禹遺澤餘慶内有虞仍之援外有靡艾之助寒浞讒慝不德于民澆豷無親外内棄之以此有國葢有所因至於漢祖起自布衣率烏合之衆以成帝者之業論德則少康優課功則髙祖多語資則少康易較時則髙祖難帝曰諸卿論少康因資髙祖創造誠有之矣然未知三代之世任德濟勲如彼之難秦項之際任力成功如此之易且太上立德其次立功漢祖功髙未若少康盛德之茂也且夫仁者必有勇誅暴必用武少康武烈之威豈必降於漢祖哉但夏書淪亡舊文殘缺故勲美闕而罔載唯有伍員粗述大略其言復禹之績不失舊物祖述聖業舊章不愆自非大雅兼才孰能與於此向令墳典具存行事詳備亦豈有異同之論哉於是羣臣咸恱服中書令松進曰少康之事去世久逺其文昧如是以自古及今議論之士莫有言者德美隱而不宣陛下既垂心逺鑑考詳古昔又發德音贊明少康之美始顯於千載之上宜録以成篇永垂於後帝曰吾學不博所聞淺狹懼於所論未獲其宜縱有可採億則屢中又不足貴無乃致笑後賢彰吾闇昧乎於是侍郎鍾㑹退而論次四月丙辰帝幸太學問諸儒曰聖人幽贊神明仰觀俯察始作八卦後聖重之為六十四立爻以極數凡斯大義罔有不備而夏有連山殷有歸藏周曰周易易之書其故何也易博士淳于俊對曰庖犧因燧皇之圖而制八卦神農演之為六十四黄帝堯舜通其變三代隨時質文各繇其事故易者變易也名曰連山似山出内氣連天地也歸藏者萬物莫不歸藏於其中也帝又曰若使庖犧因燧皇而作易孔子何以不云燧人氏没庖犧氏作乎俊不能答帝又問曰孔子作彖象鄭𤣥作注雖聖賢不同其所釋經義一也今彖象不與經文相連而注連之何也俊對曰鄭𤣥合彖象於經者欲使學者尋省易了也帝曰若鄭𤣥合之於學誠便則孔子何為不合以了學者乎俊對曰孔子恐其與文王相亂是以不合此聖人以不合為謙帝曰若聖人以不合為謙則鄭𤣥何獨不謙耶俊對曰古義𢎞深聖問奥逺非臣所能詳盡帝又問曰繫辭云黄帝堯舜垂衣裳而天下治此庖犧神農之世為無衣裳但聖人化天下何殊異爾耶俊對曰三皇之時人寡而禽獸衆故取其羽皮而天下用足及至黄帝人衆而禽獸寡是以作為衣裳以濟時變也帝又問曰乾為天而復為金為玉為老馬與細物並耶俊對曰聖人取象或逺或近近取諸物逺則天地講易畢復命講尚書帝問曰鄭𤣥云稽古同天言堯同於天也王肅云堯順考古道而行之二義不同何者為是博士庾峻對曰先儒所執各有􅆾異臣不足以定之然洪範稱三人占從二人之言賈馬及肅皆以為順考古道以洪範言之肅義為長帝曰仲尼言唯天為大唯堯則之堯之大美在乎則天順考古道非其至也今發篇開義以明聖德而舎其大更稱其細豈作者之意邪峻對曰臣奉遵師說未喻大義至於折中裁之聖思次及四嶽舉鯀帝又問曰夫大人者與天地合其德與日月合其明思無不周明無不炤今王肅云堯意不能明鯀是以試用如此聖人之明有所未盡耶峻對曰雖聖人之𢎞猶有所未盡故禹曰知人則哲惟帝難之然卒能改授聖賢緝熙庶績亦所以成聖也帝曰有始有卒其惟聖人若不能始何以為聖其言惟帝難之然卒能改授葢謂知人聖人所難非不盡之言也經云知人則哲能官人若堯疑鯀試之九年官人失叙何得謂之聖哲峻對曰臣竊觀經傳聖人行事不能無失是以堯失之四凶周公失之二叔仲尼失之宰予帝曰堯之任鯀九載無成汨陳五行民用昏墊至於仲尼失之宰予言行之間輕重不同也至於周公管蔡之事亦尚書所載皆博士所當通也峻對曰此皆先賢所疑非臣寡見所能究論次及有鰥在下曰虞舜帝問曰當堯之時洪水為害四凶在朝宜速登賢聖濟斯民之時也舜年在既立聖德光明而久不進用何也峻對曰堯咨嗟求賢欲遜已位嶽曰否德忝帝位堯復使嶽揚舉側陋然後薦舜薦舜之本實繇於堯此葢聖人欲盡衆心也帝曰堯既聞舜而不登用又時忠臣亦不進達乃使嶽揚側陋而後薦舉非急於用聖恤民之謂也峻對曰非臣愚見所能逮及於是復命講禮記帝問曰太上立德其次務施報為治何繇而教化各異皆脩何政而能致於立德施而不報乎博士馬炤對曰太上立德謂三皇五帝之世以德化民其次報施謂三王之世以禮為治也帝曰二者致化薄厚不同將主有優劣邪時使之然乎炤對曰誠繇時有樸文故化有薄厚也四年正月黄龍二見寧陵縣界井中是時龍仍見咸以為吉祥帝曰龍者君德也上不在天下不在田而數屈於井非嘉瑞也仍作潛龍之詩以自諷司馬文王見而惡之晉懐帝即位於東堂聽政至於宴㑹輒與羣臣論衆務考經籍黄門侍郎傅宣歎曰今日復見武帝之世矣穆帝永和十二年二月辛丑帝講孝經孝武寧康三年九月親講孝經後魏明元帝禮愛儒生好覽史傳以劉向所撰新序說苑於經典正義多有所闕乃撰新集三十篇採諸經古史該洽古義兼資文武焉孝文帝雅好讀書手不釋卷五經之義覽之便講學不師授採其奥㫖史傳百家無不該涉善談莊老尤精釋義富有才藻好為文章詩賦銘頌在輿而作有大文筆馬上口授及其成也不改一字自太和十年已後詔册皆帝之文也自餘文章百有餘篇帝遷雒路繇朝歌見比干墓愴然悼懐為文以弔之通直常侍劉芳為注解表上之詔曰覽卿注殊為富博但文非屈宋理慙張賈既有雅致便可付之集書帝嘗宴王公侍臣於清徽堂命黄門郎崔光郭祚通直郎邢巒崔林等賦詩言志燭至公卿辭退李沖再拜上千萬嵗壽帝曰卿向以燭至故辭復獻千萬之夀朕報卿以南山之詩又親講喪服於清徽堂從容謂羣臣曰彦和季豫等彭城王總字彦和北海王詳字季豫年在蒙稚早登纓紱失過庭之訓并未習禮每欲令我一解喪服自審義解浮疎抑而不許頃因酒坐脫爾言從故屈朝彦遂親傳說將臨講坐慙戰交情御史中尉李彪對曰自古及今未有天子講禮陛下聖叡淵明事超百代臣得親承音㫖千載一時後周明帝㓜而好學博覽羣書善屬文辭彩温麗所著文章十卷武帝天和二年八月帝御大德殿集百寮及沙門道士等親講禮記建德二年十二月集羣官及沙門道士等帝升髙座辨釋三教先後以儒教為先道教為次佛教為後隋文帝開皇五年勅内史令李德林撰録作相時文翰勒成五卷謂之霸朝雜集煬帝初為晉王善屬文及為皇太子數有詩書遺牛𢎞𢎞亦有答及嗣位之後嘗賜宏詩其同被賜詩者至於文詞贊揚無如𢎞美唐太宗貞觀初著金鏡述以示侍臣六年閏八月己巳至慶善宫宴三品已上於渭之濵帝甚歡賦五言詩十一年十月辛丑幸集翠池宴五品已上帝曰公等酒既酣各宜賦一事帝賦尚書特進魏徵賦西漢其卒章曰終藉叔孫禮方知皇帝尊帝曰魏徵每言必約我以禮此語極好特宜記録十二年三月著作郎鄧隆上表請編録御製詩集不許帝初以功定海内櫛風沭雨不暇於詩書者久矣暨于嗣業進引忠良銳情思政朝夕孜孜求之若不及數年之後道致隆平天下晏如四夷賔服遂於聽覽之暇留情文史叙事言懐時有摛屬天才俊麗興寄𤣥逺博該册府文過擊玉故隆請編次焉其志不果四月虞世南卒帝悼之未幾帝為詩一篇追思往古興亡之道既而嘆曰鍾子期死伯牙破琴朕之此篇將何所示因令起居郎褚遂良詣其靈帳讀而焚之十四年三月丁丑帝幸國子學親觀釋奠祭酒孔穎達講孝經帝問穎達曰夫子門人曽閔俱稱大孝而今獨為曽說不為閔說何耶答曰曽孝能全獨為曽能達也制㫖駮之曰朕聞家語云曽晳使曽參鋤𤓰而誤㫁其本晳怒援大杖以擊其背應手仆地絶而復蘇孔子聞之告門人曰參來勿内既而曽子請焉孔子曰舜之事父母也使之常在側欲殺之乃不得小箠則受大杖則走今參於父委身以待暴怒陷父於不義不孝莫大焉繇斯而言孰愈於閔子騫也頴達不能對帝又謂侍臣曰諸儒各生異意皆非聖人論孝之本㫖也孝者善事父母自家刑國忠於其君戰陳勇朋友信揚名顯親此之謂孝具在經典而論者多離其文廻出事外以此為敎勞而非法何謂孝之道邪十七年太子太師魏徵卒帝為製碑文并御書石刻畢停於將作北門公卿士庶競以模寫車馬填噎日有數千時人號其碑為二絶文與書也十九年將征遼二月次河陽詔殷少師比干贈太師自為文祭之次鄴經魏太祖墓自為祭文三月幸定州經北岳自為祭文四月行軍總管姜確督兵攻葢至城中流矢而卒帝甚哀悼為五言詩以悼之十月班師次漢武臺餘基三城傍有祠堂塋域帝顧問侍臣對曰此是燕齊之士為漢武求仙之處其地俯臨大海長瀾接天岸多峻石竒怪之狀帝製文刻於石十二月定州御步輦而行帝攬筆於輦中賦詩二十年正月幸晉祠樹碑製文親書之於石九月鐵勒諸部俟斤頡利發等遣使相繼而至靈州者數千人咸請云願得天至尊為奴等作可汗子孫常為天至尊作奴死無所恨於是北荒悉平帝為五言詩以序其事公卿咸以此詩義兼懲勸可以垂誡將來請勒石於靈州従之二十一年八月骨利幹國遣使朝貢延陀之敗也詔遣雲麾將軍康野密往慰撫焉其俟斤大恱遣使隨野密入朝獻馬百匹有十四匹尤駿帝竒之各為製名號為十驥其一曰騰霜白其二曰皎雪驄其三曰凝露驄其四曰懸光驄其五曰決波騟其六曰飛霞驃其七曰發電赤其八曰流金􅚷其九曰翔麟紫其十曰奔虹赤帝乃為文以序其事厚待其使二十二年正月帝撰帝範十二篇賜皇太子顧謂王公曰飭躬闡政之道備在其中一旦不諱更無所言矣是日幸温湯御製温湯碑以示羣臣曰疇昔詞人已有此作朕又為之可得而比邪王公咸曰天文雄奥超象繫之表前代瑣瑣小詞豈得輒相比况乃神筆自書勒于温井之側侍坐王公咸聽於碑陰容紀姓名官位三月帝以胡塵無警朔漠來王乃制戎狄賔服之文又制玉華宫山銘紀示羣臣詔令學士並作又蕭瑀拜特進參預政事帝謂房𤣥齡曰蕭瑀不可以厚利誘之不可以刑戮懼之真社稷臣也乃降神筆賜詩曰疾風知勁草板蕩識誠臣帝又追思王業艱難佐命之力又作威鳳賦以賜司空長孫無忌帝少屬亂離久居兵陣及正位已後遂博覽羣書總其宏綱殆於萬卷遒文麗藻一時冠絶學王羲之書窮盡體致物論以為帝數年之内經史屬綴宫商自口起居郎傾耳揮翰百而不紀一焉髙宗為太子時貞觀二十二年二月引庶子少詹事司議舍人等入閣乃從容而言曰文章詞賦平生所愛然未之為也今日風景殊佳當與公等賦詩言志於是援筆以制序翌日太宗以皇太子詩序示王公曰朕觀太子此文及筆迹進於常日司徒長孫無忌對曰皇太子稟承天訓文章筆札羣藝日新是嵗太子制玊華宫山銘又獻玉華宫賦永徽五年五月制萬年宫銘刻石於永光門外仍令中書門下及文武三品已上并學士自書名位碑陰而刻之顯慶二年六月帝製元首前星維城股肱等誡以示侍臣禮部尚書𢎞文舘學士許敬宗等表請班示天下帝謙不許敬宗又上表請總名為天訓并請注解許之及注畢敬宗為之序十月幸鄭州次汜水帝以先帝於汜水擒竇建德因平王世充於是刻石立頌以紀功自為頌文五年三月幸并州童子寺賦詩而還十二月較獵於長社之安樂川召侍臣及藩臣夜讌帝賦詩以紀講習之事龍朔元年冬十月狩於南山製東狩詩以示羣臣麟德二年封禪十一月丁酉至平陰頓是日降雪帝賦詩皇后和咸亨四年十一月帝自製樂章有上元二儀三才四時五行六律七政八風九宫十洲得一慶雲之曲以示羣臣令太常行之儀鳳二年七月宴百寮及諸親於九成宫之咸亨殿酒酣帝賦詩作栢梁體皇太子霍王元軌相王輪羣臣相次繼作中宗神龍三年八月乙未親送朔方軍總管韓國公張仁亶於通化門外帝製序賦詩十月庚子幸兵部尚書韋嗣立莊封嗣立為逍遥公帝親製序賦詩睿宗好學工草𨽻尤愛文字訓詁之書𤣥宗開元八年親製春雪詩春臺望一章二十八句起居舍人蔡孚奏曰伏見所製氣雄詞美德音相屬鄙炎漢之奢侈徇有唐之儉陋知作勞而居逸念中人之家産用心如此天下斯安臣職在司言請宣示百寮及編國史手詔答曰朕以聽政之餘因時遊矚觀古人之制度懐先王之卑菲聊遇所覽直書其事雖文詞非麗亦不忘於言卿職在史官君舉必記將以朕之素意頒示庶寮循諷表章益深祇勉十年親注孝經頒示天下十一年行幸北都親製起義堂頌刻石紀功於太原府之南街十二年十一月幸東都至華州命刺史徐知仁與信安王禕勒石于華嶽祠南之通衢帝親製其文及親書信安王禕上言曰臣伏見御製西嶽碑文來從上𤣥光炤下土羣臣捧戴逰聖難名臣聞天作髙山氣雄茲嶽壓洪河而傑起凌蒼昊而孤標近當國門用固京邑自巨靈開拓往帝廵逰精意嘗聞頌聲則未非勝賞難就葢詞翰無能不遇非常之君孰覩非常之事陛下知其若此金聲而玉振之乃發揮睿詞幽贊神化廣大極天地光明融日月至理洞精㣲至功含造化合而成體散而成章巍乎煥乎不可得而稱也又復親迂彩筆寫在香牋隨手生姿入神變態勢如飛動妙絶古今諒得之自然豈因之外物對揚天休臣子之常也美而無述過莫大焉請以御製碑文頒示四海使伊昔之后自愧不才率土之臣咸知所謂則雖死之日猶生之年從之十三年封東嶽禮畢帝製紀泰山銘親札勒於山頂之石壁十四年十月幸汝州至温湯之行宫時屬雨雪帝親賦雨雪詩以示羣臣十一月幸寧王憲宅與諸王宴探韻賦詩即日還宫十五年五月端午宴羣臣于武成殿各賜衣一副自賦詩六月朔方節度使兵部尚書蕭嵩赴朔方軍命有司於定鼎門外供帳置酒以送之帝賦詩以光寵之十二月幸温泉宫登驪山石甕寺賦詩俾羣臣和焉二十一年十二月二十一日祀后土於脽上帝自為文禮畢令所司刋石於祀所二十五年八月甲子帝制訓誡六篇以示諸王其㫖葢明君臣父子之義齊祭稼穡之事也忠王嶼等上表請宣付史官及示百寮許之宰臣李林甫等奏曰臣等伏以聖謩垂訓輝映千古頒示朝廷未及天下兼望宣布中外手詔諭曰周公聖人攝行王政誡伯禽曰無以魯國驕人朕方聖雖慙豈忘誡子聊示廷訓何足以宣布中外耶天寳二年五月以重注孝經頒天下詔曰化人成俗率繇於德本移忠教敬實在於孝經朕思暢㣲言以理天下先為注釋尋亦頒行猶恐至賾難明羣疑未盡近更探討因而筆削兼為叙述以究源流將發明於大順庶開悟於來學宜付所司頒示中外四載帝讀洪範至無偏無頗而聲不和韻因改頗為陂下詔曰典謨既作雖曰不刋文字或訛豈必相襲朕臨政之暇乙夜觀書匪徒閱於㣲言實欲暢於精理每讀洪範至無偏無頗遵王之義三復斯文並皆協韻唯頗一字實則不偏又周易泰卦中無平不陂釋文云陂字亦有頗音陂之與頗訓詁無别為陂則文亦㑹意為頗則聲不成文應有煨燼之餘編簡墜缺傳授之際差乖相㳂原始要終雖有刋革朕雖先覺兼訪諸儒僉以為然終非獨斷其尚書洪範無偏無頗字宜改為陂庶使先儒之義去彼膏肓後學之徒正其魚魯仍宣于國學五載詔曰道為理本孝實天經將闡敎以化人必深究於㣲㫖朕欽承聖訓覃思𤣥宗頃改道德經載字為哉仍𨽻屬上句及乎議定衆以為然遂錯綜真詮因成注解又孝經舊疏雖粗發明幽晦探賾無遺猶未能備今敷暢以廣闕文且妙本逾𤣥㣲言久絶或怡然獨得或參以諸家庶𢎞聖哲之規用叶君親之義仍令集賢院具寫送付所司頒示中外八載九月皇太子生日帝製仁孝詩六章札於歩障以賜太子令中官髙力士以示朝臣宰相李林甫陳希烈等奏曰伏見陛下因太子生日撰仁孝詩障子并書臣等伏以宸章煥發睿札凝暉懸日月而齊光自雲霄而下濟驚心靡據動色相歡太子禀自生知備承聖訓冲姿有裕令望夙彰陛下示以義方形於翰墨爰於誕育之日朂以仁孝之經上揚祖宗之美傍考天人之際錫類所𢎞教義斯逺足可發揮前古垂範將來凡在衣冠之流咸知父子之道豈比周穪嗣續造齒胄於上庠漢寵元良但招賢於望苑王化之本實此知歸人倫所資罔不繇敎臣等𤨏陋謬典樞衡特奉鴻私幸覩殊貺捧天書而竊抃仰聖澤以無寧無任恱豫之至望冩六章頒示中外兼編諸簡策傳之不朽手詔報曰詩者志之所之也將以道達情性宣揚敎義耳朕承五聖之業受萬民之寄主鬯叶於神心元良貞於國本美其踐履仁孝恭脩友睦深慰於懐不覺形之諷詠今請具冩六章頒示中外兼編諸簡策以傳不朽亦欲自家刑國以訓人倫宜依來請十載十月御朝元閣有慶雲見帝賦詩羣臣畢和十四載三月御勤政樓宴羣臣帝賦詩斆栢梁體羣臣畢和肅宗屬詞典麗經史百家莫不該覽目所一見嘗如誦習上元二年七月甲辰延英殿御座生玉芝一莖三花御製玊靈芝詩三章八句是歲李光弼出統河南諸軍帝於内殿宴送御製詩以寵之羣臣畢和德宗貞元元年河東節度馬燧還太原製宸扆台衡二銘并序四年三月甲寅宴百僚於麟德殿設九部樂及内出舞馬帝製序及詩以賜羣臣於是給御筆仍命屬和九月癸丑百僚宴於曲江詔曰今日重陽卿等逰賞朕遥想歡洽欣慰良多情發於衷因製詩序今賜卿等一本仍令中書門下簡定文士三五十人應制同用清字明日内於延英門進其文武百寮及文士欲和者聽翌日百僚畢和帝考其詩以劉太真李紓四人為上等鮑防于頎四人為次等張濛劉滋等二十二人為平等李晟馬燧李泌三人宰相不加考第六年三月庚子百寮宴於曲江亭帝賦詩以賜之七年七月帝幸章敬寺賦詩序皇太子在侍進和兼題于壁百僚畢和以班列焉其後京兆尹薛珏請皇太子書帝詩序刻石而填之以金九年正月庚辰朔帝御含元殿受朝賀禮畢帝賦退朝觀軍仗歸營詩以示宰臣等十年九月十日以重陽日宴賜百僚追賞初九日以雨罷宴及是方㑹宴帝賦詩以賜百官十一年九月癸卯賜中書門下及兩省供奉官宴于曲江帝作詩賜百僚百僚畢和辛亥退朝召百僚詣延英令中使宣喻曰昨九日聊示所懐文非工也卿等屬和雅麗深所嘉之十二年以政聽之餘深思理本迺著刑政箴十三年九月重陽節賜宰臣及兩省供奉官宴于曲江賜中書門下及百僚詩十四年二月帝製中春麟德殿㑹百僚觀新樂詩仍令皇太子書以示百僚十七年二月朔賜羣臣宴于曲江帝命中使薛盈珍賜詩九月重陽節賜羣臣宴于曲江命中使劉希昻宣慰帝賜詩十八年九月重陽節御製豐年多慶九月示懐詩以賜羣臣憲宗元和四年九月帝以天下無事留意典墳每覽前代興亡得失之事皆三復其言又讀貞觀開元實録見太宗撰金鏡書及帝範上下篇𤣥宗撰開元訓誡思繼前躅遂採尚書春秋後傳史記班范漢書三國志晉書晏子春秋新序說苑等書君臣行事可為龜鏡者集成十四篇一曰君臣道合二曰辨邪正三曰戒權幸四曰戒微行五曰任賢臣六曰納忠諫七曰慎征伐八曰慎刑法九曰去奢泰十曰崇節儉十一曰奬忠直十二曰脩德政十三曰諫畋獵十四曰録勲賢分為上下卷帝自製其目曰前代君臣事跡至是以其書寫於屏風列之御座之右復遣中使程文幹以書屏六扇至中書宣示宰臣李藩裴垍曰朕近撰此屏風嘗所觀覽故令蹔將示卿藩等上表稱賀文宗即位每對宰臣等未嘗不深言經學李石因奏施士丐春秋堪讀上曰朕嘗覽之穿鑿之學徒為異同耳學者如鑿井然得美水則已何必辛苦傍求然後為有得也太和二年五月帝纂集尚書中君臣事跡命工圖寫於太液亭朝夕觀覽九年五月乙巳朔以御集春秋左氏列國經傳三十卷宣付史館開成元年三月庚申帝幸龍首池觀内人賽雨賦暮春喜雨詩云風雲喜際㑹雷雨遂流滋薦幣虛陳禮動天實精思漸浸九夏節復在三春時霡霂垂朱闕飄颻入緑墀郊坰既霑足黍稷有豐期百辟同憂樂萬方佇雍熙宰臣文武百官咸有屬和三年帝夏日與學士聨句帝曰人皆苦炎熱我愛夏日長栁公權曰薫風自南來殿閣生㣲涼宣宗雅好儒術或宰臣出鎮即賦詩以贈之詞皆清麗昭宗天復三年三月壬寅御延喜樓餞送朱全忠還汴帝自為詩以送之好文易曰觀乎天文以察時變觀乎人文以化成天下此言觀乎天文可以察變觀乎人文可以化成也王者奉若天時順乃人理來同區宇班政函夏風教所資文學為始故聖明之世寤寐以求聽賦誦之聲覽駢麗之作則欣聞想見恨不同時延鴻筆之士闢詞林之館則諷上化下賡唱迭和葢以潤色皇猷助成盛業故引諭之音不絶乎耳開悟之說有益於心時既隆平物亦咸若垂衣裳而舞干戚其漸於斯乎漢武帝世蜀人楊得意為狗監主天子田獵犬也侍帝帝讀子虛賦而善之曰朕獨不得與此人同時哉得意曰臣邑人司馬相如自言為此賦帝驚乃召相如相如曰有是然此乃諸侯之事未足觀請為天子逰獵之賦帝令尚書給筆札書奏天子以為郎後相如既病免家居茂陵天子曰司馬相如病甚可往從悉取其書若後之矣若汝也言汝今去已在他人後也所忠往使者姓名也而相如已死家無遺書問其妻對曰長卿未嘗有書也時時著書人又取去長卿未死時為一卷書曰有使來求書奏之其遺札書言封禪事書于札而留之故云遺札所忠奏焉天子異之嚴助為㑹稽太守入奉計最因留侍中有竒異輒使為文謂非常之文及作賦頌數十篇宣帝徵能為楚辭九江被公被者人之姓也召見誦讀益召髙才劉向張子僑華龍栁褒等待詔金馬門華音戸化反神爵五鳳之間天下殷富數有嘉應帝頗作歌詩欲興協律之事令王褒與張子僑等並待詔數從褒等放獵放士衆大獵也一日逰放及田獵所幸宫館輒為歌頌第其髙下以差賜帛議者多以為淫靡不急帝曰不有博奕者乎為之猶賢乎已此論語載孔子之詞言博奕雖非道藝無事為之猶賢也奕今之圍碁也辭賦大者與古詩同義小者辨麗可喜喜好也音許吏反辟如女工有綺縠音樂有鄭衞今世俗猶皆以虞說耳目虞與娛同義辭賦比之尚有仁義風諭風音諷鳥獸草木多聞之觀賢於倡優博奕逺矣帝又循武帝故事招選名儒俊材置左右劉更生以通達能屬文辭與王褒張子僑等並進對子僑官至光禄大夫進對謂進見而對詔命也僑字或作喬或作橋皆音巨驕反獻賦頌凡數十篇元帝為太子時喜王褒所為甘泉及洞簫頌喜音許吏切令後宫貴人左右皆誦讀之後漢光武初隗囂為西州大將軍囂賔客掾史多文學生每所上事當世士大夫皆諷誦之故帝有所辭答尤加意焉班彪為竇融從事及融徵還京師帝問曰所上章奏誰與參之融對曰皆從事班彪所為帝雅聞彪才因召入見明帝時賈逵明左氏傳國語為之解詁五十一篇永平中上疏獻之帝重其書寫藏秘館時有神雀集宫殿官府冠羽有五采色帝異之以問臨邑侯劉復復不能對薦逵博物多識帝乃召見逵問之對曰昔武王終父之業鸑鷟在岐宣帝威懐戎狄神雀仍集此胡降之徵也帝勅蘭臺給筆札使作神雀頌拜為郎與班固並校秘書應對左右章帝雅好文章班固愈得幸數入讀書禁中或連日繼夜每行廵狩輒獻上賦頌朝廷有大議使難問公卿辨於前賞賜恩寵甚渥東平王蒼薨詔誥中傅封上蒼自建武以來章奏及所作書記賦頌七言别字歌詩並集覽焉後廵狩方嶽崔駰上四廵頌以稱漢德帝雅好文章自見駰頌後常嗟歎之謂侍中竇憲曰卿寧知崔駰乎對曰班固數為臣說之然未見也帝曰公愛班固而忽崔駰此葉公之好龍也試請見之時楊終坐事徙北地帝東廵狩鳳凰黄龍並集終贊頌嘉瑞上述祖宗鴻業凡十五章奏上詔貰還故鄉魏文帝深好孔融文辭每歎曰揚班儔也募天下有上融文章者輒賞以金帛明帝青龍四年置崇文觀徵善屬文者以充之髙貴鄉公甘露二年五月辛未幸辟雍㑹命羣臣賦詩侍中和逌尚書陳騫等作詩稽留有司奏免官詔曰吾以暗昧愛好文雅廣延詩賦以知得失乃爾紛紜良用反仄其原逌等主者宜力自今已後羣臣皆當翫習古義脩明經典稱朕意焉又引侍中王沈及裴秀數於東堂講讌屬文號沈為文籍先生秀為儒林文人晉武帝雅好典籍王珣殷仲堪徐邈王恭郗恢等並以才學文章見昵於帝後魏孝文太和十九年車駕幸兖州召刺史崔梃赴行在所及見引喻優厚又問梃治邊之畧因及文章帝甚恱謂梃曰别卿已來倐焉二載吾所綴文已成一集今日擁旄者悉皆如此吾何憂哉髙聰為輔國將軍與賊交戰望風退敗徙平州為民行届瀛州刺史王質獲白兎將獻託聰為表帝見表顧謂王肅曰在下郡得復有此才而令朕不知也肅曰比髙聰北徙此文或其所製帝悟曰必應然也何應更有此輩後周明帝時宇文神舉為中侍上士帝方留意翰林而神舉雅好篇章帝每有逰幸神舉常得侍從又庾信自梁歸國帝既雅好文學信特蒙恩禮至於造膝諸王周旋欵至有若布衣之交羣公碑誌多相請託唯王褒與信頗相埒自餘文人莫有逮者褒與庾信才名最髙特加親待帝每逰宴命褒等賦詩談論常在左右隋煬帝初為晉王時栁􅈯為諮議參軍帝好文雅招引才學之士諸葛熲虞世南王胄朱瑒等百餘人以充學士而􅈯為之冠帝以師友處之每有文什必令其潤色然後示人庾自直大業初為著作佐郎自直解屬文於五言詩尤善性恭慎不妄交逰特為帝所愛帝有篇章必示自直令其詆訶自直所難帝輒改之至於再三俟稱善然後方出其見親禮如此唐太宗時虞世南為秘書監太宗重其博物每機務之暇引之談論共觀經史外國獻獅子詔世南為之賦命編之東觀德宗貞元四年九月癸丑賜百僚宴于曲江詔曰今日重陽卿等逰賞朕遥想歡洽欣慰良多情發於衷因製詩序今賜卿等一本仍令中書門下簡定文士三五十人應制同用清字明日内於延英門進其文武百僚及文士欲和者聽翌日百僚畢和帝考其詩以劉太真李紓四人為上等鮑防于頎四人為次等張濛劉滋等二十二人為平等李晟馬燧李泌三人宰相不加考第文宗開成元年二月癸未宰臣奏事于紫宸殿帝曰從來文格非佳昨試進士題目是朕自出所見詩賦似勝去年宰臣李石曰陛下改詩賦格調以正頺俗髙鍇亦能厲精取士仰副聖㫖帝曰四方表奏不典實而尚浮巧者宜罰掌書記石曰古人因事為文今人以文害事懲弊抑末實在盛時帝曰但効古為文自然體尚髙逺時又詔兵部尚書王起進文塲秀句一卷九月勅秘書省及集賢院應欠書四萬五千二百六十一卷配諸道繕寫十一月又詔兵部尚書王起進國朝已來能詩人名字馮疋為太常少卿統樂立於廷帝以端凝若植問其姓名翰林學士李班奏疋之名帝喜問曰豈非能為古章句者邪遂召升階帝自吟疋送客西江詩吟罷益喜因錫以禁中瑞錦仍令大録所著古體詩以獻尋遷諫議大夫宣宗詔新貢舉曽於殿柱帝自題曰鄉貢進士周世宗時扈載初為監察御史嘗逰相國寺僧院睹其庭竹翠色可愛乃抒碧鮮賦留題於其院帝聞之命黄門就其院録之以進俄拜兵部員外郎知制誥册府元龜卷四十
