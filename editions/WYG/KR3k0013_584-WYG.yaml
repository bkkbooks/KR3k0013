body:
  text: 册府元龜卷五百八十四宋王欽若等撰掌禮部奏議第十二隋裴正為太子庶子攝太常少卿時髙祖初即位將改後周制度乃下詔曰宣尼制法云行夏之時乘殷之輅服周之冕奕葉共遵禮無可革然三代所尚衆論多端或以為所建之時或以為所感之瑞或當其行色因以從之今雖夏數得天歴代通用漢尚於赤魏尚於黄驪馬𤣥牲已弗相踵明不可建寅嵗首常服於黑朕初受天命赤雀來儀兼姬周已還於兹六代三正廻復相生總以言之並宜火色垂衣以降損益可知尚色雖殊常兼前代其郊丘廟社可依衮冕之儀朝會衣裳宜盡用赤昔丹烏木運姬有太白之旂黄星土徳曹乘黑首之馬在祀與戎其尚常異今之戎服皆可尚黄在外常所著者通用雜色祭祀之服須合禮經宜集通儒更可詳議正奏議曰竊見後周制冕加為十二既與前禮數乃不同而色應五行又非典故謹按三代之冠其名各别六等之冕承用區分璅玉五綵隨班異餙都無迎氣變色之文唯月令者起於秦代乃有青旂赤玉白輅黑衣與四時而色變全不言於弁冕五時冕色禮既無文稽於正色難以經證且後魏已來制度全闕天興之嵗草創繕修所造車服多叅胡制故魏收論之稱於違古是也周氏因襲將為故事大象成統咸取用之輿輦衣冠甚多迂怪今皇隋革命憲章前代其魏周輦輅不合制者已敕有司盡令除廢然衣冠禮器尚且兼行乃有立夏衮衣以赤為質迎秋平冕用白成形既越典章須革其謬謹按續漢書禮儀志云立春之日京都皆著青衣秋夏悉依其色逮於魏晉迎氣五郊行禮之人皆同此制考㝷故事唯幘從衣色今請冠及冕色並用𤣥唯應着幘者任依漢晉制曰可許善心為給事郎開皇初皇太子自非助祭皆冠逺遊冠後尚書牛𢎞奏曰皇太子冬正大朝請服衮冕帝問善心曰太子朝謁著逺遊冠有何典故對曰晉令皇太子給五時朝服逺遊冠至宋泰始六年更儀注儀曹郎丘仲起議按周禮公自衮冕以下至卿大夫之𤣥冕皆其朝聘之服也伏㝷古之公侯尚得服衮以朝見况皇太子儲副之尊謂宜式遵盛典服衮朝賀兼左丞陸澄議服冕以朝實著經典自秦除六冕之制後漢始僃古章魏晉以來非祀宗廟不欲令臣下服其衮冕位為公者必加侍官故太子入朝因亦不著但承天作副禮絶羣后宜遵前王之令典革近代之陋制皇太子朝請服冕自宋以下始定此儀至梁簡文之為太子嫌於上逼還冠逺遊下及於陳皆依此法後周之時亦言服衮入朝至開皇復遵魏晉故事臣謂衮冕之章服雖美一日而觀頗欲相類臣子之道義無上逼故晉武帝泰始三年詔太宰安平王孚著内侍之服四年又賜趙燕樂安王等散騎常侍之服自斯以後臺鼎貴臣並加貂璫武弁故皇太子遂著逺遊謙不逼尊於禮為允帝曰善竟用開皇舊式善心後攝太常少卿大業初煬帝欲遵周法營立七廟詔有司詳定其禮善心與博士褚亮等議曰謹按禮記天子七廟三昭三穆與太祖之廟而七鄭注云此周制也七者太祖及文王武王之祧與親廟四也殷則六廟契及湯與二昭二穆也夏則五廟無太祖禹與二昭二穆而已𤣥又據王者禘其祖之所自出而立四廟按鄭𤣥義天子惟立四親廟并始祖而為五周以文武為受命之祖特立二祧是為七廟王肅注禮記尊者尊統上卑者尊統下故天子七廟諸侯五廟其有殊功異徳非太祖而不毁不在七廟之數按王肅以為天子七廟是通百代之言又據王制之文天子七廟諸侯五廟大夫三廟降二為差是則天子立四親廟又立髙祖之父髙祖之祖并太祖而為七廟周有文武姜嫄合為十廟漢諸帝之廟各立無迭毁之義至元帝時貢禹匡衡之徒始建其禮以髙帝為太祖而立四親廟是為五廟唯劉歆以為天子七廟諸侯五廟降殺以兩之義七者其正法可常數也宗不在數内有功徳則宗之不可預設為數也是以班固稱考論諸儒之義劉歆博而篤矣光武即位建髙廟於雒陽乃立南頓君以上四廟就祖宗而為七室魏初髙堂隆為鄭學議立親廟四太祖武帝猶在四親之内乃虗置太祖及二祧以待後代至景初間乃依王肅更立五世六世祖就四親而為六廟晉武受禪博議宗祀自文帝以上六世祖征西府君宜宣帝亦序於昭穆本非太祖故祭止六世也江左中興賀循知禮至於寢廟之儀皆依魏晉舊事宋武帝初受晉命為王依諸侯立親廟四即位之後增祠五世祖相國椽府君六世祖右北平府君止於六廟逮身歿主升從昭穆猶太祖之位也降及齊梁守而弗革加崇迭毁禮無違舊臣等又按姬周自太祖已下皆别立廟至於禘祫俱合食於太祖是以炎漢之初諸廟名立嵗時嘗享亦隨處而祭所用廟樂皆象功徳而歌舞焉至光武乃總立一堂而羣主異室斯則新承㓂亂欲從約省自此以來因循不變伏惟髙祖文皇睿哲𤣥覽神武應期受命開基垂綂聖嗣當文明之運定祖宗之禮且損益不同㳂襲異趣時王所制所以垂法自歴代以來雜用王鄭二義若㝷其指歸挍以優劣康成止論周代非謂經通子雍總貫皇王事兼長逺今請依據古典崇建七廟受命之祖宜别立廟祧百代之後為不毁之法至於鸞駕親奉申孝享於髙廟有司行事竭誠敬於羣主俾夫規模可則嚴祀易遵表有功而彰明徳大復古而貴能變臣又按周人立廟亦無處置之文據冢人職而言之先王居中以昭穆為左右阮諶所撰禮圖亦從此義漢京諸廟既逺又不序禘祫今若依周制理有未安雜用漢儀事難全採謹詳立别圖附之議末其圖太祖髙祖各一殿准周文武二祧與始祖而三餘並分室而祭始祖及二祧之外從迭毁之法詔可劉炫開皇中與諸儒修定五禮吏部尚書牛𢎞建議以為禮諸侯絶傍朞大夫降一等今之上柱國雖不同古諸侯比大夫可也官在第二品宜降傍親一等議者多以為然炫駁之曰古之仕者宗子一人而已庶子不得進繇是先王重適其宗子有分禄之義族人與宗子雖疎逺猶服齊縗三月良繇受其恩也今之仕者位以才昇不限嫡庶與古既異何降之有今之貴者多忽近親若或降之民徳之疎自此始矣遂寢其事劉子翊開皇中為侍御史時永寧令李公孝四嵗喪母九嵗外繼其父更别娶後妻妻至是而亡河間劉炫以無撫育之恩議不解任子翊駮之曰傳云繼母如母與母同也當以配父之尊居母之位齊杖之制皆如親母又為人後者為其父母朞服朞服者自以本生非殊親之與繼也父雖自處傍親之地於子之情猶須隆其本重是以令云為人後者為其父母並解官申其心喪父卒母嫁為父後者雖不服亦申心喪其繼母嫁不解官此專據嫁者生文耳將知繼母在父之室則制同親母若謂非有撫育之恩同之行路何服之有服既有之心喪焉可獨異三省令㫖其義甚明今言令許不解何其謬與且後人為其父母朞未有變隔以親繼親既等故知心喪不殊服問云母出則為繼母之黨服豈不以出母族絶推而逺之繼母配父引而親之乎子思曰為伋也妻是為白也母不為伋也妻是不為白也母實知服以名重情因父親所以聖人敦之以孝慈和之以名義是使子以名服同之親母繼以義報等之已生如謂繼母之來在子出之後制有淺深者孝之經傳未見其文譬出後之人所後者初亡後之者至此後可以無撫育之恩而不服重乎昔長沙人王毖漢末為上計詣京師既而吳魏隔絶毖於同國更娶生子昌毖死後為東平相始知吳之母亡便情繫居重不攝職事於時議者不以為非然則繼母之與前母於情無别若要以撫育始生服制王昌復何足云乎又晉鎮南將軍羊祜無子取弟子伊為子祜薨伊不服重祜妻表聞伊辭曰伯生存養伊已不違然無父命故還本生尚書彭權議子之出養必繇父命無命而出是為叛子於是下詔從之然心服之制不得緣恩而生也論云禮者稱情而立文仗義而設教還以此義論彼之情稱情者稱如母之情仗義者仗為子之義名義分定然後能尊父順名崇禮篤敬茍以姆養之恩始成母子則恩繇彼主服自己來則慈母如母何得待父命又云繼母慈母本實路人臨己養己同之骨血若如斯言子不繇父縱有恩育得如母乎其慈繼雖在三年之下而居齊朞之上禮有倫例服以稱情繼母本以名服豈藉恩之厚薄哉至於兄弟之子猶子也私昵之心實殊禮服之制無二彼言以輕如重自以不同此謂如重之辭即同重法若使輕重不等何得為如律云准枉法者但准其罪以枉法論者即同眞法律以弊刑禮以設教准者准擬之名以者即眞之稱如以二字義同不殊禮律兩文所防是一將此明彼足見其義取譬伐柯何逺之有又論云取子為後者將以供承祧廟奉養己身不得使宗子歸其故宅以子道事本父之後妻也然本父後妻因父而得母稱若如來㫖本父亦可無心喪乎何直父之後妻論又云禮言舊君其尊豈復君乎已去其位非復純臣須言舊以殊之别有所重非復己孝故言其以見之目以其父之文是名異也此又非通論何以言之其舊訓殊所用亦别舊者易新之稱其者因彼之辭安得以相類哉至如禮云其父析薪其子不克負荷傳云衞雖小其君在焉若其父而有異其君復有異乎斯不然矣今炫敢違禮乖令侮聖干法使出後之子無情於本生名義之分有虧於風俗狥餙非於明時彊媒孽於禮經雖欲揚己露才不覺言之傷理事奏竟從子翊之議牛𢎞為禮部尚書上議曰竊謂明堂者所以通神靈感天地出教化崇有徳孝經曰宗祀文王於明堂以配上帝祭義云祀於明堂教諸侯孝也黄帝曰合宫堯曰五府舜曰總章布政興治繇來尚矣周禮考工記曰夏后氏世室堂修二七廣四脩一鄭𤣥注云脩十四歩其廣益以四分脩之一則堂廣十七歩半也殷人重屋堂修七尋四阿重屋鄭云其脩七尋廣九㝷也周人明堂度九尺之筵南北七筵五室凡室二筵鄭云此三者或舉宗廟或舉王寢或舉明堂互言之明其同制也馬融王肅干寶所注與鄭亦異今不具出漢司徒馬宫議云夏后氏世室室顯於堂故命以室殷人重屋屋顯於堂故命以屋周人明堂堂大於夏室故命以堂夏后氏益其堂之廣百四十四尺周人明堂以為兩序間大夏后氏七十二尺若據鄭𤣥之說則夏室大於周堂如依馬宫之言則周堂大於夏室後王制轉文周大為是但宫之所言未詳其義此皆去聖久逺禮文殘缺先儒解說家異人殊鄭注玉藻亦云宗廟路寢與明堂同制王制曰寢不踰廟大小是同今依鄭注每室及堂止有一丈八尺四壁之外四尺有餘若以宗廟論之祫享之時周人旅酬六尸并后稷為七先公昭穆二尸先王昭穆二尸合十一尸三十六主及君北面行事於二丈之堂愚不及此若以正寢論之便須朝宴據燕禮諸侯宴則賓及卿大夫脱屨升坐是知天子宴則二公九卿並須升堂燕義又云席小卿次上卿言皆侍席止於二筵之間豈得行禮若以明堂論之總享之時五帝各於其室設青帝之位須於太室之内少北西面太昊從食坐於其西近南北面祖宗配享者又於青帝之南稍退西面丈八之室神位有三加以簠簋籩豆牛羊之爼四海九州美物咸設復頒席上升歌出罇反坫揖讓升降亦以隘矣據此而說近是不然按劉向别錄及馬宫蔡邕等所見當時有古大明堂禮王居明堂禮明堂圖明堂大圖明堂陰陽太山通義魏文侯孝經傳等並說立明堂之事其書皆亡莫得而正今明堂月令者鄭𤣥云是吕不韋著春秋十二紀之首章禮家鈔合為記蔡邕王肅云周公所作周書内有月令第五十三即此也各有證明文多不載束晳以為夏時之書劉瓛云不韋鳩集儒者㝷於聖王月令之事而記之不韋安能獨為此記今按不得全稱周書亦未可即為秦典其内雜有虞夏殷周之法皆聖王仁恕之政也蔡邕具為章句又論之曰明堂者所以宗祀其祖以配上帝也夏后氏曰世室殷人曰重屋周人曰明堂東曰青陽南曰明堂西曰總章北曰𤣥堂内曰太室聖人南面而聼嚮明而治人君之位莫不正焉故雖有五名而主以明堂也制度之數各有所依堂方一百四十四尺坤之策也屋圓楣徑二百一十六尺乾之策也太廟明堂方六丈通天屋徑九丈陰陽九六之變且圓蓋方覆九六之道也八闥以象卦九室以象州十二宫以應日辰三十六户七十二牖以四户八牖乘九宫之數也户皆外設而不閉示天下以不藏也通天屋髙八十一尺黄鍾九九之實也二十八柱布四方四方七宿之象也堂髙三尺以應三統四向五色各象其形水闊二十四丈象二十四氣於外以象四海王者之大禮也觀其模範天地則象陰陽必據古文義不虗出今若直取考工不叅月令青陽總章之號不得而稱九月享帝之禮不得而用漢代二京所建與此說悉同建安之後海内大亂京邑焚燒憲章泯絶魏氏三方未平無聞興造晉則侍中裴頠議曰尊祖配天其義明著而廟宇之制理據未分可直為一殿以崇嚴父之祀其餘雜碎一皆除之宋齊以還咸率兹理此乃世乏通儒時無博識前王盛事於是不行後魏代都所造出自李冲三三相重合為九室簷不覆基房間通街穿鑿處多迄無所取及遷宅雒陽更加營構五九紛競遂至不成宗配之事於焉靡託今皇猷遐闡化澤海内方建大禮垂之無窮𢎞等不以庸虗謬當議限今簡較堂必須五室者何尚書帝命驗曰帝者承天立五府赤曰文祖黄曰神斗白曰顯紀黑曰𤣥矩蒼曰靈府鄭𤣥注曰五府與周之明堂同矣且三代相㳂多有損益至於五室確然不變夫室以祭天天實有五若立九室四無所用布政視朔自依其辰鄭司農云十二月分在青陽等左右之位不云居室鄭𤣥亦言每月於其時之堂而聼政焉禮圖盡箇皆在堂壖是以須為五室明堂必須上圓下方者何孝經援神契曰明堂者上圓下方八窻四達布政之宫禮記盛徳篇曰明堂四户八牖上圓下方五經異義稱講學大夫淳于登亦云上圓下方鄭𤣥同之是以須為圓方明堂必須重屋者何按考工記夏言九階四傍兩夾窻門堂三之二室三之一殷周不言者明一同夏制殷言四阿重屋周承其後不言屋制亦盡同可知也其殷人重屋之下本無五室之文鄭注云五室者亦據夏以知之明周不云重屋因殷則有灼然可見禮記明堂位曰太廟天子明堂言魯為周公之故得用天子禮樂魯之太廟與周之明堂同又曰複廟重檐刮楹達嚮天子之廟餙鄭注複廟重屋也據廟既重屋明堂亦不疑矣春秋文公十三年太室屋壊五行志曰前堂曰太廟中央曰太室屋其上重者也服䖍亦云太室太廟太室之上屋也周書作雒篇曰乃立太廟宗宫路寢明堂咸有四阿反坫重甍重廊孔晁注曰重甍累棟重廟累屋也依黄圖所載漢之宗廟皆為重屋此去古猶近遺法尚在是以須為重屋明堂必須璧雍者何禮記盛徳篇云明堂者明諸侯尊卑也外水曰璧雍明堂陰陽錄曰明堂之制周圜行水左旋以象天内有分室以象紫宫此明堂有水之明文也然馬宫王肅以為明堂璧雍太學同處蔡邕盧植亦以為明堂靈臺璧雍太學同室異名邕云明堂者取其宗祀之清貎則謂之清廟取其正室則曰太室取其堂則曰明堂取其四門之學則曰太學取其周水圜如璧則曰璧雍其實一也其言别者五經通義曰靈臺以望氣明堂以布政璧雍以養老教學三者不同袁凖鄭𤣥亦以為别歴代所疑豈能輙定今據郊祀志云欲治明堂未暁其制濟南人公玉帶上黄帝時明堂圖一殿無壁蓋之以茅水圜宫垣天子從之以此而言其來則久漢中元二年起明堂璧雍靈臺於雒陽並别處然明堂亦有璧水李尤明堂銘云流水洋洋是也以此須有璧雍夫帝王作事必師古今造明堂須以禮經為本形制依於周法度數取於月令遺闕之處叅以餘書庶使該詳沿革之禮其五室九階上圓下方四阿重屋四旁兩門依考工記孝經說堂方一百四十四尺屋圓楣徑二百一十六尺太室方六丈通天屋徑九丈八闥二十八柱堂髙三尺四向五色依周書月令論殿垣外有圜水徑三百歩依太山盛徳記觀禮經仰觀俯察皆有則象足以盡誠上帝祗配祖宗𢎞風布教作範於後矣𢎞等學不稽古輙申所見可否之宜伏聼裁擇髙祖以時事草創未遑制作竟寢不行閻毗為起部郎煬帝大僃法駕嫌屬車太多顧謂毗曰開皇之日屬車十有二乘於事亦得今八十一乘以牛駕車不足以益文物朕欲减之從何為可毗曰臣初定數共宇文愷叅詳故實據漢胡伯始蔡邕等議屬車八十一乘此起於秦遂為後式故張衡賦云屬車九九是也次及法駕三分减一為三十六乘此漢制也又據宋孝建時有司奏議晉遷江左唯設五乘尚書令建平王宏曰八十一乘議兼六國三十六乘無所准憑江左五乘儉不中禮但帝王文物旂旒之數爰及冕玉皆用十二今宜准此設十二乘開皇平陳因以為法今憲章往古大駕依秦法駕依漢小駕依宋以為差等帝曰何用秦法大駕宜三十六法駕宜一十二小駕除之毗研精故事皆此類也宇文愷為工部尚書初自永嘉之亂明堂廢絶隋有天下將復古制議者紛然皆不能决愷博考羣籍奏明堂議表曰臣聞在天成象房心為布政之宫在地成形丙午居正陽之位觀雲告月順生殺之序五室九宫統人神之際金口木舌發令兆民玉瓚黄琮式嚴宗祀何嘗不欽莊房宇盡妙思於規摹凝睟冕旒致子來於矩矱伏惟皇帝陛下提衡握契御辯乘乾咸五登三復上皇之化流㐫去暴丕下武之緒用百姓之異心驅一代以同域康哉康哉民無能而名矣故使天符地實吐醴飛丼造物資生澄源反朴九圍清謐四表削平襲我衣冠齊其文軌茫茫上𤣥陳珪璧之敬蕭肅清廟感霜露之誠正金奏九韶六莖之樂定石渠五官三雍之禮乃卜瀍西爰謀雒食辯方靣勢仰禀神謀敷土濬川為民立極兼聿遵先㫖表置明堂爰詔下臣占星揆日於是採崧山之秘簡披汶水之靈圖訪通議於殘亡購冬官於散逸總集衆論勒成一家昔張衡渾象以三分為一度裴秀輿地以二寸為千里臣之此圖用一分為一尺推而演之冀輪奐有序而經搆之㫖議者殊途或以紛并為重屋或以圓楣為隆棟各以臆說事不經見今錄其疑難為之通釋皆出證據以相發明議曰臣愷謹按淮南子曰昔者神農之治天下也甘雨以時五穀蕃植春生夏長秋收冬藏月省時考終嵗獻貢以時嘗穀祀於明堂明堂之制有蓋而無四方風雨不能襲燥濕不能傷遷延而入之臣以為上古朴畧剙立典刑尚書帝命驗曰帝者承天立五府以尊天重象赤曰文祖黄曰神斗白曰顯紀黑曰𤣥矩蒼曰靈府注云唐虞之天府夏之世室殷之重屋周之明堂皆同矣尸子曰有虞氏曰總章周官考工記曰夏后氏世室堂修二七博四修一注云脩南北之深也夏度以歩今堂修十四歩其博益以四分脩之一則明堂博十七歩半也臣愷按三王之世夏最為古從質尚文理應漸就寛大何因夏室乃大殷堂相形為論理恐不爾記云堂修二七博四修一若夏度以歩則應脩七歩注云今堂脩十四歩乃是增益記文殷周二堂獨無加字便是其義類例不同山東禮本輙加二七之字何得殷無加㝷之文周闕增筵之義研窮其趣或是不然讎較古書並無二字此乃桑間俗儒信情加减黄圖議曰夏后氏益其堂之大一百四十四尺周人明堂以其兩杼間馬宫之言止論堂之一面據此為准則三代堂基並方得為上圓之制諸儒所說並云下方鄭注周官獨為此義非直與古違異亦乃乖背禮文㝷文求理深恐未愜尸子曰殷人陽舘考工記曰殷人重屋堂修七㝷堂崇三尺四阿重屋注云其脩七㝷五丈六尺防夏周則其博九㝷七丈二尺又曰周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵禮記明堂位曰天子之廟複廟重檐鄭注云複廟重屋也注玉藻云天子廟及路寢皆如明堂制禮圖云於内室之上起通天之觀觀八十一尺得宫之數其聲濁君之象也大戴禮曰明堂者古有之凡九室一室有四户八牖以茅蓋上圓下方外水曰璧雍赤綴户白綴牖堂髙三尺東西九仞南北七筵其宫方三百歩凡人民疾六畜疫五穀灾生於天道不順天道不順生於明堂不飭故有天灾則飭明堂周書明堂曰堂方百六十二尺髙四尺階博六尺三寸室居内方百尺室内方六十尺髙八尺博四尺作雒曰明堂太廟路寢咸有四阿重甍重廊孔氏注云重甍累棟重廊累屋也禮圖曰秦明堂九室十二階各有所居吕氏春秋曰有十二堂與月令同並不論尺丈臣愷按十二階雖不與禮合一月一階非無理思黄圖曰堂方百四十四尺坤之䇿也方象地屋圓楣徑二百十六尺乾之䇿也圓象天室九宫法九州太室方六尺法陰之變數十二堂法十二月三十六户法極陰之變數七十二牖法五行所行日數八闥象八風法八卦通天臺徑九尺法乾以九覆六髙八十一尺法黄鍾九九之數二十八柱象二十八宿堂髙三尺土階三等法三統堂四向五色法四時五行殿門去殿七十二歩法五行所行門堂長四丈取太室三之二垣髙無蔽目之炤牖六尺其外倍之殿垣方在水内法地陰也水四周於外象四海圓法陽也水濶二十四丈象二十四氣水内徑三丈應覲禮壇三成武帝元封二年立明堂汶上無室其外畧依此制泰山通義今亡不可得而辯也元始四年八月起明堂璧雍長安城南門制度如儀殿垣四門八觀水外周堤壤髙四方和會築作三旬五年正月六日辛丑始郊太祖髙皇帝以配天二十二日丁亥宗祀孝文皇帝於明堂以配上帝及先賢百辟卿士有益者於是秩而祭之親扶三老五更袒而割牲跪而進之因班時命宣恩澤諸侯王宗室四夷君長匈奴西國侍子䖍奉貢助祭禮圖曰建武三十年作明堂明堂上圓下方上圓法天下方法地十二堂法日辰九室法九州室八窻八九七十二法一時之王室有二户二九十八户法土王十八日内堂正壇髙三尺土階三等胡伯始注漢官云古清廟蓋以茅今蓋以瓦瓦下藉茅以存古制東京賦曰乃營三宫布政頒常複廟重屋八達九房造舟清池唯水泱泱薛綜注云覆重簷覆謂屋平覆重棟也續漢書祭祀志云明帝永平二年祀五帝於明堂五帝坐各處其方黄帝在未皆如南郊之位光武位在青帝之南少退西面各一犢奏樂如南郊臣愷察詩云我將祀文王於明堂也我將我享維牛維羊據此則僃太牢之祭今云一犢恐與古殊自晉以前未有鵄尾其垣墻璧水一依本圖晉起居注裴頠議曰尊祖配天其義明著廟宇之制理據未分直可為一殿以崇嚴祀其餘雜碎一皆除之臣愷按天垂象聖人則之璧雍之星既有圖狀晉堂方構不合天文既闕重樓又無璧水空堂乖五室之義直殿違九階之文非古欺天一何過甚後魏於北城南造圜牆在璧水外門在水中逈立不與牆相連其堂上九室三三相重不依古制室間通巷違舛處多其室皆用􅜘累極成褊陋後魏樂志曰孝昌二年立明堂議者或言九室或言五室詔斷從五室後元乂執政復改為九室遭亂不成宋起居注曰孝武帝大明五年立明堂其墻宇規範擬則太廟唯十二間以應朞數依漢汶上圖儀設五帝位太祖文皇帝對饗鼎爼簠簋一依廟禮梁武帝即位之後移宋時太極殿以為明堂無室十二間禮疑議云祭用神爼瓦樽文於郊質於廟止一獻用清酒平陳之後臣得目觀遂量歩數記其尺丈猶見基内有焚燒殘柱數毁折之餘入地一丈儼然如舊柱下以樟木為跗長丈餘闊四尺許兩兩相並凡安數重宫城處所乃在廓内雖湫隘卑陋未合規摹祖宗之靈得崇嚴祀周齊二代闕而不修大饗不典於焉靡託自古明堂圖有二本一是宗周劉熈阮諶劉昌宗等作三圖畧同一是後漢建武三十年作禮圖有本不詳撰人臣逺㝷經傳傍求子史研究衆說總撰今圖其様以木為之下為方堂堂有五室上為圜觀觀有四門帝可其奏會遼東之役事不果行册府元龜卷五百八十四
