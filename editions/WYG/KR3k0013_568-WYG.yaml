body:
  text: 册府元龜卷五百六十八宋王欽若等撰掌禮部作樂第四隋髙祖開皇元年令定宫懸四而各二虡通十二鎛鐘為二十虡虡各一人建鼔四人柷敔各一人歌琴瑟簫筑箏搊箏臥箜篌小琵琶四面各十人在編磬下笙竽長笛簫觱篥壎箎四面各八人在編鐘下舞各八佾宫懸簨虡金五博山飾以旒蘇樹羽其樂噐應漆者天地之神皆朱宗廟加五色漆畫天神懸内加雷鼔地祇加靈鼓宗廟加路鼔登歌鐘一虡磬一虡各一人歌四人兼琴瑟簫笙橫笛壎箎各一人其漆畫及博山旒蘇樹羽與宫懸同登歌人介幘朱連裳烏皮履宫懸及下管人平巾幘朱連裳凱樂人武弁朱褠衣履韈文舞進賢冠綘紗連裳帛内單皂領袖襈烏皮鞮左執籥右執翟二人執纛引前在舞人數外衣冠同舞人武弁朱褠衣烏皮履三十二人執戈龍楯三十二人執戚龜楯二人執旌居前二人執鼗二人執鐸二人執鐃十二人執錞四人執弓矢四人執殳四人執㦸四人執矛自旌已下夾引竝在舞人數外衣冠並同舞人皇帝宫懸及登歌與前同應漆者皆五色漆畫懸内不設鼔皇太子軒懸去南面設三鎛鐘於辰丑申三建鼔亦如之其登歌去兼歌者減二人其簨虡金三博山樂噐應漆者皆朱漆之其餘與宫懸同大鼓小鼓大駕鼓吹並朱漆畫大鼓加金鐲凱樂及節鼓飾以羽葆其長鳴中鳴橫吹皆五色衣幡緋掌畫交龍五彩脚大角幡亦如之大鼔長鳴工人皂地苣文金鉦棡鼔小鼔中鳴呉横吹工人青地苣文凱樂工人武弁朱褠衣橫吹緋地苣文為帽袴褶大角工人平巾幘緋衫白布大口袴内宫鼔樂服色皆准此皇太子鐃及節鼔朱漆畫飾以羽葆餘鼔吹竝朱漆大鼔小鼓無金鐲長鳴中鳴橫吹五綵衣幡緋掌畫蹲獸五綵脚大角幡亦如之大鼔長鳴橫吹工人紫帽緋袴褶金鉦棡鼔小鼔中鳴工人青帽青袴褶鐃吹工人武弁朱褠衣大角工人平中幘緋衫白布大口袴正一品鐃及節鼔朱漆畫飾以羽葆餘鼓吹竝朱漆長鳴中鳴橫吹五綵衣幡緋掌畫蹲獸五綵脚大角幡亦如之大鼓長鳴橫吹工人紫帽赤布袴褶金鉦棡鼔小鼔中鳴工人青帽青布袴褶鐃吹工人武弁朱褠衣大角工人平巾幘緋衫白布大口袴三品已上朱漆鐃飾以五采騶哄工人武弁朱褠衣餘同正一品四品鐃及工人衣服同三品餘鼓皆綠沉金鉦棡鼓工人青帽青布袴褶二年北齊黃門侍郎顔之推上言禮隳樂壊其來日久今太常雅正竝用胡聲請慿梁國舊事考尋古典髙祖不從曰梁樂亡國之音奈何遣我用耶是時尚因周樂令工人齊樹提檢校樂府改換聲律亦不能通俄而柱國沛公鄭譯奏上請更修正於是詔太常卿牛宏國子祭酒辛彦之國子博士何妥等議正樂妥上表曰臣聞明則有禮樂幽則有鬼神然則動天地感鬼神莫近於禮樂又云樂至則無怨禮至則不爭揖讓而治天下者禮樂之謂也臣聞樂有二一曰奸聲二曰正聲夫奸聲感人而逆氣應之逆氣成象而淫樂興焉正聲感人而順氣應之順氣成象而和樂興焉故樂行而倫清耳目聰明血氣和平移風易俗天下皆寧孔子曰放鄭聲逺佞人故鄭衛宋趙之聲出内則發疾外則傷人是以宫亂則荒其君驕商亂則陂其官壊角亂則憂其人怨徵亂則哀其事勤羽亂則危其財匱五者皆亂則國亡無日矣魏文侯問子夏曰吾端冕聽古樂則欲寐聽鄭衛之音而不知倦何也子夏對曰夫古樂者始奏以文復亂以武修身治家平均天下鄭衛之音姧聲以亂溺而不止獶雜子女不知父子今君所問者樂也所愛者音也夫樂之與音相近而不同為人君者謹審其好惡案聖人之作樂也非止茍悦耳目而已矣欲使在宗廟之内君臣同聽之則莫不和敬在鄉里之内長幼同聽之則莫不和順在閨門之内父子同聽之則莫不和親此先王立樂之方也故知聲而不知音者禽獸是也知音而不知樂者衆庶是也故黄鐘大吕絃歌干戚童子皆能舞之能知樂者其唯君子不知音者不可與言音不知音者不可與言樂知樂則㡬於道矣紂為無道太師抱樂噐以奔周晉君德薄師曠固惜清徵上古之時未有音樂鼔腹擊壤樂在其間易曰先王作樂崇德殷薦之上帝以配祖考至於黃帝作咸池顓頊作六莖帝嚳作五英堯作大章舜作大韶禹作大夏湯作大濩武王作大武從夏以來年代久逺唯有名字其聲不可得聞自殷至周僃於詩頌故自聖賢已下多習樂者至如伏羲減瑟文王足琴仲尼擊磬子路鼔瑟漢髙擊筑元帝吹簫漢髙之初叔孫通因奏樂人制宗廟之樂迎神于廟門奏嘉至之樂猶古降神之樂也皇帝入廟門奏永至之樂以為行步之節猶古采齊音茨肆夏也乾豆上薦奏登歌之樂猶古清廟之樂也登歌再終奏休成之樂羙神饗也皇帝就東廂坐定奏永安之樂羙禮成也其休成永至二曲叔孫通所制也漢髙廟奏武德文始五行之舞當春秋時陳公子完奔齊陳是舜後故齊有韶樂孔子在齊聞韶三月不知肉味是也秦始皇滅齊得齊韶樂漢髙祖滅秦韶傳於漢髙祖改名文始以示不相襲也五行舞者本周大武樂也始皇改曰五行及于孝文復作四時之舞以示天下安和四時順也孝景采武德舞以為昭德孝宣又采昭德以為盛德雖變其名大抵皆因秦舊事至於晉魏皆用古樂魏之三祖竝制樂辭自永嘉播越五都傾蕩樂聲南度是以大僃江東宋齊以來至於梁代所行樂事猶皆傳名三雍四始實稱大盛及矦景簒逆樂師分散其四舞三調悉度偽齊齊氏雖知傳授得曲而不用之於宗廟朝廷也臣少好音律留意管絃年雖耆老頗皆記憶及東土尅定樂人悉反訪其逗遛果云是梁人所教今三調四舞竝皆有手雖不能精熟亦頗具雅聲若令教習傳授庶得流傳古樂然後取其㑹歸撮其指要因循損益更制嘉名歌盛德於當時傳雅正於來葉豈不美歟謹具録三調四舞曲名又制歌辭如别其有聲曲流宕不可以陳於殿庭者亦悉附之於後書奏别敕太常取妥節度於是作清平瑟三調聲又作八佾鞸鐸巾拂四舞四舞者案漢魏已來竝施於宴饗鞸舞漢巴渝舞也至章帝造鞸舞詞云闗東有賢安魏明代漢曲云明明魏皇帝鐸舞傳云代魏詞云振鐸鳴金成公綏賦云鞸鐸舞庭八音竝陳是也拂舞者沈約宋志云吳舞吳人思晉化其詞本云白符鳩是也巾舞者公莫舞伏滔云項莊因舞欲劔髙祖項伯紆長䄂以捍其鋒魏晉傳為舞焉驗此雖非至樂亦前代舊聲故梁武報沈約云鞸鐸巾拂古之遺風楊浤云此舞本二十八人桓元即眞增為八佾後因而不改九年十二月甲子詔曰朕祗承天地清蕩萬方百王衰弊之後兆庶澆浮之日聖人遺訓掃地僃盡制禮作樂今也其時朕情存古樂深思雅道鄭衛淫聲魚龍雜戲樂府之内盡已除之今欲更調律吕改張琴瑟且妙術精微非因教習工人代掌止傳糟粕不足達神明之德論天地之和區域之間竒才異藝天知神授何代無哉蓋晦迹於非時俟昌言於所好宜可搜訪速以奏聞庶覩一藝之能共就九成之業仍詔太常牛宏通直散騎常侍許善心秘書丞姚察通直郎虞世基等議定作樂先是牛宏等以䚹謬既久音律多乖積年議不定髙祖大怒曰我受天命七年樂府猶歌前代功德耶命治書侍御史李諤引宏等下將罪之諤奏武王克殷至周公相成王始制禮樂斯事體大不可速成髙祖意稍解又詔求知音之士集尚書叅定音樂鄭譯云考尋樂府鍾石律吕皆有宫商角徵羽變宫變徵之名七聲之内三聲乖應每嘗求訪終莫能獲周武帝時有龜兹人曰蘇祗婆從突厥皇后入國善胡琵琶聽其所奏一均之中間有七聲因而問之答云父在西域稱為知音代相傳習調有七種以其七調勘較七聲宜若合符一曰婆陁力華言平聲即宫聲也二曰雞識華言長聲即南吕聲也三曰沙識華言質直聲即角聲也四曰沙矦加濫華言應聲即變徵聲也五曰沙臘華言應和聲即徵聲也六曰般贍華言五聲即羽聲也七曰俟利􅝍華言斛牛聲即變宫聲也譯因習而彈之始得七聲之正然則就此七調又有五旦之名旦作七調以華言譯之旦者則謂切也其聲亦應黄鍾太簇林鍾南吕姑洗五均以外七律更無調聲遂因其所捻琵琶絃柱相飲為均推演其聲更立七均合成十二以應十二律律有七音音立一調故成七調十二律合八十四調旋轉相交盡皆和合仍以其聲考挍太樂所奏林鍾之宫應用林鍾為宫乃用黃鍾為宫應用南吕為商乃用太簇為商應以應鍾為角乃取姑洗為角故林鍾一宫七聲二聲竝戾其十一宫七十七音例皆乖越莫有通者又以編懸有八因作八音之樂七音之外更立一聲謂之應聲譯因作書二十餘篇以明其指至是譯以其書宣示朝廷竝立議正之時邳國公世子蘇䕫亦稱明樂駁譯曰韓詩外傳所載樂聲感人及月令所載五音所中並皆有五不言變宫變徵又春秋左氏所云七音六律以奉五聲准此而言每宫應立五調不聞更加變宫變徵二調為七調七調之作所出未詳譯答之曰周有七音之律漢書律厯志天地人及四時謂之七始黄鍾為天始林鍾為地始太簇為人始是為三始姑洗為春㽔賓為夏南吕為秋應鍾為冬是為四時四時三始是以為七今若不以二變為調曲則是冬夏聲闕四時不僃是故每宫須立七調衆從譯議譯又與䕫俱云案今樂府黃鍾乃以林鍾為調首失君臣之義清樂黃鍾宫以小吕為變徵乖相生之道今請雅樂黃鍾為調首清樂去小吕還用㽔賓為變徵衆皆從之䕫又與譯議欲累黍立分正定律吕時以音律久不通譯䕫等一朝能為之以為樂聲可定而何妥舊以學聞雅為髙祖所信髙祖素不悦學不知樂妥又恥已宿儒不逮譯等欲沮壊其事乃立議非十二律旋相為宫曰經文雖道旋相為宫恐是直言其理亦不通隨月用調是以古來不取若依鄭元及司馬彪須用六十律方得和韻今譯唯取黃鍾之正宫兼得七始之妙義非止金石諧韻亦簨簴不繁可以享百神可以合萬舞矣而又非其七調之義曰近代書記所載縵樂鼔琴吹笛之人多云三調三調之聲其來久矣請存三調而已時牛宏摠知樂事不能精知音律又有識音人萬寳嘗修雒陽舊曲言幼學音律師於祖孝徵知其上代修調古樂周之璧翣殷之崇牙懸八用七盡依周禮備矣所謂正聲又近前漢之樂不可廢也是時競為異議各立朋黨是非之理紛然淆亂或欲令各修造待成擇其善而從之妥恐樂成善惡易見乃請髙祖張樂試之遂先説曰黃鍾者以象人君之德及奏黃鍾之調髙祖曰滔滔和雅甚與我心㑹妥因陳黃鍾一宫不假餘律髙祖大悦班賜妥等修樂者自是譯等議寢是時既已平陳獲宋齊樂詔於太常置清商署以管之求陳太樂令蔡子元於普明等復居其職繇是牛宏奏曰臣聞周有六代之樂止韶武而已秦始皇改周武曰五行漢髙帝改韶舞曰文始以示不相襲也又造武德自表其功故髙帝廟奏武德文始五行之舞又作昭容禮容增演其意昭容生於武德蓋猶古之韶也禮容生於文始矯秦之五行也文帝又作四時之舞故孝景帝追述先功採武德舞作昭德舞被之管絃薦於太宗之廟孝宣採昭德舞為盛德舞更造新歌薦於武帝之廟據此而言遞相因襲縱有改作竝宗於韶至明帝時東平獻王採文德舞為大武之舞薦於光武之廟漢末大亂樂章淪缺魏武平荆州獲杜䕫以為軍謀祭酒使創雅樂時散騎常侍鄧靜善詠雅歌樂師尹胡能習宗祀之曲舞師馮肅曉知先代諸舞摠練研精復於古樂自䕫始也文帝黃初改昭容之樂為昭業樂武德之舞為武頌舞又文始之舞為大韶舞五行之舞為大武舞明帝初公卿奏上太祖武皇帝樂曰武始之舞髙祖文皇帝樂曰咸熈之舞又制樂舞名曰章斌之舞有事於天地宗廟及臨朝大饗竝用之晉武帝太始二年遣傅元等造行禮及上壽食舉歌詩張華表曰案漢魏所用雖詩辭各異興廢隨時至音韻曲折竝係於舊一皆因襲不敢有所改也九年荀朂典樂使郭夏宋識造正德大豫之舞改魏昭武舞曰宣武舞羽籥舞曰宣文舞江左之初典章湮紊賀循為太常卿始有登歌之樂明帝大寧末阮孚等又增益之成帝咸和間鳩集遺逸鄴沒胡後樂人頗復南渡東晉因之以具鍾律孝武太元間破符永固又獲樂工楊蜀等閑練舊樂於是金石始備尋其設懸音調竝與江左是同慕容垂破慕容永於長子盡獲符氏舊樂垂悉為魏所敗其鍾律令李佛等將太樂細伎奔慕容德於鄴德遷都廣固子超嗣立其母先沒姚興超以大樂伎一百二十人詣興贖母及宋武帝入闗悉収南渡永初元年改正德舞曰前舞大武舞曰後舞文帝元嘉九年太樂令鍾宗之更調金石至四年典書令奚縱復改定之又有凱容宣業之舞齊代因而用之蕭子顯齊書志曰宋孝建初朝議以凱容舞為韶舞宣業舞為武德舞據韶為言宣業即是古之大武非武德也故志有前舞凱容歌辭後舞凱容歌辭者矣至於梁初猶用凱容宣業之舞後改為大壯大觀焉今人猶喚大觀為前舞故知樂名雖隨代而改聲韻曲折理應常同前尅荆州得梁家雅曲今平蔣州又得陳氏正樂史傳相承以為合古且觀其曲體用聲有次請修緝之以備雅樂其後魏雒陽之曲據魏史云太武平赫連昌所得更無明證後周所用者皆是新造雜有邊裔之聲戎音亂華皆不可用請悉停之制曰制禮作樂聖人之事也功成化洽方可議之今宇内初平政化未洽遽有變革我則未暇晉王廣又表請帝乃許之牛宏遂因鄭譯之舊又請依古五聲六律旋相為宫奏議云謹案禮五聲六律十二管還相為宫周禮奏黃鍾歌大吕奏太簇歌應鍾皆是旋相為宫之義蔡邕明堂月令章句曰孟春月則太簇為宫姑洗為商蕤賓為角南吕為徵應鍾為羽大吕為變徵他月倣此故先王之作律吕也所以辨天地四方隂陽之聲楊子雲曰聲生於律律生於辰故律吕配五行通八風歴十二辰行十二月循還轉運義無停止譬如立春木王火相立夏火王土相季夏余分土王金相立秋金王水相立冬水王木相還相為宫者謂當其王月名之為宫今若十一月不以黃鍾為宫十二月不以太簇為宫便是春木不王夏土不相豈不隂陽失度天地不通哉劉歆鍾律書云春宫秋律百卉必彫秋宫春律萬物必榮夏宫冬律雨雹必降冬宫夏律雷必發聲以斯而論誠為不易且律十二今直為黃鍾一均唯用七律以外五律竟復何施恐失聖人制作本意故須依禮作旋相為宫之法上曰不須作旋相為宫且作黃鍾一均也𢎞又論六十律不可行謹案續漢書律厯志元帝遣韋元成問京房於樂府房對受學故小黃令焦延壽六十律相生之法以上生下皆三生二以下生上皆三生四陽下生隂隂上生陽終於中吕而十二律畢矣中吕上生執始執始下生去滅上下相生終於南吕而六十律畢矣十二律之變至於六十猶八卦之變至於六十四也冬至之聲以黃鍾為宫太簇為商姑洗為角林鍾為徵南吕為羽應鍾為變宫㽔賓為變徵此聲氣之元五音之正也故各統一月其餘以次運行宫月各自為宫而商徵以類從焉房又曰竹聲不可以度調故作准以定數准之狀如瑟長一丈而十三絃隱間九尺以應黃鍾之律九尺中央一絃下畫分寸以為六十律清濁之節執始之類皆房自造房云受法於焦延壽未知延壽所承也章帝元和年待詔矦鍾殷彤上言官無曉六十律以准調音者故待詔嚴嵩具以准法教其子宣故願召宣補學官主調樂噐太史丞𢎞試宣十二律其二中其四不中其六不知何律宣遂罷自此律家莫能為准施絃嘉平年東觀召典律者太子舎人張光問准意光等不知歸閲舊藏乃得其噐形制如房書猶不能定其絃緩急故史官能辨清濁者遂絶其可以相傳者唯大𣙜常數及􅇋氣而已據此而論京房之法漢世已不能行沈約宋志曰詳案古典及今音家六十律無施於樂禮云十二管還相為宫不言六十封禪書云黃帝使素女鼓五十絃瑟而悲破為二十五絃假令六十律為樂得成亦所不用取大樂必易大禮必簡之意也又議曰案周官云大司樂掌成均之法鄭衆注曰均調也樂師主調其音三禮義宗稱周官奏黃鍾者用黃鍾為調歌大吕者用大吕為調奏者謂堂下四懸歌者謂堂上所歌但一祭之間皆用二調是知據宫稱調其義一也明六律六吕迭相為宫各自為調合見行之樂用黃鍾之宫乃以林鍾為調與古典有違晉内書監荀朂依典記以五聲十二律還相為宫之法制十二笛黃鍾之笛正聲應黃鍾下徵應林鍾以姑洗為清角大吕之笛正聲應大吕下徵應夷則以外諸均例皆如是然今所用林鍾是朂下徵之調不取其正先用其下於理未通故須改之髙祖猶憶妥言注宏奏下不許作旋宫之樂但作黃鍾一宫而已於是牛宏及秘書丞姚察通直散騎常侍許善心儀同三司劉臻通直郎虞世基等更共詳議曰後周之時以四聲降神雖採周禮而年深代逺其法久絶不可依用謹案司樂凡樂圜鍾為宫黃鍾為角太簇為徵姑洗為羽舞雲門以祭天函鍾為宫太簇為角姑洗為徵南吕為羽舞咸池以祭地黃鍾為宫大吕為角太簇為徵圜鍾為羽舞韶以祀宗廟馬融曰圜鍾應鍾也賈逵鄭𤣥曰圜鍾夾鍾也鄭𤣥又云此樂無商聲祭尚柔剛故不用也于寳云不言商商為臣王者自謂故置其實而去其名若曰有天地人物無德以主之謙以自牧也先儒解釋既莫知適從然此四聲非直無商又律管乖次以其為樂無克諧之理今古事異不可得而行也案東觀書馬防傳太常丞鮑鄴等上作樂事下防防奏言建初二年七月鄴上言天子飲食必順於四時五味而有食舉之樂所以順天地養神明求神應也今觀雅樂獨有黃鍾而食舉樂但有太簇皆不應月律恐傷氣類可作十二月均各應其月氣公卿朝㑹得聞月律乃能感天和氣宜應詔下太常評焉太常上言作樂噐直錢一百四十六萬奏寢今明詔復下臣防以為可須上天之明時因歲首之嘉月發太簇之律奏雅頌之音以迎和氣其條貫甚具遂獨施行起於十月為迎氣之樂矣又順帝紀云陽嘉二年冬十月庚午其禮辟雍𨽻太學隨月律作應鍾三月作姑洗元和以來音戾不調修復黃鍾作樂噐如舊典據此而言漢樂宫懸有黃鍾均食舉太簇均止有二均不旋相為宫亦以明矣計從元和至陽嘉二年纔五十嵗用而復止驗黃帝聽鳳以制律吕尚書曰予欲聞六律五聲周禮有分樂而祭此聖人制作以合天地隂陽之和自然之理乃云音戾不調斯言誣之甚矣今梁陳雅曲並用宫聲案禮五聲十二律還相為宫盧植云十二月五管流轉用事當用事者為宫君也鄭元曰五聲宫商角徵羽其陽管曰律隂管為吕布十二辰更相為宫始自黃鍾終於南吕凡六十也皇侃疏還相為宫者十一月以黃鍾為宫十二月以大吕為宫正月以太簇為宫餘月倣此凡十二管各備五聲合六十聲五聲成一調故十二調此即釋鄭議之明文無用商角徵羽調之法矣樂稽耀嘉曰東方春其聲角樂當宫於夾鍾餘方各以其中律為宫若有商角徵羽理不得云宫於夾鍾也又云五音非宫不調五味非甘不和又動聲儀宫唱而商和是謂善本太平之樂也周禮奏黃鍾歌大吕以祀天神鄭𤣥以黃鍾之鍾大吕之聲為均均調也故崔靈㤙云六樂十二調亦不獨論商角徵羽也又云六樂者皆文之以五聲播之以八音故知每樂皆須五聲八音錯綜而能成也禦宼子云師文鼔瑟命宫而摠四聲則慶雲浮景風翔唯韓詩云聞其宫聲使人温厚而寛大聞其商聲使人方廉而好義及古有清角清徵之説此則當聲為曲今以五引為五聲迎氣所用者是也餘曲悉用宫聲不勞商角徵羽何以得知荀朂論三調為均首者得正聲之名明知雅樂悉在宫調已外徵羽角自為謡俗之音耳且西涼龜兹雜伎等曲數既多故得𨽻於衆調調各别曲至如雅樂少須以宫為本歴十二均而作不可分配餘調更成雜亂也其奏大抵如此帝竝從之故隨代雅樂唯奏各一人竝立階下悉進賢冠綘公服斟酌今古多而用之祀神宴會通行之若有大祀臨軒陳於階壇之上若册拜王宫設宫懸不用登歌舞奠則唯用登歌而不設懸古者人君食皆用當月之調以取詩律之聲使不失五常之性調暢四體令得時氣之和故鮑鄴上言天子食飲必順四時有食舉樂所以順天地養神明可作十二月均感天和氣此則殿庭月調之氣也祭祀既已分樂臨軒朝會竝用當月之律正月懸太簇之均乃十二月懸大吕之均欲感人君情性允協隂陽之序也又云舞六十四人竝介幘冠進賢冠綘紗連裳内單皂褾領􅙦裾帶烏皮履十六人執翣十六人執帗十六人執旌十六人執羽左手皆執籥二人執纛引前右舞人數外衣冠同舞人武舞六十四竝服武弁朱褠衣革帶烏皮履左執朱干右執大戚衣朱干玉戚之文二人執旌居前二人執鼗二人執鐸金錞四人輿二人作二人執鐃次之二人執相在左二人執雅在右各工一人作白旌以崇設鐘磬正倍參懸之宏等竝以為非而據周官小胥職懸鐘磬半之為堵全之為肆鄭元曰鐘磬編懸之二八一十六而在一虡鐘一堵磬一堵謂之肆又引樂緯宫為君商為臣君臣皆尊各置一副故加十四而懸十六又據漢成帝時犍為水濱得石磬一十六枚此皆懸八之義也懸鐘磬法每虡准之懸八用七不取近用之法懸七也又參用儀禮及尚書大傳為宫懸陳布之法北方南面應鐘起西磬次之黃鍾次之鍾次之大吕次之皆東陳一建鼔在其東東鼔東方西向太簇起北磬次之夾鍾次之鍾次之姑洗次之皆南陳一建鼔在其南東鼓南方北向中吕起東鐘次之㽔賓次之磬次之林鍾次之皆西陳一建鼓在其西西鼓西方東向夷則起南鍾次之南吕次之磬次之無射次之皆北陳一建鼔在其北西鼓其大射則撤北面而加鉦鼔祭天則用雷鼓雷鼗祭地則用靈鼓靈鼗宗廟用路鼔路鼗各兩設在懸内又准儀禮宫懸四面設鎛鐘十二虡各依辰位又加甲丙庚壬位各設鐘一虡乙丁辛癸位各陳磬一虡共為二十虡其宗廟殿庭郊丘社竝同樹建鼔于四隅以象二十四氣依月為均四箱同作蓋取毛詩傳云四懸皆同之義古者鎛鐘據儀禮擊為節倫而無合曲之義又大射有二鎛皆亂擊焉乃無成曲之理依後周以十二鎛相生擊之音韻克諧每鎛鐘建鼔各一人每鐘磬簨虡各一人歌二人執節一人琴瑟箏筑各一人每鐘虡竽笙簫笛塤箎各一人懸内柷敔各一人柷在東敔在西二舞各八佾樂人皆平巾幘絳褠衣樂噐竝採周官參之梁代擇用其尤善者其簨虡皆金五博山飾以崇牙樹羽旒蘇其樂噐應漆者天地之神皆朱漆宗廟及殿庭則五色漆畵晉宋故事箱别各有柷敔既同時戞之今則不用又周官大司樂奏黃鍾歌大吕舞雲門以祀天神奏太簇歌應鍾舞咸池以祭地祇奏姑洗歌南吕舞大韶以祀四望奏㽔賓歌函鍾舞大夏以祭山川奏夷則舞大武以享先祖此乃周制立二王三恪通已為六代之樂至四時祭祀則分而用之以六樂配十二調一代之樂則用二調矣隋去六代之樂又無四望先妣之祭今既與古祭法有别乃以神祇位次分樂配焉奏黃鍾歌大吕以祀圓丘黃鍾所以宣六氣也耀魄天神最為尊極故奏黃鍾以祀之奏太簇歌應鍾以祭方澤太簇所以贊陽出滯崐崘厚載之重故奏太簇以祀之奏姑洗歌南吕以祀五郊神州姑洗所以修潔百物五郊神州天地之次故奏姑洗以祀之奏㽔賓歌函鍾以祭宗廟㽔賓所以安靜神人祖宗有國之本故奏㽔賓以祀之奏夷則歌小吕以祭社稷先農夷則所以詠歌九穀貴在秋成故奏夷則以祀之奏無射歌夾鍾以祭廵狩方嶽無射所以示人軌物觀風望秩故奏無射以祀之同用文武二舞其圓丘降神六變方澤降神八變宗廟禘祫降神九變皆用昭夏其餘祭享皆一變又周禮王出奏王夏其餘尸出奏肆夏叔孫通法迎神奏嘉至今亦隨事立名皇帝入出皆奏皇夏羣官入出皆奏肆夏食舉上壽奏需夏迎送鬼神奏昭夏薦獻郊廟奏諴夏宴享殿上奏登歌并文舞武舞合為八曲古有宫商角徵羽五引梁以三朝元會奏之今改為五音其聲悉依宫商不使差越唯迎氣於五郊降神奏之月令所謂孟春其音角是也通前為十三曲并内宫所奏天髙地厚二曲於房中奏之合十五曲其登歌法准禮郊特牲歌者在上匏竹在下大戴云清廟之歌懸一磬而尚拊搏又在漢代獨登歌者不以絲竹亂人聲近代以來有登歌五人别昇於上絲竹一部進處階前此蓋尚書戞擊鳴球搏拊琴瑟以詠祖考來格此之義也梁武樂論以為登歌者頌祖宗功業簡禮記乃非元日所奏若三朝大慶百辟俱陳昇工籍殿以詠祖考君臣相對便須涕洟以此説非通還以嘉慶用之後周登歌備鐘磬琴瑟階上設笙管今遂因之合於儀禮荷瑟升歌及笙入立於階下間歌合樂是燕餘之事矣登歌法有十四人鐘東磬西工各一人琴瑟箏筑各一人并歌者三人執節一人竝坐階下笙竽簫笛塤箎各一人竝立階下悉進賢冠絳公服斟酌今古參而用之祀神宴會通行之若有大祀臨軒陳於階壇之上若册拜王公設宫懸不用登歌釋奠則惟用登歌而不設懸古者人君食皆用當月之調以取時律之聲使不失五常之性調暢四體令得時氣之和故鮑鄴上言天子食飲必順四時有食舉樂所以順天地養神明可作十二月均感天和氣此則殿廷月調之義也祭祀既以分樂臨軒朝會竝用當月之律正月懸太簇之均乃十二月懸大吕之均感人君情性允恊隂陽之義也又文舞六十四人竝介幘冠進賢冠絳紗連裳内單皂褾領􅙦􅅂革帶烏皮履十六人執翣十六人執帗十六人執旄十六人執羽左手皆執籥二人執纛引前在舞人數外衣冠同舞人武舞六十四人并服武弁朱褠衣革帶烏皮履左執朱干右執大戚依朱干玉戚之文二人執旌居前二人執鼗二人執鐸金錞二四人輿二人作二人執鐃次之二人執相在左二人執雅在右各工一人作自旌以下夾引竝在舞人數外衣冠同舞人周官所謂以金錞和鼔以金鐲節鼔金鐃止鼔金鐸通鼔也又依樂記象德擬功初來就位摠干而山立思君道之難也發揚蹈厲威而不殘也舞亂皆坐四海咸安也武始而受命再成而定山東三成而平蜀道四成而北狄是通五成而江南是拓六成復綴以闡太平髙祖曰不須象功德直象事可也然竟用之近代舞出入皆作樂謂之階歩咸用肆夏今亦依定即周官所謂樂出入奏鐘鼔也又魏晉故事有矛俞弩俞及侏儒導引今據尚書直云干羽禮又稱羽籥干戚今文舞執羽籥武舞執干戚其矛俞弩俞等蓋漢髙祖自漢中歸巴俞之兵執仗而舞也既非正典悉罷不用十四年三月樂定秘書監竒章縣公牛宏秘書丞北絳郡公姚察通直散騎常侍虞部侍郎許善心兼内史舎人虞世基儀同三司東宫學士饒陽伯劉臻等奏曰臣聞蕢桴土鼓繇來斯尚雷出地奮著自易經邃古經邦馭物損讓而臨天下者禮樂之謂也秦焚經典樂書亡缺爰至漢興始加鳩採祖述增廣緝成朝憲魏晉相承更加論討沿革之宜備於故實永嘉之後九服分離燕石符姚逆據華土此其戎乎何必伊川之上吾其左袵無復微管之功前言徃式於斯而盡金陵建社朝士南奔帝則皇規粲然更舉中原隔絶三百年於兹矣伏惟明聖膺期會昌在運今南征所獲梁陳樂及晉宋旗章宛然俱至曩代所不服者今悉服之前朝所未得者今悉得之化洽功成於是乎在臣等伏奉明詔詳定雅樂博訪知音旁求儒彦研校是非定其去就取為一代正樂具在本司并撰歌詞三十首四月乙丑詔曰在昔聖人作樂崇德移風易俗於斯為大昔晉氏播遷兵戈不息雅樂流散年代已多四方未一無繇辨正頼上天鑒臨神明降福拯兹塗炭安息蒼生天下大同歸於治理遺文舊物皆為國有比命所司摠令研究正樂雅聲詳考已訖宜即施用見行者停人間音樂流僻日久棄其舊體競造繁聲浮宕不歸迭以成俗宜加禁約務存其大十七年十月庚午詔曰昔五帝異樂三王殊禮皆隨事而有損益因情而立節文仰惟祭享宗廟瞻敬如在罔極之感情深兹日而禮畢升輅鼔吹發音還入宫門金石振響斯則哀樂同日心事相違情所不安理實未允宜改兹徃式用𢎞禮教自今已後享廟日不須設鼔吹殿庭勿設樂懸在廟内及諸祭竝依舊其王公已下祭私廟日不得作音樂故事天子有事於太廟備法駕陳羽葆以入於次禮畢升車鼓吹竝作詔罷之仁壽元年詔吏部尚書竒章公牛宏開府儀同三司領太子洗馬柳顧言秘書丞攝太常少卿許善心内史舎人虞世基禮部侍郎蔡徵等更詳故實創制雅歌詞先是髙祖遣内史侍郎李元操直内史省盧思道等制清廟諷調十二曲令齊樂人曹妙逹於太樂教習以代周歌其初迎神七言以象世基曲獻奠登歌六言象傾杯曲送神五言象行天曲宏等但改其聲合於鐘律而詞經勅定不敢易之至是煬帝初為皇太子從享於太廟聞而非之乃上言曰清廟歌詞文多浮麗不足以宣功德請更議之故有是詔其詞圓丘皇帝入至版位定奏昭夏之樂以降天神升壇奏皇夏之樂受玉帛登歌奏昭夏之樂皇帝降南階詣罍洗洗爵訖升壇竝奏皇夏初升壇俎入奏昭夏之樂皇帝初獻奏諴夏之樂皇帝既獻作文舞之舞皇帝飲福酒作需夏之樂皇帝反爵於坫還本位奏皇夏之樂武舞出作肆夏之樂送神作昭夏之樂就燎位還大次竝奏皇夏册府元龜卷五百六十八
