body:
  text: 册府元龜卷四百三十宋王欽若等撰將帥部乞師致師乞師夫以危事方搆而兵力不足動有勝敗之慮居無赴援之師於是控親隣以求助兾禍難之斯解蓋乞師之來舊矣三代之後戎事不息其或當帥臣之任襲行討伐膺守禦之寄是為屏翰金革将試而衆寡靡敵梯衝交下而殱亡可待以至宗國覆䘮翦焉愁苦乃能藉兵於同盟請救於強國曷嘗不克集殊績制勝勁敵乃至興滅於將絶圖安於既危者哉其或勢迫事去外應無及者斯可哀已公子遂魯大夫僖公二十六年夏齊人伐魯北鄙公子遂臧文仲如楚乞師乞不保得之辭宣公十八年夏公使如楚乞師公不事齊齊與晉盟故懼而乞師於楚孫良夫桓子也衞大夫魯成公二年孫良夫帥師及齊戰於新築衞師敗績孫桓子還於新築不入不入國遂如晉乞師魯臧宣叔亦如晉乞師皆主郤獻子晉侯許之七百乘郤子曰此城濮之賦也請八百乘許之與齊戰於鞍齊師敗績郤錡晉大夫魯成公十二年春晉侯使郤錡來乞師將伐秦也侯伯當召兵而乞師謙辭欒黶晉大夫魯成公十六年四月晉侯將伐鄭郤犨如衞遂如齊皆乞師焉欒黶來乞師孟獻子曰有勝矣卑讓有禮故知其將勝楚荀罃晉大夫魯成公十七年秋晉侯使荀罃來乞師伐鄭士魴晉大夫魯成公十八年十一月楚子重伐宋使偏師與鄭人侵宋子重為鎮後宋華元如晉告急晉士魴來乞師将救宋季文子問師數於臧武仲對曰伐鄭之役知伯實來下軍之佐也知伯荀罃今彘季亦佐下軍彘季士魴如伐鄭可也事大國無失班爵而加敬焉禮也從之從武仲言十二月孟獻子㑹於虛朾謀救宋也宋人辭諸侯而請師不敢煩諸侯故但請其師士雃秦大夫魯襄公九年秦景公使士雃乞師於楚將以伐晉楚子許之子􅇸曰不可當今吾不能與晉爭王曰吾既許之矣雖不及晉必將出師秋楚子師於武城以為秦援公子貞字子􅇸楚大夫魯襄公十一年四月諸侯伐鄭鄭人懼乃行成七月楚子􅇸乞旅於秦乞師旅于秦秦右大夫詹帥師從楚子將以伐鄭鄭伯逆之丙子伐宋鄭逆服故更伐宋陳無宇齊大夫魯襄公二十四年齊侯既伐晉而懼將欲見楚子楚子使薳啓疆如齊聘且請期請㑹期齊侯聞將有晉師使陳無宇從薳啓疆如楚辭且乞師辭有晉師未得相見冬楚子伐鄭以救齊申包胥楚人也魯定公四年吴伐楚楚子敗奔隨申包胥如秦乞師曰吳為封豕長蛇以薦食上國薦數也言吳貪害如蛇豕虐始于楚寡君失守社稷越在草莽使下臣告急曰夷徳無厭若隣於君疆埸之患也吳有楚則與秦鄰逮吳之未定君其取分焉與吳共分楚地若楚遂亡君之土也若以君靈撫之世以事君撫存恤也秦伯使辭焉曰寡人聞命矣子姑就館將圗而告對曰寡君越在草莽未獲所伏伏猶處也下臣何敢即安立依於庭牆而哭日夜不絶聲勺飲不入口七日秦哀公為之賦無衣詩秦風取王于興師脩我戈矛與子同仇之義九頓首而坐秦師乃出趙鞅晉大夫魯哀公二年四月鞅帥師納衛世子蒯瞶于戚三年齊衛圍戚求援于中山中山鮮虞也晉侯將伐齊魯哀公二十四年使來乞師曰昔臧文仲以楚師伐齊取榖在僖二十六年宣叔以晉師伐齊取汶陽在成二年寡君欲徼福於周公願乞靈於臧氏臧石帥師㑹之取廪丘駟𢎞鄭大夫悼公四年晉荀瑶帥師伐鄭次於桐丘駟𢎞請救於齊𢎞駟歂子齊陳成子帥師救鄭張翠韓大夫楚圍雍氏韓使使求救於秦秦不下殽令靳尚使秦秦宣太后不許靳尚歸復使張翠至秦秦乃下師於殽以救韓趙勝趙成王弟也封平原君秦圍邯鄲平原君數遺魏王及公子無忌書請救魏使將晉鄙將十萬衆救趙鄙軍壁鄴名為救趙實持兩端以觀望平原君使者冠蓋相屬於魏魏公子無忌乃矯奪晉鄙兵符救之項梁自號武信軍引兵攻亢父亢音抗父音甫初秦將章邯既殺齊王田儋齊人立故齊王建之弟田假為王田角為相田間為將田榮怒擊逐假亡走楚角亡走趙間前救趙因不敢歸項梁追擊章邯章邯兵益盛梁使使趣齊兵榮曰楚殺田假趙殺角間廼出兵楚趙不聽齊齊亦怒終不肯出兵章邯果敗殺項梁漢韓信為大將虜魏豹定河東使人請漢王願益兵三萬人臣請北舉燕趙東擊齊南絶楚之糧道西與大王會於滎陽漢王與兵萬人後漢公孫瓚為幽州刺史為袁紹所圍求救於黑山賊救至欲内外擊紹瓚遣行人文則齎書告子續曰袁氏之攻似若神鬼鼔角鳴於地中梯衝舞吾樓上日窮月踧無所聊賴汝當碎首於張燕速致輕騎到者當起烽火於北吾當從内出不然吾亡之後天下雖廣汝欲求定足之地其可得乎孔融為北海太守為管亥所圍太史慈為求救於平原相劉備備驚曰孔北海乃復知天下有劉備耶即遣三千兵救之賊乃散走魏陳矯廣陵東陽人也避亂本郡太守陳登請為功曹矯郡爲孫權所圍於匡竒登乃令矯求救於太祖曰鄙郡雖小形便之國也若䝉救援使為外藩則吴大挫謀徐方永安武聲遠震仁愛滂流未從之國望風景附崇德養威此王業也太祖竒矯欲留之矯辭曰本郡倒懸奔走告急無申胥之效敢忘𢎞演之義乎太祖乃遣赴救吴軍既退登多設間伏勒兵追奔大破之田豫為䕶烏丸校尉豫出塞為鮮卑軻比能所圍於故馬邑城移鴈門太守牽招求救招自表輙行又并馳布羽檄稱陳形勢虜即恐怖種類離散吴甘寧守夷陵魏曹仁分兵騎攻圍寧寧告急於周瑜瑜用吕蒙計與䝉並救寧寧圍解晉祖逖為奮威将軍豫州刺史流人塢主張平樊雅在譙逖進據太丘平助雅攻逖逖遣使求救於蓬陂塢主李川川遣將李頭率衆援之逖遂克譙城初雅之據譙也逖以力弱來助於南中郎将王含􅅤遣桓宣領兵助逖逖遂克譙桓宣為四品將軍屯馬頭山為祖煥桓撫所圍宣遣其子戎求救於毛寳寳隨戎赴之未至而賊已與宣戰寶軍懸兵少器仗濫惡大為煥撫所破寳中箭貫髀徹鞍使人蹋鞍㧞箭血流滿鞾去船所百餘里望星而行到先哭戰亡將士洗瘡訖夜即還救宣寶至宣營而煥撫亦退周瓊為梁州刺史東羗校尉竇衝入漢川定安人皇甫釗京兆人周勲等謀納之瓊失巴西三郡衆寡力弱告急于鎮襄陽征虜將軍朱序序遣將軍皇甫貞率衆赴之譙王承等守湘州為王敦所攻初安南將軍甘卓與承書勸使固守當以兵出沔口斷敦歸路則湘圍自解承答書曰季思足下勞於王事天綱暫圯中原丘墟四海義士方謀克復中興江左草創始爾豈圖惡逆萌自寵臣吾以闇短託宗皇屬仰豫宻命作鎮南夏親奉中詔成規在心伯仁諸賢扼腕岐路至止尚淺凡百茫然豺狼易驚遂肆醜毒聞知駭踊神氣衝越子來之義人思自奮不命而至衆過數千誠足以决一時之機攄山海之憤矣然迫於倉卒舟楫未備魏乂李恒尋見圍逼是故事與意違志力未展猥辱來使深同大趣嘉謀英筭發自深衷執讀周復欣無以量足下若能卷甲電赴猶或有濟若有狐疑求我枯魚之肆矣兵聞拙速未覩工遲季思足下勉之書不盡意絶筆而已卓軍次䐗口聞王師敗績停師不進承乃遇害荀崧都督荆州江北諸軍事平南將軍鎮宛改封曲陵公為賊杜曽所圍石覽時為襄城太守崧力弱食盡使其小女灌求救於覧及南中郎將周訪訪即遣子撫率兵三千人會石覧俱救崧賊聞兵至散走崧既得免乃遣南陽中部尉王國劉願等潛軍襲穰縣獲曽從兄偽新野太守保斬之後魏元法僧為益州刺史梁武遣將張齊率衆攻逼城門晝閉行旅不通法僧上疏曰臣忝守遐方變生慮表賊衆侜張所在強盛統内城戍悉已陷没近州之民亦将擾叛惟獨州治僅存而已亡滅之期非旦則夕臣自思忖必是死人但恐不得謝罪庭闕既忝宗枝累辱不淺若死為鬼永曠天顔九泉之下實深重恨今募使間行偷路奔告若臺軍速至猶希全保哭送使者不知所言孝眀詔曰比勅傅􅆆眼倍道兼行而猶未達可更遣尚書郎堪幹者一人馳驛催遣庶令拔彼倒懸救兹危急竪眼頻破張齊於是獲全皮豹子為仇池鎮將討楊難當平之諸氐復推楊文德為主興安二年正月宋文帝遣其将蕭道成王虬馬光等入漢中别令楊文德楊頭等率氐羗圍武都城中拒之殺賊二百餘人豹子分兵救之至女磊聞賊停軍豹子遣人於祁山取馬欲往赴援文德謂豹子欲斷其糧運回軍還入覆津據險自固宋文帝恐其輙回又增兵益將令晉夀白水送糧覆津漢川武興運粟甘泉皆置倉儲豹子表曰義隆增兵運糧尅必送死臣所領之衆本自不多唯仰民兵専恃防固其統萬安定二鎮之衆從戎以來經三四歲長安之兵役過朞月未有代期衣糧俱盡形顔枯悴窘切戀家逃亡不已既臨寇難不任攻戰士民姦通知臣兵弱南引文德共為唇齒文德去年八月與義隆梁州刺史劉秀之同征長安聞臺遣大軍勢援雲集長安地平用馬為便畏國騎軍不敢北出但承仇池勾人稱臺軍不多戎兵尠少諸州雜人各有還思軍勢若及必自奔逃進軍取城有易反掌今外寇兵強臣力寡弱拒賊備敵非兵不擬乞選壮兵增戍武都牢城自守可以無患今事已切急若不馳聞損失城鎮恐招斯責詔遣高平鎮將茍莫于率突騎二千以赴之道成等乃退崔楷孝眀孝昌初為殷州刺史加後将軍楷至州表曰竊惟殷州地實四衝居當五裂西通長山東漸巨野頃國路康寧四方有截仍聚姦宄桴鼔時鳴况今天長䘮亂妖災間起定州逆虜趦趄北界鄴下㓙燼蠶噬腹心兩處犬羊勢若并合城下之戰匪斯朝夕臣以不武屬此屏捍實思效力以弱強敵析骸煑弩固此忠節但基趾建剏庶事茫然斗儲尺刃聊自未有雖欲竭誠莫知攸濟謹列所須兵仗請垂矜許必當虎視一方遏其侵軼肅清境内保全所委詔付外量竟無所給後周李賢隴西人長孫邪利為都督行原州事以賢為主簿時有賊帥達符顯圍逼州城晝夜攻戰屢被摧䘐賢間道赴雍州詣爾朱天光請援天光許之賢乃返而賊營壘四合無因入城俟日向夕乃偽負薪與賊樵採者俱得至城下城中垂布引之賊衆方覺乃引弩亂發射之不中遂得入城告以大軍將至賊聞之便散走唐南霽雲為睢陽張巡帳下士天寶末安禄山叛亂賊將尹子竒圍睢陽城經數月城中糧盡至人相食求救於臨淮節度賀蘭進眀遣霽雲夜縋出城之臨淮見進眀進眀日高會張樂饗士殊無出兵之意霽雲泣而謂之曰强寇陵逼圍城半年糧盡矢窮計無所出初圍城之際城中數萬人今者相食已盡張中丞自殺愛妾以饗軍士今見存之衆不過數千城中之人不敢愛死恐破之後賊過淮南亦不利於大夫霽雲所以冐鋒刃晝伏夜動匍匐以見大夫今大夫數日高會殊無遣兵之意豈忠臣義士勤王報國之意乎霽雲不能達主將之意請齧一指留於大夫示之以信歸報城中將士遂却還睢陽數日得達懸繩入城城中之人知救不至慟哭數日遂陷李愬為唐鄧節度使居半歲謀襲蔡州請濟師詔河中鄜坊騎兵二千人益之辛讜性慷慨重然諾專務賑人之急年五十不求茍進有濟時救患之志咸通十年龎勛亂徐泗時杜慆守泗州賊以郡當江淮要害極力攻之時兩淮郡縣皆陷獨慆守臨淮久之援軍雖集賊未解圍時讜寓居廣陵乃仗劍拿小艇移泗口貫賊柵入城見慆慆素聞其義而不相面喜讜至握手謝曰判官李延樞每話子為人何遽至耶吾無憂矣時賊三面攻城王師結壘于洪源驛相顧不前讜夜以小舟穿賊壘至洪源驛見監軍郭厚本論泗州危急且宜速救厚本然之淮南都将王公弁謂厚本曰賊衆我寡無宜輕舉當俟可行讜坐中㧞劍瞋目謂公弁曰賊百道攻城陷在旦夕公等奉詔赴援而逗留不進心欲何為不惟有負國恩丈夫義氣亦宜感發假如臨淮陷賊淮南即是寇場公何獨存耶讜欲揮刅向公弁厚本持之讜望泗州大哭者經日帳下為之流涕厚本義其心選甲士三百隨讜入泗州夜半斬賊栅大呼繇水門而入賊軍大駭既知援兵入賊乃退舍人心遂固浙西觀察使杜審權遣大將翟行約率軍三千赴援屯蓮塘驛慆欲遣人勞之将吏皆憚其行讜曰杜相公以大夫宗盟急難相赴安得令使者無言而還即齎慆書幣犒其使淮南大將李湘率師五千來援受賊詐降敗於淮口湘與郭厚本皆為賊所執自是無援賊併兵急攻以鐵索斷淮流梯衝雲合凡周七月晝夜不息乘城之士不遑寤寐面頭生瘡軍儲漸少分食稀粥賴讜犯難仗義求救於淮北諸軍既而馬舉以大軍至賊解圍而去梁杜洪唐末為鄂帥時成汭鎮荆門淮南楊行宻以兵圍鄂州洪遣使求救於太祖時太祖以隔越大江勢不能救乃發使諷汭令出師以援鄂渚周錢俶廣順二年遣間使言覘得淮南去年興兵取湖南七州近又以衆於彬連屯守欲攻容桂當道調發兩路進軍水取漳泉陸取汀建望朝廷即出天兵以為犄角之勢致師環人致師周官之列職勇者嘗寇鄭國之善謀蓋夫受脤以行彼敵斯遇或勒兵而未陣或堅壁而固守持久將變拙速是圖故有執馘以環城御旌而摩壘增三軍之氣成一戰之功其或侮以醜言遺之婦飾用激其怒以成厥謀斯亦為将者權宜之小道也許伯楚大夫魯宣公十二年楚伐鄭晉救之許伯御樂伯攝叔為右以致晉師單車挑戰又示不欲崇和以疑晋之群帥許伯曰聞致師者御靡旌摩壘而還靡旌駈疾也摩近也樂伯曰吾聞致師者左射以菆左軍左也菆射之善者代御執轡御下兩馬掉鞅而還兩飾也掉正也以示閒暇攝叔曰吾聞致師者右入壘折馘折馘斷耳執俘而還皆行其所聞而復漢彭越為魏相國常往來為漢㳺兵擊楚絶糧道項羽欲討越謂其將曹咎曰謹守成臯則漢欲挑戰慎勿與戰無令得東我十五日必誅彭越定梁地漢果數挑戰楚軍不出使人辱之五六日曹咎怒度兵汜水漢擊之大破楚軍盡得楚國貨賂曹咎自剄汜水上後漢張堪為謁者使送委輸縑布并領騎七千匹詣大司馬吳漢伐公孫述在道追拜蜀郡太守時漢軍餘七日糧陰具船欲遁去堪聞之馳往見漢説述必敗不宜退師之策從之乃示弱挑敵述果自出戰死城下魏王昶為征南將軍督荆豫軍事時吳将守江陵不出昶欲引致平地與合戰乃先遣五軍按大道發還使賊望見以喜之所獲鎧馬甲首馳環城以怒之設伏兵以待之吴大将施績果遣軍與戰克之績遁走斬其將鍾離茂許旻収其甲首旗皷珍寳器仗振旅而還漢諸葛亮為丞相出斜谷屯渭南司馬宣王拒之眀帝詔令堅壁不戰亮既屢遣使交書又致巾幗婦人之飾以怒宣王宣王將出戰辛毗奉詔勅宣王及軍吏以下乃止前秦苻黄眉為苻堅将時姚襄據黄落苻堅遣黄眉及鄧羌等帥兵騎討之襄深溝高壘固守不戰鄧羌説黄眉曰傷弓之鳥落於虛發㐮頻為桓温張平所敗鋭氣䘮矣今固壘不戰是窮寇也襄性剛狠易以剛動若長驅鼔行且壓其壘襄必忿而出師可一戰而擒也黄眉從之遣羌率騎三千軍於壘門襄果怒盡鋭出戰羌偽不勝引騎遽退襄追之至于三原羗廻騎距襄俄而黄眉與堅至大戰斬之盡俘其衆宋柳世隆為郢州守将時沈攸之反入江陵舉兵東下分兵出夏口據魯山攸之既至郢城弱小不足攻遣人告世隆曰被太后令當暫還郡卿既相與奉國想得此意世隆答曰東下之師久承聲問郢城小鎮自守而已攸之將去世隆遣兵於西渚挑戰攸之果怒令諸軍登岸燒郭邑築長圍攻城世隆隨宜拒應衆皆披却攸之軍因之敗潰後魏賀拔岳為西道都督與爾朱天光討万侯醜奴岳届長安時万侯醜奴遣大行臺尉遲菩薩向武功南渡渭水攻圍趣柵天光遣岳率騎一千馳往赴救菩薩攻栅已剋還向岐州岳以輕騎八百北渡渭水擒賊令殺掠其民以挑菩薩菩薩果率步騎二萬餘人至渭水北岳以輕騎數十與菩薩隔水交言岳稱揚國威菩薩自言強盛往復數返菩薩乃自僑令省事傳語岳怒曰我與菩薩言卿是何人與我對語省事恃水應答不遜岳舉弓射之應弦而倒其時已逼暮於是各還岳密於渭南傍水分置精騎四十五十以為一所隨地形便絡繹置之眀日自將百餘騎隔水與賊相見並且東行岳漸前進先所置騎騎隨岳而集騎既漸增賊不復測其多少行二十里許便至淺可濟岳便馳馬東出以示奔遁賊謂岳走乃棄歩兵南渡渭水輕騎追岳岳東行十餘里依横崗伏兵以待之賊以路險不得前進前後繼至半度崗東岳乃廻戰身先士卒急擊之賊便退走岳號令所部賊下馬者皆不聽殺賊顧見之便悉投馬俄而虜獲三千人馬亦無遺遂渡渭北降步兵萬餘収其輜重隋張威善騎射膂力過人王謙作亂高祖以威為行軍總管從元帥梁睿擊之軍次通谷謙守将李二王擁勁兵拒守睿以威為先鋒二王初閉壘不戰威令人罵侮以激怒之二王果出陳威令壯士奮擊二王軍潰大兵繼至於是擒斬四千餘人册府元龜卷四百三十
