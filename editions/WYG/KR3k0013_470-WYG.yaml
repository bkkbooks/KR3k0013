body:
  text: 册府元龜卷四百七十宋王欽若等撰臺省部奏議虞書曰敷納以言傳曰議事以制盖臣之事君有官守焉有言責焉若乃省署之設班制有序治政攸岀髦俊咸集䨇筆九墨之賜著於令典伏奏起草之勤表乎職業其為言責也重矣哉乃有深識理道博逹古今援引經義參酌時務述宣忠信之道雍容訓格之言或揚庭㑹議辯析衆惑或削章迭進發揮大猷非夫謇諤宏逹平徹閑雅孰可以商確治體建明王度塞於薦紳之論哉漢賈誼文帝時為大中大夫誼以為漢承秦之敗俗廢禮義捐亷耻今其甚者殺父兄盗者取廟器而大臣特以簿書不報期㑹特但也簿文簿也政為大事也言公卿但以文案簿書報答為事也至於風俗流溢恬而不怪恬安也謂心以為安以為是適然耳言正當如此非失道也夫移風易俗使天下回心而鄉道類非俗吏之所能為也夫立君臣等上下使綱紀有序六親相睦六親賈誼書以為父也子也從父昆弟也從祖昆弟也曽祖昆弟也族昆弟也此非天之所為人之所設也人之所設不為不立不修則壊為作也漢興至今二十餘年宜定制度興禮樂然後諸侯軌道百姓素樸獄訟衰息軌道言遵道猶車行之依軌轍也廼草具其儀草為草創也立其事也天子説焉而大臣絳灌之屬害之故其議遂寝吾丘壽王武帝時為侍中丞相公孫𢎞奏言民不得挾弓弩十賊彍弩百吏不敢前引滿曰彍盗賊不輒伏辜免脱者衆害寡而利多此盗賊所以蕃也禁民不得挾弓弩則盗賊執短兵短兵接則衆者勝以衆吏捕寡賊其埶必得盗賊有害無利則莫犯法刑錯之道也臣愚以為禁民毋得挾弓弩便上下其議壽王對曰臣聞古者作五兵非以相害以禁暴討邪也五兵謂矛㦸弓劍戈安居則以制猛獸而備非常有事則以設守衛而施行陣及至周室衰㣲上無明王諸侯力政強侵弱衆暴寡海内抏敝巧詐並生抏盡也是以知者䧟愚勇者威怯茍以得勝為務不顧義理故機變械飾所以相賊害之具不可勝數於是秦兼天下廢王道立私議滅詩書而首法令去仁恩而任刑戮堕名城殺豪傑堕毁也銷甲兵折鋒刃其後民以耰鉏箠梃相撻擊耰摩田之器也箠馬撾也挺大杖也犯法滋衆盗賊不勝至於赭衣塞路羣盗滿山卒以亂亡故聖王務教化而省禁防知其不足恃也今陛下昭明徳建太平舉俊才興學官三公有司或繇窮巷起白屋裂地而封宇内日化方外鄉風然而賊盗猶有者郡國二千石之罪非挾弓弩之過也禮曰男子生桑弧蓬矢以舉之明示有事也孔子曰吾何執執射乎大射之禮自天子降及庻人三代之道也詩云大侯既抗弓矣斯張射夫既同獻爾發功言貴中也愚聞聖王合射以明教矣未聞弓矢之為禁也且所為禁者為賊盗之以攻奪也攻奪之罪死然而不止者大奸之於重誅固不避也臣恐邪人挾之而吏不能止良民以自備而抵法禁是擅賊威而奪民救也竊以為無益於禁奸而廢先王之典使學者不得習行其禮大不便書奏帝以難丞相𢎞𢎞詘服焉後漢鄭𢎞章帝建初初為尚書令舊制尚書郎限滿補縣長令史丞尉𢎞奏以為臺職雖尊而酬賞甚薄至於開選多無樂者請使郎補千石令史為長帝從其議宋意為尚書章和二年鮮卑擊破北匈奴而南單于乗此請兵北伐因欲還歸舊庭時竇太后朝議欲從之意上疏曰夫戎狄之隔逺中國幽處北極界以沙漠簡賤禮義無有上下强者為雄弱者屈服自漢興以來征伐數矣其所剋獲曾不補害光武皇帝躬服金革之難深昭天地之明故因其來降羇縻畜養邊人得生勞役休息於兹四十餘年矣今鮮卑奉順斬獲萬數中國坐享大功而百姓不知其勞漢興功烈於斯為盛所以然者外域相攻無損漢兵者也臣察鮮卑侵伐匈奴正是利其抄掠及歸功聖朝實繇貪得重賞今若聽南虜還都北庭則不得不禁制鮮卑外失暴掠之願内無功勞之賞豺狼貪婪必為邊患今北敵西遁請求和親宜因其歸附以為外捍巍巍之業無以過此若引兵費賦以順南虜則坐失上略去安即危矣誠不可許㑹南單于竟不北徙陳忠為尚書安帝即位頻遭元元之厄百姓流亡盗賊並起郡縣更相飾匿莫肯紏發忠獨以為憂上疏曰臣聞輕者重之端小者大之源故隄潰蟻孔氣洩鍼芒韓子曰千丈之隄以螻蟻之穴而潰黄帝素問曰針頭如芒氣岀如筐是以明者愼㣲知者識幾書曰不可不殺詩云無縱詭隨以謹無良盖所以崇本絶末鉤深之慮也臣竊見元年已來盗賊連發攻亭刼掠多所傷殺夫穿窬不禁則致強盗強盗不斷則為攻盗攻盗成羣必生大奸故亡逃之科憲令所急至於通行飲食罪致大辟而頃者以來莫以為憂州郡督録怠慢長吏防禦不肅皆欲採獲虚名諱以盗賊為負雖有發覺不務清澄至有逞威濫怒無辜僵仆或有跼蹐比伍轉相賦歛或隨吏追赴周章道路是以盗發之家不敢伸告鄰舍比里相共壓迮迮廹也或出私財以償所亡其大彰著不可掩者乃肯發露凌遲之漸遂且成俗冦攘誅咎皆繇於此前年渤海張伯路可為至戒覆車之軌其迹不逺盖失之末流求之本源宜紏增舊科以防來事自今強盗為上官若他郡縣所紏覺一發部吏皆正法尉貶秩一等令長三月奉贖罪二發尉免官令長貶秩一等三發已上令長免官便可撰立科條處為詔文切勑刺史嚴加紏罰兾以猛濟寛驚懼奸慝頃季夏大暑而消息不恊寒氣錯時水湧為變天之降異必有其故所舉有道之士可䇿問國典所務王事過差令處煖氣不效之意庻有讜言以承天誡左雄為尚書令順帝即位雄上疏陳事曰臣聞柔逺和邇莫大寜人寜人之務莫重用賢用賢之道必存考黜是以臯陶對禹貴在知人安人則惠黎民懐之分伯建侯代位親民民用和穆禮讓以興故詩云有渰淒淒興雨祁祁雨我公田遂及我私及幽厲昏亂不自為政褒豔用權七子黨進賢愚錯緒深谷為陵故其詩曰四國無政不用其良又曰哀今之人胡為虺蜴言人畏吏如虺蜴也宗周既㓕六國并秦坑儒㓕典剗革五等更立郡縣縣設令長郡置守尉什伍相司封豕其民大漢受命雖未復古然克愼庻官蠲苛救敝悦以濟難撫而循之至於文景天下康乂誠繇𤣥靖寛柔克謹官人故也降及宣帝興於仄陋綜覈名實知時所病刺史守相輙親引見考察言行信賞必罰帝乃嘆曰民所以安而無怨政平吏良也與我共此者其惟良二千石乎以為吏數變易則下不安業乆於其事則民服敎化其有政理者輙以璽書勉勵增秩賜金或爵至關内侯公卿缺則以次用之是以吏稱其職人安其業漢世良吏於兹為盛故能降來儀之瑞建中興之功漢初至今三百餘載俗浸彫敝巧偽滋萌下飾其詐上肆其殘典城百里轉動無常各懐一切莫慮長乆謂殺害不辜為威風聚歛整辦為賢能以理已安民為劣弱以奉法循理為不化髠鉗之戮生於睚眥覆尸之禍成於喜怒視民如冦讐税之如豺虎監司項背相望項背相望謂前後相望也與同疾疢見非不舉聞惡不察觀政於亭傳責成於期月言善不稱徳論功不據實虚誕者獲譽拘簡者罹毁且或因罪而引髙或見幾以求名州宰不覆競共辟召踴躍升騰超等踰匹或考奏捕案而亡不受罪㑹赦行賂復見洗滌朱紫同色清濁不分故使姦猾枉濫輕忽去就拜除如流缺動百數鄉官部吏職斯斯賤也禄薄車馬衣服一出於民亷者取足貪者充家特選横調紛紛不絶送迎煩費損政傷民和氣未洽災𤯝不消咎皆在此今之墨綬猶古之諸侯拜爵王庭輿服有庸而齊於匹豎叛命避負非所以崇憲明理惠育元元也臣愚以為守相長吏惠和有顯效者可就増秩勿使移徙非父母䘮不得去官其不從法禁不式王命錮之終身雖㑹赦令不得齒列若被劾奏亡不就法者徙家邊郡以懲其後鄉部親民之吏皆用儒生清白任從政者寛其負筭増其秩禄吏職滿嵗宰府州郡乃得辟舉如此威福之路塞虚偽之端絶送迎之役損賦歛之源息循理之吏得成其化率土之民各寜其所追配文宣中興之軌流光垂祚永世不刋陽球靈帝時為尚書令奏罷鴻都文學曰伏承有詔勑中尚方為鴻都文學樂松江覧等三十二人圗象立贊以勸學者臣聞傳曰君舉必書書而不法後嗣何觀案松覽等皆出於㣲蔑斗筲小人依憑世戚附託權豪俛眉承睫徼進明時或獻賦一篇或鳥篆盈簡而位升郎中形圗丹青亦有筆不㸃牘辭不辯心假手請字妖偽百品莫不被蒙殊恩蟬蛻滓濁是以有識掩口天下嗟嘆臣聞圗象之設以昭勸戒欲令人君動覽得失未聞䜿子小人詐作文頌而可妄竊天官垂象圗素者也今太學東觀足以宣明聖化願罷鴻都之選以消天下之謗書奏不省魏衛覬文帝踐阼為尚書奏議曰九章之律自古所傳斷定刑罪其意㣲妙百里長吏皆宜知律刑法者國家之所貴重而私議之所輕賤獄吏者百姓之所懸命而選用者之所卑下王政之弊未必不繇此也請置律博士轉相教授事遂施行髙柔以文帝踐阼為治書侍御史賜爵關内侯轉加治書執法民間數有誹謗妖言帝疾之有妖言輙殺而賞告者柔上疏曰今妖言者必戮告之者輙賞既使過誤無反善之路又将開㓙狡之羣相誣罔之漸誠非所以息姦省訟緝熈治道也昔周公作誥稱殷之祖宗咸不顧小人之怨在漢太宗亦除妖言誹謗之令臣愚以為宜除妖謗賞告之法以隆天地養物之仁帝不即從而相誣告者滋甚帝乃下詔敢以誹謗相告者以所告者罪罪之於是遂絶校事劉慈等自黄初初數年之間舉吏民奸罪以萬數柔皆請懲虚實其餘小小挂法者不過罰金杜恕明帝時為散騎黄門侍郎時公卿以下大議損益恕以為古之刺史奉宣六條以清浄為名威風著稱今可勿令領兵以專民事俄而鎮北将軍吕昭又領冀州乃上䟽曰帝王之道莫尚乎安民安民之術在於豐財豐財者務本而節用也方今二賊未㓕戎車亟駕此自熊虎之士展力之秋也然縉紳之儒横加榮慕搤腕抗論以孫吴為首州郡牧守咸共忽恤民之術修将率之事廻農桑之民競干戈之業不可謂務本帑藏嵗虚而制度嵗廣民力嵗衰而賦役嵗興不可謂節用今大魏奄有十州之地而承䘮亂之弊計其户口不如徃昔一州之民然而二方僣逆北虜未賔三邊遘難繞天略帀所以統一州之民經營九州之地其為艱難譬䇿羸馬以取道里豈可不加意愛惜其力哉以武皇帝之節儉府藏充實猶不能十州擁兵郡且二十也今荆揚青徐幽并雍凉縁邊諸州皆有兵矣其所恃内充府庫外制四夷者惟兖豫司冀而已臣前以州郡典兵則專心軍功不勤民事宜别置将守以盡治理之務而陛下復以冀州寵秩吕昭冀州戸口散多田多墾闢又有桑棗之饒國家徴求之府誠不當以復任兵事也若以北方當須鎮守自可專置大将以鎮安之計所置吏事之費與兼官無異然昭於人才尚復易中朝茍之人兼才者勢不獨多以此推之知國家以人擇官不為官擇人也官得其人則政平訟理政平故民富實訟理故囹圄虚空陛下踐阼天下斷獄百數十人歲歲増多至五百餘人矣民不益多法不益峻以此推之非政敎陵遲牧守不稱之明效歟徃年牛死通率天下十能損二麥不半收秋種未下况二賊㳺魂於疆場飛芻輓粟千里不及䆒此之術豈在强兵乎武士勁卒愈多愈病耳夫天下猶人之體腹心充實四肢雖病終無大患今兖豫司冀亦天下之心腹也是以愚臣慺慺實願四州之牧守獨修務本之業以堪四肢之重然孤論難持犯欲難成衆怨難積疑似難分故累載不為明主所察凡言此者類皆䟽賤䟽賤之言實未易聽若使善䇿必出於親貴親貴固不犯四難以求忠愛此古今之所常患也王肅太和中為散騎常侍上疏陳政本曰除無事之位損不急之禄止浮食之費并從容之官使官必有職職任其事事必受禄禄代其耕乃徃古之常式當今之所宜也官寡而禄厚則公家之費鮮進仕之志勸各展才力莫相倚仗敷奏以言明試以功能之與否簡在帝心是以唐虞之設官分職申命公卿各以其事然後惟龍為納言猶今尚書也以出内帝命而已夏殷不可得而詳甘誓曰六事之人明六卿亦典事者也周官則備矣五日視朝公卿大夫並進而司士辨其位焉其記曰坐而論道謂之王公作而行之謂之士大夫及漢之初依擬前代公卿皆親以事升朝故髙祖躬追反走之周昌武帝遥可奉奏之汲黯宣帝使公卿五日一朝成帝始置尚書五人自是陵遲朝禮遂闕可復五日視朝之儀使公卿尚書各以事進廢禮復興光宣聖緒誠所謂名美而實厚者也楊阜為少府時詔大議政治之不便於民者阜議以為致治在於任賢興國在於務農若舍賢而任所私此忘治之甚者也廣開宫館髙為臺榭以妨民務此害農之甚者也百工不敦其器而競作竒巧以合上欲此傷本之甚者也孔子曰苛政甚於猛虎今守功文俗之吏為政不通治體茍好煩苛此亂民之甚者也當今之急宜去四甚並詔公卿郡國舉賢良方正敦樸之士而進用之此亦求賢之一端也傅嘏為尚書嘉平四年四月孫權死征南大将軍王昶征東将軍胡遵鎮南将軍毌丘儉等表請征吳朝廷以三征計異詔以訪嘏嘏對曰昔夫差陵齊勝晋威行中國不能以免姑蘇之禍齊閔辟土兼國開地千里不足以救顛覆之敗有始不必善終古事之明效也孫權自破蜀兼平荆州之後志盈欲滿罪戮忠良誅及𦙍嗣元凶已極相國宣文侯先識取亂侮亡之義深建宏圗大舉之䇿今權已死託孤於諸葛恪若矯權苛暴蠲其虐政民免酷烈偷安新惠内外齊慮有同舟之懼雖不能終自保完猶足以延期挺命於深江之表矣昶等或欲汎舟徑渡横行江表収民略地因糧於冦或欲四道並進臨之以武誘間携貳待其隳壊或進軍大佃偪其項領積糓觀釁相時而動凡此三者皆取賊之常計也然施之當機則功成名立茍不應節必貽後患自治兵以來出入三載非掩襲之軍也賊䘮元帥利存退守若撰餙舟檝羅船津要堅城清野以防卒攻横行之計殆難必施賊之為冦幾六十年君臣偽立吉㓙同患若恪蠲其弊天去其疾奔潰之應不可卒待今邊壌之守與賊相逺賊設羅落又持重宻間諜不行耳目無聞夫軍無耳目較察未詳而舉大衆以臨巨險此為希幸徼功先戰而後求勝非全軍之長䇿也唯有進軍大佃最差完牢可詔昶遵等擇地居險審所錯置及令三方一時前守奪其肥壌使還耕瘠土一也兵出民表冦鈔不犯二也招懐近路降附日至三也羅落逺設間搆不來四也賊退其守羅落必淺佃作易之五也坐食積榖士不運輸六也釁隙時聞討襲速决七也凡此七者軍事之急務也不據則賊擅便資據之則利歸於國不可不察也夫屯壘相偪形勢已交智勇得陳巧拙得用䇿之而知得失之計角之而知有餘不足虜之情偽将焉所逃夫以小敵大則役煩力竭以貧敵富則費重財匱故敵逸能勞之飽能饑之此之謂也然後盛衆厲兵以震之參惠倍賞以招之多方廣似以疑之繇不虞之道以間其不戒比及三年左提右挈虜必氷散瓦觧安受其弊可坐筭而得也昔漢氏歴世嘗患匈奴朝士謀臣早朝晏罷介胄之将則陳征伐搢紳之徒咸言和親勇奮之士思展摶噬故樊噲願以十萬之衆横行匈奴季布面折其短李信求以二十萬獨舉楚人而果辱秦軍今諸将有陳越江凌險獨歩虜庭即亦向時之類也以陛下聖徳輔相忠賢法明士練錯計於全勝之地振長䇿以禦之虜之奔潰必然之數故兵法曰屈人之兵而非戰也㧞人之城而非攻也若釋廟勝必然之理而行萬一不必全之路誠愚臣之所慮也故謂大佃而偪之計最長時不從嘏言其年十一月詔昶等征吳五年正月諸葛恪拒戰大破衆軍於東關後吴大将諸葛恪新破東關乘勝揚聲欲向青徐朝廷将為之備嘏議以為淮海非賊輕行之路又昔孫權遣兵入海漂浪沉溺畧無孑遺恪豈敢傾根竭本寄命洪流以徼乾没乎恪不過遣偏率小将素習水軍者乘海泝淮示動青徐恪自并兵來向淮南耳後恪果圗新城不克而歸吳薛綜為僕射大帝召交州刺史吕岱綜懼繼岱者非其人上疏曰昔帝舜南廵卒於蒼梧秦置桂林南海象郡然則四國之内屬也有自來矣趙佗起番禺懐服百越之君珠官之南是也漢武帝誅吕嘉開九郡設交阯刺史以鎮監之山川長逺習俗不齊言語同異重譯乃通民如禽獸長㓜無别椎結徒跣貫頭左袵長吏之設雖有若無自斯以來頗徙中國罪人雜居其間稍使學書粗知言語使驛徃來觀見禮化及後錫光為交阯任延為九真太守乃敎其耕犁使之冠履為設媒官始知聘娶建立學校道之經義繇此已降四百餘年頗有似類自臣昔客始至之時珠崖除州縣嫁娶皆須八月引户人民集㑹之時男女自相可適乃為夫妻父母不能止交阯糜泠九真都龎二縣皆兄死弟妻其嫂世以此為俗長吏恣聽不能禁制日南郡男女祼體不以為羞繇此言之可謂蟲豸有靦面目耳然而土廣人衆阻險毒害易以為亂難使從治縣官羈縻示令威服田户之租賦裁取供辦貴致逺珍名珠香藥象牙犀角瑇瑁珊瑚琉璃鸚鵡翡翠孔雀竒物充備寳玩不必仰其賦入以益中國也然在九甸之外長吏之選類不精覈漢時法寛多自放肆故數反違法珠崖之廢起於長吏覩其好髪髠取以為髲及臣所見南海黄盖為日南太守下車以供設不豐撾殺主簿仍見驅逐九真太守儋萌為妻父周京作主人并請大吏酒酣作樂功曹潘歆起舞屬京京不肯起歆猶廹强萌忿杖歆亡於郡内歆弟苖帥衆攻府毒矢射萌萌至物故交阯太守士爕遣兵致討卒不能克又故刺史㑹稽朱符多以鄉人虞褒劉彦之徒分作長史侵虐百姓强賦於民黄魚一枚收稲一斛百姓怨叛山賊並出攻州突郡競走入海流離䘮亡次得南陽張津與荆州牧劉表為隙兵弱敵强歲歲興軍諸将厭患去留自在津小檢攝威武不足為所凌侮遂至殺没後得零陵頼恭先軰仁謹不曉時事表又遣長沙吳巨為蒼梧太守巨武夫輕悍不為恭服輙相怨恨逐出恭求歩隲是時津故将夷廖錢博之徒尚多隲以次鉏治綱紀適定㑹仍召出吕岱既至有士民之變越軍南征平討之日改置長吏章明王綱威加萬里大小承風由此言之綏邊撫裔實有其人牧伯之任既宜清能荒流之表禍福尤甚今日交州雖名粗定尚有髙凉宿賊其南海蒼梧鬰林珠官四郡境界未綏依作冦盗專為亡叛逋逃之藪若岱不復南新刺史宜得精宻檢攝八郡方畧智計能稍稍以漸能治髙凉者假其威寵借之形勢責其成效庻幾可補復如但中人近守常法無竒數異術者則羣惡日滋乆逺成害故國之安危在於所任不可不察也竊懼朝廷忽輕其選故敢竭愚情以廣聖恩晋何曾魏明帝時為黄門侍郎上疏曰臣聞為國者以清净為基而百姓以良吏為本今海内虚耗事役衆多誠宜飬恤黎元恱以使人郡守之權雖輕猶專千里比之於古則列國之君也上當奉宣朝恩以致惠和下當興利而除其害得其人則可安非其人則為患故漢宣稱曰百姓所以安其田里而無歎息愁恨之聲者政平訟理也與我共此者其惟良二千石乎此誠可謂知政之本也方今國家大舉新有發調軍師逺征上下劬勞夫百姓可與樂成難與慮始愚惑之人能厭目前之小勤而忘為亂之大禍者是以郡守益不可不得其人才雖難備猶宜粗有威恩為百姓所信憚者臣聞諸郡守有年老或疾病皆委政丞掾不恤庻事或體性踈怠不以政理為意在官積年恵澤不加於人然於考課之限罪亦不至絀免故得經延歲月而無斥罷之期臣愚以為可宻詔主者使隐核參訪郡守其有老病不隠親人物及宰牧少恩好修人事煩撓百姓者皆可徴還為更選代頃之遷散騎常侍及宣帝将伐遼東曾上疏魏帝曰臣聞先王制法必全於愼故建官授任則置副佐陳師命将則立監貳宣命遣使則設介副臨敵交刃則參御右盖以盡思謀之功防安危之變也是以在險當難則權足相濟損缺不預則才足相代其為國防至深至逺及至漢氏亦循舊章韓信伐趙張耳為貳馬援討越劉隆副軍前世之迹著在篇志今太尉懿奉宣誅罪精甲鋭鋒歩騎數萬道路回阻四千餘里雖假天威有征無戰冦或潛遁消散日月命無常期人非金石逺慮詳備誠宜有副今北邊諸将及懿所督皆為僚屬名位不殊素無定分統御之尊卒有變急不相鎮攝存不忘亡聖逹所戒宜選大臣名将威重宿著者盛其禮秩遣詣懿軍進同謀畧退為副佐雖有萬一不虞之災軍主有儲則無患矣時以毌丘儉為宣王副也李宣明武帝時為尚書宣明奏議以為古者三公坐而論道内參六官之事外興六卿之敎或處三槐兼聽獄訟稽疑之典謀及卿士陛下聖徳欽明垂心萬機猥發明詔儀刑古式雖唐虞疇諮周文翼翼無以加也自今以徃國有大政可親延羣公詢納讜言其軍國所疑延諸省中使侍中尚書諮論所宜若有疾疢不任觀㑹臨時遣侍臣訊訪詔從之李重為尚書郎時大中大夫恬和表陳便宜稱漢孔光魏徐幹等議使王公以下制奴婢限數及禁百姓賣田宅中書啟可屬主者為條制重奏曰先王之制士農工商有分不遷其業所以利用厚生各肆其力也周官以土均之法經其地土井田之制而辨其五物九等貢賦之序然後公私制定率土均齊自秦立阡陌建郡縣而斯制已沒降及漢魏因循舊跡立法峻者唯服物重器有貴賤之差令不僣擬以亂尊卑耳至於奴婢私産不曲為立限也去八年己巳詔書申明律令諸士卒百工以上所服乘皆不得違制若一縣一歲之中有違犯者三家雒陽縣十家以上官長免如詔書之㫖法制已嚴今如和所陳而稱光幹之議此皆衰世踰侈當時之患然盛漢之初不議其制光等作而不行非漏而不及能而不用也盖以諸侯之軌既減而井田之制不復則王者之法不得制人之私也人之田宅既無定限則奴婢不宜偏制其數懼徒為之法實碎而難簡方今盛明垂制每尚簡易法禁已備和表無施劉毅武帝時為尚書僕射以魏立九品權時之制未見得人而有八損乃上疏曰臣聞立政者以官才為本官才有三難而興替之所繇也人物難知一也愛憎難防二也情偽難明三也今立中正定九品髙下任意榮辱在手操人主之威福奪天朝之權勢愛憎决於心情偽繇於已公無考校之負私無告訐之忌用心百態求者萬端亷譲之風滅茍且之俗成天下訩訩但争品位不聞推譲竊為聖朝恥之夫名状以當才為清品軰以得實為平安危之要不可不明清平者政化之美也枉濫者亂敗之惡也不可不察然人才異能備體者寡器有大小逹有早晩前鄙後修宜受日新之報抱正違時宜有質直之稱度逺闕小宜得殊俗之状任直不飾宜得清實之譽行寡才優宜獲器任之用是以三仁殊途而同歸四子異行而均義陳平韓信笑侮於邑里而收功於帝王屈原伍胥不容於人主而顯名於竹帛是篤論之所明也今之中正不精才實務依黨利不均稱尺務随愛憎所欲與者獲虚以成譽所欲下者吹毛以求疵髙下逐強弱是非繇愛憎随世興衰不顧才實衰則削下興則扶上一人之身旬日異状或以賄賂自通或以奸計登進附託者必逹守道者困悴無報於身必見割奪有私於己必得其欲是以上品無寒門下品無勢族暨時有之皆曲有故慢主罔時實為亂源損政之道一也置州都者取州里清議咸所歸服将以鎮異同一言議不謂一人之身了一州之才一人不審便坐之若然自仲尼以上至於庖犧莫不有失則皆不堪何獨責於中人者哉若殊不修自可更選今重其任而輕其人所立品格還訪刁攸攸非州里之所歸非職分之所置今訪之歸正於所不服决事於所不職以長䜛搆之原以生乖爭之兆似非立都之本㫖理俗之深防也主者既善刁攸攸之所下而復選以二千石已有數人劉良上攸之所下石公罪攸之所行駁違之論横於州里嫌讎之隙結於大臣夫桑妾之訟禍及吳楚鬪雞之變難興魯邦况乃人倫交争而部黨興刑獄滋生而禍根結損政之道二也本立格之體将謂人倫有序若貫魚成次也為九品者取下者為格謂才徳有優劣倫軰有首尾今之中正務自逺者則抑割一國使無上人穢劣下比則㧞舉非次并容其身公以為格坐成其私君子無小人之怨官政無䋲姦之防使得上欺明主下亂人倫乃使優劣易地首尾倒錯推貴異之器使在九品之下負戴不肖越在成人之首損政之道三也陛下踐阼開天地之徳𢎞不諱之詔納忠直之言以覽天下之情太平之基不世之法也然賞罰自王公以至於衆人無不加法置中正委以一國之重無賞罰之防人心多故清平者寡故怨訟者衆聽之則告訐無已禁絶則侵枉無極與其理訟之煩猶愈侵枉之害今禁訟訴則杜一國之口培一人之勢使得縦横無所顧憚諸受枉者抱怨積直獨不蒙天地無私之徳而長壅蔽於邪人之銓使上明不下照下情不上聞損政之道四也昔在前王之世欲敦風俗鎮静百姓隆鄉黨之義崇六親之行禮敎庠序以相率賢不肖於是見矣然鄉老書其善以獻天子司馬論其能以官於職有司考績以明黜陟故天下之人退而修本州黨有徳義朝廷有公正浮華邪佞無所容厝今一國之士多者千數或流徙異邦或取給殊方面猶不識况盡其才力而中正知與不知其當品状采譽於臺府納毁於流言任己則有不識之蔽聽受則有彼此之偏所知者以愛憎奪其平所不知者以人事亂其度既無鄉老紀行之譽又非朝廷考績之課遂使進官之人棄近求逺背本逐末位以求成不繇行立品不較功黨譽虚妄損政五也凡所以立品設状者求人才以理物也非虚飾名譽相為好醜雖孝悌之行不施朝廷故門外之事以義斷恩既以在官職有大小事有劇易各有功報此人材之實效功分之所得也今則反之於限當報雖職之髙還附卑品無績於官而獲髙叙是為抑功實而隆虚名也上奪天朝考績之分下長浮華朋黨之事損政六也凡官不同事人不同能得其能則成失其能則敗今品不状才能之所宜而以九等為例以品取人或非才能之所長以状取人則為本品之所限若状得其實猶品状相妨繫縶選舉使不得精於才宜况今九品所踈則削其長所親則飾其短徒結白論以為虚譽則品不料能百揆何以得理萬機何以得修損政七也前九品詔書善惡必書以為褒貶當時天下少有所忌今之九品所下不彰其罪所上不列其善廢褒貶之義任愛憎之斷清濁同流以植其私故反違前品大其形勢以驅動衆人使必歸已進者無功以表勸退者無惡以成懲懲勸不明則風俗汙濁天下之人焉得不觧德行而鋭人事損政八也繇此論之選中正而非其人授權勢而無賞罰或缺中正而無禁簡故邪黨得肆枉濫縱横雖職名中正實為奸府事名九品而有八損或恨結於親親猜生於骨肉當身困於敵讎子孫離其殃咎斯乃歴世之患非徒當今之患也是以時主觀時立法防奸消亂靡有常制故周因於殷有所損益至於中正九品上聖古賢皆所不為豈蔽於此事而有不周哉将以政化之宜無取於此也自魏立以來見其得人之功而生讎薄之累毁風敗俗無益於化古今之失莫大於此愚臣以為宜罷中正除九品棄魏氏之弊法立一代之美制疏奏優詔答之後司空衛瓘等亦共表宜省九品復古鄉議里選帝竟不施行傅𤣥武帝時為散騎常侍上疏曰臣聞舜舉五臣無為而化用人得其要也天下郡司猥多不可不審得其人也不得其人一日則損不貲况積日乎典謨曰無曠庻官言職之不可乆廢也諸有疾病百日不差宜令去職優其禮秩而寵存之既差而後更用臣不廢職於朝國無曠官之累此王政之急也臣聞先王分士農工商以經國制事各一其業而殊其務自士以上子弟為之立太學以敎之選明師以訓之各随其才優劣而授用之農以豐其食工以足其器商賈以通其貨故雖天下之大兆庻之衆無有一人㳺手分數之法周備如此漢魏不定其分百官子弟不修經藝而務交㳺未知蒞事而坐享天禄農工之業多廢或逐淫利而離其事徒繫名於太學然不聞先王之風今聖朝之政資始而漢魏之失未改散官衆而學校未設㳺手多而親農者少工器不盡其宜臣以為亟定其制通計天下若干人為士足以副在官之吏若干人為農三年足有一年之儲若干人為工足其器用若干人為商賈足以通貨而已尊儒尚學貴農賤商皆此事業之要務也前皇甫陶上事欲令賜拜散官皆課使親耕天下享足食之利禹稷躬稼祚流後世是以明堂月令著帝藉之制伊尹古之名臣耕於有莘晏嬰齊之大夫避荘公之難亦耕於海濱昔者聖帝明王賢佐俊士皆當從事於農矣王人賜官冗散無事者不督使學則當使耕無縁放之使坐食百姓也今文武之官既衆而拜賜不在職者又多加以服役為兵不得耕稼當農者之半南面食禄者參倍於前使冗散之官農而收其租稅家得其實而天下之榖可以無乏矣夫家足食為子則孝為父則慈為兄則友為弟則悌天下足食則仁義之敎可不令而行也為政之要計人而置官分人而授事士農工商之分不可斯須廢也若果能精其防制計天下文武之官足為副貳者使學其餘皆歸之於農若百工商賈有長者亦皆歸之於農務農若此何有不贍乎虞書曰三載考績三考黜陟幽明是謂九年之後乃有遷叙也故居官乆則念立慎終之化居不見乆則競為一切之政六年之限日月淺近不周黜陟陶之所上義合古制夫儒學者王教之首也尊其道貴其業重其選猶恐化之不崇忽而不以為急臣懼日月陵遲而不覺也仲尼有言人能𢎞道非道𢎞人然則尊其道者非惟尊其書而已尊其人之謂也貴其業者不妄敎非其人也重其選者不妄用非其人也若此而學校之綱舉矣書奏帝下詔曰二常侍懇懇於所論可謂乃心欲佐益時事者也而主者率以常制裁之豈得不使發憤耶二常侍所論或舉其大較而未備其條目亦可便令作之然後主者八座廣共研精凡關言於人主人臣之所至難而人主若不能虚心聽納自古忠臣直士之所慷慨至使杜口結舌毎念如此未嘗不嘆息也故前詔敢有直言勿有所距庻幾得以發矇補過獲保髙位苟言有偏善情在忠益雖文辭有謬誤言語有失得皆當曠然恕之古人猶不距誹謗况皆善意在可採録乎近者孔鼂綦毋龢皆按以輕慢之罪所以皆原欲使四海知區區之朝無諱言之忌也庾峻為諫議大夫常侍是時風俗趣競禮讓陵遲峻上疏曰臣聞黎庻之性人衆而賢寡設官分職則官寡而賢衆為賢衆而多官則妨化以無官而棄賢則廢道是故聖王之御世也因人之性或出或處故有朝廷之士又有山林之士朝廷之士佐主成化猶人之有股肱心膂共為一體也山林之士被褐懐寳太上棲於丘園髙節出於衆庻其次輕爵服逺恥辱以全名最下就列位雖無功而能知止彼其清劭足以抑貪汚退譲足以息鄙事故在朝之士聞其風而悦之将受爵者皆恥躬之不逮斯山林之士避寵之臣所以為美也先王嘉之節雖離世而徳合于主行雖詭朝而功同于政故大者有玉帛之命其次有几杖之禮以厚徳載物出處有地既廊廟多賢才而野人亦不失為君子此先王之𢎞也秦塞斯路利出一官雖有處士之名而無爵列於朝者商君謂之六蝎韓非謂之五蠧時不知徳惟爵是聞故閭閻以公乘侮其鄉人郎中以上爵傲其父兄漢祖反之大暢斯否任蕭曹以天下重四皓於南山以張良之勲而班位在叔孫之後盖公之賤而曹相諮之以政帝王貴徳於上俗亦反本於下故田叔等十人漢廷臣無能岀其右者而未嘗干禄於時以釋之之貴結王生之襪於朝而其名愈重自非主臣尚徳兼愛孰能通天下之志如此其大者乎夫不革百王之蔽徒務救世之政文士競智而務入武夫恃力而爭先官髙矣而其意未滿功報矣而其求不已又國無随才任官之制俗無難進易退之耻位一髙雖無功而不見下已負敗而復見用故因前而升則處士之路塞矣又仕者黜陟無章是以普天之下先競而後讓舉世之士有進而無退大人溺於動俗執政撓於羣言衡石為之失平清濁安可復分昔者先王患嚮之所以取天下者今之為弊是故功成必改其物業定必易其敎雖以爵禄使下臣無貪陵之行雖以甲兵定功主無窮武之悔也臣愚以為古者大夫七十懸車今自非元功國老三司上才可聽七十致仕則士無懐禄之嫌矣其父母八十可聴終養則孝莫大於事親矣吏歴試無績依古終身不仕則官無秕政矣能小而不能大可降還莅小則使人以器矣人主進人以禮退人以義人臣亦量能受爵矣其有孝如王陽臨九折而去官潔如貢禹冠一免而不著及知止如王孫知足如䟽廣雖去列位而居東野與人父言依於慈與人子言依於孝此其出言合於國簡危行彰於本朝去勢如脱屣路人為之隕涕辭寵如金石庸夫為之興行是故先王許之而聖人貴之夫人之性陵上猶水之趨下也益而不已必决升而不已必困始於匹夫行義不敦終於皇輿為之敗績固不可不慎也下人并心進趨上宜以退讓去其甚者退讓不可以刑罰使莫若聴朝士時時從志山林徃徃間出無使入者不能復出徃者不能復反然後出處交泰提衡而立時靡有爭天下可得而化矣石崇為侍中惠帝元康初楊駿輔政大開封賞多樹黨援崇與散騎郎蜀郡何攀共立議奏於帝曰陛下聖徳光被皇靈啟祚正位東宫二十餘年道化宣流萬國歸心今承洪基此乃天授至於班賞行爵優於泰始革命之初不安一也吳㑹僭逆幾於百年邊境被其荼毒朝廷為之旰食先帝决獨斷之聰奮神武之畧蕩滅逋冦易於摧枯然謀臣猛将猶有致思竭力之效而今恩澤之封優於滅吳之功不安二也上天眷佑實在大晋卜世之數莫知其紀今之開制當垂於後若尊卑無差有爵必進數世之後莫非公侯不安三也臣等敢冒陳聞竊謂泰始之初及平吳論功制度名牒皆悉具在縱不能逺遵古典尚當依凖舊事書奏弗納山簡懐帝永嘉中為尚書左僕射領吏部欲令朝臣各舉所知以廣得才之路上疏曰臣以為自古興替實在官人苟得其才則無物不理書言知人則哲惟帝難之唐虞之盛元愷登庸周官之隆濟濟多士秦漢以來風雅漸䘮至於後漢女后臨朝尊官大位出於阿保斯亂之始也是以郭泰許劭之倫明清議於草野陳蕃李固之徒守忠節於朝廷然後君臣名節古今遺典可得而言自初平之元訖於建安之末三十年中萬姓離散死亡畧盡斯亂之極也世祖武皇帝應天順人受禪於魏泰始之初躬親萬機佐命之臣咸皆率職時黄門侍郎王恂庾純始於太極東堂聽政評尚書奏事多論刑獄不論選舉臣以為不先所難而辨其所易陛下初臨萬國人思盡誠毎於聽政之日命公卿大臣先議選舉各言所見後進雋才鄉邑尤異才堪任用者皆以名奏主者随缺先叙是爵人於朝與衆共之之義也朝廷從之胡濟為尚書郎武陵伍朝字世明少有雅操閒居樂道不修世事性好學以博士徴不就荆州刺史劉𢎞薦朝為零陵太守主者以非選例不聴濟奏曰臣以為當今資䘮亂之餘運承百王之遺弊進趨者乘國故以僥倖守道者懐藴匵以終身故令敦褒之化虧退讓之風薄案朝㳺心物外不屑時務守静衡門志道日新年過耳順而所尚不虧誠江南之竒才丘園之逸老也不加飾進何以勸善且白衣為郡前漢有舊宜聴光顯以奨風尚奏可而朝不就卒於家熊逺為散騎常侍元帝中興欲賜諸吏投刺勸進者加位一等百姓投刺者賜司徒吏凡二十餘萬逺以為秦漢因赦賜爵非長制也今按投刺者不獨近者情重逺者情輕可依漢法例賜天下爵於恩為普無偏頗之失可以息簡覈之煩塞巧偽之端帝不從陳頵太興初以白衣兼尚書因陳時務以為昔江外初平中州荒亂故貢舉不試宜漸循舊捜揚隠逸試以經䇿又馬隆孟觀雖岀貧賤勲濟甚大以所不習而統戎事鮮能以濟宜開舉武略任将率者言問核試盡其所能然後随才授任舉十得一猶勝不舉况或十得二三日磾降虜七世内侍繇餘戎狄入為秦相豈藉華宗之族見齒於奔競之流乎宜引幽滯之儁抑華校實則天清地平人神感應温嶠為散騎常侍初為劉琨奉使建業其母崔氏固止之嶠絶裾而去其後母亡嶠阻亂不獲歸葬繇是固譲不拜苦請北歸詔三下八座議其事皆曰昔伍員志復私讎先假諸侯之力東奔闔閭位為上将然後鞭荆王之尸若嶠以母未葬没在胡虜者乃進竭其智謀仰憑皇靈使逆冦氷散及哀墓次豈可稍以乖嫌廢其逺圗哉嶠不得已乃受命范汪為中書侍郎庾翼将悉郢漢之衆以事中原軍次安陵㝷轉屯襄陽汪上疏曰臣伏思安西将軍翼今至襄陽倉卒攻討凡百草創安陸之調不復為㐮陽之用而𤣥冬之月沔漢乾涸皆當魚貫而行推排而進設一處有急勢不相救臣所至慮一也又既至之後桓宣當岀宣徃實翦豺狼之林招携貳之衆待之以至寛御之以無法田疇墾闢生産始立而當移之必有嗷然悔吝難測臣所至慮二也㐮陽頓益數萬口奉師之費皆當岀於江南運漕之難船人之力不可不熟計臣之所至慮三也且申伯之尊而與邊将並驅又東軍不進殊為孤懸兵書云知彼知此百戰不殆知彼不知此一勝一負賊誠衰弊然得臣猶在我雖方隆今實未暇而連兵不觧患難将起臣之所至慮四也翼豈不知兵家所患常在如此顧以門户事任憂責莫大晏安終年非心情所安是以抗表輙行畢命原野以翼宏規經畧文武用命忽遇釁㑹大事便濟然國家之慮常以萬全非至安至審王者不舉臣謂宜嚴詔諭翼還鎮飬鋭以為後圗若少合聖聴乞宻出臣表與車騎臣氷等詳共集議卞壼為尚書令成帝即位皇太后臨朝壼與庾亮對直省中共叅機要時詔南陽樂謨為郡中正潁川庾怡為廷尉評謨怡各稱父命不就壼奏曰人無非父而生職無非事而立有父必有命居職必有悔有家各私其子此為王者無人職不軌物官不立政如此則先聖之言廢五敎之訓塞君臣之道散上下之化替矣樂廣以平夷稱庾珉以忠篤顯受寵聖世身非已有况及後嗣而可專哉所居之職若順夫羣心則戰戍者之父母皆當以命子不以處也若順謨父之意則人皆不為郡中正人倫廢矣順怡父之意人皆不為獄官則刑辟息矣如是者其可聽歟若不可聽何以許謨怡之得稱父命乎此為謨以名父子可以虧法怡是親戚可以自專以此二塗服人示世臣所未悟也宜一切班下不得以私廢公絶其表疏以為永制朝議以為然謨怡不得已各居所職𢎞訥成帝時為尚書郎領軍将軍卞壼與蘇峻戰死二子眕盱亦見害峻平朝議贈壼左光禄大夫加散騎常侍訥議以為死事之臣古今所重卞令忠貞之節當書於竹帛今之追贈實未副衆望謂宜加鼎司之號以旌忠烈之勲司徒王導見議進贈驃騎将軍加侍中訥重議曰夫事親莫大於孝事君莫尚於忠唯孝也故能盡敬竭誠忠也故能見危授命此在三之大節臣子之極行也案壼委質三朝盡規翼亮遭世險難存亡以之受顧托之重居端右之任擁衛至尊則有保傅之恩正色在朝則有匪躬之節賊峻造逆戮力致討身當矢旝再對賊鋒父子并命可謂破家為國守死勤事昔許男疾終猶蒙二等之贈况壼伏節國難者乎夫賞疑從重况在不疑可謂上凖許穆下同嵇紹則允合典謨克厭衆望於是改贈壼侍中驃騎将軍開府儀同三司謚曰忠貞祠以太牢贈世子眕散騎侍郎弟盱奉車都尉孔嚴為尚書左丞哀帝踐阼議所承統時多異議嚴與丹陽尹庾龢議曰順本居正親親不可奪宜繼成皇帝諸儒咸以嚴議為長竟從之王彪之簡文時為吏部尚書時衆官漸多而遷徙每速彪之上議曰為政之道以得賢為急非謂雍容廊廟標的而已故将蒞任賛時職思其憂也得賢之道在於蒞任蒞任之道在於能乆乆於其道而天下成化是以三載考績三考黜陟不收一切之功不採速成之譽故勲格辰極道融四海風流遐邈聲冠百代凡庸之族衆賢能之才寡才寡於世而官多於朝焉得不賢鄙共貫清濁同官官衆則闕多闕多則遷速前後去來更相代補非謂故然理固然耳所以職事未修朝風未澄者也職事之修在於省官朝風之澄在於并職官省則選清而得乆職并則吏簡而俗静選清則勝人乆於其事事乆則中才猶足有成今内外百官較而計之固應有并省者矣六卿之任太常望雅而職重然其所司義髙務約宗正所統盖尠可以并太常宿衛之重二衛任之其次驍騎左軍各有所領無兵軍校皆應罷廢四軍皆罷則左軍之名不宜獨立宜改㳺擊以對驍騎内官自侍中以下舊員皆四中興之初二人而已二人對直或有不周愚請三人於其事則無闕也凡餘諸官無綜事實者可令大官随才任所帖而領之若未能頓廢自可因缺而省之委之以職分責之以有成能否因考績而著清濁随黜陟而彰雖雍熈之隆康哉之歌未洽可使庻官之選差清蒞職之日差乆無俸禄之虚費簡吏寺之煩役矣永和末多疾疫舊制朝臣家有時疾染易三人以上者身雖無疾百日不入宮至是百官多列家疾不入彪之又言疾疫之年家無不染若以之不復入宫則直侍頓闕王者宫省空矣朝廷從之王獻之孝武時為中書令時謝安薨贈禮有同異之議惟獻之與徐邈共明安之忠勲獻之乃上疏曰故太傅臣安少振𤣥風道譽洋溢弱冠遐棲則契齊箕皓應運釋褐而王猷允塞及至載宣威靈彊猾消殄功勲既融投黻髙譲且服事先帝眷隆布衣陛下踐阼陽秋尚富盡心竭智以輔聖明考其潜躍始終事情繾綣實大晋之雋輔義篤於曩臣矣伏惟陛下留心宗臣澄神於省察孝武帝遂加安殊禮册府元龜卷四百七十
