body:
  text: 册府元龜卷三百三宋王欽若等撰外戚部褒寵夫創業之君守文之主或奉長樂有昊天之感或念榆秋有闗雎之助故崇其外戚示之寵賁或引年而錫之駟馬或數日而累夫千金至於五侯並封九卿絶席家藏金穴出乗緑車屢讌飲於府第俾光震於都鄙其或性藴謙和心知止足既在舒而能卷終以榮而為懼則庶可以全其宗族終以牖下若彌肆貪叨昧失徳義罔知畏夫天命卒相繼於覆轍者蓋比比有之著於簡編定為龜鑑周申伯宣王之舅也王使申伯居謝故崧高之詩曰往近王舅南土是保近辭也聲如彼記之子之記申伯信邁王餞于郿郿地名邁行也申伯之意不欲離王室王告語之復重於是意解而信行餞送行飲酒也時王省岐周故於郿云申伯還南謝于誠歸還南者北就王命于岐周而還反也謝于誠歸誠歸于謝漢衞青姊子夫武帝建元二年入宫得幸帝召青為建章監侍中及母昆弟貴賞賜數日間累千金霍去病衞皇后姊少兒子也為驃騎將軍兀狩六年薨帝悼之發屬國𤣥甲軍陳自長安至茂陵為冢象祁連山史高衞太子史良娣兄子也宣帝時為大司馬車騎將軍領尚書事元帝襲尊號高輔政五年乞骸骨賜安車駟馬黄金罷就第史丹高子也元帝為太子丹為中庶子帝即位累遷左將軍光禄大夫丹以舊恩數見褒賞賜累千金僮奴以百數永始中病乞骸骨帝賜䇿曰左將軍寢病不衰願歸治疾朕愍以官職之事久留將軍使躬不瘳使光禄勲賜將軍黄金五十斤安車駟馬及上將軍印綬宜専精神務近醫藥以輔不衰丹歸第數日薨王鳳成帝舅也為大將軍鳳薨帝臨弔贈寵送以輕車介士軍陳自長安至渭陵許嘉女為成帝后自元帝時為大司馬車騎將軍輔政八九年成帝立欲專委任元舅王鳳廼策嘉曰將軍家重身尊不宜以吏職自累賜黄金二百斤以特進侯就朝位許后廢後帝憐許氏下詔曰蓋聞仁不遺逺誼不忘親前平安剛侯夫人謁坐大逆罪家屬幸蒙赦令歸故郡朕惟平恩戴侯先帝外祖魂神廢棄莫奉祭祀念之未嘗忘于心其還平恩侯旦及親屬在山陽郡者王莽孝元皇后弟子也為大司馬哀帝立免就第公卿大夫多稱之者帝乃加恩寵置使家中黄門使黄門在其家中為使令十日一賜餐下詔曰新都侯莽憂勞國家執義堅固朕庶幾與為共治太后詔莽就第朕甚憫焉其以黄郵聚戸三百五十益封黄郵在南陽棘陽縣位特進給事中朝朔望見音現禮如三公見天子之禮也車駕乗緑車從後漢樊宏光武之舅也光武即位拜光禄大夫位特進次三公每當朝㑹輒迎期先到俯伏待事時至乃起帝聞之常賜騶騎臨朝乃告勿令豫到宏卒賻錢千萬布萬疋諡為恭侯贈以印綬車駕親送葬子鯈嗣帝悼宏不已復封少子茂為平望侯明年賜鯈弟鮪及從昆弟七人各錢五千萬儵謹訥有父風事後母至孝及母卒哀思過禮毁病不自支光武常遣中黄門朝暮送饘粥張況族姊為皇祖考夫人數往來南頓見光武光武為大司馬過邯鄲况為郡吏謁見光武光武大喜曰乃今得我舅乎因與俱北到高邑以為元氏令遷涿郡太守時年八十不任兵馬上疏乞身詔許之後詔問起居何如子歆對曰如故詔曰家人居不足贍且以一縣自養復以况為常山闗長郭況光武郭后弟也更始二年光武擊王郎至真定因納后有寵后即真定王劉楊之甥也帝納后以結之廼與楊及諸將置酒郭氏漆里舍漆里即郭后所居之里名也楊擊筑為歡后弟況十六為黄門侍郎建武十七年后廢為中山太后二十六年后母郭主薨帝親臨喪送葬百官大㑹遣使者迎父昌喪柩與主合葬追贈昌陽安侯印綬諡曰思侯二十八年帝憐郭氏詔況子璜尚淯陽公主除璜為郎遷大鴻臚帝數幸其第㑹公卿諸侯況家飲讌賞賜金錢縑帛豐盛莫比京師號況家金穴明帝即位況與帝舅陰識陰就並為特進數受賞賜恩寵俱渥禮待陰郭每事必均永平二年況卒贈賜甚厚帝親自臨喪永和三年章帝北巡狩過真定㑹諸郭朝見上夀引入倡飲甚歡說文曰倡樂也聲類曰俳以太牢具上郭主冢賜粟萬斛錢五十萬陰陸光武光烈陰后之父后初為貴人建武九年有盜刼殺后母鄧氏及弟訢帝甚傷之乃詔大司空曰吾微賤之時娶於陰氏因將兵征伐遂各離别幸得全安俱脫虎口以貴人有母儀之徳宜立為后而固辭弗敢當列於媵妾朕嘉其義讓許封諸弟未及爵土而遭患逢禍母子同命愍傷于懐小雅曰將恐將懼惟予與汝將安將樂汝轉棄予風人之戒可不慎乎其追爵諡貴人父陸為宣恩哀侯弟訢為宣義恭侯以弟就嗣哀侯鄧晨南陽新野人娶光武姊元漢兵起元先遇害光武即位晨為偏將軍感姊沒於亂兵追封元為新野節義公主立廟於南陽縣西封晨子汎為吳房侯以奉公主之祀建武三年徴晨還京師數燕見說故舊平生為歡十八年行幸章陵以晨行廷尉事從至新野置酒酣讌賞賜數百千萬二十五年卒詔遣中謁者備公主官屬禮儀招迎新野主魂與晨合葬於北邙乗輿與中宫親臨喪送葬李通南陽宛人尚光武女弟寧平公主建武六年引拜大司空通布衣唱義助成大業重以寧平公主故特見親寵然素有消疾自為宰相謝病不視事連年乞骸骨帝每優寵之令以公位歸第養疾光武每幸南陽常遣使者以太牢祠通父冢十八年卒帝及皇后親臨弔送永平中明帝幸宛詔諸李隨安衆安衆侯劉崇後也宗室㑹見並受賞賜恩寵篤焉馬廖明徳馬后之兄章帝甚尊重之建初四年以特進侯就第永元四年卒和帝以廖先帝之舅厚加賜贈使者弔祭王主㑹喪馬防廖弟也永平為車騎將軍城門校尉貴寵最盛與九卿絶席屢表辭位以特進就第尋拜光禄勲防子鉅為常從小侯以小侯得常從也以鉅當冠特拜為黄門侍郎明帝親御章臺下殿陳鼎爼自臨冠之明年復以病乞骸骨詔賜中山王田廬以特進就第馬嚴明徳皇后父援之兄子也明帝召見詔留仁夀闥常與宗室近親論議政事甚見寵幸拜御史中丞除子鱄為郎令勸學省中前書王鳳薦班伯於成帝宜勸學召見宴殿是也鄧衍為新野功曹永平初以外戚小侯每豫朝㑹而容姿趨步有出於衆明帝目之顧左右曰朕之儀貌豈若此人特賜輿馬衣服竇憲女弟為章帝皇后憲與弟篤兄弟親幸並侍宫省賞賜累積寵貴日盛鄧騭和熹皇后之兄也殤帝延平元年率兵擊凉部叛羌西屯漢陽徴騭班師朝廷以太后故遣五官中郎將迎拜騭為大將軍軍到河南使大鴻臚迎中常侍齎牛酒郊勞王侯以下候望於道既至大㑹羣臣賜帛乗馬寵靈顯赫光震都鄙梁竦二女皆為章帝貴人生和帝永元九年梁松子扈遣從兄䄠奏記三府以為漢家舊典崇貴母氏而梁貴人親育聖躬不蒙尊號求得申議太尉張酺引䄠訊問事理㑹後召見因白䄠奏記之狀帝感慟良久曰以君意若何酺對曰春秋之義母以子貴漢興以來母氏莫不隆顯臣愚以為宜上尊號追慰親靈存録諸舅以明親親帝悲泣曰非君孰為朕思之㑹貴人姊南陽樊調妻嫕嫕音於訃切上書自訟曰妾同産女弟貴人前充後宫蒙先帝厚恩得見寵幸皇天授命誕生聖明而為竇憲兄弟所見譖訴使妾父竦寃死牢獄骸骨不掩老母孤弟逺徙萬里獨妾遺脫逸伏草野常恐沒命無由自達今遭值陛下神聖之運親統萬機羣物得所憲兄弟姦惡既伏辜誅海内曠然各獲其宜妾得蘇息拭目更視乃敢昧死自陳於天妾聞太宗即位薄氏蒙榮宣帝繼統史族復興妾門雖有薄史之親獨無外戚餘恩誠自悼傷妾父既寃不可復生母氏年殊七十及弟棠等逺在絶域不知死生願乞收竦朽骨使母弟得歸本郡則施過天地存沒幸賴帝覽章感悟乃下中常侍掖廷令驗問之嫕辭証明審遂得引見具陳其狀乃留嫕止宫中連月乃出賞賜衣被錢帛第宅奴婢旬月之間累資千萬嫕素有行操帝益愛之加號梁夫人擢樊調為羽林左監復詔三公大鴻臚曰夫孝莫大於尊尊親親其義一也詩云父兮生我母兮鞠我撫我畜我長我育我顧我復我出入腹我欲報之徳昊天罔極朕不敢興事覽於前世中宗太宗實有舊典追命外祖以篤親親其追封諡皇太后父竦為褒親愍侯比靈文順成恩成侯魂而有靈嘉斯寵榮好爵顯服以慰母心遣中謁者與嫕及扈備禮西迎竦䘮詣京師改殯賜東園畫棺玉匣衣衾建塋於恭懐皇后陵傍帝親臨送葬百官畢㑹徴還竦妻子諸子封侯位皆特進賞賜第宅奴婢車馬兵弩什物以巨萬計寵遇光於當世諸梁内外親疎並補郎謁者馮魴孫石襲母獲嘉長公主封獲嘉侯亦為侍中稍遷衞尉能取恱當世為安帝所寵帝常幸其府留飲十許日賜駁犀具劍佩刀紫艾綬玉玦各一拜子世為黄門侍郎世弟二人皆中郎自永初兵荒王侯租稅多不充於是特詔以它縣租稅足石令如舊限歳入榖三萬斛錢四萬梁商女為順帝皇后商為大將軍卒朝廷賜以東園朱夀之器銀鏤黄玉匣什物二十八種錢二百萬布三千匹皇后錢五百萬布萬疋及葬贈輕車介士賜諡忠侯中宫親送帝幸宣陽亭瞻望車騎初帝作誄曰孰云忠侯不聞其音背去國家都兹𤣥陰幽居㝠㝠靡所宜窮者也梁冀商之子也元嘉元年桓帝以冀有援立之功欲崇殊典乃大㑹公卿共議其禮於是有司奏冀入朝不趨劍履上殿謁贊不名禮儀比蕭何悉以定陶陽城餘户增封為四縣比鄧禹賞賜金錢奴婢彩帛車馬衣服甲第比霍光以殊元勲每朝㑹與三公絶席十日一入平尚書事宣布天下為萬世法冀猶以所奏禮薄意不恱王斌女弟為靈帝美人生獻帝為何皇后所酖殺獻帝即位求斌斌將妻子詣長安賜第宅田業拜奉車都尉遷執金吾封都亭侯病卒贈前將軍印綬謁者監䕶喪事魏卞秉武宣皇太后弟也當建安時為别部司馬文帝為秉起第第成太后幸第請諸家外親毛嘉明帝悼后之父也帝以嘉為奉車都尉嘉子曾為騎都尉寵賜隆渥帝令朝臣㑹其家宴飲晉羊琇景獻皇后從父弟為散騎常侍琇卒武帝手詔曰琇與朕有先后之親少小之恩厯位外内忠允茂著不幸早薨朕甚悼之其追贈輔國大將軍開府儀同三司賜東園秘器朝服一襲錢三十萬布百疋宋徐湛之父逵之尚高祖長女㑹稽公主討司馬休之見害湛之幼孤為高祖所愛常與江夏王義恭寢食不離於側位至尚書令臧質武敬皇后弟子也為義興太守元嘉二十六年文帝謁京陵質朝丹徒上禮帝設讌盡歡賜布千疋路瓊之孝武帝母路太后弟子也大明中瓊之及弟休之茂之並超顯位太后賜與瓊之等財物家累千金居處服器與帝子相侔瓊之終衡陽内史南齊何瑀尚高祖少女豫章公主公主與瑀情愛隆密何氏外姻疎戚莫不霑被恩紀厯位清顯王繢女適武帝寵子安陸王子敬永明三年納妃修外舅姑之敬武帝遣文惠太子相隨往繢家置酒設樂公卿皆冠冕而至當世榮之何戢為撫軍將軍欝林王妃父也王即位妃為后迎后親戚入宫賞賜人百數十萬梁張𢎞籍高祖舅也高祖即位詔曰亡舅齊鎮西參軍風素雅亮夙肩名輩降年不永早世潛輝朕少罹苦辛情地彌切雖宅相克成輅車靡贈興言永往觸目慟心可追贈廷尉卿張𢎞䇿文獻皇后從父弟從高祖平建康累遷衞尉卿為東昏餘黨所害詔曰亡從舅衞尉慮發所忽殞身妖豎其情理清貞器識淹濟自藩升朝契濶夷阻加以外氏彫衰饗嘗屢絶興感渭陽情寄斯在方賴忠勲翼宣寡薄報效無徴永言增嘆可贈散騎常侍車騎將軍給皷吹一部諡曰愍王錫義興公主子也為太子洗馬時昭明尚幼未與臣寮相接高祖嘗勅昭明曰太子洗馬王錫秘書郎張纘纘𢎞䇿子也親表英華朝中髦俊可以師友事之中大通六年卒年三十六贈侍中給東園秘器朝服一襲陳沈君理為吏部尚書女為皇太子妃宣帝太建五年為右僕射有疾車駕親臨視卒贈侍中太子少傅喪事所須隨由資給太子立為後主妃為后宗族多有顯官張種為紫金光禄大夫太建初女為始興王妃以居處僻陋特賜宅一區又累賜無錫嘉興縣侯秩柳莊後主從舅也為右衞將軍兼中書舍人太后弟盼卒後太后宗屬唯莊為近由是深被恩遇後魏杜超明元密皇后之兄始光中太武追念舅氏封超平陽公尚南安長公主拜駙馬都尉車駕幸其第賞賜巨萬又追加超父豹鎮東大將軍陽平景王母曰鉅鹿惠君真君五年超為帳下所害太武臨其喪哀慟者久之諡曰威王子鳳皇襲超爵加侍中特進太武追思超不已欲以鳳皇為定州刺史鳳皇不願違離闕庭乃止姚黄睂明元昭哀皇后之弟又尚陽翟公主累拜太常卿卒贈雍州刺史隴西郡王諡曰獻黄睂寛和溫厚希言得失太武惜悼之故贈有加禮馮熙文明太后之兄也後孝文又納其女為后詔曰白虎通云王所不臣數有三焉妻之父母抑言其一此所謂供承宗廟不欲奪私心然吾季著於春秋無臣證於往諜既許通體之一用開至尊之敬比長秋配極陰政既敷未聞有司陳奏斯式可詔太師輟臣從禮又勒集書造儀付外孝文前後納熙三女二為后一為左昭儀由是馮氏寵貴益隆賞賜累巨萬孝文毎詔熙上書不臣入朝不拜熙後遇疾綿寢四載詔遣醫問道路相望車駕亦數幸焉將遷雒孝文親與别見其困篤歔欷流涕密敕宕昌公王遇太師萬一即可監䕶喪事十九年薨於代車駕在淮南留臺表聞還至徐州乃舉哀為制緦服詔有司豫辦凶儀并開魏京之墓令公主之柩俱向伊雒凡所營送皆公家為備又勅代給綵帛前後六千疋以供凶用皇后詣代都赴哭太子恂亦赴代哭弔將葬贈假黄鉞侍中都督十州諸軍事大司馬太尉冀州刺史加黄屋左纛備九錫前後羽葆鼓吹皆依晉太宰安平獻王故事有司奏諡詔曰可以威强恢逺曰武奉諡於公柩至七里澗孝文服緦往迎叩靈悲慟而拜焉葬日送臨墓所親作誌銘熙子誕與孝文同歳幼侍書學後除侍中都督中外諸軍事中軍將軍特進改封長樂郡公誕拜官孝文立於廷遥受其拜既訖還室楊播母文明太后之外姑也播為中散累遷給事領中起部曹以外親優賜亟加前後萬計陸昕之尚獻文女常山公主拜駙馬都尉昕之容貌柔謹孝文以其主壻特垂昵眷宣武時年未四十頻撫三蕃當世以此榮之鄭羲女為孝文嬪徴為秘書監太和十六年卒賜帛五百疋高肇文昭皇太后之兄也肇父颺厲威將軍既卒宣武追思舅氏徴肇兄弟等録尚書事北海王詳等奏颺宜贈左光禄大夫賜爵渤海公諡曰敬封肇平原郡公肇弟顯澄城郡公引見於華林都亭皆甚惶懼舉動失儀數日之間富貴赫奕胡國珍靈太后之父也封安定郡公進位中書監儀同三司侍中如故賜絹歳八百疋妻梁四百疋男女姊妹各有差仍詔依漢車千秋晉安平王故事給步挽一乗自掖門至於宣光殿得以出入並備几杖李延寔為左將軍光州刺史莊帝即位以元舅之尊超授侍中太保封濮陽郡王延寔以太保犯祖諱又以王爵非庶姓所宜抗表固辭徙封濮陽郡公改授太傅李遵孝武初以外戚超贈車騎大將軍儀同三司定州刺史蕭贊尚莊帝女夀陽長公主為齊州刺史為城民趙雒周所逐公主被録還京贊未幾卒節閔普泰末勅迎其喪至雒遣黄門郎鹿悆䕶喪事以王禮與公主合葬嵩山鄭伯猷為散騎常侍東平將軍前廢帝初以舅氏超授征東將軍金紫光禄大夫領國子祭酒胡虔國珍之孫也為司空孝靜興和中薨贈太傅太尉公尚書僕射徐州刺史葬日百官㑹葬乗輿送於郭外羅鑒為散騎常侍金紫光禄大夫主衣都統卒孝靜以外戚故贈侍中冀定瀛三州諸軍事尚書右僕射司空公衞將軍冀州刺史後周李弼子暉尚文帝女義安長公主故遂以為嗣暉初贈爵義城郡公嘗臥疾朞年文帝憂之賜錢一千萬供其藥石之費隋吕雙周高祖外祖也其族蓋微平齊之後求訪不知所在至開皇初濟南郡上言有男子吕永吉自稱有姑字若桃嫁為楊忠妻勘驗知是舅子始追贈雙周為上柱國太尉八州諸軍事青州刺史封齊郡公諡曰敬外祖母姚氏為齊敬公夫人詔並改葬於齊州立廟置守冢十家以永吉襲爵在京師獨孤羅文獻皇后之兄信之長子高祖為丞相儀同常置左右既受禪下詔追贈羅父信官爵曰褒徳累行往代通規追逺慎終前王盛典故柱國信風宇高曠獨秀生民睿哲居宗清猷映世宏謀長䇿道著於弼諧緯義經仁事深於拯濟方當宣風廊廟亮采台階而運屬艱危功高不賞睠言令範事切於心今景運初開椒闈肅建載懐塗山之義無忘褒紀之典可贈太師上柱國冀定等十州刺史趙國公邑萬户其諸弟以羅母沒齊先無夫人之號不當承襲帝以問后后曰羅誠嫡長不可誣也於是襲爵趙國公諸弟皆封郡公豆盧勣為夏州總管文帝以其家貴盛勲效克彰後為漢王諒納其女為妃恩遇彌厚七年追守利州功詔食始州臨津縣邑千户獨孤陁信之第四子煬帝即位追念舅氏聽以禮葬乃下詔曰外氏衰弱獨孤陁不幸謝世遷卜有期言念渭陽之情追懐傷切宜遵禮命允備哀榮可贈正議大夫帝意猶不滿復下詔曰舅氏之尊戚屬斯重而降年弗永彫落相繼緬維先往宜崇徽秩復贈銀青光禄大夫竇榮定初仕周為佽飛中郎將其妻則高祖姊安成長公主也帝作相拜為雒州總管留後賜縑千疋西涼女樂一部帝受禪來朝京師帝顧謂羣臣曰朕少惡輕薄性相近者止榮定而已賜馬三百匹部曲八十二人而旌之坐事除名帝以長公主之故猶拜右武侯大將軍數幸其第恩賜甚厚每令尚食局日供羊一口珍味稱是後為秦州總管賜吳樂一部前後賞賜不可勝計開皇六年卒帝為之廢朝令左衞大將軍元旻監䕶喪事賻絹三千疋帝謂侍臣曰吾每欲致榮定於三事其人固讓不可今欲贈之重違其志於是贈冀州刺史陳國公豆盧通尚高祖妹昌樂長公主自是恩禮漸隆遷夏州總管洪州總管柳述冀州刺史機子也以父䕃為太子親衛開皇中尚蘭陵公主述於諸壻中高祖特所寵敬歳餘判兵部尚書事李敏妻髙祖樂平公主女敏厯金邠華岐數州刺史多不蒞職常留京師往來宫内侍遊宴賞賜超于功臣大業初補衞尉卿樂平公主將薨遺言於煬帝曰妾惟一女不自憂死深憐之湯沐乞迴與敏帝從之獨孤懐恩者父為涿郡太守高祖以其獻皇后之姪養於宫中蕭琮自江陵入朝賜爵莒國公煬帝以皇后之故甚見親重琮族緦麻以上並隨才擢用於是諸蕭昆弟布列朝廷唐竇抗隋陳國公榮定子太穆皇后之從兄其母隋高祖姊也父卒之後高祖恩遇彌隆所賜錢帛金寳亦以巨萬武徳初歸長安高祖見之恱握手命坐曰李氏竟能成事何如抗舞蹈奉賀因縱酒為樂累遷納言帝每臨朝常引與坐退朝之後延入臥内命之捨敬縱酒談謔敦平生之欵常侍宴私時或留宿禁内帝常呼之為兄而不名也内人咸稱為舅其見親如此初平東都册勲太廟者九人抗與弟軌俱預焉論者榮之賜女樂一部金寶萬計竇威太穆皇后從兄也武徳初為内史令高祖甚親重之每引入臥内常為膝席又常謂之曰昔周朝有八柱國之貴吾與公家咸登此職今我為天子卿為内史令本同而末異無乃不可乎威拜謝曰臣家昔在漢朝再為外戚至於後魏三處外家陛下龍興復出皇后臣又階恩澤位忝鳳池自唯叨濫伏深悚息帝大笑曰公三后族欲誇我耶闗東人與崔盧為婚猶自矜伐公世為帝戚豈非盛事裴𢎞䇿仕隨為將作大匠卒武徳初追贈𢎞䇿工部尚書黎國公䇿妻竇太穆皇后妹也以舊姻贈焉長孫敞文徳皇后叔父也義旗初建率子弟起於新豐後為巴州刺史後坐事免太宗以后親常令内給絹以供私費及致仕卒諡曰良陪葬昭陵蕭瑀為内史令高祖每臨軒聽政必賜升御榻瑀既獨孤氏之壻帝與語呼之為蕭郎長孫無忌文徳皇后兄也太宗即位為吏部尚書帝以其佐命元勲地兼外戚禮遇尤重常出入臥内密與謀議又嘗作威鳳賦以賜之貞觀十二年十二月又幸其第睦勲戚也高宗即位以無忌為太尉同中書門下三品既當元舅之任高宗每事皆諮禀之賞賜優寵近古無比又令圖無忌形像親為書贊房遺愛司空𤣥齡第二子也以功臣子弟尚高陽公主有寵禮命與諸婿絶異獨孤開逺元貞皇后兄子也為左衞將軍卒太宗登苑西樓臨送開逺之葬楊師道尚桂陽公主為太常卿駙馬都尉安徳郡公卒贈吏部尚書荆州都督賜東園秘器陪葬昭陵并為立碑武士彠高宗皇后父也顯慶四年三月甲申故荆州都督贈司徒周定公士彠配享高祖廟庭賜其家魏州實封一千戸總章元年又詔贈司徒荆州都督忠孝公士彠並諸功臣時皇后欲褒隆其父故并贈功臣咸亨元年九月甲申后母衞國夫人楊氏薨贈魯國太夫人諡曰忠烈司刑太常伯盧承慶攝同文正卿充使監䕶西臺侍郎戴至徳持節弔祭命文武九品以上及親戚五等以上并外命婦並聽赴宅弔哭葬及墳塋鹵簿等一事已上並依王禮給班劍四十人羽葆皷吹儀仗送至墓所往還其文武官九品以上並至渭橋宿次外婦諸親婦女並送至墓所官為立碑仍令特進許敬宗為其文壬辰皇后請為夫人度太平公主出家為女官并請頒政坊民置女官觀休祥坊宅置僧寺兼各度人追福並從之閏九月壬子又詔故工部尚書贈司徒周忠孝公士彠加贈太尉兼太子太師太原郡王魯國忠烈大夫人加贈太原郡王妃所司備禮册命韋𤣥貞中宗皇后父也為豫州刺史卒神龍元年追贈上雒郡王左拾遺賈虚己諫之疏不納九月詔令改葬𤣥貞其儀准太后父太原王故事初帝遷於房陵𤣥貞坐配流欽州死后母崔氏為欽州首領寗承基兄弟所殺𤣥貞有四子洵浩洞泚等時亦死於容州至是制遣使迎𤣥貞及崔氏喪柩歸於京師贈賻甚厚又遣廣州都督周仁軌率兵二萬斬討寗承基兄弟以其首祭崔氏墓又追贈洵吏部尚書汝南郡王浩太常卿武陵郡王洞衞尉淮陽郡王泚太僕卿上蔡郡王亦遣使迎其喪柩歸葬於京師及將至帝與后幸長樂宫望喪而泣是年又以安車備禮徴安平郡王武攸緒攸緒則天之兄子隱於嵩山積十餘年至是徴之攸緒至擢授太子賔客仍聽其還山二年四月又改贈𤣥貞為豐王仍號廟曰褒徳陵曰榮光仍各置官員并給戸一百人守衞灑掃五月再追贈𤣥貞為太師雍州牧并益州大都督伯父贈太常卿𤣥儼為特進荆州大都督封魯國公追封從祖伯父十餘人皆為上州刺史仍贈爵郡公竇希瓘𤣥宗舅也希瓘後名􅞓音曳開元初甚見優寵兄弟三人皆封國公帝以早失太后尤寵之恩錫之盛朝夕相繼天寳七載詔曰睦親之義因心不忘前開府儀同三司竇􅞓頃以容納微人頗虧典憲永懐舅氏追感渭陽宜伸國恩再復榮秩可開府儀同三司仍放優閑不須朝㑹卒贈司徒竇希瑊希瓘兄也開元二年自光禄卿授太子少傅詔光禄造食公卿送上以外戚優其禮也開元五年薨輟朝三日贈司空兼荆州大都督賻物八百段米粟八百石賜東園秘器凶事葬事並官供務從優厚仍令將作大匠韋湊充使監䕶河南少尹秦守一為副鴻臚少卿李顒持節充使齎璽書弔祭儀仗送至墓所官為立碑竇希玠希瑊弟也為開府儀同三司華國公開元二年薨帝悼之下制曰存有其榮歿有其贈古之典也希玠有賢戚之美登台階之秩冀其永年俾作元老不幸薨逝用震悼於厥心可贈尚書左丞相王仁皎為開府儀同三司初𤣥宗在藩聘仁皎女為妃及嗣位妃為皇后仁皎以后父之重不參朝政承厚賜賚善自奉養開元七年卒帝親為舉哀輟朝三日贈太尉益州都督制曰在昔王者旌賢睦姻莫不存貴寵光歿加禮冊故開府儀同三司王仁皎神仙望族禮樂通材履道純粹執心夷簡自大邦有子中闈作合以外舅之勞參上公之位績宣揚厯誠著始終方保期頥遽從薨落興言震悼用惻于懐宜依常典式慰塋魂可贈益州大都尉贈物三千段米粟二千石喪葬事並官供務從優厚仍賜東園秘器宜令銀青光禄大夫守工部尚書上柱國彭城郡開國侯劉知柔攝鴻臚卿監䕶通議大夫行京兆尹上䕶軍崔琬為副銀青光禄大夫守太子詹事上柱國安南縣開國侯龎承宗持節齎書弔祭左庶子上䕶軍白知慎為副在京五品已上官更須就弔官為立碑命張說為其文親書石焉薛談尚𤣥宗女常山公主拜駙馬都尉卒贈光禄卿賻物一百段粟一百石官給葬事仍令京兆尹充監䕶使張垍尚𤣥宗女寧親公主又尚信興公主為翰林學士以主壻帝特深寵異許於禁中置内宅侍為文章賞賜珍玩不可勝數時兄均亦供奉翰林院常以所賜示均均戲謂曰此婦翁與女婿非天子賜學士也姜慶初尚新平公主拜駙馬都尉新平𤣥宗之女也敏慧習文墨帝賢之諸主中恩禮加重慶初由是承恩駙馬都尉鮮有授正員官者慶初特拜太常卿先是宗正寺奉陵廟慶初以恩幸太常復奉園陵獨孤頴為左威將軍録事參軍卒大厯三年追贈工部尚書頴代宗貴妃之父也將册貴妃乃加寵焉王延昌為吏部侍郎卒大厯四年追贈吏部尚書特賜賻絹一百疋布五十疋延昌妻獨孤氏貴妃之姑也是用加等郭曖汾陽郡王子儀第六子也十餘歳尚代宗第四女昇平公主時昇平年亦與曖相類大厯中恩寵冠於戚里歳時錫賚珍玩不可勝紀曖子昭以外孫故亦恩寵特異柳晟駙馬都尉潭之子母肅宗女和政公主晟少無檢操代宗於諸甥之中特加奬遇俾讀詩書與皇太子諸王同處親寵之盛貴戚無比授試太常卿沈令瑶代宗外叔祖也累官至涇傅集賢侍典舊勲齊列大厯八年卒輟朝三日帝追悼優詔贈太子少保父易直先贈秘書監徳宗建中元年七月癸丑贈太師故庫部員外沈介福贈太傅故徳州刺史沈士衡贈太保易直睿真皇后之父帝外祖也介福易直之父也士衡介福之父也秘書少監沈震贈太尉易直之子也沈氏贈三公保傅僕射尚書已上諸官及封邑者百餘人王遇昭徳皇后父也貞元三年贈揚州大都督賜布絹四百段米粟三百石葬事一切官給遇子睂州司馬果及甥姪等進官者二十餘人田季安為魏博節度使季安代宗女嘉誠公主子也徳宗優之比河朔諸鎮為厚沈蟻尚憲宗女宣城公主拜駙馬都尉敬宗寳厯元年十二月賜蟻錢一萬并城南别墅昌化坊賈區各一所郭環為殿中少監寳厯二年二月賜環宅一區以才人將立為貴妃故寵異其兄也五月帝御宣和殿封環等諸親蕭洪文宗皇太后弟也太和二年十月賜絹五百疋錢三百千米粟一百石後唐孟知祥為太原節度使同光三年冬蜀平十二月制以知祥依前檢校太傅同平章事充劒南西川節度副大使知節度事閏月己丑知祥自太原奉詔馳騎入雒莊宗以知祥戚里之重預戒所司出内府供帳珍玩竒絶者别設宫居以宴之酒酣追思平昔事因曰吾輩老矣繼岌乳臭兒今年代父破賊平定西川慰喜之外復增悲耳吾憶先帝棄代時疆境為賊所侵僅保一隅之地豈知今日君臨天下竒珍異器畢萃吾府卿為吾姻可得而言因指閱珠玉器服以示知祥又曰蜀土奢華富盛不異吾宫以卿戚里忠賢故以相付卿其勉之因令中使王允平就賜節鉞官誥晉張從訓初為徳州刺史高祖之鎮太原也為少帝娶從訓長女為妃從訓清泰初授唐州刺史三年高祖舉義從訓奉唐末帝詔徴赴行在分領鄉兵次於團柏谷兵敗宵遁潛身民間高祖入雒有詔搜訪月餘乃出焉及見以戚里之故深加軫惻尋授唐州刺史周符昭信魏王彦卿之子世宗皇后之弟也為天雄軍衞内都指揮使顯徳元年七月卒皇后於别宫舉哀宰臣率文武百僚於門進名奉慰册府元龜卷三百三
