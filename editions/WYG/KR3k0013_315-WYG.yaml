body:
  text: 冊府元龜卷三百十五宋王欽若等撰宰輔部公忠詩曰我心匪石不可轉也傳曰死而利國猶或為之公忠之謂矣盖䇿名委質抱公滅私臣之道也憂國忘家有死無貳臣之節也若乃居丞宰之重裁邦國之政而能義均休戚節貫屯夷至公以滅私純心而無驕彌綸闕漏啓納而盡忠扶持顛危周旋而匪懈中立之操至累而益眀悃欵之誠難至而易見宣股肱之力為社稷之臣亦何代無其人哉自非眀允篤誠經徳秉哲服膺善道不為利疚者孰能與於斯邪殷伊尹為相帝太甲既立三年不眀暴虐不遵湯法亂徳於是伊尹放之於桐宫地名有王離宫焉三年伊尹攝政事當國以朝諸侯太甲居桐宫三年悔過自責反善於是伊尹乃迎太甲而授之政太甲修徳諸侯咸歸殷百姓以寜伊尹嘉之迺作太甲訓三篇褒帝太甲稱太宗伊陟為相時殷道衰諸侯或不至太戊立伊陟贊言於巫咸賛告也巫咸臣名也巫咸治王家有成殷復興諸侯歸之故稱中宗周公旦佐武王克商二年天下未集武王有疾不豫羣臣懼太公召公乃穆卜周公曰未可以戚我先王戚近也未可以死近先王也又曰二公就文王廟卜戚憂也未可憂怖我先王也周公於是乃自以為質設三壇周公北靣立戴璧秉圭璧以禮神圭以為贄告於太王王季告謂祝辭史䇿祝史為䇿祝詞也又曰䇿周公所作謂簡書也祝者讀此簡書以告三王曰惟爾元孫王發勤勞阻疾阻一作淹若爾三王是有丕子之責於天以旦代王發之身丕子之責謂疾不可救也不可救于天則當以旦代之死生有命不可請代聖人叙臣子之心以垂世教旦巧能多材多藝能事鬼神言可以代武王之意乃王發不如旦多技多藝不能事鬼神乃命于帝庭敷佑四方武王受命於天帝之庭布其道以佑助四方用能定汝子孫于下地四方之民罔不敬畏言武王用受命帝庭之故故能定先人子孫于天下四方之民無不敬畏也無墜天之降保命我先王亦永有依歸言不救則墜寳命保救之則先王上有依歸矣降墜也寳猶主也有所依歸為宗廟之主也今我其即命於元龜就受三王之命於元龜大卜知吉㓙者也元龜大龜也爾之許我我其以璧與圭歸以俟爾命許謂疾瘳待命當以事神也待汝命武王當愈我當死也爾不許我我乃屏璧與圭不許不愈也屏蔵言不得事神周公已令史䇿告太王王季文王欲代武王發於是乃即三王而卜卜人皆曰吉發書視之信吉卜兆書也周公喜開籥乃見書遇吉籥蔵占兆書管也周公入賀武王曰王其無害旦新受命三王維長終是圖我新受三王命武王維長終是謀周之道兹道能念予一人一人天子也兹比也周公蔵其䇿金縢匱中藏之于匱緘之以金不欲人開也誡守者勿敢言眀日武王有瘳周公卒後秋未穫暴風雷雨禾盡偃大木将㧞周國大恐成王與大夫朝服以開金縢書王乃得周公所自以為功代武王之説一作簡所藏請命䇿書本也二公及王乃問史百執事二公及王啓之故先見書也史百執事皆從周公請命者問審然否也史百執事曰信有昔周公命我勿敢言成王執書以泣泣者傷周公忠孝誠如是而無知之者曰自今後其無繆卜乎本欲敬卜吉㓙今天意可知故止周公勤勞王家惟予㓜人弗及知今天動威以彰周公之徳惟朕小子其親迎我國家禮亦宜之亦宜褒有徳也王出郊天乃雨反風禾盡起郊以玉幣謝天也天即反風起禾眀郊之是也反風風還反也二公命國人凡大木所偃盡起而築之築拾也禾為木所偃者起其木拾其下禾乃無所失歲則大熟初成王㓜不能涖阼涖視也不能視祚階行人君之事周公相踐阼而治踐履也代成王履祚階攝王位治天下也抗世子法於伯禽欲令成王之知父子君臣長㓜之道也抗猶舉也謂舉為子之法使與成王居以學之成王有過則撻伯禽所以示成王世子之道也以成王之過擊伯禽則是以感喻焉周公還政成王北靣就臣位匔匔匔匔敬謹貌如畏然成王少疾病周公乃自揃其蚤沈之河以祝於神曰王少未有識奸神命者乃旦也亦蔵其䇿於府成王病有瘳及成王用事人或譛周公周公奔楚成王發府見周公禱書乃泣反周公周公攝政逺則四國流言近則王不知周大夫美其不失其聖故作狼䟦之詩召公虎為王卿士時厲王出奔彘彘晉地漢為縣河東今永安也屬厲王太子静匿虎之家國人聞之乃圍之召公曰昔吾驟諫王王不從以及此難也今殺王太子王其以我為讐而懟怒乎夫事君者險而不讐懟在危險之中怨而不怒况事王乎乃以其子代王太子太子竟得脱召公周公二相行政號曰共和共和十四年厲王死於彘太子静長於召公家二相乃共立之為王是為宣王二相輔之修政法文武成康之遺風諸侯復宗周漢蕭何㣲時與曹参善及為宰相有隙參自以戰功多而封賞毎在何後故怨何也至何且死所推賢唯参参代何為相國舉無所變更一遵何之約束申屠嘉文帝時為丞相為人㢘直門下不受私謁霍光昭帝時為大司馬輔㓜主政自已出帝時八嵗也政事一决于光天下想聞其丰采其後盖主燕王上官桀與子安謀殺光廢帝光盡誅桀安等光威振海内帝既冠遂委任光訖十三年百姓充實四夷賔服魏相宣帝初為御史大夫四歲大将軍霍光薨上思其功徳以其子禹為右將軍兄子樂平侯山復領尚書事相因平恩侯許伯奏封事言春秋譏世卿惡宋三世為大夫及魯季孫之専權皆危亂國家自後元以來禄去王室政繇冡宰今光死子復為大将軍兄子秉樞機昆弟諸壻據權勢在兵官光夫人顯及諸女皆通籍長信宫通籍謂禁門之中皆有名籍恣出入也或夜詔門出入驕奢放縱恐寖不制寖漸也不制不可制節也宜有以損奪其權破散隂謀以固萬世之基全功臣之世又故事諸上書者皆為二封署其一曰副領尚書者先發副封所言不善屏去不奏相復因許伯白去副封以防壅蔽帝善之詔相給事中皆從其議霍氏殺許后之謀始得上聞張安世宣帝時為大司馬領尚書事嘗有所薦其人來謝安世大恨以為舉賢達能豈有私謝邪絶弗復為通有欲謝者皆不之見一曰告此人而絶之更不與相見也張禹成帝時為丞相後以特進為太子師見時有變異若上體不安擇日潔齋露蓍露筮易蓍于星宿下眀日乃用言得天氣也蓍草名筮者所用也正衣冠立筮得吉卦則獻其吉如有不吉禹為感動憂色孔光安帝時為丞相帝躬行儉約省減諸用政事繇已出朝廷翕然望至治焉褒賞大臣益封光千户時成帝母太皇太后自居長樂宫而帝祖母定陶傅太后在國邸有詔問丞相大司空定陶共王太后宜當何居光素聞傅太后為人剛暴長於權謀自帝在襁褓而養長教道至於成人帝之立又有力光心恐傅太后與政事不欲令與帝旦夕相近即議以為定陶太后宜改築宫大司空何武曰可居北宫帝從武言北宫有紫房複道通未央宫傅太后果從複道朝夕至帝所欲稱尊號貴寵其親屬使帝不得直道行頃之太后從弟子傅遷在左右尤傾邪帝免官遣歸故郡傅太后怒帝不得已復留遷光與大司空師丹奏言詔書侍中駙馬都尉遷巧佞無義漏泄不忠國之賊也免歸故郡復有詔止天下疑惑無所取信虧損聖徳誠不小愆陛下以變異連見避正殿見羣臣思求其故至今未有所改舊有不善之事皆未改除臣請歸遷故郡以銷姦黨應天戒卒不得遣復為侍中脅於傅太后皆此類也又傅太后欲與成帝母俱稱尊號羣下多順㫖言母以子貴宜立尊號以厚孝道唯師丹與光持不可執持不可帝重違大臣正議重難也又内迫傅太后猗違者連歲猗違猶依違耳光凡為御史大夫丞相各再一為大司徒太傅太師厯三世居公輔位前後十七年自為尚書止不教授後為卿時㑹門下大夫講問疑難舉大義云其弟子多成就為博士大夫者見師居大位幾得其助力光終無所薦舉至或怨之其公如此後漢第五倫章帝時為司空奉公盡節言事無所依違諸子或時諫止輙叱遣之吏人奏記及便宜者亦并封上其無私若此袁安和帝時為司徒安以天子㓜弱外戚擅權每朝㑹進見及公卿言國家事未嘗不噫嗚流涕魯恭安帝時再為司徒恭在公位選辟髙第至侯郡守者數十人而其耆舊大姓或不蒙薦舉至有怨望者恭聞之曰學之不講是吾憂也諸生不有鄉舉者乎終無所言言人患學之不習耳若能習自有鄉里之舉豈待要三公之辟乎李郃安帝時為司空數陳得失有忠臣節㑹北鄉侯立郃復為司徒及北鄉侯病郃隂與少府河南陶範步兵校尉趙直謀立順帝㑹孫程等事先成故郃功不顯李固冲帝時為太尉梁太后臨朝固以清河王蒜年長有徳欲立之謂冀曰今當立帝宜擇長年髙眀有徳任親政事者願将軍詳審大計察周霍之立文宣戒鄧閻之利㓜弱冀不從乃立樂安王子纉年八歲是為質帝劉矩桓帝時為司空以蠻夷叛免靈帝初復為太尉矩再為上公所辟召皆名儒宿徳不與州郡交通順辭黙諫多見省用陳蕃永昌元年為太傅録尚書事時新遭大喪國嗣未立諸尚書畏懼權官託病不朝蕃以書責之曰古人立節事亡如存今帝祚未立政事日蹙諸君奈何委荼蓼之苦息偃在牀於義不足焉得仁乎諸尚書惶怖皆起視事靈帝初即位竇后臨朝蕃與后父大将軍竇武同心盡力徴用名賢共參政事天下之士莫不延頸想望太平李咸為太尉靈帝熹平元年中常侍曹節王甫欲别𦵏竇太后而以馮貴人配祔詔公卿大㑹朝堂令中常侍趙忠監議咸時病乃扶輿而起𢷬椒自隨謂妻子曰若皇太后不得配食桓帝吾不生還矣既議坐者數百人各瞻望中官良久莫肯先言趙忠曰議當時定怪公卿以下各相顧望司𨽻校尉陳球曰皇太后以盛徳良家母臨天下宜配先帝是無所疑忠笑而言曰陳廷尉宜便操筆球即下議曰皇太后自在椒房有聰眀母儀之徳遭時不造援立聖眀承繼宗廟功烈至重先帝宴駕因遇大獄遷居空宫不幸早世家雖獲罪事非太后今若别𦵏誠失天下之望且馮貴人冢墓被發骸骨暴露與賊并尸魂靈汙染且無功於國何宜上配至尊忠省球議作色俛仰嗤球曰陳廷尉建此議甚健球曰陳竇既寃皇太后無故幽閉臣常痛心天下憤歎今日言之退而受罪宿昔之願公卿以下皆從球議咸始不敢先發見球辭正然後大言曰臣本謂爾誠與臣意合㑹者皆為之愧曹節王甫復争之於是咸乃詣闕上疏曰臣伏惟章帝竇后虐害恭懐安思閻后家犯惡逆而和帝無異𦵏之議順朝無貶降之文至於衛后孝武皇帝身所廢棄不可以為比今長樂太后尊號在身親常稱制坤育天下且援立聖眀光降皇祚太后以陛下為子陛下豈得不以太后為母子無黜母臣無貶君宜合𦵏宣陵一如舊制帝省奏謂曹節等曰竇后雖為不道而太后有徳於朕不宜降黜節等無復言於是議者乃定咸在朝清忠權幸憚之荀爽獻帝初為司空因從遷都長安爽見董卓忍暴滋甚必危社稷其所辟舉皆取才畧之士将共圖之亦與司徒王允及卓長史何顒等為内謀㑹病薨王允初平元年為司徒及董卓遷都關中卓尚留雒陽朝政大小悉委之於允允矯情屈意每相承附卓亦推心不生乖疑故得扶持王室於危亂之中臣主内外莫不倚恃焉允見卓禍毒方深簒逆已兆宻與司𨽻校尉黄琬尚書鄭公業等謀共誅之乃以䕶𦍑校尉楊瓉行左將軍事執金吾士孫瑞為南陽太守並将兵出武關道以討袁術為名實欲分路征卓而後㧞天子還雒陽卓疑而留之允乃引内瑞為僕射瓉為尚書二年卓還長安三年春連雨六十餘日允與士孫瑞楊瓉登臺請霽復結前謀瑞曰自嵗末以來太陽不炤霖雨積時月犯執法彗孛仍見晝隂夜陽霧氣交侵此期應促盡内發者勝㡬不可後公其圖之允然其言乃潜結卓将吕布使為内應㑹卓入賀吕布因刺殺之及李傕郭汜為亂攻長安城䧟吕布奔走布駐馬青鎻門外招允曰公可以去乎允曰若蒙社稷之靈上安國家吾之願也如其不獲則奉身以死之朝廷㓜少恃我而已臨難苟免吾不忍也努力謝闗東諸公勤以國家為念傕乃収允殺之及宗族十餘人皆見誅害唯兄子晨陵得脱歸鄉里天子感慟百司喪氣後遷都於許獻帝思允忠節使改殯𦵏之趙温為司徒時李傕與郭汜不協傕欲移獻帝温與傕書曰公前託為董公報讐然實屠陷王城殺戮大臣天下不可家見而户釋也今争睚眦之隙以成千鈞之讐民在塗炭各不聊生曽不改悟遂成禍亂朝廷仍下眀詔欲令和解詔命不行恩澤虧損而復欲移轉乗輿更幸非所此誠老夫所不解也於易一過為過再為涉三而弗改滅其頂㓙不如早共和解引兵還屯上安萬乘下全生民豈不幸甚傕大怒欲遣人害温其從弟應故温掾也諫之數日乃止楊彪為太尉録尚書事及李傕郭汜之亂彪盡節為主﨑嶇危難之間㡬不免於害彪見漢祚将終自以累世為三公恥為魏臣遂稱足攣不復行積十餘年魏文帝即王位欲以為太尉令近臣宣㫖彪辭曰嘗仕漢朝為三公值世衰亂不能立尺寸之益若復為魏臣於國之選亦不為榮也帝不奪其意蜀諸葛亮為丞相章武三年先主病篤召亮屬以後事亮泣曰臣敢竭股肱之力効忠貞之節繼之以死建興元年魏司徒華歆司空王朗尚書令陳羣太史令許芝謁者僕射諸葛璋各有書與亮陳天命人事欲使舉國稱藩亮遂不報書作正議曰昔在項羽起不繇徳雖處華夏秉帝者之勢卒就湯鑊為後來戒魏不審鑒今次之矣免身為幸戒在子孫而二三子各以耆艾之齒承偽指而進書有若崇竦稱莽之功亦将偪於元禍茍免者邪昔世祖之創迹舊基奮羸卒數千摧莽彊旅四千餘萬於昆陽之郊夫據道討淫不在衆寡及至孟徳以其譎勝之力舉數十萬之師救張郃於陽平勢窮慮悔僅能自脱辱其鋒鋭之衆遂喪漢中之地深知神器不可妄獲旋還未至感毒而死子桓淫逸繼之以簒縱使二三子多逞蘇張詭靡之説奉進驩兜滔天之辭欲以誣毁唐帝諷解禹稷所謂徒喪文藻煩勞翰墨者矣夫大人君子之所不為也又軍誡曰萬人必死横行天下昔軒轅氏整卒數萬制四方定海内况以數十萬之衆據正道而臨有罪可得干擬者㦲五年亮率諸軍北駐漢中臨發上疏曰先帝創業未半而中道崩殂今天下三分益州疲弊此誠危急存亡之秋也然侍衛之臣不解於内忠志之士忘身于外者盖追先帝之殊遇欲報之於陛下也誠宜開張聖聼以光先帝遺徳恢𢎞志士之氣不宜妄自菲薄引喻失義以塞忠諫之路也宫中府中俱為一體陟罰臧否不宜異同若有作姦犯科及為忠善者宜付有司論其刑賞以昭陛下平眀之理不宜偏私使内外異法也侍中侍郎郭攸之費禕董允等此皆良實志慮忠純是以先帝簡拔以遺陛下愚以為宫中之事事無大小悉以咨之然後施行必能裨補闕漏有所廣益将軍向寵性行淑均曉暢軍事試用於昔日先帝稱之曰能是以衆議舉寵為督愚以為營中之事悉以咨之必能使行陣和睦優劣得所親賢臣逺小人此先漢所以興隆也親小人逺賢臣此後漢所以傾頺也先帝在時每與臣論此事未嘗不歎息痛恨於桓靈也侍中尚書長史參軍此悉貞良死節之臣願陛下親之信之則漢室之隆可計日而待也臣本布衣躬耕南陽茍全性命於亂世不求聞達於諸侯先帝不以臣卑鄙猥自枉屈三顧臣於草廬之中諮臣以當世之事繇是感激遂許先帝以驅馳後值傾覆受任於敗軍之際奉命於危難之間爾來二十有一年矣按劉備以建安十三年遣亮使吴亮以建興五年抗表北伐自傾覆至此整二十年然備始與亮相遇在敗軍之前一年時也先帝知臣謹慎故臨崩寄臣以大事也受命以來夙夜憂歎恐託付不效以傷先帝之眀故五月渡瀘深入不毛漢書地里志曰瀘津水出牂牁郡句町縣今南方已定甲兵已足當奨率三軍北定中原庶竭駑鈍攘除奸凶興復漢室還於舊都此臣所以報先帝而忠陛下之職分也至於斟酌損益進盡忠言則攸之禕允之任也願陛下託臣以討賊興復之效不效則治臣之罪以告先帝之靈若無忠益之言責攸之禕允等之慢以彰其咎陛下亦宜自謀以諮諏善道察納雅言深追先帝遺詔臣不勝受恩感激今當逺離臨表涕零不知所言亮與法正雖好尚不同以公義相取亮每竒正智術亮出駐漢中張裔以射聲校尉領留府長史嘗稱曰公賞不遺逺罰不阿近爵不可以無功取刑不可以貴勢免賢愚之所以僉忘其身者也李嚴嘗有書與亮勸亮宜受九錫進爵稱王亮答書曰吾與足下相知久矣可不復相解足下方誨以光國戒之以勿拘之道是以未得黙已吾本東方下士誤知於先帝位極人臣禄賜百億今討賊未效知已未答而方寵齊晉坐自貴大非其義也若滅魏斬叡帝還故居與諸子並升雖十命可受况於九邪亮與兄瑾書曰喬本當還成都喬亮子也令諸將子弟皆得轉運思惟宜同榮辱今使喬督五六百兵與諸子弟傳於谷中吳顧雍為丞相時訪逮民間及政職所宜輙宻以聞若見納用則歸之於上不用終不宣泄然於公朝有所陳及辭色雖順而所執者正大帝嘗令中書郎詣雍有所咨訪若合雍意事可施行即與相反覆究而論之為設酒食如不合意雍即正色改容黙然不言無所施設郎􅅲告權曰顧公歡悦是事合宜也其不言是事未平也孤當重思之晉安平王孚初為魏太傅髙貴鄉公遇害百官莫敢奔赴孚枕尸於股哭之慟曰殺陛下者臣之罪奏推主者㑹太后令以庶人禮葬孚與羣公上表乞以王禮葬從之孚性至慎宣帝執政嘗自􅅲損後逢廢立之際未嘗預謀景文二帝以孚屬尊亦不敢逼後進封長樂公及武帝受禪陳留王就金墉城孚拜辭執王手流涕歔欷不能自勝曰臣死之日固大魏之純臣也衛瓘為司空領太子少傅恵帝之為太子也朝臣咸謂純質不能親政事每欲瓘陳啟廢之而未敢發後㑹宴凌雲臺瓘托醉因跪帝牀前曰臣欲有所啓帝曰公所言何邪瓘欲言而止者三因而以手撫牀曰此座可惜帝意乃悟因謬言曰公真大醉邪瓘於此不復有言張華恵帝時為司空賈后謀廢太子左衛率劉卞甚為太子所信遇每㑹宴卞必預焉屢見賈謐驕傲太子恨之形於言色謐亦不能平卞以賈后謀問華華曰不聞卞曰卞以寒族自須昌小吏受公成㧞以至今日士感知己是以盡言而公更有疑於卞耶華曰假令有此君欲如何卞曰東宫俊乂如林四率精兵萬人公居阿衡之任若得公命皇太子因朝入録尚書事廢賈后於金墉城兩黄門力耳華曰今天子當陽太子人子也吾又不受阿衡之命忽相與行此是無其君父而以不孝示天下也雖能有成猶不免罪况權戚滿朝威柄不一而可以安乎及帝㑹羣臣於式乾殿出太子手書徧示羣臣莫敢有言者唯華諫曰此國之大禍自漢武以來每廢黜正嫡常至喪亂且國家有天下日淺願陛下詳之尚書左僕射裴頠以為宜先檢校傳書者又請比較太子手書不然恐有詐妄賈后乃内出太子手書事十餘使衆人比視亦無敢言非者議至日西不决后知華等意堅因表乞免為庶人帝乃可其奏初趙王倫為鎮西將軍撓亂闗中氐𦍑反叛乃以梁王肜代之或説華曰趙王貪昧信用孫秀變詐姦雄今可遣梁王斬秀刈趙之半以謝闗右不亦可乎華從之肜許諾秀友人辛冉從西來言於肜曰氐𦍑自反非秀之為故得免死倫既還謟事賈氏因求録尚書事後又求尚書令華與裴頠皆固執不可繇是致怨倫秀疾華如讐華少子韙以中台星坼勸華遜位華不從曰天道𤣥逺惟修徳以應耳不如静以待之以俟天命及倫秀将廢賈后秀使司馬雅夜告華曰今社稷将危趙王欲與公共扶朝廷為覇者之事華知秀等必成簒奪乃拒之雅怒曰刄将加頸而吐言如此不顧而出華方晝卧忽夢見屋壊覺而惡之是夜難作詐稱詔召華遂與裴頠俱被収華将死謂張林曰卿欲作忠臣邪林稱詔詰之曰卿為宰相任天下事太子之廢不能死節何也華曰式乾之議臣諫事具陳非不諫也林曰諫若不從何不去位華不能答須臾使者至曰詔斬公華曰臣先帝老臣中心如丹臣不愛死懼王室之難禍不可測也遂害之於前殿焉遂夷三族朝野莫不悲痛之時年六十九王渾恵帝時為司徒時楚王瑋将害汝南王亮等公孫宏説瑋曰昔宣帝廢曹爽引太尉蔣濟參乘以増威重大王今舉非常事宜得宿望鎭厭衆心司徒王渾宿有威名為三軍所信服可請同乘使物情有憑也瑋從之渾辭疾歸第以家兵千餘人閉門拒瑋瑋不敢逼俄而瑋以矯詔伏誅渾乃率兵赴宫傅祇懐帝時為司徒大将軍茍晞表請遷都使祇出詣河隂修理舟楫為水行之備及雒陽陷没遂共建行臺推祗為盟主以司徒持節大都督諸軍事傳檄四方子宣先尚𢎞農公主乃遣宣將公主與尚書令和郁赴告方伯徴義兵祗自屯盟津小城宣弟暢行河隂令以待宣祇以暴疾薨時年六十九祇自以義誠不終力疾手筆勑勵其二子宣暢辭㫖深切覽者莫不感激慷慨王導元帝時為侍中司空假節録尚書領中書監王敦之反也劉隗勸帝悉誅王氏論者為之危心導率羣從昆弟子姪二十餘人每旦詣臺待罪帝以導忠節有素特還朝服召見之及敦得志加導守尚書令初西都覆没海内思主羣臣及四方並勸進於帝時王氏彊盛有専天下之心敦憚帝賢眀欲更議所立導固争乃止及此役也敦謂導曰不從吾言㡬致覆族導猶執正議敦無以能奪又自漢魏以來羣臣不拜山陵導以元帝睠同布衣匪惟君臣而已每一崇進皆就拜不勝哀慼繇是詔百官拜陵自導始也陸􅁮成帝時為左光禄大夫開府儀同三司蘇峻之難曄隨帝在石頭舉動方正不以凶威變節峻以曄吳士之望不敢加害使守留臺㑹匡術以苑城歸順時共推􅁮督宫城軍事何充廢帝時為侍中録尚書事以衛将軍褚裒皇太后父宜綜朝政上疏薦裒參録尚書裒以地逼固求外出充每曰桓温褚裒為方伯殷浩居門下我可無勞矣充居宰相雖無澄正改革之能而彊力有器局臨朝正色以社稷為己任凡所選用皆以功臣為先不以私恩樹親戚談者以此重之王坦之與謝安共輔㓜主為中書令臨終與謝安桓冲書言不及私惟憂國家之事朝野甚痛惜之宋袁粲為尚書令與禇淵等受顧命元徽元年丁母憂𦵏竟攝令親職加衛将軍不受二年桂陽王休範為逆粲扶曳入殿詔加兵自隨府置佐史時兵難危急賊已至南掖門諸将意沮咸莫能奮粲慷慨謂諸将帥曰㓂賊已逼而衆情離沮孤子受先帝顧託本以死報今日當與諸䕶軍同死社稷因命左右被馬辭色哀壯於是陳顯達等感激出戰賊即平殄後魏長孫嵩太帝末為司徒眀元帝寝疾問後事於嵩嵩曰立長則順以徳則人服今長皇子賢而世嫡則天所命也請立之乃定䇿詔太武臨朝監國嵩為左輔陸麗文成時受心膂之任封平原王為司徒公和平六年文成厭世麗療疾於代郡温泉聞諱欲赴左右止之曰王徳望素重姦臣若疾民譽慮有不測之禍願少遲迴朝廷寜静然後奔赴猶為未晩麗曰安有聞君父之喪方慮禍難不即奔波者遂便馳赴後周竇熾為太傅武帝於太徳殿将謀伐齊熾時年已衰老乃扼腕曰臣雖朽邁請執干櫓首啓戎行得一覩誅翦鯨鯢廓清寰宇省方觀俗登岳告成然後歸魂泉壌無復餘恨帝壮其志節遂以熾第二子武當公恭為左二軍總管隋髙熲為右僕射兼納言進引貞良以天下為己任唐馬周為中書令臨終索陳事表草一一手自焚之慨然曰管晏彰君之過求身後之名吾弗為也温彦博太宗時為中書令自掌知機務即杜絶賔客國之利害知無不言太宗以是嘉之褚遂良髙宗永徽中為尚書右僕射知政事髙宗欲立武后遂良将以死争之或曰長孫太尉當先言之遂良曰太尉上之元舅脱事有不如意使上有怒舅之名不可曰英公勣上之所重當先言之遂良曰司空國之元勲有不如意使上有罪功臣之名不可遂良起自草茅無汗馬功蒙先帝殊遇以至今日且躬奉遺詔若不盡其愚誠何以下見先帝遂謀極言忤㫖出為潭州都督劉禕之則天朝為鳯閣鸞臺三品禕之謂鳯閣舍人賈大隠曰太后既能廢昏立眀何用臨朝不如返政以安天下之心大隠宻奏其言則天不悦謂左右曰禕之我所引用乃有背我之心豈復顧我恩也狄仁傑同鳯閣鸞臺平章事時中宗自房陵還宫則天匿之帳中召仁傑以廬陵為言仁傑慷慨敷奏言發涕流遽出中宗謂仁傑曰還卿儲君仁傑降階泣賀既已奏曰太子還宫人無知者物議安審是非則天以為然乃復置中宗於龍門具禮迎歸姚元之則天聖厯初為夏官侍郎同平章事則天謂侍臣曰徃者周興來俊臣等推勘制獄朝臣逓相牽引咸承反逆國家有法朕豈能違中間宜有枉濫更使近臣就獄親問皆得手状承引不虚朕以為然即可其奏近日周興俊臣死後無聞有反逆者然則已前就戮者不有寃濫邪元之對曰自垂拱已來被告身死破家者皆是毒酷自誣而死告者特以為功天下號為羅織甚於漢之黨銅陛下令近臣就獄問者近臣亦自不保何敢輙有動揺被問者若飜又懼遭其毒手将軍張䖍朂李安静等皆是也賴上天降監聖情發眀誅鋤兇豎朝廷乂安今日以㣲軀及一門百口保見在内外官更無反逆者乞陛下得告狀但収掌不須推問若後騐反逆有實臣請受知而不告之罪則天大悦曰以前宰相皆順成其事陷朕為淫刑之主聞卿所説甚合朕心後則天移居上陽宫中宗率百官就宫起居王公已下皆欣躍稱慶元之獨嗚咽流涕彦範柬之謂元之曰今日豈是啼泣時邪恐公禍從此始元之曰事則天年久乍此辭違情發於中非忍所得為昨從公誅凶逆者是臣之常道豈敢出言今辭違舊主悲泣者亦臣子忠節縁此獲罪實所甘心無㡬出為亳州刺史至睿宗朝元之為中書令𤣥宗在東宫太平公主干涉朝政宋王成器為閑廏使岐王範薛王業皆掌禁兵外議以為不便元之與侍中宋璟宻奏請令公主徃就東都出成器等諸王為刺史以安人心崔𤣥暐為鸞臺侍郎知政事則天不豫宰相不得召見者累日及疾少間𤣥暐奏言皇太子相王仁眀孝友足可親侍湯藥宫禁事重伏願不令異姓出入則天曰深領卿厚意尋以預誅張易之功擢拜中書令封博陵郡公蕭至忠中宗景龍中為中書令時宗楚客紀處訥潛懐姦計自樹朋黨韋巨源楊再思李嶠皆唯諾自全無所拯救至忠處其間獨存正道時議翕然重之中宗亦曰諸宰相中至忠最憐我蘇瓌為尚書右僕射同中書門下三品神龍末韋庶人秘不發中宗喪召諸宰相韋巨源蕭至忠宗楚客紀處納韋温李嶠韋嗣立唐休璟趙彦昭及􅅛入禁中㑹議初草遺制遣韋庶人知政事輔少主授安國相王太尉參謀輔政宗楚客韋温曰今既通請皇太后臨朝宜停相王輔政且太后於相王居嫂叔不通問之地甚難為儀注理全不可瓌獨正色拒之謂楚客等曰既稱遺制安可輙改邪楚客及温大忿固執迺行其月相王即尊位下制曰尚書右僕射同中書門下三品監修國史許國公蘇􅅛自周旋近宻損益樞機謀猷有成翊贊無怠頃者仰惟先帝顧托注意昭眀姦回動搖内外危懼獨申讜議實挫邪謀况藩邸僚屬念殷惟舊無徳不報宜准令典司尚書左僕射餘如故劉幽求先天元年為尚書右僕射同中書門下三品時崔湜託附太平公主将謀逆亂幽求乃與右羽林将軍張暐請以羽林兵誅之仍令暐宻奏東宫曰宰相中有崔湜岑羲俱是太平公主進用見作方計其事不輕殿下若不早誅必成大患一朝事出意外太上皇何以得安古人云當斷不斷必受其亂唯請急殺此賊劉幽求已共臣作定計訖願以身正此事赴死如歸臣既職典禁兵若奉陛下命便當除剪𤣥宗深以為然暐洩其謀於侍御史鄧光賔太子大懼遽列上其狀睿宗下幽求等詔獄令法官奏幽求等以踈間親罪死𤣥宗屢救獲免乃流幽求于封州暐于絳州嵗餘太平公主等伏誅其曰制以幽求為左僕射知軍國事宋璟睿宗朝為吏部尚書同中書門下三品時𤣥宗在春宫太平公主謀不利於𤣥宗嘗於光範門内乘輦伺執政以諷之衆皆失色璟昌言曰東宫有大功於天下真宗廟社稷之主安得有異議遂與姚元之同奏請令公主就東都以絶其謀𤣥宗懼抗表加罪於璟等乃貶璟為楚州刺史及𤣥宗即位以璟為侍中開元四年秋駕幸東都次永寜之崤谷馳道隘狹車騎停擁帝怒河南尹李朝隠及知頓使王怡将罪之璟入奏曰陛下富有春秋方事巡狩蹔以窄隘致罪二臣竊恐将來人受其弊帝遽令捨之璟拜謝曰陛下責之以臣言而免之是過歸於上而恩繇於下請且使待罪於朝然後詔復其職則進退得其度矣𤣥宗深善之十二年車駕東巡璟為留守帝臨發謂璟曰卿國之元老為朕之股肱耳目今将巡雒邑為别厯時所有嘉猷宜相告也璟因極言得失特賜綵繒等物仍降手制曰所進之言書之座右出入觀省以誡終身其見重如此源乾曜開元中為侍中上疏曰臣竊見勢要之家併求京職俊乂之士多任外官王道平分不合如此臣三男俱是京任望出二人與外官以叶均平之道帝從之於是改其子河南府參軍弼為絳州司功大祝㓗為鄭縣尉因下制曰源弼等父在樞近深惟謙挹思代官之咸列慮時才之未序率先庶僚崇是譲徳傳不云乎范宣子譲其下皆譲晉國之人於是大和道之或行仁豈云逺因令文武百僚父子兄弟三人併任京司者任通融各依資處分繇是公卿子弟京官出外者百餘人韋見素為門下侍郎平章事天寳十五年𤣥宗幸蜀郡見素與楊國忠脱身扈從國忠素無學術不知禮體臨難忷懼迫乘輿出城道路畧無儲備𤣥宗至咸陽望賢宫榛蕪蔽路官吏四散從官咸怨國忠及次武功之馬嵬驛右龍武軍将軍陳𤣥禮素以忠正穪乃奏國忠不臣誅之見素為亂兵傷額𤣥宗命左右傳呼曰莫傷韋見素仍遣親王以藥傅之遂獲全見素晨夜匪懈忠節逾厲𤣥宗益親重之苗晉卿為侍中代宗即位晉卿年已衰暮廣徳初吐蕃冦長安晉卿時病卧私第蕃賊聞之輿入逼脅晉卿閉口不言賊不敢害及帝自陜冊為太保罷知政事崔祐甫建中初為相薦延推舉無復凝滯日除數十人作相未逾年凡除吏㡬八百員多稱允當帝嘗謂曰有人謗卿所除擬官皆涉親故何也祐甫奏曰臣頻奉聖㫖今所有進擬庶官必須諳其才行者臣若與相識方可粗諳若平生未曽相見即無繇知其言行獲謗之繇實在於此帝亦以為然齊暎貞元中為相時吐蕃數入㓂人心動搖及上将行幸陜暎曰夷狄亂華臣之罪也今人情忷懼謂陛下理装具糗糧臣聞大福不再奈何不與臣等熟計之俯伏流涕帝亦為感慟陸䞇徳宗貞元中為相嘗自以少年入翰林蒙幸天子天子長養成就之不敢自愛事之不可者皆力争之曰吾上不負天子下不負吾所學不恤其佗竇易直文宗朝在相位未嘗論用親黨凡於公舉即無所避韋處厚為相太和元年四月宰相等於延英既出再召處厚獨對一刻餘時宰臣啓事得請之後徃往中變是日處厚與裴度竇易直同對既而從容獨進曰陛下用臣等為宰相使參大政前後論奏皆蒙聼納近日雖云不阻然臣等既退尋多改易事若出自聖㫖則是陛下示臣等以不信若與别人商量則臣等不合更居此位且裴度以元勲舊徳厯相四朝孜孜竭誠人望所屬陛下固宜親重易直以忠厚長者輔佐先帝陛下亦當委付㣲臣是陛下首自選擢用非因人所言不從臣合先退乃再拜陳乞帝瞿然曰卿何事邪朕知卿合作宰相也昨内難既定朕以人望所屬用卿不疑軍國事多方所倚賴今即辭免是彰朕之不徳朝廷四方其謂朕何慰勉久之而退既出延英門遽命中人復召處厚獨入諮訪移時畧開陳理體者數百言其要以旌别淑慝修舉法制為請因復懇言裴度勲大望崇且其心忠藎可以乆於任使帝欣納焉裴度為司徒中書令及薨文宗怪度無遺表中使問之家人進其藁草其㫖以未定儲位為憂言不及於家事魏謩宣宗時為户部侍郎平章事謝日奏曰臣無稷契之才驟叨社稷之任將何以仰報鴻私今邊戎粗安海内寧息臣愚所切陛下未立東宫俾正人傅導以存副貳之重因泣下帝感而聴之先是累朝人君不欲人言立儲貳若非人主已欲臣下不敢獻言帝春秋高嫡嗣未辨謩作相之日率先啟奏人士重之梁敬翔為相及劉鄩失河朔安彦之䘮楊劉翔奏曰國家連年遣將出征封疆日削不獨兵驕將怯亦制置未得其術陛下處深宫之中與之計事者皆左右近習豈能量敵之勝負哉先皇帝時河朔半在親御虎臣驍將獨不得志於敵人今冦馬已至鄆州陛下不留聖念臣所未諭一也臣聞李亞子自墨縗統衆於今二年每攻城臨陣無不親當矢石昨聞攻楊劉率先負薪渡水一鼓登城陛下儒雅守文未嘗如此俾賀瓌輩與之較力而望攘逐寇戎臣所未諭二也陛下所宜詢於黧老别運沉謀不然則憂未艾也臣雖駑怯受國恩深陛下必苦乏材乞於邊陲效試末帝雖知其懇惻竟以趙張輩言翔怨望不之聼及王彥章敗於中都晉人長驅而南末帝急召翔謂之曰朕居常忽卿所奏果至今日事急矣勿以為懟且指朕安歸翔泣奏曰臣受國恩已及三紀從㣲至著皆先朝所遇雖名宰相實朱氏老奴耳事陛下如郎君以臣愚誠敢有所隠陛下初任段凝為將臣已極言小人朋附致有今日晉軍即至段凝限水欲請陛下移居避敵陛下必不聼從欲請陛下出竒應敵陛下必不果决縱良平復生難以轉禍為福請先死不忍見宗廟隕墜言訖君臣相向慟哭及晉主陷都城有詔赦梁氏臣僚李振謂翔曰有制洗滌將朝新君翔曰新君若問其將何辭以對是夜翔在髙頭里第宿於車坊欲曙左右報曰崇政李太保已入廟翔返室歎曰李振謬為丈夫耳朱氏與晉仇讐我等始同謀畫致君無狀令少主伏劔於國門縱新朝赦罪何面目入建國門邪乃自經而卒册府元龜卷三百十五
