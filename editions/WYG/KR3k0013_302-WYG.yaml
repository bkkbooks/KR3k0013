body:
  text: 册府元龜卷三百二宋王欽若等撰外戚部委任輔政將兵立功委任夫姻連戚屬任參國柄茍或瑚璉之竒器梁棟之偉材國家於是寄以腹心誠以義殊瓜李大則利權兵政委之弗疑小則近司要事冀其能忠其有出自寵私靡由公授倚任太過尤悔亦多覆轍頽基前世甚矣漢許廣漢孝宣許后之父宣帝即位封平恩侯位特進與侍中金安上等徑出入省中又云宣帝收霍氏諸領胡越騎羽林及兩宫將屯兵悉以所親信許史子弟代之許即廣漢史謂史良娣兄史恭諸子史丹父高宣帝親母史良娣之兄子封樂陵侯丹自元帝為太子時以父任為中庶子侍從十餘年元帝即位為駙馬都尉侍中出常驂乗甚有寵帝以丹舊臣皇考外屬親信之詔丹䕶太子家後漢陰識光烈皇后前母兄也初為侍中封原鹿侯及明帝立為皇太子識以守執金吾輔導東宫帝每巡郡國識常留鎮守京師委以禁兵馬嚴先徙北地明徳皇后父援兄余之子仕郡督郵後歸安陵永平十五年明徳皇后勅使移居雒陽顯宗召見嚴進對閑雅意甚異之有詔留仁夀闥與校書郎杜撫班固等雜定建武注記常與宗室近親臨邑侯劉復等論議政事甚見寵幸吳吳奮大帝母吳夫人弟景子也景卒奮授兵為將封新亭侯帝征荆州拜奮吳郡都督以鎮東方晉羊琇景獻皇后之從父弟武帝踐祚累遷中䕶軍加散騎常侍琇在職十三年典禁兵豫機密寵遇甚厚南齊江祏姑為景后少為明帝所親愛如兄弟高宗輔政委以心腹欝林隆昌元年自正員郎補丹陽丞中書郎明帝為驃騎鎮東府以祏為諮議參軍後梁王操字子高宣帝母龔太后之外弟性敦厚有籌略博涉經史在公恪勤初為帝外兵叅軍親任亞於蔡大寳陳沈君高後主沈后父君理之弟有吏能以家門外戚早居清顯宣帝太建元年東境大水百姓饑弊乃以君高為貞威將軍吳令後魏王建廣寗人也祖姑平文后生昭成皇帝伯祖豊以帝舅貴重豊子支尚昭成女甚見親待建少尚公主道武登國初為外朝大夫與和跋等十三人迭典庶事參與計謀賀泥獻明皇后之從昆弟子也天賜末京師草草泥出舉烽於安陽北賀蘭部人往赴之明元即位乃罷詔泥與元渾等八人拾遺左右閭莊恭皇后兄毘之子也孝文太和中初立三長以莊為定戸籍大使甚有時譽李侃晞思皇后之族子也為博陵郡公侃晞為莊帝所親幸拜散騎常侍嘗食典御帝之圖爾朱榮侃晞與魯安等持刀於禁内殺榮宇文測性沉密少篤學為司徒右長史尚宣武女陽平公主拜駙馬都尉及孝武疑齊神武詔測詣後周文帝密為之備還封廣川縣伯北齊尉景從神武起兵信都神武入雒留景鎮鄴尋進為公景妻常山君神武之姊也以勲戚每有軍事與厙狄干常被委重鄭仲禮高祖嬖寵其姊也以親戚被昵擢帳内都督常執弓刀出入隨從胡長粲武成皇后之從祖兄少而敏悟以外戚起家給事中遷黄門侍郎後主踐祚長粲被勅與黄門馮子琮出入禁中專典敷奏後周尉遲綱字婆羅蜀國公迥之弟也少孤與兄迥依託舅氏太祖西討闗隴迥綱與母昌樂大長公主留迥晉陽後方入闗從太祖征伐常陪侍帷幄出入臥内守隋元孝矩初仕周為司憲大夫高祖重其門地娶其女為房陵王妃及高祖為丞相拜少冢宰進位柱國時房陵王鎮雒陽及高祖受禪立為皇太子令孝矩代鎮既而立其女為皇太子妃親禮彌厚俄拜夀州總管賜孝矩璽書曰楊越氛祲侵軼邊鄙爭桑興役不識大猷以公志存逺略今故鎮邊服懐柔以禮稱朕意焉唐吳湊章敬皇后之弟也累轉左金吾衞大將軍湊小心謹慎智識周敏特承顧問偏見委信大厯中滑帥令狐彰汴帥田神功相次歿於理所時藩方兵驕乗戎帥喪亡人情多梗代宗令湊銜命撫慰必委曲說諭所欲為之奏請皆得軍民和協帝重之梁段凝開封人妹為太祖美人故委心腹開平四年五月授懐州刺史遷鄭州刺史監大軍於河上後末帝罷王彦章兵權以授凝以衆五萬營於高陵津後唐孟知祥字保𦙍幼温厚知書樂善武皇深器之以其弟克讓女妻之即瓊華長公主莊宗同光三年九月大舉伐蜀以郭崇韜為招討使奉辭之日崇韜奏曰臣以非才謬當戎事若西川平定之後陛下擇帥如信厚善謀事君有節則孟知祥有焉望以蜀帥授之冬蜀平十二月制以知祥檢校太傅同平章事成都尹充劍南西川節度副大使知節度事帝曰蜀土奢華富盛不異吾宫以卿戚里忠賢故以相付卿其勉之輔政在昔三代蓋有外戚之助班固所稱其事詳矣秦漢已降后妃之家或以才升或由親授以才則竇嬰將兵克殄於多難以親則新莽輔政終滋於逆節然則内主機密參決政治恭慎自居必有輔佐之益威福是作乃生顛覆之虞賢者謙以成名驕者侈而掇咎前史具載厯代明徴是知授以至公靡由私愛表其親遇之意敦以忠良之規則其可保乎始終守乎富貴者也漢田蚡景帝王皇后之同母弟武帝初即位蚡以舅封為武安侯㑹丞相衞綰病免帝議置丞相太尉藉福說蚡曰魏其侯貴久矣魏其侯竇嬰也素天下士歸之今將軍初興未如即帝以將軍為相必讓魏其魏其為相將軍必為太尉太尉相尊等耳言其尊貴同一等也有讓賢名蚡乃微言太后風帝風讀為諷於是廼以竇嬰為丞相蚡為太尉上官桀隴西上邽人孝昭皇后祖父也武帝疾病以霍光為大將軍桀為左將軍皆受遺詔輔少主許延夀孝宣皇后同産弟封樂成侯宣帝以延夀為大司馬車騎將軍輔政史高孝宣父悼皇考之舅子封樂陵侯宣帝疾病拜高為大司馬車騎將軍領尚書事元帝襲尊號高輔政五年王鳳孝元皇后昆弟孝成初即位以元舅侍中衞尉陽平侯為大司馬大將軍領尚書鳳輔政凡十一年王音孝元皇后從父弟𢎞子陽朔三年秋大司馬王鳳疾帝數自臨問親執其手涕泣曰將軍如有不可言平阿侯譚次將軍矣不可言謂死也不斥言之譚鳳弟也鳳頓首泣曰譚等雖臣至親行皆奢侈無以率導百姓不如御史大夫音謹敕敕整也臣敢以死保之及鳳且死上疏謝帝復固薦音自代音竟代鳳為大司馬驃騎將軍輔政八年王商以孝元皇后弟封成都侯位特進代王音為大司馬衞將軍輔政四歳病乞骸骨帝閔之更以為大將軍王根以孝元皇后弟封曲陽侯為光禄勲商薨紅陽侯立次當輔政有罪過帝廢立而用根為大司馬驃騎將軍輔政五歳許嘉孝成皇后父自元帝時為大司馬車騎將軍輔政已八九年矣及成帝立復以元舅陽平侯王鳳為大司馬大將軍與嘉並輔政以為故事傅喜哀帝祖母定陶傅太后從父弟代師丹為大司馬輔政後漢竇憲以章徳皇后兄為侍中虎賁中郎將和帝即位太后臨朝憲以侍中内幹機密幹主也出宣誥命初章帝遺詔以憲弟篤為虎賁中郎將篤弟景瓌並中常侍於是兄弟皆在親要之地鄧騭以和熹皇后兄拜車騎將軍儀同三司始自騭也騭弟悝嘗為虎賁中郎將𢎞閶皆為侍中太后與騭等定䇿立安帝騭兄弟常出入禁中騭後為大將軍以母新野君薨還第服闋詔喻騭還輔政固讓乃止閻顯以安思皇后昆弟封長社縣侯太后臨朝以顯為車騎將軍儀同三司梁商以順烈皇后父為大將軍商自以戚屬居大位每存謙虚於是京師翕然稱為良輔順帝委重焉梁冀商之子為河南尹商薨未及葬順帝乃拜冀為大將軍冲帝始在襁褓太后臨朝詔冀與太傅趙峻太尉李固參録尚書事竇武以桓思皇后父為城門校尉靈帝立拜武為大將軍常居禁中何進靈思皇后兄獻帝即位尊后為太后臨朝進與太傅袁隗輔政録尚書事吳滕𦙍尚大帝公主為太常與諸葛恪等俱受遺詔輔政廢帝即位加衞將軍晉楊駿以武悼皇后父自鎮軍將軍遷車騎將軍武帝疾篤后乃奏帝以駿輔政帝頷之遺詔曰昔伊望作佐勲垂不朽周霍拜命名冠往代侍中車騎將軍行太子太保領前將軍楊駿經徳履喆鑒識明逺毗翼二宫忠肅茂著宜正位上臺擬跡阿衡其以駿為太尉太子太傅假節都督中外諸軍事侍中録尚書領前將軍如故惠帝即位進駿為太傅大都督假黄鉞録朝政褚裒以康獻皇后父除衞將軍領中書令裒以中書銓管不宜以姻戚居之固讓及太后臨朝有司以裒皇太后父議加不臣之禮拜侍中衞將軍録尚書事裒以近戚懼獲譏嫌上疏固請居藩後魏賀泥獻明皇后從弟之子也明元即位拾遺左右太武征赫連昌以功進爵為琅琊公軍國大議每參務焉閭毗恭皇后兄文成太安中以毗為征東將軍評尚書事所以隆崇舅氏常英以文成保太后兄太安初為侍中征東大將軍太宰三年領太師録尚書事馮熙以文明太后兄拜冠軍將軍又尚恭宗女博陵長公主拜駙馬都尉獻文即位為太傅孝文初太后臨朝帝乃承㫖以熙為侍中太師中書監高肇以文昭太后兄景明中録尚書事又尚宣武姑高平公主遷尚書令肇出自夷土時望輕之及在位居要留心百揆孜孜無倦世咸謂之能高后既立愈見寵信延昌初遷司徒胡國珍孝明時以靈太后之父封安定郡公太后臨朝尚書令任城王澄奏安定公宜出入禁中參預大務詔屈公入決萬機尋進位中書監儀同三司詔與太師高陽王雍太傅清河王懌太保廣平王懐入居門下同釐庶政李延寔以孝荘元舅之尊起授侍中太保延寔以保犯祖諱抗表固辭改授太傅尋轉司徒公北齊胡長粲武成皇后從祖兄為給事中黄門侍郎文成即位與領軍婁定逺録尚書趙彦深和士開高文遥領軍綦連猛高阿那肱僕射唐邕同知朝政時人號為八貴於後定逺文遥並出唐邕專典外兵綦連猛阿那肱别總武任長粲常在左右兼宣詔令從幸晉陽後主即位富於春秋庶事皆歸委粲盡心毗奉甚得名譽又為侍中唐高士廉太宗文徳皇后之舅貞觀初拜侍中十年同中書門下三品十二年拜尚書右僕射長孫無忌文徳皇后兄也少與太宗友善義軍渡河無忌至長春宫謁見自是常從太宗征討及太宗即位拜尚書右僕射或有密表稱無忌權寵過盛太宗以表示無忌謂曰朕與卿君臣萬事無疑若各懐所聞而不言則君臣之意為不通矣因詔百寮謂之曰朕今有子皆幼無忌於朕實有大功今日委之猶如子也疏間親新間舊謂之不順朕所不取也貞觀七年再拜司空固辭不許又因高士廉奏曰臣幸居外戚恐招聖主私親之誚敢以死請太宗曰朕之授官必擇才行若才不至縱朕至親亦不虚授襄邑王神符是也若才有所適雖怨讐而不棄魏徴等是也朕若以無忌為后之兄而私情愛之當多遺子女金帛何須輒以天官授之蓋是取其才耳無忌聰明鑒悟雅有武略公等並知所以委之台鼎無忌又上表切讓太宗使謂之曰昔黄帝得力牧而為五帝先夏禹得咎繇而為三王祖齊桓得管仲而為五伯長朕自在籓邸公為腹心遂得廓清宇内君臨天下以公功績才望允稱具瞻故授此官無宜多讓也楊師道尚桂陽公主拜駙馬都尉貞觀中為太常卿魏徴既辭樞近之職太宗乃擢授師道為侍中參預朝政親待甚隆常在左右竇徳𤣥太穆皇后之從孫也厯官以恭勤著稱高宗時為右相韋温以中宗韋庶人從父兄神龍中累遷禮部尚書景龍三年拜太子少保同中書門下三品楊國忠以𤣥宗太真妃從祖兄累遷蜀郡都督府長史充劒南節度副大使知節度事代李林甫為右相兼吏部尚書集賢殿大學士太清太微宫使韋保衡尚懿宗女同昌公主咸通十年自起居郎為翰林學士累遷兵部侍郎承旨不朞年以本官平章事將兵夫推轂受任握兵之要將帥之重邦家是賴乃有奮自戚里委之師律以親篤肺腑之懿以賢當幕府之選莫不執金皷之政總鵝鸛之旅處則總司戎重出則恭行討伐固有削平逆壘揚威絶漠作鎮於外屏翰王國者矣其或倚任非當恩賞踰制自致滿溢或貽喪敗兩漢之世傾輈繼軌豈止太盛而不知抑損固亦違道而自底滅亡者哉漢吕澤吕釋之皆高后兄從高祖征伐為列將澤二子台産高后臨朝特為將將南北軍釋之子禄高后病困以為上將軍居北軍竇嬰字王孫孝文皇后從兄子孝景即位為詹事因病免三年吳楚反帝察宗室諸竇無如嬰賢宗室帝之同姓親也諸竇總謂帝外家也以呉楚之難故欲用内外之親為將也召入見固讓謝稱病不足任帝曰天下方有急王孫寧可以讓邪乃拜嬰為大將軍賜金千斤嬰守榮陽監齊趙兵七國破封為魏其侯衞青孝武皇后之弟元光六年拜為車騎將軍擊匈奴出上谷元朔元年復將三萬騎出鴈門明年復出雲中西至高闕山名一曰塞名在朔方之北遂至於隴西五年春令青將三萬騎出高闕還至塞天子使使者持大將軍印即軍中拜青為大將軍諸將皆以兵屬立號而歸明年出定襄斬首數千級而還青七出擊匈奴捕首虜五萬餘級霍去病衞皇后姊子再從大將軍為票姚校尉元狩三年春為驃騎將軍將萬騎出隴西有功其夏去病與合騎侯敖俱出北地明年復出定襄數有功去病凡六出擊匈奴斬虜首十一萬餘級李廣利武帝李夫人之兄大初元年為貳師將軍發屬國六千騎及郡國惡少年數萬人以往期至貳師城取善馬故號貳師將軍軍還入馬千餘疋伐宛再反再反猶今言兩回也征和三年復將七萬騎出五原擊匈奴王鳳孝元皇后弟成帝即位以元舅為大司馬大將軍領尚書事鳳從弟音成帝時為御史大夫鳳薨以音為大司馬車騎將軍音薨鳳弟商為大司馬衞將軍商薨以弟根為大司馬驃騎將軍後漢竇固尚光武女涅陽公主明帝即位拜中郎將監羽林士永平十五年帝欲遵武帝故事擊匈奴通西域以固明習邊事拜為奉車都尉以騎都尉耿忠為副謁者僕射耿秉為駙馬都尉秦彭為副皆置從事司馬並出屯凉州明年出酒泉塞至天山擊呼衍王斬首千餘級時諸將唯固有功明年復出玉門擊西域在邊數年羌胡服其恩信馬嚴明徳皇后從父兄永平末為將軍長史將北軍五校士羽林禁兵三千人屯西河美稷美稷縣名衞䕶南單于聽置司馬從事牧守謁敬同之將軍竇憲章徳皇后之兄和帝即位太后臨朝憲以侍中内幹機密有罪懼誅臣欽若等按後漢書憲遣客刺後都鄉侯暢也自求擊匈奴以贖死㑹南單于請兵北伐乃拜憲為車騎將軍金印紫綬以執金吾耿秉為副發北軍五校黎陽雍營縁邊十二郡騎士及羌胡兵出塞斬名王已下萬三千級降者前後二十餘萬人詔使中郎將持節即五原拜憲大將軍明年將兵出鎮凉州以侍中鄧疉行征西將軍事為副至私渠北鞮海而還鄧騭和熹皇后之兄延平元年拜車騎將軍永初元年凉部畔羌揺蕩西州朝廷憂之於是詔騭將左右羽林北軍五校士及諸部兵擊之遷大將軍閻顯安思皇后之弟建光元年安帝始親政事顯及弟景耀晏並為卿校典禁兵及思皇后臨朝以顯為車騎將軍梁商順烈皇后之父陽嘉三年以商為大將軍固稱疾不起四年使太常桓焉奉䇿就第即拜商乃詣闕受命商子冀為河南尹商薨未及葬順帝乃拜冀為大將軍竇武桓思皇后之父靈帝即位拜武為大將軍董重靈帝母孝仁皇后之兄子中平五年為驃騎將軍領兵千餘人何進靈思皇后之兄中平元年黄巾賊張角等起以進為大將軍率左右羽林五營士屯都亭修理器械以鎮京師五年靈帝講武於平樂觀下行陣三匝而還詔使進悉領兵屯於觀下進弟苗中平四年為河南尹榮陽賊數千人羣起攻燒羣縣殺中牟縣令詔使苗出擊之苗攻破羣賊平定而還詔遣使者迎於成臯拜苗為車騎將軍魏甄像文昭后父逸之孫明帝時為散騎常侍青龍二年吳人寇揚州以像為伏波將軍持節監諸將東征晉羊琇景獻皇后從父弟武帝踐祚累遷中護軍在職十三年典禁兵寵遇甚厚王虔文明皇后弟為東平將軍假節監青州諸軍事虔子士文為右衞將軍南中郎將鎮許昌楊駿武悼皇后父武帝時自鎮軍將軍遷車騎將軍太康末假節都督中外諸軍事領前將軍置步兵三千人騎千人惠帝即位進大都督假黄鉞虞𦙍元敬皇后弟太寧末自步兵校尉轉右將軍與南頓王宗俱為明帝所昵並典禁衞庾亮明穆皇后之兄明帝時代王導為中書監及王敦舉兵加亮左衞將軍與諸將距錢鳳及沈充之走吳興也又假亮節都督東征諸軍事成帝即位蘇峻反復假亮節都督征討諸軍事後鎮蕪湖頃之後將軍郭黙據湓口以叛亮表親征於是以本官加征討都督及石勒死有開復中原之謀乃率大衆十萬據石頭城為諸軍聲援亮弟懌為左衞將軍以討蘇峻功封廣饒男後遷輔國將軍假節鎮蕪湖懌弟冰為吳國内史㑹蘇峻作逆以冰行奮武將軍距峻别率張健於吳中冰擊走之後為車騎將軍及弟翼當伐石季龍於是以本號除都督江荆寧益梁交廣七州豫州之四郡軍事領江州刺史假節鎮武昌以為翼援冰弟翼代亮為都督江荆司雍梁益六州諸軍事安西將軍荆州刺史假節鎮武昌康帝即位翼率衆北伐有衆四萬詔加都督征討軍事褚裒康獻皇后父康帝時為尚書以后父苦求外出除建威將軍江州刺史鎮平洲遷右將軍兖州刺史都督兖州徐州之琅琊諸軍事假節鎮金城穆帝時假節鎮京口及石季龍死裒上表請伐之即日戒嚴直指泗口朝議以裒事任貴重不宜深入可先遣偏師裒重陳前所遣前鋒督護王頥之等徑造彭城示以威信後遣督護麋嶷進軍下邳賊即奔潰嶷率所領據其城池今宜速發以成聲勢於是除征討大都督徐兖青揚豫五州諸軍事裒率衆三萬徑進彭城河朔士庶歸降者以千計裒撫納之甚得其歡心王藴孝武定皇后父定后立父封建昌縣侯固辭不拜乃授都督京口諸軍事左將軍假節鎮於京口徴拜尚書左僕射遷丹陽尹以姻戚不欲在内苦求外出復以為都督浙江東五郡鎮軍將軍宋徐逵之尚高祖長女㑹稽公主為振威將軍彭城沛二郡太守高祖諸子並幼以逵之姻戚將大任之欲先令立功及討司馬休之使統軍為前鋒配以精兵利器事剋當即授荆州休之遣魯宗之子軌擊破之於陣見害追贈中書侍郎趙伯符孝穆皇后弟子也武帝時為寧逺將軍總領義徒以居宫城北毎有火起及賊盜輒身貫甲胄助郡縣赴討帝甚嘉之後魏賀泥道武母獻明皇后從父弟恱之子從太武征赫連昌又征蠕蠕為别道將杜超密皇后之兄尚南安長公主神䴥三年乃以超行征南大將軍鎮鄴馮誕文明太后兄子尚孝文妹樂安長公主除侍中都督中外諸軍事中軍將軍高肇文昭太后之兄延昌初為司徒及大征蜀以肇為大將軍都督諸軍為之節度與都督甄琛等二十餘人俱面辭宣武於東堂親奉規略北齊婁昭武明皇后之母弟為中軍大都督從神武破爾朱兆於廣阿兖州刺史樊子鵠反以昭為東道大都督討之昭子叡以軍功為大司馬武成至河陽乃遣總偏師赴懸瓠厙狄干尚神武妹樂陵長公主以親地見待自預勤王常總大衆威望之重為諸侯最韓軌妹為神武所納生上黨王渙軌督中軍從破爾朱兆於赤谼嶺後為大司馬從文宣征蠕蠕斛律光後主皇后父為大將軍天統末周將圍雒陽壅絶糧道武平元年正月詔光率步騎三萬討之其冬光又率步騎五萬於玉壁築華谷龍門二城二年率衆築平隴衞壁統戎等鎮戍十有三所破周將韋孝寛於汾水之北俘斬千計又率步騎五萬出平陽道攻姚襄白亭城戍後周李暉尚太祖女義安公主從駕西巡率公卿子弟别為一軍唐竇徳明高祖太穆皇后兄之孫武徳初拜考功郎中從太宗擊王世充頻有戰功武攸宜則天之姪萬歳通天元年九月為右武威衞大將軍充清邊道行軍大總管以討契丹及軍發則天幸白馬寺餞之武懿宗則天伯父士逸之孫為左金吾衞大將軍萬歳通天中契丹賊帥孫萬榮寇河上命懿宗為大總管討之後唐劉延皓末帝皇后之弟清泰初自樞密使出為鄴都留守晉杜重威尚高祖妹宋國長公主天福初典禁軍二年張從賔搆亂處汜水高祖遣重威與侯益率衆破之遷侍衞親軍馬步軍副都指揮使及鎮州安重榮稱兵向闕命重威禦之開運元年加北面行營招討使立功外戚之助其來逺矣乃有居於母黨謂我舅者本乎肺腑之重旁及葭莩之餘其或志藴精彊才推饒傑早登勇爵深暢武經在寵任以方深屬艱虞之斯在而能祗奉王命式遏亂略協贊義舉克著英謀用集厥勲允膺懋賞於以播盛烈於盟府振休聲於軍志非夫忠而能力者其何以臻是哉漢竇嬰孝文皇后從兄子為詹事病免景帝三年吳楚反帝察宗室諸竇無如嬰賢乃拜大將軍守榮陽監齊趙兵以破吳楚功封魏其侯衞青姊為武帝后元光六年青為車騎將軍擊匈奴出上谷青至籠城籠讀與龍同斬首虜數百級是後匈奴仍侵犯邊元朔元年秋青復將三萬騎出鴈門斬首虜數千明年復出雲中西至高闕高闕山名一曰塞名在朔方之北遂至於隴西捕首虜數千畜百餘萬走白羊樓煩王遂取河南地為朔方郡五年春令青將三萬騎出高闕匈奴右賢王當青等兵以為漢兵不能至此飲酒醉漢兵夜至圍右賢王右賢王驚夜逃獨與其愛妾一人騎數百馳潰圍北去漢輕騎校尉郭成等追數百里弗得得右賢禆王十餘人衆男女萬五千餘人畜數十百萬於是引兵而還拜青大將軍明年春青出定襄斬首數千級而還月餘復出定襄斬首虜萬餘人青為大將軍七出擊匈奴斬捕首虜五萬餘級一與單于戰收河南地置朔方郡封長平侯霍去病以衞后姊子年十八為侍中再從大將軍大將軍受詔予壯士為票姚校尉與輕勇騎八百直棄大將軍數百里赴利斬捕首虜過當去病捕虜二千二十八級得相國當戸斬單于大父行藉若侯産捕季父羅姑比再冠軍乃封為冠軍侯元狩三年春為驃騎將軍將萬騎出隴西踰烏盭山名討遫濮匈奴部落涉狐奴水名厯五王國轉戰六日過焉支山千有餘里合短兵鏖臯蘭下殺折蘭王斬盧侯王折蘭匈奴中姓也全甲獲醜執渾邪王子及相國都尉㨗首虜八千九百六十級收休屠祭天金人師率減什七其夏去病與諸將出北地遂深入至祁連山得單于單桓酋涂王及相國都尉以衆降下者二千五百人㨗首虜三萬二百獲五王王母單于閼氏王子五十九人相國將軍當戸都尉六十三人其後率師征匈奴西域王渾邪王捷首鹵八千餘級降異國之王三十二元狩四年春大將軍青與去病各五萬騎青出定襄去病出代郡青出塞千餘里捕斬首虜萬餘級遂至寘顔山留一日而還去病出右北平二千餘里獲屯頭王韓王等三人將軍相國當戸都尉八十三人臨翰海執訊獲醜七萬有四百四十三級李廣利女弟為武帝夫人廣利為貳師將軍發屬國騎及郡國惡少年以往期至貳師城取善馬貳師至輪臺攻數日屠之西行至宛城兵到者三萬宛兵迎擊漢兵漢兵射敗之宛兵走入保其城圍其城攻之四十餘日宛貴人謀曰王母寡匿善馬殺漢使今殺王而出善馬漢兵宜解即不廼力戰而死未晚也宛貴人皆以為然共殺王其外城壊虜宛貴人勇將煎靡宛大恐走入城中相與謀曰漢所為攻宛以王母寡持其頭遣人與貳師約曰漢無攻我我盡出善馬恣其所取而給漢軍糧貳師許宛之約宛乃出其馬令漢自擇之漢軍取其善馬數十匹中馬以下牝牡三千餘匹而立宛貴人為宛王罷而引歸貳師將軍之東諸所過小國聞宛破皆使其子弟從入貢獻見天子因為質焉後漢李通尚光武女弟寧平公主為將軍建武六年夏領破姦將軍侯進捕虜將軍王霸等十營擊漢中賊公孫述遣兵赴救通等與戰於西城破之馬防明徳皇后之弟章帝即位稍遷城門校尉建初二年金城隴西保塞羌皆叛拜防行車騎將軍以長水校尉耿恭副將北軍五校兵及諸郡積射士三萬人擊之防引兵與戰於索西破之羌豪布橋迫急將種人萬餘降詔徴防還拜車騎將軍竇固尚光武女涅陽公主累遷中郎將安帝時以明習邊事為奉車都尉以騎都尉耿忠為副出屯涼州與忠率酒泉敦煌張掖甲卒及盧水羌胡萬二千騎出酒泉至天山擊呼衍王斬首千餘級呼衍王走追至蒲類海留吏士屯伊吾盧城時駙馬都尉耿秉等絶漠六百餘里至三木樓山騎都尉來苗等至匈奴河水上虜皆奔走無所獲太僕祭彤度遼將軍吳棠等坐不至涿邪山免為庶人諸將唯固有功加位特進明年復出玉門擊西域固遂破白山降車師竇憲女弟為章帝后及和帝即位太后臨朝時南單于諸兵北伐乃拜憲車騎將軍金印紫綬官屬依司空依准也長史一人千石椽屬二十九人令史及御屬十二人以執金吾耿秉為副發北軍五校漢有南北軍中侯一人六百石掌臨五營見續漢志黎陽雍營緣邊十二郡騎士光武中興以幽冀并州兵騎克定天下故於黎陽立營以謁者監之又曰扶風都尉部在雍縣以凉州近羌數犯三輔將兵衛䕶園陵故俗稱雍營及羌胡兵出塞明年憲與秉各將四千騎及南匈奴左谷蠡王師子師子其名也萬騎出朔方鷄鹿塞南單于屯屠河屯屠河單于名也將萬餘騎出滿夷谷度遼將軍鄧鴻鄧禹少子及緣邊義從羌胡八千騎與左賢王安國萬騎出稒陽塞稒陽在五原郡皆㑹涿邪山憲分遣副校尉閻盤司馬耿䕫耿譚將左谷蠡王師子右呼衍王須訾等呼衍其號因以為姓匈奴貴種也今呼延姓是其後須訾名也精騎萬餘與北單于戰於稽落山大破之虜衆奔潰單于遁走追擊諸部遂臨私渠北鞮海匈奴中海名也斬名王已下萬三千級獲生口馬牛羊槖駝百餘萬頭於是温犢湏日逐温吴夫渠王柳鞮等八十一部率衆降者前後二十餘萬人憲秉遂登燕然山出塞三千餘里刻石勒功紀漢威徳令班固作銘至和帝永元二年憲以北虜微弱遂欲滅之明年復遣右校尉耿䕫司馬任尚趙博等將兵擊北虜於金微山大破之克獲甚衆北單于逃走不知所在何進女弟為靈帝后中平元年黄巾賊起以進為大將軍屯都亭張角别黨馬元義謀起雒陽進發其姦以功封慎侯何苗進弟也為河南尹榮陽賊數千人羣起攻燒郡縣殺中牟縣令詔使苗出擊之苗攻破羣賊平定而還詔遣使者迎於成臯拜苗為車騎將軍封濟陽侯吳吳景大帝母吳夫人弟也景常隨堅征伐有功拜騎都尉袁術表景領丹陽太守討故太守周昕遂據其郡孫䇿與孫河吕範依景合衆共討涇縣山賊祖郎郎敗走㑹景為劉繇所迫復北依術術以為督軍中郎將與孫賁共討樊能于糜於横江又擊笮融薛禮於秣陵時䇿被創牛渚降賊復反景攻討盡禽之後討劉繇繇奔豫章䇿遣景賁到夀春報術術方與劉備爭徐州以景為廣陵太守術後僭號䇿以書喻術術不納便絶江津不與通使人吿景景即委郡東歸䇿復以景為丹陽太守漢遣議郎王誧音普銜命南行表景為揚武將軍領郡如故徐琨大帝姑子也琨少仕州郡漢末擾亂去吏隨堅征伐有功拜偏將軍堅薨隨孫䇿討樊能于糜等於横江擊張英於當利口而船少欲駐軍更求琨母時在軍中謂琨曰恐州家多發水軍來逆人則不利矣如何可駐邪宜伐蘆葦以為泭佐船渡軍琨具啓䇿䇿即行之衆悉俱濟遂破英擊走笮融劉繇事業克定䇿表琨領丹陽太守㑹吳景委廣陵東歸復為丹陽太守琨以督軍中郎將領兵從破廬江太守李術封廣徳侯遷平虜將軍陳錢道戢字子韜高祖微時以從妹妻焉平盧子略於廣州除濵江令高祖輔政遣道戢隨世祖平張彪於㑹稽以功拜直閣將軍除員外散騎常侍假節東徐州刺史封永安縣侯邑五百戸後魏賀訥道武元舅從道武平中原拜安逺將軍訥弟盧盧弟恱並以從平中原功盧賜爵遼西公恱賜爵鉅鹿侯恱子泥從太武征赫連昌以功進爵為琅琊公劉羅辰宣穆皇后之兄也從平中原以前後勲賜爵永安公以軍功除征東將軍定州刺史唐長孫敞文徳順聖皇后之叔父也仕隋為左衞郎將煬帝幸江都留敞守京城禁苑及義旗入關率子弟迎謁於新豐從平京城以功除將作少監柴紹晉州臨汾人高祖微時妻之以女即平陽公主也武徳元年累遷為左翊衞大將軍從太宗平薛舉破宋金剛攻平王世充於雒陽禽竇建徳於武牢轉右驍衞大將軍吐谷渾與黨項俱來寇邊命紹討之紹見虜陣不整密使精騎自後擊之虜大潰斬首五百餘級貞觀元年擊梁師都於夏州平之竇抗穆皇后從兄也左武侯大將軍領左右千牛備身從太宗平薛舉勲居第一竇徳明太穆皇后兄之孫也武徳初為考功郎中從太宗征王世充頻有戰功封顯武男王仁皎𤣥宗王庶人之父也子守一與𤣥宗有舊及𤣥宗登極以清陽公主妻之從討蕭至忠岑羲等有功自尚乗奉御遷殿中少監特封晉國公竇覦昭成皇后族姪為房州刺史徳宗興元元年討李懐光於河中詔覦以房州兵七百人屯郃陽賊平以功兼御史中丞同州刺史冊府元龜卷三百二
