body:
  text: 册府元龜卷七百七十九宋王欽若等撰總録部高尚第二晉韓績字興齊廣陵人其先避亂居於吴之嘉興父建仕吴至大鴻臚績少好文學以潜退為操布衣蔬食不交當世繇是東土並宗敬焉司徒王導聞其名辟以為掾不就咸康末召拜博士老病不起張茂字成遜虚靖好學不以世利嬰心建興初南陽王保辟從事中郎又薦為散騎侍郎中壘將軍皆不就二年徴為侍中以父老固辭翟湯字道深尋陽人篤行仁讓不屑世事司徒王導辟不就成帝徴為國子博士不起康帝復以散騎常侍徴湯固辭老疾不至年七十三卒於家王舒字處明丞相導之從弟也父㑹侍御史舒少為從兄敦所知以天下多故不營當時名嘗處私門潜心學植年四十餘州禮命太傅辟皆不就及元帝鎮建康因委質焉參領東軍事後授撫軍將軍㑹稽内史以軍功封彭澤縣侯卒祖逖字士雅范陽人僑居陽平年二十四陽平郡察孝亷司𨽻再辟學秀才皆不行嘗為司州主簿後終於鎮西將軍蔡謨弱冠察孝亷州辟從事舉秀才東海王越召為掾皆不就時明帝為東中郎將引為參軍後卒於左光禄大夫卞壼弱冠有名譽司兖二州齊王冏辟皆不就遇家禍還鄉里永嘉中除著作郎後為尚書令右將軍復加領將軍給事中陸阮字士瑶器量淹雅弱冠有美名賀循每稱其清允平當郡檄綱紀東海王越辟為掾皆不就及元帝初鎮江左辟為祭酒後至侍中司空薨伏滔字元度有才學少知名州舉秀才辟别駕皆不就大司馬桓温引為參軍後累遷至游擊將軍卒劉裔東萊掖人漢齊悼惠王肥之後也美姿容善自任遇交結時豪名著海岱間士咸慕之舉賢良辟司空掾並不就幽州刺史王浚表為渤海太守後至平南將軍都督江州卒孔沉字徳度有美名何充薦沉於王導曰文思通敏宜登宰門辟丞相司徒掾瑯邪王文學並不就孫晷司空何充為揚州檄晷為主簿司徒蔡謨辟為掾屬並不就尚書張國明州土之望表薦晷公車特徴㑹卒時年三十八朝野嗟痛之葛洪字稚川大安中石氷作亂吴興太守顧秘為義軍都督與周玘等起兵討之秘檄洪為將兵都尉攻氷别率破之遷伏波將軍氷平洪不論功賞徑至雒陽欲搜求異書以廣其學洪見天下已亂欲避地南土乃參廣州刺史嵇含軍事及含遇害遂停南土多年征鎮檄命一無所就後還鄉里禮辟皆不就赴于寶深相親友薦洪才堪國史選為散騎常侍領大著作洪固辭不就孫惠口訥好學有才識州辟不就寓居蕭沛之間永寧初赴齊王討趙王倫功封晉興縣侯後累遷廣武將軍安豐内史成公簡字公舒東郡人家世二千石性情素不求榮利潜心味道罔有干其志者後官至太子中庶子散騎常侍何凖字㓜道穆帝皇后父也高尚寡欲弱冠知名州府交辟並不就兄充為驃騎將軍勸令其仕凖曰第五之名何减驃騎凖兄弟中第五故有此言充居宰輔之重權傾一時而凖散帶衡門不及人事徴拜散騎侍郎不起卒劉鮞字長魚高密人邴都字宏文城陽人並有高名鮞㓜不慕俗長而希古篤學勵行化流邦邑都魏徴士原之曽孫少有原風勑身謹潔口不妄說耳不妄聽端拱恂恂舉動有禮咸康中成帝愽求異行之士鮞都並被公卿薦舉於是依韓績及翟湯等例以博士徴之都辭以疾鮞隨使者到京師自陳年老不拜各以夀終江惇有高節蘇峻之亂避地東陽山太尉郄鑒檄為兖州治中又辟太尉掾康帝為司徒亦辟焉征西將軍庾亮請為儒林參軍徴拜博士著作郎皆不就邑里宗其道有事必諮而後行東陽太守阮裕長陽令王濛皆一時名士並與惇游處深相欽重養志二十餘年永和九年卒江逌陳留圉人避蘇峻之亂屏居臨海絶棄人事剪茅結宇耽翫載籍有終焉之志本州辟為從事佐著作郎並不就征北將軍蔡謨命為參軍後乃位至太常卒庾衮篤好學問事親以孝聞鄉黨薦之州郡交命察孝亷舉秀才清白異行皆不降志世遂號之為異行元康末潁川太守召為功曹衮服造役之衣杖鍤荷斧不俟駕而行曰請受下夫之役太守飾車而迎衮逡巡辭退請徒行入郡將命者遂逼扶升車納於功曹舍既而衮自取巳車而寢處焉形雖恭而神有不可動之色太守知其不屈乃歎曰非常士也吾何以降之厚為之禮而遣焉王談父為竇度所殺談後以鍤斬度太守孔嚴宥之後太守孔廞究其義行元興三年舉談為孝亷時稱其得人談不應召終於家孟陋字少孤簡文帝輔政命為參軍稱疾不起桓温親往造焉或謂温曰孟陋高行學為儒宗宜引在府以和鼎味温歎曰㑹稽王尚不能屈非敢擬議也陋聞之曰桓公正當以我不往故耳億兆之人無官者居其九豈皆高士哉我疾病不堪忝相王之命非敢為高也繇是名稱益重以夀終於家索襲字偉祖燉煌人虚靖好學不應州郡之命舉孝亷賢良方正皆以疾辭年七十九而卒龔𤣥之字道𤣥武陵漢夀人父登厯長沙相散騎常侍𤣥之好學潜黙安於陋巷州舉秀才公府辟不就孝武下詔徴為散騎常侍領國子愽士郡縣敦逼苦辭疾篤不行卒於家戴逵字安道譙國人居㑹稽剡縣孝武帝時以散騎常侍國子博士累徴辭父疾不就郡縣敦逼不已乃逃於吴國内史王珣有别舘在武邱山逵潜詣之與珣游處積旬㑹稽内史謝𤣥慮逵逺遁不反乃上疏曰伏見譙國戴逵希心俗表不嬰世務棲遲衡門與琴書為友雖䇿命屢加幽操不回超然絶跡自求其志且年埀耳順嘗抱嬴疾時或失適轉至委篤今王命未回將離風霜之患陛下既已愛而器之亦宜使其身名並存請絶其召命疏奏帝許之逵復還剡終於家桓石秀㓜有令名風韻秀徹博渉羣書尤喜老莊嘗獨處一室簡於應接時人方之庾純甚為簡文帝所重尋代叔父冲為寧逺將軍江州刺史鎮南蠻䕶軍西陽太守以疾去職卒殷浩字深源三府辟皆不就征西將軍庾亮引為記室參軍累遷司徒左長史安西庾翼復請為司馬除侍中安西軍司並稱疾不起遂屏居墓所幾將十年於時擬之管葛王濛謝尚猶伺其出處以卜江左興亡因相與省之知浩有確然之志既反相謂曰深源不起當如蒼生何庾翼貽浩書曰當今江東社稷安危内委何褚諸君外託庾桓數族恐不得百一無憂亦朝夕而弊足下少標令名十餘年間位經内外而欲潜居利貞斯理難全且夫濟一時之務須一時之勝何必德均古人韻齊先達邪王夷甫先朝風流士也然吾薄其立名非真而始終莫取若以道非虞夏自當超然獨往而不能謀始大合聲譽極致名位正當抑揚名教以静亂源而乃高談莊老說空終日雖云談道實長華競及其末年人望猶存思安懼亂寄命推務而甫自申述徇小好名既身囚胡虜棄言非所凢明德君子遇㑹處際寧可然乎而世皆然之益知名實之未定弊風之未革也浩固辭不起後簡文帝時在藩始綜萬機徴浩為建武將軍揚州刺史上疏陳讓自三月至七月乃受後為中軍將軍假節都督揚豫徐兖青五州軍事坐事廢為庶人卒郭荷畧陽人明究羣籍特善史書不應州郡之命張祚遣使者以安車束帛徴為博士祭酒使者迫而致之及至署太子友荷上疏乞還祚許之遣以安車蒲輪送還張掖東山卒諡曰𤣥徳先生索紞燉煌人太守隂澹命為西閤祭酒紞辭曰少無山林之操游學京師交結時賢希申鄙藝㑹中國不靖欲養志終年老亦至矣不求聞達又少不習勤老無吏幹濛汜之年弗敢聞命澹以束帛禮之日致羊酒卒於家辛謐字叔重少有志尚恬静不妄交游召拜太子舍人諸王文學累徴不赴劉聰特加大中大夫固辭不受石季龍之世不應辟命終於家楊軻天水人少好易劉曜僣號徴拜太常固辭不赴石季龍備𤣥纁束帛安車徴之以疾辭鄧粲長沙人也少以高潔著名與南陽劉驎之南郡劉尚公同志友善並不應州郡辟命荆州刺史卑辭厚禮請為别駕粲佳其好賢乃起後以疾乞骸骨孫畧字文度吴人終日屢空恬然自足辟命皆不就尚書張國表薦畧公車特徴㑹卒范宣少尚隠遁博綜衆書徴辟並不應卒於家阮裕字思曠成帝時徴侍中不就還剡山後赴成帝山陵事畢便還諸人相與追之裕亦審時流必當逐已而疾去至方山不相及劉惔嘆曰我入東山當泊安石渚下耳不敢復近思曠傍裕在東山乆之復徴散騎常侍領國子祭酒俄而復以為金紫光禄大夫經年敦逼並無所就何琦母服闋乃慨然歎曰所以出身仕者非謂有尺寸之能以效智力實利微禄私展供養一且煢然無復怙恃豈可復以朽鈍之質塵黷清朝哉於是養志衡門不交人事司空陸玩太尉桓温並辟命皆不就詔徴博士又不起簡文帝時為撫軍欽其名行召為參軍固辭以疾公車再徴通直散騎侍郎散騎常侍不行繇是君子仰德莫能屈也桓温嘗登琦縣界山喟然嘆曰此南山有人焉何公真止足者也琦善養性老而不衰布褐蔬食終身後蜀范長生巖居穴處求道養志李雄欲迎立為君而臣之長生固辭宋王宏之字方平瑯邪臨沂人少孤貧為外祖徴士何凖所撫育從叔獻之重之晉安帝隆安中為司徒主簿家貧而性好山水以病歸兄衛尉鎮之安成郡宏之同行家在㑹稽上虞從兄敬宏為吏部尚書奏徴之為庶子不就太祖即位敬宏為左僕射又陳宏之高行表於初業苦節彰於暮年今内外晏然當修太平之化宜招空谷以敦冲退之美又徴為通直散騎常侍不就沈道䖍吴興武康人也少仁愛好老易居縣北石山下孫恩亂後饑荒縣令庾肅之迎出縣南廢頭里為立宅臨溪有山水之玩時復還石山精廬與諸孤兄子共釡庾之資困不改節受琴於戴逵王敬宏深貴重之郡州府凡十二命皆不就文帝聞之遣使存問賜錢三百萬米二百斛給賞委供孤兄子嫁娶徴員外散騎侍郎不就宗炳有孝行植𤣥殷仲文辟皆不就及高祖平荆州辟為主簿不起問其故答曰栖邱隠谷三十餘年高祖善其對妙善琴書精於言理每遊山林往輙忘歸征西長史王敬宏每從之未嘗不彌日也乃下入廬山就釋惠逺考尋文義兄臧為南平太守逼與俱還乃於江陵三湖立宅閑居無事高祖召為太尉參軍不就二兄早卒孤累甚多家貧無以相贍頗營稼穡高祖數致餼賚宋受禪徴為太子舍人元嘉初又徴庶子並不應好山水愛逺遊西陟荆巫南登衡岳因而結宇衡山欲懐尚平之志有疾還江陵歎曰老疾俱至名山恐難徧遊惟當澄懐觀道卧以遊之凡所遊履皆圖之於室陶潜字淵明或云字元亮尋陽柴桑人曽祖侃晉大司馬潜少有高趣自彭澤令棄官而歸嘗著五桞先生傳云先生不知何許人不詳姓字宅邉有五桞樹因以為號焉閒静少言不慕榮利好讀書不求甚解每有㑹意欣然忘食性嗜酒而家貧不能常得親舊知其如此或置酒招之造飲輒盡期在必醉既醉而退曽不􅈔情去留環堵蕭然不蔽風日短褐穿結簞瓢屢空晏如也嘗著文章自娱頗示已志忘懐得失以此自終時人謂之實録義熈末徴著作郎不就龔祁字孟道武陵漢夀人也父黎民及祁並不應徴辟祁風姿端雅容止可觀中書郎范述見而歎曰此荆楚仙人也祁時或賦詩言不及世事卒郭希林武昌人也曽祖翻晉世高尚不仕希林少守家業徴召一無所就卒子蒙亦隠居不仕宗彧之字叔粲少文從父弟也早孤事兄恭謹家貧好學雖文義不逮少文而真澹過之徴辟一無所就元嘉初大使陸子真觀採風俗三詣彧之每辭疾不見告人曰我布衣草萊之人少長隴畝何宜枉軒冕之客子真還表薦之又不就徴卒於家宋景徴太子庶子不就有高名王曇首太保引少弟也㓜有素尚除著作佐郎不就南齊劉善明少而静處讀書刺史杜驥聞名候之辭不相見後刺史劉道隆辟為從事位至淮南宣城太守庾易字㓜簡新野人徙居江陵太祖建元初刺史豫章王辟為驃騎參軍不就世祖永明三年詔徴太子舍人不就以文義書樂安西長史袁彖欽其風通書致遺易以連理機竹翹書格報之明帝建武二年詔復徴為司徒主簿不就卒蔡薈字休明陳留人清抗不與俗人交李撝謂江斆曰古人稱安貧清白曰夷湼而不緇曰白至如蔡休明者可不謂之清白乎宗尚之字敬文好山澤宋末刺史武陵王辟為賛府豫章王辟為别駕並不就世祖永明中與劉虬同徴為通直郎和帝中興初又徴為諮議並不就夀終陶季直好學澹於榮利徴召不起時人號曰聘君王延之少而静黙不交人事州辟主簿不就舉秀才北中郎法曹行參軍轉署外兵尚書外兵部司空主簿並不就沈儼之字士恭吴郡人徐州刺史辟主簿並徴太子洗馬中書郎不赴封延伯字仲璉渤海人也有學行不與世人交事寡嫂甚謹州辟主簿舉秀才不就吴苞字天葢濮陽人善三禮及老莊欝林王隆昌元年詔曰處士濮陽吴苞栖志窮谷秉操真固沉情味古白首彌厲徴太學博士以終辛普明字文達少就闗康之受業豫章王嶷為揚州徴為議曹從事不就徐伯珍字文楚東陽太末人也少孤貧好莊老明道術太守瑯邪王曇生吴郡張淹並加禮辟伯珍應召便退如此者凡十二焉卒於家梁沈顗吴興人讀書不為章句著述不尚浮華獨處一室人罕見其面顗從叔勃貴顯齊世每還吴興賔客填咽顗不至其門勃就見顗送迎不越於閫勃歎息曰吾乃今知貴不如賤俄徴為南郡王左常侍不就永明二年徴著作郎建武二年徴太子舍人永元二年徴通直郎俱不就庾詵性託夷簡特愛林泉十畝之宅山池居半蔬食弊衣不治産業高祖少與詵善雅推重之及起義署為平西府記室參軍詵不屈平生少所遊得河東桞惲欲與之交詵拒而不納後湘東王臨荆州抜為鎮西府記室參軍不就普通中詔徴中書侍郎勒州縣敦遣又稱疾不就諸葛璩世居京口㓜事徴士闗康之齊建武初南徐州行事江祀薦璩於明帝曰璩安貧守道恱禮敦詩未嘗投刺邦宰曵裾府寺如其簡退可以揚清厲俗請辟為議曹帝許之璩辭不去後舉秀才不就劉凝之字隠安小名長生南郡枝江人也慕老萊嚴子陵為人立屋於野外非其力不食辟召一無所就江紑性静好老莊𤣥言尤善佛義不樂進仕范元琰字伯珪吴郡錢塘人也祖恱之太學博士徴不至元琰居常不出城市獨坐如對嚴賓見之者莫不改容正色沛國劉瓛深加器異嘗表稱之齊建武二年始徴為安北參軍事不赴天監九年縣令管惠辯上言義行揚州刺史臨川王宏辟命不至韓懐明上黨人客居荆州居母憂水漿不入口一旬既除喪蔬食終身衣衾無改天監初刺史始興王澹表言之州累辟不就卒於家陳陸慶吴郡人少好學遍通五經天嘉初徴為通直散騎侍郎不就永陽王為吴郡太守聞其名欲與相見慶固辭以疾時宗人陸榮為郡五官慶嘗詣焉王乃微服往榮所穿壁以觀之王謂榮曰觀陸慶風神凝峻殆不可測嚴君平鄭子真何以尚兹鄱陽晉安王俱以記室徴並不就乃築室屏居以禪誦為事繇是傳經受業者葢鮮矣後魏高燮字秀和小字淳于亦有文才太武每詔徴辭疾不應嘗譏笑兄允屈折允官栖泊京邑燮常從容於家李謐字永和涿郡人少好學博通諸經州再舉秀才公府二辟並不就惟以琴書為業有絶世之心謐不飲酒好音律愛樂山水高尚之情長而彌固一遇其賞悠爾忘歸及卒詔諡曰貞静處士表其門曰文徳里曰孝義劉獻之博陵人門徒數百皆通經士本郡舉孝亷非其好也逼遣之乃應命至京稱疾而還孝文幸中山詔徴典内校書獻之喟然歎曰吾不如莊周散木逺矣一之為甚其可再乎固以疾辭張感字崇仁有器業不應州縣之命樊遜為右僕射崔暹賓客人有譏其靖黙不能趣時者嘗服東方朔之言陸沉世俗避世金馬何必深山蒿蘆之下遂借陸沉公子為主人擬客難製答客每以自廣後崔暹大㑹賓客大司馬襄城王元旭時亦在坐論欲命府僚暹指遜曰此人學富才高佳行參軍也旭目之曰豈能就耶遜曰家無䕃弟不敢當此張僧皓厯渉羣書工於談說有當世名孝明熈平初徴為諫議大夫正光五年以國子博士徴之孝昌二年徴為散騎侍郎並不赴世號為徴君焉眭夸趙高邑人高尚不仕寄情邱壑同郡李順願與之交拒而不許少與崔浩為莫逆之交浩為司空奏徴為郎辭疾不赴州郡逼遣不得已入京都與浩相見經留數日惟飲酒談說平生不及世利浩每欲論屈之竟不能發言其敬憚如此浩後遂投詔書於夸懐亦不開口夸曰桃簡卿已為司徒何足以此勞國士也吾便於此將别桃簡浩小名也浩慮夸即還時乘一騾更無兼騎浩乃以夸騾内之廐中冀相維縶夸遂託鄉人輸租者謬為御車乃得出闗浩知而歎曰眭夸獨行士本不應以小職辱之又使其人杖䇿復路吾當何辭以謝也時朝法甚峻夸既私還將有私歸之咎浩仍相左右始得無坐經年送夸本騾兼遺以所乗馬為書謝之夸更不受其騾馬亦不復書及浩誅為之素服受鄉人弔唁經一時乃止歎曰崔公既死誰能更容眭夸遂作朋友篇辭義為時人所稱婦父鉅鹿魏攀當時名達之士未嘗備子聓之禮情同朋好或人謂夸曰吾聞有大才者必居貴仕子何獨在桑榆乎遂著知命論以釋之高和仁少清簡有文才嘗有高尚之志後為雒州録事參軍不赴服餌於汲郡白鹿山未幾卒時人悼惜之北齊祖茂頗有詞情然好酒性率不為時重太寧中以經學為本鄉所薦除給事以疾辭仍不復仕從父兄班受任寄故令呼茂茂不獲已暫來就之班與官茂乃逃去盧懐仁渉學有辭情性恬靖嘗蕭然得閒放之致厯太尉記室𢎞農郡守不之任卜居陳留界後周韋􅞅字敬逺志尚夷簡澹於榮利弱冠被召拜雍州中從事非其好也遂謝疾去前後十見徴辟皆不應命號逍遥公隋張文詡河東人博覽文籍高祖引致天下名儒碩學之士延之於博士位時文詡游太學其門生多詣文詡請質疑滯文詡輒博引證據辯說無窮惟其所擇治書侍御史皇甫誕一時朝彦嘗執弟子之禮適至南臺遽飾所乗馬就學邀屈文詡每牽馬步進意在不因人以自致也右僕射蘇威聞名而召之與語大恱勸令從官文詡意不在仕固辭焉仁夀末學廢文詡䇿杖而歸灌園為業州郡頻舉皆不應命每閒居從容長歎曰老冉冉而將至恐修名之不立以如意擊几皆有處所時人方之閔子騫原憲焉終於家年四十鄉人為立碑頌號曰張先生李士謙字子約趙郡人博覽經籍兼善天文術數齊吏部尚書辛術召署員外郎趙郡王濬舉徳行皆稱疾不就和士開亦重其名將諷朝廷擢為國子祭酒士謙知而固辭得免隋有天下畢志不仕武儉雅好墳籍養素邱園州縣屢徴不就崔廓字士𤣥博陵安平人博覽書籍多所通涉山東學者皆宗之既還鄉里不應辟命唐衛大經者篤學善易口無一言則天降詔徴之辭疾不起李元愷者博學然性恭慎口未嘗言鄉人宋璟年少時師事之及璟作相使人遺元愷束帛將薦舉之皆拒而不答白履忠陳留浚儀人也博涉文史嘗隠居於古大梁城時人號為梁邱子景雲中徴拜校書郎尋棄官而歸開元十年刑部尚書王志愔薦履忠隠居讀書身苦守操有古人之風堪代褚無量馬懐素入閤侍讀十七年國子祭酒楊瑒又表薦履忠堪為學官乃徴赴京師及至辭以老病不任職王績絳州龍門人也少與李播吕才為莫逆之交大業中應孝悌亷潔舉揚州六合縣丞非其所好棄官還鄉里績河渚中先有田十數頃鄰渚有隠士仲長子先服食養性績重其真素願與相近乃結廬河渚以琴酒自樂嘗遊北山因為北山賦以見志又嘗躬耕於東臯故時人號東臯子或經過酒肆動經數日往往題壁作詩多為好事者諷詠田佐時潞州人也佐時偉容儀涉獵經史好大言時務徳宗建中三年徴為左拾遺集賢院直學士黜陟使裴洎言上薦故拜官宰相張鎰以為徴命稍輕請加恩禮復有詔褒美賜絹百疋粟百石仍令州縣長吏就家以禮徴聘竟不起貞元元年八月以佐時為諫議大夫佐時隠居於潞州懐道高尚觀察使李抱真數薦之自拾遺至諫議皆不起楊播少隠居至徳中賜號𤣥靖先生寳應初授諫議大夫致仕鄭珣瑜字元伯鄭州滎澤人喪父遭安禄山之亂躬耕陸渾山下以養母及撫弟妺未嘗干擾州里轉運使劉晏連奏為寧陵宋城二縣尉皆不起山南節度使張獻誠奏為梁州南鄭丞亦謝不就韋楚京兆尹韋長之兄文宗太和八年以楚為左拾遺内供奉竟以自樂閒澹不起晉崔棆梲之兄也有隠徳好釋氏閒居滑州嘗欲訪人於白馬津比及臨岸歎曰波勢洶湧如此安可濟乎乃止後徴授左拾遺辭疾不赴册府元龜卷七百七十九
