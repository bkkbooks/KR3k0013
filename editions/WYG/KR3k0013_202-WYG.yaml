body:
  text: 冊府元龜卷二百二宋王欽若等撰閏位部祥瑞第二宋明帝泰始元年二月丙寅揚州淮水清潔有異於常州治中從事史張緒以聞乙亥白鹿見宣城宣城太守劉勰以聞己亥白鹿見長沙湘州刺史劉韞以獻二年三月丙午黄紫雲從景陽樓出隨風回乆乃消華林園令臧延之以聞四月乙未甘露降上林苑苑令徐承道以獻庚申甘露降華林園園令臧延之以獻五月甲寅赭中獲石柏長三丈二尺廣三尺五寸揚州刺史建安王休仁以獻乙亥甘露降丹陽秣陵縣舍齋前竹丹陽尹王景文以獻六月丁巳白烏見吳郡海鹽太守顧顗之以獻己邜日入後有黄白赤白氣東西竟天光明潤澤乆乃消是月白燕見零陵獲以獻七月戊子白雀見虎檻洲都督征討諸軍建安王休仁以聞己酉嘉禾生㑹稽永興太守巴陵王休若以聞八月丙辰朔四眼龜見㑹稽會稽太守巴陵王休若以獻五城澳池二蓮同榦都水使者羅僧愍以獻戊午嘉𤓰生南豫州刺史山陽王休祐以獻己未豫州刺史山陽王休祐獻蓮二花一蔕丙寅六眼龜見東陽長山文如爻卦太守劉勰以獻是月於赭圻城南得紫玉一段圍三尺二寸長一尺太宗攻為二爵以獻武文二廟九月庚寅青雀見京城内南徐州刺史桂陽王休範以獻壬寅白烏見吳興烏城太守都顒以獻十月己巳幸華林天淵池白魚躍入御舟三年二月壬寅白䑕見樂安青州刺史沈文秀以獻五月癸酉白麞見南東海丹徒南徐州刺史桂陽王休範以獻乙亥白鴝鵒見京兆雍州刺史巴陵王休若以獻乙邜白麞見北海都昌青州刺史沈文秀以獻十一月乙邜盱眙獲石柏寜朔将軍段佛榮以獻庚申甘露降晉陵太守王藴以聞癸亥甘露降南東海丹徒建岡南徐州刺史桂陽王休範以聞十二月壬午甘露降崇寜陵揚州刺史建安王休仁以聞四年十一月辛未崇寜陵尚書言自大明八年至今四年二月宣太后陵明堂前後有光及五色雲又芳香四滿又五彩雲在松下狀如車蓋五年正月癸邜白麞見汝隂樓煩豫州刺史劉勔以獻五月壬戌豫章南昌獲古銅鼎容斛七㪷江州刺史王景文以獻六月甲子嘉蓮生湖熟南䑓侍御史竺曽度以聞十月庚辰郢州獲𤣥璧廣八寸五分安西将軍蔡興宗以獻六年六月壬子嘉蓮生東宫𤣥圃池皇太子以聞七月壬午白雀二見廬陵吉陽内史江孜以聞九月己巳八眼龜見吳興故鄣太守禇淵以獻十二月乙未白鹿見梁州刺史杜㓜文以聞十年四月戊申夜京邑崇虚館堂前有黄氣狀如寳蓋高十許丈漸有五色道士陸脩静以聞六月甲寅義陽郡獲銅鼎受一斛并蓋並隠起鏤豫州刺史段佛榮以獻泰豫元年四月己酉㑹稽山隂思義醴泉出太守蔡興宗以聞六年辛丑白雀見廣州刺史孫超以聞十月壬戌白麞見義興國山太守王藴以獻義興陽羡縣獲毛龜太守王藴以獻後廢帝元徽元年正月甲午白麞見海陵寧海太守孫嗣之以獻二年三月甲子白鹿見鬱州青冀二州刺史西海太守劉善明以獻四年三月醴泉出昌國白鹿山其味甚甘十一月乙巳甘露降吳興烏程太守蕭恵明以聞五年四月己巳白雀二見尋陽柴桑江州刺史邵陵王友以獻順帝昇平二年十一月甘露降南東海武進彭山太守謝頊以聞又甘露降長城下山太守王奐以聞十二月甘露降建康禁中里是年宣城山中生紫芝一株在所獲以獻三年三月白虎見歴陽龍元縣新昌村新昌嘉名也瑞應圗王者不暴白虎出白虎仁獸也是年騶虞見東安縣五界山獅子頭虎身龍脚詩傳曰騶虞獸白虎黒文不食生物至徳則出南齊太祖建元元年正月拜皇太子日有慶雲在日邉又新蔡郡固始縣嘉禾一莖五穂四月有司奏延陵令戴景度稱所領季子廟舊有湧井二所廟祝列云舊井北忽聞金石聲即掘深三尺得沸泉其東忽有聲錚錚又掘得泉沸湧若浪中得一銀木簡長一尺廣二寸上有隱起文曰廬山道人張陵再拜謁闕起居簡木堅白而字色黄謹按瑞應圖浪井不鑿自成王者清靜則仙人主之孔氏世録云叶精帝道孔書明巧當在張陵宋均註云張陵佐封禪一云陵仙人也五月白烏見巴郡八月男子王約獲白雀一頭九月甘露降淮南郡桃石榴二株有司又奏甘露降汲縣王安世園樹秣陵縣獲白雀一頭十月涪陵郡蜑民田健所住嵓間常留雲氣有聲響徹若龍吟求之積歳莫有見者去四月二十七日嵓數里夜忽有雙光至明往獲古鐘一枚又有一器名錞于蜑人以為神物奉祠之十一月固始縣獲嘉禾一莖九穗是年臣欽若等曰史臣不書月郢州監利縣天井湖水色忽澄清出綿百姓採以為纊三年華林園醴泉堂東忽有瑞雲周圍十許丈髙下與景雲樓平五色藻宻光彩映山徘徊良久轉南行過長船入華池大鳥集東陽郡太守沈約表云鳥身備五彩赤色居多案樂緯叶圖徵云焦明鳥質赤至則德之感也武帝永明元年五月木連理生安成新喻縣又生南梁陳縣郢州丁坡屯獲白雀一頭閏月璿明殿外閣南槐樹連理新蔡縣獲嘉禾二莖九穗一莖七穗鹽官縣内村木連理二年正月冠軍將軍周晉孫於石頭北廂將堂見地有異光照城堞往獲玉璽一鈕方七分文曰明𤣥君四月白雀集郢州府館又甘露降南郡桐樹五月白雀見㑹稽永興縣七月新冶縣槐栗二木合生異根連理去地數尺中央小開上復為一又烏程縣陳文則家槿樹連理九月有司奏上虞縣楓樹連理兩根相去九尺雙株均聳去地九尺合成一幹故鄣縣楓樹連理兩株相去七尺大八圍去地一丈仍相合為樹泯如一木山陽縣界若耶村有一槻木合為連理淮隂縣建業寺木連理建康縣棃樹耀欀五圍連理六枝十一月魏國民齊祥歸入靈丘關聞殷然有聲仰視之見山側有紫氣如雲衆鳥囘翔其間祥往氣所獲璽方寸四分獸鈕文曰坤維聖帝永昌送與魏太后師道人慧度欲獻魏主慧度覩其文窺謂當今衣冠正朔在于齊國遂附道人慧臧送京師因羽林監崔士亮獻之是年江陵縣獲白鼠一頭又休安陵獲白龜一頭又彭澤縣獲白雉一頭乂順陽丹光縣山下得古鼎一枚又䕶軍府門外桑樹一株並有蠶絲綿被枝莖漢光武時有野蠶成繭百姓得以衣服今則浮波幕樹其亦此之類乎三年正月安成縣榆樹二株連理四月白雀見臨汝縣七月安成王暠第獲白雀一頭又始興郡民龔𤣥宣云去年二月忽有一道人乞食因採懐中出篆書真經一卷六紙又表北極一紙又移付羅漢居士一紙云從兠率天宫下使上送天子因失道人所在𤣥宣又稱神人授皇帝璽龜形長五寸廣二寸厚二寸五分上有天子字中央蕭字下有萬世字八月梁郡睢陽界野田中獲嘉禾一莖二十三穗九月南郡江陵縣獲白雀一頭又句陽縣之榖山槿樹連理異根雙挺共杪為一十一月永寧左郡樠木連理是年越州南髙涼住人海中網魚獲銅獸一頭銘曰作寳鼎齊臣萬年子孫承寳四年二月甘露降臨湘縣李樹三月甘露降南郡桐樹三足烏巢南安中陶縣庭中又秣陵縣喬天明園中李樹連理生高三尺五寸兩枝别生復高三尺合為一幹又白虎見安蠻䖍化縣四月甘露降睢陽縣桃樹是年丹陽縣獲白兎一頭東昌縣山自比歳以來常發異響去二月十五日有一巖禠落縣民方元泰往視於巖下得古鐘一枚青龍見順陽郡清水縣平泉湖五年正月秣陵縣華僧秀園中四樹連理三月豫寜縣長崗山獲神鐘一枚四月甘露降荆州府中閣外桐樹六年建城縣昌城田獲四目龜一頭腹下有萬齊字八月延寜縣王恵獲六目龜一頭腹下有萬歡字并有卦兆九月莒縣獲嘉禾一株是年山隂縣孔廣家園檉樹十二層㑹稽太守隋王子隆獻之種芳林苑鳯光殿西武騎常侍唐潜上青毛神龜一頭望蔡縣獲白鹿一頭南豫州刺史建安王子真表獻金色魚一頭六年四月江寜縣北界頼鄉齊平里三城邏門外路東太常蕭恵基園楥樹二株連理其高相去二尺南大北小小者傾柯南附合為一枝葉繁茂圓宻如蓋是年白鼠見芳林園蒲濤縣亮野村獲白麞一頭甘露降芳林園故山堂桐樹七年六月鹽官縣獲白雀一頭是年黄龍見曲江縣黄池中一宿二日越州獻白珠自然作思惟佛像長三寸起禪靈寺置刹下江寧縣李樹二株連理兩根相去一丈五尺鬱林獲白雉一頭荆州獲白麞一頭又吳郡太守江斆於錢塘縣獲蒼玉璧一枚以獻又齊興太守劉元寳治郡城於塹中獲錢數百萬形極大以獻臺為瑞世祖班賜朝臣以下各有差又主書朱靈讓於浙江得靈石十人舉乃起在水深三尺而浮世祖親投於天淵池試之刻為佛像八年三月武陵白沙戍槻木連理相去五尺俱高三尺東西二枝合而通柯四月陽羡縣獲白烏一頭五月陽城縣獲紫芝一株十二月柴桑縣陶委天家樹連理是年餘干縣獲白麞一頭天門臨澧縣獲白雀一頭巴陵郡連理四株又天忽黄色照地衆莫能觧司徒法曹王融上金天頌云是即金天所謂榮光武帝大悦始興郡昌樂村獲白鳩一頭又餘干縣獲白麞一頭九年五月長山縣獲神龜一頭腹有巽兑卦七月吳郡錢塘縣獲白雀一頭八月豫州獲白雀一頭甘露降上定林寺佛堂庭中天如雨遍地如雪其氣芳其味甘耀日舞風至晡乃止爾後頻降鍾山松樹四十餘日乃止十月甘露降大安陵樹十一月寜蜀廣漢縣田所墾地八尺四寸獲古鍾一枚形高三尺八寸圍四尺七寸懸柄長一尺二寸合高五尺四面各九孔夜中於陶所瓦間見有白光窺尋無物自後夜夜輒復有光既經旬日村民張慶宣瓦作屋又於屋間見光炤内外慶宣疑之以告孔休先乃共發視獲玉璽一鈕璧方八寸上有鼻文曰帝真又曲阿縣民黄慶宅左有園園東南廣袤四丈每種菜輒鮮異雖加採掇隨復更生夜中長有白光皎質屬天状似懸絹慶疑非常請師卜侯道士𫝊徳占使掘之深三尺獲玉印一鈕文曰長承萬福是年臨湘縣獲白鹿一頭義陽安昌縣獲白麞一頭秣陵縣鬭塲里安明寺有古樹衆僧改架屋宇伐以為薪剖樹木裏自然有法大徳三字又始興郡本無欓樹調味有闕世祖在郡堂屋後忽生一株十年五月齊郡獲白雀一頭六月海陵齊昌縣獲嘉禾一莖六穂是年青州獲白雉一頭司州清激戍獲白麞一頭蘭陵民齊伯生於六合山獲金璽一鈕文曰年予主青州洍液戍獲白雉一頭十一年九月睢陽縣里中獲嘉禾一株是年廣陵海陵縣獲白麞一頭鬱林王隆昌元年正月襄陽縣獲紫芝一莖四月陽羡縣獲白烏一頭和帝中興二年正月邏将潘道益于山石穴中獲毛龜一頭二月白虎見東平夀張安樂村三月甘露降茅山彌漫數里是年山上雲障四塞頃有𤣥黄五色如龍形長十餘丈從西北昇天梁高祖天監元年七月癸邜鸞鳥見樂逰苑四年四月自甲寅至壬戌甘露連降華林園五月建康縣朔隂里生嘉禾一莖十二穂八月庚子老人星見五年四月丙申廬陵高昌之仁山獲銅劒二始豐縣獲八目龜一八月戊戌老人星見六年二月甲辰老人星見六月新吳縣獲四目龜一九月嘉禾一莖九穂生江陵縣七年四月辛未秣陵縣獲靈龜一八月甲戌老人星見十一月辛巳鄞縣言甘露降八年二月壬戌老人星見八月戊午老人星見九年七月己巳老人星見十年二月戊申騶虞一見荆州華容縣五月癸酉安豐縣獲一角𤣥龜乙酉嘉蓮一莖三花生樂逰苑十二月癸酉山車見于臨成縣十一年二月新昌濟陽二郡野􅅙成繭十三年二月丁亥老人星見十四年二月戊戌老人星見八月乙未老人星見十五年八月老人星見十六年二月庚戌老人星見四月潮溝獲白雀八月辛丑老人星見十七年二月甲申老人星見八月壬寅老人星見十八年二月戊午老人星見七月甲申老人星見普通元年二月壬子老人星見八月庚戌