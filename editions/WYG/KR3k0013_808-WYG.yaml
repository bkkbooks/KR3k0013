body:
  text: 冊府元龜卷八百八宋王欽若等撰總録部逺名勢避嫌嫉惡逺名勢詩曰既明且哲以保其身又語曰以約失之者鮮矣故士君子藴明哲之心秉貞靜之操畏權臣之盛滿將求婚而輒拒避貴戚之氣熖彼願交而不答不屑毁譽而盡心納忠靜退守貞而罔求干預或不矜於富貴或不就其徵辟時人重其立志來者仰其清風載諸縑緗斯可尚矣漢劉德為宗正妻死大將軍霍光欲以女妻之德不敢畏盛滿也雋不疑為京兆尹大將軍霍光欲以女妻不疑固辭不敢當後漢鄧禹封髙密侯以特進奉朝請禹以天下既定當逺名勢王丹京兆下邽人資性方㓗鄧禹表丹領左馮翊稱疾不視事免歸後徵為太子太傅時大司徒侯霸欲與交友及丹被徵遣子昱候於道昱迎拜車下丹下答之昱曰家公欲與君結交何為見拜丹曰君房有是言丹未之許也張霸為侍中時皇后兄虎賁中郎將鄧隲當朝貴戚聞霸名行欲與為交霸逡巡不答李通尚寧平公主為大司空通性謙恭常避權勢謝病不視事馬廖援子也少以父任為郎明德皇后立為虎賁中郎將廖性質誠畏慎不受權勢聲名盡心納忠不屑毁譽王謙父暢祖龔皆為三公謙為大將軍何進長史進以謙名公之胄欲與為婚見其二子使擇焉謙勿許以疾免卒於家晉鄭黙為光祿勲后父楊駿先欲以女妻黙子豫黙曰吾每讀雋不疑𫝊常想其人畏逺權貴奕世所守遂辭之解系梁州刺史脩之子也清身潔己時荀勗門宗强盛朝野畏憚之勗諸子謂系曰我與卿為友應向我公拜朂又曰我與尊先使君親厚系曰未奉先君遺教公若與先君厚往日哀頓當垂書問親厚之誨非所敢承宋謝瞻晉末為宋國中書黄門侍郎相國從事中郎弟晦時為宋臺右衛權遇已重於彭城還都迎家賓客輻輳門巷填滿時瞻在家驚駭謂晦曰汝名位未多而人歸趣乃爾吾家素以靜退為業不願干豫時事交遊不過親朋而汝遂勢傾朝野此豈門户之福耶乃籬隔門庭曰吾不忍見此及還彭城言於髙祖曰臣本素士父祖位不過二千石弟年始三十志用凡近榮冠臺府位任顯密福過災生其應無逺特乞降黜以保衰門前後屢陳髙祖欲以瞻為吳興郡又自陳請乃為豫章太守晦或以朝廷密事語瞻瞻輒向親舊陳説以為笑戲以絶其言晦遂建佐命之功任寄隆重瞻愈憂懼永初二年在郡遇疾不肯自治幸於不永晦聞疾奔往瞻見之曰汝為國大臣又總戎重萬里逺出必生疑謗時果有訴告晦反者瞻疾篤還都髙祖以晦禁旅不得出宿使瞻居于晉南郡公主壻羊賁故第在領軍府東門瞻曰吾有先人弊廬何為於此臨終遺晦書曰吾得啓體幸全歸骨山足亦何所多恨弟思自勉勵為國為家遂卒時年三十五謝㬭晦弟也初為州主簿中軍行參軍太子舍人俄遷秘書丞自以兄居權貴已䝉超擢固辭不就王敬𢎞臨沂人也文帝元嘉中為左光禄大夫東歸後徵為太子少傅不就子恢之被召為祕書郎敬𢎞為奉朝請與恢之書曰秘書有限故有競朝請無限故無競吾欲使汝處於不競之地太祖嘉而許之謝𢎞微為右衛將軍元嘉六年東宫始建領中庶子又尋加侍中𢎞微志在素官畏忌權寵固讓不拜乃聴解中庶子孟顗字彦重本昌安人兄昶貴盛顗不就徵辟昶死後起家為東陽太守江湛為彭城王義康司徒主簿太子中舍人司空檀道濟為子求湛妹婚不許義康有命又不從時人重其立志義康欲引與日夕湛固求外出乃以為武陵内史後魏楊津有六子長子遁字山才其家貴顯諸子弱冠咸縻王爵而遁性澹退年近三十方為鎮西府主簿北齊韓晉明嗣封東萊王有俠氣朝廷處之貴要必以疾辭告人云廢人飲美酒對名勝安能作刀筆吏披反故紙乎武平末為僕射百餘日便解官後周蔡祐明帝時為小司馬帝之為公子也與祐友昵及即位禮遇彌隆祐嘗辭疾避之至於婚姻尤不願交於勢要唐薛元敬收之從父兄子也為天策府參軍兼掌記室與收俱為文學館學士時房杜等處心腹之寄深相友託敬畏於權勢竟不之狎如晦嘗云小記室不可得而親不可得而疎王義方泗州漣水人也少孤貧事母甚謹博通五經而蹇傲獨行初授晉王府參軍直𢎞文館特進魏徵甚禮之將以姪女妻之義方固辭無幾徵卒義方竟娶徵之姪告人曰昔不附宰相之勢今感知己之言故也楊於陵為潤州句容主簿韓滉節鎮金陵以女妻之秩滿為岳鄂江西二府從事累官至侍御史韓滉自江南入朝總將相財賦之任德宗頗任遇權傾中外於陵自江西府罷卜築於建昌以讀書山水為樂滉殁德宗貞元八年徵拜膳部員外郎韓公武自宣武馬部都虞侯將兵誅蔡賊授鄜州節度使憲宗元和十四年父𢎞入朝公武乞罷節度入為右金吾將軍既而𢎞出鎮河中季父充乃移鎮宣武歎曰二父聯居重鎮吾以孺子當金吾之職家門之盛懼不克勝堅辭宿衛改右驍衛將軍性頗恭遜不以富貴自處王龜宣宗大中中為太常少卿以弟鐸入相不願在朝出為同州防禦使後唐孔邈兖州曲阜人文宣王四十一代孫乾寧五年登進士第除校書郎崔逺在中書奏萬年尉充集賢校理以親舅獨孤損方在廊廟避嫌不赴職避嫌夫處簪纓之族任臺閣之官而有服之親不敢相臨蓋避嫌之道也若乃父秉國鈞而靡求仕進兄居柄用而固辭近職此蓋奉公之亮節飾身之逺謀雖與内不避親疎不避􅄷者殊然而閑邪存誠防微杜漸亦足尚矣宋傅隆為尚書左丞以族弟亮為僕射緦服不得相臨徙太子率更令王球為義興太守從兄𢎞為揚州以服親不得相臨遂加宣威將軍唐蘇頲弟詵初拜給事中時頲為中書侍郎上表讓詵所授𤣥宗曰古來有内舉不避親乎頲曰晉祁奚是也𤣥宗曰若然則朕用蘇詵何得屢言近日卿父子猶同在中書兄弟有何不得卿言非至公也馬炫為左散騎常侍以弟燧拜司徒兼侍中以親避轉刑部侍郎李德裕字文饒㓜有壯志苦心力學尤精西漢書左氏春秋恥與諸生從鄉賦不喜科試年纔及冠志業大成貞元中以父吉甫譴蠻方隨侍左右不求仕進元和初以父再秉國鈞避嫌不仕臺省累辟諸府從事杜從郁為左拾遺司徒佑之子也元和元年九月以從郁為祕書丞郁始自太子司議郎為左補闕右補闕崔羣韋貫之左拾遺獨孤郁等上疏以為宰相之子不合為諫諍之官於是降為左拾遺羣等又奉云拾遺與補闕雖資品不同而皆是諫官父為宰相而子為諫官若政有得失不可使子論父於是改授權德輿元和五年入相起居郎翰林學士獨孤郁以德輿之壻命守本官罷學士鄭瀚為考功員外郎改國子博士史館脩撰以父任僕射故也王起為吏部侍郎文宗太和元年六月以起為兵部侍郎充集賢殿學士判院事時起兄播為僕射平章事起在選部非便故移於他曹以集賢之職兼之梁趙光裔為翰林學士中書舍人開平三年為光禄太常少卿以兄光逢擢升相位固辭近職避親嫌也後唐孔邈為萬年尉充集賢校理以親舅獨孤損在中書避嫌不赴職楊注為户部侍郎充翰林學士宰相涉之弟也哀帝二年三月勅兄既秉於樞衡弟故難居宥密可守本官罷内職嫉惡仲尼有言曰惟君子能好人能惡人蓋有挺勁直之性稟直清之操嫉夫姦佞形於言色以至當官而行守法無貳抗志靡惑繇衷自信或裂裳裹足以長騖或操觚著論以申貶周愛陳迹以洩其憤怒激厲薄俗以扶於名教責敗田之夫鄙其繇徑譏貝錦之子斥是䜛言惡彼犬羊之質奮兹鷹鸇之志非剛毅中立卓然有守者孰能及於是哉其或觀過所從不於其黨多僻之世疾之已甚良非斯人之徒與齊公子元其弟商人弑其君舍而自立是為懿公公子元不順懿公之為政也終不曰公曰夫已氏猶言某甲介子推晉人秦送文公至河舅犯曰臣從君周旋天下過亦多矣臣猶知之况於君乎請從此去矣重耳曰若反國所不與子犯共者河伯視之乃投璧河中以與子犯盟是時介子推從在船中乃笑天實開公子而犯以為已功而要市於君固足羞也吾不忍與同位乃自隱陳文子齊大夫崔子弑其君陳文子有馬十乘棄而違之崔杼作亂陳文子惡之棄其四十匹馬違而去也至於他邦則曰猶吾大夫崔子也子産鄭大夫也鄭徐吾犯之妹美犯鄭大夫公孫楚聘之矣楚子南穆公孫公孫黒又使强委禽焉禽鴈也納采用鴈犯懼告子産子産曰是國無政非子之患也惟所欲與犯請於二子使女擇焉皆許之子晳盛飾而入布幣而出布陳贄幣子晳公孫黒子南戎服入左右射超乘而出女自房觀之曰子晳信美矣抑子南夫也言丈夫夫夫婦婦所謂順也適子南氏子晳怒既而櫜甲以見子南欲殺之而取其妻子南知之執戈逐之及衝擊之以戈衝交道子晳傷而歸告大夫曰我好見之不知其有異志也故傷大夫皆謀之子産曰直均㓜賤有罪罪在楚也先聘子南直也用戈子晳直也子産力未能討故均其事歸罪於楚乃執子南而數之曰國之大節有五女皆奸之奸犯也畏君之威聽其政尊其貴事其長養其親五者所以為國也今君在國女用兵焉不畏威也奸國之紀不聽政也奸國之紀謂傷人子晳上大夫女嬖大夫而弗下之不尊貴也㓜而不忌不事長也忌畏也兵其從兄不養親也君曰余不女忍殺宥女以逺勉速行乎無重而罪鄭放㳺楚於吳將行子南子産咨於太叔太叔㳺楚之兄子太叔曰吉不能亢身焉能亢宗亢蔽也彼國政也非私難也子圖鄭國利則行之又何疑焉周公殺管叔而蔡蔡叔蔡放也夫豈不愛王室故也吉若獲戾子將行之何有於諸㳺昭公二年秋鄭公孫黒將作亂欲去游氏而代其位㳺氏太叔之族黒為㳺楚所傷故欲害其族傷疾作而不果前年㳺楚所擊創駟氏與諸大夫欲殺之駟氏黒之族子産在鄙聞之懼弗及乘遽而至遽驛傳使吏數之責數其罪曰伯有之亂以大國之事而未爾討也務共大國之命不暇治女罪爾有亂心無厭國不女堪專伐伯有而罪一也昆弟爭室而罪二也謂爭徐吾犯之妹薫隧之盟女矯君位而罪三也謂使太史書七子有死罪三何以堪之不速死大刑將至再拜稽首辭曰死在朝夕無助天為虐子産曰人誰不死凶人不終命也作凶事為凶人不助天其助凶人乎請以印為禇師印子晳之子褚師市官子産曰印也若才君將任之不才將朝夕從女女罪之不恤而又何請焉不速死司冦將至七月壬寅縊尸諸周氏之衢衢道也加木焉書其罪于木以加尸上又子産治鄭鄧析務難之與民之有獄者約大獄一衣小獄襦䘹民之欲衣襦䘹而學訟者不可勝數以非為是以是為非是非無度而可與不可日變所欲勝因傅致其罪鄭國大亂民口諠譁子産患之於是殺析民心是非乃定法律乃行向戌為宋左師魯襄公十七年華閱卒華臣弱臯比之室臣閱之弟臯比閱之子弱侵易之使賊殺其宰華吳賊六人以鈹殺諸盧門合左師之後盧門宋城門合左師向戌也賊殺華吳于向戌屋後左師懼曰老夫無罪賊曰臯比私有討于吳遂幽其妻幽吳妻也曰畀余而大璧畀與也宋公聞之曰臣也不唯其宗室是暴大亂宋國之政必逐之左師曰臣也亦卿也大臣不順國之恥也不如蓋之乃舍之左師為已短策茍過華臣之門必騁昭公六年寺人栁有寵有寵于平公太子佐惡之華合比曰我殺之欲以求媚太子栁聞之乃坎用牲埋書詐為盟書而告公曰合比將納亡人之族亡人謂華臣也既盟于北郭矣公使視之有焉遂逐華合比合比奔衛于是華亥欲代右師亥合比弟也欲代合比得其處乃與寺人栁比從為之徵曰聞之久矣聞合比欲納華臣為右師公使代之代合比見于左師左師曰女夫也必亡夫謂華亥女喪而宗室于人何有人亦於女何有言人亦不能愛汝詩曰宗子維城毋俾城壞毋獨斯畏詩大雅宗子之固若城俾使也女其畏哉叔孫昭子魯大夫也昭公十年昭子聘晉齊髙强奔魯昭子至自晉大夫皆見髙强見而退髙强子良昭子語諸大夫曰為人子不可不慎也哉昔慶封亡子尾多受邑而稍致諸君君以為忠而甚寵之將死疾于公宫在公宫被疾輦而歸君親推之推其車而送之其子不能任是以在此忠為令德其子弗能任罪猶及之難不慎也喪夫人之力棄德曠宗以及其身不亦害乎夫人謂子尾曠空也詩曰不自我先不自我後其是之謂乎言禍亂不在他正當身以喻髙强自取此禍孔子謂季氏八佾舞於庭是可忍也孰不可忍也孰誰也佾列也天子八佾諸侯六卿大夫四士二八人為列八八六十四人魯以周公故受王者禮樂有八佾之舞季桓子僭于其家廟舞之故孔子譏之又季氏旅于泰山子謂冉有曰女弗能救與旅祭名也禮諸侯祭山川在其封内者今陪臣祭泰山非禮也冉有時仕于季氏救猶正也對曰不能子曰嗚呼曾謂泰山不如林放乎神不享非禮放尚知問禮泰山之神反不如林放邪欲誣而祭之又季氏富於周公周公天子之宰卿士而求也為之聚斂而附益之冉求為季氏宰為之急賦税子曰非吾徒也小子鳴鼓而攻之可也小子門人也鳴鼓聲其罪以責之又公伯寮愬子路於季孫愬譛伯寮魯人子路孔子弟子子服景伯以告魯大夫昭伯回子也告告孔子曰夫子固有惑志季孫信䜛惡子路於公伯寮吾力猶能肆諸市朝吾勢力猶能辨子路之無罪於季孫使誅寮而肆之有罪既刑陳其尸曰肆子曰道之將行也與命也道之將廢也與命也公伯寮其如命何又孔子為大司寇攝行相事于是誅魯大夫亂政者少正卯又琴張聞宗魯死琴張孔子弟子字子開名牢將往弔之仲尼曰齊豹之盜而孟縶之賊女何弔焉言齊豹所以為盜孟縶所以見賊皆由宗魯君子不食姦知公孟不善而食其禄是食姦不受亂許豹行事是受亂也不為利疚于回疚病回邪也以利故不能去故病身于邪不以回待人知難不告以待邪人不蓋不義以周事豹是蓋不義周終竟也不犯非禮以二心事縶是非禮又原壤夷俟原壤魯人孔子故舊夷踞俟待也踞待孔子子曰㓜而不孫弟長而無述焉老而不死是為賊賊謂賊害以杖叩其脛孔曰叩擊也脛脚脛孔子曰巧言令色足恭足恭便僻貌左丘明恥之丘亦恥之左丘明魯大夫匿怨而友其人心自相怨而外詐親左丘明恥之丘亦恥之仲由字子路魯哀公十四年小邾射以句繹來奔曰使季路要我吾無盟矣子路信誠故欲得與相要誓而不須盟使子路子路辭季康子使冉有謂之曰千乘之國不信其盟而信子之言子何辱焉對曰魯有事于小邾不敢問故死其城下可也彼不臣而濟其言是義之也由弗能漢汲黯字長孺濮陽人也為右内史坐小法㑹赦免官後為淮陽太守既辭過大行李息曰黯棄逐居郡不得與朝廷議矣然御史大夫湯張湯智足以拒諫詐足以飾非非肯正為天下言專阿主意主意所不欲因而毁之主意所欲因而譽之好興事舞文法舞猶弄也内懷詐以御主心外挾賊吏以為重公列九卿不早言之何也何不早言也公與之俱受其戮矣息畏湯終不敢言李當户為郎武帝與韓嫣戲少不遜當户擊嫣走于是帝以為能後漢朱震字伯厚初為州從事奏濟隂太守單康贓罪并連康兄中常侍車騎將軍超桓帝收康下廷尉以譴超詣獄謝三府諺曰車如鷄棲馬如狗疾惡如風朱伯厚岑晊為南陽太守成瑨功曹張牧為中賊曹吏宛有富賈張汎者桓帝美人之外親善雕鏤玩好之物頗以賂遺中官以此並得顯位恃其伎巧用勢縱横晊與牧勸瑨收捕汎等既而遇赦晊竟誅之並收其宗族賔客殺二百餘人後乃奏聞于是中常侍侯覽使汎妻上書訟其寃帝大震怒徵瑨下獄死晊牧遁逃亡匿齊魯之間㑹赦出范滂為汝南太守宗資功曹委任政事滂在職嚴整疾惡其有行違孝悌不軌仁義者皆掃迹斥逐不與共朝蓋勲獻帝初為越騎校尉董卓不欲令典禁兵出為潁川太守徵還京師勲雖强直不屈而内厭於董卓不得意疽發背卒遺令勿受卓賻贈張奐燉煌人為太常以黨罪禁錮歸田里奐少立志節董卓慕之使其兄遺縑百疋奐惡卓為人絶而不受王允太原人年十九為郡吏時小黄門晉陽趙津貪横放恣為一縣巨患允討捕殺之後位至司徒魏袁亮貞固有學行嫉何晏鄧颺等著論以譏切之位至河南尹尚書晉閻纘為西戎校尉司馬趙王倫死既葬纘以車轢其冡劉暾為司𨽻校尉其父毅疾馮紞姦佞欲奏其罪未果而卒紞位宦日隆暾慨然曰使先人在不令紞得無患王澄少歴顯位累遷成都王頴從事中郎頴嬖䜿孟玖譖殺陸機兄弟天下切齒澄發玖私姦勸頴殺玖頴乃誅之士庶莫不稱善秦秀為博士性忌讒佞疾之如讎素輕鄙賈充及伐吳之役聞其為大都督謂所親曰充文案小才乃居伐國大任吾將哭以送師傅咸字長虞為議郎長兼司𨽻校尉剛簡有大節風格峻整識性明悟疾惡如仇周馥為廷尉惠帝幸鄴成都王頴以馥守河南尹陳聄上官已等奉清河王覃為太子加馥衛將軍録尚書辭不受覃令馥與上官已合軍馥以已小人縱暴終為國賊乃共司𨽻滿奮等謀共除之謀洩為已所襲奮被害馥走得免及已為張方所敗召馥還攝河南尹應詹字思逺成都王頴辟為掾時驃騎從事中郎諸葛玫委長沙王乂奔鄴盛稱乂之非玫浮躁有才辨臨漳人士無不詣之詹與玫有舊歎曰諸葛成林何與樂毅之相詭乎卒不見之玫聞甚愧孔羣字敬林有智局志尚不羈蘇峻入石頭時匡術有寵於峻賔從甚盛羣與從兄愉同行於横塘遇之愉止與語而羣初不視術術怒欲刄之愉下車抱術曰吾弟發狂卿為我宥之乃獲免後峻平王導保存術嘗因衆坐令術勸羣酒以釋横塘之憾羣答曰羣非孔子厄同匡人雖陽和布氣鷹化為鳩至於識者猶憎其目導有愧色羣仕至中丞温嶠為江州刺史持節都督平南將軍鎮武昌在鎮見王敦畫象曰敦大逆宜加斵棺之戮受崔杼之刑古人闔棺而定諡春秋大居正崇王父之命未有受戮於天子而圖形於羣下命削去之范寗為中書郎儒雅方正其甥王國寶從妹為㑹稽王道子妻國寶持威權扇動内外寗嫉其阿䛕勸孝武帝黜之范𢎞之為太學博士議殷浩贈諡為僕射王珣所怨出為餘杭令將行與㑹稽王道子牋曰下官輕微寒士謬得厠在俎豆實懼辱累清流惟塵聖世竊以人君居廟堂之上智周四海之外者非徒聰明内照亦頼羣言之助也是以舜之佐堯以啟闢為首咎繇謩禹以侃侃為先故下無隱情之責上收神明之功敢縁斯義志在輸藎嘗以謝石黷累應被清澄殷浩忠貞宜䝉褒顯是以不量輕弱先衆言之而惡直醜正其徒實繁雖仰恃聖主欽明之度俯頼明公愛物之隆而交至之患實有無頼下官與石本無怨忌生不相識事無相干正以國體宜明不應稍計强弱與浩年時邈絶世不相及無復藉聞故老語其遺事耳於下官之身有何痛痒而當為之犯時干主耶每觀載籍志士仁人有發中心任直道而行者有懷智陽愚負情曲從者所用雖異而並傳後世故比干處三仁之中箕子為名賢之首後人用捨參差不同各信所見率應而至或榮名顯赫或禍敗繼踵此皆不量時趣以身嘗禍雖有硜硜之稱而非大雅之致此亦下官所不為也世人乃云下官正直能犯艱難斯談實過下官知主上聖明明公虛已思求格言必不使盡忠之臣屈於邪枉之門也是以敢獻愚誠布之執事豈與昔人擬其輕重邪亦以臣之事君惟思盡忠而已不應復計利鈍事不允心則讜言悟主義感於情則陳辭靡悔若懷情藏意藴而不言此乃古人所以得罪於明君明君所以致法於羣下者也桓温事迹布在天朝逆順之情暴之四海在三者臣子情豈或異凡厥黔首誰獨無心舉朝嘿嘿未有唱言者是以頓筆按氣不敢多云桓温於亡祖雖其意難測求之於事止免黜耳非有至怨也亡父昔為温吏推之情禮義兼他人所以每懷憤發痛若身首者明公有以尋之王珣以下官議殷浩諡不宜暴揚桓温之惡珣感其提拔之恩懷其入幙之遇託以廢黜昬闇建立聖明自謂此事足以明其忠貞之節明公試復以一事觀之昔周公居攝道致升平禮樂刑政皆自己出以德言之周公大聖以年言之成王㓜弱猶復遽避君位復子明辟漢之霍光大勲赫然孝宣年未二十亦反萬機故能君臣俱隆道邁千歲若温忠為社稷誠存本朝便當仰遵二公式是令矩何不奉還萬機退守藩屏方提勒公王匡總朝廷豈為先帝㓜弱未可親政邪將德桓温不能聽政邪又逼脅袁宏使作九錫備物光赫其文具存朝廷畏懼莫不景從惟謝安王坦之以死守之故得稽留耳㑹上天降怒姦惡自亡社稷危而復安靈命墜而復構晉自中興以來號令威權多出彊臣中宗肅祖歛袵於王敦先皇受屈於桓氏今主上親覽萬機明公光讚百揆政出王室人無異望復不於今大明國典作制百代不審復欲待誰先王統物必明其典誥貽厥孫謀故令問休嘉千歲承風願明公逺覽殷周近察漢魏慮其所以危求其所以安如此而已古成詵為後秦給事黄門侍郎詵風韻秀舉確然不羣每以天下是非為已任時京兆韋髙慕阮籍之為人居母喪彈琴飲酒詵聞而泣曰吾當私刃之以崇風教遂持劍求髙髙懼逃匿終身不敢見詵宋孔寗子初為髙祖太尉主簿與王華為司馬並有富貴之願太祖初徐羨之等秉權日夜搆之於太祖寗子嘗東歸至金昌亭左右欲泊船寗子命去之曰此弑君亭不可泊也華每閒居諷詠常詠王粲登樓賦曰冀王道之一平假髙衢而騁力出入逢羨之等每切齒憤叱歎曰當見太平時不元嘉二年寗子病卒三年誅羨之等華遷䕶軍侍中如故北齊魏蘭根為定州長流參軍丁母憂居喪有孝稱將葬恒山郡境先有董卓祠祠有栢樹蘭根以卓凶逆無道不應遺祠至今乃伐栢以為椁村人或勸之不伐蘭根盡取之了無疑懼斛律光字明月為左丞相時祖珽為尚書左僕射所住宅在義井坊大事脩築陸媪自往案行勢傾朝野光甚惡之遥見竊罵云多事乞索小人欲行何計數嘗謂諸將云邊境消息處分兵馬趙令常與吾等㕘論之盲人掌機密來全不共我輩語正恐誤他國家事隋王誼周閔帝時為左中侍上士時大冡宰宇文䕶執政勢傾王室帝時拱黙無所闗預有朝士於帝側微為不恭誼勃然而進將擊之其人惶懼請罪乃止自是朝士無敢不肅唐韋倫為太常卿為宰相盧把所惡改太子少保德宗幸奉天倫亦尋赴行在及盧把白志貞趙贊等貶官闗播罷相為刑部尚書倫於朝堂嗚咽而言曰宰相不能弼諧啓沃使天下一至於此今仍為尚書天下何繇致理聞者敬憚之及扈從還京時擢用盧把為荆州刺史倫又再上表切言不可深為忠正之士所稱歎陸贄為中書舍人翰林學士初贄受張鎰知得居内職及鎰為盧把所排贄嘗憂惴及把貶黜始敢上書言事德宗好文益深顧遇奉天解圍後德宗言及違離宗廟嗚咽流涕曰致㓂之繇實朕之過贄亦流涕而對曰臣思致今日之患者羣臣之罪也贄意蓋為盧把趙贊等言也上欲掩杞之失則曰雖朕德薄致兹禍亂亦運數前定事不繇人贄又極言把等罪狀帝雖貌從心頗不説吳通微兄弟俱在翰林亦承德宗寵遇文章才器不迨贄而能交結權倖共拒贄於帝前故劉從一姜公輔自卑品蒼黄之中皆登輔相而贄為朋黨所擠同職害其能加以言事激切動失帝之歡心故久之不為輔相權德輿為太常卿時李繁者宰相泌之子初與翰林學士梁肅友善泌嘗命繁持所著文請肅為序繁亦自有學術肅待之頗厚因得日熟其門及肅卒繁竊亂其配士君子無不歎駭積年擯棄後起為太常博士德輿奏請斥之栁公綽為山南東道節度使有道士獻丹藥試之有驗問所從來曰鍊此丹於薊門時朱克融方叛公綽遽謂之曰惜哉至道來於賊臣之境雖驗何益乃沈之于江晉張希崇為靈州節度使性雖仁恕或遇姦惡嫉之若仇讐册府元龜卷八百八
