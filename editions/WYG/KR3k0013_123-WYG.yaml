body:
  text: 册府元龜卷一百二十三宋王欽若等撰帝王部征討第三唐穆宗長慶元年八月冀州刺史吴暐潛為幽州兵所逐瀛州兵亂執觀察使盧士玫其州尋為幽州兵所據以河東節度使裴度兼充鎮州四面行營都招討使以左領軍衛大將軍杜叔良為深冀諸州行營節度使以深冀等州節度觀察使牛元翼為成徳軍節度鎮冀趙等州觀察等使時王庭凑賊殺田𢎞正竊據王地朝廷以元翼鎮冀舊將素以善戰聞班位勇畧在庭凑之右故前命為深冀節度及是又以成徳令付之希鎮州兵士望風禀令不戰而歸也二年二月赦庭凑二年七月汴州軍亂逐節度使李愿立牙將李㝏為留後詔以鄭滑節度使韓充為宣武軍節度使又詔陳許節度使李光顔將兵收汴州八月斬李㝏文宗太和元年十一月以攝横海軍節度副使李同㨗新除兖海不受詔結幽鎮謀叛詔削同㨗在身官爵以保義軍節度使李寰為横海軍節度使又詔發河東陳許徐州淄青四鎮兵各五百人助寰討賊仍賜綾絹二萬匹充賞設三年五月斬同㨗二年八月詔曰朕初撫天下實在便安故委同㨗節旄處以華壤顧彼童孽豈宜當之然蔑棄君親不合容覆忠臣義士咸同忿嫉非朕生事致於興戎鎮州王庭凑承累朝恩榮據四郡士衆將為率先問罪以圖策勲而乃影援逆冦干犯王旅諸道使命縶為纍囚内兵滄州抗戰四境交支郡之管籥棄鄰好之姻親無恩於家忘義於國而猶特遣中使許其轉禍詞㫖堅執曾無少悛近者又令宰臣遺書許以效順王誥一去寂爾無聞臣欽若等曰王誥奉使滄州史失其官朕以成徳一軍代建勲力聆風拭目待之實殊豈為庭凑一人致使傷及百姓今廹藩臣懇請連章繼來朕猶不能獨斷宣示羣公卿士叅詳可否以觀衆情義不容誅列狀斯在先朝曾效忠慤寵􅅄逾等驟至三公開其自新以全令節朕之恩義亦不負矣其諸道與鎮州鄰接處宜竝絶其進奉嚴加警備其有突犯及隨指揮併合宜依詣㫖處分諸道須有移軍出界竝不得焚燒廬舎横加殘害歸投者撫之拒命者禦之如有忠臣義士以一州或城鎮降者竝依討滄州例處分其上都進奏院宜令御史臺京兆府切加守提禁其出入待後勑處分如庭凑翻然改悔乞效忠勲上表陳誠須有聞奏亦委鄰界當時轉與進上不得停留於戲朕示帝王至仁以安兆庶以黄老清淨用寧寰宇文告屢施而不從兵革在郊而未弭致此費詞良多愧歎時王庭凑黨助李同㨗恣其奸計累以兵革糧鹽濟實滄州又以兵拒朝命鄰境通使竝縶而不遣逆狀顯露中外同請誅討故有是命九月詔曰雷電霜雪上天所以成物明罸勅法聖人垂之易象豈春陽不可以獨化將輔理固在於刑威乎則遏亂禁非法天齊俗諒有為而然也李同㨗罪暴寰宇告之則悖寵之益凌亂君臣父子之紀綱棄覆育生成之恩義則綏討之命盖不得已而王庭凑作我藩臣乆膺寵命致爵位於擾叛之際齊恩澤於㤀義之倫而首扇同㨗使自纒纕黨惡之心劇於虎兕負法之醜逾於梟獍藩方統帥飛疏牙來朝右公卿懇章繼奏皆期鳴鼔問罪奮戈啓行朕道在包荒志存含垢多立曲戸大開坦途諭之使致竒功告之將酬重位而傲狠彌甚肆兇不悛恣惡言於報章資盗粮於狡冦屢有降卒備騐奸欺潛軍入援徳棣縱燎以焚瀛莫河東易定被毒騷然若尚為包容則孰分逆順其王庭凑在身官爵竝宜削奪應諸道與鎮州接界處各逐便攻討其鎮州將士如有梟斬庭凑者六品以下官便授三品正員官先是五品已上官者節級超􅅄仍賜宅一所錢二萬繩如有能率所管兵馬以州郡來降超三資與官仍便正授刺史賜錢一萬繩以城鎮來降超三資與官仍賜錢五千繩如庭凑束身歸闕竝與洗雪若執迷安禍罪止其身其餘脅汙一切不問三年三月詔行營兵馬各量揀精銳深壁堅守分兵務農非按襲勿更决戰軍中老弱傷疾及㨂留固守外竝抽歸本里訓勵營生應鄰道節度有鎮兵馬比令權授指麾竝宜依前在抽移之限李祐所統兵馬至多既逼徳州自是本道糧饋不乏進取已深宜依前當處守禦六月詔鎮州四面行營兵馬竝宜各歸本界且自休息其幽州河東易定齊徳昭義魏博等俱要保境勿相往來唯庭凑以四郡之地三軍之衆率誠歸闕翻然效順則不獨棄其舊惡兼亦别議新恩唯此一事與逹表章餘勿聽信八月赦庭凑武宗㑹昌三年九月制曰定天下者致風俗於大同安生人者齊法度於畫一雖晉之欒趙家有舊勲漢之韓黥身為佐命至於干亂紀律罔不梟夷禁暴除殘古今大義故昭義節度使劉悟頃居海島嘗列𤓰牙屬師道阻兵王師問罪三面開網一境離心乘此危機遂能歸命憲宗嘉其誠欵授以南燕穆宗待以腹心委之上黨招致死士固䕶一方迨於末年已􅃜臣節劉從諫生禀戾氣㓜習亂風因䟦扈之資以專封壤恃紀綱之力以襲兵符暫展執圭之儀終無上綬之請隙駒為喻魏豹姑務於絶河井蛙自居孫述頗間於恃險誘受亡命妄作妖言中罔朝廷潛圖左道接壤戎帥屢奏隂謀顧苕卯之所矜豈泉魚之是察暨乎沉痼曾靡哀鳴猶駐將盡之䰟恣行邪僻之志罔惑舊校自樹狡童中使授醫莫覩其朝服近臣御命不入於壘門逆節甚明人神共棄其贈官及先所授官爵并劉稹在身官爵宜當並削奪成徳軍節度使王元逵魏愽節度使何𢎞敬或姻連王室或任重藩維懇陳一至之誠願揚九伐之命吳漢任職受詔而初無辯嚴卜式朴忠未戰而義形於内况成徳軍常以驍騎横陳首破朱滔戰氣方酣再廻魯陽之日鼓音不息三周不注之山魏愽軍頃以大斾渉河竟殱師道建十二郡之旗鼔以列降人削六十年之厲階盡歸皇化士傳餘勇軍有雄名必能禀酇侯之指蹤成葛亮之心伐咨爾二帥朕所注懐元逵可本官充北面招討澤潞使𢎞敬充東面招討澤潞使潞府曩者烈祖在藩先天啓聖符瑞昭晰繪事煥於泗亭鑾輅廵遊金石刻於代邸實謂可封之俗乆為仁夀之鄉艱難以来頗著誠節必非同惡咸許自新其昭義舊將士及百姓等如保初心竝赦而不問如能捨逆效順以州郡兵衆歸降者必厚加封賞如能擒送劉稹者别授土地以報勲庸頃隨劉悟鄆州舊將校子孫既有義心宜思改悔如能感諭劉稹束身歸朝必當待之如初特與洗雪爾等舊校亦竝酬勞仍委夷行劉沔茂元各進兵同力攻討其諸道進軍竝不得焚燒廬舎發掘墳墓擒執百姓以為俘囚桑麻田苖各許本戸為主罪止元惡務拯生靈於戯藩維大臣抗疏於外髦俊舊老昌言於朝戒朕以祖宗之法不可私一族刑賞之柄所以正萬邦冝用甲兵陳於原野雖朕以恩不聽而羣臣以義固爭詢自僉謀諒非獲已布告中外明體朕懐仍以徐泗節度使李彥佐為澤潞西南面招討使河陽節度王茂元以本軍屯萬善彥佐制下後踰月未出師朝廷疑其持重乃以天徳軍使石雄為彦佐之副四年三月以晉絳副招討石雄為澤潞西面招討使以汾州刺史李丕為之副八月劉稹平懿宗咸通九年七月徐州赴桂林戍卒五百人官徤許佶趙可立殺其主將王仲甫以糧料判官龎勛為都頭剽掠湘潭衡山两鎮有衆千人擅還本鎮殺節度使崔彦曽遂出徐宿官庫錢帛召募兇徒五萬詔徴河南河東山南諸道之師討之十年正月以神武大將軍王晏權充武寧軍節度使兼徐州北路招討使右神䇿大將軍康承訓充徐泗行營都招討使又以將軍朱克義王宥李邵史忠用馬澹董濤戴可師朱耶赤心王建曹翔馬舉高羅鋭秦謨李播為諸道行營招討使量分諸道之兵七萬三千一十五人以討龎勛二月詔司農卿薛瓊使淮南廬夀楚等州㸃集鄉兵以自固九月龎勛平十四年三月雲朔暴亂殺刺史叚文楚扶詔太原節度使崔彦昭幽州節度使張公素出師討之僖宗乾符三年七月草賊王仙芝冦掠河南十五州其衆數萬詔河南藩鎮舉兵討之四年三月以青州節度使宋威為諸道招討草賊使乃給禁兵三千甲馬五百匹五年四月草賊黄巢黨尚譲大驅河南山南之民其衆十萬大掠淮南侍中晉國公王鐸請自督衆討賊詔以鐸為荆南節度使諸道兵馬都統六年八月以東都留守李蔚為河東節度兼代北行營招討供軍等使討雲朔李昌國廣明元年四月以前太府卿李琢為蔚朔等州諸道行營都招討使應東北面行營李孝昌李元禮諸葛爽王重榮朱玫等兵馬及忻代土團竝取琢處分中和元年二月赦昌國令討黄巢中和元年正月帝在興元詔太原節度使鄭從讜發本道之師與北面行營招討使諸葛爽代州刺史北面行營馬歩都虞候朱玫夏州將李思恭等行營諸軍竝赴京師討賊時黄巢據京師七月帝至西蜀以侍中王鐸為中書令充義成軍節度使兼京城四面行營兵馬都統以太子太師崔安潛為副忠武軍監軍楊復恭為天下兵馬行營都監以河中節度使王重榮義武軍節度使王處存鄜延節度使李孝章朔方軍節度使拓㧞思恭分京城四面都統三年四月攻京城四年七月黄巢平光啟元年三月蔡賊秦宗權據汴鄭以徐州節度使時溥充蔡州四面行營兵馬都統以武宣軍節度使朱全忠充蔡州西北面行營都統文徳元年十二月平宗􅁠二年五月帝在興元邠寜節度使朱攻奉㐮王煴為帝遣將王行瑜率邠寜河南之師五萬屯鳯州十二月密詔行瑜自鳯州率衆還長安斬朱玫及其黨數百人以行瑜為邠寜節度使昭宗文徳元年六月以蜀賊王建大亂劔南陳敬瑄告難以司空平章事韋昭度充劔南西川節度使兼西川招撫制置使明年王建陥成都府自稱留後大順元年五月以宣武軍節度使朱全忠等上表請與河北三鎮及汴滑河陽之兵平定太原李克用願朝廷命重臣一人都總戎事詔中書侍郎平章事張濬為太原四面行營兵馬都統京兆尹孫揆副之率神策軍三千赴行營又以華州韓建成徳軍王鎔幽州李康威雲州赫連鐸及朱全忠分為太原四路招討使十一月李克用上表訴寃遂罷兵二年八月以鳯翔李茂貞表章不遜帝不能容嗣覃王為京師西招討使神策大將軍李鐬副之九月師敗以茂貞為秦王賜鐡劵乾寧二年七月太原節度使李克用舉兵渡河以討王行瑜李茂貞韓建等稱兵向闕之罪詔以克用為邠寧四面行營都招討使夏州李思謙充東北面招討使涇原張鐇充西南面招討使是月削奪王行瑜官爵改授李克用邠寧四面行營都統十一月殺行瑜後唐莊宗同光三年四月潞州小校楊立據城叛以蕃漢馬歩軍總管李嗣源陜西留後李紹貞為副率師以討之詔令河中馬歩兵士五千人騎發赴潞州五月收復潞州九月大舉伐蜀制曰朕以夙荷丕基乍平偽室非不欲寵綏四海恊和萬邦廣正朔以遐同俾人倫之有序其或地居陬裔位䖏驕奢殊乖事大之規但藴偷安之計則必徴諸典訓振以皇威爰興伐罪之師兾遏亂常之黨蠢茲蜀主世負唐恩間者父總藩宣任居統制屬朱温東離汴水致昭皇西幸岐陽而乃不務扶持反懐顧望盗據山南之土宇全􅉻閫外之臣誠先皇帝早在并門將興霸業彼既曽馳書幣此亦復展謝儀後又特發使人專持聘禮彼則更不廻一介之使答咫尺之書星歳俄移歡盟頓阻朕頃遵崇遺訓嗣統列藩追昔日之來誠繼先皇之舊好又專持信幣皆絶酬還緬惟背㤙食言可忍棄同即異今觀孽豎紹據山河委閹官以持權憑阻修而僭號早者曾上秦王緘札張皇蜀地聲塵形侮瀆之言辭謗親賢之勲徳昨朕風驅鋭旅電掃兇渠復已墜之宗祧纘中興之歴數㨗音旋報復命仍稽使來而上抗書題情動而先誇險固加以宋光葆輙陳狂計别啓奸謀將欲北顧秦州東窺荆渚人而無禮罪莫大焉昨客省使李嚴奉使銅梁近歸金闕凢於奏對備述端繇其宋光嗣相見之時於坐上便有言説先問契丹強弱次數秦王是非度此包藏可見情狀加以疎逺忠直朋比姦邪内則縦恣輕華競貪寵位外則滋彰法令蠧耗生靈既徳力以不量在人祗之共憤今命興聖宫使魏王繼岌充西川四面行營都統仍命侍中樞宻使郭崇韜充西川東北面行營都招討制置等使荆南節度使高季興充西川東南面行營都招討鳳翔節度使李曮充都供軍轉運應接等使同州節度使李令徳充行營招討副使陜府節度使李紹琛充行營蕃漢馬歩軍都排陣斬斫使兼馬歩軍都指揮使西京留守張筠充西川管内安撫應接使華州節度使毛璋充行營左廂馬歩都虞候邠州節度使董璋充行營右廂馬歩都虞候客省使李嚴充西川管内招撫使總領闕下諸軍兼西面諸道馬歩兵士取九月十八日進發凢爾中外冝體朕懐十一月蜀平四年二月貝州屯駐兵士擅離本州入鄴推趙在禮為兵馬留後帝怒令宋州節度使元行欽率騎三千赴鄴都招撫之下詔徴諸道之師進討以武徳使王允平為内侍省延州馬歩軍都指揮使髙允鐸為丹州刺史竝充鄴都行營招討使是月邢州左右歩軍四百人據城叛推軍校趙大為留後詔東北面副招討使李紹貞率兵討之三月平之又命蕃漢總管李嗣源統親軍赴鄴討趙在禮三月鄴軍變立明宗明宗天成二年二月制曰荆南節度使開府儀同三司守太尉尚書令南平王高季興可削奪官爵仍令襄州節度使劉訓充南面招討使知荆南行府事許州節度使夏魯竒為副招討使統蕃漢馬歩四萬人進討以其叛故也又命湖南節度使馬殷以湖南全軍㑹合以東川節度使董璋充南面招討使新授岐州刺史西方鄴為副招討使共領川軍下峽三面齊進四月與劉訓等詔曰朕昨以妙選師臣徃除兇孽自長驅於鋭旅將併擊於孤城已發使臣疊頒詔諭料龍韜之此舉顧蟻垤以即平今已漸向炎蒸不可持乆切在訓齊貔虎速進梯衝必期此月之中須殄干天之逆責令戰士免至疲勞兼兾生民早諧蘓息惟卿忠烈體朕憂勤儻能克副於指呼便見立成其功效固於酬奨予無恡焉癸卯有内臣自荆南至云暑雨方甚兵士苦之及劉訓有疾乃命樞宻使孔循徑往荆南城下五月破其水寨而廻三年四月北面副招討使王晏球以定州節度使王都反狀聞制曰王者君臨八表子育萬民務匿瑕含垢之仁引禁暴戢兵之徳毎存寛恕貴就和平其有受國深恩承家舊履乖失臣節包藏禍心萌悖亂以欺天恣貪殘而害物苟無征討曷示紀綱義武軍節度觀察等使檢校太尉兼中書令守定州刺史太原郡王王都猥以凡材託於盛族梟獍之兇早縦豺狼之性不移位極人臣跡無忠孝自朕纘承大業懐輯羣方山河之寄愈堅帶礪之盟益甚凡於事體毎務優崇骨肉淪落者竝致歸還嗣息薦論者遍加任使一門受寵九族同榮近以家艱疊頒國命行吊逺繄於卿士奪情尋復於公侯繼下絲綸薦及垣翰在予之分於爾何虧而屬者所為頻彰逆狀徴發不従於朝命賦租罔係於省司擅致軍都遍抽編戸專修城壘潛造甲兵説誘佐命藩臣留滯歸朝刺史頼皆忠順尋各奏聞曾令近侍馳書責使深思改過載惟撫御敢怠含𢎞近乃長惡靡悛亂常尤甚遣姦人招軍前節級出妖言惑管内生靈兼掛牒文已為邉患闔境之蒸黎愁沮遠遣告陳鄰藩之主帥封章共期戡定其王都宜削奪在身官爵仍令馬歩兵士於州側近權置行州招誘在州軍人百姓及安撫鄉川人戸於戯不祥之噐寜願舉於干戈無罪之民豈忍墜於塗炭將行吊伐倍軫情懐勉施極赦之功勿致傷夷之弊雖軍威須振在王道無虧凡百戎臣當體朕意宣布遐邇咸使聞知應諸道舊有定州兵士處竝詔安撫勿令憂疑又制北面行營權副招討歸徳軍節度使王晏球可充北面招討使權知定州軍州事北面行營馬軍都指揮横海軍節度使安審通充北面行營副招討兼諸道馬軍都指揮使宣殿直翟令竒等十五人起諸道軍伐定州以鄭州防禦使張䖍釗為北面兵馬都監四年二月平王都九月詔武寧軍節度使房知温兼荆南行營招討使知荆南行府事以尚食使馬從斌守澤州刺史中外命八道起軍赴襄陽四年五月高從誨歸順十月詔邠州節度使李從敬攻慶州以刺史竇廷琬拒命故也十二月平廷琬長興元年四月皇子河中節度使從珂遣人口奏曰今月五日閲馬於黄龍莊衙内指揮使楊彦温據城謀叛尋時詰問稱奉宣命臣見在虞鄉縣狀候進止帝謂安重誨曰亂臣賊子何代無之安得有此語重誨曰奸賊之言也宜速進討即命西京留守索自通侍衛指揮使樂彦稠等率兵攻之仍授彦温綘州刺史兾以誘而擒之彦稠辭帝謂之曰與吾生致彦温吾將面訊之遣左右羽林都指揮使張從賓率宿衛兵士指揮赴河中是月斬彦温九月利閬遂三州奏東川節度使董璋結連西川孟知祥㸃聚鄉兵欲來攻逼州城探得發兵次安重誨奏曰自今年三月後來山南東川諸州奏報董璋叛逆者數十陛下以事機未發含垢匿瑕臣必知有此事帝曰朕不負他以生靈之故須議興師問罪乃以左驍衛上將軍趙在禮為同州節度使兼西南行營馬歩軍都指揮使又下制曰王者興師討伐若行其時雨農夫去草誅鋤務絶其本根具載格言式符戎畧而况天垂弧矢盡殪狼星國舉干戈當平賊子得不朝申號令夕議削除安邦守正翊贊功臣劔南東川節度使特進檢校太尉同中書門下平章事梓州刺史董璋受國深恩殿邦重寄但恣貪殘之性莫分宵旰之憂唯務包藏顯章侮慢朝廷毎施含垢具為掩瑕略無悛革之心轉有狂迷之狀伺便而侵漁仁境何名而㸃發義軍仍於闗防輙修堡砦兼傳書檄招冦盗於晉州尋縦賊徒欲窺覦於遂府焚燒民舍驅虜耕牛覧奏報以實繁數愆尤而莫盡豈有武䖍裕身為刺史輙敢縻留大程官手執宣頭略無遵禀而又淫刑害物酷法作威鉄籠之炮炙未開金贖之科罪竝發善人知懼惡貫已盈且擢髮以難窮宜燃臍而不赦今則已徵師旅將掃妖氛舉烈火以燎毛飛嚴霜而脫葉匪朝伊夕覆狡擒奸於戲無禮於君奮鷹鸇而驅鳥雀有功必賞誓帶礪而保山河殄冦則理在必然興兵則事非獲已凡在遐邇宜體朕懐其董璋在身官爵並削奪又詔西川節度使孟知祥兼東川西面供饋使天雄軍節度使石敬瑭充東川行營都招討使武信軍節度使夏魯竒為之副十二月遣樞密使安重誨赴西面軍前時帝以蜀路險阻進兵艱難潼闗以西物價絶賤百姓般糧徃利州每費一斛不得一㪷至令噍類攘攘逃竄山谷或聚為盗慮不堪命帝念饋輓之苦形于顔色謂近臣曰聞勞擾軍前未有成功孰能辦吾事者朕須自行重誨奏曰此臣之責也臣今請行許之言訖面辭翼月發赴軍前邠州節度使李敬周如京師羅延魯供奉官周務謙丁延徽陳審瓊韓玫符彦倫等並從重誨西行二年正月以權知興元軍府事王思同為山南西道節度使充西面行營馬歩軍都虞候三年正月以前彰國軍留後孫漢韶為相州節度使充西面行營副都部署六月董璋為孟知祥所敗知祥遂入梓州因而罷兵末帝清泰三年五月鄴都屯駐捧聖都虞候張令昭逐節度使劉延皓據城叛以汴州節度使范延光為天雄軍四面招討使知行府事以西京留守李周為天雄軍四面副招討使兼兵馬都監七月收復鄴都晉高祖天福二年六月六宅使張言自魏府使廻奏范延光叛命遣客省使李守眞往延光所問罪尋以侍衛使楊光遠充魏州四面都部署以東都廵檢使張從兵為副七月安州軍亂都指揮使王暉害節度使周環於理所遣右衛上將軍李金全領千騎赴安州八月王暉為部下所殺九月以李金全為節度十一月賜魏州都部署楊光遠空名官告自司空至常侍凡四十道將士立功者得補之而後奏三年九月延光降五年五月安州節度使李金全叛詔新節度使馬全節以雒汴汝鄭鄆宋陳蔡曹濮十州之兵討之以前鄜州節度使安審暉為副以内客省使李守貞為都監仍遣供奉官劉彥瑶馳詔以諭金全彥瑶既至金全麾下齊謙以詔送於淮南雲夢人齊峴斬謙歸其詔於門六月收復安州六年十一月襄州節度使安從進一軍叛以西京留守高行周為南面軍前都部署前同州節度使宋彥筠為副宣徽南院使張從恩監焉以䕶聖左第四軍指揮使安懐浦為行營馬軍都指揮以奉國右第四軍都指揮使杜希逺為行營歩軍都指揮使以䕶聖左第四軍都指揮使郭金海為先鋒使東京内作坊使陳思譲監䕶焉七年八月平之十二月三州節度使安重榮稱兵向鄴都乃遣聖奉國宗順興國威順等馬歩軍三十九指揮擊之鄆州節度使杜重威為招討使邢州節度使馬全節為副兼排陣使前貝州節度使王周為馬歩軍都虞候雒州團練使王令温為馬軍都指揮使奉國左第三軍都指揮使程福贇歩軍都指揮使䕶聖右第六軍都指揮使史文釗為先鋒都指揮使鄴都作坊使翟令竒為先鋒都監七年正月斬安重榮復鎮州少帝開運元年五月遣侍衛親軍都虞候李守貞率歩騎二萬討楊光逺於青州以守貞為青州行營都部署以河陽節度使符彦卿副之閏十二月平之漢髙祖即位稱天福十二年是年閏七月新授宋州節度使杜重威據鄴都叛詔削奪重威官爵貶為庶人以髙行周為行營都部署率兵進討十一月重威降隐帝乾祐元年三月河中節度使李守貞謀叛以陜州節度使白文珂為河府城下一行都部署四月以檀州節度使郭從義永興軍一行兵馬都部署時供奉官時知化王益自鳳翔部署前永興軍節度使趙贊部下牙兵趙思綰等三百餘人赴闕三月二十四日行次永興思綰等作亂突入府城據城以叛故命從義以討之又以侍衛歩軍都指揮使尚洪千充行營都虞候以客省使王峻為兵馬都監七月鳳翔節度使王景崇拒命不受代詔新除鳳翔節度使趙暉充鳳翔行營都部署以討之八月命樞密使同中書門下平章事郭威赴河中軍前詔河府永興鳳翔行營諸軍一禀威節制二年七月思綰守貞平三年正月王景崇平周太祖廣順元年正月湘隂公劉贇丁元從右都押衙鞏廷美教練使楊温等據徐州以拒命帝遣新授武寧軍節度使王彦超率兵赴之廷美等遷延不肯開門遂詔進攻仍曉諭城内軍民曰昨以鞏廷美楊温等不認朝㫖妄蓄疑心累令招㩦明示誠信雖有章奏尚未開門既無果决之心必是疑君之計今以指揮王彦超排此大軍攻討汝等若能誅斬元惡應接官軍上城者若是將校員僚只與超拜官資兼授刺史百姓即給厚賞稳便安排但收此絹書以為憑信三月收復徐州十月以并冦劉崇犯邉攻圍未解遣樞密使平章事王峻將兵援之三年正月以兖州慕容彦超反狀已具無以招懐乃命侍衛歩軍指揮使曹英為都部署起兵討之仍以齊州防禦使史延超為副皇城使向訓為都監陳州藥元福為行營馬歩都虞候龍㨗右廂都指揮使王全斌為行營馬軍都指揮使控鶴都指揮使郭超為行營歩軍都指揮使前貝州節度副使梁晉超為行營馬軍都監前棣州刺史李蕚坊州刺史靳霸懐州刺史李萬超並佐營軍五年帝赴兖州軍前慰勞是月破之事具帝王親征門世宗顯德二年七月以鳳翔節度使王景崇兼西南行營都招討使宣徽南院使鎮安軍節度使向訓兼西南面行營兵馬都監收秦鳳二州先是晉末契丹犯闕秦州節度使何建以成秦階三州入蜀蜀人又取鳳州至是秦鳳人户怨蜀之苛政相次詣闕乞舉王師收復舊地乃有是命時宰臣上言請且罷西師言甚切直帝曰秦鳳二州頃因賊臣叛入西蜀後屬中朝多事未暇恢復量其土疆且非遐僻咫尺之地聲教未被朕實有所慙今若無功退軍亦大國取弱之道舉偏師即期收復卿等所言甚嘉然無至多慮也是年九月秦州降十一月收復鳳階成三州十一月帝謂侍臣曰淮南獨據一方多歴年所外則結連北境與我為讐稔惡既深朕不敢赦今將命將討除與卿等籌之乃以宰臣李穀為淮南道前軍行營都部署兼知盧夀等州行府事以許州節度使王彦超副焉又命侍衛馬軍都指揮使韓令坤已下一十二將各帶征行之號以從焉是月勑淮南管内州縣軍鎮官吏軍人百姓等朕自纘承基搆統御寰瀛方當恭已臨朝誕修文徳豈欲興兵動衆專耀武功顧兹昏亂之邦須舉弔伐之義蠢爾淮甸敢拒大邦因唐室之凌遲接廣㓂之喪亂飛揚跋扈垂六十年盗據一方僭稱偽號倖數朝之多事與北虜而交通厚啟戎心誘為邉患晉漢之代寰海未寧而乃招納叛亡朋助凶慝李金全之據安陸李守貞之叛河中大起師徒来為應援攻侵髙密殺掠吏民迫奪閩越之封疆塗炭湘潭之士庶以至我朝啟運東魯不庭發兵而應接慕容觀釁而憑凌徐部沐陽之役曲直可知尚示包荒猶稽問罪邇後維揚一境連歲阻饑我國家念彼災荒大計糴易前後擒獲將士皆遣放還自來禁戢邊兵不令侵撓我無所負彼實多奸勾誘契丹至今未巳結連兵冦與我為讐罪惡難名人神共憤今則推輪命將鳴鼓出師徵浙右之樓船下朗陵之戈甲東西合勢水陸齊攻吳孫皓之計窮自當歸命陳叔寳之數盡何處偷生應淮南將士軍人百姓等久隔朝廷莫聞聲教雖從偽俗應樂華風必須善擇安危早圖去就如能投戈獻欵舉郡來降具牛酒以犒師奉圭符而請命車服玉帛豈恡旌酬土地山河誠無愛惜刑賞之令信若丹青苟或執迷寧免後悔王師所至軍政甚明不犯秋毫有同時雨百姓父老各務安居剽虜焚燒必令禁止自兹兩地永為一家凡爾蒸黎當體誠意五年三月淮南平事具帝王親征門册府元龜卷一百二十三
