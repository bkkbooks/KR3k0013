body:
  text: 册府元龜卷八百六宋王欽若等撰總録部賢徳𫝊曰太上立徳又曰徳成而上惟賢者必有徳焉中古而下良士間作乃有禀純粹之氣挺中庸之美蹈道體和居簡行約躬履仁義力敦孝友處崇髙之勢而志益下居困阨之㑹而道彌顯中語黙之節得進退之理或推挽時彦致之於光大或化導民俗濟之於淳厚或治家而有法或念舊而施惠亦有錙銖人爵糠粃塵務優㳺而自得恬澹而無欲者焉至若匪人革心而遷善鷙獸屏跡而不害斯又髙義之所服精意之所感者已伯夷叔齊孤竹君之二子也不念舊惡怨是用希銅鞮伯華晉大夫也孔子曰國家有道其言足以興國家無道其黙足以容葢銅鞮伯華之所行孔子又歎曰銅鞮伯華無死天下有定矣漢張釋之為廷尉王生者善為黄老言處士嘗召居廷中公卿盡會立王生老人曰吾韈解韈音武伐切顧謂釋之為我結韈釋之跪而結之結讀曰係既已人或讓王生獨奈何廷辱張廷尉如此王生曰吾老且賤自度終亡益於張廷尉廷尉方天下名臣吾故聊使結韈欲以重之諸公聞之賢王生而重釋之衛綰為中郎將郎官有譴常䝉其罪䝉謂覆蔽之不與它將爭有功常讓它將帝以為㢘忠實無他腸鄭當時字莊武帝時為大司農毎朝候帝間説未嘗不言天下長者候天子間隙之時其所稱説皆言長者也其推轂士及官屬丞史誠有味其言也推轂言薦舉人如車轂之運轉也有味者其言甚美也嘗引以為賢於已未嘗名吏與官屬言若恐傷之聞人之善言進之上惟恐後山東諸公以此翕然稱鄭莊韋元成賢之子也以父任為郎常侍騎謙遜下士出遇知識歩行輙下從者與載送之輟從者之車馬也以為常其接人貧賤者益加敬由是名譽日廣田甲為張湯客甲雖賈人有賢操始湯為小吏與錢通為小吏之時與田甲為錢財之交及為大吏而甲所責湯行義有烈士風後漢樊重南陽湖陽人貲至巨萬而賑贍宗族恩加鄉閭外縣何氏兄弟争財重耻之以田二頃解其忿縣中稱美推為三老張綱少明經學雖為公子而厲布衣之節後為廣陵太守王丹居家毎嵗農時輙載酒肴於田間候勤者而勞之東觀記曰載酒肴便於田頭大樹下飲食勸勉之因留其餘酒肴而去其惰孏者耻不致丹皆兼功自厲孏與嬾同音力亶切邑聚相率以致殷富其輕黠游蕩廢業為患者輙曉其父兄使黜責之沒者賻給親自將䕶其有遭喪憂者輙待丹為辦鄉鄰以為常行之十餘年其化大治風俗以篤後徴為太子少傅杜根為郎中諌鄧太后歸政太后怒令撲殺之詐死逃竄積十五年太后喪徴為尚書郎或問根曰往者遇禍天下同義知故不少何至自苦如此根曰周旋民間非絶迹之處邂逅發露禍及知親故不為也張湛扶風平陵人也在鄉黨詳言正色三輔以為儀表人或謂湛偽詐湛聞而笑曰我誠詐也人皆詐惡我獨詐善不亦可乎位終太中大夫尹勲家世衣􅃣伯父睦為司徒兄頌為太尉宗族多居貴位而勲獨持清操不以地勢尚人仕至大司農鍾皓兄子瑾好學慕古有退讓風辟州府未嘗屈志李膺謂之曰孟子以為人無是非之心非人也弟何期不與孟軻同邪瑾嘗以膺言白皓皓曰昔國武子好昭人過以致怨本卒保身全家爾道為貴其體訓所安多此類也周爕汝南安城人居家清處非法不言兄弟父子室家相待如賔鄉曲不善者皆從其教也安帝時以𤣥纁羔鴈徴不至陳寔為太邱長解印綬去及後逮捕黨人事亦連寔餘人多逃避求免寔曰吾不就獄衆無所恃乃請囚焉遇赦得出郭泰字林宗性明知人好奬訓士類褒衣博帶周遊郡國及黨事起知名之士多被其害惟林宗袁閎免焉泰徴有道不就孫堪仕郡縣公正㢘潔俸祿不及妻子皆以供賔客及為長吏所在有迹為吏人所敬仰仕至侍中騎都尉劉虞為幽州刺史後以疾歸家嘗降身隱約與邑州閭同樂共䘏等齊有無不以名位自殊鄉曲咸共宗之王烈字彦方太原人也通識逹道秉義不回時在井市歩行有異人皆别之州閭承風咸競為善時國中有盜牛者牛主得之盜者曰我邂逅迷惑從今已後將為改過子既已赦宥幸無使王烈聞之人有以告烈者烈以布一端遺之或問此人既為盜畏若聞之反與布何也烈曰昔秦穆公人盜其駿馬食之乃賜之酒盜者不愛其死以救穆公之難今此盜人能悔其過懼吾聞之是知耻惡知耻惡則善心相生故與布勸為善也間年之中行路老父擔重人代擔行數十里欲至家置而去問姓名不以告頃之老父復行失劔於路有人行而遇之欲置而去懼後人得之遂守之至暮劒主還見之乃前者代擔人也老父􅒆其袂問曰子前者代吾擔不得姓名吾將以告王烈乃語之而去老父以告烈烈曰世有仁人吾未之見遂使人推求之乃昔時盜牛人也烈歎曰韶樂九成虞賔以和人能有感乃至於斯也遂使國人表其閭而異之時人或訟曲直將質於烈或至塗而反望廬而還皆相推以直不敢使烈聞之時國主皆親驂乗適烈私館疇咨政令察孝㢘三府並辟皆不就孔融聞人之善若出諸己言有可採必演而成之靣詰其短而退稱所長薦逹賢士多所奬進知而未言以為已過故海内英俊皆信服之後為少府魏田疇字子泰為幽州牧劉虞從事奉使長安得報還未至虞已為公孫瓚所害疇北歸率舉宗族他附從數百人掃地而盟曰君仇不報吾不可以立於世遂入徐無山中營深險平敞地而居躬耕以養父母百姓歸之數年間至五千餘家疇謂父老曰諸君不以疇不肖逺來相就衆成都邑而莫相統一恐非久安之道願推擇其賢長者以為之主皆曰善同僉推疇疇曰今來在此非茍安而已將圖大事復怨雪耻竊恐未得其志而輕薄之徒自相侵侮偷快一時無深計逺慮疇有愚計願與諸君共施之可乎皆曰可疇乃為約束相殺傷犯盜諍訟之法法重者至死其次抵罪二十餘條又制為婚姻嫁娶之禮興舉學校講授之業班行其衆衆皆便之至道不拾遺北邉翕然服其威信烏丸鮮卑並各遣譯使致貢遺疇悉撫納令不為寇華歆漢末為豫章太守孫策略地江東歆以郡迎策策親執子弟之禮禮為上賔是時四方賢士大夫避地江南者甚衆皆出其下人人望風毎䇿大㑹坐上莫敢先發言歆時起更衣則論議讙譁歆能劇飲至石餘不亂衆人㣲察嘗以其整衣冠為異江南號之曰華獨坐曹公奏徴之及行賔客舊人送之者千餘人贈遺數百金歆皆無所拒密各題識至臨去悉聚諸物謂諸賔客曰本無拒諸君之心而所受遂多念單車逺行將以懐璧為罪願賔客為之計衆乃各留所贈而服其徳邴原北海朱虚人也避地遼東遼東多虎原之邑落獨無虎患原嘗行而得遺錢拾以繫樹枝此錢既不見取而繫錢者愈多問其故答者謂之神樹原惡其由已而成滛祀乃辨之於是里中遂歛其錢以為社供及原自遼東歸魏太祖為司空辟原署東閤祭酒曹公北伐三郡單于還住昌國燕士大夫酒酣曹公曰孤反鄴守諸君必將來迎今日明旦度皆至矣其不來者獨有邴祭酒耳言訖未久而原先至門下通謁曹公大驚喜擥履而起逺出迎原曰賢者誠難測度孤謂君將不能來而逺自屈誠副饑虚之心謁訖而出軍中士大夫詣原者數百人曹公怪而問之時荀文若在坐對曰獨可省問邴原耳曹公曰此君名重乃亦傾士大夫心文若曰此一世異人士之精藻公宜盡禮以待之曹公曰固孤之宿舊也自是之後見敬益重原雖在軍歴署嘗以病疾髙枕里巷終不當事又希㑹見河内張範名公之子也其志行有與原符甚相親敬令曰邴原名髙徳大清規邈世魁然而峙不為孤用聞張子頗欲學之吾恐造之者富隨之者貧也管寧字㓜安北海朱虚人漢末避亂至遼東往見公孫度語惟經典不及世事還乃因山為廬鑿坯為室越海避難者皆來就之而居旬月成邑遂講詩書陳俎豆飾威儀明禮讓非學者無見也由是度安其賢民化其徳邴原與寧俱往而原性剛直清議以格物度已下心不安之寧謂原曰濳龍以不見成徳言非其時皆招禍之道也寧密遣令西還度庶子康代居郡外以將軍太守為號而内實有王心卑已崇禮欲官寧以自鎮輔而終莫敢發言其敬憚如此寧居遼東所居屯落㑹井汲者或男女雜錯或爭井鬪䦧寧患之乃多買器分置井傍汲以待之又不使知來者得而怪之問知寧所為乃各相責不復鬪訟後詔為大中大夫固辭不受袁準忠信公正不耻下問惟恐人之不勝已以世事多險故常恬退而不敢求進後為給事中袁侃論議清當柔而不犯善與人交在廢興之間人之所趣者務常謙退不為也時人以是稱之歴位黄門選部郎徐幹清元體道六行脩備輕官忽祿不耽世榮仕為五官將文學任嘏為人純粹愷悌虚已若不足恭敬如有畏其脩身履義皆沈黙潛行不顯其美人少得稱之管輅體性寛大多所含受憎已不讐愛已不褒毎欲以徳報怨謂忠孝信義人之根本不可不厚㢘介細直士之浮飾不足為務也自言知我者希則我貴矣安能斷江漢之流為激石之清樂與季主論道不欲與漁父同舟此吾志也其事父母孝篤兄弟順愛士友皆仁和發中終無所闕臧否之士晚亦服焉後為少府丞卒雷義字仲公豫章鄱陽人初為郡功曹皆擢舉善人不伐其功朱才為武衞校尉本郡議者以才少處榮貴未留意於鄉黨才乃歎曰我初為將謂跨馬蹈敵當身履鋒足以揚名不知鄉黨復追迹其舉措乎於是更折節為㳟留意於賔客輕財尚義施不望報聲名聞於逺近㑹疾卒吴駱統字公緒事適毋甚謹時饑荒鄉里及逺方客多有困乏統為之飲食衰少其姊仁愛有行寡居無子見統甚哀之數問其故綂曰士大夫糟糠不足我何心獨飽姊曰誠如是何不告我而自苦若是乃自以私粟與統又以告母母亦賢之遂使分施由是顯名大帝以將軍領㑹稽太守統年二十試為烏程相丁覽字孝連八歳而孤家又單微清身立行用意不茍推財從弟以義讓稱為人精㣲潔浄門無雜賔大帝深貴待之為始平令未及擢用而病卒晉樂廣字彦輔父方早卒廣孤貧僑居山陽寒素為業人無知者性沖約有逺識寡嗜慾與物無競廣值世道多虞朝章紊亂清已中立任誠保素而已時人莫有見其際焉仕至河南尹阮瞻字千里嘗羣行冐熱渴甚逆旅有井衆人競趨之瞻獨逡巡在後須飲者畢乃進其夷退無競如此後為尚書令鄭黙寛沖博愛謙虚温謹不以才地矜物事上以禮遇下以和雖童䜿厮養不加聲色太康元年為光祿勲卒皇甫方回安定朝那人有文才永嘉初以博士徴不起避亂荆州閉門閑居未嘗入城府蠶而後衣耕而後食先人後已尊賢愛物南土人士咸崇敬之鄭沖字文和起自寒微卓爾立操清恬寡欲耽玩經史遂博究儒術及百家之言有姿望動必循禮任真自守不要鄉曲之譽後為太傅張華少自脩謹造次必以禮度勇於赴義篤於周急後為司空李憙為尚書僕射拜光祿大夫特進致仕憙自歴仕雖清非異衆而家無儲積親友故人乃自分衣共食未嘗私以王官樂道融丹陽人少有大志好學不倦與朋友信每約已而務周急有國士之風為王敦參軍幸靈豫章建昌人也性少言與小人羣居見侵辱而無愠色邑里號之癡雖其父母兄弟亦以為癡也嘗使守稻羣牛食之靈見而不驅待牛去乃往理其殘亂者其父母見而怒之靈曰夫萬物生天地之間各欲得食牛方食奈何驅之其父愈怒曰即如汝言復用理壊者何為靈曰此稻又欲得終其性牛自犯之靈可以不收乎庾衮字叔褒明穆皇后伯父也母終服䘮居於墓側嵗大饑藜羮不糝門人欲進其飯者而衮毎曰已食莫敢為設及麥熟穫者已畢而採捃尚多衮乃引其羣子以退曰待其間及其捃也不曲行不旁掇跪而把之則亦大獲又與邑人入山拾橡分夷險序長㓜推易居難禮無違者見齊王冏歸于京師踰年不朝曰晉室卑矣寇難方興乃携其妻子適林慮山事其新鄉如其故鄉言忠信行篤敬比及朞年而林慮之人歸之咸曰庾賢及石勒攻林慮父老謀曰此有大頭山九州之絶嶮也上有古人遺迹可共保之惠帝遷於長安衮乃相與登於大頭山而田於其下年榖未熟食木實餌石蕊同保安之有終焉之志及將收穫命子怞與之下山中塗目眩瞀墜崖而卒同保赴哭曰天乎獨不可舍我賢乎時人傷之曰庾賢絶塵避地超然逺跡固窮安陋木食山棲不與世同榮不與人争利不免遭命悲夫衮學通詩書非法不言非道不行尊事耆老惠訓䝉㓜臨人之喪必盡哀㑹人之葬必躬築勞則先之逸則後之言必行之行必安之是以宗族鄉黨莫不崇仰門人感慕為之樹碑焉孫晷字文度吳國富春人聞人之善欣若有得聞人之惡慘若有失見人饑寒並周贍之鄉里贈遺一無所受後尚書張國明表薦晷公車特徴㑹卒應詹㓜孤為祖母所養年十餘歳祖母又終家富於財年又稚弱乃請族人共居委以資産情若至親世以此異焉弱􅃣知名性質素宏雅物雖犯而弗之校以學藝文章稱司徒何劭見之曰君子哉若人官至平南將軍衛玠字叔寳嘗以人有不及可以情恕非意相干可以理遣故終身不見喜愠之容及卒謝鯤哭之慟曰棟梁折矣仕至太子洗馬魏詠之為荆州刺史持節都督六州領南蠻校尉詠之初在布衣不以貧賤為耻及居顯位亦不以富貴驕人始為殷仲堪之客未㡬竟踐其位論者稱之王延西河人也非其織不衣非其耕不食屬天下喪亂隨劉元海遷於平陽農蠶之暇訓誘宗族侃侃不勌年六十方仕于劉聰為金紫光祿大夫何琦字萬倫性沈敏有識度居於宣城陽榖縣養志衡門不交人事耽玩典籍以琴書自娱不營産業節儉寡欲豐約與鄉隣共之鄉里遭亂姊没人家琦惟有一婢便為購贖然不為小謙凡有贈遺亦不茍讓但於已有餘輙復隨而散之任心而行率意而動不占卜無所事仕至涇縣令譙秀巴西人郡察孝㢘州舉秀才皆不就避難巖渠鄉里宗族依憑之者以百數秀年出八十衆人欲代之負擔秀曰各有老弱當先營䕶吾氣力猶足自堪豈以垂朽之年累諸君也宋謝𢎞㣲陳郡陽夏人父思武昌太守𢎞㣲所繼叔父混義熈中以劉毅黨見誅混妻晉陵公主宋初降號東鄉君元嘉九年東鄉君薨資財千萬園宅十餘所又會稽吴興琅琊諸處從祖司空琰時事業奴僕猶有數百人公私咸謂室内資財宜歸二女田宅奴僕應屬𢎞㣲𢎞㣲一無所取自以私祿營葬混女夫殷叡素好摴蒱聞𢎞㣲不取財物乃濫奪其妻妹及伯母兩姑之分以還錢債内人皆化𢎞㣲之讓一無所爭𢎞㣲舅子領軍將軍劉湛不堪其非謂𢎞微曰天下事宜有裁衷卿此不治何以治官𢎞㣲笑而不答或有譏之曰謝氏累世財産充殷君一朝戲債理之不允莫此為大卿親而不言譬棄物江海以為㢘耳設使立清名而令家内不足亦吾所不取也𢎞微曰親戚爭財為鄙之甚今内人尚能無言豈可導之使爭今分多共少不至有乏身死之後豈復見關沈道䖍吳興武康人嘗以捃拾自資同捃者或争穟道䖍諫止之悉以其所得與之争者愧恧後毎事輙云勿令居士知辛普明字文逹僑居㑹稽士子髙其行當葬兄皆送金為贈後至者不復肯受人問其故答曰本以兄墓不周故不逆親友之意今實已足豈可利亡者餘贈邪齊豫章王嶷為揚州徴議曹從事不就何子平㓜持操檢敦厲名行雖處闇室如接大賔學義堅明處之以黙安貧守善不求榮進好退之士彌以貴之位至吳郡海虞令沈林子簡泰亷靖不交接世務義讓之美著於閨門位至輔國將軍南齊江泌為南中郎行叅軍領國子助教乗車至染烏頭見一老翁歩行下車載之躬自歩去謝朓好奬人才㑹稽孔顗粗有才筆未為時知孔珪嘗令草讓表以示朓朓嗟吟良久手自折簡寫之謂珪曰士子聲名未立應共奬成無惜齒牙餘論其好善如此朓為吏部尚書郎王騫儉之子也性凝簡慕樂廣為人未嘗言人之短梁張𢎞䇿為人厚實篤於故舊雖居隆重不以貴勢自髙故人賔客禮接如布衣時祿賜皆散之親友為衛尉卿遇害莫不痛惜焉劉苞性和而直與人交靣折其罪退稱其美情無所隱士友咸以此歎惜之終太子洗馬劉訏平原人也自少至長無喜愠之色每於可競之地輙以不競勝之或有加凌之者莫不退而愧服由是衆論咸歸重焉本州辟主簿不就傅昭所涖官常以清浄為政不尚嚴肅居朝廷無所請謁不畜門生不交私利終日端居以書記為樂雖老不衰性尤篤慎子婦家嘗餉牛肉以進昭召其子曰食之則犯法告之則不可取而埋之其居身行已不負闇室類皆如此京師後進宗其學重其道人自以為不逮仕至散騎常侍庾黔婁新野人少好學多講誦孝經未嘗失色於人南陽髙士劉虬宗測並歎異之起家本州主簿劉杳治身清儉無所嗜好為性不自伐不論人長短位至尚書左丞諸葛璩處身清正妻子不見喜愠之色旦夕孜孜講誦不輟時人益以此宗之庾承先字子通潁川鄢陵人也少沈静有志操是非不渉於言喜愠不形於色人莫能窺也後湘東王徵為法曹參軍不就陳陸琰寡嗜慾鮮矜競逰心經籍晏如也終通直散騎常侍王勱字公濟通之弟也美風儀博渉書史恬然清簡未嘗以利欲干懐梁世為國子周易生射策舉髙第除秘書郎太子舍人虞寄少篤行造次必於仁厚雖僮䜿未嘗加以聲色至於臨危執節則辭氣懔然白刃不憚也終大中大夫歐陽頠少質直有思理以言行篤信著聞于嶺表父䘮毁瘠甚至蕭允為光禄大夫未嘗以榮利干懐及晉安王出鎮湘州又苦擕允允少與蔡景厯善景厯子徵脩父黨之敬聞允將行乃詣允曰公年徳並高國之元老從容坐鎮日夕自為列曹何為方復辛苦在外答曰已許晉安豈可忘信其恬於榮勢如此姚察性至孝有人倫鑒識沖虚謙遜不以所長矜人終日恬靜惟以書記為樂在位多所稱引一善可録無不賞薦若非分相干咸以理遣盡心事上知無不為侍奉機宻未嘗洩漏且任遇已隆衣冠攸屬深懐退靜避於聲勢清潔自處貲産每虗或有勸營生計笑而不答篤於宗屬所得禄賜咸充周卹為吏部尚書入隋終太子内舍人岑之敬性謙謹未嘗以才學矜物接引後進恂恂如也終征南府諮議叅軍後魏常景善與人交終始若一其逰處者皆服其深逺之度未嘗見其矜恡之心好飲酒澹於榮利自得懐抱不事權門終車騎將軍裴敬憲字孝虞有志行學博才清撫訓諸弟専以讀誦為業澹於榮利風氣俊逺而情性和雅未嘗失色於人而又世有仁義於鄉里孝昌中蜀賊陳雙熾所過殘暴至敬憲宅輙相約束不得焚燒為盜所服如此除太學博士王椿太原人為瀛州刺史更滿還鄉齊神武之居晉陽霸朝所在人士輻湊椿禮敬親知多所拯接李沖沈雅有大量兄承為榮陽太守冲隨兄至官是時牧守子弟多侵亂民庶輕有乞奪沖與承長子韶獨清簡皎然無所求取時人美焉顯祖末為中書學生沖善交逰不妄戲雜流軰重之㳺明根歴官内外五十餘年處身以仁和接物以禮讓時論貴之崔挺㓜孤居喪盡禮推人受士州閭親附焉每四時與鄉人父老書相存慰辭㫖欵備得者榮之家徒四壁時榖糴踊貴鄉人或有贍遺者挺辭而後受仍亦散之貧困不為蓄積故鄉邑更欽歎焉仕至北海王祥司馬辛雄㢘謹雅素不妄交友喜怒不形於色釋褐奉朝請梁越字元覽性純和篤信行無擇善為光祿大夫辛琛寛雅有度量渉獵經史喜愠不形於色當官奉法所在有稱韋休之為安西將軍光祿大夫貞和自守未嘗以言忤物北齊楊愔字遵彦魏司徒津之子也愔貴公子早著聲譽風表鑒裁為朝野所稱家門遇禍惟有二弟一妹及兄孫女數人撫養孤㓜慈㫖温顔咸出人表重義輕財前後賜與多散之親族羣從弟姪十數人並待而舉火頻遭迍厄冒履艱危一飱之恵酬答必重性命之讎捨而不問趙彦深㓜孤貧事母至孝性聰敏善書記安閑樂道不雜交遊為雅論所歸服昧爽輙自掃門外不使人見率以為常後位至司徒後周樂遜性柔謹寡於交遊立身以忠信為本不自矜尚每在衆中言論未嘗為人之先學者以此稱之仕至大將軍韋􅗥髙尚不仕又雅好名義虚襟善誘雖耕夫牧䜿有一介可稱者皆接引之楊荐秦郡寧夷人也父寳昌平郡守荐㓜孤早有名譽性㢘謹喜怒不形於色終梁州刺史叚永累官至大將軍歴任内外所在頗有聲稱輕財好士朝野以此重焉皇甫璠性平和小心奉法安貧守志常以清白自處當時號為善人終隋州刺史薛善字仲良家素富僮僕數百人兄元信仗氣豪侈毎食方丈坐客常滿弦歌不絶而善獨恭已率素愛樂閑静終隆州刺史柳霞性温裕略無喜愠之容宏奬名教未嘗論人之短尤好施與家無餘財終驃騎大將軍隋令狐熈字長熈性嚴重有雅量雖在私室終日儼然不妄通賔客凡所交結必一時名士起家吏部上士房彦謙歴官司𨽻刺史被執政所嫉出為涇陽令卒家無餘財車服器用務存儉素自少及長一言一行未嘗渉私雖致屢空怡然自得嘗從容獨笑顧謂其子𤣥齡曰人皆因祿富我獨以官貧所遺子孫在於清白郭榮容貌魁岸外踈内密與之交者多愛之終右候將軍李士謙趙郡平棘人齠齔喪父母以孝聞士謙自以少孤未嘗飲酒食肉李氏宗黨豪盛毎至春秋二社必髙㑹極歡無不沈醉諠亂嘗集士謙所盛饌盈前而先為設黍謂羣從曰孔子稱黍為五榖之長荀卿亦云食先黍稷古人所尚容可違乎少長肅然不敢弛惰退而相謂曰既見君子方覺吾徒之不徳也士謙聞而自責曰何乃為人所踈頓至於此又士謙家富於財州里有兄弟分財不均至相䦧訟士謙聞而出財補其少者令與多者相埓兄弟媿懼更相推讓卒為善士謙擢國子祭酒不就終於家唐李百藥性寛容泛愛為時文宗引進後生提奬不倦王友貞口不言人過尤好釋典屏絶羶味出言未嘗負諾時論以為真君子神龍初徴太子中舍人以疾固辭趙驊肅宗時為秘書少監性孝弟敦重交友雖經危難不改其操楊綰尤攻文詞藻思清贍而宗尚𤣥理沈静寡欲嘗獨處一室左右經書塵埃滿室澹如也含光用晦不欲名彰每屬文耻於自白非知己不可得而見位至宰相薨楊於陵為左僕射致仕於陵器量宏整進止有常度在朝三十餘年崇踐中外始終不失其正居官奉職亦善操守時人皆仰其風徳孔述睿謙和退讓與物無競毎親朋集㑹恂恂似不能言人皆敬之終太子賔客韋夏卿有風韻善談讌與人同處終年而喜愠不形於色許孟容方勁富有文學又雅好推轂樂善拔士士多歸之崔從少以貞晦恭讓自處不交權利忠厚方嚴為正人宿儒所推階品合立門㦸終不之請四為方鎮無聲妓之娛終淮南節度副大使武儒衡字庭碩丞相元衡從父之弟才度俊偉氣直貌莊言不妄發與人交有終始終兵部侍郎盧元輔自曽祖以名節顯著元輔端静貞介不失門風歴踐清貫人士歸美不以其父把之惡為累終兵部侍郎後唐李琪初仕梁為翰林承㫖琪之名播於海内重然諾憐才奬善家門雍睦晉尹玉羽性仁恕好静黙與朋友交無怨棄御僕𨽻不好詈辱有過則諭而戒之有罪則禮而遣之家雖屢空不渝其㢘時雖亂離不廢其業仕至光祿少卿鄭韜光自襁褓迨於懸車凡事十一君踰七十載所在無官謗無私過三持使節不辱君命士無賢不肖皆恭已接納晚年背傴時人咸曰鄭傴不汚平生交友之中無怨隙親族之間無愛憎恬和自如性尚平簡及為户部尚書致政歸雒甚惬終焉之美崔棁字子文性恬淡不汲汲於榮利笑不至哂怒不至詈接新進後生未嘗有誨羣居公㑹寡言嘗云非止致人愛憎且或千人祖襧之諱指命僕役亦用禮節隆暑祁寒不使冒犯終太子賔客程遜性温厚鮮是非所履循䋲墨與善惡人交皆無悔吝朝野賢逹咸慕而重之終太常卿册府元龜卷八百六
