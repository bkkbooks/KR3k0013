  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_634-1a}
body:
  text: 冊府元龜卷六百三十四宋王欽若等撰銓選部條制第六晉少帝天福八年正月詔顯陵行事及祔廟等行事官並宜加兩階减兩選理减外合格日免取文觧便與注官過格者降一資為事勒停者許從勒停日理夲官選數仍減與兩選合格日免取文觧仍注邊逺同類官三月勑諸道州府令佐在任招携户口比初到任交領數目外如出得百户已上量添得租税者縣令加一階减一選主簿減一選出二百户已上者及添得租税者縣令加兩階減兩選主簿减兩選出三百户以上及添得租税者縣令加兩階减兩選别與轉官主簿加兩階减兩選出四百户至五百户已上及添得租税者縣令與加朝散大夫階超轉官資罷任後許非時叅選仍錄名送中書如已授朝散大夫及已出選門者即别議奨酬主簿加三階其出剩不及一百户者據户口及添租税數縣令加一階叅選日超一資注官主簿加一階五月勅曰吏部已判成選人等訪聞人數絶多闕員甚少頗為淹注例是饑貧宜推振滯之㤙用廣進身之路諸州府判掾見有員闕不少其見在黄衣選人等宜令注授前件官除三京鄴都掾曹外其餘竝許注擬候秩滿無遺闕者五選六選減一選七選八選減兩選九選十選減三選内有超資者再入官日即依夲資敘理河東管内及鄜延涇邠秦隴鳳等州管内闕員不少選人以家私不便多不伏官宜令所司不拘超折注擬仍俟秩滿無遺闕者五選六選减三選七選八選减四選再入官日却依夲資敘理所注前項州縣官等宜令銓司依判成次第注擬切在公當不得阿私仍不許選人通關仍付所司六月尚書兵部侍郎呂琦奏臣竊見四時選人三銓待闕停滯已及於數百棲遲列困於累年南曹繫日申銓甞有三十二十格式每月送闕不過五員七員竊慮闕員漸稀人數轉衆抛耕稼於鄉里忍窮餓於街坊名利之途人所難格朝夕之困事亦可矜若不改張恐未通濟欲請勒定月日南曹注納文觧只據見在判成待闕選人取殘闕及逐月新闕量人材優劣據員闕好弱許超折注擬如此即嵗暮至新春已来相次發遣應盡其将來選人即依舊至來年十月下觧南曹應期判成銓司准格注擬至次年選畢有正格勅用正規程從之仍勅取今年八月一日後注納文觧其已判成許超折人将來叅選却依夲資注擬從之開運二年正月吏部侍郎王易簡奏吏部流内銓諸司令史各主一司不相統攝茍有踰濫無所責成起今後望令夲銓闕頭一人都簽署諸司案牘者勅㫖銓總之司提舉是務時臨注擬尤在精詳宜令三銓仔細看騐闗牒或稍渉差謬即據理科條将澄刈楚之風用誡侮文之吏是月刑部侍郎趙逺奏臣伏覩長興四年五月二十三日勅州縣官在任日有覆推刑獄公事雪得寃獄活人命者准長興元年二月二十一日南郊赦書節文便許非時叅選特與超資注官仍賜章服者宜令諸道州府凡有雪活寃獄州縣官等依元勅㸃簡給付公慿本官自賫赴刑部投状委刑部據状近取本道雪活公案叅驗如事理合得元勅便仰給付優牒此盖道𢎞激勸務絶罔欺在酬奬以甚優期刑殺而無濫臣詳元勅只言州縣官員所許加恩未該内外職掌臣又詳前後請給優牒人等文案若係雪寃屈本道尋合奏聞例過五年十年本人方來論請具却尋追文案勞擾公方於事難明於理未當伏惟皇帝陛下體堯仁而御宇敷舜德以臨民大闡化條克修刑政旁詢闕典用整宏綱功必賞而罪必誅善者進而能者激起今後但能雪活寃獄不限在朝職司亦乞量加旌賞應關諸道州縣官員雪活寃獄不虛委逐處長吏抄畧指實按節先具奏聞所付本人慿由官滿到京便於刑部投状不得隔越年歳方可論訴功勞庻内外以皆同使期程而有守廣亭毒好生之德盡高低察獄之明者勅㫖理寃申屈勞績可嘉内職外官課最無異茍能雪活何恡甄酬宜先錄公文直具聞奏或實官滿到闕投状無致隔年庻絶濫訛用分真偽宜依三年四月吏部侍郎王易簡奏伏以選門格勅條件具存藩府官僚該詳盖寡所以凡給文解莫曉規程以致選人自詣京都親求解様往来既苦已堪憫傷傳冩偶差更當駁放伏見禮部貢院逐年先書版榜高立省門用示舉人俾知状様臣欲請選人文觧委南曹詳定解様兼備錄長定格取解條例各下諸州如禮部貢院板様書冩立在州縣門每遇選人取解之時各准條件遵行仍依板様給解從之十月勅今年四月二十五日釐革應前資州縣官一考前丁憂一任除官雪活寃獄及在任日招添得户口税錢曾授御署官進䇿官諸州馬歩判官諸色選人等今後竝湏准勅格叅選不得直經中書陳状近日有諸色人依前紊亂紀綱披陳文状欲以嚴行於懲戒先明示於指揮國家大啓銓曹高懸選格諸色選人宜歸常調合赴所司稍立政能足可進退豈得罔循常制唯務僭求勅釐革而不遵帖告示而不退向路隅而陳接隨馬後以諠譁或稱罷秩家貧或訴住京日久朝廷湏存公道難狥私懷若事可施行雖朝陳状而夕得官未足言速既理有違碍雖歴祁寒而經暑雨不必言遲戚本自貽咎将誰執殊不知官不可乞勅不可違若無誡懲何以齊整應諸色選人等並湏准近勅取解赴選其有招添得户口增益得税錢及雪活寃獄合該勅條酬奨者仰於所司投状如有司不與公當區分顯有抑滯在經中書陳状當與指揮此度分明告諭後諸色選人等如更不禀指揮依前妄陳文状當送御史臺勘問必無輕恕仍付所司漢高祖乾祐元年正月中書奏以諸道奏薦官吏多踰舊式今簡取後唐及晉朝事例開條曉示以為定制者一准長興二年七月十二日節文諸道奏薦州縣官使相每年許薦三員今許薦五人不帶使相藩侯每年舊許薦二人今許薦三人防禦團練使每年舊許薦一人今許薦二人即不得受人請託只得奏廵属員闕不得薦於别處州府仍不得薦新罷任及過格人其所薦人歴任文書仍隨表送中書門下未曾有官者當别比擬應諸道見任州縣官申奏考滿後未有替人本道或藉其幹能且令勾當一准長興三年五月十一日節文諸道應奏薦州縣官員如未有正官者只許奏授初官不得奏為令錄一准長興四年八月節文應諸道藩鎭防禦團練使舊奏薦并前項州縣官等准勅許奏薦見在幕中攝職及見攝管内州縣官據合奏人數皆正所攝不許横薦及不得薦外管前資州縣官一准天福四年七月七日節文應諸州防禦團練刺史奏薦攝試官充判官及推官廵官者自今後所奏薦攝試官充判官及推官廵官宜令精加選擇或未曾任官職及無出身稱攝試衘者不在奏舉之限一准天福十一年六月五日節文今後諸道藩鎭防禦團練刺史如本處幕中有闕准元勅合奏薦者即得奏薦當與除授不得横薦前資責從州縣官及諸色職員布於在朝及外管安排不得有違奏勅設官分職朝廷自有規程薦士延才州郡合存體式應諸道節度防禦團練刺史奏薦判官書記支使推官令錄簿尉等親人之官不易入幕之客尤難必取當仁庶聞幹事守臣奏薦朝廷選除素有明文咸拘定制近年以来除人或􅉻允當薦士多昧選求體制既踰紊亂滋始遐邇将期於致理奏除宜在乎擇才况有舊章足為常式其諸道行軍副使兩使判官竝不得奏薦委中書門下選除帶使相節度使許奏節度掌書記觀察支使節度推官不帶使相節度使只許奏節度掌書記節度推官其防禦團練判官刺史判官等聽奏仍湏精選才能其唐朝晉朝前項條貫竝可舉行永為規制所奏薦州縣官自有銓行不可侵越以勅内舊人數許奏使相三人不帶使相二人防禦團練刺史一人為定仍付所司隠帝乾祐元年七月吏部員外郎常准上言臣以國家選擇令佐或從銓注或是勅除立考課以挍政能驗貪亷而行黜陟如斯條貫尚有闕遺近者諸道州府多署攝官以代正授既不拘於考績唯掊歛於資財致使户民轉為蠧耗臣請示諸道州府長吏如令佐正官月限已滿除替未到不限時月切不得以攝官衝替湏待正授替官即令對面交割縣務然後本州使出給解由批書厯子如此則承眞命者守文畏法求攝任者退亦悛心二年正月勅睿陵及祔廟諸司職掌行事人等竝減二年勞如欠一選及已合格者南曹磨勘送名中書其州縣前資官判成人及幕職京官等並减兩選仍令南曹㸃簡若别無違碍欠三選已上者給與減選公慿若欠兩選一選及已合今格限者所司具名申送中書門下其判成選人銓司越一資注擬四月中書門下奏准吏部南曹鏁宿内選人中有契丹㑹同年號厯子解由考牒未審各令改就天福年號為復别有指揮奏勅應是偽命文書不在施行之限者今縁有晉州受官契丹年給解由厯子若執格勅文慮有廢身名欲議酌中不至沉棄者凡州縣官幕府官曾受契丹偽命者追文書毁廢者取唐朝晉朝出身文書叅選本選外仍殿五選降三資注擬凡唐朝晉朝諸科及第人於契丹年號内出給冬集許追毁換給仍據新給年月日數理選從之八月右拾遺高守瓊上言有國通規無先擢士論選既當綱紀必陳而縣令字人最親理道若宰大邑難用小才一同皆繫於惨舒百姓咸關於利病實賴勤恪以恤孤惸吏若不臧人當受弊近年銓司注擬藩府薦論只循資歴而行不以年顔為念且少年宰邑鮮有亷勤不執公方惟貪娛樂以臣愚見凡朝廷選親人之官年未三十請不授縣令少年授任必慮因循勅令錄之任責辦非輕用舎之間尤宜適中少小者未曾履歴則為政必疎衰晩者已及耄昏則臨民多廢湏期愼選以擢吏能起今後諸色選人年及七十者並宜注優散官年少未歴資考者不得任縣令十二月勅中書奏前資朝官近日併於中書陳状稱准宣命指揮自外地發遣相次到京正當冬寒未有員闕既難淹泊湏議指揮其前資文武兩班朝官等只宜於西京及闕下任便安居候闕除授宜令御史臺曉示又中書條奏准天福八年四月一日勅條舉前後勅文内一件准天福五年十月二十七日勅應州縣官書得十六考敘階至朝散大夫者并歴任内曾昇朝及兩使判官者准元勅一選集選期既近理减尤難不得援常選人例妄乞減選每一任無遺闕者候再除官别與加恩其曾任節度觀察推官廵官防禦團練軍事判官并諸出選門官等如却授令錄者並依見任官選數赴集若在任有考課准格合減選者並與理减除此外今任合七選集者特與減一選八選已上與減兩選仍並合格日取解赴所司磨勘無違碍者即錄名送中書勅審官之要必擇才能與理同歸迭處中外約以選限固有條格邇来或自朝行或從賓職願為州縣自就便宜當求事之時冀得而不論卑位及既替之後敘資而却理前官湏立規程以絶僥倖是冬近臣奏前資朝官判官在外藩居止其間輕薄求利者能以詞説揺動藩臣乃下宣命但是前資朝官從事並来京中居止其求事者利其宣命遂雲集都下相與朋結三五為羣於宰臣樞宻使馬前遮訴初楊邠甚怒出此釐革然而遮訴不已周太祖廣順元年二月勅朕祗膺景命淹有中區每思順物之情從衆之欲将使照臨之下咸遂寛舒仕宦之流自安進退往者時有拘忌人或滯留所在前資並遣赴闕輦轂之下多寄食僦舎之人歳月之間動懷土念家之志宜循大體用革前規應諸道州府有前資朝官居住如未赴京不得發遣其行軍副使已下幕職州縣等官得替求官自有月限年月未滿一聽外居如非時詔徵不在此限但闕員有數入官者多茍無定規必生躁競凡爾進取知朕意焉漢隠帝時楊邠以前資官在外地慮有游説藩方易萌姦妄故宣諭外州凡前資朝臣使府幕職不得外地居止湏求京師尋宣諭只令兩京居止太祖知其不便故下此勅是月勅自前朝廷除官銓司選授當其用闕皆棄舊規近聞所得官人或佗事所留或染疾淹駐始赴任者既過月限後之官者遂失期程以至相㳂漸成非次是致新官叅謝欲上舊官考秩未終待滿替移動逾時月凋殘一處新舊二官在迎送以為勞必公私之失緒今後應諸道州府錄事叅軍判司縣令主簿等宜令本州府以到任月日旋具申奏及報吏部此後中書及銓司以到任月日用闕永為定制其見任州縣官限勅到仰便具先到任月日一齊分析申奏及報吏部其有諸色事故及丁憂并請假十旬滿日亦仰旋具申奏兼報吏部其新受官准令式給程限外如不到本任叅上致本處無慿申奏到任月日便仰吏部同違程不上收闕使用其諸見闕亦不得差官攝權輙便隠留如違勅條罪在本判官錄事叅軍孔目官已下是月吏部三銓奏去年冬南曹判成選人三百八十一人經十一月二十二日兵火散失磨勘了歴任文書或有送納文書未鈔及取到南曹失墜公慿銓司若依格磨勘恐選人訴論今欲只據南曹給到失墜公慿便與施行從之五月勅朕祇荷上𤣥恭臨大寳慮一夫之不獲期四海之攸歸近知銓選人多州縣闕少或經年而空掩桂玉未授一官或欲歸而暗想鄉閭又遥千里以斯去任虛歴歳時其間或妄乞官者多是踰違自稱淹滯或未合格者不遵條制顯紊公方宜行釐革之文以絶倖求之路宜令自今月十一日已前州縣前資官及諸色選人等曾經中書陳状者竝送吏部南曹磨勘如今年冬合格無殿犯違碍者即送中書除官未合格并諸色違礙格勅及曾殿黜得洗雪者并仰各守格勅敘理赴集其漢朝州縣為徵科不了及擅用破迯户停官人數並令赴吏部南曹投状磨勘實是無過停替者本朝解由公慿及牒三司灼然過准格減一考前停官者可送名中書除官一考後兩考前停官者减一選兩考已上者上理本官選數竝取解赴集起今後應有前資州縣官并諸色選人等及曾經黜該恩得雪者竝仰各守勅格赴選不得妄有乞官如敢故違宜殿兩選将来降一資注擬如或本司不依格勅妄有滯留罪在所司當行典憲一則俾守規程之道一則稍除躁競之門免恣踰濫貴尊條制如是特恩不拘是例是月勅朝廷設爵命官求賢取士或以資敘進或以科級昇至有白首窮經方階一第半生守選始遂一官是以國無幸民士無濫進近年州郡奏薦多無出身前官或因權勢書題或是裏私請託既難阻意便授眞恩遂使躁求徼倖之徒爭逰㨗徑辛苦孤寒之士盡泣窮途将期激濁揚清所宜循名責實凡百有位當體朕懷今後州府不得奏薦無前官及無出身人如有竒才異行越衆超羣亦許具名以聞便可隨表赴闕當令有司考試朕亦自更披詳斷其否臧俾之是黜庶使人不謬舉野無遺才冀廣得人以資從政六月中書門下奏得司勲郎中許遜申權主判吏部格式選人皆稱値去年十一月内失墜告牒雖尋舊式有例簡行竊縁官員上任之日只慿告勅籖符罷秩之後即藉解繇歴子既失官牒得以簡其勅甲若無解繇難知眞偽欲請今後若無解繇歴子考牒者候牒本道州縣勘尋有何殿最候廻文與陳状官員事理同即依牒申銓取保再給慿繇貴無踰濫之人免有徼求之倖從之是月勅追尊四廟諸司寺監合差行事官宜令差補漢末七州停替州縣官充候行事了各與除官如行事官人數未足以前資州縣官已合格并過選者充仍歴勘官牒委無違碍方得差補又勅今年正月五日恩赦前應諸色官員有過犯合追毁出身歴任官牒至今尚未追毁其本官敘理仍各依格勅處分八月吏部南曹磨勘勸進官㸃簡内有室長相次呈納到出身已來補牒優牒多奏補不依年限當曹先為去年冬集選人年滿室長李溥張宗又為奏補不依年限駁放後便値兵火失墜補牒優牒申中書門下取裁欲依判成選人失墜文書例出給公慿奏勅宜令所司各出給失墜文書公慿候叅選日磨勘理本官選限外仍各殿兩選應乾祐六年已來及自今後如有齋郎奏補後年限滿令定冬集及推補室長時有違格勅不依年限者違一年殿兩選二年殿三選違二年已上者不在施行之限仍勅下後殿選餘竝准前後勅施行九月勅朝廷命官分治州縣至於招安户口增益税租明立賞科以勸勤吏近朝釐革雖有勅文俱未適中難仍舊貫晉代則傷於容易啓僥倖之門漢朝則過於艱難妨進趨之路既非允當湏議改更宜令應州縣官所招添到户口課績自今日已前罷任者並准天福八年三月十一日勅施行其漢乾祐三年七月二十五日勅不行起今後應罷縣令主簿招添到户口其一千户已下縣每增添滿二百户者减一選三千户已下縣每三百户咸一選五千户已下縣每四百户减一選萬户已下縣每五百户減一選并所有增添户及租税並湏分明於歴子解由内錄都數若是減及三選已上更有增添及户數者縣令與改服色已賜緋者與轉官其主簿與加階轉官十月勅選部公事比置三銓所有員闕選人分在三處每至注擬之際資敘難得相當况又今年選人不多宜令三銓公事併為一處委本司長官通判同商量可否施行所冀掄選得中銓綜有序其吏部尚書銓見闕宜差禮部尚書王易權判二年三月勅應京諸司職掌赴西京册廟行事八十有六人宜令吏部南曹别驗出身歴任行事無遺闕歴子委無違碍與各减一選如有今年冬初合格又已過選者銓司注官日與加一階其不該選數已經補奏者減一年勞十一月詔曰古者立封樹之制定䘮葬之期著在典經是為名教洎乎世俗衰薄風化陵遲親殁而多闕送終身後而便為無主或覊束於仕宦或拘忌於隂陽旅櫬不歸遺骸何託但以先王􅂷訓孝子因心非以厚葬為賢只以稱家為禮掃地而祭尚可以告䖍負土成墳所貴乎盡力宜頒條令用警因循庶使九原絶抱恨之魂千古無不歸之骨應内外職官及選人等今後有父母祖父母亡沒未經遷葬其主家之長不得輙求仕進所由司亦不得申舉解送如是卑㓜在下者不在此限其合赴舉選者或是葬事禮畢或是卑㓜在下勒於所納家状内具言不得罔冐宜令御史臺及逐處長吏本司長官所由司覺察申舉其中有兵戈阻滯或是朝廷特恩除拜起復追徵及内外管軍職員皆以金革從事竝不拘此例三年五月勅近日多有諸色出選門州縣官累經中書陳状援引從前勅文乞除官事由中書據乾祐二年二月十日勅文以此難議施行今将已前勅文詳酌可否特與條貫庶無淹滯應前後出選門州縣官内有十六考敘朝散大夫階次赤令并歴任中曾昇朝及兩使判官五府少尹罷任後一周年除官曾任兩藩營田判官書記支使防禦團練判官罷任後二周年與除官竝許經中書陳状㸃簡不欠年限當與施行選期既定不得依常選人例更理減選仍湏分明批書歴子請給解由若是迯夫户口降書考第其顯有過犯必行殿降應諸色選人過犯三選已上及未成資考丁憂課績官無選可減者宜令自於吏部南曹投状准格勅磨勘無違碍申送中書門下竝與除官其州縣官自恐􅉻損年限資序歸選門者亦聽自便如或曾任推廵軍事判官等竝諸色出選門官竝據見任官選數敘理取解赴集依格勅磨勘送名中書門下於銓司注擬前先次除官所有諸色常選人皆自有選限合赴常調今後不得妄有陳乞及不依格勅論理功課如違當行舉勘若是特恩除授及擢才委任不拘此例十一月勅郊禮行事官竝差在京永任者充各據出身歴任仔細磨勘委無違碍方得差補如曾有殿犯除名免官勒停等人未經恩洗雪者不在收補之限若已取解及免取解赴選在外未來者不得著人承替如收補行事後将來赴選南曹磨勘别有違碍所補官司與本人竝當勘斷是月勅天下縣邑素有等差歴年月以既深或增損之不一其中有户口雖衆地望則卑地里雖高而户口至少每至調集不便銓衡及有久歴官途却授隘狹之縣纔昇仕進便臨繁庶之民宜立成規庶叶公共應天下縣除赤縣畿縣次赤次畿外其餘三千户已上為望縣二千户已上為𦂳縣一千户已上為上縣五百户已上為中縣不滿五百户為中下縣選人資敘合入下縣者今許入中下縣宜令所司據今年天下縣户口數定望𦂳上中下次第聞奏吏部格式據户部今年諸州府所管縣分列户口數目定合為望縣者六十四𦂳縣七十二上縣一百二十四中縣六十五中下縣九十七欲依所移銓曹從之顯德元年正月赦文應祗奉郊廟職掌人直竝與恩澤其行事官已勘無違礙者候銓司移省後各與除官合來一年集者候将來授任仍竝加一階欠三選至五選者減一選欠六選已上減兩選幕職並與减一年如欠月限不及一年者便與除官仍轉官資其諸色選人駁放皆依格勅其間小小違礙若可以情恕者竝條奏以聞世宗顯德二年正月詔在朝文資官曾歴藩郡賓職州縣官者宜令各舉堪為令録者一人除官之日仍署舉主姓名若在官貪濁不公懦弱不理或職務廢闕或處斷乖違竝量事重輕連坐舉主三年十月詔曰諸司職員皆係奏補當執役之際悉藉公勤及任事之時尤資幹敏茍非愼擇漸至因循應諸司寺監今後收補職役人等並湏人材俊利身言可採書札堪中自前行止委無訛濫勒本司關送吏部引驗人材較考筆札其中者更具引驗可否連所試書跡竝本州府不係色役廻文及正身引送中書後吏部具夾名聞奏候勅下勒本司補收餘從前後格勅處分每年只得一度奏補其諸司寺監舊額定人數仍令所司量公事繁省於未奏補人數内酌詳添減别為定額先是百司奏補官吏於事言筆札之間多不選擇以至有不能舉其條目者勅出之後物議以為允當五年正月詔曰職官攸設數易則弊生政理所施久行則民信前典有三載考績之義昔賢垂三年報政之規将欲化民莫如師古諸道幕職州縣官依舊制以三十箇月為滿起今年正月一日後所授官竝以三周年為月限閏月不在其内每年常調選人及諸色求任人取十月一日已前到京下納文解及陳乞文状委所司依舊例磨勘注授至十二月上旬終竝湏了畢便令赴官限二月終以前到任若違程仰本處不得放上且令舊官在任如是無故違程依格殿選其有故違程者湏分明出給得所在慿由許至前冬赴集今年赴任者不在此例其特勅除授及隨幕判官赴任不拘時月之限應授官人至滿日替人未到間宜令且守本官主當公事依舊請俸州府亦不得差署攝官替下如是遭䘮停任身故假滿非時闕官之時只可差前資正官及有出身人承攝如逐處無正官及有出身人即選清強人承攝仍依正官例支與俸錢具名奏聞閏七月吏部流内銓状申見行條件公事銓司先准格例南曹十一月未開宿判成選人後先具都數申銓銓司據状便牓示選人引納京諸司職官使家状及試判紙三度牓引得齊足方至十二月上旬内定日鏁銓者銓司若候南曹十月内開宿引納家状慮恐遲滯今後纔南曹鏁宿後先牓示選人預納家状其合保文状使職官司使印限開曹後兩日内赴銓送納湏得齊足如限内不納到家状保状試紙名便具姓名落下不在續納之限據納到文状至十月二十二日已前鏁銓先准格例鏁銓後便牓示引驗正身告勅文書三引都九日如三度引不到者便落下銓司自今後鏁銓日便牓示選人次至日引驗正身及告勅文書限三日内三引畢如不到者便落下每年南曹判成選人中多有託故不赴選司准格例伺候湏及三引計九日不到者方始落下銓司今後有此色人逐引不到便據姓名落下先准格諸色選人三引畢後賫使印保状赴銓并合保後縣令錄事叅軍重引驗合保審其才術銓司欲三引後次日内重引驗令錄審其才術及合保如限内不到者便據姓名落下銓司引驗後本行准格勅及将銓状歴任告勅文書限三日内㸃簡無違礙具名衘關報試判注擬所有選人歴任省司於未注官已前相次修冩帖送過院選人所合注使員闕鏁銓後便具状申中書門下乞降指揮應選人試判今欲鏁銓内預准勅於中書省請印到逐人試紙候㸃簡畢關報名衘齊足次日便定日試判三塲逐塲次日申奏後限兩日内供納宣黄後次日乞降可否勅命銓司自前注擬諸色選人准格三注每一注内有不伏官者限三日内具状通退三注都九日者銓司自今後第一第二注牓出後各限次日内具通官伏官文状便具姓名落下第三注畢日開銓不在通官之限三注都五日准格銓司送省逐年二月二十五日送門下省畢三月十五日過官畢三月三十日進黄移省畢銓司三擬畢後省甲案便於格式司逐注旋覆闕入官過院條冩省歴至十一月十四日已前牒送門下省畢銓司門下省但押定牒到取兩日祗候取判過堂次日乞降可否堂帖其黄甲限四月内修冩勾勘印署至十二月六日牒送門下省至十二月十九日進黄畢所有衙謝對敭元在格限外應行内諸司公事或有忤繫申銓取裁銓司便准勅格指揮如銓司難議裁酌即申堂取裁册府元龜卷六百三十四
