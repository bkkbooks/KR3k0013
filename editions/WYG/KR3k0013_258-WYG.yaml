body:
  text: 册府元龜巻二百五十八宋王欽若等撰儲宫部誕慶儀貌令德孝友文學失德誕慶夫王者當宇宙之大承基構之重期本枝之克茂故主器而斯尚載誕之始慶賜遂行或立禖祝之祠或赦囚繫之罪或以之賜爵級或因之錫宴喜所以上祗宗祏下隆基緒者也垂諸竹帛不為過矣漢戾太子武帝長子帝春秋二十九廼得皇子羣臣喜枚臯與東方朔作皇太子生賦及立皇子禖祝禮月令祀於髙禖髙禖求子之神也武帝晩得太子喜而立此禖祠而令臯作祭祀之文也受詔所為皆不從故事重皇子也宋太子劭文帝長子元嘉三年閠正月丙戌生二月乙卯繫囚見徒一皆原赦時文帝猶在諒闇故秘之三年閠正月方云劭生自前代以來有人君即位後皇后生太子惟殷帝乙既踐祚正妃生紂至是又有劭焉體元居正帝甚喜悦梁昭明太子統字德施髙祖長子也母曰丁貴嬪初髙祖未有男義師起太子以齊和帝中興元年九月生於襄陽與貴嬪留在州城京邑平乃還京師哀太子大器字仁宗簡文帝嫡長子普通四年五月丁酉生陳吳興王裔字承業後主長子也以宣帝大建五年二月乙丑生於東宫母孫姬因産卒沈皇后哀而養之以為己子是時後主年長未有裔嗣宣帝因命以為嫡孫其日下詔曰皇孫載誕國祚方熈思與羣臣共同斯慶内外文武賜帛各有差為父後者賜爵一級隋元德太子昭焬帝長子也初文帝以開皇三年四月庚午夢神自天下降云是天将生降寤召納言蘇威以告之及聞蕭妃在并州有娠迎置太興宫之客省明年正月戊辰生昭養於宫中唐廢太子承乾太宗長子武德初文德皇后生於承乾殿因以名焉太子忠字正奉髙宗長子貞觀十七年十一月甲辰生髙宗宴宫寮於𢎞教殿太宗幸東宫顧謂宮臣曰頃來生業稍可非無酒食而唐突卿等宴㑹者朕初有此孫故相就為樂太宗酒酣起舞以屬羣臣在位於是遍舞盡日而罷賜物有差懿德太子重潤中宗長子髙宗開耀二年中宗為皇太子生於東宫内殿髙宗甚悦及滿月大赦改元永淳是歳立為皇太孫儀貌夫肖天地之形體雲日之表受最靈之氣有繼明之象故天姿岐嶷出乎自然龍章粹和發於異禀是以居主鬯之重為天下之本有以見容止可度矣宋太子劭文帝長子美鬚眉大眼方口長七尺四寸南齊文惠太子長懋武帝長子也姿容豐美為髙帝所愛從容有風儀音辭和辯體素過壯在宫簡於遨逰梁昭明太子統髙祖長子也美姿貌善舉止體素壯腰帶十圍哀太子大器簡文帝嫡長子也性寛和神采端嶷陳太子深後主第四子也容止儼然雖左右近侍未嘗見喜愠唐章懷太子賢髙宗第六子始出閤容止端雅深為髙宗所嗟賞令德夫嘉言善行必垂於後盖以為人景慕與世作程矧未登儲貳之尊應兩明之象而孝謹天至温恭日新問安侍膳具瞻三善之姿監國撫軍允副萬邦之望所以妙選羽儀率尊師傅者顯於此矣吳太子登大帝長子接待寮屬畧用布衣之禮或射獵當繇徑道嘗逺避良田不踐苖稼至於頓息又擇空閑之地其不欲煩民如此又失盛水金馬盂覺得其主左右所為不忍致罸呼責數之長遣歸家勅親近勿言太子和大帝第三子赤烏五年為太子都督劉寶白庶子丁晏晏亦白寶和謂晏曰文武在事當能幾人因隙構薄圖相危害豈有福哉遂兩釋之使之從厚南齊文惠太子長懋自正位東儲善立名尚解聲律工射飲酒至數斗而未嘗舉盃從容有風儀音辭和辯引接朝士人人自以為得意與景陵王子良俱好釋氏立六侯館以養窮民梁昭明太子統武帝長子孝謹天至寛和容衆喜愠不形於色年十二於内省見獄官將讞事問左右曰是皂衣何為者曰廷尉官屬召視其書曰是皆可念我得判否有司以統幼紿之曰得其獄皆刑罪上統皆署杖五十有司抱具獄不知所為具言於髙祖髙祖笑而從之自是數使聽訟每有所寛縱者即使太子決之每入朝未五皷便守城門開在東宫雖復燕居内殿一坐一起恒向西南面臺宿被召當入危坐逹旦以時俗稍奢太子欲以已率物服御朴素身衣浣衣膳不兼肉性仁恕見在宫禁防捉荆子者問之云以清道驅人太子恐致傷痛使捉手板代之頻食中得蠅蟲之屬宻置柈邉恐厨人獲罪不令人知又見後閤小兒攤戯後屬有獄牒攤者法士人結流徒庶人徒太子曰私錢自戯不犯公物此科太重令注刑止三歲士人免官獄牒應死者必降長徒自此以下莫不减半又性愛山水於𤣥圃穿築更立亭舘與朝士名素著者逰其中嘗汎舟後池畨禺侯軌盛稱此中宜奏女樂太子不答詠左思招隱詩曰何必絲與竹山水有清音軌慙而止出宫二十餘年不畜聲樂少時勅賜太樂女伎一部畧非所好時髙祖大𢎞佛教親自講説太子亦崇信三寶徧覽衆經乃於宫内别立慧義殿專為法集之所招引名僧談論不絶太子自立三諦法身義並有所通普通元年四月丼露降于慧義殿咸以為至德所感焉㑹大軍北討京師糓貴太子因命菲衣减膳改嘗饌為小食復敬耆老中舍人陸襄母年將八十與蕭琛傅詔陸景每月嘗遣存問加賜􅈿羞衣服自加元服髙祖使理萬機平斷法獄多所全宥天下皆稱仁每霖雨積雪遣腹心左右周行閭巷視貧困家及有流離道路密加賜與出主衣綿帛多作襦袴冬月以施貧凍若死亾無可以歛者為備棺槥每聞逺近百姓賦役勤苦輙歛容色嘗以户口未實重於勞擾及薨朝野惋愕京師男女奔走宫門號泣滿路四方氓庻及疆徼之民聞喪皆慟哭陳太子深後主第四子少聰慧有志操容止儼然左右近侍未嘗見其喜愠隋廢太子勇髙祖長子性寛仁和厚率意任情無矯餙之意元德太子昭煬帝長子大業元年立為皇太子昭有武力能引强弩性謙冲言色恂恂未嘗忿怒有深嫌可責者但云大不是所膳不許多品帷席極儉素臣吏有老父母者必親問其安否歳時皆有惠賜其仁愛如此唐太子𢎞髙宗第五子性仁孝深為帝及天后所鍾愛咸亨初駕幸東都留太子於京師監國時大旱關中饑乏令取廊下兵士糧視之見有榆皮蓬實者乃各給米使足又請以同州沙苑地分借貸人詔許之顯慶三年薨年二十四甚為士庶所痛惜髙宗親為製叡徳紀并自書之于石章懷太子賢髙宗第六子始出閣容止端雅深為髙宗所嗟賞上元二年立為皇太子尋令監國處事明審為時論所稱孝友古者並建師傅奉乎冡嫡所以琢磨懿範輔翼令猷夫父子之親存乎天性兄弟之愛謂之天倫人道之先何尚於此烝烝之志克奉於慈顔怡怡之懽􅄎敦於同氣則正家而定天下推已而刑四海粢盛有寄匕鬯無失豈止問安之訓道映於龍樓致羙之風事光於甲觀而已哉吳太子登大帝之子也自武昌遷都建業時登鎮後以弟慮卒登徃建業住十餘日欲遣西還深自陳乞以乆離定省子道有闕又陳陸遜忠勤無所顧憂帝遂留焉登所生庻賤徐夫人少有母養之恩後徐氏以妬廢處吳而歩夫人最寵歩氏有賜登不敢辭拜受而已徐氏使至所賜衣服必沐浴服之登將拜太子辭曰本立而道生欲立太子須先立后帝曰卿母安在對曰在吳帝黙然及為皇太子時弟和有寵於帝登親敬待之如兄嘗有欲讓之心梁昭明太子性仁孝自出宫常思戀不樂髙祖知之每五日一朝多便留永福省或五日三日乃還宫普通七年十一月母丁貴嬪有疾太子還永福省朝夕侍疾衣不觧帶及薨歩從喪還宫至殯水漿不入口每哭輙慟絶髙祖遣中書舍人顧恊宣㫖曰毁不㓕性聖人之制身不勝喪比於不孝有我在那得自毁如此可即強進飲粥太子奉勅乃進數合自是至葬日進麥粥一升髙祖又勅曰聞汝所進過少轉就羸瘵我比更無餘病正為汝如此胸中亦填塞成疾故強加饘粥不使我常爾懸心雖屢奉勅勸逼終喪日止一溢不嘗菜菓之味體素壯腰帶十圍至是减削過半每入朝士庻見莫不泣大通三年三月寢疾恐貽髙祖憂勅看問輙自力手書啓及稍篤左右欲啓聞猶不許曰云何令至尊知我如此惡因便嗚咽四月乙巳薨時年三十一哀太子大器簡文帝子性寛和兼神采端嶷在於賊手毎不屈意初侯景西上攜太子同行及其敗歸部伍不復振肅太子所乗舡居後不及賊衆左右心腹並勸因此入北太子曰家國喪敗志不圖生主上䝉塵寧忍違離吾今亾匿乃是叛父非謂避賊便涕泗嗚咽令即前進賊以太子有器度每嘗憚之恐為後患故先及禍隋元德太子昭焬帝長子也生而髙祖養於宫中既長髙祖嘗謂曰當為爾娶婦昭應聲而泣髙祖問其故對曰漢王未婚時嘗在至尊所一朝娶婦則便出外懼將違離是以啼耳髙祖嘆其有至性特鍾愛焉唐太子𢎞髙宗子顯慶初義陽宣城二公主以母得罪幽于掖庭太子見之驚惻遽奏請令出降㑹帝幸東都留太子於京師監國駕發數日太子戀慕不已帝聞之遽追赴行在焉𢎞嘗受春秋左氏傳於率更令郭瑜至楚子商臣之事廢卷而嘆曰此事臣子所不忍聞經籍聖人垂訓何故書此瑜對曰孔子修春秋義存褒貶故善惡必書褒善以示法貶惡以誡後故使商臣之惡顯于千載太子曰非惟口不可道固亦耳不忍聞請改讀餘書瑜再拜賀曰里名勝母曽子不入邑號朝歌墨子囘車殿下誠孝實資睿情天發㐫悖之迹㸃於視聽循奉德音實深慶躍臣聞安上理人莫善於禮非禮無以事天地之神非禮無以辯君臣之位故先王重焉孔子曰不學禮無以立請停春秋而讀禮記太子從之才智禮云一有元良萬邦以貞盖世子之謂也若乃才繇天縱志本夙成觧經若生知臨事必先覺無假師保之訓自成聰哲之謀而明兩有暉承葉作則故可得而稱也吳太子登嘗乗馬出有彈丸過左右求之有一人操彈佩丸咸以為是辭對不服從者欲捶之登不聽使求過丸比之非類乃見釋孫和為太子時有司頗以條書問事和以為姦妄之人將因事錯意以生禍心不可長也表宜絶之又嘗言當世士人宜講修術學較習射御以周世務而但交游博奕以妨事業非進取之謂後羣僚侍宴言及博奕以為妨事費日而無益於用勞精損思而終無所成非所以進德修業積累功緒者也且志士愛日惜力君子慕其大者髙山景行恥非其次夫以天地長乆而人居其間有白駒過隙之喻年齒一暮榮華不再凡所患者在於人情所不能絶誠能絶無益之欲以奉德義之塗棄不急之務以修功德之基其於名行豈不善哉夫人情猶不能無嬉娛嬉娛之好亦在於飲宴琴書射御之間何必博奕然後為歡乃命侍坐者八人各著論以矯之於是中庻子韋曜退而論奏和以示賔客時蔡頴好奕直事在署者頗斆焉故以諷之晉愍懷太子遹惠帝長子少聰慧武帝時宫中嘗失火武帝登樓望之太子時年五歳牽帝裾入闇中帝問其故太子曰暮夜倉卒宜備非常不宜令炤見人君也繇是竒之嘗從帝觀豕牢言於帝曰豕甚肥何不殺以享士而使乆費五􅥃帝嘉其意即便烹之因撫其背謂廷尉傅祗曰此兒當興我家嘗與羣臣稱太子似宣帝於是令譽流於天下惠帝即位立為皇太子梁昭明太子統武帝長子天監元年始二歳立為皇太子三歳受孝經論語五歳徧讀五經悉能諷誦性寛和髙祖數使聽訟每有欲寛縱者即使太子决之建康縣讞誣人誘口獄翻縣以太子仁愛故輕當杖四十令曰彼若得罪便合家孥戮今縱不以其罪罪之豈可輕罰而已可付治十年自加元服髙祖便使省萬機内外百司奏事者填塞於前太子明於庻事纎毫必曉毎所奏有謬誤及巧妄皆即就辯析示其可否徐令改正未嘗彈紏一人隋元德太子昭煬帝長子也生而髙祖命養宫中三歳時於𤣥武門弄石獅子髙祖與文獻皇后至其所髙祖適患腰痛舉手慿后昭因避去如此者再三髙祖嘆曰天生長者誰復教乎繇是大竒之唐太子承乾太宗長子少敏惠太宗甚愛之貞觀八年九月太子來朝太宗謂侍臣曰我以承乾多疾病不令讀書但與孔頴逹評論古事我試令作數紙書言經國大體立成三紙頗有可觀先論刑獄為重深得經邦之要也章懷太子賢髙宗第六子處事明審為時論所稱初為潞王始出閣髙宗嘗謂司空李勣曰此兒已讀得尚書禮記論語誦古詩賦復十餘篇蹔經領覽遂即不㤀我曽遣讀論語至賢賢易色遂再三復誦我問何為如此乃言性愛此言方知夙成聰敏出自天性文學夫儲貳之建所以重宗祧而承天序也故有師保之訓書禮之教然後溫文著於内英華發於外所謂行一物而三善皆得者其世子齒於學之謂也繇漢而下或通經肄業成於講習或立言著論煥乎義趣或雕章麗藻駿發於豪翰或遺文徃行克就於編緝斯固彰郁郁之美播洋洋之譽玉振而金相星暉而海潤者已漢武帝戾太子據少壯詔受公羊春秋少壯者言漸長大也又從瑕丘公受糓梁南齊文惠太子長懋武帝長子也初太祖好左氏春秋太子承㫖諷誦以為口實及豫章王嶷薨太子見帝友于既至造碑文奏之梁髙祖昭明太子統三歳受孝經論語五歳徧讀五經悉能諷誦天監八年於壽安殿講孝經盡通大義㳺宴祖道賦詩至十數韻或命作劇韻賦之皆屬思便成無所㸃易嘗自討論篇籍或與文士商確古今問則繼以文章著述率以為常于時東宫有書三萬巻名才並集文章之盛晉宋以來未之有也所著文集二十卷又撰古今典誥文言為正序十卷五言詩之善者為文章英華二十卷文選三十卷愍懷太子方矩元帝子少勤學聰頴有元帝風陳後主廢太子商性聰敏好學執經肄業終日不倦博通大義並善屬文隋髙祖廢太子勇頗好學觧屬詞賦帝欲徙民北實邉塞勇上書直諌帝覽而嘉之書具儲宮諫諍門唐髙宗太子𢎞初入東宫請於崇賢舘置學並置生徒詔許之始置學生二十員東宫三師三少賔客詹事少詹事左右庻子左右衛卒率及崇賢舘三品學士子孫亦宜通取𢎞嘗受春秋左氏傳於率更令郭瑜又讀禮記龍朔元年命中書令兼太子賔客許敬宗侍中兼太子右庻子許圉師中書侍郎上官儀太子中書舍人楊思儉等於文思殿博探古今文集擿其英詞麗句以類相從勒成五百卷名曰瑶山玊彩表上之制賜物三萬叚敬宗以下加級賜帛有差章懷太子賢髙宗第六子始出閣髙宗謂司空李勣曰此兒已讀得尚書禮記論語誦古詩賦復十餘篇暫經領覽遂即不㤀上元二年立為太子賢招集當時學者太子左庻子張太安洗馬劉訥言雒州司户格希𤣥學士許叔牙成𤣥一史藏諸周寶寧等注范􅁮後漢書表上之賜物三萬仍以其書付秘閣太子瑛𤣥宗子開元二十五年𤣥宗命瑛題御史大夫李適之所撰河隄記碑額又命永王璘書其碑隂時皇太子與諸王新賦毬塲詩序適之乃上言曰臣不工文且非碩學更紆天人之翰以光鄙野之文又見陛下訓以義方教之親睦文王美棠棣之華皇王之際於斯為盛事連中禁恐良史闕書請編諸典策以光千古帝手詔報曰卿文勒石誠為可重故令兒子題額及隂何所發揮而勞致謝毬塲宴樂咸沐深慈豈伊斐然少能申寫卿為宗子欲名教有歸記之史册亦隨卿意失德夫反德為亂棄德不詳故仲尼戒其不修臯陶勤其邁種良有謂也矧復應前星之象當主鬯之重是為天下之本用承萬代之業乃有居昬長敖犯義踰矩崇侈汰以自恣謀逸豫以無度雖天威有赫臨之而不悛近侍盡規正之而罔顧以至貽厥敗累垂諸編簡噬臍之悔庸可及乎晉􅉖懷太子遹惠帝長子不好學惟與左右嬉戯不能尊敬師傳賈后素忌之密勅黄門閹官媚䛕於太子曰殿下誠可及壯時極意所欲何為嘗自拘束於是慢弛益彰或廢朝侍嘗在後園㳺戲愛埤車小馬令左右斷其鞅勒使墮馬為樂或有犯忤者手自箠擊之性拘小忌不許繕壁修牆正瓦動屋而於宫中為市使人屠酤手揣斤兩輕重不差其母本屠家女也故太子好之又令西園賣葵菜藍子鷄麫之屬而收其利東宫舊制月請錢五十萬備於衆用太子嘗探取二月以供嬖寵洗馬江統陳五事以諫之太子不納中書舍人杜錫以太子非賈后所生而后性兇暴深以為憂每盡忠規勸太子修德進善逺於䜛謗太子怒使人以針著錫常所坐氊中以刺之南齊文惠太子長懋武帝長子風韻甚和而性頗奢麗宫内殿堂皆雕􅎖精綺過於上宮開拓𤣥圃園與臺城北塹等其中樓觀塔宇多聚竒石妙極山水慮上宫望見乃傍門列修竹内施髙鄣造㳺墻數百間施諸機巧宜須鄣蔽須㬰成立若應毁撒應手遷徙善製珍玩之物織孔雀毛為裘光以金翠過於雉頭矣以晉明帝為太子時立西池乃啓武帝引前例求東田起小苑帝許之永明中二宫兵力全實太子使宫中将吏更番役築宫城苑巷制度之盛觀者傾京師帝性雖嚴多布耳目太子所為無敢啓者後帝幸豫章王宅還過太子東田見其彌亘華逺壯麗極目於是大怒收監作主師太子懼皆藏匿之繇是見責太子素多疾體又過壯常在宫内簡於遨逰玩弄羽儀多所僣擬咫尺及宮禁而帝終不知太子嘗使徐文景造輦及乗輿御物武賁雲罕之屬帝嘗幸東宫忽忽不暇藏輦文景乃以佛像内輦中故帝不疑及太子薨嘗履行東宫見太子服玩過制大怒勅有司隨事毁除以東田殿堂改為崇墟館後魏廢太子恂孝文長子不好書學體貌肥大深忌河雒暑熱意每追樂北方中庻子髙道悦數苦言致諫恂甚銜之孝文幸嵩岳恂留守金墉謀欲召牧馬輕騎奔代手刃道悦於禁中領軍元儼勒門防遏夜得寧静帝聞之駭惋外寢其事仍至汴口而還引恂數罪與咸陽王僖等親杖恂又令僖等更代百餘下隋廢太子勇髙祖長子嘗文飾蜀鎧帝見而不悦恐致奢侈之漸因而誡之其後經冬至百官朝勇張樂受賀帝知之問朝臣曰近聞至節内外百官相率朝東宫是何禮也太嘗少卿辛亶對曰於東宫是賀不得言朝帝曰改節稱賀止可三數十人隨情各去何因有司徴召一時普集太子法服設樂以待之東宫如此殊乖禮制於是下詔停斷自此恩寵始衰勇多内寵昭訓雲氏尤稱嬖幸禮匹於嫡勇妃元氏無寵嘗遇心疾二日而薨獻皇后意有佗故甚責望勇自是雲昭訓專擅内政后彌不平頗遣人伺察求勇罪過唐隱太子建成髙宗長子外結小人内連嬖幸復與諸公主及六宫親戚驕恣縱横并兼田宅侵奪犬馬同惡相濟掩蔽聰明茍行已志唯以丼言䛕辭承候顔色太子承乾太宗長子好聲色慢逰無度然懼太宗知之不敢見其迹每臨朝視事必言忠孝之道退朝後便與羣小䙝狎有太常樂人年十餘歳美姿容善歌舞承乾特加寵幸號曰稱心太宗知而大怒收殺之承乾痛悼不已於宫中構室立其形像列偶人車馬於前令宫人朝暮奠祭承乾數至其所徘徊流涕仍於宫中起冡而葬并贈官樹碑以申哀悼承乾自此托疾不朝叅者輙逾數月嘗命户奴數十百人專習伎樂學胡人椎髻剪綵而舞衣尋橦跳劍晝夜不絶皷角之聲日聞於外册府元龜巻二百五十八
