body:
  text: 册府元龜巻五百二十七宋王欽若等撰諌諍部規諌第四晉傅𤣥為散騎常侍武帝初即位廣納直言開不諱之路𤣥上䟽曰臣聞先王之臨天下也明其大教長其義節道化隆於上清議行於下上下相奉人懐義心秦蕩滅先王之制以法術相御而義心亡矣近者魏武好法術而天下貴刑名魏文慕通逺而天下賤守節其後綱維不攝而虛無放逸之論盈於朝野使天下無復清議而亡秦之病復發於今陛下聖德龍興受禪𢎞堯舜之化開正直之路體夏禹之至儉宗殷周之典文臣詠歎而已將又奚言惟未舉清逺有體之臣以敦風節未退虛鄙以懲不恪臣是以猶敢有言詔報曰舉清逺有體之臣者此尤今之要也乃使𤣥草詔進之又𤣥為御史中丞時頗有水旱之災𤣥上䟽曰臣聞聖帝明王受命天時未必無災是以堯有九年之水湯有七年之旱惟能濟之以人事耳故洪水淊天而免沉溺野無生草而不困匱伏惟陛下聖德欽明時小水旱人未大饑下祗畏之詔求極意之言同禹湯之罪已侔周文之夕惕臣伏歡喜上便宜五事其一曰耕夫務多種而耕暵不熟徒喪功力而無收又舊兵持官牛者官得六分士得四分自持私牛者與官中分施行來乆衆心安之今一朝減持官牛者官得八分士得二分持私牛及無牛者官得七分士得三分人失其所必不歡樂臣愚以為宜佃兵持官牛者與四分持私牛與官中分則天下兵作歡然悦樂愛惜成穀無有損棄之憂其二曰以二千石雖奉務農之詔猶不勤心以盡地利昔漢氏以墾田不實徵殺二千石以十數臣愚以為宜申漢氏舊法以警戒天下郡縣皆以死刑督之其三曰以魏初未留意於水事先帝綂百揆分河堤為四部并本凢五謁者以水功至大與農事並興非一人所周故也今謁者一人之力行天下諸水無時得徧伏見河堤謁者車誼不知水勢轉為他職更選知水者代之可分為五部使各精其方宜其四曰古以百歩為畝今以二百四十歩為一畝所覺過倍近魏初課田不務多其頃畝但務修其功力故白田收至十餘斛水田收數十斛自頃以來日増田頃畝之課而田兵益甚功不能修理至畝數斛已還或不足以償種非與曩時異天地横遇災害也其病正在于務多頃畝而功不修耳竊見河堤謁者石恢甚精練水事及田事知其利害乞中書召恢委曲問其得失必有所補益其五曰臣以為凡屬逺夷不與華同鮮卑最甚本鄧艾茍欲取一時之利不慮後患使鮮卑數萬散居人間此必為害之勢也秦州刺史胡烈素有恩信於西方今令烈往邊方雖已無惡必且消弭然事變難保不必其可乆安也若後有動釁烈計能制之惟恐邊騎適困于討擊便能東入安定西赴武威外名為䧏可動復動此二郡非烈所制彼東西有窟穴浮游之地故復為患無以禁之也宜更置一郡於高平川因安定西州都尉募音慕樂徙民重其復除以􅂶之以通北道漸以實邊詳議此二郡及新置郡縣皆使并屬秦州令烈得專御邊之宜詔曰此誠為國之大本當今急務也傅咸咸寧初襲父爵拜太子洗馬累遷尚書右丞出為冀州刺史三旬之間遷司徒左長史時帝留心政事詔訪朝臣政之損益咸上言曰陛下處至尊之位而修布衣之事親覽萬機勞心日昃在昔帝王躬自菲如毛反薄以利天下未有踰陛下也然泰始開元以暨于今十有五年矣而軍國未豐百姓不贍一歲不登便有菜色者由官衆事殷復除猥濫蠶食者多而親農者少也臣以頑踈謬忝近職每見聖詔以百姓饑饉為慮無能云補伏用慙恧女六反敢不自竭以對天問舊都督有四今并監軍乃盈于十夏禹敷土分為九州今之刺史幾向一倍户口比漢十分之一而置郡縣更多空校牙門無益宿衛而虛立軍府動有百數五等諸侯復坐置官屬諸所寵給皆生於百姓一夫不農有受其饑今之不農不可勝計縱使五稼普收僅足相接暫有災患便不繼贍以為當今之急先并官省吏靜事息役上下用心惟農是務也咸為車騎司馬以世俗奢侈上書曰臣以為穀帛難生而用之不節無緣不匱故先王之化天下食肉衣帛皆有其制竊謂奢侈之費甚于天災古者堯有茅茨今之百姓競豐其屋古者臣無玉食今之賈豎皆厭粱肉古者后妃乃有殊飾今之婢妾被服綾羅古者大夫乃不徒行今之賤隸乘輕驅肥人稠地狹而有儲蓄由於節也今土廣人稀而患不足由於奢也欲時之儉當詰其奢奢不見詰轉相高尚昔毛玠為吏部尚書時無敢好衣美食者魏武帝歎曰孤之法不如毛尚書今使諸部用心各如毛玠風俗之移在不難矣咸惠帝初即位遷御史中丞㑹有詔羣僚舉郡縣之職以補内官咸上書曰興化之要在於官人才非一流職有不同譬諸林木洪纎枉直各有攸施故明揚逮于側陋疇咨無拘内外之任出處隨宜中間選用惟内是隆外舉既頺復多節目競内薄外遂成風俗此敝誠宜亟革之當内外通塞無所偏耳既使通塞無偏若選用不平有以深責責之茍深無憂不平也且膠柱不可以調瑟况乎官人而可以限乎以選防不能出入不能出入當隨事而制無須限法法之有限其於致逺無乃泥乎或謂不制其法以何為貴臣聞刑懲小人義責君子君子之責在心不在限也正始中任何晏以選舉内外之衆職各得其才粲然之美於斯可觀如此非徒御之以限法之所致乃委任之由也委任之懼甚于限法是法之失非己之尤尤不在己責之無懼所謂齊之以刑人免無恥者也茍委任之一則慮罪之及二則懼致怨謗已快則朝野稱詠不善則衆惡見歸此之戰戰孰與倚限法以茍免乎孫楚為衛將軍司馬時龍見武庫井中羣臣將上賀楚上言曰頃聞武庫井中有二龍羣臣或有謂之禎祥而稱賀者或有謂之非祥無賀者可謂楚既失之而齊亦未為得也夫龍或俯鱗潜于重泉或仰攀雲漢游平蒼昊而今蟠于坎井同于蛙蝦者豈獨管庫之士或有隠伏厮役之賢沒于行伍故龍見光景有所感悟陛下赦小過舉賢才垂夢于傅巖望想于渭濵修學官起淹滯申命公卿舉獨行君子可惇風厲俗者又舉亮采秀異之才可以撥煩理難矯世抗言者無繫世族必先賤役夫戰勝攻取之勢并兼混一之威五霸之事韓白之功耳至于制禮作樂闡揚道化甫是士人出筋力之秋也伏願陛下擇狂夫之言華嶠太康末為侍中時武帝頗親宴樂又多疾病屬瘳嶠與侍臣表賀因微諌曰伏惟聖體漸就平和上下同慶不覺抃舞臣等愚戇竊有微懐以為收功于所忽事乃無悔慮禍于垂成祚乃日新惟願陛下深垂聖明逺思所忽之悔以成日新之福冲靜和氣嗇養精神頥身于清簡之宇留心于虛曠之域無厭世俗嘗戒以忽羣下之言則豐慶日延天下幸甚帝手詔報曰輙自消息無所為慮李重為始平王文學上䟽陳九品曰先王議制以時因革因革之理唯變所適九品始于喪亂軍中之政誠非經國不刋之法也且其檢防轉碎微刑失實故朝野之論僉謂驅動風俗為弊已甚而至於議改又以為疑臣以革法創制當先盡開塞利害之理舉而措之使體例大通而無所否滯亦未易故也古者諸侯之治分土有常國有定主人無異望卿大夫世禄仕無出位之思臣無越境之交上下體固人德歸厚秦反斯道罷侯置守風俗淺薄自此來矣漢革其弊斟酌周秦並建侯守亦使分土有定而牧司必各舉賢貢士任之卿議事合聖典比蹤三代方今聖德之隆光被四表兆庻顒顒欣覩太平然承魏氏彫弊之跡人物播越仕無常朝人無定處郎吏蓄於軍府豪右聚于都邑事體駁錯與古不同謂九品既除宜先開移徙聴相并就且明貢舉之法不濫于境外則冠帶之倫將不分而自均均則土㫁之實行矣又建樹官司功在簡乆階級少則人心定乆其事則政化成而賢否著此三代所以直道而行也以為選例九等當今之要所宜施用也聖王知天下之難嘗從事于其易故寄櫽括于閭伍則邑屋皆為有司若任非所由是非所覈則雖竭聖智猶不足以贍其事由此而觀誠令二者既行即人思反本修之於鄉華競自息而禮讓日隆矣劉頌為淮南相在郡上䟽曰臣昔忝河内臨辭受詔卿所言悉要事宜大小數以聞嘗苦多事或不能悉有報勿以為疑臣受詔之日喜懼交集益思自竭用􅁯其鄙願以螢燭増暉重光到郡草具所陳如左未及書上㑹臣嬰丁天罰頓寢累年今謹封上前事臣雖才不經國言淺多違猶願陛下垂省使臣微誠得經聖鑒不忽棄于常案如有足採兾補萬一伏見詔書開啓土宇以支百世封建戚屬咸出之藩夫豈不懷公理然也樹國全制始成於今超秦漢魏氏之局節紹五帝三代之絶跡功被無外光流後裔巍巍盛美三五之君殆有慙德何則彼因自然而就之異乎絶跡之後經更創之雖然封幼穉皇子於呉蜀臣之愚慮謂未盡善夫吳越剽輕庸蜀險絶此故變釁之所出易生風塵之地且自吳平以來東南六州將士更守江表此時之至患也又内兵外守吳人有不自信之心宜得壯王以撫鎭之使内外各安其舊又孫氏為國文武衆職數擬天朝一旦堙替同於編戸不識所蒙更生之恩而災困逼身自謂失地用懷不靖今得長王以臨其國隨才受任文武並敘士卒百役各獲其所於事為宜宜取同姓諸王年二十以上才高者分王吳蜀以其去近就逺割裂土宇令倍於舊以徙封故地用王幼穉須皇子長乃遣君之於事未晩也急所須地交得長王此事宜也臣所陳封建今大義已舉然餘衆事倘有足採以參成制故皆並列本事臣聞不憚危悔之患而願獻所見者盡忠之臣也垂聴逆耳丼納苦言者濟世之君也臣幸遇無諱之朝雖嘗抗疏陳辭汜論政體猶未悉所見指言得失徒荷恩寵不異凢流臣竊自愧不於漢魏之先三祖崛起易朝之為未可一旦直繩御下誠時宜也然至於為政矯世衆務自宜漸出公塗法正威斷日遷就肅譬猶行舟雖不横截迅流然漸靡而往終得其濟積微稍著以至於今可以言政自泰始來政功美績未稱聖㫖凢諸事業不茂既往以陛下明聖猶未及叔世之弊以成始初之隆傳之後世不無慮乎意者臣言豈不少槩聖心夫顧惟萬載之事理在二端天下大器一安難傾一傾難正故慮經後世者必精目下之政政安遺業使數世頼之若乃建諸侯樹藩屏深根固蔕則祚延無窮可以比跡三代如或當身之政遺風餘烈不及後嗣雖樹親戚而成國之制不建使夫後世獨任智力以安大業若未盡其理雖經異時憂責猶追在陛下將如之何願陛下善當今之政樹不拔之勢則天下無遺憂矣夫聖明不世及後嗣不必賢此天理之常也故善為天下者任勢而不任人任勢者諸侯是也任人者郡縣是也郡縣之察小政理而大勢危諸侯為邦近多違而逺慮固聖王惟終始之弊權輕重之理包彼小違以據大安然後足以藩固内外綏鎭九服夫武王聖主也成王賢嗣也然武王不恃成王之賢而廣封建者慮經無窮也且善言今者必有騐之於古唐虞以前書文殘缺其事難詳至于三代則並建明德及興王之顯親列爵五等開國承家以藩屏帝室延祚乆長近者五六百歲逺者將千載逮至秦氏罷侯置守子弟不分尺土孤立無輔二世而亡漢承周秦之後雜而用之前後二代各二百餘年揆其封建不用雖强弱不敵制度舛錯不盡事中然跡其喪亡嘗在同姓失職諸侯微時不在强盛昔呂氏作亂幸頼齊代之援以寧社稷亡國叛逆梁王捍之卒弭其難自是之後威權削奪諸侯止食租奉甚者至乘牛車是以王莽得擅本朝遂其奸謀傾蕩天下毒流生靈光武紹起雖封樹子弟而不建成國之制祚亦不延魏氏承之圏閉親戚幽囚子弟是以神器速傾天命移在陛下長短之應禍福之微可見於此魏氏雖正位居體南面稱帝然三方未賔正朔有所不加實有戰國相持之勢大晉之興宣帝定燕太祖平蜀陛下滅吳可謂功格天地土廣三王舟車所至人力所及皆為臣妾四海大同始于今日宜承大勲之籍及陛下明盛之時開啓土宇使同姓必王建乆安于萬載垂長世于無窮臣又聞國有任臣則安有重臣則亂而王制人君立子以適不以長立適以長不以賢此事情之不可易者也而賢明至少不肖至衆此固天理之常也物類相求感應而至又自然也是以闇君在位則重臣盈朝明君臨政則任臣列職夫任臣之與重臣俱執國綂而立斷者也然成敗相反邪正相背其故何也重臣假所資以樹私任臣因所藉以盡公盡公者政之本也樹私者亂之源也推斯言之則泰日少亂日多政教漸頺欲國之無危不可得也又非徒唯然而已借令愚劣之嗣蒙先哲之餘緒得中賢之佐而樹國本根不深無幹輔之固則所謂任臣者化而為重臣矣何則國有可傾之勢則執權者見疑衆疑難以自信而甘受死亡者非人情故也若乃建基既厚藩屏彊禦雖置幼君赤子而天下懼曩之所謂重臣者今悉反忠而為任臣矣何則理無危勢懐不自猜忠誠得著不惕于邪故也聖王知賢哲之不世及故立相持之勢以御其臣是以五等既列臣無忠慢同於竭節以徇其上羣后既建繼體賢鄙亦均一契等於無慮且樹國茍固則所任之臣得賢益理次委中智亦足以安何則勢固易持故也然則建邦茍盡其理則無向不可是以周室自成康以下逮至宣王宣王之後至于赧王其間歴載朝無名臣而宗廟不隕者諸侯維持之也故曰為社稷計莫若建國夫邪正逆順者人心之所繫服也今之建置宜審量事勢使諸侯率義而動同忿俱奮令其力足以維帶京邑若包藏禍心惕於邪而起孤立無黨所蒙之籍不足獨以有為然齊此甚難陛下宜與達古今善識事勢之士深共籌之建諸侯之理使君樂其國臣榮其朝各流福祚傳之無窮上下一心愛國如家視百姓如子然後能保荷天祿兼翼王室今諸王裂土皆兼于古之諸侯而君賤其爵臣恥其位莫有安志其故何也法同郡縣無成國之制故也今之建置宜使率由舊章一如故典然人心繫常不累十年好惡未改情願未移臣之愚慮以為宜早創大制遲回衆望猶在十年之外然後能令君臣各安其位榮其所蒙上下相持用成藩輔如今之為適足以虧天府之藏徒棄穀帛之資無補鎮國衞上之勢也古者封建既定各有其國後雖王之子孫無復尺土此今事之必不行者也若推親疎轉有所廢以有所樹則是郡縣之職非建國之制今宜豫開此地令十世之内使親者得轉處近十世之逺近郊地盡然後親踈相維不得復如十世之内然猶樹親有所遲天下都滿已彌數百千年矣今方始封而親踈倒施甚非所宜更大量天下土田方里之數都更裂土分人以王同姓使親踈逺近不錯其宜然後可以永安古者封國大者不過土方百里然後人數殷衆境内必盈其力足以備充制度今雖一國周環近將千里然力實寡不足以奉國典所遇不同故當因時制宜以盡事適今宜令諸王國容少而軍容多然於古典所應有者悉立其制然非急所須漸而備之不得頓設也須車田器械既具羣臣乃服綵章倉廪已實乃營宫室百姓已足乃備官司境内充實乃作禮樂惟宗廟社稷則先建之至于境内之政官人用才自非内史國相命於天子其餘衆職及死生之斷穀帛資實慶賞刑威非封爵者悉得專之今臣所舉二端盖事之大較其所不載應在二端之屬者以此為率今諸國本一郡之政耳若備舊典則官司以數事所不須而以虛制損實力至于慶賞刑斷所以衞下之權不重則無以威衆人而衞上故臣之愚慮欲令諸侯權具國容少而軍容多然亦終于必備今事為宜周之建諸侯長享其國與王者並逺者僅將千載近者猶數百年漢之諸王傳祚暨至曽𤣥人性不甚相逺古今一揆而短長甚違其故何邪立意本殊而制不同故也周之封建使國重于君公侯之身輕于社稷故無道之君不免誅放敦興滅繼絶之義故國祚不冺不免誅放則羣后思懼裔嗣必繼是無亡國也諸侯思懼然後軌道下無亡國天子乘之理勢自安此周室所以長在也漢之樹置君國輕重不殊故諸王失度陷于罪戮國隨以亡不崇興滅繼絶之序故下無固國下無固國天子居上勢孤無輔故姦臣擅朝易傾大業今宜反漢之弊修周舊跡國君雖或失道陷于誅絶又無子應除茍有始封支裔不問逺近必紹其祚若無遺類則虛建之須皇子生以繼其綂然後建國無滅又班固稱諸侯失國亦由網宻今又宜都寛其檢且建侯之理本經盛衰大制都定班之羣后著誓丹青書之玉版藏之金匱置諸宗廟副在有司寡弱小國猶不可危豈况萬乘之主承難傾之邦而加其上則自然永乆居重固之安可謂根深華嶽而四維之也惟臣之愚願陛下置天下於自安之地寄大業於固成之勢則可以無遺憂矣今閭閻少名士官司無高能其故何也清議不肅人不立德行在取容故無名士下不專局又無考課吏不竭節故無高能無高能則有疾世事少名士則後進無凖故臣思立吏課而肅清議夫欲富貴而惡貧賤人理然也聖王大諳物情知不可去故直同公私之利而詭其求道使夫知富者必先由貧欲貴者必先安賤安賤則不矜不矜然後廉恥厲守貧者必節欲節欲然後操全以此處務乃得盡公盡公者富貴之徒也為無私者終得其私故公私之利同也今欲富者不由貧自得富欲貴者不安賤自得貴公私之塗既乖而人情不能無私私利不可以公得則常背公而横務是以風節日頺公理漸替人以富貴非軌道之所得以此為政小大難期然教頺來既乆難反一朝又世故都靡營欲比肩羣士渾然庸行相似不可頓肅甚殊黜陟也且教不求盡善盡善在仰尤多侈之中猶有甚泰使夫昧適情之樂者損其顯榮之貴俄在不鮮之地約已潔素者蒙儉德之報列于清官之上二業分流令各有蒙然俗都放奢不可頓肅故臣思慮願先從事於漸也天下至大萬事至衆人君至少同于天日故非垂聴所得周覽是以聖王之化執要而已委務于下而不以是自嬰也分職既定無所與焉非憚日昃之勤而牽于逸豫之虞誠以政體宜然事勢致之也何則夫造創謀始逆闇是非以别能否甚難察也既以施行因其成敗以分功罪甚易識也易識在考終難察在造始故人君嘗居其易則安人臣不處其難則亂今陛下每精事始而畧于考終故羣吏慮事懐成敗之懼輕飾文采以避目下之譴重此政功所以未善也今人主能常居易執要以御其下然後人臣功罪形于成敗之徵無逃其誅賞故罪不可蔽功不可誣功不可誣則能者勸罪不可蔽則違慢日肅此為國之大畧也臣切隱陛下聖心意在盡善懼政有違故精事以求無失又以衆官勝任者少故不委務寧居日昃也臣之愚慮竊以為今欲盡善故宜考終何則精始難校故也又羣官多不勝任亦宜委務使能者得以成功不能者得以著敗敗著可得而廢功成可得遂任然後賢能常居位以善事闇劣不得尸祿害政如此不已則勝任者漸多經年少乆即羣司徧得其人矣此較才考實政之至務也今人主不委事仰成而與諸下其造事始則功罪難分下不專事居官不乆故能否不别何以騐之今世士人决不悉良能也又决不悉疲軟也然今欲舉一忠賢不知所賞求一負敗不知所罰及其免退自以犯法耳非不能也登進者又自以累資及人間之譽耳非功實也若謂不然則當今之政未稱聖㫖此其徵也陛下御今法為政將三十年而功未日新其咎安在古人有言琴瑟不調甚者必改而更張凡臣所言誠政體之常然古今異宜所遇不同陛下縱未得其仰成之理都委務于下至于今事應奏御者蠲除不急使要事得精可三分之二古者六卿分職冡宰為師秦漢以來九列職事丞相都總今尚書制斷諸卿奉成于古制為重事所不須有然今未能省并可出衆事付外寺使得專之尚書為其都綂若丞相之為惟立法創制死生之斷除名流徙退免大事及連度支之事臺乃奏處其餘外官皆專斷之歲終臺閣課功較簿而已此為九卿造創事始斷而行之尚書主賞罰繩之其勢必愈考成司非而已於今親掌者動受成于上上之所失不得以罪下歲終事功不建不知所責也夫監司以法舉罪獄官案劾盡實法吏據辭守文大較雖同然至于施用監司與夫法獄體宜小異獄官惟實法吏惟文監司則欲舉大而畧小何則夫細過微闕謬妄之失此人情之所必有而悉紏以法則朝野無仁人此所謂欲理而反亂者也故善為政者綱舉而網䟽綱舉則所羅者廣網䟽則小必漏所羅者廣則為政不苛此為政之要也而自近世以來為監司者類大綱不振而微過必舉微過不足以害政舉之則微而益亂大綱不振則豪强横肆豪强横肆則百姓失矣此錯所急而倒所務之由也今宜令有司反所常之政使天下可善化及此非所難也人主不善碎密之案必擇犯彊舉尤之奏當責以盡公則害政之姦自然禽矣夫大姦犯政而亂兆庻之罪者類出富强而豪富者其力足憚其貨足欲是以官長顧勢而頓筆下吏縱姦懼所司之不舉則謹密網以羅微罪使奏劾相接狀似盡公而撓法不亮固已在其中矣非徒無益政體清議乃由此而益傷古人有言曰君子之過如日之蝕焉又曰過而能改又曰不貳過凡此數者皆是賢人君子不能無過之言也茍不至于害政則皆天網之所漏所犯在甚泰然後王誅所必加此舉罪淺深之大例者也故君子得全美以善事不善者必夷戮以警衆此為政誅赦之率式也何則所謂賢人君子茍不能無過小疵不可以廢其身而輒繩以法則愧于明時何則雖有所犯輕重甚殊於士君子之心受責不同而名不異者故不軌之徒得引名自方以惑衆聴因名可亂假力助直故清議益傷也凡舉過彈違將以肅風論而整世教今舉小過清議益頺是以聖王深識人情而達政體故其稱曰不以一𤯝掩大德又曰赦小過舉賢才又曰無求備於一人故古冕而前旒充纊塞耳意在善惡之報必取其尤然後簡而不漏大罪必誅法禁易全也何則害法在犯尤而謹捜微過何異放兕豹於公路而禁䑕盗於隅隙古人有言鈇鉞不用而刀鋸日弊不可以為政此言大事緩而小事急也時政所失少有此類陛下宜反而求之乃得所務也夫權制不可以經常政乖不可以守安此言政守之術異也百姓雖愚望不虛生必因時而發有因而發則望不可奪事變異常則時不可違明聖達政應赴之速不及下車故能動合事機大得人情昔魏武帝分離天下使人役居户各在一方既事勢所須且意有曲為權假一時以赴所務非正典也然逡廵至今積年未改百姓雖身丁其困而私怨不生誠以三方未悉蕩并知時未可以求安息故也是以甘役如歸視險若夷至于呉平之日天下懐靜而東南二方六州郡兵將士武吏戍守江表或給京城運漕父南子北室家分離咸更不寧又不習水土運役勤瘁並有死亡之患勢不可乆此宜大見處分以副人望魏氏錯役亦應改舊此二者各盡其理黔首感恩懐德謳吟樂生必十倍于今也自董卓作亂以至今近出百年四海勤瘁丁難極矣六合渾并始于今日兆庻思寧非虛望也然古今異宜所遇不同誠亦未可以希遵在昔放息馬牛然使受百役者不出其國兵備待事其鄉實在可為縱復不得悉然為之茍盡然其理可靜三分之二吏役可不出千里之内但如斯而已天下所蒙已不訾矣政務多端世事之未盡理者難徧以䟽舉振領總綱要在三條凢政欲靜靜在息役息役在無為倉廪欲實實在利農利農在平糴為政為政在著信著信在簡賢簡賢在官乆官乆非難也連其班級自非才宜不得傍轉以終其課則事善矣平糴已有成制其未備者可就周足則穀積矣無為匪他却功作之勤抑以益而損之利如斯而已則天下靜矣此三者既舉雖未足以厚化然可以為安有餘矣夫王者之利在生天地自然之財農是也所為指于此事誠有功益茍或妨農皆務所息此悉似益而損之謂也然今天下自有事所必須不得止已或用功甚少而所濟至重目下為之雖少有廢而終計已大益農官有十百之利及有妨害在始似如未急終作大患宜逆加功以塞其漸如河汴將合沉萊茍善則役不可息諸如此類亦不得已已然事患緩急權計輕重自非近如此類凖以為率乃可興為其餘皆務在靜息然能善筭輕重權審其宜知可興可廢甚難了也自非上智逺才不幹此任夫創業之美動在􅂷綂使夫後世蒙頼以安其為安也雖昬猶明雖愚若智濟不以著實在善化之為要在靜國至夫修飾官署凡諸作役務為常傷過泰不患不舉此將來所不須于陛下而自能者也至于仰蒙前緒所慿日月者實在遺風繫人心餘烈輔幼弱而今勤所不須以傷所慿均此二者何務孰急陛下􅂷恩廻慮詳擇所安則大理盡矣世之私議竊比陛下於孝文臣以為聖德隆殺將在乎後不在當今何則陛下龍飛鳯翔應期踐阼有創業之勲矣掃滅强吳奄征南海又有之矣以天子之貴而躬行布衣之所難孝儉之德冠于百王又有之矣履宜無細動成軌度又有之矣善當身之政建藩屏之固使晉代乆長後世仰瞻遺跡校功考事實與湯武比隆何孝文足云臣之此言非臣下褒上虛美常辭其事實然若所以資為安之理或未盡善則恐良史書勲不得逺盡𢎞美甚可惜也然不可使夫知政之士得參聖慮經年少乆終必有成願陛下少察臣言詔答曰得表陳封國之制宜如古典任刑齊法宜復肉刑及六州將士之役居職之宜諸所陳聞具足知卿乃心為國也動靜數以聞冊府元龜卷五百二十七
