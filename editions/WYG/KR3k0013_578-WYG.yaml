body:
  text: 册府元龜卷五百七十八宋王欽若等撰掌禮部奏議第六梁何佟之初仕齊為祠部郎武帝永明十一年奏議曰按禮記郊特牲社祭土而主隂氣也君南向於北墉下答隂之義也鄭𤣥云答猶對也北墉社内北墻也王肅云隂氣北向故君南向以答之是相對之稱乃知古祭社北向設位齋宮南向明矣近代相承帝社南向太社及稷竝東向而齋宫在帝壇北西向於神背後行禮又名稷社甚乖禮意及未知失在何時原此理當未久竊以皇齋改物禮樂惟新中國之神莫貴於社若遂仍前懼虧盛典謂二社語其義則殊論其神則一位竝宜北向稷若北向則成相背稷是百糓之總神非隂氣之主冝依先東向齋宫立社壇東北南向立以東為上諸執事西向立南為上稷依禮無兼稱今若欲尊崇正可名為太稷耳豈得謂為稷社邪臘祠太社日近按奏事御改定儀注曹稱治禮學士議曰郊特牲又云君之南向答陽也臣之北向答君也若以陽氣在南則位應向北隂氣在北則冝向南今南北二郊一限南向皇帝黑瓚階東西向故知壇墠無繫於隂陽設位寜拘於南北羣神小祠類皆南靣薦饗之時北向行禮盖欲申靈祗之尊美求幽之義魏世泰靜使社稷别營稱自漢以來相承南向漢之於周世代未逺鄗上頽基商邱餘樹猶應尚存迷方失位未至於此通儒逹識不以為非庾蔚之昔已有此議徐爰周景逺竝不同仍舊不改佟之議來難引君南向答陽臣北向答君敢問答之為言為是相對為是相背相背則社位南向君亦南向可如來議郊特牲云臣之北向答君復是君背臣今言君南臣北相向稱答則君南不得稱答矣記何得云祭社君南向以答隂邪社果同向則君亦冝西向何故在社南向在郊西向邪解則不然云君之南向答陽此明朝㑹之時盛陽在南故君南向對之猶聖人南靣而聴向明而治之義耳寜是祈祠天地之日乎知祭社北向君答故南向祠天南向君答宜北向矣今皇帝黒瓚階東西向者斯盖始入之别位非接對之時也按記云社所以神地之道也又云社祭土而主隂氣又云不用命戮于社孔安國云社主隂隂主殺傳曰日蝕伐鼔於社杜預云責群隂也社隂氣之盛也北向設位以本其義耳餘祀雖亦地祗而不主此義故位向不同不得見餘隂祀不北向便謂社應南向也按周禮祭社南向君求幽論宜北向而記云君南向答隂之義求幽之論不亦乖歟魏漢社稷同營共門稷壇在社壇北皆非古制後移宫南自當如禮如靜此言乃是顯漢社失周法見漢世舊事爾時祭社南向未審出何史籍就如議者靜所言是祭社位向仍漢舊法又襲周成規因而不改者則社稷三座竝應南向今何改帝社南向㤗社及稷竝東向邪治禮又難佟之凡三往反至明帝建武二年有司議治禮無的然顯據佟之議乃行初欝林王隆昌元年有司奏叅議明堂咸以世祖配國子助敎謝曇濟議按祭法禘郊祖宗竝列嚴祀鄭𤣥注義亦據兼享宜祖宗兩配文武雙祀助敎徐景嵩光禄大夫王逡之謂宜以世祖武皇帝配佟之議周文武尚推后稷以配天謂文皇宜推世祖以配帝雖事施於尊祖亦義章於嚴父焉左僕射王晏議以為若用鄭𤣥祖宗通稱則生有功德没垂尊稱歴代配帝何止於二耶今薦上帝允屬世祖百世不毁其文廟乎詔可建武二年正月有司以世祖武皇帝二十九日大祥三月二十九日祥禫至尊及羣臣泄哀之儀應定准下三學八座丞郎博士陶韶以為名立義生自古之制皇帝正號祖宗式序昭穆祥忌禫日皇帝宜服祭服出太極泄哀百僚亦祭服陪位太常丞李撝議曰尋尊號既追重服宜正但已從權制故苴杖不税至於鑚燧既同天地亦變容得無感乎且晉景獻皇后䘮羣臣備小君之服追尊之后無違後典追尊之帝固宜同帝禮矣雖臣子一例而禮隨時異至尊龍飛中興事非嗣武理無深衣之變但王者體國亦應弔服出正殿舉哀百僚致慟一如常式給事中領國子助敎謝濟議曰夫䘮禮一制限節兩分虞祔追亡之情小祥抑存之禮斯盖至愛可申極痛宜屈耳武皇帝雖君徳早凝民化未洽追崇尊極寔縁于性今言臣則無實論已則事虛聖上馭㝢更奉天眷祗禮七廟非從三后周忌祥禫無所依設太學􅀶士崔偃同陶韶議太常沈淡同李撝議國子愽士劉警等同謝濟議佟之議曰春秋之旨臣子繼君親雖恩義有殊而其禮則一所以敦資敬之情篤方䘮之義主上雖仰嗣高皇嘗經北靣方今聖厯御㝢垂訓無窮在三之恩禮不容替竊謂世祖祥忌至尊宜吊服升殿群臣同致哀感事畢百官詣宣德宫拜表仍致哀陵園以引追逺之慕尚書令王晏等一十九人同佟之議詔可是年有司奏景懿后遷登新廟車服之儀佟之議曰周禮王之六服大裘為上衮冕次之五車玉輅為上金輅次之皇后六服禕衣為上䄖翟次之首飾有三副為上編次之五車重翟為上厭翟次之上公無大裘玉輅而上公夫人有副及禕衣是以祭統云夫人副禕立于東房也又鄭云皇后六服惟上公夫人亦有禕衣詩云翟黻以朝鄭以翟黻為厭翟侯伯夫人入廟所乘今上公夫人副禕既同則重翟或不殊矣况景皇懿后禮崇九命且晉朝太妃服章之禮同於太后宋代皇太妃惟無五牛旗為異其外侍官則有侍中散騎常侍黄門侍郎各二人分從前後部同於王者内職則有女尚書女長御各二人棨引同於太后又魏朝之晉王晉之宋王竝置百官擬於天朝至於晉文王終猶稱薨而太上皇稱殂則是禮加於王矣故前議景皇后悉依近代皇太妃之儀則侍衛陪乘竝不得異后乘重翟亦謂宜也尋齊初移廟宣神主至乘金輅皇帝親奉亦乘金輅先往東廟往行禮畢仍從神主至新廟今宜依准也從之是年旱有司議雩祭依明堂佟之議曰周禮司巫云若國大旱則帥巫而舞雩旱祭也天子於上帝諸侯以下於上公之神又女巫云旱暵則舞雩鄭𤣥云使女巫舞旱祭崇隂也鄭衆云求雨以女巫禮記月令云命有司為民祈祀山川百源大雩帝用盛樂鄭𤣥云陽氣盛而恒旱山川百源能興雲致雨者也衆水所出百源必先祭其本又尋雩呼嗟求雨之祭也雩帝謂為壇南郊之旁五精之帝配以先帝也自鞉鞞至祝敔為盛樂他雩用􅁔舞而已百辟卿士古者上公以下謂勾龍后稷之類也春秋傳曰龍見而雩止當以四月王肅云大雩求雨之祭也傳曰龍見而雩謂四月也若五月六月大旱亦用雩禮於五月著雩義也晉永和中中丞啓雩制在國之南為壇祈上帝百辟舞童八列六十四人欹雩漢時皆以孟夏得雨報大牢于時􅀶士議舊有壇漢魏各自時尋月令云命有司祈祀山川百源乃大雩又云乃命百縣雩祀百辟卿士則大雩所祭惟應祭五精之帝而已勾芒等五神既是五帝之佐依鄭元説宜配食於庭也鄭元云雩壇在南郊壇之旁而不辯東西尋帝道尊右雩壇方郊壇為輕理應在左宜於郊壇之東營域之外築壇既祭五帝謂壇宜尋雩壇高廣禮傳無明文按覲禮設方明之祀為壇高四尺用珪璋等六玉禮天地四方之神王者率諸侯親禮焉所以敎尊尊也雩祭五帝粗可依放謂令築壇宜崇四尺其廣輪仍以四為度經四丈周十二丈而四陛也設五帝之位各依其方如在明堂之儀皇齊以世祖配五精於明堂今亦宜配享於雩壇矣古者孟春郊祀祈嘉榖孟夏雩祈甘雨二祭雖殊而所為者一禮惟有冬至報天初雖無雨賽帝今雖闕冬至之祭而南郊兼祈報之禮理不容别有賽答之事也禮祀帝於郊則所尚省費周祭靈威仰若后稷各用一牲今祀五帝世祖亦宜各用一犢斯外悉如南郊之禮也武皇遏宻未終自可不奏盛樂至于旱祭舞雩盖是嗟呼之義既非存懽樂謂此不渉嫌其餘祝史稱辭仰祈靈澤而已禮舞雩乃使無闕今之女巫竝不習欹舞方就敎試恐不應速依晉朝之議使童子或得取舍之宜也司馬彪禮儀志云雩祀者皂衣盖是崇隂之義今祭服皆緇差無所革其所欹之詩及諸供須輒勒主者申攝備辦從之是年佟之又奏按周禮大宗伯以蒼璧禮天黄琮禮地鄭𤣥又云皆有牲幣各放其噐之色知禮天圓丘用𤣥犢禮地方澤用黄牲矣牧人云凡陽祀用騂牲隂祀用黝牲鄭𤣥云騂赤黝黑也陽祀祭天南郊及宗廟隂祀祭地北郊及社稷祭法云燔柴於泰壇祭天也瘞埋於㤗折祭地也用騂犢鄭𤣥云地隂祀用黝牲與天俱用犢故連言之耳如此祭天地即南北郊矣今南北兩郊同用𤣥牲又明堂宗廟社稷俱用赤有違昔典又鄭𤣥云祭五帝于明堂勾芒等配食自晉以來并圓丘於南郊是以郊壇列五帝勾芒等今明堂祀五精更闕五神之位北郊祭地祗而設重黎之座二三乖殊懼虧盛則前軍長史劉繪議語云犂牛之子騂且角雖欲勿用山川其舍諸未詳山川合為隂祀不若在隂祀則與黝乖矣佟之又議周禮以天地為大祀四望為次祀山川為小祀周人尚赤自四望以上牲色各依其方者以其祀大宜從本也山川以下説豈不合符叅議為允從之永元元年佟之為歩兵校尉奏議曰盖聞聖帝明王之治天下也莫不尊奉天地崇敬日月故冬至祀天於圓丘夏至祀地於方澤春分朝日秋分夕月所以訓民事君之道化下嚴上之義也故禮云王者必父天母地兄日姊月周禮典瑞云王搢大圭執鎭圭藻五采五就朝日馬融云天子以春分朝日秋分夕月覲禮天子出拜月於東門之外盧植云朝日以立春之日也鄭𤣥云端當為冕朝日春分之時也禮記朝事議云天子冕而執鎭圭尺有二寸率諸侯朝日於東郊所以敎尊尊也故鄭知此端為冕也禮記保傅三代之禮天子春朝朝日秋暮夕月所以明有敬也而不明所用之定辰馬鄭云用二分之時盧植云用立春之日佟之以為日者太陽之精月者太隂之精春分陽氣方永秋分隂氣向長天地至尊用其始故祭以二至日月禮次天地敬朝以分差有理據則融𤣥之言得義矣漢世則朝朝日暮夕月魏文帝詔曰覲禮天子拜日東門之外返祀方明朝事儀曰天子冕而執鎭圭率諸侯朝日於東郊以此言之盖諸侯朝天子祀方明繇率朝日也漢改周法羣公無四朝之事故不復朝於東郊得禮之變矣然旦夕嘗於殿下東向拜日其禮太煩今採周春分之禮損漢日拜之儀又無諸侯之事無所出東郊今正殿即亦朝㑹行禮之庭也冝嘗以春分於正殿之庭拜日其夕月又不分明其議奏魏秘書監薛循論云舊事朝日以春分夕月以秋分按周禮朝日無常日鄭𤣥云用二分故遂施行秋分之月多東潛而西向拜之背實逺矣朝日冝用仲春之朔夕月冝用仲春之朔淳于睿駁之引禮記云祭日於東祭月於西以端其位周禮秋分夕月竝行於上世西向拜月雖如背實亦猶月在天而祭之於次不復言背也佟之按禮器云為朝夕必放於日月鄭𤣥云日出東方月出西方又云大明生於東月生於西此隂陽之分夫婦之位也鄭𤣥云大明日也知朝日東向夕月西向斯盖各本其位之所在耳猶如天子東西遊幸朝堂之官及拜官者猶北向朝拜寜得以背實為疑耶佟之謂魏世所行善得與奪之衷晉初棄圜丘方澤於兩郊二至輟禮至於二分之朝致替無義江右草創舊章多闕宋氏因循未能仄古切惟皇齊應天御極典敎惟新謂冝使盛典行之盛代以春分朝於殿庭之西東向而拜日秋分於殿庭之東西向而拜月此即所謂必於日月以端其位之義也使四方觀化者莫不欣欣而頌美旒藻之飾盖本天之至質也朝日不得同昊天至質之禮故𤣥冕三旒也近代祀天著冕十二旒極文章之義則是古今禮之變也禮天朝日既服冝有異頃世天子小朝㑹著絳紗袍通天金博山冠斯即今朝之服次衮冕者也切宜依此拜日月甚得差降之宜也佟之任非禮局經奏大典寔為侵官伏追慙震從之永元二年佟之又建議曰按祭法有虞氏禘黄帝而郊嚳祖顓頊而宗堯周人禘嚳而郊后稷祖文王而宗武王鄭𤣥云禘郊祖宗謂祭祀以配食也此禘謂祭昊天於圓丘也祭上帝於南郊曰郊祭五帝五神於明堂曰祖宗郊祭一帝而明堂祭五帝小德配寡大德配衆王肅云祖宗是廟不毁之名果如肅言殷有三祖三宗竝應不毁何故止稱湯契且王者之後存焉舜寜立堯頊之廟傳世祀之乎漢文以高祖配泰畤至武帝立明堂復以高祖配食一人兩配有乖聖典自漢明以來未能反昔故明堂無兼配之祀竊謂先皇冝列二帝於文祖尊新廟為高宗竝世祖而泛配以申聖主嚴父義先皇於武皇倫則弟為季義則經為臣設配饗之座應在世祖之下竝列俱西向國子􅀶士王摛議孝經周公郊祀后稷以配天宗祀文王於明堂以配上帝不云武王又周頌思文后稷配天也我將祀文王於明堂也武王之文惟執競云祀武王此自周廟祭武王詩彌知明堂無矣佟之又議孝經是周公居攝時禮祭法是成王反位後所行故孝經以文王為宗祭法以文王為祖又孝莫大於嚴父配天則周公其人也尋此言寜施成王乎若孝經所説審是成王所行則為嚴祖何得云嚴父邪且思文是周公祀后稷配天之樂歌我將是祀文王配明堂之樂歌若如摛議則此二篇皆應在復子明辟之後請問周公祀后稷祖文王宗武王韋昭云周公時以文王為宗其後更以文王為祖武王為宗盖文王以文治而為祖武王以武定而為宗欲明文亦有大功武亦有大德故鄭注祭法云祖宗通言耳是以詩云昊天有成命二后受之注云二后文王武王也且明堂之祀有單有合故鄭云四時一氣於郊祭一帝還於明堂因祭一帝則以文王配明一賔不容兩主也享五帝於明堂則泛配文武泛而為言無的之内其禮既盛故祖宗竝配叅議以佟之為允詔可高祖天監元年為尚書左丞是年皇子統立為太子其母丁貴嬪有司奏曰禮母以子貴王儲所生不容無敬宋㤗豫元年六月議百官以吏敬敬帝所生陳太妃則宋明帝在時百官未有敬臣竊以謂母以子貴義著春秋皇太子副二震極率土咸執吏禮既盡禮皇儲則所生不容無敬但帝王妃嬪義與外隔以理以例無致敬之道也今皇太子聖眷在躬儲禮夙備子貴之道抑亦有舊章王侯妃主嘗得通信問下及六宫三夫人雖與貴嬪同列竝應以敬皇太子之禮敬貴嬪宋元嘉中始興武陵國臣竝以吏敬敬所生潘淑妃路淑媛貴嬪於宫臣雖非小君其義不異宋泰豫朝議百官以吏敬二帝所生事義正同謂宫閹施敬宜同吏禮詣神獸門舉牋致謁年節稱慶亦同如此婦人無閫外之事賀及問諱牋所同百官報問而已夫婦人之道義無自専若不仰繫於夫則當俯繫於子榮親之道應極其所榮未有子所行而所從不足者也故春秋凡王命為夫人則禮與子等列國雖異於儲貳而從尊之義不殊前代依准布在舊事貴嬪載誕元良克固大業禮同儲君實惟舊典尋前代始置嬪位次皇后爵無所視其次職者位視相國爵比諸侯王此貴嬪之禮已高朝例况母儀春官義絶常等且諸妃作配率繇盛則以婦踰姑彌如從序謂貴嬪典章太子不異於是貴嬪備典章禮數同為太子言則稱令三年佟之奏議曰禘於首夏物皆未成故為小祫於秋冬萬物皆成其禮元太司勲列功臣有六皆祭於大蒸知祫猶大乃及之也近代禘祫竝及功臣有乖典禮宜改詔從之自是祫祭乃及功臣是年佟之又議公卿以祭服裏有中衣即今之中單也按後漢輿服志明帝永平二年初詔有司採周官禮記尚書乗輿服從歐陽説公卿以下服從大小夏侯説祭服絳縁領神為中衣絳袴袜示其赤心奉神今中衣絳縁足有所明無俟於袴既非聖法謂不可施遂依議除之四年有司言平天冠等一百五條自齊以來隨故而毁未詳所送佟之議禮祭服弊則焚之於是竝燒除之其珠玉以付中署明山賔為治書侍御史掌治吉㐫禮天監四年尚書大丞何佟之議按禮未祭一日大宗伯省牲鑊祭日之晨君親牽牲麗碑後代有冐暗之防而人主猶必親奉故有夕牲之禮比代人君不復躬牽丞相丹陽尹牽牲於古無取冝依以未祭一日之暮太常省牲視鑊祭日之晨使太尉牽牲出入也省牽饋食殺牲於廟門外今儀注詣厨烹牲謂宜依舊帝可其奏佟之又曰鄭𤣥云天子諸侯之祭禮先有祼尸之事乃迎牲今儀注乃至薦熟畢大祝方執珪瓚祼地違謬若斯又近代人君不復躬身祼禮太尉既攝位寔冝親執其事而越使卑賤大祝甚乖舊典愚謂祭日之晨宜使太尉先行祼獻乃後迎牲帝曰祼尸本使神有所附今無尸祼神將安設佟之曰如馬鄭之意祼雖獻尸而義在求神今雖無尸求神之義恐不可闕帝曰此本因尸以祀神今若無尸則冝立寄求之所祼義乃定佟之曰祭統云獻之属莫重于祼今既存尸求食之獻則祼鬯之求寔不可闕又送神更祼經記無文宜依禮草奏未報而佟之卒後山賔復申其理帝曰佟之既不復存宜從其議也自是始使太尉代太祝行祼而又牽牲太常任昉又以未明九刻呈牲加又太尉祼酒三刻施饌間中五刻行儀不辦近者臨祭從事寔以二更至未明三刻方辦明山賔議謂九刻已疑太早况二更非復祭旦帝曰夜半子時即是晨始冝取三更省牲餘依儀注又有司以為三牲或離牋依制埋瘞猪羊死則不埋請議其制司馬褧等議以為牲死則埋必在滌矣謂三牲在滌死悉冝埋帝從之五年山賔議樽彛之制祭圖惟有三樽一曰象樽周樽也二曰山罍夏樽也三曰著樽殷樽也徒有彞名竟無其噐直酌象樽之酒以為珪瓚之寔竊尋祼重獻不容共樽宜修彛噐以備大典按禮器有六彞春祠夏祠祼用鷄彞王以珪瓉初祼后以璋瓉亞祼故春夏兩祭俱用二彞今古禮殊無復亞祼止修其二春夏鷄彞秋冬􅕌彞庶禮物備也帝曰鷄是金禽亦主巽位但金火相代用之通夏於義為疑山賔曰臣愚管不奉明詔則終年乖舛按象彞是南方之物則主火位本生於火冝以象彛春夏兼用帝從之是年山賔奏稱伏尋制旨周以建子祀天五月祭地殷以建丑祀天六月祭地夏以建寅祀天七月祭地自頃代以來南北二郊同用夏正月詔更詳議山賔以為二儀竝遵三朝慶始同以此日二郊為允并謂迎五帝於郊皆以始祖配享及郊廟受福惟皇帝再拜明上靈降祚臣下不敢同也詔竝依議六年議者以為北郊有岳鎭海瀆之座而又有四望之座疑為煩重儀曹郎朱异議曰望是不即之名豈容局於星海拘於岳瀆明山賔曰舜典云望于山川春秋傳曰江漢沮漳楚之望也而今北郊設岳鎭海瀆又立四望竊謂煩黷宜省徐勉曰岳瀆是山川之宗至於望祀之義不止於岳瀆也若省四望於義為非議久不能决至十六年有事北郊帝復下其議於是八座奏省四望松江浙江五湖等座其鐘山白石既土地所在竝㽞如故册府元龜卷五百七十八
