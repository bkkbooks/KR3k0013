body:
  text: 册府元龜卷十一宋王欽若等撰帝王部繼統部三唐𤣥宗至道大聖大明孝皇帝睿宗第三子垂拱三年封楚王長夀二年改封臨淄郡王景龍四年六月庚子平韋庶人甲辰少帝讓睿宗為皇帝丙午立為皇太子延和元年七月壬辰睿宗傳位於皇太子制曰朕聞宇宙者至公之器不獲已而臨之帝王者因時之運非有待而居之盖在於拯俗濟人功成名遂而已朕以寡昧䖍奉鴻休本殊王季之賢早達延陵之節昔在聖歴已讓皇嗣之尊爰洎神龍終辭太弟之授屬國步不夷時難主幼大業有綴旒之懼寳位深墜地之憂議迫公卿遂登皇極日慎一日以至於今俗化漸行将成宿願昔禹以命啟匪私其親神器之重允歸公授皇太子隆基有大功於天地定阽危於社稷温文既習聖敬克躋委之監撫已移年歳時政益明庶官惟序朕之知子庶不負時歴數在躬宜陟元后可令即皇帝位有司擇日册授朕方比迹洪古希風太皇王公百寮宜識朕意先是彗星從西方缺經軒轅入太㣲至于大角數日乃滅睿宗以為革舊布新之政又太子仁愛日聞故順天傳位乃謂太平公主曰昔中宗之朝悖逆驕縱擅權侈靡天變屢臻我當時極諫請擇賢子立之以應災異中宗不恱我憂惶數日不食豈在彼能諫於巳不行是日将軍龎承宗左拾遺韓朝宗諫曰自頃國家多難頼陛下聖徳保存社稷綏撫四方今日忽有此讓臣等不知所出皇太子雖聖明且應養徳春宫依前監撫未宜即位睿宗不聽皇太子自東宫馳入請見自投於地叩頭曰臣以㣲功非次見擢偏守儲貳日夜兢惶不知陛下何以傳位於臣睿宗曰往以韋氏弑逆社稷殆危汝以弱年夷兇静亂安我宗廟爾之力也今天意人事汝合當之太子固辭睿宗曰不有此讓何以禳災汝若行孝豈宜於柩前即位邪於是太子流涕而出丙申皇太子讓表曰神器者天下之大寳受與者帝王之大節臣義衆隠犯誠深愛敬凡所上陳理無苟免國家盛徳創物垂範雖時始百年而運經厄㑹陛下振清廟之徽光蕩􅍴搶之氛慝紹膺永命導揚洪休千載一期實仰𤣥造便欲抗心太素獨善鴻元登平之俗未躋於下武卜代之期耴虧於一簣伏願霈然易慮俯順羣心則區宇永寧人神胥恱若命在必遂誠無所感必将殞越為期竄伏無地書奏不許皇太子累譲睿宗答曰汝為孝友須遵朕命用陟元后無宜固辭汝為季俗多虞淳風未洽欲朕迴慮兼理萬機昔舜之禪禹猶躬行廵狩况朕授汝豈㤀家國其軍國大務及授三品以上并重刑獄當兼省之八月庚子册太子為皇帝受册悲涕左右莫不感動又奉册睿宗為太上皇命皇帝聽朝於武徳殿上皇稱朕有命稱誥皇帝稱予有命稱制勑五日一受朝於太極殿先天二年七月乙丑尚書左僕射竇懷貞等與太平公主同謀将議廢立期以羽林兵作亂帝宻知之因以中㫖告岐王範薛王業兵部尚書郭元振等定計誅之丙寅大上皇誥曰大寳之尊諒非為己神器之重必在與能自昔與王率繇兹道我國家運光五聖業盛百齡大賚洽於人心淳風偃於區外而道不常泰時更小屯朕以菲薄屬兹多難仰讓王之宿志順公議於羣情丕業既康天保斯定皇帝神武攸縱睿哲克躋安宗社於綴旒拯生人於在溺用遵内禪令總朕師夙夜在勤政刑益理昨者姦臣搆釁潛發禁闈兇黨布於蕭墻飛變聞於帷扆朕慮深倉卒受命討除皇帝遂與岐王範薛王業等勵兹孝心率彼義勇戮鯨鯢於闕下掃􅍴搶於天路元惡大憝罔不伏誅人神用康功業彌廣信可總璇衡之大政守國家之鴻緒能事備矣朕又何憂自今巳後軍國政刑一事巳上宜並取皇帝處分其岐王範薛王業宜各加實封一千户朕方閒居大庭緬懷汾水無為養志以遂素心凡百卿士以泊黎庶宜體朕懷各盡誠節布告遐邇咸使知聞帝伏地流涕再拜受誥癸酉勑曰王公文武百官等邇者事出不虞凶邪搆逆頼天地叶徳宗社降靈應時誅翦朝野寧謐慶慰之至與卿等同懷太上皇志尚無為捐兹俗務軍國庶政委成予躬祗奉聖謨膺斯負重顧惟菲薄何以克堪若臨大川罔知攸濟兾王公卿士百辟庶寮戮力同心輔相休命各盡誠節共洽維新肅宗文明武徳大聖大宣孝皇帝𤣥宗第三子先天元年封陜王開元十五年改封忠王二十六年立為皇太子天寳十五載六月安禄山犯長安𤣥宗幸蜀将發馬嵬百姓數百人遮道攀附𤣥宗遲留久之乃令皇太子後殿宣慰百姓因請皇太子留曰願得戮力以從却收長安今者主上殿下皆入蜀川則宗社誰主萬姓何歸殿下不納臣言臣等皆死於此矣宦者髙力士馳以告𤣥宗𤣥宗曰是天啟也乃命後軍及飛龍廐馬與東宫内人等留太子因宣口勑謂将士曰太子仁孝可奉宗廟汝等善輔導之又語太子曰汝好去百姓屬望慎勿違之莫以吾為意又西戎北狄吾昔厚之今聞難必得其用汝勉之哉皇太子既至靈武羣臣稱馬嵬傳言之命勸進以七月甲子即位改元為至徳元年道路險澀表疏未達八月丁亥北使至蜀具陳羣臣懇請太子辭避之㫖𤣥宗乃下詔曰元子亨睿哲聰明恪慎克孝才備文武量吞海嶽付之神器不曰宜然今宗社未安國家多難宜令即皇帝位朕稱太上皇且天下兵權宜制在中夏朕據巴蜀應卒則難其四海軍權先取皇帝處分然後奏朕知待克復上京朕将凝神静慮偃息大庭也是月命宰相韋見素崔渙房琯持節齎玉册赴靈武宣傳位之命親語見素等曰皇帝自幼聰明與諸子有異朕豈不知大限往十三載冬已有傳位之意屬水旱年饑左右勸朕且俟豐歳二載便屬禄山搆逆方隅震擾未遂此心昨者馬嵬亦潜有處分今皇帝受命慰朕之心如釋負擔勞卿等去以輔佐之多難興王自古皆有卿等乃心在王室以宗社為念早定中原朕之望也九月丙子見素等至順化郡奉册書及傳國寳帝不敢受二年十月平西京車駕發鳳翔還京丁卯入長安道俗士女百姓萬衆出國門二十里路傍不斷持幡花鼓車歌舞音樂望車趨拜抃躍蹈舞呼萬歳歡叫聲振原野長老皆悲喜涕泣曰不圖今日復見我聖君帝亦感惻而勞徠之闗内夾路縛棚㡩幕青翠相連亘於子城帝自朱雀門入居大明宫十二月𤣥宗至自蜀都甲子𤣥宗御宣政殿羽儀容衛陳九賔于庭授傳國璽於殿上帝於殿下涕泣拜受入幕次百寮稱賀蹈舞呼萬歳代宗肅宗長子也開元二十八年封為廣平郡王肅宗即位改封楚王徙代王乾元元年四月立為皇太子元年建巳月是歳去年號以十二辰冠月肅宗寢疾時皇后張氏有寵無子慮宫車晏駕失權勢結少子越王係宻搆異謀將圖廢立乙丑皇后矯詔召太子㑹宦官程元振知之潛發於李輔國輔國久掌禁兵素與皇后嫌隙又聞元振言有自得色乃與元振定策伏兵於凌霄門擁太子請不赴召以兵翼太子入飛龍廐俟變而動既夜輔國元振乃勒兵㑹于三殿收捕越王係及同謀中宫朱光輝馬英俊等百餘人禁錮之逼皇后幽於别殿丁卯肅宗崩元振等始迎太子於九仙門見羣臣行監國之禮翌日宣制太子擗踊盡哀羣臣勸進太子益哀號羣臣又陳顧命大㫖祖宗洪業未宜以情自私巳已即皇帝位于兩儀殿初有司陳御座于殿之中間帝號泣遜不敢當哀感左右有司乃徙坐于殿之左个然後從之百辟卿士洎南北軍仗衛萬餘人咸呼萬歳左僕射攝太尉裴冕升殿跪上誡曰我國家奄有四海惟天下君伏惟皇帝陛下敬之以揚累聖之丕烈羣臣再拜呼萬歳庚午羣臣等上表請聽政帝不答以侍中苗晉卿攝冡宰於太極殿鐘樓之東張幄視事百官以聽辛未晉卿固辭上言曰伏奉今月二十一日恩勑令臣攝冡宰臣以昔者天子居䘮之時百官聽于冡宰盖君幼小御極事殷理衆然沿革不一今古異宜而周武漢文合於通變垂範作則可舉而行又事或墨縗時遇金革豈哀非銜恤而義在於斯且百善之至無以加於孝也其有容纍心絶指景悼生此匹夫守節之常情殊非王者嗣續之大計昨二十日陛下即位是承先帝遺顧之言亦前代不易之典則知所畧不為害所存是適權防㣲滅端所利者大陛下因此純至天地明察伏以報劬勞之恩申罔極之思終身之痛豈計朝夕以一日之内萬務在中須達宸聰始成國政今百寮萬姓及僧道耆夀相顧聚言以臣老且無能愚豈測聖况久無居攝臣不敢奉詔特乞陛下遵遺命三日而聽政衆情不勝懇願伏望割痛抑哀為天下幸又不答宰臣及文武百官表三上從之徳宗代宗長子肅宗元年建丒月封奉節郡王代宗即位徙封魯王又封雍王廣徳二年立為皇太子大歴十四年五月癸亥帝即位於太極前殿順宗徳宗長子大歴十四年封宣王建中元年立為皇太子貞元二十一年正月丙申太子即位于太極殿册曰維貞元二十一年歳次乙酉正月辛未朔二十三日癸巳皇帝若曰於􅃧天下之大實惟重器祖宗之業允為元良咨爾皇太子誦睿哲温恭寛仁慈惠文武之道禀自生知孝友之誠發於天性自膺上嗣毓徳春闈恪慎於厥躬祗勤于大訓必能誕敷至化安勸庶邦朕寢疾彌留弗興弗寤是用命爾繼統俾紹前烈宜陟元后永綏兆人其令中書侍郎同平章事髙郢奉册即皇帝位爾惟奉若天道以康四海懋建皇極以熈庶工無忝我髙祖太宗之休命初帝自二十年九月得風疾因不能言使四面出求醫藥海内皆聞知徳宗憂戚形于顔色數自臨視二十一年正月朔含元殿受朝賀還至别殿諸王親戚進賀獨皇太子疾不能朝徳宗為之涕泣悲傷嘆息因感疾恍惚益甚二十餘日中外不通不知兩宫安否朝臣咸懼莫知所為雖翰林内臣亦無知者二十三日帝知内外憂疑紫衣麻鞋不俟正冠出九仙門召見諸軍使京師稍安二十四日宣遺詔帝縗服見百寮二十六日即位軍士尚疑皆企足引頸瞻視既而曰真太子也喜且泣内外遂安以檢校司空平章事杜佑攝冡宰憲宗順宗長子貞元四年封廣陵郡王二十一年順宗即位立為皇太子七月乙未詔權令皇太子勾當軍國政事八月庚子詔曰惟皇天佑命烈祖誕受方國九聖儲祉萬邦咸休肆予一人獲纉丕業嚴恭守位不遑暇逸而天祐弗降疾恙弗瘳将何以奉宗廟之靈展禋祀之禮疇咨庶尹對越上𤣥内媿于朕心上畏乎天命夙夜祗慄深惟永圖一日萬機不可以久曠天工人代不可以久違皇太子純睿哲温文寛和慈惠孝友之徳仁愛之誠通乎神明格于上下是用推皇王至公之道遵父子傳歸之制付之重器以撫兆人必能宣祖宗之重光荷天地之休命奉若成憲撫綏四方宜令皇太子即皇帝位朕稱太上皇居興慶宫制勑稱詔所司擇日行册禮辛丑太上皇居興慶宫誥宜以九日册皇帝于宣政殿改貞元二十一年為永貞元年八月乙巳帝即位于宣政殿册曰維永貞元年歳次乙酉八月丁酉朔九日乙巳太上皇若曰咨爾皇太子純惟皇上帝降休于我家用集大命克綏厥猷惟后祗率大典兹惟艱哉朕承累聖休徳膺守邦之重不䝉天祐降疾在躬上不能昭事郊丘祗見烈祖下不能臨視庶政保綏兆人是用命爾當位嗣統宜陟元后代予憂勤今遣使檢校司徒平章事杜佑副使門下侍郎平章事杜黄裳持節册命於􅃧爾有光大之徳敷於萬邦爾有仁孝之誠刑于九族慈和寛簡克享天心𤣥符不可以固違明命不可以不畏爾惟察納忠直子惠困窮咨于朕言慎乃儉徳臨庶官以敬哀庶獄以情允執其中無忝爾祖宗之丕訓穆宗憲宗子貞元末封建安郡王元和元年進封遂王七年册為皇太子十五年正月辛丒皇太子即位以司徒兼中書令韓𢎞攝冢宰壬寅移仗西宫發哀于太極前殿命攝太尉吿天地社稷太清宫太廟以太子少保嚴綬充大明宫留守閏正月丙午宣顧命册曰於戲上天降鍳保乂于我國家十聖丕承光宅四海鴻休大業以逮予一人嚴恭祗畏懼弗克荷頼宗社垂慶生靈乂安今朕寢疾彌留弗興弗寤神器所付屬之元良咨爾皇太子某孝友聰明温文睿哲自主匕鬯日新厥徳必能纘序朕志綏靖萬邦是用命爾陟于元后宜令中書侍郎同平章事令狐楚奉册即皇帝位懋建皇極無忝我祖宗之休烈是日中書門下率羣臣再上表請聽政許之壬子始御延英殿對宰臣及次對官奏事如常儀敬宗穆宗長子長慶二年十二月立為皇太子四年正月癸酉即帝位時年十六以門下侍郎平章事李逢吉攝冢宰其日移仗西宫發哀于太極殿分命攝太尉告天地社稷太清宫太廟丙子帝即位于太極殿東序册曰維長慶四年歳次甲辰正月辛亥朔二十六日丙子皇帝若曰惟天輔唐徳我祖宗克答天意邁徳勤道紹休大業於一人嗣守四海祗事天地愛育萬物罔或怠惰于兹五年今寢疾彌留不興不寤獲以重器付之元良咨爾皇太子湛列祖儲愛自天生徳孝友慈惠温良肅恭必能緝寧邦家輝光緒業是用命爾陟于元后宜令中書侍郎平章事牛僧孺奉册即皇帝位爾有孝敬之志可以奉宗廟爾有廣厚之量可以奉神祗和惠可以撫萬邦仁愛可以親九族任賢尚徳逺佞去邪爾惟欽承無忝我祖宗之休烈於是中書侍郎平章事牛僧孺讀册進册門下侍郎平章事李逢吉宣制進寳太常少卿馮宿導引乗輿刑部尚書段文昌率百寮奉誡辭文宗敬宗弟初封江王寳歴二年十二月辛丑敬宗夜獵還宫遇中官劉克明之逆壬寅樞宻使王守澄以兵衛迎江王入宫癸卯敎曰大行皇帝聰斷英明臨下以法方将致理以一區夏而妖兇搆禍矯宣遺言不詢羣臣專斷神器恃近而迫衆倚兵而取威謂天地可欺神明可罔既而姦謀發洩兇黨彰聞寡人義重君臣毒甚手足拊膺號惋誓清兇徒果有義烈副此誠志遂以宰相定議乃親率左右神策䕶軍中尉心腹近臣及諸職事官并左右神策六軍使兼諸軍使及飛龍将士等搜摘伏匿大擒諸妖或血刃當辜或赴井自斃其劉克明田務澄蘇佐明王嘉憲石定寛等二十八人並正刑書罔有漏逸歡呼震地忭快聞天此皆宗社威靈文武協力翦盪兇㓂克有成筭豈伊菲薄敢貪天功想于羣公多士中外藩嶽皆累朝勲績先聖寵任致兹刷憤哀慶當同大行皇帝正柩于太極殿前率依光陵故事有司條上務盡誠信其冡宰司空平章事裴度當攝立功將士節級各有優賞布告遐邇咸使聞知宣訖宰臣裴度竇易直率百寮於紫宸外廊上謁江王王以素服見度等再拜慰賀訖退又率百寮上勸進表三甲辰江王於少陽院封六軍使段嶷左右神策軍使何少哲等一十六人命移仗西内以太子太保趙宗儒為大明宫留後乙巳帝御宣政殿即位諸衛各勒兵屯諸門黄麾大仗陳於殿庭押册寳自西階下文武羣官入就位侍中板奏請中外嚴辨帝出自序門服具服逺遊冠絳紗袍執笏就中間南向位立定册使宣云伏奉太皇太后令江王即皇帝位禮儀使奉請再拜舉册官奉册就皇帝前攝中書令司空兼門下侍郎平章事裴度進讀曰維寳歴二年歳次庚午十二月甲午朔十二日乙巳太皇太后若曰大行皇帝睿哲英能對天明命方夏底緝夷蠻貢庭宜荷九廟之靈永饗億年之禄豈虞姦妖竊發矯專神器蠱惑中外扇誘羣萌駭動神人釁深梟獍咨爾江王昂聰哲孕粹清明敏和智筭機閒謀𤣥電發躬率義勇大清兇徒且膺當璧之符爰攄枕戈之憤既殱巨害當饗豐福是用命爾陟于元后宜令司空平章事裴度奉册即皇帝位永惟髙祖太宗之前定隋亂𤣥宗之寢漬利澤憲宗之堅拔蠧孽艱勤險阻朂乃負荷小心以事上帝恭儉以勤邦家懋于令聞持久如始敬之哉讀册稱賀帝受策以授左右侍中進寳帝受寳以授左右又奏請改服衮冕即御座受萬方朝賀殿中監進鎮珪内髙品承㫖索扇開帝正衮冕負扆南面侍中就升御座之右西南立符寳置於御座前羣官在位者皆再拜攝太尉兵部尚書段文昌進當香案前跪奏曰我國家奄宅萬方光被四表大行皇帝丕承祖業嗣唐配天伏惟皇帝陛下敬之哉百寮皆再拜攝侍中門下侍郎平章事竇易直承㫖臨階西向稱有制在位者皆再拜宣云顧以薄徳嗣守鴻業祗奉詔命感懼良深在位者皆再拜侍中奏禮畢帝降座御輦還宫武宗皇帝穆宗第五子文宗之弟也初封頴王本名􅈆初文宗追悔荘恪太子殂不繇道乃以敬宗子陳王成美為皇太子開成四年冬十月宣制未遑册禮五年正月二日文宗暴疾宰相李􅑻知樞宻劉𢎞季奉宻㫖以皇太子監國兩軍中尉仇士良魚𢎞志矯詔迎頴王於十六宅曰朕自嬰疾疢有加無瘳懼不能躬總萬機日釐庶政稽于古訓謀及大臣用建親賢以貳神器親弟頴王􅈆昔在藩邸與朕嘗同師訓動成儀矩性禀寛仁俾奉昌圖必諧人欲可立為皇太弟一應軍國政事便令權勾當百辟卿士中外庶臣宜竭乃心輔成予志陳王成美先立為皇太子以其年尚冲幼未漸師資比日重難不行册命廻踐朱邸式叶至公可復封陳王是夜士良統兵士於十六宅迎太弟赴少陽院百官謁見於東宫思賢殿四日宣詔皇太弟宜即皇帝位宰相楊嗣復攝冡宰十四日受册於正殿時年二十宣宗皇帝憲宗第十三子長慶元年三月封光王名怡㑹昌六年三月十一日詔立為皇太叔權勾當軍國政事翌日即皇帝位時年三十七帝外寛和而内朗嚴寡言視瞻特異㑹昌朝愈事韜晦羣居㳺處未嘗有言文宗武宗幸十六宅宴集強誘其言以為戲劇謂之光叔武宗氣豪尤不為禮及監國之日哀毁滿容接待羣僚决斷庶務人方見其隠徳焉懿宗皇帝宣宗長子㑹昌六年十月封鄆王本名温大中十三年八月七日詔立為皇太子監國十三日即皇帝位時年二十七僖宗皇帝懿宗第五子初封普王咸通十四年七月十八日制日朕守大器之重居兆人之上日慎一日如履如臨旰昃勞懷寢興思理涉道猶淺徳化未孚而攝養乖方寒暑成癘實有慮於闕政且無暇于怡神竟未少瘳日加寖劇萬務繁總須有主張考思舊章謀於卿士思闡鴻業式建皇儲第五男普王儼改名儇孝恭温敬寛和博厚日新令徳天假英姿言皆中規動必繇禮俾崇邦本允叶人心宜立為皇太子權勾當軍國政事咨爾中外卿士洎于腹心之臣敬保裔子輔成予志各竭乃心以安黎元吿布中外知朕意焉二十日皇帝即位時年十二左軍中尉劉行深右軍中尉韓文約居中執軍政昭宗皇帝懿宗第七子咸通十三年四月封夀王乾符四年授開府儀同三司幽州大都督幽州盧龍等軍節度押奚契丹管内觀察處置等使帝於僖宗母弟也尤相親睦自艱難播越嘗隨侍左右握兵中要皆竒而愛之文徳元年二月僖宗暴不豫時初復宫闈人心傾瞩遽聞被疾軍民駭愕及大漸之夕未知所立羣臣以吉王最賢又在夀王之上將立之唯軍容使楊復恭請以夀王監國三月六日宣詔立為皇太弟八日即位時年二十二哀宗皇帝昭宗第九子乾寧四年二月封輝王天復三年二月拜開府儀同三司充諸道兵馬元帥天佑元年八月十三日蔣𤣥暉矯宣昭宗詔即皇帝位時年十三後唐明宗太祖養子荘宗朝為蕃漢馬步軍總管兼中書令同光四年二月趙在禮盗據魏州荘宗遣元行欽將兵攻之不利河南尹張全義宻奏請委帝将兵赴鄴時趙太據邢州王景戡據滄州皆自稱留後軍鎮多叛三月六日帝至鄴都西南隅御水之南在禮登水樓謝罪帝謂之曰謀之不臧一至於是吾來招撫尚可保明當與將士善謀勿貽族滅又出牲餼勞師帝皆領慰之令蒐閱期以九日攻城八日帝移營渡河觀音門外分命詰且進攻是夜從馬直軍吏有張破敗者號令共殺都將縱火焚營讙譟雷駭五鼓亂軍徒黨逼帝營言已共諸軍商量且與城中合勢擊退諸道之師欲主上帝河南令公帝河北且與軍民為主幸延晷漏矣帝泣而諭之亂兵乃抽戈露刃環帝左右呼曰今公欲何之不帝河北則為他人所有安重誨霍彥威躡帝足請詭從之亂兵逼帝入鄴都懸橋已發皆扶帝越河帝既入在禮引將校奉迎泣謝是日饗士於行宫而始謀亂者城内拒關不内擘隊流散無所歸向帝登南樓望見謂在禮曰卿等欲建大計非兵不能集事此輩可不令流散卿等城守吾自於城外招撫之在禮不敢留帝紿羣兇得出夜宿魏縣部下不滿百人又無兵仗時霍彥威所將鎮州兵五千人營西北隅一軍獨不亂聞帝得出又本藩使長也其將校相率歸帝繇是牙軍稍集詰朝帝登城掩泣曰邦家患難一至於此予既失勢時事可知來日歸藩上章徐圖再舉濟之與否非吾所知也重誨彥威對曰公言非便也國家付公閫外之事不幸師徒逗撓為賊驚奔元行欽狂妄小人彼在城南未聞戰聲無故棄甲如朝天之日信其奏陳何所不至若歸藩聽命便是強據邀君正墮䜛慝之口也正當星行歸闕面叩玉階䜛間沮謀庶全功業無便於此者也帝曰善十一日離魏縣之相州時國家小馬在鉅鹿放牧遣就牧所驅壯馬二千匹至始得成軍時元行欽退保衛州果以飛語上奏帝上章申理荘宗遣帝愛子從璟及内官白從訓宣詔諭帝從璟至衛州為行欽所械帝奏章不達又以行欽在衛州乃自白髙渡河是月二十六日至汴州時荘宗親軍至滎澤遣龍驤都尉姚彥温為前鋒是日彥温率八百騎歸帝且曰京師危迫主上為行欽所惑事勢已離難與共事帝曰卿且不忠言何悖也即奪其師乃令部下曰主上不亮吾心遂令軍情至此所宜但赴京師命石敬瑭前軍入汜水而房知温杜晏求自北面繼至四月丁亥帝入甖子谷聞蕭墻釁作荘宗晏駕慟哭不自勝謂諸將曰吾比星行赴難君父如此吾安所歸詰且朱守殷遣人馳報言京城大亂兩日以來燔剽不息願令公速至京師救難三日帝幸至徳宫分命諸将止焚剽百官敝衣旅見帝謝之斂袵㱆欷時皇太子繼岌征蜀未還皇弟存覇已下皆領麾鉞内難前歸鎮帝謂朱守􅎋曰公善廵徼以待魏王淑妃徳妃在宫供膳尤宜豐備吾奉大行梓宫幸山陵畢社稷有奉則仗鉞歸藩為國家當北面之事是日宰相豆盧革率百寮拜牋勸進帝不從又三牋勸行監國之儀以安宗社霍彥威孔循等請改國號不行土徳正朔豆盧革不能决安重晦具奏上顧謂藩邸近侍曰若何改國號為正朔左右奏曰先帝以錫氏宗屬為唐雪寃繼為昭宗皇帝後國號曰唐今偽朝舊人不欲殿下稱唐請更名號耳帝因嗚噎泣下曰異乎予所聞也予年十三事獻祖文皇帝以予宗屬愛幸不異所生事武皇帝垂三十年何艱險之不甞排難解紛櫛風沐雨冒刃血戰體無完膚闢土開基以至今日即武帝功業予功業也先帝天下予天下也兄亡弟紹於義何嫌同宗異號出何典禮人之多僻可見其心歴之衰隆吾當自受莠言無所取也彥威等言唐之運歴已衰不如自創新號故上言衰隆自受執政召廷臣議依違不能決吏部尚書李琪曰殿下以宗室勲賢立大功於三世一昨雨泣赴難安定廟朝撫事因心不失舊物若一旦别移統制先朝便是路人㷀㷀梓宫何所歸往不惟殿下失追感舊君之義吾輩何安况以前事宗室言之則漢昭帝無後霍光徵劉賀宣帝典喪事是也以本朝言之則孝和元𤣥真文宗武宗皆以兄弟出繼典喪事即位如儲后之儀遵行此禮斷自不疑遂即帝位閔帝明宗第三子初封宋王出鎮鄴宫長興四年八月明宗不豫十一月二十一日秦王從榮謀逆伏誅明宗徵宋王令宣徽使孟漢瓊馳驛召帝于鄴二十九日至自鄴十二月癸卯即皇帝位末帝明宗養子天成初除河東節度使二年加同平章事長興二年授京兆尹西京留守三年移鳳翔節度使四年五月封潞王閔帝即位加侍中應順元年二月移鎮太原是時不降制書惟以宣授帝聞之召賔佐將吏謀之皆曰主上年幼未親庶事軍國大政悉委朱𢎞昭等王必無保全之理判官馬裔孫曰君命召不俟駕行焉諸君凶言熒惑聞聽非令圖也乃罷是夕召行軍副使謀令判官李專美草檄書乞援於諸道藩侯請助兵糧欲問君側之罪閔帝命王思同率兵攻鳳翔三月十五日大集城下十六日帝登城垂泣吿諭於外曰我年未二十從先帝征伐出生入死金瘡滿身樹立社稷軍士從我登陣者多矣今朝廷信任賊臣殘害骨肉且我有何罪因慟哭聞者哀之時羽林都指揮使楊思權謂衆曰大相公吾主也遂引軍自西門入嚴衛都指揮使尹暉亦引軍自東門入外軍悉潰十七日索居民家財以賞軍士是日建大將旗鼓整衆而東二十日次長安副留守劉遂雍以城降二十三日次靈口駕下軍執王思同來降是日誅之二十四日次華州收節度使樂彥稠繫獄二十五日次閿鄉王仲臯父子迎謁命誅之二十六日次靈寳河中節度使安彥威來降待罪宥之是日陜州節度使康思立奉迎二十七日次陜州二十八日閔帝招討使康義誠前軍棄甲結隊纍纍而至二十九日義誠至泥首請罪帝上太后牋取進止三十日太后傳令至幷内司迎奉是夜閔帝出奔四月壬申帝至蔣橋文武百官立班奉迎教㫖以未拜梓宫未可相見是日入謁太后太妃伏梓宫慟哭宰臣馮道等上牋勸進癸酉太后下令以帝為監國甲戌又下令曰先皇帝櫛風沐雨平定華夷嗣洪業於艱難致蒼生於富庶八年臨御萬彚舒蘇歸牛休馬方期於偃戢宵衣旰食久積於憂勞竟至倦勤俄悲厭代爰自鄂王嗣位姦臣弄權作福作災不誠不信離間我骨肉猜忌我親賢不自制書擅移藩邸而又遽興戈甲大撓軍民遂致鄂王輕釋宗祧不克負荷洪基大寳危若綴旒須立長君以紹丕搆皇長子潞王從珂日躋孝敬天縱聰明有神武之英姿有寛仁之偉量先朝經綸草昧廓静寰區辛勤有百戰之勞竭盡贊一平之運臣誠子道冠古越今而又克巳化民推心撫事率土之謳歌有屬上𤣥之睠命攸臨一日萬機不可以暫曠九州四海不可以無歸况因山有期同軌斯至永言嗣守屬在元良宜即皇帝位是日暴雨乙亥帝赴西宫告奠遂即帝位晉少帝髙祖從子天福元年為北京留守二年授開封尹三年封鄭王俄加同平章事六年髙祖幸鄴十二月以帝為廣晉尹封齊王七年六月即皇帝位漢隠帝髙祖第二子天福十二年髙祖踐祚以帝為左衛將軍檢校司徒尋為大内都檢校太保乾佑元年二月辛巳授帝特進檢校太尉同平章事封周王宣制畢有頃召文武百寮赴萬歳殿宣制即皇帝位周世宗太祖養子廣順元年太祖踐祚授澶州節度使檢校太保二年加同平章事三年三月除開封尹晉王顯徳元年正月加侍中判内外兵馬事是月丙申宣制即皇帝位恭帝世宗之子顯徳六年六月癸未制授左衛上將軍封梁王甲午宣制即皇帝位册府元龜卷十一
