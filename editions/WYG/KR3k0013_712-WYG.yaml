body:
  text: 册府元龜卷七百十二宋王欽若等撰宫臣部規諷古者世子既冠爰有司過之史餽膳之宰至於列樹藩屏咸置傅相蓋所以保其無咎格諸非心者也乃若德義不修奢縱敗度罔慎所履將蹈危機繇是始終彌縫從容進說鋪述奏記更獻箴言竭忠以盡規陳古以申諷乃至激發吟咏情極涕洟指禍福之門陳順逆之理周旋劘切冀其感悟斯固忠於所奉義不顧私極慮無隠彌縫其闕者焉其或知媿改圖因以蒙福乃有性習背訓終焉不悛龜鑑所存良足勸戒漢韋孟為楚元王傅傅子夷王及孫王戊韋為椘王傅而歴相三王也戊荒淫不遵道孟作詩諷諫曰肅肅我祖國自豕韋在商為豕韋氏黼衣朱紱四牡龍􅀈黼衣􅀞斧形而白與黒為彩也朱紱為朱衣􅀞為亞文也亞古弗字也故因謂之紱字又作黻其音同聲彤弓斯征撫寜遐荒言受彤弓之賜於此得專征伐也總齊羣邦以翼大商翼佐助也迭彼大彭勲績維光大彭豕韋為商伯迭互也言自豕韋氏與大彭互為伯于殷商也迭徒結反至于有周歴世會同繼為諸侯預盟㑹之事也王赧聽譛實絶我邦王郝周末王聽䜛受譛絶豕韋氏也我邦既絶厥政斯逸逸放也管仲曰令而不行謂之放賞罰之行非繇王室庶尹羣后靡扶靡衛五服分離宗周以隊五服謂甸服侯服綏服要服荒服也庶尹衆官之長也羣后諸侯也隊失也音直類反我祖斯微䙴于彭城言我之先祖于此遂微也䙴古遷字在予小子勤誒厥生誒歎聲音許其切阸此嫚秦耒耜以耕言遭秦暴嫚無有列位躬耕于野悠悠嫚秦上天不寜廼眷南顧授漢于京髙祖起在豐沛于秦為南故曰南顧言以秦之京邑授于漢也於赫有漢四方是征於讀曰烏烏歎辭也赫明貌凡此詩中諸歎辭稱於者其音皆同靡適不懐萬國平懐思也來也古攸字攸所也言漢兵所往之處人皆思附而來萬國所以平也廼命厥弟建侯于楚俾我小臣惟傅是輔兢兢元王恭儉静壹兢兢戒謹也惠此黎民納彼輔弼享國漸世垂烈于後元王立二十七年而薨垂遺業於後嗣也廼及夷王克奉厥緒咨命不永唯王統祀咨嗟也永長也夷王立四年而薨戊乃嗣立故言不永也左右陪臣此惟皇士皇正也如何我王不思守保不惟履氷以繼祖考惟亦思也言不思念敬慎如履薄冰之義用繼其祖考之業也邦事是廢逸遊是娯犬馬繇繇是放是驅繇與悠同悠悠行貌放放犬也驅驅馬也務彼鳥獸忽此稼苗蒸民以匱我王以媮媮與愉同樂也言衆人失此稼穡以致困匱而王反以為樂也所𢎞非德所親非俊惟囿是恢惟諛是信恢大也諛謟言也睮睮謟夫咢咢黄髪睮睮目媚貌咢咢直言也睮音愉咢五各反如何我王曽不是察既藐下臣追欲從逸藐逺也與疏同言疏逺忠賢之輔追情欲縱逸遊也下臣孟自謂也從讀曰縱嫚彼顯祖輕兹削黜嗟嗟我王漢之睦親睦宻也言服屬近曽不夙夜以休令聞休美也令善也聞聲名也穆穆天子臨爾下土明明羣司執憲靡顧靡無也言執天子之法無所顧望也顧讀如古恊韻也正遐繇近殆其怙兹言欲正逺人先從近親始而王怙恃與漢戚屬不自朂慎以致危殆也嗟嗟我王曷不此思非思非鑒嗣其罔則不思鑒戒之義是令後嗣無所法則也彌彌其失岌岌其國彌彌猶稍稍也罪過滋甚也岌岌危動貌音五合切致冰匪霜致隊匪嫚瞻惟我王昔靡不練言堅冰之成起于㣲霜隕隊之咎繇于怠慢也練猶閲歴也言往昔之事皆在王心無所不閱也興國救顛孰違悔過追思黄髪秦穆以霸言興復邦國救止顛隊之道無如能自悔其過惡秦穆公伐鄭為晉所敗而歸乃作秦誓曰雖則員然尚猶詢兹黄髪則罔所愆謂雖有貟然之失庶㡬以道謀于黄髪之賢則行無所過矣黄髪老夀之人也謂髪落更生黄也貟與云同嵗月其徂年其逮耉逮及也耉者老人面色如垢也言嵗月驟往年將及老不可殆忽也於昔君子庶顯於後於難辭也古昔之君子庶幾善道所以能大顯于後世也我王如何曽不斯覽覽視也叶韻音濫黄髪不近胡不時監黄髪不近者斥逺耉老之人也近其靳反鄒陽齊人文帝時吳王濞招致四方遊士陽與嚴忌枚乗等俱仕吳皆以文辨著名久之吳王以太子事怨望稱疾不朝隂有邪謀陽奏書諫其事尚隠惡指斥言故先引秦為諭因道胡越齊趙淮南之難然後乃致其意曰臣聞秦倚曲臺之宫始皇帝所治之處若漢家未央宫倚恃也懸衡天下闗西為衡畫地而人不敢犯兵加胡越畫地不犯者法制之行也至其晚節末路張耳陳勝連從兵之㨿從音子容反以叩函谷咸陽遂危叩擊何則列郡不相親萬室不相救也今胡數涉北河之外上覆飛鳥下不見伏兎言胡來人馬之盛揚塵上覆飛鳥下不見伏兎也一曰覆盡也言上射飛鳥下盡伏免也覆盡是也音方目反鬬城不休救兵不止死者相隨輦車相屬屬連也音之欲反轉粟流輸千里不絶何則彊趙責於河間趙幽王為吕后所幽死文帝立其長子遂為趙王取趙之河間立遂弟辟疆為河間王至子哀王無嗣國除遂欲復還得河間六齊望於惠后髙后割齊濟南郡為吕王台奉邑又割琅琊郡封營陵侯劉澤為瑯琊王文帝乃立悼惠王六子為王言六齊不保今日之恩而追怨惠帝與吕后也一說惠帝二年悼惠王入朝吕后欲鴆殺之獻城陽郡尊魯元公主得免六子以此怨之城陽顧於盧愽城陽王喜也喜父章與弟興居討諸吕有功本當盡以趙地王章梁地王興居文帝聞其欲立齊王更以二郡王之章失職嵗餘薨興居誅死盧博濟北王治處喜故顧念而怨也三淮南之心思墳墓淮南厲王三子為三王念其父見䙴殺思墳墓欲報怨也三子為王謂淮南衡山濟北也大王不憂臣恐救兵之不專言諸國各有私怨欲申其志不肯專為吳非不敢相救也胡馬遂進窺于邯郸越水長沙還舟青陽青陽地名也還舟聚舟船也言胡為趙難越為吳難不可恃也雖使梁并淮陽之兵下淮東越廣陵以遏越人之糧漢亦折西河而下北守漳水以輔大國胡亦益進越亦益深此臣之所為大王患也折截也陽知吳王隂連結齊趙淮南胡越欲諫不敢指斥言故陳胡越之難齊趙之怨微言梁并淮陽絶越人之糧漢折西河以輔大國以破難其計欲隠其詞故謬言胡益進越益深為大王患之以錯亂其語若吳為憂助漢者也自此以下乃致其意焉臣聞蛟龍襄首奮翼則浮雲出流霧雨咸集襄舉也聖王砥節修德則游談之士歸義思名砥礪也音止今臣盡智畢議易精極慮改易精思以極盡謀慮也則無國而不可奸飾固陋之心則何王之門不可曵長裾乎然臣所以歴數王之朝背淮千里而自致者非惡臣國而樂吳民也竊髙下風之行尤説大王之義言在下風側聽髙尚美悦大王之行義也説讀曰悦故願大王之無忽察聼其志臣聞鷙鳥絫百不如一鶚鷙擊之鳥鷹鸇之屬也鷙鳥比諸侯鶚鳥比天子也絫古累字鶚音愕夫全趙之時全趙趙未分之時武力鼎士袨服叢臺之下者一旦成市袨服盛服也鼎士舉鼎之士也叢臺趙王之臺也在邯鄲袨音州縣之縣而不能止幽王之湛患幽王謂趙幽王友也湛讀曰沈沈患言幽王為吕后所幽死淮南連山東之俠死士盈朝不能還厲王之西也厲王淮南厲王長也西謂廢遷嚴道而死於雍也而計議不得雖諸賁不能安其位亦明矣諸謂専諸賁謂孟賁皆古勇士也故願大王審畫而已畫計也音獲始孝文皇帝㨿闗入立寒心銷志不明求衣文帝入闗而立以天下多難故乃寒心戰慄未明而起自立天子之後使東牟朱虚褒義父之後天下已定文帝遣朱虗侯章東諭齊王嘉其首舉兵欲誅諸吕猶春秋褒邾儀父也立天子謂立為天子也義讀曰儀父讀曰甫深割嬰兒王之或曰皇子武為代王叅為太原王揖為梁王壤子王梁代文帝第二子又曰梁益之間所愛謂其肥盛曰壤益以淮陽卒仆濟北囚弟於雍者豈非象新垣平等哉仆僵仆也濟北王興居反見誅囚弟於雍者淮南王長有罪見徙死於雍所以然者坐二國有姦臣如新垣平等勸王共反仆音赴今天子新㨿先帝之遺業左規山東右制闗中變權易勢大臣難知大王弗察臣恐周鼎復起於漢新垣過計於朝新垣平詐言鼎在泗水中臣望東北汾隂有金寳氣鼎其在乎弗迎則不至為吴計者猶新垣平之言周鼎終不可得也則我吴遺嗣不可期於世矣言吳當絶無遺嗣也髙皇帝燒棧道灌章邯章邯為雍王髙祖以水灌其城破之也兵不留行言無所稽留不廢于行収弊民之倦東馳函谷西楚大破項羽自號西楚霸王水攻則章邯以亡其城陸擊則荆王以失其地荆亦楚也謂項羽敗走此皆國家之不㡬者也言不可庶㡬願大王熟察之吳王不納其言於是鄒陽枚乘嚴忌知呉不可説皆去之梁枚乘字子叔淮陰人為吳王濞郎中吳王之初怨望謀為逆也乗奏書諫曰臣聞得全者全昌失全者全亡舜無立錐之地以有天下禹無十戸之聚以王諸侯聚聚邑也音才喻切湯武之土不過百里上不絶三光之明下不傷百姓之心者有王術也徳政和平上感天象則日月星辰無有錯繆故言不絶三光之明也故父子之道天性也忠臣不避重誅以直諌言父子君臣其義一也則事無遺策功流萬世臣乘願披腹心而效愚忠唯大王少加意念惻怛之心於臣乘言夫以一縷之任繫千鈞之重上縣無極之髙下垂不測之淵雖甚愚之人猶知哀其将絶也馬方駭鼓而驚之駭亦驚也鼓擊鼓也繫方絶又重鎮之繫絶於天不可復結墜入深淵難以復出其出不出間不容髪改計取福正在今日言其激切甚急也能聼忠臣之言百舉必脫脫者言免於禍也音吐活切必若所欲為危於絫卵難於上天變所欲為易於反掌安於泰山今欲極天命之夀敝無窮之樂究萬乘之埶敝盡也窮竟也不出反掌之易以居泰山之安而欲乘絫卵之危走上天之難走趨向之也音奏此愚臣之所大惑也人性有畏其景而惡其跡者郤背而走跡愈多景愈疾背音歩内切不如就隂而止景滅跡絶欲人勿聞莫若勿言欲人勿知莫若勿為欲湯之凔音悽愴之愴寒也一人炊之百人揚之無益也炊謂㸑火也不如絶薪止火而已不絶之於彼而救之於此譬猶抱薪而救火也養繇基楚之善射者也去楊葉百歩百發百中楊葉之大加百中焉可謂善射矣然其所止乃百歩之内耳比於臣乘未知操弓持矢也乘自言所知者逺非見百歩之中故謂繇基為不曉射也福生有基禍生有胎基胎皆始也納其基絶其胎禍何自來納猶藏也何自來言無所從來也泰山之霤穿石單極之䋁斷幹䋁古綆字也單盡也盡極之綆斷幹井上四交之幹常為汲索所鍥傷也䋁音鯁鍥契皆刻也音口計反水非石之鑚索非木之鋸漸靡使之然也靡盡也夫銖銖而稱之至石必差寸寸而度之至丈必過言至小以至於大數則有輕重不同也度音徒各反石稱丈量徑而寡失徑直也夫十圍之木始生如蘖足可搔而絶手可擢而㧞如蘖若蘖之生芽也搔謂􅎲也搔音索髙切抓音莊交切㨿其未生先其未形也磨礱砥礪不見其損有時而盡礱亦磨也砥柔石礪皁石皆可以磨者礱音聾種樹畜養不見其益有時而大積德累行不知其善有時而用棄義背理不知其惡有時而亡臣願大王熟計而身行之此百世不易之道也吳王不納乘等去而之梁從孝王游景帝即位御史大夫晁錯為漢定制度損削諸侯吳王遂與六國謀反舉兵西鄉郷讀曰嚮以誅錯為名漢聞之斬錯以謝諸侯枚乘復說吳王曰昔者秦西舉胡戎之難北備榆中之闗今所謂榆闗也南距𦍑筰之塞筰西南夷也音才各反東當六國之從從子容反六國乘信陵之籍魏公子無忌號信陵君無忌嘗總五國却秦有地資也明蘓秦之約厲荆軻之威并力一心以備秦然秦卒禽六國滅其社稷而并天下是何也則地利不同而民輕重不也今漢㨿全秦之地兼六國之衆脩戎狄之義修恩義以撫夷狄而南朝𦍑筰此其與秦地相什而民相百大王之所明知也地十倍於秦民百倍於秦今夫䜛䛕之臣為大王計者不論骨肉之義民之輕重國之大小以為吳禍言勸王之反則於吳為禍也此臣所以為大王患也夫舉吳兵以訾於漢訾量也音子私反譬猶蝇蚋之附羣牛腐肉之齒利劍鋒接必無事矣蚋蚊屬齒謂當之也蚋音芮又音人恱反天子聞吳率失職諸侯願責先王之遺約失職謂被削黜失其常分今漢親誅其三公以謝前過是大王之威加於天下而功越於湯武也夫吳有諸侯之位而實富於天子有隠匿之名而居過於中國隠匿謂僻在東南夫漢并二十四郡十七諸侯方輸錯出運行數千里不絶於道其珍怪不如東山之府言漢此時有二十四郡十七諸侯方軌而輸雜出貢賦入于天子猶不如吳也轉粟西鄉陸行不絶水行滿河不如海陵之倉海陵縣名也有吴太倉鄉讀曰嚮修治上林雜以離宫積聚玩好圏守禽獸不如長洲之苑吴苑也以江水洲為苑在吴東游曲臺臨上路不如朝夕之池曲臺長安臺臨道上吳以海水朝夕為池也深壁髙壘副以闗城不如江淮之險此臣所以為大王樂也言其富饒及游宴之處踰天子也今大王還兵疾歸尚得十半十分之中可冀五分無患故云尚得十半不然漢知吳之有吞天下之心也赫然加怒遣羽林黄頭循江而下羽林黄頭郎習水戰襲大王之都魯東海絶吳之饟道饟古餉字梁王飭車騎習戰射飭與勅同飭整也積粟固守以備滎陽待吳之饑大王雖欲反都亦不得已已語終之辭夫三淮南之計不負其約吳楚反皆守約不從也齊王殺身以滅其跡齊孝王將閭也吳楚反堅守距三國後攣布聞齊初與三國有謀欲伐之王懼自殺齊王傳云吳楚已平齊王乃自殺今兹枚乘諫書即已稱之二傳不同當有誤者四國不得出兵其郡膠東膠西濟北淄川王也發兵應吳楚皆見誅趙囚邯鄲漢將酈寄圍趙王於邯郸與囚無異此不可掩亦已明矣言事已彰著大王已去千里之國而制於十里之内矣梁下屯兵方十里矣張韓將北地張張羽韓韓安國也將北地言將軍而處吴軍之北以拒吴弓髙宿左右弓髙侯韓頽當也宿止也言弓髙所將之兵屯止於吴軍左右也兵不得下壁軍不得大息臣竊哀之願大王熟察焉吳王不用乘策卒見禽滅漢已平七國乗繇是知名韓安國為梁内史梁孝王時公孫詭羊勝說王求為帝太子及益地事恐漢大臣不聽乃隂使人刺漢用事謀臣及殺故吳相袁盎景帝遂聞詭勝等計畫乃遣使捕詭勝必得必令得之漢使十軰至梁相以下舉國大索索捜也音山客反月餘弗得安國聞詭勝匿王所乃入見王而泣曰主辱者臣死大王無良臣故紛紛至此今詭勝請辭賜死王曰何至此安國泣數行下曰大王自度於皇帝孰與太上皇之與髙帝及皇帝與臨江王親孰與猶言何如也王曰弗如也安國曰夫太上皇臨江親父子間然髙帝曰提三尺取天下者朕也三尺謂劍也故太上終不得制事居於櫟陽臨江適長太子適讀曰嫡以一言過廢王臨江景帝嘗屬諸姬子太子母栗姬言不遜繇是廢太子栗姬憂死也用宫垣事卒自殺中尉府以侵堧垣徵自殺也何者治天下終不用私亂公語曰雖有親父安知不為虎雖有親兄安知不為狼言其恩愛不可必保也今大王列在諸侯訹邪臣浮說訹誘也音戍犯上禁撓明法撓曲也音女教反天子以太后故不忍致法於大王太后日夜涕泣幸大王自改大王終不覺悟有如太后宫車即晏駕大王尚誰攀乎語未卒王泣數行而下謝安國曰吾今出之即日詭勝自殺漢使還報梁事皆得釋釋解也安國力也伍被為淮南王安中郎安隂有邪謀被微諫私諫之也後王坐東宫召伍被欲與計事呼之曰將軍上被曰王安得亡國之言乎昔子胥諫吳王不用乃曰臣今見麋鹿游姑蘇臺名之臺也今臣亦將見宫中生荆棘露沾衣也於是王怒繫被父母囚之復召被曰將軍許寡人乎被曰小臣將為大王畫計耳臣聞聦者聼於無聲明者見於未形言智慮通逹事未形兆皆預見故聖人萬舉而萬全文王一動而功顯萬世列為三王所謂因天心以動作者也王曰方今漢庭治乎亂乎被曰天下治王不說說讀曰悅曰公何以言天下治也被對曰被竊觀朝廷君臣父子夫婦長幼之序皆得其理上之舉錯遵古之道錯音干故反風俗紀綱未有所缺重裝富賈周流天下道無不通交易之道行南越賔服羌僰貢獻東甌入朝僰西南夷也音蒲北反廣長榆廣謂斥大之也長榆塞名王恢所謂樹榆以為塞也長榆在朔方即衛青傳所云榆谿舊塞是也或謂之榆中開朔方匃奴折傷雖未及古太平時然猶為治王怒被謝死罪王又曰山東即有變漢必使大將軍將而制山東公以為大將軍何如人也被曰臣所善黄義從大將軍擊匈奴言大將軍遇士大夫以禮與士卒有恩衆皆樂為用騎上下山如飛膂力絶人如此數將習兵末易當也及謁者曹梁使長安來言大將軍號令明當敵勇常為士卒先須士卒休乃舍穿井得水乃敢飲軍罷士卒已踰河乃渡皇太后所賜金帛盡以賞賜雖古名將不過是也王曰夫蓼太子淮南太子也亦猶漢之栗太子也知畧不世出非常人也以為漢廷公卿列侯皆如沐猴而冠耳被曰獨先刺大將軍乃可舉事王復問被曰公以為吳舉兵非邪被曰非也夫吳王賜號為劉氏祭酒祭祠時唯尊長者以酒沃酹受几杖而不朝王四郡之衆地方數千里采山銅以為錢煮海水以為鹽伐江陵之木以為船國富民衆行珍寳賂諸侯與七國合從舉兵而西破大梁敗狐父在梁碭之間也父音甫奔走而還為越所禽死於丹徒東潤州縣也頭足異處身滅祀絶為天下戮天下之人皆共戮之一曰天下之大戮也夫以吳衆不能成功者何也誠逆天違衆而不見時也王曰男子之所死者一言耳言男子感氣相許一言不顧其死或曰一言之恨不顧危亡以此致死也且吳何知反漢將一日過成臯者四十餘人言不知塞成臯口而令漢將得出之是不知反計也今我令緩先要成臯之口緩者名也不知其姓今流俗書本於緩上妄加樓字非也周被下潁川兵塞轘轅伊闕之道陳定發南陽兵守武闗河南太守獨有雒陽耳如此計則漢河南郡唯有雒陽在耳餘皆不屬何足憂然此北尚有臨晉闗河東上黨與河内趙國界者通谷數行言此北尚險阻其谿谷可得通行者有數處人言絶成臯之道天下不通據三川之險招天下之兵公以為何如被曰臣見其禍未見其福也後漢逮淮南王孫建繫治之王恐隂事泄謂被曰事至吾欲遂發天下勞苦有間矣有間猶言中間已有也故謂此者皆為間諸侯頗有失行皆自疑我舉兵西鄉必有應者鄉讀曰嚮無應即還畧衡山勢不得不發被曰畧衡山以擊廬江有潯陽之船守下雉之城下雉江夏縣名結九江之浦絶豫章之口彊弩臨江而守以禁南郡之下東保㑹稽南通勁越屈强江淮間屈音具勿反可以延嵗月之夀耳未見其福也王曰左吳趙賢朱驕如皆以為什八九成吳賢驕如王之三臣公獨以為無福何被曰大王之羣臣近幸素能使衆者皆前繫詔獄餘無可用者王曰陳勝吳廣無立錐之地百人之聚起於大澤奮臂大呼天下鄉應呼音火故反鄉讀曰嚮西至於戯而兵百二十萬今吳國雖小勝兵可得二十萬公何以言有禍無福被曰臣不敢避子胥之誅願大王無為吳王之聽往者秦為無道殘賊天下殺術士燔詩書滅聖迹棄禮義任刑法轉海瀕之粟致於河西瀕涯也海瀕謂緣海涯之地瀕音頻又音賔當是之時男子疾耕不足於糧餽餽古饋字也女子紡績不足於蓋形遣蒙恬築長城東西數千里暴兵露師嘗數十萬死者不可勝數僵尸滿野流血千里於是百姓力屈屈盡也音其勿切欲為亂者十室而五又使徐福入海求仙藥多齎珍寳童男女三千人五種百工而行五種五榖之種也徐福入平原大澤止王不來於是百姓悲痛愁思欲為亂者十室而六又使尉佗踰五嶺攻百越尉佗知中國勞極止王南越南海尉任囂謂趙佗曰聞陳勝等作亂豪傑叛秦相立即被佗書行南海尉事囂死後佗始自為王今此乃言尉佗先王陳勝乃反此蓋一時對辭伍被不䆒其實行者不還往者莫返於是百姓離心瓦解欲為亂者十室而七興萬乗之駕作阿房之宫収大半之賦發閭左之戍父不寜子兄不安弟言不能相保政苛刑慘民皆引領而望傾耳而聽悲號仰天叩心怨上叩擊也欲為亂者十室而八客謂髙皇帝曰時可矣髙帝曰待之聖人當起東南間不一歳陳吳大呼中間不經一嵗也呼音火故反劉項并和天下嚮應和音胡卧反嚮讀曰響所謂蹈瑕釁因秦之亡時而動百姓願之若枯旱之望雨故起於行陳之中以成帝王之功今大王見髙祖得天下之易也獨不觀近世之吳楚乎當今陛下臨制天下一齊海内汜愛蒸庶汜普也蒸亦衆也汜音敷劔反布徳施惠口雖未言聲疾雷震令雖未出化馳如神心有所懐威動千里下之應上猶影嚮也言如影之隨形嚮之應聲嚮讀曰響而大將軍材能非直章邯楊熊也王以陳勝吳廣論之被以為過矣過誤也且大王之兵衆不能什分吳楚之一天下安寜又萬倍於秦時願王用臣之計臣聞箕子過故國而悲作麥秀之歌箕子將朝周過殷故都見麥及禾黍心悲乃作歌曰麥秀之漸漸兮黍苗之䋲䋲兮彼狡童兮不與我好兮狡童謂紂也痛紂之不用王子比干之言也故孟子曰紂貴為天子死曽不如匹夫是紂先自絶乆矣非死之日天去之也今臣亦竊悲大王棄千乗之君將賜絶命之書為羣臣先在羣臣先死身死於東宫也王時所居所也被因流涕而起王復召問被茍如公言不可以徼幸邪徼要也幸非望之福也被曰必不得已被有愚計王曰奈何被曰當今諸侯無異心百姓無怨氣朔方之郡土地廣美民徙者不足以實其地可為丞相御史請書謂詐為此文書令徙人也徙郡國豪傑及耐罪已上以赦令除家産五十萬以上者皆徙其家屬朔方之郡以赦令除謂赦免罪者益發甲卒急其㑹日促其期日又為左右都司空上林中都官詔獄書宗正有左右都司空上林有水司空皆主囚徒官也中都官京師諸官府也以逮諸侯太子及幸臣如此則民怨諸侯懼即使辯士隨而說之黨可以徼幸黨讀曰儻王曰此可也雖然吾以為不至若此專發而已言不湏為此詐直自發兵而已後事發覺被詣吏自告遂坐誅田叔為魯相王欽若等曰張敖子魯王偃也初至官民以王取其財物自言者百餘人叔取其渠率二十人笞怒之曰王非汝主邪何敢自言主魯王聞之大慙發中府錢使相償之中府王之財物藏也相曰王自使人償之不爾是王為惡而相為善也不爾是則王為惡魯王好獵相嘗從入苑中王輒休相就館相嘗暴坐苑外於外自暴露而坐終不休曰吾王暴露何為舍王以故不大出遊韓義為燕刺王旦國郎中旦之謀逆也義諫而死國人閔之王吉昭帝時為昌邑王中尉王好遊獵驅馳國中動作亡節吉上疏諫曰臣聞古者師日行三十里吉行五十里詩云匪風發兮匪車揭兮顧瞻周道中心􅜢兮檜風匪風之篇發飄風貌掲疾驅馳􅜢古怛字傷也言見此飄風及疾驅則顧念哀傷思周道也掲音丘列反説曰是非古之風也發發者是非古之車也掲掲者蓋傷之也今之發發然者非古有道之風也今之掲掲然者非古有道之車也故傷之今者大王幸方與縣名也曽不半日而馳二百里百姓頗廢耕桑治道牽馬臣愚以為民不可數變也數音朔昔召公述職召讀曰邵當民事時舍於棠下而聽斷焉舍止息也是時人皆得其所後世思其仁恩至乎不伐甘棠甘棠之詩是也大王不好書術而樂逸游馮式撙銜撙挫也音子奔反馳騁不止口倦乎叱咤咤亦吒字也音竹駕反手苦於箠轡箠音止纍反身勞乎車輿朝則冐霧露晝則被塵埃冐音莫克切夏則為大暑之所暴炙冬則為風寒之所匽薄匽與偃同言遇疾風則偃靡也薄廹也數以耎脆之玉體犯勤勞之煩毒耎音而兖反非所以全夀命之宗也宗尊也又非所以進仁義之隆也隆髙也夫廣厦之下細旃之上廣厦大屋也旃與氊同明師居前勸誦在後上論唐虞之際下及殷周之盛考仁聖之風習治國之道訢訢焉發憤忘食日新厥徳訢古欣字其樂豈徒銜橛之間哉銜馬銜橛車鈎心橛音其月反休則俯仰詘信以利形形體也信讀曰伸進退歩趨以實下今人不行則膝已下虛弱不實吸新吐故以練藏專意積精以適神藏五臟也練練其氣也適和也於以養生豈不長哉大王誠留意如此則心有堯舜之志體有喬松之夀喬松仙人伯喬及赤松子也美聲廣譽登而上聞則福禄其輳而社稷安矣輳與臻同臻至也皇帝仁聖至今思慕未怠皇帝言昭帝也言武帝晏駕未久故尚思慕於宫舘囿池弋獵之樂未有所幸大王宜夙夜念此以承聖意諸侯骨肉莫親大王大王於屬則子也於位則臣也一身而二任之責加焉恩愛行義纎介有不具者於以上聞非饗國之福也臣吉愚戅願大王察之王賀雖不遵道然猶知敬禮吉乃下令曰寡人造行不能無惰中尉甚忠數輔吾過遣謁者千秋賜中尉牛肉五百斤酒五石脯五束其後復放從從音子用反吉輙諌諍甚得輔弼之義雖不治民國中莫不敬重焉及大將軍霍光秉政遣大鴻臚宗正迎昌邑王吉即奏書戒王曰臣聞髙宗諒闇三年不言今大王以䘮事徵宜日夜哭泣悲哀而已慎毋有所發發謂興舉衆事且何獨䘮事凡南面之君何言哉天不言四時行焉百物生焉願大王察之大將軍仁愛勇智忠信之徳天下莫不聞事孝武皇帝二十餘年未嘗有過先帝棄羣臣屬以天下寄幼孤焉屬音之欲切大將軍抱持幼君襁褓之中布政施教海内晏然雖周公伊尹亡以加也今帝亡嗣大將軍惟思可以奉宗廟者攀援而立大王援引也音爰其仁厚豈有量哉言其深多也量音力向反臣願大王事之敬之政事一聽之大王垂拱南面而已願留意常以為念龔遂字少卿山陽人為昌邑郎中令事王賀動作多不正遂為人忠厚剛毅有大節内諌諍於王外責傳相引經義陳禍福至於涕泣蹇蹇亡已蹇蹇不阿順之意也易蹇卦曰王臣蹇蹇面刺王過王至掩耳起走曰郎中令善媿人媿古愧字愧辱也及國中皆畏憚焉王及國人皆憚之王嘗久與騶奴宰人游戯飲食賞賜亡度遂入見王涕泣膝行左右侍御皆出涕王曰郎中令何為哭遂曰臣痛社稷危也願賜清間竭愚王辟左右閒讀曰閑辟音闢遂曰大王知膠西王所以為無道亡乎王曰不知也曰臣聞膠西王有諛臣侯得王所為儗於桀紂也儗比也得以為堯舜也王說其謟諛常與寢處說讀曰恱唯得所言以至於是唯用得之邪言故致亡今大王親近羣小漸漬邪惡所習存亡之機不可不慎也臣請選郎通經術有行義者與王起居坐則誦詩書立則習禮容宜有益王許之遂乃選郎中張安等十八人侍王居數日王皆逐去安等及王被徵乘七乘傳詣長安邸夜漏未盡一刻以火發書其日中賀發餔時至定陶行百三十五里侍從者馬死相望於道遂諫王令還郎謁者五十餘人賀到濟陽求長鳴雞鳴聲長者也道買積竹杖合竹作杖也過𢎞農使大奴善以衣車載女子凡言大奴者謂奴之尤長大者也至湖即湖縣使者以讓相安樂使者長安使人也讓責也安樂告遂遂入問賀賀曰無有遂曰即無有何愛一善以毁行義請収屬吏以善付吏也屬音之欲切其下亦同以湔灑大王湔澣也灑濯也湔子顛反灑先禮反即捽善屬衛士長行法捽持頭也衛士長主衛之官捽音才兀反賀到霸上大鴻臚郊迎騶奉乗輿車王使僕夀成御郎中令遂參乘旦至廣明東都門遂曰禮奔䘮望見國都哭此長安東郭門也賀曰我嗌痛不能哭嗌疾咽也音益至城門遂復言賀曰城門與郭門等耳旦至未央宫東闕遂曰昌邑帳在是闕外馳道北弔哭帳也是謂此未至帳所有南北行道馬足未至數歩大王宜下車郷闕西面伏哭盡哀止鄉讀曰嚮王曰諾到哭位如儀王受皇帝璽綬即位二十七日行淫亂廢賀歸故國初賀在國時數有怪嘗見白犬髙三尺無頭其頸以下似人而冠方山冠後見熊左右皆莫見又大鳥飛集宫中王知惡之輙以問遂為言其故王仰天歎曰不祥何為數來遂叩頭曰臣不敢隠忠數言危亡之戒大王不說夫國之存亡豈在臣言哉願王内自揆度大王誦詩三百五篇人事浹王道備浹徹也王之所行中詩一篇何等也言王所行皆不合法度王自謂當於何詩之文也大王位為諸侯王行汙於庶人以存難以亡易宜深察之後又血汙王坐席王問遂遂呌然號曰宫空不乆妖祥數至血者隂憂象也宜畏慎自省賀終不改節居無何徵既即位後王夢青蠅之矢積西階東可五六石以屋版瓦版瓦大瓦也覆發視之青蠅矢也以問遂遂曰陛下之詩不云乎猶言陛下所讀之詩也營營青蠅至于藩愷悌君子毋信讒言陛下左側讒人衆多如是青蠅惡矣惡即矢也越王勾踐為吳王嘗惡亦其義也宜進先帝大臣子孫親近以為左右如不忍昌邑故人如若也不忍謂不能疎逺也信用䜛䛕必有凶咎願挽禍為福皆放逐之臣當先逐矣賀不用其言卒至於廢王式為昌邑王師昌邑王嗣立以行淫亂廢昌邑羣臣皆下獄誅唯中尉王吉郎中令龔遂以數諫减死論式繋獄當死治事使者責問曰師何以亡諫書式對曰臣以詩三百五篇朝夕授王至於忠臣孝子之篇未嘗不為王反復誦之也至於危亡失道之君未嘗不流涕為王深陳之也臣以三百五篇諫是以亡諫書使者以聞亦得減死論張敞為膠東相王太后數出游獵敞奏書諌曰臣聞秦王好淫聲葉陽后為不聽鄭衛之樂葉陽秦昭王后也音式渉反楚莊好田獵樊姬為不食鳥獸之肉樊姬楚莊王姬也口非惡㫖甘耳非憎絲竹也所以抑心意絶耆慾者耆讀曰嗜將以率二君而全宗祀禮君母出門則乘輜軿下堂則從傅母輜軿衣車也輜音甾又楚疑切軿步千反進退則鳴玉佩内飾則結綢繆謂衣裳結束綢繆也組紐之屬所以自結固也綢直留反繆亡蚪反此言尊貴所以自歛制不從恣之義也從讀曰縱今太后資質淑美慈愛寛仁諸侯莫不聞而少以田獵縱欲為名於以上聞亦未宜也上聞聞於天子也唯觀覽於往古全行乎來今令后姬得有所法則下臣有所稱誦敞幸甚書奏太后止不復出後漢桓郁為侍中入授皇太子經太子賜郁鞍馬刀劔郁乃上書皇太子曰伏見太子體性自然包含今古謙謙允恭天下共見郁父子受恩無以眀益夙夜慚懼誠思自竭愚以為大子上當聖心下當卓絶於衆宜思逺慮以光朝廷何敞為濟南王傅王康奢侈恣欲游觀無節敞上疏諫康曰蓋聞諸侯之義制節謹度然後能保其社稷和其民人大王以骨肉之親享食茅土當施張政令明其典法出入進止宜有期度輿馬臺𨽻應為科品而今奴婢廐馬皆有千餘増無用之口以自蠶食宫婢閉隔失其天性感亂和氣又多起内第觸犯防禁費以巨萬而功猶未半夫文繁者質荒木勝者人亡皆非所以奉禮承上傳福無窮者也故楚作章華以凶吳興姑蘇而滅景公千駟民無稱焉今數游諸第晨夜無節又非所以逺防未然臨深履薄之法也願大王修恭儉遵古制省奴婢之口減乘馬之數斥私用之富節游觀之宴以禮起居則敞乃敢安心自保惟大王深慮愚言康素敬重敞雖無嫌牾然終不能改册府元龜卷七百十二
