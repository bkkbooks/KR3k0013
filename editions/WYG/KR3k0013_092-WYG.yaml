body:
  text: 册府元龜卷九十二宋王欽若等撰帝王部赦宥第十一後唐莊宗同光元年四月己巳即位於魏州升告禮畢御應天門改元肆赦制曰法天取象令王以降𠂻下民秉籙承乾哲后以膺圖受命莫不運椎歴數道濟艱難經綸於草昧之中式遏於亂略之始君臨兆庶子惠萬邦壽域將登眚灾是宥朕顧慙凉德誠媿前修祗荷鴻休恭修清問將布維新之政是覃革故之恩遐按彞章溥頒成憲爰自夙承丕構世奉本朝誓雪耻於君親欲再安於廟社所以躬提義旅力殄凶徒漸致小康永清中夏俄屬列藩羣后不謀同辭咸稱偽逆干天宗祧乏享眷命所屬主鬯攸歸以朕籍係鄭王志存唐室合中興於景祚須再造於洪基推戴既堅讓辭靡獲既難違衆遂命有司乃擇元辰率尊前典尋升壇而奠玊仍即位以建元欽若舊章敬敷霈澤宜改天祐二十年為同光元年可大赦天下自四月二十五日昧爽已前除大辟罪已下罪無輕重已發覺未發覺已結正未結正咸赦除之唯犯十惡五逆火光行劫持刃殺人官典犯贓屠牛鑄錢合造毒藥不在原赦之限鎮州自收復已來累行告諭或因縁危艱為保家族久在山中寨柵懼罪遲疑或被張文禮脅從事不獲已者昧爽已前一切不問咸從赦宥宜體予懐應六軍及行馬歩蕃漢諸道將校兵士等皆以身先冒刄志切勤王或竭節於忠勞或連年而征戍須加恩奬倍撫苦辛其將校尉竝賜功臣名號未有官者即起一子與檢校官已有官者亦超一資如官資已高者與加爵邑如曾封爵者即給一子六品已上正員官其長行兵士竝賜功臣多應將士等竝勒逐處各定等第優賞應有大勲上將元老重臣或盤維毎頼於急難或邦國早資於經濟即安義令公實昆仲之長䕶軍特進同骨肉之恩不可以名氏標文不可以臣下同等嘉庸如在崇德未申其次有戰没陣場身終王事須顯忠彞之美咸隆贈諡之榮周德威盖㝢李存璋李思恩李嗣本李存進伊廣等兼應該勅文者竝委中書門下各令所司一一具録聞奏各加追贈仍定諡號貴流王澤永飾泉扃應諸道管内有高年踰百嵗者便與給優永俾除名自八十至九十者與免一子免役州縣不得差役鄉里有孝子順孫義夫節婦委在所長吏録其節行具以聞奏盡據典章必行旌表内外文武官及諸色人任封事兼有賢良方正抱器懐能或利害可陳無所隱諱直言極諫將一一行之亦委諸道長吏具姓名申奏或所在有義行頗高為鄉里所推者竝仰準例舉選所司量才任使澤潞封疆兄弟之國進思舊績言念疲民惠在綏懐恩加招撫各仰㳂邊鎮戍布命宣陳咸令樂業營生使無侵疆為患應有奉使危邦罹殃殊域既遭陷害深可憫傷如伊鐸盖㝢戴漢超李承勲之徒竝仰所司具名録奏朝廷必議褒贈其貢舉之道誘導為先切要便行貴申奬士委中書門下速商量聞奏其雲應邊陲北山八軍易定幽燕邊陲諸縣自鮮卑入冦仍嵗纒灾睠彼流人良堪興歎或乍來復業纔擬營農尚怯侵擾須加慰恤其税率仍委長吏量與矜減凡有逋毒孤貧惸嫠鰥寡歴代皆聞於教化自古共切於軫傷勉致噢咻遍加惠養應有欠負不繫公私若曾重出利累經徵理填還不迨者竝皆釋放夫掩骼著在前經敬神垂於古典告布諸道州縣所在應有暴露骸骨竝勒逐處埋瘞及山林川澤祀典神祗各隨處差官崇修祭享教之為本禮儀是先德之所崇昭報在上其民間有曽經三世已上不分居者竝與蠲免諸雜差徭倘兵銷患息何須有丹鳯白麟若歲稔人和何必有紫芝赤鴈起今後諸道應有祥瑞竝不要奏聞其赦文中有未該詳事節者即仰所司條件録奏如敢以赦前事相告者以其罪罪之十月己丑御崇元殿降德音曰伏順討逆少康所以誅有窮纉業承基光武所以滅新莾咸以中興景命再造皇猷經綸於草昧之中式遏於亂畧之際朕以欽承大寶顯荷鴻休雖繼前修固慙凉德比以誓平元惡期服本朝屬四海之阽危允萬邦之推戴近自親提組練徑掃氛妖振已墜之皇綱殄偷安之冦孽國讐方雪帝道爰開拯編甿覆溺之艱救率土倒懸之苦粤自朱温搆逆友貞嗣凶簒弑二君隳殘九命虺毒乆傷於宇宙狼貪肆噬於華夷剥䘮元良凌辱神主帝里動黍離之歎朝廷多棟撓之危棄德崇姦窮兵黷武戰士疲勞於力役蒸民既竭其膏腴言念於斯軫傷彌切今則已梟逆豎大豁羣情覩歴數之有歸顯神靈之匪昧得不臨深表志馭朽為懐將𢎞濟於艱難宜特行於眚宥應偽命流貶責受官等已經量移竝可復資徒流人放歸鄉里京畿及諸道見禁囚徒大辟罪降從流已下竝赦除之其鄭珏等一十一人未在移復之限懋德賞功百王明訓䟽封列爵國有通規應扈從征討將校及諸官員職掌軍將節級馬歩兵士及河北諸處屯駐守戍兵士等皆情堅破敵業茂平讎副予戡定之謀顯爾忠勤之節竝據等第續議奬酬其有交鋒戰陣没於王事未經追贈各與贈官如有子孫成立堪任使者竝量才甄録叛之則懲服之則捨盖前經之奥㫖為當代之通規既屬纂承是務遵守應舊偽庭位居藩翰任處專城或掌握兵權或捍防邊鄙各為其主以全其名既解甲以歸明或飛章而送欵變通斯覩忠節可嘉其逐處節度觀察防禦團練等使及諸州刺史監押及偽庭先差出行營將校都監等竝頒恩詔不議改更仍許且稱舊銜當候别加新命理國之道莫若安民勸課之規宜從薄賦庶遂息肩之願冀諧鼔腹之謡應諸道户口宜竝罷其差役各務營農新係殘欠税賦及諸務懸久積年課利及公私債負等其汴州城内自收復日已前竝不在徵理之限應天下諸道自壬午年十二月已前竝放其兵戈蹂躪之地水旱災沴之鄉苗稼不登徵賦既減應今年經霜旱所損田苗處檢覆不虗便據畆隴蠲免兼北京及河北先為妖祲未平配買征馬如有未請却官本錢及買馬不迨者可竝放免往哲𢎞仁有興滅繼絶之道前王惻隱垂矜孤恤寡之文應有本廟宗屬及内外文武臣僚被朱温無辜屠害者竝可追贈之如有子孫及本身逃難於諸處漂寓者竝所在尋訪津送闕庭當行升陟其有義夫節媍孝子順孫竝宜旌表門閭量加賑給或鰥寡孤獨無所告仰者所在各議拯救或有身過八十者免一子從征殷王以恩推解網竝務好生帝堯以引過責躬乃思含垢應有先投過偽庭將校官吏等一切不問事繇無令輙有恐動側席求賢將臻至理懸旌進善或賛鴻猷應名德有稱才藝可取或隱居朝市或遁跡林泉竝逐處長吏遍加搜訪津致赴闕朕當量才任使兼偽庭僣逆已來凢有寃抑沉滯之人宜竝特與申雪仍加遷陟封遺冡而塟枯骨義出周王祀名山而祭大川禮傳虞帝既立規於前古足垂訓於後昆應所在賢士丘墳竝仰聞奏當議封樹或有暴露骸骨亦委逐處塟埋或有百神祠宇不得有虧時祭應德音内有節文不該者竝仰所司重具起請分析聞奏當議施行於戲患難以平咸自忠良之力瘡痍未息宜施撫育之恩更在文武元臣中外耆德覩覆亡而立戒竭忠藎以為謀無縱驕矜須知亷慎同致昇平之道永全開創之功布告遐邇當體朕懐二年二月己巳朔有事於南郊禮畢還御五鳯樓宣制曰體元立極樹司牧者大君創業開基定禍亂者眞主是以肇分正氣斷鼇足而定四維𦕈覿𤣥風抗龍首而朝萬國兆人歸往率土駿奔同興牧野之師共赴塗山之㑹恭行弔伐廣示驅除纔應順於人心俄恢張於戎畧未踰半歲悉集大功剪窮后於夏郊擒漸臺於新室配天纂祀寃耻咸申向闕來庭華夷率服再移星律得事郊禋獲申報本之義已展告䖍之禮顧惟寡薄愧畏尤深久屬偽室兇狂彞倫失序照臨之内愁疾畧同爰當改物之辰乃布維新之慶與人更始以答天休可大赦天下應同光二年二月一日昧爽已前大辟罪已下所犯罪無輕重已發覺未發覺已結正未結正見禁囚徒常赦所不原者咸赦除之十惡五逆屠牛鑄錢故意殺人合造毒藥持杖行劫官典犯贓不在此限賞不失勞百王令典人惟求舊有國通規當宜廣示優恩務酬嘉績應自來立功將校兵士等皆久經戎陣備覩辛勤竝宜各轉官資仍加賞給應偽朝流人并左降官未經量移者即與量移已量移者即與復資尚慮道路遐遥未盡知悉中書門下再舉勅文應内外文武常參官節度觀察防禦刺史主軍都指揮使等夙夜在公氷泉斯戒既著顯親之道宜嘉事主之誠父母亡歿竝與追贈追封在者各與加爵增封四品已上扈從翊衛整肅威儀展我國容俾成大禮應南郊掌儀仗隨駕官員各有勞奬其扈駕樓下立仗將士及河南將校兵士等亦各賜等第優賞睠惟盡瘁言念輸忠率玉帛以來庭賛郊廟而貳事既崇丕烈特顯殊恩凡闗竭力之元勲宜舉報功之茂典應藩鎮使臣各賜一子出身仍加功臣名號諸道留後刺史官高者加爵階一級官卑者加官一資宗子維城本支百代禮既行於配祖情敢怠於睦親應本朝皇親近屬因縁偽梁竄遁遐逺竝仰所在搜訪如非謬妄即與奏聞到京委宗正寺簡勘不虗竝與量才叙録網羅之中無由自奮蜂蠆之内竟至無辜既淪没於濫刑宜申明於眞節凡本朝内外臣僚枉被朱温殺害者竝仰所司具銜申奏特與追贈仍搜訪子孫量加叙録事主之道以立節為先致理之方以賞善為本其懐才抱器不事偽朝衆所聞知顯有節行仰所在長吏將所著狀具姓名聞奏當别甄奬兼授官秩皇王御宇禮三恪而為賓士庶敦風頼五常而濟世當宜封崇後嗣欽若前修應前代二王三恪及文宣王之後竝可各令繼襲仍加恩命所有祖宗廟宇亦宜各與增修其隨處合得俸戸并子孫戸下差税征徭仍委中書門下較本朝格律施行堯皷明懸貴聞進諌舜旌旁建比為來賢是宜廣納話言庶箴闕政洎偽梁人滋澆薄朝掩忠良蔑聞投水之規莫識從繩之路此後應内省文武常參官并前資草澤之士有謀分利害事既機宜竝許上表敷陳朕當選長旌録如有性多毁譽私貯愛憎承寛偶恃於得言縱志惟專於罔善朕亦潜令伺察親要審詳狡蠧有彰罪刑無捨錢者古之泉布盖取其流行天下布散人間無積滯則交易通多貯藏則士農困故西漢興改幣之制立告緡之條所以權畜賈而防大姦也宜令所司散下州府常須檢校不得令富室分外貯見錢又工人銷鑄而為銅器兼㳂邊州鎮設法鈐轄勿令商人搬載出境被服錦繡貴賤有倫裁製衣裝短長有度苟無彞則必害女工近年已來婦女服飾異常寛博倍費縑帛有力之家不計卑賤悉衣錦繡念蠶織之匪易顧法制之不行須示條流兾漸遵守委所司散下文牓曉諭御史臺及諸道觀察糾舉違勅水旱之鄉而饑寒宜恤兵戈之地勞弊堪傷鄴城及河東久興師旅頗困生靈其近裏州縣又輦運徭役無時暫息應北京以北諸州界及至新州幽州鎮定管界契丹侵掠井邑凋殘兼遼州沁州南界及安義北界澤州諸縣河陽向下至鄆濮齊棣已來邊河州縣數年兵革至甚凋殘自此竝宜倍加撫安召令復業應人户所輸租税特與蠲減已從别勅處分兼諸道州縣有經霜水旱之灾所損田苗納税不迨懸欠處仰子細簡詳如不虗妄特與蠲放頃以未殄冦讎常勞戰伐况於邊鄙足見凋傷既歲月滋深在逋逃而可念或主持錢榖管係牛羊既已罄空須憂徵督將叶來蘇之詠宜施在宥之恩應近邊界州縣人戸有舊主持官錢斛㪷牛羊諸雜課利送納不迨者竝令蠲放自兵屯郊境事迫機宜互有侵漁交相虜掠既變良而為賊實威脅以勢驅人或銜寃朕寧無慮可各下諸處有百姓媍女俘虜他處為婢妾者願歸即竝不得占留一任骨肉識認其丈夫曾被刺面者仰勘所在村保如委不係食糧人數便勒本州府各與慿據放逐營生鄉村糴貨斗斛及賣薪炭等物多被牙人於城外接賤糴買到房店增價邀求遂使貧困之家嘗買貴物秤量之際又罔平人宜令府縣及御史臺於諸門嚴切條流不得更相違犯應天下見使㪷斛竝是偽朝所定宜令所司别造新朝㪷秤頒下諸道其見使者納官毁廢三舘蘭臺藏書之府動盈萬卷許列九流爰自亂離悉多遺逸須行捜訪以備討尋應天下有人能以經史及百家之言進納者所司立等第酬奬䘮塟之典合式具言使貧者足以備其儀富者不得踰其制頃自淳風漸散薄俗相承不守等威競為僣侈生則不能盡其養没則廣費飾其終自今後仰所司舉名條制勿令踰越若故違犯嚴加責罰歴代以來除桑田正税外只有茶鹽銅鐵出山澤之利有商税之名其餘諸司竝無税額偽朝已來通言雜税有形之類無税不加為弊頗深興怨無已今則軍須尚重國力未充猶且權宜未能全去且檢天下桑田正税除三司上供既能無漏則四方雜税必可盡除仰所司速簡勘天下州府戸口正額墾田實數待慿條理以息繁苛國以人為本人困則國何所依人以食為天食艱則人何以濟聞偽朝已來恣為掊斂至於雜色斛㪷柴草受納倉場邀頡人戸分外誅求納一㪷則二㪷未充納一束則三束不了互相䝉蔽上下均分疲斃生靈莫斯為甚自今後仰長吏選清強官吏充主納仍須嚴立條制以防姦欺兼具逐色所納加耗申奏當官者宜守於朝章力田者宜遵於王制苟容僥倖必亂規䋲訪聞富户田疇多投權勢影占州縣不敢科役貧下者更代征徭轉致凋殘最為蠧弊將安疲瘵須擇循良應偽庭内班朝僚及諸色主掌職員等遭無辜殺害者竝許昭雪歸塟共理者太守之官親人者縣宰之任戈鋋稍弭政術為先刺史縣令有勸課農桑招復戸甲增加税額撿勘不虗委本道觀察使條件奏聞當加進陟如貪墮不理害及於人者速便停替務於葺養稱朕意焉况親人之官無先於令録致理之道必擇於才能苟選任不自於朝廷則恩澤全歸於侯伯今日諸道奏請授官人數轉多闕員全占交隳體例須正條綱委中書門下舉舊例條理聞奏刺史總一州之政縣令專百里之權至于糾督之司竝謂親人之任偽朝取士多不擇才盖自藩方奏論及因權勢屬託公行賄賂蔑顧典章到官唯務於追求在任莫思於葺理或聚蓄更希後任或掊斂以報前恩上下相䝉逺邇為害生靈困斃職此之繇自此牧守令録之官委中書門下精加選擇至于三銓注擬亦在審詳吏能如貪猥有聞不得更授令録及到官後委本道觀察使切加鈐轄仍勒本州判官專為訪察如掩贓罪不具聞奏豈唯獨罪本官兼亦累及長吏至於義夫節婦孝子順孫竝合捜揚以行旌表德音之所未至赦文之所不該凡百有司各宜申舉於戲圓盖方輿布隂陽而貿萬物賢臣聖主守紀綱而馭四方所寶者黎元所重者神器久落姦兇之手毎傷忠義之心朕以訓練五兵憂勤三紀収復而親經百戰輯寧而敢忽萬機得不居安慮危慎終如始内則委樞衡於元輔庶顯彌綸外則分符印於列侯務觀製緝股肱惟肅宗社是依朕有過而須言臣有善而無掩使百姓時序萬國咸寧共全可大之功式表中興之道四年正月壬戌制曰盖聞兵者凶噐戰者危事故聖王不得已而任之是以大兵之後必有凶年朕自收復汴州戡定蜀郡雖當時秋毫無犯而已前乃十載勞師毎嵗傷夷寧無災殃言功於已曾莫繼於百王語德於人况未洽於兆庶遂至去歲水潦為灾自京以東幅員千里田疇悉多荒廢人戸未免流亡賦租既輸納不充軍食又轉運未及物價騰踊人心煎熬既視人以如傷毎敬天而忘戒朕近欲親幸梁宋徧恤生靈又恐大駕省方百司云從道途寧免勞擾州縣復備供承轉慮凋殘莫知攸濟朕自今月三日已後避正殿減常膳徹樂省費以答天譴應同光三年經水灾處有不迨及逃移人户差科夏秋兩税及諸折配色委長吏切加㸃撿竝與放免仍一年内不得雜差遣見在者加意撫恤流徙者設法招㩦其田宅無信有力人户占射及鄰近毁拆務令歸復以惠傷殘且念給養兵戎撫綏疲瘵兾連營而粗濟思比屋以乂安危困生靈倍懐憂切近者爰頒御札務切濟時有所便宜朕無不聽近歲賦税尚恐懸闕逺年逋欠豈可督征不惟虗係於簿書兼亦轉困于生聚致其流散職此之繇應壬午年已前百姓所欠秋夏殘税及諸色課利錢物先有勅文悉已放免近聞或不遵守依前却有徴收仰下租庸司及諸道州府切準前勅處分如或更有違越任百姓詣闕論訴當議勘窮以定贓罪其同光元年當戰伐之後是平蕩之初人户流離多未復業困於租賦須議矜蠲其諸色殘欠差税及不迨係官課利竝與放免分明曉告各遣聞知又輦轂之中郊甸之内時物踊貴人戸饑窮訪聞自陜以西遐及邠鳯積年時熟百糓價和縱未能别備於貢輸亦宜廣通於糶糴近聞輙有税率已曾降敕指揮尚慮關鎮阻滯行人增長物價仰所在長吏切加撿勘以濟往來推救灾䘏患之心明奉國憂人之道又京圻之内自全義制置已數十年每聞開墾荒蕪勸課稼穡曾無歉嵗甚有餘糧公私貯蓄極多收藏未肻出糴欲俟厚價頗失衆情宜令中書門下條流應在京及諸縣有停貯斛㪷竝宜減價出糴以濟公私如不遵行即仰聞奏别具撿括仍委河南府切詳勅命處分伐罪弔人既叶前王之令推恩布澤敢忘當代之憂應三川管内王衍父子偽署將相文武官及諸色職吏等除罪名顯著已從刑憲外脅從者固是無辜同惡者亦以歸命一切釋放更不勘尋仍不得將今日已前事干有告論貴宣曠蕩之澤以安反側之心我國家奄有四海垂三百年西之日入罔不來賔凡有遐方皆我赤子久陷僣偽寧無憫嗟應三蜀管内百姓除秋夏兩税及三司舊額錢物斛㪷并繼岌崇韜申奏減落徴收外所有無名配率急徴横斂毒害生靈者更委本道新除節度使到後於舘内一一撿勘細具聞奏當與放免俾惠傷殘應在京及天下州府凡有繫囚除十惡五逆官典犯贓屠牛鑄錢光火劫舍持刃殺人準律常赦不原外合抵極刑者逓減一等竝貸餘生其次罪等悉與減降䟽理釋放不得久有禁繫自同光元年後或有犯罪流人情非巨蠧者竝許歸還應行營及在京諸軍皆役管健偶因過犯便至奔逃懐憂懼以離家忍饑寒而在外事非在已情亦可矜委所在如有此色人切加招撫或要却歸都幕或願逐便營生盡捨愆尤悉皆聽許春以生而秋以殺天之道也德以教而刑以威君之政也朕惟寡薄敢忘憂勤唯將德惠以臨人庶免灾害之及物既垂天戒未致時雍爰施布澤之文是表責躬之道中外臣庶遐邇生靈宜體朕懐罔有不敬是時天下州府相繼奏户籍流亡及舉家凍殍者數千帝憂恐減膳徹樂故䧏此德音蠲除雜賦人已流殣無所及也明宗天成元年四月丙午即位甲寅御文明殿受朝改元肆赦制曰天生蒸民樹之司牧立君臣之位定治亂之機撫之則為后王虐之則為讎敵以今况古何代不然先皇帝親總干戈而奄宅區夏功既成而稍忘戒懼道未濟而不慎驕矜遂致貪吏藏姦羣小多辟勲舊無名而被禍忠良飲憤而見危比屋由是怨咨連營以之愁歎俄成否運遂至横流朕昔奉武皇而㓜聆明訓早承締搆備歴艱難敢忘作礪之規以奉維城之固一昨趙在禮遽從其羣徑入鄴都一則迫於饑寒從其糧榖一則痛於離析就彼妻孥朕既事於專征亦冀成於靖亂豈意羣情見迫衆意相推雖於擾攘之中彌勵扶持之節無奈軍中散卒亂若棼絲闕下禁兵勢如烈火繇是指河流而南渡誓軍旅以西馳志欲救於顛危情冀申於忠赤豈謂兵揺畿甸釁結蕭墻慙赴難以無功徒撫心而掩泣深誠未逹羣議同詞以為奉廟社之烝嘗紹宗祖之基業軍民所繫神器難虗辭避雖至于再三推戴尤形於迫切竟將寡昧獲奉宗祧御朽索而敢載馳渉大川而莫知往夙夜戒懼罔敢底寧所頼中外藎臣弼予冲𦕈援今引古爾既以大寶尊予濟國安民予亦以忠貞頼爾庶將此道共致治平冝推更始之恩以布維新之化今以改同光四年為天成元年鄴都赴難之際定䇿功臣宜特恩以彰豐報其扈從將士及六軍諸衞諸道行營將校等委中書門下次第酬奬夫人不能自理立君以理之豈可殫天下之賦租為宫中之玩好後宫内職量留一百人其餘任歸骨肉臣守閽掌扇量留三十人教坊音聲量留一百人鷹犬之事以備蒐狩量留二十人御廚膳夫量留五十人其餘任從所適内諸司使務有名無實者竝從停廢先皇運闗外之糧資供雒中之戎馬遂致百姓困弊者不勝餽輓之勞今則須為制置令度支與總管使㑹定在京兵數據所供饋積貯京師其近畿糧儲可令諸軍就食諸道營田租庸司先專差務使無益勸農起今後竝委州使管係所納農具斛㪷據數申省應納夏秋税糧先有省耗一升起今後只納正數不得别量省耗其輸芻稾亦不得别徵加耗征賦上供國之常典别申進獻懼削生靈今後節度防禦等使除正至端午䧏誕四節量事逹情自於州府圓融不得輙科百姓其四節刺史不在貢奉諸州使造麴如聞省數之外長吏私更加造價錢多入於私門滯麴常存於省數省司及諸府置税茶場院自湖南至京六七處納税以致商旅不通及州使置雜税務交下煩碎宜定合税物色名目商旅即許收税不得邀難百姓諸道監務破脚價極多獲租課極少須有條流以成規制租庸司先將係省錢與人囘圖所供課利或爛茶弊物積年之後和本乾没為弊最深宜令盡底收納以塞倖門已上五件委三司使條理聞奏力學登第承䕃出身或欠文書寖成踰濫先遭没毁幾至調選無人州縣多是攝官為弊滋甚宜令銓别為起請止除偽濫餘復舊規昨自魏汴至京大將所歴戎馬騰踐麥苖下本州使撿量據所傷殘與蠲地税自今年四月一日已前竝與放免如已徴入州縣者即據數納省若取宫中囘圖錢立契取私債未曾納本利者不在限其餘竝不徴理先縁漕運京師租庸司應借私船今既分兵就食停於漕運其諸河渡私船竝仰却付本主如有滯留許本主論告先朝屢降德音所司不與宣行遲留奏改利在虐人赦書所至仰三司諸道丁寧宣布限一月内便須施行不得遺漏條件仍於要路牓壁貴示衆多嗚呼除舊布新雖更於法制承祧繼世敢怠於纂脩惟上天之匪帎則下民之康定水能利物有載舟覆舟之文言可立身有興邦䘮邦之喻敢不日慎一日業業兢兢庶乃三事大夫百辟卿士共修正道以啟逺圖復先皇帝已墜之基副億兆人相推之意冀上天之悔禍廻下土之沉憂雖唐堯之茅茨土階夏禹之惡衣菲食納隍馭朽不憚於憂勤履薄臨深無忘於夙夜必能自勵以慰人情惟爾尊奬之誠興復之志有始有卒是所望於羣公無怠無荒冀不移於薄德凡百有司宜體朕懐是年十一月庚申敕應天下州使繫囚除大辟罪已下委所在長吏速推勘決斷不得旁追證對經過宿食之地除當死刑外竝仰釋放兼不許徴理天成元年四月一日已前私債所降徳音節文仰王京諸道分明宣布於要害道路牓壁不得漏落今則上聞違犯其後來相次條理諸道事件皆闗念及生聚布以優恩多因州使倖門淹留敕命或公然隱匿全不施行官吏但習舊風百姓罔知親命宜令徧加告諭二年二月丙申曲赦京城臺府軍廵見繫囚徒十月辛丑詔曰朕聞后來其蘇動必從於人欲天監厥徳靜宜布於國恩近者優恩多因州使倖門淹留勑命或公然隱匿全不施行官吏但言幸浚郊暫離雒邑盖逢歲稔共樂時康不謂姦官遽彰逆狀為厲之階既甚覆宗之禍自貽俾我生靈遘兹紛擾永言軫惻無輟寐興宜覃雨露之恩式表雲雷之澤應汴州城内百姓既經驚劫須議優饒宜放二年屋税兼公私債負如是在城回圖錢物及公私質庫除㸃檢見在外實經兵士散失者不計年月逺近竝冝蠲放兼不得輙差配管内户有因納税入州便值更變或散失車牛其車牛許本主識認勤王之節雖自勲賢入貢之勞抑繇於使介其有諸道進奉使或已入汴州陥失土貢宜與收破無勞重有貢輸專人經劫奪者宜與優給不軌之徒已加顯戮無辜之士當慰幽寃馬彦超宋景殷等宜與追贈逆人有子及弟姪者仰竝釋放一切不問輦輅之下姦逆遽興既難戢於戈鋋因莫分於玉石昨王師攻下汴州之時剪除兇逆之際恐其士庶偶陷鋒鋩言念傷殂良多嗟憫宜令石敬塘徧加存問兼勘在城殺傷人口奏聞量加給恤衞主亡軀摧兇效命偶徇脅從之勢終懐忠藎之誠首議向明理宜行賞昨車駕初到城下之時有將士率先開門及下城朝見宜令石敬塘奏聞當與甄酬禁暴戢兵實由武德安民和衆乃契天心車駕自離雒京戒嚴兵士不配一物不役一夫河流井水此外無取尚恐州縣以迎駕為名妄有配率如或察知必不容恕布澤之命必叶於羣心宥過之文庶臻于至理應天下諸州府見禁囚徒除十惡五逆殺人光火劫盗合造毒藥官典犯贓偽行印信屠牛外罪無輕重竝宜釋放瑕疵可滌既責其自新稂莠未除必從於去害應諸道或有人先偶曾為非及有背役衙官懼罪藏隱宜令隨處長吏設法招携各勒歸家一切不問諸色人不得輙有揺動如或自守狂迷尚且結集當令嚴加捕捉無致遁逃貴靜封隅永安黎庶䇿名筮仕誠切於進身制禄命官義從於責實既懲黷貨宜有代耕應天下州縣官員逐月俸料如聞支給多不及時縱或支遣皆是爛弱斛㪷既闕供輸難責㢘慎自此隨處官員所破料錢宜逐縣人户於合送納税物内計折充支一則免勞於人户輸納一則便於官僚仍下三司速與計度掄選之道雖在精研調業之勞頗聞艱苦應選人内有過格年深無門參選縱有材器難遂進趨宜令三銓磨勘行止即與今年冬集判成選人例量材注官如或詐稱不在此限為政之要切在無私聽訟之方唯期不濫天下諸州府官員如有善推疑獄及曾雪寃濫兼有異政者當具姓名聞奏别加甄奬敬老之規前王所重養親之道為子居先應有年八十已上及家長有廢疾者宜免一丁差役俾遂奉養計國之心忠貞為本承家之法孝友為先應天下有孝子順孫義夫節婦兄弟繼世義居者隨處長吏聞奏當行旌表嫌疑之釁多起於倉皇似是之非率難於明辨應去年四月一日諸州府軍變内有詿誤身没者竝許子孫禮塟頃以兩軍對壘仍廢交鋒亡殁甚多暴露不少宜令滑濮鄆澶衞等州各據地界内有暴露骸骨竝與埋瘞仍差官致祭其餘諸道州府有暴露者亦委長吏指揮埋瘞夫天灾流行時雨愆亢既闗地分宜減國租今歲岐華登萊自夏稍旱須加軫念以示優恩四州所管百姓宜令長吏切加安䘏其所旱損田苗宜令撿行詣實申奏與蠲減税租仍不得有差徭科配於戲罪已責躬前王之大德滌瑕盪穢往世之深仁致逆孽之亂常盖𦕈冲之寡徳誠深惕厲罔敢怠荒既行逮下之恩當守不移之信更在朝廷卿士藩翰侯王同交奉守之心共致治平之道宜布遐邇當體朕懷册府元龜卷九十二
