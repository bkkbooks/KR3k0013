body:
  text: 冊府元龜卷三百四十三宋王欽若等撰將帥部佐命第四呉張昭字子布彭城人漢末大亂徐方士民多避難揚土昭皆南渡江孫策創業命昭為長史橅軍中郎將升堂拜母如比肩之舊文武之事一以委昭後漢獻帝建安五年策臨亡以弟權託昭昭率羣僚立而輔之策謂昭曰若仲謀不任事者君便自取之正復不克㨗緩歩西歸亦無所慮仲謀權字也權哭未及息昭謂權曰孝亷此寧哭時耶且周公立法而伯禽不師非欲違父時不得行也夫為人後者貴能負荷先軌克昌堂構以成勲業也方今天下鼎沸羣盜滿山孝亷何得寢伏哀戚肆匹夫之情哉乃身自扶權上馬陳兵而出然後衆心知有所歸權乃上表漢室下移屬城中外將校各令奉職昭復為權長史權為呉王拜昭綏遠將軍封繇拳侯權既稱尊號昭以老病上還官位及所統領更拜輔呉將軍班亞三司改封婁侯食邑萬户周瑜字公瑾廬江舒人初孫堅興義兵討董卓徙家於舒堅子策與瑜同年獨相友善瑜推道南大宅以舍策升堂拜母有無通共收合士大夫江淮間人咸向之江表𫝊曰堅為朱雋所表為佐軍留家于夀春策年十餘嵗已交結知名聲譽發間有周瑜者與策同年亦英邁夙成聞策聲問自舒来造焉便雅結分好義同斷金勸策徙居舒策從之瑜從父尚為丹陽太守瑜往省之㑹策將東渡到厯陽馳書報瑜瑜將兵迎策策大喜曰吾得卿諧也遂從攻橫江當利皆拔之乃渡擊秣陵破笮融薛禮轉下湖孰江乗進入曲阿劉繇奔走而策之衆已數萬矣因謂瑜曰吾以此衆取呉㑹平山越已足卿還鎭丹陽瑜還頃之袁術遣從弟𦙍代尚為太守而瑜與尚皆還壽春術欲以瑜為將瑜觀術終無所成故求為居巢長欲假塗東歸術聽之遂自居巢還吳是嵗漢獻帝建安三年也策親自迎瑜授建威中郎將即與兵二千人騎五十匹頃之策欲取荆州以瑜為中䕶軍領江夏太守從攻皖拔之復進尋陽破劉勲討江夏還定豫章廬陵留鎭巴丘㑹策薨權統軍瑜將兵赴喪遂留呉以中䕶軍與長史張昭共掌衆事十一年督孫瑜等討麻保二屯梟其渠帥囚俘萬餘口還備官亭江夏太守黃祖遣將鄧龍將兵數千人入柴桑瑜追討擊生虜龍送呉曹公既破荆州得其水軍船歩兵數十萬議者皆欲迎之瑜請精兵三萬進住夏口遇之遂敗曹公于赤壁拜偏將軍領南郡太守以下雋漢昌瀏陽丹陵為奉邑屯據江陵卒年三十六魯肅字子敬臨淮東城人與居巢長周瑜相親結瑜之東渡因與同行留家曲阿㑹祖母亡還葬東城劉子揚與肅友善遺肅書曰方今天下豪傑竝起吾子姿才尤宜今日急還迎老母無事滯於東城近鄭寶者今在巢湖擁衆萬餘處地肥饒廬江間人多依就之况吾徒乎觀其形勢又可博集時不可失足下速之肅答然其計葬畢還曲阿欲北行㑹瑜已徙肅母到呉肅具以狀語瑜時孫策已薨權尚住呉瑜謂肅曰昔馬援答光武云當今之世非但君擇臣臣亦擇君今主人親賢貴士納竒錄異且吾聞先哲祕論承運代劉氏者必興於東南推歩事勢當其厯數終構帝基以協天符是烈士攀龍附鳳馳騖之秋吾方達此足下不須以子揚之言介意也肅從其言瑜因薦肅才宜佐時當廣求其比以成功業不可令去也權即見肅與語甚悦之衆賔罷退肅亦辭出乃獨引還合榻對飲因密議曰今漢室傾危四方雲擾孤承父兄遺業思有桓文之功君既惠顧何以佐之肅對曰昔高帝區區欲尊事義帝而不獲者以項羽為害也今之曹操猶昔項羽將軍何繇得為桓文乎肅竊料之漢室不可復興曹操不可卒除為將軍計唯有鼎足江東以觀天下之釁規模如此亦自無嫌何者北方誠多務也因其多務勦除黄祖進伐劉表竟長江所極據而有之然後建號帝王以圖天下此高帝之業也權曰今盡力一方冀以輔漢耳此言非所及也㑹曹公破荆州將水軍船歩兵數十萬水陸俱下權與諸將議皆勸迎之肅曰將軍迎曹操欲安所歸願早定大計莫用衆人之議遂拒曹公任周瑜以行事以肅為贊軍校尉助畫方畧曹公破走赤壁之敗也瑜病困上疏乞以肅代即拜肅奮武校尉代瑜領兵瑜士衆四千餘人奉邑四縣皆屬焉肅初住江陵後下屯陸口拜漢昌太守偏將軍從權破皖城轉横江將軍後漢獻帝建安二十二年卒後權稱尊號臨壇顧謂公卿曰昔魯子敬嘗道此可謂明於事勢矣呂蒙字子明汝南富陂人少南渡依姊夫鄧當當為孫策將數討山越蒙年十五六竊隨當擊賊策召見奇之引置左右數嵗鄧當死張昭薦蒙代當拜别部司馬策薨從權討丹陽所向有功拜平北都尉領廣德長從征黄祖以功為横野中郎將與周瑜程普等西破曹公於烏林圍曹仁於南郡仁退走遂據南郡撫定荆州還拜偏將軍領尋陽令後從權拒曹公於濡須數進奇計又勸權夾水口主塢所以備禦甚精曹公不能下而退蒙還尋陽末期而廬陵賊起令蒙討之誅其首惡時蜀先主令闗侯鎭守專有荆土權命蒙西取長沙零桂三郡蒙移書二郡望風歸服惟零陵太守郝普城守不降㑹蜀先主請盟呉割湘水以零陵還之以尋陽陽新為蒙奉邑後曹公又大出濡須權以蒙為督拒破之曹公引退拜蒙左護軍虎威將軍又拜漢昌太守食下雋瀏陽漢昌丹陵與闗公分土接境羽以兵圍曹仁於樊留傅士仁守公安蒙至南郡太守糜芳與士仁皆降遂入據城盡得公及將士家屬皆撫慰之公還吏士無鬭心㑹權至衆皆委公而降荆州遂定以蒙為南郡太守封孱陵侯以疾卒賀齊字公苖會稽山陰人後漢獻帝建安元年孫策臨郡察齊孝廉領永寧長代韓晏領南郡都尉八年建安漢興南平亂齊進兵建安立都尉府遷新都太守加偏將軍十八年豫章東部民彭材李玉王海等起為賊亂衆萬餘人齊討平之遷奮武將軍二十一年鄱陽民尤突受曹公印綬化民為賊陵陽始安涇縣皆與突相應齊與陸遜討破突斬首數千餘黨震服丹陽三縣皆降料得精兵八千人拜安東將軍封山陰侯出鎮江上督扶州以上至皖黃武初魏以曹休來伐齊以道逺後至因住新市為拒休等憚之引軍還遷後將軍領徐州牧初晉宗為戲口將以衆叛如魏還為蘄春太守圗襲安樂取其保質權以為恥忿因軍初罷六月盛夏出其不意詔齊督糜芳鮮于丹等襲蘄春遂生虜宗全琮字子璜呉郡錢瑭人父柔為㑹稽東部都尉孫策至呉柔舉兵先附策表柔為丹陽都尉後為權車騎長史權又以琮為奮威校尉授兵數千人使討山越因開募召得精兵萬餘人出屯牛渚稍遷偏將軍蜀將闗羽圍樊襄陽琮上疏陳羽可討之計及禽羽權置酒公安顧琮曰君前陳此今日之捷抑亦君之功也封陽華亭侯黃武元年魏以舟軍大出洞口權使呂範督諸將拒之軍營相望敵數以輕船鈔擊琮嘗帶甲仗兵伺候不休頃之敵數千人出江中琮擊破之梟其將軍尹盧遷琮綏南將軍一云魏將曹休使臧霸以輕舟五百敢死萬人襲攻徐陵燒攻城車殺畧數十人將軍全琮徐臧追斬魏將尹盧殺獲數百進封錢塘侯七年權至皖與輔國將軍陸遜擊曹休破之於石亭黃龍元年遷衞將軍左護軍徐州牧尚公主累加右大司馬左軍師程普字德謀右北平土垠人初為郡吏從孫堅征伐討黄巾於宛鄧破董卓於陽人攻城野戰身被創夷堅薨復隨孫策在淮南從攻廬江拔之還俱東渡策到横江當利破張英于麋等轉下秣陵湖熟句容曲阿普皆有功増兵二千騎五十匹進破烏程石木波門陵傳餘杭普功為多策入㑹稽以普為呉郡都尉治錢塘後徙丹陽都尉居石城復討宣城涇安呉陵陽春穀諸賊皆破之策嘗攻祖郎大為所圍普與一騎共蔽扦策驅馬疾呼以矛突賊賊披策因隨出後拜盪冦中郎將領零陵太守從討劉勲於尋陽進攻黃祖於沙羨還鎮石城策薨與張昭等共輔孫權遂周旋三郡平討不服乂從征江夏還過豫章别討樂安樂安平定代太史慈備海昏與周瑜為左右督破曹公於烏林又進攻南郡走曹仁拜禆將軍領江夏太守治沙羨食四縣周瑜卒代領南郡太守權分荆州與蜀普還領江夏遷盪冦將軍卒諸葛瑾字子瑜瑯邪陽都人漢末避亂江東値孫策卒權姊婿曲阿𢎞咨見而異之薦之於權與魯肅等竝見賔待後為權長史轉中司馬從討闗羽封宣城侯以綏南將軍代呂蒙領南郡太守黃武元年遷左將軍督公安假節封宛陵侯魏將曹真夏侯尚等圍朱然等於江陵又分據中州瑾以大兵為之救援瑾性𢎞緩推道理任計畫無應卒倚伏之術兵久不解權以此望之及春水生潘璋等作水城於上流瑾進攻浮橋眞等退走權稱尊號拜瑾大將軍左都䕶領豫州牧黃蓋字公覆零陵泉陵人初辟公府孫堅舉義兵蓋從之破南山賊北走董卓拜别部司馬堅薨蓋隨策及權擐甲周旋蹈刄屠城諸山越不賔有冦難之縣輒用蓋為守長後漢獻帝建安中隨周瑜拒曹公於赤壁以功拜武鋒中郎將武陵蠻夷反亂攻城邑乃以蓋領太守冦亂盡平後長沙益陽縣為山賊所攻蓋又平討加偏將軍病卒韓當字義公遼西令支人以便弓馬有膂力幸於孫堅從征伐周旋數犯危難陷敵擒虜為别部司馬及孫策東渡從討三郡遷先登校尉授兵二千騎五十匹從征劉勲破黃祖還討鄱陽領樂安長山越畏服後以中郎將與周瑜等拒破曹公又與呂蒙襲取南郡遷偏將軍永昌太守宜都之役與陸遜朱然等共攻蜀軍於涿鄉大破之徙威烈將軍封都亭侯曹眞攻南郡當保東南在外為帥厲將士同心固守又敬重督司奉遵法令權善之黃武二年封石城侯遷昭武將軍領冠軍太守後又加都督之號將敢死及解煩兵萬人討丹陽賊破之㑹病卒蔣欽字公奕九江壽春人孫策拜别部司馬授兵與策周旋平定三郡又從定豫章累遷西部都尉㑹稽冶賊呂合秦狼等為亂欽將兵討擊遂擒合狼五縣平定徙討越中郎將賀齊討黝賊欽督萬兵與齊并力黝賊平定從征合肥魏將張遼襲權於津北欽力戰有功遷盪冦將軍領濡須督權征蜀欽督水軍還道病卒周泰字幼平九江下蔡人初隨孫策爲左右數戰有功策入㑹稽署别部司馬權愛其為人請以自給權住宣城山賊數千人卒至權始得上馬而賊鋒刃已交於左右或斫中馬鞍衆莫能自定惟泰奮擊騰身衞權是日無泰權幾危殆策深德之補春榖長後從攻皖討江夏皆有功後與周瑜程普拒曹公於赤壁攻曹仁於南郡荆州平定將兵屯岑曹公出濡須泰復赴擊拜平虜將軍後權破闗侯欲進圖蜀拜泰漢中太守奮威將軍封陵陽侯董襲字元代㑹稽餘姚人孫策入郡襲迎於高遷亭策見而偉之署門下賊曹時山陰宿賊黃龍羅周勃聚黨數千人策自出討襲身斬羅勃首還拜别部司馬授兵數千遷揚武都尉從策攻皖又討劉勲於尋陽伐黃祖於江夏策薨權統事鄱陽賊彭虎等衆數千人襲與凌統歩隲蔣欽等各别分討襲所向輒破旬日盡平拜威越校尉遷偏將軍後漢獻帝建安十三年權討黃祖襲與凌統俱為前部破斬之曹公出濡須襲從權赴之使襲督五樓船夜暴風船敗死甘寧字興霸巴郡臨江人初依劉表因居南陽不見進用後轉託黃祖又以凡人畜之於是歸吳周瑜呂蒙竝共薦達孫權加異同於舊臣寧陳訃破黃祖權遂西果擒祖盡獲其士衆乃授寧兵屯當口後隨周瑜拒破曹公於烏林攻曹仁於南郡又隨魯肅鎮益陽拒闗公以功拜西陵太守從攻皖為外城督破獲朱光拜折衝將軍曹公出濡須寧為前部督受勑出斫敵敵驚動遂退凌統字公績呉郡餘杭人父操從孫策征伐常冠軍履鋒及權統事從討江夏中流矢死綂年十五左右多稱述者權亦以操死國事拜綂别部司馬行破賊都尉使攝父兵後從破山賊權破保屯先還餘麻屯萬人統與督張異等留攻圍之統身當矢石所攻一面應時披壞諸將乘勝遂大破之後權復征江夏統為前鋒先搏其城於是大獲拜承烈都尉與周瑜等拒破曹公於烏林遂攻曹仁遷為校尉又從破皖拜盪冦中郎將領沛相與呂蒙等西取三郡反自益陽從往合肥為右部督拜偏將軍卒徐盛字文嚮瑯邪莒人客於吳為孫權别部司馬授兵五百人守柴桑拒黃祖以功遷校尉中郎將督校兵曹公出濡須從權禦之魏使邢貞拜權為呉王權出都亭候貞貞有驕色張昭既怒而盛忿憤顧謂同列曰盛等不能奮身出命為國家并許雒吞巴蜀而令吾君與貞盟不亦辱乎因涕泣横流貞聞之謂其旅曰江東將相如此非久下人者也後遷建武將軍封都亭侯領廬江太守賜臨城縣為奉邑蜀先主次西陵盛攻取諸屯所向有功曹休出洞口盛與呂範全琮渡江拒守以少禦多敵不能克各引軍退遷安東將軍封蕪湖侯潘璋字文珪東郡發千人孫權為陽羨長始往隨權因使召募得百餘人遂以爲將討山賊有功署别部司馬累遷武猛校尉偏將軍遂領百校屯半州權征闗公璋與朱然斷公走道至臨沮住夾口璋部下司馬馬忠禽公并公子平都督趙累等權即分宜都至秭歸二縣為固陵郡拜璋為太守振威將軍封溧陽侯丼寧卒又并其軍蜀先主出夷陵璋與陸遜并力拒之以功拜平北將軍襄陽太守權稱尊號拜右將軍朱治字君理丹陽故鄣人州辟從事隨孫堅征伐拜司馬從討長沙零桂等三郡賊周朝蘇馬等有功堅表治行都尉從破董卓於陽人㑹堅薨治扶翼策依就袁術後知術德政不立乃勸策還江東時太傅馬日磾在壽春辟治為掾遷呉郡都尉策為袁術攻廬江治使人於曲陽迎太妃及權兄弟策薨治與張昭等共尊奉權後漢獻帝建安七年權表治為九眞太守行扶義將軍割婁繇拳無錫毗陵為奉邑置長吏征討夷越佐定東南禽截黃巾餘類陳敗萬秉等黃武元年封毗陵侯二年拜安國將軍金印紫綬徙封故鄣朱然字義封治姊子本姓施氏初治未有子然年十三乃啓策乞以為嗣然嘗與權同學書至權統事累遷山陰令臨川太守援兵二千人討平山賊曹公出濡須然備大塢及三闗屯拜偏將軍漢獻帝建安二十四年從擊蜀將别與潘璋到臨沮有功遷昭武將軍封西安鄉侯代吕蒙鎭江陵黃武元年蜀先主攻宜都然督五千人與陸遜并力拒之然别攻破其前鋒斷其後道遂破走之拜征北將軍封永安侯魏遣曹眞夏侯尚張郃等攻江陵起土山鑿地道立樓櫓臨城弓矢雨注凡六月不能克乃徹攻退還繇是然名震於敵國改封當陽侯黃龍元年拜車騎將軍領兖州牧呂範字子衡汝南細陽人避亂富春孫策見而異之範遂自委質將私客百人歸策從策攻廬江還俱東渡到横江當利破張英於麋下小丹陽湖熟領湖熟相策定秣陵曲阿收笮融劉繇餘衆増範兵二千騎五十匹後領宛陵令討破丹陽賊還呉遷都督從攻祖郎於陵陽太史慈於勇里七縣平定拜征虜中郎將曹公至赤壁與周瑜等俱拒破之拜禆將軍領彭澤太守遷建威將軍封宛陵侯領丹陽太守治建業督扶州以下至海曹休領張遼臧霸等來伐範督徐盛全琮孫韶等以舟師拒休等於洞口遷前將軍封南昌侯黃武七年拜大司馬印綬未下疾卒朱桓字休穆呉人孫權為將軍桓給事幕府累遷盪㓂校尉授兵二千人使部伍呉㑹二郡鳩合遺散期年之間得萬餘人後丹陽鄱陽山賊蜂起攻没城郭殺畧長吏處處屯聚桓督領諸將周旋赴討應皆平定稍遷禆將軍代周泰為濡須督黃武元年魏使大司馬曹仁歩騎數萬向濡湏桓拒破之梟其將常雕生虜王雙送武昌以功封嘉興侯黄龍元年拜前將軍領青州牧是儀字子羽北海營陵人本姓氏郡相孔融嘲儀言氏字民無上因改焉避亂㑹稽孫權承攝大業優文徴儀専典機密呂蒙圖襲闗羽儀善其計從討羽拜忠義校尉既定荆州拜禆將軍封都亭侯遷侍中黃武巾遣儀之皖就將軍劉邵欲誘致曹休休到大破之遷偏將軍進封都鄉侯胡綜字偉則汝南固始人少孤將母避難江東孫策領㑹稽太守綜年十四爲門下循行策薨權為討虜將軍以綜爲金曹從事從討黃祖拜鄂長蜀先主下白帝權以見兵少使綜料諸縣得六千人立解煩兩部綜領右部督呉將晉宗叛歸魏為蘄春太守去江數百里數為㓂害權使綜與賀齊輕行掩襲生虜得宗加建武中郎將權為呉王封綜為亭侯及都建業以綜為侍中兼領軍進封鄉侯呂岱字定公廣陵海陵人為郡縣吏避亂南渡㑹孫權統事岱詣幕府累遷餘姚長召募精健得千餘人㑹稽東冶五縣賊呂合秦狼等為亂權以岱為督軍校尉與將軍蔣欽等將兵討之遂禽合狼五縣平定拜昭信中郎將後漢獻帝建安二十年督孫茂等十將取長沙三郡又安成攸永新茶陵四縣吏共入陰山城合衆拒岱攻圍即降三郡克定權留岱鎭長沙安成長呉碭及中郎將袁龍等首尾闗羽復爲反亂碭據攸縣龍在醴陵權遣橫江將軍魯肅攻攸縣碭突走岱攻醴陵遂擒斬龍遷廬陵郡太守時鬱林夷賊攻圍郡縣岱討破之是時桂陽賊王金合衆於南海界上首亂為害權又詔岱討之生縳金𫝊送詣都斬首獲生凡萬餘人遷安南將軍岱既定交州復進討九眞斬獲以萬數又遣從事南宣國化暨徼外扶南林邑棠明諸王各遣使奉貢權嘉其功進拜鎭南將軍張紘字子綱廣陵人避難江東孫策創業遂委質焉表為正議校尉與張昭竝與參謀嘗令一人居守一人從征討紘從討丹陽策身臨行陣紘諫曰夫主將乃籌謀之所自出三軍之所係命不宜輕脫自敵小㓂願麾下重天授之姿副四海之望無令國内上下危懼後漢獻帝建安四年策遣紘奉章至許宮曹公爲策薨欲因喪伐呉紘諫以為乘人之喪既非古義若其不克成讎棄好不如因而厚之曹公從其言即表權為討虜將軍領㑹稽太守以紘為㑹稽東部校尉後權以紘為長史從征合肥合肥城不拔紘進計曰古之圍城開其一面以疑衆心今圍之甚密攻之又急誠懼并命戮力死戰之冦固難卒拔及救未至可小寛之以觀其變議者不同㑹救騎至數至圍下馳驅挑戰權率輕騎將往突敵紘諫曰夫兵者凶器戰者危事今麾下恃壯盛之氣忽彊暴之虜三軍之衆莫不寒心雖斬將搴旗威震敵塲此乃偏將之任非主將之宜也願抑賁育之勇懐霸王之計權納紘言而止初權於羣臣多呼其字唯張昭曰張公紘曰張東部臣欽若等曰自晉宣帝至武帝四世専政乃受魏禪不以干戈創業故無將帥佐命元帝渡江佐命唯王導已入宰輔門餘皆西晉舊臣故亦無將帥佐命駱統㑹稽烏傷人也孫權以將軍領㑹稽太守綂年二十試為烏程相民户過萬咸嘆其㑹理權嘉之召為功曹行騎都尉綂志在補察茍所聞見夕不待旦常勸權以尊賢接士勤求損益享賜之日可人人别進問其燥濕加以密意誘諭使言察其志趣令皆感恩戴義懐欲報之心權納用焉出為建中郎將領武射吏三千人及凌綂死復領其兵是時徴役繁數重以疫癘民户損耗統上疏權感綂言深加意焉以隨陸遜破蜀軍於宜都遷偏將軍黃武初曹仁攻濡須使别將常雕等襲中洲綂與嚴圭共拒破之封新陽亭侯册府元龜卷三百四十三
