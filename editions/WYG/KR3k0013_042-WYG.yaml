body:
  text: 冊府元龜卷四十二宋王欽若等撰帝王部仁慈儒有百行仁為之宗道有三寳慈居其首君人者本之以成帝徳行之以宅天下天下之民愛而戴之何莫由斯之道也若乃蜡氏除骴列於秋官詩人行葦系於大雅禁方春之刳毁則澤被含靈戒不時之薙伐則恩加植物至於寘臧獲乎生齒還幽閉於所親釋俘虜之窮困購陷没之良口若是數者時而行之則萬物由庚而况於下民乎四夷慕義而况於中國乎書曰好生之徳洽於民心又曰民罔常懐懐于有仁其此之謂歟商湯出見野張網四面祝曰自天下四方皆入吾網湯曰嘻盡之矣乃去其三面祝曰欲左左欲右右不用命乃入吾網諸侯聞之曰湯徳至矣及於禽獸周文王作靈䑓掘地得死人骸文王曰更𦵏之吏曰此無主也文王曰有天下者天下之主今我非其主耶遂令吏以衣冠𦵏之天下聞之曰文王賢矣澤及枯骨又况人乎漢高祖五年五月詔民以饑餓自賣為人奴婢者皆免為庶人文帝十二年二月出孝恵皇帝後宫羙人令得嫁宣帝元康三年六月詔曰前年夏神爵集雍今春五色鳥以萬數飛過屬縣翺翔而舞欲集未下其令三輔毋得以春摘巢探卵彈射飛鳥具為令成帝永始四年六月出杜陵諸未嘗御者歸家後漢光武建武二年五月詔曰民有嫁妻賣子欲歸父母者恣聽之敢拘執論如律六年十一月詔王莽時吏人没入為奴婢不應舊法者皆免為庶人七年五月詔吏人遭饑亂及為青徐賊所畧不以道取為畧為奴婢下妻欲去留者恣聽之敢拘制不還以賣人法從事言從賣人之事以結其罪十二年三月詔隴蜀民被畧為奴婢自訟者及獄官未報一切免為庶民十一月大司馬呉漢平公孫述放兵大掠成都焚述宫室帝聞之怒以譴漢又讓漢副將劉尚曰城降三日吏人從服孩兒老母口以萬數一旦放兵縱火聞之可為酸鼻尚宗室子孫嘗更吏職何忍行此仰視天俯視地觀放麑啜羮二者孰仁韓子曰孟孫獵得麑使秦西巴持之其母隨而呼秦西巴不忍而與其母戰國䇿曰樂羊為魏將而攻中山其子在中山中山君烹其子而遺之羮樂羊啜之盡一盃而攻拔中山十三年十二月詔益州民自八年以來被畧為奴婢者皆一切免為庶民或依託為人下妻欲去者恣聽之敢拘留者比青徐二州以畧人法從事十四年十二月癸卯詔益凉二州奴婢自八年以來自訟在所官一切免為庶民賣者無還值章帝元和二年正月詔曰令云人有産子者復勿筭三歲今諸懐姙者賜胎養榖人三斛復其夫勿筭著為令三年二月勅侍御史司空曰方春所過無得有所伐殺車可以引避引避之騑馬可輟觧輟觧之夾轅者為服馬服馬外為騑馬詩云敦彼行葦牛羊勿踐履敦敦然道旁之葦牧羊牛者無使踐履折傷之况於人乎禮人君伐一草木不時謂之不孝孔子曰伐一樹殺一獸不以其時非孝也俗知順人莫知順天其明稱朕意安帝元初二年二月遣中謁者収葬京師客死無家屬及棺槨朽敗者皆為設祭其有家屬尤貧無以𦵏者賜錢人五千質帝本初元年二月庚辰詔曰九江廣陵二郡數離冦害殘夷最甚謂比年張嬰冦廣陵華孟冦九江也生者失其資業死者暴屍原野昔之為政一物不得其所若已為之况我元元嬰此困毒方春戒節賑濟乏戹掩骼埋胔之時骨枯曰骼肉腐曰胔其調比郡見糓出廪窮弱収𦵏枯骸務加埋䘏以稱朕意魏太祖漢建安中陳宫為吕布守下邳布敗太祖擒宫問宫欲活老母及女不宫對曰宫聞孝治天下者不絶人之親仁施四海者不乏人之祀老母在公不在宫也宫死太祖召養其母終其身嫁其女齊王景初三年即位詔官奴婢六十已上免為良人正始七年秋詔曰屬到市觀見所斥賣官奴婢年皆七十或癃疾殘病所謂天民之窮者也且官以力竭而復鬻之進退無謂其悉遣為良民若有不能自存者郡縣賑給之晉武帝太康七年十二月出後宫才人妓女以下二百七十人歸於家帝又嘗幸王濟宅濟供饌甚豐悉貯琉璃器中蒸肫甚羙帝問其故答曰以人乳蒸之帝色甚不平食未畢而去元帝太興四年五月詔曰昔漢二祖及魏武皆免良人武帝時凉州覆敗諸為奴婢亦皆復籍此累代成規也免中州良人遭難為揚州諸郡僮客者以備征役孝武太元十四年正月詔淮南所獲俘虜付諸作部者一皆散遣男女相配匹賜百日廪其役為軍賞者悉贖出之以襄陽淮南饒沃地各立一縣以居之後魏明元永興三年二月詔曰衣食足知榮辱夫人飢寒切已唯恐朝夕不濟所急温飽而已何暇及仁義之事乎王教之多違葢由於此也非夫耕婦織内外相成何以家給人足矣其簡宫人非所當御及執作技巧自輸悉出以配鰥民大武太延元年正月癸未出道武明元宫人令得嫁文成和平四年八月畋於河西詔曰朕順時田獵而從官殺獲過度既殫禽獸乖不合圍之義其勅從官及典圍將校自今已後不聽濫設其畋獵皮肉别自頒賚是月詔曰前以民遭飢寒不自存濟有賣鬻男女者盡仰還其家或因縁勢力或私行請託共相通容不時檢校令良家子息仍為奴婢今仰精究不聽取贖有犯加罪若仍不檢還聽其父兄上訴以掠人論獻文皇興二年十二月詔曰頃張永迷擾敢拒王威暴骨原隰殘廢不少死生寃痛朕甚愍焉天下民一也可敕郡縣永軍殘廢之士聽還江南露骸草莽者收葬之孝文延興三年九月詔曰自今京師及天下之囚罪未分判在獄致死無近親者公給衣衾棺櫝埋葬之不得暴露太和二年二月行幸代之湯泉所過問民疾苦以宫人賜貧無妻者三年二月帝及皇太后幸代郡温泉問民疾苦鰥貧者以宫女妻之詔宫人年老及疾病者免之四年九月詔曰隆冬雪降諸在徽纆及轉輸在都或有凍餒朕甚愍焉可遣侍臣詣廷尉獄及有囚之所同廵省察飢寒者給與衣食桎梏者代以輕鏁五年二月大赦天下免宫人年老者還其所親四月甲寅詔曰時雨不霑春苗萎悴諸有骸骨之處皆敕埋藏勿令露見六年三月庚辰行幸虎圏詔曰虎狼猛暴食肉殘生取捕之日每多傷害既無所益損費良多從今勿復捕九年八月詔數州災水饑饉薦臻致有賣鬻男女者天之所譴在於一人而百姓無辜横罹艱毒朕用殷憂夕惕忘食與寢今自太和六年以來買定冀幽相四州饑民良口者盡還所親雖聘為妻妾遇之非理情不樂者聴離之十三年九月免宫人以賜北鎮人貧鰥無妻者十八年十二月南伐齊詔夀陽鍾離馬頭之師所獲男女之口皆放還南十九年八月幸西宫路見壊冡露棺駐輦殣之宣武景明三年二月詔曰自比陽旱積時農民廢殖寤言憎愧在予良多申下州郡有骸骨暴露者悉可埋瘞正始三年五月詔曰掩骼埋胔古之令典順辰脩令朝之常式今時澤未降春稼已旱或有孤老篤癃無人養救因以致命暴骸溝塹者雒陽部尉依法棺埋永平二年十二月詔禁屠殺含孕以為永制孝明熙平元年五月詔放華林野獸於山澤出帝太昌元年五月庚戌詔曰頃因年饑百姓流徙或身倚溝渠或命懸道路皆見棄草土取厭烏鳶言念及此有驚夜寢掩骸之禮誠所庶㡬行殣之義冀亦可免其諸有露屍者令所在埋覆可宣告天下後周明帝二年二月詔曰王者之宰世莫不同四海以逺近為父母而子之一物失所若納於隍賊之境土本同大化往因時難致阻東西遂使疆埸之間交相抄掠興言及此良可哀傷自元年以來有被掠入賊者悉可放免武帝保定五年六月詔曰江陵人六十五已上為官奴婢者俱已令放免其公私奴婢有年至七十以外者所在官司宜贖為庶人建德元年十月詔江陵所獲俘虜充官口者悉免為民六年十一月詔永熙三年七月以來去年十月以前東土之民被抄掠在化内為奴婢及被抄平江陵之日良人没為奴婢者並免放所在附籍一同民伍若舊主人猶須共居聽留為部曲及客女靜帝大象二年詔南定北光衡巴四州民為宇文亮抑為奴婢者並免其為民復其本業唐髙祖武徳二年二月詔曰釋典微妙淨業始於慈悲道教冲虛至徳去其殘殺四時之禁無伐麛卵三驅之化不取前禽葢欲敦崇仁恵蕃衍庶物立政經邦咸率茲道朕祗膺靈命撫遂羣生言念亭育無忘鑒寐殷帝去網庶踵前脩齊王捨牛實符本志自今以後每年正月五月九月及每月丁齋日並不得行刑所在公私宜斷屠殺三年四月詔曰有隋失馭喪亂𢎞多民物凋殘俗化踰侈躭嗜之族競逐㫖甘屠宰之家恣行刳殺芻豢之畜靡供肴核之資胎夭之羣莫遂蕃滋之性傷財墮業職此之由􅔯敚穿窬因茲未息禮曰君無故不殺牛大夫無故不殺羊士無故不殺犬豕庶人無故不食珍非惟務在仁愛葢亦示之儉約方域未寧尤須節制凋弊之後宜先蕃育豈得恣彼貪暴殘殄庶類之生苟循目前不為經久之慮𨗳民之理有未足乎其闗内諸州宜斷屠殺庶六畜滋多而民庶殷贍詳思厥衷更為條式六月詔曰自隋室不綱政刑荒廢戍役煩重師旅薦興元元無辜墮於塗炭轉死溝壑暴骨中原宗黨淪亡邑居散逸墳隴靡託營魂無歸朕受命君臨為民父母率土之内情均亭毒一物失宜寢興軫慮念茲道殣義先弔恤雖復久已頒下普遣葬埋猶恐吏不存心收藏未盡宜令州縣官司所在廵行掩骼埋胔必令周悉使郵亭之次無復遊魂窀穸之下各安所厝姬文恵化恩及枯骸庶踵於前此為錫類太宗以武徳九年八月甲子即位是月癸酉詔曰爰始正家刑於四海王者内職取象天官上備列位之序下供掃除之役肇自古昔具有節文末代奢淫捜求無度朕嗣膺寳厯撫育黔黎克己厲精庶㡬至理顧省宫掖其數實多恐茲幽閉久離親族一時減省各從罷散歸其戚屬任從婚娶自是後宫及掖庭前後所出三千餘人又在内鷹狗貀等並委五坊使量留餘並觧放九月遣殿中監盧寛將軍趙綽送突厥還蕃頡利獻馬三千匹羊萬口帝不受詔頡利所掠中國户口者令歸之貞觀二年四月詔曰隋運將盡羣凶鼎沸干戈不息饑饉相仍流血成川暴骸滿野朕往因軍旅周覽川原毎所臨視用傷心慮自祗膺寳命義切哀矜雖道謝姬文而情深掩骼諸有骸骨暴露者宜令所在官司收斂埋瘞稱朕意焉九月丁未謂侍臣曰婦人幽閉深宫情實可愍隋氏末年求採無已至於離宫别館非幸御之所多聚宫人皆竭人財力朕所不取且洒掃之餘更何所用今將出之任求伉儷非獨以惜費亦人各遂其性於是令尚書右丞戴胄給事中杜正倫等於掖庭宫西門簡出之三年四月詔婦人正月以來生男賜粟一石四年九月詔曰突厥種落徃逢災厲病疫饑饉殞䘮者多暴骸中野前後相屬幽魂靡託醊奠無所永言矜悼有懐隱惻宜令所司於大業長城以南分道廵行但有骸骨之所酒脯致祭速為埋瘞務令周悉以稱朕意焉十月制决罪人不得鞭背初帝以暇日遍覽羣書因讀明堂孔穴云人五臟之係咸附背脊針灸失所皆有損害乃廢書而歎曰令律决笞者皆云髀背分受乃有邂逅致死之義撻人之背理則宜然夫箠五刑之最輕者也死又生之至重者也豈容犯最輕之刑而或鞭笞致死自古帝王由來未悟不亦悲夫即日遽頒此制五年二月詔曰甲兵之設事不獲已義在止戈期於去殺季葉馳競恃力肆威鋒刃之下恣情剪馘血流漂杵方稱快意屍若亂麻自以為武露骸封土多崇京觀徒見安忍之心未𢎞掩骼之禮靜言念此憫歎良深但是諸州有京觀處無問新舊宜悉剗削加土為墳掩蔽枯朽勿令暴露仍以酒脯致祭奠焉五月有司言贖得男女八萬口初隋末大亂中國人多没於北夷至是突厥來降帝遣使以金帛贖購之七月甲辰遣廣州都督府司馬長孫師往收瘞隋日戰亡骸骨毁高麗所立京觀八月遣使於髙麗收隋戰亡骸骨設祭而葬之十年十一月帝謂侍臣曰朕自征伐以來所乗戎馬陷軍破陣濟朕於難者刋石為鐫真形置之左右以申帷葢之義初帝有駿馬名馺露紫霜每臨陣多乗之騰躍摧鋒所向皆㨗嘗討王世充於隋葢馬方酣戰移景此馬為流矢所中騰上古堤右庫直立行芖㧞箭而後馬死至是追念不已刻石立其像焉十五年三月如襄城宫登子邏坂見暍者僵於路駐命左右取藥飲之乃蘇十七年三月帝觀漁於西宫見魚躍焉問其故漁者曰此當乳也於是中網而止十八年二月幸壺口村落偪側問其受田丁三十畆遂夜分而寢憂其不給詔雍州録尤少田者給復移之寛鄉四月辛亥幸九成宫己未行次顯仁宫太宗手詔皇太子曰吾昨見麞鹿懐孕者多縱有空身其子甚小母亡而子存者未之有也吾與汝雖復不射無仁心之人得便終無放理昆蟲無知須推己以及也推己之孝於父母以及此類則天下有識者懐之推己之惡死以及蟲豸含生之者何有不賴所以明日不行十九年五月征遼次遼澤下詔曰日者隋師渡遼時非天贊從軍士卒骸骨相望遍於原野良可哀歎掩骼之義抑惟先典其令並收瘞之十月班師詔初攻遼東城其中抗拒王師應没為奴婢一萬四千口並遣先集幽州將分賞戰士帝念其父母妻子一朝分散情甚哀之因命有司平准其直以布及錢贖為編户焉其衆歡叫之聲三日不息及至幽州夷俘並列於城東拜道稱謝舞躍擗地宛轉塵埃從行者愍之為灑淚初帝之渡遼也莫離支遣加尸城七百人戍葢牟城李勣盡虜之其人並随軍請自効帝謂之曰非不欲爾之力爾家在加尸爾為吾戰彼將為戮矣破一家之妻子求一人之力用吾不忍也戊戌帝悉令稟食而放還咸曰髙麗小人不知所以報天子德也二十一年六月詔曰隋末喪亂邉疆多被抄掠今鐵勒並歸朝化如聞中國之人先陷在蕃内者流涕南望企踵思歸朕聞之惕然深用惻隱宜遣使往燕然等州知見在没落人數與都督相計將物往贖逺給程粮送還桑梓其室韋烏羅䕶靺羯等三部被延陁抄失家口者亦令為其贖取髙宗顯慶元年正月甲午詔曰為國之道必崇簡恵正家之義允歸儉約故知興替之夲得失之基爰自六宫刑於四海既而西都之后累葉驕奢東漢之君相繼淫侈魏庭晉室採擇無厭水運倉積選納逾廣節文既廢怨曠滋深糜費極多流弊忘反朕以寡薄嗣奉瑶圗臨馭八紘亭育萬類向隅之念每切於憂競納隍之心實勞於夙夜率由成訓仰遵先㫖即位之初備加寛貸年老宫人已令放出椒掖之内人數猶多久離親族之歡長供掃除之役永年幽閉良深矜憫又去年霖雨頗傷苗稼在於州縣非無乏少資給後庭有妨國用宜申茲大造更量放出宫人可令宫司料簡具録名帳所司依狀散下歸其戚屬若無近親任求配偶所在官府存心安置勿使輕薄之徒輙行欺誘空有竊資之弊更無偕老之託務加存恤令遂所懐龍朔元年十月狩於陸渾縣校獵於韭山帝身射禽獸獲鹿及雉兎數十令代宫厨應烹之羊盡放令長生焉咸亨四年正月詔咸亨初百姓遺棄男女有收養及驅使者聽量酬衣食之直放還本家閏五月禁作簺捕魚營圈取獸中宗景龍二年十二月幸漢故未央宫舊基引從臣賜宴有羣鹿經於御前羽林騎士獲之以獻帝皆命放之睿宗唐隆元年六月制宫人比來取在京百姓子女入宫者令放出𤣥宗先天元年十二月詔曰犬以守禦雞以司晨有用於人不同常畜好生之徳徧宜令及自今並不得屠殺二年三月太上皇詔今年斷食雞子雖寒食百姓亦不得進六月禁殺牛馬驢等犯者科違詔罪不得以官當廕贖公私賤𨽻犯者决六十然後科罪開元二年十月詔曰乞力徐等天迷神怒背義忘恩憫其下人制在凶帥積骸暴露潤草塗原言念於茲豈忘惻隱其吐蕃戰死人等宜今所在州縣速與瘞埋俾有申於弔拯庶無隔於華裔三年二月北庭都䕶郭䖍瓘破吐蕃及突厥黙啜以其俘來獻帝謂俘囚曰爾等背恩作逆罪不容誅念爾等無知特宜釋放五年七月隴右節度郭知運大破吐蕃獻俘於闕下帝悉免而撫之分配諸州為編户親語之曰吐蕃俘囚等是爾蕃部於我國家送欵降婚分之疆界我不爾詐爾無我虞近年爾忽從兇猾不守誠信犯我羣牧侵我州軍既籍防閑故有經畧臨陣所虜准例應誅我情在好生今為爾屈法並捨爾等性命作諸州編户即宜聽有司處分十一月丙辰詔曰自古見其生不食其肉資其力必報其功馬牛驢皆能任重致逺濟人使用先有處分不令宰殺如聞比來尚未全斷羣牧之内此弊尤多自今以後非祠祭所須更不得進獻牛馬驢肉其王公已下及天下諸州諸軍宴設及監牧皆不得輙有殺害仍令州縣及監牧使諸軍長官切加禁斷兼委御史随事糾彈十二年四月隴右節度使王君㚟破吐蕃來獻戎㨗帝謂吐蕃俘囚等曰凡事俘囚法當處死我好生惡殺覆育萬方汝等雖是外蕃物類亦同中國今捨汝性命以申含養並向鴻臚待後處分十月將封泰山詔曰自古明王仁及萬物今助天孶育方欲告成其縁祀祭及在路供䪺犧牲餼牽禮不可闕除此之外天下諸州並令斷屠及漁獵採捕駕廻至京都依常式二十一年正月制曰獻歲之吉迎氣方始教順天時無違月令所由長吏可舉舊章諸有藏伏孕育之物蠢動生植之類慎無殺伐致令天傷天寳元年正月改元詔曰禁傷麛卵以遂生成自今已後每年春天下宜禁弋獵採捕五載正月詔曰永言亭育仁慈為本况乎春令義叶發生其天下弋獵採捕宜明舉舊章嚴加禁斷宣布中外令知朕意六載正月詔曰今屬陽和布氣蠢物懐生在於含養必期遂生如聞滎陽僕射陂陳留郡蓬池等採捕極多傷害甚廣因循既久深謂不然自今已後特宜禁斷各委所由長官嚴加捉搦輙有違犯者白身决六十仍罰重役官人具名録奏當别處分其僕射陂仍改為廣仁陂蓬池改為福源池庶𢎞大道之仁以廣中孚之化又詔曰祭祀之典犧牲所備將有逹于䖍誠葢不資於廣殺况牛之為畜人實有賴既功施播種亦力被車輿自此餘牲尤可矜憫况前聖有作難為盡廢明神克享亦在深仁自今以後每大祭祀應用騂犢宜令所司量减其數仍永為常式十四載正月詔曰陽和布氣庶類滋長助天育物須順發生宜令諸府郡至春末以後無得弋獵採捕嚴加禁斷必資杜絶肅宗至徳三年正月詔曰國有五典幽閉為重刑于六宫明章内理所以教之隂禮詔之御服至於衡紞紘綖之羙織紝綿纊之事任適於用則有司存焉頃年以來仍遭冦盗違其情性則謫見天象恣其供億則糜費國儲非以逹寃煩振繋滯之義也宜放内人三千人各任其嫁其年老及疾患如無近親收養散配諸寺安置待有去處一任東西仍各與一房資財以充粮用並委府縣官勾當勿使侵凌以成朕無為之化也代宗寳應元年十二月戊辰詔曰凡在生靈合登仁夀自逢艱阻多致傷殘或冦盗為災斃於鋒鏑或歳時不稔道殣相望枯骨轉屍多未埋瘞朕為人父母良深憫惻將何以示掩骼之禮昭葬骨之仁永念前修豈忘古訓其京城内外應有舊骸骨宜令京兆府即勾當收拾埋瘞仍令中使與所由計㑹致祭大厯四年十一月禁畿内弋獵九年三月丙午禁京畿内採捕漁獵自三月至於五月永為常式徳宗以大厯十四年五月即位以文單國累獻馴象凡四十有二皆豢于禁中有善舞者以備元會庭實至是悉令放于荆山之陽及鷹隼豹豽鬭雞獵犬皆放之又出宫人數百人閏五月辛巳詔曰邕府歳貢奴婢使其離父母之鄉絶骨肉之戀非仁也罷之七月商州歳貢黐膠罷之貞元六年十一月詔曰吐蕃比虧信約自失通和邉鎮之間事資備禦因其犯境累獻俘囚既切懐歸之心復加幽縶之苦永言覆育豈間華戎應所獲吐蕃生口見在者一切放歸夲國仍並差人送至界首量事資遣使得自全順宗以貞元二十一年正月即位二月癸丑釋掖庭没官婦人朱泚妻徐氏等甲子大赦制後宫細人子弟音聲等人並宜放歸親族又諸軍先擒吐蕃生口配在諸處者宜資給放還本國三月出後宫三百人及教坊女伎六百人聽其親戚迎於九仙門百姓聚觀讙呼大呌四月丁卯命焚容州所進毒藥可以殺人者憲宗元和元年正月福建道送到吐蕃生口七十人詔給逓乗放歸其國八年六月辛丑命出宫人二百車許人得娶以為妻以水害誡隂盈故也十年九月詔澤潞及鳯翔天藏軍每進雞子既傷物性又勞人力宜停進十二月詔出宫人七十三人分置京城寺觀有家者歸之十一年禁以新羅為生口令近界州府長吏切加提舉以其國宿衛王子金長㢘狀陳故有是命穆宗以元和十五年正月即位御丹鳯樓大赦詔掖庭籍没罪人妻女等宜並放歸親族七月詔許逆賊李師道妻魏氏為尼住法雲寺八月帝御丹鳯樓大赦詔諸軍先擒吐蕃配在諸處者並放歸國願住者亦聽九月江南西道奏配到吐蕃一百六人准赦條流七十四人願歸本縣餘並請住詔給衣逓乗發遣其諸道願歸者准此處分長慶元年七月十六日大赦制李師道呉元濟自絶於天並從誅滅念其祖父嘗事先朝墳墓所在並不得令人擅有毁廢二年十二月丁亥朔詔五坊鷹隼及備打獵狐兎等悉放之敬宗長慶四年正月即位二月詔先在掖庭宫人家口並配内閫年深宫人等並放出外任其所適又詔老宫人及殘疾不堪使役並有父母羸老疾病者並委所司選擇放出三月赦其諸軍先擒獲吐蕃生口配流諸處者宜委本道資給放還本國寳厯元年正月赦先擒獲吐蕃生口配流諸處者委本道資給放還邉土仍不得更受投降人並擒捉人生口四月涇原節度使楊元卿奏當管平凉鎮守得投降吐蕃劉師奴詔委元卿准近赦送還本國二年二月鳯翔節度使進到落蕃回鶻四人敕㫖令付鴻臚寺待有還蕃使即放歸國文宗以寳厯三年即位十二月詔其在内宫女三千許嫁太和元年四月出宫女一百人中人押送權於兩街等觀安置二年五月辛丑詔度支每年㫖額年支配進蚺蛇膽四兩桂州一兩賀州二兩泉州一兩宜於數内量停三兩餘一兩每年轉次送納帝因對侍講學士許康佐語及取蚺蛇膽知生割其腹而後得之帝為惻然因命停減三年四月出宫人一百人任從所適四年四月詔曰春夏之交稼穡方茂永念東作其勤如傷况時屬陽和命禁麛卵所以保滋懐生仁遂物性如聞亰畿之内及闗輔近地或有豪家如務弋獵放縱鷹犬頗傷田苗宜令長吏切加禁察有敢違令者捕繋以聞八年二月詔比者滄冦干紀稽誅數年諸道興師並獻戎㨗時方討叛難議釋縲免死戎邉已有恩貸今滄州一道久被朝章念其懐土之心必有向隅之歎俾之遂性用洽親恩其諸道所送滄州將健配流及邉鎭營田役使者並委本官如有已赴軍職及自有生業不願去者亦任便住又詔曰蘇州大水饑歉之後編户男女多為諸道富家並虛契質錢父母得錢數百米數㪷而已今江南雖豐稔而凋殘未復委淮南浙江東西等道如蘇湖等州百姓願贖男女者官為詳理不得計衣食及虛契徴索如父母已没任親收贖如父母無資而自安於富家不厭為賤者亦聽開成元年三月詔曰比聞兩河之間頻年旱災貧人得富家數百錢數㪷粟即以男女為之僕妾委所在長吏察訪聽其父母骨肉以所得婚購之勿得以虛契為理二年二月甲子出内音聲人四十八人放歸家三月壬辰詔曰韶陽御辰生氣方盛思全物類以順天時内外五坊凡有籠養鷹鷂及雞鴨鳥雀狐兎等悉宜放之起今月一日至五月十三日禁京城及畿内採捕禽獸羅網水蟲以遂生成永為定制委臺府及本司切加禁止三年六月辛亥遣中人監宫人四百八十人送兩街寺觀安置令其親族識認還之壬子又出宫人劉奴等七十五人還其親族七月新羅王金祐徴遣其所遺淄青節度使奴婢帝矜以逺人詔令却歸本國武宗會昌六年二月制新攻黨項事不獲己其婦人並幼小未任持兵仗者交兵日不得濫有殺傷哀帝天祐二年四月詔應有暴露骸骨委所在長吏指揮以上供錢收拾埋瘞後唐莊宗同光元年四月制曰夫掩骼著在前經敬神垂於古典告布諸道州縣所在應有暴露骸骨並勒逐處埋瘞二年二月詔曰自兵屯郊境事廹機宜互有侵漁交相虜掠既變良而為賤實威脅以勢臨人或啣寃朕寧無慮可各下諸處應有百姓婦女俘虜他處為婢妾者願歸即並不得占留一任骨肉識認其丈夫曽被刺面者仰勘所在村保如委不是食糧人數便勒夲州府各與憑據放還營生明宗天成元年四月即位以莊宗時六宫内人數千洎蕭墻之變率多流散及帝自闗東赴難居至徳宫稱制宣徽使處按簿引進猶千餘人時宫使選數百人皆少年端麗者進御帝曰何事須此宫使奏曰宫中内職各有典掌故事不可闕帝因詔老宫人謂曰入宫㡬時對曰曽事乾符帝諳悉故事帝曰宫闈典故非耆艾者曷記所進少年定非前軰因戯謂老宫人曰非惟爾識事故且與予顔狀同耳是日勅少年宫人並令還其家無家可歸者任從所適西川所送者亦令罷歸宫中所識但其舊宫人而已五月辛酉華州節度使史敬鎔奏准宣放西川宫人各歸骨肉二年四月右諫議大夫梁文矩奏上年平蜀以來軍人將到西川人口甚多骨肉阻隔恐傷和氣請許收認帝仁慈素深因文矩之奏河南北舊因兵火虜隔者再令條理並從識認三年六月詔内園鹿七頭命放於深山閏八月勅古之治民者勸賞而畏刑恤民而不倦賞以春夏刑以秋冬是以將賞為之加膳此以知其賞勸世將刑為之不舉此以知其刑懲世唯賞以春夏刑以秋冬見聖哲之用心合天地而行事今朕以切於禁暴樂在勸能其或秋後有功不可待氷泮而行賞春時有罪不可俟霜降而加刑漸向太平方行古道况賞不愆典則立功者轉多刑不濫施則犯法者漸少其在京或遇行極法日宜不舉樂朕減常膳諸州使遇行極法日示禁聲樂四年八月癸卯考功貟外郎郭正封奏中興平定之初自數十年離亂編民或為兵士所掠没為奴婢者既無特勅釐革無復從良遂令骨肉流離有傷王化勅㫖曉諭天下諸軍所掠生口有主識認並勒放歸長興二年四月丙申前濮州録事㕘軍崔琮獻時務諸道獄囚恐不依法考掠或不勝致斃翻以病聞請置病囚院兼加醫藥中書覆云有罪當刑仰天無恨無病致斃没地有寃燃死灰而必在致仁照覆盆而須資異鑒書著欽哉之㫖禮標侀也之文固彰善於泣辜更推㤙於扇暍所請置病囚院望依仍委随處長吏専切經心或有病囚當時差醫人診候治療後據所犯輕重决斷如敢故違致病負屈身亡本屬官吏並加嚴斷兼每及夏至五日一度差人洗刷枷匣九月辛亥詔五坊見在鷹隼之類並可就山林觧放今後不許進獻三年五月癸未勅春夏之交長育是務眷彼含靈之類方資亭育之功先有條流觧放彈鷹隼自此凡羅網射止並諸弋獵之具比至冬初並宜止絶如有違犯仰随處官吏便科違詔之罪起今後每年至于二月初便依此敕曉示中外葢循舊制重布新規宣諭萬邦永為常式四年七月乙未帝於廣夀殿對回鶻使都叔李未等二十二人進白鶻一聫敕禮賔使觧緤放之山林八月帝受尊號畢制曰諸道凡無主丘墓自兵革以來經發掘者宜令觀察使刺史差人量事掩瘞末帝清泰元年九月庚戌詔曰朱𢎞昭馮贇孟漢瓊康義誠王思同樂彦稠等朕志切行仁情唯念舊雖顛覆自貽其伊戚而愍傷猶軫於予懐宜降特恩許其歸葬其親屬骨肉及元随職員並放逐便所在不得恐動晉髙祖天福元年十一月即位赦曰恩推掩骼義顯燭幽允諧逺邇之心冀叶隂陽之序應自舉義以來或有因事抵法之人及九月十四日後殺戮賊冦所在暴露骸骨未有骨肉收認無主者委逐處長吏指揮埋瘞二年四月丁亥制當罪即决式明常典既往可憫宜示深仁魏清泰中臣寮内有從珂誅戮者並許收瘞五月己卯勅大社内先收掌唐朝罪人首級等王業肇興徳音屢降念茲既往屬我維新宜𢎞掩骼之仁以廣燭幽之徳其大社内應收掌唐朝罪人首級並許骨肉或親舊寮屬收葬其喪葬儀注聊備飾終不得過制仍付所司八月詔兵興以來邊疆多事或因虜掠或偶滯留歳序遷移家鄉迢逓宜令收贖俾遂歸還應自梁朝後唐以來前後奉使及北京沿邊管界虜掠往向北人口宜令官給錢物差使齎持任彼一一收贖放歸本家是月大理正韓保裔上言其畧云伏請天下狴牢特頒惻憫抱沉疴者宜加藥餌無骨肉者勿使饑寒庶禆觧網之仁用補泣辜之徳者勅方枉狴牢又縈疾疹在典刑之自别顧醫藥以何妨實可施行足彰仁憫宜下刑部大理寺御史䑓及三京諸道州府或有繋囚染患者並令逐處醫博士及軍醫看候於公廨錢内量支藥價或事輕者仍許人看候所有罪犯合據杖責仍候疾損日科决三年正月詔命供奉官張殷祚往魏博管内收藏暴露骸骨八月勅魏府城下自去歳屯軍以來管界墳墓多經劚掘雖已曽差使勾當收掩今更遣太僕卿邢徳昭祭奠其科例宜令度支給付十月戊戌赦曰仁及枯骨澤漏重泉眷哲后之芳蹤乃有國之令典魏府管内軍兵已來墳墓所毁無主者委逐處官吏指揮随事脩整祭奠仍仰官中給支四年七月甲子勅符彦饒張繼祚婁英尹暉等皆受國恩悉虧臣節孽非天作慼實自貽尋正典刑屢遷歳月宜示燭幽之道用推掩骼之仁宜令近親任便收塟五年七月乙丑福建鄭元弼以下三百五十人放還故土六年四月丙申詔顯義指揮使劉康部下兵百人放還淮海即安州所俘也少帝開運三年二月詔自冬徂春稍愆雨雪掩骼埋胔必契隂靈將召純和宜藏暴露宜令所在長吏依此掩藏仍付所司周太祖廣順元年正月勅含幽育明哲后法之而致理掩骼埋胔賢主著之為令猷今寳祚維新璿璣在御踵姬周之至徳體虞舜之深仁屬三靈改卜之秋當五兵銷偃之際或墳塋無主幽穸毁發於􅐁􅔯或戰陣亡身遺骸暴露於原野旅魂無託言念堪嘆應天下州府管界内有墳墓被開發者無人為主本界官吏量與掩閉勿令漏露或戰塲郊野有暴骸露骨亦仰收拾埋􅄟以聞四月沿淮州鎮上年淮南饑民過來糴物從前通商未敢止絶詔曰淮南雖是殊邦未通中國近聞歉食深所軫懐天災流行分野代有苟或閉糴是豈愛人彼之生靈與此何異宜申惻隱用濟餱粮宜令沿淮州縣渡口鎮舖不得止淮南人糴易是時淮甸累年災旱流民度淮就食者萬計不令止糴其後淮南立倉糴我粟畜之商賈利其善價以舟車輦運太祖聞之許其負擔以供養者禁止輦運又詔唐莊宗明宗晉髙祖三處陵寢各有守陵宫人並放逐便如願在陵所者依舊供給世宗顯徳元年三月親征河東四月放太原投來義軍百姓餘人歸本所三年四月勅節度應諸道所禁罪人無家人供奉喫食者每日逐人給官米三升四年正月降下夀州赦曰自用兵以來被虜却骨肉者不計逺近並許本家識認官中給物收贖所在不得藏占四月放懐恩軍士歸蜀是軍當秦鳯之役為王師所俘帝捨之給以衣廩賜號懐㤙軍至是軫其懐土之意故放之册府元龜卷四十二
