body:
  text: 册府元龜卷六宋王欽若等撰帝王部創業第二晋宣帝司馬氏後漢京兆尹防之子臣欽若等曰自防以下事迹具帝王帝系門建安中魏太祖為漢丞相辟文學掾轉東曹屬又轉為主簿從討張魯又從征孫權破之魏國建遷太子中庻子文帝即王位以帝為丞相長史封河津亭侯及魏受漢禪以帝為尚書黄初二年遷侍中尚書右僕射文帝疾篤帝與曹眞等竝受顧命輔政明帝即位改封舞陽侯孫權圍江夏遣其將諸葛瑾張霸并攻襄陽帝督諸軍討權走之進擊敗瑾斬霸并首級千餘遷驃騎將軍太和元年蜀降將孟逹領新城太守連呉固蜀潛圖中國帝發書喻之逹猶豫不决帝潛軍進討倍道兼行八日到其城下八道攻之旬有六日達甥鄧賢將李輔等開門出降遂斬達首傳京師四年加大將軍大都督假黄鉞與曹眞伐蜀帝自西城斫山開道水陸並進泝沔而上至于朐䏰朐音蠢䏰音如允反地名㧞其新豐縣軍次丹口遇雨班師五年蜀將諸葛亮冦天水乃使帝西屯長安都督雍梁二州諸軍事統車騎將軍張郃後將軍費曜征蜀進次漢陽與亮相遇亮退追至祁山亮屯鹵城㨿南北二山斷水為重圍帝攻㧞其圍亮宵遁追擊破之俘斬萬計青龍二年亮又率衆十餘萬出斜谷壘于郿之渭水南原天子遣征蜀䕶軍秦朗督歩騎二萬受帝節度帝與亮㑹于積石臨原而戰亮不得進還于五丈原帝遣竒兵犄亮之後斬五百餘級獲生口千餘降者六百人㑹亮死其部將楊儀魏延爭權儀斬延并其衆帝欲乘隙而進有詔不許三年遷太尉蜀將馬岱入冦帝遣將軍牛金擊走之景初二年率胡遵等歩騎四萬伐公孫文懿于遼東與賊營相逼㑹霖潦大水平地數尺三軍恐欲移營帝令軍中敢有言徙者斬都督令史張静犯令斬之軍中乃定尋戰而克之明帝末與大將軍曹爽並受遺詔輔少主齊王即帝位遷帝侍中持節都督中外諸軍録尚書事與大將軍曹爽各統兵三千人共執朝政爽欲使尚書奏事先繇已乃言於天子徙帝為大司馬朝議以為前後大司馬累薨於位乃加太傅入殿不趨賛拜不名劒履上殿正始二年呉人入冦帝督諸軍南征車駕送出津陽門帝以南方暑濕不宜持乆使輕騎挑之然不敢動於是休戰士簡精鋭募先登申號令示必攻之勢呉軍夜遁走追至三洲口斬獲萬餘人収其舟船軍資而還天子遣侍中常侍勞軍于宛嘉平元年正月天子謁髙陵爽兄弟皆從是日太白襲月帝乃奏永寕太后廢爽兄弟有司劾黄門張當并發爽與何晏等反事乃収爽兄弟及其黨誅之二月天子以帝為丞相三年八月薨長子師次子昭繼為大將軍輔政晋國建追尊宣王武帝受禪追尊號曰宣皇帝景帝宣帝長子魏景初中拜散騎常侍累遷中䕶軍宣帝之誅曹爽也深謀秘䇿與帝潛畫初帝隂養死士三千散在人間至是一朝而集衆莫知其所出事平以功封長平鄉侯加衞將軍及宣帝薨議者咸云伊尹既卒伊陟嗣事天子命帝以撫軍大將軍輔政嘉平四年遷大將軍加侍中持節都督中外諸軍録尚書事命百官舉賢良明少長䘏窮獨理廢滯四海傾注朝野肅然或有請改易制度者帝曰不識不知順帝之則詩人之美也三祖典制所宜遵奉自非軍事不得妄有改革五年五月呉太傅諸葛恪圍新城帝使鎭東將軍母丘儉揚州刺史文欽等距破之正元元年正月天子與中書令李豐后父光禄大夫張緝黄門監蘇鑠永寜署令樂敦冗從僕射劉寳賢等謀以太常夏侯𤣥代帝輔政帝宻知之使舎人王羡以車迎豐豐見廹随羡而至帝數之豐知禍及因肆惡言帝怒遣勇士以刀鐶築殺之逮捕𤣥緝等皆夷三族三月乃諷天子廢皇后張氏天子以𤣥緝之誅深不自安而帝亦慮難作潛謀廢立乃宻諷永寕太后下令廢天子為齊王遣使迎髙貴鄉公於元城立之公以帝為相國増邑至四萬户帝固辭相國二年正月毋丘儉文欽舉兵作亂矯太后令移檄郡國為壇盟於西門之外各遣子四人質於呉以請救二月儉欽帥衆六萬渡淮而西帝㑹公卿謀征討計朝議多謂可遣諸將擊之太常王肅及尚書傅嘏中書侍郎鍾㑹勸帝自行帝統中軍歩騎十餘萬以征之倍道兼行召三方兵大㑹于陳許之郊斬儉傳首京師欽遂奔呉淮南平閠月帝疾篤使弟昭摠統諸軍晉國既建追尊景王武帝受禪上尊號曰景皇帝文帝景帝母弟帝魏景初三年封新城侯正始初為雒陽典農中郎將轉散騎常侍大將軍曹爽伐蜀以帝為征蜀將軍副夏侯𤣥出駱谷次于興平勸𤣥旋軍以為後圖還拜議郎蜀將姜維冦隴右征西將軍郭淮自長安距之以帝為安西將軍持節屯關中為諸軍節度淮攻維别將句安於趜乆而不决帝乃進㨿長城南趣駱谷以疑之維懼退保南鄭安軍絶援率衆來降轉安東將軍持節鎭許昌及大軍討王陵帝督淮北諸軍事帥師㑹于項假金印紫綬蜀將姜維又冦隴右揚聲欲攻狄道以帝行征西將軍次長安維燒營而去㑹新平羗胡叛帝擊破之遂耀兵靈州北虜震讋叛者悉降髙貴鄉公立以參定䇿進封髙都侯毋丘儉文欽之亂大軍東征帝兼中領軍留鎭雒陽及景帝疾篤帝自京都省疾拜衞將軍景帝薨天子命帝鎭許昌尚書傅嘏帥六軍還京師帝用嘏及鍾㑹䇿自帥軍而還至雒陽進位大將軍加侍中都督中外諸軍録尚書事輔政劒履上殿帝固辭不受甘露元年正月加大都督六月進封髙都公地方七百里加之九錫又固辭不受二年五月鎭東大將軍諸葛誕殺揚州刺史樂綝以淮南作亂遣子靚為質於呉以請救七月帝奉天子及皇太后東征徵兵青徐荆豫分取關中遊軍皆㑹淮北師次於項又進軍丘頭呉使文欽等将三萬人救誕三年正月誕欽等出攻長圍諸軍逆擊走之初誕欽内不相協㑹欽計事與忤誕手刅殺欽欽子鴦攻誕不克帝使諸將攻而㧞之斬誕夷三族四月歸京師天子命改丘頭曰武丘以旌武功五月進封晋公加九錫進位相國帝九譲乃止景元元年四月天子以帝三世宰輔政非己出情不能安又慮廢辱將臨軒召百僚而行放黜五月戊子夜使冗從僕射李昭等發甲於凌雲臺召侍中王沉散騎常侍王業尚書王經出懐中黄素詔示之戒嚴俟旦沉業等馳告於帝帝召䕶軍賈充為之備天子知事泄帥左右攻相府稱有所討太子舎人成濟抽戈犯蹕帝斬濟夷其三族與公卿議立嘗道鄉公為帝四年天子乃申前命以太原等十郡封帝為晋公加九錫遣征西將軍鄧艾伐蜀於是徵四方之兵十八萬使艾自狄道攻姜維於㳫中雍州刺史諸葛緒自祁山軍於武街絶維歸路鎭西將軍鍾㑹帥前將軍李輔征蜀䕶軍胡烈等自駱谷襲漢中艾帥萬餘人自隂平踰絶險至江油破蜀將諸葛瞻於綿竹進軍雒縣遂降劉禪又命晋公以相國摠百揆於是上節傳去侍中大都督錄尚書之號咸熈元年三月進爵為王增封并前二十郡二年八月薨諡曰文王武帝受禪追尊號曰文皇帝武帝文帝長子仕魏累遷中䕶軍封新昌鄉侯晋國建立為世子拜撫國大將軍開府副相國咸熈二年五月為晋王太子八月嗣相國晋王位下令寛刑宥罪撫衆息役十一月初置四䕶軍以統城外諸軍十一月遂受魏禪後魏道武皇帝拓拔氏昭成皇帝嫡孫臣欽若等曰昭成以上事起止悉具帝王帝系門始六嵗居昭成䘮偽秦苻堅使劉庫仁劉衞辰分攝國事南部大人長孫嵩盡將故民南依庫仁帝轉幸獨孤部其後七年十月苻堅敗於淮南是月庫仁為慕容文等所殺以其弟眷攝國部九年庫仁子顯殺眷而代之乃將謀逆臣欽若等曰将謀逆謂將殺道武商人王覇知之履帝足於衆中帝乃馳還是時故大人梁盖盆子六春為顯謀主盡知其計宻使部人穆崇馳告帝乃隂結舊臣長孫㨗元他等幸賀蘭部顯使人求帝不及明年正月戊申帝即代王位于牛川建元登國元年復以長孫嵩為南部大人以叔孫普雒為北部大人班叙勲勞各有差二月幸定襄之盛樂息衆課農三月劉顯臣欽若等曰劉顯即劉庫仁之子是也自善無南走馬邑其族奴真率部來降四月改稱魏王五月車駕東幸陵石䕶佛侯部帥侯辰乙弗部帥代題叛走諸將請追之帝曰侯辰等世修職役雖有小愆宜且忍之當今草剙人情未一愚近者固應趦趄不足追也七月己酉車駕還盛樂代題復以部落來降旬有數日亡奔劉顯帝使其孫倍斤代領部落是月劉顯弟肺泥率騎掠奴真部落既而率以來䧏初帝叔父窟咄為苻堅徙于長安因隨慕容永以為新興太守八月劉顯遣弟亢泥迎窟咄以近随之來逼南境於是諸部騷動人心顧望帝左右于桓等與諸部人謀為逆以應之事泄誅造謀五人餘悉不問帝慮内難乃北踰隂山幸賀蘭部阻山為固遣行人安同長孫賀使于慕容垂以徵師垂遣使朝貢并令其子賀驎率歩騎以隨同等十月賀驎軍未至而冦已前逼於是北部大人叔孫普雒等十三人及諸烏丸亡奔衛辰帝自弩山遷幸牛川屯于延水南出代谷㑹賀驎於髙桞大破窟咄窟咄奔衞辰衞辰殺之帝悉収其衆十二月慕容􅂷遣使朝貢奉帝西單于印綬封上谷王帝不納是嵗慕容垂僣稱皇帝於中山自號大燕苻丕死苻登自立於壟東姚萇稱皇帝於長安自號大秦慕容冲為部下所殺慕容永僣立也二年六月征劉顯於馬邑南追至彌臯大破之顯南奔慕容永盡收其部落三年五月北征庫莫奚六月大破之獲其四部雜畜十餘萬七月庚申庫莫部帥鳩集遺散夜犯行宮帝縱騎撲討盡殺之十二月西征至女水討觧如部大破之四年正月襲髙車諸部落二月至女水討叱突隣部皆大破之五年三月西征次鹿津海襲髙車袁紇部四月幸意辛山討賀蘭紇突隣紇奚諸部落皆大破之九月討吐奴部於囊典河十月討髙車豆陳部於狼山亦皆破之六年二月遣九原公儀陳留公䖍等臣欽若等曰儀䖍二公皆宗室西討黜弗部破之七月衞辰遣子􅀢力鞮出稠陽塞侵及黒城九月襲五原屠之十月北征蠕蠕追及之於大磧南林山下大破之十一月􅀢力鞮冦南部帝討之大破其軍於鐵岐山自五原金津南度河次其所居悅跋城衞辰父子奔遁擒斬之自河以南諸部悉平八年三月西征侯呂隣部四月至苦水大破之八月南征薛于部帥太悉佛於三城㑹其先出擊曹覆帝乗虗屠其城獲其子女珍寳徙其民而還皇始元年七月左司馬許謙上書勸進尊號帝始建天子旌旗初建臺省置百官封公侯將軍刺史太守尚書郎已下悉用文人天興元年六月丙子詔有司議定國號羣臣曰昔周秦以前世居所生之土有國有家及王天下即承為號自漢以來罷侯置守時無世繼其應運而起者皆不繇尺土之資今國家萬世相承啓基雲代臣等以為若取長逺應以代為號詔曰昔朕逺祖摠御幽都控制遐國雖踐王位未定九州逮于朕躬處百代之季天下分裂諸華乏主民俗雖殊撫之在徳故躬率六軍掃平中土凶逆蕩除遐邇率服冝仍先號以為魏焉布告天下咸知朕意閠十一月左丞相驃騎大將軍魏王儀及諸王公卿士等上表勸進即皇帝位帝三譲乃許之後周太祖文帝宇文氏徳皇帝之子徳皇帝事迹並具帝王帝系門後魏明帝孝昌二年燕州亂太祖始以統軍從爾朱榮征之先是北海王顥奔梁梁人立為魏主令率兵入雒魏孝莊帝出居河内以避之榮遣賀拔岳討顥仍迎孝莊帝太祖與岳有舊乃以别將從岳及孝莊帝反正以功封寜都子邑三百户遷鎭逺將軍歩兵校尉万俟醜奴作亂關右孝莊帝遣爾朱天光及岳等討之太祖遂從岳入關先鋒破偽行臺尉遲菩薩等及平醜奴定隴右太祖功居多遷征西將軍金紫光祿大夫增邑三百户加直閣將軍普泰二年爾朱天光東拒齊神武留弟顯壽鎮長安秦州刺史侯莫陳悅為天光所召將軍衆東下賀拔岳知天光必敗欲留悦共圖顯夀而計無所出太祖謂岳曰今天光未有二心若以此事告之恐其驚懼然悅雖為主將不能制物若先説其衆必人有留心進失爾朱之期退恐人情變動乘此説悅事無不遂岳大喜即令太祖入悅軍説之悅遂不行乃相率襲長安令太祖輕騎為前鋒䇿顯夀怯愞聞諸軍將至必當東走恐其逺遁乃倍道兼行顯夀果已東走追至華山擒之太昌元年關西大行臺賀拔岳以太祖為左丞領岳府司馬加散騎常侍事無巨細皆委决焉齊神武既破爾朱遂專朝政太祖請徃觀之既至并州齊神武問岳軍事太祖占對雄辨齊神武以為非常人欲留之太祖詭陳忠欵乃得反命遂星夜就道齊神武果遣追之至關不及太祖還謂岳曰髙歡非人臣也逆謀所以未發者憚公兄弟耳然凢欲立大功正社稷未有不因地勢總英雄而能克成者也侯莫陳悅本實庸材遭逄際㑹遂叨任委既無憂國之心亦不為髙歡所忌但為之備圖之不難今費也投控弦之騎不下一萬夏州刺史觧拔彌俄定勝兵之士三千餘人及靈州刺史曹泥竝恃其僻逺嘗懐異望河西流民紇豆陵伊利等户口富實未奉朝命今若移軍近隴扼其要害示之以威懐之以徳即収其士馬以實吾軍西輯𤣥羗北撫沙塞還軍長安正輔魏室此桓文舉也岳大悅復遣太祖詣關請事密陳其狀魏帝深納之加太祖武衛將軍還令報岳遂引軍西次平凉謀於其衆曰夏州隣接冦賊須加綏撫安得良刺史以鎭之衆皆曰宇文左丞即其人也岳曰左丞吾之左右手也如何可去沉吟累日乃從衆議於是表太祖為使持節衛將軍夏州刺史太祖至州伊利望風欵附而曹泥猶通使於齊神武魏永熈三年春正月岳欲討曹泥遣都督趙貴至夏州與太祖計事太祖曰曹泥孤城阻逺未足為憂侯莫陳悅怙衆密邇貪而無信必将為患願早圖之岳不聼遂與悅俱討泥二月至于河曲岳果為悅所害其士衆散還平凉唯大都督趙貴率部曲収岳屍還營三軍未有所屬諸將以都督冦雒年最長相與推雒以總兵事雒素無雄畧威令不行乃謂諸將曰雒智能本闕不宜統御近者廹於羣議權相攝領今請避位更擇賢才於是趙貴言於衆曰元帥忠公盡節暴於朝野勲業未就奄罹凶酷豈唯國䘮良宰固亦衆無所依必欲糺合同盟復讐雪恥須擇賢者摠統諸軍舉非其人則大事難集雖欲立忠建義其可得乎竊觀宇文夏州英姿不世雄謨冠時逺邇歸心士卒用命加以法令齊肅賞罰嚴明真足恃也今若告䘮必來赴難因而奉之即大事集矣諸將皆稱善乃命赫連馳至夏州告太祖曰侯莫陳悅不顧盟誓棄恩背徳賊害忠良羣情憤惋控告無所公昔居管轄恩信著聞今無小無大咸願推奉衆之思公引日成歳願勿稽留以慰衆望也太祖將赴之夏州吏民咸泣請曰聞悅今在永雒去平涼不逺若已有賀拔公之衆則圖之實難願且停留以觀其變太祖曰悅既害元帥自應乘勢直據平凉而反趦趄屯兵永雒吾知其無能為也且難得易失者時也不俟終日者機也今不早赴將恐衆心自離都督彌妲元進規欲應悅宻圖太祖事發斬之太祖乃發輕騎馳赴平涼時齊神武遣長史侯景招引岳衆太祖至安定遇之謂景曰賀拔公雖死宇文泰尚存卿何為也景失色對曰我猶箭耳随人所射安能自裁景於此即還太祖至平凉哭岳甚慟將士且悲且喜曰宇文公至無所憂矣于時魏孝武帝將圖髙歡聞岳被害遣武衛將軍元毗宣㫖慰勞追岳軍還雒陽毗到平涼㑹諸將已推太祖侯莫陳悅亦被勅追還悅既附髙歡不肯應召太祖謂諸將曰侯莫陳悅枉害忠良復不應詔命此國之大賊豈可容之乃命諸軍戒嚴將以討悅及元毗還太祖表於魏帝曰臣前以故關西大都督臣岳竭誠奉國横罹非命三軍䘮氣朝野痛惜都督冦雒等􅋦寃茹慽志雪讐恥以臣昔同幕府苦賜要結臣便以今月十四日輕來赴軍當發之時已有别表既為衆情所逼權掌兵事詔召岳軍人入京此乃為國良䇿但髙歡之衆已至河東侯莫陳悅猶在永雒在此軍士多是關西之人皆戀鄉邑不願東下今逼以上命悉令赴闕悅躡其後歡邀其前首尾受敵其勢危矣臣殞身王事誠所甘心恐敗國殄人所損更大乞少停緩更思後圖徐事誘導漸就東引太祖志在討悅而未測朝㫖且兵未集假此為詞因與元毗及諸將刑牲盟誓同奬王室魏帝詔太祖曰賀拔岳既殞士衆未有所歸卿可為大都督即相統領知欲漸就東下良不可言今亦徵侯莫陳悅士馬入京若其不來朕當親自致罰宜體此意不過淹㽞太祖表曰侯莫陳悅違天逆理酷害良臣自以專戮罪重不恭詔命阻兵永雒强梁秦隴臣以大宥既班忍抑私憾頻問悅及都督可朱渾元等歸闕早晚而悅竝維縶使人不敢反報觀其指趣勢必别圖臣正為此未敢自拔兼順衆情乞少停緩太祖乃與悅書責之曰頃者正光之末天下沸騰塵飛河朔霧塞荆沔故將軍賀拔公攘袂勃起志寜㝢縣援戈南指拯皇靈於已墜擁旌西邁濟百姓於淪胥西顧無憂繄公是頼勲伐茂隆遂征關右此乃行路所知不藉一二談也君實名微行薄本無逺量故將軍行遷喬之志篤彚征之理乃申啓朝廷薦君為隴右行臺朝議以君功名闕然未之許也遂頻煩請謁至於再三天子難違上將便於聽許是亦遐邇共知不復煩之翰墨縱使木石為心猶當知感况在生靈安能無愧加以王室多故髙氏專權主上虗心寄隆晉鄭君復與故將軍同受密㫖屢結盟約期於畢力共戡時難而貌恭心狼妬勝嫉賢口血未乾匕首已發恊黨固賊共危本朝孤恩負誓有靦面目豈不上畏於天下慙於地吾以弱才猥當藩牧䝉朝廷拔擢之恩故荷將軍國士之遇聞問之日魂守驚馳便陳啓天朝蹔來奔赴衆情所推遂當戎重比有勅㫖召吾還闕亦有别詔命君入朝雖操行無聞而年齒已宿今日進退唯君是視君若督率所部自山隴東邁吾亦摠勒師徒北道還闕共追亷藺之迹同慕冦賈之風如其首䑕兩端不時奉詔專戮違㫖國有常刑枕戈坐甲指日相見幸圖利害無貽噬臍悅既知太祖謀已詐爲詔書與秦州刺史万俟普撥令與悅為黨援普撥疑之封詔以呈太祖太祖表之曰臣自奉詔總平凉之師責重憂深不遑啓處訓兵秣馬唯思竭力前以人戀本土侯莫陳悅窺窬進退量度且宜住此今若召悅授以境内官臣列斾東轅匪朝伊夕朝廷若以悅堪為邊扞乞處以𤓰涼一藩不然則終致猜虞於事無益初原州刺史史歸為岳所親任河曲之變反為悅守悅遣其黨王伯和成次安將兵二千人助歸鎭原州太祖遣都督侯莫陳崇率輕騎一千襲歸擒之并獲次安伯和等送於平涼太祖表崇行原州事万俟普撥又遣其將北千保雒領二千騎來從軍三月太祖進軍至原州衆軍悉集諭以討悅之意士卒莫不懐憤太祖乃表曰臣聞誓死酬恩覆宗報主人倫所急赴蹈如歸自大都督臣岳殁後臣頻奉詔還闕秣馬戒途志不俟旦直以督將已下咸稱賀拔公視我如子今讐恥未報亦何面目以處世間若得一雪寃酷萬死無恨且悅外附强臣内違朝㫖臣今上思逐惡之志下遂節士之心兾仗天威為國除害小違大順實在兹辰克定之後伏待斧鉞四月引兵上隴留兄子遵為都督鎭原州太祖軍令嚴肅秋毫無犯百姓大悅識者知其有成軍出木峽關大雨雪平地二尺太祖知悅怯而多猜乃倍道兼行出其不意悅果疑其左右有異志者左右亦不自安衆遂離貳聞大軍且至退保畧陽留一萬餘人據守永雒太祖至永雒命圍之城降太祖即率輕騎數百趨畧陽以臨悅軍悅大懼乃召其部將議之皆曰此鋒不可當勸悅退保上邽以避之時南秦州刺史李弼亦在悅軍乃間道遣使請為内應其夜悅出軍中自驚潰將卒或相率來降太祖縱兵奮擊大破之虜獲萬餘人馬八千匹悅與其子弟及麾下數十騎遁走太祖曰悅本與曹泥應接不過走向靈州乃令原州都督遵邀其前都督賀拔頴等追其後遵至牽屯山追及悅斬之太祖入上邽悅府庫財物山積皆以賞士卒毫釐無所取左右竊一銀鏤甕以歸太祖知而罪之即剖賜將士衆大悅時髙歡已有異志故魏帝深仗太祖乃徵二千騎鎭東雍州助為聲援仍令太祖引軍而東太祖遣大都督梁禦率歩騎五千鎭河渭合口為圖河東之計遂入雍州魏帝進太祖侍中驃騎大將軍開府儀同三司關西大都督畧陽縣公尋授尚書僕射關西大行臺時魏帝方圖齊神武太祖乃傳檄方鎭曰盖隂陽逓用盛衰相襲苟當百六無問三五皇家創厯陶鑄蒼生保安四海仁育萬物運距季末屯沴屢起隴冀騷動燕河狼顧雖靈命重起蕩定有期而乘釁之徒因生羽翼賊臣髙歡器識庸下出自輿皁罕聞禮義直以一介鷹犬効力戎行靦冒恩私遂階榮寵不能竭誠盡節專挟姦回乃勸爾朱榮行兹簒逆及榮以專政伏誅世隆以凶黨外叛歡苦相敦勉令取京師又勸吐萬兒復與弑虐暫立建明以令天下假推普㤗欲竊威權並歸廢斥俱見酷害於是稱兵河北假討爾朱復通表奏云取讒賊既行廢黜遂將簒弑以人望未改恐鼎鑊交及乃求宗室權允人心天方與魏必將有主翊戴聖明誠非歡力而歡阻兵安忍自以為功廣布腹心跨州連郡端揆禁闥莫非親黨皆行貪虐窫窳生人而舊將名臣正人直士横生瘡痏動挂網羅故武衛將軍伊琳清貞剛毅禁旅攸屬直閣將軍鮮于康仁忠亮驍傑爪牙斯在歡收而戮之曽無聞奏司空髙乾是其黨與毎相影响謀危社稷但以姦志未從恐先洩漏乃宻白朝廷使殺髙乾方哭對其弟稱天子横戮孫騰任祥歡之心膂竝使入居樞近伺國間隙知歡逆謀將發相繼逃歸歡益加撫待亦無匡白然歡入雒之始本有姦謀令親人蔡雋作牧河濟厚相恩贍以為東道主人故關西大都督清水公賀拔岳勲徳隆重興亡攸寄歡好亂樂祸深相忌毒乃與侯莫陳悅隂圖䧟害幕府已受律專征便即討戮歡知狀已露稍懐旅拒遂遣蔡雋拒伐令竇泰佐之又遣侯景等云向白馬輔世珍等徑趣石濟髙隆之疋婁昭等屯據壺關韓軌之徒擁衆蒲坂於是上書天子數論得失訾毁乘輿威侮朝廷藉此㣲庸兾兹大寳谿壑可盈祸心不測或言徑赴荆楚開疆於外或言分詣伊雒取彼讒人或言欲來入關與幕府决戰今聖明御運天下清夷百寮師師四隩來曁人盡忠良誰為傾側而歡威福自己生是亂階緝搆南箕指鹿為馬包藏凶逆伺我神噐是而可忍孰不可忍幕府折衝宇宙親當受脤銳師百萬彀騎千羣裹糧坐甲唯敵是俟義之所在糜軀匪恡况頻有詔書班告天下稱歡逆亂徵兵致伐今便分命將帥應機進討或趣其要害或襲其窟宅電繞蛇擊霧合星羅而歡違負天地毒被人鬼乘此掃蕩易同俯拾歡若渡河稍逼宗廟則分命諸將直取并州幕府躬自東轅電赴伊雒若固其巢穴未敢發動亦命羣帥百道俱前轘裂賊臣以謝天下其州鎭郡縣率土黎人或州鄉冠冕或勲庸世濟竝宜捨逆歸順立効軍門封賞之科已有别格凡百君子可不勉歟七月魏帝從雒陽率輕騎入關太祖備儀衛奉迎謁見東陽驛乃奉命都長安披草萊立朝廷軍國之政咸取太祖决焉仍加授大將軍雍州刺史兼尚書令進封郡公尚馮翊長公主拜駙馬都尉閠十二月魏孝武帝大漸太祖與羣公定䇿尊立南陽王寳炬為嗣是為文帝大統元年進都督中外諸軍録尚書事封安定郡王太祖固譲改封郡公三年正月東魏冦龍門屯軍蒲坂造三道浮橋度河又遣其將竇㤗趣潼關太祖縱兵擊破之盡俘其衆斬㤗首髙歡撤橋而遁是年八月丁丑太祖率李弼獨孤信梁禦趙貴于謹若于惠怡峰劉亮王徳侯莫陳崇李逺逹奚武等十二將至潼關太祖乃誓於師曰與爾有衆奉天威誅暴亂惟爾衆士整爾甲兵戒爾戎事無貪財以輕敵無暴民以作威用命則有賞不用命則有戮爾衆士其勉之于謹狥地至盤豆降東魏將髙叔禮及戍卒一千戊子至𢎞農于時連雨太祖乃率諸軍冒雨攻之庚戌城潰斬陜州刺史李徽伯虜其戰士八千擒將髙干竝送長安於是宜陽邵郡皆來歸附十月壬辰破髙歡於沙苑斬六千餘級降者二萬餘人歡夜遁追至河上復大克獲前後虜其卒七萬留其甲士二萬餘悉縱歸收其輜重兵甲獻俘長安還軍渭南於是所徵諸州兵始至乃於戰所令當時兵士人種桞一株以旌武功魏帝進太祖柱國大將軍四年七月東魏遣其將侯景庫狄干髙敖曹韓軌可朱渾元莫多婁貸文等圍獨孤信於雒州八月庚寅太祖至糓城莫多婁貸文可朱渾元來逆臨陣斬貸文元單騎遁免悉虜其衆遂進軍瀍東景等北據河橋南屬邙山為陣與諸軍合戰斬髙敖曹及其儀同李猛西兖州刺史宋顯等虜其甲士萬五千赴河死者萬數六年春侯景出三鵶將侵荆州太祖遣開府李弼獨孤信各率騎五千出武關景乃退還夏茹度河至夏州太祖召諸軍屯沙苑以備之八年冬髙歡侵汾絳圍玉璧九年春度河據邙山十二年春侯景侵襄州九月髙歡圍玉璧太祖皆破走之十三年正月歡卒子澄嗣與侯景有隙景舉河南十六州東附七月景叛歸于梁十四年正月進授太祖太師十五年六月梁竟陵郡守孫暠舉郡來附時侯景圍建業司州刺史桞仲禮帥兵赴援及景克建業仲禮還司州率衆來冦暠以郡叛十一月太祖遣開府楊忠率兵與行臺僕射長孫儉討之攻克隨郡忠進圍仲禮長史馬岫於安陸十六年正月擒仲禮悉擄其衆馬岫以城降十七年三月魏文帝終太子嗣位太祖以冢宰摠百揆十月太祖遣大將王雄出子午伐上津魏興大將軍逹奚武出散關伐南鄭明年去年號稱元年是年春王熊平上津魏興以其地置東梁州夏四月逹奚武圍南鄭月餘梁州刺史宜農侯蕭循以州降武執循還長安二年三月遣大將軍魏安公尉遲逈率衆伐梁武陵王蕭紀於蜀夏四月太祖勒銳騎三萬西踰隴度金城河至姑臧吐谷渾震懼遣使獻其方物五月蕭紀潼州刺史楊乾運以州降引逈軍向成都七月太祖自姑臧至于長安八月克成都劔南平三年春魏帝有怨言太祖與公卿定議廢帝尊立齊王廓是為恭帝元年七月梁元帝遣使請舊圖以定疆界又連結於齊言辭悖慢太祖曰古人有言天之所棄誰能興之其蕭繹之謂乎十月壬戌遣柱國于謹中山公䕶大将軍楊忠韋孝寛等歩騎五萬討之十一月癸未師濟於漢中山公䕶與楊忠率鋭騎先屯其城下據江津以備其逸丙申謹至江陵列營圍守辛亥進攻城其日克之擒梁元帝殺之并虜其百官及士民以歸没為奴婢者十萬餘其免者二百餘家立蕭詧為主居江陵為魏附庸三年正月行周禮建六官以太祖為太師九月太祖有疾十月乙亥大漸殂于雲陽宮十二月閔帝受魏禪追尊為文王廟曰太祖武成元年追尊為文皇帝閔帝太祖第三子魏恭帝三年三月命為安定公世子四月拜大將軍十月嗣位大冢宰十二月魏帝以岐陽之地封帝為周公遂受魏禪册府元龜卷六
