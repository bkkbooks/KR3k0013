body:
  text: 册府元龜卷五百十三宋王欽若等撰憲官部公忠引薦褒賞公忠士君子䇿名委質有死無貳公忠之義諒在兹矣乃有典司邦憲表式朝右厲氷霜之志執金石之心正色不回讜言無隐竭誠於顛越之際獻規於疑貳之始或明辨其飛語或申雪其寃訟以至逢危殞命抱義立節千古之下莫不仰其清風而思見其人者也後漢种暠順帝時為侍御史監䕶太子承光宫中常侍高梵受勅迎太子不齎詔書以衣車載太子欲出太子傅高褒不知所以力不能止開門臨去暠至横劍當車曰御史受詔監䕶太子太子國之儲副人命所繫常侍來無一尺詔書安知非挾奸邪今日之事有死而已梵不敢争楊衆以謁者僕射從獻帝入闗累遷御史中丞及帝東遷夜走度河衆率諸官屬歩從至太陽拜侍中太陽縣屬河東郡建安二年追前功封蓩亭侯晉劉暾為司𨽻校尉時惠帝立羊𤣥之女為皇后成都王以討𤣥之為名廢后為庻人處金墉城大駕幸長安留臺復后位永興初河間王顒矯詔遣尚書田淑勅留臺賜后死詔書累至暾與尚書僕射荀藩河南尹周馥馳上奏曰奉被手詔伏讀惶悴臣按古今書籍亡國破家毁䘮宗祊皆由犯衆違人之所致也陛下遷幸舊京廓然衆庶悠悠罔所依倚家有跂踵之心人想鑾輿之聲思望大徳釋兵歸農而兵纒不解處處互起豈非善者不至人情猜隔故邪今上官已犯闕稱兵焚燒宫省百姓諠駭宜鎮之以静而大使卒至赫然執藥當詣金墉内外震動謂非聖意羊庶人門户殘破廢放空宫門禁峻宻若絶天地無縁得與姦人搆亂衆無愚智皆謂不然刑書猥至罪不值辜人心一憤易致興動夫殺一人而天下喜恱者宗廟社禝之福也今殺一枯窮之人而令天下傷慘臣懼兇豎承間妄生變故臣忝司京輦觀察衆心實已深憂宜當含忍不勝所見謹宻啓聞願陛下更深與太宰叅詳勿令逺近疑惑取謗天下顒見表大怒乃遣陳顔吕郎東收暾暾奔青州后遂得免帝還洛迎后復位初羊后反宫遣使謝暾曰頼劉司𨽻忠誠之志得有今日唐蘇珦垂拱初為監察御史則天使珦按韓魯諸王獄珦奏據狀無徴則天召見詰問珦執奏不回則天不恱曰卿大雅之士當即有驅使此獄不假卿也遂令珦於河西監軍神龍中珦為右御史大夫㑹節愍太子敗詔珦窮其黨與時睿宗在洛為得罪者所引珦因辨析事狀宻奏以保明之中宗意解因是多所原免擢珦為户部尚書蕭志忠為御史中丞中宗神龍三年自節愍太子舉兵誅武三思之後安樂公主及兵部尚書宗楚客兄弟侍御史冉祖雍紀處訥共誣構安國相王及鎮國太平公主主與太子連謀舉兵請收制獄因此欲加㓙忍帝召志忠令鞫其狀志忠泣而奏曰陛下富有四海貴為天子豈不能容一弟一妹忍受人羅織竊念宗社存亡實在於此臣雖至愚竊為陛下不取漢書曰一尺布尚可縫一斗粟尚可舂兄弟二人不相容願陛下詳察此言初則天皇后欲立相王相王累日不食請迎陛下固讓之誠天下傅說足明冉祖雍所奏咸是搆虚帝既與相王公主素相友愛深納志忠之言志忠自此又彌加保䕶由是公主獲安盧奕為御史中丞留臺東都天寳十四載安禄山犯東都與留守李憕誓無避死人吏奔散奕在臺獨居為賊所執與憕同見害趙㳙永㤗初為監察御史時禁中失火焚屋室數十間火發處與東宫稍近代宗深疑之㳙為廵使俾令即訊㳙周歴壖囿按據迹狀乃上直中官遺火所致也推鞫明審頗盡事情既奏代宗稱賞焉徳宗時在東官常感㳙之䆒理詳細及剌衢州年考既深又與觀察使韓滉不相得滉奏免㳙官徳宗見其名謂宰相曰豈非永㤗初御史趙㳙乎對曰然即日拜尚書左丞齊映興元初為御史中丞從徳宗幸梁州每遇險映常執轡㑹帝馬驚跳奔甚帝懼傷映令捨轡映堅執乆之乃止帝問故對曰馬奔踶不過傷臣如捨之或犯清塵雖臣萬死何以塞責帝嘉歎無已孔緯為太子少傅時沙陁逼京師昭宗幸鳯翔邠帥朱玫引兵來迎駕田令孜挾帝幸山南時中夜出幸百官不及扈從而隨駕者黄門衛士數百人而已帝駐寳鷄候館詔授緯御史大夫時遣中使傳詔令緯率百寮赴行在時京師急變從駕官屬至􅉦厔上張流切下音窒並為亂兵所剽匹妙切資裝殆盡緯承令見宰相論事蕭遘以田令孜在帝左右音心不欲行辭疾不見緯緯遣臺吏促百官上路皆以袍笏不具為辭緯無如之何乃召三院御史謂之曰吾輩世荷國恩身居憲秩雖六騑音飛奔廹而咫尺天顔累詔追徴皆無承禀非臣子之義凡布衣交舊緩急猶相救䘏况在君親䇿名委質安可背耶言竟泣下三院曰人豈不懷但􅉦厔剽剝之餘丐食不給今若首塗聊營一日之費俟信宿繼行可也緯拂衣而起曰吾妻危疾旦不保夕丈夫豈以妻子之故忽君父之急耶公輩善自為謨吾行决矣即日見李昌符告曰主上再有詔命令促百寮前進觀羣公之意未有發期僕忝憲闈不宜居後道塗多梗明公幸假五十騎送至陳倉昌符嘉之謂緯曰路無頓逓裹糧辦耶乃送錢五十緡令騎士援緯達散闗緯知朱玫必蓄異志奏曰闗城小邑不足以駐六師請速幸梁州翌日車駕離陳倉纔入闗而邠岐之兵圍寳鷄攻散闗㣲緯之言幾危矣引薦詩曰蒸我髦士盖美其得賢傳曰舉爾所知誠廣其薦善况夫總司彛憲糾正庶工固宜念則哲之明先舉類之義審擇儒雅博衍雋良薦於朝廷縻以組綬其或忠讜之士邪佞所仇文致厥辜淪䧟非辟而能表薦其行請宥其刑皆所以為國愛材進人以道劉楚之詩斯作沉僚之歎罔興豈止致位於台槐受寵於龜紫固可以紀其勞懿為南司之表式焉漢張湯為御史大夫尹齊以刀筆吏稍遷至御史事湯湯數稱薦以為亷武帝使督盗賊又以倪寛為掾舉侍御史擢大中大夫蕭望之為御史大夫除薛廣徳為屬數與論議器之薦廣徳經行宜充本朝為博士論石渠繁延壽為御史大夫即李延壽也一姓繁音蒲河切聞谷永有茂材除補屬舉為太常丞貢禹為御史大夫琅邪諸葛豐以明經為郡文學名特立剛直禹除為屬舉侍御史後漢杜林為侍御史林先與鄭興同寓隴右乃薦之曰竊見河南鄭興執義堅固敦恱詩書好古博物見疑不惑有公孫僑觀射父之徳宜侍帷幄典職機宻昔張仲在周燕翼宣王而詩人恱喜惟陛下留聽少察以助萬分乃徴為太中大夫樊凖為御史中丞時龎參坐法輸作若盧凖上䟽薦參曰臣聞鷙鳥累百不如一鶚昔孝文皇帝悟馮唐之言而赦魏尚之罪使為邉守匈奴不敢南向夫以一臣之身折方面之難者選用得也臣伏見故左校令河南龎參勇謀不測卓爾竒偉高才武略有魏尚之風前坐㣲法輸作經時今羌戎為患大軍西屯臣以為如參之人宜在行伍惟明詔採前世之舉觀魏尚之功免赦參刑以為軍鋒必有成效宣助國威鄧太后納其言即擢參於徒中召拜謁者使西督三輔諸軍屯應奉為司𨽻校尉時河南尹李膺奏按羊元羣贓罪元羣賂宦豎膺反坐輸作左校初膺與廷尉馮緄大司農劉祐等共同心志糾罰奸倖緄祐時亦得罪輸作奉上䟽理膺等曰昔秦人觀寳於楚昭奚恤莅以羣賢梁恵王瑋其炤乗之珠齊威王答以四臣夫忠賢武將國之心膂切見左校施刑徒前廷尉馮緄大司農劉祐河南尹李膺等執法不撓誅舉邪臣糾之以法衆庻稱宜季孫行父親逆君命逐出莒僕於舜之功二十之一今膺等投身彊禦畢力致罪陛下既不聼察而猥受譛訴遂令忠臣同愆元惡自春迄冬不蒙降恕遐邇觀聽為之歎息夫立政之要紀功忘失是以武帝捨安國於徒中宣帝徵張敞於亡命緄前討蠻荆均吉甫之功祐數臨督司有不吐茹之節膺著威幽并遺愛度遼今三垂蠢動王旅未振易稱雷雨作解君子以赦過宥罪乞原膺等以備不虞書奏乃悉免其刑後魏元匡為御史中尉高選御史高道穆奏記於匡匡大喜曰吾久知其人適欲召之遂引為御史又以内行長山偉兼侍御史入臺五日便遇正㑹偉司神武門其妻從叔為羽林隊主撾直長於殿門偉即劾奏匡善之俄然奏正帖國子助教李彪為御史中尉以尚書主客郎酈道元秉法清勤引為治書侍郎高道穆為御史中尉選用御史皆當世名輩李希宗李繪陽休之陽斐封君義邢子明蘇淑宋世良等三十人北齊崔暹東魏孝静武定初遷御史中尉選畢義雲盧潜宋欽道李愔崔瞻杜蕤嵇曄麗伯偉崔子武李廣皆為御史世稱其知人唐張循憲為侍御史長安中為河東採訪使薦蒲州人張嘉貞材堪憲官請以己秋官授之則天召見垂簾與之言嘉貞奏曰以臣草萊得入謁九重是千載一遇也咫尺之間如隔雲霧竟不覩日月恐君臣之道有所未盡則天遽令卷簾與語大悅擢拜監察御史張廷珪為監察御史李邕少知名長安初廷珪薦邕詞高行直堪為諫諍之官由是召拜左拾遺李栖筠為御史大夫時河中少尹嚴郢召至京師元載言郢於代宗帝已踈忌載拒而不納是時帝委腹心於栖筠亦嘗薦延之帝曰郢方為元載所厚寧可信乎栖筠曰如郢材力陛下不自採㧞豈使為姦人用乎即日擢授河南尹兼御史中丞水陸運使崔寧為御史大夫寧以為選擇御史當出大夫不謀及宰相乃奏請以李衡于結等數人為御史楊炎大怒其狀遂寢常貞伯為御史中丞徳宗貞元初袁滋為鄂岳從事部有邑長下吏誣以盗金滋察其寃竟出之貞伯聞之薦為侍御史高郢為御史大夫時右拾遺翰林學士李建罷職降詹事府司直郢表授殿中侍御史裴度為御史中丞奏崔從為侍御史知雜及度作相又奏從自代為中丞從所取御史必先知其重貞退者時論嘉之李夷簡為御史中丞櫟陽尉徐晦本楊慿所薦及慿得罪貶官臨賀縣尉親交無敢祖送獨晦至藍田與慿言别時故相權徳輿與慿交分最深知晦之行因謂晦曰今日送臨賀誠為厚矣無乃反為累乎晦曰自布衣沐楊公之知不一送他日相公為姦邪所譛焉可不送相公乎徳輿大慙因稱之於人不數日夷簡請為監察晦至官之日白夷簡曰晦不由公門公何所取信而見奬㧞於千萬人中哉答曰君送楊臨賀寧肯負國乎由是名益振韋有翼為御史中丞奏職方員外郎鄭處誨兼侍御史知權制曰御史中丞有翼上言曰御史府其屬三十八例以中臺郎一人稽叅其事以重風憲如處誨族親胄貴能愽文論義理無不講求朝廷典章飽於聞見乞為副貳以佐紀綱以爾處誨當居内廷草具宻㫖自以疾去于今惜之俞其言如我得有翼為爾之知己予為有翼之徳鄰上下交舉豈有私受勉修職業所報非一後唐蕭頃為御史中丞請孔邈為御史褒賞夫處風憲之地當糾繩之任綱紀所屬委頼尤重而能方嚴以自律勁直而不撓彈擊違繆無所畏避摧伏豪横未甞寛假侃侃而正色蹇蹇而匪躬善守厥官不懈于位繇是摧懋賞之典和異數之寵申之以賜予賁之以來章形於詔奬接以體貎敦勸以聳其氣慰勉以成其名故首公之臣立志之士莫不感激以思自効摩厲以期稱職然後知信賞之為勸非可以忽已漢諸葛豐元帝時為司𨽻校尉刺舉無所避帝嘉其節加豐秩光禄大夫後漢宣秉字巨公為侍中建武元年拜御史中丞上特詔御史中丞與司𨽻校尉尚書令㑹同並専席而坐故京師號曰三獨坐秉遷司𨽻校尉秉性節約常服布被蔬食瓦器帝常幸其府舍見而歎曰楚國二龔不如雲陽宣巨公即賜布帛帳帷什物杜詩建武初為侍御史安集洛陽時將軍蕭廣放縱兵士暴横民間百姓遑擾詩勅曉不改遂格殺廣還以狀聞世祖召見賜以棨㦸鮑永建武十一年為司𨽻校尉以事劾帝叔父趙王良大不敬朝廷肅然乃辟扶風鮑恢為都官從事恢抗直不避彊禦帝常曰貴戚且宜歛手以避二鮑鮑昱永子中元元年昱拜司𨽻校尉詔昱詣尚書使封胡降檄若今之露布也光武遣小黄門問昱有所怪不對曰臣聞故事通官文書不著姓又當司徒露布漢官儀曰群臣上書公卿校尉諸將不言姓凡制書皆璽封尚書令重封唯赦贖令司徒印露布州郡也怪使司𨽻下書而著姓也帝報曰吾故欲令天下知忠臣之子復為司𨽻也馬嚴拜御史中丞賜冠幘衣服車馬晉李憙武帝時為司𨽻校尉劾中山王睦等各占官三更稻田詔曰易稱王臣蹇蹇匪躬之故今憙亢志在公當官而行可謂邦之司直者矣光武有云貴戚且斂手以避二鮑豈其然乎其申劾羣寮各慎所司寛宥之恩不可數遇也憙為二代司𨽻朝野稱之傅咸以議郎長兼司𨽻校尉咸前後固辭辭㫖懇切武帝不聽勅使者逼就拜咸復送還印綬公車不通催使攝職咸以身無兄弟䘮祭無主重自陳乞遂不見聽於官舍設靈坐朔望奉祭元康四年卒官時詔贈司𨽻校尉朝服一具衣一襲錢二十萬謚曰貞劉暾為左丞兼御史中丞奏免尚書僕射東安公繇等十餘人朝廷嘉之遂即真熊逺為御史中丞中宗每歎其公忠謂遠曰卿在朝正色不茹柔吐剛忠亮至勁可謂王臣宋孔琳之為御史中丞劾奏徐羡之自是百僚震肅莫敢犯禁高祖甚嘉之行經蘭臺親加臨幸蕭惠開為御史中丞百僚畏憚之入為侍中孝武詔曰惠開前任憲司奉法直繩不阿權戚朕甚嘉之可更授御史中丞梁江淹在齊為御史中丞多所奏劾内外肅然明帝謂淹曰宋世以來不復有嚴明中丞君今日可謂近世獨步張緬為御史中丞居憲司推繩無所顧望號為勁直高祖乃遣畵工圖其形於臺省以厲當官陳袁憲為御史中丞領羽林監常陪讌承香閣賔退之後宣帝留憲與衞尉樊俊徙席山亭談宴終日帝目憲而謂俊曰袁家故為有人其見重如此後魏李彪為御史中尉多所劾糾豪右屛氣高祖常呼彪為李生於是從容謂羣臣曰吾之有李生猶漢之有汲黯高道恱為治書侍御史正色當官不憚强禦奏舉任城王澄等免官高祖詔褒美之元匡為御史中尉嚴於彈糾始彈于忠次彈高聰等免官靈太后並不許以違其糾惡之心又慮其辭解欲奬安之進號安南將軍高恭之字道穆為御史中尉莊帝娣壽陽公主行犯清路執赤捧卒呵之不止道穆令卒捧破其車公主泣以訴帝帝謂主曰高中尉清直之人彼所行者公事豈可以私恨責之耶道穆後見帝帝曰一日家娣行路相犯極以為愧道穆免冠謝帝曰朕以愧卿卿反謝朕北齊崔暹仕魏為御史中尉神武如京師羣官迎於紫陌神武帝握暹手而勞之曰往前朝廷豈無法官而天下貪婪莫肯糾劾中尉盡心為國不避豪彊遂使遠近肅清羣公奉法衝鋒䧟陣代有其人當官正色今始見之今榮華富貴直是中尉自取高歡父子無以相報賜暹良馬使騎之以從且行且語暹下拜馬驚走神武為擁之而綬轡魏帝宴於華林園謂神武曰自頃朝貴牧守令長所在百司多有貪暴侵削下人朝廷之中有用心公平直言彈劾不避親戚者王可勸酒神武降堦跪而言曰唯御史中尉崔暹一人謹奉明㫖敢以酒勸并臣所射賜物千段乞回賜之帝曰崔中尉為法導俗齊整暹謝曰此自陛下風化所加大將軍臣澄澄神武長子文襄也勸奬之力文襄退謂暹曰我尚畏羨何况餘人神武將還晉陽又以所乘馬加綵物賜暹由是威名日盛内外莫不畏服隋柳彧開皇中為治書侍御史當朝正色甚為百僚之所敬憚文帝嘉其悻直謂彧曰大丈夫當立名於世無容恱而已賜錢十萬米百石後以忤㫖免未幾復令視事因謂彧曰無改爾心以其家貧勅有司為之築宅因曰柳彧正直士國之寶也其見重如此游元大業中為侍御史遼東之役宇文述等九軍敗元案獄數其罪仍以狀劾之帝嘉其公正賜朝服一襲唐杜淹為御史大夫太宗幸其第視疾張行成為殿中侍御史糾劾不避權戚太宗以為能謂房𤣥齡曰觀古今用人必因媒介若行成者朕自舉之無先容也崔隱甫開元中為御史大夫羣寮側息𤣥宗嘗謂曰卿為大夫深副朕所委李勉至德初從至靈武拜監察御史劾勲臣管崇嗣失禮肅宗特原之歎曰吾有李勉始知朝廷尊矣盧坦為御史中丞元和三年舉奏前山南西道節度使柳晟前浙東觀察使閻濟美違勅貢獻肅宗召坦對褒慰乆之裴度為御史中丞時吳元濟盜兵柄求襲父任憲宗徴師伐叛詔度巡營壘勞士卒度計其險易宻陳攻取之䇿帝深然之遷刑部侍郎兼御史中丞王播為御史中丞入閣候宰相出方隨之異常例也後唐許光義明宗天成四年除御史中丞光義謝賜絹五十疋銀器一事劉贊為御史中丞長興二年十二月詔曰國祚中興皇綱再整合頒公事偏委羣臣先勅抄録六典法書分為二百四十卷從朝至夕自夏徂冬御史臺官員等或同切催驅或逓專勘讀校前王之舊制布當代之明規宜有奬酬以勵勤恪御史中丞劉贊近別除官今加偕爵宜從别勅處分吕琦姚遐致宜加朝散大夫仍賜柱國勲于遼李壽並朝散大夫徐禹卿張可復王曉並賜緋魚袋册府元龜卷五百十三
