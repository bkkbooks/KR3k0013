body:
  text: 册府元龜卷十宋王欽若等撰帝王部繼統第二晉惠帝武帝第二子泰始三年立為皇太子時年九歳太熈元年四月己酉即皇帝位懷帝武帝第二十五子惠帝永興元年十二月丁亥立為皇太弟光熈元年十一月庚午惠帝晏駕羊皇后以為太弟於嫂不得為太后催清河王覃入已至尚書閣侍中華混等急召太弟癸酉即皇帝位愍帝武帝孫呉孝王晏之子出繼伯父柬襲封為秦王永嘉二年拜散騎常侍撫軍将軍及雒陽傾覆避難於滎陽宻縣與舅荀藩荀組相遇自宻南趨許潁豫州刺史閻鼎與前撫軍長史王毗司徒長史劉疇中書郎李昕及荀組等同謀奉帝歸于長安而疇等中塗復叛鼎追殺之藩組僅而獲免鼎遂挾帝乗牛車自宛趨武闗頻遇山賊士卒亡散次于藍田鼎吿雍州刺史賈疋疋遽遣州兵迎衛達於長安又使輔國将軍梁綜取守之時有玉龜出㶚水神馬鳴城南焉六年九月辛巳奉秦王為皇太子登壇告類建宗廟社稷大赦明年四月丙午奉懷帝凶問舉哀成禮壬辰即皇帝位大赦改元建興明帝元帝長子太興元年立為皇太子永昌元年閏十一月庚寅即皇帝位成帝明帝長子太寧三年戊辰立為皇太子閏八月己丒即皇帝位康帝成帝母弟咸和元年封呉王二年徙封瑯琊王咸康五年遷侍中司徒八年六月庚寅成帝不諱詔以瑯琊王為嗣甲午即皇帝位穆帝康帝子建元二年九月丙申立為皇太子己亥太子即皇帝位時年三歳皇太后攝政升平元年帝加元服正月告于太廟始親萬機皇太后居崇徳宫哀帝成帝長子咸康八年封為瑯琊王永和三年除驃騎將軍五年五月丁巳穆帝晏駕皇太后令曰帝奄不救厥疾繼嗣未建瑯琊王丕中興正統明徳懋親昔在咸康屬當儲貳以年在幼冲未堪國難故顯宗髙讓今義望情地莫與為比其以王奉大統於是百官備法駕迎于瑯琊第庚申即皇帝位十月詔曰顯宗成皇帝顧命以時事多艱𢎞髙世之風樹徳博重以隆社稷而國故不已康穆早世裔祚不融朕以寡徳復承先緒感惟永慕悲痛兼摧夫昭穆之義固宜本之天屬繼體承基古今常道宜上嗣顯宗以修本統帝於穆帝為從父昆弟穆帝舅褚歆有表中書答表朝廷無其義詔下議尚書僕射江虨等四人云閔僖兄弟也為父子則帝應為穆帝嗣衛軍王術等二十五人云成帝不私親愛越授天倫康帝受顯宗社稷之重已移所授纂承之序宜繼康皇尚書謝奉等六人云繼體之正宜本天屬考之人情宜繼顯宗時多異議尚書左丞孔嚴與丹陽尹庾龢議曰順本居正親親不可奪宜繼成皇帝諸儒咸以嚴議為長竟從之海西公哀帝之母弟也咸康八年封為東海王升平五年改封瑯琊王隆和初轉侍中驃騎大將軍開府儀同三司興寧三年二月丙申哀帝晏駕無嗣丁酉皇太后詔曰帝遂不救厥疾艱禍仍臻遺緒冺然哀慟切心瑯琊王奕明徳茂親屬當儲嗣宜奉祖宗纂承天統便速正大禮以寧人神於是百官奉迎於瑯琊第是日即皇帝位簡文帝元帝之少子永昌元年封瑯琊王咸和元年徙封㑹稽王太和元年海西公廢皇太后詔曰丞相録尚書㑹稽王體自中宗明徳邵令英秀𤣥虛神棲事外以具瞻允塞故阿衡三世道化宣流人望攸歸為日已久宜從天人之心以統皇極主者明依舊典以時施行於是大司馬桓温率百官進太極前殿具乗輿法駕奉迎帝於㑹稽邸於朝堂變服着平巾幘單衣東向拜受璽綬咸安元年冬十一月己酉即皇帝位桓温出次中堂分兵屯衛孝武帝簡文第三子興寧三年七月封㑹稽王咸安二年七月己未立為皇太子是日即皇帝位皇太后臨朝太元元年正月壬寅朔帝加元服見于太廟皇太后歸政甲辰大赦改元丙午帝始臨朝安帝孝武長子太元十二年八月辛巳立為皇太子二十一年九月庚申孝武晏駕辛巳太子即皇帝位大赦癸亥以司徒㑹稽王道子為太傅攝政恭帝安帝母弟初封瑯琊王為大司馬義熈十四年十二月相國宋公劉裕矯稱安帝遺詔曰惟我有晉誕膺明命業隆九有光宅四海朕以不徳屬當多艱幸賴宰輔拯厥傾覆仍恃保佑克黜禍亂遂冕旒宸極混一六合方憑阿衡惟新洪業而搆疾大漸将遂弗興仰惟靈命親賢是荷咨爾大司馬瑯琊王體自先皇明徳光懋屬惟儲貳衆望攸集其君臨晉邦奉係宗祀允執其中爕和天下闡揚末誥無廢我髙祖之景命是日即帝位後魏太宗明元帝道武長子道武事具帝王創業門初封齊王母劉貴人賜死帝日夜號泣道武怒之帝懼乃逰行逃于外天賜六年十月清河王紹作逆帝入誅紹壬辰即皇帝位世祖太武帝明元長子㤗常七年封泰平王監國八年十月壬申即皇帝位髙宗文成帝太武之孫恭宗景穆帝長子太武愛之常置左右號世嫡皇孫正平二年十月戊申即皇帝位於永安前殿顯祖獻文帝文成長子太安二年二月立為皇太子和平六年五月甲辰即皇帝位髙祖孝文帝獻文太子初獻文雅薄時務嘗有遺世之心欲禪位於叔父京兆王子推任城王雲太尉源賀固諫之東陽公丕等進言曰皇太子雖聖徳夙彰然實冲幼陛下富於春秋始覧機政普天景仰率土徯心欲隆獨善不以萬物為心其若宗廟何其若億兆何曰儲宫正統受終文祖羣公相之有何不可皇興五年八月册命太子曰昔堯舜之禪天下也皆繇其子不肖若丹朱啇均能負荷者豈搜揚仄陋而授之哉爾雖幼冲有君人之表必能恢隆王道以濟兆民今使太保建安王陸馥太尉源賀持節奉皇帝璽綬致位於爾躬其踐昇帝位克廣洪業以光祖宗之休烈使朕優㳺履道頥神養性可不善歟丁未詔曰朕纂承洪業運屬太平淮岱率從四海清晏是以希心𤣥古志存澹泊躬覧萬務則損頥神之和一日或曠政有淹滯之失但子有天下歸尊於父父有天下傳之于子今稽協靈運考㑹羣心爰授儲宫踐昇大位朕方優㳺恭已棲心浩然社稷乂安克廣其業不亦善乎百官有司其祗奉嗣子以答天休宣布宇内咸使聞悉於是羣公奏曰昔三皇之世澹泊無事故稱皇是以漢髙祖既稱皇帝尊其父為太上皇明不統天下今皇帝幼冲萬機大政猶宜陛下總之謹上尊號太上皇帝乃從之己酉太上皇帝徙御崇光宫采椽不斵土階而已國之大事咸以聞是月丙午太子即皇帝位於太華前殿世宗宣帝孝文第二子太和二十三年四月丁巳自皇太子即皇帝位于魯陽先是三月庚子孝文疾甚車駕北次榖塘原甲辰詔賜皇后馮氏死詔司徒彭城王勰徵太子於魯陽踐祚詔以侍中䕶軍將軍北海王詳為司空公鎮南将軍王肅為尚書令鎮南大将軍廣陽王嘉為尚書左僕射尚書宋弁為吏部尚書與侍中太尉公僖尚書右僕射任城王等六人輔政顧命宰輔曰粤太尉司空尚書令左右僕射吏部尚書惟我太祖丕丕之業與四象齊茂累聖重明屬鴻歴於寡昧兢兢業業思纂乃聖之遺跡遷都嵩極定鼎河瀍庶蕩甌呉復理萬國以仰光七廟俯濟蒼生天奪其年不果乃志公卿其善毗繼子隆我魏室不亦善歟可不勉之帝即位居諒闇委政宰輔景明二年正月始親政引見羣臣於太極前殿吿以覧政之意肅宗孝明帝宣武第二子延昌元年十月乙亥立為皇太子四年正月丁巳夜即皇帝位敬宗孝荘帝彭城王勰之第三子孝昌二年封長樂王武泰元年二月孝明晏駕大都督爾朱榮以兵向京師四月戍戌立為皇帝前廢帝諡曰簡閔廣陵惠王羽之子正始中襲爵正光中元乂擅權帝托以瘖病及荘帝晏駕爾朱世隆等上表勸進王答曰自量𦕈身是以執讓然王公勤至不可拒違今敬承所陳唯愧弗堪負荷耳太尉公爾朱度津奉璽綬衮冕之服及就輅車百官侍衛入自建春雲龍門昇太極前殿羣臣拜賀禮畢遂登閶闔門改元肆赦後廢帝章武王融第二子初建明二年為渤海太守及齊獻武王髙歡起義兵將誅暴逆乃推戴之十月壬寅即皇帝位於信都城西昇壇焚燎大赦稱中興元年西魏武帝亦曰出帝孝文帝孫廣平武穆懷王第三子普泰元年加侍中尚書右僕射中興二年四月後廢帝自以疎逺未允四海之心請遜大位大丞相渤海王髙歡與百僚㑹議僉謂髙祖不可無後乃共奉王戊子即皇帝位於東郭之外文帝孝文帝孫京兆王愉之子永熈二年閏十二月帝自南陽王為周太祖所立廢帝文帝長子大統元年正月立為皇太子十七年三月太子即皇帝位恭帝文帝第四子大統十四年封為齊王廢帝三年正月為周太祖所立三年禪於周後周世宗明帝太祖長子初封寧都郡公為岐州刺史孝閔帝元年九月晉公䕶廢立遣使迎帝於岐州九月癸亥至京師止于舊邸甲子羣臣上表勸進備法駕奉迎帝固讓羣臣固請是日即天王位乙丒朝羣臣於延夀殿武成元年正月己酉太師晉公䕶上表歸政帝始親覧萬機軍旅之事䕶猶總焉髙祖武帝太祖第四子明帝即位初為蒲州刺史武成元年入為大司空二年四月明帝遺詔傳位帝固讓百官勸進乃從之壬寅即皇帝位宣帝髙祖長子建徳元年立為皇太子宣政元年六月丁酉髙祖晏駕戊戌太子即皇帝位静帝宣帝長子大象元年正月封魯王是月立為皇太子二月宣帝詔曰有聖大寳實惟重器𤣥天表命人事與能幽顯同謀確乎不易域中之大寳懸定於杳㝠天下為公盖不避於内舉我大周感蒼昊之精受河雒之錫武功文徳光格區宇創業垂統永惟無窮朕以寡薄祗承洪緒上頼先朝得一之迹下藉羣后不貳之心職貢與雲雨俱通憲章共光華並旦圓首方足咸登仁夀興隆國本用𢎞天歴皇太子地居上嗣正統所歸逺惟積徳之休允叶無疆之祚帝王之量未肅而成天禄之期不謀已至朕今傳位於衍乃睠四海深合謳歌之望俾予一人髙蹈風塵之表萬方兆庶知朕意焉隋煬帝髙帝第二子髙帝事迹具帝王創業門開皇八年立為皇太子仁夀四年七月即皇帝位於仁夀宫恭帝元徳太子之子大業三年封陳王又徙為代王十三年十月唐髙祖義兵入長安尊煬帝為太上皇帝奉帝纂業壬戌即皇帝位於大興殿尋禪於唐唐太宗文皇帝髙祖第二子髙祖事迹具帝王創業門武徳元年封秦王九年六月癸亥立為太子軍機兵仗倉糧凡厥庶政事無大小悉委皇太子斷決然後聞奏是月壬申髙祖手詔司空裴寂等曰朕當加尊號為太上皇有司擇日宜速聞奏八月癸亥髙祖詔曰乾道統天文明於是馭歴大寳曰位宸極所以居尊在昔勛華不昌厥緒揖遜之禮旁求歴試三代以降天下為家繼體承基裔嗣相襲故能孝饗宗廟卜世長逺貽慶後昆克隆鼎祚朕膺期受命握圖闡極大拯横流載寧區夏然而昧旦丕顯日昃坐朝馭朽兢懷履氷在念憂勤庶政九載于兹今英華已竭耄期倦勤久懷物表髙蹈風雲釋累遺塵有同脫屣深求閒逸用保休和皇太子世民久叶祥符夙彰竒表天縱神武智韞機深自雲雷締搆覇業伊始義旗之舉首創成規京邑克平莫非其力乃皇極已建天步猶艱内發謀猷外清氛祲英圖冠世妙算窮神伐暴除凶無思不服薛舉負西戎之衆武周引北狄之兵禍起蜂飛假名竊號元戎所指折首傾巢王世充藉府庫之資憑山河之固信臣精卒承間守險建徳因之同惡相濟金鼓纔震一縱兩擒師不踰時戎衣大定夷劉闥於趙魏覆徐朗於譙兖功格穹蒼徳孚宇宙雄才宏畧振古莫儔造我大唐繄其是頼既而居中作相任隆列辟百揆時總三階以平地屬元良實惟固本萬邦咸正兆庶樂推晷律呈象休徵允集華夏載佇謳頌知歸今傳皇帝位於世民所司備禮以時册授公卿百官四方岳牧及長吏下至士民宜悉祗奉以稱朕意夫政惟通變禮貴從宜利在因民義存適要條章法度不便於時者隨時改易勿有疑滯昔漢祖撥亂身定大功羣臣推奉光宅帝位而事父資敬五日一朝備禮尊崇號稱太上朕方㳺心恬淡安神𤣥黙無為拱揖憲章往古稱謂之儀一准漢代庶宗社之固申錫無疆天禄之期永安勿替布告天下咸使知聞太宗冲讓不敢奉詔翌日朝于西宫面奏請曰堯舜雖有至徳有禪授之事然親覧庶政並經百年陛下以至聖之徳撫有四海始將十載臣望陛下遵堯舜之道以百姓為心髙祖曰吾思此事已熟懷之已久故欲怡神以養生不欲矯情以從物惟恐性不能盡歡娱身不能恣逸樂目不能觀五色耳不能聽五音口不能極膏腴鼻不能嗅芬馥今傳授得所業泰身安此是怡神以養生㑹吾之宿志若乃飾仁義務知能勞神以施號令疲形以行賞罰此是矯情以從物非吾心之所取也夫善治外者不傷性善治内者不累身吾方以道攝生養性故脫屣於汝豈可嬰吾以負重哉太宗稽首固請髙祖曰夫為人子務自勞身致其親於安樂吾老矣傳汝以萬機若不從是非孝也太宗弗敢辭於是遣兼太尉司空魏國公裴寂賜策曰夫天生蒸民樹以司牧三靈輔徳百姓與能粤自夏殷傳業裔祚􅁤物長世率繇兹道朕祗膺靈命肇開寳歴聲教所覃無思不服然而萬機填委九區輻湊明發不寐考極觀書聽政勞神經謀損慮深思閒曠釋兹重負咨爾聰明神武徳實天生君人之量爰備夙夜王業初基雷雲伊始英謀獨斷祕策潛深及擴定闗隴澄清河雒北通𤣥塞東静青丘宏圖遐舉元功克茂氛霧廓清鯨鯢斯盡澤霑方外聲暢無垠總統機衡百工以乂敷𢎞徳化四門允穆謳歌所屬宇内宅心象緯告徵靈命斯在朕是用上稽蒼昊俯順黔黎推而弗居永垂顯號致皇帝位於爾躬今命司空上柱國魏國公寂尚書左僕射上柱國宋國公瑀齎璽綬爾其纂承洪緒對揚休命式隆寳祚以康四海太宗固讓詔不許之甲子太宗即位于東宫顯徳殿遣兼太尉司空裴寂柴燎告天於南郊曰皇帝臣某敢以𤣥牡昭告皇皇后帝太上皇厭居宸極凝情姑射倦此萬機釋兹重負人神不可以乏主天序不可以無統歴數有歸猥當寡薄神器有奉用集大命懼忝帝位固辭弗克遂膺大禮臨馭兆民敬簡元日告類上帝即皇帝位惟神敷祐萬邦永綏天極貞觀三年四月髙祖以𢎞義宫有山林勝地乃徙居焉改名大安宫詔曰書云知人則哲唯帝難之易曰通其變使民不倦故太伯端委周室以隆東海就國漢基方永立權致治不其然乎朕世襲緇衣家傳鼎業佐魏及周勤勞王室有隋御歴地居戚里嘗以補天在慮納揆為心大業道喪皇極如燬傾維折柱天下分離塗炭納隍黔黎殆盡顧兹九有鋒鏑縱横静念持扶計無所出世民幼懷大度性合天道韞經緯之竒文包湯武之𢎞畧深謀秘䇿沃朕救溺之心壮思雄圖起朕救焚之志因其感激許以經綸糾合義師投袂而起車次於平陽之郊劍及於孟津之㑹元戎所指氷消霧捲曾未浹旬廓清京邑定非常之業建不世之功三古以來未之聞也朱旗西指則仁杲喪元白羽東臨則世充泥首摧武周如拉朽収建徳若拾遺至若黒闥逋誅圓朗小醜三㨗七擒不可勝計一人之力冠今超古暴之遐邇豈待昌言往以建成嫡長兾其養徳日就不謂匿怨友于忌能毁善䜛言屢發殆至鑠金頼天啟朕心宗社降福密悟凶邪指麾殱殄朕媿受浸潤深念元功乃敬授帝圖先天傳政懼其溢滿驕上未稱三靈之心縱慾肆情不恤萬方之重朕故仍居紫極處之肅成察其復禮觀其齊政露往霜來四載於兹矣比聞思我王度克難克艱昧旦丕顯去奢去泰朝夕視膳蒸蒸之性日嚴昃景憂民翼翼之情日慎南越稽首北狄欵闗四海晏然五兵偃戢招君璋之衆只用尺書屠師都之城無􅃜寸刃公卿輯睦逺邇乂安金鼓絶於疆塲心鏡懸於億兆盡善盡美吾無間然匪天祐之孰能至此令月吉辰風調雨順朕俯觀人事仰鍳穹旻當養性别宫使其正位居極宜令有司具禮務在周備朕得脫屣髙蹈擬迹於軒轅授歴傳璽爰属於啟誦大寳既固卜年惟永付託有所何樂如之百辟卿士等或晉陽從我同披荆棘或秦邸故吏早預腹心並以徳舉言揚進忠顯孝保乂社稷天平地成唯當帶礪山河與國休戚可悉心輔弼無黨無偏罔或隳哉替爾丕績善事元首稱朕意焉太宗奉表陳讓曰臣聞至敬無文至誠不飾地居臣子不以小忠撓志情兼家國不以細行嬰心臣䝉奬厲擢居天策戰必以死實深愍於黎庶奮不顧命願無忝於宗社規摹指麾皆禀聖算人心神誘遂得成功安敢貪天自稱已力前以聖人大寳濫鍾愚懦臣謂肅成理務禮通監撫日慎一日不敢推辭今奉兹詔更垂奨予以四海乂安褰裳紫極歸尊軒轅天下幸甚令臣自當啟誦不覺厚顔頃者隂陽尚愆嘉榖未稔政治有􅉻刑典不措恐𦕈身多罪以及萬方伏願天慈仍安太極待民知堯力玉燭順序網開湯祝金科削編然後降輦西宫於事非晩付臣宣室亦敢當仁臣志在忘私冒陳丹欵髙祖手詔曰君之於臣尚須探察父之審子豈可同常汝夙懷忠孝吾愛汝亦過於諸子况立功徳具如前詔所恨吾受䜛言幾至投杼上𤣥降福神器安寧此乃宗廟有靈非獨吾之幸也比察汝布政聽汝徳音洋洋盈耳副吾所望昔齊有粃政而致小白晉有艱難而獲重耳今天下慶頼在汝一人頃者寒暑不調水旱乖節止是吾之與汝安處未得其位乃致承乾所居非少陽之體吾今往西宫方思萬代之福汝何勞撝抑頻此言請且深思大道永保社稷善始令終無或懈怠奉行吾詔勿以小讓為懷至公之言彼宫此室勢何殊也異姓賢者尚欲權之今汝已克負荷應兹當璧極慰吾意宜絶常辭也太宗不敢忤意乃止乙亥太上皇居於大安宫太宗親侍轝輦百僚陪從置酒髙㑹極歡而罷甲午太宗正位於太極殿髙宗天皇大帝太宗第九子貞觀五年封晉王十七年立為皇太子二十三年春太宗不豫詔太子於金液門聽政四月從幸翠㣲宫五月己巳太宗晏駕庚午發自翠㣲宫至京六月甲戌太子即皇帝位中宗孝和皇帝髙宗第七子母曰天后武氏二歳封周王儀鳳二年徙封英王永隆元年立為皇太子𢎞道元年十二月太子即位天后臨朝明年正月甲申朔改元嗣聖元年二月戊午天后廢帝為廬陵郡王五月遷於均州尋徙居房陵聖歴元年召赴上都皇嗣即睿宗也讓位于帝遂立為皇太子神龍元年正月甲戌天后傳位於太子乙亥即皇帝位於通天宫之端扆殿睿宗大聖真皇帝中宗母弟龍朔二年封殷王乾封元年改豫王總章二年徙冀王上元三年改相王嗣聖元年皇太后武氏廢中宗為廬陵王文明元年二月立為皇帝太后臨朝天授元年降為皇嗣聖歴元年讓位於中宗復降為相王景龍四年六月少帝即位年十六韋庶人專政庚子帝第三子臨淄王隆基率朝邑縣尉劉幽求長上折衝麻嗣宗内苑總監鍾紹京等討捕韋氏并其黨與誅之辛丒奉少主御安福門樓大赦天下癸卯王公卿士咸以王室多故義擇長君以帝衆望所歸固請即尊位是日少帝讓于叔父甲辰帝自兩儀殿出於太極殿少帝於殿東隅次幕内西面帝於梓宫側東向太平公主曰少帝欲以此位讓叔父合否幽求跪曰少帝仁孝追蹤舜禹大王恩慈倍過之矣今家國事重有此推讓誠為至公也是日少帝制曰自古帝王必有符命兄弟相及存諸典禮朕以孤藐遭家多難顧兹䝉識不曉政途茫茫四海將何所屬累聖丕業若墜於地王室多故義擇長君思與羣公推崇明聖叔父相王髙宗之子昔以天下讓于先帝孝友寛簡彰信兆人神龍之初已有明㫖將立太弟以為嗣君因王懇辭未行册命所以東宫曠位于今歴年綴衣在辰禍變倉卒後掖稱制計立冲人欽奉前懷願遵理命上申平昔之文仰復祖宗之烈起今日請叔父相王即皇帝位朕退守舊藩歸于外邸凡百卿士敬承朕意贊我天人之休期光我有唐之洪業帝固讓有制不許是日即皇帝位大赦天下於是降少帝為温王丙午帝縞服於太極東廊引羣公卿士謂曰朕與蒼生有幸且得社稷安寧自大行晏駕韋氏篡逆元惡大憝並從誅翦嗣皇年幼未曉政途推讓朕躬事非獲已今與卿等相見不勝悲感甲戌命温王重茂於内宅安厝明年正月以温王重茂為襄王食巴集等州實封二千户於集州安置册府元龜卷十
