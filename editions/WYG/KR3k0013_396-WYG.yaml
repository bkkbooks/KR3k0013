body:
  text: 册府元龜卷三百九十六宋王欽若等撰將帥部勇敢第三唐張瑾初仕隋世歴職顯貴煬帝被圍于鴈門也瑾以驍果出城擊戰一日九捷煬帝登城望之大悦賜帛二千叚拜翊衛大將軍田留安性驍武善戰隋末以校尉從通守張湏陀討捕山賊以膽氣知名秦叔寳初為隋將來䕶兒帳内及盗起從通守張湏陀擊盧明月於下邳賊連營十餘萬湏陀所部纔萬人力勢不敵去賊六十里立柵相持經十餘日糧盡將退謂將士曰賊見兵却必輕來追我其兵若出營内即虚以千人襲營可大利此誠危險誰能去者人皆莫對惟叔寶與羅士信皆曰願行于是須陀委而遁使二人分領千兵濳伏草莽既而明月悉兵追之叔寳士信馳至其柵柵門閉不得入二人超昇其樓拔幟各殺數人營中亂叔寳斬闗以納外兵因大縱火焚其三十餘柵煙焰漲天明月奔還湏陀却逐之大破賊衆後降高祖高祖令事秦府拜馬軍總管從擊王世充每為先鋒拒竇建德於武牢也叔寳以精騎十數陷其陣焉太宗每臨陣望賊中驍將鋭士炫燿人馬出入來去者意頗怒之輙命叔寳徃取焉叔寳應命躍馬負鎗而進必刺之萬衆之中人馬俱倒太宗因以是重之叔寳亦以此頗自矜尚貞觀以後常多疾出血每血出數升謂人曰吾少長戎馬所經二百餘陣屢中重鎗計吾前後出血亦數斛何能不病者乎叚志𤣥隋大業末隨父在太原因蒙太祖引接義兵起志𤣥召募得千餘人授軍頭從屯霍邑隋將宋老生率萬餘人拒戰志𤣥從太宗擊殺二千餘人老生大敗又從劉文靜捍屈突通於潼闗文靜為通歩將桑顯和所襲軍營已潰志𤣥率二十騎往攻殺數十人而還為流矢所中忍而不言又將兩騎更入賊陣入而復出者再三顯和軍亂大軍因此復振擊大破之前後以軍功累遷左光禄大夫封武安郡公後從討王世充深入陷陣馬倒為賊所擒兩騎挾持其髻志𤣥踴身而奮二人俱堕馬于是奪其馬仗馳歸追者數百騎不敢逼王世充平轉右二䕶軍王君廓為右領軍高祖謂侍臣曰吾聞相如叱秦皇目皆出血君廓徃擊竇建德出陣徐勣遏之君廓奮發大呼目及鼻耳一時流血此之壯氣何謝古人闞稜武德中為越州都督容貎魁岸勇而多力每臨陣手持大刀長一丈一舉輙死數人前無當者梁禮為上郡太守行軍副總管拒梁師都頻有戰功稱為勇敢尉遲敬德初為秦府統軍從獵於榆窠王世充出歩騎數萬來戰賊將單雄信恃其驍悍領騎直入以趨太宗敬德乃躍馬大呼横刺雄信中之賊徒稍却敬德翼太宗以出圍從擊竇建德於板渚太宗與之挑戰乃先伏李勣程知節秦叔寳等諸軍太宗持弓矢令敬德執矟造建德壘下大呼致師建德營中大擾出兵數千騎太宗逡廵漸却敬德為殿引賊以入伏中於是李勣等縱兵奮擊大破其後王世充兄子偽代王琬使於建德軍中乘隋主所御駿馬鎧甲鮮華出於軍前太宗眄之曰彼之所乘真良馬也敬德曰請徃取之因與高甑生梁建方兩三騎直入賊軍擒琬引其頸持其肘以歸賊衆無敢當者程知節少驍勇善用馬矟為秦府左三統軍破宋金剛擒竇建德降王世充并領左一馬軍總管每陳先登以功封宿國公李君羡武安人也少以勇氣聞太宗在藩引為左右從破宋金剛于介休單騎先入無敢當其鋒者又從破竇建德於汜水加授秦王府右三統軍劉黒闥反於洺州從徃征之所至未嘗不先登陷陣丘行恭善騎射勇敢絶倫為光禄大夫從太宗討王世充㑹戰於邙山之上太宗欲知其虚實强弱乃與十騎衝之直出其後衆皆披靡莫敢當其鋒所殺傷甚衆既而限以長堤與諸將相失唯行恭獨從尋有勁騎數人追及太宗矢中御馬行恭乃廻騎射之發無不中餘賊不敢復前然後下拔箭以其所乘馬進太宗行恭于御馬前歩執長刀巨躍大呼斬數人突陣而出得入大軍貞觀中有詔刻石為人馬以象行恭拔箭之狀立於昭陵闕前牛進達初為秦王府左一軍馬總管從擊王世充率騎直攻其軍殺十萬人流矢貫目勇氣彌厲戰罷始令拔箭又吐谷渾反以進逹為鄯善行軍副總管嘗為前鋒深入歴海島經犁山窮於河源爰至雪山達於黑党項摧鋒接戰身先士卒俘馘甚衆薛萬徹為統軍李靖之擊吐谷渾也請萬徹同行及至賊境萬徹與諸將各率百餘騎先行卒與虜數千騎相遇萬徹單騎馳擊之虜無敢當者還謂諸將曰賊易與耳躍馬復進諸將隨之斬數千級人馬浴血勇冠三軍蘇定方為匡道府折衝隨李靖襲突厥頡利于磧石靖使定方率二百騎為前鋒乘霧而行去賊一里許忽然霧歇望見其牙帳馳掩薛萬均為殿中少監貞觀初柴紹之擊梁師都也以萬均為副未至朔方數十里突厥四面而至官軍稍却萬均與弟萬徹横出擊其驍勇虜陣亂因而乘之殺傷被野鼔行而進遂圍師都突厥不敢來援萬均後為屯衞大將軍侯君集之擊高昌也以萬均為副進逼交河城君集召麴智盛喩以利害城中堅守萬均怒麾軍疾進智盛懼而遂降阿史那社尒為右軍大將軍檢校北門左屯營太宗征髙麗駐驆之陣領屯衛飛騎及長上宿衞之兵奮不顧命所向無前頻遭流矢拔而又進其所部兵士人百其勇楊𢎞禮隋尚書令越公素弟之子也太宗以𢎞禮有文武才擢為兵部侍郎專典兵機之務太宗征遼𢎞禮入叅謀議出則綂衆攻戰駐蹕之陣領馬歩二十四軍出其不意以擊之所向摧破太宗自山下見𢎞禮所綂之衆人皆盡力殺獲居多甚壯之謂敬宗等曰越公兒郎故有家風矣王文度為征遼副總管至卑沙城其城四面懸絶唯西門有攻取之勢亞將程名振督軍夜襲文度先登士卒繼進城中潰散遂拔其城馬文舉為果毅都尉太宗征遼新城國内二城歩騎四萬來援遼東江夏王道宗率行軍總管張君仁騎四千逆擊之及與賊遇衆寡勢懸士皆色動文舉自指其身言于道宗曰此壯士也不逢勍冦安能識徤兒哉道宗目而壯之文舉遂䇿馬突進所當皆斃衆心始安契苾何力為左領軍將軍時太宗征遼李勣攻白巖城烏骨城遣兵萬餘為之聲援何力以勍騎八百遇而合戰何力挺身陷陣被槊中腰幾為賊害尚輦奉御薛萬鈞單馬而進殺數騎拔何力于羣賊中與之俱出力氣益奮束瘡而戰騎士齊奮賊乃退何力逐之轉鬪數十里斬首千餘級薛仁貴絳州龍門人也太宗征遼東仁貴應募從行及大軍攻安市城高麗莫離支遣將高延壽高惠真率兵一十五萬來拒戰依山結營太宗分命諸將擊之仁貴自恃驍勇欲立竒功乃易其服色著白衣握㦸腰鞬張弓大呼先入所向披靡大軍乘之賊乃大潰高宗顯慶中為右領軍郎將與梁建方契苾何力于遼東共高麗大將温沙門戰于横山仁貴匹馬先入莫不應弦而倒高麗有善射者于石城下射殺十餘人仁貴單馬直徃衝之其賊弓矢俱失手不能舉便生擒之黑齒常之為左領軍員外將軍高宗儀鳯中吐蕃入冦從河西道大總管李敬𤣥拒之總管劉審禮没于陣敬𤣥欲抽軍却阻泥溝而計無所出常之夜率敢死士五百人進砍賊營吐蕃大將跋地設軍宵遁薛訥仁貴子也為朔方軍大總管沉訥寡言臨大敵而益壯王忠嗣為左威衞將軍專治河西兵馬㑹吐蕃大下晨壓官軍衆寡不敵師人皆懼焉忠嗣乃以所部策馬而前左右馳突當者無不辟易既出復合殺數百人賊衆亂三軍翼而擊之吐蕃大敗王難得為騎將天寳元年吐蕃大冦河源難得為軍先鋒贊普有子曰瑯支都恃其趫悍乘諸真馬寳鈿鞍軍前來較鬪者難德揚鎗突徃刺殺之斬其首以馬歸虜衆無敢追者軍士以聞𤣥宗召至御殿問之因令馳突作殺瑯支都狀上大壯之衣以錦袍令引遍視都人拜左金吾衞郎將後安禄山薦一騎將曰此人不减隴右難德其有聲如此難德至德元年為試衞尉卿至鳯翔為都知兵馬兼興平軍等使嘗有禆將靳元曜當合戰墜馬呼難德難德俯馬馳救之賊射難徳中眉臉穿披下障目難德乃拔去箭并皮掣棄勇冠其軍繇是衆多附之王方翼為安西都䕶大破突厥之衆而三姓因悉發衆與車簿啜勢合以拒方翼方翼屯兵熱海與賊連戰流矢貫臂徐以佩刀截之左右莫有覺者哥舒翰年四十慨然仗劍為河西節度使王忠嗣衙使翰别將討吐蕃其後吐蕃大冦邊翰拒之于苦海吐蕃之衆三道從山相續而下翰持半段鎗當其鋒逆擊之無不摧靡又擊其次軍復走之又擊其後軍皆大破繇是知名翰常逐吐蕃馬驚墜于河立于水中吐蕃三人擬鎗方刺之翰大呌賊驚駭俱廢失鎗而走救騎至賊便解散翰有家臣曰左車年十五每隨翰出陣翰使鎗追賊及以鎗搭其肩而遏之賊驚顧翰從而刺其喉皆剔髙三五丈而墜左車輙下斬其首率以為常李嗣業初為中郎將𤣥宗天寳七年安西都知兵馬使髙仙芝奉詔總軍専征勃律選嗣業與郎將田珍為左右陌刀將于時吐蕃取十萬衆于娑勒城據山因水塹斷崖谷編木為城仙芝夜行軍渡信圖河奄至城下仙芝謂嗣業與田珍曰不午時湏破此賊嗣業引步軍持長刀上山山頭抛櫑蔽空而下嗣業獨引一旗于絶險處先登諸將因之齊上賊不虞漢軍暴至大潰填溪谷投水溺死僅十八九遂長驅至勃律城擒勃律王吐蕃公主後安禄山反嗣業自安西赴難與郭子儀僕固懷恩等常犄角為先鋒將嗣業每持大捧衝擊賊衆披靡所向無前香積之戰賊將安思忠李歸仁悉以前軍來逼我師殆亂嗣業謂子儀曰今日之事若不以身啖冦讐决戰取勝三軍之士無孑遺矣言訖乃仗長刀立于陣前觧衣袒而大呼手殺數十人陣容方駐繇是前軍之士皆執長刀如墻而進所向摧靡陜西之陣王師小却嗣業旁南山領蕃兵數百横截擊之應手奔潰安慶緒北奔因收河雒竝復與九節度同圍相州是時築堤引漳水灌城經月餘城不拔師老諸將各圖自全人無鬪志嗣業獨被堅衝突親當矢石為流矢所中數日瘡欲愈于帳下忽聞城下金鼓聲作問之知戰因大呌瘡中血出數升流注于地遂卒至今稱為驍將郝廷玉者驍勇善格鬬事太尉李光弼為帳中愛將乾元中史思明再陷雒陽光弼㧞東都之師保河陽時三城壁壘不完芻糧不支旬日賊將安大清等軍數萬四靣急攻光弼懼賊勢西犯河潼極力保孟津以掎其後晝夜嬰城血戰不解將士夷傷光弼召諸將訊之曰賊黨何面難抗或對曰西北隅最為勍敵迺急召廷玉謂之曰兇渠攻西北者難奈爾為我决勝而還辭曰廷玉所領步卒也願得騎軍五百光弼以精騎三百授之光弼法令嚴峻是日戰不利而還者不解甲斬之廷玉奮命先登流矢雨集馬傷不能軍而退光弼登堞見之駭然曰廷玉奔還吾事敗矣促令左右取廷玉首來廷玉見使者曰馬中毒箭非敗也光弼命易馬而復徑騎衝賊陣騎馳突數四俄而賊黨大敗於河壖廷玉擒賊將徐璜而還繇是賊解中潬之圍信宿走去白孝徳安西胡人驍悍有膽力肅宗乾元中事李光弼為偏禆史思明攻河陽使驍將劉龍仙率鐡騎五千臨城挑戰龍仙徤勇自恃舉右足加馬鬛上嫚罵光弼光弼登城望之顧諸將曰孰可取者僕固懷恩請行光弼曰此非大將所為歴選其次左右曰孝德可光弼乃召孝德前問曰可乎曰可光弼問所要幾何人而可乎曰獨徃則可㨗加人則不可光弼曰壯哉終問所欲對曰願備五十騎于軍前候入而繼進及請大軍鼔噪以假氣他無所用光弼撫其背而遣之孝德挾二矛䇿馬截流而渡半濟懷恩賀曰尅矣光弼曰未及何知其尅懷恩曰觀其攬轡便辟可萬全者龍仙始見其獨來甚易之足不䧏鬛稍近將動孝德揺手示之若使其不動龍仙不之測又止孝德呼曰侍中使予致辭非他也龍仙去三十歩與之言䙝罵如初孝德息馬伺便因瞋目曰賊識我乎龍仙曰誰也曰我國之大將白孝德也龍仙曰是猪狗乎孝德發聲虓噉執矛突前城上鼓噪五十騎亦繼進龍仙矢不及發還走堤上孝德逐之遂斬首提之而歸賊徒大震李重倩淮西李忠臣之禆將代宗大歴七年忠臣討李靈耀頓兵于汴州西畤田承嗣使姪悦率師來援屯于州之北數里與靈耀軍合忠臣遣重倩輕騎候夜斬賊營重倩素以勇敢稱既聞命持鎗上馬突入賊營斬賊數十人而還賊不之覺忠臣軍威因是増氣李正已初為淄青禆將驍徤有勇力寶應中衆軍討史朝義至鄭州迥紇方强暴恣横諸節度皆下之正巳時為軍候獨欲以氣吞之因共角逐衆軍聚觀約曰後者披之既逐而先正已擒其領而披之頰㢠廻紇屎液俱下衆軍呼笑虜大慙繇是不敢暴渾瑊為京畿渭北節度觀察使德宗建中四年朱泚頻驅逆黨圍逼奉天賊勤力拒討之嘗為流矢所中竟不自言忍瘡痛格戰不已王武俊為成德軍節度興元初朱滔圍貝州武俊與澤潞節度李抱真合軍于貝丘抱真為方陣武俊用竒兵朱淊空營合戰武俊不釋甲而馳之淊望風奔潰自相蹂踐死者十四五收其輜重噐甲馬牛不可勝筭馬燧為檢校左散騎常侍兼御史大夫河陽等城使時汴州大將李靈曜反詔燧與淮西節度李忠臣合軍討之靈曜選鋭兵八千號為餓狼軍燧獨引軍撃破之進至浚儀是時河陽兵冠諸軍高固少隨渾瑊從戎于朔方德宗幸奉天固嘗在瑊麾下是時賊兵已突入東壅門固引甲士亂揮長刀連斫數賊拽車塞闔一以當百賊乃退以功封渤海郡王張茂昭為義武節度使憲宗元和四年王承宗叛茂昭使長男克讓渡水刀溝南與賊合戰屢捷茂昭親披介胄當賊前鋒者數次累獻戎捷幾覆承宗㑹朝廷赦承宗詔班師李光顔為忠武軍節度元和九年討淮西吳元濟營于時曲賊衆晨壓光顔之壘而陣光顔不得出乃自毁其栅之左右出騎以圍之光顔將數騎冐堅而衝之出入者數四賊衆盡識光顔故矢集其身如蝟毛焉其子攬光顔馬鞅止其深入光顔舉刃叱退之于是人爭踴躍賊遂大潰史敬奉為朔方軍禆將矛矢在手前無彊敵甥姪及僮使近二百人毎以自隨臨陣入敵輙分其隊為四五不相知及相遇已皆有獲虜元和中西戎犯邊敬奉白節度使杜叔良請兵率三千人備一月糧深入蕃界叔良與之二千五百人敬奉既以衆行十餘日人莫知者皆謂吐蕃盡殺之矣乃由他道深入突出蕃衆之後戎人驚潰敬奉率衆大破之殺戮不可勝計敬奉形甚短小若不能勝衣至于野外馳逐能擒奔馬自執鞍勒隨鞍躍上然後羇帶矛矢在手前無彊敵劉澠為忠武軍節度李光顔帳中親將光顔討吳元濟用為前鋒蔡將有董重質者守洄曲其部下乘騾接戰號騾子軍最為勁悍官軍嘗警備之澠驍勇善射每與騾軍接戰必冐刅陷陣俘馘而還又云澠為忠武軍小校討淮西前後遇賊血戰鋒刅所傷死者數百石雄為徐州捉生兵馬使勇敢善戰氣凌三軍文宗時王智興討李同㨗雄先驅渡河前無堅戰梁冦彥卿唐天復巾太祖迎昭宗于鳯翔累與岐軍對陣時彥卿為諸道馬歩三軍排陣使常躬擐甲胄乘其所賜烏馬騁于陣前大祖目之曰真神將也昭宗還京師賜為迎鑾毅勇功臣李思安本宋人也祖父皆𨽻職于宣武軍之靜戎鎮思安㓜拳捷有膂力所為不嘗未弱冠長六尺超超然有㧞行伍取富貴意唐乾符廣明間羣盜大起思安棄州里投盗中太祖始鎮夷門自巢軍諸隊間鳥逝歸我初以為騎士思安善用槊毎從上征伐嘗飛馬出敵陣之後測其厚薄而還或敵有恃猛悍炫燿者太祖多命取之必鷹揚颷馳擒馘於萬甲之際出入自若如蹈無人中由是疊委戎事累授劇郡王景仁為淮南西北面行營招討應接使伐壽州俄而朱瑾以大軍至景仁力戰不屈嘗以數騎身先奮擊冦不敢逼乃引兵還及濟淮復自殿軍氏叔琮為後院馬軍都將時東伐徐睴多歴年所叔琮身當矢石奮不顧命朱珍徐州豐縣人太祖鎮汴兼領招討使署珍為宣武右職以總腹心從太祖以汴宋亳之師入西華破王夏寨勇冠諸軍張存敬唐中和中從太祖赴汴以其壯節頗見親䁥首為右騎都將從討巢蔡凡歴百戰多於危蹙之間顯有竒畧光啟中晉軍圍張宗奭於盟津太祖遣丁㑹葛從周存敬同徃馳救存敬引騎軍先犯虜騎諸將翼之虜騎大敗乃解河橋之圍葛從周為邢州留後時幽州劉仁恭率衆冦魏州屠其郡從周自邢臺馳入魏州燕軍突上水闗攻館陶門從周與賀德倫率五百騎出戰謂門者曰前有敵不可返顧命闔其門從周等極力死戰大敗燕人擒都將薛突厥王重師為頴州刺史唐乾寧中太祖攻濮州縱兵壞其墉濮人因屯火塞其壞壘煙焰亘空人莫敢越重師方苦金瘡卧其軍次諸將或勉之乃躍起命壯士悉取軍中氊罽投水中擲於火上重師然後率精鋭持短兵突入諸軍踵之濮州乃陷重師為劍所傷身被八九鎗丁壯荷之還營且將斃矣太祖驚惜尤甚曰雖得濮壘而失重師奈何亟命以竒藥療之彌月始愈劉知俊為軍校披甲上馬輪劍入敵勇冠諸將太祖命左右義勝兩軍𨽻之尋為左開道指揮使故當時人謂之劉開道張歸霸初為宣武軍劇職唐光啟三年夏與秦宗賢戰於萬勝翼日秦宗權遣將張晊來冦列陣於赤岡一日出騎將較勝歸覇為飛戈所中即拔馬却逸控弦一發賊洞頸而墜遂兼騎而還太祖時于高丘下瞰備見其狀面加賞激賞以金帛其所獲馬賜之又嘗被命以控弦之士五百人伏于壕内太祖綂數百騎稍逼其寨蔡人果以鋭士摩壘來追歸霸發伏兵掩殺千餘人奪馬數千匹尋奏授左散騎常侍張歸厚為太祖軍校時淮西兵力方壯太祖之師尚寡歸厚以少擊衆徃無不捷唐光啟三年春與秦宗賢戰于萬勝大破之其夏蔡將張晊以數萬衆屯于赤岡歸厚嘗與晊單騎鬪于陣晊不能支而奔師徒乘此大捷太祖大悦立署為騎軍長仍以鞍馬噐幣賜之及佐朱珍討時溥寨于豐蕭之間歸厚來徃徐壘如行坦途甚為諸將嘆服龍紀初奏遷檢校工部尚書其年冬復伐徐歸厚以偏師逕進至九里山下與徐兵遇時我之叛將陳璠在賊陣中歸厚忽見之瞋目大罵单馬直徃期于必取㑹飛矢中左目而退徐戎甚衆莫敢追之霍存為曹州刺史始朱友裕以大軍伐鄆臨其壁既而師陷圍中以急來告存領二百騎馳赴擊退之太祖喜拔為諸軍都指揮使王檀初為汴小將汴將楊彥洪破巢將尚讓李謙于尉氏門外檀在戰中摧鋒陷陣遂為太祖所知稍蒙擢用蔡將張存敢乘亂據雒陽檀與勇士數十人濳入賊柵邀其輜重存敢遁走檀初為汴小將從擊秦宗賢于鄭州西北河灘之上于太祖馬前射賊將孫安應弦而斃徐懷玉為鄜坊節度使材氣剛勇臨陣未嘗折退平生金瘡被體有戰將之名焉王彥章以驍勇見稱累歴刺史不知書行師將兵無法術能先登陷陣奮不顧身每入陣使二鐡鎗一横馬鞍一秉在手酣戰揮擊敵人避之謝彥章臨敵御衆則肅然有上將之威毎敦陣整旅左旋右抽雖風馳雨驟亦無以踰其迅速也故當時騎士為用及其遇害衆皆惜之牛存節字贊正青州博昌人也少以雄勇自負初授宣義軍小將屬蔡冦至金堤驛犯酸棗靈昌存節日與之鬪凡二十餘徃每徃必執俘而還前後斬首二千餘級獲輜畜甚衆太祖擊蔡賊于板橋赤岡酸棗門封禪寺枯河北存節皆豫其行與諸將于濮州南劉橋范縣大破鄆衆自此深為太祖奬遇後唐周德威小字陽五從武皇為内衙軍副唐光化二年三月汴將氏叔琮率衆逼太原有陳章者以虓勇知名衆謂之夜义言于叔琮曰晉人所恃者周陽五願擒之請賞以郡陳章嘗乘駿馬朱甲以自異武皇戒德威曰我聞陳夜义欲取爾求郡宜善用備之德威曰陳章大言未知鹿死誰手他日致師戒部下曰如陣上見陳夜义爾等但走德威㣲服挑戰部下偽退陳章徒馬追之德威背揮鐡鐹擊堕其馬生獲以獻由是知名天祐九年五月七日劉守光令驍將單廷珪督精甲萬人出戰德威遇于龍頭崗初廷珪謂左右曰今日擒周陽五既臨陣見德威廷珪單騎持鎗窮追德威埀及德威側身避之廷珪少退徳威奮撾擊堕其馬生獲廷珪其黨大敗斬獲三千級獲大将李山海等五十二人史儼代州鴈門人以便騎射給事於武皇為帳中親将驍果絶衆善擒生設伏望塵揣敵所向皆捷自武皇入定三輔誅黄巢每出師皆從高行珪燕人也家世勇悍與弟行周俱有武藝初仕燕為騎将驍果出諸將之右李嗣忠從武皇為左廂馬軍都將救河西與梁接戰應弦斃者甚衆而矟中其口酣戰未觧及退莊宗視其傷深加慰勉轉内衙門都歩将遼州刺史朱洪實不知何許人以武勇累歴軍校長興中為馬軍都指揮使秦王為元帥以洪實驍果尤寵待之李存孝驍勇冠絶常將騎為先鋒梁祖令張全義攻澤州李罕之告急於武皇武皇遣存孝率騎五千援之初汴人攻澤州呼罕之曰相公常恃太原輕絶大國今張相國已圍太原葛司空已入潞府旬日之内沙陀無穴自處相公何路求生耶存孝聞其言不遜選精騎五百繞汴營呼曰我沙陀無穴者候爾肉饌軍可令肥者出鬪汴将有鄧季筠者亦以驍勇聞乃引軍出戰存孝激勵部衆舞矟先登一戰敗之獲馬千匹生擒季筠於軍中是夜汴将李讜收軍而遁存孝追擊至馬牢關俘斬萬計遂退攻潞州存孝初為太祖紀綱給事帳中後鎮邢州存孝每臨大敵被重鎧槖弓坐矟僕人以二騎從陣中易騎輕捷如飛獨舞鐡撾挺身陷陣萬人辟易蓋古張遼丼寧之比也李存審事太祖為五院都知兵馬使常從討赫連鐸存審冐刃死戰血流盈袖太祖手自封瘡旦夕臨問後為藩漢副總管戰於胡栁陂晡晩之後存審引魏州銀鎗軍敗賊于山下是日周德威不利師逗撓賊鋒四集存審與其子彥饒彥圖冐刃血戰俄陷賊陣與帝軍合大破汴軍李建及為衛軍校天祐七年栢鄉之役汴將韓勍追周徳威至高邑南野河上鎮定兵扼橋道韓勍選精兵堅奪之莊宗登髙而望鎮定兵将衂謂建及曰如賊過橋則勢不可遏卿計如何建及于部下選士二百挺鎗大噪刺汴軍却之于橋下胡柳之役前軍逗撓際晩汴軍登土山建及一戰奪之莊宗欲收軍詰朝合戰建及横矟當前曰賊大将已亡乘此易擊王但登山觀臣破賊即引銀鎗効節軍大呼奮擊三軍增氣由是王師復振遷魏博内外衙都将十六年梁将賀瓌冦德勝南城圍塹既周又以艨艟戰艦斷我津渡百道攻城萬旅齊進負蒭運石填塞池塹我營将士氏延賞於城中多蓄蒭草每賊乘城束藴灌膏燔焰騰天賊焦爛於下不可勝紀莊宗馳騎而徃陣于北岸津河不通延賞告矢石將盡上積錢帛于軍門募能破賊舩者如是獻伎者數十或言能吐火焚舟或言能游水破艦或言能破呪兵刃悉試之卒無成功城中危急所争晷漏虎臣不能勇智士不能謀莊宗憂形于色建及擐甲而進曰賊帥傾巢敗死在兹一舉如我師不南則彼為得計今豈可限一衣帶水而縱敵憂君今日勝負臣當効命遂以巨索聯舟十艘選効節卒三百人持斧披鎧皷枻而行中流擊之賊樓舩三層蒙以牛皮懸板為楯如埤堄之制我舩将近流矢雨集建及率持斧者入賊艨艟間斬其竹破賊懸楯以矟刺之於上流取甕百以木夾口竹笮維之又以巨索牽制積蒭薪於上灌脂沃膏火發亘天别維巨艦中實甲士乘烟鼓譟賊斷紲而下沉溺者殆半我軍由是得渡莊宗曰周瑜得黄葢而挫曹公吾有建及卒破賊艦竒才猛将何代無之史敬思為元府都督從入闗破黄孽定三輔平陳蔡衛常為騎将挺身酣戰勇冠三軍當太祖上原之難敬思方大醉從者喩之蹶然而起登驛樓控絃射賊矢不虛發汴人横死樓下既而遇雨翼太祖登尉氏門敬思迷墜擁門故陷賊太祖還營流涕乆之史建瑭為前鋒時梁太祖攻蓨縣建塘以三百騎雜蒭牧者突賊營梁人燒營而遁李嗣昭為昭義節度汴將李思安將兵攻潞州嗣昭嘗享諸將登城張樂賊矢中足嗣昭密拔毁之坐客不之覺酣飲如故以安士心夏魯竒字邦傑青州人㓜有雄傑之志初試宣武軍為軍校與主將不恊遂歸於我莊宗以為䕶衛指揮使從周德威攻幽州燕将有單廷珪元行欽時稱驍勇魯竒毎與之接戰莫不氣勢凌制每鬪不能自解将士皆釋兵而觀軍中稱賞梁将劉鄩在沔水莊宗深入致師劉鄩設伏魏縣西南河曲間葭蘆中莊宗不滿千騎汴人伏兵萬餘人大譟而起圍莊宗五六重魯竒與玉門闗烏得兒等奮命决戰俄而李存審外救至方解魯竒持鎗擕劒専衛莊宗手殺百餘人是役烏得兒被擒魯竒所傷盈膚李嗣肱為禆將時梁太祖新屠􅀥強其將賀德倫急進攻蓚縣梁祖率師五萬合勢營於蓚之西嗣肱自下博率騎二百薄晩與梁之樵芻者相雜日既晡入梁軍營門諸騎相合大譟弧矢星發虓闞馳突汴人不知所為營中大擾既瞑殿騎而退是夜梁祖燒營而遁觧蓚縣之圍安敬思少給事帳中及壯便騎射驍勇冠絶常将騎為先鋒未嘗挫敗安金全為振武軍節度使時梁孽未平兩軍對壘汴之㳺騎每出必為金全所獲故賊之偵邏者咸懼之目之為五道蓋比隂鬼將有五道之名以取人命故也金全累為刺史以老病退居太原天祐中汴将王檀率師三萬乘莊宗在鄴來襲并州時城無備兵敵軍奄至監軍張承業大恐計無所出閲諸司丁匠登陴捍禦外攻甚急金全遽出見承業曰老夫退居抱疾不任軍事然吾王家屬在此王業本根之地若一旦為敵所有大事去矣請以軍甲見授為公備冦承業即時授之金全披甲上馬召率子弟及退閒諸將得數百人夜出北門擊賊于羊馬城内梁人驚潰由是退却白奉進初為禆將時梁人圍李嗣昭於潞潞人苦之俄而莊宗嗣位率親兵赴之奉進挺身首犯賊鋒諸將繼之莊宗睹而壯焉西方鄴事莊宗為奉義指揮使每從征討咸以身先元行欽為散員都部署賜姓名紹榮莊宗好戰勇於大敵或臨陣有急兵行欽必横身解鬬翼衞之莊宗營於德勝與汴軍戰於潘張王師不利諸軍奔亂莊宗得三四騎而旋中野為汴軍數百騎攢矟攻之事將不測行欽識其幟急馳一騎至奮劒斷二矛斬一級汴軍乃解圍翼莊宗還宫流涕言曰富貴與卿共之自是寵冠諸將郭延魯天成中汴將朱守殷叛命延魯從車駕東幸至其地攻壘先登尋平守殷以功授汴州步軍都指揮使晉潘環初事梁累遷右雄威指揮使時梁人與唐莊宗對壘于河上環每豫戰先登陷敵金瘡徧體莊宗知其名及平梁令典禁軍張廷藴初仕唐武皇為小校及莊宗救上黨戰栢仁攻蒯丘下邢魏皆從之後戰莘縣胡柳陂繼為流矢所中瘡瘢盈於面首莊宗寵之統御營黄甲軍常在左右史建瑭武略出人善騎射事唐莊宗出軍攻伐多為先鋒将敵人畏之謂之史先鋒累立戰勲歴澶洛相三州刺史安友謙為供奉官晉天福五年馬全節為安州節度使㑹李金全據州叛因命全節引兵討之友謙登鋒獨戰奮不顧身所當之者無不敗潰白延遇歴典禁軍累遷至檢校司空天福中晉祖在鄴安鐡胡叛于鎮州帥衆數萬指闕而來晉祖命杜重威綂諸将以禦之時延遇不豫其行乃立告晉祖願以身先及陣于宗城延遇帥其綂屬犯之斬級數百戰既酣而劒亦折諸将由是推服晉祖聞之即命中使以寶劍良馬賜之常山平以功授檢校司徒充馬軍左廂都校相里金初爲唐莊宗親衛小校後與梁師戰于栢鄉及胡柳陂襲徳勝口攻廣邉軍擒元行欽圍幽州及慈丘柵所至先登奮武軍罕出其右萇從簡陳州人也初事唐莊宗爲小校每遇攻城召人爲梯頭從簡應募莊宗爲其武勇領帳前親衛兼歩軍都指揮使一日莊宗領大軍對陣登高而坐敵人有執大幟揚其武者莊宗指之謂左右曰猛士也從簡曰臣爲大王取之莊宗慮其不捷不許從簡退乃潛領十數人挺身而入奪幟以歸萬衆皷譟莊宗壯之而賜賚甚厚又嘗中箭而鏃入於骨使醫工出之以刃鑿骨恐其痛也良乆未能揺動從簡瞋目謂曰何不深鑿洎出之左右無不惻然從簡顔色自若其勇壯皆此類也張方進少而無頼初事唐武皇以騎射著名攻城野戰勇不顧命嘗與梁師對陣持鋭首短刀躍馬獨進務逞其志殺而不獲及兵刃毁弱則易以大鎚左右奮擊出没往返彌縫皆斷無敢當者莊宗明宗素憐其雄武復奨其戰功故累典大郡王清為奉國軍都虞侯時襄州安從進叛從高行周討之踰年不下一日清請先登諸衆繼其後㑹有内應者遂拔其城清以中重創有詔褒慰皇甫遇為滑州節度使開運三年契丹率衆圍邢州遇與安審琦慕容彥超等禦之遇使渡漳河敵前鋒大至遇引退轉鬪二十里至鄴南榆林店遇謂審琦曰彼衆我寡走無生路不如血戰遂自辰至未戰百餘合所傷甚衆遇所乘馬中鏑而死遇有紀綱杜知敏以馬授遇遇得馬復戰乆之矟解顧杜知敏已為冦獲遇謂彥超曰知敏倉皇之中以馬輟我義也安可使陷於冦中遂與彥超躍馬取知敏而還敵騎壯之俄而軍士復合遇不能解時審琦已至安陽河謂首將張從恩曰皇甫遇等未至必為敵騎所圍若不救則成擒矣從恩曰敵勢甚熾無以支吾將軍獨徃無益審琦曰成敗命也設若不濟則與之俱死假若失此二將將何靣目以見天子遂率鐡騎北渡赴之敵見塵起謂救軍并至乃引去遇彦超中數鎗得還時諸軍嘆曰此三人者真猛將也遇累官至檢校大司空同中書門下平章事石公霸以天福九年契丹入冦少帝親征公霸為先鋒指揮使遇敵數萬騎于城之北為敵所圍高行周符彥卿在城之東南方息於林下忽聞敵至駭愕督軍而進纔數千騎衆寡不敵行周遣人馳告景延廣請益師延廣遲留候帝進止既而行周等為賊圍之數重三人大譟瞋目奮擊賊衆傷死者甚多帝自御親兵援之獲免漢張鵬晉開運中為前鋒監押時契丹逼檀州鵬奮身擊敵被創而還其後累為邊城戍守士伍服其勇劉在明後唐明宗時為奉聖左廂都指揮使領和州刺史從幸汴州至榮陽聞朱守殷叛用為前鋒至汴城率先登城賊平授汴州馬歩軍都指揮使周王殷後唐天成中為靈武都指揮使張令昭據鄴叛朝廷命將討之殷冐矢石率先登城以功授邢州刺史漢祖受命從征杜仲威於鄴下㑹慕容彥超請收城殷與劉詞皆率先登梯衝力戰殷矢洞于首乆之出鏃于口以是漢祖嘉之劉詞晉天福中從杜重威敗安鐡胡于宗城乃圍鎮陽詞自登雲梯身先士卒以功加檢校司徒泌州刺史孫行友為義武軍節度留後性豪邁有膽氣在郡屢挫邊冦累上章言契丹離合臣願得勁兵三千乘襄平定幽州太祖雖未允請行壯其雄徤故以義武軍留後授之史彥超為鄭州防禦使劉崇之冦潞州也車駕親征以彥超為前鋒都指揮使高平之戰先登陷陣以功授葉州節度使册府元龜卷三百九十六
