body:
  text: 冊府元龜卷二十六宋王欽若等撰帝王部感應神助感應書曰惟徳動天又曰至諴感神是知為善者降祥好謙者受福天人相與之際交感訢合如律之命呂雲之從龍未嘗斯須而不應也故古者賢聖之君莫不通三統之要重萬靈之命思惟往古窮極至治兢兢業業㒺敢暇豫徳之盛也合於天地誠之至也通於幽明神以知來聰以知遠善行無迹有開必先則感而應之乃自然之理也乃若商湯桑林之禱大雨斯降漢武竹宮之祀神光屢燭宣帝建祖廟而白鶴集𤣥宗封㤗山而勁風止策書所紀其流實繁斯皆清衷𤣥感靈貺昭答髙明聽卑若響之應也董仲舒有言曰王者修五常之道故受天之祐而享鬼神之靈徳施於方外延及羣生也豈不韙與殷湯時大旱七年殷史卜曰當以人禱湯曰必以人禱吾請自當遂齋戒剪髮斷爪以己為牲禱於桑林之社果大雨漢文帝十六年四月以郊見渭陽五帝廟爟火舉而祠若光輝然屬天焉武帝元鼎四年親祀后土東幸汾隂男子公孫滂洋等見汾旁有光如絳帝遂立后土祠於汾隂脽上五年十一月始郊拜太一祠上有光是夜有美光及晝黄氣上屬天太史令談祠官寛舒臣欽若等曰談司馬談也寛舒姓闕等曰神靈之休祐福兆祥宜因此地光域立泰畤壇以明應明著美光及黄氣之祥帝嘗以正月上辛用事甘泉圜丘使童男女七十人俱歌昏祠至明夜嘗有神光如流星止集於祠壇天子自竹宫而望拜以竹為宫天子居中竹宮去壇三里百官侍祠者數百人皆肅然動心焉元封元年正月親登崇髙臣欽若等曰崇與嵩同御史乗屬在廟旁吏卒咸聞呼萬嵗者三四月癸卯登封泰山其夜若有光晝有白雲起封中二年夏有芝草生甘泉殿房中天子為塞河與通天若有光云為塞河及造通天臺而神光之應四年三月祠后土詔曰朕躬祭后土地祗見光集於靈壇一夜三燭幸下都宮殿上見光其赦汾隂夏陽中都死罪已下六年三月幸河東后土詔曰朕禮首山昆田出珍物或化為黄金昆田者山之下田也武帝祠首山故神為出珍物化為金祭后土神光三燭其赦汾隂殊死已下太初二年三月幸河東祠后土詔曰朕用事介山祭后土皆有光應介山在河東皮氏縣東南其山周大十里髙三十里其赦汾隂安邑殊死已下太始三年二月幸琅邪禮日成山祭日於成山也登之罘浮大海山稱萬嵗四年四月幸不其不其山名其音基因以為縣在東萊祠神人於交門宮神人蓬萊仙人之屬也瑯琊縣有交門宮武帝所造若有鄉坐拜者如有神人之景象嚮坐而拜也神坐見且黑且白且大且小鄉坐三拜鄉讀曰嚮宣帝本始二年六月尊孝武廟為世宗告祠廟日有白鶴集後庭以立世宗廟告祠孝昭寢有鴈五色集殿前西阿築世宗廟神光興於殿旁有鳥如白鶴前赤後青神光又興於房中如燭狀廣川國世宗廟殿上有鐘音房户大開夜有光殿上盡明廼下詔赦天下神爵元年正月帝始幸甘泉郊見泰畤數有羙祥三月幸河東祠后土有神爵集詔曰朕飭躬齊精祈為百姓東濟大河天氣清淨神魚舞河幸萬歲宫神爵翔集其改元神爵四年二月詔曰脩興泰一五帝后土之祠祈為百姓􅂪祉福鸞鳳萬舉蜚覽翺翔集止於旁萬舉猶言舉以萬數也蜚覽言飛翔覽觀也齋戒之暮神光顯著薦鬯之夕神光交錯鬯香酒所以祭神或降於天或登於地或從四方來集於壇上帝嘉嚮海内承福其赦天下五鳳三年三月行幸河東祠后土詔曰朕方躬齋戒郊上帝祠后土神光竝見或興於谷燭耀齋宫十有餘刻甘露降神爵集已詔有司告祠上帝宗廟後漢明帝永平三年夏旱而大起北宮僕射鍾離意詣闕免冠上疏曰伏見陛下以天時小旱憂念元元降避正殿躬自克責而比日宻雲遂無大潤豈政有未得應天心者耶昔成湯遭旱以六事自責曰政不節邪使人疾邪宮室崇邪女謁盛邪苞苴行邪䜛夫昌邪切見北宮大作人失農時此所謂宮室崇也自古非苦宮室小狹但患人不安寜宜且罷止以應天心臣意以匹夫之才無有所能久食重禄擢備近臣比受厚賜喜懼相半不勝愚戅狂營罪當萬死帝策報詔曰湯引六事咎在一人其冠履勿謝比天降旱宻雲數㑹朕戚然慙懼思獲嘉應故分布禱請闚候風雲北祈明堂南設雩塲今又勑大匠止作諸宮減省不急庶消災譴詔因謝公卿百寮遂應時澍雨雨所以注萬物故曰澍雨和帝永元六年七月京師旱幸雒陽寺寺官舍也録囚徒舉寃獄收雒陽令下獄抵罪司𨽻校尉河陽皆左降未及還宮而澍雨皇太后紀云有囚實不殺人而被誣羸困與見鄧太后察視覽之即收雒陽令下獄時帝㓜太后臨朝魏明帝太和元年初營文昭皇后宗廟掘地得玉璽方一寸九分其文曰天子羡思慈親明帝為之改容以太牢告廟又嘗夣見后於是差次舅氏親疎髙下叙用各有差賞賜累鉅萬後魏明元泰常四年八月帝嘗於白登廟將薦熟有神異焉太廟博士許鍾上言曰臣聞聖人能享帝孝子能饗親伏惟陛下孝誠之至通於神明近嘗於太祖廟有車騎聲從北門入殷殷轞轞震動門闕執事者無不肅慄斯乃國祚永隆之兆宜告天下使咸知聖徳之深逺太武太延元年三月不雨六月使有司遍請羣神數月大雨是日有婦人持一玉印至路縣候孫家賣之孫家得印奇之求訪婦人莫知所在其文曰旱役平㓂天師曰龍文紐書云此神中三字印也文成興安二年正月遣有司詣華嶽廟立碑數十人在山上聞虛中若有聲音聲中稱萬嵗云和平五年四月帝以旱故減膳責躬是夜澍雨大降孝文泰和元年五月乙酉車駕祈雨於武州山俄而澍雨大洽二年五月京師旱辰祈皇天日月五星於北苑親自禮焉減膳避正殿祭之夕澍雨大洽三年五月丁巳帝祈雨於苑開陽門是日澍雨大洽二十年七月戊寅帝以久旱咸秩羣神自癸未不食至於乙酉是夜澍雨大洽帝以久旱不雨輟膳三旦百寮請闕引在中書省帝在崇虛樓遣舍人問曰朕知卿等至不獲相見卿何為而來平南將軍王肅對曰伏惟陛下輟膳以經三旦羣臣焦怖不敢自寜臣聞堯水湯旱自然之數須聖人以濟世不繇聖人以致灾是以國儲九年以禦九年之變臣又聞至於八月不雨然後君不舉膳昨四郊之外已蒙滂澍惟京城之内微為少澤蒸民未闕一飡陛下輟膳三日臣庶惶惶無復情地帝遣舍人答曰昔堯水湯旱頼聖人以濟民朕雖居羣黎之上道謝前王今日之旱無以救恤應待立秋尅躬自咎但此月十日已來炎熱焦酷人物同悴而連雲數日髙風蕭條雖不食數朝猶自無感朕心未至所致也肅曰臣聞聖人與凡同者五常異者神明昔姑射之神不食五榖臣嘗謂矯今見陛下始知其驗且陛下自輟膳以來若天全無應臣亦謂上天無知陛下無感一昨之前外有滂澤此有宻雲臣即謂上天有知陛下有感矣帝遣舍人答曰昨内外貴戚咸云四郊有雨朕恐此輩皆勉為之辭三復之慎必欲使信而有徵此當遣人徃行若果雨也便命太官欣然進膳豈可以近郊之内而慷慨要天乎若其無也朕之無感安用朕身以擾民庶朕志確然死而後已是夜澍雨大洽宣武景明四年旱命尚書鞫京師見囚務盡聽察帝又減膳撤懸俄而澍雨大洽孝明帝神龜二年二月詔曰農要之月時澤弗應嘉榖未納三麥枯悴徳之無感歎懼兼懐可勑内外依舊雩祈率從祀典察獄理寃掩骼埋胔冀瀛之境往罹㓂暴野死者既多白骨横道可遣專令收埋賑窮恤寡救疾存老准訪前式務令周備三月甲辰澍雨大洽後周武帝保定三年五月甲子朔避正殿寢不受朝以旱故也甲戌乃雨隋文帝開皇二年四月己酉旱上親省囚徒其日大雨唐髙祖初為唐王義寜二年三月不雨至四月乃命祈禱掩骼埋胔於是大雨武徳三年自夏不雨至於八月帝齋居稽顙四向拜遣治書侍御史孫伏伽告天地神曰某􅂪聖明祐助得為人主有何殃咎致使炕旱某若無罪使三日内雨某若有罪請殃某身無令兆民受兹饑饉應時大雨四年三月帝以旱親録囚徒俄而澍雨太宗貞觀三年三月旱庚午大赦天下癸酉雨自是赦書所至甘雨便降兆庶以為異焉六月終南等數縣蝗帝至苑中見蝗掇數枚而祝之曰民以榖為命而汝食之是害於百姓有過在予一人爾其有靈但當食我無害百姓將吞之侍臣恐致生疾遽諫止太宗曰所冀移災朕躬何疾之避遂吞之自是蝗不為災十二年正月帝朝於獻陵先是大雨雪及帝入陵院悲號哽咽百辟哀慟是時雪益甚寒風暴起有蒼雲出於山陵之上俄而流布天地晦㝠至禮畢帝出自寢宮歩過司馬北門泥行二百餘歩於是風静雲止雲氣歇滅天色開霽觀者竊議咸以為孝感所致焉五月甲寅帝以旱避正殿自去冬不雨至是令文武官五品以上各上封事極言得失勿有所隠減膳罷役分遣使人賑恤寡乏理囚徒申寃屈司空長孫無忌以旱遜位不許自是澍雨應時嵗大稔十七年六月大旱甲午避正殿減常膳丁未雨降百寮奉賀請復常膳御正殿詔從之二十三年三月自去冬亢旱至是始雨帝謂侍臣曰天生蒸民樹之人君以牧飬而移時不雨自天亢旱粟麥不成春田未闢朕憂其窘罄無忘於懷將廩給之故不令乏絶耳是日雨降髙宗永徽元年自夏不雨至七月詔在京諸司見禁囚宜竝慮過所司精加勘當速即斷決尋而降雨三年自去年九月不雨至於正月詔避正殿御東廊以聼政仍令尚食減膳至二月壬寅大雨雪乙巳復御兩儀殿南面視事麟徳元年五月丙寅以久旱遣使命禱名山大川避正殿御帳殿丹霄門外聼政凡三日而澍雨乾封二年春正月丁丑以時旱避殿親録囚徒令所司減膳其日雨降𤣥宗先天二年三月甲戌帝以旱親往龍首池祈禱有赤蛇自池而出雲霧四布應時澍雨開元十三年十一月封禪帝登㤗山至齋宫其夕隂雲慘冽勁風四起裂幕折柱寒氣切骨帝露立祈請仰天自誓曰某身有過請即降罰萬人無福亦請某為當罪應時風止天地清晏日氣和煦及升壇休氣四塞登髙奏樂有祥風自南至絲竹之聲飄若天外及禪社首五色雲見日重輪十四年六月丁未以久旱分命公卿祭山川己卯河北道及太原澤潞等州皆雨祭北嶽使李嵩上言曰臣至邢州雨降盈尺臣切問野老皆云往十二年春夏大旱六月下旬方始降雨其嵗河朔大熟粟斗五錢今年得雨雖晩猶早於前嵗百姓欣然咸有秋望臣受命之日祈雨恒山玉幣未陳明靈已應實陛下至誠𤣥感先天不違十七年十一月十六日朝於昭陵掌事者彷彿遥覩太宗立神殿前及𤣥宗入寢宫聞室中有謦咳又於寢宮門外設奠以祭陪陵功臣將相蕭瑀房𤣥齡等數十人如聞其舞蹈之聲十九年四月己丑侍中裴光庭中書令蕭暠奏曰頃以春季夏初微諐時澤雖無溥潤尚未為災臣等親承徳音憂勤萬姓䖍誠雲漢自結壇場有孚斯感不疾而速則有鶴鳥和鳴油雲沓起未崇朝而四溟飛灑不終夕而萬里滂沱生靈以之相慶草樹繇而自樂臣等幸參近侍親奉殊祥蹈躍之誠實百常品望宣付史館從之因詔曰政教不修則隂陽隔併精誠有感則風雨順時頃自暮春爰渉初夏甘澤未降農務是憂所以親結壇場用申祈禱豈神聰意達而應不逾時斯實上𤣥昭鑒之深亦是卿等燮理之効宜加勉勵以答靈心開府儀同三司尚書右丞相宋璟等奏曰近者日永南陸雲宻西郊鬰彼炎氣暫愆時雨陛下順天布徳憂人在念潔壇菲膳恤獄緩刑故得膏澤應期㑹旬而至夜良田望嵗自公而及私觀其洒液九重雜梅香而共溢含凉入水將麥氣而俱清臣等預睹休和叨承霑沐手詔曰頃自春渉夏雨未流施勤恤之心切憂農務是用寛刑宥過減膳撤懸責己祈天躬親禱祠上𤣥垂鑒甘澤應時嘉夏種之不愆佇秋成之有望爰與羣公卿士同荷休徵各勉其誠敬承天徳五月壬申京師旱帝親禱興慶池是夜大雨乙亥侍中裴光庭等曰昨二十五日伏見髙力士奉宣勑㫖親於興慶池投龍祈雨伏以何言者天卑聽以平施惟㣲者聖𤣥感而降祥用能咸孚響臻幽贊昭應聖徳羙利其至矣哉頃西郊㣲愆南畝不害逺自河陜已聞沾洽近次咸秦頗未均被而聖情遷軫憂勞日是降天歩禱神池屑然肸蠁若有從助俯祈萬福之祐仰叩三靈之心言發而旋雲朝隮神通而甘露降澍人欣華黍之盛物覩由庚之樂不疾之速書契所未聞至誠之感皇王所不載霑休之慶曲成羣物况在臣等切倍常情望宣付史舘式彰昭感之羙手詔報曰爰自今春時雨愆序切憂農務無忘寢興陜雒兩郊已聞流􅍂而咸京近縣尚未霑霈憫禾黍以疚懷仰雲漢而翹首投龍致祭親禱靈池誓移咎於薄躬庶垂祐於黎獻神道昭著鑒此䖍誠甘澤應期嘉生遂性亦是卿等同心燮理戮力謀猷上下咸和致茲休應豐年可望慶慰良深麟鳳飛翔未為瑞也七月甲戌以久旱帝親禱於興慶池翼日大雨丙子少府監馮紹正奏曰自夏以來時稍微旱昨令臣畫龍刻魚聖躬親用祈禱先天不違油雲鬰興甘澤滂降百榖豐熟萬物滋成臣忝有司實荷殊慶請宣付史舘以闡皇猷手詔報曰黍稷垂成實滋甘澤既屬久旱懷憂匪寜思拯黎元靡神不禱靈心昭鑒降此休徵覩垂穎之可觀佇大獲之為慶編之青史良有愧焉二十四年六月以久旱命河南尹李適之祭嶽瀆祈雨是日澍雨適之奏賀曰聖心纔啟靈貺濳通膏澤竝霑罔不滂霈請宣付史舘仍於濟源縣䖍備賽禮手詔報曰道貴以誠神無不應豈朕之先意亦卿之用心川嶽効靈甘霖竝洽請行賽禮深得事機宜宣付史館用依來請二十八年劍南節度使章仇兼瓊奏曰吐蕃以五月十八日安戎城斷其水路至二十一日城東湧出一泉將夜城南面又湧出一泉軍士飲之不竭侍中牛仙客中書令李林甫上表賀曰此城往縁無備權屬吐蕃天威所臨復為我有而犬戎自送其死且或執迷率彼兇徒輙敢違逼城中在昔惟水為虞雖佇之則多而汲之路斷陛下每憂無物必期靈祐聖心有屬神道𤣥通遂使拆石流泉分巖瀉液動天地而昭應與造化而同功三軍所資一朝皆足既使無渇乏之慮益勵忠勇之心剪滅冦戎從此非逺旁稽典策博考禎休以欣以躍實倍常品請宣示百寮編諸册簡帝手詔報曰城之還我乃復其初天意神心自常幽贊克濟軍旅湧出雙泉不假梅林有過疎勒編諸竹帛任卿意焉天寳四載七月蜀郡上言道士鄧紫虛投龍設醮於江潭有大蛇長一丈自潭遊出文彩五色有異常蛇其上有慶雲紛郁望編諸史冊從之十四載三月丙戌勑頃縁少雨遍於致祭旋降甘澤實荷靈祗其先令中使祭者别有昭報京兆府比來應有祈請處并畿内名山靈跡竝令府縣長官各申賽祭肅宗乾元二年正月藉田禮畢還大明宫自前年旱冬又無雪禮畢降雪盈尺代宗廣徳二年二月丁亥親拜南郊初上將饗太廟齋之夕嵗星為太白同躔辟而不犯司天臺夏官正徐承嗣上言曰木處仁君恩於養也金全義徳體其政也今月四日臣伺候屬輕濛隠映光跡暫明位指東西不盈南北勢凌宻近切慮相干陛下展禮齋宮隂騰又蔽星擬土錯不露其瑕及廟宿精誠天容若鏡今太白避歲之審二尺有餘昔熒惑守心之明三退無謬加以禋祀五帝敬告百神是憑法象呈休蒼生致福偃兵歸馬不遠來期孝理行歌起於茲景事殊古典應羙前書望付史舘兼示中外許之永泰元年七月庚子以旱故禱諸神祠是日雨降盈尺時京師米價騰貴斛至萬餘錢至是霈澤人心稍安徳宗興元元年六月戊午帝發興元是日大雨將入斜谷路嶮峭多在巖石之間議者以為行至谷中若遇向之甚雨閣道壊絶進退何從咸切憂焉及入谷之後天象霽朗曾無纎雲以至京師無風雨之虞衆情欣欣皆謂聖徳感通自天祐也貞元六年四月以旱下詔免減稅戊午澍雨踰旬逺近霑足十三年四月自春以來時雨未降正陽之月可行雩祀遂幸興慶宫龍潭為兆庶祈禱焉忽有白鸕鶿沉浮水際羣類翼從其後左右侍衛者咸驚異之俄然莫知所往方晤龍神之變化遂相率蹈舞稱慶至乙丑果大雨逺近滂沱憲宗以永貞元年八月乙巳即位於宣政殿受冊先是順宗寢疾不能言王伾王叔文為學士居翰林通於内官李忠言宣下詔令韋執誼為宰相奉而行之天下危懼連月隂雨及定策雨遂止即位之日天氣清明臣下繇是知天命之有歸矣元和二年正月辛卯有事於南郊將及大禮隂氣凝閉浹旬不開羣有司慮降雨雪以不克展禮為懼宰臣議請改日帝曰郊廟重事吾齋戒有日豈以將有雨雪而廢乎洎三大禮方享獻之際皆景物澄霽及鑾輿就次則降㣲雪大駕將動則又止焉翼日御樓宣赦纔畢隂雲復結瑞雪盈尺衆情懽悅咸以為聖心昭感所致八年二月辛未帝以久旱親祈雨於禁中是夜降霔霑足十年正月下制討呉元濟自去年無雨雪至是討元濟詔下乃雨雪文宗開成元年二月庚申帝幸龍首池觀内人賽雨自春少雨帝孜孜憂勤徧禮羣望至是甘澤屢降中外咸悅帝賦暮春喜雨詩百官咸有屬和三年正月癸未以旱下詔放逋租及寛刑獄其日大雨四年六月戊辰以久旱分命羣官徧祠祈禱帝自即位每嵗有微旱即䖍誠祈禱至是久旱帝於紫宸殿對宰臣憂形於色宰臣以星官所奏天時當爾乞無過勞聖慮帝慄然改容曰朕為天下主無徳及人致此災旱今又謫見於上若三日不雨當退歸南内更選賢明以主天下宰臣嗚咽流涕各請罪乞免相位是夜澍雨大洽後唐莊宗同光元年四月即位於魏州時正月不雨至是人心憂恐洎宣赦之夕降雨彌溥耒耜滿野上下歡康槁苖復茂麥熟倍常明宗初仕莊宗天祐十四年契丹圍周徳威於幽州帝與李存審帥師同討自易州北山而行詰旦微雨諸將懼雨淋潦帝祝曰彼蒼垂祐國難終平敢希浹旬早得晴朗俄而開霽衆心咸悅天成四年二月甲子車駕歸京宿於中牟縣百官詣行宮起居各賜酒食上謂侍臣曰麥田稍旱朕以暗禱祈乙丑届鄭州雨三日百辟稱賀長興元年二月甲寅赴南郊壇之齋宮是夜隂雲蔽密至二皷微雨帝詔問司天官擇日奏曰聖徳動天百靈斯㑹即應便止至三皷雨止星象晴明瞻視如晝咸以為盛徳感也末帝清㤗元年七月詔曰昨以稍愆時雨慮損嘉禾朕親赴龍門遍申祈禱甘澤尋降豐稔可期宜令元差禱雨官各赴祠宇昭賽漢髙祖天福六年初為太原節度使赴任晉陽大旱帝入境謂賓從及左右曰吾始衣繡還鄉甚有徳色今一境大旱五稼將枯豈非薄徳寡祐而致是邪帝乃際地設脯醴望山川而禱曰某本生此地濫鎮北方朝廷差來不敢違㫖在上者無徳而禄甘速身殃在下者以食為天難加衆咎願興雲雨以救焦勞灑泣致拜其日大雨帝既下車入謁興安王昌寜公廟每致祈禱繇是境内大稔葢精誠之所感也是嵗天下飛蝗東距於海西至隴右南極湖湘北越燕薊川井廬舍無不塡滿惟入太原山谷中者皆抱草木而死時天下蝗亦相繼而死焉但五稼已傷而太原獨豐人甚異焉隱帝乾祐元年五月丙辰以久旱幸道宫佛寺禱雨是日大澍二年内出宋州所送蝗抱草死者以示羣臣乃命止捕焉差官祭之周太祖以乾祐二年討李守真太祖决欲進攻十七日於西砦抽郭崇葉仁魯及手下兵士與東砦軍進攻梯衝䂭弩百道齊發俄而西北黑風揚沙晦暝梯衝揺蕩人不能開目太祖令禱河伯祠曰吾奉辭伐罪以救黎元兇醜拒張勞兵攻伐神道禍滛合伸㝠助風師無狀不祐王師明靈感通速宜止絶如無顯効祠其危乎奠訖而風止世宗初節制澶淵凡三載或水旱不時有禱於神祠未嘗不應時而驗顯徳四年親征淮南降下夀州還京四月戊午到潁上縣是日大雨先時帝在下蔡日宰臣以時雨稍􅄽上奏帝曰賊壘已平班師在近雨當不日矣至是果如聖語神助夫大人斯興神明鑒徳至誠多感惠廸多助肸蠁幽贊顛沛靡失斯自天之孚祐也故有宅心清明發秀岐嶷越在側微之際已彰保定之徵及乎扶義臨戎勞神焦思顧諟靈命率籲衆謀將拯横流以遏亂畧繇是猛鷙効用靈祗告猶冐矢石而如夷視水火而可蹈寒暑為之易節風雷為之借勢休應震動蠢類薦祉况乃吉夣先啓聖知獨悟懇激之切至人事之符合者哉黄帝有聖徳初百神朝而使之應龍攻蚩尤戰虎豹熊罷四獸之力以女妓止滛雨史記云黄帝教熊羆貔貅貙虎以與蚩尤戰於阪泉之野虞舜初居於嬀汭其父瞽瞍嘗欲殺之使舜上塗廪瞽瞍從下縱火焚廪舜乃以兩笠自扞而下去得不死後瞽瞍又使舜穿井為匿空旁出舜既入深瞽瞍與象共下土實井舜從匿空旁出去舜以權謀自免亦大聖有神人之助也夏禹初為司空觀於河有長人白面魚身出曰吾河精也呼禹曰文命治滛授禹河圖言治水之事乃退入於淵漢髙祖初為漢王二年四月與項羽大戰於彭城靈壁東圍漢王三匝大風從西北起折木發屋揚沙石晝晦晦暗也楚軍大亂而漢王得與數十騎遯去八年冬帝東擊韓王信餘㓂於東垣真定也還過趙趙相貫髙等隂謀欲殺帝帝欲宿心動問縣名何曰栢人帝曰柏人者廹於人也去弗宿宣帝初生數月遭巫蠱事收繫郡邸獄郡邸獄治天下郡國上計者盖巫蠱獄繁收繫者衆故寄此獄連嵗不决後元二年望氣者言長安獄中有天子氣武帝遣使者分條中都官獄中都官京師諸官府也繫者輕重皆殺之内謁者令郭穰夜至郡邸獄廷尉監邴吉拒閉使者不納曰皇曾孫在他人亡辜死者猶不可况親曾孫乎相守至天明不得入穰還以聞因劾奏吉武帝亦悟曰天使之也因赦天下郡邸獄繫者獨頼吉得生後漢光武初為更始大司馬狥河北時王郎移檄購光武光武趣駕南軒至饒陽晨夜兼行􅂪犯霜雪天時寒面皆破裂至虖沱河候吏還曰河水流澌無船不可濟官屬大懼光武令王覇往視之覇恐驚衆欲且前阻水還即詭曰氷堅可渡官屬皆喜光武笑曰候吏果妄語也遂前比至河河氷亦合乃令覇䕶渡堅䕶度也未畢數騎而氷解光武謂覇曰安吾衆得濟免者卿之力也覇謝曰此明公至徳神靈之祐雖武王白魚之應無以加此今文尚書曰武王度孟津白魚躍入王舟光武謂官屬曰王覇權以濟事殆天瑞也進至博城下乃惶惑不知所之有白衣老父在道旁指曰努力信都郡為長安守去此八十里信都郡今冀州也光武即馳赴之信都太守任光開門出迎魏太祖之討張魯魯遣五官掾降弟衛横山築陽平城以拒王師不得進魯走巴中軍糧盡太祖將還西曹掾東郡郭諶曰不可魯已降留使既未反衛雖不同攜可攻縣軍深入以進必克退必不免太祖疑之夜有野麋數千突壞衛營軍大驚夜髙祚等誤與衛衆遇祚等多鳴鼔角會衆衛懼以為大軍見掩遂降晉宣帝為魏太傅勒兵從闕下趣武庫當曹爽門人逼車住爽妻劉怖出至聽事謂帳下守督曰公在外今起兵如何督曰夫人勿憂乃上門樓引弩注箭欲發將孫謙在後牽止之曰天下事未可知如此者三帝遂得過去文帝為魏相國諸葛誕據夀春叛命築壘圍之初夀春每歲雨潦淮水溢嘗掩城邑故帝之築圍也誕笑曰是故不攻而自敗也及大軍之攻亢旱踰年城既䧟是日大雨壘皆毁元帝為左將軍從討成都王穎蕩隂之敗也叔父東安王繇以穎所害帝懼禍及將出奔其夜月正明而禁衛嚴警帝無繇得去甚窘廹有頃雲霧晦暝雷雨暴至徼者皆弛因得濳出穎先令諸闗無得出貴人帝既至河陽為津吏所止從者宋典後來以鞭策馬而笑曰舍長官禁貴人汝亦被拘邪吏乃聽過至雒陽迎太妃俱歸國後魏孝文五嵗受禪文明馮太后以帝聰聖後或不利於馮氏將謀廢帝乃於寒月單衣閉室絶食三日帝亦無恙唐髙祖初為唐公大業十三年起義師於太原七月師次霍邑隋武牙郎將宋老生陳兵拒險義師不進屯兵於賈胡堡㑹霖雨積旬饋運不給髙祖患之忽有白衣老父詣軍門請見曰予霍山神遣語大唐皇帝若向霍邑當東南傍山取路八月雨止我當助爾破之髙祖初哂之遣人東南視地果有微道髙祖笑曰此神不欺趙襄子豈當負吾邪八月己卯雨果霽髙祖大悅以太牢祭霍山太宗初討宋金剛賊徒日慼嘗欲覘敵濳軍逺抄騎皆四散太宗與一甲士登丘而睡俄然賊兵四面雲合不知覺也㑹有蛇逐鼠觸甲士之面甲士驚起因見賊至遽白太宗而俱上馬馳百餘歩為賊所及發大羽箭射之殪其驍將賊騎乃退當時以為異焉貞觀十九年征遼五月丙子師次臨遼頓其夕遼水減二尺三軍慶悅咸以為得天之助𤣥宗始三嵗封楚王時則天因御髙樓抱之眺望誤墜於地左右失聲奔下扶擁帝怡然無虧損之狀則天甚奇之肅宗母楊太后方娠時𤣥宗為太平公主所忌密謂侍讀張說曰用事者不欲吾多息嗣恐禍及此婦人其如之何密令説懷去胎藥而入太子於曲室躬自煑藥醺然似寢夣神人覆鼎既寤如是者三太子異之告說說曰天命也無宜他慮及為皇太子天寳十四年安禄山反𤣥宗幸蜀留太子在後宣慰百姓賊師追至渭便橋已斷渭水初漲又無舟檝太子於水濱號令百姓願從者三千餘人因而渉渡而南遇潼闗散卒誤以為賊與之戰士多傷敗收其餘復濟渭而北太子過渭之後渭水之漲隨馬跡而髙丈餘追者盡溺衆心大喜以為聖感帝行至豐寜南見大河天塹之固欲整軍北渡將詣豐寜忽大風飛沙礫數歩之間不辨人馬繇是廻軍東趣靈武風沙頓止天地廓清乾元三年正月甲申元帥奏於河陽陜東大破賊文武百官奉表稱賀曰伏見元帥行營露布伏承官軍大破逆賊二千餘衆兼燒浮橋栅壘等悉皆蕩盡陜東大破兇徒斬及生擒甚衆又見中書門下稱河陽橋頃因河陵衝突連艦偏斜昨一軍吏夜間橋下閙見有神人云我是毗沙門天王為國家正此橋柱及平明橋忽正又勝州已北百姓數千人忽見兵馬極衆喚百姓索食其中有人云我是張韓公及王忠嗣領此兵馬為國討賊不日當太平百姓陳祭訖須㬰不見此皆聖徳所感人神合符靈應昭然今古未有者臣聞聖人者與天地合徳日月齊明神祗告休山川輸貺雖五兵暫阻而七徳肇脩伏惟乾元大聖先天文武孝感皇帝陛下眷徳昭融文思光被道冲𤣥漠徳同淵明三靈貢珍百神効職頃者兇徒未殄侵軼京師東郊不開尚稽大討幽明增憤動植未康固得天祗䕶梁神兵啟陣喧聲夜發狀若搆於黿鼉靈契昭然威徳清於蚊蚋三軍盡覩百姓咸觀此實止戈之先兆也及師出交懷一戈而羣兇塗地兵臨分陜再戰而餘孽殄殱擒元惡而詰彼兇殘焚賊橋而斷其歸路莫不覩兵勢以攝竄聞軍聲而畏威撲滅之期於斯見矣此則天時人事斷在目前睿筭神功致之度内皆經籍未載古今蔑聞者也詔曰朕為人父母時屬艱虞東夏不康近郊多壘除妖撲燎戎馬交馳父出夫行征徭未息蓬頭汗甲今已累年憂我人斯寢興誠切達精誠於天地委長策於廟堂宗社假靈王師克勝殘逆窮搏聚而相持造舟横河樹栅憑岸一鼓齊進應時殱蕩陜東連㨗吉語驟來平賊安人指期可待自古王者得神以興城梁不假於人功士馬或稱於幽贊休徵斯在靈應不違凡百具寮相同慶慰敬宗寳歴元年正月乙卯命中使張宗肇持緋衣賜長安縣主簿鄭翦翦時主役太清宫御院忽於院前西序見一白衣老人云此下有井正值皇帝過路汝速實之不然罪在不測翦惶遽領役人視之其處已䧟數尺發之則一古井宛然驚顧之際已失老人所在翦遂告功徳使以聞帝歸至宮宰臣及供奉官於焉舞蹈稱賀時有詔命翰林學士韋處厚紀述以表其異後唐武皇初為河東節度使追黄巢至於曹州班師過汴汴帥朱溫迎勞於封禪寺請帝休於府第乃以從官三百人及監軍使陳景思舘於上原驛是夜張樂陳宴席汴帥自佐饗出珍幣侑勸帝酒酣戲諸侍妓與汴帥握手叙破賊事以為樂汴帥素忌帝乃與其將楊彦洪密謀竊發彦洪於巷陌連車樹栅以扼奔竄之路時從官者皆醉俄而伏兵竊發來攻傳舍武皇方大醉噪聲動地從官十餘人捍賊侍人郭景銖滅燭扶帝以茵幕褁之匿於床下以水洒面徐曰汴帥謀害司空帝方張目而起引弓抗賊有頃煙火四合復大雨震電帝得從者薛鐡山賀囘鶻等數人而去雨大如注不辨人物隨電光登尉氏門縋城而出得還本營明宗初為邢州節度使從莊宗南伐次胡柳陂前軍周徳威為輜重所撓一軍不利莊宗以中軍戰勝兩軍勝負相半而左馳右趣皆無部伍或號曰晉王渡河而北矣日晡晩帝與末帝相失軍無所止河氷初解以無舟檝帝泣曰吾兒安在吾主安歸身世盡於斯矣是夜大寒雪深盈尺兵士凍死者衆河氷有復合處帝試踐行可渡不旋踵而氷觧繼行者䧟矣是夜帝得渡宿先鋒砦翼日莊宗遣内官訪帝時已獲土山之㨗矣軍聲復震晉髙祖後唐應順末自河東改鎮常山承詔詣闕會少帝失位與數百騎欲奔鄴夜與少帝相遇獲嘉東遂俱入衛郡洎郵舍中時劉諱即漢髙祖也從行是夜偵知少帝伏甲欲與從臣謀害晉髙祖詐屏人對語方坐於亭廡劉諱宻遣御史石敢袖鎚立於後伏甲者俄起左右驚擾敢素有勇力擁晉髙祖入一室以巨木塞門敢力當其鋒尋死焉劉諱乃解所佩刀隔忩授晉髙祖既出有數卒逐劉諱劉諱時無佩刀遇夜晦以在地葦炬未燃者奮而擊之人謂其短兵也遂敗走帝乃匿身長垣下隔垣聞人相告云石太尉已死矣即晉髙祖也劉諱審其語則帝所親驍將李洪信也劉諱因謼而召之曰石太尉無恙繇是坎垣求出其垣劃然頺落有神助焉劉諱乃與洪信合衆䕶晉髙祖殺建謀者以少主授刺史王引贄晉髙祖乃能脫難赴闕漢髙祖即位初自晉赴雒次絳郡有司奏置頓厄口鎮帝曰地名稍惡安可宿之朕記此别有好路乃遣人導之果坦夷而至於聞喜縣有從騎槖駞繇厄口者多爭路堕於絶壑從臣嘆曰昔髙皇帝避柏人之名其智若神我帝惡厄口而入聞喜何千載之暗合邪周太祖初為漢侍衛馬歩軍都指揮使乾祐中圍李守貞於河中府攻城日大風帝祝於河神而風止及守貞將敗帝夣河神告曰勿攻擊七月下旬上帝滅其族果如其言及北征至澶州驛亂軍逼即登城樓令王峻慰諭之曰河氷已解浮橋難立如何南濟衆亦憂之其夜西北風裂凝凍比昧旦津吏報氷堅可渡步騎踐氷而行堅如鐡石未午軍人渡絶衆謂之凌橋其日將夕津吏報曰氷橋泮矣廣順二年五月親征慕容彦超於兖州是月十三日至城下賊尚拒守十七日晝寐夣内養徳兒引道士一人進書卷首云車駕來月二日還京其下文字絶多不能盡記既寤以夣示宰臣又四日而城拔六月二日離兖州是日大雨城下行營水深數尺其日晩至中都縣太祖笑謂侍臣曰今日若不離城下則當為水潦所溺矣世宗顯徳元年三月親征河東大敗賊軍初兩軍之未整也風自東北起不便於王師及與賊軍相遇風勢斗迴人情相悅册府元龜卷二十六
