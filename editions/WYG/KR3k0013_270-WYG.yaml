body:
  text: 册府元龜卷二百七十宋王欽若等撰宗室部文學易之小畜曰懿文德傳曰人不學不知道蓋閔子有將落之嘆宣尼著無文之論是知學問之為益文辭之為功其至矣哉乃有聯華帝裔分暉宗胄外膺維翰之寄居有敏德之美而能探考載籍服膺師訓咨求鴻碩周旋儒雅以至貫通六藝多識前言參預述作書法示後掞藻彰於敏麗屬辭尚乎體要炳焉英發煥乎成章斯固茂公姓振振之風増時文郁郁之盛者也周公旦武王之弟也多才多藝作七月鴟鴞之詩大誥微子之命歸禾嘉禾康誥酒誥梓材召誥雒誥多士無逸君奭多方立政及周官儀禮周頌等篇漢楚元王交字游髙祖同父少弟也言同父知其異母好書多材藝少時嘗與魯穆生白生申公俱受詩於浮丘伯白生魯國奄里人浮丘伯秦時儒生伯者孫卿門人也孫卿姓荀名况為楚國蘭陵令漢以避宣帝諱改之曰孫後封楚至國以穆生白生申公為中大夫高后時浮丘伯在長安元王遣子郢客與申公俱卒業卒終也文帝時聞申公為詩最精以為博士元王好詩諸子皆讀詩申公始為詩傳號魯詩凡言傳者謂為之解説若今詩毛氏傳也元王亦次之詩傳號曰元王詩次謂綴集之世或有之梁懷王揖文帝少子好詩書帝愛之異於諸子河間獻王德景帝子修學好古實事求是務得事實每求眞是也從民得善書必為好寫與之留其眞眞正也留其正本也加金帛賜以招之繇是四方道術之人不逺千里不以千里為逺而自至或有先祖舊書多奉以奏獻王者故得書多與漢朝等是時淮南王安亦好書所招致率多浮辨獻王所得書皆古文先秦舊書周官尚書禮記孟子老子之屬皆經傳說記七十子之徒所論其學舉六藝立毛氏詩左氏春秋博士修禮樂被服儒術造次必于儒者山東諸儒多從游武帝時王來朝獻雅樂對三雍宫辟雍明堂靈臺也及詔䇿所問三十餘事其對推道術而言得事之中文約指明又與毛生等共采周官及諸子言樂事者以作樂記獻八佾之舞與制氏不相逺其内史丞王定傳之以授常山王禹禹成帝時為謁者數言其儀獻王采禮樂古事稍稍増輯至五百餘篇淮南王安厲王長之子也為人好書招致賔客方術之士數千人作為内書二十一篇外書甚衆又有中篇八卷言神仙黄白之術黄黄金白白銀也亦二十餘萬言武帝方好藝文以安屬為諸父辨博善為文辭甚尊重之每為報書及賜賜謂時賜書也嘗詔司馬相如等視草乃遣草謂為文之藁草初安入朝獻所作内篇新出上愛祕之使為離騷傳傳謂解說之若毛詩傳旦受詔日食時上又獻頌德及長安都國頌每宴見談說得失及方技賦頌昏暮然後罷又有賦八十二篇陽丘侯偃齊悼惠王孫作賦十九篇燕刺王旦武帝子博學經書雜記廣川王去惠王越之子景帝孫也師受易論語孝經皆通好文辭紅侯富之子辟疆字少卿楚元王之孫也好讀詩屬文屬文謂㑹綴文辭也武帝時以宗室子隨二千石議論冠諸宗室議論每出宗室之上也清靜少欲嘗以書自娛不肯仕有賦八篇陽城侯德辟疆子有賦九篇德子向字子政辟疆之孫也本名更生既冠以行修飭擢為諌議大夫是時宣帝循武帝故事招選名儒俊材置左右更生以通達能屬文辭與王褒張子僑等並進對獻賦頌凡數十篇㑹初立穀梁春秋更生復受穀梁講論五經於石渠成帝時向數奏封事遷光禄大夫時帝元舅陽平侯王鳯為大將軍秉政倚太后專國政兄弟七人皆封為列侯時數有大異向以為外戚貴盛鳯兄弟用事之咎而帝方精於詩書觀古文詔向領校中五經祕書言中以别於外向見尚書洪範箕子為武王陳五行隂陽休咎之應向乃集合上古以來歴春秋六國至秦漢符瑞災異之說記推迹行事連傳禍福著其占驗比類相從各有條目凡十一篇號曰洪範五行傳論奏之天子心知向忠精故為鳯兄弟起此論也然終不能奪王氏之權向有賦三十三篇三子皆好學長子伋以易教授官至郡守中子賜九卿丞早卒向少子歆字子駿少以通詩屬文召見成帝待詔宦者署為黄門郎河平中受詔與父向領校祕書講六藝傳記諸子詩賦數術方技無所不究哀帝初即位大司馬王莽舉歆宗室有材行為侍中大中大夫貴幸復領五經卒父前業歆乃集六藝羣書種别為七畧歆及向始皆治易宣帝時詔向授穀梁春秋十餘年大明習及歆校祕書見古文春秋左氏傳歆大好之時丞相史尹咸以能治左氏與歆共校經傳歆畧從咸及丞相翟方進受質問大義初左氏傳多古字古言學者𫝊訓故而已及歆治左氏引傳文以解經轉相發明繇是章句義理偹焉歆亦湛靖有謀父子俱好古博見彊志志記也過絶於人淮陽憲王欽宣帝子也好經書法律聰達有材作賦二篇後漢劉般宣帝之𤣥孫也王莽敗與母流轉至武威雖尚少而篤志修行講誦不怠其母及諸舅以為身寄絶域死生未必不宜苦精若此數以曉般猶不改業建武八年隗囂敗河西始通般即將家屬東至雒陽脩經學於師門沛王輔光武子也矜嚴有法度好經書善説京氏易孝經論語傳及圖䜟作五經論時號之曰沛王通論東平王蒼光武子少好學書為驃騎將軍是時中興三十餘年四方無虞蒼以天下化平宜脩禮樂乃與公卿共議定南北郊冠冕車服制度及光武廟堂歌八佾舞數明帝以所作光武本紀示蒼蒼因上光武受命中興頌帝甚嘉之以其文典雅特令校書郎賈逵為之訓詁及薨詔誥中傅封上蒼自建武以來章奏及所作書記賦頌七言别字歌詩並集覽焉琅邪王京光武子好經學永平中數上詩賦頌德明帝嘉美下之史官順陽懷侯嘉光武族兄也與伯昇俱學長安習尚書春秋甘里侯敏光武族昆弟通經有行臨邑侯復光武兄伯升孫也好學能文章永平中每有講學事輒令復典掌焉與班固賈逵共述漢史傅毅等皆宗事之復子騊駼及從兄平望侯毅並有才學永寧中鄧太后召毅及騊駼入東觀與謁者僕射劉珍著中興以下名臣烈士傳騊駼又自造賦頌書論凡四篇北海敬王睦光武兄伯升孫也少好學博通書傳光武愛之數被延納明帝之在東宫尤見幸待入侍諷誦出則執轡性好讀書嘗為愛翫能屬文作春秋㫖義終始論及賦頌數十篇平望侯毅北海敬王子也毅少有文辨安帝時上漢德論十二篇時劉珍鄧耽尹兌馬融共上書稱其美安帝嘉之濟南王香光武曾孫也篤行好經書陳敬王羡明帝子博渉經書有威嚴與諸儒講論於白虎殿劉梁宗室子孫嘗疾世多利交以邪曲相黨乃著破羣論時之覽者以為仲尼作春秋亂臣知懼今此論之作俗士豈不愧心其文不存又著辨和同之論孫禎亦以文才知名魏陳思王植字子建武帝子也年十歲讀誦詩論及辭賦數十萬言善屬文帝視其文謂植曰汝倩人邪植跪曰言出為論下筆成章願當面試奈何倩人時鄴銅爵臺新成帝悉將諸子登臺使各為賦植援筆立成可觀太祖甚異之明帝時植薨詔撰録前後所著賦頌詩銘雜論凡百餘篇副藏内外中山恭王衮武帝子也少好學十餘歳能屬文每讀書文學左右嘗恐以精力為病數諌止之然性所樂不能廢也每兄弟游娱衮獨譚思經典為北海王時黄龍見鄴西漳水衮上書贊頌凡所著文章二萬餘言才不及陳思王而好與之侔吳孫瑜堅季弟之子好樂墳典雖在戎旅誦聲不絶孫承好學有文章作螢火賦行於世晉安平獻王孚宣帝次子也博涉經史漢末喪亂與兄弟處危亡之中簞食瓢飲而披閱不勌扶風王駿宣帝子也幼聰慧五六歳能書疏諷誦經籍見者竒之能著論與荀顗論仁孝先後文有可稱髙陽王睦宣帝弟泰之子也少好學與元帝及范陽王虓俱有稱於宗室南陽王世子保字景度少有文義好述作范陽王虓宣帝弟康王綏之子也少好學馳譽研考經記清辯能言論以宗室選拜散騎常侍東安王繇宣帝子武王伷之次子也博學多才齊獻王攸文帝子也少而岐嶷及長清和平允親賢好施愛經籍能屬文善尺牘為世所楷才望出武帝之右宣帝每器之為太子太傅獻箴於太子世以為工高陽王睦子彪出繼宣帝弟敏少篤學不倦專精學習故得博覽羣籍終其綴集之務注莊子作九州春秋為續漢書又條譙周古史考中凡百二十二事為不當多據汲冢紀年之義亦行於世宋江夏王義恭武帝子也渉獵文義孝武時每有祥瑞輒上賦頌撰要記五卷起前漢訖晉太元表上之詔付秘閣臨川王義慶武帝弟子也撰徐州先賢傳十卷奏上之又擬班固典敘以述皇代之美義慶性好文義文辭雖不多足為宗室之表招聚文學之士近逺必至所著世説十一卷撰集林二百卷並行於世文帝與義慶書嘗加意斟酌南平穆王鑠文帝第四子也少好學有文才未弱冠擬古三十餘首時人以為亞迹陸機建平宣簡王宏文帝第七子也少而閒素篤好文集宏子景素少有父風好文章書籍晉熈王㫤文帝第九子前廢帝子業立懼禍奔於魏㫤雖學不淵洽覽子史前後表啓皆其自製魏朝嘉重之南齊豫章王嶷髙帝第二子也嶷有子十六人有文學者子恪子質子顯子雲子暉五人恪嘗謂所親曰文史之事諸弟偹之矣不煩吾復牽率但退食自公無過足矣子恪少亦涉學頗屬文隨棄其本故不傳文集子範子恪之弟也為南平從事中郎王使製千字文其辭甚美王命記室蔡薳注釋之自是府中文章皆使具草及為簡皇后哀䇿文詞理哀切前後文集三十卷子滂確並少有文章子顯好學工文嘗著鴻序賦尚書令沈約見而稱曰可謂明道之高致蓋幽通之流也梁武帝雅愛子顯文又嘉其容止吐納嘗從容謂曰我造通史此書若成衆史可廢子顯對曰仲尼讚易道黜八索述職方除九丘聖製符同復在兹日時以為名對又啓撰武帝集并普通北伐記為國子祭酒於學逓述武帝五經義子顯嘗為自序其畧云余為邵陵王友恭還京師逺思前比即楚之屈宋梁之嚴鄒追尋平生頗好辭藻雖在名無成求心已足若乃登髙目極臨水送歸風動春朝月明秋夜早鴈初鶯開花落葉有來斯應每不能己也且前代賈傅崔馬邯鄲繆路之徒並以文章顯所以屢上歌頌自比古人天監六年始預九日朝晏稠人廣坐獨受㫖云今雲物甚美卿將不斐然賦詩詩既成又降㫖曰可謂才子既退謂人曰一顧之恩非望而至遂方賈誼何如哉未易當也每有製作特寡思功須其自來不以力搆少來所為詩賦則鴻序一作體兼衆製文備多方頗為好事所傳故虚聲易逺子顯所著後漢書一百卷齊書六十卷普通北伐記五卷貴儉傳三卷文集二十卷子顯子愷才學譽望時論以方其父簡文在東宫早引接之時中庶子謝嘏出守建安於宣猷堂餞飲並召時才賦詩同用十五劇韻愷詩先就其辭又美簡文與湘東王令曰王筠本自舊手後進有蕭愷可稱信為才子先是太學博士顧野王奉令撰玉篇簡文嫌其書詳畧未當以愷博學於文字尤善使更與學士刪改子雲子顯之弟也建武中封新浦縣侯自製拜章便有文采梁天監初降爵為子及長勤學有文采弱冠撰晉書至年二十六書成百餘卷表奏之詔付祕閣為太子舍人撰東宫新記奏之梁初郊廟未革牲牷樂辭皆沈約撰至是承用子雲啓宜改之勅答曰此是主者守株宜急改也仍使子雲撰定勅曰郊廟歌辭應典誥大語不得雜用子史文章淺言而沈約所撰亦多舛謬子雲作成勅並施用子暉子雲之弟也少渉學亦有文才嘗預重雲殿聽制講三慧經退為講賦奏之甚見貴重武陵王􅁮髙帝第五子也與諸王共作短句詩學謝靈運以呈帝帝報曰見汝二十字諸兒作中最為優者但康樂放蕩作體不辨首尾安仁士衡深可崇尚顔延之抑其次也鄱陽王鏘髙帝第七子性謙愼好文章始興王鑑高帝第十子好學善屬文衡陽王鈞髙帝第十一子性好學善屬文琅邪王智深以文章相㑹濟陽江淹亦游焉武帝謂王儉曰衡陽王須文學當使華實相稱不得止取貴游子弟而已乃以太子舍人蕭敷為文學鈞嘗手自冩五經部為一卷置於巾箱中以備遺忘侍讀賀玠問曰殿下家自有墳典復何須蠅頭細書别藏巾箱中答曰巾箱中有五經既易檢閱且一經手寫則永不忘諸王聞而爭效為巾箱五經江夏王鋒髙帝十二子也十歳能屬文武帝時藩邸嚴急諸王不得讀異書五經之外唯得看孝子圖而已鋒乃密遣人於市里街巷置圖籍朞月之間殆將備矣頴胄高帝從弟之子也好文義弟頴基好勇武世祖登烽火樓詔羣臣賦詩頴胄詩合㫖帝謂頴胄曰卿文弟武宗室便不乏才曲江公遥欣髙帝諸孫也年十六便博覽經史幾字德𤣥遥欣之子也年十歲便能屬文作楊公則誄沈約見而竒之子清亦有文才湘東王寶晊安陸昭王子也為左衛將軍明帝兄弟一門皆尚吏事寳晊粗好文章竟陵王子良武帝第二子也永明五年移居雞籠山西邸集學士抄五經百家依皇覽例為四部要畧千卷令司徒右長史陸惠曉參知事子良所著内外文筆數十卷雖無文采多是勸戒晉安王子懋武帝第七子也謙讓好學撰春秋例苑三十卷奏之世祖勅付祕閣隨郡王子隆武帝第八子也性和美有文才娶尚書令王儉女為妃武帝以子隆能文謂儉曰我家之東阿也出實為皇家藩屏昭胄子良之子也汎涉書史有父風賁昭胄之弟也幼好學有文才好著述嘗著西京雜記六十卷梁長沙宣武王懿文帝長子也懿之子藻少立名行志操清潔善屬文辭尤好古體自非公燕未嘗妄有所為縱有小文成輒棄本駿藻從子也工文章安成康王秀文帝第七子也精意學術搜集經記招學士平原劉孝標使撰類苑書未及畢而已行於世世子機家多書博學強記所著詩賦千言世祖集而序之機弟推少清敏好屬文深為簡文所親賞南平襄王偉文帝第八子也㓜清警好學製性情幾神等論靜偉子也有文才而篤志好學既内足於財多聚經史散書滿席手自讐校鄱陽忠烈王恢文帝第九子也年七歳通孝經論語義發摘無遺涉獵史籍範恢子也温和有器識愛竒玩古招集文才率意題章亦時有竒致宜豐侯修範弟也筋力貞固風儀嚴整九歲通論語十一能屬文鴻臚卿裴子野見而賞之始興忠武王憺文帝第十一子也憺子映年十二為國子生天監十七年詔諸生答䇿宗室則否帝知映聰解特令問䇿又口對並見竒謂祭酒袁昻曰吾家千里駒也上黄侯􅁮映弟也美談吐簡文入居監撫􅁮獻儲徳頌吳平侯景子勵弱不好弄聚書至三萬卷披玩不倦尤好東觀漢記畧皆誦憶劉顯執卷䇿勵酬應如流乃至卷次行數亦不差失長沙嗣王業武帝長兄懿之子也幼而明敏有文集行於世孝儼業子也聰慧有文才射䇿甲科除祕書郎太子舍人從幸華林園於座獻相風烏華光殿景陽山等頌其文甚美帝深賞異之南康簡王績武帝第四子也績子㑹理少聰慧好文史通理㑹理之弟也博覽多識有文才嘗祭孔文舉墓并為立碑製文甚美邵陵雋王綸武帝第六子也少聰頴博學善屬文工尺牘嘗預餞衡州刺史元慶和於座賦詩十二韻末句方同廣川國寂寞乆無聲大為武帝所賞曰汝人才如此何慮無聲確綸之次子也有文才除祕書丞武帝謂曰為汝能文所以特有此授武陵王紀武帝第八子少勤學有文才屬詞不好輕華甚有骨氣尋陽王大心簡文帝第二子也幼而聰朗善屬文南海王大臨簡文帝第四子也少而敏慧後入國學明經射䇿甲科大連大臨之弟也少俊爽能屬文與大臨入國學明經射䇿甲科並從髙祖行朱方髙祖問曰汝等習騎不對曰臣等未奉詔不敢輒習勅各給馬試之大連兄弟據鞍往還各得馳驟之節高祖大悦即賜所䇿馬及為啓謝文詞甚美安陸王大春簡文帝第六子也少博渉書記西陽王大鈞性厚重年七歲武帝問讀何書對曰學詩因令諷誦即誦周南音韻清雅忠壯世子方等元帝長子也性愛林泉特好散逸嘗著論曰人生處世如白駒過隙耳一壺之酒足以養性一簞之食足以怡形生在蓬蒿死葬溝壑瓦棺石椁何以異兹吾嘗夢為魚因化為鳥當其夢也何樂如之及其覺也何憂斯類良繇吾之不及魚鳥者逺矣故魚鳥飛浮任其理性吾之進退常在掌握舉手懼觸揺足恐墜若使吾終得與魚鳥同遊則去人世間如脫屣耳方等注范􅁮後漢書未就所撰三十國春秋及静住子行於世大圜簡文帝二十子也元帝嘗自問五經要事數十條大圜辭約指明應答無滯帝甚歎美之因曰昔河間好學爾既有之臨淄好文爾亦兼之然東平為善彌髙前載吾重之愛之爾當效焉方諸元帝第二子也幼聰警博學明老易後梁安成王欣幼聰警博綜墳籍善屬文後入周因與栁信言當明帝之世俱為一時文宗有集三十卷陳衡陽獻王昌髙帝第六子也雅性聰辯吳郡杜之偉授昌以經書一覽便誦明於義理剖析如流永陽王伯智世祖第十二子也少敦厚有器局博涉經史新蔡王叔齊髙宗第十一子也風采明贍博涉經史善屬文晉熈王叔文髙宗第十二子也好虚譽博涉經史淮南王叔彪髙宗第十三子也少聰慧善屬文岳陽王叔愼髙宗第十六子少聰敏十歳善屬文後主尤愛文章叔慎與衡陽王伯信新蔡王叔齊等日夕陪侍每應詔賦詩嘗被嗟賞南康愍王曇朗子方慶少清警涉獵書傳後魏河間公齊烈帝之𤣥孫也齊之孫志少清辯覽書傳頗有文才東陽公丕文帝諸孫也孝文時車駕南伐留守京師及帝還代丕請作歌詔許之歌訖帝曰公伺朕還車故親歌述志今經搆既有次第故暫還舊京願後時亦同兹適秦明王翰昭成子也翰子觚使於慕容垂垂末年政在羣下遂止觚待之甚厚因留心學業國人咸重之彭城王勰獻文子也從幸代都次於上黨之銅鞮山路旁有大松樹十數根時孝文進繖遂行而賦詩令人示勰曰吾作詩雖不七步亦不言逺汝可作之比至吾所可就之也時勰去帝十餘步遂且賦且行未至帝所而就詩曰問林松林松經幾冬山川何如昔風雲與古同帝大笑曰汝此詩亦調責吾耳又從孝文征沔北大破梁軍帝令勰為露布勰辭曰臣聞露布者布於四海露之耳目必須揄揚威畧頒示天下以臣小才豈足大用帝曰汝亦為才達但可為之及就類帝文有人見者咸謂御筆帝曰汝所為者人謂吾製非兄則弟誰能辯之勰對曰子夏被􅅓於先聖臣又荷責於今来又敦尚文史物務之暇披覽不輟撰自古帝王賢達至於魏世子孫三十卷名曰要畧清河王懌孝文子也博涉經史兼綜羣言有文才善談理為顯忠録二十卷京兆王愉孝文子也好文章頗著詩賦時引才人宋世景李神嶲祖瑩邢晏王遵業張始均等共申宴喜招四方儒學賔客嚴懷真等數十人館而禮之北齊襄城景王淯神武第八子也淯子亮性恭孝好文章河南康舒王孝瑜文襄長子也謙厚愛文學讀書敏速十行俱下河間王孝琬文襄第三子琬之子正禮幼聰頴能誦左氏春秋齊亡遷綿州卒趙郡王琛後主子也琛之子叡勵已勤學嘗夜乆方罷世祖時為太尉乆典朝政清貞自守譽望日隆漸被疎忌乃撰古之忠臣義士號曰要言以致其意後周齊殤王憲太祖第五子少與髙祖受詩傳咸綜機要得其指歸嘗以兵書繁廣難求指要乃自刋定為要畧五篇至是表陳高祖髙祖覽而稱善貴殤王子也少聰敏涉獵經史始讀孝經便謂人曰讀此一經足為立身之本宋獻王政文帝子也幼而敏達年七歳誦孝經論語毛詩尚書趙僭王招文帝子也幼聰頴博涉羣書好屬文學庾信體詞多輕􅃩滕簡王逌文帝次子也少好經史解屬文所著文集頗行於世隋髙祖族弟子崇少好學涉獵書記士達髙祖族子少聰敏有學行滕穆王瓚好書愛士甚有令名瓚子温字明􅘴作事從容温厚好學解屬文既而作零陵賦以自寄其辭哀思帝見而怒之轉徙南海燕王倓字仁安元德太子昭之次子敏慧好讀書尤重儒素造次所及有若成人唐江夏王道宗髙祖從父兄子也晩年好學為當代所重漢王元昌髙祖第七子也少好學韓王元嘉髙祖第十一子也少好學聚書至萬卷又採碑文古迹多得異本霍王元軌髙祖第十四子也少多才藝太宗謂魏徴曰卿以元軌前代誰比徴曰經書文雅亦漢之間平也前後為刺史至州唯閉閣讀書吏事責成長史司馬鄧王元裕髙祖第十七子好學善談名理魯王靈䕫髙祖第十九子有美譽好學吳國公孝逸淮安王神通子也少好學解屬文濮王泰太宗第四子少善屬文太宗以泰好士愛文學特令就府别置文學館任自引召學士貞觀十二年奏請撰括地志遂奏引著作郎蕭徳言祕書郎顧𦙍記室叅軍蔣亞卿功曹叅軍謝偃等就府修撰成五百五十卷奏上太宗閱而嘉之乃下詔曰地記之設由來尚矣區外具於山海經内陳於夏載職方王制纔舉淮夷漢志晉國畧記郡國自兹以降著作實繁或學非博通多所遺闕或地分南北雅有短長求其折中無聞盡善左武侯大將軍雍州都督魏王泰體業貞固風鑒凝邈學綜䇿府文冠詞林樂善表於夙夜好士彰於吐握討論墳典詳言儒雅博採方志得之於舊聞旁求故老考之於傳信内殫九服外極八荒憲章之規條目有序兼苞戎夏之域今古無遺簡而能周博而尤要足以度越前載垂之不朽宜加褒錫以申奬勸可賜物一萬段其書且付祕閣初泰好學愛文章司馬蘇朂以自古英王多引賔客以著述為美遂勸泰表請修撰詔許之於是大開館宇廣召時俊衛尉供帳光禄給食朝士學涉者多被奏追赴貴游子弟更相因致人物臻凑門庭若市泰稍悟過盛欲其速成於是分道計州繙緝統録至是凡四年盡成撰緝之人咸加給頒賜黄國公譔韓王元嘉子譔少以文才見知𢎞文閣學士孟利貞嘗稱譔文章云雖劉禕之周思茂亦不能過也諸王子中與琅邪王沖為一時之秀沖與譔父子書籍最多皆文句詳定祕閣所不及也虢王鳯𤣥孫則之少以宗室厯官試太常丞太僕少卿及長好學年五十餘嘗執經詣太學聽受頴王璬𤣥宗第十三子讀書有文詞永王璘𤣥宗第十六子聰敏好學後唐秦王從榮為詩與從事髙輦等更相唱和自謂章句獨步於一時有詩千餘首號曰紫府集既受元帥之命即令寮佐及四方遊士至者各試檄淮南書陳已將廓清宇宙之意冊府元龜卷二百七十
