body:
  text: 册府元龜卷八百三十五宋王欽若等撰總録部性質質樸訥醜陋性質天之所命不易者性氣之所禀不動者質是故率而為道抱以為樸正直則有全徳蓋寡愚智長短自殊厥趣剛柔緩急各顯諸用亦繇鳬脛難續陽氷不冶是以聖人隨氣而任之則小大無不濟矣裨諶鄭大夫能謀謀於野則獲得所謀也謀於邑則否此才性之敝也端木賜字子貢喜揚人之美不能匿人之過漢張湯為廷尉趙禹為少府兩人交驩湯兄事禹禹志在奉公孤立而湯舞智以御人舞弄其智制御他人陳遵與張竦為友俱至二千石免官歸長安竦居貧無賔客時好事者從之質疑問事論道經書而已而遵晝夜呼號車騎滿門酒肉相屬遵嘗謂竦曰足下諷誦經書苦身自約不敢差跌而我放意自恣浮湛俗問湛讀曰沈官爵功名不減於子而差獨樂顧不憂邪竦曰人各有性長短自裁子欲為我亦不能吾而效子亦敗矣雖然學我者易持效子者難將吾常道也後漢第五倫為司空性質慤少文采在位以貞白稱時人方之前朝貢禹然少藴藉不脩威儀亦以此見輕魏樂進字文謙容貌短少以膽烈從太祖為帳下吏杜恕推誠以質不治餙少與馮翊李豐俱為父任總角相善及各成人豐砥礪名行以要世譽而恕誕節直意與豐殊趣豐竟馳名一時京師之士多為之游說而當路者或以豐名過其實而恕被褐懐玉也繇此為豐所不善恕亦任其自然不力行以合時豐已顯仕朝廷恕猶居家自若明帝以恕大臣子擢拜散騎侍郎數月轉補黄門侍郎袁渙字曜卿為梁相其為政崇教訓恕思而後行外温柔而内能㫁文帝問渙從弟敏渙勇怯何如敏對曰渙貌似柔和然其臨大節處危難雖賁育不過也蜀楊戲出領梓潼太守入為射聲校尉所在清約不煩性雖簡惰未嘗以甘言加人過情接物吳孫渙以揚武中郎將領江夏太守渙訥於造次而敏於當官軍民稱之晉李𦙍容貌質素頺然若不足者而智度沉邃言必有則初仕上計掾王承字安期湛子也清虗寡欲無所脩尚言理辯物但明其指要而不餙文辭有識者服其約而能通永寧初為驃騎叅軍虞潭為衛將軍貌雖和柔而内堅明有膽决雖屢統軍旅而尠有傾敗梁殷芸字灌蔬陳郡長平人性倜儻不拘細行然不妄交游門無雜客後至通直散騎常侍後魏梁祚篤志好學有儒者風無當世之才官至秘書令隋薛道衡為内史侍郎加上儀同三司道衡每至構文必隱空齋榻墻而卧聞户外有人便怒其沈思如此唐魏徴狀貌不逾中人而素有膽智位至太子太師郭宏道性寛厚如愚而内敏為滄州刺史杜佑字君卿位至司徒外示寛和而持身有術為政𢎞易不尚皦察掌計治民物便而濟馭戎應變即非所長薛存誠性至和易於人無所不容及當官遇事即確然不㧞以是人皆稱重官至御史中丞韋處厚居家循易如不克任至於廷諍敷啓及馭轄胥吏勁確嶷然不可廻奪位至相輔質樸先聖之言有曰夫達也者質直而好義又曰剛毅木訥近仁言其任質樸之懐絶茍且之行發言慷慨遇事簡易忠所奉以盡誠臨大節而不奪可以集其事可以近於仁也雖威儀斯定風采無取處則為鄉黨所輕出則為左右所笑茍能適其用也庸何傷哉漢周勃髙祖時為太尉勃為人木强敦厚木謂質樸不好文學每召諸生說士東鄉坐責之勃自東向責諸生說士不以賔主之禮也鄉讀曰嚮趣為我語趣讀促謂令速言也其椎少文如此椎謂樸鈍如椎音直追反申培公者魯人也培申公名音扶尤切武帝徴至見帝帝問治亂之事申公已八十餘老對曰為治者不在多言顧力行何如耳顧念也力行為勉力為行也是時帝方好文辭見申公對黙然已招致即以為太中大夫舎魯邸舎止息也夏侯勝宣帝時為諌議大夫給事中勝為人質樸守正簡易亡威儀見時謂帝為君見見於天子也誤相字於前前天子之前也君帝前臣者不當相呼字也帝亦以是親信之龔遂為渤海太守數年宣帝遣使者徴遂議曹王生願從功曹以為王生素耆酒亡節度不可使耆讀曰嗜遂不忍逆從至京師王生日飲酒不視太守日日嘗飲酒也遂引入宫王生醉從後呼遂曰明府且止願有所白遂還問其故還回也王生曰天子即問君何以治渤海君不可有所陳對宜曰皆聖主之徳非小臣之力也遂受其言既至前帝果問以治狀遂對如王生言天子說其有讓說讀曰恱笑曰君何得長者之言而稱之遂因前曰臣非知此乃臣議曹教戒臣也帝以遂年老不任公卿拜為水衡都尉議曹王生為水衡丞以褒顯之後漢吳漢光武時為大司馬漢為人質厚少文造次不能以辭自達臧宫為左中郎將以謹信質樸故嘗見任用第五倫建武中舉孝㢘補淮陽國醫工長從王朝京師光武嘗召與語至夕帝戲謂倫曰聞卿為吏篣婦公不過從兄飯寜有之邪倫對曰臣三娶妻皆無父少遭饑亂實不敢妄過人食帝問曰聞卿為市掾人有遺母一笥餅者卿從外來見之奪母笥探口中餅信乎倫對曰實無此衆人皆以臣愚蔽故為生是語也帝大笑劉昆初為江陵令時縣連年火災昆輙向火叩頭多能降雨止風徴拜議郎稍遷侍中𢎞農太守先是崤黽驛道多虎災行旅不通昆為政三年仁化大行虎負子北渡河帝聞而異之徴代杜林為光禄勲詔問昆曰前在江陵反風滅火後守𢎞農虎北渡河行何徳政而致是事昆對曰偶然耳左右皆笑其質誠光武歎曰此乃長者之言也命書諸䇿桓榮建武中為博士入㑹庭中詔賜竒果受者皆懐之榮獨舉手捧以拜帝笑指之曰此真儒士也以是愈見敬厚李郃少遊太學外朴人莫之識安帝時為司空蜀譙周字允南體貌素朴丞相諸葛亮領益州牧命為勸學從事周初見亮左右皆笑既出有司請推笑者亮曰孤尚不能忍况左右乎晉魏舒飲酒石餘而遲鈍質朴不為鄉親所重武帝時位至司徒劉寔惠帝時為太傅位望通顯每崇儉素不尚華麗嘗詣石崇家如厠見有絳紋帳裀褥甚麗兩婢持香囊寔便退笑謂崇曰誤入卿内崇曰是厠耳寔曰貧士未嘗得此乃更如他厠葛洪性寡欲無所愛翫不知棊局幾道樗蒱齒名元帝為丞相辟為掾以平賊功賜闗内侯王彬字世儒為豫章太守為人樸素方直乏風味之好宋張仲子竟陵人子興世為冠軍將軍雍州刺史過竟陵欲拜墓仲子謂曰汝衛從太多先人必當驚怖興世减徹而後行繇興世致位給事中王譁文帝時為䕶軍侍中與南陽劉湛不為餙讓得官即拜以此為常南齊焦度為後軍將軍東宫直閣將軍為人處性温和敦行質朴寡欲太祖求州比及見意色甚變竟不得一語太祖以其不閑民事竟不用王智深瑯琊臨沂人也拙澁乏風儀初辟建平王景素書佐王諶為黄門郎少貧嘗自紡績及通貴後毎為人說之世稱其志達張敬兒為開府儀同三司將拜謂其妓妾曰我拜後應開黄閣因口自為鼔聲敬兒始不識書晚既為方伯乃習學讀孝經論語於新林慈姥廟為妾乞兒祝神自稱三公然而意知滿足初得皷吹羞便奏之張恭兒者敬兒弟也兄為征西將軍而恭兒不肯出官嘗居上保村中與居民不易敬兒呼納之甚厚恭兒月一出視敬兒輙復去梁崔靈恩武帝時為國子博士性拙無風采及解經析理甚有精致後魏酈約字善禮起家奉朝請再遷冠軍將軍司徒諮議叅軍樸質遲鈍而内愛琴書孫紹孝明時為中書侍郎性抗直每上封事意至懇切不憚犯忤但天性疎脫言乍髙下時人輕之不見採納北齊王昕為祕書監雅好清言辭無淺俗在東萊獲賊其同行侣者詰之未服昕謂之曰彼物故不歸卿無恙而反何以自明邢邵後見文宣說此言以為笑樂昕聞之故詣邵曰卿不識造化還謂人曰子才應死我罵之極深子才邵字隋馬光武安人尤明三禮為儒者所宗文帝開皇初徴山東義學之士光與張仲讓孔籠竇士榮張黒㧞劉祖仁等俱至並授太學博士時人號為六儒然皆鄙野無儀範朝廷不之貴也唐髙崇文憲宗時為劒南西川節度使不通文字厭太府案牘諮禀之繁且以優富之地無所陳力乞居塞上以扞邊戎懇疏累上二年冬制加同中書門下平章事邠州刺史邠寧二州節度觀察等使仍統京西都統以不習朝儀憚於入覲優詔令便道之鎮李澄徳宗時為儀成軍節度初封隴西郡公進武威郡王每上䟽連稱二封頗為時人哂之訥傳稱剛毅木訥近仁又云君子欲訥於言而敏於行斯乃聖人之奥行百代之宗師欲人行先於言名副其實然而性有質重思惟深沉口不能劇談心存乎博辯造次屈於辭達臨事失於機敏雖大才碩徳無繇勉焉趙文子晉大夫其言呐呐若不出諸其口呐呐舒貌韓非韓之諸公子也為人口吃不能道說而善著書漢周昌為御史大夫髙帝欲廢太子而立戚姬子如意為太子而昌廷爭之强帝問其說昌為人吃吃言之難也又盛怒曰臣口不能言然臣期期知其不可欲廢太子臣期期不奉詔以口吃故每事言期期帝欣然而笑即罷李廣為前將軍呐口少言司馬相如為孝文園令口吃而善著書楊雄為郎給事黄門口吃不能劇談劇疾也黙而好深湛之思後漢嚴翰善春秋鍾繇嘗數與翰辯論短長繇為人機㨗翰訥臨時屈無以應劉儒字叔林官至議郎郭林宗謂儒口訥心辯有珪璋之質珪璋玉也半珪曰璋林宗歎儒有珪璋之質終必為令徳之士髙彪家本單寒至彪為諸生游太學有雅才而訥於言後至内黄令何休為人質朴訥口而雅有心思官至諌議大夫魏鄧艾字士載少為都尉學士以口吃不得作翰佐為稻田守藂草吏崔琰字季珪少樸訥後至中尉晉左思字太冲為殿中侍御史貌寢口訥而辭藻壯麗朱伺字仲文安陸人少為吳牙門將陶丹給使吳平内徙江夏伺有武勇而訥口不知書為郡將督見鄉里士大夫揖稱名而已及為將遂以謙恭稱郭璞為王敦記室叅軍好經術博學有髙才而訥言論詞賦為中興之冠孫惠口訥好學有才識州辟不就寓居蕭沛之間後至廣武將軍安豐内使慕容納沈静深邃外訥内敏南齊謝眺為尚書殿中郎隆昌初勑眺接北使眺自以口訥啓讓不當不見許焦度為後將軍嘗求竟陵郡不知所以置辭親人授之辭百有餘言度習誦數日皆得上口㑹髙帝履行石頭城度於大衆中欲自陳臨時卒忘所教乃大言曰度啓公度啓公度無食帝笑曰卿何憂無食即賜米百斛梁張率為揚州别駕率雖歴居職務嘗留心簿領及為别駕奏事髙祖覽牒問之並無對但奉答云事在牒中髙祖不恱後周王雅字度容少而沉毅木訥寡言有膽勇善騎射累有戰功除都督賜爵居庸縣子樊深為太學博士雖博贍訥於辭辯故不為當時所稱盧柔性聰敏好學未弱冠解屬文但口吃不能持論後至開府儀同三司隋盧楚范陽人少有才學鯁急口吃言語澁難大業中為尚書右司郎祖君彦容貌短小言辭訥澁有才學官至東平書佐牛𢎞煬帝時為右光禄大夫帝嘗令宣勑𢎞至階下不能言退還拜謝云並忘之帝曰傳語小辯故非宰相任也逾稱其質直醜陋夫民之生也肖天地之貌為萬物之靈所受不同其形斯異乃有姿質蕞陋形制惡醜或鬼怪可駭或鄙𤨏不臧逈殊於倫類見嗤於流俗者焉葢洪範之六極其一曰惡傳曰耗土之人醜司籍所記咸得而徴然而善惡存乎中非著乎外賢愚本於性靡繫於形故仲尼述以貎之言叔向有不颺之論其先賢之丕戒哉叔魚晉大夫初生其母視之曰是虎目豕喙鳶肩而牛腹鳶肩桀出牛腹脇張谿壑可盈是不可厭也必以賄死䜿牛叔孫穆子之家臣黒而上僂上僂肩傴深目而豭喙口象豬華元宋大夫睅其目睅出目皤其腹賈辛晉人出為祁大夫將適其縣見於魏獻子魏子曰辛來昔叔向適鄭􅞭蔑惡惡貌醜欲觀叔向從使之收器者從隨也隨使人應斂爼豆者而徃立於堂下一言而善叔向將飲酒聞之曰必􅞭明也素聞其名故聞其言知之下執其手以上曰昔賈大夫惡賈國之大夫惡亦醜也娶妻而美三年不言不笑御以如臯為妻御之臯澤射雉獲之其妻始笑而言賈大夫曰才之不可以已我不能射女遂不言不笑今夫子少不颺顔貌不揚顯子若不言吾幾失子矣郭洽犨麋陳之惡人椎顙色如黒漆公孫吕衛靈公之臣長七尺面居三尺廣三寸鼻目取具名振天下澹臺滅明字子羽武城人狀甚惡欲事孔子孔子以為材薄既而受業退而修行行不繇徑非公事不見卿大夫南遊至江弟子三百人從之設取予去就名施乎諸侯孔子聞之曰吾以言取人失之宰予以貌取人失之子羽髙柴字子羔為費郈宰衛人長不盈五尺狀貌甚惡陳豹齊大夫也長而上傴肩背傴望視目望陽蔡澤燕人曷鼻巨肩曷一作偈偈一作仰巨一作渠魋顔蹙齃膝攣攣兩膝曲後為秦相漢田蚡孝景皇后同母弟為人貌寢寢短小也位至太尉蔡義為丞相短小無鬚眉貌似老嫗行歩俛仰嘗兩吏扶乃行王莽為人侈口蹙頷露眼赤精大聲而嘶反膺髙視瞰臨左右後嘗翳雲母屏面屏面即便葢扇之類也非親近莫得見也後漢承宫為左中郎名播匈奴時單于遣使求欲得見宫詔勑宫整飾宫對曰夷狄炫名非識實也臣狀醜也不可以示逺人宜選長大威容者明帝乃以大鴻臚魏應代之梁冀字伯卓為大將軍冀為人鳶肩豺目鳶鴟也鴟肩上竦也豺目目䜿也洞精矘盻洞通也矘目精直視口吟舌言謂口吃不能明了梁裔冀之子也裔一名胡狗冀諷衆人共薦裔為河南尹時年十六容貌甚陋不勝冠帶道路見者莫不嗤笑焉周禄為光禄大夫姿貌短陋而博學洽聞為儒者所宗周燮汝南安城人生而欽頥折額醜狀駭人其母欲棄之其父不聽曰吾聞賢聖多有異貌興我家者乃此於是寳之安帝以𤣥纁羔幣徴不起魏管輅字公明平原人也容貌醜無威儀言語不擇非類後為少府丞而卒王粲字仲宣年十七往荆州依劉表表以粲貌寢而體通侻不甚重也通侻簡易也吳諸葛恪少髪睂折額廣顙位至太傅録尚書晉劉伶字伯倫沛國人為建威叅軍身長六尺容貌甚陋山淳字子𤣥弟允字叔真皆濤之子也並少尫病形甚短小而聰敏過人武帝聞而欲見之濤不敢受詔淳不仕允為奉車都尉張載字孟陽貌甚醜每行小兒以瓦石擲之委頓而返官至中書侍郎領著作孫㑹秀子也年二十為射聲校尉尚惠帝女河東公主公主母喪未朞便納聘禮㑹形貌短陋奴僕之下者初與富室兒於城西販馬百姓忽聞其尚王莫不駭愕左思字太冲貌醜而口訥為幽州部從事戴洋為南中郎將桓宣叅軍洋為人短陋無風望然好道術妙解占候卜數王嘉字子年輕舉止醜形貌外若不足而聰睿内明劉􅐧為衛將軍開府荆州刺史嘗於東府聚樗蒲餘人並黒犢􅐧次擲得雉及宋髙祖四子俱黒一子轉躍髙祖厲聲喝之成盧􅐧意殊不快然素黒其面如鐡色焉趙孟字長舒入補尚書都令史其面有疵黯諸事不决皆言當問疵面也宋垣護之形狀短陋而氣幹強果累以功至輔國將軍務州刺史臧質身長六尺七寸出面露口秃頂拳髪年未二十髙祖召為世子中軍行叅軍范􅁮為左衛將軍太子詹事長不滿七尺肥黒秃睂髪劉胡本名坳胡以其顔面坳黒似胡故以為名江蒙貌醜其兄謐為于湖令明帝為南豫州嘗召見蒙而狎侮之何尚之為中書令少與太常顔延之相好狎二人並短小尚之嘗謂延之為猴延之目尚之為猴同遊太學西池延之問路人云吾二人誰似猴路人指尚之為似延之喜笑路人曰彼似猴耳君乃真猴南齊張融為司徒左長史形貌短醜精神清徹焦度為遊擊將軍容貌壯醜皮膚若漆質直木訥口不能言蕭坦之為尚書右僕射丹陽尹肥黒無髪語聲嘶時人號為蕭瘂剛狠專執羣小畏而憎之梁褚蘿為水軍都督面甚笑危有從理入口時有庾夐狀貌豐美頥頰開張人皆謂夐必為方伯無餒乏之慮及魏討江陵卒致饑死蘿竟保衣食而終王筠狀貌寢小長不滿六尺而性寛厚不以藝能髙人官至太子詹事後梁宋如周為黄門散騎面狹而長宣帝以法華經云聞經隨喜面不狹長嘗戲之曰卿何以謗經如周踧踖自陳不謗帝又謂之如初如周懼出告蔡大寳大寳知其㫖笑謂之曰君當不謗餘經止應不信法華耳如周乃悟後魏廣陵侯衍子融字叔融貌甚短陋衍弟欽字思若位尚書左僕射欽色尤黒故時人號為黒面僕射甄琛形貌短陋尠風儀官至特進侍中北齊荀士遜為中書舎人狀貌甚醜以文辭見用曽有事湏奏值武成在後庭因左右傳通者不得士遜姓名乃云醜舎人武成曰必士遜也看封題果是内人莫不忻笑宋孝王形貌短陋而好臧否人物時論甚疾之唐蘇世長容貌醜陋頗有學識性滑稽言雜諧調隋大業中為都水使者煬帝嘗謂之曰卿面可類駏驉世長再拜呌呼因以手據地蹙額敗面為駏驉之狀羣臣掩口而笑煬帝大恱賜帛百疋歐陽詢為率更令貌甚寢陋而聰悟絶倫貞觀十年文徳皇后䘮百官縗絰詢既醜異衆或指之許敬宗見而大笑為御史大夫所紏李輔國身小貌陋頗知書計位至中書令博陵王盧把貌甚醜面藍色人皆鬼視之為御史中丞時尚父郭子儀病百官造問皆不屏姫侍及聞把至子儀悉令屏去獨隱几以待之把去家人問其故子儀曰把形陋而心險左右見之必笑若此人得權即吾族無類矣王伾順宗在東宫時以侍書幸寢陋而吳語帝所䙝狎焉及即位為左散騎常侍翰林待詔梁羅隠唐末為宰相鄭畋所知隱雖負文稱然貌古而陋畋女幼有文性嘗覽隱詩卷諷誦不已畋疑其女有慕才之意一日隱至第鄭女垂簾而窺之自是絶不詠其詩官至給事中馮行襲面有青痣當時自為馮青面位至許州節度使兼中書令周慕容彦超為兖州節度使彦超即漢髙祖之同産弟也嘗冐姓閻氏體黒胡面故謂之閻崑崙册府元龜卷八百三十五
