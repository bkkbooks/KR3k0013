body:
  text: 册府元龜卷一百六十四宋王欽若等撰帝王部招懐第二後魏宣武景明元年正月齊豫州刺史裴叔業遣子芬之及兄女夫韋伯昕奉表以夀春内附驃騎大將軍彭城王勰車騎將軍王肅率部騎十萬赴之詔曰叔業明敏秀發英頴早悟馳表送誠忠髙振古宜加褒授以彰先覺可使持節散騎常侍都督豫州雍兖徐司五州諸軍事征南將軍豫州刺史封蘭陵郡開國公食邑三千户又賜叔業璽書曰前後使反有勑想􅀸具一二寳卷昏枉日月滋甚虐徧宰輔暴加戚属淫刑既逞朝無孑遺國有瓦觧之形家無自安之計卿兼兹智勇深嘉乃勲前即勑豫州縁邉諸鎮兵馬行往赴援楊大眼奚康王鐡騎五千里言即路彭城王勰尚令肅精卒十萬駱驛繼發將以長驅淮海電擊衡巫卿其并心戮力同斯大舉殊勲茂績職爾之由崇名厚秩非卿孰賞并有勑與州佐使及彼土人士其有㣲功片効必加褒異軍未渡淮叔業病卒芬之以父勲授通直散騎常侍上蔡縣開國伯食邑七百戸叔業爪牙心膂所寄者裴智并授中郎將封浚儀縣王昊左軍將軍封汝隂縣趙革左中郎將封西宋縣叔業姻婭栁𤣥逹輔國將軍封南􅉐縣女夫韋伯昕封雲陵縣竝開國男食邑二百戸𤣥逹頗渉經史初仕齊歴諸王参軍叔業之鎮夀春委以管記及叔業之被猜疑將謀獻欵𤣥逹賛成其計前後表啓皆𤣥逹之辭伯昕叔業以其有大志故遣送子芬之為質李道真右軍將軍陽縣開國子食邑五百戸故文盛右軍將軍封剛陵縣魏承祖右軍將軍封平春縣竝開國子各食邑三百戸以叔業司馬帶汝陰太守李元䕶為輔國將軍齊州刺史廣饒縣伯食邑一千戸便道赴職初叔業歸順元䕶賛同其謀及叔業疾病外内阻貳元䕶督率上下以俟援軍壽春尅定元䕶頗有力焉又以陳郡太守尹挺為輔國將軍南司州刺史譙郡太守楊令空為輔國將軍南兖州刺史皆以叅叔業歸誠之謀也三年三月南齊鄱陽王蕭寳寅以梁高祖既克建業殺其兄弟將害寳寅來奔壽春四月以寳寅為鎮東將軍東陽州刺史封齊王閏四月詔曰寳寅深識機運歸誠有道冐險履屯投命降闕㣲子陳韓亦曷以過也可遣羽林監領主書劉桃符詣彼迎接其資生所須之物及衣冠車馬在京邸館付尚書悉令豫備及至京師帝禮之甚重正始元年詔中山王英所執梁冠軍將軍監司州事蔡靈恩等隨才擢敘永平元年八月冀州京兆王愉反詔赦冀州民雜工役為元愉所詿誤者其能斬獲逆黨别加優賞孝明孝昌元年齊東昏侯寳卷子賛來奔先是梁武滅寳卷寳卷宫人吳氏始孕匿而不言梁武納之生賛以為己子封豫章王及長其母告之以實賛嘗有來奔之意後為南兖徐二州刺史㑹帝遣臨淮王彧討之賛宻告誠欵夜投彧軍至是届于雒陽陛見之後就館舉哀追服三載賛叔父寳寅時在關西遣使觀察聞其形貎斂眉悲感朝廷賞賜豐渥禮遇隆厚授司空封髙平郡開國公丹陽王食邑七千戸是年北鎮降民二千餘萬詔給事黄門侍郎楊昱為使分散於冀定瀛三州就食三年邢杲反於青光之間杲光禄大夫蘭根之甥詔蘭根衘命慰勞孝莊永安中宋廬江太守劉宗之子藻與姊夫李嶷俱來歸賜爵易陽子後廢帝中興二年韓樓反於幽州樓將王懐知其無成隂結所親叛樓歸國拜征虜將軍第一領民酋長武周縣侯是時樓將薛孤延與懐等宻計討樓為樓别帥乙弗醜所覺力戰破醜遂相率歸行臺劉貴表為都督加征虜將軍賜爵永固縣侯出帝永熈三年二月梁假節豫州刺史南香三毛香舉城内附授以持節安南將軍信州刺史義昌王西魏恭帝三年梁將王琳遣使來附以琳為大將軍後周太祖為西魏丞相敗齊神武于沙苑東魏河北郡守裴杲率其宗黨歸闕帝嘉之賜田宅奴婢牛馬什物等叱列伏龜仕東魏為大都督沙苑之敗隨例來降太祖以其豪門解縛禮之仍以邵惠公女妻之史寧仕東魏為凉甘𤓰三州諸軍事遣使詣太祖請事太祖即以所服冠履衣被及弓箭甲矟等賜寧謂其使人曰為我謝凉州孤解衣以衣公推心以委公公其善始令終立功名也賀若統初為東魏潁州長史大統二年執刺史田迅以州降至長安大祖謂統曰卿以潁州從我何日能忘即拜右衛將軍散騎常侍兖州刺史髙賔初仕東魏為立義都督同列有忌其能者譖之於齊神武賔懼及於難大統六年乃棄家属間行歸闕太祖嘉之授安東將軍楊乾運仕梁為車騎將軍鎮潼州令其兄子略將二千人鎮劔閣又遣其壻樂廣鎮安州仍誡略等曰吾欲歸附關中但未有繇耳若有使來即冝盡禮迎接㑹太祖令乾運孫法雒及使人牛伯友等至略即夜送之乾運遂令使人李若等入關送欵太祖乃宻賜乾運鐡劵授持節驃騎大將軍開府儀同三司侍中梁州刺史安康郡公扶猛上甲黄土人初仕梁為南雒北司二州刺史封宕渠縣男及侯景作亂猛乃擁衆自守未有所從大統十七年大將軍王雄定魏興猛率其衆據險為堡壁特遣使㣲通饋餉而已魏廢帝元年魏興叛雄復率師進討猛勒兵拒戰雄擊破之猛遂以衆降太祖以其世據本鄉乃厚加撫納授車騎大將軍儀同三司加散騎常侍復爵宕渠縣男割二郡為羅州以猛為刺史任果南安人梁沙州刺史褒之子世為方隅豪族果性勇决志在立功魏廢帝元年率諸部來附太祖嘉其逺至待以優禮果因面陳取蜀之策太祖深納之乃授使持節車騎大將軍儀同三司大都督散騎常侍沙州刺史後為始州刺史在任未乆果請入謁太祖許之以其方隅首望早立忠節乃進爵樂安郡公席固襄陽人初仕梁為興州刺史以地來附時太祖方欲南取江陵西定蜀漢聞固之至甚禮遇之乃遣使就拜使持節驃騎大將軍儀同三司大都督侍中豊州刺史封新豐縣公邑二千戸後轉湘州刺史固以未經朝謁遂蒙榮授心不自安啓求入覲太祖許之及固至太祖與歡燕賞賜甚厚進爵静安郡公增邑井前三千三百户蕭圓肅梁武陵王紀之子紀建號圓肅守蜀太祖師至遂降封㦸城郡公又以圓肅有歸欵之勲别賜食思君縣五百户收其租稅明帝武成初南齊北豫州刺史司馬蕭雄舉州來附帝遣柱國髙陽公逹奚武與大軍楊忠率衆迎之武帝保定三年詔曰梁汝南王蕭大封晉熈王蕭大圓等梁國子孫冝加優禮式分茅土實允舊章大封可封晉陵縣公大圓可封始寧縣公邑一千戸又加大圓車騎大將軍儀同三司并賜田宅奴婢牛馬粟帛等大封大圓梁簡文子以魏恭帝三年歸太祖至是封焉建德五年十二月帝伐齊丁巳次并州齊主髙緯留從兄延宗等守并州輕騎走鄴是日詔齊王公以下曰夫樹之以君司牧黔首蓋以除其苛慝恤其患害朕君臨萬國志清四海思濟一世之人寘之仁夀之域嗟彼齊趙獨為匪民乃睠東顧載深長想偽主凉德早聞醜聲夙著酒色是耽盤游是悅閹豎居阿衡之任胡人寄脣舌之重棟梁骨鯁翦為仇讎狐趙餘緒降為皁𨽻民不見德唯虐是聞朕懐兹漏網置之度外正欲各静封疆共紓民厲故也爾之主相曽不是思欲構厲階反貽其梗我之率土咸未剚刄帷幄獻兼弱之謀爪牙􅁬干戈之勇嬴粮坐甲若赴私讎是以一鼓而定晉川再舉而摧逋醜偽丞相髙阿那瓌驅逼餘燼􅀼據髙壁偽定南王韓建業作守介休規相抗擬聊示兵威應時奔潰那瓌則單馬宵遁建業則面縳軍和爾之逃卒所知見也若其懐逺以德則爾難以德綏處隣以義則爾難以義服且天與不取道家所忌攻昧侮亡兵之上術朕今親馭羣雄長驅宇内六軍舒斾萬隊啓行勢與雷電爭威氣逐風雲齊舉王師所次已逹近郊望歳之民室家相慶來蘓之后思副厥成偽主若妙盡人謀深逹天命牽牛道左衘璧轅門當惠以焚櫬之恩待以列侯之禮偽將相王公以下衣冠士民之族如有深知事冝建功立効官榮爵賞各有加隆若下愚不移守迷莫改則委之執憲以正刑書嗟爾庶士胡寧自棄或我之將卒逃彼逆胡無問貴賤皆從蕩滌善求多福無貽後悔璽書所至咸使知聞自是齊之將帥降者相繼封其特進開府賀拔伏思為郡國公其餘官爵各有差又詔髙緯及王公以下若釋然歸順咸許自新諸亡入偽朝亦從寛宥官榮次序依例無失其齊制偽令即宜削除鄒魯縉紳幽并騎士一介可稱並冝銓録百年去殺雖或難希朞月有成庶幾可勉六年正月齊平陸𤣥齊大司空騰之子仕齊為奉朝請歴成平縣令齊平武帝見𤣥特加勞勉即拜地官府都上士隋髙祖初為周相後梁蕭巋令鴻臚卿柳莊奉書入關時三方搆難髙祖懼巋有異志及莊還謂莊曰孤昔以開府從役江陵深蒙梁王殊眷今主㓜時艱猥蒙顧託中夜自省實懐慙懼梁主奕葉重光委誠朝廷而今已後方見松筠之節君還本國幸申孤此意于梁主也遂執莊手而别時梁之將軍咸潜請興師與尉廻等為連衡之勢進可以盡節於周氏退可以席卷山南唯巋疑為不可會莊至自長安具申髙祖結託之意巋深以為然衆議遂止唐髙祖初為唐公舉義兵於太原五原太守張長遜遣使歸附帝甚嘉之授光禄大夫封安化郡公及至河東縣賊帥孫華謁帝於汾陽具舟楫以待義師拜華為光禄大夫前軍總􅃹既入關鄭縣令段確以縣來降拜御史大夫渭北賊帥李仲文遣使歸附拜上柱國襲父真爵為普寧鄉公𢎞農賊帥張士貴以所統精兵及戸口簿帳遣使送欵拜右光禄大夫義寧元年十二月河北郡守蕭瑀與梁泉令豆盧寛率郡内文武官歸國授瑀光禄大夫上柱國封宋國公食邑三千戸加寛銀青光禄大夫仍遣河北撫慰二年四月賊帥王君廓以衆歸國拜上柱國假河内太守封常山郡公食邑二千戸尋轉遼州刺史封上谷郡王六月隋安陽令吕珉以相州來降拜相州刺史七月榆林賊帥郭子和遣使來降拜為靈州總管八月凉州賊帥李軌遣使來請降以軌為凉州總管封凉王十月李宻為王世充所敗率衆二萬來降髙祖禮之常呼為弟拜為光禄卿上柱國封邢國公十一月隋東郡丞王軌以滑州來降拜滑州總管十二月隋襄平太守鄧暠以栁城北平二郡來降以暠為營州總管武德二年閏二月辛丑可逹寒賊朱粲遣使請降命前御史大夫段確使於粲王世充將李公逸來降拜上柱國杞州總管陽夏郡公邑二千戸公逸黄人也隋末喪亂與其族弟善行客居雍丘以義勇為人所附初歸王世充知其必敗遂間遣使請降遂有是命因以雍丘置杞州七月海岱賊帥徐圓朗以數州之地遣使請降即授兖州總管是月王世充遣其將羅士信侵糓州士信率其衆千餘人來降世充遣歩騎五千躡之不及帝素聞其勇及是大悅遣使迎勞賜物五千段廪食上音禀下音嗣其所部焉九月王世充將張鎮州侵南陽帝遣使者諭之仍拜鎮州為右武候大將軍是月以和州賊杜伏威為淮南道安撫大使和州總管伏威大業末越王侗以為東道大總管封楚王太宗之圍王世充遣使詔之伏威請降故有是拜三年正月黎州總管李世勣於竇建德中自拔來歸帝大喜遣使迎勞之詔授黎州總管上柱國萊國公尋加右武候大將軍改封曹國公勣本姓徐賜姓李氏賜良田五十頃甲第一區三月以石州賊帥劉季真為石州總管賜姓李氏封彭山郡王四月戊午太宗討劉武周于栢壁其將尉遲敬德與宋金剛來拒王師敬德屯介休帝擊金剛大破之追奔至於介休乃遣宇文士及任城王道宗等往諭敬德遂舉城來降太宗大悅賜以曲宴授秦府統軍六月以和州總管淮南道安撫大使杜伏威為總管江淮以南州諸軍事揚州刺史東南道行臺尚書令上柱國封吳王食邑五百戸賜姓李氏附属籍七月王世充右建威將軍田世開來降帝嘉之待遇甚厚九月甲午王世充將張鎮州來降拜左衛將軍封黄國公食邑三千戸戊申髙開道遣使來降乃下詔曰褒德叙功有國彛訓任賢賞善列代通䂓偽燕王髙開道家本海隅志懐慷慨有隋之末州域彫殘招集徒旅自保邊塞繕修斥候捍禦冦戎民吏肅清倉庫完實既而審逹機變逺慕朝風闔境獻誠歸欵内属清中經略輯寧燕代厥功以茂宜從褒寵禮命之善用超常級可使持節蔚州諸軍事蔚州總管加授上柱國賜姓李氏上籍宗正封北平郡王食邑五千户是月王世充豫州豪右楊仲逹以三州之地來降拜仲逹為上柱國賜食邑三千戸其子行規為豫州總管行模為息州刺史四年正月竇建德行臺尚書令胡大恩以大安鎮來降詔曰疇庸旌善哲王彛訓任賢使能有國通典胡大恩往因隋季夷狄交侵繕甲聚徒輯寧邉境既而阻隔戎冦自保方隅遠慕朝風因機立效摧破凶黨亭徼無虞􅎨䟽闕庭以申誠節忠義克舉冝隆寵命因其所統即加榮秩可使持節代州諸軍事代州總管加授上柱國封定襄郡王食邑五千戸賜姓李氏上属籍宗正五月周法明以蘄春等四郡之地歸國拜黄州刺史封譙郡公初法明依李宻宻敗繇是來降是月竇建德所署右僕射裴矩將建德之妻及傳國大璽來降封矩安邑縣公六月海州賊臧君相以五州來降拜海州總管八月詔曰三楚之地江山遐阻五嶺之表經塗遼􅞅自有隋失馭盗賊交侵聲教莫通方隅隔絶朕受圖膺運君臨區宇率土之濵情均撫字方今函夏寧乂文軌大同尉候無虞要荒率職然而江蠡之派咸阻冦戎閩寓之鄉未聞正朔左武候將軍黄國公張鎮州大將軍合浦縣公張知略二方首族早從歴任思展誠效輯寧州里鎮州可淮南道行軍總管智略可嶺南道行軍總管以安撫之九月甲子偽吳王汪華以黟歙五州之地來降華隋大盗汪寳權之族子也大業末為山賊有兵一萬至是拜歙州總管封越國公丁卯文登賊帥淳子難率衆來降以其地為登州拜難為登州刺史上柱國封萊國公食邑三百戸十二月遣安撫大使李靖徇嶺南諸州皆下之詔襄州道行臺兵部尚書劉瞻綏集嶺南五年二月江南賊帥張善安以䖍吉等五州之地來降拜洪州總管邳國公四月隋鴻臚卿甯長真以寧越欝林之地來降以長真為總管長真世為渠帥其父猛力陳末為太守陳亡猛力自云與叔寳同日生當為天子不肻入朝隋師討之阻瘴不能尅猛力卒以長真為刺史隋師之討林邑也長真攻畢役諸部落得數千人從征遼左煬帝嘉之拜鴻臚卿大業十年遣還嶺表為安撫大使遇隋亡以其地歸於蕭銑帥五越之衆攻丘和於交趾至是來降交趾之道自此始通也五月隋日南太守李晙遣使請降以晙為南德州總管是年七月丁酉隋漢陽太守馮盎以越南之衆來降髙祖以其地為髙羅等八州仍授盎髙州總管累封國公拜其子智載春州刺史智彧東合州刺史尋徙封盎耿國公盎北燕人也初馮𢎞投髙麗也遣其子業以三百人浮海歸宋遇𢎞為魏所滅業留居畨禺之新㑹其孫融梁初仕羅州刺史其子寳娶越女沈氏為妻因為南越首領自融至盎代為牧守隋末髙凉通守沈寳輙反盎擊破之因北吞廣州西并蒼梧南牧朱崖之地自稱總管至是來降嶺表悉定矣郭孝恪隋末率鄉曲數百人附於李宻因與李勣守黎陽宻敗勣令孝恪入朝送欵髙祖授上柱國封陽翟郡公宋州刺史令與李勣經營武牢巴東新德州縣委以選補丘和隋大業末為交趾太守隋滅遂以州從蕭銑及銑平和以海南之地歸國詔使李道裕即授上柱國譚國公交州總管和遣司馬髙士亷奉表請入朝詔許之楊恭仁大業末為宇文化及所署吏部尚書隋至河北為化及守魏縣時元寳藏據有魏郡㑹行人魏徵說下寳藏執恭仁送于京師髙祖甚禮遇之拜黄門侍郎封觀國公李襲志隋末封始安郡公守本郡經二年而無援卒為蕭銑所䧟銑署為工部尚書檢校桂州總管武德初髙祖遣其子𤣥嗣齎書召之襲志乃宻說嶺南首領隨永平郡守李光度與之歸國髙祖又命間使齎書諭襲志曰卿昔述乆在桂州仍属隋室運終四方圯絶率衆保境未知所統朕撫臨天下志在綏育眷彼幽遐思沾聲教况卿朕之宗姓情異於常一家弟姪竝立誠效公又分遣首領申諭諸州情深奉國甚副所望卿之子弟並據州縣俱展誠績每所嘉歎不能已巳今竝入属籍著于宗正張長遜仕隋為五原太守天下大亂遂附於突厥與莫賀咄設結為兄弟以自固突厥號長遜為割利特勤及義兵起遣使歸附髙祖甚嘉之授左光禄大夫封安化郡公李藝隋末為幽州總管聞髙祖踐祚藝謂官属曰建德開道皆劇賊耳宇文化及弑逆無道吾皆不能從之唐公起兵事符衆望入據關右自古必成吾率衆歸之意已决矣㑹唐使張何傳檄至薊藝奉表歸國於是璽書封王賜姓李氏席辯字令言隋末寓居東郡及王世充僣號署辯為左龍驤將軍辯私謂偽將楊䖍安李君義等曰充雖據有雒陽無人君之量大唐已定關中即真主也乃共䖍安君義等遣使入京宻申忠欵髙祖欲發兵攻雒陽潜令以書召辯辯奉書即帥部兵入京李育德趙郡人也祖諤隋通州刺史寓居武陟隋末亂乃繕脩噐械嬰古城以自保逺近多附之王德仁等攻之皆不能克后聞隋滅與河内郡掾柳燮河陽都尉獨孤武都同降李宻以育德為總管及宻為世充所破育德以城歸國拜陟刺史盧祖尚少以俠氣聞為州里所歸属宇文化及之亂遂舉兵據郡國自稱刺史尋附東都越王侗署為光州總管沈國公后遇世充簒位遂與之絶遣使歸國因復其本任封弋陽郡公田留安初為王世充征南將軍大被恩遇然隂謂所親曰吾嘗聞李氏當王天下今長安威德日隆天人所尚吾知歸矣遂率所部二千人來降髙祖大悅拜上柱國雲麾將軍封懐化郡公賜物七百段太宗在藩引為右四統軍從擊宋金剛徐圓朗皆有戰功太宗貞觀元年五月乙丑常安賊帥苑君璋以衆來降拜隰州都督君璋初為劉武周腹心武周又歸突利可汗后見頡利政亂灾異屢起知其必敗乃率所部來降頡利遣兵追躡逆擊走之至太州遣子孝政先入朝以是拜為都督封國公邑三千戸賜帛四十疋十月以嶺南首領馮盎談殿等尚阻兵更相侵掠時議者多請發兵擊之帝不許因遣員外散騎侍郎李公掩持節宣諭之使者所至之處溪洞酋領皆來聽命南方悉定盎遣子智載奉表入朝帝嘉其誠欵賞賜累至拜衛尉少卿九年十二月吐谷渾王慕容順為其下所殺國中大亂乃下詔曰近以吐谷渾恃其遐阻屢擾疆場肆行凶虐種類乖離爰命將士申兹弔伐有征無戰所向摧殄渠魁竄迹自貽滅亡朝威逺暢邉庭靜謐朕君臨寰宇志在含𢎞不欲因彼危亂絶其宗祀乃立偽主之子大寧王慕容順撫招餘燼守其􅃇業而順曽不感恩遽懐二志種落之内人畜怨憤遂創大義即加勦絶雖復權立其子所部又致擾亂競動干戈各行所欲朕憂勞兆庶無隔夷夏廼睠西顧良用矜惕若不星言拯救便恐塗炭未巳兵部尚書潞國公侯君集等咸才兼文武寄深内外嘉謀著於廟堂茂績書於王府必能宣風閫外克定遐方可量其事機綏撫經略分遣使人明加曉諭如有不遵明㫖敢興異志即合精銳隨便翦撲盡威懐之道稱朕意焉十六年正月乙丑遣使往西州撫慰其舊首望有景行淳直者量擬騎都尉以下官奏聞百姓疾患賜醫藥老病惸獨粮食乏絶者咸加賑給十九年六月伐遼東命諸將攻白嵓城臨其西北城主孫伐音請降遂受降帝以白嵓城為嵓州以孫伐音為中大夫守嵓州刺史上輕車都尉賜帛一百疋馬一匹衣襲金帶一同謀而降者竝賜戎秩及諸衣物焉肅宗至德元年七月甲子即位於靈武赦書應逆賊李林甫王鉷楊國忠近親合累者不在免限百姓官吏能率親属去逆歸順有官加其優奬斬得逆賊父子不問首從當錫茅土别有褒崇二年十二月安禄山偽范陽節度使史思明遣使以兵八萬上表來降嘉之授御史大夫兼范陽節度使令便統所部以討殘冦三年正月庚子滄州刺史烏知洽延王傅樊澄竝背逆歸順知洽為雒州刺史澄為凉王傅二月癸夘偽淄青節度太常卿兼御史大夫能元晧及子偽太子家令昱背逆歸順有詔嘉其忠義以元晧為銀青光禄大夫鴻臚卿攝御史大夫充河北招討使子昱朝散大夫守太僕少卿乾元元年三月丁巳逆賊軍將幽州節度副使特進獻誠王阿史那承慶特進左威衛大將軍安守忠左羽林大將軍順化王阿史那從禮蔡希德李庭訓符敬等使人齎表狀歸順詔曰承慶可太保封定襄王守忠可左羽林大將軍封歸德郡王從禮可太傅封歸義郡王希徳可徳州刺史庭訓可邢州刺史敬可雒州刺史十月甲辰帝御宣政殿册成王為皇太子詔大赦天下令餘冦未殄有脅在賊中未歸順者一切不以為罪其受賊節制能以兵降者酬其封爵二年五月丁卯河北破賊生擒賊八人來獻帝竝釋之各賜乾元錢十千文及噐仗一副馬一匹絹一束竝放歸賊中勑之曰任汝所適八人皆刺臂為盟約誓梟賊首以報聖恩九月史思明冦䧟雒陽叔冀守汴州戰不勝與董秦降思明十一月甲子以開府儀同三司兼殿中監董秦封隴西郡開國公食邑三千戸仍賜姓李氏改名忠臣為秦䧟賊歸順故寵之也十月賊將髙庭暉投降自五臺府果毅拜特進兼右武衛大將軍李日越投降授特進兼右金吾衛大將軍員外置同正上元二年正月詔曰比縁冦盗之内干戈脅從白刄臨頸胡寧忍决所以䧟於兇黨苟免者多前後詔書頻已該及其史思明將士及偽署官属等有束身歸順并率衆來降官爵如初一無所問以城邑降者仍别加封爵餘兇黨之流亦同此例天實臨照朕無食言五月甲午逆賊史朝義下偽滑州刺史兼鄭汴等節度使令狐彰斬逆賊大將軍二人并破杏園渡口賊二千餘衆以滑州歸順帝嘉之拜滑州刺史攝御史中丞充滑邢德貝相魏六州節度使仍加銀青光禄大夫九月壬寅赦書其史朝義若能翻然改圖背逆歸順罪無所問加以勲封元年建丑月賊中官游少連蘓茂珍等歸降以少連為驃騎大將軍兼少府監員外置同正員仍封臨雒縣公茂珍為左金吾大將軍員外置同正員仍封扶風縣王代宗寳應元年八月劔南狂賊徐知道麾下將李忠勇殺知道以降劍南州縣盡平帝以忠勇為蜀州刺史封臨晉郡王賞功也十月東都平史朝義逃奔汴州賊將張獻誠不納舉所統兵歸國詔拜汴州刺史充汴宋節度十一月元帥雍王上言偽鎮州節度使張忠至以趙定深鎮易五州歸順拜忠至檢校禮部尚書兼常州刺史充武德軍節度使賜姓李名寳臣廣德二年二月南郊大赦天下所有諸色結聚及羗渾党項等能悔過自陳各歸生業一切竝釋其罪其中有能率先來者仍特加官賞六月癸未詔曰佐命大臣自天所授納于將相委以腹心休戚實同始終無易太保兼中書令靈州大都督府長史單于鎮北副大都䕶充朔方節度關内度支營田鹽池押諸蕃部落副大使知節度事六城水運使兼河中副元帥上柱國大寧郡王懐恩朕之元輔上帝賚予道備五才能包三傑長䇿制敵精誠感神夙奉先朝志平多難援旗朔野扈蹕岐山前驅啓行所指皆克收關河之襟帶復都邑之衣冠以義㫁恩毁家徇國躬擐甲胄驅馳十年遇戰則酣逢堅必脆總統戎旅通和夷狄决䇿東向殱厥渠魁掃清妖氛芟薙逋梗海隅萬里一舉蕩平遂欲息馬投戈坐而論道當朝大政竝以咨之聽賡載之歌為千古之式移軍汾上方欲凱旋疑隙之端搆於羣小浮言初起且以强大自嫌邪説又生或謂功髙不賞以滋淹恤因而況猜撫之若驚諭之未解朕以白日旌信明神鍳心若有負功臣是大欺天下為人君者豈有此乎尋聞聚族而謀知欲垂槖入覲其子猶懐反側更有遷延少年輕佻操履非正私庭跋扈違背君親朔方義師心如父子怒其懐貳遂共梟懸㐫子既誅大軍方擾倉皇奔竄逺在邉州察其深𠂻本無他志蓋縁憂懼遂至於斯眷念之下無忘鍳寐况勲書盟府像列雲臺録功念勞豈以小而累大君臣之義情實如初厚禄榮班固宜仍舊但以河北諸將自竭忠誠朔方三軍已有管属不可更置統領復為節制其先任靈州都督府長史單于鎮北副大都䕶及河北副元帥朔方節度等使冝竝停其太保兼中書令上柱國大寧郡王並如故但當詣闕更復何疑再三言提庶早牽復欲令方寸懸示萬邦爾無我虞朕言不再乆勞于外終必無成收之桑榆殊未為晚甘言之誘王者不為危而悔之將何及矣切令宣示逺副朕懐大厯七年五月制巴南諸州仍歳水旱廹於凍餒或至流離因有剽􅀼苟全性命懼刑網之所及姑嘯聚以相依抑有繇焉蓋非獲已永言其弊用軫于懐如能相率來歸各安生業並無所問咸許自新宣示中外咸使知悉十一月詔如聞巴南道州自頃年以來其有結聚或攻䧟城邑者申明朝㫖曉諭令歸各許自新一切不問庶亦隨材叙用俾效誠勤各復其居勉從所務展歳時伏臘之祀洽宗黨鄰里之懽人之常情當所思慕必在長吏敦率設法安存勸其農耕恤其疾苦如刺史縣令有能政字人民使流亡日還戸口歳益冝委觀察使録狀奏聞當别加超奬宣示士庶令知朕意十一年九月以汴宋節度兵馬使攝節度副使開府儀同三司鴻臚卿兼御史中丞上柱國蕭國公李僧惠為宋州刺史充本州團練守捉使仍封合州郡王食邑三千戸以大中大夫檢校尚書兵部員外郎兼侍御史賜紫金魚袋髙慿為曹州刺史充本州團練守捉使以開府儀同三司攝鄆州刺史石隐金為鄆州刺史充本州鎮遏使仍封雒交郡王食邑三千戸李靈耀之叛也僧惠為之謀主至是相率歸順故有是命册府元龜卷一百六十四
