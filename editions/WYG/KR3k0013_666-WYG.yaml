body:
  text: 冊府元龜卷六百六十六宋王欽若等撰内臣部賢行薦賢忠直才識賢行夫居宫掖之職親日月之光宣達是司出納惟允而乃謙虛繇性仁恕成風清約自居謹厚有裕斯固君子之所尚識者之攸崇者也歴代已還良史所述事行所異斯可觀焉漢北宫伯子姓北宫名伯子孝文時以長者愛人故親近張賀車騎將軍安世之兄孝武時為掖庭令而宣帝以皇曽孫收養掖庭賀内傷太子無辜而曽孫孤㓜所以視養拊循恩甚宻焉後漢鄭衆字季産南陽犨人為人謹敏和帝時為中常侍以誅竇憲功遷大長秋䇿勲班賞毎辭多受少繇是常與議事與音預蔡倫字敬仲桂陽人和帝時為中常侍預參帷幄倫有才學盡心敦敏毎至休沐輙閉門絶賔暴體田野曹騰字季輿沛國譙人安帝時為黃門從官順帝在東宫鄧太后以騰年少謹厚使侍皇太子書特見親愛騰用事三十餘年奉事四帝未嘗有過及為大長秋蜀郡太守因計吏賂遺於騰益州刺史种暠於斜谷關捜得其書上奏太守并以劾騰請下廷尉按罪帝曰書自外來非騰之過遂寢暠奏騰不為纎芥常稱暠為能吏時人嗟美暠後為司徒告賔客曰今身為公乃曹常侍力焉欒巴字叔元魏郡内黃人神仙傳云巴蜀郡人順帝世給事掖庭補黃門令非其好也性質直學覽經典雖在中官不與諸常侍交接良賀順帝時為大長秋清儉退厚陽嘉中詔九卿舉武猛賀獨無所薦引帝問其故對曰臣生自草茅長於宫掖既無知人之眀又未嘗交加士類昔衛鞅因景監以見有識知其不終史記趙良謂鞅曰君之見秦王也因嬖人景監非所以為名也商君卒為秦恵所車裂也今得臣舉者匪榮伊辱辭之吕強字漢盛河南成皋人自小黃門再遷中常侍為人清忠奉公靈帝時例封官以強為都鄉侯辭讓懇惻固不敢當帝乃聼之丁肅濟隂人靈帝時為中官與下邳徐衍南陽郭耽汝陽李廵北海趙祐等五人稱為清忠皆在里巷不爭威權吳伉甘陵人為小黃門博達有奉公稱知不得用嘗托病還寺舍從容養志後魏趙黒字文静凉州人恭謹小心太武使進御膳出入承奉初無過行累遷鎮南大將軍儀同三司定州刺史封河内王克己清儉憂濟公私時有人欲私賂黒曰官髙禄厚足以自給賣公營私本非情願終無所納孫小字茂翹咸陽石安人太武時歴兾州并州刺史所在清約當時牧伯無能及也小之為并州以郭祚為主簿重祚文才兼美任之以書記時人多之張宗之字益宗河南鞏人以忠厚謹慎為侍御中散文成時為東雍州刺史以在官有稱入為内部坐大官張祐字安福安定石唐人以積勞至曹監中給事累遷鎮南將軍尚書左僕射祐性恭宻出入機禁二十餘年未曽有過繇是被孝文恩寵杞嶷字道徳安定石唐人小心慎宻恭以奉上沉跡冗散經十九年後以忠謹被擢累遷中常侍中曹侍御季堅字次夀髙陽易人文眀太后臨朝堅為給事中小心謹慎常在左右仇儼柔和敦敏有長者風孝文太和中為虎牢鎮將王遇宣武初為兼將作大匠廢后馮氏之為尼也公私罕相供恤自以嘗更奉接往來祗謁不替舊敬衣食雜物毎有薦奉后皆受而不讓又至其舘遇夫妻迎送謁伏侍立執臣妾之禮後唐張承業天祐中為太原監軍時盧質在莊宗幕下嗜酒輕傲嘗呼莊宗諸弟為豚犬莊宗深衘之承業恐盧質被禍因乗間謂莊宗曰盧質多行無禮臣請為大王殺之可乎莊宗曰予方招禮賢士以開覇業七哥何言之過也承業因聳立而言曰大王若能如此何憂不得天下其後盧質雖或縱誕莊宗終能容之蓋承業為之藻籍也及莊宗初行墨制凡除拜之命皆成於盧汝弼之手汝弼既自為户部侍郎乃請與承業改官及開國邑承業拒而不受其後終身但稱舊官而已張居翰同光中為樞宻使時内職干政拜官之務皆出於郭崇韜居翰自以覊旅乗時擢居重地毎於宣授不敢有所是非承顔免過而已僞蜀王衍既䧏詔遷其族於雒陽行及秦川時關東已亂莊宗慮衍為變遣中官向延嗣馳騎齎詔殺之詔云王衍一行並宜殺戮其詔已經印畫時居翰在宻地覆視其詔即就殿柱楷去行字改書家字及衍就戮於秦川驛止族其近屬而已其僞官及從行者尚千餘人皆免其枉濫居翰之力也居翰性和而静諳悉舊事在潞州累年毎春課人育蔬種樹敦本恵農有仁者之心焉及眀宗入雒陽居翰謁見於至徳宫待罪雪涕乞歸田里遂還長安焉薦賢古者稽象緯建官名爰設内臣用謹宫戒秦漢仍襲親任以隆傅近帷幄之中受宣機宻之命其有竭節幹用勤心納忠夙懐永圖克藴眀識推擇髦俊以揚于王庭薦述勲賢用熈乎帝載致國富良士野無遺材經濟大猷翊亮鴻業所以能上應四星之象其在是乎勃鞮晉之内臣晉侯問原守於勃鞮勃鞮披也對曰昔趙衰以壺飱從徑餒而弗食言其良且仁不忘君也徑猶行也故使處原從披言也衰雖有大功猶簡小善以進之示不遺勞景監秦孝公之寵臣孝公欲脩繆公之業下令國中求賢者公孫鞅因景監以求見孝公繆賢為趙宦者令時藺相如為其舍人趙恵文王得楚和氏璧秦昭王聞之使人遺趙王書願以十五城請易璧趙王與大將軍亷頗諸大臣謀欲勿與即患秦兵之來計未定求人可使報秦者未得宦者令繆賢曰臣舍人藺相如可使王問何以知之對曰臣嘗有罪竊計欲亡走燕臣舍人相如止臣曰君何以知燕王臣語曰臣常從大王與燕王㑹境上燕王私握臣手曰願結友以此知之故欲往相如謂臣曰夫趙強而燕弱而君幸於趙王故燕王欲結於君今君乃亡趙走燕燕畏趙其勢必不敢留君而束君歸趙矣君不如肉袒伏斧質請罪則幸得脫矣臣從其計大王亦幸赦臣臣竊以為其人勇士有智謀宜可使趙王召相如令使秦秦無意償趙城相如竟全璧而歸後漢雷曙為大長秋所進逹皆海内名人陳留虞放邊韶南陽延固張温宏農耎頴川棠谿趙典等唐吐突承璀自神䇿中尉出為淮南監軍使及徵入復為中尉乃引節度使李鄘為相元和十二年徵拜門下侍郎平章事鄘雖出入顯重素不以公輔自許年侵勢過頗安外鎮登祖筵聞樂而泣且曰宰相之任非吾所長也行頗緩至京師又辭疾歸第既朝謁亦不領政事竟以疾辭罷為户部尚書崔潭峻為荆南監軍使時監察御史元稹謫為江陵府士曹參軍潭峻禮接不以掾吏遇之嘗徵其詩什諷誦之長慶初潭峻歸朝出稹連昌宫詞等百餘篇奏御穆宗大恱問稹安在對曰今為南宫散郎即日轉祠部郎中知制誥後唐張承業為太原監軍天祐中幽州劉守光敗其府掾馮道歸太原承業辟為本院廵官承業重其文章履行甚見待遇時有周元豹者善人倫鍳與道不洽謂承業曰馮生無前程公不可過用管記盧質聞之曰我曽見杜黃裳司空冩真圖道之狀貎酷類焉將來必副大用元豹之言不足信也承業薦為覇府從事焉忠直夫策名委質守節無二便蕃左右盡規竭力皆忠之屬也周官寺人之職蓋所以給事宫掖周旋禁闥出納王命為之宻侍所以親信者焉而有天資直諒居然異禀事君盡禮抗直無撓或託諷以補過或盡言而竭誠以至保持正人申其寃滯輔翼儲貳制其動揺或以成蕩㓂之功或以立去惡之效仗節死難無所顧避史所記皆可稱述焉履鞮晉獻公時人即寺人披一云勃貂又名勃鞮字伯楚獻公使履鞮趣殺公子重耳踰垣履鞮遂斬其衣袪遂奔狄晉恵公立畏重耳乃使履鞮與壯士欲殺重耳重耳聞之遂奔齊後返國大臣吕甥郤芮欲謀殺文公文公不知始嘗欲殺文公鞮知其謀欲以告文公解前罪求見文公文公不見使人讓曰蒲城之事女斬予祛其後我從狄君獵女為恵公來求殺我恵公與女期三日至而女一日至何速也女其念之履鞮曰臣刀鋸之餘不敢以二心事君倍主故得罪於君君已反國其無蒲翟乎且管仲射鈎桓公以覇今刑餘之人以事告而君不見禍又且及矣於是見之管蘇楚人恭王有疾告諸大夫曰管蘇犯我以義遺我以禮為處不安不見不思然而有得焉吾死之後爵之於朝也漢史㳺元帝時為黄門令勤心納忠有所補益後漢鄭衆和帝初自中常侍加位鉤盾令時竇太后秉政后兄大將軍憲等並竊威權朝臣上下莫不附之而衆獨以一心王室不事豪黨帝親信焉蔡倫和帝時為中常侍盡心敦慎數犯嚴顔輔弼得失孫程順帝時自中黃門擢拜騎都尉永建初虞詡為司𨽻校尉中常侍張防毎請託取受詡輙案之而屢寢不報詡乃自繫廷尉奏言防罪防流涕訴帝詡坐論輸左校防欲害之二日之中傳考四獄程與宦者張賢孟叔馬國等知詡以忠獲罪乃相率奏乞事具内臣規諫門時防立在帝後程乃叱防曰姦臣張防何不下殿防不得已趨就東廂程曰陛下急收防無令從阿母求請阿母宋娥也帝問諸尚書尚書賈朗素與防善證詡之罪帝疑焉謂程曰且出吾方思之於是詡子顗與門生百餘人舉幡候中常侍髙梵車叩頭流血訴言枉狀梵乃入言之防坐徙邊賈朗等六人或死或黜即日赦出詡吕強靈帝時為中常侍中平元年黃巾賊起帝問強所宜施行強欲先誅左右貪濁者大赦黨人料簡刺史二千石能否帝納之乃先赦黨人於是諸常侍人人求退又各自徵還宗親子弟在州郡者中常侍趙忠夏惲等共搆強云與黨人共議朝廷數讀霍光傳強兄弟所在貪穢帝不恱使中黃門持兵召強強聞帝怒曰吾死亂起矣丈夫欲盡忠國家豈能對獄吏乎遂自殺後魏趙黒獻文時為侍中帝將傳位京兆王子推訪諸羣臣百官唯唯莫敢亢言者唯源賀等辭義正直不肯奉詔帝怒變色復以問黒黒曰臣愚無識信情率意伏惟陛下春秋始富如日方中天下恱其盛眀萬物懐其光景元元之心願終萬嵗若聖性淵逺欲頥神味道者臣黒以死奉戴皇太子不知其他獻文黙然良久遂傳祚於孝文黒得幸两宫禄賜優厚是時尚書李訢與黒對綰選部訢奏中書侍郎崔鍳為東徐州北部主書郎孫處顯為荆州選部監公孫處為幽州皆曰有能也實有私焉黒嫉其虧亂選體遂爭於殿庭杞嶷孝文時自中常侍遷中曹侍御尚書自總納言職當機近諸所奏議必致抗直後為涇州刺史從駕南征嘗參侍左右以嶷耆老毎見勞問數追稱嶷之正直劉鵬與王質等俱為中官孝文遷雒鵬嘗為宫官幽后之惑薛菩薩鵬宻諌止之不從遂發憤而卒張景嵩毛暢孝明時俱為黃門毎承間陳元乂之惡於帝元乂之出景嵩暢頗有力焉靈太后反政以妹故未即戮乂元乂太后妹夫也時内外喧喧云乂還入知事暢等恐禍及已乃啟帝欲詔右衛將軍楊津宻往殺乂詔書已成未及出乂妻知之告太后云景嵩暢與清河王息邵欲廢太后太后信之責暢暢出詔書草以呈太后讀之知無廢已狀意為小解然乂妻搆之不已遂致疑惑未㡬出暢為頓丘太守後復出景嵩為魯郡太守北齊田敬宗為中官後主之奔青州遣其西出參伺動静為周所獲問齊主何在紿云已去毆捶服之每折一體辭色愈厲竟斷四體而卒唐竇文塲德宗初為中官涇師之亂帝召禁軍禦賊並無至者唯文塲及宦官霍仙鳴率諸中官及親王左右從行劉貞亮貞元末為宦官性忠直蹈義順宗寢疾翰林學士王叔文欲奪宦者兵權毎中官李忠言宣命内臣無敢言者唯貞亮建議與之爭知其朋徒日熾慮隳朝政乃與中官劉光琦薛文珍尚衍解至等謀奏請立廣陵王為皇太子勾當軍國大事及太子受禪盡逐叔文之黨政事悉委舊臣時議嘉貞亮之忠藎累遷右衛大將軍知内侍省事景忠信為中使元和中宣武軍節度使韓宏為平淮西都統諸軍使齊力攻討賊嘗徑攻烏重裔之壘重裔禦之中數搶馳請救於忠武李光顔以小溵橋賊之保也乗其無備使大將軍田頴宋朝隱襲而取之遂平其城塹繇是不克救重裔宏以光顔違令取頴及朝隱將戮之頴及朝隱勇而材軍中皆惋惜之光顔畏宏不敢留㑹忠信至知其情乃矯詔令所在城繫之走馬入見具其本末聞憲宗赦忠信矯詔罪即往釋頴及朝隱馬存亮為内飛龍使神策軍衙前虞候豆盧著狀告宰相宋申錫與漳王謀反中尉王守澄將以二百騎就靖恭里屠申錫之家存亮同入見爭於帝前曰今謀反者申錫爾何不召南司他相㑹議今卒然如此京師企足自亂矣守澄不能難乃止楊復光乾寕中為内侍巢宼之亂復光監忠武軍屯於鄧州以遏賊衝京師䧟賊節度使周岌授僞命賊使往來旁午岌嘗夜宴急召復光左右曰周公歸賊必謀害内侍不如勿往復光曰事勢如此義不圖全即赴之酒酣岌言及本朝事復光因泣下良久曰丈夫所感者恩義所趣者利害如不顧恩義不規利害非夫也公自匹夫享公侯之貴而舍十八葉天子而北靣臣賊何恩義利害之可言乎聲淚俱發岌亦為之流涕岌曰岌不能獨力拒賊貎奉而已而心圖之故召公言事瀝酒為盟是夜復光乃遣其假子貲守亮殺賊使於傳舍後唐張承業為太原監軍武皇屬以後事曰吾兒孤弱羣庶縱橫後事公善籌之承業奉遺顧援立嗣主平内難䇿略居多莊宗深感其意兄事之親幸承業私第時貞簡太后韓徳妃伊淑妃諸宅王之貴介弟在晉陽宫或不以其道干於承業悉不聼踰法禁者必懲繇是貴戚歛手民俗不變或有中傷承業於莊宗者言專弄威柄廣納賂遺莊宗嵗時還晉陽宫省太后湏錢蒲博給伶官嘗置酒於泉府莊宗酒酣命興聖宫使李繼岌為承業起舞既竟承業出寳帶幣馬奉之莊宗指錢積謂承業曰和哥繼岌小字和哥無錢使七哥七哥謂承業也與此一積寳馬非殊恵也承業謝曰郎君歌舞承業自出已俸錢此錢是大王庫物准擬支贍三軍不敢以公物為私禮也莊宗不恱使酒侵承業承業曰臣老勑使非為子孫之謀惜錢為大王基業王若自要散施何訪老夫不過財盡兵散一事無成莊宗怒顧元行欽曰取劍來承業引莊宗衣泣而言曰僕荷先王遺顧誓為本朝誅汴賊王為惜庫物斬張承業首死亦無愧於先王今日請死閻寳解承業手令退承業詬寳曰黨温逆賊未嘗有一言効忠而敢依阿謟附揮拳踣之太后聞莊宗酒失急召入莊宗性至孝聞太后召叩頭謝承業曰吾杯酒之間忤於七哥太后必怪吾七哥為吾痛飲两巵分謗可乎莊宗連飲四鍾勸承業竟不飲莊宗歸宫太后使人謂承業曰小兒忤特進已笞矣可歸第翌日太后與莊宗俱幸其第慰勞之焦彦賔為西川監軍使在同光世有軍功守道忠正為巷伯之英秀才識語曰之才之美又曰多學而識若乃位居丹禁職重内庭性識通眀學術優異或精於眀法或審於音律或知星而察變或制藝以濟時信為道不羣故希世而可貴者也秦趙髙始皇聞髙強力通於獄法舉以為中軍府令受詔敎習胡亥使學以法事漢趙談文帝時宦者以星氣幸李延年中山人武帝時給事狗監中主獵犬也善歌為新變聲是時帝方興天地祠欲造樂令司馬相如等作詩頌延年輙承意弦歌所造詩謂之新聲曲宏恭宣帝時為中黃門眀習法令故事史㳺元帝世為黃門令作急就一篇後漢蔡倫和帝時為中常侍有才學自古書契多編以竹簡其用縑帛者謂之為紙縑貴而簡重並不便於人倫乃造意用樹膚麻頭及敝布魚網以為紙元興元年奏上之帝善其能自後莫不從用焉故天下咸稱蔡侯紙元初四年帝以經傳之文多不正定乃選通儒謁者劉珍及博士良史詣東觀各讐校漢家法令倫監典其事李延靈帝時為中官以為諸博士試甲乙科事第髙下更相告言至有行賂定蘭臺漆書經字以合其私文者乃白帝與諸儒共刻五經文於石於是詔蔡邕等正其文字自後五經一定爭者用息趙祐為中官博學多覽著作校書諸儒稱之吳伉為小黃門善為風角博達事奉公稱之後魏劇鵬孝文時為給事中粗通經史閑曉文事王質頗解書學為中曹吏内典監累遷至大長秋賈粲頗渉書記宣武末漸被知識得充内任北齊田敬宗年十四五便好讀書既為門侍伺隙便周章詢請每至文林舘氣喘汗流問書之外不暇他語及觀古人節義事未嘗不感激沉吟顔之推重其勤學甚加開奬後遂通顯唐李輔國粗知書計為僕事髙力士年且四十餘令掌閑廐簿籍孫知古為内侍初田承嗣於魏州為安禄山史思眀父子立祠宇知古因使宣慰潜諷承嗣遽毁除之知古使還具以聞以承嗣同平章事奬之也魚朝恩天寳末入内侍省性黠慧善宣荅通書計楊復恭㓜入内侍省知書有學術累遷至觀軍容使冊府元龜卷六百六十六
