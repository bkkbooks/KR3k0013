body:
  text: 冊府元龜卷五百七十三宋王欽若等撰掌禮部奏議夫禮者因人之情而為之節文以為人防也故王者必斟酌前典講求遺範順時施宜有所損益故曰三王異代不相襲禮若夫改正朔易服色建廟社以脩祭法卜郊兆以定神位崇徽號以謹制度稽舊章而興禮樂廵幸以展義封禪以告成負扆而朝諸侯拆爼而宴羣后升䧏上下之數周旋裼襲之制斯固從大夫之後参外庭之議者皆得以考其質文参其隆殺取稽古之理叶隨時之義然後奏之於天子者矣漢氏而下咸可徴焉觀其揚㩁故實援述經義極討論之致究質文之辯非多聞彊識之士疇足以稱之哉漢賈誼文帝時為大中大夫以為漢承秦之敗俗廢禮義損亷耻今其甚者殺父兄盗者取廟噐而大臣特以簿書不報期㑹為故特但也言公卿但以文案簿書報答為事也至於風俗流溢恬而不怪恬安也謂心以為安以為是適然耳言正當如此非失道也夫移風易俗使天下囘心而鄉道鄉讀曰嚮類非俗吏之所能為也夫立君臣等上下使綱紀有序六親和睦六親謂父子從父昆弟從祖昆弟曽祖昆弟族昆弟也此非天之所為人之所設也人之所設不為不立不脩則壊為作也漢興至今二十餘年宜定制度興禮樂然後諸侯軌道百姓素樸獄訟衰息軌道言尊道猶車行之依軌轍也廼草具其儀草謂草創也立其事也天子說焉而大臣綘灌之属害之故其儀遂寝綘謂綘侯周勃也灌謂灌嬰也王吉宣帝時為諫大夫上疏言欲治之主不世出言時時一出而難常遇公卿幸得遭遇其時未有建萬世之長䇿舉明主于三代之隆者也其務在于簿書斷獄訟而已此非太平之基也今俗吏所以牧民者非有禮義科指可世世通行者也以意穿鑿各取一切苟順一時非正道是以詐偽萌生刑罰無極質樸日消恩愛寝薄寝古浸字漸也孔子曰安上治民莫善於禮非空言也願與大臣延及儒生述舊禮明王制驅一世之民躋之仁夀之域言以仁道治之皆得其性則夀考也域界也則俗何以不若成康何以不若髙宗成康周之二王太平之時也髙宗殷王武宗享國五十九年故曰夀之者也帝不納其言吉以病去貢禹元帝時為御史大夫初髙祖時令諸侯王都皆立太上皇廟至惠帝尊髙帝廟為太祖廟景帝尊孝文廟為太宗廟行所甞幸郡國各立太祖太宗廟至宣帝本始三年復尊孝武廟為世宗廟行所廵狩亦立焉凡祖宗廟在郡國六十八合百六十七所六十八者郡國之類也百六十七所宗廟之數者也而京師自髙祖下至宣帝與太上皇悼皇考各自居陵旁立廟悼皇考者宣帝之父并為百七十六又園中各有寝廟便殿便殿者非正大之處寝者陵上正殿若平生露寝矣便殿者寝之别殿耳日祭於寝月祭於廟時祭於便殿寝日四上食廟嵗二十五祠漢儀注宗廟一嵗十二祠五月嘗麥六月七月三伏立秋貙婁又嘗粢八月先夕饋飱皆一太牢酎祭用九太牢十月嘗稻又飲蒸二太牢十月甞十二月臘二太牢又毎月一太牢如閏加一祠與此上十二為二十五祠便殿嵗四祠又月一游衣冠而昭靈后武哀王昭哀后孝文太后孝昭太后衞思后戾太子戾后各有寝園與諸帝合凡三十所一嵗祠上食二萬四千四百五十五用衞士四萬五千一百二十九人祝宰樂人萬二千一百四十七人養儀牲卒不在數中至是禹奏言古者天子七廟今孝惠孝景廟皆親盡宜毁及郡國廟不應古禮宜正定天子是其議未及施行而禹卒韋𤣥成為丞相永光四年詔曰朕聞明王之御世也遭時為法因事制宜往者天下初定逺方未賔因甞所親以立宗廟親謂親臨幸處也蓋建威銷萌一民之至權也今頼天之靈宗廟之福四方同軌蠻貊貢職乆遵而不定令䟽逺卑賤共承尊祀共字讀曰恭殆非皇天祖宗之意朕甚懼焉傳不云乎吾不與祭如不祭其與將軍列侯中二千石諸大夫博士議丞相𤣥成御史大夫鄭𢎞太子太傅嚴彭祖少府歐陽地餘諫大夫尹更始等七十人皆曰臣聞祭非自外至者也繇中出生於心也繇讀與由同故惟聖人為能饗親立廟京師之居躬親承事四海之内各以其職來助祭尊親之大義五帝三王所共不易之道也詩云有來雍雍至止肅肅相維辟公天子穆穆周頌雍篇禘太祖之詩也春秋之義父不祭於支庻之宅君不祭於臣僕之家王不祭於下士諸侯臣等愚以為宗廟在郡國宜無脩臣請勿復脩奏可因罷昭靈后武哀王昭哀后衞思后戾太子戾后園皆不奉祠裁置吏卒守焉罷郡國廟後月餘復下詔曰蓋聞明王制禮立親廟四祖宗之廟萬世不毁所以明尊祖敬宗著親親也朕獲承祖宗之重惟太禮未備戰栗恐懼不敢自顓顓專同其與将軍列侯中二千石二千石諸大夫博士議𤣥成等四十四人奏議曰禮王者始受命諸侯始封之君皆為太祖以下五廟而迭毁毁廟之主藏乎太祖五年而再殷祭言一禘一祫也殷大也禘諦也一一祭之也祫合也禘音大系切祫音洽祫祭者毁廟與未毁廟之主皆合食于太祖父為昭子為穆孫復為昭古之正禮也祭義曰王者禘其祖自出以其祖配之而立四廟言始受命而王祭天以其祖配而不為立廟親盡也立親廟四親親也親盡而迭毁親䟽之殺示有終也殺斬䧏也殺所列切周之所以七廟者以后稷始封文王武王受命而王是以三廟不毁與親廟四而七非有后稷始封文武受命之功者皆當親盡而毁成王成二聖之業制禮作樂功德茂盛廟猶不世以行為謚而已謂之成王是則以行表謚也禮廟在大門之内不敢逺親也逺難也音于萬切臣愚以為髙帝受命定天下宜為帝者太祖之廟世世不毁承後屬盡者宜毁今宗廟異處昭穆不序宜入就太祖廟而序昭穆如禮太上皇孝惠孝文孝景廟皆親盡宜毁皇考廟親未盡如故悼皇考于元帝祖也大司馬車騎将軍許嘉等二十九人以為孝文皇帝除誹謗去肉刑躬節儉不受獻罪人不孥不私其利重罪之人不及妻子是不私其利也出美人重絶人類賔賜長老牧恤孤獨德厚侔天地利澤施四海宜為帝者太宗之廟廷尉忠以為孝武皇帝改正朔易服色攘四夷宜為世宗之廟諫大夫更始等十八人以為皇考廟上序于昭穆非正禮宜毁于是上重其事依違者一年乃下詔曰蓋聞王者祖有功而宗有德尊尊之大義也存親廟四親親之至恩也髙皇帝為天下誅暴除亂受命而帝功莫大焉孝文皇帝國為列王諸呂作亂海内揺動然羣后黎庻靡不一意北靣而歸心猶謙辭固譲而后即位削亂秦之迹興三代之風是以百姓晏然咸獲嘉福莫盛焉髙皇帝為漢太祖孝文皇帝為太宗世世承祀傳之無窮朕甚樂之孝宣皇帝乃為孝昭皇帝後於義一體一體謂俱為昭也禮祖與孫俱為昭帝之于昭帝為從孫故云于義一體孝景皇帝廟及皇考廟皆親盡其正禮儀𤣥成等奏曰祖宗之廟世世不毁繼祖以下五廟而迭毁今髙皇帝為太祖孝文皇帝為太宗孝景皇帝為昭孝武皇帝為穆孝昭皇帝與孝宣皇帝俱為昭皇考廟親未盡太上孝惠廟皆親盡宜毁太上廟主宜瘞園孝惠皇帝為穆主遷於太祖廟寝園皆無復脩奏可議者又以為清廟之詩交神之禮無不清静清廟周頌祀文王之詩其詩云於穆清廟肅雍顯相又曰對越在廟天駿奔走在今衣冠出㳺有車騎之重風雨之氣非所謂清靜也祭不欲數數則瀆瀆則不敬宜復古禮四時祭於廟諸寝園日月間祀皆可勿復脩間音工莧切上亦不改也明年𤣥成復言古者制禮别尊卑貴賤國君之母非適不得配食則薦於寝適讀曰嫡身沒而已陛下躬至孝承天心建祖宗定迭毁序昭穆大禮既定孝文太后孝昭太后寝祠園宜如禮勿復脩奏可匡衡為丞相元帝寝疾夢祖宗譴罷郡國廟上少弟楚孝王亦夣焉帝詔問衡議欲復之衡深言不可帝疾乆不平衡惶恐禱髙祖孝文孝武廟曰嗣皇孫皇帝共承洪業夙夜不敢康寕思育休烈以章祖宗之盛功故動作接神必因古聖之經往者有司以為前因所幸而立廟将以繫海内之心非為尊祖嚴親也今頼宗廟之靈六合之内莫不附親廟宜一居京師天子親奉郡國廟可止母脩皇帝祗肅舊禮尊重神明即告于宗祖而不敢失不敢失禮今皇帝有疾不豫廼夢祖宗見戒以廟楚王夢亦有其序皇帝悼懼即詔臣衡復脩立謹按上世帝王承祖禰之大義皆不敢不自親郡國吏卑賤不可使獨承又承祀之義以民為本間者嵗數不登百姓困乏郡國廟無以脩立禮㓙年則嵗事不舉以祖禰之意為不樂是以不敢復如誠非禮義之中違祖宗之心咎盡在臣衡當受其殃大被其疾隊隊讀曰墜在溝瀆之中皇帝至孝肅慎宜􅂪祐福惟髙皇帝孝文皇帝孝武皇帝省察右饗皇帝之孝開賜皇帝眉夀亡疆令所疾日瘳平復反常永保宗廟天下幸甚又告謝毁廟曰往者大臣以為在昔帝王承祖宗之休典取象於天地天序五行人親五属五属謂同族之五服斬衰齊衰大功小功緦麻也天子奉天故率其意而尊其制是以禘甞之序靡有過五受命之君躬接于天萬世不堕繼烈以下五廟而遷墮毁也音火規切上陳太祖間嵗而祫其道應天故福禄永終太上皇非受命而属盡義則當遷又以為孝莫大於嚴父故父之所尊子不敢不承父之所異子不敢同禮父子不得為母信為後則於子祭於孫止不得信尊其母也公子去其所而為太宗後尚得私祭其母為孫即止不得祭公子母也明繼祖不復顧其私祖母也信讀曰申尊祖嚴父之義也寝日四上食園廟間祠皆可亡脩皇帝思慕悼懼未敢盡從惟念髙皇帝聖德茂盛受命􅄎将欽若稽古承順天心􅄎廣也将大也欽敬也若善也稽考也商頌烈祖之篇堯曰我受命溥将虞書堯典曰欽若昊天又曰若稽古帝故衡總引之子孫本支陳錫亡疆詩大雅文王之篇曰陳錫哉周侯文王孫子文王孫子本支百世陳敷也哉始也本本宗也支支子也言子孫承受敷錫初始之福故得永乆無窮竟也誠以為遷廟合祭乆長之䇿髙帝之意廼敢不聽即以令日令善也謂吉日也遷太上孝惠廟孝文太后孝昭太后寝将以昭祖宗之德順天人之序定亡窮之業今皇帝未受此福乃有不能共職之疾共讀曰恭皇帝願復脩立承祀臣衡等咸以為禮不得于禮不合如不合髙皇帝孝惠皇帝孝文皇帝孝武皇帝孝昭皇帝孝宣皇帝太上皇孝文太后孝昭太后之意罪盡在臣衡等當受其咎今皇帝尚未平詔中朝臣具復毁廟之文臣衡中朝臣咸復以為天子之祀義有所斷禮有所承違統背制不可以奉先祖皇天不祐鬼神不饗六藝所載皆言不當無所依縁以作其文事如失措罪乃在臣衡深受其殃皇帝宜厚蒙其福祉嘉氣日興疾病平復永保宗廟與天亡極羣生百神有所歸息諸廟皆同文乆之上疾連年遂盡復諸所罷寝廟園皆脩祀如故初上定迭毁禮獨尊孝文廟為太宗而孝武廟親未盡故未毁上於是廼復申明之曰孝宣皇帝尊孝武廟曰世宗損益之禮不敢有與焉與讀曰預下同他皆如舊制唯郡國廟遂廢成帝即位衡奏言前以上體不平故復諸所罷祠卒不􅂪福按衞思后戾太子戾后園親未盡孝惠孝景廟親盡宜毁及太上孝文孝昭太后昭靈后昭哀后武哀王祠請悉罷勿奉奏可衡又與御史大夫張譚奏言帝王之事莫大乎承天之序承天之序莫重於郊祀故聖王盡心極慮以建制祭天於南郊就陽之義也瘞地於北郊即隂之象也祭地曰瘞薶天之於天子也因其所都而各饗焉往者孝武皇帝居甘泉宫即於雲陽立㤗畤祭於宫南今帝幸長安郊見皇天及北之太隂祠后土及東之少陽事與古制殊又至雲陽谿谷中阨狹且百里汾隂則渡大川有風波舟楫之危皆非聖主所宜數乘郡縣治道共張吏民困苦共音居用切張讀曰帳百官煩費勞所保之民保飬也行危險之地難以奉神靈而祈福祐殆未合於承天子民之意昔者周文武郊於豐鄗成王郊於雒邑由此觀之天隨王者所居而饗之可見也甘泉秦畤河東后土之祠宜可徙置長安合于古帝王願與羣臣議定奏可大司馬車騎將軍許嘉等八人以為所從來乆逺宜如故右將軍王商博士師丹議郎翟方進等五十人以為禮記曰燔柴于太壇祭天也瘞薶於太折祭地也太折為于壇所析地為方澤之形也兆於南郊所以定天位也祭地於大折在北郊就隂位也郊處合在聖王所都之南北書越三日丁巳用牲于郊牛二周公加牲吿徙新邑定郊禮於雒明王聖主事天明事地察天地明察神明章矣天地以王者為主故聖王制祭天地之禮必于國郊長安聖主之居皇天所觀視也甘泉河東之祠非神靈所饗宜徙就正陽太隂之處違俗復古循聖制定天位如禮便於是衡譚奏議曰陛下聖德聰明上通聰與怱同承天之大典覽羣下使各悉心盡慮議郊祀之處天下幸甚臣聞廣謀從衆則合于天心故洪範曰三人占則從二人言言少從多之議也論當往古宜于萬民則依而從之違道寡與則廢而不行今議者五十八人其五十人言當徙之義皆著于經傳同于上世便于吏民八人不按經藝考古制而以為不宜無法之議難以定吉凶太誓曰正稽古立功立事可以永年丕天之大律詩曰毋曰髙髙在上陟䧏厥士日監在兹言天之日監王者之處也又曰廼眷西顧此維予宅言天以文王之都為居也宜如長安定南北郊為萬世基天子從之既定衡言甘泉㤗畤紫壇八觚宣通象八方五帝壇周環其下又有羣神之壇以尚書禋六宗望山川徧羣神之義紫壇有文章采鏤黼黻之飾及玉女樂漢書儀云祭天用綵綺席六重用玉几飾噐凡七十女樂即使童男女俱歌也石壇僊人祠瘞鸞路騂駒寓龍馬不能得其象於古臣聞郊柴壇饗帝之義掃地而祭上質也歌大吕舞雲門以祀天神歌大簇舞咸池以祀地祗其牲用犢其席蒿稭音革其噐陶匏皆因天地之性貴誠上質不敢脩其文也以為神祗功德至大雖脩精㣲而備庻物猶不足以報功惟至誠為可故上質不飾以章天德紫壇偽飾女樂鸞路騂駒龍馬石壇之属宜皆勿脩衡又言王者各以其禮制事天地非因異世所立而繼之今郊雍鄜宻上下畤本秦侯各以其意所立非禮也秦文公宣公所立漢興之初儀制未及定即且因秦故祠立北畤今既稽古建定天地之大禮郊見上帝青赤白黄黒五方之帝皆畢陳各有位饌祭祀備具諸侯所妄造王者不當長遵北畤未定時之所立不宜復脩天子皆從焉及陳寳祠由是皆罷平當成帝時為博士時謁者常山王禹世受河間樂能說其意其弟子宋曅等上書言之曅音于折切下大夫博士等議當以為漢承秦滅道之後頼先帝聖德博受兼聴脩廢官立大學河間獻王聘求幽隠脩興雅樂以助時化時大儒公孫𢎞董仲舒等皆以為音中正雅立之大樂春秋鄉射作於學官希濶不講講謂論習故自公卿大夫觀聽者但聞鏗鎗不曉其意而欲以風諭衆庻其道無由風化也是以行之百有餘年德化至今未成曅等守習孤學大指歸於興助教化衰㣲之學興廢在人宜領属雅樂以繼絶表㣲表顯也孔子曰人能𢎞道非道𢎞人河間區區小國籓臣區區小貌以好學脩古能有所存存意于禮樂民到于今稱之况於聖主廣被之資被猶覆也脩起舊文放鄭近雅述而不作信而好古于以風示海内揚名後世誠非小功小美也事下公卿以為乆逺難分明當議復寝劉向成帝時為中壘校尉揵為郡於水濵得古磬十六枚濵水涯也議者以為善祥向因是說上宜興辟雍設庠序陳禮樂隆雅頌之聲盛揖譲之容以風化天下如此而不治者未之有也或曰不能具禮或曰者劉向設為難者之言而后答釋也禮以養人為本如有過差是過而養人也過差謂失錯也刑罰之過或至死傷今之刑非臯陶之法也而有司請定法削則削筆則筆削者謂有所削去以刀削簡牘也筆者謂有所増益以筆就而書也救時務也至於禮樂則曰不敢是敢於殺人不敢於養人也為其爼豆管絃之間小不備因是絶而不為是去小不備而就大不備惑莫甚焉大不備者事之虧失莫甚于此夫教化之比於刑法刑法輕是舍所重而急所輕也舍廢也且教化所恃以為治也刑法所以助治也今廢所恃而獨立其所助非所以致太平也自京師有誖逆不順之子孫誖乖也音布内切至於䧟大辟受刑戮者不絶繇不習五常之道也繇與由同五常仁義禮智信人性所常行之也夫承千載之衰周繼暴秦之餘弊民漸漬惡俗貪饕險詖不閑義禮貪甚曰饕言行險曰詖饕音土髙切詖音彼義切不示以大化而獨敺以刑罰終已不改敺與驅同故曰道之以禮樂而民和睦孝經注孔子之言也初叔孫通将制定禮儀見非於齊魯之士然卒為漢儒宗業垂后嗣斯成法也成帝以向言下公卿議㑹向病卒丞相大司空奏請立辟雍案行長安城南營表未立而哀帝即位乃止師丹為大司空哀帝即位成帝母稱太皇太后成帝趙皇后稱皇太后而上祖母傳太后與母丁后皆在國邸自以定陶共王為稱髙昌侯董宏上書言秦荘襄王母本夏侯氏而為華陽夫人所子荘襄王始皇之父也華陽夫人孝文王之夫人也子謂養以為子也及即位後俱稱太后宜立定陶共王后為皇太后事下有司時丹以左将軍與大司馬王莽共劾奏宏知皇太后至尊之號天下一統而稱引亡秦以為比喻詿誤聖朝非所宜言大不道上新立謙讓納用莽丹言免宏為庻人傅太后大怒要上欲必稱尊號上於是追尊定陶共王為共皇帝尊傅太后為共皇太后丁后為共皇后郎中令冷褒黄門郎叚猶等復奏言冷音零定陶共皇太后共皇后皆不宜復引定陶籓國之名以冠大號車馬衣服宜皆稱皇之意皇者至尊之號其服御宜皆副稱之也稱音尺孕切置二千石以下各共其職謂詹事太僕少府等衆官也又宜為共皇立廟京師帝復下其議有司皆以為宜如褒猶言丹議獨曰聖王制禮取法於天地故尊卑之禮明則人倫之序正人倫之序正則乾坤得其位而隂陽順其節人主與萬民俱蒙福祐尊卑者所以正天地之位不可亂也今定陶共皇太后共皇后以定陶共為號者母從子妻從夫之義也欲立官置吏車服與太皇太后竝非所以明尊卑亡二上之義也定陶共皇號謚已前定議不得復改禮父為士子為天子祭以天子其尸服以士服子亡爵父之義尊父母也為人後者為之子故為所後服斬衰三年而䧏其父母朞明尊本祖而重正統也孝成皇帝聖恩深逺故為共王立後奉承祭祀今共皇長為一國太祖萬世不毁恩義以備陛下既繼體先帝特重大宗承宗廟天地社稷之祀義不得復奉定陶共皇祭入其廟今欲立廟於京師而使臣下祭之是無主也又親盡當毁空去一國㤗祖不墮之祀墮亦毁也音大惟切而就無主當毁不正之禮非所以尊厚共皇也丹由是浸不合帝意孔光哀帝時為丞相與大司空何武奏言永光五年制書髙皇帝為漢太祖孝文皇帝為太宗建昭五年制書孝武皇帝為世宗損益之禮不敢有與臣愚以為迭毁之次當以時定非令所為擅議宗廟之意也臣請與羣臣雜議奏可於是光禄勲彭宣詹事滿昌博士左咸等五十三人皆以為繼祖宗以下五廟而迭毁後雖有賢君猶不得與祖宗竝列子孫雖欲褒大顯掦而立之鬼神不饗也孝武皇帝雖有功烈親盡宜毁太僕王舜中壘校尉劉歆議曰臣聞周室既衰四夷竝侵獫狁最強於今匈奴是也至周宣王而伐之詩人美而頌之曰薄伐獫狁至於太原小雅六月之詩也薄伐言逐出之又曰嘽嘽推推如霆如雷顯允方叔征伐獫狁蠻荆來威小雅采芑之詩也嘽嘽衆也推推盛也顯明也允信也方叔周之卿士為将率也言出師衆盛有如雷霆方叔又能信明其德既伐獫狁懲其侵暴則南荆之蠻亦威畏而來服也嘽音他丹切推音他回切故稱中興其至幽王犬戎來伐殺幽王取宗噐宗噐宗廟之噐也自是之後南夷與北夷交侵中國不絶如綫綫縷也音思薦切春秋紀齊桓公南伐楚北伐山戎孔子曰㣲管仲吾其被髮左祍矣左祍夷狄之服言無管仲在齊征討則皆将為戎狄也是故棄桓之過而録其功以為伯首伯讀曰霸及漢興冐頓始強破東胡禽月氐氐讀曰支并其土地地廣兵強為中國害南越尉佗總百粤自稱帝故中國雖平猶有四夷之患且無寧嵗一方有急三靣救之是天下皆動而被其害也孝文皇帝厚以貨賂與結和親猶侵暴無已甚者興師十餘萬衆近屯京師及四邉嵗發屯備虜其為患乆矣非一世之漸也諸侯郡守連匈奴及百粤以為逆者非一人也匈奴所殺郡守都尉略取人民不可勝數孝武皇帝愍中國罷勞無安寕之時罷讀曰疲乃遣大将軍驃騎伏波樓舩之属南滅百粤起七郡北攘匈奴䧏昆邪十萬之衆昆音下門切置五属國起朔方以奪其肥饒之地東伐朝鮮起𤣥莬樂浪以斷匈奴之左臂樂音來各切浪音郎西伐大宛并三十六國結烏孫起燉煌酒泉張掖以鬲婼𦍑裂匈奴之右臂婼音而遮切單于孤特逺遁于幕北四垂無事斥地逺境起十餘郡功業既定乃封丞相為富民侯以大安天下富實百姓其規橅可見橅讀曰模又招集天下賢俊與恊心同謀興制度改正朔易服色立天地之祠建封禪殊官號存周後定諸侯之制永無逆爭之心至今累世頼之單于守籓百蠻服從萬世之基也中興之功未有髙焉者也髙帝建大業為太祖孝文皇帝德至厚也為文太宗孝武皇帝功至著也為武世宗此孝宣皇帝所以發德音也禮記王制及春秋榖梁傳天子七廟諸侯五大夫三士二天子七日而殯七月而葬諸侯五日而殯五月而葬大夫三日而殯三月而葬此喪事尊卑之序也與廟數相應其文曰天子三昭三穆與太祖之廟而七諸侯二昭二穆與大祖之廟而五故德厚者流光德薄者流畢流謂流風餘福春秋左氏傳曰名位不同禮亦異數自上以下䧏殺以兩禮也殺音所例切七者其正法數可常數者也宗不在此數中宗變也非常數故云變也茍有功德則宗之不可預為設數故于殷太甲為太宗太戊曰中宗武丁曰高宗太甲湯之孫太丁之子也太戊太康之子雍己之弟也武丁小乙之子周公為母逸之戒舉殷三宗以勸成王母逸尚書篇名戒以無逸豫也繇是言之宗無數也繇與由同然則所以勸帝者之功德􅀶矣以七廟言之孝武皇帝未宜毁以所宗言之則不可謂無功德禮記祀典曰夫聖王之制祀也功施于民則祀之以勞定國則祀之能救大灾則祀之竊觀孝武皇帝功德皆兼而有焉凡在于異姓猶将特祀之况于先祖或說天子五廟無明文又說中宗髙宗者宗其道而毁其廟名與實異非尊德貴功之意也詩云蔽芾甘棠勿剪勿伐召伯所茇剪字與鬋同茇音歩各切思其人猶愛其樹况宗其道而毁其廟乎迭毁之禮自有常法無殊功異德固以親疏相推及至祖宗之序多少之數經傳無明文至尊至重難以疑文虛說定也孝宣皇帝舉公卿之議用衆儒之謀既以為世宗之廟建之萬世宣布天下臣愚以為孝武皇帝功烈如彼孝宣皇帝崇立之如此不宜毁上覧其議而從之制曰太僕舜中壘校尉歆議可歆又以為禮去事有殺去除也殺漸也去音立吕切殺音所例切其下竝同故春秋外傳曰日祭月祀時享嵗貢終王祖禰則日祭曽髙則月祀二祧則時享壇墠則嵗貢祧是逺祖也築土為壇除地為墠祧音他堯切墠音善大禘則終王蠻夷終王乃入助祭各以其珍貢以共大禘之祭也毎一王終新王即位乃來助祭德盛而游廣親親之殺也游亦流也彌逺則彌尊故禘為重矣孫居王父之處正昭穆則孫常與祖相代此遷廟之殺也聖人於其祖出於情矣禮無所不順故無毁廟以情推子以子光祖勿得人心禮何所建故無毁棄不禘之主也謂下三廟廢而為虛者也自貢禹建迭毁之議恵景及太上寝園廢而為虛虛讀曰墟失禮意矣王莽平帝時為大司馬元始中莽奏本始元年丞相義等議蔡義也謚孝宣皇帝親曰悼園置邑三百家至元康元年丞相相等奏魏相也父為士子為天子祭以天子悼園宜稱尊號曰皇考立廟益故奉園民滿千六百家以為縣臣愚以為皇考廟本不當立累世奉之非是又孝文太后南陵在霸陵之南故曰南陵孝昭太后雲陵園雖前以禮不復脩陵名未正謹與大司徒晏等百四十七人議皆曰孝宣皇帝以兄孫繼統為孝昭皇帝後以數故孝元世以孝景皇帝及皇考廟親未盡不毁此兩統二父違于禮制案義奏親謚曰悼裁置奉邑皆應經義相奏悼園稱皇考立廟益民為縣違離祖統乖謬本義父為士子為天子祭以天子者乃謂若虞舜夏禹殷湯周文漢之髙祖受命而王者也非謂繼祖統為後者也臣請皇考祖考廟奉明園毁勿脩奉明園悼考之園也皇罷南陵雲陵為縣奏可莽又奏言王者以父事天故爵稱天子孔子曰人之行莫大于孝孝莫大于嚴父嚴父莫大于配天王者尊其考欲以配天縁考之意欲尊祖推而上之遂及始祖是以周公郊祀后稷以配天宗祀文王于明堂以配上帝禮記天子祭天地及山川嵗徧春秋榖梁傳以十二月下辛卜正月上辛郊高帝因雍四畤起北畤而備五帝未共天地之祀孝文十六年用新垣平議初起渭陽五帝廟祭㤗一地祗以太祖髙皇帝配日冬至祠㤗一夏至祠地祗皆并祠五帝而共一牲上親郊拜後平詐伏誅廼不復自親而使有司行事孝武皇帝祠雍曰今上帝朕親郊而后土無祠則禮不答也于是元鼎四年十一月甲子始立后土祠于汾隂或曰五帝㤗一之佐宜立㤗一五年十一月癸未始立㤗一祠于甘泉一嵗一郊與雍更祠亦以髙祖配不嵗事天皆未應古制建始元年徙甘泉㤗畤河東后土于長安南北郊永始元年三月㠯古以字未有皇孫復甘泉河東祠綏和二年㠯卒不獲祐復長安南北郊建平三年懼孝哀皇帝之疾未瘳復甘泉汾隂祠竟復無福臣謹與太師孔光長樂少府平晏大司農左咸中壘校尉劉歆太中大夫朱陽愽士薛順議郎國由等六十七人議皆曰宜如建始時丞相衡等議復長安南北郊如故莽又頗改其祭禮曰周官天墬之祀墬古地字樂有别有合其合樂曰㠯六律六鍾五聲八音六舞大合樂祀天神祭墬祗祀四望祭山川享先妣先祖凡六樂奏六歌而天墬神祗之物皆至四望盖謂日月星海也三光髙而不可得親也海廣大無限界故其樂同祀天則天文從祭地則地理從三光天文也山川地理也天地合祭先祖配天先妣配墬其誼一也天地合精夫婦判合祭天南郊則以地配一體之誼也天地位皆南鄉同席鄉讀曰向下同地在東共牢而食髙帝髙后配於壇上西鄉后在北亦同席共牢牲用繭栗𤣥酒陶匏禮記曰天子籍田千畆毎古畆田字㠯事天地繇是言之宜有黍稷天地同牲一燔尞瘞薶用牲一尞與燎同髙帝髙后用牲一天用牲左及黍稷燔尞南郊地用牲右及黍稷瘞于北郊其旦東鄉再拜朝日其夕西鄉再拜夕月然後孝弟之道備弟讀曰悌而神祗嘉享萬福䧏輯與集同此天地合祀㠯祖妣配者也其别樂曰冬日至于地上之圜丘奏樂六變則天神皆䧏夏日至于澤中之方丘奏樂八變則地祗皆出天地有常位不得常合此其合特祀者也隂陽之别於日冬夏至其㑹也㠯孟春正月上辛若丁天子親合祀天地于南郊以髙帝髙后配隂陽有離合易曰分隂分陽迭用剛柔以日冬至使有司奉祠南郊髙帝配而望羣陽日夏至使有司奉祭北郊髙后配而望羣隂皆以助致㣲氣通道幽弱當此之時后不省方后君也方常也不視常務故天子不親而遣有司所以正承順天地復聖王之制顯太祖之功也渭陽祠無復脩羣望未悉定定復奏奏可三十餘年間天地之祀五徙焉後莽復奏曰類于上帝禋于六宗歐陽大小夏侯三家說六宗皆曰上不及天下不及地旁不及四方在六者之間助隂陽變化實一而名實不相應禮記祀典功施于民則祀之天文日月星辰所瞻仰也地理山川海澤所生殖也易有八卦乾坤六子水火不相逮雷風不相誖山澤通氣然後能變化既成萬物也乾為父坤為母震為長男巽為長女坎為中男離為中女艮為少男兊為少女故云六子也水火坎離也雷風震巽也山澤艮兊也臣前奏徙甘泉㤗畤汾隂后土皆復于南北郊謹案周官兆五帝于四郊山川各因其方今五帝兆居在雍五畤不合于古又日月雷風山澤易卦六子之尊氣所謂六宗也星辰水火溝瀆皆六宗之属也今或未特祀或無兆居謹與太師光大司徒宫義和歆等八十九人議皆曰天子父事天母事地今稱天神曰皇天上帝㤗一兆曰㤗畤而稱地祗曰后土與中央黄靈同又兆北郊未有尊稱宜令地祗稱皇墜后祇兆曰廣畤易曰方以類聚物以羣分羣神㠯類相從為五部兆天地之别神中央帝黄靈后土畤及日廟北神北斗填星中宿中宫于長安城之未墬填與鎮同兆東方帝太昊青靈句芒畤及雷公風伯廟嵗星東宿東宫于東郊兆南方炎帝赤靈祝融畤及熒惑星南宿南宫于南郊兆西方少皥白靈蓐收畤及太白星西宿西宫于西郊兆北方帝顓頊黒靈𤣥冥畤及月廟雨師廟辰星北宿北宫于北郊兆奏可於是長安旁諸廟兆畤甚盛矣莽又言帝王建立社稷百王不易社者土也宗廟王者所居稷者百榖之主所以奉宗廟共粢盛共與供同人所食㠯生活也王者莫不尊重親自為之主禮如宗廟詩曰乃立冡土冡大也土土神謂大社也又曰㠯御田祖㠯祈甘雨言設樂以御祭於神為農求甘雨也禮記曰唯祭宗廟社稷為越紼而行事紼以綰車索也言當祭則越紼行事不以私䘮廢公祀也聖漢興禮儀稍定已有官社未立官稷髙帝除秦社稷立漢社稷所謂大社也特又立官社配所謂五社也遂於官社後立官稷以夏禹配食官社后稷配食官稷種榖樹榖樹栢樹也其子類榖故於稷種徐州牧嵗貢五色土各一斗册府元龜卷五百七十三
