  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_620-1a}
body:
  text: 册府元龜卷六百二十宋王欽若等撰卿監部總序卿監之職其來尚矣三代以前雖名號或殊然其典領亦可得而言焉少昊氏以九扈為九農正及帝堯命棄為后稷並司農卿之本也凡此已下事備邦計總序又以五鳥為五工正及云共工方鳩僝功皆将作監之本也又以鳯雉氏為厯正及顓頊命南正重司天北正黎司地唐虞以羲氏和氏紹重黎之後皆太史監之本也凡此已下事備國史總序又命伯夷為秩宗后䕫典樂並太常卿之本也凡此已下事備掌禮總序臯陶作士即大理卿之本也凡此已下事備刑法總序又命益作虞以掌山澤即都水使者監之本也夏制九卿商氏因之周之卿曰少師少傅少保冡宰司徒宗伯司馬司冦司空是也三代諸卿名號不同然其官職之屬相沿而乃與周不異天官大府下大夫乃大府卿之本也凡此已下事備邦計總序又庖人外饔中士蓋光禄卿大官署令之本也膳夫内饔即殿中監之尚食局之本也地官師氏以三德三行教國子即國監之本也凡此已下事備學校總序又林衡川衡二官掌林麓川澤亦都水監之任也又廪人下大夫亦司農之太倉令也春官宗伯卿一人亦太常卿也小宗伯掌三族之别以辨其親踈即宗正之别也太史掌建邦之六典亦太史局令之職也又校人圉師趣馬皆若太僕之典廐署令也又司甲司弓矢下大夫司兵中士司戈下士並衛尉之武庫令也秋官司冦亦大理之列也又大行人中大夫掌大賔客之禮及象胥即鴻臚之本也冬官考工亦将作監之任也其攻金之工六即少府監之掌治署令也凡此已下事備邦計總序秦置太史令又置奉常其郎中令主郎内諸官掌宫殿掖門户衛尉掌輿馬官衛尉之名自此始也廷尉掌刑辟典客掌歸義蠻夷宗正掌親属宗正之名自此始也少府掌山海池澤之税少府之名自此始也自奉丞而下皆有丞以属焉其左右中候将行皇后卿也又有典属國掌蠻夷降者漢以太常光禄勲衛尉太僕廷尉大鴻臚卿宗正司農少府謂之九寺大卿而分属三司太常光祿勲衛尉三卿並太尉所部太僕廷尉大鴻臚三卿並司徒所部宗正大司農少府三卿並司空之所部奉常初曰太常太常之名自此始也其所典掌沿革及官属增省並具掌禮總序他皆類此太僕或曰周官有太僕下大夫掌王之服位出入王之命似非今太僕之職又云周穆王置太僕正以伯冏為之掌輿馬秦因之漢則夏侯嬰為沛公太僕属官有大廐未央家馬三令各五丞一尉又車府路軨騎馬駿馬四令丞又龍馬閑駒槖泉騊駼承華五監長丞右邉郡六牧師苑令各三丞又牧槖昆號令丞皆属焉中太僕掌皇太后輿馬不常置也又少府増置属官焉其属所典掌沿革及員吏增省具邦計總序他皆類此惠帝更名太常曰奉常景帝初衛尉更名中大夫中六年更名廷尉為大理大理之名自此始也其典領沿革及属官省増并具刑法總序佗皆類此又更名典客為大行令又更名将作少監為将作大匠属官有右庫東園主章左右前後中校七令丞又有主章長丞更名将行為大長秋後元年治粟内史更名大農令是年以中大夫令復為衛尉属官有公車司馬衛士旅賁三令丞衛士三丞又諸屯衛候司馬二十二官皆属焉長樂建章甘泉衛尉皆掌其宫各随所掌之宫名焉職畧同不常置孝武帝建元三年初置光祿勲之属官比郎無員多至十人有僕射秩比千石四年改大理復為廷尉元狩三年昆邪王降増属國置都尉丞候千人属官有九譯令五年初置郎中令之属官諫大夫秩比八百石大初五年更名郎中令為光䘵勲光禄之名自此始也属官有大夫郎謁者皆秦官又期門羽林皆属焉是年更太僕家馬為挏馬初置路軨其少府太常並增置属官焉又大行令更名大鴻臚鴻臚之名自此始也属官有行人譯官别火三令丞及郡邸長丞又更名行人為大行令又更名將作属官東園主章為木工又大農令更名大司農司農之名自此始也其所典掌沿革及属官増省並具部計總序他放此又置太史公之職其所典掌具國史總官他皆類此宣帝以光祿勲之属官中郎將騎都尉監羽林秩比千石成帝河平元年省典属國并大鴻臚陽朔三年省将作中候及左右前後中校尉五丞哀帝元夀二年改廷尉復為大理平帝元始元年以光祿勲之属官北郎更名虎賁郎置中郎将秩比二千石四年更名宗正為宗伯属官有都司空令丞内官長丞又諸公主家令門尉皆属焉後漢太常卿一人中二千石以下諸卿秩同光禄勲卿一人中二千石掌宿衛宫殿門户典謁署郎更直執㦸宿衛門户考其德行而進退之郊祀之事掌三獻有員吏四科百石斗右佐驅吏學士守學士官醫衛士等属焉丞一人比千石五官中郎將一人比二千石五官中郎比六百石無員郎年五十以属五官五官侍郎比四百石無員五官郎中比三百石無員凡郎官皆主更直執㦸宿衛諸衛門出充車騎唯議郎不在直中左中郎皆比二千石主左署郎中郎比六百石侍郎比四百石郎中比三百石三郎皆無員左中郎将比二千石主右署郎中比六百石侍郎比四百石郎守比三百石二郎皆無員虎賁中郎将比二千石主虎賁宿衛左右僕射左右陛長各一人比六百石僕射主虎賁郎習射陛長主直虎賁朝㑹在殿中虎賁中郎比六百石虎賁作郎比四百石虎賁郎比三百石節從虎賁郎比二百石四郎皆無員掌宿衛侍從自節從虎賁郎乆者轉遷才能差高至中郎羽林中郎将比二千石羽林郎比三百石無員掌宿衛侍從常遷漢陽隴西安定北地上郡西河凡六郡良家補武帝以便馬從游獵還宿殿階巖下室中故號巖郎羽林左監一人六百石主羽林左騎羽林右監一人六百石主羽林右騎丞一人奉車都尉比二千石無員掌御乗輿車駙馬都尉比二千石無員掌駙馬都尉二千石無員本監羽林騎光祿大夫比二千石無員凡大夫議郎皆掌顧問應對無常事唯詔命所使大中大夫千石無員中散大夫六百石無員諫議大夫六百石無員議郎六百石無員謁者僕射一人比千石為謁者臺率主謁者天子出奉引古重習武者主射以督䘵之故曰僕射常侍謁者五人皆六百石主殿上時節威儀謁者三十人其給事謁者四百石其灌謁都郎中皆三百石掌賔讚受事及上章報問初為灌謁者滿嵗為給事謁者凢光祿勲職属光祿者自五官將至羽林右監凡七署自奉車都尉主謁者皆以文属舊有左右曹秩以二千石日上殿中主受尚書奏事平省之世祖使小黄門郎受事車駕出給黄門郎兼有請室令車駕出在前請所幸徼車迎白示重慎中興但以郎兼事訖罷又省車户騎凡三将及羽林衛尉卿一人中二千石掌門官衛士官中徼循事丞一人比千石公車司馬令一人六百石掌南宫闕門凢吏民上章四方貢獻及徴詣公車者丞尉各一人丞遷暁諱掌知非法尉主闕門兵禁戒非常南宫北宫衞士令各一人並六百石各有丞一人左右都候各一人六百石主劒㦸士徼循宫及天子有所收考丞各一人宫掖門每門司馬一人皆千石南宫南屯司馬主平城門北宫門蒼龍司馬主東門貞武司馬主貞武門北屯司馬主北門北宫朱雀司馬主南掖門東明司馬主東門朔平司馬主北門自卿至諸門司馬咸有員吏衛士属焉中興省旅賁令衞士一人丞右三卿大尉所部太僕卿一人中二千石掌車馬天子每出奏駕上鹵簿用大駕則執馭丞一人比千石考工令主作兵器弓弩刀鎧之属成則傳執金吾入武庫及主織綬諸雜工車府令主乗輿諸車未央廐令主乗輿及廐中諸馬各一人六百石長樂廐丞一人自卿以下並有員吏等屬焉太僕舊有六廐皆六百石令中興省約但置一廐後置左駿令廐别主乗輿御馬後或并或省又有牧師苑令官主飬馬分在河西六郡界中中興皆省惟漢陽有流馬苑但以羽林郎監領廷尉卿一人大鴻臚卿一人掌諸侯及四方歸義蠻夷其郊廟行禮賛道請行事既善以命郡司諸王入朝當郊迎典其禮儀及郡國上計主四方來亦属焉皇子拜立賛授印綬及拜諸侯諸侯嗣子及四方夷狄封者臺下鴻臚召拜之王薨則使吊之及拜王嗣丞一人比千石大行令一人六百石主諸郎丞一人治禮郎四十七人主齋祀儐讃九賔又有宫室主調中都官斗食以下功次相補大行郎而如謁者兼舉形貌也其譯官别火二令丞及郡邸長丞並省但令郎治郡邸右三官司徒所部也自卿以下各有員吏等属焉宗正卿一人掌序録王國嫡庶之次及諸侯宗室親属逺近郡國歳因計上宗室名籍若有犯法當髠以上先上諸宗正宗正以聞乃報决又嵗治諸王世譜差序秩第又有員吏以下官属焉所統家令一人六百石丞一人三百石其餘属吏増减無常主簿一人秩六百石僕一人秩六百石私府長一人秩六百石家丞一人三百石直史三人從官三人其主薨無子置傅一人守其家宗正自中興省都司空令丞大司農少府卿各一人世祖改少府属司農初孝武置水衡都尉秩比二千石别主上林苑有離宫燕休之處世祖省之并其職於少府又孝武以都水官多乃置左右使者以領之劉向䕶水使者是也至哀帝省使者官至東京凡都水皆罷之併置河隄謁者桓帝延熹二年始置秘書監一人秘書之名自此始也掌禁中圗書秘記故曰秘書属太常後省秦時博士官所職禁人藏書漢氏除挾書之律開獻書之路置冩書之官又令謁書陳農求遺書於天下故文籍徃徃而出並藏之書府在外則有太史愽士掌之其内則有延閣廣内石渠之藏大御史中丞在殿中掌蘭臺秘書圖籍又未央宫中冇麒麐閣天祿閣亦藏書劉向楊䧺典校皆在禁中謂之中書猶言内庫書東京則藏之東觀亦禁中也其著作局事具國史自此以下不復述獻帝建安末改光禄勲為郎中令魏之九卿並與漢同初武帝為魏王置秘書令及二丞典尚書奏事即中書之任也兼掌圗書秘記又置秘書郎秩四百石又置秘書校書郎蘭臺亦藏書御史掌焉薛夏云蘭臺為外臺秘書為外閣是也初秘書属少府及王肅為監以為秘書之職即漢東觀之任安可復属少府自此之後不復属焉太史令吏員有監候郎二十人候部吏十五人掌候天文並太史監候之任也又有靈臺丞主候望郎殿中監一人品第七殿中之名自此始也晉宋並因之掌帳設監護之事又有殿中奉乗郎從五品下又光䘵置太官令丞太僕置乗黄丞一人奉乗郎從五品又有驊騮廐令牧官都尉其宗正亦以宗室居之又以廷尉為大理後復為廷尉又改鴻臚之大行令為客舘令又并将作之左校於材官又以水衡都尉主天下水軍舟船器械文帝黄初元年改郎中令復為光祿勲又分秘書立中書因置監令明帝青龍中議秘書丞郎職近日月冝居三臺上亞尚書丞郎其校書郎自是以後徃徃以他官典校秘書衛尉闕其太常司農少府此不復述晉制太常光祿勲衞尉太僕廷尉大鴻臚宗正大司農少府将作大匠太后三卿太常秩皆為列卿各置丞功曹主簿五官等員其太常兼統太學諸博士祭酒及太史别置靈臺丞武帝咸寧四年初立國子學定置祭酒一人其所典領沿革及属官增損並具學校部總序他皆倣此光祿勲統虎賁中郎将羽林郎将冗從僕射羽林左監五官左右中郎将東園匠大官御府守宫黄門掖庭清商華林園暴室等令又置左右光禄大夫而光祿大夫如故光祿大夫銀章青綬其重者加金章紫綬則謂之金紫光祿大夫秩比二千石大官令之属有厨史餳官吏果官監釀吏酒丞等員衛尉統武庫公車衛士諸治等合左右都候南北東西督治掾太僕統典農典虞都尉典虞丞左右中典牧都尉車府典牧乗黄廐驊騮龍馬廐等令典牧又别置羊牧丞太僕自元帝渡江之後或省或置太僕省故驊騮為門下職宋齊亦有若郊祀則權宜置太僕執轡事畢省齊亦如之将作大匠有事則置無事則省其丞亦然所属有曹主簿五官等員掌土木之役都水臺都水使者一人掌舟楫之事官品第四又有左右前後中五水衡陳慎戴䧺俱以都水使者領水将都尉之職又有參事二人蓋丞之職也又置主簿一人又諸津渡二十四所各置監津吏三十一人太后三卿衛尉少尉少府太僕漢置皆隨太后宫為官號在同名卿上無太后則闕魏改漢制在九卿下晉復舊在同號卿上大長賢一梁冠絳朝服江左以他官兼領宋齊梁陳後魏北齊亦然其吏員有典厯四人武帝以秘書并中書其丞謂之中書秘書丞惠帝永平元年詔秘書典總經籍考校古今中書自有職務逺相統攝於事不專宜令復别置秘書寺掌中外三閣圗書自是秘書寺始外置焉品第五綘朝服銅印墨綬進賢两梁冠佩水蒼玉又置秘書丞二人品第六銅印墨綬進賢一梁冠綘服江左省殿中尚衣局又省衛尉又省鴻臚丞及功曹主簿五官等員有事則權置事畢則省又省尉衞之治令始𨽻少府又省将作大匠而作左右校𨽻少府又大史之職自此多以他官兼領宋齊梁陳並同哀帝興寧二年以光䘵勲幷司徒孝武寧康元年復置光祿勲又省都水臺置水衡令亦無丞宋九卿亦沿舊制秘書丞一人品服同晉秘書郎中去中字光祿勲丞祖朝㑹宗正不置齊亦然又省太僕丞齊亦如之永初中大鴻臚分置南北客舘令丞孝武孝建元年復置衛尉又増置丞一人又省都水臺署水衡令亦無丞大眀中改殿中尚方曰左右御府各置令丞一人齊九卿並因前制秘書郎秩六百石又置内外殿中監各八十人太僕乗黃令品第七秩四百石銅印墨綬進賢一梁冠綘朝服又鴻臚有客舘令光祿勲府置丞領左右光䘵大夫位從公開府置佐吏如公中大夫中散大夫諸大夫官皆處舊齒老年重者加親信二十人復置都水臺使者一人將作大匠太僕三卿不常置有事權置兼官畢乃省宣德尉衞少府太僕欎林王立文安太后即尊號以宫名置之大長秋亦欎林立皇后置梁高祖天監七年象四時置十二卿太常宗正司農為春卿太常位視金紫光祿大夫班第十四宗正卿位視列曹尚書皆以宗室為之班第十三其丞為四班主簿為七班司農卿班第十一大府少僕少府為夏卿大府班第十三大府自周官以後歴代不置然其職在司農少府至是方置焉太僕卿統南牧左右牧龍廐外班第十其丞視朝請班第三主簿班第三少府班第十一衞尉廷尉大匠為秋卿衛尉班第十三統武庫令廷尉第十二將作為大匠卿班第十品正第五又置丞一人班第三又置將作營作又别立長史司馬主簿各一員光䘵勲鴻臚都水使者為冬卿光祿除勲字班第十一光祿丞視員外郎主簿班第三其大官丞門下省領之又有市買正厨酒庫等丞鴻臚卿班第九品從第五其丞班第三主簿班第三属官又有典客舘令丞令在七班下為三品勲位又改都水臺使者為大舟卿班第九又置丞一人班第一又置主簿七班之中第三又秘書監増秩中二千石品第三後置十八班秘書監第十一又増秘書丞品第五秘書郎自江左多任貴游年少迨茲尤甚太史丞為三品勲位又殿中位不登七班者别置勲位殿中外監為三品勲位内監為三品勲位又尚藥自此以降皆太醫兼其職陳諸卿監率如梁制後魏秘書監初從第一品中孝文太和末降為第三品丞一人正第五品上郎置四人正第七品上校書郎置十二人其太史丞史失其品殿中監從五品下又有掌服郎從六品上又有乗黄車府令掌太僕亦殿中之職也太常初置少卿又分一官令尚食中尚食掌知御膳尚食門下省領之中尚食集書省領之大官掌知百官饌光祿卿領之有丞一人衛尉卿從第一品下後降為第三品初置少卿官第三品上後降為正四品上從五品中後降為第七品上宗正卿第二品上少卿第三品後降為四品丞第七品太僕卿第二品上少卿第三品上後降為正四品上丞從五品中後降為七品上又省乗黄令丞廷尉卿第二品上鴻臚卿第二品上後降為第三品少卿一人第三品上後為正四品上丞從五品中後降為第七品典客監從五品上又置主客令及司儀官大司農第二品上將作大匠從第二品後降為從三品其丞從五品後降為第五品下分建都水使者正第四品中水衡都尉從五品中後改都水使者從五品而省水衡又有都水參事六人其少府改為太府焉北齊秘書郎増中字正第七品下校書置十二人始置正字四人從第九品上門下省属官有殿中局殿中監四人掌駕前奉引行事東耕則進耒耜又統六局有典御二人丞監各四人文集書省統二局有中尚食局典御一人監四人品與尚食同又統尚藥局有典御二人侍御師四人尚藥監四人總御藥之事又以太常光祿衛尉宗正太僕大理鴻臚司農太府寺是為三府九卿稱寺自此始也太常寺卿第三品餘卿品同光䘵寺置卿掌諸膳食帳幙器物肴藏丞一人從六品下又有功曹五官主簿等又有大官丞一人肴藏令及丞二人又有清漳令丞主造酒衛尉寺有丞一人從六品下又有主簿及統武庫署令丞掌甲兵及吉凶儀仗又有守宫令丞掌凢設張之事宗正四卿有昭真寺掌釋道二教置大統一人都維郡三人亦有功曹主簿員以管諸州縣沙門太僕寺丞一人從六品下主簿一人統驊騮左右龍左右牝駞牛司羊乗黄車府等署令丞鴻臚寺統典寺署有丞一人第七品下又有功曹五官主簿班第三又有典客令丞司儀令丞其大理司農太府此不復述又有都水臺使者二人從第五品有丞及參事河隄謁者録事船局都津尉丞典作津長等員後周卿監之職咸凖周官建置焉武帝四年置軍器監軍器有監自此始也隋九寺卿與北齊同其