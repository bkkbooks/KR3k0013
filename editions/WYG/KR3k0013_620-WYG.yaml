少府監為内府監将作為監繕工監大匠為大監又改都水使者為司津使者監咸亨元年秘書省監少監丞及太史局令等悉復舊又復殿中省監少監丞及六尚之名其奉常司宰司衛司属司馭詳刑司文寺司稼外府司成内府膳工大監等悉復舊名又復司津使者監為都水使者監則天光宅元年改太常為司禮光祿為司膳衞尉為司尉宗正為司属太僕為司僕大理為司刑大理正為司刑正鴻臚為司賔太府為司府寺卿司農不改國子監為成均監少府為上方監将作為營繕監垂拱中又改都水監為水衡置都尉使者為都水府天授初改秘書為麟臺乆視元年改太史局為渾天監不𨽻麟臺其令監置一人加至正第五品上因加副監及丞主簿府史等員其年又改為渾儀監始置丞二人從第七品上長安二年改渾儀監復為太史局還𨽻麟臺縁監置官及府史等並廢其監依舊令置二人又省丞二人四年省太史局厯博士置保章正以當之掌教厯生又省天文博士之職置靈臺郎以當之是年始置挈壺正又去司辰之師字但曰司辰中宗神龍初改麟臺復為秘書又改太史局為太史監令名不改不𨽻秘書又復太常之名其光祿衞尉宗正太僕大理鴻臚大府等九寺國子少府将作等三監並如故又以水衡都尉復為都水監署使者二人分總其事不属将作領舟楫河渠二署又改都水府復為使者景龍二年復置太史丞二人明皇開元初復以少府監甲弩坊地置軍器使二年又令太史令為太史監又分少府監甲鎧弓弩别置軍器監置中校署属將作三年以軍器使為監領甲弩二坊十二年省軍器監作並𨽻少府監甲弩坊更置少監一員統之又置北京軍器庫十四年又改太史監為局復云太史令二員𨽻秘書省十六年置軍器監於北都常以太原尹兼領二十五年廢北京軍器庫依舊為甲坊太常所掌諸陵廟並𨽻宗正及道士女道士属宗正故崇真署亦随而𨽻焉其僧尼别𨽻尚書祠部天寳六載復軍器監扵舊所置監一人領甲坊弩坊兩署九載置廣文舘領國子監焉十二載改将作大匠復為大監肅宗乾元元年又廢軍器監却置使其監以下並停其使以内官為之宣宗大中四年以司農寺文案少卿不通判詔自今以後九寺三監少列並與大卿通判後唐荘宗同光中諸寺監各只置大卿監祭酒司業各一員博士两員其餘官属並權停惟太常寺及大理寺事闗禮法之重除太常博士外更置丞一員大卿等分職監局居方在於事任無不總統然則因時而㳂革隨世以輕重外降秩序分併官曹治亂在人名器非假若乃職修事舉德崇望峻方正不撓㢘約自守挺愛君之節敦及善之道被委遇而斯稱荷寵擢而無忝以從人爵允奉官箴其有便辟任志叨黷靡厭用取譴咎欲悔何及凡卿監部十有五門云選任舉職㤙奨選任夫卿監之列其位重矣官象河海職貳台衮茍非其人焉可虚授然則便僻側媚羣言之攸棄中正清直公朝之所尚則有内貞外順博聞多識推行實之攸異稱治迹之第一膺茲僚簡寘于周行故得庶務允釐百官承式上下相維而天下化矣周穆王命伯冏為周太僕正伯冏名也太僕長大御中大夫作冏命曰慎簡乃僚無以巧言令色便僻側媚其惟吉士漢高祖為沛公賜爵七大夫以夏侯嬰為太僕常奉車為沛公御車嬰自高祖初起沛嘗為太僕後事恵帝朱邑為北海太守治行第一入為大司農呉公為河南守文帝初立聞呉公治為天下第一故與李斯同邑乃徴為廷尉黄覇字次公少學律令為河南太守丞自武帝末用法深昭帝立俗吏上嚴酷以為能而覇獨用寛和為名㑹宣帝即位在民間時知百姓苦吏急也聞覇持法平召以為廷尉正杜業有才能選為太常田序以連擒大姦徴為大鴻臚後漢高詡以儒學徴拜大司農陳寵為廣漢太守風聲大行入為大司農陳球字伯真下邳人善律令橋𤣥表球明律令拜廷尉正白嵩為濟東相甘露降於郡安帝嘉其致瑞徴拜大鴻臚魏邢顒字子昻時人稱德行堂堂邢子昻文帝以為太常嚴包以高才武帝黃初中入為秘書丞梁習為幷州二十餘年政治為天下最乃徴拜大司農蜀王謀漢嘉人有容止操行先主為漢中王用荆楚宿士零陵頼荼為太常南陽黃柱為光祿勲王謀為少府吳張儼弱冠知名早歴顯位以博聞多識拜大鴻臚使于蜀晉華表字偉容仕魏為光祿勲咸熙中詔曰表清賢履道内貞外順歴位忠恪言行不玷其以表為太常卿顧榮字彦先吳人也仕吳為黄門侍郎吳平入雒以南土秀望為廷尉正陸士衡以文行為著作郎嵇紹康子也以父得罪靖居私門山濤領選啟武帝曰康誥有言父子罪不相及嵇紹賢侔郄缺宜加旌命請為秘書郎帝謂濤曰如卿所言乃堪為丞何但郎也乃發詔徴之起為秘書丞何嵩善史漢為著作郎何楨字元幹廬江人也為尚書特詔参秘書丞秘書本有一丞時尚未轉遂以楨為右丞右丞之置自楨始也賀循元帝以為太常侍散騎常侍如故循以九卿舊不加官惟拜太常而已矣宋王慧武帝初建宋國當置郎中令帝難其人謂傅亮曰今用郎中令不可令减袁曜卿也既而曰吾得其人乃以慧居之謝靈運為司徒徐羡之所惡出為永嘉太守稱疾去職文帝登祚誅徐羡之等徴為秘書監召不起帝使光祿大夫范泰與靈運書敦奨之乃出就職劉恢為侍中領衛尉晉氏過江不置衛尉孝武欲重城禁故復置衛尉自恢為始也南齊沈憲遷少府卿少府管掌市易與交闗有吏能者皆更此職梁劉孝綽自上虞令遷除秘書丞高祖謂舍人周捨曰第一官當用第一人故以孝綽居此職張率字士簡吳郡人遷秘書丞高祖曰秘書丞天下清官東南胄緒未有為之者今以相處為卿定名譽後魏杜銓京兆人為中書博士初杜太后父豹䘮在濮陽太武欲命迎葬於鄴謂司徒崔浩曰天下諸杜何處望高浩對京兆為美太武曰朕今方改葬外祖意欲取京兆杜中長老一人以為宗正命營護凶事浩曰中書愽士杜銓其家中今在趙郡是杜預之後於今為諸杜最即命詔之及見銓器貌瓌雅太后感悦謂浩曰此真吾所欲也以為宗正于忠宣武時為衛尉卿高肇忌其為人出授定州刺史宣武既而悔之復授衛尉卿領左衛将軍恒州大中正宻遣中使詔忠曰自比股肱裭落心膂無寄方任雖重比此為輕故輟茲外任委以内務當懃夙無怠稱朕所寄也李輔字伯尚少有重名孝明每云此李氏之千里駒勑撰明定起居注尋遷秘書丞後周盧誕本名恭祖仕魏為給事黄門侍郎魏帝以誕儒宗學府為當世所推乃拜國子祭酒隋宇文愷好學多技藝為萊州刺史兄忻被誅除名於家乆不得調㑹朝廷以魯班故道乆絶不行令愷修復之既而高祖建仁夀宫訪可任者右僕射楊素言愷有巧思帝然之扵是簡校将作大匠蘇䕫為朝散大夫時焬帝力勤逺略蠻夷朝貢前後相属帝嘗從容為宇文述虞世基等曰四夷率服觀禮華夏鴻臚之職湏歸令望有多才藝羙容儀可以接對賔客者為之乎咸以蘇䕫對帝然之即日拜鴻臚少卿唐戴胄為兵部郎中貞觀初太宗謂封德􅉓曰大理之職人命所懸此官極妙選公宜陳其堪者德彛未對曰戴胄忠正清直每事用心即其人也於是除大理少卿楊崇禮為太府少卿雖錢帛充牣丈尺間皆躬自省閱時議以為稱職擢拜太府卿舉職夫九卿者所以參三公也故歴世王者妙選英俊以充其任用舉其職繇是宗廟之禮斯備宫闕之制有典外夷之事明習朝廷之政有成量功以鉤較則物無遁形執詞而訊辨則情咸有得以至釐整記籍諧暢律吕攸司靡曠典故可稽彛倫是章功用克顯故得則哲之羙皎如日星當官之譽芬若蘭芷則上法於北斗下括乎河海復何媿焉漢楊城延高帝時為少府作長樂未央宫築長安城先就以功封梧侯常惠代蘇武為典属國明習外國事勤勞數有功陳咸為少府少府多寳物属官咸皆鉤較發其姦贓沒入辜𣙜財物辜罪也𣙜専固也官属及諸中宫黄門鉤盾掖庭官吏舉奏按論畏咸皆失氣後漢劉般為宗正清静畏慎受職修治杜林為光祿勲内奉宿衛外總三署周宻敬慎選舉稱平孫堪為光祿勲清㢘果於從政數有直言多見納用鄭𢎞章帝時為大司農舊交阯七郡貢獻轉運皆從東治泛海而至風波艱阻沉溺相係𢎞奏開零陸桂陽嶠道於是夷通至今遂為常路在職二年所息省三億萬計時嵗天下道旱邉方有警人食不足而帑藏殷積𢎞奏宜省貢獻减徭費以利飢人帝順其議應順為将作大匠公㢘約已明逹政事五年省費億萬趙喜字伯陽為衛尉盡心事上夙夜匪懈魏韓暨黄初中為太常時新都雒陽制度未備而宗廟主祏皆在鄴都暨奏請迎鄴四廟神主建立雒陽廟四時蒸嘗親奉粢盛崇明正禮廢去滛祀多所規正薛夏太和中為秘書丞常以公事移蘭臺自以臺也而秘書署耳謂夏為不得移也推使當有坐者夏報之曰蘭臺為外臺秘書為内閣一也何不相移之有蘭臺屈無以折自是之後遂以為常晉孔坦為廷尉卿獄多囚繫坦到官躬執詞状口辨曲直大小以情不加楚撻臺司録獄無所顧問皆靣决當時之事荀朂領秘書監與中書令張華依劉向别録整禮記籍又立書博士置弟子教習以鍾胡為法時汲郡塜中古文竹書詔朂撰次之以為中經列在秘書南齊沈憲字彦璋為都水使者長於吏事居官有績梁蕭子顕大通三年以侍中領國子博士高祖所製經義未列學官子顕在職表置助教一人生十人又啟撰高祖所集并普通北代記其年遷國子祭酒又加侍中於學述高祖五經義陳王伯固為國子祭酒學有惰游不修習者重加檟楚生徒懼焉繇是學業頗進後魏崔振為長兼廷尉少卿振有公㫁以明察稱高謐為秘書郎以墳典殘缺奏請廣訪羣書大加繕冩繇是代京圖籍莫不審正范紹為長兼太府卿紹量公節用甄煩就簡凡有賜給千疋以上皆别覆奏然後出之靈太后嘉其用心勑詔每月入見諸有益國利民之事皆令面陳崔纂為廷尉正每於大尉多所據明有當官之譽北齊崔昂為散騎常侍兼太府卿大司農卿二寺所掌世號繁劇昻校理有術下無姦偽經手歴目知無不為朝廷歎其至公又奏上横市妄費事三百一十四條詔下依啟状速議以聞宋㳺道為太府卿乃於少府覆簡主司盗截得鉅萬計奸吏返誣奏之下獄尋得出不歸家徑之府理事後周斛斯徴為太常卿自魏孝武西遷雅樂廢缺徴博採遺逸稽諸典故創新改舊方始備焉盧辯為太常卿自魏末離亂孝武西遷朝章禮度湮墜咸盡辯因時制儀皆合軌度性疆記黙識能㫁大事凡所創制處之不疑長孫紹逺為大常廣召工人創造樂器土木絲竹各得其宜隋蘇孝慈開皇初為太府卿于時王業初基百度伊始徴天下工匠纎微之巧無不畢集孝慈總其事世以為能樊叔略為司農卿凢所種植叔畧别為條制皆出人意表牛𢎞為秘書監表請分遣使人捜訪異本每書一卷賞絹一疋校冩既定本即歸主於是人間異書往往間出宇文愷為營宗廟副監及遷都高祖以愷有巧思詔領營新都副監高熲雖總大綱凡所規畫皆出於愷趙元淑為潁川太守因入廟㑹以司農不時納諸郡租榖元淑奏之帝謂元淑曰如卿意者㡬日當了元淑曰如臣意不過十日帝即日拜元淑為司農卿納天下租如言而了帝悦焉楊注為大理卿視事二日焬帝将親省囚徒其時繫囚二百餘人注通宵䆒審詰朝而奏曲盡事情一無遺誤帝甚嘉之唐柏季纂武德中歴屯田農圃監再為司農少卿每督事苑内小心畏慎勤於稼穡高祖每稱善張道源為太僕卿上奏以吏曹文簿繁宻易生姦隠請議减之高祖下其議百寮無同者惟傅奕以道源為深識政體宜從其説高祖亦稱言為當廹於衆議事竟不行栁亨為光禄少卿太宗每誡之曰與卿舊親情素兼宿卿為人交游多今授此職宜存簡静亨性好射獵有饕湎之名此後頗自朂勵杜絶賔客約身節簡勤於職事太宗亦以此稱之姜確為将作少匠轉殿中少監攝将作並以勤濟見稱修九成宫令確典其事拜宣威将軍守屯衛将軍攝将作如故確性恭勤雖祁寒暑雨未嘗暫懈叚德操為将軍簡校少府事時已年老而精勤不怠廵察所部略無休息韋機為司農少卿受詔簡較東都督營田園苑之事高祖謂之曰兩都是朕東西二宅也今之宫舘隋代所造嵗序既淹漸将頺頓欲有修造又費財力如何機奏曰臣任司農向已十年前復省費今見貯錢三十萬貫若以供葺理可不勞而就也帝大悦楊崇禮開元初為太府少卿雖錢帛充牣丈尺間皆躬自省閲時議以為稱職擢拜太府卿加銀青光祿大夫封𢎞農郡公每嵗勾剥省使常出數百萬貫在職二十年公清如一九十餘授户部尚書致仕時太平嵗乆御府財物山積以為經楊卿者無不精好劉瑗為國子祭酒開元二十八年奏曰状准故事釋奠之日羣官道俗等皆令赴監觀禮臣請依故事著之裴武為京兆尹領大司農其間掌錢糓供饋之事皆粗有勞績裴次元為太府卿奏元和五年上言左藏庫置修屋宇本錢二百萬從之文宗太和四年正月秘書省奏請修書閣及廨署屋宇等状以當司藏書六萬餘卷列官三十一員廨署傾危秘閣摧破乆未脩葺漸恐費功伏當陛下文眀之朝天下宗聖萬方觀德之日海内崇儒之時今者棟宇欹斜圗籍缺落臣忝職司輙申伏乞特下有司計料修葺便加功力庶得宇全可之鄭覃為宰相兼國子祭酒開成元年奏請五經博士各一人縁無祿俸請依王府官例給禄粟從之後唐聶延祚為少府監眀宗天成元年上言牌印舊體不與朱記相参伏自近年亦歸當監鑄造既湏篆字何異印文㐲乞下中書釐革王彦鎔為太僕少卿天成元年上言國家四時祠祀郊廟羣神當時供應羊犢皆是前一月於度支請錢付行市人買雖得供事終匪度程伏惟舊例祀羊犢晉綘慈三州每年供進純白羯羊一百一十口赤黄特犢子四十頭内一十五頭繭栗二十五頭角握乞下三州每年依例供進本處以省錢收市杜紹光為少府少監天成二年上言當司掌朝服儀仗祭器服兵戈已來散失向盡茍非得人難為掌轄臣准往例除監一員少監二員外比有丞主簿五署令共一十六員近自偽梁廢省只委曹吏主張遂至因循或多隠漏乞下中書於先廢官員内量置承簿置令分主當局公事錢傅太常丞天成二年奏當司專典祠祀伏以國城西靣羣祀各有壇墠近年多被民户侵耕畜牧騰踐莫知處所行事之時於封上芟草有乖誠敬今正方春易行止絶者杜昉為國子博士天成二年八月以國學所設比教胄子近為外官多占居止請令止絶崔恊為宰相兼判國子祭酒天成三年八月奏請國子監毎年祗置監生二百人自後更與諸道相次觧送至十月三十日滿數為定又請頒下諸道州府各置官學如有鄉黨備諸文行可舉者録其事實申殿監司方與解送但一身就業不得影庇户門兼大學書生亦依此例不得因此便取公牒輙免本户差役又每年於二百人數内不繫時節有投名者先令學官考試校其學業深淺方議收補姓名勑宜依長定二百人其中有藝業精博者令准近勑考試及格解送禮部及第後據人數却填五年正月國子監又奏當監舊例初補監生有束修錢兩貫文及第後光學錢一貫文切緣當監諸色舉人及第後近日多不於監司出給光學文抄及不納光學文錢只守選限年滿便赴南曹叅選南曹近年選人並不收置監司光學文抄為憑請自後欲准例應諸色舉人及第後並却於監司出給光學文抄并納光學錢等各有所業次第以備當逐年修葺公使奉勑宜准往例指揮兼自今後凢補監生湏令情願住在監中修學則得給牒收補仍據所業次第逐季考試申奏其勘到見管監生一百七十八人仍勒准此指揮如收補年深未聞藝業虗霑補牒不赴試期亦委監司簡㸃其姓名年月一一分析申奏長興元年春國子監又請以學生束修及光學錢備監屯修葺公使從之杜璟為殿中丞天成四年六月上言以本司法物寄於寺觀請量修公署張殷衮為少府少監長興元年六月奏請㫁官賣農器例皆薄怯不便生民魏迢為大理卿長興元年七月奏諸道刑獄恐有淹滯望令本道判官一人每月两度彚囚䟽理魏仁鶚為太僕少卿長興二年閏五月奏以本等祠祭牲酒咸非素備請復舊規令諸道進納晉崔棁判太常卿公事時二舞乆廢有詔修舉棁撰樂章新詞教舞童歌之高祖賞焉錫賚甚厚直拜太常卿恩奬夫列卿之任所以樹棘木而定位法河海而命職率其所属守厥攸司内承於三公外倡於九牧盖元后之欽属庶尹之表儀也乃有直方自守公忠兼勵寛厚以成德貞固而幹事馳老成之譽罄補察之規清白以簡身營奉而宣力篤行可尚積勞寔彰繇是被之寵靈異其名數至或稱揚著於詔命褒羙形於歎息其告老也有加等之禮其不幸也極餙終之榮斯所以懋功而勸能旌賢而聳善俾百工之咸乂而庶績之惟熙者莫不繇是道也漢周仁為郎中令景帝冄自幸其家徙陽陵朱邑為九卿居處儉節家無餘財宣帝神爵元年卒天子閔惜下詔稱揚曰大司農邑㢘㓗守節退食自公亡疆外之交束修之餽餽與饋同可謂淑人君子遭離凶災甚閔之賜邑子黄金百斤以奉其祭蘇武為典属國宣帝以武著節老臣今朝朔望號稱祭酒加祭酒之號所以優尊也甚優寵之金敞為衛尉病甚成帝使使者問所欲以弟岑為託帝召岑拜為使主客官名属鴻臚主胡客也敞子渉本為左曹帝拜渉為侍中使侍幸緣車載送衛尉舍幸緣車常署左右侍召載皇孫今遣渉歸帝以皇孫車載之寵之也晉漢注縁車名皇孫車天子有事乗以從也湏㬰左右漢銚期光武時為衛尉疾病使使者存問加賜醫藥甚厚及卒帝親臨禭斂贈以衞尉安成侯印綬高詡光武時拜大司農在朝以方正稱卒官賜錢及冢田祭彤為太僕明帝每見彤常歎息以為可属以重任後從東廵狩過魯坐孔子講堂顧指子路室謂左右曰此太僕之室太僕吾之禦侮也孔子曰吾有四友焉自吾得囘也門人加親是非胥附耶自吾得賜世遠方之士日至是非奔走耶自吾得師也前有光後有輝是非先後耶自吾得由惡言不至是非禦侮耶趙孝為衞尉弟禮為御史中丞明帝嘉其兄弟篤行欲寵異之詔禮十日一就衞尉府大官送供俱令其相對盡歡數年禮卒帝令孝從官属送歸葬後嵗餘孝復以衞尉賜告歸卒于家召馴章帝時為光禄勲卒於官賜冢塋陪園陵韋彪為長樂衛尉數陳政術每歸寛厚比上䟽乞骸骨拜為奉車都尉秩中二千石賞賜恩寵侔於親戚章帝建初七年車駕西廵彪行太常事帝問以三輔舊事禮儀風俗乃厚賜彪錢􅈿羞食物使歸平陵上冢還拜大鴻臚元和二年春東廵狩以彪行司徒事從行還以病乞身帝遣小黄門太醫問疾賜以食物彪遂稱困篤章和二年夏使謁者策詔曰彪以將相之裔勤身餙行出自州里在位歴載中被篤疾連上求退君年在耆艾不可復以加增恐職事煩碎重有損焉其上大鴻臚印綬遣子太子舍人詣中藏府受賜錢二十萬和帝永元元年卒詔尚書故大鴻臚韋彪在位無愆方欲録用奄忽而卒其賜錢二十萬布百疋糓三千斛耿秉和帝時為光祿勲卒賜以朱棺玉衣將作大匠穿冢假鼓吹五營騎士三百餘人送𦵏楊賜靈帝時為太常詔賜御府衣一襲自所服冠幘綬玉壺革𢃄金錯鉤佩金錯以金間錯其文魏袁渙字耀卿為郎中令卒官太祖為之流涕賜榖二千斛一教以太倉榖千斛賜郎中令之家一教以垣下榖千斛與耀卿家外不觧其意教曰以太倉榖者官法也以垣下榖者親舊也程昱為衛尉文帝踐祚方欲以為公㑹薨帝為流涕追贈車騎將軍諡曰肅侯和洽為太常清貧守約明帝聞之加賜榖辛毗明帝時為衛尉與徐邈胡質皆以憂國忘私不營産業賜榖二千斛錢三十萬吿天下吳劉基為大司農孫權大暑時嘗於船中宴飲於船樓上值雷雨權以蓋自覆基餘人不得也其見待如此晉周浚武帝時三為少府以本官領將作大匠改營宗廟訖增邑五百户華表武帝時為太常卿數嵗以老病乞骸骨詔曰表清眞履素有老成之羙乆幹王事静恭匪懈而以病固辭章表懇至今聼如所上以為大中大夫賜錢二萬牀帳褥蓆祿賜與卿同仍門施行馬賀循元帝時為太常兼常侍如故循以九卿舊不加官今又疾患不宜兼處此職惟拜太常而已帝以循為清貧下令曰循氷清玉㓗行為俗表位處上卿而居身服物蓋周形而已屋室財庇風雨孤近造其廬以為慨然其賜六尺牀薦蓆褥并錢二十萬以表至德暢孤意焉循又讓不許不得已留之初不服用又為太子太傅太常如故循自以抗疾廢頓臣節不修上隆降尊之義下替交叙之敬懼非垂典之教也累表固讓帝以循體徳率物有不言之益敦勵備至期於不許命皇太子親往拜焉循有羸疾而恭於接對詔㫁賔客其崇遇如此薛亷明帝時為太常賜安卿侯詔曰亷履徳冲素盡忠恪己方賴德訓宏濟政道不幸殂殞痛于厥心今遣持節侍御史贈左光祿大夫開府儀同三司魂而有靈加茲榮寵及𦵏属王敦作逆朝廷多故不得議諡直遣使者祭以太牢王彬成帝時為度支尚書蘇浚平後改築新宫彬為大匠以營創勲勞賜爵關内侯南齊蕭頴胄為衛尉高宗廢立以頴胄預功建武二年賜頴胄以常所乗白􅀈牛梁顧恊為鴻臚大同八年卒高祖悼惜之手詔曰貟外散騎常侍鴻臚卿兼中書通事舍人顧恊廉㓗清白居然不衰久在省闥内外稱善奄然殞䘮惻怛之懐不能已已傍無近親彌足哀者大斂既畢即送其䘮柩還郷幷營冢槨近皆資給悉使周辦可増散騎常侍令使舉哀裴子野為鴻臚卿卒高祖悼惜為之流涕詔曰鴻臚卿領歩兵校尉知著作郎兼中書通事舍人裴子野文史足用㢘白自居劬勞通事多歴年所奄致䘮逝惻愴于懷可贈散騎常侍贈錢五萬布五千疋即日舉哀諡曰貞子後魏堯暄為大司農卿孝文太和十九年卒於平城帝為之舉哀贈安北將軍相州刺史贈帛七百疋成淹除羽林監領主客令加威逺将軍于時宫殿初措經始務廣兵民運財日有萬計伊雒流澌苦於厲渉淹遂啟求勑都水造浮航孝文賞納之意欲榮淹於衆朔旦受期百官在位乃賜帛百疋知左右二都水事北齊崔暹為太常卿文宣帝謂羣臣曰崔太常清正天下無雙卿等不及後周趙肅魏大統十三年除廷尉少卿眀年元日當行朝禮非有封爵不得預焉肅時未有茅土不入左僕射長孫儉言之文帝乃召肅謂曰嵗初行禮豈得使卿不預然何為不早言也於是令肅自選封名肅曰清河縣乃太平之應竊所􅂅也於是封清河縣子邑懐逺百户隋趙綽高祖時為大理少卿處法平允帝以綽有誠直之心每引入閣中或遇帝與皇后同榻即呼綽坐評論得失前後賞賜萬計其後進位開府贈其父為蔡州刺史時河東薛胄為大理卿俱名平恕然胄斷獄以情而綽守法俱為稱職帝每謂綽曰朕於卿無愛惜但卿骨相不當貴顯仁夀中卒官帝為之流涕中使弔祭焉鴻臚監護䘮事唐竇誕太宗時為殿中監進封莘國公以修營太廟賜物五百叚叚綸為宗正卿卒太宗甚傷悼為不視朝將出臨之太常奏帝祭致齊不得哭而止楊師道為太常卿貞觀二十一年卒贈吏部尚書并州都督陪𦵏昭陵賜東園秘器并為立碑栁亨為光䘵少卿貞觀二十三年以修太廟功加金紫光禄大夫李弼高宗時為衛尉卿上元元年九月帝御含元殿東翔鸞閣觀大酺是日弼暴卒於宴所帝為之廢酺一日贈工部尚書李琬為幽州刺史宗正卿代宗大歴六年賜琬雜綵一百疋衣一襲以其職奉陵寢績用可稱褒之白琇珪為司農少卿遷大卿在卿曹十餘年徳宗以為可任腹心遂引為神䇿軍使兼御史大夫賜名志貞白居易為秘書監因中謝日賜金紫册府元龜卷六百二十
