body:
  text: 册府元龜卷一百八十三宋王欽若等撰閏位部勲業自秦承六世之餘烈并吞宇内武功震耀遂建大號𤣥德憑宗室之緒仲謀藉父兄之業遭値世亂分據勢勝奄宅吳蜀是爲鼎國宋齊梁陳迭主南紀東魏北齊創都於鄴莫不因嗷嗷之資紏桓桓之旅或仗義慷慨或乘機奮發解紛排難夷兇禁暴威懷兼濟以成厥功咸能驅策賢智而任其謀訓練驍果而盡其力勤身征伐以清外侮積日累勞以稔民聽然後謳訟咸集嗜欲將至端委揖讓南面而君民者焉秦始皇帝莊襄王之子臣欽若等曰自莊襄王已上事具列國君部諸門年十三代莊襄王立爲秦王當是時秦地已并巴蜀漢中越宛有郢置南郡北收上郡以東有河東太原上黨郡東至滎陽滅二周置三川郡吕不韋爲相招致賔客游士欲以并天下李斯爲舎人主廏内小吏官名也或曰侍從賔客謂之舎人也蒙驁王齮一作齕麃公爲將軍麃秦邑王年少初即位委國事大臣元年晉陽反蒙驁擊定之二年麃公將軍攻卷斬首三萬三年蒙驁攻韓取十三城又攻魏氏畼有詭四年㧞之五年攻魏定酸棗陳留有酸棗縣燕虚長平平一作千汝南有長平縣雍丘山陽陳留有雍丘縣河内有山陽縣皆㧞之取二十城六年韓魏趙衞楚共擊秦取壽陵秦出兵五國兵罷㧞衞迫東郡其君角率其支屬徙居野王阻其山保魏之河内七年蒙驁死以攻龍孤慶都慶一作麃還兵攻汲八年王弟長安君成蟜將軍擊趙九年攻魏垣蒲陽十一年將軍王翦桓齮楊端和攻鄴取九城王翦攻閼與橑陽在并州十三年桓齮攻趙平陽殺趙將扈輙斬首十萬十四年攻趙軍於平陽取宜安破之殺其將軍定平陽武城十五年大興兵一軍至鄴一軍至太原取狼孟屬太原十六年發卒受地韓南陽假守騰魏獻地於秦秦置麗邑十七年内史騰攻韓得韓王安盡納其地十八年大興兵攻趙王翦將上地葢咸陽面爲上地也下井陘山名端和將河内圍邯鄲城羗瘣伐趙十九年瘣與王翦盡定取趙地東陽得趙王引兵欲攻燕屯中山趙公子嘉率其宗數百人之代自立爲代王東與燕合兵軍上谷二十年使王翦辛勝攻燕燕代發兵擊秦軍秦軍破燕易水之西二十一年王賁攻薊乃益發卒詣王翦軍遂破燕軍取燕薊城得太子丹之首二十二年王賁攻魏引河溝灌大梁城壞其王請降盡取其地二十三年王翦擊荆取陳以南至平輿縣名在汝南虜荆王二十五年大興兵使王賁將攻燕遼東得燕王喜還攻代虜代王嘉王翦定荆江南地降越君二十六年齊王建與其相后勝發兵守其西界不通秦秦使王賁從燕南攻齊得齊王建遂并天下爲始皇帝蜀先主涿郡涿縣人祖雄父𢎞世仕州郡臣欽若等曰自𢎞已上事具閏位氏號門吳及宋齊已下放此先主少孤好交結豪俠年少爭附之中山大商張世平蘇雙等貲累千金乃多與之金財先主繇是得用合徒衆後漢靈帝末黄巾起先主率其屬從校尉鄒靖討賊有功除安喜尉縣名屬中山督郵以公事到縣先主求謁不通直入縛督郵杖二百解綬繫其頸著馬柳棄官亡命頃之大將軍何進遣都尉母丘毅詣丹陽募兵先主與俱行至下邳遇賊力戰有功除爲下密丞後去官後爲髙唐尉遷令爲賊所破往奔中郎將公孫瓚瓚表爲别部司馬使與青州刺史田楷拒冀州牧袁紹數有戰功試守平原令後領平原相郡民劉平素輕先主耻爲之下使客刺之客不忍刺語之而去袁紹攻公孫瓚先主與田楷東屯齊曹公征徐州徐州牧陶謙遣使告急於田楷楷與先主俱救之時先主自有兵千餘人及幽州烏丸雜胡騎又畧得饑民數千人既到陶謙以丹陽兵四千益先主先主遂去楷歸謙謙表爲豫州刺史屯小沛謙病篤謂别駕糜竺曰非劉備不能安此州也謙死竺率州人迎先主先主未敢當下邳陳登謂先主曰今漢室陵遲海内傾覆立功立事在於今日彼州殷富户口百萬欲屈使君撫臨州事先主曰袁公路近在壽春此君四世五公海内所歸君可以州與之登曰公路驕豪非治亂之主今欲爲使君合歩騎十萬上可以安主濟民成五霸之業下可以割地守境書功於竹帛若使君不見聽許登亦未敢聽使君也北海相孔融謂先主曰袁公路豈憂國㤀家者邪冡中枯骨何足介意今日之事百姓與能天與不取悔不可追先主遂領徐州時陳登等遣使詣袁紹曰天降災殄禍臻鄙州州將殂殞生民無主恐懼姦雄一旦乘隙以貽盟主日昃之憂輙共奉故平原相劉備府君以爲宗主永使百姓知有依歸方今㓂難縱横不遑釋甲謹遣下吏奔告于執事紹答曰劉𤣥德𢎞雅有信義今徐州樂戴之誠副所望也袁術來攻先主拒之於盱眙淮陰曹公表先主爲鎮東將軍封宜城亭侯是歳建安元年也先主與術相持經月吕布乘虚襲下邳下邳守將曹豹反間迎布布虜先主妻子先主轉軍於海西楊奉韓暹冦徐揚間先主邀擊盡斬之先主求和於吕布布還其妻子先主遣闗羽守下邳遂還小沛復合兵得萬餘人吕布惡之自出兵攻先主先主敗走歸曹公曹公厚遇之以爲豫州牧將至沛收散卒給其軍粮益與兵使東擊布布遣高順攻之曹公遣夏侯惇往不能救爲順所敗復虜先主妻子送布曹公自出東征助先主圍布於下邳生禽布先主復得妻子從曹公還許表先主爲左將軍禮之愈重出則同輿坐則同席袁術欲經徐州北就袁紹曹公遣先主督朱靈路招要擊術未至術病死先主未出時獻帝舅車騎將軍董承僻受帝衣帶中密詔當誅曹公先主未發是時曹公從容謂先主曰今天下英雄惟使君與操耳本初之徒不足數也先主方食失匕箸時正當雷霆先主謂曹公曰聖人云迅雷風烈必變良有以也一震之威乃何至於此遂與承及長水校尉种輯將軍吳子蘭王子服等同謀會見使未發事覺承等皆伏誅時承等與先主謀未發而備出承謂服曰郭多有數百兵摧李傕數萬人但足下與吾同義耳昔吕不韋之門須子楚而後高今吾與子繇是也服曰惶懼不敢當且兵又少承曰舉事訖得曹公成兵顧不足邪服曰今京師豈有所任乎承曰長水校尉种輯議郎吳碩是吾腹心辦事者遂定計先主據下邳靈等還先主乃殺徐州刺史車胄留闗羽守下邳而身還小沛東海昌霸反郡縣多叛曹公爲先主衆數萬人遣孫乾與袁紹連和曹公遣劉岱王忠擊之不克五年曹公東征先主先主敗績曹公盡收其衆虜先主妻子并禽羽以歸先主走青州青州刺史袁譚先主故茂才也將歩騎迎先主先主隨譚到平原譚馳使白紹紹遣人將騎道路奉迎身去鄴二百里與先主相見駐月餘日所失亡士卒稍來集曹公與袁紹相拒於官渡汝南黄巾劉辟等叛曹公應紹紹遣先主將兵與辟等畧許下闗羽亡歸先主曹公遣曹仁將兵擊先主先主還紹軍陰欲離紹乃說紹南連荆州牧劉表紹遣先主將本兵復至汝南與賊龔都等合衆數千人曹公遣蔡陽擊之爲先主所殺曹公既破紹自南擊先主先主遣糜竺孫乾與劉表相聞表自郊迎以上賔禮待之益其兵使屯新野荆州豪傑歸先主者日益多表疑其心陰禦之先主駐荆州數年嘗於表坐起至厠見髀裏肉生慨然流涕還坐表怪問備曰平常身不離鞍髀肉皆消今不復騎髀裏肉生日月若馳老將至矣而功業不建是以悲耳表使先主拒夏侯惇于禁等於博望久之先主設伏兵一旦自燒屯僞遯惇等追之爲伏兵所破十一年曹公北征烏丸先主說表襲許表不能用曹公南征㑹表病篤託國於先主曰我兒不才而諸將並零落我死之後卿便攝荆州先主曰諸子自賢君其憂病或勸先主宜從表言先主曰此人待我厚今從其言人必以我爲薄所不忍也表卒其子琮代立遣使乞降曹公不告先主先主亦不知久之乃覺遣所親問琮琮令宋忠詣先主宣㫖是時曹公在宛先主大驚駭謂忠曰卿諸人作事如此不早相語今禍至方告我不亦太劇乎引刀向忠曰今斷卿頭不足以解忿亦耻大丈夫臨别復殺卿軰遣忠去乃呼部曲議或勸先主刼琮將及荆州吏士徑南到江陵先主答曰劉荆州臨亡託我以孤遺背信自濟吾所不爲死何靣目以見劉荆州乎乃駐馬呼琮琮懼不能起琮左右及荆州人多歸先主先主過辭表墓涕泣而去比到當陽衆十餘萬輜重數千兩日行百餘里别遣闗羽乘船數百艘使會江陵或謂先主曰宜速行保江陵今雖擁大衆被甲者少若曹公兵至何以拒之先主曰夫濟大事必以人爲本今人歸吾吾何忍棄去曹公以江陵有軍實恐先主據之乃釋輜重輕軍到襄陽聞先主已過曹公將精騎五千急追之一日一夜行三百餘里及於當陽之長坂先主棄妻子與諸葛亮張飛趙雲等數十騎走曹公大獲其人衆輜重先主斜趣漢津適與羽船會得濟沔遇表長子江夏太守琦衆萬餘人與俱到夏口先主遣諸葛亮自結於孫權權遣周瑜程普等水軍數萬與先主并力與曹公戰於赤壁大破之焚其舟船先主與吳軍水陸并進追到南郡時又疾疫北軍多死曹公引歸先主表琦爲荆州刺史又南征四郡武陵太守金旋長沙太守韓𤣥桂陽太守趙範零陵太守劉度皆降廬江雷緒率部曲數萬口稽顙琦病死羣下推先主爲荆州牧治公安江表傳曰偹立營於油口改名爲公安權稍畏之進妹固好先主至京見權綢繆恩紀十六年益州牧劉璋遙聞曹公將遣鍾繇等向漢中討張魯内懷恐懼别駕從事蜀郡張松說璋曰曹公兵强無敵於天下若因張魯之資以取蜀楚誰能禁之者乎璋曰吾固憂之而未有計松曰劉豫州使君之宗室而曹公深讐也善用兵若使之討魯魯必破魯破則益州强曹公雖來無能爲也璋然之遣法正將四千人迎先主前後賂遺以巨億計正因陳益州可取之策先主前見張松後得法正皆厚以恩意接納盡其殷勤之歡因問蜀中濶狹兵器府庫人馬衆寡及諸要害道里逺近松等具言之又畫地圖山川處所繇是盡知益州虚實也先主留諸葛亮闗羽等據荆州將歩卒數萬人入益州至涪璋自出迎相見甚歡張松令法正白先主及謀臣龎統進說便可於會所襲璋先主曰此大事也不可倉卒璋推先主行大司馬領司𨽻校尉先主亦推璋行鎮西大將軍領益州牧璋增先主兵使擊張魯又令督白水軍先主并三軍萬餘人車甲器械資貨甚盛是歳璋還成都先主北到葭萌未即討魯厚樹恩徳以收衆心明年曹公征孫權權呼先主自救先主遣使告璋曰曹公征吳吳憂危急孫氏與孤本爲唇齒又樂進在青泥與闗羽相拒今不往救羽進必大克轉侵州界其憂有甚於魯魯自守之賊不足慮也乃從璋求萬兵及資寶欲以東行璋但許兵四千其餘皆給半先主激怒其衆曰吾爲益州征彊敵師徒勤瘁不遑寧居今積帑藏之財而恡於賞功望士大夫爲出死力戰其可得乎張松書與先主及法正曰今大事垂可立如何釋此去乎松兄廣漢太守肅懼禍逮已白璋發其謀於是璋收斬松嫌隙始搆矣璋敕闗戍諸將文書勿復闗通先主先主大怒召璋白水軍督楊懷責以無禮斬之乃使黄忠卓膺勒兵向璋先主徑至闗中質諸將并士卒妻子引兵與忠膺等進到涪據其城璋遣劉璝冷苞張任鄧賢等拒先主於涪皆破敗退保綿竹璋復遣李嚴督綿竹諸軍嚴率衆降先主軍益彊分遣諸將平下屬縣諸葛亮張飛趙雲等將兵泝流定白帝江州江陽維闗羽留鎮荆州先主進軍圍雒時璋子循守城被攻且一年十九年夏雒城破進圍成都數十日璋出降時璋遣帳下司馬張裔詣先主先主許以禮其君而安其人也裔還城門乃開先主以裔爲巴郡太守蜀中殷盛豐樂先主置酒大饗士卒取蜀城中金銀分賜將士還其榖帛先主復令益州牧諸葛亮爲股肱法正爲謀主闗羽張飛馬超爲爪牙許靖麋竺簡雍爲賔友二十年孫權以先主已復益州使使報欲得荆州先主言須得涼州當以荆州相與權忿之乃遣吕蒙襲奪長沙零陵桂陽三郡先主引兵五萬下公安令闗羽入益陽是歳曹公定漢中張魯遯走巴西先主聞之與權連和分荆州江夏長沙桂陽東屬南郡零陵武陵西屬引軍還江州今夔州也遣黄權將兵迎張魯張魯已降曹公曹公使夏侯淵張郃屯漢中數數犯暴巴界先主令張飛進兵宕渠與郃等戰於瓦口破郃等收兵還南鄭先主亦還成都二十三年先主率諸將進兵漢中分遣將軍吳蘭雷銅等入武都皆爲曹公所没先主次于陽平闗與淵郃等相拒二十四年春自陽平南渡沔水縁山稍前因定軍山勢作營淵將兵來爭其地先主命黄忠乗高皷譟攻之大破淵軍斬淵郃及曹公所署益州刺史趙顒等曹公自長安舉衆南征積月不㧞亡者日多乃引軍還先主遂有漢中遣劉封孟逹李平等攻申耽於上庸是秋羣下上先主爲漢中王表於漢帝於是還治成都時闗羽攻曹公將曹仁禽于禁於樊俄而孫權襲殺羽取荆州二十五年魏文帝稱尊號改年曰黄初或傳聞漢帝見害乃發䘮制服追謚曰孝愍皇帝是後在所並言衆瑞日月相屬郡臣上尊號即皇帝位於成都武擔之南吳孫堅吳郡富春人少爲縣吏年十七與父共載船至錢塘擊殺海賊胡玉等繇是顯聞府召署假尉會稽妖賊許昌起於句章自稱陽明皇帝與其子韶扇動諸縣衆以萬數堅以郡司馬募召精勇得千餘人與州郡合討破之是歳熹平元年刺史臧旻列上功狀詔書除堅鹽瀆丞數歳徙盱眙丞又徙下邳丞歴三縣所在有稱吏民親附中平元年黄巾賊帥張角起於魏郡託有神靈遣八使以善道教化天下而潛相連結自稱黄天㤗平三月甲子三十六萬一旦俱發天下響應燔燒郡縣殺害長吏角稱天公將軍角弟寶稱地公將軍寶弟梁稱人公將軍漢遣車騎將軍皇甫嵩中郎將朱儁將兵討擊之儁表請堅爲佐軍司馬鄉里少年隨在下邳者皆願從堅又募諸商旅及淮泗精兵合千許人與儁并力奮擊所向無前一云堅乘勝深入於西華失利堅被創堕馬卧草中軍衆分散不知堅所在堅堅所騎驄馬馳還營掊地呼鳴將士隨馬於草中得堅還營十數日創少愈乃復出戰汝潁賊困迫走保宛城堅身當一面登城先入衆乃蟻附遂大破之儁具以狀聞上拜堅别部司馬邊章韓遂作亂凉州中郎將董卓拒討無功中平三年遣司空張温行車騎將軍西討章等温表請堅與參軍事尋拜議郎時長沙賊區星自稱將軍衆萬餘人攻圍城邑乃以堅爲長沙太守到郡親率衆士施設方略旬月之間克破星等堅到郡郡中震服任用良吏勑吏曰謹遇良善治官曹文書必循治以盗賊付太守周朝郭石亦帥徒衆起於零桂與星相應遂越境尋討三郡肅然堅爲長沙太守是時廬江太守陸康從子作宜春長爲賊所攻遣使求救於堅堅整嚴救之主簿進諫堅答曰太守無文德以征伐爲功越界攻討以全異國以此獲罪何愧海内乎乃進兵往救賊聞而走漢朝録前後功封堅烏程侯董卓擅朝政横恣京城諸州郡並興義兵欲以討卓堅亦舉兵荆州刺史王叡素遇堅無禮堅過殺之比至南陽衆數萬人南陽太守張咨聞軍至晏然自若堅以牛酒禮咨咨明日亦答詣堅酒酣長沙主簿入白堅前移南陽而道路不治軍資不具請收主簿推問意故咨大懼欲去兵陳四周不得出有頃主簿復入白堅南陽太守稽停義兵使賊不時討請收出案軍法從事便牽咨於軍門斬之郡中震慄無求不獲一云南陽太守張咨既不給軍糧又不肯見堅堅欲進兵恐有後患乃詐得疾舉軍震惶迎呼巫醫禱祀山川遣所親人入說咨言病困欲以兵付咨咨聞之心利其兵即將歩騎五六百人詣營省堅堅卧與相見無何卒然而起按劔罵咨遂執斬之前到魯陽與袁術相見術表堅行破虜將軍領豫州刺史遂治兵於魯陽城當進軍討董卓遣長史公孫稱將兵從事還州督促軍糧施幔於城東門外祖道送稱官屬並會卓遣歩騎數萬人逆堅輕騎數十先到堅方行酒談笑勑部曲整頓行陣無得妄動後騎漸益堅徐罷坐導引入城乃謂左右曰向堅所以不即起者恐兵相蹈籍諸君不得入耳卓兵見堅士衆甚整不敢攻城乃引還堅移屯梁東大爲卓軍所攻堅與數十騎潰圍而出復相收兵合戰於陽人大破卓軍梟其都督華雄等是時或間堅於袁術術懐疑不運軍糧陽人去魯陽百餘里堅夜馳見術術踧踖即調發軍糧堅還屯卓憚堅猛將乃遣將軍李傕等來求和親令堅列疏子弟任刺史郡守者許表用之堅曰卓逆天無道蕩覆王室今不夷汝三族縣示四海則吾死不瞑目豈將與乃和親邪復進軍大谷距雒九十里卓自出與堅戰於諸陵墓間卓敗走却屯黽池聚兵於陜堅進雒陽宣陽城門更擊吕布復破走堅乃掃除宗廟平塞諸陵分兵出函谷闗至新安黽池間以截卓後卓謂長史劉艾曰闗東諸將數敗矣無能爲也惟孫堅小戇諸將軍宜愼之是時闗東州郡務相兼并以自彊大袁紹遣會稽周㬂爲豫州刺史來襲取州堅慨然歎曰同舉義兵將救社稷逆賊垂破而各若此吾當誰與戮力乎言發涕下初平三年袁術使堅征荆州劉表表遣黄祖逆於樊鄧之間堅擊破之追渡漢水遂圍襄陽單馬行峴山爲祖軍士所射殺一云堅悉其衆攻表表閉門夜遣將黄祖潛出發兵祖將兵欲還堅逆與戰祖敗走竄峴山中堅乗勝夜追祖祖部兵從竹水間暗射堅殺之時年三十七又云劉表將吕公將兵縁山向堅堅輕騎尋山討公公兵下石中堅頭應時腦出兄子賁帥將士衆就術術表賁爲豫州刺史權既稱尊號謚堅曰武烈皇帝䇿堅之長子初興義兵䇿將母徙居舒與周瑜相友收合士大夫江淮間人咸向之堅薨還塟曲阿已乃渡江居江都徐州牧陶謙深忌策策舅吳景時爲丹陽太守策乃載母徙曲阿與吕範孫河俱就景因縁召募約數百人時張紘有母䘮䇿數詣紘啓以世務曰方今漢祚中微天下擾攘英雄雋傑各擁衆營私未有能扶危濟亂者也先君與袁氏共破董卓功業未遂卒爲黄祖所害策雖暗稚竊有微志欲從袁陽州求先君餘兵就舅氏於丹陽收合流散東據吳㑹報讐雪恥爲朝廷外藩君以爲何如紘答曰既素空劣方居縗絰之中無以奉贊盛略策曰君高名播越遠近懷歸今日事計决之於君何得不紆慮啓告副其高山之望若微志得展血讐得報此乃君之勲力策心所望也因涕泣横流顔色不變紘見策忠壯内發辭令慷慨感其志意乃答曰昔周道陵遲齊晉並興王室已寧諸侯貢職今君紹先侯之軌有驍武之名若投丹陽收兵吳㑹則荆揚可一讐敵可報據長江奮威德誅除羣穢佐輔漢室功業侔於桓文豈徒外藩而已哉方今世亂多難若功成事立當與同好俱南濟也策曰一與君同符合契同有永固之分今便行矣以老母弱弟委付於君策無復囘顧之憂策徑到壽春見袁術涕泣而言曰亡父昔從長沙入討董卓與明使君㑹於南陽同盟結好不幸遇難勲業不終策感惟先人舊恩欲自慿結願明使君垂察其誠術甚貴異之然未肯還其父兵術謂策曰孤始用貴舅爲丹陽太守賢從伯陽爲都尉彼精兵之地可還依召募策遂詣丹陽依舅得數百人而爲涇縣大帥祖郎所襲幾至危殆於是復往見術術以堅餘兵千餘人還策太傅馬日磾仗節安集闗東在壽春以禮辟策表拜懷義校尉策騎士有罪逃入術營隱於内廏策指使人就斬之訖詣術謝術曰兵人好叛當共疾之何爲謝也繇是軍中益畏憚之術欲攻徐州從廬江太守陸康求米三萬斛康不與術遣策攻康㧞之先是劉繇爲揚州刺史州舊治壽春壽春術已據之繇乃渡江治曲阿時吳景尚在丹陽策從兄賁又爲丹陽都尉繇至皆迫逐之景賁退舎歴陽繇遣樊能于麋陳横屯江津張英屯當利口以拒術術自用故吏琅邪惠衢爲揚州刺史更以景爲督軍中郎將與賁共將兵擊英等連年不克策乃說術乞助景等平定江東策說術云家有舊恩在東願助舅討横江横江㧞因投本土召募可得三萬兵以佐明使君經濟漢室術知其恨而以劉繇據曲阿王郎在㑹稽謂策未必能定故許之術表策爲折衝校尉行殄冦將軍兵財千餘騎數十匹賔客願從者數百人比至歴陽衆五六千策母先自曲阿徙於歴陽策又徙母阜陵渡江轉鬭所向皆破莫敢當其鋒而軍令整肅百姓懷之策年少雖有位號而士民皆呼爲孫郎百姓聞孫郎至皆失魂魄長吏委城郭竄伏山草及至軍士奉令不敢虜略雞犬菜茹一無所犯民乃大悅競以牛酒詣軍劉繇既走策入曲阿勞賜將士遣將陳寶詣阜陵迎母及弟發恩布令告諸縣笮融等故鄉部曲來降首者一無所問樂從軍者一身行復除門户不樂者勿彊也旬日之間四面雲集得見兵二萬餘人馬千餘匹威震江東形勢轉盛吳人嚴白虎等衆各萬餘人處處屯聚吳景等欲先擊破虎等乃至㑹稽䇿曰虎等羣盗非有大志此成禽耳遂引兵渡浙江據㑹稽屠東治白虎高壘堅守使其弟輿請和許之輿請獨與策㑹面約既㑹䇿引白刅斫席輿體動策笑曰聞卿能坐躍勦㨗不常聊戲卿耳輿曰我見刅乃然策知其無能也乃以手㦸投之立死輿有勇力白虎衆以其死也甚懼進攻破之盡更置長吏策自領㑹稽太守復以吳景爲丹陽太守以孫賁爲豫章太守分豫章爲廬陵郡以賁弟輔爲廬陵太守丹陽朱治爲吳郡太守彭城張昭廣陵張紘秦松陳端等爲謀主時袁術僭號策以書諫曰董卓無道陵虐王室禍加太后暴及𢎞農天子播越宫廟焚毁是以豪傑發憤沛然俱起元惡既斃少主東顧乃使主人奉命宣明朝恩偃武修文與之更始然而河北異謀於黑山曹操毒被於東徐劉表僭亂於荆南公孫叛逆於朔北正禮阻兵𤣥德爭盟是以未獲從命櫜弓戢戈當謂使君與國同規而舎是弗恤宛然有自取之志懼非海内企望之意也成湯討桀稱有夏多罪武王伐紂曰殷有重罰此二王者雖有聖德假使時無失道之過無繇逼而取也今主上非有惡於天下徒以㓜小脅於强臣異於湯武之時也又聞㓜主明智聰敏有夙成之德天下雖未被其恩咸歸心焉若輔而興之則旦奭之美率土所望也使君五世相承爲漢宰輔榮寵之盛莫與爲比宜效忠守節以報王室時人多惑圖緯之言妄牽非類之交茍以悅主爲美不顧成敗之計古今所慎可不熟慮忠言逆耳駁義致憎茍有益於尊名無所敢辭術不納策遂絶之曹公表策爲討逆將軍封爲吳侯一云建安二年夏漢朝遣議郎王輔奉戊辰詔書曰董卓逆亂凶國害民先將軍堅念在平討雅意未遂厥美著聞策遵善道求福不囘今以策爲騎都尉襲爵烏程侯領會稽太守策上表謝曰臣以固陋孤持邊陲陛下廣播膏澤不遺細節以臣襲爵兼典名郡仰惟榮顧非所克堪興平二年十二月二十日於吳郡曲阿得袁術所呈表以臣行殄冦將軍至被詔書乃知詐擅雖輙捐廢猶用悚悸臣年十七䘮失所怙懼有不任堂構之鄙以沗析薪之戒誠無去病十八建功世祖列將弱冠佐命臣初領兵年未弱冠雖駑懦不武然思竭微命惟術狂惑爲惡深重臣馮威靈奉辭伐罪庶必獻㨗以報所受袁術死長史楊𢎞大將張勲等將其衆欲就策廬江太守劉勲要擊悉虜之收其珍寶以歸策聞之僞與勲好盟勲新得術衆時豫章上繚宗民萬餘家在江東策勸攻勲取之勲既行策輕軍晨夜襲㧞廬江勲衆盡降勲獨與麾下數百人自歸曹公江表傳曰策被詔勑與司空曹公衛將軍董承益州牧劉璋等恊力討袁術劉表軍嚴當進㑹術死術從弟裔女壻黄猗等畏懼曹公不敢守壽春乃共舁術棺柩扶其妻子及部曲男女就劉勲於皖城勲糧食少無以相振乃遣從弟偕告糴於豫章太守華歆歆郡素少榖遣吏將偕就海昏上繚使諸宗帥共出三萬斛米以與偕偕住歴月纔得數千斛偕乃復勲具說形狀使勲來襲誅之勲得偕書便潛軍到海昏邑下宗帥知之空壁逃匿勲了無所得時策西討黄祖行及石城聞勲輕身詣海昏便分遣從兄賁輔率八千人於彭澤待勲自與周瑜率二萬人歩襲皖城即克之得術百工及皷吹部曲三萬餘人并術勲妻子表用汝南李術爲廬江太守給兵三千人以守皖皆徙所得人東詣吳賁輔又於彭澤破勲勲求入楚江從尋陽歩上到置馬亭聞策等已克皖乃投西塞至沂築壘自守告急於劉表求救於黄祖祖遣太子射船軍五千人助勲策復就攻大破勲勲與偕北歸曹公射亦遁走策收得勲兵三千餘人船千艘遂前進夏口攻黄祖時劉表遣從子虎南陽韓晞將長矛五千來爲黄祖前鋒策與戰大破之呉録載策表曰臣討黄祖以十二月八日到祖所屯沙羡縣劉表遣將助祖並來趣臣臣以十一日平旦部所領江夏太守行建威中郎將周瑜領林陽太守行征虜中郎將吕範領零陵太守行蕩冦中郎將程普行奉義校尉孫權行先登校尉韓當行武鋒校尉黄葢等同時俱進身跨馬擽陳手擊急皷以齊戰勢吏士奮擊踊躍百倍心精意果各競用命越渡重壍迅疾若飛火放上風兵激煙下弓弩並發流矢雨集日加辰時祖乃潰爛鋒刅所截焱火所焚前無生冦惟祖迸走獲其妻息男女七人斬虎狼韓晞以下三萬餘級其赴水溺者二萬餘口船六千餘艘財物山積雖表未禽祖宿狡猾爲表腹心出作爪牙表之鴟張以祖氣息而祖家屬部曲掃地無餘表孤特之虜成鬼行尸誠皆聖朝神武遠振臣討有罪得效微勤是時袁紹方强而策并江東曹公力未能逞且欲撫之乃以弟女配策小弟匡又爲子章取賁女皆禮辟策弟權翊又命揚州刺史嚴象舉權茂才建安五年曹公與袁紹相拒於官渡策陰欲襲許迎漢帝密治兵部署語未發㑹爲故吳郡太守許貢客所殺先是策殺貢貢小子與客亡匿江邊策單騎出卒與客遇客擊傷策陳登爲廣陵太守治射陽登即瑀之從兄子也孫策前西征登陰復遣間使以印綬與嚴白虎餘黨圖爲後害以報瑀見破之辱策歸復討登軍到丹徒須待運糧策好獵將歩騎數出策驅馳逐鹿所乗馬精駿從騎絶不能及初吳郡太守許貢上表於漢帝曰孫策驍雄與項籍似宜加貴寵召還京邑若被詔不得不還若放於外必作後患策候吏得貢表以示策請貢相見以責讓貢貢辭無表策即令武士絞殺之貢奴客濳民間欲爲貢報讐獵日卒有三人即貢客也策問爾等何人答曰是韓當兵在此射鹿耳策曰當兵吾皆識之未嘗見汝等因射一人應弦而倒餘二人怖急便舉弓射策中頰後騎尋至皆刺殺之創甚請張長史昭等謂曰中國方亂夫以吳越之衆三江之固足以觀成敗公等善相吾弟呼權佩以印綬謂曰舉江東之衆决機於兩陣之間與天下爭衡卿不如我舉賢任能各盡其心以保江東我不如卿至夜卒時年二十六權稱尊號追謚策曰長沙桓王權策之弟策既定諸郡時權年十五以爲陽羡長郡察孝亷州舉茂才行奉義校尉建安四年從策征廬江太守劉勲勲破進討黄祖於沙羡五年策薨以事授權哭未及息策長史張昭謂權曰孝亷此寧哭時邪乃改易權服扶令上馬使出廵軍曹公表權爲討虜將軍領㑹稽太守屯吳使丞之郡行文書事待張昭以師傅之禮而周瑜程普吕範等爲將帥招延俊秀聘求名士魯肅諸葛瑾等始爲賔客分部諸將鎮撫山越討不從命初孫策表用李術爲廬江太守策亡之後術不肯事權而多納其亡叛權移書求索術報曰有德見歸無德見叛不應復還權大怒乃以狀白曹公曰嚴刺史昔爲公所用又是州舉將而李術凶惡輕犯漢制殘害州司肆其無道宜速誅滅以懲醜類今欲討之進爲國朝掃除鯨鯢退爲舉將報塞怨讐此天下逹義夙夜所甘心術心懼誅復詭說求救明公所居阿衡之任海内相瞻願勑執事勿復聽受是歳舉兵攻術於皖城術閉門自守求救於曹公曹公不救糧食乏盡婦女或丸土而吞之遂屠其城梟術首徙其部曲三萬餘人八年權西伐黄祖破其舟軍惟城未克而山冦復動還過豫章使吕範平鄱陽會稽程普討樂安太史慈領海昏韓當周泰吕蒙等爲劇縣令長十年權使賀齊討上饒分爲建平縣十二年西征黄祖虜其人民而還十三年春權復征黄祖祖先遣舟兵拒軍都尉吕䝉破其前鋒而凌統董襲等盡銳攻之遂屠其城祖挺身亡走馮則追梟其首虜其男女數萬口荆州牧劉表死權將魯肅乞奉命弔表二子且以觀變肅未到而曹公已臨其境表子琮舉衆以降劉備欲南濟江肅與相見因傳權㫖爲陳成敗備進住夏口使諸葛亮詣權權遣周瑜程普等行是時曹公新得表衆形勢甚盛諸議者皆望風畏懼多勸權迎之曹公與權書問近者奉辭伐罪旌麾南指劉琮束手今治水軍八十萬衆方與將軍會獵於吳權得書以示羣臣莫不嚮震失色惟瑜肅執拒之議意與權同瑜普爲左右督各領萬人與備俱進遇於赤壁大破曹公曹軍燒其餘船引退士卒饑疫死者大半備瑜等復追至南郡曹公遂北還留曹仁徐晃於江陵使樂進守襄陽權自率衆圍合肥使張昭攻九江之當塗昭兵不利權攻城踰月不能下曹公自荆州還遣張喜將騎赴合肥未至權退十四年瑜仁相守歳餘所殺傷甚衆仁委城走權以瑜爲南郡太守劉備表權行車騎將軍領徐州牧備領荆州牧屯公安十六年權徙治秣陵十七年城石頭作濡須塢十八年正月曹公攻濡須權與相拒月餘曹公望權軍歎其齊肅乃退曹公出濡須作油船夜渡洲上權以水軍圍取得三千餘人其没溺者亦數千人權數挑戰公堅守不出權乃自來乘輕船從濡須口入公軍諸將皆以爲是挑戰者欲擊之公曰此必孫權欲身見吾軍部伍也勑軍中皆精嚴弓弩不得妄發權行五六里廻還作鼓吹公見舟船器仗軍伍整肅喟然嘆曰生子當如孫仲謀劉景升兒子若豚犬耳十九年五月權征皖城閏月克之獲廬江太守朱光及參軍董和男女數萬口是歳劉備定蜀權以備已得益州令諸葛瑾從求荆州諸郡備不許曰吾方圖涼州涼州定乃盡以荆州與吳耳權曰此假而不反而欲以虛辭引歳遂置南三郡長吏闗羽盡逐之權大怒遣吕䝉督鮮于丹徐忠孫規等兵三萬取長沙零陵桂陽三郡使魯肅以萬人屯巴丘巴丘今曰巴陵以禦闗羽權住陸口爲諸郡節度䝉到二郡皆服惟零陵太守郝普未下會備到公安使闗羽將三萬兵至益陽權乃召䝉等使還助肅䝉使人誘普普降盡得三郡將守因引軍還與孫皎潘璋并魯肅兵並進拒羽於益陽未戰會曹公入漢中備懼失益州使使求和權令諸葛瑾報更尋盟好遂分荆州長沙江夏桂陽以東屬權南郡零陵武陵以西屬備備歸而曹公已還權反自陸口遂征合肥合肥未下徹軍還兵皆就路權與凌統甘寧等在津北爲魏將張遼所襲統等以死扞權權乘駿馬越津橋得去二十一年冬曹公次于居巢遂攻濡須二十二年春權令都尉徐詳詣曹公請降公報使修好誓重結婚二十四年闗羽圍曹仁於襄陽曹公遣左將軍于禁救之會漢水暴起羽以舟兵盡虜禁等精騎三萬送江陵惟城未㧞權内憚羽外欲以爲己功牋與曹公乞以討羽自效曹公且欲使羽與權相持以鬭之驛傳權書使曹仁以弩射示羽羽猶豫不能去閏月權征羽先遣吕蒙襲公安獲將軍士仁䝉到南郡南郡太守糜芳以城降䝉據江陵撫其老弱釋于禁之囚陸遜别取宜都獲秭歸枝江夷道還屯夷陵守峽口以備蜀闗羽還當陽西討麥城權使誘之羽僞降立幡旗爲象人於城上因遁走兵皆解散尚十餘騎權先使朱然潘璋斷其徑路十二月璋司馬馬忠獲羽及其子平都督趙累等於章鄉遂定荆州曹公表權爲驃騎將軍假節領荆州牧封南昌侯二十五年正月曹公薨太子丕代爲丞相魏王是年冬魏受漢禪明年四月劉備稱帝於蜀權自公安都鄂魏文帝策封權爲吳王加九錫又明年正月權遣陸遜部將軍宋謙等攻蜀五屯皆破之所斬及投兵降者數萬人劉備奔走僅以身免初權外託事魏而誠心不欵魏欲遣侍中辛毗尚書桓楷與權盟誓并徵任子權辭讓不受魏乃命曹休張遼臧霸出洞口曹仁出濡須曹眞夏侯尚張郃徐晃圍南郡權遣吕範等督五軍拒之權遂改元黄武臨江拒守使大中大夫鄭全聘劉備於白帝然猶與魏文帝相往來至後年乃絶八年春公卿百司皆勸權正尊號四月丙申遂即皇帝位册府元龜卷一百八十三
