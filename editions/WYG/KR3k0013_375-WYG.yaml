body:
  text: 册府元龜卷三百七十五宋王欽若等撰將帥部褒異夫褒勸之典有國之常道也况夫三軍之帥百夫之特有斬將搴旗之勇却敵捕虜之勞足以經武貞帥開地斥境何嘗不剖符疏壤厚封崇之命疇庸贊書極尊奬之數以至加地進祿稱功計伐或錫之車服或加之印綬或許其世襲或崇其官呼或没而可稱禮光於詔塟或死而可作事美於追榮皆所以疇勞而勸能賞善而旌德使效節之士罄其精忠方來之人於焉激勵傳曰藏在盟府不可廢也謂是物矣夫周召公虎為卿士平淮夷宣王賜以鬯酒一尊使以祭其宗廟告其先祖故江漢之詩曰釐爾圭瓚秬鬯一卣告於文人釐賜也秬黒黍也鬯香草也築煮合而鬱之為鬯卣器也九命賜圭瓚秬鬯文人文德之人也又曰錫山川土田於周受命自召祖命周岐周也自用也宣王欲尊顯召虎故如岐周使虎受山川土田之賜命用其祖召康公受封之禮岐周周之所起為其先祖之靈故就之申伯居謝宣王命召公營其位而作城郭及寢廟定其人神所處故崧高之詩曰申伯之功召伯是營有俶其城寢廟既成俶作也又曰既成藐藐王錫申伯四牡蹻蹻鈎膺濯濯藐藐美貌蹻蹻壯貌鈎膺樊纓也濯濯光明也召公營位築之已成以形貌告於王王乃賜申伯為將遣之王遣申伯路車乗馬我圖爾居莫如南土乗馬四馬也王以正禮遣申伯之國故復有車馬之賜因告之曰我謀女之所處無如南土之最善錫爾介圭以作爾寳寳瑞也圭長尺二寸謂之介非諸侯之圭故以為寳諸侯之瑞圭自九寸而下衞武公初為武侯犬戎為亂武公將兵往佐周平戎甚有功周平王元年命衞侯為公士會晉大夫也帥師滅赤狄晉侯請於周定王王以黻冕命士會將中軍且為太傅代荀林父將中軍且加以太傅之官黻冕命卿之服太傅孤卿也秦蒙恬始皇時為將攻齊大破之拜為内史漢陳平為䕶軍中尉從高帝擊韓王信於代至平城為匈奴圍七日不得食髙帝用平竒計使單于閼氏音焉支解圍以得開髙帝既出其計秘世莫得聞髙帝南過曲逆上其城望室屋甚大曰壯哉縣吾行天下獨見雒陽與是耳顧問御史曲逆户口㡬何對曰始秦時三萬餘户間者兵數起多亡匿今見五千餘户於是詔御史更封平為曲逆侯盡食之平自初從至天下定後甞以䕶軍中尉從擊臧荼陳豨黥布凡六出竒計輙益封邑曹參沛人也髙祖為沛公參以中涓從涓潔也言其在中主知潔涓洒掃之事葢親近左右也撃胡陵方與音房豫攻秦監公軍大破之秦一郡置守尉監三人東下薛撃泗水守軍薛郭西復攻胡陵取之賜爵七大夫又攻下邑以西至虞撃秦將章邯車騎攻轅戚及亢父音杭甫先登遷為五大夫楚懐王以沛公為碭郡長將碭郡兵於是乃封參執帛楚爵孤卿也號曰建成君遷為戚公又虜秦司馬及御史各一人遷為執珪侯伯執珪及沛公為漢王封參為建成侯從至漢中遷為將軍參將兵守景陵三秦使章平等攻參參出擊大破之賜食邑於寜秦今華隂周勃沛人也沛公初起勃以中涓從攻胡陵下方與方與反與戰却敵攻豐擊秦軍碭東還軍留及蕭復攻碭破之下下邑先登賜爵五大夫沛公為漢王漢王賜勃爵為威武侯從入漢中拜為將軍還定三秦賜食邑懐徳又東定楚地泗水東海郡凡得二十二縣還守雒陽櫟陽賜與潁隂侯共食鍾離以將軍從髙祖擊燕王臧荼破之易下所將卒當馳道為多當髙祖所行之前賜爵列侯剖符世世不絶食綘八千二百八十户樊噲以舎人從髙祖攻胡陵方與皆縣名方音房與音豫還守豐撃泗水監豐下破之泗水郡名監謂御史監郡者也破之於豐縣下復東定沛破泗守薛西破郡守於薛縣之西與司馬􅊂戰碭東秦將章邯之司馬也􅊂讀與夷同郤敵斬首十五級賜爵國大夫即官大夫也爵第六級常從沛公擊章邯軍濮陽攻城先登斬首二十三級賜爵列大夫即公大夫也爵第七級從攻陽城先登下户牖陽武縣之鄉破李繇軍斬首十六級賜上聞爵得徑上聞也吕氏春秋曰魏文侯東勝齊於長城天子賞文侯以上聞又曰名通於天子也從攻圉都尉東郡守尉於成武圉即陳留圉縣郤敵斬首十四級捕虜十六人生獲曰虜賜爵五大夫從攻秦軍出亳南亳成湯封邑今河南偃師湯亭是河間守軍於杠里破之杠音江擊破趙賁軍開封北賁音奔以郤敵先登斬候一人首六十八級捕虜二十六人既斬候一人又更斬它首六十八級賜爵卿從攻破揚熊於曲遇曲音丘羽切遇音顒攻宛陵先登斬首八級捕虜四十四人賜爵封號賢成君食祿比封君而無邑也楚漢之際權設寵榮假其位號或得邑地或空受爵此例多矣從攻長社轘轅絶河津東攻秦軍尸鄉南攻秦軍於犨破南陽守齮於陽城東攻宛城先登西至酈南陽之縣也音直益切以郤敵斬首十四級捕虜四十人賜重封重封者加二號耳項羽在戲下欲攻沛公沛公從百餘騎因項伯面見項羽謝無有閉關事項羽既饗軍士中酒亞父謀欲殺沛公令項莊拔劒舞坐中欲撃沛公噲居營外聞事急乃持盾入營是日㣲噲沛公幾殆後數日項羽入屠咸陽立沛公為漢王漢王賜噲爵為列侯號臨武侯遷為郎中從入漢中還定三秦别撃西丞白水北西謂隴西郡西縣也白水水名經西縣東南流而過言撃西縣之丞於白水之北擁輕車騎雍南破之從攻雍漦城先登漦讀與邰同縣名即后稷所封今武功故城是音胎撃章平軍好畤攻城先登陷陣斬縣令丞各一人首十一級虜二十人遷為郎中騎將從擊秦車騎壤東地名也郤敵遷為將軍攻趙賁下郿槐里柳中咸陽柳中即細柳地也在長安西灌廢丘最引水灌廢丘至櫟陽賜食邑杜之樊鄉杜縣之鄉也今曰樊川從攻項籍屠煮棗清河有煮棗城功臣表有煮棗侯又曰既云攻項籍屠煮棗則其地當在大河之南非清河之城明矣俱未悉其處撃破王武程處軍於外黄攻鄒魯瑕丘薛項羽敗漢王於彭城盡復取魯梁地噲還至滎陽益食平隂二千户以將軍守廣武一嵗即滎陽之廣武項羽引東從髙祖撃項籍下陽夏夏音工雅切虜楚周將軍卒四千人周殷圍項籍陳大破之於陳縣圍之屠胡陵項籍死漢王即皇帝位以噲有功益食邑八百户其秋燕王臧荼反噲從攻虜荼定燕地楚王韓信反噲從至陳取信定楚更賜爵列侯與剖符世世勿絶食舞陽號為舞陽侯除前所食以將軍從攻反者韓王信於代自霍人以往至雲中與綘侯等共定之益食千五百户因撃陳豨曼丘臣軍戰襄國破柏人先登䧏之定清河常山凡二十七縣殘東垣殘謂多所殺傷也遷為左丞相破得綦母卬尹潘軍於無終廣昌姓綦母名卬也綦音其破豨别將胡人王黄軍代南因撃韓信軍參合軍所將卒斬韓信撃豨胡騎横谷斬將軍趙既虜代丞相馮梁守孫奮大將王黄將軍大將一人太僕解福等十人與諸將共定代鄉邑七十三後燕王盧綰反噲以相國撃綰破其丞相抵薊南抵至也一說抵者其丞相之名也音丁禮切定燕縣十八鄉邑五十一益食千三百户定食舞陽五千四百户酈商髙陽人也酈音歴陳勝起商聚少年得數千人沛公畧地六月餘商以所將四千人屬沛公於岐從攻長社先登賜爵封信成君從攻􅚆氏絶河津破秦軍雒陽東從下宛穰定十七縣别將攻旬闗漢中旬水上之闗也今在洵陽縣西定漢中先言攻旬闗定漢中然後云沛公為漢王是則沛公從武闗藍田而來商時别從西道平定漢中沛公為漢王賜商爵信成君以將軍為隴西都尉别定北地郡破章邯别將於烏氏栒邑泥陽烏氏安定縣也栒邑今在豳州泥陽北地縣氏音支栒音荀賜食邑武城六千户從撃項籍軍與鍾離昧戰受梁相國印漢以梁相國印授之益食四千户從擊項羽二嵗攻胡陵漢王即帝位臧荼反商以將軍從擊荼戰龍脫先登陷陳破荼軍易下今易縣郤敵遷為右丞相賜爵列侯與剖符世世勿絶食邑涿郡五千户别定上谷因攻代受趙相國印初受梁相國印今又受趙相國印與綘侯等定代郡雁門得代丞相程縱守相郭同守相謂為相而居守者將軍以下至六百石十九人還以將軍將太上皇衛一嵗十月以右丞相撃陳豨殘東垣又從撃黥布攻其前垣謂攻其壁壘之前垣陷兩陳得以破布軍更封為曲周侯食邑五千一百户除前所食夏侯嬰以縣令史為髙祖使上䧏沛一日髙祖為沛公賜爵七大夫以嬰為太僕常奉車為沛公御車從攻胡陵嬰與蕭何䧏泗水監平胡陵平所止縣嘗給之故與䧏平以胡陵䧏賜嬰爵五大夫從撃秦軍碭東攻濟陽下户牖破李繇軍雍丘以兵車趣攻戰疾破之趣讀曰促謂急促也次下亦同賜爵執帛從撃章邯軍東阿濮陽下以兵車趣攻戰疾破之賜爵執圭從撃趙賁軍開封揚熊軍曲遇嬰從捕虜六十八人䧏卒八百五十人得印一匱時自相署置官之印又擊秦軍雒陽東以趣攻戰疾賜爵封轉為滕令今汴郡公丘縣因奉車因此又每奉車從攻戰以至霸上從攻定南陽戰於藍田芷陽芷陽後為霸陵縣至霸上沛公為漢王賜嬰爵列侯號昭平侯復為太僕從入蜀漢還定三秦從撃項籍至彭城項羽大破漢軍漢王不利馳去見孝惠魯元載之漢王急馬罷虜在後罷讀曰疲常蹳兩兒棄之蹳音撥又音足跋物之跋嬰常收載行面雍樹馳面偕也雍抱持之言取兩兒令面背己而抱持之以馳故云面雍樹馳雍讀曰擁漢王怒欲斬嬰者十餘卒得脫而致孝惠魯元於豐漢王既至滎陽牧散兵復振賜嬰食邑沂陽沂音魚依切撃項籍下邑追至陳卒定楚至魯益食兹氏茲氏縣名地里志屬太原漢王即帝位燕王臧荼反嬰從擊荼明年從至陳取楚王信更食汝隂剖符世世勿絶從擊代至武泉雲中益食千户因從擊韓信軍胡騎晉陽旁大破之追北至平城為胡所圍七日不得通髙帝使使厚遺閼氏冐頓乃開其圍一角髙帝出欲馳嬰固徐行弩皆持滿外鄉故示閒暇所以固士卒心而令敵不測也鄉讀曰嚮卒以得脫卒終也益食嬰細陽千户益其邑使食之從擊胡騎句注北大破之擊胡騎平城南三陷陳功為多賜所奪邑五百户時有罪過奪邑者以賜之從擊陳豨黥布軍陷陳郤敵邑千户定食汝隂六千九百戸除前所食灌嬰以中涓從擊破東都尉於成武及秦軍於杠里疾鬬賜爵七大夫又從攻秦軍亳南開封曲遇戰疾力疾急速也力强力也賜爵執帛號宣陵君從攻陽武以西至雒陽破秦軍尸北北絶河津南破南陽守齮陽城東遂定南陽郡西入武闗戰於藍田疾力至霸上賜爵執圭號昌文君沛公為漢王拜嬰為郎中從入漢中十月拜為中謁者從還定三秦下櫟陽䧏塞王還圍章邯廢丘未拔從東出臨晉關擊降殷王定其地擊項羽將龍且魏相項佗軍定陶南疾戰破之賜嬰爵列侯號昌文侯食杜平鄉杜縣之平鄉復以中謁者從降下碭以北至彭城項羽擊破漢王漢王遁而西嬰從還軍於雍丘王武魏公申徒反故秦將降為公從擊破之攻之外黄西收軍於滎陽楚騎來衆漢王乃擇軍中可為騎將者皆推故秦騎士重泉人李必駱甲重泉縣名也地理志屬左馮翊習騎兵今為校尉可為騎將漢王欲拜之必甲曰臣故秦民恐軍不信臣臣願得大王左右善騎者傅之傅音附猶言隨從者嬰雖少然數力戰乃拜嬰為中大夫令李必駱甲為左右校尉將即中騎兵擊楚騎於滎陽東大破之受詔别擊楚軍後絶其饟道饟古餉字起陽武至襄邑擊項羽之將項冠於魯下破之將卒斬右司馬騎將各一人主右方之馬左亦如之又曰下所謂左右千人之騎擊破柘公王武軍燕西拓縣名公者拓之令也王武其人姓名燕亦縣名古南燕國也音一千切所將卒斬樓煩將五人樓煩縣名其人善騎射故名射士為樓煩取其稱也連尹一人楚官也擊王武别將桓嬰白馬下破之所將卒斬都尉一人以騎渡河南送漢王到雒陽從北迎相國韓信軍於邯鄲還至敖倉嬰遷為御史大夫三年以列侯食邑杜平鄉受詔將郎中騎兵東屬相國韓信擊破齊軍於厯下所將卒虜車騎將軍華母傷華音下化切及將吏四十六人降下臨淄得相田光追齊相田横至嬴博二縣名擊破其騎所將卒斬騎將一人生得騎將四人攻下嬴博破齊將軍田吸於千乗斬之東從韓信攻龍且留公於假密留縣名公留令也攻龍且及留令於假宻卒斬龍且嬰所將之卒也其下亦同生得右司馬連尹各一人樓煩將十人身生得亞將周蘭亞次也齊地已定韓信自立為齊王使嬰别將擊楚將公杲於魯北破之轉南破薛郡長長亦如郡守也時毎郡置長身虜騎將入攻博陽前至下相以東南僮取慮徐僮取慮徐三縣也取音趨又音秋慮音廬度淮盡降其城邑至廣陵謂從下相以東南盡降城邑乃至廣陵皆平定項羽使項聲薛公郯公復定淮北嬰度淮擊破項聲郯公下邳斬薛公下下邳夀春擊破楚騎平陽此平陽在東郡遂降彭城虜柱國項佗佗音徒何切降留薛沛鄼蕭相凡六縣鄼音才何切攻苦醮復得亞將周蘭與漢王㑹頥鄉從擊項籍軍陳下破之所將卒斬樓煩將二人虜將八人賜益食邑二千五百戸項籍敗垓下去也嬰以御史大夫將車騎别追項籍至東城破之所將卒五人共斬項籍皆賜爵列侯降左右司馬各一人卒萬二千人盡得其軍將吏下東城歴陽渡江破吳郡長吳下吳郡長當時為吳郡長嬰破之於吳下得吳守遂定吳豫章會稽郡還定淮北凡五十二縣漢王即帝位賜益嬰邑三千戸以車騎將軍從擊燕王荼明年從至陳取楚王信還剖符世世勿絶食潁隂二千五百戸從擊韓王信於代至馬邑别降樓煩以北六縣斬代左將破胡騎將於武泉北復從擊信胡騎晉陽下所將卒斬胡白題將一人胡名也又受詔并將燕趙齊梁楚車騎撃破胡騎於硰石硰音千坐切至平城為胡所困從擊陳豨别攻豨丞相侯敞軍曲逆下破之卒斬敞及特將五人卒謂所將之卒也特獨也各獨為將降曲逆盧奴上曲陽安國安平攻下東垣黥布反以車騎將軍先出攻布别將於相破之斬亞將樓煩將三人又進擊破布上柱國及大司馬軍又破布别將肥銖嬰身生得左司馬一人所將卒斬其小將十人追北至淮上益食邑二千五百戸布已破髙帝歸定令嬰食潁隂五千戸除前所食邑凡從所得二千石二人别破軍十六降城四十六定國一郡二縣五十二得將軍二人柱國相各一人二千石十人嬰自破布歸髙帝崩以列侯事惠帝及吕后至吕祿等欲為亂齊哀王聞之舉兵西吕祿等以嬰為大將軍往擊之嬰至滎陽乃與絳侯等謀因屯兵滎陽風齊王以誅吕氏事風讀曰諷齊兵止不前絳侯等既誅諸吕齊王罷兵歸嬰自滎陽還與絳侯陳平共立文帝於是益封嬰三千户賜金千斤為太尉傅寛以魏五大夫騎將從為舍人起横陽從攻安陽杠里趙賁軍於開封及擊楊熊曲遇陽武斬首十二級賜爵卿從至霸上沛公為漢王賜寛封號共德君共讀曰恭從入漢中為右騎將定三秦食邑雕隂縣名屬上郡從擊項籍待懐待髙帝於懐懐縣名也地理志屬河内地今懐州賜爵通德侯從擊項冠周蘭龍且所將卒斬騎將一人敖下敖地名敖倉葢取此名也左氏傳曰敖鄗之間益食邑屬淮隂韓信也信時為相國云淮隂者終言之也擊破齊歴下軍擊田解屬相國參殘博參曹參也博大山縣也益食邑因定齊地剖符世世不絶封陽陵侯二千六百戸除前所食為齊右丞相備齊時田横未降故設屯備靳歙以中涓從起宛朐歙音吸宛音於元切胊音具于切攻濟陽破李繇軍擊秦軍開封東斬騎千人將一人騎將率號為千人漢儀注邊郡置部都尉千人司馬侯也首五十七級捕虜七十三人賜爵封臨平君又戰藍田北斬車司馬二人主車也騎長一人騎之長首二十八級捕虜五十七人至霸上沛公為漢王賜歙爵建武侯遷騎都尉從定三秦别西擊章平軍於隴西破之定隴西六縣所將卒斬車司馬候各四人騎長十二人從東擊楚至彭城漢軍敗還保雍丘擊反者王武等畧梁地别西擊邢說軍菑南破之菑縣名也後為考成說讀曰悦身得說都尉二人司馬候十二人降吏卒四千六百八十人破楚軍滎陽東食邑四千二百戸别之河内擊趙賁軍朝歌破之所將卒得騎將二人車馬二百五十匹從攻安陽以東至棘蒲下十縣别攻破趙軍得其將司馬二人候四人降吏卒二千四百人從降下邯鄲别下平陽身斬守相所將卒斬兵守郡一人言兵郡守一人也降鄴從攻朝歌邯鄲又别擊破趙軍降邯鄲郡六縣還軍敖倉破項籍軍成臯南擊絶楚餉道起滎陽至襄邑破項冠魯下畧地東至鄫郯下邳南至蘄竹邑擊項悍濟陽下還擊項籍軍陳下破之别定江陵降柱國大司馬以下八人生得江陵王致雒陽江陵王謂共敖之子共尉也得之送致於雒陽因定南郡從至陳取楚王信剖符世世勿絶定食四千六百户為信武侯以騎都尉從擊代攻韓信平城下還軍東垣有功遷為車騎將軍并將梁趙齊燕楚車騎别擊陳豨丞相敞破之侯敞因降曲逆從擊黥布有功益封定食邑五千三百户任敖沛人也少為獄吏髙祖嘗避吏吏繫吕后遇之不謹任敖素善髙祖怒擊傷主吕后吏及髙祖初起敖以客從為御史守豐二歲髙祖立為漢王東擊項羽敖遷為上黨守陳豨反敖堅守封為廣阿侯食邑千八百戸申屠嘉梁人也以材官蹶張材官之多力能脚蹋彊弩張之故曰蹶張令之弩以手張者曰擘張以足蹋者曰蹶張蹶音厥擘音布麥反從髙祖撃項羽遷為隊率一隊之率也音所類切從擊黥布為都尉孝惠時為淮陽守孝文元年舉故以二千石從髙祖者悉以為關内侯食邑三十四人而嘉食邑五百戸周亞夫為將軍文帝六年匈奴大入邊以宗正劉禮為將軍軍霸上祝兹侯徐厲為將軍軍棘門以河内守亞夫為將軍軍細栁以備胡帝自勞軍至霸上及棘門軍直馳入將以下騎出入送迎已而之細桞軍軍士吏被甲銳兵刄彀弓弩持滿彀張也音遘天子先驅至不得入先驅導駕者也若今之武候隊先驅曰天子且至軍門都尉曰軍中聞將軍之令不聞天子之詔有頃上至又不得入於是上使使持節詔將軍曰吾欲勞軍亞夫乃傳言開壁門壁門士請車騎曰將軍約軍中不得驅馳於是天子乃按轡徐行至中營將軍亞夫揖曰介胄之士不拜請以軍禮見禮介者不拜天子為動改容式車古者立乗凡言式車者謂俛身撫式以禮敬人式車前横木使人稱謝謝告也皇帝敬勞將軍成禮而去既出軍門羣臣皆驚文帝曰嗟乎此眞將軍矣鄉者霸上棘門如兒戲耳鄉讀曰嚮其將固可襲而虜也至於亞父可得而犯耶稱善者久之月餘三軍皆罷乃拜亞父為中尉直不疑景帝時為御史大夫吳楚反時不疑以二千石將擊之武帝修吳楚時功封不疑為塞侯李廣與從弟李蔡俱為郎事文帝景帝時蔡積功至二千石武帝元朔中為輕車將軍從大將軍擊右賢王有功中率封為樂安侯李敢者廣之少子也敢以校尉從驃騎將軍擊胡左賢王力戰奪左賢王旗皷斬首多賜爵關内侯食邑二百戸衛青武帝元光六年拜車騎將軍擊匈奴出上谷斬首虜數百騎賜爵關内侯元朔元年秋青復將三萬騎出鴈門斬首虜數千眀年青復出雲中遂取河南地為朔方郡當北地郡之北黄河之南以三千八百戸封青為長平侯益封青三千八百戸五年春青將三萬騎出髙闕得右賢裨王十餘人裨王小王也裨頻移切衆男女萬五千餘人畜數十百萬於是引兵而還至塞帝使使持大將軍印即軍中拜青為大將軍益封青八千七百戸霍去病為票姚校尉票姚音飄遙又票頻妙切姚羊召切與輕勇騎八百直棄大將軍數百里赴利斬捕首虜過當多過所當也以二千五百戸封去病為冠軍侯元狩三年春為驃騎將軍將萬騎出隴西有功益封去病二千二百戸其夏去病出北地遂深入至祁連山即天山也捕首虜甚多益封五千四百戸武帝又嘉去病之功以千七百戸益封四年春去病出定襄執訊獲醜七萬有四百四十三級以五千八百戸益封秩祿與大將軍等趙充國以假司馬從貳師將軍擊匈奴大為虜所圍充國乃潰圍陷陳貳師遂得解身被二十餘創武帝親見視其創嗟歎之拜為中郎遷車騎將軍長史昭帝時武都氐人反充國以大將軍䕶軍都尉將兵擊定之遷中郎將將屯上谷領兵屯於上谷還為水衡都尉擊匈奴獲西祁王擢為後將軍宣帝本始中為蒲類將軍征匈奴斬虜數百級還為後將軍少府辛慶忌為右校丞隨長羅侯常惠屯田烏孫赤谷城與歙侯戰歙即翕字也歙侯烏孫官名陷陳卻敵惠奏其功拜為侍郎鄭吉宣帝時以侍郎田渠黎積榖因發諸國兵攻破車師遷衛司馬使䕶鄯善以西南道鄯音善神爵中匈奴􅆾亂日逐王先賢撣欲降漢撣音纒使人與吉相聞􅁻發渠黎龜茲諸國五萬人迎日逐王口萬二千人小王將十二人隨吉至河曲頗有亡者吉追斬之遂將詣京師漢封日逐王為歸德侯吉既破車師而降日逐威震西域并䕶車師以西北道故號都䕶並䕶南北二道故謂之都都猶大也總也都䕶之置自吉始焉帝嘉其功效乃下詔曰都䕶西域騎都尉鄭吉拊循外蠻宣眀威信禮云東夷北狄西戎南蠻然夷蠻戎狄亦四方之總稱耳故史傳又云百蠻也迎匈奴單于從兄日逐王衆擊破車師兠訾城訾子移切功效茂著其封吉為安逺侯食邑千戸段㑹宗為左曹中郎將發戊巳校尉諸國兵誅烏孫末振將太子畨丘還奏事公卿議㑹宗權得便宜以輕兵深入烏孫即誅畨丘宣明國威宜加重賞孝成元延中天子賜會宗爵關内侯黄金百斤後漢王常初歸光武封山桑侯山桑縣屬沛郡今亳州縣後帝於大會中指常謂羣臣曰此家率下江諸將輔翼漢室心如金石眞忠臣也是日遷常為漢忠將軍遣南擊鄧奉董訢令諸將皆屬焉又與王霸共平沛郡賊苗虛也及徴還雒陽令大夫迎常於舞陽歸家上塜西屯長安拒隗囂七年使使者持璽書即拜常為横野大將軍位次與諸將絶席絶席謂尊顯之也來歙為大中大夫至略陽斬隗囂守將金梁因保其城囂悉兵數萬人圍略陽自春至秋其士卒疲弊光武乃大發關東兵自將上隴囂衆潰走圍解於是置酒髙㑹勞賜歙班坐絶席在諸將之右賜歙妻縑千疋詔使留屯長安悉監䕶諸軍鄧禹為大司徒渡汾隂河入夏陽更始中郎將左輔都尉公乗歙引其衆十萬與左馮翊兵共拒禹於衙衙縣名屬左馮翊禹破走之光武嘉之數賜書褒羙十三年天下平定封為髙宻侯冦恂為河内太守行大將軍事時朱鮪聞光武北而河内孤使蘇茂賈彊渡鞏河攻溫今雒州縣恂因奔擊大破之時光武初即位軍食急乏恂轉輸不絶帝數䇿書勞問後為潁川太守擊斬潁川嚴終等冦定封恂雍奴侯邑萬户馮異為偏將軍從光武破王郎封應侯又從平河北拜異為孟津將軍擊陽翟城賊嚴終趙根破之詔異歸家上冢使大中大夫齎牛酒令二百里内太守都尉已下及宗族㑹焉時赤眉延岑暴亂三輔代鄧禹討之車駕送至河南賜以乘輿七尺具劍具謂以寶玉裝飾之異與赤眉遇於華隂相拒六十餘日戰數十合降其將劉始王宣等五千人三年春遣使者即拜異為征西大將軍大破赤眉衆於崤底降男女八萬人降璽書勞異後朝京師引見帝謂公卿曰是我起兵時主簿也為吾披荆棘定闗中既罷使中黄門賜以珍寳衣服錢帛岑彭為刺姦將軍光武使督察衆營授以常所持節從平河北及帝即位拜廷尉行大將軍事又破許邯於杏南陽復陽縣有杏聚降董訢遷征南大將軍及擊秦豐敗走封為舞隂侯後以將伐蜀漢引兵屯津鄉縣名所謂江津也徴詣京師數召讌見厚加賞賜復南還津鄉有詔過家上冢後彭破荆門降卭穀王任貴㑹彭薨帝盡以任貴所獻賜彭妻子賈復為破虜將軍光武至信都以為偏將軍及拔邯鄲遷都䕶將軍復又擊鄴賊破之光武即位拜為執金吾封冠軍侯先渡河攻朱鮪於雒陽與白虎公陳僑戰連破降之益封穰朝陽二縣又擊召陵新息平定之新息縣名屬汝南郡遷左將軍後定封膠東侯食郁秩壯武下宻即墨梃胡觀陽凡六縣六縣皆屬膠東國壯武故城在今萊州即墨縣西下宻在今青州北海縣東北即墨在今萊州膠水縣東南梃胡故城在今萊州昌陽縣西北觀陽在昌陽縣之東梃一音廷吳漢為偏將軍既拔邯鄲光武使漢等將突騎揚兵戲馬士騎馳環邯鄲城乃圍之賜號建䇿侯光武即位拜大司馬更封舞陽侯及平蜀振旅浮江而下至宛詔令過家上冢賜榖二萬斛後薨韶發北軍五校輕車介士送塟如大將軍霍光故事葢延為偏將軍號建功侯從光武平河北及即帝位以延為虎牙將軍更封安平侯又從征董憲於昌慮皆破平之又與來歙攻河池以病引還拜為左馮翊後增封定食萬戸陳俊為彊弩偏將軍光武賜絳衣九百領以衣中堅同心士與五校戰於安次俊下馬手接短兵所向必破追奔二十餘里斬其渠帥而還帝望而歎曰戰將盡如是豈有憂哉及光武即位封俊為列侯又攻匡賊下四縣更封新處侯縣名在中山國又追討張歩斬之帝美其功詔俊得專征青徐賜璽書曰將軍元勲大著威震青徐兩州有警得專征之數上書願擊隴蜀詔報曰東州新平大將軍之功也負海猾夏盗賊之處國家以為重憂且勉鎮撫之又增邑定封祝阿侯縣名屬平原郡臧宫為偏將軍從光武破羣賊數陷陳却敵及帝即位以為侍中騎都尉又封成安侯將突騎與祭遵擊更始將左防韋顔於沮陽悉降之又將兵狥江夏擊代鄉鍾武竹里皆下之鍾武縣屬江夏郡故城在今申州鍾山縣西南帝使大中大夫張明持節拜宫為輔威將軍後更封期思侯縣名屬汝南郡又與吳漢滅公孫述帝以蜀地初定拜宫為廣漢太守增邑更封鄼侯耿况為大將軍封隃麋侯與子舒攻彭寵取軍都軍都縣屬廣陽郡寵死光武嘉况功使光祿大夫持節迎况袁山松書曰使光祿大夫樊宏詔况曰惟况功大不宜監察從事邊郡寒苦不足久居其詣行在所賜甲第奉朝請封牟平侯後况疾病乗輿數自臨幸耿弇為偏將軍說光武益發精兵以集大計光武大悅乃拜弇為大將軍及帝即位拜弇為建威大將軍攻破厭新賊於敖倉更封好畤侯食好畤羙陽二縣銚期為偏將軍從光武擊破王郎拜期虎牙大將軍光武即位封安成侯安成縣名屬汝南郡故城在今豫州汝陽縣東南食邑五千戸後卒帝親臨禭斂贈以衛尉安成侯印綬王霸為軍正爵關内侯既至信都發兵攻拔邯鄆霸追斬王郎得其璽綬封王鄉侯光武即位以霸曉兵愛士可獨任拜為偏將軍又更封富波侯富波縣名屬汝南郡在今豫州祭遵受偏將軍從光武平河北以功封列侯又拜征虜將軍定封潁陽侯後從車駕上隴及隗囂破光武東歸過汧幸遵營勞享士卒作黄門武樂良夜乃罷時遵有疾詔賜重茵覆以御葢復令進屯隴下後遵卒帝愍悼之尤甚遵喪至河南縣韶遣百官先㑹喪車駕素服臨之望哭哀慟還幸城門過其車騎涕泣不能已喪禮成復親祠以太牢如宣帝臨霍光故事詔大長秋謁者河南尹䕶喪事大司農給費至塟車駕復臨贈以將軍侯印綬朱輪容車介士軍陳送塟既塟車駕復臨其墳存見夫人室家遵無子帝追傷之以從弟彤為偃師長令近遵墳墓四時奉祠之李忠為右將軍從光武攻下屬縣至苦陘苦陘縣名屬中山國章帝改曰漢昌自此以後隨代改之今為定州唐昌縣帝㑹諸將問所得財物惟忠獨無所掠光武曰我欲特賜李忠諸卿得無望乎即以所乗大驪馬及繡被衣物賜之萬修為偏將軍封造義侯及破邯鄲拜右將軍從光武平河北更封槐里侯邳彤為後大將軍及拔邯鄲封武義侯更封靈夀侯耿純為前將軍封耿鄉侯擊王郎將李惲大破之光武即位封純髙陽侯復拜純為東郡太守詔純將兵擊更始東平太守范荆降之定封東光侯純辭就國帝曰文帝謂周勃丞相吾所重君為我率諸侯就國今亦然也純受詔而去至鄴賜榖萬斛朱祐為䕶軍從光武征河北常力戰陷陣以為偏將軍封安陽侯光武即位拜為建義大將軍更封堵陽侯縣名屬南陽郡後擊黄郵降之賜祐黄金三十斤景丹為偏將軍從光武擊王郎將兒宏等大破之遂從征河北及帝即位詔舉可為大司馬者帝曰景將軍北州大將是其人也拜丹為驃騎將軍定封丹櫟陽侯謂丹曰今關東故王國雖數縣不過櫟陽萬户邑夫富貴不歸故鄉如衣繡夜行故以封卿耳丹頓首謝王梁為偏將軍既拔邯鄲賜爵關内侯從光武平河北拜野王令杜茂為中堅將軍嘗從光武征伐即位拜大將軍封樂鄉侯屬信都國北擊五校於眞定進降廣平更封苦陘侯馬成為期門從光武征伐及帝即位再遷䕶軍都尉後拜揚武將軍擊斬李憲盡平江淮地封平舒侯屬代郡劉隆為騎都尉封亢父侯縣名屬東平國故城在兖州任城縣南俄拜誅虜將軍討平李憲又守南郡太守增邑更封竟陵侯後以中郎將副伏波將軍馬援擊交阯蠻夷徴側等隆别於禁谿口破之交阯郡麊冷縣有金溪穴相傳音訛謂之禁溪徵側所敗處也其地今岑州新昌縣是也獲其帥徵貳徴側之妹斬首千餘級降者二萬餘人還更封大國為長平侯𫝊俊為校尉從光武破王尋等以為偏將軍帝即位以俊為侍中封昆陽侯堅鐔為偏將軍從光武平河北及帝即位拜鐔為揚化將軍封㶏彊侯縣名屬河南郡㶏於靳切馬武為振威將軍從光武擊羣賊常為先鋒破賊及帝即位以武為侍中騎都尉封山都侯又與葢延等討劉永武别擊濟隂下成武楚丘拜捕虜將軍後擊破西羌振旅還京增邑七百戸并前千八百戸竇融初為更始屬國都尉及歸光武為涼州牧光武以融信效著明詔右扶風修理融父墳塋祠以太牢數馳輕使致遺四方珍饈及車駕征隗囂融率五郡太守羌虜小月氏等歩騎數萬輜重五千餘兩㑹髙平第一髙平今原州縣帝置酒高㑹引見融待以殊禮隴蜀平詔融與五郡太守奏事京師官屬賓客相隨駕乗千餘兩馬牛羊被野融到詣雒陽城門上涼州牧張掖屬國都尉安豐侯印綬詔遣使者還侯印綬引見就諸侯位賞賜恩寵傾動京師馬援為伏波將軍擊斬交阯女賊徵側徵貳傳首雒陽封為新息侯食邑三千戸又擊其餘黨振旅還京師賜援兵車一乗朝見位次九卿匈奴烏桓冦扶風援以三輔侵擾園陵危逼因請行許之復出屯襄國詔百官祖道朱浮為偏將軍從光武破邯鄲拜為大將軍幽州牧守薊城遂討定北邊封舞陽侯食三縣梁統為宣德將軍與竇融等將兵㑹光武征隗囂及囂敗封統為成義侯張宗為京輔將軍將突騎與征西大將軍馮異共擊關中諸營保破之遷河南都尉馬嚴明帝時為將軍長史將北軍五校士羽林禁兵三千人屯西河美稷衞䕶南單于聽置司馬從事牧守謁敬同之將軍􅃯嚴過武庫祭蚩尤帝親御阿閣觀其士衆時人榮之章帝即位徵拜御史中丞馬防為城門校尉行車騎將軍事擊金城隴西諸羌破之詔徴防還拜車騎將軍貴寵最盛與九卿絶席增邑千三百五十戸竇固為奉軍都尉擊羌胡有功加特進又擊西域破白山降車師章帝時追錄前功增邑一千三百戸耿秉為征西將軍章帝時擊北匈奴大破之封秉羙陽侯食邑三千戸及卒賜以朱棺玉衣將作大匠穿冢假皷吹五營騎士三百餘人送塟竇憲為車騎將軍大破單于於嵇落山遂登燕然山刻石勒功紀漢威德令班固作銘和帝詔使中郎將持節即五原拜憲大將軍封陽武侯食邑二萬戸憲固辭封賜䇿許焉班超自章帝建初八年為將兵長史假皷吹幢麾加都䕶討焉耆西域五十餘國悉納質内屬焉詔曰超安集于寘以西遂踰䓤領迄縣度迄至也縣度山名縣音𤣥謂以䋲索懸䋲而過也其處在皮山國以西􅄢賔國之東也出入二十二年莫不賓從改立其王而綏其人不動中國不煩戎士得逺夷之和同異俗之心而致天誅蠲宿恥以報將士之讐司馬法曰賞不踰月欲人速覩為善之利也其封超為定逺侯食邑千户超在西域三十一嵗至和帝永元十四年八月至雒陽拜為射聲校尉超素有胷脅疾旣至病遂加帝遣中黄門問病賜醫藥其九月卒年七十一朝廷愍惜焉使者弔祭贈賵甚厚耿䕫為大將軍左校尉擊匃奴斬閼氏名王已下五千餘級乃封䕫栗邑侯栗邑縣名屬左馮翊故城今在同州白水縣西北鄧隲禹之孫也殤帝延平元年夏將左右羽林北軍五校士及諸部兵擊涼部叛羌車駕幸平樂觀餞送滕撫順帝時為九江都尉討廣陵賊張嬰等追擊大破之拜撫中郎將督揚徐二州事馮緄督揚州諸郡軍事與中郎將滕撫擊破羣賊遷隴西太守度尚桓帝時為中郎將討擊桂陽賊胡蘭等斬首三千五百級詔賜尚錢八萬杭徐為中郎將宗資别部司馬擊太山賊公孫舉等破平之斬首千餘級桓帝封徐烏程東鄉侯五百戸遷泰山都尉冦盗望風奔亡及在長沙宿賊皆平卒於官下詔追増封徐五百戸并前千戸段紀明桓帝時為中郎將擊琅邪賊東郭竇公孫舉等大破斬之獲首萬餘級餘黨降散封紀明為列侯賜錢五十萬後為䕶羌校尉擊先零諸種虜衆大潰時竇太后臨朝下詔曰先零東羌歴載為患紀明前陳狀必欲掃滅渉履霜雪兼行晨夜身當矢石感厲吏士曾未浹日凶醜奔破浹匝也浹音子牒切謂匝十二辰也連尸積俘掠獲無筭洗雪百年之逋負以慰忠將之亡魂東觀記曰太后詔云此以慰种光馬賢等亡魂也功用顯著朕甚嘉之頃東羌盡定當并錄功勤今且賜紀明錢二十萬勅中藏府調金錢彩物增助軍費拜紀明破羌將軍徴還京師將秦胡歩騎五萬餘人詔遣大鴻臚持節慰勞於鎬軍至拜侍中張奐為䕶匈奴中郎將以九卿秩督幽并涼三州擊破岸羌三州清定而願屬𢎞農華隂舊制邊人不得内移惟奐因功特聽故始為𢎞農人焉皇甫嵩靈帝時為左中郎將平黄巾拜左車騎將軍領冀州牧封槐里侯食槐里美陽兩縣合八千戸册府元龜卷三百七十五
