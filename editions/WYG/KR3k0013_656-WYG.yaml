body:
  text: 冊府元龜卷六百五十六宋王欽若等撰奉使部立功招撫立功周官行人著用節之制小雅四牡歌有功之來斯盖膺出疆之選者能奮竒畧以集巨伐繇是申勞徠之典形風雅之詠焉自漢而後或殊鄰猾夏申嚴禦備徳教未洽逆節萌超或覊縻之不絶或反側以猶鬬桀驁滋熾草竊羣聚捐負盟約憑恃險固然後奉詔告馳傳遽踐不測之境申風諭之㫖見機有作豈俟乎終日狥死無貳所期於必勝用能素定奇計布昭天聲糾合異俗徴發士伍大則懸戎首於稾街次則窮叛黨於巢穴係纍驅獲㨗音亟至克宣威信底靖疆塲故雖矯借王命擅持利噐誠足尚其可専而懋以賞典也漢傅介子北地義渠人以從軍為官先是龜兹樓蘭皆殺漢使者昭帝元鳯中介子為駿馬監使大宛因詔令責樓蘭龜茲介子殺匃奴使者還奏拜中郎遷平樂監遂請大將軍霍光曰樓蘭龜兹數反覆而不誅無所懲艾艾讀曰乂介子過龜兹時其王近就人易得也附近而親就言不相猜阻也願徃刺之以威示諸國大將軍曰龜兹道遠且驗之於樓蘭於是白遣之介子與士卒俱齎金幣揚言以賜外國為名至樓蘭王意不親介子介子陽引去至其西界使譯謂曰漢使者持黄金錦綉行賜諸國徧徃賜之王不來受我去之西國矣即出金帛以不譯譯還報王王貪漢物來見使者介子與坐飲陳物示之飲酒皆醉介子謂王曰天子使我私報王謂密有所諭王起隨介子入帳中屏語屏人而獨共語也壯士二人從後刺之刃交胷立死其貴人左右皆散走介子告諭以王負漢罪天子遣我來誅王當更立前太子質在漢者漢兵方至毋敢動動滅國矣遂持王首還詣闕馮奉世字子明上黨潞人宣帝夲始中從軍擊匃奴軍罷為郎初漢數出使西域多辱命不稱或貪汙為外國所苦苦謂困辱也是時烏孫大有擊匃奴之功而西域諸國新輯輯與集同集和也漢方善遇欲以安之選可使外國者前將軍韓増舉奉世以衞候使持節送大宛諸國客至伊修城伊修城在鄯善國漢於其中置屯田吏士也都尉宋將言莎車與旁國共攻殺漢所置莎車王萬年莎車國名萬年其王名也莎素和反并殺漢使者奚充國時匃奴又發兵攻車師城不能下而去莎車遣使揚言北道諸國已屬匃奴矣於是攻刼南道與歃盟畔漢從鄯善以西皆絶不通鄯音善都䕶鄭吉校尉司馬意皆在北道諸國馮奉世與其副嚴昌計以為不亟擊之則莎車日彊亟急也音居力切其勢難制必危西域遂以節諭告諸國王因發其兵南北道合萬五千人進擊莎車攻拔其城莎車王自殺傳其首詣長安諸國悉平威振西域奉世乃罷兵以聞宣帝召見韓増曰賀將軍所舉得其人奉世遂至大宛聞其斬莎車王敬之異於他使得其名馬象龍而還言馬形似龍帝甚説說讀曰悦下議封奉世常惠為光禄大夫先是烏孫公主上言匈奴發騎田車師車師西域國名也車師與匃奴為一共侵烏孫唯天子救之漢養士馬議欲擊匃奴宣帝夲始二年遣惠使烏孫公主及昆彌皆新遣使因惠言匈奴連發大兵擊烏孫取車延惡師地收其人民去使使脅求公主欲隔絶漢昆彌願發國半精兵自給人馬五萬騎盡力擊匈奴唯天子出兵救公主昆彌於是漢大發十五萬騎五將軍分道出祁連將軍田廣明蒲類將軍趙充國武牙將軍田順渡遼將軍范明友前將軍韓增以惠為校尉持節䕶烏孫兵昆彌自將翎侯以下五萬餘騎翎即翕字也翕侯烏孫官號也從西方入至右谷蠡庭谷音鹿蠡音黎獲單于父行及嫂居次行胡浪切名王騎將以下三萬九千人得馬牛驢羸橐駝五萬餘匹羊六十餘萬頭烏孫皆自取鹵獲惠從吏卒十餘人隨昆彌還未至烏孫烏孫人盗惠印綬節惠還自以當誅謂失印綬及節為辱命時漢五將皆無功天子以惠奉使克獲遂封惠為長羅侯復遣惠持金幣還賜烏孫貴人有功者惠因奏請龜兹國嘗殺校尉頼丹未伏誅請便道擊之宣帝不許大將軍霍光風惠以便宜從事言至前所傳命而行也風讀曰諷惠與吏士五百人俱至烏孫還過發西國兵二萬人令副使發龜兹東國二萬人烏孫兵七千人從三面攻龜兹兵未合先遣人責其王以􅀢殺漢使狀王謝曰廼我先王時為貴人姑翼所誤耳我無罪惠曰即如此縛姑翼來吾置王置猶放也王執姑翼詣惠惠斬之而還陳湯字子公元帝時為郎數求使外國久之遷西域副校尉先是宣帝時匈奴乖亂五單于争立呼韓邪單于與郅支單于俱遣子入侍漢兩受之後呼韓邪單于身入稱臣朝見郅支以為呼韓邪疲弱降漢不能自還即西收右地㑹漢發兵送呼韓邪單于郅支繇是遂西破呼偈堅昆丁令呼偈小國名在匈奴北偈起屬切令音零兼三國而都之怨漢擁䕶呼韓邪而不助已困辱漢使者江廼始等初元四年遣使奉獻因求侍子願為内附漢議遣衛司馬谷吉送之御史大夫貢禹博士匡衡以春秋之義許夷狄者不一而足言節制之不皆稱其所求也今郅支單于鄉化未醇鄉讀曰嚮不雜曰醇醇今厚也所在絶遠宜令使者送其子至塞而還吉上書言中國與夷狄有覊縻不絶之義今既養全其子十年徳澤甚厚空絶而不送近從塞還示弃捐不畜畜謂受養也使無鄉從之心鄉讀曰嚮嚮從謂向化而從命也棄前恩立後怨不便議者見前江廼始無應敵之數知勇俱困以致耻辱即豫為臣憂臣幸得彊漢之節承明聖之詔宣諭厚恩不宜敢桀言郅支畏威當不敢桀黠也若懐禽獸加無道於臣則單于長嬰大罪嬰帶也必遁逃遠舍不敢近邉舍止也没一使以安百姓國之計臣之願也願送至庭單于庭帝以示朝者禹復争以為吉徃必為國取悔生事不可許右將軍馮奉世以為可遣帝許焉既至郅支單于怒竟殺吉等自知負漢又聞呼韓邪益彊遂西奔康居康居王女妻郅支郅支亦以女予康居甚尊敬郅支欲倚其威以脅諸國倚音於綺切郅支數借兵擊烏孫深入至赤谷城殺掠人民歐畜産歐與驅同下皆類此烏孫不敢追西邉空虚不居者且千里郅支單于自以大國威名尊重又乗勝驕不為康居王禮怒殺康居王女及貴人人民數百或支解投都頼水中支解謂截其四支也都頼郅支水名發民作城日作五百人二嵗廼已又遣使責闔蘇大宛諸國嵗遺康居北河一千里有國名奄蔡一名闔蘇然則闔蘇即奄蔡也嵗遺者言嘗所獻遺之物遺戈季切不敢不予漢遣使三輩至康居求谷吉等死死尸也郅支困辱使者不肯奉詔而因都䕶上書言居困戹願歸計彊漢遣子入侍故為此言以調戲也歸計謂歸附而受計䇿也其驕嫚如此建昭二年湯與延夀出西域湯為人沈勇有大慮多䇿謀喜竒功喜許吏切毎過城邑山川嘗登望既領外國與延夀謀曰夷狄畏服大種其天性也西域夲屬匃奴今郅支單于威名遠聞侵陵烏孫大宛嘗為康居畫計欲降服之如得此二國北擊伊列西取安息南排月氐山離烏弋數年之間城郭諸國危矣山離烏弋不在三十六國中去國二萬里謂西域國為城郭者言不隨畜牧遷徙以别於匃奴也且其人剽悍剽輕悍勇也剽手妙切又匹妙悍胡幹切好戰伐數取勝久畜之必為西域患郅支單于雖所在絶遠蠻夷無金城彊弩之守如發屯田吏士歐從烏孫衆兵歐帥之令從隨也直指其城下彼亡則無所之守則不足自保之徃保安也千載之功可一朝而成也延夀亦以為然欲奏請之湯曰國家與公卿議大䇿非凡所見事必不從言凡庸之人不能遠見故壊其事也延夀猶豫不聴與讀曰豫㑹其久病湯獨矯制發城郭諸國兵車師戊巳校尉屯田吏士延夀聞之驚起欲止焉湯怒按劔叱延夀曰大衆已集㑹豎子欲沮衆邪沮止也壊也音才好切延夀遂從之部勒行陣益置揚威白虎合騎之挍一挍則别為部軍故稱挍耳湯時新置此等諸挍名以為威聲也漢兵胡兵合四萬餘人延夀湯上疏自劾奏矯制陳言兵狀即日引兵分行别為六挍其三挍從南道踰葱嶺徑大宛其三挍都尉自將發温宿國從北道入赤谷過烏孫渉康居界至闐池西而康居副王抱闐將數千騎寇赤谷城東闐音填殺掠大昆彌千餘人歐畜産甚多從後與漢軍相及頗宼盗後重重謂輜重也音真用切湯縱胡兵擊之殺四百六十人得其所掠民四百七十人還付大昆彌其馬牛羊以給軍食又捕得抱闐貴人伊奴毒入康居東界令軍不得為宼勿抄掠間呼其貴人屠墨見之間謂密呼也諭以威信與飲盟遣去徑行未至單于城可六十里止營復捕得康居貴人貝色男子開牟以為導貝色子即屠墨母弟母之弟即謂舅者皆怨單于繇是具知郅支情明日引行未至城三十里止營單于遣使問漢兵何以來應曰單于上書言居困厄願歸計彊漢身入朝見天子哀閔單于棄大國屈意康居故使都䕶將軍来迎單于妻子恐左右驚動故未敢至城下使數徃來相答報延夀湯因讓之讓責也我為單于遠來而至今無名王大人見將軍受事者名王諸王之貴者受事受教命而供事也何單于忽大計失客主之禮也忽忘也兵來道遠人畜罷極食度且盡罷度曰皮度大各切恐無以自還願單于與大臣審計䇿明日前至郅支城都頼水上離城三里止營傳陳傳讀曰敷度切望見單于城上立五采幡幟幟讀曰熾音式志切數百人被甲乗城乗謂登之備守也又出百餘騎徃來馳城下歩兵百餘人夾門魚鱗陳言其相接次形若魚鱗講習用兵城上人更招漢軍曰鬬來更互也音子行切百餘騎赴營營皆張弩持滿指之騎引却頗遣吏士射城門騎歩兵騎歩兵皆入延夀湯令軍聞皷音皆薄城下薄廹也四面圍城各有所守穿塹塞門户鹵楯為前㦸弩為後卬射城中樓上人卬讀曰仰樓上人下走土城外有重木城從木城中射頗殺傷外人外人發薪燒木城夜數百騎欲出外迎射殺之初單于聞漢兵至欲去疑康居怨已為漢内應又聞烏孫諸國兵皆發自以無所之之徃也郅支已出復還曰不如堅守漢兵遠來不能久攻單于乃被甲在樓上諸閼氏夫人數十皆以弓射外人外人射中單于鼻諸夫人頗死單于下騎傳戰大内下騎謂下樓而騎馬也傳戰轉戰也大内單于之内室言且戰且行而入内室夜過半木城穿中人郤入土城乗城呼乗登也呼火切下亦同時康居兵萬餘騎分為十餘處四面環城亦與相應和環繞也音患和卧切夜數犇營不利輙郤犇古奔字也平明四面火起吏士大呼乗之乗逐也鉦皷聲動地康居兵引郤漢兵四面推鹵楯並入土城中單于男女百餘人走入大内漢兵縱火吏士争入單于被創死軍候假丞杜勲斬單于首得漢使節二及谷吉等所齎帛書諸鹵獲以畀得者畀予也各以與所得人畀必寐切凡斬閼氏太子名王以下千五百一十八級生虜百四十五人降虜千餘人賦予城郭諸國所發十五王賦謂班與之也所發十五謂所發諸國之兵為郅支王者也於是延夀湯上䟽曰臣聞天下之大義當混為一混同也音胡夲切昔有唐虞今有彊漢匃奴呼韓邪單于已稱北籓唯郅支單于叛逆未伏其辜大夏之西以為彊漢不能臣也謂漢為不能使郅支臣服也郅支單于慘毒行於民大惡通於天臣延夀臣湯將義兵行天誅頼陛下神靈隂陽並應天氣精明陷陣克敵斬郅支首及名王以下宜縣頭槀街蠻夷邸間槀街街名蠻夷邸在此街也邸若今鴻臚客舘也崔浩以為槀當為槀街即銅駝街也此説失之銅駝在雒陽西京蓋無也以示萬里明犯彊漢者雖遠必誅事下有司丞相匡衡御史大夫繁延夀繁蒲切以為郅支及名王首更厯諸國蠻夷莫不聞知更胡行切月令春掩骼埋胔之時枯骨曰骼有肉曰胔骼工客切胔才賜切宜勿縣車騎將軍許嘉右將軍王商以為春秋夾谷之㑹優施笑君孔子誅之夾谷地名即祝其也定十年公㑹齊侯于夾谷孔子攝相事齊侯奏宫中之樂徘優侏儒戲於前孔子厯階而上曰匹夫侮諸侯者罪應誅於是斬侏儒首足異處齊侯懼有慙色施者優人之名夾音頰方盛夏首足異門而出宜縣十日乃埋之有詔將軍議是初中書令石顯嘗欲以姊妻延夀延夀不取及丞相御史亦惡其矯制皆不與湯與猶許切湯素貪所鹵獲財物入塞多不法不法者私自取之不依軍法司𨽻校尉移書道上繫吏士按驗之湯上疏言臣與吏士共誅郅支單于幸得禽滅萬里振旅師入曰振旅振登也旅衆也宜有使者迎勞道路勞力到切今司𨽻反逆收繫按驗是為郅支報讎也帝立出吏士令縣道具酒食以過軍文忠為關都尉罽賓王烏頭勞死子代立遣使奉獻漢使忠送其使王復欲害忠忠覺之廼與客屈王子隂未赴共合謀攻罽賓殺其王立隂未赴為罽賓王授印綬叚㑹宗字子松天水上邽人初為金城太守以病免後嵗餘烏孫小昆彌為國民所殺諸翕侯大亂徴㑹宗為左曺中郎將光禄大夫使安輯烏孫立小昆彌兄末振將定其國而還明年末振將殺大昆彌㑹病死漢恨誅不加元延中復遣㑹宗發戊巳校尉諸國兵即誅末振將太子畨丘㑹宗恐大兵入烏孫驚畨丘亡逃不可得即留所發兵墊婁地選精兵三十騎徑至昆彌所在召畨丘責以末振將骨肉相殺殺漢公主子孫未㐲誅而死使者受詔誅畨丘即手劔擊殺畨丘官屬以下驚恐馳歸小昆彌烏犂靡者末振將兄子也勒兵數千騎圍㑹宗㑹宗為言來誅之意令圍守殺我如取漢牛一毛耳宛王郅支頭縣槀街烏孫所知也昆彌以下復曰末振將負漢誅其子可也獨不可告我令飲食之邪㑹宗曰豫告昆彌逃匿之為大罪即飲食以付我傷骨肉恩故不先告昆彌以下號泣罷去㑹宗遂奏事公卿議賜爵為關内侯黄金百斤後漢吳漢字子顔光武於廣阿拜為偏將軍光武將發幽州兵問鄧禹可使行者禹因言漢即拜大將軍持節北發十郡突騎更始幽州牧苖曽聞之隂勒兵勑諸郡不肯應調漢乃將二十騎先馳至無終曽以漢無備出迎漢即撝兵騎収曽斬之而奪其軍北州震駭城邑莫不望風弭從遂悉發其兵引而南耿純為前將軍建武二年真定王劉楊造作符䜟與綿曼賊交通光武遣騎都尉陳副㳺擊將軍鄧隆徴楊楊閉城不内副等乃復遣純持節行赦令於幽冀所過並使勞慰王侯密勑純曰劉楊若見因而收之純從吏士百餘騎與副隆㑹元氏俱至真定止傳舍楊稱病不謁以純真定宗室之出男子謂姊妹之子為出也遣使與純書欲相見純報曰奉使見王侯牧守不得先詣如欲面㑹宜出傳舍時楊弟林邑侯讓及從兄細細或作紺各擁兵萬衆人自恃衆強而純意安静即從官屬詣之兄弟并将輕兵在門外楊入見純純接以禮敬因延請其兄弟皆入廼閉閣悉誅之因勒兵而出真定震怖無敢動者班超為蘭臺令史後坐事免官後奉車都尉竇固出擊匃奴以超為假司馬將兵别擊伊吾戰於蒲䫫海多斬首虜而還固以為能遣與從事郭恂俱使西域超到鄯善鄯善王廣奉超禮敬甚備後忽更踈懈超謂其官屬曰寜覺廣禮意薄乎此必有北虜使來狐疑未知所從故也明者暏未萌况已著邪乃召侍胡詐之曰匈奴使來数日今安在乎侍胡惶恐具服其狀超乃閉侍胡悉㑹其吏士三十六人與共飲酒酣因激怒之曰卿曺與我俱在絶域欲立大功以求富貴今虜使到裁數日而王廣禮敬即廢如令鄯善收吾屬送匈奴骸骨長為豺狼食矣為之奈何官屬皆曰今在危亡之地死生從司馬超曰不入虎穴不得虎子當今之計獨有因夜以火攻虜使彼不知我多少必大震駭可殄盡矣滅此虜則鄯善破膽功成事立矣衆曰當與從事議之超怒曰吉㓙決於今日從事文俗吏聞之必恐而謀泄死無所名非壯士也衆曰善初夜遂將吏士徃奔虜營㑹天大風超令十人持皷蔵虜舍後約曰見火然皆當鳴皷大呼餘人悉持兵弩夾門而伏超乃順風縱火前後皷噪虜衆驚亂超手格殺三人吏兵斬其使及從士三十餘級餘衆百許人悉燒死明日乃還告郭恂恂大驚既而色動超知其意舉手曰掾雖不行班超何心獨擅之乎恂乃悦超於是召鄯善王廣以虜使首示之一國震怖超曉告撫慰遂納子為質趙岐獻帝時為太僕奉迎車駕到陳留得篤疾遂不至興平元年徴趙岐㑹帝當還雒陽先遣衛將軍董承修理宮室岐謂承曰今海内分隳惟有荆州境廣地勝西通巴蜀南當交趾年榖獨登兵人差全岐雖廹大命猶志報國家欲自乗牛車南説劉表可使其身自將兵來衛朝廷與將軍并心同力共奬王室此安上救人之䇿也承即表遣岐使荆州督租糧岐至劉表即遣兵詣雒陽助修宮室軍資委輸前後不絶裴茂為尚書獻帝建安初以奉使率導関中諸將討李儒有功封列侯魏張既為議郎参鍾繇軍事及袁尚并州刺史高幹舉并州反河内張晟衆萬餘人無所屬宼崤澠間河東衛固宏農張琰各起兵以應之太祖使既西徴諸將馬騰等皆引兵㑹擊晟等破之斬琰固首幹奔并州封既武始亭侯後魏奚斤為鄭兵將軍明元即位斤循行州郡問民疾苦章武民劉牙聚黨為亂斤討平之周幾為左部尚書㤗嘗初行唐民負險不供賦稅幾與長孫道生宣示禍福于時郡縣斬叛胡翟猛省於林慮山猛省遺種竄於行唐及襄國幾追討盡誅之李煥為治書侍御史孝文時楊㤗叛任城王澄率并肆兵以討之遣煥單車入代出其不意㤗等驚駭計無所出煥曉喻逆徒示以禍福於是凶黨離心莫為之用于昕孝明時為武川鎮將孝昌中使蠕蠕與阿那瓌擒逆賊破雒汗聴明出六斤等轉輔國將軍北中郎將後周伊婁穆初仕後魏為給事黄門侍郎廢帝二年穆使於蜀屬伍城郡人趙雄傑與梓潼郡人王令公鄧朏等搆逆三萬餘人阻涪水立柵進逼潼州穆遂與刺史叱羅恊率兵破之増邑五百户趙昶初仕後魏文帝為華州都督先是汾州胡叛再遣昶慰勞之皆知其虚實及大軍徃昶為先驅遂破之以功封章武縣伯辛昻明帝武成中為小吏部武帝天和初使蜀懐輯蜀民及使還屬巴州萬榮都民反攻圍郡城遏絶山路昻謂其同侶曰凶狡狂悖一至於此若待上聞或淹旬月孤城無援必淪宼黨欲救近溺寧暇遠求越人茍利百姓專之可也於是募通開二州得三千人倍道兼行出其不意又令其衆皆作中國歌直趣賊壘賊既出不虞謂有大軍赴救於是望風瓦解郡境獲寧朝廷嘉其權以濟事詔梁州總管即於軍中賞昂奴婢五十口繒綵四百疋隋趙仲卿初仕周為畿伯中大夫王謙作亂時仲卿使在利州即與總管豆盧勣發兵拒守為謙所攻仲卿督兵出戰前後一十七陣及謙平進位大將軍封長垣縣公邑一千户丈裴矩為給事郎奏舍人事高祖開皇十年奉詔廵簡嶺南未行而高知慧汪文進等相聚作亂吳越道閉帝難遣矩行矩請速進帝許之行至南康得兵數千人時俚帥王仲宣逼廣州遣其所部將周師舉圍東衡州矩與大將軍鹿愿赴之賊立九柵屯大庾嶺共為聲援矩進破之賊懼釋東衡州據原長嶺又擊破之遂斬師舉進軍自南海援廣州仲宣懼而潰散矩所綏集者二十餘州又承制署其渠帥為刺史縣令及還報帝大悦命昇殿勞苦之顧謂高熲楊素曰韋洸將二萬兵不能早渡嶺朕毎患其兵少裴矩以三千弊卒徑至南康有臣若此朕亦何憂以功拜開府賜爵聞喜縣公李景字道興為鄜州刺史後與上明公楊紀送義成公主於突厥至恒安遇突厥來宼時代州總管韓洪為虜所敗景率所領数百人援之力戰三日殺虜甚衆長孫晟為開府儀同三司仁夀元年詔楊素為軍元帥征突厥逹頭可汗晟為受降使者軍次河北值賊帥思力俟斤等領兵拒戰晟與大將軍梁黙擊走之轉戰六十餘里賊衆多降晟唐謝叔方為左親衛中郎將奉使靈州招輯突厥㑹失哥邏禄等部落叛率兵三千於籟瀆水上圍叔方甚急叔方率厲奮擊虜衆乃解還至柔遠縣發伊州兵徃諭延陁與其逰軍㑹擊大破之李大亮為散騎侍郎時樊鄧未平因遣大亮安集之所下者四城拜安州刺史契苾何力為左驍衛大將軍高宗龍朔元年九姓叛以何力為鐡勒道安撫大使乃揀精騎五百馳入九姓中賊大驚何力謂曰國家知汝被詿誤遂有翻動使我捨汝等過皆可自新罪在酋渠得之則已諸姓大喜共擒偽葉䕶及設特勒等同惡二百餘人以歸何力數其罪而誅之裴行儉儀鳳中為司列少常伯安撫大食使擒偽可汗都支及遮匐還栢耆文宗太和初為諫議大夫滄徳李同㨗叛宿師於野者連年同㨗窮䠞求降耆宣諭訖乃帥数百騎入滄州取同㨗與其家屬赴京師至徳州果諜言鎮州王廷湊來刼簒耆乃斬同㨗首傳而獻㨗百僚稱賀梁馬嗣勲唐末為太祖元從押牙嗣勲典客頗稱任使昭宗光化元年三月太祖令徃光州説刺史劉存背淮賊以向國又與李彦威收復黄州及武昌縣獲刺史瞿章俄復使光州持幣馬以賜劉存㑹淮賊急攻光州存與嗣勲率兵大戰而走之又遣使於蜀及歸得其助軍資實甚多天復中太祖迎昭宗於岐下軍至華之西闉使嗣勲入見韓建即時同出迎謁及羅紹威將殺牙軍遣使告於太祖求為外援時安陽公主初卒於魏太祖乃遣嗣勲率嘗直官千人置兵仗於槖内肩舁以入於魏聲言來致祭㑹葬牙軍不之覺天祜三年正月十六日夜嗣勲與紹威親軍同攻牙軍至曙盡殪之後唐李嚴同光中為客省使於蜀時王衍専據坤維部曲離心知其必可取使還具奏蜀主之狀興師之日必有成功故平蜀之謀始於嚴郭崇韜起軍之日乃以嚴為三川招撫使嚴與先鋒使康延孝將兵五千先驅閣道或馳詞説或㓕以兵鋒大軍未及所在降下延孝在漢州王衍與書曰可請李司空先來予即舉城納欵衆咸以為討蜀之謀始於嚴衍甘言將誘而殺之欲不令遽徃嚴聞之喜曰俟魏王至吾兩人大功立矣即馳騎入益州衍見嚴於母前以妻母為託即令引蜀使歐陽彬迎謁繼岌魏王名也三川平招撫周官司馬有憛人之職掌誦王志以廵天下之邦國而語之使萬民和説斯古道也若夫新造之邦民懐去就薦饑之嵗下有攘奪或連城叛渙陷赤子於匪人或靈旗濯征困齊民於物役以至殊俗欵附勍宼盪平天災流行比屋凋弊繇是申擇雋望奉宣國命布露恩詔導揚徳澤陳之以禍福譬之以逆順用能定萬衆之反側悟積年之迷妄勞徠安集撫懐存䘏使從亂者知歸慕化者無斁兇狡革慮逋播還復者焉向非窮理而逹變研幾而適道周物之智罔滯臨難之節不奪者又曷足以膺是選哉漢司馬相如為郎数嵗㑹唐䝉使畧通夜郎􅈎中行取日畧夜郎􅈎中皆西南夷也發巴蜀吏卒千人郡又多為發轉􅈇萬餘人用軍興法誅其渠率渠大也巴蜀民大驚恐武帝聞之乃遣相如責唐䝉等因告諭巴蜀民以非帝意檄曰告巴蜀太守蠻夷自擅不討之日久矣時侵犯邉境勞士大夫陛下即位存撫天下集安中國然後興師出兵北征匃奴單于怖駭交臂受事屈膝請和康居西域重譯納貢稽首來享來入朝覲豫享祀也一曰享獻也移師東指閩越相誅右弔番禺太子入朝番禺南海郡治也東伐越後至番故言右也南夷之君西􅈎之長嘗効貢職不敢惰怠延頸舉踵喁喁然喁喁衆口向上也皆鄉風慕義欲為臣妾道里遼遠山川阻深不能自致致至也夫不順者已誅而為善者未賞故遣中郎將徃賔之發巴蜀之士五百人各以奉幣衛使者不然不然之變也靡有兵革之事戰鬬之患今聞其乃發軍興制以發軍之法為興衆之制也驚懼子弟憂患長老郡又擅為轉粟運輸皆非陛下之意也當行者或亡逃自賊殺賊猶害也亦非人臣之節也夫邉郡之士聞蠭舉燧幡蠭如覆米筧縣著契臯頭有宼則舉之燧即薪有宼則燔然之也皆攝弓而馳荷兵而走攝謂張弓注矢而馳之也流汗相屬惟恐居後屬連也觸白刃冐流矢冐犯也議不反顧計不旋踵人懐怒心如報私讎彼豈樂死惡生非編列之民而與巴蜀異主哉編列編户也計深慮遠急國家之難而樂盡人臣之道也故有剖符之封析圭而爵位為通侯析中分也白藏天子青在諸侯居列東第東第甲宅也居旁地之東終則遺顯號於後世傳土地於子孫行事盡忠敬居位甚安佚佚樂也名聲施於無窮功烈著而不滅是以賢人君子肝腦塗中原膏液潤埜草而不辭也今奉幣役至南夷即自賊殺或亡逃抵誅抵至也亡逃而至於誅也身死無名無善名也諡為至愚耻及父母為天下笑人之度量相越豈不遠哉然此非獨行者之罪也父兄之教不先子弟之率不謹不先者謂徃日不教之寡亷鮮恥而俗不長厚也其被刑戮不亦宜乎陛下患使者之若彼悼不肖愚民之如此故遣信使誠信之人以為使也曉諭百姓以發卒之事諭告也因數之以不忠死亡之罪數責也讓三老孝弟以不敎誨之過讓責也責其敎誨不備方今田時重煩百姓重難也不欲召取之也已親見近縣近縣之人使者已自見而口諭之矣故為檄文以示遠所也恐遠所谿谷山澤之民不徧聞撽到亟下縣道亟急也縣有夷曰道咸諭陛下意毋忽忽怠忽也後漢鮑永初為更始尚書僕射將兵安集河東㑹更始死永悉罷兵幅巾詣光武時攻懐未拔帝謂永曰我攻懐三日而兵不下關東畏服卿可具將故人自徃城下譬之即拜永諫議大夫至懐乃說更始河内太守於是開城而降伏隆瑯邪東武人仕郡督郵建武二年詣懐宫光武甚親接之時張歩兄弟各擁彊兵據有齊地拜隆為太中大夫持節使青徐二州招降郡國隆移檄告曰乃者猾臣王莽殺帝盗位宗室興兵除亂誅莽故羣下推立聖公以主宗廟而任用賊臣殺戮賢良三王作亂盗賊縱横忤逆天心卒為赤眉所害皇天祐漢聖哲應期陛下神武奮發以少制衆故尋邑以百萬之軍潰散於昆陽王郎以全趙之師土分於邯郸大彤高胡望旗消靡鐵脛五校莫不摧破梁王劉永幸以宗室屬籍爵為侯王不知厭足自求禍棄遂封爵牧守造為詐逆今虎牙大將軍屯營十萬已㧞睢陽劉永奔迸家已族矣此諸君所聞也不先自圖後悔何及青徐郡盗得此惶怖獲索賊右師郎等六校即時皆降張歩遣使隨隆詣闕上書獻鰒魚其冬拜隆光禄大夫復使於歩并與新除青州牧守及都尉俱東奏隆輙拜令長以下隆招懐綏輯多來降附帝嘉其功比之酈生張純安世之孫襲爵富平侯建武五年拜太中大夫使將煩川突騎聚荆徐揚部督委輸監諸將營安集耿純為東郡太守建武八年東郡濟隂盗賊羣起遣大司空李通横野大將軍王嘗擊之光武以純威信著於衛地東都舊衛地也遣使拜太中大夫使與大兵㑹東郡東郡聞純入界盗賊九千餘人皆詣純降與大兵不戰而還璽書復為東郡太守吏民悅服張堪為謁者建武十一年使詣吳漢伐公孫述成都既㧞堪慰撫吏民蜀人大悦魏鍾毓為廷尉高貴卿公正元中母丘儉文欽反毓持節至揚豫州頒行赦令告喻士民宋劉秀之為太子右衛率孝武大明五年雍州刺史海陵王休茂反為土人所誅秀之以夲官慰勞分别善惡事畢還都梁韋載為冠軍將軍時侯景平尋奉使徃東陽晉安招撫留異陳寳應等後魏周幾為左民尚書明元神瑞中并州饑民逰食山東詔幾領衆鎮愽陵之魯口以安集之㤗嘗初白澗行唐民數千家負嶮不供輸稅幾與安康子長孫道生宣示禍福逃民遂還張靈符為中書慱士文成和平中咸陽郡民趙昌聚黨作逆百姓騷動詔靈符宣㫖慰諭民乃復業李煥為司徒右長史以荆蠻擾動勑焕兼散騎常侍慰勞之降者萬餘家陸馛獻文時襲父爵封為建安王宋司州刺史常􅈿奇以懸瓠内附而新民猶懐去就馛䘖㫖撫慰諸有陷軍為奴婢者馛皆免之百姓忻悅民情乃定韋􅈿為尚書郎孝文初蠻首桓誕歸欵朝廷思安邉之畧以誕為東荆州刺史令􅈿為使與誕招慰蠻左珍自懸瓠西入三百餘里至桐栢山窮淮源宣揚恩澤凡所招降至郡縣而還鄭義為中書侍郎延興初陽武人田陽度年十五妖惑動衆擾亂京索以義河南民望為州郡所信遣義乗傳慰諭義到宣示禍福重加募賞旬日之間衆皆歸附韓麒麟為給事黄門侍郎乗傳招慰徐兖叛民歸順者四千餘家孟威為羽林監時四鎮高車叛投蠕蠕孝文詔威曉諭禍福追還逃散分配為民盧同宣武時為諮議叅軍兼司馬時秦州民反詔同兼通直常侍持節慰諭之多所降下後為撫軍時㑹營州民就徳興謀反除同度支尚書持節使營州慰勞聴以便宜從事同頻遣人招諭皆為賊害乃遣賊家口三十人并免家奴為良齎書喻徳興徳興乃降安輯其民而還源懐為車騎大將軍持節廵行北邉自京師遷雒邉朔遥逺加連年旱儉百姓困弊懐䘖命廵撫存恤有方便宜運轉有無通濟高綽字僧裕孝明初為太尉司馬其年秋大乗賊起於冀州都督元文遥率衆討之詔綽兼散騎常侍持節以白虎幡軍前招慰綽信著州里降者相尋費穆為左軍時蠕蠕主婆羅門自涼州歸降其部衆因饑侵掠邉邑詔穆䘖命宣慰衆皆欵附王静為冠軍將軍岐州刺史趙郡王謐虐害城民怨叛詔静馳驛慰喻咸即降崔亮為七兵尚書領廷尉卿徐州刺史元昞撫御失和詔亮馳驛安撫亮至劾昞處以大辟勞賚綏慰百姓帖然楊摽為車騎將軍孝武入關稽胡恃險不賔屢行抄竊以摽兼黄門侍郎徃慰撫之摽頗有權畧能得邉情誘化酋渠多來欵附乃有隨摽入朝者北齊封隆之初仕東魏孝静為河南尹丞時青徐二州士民反叛隆之奉使慰諭咸即降欵後遷尚書右僕射武定初北豫州刺史高仲密將叛遣使隂通消息於冀州豪望使為内應輕薄之情頗相扇動詔隆之馳驛慰撫遂得安静封子繪為都官尚書時冀州高歸彦作逆文襄詔子繪謂曰卿世載名德恩洽彼州故遣參贊軍事随使慰撫宜善加謀畧以稱所寄即以其日馳傳赴軍子繪祖父世為夲州百姓素所歸附既至廵城諭以禍福民吏降欵日夜相繼賊中動静小大必知賊平仍勑子繪權行州事後周趙昶為中都督氐梁道顯叛攻南繇太祖遣昶慰諭之道顯等皆即欵附東秦州刺史因徙其豪帥三十餘人并部落於華州太祖即以昶為都督領之辛昻為車騎將軍時益州殷阜軍國所資經途艱難毎苦刼盗詔昻使於梁益事無巨細皆委決焉昻撫導梗化安置城鎮數年之中頗得寧静天和初陸騰討信州羣蠻今蔓州厯時未克高祖詔昻使於通渠等諸州運糧饋之時臨信諸州民庶亦多從逆昻諭以禍福赴者如歸乃令老弱負糧壯夫拒戰咸願為用莫有怨者隋賀若誼在魏為尚食典御時周太祖據有闗中引之左右常使詣杏城屬茹茹種落携貳屯於河表誼因譬以禍福誘令歸附降者萬餘口太祖深竒之賜金銀百兩宇文㢸初仕周為禮部上士常奉使鄧至國及黒水龍涸諸羌前後降附三十餘部後為尚書右丞時西羌内附詔㢸持節安集之置鹽澤蒲昌二郡而還長孫晟為右驍衛將軍頻使突厥引其内附皆晟之力也韋冲為散騎常侍嵗餘發南汾州胡千餘人北築長城在塗皆亡煬帝呼冲問計冲曰皆繇牧宰不稱所致請以理綏静可不勞兵而定帝因今冲綏懐叛者月餘并赴長城帝降書勞勉之尋拜石州刺史崔頥為越王長史大業中山東盗賊蜂起煬帝令撫慰髙陽襄國歸首者八百餘人唐裴矩初仕隋為黄門侍郎大業初煬帝令矩往張掖引致西蕃至者十餘國三年帝有事於恒嶽咸來助祭帝將廵河右復令矩徃燉煌矩遣使説高昌王麴伯雅及伊吾吐屯設等㗖以厚利導使入朝及帝西廵次燕支山高昌王伊吾設等及西蕃胡二十七國謁於道左皆令佩金玉被錦罽焚香奏樂歌舞諠譟復令武威張掖士女盛餙縱觀騎乗填咽周亘數十里以示中國之盛帝見而大悦竟破吐谷渾拓地數千里並遣兵戍之毎嵗委輸巨億萬計諸蕃懾懼朝貢相續帝謂矩有綏懐之畧進位銀青光禄大夫武德末建成被誅其餘黨尚保宫城與秦王决戰詔矩令至東宫曉喻之宫兵乃散淮安王神通高祖從父弟也武徳四年五月竇建德慱州刺史王羡求降神通為使者慰撫山東下三十餘州建徳之地悉定張河初為高祖大將軍户曺叅軍從至賈胡堡令河還鎮并州尋遣慰撫山東燕趙之地争來欵附殷矯初為太宗渭北道元師長史時闗中羣盗往往聚結衆無適從令矯招慰之所至皆下李嶠為監察御史時嶺南邕嚴二州首領反叛發兵討擊髙宗令嶠往監軍事嶠乃宣朝㫖特捨其罪親入獠洞以招諭之叛者盡降因罷兵而還髙宗甚嘉之裴懐古則天時為監察御史時姚嶲蠻首反叛詔懐古往招輯之懐古申明賞罰賊徒歸附者日以千數乃俘其魁首而還後為司封郎中時始安賊歐陽倩擁徒數萬剽䧟州縣授懐古桂州都督仍充招慰討擊使纔及嶺飛書招誘示以禍福賊徒迎降自陳為吏人侵偪乃舉兵耳懐古知其誠懇乃輕騎以赴之左右曰夷獠難親未可信也懐古曰吾仗忠信可通於神明况於人乎因造其營以慰喻之羣賊喜悦歸其所掠財貨納於公府諸洞酋長素持兩端者盡來欵附嶺外悉定宋慶禮為大理評事充嶺南採訪使時崖振等五州首領更相侵掠荒俗不安承前使人懼其炎瘴莫有到者慶禮躬至其境詢問風俗示以禍福於是安堵遂置鎮兵五千人劉晏肅宗寳應二年為吏部尚書平章事時吐蕃犯長安既平帝命晏充度支轉運等使如上都宣慰晏至上都奉宣詔㫖百姓以晏舊京尹觀者如堵既宣恩煦無不忭躍奚陟為中書舍人徳宗貞元中江西淮南淮西大雨為災命陟勞問廵慰所在人安悦殷侑為虞部員外郎憲宗元和中王承宗在鎮州拒命憲宗命侑為使以招諭之承宗遂禀朝㫖獻徳棣二州及遣兩子入覲栢耆為右拾遺元和十五年鎮州王承宗歸國移鎮滑州朝廷賜成徳軍賞錢一百萬貫令諫議大夫鄭覃宣慰軍人賚錢未至浩浩然騰口穆宗詔耆徃諭㫖耆至令承宗集三軍宣導朝㫖衆心乃安李遜為散騎常侍長慶中鄆州李師道疑恐穆宗命遜馳赴東平諭之師道得其語意即請効順旋為其下所惑而止崔戎為諫議大夫克劔南東西兩川宣慰使西川承蠻宼之後戎宣撫兼再定征稅廢置得所公私便安晉華湯琪後唐初鎮耀州莊宗同光末平蜀川獲秦州遣湯琪撫而􅊩之一境大稱肅然冊府元龜卷六百五十六
