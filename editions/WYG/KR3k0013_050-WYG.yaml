body:
  text: 册府元龜卷五十宋王欽若等撰帝王部崇儒術第二唐高祖武徳二年詔曰盛徳必祀義存方䇿逹人命世流慶後昆建國君臨𢎞風闡教崇賢章善莫尚於兹自八卦初陳九疇攸叙徽章既革節文不備爰始姬旦主翊周邦創設禮經大明典憲啟生人之耳目窮法度之本原化起二南業隆八百豐功茂徳獨冠終古暨乎王道既衰頌聲不作諸侯力爭禮樂陵遲粤若宣尼天姿叡哲經過齊魯之際揖譲洙泗之間綜理遺文𢎞宣舊制四科之教歴代不刋三千之徒風流無歇惟兹二聖道著生民宗祀不修孰明褒尚朕君臨區宇興化崇儒永言先逹情深紹嗣宜令有司於國子學立周公孔子廟各一所四時致祭仍博求其後具以名聞計考所宜當加爵土七年二月詔曰六經茂典百王仰則四學崇教千載垂範是以西膠東序春誦夏弦説禮敦詩本仁祖義建邦立極咸必繇之自叔世澆訛雅道淪缺懸歴歳紀儒風莫扇隋季以來䘮亂兹甚睠言篇籍皆為煨燼周孔之教闕而不脩庠塾之義冺焉将墜非所以闡揚徽烈敦尚風範訓民調俗垂裕後昆朕受命膺期握圖馭宇思𢎞至道翼宣徳化永言墳索深存講習所以捃摭遺逸招集散亡諸生胄子特加奨勸而凋弊之餘湮替日久學徒尚少經術未隆子衿之嘆無忘興寝方今函夏既清干戈漸戢縉紳之業此則可興宜下四方諸州有明一經已上未被升擢者本屬舉送具以名聞有司試䇿加階叙用其吏民子弟有識性開敏志希學藝亦具名状申送入京量其差品竝即配學明設考課各使勵精琢玉成器庶其非逺州縣及鄉各令置學官寮牧宰或不存意普更頒下早遣立脩夫安上治民莫善於禮出忠入孝自家刑國揖譲俯仰登降折旋皆有節文咸資端肅末業踈惰随時将廢凡厥生民各宜勉勵又釋奠之禮致敬先師鼓篋之義以明遜志比多闕畧更宜詳備仲春釋奠朕将親覧所司具為條式以時宣下是月丁巳帝幸國子學親臨釋奠引道士沙門有舉業者與博士雜相駁難久之乃罷因下詔曰自古為政莫不以學則仁義禮智信五者具備故能為利博深朕今欲敦本息末崇尚儒宗開後生之耳目行先王之典訓而三教雖異善歸一揆沙門事佛靈宇相望朝賢宗儒辟雍頓廢公王以下寜得不慙朕今親觀覧仍徴集四方胄子冀日就月将竝得成業禮譲既行風教漸改使期門介士比屋可封横經庠序皆遵雅俗諸公王子弟竝皆率先自相勸勵賜學官胄子及五品以上各有差太宗貞觀十年封孔子裔孫徳倫為褒聖侯十二年二月丁丑幸國子學親觀釋奠國子祭酒以下官及學生高弟精勤者加級賜帛各有差二十一年二月詔曰左丘明卜子夏公羊高榖梁赤伏勝高堂生戴聖毛萇孔安國劉向鄭衆杜子春馬融盧植鄭康成服子慎何休王肅王輔嗣杜元凱范寗等二十有一人竝用其書垂於國胄既行其道理合崇褒自今有事於太學可竝配享尼父廟堂高宗永徽元年六月詔曰昔勲華肇政仁義居先殷周創基教學成本朕嗣立鴻基裁成丕緒如臨於海罔知攸濟思得學徒用康庶績而頃嵗所敦先諸聖教青衿方領未逹至懐唯欲思轅固以加班想高堂以授秩臣欽若等曰轅固轅生也高堂高堂隆也斯文寥落去之彌逺深加發慮稱朕意焉儒官員缺即宜補授其館博士助教節級賜物三館學士有業科高第景行淳良者所司簡試具以名聞乾封元年正月帝東封次曲阜縣追贈孔子為太師其廟宇制度卑陋宜加脩造仍以少牢致祭總章元年三月詔曰皇太子𢎞近因釋菜齒胄上庠祗事先師馳心近侍仰崇山而景行眷曩哲以勤懐顯顔曾之特高揚仁義之雙羙請申褒贈載甄芳烈朕加其進徳冀以思齊訓誘之方莫斯為尚顔回可贈太子少保咸亨元年五月詔曰諸州縣孔子廟堂及學館有破壊并先來未造者遂使生徒無肄業之所先師闕奠祭之儀久致飄零深非敬本宜令所司速事營造中宗神龍元年五月制以鄒魯之邑百户為太師隆道公則天封孔子為􅂭道公宣尼采邑收其租税用供薦享又授裔孫褒聖侯崇基朝散大夫仍許子孫以相傳襲景龍三年六月以經籍多殘缺令京官有學行者分行天下捜括圗籍睿宗景雲元年七月制曰朕克纉丕業肇膺景命憲章昔典欽若前王永言政途庶幾㳂革猶恐學校多闕賢俊罕登庠序者風化之本人倫之先宜令州縣勸導令知禮譲太極元年正月制孔宣公祠廟令本州修飾取側近三十户以供灑掃二月追贈顔子為太子太師曾子為太子太保竝配享於孔子𤣥宗開元二年四月詔曰古之學士始入小學見小節入大學見大節知父子長幼之序君臣上下之位然後師逸功倍化人成俗莫不繇之子不云乎逺而有光者餙也近而逾明者學也故道行於上禄在其中所謂貴於速成不唯於遲逹自頃州里所薦公卿之緒門人衆矣孰嗣子音國胄顒然未臻吾道至使鑚仰之地寂寥厥風貴於責實務欲求仕将去聖滋逺尚㳂澆薄為敦儒未𢎞不行勸沮朕承百王之末居四海之尊惟懐永圖思革前弊何以發後生之智慮垂先王之法則朕甚懼之敢忘於是天下有業擅專門學優重席堪師授者所在具以名聞自今以後貢舉人等宜加朂勉須獲實才如有義疏未詳習讀未遍輙充舉送以希僥倖所繇官竝寘彛憲有司更申明條例稱朕意焉五年五月以故朝散大夫褒聖侯孔宗基嫡子璲芝襲封褒聖侯九月詔曰古有賓獻之禮登於天府揚於王庭重學尊儒興賢造士故能羙風俗成教化盖先王之所繇焉朕以寡徳欽若前政思與大夫羣士復臻於理故他日訪道有時忘食乙夜觀書分宵不寝悟專經之義篤知學史之文繁永懐覃思有足尚者不示褒崇孰云奨勸其諸州鄉貢明經進士見訖宜令引就國子監謁先師學官為之開講質問疑義仍令所司優厚設食两館及監府得舉人亦准此其日朝請官五品以上及朝集使徃觀禮即為常式易曰學以聚之問以辨之詩云如切如磋如琢如磨此朕所望於賢才矣七年三月詔曰孝經尚書有古文本孔鄭注其中指趣頗多踳駮精義妙理若無所歸作業用心復何所適宜令諸儒併訪後進逹解者質定奏聞又詔曰孝經者徳教所先自頃以來獨宗鄭氏遺㫖今則無聞又子夏易𫝊近無習者輔嗣注者亦甚甄明諸家所傳互有得失獨據一説能無短長其儒官詳定所長令明經者習讀若将理等亦可兼行其作易者兼帖子夏易傳共為一部亦詳其可否奏聞時議以為不可遂停五月麗正殿寫四庫書勑秘書昭文禮部國子監太常寺及諸司官人百官等家就借寫之八年三月詔曰顔生等十哲宜為坐像從祀曾参大孝徳冠同列特為像坐於十哲之次因畫七十子及二十二賢於廟堂壁以顔囘亞聖親為製賛以書於石乃命當朝文士分為之賛題其壁焉十一月詔貢舉人謁先師開講仍令朝集使及京官觀禮十三年十一月封東嶽禮畢幸孔子宅親設奠祭詔曰孔宣父誕聖自天垂範百代作王者之師表開生人之耳目朕增封岱岳㢠鑾泗濵思闕里之風想雩壇之詠逖矣遺烈慨然永懐式遵祀典用申誠敬宜令禮部尚書蘇頲以太牢致祭仍令州縣以時祀享復近墓五户長供掃除二十二年四月詔曰風化之本其在庠序去秋不熟生徒蹔令就舍講習之地安可久閒其兩京監生在外者即宜赴學二十七年八月追贈先聖夫子為王諡曰文宣制曰𢎞我王化在乎儒術能發揮此道啓廸含靈則生人以來未有如夫子者也所謂自天攸縱将聖多能徳配乾坤身掲日月故能立天下之大本成天下之大經羙政教移風俗君君臣臣父父子子人到於今受其賜不其猗歟嗚戲楚田莫封魯公不用俾夫大聖纔列陪臣棲遑旅人固可知矣年祀浸逺光靈益彰雖代有褒稱而未為崇峻不副於實人其謂何朕以薄徳祗膺寳命思闡文明廣被華夏時則異於今古情每重於師資既行其教合旌厥徳爰申盛禮載表徽猷夫子既曰先聖可追諡為文宣王宜令三公持節册命其文宣王陵并舊宅廟量加人灑掃用展誠敬其後嗣褒聖侯宜改為文宣公至如辨方正位著自禮經苟不合度何以示則昔縁周公南面夫子西坐今位既有殊坐豈仍舊宜補其墜典作兹成式自今以後兩京國子監及天下諸州夫子南面坐十哲等東西列侍且門人三千則見今稱十哲包夫衆羙實越等夷暢𤣥聖之風軌發人倫之耳目竝宜褒贈以寵賢明顔子淵既云亞聖須優其秩可贈兖公閔子騫贈費侯冉伯牛贈鄆侯仲弓贈薛侯冉子有贈徐侯仲子路贈衛侯宰子我贈齊侯端木子貢贈黎侯言子㳺贈吳侯卜子夏贈魏侯又夫子格言参也稱魯雖居七十之數不載四科之目允稽先㫖俾循舊位庶乎禮得其序人焉式瞻宗洙泗之丕烈重膠庠之雅範布告中外咸使知聞丁亥命尚書左相裴耀卿攝大尉持節徃册于廟始正南面改冕服樂用宫懸己丑追贈曾参等六十七人皆為伯参為成伯顓孫師為陳伯澹䑓滅明為江伯宓子賤為單伯原憲為原伯公冶長為莒伯南宫适為剡伯公晳哀為郳伯曾㸃為宿伯顔路為杞伯商瞿為蒙伯髙柴為共伯漆雕開為滕伯公伯寮為任伯司馬牛為向伯樊遲為樊伯有若為卞伯公西赤為邵伯巫馬期為鄫伯梁鱣為梁伯顔柳為蕭伯冉孺為郜伯曹䘏為豐伯伯䖍為鄒伯公孫龍為少梁伯漆雕歛為武城伯顔子驕為瑯琊伯漆雕徒父為須句伯壌駟赤為北徴伯商澤為睢陽伯石作觸為后邑伯任不齊為任城伯公夏首為允父伯公良孺為東牟伯石處為營丘伯秦開為彭衙伯奚容蒧為下邳伯公肩定為新田伯顔襄為臨沂伯􅙉单為銅鞮伯句井疆為洪陽伯罕父黒為乘丘伯秦商為上雒伯申黨為召陵伯公祖子之為期思伯榮子祺為雩婁伯縣成為巨野伯左人郢為臨菑伯燕伋為漁陽伯鄭子徒為滎陽伯秦非為汧陽伯施之常為乗氏伯顔噲為朱虛伯歩叔乘為淳于伯顔之僕為束武伯原亢籍為莱蕪伯樂欬為昌平伯亷潔為莒父伯顔何為關陽伯叔仲會為瑕丘伯狄黑為臨濟伯邽巽為平陸伯孔忠為文陽伯公西輿為長丘伯公西蒧為祝阿伯制曰道可褒崇豈限今古則追贈之典旌徳存焉夫子弟子十哲之外曾参等六十七人同升孔門博習儒術子之四教爾實行之親奉㣲言式揚大義是稱逹者不其盛歟欽若古風載崇𤣥聖至于十哲亦被寵章而子輿之倫未有稱謂宜亞四科之士以䟽五等之封俾與先師咸膺盛禮二十八年詔曰先聖文宣王春秋釋奠宜令攝三公行禮著之常式天寳元年七月詔曰古之教人盖有彛訓必在勤學使知其方故每月釋菜之時常開講座用以發明聖㫖啟廸生徒待問者應而不窮懐疑者質而無惑𢎞益之致不其然歟或有凢流矜於小辨初雖論難終雜詼諧出言不經積習成弊自今以後除問難經典之外不得輙請宜令本司長官嚴加禁止仍委御史紏察十一月改驪山為會昌山仍於秦坑儒之所立祠宇以祀遭難諸儒臣欽若等按賈至文集有旌儒廟碑奉勑撰也二年十月制曰朕永惟聖道思闡儒風故尊崇先王所以𢎞至教褒奨後嗣所以羙前烈文宣王三十五代孫通直郎前守邠王府文學褒聖侯孫璲芝纂承睿哲克復中庸三命益恭敦素慿於祖業百代必祀光寵被於朝恩積慶之餘既開於土宇盛徳不朽宜𫝊於帶礪可襲文宣公三載七月詔曰朕欽惟載籍討論墳典以為先王令範莫越于唐虞上古遺書寔稱于訓誥雖百篇奥義前代或亡而六體竒文舊規猶在但以古先所制有異于當今傳寫浸訛轉疑于後學永言刋革心在從宜尚書應是古體文字竝依今字繕寫施行典謨無乖於古訓庻遵簡易有益于将來其舊本仍藏之書府五載正月詔曰禮經垂訓篇目攸殊或未盡於通體是有乖於大義借如堯命四子所授惟時周分六官曽不繫月先王行令盖取于斯苟分至之可言何弦望之是舉其禮記月令宜改為時令十四載四月勑國子監諸生等既非舉時又属暑月在於館學恐漸炎蒸其有欲歸私第及還鄉貫習讀者竝聽仍委本司長官具名申牒所繇任至舉時赴監東京監亦准此代宗廣徳二年七月甲申集賢殿大學士中書舍人侍郎平章事元載奏集賢院圖書自經冦盗墜失頗多請開贖書之令得一卷賞一千錢許之丙午勑曰古者設大學教胄子所以延俊造揚王庭雖年榖不登兵甲或動而爼豆之事未甞廢焉頃年已來戎車屢駕天下轉輸公私匱竭帶甲之士所務贏糧皷箧之徒未能仰給繇是諸生輟講經誦蔑聞宣父有言是吾憂也投戈息馬論道尊師用𢎞庠序之風俾有簞瓢之樂宜令所司量追集賢學士精加選擇使在館習業仍委度支准給厨米敦兹儒術庻有大成甲科高懸好學者中求茂異稱朕意焉永泰二年正月詔曰理道同歸師氏為上化人成俗必務于學俊造之士皆從此途國之貴遊罔不受業修文行忠信之教崇禮義孝友之徳盡其師道乃謂成人然後揚于王庭考以政事徴之以禮任之以官寘于周行莫匪邦彦樂得賢也其在兹乎朕志求理道尤重儒術先王設教敢不底行頃以戎狄多虞急于經畧大學空設諸生益寡弦誦之地寂寥無聲函丈之間殆將不掃上庠及此甚用憫焉今㝢縣乂寧文武兼代方投戈而講藝俾釋菜以行禮四科咸進六藝復興神人以和風化浸羙日用此道将無間然其諸道節度觀察都防禦使等朕之腹心久鎮方面眷其子弟各奉義方脩徳立身是資藝業又恐干戈之後學校尚㣲僻居逺方無所諮禀山東寡問質疑必就于馬融關西盛名尊儒乃稱于楊震負經求學當集京師并宰相朝官及神䇿六軍将子弟欲得習學者自今以後并令補國子學生欲其業重籝金器成琢玉日新厥徳代不乏賢其中身雖有官欲附學讀書者亦聼其學官委中書門下即簡擇行業堪為師範者充學生員數多少所習經業考試等并所供糧料及縁學館破壊要量事脩理各委本司條件聞奏務須詳悉稱朕意焉二月丁亥朔國子監釋奠賜宰臣以下常参官錢飱錢五百貫于國子監造食許内侍魚朝恩同聽講經辛卯命有司増修文宣王廟及國子監廨宇八月丁亥國子監釋奠始復用牲牢初上元二年九月詔諸生獻禮至是乃舉舊典遣宰臣及常参官於國子監觀禮大歴二年二月丁亥仗下後宰臣及常参官等詣國子監觀釋奠講論内侍魚朝恩参其會焉八月丁亥有司釋奠于國學宰臣及百官并内侍魚朝恩同會于國子監觀講論三年八月丁未釋奠於文宣王廟禮畢内侍魚朝恩及宰臣文武百官咸詣國子監觀講論有司陳饌詔遣中使賜酒及三勸奨四月丁未釋奠于文宣王許百寮詣國學觀講論徳宗建中三年閏正月以文宣王三十七代孫齊賢為兖州司功恭軍襲文宣公貞元二年二月丁卯有司釋奠于文宣王廟自宰臣以下畢集于國學學官升講座陳五經大㫖先聖之道憲宗元和元年正月丁卯詔國子監祭酒司業及學官并先取朝廷有徳望學識者充東都國子監諸館共置學生百員二年十二月丁巳東都國子監增置學生一百人四年二月以文宣王三十八代孫惟昉為兖州都督府恭軍十三年正月詔文宣王三十八代孫惟晊可襲文宣公穆宗長慶元年兖州觀察使曹華奏准勑赦文賜文宣王三十八代孫惟晊絹五十疋敬宗寳歴元年制曰天下諸色人等能精通一經堪為師法者委國子祭酒訪擇具名聞天下州縣各委刺史縣令招延儒學明加訓誨文宗太和六年二月己丑以寒食宴百寮于麟徳殿是日雜戯中有孔子為戯者帝曰孔子為古今之師焉得黷侮如此命驅去七年八月制曰漢代用人皆繇儒術故能風俗深厚教化興行近日苟尚浮華莫脩經術鄉舉里選不可復行然務實抑華必有良術既當甚弊思其改張今寰宇乂寧干戈已戢皇太子方從師傅受六經一二年之後當令齒胄國庠以興墜典宜令國子監于諸道捜訪名儒置五經博士各一人八年七月堂帖中書門下御史臺尚書省諸道節度觀察使置令各舉解周易一人武宗㑹昌元年以文宣王三十九代孫䇿為國子監丞襲文宣公昭宗大順元年二月詔曰有國之規無先學校理官之要莫尚儒宗故前王設塾庠陳齒胄所以敷揚至道𢎞闡大猷者也國學自朝廷䘮亂以來棟宇摧殘之後歳月斯久榛蕪可知宜令諸道觀察使刺史與賔幕州縣文吏等同於俸料内量力分抽以助脩葺哀帝天祐元年十月前絳州曲沃縣令高䖍魯納史館書籍三百六十卷授兼監察御史賜緋後唐莊宗同光二年二月制三館蘭臺藏書之府動盈萬卷詳列九流爰自亂離悉多遺逸須行捜訪以備討尋應天下有人能以經史及百家進納者所司立等第酬奨四月樞宻使郭崇韜又奏曰伏以館司四庫藏書舊日數目至多自廣明年後流散他方宜示奨酬俾申捜訪伏乞委中書門下再行勑命遍下逐道或有人家藏能以經史百家之書進獻數及四百卷以上者請委館司㸃勘無脫漏於卷軸無重疊於篇題此外寫札精詳装餙周備當據部帙聞奏請量等級除官仍仰長吏明懸牓示即鄉校庠塾之業漸闡皇風金石絲竹之音無虞墜典勅史館提舉赦書節文購求經史頗為允當宜許施行今宜添進納四百卷已下三百卷已上皆成部帙不是重疊及紙墨書寫精細已在選門未合格人一百卷與減一選無選减數者注官日優與處分無官者納書及三百卷特授試官明宗天成二年都官郎中庾傳羙訪圖書於三川孟知祥處得九朝實録及雜書傳千餘卷竝付史館同光已後館中煨燼無幾九朝實録甚濟其闕長興元年正月以文宣王四十三代孫陵廟主仁玉為曲阜縣主簿三年二月中書奏請依石經文字刻九經印板勑㫖教導之本經籍為宗兵革已來庠序多廢縱能傳授罕克精研繇是豕亥有差魯魚為弊苟一言致誤則大義全乖儻不討詳漸當紕繆宜令國學集博士儒徒将西京石經本各以所業本經句度抄冩注出子細勘讀然後召僱能雕字匠人各隨部帙刻印板廣頒天下如諸色人要寫經書竝須依所印勑本不得更使雜本交錯所貴經書廣布儒教大行五月甲申以文宣王四十三代孫曲阜縣主簿孔仁玉為兖州龔丘縣令襲封文宣公愍帝應順元年正月詔進書官劉甞鄭州滎陽令單驤唐州司法恭軍今後三館所闕書竝訪本添寫其進書官權停晉高祖天福五年四月辛酉以文宣王四十三代孫襲文宣公孔仁玉為兖州曲阜縣令周太祖廣順二年五月親徃兖州辛未遣端明殿學士顔行徃曲阜祀文宣王廟六月己酉幸曲阜謁孔子祠既畢将致敬左右曰仲尼人臣也無致敬之文太祖曰文宣百代帝王師也得無敬乎即拜奠於祠前其所奠金器銀爐十數事留於祠所以備享獻遂幸孔林拜孔子墓墳側有石壇是唐朝封禪廻謁孔子之壇二百餘年間絶東封之禮洙泗之上無復鑾和之音帝以武功之餘枉車致敬尊師重道不亦優乎世宗顯徳三年十二月詔曰史館所少書籍宜令本館諸處求訪補填如有收得書籍之家竝許進納其進書人部帙多少等第各與恩澤如是卷帙少者量給資布如館内已有之書不在進納之限册府元龜卷五十
