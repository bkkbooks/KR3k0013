body:
  text: 册府元龜卷七百二十宋王欽若等撰幕府部謀畫仲尼曰可與立未可與權盖夫揣摩成敗之理裁量用捨之要終以寡過而有成功者為難矣漢氏而下公卿牧伯多所聘署故其從事掾佐頗有卓犖竒偉之士至或叅議正典經綸戎務决機制勝料敵應變慮必周物舉無遺策斯固心術明悟出於中智之上識理深粹預乎天下之精者已乃有失於聼納終貽悔吝事機既徃追咎奚及盖俊哲之忠謀賢逹之嘉論不可以不察也漢杜欽字子夏大將軍王鳯輔政奏欽為其軍武庫令㑹西南夷夜郎王等相攻漢遣大中大夫張康解和不從命欽説鳯曰大中大夫康使和解蠻夷王侯王侯受詔已復相攻輕易漢使不憚國威其效可見恐議者選耎復守和解選耎怯不前之意也太守察動靜有變廼以聞如此則復曠一時一時三月也言空廢一時不早發兵王侯得收獵其衆申固其謀黨助衆多各不勝忿必相殄滅自知罪成狂犯守尉逺藏温暑毒草之地雖有孫吴將賁育士若入水火徃必焦没知勇亡所施屯田攻守之費不可勝量冝因其罪惡未成未疑漢家加誅隂勅旁郡守尉練士馬大司農豫調榖積要害處選任職太守徃以秋凉時入誅其王侯尤不軌者即以為不毛之地亡用之民聖主不以勞中國不毛言不生草木冝罷郡放棄其民絶其王侯勿復通如以先帝所立累世之功不可墮壊墮毁也亦冝因其萌芽早斷絶之及已成形然後戰師則萬姓被害鳯納其説後為議郎以病免徵詣大將軍幕府欽見鳯專政㤗重戒之曰昔周公身有至聖之德屬有叔父之親而成王有獨見之明無信䜛之聼然管蔡流言而周公懼穰侯昭王之舅也權重於秦威震鄰敵有旦暮偃伏之愛言昭王㓜少旦夕偃伏戲弄於舅之旁側也心不介然有間然范睢起徒步繇異國無雅信雅信謂素相任信開一朝之説而穰侯就封范睢為丞相穰侯就國及近者武安侯之見退武安侯謂田蚡也退謂請考工地益宅帝怒乃退也三事之跡相去各數百嵗若合符節甚不可不察願將軍由周公之謙懼損穰侯之威放武安之欲毋使范雎之徒得間其説頃之復日蝕京兆尹王章上封事求見果言鳯專權蔽主之過冝廢勿用以應天變於是天子感寤召見章與議欲退鳯鳯甚憂懼欽令鳯上疏謝罪乞骸骨文指甚哀太后涕泣為不食帝少而親倚鳯亦不忍廢復起鳯就位鳯心慙稱病篤欲遂退欽復説之曰將軍深悼輔政十年變異不已故乞骸骨歸咎於身刻已自責至誠動衆愚知莫不感傷雖然是無屬之臣執進退之分潔其去就之節者耳無屬無親屬於上也分等或作介介隔其義兩通非主上所以待將軍非將軍所以報主上也昔周公雖老猶在京師明不離成周示不忘王室也仲山父異姓之臣無親於宣就封于齊詩言仲山甫徂齊者言銜命徃治齊城郭也而韓詩以為封於齊故欽引之猶嘆息永懐宿夜徘徊不忍逺去况將軍之於主上主上之與將軍哉夫欲天下治安變異之意莫若將軍言衆人之意皆不如也主上昭然知之故攀援不遣援引也書稱公毋困我此周書洛誥成王告周公詞也言公必湏留此毋得遂去而令我困盖成帝與鳯詔書引此言之唯將軍不為四國流言自疑於成王以固至忠鳯復起視事上令尚書劾奏京兆尹章章死詔獄章既死衆庶寃之以譏朝廷欽欲救其過復説鳯曰京兆尹章所坐事宻吏民見章素好言事以為不坐官職疑其以日蝕見對有所言也假令章内有所犯雖䧟正法事不暴揚自京師不曉况於逺方恐天下不知章實有罪而以為坐言事也如是塞争引之原損寛明之德争引謂引事類以諌争也一曰下有諌争之言上引而納之也欽愚以為冝因章事舉直言極諌竝見郎從官展盡其意加於徃前以明示四方使天下咸知主上聖明不以言罪下也若此則流言消釋疑惑著明鳯白行其策欽之補過將美皆此類也後漢馮衍初為王莽更始將軍亷丹掾丹討伐山東與衍俱至定陶莽追詔丹曰倉廪盡矣府庫空矣可以戰矣將軍受國重任不捐身於中野無以報恩塞責丹惶恐夜召衍以書示之衍因説丹曰衍聞順而成者道之所大也逆而功者權之所貴也是故期於有功不問所由論於大體不守小節昔逄丑父伏軾而使其君取飲稱於諸侯鄭祭仲立突而出忽終得復位見美春秋盖以死易生以存易亡君子之通也詭於衆意寜國存身賢智之慮也故易曰窮則變變則通通則久是以自天祐之吉無不利若夫知其不可而必行之破軍殘衆無補於主身死之日負義於時智者不為勇者不行且衍聞之得時無怠張良以五世相韓椎秦始皇博浪之中勇冠乎賁育名高乎㤗山將軍之先為漢信臣新室之興英俊不附今海内潰亂人懐漢德甚於詩人思召公也愛其甘棠而况子孫乎人所歌舞天必從之方今為將軍計莫若屯據大郡鎭撫吏士砥厲其節百里之内牛酒日賜納雄傑之士詢忠智之謀要將士之心待從横之變興社稷之利除萬人之害則福禄流於無窮功烈著於不滅何與軍覆於中原身膏於草野功敗名䘮耻及先祖哉聖人轉禍而為福智士因敗而為功願明公深計而無與俗同丹不能從進及睢陽復説丹曰盖聞明者見於無形智者慮於未萌况其昭晳者乎凡患生於所忽禍發於細微敗不可悔時不可失公孫鞅曰有高人之行負非於世有獨見之慮見贅於人故信庸庸之論破金石之策襲當世之操失高明之德夫决者智之君也疑者事之役也時不重至公勿再計丹不聼遂進及無鹽與赤眉戰死衍乃亡命河東衛羽為兖州刺史第五種從事是時太山賊叔孫無忌等暴横一境州郡不能討羽説種曰中國安寜忘戰日久而太山險阻冦猾不制今雖有精兵難以赴敵羽請徃譬降之種敬諾羽乃徃傋説禍福無忌即帥其黨與三千餘人降韓嵩為劉表從事中郎劉先為别駕時曹操與袁紹方相持於官渡紹遣人求助於表表許之而不至亦不佐操欲保江漢間觀天下變嵩先説表曰豪傑竝争兩雄相持天下之重在於將軍將軍若欲有為起乘其弊可也若不然固將擇所從將軍擁十萬之衆安坐而觀望夫求援而不能助見賢而不肯歸此兩怨必集於將軍將軍不得中立矣夫以曹公之明哲天下賢俊皆歸之其勢必舉袁紹然後稱兵以向江漢恐將軍不能禦也故為將軍計者不若舉州以附曹公曹公必重德將軍長享福祚垂之後嗣此萬全之䇿也表大將蒯越亦勸表表狐疑乃遣嵩詣曹操以觀虛實嵩還深陳操威德説表遣子入質表疑嵩反為太祖説大怒欲殺嵩考䆒隨嵩行者知嵩無他意乃止魏荀彧為太祖奮武將軍司馬太祖領兖州牧任彧留事㑹張邈陳宮以兖州潜迎呂布彧召東郡太守夏侯惇至誅叛者乃定時豫州刺史郭貢帥衆數萬來至城下或言與呂布同謀衆甚懼貢求見彧彧將徃惇等曰何知貢不與呂布同謀而輕欲見之君一州鎭也徃必危不可彧曰貢與邈等分非素結也今來速計必未定及其未定説之縱不為用可使中立若先疑之彼將怒而成計貢見彧無懼意謂鄄城未易攻遂引兵去又與程昱計使説范東阿卒全三城以待太祖太祖自徐州還擊布濮陽布東走二年夏太祖軍乘民大饑人相食陶謙死太祖欲遂取徐州還乃定布彧曰昔高祖保闗中光武據河内皆深根固本以制天下進足以勝敵退足以堅守故雖有困敗而終濟大業將軍本以兖州首事平山東之難百姓無不歸心悦服且河濟天下之要地也今雖殘壊猶易以自保是亦將軍之闗中河内也不可以不先定今以破李封薛蘭若分兵東擊陳宫宫必不敢西顧以其間勒兵收熟麥約食畜榖一舉而布可破也破布然後南結揚州共討袁術以臨淮泗若舍布而東多留兵則不足用少留兵則民皆保城不得樵採布乘虛冦暴民心益危唯鄄城范衛可全其餘非已之有是無兖州也若徐州不定將軍當安所歸乎且陶謙雖死徐州未易亡也彼懲往年之敗將懼而結親相為表裏今東方皆以收麥必堅壁清野以待將軍攻之不㧞略之無獲不出十日則十萬之衆未戰而自困耳前討徐州威罰實行其子弟念父兄之恥必人自為守無降心就能破之尚不可有也夫事固有棄此取彼者以大易小可也以安易危可也權一時之勢不患本之不固可也今三者莫利願將軍熟慮之太祖乃止大收麥復與布戰分兵平諸縣布敗走兖州遂平建安元年太祖擊破黄巾漢獻帝自河東還雒陽太祖議奉迎都許或以山東未平韓暹楊奉新將天子到雒陽北連張楊未可卒制彧勸太祖曰昔晉文公納周襄王而諸侯景從高祖東伐為義帝縞素而天下歸心天子播越將軍首唱義兵徒以山東擾亂未能逺赴闗右然猶分遣將帥蒙險通使雖禦難於外乃心無不在王室是將軍匡天下之素志也今車駕旋軫東京榛蕪義士有存本之思百姓感舊而増哀誠因此時奉主上以從民望大順也秉至公以服雄傑大略也扶宏義以致英俊大德也天下雖有逆節必不能為累明矣韓暹楊奉其敢為害若不時定四方生心後雖慮之無及太祖遂至雒陽奉迎天子都許毛玠為太祖治中從事語太祖曰今天下分壊國主遷移生民廢業饑饉流亡公家無經嵗之儲百姓無安固之志難以持久今袁紹劉表雖士民衆强皆無經逺之慮未有樹基建本者也夫兵義者勝守位以財冝奉天子以令不臣修耕植畜軍資如此則霸王之業可成也太祖敬納其言轉幕府功曹劉曄為太祖司空主簿從征張魯既至漢中山峻難登軍食頗乏太祖曰此妖妄之國耳何能為有無吾軍少食不如速還便自引歸令曄督後諸軍使以次出曄䇿魯可克加糧道不繼雖出軍猶不能皆全馳白太祖不如致攻遂進兵多出弩以射其營魯奔走漢中遂平曄進曰明公以步卒五千將誅董卓北破袁紹南征劉表九州百郡十并其八威震天下勢慴海外今舉漢中蜀人望風破膽失守推此而前蜀可傳檄而定劉備人傑也有度而遲得蜀日淺蜀人未恃也今破漢中蜀人震恐其勢自傾以公之神明因其傾而壓之無不克也若小緩之諸葛亮明於治而為相雲長翼徳勇冠三軍而為將蜀民既定據險守要則不可犯矣今不取必為後憂太祖不從大軍遂還後蜀降人言蜀中一日數十驚雖斬之不能安也太祖延問曰今尚可擊否曄曰今已小定未可擊也賈詡參太祖司空軍事太祖破荆州欲順江東下詡諫曰明公昔破袁紹今収漢南威名逺著軍勢既大若乘舊楚之饒以饗吏士撫安百姓使安土樂業則可不勞衆而江東稽服矣太祖不從軍遂無利司馬朗為太祖丞相主簿朗以為天下分崩之勢由秦滅五等之制而郡國無蒐狩習戰之備故也今雖五等未可復行可令州郡竝置兵外備四夷内威不軌於策為長又以為宜復井田徃者以民各有累世之業難中奪之是以至今今承大亂之後民人分散土業無主皆為公田宜及此時復之議雖未施行然州郡領兵朗本意也高柔為太祖倉曹屬時太祖欲遣鍾繇等討張魯柔諫以為今猥遣大兵西有韓遂馬超謂為已而舉將相扇動作逆宜先招集三輔三輔茍平漢中可傳檄而定也繇入闗遂超等果仄曹純以議郎參太祖軍事督虎豹騎從圍南皮袁譚出戰士卒多死太祖欲緩之純曰今千里蹈敵進不能克退必䘮威且懸師深入難以持久彼勝而驕我敗而懼以懼敵驕必可克也太祖善其言遂急攻之譚敗純麾下騎斬譚首陳羣頴川人蜀先主臨豫州辟為别駕時陶謙病死徐州迎先主先主欲徃羣説先主曰袁術尚强今東必與之争呂布若襲將軍之後將軍雖得徐州事必無成先主遂東與袁戰布果襲下邳遣兵助術大破豫州軍先主恨不用羣言趙浮為韓馥冀州都督從事浮與程奐將强弩萬張屯河陽浮等聞馥欲以冀州與袁紹自孟津馳東下時紹常在朝歌清水口浮等從後來船數百艘衆萬餘人整兵皷夜過紹營紹甚惡之浮等到謂馥曰袁本初軍無斗糧各已離散雖有張楊於扶羅新附未肯為用不足敵也小從事等請自以見兵拒之旬日之間土分瓦解明將軍但當開閤高枕何憂何懼馥不從乃避位出居趙忠故舍遣子齎冀州印綬於黎陽與紹董昭字公仁為袁紹叅軍事紹逆公孫瓉於界橋鉅鹿太守李邵及郡冠盖以瓉兵强皆欲屬瓉紹聞之使昭領鉅鹿問禦以何術對曰一人之微不能消衆謀欲誘致其心唱與同義及得其情乃當權以制之耳計在臨時未可得言時郡右姓孫伉等數十人專為謀主驚動吏民昭至郡偽作紹檄告郡云得賦羅候安平張吉辭當攻鉅鹿賊故孝亷孫伉等為應檄到收行軍法惡止其身妻子弗坐昭案檄告令皆即斬之一郡惶恐乃以次安慰遂皆平集事訖白紹紹善之程昱東郡人太祖辟昱表為東平相太祖與呂布戰於濮陽數不利蝗蟲起乃各引去於是袁紹使人説太祖連和太祖亦欲遣家居鄴太祖新失兖州軍食盡將許之時程昱使適還引見因言曰竊聞將軍欲遣家與袁紹連和誠有之乎太祖曰然昱曰昔田横齊之世族兄弟三人更王據千里之齊擁百萬之衆與諸侯竝南面稱孤既而高祖得天下而横顧為降虜當此之時横豈可為心哉太祖曰然此誠丈夫之至辱也昱曰昱愚不識大㫖以為將軍之志不如田横田横齊一壯士耳猶羞為高祖臣今聞將軍欲遣家徃鄴將北面事袁紹夫以將軍之聰明神武而反不羞為袁紹之下竊為將軍恥之意者將軍殆臨事而懼不然何慮之不深也夫袁紹據燕趙之地有并天下之心而知不能濟也將軍自度能為之下乎將軍以龍虎之威可為韓彭之事邪今兖州雖殘尚有三城能戰之士不下萬人以將軍之神武與文若昱等收而用之霸王之業可成也願將軍更慮之太祖乃止郭嘉為太祖司空軍祭酒太祖將討袁紹嘉曰紹方北擊公孫瓉可因其逺征東取呂布不先取布若紹為冦布為之援此深害也太祖曰然太祖討呂布欲引軍還嘉曰昔項籍七十餘戰未嘗敗北一朝失勢而身死國亡者恃勇無謀故也今布每戰輒破氣衰力盡内外失守布之威力不及項籍而困敗過之若乗勝攻之此成禽也太祖曰善急攻之遂禽布太祖欲速征劉備議者懼軍出袁紹襲其後進不得戰而退失所據太祖疑以問嘉嘉勸太祖曰紹性遲而多疑來必不速備新起衆心未附急擊之必敗此存亡之機不可失也太祖曰善遂東征備備敗奔紹紹果不出後嘉從討袁譚袁尚於黎陽連戰數克諸將欲乘勝遂攻之嘉曰袁紹愛此二子莫適立也有郭圖逄紀為之謀臣必交鬬其間還相離也急之則相持緩之而後争心生不如南向荆州若征劉表者以待其變變成而後擊之可一舉定也太祖曰善乃南征軍至西平譚尚果争冀州譚為尚軍所敗走保平原遣辛毗乞降太祖還救之遂從定鄴又從攻譚於南皮冀州平封嘉洧陽亭侯河北既平太祖多辟召青冀幽并知名之士漸臣事之以為省事掾屬皆嘉之謀也太祖將征袁尚及三郡烏丸諸下多懼劉表使劉備襲許以討太祖嘉曰公雖威震天下胡恃其逺必不設備因其無備卒然擊之可破滅也且袁紹有㤙於民夷而尚兄弟生存今四州之民徒以威附德施未加舍而南征尚因烏丸之資招其死主之臣胡人一動民夷俱應以生蹋頓之心成覬覦之計恐青冀非已之有也表坐談客耳自知才不足以御備重任之則恐不能制輕任之則備不為用雖虛國逺征公無憂矣太祖遂行至易嘉言曰兵貴神速今千里襲人輜重多難以趨利且彼聞之必為備不如留輜重輕兵兼道以出掩其不意太祖乃宻出盧龍塞直指單于庭虜卒聞太祖至惶怖合戰大破之斬蹋頓及名王已下尚及兄熈走遼東沮授為袁紹從事太祖征紹還官渡紹進保陽武授曰北兵數衆而果勁不及南南榖虛少而貨財不及北南利在於急戰北利在於緩摶冝持久曠以日月紹不從李孚為袁尚冀州主簿後尚與其兄譚爭鬬尚出軍詣平原留别駕審配守鄴城孚隨尚行㑹太祖圍鄴尚還欲救鄴行未到尚疑鄴中守備少復欲令配知外動止與孚議所遣孚答尚言今使小人徃恐不足以知外内且恐不能自逹孚請自徃尚問孚當何所得孚曰聞鄴圍甚堅多人則覺以為直當將三騎足矣尚從其計孚自選温信者三人不語所之皆勅使具脯糧不得持兵仗各給快馬遂辭尚來南所在止亭傳及到梁淇使從者研問事杖三十枚繫著馬邉自著平上幘將三騎投暮詣鄴下是時大將軍雖有禁令而芻牧者多故孚因此夜到以一鼓中自稱都督歴北圍循表而東從東圍表又循圍而南步步呵責守圍將士隨輕重行其罰遂歴太祖營前徑南過從南圍角西折當章門復責怒守圍者收縳之因開其圍馳到城下呼城上人城上人以䋲引孚得入配等見孚悲喜鼓譟稱萬嵗守圍者以狀聞太祖笑曰此非徒得入也方且復得出孚事訖欲得還而顧外圍必急不可復冐謂已使命當速反乃隂心計請配曰今城中榖少無用老弱為也不如驅出之以省穀也配從其計乃復夜簡别數千人皆使持白幡從三門竝出降又使人持火孚乃無何將本所從作降人服隨輩夜去時守圍將士聞城中悉降火光炤曜但共觀火不復視圍孚出北門遂從西角突圍得去其明太祖聞孚已得出抵掌笑曰果如吾言也孚北見尚尚甚歡喜㑹尚不能救鄴破走至中山而袁譚又追撃尚尚走孚與尚相失遂詣譚復為譚主簿郭淮為征西將軍夏侯淵司馬淵與蜀戰淮時有疾不出淵遇害軍中擾擾淮收散卒推盪冦將軍張郃為軍主諸營乃定其明日蜀先主欲渡漢水來攻諸將議衆寡不敵備便乗勝欲依水為陣以拒之淮曰此示弱而不足挫敵非算也不如逺水為陣引而致之半濟而復擊備可破也既陣蜀先主疑不渡淮遂堅守示無還心以狀聞太祖善之假郃節復以淮為司馬趙儼為扶風太守時蜀將闗雲長圍征南將軍曹仁於樊儼以議郎叅仁軍事南行與平冦將軍徐晃俱前既到關圍仁遂堅餘救兵未到晃所督不足解圍而諸將呵責晃促救儼謂諸將曰今敵圍素固水潦猶盛我徒卒單少而仁隔絶不得同力此舉適所以弊内外耳當今不若前軍偪圍遣諜通仁使知外救以勵將士計北軍不過十日尚足堅守然後表裏俱發破敵必矣如有緩救之戮余為諸軍當之諸將皆喜便作地道箭飛書與仁消息數通北軍亦至并勢大戰蜀軍既退舟船猶據沔水襄陽隔絶不通而孫權襲取關輜重關聞之即走南還仁㑹諸將議咸曰今因關危懼必可追禽也儼曰權邀關連兵之難欲掩制其後顧關還救恐我承其兩疲故順辭求救乗釁因變以觀利鈍耳今關已孤迸更冝存之以為權害若深入追北權則改慮於彼將生患於我矣王必以此為深慮仁乃解嚴太祖聞關走恐諸將追之果疾勅仁如儼所䇿蔣濟字子通楚國平阿人為州别駕建安中吴大帝率衆圍合肥時大軍征荆州遇疾疫唯遣將軍張喜單將千騎過領汝南兵以觧圍頗復疾疫濟乃宻白刺史為偽得喜書云步騎四萬已到雩婁遣主簿迎喜三部使齎書語城中守將一部得入城二部為賊所得大帝信之遽燒圍走城用得全後為太祖丞相主簿時闗侯圍樊襄陽太祖以漢帝在許近賊欲徙都司馬宣王及濟説太祖曰于禁等為水所没非戰攻之失於國家大計未足有損劉備孫權外親内疎闗若得志權必不願也可遣人勸躡其後許割江南以封權則樊圍自解太祖如其言權聞之即引兵西襲公安江陵關遂見擒常林為文帝五官功曹時太祖西征田銀蘇伯反幽冀扇動文帝欲親討之林曰昔忝博陵又在幽州賊之形勢可度料也北方吏民樂安厭亂服化已久守善者多銀伯犬羊相聚智小謀大不能為害方今大軍在逺外彊敵將軍為天下之鎮也輕動逺舉雖克不武文帝從之遣將往伐應時克滅蜀殷觀為先主荆州主簿吴大帝遣使云欲共取蜀或以為宜報聼許吴終不能越荆有蜀蜀地可為已有觀進曰若為吴先驅進未能克蜀退為吴所乘即事去矣今但可然賛其伐蜀而自説新據諸郡未可以動吴必不敢越我而獨取蜀如此進退之計可以収吴蜀之利先主從之吴果輟計遷觀為别駕從事龎統為先主軍師中郎將説先主曰荆州荒殘人物殫盡東有吴孫北有曹氏鼎足之計難以得志今益州國富民彊戸口百萬四部兵馬所出必俱寳貨無求於外今可權借以定大事備曰今指與吾為水火者曹操也操以急吾以寛操以暴吾以仁操以譎吾以忠毎與操反事乃可成耳今以小故而失信義於天下者吾所不取也統曰權變之時固非一道所能定也兼弱攻昧五伯之事逆取順守報之以義事定之後封以大國何負於信今日不取終為人利耳備遂行統隨從入蜀益州牧劉璋與先主㑹涪統進策曰今因此㑹便可執之則將軍無用兵之勞而坐定一州也先主曰初入他國恩信未著此不可也璋既還成都先主嘗為璋北征漢中統復説曰陰選精兵晝夜兼道徑襲成都璋既不武又素無預備大軍卒至一舉便定此上計也楊懷髙沛璋之名將各杖彊兵據守闗頭聞數有牋諫璋使發遣將軍還荆州將軍未至遣與相聞説荆州有急欲還救之竝使裝束外作歸形此二子既服將軍英名又喜將軍之去計必乘輕騎來見將軍因此執之進取其兵乃向成都此中計也退還白帝連引荆州徐還圖之此下計也若沉吟不去將致大困不可久矣先主然其中計即斬懷沛還向成都所過輙克楊洪字季休為益州治中從事時先主征吴不克還住永安漢嘉太守黄元素為丞相諸葛亮所不善聞先主疾病懼有後患舉郡反燒臨卭城時亮東行省疾成都單虛是以元益無所憚洪即啓太子遣其親兵使將軍陳曶鄭綽討元衆議以為元若不能困成都當繇越嶲據南中洪曰元素性凶暴無他恩信何能辦此不過乗水東下兾主上平安面縳歸死如其有異奔吴求活耳勅􅝉綽但於南安峽口遮即便得矣曶綽承洪言果生獲元馬謖為諸葛亮丞相叅軍建興三年亮征南中謖送之數十里亮曰雖共謀之歴年今可更惠良規謖對曰南中恃其險逺不服久矣雖今日破之明日復反耳今公方傾國北伐以事强賊彼知官勢内虛其叛亦速若殄盡遺類以除後患既非仁者之情又且不可倉卒也夫用兵之道攻心為上攻城為下心戰為上兵戰為下願公服其心而已亮納其策赦孟獲以服南方故終亮之世南方不敢反吴張紘初為大帝長史從征合肥城久不㧞紘進計曰古之圍城開一面以疑衆心今圍之甚宻攻之又急誠懼并命戮力死戰之㓂固難卒㧞及救未至可小寛之以觀其變議者不同㑹救騎至數至圍下馳騁挑戰晉何惲為揚州别駕刺史周浚隨王渾伐吴與中軍大戰俘馘萬計進軍屯于横江時聞龍驤將軍王濬既破上方惲説浚曰張悌率精鋭之卒悉吴國之衆殄滅於此吴之朝野莫不震懾今王龍驤既破武昌兵威甚盛順流而下所向輒尅土分之勢見矣竊謂冝速渡江直指建業大軍卒至奪其膽氣可不戰而擒浚善其謀便使白渾惲曰渾闇於事機而欲愼已免咎必不我從浚固使白之渾果曰受詔但令江北抗衡吴軍不使輕動貴州雖武豈能獨平江東今者違命勝不足多若其不勝為罪已重且詔令龍驤受我節度但當具君舟檝一時俱濟耳惲曰龍驤尅萬里之冦以既濟之功來受節度未之聞也且握兵之要可則奪之所謂受命不受辭也今渡江必全尅獲將有何慮若疑於不濟不可謂智知而不行不可謂忠實鄙州上下所以恨恨也渾執不聼居無何而濬至渾召之不來乃直指三山孫皓遂降於濬渾深恨之任明為益州刺史羅尚從事時流人李特冦成都尚據大城自守李流進屯江西尚懼遣使求和是時蜀人懼竝結村堡請命于特特遣人安撫之明説尚曰特既凶逆侵暴百姓又分人散衆在諸村堡驕怠無備是天亡之也可告諸村宻尅期日内外擊之破之必矣尚從之明先偽降特特問城中虛實明曰米榖已欲盡但有貨帛耳因求省家特許之明潜説諸村悉聼命還報尚尚許如期出軍諸村亦許一時赴㑹二年惠帝遣州刺史宋岱建平太守孫阜救尚阜已次德陽特遣蕩督李璜助任臧阜尚遣大衆奄襲特營連戰三日衆少不敵特軍大敗收合餘卒引趣新繁尚軍引還特復追之轉戰三十餘里尚出大軍逆戰特軍敗績斬特及李輔李逺皆焚尸傳首雒陽陳珍為凉州牧張荗叅軍劉曜遣將攻韓璞於冀城荗出次石頭謂珍曰劉曜以乗勝之聲握三秦之鋭繕兵積年士卒習戰若以精騎奄尅南安席卷河外長驅而至者計將何出珍曰曜雖乗威怙衆恩德未結於下又其闗東離貳内患未除精卒寡少多是氐羗烏合之衆終不能近舍闗東之難増隴上之戍曠日持久與我争衡也若一旬不退者珍請為明公率弊卒數千以擒之荗大悦以珍為平虜䕶軍率卒騎一千八百救韓璞曜隂欲引歸聲言要先取隴西然後廻滅桑壁珎暮發氐羗之衆擊矅走之克復南安茂深嘉之拜折衝將軍趙誘字元孫州辟主簿値刺史郗隆被齊王冏檄使起兵討趙王倫隆欲承檄舉義而諸子姪竝在雒陽欲坐觀成敗恐為冏所討進退有疑㑹羣吏計議誘説隆曰趙王簒逆海内所病今義兵飈起其敗必矣今為明使君計莫若自將精兵徑赴許昌上䇿也不然且可留後遣猛將將兵㑹盟亦中策也若遣小軍隨形助勝下䇿也隆不從遂被攻死盧志字子道自尚書郎出為鄴令成都王頴之鎭鄴也愛其才量委以心膂遂為謀王齊王問起義遣使告頴頴召志計事志曰趙王無道肆行簒逆四海人神莫不憤怒今殿下㧾率三軍應期電發子來之衆不召自至掃夷凶逆必有征無戰然兵事至重聖人所愼冝旌賢任才以收時望頴深然之改選上佐高辟掾屬以志為諮議叅軍仍補左長史専掌文翰頴前鋒都督趙驤為倫所敗士衆震駭議者多欲還保朝歌志曰今我軍失利敵新得勝必有輕易凌轢之情若頓兵不進三軍畏衂懼不可用且戰何能無勝負冝更選精兵星行倍道出賊不意此用兵之竒也頴從之及倫敗志勸頴曰齊王號衆百萬與張泓等相持不能决大王逕得濟河北之大勲莫之與比而齊王當今與大王共輔朝政志聞兩雄不俱處功名不竝立今冝因太妃微疾求還定省推崇齊王徐結四海之心此計之上也頴納之遂以母疾還藩委重於冏由是頴獲四海之譽天下歸心朝廷封志為武彊侯加散騎常侍淳于定為南陽王模謀臣模為征西大將軍鎭闗中東海王越表徴模為司空遣中書監傅抵代之定説模曰闗中天府之國霸王之地今以不能綏撫而還既於聲望有虧义公兄弟唱起大事而竝在朝廷若自彊則有専權之罪弱則受制於人非公之利也模納其言不就徴潘滔為東海王越司馬時茍晞為撫軍將軍都督青兖有威名滔説越曰兖州要衝魏武以之輔相漢室茍晞有大志非純臣久令處之則患生心腹矣若遷于青州厚其名號晞必悦公自牧兖州經緯諸夏藩衛本朝此所謂謀之于未有為之於未亂也越以為然乃遷晞征東大將軍開府儀同三司加侍中假節都督青州諸軍事領青州刺史孔坦為尚書左丞相時蘇峻挾天子幸石頭坦奔陶侃侃引為長史時侃等夜築白石壘至曉而成聞峻軍嚴聲咸懼來攻坦曰不然若峻攻壘必須東北風急令我水軍不得往救今天氣清净賊必不動决遣軍出江乗掠京口以東矣果如所籌時郗鍳鎭京口侃等各以兵㑹既至坦議以為本不應湏召郗公遂使東門無限今宜遣還雖晩猶勝不也侃等猶疑坦固爭甚切始令鍳還據京口遣郭黙屯大業又令驍將李閎曹統周光與黙并力賊遂勢分率如坦計高崧為簡文帝撫軍司馬時桓温擅威率衆北伐軍次武昌簡文患之崧曰冝致書諭以禍福自當反斾如其不爾便六軍整駕逆順於兹判矣若有異計請先釁鼓便於坐為簡文書草曰冦難冝平時㑹冝接此實為國逺圖經略大算能宏斯㑹非足下而誰但以此興師動衆要當以資實為本運轉之艱古人之所難不可易之於始而不熟慮須所以深用為疑在乎此耳然異常之舉衆之所駭遊聲噂􅊱想足下亦少聞之茍患失之無所不至或能望風振擾一時分散如其不然者則望實竝䘮社稷之事去矣皆吾闇弱德信不著不能鎭静羣庶保固維城所以内愧于心外慙良友吾與足下雖職有内外安社稷保國家其致一也天下安危繫之明徳先存寜國而後圖其外使王基克隆大義𢎞著所望於足下區區誠懐豈可復顧嫌而不盡哉温得書還鎭郄超為桓温叅軍太和中温將伐慕容氏於臨潼超諌以道逺汴水又淺運道不通温不從遂引軍自濟入河超又進䇿於温曰清水入河無通運理若冦不戰運道又難因資無所實為深慮也今盛夏悉力徑造鄴城彼伏公威畧必望陣而走退還幽朔矣若能决戰呼吸可定設欲城鄴難為功力百姓布野盡為官有易水以南必交臂請命但恐此計輕次公必務其持重耳若此計不從便當頓兵河濟控引粮運令資儲充備足及來夏雖如賖遲終亦濟尅若舍此二䇿而連軍西進進不逺决退必愆乏賊因此勢日月相引僶俛秋冬船道澁滯且北地早寒三軍裘褐者少恐不可以涉來此大限閡非惟無食而已温不從果有枋頭之敗温深慙之鄧潜之為何無忌大將軍府長史無忌將率衆以距盧循潜之諌曰今以神武之師抗彼逆衆廻山壓卵未足為譬然國家之計在此一舉聞其舟艦大盛勢居上流蜂蠆之毒邾魯成鍳冝决破南塘守二城以待之其必不敢捨我逺下蓄力候其疲老然後擊之若棄萬全之長䇿而决成敗於一戰如其失利悔無及矣無忌不從果敗宋劉敬宣晉末為㑹稽王世子元顯征虜叅軍事隆安二年王恭起兵於京口以誅司馬尚之兄弟為名敬宣父牢之時為恭前軍司馬輔國將軍晉陵太守置佐領兵而恭以豪戚自居甚相陵忽牢之心不能平及恭此舉使牢之為前鋒太𫝊㑹稽王道子與牢之書備言禍福使以兵反恭牢之呼敬宣謂曰王恭昔蒙先帝殊恩今居伯舅之重義心未彰唯兵是縱吾不能審恭事㨗之日必能奉戴天子緝穆宰相與不今欲奉國威靈以明逆順汝以為何如敬宣曰朝廷雖無成康之隆未有桓靈之亂而恭怙亂阻兵志陵京邑大人與恭親無骨肉分非君臣雖共事少時意好不恊今日討之於情何有牢之至竹里斬恭大將顔延遣敬宣率高雅之等還京襲恭恭方出城耀軍馳騎横擊之一時散潰元顯進號後將軍以敬宣為諮議叅軍加寜朔將軍胡藩為高祖鎭軍叅軍事從征鮮卑賊屯聚臨朐藩言於高祖曰賊屯軍城外守者必寡今徃取其城而斬其旗幟此韓信所以克趙也高祖乃遣檀韶與藩等潜徃既至即克其城賊見城䧟一時奔走還保廣固王誕為高祖太尉長史盧循自察洲南走毅固求追討高祖持疑未决誕宻白曰公既平廣固復滅盧循則功盖終古勲無與二如此大威豈可餘人分之毅與公同起布衣一時相推耳今既已䘮敗不冝復使立功高祖從其説顔竣為孝武安北鎭軍北中郎府主簿魏軍自彭城北歸復求互市竣議曰愚以為與虜和親無益已然之明效何以言其然夷狄之欲侵暴正苦力之不足耳未嘗拘制信義用輟其謀昔年江上之役乃是和親之所招歴稔交聘遂求國婚朝廷覊縻之義依違不絶既積嵗月漸不可誣獸心無厭重以忿怒故至於深入今幸因兵交之後華戎隔判若言互市則復開曩弊之萌議者不過言互市之利在得馬今棄此所重得彼下駟四千匹尚不足言况所得之數裁不十百耶一相交闗卒難閉絶㓂負力玩陵驕黠已甚雖云互市實覘國情多贍其求則桀敖罔已通而為節則必生邉虞不如塞其端漸杜其觖望内修德化外經邉事保境以觀其釁於事為長沈慶之年三十未知名往襄陽省兄倫之見而賞之倫之子伯符時為竟陵太守倫之命伯符㧞為寜逺中兵叅軍竟陵蠻屢為冦慶之為設規略毎擊破之伯符由此致將帥之稱冊府元龜卷七百二十
