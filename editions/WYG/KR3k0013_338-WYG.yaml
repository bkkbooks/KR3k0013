body:
  text: 冊府元龜卷三百三十八宋王欽若等撰宰輔部奢侈貪黷專恣奢侈奢則不遜著乎格言滿乃招損垂於前誥故君子所以去其泰甚守其節儉而保終吉者焉乃有雍容廊廟之上表式搢紳之列忘約己之道昧素履之㫖因時滿志席寵自恣繇是殖其貨利安其逸豫極耳目之玩窮嗜好之味盱衡長敖始終無悔以是遺世譏而冒邦憲者徃徃而有次之編簡足以為戒漢田蚡為丞相治宅甲諸第言為諸第之最也以甲乙次之言甲則為上矣田園極膏腴膏腴謂肥厚之處市買郡縣噐物相屬於道屬逺及也音之欲反前堂羅鐘鼓立曲旃旃旗之名也通帛曰旃曲旃僣也後房婦女以百數諸奏珍物狗馬玩好不可勝數奏晉也張禹為丞相禹家以田為業及富貴多買田至四百頃皆涇渭溉灌極膏腴上賈賈讀曰價它財物稱是禹性習知音聲内奢淫身居大第後堂理絲竹筦絃弟子沛郡戴崇每候禹常責師宜置酒設樂與弟子相娱禹將崇入後堂飲食婦女相對優人筦絃鏗鏘極樂昏夜乃罷魏曹爽為大將軍録尚書事爽飲食車服擬於乗輿尚方珍玩充牣其家妻妾盈後庭又私取先帝才人七八人及將吏師工鼓吹良家子女三十三人皆以為妓樂作窟室綺疏四周數與何晏等㑹其中縱酒作樂吴歩隲為丞相門内妻妾服飾奢綺頗以此見譏晉何曾為太宰性奢豪務在華侈帷帳車服窮極綺麗厨膳滋味過於王者每燕見不食大官所設帝輒命取其食蒸餅上不折十字不食日食萬錢猶曰無下箸處人以小紙為書者勅記室勿報劉毅等數劾奏曾汰侈無度帝以其重臣一無所問何邵曾之子也為司徒驕奢簡貴亦有父風衣裘服玩新故巨積食必盡四方珍異一日之供以錢二萬為限時論以為大官御膳無以加之謝安為太傅性好音樂及為相於土山營墅樓館林竹甚盛每擕中外子姪徃來游集肴饌亦屢費百金世頗以此譏焉而安殊不以屑意宋劉穆之晉末為尚書左僕射摠朝政性豪奢食必方丈又且輒為十人饌穆之既好賔客未嘗獨餐每至食時客止十人以還者帳下依常下食以此為常後魏廣陽王嘉為衛大將軍尚書令除儀同三司性好儀飾車服鮮華既居儀同又住端首出入容衛道路榮之隋楊素為左僕射家僮千數後庭妓妾曵綺羅者以千數第宅華侈制擬宫禁唐李林甫為右僕射京城邸第田園水磑利盡上腴城東有薛王别墅林亭幽􅃉甲於都邑𤣥宗特以賜之及女樂二部天下珍玩前後賜與不可勝紀楊國忠為右相於宣陽里連構甲第土木被綈繡棟宇之盛兩都莫比裴冕為左僕射兼掌兵權留守之任俸錢每月二千餘貫性本侈靡好尚車服乃營珍饌名馬在櫪價盈數百金者常十數每㑹賔友滋味品類坐客有昧於名者元載為中書侍郎平章事城中開南北二甲第室宇宏麗冠絶當時又於近郊起亭榭所至之處帷帳什噐皆如宿設儲不改供城南膏腴别墅連疆接畛凡數十所婢僕曵綺羅亦百餘人恣為不法侈僭無度李吉甫為中書侍郎平章事服物食味必極珍美叚文昌為中書侍郎平章事出入將相幾二十年其服飾玩好歌僮妓女茍恱於心無所愛惜遂至奢侈過度物議貶之漢蘓逢吉為司空平章事性多侈靡好鮮衣美食中書公膳鄙而不食私庖供饌務盡甘珍常於私第大張酒樂以召權貴所費千餘緡周和凝初仕晉為右僕射平章事性好修整自釋褐至登輔相車馬僕從必加華楚貪黷夫謀謨廟堂鎮撫夷狄茍非命清慎之士秉公正之心則何以表率百僚儀刑四海若乃任或匪人惟恣貪黷隂施威恵内殖貨財遣僮僕以經營狎姦纎而聚斂獄以貨免官以賄成逞志多岐罔知紀極至有自治塋塜敢望於園寢家厭珠金靡恤於宗黨豈惟悖亂於彞倫信亦顚覆於國家者也漢李蔡為丞相坐詔賜冢地陽陵當得二十畝蔡盜取二頃頗賣得四十餘萬又盜取神道外壖地一畝𦵏其中壖音人椽切當下獄自殺張禹為丞相卦安昌侯禹為人謹厚内殖貨財家以田為業及富貴多買田至四百頃皆涇渭溉灌極膏腴上賈賈讀曰價它財物稱是禹性習知音聲内奢淫身居大第後堂理絲竹管絃禹年老自治冢塋起祠室好平陵肥牛亭部處地肥牛亭名欲得置亭處之地為冢塋又近延陵奏請求之成帝以賜禹詔令平陵徙亭它所曲陽侯根根王根也聞而爭之此地當平陵寢廟衣冠所出游道禹為師傅不遵謙讓至求衣冠所繇之道又徙壊舊亭重非所宜重直用反孔子稱賜愛其羊我愛其禮論語云子貢欲去告朔之餼羊孔子曰爾愛其羊我愛其禮故引之也宜更賜禹他地根雖為舅帝敬重之不如禹根言雖切猶不見從卒以肥牛亭地賜禹匡衡為丞相有司奏衡專地盜土衡竟坐免初衡封僮之樂安鄉屬臨淮郡鄉本田提卦三千一百頃提封舉其封界内之摠數南以閩佰為界佰者田之東西界也閩者佰之名也佰莫客反初元元年郡圖誤以閩佰為平陵佰積十餘歳衡封平陵佰在閩佰南誤十餘歳衡乃始封此鄉臨淮郡遂封真平陵佰以為界多四百頃至建始元年郡乃定國界上計簿更定圖言丞相府衡謂所親吏趙殷曰所親素所親任者主簿陸賜故居奏曹習事曉知國界署集曹掾明年治計時衡問殷國界事曹欲奈何殷曰賜以為舉計令郡實之舉發上訃之簿令郡改從平陵佰以為定實恐郡不肯從實可令家丞上書衡曰顧當得不耳何至上書顧念也亦不告曹使舉也聽曹為之後賜與屬明舉計曰案故圖樂安鄉南以平陵佰為界不足故而以閩佰為界觧何不足故者不依故圖而滿足也觧何者以分觧此時意猶今言分䟽也郡即復以四百頃付樂安國衡遣從史之僮收取所還田租糓千餘石入衡家司𨽻校尉駿少府忠行廷尉事劾奏衡監臨盜所主守直十金以上十金以上當時律定罪之次若今律條言一尺以上一匹以上春秋之義諸侯不專地所以壹統尊法制也衡位三公輔國政領計簿知郡實正國界計簿已定而背法制專地盜土以自益及賜明阿承衡意猥舉郡計亂減縣界猥曲也附下罔上擅以地附益大臣皆不道於是帝可其奏勿治丞相免為庶人終於家晉王戎為司徒性好興利廣收八方田園水碓周徧天下聚積錢不知紀極每自執牙籌晝夜算計常若不足而又儉嗇不自奉養天下人謂之膏盲之疾後魏咸陽王禧加侍中正太尉雖為宰輔之首而從容推委無所是非潛受賄賂隂為威惠以致奴婢千數田業鹽鐵遍於逺近官吏僮𨽻相繼經營宣武頗惡之北海王詳為録尚書時高雙坐貪濁免官雙多納金寳除司空長史未幾遷太尉長史元义為侍中輔政時崔暹為都督討武川鎮為賊所敗禁於廷尉以女妓園田貨义獲免北齊孫騰為太保尚書令求納財賄不知紀極生官死贈非貨不行餚藏銀噐盜為家物親狎小人專為聚斂司馬子如為左僕射知朝政簿領之務與奪任情公然受納無所顧憚後為尚書令義旗之始身不參預直以神武故舊遂當委重意氣高矜聚斂不息時文襄入輔朝政内稍嫌之尋以贓賄為憲司所劾詔削官爵高隆之為太保時文襄作宰風俗肅清隆之時有受納文襄於尚書省大加責辱隋楊素為尚書令貪冒財貨營求産業東西兩京居宅侈麗朝毁夕復營繕無已爰及諸方都㑹處邸店水磑并私田宅以千百數時議以此鄙之虞世基煬帝時専典朝政其繼室孫氏性驕淫世基惑之恣其奢靡雕飾噐服無復素士之風孫復擕前夫子夏侯儼入世基舎而頑鄙無頼為其聚斂鬻官賣獄賄賂公行其門如市金寳盈積其弟世南素為國士而清貧不立未曽有所贍由是為論者所譏朝野咸共疾怨唐許敬宗為右相高宗龍朔三年冊拜太子太傅同東西臺三品監修國史敬宗嫁女與左監門大將軍錢九隴本皇家𨽻人敬宗貪財與婚又為子娶尉遲寶琳孫女為妻多得賂遺白州人龎孝恭蠻酋凡品率兵從征高麗賊知其懦襲破之敬宗又納其寶貨稱孝恭頻破賊徒斬獲數萬李義府為中書令貪冒無厭賣官鬻獄廣樹朋黨有占候人言義府宅有獄氣積錢二千萬可壓勝由是聚歛更急又遣其子津召長孫無忌之孫延謂曰相為得一官數日詔書當出五日果拜司監津乃取延錢七百貫李􅒯秀為夏官侍郎同鳯閣鸞臺三品長安四年坐贓貶授廬州刺史紀處訥為侍中與兵部尚書宗楚客及楚客弟將作大匠晉卿咸專權共為朋黨􅂍奸狠籍先是娑葛與阿史那忠節屢侵暴邊境郭元振請徙忠節于内地楚客取忠節金二千兩處訥取七百兩竟不納其奏請以兵討娑葛娑葛知而大怒遂舉兵入寇甚為邊患崔湜為中書侍郎平章事鄭愔為吏部侍郎平章事景龍三年俱坐贓湜貶襄州刺史愔貶江州司馬蕭志忠為中書令與太平公主謀逆伏誅籍没其家未名之寶不可勝紀楊國忠為相有康謙者本商胡𤣥宗天寶中為安南都䕶賂遺國忠官至將軍李林甫為中書令集賢殿大學士乆典樞衡天下威權並歸於己京城邸第田園水磑利盡上腴宰相用事之盛開元以來未有其比裴冕代宗大歴中為宰相兼掌兵權留守之任俸錢每月二千餘貫小吏以俸錢文簿白之冕顧子弟喜見於色其嗜財若此元載大厯中為相以誅魚朝恩計就特蒙任遇接視百寮頗有徳色遂肆志貪饕徐浩任廣州以賂聞竭南方珍産納于載楊綰為吏部亷簡自處不附於載乃奏浩代綰至徳乾元中天下多戰伐功啟奏填委故官賞紊雜及永泰後四方既定而載秉政公道隘塞官由賄成中書主書卓倩李榮軰用事勢傾朝列天下官爵大者出載小者自倩榮四方齎金帛求官者道路相屬各稱而去王縉為相溺於釋教捨道政坊宅為嬖妾李氏奏造寶應寺每節度觀察使朝覲皆延至佛寺諷令出財助己修繕四方賂遺畢集縉又縱弟妹女尼等廣納財賂貪猥之跡如市賈焉廣徳中蕭復為太子僕屬連歳不稔穀價翔貴復家累百口無以自絡將鬻昭應别業時縉聞其林泉之美心欲之乃使弟紞誘焉紞謂復曰足下之才固宜居右職姑以别業奉吾兄當以要地處足下矣復對曰僕之鬻舊業以拯孀孤儻以美職售之姑姊弟姪受凍餒非鄙夫之願也縉既憾之乃罷復官廢居者數年復處之自若楊炎為門下侍郎平章事大厯中路嗣恭討舒晃于廣州商舶之徒多因晃事誅之没其財寶數百萬盡入私室不將貢獻代宗心甚銜之故嗣恭雖有平方面功止轉檢校尚書東都留守楊炎受其貨始敘前功竇參徳宗貞元中為相淄青節度使李納既憚參饋遺畢至外示敬參實隂間之帝所親信屢排毁參竇申又與吴通𤣥過犯事覺然參任情好惡恃權貪利不知紀極亦以此敗杜黄裳憲宗元和初為相有經畫之才逹於權變然性頗貪黷簡身律物寡廉潔之譽是以居鼎職不乆又除授不分流品或官以賂遷殆後貨賂事發八年二月御史臺奏永樂令呉憑為僧鑑虛受託與故邠寧節度使高崇文處納賂錢四萬五千貫竝附杜黄裳男載鞫訊引伏勅曰呉憑曾佐使府忝履宦途自宜畏法慎身豈得為人掌貨事闗非道理合懲愆宜配流昭州其付杜載錢物宰輔之任寵寄實深致滋賂財不能拒絶已令勘問悉合懲收貴全終始之恩俾引寛大之典其所取錢物特宜矜免杜載等竝釋放黄裳為近代名相然其家擁富貲於廉隅無所顧君子惜之李逢吉為右僕射門下侍郎平章事時澤潞節度使劉悟卒遺表請以其子從諫繼纘戎事敬宗下大臣議僕射李絳以澤潞内地與三鎮事理不同不可許逢吉與中尉王守澄受其賂曲為奏請從諫自將作監主簿起復雲麾將軍守金吾衛大將軍同正檢校左散騎常侍兼御史大夫充昭義節度使副大使觀察等留後王涯為相以甘露事與李訓等同誅凡十一家資貨悉為軍人百姓所刼唯涯家資財人人得以隨意取之竟日不竭涯好畜圖籍數侔書府前代法書名畵他家所寶金帛不能置者必先以好爵美職釣致焉復厚為垣竅而藏之重復秘固若不可窺及是為坊市少年斤斸毁裂取函奩金寶之飾與其軸玉而已後唐韋說為禮部侍郎平章事貨賄公行時有王修者能以多岐取事納賂於說說以其名犯祖諱遂改之為操擬宰近甸同光四年二月荆南節度使高季興奏請峽内蘷忠萬等州割歸當道依舊管係又請雲安監初荆南以本朝時管荆澧朗硤歸蘷忠萬涪等州乾寧中雷滿㨿澧朗自稱節度雷滿敗地入馬殷天祐初成汭失荆襄王建乗虚收歸蘷峽等州朱梁以高季興鎮荆州與王建爭蘷峽竟不能復王建於蘷州置鎮江軍節度以蘷忠萬為屬郡又割黔南之施州𨽻之雲安縣舊置雲安監𣙜鹽之利為安邑解縣胡雒鹽池之最王建既得之兩川大獲其利乃昇雲安縣為安州以刺史領監務初帝舉軍平蜀詔高季興率本軍沂峽自收元管屬郡荆南軍未進偽蜀蘷萬連年率以州降繼岌三川既平季興數遣使請峽内五州依舊為屬又請雲安監務朝廷未之許季興數賂劉皇后與說及宰臣豆盧革時樞密使張居翰年暮性昏不酌可否私相欵昵曲為奏之内外附叶因俞其請漢蘓逢吉為司空平章事與蘓禹珪俱在中書逄吉尤貪財貨無所顧避求仕人稍有物力者即遣人微露風㫖許以美秩故鳯翔秦王從儼子永吉初至闕下逢吉謂其侯王之裔必有重貨乃遣人求先人玊帶且以一郡許之永吉辭以素無此物縱有者不堪奉獻逢吉下令市一玉帶價數千緡使永吉償其直又前客省使王筠受晉命使於湖湘漢初復命逢吉重邀其賂許酬名郡筠不得已分橐裝以奉然俱不能踐其言其貪詐如此周盧文紀司空致仕平生積財巨萬其卒為其子龜齡所費不數年間以至蕩盡由是多藏者以為戒焉專恣書云惟辟作福惟辟作威故臣之有作福作威必害於而家凶於而國又曰無依勢作威無依法以削况乃處衡軸之寄當登翼之任故宜内則衷告外則順行使賞罰之柄發於上循謹之行率於下此乃為臣之大節矣至有據廊廟之重擅高明之勢威赫天下權傾一時改易制度剪削宗室盜取兵噐詐為詔書或違衆以出師或逞欲而凌上思引用之自己致遷序之失倫則削讓之所加誅戮之繼至固其宜矣漢晁錯景帝時為御史大夫請諸侯之罪過削其支郡支郡在國之西邊奏上帝令公卿列侯宗室雜議莫敢難獨竇嬰爭之繇此與錯有隙繇讀與由同錯所更令三十章更改也諸侯讙譁張湯武帝時為御史大夫每朝奏事語國家用至日旰旰晚也論事既多至於日晩旰音幹天子忘食丞相取充位但充其位而已無所造設也天下事皆決湯百姓不安其生騷動縣官所興未獲其利姦吏竝侵漁竝且也於是痛繩以法自公卿以下至於庶人咸指湯後漢董卓為相國使司𨽻校尉劉囂籍吏民有為子不孝為臣不忠為吏不清為弟不順有應此者皆身誅財物没官於是愛憎互起民多寃死魏曹爽為大將軍録尚書事私取先帝才人七八人及將吏師工鼔吹良家子女三十三人皆以為妓樂詐作詔書發才人五十七人送鄴臺使先帝倢妤教習為技擅取太常樂噐武庫禁兵作窟室綺疏四周數與何晏等㑹其中縱酒作樂齊王正始八年司馬宣王為太傅大將軍爽用何晏鄧颺丁謐之謀遷太后於永寧宫專擅朝政兄弟竝典禁兵多樹親黨屢改制度宣王不能禁於是與爽有隙稱疾不與政事呉諸葛恪為太傅廢帝建興二年春欲出軍諸大臣以為數出罷勞同辭諫恪恪不聽中散大夫蔣延或以固爭扶出恪乃著論諭衆衆議莫敢復難於是違衆出軍二十萬衆圍魏新城連月不拔病者大半死傷塗地恪晏然自若詔去相銜徐乃旋師軍還陳兵導從歸入府舘即召中書令孫嘿厲聲謂曰卿等何敢妄數作詔嘿惶懼辭出因病還家恪征行之後曹所奏署令長職司一罷更選愈治威嚴多所罪責當進見者無不竦息又改易宿衛用其親近晉楊駿恵帝時為太傅大都督假黄鉞録朝政百官總已慮左右間已乃以其甥叚廣張邵為近侍之職凡有詔命帝省訖入呈太后然後乃出駿知賈后情性難制甚畏憚之又多樹親黨皆領禁軍於是公室怨望天下憤然矣庾亮為中書令成帝初太后臨朝政事一決於亮先是王導輔政以寛和得衆亮任法裁物頗以此失人心又先帝遺詔褒進大臣而陶侃祖約不在其列侃約疑亮刪除遺詔竝流怨言亮懼亂於是出温嶠為江州以廣聲援修石頭以備之㑹南頓王宗復謀廢執政亮殺宗而廢宗兄羕宗帝室近屬羕國族元老又先帝保傅天下咸以亮翦削宗室琅琊人卞咸宗之黨也與宗俱誅咸兄闡亡奔蘓峻亮符峻送闡而峻保匿之峻又多納亡命專用威刑亮知峻必為禍亂徴為大司農舉朝謂之不可平南將軍温嶠亦累書上之皆不納峻遂與祖約俱舉兵反梁徐勉為僕射權重自遇吏部郎江蒨與抗禮勉因蒨門客翟景為第七子繇求蒨女婚蒨不答景再言之乃杖景四十繇此與勉有忤除散騎常侍不拜是時勉又為求蒨弟葺及王泰女二人竝拒之葺為吏部郎坐杖曹中幹免官泰以疾假出宅仍遷散騎常侍皆勉意也初天監六年詔以侍中常侍竝侍帷幄分門下二局入集書其官品視侍中而非華胄所恱勉因勅泰為之蒨尋遷司徒左長史初王泰出閣高祖謂勉云江蒨資厯應居選部勉對曰蒨有眼疾又不悉人物高祖乃止後魏劉潔為尚書令朝夕在樞密深見委任性既剛直恃寵自專太武心稍不平潔既居勢要擅作威福諸阿附者登進忤恨者黜免内外憚之側目而視于忠孝明即位為侍中領軍將軍既居門下又摠禁衛遂秉朝政權傾一時常白高陽王雍自云宣武本許優轉雍憚忠威權便順其意加忠車騎大將軍忠既尊靈太后為皇太后居崇訓宫忠為儀同三司尚書令領崇訓宫衛尉侍中領軍如故崔浩為司徒薦冀定相幽幷五州之士數十人各起家郡守孝莊謂浩曰先召之人亦州郡選也在職已乆勤勞未答今何不先補前召外任郡縣以新召者代為郎吏又守令宰民使更事者浩固爭而遣之高允聞之謂東宫博士管恬曰崔公其不免乎茍逞其非而較勝於上何以能濟元义為相時高陽王雍摠攝内外與义同決庶政及清河王懌之死又專政天下大責歸焉爾朱世隆為尚書令常使尚書郎宋㳺道邢昕在其宅聽視事東西列坐受納訴訟稱命施行其專恣如此既摠朝政生殺自繇公行淫泆無復畏避兄弟羣從各擁强兵割剝四海極其暴虐姦謟蛆酷多見信用温良名士罕豫腹心於是天下之人莫不厭毒高肇為尚書令既當衡軸每事任己本無學識動違禮制好改先朝舊制任情妄作減削卦秩抑黜勲人由是怨聲盈路矣北齊孫騰初仕東魏為太保與高岳高隆之司馬子如號為四貴非法專恣騰為甚焉高祖世宗屢加誚讓終不悛改朝野深非笑之高敖曹神武時為司徒嘗詣相府將直入門門者止之敖曹怒引弓射門者神武不之罪尋為西魏所殺唐邕為尚書令録尚書事既被任遇意氣漸高其未經府寺陳訴越覽辭牒條數甚多俱為憲臺及左丞彈劾竝御注放免司空從事中郎封長業太尉記室參軍平濤竝為徴官錢違限邕各杖背三十齊時宰相未有撾撻朝士至是大駭物望隋楊素為左僕射有鮑亨者善屬文殷胄者工草𨽻竝江南士人因高智慧没為家奴時朝臣有違忤雖至誠體國如賀若弼史萬歳李綱栁彧等素皆隂中之若有附會及親戚雖無財用必加進擢朝廷靡然莫不畏附唐李昭徳為檢校内史專權用事頗為朝野所惡前魯王府功曹參軍邱惜上疏言其罪狀又長上果毅鄧注著碩論數千言備述昭徳專權之狀鳯閣舎人逄𢎞敏奏之則天乃惡昭徳謂納言姚濤曰昭徳身為内史備荷殊榮誠如所言實負於國以延載初左遷欽州南賔尉唐李義府為中書令時改葬其祖父營墓於永康陵側三原令李孝節私課丁夫車牛為其載土築墳晝夜不息於是高陵櫟陽富平雲陽華原同官涇陽等七縣以孝節之故懼不得已悉課丁車赴役高陵令張敬業恭勤怯懦不堪其勞死於作所王公以下爭致贈遺其羽儀導從轜輴噐服竝窮極奢侈㑹𦵏車馬祖奠供帳自灞橋屬於三原七十里間相繼不絶武徳以來王公𦵏送之盛未始有也張嘉貞為中書令𤣥宗開元十年車駕幸東都有雒陽主簿王鈞為嘉貞修宅將以求御史因受􅂍事發帝特令朝堂集衆決殺之嘉貞促所繇速其刑以滅口乃歸罪於御史大夫韋抗中丞韋虚心皆貶出之其冬秘書監姜皎犯罪嘉貞又附會王守一奏請杖之皎遂死於路俄而廣州都督裴伷先下獄帝召侍臣問當何罪嘉貞又請杖之兵部尚書張說進曰臣聞刑不上大夫以其近於君也故曰士可殺不可辱今秋受詔廵邊中塗聞姜皎以罪於朝堂決杖配流而死皎官是三品亦有微功若其有犯應死即殺應流即流不宜决杖廷辱以卒伍待之且律有八議勲貴在焉皎事已徃不可追悔伷先祗宜據狀流貶不可輕又决罰帝然其言嘉貞不恱退謂說曰何言事之深也說曰宰相者時來即為豈能長據若貴臣盡常可杖恐吾等行當及之此言非為伷先乃為天下士君子也李林甫為右相天寶四載以左散騎常侍兼陜郡太守江淮租庸轉運使韋堅為刑部尚書蓋堅為林甫所惡外示崇秩以酬勞内實去其權也楊國忠貴妃從父之子天寶中代李林甫為相國忠素疎躁自賢强力有口辨乃以便僻取宰相慢易機務處之不疑立朝輒攘袂扼腕自公卿以下皆頥指氣使無不讋憚元載為中書侍郎平章事恣為不法侈􅆫無度江淮方面京輦要司皆排去忠良引用貪猥士有求進者不結子弟則謁主書貨賂公行近年以來未有其比載又奏條應緣别勅授六品已下勅出後堂令吏部兵部便附甲團奏不得簡勘時功狀奏擬結銜多謬載欲權歸於己慮有司駁正㑹有上封人李少良密以載醜跡聞載知之奏於代宗前少良等數人悉斃於公府繇是道路側目不敢議載之短楊炎初為中書舎人代宗末坐元載黨貶道州司馬徳宗即位崔祐甫薦炎拜門下侍郎平章事蒞事數月屬崔祐甫疾病不視事喬琳又罷免炎遂獨當國政頗疾祐甫之恩顧祐甫所制作炎多隳之初炎附㑹元載時議己薄之後坐載貶官憤恚益甚既而得政睚眦必讎險害之性附於心唯其愛憎不復更顧公道常衮大厯中為門下侍郎平章事與楊綰同掌樞務先是百官俸料寡薄綰與衮奏請加之時劉滉判度支衮與滉各騁私懐所加俸料厚薄由已時少列各定月俸為三十五千滉怒司業張參惟止給三十千衮惡少詹事趙基遂絡二十五千又太子洗馬實司經局長官文學為之貳衮有親戚任文學者給十二千而給洗馬十千其輕重任情不通時政多如此類後綰卒中書舎人崔祐甫領省事衮以為同中書門下平章事兼得摠中書省遂管綜中書胥吏省視去就及其案牘祐甫不能平之累至忿競遂令祐甫分知吏部選事所擬官又多駁下竇參初為知雜侍御史時鮑防為禮部侍郎嘗於通衢與參相遇防道騎不時引避參大怒捕防僕人鞭之以徇及參秉政防年未老乃遽表令致仕防謂親友曰吾與蕭昕之子齒類而同日懸車非朽邁之致也以餘忿見廢耳時議以防文學舊人嘗著功績不因罪戾為俗吏之所擯竟以憤終衆頗閔之又穆贊為侍御史分司東都時故陜州盧岳妾裴氏以有子岳妻分財不及訴於官贊鞫其事御史中丞盧佋佑岳之家令深繩裴罪贊持平不許參與佋恃權怒贊以小事不受指使遂下贊獄侍御史杜倫希其意誣贊受裴金鞭其走使以成獄及急贊弟賞馳詣闕撾登聞鼓詔三司覆理無騐出為郴州刺史皇甫鏄為中書侍郎平章事頗排故相李絳罷河中節度為防禦使而命綘為之李宗閔為中書侍郎平章事與牛僧孺文宗時同為相裴度罷後牛李之權赫於天下李徳裕會昌中為太尉門下侍郎平章事同列于悰罷後中人頗於武宗前言其專後唐盧程為平章事使晉陽宫册皇太后山路險阻徃復綿邈程安坐肩輿所置州縣驅率丁夫長吏迎謁拜伏其前少有忤意因加笞辱趙光裔為平章事朝廷每有禮樂制度沿革擬議必徴求故實緣飾所行豆盧革雖籍餘緒然本朝時仕宦尚微乆從使府朝章典禮未能深悉光裔每有所陳唯唯而已光裔由是自負傲視諸公每見草奏議或當謂羣官曰豆盧革公漸觧學者其可已乎王建立天成三年為右僕射中書侍郎平章事判三司四月明宗幸西莊召建立㑹食中人廻建立附奏三司事忙遂止漢蘓逢吉為左僕射平章事先是高祖踐祚之後逢吉與蘓禹珪俱在中書有所除拜多違舊制用舎升降率意任情至有自白丁而升宦路由流外而除令録者不可勝數物論諠然高祖方倚信二相莫敢言者周王峻為左僕射平章事以大理卿劇可乆為太僕卿留司西京以左庶子張仁瑑為大理卿先是御史惟鄭州防禦判官楊瑛斷犯鹽人深刻法寺定楊瑛罪失入減三等以官當徒案入峻怒曰罪人輕重在法官之口夫死者不可復生楊瑛悞斷殺人而罪止徒屬則官高者要殺使殺罪則可以官高免矣召可乆謂之曰楊瑛罪重安得從輕可别簡重條斷殺可乆曰法寺以律文失入别無重條峻曰簡若有條公當何罪可乆曰若藏正條死亦甘心如彊生節目安可鉗口信宿勅依省寺詳斷峻終含怒或有言張仁瑑漢隠帝時斷史尚在曾用條法即以仁瑑代可乆册府元龜卷三百三十八
