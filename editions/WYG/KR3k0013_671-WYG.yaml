body:
  text: 册府元龜卷六百七十一宋王欽若等撰牧守部總序唐虞之制或十二州或九州州皆有牧虞典所謂咨十有二牧左氏傳所謂禹鑄九牧之金是也三代之制王畿千里之外設方伯五國以為屬屬有長十國以為連連有帥三十國為一卒卒有正二百一十國以為州州有伯八州八伯伯亦牧也商曰伯夏周皆曰牧自唐迄周九州之地以封諸侯諸侯賢者乃為州牧又使大夫三人監方伯之國故曰三監秦氏罷侯置守凡三十六郡郡置守掌治其郡秩二千石内郡有丞邊郡又有長史掌兵馬秩皆六百石又置尉掌佐守典武職田卒秩比二千石亦有丞秩六百石又置御史監之漢郡縣承秦置京兆尹左馮翊右扶風謂之三輔分治長安城中京兆初為内史又為右内史左馮翊初為左内史扶風初名主爵中尉又為中尉後更今名各置郡尉而諸侯所封之國置内史治民中尉掌武職又省監郡御史丞相遣吏分刺州不常置景帝中元二年更名郡守曰太守郡尉曰都尉武帝元封三年分諸郡為十三部部置刺史掌奉詔條察州内秩六百石其察三輔曰司隸校尉成帝綏和元年更刺史曰牧秩二千石哀帝建平二年又以州牧復為刺史元夀二年又以刺史為州牧郡守之職掌治民進賢勸功次獄除奸嘗以春行縣所至勸民農桑振救之絶秋冬遣無害吏案訊諸囚平其罪法論課殿最刺史之職嘗以八月廵行所部郡國錄囚徒考殿最初歲盡詣京都奏事皆有從事史假佐後漢皆因之以河南郡為河南尹省諸郡都尉其職并歸太守屬國都尉舊主蠻夷降者中興稍有八縣治民如郡安帝又置扶風及京兆虎牙都尉靈帝末復以刺史為州牧魏始置都督諸州軍事或領州刺史晉准舊制王畿置司隸校尉州置刺史京師所治置尹郡置太守諸王國置内史又涼州刺史領䕶羌校尉雍州刺史領西戎校尉荆州刺史領南蠻校尉亦或分置又刺史太守内史多領將軍中郎將之職元帝中興罷司隸以其職為揚州刺史宋齊同之自魏已降大抵刺史任重者為使持節都督輕者為持節都督諸軍事又輕者為假節刺史治民事其非要州不帶都督則單為刺史謂之單車刺史梁陳之制刺史二千石受拜之明日辭宗廟而行揚州南徐州東揚州刺史品第三荆江南兗郢湘雍州刺史品第四豫益廣衡青北兗北徐梁司南梁交越桂霍寧州刺史及丹陽尹會稽吳郡吳興太守品第五其餘萬户以上郡守内史品第六不滿萬户太守内史品第七其秩比二千石單車刺史加督進一品都督進二品太守加秩亦進一品都督進二品後魏以司隸部為司州州置三刺史用六品宗室一人異姓二人比古之上中下三大夫郡置三太守用七品而太守上有刺史下有令長雖置而不臨民又置大都督總緝軍民北齊京師所治司州置牧清都置尹餘州置刺史郡置太守三等上州刺史清都尹三品三等中州刺史三等上郡太守從三品三等下州刺史四品三等州郡制禄之法刺史守令下車各前取一時之秩上上州刺史與司州牧同歲秩八百疋上中上下五十疋為差中上百疋為差中中中下五十疋為差下上百疋為差下中下下五十疋為差上郡太守嵗秩五百疋降清都尹五十疋上中上下各以五十疋為差中上四十疋為差中中中下三十疋為差下上四十疋為差下中下下三十疋為差幹力聽勑乃給幹輸絹十八疋放其身力則以州郡白直充後周雍州牧九命三萬户以上州刺史正八命二萬户以上州刺史八命一萬户以上州刺史正七命五千户以上州刺史七命京兆尹八命一萬五千户以上郡守正七命五千户以上郡守正六命一千户以上郡守正五命一千户以下郡守五命而刺史奉辭之日備列鹵簿又改都督為總管隋雍州牧從二品上州刺史正三品中州刺史從三品下州刺史正四品京兆尹正三品上郡太守從四品中郡太守從五品下郡太守正六品州又置總管以統餘州并益揚荆謂之大總管視從二品中總管視正三品下總管視從三品其為總管刺史皆加持節刺史太守皆計户而給祿大州六百二十石其以四十石為差於下下則三百石大郡三百四十石其下每以三十石為差後開皇三年罷郡以州統縣煬帝即位又罷州置郡郡置太守上郡從三品中郡正四品下郡從四品京兆河南俱謂之尹正三品舊制州有兵處刺史帶諸軍事以統之至是别置都尉副都尉領兵馬郡不復知兵矣其後郡各加置通守一人位次太守京兆河南則謂之内史而悉罷持節總管之名唐初又以郡為州雍州雒州並置牧餘州置刺史復以雒荆并幽交五州為總管府總管與刺史皆號持節七年改總管為都督督十州者為上都督不及者為都督後又都督刺史加號使持節諸軍事而實無節但頒銅魚而已景雲二年分置二十四都督糾察所管州刺史已下官人善惡畿内州不隸都督長夀元年又改并州為太原府神龍中罷之開元中改為太原府又始置節度使其后又置諸道採訪使皆以刺史為之節度使以司戎事採訪使以聽民政天寳元年改州為郡改刺史為太守至德元年改郡為州改太守為刺史又以益州為成都府岐州為鳳翔府蒲州為河中府荆州為江陵府乾元元年改停採訪使俄置觀察處置使興元中以梁州為興元府光化中以華州為興德府凡唐之制京兆河南太原尹從二品餘尹從三品其屬僚有少尹而下大都督從二品中都督正三品下都督從三品屬官有長史而下大都督多親王為之以長史領州務以領户滿四萬已上曰上州刺史從三品户滿二萬已上曰中州刺史正四品户不及二萬曰下州刺史從四品其屬僚有别駕下都督而下所掌清肅邦畿考覈官吏宣布德化撫和齊人勸課農桑敦諭五教每嵗一廵屬縣觀風俗問百年錄囚徒恤鰥寡閲丁中務知百姓之疾五代之制並與唐同昔漢宣帝云與吾共治者惟良二千石乎夫一圻之地千乘之賦上承於王廟下熙於民務有刑辟之政有軍旅之事所謂生民休戚之所屬王室安危之所漸故得其人則成治非其材則受弊至乃仁慈以流聲清白以飛譽禮讓以化俗公正以御物不懾於威權不溺於榮利此良吏之最也巽愞以取容依阿以附勢殖貨以厚己苛刻以求名不畏於簡書不䘏於惸弱此奸吏之首也並用考其行事著之於篇其佐吏則附見於幕府凡牧守部四十二門云選任自舜典所載蓋十有二牧以訖于周重方伯連帥之任秦置郡守漢仍其制或郡或國錯峙於四封曰守曰相咸釐於兆姓專制千里其為威重可知矣故推擇之際未嘗輕焉乃有密邇都邑俯介戎貊或豪猾恣横或冦攘為孽至乃干戈甫定水旱相仍罷羸賴其惠綏强暴資其式遏由是選循良之器求真幹之用分符以往專城而居足以為王廟之藩屏黔民之師長者矣周成王時周公既沒成王命君陳分正東郊成周成王重周公所營故命君陳分居正東郊成周公之邑里官司康王命畢公分居里成周郊分别民之居里異其善惡成定東周郊境使有保䕶作畢命言畢公見命之書惟十有二年六月庚午朏康王即位十二年六月三日庚午越三日壬申王朝歩自宗周至于豐於朏三日壬申王朝行自宗周至于豐宗周鎬京豐文王所都以成周之衆命畢公保釐東郊用成周之民衆命畢公使安理治王成周東郊令得所王若曰嗚呼父師惟文王武王敷大德于天下用克受殷命王順其事歎告畢公代周公為太師為東伯命之代君陳言文武布大德于天下故天佑之用能受殷之王命惟周公左右先王綏定厥家言周公助先王安定其家毖殷頑民遷于雒邑密邇王室式化厥訓慎殷頑民愁其叛亂故徙于雒邑密近王室用化其教既歴三紀世變風移四方無虞予一人以寧言殷民遷周已經三紀世代民易頑者漸化四方無可度之事我天子用安邑矣十二年曰紀父子曰世道有升降政繇俗革不臧厥臧民罔攸勸天道有上下交接之義政教有因俗改更之理民之俗善養之俗有不善以法御之若乃不善其善則民無所勸慕惟公懋德克勤小物弼亮四世正色率下罔不祗師言言公勉行德能勤小物輔佐文武成康四世為公卿正色率下下人無不敬仰師法嘉績多于先王予小子垂拱仰成公之善功多于先人之時我小子為王垂拱仰公成理言其上顯父兄下施子孫王曰嗚呼父師今予祇命公以周公之事往哉今我敬命公以周公所為之事往為之哉言非周公所為不敢枉公往治旌别淑慝表厥宅里彰善癉惡樹之風聲言當識别頑民之善惡表異其居里明其為善病其為惡立其善風揚其善聲弗率訓典殊厥井疆俾克畏慕其不循教道之常則殊其井居田界使能畏為惡之禍慕為善之福所以相勸申畫郊圻慎固封守以康四海郊圻雖舊所規畫當重分明之又當謹慎監固封疆之守備以安四海京師安則四海安矣政貴有恒辭尚體要不惟好異政以仁義為常辭以理實為要故貴尚之若異於先王君子所不好商俗靡靡利口惟賢餘風未殄公其念哉紂以靡靡利口惟賢覆亡國家今殷民利口餘風未絶公其念絶之我聞曰世祿之家鮮克繇禮以蕩陵德實悖天道時言我聞自古有之世有祿位而無禮教少不以放蕩陵蔑有德者如此實亂天道敝化奢麗萬世同流言敝俗相化車服奢麗雖相去萬世若同一流兹殷庻士席寵惟舊怙侈滅義服美于人此殷衆士居寵日久怙恃奢侈以滅德義服飾過制美於其名以僣上驕淫矜誇將繇惡終雖收放心閑之惟艱言殷衆士驕恣過制於其所能以自侉大如此不變將用惡自終雖今順從周制心未厭服以禮閑禦其心惟難資富能訓惟以永年惟德惟義時乃大訓不繇古訓于何其訓以富資而能訓義則惟可以長年命矣惟有德義是乃大訓若不用古訓典籍於何其能訓乎王曰嗚呼父師邦之安危惟兹殷士不剛不柔厥德允脩言邦國所以安危惟在和此殷士而已治之不剛不柔寛猛相濟則其德政信脩立惟周公克慎厥始惟君陳克和厥中惟公克成厥終周公遷殷頑民以消亂階能慎其始君陳𢎞周公之訓能和其中畢公闡二公之烈能成其終三后協心同底于道道洽政治澤潤生民三君合心為一終始相成同致于道道至普洽政化治理其德澤惠施乃浸潤生民言三君之功不可不尚四夷左衽罔不咸賴予小子永膺多福言東夷西戎南蠻北狄被髪左衽之人無不皆恃賴三君之德我小子亦長受其多福公其惟時成周建無窮之基亦有無窮之聞公其惟以是成周之治為周家立無窮之基業於公亦有無窮之名聞於後世子孫訓其成式惟乂言後世子孫順公之成法惟以治嗚呼罔曰弗克惟既厥心人之為政無曰不能惟在盡其心而已罔曰民寡惟慎厥事無曰人少不足治也惟在慎其政事無敢輕之欽若先王成烈以休于前政敬順文武成業以美於前人之政所以勉畢公申伯以賢入為宣王卿士佐王有功王又欲使繼其故諸侯之事往作邑於謝南方之國皆統理施其法度特改大其邑使為侯伯故崧高詩云亹亹申伯王纘之事于邑于謝南國是式亹亹勉也謝周之南國也纘繼于往式法也漢郅都景帝初為中郎將時濟南瞷氏宗人三百餘家豪猾二千石莫能制於是帝拜都為濟南守灌夫為代相武帝初即位以淮陽天下郊勁兵處郊謂四交輻輳而兵又勁彊故徙夫為淮陽太守汲黯為右内史坐小法免官隐於田園會改鑄五銖錢民多盗鑄楚地尤甚武帝以為淮陽太守黯伏謝不受印綬詔數强予然後奉詔召上殿黯泣曰臣自以為填溝壑不復見陛下不意陛下復收之臣嘗有狗馬之心思報効今病力力謂甚也不能任郡事臣願為中郎出入禁闥補過拾遺臣之願也帝曰君薄淮陽邪吾今召君矣言後即召也顧淮陽吏民不相得顧謂思念也吾徒得君重徒但也重威重也卧而治之龔遂為昌邑郎中令昌邑王廢髠為城旦宣帝即位久之渤海左右郡嵗饑盗賊並起二千石不能禽制帝選能治者丞相御史舉遂可用帝以為渤海太守韓延夀為雒陽太守治甚有名徙潁川潁川多豪彊難治國家嘗為選良二千石尹賞為長安令江湖中多盗賊乃以賞為江夏太守坐殘賊免南山羣盗起以賞為右輔都尉張敞為函谷關都尉宣帝即位廢王賀在昌邑帝心憚之徙敞為山陽太守後為膠東相時潁川太守黄霸以治行第一入守京兆尹不稱罷歸於是制詔以敞守京兆尹後坐事亡命冀州部中有大賊天子思敞功勑使使者即家在所召拜冀州刺史蕭望之宣帝時為少府帝以望之經明持重論議有餘才任宰相任堪也欲詳試其政事復以為左馮翊望之從少府出為左遷恐有不合意即移病移病謂移書言病一曰以病而移居帝聞之使侍中成都侯安上諭意曰所用皆更治民以考功更猶言歴也前為平原太守日淺故復試之於三輔非有所聞也所聞謂聞其短失望之即視事王尊為槐里令兼行美陽令事元帝行幸雍過虢尊供張如法而辦以高第擢為安定太守後為中太僕坐事左遷高陵令以病免㑹山南羣盗數百人為吏人害嵗餘不能禽或説大將軍王鳳獨選賢京兆尹乃可於是鳳薦尊守京輔都尉行京兆尹事旬月間盗賊清王章為司隸校尉㑹京兆尹王尊免代者不稱職章以選為京兆尹孫寶為諫議大夫鴻嘉中廣漢羣盗起選為益州刺史後為丞相司直㑹益州蠻夷犯法巴蜀頗不安成帝以寶著名西州拜為廣漢太守秩中二千石賜黄金三十斤蠻夷安輯吏民稱之彭容哀帝時為漁陽太守有名於邊容貌食飲絶衆是時單于來朝當道二千石皆選容貌飲食士故容徙為雲中太守後漢郭伋為漁陽太守建武九年潁川盗賊羣起徵拜潁川太守召見辭謁帝勞之曰賢能太守去帝城不逺河潤九里兾京師并蒙福也十一年帝以盧芳據北土乃調伋為并州牧董宣建武中為懷令後江夏有劇賊夏喜等冦亂羣境以宣為江夏太守樊曄為軹長隗囂滅後隴右不安乃拜曄為天水太守臧宮為輔威將軍建武十一年與吳漢並滅公孫述光武以蜀地新定拜宮為廣漢太守祭肜為襄賁令賁音肥在今沂州臨沂縣建武十七年匈奴鮮卑及赤山烏桓連和彊盛數入塞殺掠吏人朝廷以為憂益增緣邊兵郡有數千人又遣諸將分屯障塞帝以肜為能拜遼東太守袁安為隂平任城令所在吏人畏而愛之明帝永平十三年楚王英謀為逆事下郡考覆明年三府舉安能理劇拜楚郡太守王堂為榖城令治有名蹟榖城縣在今齊州東阿安帝永初中西羌冦巴郡為民患詔書遣中郎將尹就攻討連年不克三府舉堂治劇拜巴郡太守盧植為博士靈帝熹平四年九江蠻反四府選植才兼文武拜九江太守蠻冦賔服朱雋為太僕光和中賊帥常山人張燕冦河内逼近京師於是出雋為河内太守將家兵擊却之張綱為侍御史時廣陵賊張嬰殺太守據郡梁冀乃用綱為廣陵太守綱至乃陳示禍福嬰等開門出降綱乃撫納離叛使各得安居部内肅清帝嘉之賜錢十萬賈琮為京兆尹中平元年交阯屯兵反執刺史及合浦太守自稱柱天將軍帝特勑三府精選能吏有司舉琮為交阯刺史及徵拜議郎時黄巾新破兵凶之後郡縣重斂因緣生姦詔書沙汰刺史二千石更選精能吏乃以琮為冀州刺史周紆為博平令以威名遷齊相黄昌為宛令政尚嚴猛皆稱神明朝廷舉能遷蜀郡太守陽球辟司徒劉寵府九江山賊起連月不解三府上球有理姦才拜九江太守王允為侍御史中平初黄巾賊起選拜豫州刺史糜竺曹公表為嬴郡太守曰泰山郡界廣逺舊多輕悍權時之宜可分五縣為嬴郡揀選清廉以為守將偏將軍糜竺素履忠貞文武昭烈請以竺領嬴郡太守撫慰吏民劉虞為幽州劉焉為益州劉表為荆州賈琮為冀州虞等皆海内清名之士或從列卿尚書以選為牧伯各以本秩居任傳車參駕施赤帷裳魏何夔後漢建安中為長廣太守徵還參丞相軍事海賊郭祖冦暴樂安濟南界州郡苦之太祖以䕫前在長廣有威信拜樂安太守到官數月諸城悉平蔣濟楚國人太祖拜濟丹陽太守大軍南征還以温恢為揚州刺史濟為别駕令曰李子為臣吳宜有君今君還州吾無憂矣杜畿為西平太守太祖既定河北而高幹舉并州反時河東太守王邑被徵河東人衛固范先外以請邑為名而内實與幹通謀帝謂荀彧曰關西諸將恃險與馬征必為亂張晟冦殽澠間南通劉表固等因之吾恐其為害深河東被山帶河四鄰多變當今天下之要地也君為我舉蕭何冦恂以鎮之彧曰杜畿其人也於是追拜畿為河東太守賈逵為議郎參司隸軍事太祖征馬超至𢎞農曰此西道之要以逵領𢎞農太守晉鄭褒魏末為散騎常侍㑹廣平太守缺宣帝謂褒曰賢叔大匠垂名稱於陽平魏郡百姓大蒙惠化且盧子家盧毓王子雍王肅繼踵此郡使世不乏賢故復相屈滕脩仕吳為廣州刺史甚有威惠徵為執金吾廣州部典督郭馬等為亂孫皓以脩宿有威惠為領表所服以為使持節督廣州軍事鎮南將軍廣州牧以討之阮种自中書郎遷平原相時襄邑衛京自南陽太守遷于河内與种俱拜武帝望而歎曰二千石皆若此朕何憂乎馬隆初為武威太守大康初朝廷以西平荒毁宜時興復以隆為西平太守諸葛恢為元帝鎮東從事中郎承制調為㑹稽太守臨行帝為置酒謂曰今之㑹稽昔之關中足食足兵在於良守以君有蒞任之方是以相屈四方分離當恢振圮運政之所先君為言之恢陳謝因對曰今天下喪亂風俗陵遲宜尊五美屏四惡進忠實退浮華帝深納焉劉𢎞為荆州刺史平張昌時荆部守宰多缺𢎞請補選帝從之𢎞乃敘功銓德隨才補授甚為論者所稱乃表曰被中詔勑臣隨資品選補諸缺吏夫慶賞刑威非臣所專且知人則哲聖帝所難非臣闇蔽所能斟酌然萬事有機毫釐宜慎謹奉詔書差所應用蓋崇化莫若貴德則所以濟也故太上立德其次立功也頃者多難淳朴彌凋臣輙以徵士立朝補零陵太守庶以懲波蕩之弊養退讓之操臣以不武前退於宛長史陶侃參軍蒯常牙門皮初戮力致討蕩滅姦凶侃常各以始終軍事初為都戰帥忠勇冠軍漢沔清肅實初等之勲也司馬法賞不踰時欲人知為善之速福也若不超㧞無以勸狥功之士慰熊羆之志臣以初補襄陽太守侃為府行司馬使典論功事常為山都令詔惟令臣以散補空缺然汴鄉令虞潭忠誠烈正首倡義舉舉善以教不能者勸臣輙特轉潭補醴陵令南郡廉吏仇勃母老疾困賊至守衛不移以致拷掠㡬至隕命尚書令史郭真張昌以為尚書郎欲訪以朝議遁逃不出昌質其妻子避之彌逺勃孝篤著於臨危貞忠厲於彊暴雖各四品皆可以訓奬臣子長益風教臣輙以勃為歸鄉令真為信陵令皆功行相叅循名較實條列行狀公文具上朝廷以初雖有功襄陽又是名郡名器宜慎不可授初乃以前東平太守夏侯陟為襄陽太守餘並從之陟𢎞之壻也𢎞下教曰夫統天下者宜與天下同心化一國者宜與一國為任若必姻親然後可用則荆州十郡安得十女壻然後為政哉乃表陟姻親舊制不得相監皮初之勲宜見酬報詔聽之陶侃為龍驤將軍武昌太守既破杜弢遣參軍王貢告㨗於王敦敦曰若無陶侯便失荆州矣伯仁方入境便為盗所破伯仁周顗字時為荆州刺史不知那得刺史貢對曰鄙州方有事難非陶龍驤莫可敦然之即表拜侃為使持節寧逺軍將軍南蠻校尉荆州刺史領西陽江夏武昌鎮于沌口尹奉為零陵太守時王堅代父遜為寧州刺史南夷校尉陶侃懼不能抗對蜀人太寧末表奉為寧州徵堅還京桓伊為大司馬參軍時苻堅强盛邊鄙多虞朝議選能距捍疆場者乃授伊淮南太守吳隐之為左衛將軍有廉節時以廣州包帶山海珍異所出一篋之寶可資數世然多瘴疫人情憚焉雖貧窶不能自立不求補長史故前後刺史皆多黷貨朝廷欲革嶺南之弊隆安中以隐之為龍驤將軍廣州刺史假節領平越中郎將宋胡藩初叅高祖相國軍事屬盧循餘黨與蘇溪賊大相聚結故以藩為始興相褚淡之初為高祖車騎長史高祖受禪後會稽郡缺朝議欲用蔡廓高祖曰彼自是蔡家佳兒何關人事可用褚佛佛淡之小字也乃以淡之為會稽太守何尚之元嘉中為太子中庻子彭城王義康欲以司徒左長史劉斌為丹陽尹文帝不許乃以尚之為尹南齊張冲為廬陵王北中郎司馬未拜豐城公遥昌為豫州明帝慮冦難未已徙冲為征虜長史南梁郡太守梁夏侯夔普通二年魏郢州刺史元顯達請降高祖勑郢州刺史元樹往迎顯達夔亦自楚城㑹之遂留鎮焉詔改魏郢州為北司州以夔為刺史兼督司州陳歐陽頠仕梁為東衡州刺史侯景平元帝遍問朝宰曰今天下始定極須良才請卿各舉所知羣臣未有對者帝曰吾已得一人矣侍中王褒進曰未審為誰帝曰歐陽頠公有經濟之才乃授武州刺史王勵字公齊仕梁為侍中高祖為丞相以勵兼長史吳中遭亂民多乏絶乃以勵監吳興郡及蕭勃平後又以勵舊在嶺表早有政績乃授使持節都督廣等二十州諸軍事平南將軍平越中郎將廣州刺史未行改為衡州刺史持節都督並如故王琳據有上流衡廣攜貳勵不得之鎮留于大庾嶺吳明徹為鎮東將軍呉興太守及引辭之郡文帝謂明徹曰吳興郡帝鄉之重故以相授君其勉之陸繕為侍中時留異擁割東陽新安人向文政與異連結因據本郡朝廷以繕為貞威將軍新安太守後魏張烈孝文時為太子歩兵校尉齊東昏將陳顯達治兵漢南謀將入冦時順陽太守王青石世官江南荆州刺史廣陽王嘉慮其有異表請代之帝詔侍臣各舉所知時有申薦者帝曰此郡今當必争之地須得堪濟之才何容汎舉也太子歩兵張烈每論軍國之事時有會人意處朕欲用之何如彭城王􅎰稱讚之遂勑除陵江將軍順陽太守辛紹先為神部令獻文帝皇興中薛安都以彭城歸國朝廷欲綏安初附以紹先為下邳太守加寧朔將軍為政不茍激察舉其大綱而已辛祥為并州平北府司馬會刺史䘮朝廷以其公清遂越長史勑行州事薛曇尚為徐州榖陽戍主行南陽平郡事母憂去職孝明正光中詔以陽平隣接梁地綏捍須人仰尚書舉才而遣左僕射蕭寶寅舉曇尚應選馳驛之郡裴慶孫正光末汾州吐京羣胡聚黨作逆慶孫擊之大潰於後賊復鳩集北連蠡升南通絳蜀兇徒轉盛慶孫又討之至陽城朝廷以此被山帶河衿要之所遂立邵郡因以慶孫為太守假節輔國將軍淳于誕孝昌中為巴州刺史朝議以梁州安康郡阻帶江山要害之所分置東梁州仍以誕為鎮逺將軍梁州刺史北齊高翼渤海人豪俠有風神為州里所宗敬魏孝昌末葛榮作亂於燕趙朝廷以翼山東豪右即家拜渤海太守至郡未㡬賊徒愈盛翼部率合境徙居山濟之間魏因置東冀州以翼為刺史加鎮東將軍司馬子如初從神武為大行臺郎中元顥入雒人情離阻以子如曾守鄴城頗有恩信乃令行相州事源文宗為涇州刺史入遷散騎常侍屬秦州刺史宗嵩卒朝廷以州在邊陲以文宗往涖涇州頗著聲績除秦州刺史乘傳之府特給後部皷吹王則為征南將軍隨侯景西討景於潁川作逆則鎮栢崖戍文襄以則有武用徵為徐州刺史後周泉企魏孝武時為東雍州刺史齊神武專政孝武有西顧之心欲委企以山南之事乃除雒州刺史當州都督未㡬孝武西遷神武率衆至潼關企遣其子元禮督鄉里五千人北出大谷以禦之齊神武不敢進梁魏興與雒州接壤表請内屬詔企為行臺尚書以鎮之大行臺賀㧞岳以企昔􅊩東雍為吏民所懷乃表企復為刺史詔許之令狐整為司憲中大夫初梁興州刺史席固以州來附文帝以固為豐州刺史固􅊩職既久猶習梁法凡所施為多虧政典朝議密欲代之而難其選令整權鎮豐州委以代固之畧整廣布威恩傾身撫綏數月之間化洽州府於是除整豐州刺史以固為湖州申徽為都官尚書時𤓰州刺史成慶為成人張保所殺都督令狐延等起義逐保啓請刺史以徽信洽西土拜假節𤓰州刺史王羆為右將軍與别將裴衍破梁將曹義宗于荆州時諸方鼎沸所在凋殘荆州新經冦難尤藉慰撫以羆為荆州刺史郭彦為中部中大夫鎮豫州武定中純州刺史樊含卒其地既東接陳境俗兼蠻左初䘮主境内騷然朝議以彦威信著於東南便令鎮撫彦至吏民畏而愛之李逺為大丞相府司馬時河東初復民情未安太祖謂逺曰河東國之要鎮非卿無以撫之乃授河東郡守揚雄為洵州刺史蠻帥文子榮竊據荆州之汶陽郡又侵陷南郡之當陽臨沮等數縣詔遣開府賀若敦潘招等討平之即以其地置平州以雄為刺史權景宣為廣州刺史侯景舉河南來附景宣從僕射王思政經畧應接既而侯景南叛恐東魏復有其地以景宣為豫州刺史鎮樂口章世康為司會中大夫尉遲逈之亂隋文帝為相國謂世康曰汾絳舊是周齊界因此亂階恐生揺動今以委公因授絳州刺史以雅望鎮之闔境清肅隋公孫景茂初仕後周為濟北太守以母憂去職開皇初詔徵入朝訪以政術徵拜汝南郡太守和洪初仕周為儀同令龍州蠻聚衆為亂刺史獨孤善不能禦朝議以洪有武畧代善為刺史後為折衝中大夫高祖為丞相時東夏初平物情尚梗高祖以洪有威名令領冀州事甚得人和樊叔畧開皇初為汴州刺史鄴都俗薄號曰難化朝廷以叔畧所在著稱遷相州刺史柳儉開皇初為廣漢太守有能名時高祖勵精思政妙簡良能出為牧宰以儉仁明著稱擢拜蓬州刺史衛𤣥拜魏郡太守高祖謂𤣥曰魏郡名都衝要之所民多姦宄是用煩公此郡去都道里非逺宜數往來詢謀朝政賜物五百段而遣之侯莫陳頴為邢州刺史時朝廷以嶺南刺史縣令多貪鄙蠻夷怨叛妙簡清吏以鎮撫之於是徵頴入朝拜桂州總管十七州諸軍事及到官大崇恩信民夷悦服溪洞生越多來歸附後為常山太守時嶺南閩越多不附帝以頴前在桂州有惠政為南土所信服復拜南海太守令狐熙為滄州刺史高祖太山還次汴州惡其殷盛多有奸俠以熙為汴州刺史高勵為上開府時隴右諸𦍑數為冦亂朝廷以勵有威名拜洮州刺史長孫平歴許貝二州俱有善政鄴都俗薄舊號難治前後刺史多不稱職朝廷以平所在稱善轉相州刺史甚有能名郭絢大業中煬帝將有事於遼東以涿郡為衝要訪可任者聞絢有幹局拜涿郡丞丘和為天水郡守大業末以海南僻逺吏多侵漁百姓咸怨數為亂逆於是選淳良太守撫之黄門侍郎裴矩言和歴居二郡皆以惠政著聞寛而不擾帝從之追和為交阯太守唐武士彠武德末判六尚書事揚州有人告趙郡王孝恭有變追入京屬吏高祖令士彠馳驛簡校揚州都督府長史陳政初為宇文化及太常卿亡歸長安授内史舎人時漢川多盜賊高祖曰吾前欲授卿梁州總管論者以為大擾吾度梁漢之任非卿不可政曰臣歸國日淺末由報効蜀漢既清無可展力今山東尚擾化及未平願得執鞭行陣少答萬一高祖曰漢川作牧山東振旅並為卿任遂授以梁州兼令安撫蕭瑀為中書令時州置七職務取才望兼善者為之時太宗臨雍州牧以瑀為州都督高士廉為光祿大夫太宗以蜀王恪為益州大都督幼未之藩以士廉有重望才足鎮静方面拜左光祿大夫行益州大都督府長史楊恭仁貞觀五年遷雒州都督太宗謂曰雒陽要重古難其人朕之子弟多矣恐非所任特以委公也韋嗣立為鳳閣侍郎則天長安中納言李嶠夏官尚書唐休景等奏曰臣等並以凡才謬膺大任不能使兵革止息倉府殷盈户口尚有逋逃官人未免濫濁使陛下臨朝軫念屢以為言夙夜慙惶不知啓處伏思當今要務莫若富國安人安人之方在擇刺史竊見朝廷物議逺近人情莫不重内官輕外職每出除授牧伯皆再三披訴比來所遣外任多是貶累之人風俗不澄寔由於此今望於臺閣寺監妙簡賢良分典大州共康庻績臣等請輟近侍率先具僚務在憂國濟人庻當有所補益則天曰卿等處鸞臺鳳閣誰為此行嗣立對曰臣以庸愚謬膺奬擢參掌機密非所克堪承乏外臺庶當盡節儻垂採錄臣願此行上令書名共探著者則去既而嗣立探得之於是命嗣立及御史大夫楊再思等二十人各以本官簡校刺史其後以政績可稱者惟常州刺史薛謙光徐州刺史司馬鍠二人後𤣥宗時謙光為太子賔客元行冲為散騎常侍開元三年詔曰周命召奭相宅建邦漢命蕭何留臺作鎮眷言斯土任在其人太子賔客昭文舘學士薛謙光右散騎常侍元行冲等國之耆儒朝之碩彦舉直錯枉清心不可容非殫見洽聞白首以之從學履歷時久精明日新必能慎固邦畿保釐都邑佇成居守之務宜叶往俞之委謙光宜充東都留守行冲為副王丘開元十二年以黄門侍郎為懷州刺史崔沔以中書侍郎為魏州刺史王易從以吏部侍郎為揚州大都督府長史韓休以禮部侍郎為虢州刺史張景昇以大理少卿為滑州刺史王昱以京兆少尹為常州刺史制曰昔臯繇與禹言乃曰在知人在安民此皆念在邦本光于帝載乾乾夕惕無忘厥㫖而長吏不稱蒼生靡寧深思循良以矯過弊仍重諸侯之選故自朝廷之始王丘等行為時宗才稱人秀寔有懿德著于衣冠加之善政布在臺閣咸以脩身之府載深經國之圖朕所明知躬自推擇是有煩卿之寄用彰恤下之心俾牧人宣條無媿於明哲而變風致理可輯於遺黎爾其克沃朕心式欽往命因勑宰臣曰朕欲妙擇牧宰以崇風化亦欲重其資望以勵衣冠自今以後三省侍郎有缺先求曾任刺史者郎官缺先求曾任縣令者源光裕開元十三年以大理卿為鄭州刺史楊承令以尚書左丞為汾州刺史許景先以吏部侍郎為虢州刺史冦泚以兵部侍郎為宋州刺史鄭温𤦺以禮部侍郎為邠州刺史李昇以宗正卿為邢州刺史袁仁敬以大理少卿為杭州刺史崔志廉以鴻臚少卿為襄州刺史蔣挺以國子司業為湖州刺史裴觀以左威衛將軍為滄州刺史崔誠以左司禦率府副率為遂州刺史初帝謂宰臣曰刺史之任必在得人卿即於諸司中選有寔望長官奏來朕自選擇乃有兹授蘇震為太常卿是嵗東都耆老表乞行幸帝重違其心乃選耆舊􅈴賢為之牧守遂以震為河南尹兼御史中丞仍充東都畿内觀察使李峴天寶末為京兆尹著聲績楊國忠惡其不附已出為長沙太守肅宗至德初朝廷務收才傑以清冦難峴應召至行在拜扶風郡太守兼御史大夫既收京師拜禮部尚書守京兆尹復兼御史大夫李泌天寳末為澧州刺史詔曰今荆南都會粤在澧陽俾人歸厚惟賢是牧以泌文可以化成風俗政可以全活惸嫠爰命頒條期乎共理無薄淮陽之守勉思渤海之功其見重如此嗣曹王臯為處州别駕行州事人便之徵至京師久之未得召見因上書言理道拜衡州刺史李峘為户部尚書肅宗以兵興之故軫慮逺人乃拜峘都統江淮節度觀察使敬括為大理卿志尚簡淡代宗大歷初叛臣周智光復反詔選循良為近輔以括為同州刺史李紓建中末為禮部侍郎德宗居奉天擇領三輔乃授同州刺史兼御史中丞張建封貞元初為夀州刺史會高承宗父子獨孤莘相次為徐州刺史人浸貧困不能自存又以咽喉要地據江淮運路朝廷思擇重臣以鎮者久之至是以建封為徐州刺史吳湊為右金吾大將軍貞元十四年京兆尹韓臯貶撫州員外司馬特召湊對於延英面授京兆尹令便視事尚未有制裴佶遷諫議大夫會黔中觀察使韋士文慘酷馭下為夷獠所逐俾佶代之酋渠自化李栖筠為浙西觀察使先是土豪方清乘嵗凶歉誘聚餓隸於黟歙間其衆數萬以殘害生人據守山險州郡不能制副元帥李光弼奉朝命徵諸侯兵以討之賊平獨有平盧行軍司馬兼御史中丞許果恃兵精功多逼留於上元不發有窺覦要害之意朝廷以瘡痍之後重興干戈乃以栖筠為浙西以鎮之趙昌貞元七年為處州刺史屬安南都䕶為夷獠所逐遂拜安南都䕶夷人率化十餘年因屋壞傷脛懇䟽乞還以簡校兵部郎中裴泰代焉拜國子祭酒及泰為酋領逐出德宗召昌問狀昌時年七十二而精徤如少年者德宗竒之復命為都䕶南人相賀李鄘初為京兆尹遷尚書左丞憲宗元和初以京師多剽竊復選為京兆尹摧奸肅物威望甚著孔戣為國子祭酒初廣州崔詠卒宰臣奏擬皆不可帝因謂裴度嘗有諫進海蚶淡菜者詞甚忠正卿可求此人度出以訪人或有言戣諫者度即日以聞乃命為廣州刺史辛秘為河南尹是時以再討王承宗以潞州壓賊境凋費尤甚朝議以兵革之後思能完復者乃命秘為潞州大都督府長史盧士玫為京兆少尹穆宗長慶初奉憲宗園寢刑簡事集時論推其有才擢拜大尹陳楚為義武軍節度長慶二年七月為東都留守居守之任故事或用舊德或用故相未嘗以武將而當保釐之重蓋浚郊有事地逼封圻遂用􅈴臣俾專守禦且非舊制尋亦改焉令狐楚鎮鄆州時北門大旱文宗意憂軫以楚理鄆有績擢為北都留守兼太原尹楚久在幷州練其風俗因人利之故封内晏然丁公著為禮部尚書翰林侍􅊰學士文宗以浙西災疫詢求良帥命公著簡校户部尚書為浙西觀察使田牟開成中為隴州刺史會鹽州刺史王宰好以法臨黨項𦍑人不安以牟寛厚故命易之後唐劉遂清字得一初仕梁為保鑾軍使歴内諸司使明宗即位加簡校尚書右僕射委以西都監守踰嵗以中山王都有不臣之跡除遂清為易州刺史俾遏其冦衝既至郡大有禦侮之畧境内賴焉王都平加簡校司空遷棣州刺史册府元龜卷六百七十一
