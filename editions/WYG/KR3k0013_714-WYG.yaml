body:
  text: 册府元龜卷七百十四宋王欽若等撰宫臣部規諷第三後周劉休徵為齊王憲友休徵獻王箴一首憲美之休徵後又以此箴上髙祖髙祖甚恱其文蕭元肅建徳三年為太子少傅元肅以任當師傅調䕶是職乃作少傅箴曰惟王建國辨方正位左史記言右史記事莫不立太子為皇之貳是以易稱明兩禮云上嗣東序養徳震方主器束髮就學宵音小雅便𨽻朝讀百篇乙夜乃寐愛日惜力寸隂無棄視膳再飯寢門三至小心翼翼大孝蒸蒸詢謀記慮問對疑丞安樂必敬無忘戰兢夫天道益謙人道惡盈漢嗣不絶乎馳道魏儲迴還乎鄴城前史攸載後世揚名三善旣備萬國以貞姬周長乆實賴元良嬴秦短祚誠繇少陽雖卜年七百有徳過厯而昌數世一萬無徳不及而亡敬之敬之天惟顯思光副皇極永固洪基觀徳審諭敢告職司太子見而悅之致書勞問隋栁肅髙祖開皇中為太子僕學士劉臻嘗進章仇大翼於宫中為巫蠱事肅知而諫曰殿下帝之冡子位當儲貳誡在不孝無患見疑劉臻書生鼓揺唇舌適足以相誑誤願殿下勿納之太子不懌他日謂臻曰汝何故漏洩使栁肅知之令面折我自是後言皆不用唐長孫敞隋開皇末為晉王庫直嘗從獵於驪山見羣鹿駭軼王䇿馬凌危逐之敞馳下馬諫曰大王不慮垂堂淫於原獸小人之情未見其可王乃忻然而止李綱為太子詹事上書諫太子建成曰綱耄矣日顧時流墳樹已拱幸未就土託傳聖躬無以酬恩請效愚直伏願殿下詳之竊見飲酒過多誠非養生之術且凡為人子者務於孝友以慰君父之心不宜聴受邪言妄生猜忌建成覽書不懌而所為如故綱以數言事忤太子㫖道旣不行鬱鬱不得志李百藥為右庶子時太子嬉戯無度乃作贊道賦以諷諫之于志寧為散騎常侍行太子左庶子志寧以太子承乾數虧禮度志在規救撰諫苑二十巻諷之太宗大悅承乾嘗於盛農之時營造曲室累月不止所為多不法志寧上書諫曰臣聞克儉節用實𢎞道之源崇侈恣情乃敗徳之本是以凌雲槩日戎人於是致譏峻宇雕墻夏書以之作誡昔趙盾佐晉吕望師周或勸之以節財或諫之以厚歛莫不盡忠以佐國竭誠以奉君欲茂實播於無窮英聲被乎物聴咸著簡策以為美談今所居東宫隋日營建覩之者尚譏其侈見之者猶歎其華何容此中更有修造財帛日費土木不停斧斤之工窮極磨礱之妙且丁匠官奴入内比者曾無伏鑒此等或兄犯國章或弟罹王法往來御苑出入禁闈鉗鑿縁其身槌杵在其手監門本防非慮宿衛以備不虞直長旣自不知千牛又復不見牙爪在外厮役在内所司何以自安臣下豈容無懼又鄭衛之樂古謂淫聲昔朝歌之鄉囬車者墨翟夾谷之㑹揮劒者孔丘先聖旣以為非通賢將以為失頃聞宫内屢有皷聲大樂伎兒入便不出聞之者股慄言之者心戰往年口勅伏請重尋聖㫖殷勤明誡懇切在於殿下不可不思至於微臣不得無懼臣自驅馳宫闕已積嵗年犬馬尚解識恩木石猶能知感所有管見敢不盡言如鑒以丹誠則臣有生路若責其忤㫖則臣是罪人但悅意取容臧孫方之疾疢犯顔逆耳春秋比之藥石伏願停工匠之作罷乆役之人絶鄭衛之音斥羣小之輩則三善允備萬國作貞矣承乾不納承乾又令閹官多在左右志寧上書諫曰臣聞堯稱稽古功著於明揚舜曰聰明績彰于去惡然開元立極布政辨方莫不旌賁英賢驅除不肖理亂之本咸在於兹况閹宦之徒體非全氣便蕃階闥左右宫闕託親近以立威權假出納以為禍福昔易牙被任變起齊邦張讓執鈞亂生漢室伊戾為詐宋國受其殃趙髙作姦秦氏鍾其弊加以𢎞石用事京賈則連首受誅王曹掌權何竇則踵武被戮遂使縉紳重足宰司屏氣然順其情者則榮逮幼冲逆其㫖者則災及襁褓爰曁髙齊都鄴亦嬖閹官鄧長顒位至侍中陳徳信爵隆開府外干朝政内預宴私宗枝藉其吹嘘重臣仰其鼻息罪積山岳靡挂於刑書功無涓塵已勒於鐘鼎富踰金穴財甚銅山是以家起怨嗟人懐憤歎骨鯁之士語不見聴蹇諤之臣言必被斥齊都顛覆職此之繇向使任諒直之臣退佞給之士據趙魏之地擁漳滏之兵修徳行仁養政施化何區區周室而敢覬覦焉然杜漸防萌古人所以逺禍以大喻小先哲於焉取則伏惟殿下道茂重離徳光守器憲章古始祖述前修欲使休譽逺聞英聲遐暢臣竊見寺人一色未識上心或輕忽髙班或凌轢貴士便是品命失序綱紀不立取笑通方之人見譏有識之士然典内職掌唯在門外通傳給使主司但縁階闥供奉今乃往來閤内出入宫中行路之人咸以為怪伏望狎近君子屏出小人上副聖心下允衆望承乾覽書甚不悅承乾嘗驅使司馭等不許分番又私引突厥達哥支入宫内志寧上書諫曰臣聞上天葢髙日月以光其徳明君至聖輔佐以贊其功是以周頌升儲見規毛畢漢盈居震取資黄綺姬旦抗法於伯禽賈生陳事於文帝莫不殷勤于端士懇切於正人昔鄧禹名臣方居審諭之任疏受宿望始陳輔導之官歴代賢君莫不丁寧于太子者良以地膺上嗣位處副君善則率土霑其恩惡則海内罹其禍近聞僕寺司馭爰及駕士獸醫始自春初迄兹夏晩嘗居内後不放分番或家有尊親闕於溫凊或室有幼弱絶於撫養春則廢其耕墾夏則妨其播植事乖存育恐致怨嗟且突厥達哥支等人面獸心豈得以禮教期不可以仁信待心則未識於忠孝言則莫辨其是非近之有損於英聲暱之無益於盛徳引之入閣人皆驚駭豈臣愚識獨用不安臣下為殿下之股肱殿下為臣下之君父君父以存撫為務股肱以匡救為心是以苦口之藥以奉身逆耳之言以安位古人樹誹謗之木以求己諐懸敢諫之鼓以思身過由是從諫之主鼎祚克昌愎諫之君洪業隳墜承乾大怒孔頴達為太子右庶子承乾令撰孝經義疏頴達因文見意更廣規諷之道學者稱之後承乾不修法度頴達每犯顔進諫承乾乳母遂安夫人謂曰太子成長何宜屢致面折對曰蒙國厚恩死無所恨諫諍愈切承乾不能納王𢎞直為漢王元昌友元昌畋獵無度乃上書以諫其畧曰夫宗子維城之託者所以固邦家之業也大王功無任城戰尅之效行無河間樂善之心爵髙五等邑富千室當思答極施之洪慈保無疆之永祚其為計者在乎修徳冠履詩書畋獵史傳覽古人成敗之所由鑒旣往存亡之異軌覆前戒後居安慮危奈何列騎齊驅交横壟畝野有遊客巷無居人貽衆庶之憂逞一時之樂從禽不息實用寒心元昌覽書而遽止然漸見疎斥王珪為禮部尚書兼魏王師王問珪以忠孝珪答曰陛下王之君也事君思盡忠陛下王之父也事父思盡孝忠孝之道可以立身可以成名當年可以享天祐餘芳可以垂後葉王曰忠孝之道已聞教矣願聞所習答曰漢東平王蒼云為善最樂李義府自髙宗在春宫時為太子舍人嘗獻承華箴以申諷諭詞甚典美邢文偉咸亨中為典膳丞時皇太子乆在内罕與宫臣相接文偉輒减膳上疏諫曰竊見禮戴記曰太子旣冠成人勉於保傅之嚴則有司過之史徹膳之宰史之義不得不司過宰之義不得不徹膳皇帝式稽前典妙簡英俊自庶子以下至司議舍人及學士侍讀等使翼佐殿下以成聖徳近者以來未甚延納談議不狎謁見尚稀㕘朝之後但與内人獨居何以發揮聖智使濬哲文明者乎今史雖闕官宰當奉職忝備所司不敢逃死謹守禮經微申減膳皇太子答曰顧以虚庸早向墳典每欲研精政術極意書林但徃在幼年未閑將衛竭誠眈誦因即損心比日以來風塵更積中奉恩㫖不許重勞加以趨侍含元温凊朝夕承親無自專之道遵禮以色養為先所以屢闕坐論時乖學緒公潛申雅勗式薦忠規敬尋來請良符宿志自非情思審諭義均弼諧豈能盡此藥言形於簡墨撫躬三省感愧兼深偉自此益知名韋承慶為太子司議郎儀鳯四年皇太子賢監國時太子頗近聲色户奴等與之欵洽承慶上書諫曰臣聞太子者君之貳國之本也所以承宗廟之重繫億兆之心萬國以貞四海屬望殿下以仁孝之徳明睿之姿岳峙泉渟金真玉裕天皇升殿下以儲副寄殿下以監撫欲使炤無不及恩無不覃百僚仰重曜之輝萬姓聞洊雷之響夫君以人為本人以食為命君非人無以保其位人非食無以全其生故有子曰百姓足君孰與不足百姓不足君孰與足自頃年以來頻有水旱菽粟不能豐稔黎庶自致煎窮今夏亢陽米價騰踴貧屢之室無以自資朝夕弗遑惟憂饉餒下人之瘼實可哀矜稼穡艱難所宜詳悉天皇所以垂衣北極殿下所以守器東朝為天下之所尊得天下之所利者豈惟上𤣥之幽贊亦百姓之倚命也故百姓危則社稷不得獨安百姓亂則帝王不能獨理古之明君飽而知人饑煖而知人寒每以天下為憂不以四海為樂今關隴之外凶寇憑陵西土邊甿凋䘮將盡干戈日用烽火薦驚千里有勞於饋糧三農不遑於稼穡殿下為臣為子乃國乃家為臣在於竭忠為子期於盡孝在家不可以自逸在國不可以自康一物有虧聖上每留神念三邊或梗殿下豈不兢懷况當養徳之秋非是任情之日伏承北門之内造作不常玩好所營或有煩費娼優雜伎不息於前鼓吹繁聲亟聞於外旣喧聴覽且黷宫闈兼之僕𨽻小人縁此得親左右亦旣奉承顔色能不恃託恩光作福作威莫不由此不加防慎必有愆非倘使微累徳音於後悔之何及書云不作無益害有益之事故髙而不危所以長守貴滿而不溢所以長守富是知髙危不可不慎滿溢不可不持也易曰君子終日乾乾夕惕若厲敬慎之謂也在於凡庶能守而行之猶可以髙振聲華坐致榮禄况殿下有少陽之位有天挺之姿片善而天下必聞小能而天下咸服豈可不為盡善盡美之道以取可乆可大之名哉伏願博覽經書以廣其徳屏退聲色以抑其情静黙無為恬虚寡欲非禮勿動非法不言居處服玩必循節儉畋獵逰娛不為縱逞正人端士必引而親之便辟側媚必斥而逺之使惠風溢於逺近仁聲翔於内外則可以克享終吉長保利貞為上嗣之稱首奉聖人之鴻業者矣承慶又上諭善箴以諷太子勞而遣之薛元超永隆中拜中書令兼太子左庶子時皇太子在京師頗以畋獵為事元超上啟諫曰臣聞位隆載鼎居之者匪易業峻承祧守之者為重伏惟殿下幼彰岐嶷夙擅温文大孝因心不繇於外奬深仁植性禀之於自然故能聿膺景福式光正緒皇基永固宸構克昌加以識度幾晤天姿獨秀生知之量振古莫儔比者監守務殷親賢政事所關視聴决斷如流凡在朝行僉論極美况臣委質階陛齒跡宫闈恭聞喜躍實百常品區區所望惟願聖徳日新勵兹三善無忘四術伏見去年之内數召學士等討論經籍亹亹不倦此令問播於遐邇在外聞者誰不欣然今夏以來接對講藝之道有謝曩時臣之事君在於無隠敢縁兹義輒獻愚忠但臣智識庸淺未足以發明雅訓求之史傳揚㩁而言焉昔漢苑招賢髙軒同敞曹園愛客飛葢連隂此乃副君之待士也亦有推心鄭衆每佇於諮詢隆禮桓榮用承於誨命此則副君之尊師也魏太祖征并州留太子在鄴頗出畋獵崔季進書諫曰盤于逰田書之所誡魯侯觀漁春秋譏之此周孔之格言二經之明義也深惟儲副以身為寳今忽馳騖而陵險誠有識所懼晉明帝之在宫中庶子温嶠中書舍人阮放諫馬射曰臣聞千金之子猶坐不垂堂况萬乗之貳若有駭駟之艱豈可不熟念哉殿下縱一日之娛忘萬代之基凡人猶知其不可况在聖明乎太子答云省所陳明卿等忠至咸從卿等動静此則副君之納規諫不以為嫌者也非獨一時之美事固亦千載之芳猷且思患預防著於易象樂不可極陳之禮經列聖垂模可為龜鏡殿下昔在藩邸時以打毬為戱當此之日已經墜馬近取諸身足為深鑒又殿下仁孝之徳聞於四海自車駕發京天慈許入苑内臣竊惟殿下之意旣承恩㫖始復出逰以為上副聖懐非狥盤逰之樂顧以園苑之地草樹極深絶磴危橋往往而有控纎離之馬擁太阿之劒截輕禽逐狡兎倘有銜橜之變雖悔不追至如户奴等軰非是一種或反逆之嗣或破亡之餘夷狄遺醜兼在其數密計兇謀理難懸測忽有潛身翳薈侍衛不虞白龍魚服事出慮表臣每一思至此魂爽飛越夫為人子者不登髙不臨深恐近於危辱也故樂正子春下堂傷足三月猶有憂色弟子問之子春曰君子跬步不敢忘孝今孝之道失是以有憂色也子春匹夫尚知愛其身體儲后之尊何可以不慎焉倘馬逢佚馭微致毁傷豈不上貽二聖之憂下乖兆人之望伏請打毬馳射深炤危機天皇所賜誡書殷勤切至網羅今古罕得名言竊循㫖要在於披懐虚己書云山林隠逸草澤髙人總萃春坊冀朝夕譚對採其禆贊廣納忠規機務之餘逰心墳籍瑩襟靈於藝囿散耳目於書林披帙横經克勤無怠此之至誡亦何不思殿下敦崇儒術闡揚文藝爰徵學士奬收人物應斯舉者若登龍津莫不延頸企踵思承顧盼皆願隳肝膽露欵誠布衣之交一言相託尚有懐知己之遇銜國士之恩殿下數存接引與其切磋道義竭忠進善必日有異聞則玉色彌光金聲自逺頃日時景炎鬱不敢望有引召金商戒序物侯漸涼伏乞聴政餘閒留情墳典所讀班史請畢殘功前者别勅賜物本縁殿下書進時請臨池染翰使筆力轉遒仍請每月一兩度總喚學士因為設食文學張君相素明老莊命之談說能暢𤣥風殿下假以温顔人各申其藝業鈎深理窟者思逞懐蛟摭實詞條者文成吐鳯此亦一時之竒觀可以澡慮怡神預在宫僚人知自效便辟取容者疎之正直不撓者親之棄不急之務而省逰娛絶無益之慾而敦節儉以儒墨為城池翺翔其際以禮義為干櫓棲息其間一則遵天皇誡書不敢失墜二則挹古人遺範有所發揮豈不美歟豈不盛歟伏乞燔翳捐褶以塞衆望太子報曰昨奉嘉命廣開正路翳已燔矣褶亦去焉師傅之言實獲我心帝聞元超有諫書遣使慰勉仍召赴東都唐休璟則天時為夏官尚書同鸞臺鳯閣三品孝和居春官轉太子右庶子依舊知政事以契丹入寇復拜夏官尚書檢校幽州都督及將行進啟皇太子曰張易之兄弟幸蒙寵遇數侍宴禁中縱情失禮非人臣之道惟加防察姚班為太子左庶子中宗太子重俊性明果少未有師傅舉事或不法班前後四上疏以諫其一曰臣聞賈誼曰選天下之端士孝悌博聞有道術者使與太子居處出入故太子乃生而見正事聞正言行正道左右前後皆正人也夫習與正人居不能無正習與不正人居不能無不正太子旣冠成人免於保傅之嚴則有記過之史徹膳之宰進善之旌誹謗之木敢諫之皷史誦詩工誦箴諫大夫進謀故年與智長化與心成夫教得而左右正則太子正矣太子正而天下定矣臣又聞之木從繩則正后從諫則聖善言古者可以驗於今伏惟殿下睿徳洪深天姿聰敏近代成敗逺古安危莫不懸覽在心動合典禮臣以庸朽濫居輔弼虚備耳目叨預股肱輒薦塵露庶禆山海伏以内置作坊工巧得入宫闈之内禁衛之所或言語内出或事狀外通小人無知不識輕重因為詐偽有玷徽猷臣望並付所司以停宫内造作如或要須便近猶望宫外安置庶得工匠往來不於宫禁出入其二曰臣聞漢文帝身衣弋綈足履革舄齊髙帝欄檻用銅者皆易以鐵經侯帶玉具劒環珮以過魏太子不視經侯曰魏國亦有寳乎太子曰主信臣忠魏之寳也經侯委劒珮而去太子使追還之謂曰珠玉珍玩寒不可衣饑不可食無遺我賊經侯杜門不出臣觀聖賢經籍務以簡素為貴皇王政化皆以菲薄為徳伏惟殿下留心恭儉靡尚浮奢臣愚猶望損之又損居簡而行簡減省造作節量用度其三曰臣聞銀牓銅樓宫闈嚴秘門閣往來皆有簿厯殿下時有所須唯遣門司宣令或恐詐假之輩因此妄為增減脫有文狀舛錯事理便即差違近日吕昇之便乃代署宣勅伏賴殿下睿敏當即覺察其姦偽自餘臣下庸淺豈能深辨真虚望請墨令及覆事行下並用内印畫署之後冀得免有詐假乃是長乆規模臣又聞之忠臣事君有犯而無隠明主馭下納諫以進徳故書云有言逆於志必求諸道有言順於心必求諸非道伏惟殿下仁明昭著聖敬日躋通幽洞微窮神索隠事之善惡毫釐靡差理有危疑錙銖無爽臣以庸愚叨侍春闈職居獻替豈敢緘黙伏乞降明離之徳俯察微誠紆洊雷之威賜矜翹懇倘得揺山益峻少海增深碎首縻軀其甘如薺輕塵視聴伏待刑書其四曰臣聞聖人不專其徳賢智必有所師故曰與善人言如入芝蘭之室乆自芬芳與不善人言如火銷膏不覺而盡伏惟殿下神逾藏往理冠生知留意篇章研精典籍然而山嶽不棄塵壤是以能髙大江河不逆細流所以成深廣伏願崇儒敬業訪道稽疑是則品物增暉懐生欣忭今司經見無學士供奉未有侍讀伏望時因侍膳奏請置人所冀講席談筵務盡忠規之道披文摘句方資審諭之勤臣又聞臣之事主必盡乃誠君之進賢務求忠讜伏惟殿下養徳儲闈理以端静為務恭膺守器必以學業為先經所以立徳修身史所以諳識成敗雅誥旣習忠孝乃成傳記方通安危斯辨知父子君臣之道識古今鑒誡之規經史為先斯乃急務至於工巧造作寮吏直司實為末事無足勞慮用原悌為太子洗馬時𤣥宗在東宫原悌上啟曰臣聞事有可言者直臣所以抗議忠而見棄者志士所以太息至於竭誠事君信而獲罪懐禄輔國諂於取容二者難明取舍或異臣竊為朝廷憂之伏惟殿下孝敬純深仁明善斷有大功於天下繼元良於社稷萬姓所以拭目百寮所以清耳皆欲王化之興隆風俗之革易也頃年以來天綱少紊小人趨競内難屢起方當振綱張弦之秋委才任士之日若推心得人則萬目直舉如托寄非所則百度斯廢故王者先擇良臣復能任使均明同日月無私並天地功髙化洽地平天成又以為官擇人者理為人擇官者亂理亂之由官人之職也自二月以來敕令授官吏部注擬填塞府寺滿盈臺省其優勞當作别敕放選或虚名邀功或非才僥倖日以增益布列州縣殫竭府庫侵削黎元臣誠以為漸不可長也昔晉政多門官以賄進劉毅憂其危傅咸恐其亂武帝終迷而不悟卒有敗官之尤十數年間億兆塗炭是知古者省吏以崇化不聞多官以致理臣以為懲其弊者歸乎任人者也故忠臣難進而易退無黨而孤立守死善道執心不移廼姦人之所嫉為國家之所利近者姚元之宋璟居獻替之職處銓衡之地用節員位頗立繩紀不為權門黷貨所拘而以平心汲引為務于時草澤之賢翹足待用天下凛然復有昇平之望也臣觀二相為人勵己忠肅直身鯁亮雖有微疵又受黜責且守正之士志節之人棄瑕録用今其時也昔叔向下獄祁奚訟之猶將宥其十世以勸能者况其身不免乎往者易之三思傾動朝政所賴柬之元忠戮力王室社稷殆危忠臣處朝而獲安神器將移賢者竭誠而必復豈非忠臣良士力哉璟等行事無忝今古夫安必思危理則憂亂明王之誡也忠臣處朝姦邪屏退興邦之道也易曰雷雨作解君子以赦過宥罪殿下誠能捨其無咎收彼衆望因主上之餘閒議朝政之臧否使並悔過令復舊職則舉善之美垂於無窮濫官之弊澄清匪日矣賈曾為太子舍人睿宗景雲三年八月太子屢遣訪召女樂宫臣就率更署閱樂多奏女妓曾進啟諫曰臣聞作樂崇徳以感神人韶夏有容咸英有節婦人䙝黷無預其間昔魯用孔子幾致於霸齊人懼之遺以女樂魯君旣受孔子遂行戎有由余兵彊國富秦人反間遺之女妓戎王躭樂由余乃奔斯大聖名賢疾之已甚良以婦人為樂必務冶容娃姣動心蠱惑䘮志上行下效淫俗將成敗國亂人實由兹起伏惟殿下神武命代文思登庸宇内顒顒瞻仰徳化而渴賢之美未被於民心好伎之聲已惑於人聴豈足追啟誦之徽烈襲堯舜之英風者哉至若監撫餘閒宴私多豫後庭之樂古或有之非以風人為敝猶隐至於所司教習章示衆寮嫚妓淫聲實虧睿化願下教令發徳音屏倡優敦雅頌率更女樂並令禁㫁諸採召一切皆停則朝野内外皆知殿下放逺邪佞輝光日新凡在含靈孰不欣戴皇太子令答曰比嘗聞公正直信亦不虚寡人近日頗尋典籍至於政化徧所留心女樂之徒亦擬禁㫁公之所言雅符本志歸登為工部侍郎東宫諸王侍讀獻龍樓箴以諷丁公著為水部員外郎充皇太子及諸王侍讀著皇太子及諸王訓十卷册府元龜卷七百十四
