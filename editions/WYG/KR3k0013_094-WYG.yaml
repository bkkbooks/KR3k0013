  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_094-1a}
body:
  text: 冊府元龜卷九十四宋王欽若等撰帝王部赦宥第十三晉髙祖天福三年十月戊戌勅曰天有四時首布和陽之命君臨萬國先𢎞曠蕩之恩所以垂眚肆之文則周基逺大示寛仁之詔則漢業興隆朕猥以眇躬獲膺大寶顧惟凉薄每懼顛躋旰食宵衣恐一夫之失所臨深履薄憂庻政之未孚雖粗致小康而未臻大化一昨灾躔沙鹿兵駐銅臺擐甲執兵頗勞師旅飛芻輓粟重困生靈頼天地垂休将相叶力克寕邦家永靜烟塵凱歌共樂於班還喜氣實騰於逺邇豈一人之感召葢羣后之扶持弓矢載櫜大慶已流於中外雷雨解作普恩宜被於寰區庶使齊民咸霑霈澤可大赦天下應十月二十五日昧爽已前除犯十惡光火殺人偽行印信官典犯贓合造毒藥屠牛鑄錢外其餘罪無輕重已結正未結正已發覺未發覺咸赦除之侵官潤已爾其有諸督責暴徴我所不忍應係省司課利塲院官等宜依近行宣命期限磨勘徴督内有送納所欠錢物得足者其違限愆罪特放如有沒納本人及保人家業盡抵外尚欠錢物更無抵當者其所欠竝與蠲放其逐人罪犯特從減等其去年降宣命月日後來欠負者不在此限昨以水旱為沴什一未均兾便蒸黎因令撿覆未明公法或彰隱漏之愆爰念小民宜示矜寛之典近令撿田有隱漏合當罪犯者並放所有合罰令陪納租税者特放竝令却依實頃畆輸納貨泉所聚徴督必行况係省之逋懸宜應期之供辦但以兵戈之後帳籍空存已行蠲放之恩尚憂未普再示優饒之命式表推恩天福元年應經兵火處州府諸色塲院因此失陷錢物等先曽指揮蠲放一半者今竝全放未曽經減放者今與蠲放一半天灾或降地分所招携老幼以流離棄田園而蕪沒深懷惻憫宜示招安蒲同晉絳滑濮魏府鎮定等州人户或經亢旱或屬兵戈逃移人户等應移户所欠今年已前諸雜税物竝特除放宜令州縣曉示招携如有復業者仍放一年秋夏租税二年諸雜差徭爰自攻圍毎多徭役或因兵死尚有户存言念傷痍屢宜優恤應差赴魏府城下人夫内有傷中身死者除已支孝贈外特放户下三年諸雜差徭勤官奉國既彰盡瘁之誠賞善酬勞爰舉必行之命應魏府側近州或曽祗應供饋或曾部領人夫當職員僚及州縣官等宜令逐處速具名銜分析申奏當與加恩區宇之表咸在炤臨疆場之間寕容隔限示王者之無外期國家之大同應淮南西川兩處邊界自今後不得阻滯商旅明堂欲構必自羣材大道曲全俱無棄物将期多士詎可遺賢累朝廢棄官員與量才叙用頃者借率猶有逋懸方務優饒豈宜徴督先率借雒京舎錢其所欠竝放七萃師徒五營吏士偶因罪負遂至逋逃念曽効於忠勤宜顯行於招誘自用軍已來應有諸軍及諸色負罪逃背諸處人等限一百日内許所在陳首竝不問罪却與放管如限内不出復罪如舊諸州府應有見禁此色人家口骨肉竝從釋放恩隆加等固有明文道在恤孤宜𢎞異渥自去年出師來諸軍将校有沒於王事者子孫竝與量才叙録臯陶五刑既從流放商王一徳用解網羅想其憔悴之容爰示哀矜之道應貶降官與量移已量移者與復資流配人等竝放還仁及枯骨澤渥重泉睠哲后之芳蹤乃有國之令典魏府管内用軍已來墳墓所毁無主者委逐處官吏指揮随事修整祭奠仍費官中支給賦歛未省杼軸猶空言念疲羸聊得蠲貸諸道州府營田户部院務省荘等天福元年秋夏租課錢帛斛㪷諸雜物色等除已納外應有逋欠竝與蠲放於戲萬靈蠢蠢生成咸頼於上𤣥六合茫茫舒慘悉由於元首朕每興念慮莫釋焦勞遂覃在宥之恩将合好生之徳朝野士庶中外臣僚體予蕩蕩之懷而賛我巍巍之治無怠於協謀戮力共期於偃革修文益勵乃誠永俾寡徳布告遐邇咸使知聞六年八月己亥帝至鄴壬寅制曰自昔聖皇明帝膺圖受命必觀風而設教或展義以省方上則順彼天道下則從其人欲朕創開基業每遵舊章期四海之混同法五載之廵狩乃睠全魏肇啟新都頃屬經綸當兹潜躍宜從望幸俾慰來蘇遂整鳴鑾旋臨舊地雷雨作解式覃曠蕩之恩日月無私用廣炤臨之道應三京新都諸道州府天福六年八月十五日昧爽已前諸色罪犯已結正未結正已發覺未發覺罪無輕重常赦所不原者咸赦除之其持杖行劫并殺人賊免罪移鄉仍配逐處軍都收管其犯枉法贓人雖免罪即不得再有任用或始因罪犯乆處竄流特行洗滌之恩各遂歸還之望應配流人并已前逢赦不在放還人等并放還徒罪年限未滿者竝放偶負瑕疵爰從黜降俾量移於近地宜漸復于舊資應貶降官等未量移者與量移已量移者約資叙進用或歲因灾沴民用艱辛乆係逋懸宜示蠲免應欠天福五年終已前夏秋税租并公徴諸色及營田租課竝與除放朕頃當開創爰在并汾或傾歸順之心首謀翊戴或擁驍雄之旅力效推崇洎汜水興妖鄴城伐罪每令致討皆立竒功漸臻開泰之期愈念艱危之際宜頒殊渥允答茂勲應河東起義之初佐命效順收復鄴都汜水立功臣僚将校等竝與加恩其亡歿者更與追贈子孫已有官職者與遷改未有身名者與叙用經過郡縣迎奉乗輿既供億以為勞宜旌酬而示寵自東京至鄴都㳂路供頓官員職掌等竝與加恩六飛行幸萬騎扈從慮旁午於路岐㣲損傷於苗稼應㳂路有傍道稍損却田苗處其合納苗子及㳂徴錢物等據畆數竝與除放載念雀臺昔居侯服撫綏六郡臨蒞四年睠彼職員依然父老無怪推恩之典仍敦尚齒之風鄴都并相澶貝博衛等州官員職掌内有頃歲潜龍時在職者竝與加恩管内耆老八十已上者竝與版受上佐官為國之規利物為本農器俾從於改革畊民必致於便宜諸道鐡冶三司先滌䟽百姓農具破者須於官塲中賣鑄時却於官塲中買鐡今後并許百姓取便鑄造買賣所在塲院不得輙有禁止攪擾擢文武之才今之急務旌孝義之行古有明文賛治道以克隆致人倫之式序山林草澤内有文才武藝為衆所推者委長吏切加捜訪具以名聞當議量才叙用孝子順孫義夫節婦竝與旌表門閭天覆地載無所不容改過自新於斯為美應亡命山澤負罪濳藏者竝放罪招携各令歸業所在切加安撫如過百日不出者復罪如初唐室忠臣鄴臺靈廟濟蒼生於一境正皇統於中區宜命褒崇用彰激勸唐梁國公狄仁傑與追贈官秩主掌曠敗錢物逋懸宜示矜容聊加蠲免應天福三年終已前諸色場院官欠負官中錢物人等累經徴理通勘實無錢物家業者竝與除放其人免罪任從逐使不得再任使無黨無偏狥至公之道去泰去甚戒求利之心私下債負徴利已及一倍者竝與除放如是主持者不在此限邊陲管界蕃部經繇言念疲羸良深軫恤祁代蔚并鎮州管界内有經蕃部踐踏却苗稼者其合納苗子㳂徴錢物等據頃畆與除放其經燒􅅡舎室殺傷人命者據户下合徴苗税竝與除放於戲居域中之大為天下之君按廵既展於盛儀渙汗宜覃於慶澤人情允洽帝道有光更期忠藎之臣永贊隆平之運布告遐邇知朕意焉七年正月戊午以收復鎮州曲赦廣晉府禁囚及襄州鎮州惡黨一百餘人少帝以天福七年六月即位七月庚子御正殿制曰古先哲王開創丕業未嘗不櫛風沐雨旰食宵衣安黔首於八紘保鴻圖於萬世恭惟先皇帝艱難啟運恭儉臨朝以武功定寰區以文徳安黎庶日慎一日無怠無荒載洽隆平永傳基構顧惟冲眇獲奉纂承念負荷以為難集哀摧而罔極期終䘮制旋逼羣情竭推戴以彌堅執讓辭而不獲勉臨大寶以御兆民宜頒在宥之文用布惟新之澤可大赦天下應天福七年七月十七日昧爽已前四京及諸道州府諸色罪犯除十惡五逆殺人强盗官典犯贓合造毒藥屠牛鑄錢諸色偽造外其餘罪犯已結正未結正已發覺未發覺咸赦除之巳前諸色配流人等除終身不齒常知所在縱逢恩赦不放還人及曽為强盗已配諸處收管人外其餘竝放還其今日已前放還人内舊有職官者量與叙用弔民伐罪用遵懲勸之恩改過自新必務含𢎞之道其襄州安從進如能果决推誠一禀朝㫖竝從捨釋各與官榮朕恭承顧命初嗣丕基而文武羣臣中外良佐肅清輦轂保佐國家備彰忠孝之心咸竭推榮之力宜覃恩渥用表旌酬在朝内外臣寮侍衛諸軍将校及諸道節度使防禦團練刺史竝與加恩修奉園陵考詳故實務遵禮典副朕孝思凡曰在官悉能陳力爰逢昌運宜示溥恩諸道賔幕将校職員見任京六品已下官州縣官三司埸院監冶帶使額者普與加恩其諸道職員押衙已上與轉官兵馬使已下與轉職懸車官秩前任職資載敦尚齒之風爰示念功之典致仕官前任文武朝臣内諸使司已下前任節度使防禦團練刺史行軍兵從少尹上佐官前諸道都指揮已下前任京六品以下官及前資州縣官帶使額場院官等竝與加恩京師職掌夙夜勤勞竭力有聞推恩無吝應在京諸司職掌亦量與恩澤奉守文之業敦孝治之風宜加幽顯之恩用慰哀榮之意内外臣僚内諸司使及侍衞諸軍指揮使已上父母在者與官封已有官封别與遷改已亡殁者竝與封贈已有封贈更與妻封贈其有郡邑國號者與進封未有者與叙封曽竭臣誠殁於王事良深悼往宜示賞延自天福元年後來文武臣僚中有殁於王事與追贈已追贈者更與加贈有子孫未有職官者與録用蝗蟲作沴苗稼重傷特示欽蠲俾令蘇息應諸道州府經蝗蟲傷食苗稼者竝差官撿覆據所損頃田與蠲放税賦仍委逐處長吏切加安撫務令存濟山林逸士草澤遺賢将禆教化之風宜廣捜羅之道應有懷才抱噐隱遁丘園者委隨處長吏切在搜訪具以名聞敦崇孝義旌顯門閭式恢王化之基用正人倫之本應有孝子順孫義夫節婦委逐處長吏具名聞奏當議旌表於戲纂繼大業司牧羣黎小心必本於舊章恭已難忘於朽索不敢逸豫以召和平更頼将相大臣文武多士遵顧託於先帝永翊戴於冲人開保延洪爰覃渥澤報告遐邇咸使聞知赦書日行五百里敢以赦前事相告言者以其罪罪之八月丁亥以襄州安從進平詔在城官員将校職掌等葢被脅從素非黨類除已送赴闕外其餘一切不問自圍閉已來餓殍不少言念㗸寃之魄宜行掩骼之文應有餓死及殺戮并安從進毁拆却墳墓暴露骸骨等竝官與埋瘞仍令致祭諸道商旅或有被安從進威脅配軍者竝仰給與公慿放歸本貫内有淮南商旅亦給與公慿放歸纂嗣之初收復之始特行軫恤用表渥恩宜令三司依此施行仍付所司九月癸未御乾明門觀襄州行營都部署髙行周等獻俘馘曲赦京城禁囚八年二月庚戌御札取今月十一日還幸東宫己未發鄴都曲赦禁囚辛酉幸澶州赦獄囚五月甲辰勑曰朕荷上天之睠命守先帝之丕基日午坐朝恐一物之失所夜分不寐思比屋之可封身雖安於九重心常懸於億兆屬飛蝗作沴膏雨乆愆流民倍切於撫安征賦頻令於蠲減未能感召深軫焦勞念獄訟之繁當炎蒸之候欲臻和氣宜去深文特行寛大之恩用叶哀矜之㫖應三京鄴都諸道州府見禁罪人除十惡行劫諸殺人者及偽行印信合造毒藥官典犯贓外人犯死罪者減一等餘竝放内有欠官錢者宜令三司酌量與限監出徴理中外遐邇宜體朕意開運元年七月辛未朔御崇元殿降制曰王者化家為國既開創以惟難纂業承基亦負荷而尤重朕䖍承遺命嗣守丕圖顧𦕈躳而懼不克堪持小心而曽無暇逸外以生靈是念内以宗社為憂若渉大川如馭朽索然猶功非及物徳不動天蟲螟為害苗之灾夷狄作亂華之患尚頼謀臣猛将義士勇夫共成戡剪之功復致澄清之運今則狂戎逃遁年榖豐登時屬小康禮當終制雖三年無改義欲化於人倫而正朔有常理宜新於鳳歴爰布改元之令仍覃在宥之恩天福九年宜改為開運元年可大赦天下應今年七月一日昧爽已前三京鄴都諸道州府見禁囚徒除十惡五逆光火劫殺屠牛鑄錢官典犯贓偽行印信合造毒藥外罪無輕重已發覺未發覺已結正未結正咸赦除之流竄之徒其實有咎和平之道亦許自新其流配人除終身不齒常知所在人外未經量移者與量移已經量移者與叙用蟲蝗灾疾之邦流夷頗甚獫狁經過之地凋弊尤深須議優饒用明軫憫其岐雍同華蒲陜涇邠耀威管内人户委長吏切在招携復業之家免一年租税魏博貝冀滄景徳等州曽經虜騎剽攘特放今年秋税其餘經過之地亦量與矜蠲乃睠親軍實推忠節或從征醜虜顯立勲勞或出討叛臣方期平定至於邊陲守戍藩鎮分屯盡繫捍防皆施勤効雖賦税未集帑藏猶虛宜示頒宣用明奨賞應将校兵士量與等第優給連年失稔常賦愆期國用未充軍須不足是行率借以濟贍供誠非欲為葢不獲已赦書到日盡時罷征出彼家財資予國力宜加甄别以示優隆出一千貫已上者特免科徭出一萬貫已上者咸授官秩無資給者與本處上佐有官名者依本品序遷竭彼臣誠沒於王事恩宜加等禮有明文當契丹侵犯之時有守城臨陣盡節亡身者宜令逐處長吏以名銜奏聞當議超加褒贈或孫或子竝與旌酬含垢匿瑕捨過宥罪前王令典有國通規應有曽行劫盗之人竝宜放罪願在軍者與配軍收管願歸農者委本縣安存務局因循職掌敗闕空係連懸之數徒行徴督之文宜示哀矜竝令除放於戲承祧繼統御極居尊雖旰食宵衣每勤庶政而利兵秣馬未息殷憂更頼四輔三公五侯九伯文武叶力上下同心竭彼忠貞佐予寡昧舉朝廷之急務盡軍旅之沉謀使鼓卧旗偃俾成寕謐同文共軌速洽隆平表乃有功致我無事閏十二月乙酉以赦青州制曰髙祖皇帝應天順人化家為國勤勞庶政安輯四方御衆以寛懷遠以徳髙秩厚禄以奨勲勞推食解衣以重賢戚至於匹夫匹婦皆被亭毒之恩草木昆蟲悉覃忠厚之徳朕恭承丕訓嗣守宗祧奉以周旋不敢失墜兢兢業業若涉大川所頼将相公卿同徳比義共扶不逮庶洽於隆平而楊光逺頃以微功驟升亞将後承偽命來拒義師始則為桀犬吠堯終則背楚降漢先皇帝方𢎞大義推以赤心忘彼仇讐歡如魚水亟承重寄久綰親軍累典大藩亦兼重鎮邇後選男尚主待之以懿親裂地封王寵之以極致人臣之盛近代無儔至於諸子之中皆擢為牧守家臣之内多有遥領郡符比外有非理邀求違法僣濫國家務存終始悉與含𢎞奈何自至滿盈不勝富貴恩深致怨物盛乃衰而輙信姦邪虛有怨望聞我大䘮之後乗我饑饉之年外則勾引蕃戎倚為勢援内則竊據城壘潜肆窺覦遂使河朔數州頓成瘡痏青丘一境獨陷罻羅朕所以命将興師弔民問罪然猶堅壁拒命自夏徂冬固執其迷自稔其惡其子楊承勲見衆情之携貳知孤壘之困窮深懷滅族之憂遂有悛心之請解其戈甲待罪軍門梟彼兇徒而傳首於闕下氛霾遽息中外同懽此皆宗社降靈乾坤眷祐将帥戮力士卒齊心掃千里之封狐不為民患除三穴之狡兎甚泰物情念彼一方未能髙枕宜行在宥用拯疲羸可取閏十二月十七日昧爽已前應諸州管内州縣見禁囚徒已結正未結正已發覺未發覺罪無輕重咸赦除之舍爵䇿勲前王之令典録功旌義有國之常規應收復青州将校兵士等一自征行再罹寒暑頻親矢石備厯艱辛賊壘既平秋毫不犯雖已行頒賚而更議甄酬厚秩美名我無愛惜其将校自副兵馬使已上員僚并監押使臣竝與加恩十将已上各賜功臣名號已有功臣者更宜改賜自楊承勲納款歸明楊光逺亦拜章請罪朝廷務𢎞恩貸而特與全生既許自新終懷憂慴遂至疾作以及亡身雖悖逆之人衆所憤怒在君臣之分朕實憫憐斷棺戮屍情所不忍其楊光逺尸首許令骨肉收𦵏楊承勲比從頑父同作不臣志力既窮覆亡可待而能轉禍為福全身保家果傾嚮義之心所謂見幾而作宜加恩澤以示奨酬其楊承勲宜與起復除授防禦使仍加官秩其一家骨肉竝放罪其弟承祚承信已在哀制放歸私第烈火焚山始識珪璋之性嚴霜殞夜方知松栢之心適當危亂之時乃見忠貞之節故淄州刺史翟進宗清風凛物貞骨凌秋當光遠跋扈之初被逆黨脅驅之際而仗節守義經死狥忠終異叛徒以及遇害雖已行褒贈而未稱朕懷宜覃延賞之恩仍示殊常之禮其翟進宗靈櫬委本處類㑹本人骨肉加禮歸𦵏𦵏事官給其子仁欽可特授官資補充東頭供奉官去順效逆頗蠧人倫濟惡助姦難逃國典前登州刺史張萬廸恩隆郡寄顯受朝恩不能事君盡忠輙敢從人於亂備彰逆節須舉明章其張萬廸宜從别勅處分尚在寛宥特免族誅其骨肉竝從釋放國家兵士恩澤頗隆賞賜以時衣糧甚厚其中有凶惡之輩輕狡之徒不顧妻孥輙背軍伍如期僥倖難逭嚴誅其青州城下兵士有走投入賊城者竝令指揮殺戮所有逐人骨肉宜從釋放叛城既下汚俗宜新同惡者皆就𠞰除詭随者竝從停廢其餘詿誤宜示矜寛其楊光遠下惡黨皆已梟首所有随幕賔從除已殺戮外餘皆配送邊遠州府常知所在終身不齒縱逢恩赦不在放還之限其在城及管内州縣鎮員僚将校曾被楊光遠脅從者一切放罪亡命之人比來懼罪所宜招諭却復耕農自楊光遠作叛已來或有鄉村百姓接便逓相劫殺逃竄山林者竝皆釋放仍委本處官吏明宣朝㫖招喚歸業如敕命到兩月不歸者復罪如初當令擒捕顯行刑戮其荘田物業亦許力及人户請射佃蒔忠力之士禀君命而不避危難良善之人入亂邦而横遭廹脅罹兹患難實可憫傷自楊光遠作叛之初應有差去使臣非理而死者如子孫量與量才叙用攻圍之際役使實煩凡有區分皆繫急速稽緩者固當抵罪辨集者豈惜酬勞應青淄登萊兖沂密鄆齊棣等州職員州縣等曽部署輦運者竝與加階減選及轉官加職軍旅所至雖切戒嚴營寨所經寕無踐食宜寛常賦以慰編甿自王師攻討逆賊大軍下寨之處所有田苗桑棗應遭蹂踐砍伐宜委本處官吏子細通撿除今年見苗供輸外來年夏税竝與放一半其去青州三里内更免今年秋夏殘租興師動衆勞費生靈或則負畚鍤以從軍或則徴輦運而赴役疲於供命不暇息肩言念蒸黎宜加優恤應青州管内及鄆齊棣兖沂密等州諸縣人户自攻討已來差役科配頻併其今年夏麥殘欠并㳂徴錢物竝與除放所有逃移户口宜令逐處長吏切加招携青州城市居人等乆經圍閉頗是凋殘楊光遠率彼資財奪其糧食至此餓殍宜示憫傷其在城見在貧民委本道以食糧賑恤所有城内屋税特放一年應洞子頭及城下夫役有遭矢石致死者宜令逐處長吏子細通勘與放二年徭役城郭之内餓殍極多墟墓之間暴骨甚衆方隆渥澤豈限幽明其青州城内餓死百姓及城外墳墓曽遭發掘者竝令本道掩藏埋瘞於戲亂常干紀天地不容負國欺君人祗共怒是知福善禍滛之道信而有徴孤恩背義之人敗不旋踵今則干戈少息海岱已寕凡在股肱更思康濟庶臻治道同享升平布告寰區咸知朕意二年五月丙申朔御崇元殿受朝制曰堯仁御極尚興丹浦之師軒后承乾亦有阪泉之戰是知五材竝用王者不能去兵四氣同功天道不能止殺朕自躬傳神器勉狥人謀戢干戈而寕耀武威撫夷狄而但修文徳而契丹見利忘義負約渝盟大為猾夏之灾屢肆窺邊之暴須為民而除害遂将命以伐戎駐五輅於大河勞六師於極塞頼乾坤祐助社稷威靈将相一心貔貅戮力致羣兇之敗衂血滿平川使元惡之奔逃魂消廣漠今則朔陲稍靜中夏小康宜上答於穹旻俾特施於赦宥用導和平之氣適符長養之風可大赦天下開運二年五月二十一日昧爽已前應三京鄴都諸道州府見禁囚徒除十惡五逆持杖殺人强盗官典犯贓合造毒藥屠牛鑄錢偽行印信外其餘罪犯已發覺未發覺已結正未結正咸赦除之諸色配流人除終身勿齒并縱逢恩赦不在放還人及曾為盗賊并自契丹内來諸色人已於諸處收管外其餘配流人并常知所在者竝放歸其開運二年正月一日後來配流人等不在放還之限兵戈之地可料傷殘惻隱之心不捨晝夜所宜優惜用恤疲羸應常定邢貝相并鄴都已北管界自今年契丹犯境已來有人户實經虜殺劫人者所通撿到夏苗十分已令減放二分苗子并㳂徴錢物今更特減放一分其今年徴正税錢物等亦與十分内減放二分行幸之時往來之處奉迎不闕供億實繁宜示渥恩以奨勤效應滑澶兩州迎奉車駕并㳂路供頓官員職掌等仰逐處具名銜申奏當與加恩出師已來遇敵之處忠烈之士皆效命以衝鋒行陣之間遂捐身而報國宜加延賞用慰貞魂應北面行營将士等除已與加恩及第支賜優應給外其有没於王事者職員宜令逐處分析聞奏當議超加褒贈子孫已有官者當與叙用其節級長行等如有親男堪充征行者宜令逐處酌量配軍收管支給衣糧戎夷侵軼驅脅吏民雖陷敵庭旋歸漢境所宜慰納以示綏懷應近北㳂邊州縣軍鎮官員職掌被契丹脅擁入蕃得便逃得歸來者竝放罪仍仰切加安撫睠彼易水最處邊陲經戎虜之攻圍頼軍民之固守将校齊一生聚保全念此忠勇宜加旌賞其易州被契丹圍逼之時應在州守把城池刺史官員職掌等仰具名銜申奏竝與加恩征討之際饋運之民不唯飛輓之勞或有抄截之患宜令存恤用示優𢎞應鎮定邢雒先差随軍運糧百姓偶有不廻者委逐處用勘如有此色其本户骨肉切加安撫免三年差徭俶擾之際輕俠之徒而偶聚盗於萑蒲遂亡命於山澤宜令招携俾復農桑訪聞鄆齊棣等州管界及河北諸縣百姓内有昨因蕃賊入界接便為非今遇安寕怕罪未來歸業者宜令逐處長吏徧行牓示告諭所有今月一日已前罪犯一切不問宜令竝放歸田業各務營生仍委縣鎮鄉村切加安撫不得恐動如告諭後過百日不來歸業仍前為惡者復罪如初逃背軍都誠為極罪誅夷家口乃是常刑将議寛矜并從捨釋應諸州府見禁及本營枷項并常知所在諸軍逃走兵士家口等竝宜釋放場院積弊官吏承寛致課額之逋懸勞朝廷之徴督乆淹刑獄深軫予懷爰示優容俾令除放其安邑解縣兩池前催塩使王居敏王景遇禁盤鹽欠折軍将兩界逋懸累年禁繫宜令三司各詳逐人所欠如有人家業錢填納者可與盡底據數納官餘欠竝本人竝放如有欠負錢物數内全無家業錢物填納者宜與免死配送邊遠諸處收管仍永不得差使所欠特放河中府雍同華陜虢等州管界内人户有欠王居敏王景遇盤鹽脚價者竝特放於戲鴈磧方秋稍息烟塵之患雞竿肆赦是覃雷雨之恩更頼文武大臣中外宿徳或决策巖廊之上或提戈軍旅之間嘗膽為懷摧凶是念速除餘孽共集殊勲克致澄清永銷氛穢仍遣赦書日行五百里敢有以赦前事相擾告者以其罪罪之布告遐邇當體朕懷冊府元龜卷九十四
