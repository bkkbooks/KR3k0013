body:
  text: 册府元龜卷九百三十二宋王欽若等撰總錄部誣搆害政之大者莫甚於誣搆之徒若髦俊之士生值昭世秉介石之操遇知己之君則讒間之言無從而入伊譖人者自貽其咎既露彼姦狀復罹其顯戮由是勵忠臣之志快天下之心蒼黔以之安皇基以之固也如其出於季世得肆巧言惑旒冕之聰明陷棟梁之賢哲國家由之䘮敗億兆以之塗炭故小雅之詩曰萋兮菲兮成是貝錦又曰讒人罔極交亂四國覽之編次得不為之痛心哉公孫閱齊人初騶忌子以鼓琴見齊威王取相印封成侯其後忌子與田忌不善公孫閱謂成侯忌曰公何不謀伐魏田忌必將戰勝有功則公之謀中也戰不勝非前死則後北而命在公矣於是成侯言於威王使田忌南攻襄陵十月邯鄲㧞齊因起兵擊魏大敗之桂陵於是齊最彊於諸侯自稱為王以令天下三十三年殺其大夫牟辛一作夫人三十五年公孫閱又謂成侯忌曰公何不令人操十金卜於市曰我田忌之人也吾三戰而三勝聲威天下欲為大事亦吉乎卜者出因令人捕為之卜者驗其辭於王之所田忌聞之因遂率其徒襲攻臨淄求成侯不勝而犇漢義陽侯衛山坐教人誑告衆列侯當時棄市罪獄未斷病死谷永成帝時為安定太守時帝諸舅皆修經書任政事平阿侯譚年次當繼大將軍鳳輔政尤與永善陽朔中鳳薨鳳病因薦從弟御史大夫音以自代帝從之以音為大司馬車騎將軍領尚書事而平阿侯譚位特進領城門兵永聞之與譚書曰君侯躬周召之徳執管晏之操敬賢下士樂善不倦下胡亞切宜在上將久矣以大將軍在故抑鬱於家不得舒憤今大將軍不幸蚤薨蚤古早字纍親疎序材能宜在君侯纍古累字纍親疏謂積累其次而計之拜吏之日京師士大夫悵然失望此皆永等愚劣不能褒揚萬分萬分之一屬聞以特進領城門兵屬近也音之欲切是則車騎將軍秉政雍容於内而至戚賢舅執管籥於外也愚竊不為君侯喜宜深辭職自陳淺薄不足以固城門之守收太伯之讓保謙謙之路太伯王季之兄也讓不為嗣而適吳越闔門高枕為知者首願君侯與博覽者參之參詳其事小子為君侯安此譚得其書大感遂辭讓不受領城門職由是譚音相與不平後病免王音用為長史音用從舅越親輔政威權損於鳳時永復説音曰將軍履上將之位食膏腴之都任周召之職擁天下之樞擁持也可謂富貴之極人臣無二天下之責四面至矣將何以居之宜夙夜孳孳孳孳不迨也孳與孜同執伊尹之彊徳以守職輔上誅惡不避親疏舉善不避仇讐以章至公立信四方章明也篤行三者乃可以長堪重任久享盛寵篤厚也享當也太白出西方六十日法當參天今已過期太白出當居天三分之一已過期言其行遲在戌亥之間尚在桑榆之間質弱而行遲形小而光微言其行遲象王音也永見音為司馬以疏間親自以位過故以太白喻司馬主兵故也是永之佞曲從茍合也熒惑角怒明大逆行守尾其逆常也守尾變也意豈將軍忘湛漸之義委曲順從湛讀曰沉漸讀曰濳周書洪範曰沉濳剛克言人性沉濳謂濳深者行之以剛則能湛也故激勸之云爾所執不彊不廣用士尚有好惡之忌蕩蕩之徳未純此永自知有忤於音故以斯言自救解方與將相大臣乖離之萌也何故始襲司馬之號俄而金火並有此變上天至明不虚見異惟將軍畏之慎之深思其故改求其路以享天意音猶是不平薦永為䕶苑使者賈恵為河内掾息夫躬邑人也哀帝時躬為光禄大夫左曹給事宜俊侯免歸國未有第宅寄居丘亭邱空也姦人以為侯家富嘗夜守之恵往過躬教以祝盗方以桑東南指枝為七桑東南出之枝畫北斗七星其上躬夜自披髪立中庭向北斗持匕招指祝盗或招或指所以求福排禍也人有上書言躬懷怨恨非笑朝廷所進候星宿視天子吉凶與巫同祝詛帝遣侍御史廷尉監逮躬繫雒陽詔獄欲掠問躬躬仰天大謼謼古呼字音大故切因僵仆吏就問云咽已絶咽喉嚨也血從鼻耳出食頃死黨友議謀相連下獄百餘人甄豐以王莽居攝時為大阿右拂拂讀曰弼甄邯為太保後承辛慶忌長子通為䕶羗校尉中子遵為函谷闗都尉少子茂為水衡都尉莽方立威柄用豐邯以自輔茂兄弟不甚詘事兩甄吕寛事起莽誅衛氏兩甄搆言諸辛隂與衛子伯為心腹有背恩不説安漢公之謀謀讀曰說於是司直陳崇舉奏其宗親隴西辛興等侵陵百姓威行州郡莽遂按通父子遵茂兄弟及南郡太守辛伯等皆誅殺之辛氏繇是廢後漢陳珪為沛相時吕布為兖州牧據濮陽郡袁術遣韓𦙍以僭號事告布因求迎婦布遣女隨之珪恐術報布成姻則徐楊合縱為難未已於是珪説布曰曹公奉迎天子輔贊國政將軍宜與協同策謀共存大計今與袁術結姻必受不義之名將有累卵之危矣布亦素怨術而女已在塗乃追還絶㛰執𦙍送許昌曹操殺之珪欲使子登詣曹操布固不許㑹使至拜布為左將軍布大喜即聽登行并令奉章謝恩登見曹操因陳布勇而無謀輕於去就宜蚤圖之操曰布狼子野心誠難久養非卿莫䆒其情偽即増珪秩中二千石拜登廣陵太守臨别操執登手曰東方之事便以相付令隂合部衆以為内應始布因登求徐州牧不得登還布怒㧞㦸斫几曰卿父勸吾協同曹操絶婚公路袁術字公路今吾所求無獲而卿父子並顯重但為卿所賣耳登不為動容徐對之曰登見曹公言養將軍譬如養虎當飽其肉不飽則將噬人公曰不如卿言譬如養鷹饑即為用飽則颺去其言如此布意乃解梁松為虎賁中郎將時伏波將軍馬援征五溪未下使松乗驛責問援為代監軍㑹援卒松宿懷不平遂因事陷之帝大怒追收援新息侯印綬王當者竇憲奴也時太僕馬光與竇憲厚善後憲誅免官就對竇氏初有事王當亡私從光乞不與恨去懷挾欲中光官捕得王當因告言光與憲有惡謀光以被誣不能自明乃自殺光死後憲他奴郭扈自出證明光憲無惡言光子朗上書迎光䘮塟舊塋詔許之李譚為車騎將軍防監營謁者時長水校尉耿恭討西羌忤防㫖及防還譚承㫖奏恭不憂軍事被詔怨望坐徴下獄免官度尚為荆州刺史尚見胡蘭餘黨南走蒼梧懼為已負乃偽上言蒼梧賊入荆州界於是徴交趾刺史張磐下廷尉辭狀未正㑹赦見原磐不肯出獄方更牢持械節獄吏謂磐曰天恩曠然而君不出何也磐因自列曰前長沙賊胡蘭作難荆州餘黨散入交趾磐身嬰甲胄渉危履險討擊凶患斬殄渠帥餘燼鳥竄冐遁還奔尚懼磐先言怖畏罪戾伏奏見誣磐備位方伯為國爪牙而為尚所枉受罪牢獄夫事有虚實法有是非磐實不辜赦無所除如忍以茍免永受侵辱之恥生為惡吏死為敝鬼乞傳尚詣廷尉靣對曲直足明真偽尚不徴者磐埋骨牢檻終不虚出望塵受枉廷尉以其狀上詔書徴尚到廷尉詞窮受罪以先有功得原裴優闗西人時張楷性好道術能作五里霧時優亦能為三里霧自以不如楷從學之楷避不肯見桓帝即位優遂行霧作賊事覺被考引楷言從學術楷坐繫廷尉詔獄積二年嘗諷誦經籍作尚書注後以事無驗見原還家趙凱為荆州刺史零陵太守楊璇梟斬猾賊郡境以清凱誣奏璇實非身破賊而妄有其功璇與相章奏凱有黨助遂檻車璇防禁嚴宻無繇自訟乃噬臂出血書衣為章具陳破賊形勢及言凱所誣狀濳令親屬詣闕通之詔書原璇拜議郎凱反受誣人之罪稽康譙國銍人初康家貧嘗與向秀共鍜于大樹之下以自贍給潁川鍾㑹貴公子也精鍊有才辯故往造焉康不為之禮而鍜不輟良久㑹去康謂曰何所聞而來何所見而去㑹曰聞所聞而來見所見而去㑹以此憾之㑹吕安被繫㑹言於文帝曰稽康卧龍也不可起公無憂天下顧以康為慮耳因譖康欲助毌丘儉賴山濤不聽昔齊戮華士魯誅少正卯誠以害時亂政故賢聖去之康安等言論放蕩非毁典謨帝王者所不宜容宜因釁除之以淳風俗帝既昵聽信㑹遂因吕安事並害之李含為河間王顒長史後顒聞三王兵盛乃加含龍驤將軍統席薳等鐡騎廻遣張方軍以應義師天子反正含至潼闗而還初梁州刺史皇甫商為趙王倫所任倫敗去職詣顒顒慰撫之甚厚含諫顒曰商倫之信臣懼罪至此不宜數與相見商知而恨之及商當還都顒置酒餞行商因與含忿争顒和釋之後含被徴為翼軍校尉時商參齊王冏軍事而夏侯奭兄在冏府稱奭立義被西藩枉害含心不自安冏右司馬趙驤又與含有隙冏將閱武含懼驤因兵討之乃单馬出奔于顒矯稱受密詔顒即夜見之乃説顒曰成都王至親有大功還籓甚得衆心齊王越親而專執威權朝廷側目今檄長沙王令討齊使先聞於齊齊必誅長沙因𫝊檄以加齊罪則冏可擒也既去齊立成都除逼建親以安社稷大勲也顒從之遂表請討冏拜含為都督統張方等率諸軍以向雒陽含屯隂盤而長沙王乂誅冏含等旋師初含之本謀欲并去乂冏使權歸於顒含因得肆其宿志既長沙勝齊顒穎猶各守藩志望未允顒表含為河南尹時商復被乂任遇商兄重時為秦州刺史含疾商滋甚復與重搆隙顒自含奔還之後委以心膂復慮重襲已乃使兵圍之更相表罪侍中馮蓀黨顒請召重還商説乂曰河間之奏皆李含所交搆也若不蚤圖禍將至矣且河間前舉繇含之謀乂乃殺含王愷武帝時為黄門侍郎愷帝之舅也時牽秀為衛瓘崔洪石崇等所提擕以新安令博士為司空從事中郎與愷素相輕侮愷諷司頴荀愷令都官誣奏秀夜在道中載高平國守土田興妻秀即表訴被誣陷之繇論愷穢行文辭亢厲于時朝臣雖多證明秀名譽繇是而損荀朂為中書監華廙少為武帝所禮為南中郎將都督河北諸軍事父表疾篤輙還仍遭䘮舊例塟訖復任廙固辭忤㫖初表有賜客在鬲使廙因縣令袁毅錄名三客各代以奴及毅以贜貨致罪獄詞迷謬不復顯以奴代客直言送三奴與廙而毅亦盧氏壻也又朂先為中子求廙女廙不許為恨因宻啓帝以袁毅貨贜者多不可盡罪宜責朂所親者一人因指廙當之又緣廙有違忤之咎遂於䘮服中免廙官削爵土王稜為雒陽令時光祿大夫劉暾妻前卒先陪陵塟子更生初婚家法婦當拜墓擕賓客親屬數十乘載酒食而行稜為東海王越所信而輕暾暾每欲繩之稜以為怨時劉聰王彌屯河北京邑危懼稜告越云暾與彌鄉親而欲投之越嚴騎將追暾右長史傅宣明暾不然暾聞之未至墓而反以正義責越越甚慚鄧攸元帝永昌中代周凱為䕶軍將軍明帝太寧二年王敦反明帝密謀起兵乃遷攸為㑹稽太守先是中外兵數每月言之於敦攸已出在家不復知䕶軍事有惡攸者誣攸白敦兵數帝聞而未之信轉攸為太常何無忌鎮東陽時殷仲文出為東陽太守無忌甚慕之仲文許當便道修謁無忌故益欽遲之令府中文人殷闡孔甯子之徒撰義搆文以俟其至仲文失志恍惚遂不過府無忌疑其薄已大怒思中傷之時屬慕容超南侵無忌言於劉裕曰桓𦙍殷仲文乃腹心之疾北虜不足為憂安帝義熈三年又以仲文與駱球等謀反及其弟南蠻校尉叔文並伏誅郭猗為前趙中僕射時聰以弟乂為皇太弟猗等皆寵幸用事靳凖合宗内外諂以事之郭猗有憾於劉乂謂劉粲曰太弟於主上之世猶懷不逞之志此則殿下父子之深仇四海蒼生之重怨也而主上過垂寛仁猶不㬱二尊之位一旦有風塵之變臣竊為殿下寒心且殿下高祖之世孫主上之嫡統凡在含齒孰不係仰萬機事大何可與人臣昨聞太弟與大將軍相見極有言矣若事成許以主上為太上皇大將軍為皇太子乂又許衛軍為大單于二王已許之矣二王居不疑之地竝握重兵以此舉事事何不成臣謂二王兹舉禽獸之不若也背父親人人豈親之今乂尚貪其一切之力爾事成之後主上豈有全理殿下兄弟故在忘言東宫相國單于在武陵兄弟何肯與人許以三月上已因讌作難事淹變生宜早為之所春秋傳曰蔓草猶不可除况君之寵弟乎臣屢啓主上主上性敦友于謂臣言不實刑臣刀鋸之餘而蒙主上殿下成造之恩故不慮逆鱗之誅每所聞必言冀垂採納臣當入言之願殿下不泄密表其狀也若不信臣之言可呼大將軍從事中郎王皮衛軍司馬劉惇假之恩顧通其歸善之路以問之必可知也粲深然之猗密謂皮惇曰二王逆狀主上已具知之矣卿同之乎二人驚曰無之猗曰此事必無疑吾憐卿親舊并見族爾於是欷歔流涕皮惇大懼叩頭求哀猗曰吾為卿作計卿能用不二人皆曰謹奉大人之教猗曰相國必問卿卿但云有之若責卿何不先啓卿即答云臣誠負死罪然仰惟主上聖性寛慈殿下篤於骨肉恐言誠詿偽故也皮惇許諾粲俄而召問二人至不同時而辭若畫一粲以為信然初靳凖從妹為乂孺子淫于侍人乂怒殺之而屢以嘲凖凖深慚恚説粲曰東宫萬機之副殿下宜自居之以領相國使天下知蚤有所繫望也至是凖又説粲曰昔孝成距子政之言使王氏卒成簒逆可乎粲曰何可之有凖曰然誠如聖㫖下官亟欲有所言矣但以徳非更生親非皇族恐言暫出霜威已及故不敢耳粲曰君但言之凖曰聞風塵之言謂大將軍衛將軍及左右輔皆謀奉太弟尅季春搆變殿下宜為之備不然恐有商臣之禍粲曰為之奈何凖曰主上受信於太弟恐卒聞未必信也如下官愚意宜緩東宫之禁固勿絶太弟賓客使輕薄之徒得與交游太弟既素好待士必不思防此輕薄小人不能無逆意以勸太弟之心小人有始無終不能如貫高之流也然後下官為殿下露表其罪殿下與太宰拘太弟所與交通者考問之窮其事原主上必以無將之罪罪之不然今朝望多歸太弟主上一旦晏駕恐殿下不得立矣於是粲命卜抽引兵去東宫邢魚河間人後趙時裴憲二子挹㲄㲄仕石季龍為散騎常侍與魚有隙魚竊乗㲄馬奔叚遼為人所獲魚誣㲄使已以季龍當襲鮮卑告之為備于時虎適謀伐遼而與魚辭正㑹季龍遂誅㲄及兄挹而憲亦坐免索嗣為梁王叚業右衛將軍初西凉李暠為敦煌太守嗣為暠稱藩于業業以元盛為安西將軍敦煌太守領䕶西胡校尉及業僭稱凉王嗣搆暠于業以嗣為敦煌太守率騎五百而西暠與嗣善結刎頸交反為所搆故深恨之後狀其罪于業遂殺嗣宋王鎮惡既平姚泓進號征虜將軍或有白高祖以鎮惡初克長安蔵姚泓偽輦為有異志高祖密遣人覘輦所在泓輦飾以金銀鎮惡悉剔取而棄輦於垣側高祖聞之乃安及廬陵王義真鎮闗中而佛佛虜寇逼交至沈田子既殺鎮惡王修又殺田子義真年少賜與左右不節修嘗裁减之左右並怨因是白義真曰鎮惡欲反故田子殺之修今殺田子又是欲反也義真乃使左右劉乞等殺修劉湛為太子詹事與殷景仁素善皆被遇於高祖俱以宰相許之湛尚居外任㑹王宏王華王曇首相係亡景仁引湛還朝共參政事湛既入以景仁位遇本不踰已而一旦居前意甚憤憤知文帝信仗景仁不可移奪乃深結司徒彭城王義康欲倚宰相之重以傾之文帝元嘉十二年景仁復遷中書令䕶軍將軍將軍僕射如故尋復以僕射領吏部䕶軍如故湛愈忿怒義康納湛言毁景仁於帝帝遇之益隆景仁對親舊嘆曰引之令入入便噬人乃稱疾解職表疏屢上不見許使停家養病發詔遣黄門侍郎省疾湛議欲遣人若刼盗者於外殿殺之以為太祖雖知當有以終不能傷至親之愛帝微聞之遷景仁於西掖門外晉鄱陽主第以為䕶軍府密邇宫禁故其計不行景仁卧疾者五年收湛之日景仁使拂拭衣冠寝疾既久左右皆不曉其意其夜上出華林園延賢堂召景仁猶稱脚疾小牀與以就坐其誅討處分一皆委之謝靈運為太子左衛率廬陵王義真少好文籍與靈運情欵異常少帝即位權在大臣靈運搆扇異同非毁執政司徒徐羡之等患之帝出為永嘉太守鎮將軍孟顗為㑹稽太守時謝靈運以侍中退居郡中頗輕顗所為遂搆讐隙顗因靈運横恣百姓驚擾乃表其異志發兵自防露板上言靈運馳出京師詣闕上表曰臣自抱疾歸山于今三載居非郊郭事乖人間幽栖窮巖外緣两絶守分養命庶畢餘年忽以去月二十八日得㑹稽太守臣顗二十七日疏云此日異論噂􅊱此雖相了百姓不許寂黙今微為防披疏駭惋不解所繇便星言奔馳歸骨陛下及經山隂防衛彰赫彭排馬搶斷截衢巷偵邏縱横戈甲竟道不知微臣罪為何事及見顗雖曰見亮而装防如此惟有罔懼臣昔忝近侍豫蒙天恩若其罪迹炳明文字有證非但顯戮司敗以正國典普天之下自無容身之地今虚聲為罪何酷如之夫自古讒謗聖賢不免然致謗之來要有繇趣或輕死重氣結黨聚羣或勇冠鄉邦劍客馳逐未聞俎豆之學欲為逆節之罪山栖之士而搆陵上之釁今影迹無端假謗空設終古之酷未之或有匪希其生實悲其痛誠復内省不疚而抱理莫申是以牽曳疾病束骸歸欵仰憑陛下天鑒曲臨則死之日猶生之年也臣憂怖彌日羸疾發動尸存恍惚不知所陳太祖知其見誣不欲使東歸以為臨川内史加秩中二千石南齊卞彬為員外郎宋元徽末四貴輔政彬謂太祖曰外間有童謡云可憐可念户著服孝子不在日代哭列管暫鳴死滅族户著服褚字邉衣也孝除子以日代者謂褚淵也列管簫也彬退太祖笑曰彬自作此梅䖝兒後主時佞幸也曹武為右衞將軍晩節在雍州致見錢七十萬皆厚輪大郭他物稱是馬八百匹僕妾蔬食膳無膏腴為䖝兒茹法珍設女伎金翠曜眼器服精華䖝兒等繇是欲誣而奪之人傳武每好風景輙開庫招拍張武戱帝疑武舊將領兼利其財新除未拜遇誅及收兵至歎曰諸人知我無異志所以殺我者欲取吾財貨伎女爾恨令衆軰見之諸子長成者皆見殺惟子世宗兄弟三人未冠繫尚方梁武帝兵至得免江祐為太子詹事為謝眺所輕祐常詣眺眺因言有一詩呼左右取既而便停祐問其故云定復不急祐以為輕已後祐及第祝劉渢劉晏俱候晀眺謂祐曰可謂帶二江之䨇流以嘲弄之祐轉不堪至是搆而害之詔暴其過惡收付廷尉又使御史中丞范岫奏收眺下獄死時年三十六胡諧之為侍中既居權要多所徴求就梁州刺史范栢年求佳馬栢年患之謂使人曰馬非狗子那可得為應無極之求使人致恨而歸謂諧之曰栢年云胡諧是何傒狗無厭之求諧之切齒致恨時王𤣥邈代栢年栢年稱疾推遷不時還諧之言於帝曰栢年恃其山川險固聚衆欲擅一州及栢年下帝欲不問諧之又言見獸格得而放上山於是賜死垣榮祖遷為新蔡太守作大形棺材盛仗使鄉人田天生王道期載渡江北監奴有罪告之有司奏免官削爵付東治按無實見原梁劉季連齊明帝建武中為平西蕭遥欣長史南郡太守時明帝諸子幼弱内親則仗遥欣兄弟外親則倚后弟劉暄内弟江祏遥欣之鎮江陵也意氣甚隆而遥欣至州多招賓客厚自封殖明帝甚惡之季連族甥琅琊王㑹為遥欣諮議參軍美容貎頗才辯遥欣遇之甚厚㑹多所傲忽於公座與遥欣競侮季連季連憾之乃密表明帝稱遥欣有異迹明帝納焉乃以遥欣為雍州刺史明帝心徳季連四年以為輔國將軍益州刺史令據遥欣上流顧珖之為儀曹郎張率為秘書丞以父憂去職有父時伎數十人其善謳者有色貎珖之求聘焉謳者不願遂出家為尼常因齋㑹率宅珖之乃飛書言與率姦南司以事奏聞高祖惜其才寝其奏然猶致時論焉到洽為御史中丞時劉孝綽為昭明太子僕甚見賓禮及為廷尉卿携妾入官府洽素䘖孝綽遂劾奏之云携少妹於華省棄老母於下宅高祖為隠其惡改妹為姝坐免官後起為湘東王諮議孝綽表謝曰臣不能銜珠避顛傾柯衞足以兹疎幸與物多忤兼逄匿怨之友遂居司𨽻之官交搆是非用成萋菲日月昭囘俯明枉直獄書每御輙鑒􅃽濟之寃炙髪見明非闗陳正之辨遂漏斯密網免彼嚴棘得還同士伍比屋唐民生死肉骨豈侔其施臣誠無識孰不戴天疎逺畝隴絶望高闕而降其接引優以㫖喻於臣微物足為榮隕况剛條落葉忽沾雲露周行所寘復齒盛流但雕朽汚糞徒成延奨捕影繫風終無效答又啓謝東宫曰臣聞之先聖云衆惡之必鑒焉衆好之必鑒焉豈非孤特則積毁所歸比周則積譽斯信固知好惡之間必待明鑒故晏嬰再為阿宰而前毁後譽後譽出於阿意前毁繇於直道是以一犬所噬㫖酒怨其甘酸一手所揺嘉樹變其生死又鄒陽有言士無賢愚入朝見嫉至若臧文之下展季靳尚之放靈均絳侯之排賈生平津之陷主父自兹厥後其徒實繁曲筆短辭不暇殫述寸管所窺常用切齒殿下晦道觀書俯同好學前載枉直備該神鑒臣昔因立侍親承緒言飄風貝錦譬猶讒匿聖㫖慇懃深以為歎臣資愚履直不能杜漸防微曽未幾何逄訧離難雖吹毛洗垢在朝而同嗟而嚴文峻法肆姦而必奏不顧賣友志欲要君自非上帝運超已之光昭陵陽之虐舞文虚謗不取信於宸明在縲嬰纒幸得蠲於庸闇裁下免黜之書仍頒朝㑹之㫖小人未識通方縶馬懸車悉絶朝覲方願滅影消聲遂移林谷不悟天聽罔已造次必彰不以距違見疪復使引藉雲陛假寛和之色垂布帛之言形之千載所蒙已厚况乃恩等特召榮同起家望古自推彌覺多忝但未渝丹石永蔵輪軌相彼工言搆兹媒孽且欵冬而生已凋柯葉空延徳澤無謝陽春復為太子僕母憂去職服闋除安西湘東王諮議册府元龜卷九百三十二
