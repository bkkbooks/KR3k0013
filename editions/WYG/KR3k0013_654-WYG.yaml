body:
  text: 冊府元龜卷六百五十四宋王欽若等撰奉使部奬恩名望亷愼知禮奬恩商誥有懋賞之文周書有報功之典皆所以奬勵羣品申其智力者也若乃􅈾使乎之選將天子之命奉辭無辱察亷不私適變制宜而事以堪濟宣威布惠而下皆柔服殊俗畏禀王靈暢洽還奏合旨機用周宻既專對而加敏且獲考而有光斯可以使於四方謂之士矣繇是疇其閥閲形於恩紀寵之以爵秩優之以賜予便蕃渥縟以示敦勸蓋夫載馳於役勤足以稱出境安國任斯為重至於褒賞之數又豈限乎彛等哉漢陸賈以客從高祖時中國初定尉佗平南越因王之高祖使賈賜佗印為南越王賈說令稱臣奉漢約歸報高祖大悦拜賈為大中大夫蓋寛饒宣帝時為大中大夫行風俗多所稱舉貶黜奉使稱意擢為司𨽻校尉陳咸成帝時為冀州刺史奉使稱意徴爲諫大夫平當為博士給事中使行流民幽州使者十一人為最遷丞相司直樓䕶為諫大夫使郡國使還奏事稱意擢為天水太守後漢杜詩為侍御史安集洛陽將軍蕭廣放縱詩格殺廣還以狀聞光武召見賜以棨㦸宋均為謁者㑹武陵蠻反圍武威將軍劉尚詔使均乗傳發江夏奔命三千人徃救之既至而尚已沒乃矯制調伏波司馬吕种守沅陵長命种奉詔書入虜營告以恩信因勒兵隨其後蠻夷震怖即共斬其大帥而降於是入賊營散其衆遣歸本郡為置長吏而還均未至先自劾矯制之罪光武嘉其功迎賜以金帛令過家上冡其後毎有四方異議數訪問焉雷義順帝時守灌謁者漢官儀謁者三十五人以郎中秩滿嵗稱給事不滿嵗稱灌謁者使持節督郡縣國行風俗太守令長坐者凢七十人旋拜侍御史第五種桓帝時以司徒掾清詔使冀州三公府有清詔員以承詔使也亷察災害還以奉使稱職拜高宻侯相蜀簡雍與先主有舊隨從周旋徃來使命先主入益州劉璋見雍甚愛之後先主圍成都遣雍徃説璋璋遂與雍同輿而載出城歸命先主拜雍為昭徳將軍吳是儀大帝時為侍中使蜀申固盟好奉使稱意拜尚書僕射晉侯史武帝時為散騎常侍與皇甫陶荀廙持節循省風俗及奏事稱㫖轉城門校尉宋裴松之為國子博士文帝元嘉三年誅徐羡之等分遣大使巡行天下松之甚得奉使之義轉中書侍郎南齊蘇侃為冠軍録事參軍時巴西人李承明作亂高帝議遣侃衘命慰勞還除武寧監加建武將軍劉係宗武帝初為寧朔將軍白賊唐㝢之起宿衛兵東討遣係宗隨軍慰勞還帝曰此役有征無戰以時平蕩百姓安帖甚快也賜係宗錢帛茹法亮永明初為龍驤將軍詔曰茹法亮近在湓城頻使衘命内宣朝㫖外慰三軍義勇齊奮人百其氣險阻艱難心力俱盡宜沾茅土以甄忠績封望蔡縣男食邑三百户裴昭明為祠部通直郎永明三年使後魏武帝謂之曰以卿有將命之才使還當以一郡相賞還為始安内史陳徐儉為中書侍郎太建初廣州刺史歐陽紇舉兵反宣帝令儉持節喻㫖紇初見儉盛列仗衛言辭不恭儉曰呂嘉之事誠當已遠將軍獨不見周廸陳寳應乎轉禍為福未為晩也紇黙然不答懼儉沮其衆不許入城置儉於孤園寺遣人守衛累旬不得還紇嘗出見儉儉謂之曰將軍業已舉事儉湏還報天子儉性命雖在將軍將軍成敗不在於儉幸不見留紇於是遣儉從間道馳還高宗仍以儉悉其勢形敕儉監昭逹軍紇平帝嘉之賜奴婢十人米五百斛除鎮北鄱陽王諮議參軍兼中書通事舍人後魏公孫表初為慕容冲尚書郎道武時歸朝以使江南稱㫖拜尚書郎李順為四部尚書時使沮渠􅂪遜知􅂪遜將死又聆其對敏辨太武大悦於是賜絹千疋廐馬一乗進號安西將軍高允弟推為散騎常侍使宋南人稱其才辯遇疾卒於建業朝廷悼惜之喪還贈輔國將軍臨邑子謚曰恭賜命服衣冠允為之作誄古弼明元時為獵郎使長安稱㫖轉門下奏事李佐字季翼孝文初以兼散騎常侍衘命高麗以奉使稱㫖還拜常山太守賜爵真定子王嶷字道長為南郡大夫出使巡察青徐兖豫撫慰新州觀省風俗遷南部尚書韋珍為尚書郎㑹蠻首桓誕歸欵珍奉使招慰之凡所招降七萬餘户置郡縣而還以奉使稱㫖除左將軍樂陵鎮將賜爵覇城子崔賢為中書侍郎延興中受詔使齊州觀省風俗行兖州事以功賜爵桐廬縣子栁崇為尚書外兵郎中屬荆郢新附南冦窺擾詔崇持節與州郡經畧兼加慰諭還遷太子洗馬本郡邑中正張彛為散騎常侍兼侍中持節巡察河南十二州甚有聲稱使還以從征之勤遷尚書封軌太和中為儀曺郎中使高麗先是契丹虜掠邉民六十餘口又為高麗擁掠東歸軌具聞其狀移書徴之高麗王雲悉資給遣還有司奏軌遠使絶域不辱朝命權宜曉慰邉民來蘇宜加爵賞詔曰權宜徴口使人常體但光揚有稱宜賞一階轉考功郎中堯暄為南部尚書于時始立三長暄為東道十三州使更比户籍賜獨車一乘廐馬四匹鹿悆字永吉莊帝為御史中尉悆為殿中侍御史時梁豫章王綜以徐州降悆請為使以觀其虛實悆入徐州盟約乃固綜降後詔曰日者法僧父子頑固自天長惡不已竊城外叛職此亂階遂使彭宋名籓翻為賊有雖宗臣名將揮戈於泗濵虎士雄卒竦劍於汴渚然髙墉峻堞非可易登廣涘深隍實為難踐是用日昃忘食中宵憤惋者也而衍衍謂梁武帝都督豫章王蕭綜體運知機欲歸有道潛遣宻信送欵於都督臨淮王于時事同夜光能不案劍殿中侍御史監軍鹿悆不憚虎口視嶮若夷便能占募人騐虚實誓盟既固所圖遂果返地復城息我兵甲亦是悆之力焉若不酬以榮禄何以勸勵將來可封定陶縣開國子食邑三百户除員外散騎常侍王静為冠軍將軍岐州刺史趙郡王謐虐害城民怨叛詔静以驛慰諭咸即降下以奉使稱㫖賜帛五百疋邢祐為員外散騎常侍使於宋以將命之勤除建威將軍後周宇文測初仕後魏為司徒右長史孝武疑齊神武有異圖詔測詣太祖言令宻為之備太祖見之甚歡使還封廣川縣伯邑五百户楊檦仕西魏為撫軍將軍時東魏遷鄴太祖欲知其所為乃遣檦間行詣以觀察之行還稱㫖授通直散騎常侍車騎將軍楊薦為太祖帳内都督時蠕蠕請和親遣薦與楊寛厚并結婚而還進爵為侯岑善方初為梁元帝刑獄參軍元帝初請内附以善方兼記室充使詣周應對嫻敏深為太祖所嘉自此徃來凢數十反高祖特録善方充使之功追其子之利之象入朝授之利都督代王記室參軍之象掌式中士王慶為中將軍使吐谷渾與其分疆仍論和好之事後使突厥属其可汗暴殂突厥謂慶曰前後使來逢我國䘮者皆􅋇靣表哀况今二國和親豈得不行此事慶抗辭不從突厥見其守正卒不敢逼武帝聞而嘉之録慶前後功遷開府儀同三司兵部大夫陸逞為司宗中大夫属北齊遣侍中斛斯文畧中書侍郎劉逖來聘初修鄰好盛選行人詔逞為使主尹公正為副以報之逞美容止善詞令敏而有禮齊人稱焉還届近畿武帝詔令輅車儀服郊迎而入時人榮之隋元暉初仕周為武伯下大夫使突厥結和親又武帝之聘突厥后也令暉致禮焉加司憲大夫後平關東使暉安集河北封義寧子邑四萬户長孫晟仕周為司衛上士送千金公主于突厥周察山川形勢部衆强弱皆盡知之時高祖作相晟以狀白高祖高祖大喜遷奉車都尉辛彦之在周為開府儀同三司奉使迎突厥皇后還賚馬二百匹賜爵龍門縣公邑千户賀若誼初仕周為直閣將軍使茹茹約其連和還太祖嘉之拜車騎大將軍畧陽公府長史韋師仕周為河北道行䑓兵部尚書詔於山東河南十八州安撫大使奏事稱㫖賜錢三百萬蘇孝慈仕周為都督聘于齊奉使稱㫖遷大都督其年又聘于齊還授宣納上士栁裘周末為内史大夫高祖總百揆詔裘諭并州總管李穆穆甚悅遂歸心於高祖裘後以奉使功賜綵三百匹金丸環𢃄一腰栁莊仕後梁為鴻臚卿高祖踐祚莊入朝高祖深慰勉之及為晉王納妃于梁莊因是徃來四五反前後賜物數千叚長孫平開皇中為工部尚書時突厥逹頭可汗與都藍可汗相攻各遣使請援高祖使平持節宣諭令其和觧賜縑三百疋良馬一匹而遣之平至突厥所為陳利害遂各觧兵可汗贈平馬二百疋及還進所得馬帝盡賜之裴矩為内史侍郎時啟民可汗初附令矩撫慰之還為尚書左丞房彦謙為監察御史陳平奉詔安撫泉括等十州以衘命稱㫖賜物百叚米百石衣一襲奴婢七口栁彧為治書侍御史持節巡省河北五十二州奏免長吏􅂍汚不稱職者二百餘人州縣肅然莫不震懼高祖嘉之賜絹布二百疋氊三百領拜儀同三司仁夀初復持節巡省太原道十九州及還賜絹百五十疋許善心為禮部侍郎煬帝大業初副納言楊逹為冀州刺史稱㫖賜物五百疋盧昌衡為金州刺史奉詔持節為河南道巡省大使及還以奉使稱㫖授儀同三司賜物二百叚栁謇之大業中為光禄少卿時啟民可汗自以内附遂畜牧於定襄馬邑間煬帝使謇之諭令出塞及還奏事稱㫖拜黄門侍郎唐襄武郡公琛高祖為唐王時使突厥結和親還高祖大悦進封郡王鄭元璹武徳中以太常卿使突厥還高祖勞之曰卿在邊庭累載拘繫蘇武弗之過也拜鴻臚卿貞觀中復使突厥說頡利引軍還太祖致書慰之曰知公已共可汗結和遂使邉庭停警烽火不然和戎之功豈止魏絳金奏之錫故當非遠崔敦禮為兵部侍郎頻使突厥以功加銀青光禄大夫崔琳為鴻臚卿𤣥宗開元十九年以奉使入蕃特加御史大夫寵之也信安郡王禕與嗣魯王道堅牛仙客宋詢劉日正班景倩唐炤等為諸道採訪使開元二十四年各賜一子官賞其巡察之勞也李暠為工部尚書東郡留守使吐蕃稱職轉兵部尚書李孝芳為御史大夫充和蕃使代宗廣徳三年使還加禮部尚書録功也崔倫前為御史中丞大厯四年以使絶域功為尚書左丞崔漢衡為撿校禮部員外郎大厯六年為和吐蕃副使還遷右司郎中徳宗建中二年吐蕃請盟詔除殿中少監兼御史大夫為和吐蕃使㑹宰相張鎰與吐蕃盟於清水使還遷鴻臚卿四年吐蕃使朝貢加檢校工部尚書復使吐蕃興元初居奉天吐蕃遣師佐渾瑊敗朱泚兵於武功以功轉檢校兵部尚書兼秘書監西京留守李紓貞元初為兵部侍郎時誅李懐光兵㑹河中詔紓宣慰以勵節將還報合㫖拜吏部侍郎樊澤貞元中為都官員外充吐蕃和蕃使回遷金部郎中山南節度行軍司馬盧羣為兵部員外郎使淮西以奉使稱㫖俄遷為檢校秘書少監義成軍節度行軍司馬房式為給事中將命河朔式厯使諸鎮諷諭之還奏愜㫖除陜虢觀察使班宏為給事中使成徳軍李惟岳惟岳厚賂之宏皆不受還報合㫖遷刑部侍郎關播為都官員外郎時湖南山洞中王國良聚衆為盗令播徃宣諭之使回改兵部員外郎袁滋為工部員外郎貞元十四年西川韋臯始通西南夷蠻長異牟尋貢琛請吏朝廷方命使慰撫選郎吏可行者皆以西南之遠憚之滋獨不辭徳宗深嘉之以本官兼中丞持節入南詔未行遷祠部郎中使如故使還擢為諫議大夫栁晟為檢校工部尚書憲宗元和初充入廻鶻弔祭册立使復命遷金吾大將軍孟簡為司封郎中元和四年使荆襄湖南宣撫時簡衣緑遣使追賜緋袍銀魚裴度為御史中丞元和十年五月自淮西行營宣慰還言軍事多合帝意加兼刑部侍郎柏耆將軍良噐之子元和中王承宗再以恒山叛朝廷稍厭武事思用恩澤濡煦耆以處士於淮西行營以畫干裴度願為是行承宗果請質二男獻兩郡憲宗酬其功使除右拾遺胡証為金吾大將軍穆宗即位以太和公主出降回鶻証以本官檢校工部尚書充和親使光禄少卿李憲為副使還証拜工部侍郎憲遷檢校右散騎常侍兼太府卿崔瑝為監察御史敬宗寳厯元年自鎮武使回鶻延英對問遠地言朕如何瑝對曰四方皆言陛下納諫如流帝大悦命賜緋魚袋後唐薛仁謙為通事舍人莊宗即位三聘於吳得使乎之體遷衛尉少卿引進副使晉劉昫高祖時為給事中天福四年與給事中盧重自契丹使還頒賜噐幣馮道為相以天福四年二月與左散騎常侍韋勲禮部員外郎楊昭儉自契丹使廻帝慰勞隆至錫賚豐厚邉光範為給事中天福八年與前登州刺史郭彦威使於契丹各賜紫欹正旋襕衣著五十疋綵一百疋錢五十貫文銀鞍轡馬一匹周裴羽初仕後唐為吏部郎中末帝清泰年再奉命閩州還賜金紫遷太常少卿名望周官載行人之職漢家嚴使者之制厯世妙揀式克允濟若乃持節殊俗展幣與國或奉案察之寄是總黜陟之權故有行實素優才用顯著為他境之欽信見所至之欣慕敦成隣好暢逹威聲罔失一介之辭無辱大臣之命藹然後望昭乎令譽豈憚煩於脂牽實増輝於原隰者矣漢張騫為郎應募使月氐匈奴得之留十餘嵗歸漢拜大中大夫後封為愽望侯漢通西域騫鑿空鑿開也騫始開通西域道也空孔也猶言始鑿其孔以行故此下言當空道而西域傳謂孔道也諸後使徃者皆稱慱望侯以為質於外國質信也外國由是信之後漢周舉為諫議大夫順帝永和六年詔遣風俗巡行皆選素有威名者乃拜舉為侍中與侍中杜喬守光禄大夫周栩前青州刺史馮美尚書欒巴侍御史張綱兖州刺史郭遵大尉長史劉班並守光禄大夫分行天下其刺史三千石有贓罪顯明者驛馬上之墨綬以下便輙收舉其有清忠惠利為百姓所安宜表異者皆以狀上於是八使同時俱拜天下號曰八俊蜀費禕為昭信校尉使吴大帝甚噐之謂禕曰君天下淑徳必當股肱蜀朝恐不能數來也晉羅憲仕蜀為太子舍人宣信校尉再使於吴吳人稱焉李宻少仕蜀為郎數使吳宻有才辯吳人稱之梁范縝仕齊為尚書殿中郎武帝永明中與魏氏和親嵗通聘好特簡才學之士以為行人縝及從弟雲蕭琮瑯邪顔㓜明河東裴昭明相繼將命皆著名鄰國陳阮卓為徳教殿學士副王話聘隋隋主夙聞卓名乃遣河東薛道衡瑯邪顔之推等與卓談論賦詩厚禮遣還陸琰為直嘉徳殿學士兼通直散騎常侍副瑯邪王厚聘齊及至鄴下而厚病卒琰自為使主時年二十餘風神韶亮占對閒敏魏太原王陸叡與隴西公元琛並持節為東西二道大使褒善罰惡聲稱聞於京師游明根假員外散騎常侍冠軍將軍樂安侯使於宋宋使明僧暠相對前後三反宋武稱其長者迎送之禮有加常使王椿為征虜將軍都督慰勞汾胡汾胡與椿比州服其聲望所在降下宋弁為中書侍郎兼員外常侍使於南齊南齊司徒蕭子良秘書丞王融等皆稱美之以為氣槩謇烈不逮李彪而體韻和雅舉止周䆳過之李系少聰慧有才學為司徒諮議參軍兼散騎常侍使梁與其二兄前後將命時人稱之北齊魏收為通直散騎常侍副王昕使梁昕風流文辯收詞藻富逸梁主及其羣臣咸皆敬異先是南北稱和李諧盧元明首通使命二人才噐並為鄰國所重至此梁主稱曰盧李命世王魏中興未知後來復何如李渾為光禄大夫兼常侍聘使至梁梁武謂之曰伯陽之後久而彌盛趙李人物今實居多常侍曽經將領今復充使文武不墜良屬斯人李湛字䖏元渾子也渉獵於文史有家風為太子舍人兼常侍聘陳渾與弟繪偉俱為聘梁使至湛又為使副是以趙郡人士目為四使之門崔瞻為散騎常侍聘陳瞻辭韻温雅南人大相欽服乃言常侍前朝通好之日何意不來其見重如此後周崔彦穆為御正大夫陳氏請敦鄰好詔彦穆使焉彦穆風韻閒曠噐度方雅善𤣥言甚為江表所稱唐李大亮為凉州都督貞觀八年發十三道大使巡省天下大亮持節使劍南激濁揚清甚獲當時之譽馬懐素為禮部員外郎與源乾曜盧懐慎李傑等充十道黜陟使素處事平恕當時稱之亷慎夫使於四方古所慎擇亷以自守行之惟艱矧復交兩國之懽將出疆之命或巡行風俗或勞倈戎狄而操心有素執節彌厲臨財無茍秉義益高斯固皇皇有光使乎之美者矣陳阮卓為鄱陽王録事時平歐陽紇交阯夷獠徃徃相聚為冦抄卓奉使招慰交阯通日南象郡多金翠珠貝珍怪之産前後使者皆致之唯卓挺身而還衣裝無佗時論咸伏其亷北齊李繪初仕東魏典散騎常侍為聘梁使前後行人皆通啟求市繪獨守清尚梁人重其亷潔袁聿修武成太寧初以太常少卿出使巡省仍命考校官人得失經厯兖州時邢邵為刺史别後遣送白紬為信聿修退紬不受與邢書云今日仰過有異常行𤓰田李下古人所慎多言可畏譬之防川願得此心不貽厚責邢亦欣然領觧報書云一日之贈率爾不思老夫忽忽竟不及此敬承來旨吾無間然弟昔為清郎今日復作清卿矣唐蘇世長為天䇿府學士太宗貞觀初聘于突厥與頡利争禮不受賂遺朝廷稱之杜暹為監察御史𤣥宗開元中承詔徃磧西覆究安西副都䕶郭度瓘與西突厥可汗史獻鎮守使劉遐慶筭不叶更相執奏至磧西蕃人賫金以遺暹暹固辭不受左右曰公遠使絶域不可失蕃人情暹不得已受之埋於幕下既去出境乃移牒令收取之蕃人大驚度磧追之不及歸崇敬代宗大厯初為倉部郎中充册立新羅王使故事使新羅者至海東多有所求或擕資帛而徃貿易貨物䂓以為利崇敬一皆絶之東夷稱重其徳關播徳宗貞元中為刑部尚書充送咸安公主及册可汗使奉使來徃皆清儉謹慎蕃人悅之趙退翁貞元中為給事中充咸安公主出降廻紇副使前後使廻者迄多私齎繒絮蕃中市馬還以䂓利退翁無所營求人歎美之馮伉貞元中為膳部員外郎澤潞節度使李抱真卒充弔贈使抱真男遺伉帛數百疋不納又專送至京伉因表奏固請不受後唐郭崇韜自莊宗為晉王時為中門使專典機務及李存審牧鎮州帝命崇韜慰撫之三軍閱府庫或有以珍貨遺賂者韜都無所受但以書籍數千卷歸陳乂性孤執尤亷於財明宗長興中嘗自舍人衘册晉國公主石氏於太原晉高祖善待之但訝其高岸人或有獻可於乂宜陳一謳頌以稱高祖之美可邀其厚賄耳乂曰人生貧富咸有定分未有持天子命違禮以求利既損國綱且虧士行乂今生所不為也聞者嘉之知禮古人有言曰明君之使臣也任以事而不制以辭是知膺四牡之榮通二國之好茍非知禮勤王之士博聞强識之流豈能宣揚徳美恊和親鄰是以張旃入境拭玉通好動咸遵於彛典言必恊於令則俾乎聳觀不倦逖聽無譏増輝於夲朝變風於殊俗斯則見重於識者揚芳於史氏不其宜哉管仲齊大夫齊侯使仲平戎於王魯僖公十二年使隰朋平戎於晉平和也前年晉敕周伐戎故戎與晉周不和王以上卿之禮饗管仲仲辭曰臣賤有司也有天子之二守國高在國子高子天子所命為齊守臣皆上卿也若節春秋來承王命何以禮焉節時也陪臣敢辭王曰舅氏伯舅之使故曰舅氏余嘉乃勲應乃懿德謂督不忘徃踐乃職無逆朕命功勲美徳可謂正而不可忘者不言位而言職者管仲位卑而執修政故欲以職尊之管仲受下卿之禮而還管仲不敢以職自高卒受本位之禮君子曰管仲之世祀也宜哉讓不忘其上詩曰愷悌君子神所勞矣周公閱襄王時為宰周公天子三公冢宰聘于魯魯僖公三十年饗有昌歜白黑形鹽昌歜昌蒲葅白熬稻黒熬黍形鹽形象虎辭曰國君文足昭也武可畏也則有備物之饗以象其德薦五味羞嘉糓鹽虎形嘉糓熬稻黍也以象其文也鹽虎以象武也以獻其功吾何以堪之孟獻子魯大夫聘於周宣公九年定公以為有禮厚賄之韓宣子晉大夫聘於周魯宣二十六年靈王使請事問何事來聘對曰晉士起將歸時事於宰旅無佗事矣起宣子名禮諸侯大夫入天子因稱士時事四時貢職宰旅冢宰之下士言獻職貢於宰旅不敢斥尊王聞之曰韓氏其昌於晉乎辭不失舊阜大也言周衰諸侯莫能如禮唯韓起不失舊其後韓宣子如楚送女反魯昭公五年鄭伯勞諸圉圉鄭地名辭不敢見禮也奉使君命未反故叔弓魯大夫聘于晉昭公二年晉侯使郊勞聘禮賔至近郊君使卿勞之辭曰寡君使弓來繼舊好固曰女無敢為賔徹命於執事敝邑𢎞矣徹遥也敢辱郊使請辭辭郊勞致館辭曰寡君命下臣來繼舊好好合使成臣之禄也得通君命則於已為榮敢辱大館敢不敢叔向曰子叔子知禮哉吾聞之曰忠信禮之噐也卑讓禮之宗也宗猶主也辭不忘國忠信也謂稱舊好先國後已卑讓也始稱敝邑之𢎞先國也次稱臣之禄後已也詩曰敬慎威儀以近有德夫子近德矣明年叔弓如滕𦵏滕成公子服椒為介及郊遇懿伯之忌敬子不入忌怨也懿伯椒之叔父敬子叔弓也叔弓禮椒為之辟仇惠伯曰公事有公利無私忌椒請先入乃先受館敬子從之惠伯子椒也服言叔弓之有禮弃疾楚公子也如晉魯昭公六年過鄭鄭罕虎公孫僑游吉從鄭伯以勞諸祖辭不敢見不敢當國君之勞祖鄭地固請見之見如見王見鄭伯如見楚王言弃疾賢而有禮以其乗馬八匹私面私見鄭伯見子皮如上卿如見楚卿以馬六匹見子産以馬四匹見子大叔以馬二匹降殺以兩禁芻牧采樵不入田不犯田種不樵樹不采蓻蓻種也不抽屋不强匄誓曰有犯命者君子廢小人降君子則廢黜不得居位小人則退給下劇也舍不為暴主不慁賔慁患也徃來如是鄭三卿皆知其將為王也公孫青齊大夫青頃公之孫盗殺衛侯之兄縶公如死鳥齊侯使青聘于衛魯昭公二十年既出聞衛亂使請所聘公曰猶在竟内則衛君也乃將事焉遂從諸死鳥請將事辭曰將事行聘事亡人不佞失守社稷越在草莽吾子無所辱賔曰寡君命下臣於朝曰阿下執事阿比也命已使比衛臣下臣不敢貳貳違命也主人曰君若惠顧先君之好照臨敝邑鎮撫其社稷則有宗祧在言受聘當在宗廟也乃止止不行聘事衛侯固請見欲與青相見不獲命以其良馬以為相見之禮見為未致使故也未致使故不敢以客禮見衛侯以為乗馬喜見敬已故貴其物賔相掫掫行反主人辭曰亡人之憂不可以及吾子草莾之中不足以辱從者敢辭賔曰寡君之下臣君之牧圉也若不獲扞外役是不有寡君也有相親友臣懼不免於戻請以除死親執鐸終夕與於燎芋尹蓋陳大夫楚子西子期伐吳魯哀公十五年及桐汭宣城廣德縣西南有桐水出白石山西北入丹陽湖陳侯使公孫貞子弔焉弔為楚所伐及良而卒良吳地將以尸入聘禮若賔死未將命則既歛於棺造於朝介將命吳子使太宰嚭勞且辭曰以水潦之不時無乃廪然隕大夫之尸廪然傾動貌以重寡君之憂寡君敢辭上介芉尹蓋對蓋貞子上介曰寡君聞楚為不道薦伐吳國薦重也滅厥民人寡君使蓋備使弔君之下吏備猶副也無禄使人逢天之慼大命隕墜絶世于良絶世猶言弃世廢日共積廢行道之日以共具殯斂所積聚之用一日遷次一日便遷次不敢留君命今君命逆使人曰無以尸造于門是我寡君之命委于草莾也且臣聞之曰事死如事生理也於是乎有朝聘而終以尸將事之禮朝聘道死以尸行事又有朝聘而遭䘮之禮遭所聘之䘮若不以尸將命是遭䘮而還也無乃不可乎以禮防民猶或踰之今大夫曰死而弃之是弃禮也其何以為諸侯主謂主盟也先民有言曰無穢虐士虐士死者備使奉尸將命茍我寡君之命逹于君所雖殞于深淵則天命也非君與渉人之過也吳人内之言芉尹蓋知禮蜀陳震字孝起建興中為尚書令吳稱尊號以震為衛尉賀權踐阼諸葛亮與兄瑾書曰孝起忠純之性老而益篤及其賛述東西歡樂和合有可貴者震入吳界移關候曰東之與西驛使徃來冠蓋相望申盟初好日新其事東尊應保聖祚告燎受符剖判土宇天下響應各有所歸於此時也以同心討賊則何冦不滅哉西朝君臣引領欣賴震以不才得充下使奉聘叙好踐界踊躍入則如歸獻子適魯犯其山諱春秋譏之望必啟告使行人睦焉即日張旅誥衆各自約誓順流漂疾國典異制懼或有違幸必斟誨示其所宜吳紀陟大帝遣奉使如魏入境而問諱入國而問俗宋袁湛晉末為尚書左僕射時高祖北伐湛兼太尉與兼司空散騎常侍尚書范㤗奉九命禮物拜授高祖冲讓湛等隨軍至雒陽住栢谷塢㤗議受使未畢不拜晉帝陵湛獨至五陵致敬時人美之後周趙文表為車騎大將軍使突厥迎皇后進山儀注皆令文表典之文表斟酌而行皆合禮度冊府元龜卷六百五十四
