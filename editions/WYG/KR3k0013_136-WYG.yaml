body:
  text: 册府元龜卷一百三十六宋王欽若等撰帝王部慰勞周禮小行人之職國師役則犒之所以省䘏罷勞激勵壯武也詩云我姑酌彼金罍維以不永懐又以均錫宴飲昭示慈恵也自小雅之作厥義彌著施及後世斯可槩舉若乃遣帥徂征宿兵在野邊候方警戍守斯乆迨夫弔伐弭寧振旅凱入則必親迓戎輅廵省和門亦復臨遣將臣申諭恩㫖是古者撫士慰下勞還勤歸之道也至於敦諭反側綏懐冦亂安輯降附案覆詿累咸政之大者良可述焉周文王為西伯之時以殷王之命命將率遣戍役以守衛中國故歌采薇以遣之出車以勞還杕杜以勤歸又使臣以王事徃來於其職於其來也陳其勤苦以歌樂之故作四牡詩漢髙祖初為漢王二年十一月自廣武之間西入闗至櫟陽存問父老置酒留四日復如軍文帝六年匃奴大入邊以宗正劉禮為將軍軍覇上祝兹侯徐厲為將軍軍棘門以河内守周亞夫為將軍軍細柳以備胡帝自勞軍魏明帝景初二年司馬宣王為太尉帥師討公孫文懿于遼東既平天子遣使者勞軍于薊齊王正始二年司馬宣王破呉軍追至三州口斬獲萬餘人收其舟船軍資而還天子遣中常侍勞軍於宛嘉平三年司馬宣王帥中軍至丼城縳王凌以歸京師天子遣侍中韋誕持節勞軍于五池髙貴鄉公丼露元年七月安西將軍鄧艾大破蜀大將姜維於上邽詔曰兵未極武醜虜摧破斬首獲生動以萬計自頃戰克無如此者今遣使者犒賜將士大㑹臨饗飲宴終日稱朕意焉陳留王即位使侍中衛瓘慰勞河北晉武帝太康元年三月龍驤將軍王濬平呉詔遣使者犒濬軍又遣兼侍中張側黄門侍郎朱震分使揚越慰其初附穆帝永和十年桓温北伐進至覇上符徤以五千人深溝自固居人皆安堵復業持牛酒迎温於路者十八九耆老感泣曰不圖今日復見官軍初温恃麥熟取以為軍資而徤芟苗清野軍粮不屬收三千餘口而還帝使侍中黄門勞温於襄陽海西公太和四年桓温北伐至枋頭為慕容􅂷所敗温甚耻之歸罪於袁真表廢為庻人真怨温誣已據壽陽以自固潜通苻堅慕容暐帝遣侍中羅含以牛酒犒軍於山陽使會稽王昱㑹温於涂中簡文咸安二年詔曰吾承祖宗洪基而昧於政道懼不能允釐天工克隆先業夕惕惟憂若渉淵水頼宰輔志徳道濟伊望羣后竭誠恊契斷金内外盡翼賛之䂓文武致匪躬之節兾因斯道終克𢎞濟每念干戈未戢公私疲悴藩鎮有疆理之務征戍懐東山之勤或白首戎陣忠勞未叙或行役彌乆擔石靡儲何嘗不昧旦晨興夜分忘寢雖未能撫而廵之且欲逹其此心可遣大使詣大司馬并問方伯逮于邊戍宣詔大饗求其所安又籌量賜給悉分周普孝武大元八年謝𤣥謝琰桓伊等破苻堅詔衛將軍謝安勞旋師于金城後魏孝文太和十七年十二月帝罷南伐廵省六軍宣武正始三年四月詔遣使者廵慰北邊酋庻永平元年鎮北將軍李坪討京兆王愉於兾州既平宣武遣兼給事黄門侍郎秘書丞元梵宣㫖慰勞孝明孝昌元年徐州刺史元法僧叛入于梁梁遣其豫章王蕭綜入據彭城時安豐王延明為大都督大行䑓率臨淮王彧等衆軍討之既而蕭綜降附徐州清復遣散騎常侍常景兼尚書持節馳與行䑓都督觀機部令時尚書令蕭寳寅都督崔延伯都督北海王顥都督車騎將軍元嘗芝等並各出持詔詣軍宣㫖勞問又撫軍將軍兼行䑓尚書源子雍破賊大破蕭寳寅仡單歩胡提于曲沃堡帝璽書勞勉之子雍在白水郡復破阿非軍于白水郡多所斬獲詔遣侍中尚書令城陽王徽於潼闗宣㫖慰勞廢帝普泰初以李裔為持節散騎常侍安北將軍兼給事黄門侍郎慰勞山東大帥出帝永熈三年五月丁酉帝幸華林都亭集京城都督及軍士三千餘人慰勉之後周太祖為西魏相國大統八年十月北齊神武以衆攻玉璧城晉州刺史韋孝寛拒之苦戰六旬神武夜遁太祖嘉孝寛功令殿中尚書長孫紹逺左丞相王悦至玉璧勞問授驃騎大將軍武帝保定四年十月詔大冡宰䕶等伐齊丁卯幸沙苑勞師癸酉還宫建徳五年東伐十二月次於晉州初齊攻晉州恐王師卒至於城南穿塹自喬山屬於汾水庚戌帝帥諸軍八萬人置陣東西二十餘里帝乘嘗御馬從數人廵陣處分所至輙呼主帥姓名以慰勉之將士感見知之恩各思自勵隋煬帝以仁壽四年即位八月并州總管漢王諒反詔左僕射楊素并州道行營總管討平之帝遣素弟脩武公約齎手詔勞素曰我有隋之御天下也於今二十有四年雖復外夷侵叛而内難不作脩文偃武四海晏然朕以不天衘恤在疚號天叩地無所逮及朕本以藩王謬膺儲副復以庸虛纂承鴻業然天下者先皇之天下所以戰戰兢兢弗敢失墜况復神噐之重生民之大哉賊諒包藏禍心自㓜而長羊質虎皮假託名譽不奉國諱先圖叛逆違君父之命成莫大之罪誑惑良善委任姦囬稱兵内侮毒流百姓私假署置擅相謀戮小加大少凌長民怨神怒衆叛親離為禍不同同歸於亂朕寡兄弟猶未忍言是故開闗門而待冦戢干戈而不發朕聞之天生蒸民為之置君仰惟先㫖毎以子民為念朕豈得枕伏苫廬顛而不救也大義㓕親春秋髙義周旦以誅二叔漢啓乃戮七藩義在兹乎事不獲已是以授公戎律問罪太原且逆子賊臣何代不有豈意今者近出家國所歎荼毒甫爾便及此事繇朕不能和兄弟不能安蒼生徳澤未𢎞兵戈先動賊亂者止一人塗炭者乃衆庶非唯寅畏天威亦乃孤負付屬薄徳厚耻愧乎天下公乃先朝功臣勲庸克茂至如皇基草創百物惟始便匹馬歸朝誠識兼至汴部鄭州風捲秋蘀荆南塞北若火燎原早建殊勲夙著誠節及獻替朝端具瞻惟允爰弼朕躬以濟時難昔周勃霍光何以加也賊乃竊據蒲州闗梁斷絶公以少擊衆指期平殄髙壁據嶮抗拒官軍公以深謀出其不意霧廓雲除氷消瓦觧長驅北邁直趣巢窟晉陽之南蟻徒數萬諒不量力猶欲舉斧公以稜威外討發憤於内忘身殉義親當矢石兵刅蹔加魚潰烏散僵屍蔽野積甲若山諒遂守窮城以拒鈇鉞公董率驍勇四面攻圍使其欲戰不敢求走無路智力俱盡面縳軍門斬將搴旗伐叛柔服元惡既除東夏清晏嘉庸茂績於是乎在昔武安平趙淮隂空齊豈若公逺而不勞速而克㨗者也朕殷憂諒闇不得親御六軍未能問道於上庠遂使劬勞於行陣言念於此無忘寢食公乃建累世之元勲執一心之確志古人有言曰疾風知勁草世亂有誠臣公得之矣方乃銘之常鼎豈止書勲竹帛哉功之克諧哽歎無已稍令公如宜軍旅務殷殊當勞慮故遣公弟指宣徃懐迷塞不次素上表陳言曰臣自惟虛薄志不及表州郡之下敢憚劬勞卿相之榮無階覬望然時逢昌運王業維始㳙流赴海誠心屢竭輕塵集嶽功大人㣲徒以南陽里閭凡沛子弟髙任位重爵榮顯一時遂復入處朝端出總戎律受文武之預帷幄之謀豈曰才能實繇恩澤欲報之徳義極昊天伏惟陛下詔重日之明養繼天之徳收臣於踈逺炤臣以光輝南服入就道之書春宫奉肅成之㫖然草木無心尚榮枯候時况臣有心寔自効無路晝夜廽徨寢食怵􅅥嘗恐朝露奄至虛負聖慈賊諒包藏禍心有自來矣因幸國哀便肆凶逆興兵晉代揺蕩山東陛下㧞臣於日流授臣以戎律䝉心腹之寄禀平亂之規蕭王赤心人皆為死漢皇大度天下争歸妖冦廓清豈臣之力曲蒙使臣弟約齎詔書問勞髙㫖峻筆有若天臨洪恩大澤同于海運雖百殞無以自酬唐髙祖初為唐王隋義寧二年四月勞東都旋師於長樂宫武徳元年十月遣右武候大將軍龎玉率師西討帝幸開逺門勞將士而還十一月秦王征薛仁杲凱旋帝享勞旋師三年四月秦王平并州帝遣司農卿韋雲起勞軍四年三月益州道行營僕射竇軌率兵擊東都帝引其將校五百人宴賜而遣之四月皇太子討張長遜廽班師帝於𤣥武門宴勞將士賜帛各有差五月王世充降遣尚書右僕射裴寂持節勞軍又遣侍中陳叔逹齎百牢上罇酒醼勞秦王於近郊五年十二月皇太子建成與劉黒闥戰於魏州城下破之黒闥抽軍北遁詔尚書右僕射裴寂馳徃勞之六年十月秦王屯并州以備突厥及班師帝迎勞於忘武頓太宗貞觀十六年遣安西都䕶郭孝恪伐焉耆虜其王齒龍突騎帝大恱璽書勞之曰知破焉耆虜其偽王功立威行深副所委但焉耆絶域地阻天山恃逺慿深敢懐叛逆卿望崇位重報效情深逺渉沙塲躬行罰罪取其堅壁曾不崇朝再廓遊魂遂無遺冦緬思竭力必大艱辛超險成功深足嘉尚十九年帝征遼二月李勣所領之衆頓於幽州詔遣通事舎人盧師讓齎壐書詣軍中勞勉之將士咸悦二十年六月平薛延陁詔曰朕聞獯獫強暴歴代憑凌結晦闗都凝氣大漠家山宅野時獸聚而禽分幕毳廬氊乍蠭屯而集塞退因利飽進為財饑前王弊其貪殘中夏憚其薦食然而三䇿知慮非為禦冦之方千里長城豈謂靜邊之計故以百王靡服千古不賔種落實繁姦革孔熾武徳之際飲馬渭濵貞觀之初敢恣凌逼朕載懐慷慨命將出師旗皷一臨沙漠大定雪涇陽之周耻報白登之漢讐截瀚海以開池籠天山而築苑其餘醜䫫自巳覊縻勞我邊甿軫余遐念將奮鈇鉞受命上𤣥延陁惡積禍盈今日夷㓕醜徒内潰㓙黨外離契苾送欵來降其餘相率歸附唯僕骨同羅猶懐假息氷消雹碎匪夕伊朝豈朕威思所懐故乃蒼旻之恵觀賊此勢何能自全今不乘機恐貽後悔故欲暫徃靈州親自招撫安邊靜亂下固甿基一軌同文永𢎞家業使萬里之外不有半烽百郡之中猶無一戍永絶鎮防之役豈非黎元樂見雖復去歲東征士馬倦勞甫施京邑曾未踰年今秋復行理多疲頓但以良藥苦口非病者丼之而人必焉思去膏肓之疾私種弊力豈農夫樂焉而必履之求其倉庫之益斯皆忍小惡而成大美就輕害而得殊功朕積疾累時今尚虛惙必欲牽疴就路以赴天機百辟士庻幸勿辭也遼東從兵皆不差發布告天下悉朕意焉二十二年三月庚戍遣通事舎人韋燀徃使歸兵道行軍宣慰士衆是年右武候将軍梁建方擊松外蠻破之其帥盛遂稽六請降遣首領十人來謁軍門建方振旅而還及至帝勞其勤苦賜以上駟髙宗永徽四年十月以睦州女子陳碩真率衆反揚州長史房仁裕平之詔刑部尚書唐臨馳傳案覆被詿誤者悉免之人吏為賊所殺者官為殯歛龍朔元年遼東道行軍揔管蘇定方㧞百濟之貞都城其王義慈來降遣左衛郎將王文庻齎璽書慰勞定方已下將士及百濟百姓各令安堵如舊有才者節級録用若能便經畧髙麗者委定方揀擇將士可否聞奏𤣥宗開元三年三月遣兵部員外郎王上客刑部員外郎楊欽明等分徃諸軍宣慰將士四年十二月命衛尉少卿李暠齎璽書慰勞朔方降户九年九月詔曰如聞鹽夏兩州百姓及六州胡等被胡賊殺掠宜令御史韓朝宗皇甫翼齎書分徃慰問便復損數其被損之家務令存恤應須給貸蠲免量事處置訖廽日奏聞十二年七月以黔州道招討使内侍楊思朂討溪州賊帥有功特加輔國大將軍兼内侍禄俸防閤一事已上並依品級宴思朂以下立功將士於朝堂謂曰蠻夷不道賊害平人卿等竭誠一舉而定窮深盡險罔不率從徃返若飛當甚勞弊各賜卿少物宴畢領取十五年凉州都督王君㚟破􅄍蕃凱旋詔置酒朝堂宴之及將士等並賜物有差帝謂君㚟及將士等曰􅄍蕃小醜敢懐逆命趣窺亭鄣以逞凶狂卿等智勇夙彰軍威克振纔整旗鼓屢翦渠魁深入冦庭當甚勞耳十六年二月乙未令朔方節度副大使左金吾大將軍信安郡王禕宣慰嶺南二十六年十月壬申命侍御史陳繇使於劔南安戎城宣慰將士勑曰吐蕃醜䫫背約孤恩卿等同嫉冦讐為國展效深入賊境乆冐難危至於勤勞豈不知委頃聞左彼小有䘮敗卿等非不盡力自是主將無謀古之用兵在於責帥王昱縁此亦已貶官卿等但湏悉心不可因兹阻氣遞相激勵以保功名戰亡之人深可憫惜並申弔祭用慰幽魂其病醫及陣亡之家宜委陳繇與州縣相知優恤天寳十四年十一月命榮王琬為元帥東征安禄山帝御勤政樓宴將士肅宗至徳元年十月皇弟頴王璬陳王珪自蜀至上皇有詔慰問朝臣及將士等代宗寳應元年冬以初平河朔拜宗正少卿李涵左庶子兼御史中丞河北宣慰使廣徳二年正月以尚書右丞顔真卿為刑部尚書兼御史大夫充朔方宣慰使永泰元年七月遣尚書左丞李涵以本官兼御史大夫於河北道宣慰大厯二年九月詔曰河朔一隅地方千里外捍夷狄内輔成周撫勤王之師脩任土之貢顧其方鎮可謂崇重眷我侯伯實有勲勞且將相朕之股肱兆庶君之支體事同休戚寧忘鍳寢思撫廵而未獲念征鎮而永懐爰命宗臣徃申㫖諭銀青光禄大夫行尚書左丞襄武縣開國公李涵朕之茂親腹心攸寄純固所以致命文質所以經邦温恭禮讓誠信易直勵匪躬之節秉憂國之心美其公才當所委任再令宣撫皆合事宜既述慊誠之詞兼陳理化之績慰我憂念意甚嘉之今秋冬在候徭戍勤止將校有介胄之勞黎元有税賦之役代予親問詔爾使臣仍兼副相之勞式重登車之務可兼御史大夫充河北宣慰使三年六月命兵部侍郎李涵兼御史大夫充河北道宣慰使以幽州之難故也六年八月命左散騎常侍孟皥使河北道宣慰八年八月辛未幽州盧龍節度觀察等使檢校左散騎常侍幽州大都督府長史朱泚遣弟滔領防秋兵馬五千騎至自幽州詔發六軍將士千餘騎迓於國門許便道繇皇城南面出開逺門赴涇州行營命有司大置酒於開逺門宴慰遣之騎卒精鋭冠絶諸軍道路觀者如堵十年正月命内侍孫知古使於魏州宣慰因曉示田承嗣各守封疆徳宗建中四年三月遣太子太師顔真卿宣慰淮寧節度李希烈十二月帝在奉天加給事中孔巢父兼御史大夫淄青宣慰使以潼闗防禦鎮國軍使華州刺史董晋為國子祭酒兼御史大夫河北宣慰使興元元年正月帝在奉天以兵部員外郎李充兼御史中丞鎮兾宣慰使四月帝在梁州以屯田郎中沈房為太常少卿兼御史中丞諸蕃計㑹及安西北庭宣慰使六月乙巳詔曰朕獲承先顧付以大噐懼徳不類貽列聖羞䖍恭惕厲罔敢暇逸將期布令齊一致俗和平然而誠信未孚衆心遂阻理化乖當百度失中君臣之間欝堙不逹致冦雖深於罪已興戎尚昧于省躬思靖亂以濟人反勞師而黷武行者被殺傷之苦居者重齎送之勤四海騷然靡有寧處京邑之下轉軸亦空環列之中徴發靡息畧内以勤逺居安而忘危賊臣誘姦乘間竊發豺狼穢于宫闕士庻䧟于塗炭作威肆毒仇視我人萬姓嗷嗷呼天無告有隕踣以抗節有脅從以假命且一夫不獲辜實在予况君臨萬邦作人父母既不克以覆育又從而咎之其心愧耻一食三歎出舎内省介于梁岷庻乎有瘳以答譴戒皇天悔禍社稷降靈腹心爪牙奮謀宣力元惡稔慝脱身遁逃餘孽拒威所向摧殄掃氛沴而闢閶闔翦鯨鯢以清郊原函夏載寧室家相慶非我將相夾輔王室卿士交脩予違軍旅恊心畢命盡敵豈伊寡昧克復興運戡定大難念之感懐宜令吏部侍郎班宏充宣慰使勞問將士撫諭蒸黎必躬必親如朕臨蒞朕整飭法駕即日還京䇿勲行賞大報忠烈銘功百代與國同休然後請罪祖宗不敢自蔽宣布中外明朕意焉七月命給事中兼御史大夫孔巢父宣慰於河東諸軍貞元元年六月以兵部侍郎李紓宣慰于河東諸軍中書舎人齊映宣慰于朔方河中同絳陜虢等州諸軍兵部尚書崔漢衡宣慰于幽州二年四月淮西李希烈平命尚書左丞鄭叔則徃淮西宣慰詔曰自希烈叛命於今五年王澤不通下情亦沮所宜宣我信命以釋危疑敷我恵和以慰傷瘵滌清汙俗咸與惟新底綏一方以稱朕意十六年七月以徐州張建封卒其子㥉為將校所廹俾領軍務詔擇臨難不懾者即其軍以諭之遂命吏部員外郎李鄘為宣慰使憲宗元和元年正月庚午詔萬年縣令薛彤赴彰義軍宣慰二年八月戊寅命給事中房式充幽州成徳義武等軍宣慰使時三節度劉濟王士貞張茂昭各持宿嫌交惡聞於朝故有是命四年八月命京兆少尹裴武宣慰於鎮州十二月以太府卿鄧泳為東道行營諸軍宣慰使左武衛大將軍田景度為北道行營諸軍宣慰使十年正月丙戌以左羽林軍李文通為左金吾衛將軍兼御史中丞充壽州宣慰使十一年五月丁亥易定節度使渾鎬以累敗承宗之衆上聞即日命使宣勞六月庚子命給事中柳公綽宣慰于淄青右補闕張宿為判官八月命尚書右丞許孟容宣慰汴宋陳許河陽行營諸軍十一月己巳命比部員外郎張宿宣慰隨唐等州軍十三年正月庚寅命諌議大夫張宿徃淄青宣慰李師道以起居舎人唐敬休為副宿至東都暴卒命左常侍李遜宣慰于淄青仍依前以唐敬休副之十四年二月壬戌魏愽田𢎞正奏淄青兖鄆十二州平詔户部侍郎楊於陵以本官兼御史大夫充淄青宣撫使六月癸酉制曰周禮政官之屬掌導王志以廵天下之邦國六郡統臨二庭緜邈居必申儆動當懾懐自頃東夏有虞近郊多壘沙朔之外剪為冦戎亭障烽櫓之嚴遐張塞下使譯道途之要逺屬湟中今妖氛甫清師旅方息思欲肅闗隴之右地制昆夷於盛秋而慮師無見粮卒有虛籍乏守禦之全備積愁歎之餘音臨軒永懐宜俾宣導非夫忠良練逹文武兼資信厚足以得人心恪恭足以奉王事則何以膺兹選任布我憂勞至於問戍役之勤詳山澤之要稽軍實之名數計餽餉之盈虛宿弊有未除衆情有未逹兵機虜態一以上聞兾在此行所至循拊宜令左金吾衛大將軍兼御史大夫胡証充京西京北廵邊使所經過州鎮與節度防禦使刺史審量利害具事實聞奏因程异之請也穆宗以元和十五年正月即位二月命監察御史楊虞卿盧周仁髙銖路羣分徃京西京北監賞設將士十月成徳軍節度王承宗卒弟承元宻獻忠欵命起居舎人栢耆徃鎮州宣慰十一月命諌議大夫鄭覃徃鎮州宣慰以起居舎人王璠副之長慶元年正月丁巳以京兆府司錄參軍温造為太原鎮州等道宣慰使以王承元請入朝也二月辛未命給事中韋𢎞景為容州邕州安南宣慰使監察御史杜周士副焉九月辛亥遣太子中允兼侍御使李寮徃幽州宣慰二年正月命太子中允李寮宣慰深州及魏博行營以鎮州兵亂殺節度使田𢎞正而牛元翼不從亂固守深州也二月詔雪鎮州王廷凑仍令兵部侍郎韓愈充宣慰使又命户部郎中崔䕶宣慰於昭義軍時劉悟為昭義節度監軍劉承偕頗恃恩權嘗對衆辱悟又縱其下以亂法悟不能平異日有中使至承偕宴之請悟悟欲徃左右皆曰徃則必為其困辱矣軍衆因亂悟不止之遂擒承偕至牙門殺其二傔欲并害承偕悟救之獲免故有慰撫之命七月甲寅命司勲郎中崔䕶均王府長史李彦璋分徃昭義魏博兩道宣慰又以汴州李㝏叛命光祿少卿李寮宣撫汴州文宗太和元年十一月天平横海等軍節度使烏重𦙍卒命呉守志宣慰鄆州仍領繒帛五萬疋就賜軍士以鄆帥新歿撫而安之也二年二月辛亥命司封郎中王彦魏博宣慰五月命左散騎常侍馮宿徃河南道行營宣慰以滄州李同㨗拒命而諸軍進討也七月命諌議大夫柏耆徃昭義宣慰十二月又命柏耆徃魏博宣慰仍與河陽滑州計㑹發軍便以兩處兵勢曉喻魏博將士令知赴救之師四面皆至三年正月命鴻臚卿張賈徃昭義魏博宣慰三月命諌議大夫柏耆徃徳州城下宣慰五月命給事中崔琯徃幽州宣慰中書舎人韋詢徃徳州宣慰四年正月勑諫議大夫崔戎宜充劔南西川宣撫使以南蠻入寇也二月興元三軍作亂節度使李絳及家並被處置訖命給事中崔琯充山西道宣慰使户部員外郎嚴謇為副又命中使先義逸赴興元宣慰武宗㑹昌三年七月以御史中丞李回使幽鎮魏三道時中書奏云秋氣已至將議進軍幽州須早取可汗鎮魏須速平劉楨各要遣使諭㫖兼探三鎮軍情今日延英面奉聖㫖欲遣張賈充使臣等商量張賈幹濟有才甚諳軍中體勢然性氣稍直慮不安帖恐不如且輟李回充使若以䑓綱不可暫闕即兵部侍郎鄭淮乆充戎鎮判事精敏雖無詞辨言亦分明官重事閒最似相稱帝乃以李回使焉昭宗乾寧二年十二月以前大理卿李埛為黔中宣慰使制曰將我詔命使於四方必惟其人矧乃舊服咨於輔相僉曰汝諧用之不疑行矣思濟李埛國朝名相之令嗣也文行噐業雅有家風政事規為克紹先志踐履函便於中外練逹深得其本根頃鎮黔江洽聞善政四年問俗五郡懐仁恩信被於昆夷盛名振於縣道尋移旌盖徃理桂林載揚休聲屢著嘉績兩地遺愛萬人去思今聞黔巫易帥之時頗失睦隣之道慮成間隟又動干戈念逺俗之無辜向中宵而不寐昇爾揆路為吾使星尚念漢地人情必懐龔遂河内風俗未忘冦恂宜其宣我憂勤導予宵旰强者抑之弱者撫之無俾黔人又堕塗炭用爾專逹膺予簡求佇其嚮風聞爾稱職殊恩好爵無所恡焉後唐莊宗同光四年二月丁巳遣宣徽使宋唐玉徃鄴都宣諭諸軍明宗天成二年四月有内臣自荆南至云暑雨方甚兵士苦之及劉訓有疾是日差孔循徑徃勞問及續賜孔循詔曰朕以荆門伐叛方委勲臣而聞統帥縈切戎機勤劬王事致乖攝理深軫寤懐輟卿樞近之繁逹我優隆之㫖固於旬朔已就宣和苟或尚未全平且要暫還本道便於將息亦可允俞委卿精白凡事詳酌審於凖節庻恊籌謀料度攻收撫綏軍旅咸繄明畧更集殊庸倚注之心再三在念九月戊午北面屯戍上言經夏戰馬多死是日出内廐馬三百匹賜之帝猶慮邊將憂慮召來人慰諭之曰盛夏酷熱人尚多疾其况馬邪但令勉於王事無以此為恐仍以槍劔賜其主將又曰㳂路芻粟舘驛相接爾慎勿擾人三年六月命閤門使馮知兆徃定州犒宴將校末帝清泰元年十二月壬申遣李譲勲馳騎代北犒享防邊將士三年八月詔端明殿學士吕琦徃河東代諸屯戍犒軍晉少帝天福九年三月契丹至河北帝親征駐蹕澶淵丙午先鋒指揮使石公覇遇敵數萬騎於戚城之北為敵所圍髙行周符彦卿在戚城之東南方息於林下忽聞敵至駭愕督軍而進纔數千騎衆寡不較行周遣人馳告景延廣請益師延廣遲留候帝進止既而行周等為賊圍之數重三人大譟瞋目奮擊敵衆傷死者甚衆帝自御親兵援之前軍獲免帝登戚城南古䑓置酒以勞二將漢髙祖天福十二年十月討杜重威於魏府二十日帝乘馬環城幸副部署慕容彦超尚洪千聶章周殷等營遍加撫喻衆心咸懌十一月將伐鄴壬午車駕次長垣因賜宰臣竇貞固蘇逄吉蘇禹珪李濤及從官食帝曰朕少親戎馬險阻艱難備嘗之矣公等儒臣也從朕蒙犯霜露得無勞苦乎羣臣蹈舞稱謝周太祖廣順二年五月親征兖州至兖州城下於西屯寨下慰勞兵士賜監押使臣將校茶酒十一月荆南上言覘知湖南事宜朗州大將劉言十月三日以兵入長沙界十五日至潭州其淮南所署偽節度使邊鎬焚城而遁岳州偽刺史宋權亦棄城去帝遣供奉官齊藏琦乘駟徃湘潭慰撫三軍將吏三年九月涇州節度使史懿疾復作遣客省使楊廷章徃知州事賜襲衣金帶縑帛詔諭彰義軍民吏曰朕以史懿自鎮邊蕃克勤王事眷言勲舊深副倚毗爰自近年多嬰疾苦邇來頻有發動乞赴闕尋醫既覧奏陳須議俞允已差客省使楊廷章徃彼知軍州事即令史懿發來京師朕念涇州乆夾瘡痍之地軍人百姓撫愛皆同今已指揮楊廷章候到日凡事倍加撫安不得輙有科率俾令衆庻皆遂蘇舒世宗顯徳元年五月親征河東丁丑觀兵於城下帝廵撫諸軍親白慰免賜賚有差五年四月丁丑呉越王錢俶上言四月十日夜杭州火㳂燒府署殆盡帝憫之􅃍命内臣齎璽書恤問册府元龜卷一百三十六
