body:
  text: 册府元龜卷五十八宋王欽若等撰帝王部勤政守法致治勤政易曰天行健君子以自强不息傳曰人道敏政况乎宇宙之大民物之衆内撫諸夏外安百蠻體元以立制建侯以共治禮樂征伐於是乎在三皇以前風俗簡朴雖曰無為無不為也五帝神聖其臣莫能及故自親事處乎法宫之中眀堂之上朝以聽政晝以訪問暮以條令故虞書曰無怠無荒四夷來王夏禹則曰予思日孜孜商書則曰先王昧爽丕顯坐以待旦周書梓材曰既勤樸斵惟其塗丹雘無逸曰文王自朝至於日中昃不遑暇食用咸和萬民乃至未明求衣齋居决事親臨庶獄延見大臣議論講貫或至夜分斯則聖人之用心也始乎勞終乎逸若雲行雨施春生秋歛而嵗功成矣殷中宗太戊嚴恭寅畏天命自度用法度也治民祗懼不敢荒寧知民之勞苦不敢荒廢自安也故享國七十五年髙宗武丁不敢荒寜嘉靖殷邦至於小大無怨故享國五十五年周文王日中昃不暇食享國五十年宣王將朝諸侯以夜未央之時問夜早晩故庭燎之詩羙其能自勤以政事漢宣帝地節二年五月始親政事令羣臣得奏封事以知下情五日一聽事自丞相以下各奉職奏事以傅奏其言考試功能三年十二月初置廷尉平季秋後請讞時嘗幸宣室齋居而决事獄刑號為平矣後漢光武每旦視朝日昃乃罷數引公卿郎將講論經理夜分乃􅄰皇太子見帝勤勞不怠承間諫曰陛下有禹湯之眀失黄老養性之福願頥愛精神優㳺自寧帝曰我自樂此不為疲也又以手迹賜方國者皆一札十行細書成文説文曰札牒也勤儉之風行於上下數引公卿郎將列于禁坐禁坐列御坐也廣求民瘼觀納風謡故能内外匪觧百姓寛息自臨宰邦邑者兢能其官順帝永建元年九月初令三公尚書入奏事魏文帝黄初五年五月有司以公卿朝朔望日因奏疑事聽斷大政論辨得失是年帝南廵觀兵於呉留司馬宣王鎮許昌録尚書事宣王固辭帝曰吾於庶事以夜繼晝無須臾寧息此非以為榮乃分憂耳明帝含垢藏疾容受直言聽受吏民士庶上書一月之中至數十百封雖文辭鄙陋猶覽省究竟無厭怠明帝太和三年改平望觀曰聽訟觀帝嘗言獄者天下之性命也每斷大獄常幸觀晉武帝泰始四年帝臨聽訟觀録廷尉雒陽獄囚親平决焉元帝太興元年新作聽訟觀四年四月辛亥帝親覽庶獄明帝太寧三年四月詔曰大事初定其命維新其令太宰司徒以下詣都坐參議政道諸所因革務盡事中成帝咸康六年初依中興故事朔望聽政於東堂後魏孝文太和十五年五月己亥議改律令於東明觀親折疑獄七月乙酉車駕廵省京邑聽訟而還十六年二月幸北部曹歴觀諸省巡省京邑聴理寃訟五月詔羣臣於皇信堂更定律條流徒限制帝親臨决之十七年五月帝臨朝嘗引見公卿以下决疑政録囚徒二十年二月辛丑帝幸華林園聽訟於都亭八月壬辰朔幸華林園親録囚徒咸降本罪二等决遣之帝聽覽政事莫不從善如流哀矜百姓嘗思所以濟益天地五郊宗廟二分之禮常必躬親不以寒暑為倦尚書奏案多自尋省百官大小無不留心務於周洽嘗臨朝堂謂太子太傅穆亮曰三代之禮日出視朝自漢魏以降禮儀漸殺晉令有朔望集公卿於廟堂而論政事亦無天子親臨之文今因卿等日中之集中前則卿等自論政事中後與卿等共議可否遂命讀奏案帝親自决之宣帝正始元年八月詔雒陽令有大事聽面敷奏永平元年六月詔曰慎獄重刑著於往誥朕御兹寳歴明鑒未逺斷决煩疑寔有攸愧可依雒陽舊圗修聽訟觀農隙起功及冬令就當與王公卿士親臨録問延昌二年正月帝御申訟車親理寃訟六月帝御申訟車親理寃訟三年四月帝御申訟車親理寃訟孝明熈平二年九月詔曰察訟理寃實為政首躬親聽覽民信所繇比日諒闇之中治綱未振獄犴繁廣嗟訴驟聞雖曰司存每多誣壅曾是寡徳實深矜慨自今月望當蹔出城闉親納滯枉主者可宣諸近逺咸使聞知孝昌二年二月甲申帝皇太后臨大夏門親覽寃訟孝莊建義元年五月詔曰自孝昌之季法令昏泯懐忠守素壅隔莫申深怨宿憾控告靡所其有事在通途横被疑異名例無爽枉見排抑或選舉不平或賦役煩苛諸如此者不可具記其有訴人經公車注不合者悉集華林東門朕當親理寃獄以申積滯出帝太昌元年六月癸亥朔帝於華林園納訟己邜帝臨顯陽殿納訟永熙三年五月庚子又幸華林都亭納訟西魏文帝大統五年秋七月詔自今常以朔望親閲京師見囚徒後周明帝武成元年五月己亥聽訟於正武殿武宗保定三年四月帝御正武殿親録囚徒建徳元年十二月己丑帝御正武殿親録囚徒至夜而罷二年十二月戊午聽訟於正武殿自旦至夜繼之以燭六年五月辛亥御正武殿録囚徒隋髙祖初即位乗輿四出路逢上表省者則駐馬親自臨問或潜遣行人採聽風俗吏治得失民間疾苦無不留意開皇二年十二月丁亥親録囚徒四年九月乙巳親録囚徒十年七月庚戌親録囚徒十二年八月戊戌親録囚徒十七年三月辛酉親録囚徒十八年十一月甲戌親録囚徒唐髙祖武徳元年六月謂侍臣曰每有章奏朕所親覽其詣闕者並即引見不得輙相止抑致有幽枉九月己巳親録囚徒二年閏二月親録囚徒多所原放三年八月親省囚徒多所寛宥八年二月癸未親録囚徒多所原放太宗以武徳九年八月甲午即位十二月癸未謂司空裴寂曰比有上書奏事條數甚多朕總粘之屋壁出入觀省所以孜孜不倦者欲盡臣下之情每一思治或二更方寢亦望公軰用心不倦以副朕之心也貞觀二年五月癸丑謂侍臣曰書不云乎天生民有欲無主乃亂故樹君以治之然而不能獨治必藉良佐以相輔弼朕今臨御天下子養生民思𢎞君道以安百姓卿等豈不見隋主為君不恤民事君臣失道民叛國亡公卿貴臣暴骸原野毒流百姓禍及其身朕每念及於斯未嘗不忘寢輟食所以師古作法不敢任情欲共卿等不為逸豫唯務治民湏君臣相體善惡必陳聞公卿以下皆難於言朕豈開延之道有所不盡乎勑中書令侍中於朝堂受詞訟衆庶以上有陳事者悉令封上帝皆親覽焉二年八月甲戌幸朝堂親覽寃屈三年十二月辛酉親録囚徒多所原放十年十二月親録囚徒十五年四月親録雒州河南雒陽二縣及行從諸司囚徒十一月庚子録在京囚徒多所原宥十六年七月謂侍臣曰朕數詔公等欲聞愆闕庶幾善道以匡不逮耳今嘗逹夜不寢思為政術非唯憂勤百姓亦欲貽法後昆司空長孫無忌奏聞古來撥亂之主載籍所存天造草昩之辰爰始經綸之日何嘗不思聞帝道祗奉王度及即位之後漸染驕盈詩云鮮克有終此非虛説陛下君臨四海將二十載視朝以後每留羣臣陛下為觧威嚴貸以顔色唯欲其論國家善惡用康政化哀愍黎元聖情轉切此豈臣等獨蒙恩澤四海蒼生誰不幸甚十七年二月己亥帝親慮囚徒非傷化害物者多所降宥帝以天下太平勵精風化每旦召見三品以上賜食御前初發徳音必先政道奬誘臣下令各有所陳羣臣雖無可進説帝必深叙戒懼七年辛丑謂公卿曰朕聞隋煬帝對羣臣未嘗言及政道朕實以政事切心若見卿等不覺自然發言司徒長孫無忌曰臣聞欲知國之存亡先觀其為政此隋所以䘮陛下所以興也八月帝見諸方使人先問其田苖善惡百姓疾苦奏稱百姓更無疾患而今兹有年因謂羣臣曰自去秋不雨渉兹春夏積旱三時野無青草中心怵惕無秋稼之望迄於夏季方降甘雨今此年豐上天所賜雖祥瑞之羙無以加焉十八年二月丙辰帝謂侍臣曰天下靜亂必在於君化以成俗亦繇其主朕少小軍旅於學業恨不能該覽經史撮其善事為百姓行之二十一年正月詔以無識之徒自蹈刑憲者宜順陽和時申恩惠諸司見禁囚並宜將過詳其輕重自此以後每視朝録禁囚二百人帝親自案問降死至流流入徒徒入杖杖者並放二十二年閏十一月癸巳親録囚徒多所原遣髙宗永徽元年正月召朝集使謂之曰朕初登大位固以黎庶為心事有不便於萬姓者各宜面奏有不盡者亦任封進自是每日引刺史十人入閣問以百姓疾苦及其政理顯慶四年十月壬辰親慮在京囚徒多所降免龍朔三年二月庚戌勅京城見禁囚每日將二十人過帝自慮之多所原免慮不盡者仍令皇太子於百福殿慮之咸亨二年六月癸巳以時旱親慮囚徒多所原宥仍令沛王賢慮諸司囚周王顯慮雒州及兩縣囚中宗景龍二年六月壬寅親慮囚徒多所原宥𤣥宗開元五年七月引畿縣令見於别殿帝謂之曰諸縣令等朕聞春夏以來苗稼甚好近日稍多雨水深慮漂浸田疇只如鞏縣宻縣汜水等既山水暴下衝突廬舎至於百姓溺者數人言念於兹不忘鑒寐雖已遣御史檢校安存卿是親人之官若為優恤亦知今歲蝗不為災避境有徴深嘉稱職未知在外疾病多少差科賦歛得均平否十一年諸州朝集使來見帝謂之曰卿等逺來竝平安好今歲收穫何如去年百姓之間有何疾疢鰥寡惸獨及行人之家若為優恤使得存濟卿等初到且歸休息數日之後與有司計事以聞二十五年十一月諸州朝集使見勅曰朕比擇長吏兼分命使臣所兾安人佇彼成績未知去歲之後至今秋以來郡縣之間如何致理招㩦復業何為處置頃聞諸道路逺近稍熟百姓貯積多少卿等親人之職庶事合知宜以實言用慰虛佇天寳十四載六月壬辰帝親慮囚徒肅宗至徳二年正月庚申臨軒引侍臣議時政得失代宗廣徳元年九月壬午御延英殿㑹宰臣等議政事自辰至午乃罷丙戌御延英殿㑹宰臣等議政事自辰至巳乃罷大歴三年十月庚辰代宗御延英殿引萬年長安兩縣令及諸畿縣令見十年五月乙夘帝視朝以班列人少謂宰臣曰朕每日聽政未嘗不晨興公卿大夫豈忘恭恪宰臣等再拜引過陳謝退而告示朝臣聞之者莫不怵惕德宗貞元元年十二月以蝗螟之後流庸未復詔延英視事日令常參官七人引對訪以時政得失自是頗有忤訐不􅃴事理者悉優容而遣之三年四月庚申詔曰蕃冦雖退疆理猶虞安邉之䇿必有良筭各委嘗參官具所見封進每坐日三四人陳奏利害四年六月召京兆府諸縣令對於延英殿訪人疾苦誨之各賜衣一襲甲申中書門下奏大理卿干頎太常卿董晉兵部侍郎李紓京兆尹李佐吏部貟外郎李渭曾任刺史司農卿薛珏太府少卿韋華大理少卿李速户部郎中盧紹倉工部郎中龎詧曽任縣令及長安令竇申萬年令李融竝有理行於是令頎等與刺史言於左丞㕔􅑻等言於右丞㕔言畢各條奏六年七月召京兆府諸縣令對延英殿問人疾苦各賜衣一襲七年十月司農卿李模免官初司農當供三宫冬菜三千車以度支給車直稍賤又阻雨菜敗模以度支為辭帝責其不先聞故免之先是模奏司農菜不足請京兆府市之尹薛珏萬年令韋彤乃禁人科賣帝命奪珏俸一月彤俸三月繇是每御延英殿令諸司長官二人引見訪問謂之廵對十一年二月黔中觀察使崔穆為部人告贓二十七萬貫及他犯監察御史李直方往黔州覆案近事雨晦無對見者是日雨止重之延英殿召見直方遣焉憲宗元和二年鋭於政理謂宰相裴垍曰朕聽政之暇徧讀列聖實録見貞觀開元時事竦慕不能釋卷又曰太宗之創業如此𤣥宗之致理如此我讀國史始知萬倍不及先聖當先聖之代猶湏相與百官同心輔助豈朕今日獨能為理哉事有乖宜必望卿盡力扶捄垍等蹈舞進賀曰陛下言及於此是又宗社無疆之福臣等駑劣不副聖心垍亦孜孜奉上每因敷奏復引太宗躬勤聽覽以諷帝帝嘗納用自是延英議政晝漏率下五六刻仍詔自今兩省官每坐日一人對來八年六月辛亥朔以時積雨延英門不開者十五日至是帝使謂宰臣等曰每至三日雨亦對來十三年九月戊子自八月壬申雨至是暫霽翼日復降乙丑雨雪深數尺人有凍死者宰臣因對請放朝帝曰沍寒放朝固其所也然吾樂與卿等相見退居深宫誰可與語耶十四年八月己未謂宰臣曰今天下雖漸平尤須勤於政理若偶遇休假不坐有事即詣延英請對勿拘常制先是宰臣奏事於延英崔羣以秋暑方甚不敢盡久其辭顧同列將出帝止之曰數日方與卿一相見時雖尚熱朕不為勞因固留羣臣等久之方退穆宗以元和十九年正月即位八月乙亥幸勤政樓問人疾苦文宗太和元年三月御紫宸殿延英視事者凡十一刻宰臣得以口陳大政帝皆虛心聽納異日對翰林學士於思政殿對南北軍使於麟徳殿洎諸蕃使者諸道進奏官皆得引謁故事隻日皇帝視朝其雙日百官但奉朝請退帝既勤於為理其後欲與宰相間日論政或當放朝輟朝皆令用雙日五月甲申召待制官禮部侍郎崔郾工部侍郎獨孤朗日對一刻時待制官命之舊矣近歲虛設其名未嘗引覿及此屢召咨以時政六月詔百司庶務有不便於人者各委長吏悉心陳列無使壅於上聞開成元年正月乙巳帝御紫宸殿宰臣鄭覃李石進曰陛下改元御殿中外寧謐全放京兆府一年租稅又停天下四節進奉恩澤所該實當要切近年赦令皆不及此帝曰朕務行其實不欲崇長空文覃曰在守之而已石曰赦書湏内置一本陛下時㸔之又十道黜陟使去日更付與公事根本令向外與長吏詳擇施行方進利害之要帝召監倉御史問太倉粟數御史崔虞對見粟有二百五十萬石帝曰無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國今約歲費不少而所蓄非多誠深可軫慮石曰京畿頻旱無以添置待臣來年徴兩税麥時納麥糓時納糓自然國儲漸實人亦樂輸帝曰如今用粟處且給價錢來年折納務優農人覃曰若不優之折納為害石又奏涇陽水利方春作時請禁碾磑秋冬水閑任却動用覃曰務農乃原其本也㳺手末作自當衰止帝曰百司弛慢要重條舉因指御爐曰此物始亦華好用之既久乃無光彩若不修飾何繇復初石曰百司皆有官長在陛下各責其事而已覃曰丕變風俗當考實効晉時􅄞阮之流竟何禆益帝曰阮籍居母䘮飲酒食肉隳紊禮教覃曰三十年以來多不務實取於顔情李石曰此本因理平人人無事安逸所致今之人俗但逺慕王夷甫耻不能及帝曰卿等輔朕為理必在振舉法度法者帝王之鞭策乗焉不執鞭策而可望致逺乎鄭覃李石謝曰陛下撫念萬方形於憂勤臣等雖甚駑庸敢不力奉聖志九月丁亥召對季集畿赤縣令等二十一人賜帛有差二年八月丙午望日帝御延英對刑法官刑部貟外郎紇干泉王含大理少卿李武韋紓及大理正丞等自此朔望即對刑法官以詳重輕三年二月詔僕射尚書侍郎左右丞太卿監每遇坐日宜令兩人循次候對宣宗在位十四年凡對宰臣語及政事即終日忘倦後唐明宗長興四年六月丙寅見百僚於廣夀殿時不豫旬日至是稍平帝勤於聽政接臣下無倦聖恙纔似和裕即戒尚宫曰吾今日見百官六宫請曰聖體虛羸且候平復無宜勉强上曰吾坐即似健乃以烏帽便服見羣臣十月辛酉上顧謂侍臣曰宰臣久不相見何也因令孟漢瓊𫝊詔馮道奏曰臣等以五日起居禀中㫖召見不敢大進也是月道率百僚見於中興殿守法仲尼有言曰刑罰不中則民無所措手足葢居南面之重宅億兆之上立乎法以齊衆一其心而成化豈三尺之律令而敢私乎哉故漢氏而下致治之後曷嘗不申嚴邦憲循行吏議雖復宗室貴戚元勲近習寘於彛典無所矜貸繇是明一成之不變致天下之歸心焉周典曰無偏無黨王道蕩蕩其斯之謂矣漢武帝時隆慮公主子昭平君尚帝女夷安公主隆慮主病困以金千斤錢千萬為昭平君豫贖死罪帝許之隆慮主卒昭平君日驕醉殺主傅獄繫内官主𫝊主之官也禮有傅母以公主子廷尉上詣請論論决其罪也左右人人為言前又入贖陛下許之帝曰吾弟老有是一子死以屬我老乃有子言其晩孕育於是為之垂涕歎息良久曰法令者先帝所造也用弟故而誣先帝之法吾何面目入髙廟乎又下負萬民廼可其奏哀不能自止左右盡悲時東方朔前上夀曰臣聞聖王為政賞不避仇讐誅不擇骨肉書曰不偏不黨王道蕩蕩此二者五帝所重三王所難也陛下行之是以四海之内元元之民各得其所天下幸甚臣朔奉觴昧時死再拜上萬歳夀帝迺起入省中夕時召讓朔曰𫝊曰然後言人不厭其言今先生上夀時乎朔免冠頓首曰臣聞樂太甚則陽溢哀太甚則隂損隂陽變則心氣動心氣動則精神散而邪氣及銷憂者莫若酒臣朔所以上夀者明陛下正而不阿因以止哀也愚不知忌諱當死朔前有罪免為庶人待詔宦者署因此復為中郎賜帛百疋也宣帝時大司馬大將軍霍光兄孫山坐冩秘書光夫人顯為上書獻城西第入馬千匹以贖山罪書報聞不許之後漢光武時竇融為大司空以大司徒戴渉坐所舉人盗金下獄帝以三公參職不得已乃策免融虞延遷雒陽令是時隂氏有客馬成者嘗為姦盗延收考之隂氏屢請獲一書輙加榜二百信陽侯隂就乃訴於光武譛延多所寃枉帝乃臨御道之館親録囚徒延陳其獄狀可論者在東無理者居西成乃回欲趨東延前執之謂曰爾人之巨蠧久依城社不畏熏燒今考實未竟宜當盡法成大呼稱枉陛㦸郎以㦸刺延叱使置之帝知延不私謂成曰汝犯王法身自取之呵使速去後數日伏誅於是外戚歛手莫敢干法後魏太武性甚嚴斷明於刑賞功者賞不遺賤罪者刑不避親雖寵愛之終不虧法嘗曰法者朕與天下共之何敢輕也故大臣犯法無所寛假孝文時趙郡王幹除都督冀定瀛三州諸軍事至州斬盗馬之人依律過重而尚書以幹初臨縱而不劾詔曰夫刑以節人罪必無濫故刑罰不中民無措手足若必以威殺為良則應汎通衆牧苟湏有禁何得不稽之正典又律令條憲無聽新君加戮之文典禮舊章不著始臨専威之羙尚書曲阿朕意實傷皇度王幹闇於治理律外重刑可推以聞唐太宗貞觀中吏部尚書侯君集坐太子承乾事帝謂百寮曰往者家國未安君集實展其力不忍寘之於法我將乞其性命公卿許我乎羣臣爭進曰君集之罪天地所不容請誅之以明大法帝謂君集曰與公長决矣而今而後但見公遺像耳因欷歔下泣遂斬於四逹之衢籍沒其家趙節長廣長公主之子以暱于太子承乾伏誅帝幸主所主以首擊地泣謝子罪帝亦拜主垂淚曰有功者仇讐必賞有罪者親戚咸誅前王執此以守其國弟世民亦庶幾無私有慙於姊髙宗麟徳元年二月丙午魏州刺史郇國公孝恊坐賘賜死宗正卿隴西王博文等奏稱孝協父長平王叔良身死事者孝協更無兄弟繼嗣便絶特望矜免其死帝曰時覽所司覆奏孝協死罪非不愴然但國之枝戚任寄為重不能亷慎遂及賘貨狼籍且畫一之法百王共貫豈親疎異制用舎殊途若有利於百姓皇太子亦所不赦身之肌膚朕亦不惜今知孝協既有一子令其主祭其期功等親竝宜依舊勿拘令式孝協竟自盡於第代宗大歴四年七月癸未勅死罪降從流時皇姨弟薛華因酒色忿怒手刃三人棄屍井中事發繫於京兆府慮前一日賜自盡不以公法貸私恩也後唐明宗天成三年七月汴州倉吏七十二人定賍至死分戮于三市史彦弼為汴州衙校舊將之子石敬塘之戚屬王建立奏希免死帝曰王法無親豈可私狥乃皆就戮丁延徽為供奉官監倉與倉官共盗倉米三百五十石延徽性纎巧權貴多庇䕶之禁繫經年比望至應聖節則釋放乃至節前取㫖放繫囚帝曰除盗倉粟官典外餘可疎放時侍衛指揮使張從賓言事帝多容之因奏他事從賓言及延徽情非盗粟意本賠填帝曰食我厚禄偷我倉儲期與决死蘓秦説子不得非但卿言衆于是不敢言異日帝御中興殿謂近臣曰丁延徽禁繫經年竊盗倉儲何湏擁䕶不然則合原則原淹滯如此復何計校耶既知擁䕶不及仍據法寺具獄斷决涇王從敏明宗子也為成徳軍節度使鎮州有市人劉方遇家富方遇卒無子妻弟田令遵者幼為方遇治財善殖貨劉族乃同推令遵為方遇子親族共立劵書以為信擔累年後方遇二女取資金於令遵不如意乃訟令遵冒姓奪父劉氏家財二女以錢賂從敏之親吏又姦通判官陸浣從敏令浣鞫劉氏獄而殺令遵令遵父詣臺訴又以成徳軍節度副使符蒙掌書記徐臺推鞫之蒙本鎮人備知姦狀及詰二女復行賂於節度副使趙環代判高知柔觀察判官陸浣竝捕下獄具服賘汚事連從敏從敏甚懼乃令其妻趨雒陽入宫告王淑妃明宗知之不令入謂從敏婦曰朕用從敏為節度使而枉法殺人取錢我羞見百官又令新婦奔走不湏見吾面依法裁斷然王妃頗庇之趙環等三人棄市從敏罰俸釋之致治蚩蚩蒸民不能自治天生聖哲以為司牧去危就安民之心也定亂致治君之政也非復應天順人乗時設教則禍難無息康寧無兾矣故運四時咸品物健而不息明而下濟天之常道也任百工熈庶績道之以徳御之以威國之善經也千齡不易百代可知是知弦弧剡矢禍亂遂平制禮作樂風俗乃變弛而張之是謂政教引而伸之稱為化原御宇造物與民更始釋此不足徴也黄帝舉風后力牧常先大鴻以治民順天地之紀幽明之占死生之説易云幽明之數合死生之説存亡之難時播百糓時是也草木淳化鳥獸蟲蟻旁羅日月星辰水波波一作沃土石金玉勞勤心力耳目節用水火財物有土徳之瑞帝顓頊時大小之神日月所炤莫不砥屬砥平也四逺皆平而來服屬帝嚳執中而徧天下日月所炤風雨所至莫不從服帝堯克明峻德以親九族能明峻德之士任用之以睦高祖𤣥孫之親九族既睦平章百姓既已也百姓百官言化九族而平和章明也百姓昭明協和萬邦黎民於變時雍昭亦明也協和黎衆時是雍和也言天下之衆民皆變化化立是以風俗泰和允釐百工庶績咸熙允信釐治工官績功咸皆熙廣也言定四時成歲歴以告時授事則能信治百官衆功皆廣勸其事帝舜既踐天子位命禹稷契等二十二人咸成厥功臯陶為大理平民各伏得其實伯夷主禮上下咸讓垂主工師百工致功益主虞山澤辟棄主稷百糓時茂契主司徒百姓親和龍主賓客逺人至十二牧行而九州莫敢避違四海之内咸戴帝舜之功於是禹乃興九韶之樂致異物鳯凰來翔天下明徳皆自虞帝始殷盤庚之時巳都河北殷衰自仲丁至陽甲九世亂諸侯莫朝盤庚遂渉河南治亳治於亳之殷地商家自此從而改號曰殷亳今偃師是也行湯之政然後百姓繇寧殷道復興諸侯來朝以其遵成湯之德也武丁即位思復興殷而未得其佐三年不言政事决定於冢宰冡宰天官卿貳王事者是以觀國風後舉傅説為相殷國大治祭成湯之明日有飛雉登鼎耳而雊武丁脩政行徳天下咸驩殷道復興周武王克商大賚於四海而萬姓悦服言周有大賚天下皆悦仁服德列爵惟五即所識政事而法之爵五等公侯伯子男分土惟三列地封國公侯方百里伯七十里子男五十里為三品建官惟賢立官以官賢才位事惟能居位理事必任能事重民五教所重在民及五常之教惟食䘮祭民以食為命䘮禮篤親愛祭祀崇孝養皆聖王所重惇信明義使天下厚行信顯忠義崇徳報功有徳尊以爵有功報以禄垂拱而天下治言武王所脩皆是所任得人故垂拱而天下治成王既襲淮夷歸在豐作周官言周家設官分職用人之法興正禮樂制度於是改而民和睦頌聲興頌聲者天下太平歌頌之聲帝王之髙致也康王即位徧告諸侯宣告以文武之䇿以申之作康誥故成康之際天下安寧刑措四十餘年不用措舎置也民不犯法無所用刑漢恵帝時海内得離戰國之苦蕭曹為相君臣俱欲無為故帝拱已垂拱而治而天下晏然刑罰罕用民務稼穡衣食滋殖文帝即位躬修𤣥黙勸趣農桑减省租税而將相皆舊功臣少文多質懲惡亡秦之政論議務在寛厚耻言人之過失化行天下告訐之俗易訐面相斥罪也吏安其官民樂其業畜積歲増户口寖息寖溢也息生也風流篤厚禁網疏濶選張釋之為廷尉罪疑者予民從輕斷是以刑罰大省至於斷獄四百謂普天下之重罪者也有刑措之風景帝遵孝文之業至於移風易俗黎民醇厚黎衆也醇不澆雜周云成康漢言文景羙矣昭帝幼年即位承孝武奢侈餘弊師旅之後海内虛耗户口减半耗損也委任霍光知時務之要輕徭薄賦與民休息至始元元鳯之間匈奴和親百姓充實舉賢良文學問民所疾苦議塩鐵而罷㩁酤尊號曰昭不亦宜乎宣帝地節二年令羣臣得奏封事以知下情五日一聽事自丞相以下各奉職奏事以傳奏其言考試功能侍中尚書功勞當遷及有異善厚加賞賜至於子孫終不改易樞機周宻品式備具上下相安莫有苟且之意元康四年比豐年比頻也糓石三錢宣帝之治信賞必罰綜核名實政事文學法理之士咸精其能至于技巧工匠噐械自元成間鮮能及之是以知吏稱其職民安其業也後漢光武建武十三年兵革既息天下少事文書調役務從簡寡調謂法也至乃十存一焉帝嘗於民間頗逹情偽見稼穡艱難百姓害病至天下已定務用安靜觧王莾之繁宻還漢世之輕法明帝永平十三年天下安平人無徭役歲比登稔百姓殷富粟斛二十牛羊被野晉武帝明逹善謀平呉之後天下乂安後魏孝文太和八年遣使廵行紏守宰不法𤣥宗開元十九年二月侍中裴光庭中書令蕭嵩奏曰臣等伏見所司奏天下應死罪囚摠二十四人竊以天下至廣宇内至衆豈唯徳禮所齊固以幽賛潜洽方將勒休述羙非獨成康之時反朴歸醇幾若華胥之俗昔者斷獄數百文景稱仁徴諸良史逺有慙徳臣等竭心奉職徒効涓塵之微動色相趨預聞頌聲之作請宣付史官克昭盛烈從之二十五年帝因聽政問京師囚徒有司奏有五十人怡然而喜二十八年以頻歲豐稔亰師米斛不滿二百天下乂安雖行萬里不持兵刃憲宗即位嘗納用直言勤于政事自貞元十年以後朝廷威柄日削方鎮權重徳宗不任宰相以事人間細務多自决臨裴延齡等得以姦進而登台輔者備位而已帝在藩累月言事者頗以此為言帝亦非之及永貞監國羣臣謁見宰相杜黄裳首以君臣大義激起帝心帝以黄裳語忠始終延納黄裳首定誅劉闢又李吉甫自翰林學士叅定蜀之策遂知政事吉甫出鎮裴垍又繼之盖自監國以至臨御訖於元和軍國樞機盡歸之宰相繇是中外咸理綱目用張焉宣宗自臨馭一之日權豪歛迹二之日姦臣畏法三之日閽寺讋氣繇是政刑不濫賢能効用百揆四岳穆若清風十餘年間頌聲載路而帝道皇猷始終無缺雖漢之文景不過是也後唐明宗始為藩臣及應運以君徳臨下力行于王化政皆中道時亦小康冊府元龜卷五十八
