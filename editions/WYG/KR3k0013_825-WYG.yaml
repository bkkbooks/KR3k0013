body:
  text: 冊府元龜卷八百二十五宋王欽若等撰總録部名字第二隋李和本名慶和魏末為驃騎大將軍夏州刺史後周太祖賜姓宇文氏嘗謂諸將曰宇文慶和智畧明贍立身恭謹累經委任每稱吾意遂賜名意開皇九年遷上柱國以意是太祖賜名市朝己革慶和則父之所命義不可違遂以和為名豆盧勣字定東父寧柱國太保勣初生時周太祖親幸寧家稱慶時遇新破齊師太祖因字之曰定東後為上柱國夏州總管封楚國公長孫覽初仕周為車騎大將軍每公卿上奏必令省讀覽初名善周武帝謂之曰朕以萬機委卿先覽遂賜名焉終於荆州刺史伊婁謙字彦恭髙祖作相授亳州總管俄徵還京既平王謙謙耻與逆人同名因爾稱字後為澤州刺史顔之推有二子長曰思魯次曰愍楚蓋不忘本也蘓䕫少聰敏及長博覧羣言尤以鍾律自命初不名䕫其父威改之頗為有識所哂位至通議大夫李徳林字公輔少孤未有字魏收謂之曰識度天才必至公輔吾輒以此字卿後為懷州刺史李孝貞字元操開皇初拜馮翊太守為犯廟諱於是稱字按隋書文帝祖父諱禎唐李綱字文紀初名瑗字子玉讀後漢書張綱傳慕而改之位至太子少師髙儉字士廉以字行焉後為開府儀同三司平章政事房喬字𤣥齡以字行焉終於司空虞世南叔父寄仕陳為中書侍郎寄無子以世南出繼故字曰伯施位至銀青光禄大夫𢎞文舘學士楊仁恭本名綸後為雒州都督老病乞骸以特進歸第李靖本名藥師官至僕射進封衛國公李百藥字重規定州安平人隋内史令安平公徳林之子為童兒時多疾病祖母趙氏故以百藥為之名後官至太子庶子顔籕字師古以字行於世位至秘書監崔敦禮為太子太師同中書門下三品監脩國史敦禮本名元禮髙祖改為敦禮劉義節本名世龍有子名鳳昌有人上書言龍父子為龍鳳之名居宅在乾坤之地將非國家之利書奏不省因賜名節義秦瓊字叔寶以字行於世位至左武衛大將軍韋思謙本名仁約以音類則天父諱故稱字焉官至黄門侍郎魏元忠初名真宰天授中以避天后母號故改焉後以特進齊國公致仕成王千里吳王恪之子本名仁進爵郡公嘗出使江左都人相率以金遺之仁拒而不納則天聞而嘉歎擢使謂曰汝吾家千里駒也繇是改名千里崔𤣥暐本名曄以字下體有則天祖諱乃改為𤣥暐後至中書令張仁愿本名仁亶以音類睿宗諱改焉位至兵部尚書致仕楊隆禮隋齊王楊正道之子歴雒梁滑汾懷五州刺史以嚴察聞景龍中以名犯𤣥宗上字改為崇禮薛謙光開元初為太子賔客以與太子同名表請行字特勅賜名為登寧王憲初名成器避昭成皇后尊號改名憲歧王範初名隆範避𤣥宗連名故单稱範薛王業亦同姚元崇則天時為夏官侍郎同鳳閣鸞臺平章事後以叱利元崇構逆則天不欲元崇與之同名遂改為元之後避開元尊號又改名崇王忠嗣本名訓年始九歳父海賔死王事起復朝散大夫尚輦奉御養於禁中後官至漢東郡太守崔澄為秘書監本名滌開元初𤣥宗改焉李傑本名務光後改焉官終揚州大都督府長史楊國忠𤣥宗貴妃從父之子或云張易之子冐外氏姓本名釗天寶中帝改為國忠官至司空劉正臣本名客奴天寳末為平盧軍遊奕使時節度使呂知誨受安禄山逆命客奴與諸將襲殺之馳以奏聞十五載四月授客奴柳城郡太守平盧軍節度度支營田陸運押兩蕃渤海黒水四府經畧及平盧軍使仍賜名正臣史思眀本名窣干𤣥宗改之為思明後為平盧節度都知兵馬使李懷光本姓茹父嘗為朔方部將以戰功賜姓李氏更名嘉慶懷光後為邠寧節度使李若幽為殿中監上元二年以為河中節度都統處置使鎮于絳賜名國貞盧正巳寶應二年自刑部侍郎為大府卿正巳本名元裕以兼名同帝諱抗疏乞改之楊子琳忿崔寧賊殺長帥討之候寧入覲突入成都糧盡自潰朝廷慮為亂階除為陜州刺史又移受澧州刺史灃郎兩州鎮遏使在澧州二年大歴六年表乞朝謁代宗以發跡不順特容之及至引見于延英殿與語甚悦賜名猷張延賞本名寶符中書令嘉貞之子㓜孤以父䕃授官𤣥宗特恩賜名延賞取延賞後世之義也位至左僕射同中書門下平章事路嗣恭始名劍客歴仕郡縣有能名後授神烏縣令考課上上為天下最以其能嗣魯恭特賜改其名位至河陽三城節度及東都畿觀察使崔旰為劍南西川留後大歴三年加節度使仍改名寧曹令忠為北庭節度副大使知節度使大歴七年八月賜姓李改名元忠以邊將寵之也白琇珪大歴中司農少卿遷大卿在卿曹十餘年徳宗召見與語以為可任腹心遂用為神䇿軍使兼御史大夫賜名志貞尚可孤初為魚朝恩養子改姓魚氏名智徳朝恩死賜可孤姓李氏名嘉勲㑹李希烈反叛建中四年七月除兼御史大夫荆襄應援淮西使仍復本姓尚可孤官至左龍武將軍韓希烈為汾寧節度興元元年詔賜名歸義張萬福年七十八從軍遼東有功累攝舒盧夀三州刺史時李正巳反將斷江淮路徳宗以萬福為濠州刺史召見謂曰先帝改卿名正者所以褒卿也朕以為江淮草木亦知威名若從先帝所改恐賊不知是卿也復賜名萬福慰遣之劉洽為宣武軍節度貞元元年改名𤣥佐李長榮貞元四年為河陽三城懷州團練使仍賜名元諒柳渾初名載為尚書左丞及駕幸奉天渾㣲服徒行扈從初渾之離京城賊泚猶以渾匿在閭里乃除偽宰相及京師克復渾尚名載上言曰頃為狂賊㸃汚臣實耻稱舊名况載字帶戈時當偃武請改名渾徳宗嘉而從之王䖍休汝州梁人本名延賞貞元中為潞州左司馬領留後仍賜名䖍休張茂昭本名昇雲孝忠之子也貞元七年為定州刺史充北平軍使是嵗孝忠卒於位詔昇雲起復左衞大將軍同正員充義武軍節度使賜名茂昭王昌貞元十四年自右神䇿軍將軍除鳳翔節度使賜名敬則劉逸淮貞元十五年自宋州刺史為宣武軍節度使賜名全諒渾瑊本名日進後改為瑊康藝全為河東編伍勇力絶人節度使馬燧以其多藝因以藝全名之崔咸字重易父銳貞元中為李抱真從事有道者自稱曰盧老嘗師隋朝雲霽寺李先生能知逺近事屬河北禁逰客銳遂舘之一旦辭去且曰我死當為君子因指口下黒子願以為記既生咸果有黒子其狀則盧老也遂以盧老名之韋士伋為黔中經畧觀察使貞元十六年改名士宗又名士文王紹初與憲宗同名永貞年改焉少時顔真卿器重之因紹舊名字之曰徳素位至兵部尚書張奉國本名子良為李錡牙門右職錡叛子良與錡甥裴行立等宻圖錡生致闕庭平浙右憲宗追赴京師親自褒慰擢為右金吾將軍兼御史大夫改名奉國韋貫之本名純犯憲宗廟諱遂以字稱位至河南尹朱士明元和初為定州鎮使以築臨涇城有勞特加檢校工部尚書涇原四鎮北庭等節度使仍賜名忠亮髙固生於微賤為叔父所賣展轉為渾瑊家奴號曰黄芩性敏惠有膂力善騎射好讀左氏春秋瑊大愛之養如己子以乳母之女妻之遂以固為名取左氏傳髙固之名也蔣武元和五年為諫議大夫武中謝面請改名又從之嘗因奏對為憲宗言曰陛下今日偃武修文臣下亦當順承因請改名帝悦而從之時討王承宗兵初罷又恐天子易於用武故因以此諷焉田興元和八年為魏博節度使賜名𢎞正崔元畧為御史中丞元和十二年元畧論侍御史唐武當改名帝曰人之取名多矣何必武為曩時蔣武已請改矣遂改唐武為慶時議者見淮西初平謂帝遂喜武功及見改唐武名乃知帝厭兵人人相賀韓瓘為鄜坊節度使穆宗長慶元年瓘請改名充許之王日簡長慶初為鎮州小將王承宗沒軍情不安日簡自㧞歸朝授代州刺史及長慶初鎮州軍亂害田𢎞正穆宗為之旰食以日簡嘗為鎮將召問其計日簡遂於御前極言利害兼願有以自效因授徳州刺史經略其事明年擢拜横海軍節度使賜姓李氏名全略以崇樹之李元喜為安南經略使寶厯元年元喜請更名元志從之盧周仁開成中為湖南觀察使奏云名與再從伯音同請改名術從之髙士榮為威逺軍使寳歴元年士榮請改名承恭從之崔承寵為黔州觀察使寶厯三年承寵請更名實從之李載義字方轂方轂之字文宗所製也位至侍中鄭澣本名涵以文宗在藩邸時名同改名澣澣子茂諶避國諱改名茂休澣後為山南西道節度觀察使髙元中太和二年為侍御史内供奉請改名元裕許之楊嗣復字繼之僕射於陵之子也初於陵調補潤州句容尉浙西觀察使韓滉有知人之鍳見之甚悦滉有愛女方擇佳婿謂其妻柳氏曰吾閲人多矣無如楊生貴而且夀生子必為宰相於陵寓居揚子而生嗣復後滉見之撫其首曰名位果踰於父楊門之慶也因字曰慶門後自潮州刺史徵拜吏部尚書李祜太和三年自涇原節度使除徳州刺史充滄景節度使仍賜名有裕史唐太和三年攝魏博節度副使奏臣父憲誠本以周有莊周漢有吳漢依據故事以臣名唐今竊思之不敢慕古請改名孝章從之李仲和太和八年為翰林侍講學士周易博士奏以名與堂叔祖下字同請改名訓從之崔𦙍父慎繇太中年鎮西川有異人張叟者或云名占風與慎繇跡熟時曾訪慎繇于都下慎繇因從容謂曰臣聞罪大莫若絶嗣今四十無子良可懼也叟曰我亦為公求之未見可者唯終南翠㣲寺有僧絶粒五十年矣公宜遣使遺其服玩若愛而受之則其嗣也慎繇乃發婢僕往焉果受其遺僧尋卒叟於暗壁誌之至來年崔生之日叟復至焉謂慎繇曰我故來相賀因與慎繇窺其所誌之日畧無差焉慎繇因示𦙍於叟叟曰貴則過公然遇亂世恐不得其終也因字曰衲僧後自司徒貶太子賔客梁韋震本名肇唐末充宣武軍節度副使乾寧二年七月昭宗狩於石門震奉表繇虢略間道奔達于行在帝大悦賜名震太祖特為製字李茂貞本姓宋名文通唐末為洋蓬璧等州節度使賜姓名茂貞禧宗親為製字曰正臣後唐李茂勲唐末為鄜州節度使梁太祖襲鄜州茂勲遂歸於梁改名周彛署元帥府行軍司馬李存進振武人本姓孫名重進唐末從太祖入關平黄巢景福中為義兒軍使賜姓名牛存節字賛貞青州博昌人也本名禮梁太祖改而字之李存信本姓張為河東蕃漢馬歩軍都指揮使太祖賜名姓睠同親嫡朱簡唐末為陜州節度使陳情於梁太祖曰僕位崇將相本無功勞實知踰分皆元帥令公生成之造翼卵之仁願以㣲軀永期效使乞以名姓肩隨諸子太祖深賞其心乃賜名友謙待之過於諸子同光初莊宗賜姓改名繼麟段凝仕梁為滑州兵馬留後同光初莊宗賜姓名紹欽王晏球梁為耀州刺史同光初賜姓名紹䖍康延孝同光初除鄭州刺史充本州防禦史仍賜姓名紹琛孔循初仕梁以太祖乳媪為義母媪夫趙氏循冐其姓名殷衡同光初歸姓孔名循張全義字國維初名言昭宗賜名全義梁太祖即位改名宗奭同光初復名全義元行欽初從明宗名聞軍中為散員都部署賜姓名紹榮袁光輔同光中為復州刺史天成初上言叔父㓜年遇亂離索與臣同名臣今欲改名㠖從之郭彦􅇪為青州孔目吏以節度使霍彦威故改名致雍大成中為本道所薦至京中書以舊名除官邸使蘇仁裕陳狀以為不便安重誨以聖㫖令中書奏曰伏以凢是人名皆繇父名侍側者稱以榮左右為後者稱以奉烝嘗犯廟諱須更同御名亦改降此以外廻避無聞以春秋論之衛侯名惡大夫有齊惡太宗朝有虞世南君不聽臣易名皆所以重人父之命况郭彦䕫長在青州霍彦威有時移鎮寧將私敬上瀆聖聰若便允從恐多援引只宜如故工部郎史于鄴奏名是盧文紀私諱儻許更名即不至尤違其郭彦䕫請在本道宜令權稱致雍在告勅内即須仍舊誠為至論永作通規從之安黒連長興初為潮州刺史明宗為之改名保榮李郁清泰初為宗正少卿上言臣與本寺卿名同行公事不便欲改名知新從之晉張從訓初唐莊宗與梁人相拒於徳勝口徴赴軍前補先鋒游奕使俄轉雲捷指揮使檢校司空賜姓名繼鸞從諸子之行也明宗㣲時嘗在存信麾下為都押衙與從訓有舊及即位授石州刺史復舊姓名楊光逺小字阿檀及長止名檀後唐天成中以明宗改御名為亶以偏傍字犯之始改名光逺字徳明周史懿字繼美為涇原節度使本名犯太祖廟諱故改焉孫方諫字良弼為定國軍節度使本名下一字犯廟諱廣順初改焉曹英字徳秀為成徳軍節度使舊名犯太祖廟諱故改焉冊府元龜卷八百二十五
