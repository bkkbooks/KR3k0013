body:
  text: 册府元龜卷五百二十三宋王欽若等撰諫諍部總序傳曰天子有諍臣七人又曰命百官箴王闕孔子之述諫有五一曰諷諫二曰順諫三曰直諫四曰諍諫五曰贛諫盖古之王者莫不開諫諍之路延讜直之議思聞已過以救時弊然後上下之情無壅大小之政咸叙以臻夫至治者也太古之世朴畧而無紀三五以降則軒轅有明堂之議堯有衢室之問舜有進善之旌禹有五聲之聴湯有好問之誥武王有大道之訪咸所以詳延嘉話頗彌縫其闕故前史所載自王以下各有父兄子弟以補察其政至於朝夕起居不忘納諫在輿有旅賁之規位宁有官師之典倚几有誦訓之諫居寢有􅉏御之箴臨事有瞽史之詔燕居有史工之詞至於大夫士有䂓訓傳言之告庻人商旅有誹謗陳貨之儆百工之賤許執藝以獻喻遒人之職專徇鐸以采詩諒夫諫諍之所繇來者舊矣漢氏之後居人上者何嘗不遐廸古訓諮諏善道稽農博采虛己以延納濬發嘉詔下及幽隠退託不明求所禆益自秦置諫議大夫專掌論議漢廢其職至武帝復置諫大夫𨽻光禄勲無常員率用名儒宿徳以任其職周旋侍從叅相諷議世祖増議事員三十人魏氏遵之逮晉而罷江東唯梁陳有此官後魏置諫議大夫七十𨽻集書省北齊因之後周之官府有保氏大夫掌規諫又有諌議誠議等大夫隋置諫議大夫七人屬門下省煬帝廢之唐武德初置四員屬門下龍朔中改為正諫大夫武后垂拱中又置補闕拾遺左右各二人供奉左右箴規得失天授中左右各加三員共十人神龍初復舊四員正議大夫復為諫議大夫開元定制左右補闕拾遺各二員復有内供奉各一員凡十二人左屬門下右屬中書貞元四年分置左右諫議大夫各四員𨽻兩省元和元年止置諌議大夫四員罷左右之名㑹昌二年復置左右以備兩省員數無所加朱梁至周無所改易咸以叅侍親近專職論諌大則廷議小則上封秩序清峻推擇精妙尸厥職者頗難其人今兹考歴代論諍之烈取古五諌之義第其品次垂為訓典若夫事君有勿欺之義廷諌有仗死之節危言以期寤主逆耳而思益國是之謂直諌酌王度而糾謬攻時病而盡規本獻可替否之猷遵救惡弼違之訓是之謂規諌陳古義以喻今寓文辭而導意託事類以進説因訪問而申對是之謂諷諌排姦㒺避乎惡訐救危靡俟乎旋踵蓄憤悱而有犯本質亮而不回是之謂強諌含忠有素齎志将沒忘軀而圖國忍死以緒言是之謂遺諌以是五者列而叙之凡率土之濵皆為臣子雖草萊之淪賤士伍之卑冗咸被延納得以言事今之所采良無間然至有嘉其鯁亮特蒙奨遇申之賞賚存乎激勸亦用論著備乎品目凡諫諍部六門云爾諷諫孔子曰諫有五吾從其諷蓋所以因事託物寓情見意兾言之者無罪而聞者之自戒爾三代而下良臣踵武志存納誨言思利國乃有陳之箴訓形于風什敷引經義援述古道假文以詮理藉辭而獻規誠心内激精義濬發周定紬繹㫖意微婉亦有曲終而奏雅勸百而風一始於浮夸終於節儉又曷嘗不感悟時主補其闕而救其惡哉故人臣之禮不顯諫者得事君之道矣周辛甲武王時為太史命百官官箴王闕闕過也百官各為箴以誡王過也於虞人之箴曰虞人掌田獵者芒芒禹跡畫為九州芒芒逺􅊬也畫分也經啟九道九道九州之道也啟開也民有寝廟獸有茂草各有攸處德用不擾人神各有歸故德不亂也在帝夷羿冒于原獸冐貪忘其國䘏而思其麀牡言但念獵武不可重重猶數也用不恢于夏家羿以好武雖有夏家而不能恢大也獸臣司原敢告僕夫獸臣虞人也告僕夫不敢斥尊也召康公成王時為太保作公劉泂酌卷阿以戒成王王將涖政戒以民事美公劉之厚於民也公劉后稷曽孫夏末迫逐遷于邠而有居民之道也其詩曰篤公劉匪居匪康廼埸廼疆篤厚也厚乎公劉之為君也不以所居為居不以所安為安邰國乃有疆埸也乃積乃倉乃裹餱糧于槖于嚢思輯用光言公劉為夏人迫逐已之故不忍鬭其民乃裹糧食于囊槖之中棄其餘而去思在和其民人用光大其道為今子孫之基泂酌言皇天親有德饗有道也其詩曰泂酌彼行潦挹彼注兹可以餴饎泂逺也餴餾也饎酒食也言逺酌流潦投大噐之中又挹之注之於此小噐而可以沃酒食之餴者以有忠信之德齊潔之誠以薦之故也豈弟君子民之父母樂以強教之易以悦安之民皆有父之尊有母之親卷阿言求賢用吉士也其詩曰有卷者阿飄風自南卷曲也阿大陵也迴風從長養之方来入之喻王當屈體以待賢者賢者則猥来就之豈弟君子來㳺來歌以矢其音矢陳也言王能待賢者如是則樂易君子來就王㳺而歌以陳出其齊感王之善心也優旃者秦倡朱儒善為笑言然合於大道秦始皇時置酒而天雨陛楯者皆沾寒優旃見而哀之謂之曰汝欲休乎陛楯者曰幸甚優旃曰我即呼汝汝疾應曰諾居有頃殿上上夀呼萬嵗優旃臨檻大呼曰陛楯郎郎曰諾優旃曰汝雖長何益幸雨立我雖短也幸休居於是始皇使陛楯者得半相代始皇嘗議欲大苑囿東至函谷闗西至雍陳倉優旃曰善多縱禽獸於其中㓂從東方來令麋鹿觸之足矣始皇以故輟止二世立又欲漆城優旃曰善主上雖無言臣固将請漆城雖於百姓愁費然佳哉漆城蕩蕩㓂來不能上即欲就之易為漆耳顧難為蔭室於是二世笑之以其故止居無何二世殺優旃歸漢數年而卒漢東方朔武帝時待詔公車帝欲起上林苑朔進諫曰泰階六符以觀天變不可不省因奏泰階之事帝乃拜朔為大中大夫給事中賜黄金百斤黄帝泰階六符經曰泰階者天之三階也上階為天子中階為諸侯公卿大夫下階為士庻人上階上星為男主下星為女主中階上星為諸侯三公下星為卿大夫下階上星為元士下星為庻人三階平則隂陽和風雨時社稷神祗皆獲其宜天下大安是為太平三階不平則五神乏祀日有食之水潤不浸稼穡不成冬雷夏霜百姓不寧故治道傾天子行暴令好興兵甲修宮榭廣苑囿則上階為之奄奄疏闊也以孝武皆有此事故朔為陳之司馬相如蜀郡成都人孝景時為武騎常侍因病免客㳺梁作子虚賦時楊得意為狗堅因帝善此賦而薦之子虛虛言也為楚稱烏有先生者烏有此事也為齊難亡是公者亡是人也欲明天子之義故虛藉此三人為辭以推天子諸侯之苑囿其卒章歸之於節儉因以諷諫賦奏帝以為郎相如為郎數嵗㑹唐蒙通夜郎僰中巴蜀民大恐帝遣相如使蜀時蜀長老多言通西南夷之不為用大臣亦以為然相如欲諌業已建之不敢乃著書藉蜀父老為辭而詰難之以風天子且因宣其使指令百姓皆知天子意又相如從獵還過宜春宫奏賦以哀二世行失宜春本秦之離宫胡亥於此為閻樂所殺故感其處而哀之又相如為孝文園令見帝好僊因曰臣嘗為大人賦未就請具而奏之相如以為列僊之儒居山澤間形容甚臞此非帝王之仙意也乃奏大人賦天子大悦王褒蜀人也宣帝時徵褒既至詔褒作聖主得賢臣頌末句云何必偃仰詘信若彭祖呴噓呼吸如僑松是時帝頗好神仙故褒對及之官至諫大夫枚臯為郎待詔衛皇后立臯奏賦以戒終揚雄成帝時待詔承明之庭帝方郊祀甘泉泰畤汾陰后土以求繼嗣雄奏甘泉賦以風甘泉本因秦離宫既奢泰本秦之林光宫也而武帝復増通天髙光迎風宫外近則洪厓旁皇儲胥弩阹逺則石關封巒鳷鵲露寒棠梨師得逰觀屈奇瑰偉棠梨宫在甘泉苑垣外師得宫在櫟陽界其餘皆甘泉苑垣内之宫觀也非木摩而不彫牆塗而不畫周宣所考盤庚所遷夏卑宫室唐虞採椽三等之制也小雅斯干之詩序曰宣王考室也考謂成盤庚殷王名也遷謂都亳也唐虞謂堯舜也採柞木也三等土階三等言不過也且其為已乆矣非成帝所造欲諌則非時欲黙則不能已故遂推而隆之迺上比於帝室紫宫帝謂天也若曰此非人力之所能為儻鬼神可也時趙昭儀方大幸每上甘泉常法從法從者以言法當從耳非失禮一曰從法駕也在屬車間豹尾中大駕屬車八十一乗作三行尚書御史乘之最后一乗縣豹尾豹尾以前皆為省中故雄聊盛言車騎之衆叅麗之駕非所以感動天地逆釐三神又言屏玉女郤虙妃以微戒齋肅之事賦成奏之天子異焉三月帝将祭后土乃帥羣臣横大河湊汾隂既祭行逰介山囘安邑顧龍門覧鹽池登歴觀陟西嶽以望八荒迹殷周之虚眇然以思唐虞之風雄以為臨川羨魚不如歸而結網還上河東賦以勸十二月帝羽獵揚雄從以為昔在二帝三王宫館臺榭沼池苑囿林麓藪澤財足以奉郊廟御賔客充庖厨而已不奪百姓膏腴榖土桑柘之地女有餘布男有餘粟國家殷富上下交足故甘露零其庭醴泉流其唐爾雅廟中路謂之唐鳳凰巢其樹黄龍㳺其沼麒麟臻其囿神爵棲其林昔者禹任益虞而上下和屮木茂成湯好田而天下用足文王囿百里民以為尚小齊宣王囿四十里民以為大裕民之與奪民也裕饒也武帝廣開上林南至宜春鼎湖御宿昆吾旁南山而西至長楊五柞北繞黄山瀕渭而東穿昆明池象滇河營建章鳳闕馺娑殿名也漸臺泰液漸臺在㤗液池中象海水周流方丈瀛洲蓬萊逰觀侈靡窮妙極麗雖頗割其三垂以贍齊民然至羽獵田車戎馬噐械儲偫禁御所營尚太奢麗誇詡詡大也非堯舜成湯文武三驅之意也又恐後世復修前好不折中㠯泉臺魯荘公築泉臺非禮也至文公毁之公羊譏云先祖為之而毁之勿居而已今揚雄以宮觀之盛非成帝所造勿修而已當以泉臺折中也故聊因校獵賦以風明年秋命右扶風發民入南山西自襃斜東至𢎞農南敺漢中張羅網􅆯罘捕禽獸載以轞車輸長楊射熊館長楊宫名在盭厔縣其中有射熊館是時農民不得收斂雄從帝還上長楊賦聊因筆墨成文章故藉翰林以為主人子墨為客卿以風劉向為光禄大夫挍中五經秘書成帝元舅陽平侯王鳳為大将軍秉政專國權兄弟七人皆封列侯時數有大異向以為外戚貴盛鳳兄弟用事之應見尚書洪範箕子為武王陳五行隂陽休咎之應向乃集合上古以來歴春秋六國至秦漢符瑞災異之記推迹行事連傳禍福著其占驗比類相從各有條目凡十一篇號曰洪範五行傳論奏之天子心知向精忠故為鳳兄弟起此論然終不能奪王氏權又向睹俗彌奢淫而趙衛之屬起微賤踰禮制趙謂趙皇后昭儀衛謂衛婕妤向以為王教繇内及外自近者始故採取詩書所載賢妃貞婦興國顯家可法則及孽嬖亂亡者序次為列女傳凡八篇以戒天子後漢杜篤京兆杜陵人光武都雒陽以闗中表裏山河先帝舊京不宜改營雒邑乃上奏論都賦後終從事中郎張衡連辟公府不就時天下承平日乆自王侯以下莫不踰侈衡乃擬班固兩都作二京賦因以諷諫精思傅㑹十年乃成傅毅明帝時為大将軍司馬以帝求賢不篤士多隠處故作七激以為諷班固初為蘭臺令史後為郎時京師修起宫室濬繕城隍而關中耆老猶望朝廷西顧固感前世相如夀王東方之徒造搆文辭終以諷勸乃上兩都賦馬融安帝永初中為挍書郎中詣東觀典挍祕書是時鄧太后臨朝大将軍鄧隲兄弟輔政而俗儒世士以為文德可興武功宜廢遂寢蒐狩之禮息戰陣之法故猾賊縱横乗此無備融乃感激以為文武之道聖賢不墜五才之用無或可廢元初二年上廣成頌以諷諌陳忠安帝時為尚書屬常侍江京李閏等皆為列侯共秉權任帝又愛信阿母王聖封為野王君忠内懷憤懣而未敢陳諌乃作縉紳先生論以諷趙岐靈帝時為司徒胡廣所辟岐以綱維不攝閹豎專權擬前代連珠之書四十章上之畱中不出魏劉劭明帝時為散騎常侍嘗作趙都賦帝美之詔劭作許都雒陽賦時外興軍旅内營宮室劭作二賦皆諷諌焉晉張華惠帝時為侍中懼后族之盛作女史箴以為諷賈后雖凶妬而知敬重華庾羲穆帝時為吳興内史帝頗愛文義羲至郡獻詩頗存諷諌因上表曰陛下以聖明之德方隆唐虞之化而事役殷曠百姓凋殘以數州之資經贍四海之務其為勞弊豈可具言昔漢文居隆盛之世躬自儉約斷獄四百殆致刑措賈誼歎息猶有積薪之言以古况今所以益其憂懼陛下明鑑天挺無幽不燭𢎞濟之道豈待瞽言臣受恩奕世思盡絲髪受任到東親臨所見敢緣𢎞政獻其丹愚伏願聽㫁之假少垂察覧桓伊為右軍将軍謝安女婿王國寳專利無撿行安惡其為人每抑制之國寳䜛諛之計稍行於主相之間而好利險諛之徒以安功名極盛而搆㑹之嫌隙遂成孝武召伊飲讌安侍坐帝命伊吹笛伊神色不遷即吹為一弄乃放笛云臣於箏分乃不及笛然自足以韻合歌管請以箏歌并請一吹笛人帝善其調逹乃勅御妓奏笛伊又云御府人於臣必自不合臣有一奴善相便串帝彌賞其放率乃許召之奴既吹笛伊便撫箏而歌怨詩曰為君既不易為臣良獨難忠信事不顯乃有見疑患周旦佐文武金縢功不刋推心輔王政二叔反流言聲節慷慨俯仰可觀安泣下霑衿乃越席而就之捋其鬚曰使君於此不凡帝甚有愧色南齊周顒明帝時為輔國府主簿時帝頗好言理以顒有辭義引入殿内親近宿直帝所為惨毒之事顒不敢顯諫輒誦經中因縁罪福事帝亦為之小止後魏成淹獻文時為著作郎帝於仲冬之月欲巡漠北朝臣以寒甚固諫竝不納淹上按輿釋遊論帝覽之詔尚書李訢等曰卿諸人不如成淹論通釋人意乃勅停行髙允孝文時為鎮軍大将軍領中書監允上酒訓曰被勅論集往世酒之敗徳以為酒訓臣以朽邁人倫所棄而殊恩過隆録臣於将歿之年朂臣於已墜之地奉命驚惶喜懼兼甚不知何事可以上答伏願陛下以叡哲之姿撫臨萬國太皇太后以聖徳之廣濟育羣生普天之下罔不稱賴然日昃憂勤虚求不已思監往事以為警戒此之至誠感悟百靈而況於百官庶士萬民乎臣不勝踊躍謹竭其所見作酒訓一篇但臣愚短加以荒廢辭義鄙拙不足觀採伏願聖慈體臣悾悾之情恕臣狂瞽之意其辭曰自古聖王其為饗也𤣥酒在堂而醍酒在下所以崇本重原降於滋味雖汎爵旅行不及於亂故能禮章而敬不虧事畢而儀不忒雖非斯致是失其道将何以範時軌物􅂷之於世歴觀徃代成敗之效吉凶繇人不在數也商辛躭酒殷道以之亡公旦陳誥周德以之昌子反昏酣而致弊穆生不飲而身光或長世而為戒或百代而流芳酒之為状變惑性情雖曰哲人孰能自覺任官者殆於政也為下者慢於令也聰逹之士荒於聽也柔順之倫興于諍也乆而不悛致於病也乃損其命諺亦有云其益於毫其損如刀言所益者不亦寡乎言所失者不亦夥乎無以酒荒而陷其身無以酒狂以喪其倫迷邦失道流浪漂津不師不遵反将何因詩不言乎如切如磋如琢如磨朋友之義也作官以箴之申謀以禁之君臣之道也其言也善則三復而佩之言之不善則哀矜而貸之此實先王納規之意徃在有晉士多失度肆散誕以為不羈縱長酣以為高逹諷酒德之頌以相眩矅稱堯舜有千鍾百觚之飲著非法之言引大聖為譬以則天之明豈其然乎且子思有云夫子之飲不能一升以此推之千鍾百觚皆為妄也今大魏應圖重明御世化之所暨無思不服仁風淳洽於四海太皇太后以至德之隆誨而不倦憂勤備於皇誥訓導行於無外故能道協兩儀功同覆載仁恩下逮罔有不遵普天率土靡不蒙頼在朝之士有位之人宜尅已從善履正存貞節酒以為度順經以為德悟昏飲之美疢審敬愼之彌榮遵孝道以致養顯父母而揚名蹈閔曽之前軌遺仁風於後生仰以答所授俯以保其戒可不勉歟可不勉歟高祖悦之常置左右後又上大都賦因以規諷亦二京之流陽固為治書待御史曹武委任羣下不甚親覽好桑門之法尚書令髙肇以外戚權寵專决朝事又咸陽王禧等竝有釁故宗室大臣相見疎薄而王畿民庻勞弊益甚固乃作南北二都賦稱常代田漁聲樂侈靡之事節以中京禮儀之式因以諷諌張彞宣武時為光祿大夫上歴帝圗表曰臣聞昊穹高朗尚假列星以助明洞庭淵湛猶藉衆流以増大莫不孤炤不詣其幽獨深未盡其廣先聖識其若此必取物以自誡故堯稱則天設謗木以曉未明舜稱盡善懸諌鼓以規闕少虞人獻箴規之㫖盤盂著舉動之銘庻幾見善而思齊聞惡以思改眷眷於悔徃之衢孜孜於不逮之路用能聲髙百王卓絶中古經十世而不渝歴千祀以彌欝伏惟太祖撥亂奕代重光世祖以不世之才開盪函夏顯祖以温明之德潤沃九區高祖大聖臨朝經營云始未明求衣日昃忘食開翦荆棘徒御神縣更新風軌冠帶朝流海東雜部之渠衡南異服之帥沙西氊裘之戎漠北穹廬之野重譯納貢請吏稱藩積德懋於夏殷富仁盛于周漢澤教既周武功亦匝猶且濬發明詔思求直士信是蒼生薦言之秋祝史陳辭之日况臣家自奉國八十餘年紆金鏘玉及臣四世過以小才藉䕃出仕學慙專門武闕方畧早荷先帝眷顧之恩末蒙陛下不遺之施陪侍兩宫官歴常伯忝牧秦藩號兼安撫實思碎首膏原仰酬二朝之惠輕塵碎石逺増嵩岱之髙輙私訪舊書竊觀圖史其帝皇興起之元配天隆家之業修造益民之奇龍麟雲鳳之瑞卑宫愛物之仁釋網改祝之澤前歌後舞之應囹圄寂寞之美可為輝光景行者輙謹編丹青以標叡範至如太康好田遇窮后迫禍武乙逸禽罹震雷暴酷夏桀淫亂南巢有非命之誅殷紂昏酣牧野有倒戈之陣周厲逐獸㓕不旋踵幽王遇惑死亦相尋暨於漢成失御莾新篡奪桓靈不綱魏武遷鼎晉惠闇弱骨肉相屠終使聰矅鶚視幷州勒虎狼據燕趙如此之輩罔不畢載起元庖羲終於晉末凡十六代百二十八帝歴三千一百七年雜事五百八十九合成五巻名曰歴帝圗亦謗木諌鼓虞人盤盂之類脱蒙置御座之側時復披覽兾或起于左右上補未萌伏願陛下逺惟宗廟之憂近存黎民之念取其賢君棄其惡主則微臣雖沉淪地下無異乗雲登天矣宣武善之北齊魏收後魏孝武時為中書侍郎帝常大發士卒狩于嵩少之南旬有六日時天寒朝野嗟怨帝與從官及諸妃主奇伎異飾多非禮度收欲言則懼欲黙不能已乃上南狩賦以諷焉雖富言淫麗而終歸雅正帝手詔報焉甚見褒美榮陽鄭伯調之曰卿不遇老夫猶應逐張晏之陪文宣後園讌坐客皆賦詩晏之詩云天下有道主明臣直雖休勿休永貽世則文宣笑曰得卿箴諷深以慰懷隋陸知命高祖時為儀同三司見天下一統勸高祖都雒陽因上太平頌以諷焉劉炫為殿中将軍開皇中國家殷盛皆以遼東為意炫以為遼東不可伐作撫夷論以諷焉當時莫有悟者及大業之季三征不尅炫言方驗蘇威為光禄大夫從煬帝幸鴈門迴屬五月五日百寮上饋多以珍玩威獻尚書一部微以諷帝唐張藴古貞觀初自幽州記室直中書省以太宗初即位上大寳箴深存規戒之體太宗嘉納之賜以束帛焉謝偃為王府功曹太宗聞而召見獻惟皇誡德賦以申諷諌郭山惲中宗時為國子司業帝數與近臣及修文館學士宴㳺或令各效伎藝以為咲樂工部尚書張錫舞談容娘将作大匠宗晉卿舞渾脱左衛将軍張洽舞黄麞左金吾将軍杜元琰誦婆羅門呪給事中李行言唱車駕西河中書舍人盧藏用効道士上章山惲獨奏曰臣無所解請歌古詩兩篇帝許之山惲先歌鹿鳴篇曰呦呦鹿鳴食野之苹我有嘉賔鼓瑟吹笙吹笙鼓簧承筐是将人之好我示我周行呦呦鹿鳴食野之蒿我有嘉賔德音孔昭視民不恌君子是則是效又歌蟋蟀篇曰蟋蟀在堂嵗聿其暮今我不樂日月其除無以太康職思其居好樂無荒良士瞿瞿蟋蟀在堂嵗聿其逝今我不樂日月其邁無以太康職司其外好樂無荒良士蹶蹶山惲奏此歌未畢中書令李嶠以其辭規諷恐忤㫖遽催促止之李景伯景龍中為諌議大夫中宗嘗與宰臣貴戚内宴酒酣遽唱迴波樂甚喧雜失禮次至景伯歌曰迴波爾時酒巵微臣職在箴規禮飲只合三爵君臣雜混非宜席為之散時人稱之鄧汪為長上果毅延載年檢校内史李昭德用事為朝野所惡汪著石論數千言備述昭德專權之狀鳯閣舍人逢宏敏遽奏上其書則天謂納言姚璹等曰昭德官為内史身備殊榮若其實如所言足是慙負家國竟坐免為欽州南賔尉李日知為黄門侍郎時安樂公主池館新成中宗親徃臨幸從官皆陪賦詩日知獨存規誡其末章曰所願暫思居者逸莫使人稱作者勞論者多賞之魏知古元宗時為侍中從獵于渭川因獻詩諷曰嘗聞夏太康五弟訓禽荒我后來冬狩三驅盛禮張順時鷹隼擊講事武功揚奔走未及去翾飛豈暇翔非熊從渭水瑞翟想陳倉此慾誠難縱兹逰不可常子雲陳羽獵僖伯諌漁棠得失鍳齊楚仁恩念禹湯邕熙諒在宥亭毒匪多傷辛甲今為史虞箴遂孔彰宋璟開元初手冩尚書無逸一篇為圖以獻𤣥宗置之内殿出入觀省崔日用為吏部尚書嘗採毛詩大雅小雅二十篇及擬司馬相如封禪書因𤣥宗生日表上之以申規諷幷述告成之事𤣥宗省表嘉嘆賜衣一副帛五十疋以酬其意裴諝建中初為金吾將軍以法吏舞文多挾宿怨因獻獄官箴以諷杜希積功至朔方軍節度使嘗獻體要八章多所規諌德宗深納之蒋乂本名武元和中嘗因奏對為上言曰陛下今日偃武修文臣下亦當順承上意因請改名乂憲宗悦而從之時討王承宗兵初罷乂恐天子易於用武故因以此諷焉栁公綽元和中為吏部郎中獻太醫箴曰惟天布寒暑不私於人品類既一崇髙以均惟人謹好愛能保其身清靜無瑕輝光以親寒暑滿天地之間浹肌膚於外好愛溢耳目之前誘心志於内端潔為隄奔射猶敗氣行無間隙不在大睿聖之姿清明絶俗心正無邪志髙寡欲謂天髙矣氛蒙晦之謂地厚矣横流潰之聖情超越萬方頼之飲食所以資身也過則生患衣服所以表德也侈則生慢惟過與侈生心必隨之氣與心流疾亦伺之聖心不惑孰能移之畋逰恣樂流情蕩志馳騁勞形叱吒傷氣惟天之重從禽為累不養其外前修所忌聖心非之孰敢違之人乗氣而生嗜欲以萌氣離有患氣凝則成巧必喪眞智必誘情去彼煩慮在此誠明為之上者理於未然患居慮後防處事先心靜樂行體知道全然後能德施萬物以享億年聖人在上各有攸處庻政有官羣藝有署臣司太醫敢告諸御上深嘆賞之降中使勞問韋處厚為中書舍人翰林侍講學士時穆宗以㓜主荒怠不親政務既居納誨之地宜有以啟道性靈乃銓擇經義雅言以類相從為二十卷謂之六經法言獻之李德裕為浙西觀察使身居亷鎭乃心王室遣使獻丹扆箴六首曰臣聞心乎愛矣遐不謂矣此古之賢人所以篤於事君者也夫迹踈而言親者危地逺而意忠者忤然臣切念拔自先聖徧荷寵光若不愛君以忠則是上負靈鑑臣頃事先朝屬多陰沴常獻大明賦以諷頗蒙先朝嘉納臣今日盡節明主亦繇是心昔張敞之守逺郡梅福之在遐徼尚竭誠盡規不避尤悔况臣嘗學舊史頗知官箴雖在疎逺猶思獻替謹獻丹扆箴六首仰塵睿鍳伏積兢惶德裕意在切諌不欲斥言託箴以盡意宵衣諷坐朝稀晩也正服諷服御乖異也罷獻諷徵求翫好也納誨諷侮棄讜言也辨雅諷信任羣小也防微諷輕出逰幸也敬宗雖不能盡用其言命學士韋處厚殷勤答詔頗嘉納其心焉漢張允初仕晉為左散騎常侍天福初允以國朝頻有肆赦乃進駮赦論曰管子云凡赦者小利而大害乆而不勝其禍無赦者小害而大利乆而不勝其福又漢紀云吳漢疾篤帝問所欲言對曰惟願陛下無為赦耳如是者何蓋行赦不以為恩不行赦亦不以為無恩為罰有罪故也切觀自古帝王皆以水旱則降德音而宥過開獄牢以放囚兾感天地以救其災者非也假有二人訟一有罪一無罪若有罪者見捨則無罪者銜寃銜寃者彼何疎見捨者此何親乎如此則是致灾之道非救灾之術也自此小民遇天灾則喜皆相勸為惡曰國家好行捨必捨我以救灾如此則是國家教民為惡也且天道福善禍淫若以捨為惡之人而便變灾為福則又是天助其惡民也細而察之必不然矣儻或天降之灾蓋欲警戒人主節嗜慾務勤儉䘏鰥寡正刑罰不濫捨有罪不僭殺無辜使美化行於天下聖德聞於上則雖有水旱亦不為沴矣豈以濫捨有罪而反能救其灾乎彰其德乎是知赦之不可行也明哉明哉帝覽而嘉之降詔奨飾云張允位居近侍志奉逺圖屬将來之助致小康覩已徃之頻行大赦若惠姦稍甚則蠧政亦多推恩務洽於華夷作解憤調於疎數所貢論宜付史館册府元龜卷五百二十三
