body:
  text: 册府元龜卷四百五十一宋王欽若等撰將帥部爭功矜伐爭功書曰汝惟不矜天下莫與汝爭能蓋夫狠而求勝競不以心斯事之末而徳之醜也肇自三季世事軍旅後已之義靡篤奪人之心紛起其有受鈇鉞之寄忘禮讓之訓當受脤齊出握兵分道搴旗斬將攻畧城池競圖勲伐相尚謀詐或逗遛期㑹以沮彼衆或增益首級以大己功或倍道以先至或抽戈以相逐書勞之際求質實於俘獲行封之始請辨正於先後廷爭以發憤歎耦語以圖叛戾至有奪珪爵伏斧鑕而不悔者矣兹所謂矜其能而喪厥功者焉穿封戍為楚大夫楚子侵鄭至于城麇鄭皇頡戍之出與楚師戰敗穿封戍囚皇頡公子圍與之爭之正於伯州犂正曲直也伯州犂曰請問於囚乃立囚伯州犂曰所争君子也其何不知上其手曰夫子為王子圍寡君之貴介弟也下其手曰此子為穿封戍方城外之縣尹也誰獲子上下手以道囚意也囚曰頡遇王子弱焉弱敗也言為王子所得戍怒抽戈逐王子圍弗及楚人以皇頡歸趙鞅為晉大夫簡子也帥師納衞太子蒯聵于戚齊人輸范氏粟鄭子姚子般送之趙鞅禦之遇於齊將戰郵無恤御簡子衞太子為右鄭人擊簡子中肩斃于車中斃踣也太子救之以戈鄭師北既戰簡子曰吾伏弢嘔血弢弓衣嘔吐也鼓音不衰今日我上也功為上太子曰吾救主於車退敵於下我右之上也郵良曰我兩靷將絶吾能止之止使不絶我御之上也駕而乗材兩靷皆絶材横木明細小也傳言簡子不讓下自伐漢蕭何為丞相髙帝五年先封酇侯酇音贊屬南陽食邑八千戸功臣皆曰臣等身被堅執兵多者百餘戰少者數十合攻城略地大小各有差今蕭何未有汗馬之勞徒持文墨議論不戰顧居臣等上何也顧猶反也帝曰諸君知獵乎曰知之知獵狗乎曰知之帝曰夫獵追殺獸者狗也而發縱指示獸者人也縱音子用切發縱謂解抽而放之指示者以手指示之今諸君徒能得走獸耳功狗也至如蕭何發縱指示功人也且諸君徒以身從我多者三兩人蕭何舉宗數十人皆隨我功不可忘也羣臣後皆莫敢言是時帝已大封功臣三十餘人其餘爭功未得行封帝居南宫從復道上復音複上下有道故謂之復見諸將耦語以問張良良曰陛下與此屬共取天下今已為天子而所封皆故人所愛所誅皆平生仇怨今軍吏計功以天下為不足用徧封言有功者多而土地少而恐以過失及誅故相聚謀反耳帝曰為之奈何良曰取上素所不快言有舊嫌者計羣臣所共知最甚者一人先封以示羣臣三月上置酒封雍齒因趣丞相急定功行封趣讀曰促荀彘為左將軍武帝元封二年遣與樓船將軍楊僕擊朝鮮右渠左將軍破浿水上軍乃前至城下圍其西北樓船亦往㑹居城南右渠遂堅城守數月未能下左將軍急擊之朝鮮大臣廼隂間使人私約降樓船往來言尚未肯决左將軍數與樓船期戰樓船欲就其約不㑹左將軍亦使人求間隙降下朝鮮不肯心附樓船以故兩將不相得左將軍心意樓船前有失軍罪意疑也今與朝鮮和善而又不降疑其有反計未敢發言天子曰將率不能前乃使衞山諭降右渠不能顓决與左將軍相誤卒沮約顓與専同卒終也沮壊也今兩將圍城又乖異以故久不决使故濟南太守公孫遂往正之有便宜得以從事遂至左將軍曰朝鮮當下久矣不下者樓船數期不㑹具以素所意告遂曰今如此不取恐為大害非獨樓船又且與朝鮮共滅吾軍遂亦以為然而以節召樓船將軍入左將軍軍計事即令左將軍戲下執縳樓船將軍戲讀與麾同并其軍以報天子許左將軍已并兩軍即急擊朝鮮朝鮮相路人相韓陶尼谿相參將軍王唊戎狄不知官紀故皆稱相相路人一也相韓陶二也尼谿相參三也將軍王唊四也唊音作頰也相與謀曰始欲降樓船樓船今執獨左將軍并將戰益急恐不能與不能與猶言不如也王又不肯降陶唊路人皆亡降漢路人道死元封三年夏尼谿相參乃使人殺朝鮮王右渠來降王險城未下故右渠之大臣成已又反復攻吏左將軍使右渠子長右渠之子名長降相路人子最相路人前已降漢而死於道故謂之降相最者其子名告諭其民誅成已故遂定朝鮮左將軍徴至坐爭功相嫉乖計棄市樓船將軍已坐兵至列口當待左將軍列口縣名也度海先得之擅先縱失亡多當誅贖為庶人後漢任尚為中郎將元初五年與度遼將軍鄧遵擊西羌有功遵以太后從弟故爵封優大尚與遵爭功又詐增首級受財枉法贓千萬以上檻車徴棄市晉王渾為安東將軍都督揚州諸軍事鎭壽春及伐吳吳遣司徒何植建威將軍孫晏送印節詣渾降既而王濬破石頭降吳威名益振明日渾始濟江登建業宫釃酒髙㑹自以先據江上破吳中軍按兵不進致在王濬之後意甚愧恨有不平之色頻奏濬罪狀時人譏之宋張僧産龍驤將軍興世弟也時鄧琬輔晉安王僭逆興世擊敗之琬死别將劉胡走入沔衆稍散比至石城裁餘數騎竟陵郡丞陳懐眞聞胡經過率數十人斷道邀之胡人馬既疲自度不免因隨懐眞入城告渴與之酒胡飲酒畢引佩刀自刺不死斬首送京邑僧産追胡未至石城數十里逢送胡首信將還竟陵殺懐眞竊有其功南齊崔恭祖為平南將軍崔慧景司馬恭祖驍勇便馬矟氣力絶人頻經軍戰討王敬則與左興盛軍容袁文曠爭敬則首訴明帝曰恭祖秃馬絳衫手刺倒賊故文曠得斬其首以死易勲而見枉奪若失此勲要當刺殺左興盛帝以其勇使謂興盛曰何容令恭祖與文曠爭功遂封三百戸後魏崔亮為鎭南將軍與李平等討梁將趙祖悅於硤石李平部分諸軍將水陸兼進以討堰賊亮違平節度以疾請還隨表而發平表亮肆其専恣輕輙還歸此而不糾法將焉寄及平至亮與爭功於禁中形於聲色陽固為前將軍典科揚州勲賞初硤石之役固有先登之功而朝賞未及至是與尚書令李崇訟勲更相表崇雖貴盛固據理不撓談者稱焉隋賀若弼為吳郡總管韓擒虎為廬州總管開皇九年伐陳擒虎為先鋒弼為行軍總管及平陳至京弼與韓擒虎爭功於帝前弼曰臣在蔣山死戰破其銳卒擒其驍將震揚威武遂平陳國韓擒虎畧不交戰豈臣之比擒虎曰本奉明㫖令臣與弼同時合勢以取偽都弼乃敢先期逢賊遂戰致令將士傷死甚多臣以輕騎五百兵不血刃直取金陵降任蠻奴執叔寶據其府庫傾其巢穴弼至夕方扣北掖門臣啟關而納之斯乃救罪不暇安得與臣相比上曰二將俱合上勲於是進位柱國賜物八千段李徳林為内使令自隋有天下每贊平陳之計開皇八年車駕幸同州從駕還在塗中髙祖以馬鞭南指云待平陳訖㑹以七寶莊嚴公使自山東無及之者及平陳受柱國郡公實封八百戸賞物三千段晉王已宣勑訖有人說髙熲曰天子畫策晉王及諸將戮力之所致也今乃歸功於李徳林諸將必當憤惋且後世觀公有若虚行熲入言之髙祖乃止唐淮安王神通為左武衞大將軍貞觀元年拜開府儀同三司賜實封五百戸時太宗謂諸功臣曰朕敘公等勲效量定封邑恐不能盡當各自言神通曰義旗初起臣率兵先至今房𤣥齡杜如晦等刀筆之人功居第一臣且不服帝曰義旗初起人皆有心叔父雖率兵先至未嘗身履行陣山東未定受委専征建徳南侵全軍䧟没及劉黑闥翻動叔父望風而破今論勲行賞𤣥齡等有籌謀帷幄定社稷功所以漢之蕭何雖無汗馬指縱推轂故功居第一叔父與國至親誠無所愛必不可縁私濫與勲臣同賞耳尉遲敬徳貞觀中為右武侯大將軍好訐直又負其功嘗侍宴慶善宫時有班在其上者敬徳怒曰汝有何功合坐我上任城王道宗次其下因解喻之敬徳勃然拳毆道宗目幾至眇太宗不懌而罷伊愼為江西節度使曹嗣王臯都知兵馬使臯攻李希烈安州使慎盛兵圍之賊懼臯使至城中以約降臯使都虞候王鍔懸而入既成約殺不從者以出明日城開臯以其衆入愼以賊之恟懼繇其圍也色不下鍔鍔稱疾避之宋威乾符中為招討使與賊王仙芝戰不利詔以監軍楊復光總其兵初仙芝衆號三十萬既䧟江陵獲舉于温廷浩遣修表請節朝議不允及復光為招討監軍遣判官吳彦宏諭以朝㫖釋罪别加官爵仙芝乃令其將尚君長蔡温王楚彦䓁相次詣闕請罪且求恩命時威欲害其功並擒之以送京師朝廷不詢其本悉斬之繇是賊怒悉銳擊官軍威大敗復光収其衆以統之後唐李存信唐末為武皇馬歩軍都校與李存孝擊張濬軍於平陽時存孝驍勇冠絶軍中皆下之唯存信與爭功由是相惡有同水火矜伐書曰汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功仲尼曰如有周公之才之美使驕且吝其餘不足觀也已然則卑以自牧為而不有俛之而莫測仰之而彌髙斯乃㧞乎其萃髙世作程者之所為也乃有荷登壇之寄居分閫之重或破敵平亂自恃其勲業或露才揚已願從其驅策或形謇驁之迹或張誇大之言以致使氣陵上席寵驕物踐危機而不悟犯清議而莫逃垂之編簡良可痛惜老子所謂富貴而驕自招其咎者其是之謂矣髙固齊大夫也魯成公二年髙固入晉師桀石以投人桀擔也禽之而乗其車既獲其人因釋已車而載所獲者車繫桑本焉以徇齊壘將至齊壘以桑繫車而走欲自異曰欲勇者賈余餘勇賈買也言己勇有餘故賣之漢樊噲封舞陽侯髙后怒匈奴召丞相及噲季布等議斬其使者發兵而擊之樊噲曰臣願得十萬衆横行匈奴中問季布季布曰噲可斬也前陳豨反於代漢兵三十二萬噲為上將軍時匈奴圍髙帝於平城噲不能解圍天下歌之曰平城之下亦誠苦七日不食不能彀弩彀張也音工豆反今歌唫之聲未絶傷痍者甫起唫古吟字痍創也甫始也痍音夷而噲欲揺動天下妄言以十萬衆横行是面謾謾欺誑也音曼又音莫連反且匈奴與漢殊俗得其善言不足喜惡言不足怒也髙后曰善魏鄧艾為鎭西將軍既破蜀於緜竹築臺以為京觀用彰戰功士卒死事者皆與蜀兵同共埋葬艾深自矜伐謂蜀士大夫曰諸君賴遭某故得有今日耳如遇吳漢之徒已殄滅矣又曰姜維自一時健兒也與某相隨故窮耳有識者笑之蜀魏延為征西大將軍延每隨諸葛亮出輙欲請兵萬人與亮異道㑹於潼關如韓信故事亮制而不許延常以亮為怯歎恨已才用之不盡晉郭黙明帝時為右將軍黙樂為邊將不願宿衞及赴召謂平南將軍劉𦙍曰我能禦胡而不見用右軍主禁兵若疆塲有虞被使出征方始配給軍卒無素恩信不著以此臨敵少有不敗矣時當為官擇才若人臣自擇官安得不亂乎𦙍曰所論事雖然非小人所及也劉毅為衞將軍荆州刺史毅性剛猛沉斷而専肆狠愎與劉裕協成大業而功居其次深自矜伐不相推伏及居方嶽嘗怏怏不得志裕每柔而順之毅驕縱滋甚每覽史籍至藺相如降屈於亷頗輙絶歎以為不可能也宋謝晦為撫軍將軍荆州刺史甚有自矜之色將之鎭詣從叔光禄大夫曕瞻問晦年答之曰三十五瞻笑曰昔荀郎中二十七為北府都督卿比之已為老矣晦有愧色南齊垣崇祖為胊山戍主崇祖啟明帝曰淮北士民力屈胡圍南向之心日夜以冀崇祖父伯並為淮北州郡門族布在北邊百姓所信一朝嘯咤事功可立名位尚輕不足威衆乞假名號以示逺近帝以為輔國將軍北琅邪蘭陵二郡太守崇祖在淮隂見帝便相比韓信白起咸不信唯帝獨許之崇祖再拜奉㫖及破虜明帝謂朝臣曰崇祖許為我制虜果如其言其嘗自擬韓白今眞其人也梁韋叡為平北將軍寧蠻校尉雍州刺史初髙祖義兵檄至叡起兵赴之鄉中客隂雙光泣止叡叡還為州雙光道候叡笑謂之曰若從公言乞食於路矣餉耕牛十頭王僧辯為征東大將軍僧辯破侯景入石頭城據之收賊黨王偉等二十餘人送於江陵偽行臺趙伯超自吳松江降於侯瑱瑱時送至僧辯僧辯謂伯超曰趙公卿荷國重恩遂復同逆今日之事將欲何之因命送江陵伯超既出僧辯顧坐客曰朝廷首望唯知有趙伯超耳豈識王僧辯社稷既傾為我所復人之興廢亦復何常賔客皆前稱歎功徳僧辯瞿然乃謬答曰此乃聖上之威徳羣帥之用命老夫唯濫居戎首何力之有焉陳侯安都為司空加侍中征北大將軍自王琳平後安都勲庸轉大又自以功安社稷漸用驕矜後魏韓顯宗孝文時為征武將軍以赭陽破賊功為鎭南廣陽王嘉諮議參軍顯宗後上表頗自矜伐訴前征勲詔曰顯宗斐然成章甚可恠責進退無檢虧我清風此而不糾或長敝俗可付尚書推列以聞兼尚書張彞奏免顯宗官詔曰顯宗雖浮矯致􅄽才猶可用豈得永棄之也可以白衣守諮議展其後効王肅為鎭南將軍清身好施家無餘財然性惟輕佻頗以功名自許䕶庇稱伐少所推下孝文每以此為言于忠孝明時為車騎大將軍自謂有社稷之功諷動百僚令加已賞於是太尉雍清河王懌廣平王懐難違其意議封忠常山郡開國公食邑一千户楊大眼少有膽氣跳走如飛孝武南伐為軍主大眼顧謂同僚曰吾之今日所謂蛟龍得水之秋自此一舉終不復與諸軍齊列矣累遷平東將軍王肅弟子乗之初歸國謂大眼曰在南聞君之名以為眼如車輪及見乃不異人大眼曰旗鼔相望瞋眸奮發足使君目不能視何必大如車輪北齊侯景為南道大行臺位司徒言於神武曰恨不得兵三萬横行天下要須濟江縳取蕭衍老翁以作太平寺主神武壯其言使擁兵十萬専制河南仗任若已之半體景右足短弓馬非其所長唯以智謀時髙昂彭樂皆雄勇冠時景嘗輕之後周王勇為大將軍性雄猛為當時驍將然矜功伐善好揚人之惡時論亦以此鄙之隋賀若弼為武候大將軍煬帝之在東宫嘗謂弼曰楊素韓擒虎史萬歳三人俱稱良將其間優劣何如弼曰楊素是猛將非謀將韓擒虎是鬭將非領兵史萬歳是騎將非大將帝曰然則大將誰也弼拜曰唯殿下所擇弼意自許為大將唐闞稜為越州都督稜與輔公祏將陳正通接戰稜脫兜鍪謂賊衆曰汝不識我耶何敢來戰其衆多稜舊之所部由是各無鬭志或有遥拜者賊師遂潰稜頗有矜功之色王忠嗣為河西隴右節度使忠嗣初在朔方頗得士卒心及至隴西以富貴自處聲望稍減劉擁為隴右經畧使嘗謂所知曰儻朝廷假擁兵力則必復河湟一勞永逸聞者壯之先是王師討劉闢議者謂擁才任統帥朝廷將用之㑹髙崇文立功而止張仲武自雄武軍使為兵馬留後改幽州都督府長史東面招討回鶻使經其舊地歳旱因召其代己者未詳姓名疏之云吾昔鎭彼年年豐熟子何久旱如此得非為政之不至而天意所譴耶軍吏曰蓋聞鳳去巢空豈凡禽所能繼仲武喜其對而不責之梁楊師厚為魏博節度末帝將圖友珪遣使謀於師厚師厚深陳欵効末帝即位首封師厚為鄴王加檢校太師中書令每下詔不名以官呼之事無巨細必先謀於師厚師厚頗亦驕誕後唐朱守殷為振威節度使不之任仍兼蕃漢馬歩使京城初定内外警廵恃憑主恩蔑視勲舊與景進互相表裏又强作宿徳之態言語遲緩自謂沉厚安元信為横海軍節度使時契丹犯邊元信與霍彦威從明宗屯常山元信恃功每對明宗以成敗勇怯戲侮彦威彦威不敢答明宗曰成敗天也不繇於人當時叔琮圍太原公有何勇念國家運興致汝等富貴勿以小勝小捷挂於口吻取笑於長者彦威起謝元信不復以彦威為戲周王峻為樞密使峻以慕容彦超叛於兖州已遣歩軍都指揮使曹英定省使尚訓率兵攻之峻意欲自將兵討賊累言於太祖曰慕容劇賊曹英不易與之敵耳太祖黙然未幾親征命峻為隨駕一行都部署破賊之日峻軍在城南其衆先登頗有徳色册府元龜卷四百五十一
