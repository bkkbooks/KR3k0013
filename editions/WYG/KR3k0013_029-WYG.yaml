body:
  text: 册府元龜卷二十九宋王欽若等撰帝王部奉先第二魏文帝黄初元年十一月庚午即位癸酉追尊皇祖太王曰太皇帝考武王曰武皇帝先是帝為魏王漢獻帝命王追尊皇祖太尉曰太王臣欽若等曰即曹嵩也為漢太尉太祖曰武王至是並追尊號二年六月甲辰以京師宗廟未成帝親祀武皇帝於建始殿躬執饋奠如家人之禮案禮將營宫室宗廟為先庶人無廟故祭于寢帝者非禮甚矣四年五月辛酉有司奏造二廟立太皇帝廟大長秋特進侯臣欽若等曰即曹騰也為漢中常侍大長秋貴庭侯也與髙祖合祭親盡以次毁特立武皇帝廟四時享祭為魏太祖萬載不毁也明帝以黄初七年五月丁巳即位癸未追諡母甄夫人曰文昭皇后太和元年正月丁未郊祀武皇帝以配天宗祀文皇帝於明堂以配上帝二月辛巳立文昭皇后寢廟於鄴初甄后賜死故不列廟帝即位有司請追諡曰文昭皇后使司空王朗持節奉䇿以太牢告祠于陵三公奏曰自古周人始祖后稷又特立廟以祀姜嫄今文昭皇后之於後嗣聖徳至化豈有量哉夫以皇家世妃之尊而克譲允恭固推盛位神靈遷化而無寢廟以承享禮非所以報顯徳昭孝敬也稽之古制宜依周禮先妣别立寢廟並奏可四月甲申初營宗廟三年六月戊申追尊髙祖大長秋曰髙皇帝夫人吴氏曰髙皇后並在鄴廟之所祠則文帝之髙祖處士曾祖髙皇太帝共一廟考太祖武皇帝特一廟臣欽若等曰處士明帝五代祖也十一月宗廟成使太常韓暨持節迎髙皇帝太皇帝武帝文帝神主於鄴處士以親盡遷主置園也十二月己丑至奉安神主於廟先是漢獻帝建安十八年太祖為魏公始建魏宗廟於鄴自文帝受禪而雒陽宗廟未成黄初末韓暨為太常奏請迎鄴四廟神主建立雒陽廟四時烝嘗親奏粢盛崇明正禮廢法滛祀多所規正四年以文昭甄皇后舊陵庳下使后父嫡孫虎賁中郎将像兼太尉持節詣鄴昭告后土十二月辛未改𦵏朝陽陵五年詔曰尊嚴祖考所以崇孝表行也追本敬始所以篤教流化也是以成湯文武實造商周書詩之義追尊稷契歌頌有娀姜嫄之事明聖徳之源流受命所繇興也自我魏承天序既發迹於髙皇太皇帝而功隆於武皇文皇帝至於髙皇之父處士君潛修徳譲行動神明斯乃乾坤所福饗先靈所從来也而精神幽逺號稱罔記非所謂崇孝重本也其令公卿以下㑹議號諡侍中劉􅁮議曰聖帝孝孫之欲褒崇先袓誠無量已然親踈之數逺近之降盖有禮紀所以割斷私情克成公法為萬世式也周王所以上祖后稷者以其佐唐有功名在祀典故也至於漢氏之初追諡之義不過其父上比周室則大魏發迹自髙皇始下論漢氏則追諡之禮不及其袓此誠徃代之成法當今之明義也陛下孝思中發情無己已然君舉必書所以慎於禮制也以為追尊之義宜齊髙皇而已尚書衛臻與􅁮議同事遂施行六年四月甲子初進親祼於廟景初元年六月丁未有司奏武皇帝撥亂反正為魏太祖樂用武始之舞文皇帝應天受命為魏髙祖用咸熙之舞羣公有司始更奏定七廟之制曰大魏三聖相承以成帝業武皇帝肇建洪基撥亂夷險為魏太祖文皇繼天革命應期受禪為魏髙祖上集成大命清定華夏興制禮樂宜為魏烈祖於太祖廟北為二祧其左為文帝廟號曰髙祖昭祧其右擬明帝號曰烈祖穆祧三祖之廟萬世不毁其餘四廟親盡迭遷一如周后稷文武廟祧之禮十月乙卯營雒陽宫委粟山為圓丘以曹氏世系出自有虞氏今以始祖帝舜配號圓丘曰皇皇帝天方丘所祭曰皇皇后地以舜妃伊氏配天郊所祭曰皇天之神以太祖武皇帝配地郊所祭曰皇地之祗以武宣皇后配宗祀皇考髙祖文皇帝於明堂以配上帝十二月壬子冬至始祀皇皇帝天於圓丘以始祖有虞帝舜配齊王正始六年十一月祫祭太祖廟乙未有司奏文昭皇后立廟京都永𫝊享祀樂舞與祖同慶在鄴廟嘉平元年正月甲午謁髙平陵在雒水南大石山去雒城九十里晉武帝㤗始元年十二月丙寅受禪丁卯追尊皇祖宣王為宣皇帝伯考景王為景皇帝考文王為文皇帝宣王妃張氏為宣穆皇后景王夫人羊氏為景皇后初宣帝為魏太傅晉國初建追尊曰景王文帝為大将軍録尚書事封晉王諡曰文王至是皆追尊號二年正月有司奏置七廟帝重其役詔宜權立一廟於是羣臣議奏曰上古清廟一宫尊逺神祗逮至周室制為七廟以辨宗祧聖㫖深𢎞逺跡上世敦崇唐虞舍七廟之繁華尊一宫之逺㫖昔舜承堯禪受終於文祖遂陟帝位盖三十載月正元日又格於文祖遂陟帝位此則虞氏不改唐廟因仍舊宫可依有虞氏故事即用魏廟奏可於是追祭征西将軍豫章府君潁川府君京兆府君臣欽若等按晉書征西将軍鈞生豫章太守量量生潁川太守雋雋生京兆伊防防生宣皇帝與宣皇帝景皇帝文皇帝為三昭三穆時宣皇升太祖靈位所以六世與景帝為七廟二月丁丑郊祀宣皇帝以配天宗祀文皇帝於明堂以配上帝七月詔曰主者前奏就魏舊廟誠亦有凖然於祗奉明主情猶未安更宜營造于是改創宗廟十一月己丑追尊景帝夫人夏侯氏為景懐皇后時任茂以為夏侯初嬪之時未有王業帝不從辛卯遷祖禰神主於太廟四年七月己邜謁崇陽陵六年因廟毁改修創羣臣議奏曰古者七廟所自宜如禮又曰古雖七廟自近代以来皆廟七室於禮無廢於情為敘亦隨時之宜也其便仍舊七年四月帝将親祠車駕夕牲而儀注還不拜詔問其故愽士奏歴代相承如此帝曰非致敬宗廟之禮也於是實拜而還遂以為制夕牲必躬臨拜十年改築太廟於宣陽門内窮極壮麗廟成帝用摯虞議率百官遷神主於新廟自征西以下車服尊從皆如帝者之儀咸寕元年十二月丁亥追尊宣帝廟曰髙祖景帝曰世宗文帝曰太祖二年六月癸丑薦荔枝于太廟太康元年五月丁卯薦􅌕淥酒于太廟八年九月改營太廟以正月廟殿䧟十年四月太廟成乙巳遷神主於新廟帝迎於道左遂祫祭十二月庚寅太廟梁折恵帝以太熈元年四月即位五月辛未𦵏武帝於峻陽陵廟曰世祖懐帝以光熙元年十一月庚午即位追尊所生太妃王氏為皇太后元帝建武元年三月辛邜即位立宗廟于建康太興二年正月丁卯崇陽陵毁帝素服哭三日使冠軍将軍梁堪守太常馬龜等脩復山陵迎愍帝梓宫於平陽不尅而退時劉曜作亂五月癸丑太陽陵毁帝素服哭三日是歲有詔瑯琊恭王宜稱皇考賀循議云禮典之義子不敢以已爵加其父號帝從之三年正月乙卯詔曰吾雖上繼世祖然於懐愍皇帝皆北面稱臣今祠太廟不親執觴酌而令有司行事于情理不安可依禮更處臣欽若等曰事具禮官奏議門明帝太寕元年二月𦵏元帝於建平陵廟曰中宗三月戊寅朔改元臨軒停饗宴之禮懸而不樂二年正月丁丑帝臨朝停饗宴之禮懸而不樂十二月壬子帝謁建平陵從大祥之禮成帝以太寕三年閏八月己丑即位上明帝尊諡廟曰肅祖咸康元年建安郡君荀氏薨詔曰朕少遭閔凶慈訓無量撫育之勤建安君之仁也一旦薨殂實思報復永惟平昔感痛哀摧其贈豫章郡君别立廟于京都初荀氏為元帝宫人有寵生明帝及瑯琊王褒及明帝即位封建安郡君别立第宅太寕元年迎還宫内供奉隆厚成帝立尊重同於太后故為之立廟八年二月初以武悼夏皇后配饗武帝廟康帝以咸康八年六月甲午即位七月丙辰𦵏成皇帝於興平陵廟號顯宗建元元年正月朔晦成恭杜皇后周忌有司奏至尊年應改服詔曰喪親名教之重也權制出於近代耶於是素服如舊非漢魏之典也穆帝永和七年九月峻陽陵毁甲辰帝素服臨於太極殿三日遣兼太常趙扶修復山陵八年二月峻陽崇陽二陵毁戊辰帝臨三日遣殿中都尉王恵如雒陽以衛五陵五陵謂宣帝髙原陵平陵文帝崇陽陵武帝峻陽陵恵帝太陽陵也九年正月丙寅皇太后與帝同拜建平陵八月遣太尉河間王欽修復五陵十年正月己酉朔帝臨朝以五陵未復懸而不樂十二年十一月遣兼司空散騎常侍車灌龍驤将軍袁真等持節如雒陽修五陵十二月庚戌以有事於五陵告於太廟帝及羣臣皆服緦於太極殿臨三日升平元年正月壬戌朔帝加元服告於太廟哀帝以升平元年五月庚申即位七月戊午𦵏穆皇帝於永平陵廟號孝宗興寕元年三月壬寅皇太妃周氏薨於瑯琊第癸卯帝奔喪詔司徒㑹稽王昱縂内外重務簡文帝咸安元年十二月辛邜初薦酃淥酒於太廟孝武帝以咸安二年七月乙未即位九月甲寅追尊皇妣會稽王妃曰順皇后十月丁卯𦵏簡文皇帝於髙平陵廟號太宗大元元年正月壬寅帝加元服見於太廟甲子謁建平等四陵四年正月丙子謁建平等七陵謂元帝建平陵明帝武平陵成帝興平陵康帝崇平陵穆帝永平陵哀帝安平陵簡文帝髙平陵五年正月乙巳謁崇平陵九年正月辛未謁建平等四陵七月戊戌遣兼司空髙密王純之修謁雒陽五陵十年正月甲午謁諸陵十六年正月庚申改築太廟九月癸未新廟成正室十四間東西儲各一間合十六間棟髙八丈四尺備法駕遷神主於行廟征西至京兆四主及太孫各用其位之儀服四主不從帝者儀是與太康異也諸王既入廟設脯醢之奠及新廟成神主還室又設脯醢之奠十九年六月壬子追尊㑹稽王太妃鄭氏為簡文宣太后詔曰㑹稽太妃文母之徳徽音有融誕載聖明光延於晋先帝追尊聖善朝議不一道以疑屈朕述尊先志常惕於心仰奉遺㫖依陽秋二漢孝懐皇帝故事上太妃尊號曰簡文宣太后初鄭氏為元帝夫人生瑯琊悼王簡文帝末后稱建平國夫人咸和元年薨簡文帝時為瑯琊王制服重有司以王出繼宜降所生國臣不能親奏免國相諸葛顯王上䟽曰亡母生臨臣國没留國第臣雖出後亦無所厭則私情得叙敬后喪孝王已出繼亦還服重此則朋比臣所憲章也穆皇后不奪其志乃徙瑯琊王為㑹稽王追號后曰㑹稽太妃及簡文帝即位未及追尊臨喪封皇子道子為瑯琊王領㑹稽國奉太妃祀二十年二月作宣太后廟於太廟路西陵曰嘉平安帝隆安三年三月己卯追尊所生陳夫人為徳皇太后義熙十二年十月丙寅姚泓将姚先以雒陽降己丑遣兼司空髙密王恢之修謁五陵恭帝元熙元年正月壬辰朔改元以安帝山陵未厝不朝㑹後魏道武天興元年十二月臨天文殿司徒進璽綬追尊成帝已下及后號諡樂用皇始之舞以神元皇帝為始祖臣欽若等按後魏書黄帝以土徳王比積六十七世至成帝成及節荘明安宣景元和定僖成獻凡十二帝獻帝生聖武聖武生神元平文皇帝為太祖臣欽若等按後魏書神元至章平思昭凡三帝思帝生平文昭成皇帝為髙祖臣欽若等按後魏書平文至恵煬烈凡四帝昭成帝平文皇次子也事具帝王帝系門其追尊祖始皆從帝諡焉考為獻明皇帝臣欽若等曰獻明即昭成太子也二年正月甲子初祀上帝於南郊以始祖神元皇帝配十月太廟成遷神元平文昭成獻明皇帝神主于太廟歳五祭用二至二分臘牲用太牢嘗以宗正兼太尉率祭官行事又立神元思帝平文昭成獻明五帝廟於宫中歲四祭用正冬臘九月牲用馬牛各一帝親祭又於雲中及盛樂神元舊都祀神元以下七帝歳三祭正冬臘牲用馬牛各一祭官侍祀四年三月帝親漁薦於寝廟明元永興元年十月壬午即位追尊皇妣劉貴人為宣穆皇后二年九月甲寅𦵏宣武皇帝於盛樂金陵廟號太祖三年四月謁金陵於盛樂五年五月幸雲中七月乙巳登薄山觀宣武遊幸刻石頌徳之處乃於其牢起石壇而薦享焉神瑞二年二月甲辰立太祖廟於白登之西歲一祭具太牢帝親之無常月又詔郡國於太祖廵幸行宫之所各立壇祭以太牢歲一皆牧守侍祀又立太祖别廟於宫中歲四祭用馬牛羊各一後二年又於白登西太祖舊遊之處立昭成獻明太祖廟以九月十月之交帝親祭牲用馬牛羊又於雲中盛樂金陵三所各立太祖廟四時祭官侍祀泰常四年四月庚辰有事於東廟逺助祭者數百國五年五月乙酉詔曰宣武皇帝體道得一天縱自然大行大名未盡盛羙非所以光揚洪烈垂之無窮也今因啟緯圖始覩尊號天人之義煥然著明其改宣為道更上尊諡曰道武皇帝以彰靈命之光啟聖徳之𤣥同告祠郊廟宣於八表太武以泰常八年十月壬申即位十二月追尊妣為密皇太后庚子𦵏明元皇帝於雲中金陵廟號太宗始光三年六月幸雲中舊宫謁陵廟神䴥三年九月癸卯立密皇太后廟于鄴后杜氏生帝而薨帝既立追尊號又立廟于鄴置祀官太常博士齊郎三十餘人侍祀歲五祭刺史四時薦祀以魏郡太后所生之邑復其調役後甘露降於廟庭太延元年十一月行幸鄴祀密太后文成興安元年十月戊申即位十一月壬寅追尊皇考景穆太子為景穆皇帝廟號恭宗皇妣閭氏為恭皇后臣欽若等曰是年二月南安王僭立上太武尊諡廟號世宗大安元年正月辛酉奉世宗恭宗神主于太廟獻文以和平六年五月甲辰即位六月丙寅上文成皇帝尊諡廟號髙宗天安元年三月辛丑奉髙宗神主祔於太廟孝文承明元年六月辛未上太上皇帝尊諡曰獻文皇帝葬于雲中金陵廟號顯宗七月甲辰追尊皇妣李貴人為恵祖后太和五年四月己亥行奉方山建永固石室于山上銘太皇太后終制于金冊六年十一月帝将親祀七廟詔有司依禮具儀於是羣臣議曰昔有虞親䖍祖考来格殷宗躬謁介福逌降大魏七廟之祭依先朝舊事多不親謁今陛下孝誠發中将思親祀稽合古王禮之常典臣等謹按舊章并採漢魏故事撰祭服冠屨牲牢之具罍洗簠簋爼豆之噐百官助祭位次樂官節奏之引升降進退之法别集為拜之儀制可於是帝乃親祭其後四時常祀皆親之十二年五月壬寅增置彛噐於太廟十四年十月癸酉𦵏文明太皇太后馮氏于永固陵甲戌車駕謁永固陵甲申再謁十五年三月甲辰謁永固陵四月乙丑謁永固陵己邜經始明堂改營太廟詔曰祖有功宗有徳自非功徳厚者不得擅祖宗之名居三祧之廟仰惟先朝舊事舛駁不同難以取准今将述尊先志具詳禮典宜制祖宗之號定将来之法烈祖有創基之功世祖有開圻之徳宜為祖宗百世不遷而逺祖平文之功未多於昭成然廟號為太祖道武建業之勲未髙於平文廟號為烈祖比功較徳以為未允朕今奉遷道武太祖顯祖為二祧餘者以次而遷七月乙丑謁永固陵己卯詔議祖宗以道武為太祖臣欽若等曰是年四月七月日辰俱有乙丑己卯案太和十二年閏九月十八年閏二月即是年閠在五月六月也八月壬申詔郡國有時果可薦者送京師以供廟饗乙巳親定禘祫之禮戊午又詔曰明堂太廟並就祖宗配祭配享於斯備矣白登崞山雞鳴山廟惟遣有司行事馮宣王誕先王后復因在官長安立廟宜異常等可勑雍州以時供祭十月庚寅謁永固陵十一月丁卯以明堂太廟成遷七廟神主于新廟十六年正月始以太祖配南郊始以孟月祭廟宗祀顯祖獻文皇帝於明堂以配上帝禮置載戊申詔曰夫四時享祀人子常道然祭薦之禮貴賤不同故有邑之君祭以首時無田之士薦以仲月况七廟之重而用中節者哉自須烝嘗之禮頗違舊義今将迎遵徃式以此孟月時祠于太廟但朝典初改衆務殷凑無違齋潔遂及於今又按承神饗祖必須擇日今禮律未宣有司或不知此可勑太常令尅日以聞九月甲寅朔大序昭穆於明堂祀文明太皇太后於𤣥室帝親為之詞云十月己亥詔曰夫先王制禮所以經綸萬代貽法後昆至乃郊天享祖莫不配祭然而有節白登廟者有為而興昭穆不次故太祖有三層之宇巴陵無方丈之室又常用季秋躬駕展䖍祝禮或有䙝慢之失嘉樂頗渉野合之儀今授衣之旦享祭明堂立冬之始奉烝太廟若復致齋白登便為一月再駕事成䙝瀆廽詳二理謂宜省一白登之髙未若九室之羙幃次之華未如清廟之盛将欲廢彼東山之祀成此二享之敬可勑有司但令内典神者攝行祭事獻明道武各有廟稱可具依舊式十八年閠二月甲戌謁永固陵七月戊戌謁金陵八月庚午謁永固陵十月戊申親告太廟奉遷神主十九年四月太和廟成五月遷文成皇后馮氏神主於太和廟二十三年二月甲戌謁永固陵三月辛卯謁金陵宣武以太和二十三年四月即位上孝文皇帝尊諡𦵏於長陵廟號髙祖六月戊辰追尊皇妣髙氏曰文昭皇后十月丙戌帝謁長陵遵遺詔孝文皇帝三夫人已下悉免歸家丁酉有事於太廟景明元年正月壬寅謁長陵十月丁卯朔謁長陵二年正月丙辰朔謁長陵孝明以延昌四年正月丁卯即位二月甲戌上宣武皇帝尊諡𦵏於景陵廟號世宗十二月丁卯帝與皇太后謁景陵熙平二年七月己巳車駕有事於太廟㓜主釗以武泰元年二月乙卯即位三月甲申上孝明皇帝尊諡𦵏於定陵廟曰肅宗孝荘永安二年三月甲午追尊皇考為文穆皇帝臣欽若等按後魏書文穆皇帝即彭城王也廟號肅祖皇妣李氏為文穆皇后四月癸未遷肅祖文穆皇帝及文穆皇后神主於太廟前廢帝普泰元年二月己巳即位四月壬子有事於太廟九月癸巳追尊皇考為先帝皇妣王氏為先太妃臣欽若等按後魏書先帝即廣陵恵王羽也後廢帝中興二年二月辛亥上孝荘皇帝諡曰武懐皇帝孝武帝即位以武穆廟諱改諡孝荘皇帝廟號敬宗孝武帝即出帝也永熈二年正月丁巳追尊皇考為武穆帝臣欽若等曰武穆帝即廣平武穆王懐也太妃馮氏為武穆后妣李氏為皇太妃西魏文帝以永熙三年閠十二月即位上孝武皇帝尊諡殯於草堂佛寺大統元年三月戊申追尊皇考為文景皇帝臣欽若等按後魏書文景即京兆王也皇妣楊氏為后二年十一月追改始祖神元皇帝為太祖道武為烈祖廢帝以大統十七年三月即位四月庚辰上文皇帝追諡𦵏於永陵後周閔帝元年正月辛丑即天王位臣欽若等曰無年號追尊皇考文公為文王皇妣為文后壬寅祠圜丘詔曰予本自神農其於二丘宜作厥主始祖獻侯臣欽若等按後周書獻侯名莫耶自隂山始居遼西啟土遼海肇有邦國其配南北郊文考徳符五運受天明命祖于明堂以配上帝廟為太廟乙巳祠於太廟辛酉又祠太廟四月壬午謁成陵太祖陵也乙酉還宫丁亥祠太廟七月辛亥享太廟明帝以元年九月即皇帝位十一月庚子祠太廟十二月庚午謁成陵癸酉還宫癸亥太廟成武成元年八月己亥改天王稱皇帝追尊文王為文帝祖考為徳皇帝臣欽若等按後周書徳皇帝諱耽太祖父也武帝以武成二年四月即位上明皇帝尊諡𦵏於昭陵廟保定元年正月戊辰詔曰履端開物實資元后代終成務諒惟宰棟故周文公以上聖之智翼彼姬周爰作六典用光七百自此厥後代失其緒俾巍巍之化歴千祀而莫𫝊郁郁之風終百王而永墜我太祖文皇帝禀純和之氣挺天縱之英徳配乾元功侔造化故能捨末魏之弊風蹈隆周之叡典誕述百官厥用允集所謂乾廵改而重搆豈帝王洪範而已哉朕入嗣大寳思揚休烈今可班斯禮於太祖廟庭己巳祠太廟班太祖所述六官焉臣欽若等曰太祖依周禮六官置百官令班行之七月己酉追封伯父顥為邵國公第三伯父雒生為莒國公天和三年五月庚戌祠太廟十月癸亥祠太廟建徳元年三月誅大冡宰宇文䕶四月庚寅追尊畧陽公為孝閔帝詔曰慎始敬終有國彛典事亡如存哲王通制義崇追逺禮貴尊親故畧陽公至徳純粹天姿秀傑屬魏祚告終寳命将改謳歌允集歴數攸歸上恊蒼靈之慶下昭后祗之錫而禍生肘腋釁起蕭墻白獸噬驂蒼鷹集殿幽辱神器弑酷乗輿寃結生民毒流㝢縣今泊海澄清氣沴涓蕩追尊之禮宜崇徽號遣太師屬國公逈尉遲迥也於南郊上諡曰孝閔皇帝陵曰静陵二年正月乙邜祠太廟四月己亥祠太廟七月己巳祠太廟三年正月己巳祠太廟五年六月辛亥祠太廟六年四月己巳祠太廟十年戊午改𦵏徳皇帝於冀州帝服緦哭于太極殿宣帝以宣政元年六月即位上武皇帝尊諡𦵏於孝陵廟曰髙祖七月己巳祠太廟大象元年正月癸巳祠太廟四月己巳祠太廟二年正月癸巳祠太廟静帝以大象二年五月入居天臺臣欽若等按後周書宣帝大象元年二月傳位於帝居正陽宫至是遂入居天臺上宣皇帝尊諡𦵏於定陵隋髙祖開皇元年二月甲子受禪乙丑追尊皇考桓王為武元皇帝廟號太祖皇妣呂氏為元明皇后遣兼太保宇文善兼太尉李詢奉䇿詣同州告廟兼用女巫同家人禮奉迎神主歸于京師犧牲尚赤祭用日出改周氏左社右廟為右社左廟未言始祖又無受命之祧自髙祖以下置四親廟同殿異室一曰皇髙祖太原府君廟二曰皇曾祖康王廟三曰皇祖獻皇廟四曰皇考太祖武元皇帝廟擬祖遷于上而太祖之廟不毁臣欽若等按隋書太原太守恵瑕生平原太守烈烈生寕逺将軍禎禎生同州刺史桓公忠忠生髙祖周末髙祖為隋國公詔贈烈為太保康公禎為太傅獻公及髙祖為隋王自康公而下並建王爵至是並恵瑕立四廟焉四年正月己巳有事於太廟七年正月癸巳有事於太廟十二年七月己巳有事於太廟十月壬午有事於太廟至太祖神主前帝流涕嗚咽悲不自勝十三年正月壬子親祀武帝煬帝以仁夀四年七月即位上文皇帝尊諡十月己邜𦵏於太陵廟號髙祖大業元年營建雒邑乃於東都固本里北起天經宫以藏髙祖衣冠四時致祭三年六月丁亥詔曰聿追孝享徳莫至焉崇慶寝廟禮之大者然則質文異代損益於時學滅坑焚經典散逸廟堂制度師說不同所以世數多少莫能是正連室異宫亦無定凖朕獲奉祖宗欽承景羙永惟嚴配思降大典於是詢謀在位愽訪儒術咸以為髙祖文皇帝受天明命􅍕有區夏拯羣黎於四海革彫弊於百王恤獄緩刑生靈皆遂其性輕徭薄賦比屋各安其業恢夷宇宙混同車書東漸西被無思不服南征北怨俱荷来蘇駕毳乗風歴代所弗至編髪左袵聲教所罕及莫不厥角闗塞頓顙闕庭譯靡絶時書無虛月韜戈偃武天下晏如嘉瑞休徵表裏禔福猗歟偉歟無得而名者也朕又聞之徳厚者流光治辨者禮縟是以周之文武漢之髙光其典章特立諡號斯重豈非縁情稱述即崇顯之義乎髙祖文皇帝宜别建廟宇以彰巍巍之徳乃遵月祭用表蒸蒸之懐有司以時創造務合典制又名位既殊禮亦異等天子七廟事著前經諸侯二昭義有差降故其以多為貴王者之禮今可依用貽厥後昆是年有司奏請准前議於東京建立宗廟帝謂秘書監栁䛒曰今始祖及二祧已具令後子孫處朕何所又下詔唯議别立髙祖之廟屬有行役遂復停寝九年閠九月己巳幸愽陵庚午帝謂侍臣曰朕昔從先朝周旋於此年甫八歲日月不居倐經三紀追惟平昔不可復希言未卒流涕嗚咽侍衛者皆泣下沾襟册府元龜卷二十九
