body:
  text: 冊府元龜卷五百四宋王欽若等撰邦計部𣙜酤關市絲帛𣙜酤周官萍氏之職掌㡬酒謹酒之事蓋所以察其過多失時而使民節用也漢初或嵗之不登人至艱食慮其麋穀乃申禁止天漢之年爰建𣙜法官設酤釀籠取其利其後郡國舉士議以當罷公車上書稱其非便布在方策論之詳矣若乃稽古立政因時創制灾沴洊作寳穀而貴農游惰尚衆懲奸而革弊於是煩一切之法崇務本之道斯可矣至於析秋毫之心計峻金科之刑典兹固異夫成周設官之㫖也漢景帝中三年夏旱禁酤酒後元年夏大酺民得酤酒武帝天漢三年二月初𣙜酒酤𣙜音較以木渡水曰𣙜謂禁民酤醸獨官開置如道路設木為𣙜獨取其利也𣙜者歩渡橋爾雅謂之石杠今之畧彴是也禁閉其事總利入官而下無繇以得有若渡水之𣙜因立名焉酤音工䕶反彴音酌昭帝始元六年二月詔有司問郡國所舉賢良文學民所疾苦議罷鹽鐵𣙜酤七月罷𣙜酤官令民得以律占租律請當上租者家長身各以其物占占不以實家長不身自書皆罰金二斤沒入所不自占物及買錢縣官也占謂自隱度其實定其辭也占音章贍切下文言占名數其義並同今猶謂獄訟之辨曰占皆其意也蓋武帝時賦歛繁多律外而取今始復舊賣酒升四錢時桑𢎞羊為御史大夫與丞相田千秋共奏罷酒酤元帝時賈捐之上書言文帝時民賦四十丁男三年而一事至武帝民賦數百造鹽鐵酒𣙜之利以佐用度猶不能足而人困矣王莽時羲和魯匡言酒酤獨末幹幹謂主領也酒者天之美禄帝王所以頥養天下饗祀祈福扶衰養疾百禮之㑹非酒不行故詩曰無酒酤我小雅伐木之詩也酤買也言王於族人恩厚要在燕飫無酒則買而飲之而論語曰酤酒不食二者非相反也夫詩據承平之世酒酤在官和㫖便人可以相御也㫖是美也御是進也論語孔子當周衰亂酒酤在民薄惡不誠是以疑而弗食今絶天下之酒則無以行禮相養放而亡限則費財傷民請法古令官作酒以二千五百石為一均率開一盧以賣盧者賣酒之區也以其一邉髙形如鍜家盧故取名耳讎五十釀為準一釀用麄米二斛麴一斛得成酒六斛六斗各以其市月朔米麴三斛并計其賈而參分之參三也以其一為酒一斛之平除米麴本賈計其利而什分之以其七入官其三及糟酨灰炭酨酢漿也給工噐薪樵之費羲和置命士督五均六幹郡有數人皆用富賈雒陽薛子仲張長叔臨菑姓偉等姓姓名偉也乗傳求利交錯天下因與郡縣通姦多張空簿簿訃簿也府藏不實百姓愈病莽知民苦之復下詔曰夫鹽食肴之将将大也一說為食肴之将帥酒百藥之長嘉㑹之好鐵田農之本名山大澤饒衍之藏五均賖貸百姓所取平卬以給贍鐵布銅冶通行有無備民用也此六者非編户齊民所能家作家謂家家自作也必卬於市雖貴數倍不得不買豪民富賈即要貧弱先聖知其然也故幹之每一幹為設科條防禁犯者辠至死奸吏猾民並侵衆庶各不安生後漢和帝永元十六年二月詔兖豫徐冀四州比年雨多傷稼禁酤酒順帝漢安二年十月禁酤酒桓帝永興二年九月丁邜詔以水旱禁郡國不得賣酒祠祀裁足魏國初建時科禁酒蜀先主時以天旱禁酒醸者有刑晉孝武帝太元八年十二月庚午以㓂難初平開酒禁安帝隆安五年以嵗饑禁酒義熈三年二月己丑大赦除酒禁後趙石勒以百姓始復業資儲未豐於是重制禁釀郊祀宗廟皆以釀酒行之數年無復釀者宋文帝元嘉十二年六月禁酒二十年正月乙亥南徐南豫州揚州之浙江江西並禁酒二十二年九月乙未開酒禁南齊武帝永明十一年五月詔曰水旱成灾榖稼傷弊凢三調衆逋可同申至秋登京師二縣朱方姑熟可權斷酒陳文帝天嘉二年十二月甲申太子中庶子虞荔御史中丞孔奐以國用不足奏立煮海鹽傳及𣙜酤之科詔並施行後魏文成太安四年正月丙午始設酒禁是時年榖屢登士民多因酒致􅒬訟或議王政惡其若此故一切禁之釀酤皆斬之獻文即位開酒禁吉㓙賔親則禁有日東魏孝静帝天平四年閏九月禁京師酤酒元象元年四月開酒禁北齊武成帝河清四年二月以年榖不登禁酤酒後主天統五年十月壬戌詔禁造酒武平六年閏八月辛巳開酒禁隋文帝開皇三年以周末之弊官置酒坊至是罷酒坊與百姓共之唐髙祖武徳二年閏二月詔曰酒醪之用表節制於歡娱芻豢之滋致肥甘于豐衍然而沉湎之軰絶業亡資惰寙之民騁嗜奔慾方今烽燧尚警兵革未寧年數不登市肆騰踊趣末者衆浮冗尚多肴羞麴糵重増其費救弊之術要在權宜關内諸州官民具斷屠酤髙宗咸亨元年七月庚戌粟麥貴斷五熟雜食酤酒𤣥宗先天二年十一月禁京城酤酒嵗饑故也肅宗乾元元年三月詔曰為政之本期於節用今農工在務廪食未優如聞京城之中酒價尤貴但以麴糵之費有損國儲游惰之徒益資廢業其京城内沽酒即冝禁斷麥熟之後仍依常式二年十月禁沽酒除光禄供進祭祀及宴蕃客外一切禁斷代宗寳應二年三月以泰陵乾陵發引詔禁酤酒廣徳二年十二月詔天下州縣各量定酤酒户随月納稅除此之外不論官私一切禁斷徳宗以大歴十四年五月即位七月罷天下𣙜酒建中三年閏正月初𣙜酒天下悉令官釀斛收直一千米雖賤不得減二千委州縣綜領醨薄私釀罪有差以京師王者都特免其𣙜貞元二年十二月度支請於京城及畿縣行𣙜酒之法每㪷𣙜一百五十其酒户並蠲免差役從之憲宗元和二年正月制酤酒及雜𣙜率並同禁斷六年六月京兆府奏𣙜酒錢除出正酒户外一切随兩稅青苖錢據貫均率從之十四年七月湖州刺史李應奏先是官酤代百姓納𣙜嵗月既久為弊滋深伏望許令百姓自取酤登舊額仍許入兩稅随貫均出依舊例折納輕貸送上都許之𣙜酒錢舊皆随兩稅徴衆户自貞元已来有土者競為進奉故上言百姓困弊輸納不充請置官坊酤酒以代之既得請則嚴設酒法閭閻之人舉手觸禁而官收厚利以濟其私為害日久矣及李應奏罷議者謂宰臣能因湖州之請推為天下之法則其弊革矣穆宗以元和十五年正月即位閏正月浙西觀察使竇易直奏當道舊例官酤酒代百姓納𣙜去年湖州刺史李應奏請罷當州官酤代百姓納𣙜庶戎鎮易為安撫疲人免輸𣙜利勅曰不酤官酒有益疲人管内六州皆合一例宜並准湖州勅䖏分議者是李應而非易直長慶元年正月制𣙜酒錢有已分配百姓䖏又置酒店官酤并諸色𣙜率切宜禁斷三年王仲舒出為江西觀察奏罷犯𣙜酒之罪以官錢三萬貫代貧户輸稅文宗太和四年七月湖南觀察使韋詞奏前使王公亮奏請𣙜麴收其贏利将代上供臣到州察訪自停加配閭里稍安人户逃者亦漸歸復但藏挾頗易挂䧟頗多兼當州土宜少有麴麥州司逺䖏求糴般運甚難伏請却停𣙜麴任商旅将至當州州司准𣙜酒元勅及洪州鄂州流例於州縣津市官酤以代人户配額可之五年正月江西觀察使裴誼奏當道從太和元年觀察使李憲以軍用不足奏請禁百姓造酒官中自酤吏縁為奸酒味薄惡老病生産盡不堪任公開倖門私謗盈路臣叨膺重寄合務便人請停官酤任自醖造臣請諸色方圎節儉冀使軍用濟便人無怨咨可之六月誼又奏洪州每年合送省𣙜酒錢五萬貫文舊例百姓醖造其錢依前例随百姓兩稅貫頭均納當管洪州停官店酤酒其錢已據數均配訖並不加配業户從之八年二月詔京邑之内本無𣙜酤屬貞元用兵之後費用稍廣始定店户等第令其納𣙜況萬方所聚私釀至多禁令既不可施𣙜利自無所入徒立課額殊非恵人其長安萬年兩縣見徴𣙜酒錢一萬五千一十貫八百文若先欠者並宜放免其𣙜酒錢起今亦宜停武宗㑹昌六年九月勅揚州等八道州府置𣙜麴并置官店酤酒代百姓納𣙜酒錢并充資助軍用各有𣙜許限揚州陳許江州襄州河東五䖏𣙜麴浙西浙東鄂岳三䖏置官酟酒如聞禁止私酤過聞嚴酷一人違犯連累數家閭里之間不免咨怨宜從今以後如有私酤酒及買私麴者但許罪止一身并所由容縱任據罪䖏分鄉井之内如不知情並不得追擾其所犯之人任用重典兼不得沒入家産梁太祖開平三年十一月勅許諸道州府百姓自造麴官中不禁後唐明宗天成三年七月詔曰應三京鄴都諸道州府鄉村人户自今年七月後於夏龝田苖上每畝納麴錢五文足陌一任百姓自造私麴醖酒供家其錢随夏秋徴納其京都及諸道州府縣鎮坊界内應逐年買官麴酒户便許自造麴醖酒貨賣仍取天成二年正月至年終逐户計算都買麴錢數内十分只納二分以充𣙜酒錢便從今年七月後管數徴納𣙜酒户外其餘諸色人亦許私造酒麴供家即不得裏私賣酒如有固違便仰糾察勒依中等酒户納𣙜其坊一任酤賣不在納𣙜之限其麴勑命到後任便踏造如賣麴酒户中有去年曽賣麴今年因事不辨買麴住開店者則與出落如覩新勑有情願開店投𣙜者則不計舊户便令依見納錢中等户例出𣙜以後酒户中有無力開店賣酒亦許随䖏陳状其舊納麴錢並宜停廢應諸䖏麴務據見管麴亦仰十分減八分價錢出賣不得更請官本踏造時孔循以麴法殺一家於雒陽或獻此議以為愛其人便於國故行之長興元年二月赦書節文諸道州府人户每秋苖一畝上元徴麴錢五文今後特放二文只徴三文二年五月詔曰酒醴所重麴糵是先頃縁賣價太髙禁條頗峻士庶因斯而抵犯刑名繇是以滋彰爰行改革之文庶息煩苛之政各随苖畝量定稅錢訪聞數年已来雖犯法者稀而傷民則甚蓋以亂離日久貧下户多纔過昇平且勤稼穡各務耕田鑿井孰能枕麴藉糟既随例以均攤遂抱虚而輸納漸成凋弊深可憫傷況欲致豐財必除時病有利之事方切施行無名之求尤宜廢罷但得日新之理何辭夕改之嫌應三京諸道州府苖畝上所徴麴錢等便從今年夏並放其麴官中自造委逐州減舊價一半於在城撲斷貨賣除在城居人不得私造外鄉村人户或要供家一任私造勅下之日人甚恱之是年七月三司奏諸道州府申論先有勅命許百姓造麴不来官塲收買伏慮課額不迨請准已前麴法百姓與在城條法一例指揮從之仍據百姓已造到麴令送納入官量支還麥本周太祖廣順元年九月詔改麴法凢犯五斤已上者䖏死先是漢法不計斤兩多少並處極刑至是始革之周世宗顯徳四年七月詔曰諸道州府麴務今後一依往例官中禁法賣麴逐䖏先置都務候勅到日並仰停罷據見在麴數依時踏造候人户将價錢據數給麴不得賖賣抑配與人應鄉村人户今後並許自造米醋及買糟造醋供食仍許於本州縣界就精美䖏酤賣其酒麴法條依舊施行先是自晉漢已来諸道州府皆𣙜計麴額置都務以酤酒民間酒醋例皆醨薄世宗知其弊故令改法關市周禮司關掌國貨之節神農為市致天下之人故出入有征交易而退将俾人知禁而物有平也自漢興已還國用斯廣故察其過所謹其貨財譏訶偽遊以重其明禁増加賦算以給乎有司斯亦因時有為以助經費者也自兹厥後蓋無改焉周文王治岐關市譏而不征關以譏察非常不征稅也齊桓公踐位十九年施關市之征正賦五十而取一取其貨財五十之一十二年三月除關無用傳景帝四年春復置諸關用傳出入孝武元光六年初算商車元狩四年冬初算緡錢先是公卿言商賈滋衆貧民蓄積無有皆仰縣官異時算軺車賈人之緡錢皆有差小請算如故緡絲也用以貫錢每貫千錢出二千為算也諸賈人末作貰貸買賣居邑貯積諸物貫賖也貸假與也及商以取利者雖無市籍各以其物自占占之贍切隱度也各隱度其財物多少而為名簿送之於官率緡錢二千而算一計其有二千錢則出一算諸作有租及鑄以手力所作而賣之者率緡錢四千而算一非吏比者三老北邉騎士軺車一算比例也身非為吏之例非為三老非為北邉騎士而有軺車皆令出一算商賈人軺車二算船五丈以上一算匿不自占占不悉戍邉一嵗沒入緡錢有能告者以其半畀之有不輸稅令人得告以半與之也太初四年徙𢎞農都尉治武關稅出入者以給關吏卒食漢書地理志𢎞農郡有故秦之函谷關上黨郡有上黨關壼口關石研關天井關牂柯郡有柱蒲關進桑關巴郡魚復有江關都尉治敦煌郡有陽關玉門關代郡有五原關蒼梧郡有灕水關荔平關合浦郡有合浦關天漢二年冬十一月詔關都尉曰今豪傑多逺交依東方羣盜其謹察出入者舊制入關皆用傳傳法因裂繻帛分半後復出合之以為符信買符也郭丹從宛人陳兆買入關符既入關封符乞人也後漢章帝元和二年冬十一月壬辰日南至初閉關梁易曰先王以至日閉關商旅不行又後漢書志河南有函谷關左右絶岸十丈中容車有轘轅關有銅關𢎞農郡有潼關河南有武牢關中山有馬鞍關堂關陽安關南陽有武關魏文帝初嗣魏王位下令曰關津所以通商旅設禁重稅非所以便民其輕關津之稅皆復什一晉元帝自過江凢貨賣奴婢馬牛田宅有文劵率錢一萬輸估四百入官賣者三百買者一百無文劵者隨物所堪亦百分收四名為􅄆估又都西有石頭津東有方山津各置津主一人直水五人以檢察禁物及亡叛者其荻炭魚薪之類小津者並十分稅一以入官其東路無禁貨故方山津檢察甚簡淮水北有大市百餘所小市十餘所大市備置官司稅歛既重時甚苦之孝武寧康元年詔除丹陽竹格等四桁稅晉書地理志河南郡有函谷關成臯關鄂阪關延壽關闗農有函谷舊關上雒有嶢關汲郡有銅關武昌郡有溢口關宋孝武帝大明八年詔曰東境去嵗不稔宜廣商貨逺近販鬻来者可停道中雜稅其以仗自防悉勿禁顧憲之字士思後廢帝元徽中為東中郎長史行㑹稽郡事時齊武帝扵餘姚立邸頗縱恣憲之至郡除之西陵戍主杜元懿以吴興嵗儉㑹稽年登商旅往来倍嵗西陵牛埭稅官格日三千五百元懿加至一倍計年長百萬浦陽南北津及栁浦四埭乞為官領攝一年格外長四百許萬武帝以示㑹稽郡使陳得失憲之議曰尋始立牛埭之意非茍通僦以納稅也當以風濤迅險人力不㨗屢致膠溺濟急以利物耳既公私是樂故輸直無怨京師航渡即其例也而後之監領各務己功互生理外或禁遏别道或空稅江行或撲船倍價或力周而猶責凢如此類不經埭煩牛者上詳被報蒙停格外十條從来喧訴始得暫弭案吴興頻嵗失稔今兹尤饉去乏從豐良繇饑棘或徴貸貿粒還拯親累或提携老弱陳力餬口埭司責稅依俗弗降舊格新減尚未議登格外加倍将以何術皇慈恤隱振廪蠲調而元懿幸災𣙜利重増困瘼人而不仁古今共疾且比見加格置市者前後相屬非唯新加無贏並皆舊格有闕愚恐元懿今啓亦當不殊若事不副言懼貽譴詰便百方侵苦為公賈怨元懿禀性苛刻已彰往効任以物土譬以狼将羊其所欲舉腹心亦當獸而冠耳書云與其有聚歛之臣寧有盜臣言盜公為損盖微歛民所害乃大也然掌斯任者應簡亷平則無害於人愚又以便宜者蓋謂便公宜於人也竊見頃之言便宜者非能於人力之外用天分地者也率皆即日不宜於人方來未便於公名與實反有乖政體見如此等誠宜深察山隂一縣課户二萬其人貲不滿三千者殆将居半刻又刻之猶且三分餘一凢有貲者多是士人復除其貧極者悉皆露户役民三五屬官蓋惟分定百端輸調又則常然比衆局檢校首尾尋續横相質累者亦復不少一人被攝十人相追一緒裁萌千孽互起蠶事㢮而農業廢賤取庸而貴舉責應公贍私日不暇給欲無為非其可得乎且死不憚矧伊刑罰身且不愛何況妻子是以前檢未窮後巧復滋禁網徒峻猶不能悛竊尋人之多偽寔繇宋季軍旅繁興役賦殷重不堪勤劇倚巧祈優積習生常遂迷忘反四海之大庶黎之衆心用參差難卒澄一化宜以漸不可疾責誠存不擾藏疾納洿務詳寛簡則稍自歸淳又被簡符前後年月久逺其事不存符㫖既嚴不敢闇信縣簡送郡郡簡呈使殊形詭状千變萬源聞者忽不經懐見者寔足傷駭兼親屬里伍流離道路時轉寒涸事方未已其士人婦女彌難厝𠂻不簡則疑其有巧欲復未知所安愚謂此條宜委縣簡保舉其綱領畧其毛目乃當有漏不出貯中庶嬰疾沉痼者重荷生造之恩又永興與諸暨罹唐㝢㓂擾公私之殘燼彌復特甚儻逢水旱寔不易思俗諺云㑹稽打皷送恤吴興􅇍擔令史㑹稽舊稱沃壤今猶若此吴興本是塉土事在可知因循餘弊誠宜改張武帝並從之繇是深以方直見知後魏孝明孝昌三年閏十一月稅市出入者各一錢店舍為五等前廢帝初即位詔稅市及稅監之官悉廢之北齊後主武平六年以軍國資用不足稅關市舟車山澤鹽鐵店肆重輕各有差時黄門侍郎顔之推奏請開府鄧顒贊成之後主大恱於是以其所入以供御府聲色之費軍國之用不在此後周閔帝元年初除市門稅宣帝大象二年復稅入市者人一錢隋髙祖初為周相除入市之稅唐太宗武徳九年八月甲子即位是月壬申詔曰逺至邇安昔王令典通財鬻貨生民常業關梁之設襟要斯在義止懲奸無取苛暴近代拘刻禁禦滋彰因山川之重阻聚珍竒而不出遂使商旅寝廢行李稽留上失博厚之恩下蓄無聊之怨非所以綏安百姓懐輯萬方化洽升平克隆至治者也朕君臨區宇情深覆育率土之内靡隔幽遐使公私往来道路無壅賝寳交易中外匪殊思改前弊以諧民俗其潼關以東縁河諸關悉宜停廢其金銀綾等新物依格不得出關者並不湏禁髙宗顯慶二年十二月十九日雒州置北市𨽻太府寺並不湏禁雒州南面北面各置關武后天授二年七月九日勅其雍州已西安置潼關即宜廢省三年四月十六日神都置西市尋廢長安元年十一月二十八日廢京中市二年二月有司表請稅關市鳯閣舍人崔融深以為不可上䟽諫曰伏見有司稅關市事條不限工商但是行旅盡税者臣謹案周禮九賦其七曰關市之賦竊惟市縱繁巧關通末遊欲令此徒止抑所以咸増稅賦臣謹商度今古料量家國竊将為不可稅謹條事跡如左伏惟聖㫖擇焉往古之時醇樸未􅄆公田籍而不稅關防譏而不征中代己来澆風驟進桑麻疲弊稼穡辛勤於是各徇通財争趨作巧求徑㨗之欲速忘嵗計之無餘遂使田莱日荒倉廪不積蠶織休廢弊緼闕如饑寒猥臻亂離斯起先王懲其若此所以稅關市者唯歛出入之商賈不稅往来之行人今若不論商人通取諸色事不師古法乃任情悠悠末代於何瞻仰濟濟盛朝自取􅅓笑雖欲憲章姬典乃是違背周官臣知其不可一也臣謹按易繫辭稱庖羲氏沒神農氏作以日中為市致天下之人聚天下之貨交易而退各得其所班志亦云財者帝王聚人守位養成羣生奉順天徳理國安人之本也士農工商四人有業學以居位曰士闢土殖榖曰農作巧成噐曰工通財鬻貨曰商聖王量能授事四人陳力受職然則四人各業久矣今復安得動而揺之蕭何又云人情一定不復動揺傳又云曺叅相齊國安集大稱賢相叅去屬其後相曰以齊獄市為寄慎勿擾也後相曰理無大於此者乎叅曰不然夫獄市所以并容也今君擾之姦人安所容乎吾是以先之夫獄市兼受善惡若窮之姦人無所容竄久且為亂秦人極刑而天下叛以道化其本不欲擾其末臣知其不可二也四海之廣九州之雜關必據險路市必憑要津若乃富商大賈豪宗惡少輕死重氣結黨連羣喑嗚則彎弓睚眦則挺劍小有失意且猶如此一旦變法定是相驚乗兹困窮或致騷動便恐南走越北走胡非唯流逆齊人亦是攪擾殊俗人如邉徼之地宼賊為隣興胡之旅嵗月相繼儻因科賦致有猜疑一從散亡何以制禁求利雖切為害方深而有司上言不識大體徒欲益帑藏助軍國殊不知軍國益擾帑藏逾空臣知其不可者三也孟軻有云古之為關也将以禦暴今之為關者将以為暴今行者皆稅本末同流且如天下諸津舟航所聚旁通巴漢前指閩越七澤十藪三江五湖控引河雒兼包淮海𢎞舸巨艦千舳萬艘交貿往還昩旦永日今若江津河口致鋪納稅稅則檢覆覆則遲留此津纔過彼鋪復止非唯國家稅錢更遭主司僦賄船有大小載有多少量物而稅􅀈途淹久統論一日之中未過十分之一因此擁滯必致吁嗟一朝失利則萬商費業萬商費業則人不聊生其間或有輕𦕈任俠之徒斬龍刺蛟之黨鄱陽暴虐之客楚中悍壯之夫居則藏鏹出便竦劒加之以重稅因之以威脅一旦獸窮則摶鳥窮則攫執事者復何以安之哉臣知其不可者四也五帝之初不可詳已三王之後厥有著聞秦漢相承典章大敝至如關市之稅史籍有文秦政以雄圖武力捨之而不用也漢武以覇畧英才去之而勿取也何則關為禦暴之所市為聚人之地稅市則人􅄆稅關則暴興暴興則起異圗人􅄆則懐不軌夫人心莫不背善而樂禍易動而難安一市不安則天下之市揺矣一關不安則天下之關動矣況澆風久扇變法為難徒欲禁末逰䂓小利豈知失𤣥默亂大倫魏晉𦕈小齊隋齷齪亦所不行斯道者也臣知其不可五也今之所稅關市者何也豈不以國用不足邉㓂為虞一行斯術冀有殷贍然微臣敢借前箸以籌之伏惟陛下當聖期御𤣥籙與天地合其徳日月合其明役使衆靈宰制羣動沉璧于雒刻石于嵩鑄寳鼎以窮姦坐明堂而布政頌聲洋溢和氣絪緼三皇不足四五帝不足六神化廣洽至徳潛通東夷蹔驚應時平殄南蠻纔動計日歸降西域五十餘國廣輪一萬餘里城堡清夷亭堠静謐以為患者唯有二蕃今吐蕃請命邉事不起即日雖尚屯兵久後終成弛柝獨有默啜假息孤恩惡貫禍盈覆亡不暇征役日已省矣繁費日已稀矣然猶下明制遵太璞愛人力惜人財王侯舊封妃主新禮所有支料咸令減削此陛下以躬率人堯舜之用心也且關中河北水旱數年諸䖏逃亡今始安輯儻加重稅或慮相驚況承平嵗積薄賦日久俗荷深恩人知自樂卒有變法必多生怨生怨則驚擾驚擾則不安中既不安外何能禦文王曰帝王富其人覇王富其地理國若不足亂國若有餘古人有言王者藏於天下諸侯藏於百姓農夫藏於􅁃商賈藏於箧惟陛下詳之必若師興有費國儲多窘即請倍算商客加歛平人如此則國保富強人免憂懼天下幸甚臣知其不可者六也陛下留神繫表屬想政源冒兹炎熾早朝晏坐一日二日機務不遺先天後天靈心宻應時之得失小臣何知率陳瞽詞伏紙惶惕䟽奏帝納之遂寝其事四年十一月又置神都西市中宗景龍元年十一月勅諸非州縣之所不得置市其市常以午時擊皷三百下而衆大㑹日入前七刻擊鉦三百下􅄆其州縣領務少䖏不欲設鉦皷聽之車駕行幸䖏即於頓側立市差三官人權簡校市事是月又勅兩京市諸行自有正鋪者不得於鋪前更造偏鋪名聽用尋常一椽偏廂諸行以濫物交易者沒官諸在市及人衆中相驚動令擾亂者杖八十𤣥宗開元十三年六月二十三日又廢其口馬移入北市二十年勅曰綾羅絹布雜貨交易皆通用如聞市肆必消見錢深非道理自今已後與錢貨兼用不遵者准法罪之天寳八載十月五日西京威逺營置西市華清宫置北市肅宗乾元元年八月勅大散關宜依舊令鳯翔府收管代宗寳應元年九月勅駱谷荆㐮子午等路往来行客所将隨身噐仗等今日已後除郎官御史諸州部統進奉事官任将噐仗隨身自餘私客等皆湏過所上具所将噐仗色目然後放過如過所上不具所将噐仗色目數者一切於守堤䖏勒留大歴八年七月勅京城内諸坊市門至秋成後宜令所繇勾當修補十四年七月令王公百官及天下長吏無得與人爭利先於揚州置邸肆貿易者罷之先是諸道節度觀察使以廣陵當南北大衝百貨所集多以軍儲貿販别置邸肆名託軍用實私其利焉至是乃絶徳宗建中元年九月户部侍郎趙贊條奏諸道津要都㑹之所皆置吏閱商人財貨計錢每千稅二十文二年五月以軍興十一而稅商興元元年春正月癸酉徳宗在奉天行在宫受朝賀畢大赦改元制曰其所加墊陌錢稅間架竹木茶漆𣙜鐵之類悉宜停罷貞元二十一年二月赦文應縁宫市並出正文帖依時價買賣不得侵擾百姓貞元以後京都多中官市物於㕓肆謂之宫市不持文告口含勅命皆以鹽估不中衣服絹帛雜紅紫之物倍髙其估尺寸裂以酬價謂之精供富商皆匿名深居陳列坊閑唯麤厲苦寙市後又強驅入禁中傾車罄輦而去色少不甘毆至血流者中人之出雖沽漿賣餅之家無不徹擔塞門以伺其去蒼頭女奴輕車名馬惴惴衢巷得免捕為幸京師之人嗟愁呌閽訴闕則左右前後皆人也憲宗元和九年五月豐州奏中受降城與靈州城接界請置關從之敬宗寳歴二年七月義成軍節度使李聽奏請於潁州置塲稅商旅以贍軍從之十月京兆尹劉栖楚奏術者數之妙茍利於時必以救患伏以前度甚雨閉門得晴臣請今後每隂雨五日即令坊市閉北門以禳諸隂晴三日便令盡開門使啓閉有常永為定式從之文宗太和五年十月辛未户部侍郎庾敬休奏劒南東川西川山南西道每年稅及陌除錢等伏以劒南道稅茶舊例委度支廵院勾當𣙜稅當司於上都召商人便換太和元年户部侍郎崔元畧與西川節度使商量取其穏便遂奏請稅茶事使司自勾當每年出錢四萬貫送省近年以来都不依元奏并三道諸色錢物州府多逗遛不送皆不禀奉今請取江西例勾當於歸州置廵院所自勾當收管諸色錢物送省所冀免有懸欠仍令廵官李濆専往與徳裕遵古量商制置續具聞奏從之開成二年夏五月武寜軍節度使薛元賞奏泗口稅塲先是一物貨稅今請停去雜稅唯留稅茶一色以助供軍詔曰恵人湏在於必誠革弊宜圗於去本又留茶稅恵則未終宜悉罷之每年特以度支户部錢二萬貫賜供本軍及充驛料先是王智興逐帥自立故朝廷姑息之因請致稅於泗口以贍軍用往来過為㓂掠後之節帥多利其利不革前弊至是除元賞上於閤内遣令條奏及詔下往来之人遂絶怨咨武宗以開成五年正月即位十二月勅京夜市宜令禁斷㑹昌元年七月勅如聞十六宅置宫市已来稍苦於百姓成弊既久湏有改移自今已後所出市一物已上宜並依三宫置市不得令損刻百姓宣宗大中五年八月勅中縣户滿三千已上置市令一人史二人不滿三千户已上者並不得置市官治要路湏置舊来交易繁者聽依三千户法置仍申省諸縣在州郭下並置市官六年正月鹽鐵轉運使兵部侍郎裴休奏諸道節度使觀察使置店停止茶商每斤收蹋地錢并稅經過商人頗乖法理今請釐革横稅以通舟船商旅既安課利自厚三月隴州防禦使薛逵奏伏奉正月二十六日詔㫖令臣移築故關訖聞奏者伏以汧源西境切在故關昔有隄防殊無制置僻在重崗之上茍務髙深今移要㑹之中實堪控扼舊絶泉井逺汲河流今則臨水挾山當川限谷危墻深塹克揚營壘之勢伏乞改為定戎關關吏鈐轄往来臣當界又有南路亦是要衝舊有水關亦請准前扼捉去正月二十七日起工今月十七日畢謹畫圗進上勅㫖薛逵新置關城得其要害形於圗畫頗見公忠宜依所奏七年七月二十日廢州縣市印梁太祖開平元年七月勅宜以關東為内仍以潼關𨽻陕州初置河潼軍使命虢州刺史兼領之是月又改武牢關為虎牢關仍置虎牢軍使後唐荘宗同光二年二月庚午租庸使孔謙奏諸道綱運商旅多於私路茍免商稅不繇官路往来宜令所在關防嚴加捉搦山谷私由道路仍湏彰塞以戢行人三年八月戊寅免湖南蹋地茶稅㳂路稅錢明宗天成元年四月詔曰省司及諸府置稅茶塲院自湖南至京六七䖏納稅以致商旅不通及州使置雜稅務交下煩碎宜定合稅物色名目商旅即許收稅不得邀難百姓諸道鹽務破脚價極多獲少湏有條流以成規制又詔諸州雜稅宜定合稅物色名目不得邀難商旅租庸司先将係省錢物與人廻圗宜令盡底收納以塞倖門四年七月兵部貟外郎趙燕奏切見京城人買賣荘宅官中印契每貫抽稅契錢二十文其市牙人每貫收錢一百文甚苦貧民請行條理從之長興元年正月許州奏准詔放過淮南客二百三十人通商也九月燕人梁庭投匭陳状云天下商稅䖏多不繇舊時關市制度以此倍擾農商亦請減除奸弊勅㫖並許施行二年八月勅應三京諸道州府商稅等多不係屬州府皆是省司差置塲官朕自受命開基勵精布政将推誠而感物每屈己以從人況於列侯尤所注意豈可山河重寄並在藩方關市徴租獨歸省務加以所置職掌素䖏幽微向闤闠以肆威與王公而抗禮蓋已往從權之事豈将来經久之規特議改更貴除繁屑自今已後諸商稅並委逐䖏州府撲斷依省司常年定額勾當辨集冀除生事之端不爽豐財之理晉髙祖天福元年閏十一月壬午勑關防凢有征稅省司曽降條流慮多時而或有隠藏因肆赦而再湏條貫應諸道商稅仰逐䖏将省司合收稅條件文牓於本院前分明張懸不得收卷牓内該稅名目分數者即得收稅如牓内元不該稅着係稅物色即不得收稅宜令所在長吏常加覺察如敢有違條流不将文牓張懸将不合係稅物色收稅罔欺官法停住商賈者盡行具名申送七年十一月宣㫖下三司應有往来鹽貨悉稅之過稅每斤七文住稅每斤一十文其諸道州府應有屬州鹽務並令省司差人勾當既而糴鹽雖多而人户鹽錢又不放免至今民甚苦之漢髙祖乾祐元年詔曰軍國之費務在豐財關市之征資於行旅所宜優假俾遂流應天下商旅来所在並湏饒借不得妄有邀勒隠帝乾祐二年國子司業樊倫上言三事其一耕桑未至國多游民關市之中稅物苛細請稍減省以恵疲民百姓賣物不多所歴關市並望除稅三年六月太常少卿劉恱上言臣伏見買賣耕牛官中元無商稅近日關市場院不禀勅文悉是收稅嵗計其利所入無多在於農民即疲於市易請重降勅文明行止絶勸人耕稼國之大計倉廪有積何莫由斯周太祖廣順元年十二月甲寅相州李筠乞除放黄澤關商稅課利從之二年十一月鄆州言奉詔已示諭商稅院不收絲麻鞵等稅三年正月澶州言於商稅舊額上添長錢二千八百貫麴務添七千貫從今年三月初一納起詔褒之三月詔曰青白池務素有定規祗是近年頗乖循守比来青鹽一石抽稅錢八百文足陌鹽一斗白鹽一石抽稅錢五百文鹽五升其後青鹽一石抽稅錢一千鹽一斗訪聞改法已来不便商旅蕃人漢户求利艱難宜與優饒庶令存濟今後每有青鹽一石依舊抽稅錢八百文以八十五為陌鹽一斗白鹽一石抽稅錢五百鹽五升此外更不得别有邀求如聞邉上鎮舖於蕃漢户市易糶糴衆私抽稅今後一切止絶絲帛管氏有言曰一婦不織天下必有受其寒然則藉其蠶稅教以女工故夏書辨絲枲之貢周官述布帛之利其所由来尚矣歴漢而下經制具存廣狭精粗不中則禁之錦繡纂組有害則却之以庸為名用抑游惰兼粟為貨以通有無茍輕重混淆則良楛雜糅必在明開塞之術防巧偽之源使桑土適均賦歛不濫然後數量可一風俗可齊致任土之宜来厥篚之美五十者可以衣而知榮辱斯亦商功利之一端也周武王時太公以布為貨廣二尺二寸為幅長四丈為疋後封齊以其地負海舄鹵少五榖乃勸以女工之業其後俗漸多織作氷紈綺繡純麗之物漢武帝時桑𢎞羊為治粟都尉領大農天子北至朔方東封太山廵海上旁北邉以歸所過賞賜用帛百餘萬疋皆取足大農其後請均輸帛五百萬疋哀帝初即位詔齊三服官諸官織綺繡難成害女紅之物皆止無作輸紅亦工也後漢章帝建初二年詔齊相勿復送氷紈方空縠吹綸絮氷言色鮮潔如氷方空縠即今方目紗也魏太祖定鄴都令户絹二疋綿二斤餘皆不得擅興藏彊賦弱晉武帝時有司奏依舊調絹綿詔不肯又云有司奏調房子睢陽綿武帝不許恵帝永寜初雒中有錦帛四百萬元帝渡江軍事草創蠻陬賧布不有常凖府中所儲數四千疋宋孝武時齊庫上絹年調鉅萬疋綿亦稱此期限嚴峻人間買絹一疋二三千綿一兩三四百貧者賣妻子其甚者或自縊死侍中陳懐文具陳人困由是薄有所減江左自晉至陳其調丁男調布絹各二丈絲三兩綿八兩禄絹八尺禄綿二兩二分丁女並半之後魏道武天興中詔採諸漏户令輸綸綿自後諸逃户占為紬繭羅殺者甚衆於是雜營户帥遍于天下不𨽻守宰賦役不周户口錯亂太武始光三年詔一切罷之以屬郡縣孝文延興三年七月詔河南六州之民户收絹一疋綿一斤先是舊制民間所織絹布皆幅廣二尺二寸長四十尺為一疋六十尺為一端令任服用後仍漸至濫惡不依尺度於是更立嚴制令一准前式違者罪各有差有司不檢察與同罪太和八年户増帛三疋先是天下户以九品混通户調帛三疋絮二斤絲一斤又入帛一疋二丈委之州庫以供調外之費至是増之以為官司之禄後増調外帛滿二疋所調各隨其土所出其司冀雍華定相秦雒豫懐兖陕徐青濟濟南豫東兖東徐十九州貢綿絹及絲幽平并肆岐涇荆凉梁汾秦安營豳夏光郢東秦西州萬年鴈門上谷靈邱廣寗平凉郡懐化郡上郡之長平白水縣青州北海郡之膠東縣平昌郡之東武平昌縣髙宻郡之昌安髙宻夷安黔􅀈縣秦州河東之蒲坂汾隂縣東徐州東莞郡之莒諸東莞縣雍州馮郡之蓮芍縣咸陽郡之雍寜夷縣北地郡之三原雲陽銅關宜君縣華州華山郡之夏陽縣徐州濟北郡之離狐豐縣東海郡贑榆襄賁縣皆以麻布充稅十年給事中李冲上言准古法立隣里黨三長其民調一夫一婦帛一疋民年十五以上未娶者四人出一夫一婦之調奴任耕婢任績者八口當未娶者四耕牛二十頭當奴婢八其麻布之鄉一夫一婦布一疋下至牛以此為降大率十疋為公調二疋為私調外費三疋為内外百官俸東魏孝静天平元年遷都於鄴六方之衆萬餘人北徙春秋二時賜帛以供衣服費常調之外逐豐稔之䖏折絹糴以充國之儲北齊文宣時天保中調絹以七尺為丈右僕射崔暹言之乃依舊焉武成河清三年定令率人一状調一疋綿八兩凢十斤綿折一斤作絲後周太祖為西魏相創制六官司賦掌功賦之政凢令人自十八以至六十四與輕癃者皆賦之其賦之法有室者嵗不過絹一疋綿八兩單丁者半之其非桑土有室者布一疋麻十斤單丁者又半之豐年則全賦中年半之下年一之皆以時徴焉若囏阨㓙札則不徵其賦隋髙祖開皇二年頒新令遵北齊之制丁男一牀桑土調以絹純麻土調以布絹純以疋加綿三兩布一端加麻三斤单丁及僕𨽻各半之九年平陳髙祖親御朱雀門勞凱旋師行慶賞自門外夹道列布帛之積達于南郭以次頒給所費三百餘萬叚十二年有司上言庫藏皆滿髙祖曰朕既薄賦於人又大經賜用何得爾也對曰用䖏常少納䖏常多略計每年賜用至數百萬段曽無減損於是更闢左藏之院搆屋以受之唐髙祖初平京師傾府藏以賜勲人既而又患國用不給太原人劉義節進計曰今義師數十萬並在長安樵貴而布帛賤若伐街衢及苑中之樹為樵以易布帛嵗取數千萬疋立可致也又藏内繒絹疋皆有餘軸之使申截取剰物以供雜費動盈十餘萬叚矣髙祖並從之大收其利武徳七年定令每丁調隨其鄉土所産綾絹絁各二丈布加五分之一輸綾絹絁者兼調綿三斤輸布者麻三斤代宗大歴中詔曰王制命市納賈以觀人之好惡布帛精麤不中度廣狭不中量不鬻於市漢詔亦云纂組文繡害女紅也朕思以恭儉克己淳朴化人每尚素𤣥之服庶齊金土之價而風俗不一踰侈相髙浸弊於時其来自久耗縑繒之本資錦綺之奢異彩竒文恣其誇競今師旅未戢黎元不康豈使淫巧之功更虧常制在外所織造大張錦獨軟錦瑞錦透背及竭鑿六破已上錦獨窠文紗四尺幅及獨窠吴綾獨窠司馬綾等並宜禁斷其長行髙麗白錦雜色及常行小文子綾錦等任依舊例造其綾錦花文所織盤龍對鳯麒麟獅子天馬辟邪孔雀仙鶴芝草萬字䨇勝及諸織羌樣文字等宜亦禁斷憲宗元和八年四月以錢重貨輕出内庫錢五十萬貫命兩常平收市布帛每端疋於舊估加十之一九年八月詔太府奏建州泉州夀州所納物麤惡短狭布帛有幅制度所存近日勸課不精寙濫方甚遂使女工都棄國用空虚若無所懲何以知懼刺史宜各罰一月課料録事叅軍本縣令各罰一季課料本曺官罰一季課料仍書下考十一年六月京兆府奏今年諸縣夏稅折納綾絹絁紬絲綿等並請依本縣時價只定上中二等每疋加饒二百文綿每兩加饒十五文絲每兩加饒二十文其下等物不在納限小户本錢不足任納絲綿斛㪷湏是本户如有本户輙合集買成疋叚代納者所由决十五枷項令衆宣宗以㑹昌六年三月即位十一月刑部尚書判度支崔元式奏准今年七月二日勅諸道所出次弱綾絹紗等宜令禁斷若舊織得行使仍委所在官中收納如輙更有織造行便買賣同罪湏指射出次弱物州府令户部度支鹽鐵三司同條流聞奏者省司先牒左藏庫勘到所出次弱疋帛州府名額伏以綾絹紗等州府所買機杼織造並合勘充煮練既不堪衣着則虚費織功今欲委諸道節度觀察使刺史差清強官捜獲百姓織造濫惡疋叚狭小機杼焚毁其惡弱疋叚仍具收納數聞奏從之其向後犯者亦條流有差後唐明宗天成二年十二月中書舍人程遜上言以民間機杼多有假偽虗費絲縷不堪為衣請下禁止庶歸朴素漢隱帝乾祐三年左司貟外郎盧振上言古先哲王之制布帛不中度不鬻於市比来組織之物輕重皆有定規近年已来織帛之家過為踈薄徒勞杼軸無益公私臣請三京鄴都諸道州府凢織造之家所織綾羅絁帛諸物並湏斤兩尺度合官定規程不得輙為踈薄所在官吏覺察禁止不得更然周世宗顯徳三年五月詔曰化民成俗湏務真純蠧物害能莫先浮偽織絍杼軸之製素有規程禆販貿易之徒不許違越久無條理漸致澆訛茍所鬻之或精則酬直之必重宜從朴厚用革輕浮應天下今後公私織造到絹帛紬布綾羅錦綺及諸色疋叚其幅尺斤兩並湏合向来制度不得輕弱假偽罔冒取價如有已上物色等限一百日内並湏破貨了絶如限外敢有違犯織造貨賣者即所在節級所由擒捉送官十月詔曰舊制織造絁紬絹布綾羅錦綺紗縠等幅濶二尺五分不得夹帶粉藥宜令諸道州府嚴切指揮来年所納官絹每疋湏及一十二兩河北諸州湏及一十兩務要夾宻停匀其長依舊四十二尺􅁽府元龜卷五百四
