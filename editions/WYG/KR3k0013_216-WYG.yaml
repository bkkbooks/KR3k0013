body:
  text: 册府元龜卷二百十六宋王欽若等撰閏位部征伐秦始皇元年晉陽反將軍䝉驁擊走之二年麃公將卒攻卷斬首三萬三年䝉驁攻韓取十三城十月攻魏氏畼有詭四年㧞畼有詭五年将軍䝉驁攻魏定酸棗燕虚長平雍邱山陽城皆㧞之取二十城六年韓魏趙衛楚共擊秦取夀陵秦出兵五國罷㧞衛廹東郡其君角率其支屬徙居野王阻其山以保魏之河内七年将軍䝉騖死以攻龍孤慶都慶一作麃還兵攻汲八年始皇弟長安君成蟜将軍擊趙九年攻魏垣蒲陽十一年王翦桓齮楊端和攻鄴取九城王翦攻閼與潦楊在并州皆並為一軍翦将十八日軍歸斗食以下百石以下有斗食佐史之秩什推二人從軍取鄴安陽桓齮将十三年桓齮攻趙平陽殺趙将扈輙斬首十萬十四年桓齮攻趙軍於平陽取宜安破之殺其将軍桓齮定平陽武城十五年大興兵一軍至鄴一軍至太原取狼孟太原有狼孟縣十七年内史騰攻韓得韓王安盡納其地以其地為郡命曰潁川十八年大興兵攻趙王翦将上地下井陘山名在常山今為縣端和将河内羗瘣伐趙端和圍邯鄲城十九年王翦羗瘣盡定取趙地東陽得趙王引兵欲攻燕屯中山趙公子嘉率其宗數百人之代自立為代王東與燕合兵軍上谷二十年燕太子丹患秦兵至國恐使荆軻刺秦王秦王覺之體解軻以狥而使王翦辛勝攻燕燕代發兵擊秦軍秦軍破燕易水之西二十一年王賁攻薊乃益發卒詣王翦軍隨破燕太子軍取燕薊城得太子丹之首燕王東收遼東而王之二十二年王賁攻魏引河溝灌大梁大梁城壊其王請降盡取其地二十三年復召王翦強起之使将擊荆取陳以南至平輿汝南有平輿縣虜荆王秦王㳺至郢陳荆将項燕立昌平君為荆王反秦於淮南淮一作江二十四年王翦䝉武攻荆破荆軍昌平君死項燕遂自殺二十五年大興兵使王賁将攻燕遼東得燕王喜還攻代虜代王嘉王翦遂定江南地降越君置㑹稽郡二十六年齊王建與其相后勝發兵守其西界不通秦秦使将軍王賁從燕南攻齊得齊王建三十三年發諸常通亡人贅壻贅謂窮有子使就其婦家為贅壻賈人略取陸梁地為桂林今欝林是象郡今日南南海以適遣遣戍五千萬人守五嶺二世元年七月戍卒陳勝等反故荆地為張楚張大楚國也勝自立為楚王周文自言習兵勝與之将軍印西擊秦行收兵至闗車千乘卒十萬至􅃧軍焉􅃧水名在新豐東秦令少府章邯免驪山徒人奴産子奴産子猶今人云家生奴也悉發以擊楚軍大敗之周文走出闗止屯曹陽曹水之陽也其水出陜縣西南峴顗山西北流入河今謂之好陽澗在陜縣西四十五里二月餘章邯追敗之復走澠池十餘日章邯擊破之周文自剄軍遂不戰蜀先主章武三年三月漢嘉太守黄元以先主疾舉兵攻臨邛縣遣将軍陳􅘈討元元軍敗順流下江為其親兵所縳生致成都斬之後主建興元年夏牂牁太守米褒擁郡反先是益州郡有大姓雍闓反流太守張裔於呉據郡不賓越雋夷王髙定亦皆叛三年三月丞相諸葛亮南征四郡皆平七年春丞相諸葛亮遣陳式攻武都陰平遂克定二郡呉大帝黄武二年􅃧口守将晉宗殺将王直以衆叛如魏魏以為蘄春太守數犯邉境帝令将軍賀齊糜芳劉邵等襲蘄春郡等生虜宗嘉禾三年八月以諸葛恪為丹陽太守討山越四年夏遣吕岱討廬陵賊李桓等赤烏元年春破之六年二月以陸遜討鄱陽賊彭旦等其年皆殺之赤烏二年十月将軍􅃽祕南討夷賊祕所領都督廖式殺臨賀太守嚴網等自稱平南将軍與弟潜共攻零陵桂陽及揺動交州蒼梧鬰林諸郡衆數萬人遣将軍吕岱唐咨討之嵗餘皆破廢帝太平二年八月㑹稽南郡反殺都尉鄱陽新都民為亂廷尉丁宻歩兵校尉鄭曹将軍鐘離牧率軍討之後主寳鼎元年十月永安山賊施但等聚衆數千人永安今武康縣刼後主庻弟永安侯謙屯烏程北至建鄴衆萬餘人丁固諸葛靚逆之於牛屯大戰但等敗走天紀三年夏合浦太守修允部曲督郭馬與部曲将何典王族吳述殷興等攻殺廣州督虞授馬自號都督交廣二州諸軍事興廣州刺史述南海太守典攻蒼梧族攻始興八月以執金吾滕循循一作修假節領廣州牧率萬人從東道討馬興族遇於始興未得前馬殺南海太守劉略逐廣州刺史徐旗又遣徐陵督陶濬将七千人從西道命交州牧陶璜部伍所領及合浦鬰林諸郡兵當與東西軍共擊焉未克而吳降晉循師遂還宋文帝元嘉三年正月遣中領将軍到彦之征北将軍檀道濟討荆州刺史謝晦擒之孝武帝孝建元年二月豫州刺史魯爽車騎将軍江州刺史臧質丞相荆州刺史南郡王義宣襄州刺史徐道寳舉兵反遣佐衞将軍王𤣥謨大破之薛安都時為左軍将軍爽反帝遣安都及冗從僕射胡子反龍驤将軍宗越率歩騎據歴陽爽遣将鄭徳𤣥戍大峴徳𤣥使前鋒楊胡與輕兵向厯陽安都遣宗越及厯陽太守程天祚逆擊破之斬胡與及其軍副徳𤣥復使其司馬梁嚴屯峴東安都幢主周文恭晨往偵候因而襲之悉擒賊未敢進世祖詔安都留三百人守厯陽度還采石遷輔國将軍竟陵内史四月魯爽使弟瑜卒三千人出小峴爽尋以大衆阻大峴又遣安都歩騎八千度江與厯陽太守張㓜緒等討爽安都軍副建武將軍譚金率數十騎挑戰斬其偏帥㓜緒恇怯輙引軍退還安都復還厯陽臧質乆不至世祖復遣沈慶之濟江督統諸軍爽軍食少引退慶之使安都率數騎追之四月丙戍及爽於小峴爽自與腹心壮騎斷後譚金先薄之不能入安都望見爽便躍馬大呼直往刺之應手而倒左右范䨇斬爽首爽累世梟猛生習戰陣咸云萬人敵安都獨單騎直入斬之而反時人皆云闗侯之斬顔良不是過也大明三年四月司空南兖州刺史竟陵王誕據廣陵反以沈慶之為車騎大将軍開府儀同三司南兖州刺史討之八月己巳克廣陵城斬誕初慶之至廣陵誕遣客慶之宗人沈道愍賫書説慶之餉以玉環刀慶之遣道愍反數以罪惡慶之至城下誕登樓謂之曰沈君白首之年何為來此慶之曰朝廷以君狂愚不足勞少壮故使僕來爾誕又餉慶之食提挈者百餘人出自北門慶之不開悉焚之誕於城上投函表倩慶之為送慶之曰我奉詔討賊不得為汝送表汝必歸允朝廷自應開門遣使吾為汝送䕶之自四月至七月乃屠城斬誕明帝即位四方反叛遣龍驤将軍張興世領水軍拒南賊於赭圻築二城於湖口偽龍驤将軍陳慶領舸於前為逰擊軍興世率龍驤将軍佼長生董凱之攻克二城因擊慶慶戰大敗投水死者數千人時臺軍據赭圻南賊屯鵲尾相持乆不决興世欲率所領直取大雷而軍旅未集不足分張㑹薛索兒平定帝使張永以步騎五千留戍盱眙餘衆二萬人悉遣南討山陽又尋平徴阮佃夫所領諸軍悉還南伐衆軍大集乃分戰士七千配興世興世乃令輕舸泝流而上旋復廽還一二日中輙復如此使賊不為之備劉胡聞興世欲上笑之曰我尚不敢越彼下取揚州張興世何人欲輕據我上興世謂沈攸之等曰上流惟有錢谿可據地既險要江又甚狹去大衆不逺應赴無難江有洄洑船下必來泊岸有横浦可以藏船舸二三為宜乃夜渡湖口至散頭因復逥下以疑之其夜四更值風便舉㠶直前賊亦遣胡靈秀諸軍於東岸相翼而上興世夕住景江浦宿賊亦不進夜潜遣黄道標領七十舸徑據錢谿營立城砦明旦興世與軍齊集停一宿劉胡自領水步二十六軍平旦來攻将士欲迎擊之興世禁之曰賊來尚逺而氣盛矢驟驟既力盡盛亦昜衰此曹劌之所以破齊也令將士不得妄動治城如故俄而賊來轉近舫入洄洑興世乃命壽寂之任農夫率壮士數百擊之乃與衆軍相繼進胡於是敗走斬級數百投水者甚衆胡收軍而下時興世城壘未固司徒建安王休仁慮賊並力攻錢谿欲分其形勢命沈攸之吳喜佼長生劉靈遺等以皮艦二十攻賊濃湖苦戰連日斬獲千數是日劉胡果率衆軍欲更攻興世未至錢谿數十里袁顗以濃湖之急􅃍追之錢谿城砦繇此得立賊連戰轉敗興世又遏其糧道尋陽遣運至南陵不敢下賊衆漸飢劉胡乃遣顗安北府司馬偽右軍沈仲玉領千人步取南陵迎接糧運仲玉至南陵領米三十萬斛錢布數十舫竪榜為城規欲突過行至貴口不敢進遣間信報胡令遣重軍援接興世夀寂之任濃夫李安民等三千人至貴口擊之與仲玉相值交戰盡日仲玉走還顗營悉虜其資實賊衆大震胡棄軍遁走袁顗仍亦奔散㤗始元年十月冬晉安王子勛僣位於尋陽城帝遣散騎常侍領軍将軍王𤣥謨領水軍南討吳興太守張永為其後繼又遣寜朔将軍尋陽内史沈攸之寜朔将軍江方興龍驤将軍劉靈貴率衆屯虎檻時東賊甚急張水江方興逥軍東討尚書下符曰夫晦明逓運崇替相㳂帝造之基􅅷業維永聖祖重光氤氲上業狂昏承祀國難以紊毒流九縣釁穢三靈縉紳戮辱黔庻塗炭人神同憤朝野泣血聖上明睿在躬膺符握曜眷懐家國夙夜劬勞懼社稷湮蕪彛倫左袵天威電發氛沴氷消殄㓙焦門不俟鳴條之旅殱虐牧野無勞孟津之鉞華夷即晏晷緯還光鏗鏘間於管絃趨翔被於㓂冕同􅁤仰化異域懐風劉子勛昏世稱兵義同翦惡明朝不戢罔識邪正窺窬畿甸逼遏兩江陵上無君暴於遐邇王赫斯怒興言討逆命彼上将治兵薄伐今遣寜朔将軍尋陽内史沈攸之輕鋭七萬飛舟先邁龍驤将軍劉靈遣羽林虎旅連鋒繼進假節督南討前鋒諸軍事冠軍将軍兖州刺史殷孝祖驅濟河涇卒電擊雷動使持節車騎将軍江州刺史曲江縣開國侯王𤣥謨烝徒五萬董繞前師使持節侍中司徒揚州刺史建安王休仁擁神州之衆總督羣師龍驤将軍劉䘏寜朔将軍劉懐珍步騎五千直指大雷寜朔将軍栁倫司州刺史龎孟虬淮頴突騎邪趣西陽使持節驃騎大将軍豫州刺史山陽王休祐總勒步師連旗百萬河舟代馬遄騖江濆越棘呉鈎交曜畿服笳鼓動坤維金甲震雲漢犄角相望水陸俱發冠軍将軍武念率擁司之鋭已據樊沔徐州刺史申令孫提彭宋剽勇陸塗炎奮皇上當親馭六師降臨江服旌斾掩雲舳艫咽海昔吳楚連衡燕淮勁悍塵擾區内聲沸秦中霧散埃滅豈非先鑒而嬰彼孤城以代該天之網廹此烏合以抗絡寓之師雲羅四掩霜鋒交集猶勁颷之拂細草烈火之掃寒原樵卷之形昭然已著朝廷惻愍我僚吏哀矜我士民並亦何辜拘誤迷黨故加宣示令得自新如其淪惑不改抵冐王威同焚既至雖悔奚補奉詔以四王㓜弱不幸䧟難交兵之日不得妄加侵犯若有逼損誅翦無貸左右主帥嚴相衛奉註誤之罪一無所問二年八月討平之二年正月吳郡太守顧琛吳興太守王曇生義興太守劉延熈晉陵太守袁標山陽太守程天祚並舉兵反遣鎮軍巴陵王休右統軍東討二月討平之後廢帝元徽二年五月江州刺史桂陽王休範舉兵反以中領軍劉勔右衛将軍蕭道成前鋒南討出屯新亭征北将軍張永屯白下前南兖州刺史沈懐明戍石頭南齊武帝永明八年八月荆州刺史巴東王子響反遣丹陽尹蕭順之討之子響伏誅海陵王延興元年九月晉安王子懋起兵遣中䕶軍王𤣥邈討誅之明帝永㤗元年四月大司馬㑹稽太守王敬則舉兵反五月遣輔國将軍劉山陽率軍討斬之東昏侯永元元年八月丙午揚州刺史始安王遥光據東府反遣領軍将軍蕭坦之致討尚書符遥光曰逆順之數皎然有徴干紀亂常刑兹罔赦蕭遥光宗室蚩庸才行鄙薄緹裙可望天路何階受遇自昔恩加猶子禮絶帝體寵越皇季旗章車服窮千乘之尊闉隍爽塏踰百雉之制及聖后在天親受顧託話言在耳徳音猶存侮蔑天明罔畏不義無君之心履霜有日遂乃稱兵内犯竊發京畿自古巨釁莫斯為甚今便分命六師𢎞宣九伐皇上當親御戎軒𢎞此廟略信賞必罰有如大江戊午斬遥光傳首十一月太尉江州刺史陳顯達舉兵反於尋陽加䕶軍将軍崔慧景平南将軍督衆南討斬之二年正月詔討豫州刺史裴叔業二月以衛尉蕭懿為豫州刺史征夀春叔業病死梁髙祖天監元年五月戊子江州刺史陳伯之舉兵反以領軍将軍王茂為征南将軍江州刺史率衆討之十年三月鄧晰以胊山引魏軍遣振逺将軍馬仙琕討之是月魏徐州刺史盧昶率衆赴胊山十二月仙琕大破魏軍克復朐山城中大通二年八月山賊聚結㓂㑹稽郡所部縣九月假超武将軍湛海􅈿節以討之大同十年妖賊王勤宗起于巴山郡以威逺将軍陳昕為宣猛将軍假節討平之太清二年八月大将軍侯景舉兵反擅攻馬頭木栅荆山等戍以前将軍開府儀同三司邵陵王綸都督衆軍討景元帝大寳元年九月侯景偽将任約㓂西陽武昌遣左衛将軍徐文盛右衛将軍隂子春太子右衛率蕭慧正雋州刺史席大獻等下武昌拒約二年五月帝遣逰擊将軍胡僧祐信州刺史陸法和率衆下秣陵任約敗景遂遁走以王僧辯為征東将軍開府儀同三司尚書令胡僧祐為領軍陸法和為䕶軍将軍仍令僧辯率衆追景所至皆㨗僧辯為鎮衛將軍侍中尚書令時湘州賊陸納等攻破衡州刺史丁道貴於碌口盡收其軍實李洪雅又自零陵率衆出空陵灘稱助討納朝廷未達其心深以為慮乃遣中書舍人羅重歡徴僧辯上就拜驃騎将軍宜豐侯循南征僧辯因督杜崱率衆軍發於建業師次巴陵詔僧辯為都督東上諸軍事驃騎覇先讓都督於僧辯不受故世祖分為東西都督而俱南討焉時納等下據車輪夾岸為城前斷水勢士率驍猛皆百戰之餘僧辯憚之不與輕進於是稍作連城以逼賊賊見不敢交鋒並懐懈怠僧辯因其無備命諸軍水歩攻之親執旗鼓以誡進止於是諸軍競出大戰於車輪與驃騎循並力苦攻䧟其二城賊大敗走歩歸保長沙驅逼居民入城拒守僧辯追躡乃命築壘圍之悉令諸軍廣建圍栅僧辯出坐壟上而自臨視賊望識僧辯知不設備賊黨呉藏李賢明等乃率鋭卒千人開門掩出蒙楯並進遥趍僧辯時杜崱杜龕並侍左右帶甲衛者皆百餘人因下逆入與賊人交戰李賢明乘鎧馬從者十騎大呼衝突僧辯尚據胡􅇃不為之動於是指揮勇敢遂獲賢明而因即斬之賊乃退歸城内初陸納阻兵内逆以王琳為辭云朝廷若殺王琳納等自當降伏於是衆軍並進未之許也而武陵王擁衆上流内外駭懼世祖乃遣琳和解之至是湘州平陳武帝永定二年十月遣鎮南将軍開府儀同三司周文育都督衆軍出討余孝勵文帝天嘉二年十一月東陽太守留異叛舉兵戍下淮及建徳帝乃下詔曰昔四罪難𢎞大媯之所無赦九黎亂徳少昊之所必誅自古皇王不貪征伐茍為時蠧事非獲已逆賊留異數應亡滅繕甲完聚繇來積年進謝羣龍自躍於千里退懐首䑕恒持於百心中嵗宻契畨禺既𢎞天網賜以名爵敦以國姻儻望懐音猶能革面王琳竊據中流翻相應接控引南川之嶺路專為東道之主人結附㓙渠唯欣禍亂既妖氛盪定氣沮心孤類傷鳥之驚弦等窮獸之謀觸雖復遣家入質子陽之態轉遒侍子還朝隗􅅝之心方熾朕志相成養不計疵慝披襟解帶敷喻殷勤蜂目彌彰梟聲無改遂置軍江口嚴戍下淮顯然反叛非可容匿且縉邦膏腴稽南殷曠永割王賦長壅國民竹箭良材絶望京輦萑苻小盗共肆貪殘念彼餘甿兼其慨息西戎屈膝自欵重關秦國依風並輸侵地三邊已又四表咸寜唯此微妖所宜清殄可遣使持節都督南徐州諸軍事征北将軍司空南徐州刺史桂陽郡開國公侯安都指往擒戮罪止異身餘無所問先是晉安太守陳寶應娶留異女為妻侯安都之討異也寶應遣兵助之又資周廸兵糧出㓂臨川及都督章昭逹於東興南城破廸帝因命昭逹都督衆軍繇建安南道渡嶺又命益州刺史領信義太守余孝頃都督會稽東陽臨海永嘉諸軍自東道㑹之以討寶應並詔宗正絶其屬籍於是尚書下符曰告晉安士庶昔隴西旅拒漢不稽誅遼東叛渙魏申宏略若夫無諸漢之䇿勲有扈夏之同姓至於納吳濞之子致横海之師違姒啓之命有甘誓之討况廼族不繫於宗盟名無紀於彞器而顯成三叛釁深四罪者乎案閩㓂陳寶應父子卉服支孽本迷愛敬梁季喪亂閩隅阻絶父既豪俠扇動蠻陬椎髻箕坐自為渠帥無聞訓義所資姦謟爰肆蜂豺俄而解印炎行方謝綱漏吞舟日月居諸棄之度外自東南王氣實表聖基斗牛聚星允符王迹梯山航海雖若欵誠擅割懐􅈿競致職貢朝廷遵養舍𢎞寵靈隆赫起家臨郡兼晝繡之榮裂地置州假藩麾之盛即封戸牗仍邑櫟陽乘華轂者十人保弊廬而萬石又以盛漢君臨推恩婁敬隆周朝㑹廼長滕侯繇是紫泥青紙逺賁恩澤鄊亭龜組頒及嬰孩自谷遷喬孰復為擬而包藏鴆毒敢行狼戾連結留異表裏周廸盟㰱婚姻自為唇齒屈彊山谷推移嵗時及我彀騎防山定秦望之西部戈船下瀬克滙澤之南川逐敢舉斧並助㓙孽莫不應弦摧衂盡殪醜徒每以罪在酋渠憫茲驅逼所收俘馘並勒矜放仍遣中使爰降詔書天網恢𢎞猶許改思異既走險廸又逃刑誑侮王人為之川藪遂使袁熈請席逺歎頭行馬援觀蛙猶安井底至如遏絶九賦剽掠四民闔境資財盡室封奪凡厥蒼頭皆略黔首蝥賊相扇叶契連蹤乃復踰超瀛溟㓂擾浹口侵軼嶺嶠掩襲述城縳掠吏民焚燒官寺此而可縱孰不可容今遣沙州刺史俞文冏明威将軍程文季假節宣猛将軍成州刺史甘他假節雲旗将軍譚􅖰假節宣猛将軍前監臨海郡陳思慶前軍将軍徐智逺明毅将軍宜黄縣開國侯慧紀開逺将軍新除晉安太守趙彖持節通直散騎常侍壮武将軍定州刺史康樂縣開國侯林馮假節信威将軍都督東討諸軍事益州刺史余孝頃率羽林二萬蒙衝盖海乘跨滄波掃蕩巢窟此皆明耻教戰濡須鞫旅累從楊僕亟走孫恩斬蛟中流命馮夷而鳴鼓黿鼉為駕􅞂方壺而建旗義安太守張紹賓忠誠欵到累使求軍南康内史裴忌新除輕軍将軍劉峰東衡州刺史錢道戢並即遣人仗與紹賓同行故司空歐陽公昔有表奏請宣薄伐遥途意合若伏波之論兵長逝遺誠同子顔之勿赦征南薨謝上䇿無忘周南餘恨嗣子弗忝廣州刺史歐陽紇克符家聲聿遵廣略舟師歩卒二萬分趍水扼長鯨陸掣封豕董率衡廣之師㑹我六軍潼州刺史李䐗明州刺史戴晃新州刺史區白獸壮武将軍修行師陳㽞太守張遂前安成内史闕慎前廬陵太守陸子隆前豫章太守任蠻奴巴山太守黄法慈戎昭将軍湘東公世子徐敬成呉州刺史魯廣達前呉州刺史遂興縣開國侯詳使持節都督征討諸軍事散騎常侍䕶軍将軍昭達率緹騎五千組甲二萬直度邵武仍頓晉安按轡揚旗夷山堙谷指期犄角以制飛走前宣威太守錢肅臨川太守駱牙太子左衛率孫詡尋陽太守莫景隆豫章太守劉廣徳並隨機鎮遏絡驛在路使持節散騎常侍鎮南将軍開府儀同三司江州刺史新建縣開國侯法􅉤戒嚴中流以為後殿斧鉞所臨罪唯元惡及㽞異父子其黨主帥雖有請泥函谷相背淮隂若能翻然改圖因機立効非止肆𤯝仍加賞擢其建晉士民乆被驅廹者大軍明加撫慰各安樂業流寓失鄊即還本土其餘立功立事已具賞格若執迷不改同惡趦趄斧鉞一臨罔知所赦昭逹已克周廸踰東興嶺頓於建安余孝頃又自臨海道襲于晉安寳應據建安之湖際逆拒王師水陸為栅昭達深溝髙壘不與戰但命軍士伐木為簰俄而水盛乘流放之突其水栅仍水歩薄之寳應亂身奔山草間窮而就執並其子弟二十人送都斬于建康市初㽞異據擁東陽安都奉詔率衆討之異本謂臺軍繇錢塘江而上安都乃歩繇㑹稽之諸暨出永康異大恐奔桃枝嶺處岩谷間於罍竪栅以拒王師安都作連城攻異躬自接戰為流矢所中血流至足安都乘轝麾軍容止不變因其山隴之勢迮而為堰天嘉三年夏潦水漲滿安都引船入堰起樓艦與異城等放拍碎其樓雉異與第二子忠臣脱身奔晉安虜其妻子盡收其人馬甲仗振旅而歸廢帝光大元年五月乙未安南将軍湘州刺史華皎謀反以中撫大将軍淳于量為使持節征南大将軍總率舟師以討之宣帝太建元年十月新除左衛将軍歐陽紇據廣州舉兵反遣車騎将軍開府儀同三司章昭逹率衆討之二年二月擒斬之東魏孝静帝天平元年閏十二月梁髙祖以元慶和為魏王入據平瀬鄉遣尚書右僕射元晏為東南道行臺破走之武定二年二月徐州人劉烏黒聚衆反遣行臺慕容紹宗討平之五年二月司徒河南大行臺侯景降于梁以尚書左僕射慕容紹宗為東南道行臺與大都督髙嶽潘相樂大破之北齊武成帝河清元年七月太祖冀州刺史平秦王歸彦據州反詔大司馬叚韶司空婁睿討擒之斬歸彦並其二子黨與二十人于都市梁太祖開平二年六月壬戍岳州為淮㓂所據上以此郡五嶺三湘水流㑹合之地委輸商賈靡繇於斯遂令荆襄湖南皆舉舟師悉力攻討王師既集淮夷毁壁焚俘郭而遁三年六月庚戌同州節度使劉知俊據本郡反制令削奪劉知俊在身官爵仍徴發諸軍速令進討如有軍前将士懐忠烈以知機賊内朋徒憤脅從而識變便能梟夷逆䜿擒獲兇渠務立殊功當行厚賞活捉得劉知俊者賞錢一萬貫文便授忠武軍節度使並賜荘宅各一所如活捉得劉知浣者賞錢一萬貫文便與除刺史有官者超轉三階無官者特授兵部尚書如活得劉知俊骨肉及近上都将並梟送闕廷者賞賜有差是月知俊奔于鳯翔同州平十一月靈州奏鳯翔賊将劉知俊率邠岐秦涇之師侵廹州城帝遣陜州康懐英華州㓂彦卿率兵攻廹邠岐以緩朔方之冦四年四月鎮海軍節度使錢鏐擊髙澧於潮州大敗之梟夷擒殺萬人㧞其郡潮州平先是澧以州叛入淮南故詔鏐討之也七月劉知俊攻逼夏州以宣化軍㽞後李思安為東北面行營都指揮使陜州節度使楊師厚為兩路行營招討使九月乙巳王師敗蕃㓂於夏州初劉知俊誘沙陁振武賊帥周徳威涇原賊帥李繼鸞合歩騎五萬大舉欲俯拾夏臺節度使李仁福兵力俱乏以急來告先是供奉官張漢玫宣諭在壁國禮使杜廷隐賜弊于夏及石堡寨聞賊至以防卒三百人馳入州既而大兵圍合廷隠漢玫與指揮使張初李君用率州民防卒與仁福部分固守晝夜戮力踰月及鄜延援至大軍奪擊敗之河東邠岐賊分路逃遁夏州圍解丙午詔曰劉知俊貴為方伯尊極郡王而乃背誕朝恩竄投賊壘因人神之共怒諒天地所不容雖命討除尚稽擒戮宜懸爵賞以大功名必有忠貞咸思憤發有生擒劉知俊者賞錢千萬授節度使首級次之得孟審登者錢百萬除刺史得將孫坑卓瓌劉儒張鄰等賞有差十二月以寜國軍節度使王景仁充北面行營都招討使潞州副招討使韓勁為副湘州刺史李思安為先鋒使時鎮州王鎔定州王處直叛結連晉人故遣将討之册府元龜卷二百十六
