body:
  text: 册府元龜卷九百七十七宋王欽若等撰外臣部降附天生四夷以禦魑魅故前代聖王覊縻勿絶禽獸而畜之蓋以為中國之屏蔽也然或彊或弱忽徃忽來故曰弱則卑服彊則驕孽斯其天性亦在御之而已自漢已來乃有嚮慕風教震懼威烈因其衰弱相率内附而乃招諭之以禮申於撫納懐柔之以徳厚其存恤以至張官置吏設亭築塞錫之以衣冠印綬振之以繒絮菽粟因以弭兵息役開疆拓土斯皆得來逺之道逹禦戎之要者焉漢高祖十一年立南粤王使陸賈即授璽綬即就也就其所居而立之佗稽首稱臣孝惠三年七月南粤王佗稱臣奉貢是時遼東太守約朝鮮王滿為外臣保塞外蠻夷毋使盜邊境文帝元年大中大夫陸賈使南粤賜尉佗書佗頓首謝願長為藩臣於是下令國中曰吾聞兩雄不俱立兩賢不並世漢皇帝賢天子自今以來去帝制黄屋左纛因為書稱蠻夷大長老夫臣佗昧死再拜上書皇帝陛下老夫故粤吏也高皇帝幸賜臣佗璽以為南粤王使為外臣時内貢職言以時翰入貢職孝惠皇帝即位義不忍絶所以賜老夫者厚高后自臨用事近細士用讒臣細士猶言小人也别異蠻夷出令曰毋予蠻夷外粤金鐵田器言非中國故云外粤馬牛羊即予予牡毋予牝慮其蕃息也老夫處辟馬牛羊齒已長辟讀曰僻齒已長謂老也自以祭祀不修有死罪使内史蕃中尉高御史平凡三輩上書謝過皆不反又風聞老夫父母墳墓已壞削兄弟宗族已誅論風聞聞風聲吏相與議曰今内不得振於漢外亡以自高異振起也故更號為帝自帝其國非敢有害於天下高皇后聞之大怒削去南粤之籍使使不通老夫竊疑長沙王讒臣故敢發兵以伐其邊且南方卑濕蠻夷西有西甌其衆半羸羸謂劣弱也南面稱王東有閩粤其衆數千人亦稱王西北有長沙其半蠻夷亦稱王言長沙之國半襍蠻夷之人老夫故敢妄竊帝號聊以自娱老夫身定百邑之地東西南北數千萬里帶甲百萬有餘然北面而臣事漢何也不敢背先人之故老夫處粤四十九年于今抱孫焉然夙興夜寐寢不安席食不甘味目不視靡曼之色耳不聽鐘皷之音者以不得事漢也今陛下幸哀憐復故號通使事漢如故老夫死骨不腐改號不敢為帝矣謹北面因使者奉獻景帝時史不書年西羌研種留何率衆人求守隴西塞於是徙留何等於狄道安故至臨洮氐道羌道縣武帝建元三年秋閩粤發兵圍東甌東甌人告急天子遣中大夫嚴助發㑹稽郡兵浮海救之漢兵未至閩粤引兵去東粤請舉國徙中國乃悉興衆處江淮之間元朔元年三月東夷濊君南閭等口二十八萬人降以為蒼海郡元狩二年秋匈奴昆邪王殺休屠王并將其衆合四萬餘人來降置五屬國㠯古以字處之㠯其地為武威酒泉郡是時驃騎將軍霍去病驃音頻妙切將兵撃匈奴右地多斬首虜獲休屠王祭天金人復西過居延攻祁連山大克獲於是單于怨昆邪休屠居西方多為漢所破召其王欲誅之昆邪休屠恐謀降漢休屠王後悔昆邪王殺之并將其衆降漢元鼎五年五月諫議大夫終軍使者安國少季使南粤是時南粤王興年少太后樛氏中國人國人多不附太后恐亂起亦欲倚漢威勸王及幸臣求内屬即因使者上書請比内諸侯三歲一朝除邊關於是天子許之賜其丞相吕嘉銀印及内史中尉太傅印餘得自置丞相内史中尉太尉之外皆任其國自選置不受漢之印綬除其故黥劓刑用漢法諸使者留塡撫之塡音竹刅切六年春既平南粤時蒼梧王趙光與粤王同姓聞漢兵至降為隨桃侯及粤揭陽令史定降漢為安道侯揭音羯南海縣粤將畢取以軍降為膫侯粤將姓畢名取也功臣表膫属南陽音來彫切粤桂林監居翁桂林部監也姓居名翁諭告甌駱四十餘萬口降為湘城侯元封二年壬子發巴蜀兵撃㓕勞深靡莫二國名以兵臨滇王始首善以故弗誅言初始以來常有善意滇王離西夷言東嚮事漢滇舉國降請置吏入朝於是以為益州郡賜滇王王印復長其民為之長帥宣帝地節中匈奴前所得西嗕居左地者嗕匈奴種嗕音奴獨切其君長以下數千人皆驅畜産行與甌脫戰所戰殺傷甚衆遂南降漢神爵二年五月羌若零離留且種兒庫且音子閭切共斬先零大豪猶非楊玉首猶非及楊玉二人也一作酋非及諸豪弟澤陽雕良兒靡忘皆帥煎鞏黄羝之屬四千餘人降漢初置金城屬國以處降羌是年秋匈奴大亂日逐王先賢撣將人衆萬餘來降初先賢撣父左賢王當為單于譲􅈢鹿姑單于許立之國人以故頗言日逐王當為單于日逐王素與握衍朐鞮單于有隙即率其衆數萬騎歸漢五鳯二年十一月匈奴呼遫累單于帥衆來降遫古速字累音力追切甘露三年春呼韓邪單于為郅支所破遂稱臣來朝月餘單于自請願留居光禄塞下徐自為所築者也有急保漢受降城保守也於此自守也漢遣長樂衛尉高昌侯董忠車騎都尉韓昌將騎萬六千又發邊郡士馬千數送單于出朔方雞鹿塞在朔方寙潼縣北詔忠等留衛單于助誅不服又轉邊榖米􅖲􅖲乾飯也音備前後三萬四千斛給贍其食成帝時史不書年匈奴左伊秩訾為呼韓邪畫計歸漢竟以安定其後或讒伊秩訾自伐其功嘗鞅鞅伐謂矜其功力呼韓邪疑之左伊秩訾懼誅將其衆千餘人降漢後漢光武建武元年復置䕶羌挍尉官初白馬氐人悉附隴蜀及隗囂滅其酋豪仍背公孫述降漢隴西太守馬援上復其王侯君長賜以印綬十二年九月真徼外蠻夷張游率種人内屬十三年七月廣漢塞外白馬羌豪樓登等率種人五千餘戸内屬二十年秋東方韓國人率衆詣樂浪内附東方有辰韓馬韓謂之三韓國也二十三年十月高句麗率衆人詣樂浪内屬是月匈奴奠鞬日逐王比率部曲遣使詣西河内附先是二十二年單于輿死子左賢王烏逹鞮候立為單于復死弟左賢王蒲奴立為單于比既呼韓邪單于之孫不得立宻遣漢人郭衡奉匈奴地圖二十三年詣西河太守求内附二十四年春八部大人共議立比為呼韓邪單于以其大父嘗依漢得安故欲襲其號於是欵五原塞願永為藩蔽扞禦北虜帝用五官中郎將耿國議乃許之其冬比自立為呼韓邪單于二十五年烏丸大人郝且等九千餘人帥衆詣闕封其渠帥為侯王者八十餘人使居塞内布列遼東屬國遼西右北平漁陽廣上谷代郡雁門太原朔方諸郡界招來種人給其衣食置校尉以領䕶之遂為漢偵備撃匈奴鮮卑二十六年遣中郎將段郴授匈奴南單于印綬令入居雲中始置匈奴中郎將兵衛䕶之先是二十四年匈奴薁鞬日逐王比自立為南單于於是分為南北匈奴遣子入侍二十七年五月益州郡徼外哀牢王賢栗等遂率種人中二千七百七十口萬七千六百五十九詣越嶲太守鄭鴻降求内屬先是二十三年賢栗撃附塞夷鹿茤音多哀牢之衆溺死數千人賢栗復遣其六王將萬人以攻鹿茤鹿茤王與戰殺其六王哀牢耆老共埋六王夜虎復出其尸而食之賢栗惶恐謂其耆老曰我曹入邊塞自古有之今攻鹿茤輙被天誅中國其有聖帝乎天祐助之何其明也至是遂求内屬三十年正月鮮卑大人於仇滿賁滿頭等率種人詣闕朝賀慕義内屬明帝永平元年鮮卑大人皆來歸附並詣遼東受賞賜青徐二州給錢歲二億七千萬為常十二年正月益州徼外夷哀牢王柳貎遣子率種人内屬其稱邑王者七十七人戸五萬一千八百九十口五十五萬三千七百一十一西南去雒陽七千里帝以其地置哀牢博南二縣割益州郡西部都尉所領六縣合為永昌郡是時益州刺史朱輔在州數歲宣示漢徳威懐逺夷自汶山以西前世所不至正朔所未加白狼樂夲唐菆等百餘國户百三十餘萬口六百萬上舉種奉貢稱為臣僕章帝建初八年六月北匈奴三木樓訾大人稽留斯等率三萬八千人馬二萬匹牛羊十餘萬欵五原塞降章和元年十月北匈奴屋蘭儲等率衆降和帝永元四年正月北匈奴右谷蠡王于除鞬自立為單于欵塞乞降於除鞬其名也遣大將軍左挍尉耿䕫授璽綬六年四月蜀郡徼外大牂夷種羌豪造頭等率種人五十餘萬口内屬拜造頭為邑君長賜印綬是年蜀郡徼外羌率種人遣使内附十二年二月旄牛獥外白狼樓薄蠻夷王唐繒等遂率種人十七萬口歸義内属是年西域蒙竒兠勒二國遣使内附安帝永初元年正月蜀郡獥外羌龍橋等六種慕義降附三月永昌徼外僬僥種夷陸類等二千餘口舉種内附五月九真獥外夜郎蠻夷舉土内屬開境千八百四十里二年閏七月蜀郡徼外羌薄申等八種三萬六千九百口復舉土内屬十二月廣漢塞外参狼種羌二千四百口復來内属五年高句麗王宫遣使貢獻求屬𤣥莵元初一年正月蜀郡青衣道夷邑長令田田令名與徼外三種夷三十一萬口齎黄金旄牛眊眊結毛為節也即今馬及弓奠三纓眊也舉土内屬三年五月越嶲郡獥外夷犬羊等八種户三萬一千口十六萬七千六百二十慕義内屬永寧元年十二月遼西鮮卑大烏倫其至鞬衆詣度遼將軍鄧遵降奉貢獻延光元年十二月九真徼外蠻貢獻内属二年五月日南徼外蠻夷内屬質帝永嘉元年二月叛羌詣尤馮翊梁並降是時諸羌衰耗並稍以恩信招誘之於是離切􅈢奴等五萬餘戶詣並降靈帝建寧三年九月鬱林烏滸民相率内屬烏滸南方夷號也時谷永為欎林太守以恩信結之烏滸人十餘萬内属皆受冠帶開置七縣章帝五年七月巴郡板楯蠻詣太守曹謙降獻帝建安十年三郡烏丸觸等舉其縣降封為列侯魏太祖平張魯于漢中是時巴七姓夷王朴胡實邑侯杜濩舉巴夷實民來附於是分巴郡以胡為巴東太守濩為巴西太守皆封列侯明帝景初元年右北平烏丸單于冦婁敢遼西烏丸都督王濩留等居遼東率部衆隨度遼將軍毋丘儉内附齊王正始五年九月鮮卑内附置遼東属國立昌黎縣以居之七年韓那奚等數十國各率種落降蜀後主延熙十年衞將軍姜維出隴西南安金城界與魏大將軍郭淮夏侯覇等戰於洮西涼州胡王白虎文治無載等舉部落降維安撫居之于繁縣晉武帝咸寧二年二月東夷八國歸化七月東夷十七國内附三年西北雜虜及鮮卑匈奴五溪蠻夷東夷三國前後十餘軰各率種人部落内附四年東夷九國内附五年三月匈奴都督拔奕虛帥部落歸化十月匈奴餘渠都督獨雍等帥部落歸化太康元年六月東夷十國歸化二年六月東夷五國内附四年六月牂牁獠二千餘部落内屬五年匈奴胡太阿厚率其部落二萬九千二百人歸化六年四月参離四千餘部落内附七年八月東夷十一國内附是年匈奴胡都大博及萎莎胡等各率種類大小凡十萬餘口詣雍州刺史扶風王駿降附八年八月東夷二國内附是年匈奴都督大豆得一育鞠等復率種落大小萬千五百口牛二萬二千頭羊十萬五千口車廬什物不可勝紀來降并貢其屬物帝並撫納之九年九月東夷七國詣挍尉内附十年五月鮮卑慕容廆來降東夷十一國内附十二月奚軻男女十萬口來降惠帝元康元年東夷十九國南夷二十四部並詣挍尉内附宋孝武帝大明元年梁州獠來内屬立懐漢郡南齊太祖建元四年南梁州刺史仇池公楊靈珍與二弟婆羅阿卜珍率部曲三萬餘人舉城歸附送母及子䨇健阿皮於南鄭為質陳文帝天嘉二年霍州四山蠻率部落内附後魏道武天興元年四月鄜城屠各董羌杏城盧水郝奴河東蜀薛榆氐帥符興各率其種内附二年八月西河胡帥護諾于丁零帥翟同屬帥韓龔並相率内附三年十一月高車别帥勑犍率九百餘落内屬四年正月高車别帥率其部三千餘落内附五年十二月越勒莫弗率其部萬餘家内屬居五原之北六年正月方尉遲部别帥率萬餘家内屬入居雲中明元永興三年六月西河胡張賢等率營部内附十二月蠕蠕斛律宗黨吐觝于等百餘人内屬神瑞元年六月河西胡首劉􅃒劉退孤率部落等萬餘家渡河内屬二年二月河西胡劉雲等數萬戸内附㤗常二年十二月氐豪徐騃奴齊元子等擁部落三萬於雍遣使内附詔將軍王雒生及河内守楊聲等西行以應之三年正月河東胡蜀五千餘家相率内附五年四月河西屠各歸董大虎羌酋不蒙娥等遣使内附十二月杏城羌酋狄温子率三千餘家内附太武神䴥元年八月上部休屠胡酋金崔率部内屬又上落巴渠泉午觸等萬餘家内屬延和二年十二月隴西休屠王𢎞祖率衆内附太延四年十二月上落巴渠泉蕇等相率内附文成大安三年十一月蠻王文虎龍率千餘家内附四年十一月車駕渡漠蠕蠕絶跡逺遁其别部烏朱賀頺庫二十頺率衆來降獻文皇興三年十一月吐谷渾别帥白羊堤度汗率戸内附孝文延興元年九月高麗民奴乆等相率來降各賜田宅二年正月太陽蠻酋桓誕率户内屬拜征南將軍封襄陽王三年十一月吐谷渾部内羌民鍾豈渴下等二千三百戸内附太和五年七月蠕蠕引帥他稽率衆内附十二年十二月蠕蠕伊吾戍主高羔子率衆三千以城内附十三年二月蠕蠕别帥訾吕勤率衆内附十七年五月襄陽蠻酋雷婆思等率一千三百餘戸内附徙居於太和川是年光城四山蠻帥田益宗遣使張超奉表歸欵宣武景明元年六月大陽蠻酋田育丘等率户内附四年十二月蠕蠕高車民他莫孤率部來降永平元年十二月漢東蠻民一萬七百戸相率内附三年九月高車别帥可略汗等率衆一千七百内屬孝明帝神龜二年十一月蠕蠕莫縁梁賀侯豆率男女七百人來降正光元年九月蠕蠕主阿那瓌來降二年八月蠕蠕後主乆閭侯匿代來奔懷朔鎮是時本傳云正光中大都督司徒平南王破六韓孔雀率部一萬降於爾朱榮詔加平北將軍第一領民酋長東魏孝靜興和三年二月阿羅出吐拔那渾大率部來降四月阿至羅國王副伏羅越居子去賓來降西魏元帝永熙二年三月阿至羅相率降欵文帝大統五年蔡陽蠻王魯超明内屬恭帝二年諸蠻酋宜民王田興彦北荆州刺史梅季昌等相繼欵附後周武帝天和元年五月吐谷渾龍涸王莫昌率户内附以其地為扶州宣政元年正月吐谷渾偽趙王他婁屯來降隋高祖開皇四年二月突厥蘇尼部男女萬餘人來降是月突厥可汗阿史那玷率其屬來降五月契丹主莫賀弗遣使請降是年党項千餘宗歸化五年拓拔寧叢等各率衆詣旭州内附是年契丹悉其衆欵塞帝納之聽居其故地六年正月党項羌内附是年契丹别部出伏等背高麗率衆内附納之安置於渇奚郝頡之北十六年党項寇㑹州詔發隴西兵以討之大破其衆又相率請降願為臣妾遣子弟入朝謝罪帝謂之曰還語爾父兄人生須有定居養老長㓜而乃乍還乍走不取羞鄉里耶自是朝貢不絶十九年四月突厥利可汗内附是時契丹别部四千餘家背突厥來降帝方與突厥和好重失逺人之心悉令給糧還本勑突厥撫納之固辭不去仁壽元年五月突厥男女九萬口來降煬帝大業三年七月啓民可汗上表請變服襲冠帶五年六月伊吾吐屯設等獻西域數千里之地八年正月突厥處羅可汗還蕃詔留其羸弱萬餘口令其弟建度開牧畜㑹寧郡唐高祖武徳元年七月闕可汗遣使内附闕可汗者西藩突厥曷婆那可汗之次弟也初號闕逹度設統部落於㑹寧郡控弦三千餘騎及隋亡自稱闕可汗初連横於李軌隋西戎使者曹瓊據甘州誘之又以衆附瓊合軍拒軌為軌所敗竄於逹外拔谷與吐谷渾相唇齒至是遣使朝貢舉國内屬八月華池胡帥劉企成率衆來降十二月突厥曷婆那可汗自宇文化及所來降可汗先從隋煬帝巡幸江都之敗随化及至黎陽因而西歸四年契丹别部酋帥孫敖曹與靺羯酋長突地稽俱請内附七年二月高句麗遣使内附受正朔請班歴許之九年正月念諸川羌數百戸内屬太宗貞觀二年二月靺羯内屬四月契丹太賀摩㑹率其部來降十二月牂牁兖州蠻並遣使朝貢牂牁渠姓謝氏舊臣中國代為本土牧守隋末天下亂遂絶不通至是知中夏平定其首謝龍羽遣使修職貢勝兵數萬於是列其地為牂州拜龍羽為刺史兖州者牂牁之别部也牂牁隣境勝兵二萬列其地為兖州自是並朝貢不絶三年九月突厥俟斤九人率三千騎來降十二月北突厥利可汗阿史那什鉢苾與頡利有隙率所部來降是年南㑹州都督鄭元璹遣使招諭党項其長細封歩頼舉部内附列其地為執州南平蠻遣使内附以其地𨽻渝州六年十月契苾何力率其部六十餘家欵塞帝處之凉州先是五年詔開河曲地為十六州是年党項等羌前後内屬者三十萬口十年三月吐谷渾請頒厯奉行年號並子弟入侍並從之是年都布可汗阿史那社尔以地逼延陁欵塞歸附帝嘉其忠節授左驍衞大將軍妻以衡陽長公主拜駙馬都尉十三年六月渝州人侯𢎞仁自牂牁至西趙楊滿洞出邕州通交桂道蠻俚降者二萬八千餘戸二十年八月車駕幸靈州次浮陽頓鐵勒廻紇拔野古同羅僕骨多濫葛思結阿跌契丹奚結渾斛薛等十三姓各遣使朝貢奏稱延陁可汗不事大國暴虐無道不能與奴等為主人自死敗部落鳥散不知所之奴等各有分地不能逐陁延去也歸命天子願賜哀憐乞置漢官司養育奴等帝意以破延陁遂空漢庭見其使至甚恱遣黄門侍郎禇遂良引於縣廨浮觴積胾以禮之夜分乃已二十一年正月廻紇率衆内附十月奴刺啜匐侯友率其部兵千餘口一萬内附二十二年二月西蕃沙鉢羅葉䕶率衆歸附四月西突厥泥伏沙鉢羅葉䕶阿史那賀魯率衆屬于庭州十一月契丹帥窟哥奚帥可度者並率其部内屬以契丹部為松漠都督府拜窟哥為使持節十州諸軍事松漠都督又以其别帥逹稽部置峭落州祈紇使部置殫汗州獨活部落置無逄州芬問部置羽凌州突使部置曰連州芮奚部置徒河州遂斤部置萬丹州伏部置疋黎亦山二州各以其酋長辱紇主為刺史俱𨽻松漠焉以奚部置饒樂都督府拜可度為使持節六州諸軍州饒樂都督又以别帥阿㑹部置弱水處和部置祈黎州奥失部置雒瓌州度稽部置大魯州元侯析部置渴野州亦各以其酋長辱紇主為刺史俱𨽻於饒樂焉又于營州置東夷挍尉官二十三年拔悉宻吐毛逹官肥羅察等以其部落内屬是年西南徒莫祗蠻等各率其衆内屬以其地為傍州望州覽州丘州並𨽻郎州都督府高宗永徽二年十一月特浪生羌董悉奉求辟惠生羌卜樓莫等各率種落萬餘戸詣茂州歸附五年正月生羌大首領凍就率部落内附以其地置劍州顯慶元年七月西洱河大首領楊棟附顯和蠻大首領王羅祁郎毘黎盤四州大首領王伽衝部落四千户歸附十一月生羌大首領浪我利波及鉢南伏浪恐等各率部落歸附以其所部為柘栱二州三年八月播羅哀生獠首領多胡桑等率部落六千餘戸内附咸亨三年正月毘明蠻一十四姓二萬三千户相率内附分置殷州敦州總州以安輯之𤣥宗開元二年閏二月突厥黙啜之壻火拔頡利發石阿異失與妻來奔五月突厥屈利頡斤及三姓烏波都擔等詣并州内屬九月葛邏禄車鼻施失鉢邏侯斤等一十二人以凉州内屬命攝鴻臚卿鄭嘉祚徃凉州宣勞是月胡禄屋闕及首領胡禄一千三十一人來降十月胡禄屈二萬帳詣北庭内屬三年二月突厥十姓部落左廂五咄之啜右廂五怒失卑五侯斤及高麗王莫離支高文簡都督跌思大等各率其衆自突厥相繼内屬前後二千餘帳四月三姓葛邏禄率衆歸國帝降書慰曰三姓葛邏禄首領散爛侯斤等冐渉逺來並平安好卿等一被驅率多歷歲年遂背逆輸忠間行歸國言念誠節嘉賞良深縁彼部落初來已令逐便安置卿等來日大首領及将士已下竝得安穩以否有所事意具狀奏來四年九月契丹李失活奚李大酺各以所部來降六年四月突厥賀魯阿波屬下首領倍羅賀魯曵辭等投降五月契丹部落孫骨納等十八人内屬並授游撃將軍賜緋􅂁銀帶留宿衞十一年九月吐谷渾率其衆詣沙州内屬詔張敬忠安存之降書吐渾曰卿北被吐蕃收留阻我聲教自棄沙塞于今數年彼蕃毎肆侵凌百姓聞甚辛苦今逺申誠欵朕甚嘉焉二十七年九月處木毘匐延闕律啜部落拔塞幹部落䑕尼施部落阿悉告部落弓月部落哥係部落皆遣使謝恩請内屬許之其表曰臣等生在荒裔乆闕朝宗國亂主薨互相攻殺頼陛下聖恩遐布愍念蒼生令磧西節度使蓋嘉運統領兵馬撫臣逺蕃誅暴拯危存恤蕃部臣等伏願稽首聖顔兼將部落於安西管内安置永作邊扞長為臣子今者載馳驤首天路不任嘉躍之至二十八年十二月突騎施可汗英賀逹干率其妻子及纛官首領百餘人内屬初賀逹干與烏蘇萬雒扇誘諸蕃背叛帝命蓋嘉運宣恩招諭皆相率而降天寳元年八月突厥阿布惠及黙啜可汗之孫登利可汗之女與其黨屬來降九月䕶宻國王子頡吉匐遣使上表請背吐蕃來屬四年曹國王哥邏僕遣使上表自陳宗祖以來向天可汗忠赤常受徴發望乞兹恩将奴國土同為唐國小州所須驅遣奴身一心忠赤為國征討十三載二月劍南節度奏女國南王國及白狗並率部落内屬閏十一月吐蕃白蘭二品官籠董占庭等二十一人來降並授左武衞員外大將軍十四載正月蘇毗王子悉諾邏率其首領數十人來降隴右節度使哥舒翰奏曰蘇毗一蕃最近河北吐澤部落數倍居人蓋是吐蕃與國強授軍糧兵馬半出其中自没凌替送欵事彰家族遇害二千餘人悉其種落皆為猜阻今此王子又復歸降臨行事洩還遭掩襲一千餘人悉被誅夷猶獨與左右苦戰獲免且吐蕃蘇毗互相屠戮心腹自潰滅亡可期但其王去逆歸仁則是國家盛事伏望宣付史舘旌其慕化從之代宗寳應元年六月突厥奴刺部落千餘人内屬請討賊自效丁巳宴奴刺大首領于内殿賜物有差十二月己未投降羌渾歸順州部落乾封州部落歸義州部落順化州部落和寧州部落和義州部落保善州部落寧定州部落羅雲州部落朝鳯州部落並詣山南西道都防禦使臧希譲請州印希譲以聞許之永㤗元年二月河西党項永定等一十二州部落内屬請置公勞等一十五州許之二年五月安南生蠻大首領林觀符部落新置徳化州管戸一萬六百潘歸國部落新置龍武州管户一千五百詔安南節度使左散騎常侍周衡宣恩勞徠之大歴五年春羌大首領白對􅅫王守貞胡那䓗等各率部落内屬並授羌之所居覊縻州刺史徳宗貞元九年七月劍南西山羌女哥隣白狗逋祖弱水南王六國長率種落欵附悉董國及清逺王咄覇王皆歸化女國等散居西山舊分𨽻邊郡其祖父或授將軍中郎將果毅等官身後悉為吐蕃所役其部落大者不過三二千户各置縣令十數人理之土有絲絮歲輸於吐蕃至是相率欵附其種落至者節度使韋臯處之維保覇等州人頗統附之十年八月吐蕃渠帥論乞髯湯没藏悉諾硉以其家属來降十二年三月西川節度使韋臯奏于雅州㑹野路招得投降蠻首領高萬唐六十九人蠻約一千七百户二萬餘口憲宗元和三年六月沙陀突厥七百人擕其親属歸于振武節度使范希朝是月邕管西原蠻首黄少卿歸欵五年五月鹽州奏渭北党項拓跋公政等一十三府連狀稱管渭北押丁帳幕收放經今十五餘年在鹽州界今凖勑割屬夏州情願依前在鹽州充百姓六月太原節度柳公綽奏雲州奉成軍部落一百二十帳先移在把頭峰外今却招得二十七帳六年正月振武節度使李泳奏招收得黑山外契宓部落四百七十三帳穆宗長慶二年六月鹽州上言北界党項被夏州遣兵刼掠殺戮其都督拓拔萬誠請降詔夏州節度使李祐其党項勿令侵擾四年二月嶺南奏洞賊黄昌瓘使其黨陳少竒及首領二十人連欵請降十二月鳯翔節度使王承元送到投降吐蕃一十九人各賜衣一襲文宗太和元年八月靈州奏部落遊奕使拓拔忠義招牧得部落五千餘帳於界首安置訖開成元年二月天徳軍奏生退渾部落三千帳來投豐州三年九月安西都䕶馬植奏羈縻州刺史首領麻光耀等先屬南蠻今羌子弟相次到府并納南蠻所文牒衣物等武宗會昌元年五月天徳軍奏廻鶻嗢没斯與歴友王子多覽將軍等七人與部下將士三千一十口六十八人來降宣宗大中三年正月涇原節度使沈季榮奏吐蕃論恐熱以安樂三州及右門七關等歸國五年八月沙州張義潮遣兄義潭將􅆶沙伊肅等十一州圖經戸籍來獻後唐莊宗同光二年三月蔚州送降附契丹七人六月雲州節度使李敬文奏逹勒首領澇撒于于越族帳先在磧北去年契丹攻破背隂逹勒因相掩撃澇撒于于率領歩族羊馬三萬逃遁來降已到金月南界今差使蒙越到州便令入奏明宗天成元年十月契丹平州守將領幽州節度使盧文進率戸口兵馬車帳來降二年正月定州行營副招討房知温奏奚陁羅支領兩蕃奚内附建牙於營州三年閏八月契丹平州刺史張希崇殺其契丹以一城居人歸國命中使齎茶藥接之長興元年六月逹怛三十帳内附七月北京奏吐渾千餘帳内附已於天池川静樂縣界安置八月北京奏吐渾内附欲於嵐州安族帳十月青州奏登州申契丹阿保機男東丹王突欲一行四十餘萬人馬八十疋來歸二年閏五月吐渾下大首領薛海金等于我三年五月逹靼首領頡哥已下四百人内附四年正月突厥首領李白山等三十四人内附末帝清泰二年九月振武楊光逺軍河口蕃部來奔界上安置周太祖廣順二年四月定州言契丹羽林都署辛覇卿等二十三人馬三疋并車牛來奔六月契丹降人孫重勲等四十四人到闕八月定州言有户三百自契丹來歸十月辛卯契丹釣臺鎮將王彦鎮都將盧曉文招收軍使王瓊等八人來奔十一月契丹界闕南都舩務使王希乾寧軍使孫章而下二十四人來歸十二月契丹殿頭王進龍武羽林軍校及通事舍人胡延等六人來奔三年正月契丹王子元禄二人羽林軍使王遇軍將張超等十九人來奔二月鎮州言部送契丹來奔銀院使張知訓等七人三月契丹羽林軍士十五人來降四月契丹乾寧軍使張韜等三十八人羽林軍將王興等十五人來奔五月深州送契丹來奔麴院官李緒等十七人指揮使李重筠等十人為儀郎四十人至京師六月契丹瀛州戎軍陶洞文等十二人及廵檢指揮使葛知友雲州牙將崔崇等十九人招收軍使李彦暉二十一人來奔是月定州送奚契丹來奔綉院使邢福順等十三人并順州刺史男戴原等至闕七月契丹羽林軍士楊澤等十三人殿直楊晏等二十五人來奔是月滄州李暉送契丹降人盧臺軍使張藏英等二百二十二人馬二十三疋八月定州部送契丹歸明軍士齊武等二十九人至京師九月雲州吐渾指揮使黨富逹等五十一人馬駝四十二并朔州軍使馬延嗣等來奔册府元龜巻九百七十七
