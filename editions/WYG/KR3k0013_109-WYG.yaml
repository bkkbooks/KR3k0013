body:
  text: 册府元龜卷一百九宋王欽若等撰帝王部宴享第一傳曰享以訓恭儉宴以示慈恵恭儉以行禮慈恵以布政故享有體薦宴有折爼王室之禮也夏啟鈞臺之㑹周文在鎬之飲皆紀諸册書而形於雅頌矣後世或諸侯歸時事於宰旅四夷奉國琛於外府叙賔以昭徳班勞以䇿勲習射以講禮時廵而展義或弭節故里臨饗父老或周覽都畿飫賜官屬至於五兵銷􅅯品物茂遂時乃置酒髙㑹合歡成禮奉觴上夀加以贈賄上賜之以景福下報之以盡心此王者之盛典也易著需雲之象書紀崇飲之篇詩曰公尸燕飲福禄來為皆燕衎之謂矣周文王燕羣臣嘉賔既飲食之又實幣帛箱篚以將其厚意故有鹿鳴之詩武王于鎬京樂八音之樂與羣臣飲酒故魚藻之詩曰王在在鎬豈樂飲酒豈以也平王時虢公晉侯朝王王饗禮命之侑王之覲羣臣始則行饗禮先置醴酒示不忘古飲宴則命以幣物侑助也所以助歡敬之意皆賜玉五㲄馬三匹非禮也王命諸侯名位不同禮亦異數不以禮假人襄王時晉侯朝王王享禮命之侑定王時晉侯使士㑹平王室王享之原襄公相禮原襄公周大夫相佐也殽烝烝升也升殽於俎武子私問其故享當體薦而殽烝故怪而問之武士㑹諡季其字王聞之召武子曰季氏而弗聞乎王享有體薦享則半觧其體而薦之所以示其儉宴有折爼體觧節折升之於爼物皆可食所以示宴享也公當享卿當宴王室之禮也公謂諸侯武子歸而講求典禮以修晉國之法言典謂禮之廢久也景王時晉荀躒如周葬穆后籍談為介既葬除䘮以文伯宴樽以魯壺文伯荀躒也魯壺魯所獻壺樽也漢髙祖四年十一月帝自成臯西入闗至櫟陽存問父老置酒留四日復如軍五年五月兵皆罷歸帝置酒雒陽南宫六年三月帝置酒封雍齒因趣丞相急定功行封七年十月長樂宫成羣臣朝禮畢盡伏置法酒以尊卑次起上夀觴九行謁者言罷酒御史格法舉不如儀輙引去竟朝置酒無敢讙譁失禮者九年十月置酒前殿帝奉玉巵為太上皇夀曰始大人常以某亡賴不能治産業不如仲力今某之業所就孰與仲多殿上羣臣皆稱萬嵗大笑為樂十二年十月帝破黥布軍還過沛留置酒沛宫召故人父老子弟佐酒發沛中兒得百二十人教之歌酒酣帝擊筑自歌曰大風起兮雲飛揚威加海内兮歸故鄉安得猛士兮守四方令兒皆和習之帝乃起舞慷慨傷懐泣數行下謂沛父兄曰游子悲故鄉沛父老諸母故人日樂言日日樂飲也極歡道舊故為笑樂十餘日帝欲去沛中空縣皆之邑西獻帝留止張飲三日武帝太始三年正月行幸甘泉宫饗外國客四年五月還幸建章宫大置酒赦天下昭帝元鳳二年四月自建章宫徙未央宫大置酒元帝建昭四年正月以誅郅支單于告祠郊廟赦天下羣臣上夀置酒以圗書示後宫貴人討郅支之圗書也後漢光武建武三年十月幸舂陵因置酒舊宅大㑹故人父老六年二月大司馬吳漢㧞朐獲董憲龎萌山東悉平諸將還京師置酒賞賜十三年四月大司馬吳漢平公孫述自蜀還京師於是大饗將士班勞䇿勲班布也謂徧布勞來之勞音力到切下同十七年十月幸章陵祠舊宅觀田廬置酒作樂賞賜時宗室諸母因酣恱相與語曰文叔少時謹信與人不款曲唯直柔耳帝聞之大笑曰吾理天下亦欲以柔道行之十九年九月南廵狩幸汝南南頓縣舎置酒㑹賜吏人二十五年春四夷朝貢絡繹而至帝命大㑹勞饗賜以珍寳明帝永平二年十月西廵狩幸長安有事於十一陵歴覽舘邑㑹郡縣吏勞賜作樂三年十月從太后幸章陵觀廬置酒㑹隂鄧故人諸家子孫並受賞賜十年閏四月幸南陽祠舊宅禮畢召校官弟子作雅樂奏鹿鳴帝自御塤箎和之以娛嘉賔還幸南頓勞饗三老官屬章帝建初七年九月幸鄴勞饗魏郡守令以下至于三老門䦨走卒賜錢各有差十月西廵狩幸長安進幸槐里又幸長平東至髙陵而還每所到幸輙㑹郡縣吏人勞賜作樂元和二年二月幸泰山辛未柴告岱宗遂覲東后饗賜王侯羣臣和帝永元十四年三月戊辰臨辟雍饗射大赦天下十五年十月戊申幸章陵癸丑㑹宗室于舊廬勞賜作樂安帝延光三年二月辛卯幸泰山柴告岱宗癸巳勞賜郡縣作樂十月行幸長安丁亥㑹三輔守令掾吏于長安作樂順帝陽嘉元年三月庚寅臨辟雍饗射永和二年十月庚子幸未央宫㑹三輔郡守都尉及官屬勞賜作樂漢安二年六月遣行中郎將持節䕶送南單于守義王兠樓儲歸南庭單于先在京師詔太常大鴻臚與諸國侍子於廣陽城門外廣陽雒陽西城面南頭門祖㑹饗賜作樂角觝百戲角觝之戲則魚龍爵馬之屬言兩兩相當以角而為抵對古謂之角觝也帝幸胡桃宫臨觀之桓帝延熹元年五月己酉大㑹公卿以下賞賜各有差魏文帝初為魏王延康元年六月南征七月甲午軍次于譙大饗六軍及譙父老百姓于邑東設伎樂百戲令曰先王皆樂其所生禮不忘其本譙霸王之邦真人本出其復譙租稅二年三老吏民上夀日夕而罷明帝青龍二年八月幸夀春己未大耀兵饗六軍髙貴鄉公甘露元年二月丙辰宴羣臣於太極東堂後魏道武登國七年正月幸木根山遂次黒鹽池饗宴羣臣覲諸國貢使北之美水三月甲子宴羣臣於水濵八年七月車駕臨幸新壇庚寅宴羣臣講武皇始二年正月己亥朔車駕在魯昌城大饗羣臣明元永興四年四月乙未宴羣臣於西宫使各獻直言五年十一月癸酉大饗於西官神瑞二年二月丁亥大饗於西宫泰常五年正月丙戌朔自薛林東還至於屋竇城饗勞將士七年二月丙戌車駕自雲中還大饗於西宫太武始光二年九月丁卯以永安安樂二殿成大饗以落之太平真君五年二月庚辰行幸廬三月戊子大㑹于􅄼南十年正月戊辰朔車駕在漠南伐蠕蠕大饗百寮文成太安四年正月庚午於遼西黄山宫游宴數日親對髙年勞問疾苦二月丙子登碣石山觀滄海大饗羣臣於山上班賞進爵各有差九月辛亥太華殿成丙寅饗羣臣大赦天下孝文太和元年十月癸酉宴京邑耆老年七十以上於太華殿賜以衣服九年正月癸未饗羣臣於太華殿十六年正月戊午朔饗羣臣於太華殿帝始為王公興興起也懸而不樂以翌日祀獻文於明堂也二月詔罷寒食饗時壊太華殿經始太極殿十月庚戌太極殿成大饗羣臣十七年正月壬子朔帝饗百寮於太極殿十八年五月詔罷五月五日七月七日饗十九年正月辛未朔車駕在懸瓠時帝南伐朝饗羣臣於方丈竹堂樂作酒酣乃歌曰白日光天兮無不曜江左一隅獨未炤彭城王勰續歌曰願從聖明兮登衡㑹萬國馳誠混日外長兼給事黄門侍郎鄭懿歌曰雲雷大振兮天門闢率土來賔一正歴中書侍郎兼黄門侍郎邢巒歌曰舜舞干羽兮天下歸文徳逺被莫不思秘書丞兼中書侍郎鄭道昭歌曰皇風一鼔兮九地匝戴日依天清六合帝又歌曰遵彼汝墳兮昔化貞未若今日道風明黄門侍郎兼司徒左長史宋弁歌曰文王正教兮暉江沼寧如大化光四表帝謂道昭曰自比遷務雖猥與諸才雋不廢詠歌遂命邢巒摠集叙記八月甲子引羣臣歴宣政堂初帝嘗詔延四廟之子下逮𤣥孫之冑申宗宴於皇信堂不以爵秩為列悉序昭穆為次用家人之禮後又引見王公侍臣於清徽堂謂曰此堂成来未與王公行宴樂之禮後東閣廡堂粗復始就故今與諸賢欲無髙而不昇無小而不入因之流化渠帝曰此曲水者亦有其義取乾道曲成萬物無滯也次之洗煩池帝曰此池中亦有嘉魚任城王澄曰此謂魚在在藻有頒其首帝曰且取王在靈沼於牣魚躍也次之觀徳殿帝曰射以觀徳故遂命之次之凝閒堂帝曰名目要有其義此盖取大子閒居義不可縱奢以忘儉自安以忘危故此堂後作茅茨堂謂僕射李冲曰此東曰歩元廡西曰遊凱廡此堂雖無唐堯之君卿等當無愧於元凱冲對曰臣既遭唐堯之君不敢辭元凱之譽帝曰光景垂落朕同宗則有載考之義卿等將出無逺何得黙爾徳音即命黄門侍郎崔光郭祚通直郎邢巒崔休等賦詩言志燭至公卿辭退李冲再拜上千萬嵗夀帝曰卿何以燭至致辭復獻朕千萬之夀朕報卿以南山之詩帝曰燭至辭退庶姓之禮在夜載考宗族之義卿等且還朕與諸王宗室欲成此夜飲二十三年正月戊寅朔羣臣以帝疾瘳上夀大饗於澄鸞殿宣武景明三年十二月壬寅饗羣臣於太極前殿各賜布帛有差孝莊永安二年七月爾朱兆破元顥帝還京師乙亥宴勞天柱大將軍爾朱榮上黨王天穆及北来督將於都亭出宫人三百繒錦雜綵數萬匹班賜有差前廢帝普泰元年四月癸卯幸華林都亭讌射班賜有差大樂奏伎有倡優為愚癡者帝以非雅戲詔罷之出帝太昌元年五月己巳幸華林都亭宴羣臣班賚有差八月壬戌朔齊文襄王来朝讌射班賚部下各有差九月庚子帝幸華林都亭引見元樹及公卿百寮蕃使督將等射班賚各有差永熙二年正月庚寅朔朝饗羣臣太極殿前八月己丑齊文襄王来朝帝讌於華林都亭班賚部下各有差西魏文帝大統八年十二月狩於華隂大饗將士後周明帝武成二年正月癸丑朔大㑹羣臣於紫極殿始用百戲三月辛酉重陽閣成㑹羣公列將卿大夫及突厥使者於芳林園賜錢帛各有差武帝保定元年正月丙子大射於正武殿賜百官各有差二年十月辛亥御大武殿大射諸卿列將皆㑹天和元年正月辛巳路寢成考之令羣臣賦古詩京邑耆老並預㑹焉頒賜各有差三年三月丁未大㑹百寮及四方賔客於路寢賜衣馬錢帛各有差建徳三年正月丙子停二十四軍督將以下誡以軍旅之法縦酒盡歡六年二月平齊論定諸軍勲置酒於太極殿㑹軍士以上班賜各有差四月大㑹羣臣及諸蕃客於路寢隋髙祖開皇三年二月庚申宴百寮班賜各有差壬申宴北道勲人四年正月甲戌大射於北苑十日而罷四月丁未宴突厥髙麗吐谷渾使者於大興殿七年二月壬申幸醴泉宫詔兵部尚書韋師與左僕射髙熲上柱國韓擒虎等於卧内賜宴令各叙舊事以為笑樂十月癸亥幸蒲州丙寅宴父老帝極歡曰此間人物衣服鮮麗容止閑雅良繇仕宦之鄉陶染成俗也八年九月丁丑宴南征諸將頒賜有差十二年十一月壬午宴百寮頒賜各有差甲子賜百寮大射於武徳殿十三年二月戊子宴考使於嘉賜殿考使謂充使考較也十七年五月庚申宴百寮於玉女泉頒賜各有差十九年正月戊寅大射於武徳殿宴賜百官煬帝大業三年六月北廵狩至榆林郡丁酉啓民可汗來朝甲辰御北樓觀漁於河以宴百寮七月辛亥啓民可汗上表請變服襲冠帶甲寅於郡城東御大帳其下備儀衞建旌旗宴啓民及其部落三千五百人奏百戲之樂賜啓民及其部落各有差八月乙酉幸啓民帳宴賜極厚九月己未次濟源幸御史大夫張衡宅宴享極歡四年正月庚戌百寮大射於允武殿五年二月戊申自東都還京丙辰宴耆舊四百人於武徳殿頒賜各有差三月西廵五月甲申宴羣臣於金山之上六月丙辰御觀風行殿陳文物奏九部樂設魚龍曼延宴髙昌王麴伯雅及伊吾吐屯設於殿上時二王来朝以寵異之其蠻夷陪列者三十餘國六年三月幸江都宫四月丁未宴江淮己酉父老頒賜各有差七年二月己未昇釣臺臨楊子津大宴百寮頒賜各有差十一年正月甲午朔大宴百寮己卯大㑹蠻夷設魚龍曼延之樂頒賜各有差唐髙祖武徳元年五月戊申宴羣臣賜帛各有差八月庚子設宴三品以上賜雜綵各有差十月宴突厥使者奏九部樂於庭引骨咄禄特勤升御坐以寵之十一月己酉秦王降薛仁杲秦王太宗也帝聞大恱因置酒髙㑹奏九部樂賜羣臣錢各有差癸亥秦王凱旋獻俘帝置酒宴師及骨咄禄特勤於𤣥武門賜布帛各有差戊辰宴羣臣十二月庚寅宴突厥骨咄禄特勤等於殿内二年二月癸巳宴羣臣臨奏九部樂賜錢各有差極歡而罷閏二月甲辰考羣臣以李綱孫伏伽為上第置酒髙㑹奏九部樂於庭帝謂裴寂曰隋末無道上下相蒙主則驕矜臣唯謟佞上不聞過下不盡忠致使社稷傾危身死匹夫之手朕撥亂反正念在安民平亂任武臣官方委文吏庶得各展器能以救不逮比每虛心接待兾聞讜言唯李綱苦盡忠􅅃孫伏伽可謂誠直餘人猶踵弊風俛首而已豈朕所望哉當以身為嬰兒方朕為慈父有懐必盡有意必伸也因命捨君臣之敬帝頻舉觴以屬公卿君臣迭上夀極歡而罷賜帛有差四月甲辰遣大理卿郎楚之安撫山東夏侯端安撫淮左奏九部樂設宴遣之五月戊辰宴并州從官五品以上於仁夀宫極歡賜帛各有差丙寅奏九部樂於庭宴涼州使人官賞各有差謂與官及賞物也三年正月甲午宴突厥奏九部樂於庭賜綵有差四月壬戌秦王平并州悉復故地帝大恱置酒含章殿宴羣臣極歡遣入御府賜繒綵皆盡重而出五月庚午宴突厥使奏九部樂於庭賜帛有差辛卯秦王平并州凱旋獻㨗于太廟帝置酒髙㑹極歡而罷六月丁酉宴東征官寮奏九部樂帝親舉酒以屬百官極歡而罷己酉大㑹東征將士奏九部樂於庭癸丑幸昆明池宴從官賜錢各有差七月戊辰宴羣臣八月庚戌宴羣臣奏九部樂於庭賜布帛各有差四年三月丁酉宴西突厥之使奏九部樂於庭賜帛各有差五月癸亥宴五品以上奏九部樂於庭丁丑以王世充平宴羣臣賜帛各有差七月戊辰宴羣臣奏九部樂於庭帝舉酒屬百官極歡乃罷賜錢帛各有差九月癸亥賜五品以上射於武徳殿賞金銀綾綺各有差五年正月辛亥賜羣臣大射於𤣥武門賚綵帛各有差壬子幸昆明池宴從官賜帛各有差三月己酉宴羣臣及京城父老賜帛各有差七月己酉秦王平王世充班師丙戌宴旋師賜帛各有差六年三月己丑宴五品以上於昭徳殿賜帛各有差九月丙子宴五品以上於苑内謂公卿曰昔漢髙定天下以蕭曹張陳為良佐任以政事朕應天命尅平區宇仗任卿等自謂不謝古人因舉酒以屬羣臣極歡而罷十月甲辰以有年宴羣臣賜物各有差七年二月宴突厥使者奏九部樂於庭三月己卯幸瑯琊公主第宴從官五品以上賚帛各有差四月癸卯宴羣臣奏九部樂賜帛各有差丙午宴王公親屬於文明殿帝見長平王太妃以屬従家人禮降階再拜酒小闌移坐翠華殿帝賦詩王公逓上夀賜帛各有差六月戊戌右武侯大將軍丘和以交州首領来朝奏九部樂以宴之齎物各有差七月壬子幸東宫宴従官下至胥徒頒賜各有差八年正月甲寅幸秦王第謂羣臣曰朕以秦王有大功故於宫中立第以異之従是宴五品以上設竒技百戲賜帛各有差二月甲午幸齊王元吉第宴五品以上齎賜各有差三月丁酉宴羣臣于𤣥武門陳倡優爛漫之伎四月丁未赤雀巢於殿門宴五品以上上頌者十餘人極歡而罷己丑宴西蕃突厥林邑使者奏九部樂於庭五月乙巳宴五品以上及外戚于内殿賦詩賜綵極歡而罷十二月辛巳車駕狩鳴犢泉迴宴從官賚物綵帛各有差九年三月丙申宴朝集使于百福殿奏九部樂于庭五月乙卯宴羣臣六月癸亥以秦王為太子宴羣臣賜帛各有差八月傳位於太子帝稱太上皇後四年乃徙居大安宫太宗親侍輿輦百寮陪従太上皇甚恱置酒髙㑹極歡而罷賜物各有差太宗後與公卿謁太上皇於戢武殿復置酒為歡謂羣臣曰天下無事四海乂安非吾付囑得所吾兒孝順安能至此乎明日復召貴臣十餘人爰及妃主置酒於凌煙閣酒酣太上皇親彈琵琶太宗起舞公卿上夀乙夜方散賜帛各有差太宗以武徳九年八月甲子即位甲戌宴羣臣於顯徳前殿賜帛各有差貞觀元年十月癸未宴羣臣賜物各有差二年五月丙辰以夏麥大稔宴羣臣奏九部樂於庭賜物各有差九月壬子宴羣臣奏九部樂賜帛各有差賜天下大酺三日慶有年也十一月甲子宴羣臣賜帛各有差三年正月甲子宴羣臣奏九部樂歌太平舞師子于庭賜帛有差三月甲辰賜羣臣大射於𤣥武門十一月戊辰宴五品以上於内殿帝謂羣臣曰李靖奮忠勇長驅深入頡利奔竄天下無事豈不樂哉於是極歡而罷戊子宴突利可汗及羣臣三品以上於中華殿帝賦七言詩極歡而罷賜雜綵各有差四年二月己酉宴三品以上於中華殿三月戊辰宴三品以上於林光殿賜物各有差七月壬辰宴羣臣於芳華殿奏九部樂於庭帝大恱親舉酒以屬羣臣羣臣奉觴稱慶極歡而罷賜帛各有差九月幸龍州丁巳次武功宴従官及武功父老賜帛各有差十月乙未皇子誕育宴三品以上於臨華殿賜帛各有差五年正月癸酉大蒐於昆明池甲戌宴羣臣奏九部樂歌太平舞師子賜従官帛各有差己卯太上皇詔帝與近臣十許人汎舟于後園絲竹逓奏至于大安宫置酒甚歡于夜而罷三月癸亥賜文武五品以上射於武徳殿四月甲申宴羣臣賜帛各有差九月乙丑賜羣臣大射於武徳殿十一月己卯宴羣臣賜帛各有差六年正月甲戌宴蠻夷及三品以上於百福殿賜物各有差二月丙辰賜羣臣大射於武徳殿戊辰幸九成宫戊寅宴三品以上於丹霄殿賜従官帛各有差七月辛未宴三品以上於丹霄殿帝従容曰中夏乂安四夷賔服此公卿盡忠之効也朕實嘉之然煬帝威加中國頡利跨有北荒葉䕶國富兵精雄據西域此三君者可謂盛矣失道怙亂奄致亡滅朕目覩其事何能不戒懼也公等輔導朕躬績已成矣當思長世之䇿以相敦勉於是賜帛各有差閏八月己卯宴近臣於丹霄殿樓帝甚歡夜分乃散各賜錢帛有差九月帝在九成宫丙申以皇太子来朝宴東宫官屬賜帛各有差乙巳宴岐州父老賜帛各有差己酉至慶善宫宴三品以上於渭水之濵帝甚歡賦五言詩庚戌宴従官故老賜帛各有差七年正月癸巳宴三品以上及州牧蠻夷酋長于𤣥武門帝謂侍臣曰四海和平天下同樂自古帝王罕得事父太上皇萬福膝下之歡有倍常慶于是奏七徳九功之舞觀者覩其抑揚蹈厲莫不扼腕踊躍􅅥然震悚武臣列將咸上夀曰此舞皆是陛下百戰百勝之形容羣臣咸稱萬嵗蠻夷十餘種自請率舞詔許之久而乃罷賜帛各有差八年二月戊申宴羣臣賜帛各有差九年正月甲申皇太子承乾納妃蘇氏宴羣臣賜帛各有差十一年正月壬辰宴五品以上於兩儀殿賜帛各有差戊申帝將幸雒陽宴長安父老於𤣥武門賜以榖帛三月戊子帝在雒陽引五品以上射於儀鸞殿丙申宴従官賜物各有差庚子宴三品以上於西苑帝御龍舟汎于積翠池癸卯宴雒陽父老於乾元殿賜以粟帛十月辛酉幸積翠池宴五品以上帝曰今兹年榖大登水潦不能為害天下既安邉方静息因此農隙與公等舉酒酒既酣各宜賦一事帝賦尚書特進魏徵賦西漢十一月庚戌宴五品以上及蕃夷于貞觀殿奏九部樂賜帛各有差十二年二月壬子宴雒陽父老賜帛有差三月丙子以皇孫誕育宴五品以上於東宫十三年正月庚子㑹羣臣奏功成慶善及破陣之樂十四年正月己酉宴羣臣及吐谷渾王河源王慕容諾曷鈐於𤣥武門奏倡優百戲之樂賜物各有差九月乙巳宴京官五品以上于兩儀殿奏九部之樂十五年二月癸丑宴従官及山東宗姓雒陽髙年於貞觀殿奏九部樂賜帛各有差十六年三月戊午賜百寮大射于觀徳殿十月庚子宴諸蕃使於兩儀殿帝謂沙鉢羅俟斤曰延陁本一部落俟斤本我所立始十餘年自算何如頡利之衆而侵我邊疆我纔發甲騎傾其部落爾欲與我為寃不過欲費我邊境十羊五馬耳今見爾遣使謝罪捨爾前過情好如初宴罷賜帛各有差十一月甲子幸慶善宫召武功之邰城立節三時豐義四鄉士女七十以上及居宫側數百人賜宴帝謂之曰朕㓜遭隋亂櫛風沐雨饑不遑食以救蒼生百姓得無死亡二十餘年矣今重還舊鄉與父老相見此宫先皇所居朕之生處至此傷心觸物増感因泣下霑襟羣臣莫不欷歔又曰今詔父老言宴少自寛割耳又謂従臣曰人或時覧物不能自知朕昔在隋朝五品初不可望公等其時多有未仕朕今君臨四海公等並居髙列君臣相遇千載一時朕與諸公豈各自知也遂縦酒盡歡其父老中或宿經役事或舊媪蒼頭皆蹈舞歡醉争前上夀或因言屈滯者帝咸理之宴畢賜帛各有差其無官者並加泛級乙亥以輿駕還宫宴百寮奏十部樂先是伐髙昌收其樂工付太常増九部樂為十部十七年六月甲午并州父老百餘人詣闕奏稱陛下肇開帝業發跡太原皇太子疏爵晉藩作牧并部臣等不勝慶幸今来奉賀帝賜宴及物以遣之閏六月庚申薛延陀可汗子突利設獻饌帝於相思殿大饗百寮盛陳寳器奏慶善破陣樂并十部之樂及撞毬跳丸舞劍之技突利設再拜上千萬嵗夀賜金帛各有差十一月甲辰誕皇太子太孫宴百寮於𢎞教殿帝幸東宫自殿北門而入太子自投階下舞蹈稱萬嵗帝謂宫臣曰頃来生業稍可非乏酒食而唐突公等宴㑹者朕甲館之慶故就公為樂耳咸稱萬嵗酒酣帝起舞羣臣並舞樂極而罷賜物各有差十八年正月丙戌宴諸蕃使於𤣥武門賜物以遣之二月辛酉詔三品以上賜宴於𤣥武門帝既工𨽻書又好飛白於王衞之間别更立意王羲之衛夫人遂觸類増長精妙絶倫每有新竒羣臣無不下拜啓請是日帝操筆作飛白書羣臣乗酒就帝手中相競散騎常侍劉洎登御牀引手然後得之其不得者咸稱洎登御牀罪當死請引付法帝笑而言曰昔有媫妤辭輦今見常侍登牀五月甲戌詔司徒長孫無忌以下十餘人於丹霄殿賜宴各賜膜皮右衞大將軍薛萬徹預焉帝意在萬徹而誤呼其兄萬均愴然不樂曰萬均朕之勲舊不幸早亡朕不覺呼名豈其魂靈欲朕之賜也因令取皮呼萬均以同賜而焚之於前侍坐者無不感嘆十月癸卯宴雍州父老千一百人于上林苑帝謂之曰朕剪除䘮亂海内乂安百姓復業各循其理而遼東數城中國舊地莫離支狼子野心虐殺其主朕欲存其國而弔其人所以將幸雒陽有事經畧安復三韓之地一二年方還故詔父老别耳子孫従行者朕躬自廵撫勿以為慮賜百嵗以上氊被袍各一疋帛十段粟十石九十以上帛五段粟五石八十以上帛三段粟二石十一月壬午宴雒州父老一百九十人於儀鸞殿班賜有差十九年十月征遼還次營州戊申詔本州刺史父老及契丹等蕃長首領宴㑹父老年七十以上契丹奚蕃長以下各班賜繒錦綾數千萬段十一月癸酉帝至幽州幸城南大饗軍士勞之曰朕執賞罰之柄懸諸日月有功於國賞不踰時飲至之禮古今常事朕欲徧置酒餚咸宜樂飲甲戌宴従官三品以上賜物各有差丙戌迴幸定州時太子監國處定州詔定州管内孝行著聞者宜與宗姓老人同賜宴㑹十二月帝不豫歩輦幸并州辛酉文武三品以上及中書門下四品以上以帝疾瘳詣闕上禮詔引文武五品以上賜宴遣皇太子宣㫖曰臣之於君義猶父子朕頃遭腫疾見公等憂惶今者疾除復見公等喜恱此之忠烈簡在朕心不費上禮餚膳豐潔固不可獨進與公等同歡酒舉樂奏司徒長孫無忌以下更上千萬嵗夀帝悉為舉巵奏破陣樂舞狻猊車撞丸劍數百人齊作帝樂飲臣下極歡將夕乃罷賜物各有差二十年正月庚辰引従官及太原父老而宴之賜物各有差七月辛亥帝疾愈宴五品以上於飛霜殿絲竹逓奏羣臣上夀極歡而罷賜綾錦各有差十二月庚辰以鐵勒回紇俟利發等詣闕朝見宴於芳蘭殿恩賜甚渥仍勅所司加禮供給每五日一㑹二十一年正月鐵勒回紇部㧞野古部同羅部思結部渾部斛薛部奚結部阿䟦部契苾羽部白霫部其渠帥各率所部歸附及還帝御天成殿陳十部樂宴而遣之設髙坫於殿前置銀瓶於坫上自左閣内潛流酒泉通於坫脚而涌殿前瓶中又置大銀盆其實百斛傾瓶注於盆中鐵勒數千人不飲其半雜類驚駭私相謂曰天子賜我曹此瓶還部落中傾之豈不嘗是酒也又詔文武五品以上令外厨給酒胾於尚書都堂以餞之二十二年正月乙未奏十部樂㑹四夷君長於天成殿王公稱觴上夀賜帛各有差二月丙寅朔朝集使奏辭引五品以上升殿宴四月乙亥西突厥賀魯以王師問罪龜兹固請前驅願為鄉導仍以數十騎馳謁詔授昆丘道行軍摠管宴之於嘉夀殿及文武三品畢景甚歡錫賀魯綾綵仍觧所服之衣以賜十月己巳隰丘道軍將阿史那社爾擊龜兹破之帝聞之大恱宴五品以上於紫微殿従容謂羣臣曰夫樂有數種至如土城竹馬逰戲阡陌之間此童㓜之樂飾金翠曳羅綺此婦人之樂賤糴貴出貿遷有無此商賈之樂髙官厚禄名位昭顯此仕進之樂受脤出征前無勁敵此將帥之樂四海寧一六合無塵端拱巖廊社稷安固此帝王之樂也頃命將西征今已尅㨗萬里清泰戰士咸得還家此朕為樂之時因賜羣臣傾觶極歡而罷二十三年二月癸巳特進新羅王金春秋還國令三品以上宴餞之優禮甚備册府元龜卷一百九
