body:
  text: 册府元龜卷二百四十三宋王欽若等撰列國君部務德宴享務德夫中庸之道人倫之貴扶三綱而首五常者惟立德而已矣故云德者得也匹夫得之揚名潤身物無不服况千乘之雄一國之覇衆臣之師長百姓之歸仰可不務乎傳曰雖有其位茍無其德不敢作禮樂斯之謂矣昔三代相㳂五等竝制盟㑹有儀征伐有名聘享有禮蒐狩有度大夫相之良史記之則有降志以興讓宥過以推誠縱敵以示信損欲以利民彰善瘅惡克己復禮者多矣斯之謂令德不亦韙乎衞武公有文章又能聽其規諫以禮自防故能入相于周作淇澳之詩文公能以道化其民淫奔之恥國人不齒不齒者不與相長稚作蝃蝀之詩公之臣子多好善賢者樂告以善道作干旄之詩即位十八年邢人狄人伐衞圍莵圃魯僖公十八年公以國讓父兄子弟及朝衆曰茍能治之燬請從焉燬衞文公名衆不可不聽衛侯讓而後師于訾婁陳師訾婁訾婁衛邑狄師還魯莊公八年夏師及齊師圍郕郕降于齊師仲慶父請伐齊師齊不與魯共其功故欲伐之莊公曰不可我實不德齊師何罪罪我之繇虞書曰臯陶邁種德虞書大禹謨禹稱臯陶能力行布德邁力行也德乃降姑務脩德以待時乎言身有德乃為人所降服秋師還君子是以善魯莊公僖公能遵伯禽之法儉以足用寛以愛民務農重穀牧于埛野魯人遵之於是季孫行父請命于周而史克作駉頌季孫行父季文子也史克魯史也君臣之有道作有駜頌能脩泮宮作泮水頌能復周公之宇作閟宮頌宇居也秦繆公與晉惠公合戰于韓地晉君棄其軍與秦爭利還而馬騺繆公與麾下馳追之不能得繆公反為晉軍所圍晉擊繆公繆公傷於是岐下食善馬者三百人馳冒晉軍晉軍解圍遂脫繆公而反生得晉君初繆公亡善馬岐下野人共得而食之者三百餘人吏逐得欲法之繆公曰君子不以畜産害人吾聞食善馬肉不飲酒傷人乃皆賜酒而赦之三百人者聞秦擊晉皆求從從而見繆公窘亦皆推鋒爭死以報食馬之德於是繆公虜晉君以歸晉文公三年圍原魯僖公二十五年命三日之糧原不降命去之諜出曰原将降矣軍吏請待之公曰信國之寶也民之庇也得原失信何以庇之所亡滋多退一舎而原降四年楚子圍宋晉救宋楚子玉從晉師退三舍避之初文公出奔及楚楚子享之曰公子若反晉國則何以報不穀對曰子女玉帛則君有之羽旄齒革則君地生焉其波及晉國者君之餘也其何以報君曰雖然何以報我對曰若以君之靈得反晉國晉楚治兵遇於中原其辟君三舎若不獲命三退不得楚之命也其左執鞭弭右屬櫜鞬以與君周旋弭弓末無縁者櫜以受箭鞬以受弓屬著也周旋相追逐也五年伐曹初文公亡過曹曹君無禮欲觀其駢脇駢脇并幹也釐負覊諌不聽私善於重耳謂饋盤飱寘璧焉重耳受飱反璧至是伐曹虜共公以歸令軍毋入釐負覊之宗族閭初文公之竪頭須守藏者也頭湏一曰里鳬須竪左右小吏其出也竊藏以迯文公出時盡用以求納之求納文公及入求見公辭以沐謂謁者曰沐則心覆心覆則圖反宜吾不得見也從者為覊紲之僕居者為社稷之守何必罪居者國君而讐匹夫懼者衆矣公遽見之七年秦伯圍鄭鄭使燭之武見秦伯秦伯説與鄭人盟而還子犯請擊之文公曰不可微夫人之力不及此請擊秦也夫人謂秦穆公因人之力而敝之不仁失其所與不知以亂易整不武秦晉和整而還相攻更為亂也吾其還也亦去之襄公三年討衛魯文公二年陳侯為衞請成于晉執孔逹以說陳始與衞謀謂可以強得免今晉不聽故更執孔逹以茍免也五年晉人歸孔逹于衞以為衞之良也故免之邾文公卜遷于繹魯文公十三年繹邾邑魯國鄒縣北有繹山史曰利於民而不利於君邾子曰茍利於民孤之利也天生民而樹之君以利之也民既利矣孤必與焉左右曰命可長也君何弗為邾子曰命在養民死之短長時也民茍利矣遷也吉莫如之左右以一人之命為言文公以百姓之命為主一人之命時有短長不可如何百姓之命乃傳世無窮故從之遂遷于繹五月邾文公卒君子曰知命楚莊王十六年為陳夏徵舒殺靈公魯宣公十一年率諸侯伐陳謂陳曰無驚吾誅徵舒而已已誅徵舒因縣陳而有之羣臣畢賀申叔時使於齊來還獨不賀叔時楚大夫莊王問其故對曰鄙語有之牽牛蹊人田田主奪之牛蹊則有罪矣奪之牛不亦甚乎今王以徵舒殺君故徵兵諸侯以義伐之已而取之以利其地則後何以令于天下是以不賀莊王曰善乃迎陳靈公太子午於晉而立之復居陳如故是為成公孔子讀史記至楚復陳曰賢哉楚莊王輕千乘之國而重一言十七年春莊王以鄭與晉盟來伐鄭圍三月以城降楚楚王入自皇門鄭襄公肉袒牽羊以迎曰孤不能事邊邑使君王懐怒以及敝邑孤之罪也敢不惟命是聽君王遷之江南翦以賜諸侯亦惟命是聽若君王不忘厲宣王桓武公哀不忍絶其社稷錫不毛之地使復得改事君王孤之願也然非所敢望也敢布腹心惟命是聽莊王為却三十里而後舍楚羣臣曰自郢至此士大夫亦乆勞以今得國舎之何如莊王曰所謂伐伐不服也今已服尚何求乎卒去是年夏及晉師戰于邲既敗晉師次于衡雍大夫潘黨曰君盍築武軍築軍營以章武功而收晉尸以為京觀積尸封土其上謂之京觀臣聞克敵必示子孫以無忘武功楚子曰非爾所知也夫文止戈為武文字武王克商作頌曰載戢干戈載櫜弓矢戢藏也櫜韜也詩羙武王能誅㓕暴亂而息兵矣我求懿德肆于時夏允王保之肆遂也夏大也言武王既息兵又能求羙德故遂大而信王保天下又作武其卒章曰耆定爾功武頌篇名耆致也言武王誅紂致定其功其三曰鋪時繹思我徂惟求定其三三篇鋪布也繹陳也時是也思辭也頌羙武王能布施善政使天下歸往求定其六曰綏萬邦屢豐年其六六篇綏安也屢數也言武王既安天下數致豐年此三六之數與今詩頌篇次不同蓋楚樂歌之次第夫武禁暴戢兵保大定功安民和衆豐財者也此武七德故使子孫無忘其章著之篇章使子孫不忘今我使二國㬥骨暴矣觀兵以威諸侯兵不戢矣暴而不戢安能保大猶有晉在焉得定功所違民欲猶多民何安焉無德而强爭諸侯何以和衆利人之幾幾危也而安人之亂以為己榮何以豐財兵動則年荒武有七德我無一焉何以示子孫其為先君宮告成事而已祀先君告戰勝武非吾功也古者明王伐不敬取其鯨鯢而封之以為大戮於是乎有京觀以懲淫慝鯨鯢大魚名以喻不義之人呑食小國今罪無所晉罪無所犯也而民皆盡忠以死君命又何以為京觀乎祀于河作先君宮告成事而還二十年圍宋以殺楚使也宋城中食盡易子而食析骨而炊華元出告以情莊王曰君子哉遂罷兵去先是晉伐楚三舎不止大夫擊之莊王曰先君之時晉不伐楚及孤之身而晉伐楚是孤之過也若何其辱羣大夫曰先臣之時晉不伐楚今臣之身而晉伐楚此臣之罪也請擊之王俛而泣涕沾衿起而拜羣大夫晉人聞之曰君臣爭以過為在己且輕下其臣不可伐也夜還師而歸平王棄疾即位魯昭公十三年召觀從楚大夫王曰唯爾所欲觀從教子干殺棄疾棄疾今召用之明在君為君之義對曰臣之先佐開卜乃使為卜尹昭王十一年秦救楚敗吳師楚子入于郢王賞鬭辛王孫繇于王孫圉鍾建闘巢申包胥王孫賈宋木闘懐子西曰請舎懐也王曰大德㓕小怨道也二十七年王在城父将救陳卜戰不吉卜退不吉王曰然則死也再敗楚師不如死将戰王有疾攻大𡨕卒于城父是歲也有雲如衆赤鳥夾日以飛三日昭王使問諸周太史周太史曰其當王身乎日為人君妖氣守之故以為當王身雲在楚唯楚見之故禍不及他國若禜之可移於令尹司馬禜禳祭王曰除腹心之疾而寘諸股肱何益不穀不有大過天其夭諸有罪受罰又焉移之遂弗禜初昭王有疾卜曰河為􅑂王弗祭大夫請祭諸郊王曰三代命祀祭不越望諸侯望祀境内山川星辰江漢睢漳楚之望也禍福之至不是過也不穀雖不德河非所獲罪也遂弗祭孔子曰楚昭王知大道矣其不失國也宜哉夏書曰惟彼陶唐帥彼天常五子歌言堯循天之常道有此冀方今失其道亂其紀綱乃滅而亡㓕亡謂夏桀也唐虞及夏皆都冀州不易地而亡繇於不知大道故又曰允出兹在兹繇已率常可矣又禹謨言信出己則福亦在己惠王食寒菹而得蛭因遂吞之腹有疾而不能食令尹入問曰王安得此疾也王曰我食寒菹而得蛭念譴之不行其罪乎是法廢而威不立也非所以使國聞也譴而行其誅乎則庖宰監食法皆當死心又不忍也故吾恐蛭之見也因遂吞之令尹辟席再拜而賀曰臣聞天道無親唯德是輔王有仁德天之所奉也病不為傷是夕也惠王之腹蛭出故其久病心腹之疾皆愈天之視聽不可謂不察也齊景公時熒惑守於虗朞年不去公異之召晏子而問曰吾聞之人行善者天賞之行不善者天殃之熒惑天罰也今留虗其孰當之晏子曰齊當之公不恱曰天下大國十二同曰諸侯齊何以獨當之晏子曰虗齊野也且天之下殃固於富强為善不用出政不行賢人使遠讒人反昌百姓疾怨悉為灾祥碌碌强食進死何傷是以列舎無次變星不常熒惑廻逆孽星在旁有賢不用安得不亡公曰可去乎對曰可致者可去公曰寡人為之若何對曰盍出寃聚之獄使反田矣散百官之財施之民矣振孤而敬老人矣夫若是者百惡可去獨孽星乎公曰善行之三月而熒惑遷宋景公時熒惑在心懼召子韋而問曰熒惑在心何也子韋曰熒惑天罰也心宋分野也禍當君雖然可移於宰相公曰宰相所使治國也一曰宰相吾之股肱而移死焉不祥寡人請自當之子韋曰可移于民公曰民死寡人将誰為君乎一説君者待民寧獨死耳子韋曰可移於歲公曰歲饑民餓必死為人君欲殺其民以自活其誰以我為君乎一説歲饑民困我誰為君是寡人之命固盡矣子無復言矣子韋還走北靣再拜曰臣敢賀君天之處高而聽卑君有仁人之言三天必三賞君今夕星必徙舎一説君有君人之言三熒惑有動君延壽二十一歲公曰子何以知之對曰君有三善故有三賞星必三舎舎行七星星當一年三七二十一歲故曰君延壽二十一歲臣伏於階下以伺之星不徙臣請死之公曰可是夕也星三徙舎也如子韋言魏文侯與虞人期獵是日飲酒樂天雨文侯将出左右曰今日飲酒樂天又雨君将焉之文侯曰吾與虞人期獵雖雨豈可無一㑹期哉乃徃身自罷之魏於是乎始强初韓趙相難韓索兵於魏曰願得借師以伐趙文侯曰寡人與趙兄弟不敢從趙又索兵以攻韓文侯曰寡人與韓兄弟不敢從二國不得兵怒而反己乃知文侯以講於己也皆朝魏鄒穆公有令食鳬鴈必以粃無得以粟于是倉無粃而求易于民二石粟而得一石粃吏以為費請以粟食之穆公曰去非汝所知也夫百姓飽牛而耕暴背而耘勤而不惰者豈為禽獸哉粟米人之上食奈何其以飬鳥且爾知小計不知大㑹周諺曰囊漏貯中而獨不聞歟夫君者人之父母取倉之粟移之於民此非吾之粟乎鳥茍食鄒之粃不害鄒之粟也粟之在倉與在民於我何擇鄒民聞之皆知私積與公家為一體也此之謂知富邦趙武靈王三年五國相王趙獨否曰無其實敢處其名乎令國人謂己曰君宴享夫春秋所載有宴享之義焉所以備物象德交事觀禮合歡序賓示慈布政之謂也自一戎大定勲戚並建東遷之後諸侯力政小則撫封而保姓大則定覇而主盟朝䀻有常使介交騖飲食宴樂迨浹於家陪升降揖讓無廢於兵革繇是豐豆觴以為好諧金石以餙喜聲詩見志所貴乎必類節折有品乃知其多文既以觀其盡心且将申其嘉好故其流風遺辭可觀也已至乃禮義之或愆形於規諌禍福之先兆發於言動蓋夫賓旅酬酢之際不可以不慎焉周之先公劉居於京築宮室既成與羣臣士大夫飲酒以落之詩曰篤公劉于京斯依蹌蹌濟濟俾筵俾几蹌蹌濟濟士大夫威儀也篤厚俾使也公劉居于此京依而築宮室其既成也與羣臣士大夫飲酒以落之羣臣則相使為公劉設几筵使之升坐既登乃依乃造其曺執豕于牢酌之用匏賓已登席坐矣乃依几矣曺羣也執豕于牢新國則殺禮也酌之用匏儉以質也公劉既登堂負扆而立羣臣乃適其牧羣搏豕于牢中以為飲酒之殽酌酒以匏為爵言忠敬也食之飲之君之宗之為之君為之大宗也宗尊也公劉雖去邰國來遷羣臣從而君之尊之猶在邰也魯莊公六年楚文王伐申過鄧鄧祁侯曰吾甥也止而享之二十二年齊桓公使敬仲為工正掌百工之官飲桓公酒樂齊桓賢之故就其家會据主人之辭故言飲桓公酒公曰以火繼之辭曰臣卜其晝未卜其夜不敢僖公時燕飲於内寢則善其妻壽其母詩曰魯侯燕喜令妻壽母與羣臣宴則欲與之相宜詩曰宜大夫庶士邦國是有既多受祉黄髪兒齒二十二年楚與宋戰於泓楚子入享于鄭為鄭所享九獻用畢用上公之禮九獻酒而禮畢庭實旅百庭中所陳品數百也加籩豆六品食物六品加于籩豆籩豆禮食器二十三年晉公子重耳如楚楚成王以周禮享之九獻庭實旅百公子欲辭子犯曰天命也君其享之亡人而國薦之非敵而君設之非天誰啓之心公子重耳適秦秦伯享之子犯曰吾不如衰之文也有文辭衰趙衰也請使衰從公子賦河水河水逸詩義取河水朝宗于海海喻秦公賦六月六月詩小雅道尹吉甫佐宣王征伐喻公子還晉必能匡王國古者禮㑹因古詩以見意故言賦詩斷章也其全稱詩篇者多取首章之義趙衰曰重耳拜賜公子䧏拜稽首公降一級而辭焉下階一級辭公子稽首衰曰君稱所以佐天子者命重耳重耳敢不拜詩首章言匡王國末章言佐天子故趙衰因通言之二十四年宋成公如楚還入於鄭鄭伯将享之問禮於皇武子皇武子鄭􅀸對曰宋先代之後也於周為客天子有事膰焉有事祭宗廟也膰祭肉尊之故賜以祭胙有䘮拜焉宋弔周䘮王特拜謝也豐厚可也鄭伯從之享宋公有加禮也三十年周襄王使周公閱來聘饗有昌歜白黑形鹽昌歜昌蒲菹白熬稻黒熬黍形鹽鹽形象虎辭曰國君文足昭也武可畏也則有備物之享以象其德薦五味羞嘉穀鹽虎形嘉穀熬稻黍也以象其文也鹽虎形以象武也以獻其功吾何以堪之文公三年公如晉晉侯享公賦菁菁者莪菁菁者莪詩小雅取其既見君子樂且有儀莊叔以公降拜謝以公比君子曰小國受命於大國敢不慎儀君貺之以大禮何樂如之抑小國之樂大國之惠也晉侯降辭降階辭讓公登成拜俱還上成拜禮公賦嘉樂大雅取顯顯令德宜民宜人受祿于天四年衞寗武子來聘公與之宴為賦湛露及彤弓非禮之常公特命樂人以示意故言為賦湛露彤弓詩小雅不辭又不答賦使行人私焉私問之對曰臣以為肄業及之也肄習也魯人失所賦寗武子佯不知此其愚不可及昔諸侯朝正於王朝而受政敎也王宴樂之於是乎賦湛露則天子當陽諸侯用命也湛露曰湛湛露斯匪陽不晞晞乾也言露見日而乾猶諸侯稟天子命而行諸侯敵王所愾而獻其功敵猶當也愾恨怒也王於是乎賜之彤弓一彤矢百玈弓矢千以覺報宴覺明也謂諸侯有四夷之功王賜之弓矢又為歌彤弓以明報功宴樂今陪臣來繼舊好方論天子之樂故自稱陪臣君辱貺之其敢干大禮以自取戾十三年公如晉還鄭伯與宴于棐子家賦鴻鴈子家鄭大夫公子歸生也鴻鴈詩小雅義取侯伯哀恤鰥寡有征行之勞言鄭伯寡弱欲使魯侯還晉恤之季文子曰寡君未免於此言亦同有微弱之憂文子賦四月四月詩小雅義取行役踰時思歸祭祀不欲為還晉子家賦載馳之四章載馳詩鄘風四章以下義取小國有急欲引大國以求助文子賦采薇之四章取其豈敢定居一月三㨗許為鄭還不敢安居鄭伯拜謝公為行公答拜十五年春宋司馬華孫來盟公與之宴成公九年季文子如宋致女復命公享之賦韓奕之五章韓奕言蹶父嫁女于韓侯為女相所居莫如韓樂文子喻魯侯有蹶父之德宋公如韓候宋土如韓樂十二年晉卻至如楚䀻且涖盟楚子享之子反相為地室而縣焉縣鍾皷也卻至将登登堂金奏作於下擊鍾而奏樂驚而走出子反曰日云暮矣寡君湏矣吾子其入也賓曰君不忘先君之好施及下臣貺之以大禮重之以偹樂貺賜也如天之福兩君相見何以代此下臣不敢言此兩君相見之禮子反曰如天之福兩君相見無亦惟是一矢以相加遺焉用樂言兩君戰乃相見無用此樂寡君湏矣吾子其入也賓曰傳諸交讓得賓主辭者多曰賓以明之若讓之以一矢禍之大者其何福之為世之治也諸侯間於天子之事則相朝聘也事間缺修私好於是乎有宴享之禮享以訓共儉享有體薦設几而不倚爵盈而不飲肴乾而不食所以訓共儉宴以示慈惠宴則折殂相與共食共儉以行禮而慈惠以布政政以禮成民是以息百官承事朝而不夕不夕言無事此公侯之所以扞城其民也扞蔽也言宴享結好鄰國所以蔽扞其民故詩曰赳赳武夫公侯干城詩周南之風赳赳武貌干扞也言公侯之與武夫止于扞難而已及其亂也諸侯貪冒侵欲不忌爭尋常以盡其民八尺曰尋倍尋曰常言爭尺寸之地以相攻伐畧其武夫以為己腹心股肱爪牙畧取也言世亂則公侯制禦武夫以從己志使侵害鄰國為搏噬之用無已故詩曰赳赳武夫公侯腹心舉詩之正以駮亂義詩言治世則武夫能合德公侯外為扞城内制其腹心天下有道則公侯能為民干城而制其腹心亂則反之畧其武夫以為己腹心爪牙今吾子之言亂之道也不可以為法然吾子主也至敢不從遂入卒事十四年晉侯使卻犫於衛衞侯享苦成叔成叔郤犫寗惠子相相佐禮惠寗殖苦成叔傲寗子曰苦成家其亡乎古之為享食也以觀威儀省禍福也故曰兕觵其觩㫖酒思柔詩小雅言君子好禮㫖酒皆思柔德雖設兕觵觩然不用以兕角為觵所以罰不敬觩陳設之貌彼交匪傲萬福來求彼之交于事而不惰傲乃萬福之所求今夫子傲取禍之道也襄公四年穆叔如晉報知武子之聘也武子聘在元年晉侯享之金奏肆夏之三不拜肆夏樂曲名周禮以鍾皷奏九夏其二曰肆夏一名樊三曰韶夏一名遏四名納夏一名渠蓋擊鍾而奏此二夏曲工歌文王之三又不拜工樂人也文王之三大雅之首文王大明綿歌鹿鳴之三三拜小雅之首鹿鳴四牡皇皇者華韓献子使行人子貟問之行人通使之官曰子以君命辱於敝邑先君之禮藉之以樂以辱吾子藉薦吾子舎其大而重拜其細敢問何禮也對曰三夏天子所以享元侯也使臣弗敢與聞元侯牧伯文王兩君相見之樂也臣不敢及及與也文王之三皆稱文王之德受命作周故諸侯㑹同以相樂鹿鳴君所以嘉寡君也敢不拜嘉晉以叔孫為嘉賓故歌鹿鳴之詩取其我有嘉賓叔孫奉君命而來嘉叔孫乃所以嘉魯君四牡君所以勞使臣也敢不重拜詩言使臣乘四牡騑騑然行不止勤劳也晉以叔孫來聘故以此勞之皇皇者華君敎使臣曰必咨於周皇皇者華君遣使臣之詩言忠臣奉使能光輝君命如華之皇皇然又當諮于忠信以補已不及忠信為周其詩曰周爰咨諏周爰諮謀周爰咨度周爰咨詢言必于忠信之人諮此四事臣聞之訪問於善為咨問善道咨親為詢問親戚之善咨禮為度問禮宜咨事為諏問政事咨難為謀問惡難臣獲五善敢不重拜五善為咨詢度諏謀八年晉范宣子來聘公享之宣子賦摽有梅摽有梅詩召南摽落也梅盛極則落詩人以興女色盛則有衰衆士求之宜及其時宣子欲魯及時共討鄭取其汲汲相赴季武子曰誰敢哉言誰敢不從命今譬於草木寡君在君君之臭味也言同類歡以承命何時之有遲速惟命武子賦彤弓彤弓天子賜有功諸侯之詩欲使晉君繼文之業復受彤弓於王宣子曰城濮之役在僖二十八年我先君文公獻功於衡雍受彤弓於襄王以為子孫藏藏之以示子孫匄也先君守官之嗣也敢不承命言己嗣其父祖為先君守官不敢廢命欲正晉君君子以為知禮彤弓之義義在晉君故范匄受之所謂知禮十年宋公享晉侯於楚丘請以桑林桑林殷天子之樂名荀罃辭之辭讓之荀偃士匄曰諸侯宋魯於是觀禮宋王者後魯以周公故皆用天子禮樂故可觀魯有禘樂賔祭用之禘三年大祭則作四代之樂别祭羣公則用諸侯樂宋以桑林享君不亦可乎言俱天子樂也舞師題以旌夏師樂師旌夏大旌也題識也以大旌表識其行列晉侯懼而退入于房旌夏非常卒見之人心偶有所畏去旌卒享而還及著雍疾晉侯疾也著雍晉地卜桑林見􅑂見於卜兆荀偃士匄欲奔請禱焉奔走還宋禱謝荀罃不可曰我辭禮矣彼則以之以用也猶有鬼神於彼加之言自當加罪于宋晉侯有間間疾差也十六年晉侯與諸侯宴于温使諸大夫舞曰歌詩必類歌古詩當使名從義類十九年正月晉侯㑹諸侯於沂上取邾田自漷水歸之于我晉侯先歸公享晉六卿于蒲圃六卿過魯賜之三命之服軍尉司馬司空輿尉候奄皆受一命之服如鞍戰還之賜唯無先輅賄荀偃束錦加璧乘馬先吳壽夢之鼎荀偃中軍元帥故特賄之五匹為束四馬為乘壽夢吳子乘也献鼎於魯因以為名古之献物必有以先今以璧馮為鼎之先二月季武子如晉拜師謝討齊晉侯享之范宣子為政代荀偃将中軍賦黍苗黍苖詩小雅美召伯劳來諸侯如隂雨之長黍苖也喻晉君憂劳魯國猶召伯季武子興再拜稽首曰小國之仰大國也如百穀之仰膏雨焉若嘗膏之其天下輯睦豈惟敝邑賦六月六月尹吉甫佐天子征伐之詩以晉侯比吉甫出征以匡王國二十年季武子如宋報向戌之聘也向戌聘在十五年褚師段逆以受享段共公子石也逆以入國受享禮賦棠棣之七章以卒武子賦也七章以卒盡八章取其妻子好合如皷瑟琴宜爾室家樂爾妻孥言二國好合宜其室家相親如兄弟宋人重賄之歸復命公宴之賦魚麗之卒章魚麗小雅卒章曰物其有矣維其時矣喻聘宋得其時公賦南山有臺南山有臺詩小雅取其樂只君子邦家之基邦家之光喻武子奉使能為國光輝武子去所曰臣不堪也去所辟席二十六年衞侯如晉晉人執而囚之秋七月齊侯鄭伯為衞侯故如晉欲共請之晉侯兼享之晉侯賦嘉樂國景子相齊侯景子國弱賦蓼蕭蓼蕭詩小雅言大平澤及逺若露之在蕭以喻晉君恩澤及諸侯子展相鄭伯賦緇衣緇衣詩鄭風義取適子之舘兮還予授子之粲兮言不敢違逺晉叔向命晉侯拜二君曰寡君敢拜齊君之安我先君之宗祧也敢拜鄭君之不貳也蓼蕭緇衣二詩所取各不同故拜二君辭異二十七年宋向戌欲弭諸侯之兵如晉告趙孟晉人許之如楚楚亦許之五月晉趙武至於宋宋人享趙文子叔向為介司馬置折爼禮也折爼躰觧節折升之於爼合卿宴享之禮故曰禮也周禮司馬掌㑹同之事仲尼使舉是禮也以為多文辭宋向戌自美弭兵之意敬逆趙武叔向因宴享之會張賓主之辭故仲尼以為多文醉七月宋公兼享晉楚之大夫趙孟為客客一坐所尊故季孫飲大夫酒藏紇為客子木與之言弗能對使叔向侍言焉子木亦不能對也鄭伯享趙孟于􅂷隴自宋還過鄭子展伯有子西子産子大叔二子石從二子石印段公孫段趙孟曰七子從君以寵武也請皆賦以卒君貺武亦以觀七子之志詩以言志子展賦草蟲草蟲詩召南曰未見君子憂心冲冲亦既見止我心則降以趙孟為君子趙孟曰善哉民之主也在上不忘降故可以主民抑武也不足以當之辭君子伯有賦鶉之賁鶉之賁賁詩􅅠風衞人刺其君滛亂鶉鵲之不若義取人之無良我以為兄我以為君也趙孟曰牀第之言不踰閾况在野乎非使人之所得聞也第簀也此詩刺滛亂故云牀第之言閾門限使人趙孟自謂子西賦黍苖之四章黍苖詩小雅四章曰肅肅謝功召伯营之列列征師召伯成之比趙孟於召伯趙孟曰寡君在武何能焉推善於其君子産賦隰桑隰桑詩小雅義取思見君子盡心以事之曰既見君子其樂如何趙孟曰武請受其卒章卒章曰心乎愛矣遐不謂矣中心藏之何日忘之趙武子欲子産之見規誨子大叔賦野有蔓草野有蔓草詩鄭風取其邂逅相遇適我願分趙孟曰吾子之惠也大叔嘉於相遇故趙孟受其惠印段賦蟋蟀蟋蟀詩唐風曰無已大康職思其居好樂無荒良士瞿瞿言瞿瞿然顧禮儀趙孟曰善哉保家之主也有望矣戒懼不荒所以保家公孫段賦桑扈桑扈詩小雅義取君子有禮文故能受天之祐趙孟曰匪交匪敖福将焉徃此桑扈詩卒章趙孟因以取義若保是言也欲辭福祿得乎卒享文子告叔向曰伯有将為戮矣詩以言志志誣其上而公怨之以為賓荣言誣則鄭伯未有其實趙倡賦詩以自寵故言公怨之以為賓荣其能乆乎幸而後亡言必先亡叔向曰然已侈所謂不及五稔者夫子之謂矣稔年也為三十年鄭殺良霄傳文子曰其餘皆數世之主也子展其後亡者也在上不㤀降謂賦草蟲曰我心則降印氏其次也樂而不荒謂賦蟋蟀曰好樂無荒樂以安民不滛以使之後亡不亦可乎又九月楚薳罷如晉涖盟罷令尹子蕩報荀盈也晉侯享之将出賦既醉既醉詩大雅曰既醉以酒既飽以德君子萬年介爾景福以美晉侯比之太平君子也叔向曰薳氏之有後於楚國也宜哉承君命不忘敏子蕩将知政矣敏以事君必能飬民政其焉往言政必歸之二十八年八月蔡侯自晉入于鄭鄭伯享之二十九年范献子來聘拜城杞也謝魯為杞城公享之展莊叔執幣公将以酬賓昭公元年諸侯盟于虢夏四月趙孟叔孫豹曺大夫入于鄭㑹罷過鄭鄭伯兼享之子皮戒趙孟戒享期禮終趙孟賦瓠葉受所戒禮畢而賦詩瓠葉詩小雅義取古人不以微薄廢禮雖瓠葉兔首猶與賔客享之子皮遂戒穆叔且告之告以趙孟賦瓠葉穆叔曰趙孟欲一獻瓠葉詩義取薄物而以獻酬知欲一獻子其從之子皮曰敢乎言不敢穆叔曰夫人之所欲也又何不敢夫人趙孟及享具五獻之籩豆於幕下朝䀻之制大國之卿五獻趙孟辭趙孟自以今非聘鄭故辭五獻私於子産私語曰武請於冡宰矣冡宰子皮請謂賦瓠葉乃用一獻趙孟為客禮終乃宴卿㑹公侯享宴皆折爼不體薦穆叔賦鵲巢鵲巢詩召南言鵲有巢而鳩居之喻晉君有國趙孟治之趙孟曰武不堪也又賦采蘩亦詩召南義取蘩菜薄物可以薦公侯享其信不求其厚曰小國為蘩大國省穡而用之其何實非命穆叔言小國微薄猶蘩菜大國能省愛用之而不棄則何敢不從命穡愛也子皮賦野有死麕之卒章野有死麕詩召南卒章曰舒而脱脱兮無感我帨兮無使尨也吠脱脱安徐帨佩巾義取君子徐以禮來無使我失節而使狗驚吠喻趙孟以義撫諸侯無以非禮相加凌趙孟賦常棣常棣詩小雅取其凢今之人莫如兄弟言欲親兄弟之國且曰吾兄弟比以安尨也可使無吠受子皮之詩穆叔子皮及曺大夫興拜三大夫皆兄弟國興起也舉兕爵曰小國頼子知免於戾矣兕爵所以罰不敬言小國蒙趙孟徳比以安自知其免此罰戮飲酒樂趙孟出曰吾不復此矣不復見此樂二年晉侯使韓宣子來聘公享之季武子賦緜之卒章緜詩大雅卒章義取文王有四臣故能以緜緜致興盛以晉侯比文王以韓宣子比四輔韓宣子賦角弓角弓詩小雅取其兄弟婚姻無胥逺矣言兄弟之國宜相親矣季武子拜曰敢拜子之彌縫敝邑寡君有望矣彌縫猶補合也謂以兄弟之義武子賦節之卒章節詩小雅卒章取式訛爾心以畜萬邦以言晉德可以畜萬邦既享宴于季氏有嘉樹焉宣子譽之譽其好也武子曰宿敢不封殖此樹以無忘角弓封厚也殖長也遂賦甘棠甘棠詩云召伯息于甘棠之下詩人思之而愛其樹武子欲封殖嘉樹如甘棠以宣子比召公宣子曰起不堪也無以及召公宣子聘於衞衞侯享之北宮文子賦淇澳淇澳詩衞風美武公也言宣子有武公之德宣子賦木𤓰木𤓰亦衞風義取於欲厚報以為好三年鄭伯如楚子産相楚子享之賦吉日吉日詩小雅宣王田獵之詩楚王欲與鄭伯共田故賦之既享子産乃具田備王以田江南之夢楚之雲夢跨江南北六年夏季孫宿如晉拜莒田也謝前年受牟夷田不見討晉侯享之有加籩籩豆之數多於常禮武子退使行人告曰小國之事大國也茍免於討不敢求貺貺賜也得貺不過三獻周禮大夫三獻今豆有加下臣弗堪無乃戾也懼以不堪為罪韓宣子曰寡君以為驩也以加禮致驩心對曰寡君猶未敢未敢當此加也况下臣君之𨽻也敢聞加貺固請徹加而後卒事晉人以為知禮重其好貨宴好之貨七年三月公如楚楚子享公於新臺章華臺也使長鬛者相鬛鬚也欲先夸魯侯好以大屈宴好之賜大屈弓名十二年夏宋華定來聘通嗣君也宋元公新即位公享之為賦蓼蕭弗知不答賦蓼蕭詩小雅義取燕笑語兮是以有譽處兮樂與華定燕語也又曰既見君子為龍為光欲以寵光賓也又曰宜兄宜弟令德壽凱言賓有令德可以壽樂也又曰和鸞雍雍萬福攸同言欲與賓同福祿也昭子曰必亡宴語之不懐懐思也寵光之不宣宣揚也令德之不知同福之不受将何以在齊侯衞侯鄭伯如晉朝嗣君也晉昭公新立公如晉晉辭公公子憖遂如晉憖魯大夫如晉不書還不復命而奔故史不書於䇿晉侯享諸侯子産相鄭伯辭於享請免䘮而後聽命簡公未𦵏晉人許之禮也善晉不奪孝子之情晉侯以齊侯宴中行穆子相穆子荀吳投壺晉侯先穆子曰有酒如淮有肉如坻淮水名坻山名寡君中此為諸侯師中之齊侯舉矢曰有酒如澠有肉如陵澠水出齊國臨淄縣北入時水陵大阜也寡人中此與君代興代更也亦中之伯瑕謂穆子伯瑕士文伯曰子失辭吾固師諸侯矣壺何為焉其以中雋也言投壺中不足為雋異齊侯弱吾君歸弗來矣欲與晉君代興是弱之穆子曰吾軍帥彊禦卒乘競勸今猶古也齊将何事言晉德不衰於古齊不事晉将無所事公孫傁趣進曰日旰君勤可以出矣以齊侯出傁齊大夫傳言晉之衰十六年三月晉韓起聘於鄭鄭伯享之子産戒曰茍有位於朝無有不共恪孔張後至立於客間孔張子孔之孫執政禦之執政掌位者禦止也適客後又禦之適縣間縣樂肆客從而笑之事畢富子諌富子鄭大夫諌子産也曰夫大國之人不可不慎也幾為之笑而不陵我言數見笑則心陵侮我我皆有禮夫猶鄙我鄙賤也國而無禮何以求榮孔張失位吾子之耻也子産怒曰發命之不𠂻𠂻當也出令之不信刑之頗類緣事類以成偏頗獄之放紛放縱也紛亂也㑹朝之不敬謂國無禮敬之心使命之不聽下不從上命取陵於大國罷民而無功罪及而弗知僑之耻也孔張君之昆孫子孔之後也昆兄也子孔鄭襄公兄孔張之祖父執政之嗣也子孔嘗執鄭國之政為嗣大夫承命以使周於諸侯國人所尊諸侯所知立於朝而祀於家卿得自立廟於家有祿於國受祿邑有賦於軍軍出卿賦百乘喪祭有職有所主受脤歸脤受脤謂君祭以肉賜大夫歸脤謂大夫祭歸肉於公皆社之戎祭也其祭在廟已有著位在位數世世守其業而忘其所僑焉得耻之其祭在廟謂助君祭辟邪之人而皆及執政是先王無刑罰也言為過謬者自應用刑罰子寧以他規我規正也十七年春小邾穆公來朝公與之燕季平子賦采菽采菽詩小雅取其君子來朝何錫與之以穆公喻君子穆公賦菁菁者莪菁菁取其既見君子樂且有儀以答采菽昭子曰不有以國其能乆乎嘉其能答賦言其賢故能乆有國秋郯子來朝公與之宴二十五年春叔孫婼聘於宋宋公享昭子賦新宮逸詩昭子賦車轄詩小雅周人思得賢女以配君子昭子将為季孫迎宋公女故賦之明日宴飲酒樂宋公使昭子右坐坐宋公右以相近言改禮坐語相泣也樂祁佐助宴禮退而告人曰今兹君與叔孫其皆死乎吾聞之哀樂可樂而哀而樂哀可哀而樂皆䘮心也心之精爽是謂魄魂魂魄去之何以能久此冬叔孫宋公卒定公十四年叔孫武叔聘于齊齊侯享之册府元龜卷二百四十三
