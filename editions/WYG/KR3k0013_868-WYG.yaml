body:
  text: 冊府元龜卷八百六十八宋王欽若等撰總録部遊宴餞别好客遊宴夫有負藉甚之才抱夷曠之性居軒冕之貴不以嬰懷顧簿領之繁嘗多暇日或締交接坐或羣從侍遊偶四序之良辰爲一時之勝賞吹臺琴室月觀風亭宴衎乎園池放情於丘壑清心雅致名敎存焉楚公子圍爲令尹魯昭公元年諸侯盟於虢公子圍享趙孟賦大明之首章大明詩大雅首章言文王明明昭於下故能赫赫盛於上令尹意在首章故特稱首章以自光大趙孟賦小菀之二章小菀詩小雅二章取其各敬爾儀天命不又言天命一去不可復還以戒令尹晉山簡爲征南將軍都督荆襄交廣四州諸軍事簡優游卒歲惟酒是耽諸習氏荆土豪族有佳園池簡每出嬉遊多之池上置酒輒醉名之曰高陽池羊祜爲征南大將軍樂山水每風景必造峴山置酒言詠嘗謂從事中郎鄒湛等曰自有宇宙便有此山由來賢達勝士登此遠望如我與卿者多矣謝安初辟司徒府除佐著作郎並以疾辭寓居㑹稽與王羲之及高陽許詢桑門支遁游處出則漁弋山水入則言詠屬文雖放情丘壑然每游賞必以妓女從游後爲太保進督揚江荆司十五州軍事於土山營墅樓館林竹甚盛每擕中外子姪往來游集肴饌亦屢費百金王羲之爲㑹稽内史去官居㑹稽嘗與同志宴集於㑹稽山隂之蘭亭羲之自爲之序以申其志或以潘岳金谷詩序方其文羲之比於石崇聞而甚喜孟嘉爲征西桓溫叅軍溫甚重之九月九日溫宴龍山寮佐畢集時佐吏並著戎服有風至吹嘉帽墜落嘉不之覺溫使左右勿言欲觀其舉止嘉未久如厠溫令取還之命孫盛作文嘲嘉著坐處嘉還見即答之其文甚羙四座嗟嘆宋徐湛之爲南兖州刺史善於爲政威惠並行廣陵城舊有高樓湛之更加修整南望鍾山城北有陂澤水物豐盛湛之更起風亭月觀吹臺琴室果竹繁茂花藥成行招集文士盡游玩之適一時之盛也謝混字叔源厯中書令領軍尚書左僕射風格高峻少所交納惟與族子靈運瞻䀲矅𢎞微並以文義賞㑹嘗共宴處居在烏衣巷故謂之烏衣之游混五言詩所云昔爲烏衣遊戚戚皆親姪者也其外雖復高流時譽莫敢造門梁羊侃爲大軍司高祖大同中魏使陽裴與侃在北嘗同學有詔令侃延裴同宴賔客三百餘人食器皆金玉雜寶奏三部女樂至夕侃不飲酒而好賔客交遊終日獻酬同其醉醒蕭介字茂鏡釋褐著作佐郎性高簡少交游惟與族兄琛從兄眎素及洽從弟淑等文酒賞㑹時人以比謝氏烏衣之遊任昉爲御史中丞簮裾輻凑預共宴者殷芸到溉劉苞劉孺劉顯劉孝綽及陸倕而已號曰龍門之游雖貴公子孫不得預也陳孫瑒授散騎常侍出鎮郢州乃合十餘船爲大舫於中立亭池植荷芰每良辰羙景賔僚並集泛長江而置酒亦一時之勝賞焉徐伯陽爲侯安都司空叅軍宣帝大建初與中記室李爽記室張正見尚書郎賀徹學士阮卓黄門蕭銓三公郎王由禮處士馬樞記室祖登比部賀循長史劉刪等爲文㑹之友後有蔡凝劉助陳暄孔範亦預焉皆一時之士也游宴賦詩勒成卷軸伯陽爲其集序盛傳於世後魏梁祐爲太中大夫從容風雅好爲詩詠嘗與朝廷名賢泛舟雒水以詩酒自娯唐楊師道爲侍中退朝後必引當時英俊宴集園池而文會之盛當時莫比郭子儀鎮河中代宗大厯二年二月子儀入朝宰臣元載王縉及左僕射裴冕户部侍郎判度支第五琦京兆尹劉幹共出錢三十萬宴子儀於其私第内侍魚朝恩參其㑹焉朝恩出錦二十疋綵羅五十疋綵綾一百疋爲子儀纒頭之費極歡而罷杜佑爲司徒置第於安仁里及城南創别墅日公卿宴游廣陳妓樂杜式方佑之子也以䕃授揚府叅軍入爲太常寺主簿父作鎮揚州家財鉅萬甲第安仁里杜城有别墅亭館林池爲城南之最昆仲皆在朝廷與時賢游從樂而有節元稹爲越州刺史浙東觀察使會稽佳山水稹所辟幕職皆當時文士而鏡湖秦望之游月三四焉而諷詠詩什動盈卷袠副使竇鞏海内詩名與稹酬唱最多至今稱蘭亭絶唱晉盧詹高祖天福初拜禮部尚書分司雒下與右僕射盧質散騎常侍盧重俱在西都數相過從三人俱嗜酒好游山水塔廟林亭花竹之地無不同往酣飲爲樂人無間然雒中朝士目爲三盧會餞别夫祖離送别必在於有情登山臨水實生於遠思若乃膺受封之寵持式玉之命成師以出上受而歸則有都邑盡傾車蓋千乗賦詩以見志贈言以表誠簡册已來風流相接其或懷去國之戚有永訣之懼莫不慷慨悲歎畱連燕胥自非達者豈能忘情於此際者哉周顯父餞送韓侯故大雅韓奕之詩曰韓侯出祖出宿於屠顯父餞之清酒百壺屠地名也顯父有顯德者也祖將去而餞之也既覲而反國必祖者尊其所往去則始行焉祖於國外畢乃出宿示行不畱於是也其餚維何炰鼈鮮魚其􅉡維何維筍及蒲其贈維何乗馬路車炰鼈以火熟之鮮魚中鱠者也筍竹萌也蒲深蒲也贈送也王既使顯父餞之使送以車馬所以贈厚意也人君之車曰路車所以駕之馬曰乗馬籩豆有且侯氏燕胥且多也胥相也諸侯相在京師未去者顯父餞之時皆來相與燕其籩豆且然榮其多也伍舉爲楚大夫自楚奔鄭將遂奔晉聲子將如晉遇之於鄭郊班荆相與食而言復故班布也布荆坐也共議歸楚事聲子曰子行也吾必復子韓起爲晉大夫聘於鄭六卿餞宣子於郊餞送行飲酒宣子曰二三君子請皆賦起亦以知鄭志詩言志也子齧賦野有蔓草子齧子皮之子嬰齊也野有蔓草鄭風取其邂逅相遇適我願兮宣子曰孺子善哉吾有望矣君子相願已所望也子產賦鄭之羔裘言鄭别於唐羔裘也取其彼其之子舍命不渝邦之彦兮以羙韓子宣子曰起不堪也不堪國之子太叔賦褰裳褰裳詩曰子惠思我褰裳涉溱子不我思豈無他人言宣子思已將有褰裳之志如不我思而豈無他人宣子曰起在此敢勤子至於他人乎言已崇好在此不欲復令求他人子太叔拜謝宣子之有鄭宣子曰善哉子之言是是褰裳不有是事其能終乎韓起不欲令鄭求他人子太叔拜以答之所以晉鄭終善子游賦風雨子游子駟之子駟偃也風雨詩取其既見君子云胡不夷子旗賦有女同車子旗公孫段之子豐施也有女同車取其洵羙且都愛樂宣子之志子栁賦蘀兮子栁印段之子印祭也蘀兮詩取其倡予和女言宣子倡已將和從之宣子喜曰鄭其庶乎庶幾興盛二三君子以君命貺起賦不出鄭志六詩皆鄭風故曰不出鄭志皆昵燕好也昵親也賦不出其國以示親好二三君子數世之主也可以無懼矣宣子皆獻馬焉而賦我將我將詩頌取其日靖四方我其夙夜畏天之威言志在靖亂畏懼天威子産拜使五卿皆拜曰吾子靖亂敢不拜徳荆軻衛人初燕太子丹質於秦秦王遇丹不善故丹怨而亡歸因結交於荆軻爲報秦王太子及賓客送之至易水之上既祖取道高漸離擊筑荆軻和而歌爲變徴之聲士皆垂淚涕泣又前而爲歌曰風蕭蕭兮易水寒壯士一去兮不復還復爲羽聲慷慨士皆瞋目髪盡上指冠於是荆軻就車而去漢東郭先生武帝時久待詔公車貧困及其拜爲二千石佩青緺音爪一音螺青綬出宫門行謝主人故所以同官待詔者等比祖道於都門外榮華道路立名當世東郭先生也此所謂衣褐懷寶者也李廣利爲貳師將軍擊匈奴丞相劉屈氂爲祖道送渭橋與廣利别疏廣東海蘭陵人也宣帝時爲太子太傅兄子受爲少傅在位五歲乃與受移病滿三月賜告廣遂稱篤上疏乞骸骨帝以其年篤老皆許之公卿大夫故人邑子設祖道供帳東都門外送者車數百兩辭決而去及道路觀者皆曰賢哉二大夫或歎息爲之下泣後漢陳遵爲大司馬更始時使匈奴過辭於王丹丹曰俱遭反覆惟我二人爲天所遺今子當之絶域無以相贈贈子以不拜遂揖而别遵甚悦之高彪爲中郎較書東觀時京兆第五永爲督軍御史使督幽州百官大會祖餞於長樂觀議郎蔡邕等皆賦詩彪乃獨作箴曰文武將墜乃俾俊臣整我皇綱董此不䖍古之君子即戎㤀身明其果毅上其桓桓吕尚七十氣冠三軍詩人作歌如鷹如鸇天有太乙五將三門地有九變邱陵山川人有計䇿六竒五間總兹三事謀則諮詢無曰已能務在求賢淮隂之勇廣野是尊周公大聖石碏純臣以威克愛以義滅親勿謂時儉不正其身勿謂無人莫識已真忘富遺貴福禄乃存枉道依合復無所親先公高節越可永遵佩藏斯戒以勵終身邕等甚羙其文以爲莫尚也後彪爲中郎較書於東觀及遷内黄令帝勑同僚臨送祖於上東門郭泰字林宗游於雒陽始見河南尹李膺大竒之遂相友善於是名震京師後歸鄉里衣冠諸儒送至河上車數千兩林宗惟與李膺同舟而濟衆賓望之以爲神仙焉泰後舉有道不就禰衡平原般人也爲曹公所怒遣人騎送之劉表臨發衆人爲之祖道先供設於城南乃更相戒曰禰衡悖虐無禮今因其後到咸當以不起折之也及衡至衆人莫肯興衡坐而大號衆問其故衡曰坐者爲冡臥者爲屍冡屍之間能不悲乎魏管輅與諸葛原别原戒以二事言卿惟樂酒量雖溫克然不可保寧當節之卿有氷鏡之才所見者妙祻如膏火不可不慎持卿叡才以游於雲漢之間不憂不富貴也輅言酒不可極才不可盡吾欲持酒以禮持才以愚何患之有耶輅至少府丞蜀張裔字君嗣爲丞相諸葛亮畱府長史詣亮咨事送者數百車乗盈路裔書與所親曰人自敬丞相長史男子張君嗣附之疲倦欲死晉賈充爲車騎將軍都督秦涼二州諸軍事鎮關中將之鎮百僚餞於夕陽亭石崇爲征虜將軍假節監徐州諸軍事鎮下邳崇有别館在河陽之金谷一名梓澤送者傾都帳飲於此焉王澄爲荆州刺史將之鎮送者傾朝溫嶠爲王敦左司馬會丹陽尹缺敦表補嶠爲之因敦餞别嶠起行酒至錢鳯前因僞醉以手版擊鳯幘墜敦以爲醉而釋之臨去言别涕泗横流出閣復入如是再三然後即路桓溫太和中悉衆北伐平北將軍郗愔以疾解職又以温領平北將軍徐兖二州刺史率弟南中郎沖西中郎袁真步騎五萬北征百官皆於南州祖道都邑盡傾殷浩爲中軍將軍廢徙東陽委命談詠雖家人不見其有流放之戚甥韓伯浩素賞愛之隨至徙所經歲還都浩送至渚側詠顔曹遠詩云富貴他人合貧賤親戚離殷仲文爲桓𤣥諮議叅軍將遷姑熟送者傾朝宋何尚之字彦德爲吏部郎告休定省傾朝廷送别别於治渚及至郡父叔度謂曰聞汝來此傾朝相送可有幾客答曰殆數百人叔度笑曰此是送吏部郎耳非闗何彦德也昔殷浩亦嘗作豫章定省送者甚衆及廢徙東陽船泊征虜亭積日乃至親舊無復相窺者沈懷文爲殿中郎時隱士雷次宗被徴居鍾山後南還盧岳何尚之設祖道文義之士畢集連句爲詩懷文所作猶羙南齊張融出爲封溪令從叔永出後渚送之曰似聞朝旨汝尋當還融曰不患不還正恐還而復去梁陶𢎞景初仕齊爲奉朝請永明十年上表辭禄詔許之賜以束帛及發公卿祖之於征虜亭供帳甚盛車馬填咽咸云宋齊已來未有朝野榮之唐賀知章爲散騎常侍請度爲道士求還鄉里皇太子已下咸就執别哥舒翰爲太子少保安禄山反以爲皇太子先鋒兵馬副元帥拒賊於潼闗百僚出餞於郊好客自戰國之世四豪競逐莫不傾意下士以致千里之客繇是方來之賓入者悦出者譽而光名滿於天下矣漢氏之後游談滋甚乃有虚懷曲意翹思延竚孜孜以欵接區區而忘勢以至門無停輪坐無空席漿酒藿肉撞鐘舞女以極其宴喜從車飛蓋名園别墅以縱乎游娯騁文翰以爲適資氣俠以自任斯固倜儻磊落夸邁流俗者之所爲也若乃羣居之談不能及義踰侈之咎見譏於時此又不足尚已田文齊公子封爲孟嘗君在薛招致賓客及亡人有罪者皆歸孟嘗君孟嘗君舍業厚遇之以故傾天下之士食客數千人無貴賤一與文等孟嘗君待客坐語而屏風後常侍史主記君所與客語問親戚居處客去孟嘗君已使使存問獻遺其親戚孟嘗君曽待客夜食有一人蔽火光客怒以爲飯不等辭去孟嘗君起自持其飯比之客慚自刎士以此多歸孟嘗君客無所擇皆善遇之人人各自以爲孟嘗君親已趙勝趙公子也封爲平原君諸子中勝最賢喜賔客賔客蓋至者數千人信陵君無忌魏昭王少子魏安釐王異母弟也昭王薨安釐王即位封公子爲信陵君公子爲人仁而下士士無賢不肖皆謙而禮交之不敢以其富貴驕士士以此皆方數千里爭往歸之致食客三千人當是時諸侯以公子賢多客不敢加兵謀魏春申君黄歇爲楚相時是時齊有孟嘗君趙有平原君魏有信陵君方爭下士招致賔客以相傾奪輔國持權當是時楚復强趙平原君使人於春申君春申君舍之上舍趙使欲誇楚爲玳瑁簮刀劔室以珠玉飾之請命春申君客春申君客三千餘人其上客皆躡珠履以見趙使大慙呂不韋爲秦相國是時魏有信陵君楚有春申君趙有平原君齊有孟嘗君皆下士喜賔客以相傾不韋亦招致士厚遇之至食客三千人漢陳豨爲列侯以趙相國將監趙代邉豨少時慕魏公子及守邊招致賔客嘗告歸過趙因休沐之暇而過趙賔客隨之者千餘乗邯鄲客舍皆滿豨所以待賔客如布衣交皆出客下鄭當時孝景時爲太子舍人每五日洗沐嘗置驛馬長安諸郊邑外謂之郊近郊二十里請謝賔客夜以繼日至明旦嘗恐不徧後爲大司農當時爲大吏戒門下客至無貴賤無畱門者執賓主之禮以其貴下人陳遵爲校尉擊賊趙朋霍鴻有功封嘉威侯居長安中牧守當之官及郡國豪傑至京師者莫不相因到遵門遵嗜酒每大飲賓客滿堂輒闗門取客車轄投之井中雖有急終不得去後漢崔瑗爲濟北相愛士好賔客盛修肴饌殫極滋味或言其大奢瑗聞之怒敕妻子曰吾并日而食以供賔客而反以獲譏士大夫不足養如此後勿過菜具無爲諸子唐􅃖也終不能改奉禄盡以賔享也來豔少好學下士開館養徒位至司空皇甫嵩折節下士門無畱客言汲引之速時人皆稱而附之嵩至太常袁紹有姿貌威容愛士養名英雄紀曰紹不妄通賓客非海内知名不得相見又好游俠與張孟卓何伯求吳子卿許子遠皆爲奔走之友既累世台司賔客所歸加傾心折節莫不爭赴其庭士無貴賤與之抗禮輜軿柴轂填接街陌内官皆惡之自袁安已下皆博愛容衆無所揀擇賔客入其門無賢愚皆得所欲爲天下所歸官至太尉大將軍孔融爲大中大夫容衆少忌好士喜誘掖後進及退閒職大中大夫職在言議故爲閒職賔客日盈其門嘗歎曰坐上客常滿罇中酒不空吾無憂矣魏曹純敬愛學士學士多歸焉繇是爲逺近所稱年十八爲黄門侍郎呉諸葛融瑾次子也瑾卒融襲爵攝兵業駐公安秋冬則射獵講武春夏則延賔交㑹休吏假卒或不遠千里而造焉每會輒厯問賔客各言其能乃合榻促席量敵選對或有博奕或有摴蒲投壺弓彈部别類分於是丼果繼進清酒徐行融周流觀覽終日不倦後爲奮威將軍顧邵字孝則好樂人倫自州郡庶職及四方人士往來相見或言議而去或結厚而别風聲流聞逺近稱之權妻以䇿女年二十七起家爲豫章太守晉陶侃爲荆州刺史未嘗壅滯接引疎逺門無停客宋劉穆之初爲高祖軍府主簿愛好賔游坐客常滿性奢豪食必方丈旦輒爲十人饌穆之既好賔客未嘗獨飱每至食時客止十人已還者依常下食以此爲常白高祖曰穆之家本貧賤贍生多缺自叨忝以來每存約損而朝夕所須微有過豐自此以外一毫不以負公蔡􅄼南陽冠軍人也家素富而􅄼兄􅈰善接待賔客至無多少皆資給之嘗爲郡縣所優異蠲其調役南齊王寂字子𤣥侍中僧䖍之子性迅動好文章王融之敗後賔客多歸之位至祕書郎卒梁任昉爲御史中丞好交結奬進士友得其延譽者率多升擢故衣冠貴游莫不爭與交好坐上賔客恒有數十時人慕之號曰任君言如漢之三君也庾􅗥少聰慧家富於財好賔客食必列鼎卒於家羊侃爲都官尚書性不飲酒而好賔客交游終日獻酬同其醉醒陳魯廣達呉州刺史悉達弟也虚心愛士賔客多自遠而至終於中領軍孫瑒爲右軍將軍其自居處頗失於奢豪庭院穿築極林泉之致歌鐘舞女當世罕儔賔客填門軒蓋不絶後魏源懷爲車騎大將軍性不飲酒而喜以酒飲人好接賔友子雍字靈和推誠待士士多歸之鄭伯猷爲太學博士領殿中御史與當時名勝咸申游欵夏侯道遷豫州刺史頻表解州於京城之西水次市地大起園池殖列蔬果延致秀彦時往游適妓妾十餘嘗自娯樂國秩歲入三千餘疋專供酒饌不營家産每誦孔融詩曰坐上客常滿罇中酒不空餘非吾事也識者多之馮元興家素貧約食客嘗數十人同其饑飽曽無恡色時人歎尚之位至中書舍人北齊段孝言爲侍中丞僕射雖黷貨無厭恣情酒色然舉止風流招致名士羙景良辰未嘗虚棄賦詩奏妓畢盡歡洽雖草萊之士粗闗文藝多引入賔館與同興賞其貧躓者亦時有乞遺世論復以此多之韓晉明軌之子也天統中封東萊王晉明有俠氣諸勲貴子孫中最畱心學問好酒誕縱招引賔客一席之費動至萬錢猶恨儉嗇朝廷欲處之貴要地必以疾辭告人曰廢人飲羙酒對名勝安能作刀筆及披故紙乎鄭述祖爲太子少師兖州刺史所在好爲山池松竹交植盛餚饌以待賔客將迎不倦邢邵性好談賞不能閑獨公事歸休常須賔客自伴官至太常卿中書監後周司馬消難子如之子初在齊子如當朝消難亦愛賔客邢子才王元景魏收陸卬崔詹等皆遊其門仕至車騎將軍長孫澄爲大將軍雅好賔客接引忘疲雖不飲酒而好觀人酣興嘗恐座客請歸每勑中厨别進異饌畱之裴漢性不飲酒而雅好賔游每良辰羙景必招引時彦宴賞畱連間以篇什當時人物以此重之隋庾季才爲大中大夫志好宴游嘗吉日良辰與瑯琊王褒彭城劉榖河東裴政及宗人信等爲文酒之會次有劉臻明克讓栁誓之徒雖爲後進亦申游欵蘓䕫少有盛名於天下引致賔客四海士大夫多歸之官至通議大夫楊𤣥感爲禮部尚書性雖驕倨而愛重文學四海知名之士多趨其門唐李百藥爲宗正卿好招延賔友罇酒常不空唐憲武德初拜太子右虞侯率後厯散騎常侍雲麾將軍銀青光禄大夫既無他職事居多間逸與親戚故人酣暢以此自適焉楊師道爲侍中退朝之後必宴集園池預在賔筵皆屬文之士歌童舞女縱以歡娛趙景慈天水隴西人也父訥隋番州總管景慈㓜有姿儀羙風調高祖濳龍時見而悦之妻以桂楊公主及長有文武才幹好交結座客常滿接對㤀疲弱冠得羙名於京邑高祖於諸聓中特所親愛位至華州刺史李安期爲黄門侍郎好接引隱淪之士及當時名僧道士無不與之爲布衣之交焉後唐王思同爲同州節度使未幾移鎮隴右思同好文士無賢不肖必館接賄遺數千萬晉李從昶爲左龍武統軍性好談笑喜接賔客文翰爲賞無虚日周和矩太子太傅凝之父性嗜酒少拘禮節雖素不知書見文士未嘗有慢色必罄家財以延接翟光鄴家無餘財賔朋至則貰酒延之談笑終日畧無倦厭士大夫多歸之官至宣徽使兼樞密使册府元龜卷八百六十八
