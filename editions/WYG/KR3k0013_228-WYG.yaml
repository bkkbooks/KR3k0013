body:
  text: 册府元龜卷二百二十八宋王欽若等撰僣偽部崇儒務農好文禮士崇儒夫設庠序之教振洙泗之風有國者所以化民成俗也自晉室板蕩群雄競起跨州連縣僣竊大號而或崇尚儒術建設學校眀飲射之禮旌鴻碩之才亦區區之至也前趙劉曜既僣即皇帝位立太學於長樂宫東小學於未央宫西簡百姓年二十五已下十三已上神志可教者千五百人選朝賢宿儒眀經篤學以教之以中書監劉均領國子祭酒置崇文祭酒秩次國子散騎侍郎董景道以眀經擢為崇文祭酒以游子逺為大司徒又嘗臨太學引試學生之上第者拜郎中後趙石勒初為征東大將軍幽州牧立太學簡眀經善書史署為文學掾選將佐子弟三百人教之及為趙王増置宣文宣教崇儒崇訓十餘小學于襄國四門簡將佐豪右子弟百餘人以教之且備擊柝之衛又親臨大小學考諸學生經義尤髙者賞帛有差既僣帝位命郡國立學官毎郡置博士祭酒二人弟子百五十人三考修成顯升台府於是擢拜太學生五人為佐著作郎録述時事石季龍僣稱大趙天王下書令諸郡國立五經博士初勒置大小學博士至是復置國子博士助教季龍昏虐無道頗慕經學遣國子博士詣雒陽寫石經校中經于祕書國子祭酒聶熊注榖梁春秋列于學官前燕慕容廆初為大單于昌黎公以平原劉讃儒學該通引為東庠祭酒其世子皝率國胄束修受業焉廆覽政之暇親臨聽之於是路有頌聲禮讓興矣慕容皝既為燕王賜其大臣子弟為官學生者號髙門生立東庠于舊宫以行鄉射之禮毎月臨觀考試優劣皝雅好文籍勤於講授學徒甚盛至千餘人著典誡十五篇以教胄子又親臨東庠考試學生其經通秀異者擢充近侍慕容雋僣即皇帝位立小學于顯賢里以教胄子前秦符堅既僣皇帝位立學校廣修學宫召郡國學生通一經以上充之公卿以下子孫並遣受業其有學為通儒才堪幹事清修亷直孝弟力田者皆旌表之於是人思勸厲號稱多士又親臨太學考諸生經義優劣品而第之問難五經博士多不能對堅謂博士王寔曰朕一月三臨太學黜陟幽眀躬親奨勵罔敢勌違庶幾周孔㣲言不由朕而墜漢之二武其可追乎寔對曰自劉石擾覆華畿二都鞠為茂草儒生罕有或存墳籍滅而莫紀經淪學廢奄若秦皇陛下神武撥亂道隆虞夏開庠序之美𢎞儒教之風化盛隆周垂馨千祀漢之二武焉足論哉堅自是毎月一臨太學諸生競勸焉其後臨太學考學生經義上第擢叙者八十三人自永嘉之亂庠序無聞及堅之僣頗留心儒學王猛整齊風俗政理稱舉學校漸興又令中外四禁二衛四軍長上將士皆令修學課後宫置典學立内司以授于掖庭選閽人及女𨽻有聰識者署博士以授經又行禮于辟雍祀先師孔子其太子及公卿大夫之元子皆束修釋奠焉後秦姚萇既僣即皇帝位乃立太學禮先賢之後其後破符登乃下書令留臺諸鎮各置學官勿有所廢考試優劣隨才擢叙姚興既僣帝位時天水姜龕東平淳于岐馮翊郭髙等皆耆儒碩徳經眀行修各門徒數百教授長安諸生自逺而至者萬數千人興毎於聽政之暇引龕等于東堂講論道藝錯綜名理凉州胡辨符堅之末東徙雒陽講授弟子千有餘人闗中後進多赴之請業興勑闗尉曰諸生諮訪道義修已厲身徃来出入勿拘常限於是學者咸勸儒風盛焉其後立律學于長安召郡縣散吏以授之其通眀者還之郡縣論决刑獄後蜀李雄既僣即帝位是時海内大亂而蜀獨無事故歸之者相尋雄乃興學校置史官聽覽之暇手不釋卷北燕馮䟦既僣稱天王下書曰武以平亂文以經務寜國濟俗寔所憑焉自頃䘮難禮隳樂壊閭閻絶諷誦之音後生無庠序之教子衿之歎復興于今豈所以穆章風化崇闡斯文可營建太學以長樂劉軒營丘張熾成周翟崇為博士郎中簡二千石已下子弟年十五已上教之南凉秃髪利鹿孤既僣稱西河王謂其群下曰二三君子其極言無諱吾將覽焉祠部郎中史暠對曰古之王者行師以全軍為上破軍次之拯溺救焚東征西怨今不以綏寜為先唯以徙户為務安土重遷故有離叛所以斬將尅城土不加廣今取士㧞才必先弓馬文章學藝為無用之條非所以来逺人垂不朽也孔子曰不學禮無以立宜建學校開庠序選耆徳碩儒以訓胄子利鹿孤善之於是以田𤣥冲趙誕為博士祭酒以教胄子南燕慕容徳既僣帝位建立學官簡公卿以下子弟及二品士門二百人為太學生務農夫僣竊之國疆宇尤隘武功是用兵食是資則有勸課區種引利溝瀆設官以勉之嚴罰以督之盖亦承天勢取地利勞来農事以豐年榖使國有儲峙民無流散為自固者之計矣故能抗拒征伐茍延嵗月良在兹乎至於舉王者之事竊耕耘之名斯為僣禮何足尚也前凉張駿為凉州牧以晉眀帝太寜元年親耕籍田西凉李暠稱凉州牧既遷酒泉乃敦勸稼穡群寮以年榖頻登百姓樂業請勒銘酒泉暠許之於是使儒林祭酒劉彦眀為文刻石頌徳後趙石勒為趙王元年遣使循行州郡勸課農桑其後以右常侍霍皓為勸課大夫與典農使者朱表典勸都尉陸克等廵行州郡核定户籍勸課農桑最修者賜爵五大夫及僣即帝位親耕籍田石季龍初稱大趙天王如長樂衛有田疇不闢桑業不脩者貶其守宰而還及僣即帝位親耕籍田于其桑梓苑其妻杜氏祠先蠶于近郊前燕慕容皝僣稱燕王躬廵郡縣勸課農桑以牧牛給貧家田于苑中公収其八二分入私有牛而無地者亦田苑中公収其七三分入私皝記室參軍封裕諫之皝乃令曰君以黎元為國黎元以榖為命然則農者國之本也而二千石令長不遵孟春之令惰農弗勸宜以尤不修闢者措之刑罰肅厲属城主者眀詳推檢具狀以聞苑囿悉可罷之以給百姓無田業者貧者全無資産不能自存各賜牧牛一頭若私有餘力樂取官牛墾官田者其依魏晉舊法溝洫溉灌有益官司主者量造務盡水陸之勢中州未平兵難不息勲誠既多官僚不可以减也待尅平凶醜徐更議之百工商賈數四佐與列將速定大員餘者還農學生不任訓教者亦除員録前秦符堅僣稱大秦天王課農桑又親耕籍田其妻茍氏親蠶于近郊其後又遣使廵察四方勸課農桑又以境内旱課百姓區種又以闗中水旱不時議依鄭白故事發其王侯已下及豪望富室僮𨽻二萬人開涇水上源鑿山起堤通渠引瀆以溉岡鹵之田及春而成百姓頼其利北燕馮䟦僣稱天王勵意農桑勤心政事乃下書省徭薄賦惰農者戮之力田者褒賞命尚書紀達為之條制又下書曰今海宇無虞百姓寜業而田畆荒穢有司不隨時督察欲令家給人足不亦難乎桑柘之益有生之本此土少桑人未見其利可令百姓植桑一百根柘二十根北凉沮渠䝉遜稱凉州牧下書曰孤以虚薄猥忝時運未能𢎞闡大猷戡蕩群孽使桃蟲皷翼東京封豕蒸渉西裔戎車屢動干戈未戢農失三時之業百姓户不粒食可户省百徭専功南畆眀設科條務盡地利好文昔十六國之君皆以晉室衰㣲拓據境土然而居禮義之鄉覩衣冠之俗積習生常遂革其性或著述詞賦或善工草𨽻延詞學之士游集於文義聚經史之言討論於典訓故先聖之言曰有教無類誠不誣哉前凉張駿十嵗能屬文張天錫少有文才流譽逺近西凉李暠少而好學通渉經史尤善文義及為凉公於南門外臨水起靖恭堂圖自古聖帝眀王忠臣孝子烈士貞女暠親為序頌以眀鑒戒之義後遷居酒泉上巳日宴于曲水命群寮賦詩而親為之序既而秃髪傉檀入據姑臧沮渠䝉遜基宇稍廣於是慨然著述志賦先是河右不生楸槐栢漆張駿之世取於秦隴而植之終而皆死而酒泉宫之西北隅有槐樹生焉暠又著槐樹賦以寄情盖歎僻陋遐方立功非所也亦命主簿梁中庸及劉彦眀等竝作又感兵難繁興時俗諠競乃著大酒容賦以表恬豁之懐前妻同郭辛納女卒暠親為之誄自題詩賦又數十篇前趙劉元海幼好學師事上黨崔游習毛詩京氏易馬氏尚書尤好春秋左氏傳孫吳兵法畧皆誦之史漢諸子無不綜覽劉聰幼而聰悟好學博士朱紀大竒之年十四究通經史兼綜百家之言孫呉兵法靡不誦之工草𨽻善屬文著述懐詩百餘篇賦頌五十餘篇劉曜讀書志於廣覽不精思章句而善屬文前秦符堅八嵗請師就學祖洪曰汝戎狄異類世知飲食今乃求學邪欣而許之及僣即位親臨太學考學生經義優劣品而第之問難五經博士多不能對符丕少而聰慧好學博綜經史後秦姚興博學善談論尤好詩詠初為偽太子與其中舎人梁喜洗馬范朂等講論不以兵難廢業時人化之又與黄門郎叚章尚書郎富允文以儒術侍講胡義周夏侯稚以文章游集及僣即位其給事黄門侍郎古成詵中書侍郎王尚尚書郎馬岱等以文章雅正參管機宻時凉州刺史王尚有罪禁南臺别駕宗敞等上表理之興謂其黄門侍郎姚文祖曰卿知宗敞乎文祖曰與臣州里西方之英雋興曰有表理王尚文義甚佳當王尚研思耳文祖曰尚在南臺禁止不與賔客交通敞寓於楊桓非尚明矣興曰若爾桓為措手乎文祖曰西方評敞甚重優於楊桓敞昔與吕超周旋陛下試可問之興因謂超曰宗敞文才何如可是誰輩超曰敞在西土時論甚美方敞魏之陳徐晉之潘陸即以表示超曰凉州小地寜有此才乎超曰臣以敞餘文比之未足稱多琳瑯出于崑嶺眀珠生于海濵若必以地求人則文命大夏之棄夫姫昌東夷之擯士但當問其文采如何不可以區宇格物興悦赦敞之罪以為尚書後蜀李雄僣偽位聽覽之暇手不釋卷李班初為偽太子引名士王嘏及隴西董融天水文䕫等以為賔友毎謂融等曰觀周景王太子晉魏太子丕吳太子孫登文章鑒識超然卓絶未嘗不有慙色何古賢之髙朗後人之莫逮也李期聰慧好學弱冠能屬文後凉吕光既破龜兹入其城大饗將士賦詩言志見其宫室壯麗命參軍京兆叚業著龜兹宫賦以譏之後燕慕容寳初為偽太子砥礪自修敦崇儒學工談論善屬文蜀王衍自童年即能屬文甚有才思尤能為豔歌或有所著蜀人皆傳誦焉禮士聘名士禮賢才盖有國之大方王者之盛徳觀夫僣號假名之主亦乃備𤣥纁之禮馳蒲版之書搜隠遯旌巖穴或任髙於義士或詢謀於全才善話是遵搆讒靡間故能専制土宇少延嵗月天未悔禍何斯言之不誣前凉張祚僣即帝位遣使者張興備禮徴宋纎為太子友纎時年八十篤學不倦興逼喻甚切纎喟然歎曰徳非莊生才非干木何敢稽停眀命遂隨興至姑臧興遣其太子秦和以執友禮造之纎稱疾不見贈遺皆不受尋遷太子太傅前趙劉元海初為左賢王時後部人陳元達少孤貧嘗躬耕兼誦書樂道行詠忻忻如也至四十不與人交通元海招之達不答及元海僣號又徴為黄門郎劉曜僣即帝位徙都長安時天水楊軻少好易長而不娶學業精㣲養徒數百曜徴拜太常軻固辭不起曜亦敬而不逼遂隠于隴山後趙石勒初為劉元海安東大將軍開府置左右長史司馬從事中郎進軍攻鉅鹿常山害二郡守將䧟冀州郡縣堡壁百餘衆至十餘萬其衣冠人物集為君子營乃引張賔為謀主始署軍功曹以刁膺張敬為股肱䕫安孔萇為爪牙支雄呼延莫王楊桃豹逯眀吳豫等為將率後以張賔為右長史大執法封濮陽侯任遇優顯寵冠當時入則格言出則歸美勒甚重之毎朝常為之正容貌簡辭令呼曰右侯而不名之勒朝莫與為比也勒謂賔曰鄴魏之舊都吾將營建慨風俗殷雜湏賢望以綏之誰可任也賔曰晉故東莱太守南陽趙彭忠亮篤敏有佐時良幹將軍若任之必能允副神規勒於是徴彭署為魏郡太守彭至入泣而辭曰臣徃策名晉室食其祿矣犬馬戀主竊不敢忘誠知晉之宗廟鞠為茂草亦猶洪川東逝徃而不還眀公應符受命可謂攀龍之會但受人之榮復事二姓臣志所不為恐亦眀公之所不許若賜臣餘年全臣一介之願者眀公大造之恵也勒黙然張賔進曰自將軍神旗所經衣冠之士靡不變節未有能以大義進退者至如此賢以將軍為髙祖自擬為四公所謂君臣相知此足成將軍不世之髙何必吏之勒大悦曰右侯之言得孤心矣於是賜安車駟馬養以卿祿辟其子眀為參軍石季龍既嗣偽位時天水楊軻隠遁劉曜徴不就居長安中季龍備𤣥纁束帛安車徴之軻以疾辭廹之乃發既見季龍不拜與語不言命舎之于永昌邑第有司以軻倨傲請從大不敬論季龍不從下書任軻所尚軻在永昌季龍毎有饋餼輙口授弟子使為表謝其文甚美覽者歎有深致冉閔既僣帝位備禮徴狄道辛謐為太常謐不食因卒前燕慕容廆初為遼東公時晉昌黎太守裴嶷與兄子開投廆廆甚悦以為長史後謂群僚曰裴長史名重中朝而降屈于此豈非天以授孤也有髙瞻者隨晉東夷校尉崔毖伐廆于棘城毖奔敗瞻隨衆降于廆廆署為將軍瞻稱疾不起廆敬其姿器慕容雋僣即偽位平范陽得太守李産歴位尚書雋敬其儒雅後與韓常俱傅東宫從太子曄入朝雋頋謂左右曰此二傅一代偉人未易繼也其見重如此慕容暐僣即帝位以安車徴上谷公孫鳳鳳初隠于昌黎之九城山至鄴見暐不言不拜衣食舉動如在九城賔客造請尠得與言數年病卒又徴平郭公孫永至鄴永見暐不拜王公已下造之皆不與言雖經隆冬盛暑端然自若一嵗餘詐狂暐送之平郭前秦符堅初鎮闗中將有大志聞華山王猛名遣吕婆樓招之一見便若平生語及廢興大事異符同契若元徳之遇孔眀也及僣即帝位遣使徴泰山張忠及至長安堅賜以衣冠忠辭曰年朽髪落不堪衣冠請以野服入覲從之及見堅謂之曰先生考槃山林研精道素獨善之美有餘兼濟之功未也故逺屈先生將任齊尚父忠辭曰昔因䘮亂避太山與鳥獸為侣以全朝夕之命屬堯舜之世思一奉聖顔年衰志謝不堪展効尚父之况非敢竊擬山棲之性情存巖岫乞還餘齒歸死岱宗堅以安車送之堅又聞平郭公孫永年餘九十將備禮徴之歎其年老路逺乃遣使者致問未至而亡堅深悼之謚曰崇虚先生後平襄陽堅素聞習鑿齒名與釋道安俱輿而致焉既見與語大悦之賜遺甚厚又以其蹇疾與諸鎮書曰昔晉氏平吳利在二陸今破漢南獲士裁一人半耳及堅為慕容所圖乃遣鴻臚郝雉徴處士王嘉于到獸山既至召於外殿與道安動静咨問之後秦姚興如三原顧謂群臣曰古人有言闗東出相闗西出將三秦饒雋異汝頴多竒士吾應天眀命跨據中原自流沙已東淮漢已北未嘗不傾已招求冀扶不逮然眀不照下弗感懸魚至於智効一官行著一善歴級而進之不使有侯門之歎卿等宜眀揚側陋助吾舉之梁喜對曰奉㫖求賢弗曽休倦未見儒亮大才王佐之器可謂世之乏賢興曰自古覇王之起也莫不將則韓吳相兼蕭鄧終不採將於徃賢求相於後哲卿自識㧞不眀求之不至柰何厚誣四海乎群臣咸悦後蜀李雄自稱益州牧既尅成都以山西范長生巖居穴處求道養志欲迎立為君而臣之長生固辭及雄稱僣成都王長生自山西乗素輿詣成都雄迎之于門執版延坐拜丞相尊曰范賢長生勸雄稱尊號雄於是僣即帝位加長生為天地大師封西山侯復其部曲不豫軍征租税一入其家南燕慕容徳僣即帝位先是封孚幼而聰敏和裕有士君子之稱慕容寳僣位累遷吏部尚書及蘭汗之簒南奔辟閭渾渾表為渤海太守徳至莒城孚出降徳曰朕平青州不以為慶喜於得卿也北凉沮渠䝉遜即西河王位平酒泉得宋繇繇初仕李歆歴位通顯䝉遜入繇室得書數千卷塩米數十斛而已乃歎曰孤不喜尅李歆欣得宋繇耳拜尚書吏部郎中委以銓衡之任䝉遜將死也以子牧犍委之冊府元龜卷二百二十八
