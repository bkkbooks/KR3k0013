body:
  text: 册府元龜卷四百三十五宋王欽若等撰將帥部獻㨗第二梁太祖開平元年五月湖南節度使馬殷奏克袁州大破淮冦畵圖以進宣示宰臣先是淮夷襲䧟洪州并有宜春袁民厭淮夷苛政且忿其屠戮而征賦煩重乃有邊界酋首潛以人情利害導湖南之兵取袁州淮夷賊冦失守舉郡皆没殺傷甚衆馬殷屯兵戍守以㨗来奏二年五月癸未朗州奪得淮賊舟船大小共四十隻斬首百餘級以㨗来告九月同州劉知俊以鄜延歸降將健十人并㨗表来獻十月己亥朔帝在陜兩浙節度使錢鏐奏於常州東洲鎮殺淮賊萬餘人生擒將校千餘人獲戰船一百二十隻三年六月戊戌兩浙節度使錢鏐奏四月十六日於蘇州大破淮賊擒獲數千人戰船數百隻噐甲二十餘萬是月丁未靈武節度使韓遜奏收復鹽州擒偽刺史李繼直以下六十二人竝處斬訖七月殿直聶榮受自軍前走馬奏收復丹州生擒賊將王行思獻于行在時同州節度使劉知俊叛八月辛酉城州刺史張敬方既定其郡又移兵尅房陵九月庚子殿直王唐福自襄州走馬以天軍勝㨗逆將李洪歸降事上聞賜唐福絹銀有加宰臣百官上表稱賀壬寅開封府虞候李繼業齎襄州都指揮使程暉奏狀以今月五日殺戮逆黨千人并生擒都指揮使傅覇已下節級共五百人收復襄州人户歸業事癸夘帝御文明殿以收復襄漢受宰臣已下稱賀四年四月葉縣鎮遏使馮徳武於蔡州西平縣界殺戮山賊擒首領張濆等七人以獻乾化元年十一月庚寅延州節度使髙萬興奏當軍都指揮使髙萬金統領兵士今月五日收鹽州偽刺史髙行存泥首來降丞相及文武百官各上表稱賀按鹽州與吐蕃党項封境互接為二境咽喉之地又有烏池鹽鹺之利唐建中初為吐蕃所䧟平其墉而去繇是銀夏寧延洎于靈武嵗以河南河東山東淮南青徐江浙等道兵士不啻四五萬分䕶其地謂之防秋貞元九年朝政稍暇乃命副元帥渾瑊總兵三萬復取其地建城壁焉自是虜塵乃清邊患遂止唐末又復失之今纔動偏師遽收襟要國之疾疣其息哉十二月延州節度使髙萬行奏領軍於邠州界蒿子谷韋家寨殺戮寧慶兩州賊軍約二千餘人并生擒都頭指揮使及奪馬噐甲等事其入奏軍將使宣召赴内殿畧對詔以銀噐綵物鍚之宰臣及文武官各奉表賀是月魏博節度上言於涇縣北戮殺鎮州王鎔兵士七千餘人奪馬二千餘匹戈甲未知其數并擒都將已下四十餘人後唐莊宗天祐十四年以契丹攻周徳威於幽州命諸將進討八月大軍入幽州翌日獻㨗于鄴十八年九月北面招討使李存審攻鎮州下之擒王徳明之子處球同惡髙蒙李翥露布以獻同光二年五月潞州招討霍彦威平潞州擒叛將楊立獻㨗以聞是年龍武大將軍夏魯竒擒梁將王彦章以獻帝壯之賞絹一千疋三年二月荆南髙季興奏收復歸䕫忠等州四年三月李紹真奏收復邢州擒賊首趙太等二十一人徇於鄴都城下皆磔於軍門是月西面行營副招討使任圜奏收復漢州擒逆賊康延孝時圜從郭崇韜平蜀延孝以利州叛欲廻刼西川圜率兵攻延孝於漢州擒之明宗天成二年九月以峽路招討西方鄴進兵殺敗荆南賊船收復忠萬䕫等州圖一面陳於通天門外俾將校觀之三年四月復州刺史周令武飛狀上言湖南大軍曽與淮南賊將王茂求等戰於道人磯茂求敗績五月癸丑湖南馬殷上言今嵗二月中殺敗淮冦二萬衆生擒將卒五百餘人内外皆賀是月壬申破定州曲陽㨗音至帝大悦謂侍臣曰王都違負天地擒之不逺因此兼破契丹也左右稱賀王都為定州節度使通契丹為叛六月己丑張延朗自定州廻押領到所獲賊將五十餘人帝御咸安門觀其獻俘七月己丑北面招討使定州刺史王晏球獻所獲戎馬一百匹甲子晏球使人馳報十九日契丹七千騎來援定州遂逆戰於唐河北敗之襲至蒲城又掩殺二千級捉馬千匹内外稱賀己巳驛騎入報二十一日又於陽州掩殺契丹四十餘里擒獲殆盡八月鎮州趙徳鈞馳騎上言今月二日於府西逢契丹敗黨數千生擒首領惕隠等五十餘人接殺皆盡契丹强盛僅三十年雄據北戎諸蕃竄伏屢為邊患漢兵嘗憚之前後戰争罕得其利是役也曲陽之敗已失千騎唐河之陣兵號七千潰散之後溝渠泛溢官軍襲殺人不暇食秋雨繼降泥濘莫進人饑馬乏難投村落所在村人持白梃􅇌之徳鈞生兵接於要路惟竒峯嶺北有棄馬潛遁脱者數十餘無噍類帝致書諭其本國皇威大振四年正月房知温攻帥子口白波砦獻㨗於行闕二月乙巳北面馳報是月三日收復定州帝大悦舉酒徧賜侍臣喜除心腹之疾賜教坊絹五百疋内臣進馬稱賀丙午百辟入賀戊申宴群臣於玉華殿樂作王晏球馳報已獲王都首級生擒契丹秃餒等二千餘人宴罷賜物加等辛酉定州獻俘馘帝御咸安樓立儀仗百官就列尚書兵部宣露布於樓前曰葢聞禍福兩途響應雖從於天道賞罰二柄憲章必在於帝王所以虞殛四㐫之徒周誅三監之類為時除害令在必行顯申旄鉞之威以勦豺狼之黨逆賊王都濫承餘緒叨據邊方當朝廷念􅃇之時冒藩翰延賞之帥曽無績効但抱姦邪國家光有萬邦寵綏諸夏累頒殊渥官兼右相之榮疊示優恩秩冠三公之貴諒兹睠命果至滿盈况去嵗駐驆夷門弔民梁苑萬乗有省方之念諸侯専述職之勤而王都乃背恵辜恩藏姦積釁不思入覲惟自偷安以至繼歴寒暄逗留川陸朝廷務從寛恕累降詔書候其悛心冀全理體殊不知兇頑益固抗拒彌堅信折簡以難招非舞干而可格而又朋連北狄狎禦王師擾我疆場負我盟誓須兹飾怒所冀夷兇乃謀帥於軍中俾恭行於天罰繇是􅆛貅雲集虎豹風馳咸搗梟巢誓平蟻宂北面招討天平軍節度使王晏球等推心許國挺志忘家皆矜摩壘之雄各騁寢皮之勇遂乃交飛矢石齊舞梯衝共指逰鼎之魚必取膏碪之肉以致徵兵調食結壘連營踰沙軼漠之戎全軍皆戮同惡齊姦之虜匹馬不廻而又舉螳臂以求生張蝟毛而自固計窮力盡且無飛走之門萬詐千妖寧免芟夷之禍是以致其醜類無所逃形既諧飲至之期爰契疇庸之典今月三日定州指揮使馬讓能已下三人先約歸降是時果於賊城之上自相殺戮王晏球等領兵士直扣曲陽門接勢而攻一合收下其逆賊王都及秃餒趂入子城斬首生擒不可勝計至於徒黨骨肉略無孑遺今則獻俘行闕懸首藁街六師盡敵而凱旋一境復安於生聚王晏球等已下從上行賞表不踰時或跨鎮分封官居極品或䨇旌大斾寵寄十連著銘鍾鏤鼎之榮顯傳子示孫之業於戲違天逆道鬼瞰神誅顧斯盪定之勲實快華夷之意可期康樂以泰黎元申號令於市朝明征伐之有謂布告天下咸使聞知刑部侍郎張文寳奏曰逆賊王都首級請付所司大理卿蕭希甫受之以出獻於郊社畢於街市號令王都男四人弟一人秃餒父子二人竝磔於開府橋文武百官稱賀於樓前長興元年三月靈武節度使康福奏攻取保静鎮賊首李正賔并其黨與盡誅之是年河中軍校楊彦温逐其帥皇子重琦四月河中行營都部署索自通奏今月十八日收復河中斬楊彦温傳首來獻帝御殿受賀壬戌冀州奏殺敗蕃賊於城中見輿棺者訊其降者云戚城之戰上將金頭玉中流矢而死此其櫬也八月太原節度使奏代州刺史白文琦破契丹於七里峰斬首千餘級生擒將校七千餘人二年二月符州防禦使折從阮奏部領兵士攻圍契丹勝州降之見進兵趨朔州三月易州刺史安審約奏二月三日夜差壯丁斫虜營殺賊千餘人又奏郎山砦將孫方簡破契丹千餘人斬蕃將諧里相公虜其妻以獻又杜重威以大軍攻秦州刺史晉廷謙以州降獲守城兵士三百八十九人朝廷稱賀又奏收復蒲城獲契丹首領没刺相公及守城兵士一千九百六十四人又奏收復遂城縣守城契丹留六十三人首領餘竝殺之四月内班張嶼北面軍前廻進呈收奪得契丹王金盂子龍鳳旗李守貞又進奪得契丹王奚車白駝掌羽旗槍等䕶聖散都頭辛進進納奪得契丹王紅羅蹙金銀線装玉鞍轡一副賜絹五十疋葢盌一口三年八月李守貞奏大軍至望都縣相次至長城北遇虜冦千餘騎轉鬬四十里斬蕃將解里相公是月靈武馮鐸奏與威州刺史藥元福於威州土橋西一百里遇吐蕃七千餘人大破之斬首千餘級張彦澤奏破蕃賊於定州界斬虜首二千餘級追襲百餘里生擒蕃將四人摘得金耳環二副進呈癸夘太原奏破契丹於陽武谷殺七千餘人漢隠帝乾祐元年二月右衛大將軍王景崇奏於大散闗大敗蜀軍俘斬三千人初北虜犯京師侯益趙贊皆受虜命節制岐蒲聞髙祖入雒頗懐反仄朝廷移贊於京兆益與贊皆求援於蜀蜀遣何建率軍出大散闗以應之至是景崇紏合岐雍邠涇之師以破之又遣人送所獲偽蜀將校軍士四百三十八人至闕下詔釋之仍各賜衣服九月鳳翔都部署趙暉奏大破川軍於大散闗殺三千餘人其餘棄甲而遁是月永興行營都部署郭從義奏今月十四日鳳翔王景崇兵士離本城尋遣監軍李彦從率兵追襲至法門寺西殺戮二千餘人趙暉又奏破王景崇賊軍於鳳翔城下二年正月河中府軍前奏今月四日夜賊軍偷斫入西寨捕斬七百餘級時蜀軍自大散闗來援王景崇周太祖自將兵赴岐下將行戒白文琦劉詞等曰賊之驍勇竝在城西慎為儆備既行至華州聞川軍敗退且憂文琦等為賊奔突遂兼程而廻賊内俱知周太祖西行夜遣賊將王三鐵等率驍勇千餘人㳂流南行坎岸而登為三道來攻賊軍已入王師砦中劉詞極力拒之短兵既接遽敗之三月徐州廵簡使成徳欽奏至峒峿鎮遇淮賊破之殺五百人生擒一百二十人五月湖南奏蠻冦賀州遣大將徐進率兵援之戰於鳳陽山下大敗蠻獠斬首五千級七月永興都部署郭從義奏新除華州留後趙思綰三月三日授華州留後准詔赴任三移行期仍要鎧甲以給牙兵及與之竟不遵路至九日適有部曲曹彦進告思綰欲於十一日夜與同惡五百人奔南山入蜀是日詰旦再促上路云候夜進塗臣等與王峻入城分兵守四門其趙思綰部下軍各已執帶遂至牙署令召思綰至則執之與一行徒黨竝處置訖是月西面行營都部署露布獻河中府所獲逆賊李守貞首級并俘馘等帝明徳門樓受俘群臣列班於位稱賀而退三年春正月鳳翔行營都部署趙暉奏前月二十四日收鳳翔逆賊王景崇舉家自燔而死請供奉官張銖押逆賊王景崇首級并同惡周璨至闕下獻俘馘命狥於六街磔於兩市周太祖廣順元年二月隰州刺史許遷上言河東賊軍侵我今月十一日遣歩軍都指揮使孫繼業等領兵三百至州北長夀村掩殺獲賊砦將程筠軍使冐千王仁原供奉官李演竝駝馬等所獲賊將校竝斬之不數日賊引軍攻城四面齊進臣與判官李昉都指揮使趙太糧料使王光裔官員職掌百姓守把拒闘焚賊攻具死者五百餘傷者千餘信宿遁去詔曰兇狂烏合來犯軍城醜類蜂屯罔識天命汝誓平國蠧固彼人心率驍銳以前衝履鋒鋩而直進機籌神助部伍風生偽將活擒殘妖碎首心堅鐡石城固金湯蛇豕既殱梯衝竝爇孽豎偷生而遁迹雄師賈勇以追奔言念忠貞夐無倫比嘉賞愧歎再三不忘時劉崇以朝廷初定徐方用兵遣子均領兵出隂地闗侵晉隰以觀人心至是挫衂而退窺覬之意稍息矣是月安平兵馬監押馬彦珣言契丹入冦出兵掩襲奪下老㓜人口并牛馬各付其家三月徐州行營都部署王彦超遣供奉都知孫仁安馳奏收復徐州賜仁安錦袍銀帶絹百疋銀器五十兩甲戌羣臣詣廣政殿稱賀其月己夘潞州常思奏差人部送渉縣陣所捉到之賊將校長行共二百六十五人馬三十四匹赴闕廻詔曰卿摧敵有方執俘甚衆據兹惡黨固有常刑但念彼之賊軍悉是朕之赤子遭罹兇暴廹脅征行以至就擒良亦可憫察其情狀奚忍加誅配於邊遐亦所不欲其賊軍竝已釋罪各與衫袴巾履遣供奉官張諲管押至河東界首放歸本家諒卿明敏當體朕懐常思上言招誘到熟吐渾李骨卑四十一人八月鎮州何福進上言平山西殺山東賊軍數百餘人十二月樞宻使王峻征并冦遣供奉官梁乂奏臣部領大軍至晉州翌日遂攻劉崇焚燒其砦栅棄甲遁去臣當時入城鎮安撫遣行營馬軍都指揮使仇𢎞超左廂排陣使陳思讓都排陣使藥元福右廂排陣使康延沼等領騎軍掩襲賜梁乂錦袍銀帶庚戌宰臣百僚内殿稱賀二年正月鎮州何福進令指揮使王斌領先擒獲河東賊軍二百二十人馬三十匹至京師各賜巾履衫袴竝釋放九月樂夀縣監押杜廷熈言於瀛州南殺契丹三百餘得馬四十七匹三年正月定州言契丹三千攻圍義豐軍遣定和都指揮使楊𢎞裕選兵二百夜斫寨殺蕃首綰相以下六十人得馬八匹契丹遁去世宗顯徳二年十二月淮南道行營前軍都部署李榖上言副部署王彦超敗淮賊二千餘人於夀州城下又言先鋒都指揮使白延遇敗淮賊軍千餘人于山口鎮三年正月侍衛都指揮使李重進差人馳騎上言敗淮賊三萬餘衆於正陽鎮東追殺二十餘里勦戮殆盡生擒賊將咸師郎戈臼約三十萬衆馬五百餘匹帝大悦詔書褒之文武從官皆稱賀焉二月朗州節度使王進達上言領兵入鄂州界攻下淮南長山砦殺賊軍三千餘衆三月鐵騎右廂都指揮使髙懐徳上言殺廬州賊軍七百餘衆於其城下是月行光州刺史何超上言偽光州兵馬都監張承翰舉城内附其偽刺史張紹单騎而遁文武從官稱賀既而授承翰遥領集州刺史庚子馬軍都指揮使韓令坤差牙將押降到偽天威指揮使曹延嗣等一千二百餘人至行在賜物有差又舒州刺史郭令圖上言今月四日收下舒州其偽刺史自溺而死餘黨皆遁文武從官稱賀壬寅朗州節度使王進達差牙將捉到押送淮南賊將陳澤等馬軍都指揮使韓令坤差人押先䧏到天張賊軍朱重進等千餘人到行闕賜衣物有差四月韓令坤自揚州差人馳騎上言敗吳冦萬餘衆於泰州路獲賊帥陸萬俊是月韓令坤又上言敗楚州賊將馬在貴等萬餘衆於獲頭堰偽漣州刺史秦進崇等殿前都指揮使張永徳上言敗泗州賊軍千餘人於曲溪堰七月廬州行營都部署劉重進上言敗淮賊千五百人於廬州是月濠州行營都部署武行徳上言敗淮賊二千餘人於其界八月壬寅張永徳上言敗淮賊千餘人於下蔡橋東獲樓船二隻掉船五隻十月昭義軍節度使李筠上言差行軍司馬范守圖領兵入邊州界殺獲河東賊軍三百餘人兼擒送員寮數人赴闕是月壬午任永徳上言敗淮賊千餘人於下蔡縣淮北岸獲戰船數十隻賊衆溺死者甚衆是月淮南道行營招討使李重進上言吳人冦我盛塘等處差鐵騎都指揮使王彦昇等率兵掩殺斬首二千餘級十一月壬子黄州刺史司超上言敗淮冦千餘衆於麻城縣北十二月己夘海州刺史張廷翰上言敗淮賊五百餘衆於北界是月戊子李重進上言敗淮賊二千餘衆於塌山北四年正月丁未淮南道行營都招討使李重進差人馳騎上言敗淮南援軍五千餘衆於夀州城北奪得砦兩所及獲軍需器械等是日随班於廣政殿稱賀二月辛酉淮南道行營都監尚訓上言敗淮賊二千餘衆於黄耆砦三月甲午廬州行營都部署劉重進上言殺淮賊三千餘人於夀州東山口乙未宰臣樞宻使已下以王師大㨗各進馬稱賀五月劉重進又上言於航歩鎮金牛砦廬江縣相次殺獲淮冦獲賊船三十餘隻詔褒之是月權知府州事折徳愿上言敗河東賊軍五百餘衆於夾谷砦斬其砦主都章都監張釗等璽書褒羙之九月龍㨗右廂主柴貴上言敗淮賊千餘衆於木林山十月昭義軍節度行軍司馬范守圖帥師入河東界收降下賊砦二所是月田州節度使楊信上言盛唐縣兵馬都監薛支柔敗淮賊六百餘人於田州北界是月招討使李重進上言攻下濠州南闗城十二月李重進上言偽濠州團練使郭廷謂已下以其城降濠州平降其卒萬餘衆獲賊糧數萬石五年二月右龍武統軍趙贊上言敗淮南賊軍五百餘人於石潭橋是月黄州刺史司超上言領兵破淮南賊砦二所殺賊三千餘人兼擒偽舒州刺史施仁望來獻五月鎮州節度使郭崇上言帥師攻下東城縣斬級數百俘人口牛畜三萬餘衆先是戎虜以駕在淮南遣騎萬餘掠我邊境至是故有是舉以報之也六月昭義節度使李筠上言帥師入河東界破賊砦六所於石㑹闗十月邢州兵馬留後陳思讓上言西山廵簡使楊璘領兵入遼州界收降下才砦兩所獲生口牛羊具數以聞十一月己未邢州上言西山廵簡使楊璘破遼州賊界井口砦擒殺百餘人是月昭義節度使李筠上言破遼州賊界長清砦擒偽磁州刺史李再興來獻十二月西山廵簡使楊璘領兵入遼州界攻破牛居砦一所斬三百餘級六年五月定州節度使孫行友上言率師攻下易州擒偽刺史李在欽來獻命斬於軍市己酉先鋒都指揮使張藏英上言敗胡騎數百於瓦橋闗北兼攻下固安縣己巳侍衛使李重進上言敗河東賊軍五千餘人於北井路斬二千餘級六月晉州節度使楊廷璋上言率所部兵入河東界招降下堡砦一十三所兼下偽西南面廵簡使斬漢晁已下三人册府元龜卷四百三十五
