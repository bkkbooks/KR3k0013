body:
  text: 冊府元龜卷一百四十九宋王欽若等撰帝王部辨謗捨過辨謗邪逕之敗良田蒼蠅之玷垂棘聖賢所共患也乃有臨宸極之重躬濬哲之姿深居高視逖聴虛受辨浸潤之譖悟萋菲之謗燭其丹腑保其素履俾服讒蒐慝者無所施巧含忠履潔者有以自明孤直者不憚於回邪中正者靡畏於朋比大臣任重而無懼賢者盡節而不疑緝緝翩翩之道消平平蕩蕩之化洽葢虞舜之寛而有辨成湯之勇智文王之迪哲率繇是矣漢昭帝即位霍光為大将軍政事壹決於光光長女為左将軍上官桀子安妻桀因帝姊鄂邑葢主内安女後宫為婕妤數月立為皇后父安為驃騎将軍封桑樂侯桀父子既尊盛而徳長公主懐其恩徳也公主近幸河間丁外人桀安欲為外人求封以列侯尚公主光不許長主以是怨光桀父子並為将軍皇后親安女光乃其外祖而顧專制朝事顧猶反也繇是與光争權燕王旦自以昭帝兄嘗懐怨望及御史大夫桑𢎞羊建造酒榷鹽鐵為國興利伐其功伐矜也欲為子弟得官亦怨恨光於是葢主上官桀安及𢎞羊皆與燕王旦通謀詐令人為燕王上書言光出都肄郎羽林道上稱䟆都試也肄習也謂總闗試習武備也大官先置供飲食之具又引蘇武前使匈奴拘留二十年不降還迺為典屬國而大将軍長史敞亡功為搜粟都尉楊敞也又擅調益莫府校尉調選也莫府大将軍府也光專權自恣疑有非常臣且願歸符璽入宿衞察姦臣之變候伺光出沐日奏之桀欲従中下其事下謂下有司也桑𢎞羊當與諸大夫共執退光書奏帝不肯下明旦光聞之止畫室中不入雕畫之室也帝問大将軍安在左将軍桀對曰以燕王告其罪故不敢入有詔召大将軍光入免冠頓首謝帝曰将軍冠令復著冠也朕知是書詐也将軍亡罪光曰陛下何以知之帝曰将軍之廣明都郎屬耳之往也廣明亭名也屬耳近耳也調校尉以來未能十日燕王何以得知之且将軍為非不須校尉帝云将軍欲反不由一校尉是時帝年十四尚書左右皆驚而上書者果亡捕之甚急桀等懼曰此小事不足遂遂猶竟也不須窮竟帝不聴後桀黨愈有譖光者帝輒怒曰大将軍忠臣先帝所屬以輔朕身屬委也敢有毁者坐之自是桀等不敢復言元帝時夏寒日青無光𢎞恭石顯及許史皆言周堪張猛等用事之咎詔左遷堪猛後三嵗餘孝宣廟闕災其晦日有食之於是帝召諸前言日變在堪猛者責問皆稽首謝乃因下詔曰河東太守堪先帝賢之命而傅朕資質淑茂道術通明議論正直秉心有常發憤悃愊悃愊至誠也信有憂國之心以不能阿事尊貴孤特寡助抑厭遂退謂不伸也率不克明往者衆臣見異異災異也不務自修深惟其故而反晻昧説天托咎此人晻不明也朕不得已出而試之以彰其材堪出之後大變仍臻亦嘿然堪治未期年而三老官屬有識之士詠頌其美使者過郡靡人不稱此固足以彰先帝之知人而朕有以自明也俗人乃造端作基非議詆欺或引幽隠非所宜明意疑以類欲以陷之朕亦不取也朕迫於俗不得專心乃者天著大凶朕甚懼焉今堪年衰嵗暮恐不得自信信讀曰伸排於異人将安究之哉究竟也明也其徵堪詣行在所拜為光禄大夫秩中二千石領尚書事猛復為太中大夫給事中哀帝即位初傅氏在位者傅太后之親與朱博為表裏共毁譖丞相博山侯孔光既策免退閭里杜門自守杜塞也而朱博代為丞相數月坐承傅太后指妄奏事自殺平當代為丞相數月薨王嘉復為丞相數諫争忤指旬嵗間閱三相閲由厯也議者皆以為不及光帝繇是思之後因問日食事帝説賜光束帛拜為光禄大夫秩中二千石給事中次丞相及御史大夫賈延免光復為御史大夫二月為丞相復故國博山侯帝乃知光前免非其罪以過近臣毁短光者免傅嘉曰前為侍中毁譖仁賢誣愬大臣令俊艾者久失其位嘉傾覆巧偽挾姦以罔上崇黨以蔽賢傷善以肆意詩不云乎讒人㒺極交亂四國小雅青蠅之詩其免嘉為庶人歸故郡後漢章帝為太子時楊仁為北宫衞士令明帝厭代諸馬貴盛各争欲入宫仁被甲持㦸嚴勒門衞莫敢輕進者帝既立諸馬共譛仁刻峻帝知其忠愈善之班超率疏勒康居于寘拘彌兵攻姑墨石城破之超欲因此叵平諸國叵猶遂也乃上疏請兵建初八年遣衞侯李邑護送烏孫使者賜大小昆彌以下錦帛李邑始到于寘而值龜茲攻疏勒恐懼不敢前因上書陳西域之功不可成又盛毁超擁愛妻抱愛子安樂外國無内顧心超聞之歎曰身非曾參而有三至之讒恐見疑於當時矣遂去其妻帝知超忠乃切責邑曰縦超擁愛妻抱愛子思歸之士三千餘人何能盡與超同心乎令邑詣超受節度順帝時梁商為大将軍商檢御門族未嘗以權盛干法而性慎弱無威斷頗溺於内豎以小黄門曺節等用事於中遂遣子冀不疑與為交友然宦者忌商寵任反欲陷之永和四年中常侍張逵蘧政内者令石光尚方令傅福冗従僕射杜永連謀共譛商及中常侍曺騰孟賁云欲徵諸土子圗議廢立請收商等案罪帝曰大将軍父子我所親騰賁我所愛必無是但汝曺共妬之耳逵等知言不用懼迫遂出矯詔收縳騰賁於省中帝聞震怒勑宦者李歙急呼騰賁釋之收逵等悉伏誅魏太祖時蔣濟為揚州別駕民有誣告濟為謀叛主率者帝聞之有令與左将軍于禁沛相封仁等曰蔣濟寧有此事如有此事吾為不知人也此必愚民樂亂妄引之耳促理出之辟為丞相主簿西曺屬明帝時陳矯為尚書令劉曄以先進見幸因譛矯專權矯懼以問長子本本不知所出次子騫曰主上明聖大人大臣今若不合不過不作公耳後數日帝見矯矯又問二子騫曰陛下意解故見大人也既入盡日帝曰劉曄搆君朕有以迹君朕心故已了以金五餅授之矯辭帝曰豈以為小恵君已知朕心顧君妻子未知故也後魏文成帝時源賀為冀州刺史武邑郡姦人石華告沙門道可與賀謀反有司以聞帝謂羣臣曰賀誠心事國朕為卿等保之無此明矣乃精加訊簡華果引誣於是遣使者詔賀曰卿以忠誠欵至著自先朝以丹青之潔而受蒼蠅之汙朕登時研簡已加極法故遣宣意其善綏所蒞勿以囂謗之言致損慮也賀上書謝書奏文成顧謂左右曰以賀之忠誠尚致其誣不若是者可無慎乎薛虎子為徐州刺史沛郡太守邵安下邳太守張攀咸以贓汚虎子按之於法安等遣子弟上書誣虎子南通于宋文成曰此其妄矣朕度虎子必不然也推按果虛乃下詔曰夫君臣體合則功業可興上下猜懼則治道替矣沛郡太守邵安下邳太守張攀咸以貪惏獲罪各遣子弟詣闕告刺史虎子縦民通賊妄搆無端安宜賜死攀子僧保鞭一百配燉煌安息他生鞭一百可集州官兵民等宣告行決塞彼輕狡之源開此陳力之效後周太祖時唐瑾為吏部尚書于謹伐江陵以瑾為元帥府長史及軍還諸将多因虜掠大獲財物瑾一無所取唯得書兩車載之以歸或白太祖曰唐瑾大有輜重悉是梁朝珎玩帝初不信然欲明其虛實宻遣簡閲之唯見墳籍而已乃嘆曰孤知此人來三十許年明其不以利干義若不令簡視恐常人有投杼之疑所以益明之耳凡人受委任當如此也宇文測厯位侍中開府儀同行汾州事政在簡恵頗得人和地接東魏數相抄竊或有獲其為寇者多縳送之測皆命解縳置之賔館然後引與相見如客禮焉仍設宴放還其國衞送出境自是東魏人大慙乃不為冦兩界遂通慶弔時論方之羊叔子或有告測懐貳文帝怒曰測為我安邉何為間我骨肉乃命斬之仍許測便宜従事隋文帝初韋冲為南寧州總管兄子伯仁隨冲在府掠人之妻士卒縦暴邊人失望帝聞之大怒令蜀王秀按其事益州長史元巖性方正按冲無所寛貸竟坐免官其弟太子洗馬世約譛巖於皇太子上謂太子曰古人有酤酒酸而不售者為噬犬耳今何用世約乎世約遂除名髙熲開皇中為晉王元帥長史伐陳及軍還熲以功授上柱國進爵齊國公文帝因勞之曰公伐陳後人言公反朕已斬之君臣道合非蒼蠅所間也是後衞将軍龎晃及将軍盧賁等前後短熲於帝帝怒之皆被疎黜因謂熲曰獨孤公猶鏡也每被磨瑩皎然益明熲父賔仕周為獨孤信寮佐賜姓獨孤氏唐高祖武徳初皇甫無逸為御史大夫時益部新開長吏横恣帝令無逸持節巡撫之有皇甫希仁者見無逸專制方面徼倖上變云臣父見在雒陽無逸為母之故隂遣臣與王世充相知髙祖審其詐數之曰無逸偪於王世充棄母歸朕今之委任異於衆人其在益州極為清正此盖羣小不耐欲誣之也此乃離間君臣惑亂我視聴於是斬希仁於順天門遣給事中李公昌馳慰諭之俄而有告無逸隂與蕭銑交通者無逸時與益州行臺僕射竇璡不協於是上表自理又言璡狀帝覽之曰無逸當官執法無所迴避必邪佞之徒惡直醜正共相搆扇也因令劉龍溫彦将按其事率無驗而止所告者坐斬竇璡亦以罪黜無逸既反命帝勞之曰公立身行已朕之所悉比多譛訴者但為正直致邪佞所憎耳無逸頓首陳謝帝曰卿不負朕何煩多謝崔善武徳中為尚書左丞甚獲當時之譽諸令史惡其明察為謗書曰崔子曲如鈎隨例得封侯髙祖聞而勞勉之曰澆薄之後人多醜正昔齊末姦吏歌斛律明月髙緯愚闇遂滅其家朕雖不明幸免斯事因下勑購流言者将加罪焉太宗貞觀初司空裴寂以罪流静州俄逢山羌為亂或言僚反刼寂為王太宗聞之曰我國家於寂有性命之恩必不然矣未㡬果稱寂率家僮破賊劉師立為左驍衞将軍奉使幽州道檢㸃軍團陜州楊表上書告師立自云眼有赤光體有非常之相姓氏又應符䜟及師立還太宗謂之曰人言卿欲反師立大懼曰臣仕於隋不過七品身才駑下不敢輒希富貴過䝉陛下非常之遇嘗以性命許國而陛下功成事立臣致位将軍顧已循省實踰涯分臣是何人輒敢言反帝笑曰知卿不然此人妄言耳宜勿為懐賜帛六十疋召入卧内而慰諭之中宗朝節愍太子舉兵遇魏元忠子昇於永安門脅令従已因為亂兵所殺是時宗楚客等執證元忠及昇云素與節愍同謀請夷三族制不許俄而監察御史袁守一彈之遂左遷思州務川尉守一又奏言昔在三陽宫則天皇后不豫内史狄仁傑奏請陛下監國元忠遂宻進狀云不可據此則知元忠懐逆日久伏請加以天誅帝謂宰臣曰以朕思之此是守一大錯人臣事主必在一心豈有主上少有不安即請太子知事乃是狄仁傑自樹私恵未見元忠有失守一假借前事羅織元忠無罪為辜豈是道理憲宗元和三年十月以御史中丞竇羣為潭州刺史充湖南觀察等使既行又貶為黔州刺史充黔中觀察等使羣初與李吉甫善吉甫擢為御史中丞性險躁喜云為及得權反與知雜事吕溫侍御史羊士諤等黨比同搆陷吉甫每隂伺其過吉甫嘗召術者陳登宿於安邑里第翼日羣命吏捕登考鞫偽搆吉甫隂事宻以上聞帝召登立辨其偽貶溫為均州刺史士諤資州刺史羣亦再貶焉自天寶末李林甫專權傾覆人家誣搆左道及建中初盧杞楊炎作相謀陷亦比比有之及是帝英悟立斷故邪黨不能搆其險天下之人無不推仰聖徳焉敬宗寶厯二年二月以山南西道節度使裴度為司空門下侍郎平章事初李逢吉在相位不直中外人情咸思度入相帝亦㣲聞其事每有中官出使至興元必傳秘㫖且有徴還之約及獻疏請覲逢吉之徒皆不自安百計隳沮拾遺張權輿者既為所嗾尤出死力乃上疏云度名應圗䜟宅據岡原不召而來其㫖可見葢嘗有人與偽作䜟詞云非衣小兒坦其腹天上有口被驅逐言度曽征討淮西平呉元濟也又帝城東西横亘六岡符易象乾坤之數度永樂里第偶當第五岡故權輿得以為詞賴帝聽竟不能動揺周太祖時慕容彦超鎮兖州進呈鄆州節度使髙行周來書其書意即行周毁讟太祖結連彦超之意帝覽之笑曰此必是彦超之詐也試令驗之果然其鄆州印元有缺文不相接其偽印即無缺處帝尋令賫書示諭行周行周上表謝恩辨認奸詐捨過君之於臣也有罪既斥之有才復用之不以一眚掩大徳於是乎有捨過之道焉有自新之意焉何則人之行已必有過差人之負累皆欲湔洗圗其新而棄其舊掩所失而彰所能或起於縲囚或負於亡命或拔於反側之際或任於修省之後賫功補過唯明主能之君陳曰爾無忿疾於頑無求備於一夫人曰必有忍其乃有濟有容徳乃大斯其義也漢文帝時魏尚為雲中守以罪削爵後帝輦過郎中署問馮唐以趙将李齊之賢唐對曰齊尚不如廉頗李牧之為将也帝乃拊髀曰嗟乎吾獨不得亷頗李牧為将豈憂匈奴哉唐曰主臣恐懼之言陛下雖有廉頗李牧不能用也帝復問唐曰公何以言吾不能用頗牧也唐對曰臣竊聞魏尚為雲中守軍市租盡以給士卒出私養錢五日一殺牛私借錢也以饗賔客軍吏舍人是以匈奴逺避不近雲中之塞虜嘗一入尚率車騎擊之所殺甚衆夫士卒盡家人子起田中従軍安知尺籍伍符家人子謂庶人之家子也尺籍所以書軍令伍符軍士伍伍相保之符信也一云伍符亦什伍之符要節度也終日力戰斬首捕虜上功莫府一言不相應文吏以法繩之其賞不行吏奉法必用愚以為陛下法太明賞太輕罰太重且雲中守尚坐上功首虜差六級陛下下之吏削其爵以罰之繇此言之陛下雖得頗牧不能用也臣誠愚觸忌諱死罪文帝説是日令唐持節赦魏尚復以為雲中守景帝時韓安國為梁孝王國中大夫坐法抵罪蒙蒙梁國之縣也居無㡬梁内史缺無㡬未多時也漢使使者拜安國為梁内史起徒中為二千石宣帝五􅃫中京兆尹張敞坐與光禄勲楊惲厚善惲坐大逆誅公卿奏惲黨皆免而敞奏獨寢不下敞使賊曺掾絮舜有所案驗舜以敞劾奏當免不肯為敞竟事曰五日京兆耳敞聞舜語即詔吏收舜繫獄晝夜驗治致其死事棄市會立春行寃獄使者出舜家載尸自訴使者奏敞賊殺不辜天子薄其罪欲令敞得自便利即先下敞前坐楊惲奏免為庶人敞詣闕上印綬便従闕下亡命而冀州部中有大賊天子思敞功効使使者即家在所召敞就其所居處而召之敞身被重劾謂有賊殺不辜之事及使者至妻子家室皆泣惶懼而敞獨笑曰吾身亡命為民郡吏當就捕今使者來此天子欲用我也装隨使者詣公車上書曰臣前幸得備位列卿待罪京兆坐殺賊捕掾絮舜絮舜本臣敞素所厚利數䝉恩貸以臣有章劾當免受記考事記書也若今之州縣記符也便歸卧家謂臣五日京兆背恩忘義傷薄俗化臣竊以舜無状枉法以誅之臣敞賊殺無辜鞫獄故不直雖伏明法死無所恨天子引見敞拜為冀州刺史元帝建昭中西域副校尉陳湯與西域都䕶騎都尉甘延夀共矯制誅斬郅支單于先是中書令石顯嘗欲以姊妻延夀延夀不取及丞相御史亦惡其矯制皆不與湯與猶許也湯素貪所鹵獲財物入塞多不法司𨽻校尉移書道上繫吏士按驗之湯上疏言臣與吏士共誅郅支單于幸得禽滅萬里振旅宜有使者迎勞道路今司𨽻反逆收繫按驗是為郅支報讎也帝立出吏士令縣道具酒食以過軍後封延夀義成侯湯關内侯食邑各三百户後漢光武初為蕭王時岑彭為更始潁川太守㑹舂陵劉茂起兵畧下潁川彭不得之官乃與麾下數百人從河内太守邑人韓歆㑹光武徇河内歆議欲城守彭止不聽既而光武至懐歆廹急迎降光武知其謀大怒収歆置皷下将斬之召見彭彭因言韓歆南陽大人大人謂大家豪右可以為用乃貰歆貰寛也以為鄧禹軍師王梁建武二年為大司空與大司馬吳漢等俱擊檀鄉有詔軍事一屬大司馬而梁輒發野王兵帝以其不奉詔勑令止在所縣而梁復以便宜進軍帝以梁前後違命大怒遣尚書宗廣持節軍中斬梁廣不忍乃檻車送京師既至赦之月餘以為中郎将行執金吾事朱浮建武三年為幽州牧漁陽太守彭寵反舉兵攻浮上谷太守耿況遣騎來救浮浮乃得遁走南至良鄉其兵長反遮之浮恐不得脱乃下馬刺殺其妻僅以身免城降於寵尚書令侯霸奏浮敗亂幽州搆成寵罪徒勞軍師不能死節罪當伏誅帝不忍以浮代賈復為執金吾董宣建武中為北海相大姓公孫丹令子殺人宣收丹父子殺之丹宗黨三十餘人稱寃宣使書佐水丘岑盡殺之坐徵詣廷尉當刑同刑九人次應及宣光武馳使騶騎特原宣刑且令還獄遣使者詰宣多殺無辜宣具以状對言水丘岑受臣㫖意罪不繇之願殺臣活岑使者以聞有詔左轉宣懐令鮑永為東海相坐事被徵至成臯詔書迎拜為兖州牧章帝時楊終為蘭臺校書坐事繫獄帝徴諸儒論定五經於白虎觀博士趙博校書郎班固賈逵等以終深曉春秋學多異聞表請之終亦上書自訟即日貰出乃得與白虎觀焉魏太祖建安初舉魏种孝廉為内黄太守屬以海北事及兖州叛帝曰唯魏种且不棄孤也及聞种走帝怒曰种不南走越北走胡不置汝也既下射犬生禽种帝曰唯其才也釋其縛而用之文帝黄初中復于禁等官禁初守樊城兵敗降闗羽會孫權禽羽獲其衆禁復在呉及帝踐祚權稱藩遣禁還帝見禁鬚髪皓白形容憔悴泣涕頓首帝慰諭拜為安逺将軍制曰昔荀林父敗績於邲孟明喪師於殽秦晉不替使復其位其後晉獲狄土秦霸西戎區區小國猶尚若斯而況萬乗乎樊城之敗水災暴長非戰之咎其復禁等官晉恵帝時傅祗當趙王倫之簒為右光禄開府加侍中及帝還宫祗以經受偽職請退不許先是孫秀與義陽王威等十餘人預撰儀式禪文及倫敗齊王冏收侍中劉逵常侍鄒捷杜育黄門侍郎陸機右丞周道王尊等付廷尉以禪文出中書復議處祗罪會赦得原後以禪文草本非祗所撰於是詔復光禄大夫明帝時既平王敦有司奏江州刺史王彬及安成太守籍之並是敦親皆除名詔曰司徒導以大義滅親其後昆雖或有違猶将百世宥之況彬等公之近親乃原之徵拜光禄勲後魏太武時高陽侯和歸以罪徙配凉州為民葢呉作亂於闗中復拜歸龍驤将軍往討之盧度世以崔浩事逃於髙陽鄭羆家後太武臨江宋文帝使其殿上将軍黄延年朝貢太武問延年曰范陽盧度世坐與崔浩親通逃命應已至彼延年對曰都下無聞當必不至太武詔東宫赦度世宗族逃亡及籍没者度世乃出赴京拜中書侍郎西魏文帝時賀拔勝都督荆州為侯景所敗南奔于梁三年乃求還既至長安詣闕謝罪朝廷喜其還乃授太師後周宣帝時鄭譯尚梁國公主為内史下大夫譯頗專權時帝幸東京譯取官材以自營寺坐是復除名為民小御正劉昉數言於帝帝復召之顧待如初唐髙祖鎮并州李靖為馬邑郡丞會突厥入冦髙祖率兵至馬邑繫虜敗之靖察髙祖将有四方之志因而上變至長安髙祖由是惡之及尅京城執靖将斬之靖厲聲大呌曰公起義兵為天下除暴亂救蒼生安得挾私怨而殺義士邪髙祖竒而捨之後為将破開州蠻賊髙祖甚悦手詔勑靖曰既往不咎何憂何懼今日以去心中更不須憶舊事吾久忘之矣太宗貞觀初徴鄧隆為國子主簿初王世充兄子大之守雒陽也引隆為賔客大見親遇及太宗攻雒陽遣書諭大隆為大復書言辭不遜雒陽平後隆懼罪變姓名自號隠𤣥先生竄於白鹿山黄冠野服不接人事至是徴之與博陵崔仁師昌黎慕容善行𢎞農劉顗新野康安禮河東敞播俱為修文學士隆負宿罪猶不自安太宗聞之遣房𤣥齡謂之曰爾為王大作書誠合重責但各為其主於朕有惡朕今為天子何能追責匹夫之過爾宜坦然勿懐危懼也擢授著作佐郎髙宗咸亨初薛仁貴為邏巡道行軍大總管擊吐蕃官軍大敗仁貴坐除名尋而高麗餘衆相率復叛詔起仁貴為鷄林道總管以經畧之上元中坐事徙象州會赦歸髙宗思其功開耀元年復召見謂曰往九成宫遭水無卿已為魚矣卿又北伐九姓東擊髙麗漠北遼東咸遵聲教者並卿之力也卿雖有過豈可相忘有人云卿烏海城下故不擊賊致使失利朕所恨者唯此事耳今西邊不静𤓰沙路絶卿可髙枕鄉邑不為朕指撝邪於是起𤓰州長史尋拜右領軍衞将軍檢校代州都督𤣥宗開元二年八月吐蕃冦臨洮軍又進冦蘭州及滑州之渭源縣侵我牧圉勑薛訥白衣攝左羽林軍将軍為隴右防禦使與太僕少卿王􅺐等率兵擊之勑曰棄瑕録用有國通典捨罪責功先王舊式薛訥藴韜鈐之畧總文武之任委以分閫冀静邊塵遽聞喪律實負朝寄准其所犯合實嚴刑言念老臣寛其小衂即捨孟明之罪佇收馮異之功可隴右道防禦軍大使是年七月薛訥為和戎大武等軍節度為虜所敗除名為庶人至是復用之肅宗至徳二年十二月既收雒陽先是博陵太守張萬頃陷賊偽授河南尹安撫百姓全活宗枝帝嘉之捨其罪授濮陽太守徳宗建中四年汾陽郡王郭子儀子曖尚代宗昇平公主坐事留之禁中曖亦不令出入既而朱泚之亂不知徳宗幸奉天為賊所逼欲授偽官曖辭以居喪被疾既而與兄晞弟曙及昇平公主皆奔奉天徳宗喜並釋前咎待之如初復銀青光禄大夫檢校左散騎常侍興元二年朱泚平御史臺奏賊中守舊官人及被逆賊除官不出者先奉進止並宜釋放未奉正勑不敢不奏詔賊中守舊官人並宜却復本官貞元九年滄景節度使程懷直畋遊無度不恤其下為将校所逐遂來歸帝優容之除統軍依舊檢校僕射憲宗元和元年程异以王叔文黨貶桞州司馬鹽鐵使李巽薦异曉暢錢榖請棄瑕録用繇是拔為御史後唐荘宗同光初既平朱梁齊州刺史孟璆上章請死帝原之璆初為騎将天祐十三年帝與劉鄩莘縣對壘璆領七百騎奔投梁末帝以為齊州刺史至是首過帝恨之曰爾當吾急時引我七百騎投賊何過之有但予推心御物不欲坐汝我不阻爾來将何面相視耶璆惶懼請死帝恕之移為貝州刺史明宗天成三年二月勑朕聞為賢諱過含垢匿瑕而皆載在春秋顯其懲勸是以孟明不懈遂霸西戎曺沬有謀克寧東魯列國之臣尚爾爾何異焉責授檀州刺史劉訓早負變通咸推忠壯自隰川而向化繼領竹符平汶上以立功遂分茅社去春以荆門叛逆須議討除将戮賊臣俾司戎律攻城稍滯畧地未前屬炎熇以班師責逗遛而削爵自居逺郡俄換流年亟聞惕厲以自新宜降恩華而求舊使昇環列取象鈎陳可守右龍武大将軍長興二年八月庚申以右金吾衞大将軍充街使髙允真為右衞大将軍先是以據占編戸役于仗下故免其官今復敘任晉髙祖天福三年四月詔責授朝散大夫衞尉寺丞陳保極夙藴才名早登科第洎居班列深顯器能近者假限既為朝章是舉自聞左降深悟前非宜推宥罪之恩俾奉自新之命勉伸傾竭繼俟陟遷可復行尚書倉部員外郎賜紫金魚袋冊府元龜卷一百四十九
