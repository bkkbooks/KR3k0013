body:
  text: 􅁽府元龜卷五百三宋王欽若等撰邦計部屯田夫千里餽糧士有饑色樵蘓後㸑師不宿飽屯田之利繇是興矣自漢武創制置吏卒五六萬人充國上状條便宜十有二事新莽偽政則立田禾将軍東漢永平亦命宜禾都尉魏晉而下無代無之是皆因戍營田因田積榖兼兵民之力省飛輓之勞比夫負海轉輸率三十鍾而致一石者其利豈不博哉然而輪䑓之耕龜兹曰来迫吾國車師之墾匈奴曰必争此地或攻擾田疇或蕩揺邉戍募民敢徙徒垂空言調吏而行復致胥怨若乃任峻為典農之官所在積粟鄧艾著濟河之論資食有儲斯皆不越中區近在宇下厥功易就人靡告勞故魏氏之致冨饒晉人之能尅敵者用此道也漢武帝太初末貳師将軍李廣利伐大宛之後西域震懼多遣使来貢獻漢使西域者益得職謂得拜職也於是自燉煌西至鹽澤往往起亭而輪臺渠犁皆有田卒數百人置使者校尉領䕶言統領保䕶營田之事以給使外國者謂收其所種五榖以供之及匈奴昆邪王降後度河自朔方以西至令居令音零往往通渠置田官吏卒五六萬人稍蠶食地接匈奴以北其地相接不絶是時軍旅連出師行十二年海内虚耗征和中貳師将軍李廣利以軍降匈奴帝既悔逺征伐而捜粟都尉桑𢎞羊與丞相御史奏言故輪臺東㨗枝渠犁皆故國地廣饒水草有溉田五千頃以上䖏温和田美可益通溝渠種五榖與中國同時熟其旁國少錐刀貴黄金綵繒可以易榖食宜給足不可乏言以錐刀及黄金綵繒與此旁國易榖食可以給田卒不憂乏糧臣愚以為可遣屯田卒詣故輪臺以東置校尉三人分䕶各舉圗地形通利溝渠務使以時益種五榖張掖酒泉遣騎假司馬斥候屬校尉事有便宜因騎置以聞騎置今之驛馬也田一嵗有積榖募民壮健有累重敢徙者詣田所累謂妻子家屬就畜積為本業畜讀曰蓄益墾溉田稍築列亭連城而西以威西國輔烏孫為使臣謹遣徵事臣昌分部行邉嚴勅太守都尉明㷭火選士馬謹斥候蓄茭草願陛下遣使使西國以安其意臣昩死請帝乃下詔深陳既往之悔不復出軍昭帝即位初用桑𢎞羊前議以杆彌太子頼丹為校尉将軍田輪臺與渠犁地皆相連龜兹貴人姑翼龜兹讀曰邱慈謂其王曰頼丹本臣屬吾國今佩漢印綬来迫吾國而田必為害王即殺頼丹而上書謝漢始元二年八月調故吏将屯田張掖郡調調發也故吏前為官職者令其部率習射戰士于張掖為屯田也元鳯四年平樂監傅介子既殺樓蘭王漢乃立尉屠耆為王尉屠耆樓蘭王弟先為質於漢更名其國為鄯善王自請天子曰身在漢久今歸單弱而前王有子在恐為所殺國中有伊循城其地肥美願漢遣一将屯田積榖令臣得依其威重於是漢遣司馬一人吏士四十人田伊循以填撫之填音竹刃切其後更置都尉宣帝地節二年詔遣侍郎鄭吉及校尉司馬憙許吏切将免刑罪人田渠犁積榖欲以攻車師至秋收榖吉憙發城郭諸國兵萬餘人自與所将田士千五百人共擊車師攻交河城破之王尚在其北石城中未得㑹軍食盡吉等且罷兵歸田渠犁收秋畢復發兵攻車師王輕騎奔烏孫吉即迎其妻子置渠犁車師東奏事至酒泉有詔還田渠犁及車師益積榖以安西國侵匈奴吉始使吏卒三百人别田車師得降者言單于大臣皆曰車師地肥美近匈奴使漢得之多田積榖必害人國不可不争也果遣騎来擊田者吉廼與校尉盡将渠犁田士千五百人往田匈奴復益遣騎来漢田卒少不能當保車師城中匈奴将即其城下謂吉曰單于必争此地不可田也圍城數日廼觧後常數千騎徃来守車師去渠犁千餘里間以山河北近匈奴漢兵在渠犁者孰能相救願益田卒公卿議以為道逺煩費可且罷車師田者詔遣長羅侯嘗惠也将張掖酒泉騎出車師北千餘里楊威武車師旁胡騎引兵去廼得出歸渠犁凡三校尉屯田匈奴傳云宣帝時西域共擊匈奴取車師國匈奴收其餘東不敢居故地而漢益遣屯士分田車師地以實之其後匈奴遣左右奥鞬各六千騎奥音郁鞬音居言切與左人将再擊漢之田車師城者不能下神爵三年日逐王畔單于将衆来降䕶鄯善以西使者鄭吉迎之既至漢封日逐王為歸德侯使吉并䕶北道故號都䕶都䕶之起自吉置也匈奴益弱不得近西域于是徙屯田田于北胥鞬地名枝莎車之地枝分也屯田校尉始屬都䕶都䕶治烏孫壘城去陽關二千七百三十八里與渠犁田官相近土地肥饒于西域為中都䕶治焉趙充國為後将軍討叛羌度其必壊欲罷騎兵屯田以待其弊上奏曰臣聞兵者所以明徳除害也故舉徳於外則福生於内不可不慎臣所将吏士馬牛食月用糧榖十九萬九千六百三十斛鹽千六百九十三斛茭槀二十五萬二百八十六石茭乾芻也槀禾桿也石百二十斤難久不觧繇役不息又恐它夷卒有不虞之變卒讀曰倅相因並起為明主憂誠非素定廟勝之策且羌人易以計破難用兵碎也故臣愚心以為擊之不便計度臨羌東至浩亹羌虜故田及公田民所未墾可二千頃以上其間郵亭多壊敗者臣前部士入山伐材木大小六萬餘枝皆在水次願罷騎兵留弛刑應募及淮陽汝南歩兵與吏士私從者合凢萬二百八十一人用榖月二萬七千三百六十三斛鹽二百八斛分屯要害䖏氷觧漕下繕鄉亭浚溝渠繕補也浚深治也治湟陿以西道橋七十所令可至鮮水左右田事出賦人二十畮田事出謂至春人出營田也賦謂班與之也畮古畝字也至四月草生發郡騎及屬國軍騎伉健各千倅馬什二就草倅副也什二者千騎則與副馬二百匹也伉音口浪切為田者游兵以充入金城郡益積畜省大費畜讀曰蓄今大司農所轉榖至者足支萬人一嵗食謹上田䖏及噐用簿唯陛下裁許帝報曰皇帝問後将軍言欲罷騎兵萬人留田即如将軍之計敵當何時伏誅兵當何時得决熟計其便復奏充國上状曰臣聞帝王之兵以全取勝是以貴謀而賤戰戰而百勝非善之善者也故先為不可勝以待敵之可勝蠻夷習俗雖殊於禮義之國然其欲避害就利愛親戚畏死亡一也今敵亡其美地薦草薦稠草愁於寄託逺遯骨肉心離人有畔志而明主般師罷兵般音班還也萬人留田順天時因地利以待可勝之敵雖未即伏辜兵决可朞月而望羌人瓦觧前後降者萬七百餘人及受言去者凢七十軰此坐支觧羌人之具也臣謹條不出兵留田便宜十二事歩兵九校吏士萬人留屯以為武備因田致榖威德並行一也又因排折羌人令不得歸肥饒之墬古地字貧破其衆以成羌人相畔之漸二也居民得並田作不失農業三也軍馬一月之食度支田士一嵗罷騎兵以省大費四也至春省甲士卒循河湟漕榖至臨羌以􅀈羌人􅀈亦示字楊威武傳世折衝之具五也以閒暇時下所伐材閒讀曰閑繕治郵亭充入金城六也兵出乗危徼幸不出令反畔之敵竄於風寒之地離霜露疾疫瘃墮之患離遭也堕謂因寒疾而墯指者也坐得必勝之道七也亡經阻逺追死傷之害八也内不損威武之重外不令敵得乗間之埶九也又亡驚動河南大开小开皆羌種在河西之河南也使生它變之憂十也治湟陿中道橋令可至鮮水以制西域信威千里信讀曰申從枕席上過師十一也橋成軍行安易若於枕席上過也大費既省繇役豫息以戒不虞十二也留屯田得十二便出兵失十二利臣充國材下犬馬齒衰不識長冊唯明詔博詳公卿議臣採擇帝復賜報曰皇帝問後将軍言十二便聞之敵雖未伏誅兵决可朞月而望朞月而望者謂今冬邪謂何時也将軍獨不計敵聞兵頗罷且丁壮相聚攻擾田者及道上屯兵復殺畧人民将何以止之又大开小开前言曰我告漢軍先零所在兵不往擊久留得亡效五年時不分别人而并擊我此謂本始五年伐先零不分别大小开本意是以大小开有此言也其意常恐今兵不出得亡變生與先零為一将軍孰計復奏充國奏曰臣聞兵以計為本故多算勝少算先零羌精兵今餘不過七八千人失地逺客分􅄆饑凍䍐开莫湏又頗􅤒畧其羸弱畜産畔還者不絶皆聞天子明令相捕斬之賞臣愚以為敵破壊可日月冀逺在来春故曰兵决可期月而望竊見北邉自燉煌至遼東萬一千五百餘里乗塞列隧有吏卒數千人敵數大衆攻之而不能害今留歩士萬人屯田地埶平易多髙山逺望之便部曲相保為塹壘木樵樵與譙同謂為髙樓以望敵也校聨不絶此校謂用木自相貫穿以為固者亦猶周易荷校滅耳也周禮校人掌王馬之政六廐成校蓋用關械闌養馬也說文觧字云校木因也亦謂以木相貫遮闌禽獸也便兵弩飭鬭具㷭火幸通執及并力以逸待勞兵之利者也臣愚以為屯田内有亡費之利外有守禦之備騎兵雖罷敵見萬人留田為必禽之具其土崩歸徳宜不久矣從今盡三月敵馬羸痩必不敢捐其妻子於它種中逺涉河山而来為㓂又見屯田之士精兵萬人終不敢復将其累重還歸故地累重謂妻子也累音力瑞切重音直用切是臣之愚計所以度敵且必瓦解其䖏不戰而自破之䇿也至于敵小㓂盜時殺人民其原未可卒禁臣聞戰不必勝不茍接刄攻不必取不茍勞衆誠令兵出雖不能滅先零亶能令敵絶不為小㓂亶讀曰但則出兵可也即今同是而釋坐勝之道從乗危之埶往終不見利空内自罷敝罷讀曰疲敝與弊同貶重而自損非所以視蠻夷也又大兵一出還不可復留湟中亦末可空如是繇役復發也且匈奴不可不備烏桓不可不憂今久轉運煩費傾我不虞之用以澹一隅澹古贍字贍給也臣愚以為不便校尉臨衆幸得承威徳奉厚幣拊循衆羌諭以明詔宜皆鄉風鄉讀曰嚮雖其前辭嘗曰得亡效五年宜亡它心不足以故出兵臣竊自惟念奉詔出塞引軍逺擊窮天子之精兵散車甲於山野雖亡尺寸之功媮得避慊之便媮茍且也慊亦嫌字而亡後咎餘責此人臣不忠之利非明主社稷之福也臣幸得奮精兵討不義久留天誅罪當萬死陛下寛仁未忍加誅令臣數得熟計愚臣伏計熟甚不敢避斧鉞之誅昧死陳愚惟陛下省察充國奏每上輙下公卿議臣初是充國計者什三中什五最後什八有詔詰前言不便者皆頓首服丞相魏相曰臣愚不習兵事利害後将軍數畫軍冊其言常是臣任其計可必用也帝於是報充國曰皇帝問後将軍上書言羌人可勝之道今聽将軍将軍計善其上留屯田及當罷者人馬數将軍強食慎兵事自愛帝以破羌強弩将軍數言當擊又用充國屯田䖏離􅄆恐敵犯之於是兩從其計詔兩将軍與中郎将卭出擊強弩出降四千餘人破羌斬首二千級中郎将卭斬首降者亦二千餘級而充國所降復得五千餘人詔罷兵獨充國留屯田元帝時置戊巳校尉屯田車師前王庭戊巳中央鎮覆四方又開渠播種以為職故稱戊巳時車師有前王後王國也王莽遣尚書大夫趙並使勞北邉還言五原北假膏壤殖穀北假地名也膏壤言其土肥美也殖生也異時常置田官乃以並為田禾将軍發戍卒屯田北假以助軍後漢光武建武五年馬援家屬隨隗囂質子恂歸雒陽居數月而無它職任援以三輔地曠土沃而所将賔客猥多乃上書求屯田上林中帝許之六年討敵將軍王覇屯田新安時太中大夫張純将兵屯田南陽七年詔驃騎大将軍杜茂引兵北屯田晉陽廣武以備敵㓂廣武縣名屬太原郡明帝永平十六年北征匈奴取伊吾盧地今伊州置宜禾都尉以屯田遂通西域于闐諸國章帝建初二年復罷屯田伊吾盧順帝永建元年復朔方西河上郡既而激河浚渠為屯田省内郡費嵗一億計遂令安定北地上郡及隴西金城常儲榖粟令周數年内右扶風韓皓代馬賢為校尉明年犀苦詣皓自言求歸故地皓復不遣因轉湟中屯田置兩河間以逼羣羌皓後坐徵張掖太守馬續代為校尉兩河間羌以屯田近之恐必見圗乃解仇詛盟各自警備續欲先示恩信乃上移屯田還湟中羌意乃安六年以伊吾盧膏腴之地傍近西域匈奴資之以為鈔􅤒復令開設屯田如永元時事置伊吾司馬一人陽嘉元年以湟中地廣更増置屯田五部復為十部復置𤣥莬郡屯田六部靈帝中平中傅爕為漢陽太守廣開屯田列置四十餘營魏太祖初興值董卓之亂百姓流離榖石至五十餘萬人多相食既破黄巾欲經畧四方而苦軍食不足羽林監潁川棗祗及韓浩建置屯田議太祖乃下令曰自遭荒亂率乏糧榖諸軍並起無終嵗之計饑則㓂畧飽則棄餘瓦觧流離無敵自破者不可勝數袁紹之在河北軍人仰食桑椹袁術在江淮取給蒲蠃民人相食州里蕭條公曰夫定國之術在於強兵足食秦人以急農兼天下孝武以屯田定西域此先代之良式也是嵗騎都尉任峻為典農中郎将乃募民屯田許下得榖百萬斛於是開置芍陂屯田芍音鵲今夀州州郡列置田官淮南郡吏倉慈為綏集都尉數年中所在積榖倉廪皆滿官渡之戰軍國之饒起於棗祗而成於任峻時太祖欲廣置屯田以司空掾國淵典其事淵屢陳損益相土䖏民計民置吏明功課之法五年中倉廪豐實百姓競勸樂業劉靖為鎮北将軍都督河北諸軍事修廣戾渠陵大堰水溉灌薊南北三更種稻邉民利之梁習為并州刺史摠故部曲於上黨取大材供鄴宫室習表置屯田都尉二人領客六百夫於道次耕種菽粟以給人牛之費齊王正始中司馬宣王秉政奏穿廣漕渠引河入汴溉東南諸陂始大佃於淮北初宣王欲廣田畜穀為滅吳之資乃使鄧艾行陳項東至夀春艾以為田良水少不足盡地利宜開河渠引水澆溉以通漕運之道乃著濟河論以喻其指又以為昔破黄巾因為屯田積榖許都以制四方今三隅已定事在淮南每大軍征舉運兵過半功費巨億以為大役陳蔡之間上下田糧可省許昌左右諸稲田并水東下令淮北二萬人淮南三萬人分休且田且守水豐常收三倍於西計除衆費嵗完五百萬斛以為軍資六七年間可積三千萬斛於淮上此則十萬之衆五年食也以此乗敵無不尅矣宣王善之皆如艾計施行復以滅賊之要在於積榖乃大興屯守廣開淮陽百尺二渠又修諸陂於潁之南北萬餘頃自是淮北倉庾相望夀陽至於京師農官屯兵連屬焉蜀後主建興中諸葛亮為丞相出師侵魏據五丈原每患糧不繼使己志不申是以分兵屯田為久駐之基耕者雜於渭濵居民之間而百姓安堵吴大帝赤烏中新都都尉陳表吴郡都尉顧承各率所領都人㑹佃毗陵男女各數萬口晉安平王孚魏明帝時為度支尚書以關中連遭賊㓂榖帛不足遣冀州農丁五千屯於上邽秋冬習戰陣春夏修田桑繇是關中軍國有餘待賊有備矣扶風王駿武帝初為鎮西将軍都督雍梁等州勸督農桑與士卒分役已及僚佐并将帥兵士等人限田十畝具以表聞詔遣普下州縣使各務農事羊祜為都督荆州諸軍事率營兵出鎮南夏時吴石城守去襄陽七百餘里每為邉害祜患之竟以詭計令吴罷守於是戌邏減半分以墾田八百餘頃大獲其利祜之始至也軍無百日之糧及至季年有十年之積束晢太康中為張華司空賊曺屬時欲廣農晢上議曰伏見詔書以倉廪不實關右饑窮欲大興田農以蕃嘉榖此誠有虞戒大禹盡力之謂然農穰可致所繇者三一曰天時不諐二曰地利無失三曰人力咸用若必春無霡霂之潤秋繁滂沱之患水旱失中雩禳有請雖使羲和平秩后稷親農理疆甽於原隰勤藨蓘於中田猶不足以致倉庾盈億之積也然地利可以計生人力可以課致詔書之㫖亦将欲盡此理乎今天下千城人多游食廢業占空無田課之實較計九州數過萬計可申嚴此防令監司精察一人失課負及郡縣此人力之可致也又司州十郡土狭人繁三魏尤甚而猪羊馬牧布其境内宜悉破廢以供無業業少之人雖頗割徙在者猶多田諸苑牧不樂曠野貪在人間故謂北土不宜畜牧此誠不然案古今之語以為馬之所生實在冀北大賈牂羊取之清渤放豕之歌起於鉅鹿是其效也可悉徙諸牧以充其地使馬牛猪羊齕草於空虚之田游食之人受業於賦給之賜此地利之可致者也昔騅駓在坰史克所以頌魯僖却馬務田老氏所以稱有道豈利之所以㑹哉又如汲郡之吴澤良田數千頃貯水停洿人不墾植聞其國人皆謂通泄之功不足為難澙鹵成原其利甚重而豪強大族惜其魚蒲之饒搆說官長終於不破此亦谷口之謡載在史篇謂宜復下郡縣以詳當今之計荆揚兖豫汙泥之土渠塢之宜必多此數最是不待天時而豐年可獲者也以其雲雨生於畚臿多稌生於决泄不必望朝隮而潢潦臻禜山川而霖雨息是故兩周争東西之流史起惜漳渠之浸明地利之重也宜詔四州刺史使謹案以聞又昔魏氏徙三郡人在陽平頓邱界今者繁盛合五六千家二郡田地逼狭謂可徙還西州以充邉土賜其十年之復以慰重遷之情一舉兩得外實内寛増廣窮人之業以闢西郊之田此又農事之大益也荀崧為北中郎将徐州刺史監徐兖二州揚之晉陵軍事北鎮淮隂屯田于東陽之石龜殷浩為中軍将軍北征許雒開江西疁音劉田千餘頃以為軍儲元帝為晉王課督農功詔二千石長吏以入榖多少為殿最其非宿衛要任皆宜赴農使軍各自佃作即以為廪後趙石季龍謀伐昌黎使典農中郎将王典率衆萬餘屯田於海濵自幽州東至白狼大興屯田宋毛修之為冠軍将軍領南郡相髙祖将伐羌先遣修之復芍陂起田數千頃王𢎞為㑹稽王司馬道子驃騎叅軍主簿時農務頓息末役繁興𢎞以為宜建屯田陳之曰近面所諮立屯田事已具簡聖懐南畝事興時不可失宜早督田畯以要嵗功而府資役單刻控引無所雖復厲以重勸肅以嚴威適足令囹圄充積而無救於事實也伏見南局諸冶募吏數百雖資以廪贍收入甚微愚謂若廻以配農必功利百倍矣然軍噐所須不可都廢今欲留銅官大冶都邑小冶各一所重其功課一准揚州州之求取亦當無乏餘者皆罷之以充東作之要又欲二局田曺各立典軍募吏依冶比例并聽取山湖人此皆無損於私有益於公者也其中亦應疇量分判畨假及給廪多少自可一以委之本曺親局所統必當練悉且近東曺板水曺叅軍納之領此任其人頗有幹能自足了其事耳頃年以来斯務㢮廢田蕪廩虚實亦繇此𢎞過蒙飾擢志輸短効豈可相與寝黙有懐弗聞耶至於當否尊自當裁以逺鑒若所啓謬允者伏願便以時施行庶㡬有務農之勤倉有盈廪之實禮節之興可以垂拱待也南齊桓崇祖為豫州刺史平西将軍明帝使入關叅敵消息還勑崇祖曰卿視吾是守江東而已邪所少者食卿但努力營田自然平殄殘醜遂勑崇祖修治芍陂田祖冲之為長水校尉領冗從僕射冲之造安邉論欲開屯田廣農殖明帝建武中使冲之廵行四方興造大業可以利百姓者㑹連有事竟不行徐孝嗣建武末為尚書令是時連年虜動軍國虚乏孝嗣表立屯田曰有國急務兵食是同一夫輟耕於事彌切故井陌疆里長轂成於周朝屯田廣置勝戈富於漢室降此已還詳畧可見但求之自古為論則賖即以當今宜有要術竊尋縁淮諸鎮皆取給京師費引既殷漕運艱澀聚糧待敵每苦不周利害之基莫此為急臣比訪之故老及經彼宰守淮南舊田觸䖏極目陂遏不修咸成茂草平原陸地彌望尤多今邉備既嚴戌卒増衆逺資餽運近廢良疇士多饑色可為嗟嘆愚欲使刺史二千石躬自履行随地墾闢精尋灌溉之源善商肥确之異州郡縣戌主帥已下悉分畨附農今水田雖晩方事菽麥二種益是北土所宜彼人便之不減粳稲開創之利宜在及時所啓允合請即使至徐兖司豫爰及荆雍各當境規度勿有所遺别立主曺専司其事田噐耕牛臺詳所給嵗終言最明其刑賞此功克舉庶有𢎞益若縁邉足食則江南自豐權其所饒畧不可計奏御見納時帝已寝疾兵事未巳竟不施行梁陳慶之為都督南北司豫諸軍事罷義陽鎮兵停陸轉運江湖諸州並得休息開田六千頃二年之後倉廪充實髙祖每嘉賞之夏侯夔為豫州刺史時積嵗㓂戎人頗失業夔乃帥軍人於蒼陵立堰溉田千餘頃嵗收榖百餘萬石以充儲備兼贍貧人境内頼之裴􅃉為竟陵太守開置屯田公私便之後又為西戎校尉北梁秦二州刺史復開創屯田數千頃倉廪盈實省息邉軍民人吏獲安後魏東平公儀秦王翰之子道武命督屯田於河外自五原至稠陽外務農稼大得人心薛虎子為開府徐州刺史時州鎮戍兵資絹自随不入公庫任其私用常苦饑寒虎子上表於孝文曰臣聞金湯之固非粟不守韓白之勇非糧不戰故自用兵已来莫不先積聚然後圗并兼者也今江左未賔鯨鯢待戮若不委粟彭城以強豐沛則何以拓定江關掃一衡霍竊惟在鎮之兵不減數萬資糧之絹人十二疋即目随身用度無準未及代下不免饑寒論之於公無毫釐之潤語其私則横費不足非所謂納民軌度公私相益也今徐州左右水陸壤沃清汴通流足盈溉灌其中良田十萬餘頃若以兵絹市牛分減戍卒計其牛數足得萬頭興力公田必當大獲粟稲一嵗之中且給官食半兵芸殖餘兵尚衆且耕且守不妨捍邉一年之收過於十倍之絹暫時之耕充於數年之食於後兵資唯湏内庫五稔之後榖帛俱溢匪直戍士有豐飽之資於國亦有吞敵之勢昔杜預田宛葉以平吴充國耕西零以強漢臣雖識謝古人任當邉守庶竭塵露有増山海孝文納之范紹為寧逺将軍義陽太守時朝廷有南討之計發河北數州田兵二萬五千人通縁淮戍兵合五萬餘人廣開屯田八座奏紹為西道六州營田大使加歩兵校尉紹勤於勸課頻嵗大獲宋弁為黄門郎随車駕南討詔弁於豫州都督所部及東荆潁鄴皆減戍士營農水陸兼作杜纂為積弩将軍既平南陽又詣赭陽武陽二郡課種公田随供軍費北齊斛律羨為幽州道行臺僕射導髙梁水北合易京東㑹於潞因以灌田邉儲嵗積轉漕用省公私獲利焉嵇曄孝昭皇建中為平州刺史曄建議開幽州督亢舊陂長城左右營屯嵗收稲粟數十萬石北境得以周贍又於河内置懐義等屯以給河南之費自是稍止轉輸之勞隋郭衍文帝開皇中為朔中總管所部有常安鎮北接蕃境常勞轉運衍乃選沃饒地置屯田嵗剰粟萬石民免轉輸之勞趙仲卿為朔州總管開皇三年突厥犯塞吐谷渾㓂邉軍旅數起轉輸勞弊帝乃令仲卿於長城已北大興屯田以實塞下又於河西勒百姓立堡營田積榖京師置常平監煬帝大業中劉權從征吐谷渾帝令權過曼頭赤水置河源郡積石鎮大開屯田留鎮西境唐髙祖武徳初竇静為并州大總管府長史時突厥為邉患師旅嵗興軍糧不屬静上表請於太原多置屯田以省餽運議者以人物凋零不宜動衆書奏不省静復上書辭甚切於是徴静入朝與裴寂蕭瑀封徳彛等争不能屈竟從静議嵗收數十萬斛髙祖善之六年秦王又奏請益置屯田於并州界髙祖從之竇軌為益州道行臺左僕射擊臨洮羌破其部衆軌度羌胡終為後患於松州置屯田以備後舉太宗貞觀初張儉為朔州刺史廣營屯田嵗致穀十萬斛邊糧益饒及遭霜旱儉勸百姓相贍遂免饑餒州境獨安張公謹為代州都督上表請屯田以省轉運髙宗顯慶中劉仁軌為帶方州刺史鎮守百濟於是漸營屯田積糧撫士以經畧髙麗則天天授初婁師徳為檢校豐州都督知營田事則天下書勞曰卿受委北垂總司軍任往還靈夏檢校屯田收粟既多京坻遽積不煩和糴之貴無復輸運之艱兩軍及其鎮兵數年咸得支給勤勞之誠久而彌著覽以嘉尚忻恱良深長夀元年召拜夏官侍郎判尚書事明年拜鳯閣鸞臺平章事則天謂師徳曰王師外鎮必藉邉境營田卿湏不憚劬勞更充使檢校又為河源積石懐逺等軍及河蘭鄯廓等州檢校營田大使郭元振長安中為凉州都督隴右諸軍州大使元振令甘州刺史李漢通開置屯田盡其水陸之利舊凉州粟麥斛至數千及漢通牧率之後數年豐稔遂斛至數十錢積軍糧可支數十年中宗時王晙為桂州都督桂州舊有屯兵常運衡永等州糧以饋之晙始改築羅郭奏罷屯兵又堰江水開屯田數千頃百姓頼之𤣥宗開元二十五年夏四月庚戌詔曰陳許豫夀等四州本開稲田将利百姓度其收獲甚役功庸何如分地均耕令人自種先所置屯田宜并定其地量給逃還及貧下百姓代宗大歴五年詔諸州置屯田並停特留華同澤等三州屯乃悉以度支之務委于宰臣李承大歴末為淮南淮西黜陟使奏於楚州置常豐堰以禦海潮屯田塉鹵嵗收十倍至徳宗初嚴郢為京兆尹宰相楊炎不習邉事請於豐州屯田發關輔人開陵陽渠人頗苦之郢嘗從事朔方暁其利害乃具五城舊屯及募兵倉儲等數奏曰按舊屯沃饒之地今十不耕一若力可墾闢不俟浚渠其諸屯水利可種之田甚廣蓋功力不及因致荒廢今若發兩京關輔人於豐州浚渠營田徒擾兆庶必無其利臣不敢逺引他事請以内園植稲明之且秦地膏腴田稱第一其内園丁皆京兆人於當䖏營田月一替其易可見然每人月給錢八千糧食在外内園使猶僦募不占奏令府司集事計一丁嵗當錢九十六千米七斛二斗計所僦丁三百每嵗合給錢二萬八千八百貫米二千一百六十斛不知嵗終收穫㡬何臣計所得不補所費況二千餘里發人出塞屯田一嵗方替其糧穀從太原轉餉運直至多又每人湏給錢六十三千米七斛二斗私出資費數又倍之據所收必不登本而關輔之人不免流散是虚畿甸而無益軍儲與天寳已前屯田事殊臣雖至愚不敢不熟計惟當省察䟽奏不報郢又上奏曰伏以五城舊屯其數至廣臣前已挟名聞奏訖其五城軍士若以今日所運開渠之糧貸諸城官田至冬輸之又以所送開渠功直布帛先給田者至冬令據時估輸榖如此即關輔免於徴發五城豐厚力農闢田比之浚渠十倍之利也時炎方用事郢議不省卒開陵陽渠而竟棄之劉怦為雄武軍使廣屯田節用以辦理稱李元諒貞元中為隴右節度於涇州及良原收軍田粟數萬石初将刈穫涇原節度劉昌遣兵數千屯於潘原以禦蕃㓂自是邉軍頗有積儲李復為義成軍節度使請扵白馬衛南置屯田數百畝以資軍食時人恱之孟元陽起於陳許軍中理戎整肅勤公事善部署曲環之為節度使元陽為大将環使董作於西華屯元陽盛夏芒屫立稲田中湏役者退而後就舎故其田無嵗不稔軍中足食憲宗元和三年六月以東都防禦使舊苑内營田六百五十頃至六年令河南府收管營種嵗終具所得聞奏其營田兵罷之穆宗以元和十五年正月即位二月詔諸道除邉軍營田䖏其軍糧既取正稅米分給其所管田自為軍中資用不合取百姓營田并以塉地廻換百姓肥濃地其軍中如要營田任取食糧徤卒而不得輙妄招召敬宗長慶四年七月靈武節度使奏於特進渠新置營田六百頃寳歴元年楊元卿為滄景節度使詔以所置屯田有裨國用命兼充當道營田使是冬元卿上言營田收廪粟二十萬斛請付度支充軍糧崔𢎞禮為河陽節度使上言於秦渠下闢荒田三百頃嵗收粟二萬斛從寳歴二年減去度支所給數文宗太和中殷侑為滄齊徳等州觀察使上言當管河北兩州百姓耕牛見管戸一萬三千六百九十四除老弱单獨外其間大半力堪營種去年縁無耕牛百姓掘草根充糧一年虚過饑餓相繼轉死道路臣去年躬親勸責酌量人力於一萬三千戸内每户請牛一具支絹綾五疋計三萬疋餘二千戸不得牛營田不敢不奏詔曰滄州營田已有次第耕牛欠數頻有奏論方及春農實資濟恤宜更賜綾絹一萬疋其来年将士糧米便勒本道自供六年二月户部尚書判度支王起奏靈武邠寧田土寛廣又復肥濃悉堪種蒔承前但逐年旋支錢收糴悉無貯積與本道計㑹立營田從之七年四月以宣武軍先置營田别加田卒至是勅罷其卒計所停糧五萬七千餘斛節度使楊元卿奏請於營田頃畝之内加稅小麥三萬九千餘斛以代給其糧而留其卒詔許之開成元年三月戊午度支奏請停京西營田武宗㑹昌六年五月赦節文靈武天徳三城封部之内皆有良田縁無居人久絶耕種自今已後天下囚徒合䖏死刑憤非巨蠧者特許生全并家口配流此三道仍令本軍鎮各收管安存兼接借農具務使耕植宣宗大中三年八月勑曰原州威州秦州武州並六關訪聞土地肥饒水草豐美如有百姓要墾闢耕種五年内不加稅賦五年後量定户籍便為永業其京城有犯事合流役囚徒從今後一切配十䖏收管者十䖏者謂原州秦州威州武州驛藏關石門關木峽關六盤關制勝關石峽關後唐荘宗同光三年三月西京奏制置三白渠起置營田務一十一明宗天成二年八月户部員外郎知詔誥于嶠上言請邉上兵士起置營田斆趙充國諸葛亮之術庶令且戰且耕望致輕徭十二月左司郎中盧損上言以今嵗南征運糧慶費唐鄧復郢地利膏腴請以下軍官徤興置營田庶減民役以備軍行長興元年七月前洋州節度副使程义徽陳利見請於瀛莫兩州界起置營田以備邉因授义徽莫州刺史充兩州營田使晉張希崇為靈州兩使留後先是州界與戎人交䖏每嵗以戍兵運糧經五百里有剽攘之患希崇及開故屯田諭邉士使播種軍食大濟爾玉書褒之因正授戎節冊府元龜卷五百三
