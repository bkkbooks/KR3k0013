body:
  text: 冊府元龜卷三百七宋王欽若等撰外戚部姦邪貪黷害賢譴讓姦邪夫姦其迹邪其謀有國者之所防也故書云去邪勿疑又曰除惡務本若乃席天姻之勢居肺腑之地因縁㑹遇盗竊名器繇是餙險僞之行逞邪僻之志誣搆以縱其毒諛佞以極其惡專權怙寵忌前擁己以至忘社稷之計致邦家之亂者咸載之方冊焉其亡身覆族之禍復何足道哉漢上官安以昭帝后父爲車騎將軍數守大將軍霍光爲蓋主所幸丁外人求侯守求請之及安父左將軍桀妄官禄外人不由才德故云妄光執正皆不聼又桀妻父所幸充國為太醫監闌入殿中下獄當死冬月且盡蓋主為充國入馬二十疋贖罪乃得減死論於是桀安父子深怨光而重徳蓋主知燕王旦帝兄不得位亦怨望桀安即記光過失予燕王令上書告之又爲丁外人求侯燕王大喜上書稱子路䘮姊朞而不除孔子非之子路曰由不幸寡兄弟不忍除之故曰觀過知仁今臣與陛下獨有長公主爲姊陛下幸使丁外人侍之外人宜蒙爵號書奏帝以問光光執不許及告光罪過帝又疑之愈親光而踈桀安王鳳元后之兄爲大將軍輔政成帝時定陶共王來朝因留國邸旦夕侍帝帝甚親重鳳心不便共王在京師㑹日蝕鳳因言日蝕陰盛之象為非常異定陶王雖親於禮當奉藩在國今留侍京師詭正非常故天見戒宜遣王之國帝不得已於鳳而許之共王辭去帝與相對涕泣而去淳于長少以元后姊子為黄門侍郎未進幸㑹大將軍王鳳病長侍病晨夜扶承左右甚有甥舅之恩鳳且終以長屬託太后及帝屬音之欲切成帝嘉長義拜為列校尉諸曹遷水衡都尉侍中至衛尉九卿久之趙飛燕貴幸帝欲立以爲皇后太后以其所出微難之長主徃來通語東宫歳餘趙皇后得立帝甚徳之乃追托奏請罷昌陵功賜爵列侯王根成帝舅為驃騎將軍成帝無繼嗣中山王定陶王皆入朝定陶傅太后多珍寶賂遺趙昭儀及根陰爲王求漢嗣皆見帝無子欲豫自結爲久長計更稱譽定陶王帝亦自器之遂立爲太子王莽以孝元皇后之弟子封新都侯時太后姊子淳于長以才能為卿先進在莽右名位居其右右前也莽陰求其罪過因大司馬曲陽侯根白之長伏誅莽以獲忠直名根因乞骸骨薦莽自代平帝遂擢為大司馬莽以大司徒孔光名儒相三主太后所敬天下信之於是盛尊事光引光女婿甄邯為侍中奉車都尉諸哀帝外戚及大臣居位素所不説者説讀曰悦莽皆傅致其罪傅讀曰附附益而引致之令入罪爲請奏令邯持與光光素畏懼不敢不上之莽白太后輙可其奏於是前將軍何武後將軍公孫禄坐互相舉免丁傅及董賢親屬皆免官爵徙逺方紅陽侯立太后親弟雖不居位莽以諸父内敬憚之畏立從容言太后令己不得肆意肆放也乃復令光奏立舊惡前知定陵侯淳于長犯大逆罪多受其賂爲言誤朝妄稱譽之誤惑朝廷也後白以官婢楊寄私子爲皇子衆言曰吕氏少帝復出紛紛爲天下所疑難以示來世成襁褓之功請遣立就國太后不聼莽曰今漢家衰比世無嗣比也頻太后獨代㓜主統政誠可畏懼力用公正天下尚恐不從力勉也今以私恩逆大臣議如此羣下傾邪亂從此起宜可且遣就國安後復徵召之安猶徐也太后不得已遣立就國莽之所以脅持上下皆此類也後漢竇憲章帝竇后之兄竇后之譖梁貴人憲等豫有謀焉耿寶女弟為清河孝王妃及安帝立以妃爲甘園大貴人帝以寶元舅之重使監羽林左車騎位至大將軍而附事内寵與中常侍樊豊帝乳母王聖等譖廢皇太子爲濟陰王及排陷太尉楊震議者怨之晉羊琇以景獻皇后從父弟為中䕶軍豪侈無齊限然黨慕勝己其所推奉便盡心無二窮窘之徒特能振恤選用多以得意者居先不盡銓次之理將士有冐官位者爲其致節不惜軀命楊駿以武悼皇后父爲車騎將軍武帝疾篤未有顧命功臣皆已没矣朝臣惶惑計無所從而駿盡斥羣公親侍左右因輙改易公卿樹其心腹㑹帝小間見所用者非乃正色謂駿曰何得便爾乃詔中書以汝南王亮與駿夾輔王室駿恐失權寵從中書借詔觀之得便匿藏中書令華廙恐懼自徃索之終不肯與信宿之間帝疾遂篤后乃奏帝以駿輔政帝頷之駿弟珧爲衛將軍初以退讓稱晩乃合朋黨搆出齊王攸中䕶軍羊琇與北軍中候成粲謀欲因見珧而手刃之珧知而辭疾不出諷有司奏琇轉爲太僕自是舉朝莫敢枝梧而素論盡矣賈模太尉充之從子賈后既豫朝政擢爲侍中加授光禄大夫模潛執權勢外形欲逺之每有啟奏賈后事入輙取急或托疾以避之至於素有嫌忿多所中䧟朝廷甚憚之賈謐母賈午太尉充少女也謐以充外孫嗣爲魯公賈后母郭槐欲以謐父韓夀女爲愍懐太子妃太子亦欲婚韓氏自固而夀妻賈午及后皆不聼而爲太子聘王衍小女惠風太子聞衍長女美而賈后爲謐聘之心不能平頗以爲怨謐嘗與太子圍棊争道成都王頴見而呵謐謐意愈不平因此譖太子於后曰太子廣買田業多畜私財以結小人者爲賈氏故也宻聞其言云皇后萬歳後吾當魚肉之非但如是宫車晏駕彼居大位依楊氏故事誅臣等而廢后放金墉如反手耳不如早為之所更立慈順者以自防衛后納其言又宣揚太子之短布諸逺近於時朝野咸知賈后有害太子之意後魏盧道䖍尚孝文女濟南長公主道䖍外甥李彧尚莊帝女豐亭公主因相藉托唐武三思則天皇后之兄子爲特進兼太子賔客性傾巧便僻善事人又以宗室中近屬特蒙親信天后數幸其第賞賜甚厚時薛懐義張易之張昌宗相繼被寵幸三思與從父兄承嗣每折節事之懐義將欲乘馬三思等必為之執轡又贈昌宗詩稱爲王子晉後身極筆褒美三思以天后厭居深宫又欲與張易之兄弟扈從馳騁以弄其權乃請創造三陽宫于嵩山興㤗宫于萬夀山請天后每歳臨幸前後工役甚衆百姓怨之神龍三年五月己亥中宗以榖價踊貴召太府卿紀處納親問其故翌日左驍衛將軍兼知太史令傅孝忠奏言其夜有攝提星入太微至帝座此則王者與大臣私相接大臣不能納忠故有其應三思陰諷之也韋温庶人從父兄神龍中以后族累遷户部尚書爲人庸昧李多祚舉兵之後韋氏不安拜温爲太子少保同中書門下三品以自固及韋氏臨朝温爲謀首楊國忠貴妃從父之子𤣥宗天寶中為監察御史時帝春秋髙意有所惡故國忠以此得深探上㫖其摘觖皆以是中之驟遷侍御史度支員外郎給事中御史中丞兼掌錢糓出入禁闈日加親幸武部侍郎吉温爲國忠陳移奪執政計國忠深納之刑部尚書兼京兆尹蕭炅御史中丞宋渾皆李林甫所親善國忠以飛言奏貶林甫不能救御史大夫兼京兆尹王鉷勢與國忠侔位望居其右國忠忌其與己分權㑹鉷弟銲與邢縡有姦謀事洩國忠因而䧟之坐以大逆代鉷爲御史大夫權領京兆尹五日窮竟邢縡枝黨獄成而罷又宻奏林甫黨鉷及交私阿布思狀哥舒翰陳希烈附㑹證成之帝由此疎林甫天寶末官至司空𤣥宗聞河朔變起欲以皇太子監國而自親征謀於國忠國忠大懼歸謂姊妹曰我等死在旦夕今儲宫監國當與娘子等併命矣姊妹哭訴於貴妃貴妃銜土請命其事廼止貪黷夫狥財曰貪玷官爲墨而有處帝戚之重縁外氏之恩專怙威權罔飭簠簋託勢貴寵負氣驕吝受賕以薦士通賄以亂政掊克是逞聚斂無厭乃至陷人非辜安忍取貨濫聲逺播醜跡自彰用速簡書斯可痛惜者矣漢田蚡景帝王皇后同母弟也武帝時爲太尉親貴用事時梁内史韓安國坐法失官家居以五百金遺蚡蚡言安國太后帝素聞安國賢即召以爲北地都尉田祖景帝王皇后同母弟勝子也嗣勝為周陽侯武帝元狩三年坐當歸軹侯宅不與免臣欽若等曰軹侯薄昭孫梁也後漢竇憲章徳竇皇后兄也和帝時為侍中虎賁中郎將恃宫掖聲勢遂以賤直請奪沁水公主田園沁水公主明帝女主畏逼不敢計梁冀順烈梁皇后兄也爲大將軍扶風人士孫奮居富而性吝冀因以馬乘遺之從貸錢五千萬奮以三千萬與之冀大怒乃告郡縣認奮母為其守藏婢云盗白珠十斛紫金千斤以叛遂收考奮兄弟死於獄中悉没資財億七千餘萬宋陳佛念後廢帝陳太妃叔父也爲歩兵校尉大通貨賄侵亂朝政及順帝昇明初賜死後魏髙肇文昭皇太后之兄也宣武景明初封平原郡公數日之間富貴赫奕是年咸陽王禧誅財物珍寳奴婢田宅入髙氏北齊尉景仕東魏爲太傅景妻神武之姊也以勲戚每有軍事常被委重而不能忘懐財利神武每嫌責之轉冀州刺史又大納賄發夫獵死者三百人厙狄干與景在神武坐干請作御史中尉神武曰何意下求卑官干曰欲捉尉景神武大笑令優者石董桶戲之董桶剥景衣曰公剥百姓董桶何爲不剥公神武誡景曰可以無貪也婁叡武明皇后母弟昭子也叡以外戚貴幸縱情財色爲瀛州刺史聚斂無厭婁定遠武明皇后之姪也武成帝時封臨淮王武成大漸與趙郡王等同受顧命拜司空趙郡王之奏黜和士開逺與其謀遂納士開賄成趙郡之禍其貪鄙如此唐蕭造隋大業時以后族歴太府卿巴東太守所在之職多以黷貨聞縁於外戚累原其罪賀蘭敏之則天皇后姊子也則天繼母榮國夫人楊氏卒則天内出大瑞錦令敏之造佛像追福敏之自隱用之竇􅞓昭成皇后之兄𤣥宗開元初以舅氏封畢國公而兄弟希瑊希玠皆貪鄙過自封植􅞓又甚焉王守一𤣥宗王庶人同母䨇生也性貪鄙積聚巨萬開元十一年自太子少保坐與庶人濳通左道左遷柳州别駕籍没其家財帛不可勝計薛諗𤣥宗甥也性貪猥恃託國戚恣行兇忍嘗於私第使羣奴以重賈於坊市誘販繒帛者悉於後園椎殺之竊其財經歳乃爲所告帝深惡之長流襄州死於路張清尚𤣥宗公主爲駙馬都尉肅宗乾元元年二月贊善大夫張奭狀首清受錢二千貫許奏免交倚罪帝以清子婿不寘於法勅清母決四十放贜錢初奭父爲御史大夫𤣥宗欲幸蜀改戸部尚書長安失没於賊僞授侍中至徳初克復倚懼奭遂納賄於清以求免罪梁趙巖尚太祖女長樂公主授衞尉卿末帝即位爲租庸使守户部尚書巖以勲戚自負貨賂公行天下之賂半入其門豐其飲饌動費萬錢僦斂網羅其徒如市權勢燻灼人皆阿附害賢害仁以求生先聖之深戒傷賢而被禍徃志之明徵降自漢代政化多缺寵母后之黨貴皇孋之族位髙而難制勢去而莫遏故有竊弄政柄擅作威虐光寵支附忌克忠良造爲飛條誣以深釁諷希㫖之吏極文致之辜俾良士滯於下僚忠臣陷於非辟天之癉惡戚以自貽故昔之明王所以右賢而左戚者誠有旨哉漢田蚡以孝景王皇后同母弟為丞相初魏其侯竇嬰聞有劾即陽病痱不食欲死或聞帝無意殺嬰復食治病議定不死矣廼有飛語爲惡言聞上蚡爲坐飛揚誹謗之語也故嬰論棄市渭城王莽以元后之子為大司馬初前將軍何武舉後將軍公孫禄可大司馬而禄亦舉武太后竟用莽莽諷冇司劾奏武禄互相舉皆免武就國元始三年吕寛等事起武在見誣中大理正檻車徵武武自殺後漢竇憲以章徳皇后之兄爲大將軍初梁諷為憲軍司馬後忤憲意髠輸武威武威太守承㫖殺之又何敞數切諫言諸竇罪過憲等深怨之時濟南王康尊貴驕甚憲乃白出敞爲濟南太傅梁商以順烈皇后之父爲大將軍初王堂爲汝南太守商及尚書令袁湯以屬不行並恨之後廬江賊迸入弋陽界堂勒兵追討即使奔散而商湯猶因此諷州奏堂在任無警免歸家梁冀以順烈皇后之兄爲大將軍太尉李固議立清河王蒜爲嗣冀不從後歳餘甘陵劉文魏郡劉鮪共爲妖言下獄門生勃海王調貫械上書證固之枉河内趙承等數千人亦要鈇鑕詣闕通訴字林曰鈇鑕椹也鑕音質椹音竹心切太后明之乃赦焉及出獄京師市里皆稱萬歳冀聞之大驚畏固明徳終爲己害乃更據奏前事遂誅之又皇甫規舉賢良方正對䇿帝忿其刺己以規爲下第拜郎中託疾免歸州郡承冀㫖幾陷死者再三又杜喬爲太尉在位數月以地震免宦者唐衡左悺等因共譖於帝曰陛下前當即位喬與李固抗議言上不堪奉漢宗祀帝亦怨之及清河王蒜事起冀遂諷有司劾喬及李固與劉鮪等交通請逮案罪而梁太后素知喬忠但䇿免而已冀愈怒使人脅喬曰早從宜妻子可得全喬不肯明日冀遣騎至其門不聞哭者遂白執繫之死獄中妻子歸故郡冀又聞郎崔琦才請與交琦作外戚箴白鵠賦諷冀冀怒遣歸後除為臨濟長不敢之職解印綬去冀遂令刺客陰求殺之又种暠為益州刺史時永昌太守冶鑄黄金爲文蛇以獻冀暠糾察逮捕馳傳上言而二府畏懦不敢案之冀由是銜怒於暠㑹巴郡人服直聚黨數百人自稱天王暠與太守應承討捕不克吏人多被傷害冀因此䧟之傳逮暠承太尉李固上疏梁太后省奏乃赦暠承罪免官而已又馬融爲南郡太守先有事忤冀冀諷有司奏融在郡貪濁免官髠徙􅃋方自刺不死得赦還又陳龜爲度遼將軍既到職州郡重足震慄鮮卑不敢近塞冀與龜素有隙譖其沮毁國威挑取功舉挑猶取也獨取其名如挑戰之義不爲胡虜所畏坐徵還遂乞骸骨歸田復徵爲尚書冀虐日甚龜自知必爲冀所害不食七日而死晉楊駿以武悼皇后之父爲車騎將軍輔政惠帝即位以張華為太子少傅與王戎裴楷和嶠俱以徳望爲駿所忌皆不與朝政唐武承嗣以則天兄子為文昌左相時張嘉福等請立承嗣爲皇太子則天以問地官尚書格輔元固稱不可承嗣譖之故及於禍天授三年二月御史中丞來俊臣奏言鳳閣侍郎任知古地官侍郎狄仁傑冬官侍郎裴行本司農卿裴宣禮前文昌右丞盧獻可御史中丞魏元忠潞州刺史李嗣眞並謀逆請誅之制不許特令免死承嗣奏曰仁傑等包藏逆節事迹並彰陛下雖欲屈法伸恩無以懲艾凶慝帝曰朕好生惡殺志在恤刑渙汗已行不可更返殿中侍御史霍獻可奏曰陛下不殺裴宣禮等臣請絶命於前遂以頭觸殿陛血流覆面獻可即宣禮之甥以此表人臣之節鳳閣舍人向光道侍御史張知黙又極言請誅之不許准左授知古江夏縣令仁傑彭澤令宣禮夷陵令元忠江陵令獻可西鄉令行本嗣真流於嶺表武三思以則天兄子爲司空同中書門下三品初敬暉等立功後即掌知國事桓彦範爲侍中時韋皇后既干朝政三思又居中用事以則天爲彦範等所廢常深憤怨又慮彦範等漸除武氏乃先事圖之皇后韋氏既雅爲帝所信寵言無不從三思乃日夕讒毁彦範等帝竟用三思計進封彦範為扶陽郡王敬暉為平陽郡王張柬之爲漢陽郡王崔𤣥暐為愽陵王袁恕為南陽郡王加並特進令罷知政事三思又慮其更爲己患乃令其子崇訓因安樂公主搆暉等並流於嶺表而死雍州人韋月將髙軫等並上疏言三思父予必為逆亂三思知而求索其罪有司希㫖奏月將坐當棄市軫配流嶺外黄門侍郎宋璟執奏月將所犯不合死三思怒竟斥璟爲外職楊國忠以𤣥宗貴妃之從祖兄也爲右相初顔真卿天寶中為殿中侍御史東都畿内採訪判官轉侍御史武部員外國忠怒其不附已出爲平原太守譴讓夫寵而不驕其人葢寡盈難久恃在理固然夫以姻接天枝親連帝胄咳唾生珠玉呼吸下霜露膏粱之性既安居而忘危髙明之家故蒙禍而常酷誠防閑之失道亦漸摩之使然是以傅后干朝稚游數以爲諫東平致問肅宗笑而不言良有以哉漢薄昭以文帝舅為將軍封軹侯十年昭殺漢使者帝不忍加誅使公卿從之飲酒欲令自引分昭不肯使羣臣喪服徃哭之乃自殺竇嬰孝文皇后從兄子景帝即位爲詹事太后憎嬰亦薄其官因病免太后除嬰籍不得朝請霍禹以宣帝后兄嗣父光博陸侯爲右將軍初帝始立帝微時許妃為皇后光夫人顯愛小女成君欲貴之私使乳醫淳于衍行毒藥殺許后乳醫視産乳之疾者乳音而樹切因勸光内成君代立爲后光薨後語稍泄於是帝始聞之未察未知其虚實廼徙光女壻度遼將軍未央衛尉平陵侯范明友爲光禄勲次壻諸吏中郎將羽林監任勝出為安定太守數月復出光姊壻給事中光禄大夫張朔爲蜀郡太守羣孫壻中郎將王漢爲武威太守頃之復徙光長女壻長樂衛尉鄧廣漢爲少府更以禹爲大司馬冠小冠亡印綬罷其右將軍屯兵官屬特使禹官名與光俱大司馬者特但也又收范明友度遼將軍印綬但爲光禄勲及光中女胥趙平為散騎都尉光禄大夫將屯兵又收平騎都尉印綬諸領胡越騎羽林及兩宫衛將屯兵悉易以所親信許史子弟代之王商以元后弟封成都侯商嘗病欲避暑從成帝借明光宫黄圖云明光宫在城内近桂宫也後又穿長安城引内灃水注第中大陂以行船立羽盖張周帷輯濯越歌輯與楫同濯與櫂同皆所以行船令執楫櫂人爲越歌也楫謂櫂之短者也今吳越之人呼爲橈音鐃越歌爲越之歌也帝幸商第見穿城引水意恨内衘之未言後微行出過曲陽侯第又見園中土山漸臺似類白虎殿黄圖云在未央宫於是帝怒以讓車騎將軍音商根兄弟欲自黥劓謝太后帝聞之怒廼使尚書責問司𨽻校尉京兆尹知成都侯商擅穿帝城決引灃水曲陽侯根驕奢僭上赤墀青鎻以青畫戸邉鏤中天子制也青鎻者刻爲連鎻文而以青塗之紅陽侯立父子藏匿奸猾亡命賔客爲羣盗司𨽻京兆皆阿縱不舉奏正法二人頓首省户下又賜車騎將軍音䇿書曰外家何甘樂禍敗言此罪過並自爲之而欲自黥劓相戮辱於太后前傷慈母之心以危亂國外家宗族强上一身寖弱日久寖漸也今將一施之行刑罰君其召諸侯令待府舍令摠集音之府舍待詔命是日詔尚書奏文帝時誅將軍薄昭故事車騎將軍音籍槀請罪自坐槀上言就刑誅也商立根皆負斧質謝帝不忍誅然後得己商子况嗣成都侯綏和二年坐山陵未成置酒歌舞免王莽以元后兄子爲大司馬封新都侯哀帝時傅太后丁姬皆稱尊號丞相朱博奏莽前不廣尊尊之義抑貶尊號虧損孝道當伏顯戮幸蒙赦令不宜有爵土請免爲庶人帝曰以莽與太皇太后有屬勿免遣就國王邑以元后兄子爲侍中矯稱太皇太后㫖白哀帝為求特進給事中帝復請之事發覺哀帝乃更以此事請於太后太后云無此言故矯事發覺也復音扶目切太后爲謝帝以太后故不忍誅之左遷邑爲西河屬國都尉削千戸後漢竇融爲衛尉子穆尚内黄公主穆子勲尚泚陽公主明帝永平二年融從兄子䕶羌校尉林以罪誅帝繇是數下詔切責融戒以竇嬰田蚡禍敗之事田蚡武帝王皇后異父弟也爲丞相搆㑹竇嬰之罪使至誅戮融惶恐乞骸骨詔令歸第養病歳餘聼上衛尉印綬穆等遂交通輕薄屬託郡縣干亂政事以封在安豐欲令姻戚悉據故六安國遂矯稱陰太后詔令六安侯劉盱去婦因以女妻之五年盱婦家上書言狀帝大怒乃盡免穆等官諸竇為郎吏者皆將家屬歸故郡獨留融京師梁松尚舞陰長公主爲太僕竇固尚湼陽公主爲中郎將明帝永平初越騎司馬杜保仇人上書訟保爲行浮薄亂羣惑衆伏波將軍萬里還書以誡兄子而梁松竇固以之交結將煽其輕僞敗亂諸夏書奏帝召責松固以訟書及援誡書示之松固叩頭流血而得不罪詔免保官馬廖以明徳皇后兄封順陽侯章帝建初四年以特進就第是時馬氏失勢廖性寛綬不能教敕子孫子豫為歩兵校尉遂投書怨誹又廖弟防光奢侈好樹黨與八年有司奏免豫遣廖防光就封豫隨廖歸國考擊物故竇憲以章徳皇后兄爲虎賁中郎將憲恃宫掖聲勢遂以賤直請奪沁水公主園田沁水公主明帝女主逼畏不敢計後章帝駕出過園指以問憲憲陰喝不得對陰喝猶噎塞也陰音於禁切喝音一介切或作嗚音烏故切後發覺帝大怒召憲切責曰深思前過奪主田園時何用愈趙髙指鹿爲馬愈猶差也久念使人驚怖昔永平中嘗令陰黨陰博鄧疊三人更相糾察以陰鄧皆外戚恐僭踰故使更相糾察也博陰興之子故諸豪戚莫敢犯法者而詔書切切猶以舅氏田宅為言切切猶勤勤也今貴主尚見枉奪何况小人哉國家棄憲如孤雛腐鼠耳鳥子生而啄者曰雛憲大震懼皇后爲毁服深謝良久乃得解使以田還主不繩其罪然亦不授以重任晉庾亮明穆皇后之兄也明帝末爲䕶軍將軍南頓王宗素被親信成帝初亮輔政宗謀廢執政亮殺宗帝不之知及蘇峻平問亮曰當日白頭翁何在亮對以謀反伏誅帝泣謂亮曰舅言人作賊便殺之人言舅作賊若何亮懼變色庾懌以成帝舅為西中郎將鎭蕪湖嘗以毒酒餉江州刺史王允之允之覺其有毒飲犬犬斃乃宻奏之帝曰大舅已亂天下小舅復欲爾邪懌聞遂飲鴆而卒梁王寔尚武安公主爲南康嗣王湘州長史王三日出禊寔衣冠傾欹王性方嚴見之意殊惡寔稱主名謂王曰蕭王誌念寔殿下何見憎王驚赧即起後宻啟之因此廢錮後魏馮修以文明太后兄子為尚書封東平公其兄誕性淳篤修乃浮競誕亦未能誨督其過然時言於太子孝文嚴責之至於楚捶唐程昌裔尚廣平公主天寶十載正月望夜楊貴妃家五宅夜遊與公主騎從争西市門楊氏奴揮鞭及公主衣公主墮馬昌裔扶公主因及數撾公主泣奏之帝令殺楊氏奴昌裔亦停官王士平尚徳宗女義陽公主爲駙馬都尉貞元十二年五月經代宗忌辰駙馬諸親悉詣銀臺奉慰及廻士平遂邀駙馬郭曖張昭賢張怙及女壻嗣許王昭曖堂弟煦暅并教坊音聲人曹自慶並於宅中飲樂徳宗怒之下詔曰先聖忌辰纔經叙慰戚里之内固在肅恭而乃遽從宴遊飲酒作樂既乖禮法須有所懲前汾州長史郭煦宜於袁州安置前南鄭縣尉郭暅於柳州安置曹自慶配流永州其駙馬郭曖王士平仍令並歸私第是歳士平與公主忿争監使奏其狀令公主入内安置中使令士平送歸宅不許出入崔杞尚順宗女東陽公主爲駙馬都尉憲宗元和五年正月勅公主及妃所賜錢粟等並宜權停于季友司空頔第四子尚憲宗女永昌公主為殿中少監駙馬都尉季友兄敏誘梁正言之僮支解棄於溷中敏奴王再榮詣銀臺門告詔三司使案問乃投死奴於其第獲之頔貶爲恩王傅敏長流雷州季友追奪兩任官階令在家循省韋讓爲駙馬都尉敬宗寶歴元年讓以善決百姓罰兩季俸料劉垍爲駙馬都尉文宗太和三年任隴州刺史於本道節度使禮不恭爲其所舉降爲果州刺史又濳入京詔下臺司鞫問翌日放歸私第尋除陜州刺史馳驛赴任韋處仁為駙馬都尉嘗入見巾夾羅巾以進文宗曰本慕卿門户清素故俯從選尚如此市服從他諸族爲之卿不須爲也竇澣尚延安公主爲駙馬都尉太和四年正月勅以公主衣服踰制從夫之義過有所歸宜罰澣兩月賜錢册府元龜卷三百七
