body:
  text: 册府元龜巻八百三十六宋王欽若等撰總錄部養生韜晦養生文子曰太上養神其次養形夫人之生也禀天地之中鍾五行之秀資之以恬淡則生理固濟之以頥攝則徳寓充蓋夫導引以為壽著於蒙莊之說吐吸以練藏傳夫王吉之論養生之時義逺矣其有養其外而不養其内者或被其苦養其内而不養其外者亦嬰乎害此偏枯之人不足尚也若乃内外相養形神交泰六疾不生世患罔極斯達人之善養哉故潛山隱谷服芝餌术静居導引熊經鴟顧以養形也絶慮棄智黜聰去羡𤣥真寡欲清虛自守以養神也乃有益壯不衰長齡加倍與夫大勞而弊不節而嗟者異焉周老子百有六十餘嵗或言二百餘嵗以其修道而養壽也漢張良以髙祖五年封畱侯良從入關性多疾即導引不食穀服辟穀藥而静居行起閉門不出後行太子少傅事願棄人間事欲從赤子遊赤松子僊人號也神農時為雨師服水玉教神農能入火不燒乃學道欲輕舉道謂仙道後漢矯慎隱遯山谷因穴為室仰慕松喬道引之術王充㑹稽上虞人刺史董勤辟為從事轉治中自免還家年漸七十力志衰耗乃造養性書十六篇裁節嗜欲頥神自守蘇順京兆霸陵人也以才學見稱好養生術隱處求道晚乃仕拜郎中卒於官華佗字元化沛國譙人一名敷曉養性之術年且百嵗而猶有壯容時人以為仙廣陵吳普彭城樊阿皆從佗學普依凖佗治療多所全濟佗語普曰人體欲得勞動但不當使極爾動揺則穀氣得消血脉流通病不得生譬猶户樞不朽也是以古之僊者為導引之事熊經鴟顧熊經若熊之攀枝自懸鴟顧身不動而回顧也引挽腰體動諸關節以求難老吾有一術名五禽之戱一曰虎二曰鹿三曰熊四曰猿五曰鳥亦以除疾兼利蹄足以當導引體中不快起作一禽之戱沾濡汗出因上著粉身體輕便而欲食普施行之年九十餘耳目聰明齒牙完堅阿從佗求方可服食益於人者佗授以漆葉青䴴散青䴴一名地節一名黄芝主五藏益精氣本出於迷入山者見仙人服漆以告佗佗以為佳語阿阿又祕之葉屑一斗青䴴十四兩以是為率言久服去三蟲和五臟輕體使人頭不白阿從其言壽百餘嵗冷壽光與華佗同時年可百五六十嵗嘗屈頸鷮息鷮雉也鬚髪盡白而色如三四十嵗魯女生長樂人初餌胡麻及术絶穀八十餘年日少壯色如桃花日能行三百里走及麞鹿女生與華佗同時而說明帝時事甚明了議者疑其時人也董卓亂後莫知所在封君達隴西人初服黄連五十餘嵗入鳥舉山服水銀百餘年還鄉里如二十年聞魯女生得五岳圖連年請求女生未見授王真上黨人年且百嵗視之面有光澤似未五十者自云周流登五岳名山悉能行胎息胎食之方𠻳舌下泉咽之不絶房室一云真宗經習閉氣而吞之名曰胎息𠻳舌下泉而咽之名曰胎食真絶穀百餘年肉色光美力竝數人孟節上黨人能含棗核不食可至五年一年又能結氣不息身不動揺狀若死人可至百日半年亦有室家晉嵇康字叔夜嘗脩養性服食之事彈琴詠詩自足於懐以為神仙禀之自然非積學所得至於導養得理則安期彭祖之壽可及乃著養生論官至中散大夫張中字巨和中山人永嘉之亂隱於泰山恬靖寡欲清虛服氣飡芝餌石修導養之方郭瑀隱於臨松薤谷鑿石窟而居服栢實以輕身陶淡字處静幼孤好導養之術謂仙道可祈年十五六便服食絶穀不婚娶家累千金僮客百數淡終日端拱曽不營問於長沙臨湘山中結廬居之州舉秀才淡聞遂轉逃羅縣埤山中莫知所終宋劉凝之字志安隱居衡山之陽登髙嶺絶人迹處為小屋居之採藥服之南齊顧歡吳郡鹽官人好學於天臺山開館聚徒晚節服食不與人通梁陶𢎞景丹陽秣陵人幼有異操年十嵗得葛洪神仙傳書一夜研尋便有養生之志謂人曰仰青雲覩白日不覺為逺矣天監四年移居積金澗行辟穀導引之法年逾八十而有壯容深慕張良之為人云古賢莫比劉虬字靈預為當陽令罷官歸家静處斷穀餌术及胡麻後魏崔浩為左光禄大夫以公歸第因欲修服食養性之術而㓂謙之有神中錄圖新經浩因師之徐謇字成伯善醫嘗有藥餌及吞服道符年垂八十而鬢髪不白力未多衰北齊繇吾道榮瑯琊人隱於瑯琊山辟穀餌松术茯苓求長生之祕隋徐則幼沉静寡嗜欲後辭入天台山因絶粒養性所資惟松术而已唐王希夷孤貧好道隱於嵩山師道士黄頥向四十年盡傳其閉氣導養之術嘗餌松柏葉及雜花散博通子史尤明莊老及易景龍中年已七十餘氣力益壯孫思邈隱居太白山自言九十三嵗鄉里咸云數百嵗髙宗顯慶中被徴至時盧照隣有惡疾固問思邈名醫愈疾之道又問人事如何思邈曰膽欲大而心欲小智欲圓而仁欲方照隣曰何謂也思邈曰心為五臟之君君以恭慎為主故心欲小膽為五臟之將將以果决為務故膽欲大智者動象天故欲圓仁者静象地故欲方詩曰如臨深淵如履薄氷謂小心也赳赳武夫公侯干城謂大膽也傳曰不為利回不為義疚仁之方也易曰見機而作不俟終日智之圓也照隣又嘗問曰養性之道其要何也邈曰天道有盈缺人事多迍厄茍不自慎而能濟於迍厄者未之有也故養性之士先知自慎慎者嘗以憂畏為本經曰人不畏威則大威至矣憂畏者生死之門存亡之繇禍福之本吉凶之元也故士無憂畏則仁義不立農無憂畏則稼穡不滋工無憂畏則規模不設商無憂畏則貨殖不成子無憂畏則孝敬不篤父無憂畏則慈愛不著臣無憂畏則勲庸不立君無憂畏則社稷不安故養性者失其憂畏則心亂而不理形躁而不寜神散則氣越志蕩而意昏應生者死應存者亡應吉者凶故憂畏者猶水火不可暫忘也人無憂畏子弟為勍敵妻妾為仇讐是故太上畏道其次畏物其次畏人其次畏身憂於身者不拘於人畏於己者不制於彼慎於小者不懼於大戒於邇者不悔於遠能如此者水行蛟龍不能害陸行虎兕不能傷五兵不能染䜛賊誹謗毒螫不能加害知此則人事畢矣仲長子隱士也服食養性潘師正清静寡欲居於嵩山之逍遥谷積二十餘年但服松葉飲水而已司馬承禎師事潘師正傳其符録及辟穀導引服餌之道孟詵為同州刺史中宗神龍初致仕歸伊陽之山第年雖晚暮志力如壯嘗謂所親曰若能保身養性者常湏善言莫離口良藥莫離手趙昌年七十二精徤如少年徳宗甚竒之憲宗元和三年除華州刺史辭於麟徳殿時年八十趨拜輕㨗占對詳明帝退而嘆異詔宰臣密訪頥養之道以奏焉栁公度善攝生年八十餘歩履輕便或祈其術曰吾初無術但未嘗以元氣佐喜怒氣海嘗温耳後唐許寂不知何許人少有道術茹芝絶粒寓居江陵節度使趙凝昆季禮遇之延之中堂師授保養之道唐末除諌官不起漢南謂之徴君梁攻襄陽趙凝兄弟棄鎮奔蜀與寂偕行嵗餘蜀人知之蜀主王建待以師禮後位至蜀相同光末平蜀與王衍俱徙于東卜居于雒寂以髙年精彩猶徤冲漠寡言時獨語云可怪可怪人莫知其際言有還丹煮金之術不知信否卒時年八十餘晉盧損為祕書監拜章辭位乃授户部尚書致仕退居潁川時李鏻年將八十善服氣導引損以鏻之遐壽有道術酷慕之仍以潁川逼城市乃卜居陽翟立隱舎誅茅種藥山衣野服逍遥於隱几之間出則柴車鶴氅自稱具茨山人晚年與同遊五六人於大隗山中古宫觀址疏泉鑿坏為隱所誓不復出山氣嚴寒被病而卒時年八十餘齒髪不衰而有壯容損於修攝似有所得韜晦夫用晦而明犧易之㫖深藏若虛老氏之訓與其錚錚而罹患孰若恂恂而俟命有竒才盛徳偉度壯心可以樹功名可以經邦國而乃罹此多難不能自奮或辱在泥滓或委於檻穽屈髙翔之羽同夫雌伏藏兼濟之用以之同塵葆光而内融懐寳而自處不形于色克保其真亦既安全終復顯發信君子之大受達人之盛徳者哉甯武子衛大夫也夫子云甯武子邦無道則愚其愚不可及也荆軻衛人也游於邯鄲魯句踐與荆軻博爭道魯句踐怒而叱之荆軻黙而逃去遂不復㑹至燕而髙漸離飲於燕市酒酣髙漸離擊筑荆軻和而歌於市中相樂也已而相泣旁若無人毛公薛公皆趙之處才也毛公藏於博徒薛公藏於賣漿漢欒布梁人也彭越為家人時嘗與布游家人猶編户也窮困賣庸於齊為酒家保庸謂庸作受顧保謂保可任使數嵗别去而布為人所略賣為奴於燕為其家報仇燕將臧荼舉以為都尉樊噲以屠狗為事時人食狗以羊豕同故噲專屠以賣後與髙祖俱隱於芒碭山澤間陳勝起蕭何曹參使噲求迎髙祖立為沛公位至相國封舞陽侯酈食其好讀書家貧落魄無衣食業魄音薄落魄失業無歸也為里監門然吏縣中賢豪不敢役吏及賢者豪者皆不敢使役食其皆謂之狂生後歸漢號廣野君東方朔武帝時為郎數召至前談語時賜之食於前飲已盡懐其餘肉持去衣盡汚數賜縑帛擔揭而去後用所賜錢帛取少婦於長安中好女率取歸一嵗取者即棄去更取婦所賜錢財盡索之於女子主左右諸郎半呼之狂人人主聞之曰令朔在事無為是行者若等安能及之哉朔任其子為郎又為侍謁者嘗持節出使朔行殿中郎謂之曰人皆以先生為狂朔曰如朔等所謂避世於朝廷間者也古之人乃避世於深山中時坐席中酒酣據地歌曰陸沈於俗避世金馬門宫殿中可以避世全身何必深山之中蒿廬之下金馬門者官署門也傍有銅馬故謂之曰金馬門東郭先生齊人也以方士久待詔公車貧困饑寒衣敝履不完行雪中履有上無下足盡踐地道中人笑之東郭先生應之曰誰能履雪中令人視之其上履也其履下處乃似人手足者乎及其拜為二千石佩青緺音𤓰一音螺青綬也出宫門行謝主人故所以同官待詔者等比祖道於都門外榮華道路立名當世此所謂衣褐懐寳者也任安少孤貧為人將車之長安求為小吏於是安與田仁俱為衛將軍舎人居門下同心相愛此二人家貧無錢用以事將軍家監家監使養惡齧馬兩人同牀卧仁竊言曰不知人哉家監也安曰將軍尚不知人何乃家監也後漢王君公遭亂儈牛自隱儈為平㑹兩家買賣之價時人謂之論曰避世牆東王君公君公明易為郎數言事不用自汚與官婢通免歸詐狂儈牛口無二價也向栩朝歌人少時為書生性卓詭不倫嘗讀老子狀如學道又似狂生好被髪著絳綃頭綃生絲也當作燥音此消切嘗於竈北坐板床上如是積乆板乃有膝踝足指之處不好語言而喜長嘯賔客從就輒伏而不視有弟子名為顔淵子貢季路冉有之軰或騎驢入市乞丐於人或悉要諸乞兒俱歸止宿為設酒食時人莫能測之後為侍中孔嵩南陽人初游太學後家貧親老乃變姓名傭為部野阿里街卒友人荆州刺史范式行部縣選嵩為導騶迎式式見而識之勑縣代嵩嵩以先傭未竟不肯去嵩官至南海太守第五倫字伯魚京兆長陵人為鄉嗇夫平徭賦理怨結得人歡心自以為久宦不達遂將家屬客河東變名姓自稱王伯齊載鹽徃來太原上黨所過輒為糞除而去陌上號為道士親友故人莫知其處後京兆尹閻興召為主簿公沙穆少游太學無資糧乃變服客傭為吳祐賃舂後為遼東屬國都尉仇覽少為儒生淳黙鄉里無知者年四十縣召補吏後為蒲亭長荀恱性沉静美姿容尤好著述靈帝時閹宦用權士多退身窮處恱乃託疾隱居時人莫之識從弟彧特稱敬焉後辟鎮東將軍曹公府仲長統山陽髙平人性倜儻敢直言不矜小節毎列郡命召輒稱疾不就語黙無常時人或謂之狂魏郭嘉為司空軍祭酒嘉少有遠量漢末天下將亂自弱冠匿名迹密交結英儁不與俗接故時多莫知惟識達者竒之嚴幹義者馮翊東縣人質性重厚有器識㑹三輔亂人多流宕而幹義不去與諸知故相浮沈採樵自活王烈字彦考名聞在邴原管寜之右辟公孫度長史以商賈自穢太祖命為丞相掾未至卒蜀杜微字國輔梓潼涪人少受學於廣漢任安劉璋辟為從事以疾去官及先主定蜀微嘗稱聾閉門不出諸葛亮依從父𤣥𤣥依袁術後徃荆州依劉表𤣥卒亮躬耕壠畝好為梁父吟家于南陽之鄧縣在襄陽城西二十里號曰隆中亮在荆州時建安初與潁川石廣元徐元直汝南孟公威等俱游學三人務於精熟而亮獨觀其大略每晨夜從容嘗抱膝長笑而謂三人曰卿諸人仕進可至郡守刺史也三人問其所至亮但笑而不言後公威思鄉里欲北歸亮謂之曰中國饒士大夫遨游何必故里邪亮位至丞相晉阮籍字嗣宗本有濟世志為歩兵校尉屬魏晉之際天下多故名士少有全者籍繇是不與世事遂酣飲為常雖不拘禮教然發言𤣥逺不臧否人物又云魏末阮籍有才而嗜酒荒放露頭㪚髪祼袒箕踞作二千石不治官事日與羣下共飲酒歡呼時人或以籍生在魏晉之交欲佯狂避時不知籍本性自然也山濤字巨源早孤居貧少有器量介然不羣性好莊老每隱身自晦後為侍中領吏部魏舒字陽元不修常人之節不為皎厲之事累遷後軍將軍鍾毓長史毓每與叅佐射舒常為畫籌而已後遇朋人不足以舒滿數毓初不知其善射舒容範閑雅發無不中舉坐􅕎然莫有敵者毓嘆而謝曰吾之不足以盡卿才有如此射矣位至司徒王衍字夷甫武帝泰始八年詔舉竒才可以安邊者衍初好論從横之術故尚書盧欽舉為遼東太守不就於是口不論世事唯雅詠𤣥虛而已王長文廣漢人州辟别駕乃微服竊出舉州莫知所之後於成都市中蹲踞齧胡餅刺史知其不屈禮遣之王湛少言語初有隱徳人莫能知兄弟宗族皆以為癡其父昶獨異焉湛兄子濟嘗詣湛見牀頭有周易問曰叔父何用此為湛曰體中不佳時脫復看耳濟請言之湛因剖析𤣥理微妙有竒趣皆濟所未聞也濟才氣抗邁於湛略無子姪之敬既聞其言不覺慄然心形俱肅畱連彌日累夜自視缺然乃嘆曰家有名士三十年而不知濟之罪也既而辭去湛送至門濟有從馬絶難乘濟問湛曰叔頗好騎不湛曰亦好之因騎此馬姿容既妙廻䇿如縈善騎者無以過之還白其父曰濟始得一叔乃濟以上人也武帝亦以湛為癡每見濟輒調之曰卿家癡叔死未濟嘗無以答及是帝又問如初濟曰臣叔殊不癡因稱其美帝曰誰比濟曰山濤以下魏舒以上時人謂湛上方山濤不足下比魏舒有餘湛聞曰欲處予以季孟之間乎卒為汝南内史􅄞康善鍜以向秀為之佐相對欣然傍若無人又共吕安灌園於山陽康後仕至中散大夫王舒字處明丞相導之從弟父㑹侍御史舒少為從兄敦所知以天下多故不營當時名嘗處私門潛心學殖年四十餘州禮命太傅辟皆不就王述性沉静每坐客馳辨異端並起而述處之恬如也少襲父爵年三十尚未知名人或謂之癡司徒王導以門地辟為中兵屬既見無他言惟問以在東米價述但張目不答遵曰王掾不癡人何言癡也官至衛將軍尚書令顧榮懐帝永嘉初為尚書郎太子中舎人廷尉正嘗縱酒酣暢謂友人張朝曰惟酒可以忘憂但無如作病何耳齊王冏召為大司馬主簿冏擅權驕恣榮懼及禍終日昏酣不綜府事以情告友人長樂馮熊又謂冏長史葛􅒅曰以顧榮為主簿所以甄㧞才望委以事機不復計南北親疎欲平海内之心今府大事殷非酒客之政􅒅曰榮江南望士且居職日淺不宜輕代易之熊曰可轉為中書侍郎榮不失清顯而府更收實才􅒅然之白冏以為中書侍郎在職不復飲酒人或問之曰何前醉而後醒邪榮懼罪乃復更飲謝鯤不狥公名無砥礪行居身於可否之間雖自處若穢而動不累髙王敦有不臣之迹顯於朝野鯤知不可以道規正乃優㳺寄適不屑政事從容諷議卒嵗而已為王敦大將軍長史謝安少有重名不就徴辟時弟萬為西中郎將總藩任之重安妻劉惔妹也既見家門富貴而安獨静退乃謂曰丈夫不當如此耶安掩鼻曰恐不免耳及萬黜廢安始有仕進志時年已四十有餘矣後辭大司馬桓温府官至太保幸靈豫章建昌人性少言與小人羣居見侵辱而無愠色邑里號之癡雖其父母兄弟亦以為癡也嘗㸔稻羣牛食之靈見而不驅待牛去乃徃理其殘亂者其父母見而怒之靈曰夫萬物生天地之間各欲得食牛方食奈何驅之其父愈怒曰即如汝言復用理壊者何為靈曰此稻又欲得終其性牛自犯之靈可以不收乎宋鮑照世祖時為中書舎人帝好為文章自為物莫能及照悟其自為文多鄙言累句當時咸謂照才盡實不然也徐羡之為司空録尚書令頗工奕碁觀戱嘗若未觧當世以此推之傅亮蔡郭嘗言徐公曉萬事安異同南齊王僧䖍弱冠善𨽻書宋孝武欲擅書名僧䖍不敢顯迹大明世嘗用屈筆書以此見容位至侍中特進左光禄大夫謝􅊪朏之弟朏為吳興太守􅊪於征虜渚送别朏指􅊪口曰此中唯宜飲酒􅊪建武之朝為吏部尚書專以長酣為事與劉瑱沈昭略交飲各至數斗沈昭略為臨海太守御史中丞昭略明帝建武世嘗酣酒以自晦後魏任城王澄宣武時為太子太保於時髙肇當朝猜忌賢戚澄為肇間搆嘗恐不全乃終日昏飲以示荒敗所作詭越時謂為狂崔巨倫為殷州刺史在州䧟賦葛榮聞其才名欲用為黄門侍郎巨倫心惡之至五月五日㑹集官僚令巨倫賦詩巨倫乃曰五月五日時天氣已大熱狗便呀欲死牛復吐出舌以此自晦獲免栁遠字季雲為儀同開府叅軍事放情琴酒之間每出行反家或問有何消息答曰無所聞縱聞亦不觧北齊邢劭為著作佐郎文學典麗既贍且速嘗為先達所嫉屬尚書令元羅出鎮青州啟為府司馬遂在青土終日酣賞盡山水之致隋王世積為上柱國甚見隆重世積見文帝性忌刻功臣多獲罪繇是縱酒不與執政言及時事帝以為有酒疾舎之宫内令醫者療之世積詭稱疾愈始得就第李士謙趙郡平棘人隋有天下畢志不仕時平生為詠懐詩輙毁棄其本不以示人唐裴遵慶絳州聞喜人志氣深厚機鑑敏達自幼強學博渉載籍謹身晦迹不干當世之務位至黄門侍郎平章事楊綰尤工文詞藻思清贍含光晦用不欲名彰每屬文耻於自白非知己不可得而見也後位至中書侍郎平章事册府元龜卷八百三十六
