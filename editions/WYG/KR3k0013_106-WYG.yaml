body:
  text: 冊府元龜巻一百六宋王欽若等撰帝王部惠民第二唐代宗廣徳二年浙東諸州以討平賊帥袁晁瘡痍初復乃加賑恤大厯四年四月連雨至八月京城米斗八百文官出米二萬石減估而糶以惠貧民十一年三月以杭州前歲水災命右散騎常侍蕭昕使于杭州宣慰賑給徳宗以大厯十四年五月即位七月庚午詔邕州所奏金坑誠為潤國語人于利非朕素懐方以不貪為寳惟徳繫物豈尚兹難得之貨生其可欲之心邪其金坑任人開採官不得占十月辛卯以官豢豕三千給貧人興元元年十月乙亥詔曰頃戎役繁興兩河尤劇農桑俱廢井邑為墟丁壯服其干戈疲羸委於溝壑厯河朔而至太原自淮沂而被雒汭虫螟為害雨澤愆時然猶徵賦未息征役未寧凍餒流離寄命無所其宋亳淄青澤潞河東恒冀幽州易定魏博等八節度管内各賜米五萬石河陽東畿二節度管内各賜三萬石所司即般運於楚州分付各委本道領受賑給将士百姓江淮之間連歲豐稔迫於供賦頗亦傷農收其有餘濟彼不足宜令度支於淮南浙江東西道加價和糴米三五十萬石差官般運於諸道減價出糶貴從權便以利於人宜即遣使分道宣慰勞勉将士存問鄉閭有可以救歲凶災除人疾苦各與長吏商量奏聞貞元元年正月辛丒賑貸諸道将士百姓昭義河東成徳幽州義武魏博奉誠晉慈隰宣武平盧汴滑河陽東都畿汝州諸軍節度合賑米四十七萬石二月二日詔曰諸道節度觀察使所進耕牛委京兆府勘責有地無牛百姓量其産業以所進牛均平給賜其有田五十畝已下人不在給限給事中袁髙奏曰聖慈所憂切在貧下百姓有田不滿五十畝者尤是貧人請量三兩户共給牛一頭以濟農事從之是時蝗旱之後牛多疫死諸道節度韋臯李叔明等咸進耕牛故有是命又賜京兆府百姓種子二萬石同州華州各三千石陜虢兩州各四千石四月陜虢觀察使李泌奏虢州盧氏縣山谷近出瑟瑟請充貢獻禁人開採詔曰瑟瑟之寳中土所無今産於近甸實為靈貺朕不飾器玩不尚珍竒嘗思返朴之風用明恭儉之節其出瑟瑟處任百姓求採不宜禁止四年正月詔曰諸州遭水旱委長吏貸種六年七月以麥不登賜京兆府種五萬石七年三月以關輔牛疫死者十五六遣中使市以給之八月河南河北山南江淮凡四十餘州大水遣中書舎人奚陟往江襄郢隨鄂申光蔡等州左庶子姚齊梧往陳許宋亳徐泗等州秘書少監雷咸往鎮冀徳棣深趙等州京兆少尹韋武往揚楚廬夀徐潤蘇常湖等州宣撫應諸州百姓因水不能自存者委宣撫使賑給十二月詔曰惠下恤人先王之政典視年制用有國之常規故有出公粟以賑困窮弛歲征以寛物力廼者諸道水災臨遣宣撫省覽條奏載懐憫惻其州縣遭水漂損乏絶户宜共賜三十萬石度支即與本道節度觀察使計度各隨所近支給委本使擇清幹官送米給州縣十三年三月河南府上言當府旱損請借含嘉倉粟五萬石賑貸百姓可之十四年六月庚寅詔曰訪聞蒸庶之間米價稍貴念兹貧乏每用憂懐苟利于人所宜通濟今令度支出官米十萬石于街東西各五萬石每斗賤較時價糶與百姓乙巳以旱儉榖貴人流出太倉粟賑恤京兆府諸縣七月令賑給京兆府百姓麥種三萬石十月以歲凶榖貴出太倉粟三十萬石令京兆府開塲糶以惠民十二月以河南府榖貴人流令出含嘉倉粟七萬石開倉糶以惠河南饑民十五年三月以久旱歲凶出太倉粟十八萬石于京畿諸縣賤糶以救貧人十九年七月貸京畿百姓麥種憲宗永貞元年八月即位九月丙子詔申光蔡及陳許兩道将卒百姓等比遭旱損多缺糧儲特宜賑給令其有濟申光蔡等州宜賜米十萬石陳許等州賜米五萬石仍令刑部員外郎薛舟充宣慰使専往存問十一月以久雨京師鹽貴出庫鹽一萬石以惠饑民元和元年四月戊申命禮部員外郎裴汶以米十萬石賑給于浙東四年正月壬午制曰王者立國本以安人海隅蒼生不忘𢎞覆天下至廣咸務和寧其或郡國罹災存撫為重發廪蠲賦時惟舊章獻歲布和前聖高躅朕祗膺眷命纉承洪緒居兆人之上五載于兹推大信以撫萬邦體至仁以蕃庶類夕惕惟厲憂深納隍豈布理猶鬱上帝未感精祲相盪隂陽或愆近者江淮之間水旱作沴綿亘郡邑自夏徂秋雖誠禱羣神無愛圭璧而災流下土虧我生成逋亡靡依凋瘵斯甚疲俗艱食時予之辜當宁疚懐宵衣興歎憫兹求瘼臨遣使臣分命廵行将加存恤往救災患冀安流庸俾免其田租賑以公廪隨便拯給惠此困窮其元和三年諸道應遭水旱所損州府應合放兩稅錢米等損四分已下宜准式處分四分已上者竝准元和元年六月十八日勅文放免仍令中書門下即於朝班中擇人分道存撫其有单貧乏户轉徙未安便以常平義倉所貯斛㪷量事賑貸務令存濟副朕憂軫嗚呼方岳長吏居職親人永言分憂亦惟善政敬哉有土咸悉予懐六月渭南縣暴水發溢漂損閭舎二百一十三户秋田十六頃溺死者六人命京兆府發義倉賑給十一月詔淮南揚楚滁三州浙西潤蘇常三州今年歉旱尤甚米價殊高言念困窮豈忘存恤宜以江西湖南鄂岳荆南等使折糴米三十萬石賑貸淮南道三州三十萬石貸浙西道三州恐此米來遲不救所切宜委淮南浙西觀察使且各以當道軍糧據數給旱損人户節級作條件賑貸淮南李吉甫浙西韓臯躬親部署令刺史縣令切加勾當使此米必及饑人以副朕意如賑貸三州之外可及諸州亦聴量便宜處置待江西等道折糴和糴米到各處依數收管六年二月癸巳制曰王者本憂人之心有順時之令故及發生之候必𢎞利澤之規以此惠人期於阜俗今三陽布和萬物遂性惟人之窮乏者或不能自存朕所以憫然省憂議所賑救如聞京畿之内縁舊榖已盡粟麥未登尚不足於食陳豈有餘於播種勸其耕食固在及時念彼徵求尤資寛貸京兆府宜以常平義倉粟二十四萬石貸借百姓其諸道州府有乏少糧種處亦委所在官長用常平義倉糧借貸淮南浙西宣歙等道元和四年賑貸竝且停徵容至豐年然後填納七年二月壬辰制曰王者布徳行惠必順天時發廪賑乏盖循舊典朕君臨㝢縣念切黎元思欲咸致其安各阜其業事闗恤下政在便人予無愛焉斯為大本而甸服之内比年豐穣一歲不登遂至艱食豈非轂下賦役經制猶繁物力所資凋耗已甚興言於此愧歎良深今春陽發生田事具飭苟迫於歉乏不能自存則耕植頓缺秋成何望所以特加惠賚蠲彼徵求庶農桑之及時候麰麥之方稔式當和煦之候載示憂勤之心我其永懐俾厚生殖京畿百姓宜賑給粟三十萬石内八萬石以京府常平義倉粟充之其餘用太倉支給九年二月丁未制曰善為國者務蓄於人百姓未康君孰與足其或時逢水旱念切惸嫠於是有已責之恩行散利之典古今通範何莫繇斯朕恭已勵精以臨兆庶永言憂濟終食豈忘思俾萬邦同臻富夀而去歲甸服氣序愆和夏属驕陽秋多苦雨三農爽候五稼不滋比及收藏曽靡善熟如聞閭井之内儲備罕充産於地者既微出於力者宜困既牽公上之稅薦迫輸送之期循環歲時固亦勞止况羣司具列軍衛實繁供億之名制備存工役之科條未艾四方楨榦属在京師念兹矜人良多愧嘆今土膏方動東作其勤逋賦未蠲種餉何望宜加惠渥式俾厚生趨澤務農庶乎勸化姑示納隍之㫖佇寛艱食之虞煦育順時義斯可取應京畿百姓所欠元和八年稅斛㪷青苗錢稅草等在百姓腹内者竝宜放免仍以常平義倉斛斗三十萬石委京兆府條疏賑給務及貧人如常平義倉不足即宜以元和七年諸縣所貯折糴斛斗添給應縁賑給百姓等委京兆差擇清幹官於每縣界逐處給付使無所弊各得自資近歲已來屢𢎞徳澤邦畿千里尚號腴田阜安疲黎亦在循政咨爾京邑長吏洎于宰字之官各宜叶心将我詔意戒之以擾授之以仁宣示朕懐咸使知悉時百姓以八年水害農功及春作告旱於是畿輔間以徵賦為憂及此詔下人情大悅五月以旱榖貴出太倉粟七十萬石開六塲糶之并賑貸外縣百姓至秋熟徵納便於外縣收貯以防水旱十年十二月命度支郎中薛公幹賑恤易定等州十一年四月丁巳以粟八萬石賜徐宿二州皆恤其水旱十二年正月以京畿及陳許饑詔鄭滑觀察使以估糶官粟救之四月詔出太倉粟二十五萬石糶於西京以惠饑民九月辛卯制曰朕為人君期致豐寧夙夜永思未嘗怠息而庶政猶闕恒雨為災至今逺近或有墊溺浸敗廬舍漂浸田苗言念疲黎重罹斯弊覽兹奏報嗟悼良深将俾獲安豈忘賑救其諸道應遭水州府河南澤潞河東幽州江陵府等管内及鄭滑滄景易定陳許晉隰蘇襄復台越唐隨鄧等州人户宜令本州厚加優恤仍各以當處義倉斛㪷據所損多少量事賑給訖具數奏聞十四年七月東都留守上言河南府汝州百姓饑詔貸河南府粟五萬石汝州二萬石八月乙亥歸光州茶園於百姓從刺史房克讓之請也穆宗長慶二年七月以陳許罹水災賑粟五萬石閏十月甲寅詔曰如聞江淮諸州旱損頗甚所在米價不免踊貴眷言疲瘵須議優矜宜委淮南浙東宣歙江西福建等道觀察使各於當道有水旱處以常平義倉斛㪷據時估減一半價出糶不得令豪家并糴使其必及貧人十二月甲午命以絹二百疋賑京師東京西市窮乏者四年二月詔如聞京城米榖翔貴百姓乏食者多夏麥未登須有救恤宜出太倉陳粟四十萬石委度支京兆府類㑹減時價於東西街置塲出糶其價錢仍司府收貯至秋收糴敬宗寳厯元年十二月詔曰農功所切實在耕牛疲甿乏此理須給賜宜委度支於河東振武靈夏等州分市耕牛萬頭交付京兆尹均給畿内貧下百姓其價以户部綾絹充文宗太和元年六月命中使赴京兆府宣令修高陵界自渠斗門任百姓取水溉田二年七月詔曰朕撫有四方子育兆庶䖍恭夕惕㒺敢自暇庶乎天地交感人神洽和如聞山東降災淫雨泛濫豈政理有所未明人情有所未逹邪中宵待旦惕然疚懐應是諸州遭水損田苗壊廬舍處宜委所在吏切加訪恤如不能自濟者宜發義倉賑給普令均一以副朕懐三年五月詔去年已來水損處鄆曹濮青淄徳齊等三道宜各賜米五萬石兖海三萬石竝以入運米在側近者逐便速與搬運仍以右司員外郎劉茂復充曹濮等道賑恤使户部員外郎嚴譽兖青淄等道賑恤使七月齊徳州奏百姓自用兵已來流移十分只有二分伏乞賜麥種耕牛等勅量賜麥三千石牛五百頭共給綾一萬疋充價直仍各委本州自以側近市糴分給四年七月辛卯以太原人饑賑貸斛㪷三萬石癸巳許州上言去年六月二十一日被水有詔應遭水損百姓等宜量放今年種子委本道即具分析聞奏仍令宣慰使李珝與本道勘㑹人户實水損每人量給米一石其當户人多亦不得過五石令度支以逐便支送其人粟數分并以聞并免本道合送上供錢二萬八月戊寅舒州上言當州太湖宿松望江等縣從今年四月已後江水泛漲沒百姓産業共計六百八十二户竝盡人皆就髙避水幾貧無食有詔以義倉賑給十月庚寅詔曰朕以寡徳臨御萬方宵旰憂勤匪敢自暇然仁未及物誠不動天隂陽失和水潦為敗顧兹災沴害及生靈江淮之間潤和兩州應水損縣數據所申奏漂溺人户處宜委本道觀察使與本州刺史仔細檢勘全放今年秋稅錢米仍以義倉斛㪷逐便據淹損田苗漂壊廬舍及蟲螟所損節級矜減詣實奏聞如聞沒溺甚處亦以義倉量事賑賜其京兆河南府所損縣即據頃畝依常例檢覆分數蠲減州縣牧宰各務撫安必令均齊用稱朕意五年正月詔河東兵戈之後亢旱踰年倉廪空虛黎元困乏若無救恤恐至流亡宜借便粟十萬石七月東川𤣥武江水漲二丈梓州羅城漂人廬舍詔劒南兩川水運使宣撫賑給六年正月制京兆府諸縣宜以常平義倉斛㪷量事賑恤仍先從貧下户給二月户部侍郎庾敬休奏兩州米價騰貴百姓流亡至多請糶兩州闕官職田禄米以救貧人從之戊寅勅曰浙西諸州皆有水災蘇湖兩州漂沒尤甚須有賑恤以救疲人兩州共賜米二十萬石先從貧下户給竝以本州常平義倉斛㪷充五月壬子浙西觀察使丁公著奏杭州八縣災疫詔賜米七萬石以賑之七年正月壬子以旱詔京兆府河中等九州府宜賜粟五十六萬石京兆府賜十萬石河南府河中府絳州各賜十萬石同華等州各賜十萬石竝以常平義倉及所糴斛㪷充無本色者以運米折給委本州府長吏明作等第差官吏對面宣賜先從貧下起給八年九月詔淮南浙西等道仍歲水潦遣殿中侍御史任畹馳往慰勞以比年賑貸多為奸吏所欺徒有其名惠不及下宜委所在長吏以軍州自貯官倉米減一半價出糶各給貧弱如無貯蓄處即以常平義倉米出糶又詔諸道有饑疫處軍糧積蓄之外其属度支户部雜榖竝令減價以出糶濟貧人九年三月乙丒詔曰朕以寡徳居於兆民之上雖兢兢業業思理不怠而政道多闕和氣仍傷舊歳水旱黎民艱食為之父母斯心鬱陶如聞魏博六州阻饑尤甚野無青草道殣相望及山東道陳許鄆曹濮淮南浙西等道皆困於饑疫屢乏種餉其魏博宜賜粟五萬石山南東道陳許鄆曹濮等三道各賜糙米二萬石充賑給委度支逐便支送淮南浙西兩道委長吏以常平義倉粟賑賜開成元年正月詔同州賜榖六萬石河中府絳州共賜十萬石委度支户部以見貯粟麥充賜二年七月詔以時旱減入内水十分之九賜百姓灌田從京兆尹崔珙之請也四年七月丙午滄景節度使劉約奏請義倉粟賑遭水百姓詔曰本置義倉只防水旱先給後奏勅有明文劉約所奏已為遲晩宜速賑恤武宗㑹昌元年正月詔如有陂澤山原百姓或力能墾闢耕種州縣不得輙問所收苗子臣欽若等曰唐自武宗至昭哀無實録後放此作闕後唐莊宗同光四年正月己卯明宗奏深冀諸州縣流亡饑饉户一千四百乞鄴都倉儲借貸以濟窮民明宗天成四年二月詔應定州城外修築城寨處委招携本主識認城内窮民不濟者委本道量加賑給長興元年正月滑州上言准詔賑貸貧民以去年水災故也二月郊禋禮畢制曰諸州府或經水旱災沴恐人户闕少糇糧方值春時誠宜賑恤宜令逐處取去年納到新好屬省斛㪷量加賑貸候秋收日徵納是月宋州奏准詔賑貸粟萬石三月差中使三人往登萊賑濟貧民是月陜州奏准詔賑貸貧民五月青州奏准詔賑貸貧民糧一萬四百一十九石二年二月汴州奏准詔賑貸遭水處貧民三年三月辛亥帝謂侍臣曰朕昨日出城觀稼見百姓父子三人同曵犁耒者力農如是深軫予懐可賜耕牛二頭七月丁未内出御劄示百僚曰朕以臨御萬邦寵綏四海務恤民以設教期化俗以成風昨自霖雨連綿川瀆汎溢傷數州之苗稼蕩百姓之丘園遘此徵災慙虧至徳致農者失力田之望念編甿有艱食之虞每自責躬更思求理欲使人獲其蘇息恨不家至而撫安憂勞所深鍳寐斯切宜布維新之澤式全可大之功今年州府遭水潦處已下三司各指揮本州府支借麥種及等第賑貸斛食仰逐處長吏切加安存不得輙有差使如户口流移其户下田園屋宅仰村隣節級長須主管不得信令殘毁候本户歸日具元本桑棗根數及什物數目交付不得致有欠少本户未歸即許隣保請佃供輸若入務時歸業准例收秋後交付貴示招携永期康泰速宜宣布稱朕意焉是歲宋亳潁三州水災尤甚樞密使范延光趙延夀從容奏曰今秋宋亳潁等州水災甚民户流亡粟價暴貴臣等量欲與本州官倉斛㪷依如今時估出糶以救貧民兼大水之後頗宜宿麥窮民不便種子亦望本州據民户等第支借麥種自十石至三石候來年收麥據原借數納官從之乃下此詔晉高祖天福四年十二月帝以雨雪彌月出金粟薪炭與犬羊皮以賑窮乏六年四月乙巳以齊魯民饑詔兖青鄆三州發管内倉糧賑貸七年七月壬戌開封府奏准宣給糧二萬石賑諸縣貧民是月戊辰遣司農少卿李珧使宿州鴻臚少卿龎令圖使雒京白波賑貸貧民少帝天福七年八月詔㐮州城内百姓等久經圍閉例各饑貧宜示頒宣用明恩渥大户各賜粟二石小户各賜粟一石宜令㐮州以見在數充十二月丁丑詔遣供奉官馬延翰雒京賑恤饑民仍宣河南府差大将量将米豆往諸山谷俵散給人户其諸縣係欠秋稅與限至來年夏麥徵納八年正月丁酉勅河南懐孟鄭等州管内百姓有積粟者仰均分借便以濟貧民周太祖廣順二年二月庚申齊州言禹城縣二年水民饑流亡今年見固河倉有官糧五萬二千餘斛欲賑貸勅諸邑留二三千斛給廵撿職員餘竝賑貸貧民三年三月壬辰徐州言彭城縣民饑乏乞賑貸從之十一月辛卯勅膳部員外郎劉表微往兖州開倉減價糶粟以水害稼救饑民也丙午單州刺史劉禧言倉州充給歲餘軍糧外有大麥六萬石欲開倉官糶以濟貧民從之十二月以亳州潁州大水民饑所有倉儲及永城倉度支給軍食一年外遣使減價出糶顯徳元年正月乙酉分命朝臣杜􅀈等五人往潁亳濮永城固河口開倉減價出糶以濟饑民世宗顯徳四年三月命左諫議大夫尹日就於夀州開倉賑其饑民又命供奉官田處嵓梁希進等於夀州城内煮粥以救饑民六月辛酉西京上言伊陽縣居民多於山谷間淘金帝曰山澤之利與衆共之王者之道也命本州勿禁六年正月命廬州開倉出陳麥以糶之盖克復之後民多阻饑故亷其價以惠之也二月壬午濠州上言准宣出糶省倉陳麥以利貧民三月壬戌楚州上言詔准煮粥以救饑民丙戌遣使之和州開倉以賑饑民戊子命夀州開倉以賑饑民十二月分命使臣賑給諸州遭水人戸冊府元龜巻一百六
