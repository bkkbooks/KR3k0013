body:
  text: 册府元龜卷二百五十四宋王欽若等撰列國君部失政失禮失政宗周之季王道版蕩列國之際亂政亟行或作法於貪而不勝其弊或布賞無藝而不撫其民茍從匪彛罔迪率典繇是蒸黎疲匱田野汗萊禮義不脩讒慝並進上下黷亂君臣詛盟寵賂是彰女謁敗度及其微弱不能自存以至陵遲莫保其宗社者也鄭莊公不勝其母以害其弟弟叔失道而公弗制祭仲諫而公弗聽小不忍以致大亂焉莊公之母謂武姜生莊公及弟叔段好勇而無禮公不早為之所而使驕慢國人賦將仲子以刺之叔多才而好勇不義而得衆也又賦太叔于田以刺之其後齊侯伐許潁考叔先登子都自下射之顚莊公使卒出豭行出犬鷄以詛射潁考叔者百人為卒二十五人為行行亦卒之行列疾射潁考叔者故令卒及行間皆詛之君子謂莊公失政刑矣政以治民刑以正邪既無德政又無威刑是以及邪大臣不睦又不能用刑於邪人邪而詛之將何益矣魯桓公六年八月壬午大閲大閲者何閲兵車馬也修教明諭國道也修先王之教以明達於民治國之道平而修戎事非正也禮因四時田獵以習用戎事存不忘亡安不㤀危之道平謂不因田獵無事而修之其曰以為崇武故謹而日之蓋以觀婦人也齊襄公無禮義而求大功不修德而求諸侯志大心勞所以求者皆非其道大夫作甫田詩以刺之魯莊公二十九年春新作延廄書不時也凡馬日中而出日中而入日中春秋分也治廐當以秋分因馬入而脩之今以春作故曰不時鄭文公時大夫髙克好利而不顧其君文公惡而欲逺之不能使髙克將兵而禦狄於竟陳其師旅翺翔河上乆而不召散還而歸髙克奔陳公子素惡髙克進之不以禮文公退之不以道危國亡師之本也國人賦清人之詩以刺之楚成王時鄭伯始朝於楚中國無霸故楚子賜之金既而悔之與之盟曰無以鑄兵楚金利故故以鑄三鐘古者以銅為兵言楚無霸者逺畧魯僖公二十年春新作南門書不時也凡啓塞從時宋襄公十四年疾死泓戰公之不葬何也失民也其失民何也以其不教民戰則是棄其師也為人君而棄其師其民孰以為君哉所謂教民戰者習之也春秋貴徧戰而惡詐戰襄公所以敗於泓者言徧戰也非不教其民也公羊以為不書葬為襄公諱背殯出㑹所以美其有承齊桓尊周室之意鄭君什之曰教民習戰不用是以不教也詐戰謂不期也既期矣當觀敵為策倍則止敵則戰少則守今襄公於泓之戰違之又不用其臣之謀而敗故徒善不用賢良不足以興霸王之功小信不知權譎之謀不足以交鄰國㑹逺疆故易譏鼎折足詩刺不用良此説善也魯文公二年自十有二月不雨至于秋七月建午之月猶未為災歴時而言不雨文不憂雨也僖公憂民歴一時經書不雨今文公歴四時乃書是不勤雨也不憂雨者無志乎民也無恤民志又十年自正月不雨至於秋七月歴時而言不雨文不閔雨者無志乎民也公四不視朔天子告朔於諸侯受乎禰廟禮也每月天子以朔政告於諸侯受而納之禰廟告以羊今公自二月不視朔至于五月是後視朔之禮遂廢故子貢欲去其羊公四不視朔公不臣也以公為厭政以甚矣天子班朔而公不視是不臣也陳靈公時定王使單襄公聘于宋王卿士單朝也遂假道於陳以聘於楚火朝覿矣道茀不可行火心星覿見草路為茀朝見謂夏之九月星見於辰也候不在疆候人掌入疆賔客者也司空不視塗掌道路澤不陂陂障也古不竇澤故鄣之川不梁流曰川梁渠也古不防川故渠之野有庾積庾露穀也詩云曽孫之庾如坻如京塲功未畢道無列樹列樹以表道且為城守之用也墾田若蓺發田曰墾蓺猶蒔言其稀少若藝物也膳宰不致餼生曰餼司里不授館司里里正掌授客館國無寄寓寓亦寄也無寄寓者不為廬舎以寄羈旅客也縣無施舎四甸為縣方十六里施舎者所以施舎賔客負任之處民將築臺于夏氏夏徵舒之家也及陳陳靈公孔寜儀行父南冠以如夏氏留賔弗見南冠楚冠也賔單襄公單子歸告王曰陳侯不有大咎國必亡王曰何故對曰夫辰角見而雨畢辰角大辰若龍之角角星明見者朝見東方建戌之初寒露節也雨畢者殺氣日盛雨氣盡也天根見而水涸天根亢氐之間也涸竭也謂寒露雨畢之後五日天根朝見水潦盡竭也月令仲冬水始涸天根見乃盡竭也本見而草木節解本氐星謂寒露之後十日陽氣盡草木之節理皆坼解也駟見而隕霜駟天駟房星也隕落也謂建戌之中霜始降火見而清風戒寒謂霜降之後清風至所以戒人為寒備也故先王之敎曰雨畢而除道水涸而成梁草木節解而備藏備藏也隕霜而冬裘具清風至而修城郭宫室謂火見之後建亥之初故夏令曰九月除道十月成梁夏令夏后氏之令周所因其時儆曰收而塲功􅀈而畚挶時儆時所以儆告其民也收而塲功使人修囷倉􅀈具也畚器名土籠也挶舉土之器具爾畚挶將以築作也營室之中土功其始詩云定之方中火之初見期於司里期㑹也致其築作也具會於司里之官也此先王之所以不用財賄廣施德於天下者也今陳國火朝覿矣而道若塞野塲若棄澤不陂障川無舟梁是廢先王之敎也周制有之曰列樹以表道立鄙食以守路鄙四鄙十里有廬廬有飲食國有郊牧國外曰郊牧牧放之地也畺有寓望畺表界之土有寄寓之舎候望之人也藪有圃草澤無水曰藪圃大則必有茂大之草以備財用囿有林池所以禦災也災禨兵其餘無非穀土民無懸耜言嘗用也入土曰耜耜柄曰耒野無奧草奥深不奪民時不蔑民功蔑未有優無匱有逸無罷國有班事國城邑班次也執事有次也縣有序民從所有序事今陳國道路不可知田在草間功成而不收民罷於逸樂是棄先王之法制者也周之秩官有之秩官周常官篇名曰敵國賔至關尹以告行理以節逆之理吏逆迎執瑞節為信往迎之也行理小行人也候人為導導賓至於郊出迎入於境卿出郊勞聘禮曰賔至於近郊使卿朝服用束帛勞之門尹除門宗祝執祀賔將有事於廟則宗祝執祭祀之禮也司里授館司徒具徒具徒役修道之委積也司空視塗視險易也司冦詰奸虞人入材祭祀賓客供其材甸人積薪甸人掌薪蒸之事火司監燎水師監濯監滌濯之事者膳宰致餐餐熟食廩人獻餼餼禾米也司馬陳芻圉人養馬故致芻圉人職屬司馬工人展車展騐客車恐傷敗也百官官以物至賔入如歸是故小大莫不懷愛其貴國之賔至則以班加一等益䖍至於王使則皆官正莅事正官上卿監之若王巡狩則君親監之今雖朝也不才有分族於周王之親族也承王命以為過賔於陳司事莫至是蔑先王之官也先王之令有之曰天道賞善而罰淫故凡我造國無從非彛造為彛常無即慆淫慆慢即安各守爾典以承天休典常今陳侯不念嗣續之常棄其伉儷妃嬪而帥其卿佐以淫於夏氏不亦瀆姓矣乎卿佐孔儀也謂徵舒之父御叔即陳公子夏之子靈公之從祖父媯姓也而靈公淫其妻是為瀆亂其姓陳我大姬之後大姬周武王女虞胡公之妃陳之祖姬也棄衮冕而南冠以出不亦簡彛乎略常服是又犯先王之令也先王令無從非彛昔先王之敎茂帥其德猶恐隕越若廢其敎而棄其制蔑其官而犯其令將何以守國居大國之間大國晉楚而無此四者其能乆乎四者謂敎令制官六年單子如楚定王六年魯宣之八年也八年陳侯殺于夏氏九年楚子入陳楚子莊王也齊靈公伐萊萊人使正輿子賂夙沙衛以索馬牛皆百匹夙沙衛齊寺人索簡擇精者齊師乃還君子是以知齊靈公之為靈也諡法亂而不整曰靈言諡應其行楚康王時為舟師以伐呉舟師水軍不為軍政不設賞罰之差無功而還魯襄公十一年王正月作三軍作為也古者天子六師諸侯一軍作三軍非正也周禮司馬法曰萬有一千五百人為軍王六軍大國三軍次國二軍小國一軍其將皆命卿二千五百人為師然則此言天子六師凡萬有五千人按大國三軍則三萬七千五百人諸侯制踰天子非義也又云諸侯一軍又非制也昭五年經曰舎中軍傳曰貴復正也然則魯有二軍今云作三軍增置中軍一魯為次國於此為明晉平公十一年衛侯如晉晉人執而囚之于士弱氏士弱晉之獄大夫衛人歸衛姬于晉乃釋衛侯衛侯以女說晉而後得歸君子是以知平公之失政也言晉之衰十四年晉人使知悼子合諸侯之大夫以城杞平公杞出也故治杞孟孝伯㑹之鄭子太叔與伯石往子太叔見太叔文子文子衛大夫與之語文子曰甚乎其城杞也子太叔曰若之何哉晉國不恤周宗之闕而夏肄是屏周宗諸姬也夏肄杞也肄餘也屛城也其棄諸姬亦可知也已諸姬是棄其誰歸之吉也聞之棄同即異是謂離德詩曰恊比其隣昬姻孔云言王者和協近親則婚姻甚歸附晉不鄰矣其誰云之是年平公又使女叔侯來治杞田使魯歸前侵杞田弗盡歸也晉悼夫人愠曰齊也取貨夫人平公母杞女也謂叔侯取貨於魯故不盡歸杞田先君若有知也不尚取之不尚叔侯之取貨公告叔侯叔侯曰虞虢焦滑霍揚韓魏皆姬姓也八國皆晉所滅焦在陜縣陽屬平陽郡晉是以大若非侵小將何所取武獻以下兼國多矣武公獻公晉始盛之君誰得治之杞夏餘也而即東夷行夷禮魯周公之後也而睦於晉以杞封魯猶可而杞何有焉何有盡歸杞伯魯之於晉也職貢不乏玩好時至公卿大夫相繼於朝史不絶書書魯之朝聘府無虛月無月不受魯聘如是可矣何必瘠魯以肥杞且先君而有知也毋寜夫人而焉用老臣毋寕寜也言先君毋寕怪夫人所為無用責我十五年平公築銅鞮之宫數里銅鞮晉之宫而諸侯舎於𨽻人二十四年成虒祁在昭八年諸侯朝而歸者皆有貳心賤其奢也為取郠故魯取郠在昭十年晉將以諸侯來討叔向曰諸侯不可以不示威知晉德薄欲以威服人乃並徵㑹于呉秋晉侯㑹呉子于良下邳有良城縣水道不可吳子辭乃還辭不㑹鄭簡公二十三年及其大夫盟駟良爭故君子是以知鄭難之不已也鄭伯微弱不能制其臣下召臣詛盟故曰亂未已陳襄公二十六年鄭子產如陳涖盟歸復命告大夫曰陳亡國也不可與也不可與結好聚禾粟繕城郭恃此二者而不撫其民其君弱植公子侈太子卑大夫敖政多門政不出一人以介於大國楚晉也能無亡乎不過十年矣楚靈公三年以諸侯伐吳執齊慶封而盡滅其族慶封以襄二十八年奔吳將戮慶封椒舉曰臣聞無瑕者可以戮人慶封唯逆命是以在此逆命謂性不恭順其肯從於戮乎播於諸侯焉用之播聞也王弗聴負之斧鉞以徇於諸侯使言曰無或如齊慶封殺其君弱其孤以盟大夫齊崔杼弑君慶封其黨也故以弑君罪責之慶封曰無或如楚共王之庶子圍弑其君兄之子麋而代之以盟諸侯王使速殺之七年就章華臺南郡華容縣有臺在城内下令内亡人實之八年公子棄疾遷許于夷實城父此時改城父為夷城父縣屬譙郡取州來淮北之田以益之益許田伍舉授許男田然丹遷城父人於陳以夷濮西田益之以夷田在濮水西者與城父人遷方城外人於許成十五年許遷於萊因謂之許今許遷於夷故以方城外人實其處言靈王使民不安初楚子之為令尹也殺大司馬薳掩而取其室在襄三十年及即位奪薳居田居掩之族言薳氏所以怨遷許而質許圍遷許在九年圍許大夫蔡洧有寵於王王之滅蔡也其父死焉楚滅蔡在十一年洧仕楚其父在國故死王使與於守而行使洧守國王行至乾谿申之㑹越大夫戮焉申㑹在昭四年王奪鬭韋龜中犫韋龜令尹子文𤣥孫中犫邑名又奪成然邑而使為郊尹成然韋龜子郊尹治郊境大夫蔓成然故事蔡公蔡公棄疾也故猶舊也韋龜以棄疾有當璧之命故使成然事之故薳氏之族及薳居許圍蔡洧蔓成然皆王所不禮也因羣䘮職之族啓越大夫常壽過作亂常壽過申㑹所戮者圍固城克息舟城而居之息舟楚邑城之堅固者晉昭公不能修道以正其國有財不能用有鐘皷不能以自樂有朝廷不能灑掃政荒民散將以危亡四鄰謀取其國家而不知國人作山有樞詩以刺之齊景公十二年如晉請伐北燕晉人許之十二月遂伐北燕明年正月癸巳齊侯次于虢虢燕境燕人行成曰敝邑知罪敢不聼命先君之敝器請以謝辠敝器瑶甕玉櫝之屬公孫晳曰受服而退候釁而動可也晳齊大夫二月戊午盟于濡上濡水出高陽縣東北至河間鄭縣入易水燕人歸燕姬嫁女與齊侯賂以瑶罋玉櫝斚耳不克而還瑶玉也櫝匱也斚耳玉爵二十二年伐徐二月丙申齊師至蒲隧蒲隧徐地下邳取慮縣東有蒲如阪徐人行成徐子及郯人莒人會齊侯盟于蒲隧賂以甲父之鼎甲父古國名高平昌邑縣東南有甲父亭徐人得甲父鼎以賂齊叔孫昭子曰諸侯之無伯害哉為小國害齊君之無道也興師而伐逺方㑹之有成而還莫之亢也無亢禦無伯也夫詩曰宗周既滅靡所止戾正大夫離居莫知我肄戾定也肄勞也言周舊為天下宗乃今衰滅亂無息定執政大夫離居異心無有念民勞者其是之謂乎陳惠公十年宋衛陳鄭皆火鄭子産禳火宋衛皆如是陳不救火許不弔災君子是以知陳許之先亡也不義所以亡楚平王六年城州來沈尹戍曰楚人必敗沈尹戍乃莊王曽孫葉公諸梁父也昔吾滅州來在十三年子旗請伐之王曰吾未撫吾民今亦如之而城州來以挑呉能無敗乎侍者曰王施舎不倦息民五年可撫之矣戍曰吾聞撫民者節用於内而樹德於外民樂其性而無冦讐今宫室無量民人日駭勞罷死轉轉遷徙也忘寢與食非撫之也平王所以不能霸九年大夫薳越使告于宋曰寡君聞君有不令之臣為君憂無寧以為宗羞無寧寧也言華氏為宋宗廟之羞恥寡君請受而戮之對曰孤不佞不能媚於父兄華向公族也故稱父兄以為君憂拜命之辱抑君臣日戰君曰余必臣是助亦唯命人有言曰唯亂門之無過君若惠保敝邑無亢不衷以奬亂人孤之望也唯君圖之楚人患之患宋以義距之魯昭公二十九年公在鄆十月鄆潰潰之為言上下不相得也上下不相得則惡矣亦譏公也公既出奔不能改德修行居鄆小邑復使潰亂德之不見如此之甚昭公出奔民如釋重負晉定公六年假羽旄於鄭鄭人與之析羽為旌王者逰幸之所建鄭私有之因謂之羽旄借觀之明日或斾以㑹或賤者也繼旌曰斾令賤人施其斾執以從會示卑鄭晉於是乎失諸侯晉無禮所以遂弱曹伯陽十年宋人圍曹初曹人或夢衆君子立于社宫社宫社也而謀亡曹曹叔振鐸請待公孫彊許之振鐸曹始祖旦而求之曹無之戒其子曰我死爾聞公孫彊為政必去之及曹伯陽即位好田弋曹鄙人公孫彊好弋獲白鴈獻之且言田弋說之因訪政事大說之有寵使為司城以聽政彊言霸說於曹伯曹伯從之乃背晉以奸宋宋人伐之晉人不救築五邑於其郊曰黍丘揖丘大成鍾䢴梁國下邑縣西南有黍丘亭明年宋公入曹以曹伯陽歸衛莊公元年飲孔悝酒於平陽東都燕縣東北有平陽亭重酬之大夫皆有納焉納財賄也醉而送之夜半而遣之夜遣者慙負孔悝不欲令人見載伯姬於平陽而行載其母俱去孔悝出奔宋邾隠公自齊奔越曰呉為無道執父立子越人歸之太子華奔越邾子又無道越人執之以歸而立公子何何亦無道何太子華弟燕易王卒燕子噲既立齊人殺蘇秦蘇秦之在燕與其相子之為昏而蘇代與子之交及蘇秦死而齊宣王復用蘇代子之相燕貴重主斷蘇代為齊使於燕燕王問曰齊王奚如對曰必不霸燕王曰何也對曰不信其臣蘇代欲以激燕王以尊子之也於是燕王大信子之子之因遺蘇代百金聽其所使鹿毛壽一作厝毛又曰甘陵縣本名厝謂燕王不如以國讓相子之人之謂堯賢者以其讓天下於許繇許繇不受有讓天下之名而實不失天下今王以國讓於子之子之必不敢受是王與堯同行也燕王因屬國於子之子之大重或曰禹薦益已而以啓人為吏及老而以啓為不足任天下傳之於益已而啓與交黨攻益奪之天下謂禹名傳天下於益已而實令啓自取之今王言屬國於子之而吏無非太子人者是名屬子之而實太子用事也王因收印自三百石吏以上而效之子之子之南面行王事而噲老不聽政顧為臣國事皆決於子之三年國大亂失禮夫宅天衷建皇極誕為民紀率繇禮經若乃制度云為適其㑹節軌量物采陳之表儀然後百度緝熈庶功明密所以治政何莫繇斯道不虛行人存則舉嗟夫胙土命氏體國君民將以寅亮帝功光輔王室然或功虧為翰業曠象賢滅德立違長傲縱欲徇耳目之常視忽經紀之逺圖謂權衡為可欺以舊坊為無用非燭何見既自取於𡨕行無耜而耕終靡成於昬作國家之敗於是在焉期示方來用從詮次魯桓公二年夏四月取郜大鼎于宋戊申納于太廟非禮也三年秋公子翬如齊逆女齊侯送姜氏非禮也凡公女嫁于敵國姊妹則上卿送之以禮於先君公子則下卿送之於大國雖公子亦上卿送之于天子則諸侯皆行公不自送於小國則上大夫送之十八年春桓公將有行遂與姜氏如齊始議行事申繻曰男有家女有室無相瀆也謂之有禮易此必敗女安夫之家夫安妻之室違此則為瀆今公將姜氏如齊故知其當致禍亂莊公四年秋七月公及齊人狩于禚越竟與齊㣲者俱狩失禮可知十年冬齊師滅譚譚無禮也初齊侯之出也過譚譚不禮焉及其入也諸侯皆賀譚又不至二十二年冬莊公如齊納幣公不使卿而親納幣非禮也母䘮未再期而圖昏二十四年秋哀姜至莊公使宗婦覿用幣非禮也傳不言大夫唯非常舉二十五年夏六月辛未朔日有食之皷用牲于社非常也非常皷之月長厯推之辛未實七月朔置閏失所故致月錯唯正月之朔慝未作正月夏之四月周之六月謂正陽之月今書六月而傳云唯者明此月非正陽月也慝陰氣日有食之於是乎用幣于社伐皷于朝日食厯之常也然食于正陽之月則諸侯用幣于社請救于上公伐皷于朝退而自責以明隂不宜侵陽臣不宜掩君以示大義是年秋大水皷用牲于社于門亦非常也失常禮也凡天災有幣無牲天災日月食大水也祈請而已不用牲也非日月之眚不皷眚猶災也月侵日為眚隂陽逆順之事聖賢所重故特皷之二十七年春公㑹杞伯姬于洮非事也非諸侯之事天子非展義不巡守天子巡狩所以宣布德義諸侯非民事不舉卿非君命不越竟三十一年夏六月齊侯來獻戎捷非禮也凡諸侯有四夷之功則獻于王王以警于夷以警懼夷狄中國則否諸侯不相遺俘雖夷狄俘猶不以相遺閔公二年夏吉禘于莊公速也三年䘮畢致新死者之主于廟廟之逺主當遷入祧因是大祭以審昭穆謂之禘莊公䘮制未闋時别立廟廟成而告祭又不于太廟故詳書以示譏僖公八年秋禘而致哀姜焉非禮也凡夫人不薨于寢不殯于廟不赴于同不祔于姑則弗致也九年夏公㑹宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘宋其稱子何也未葬之辭也禮柩在堂上孤無外事今背殯而出㑹以宋子為無哀矣攅木如椁塗之曰殯殷人殯于兩楹之間周人殯于西堦之上宋殷後也二十二年十一月宋公及楚人戰于泓鄭文夫人芈氏姜氏勞楚子於柯澤楚子還過鄭文公夫人芈氏楚女姜氏齊女也柯澤鄭地楚子使師縉示之俘馘縉楚樂師也俘所得囚馘所截耳君子曰非禮也婦人送迎不出門見兄弟不踰閾閾門限戎車不邇女器邇近器物也言俘馘非近婦人之物丁丑楚子入享于鄭為鄭所享九獻用上公之禮九獻酒而禮畢庭實旅百庭中所陳品數百也加籩豆六品食物六品加於籩豆籩豆禮食器享畢夜出文􅇗送于軍取鄭二姬以歸二姬文􅇗女也叔詹曰楚王其不没乎以壽終為禮卒于無别無别不可謂禮將何以沒諸侯是以知其不遂霸也二十三年夏五月宋公兹父卒宋襄公初襄公葬其夫人醯醢百甕曽子曰既曰明器矣而又實之言名之為明器而與祭器皆實之是亂鬼器與人器文公二年冬公子遂如齊納幣譏䘮娶也娶在三年之外則何譏乎䘮娶据逆在四年三年之内不圖婚僖公以十二月薨至此未滿二十五月又禮先納采問名納吉乃納幣此四者皆在三年之内故云爾吉禘于莊公譏然則何為不于祭焉譏據吉禘于莊公譏始不三年大事圖婚俱不三年大事猶從吉禘不復譏三年之恩疾矣疾痛非虚加之也非虚加責之以人心為皆有之以人心為皆有痛疾不忍娶以人心為皆有之則曷為獨於娶焉譏據孝子痛疾吉事皆不當為非獨娶也娶者大吉也合二姓之好傳之于無窮故為大吉非常吉也與大事異其為吉者主于己主于己身不如祭祀尚有念先人之心以為有人心焉者則宜于此焉變矣變者變動哭泣也有人心念親者聞有欲為己圖婚則當變動哭泣矣況乃至于納幣成婚哉四年夏逆婦姜于齊卿不行非禮也禮諸侯有故則使卿逆君子是以知出姜之不允於魯也允信也始來不見尊貴故終不為國人所敬信也文公薨而見出故曰出姜曰貴聘而賤逆之公子遂納幣是貴聘也君而卑之立而廢之君小君也不以夫人禮迎是卑廢之棄信而壞其主在國必亂在家必亡主内主也不允宜哉詩云畏天之威于時保之敬主之謂也六年閏月不告朔猶朝于廟諸侯每月必告朔聽政因朝宗廟文公以閏非常月故闕不告朔閏月不告朔非禮也經稱告月傳稱告朔明告月必以朔閏以正時四時漸差則致閏以正之時以作事順時命事事以厚生事不失時則年豐生民之道於是乎在矣不告閏朔棄時政也何以為民七年春伐邾間晉難也公因霸國有難而侵小三月取須句寘文公子焉非禮也邾文公子叛在魯故公使為守須句大夫也絶大皥之祀以與鄰國叛臣故曰非禮十五年六月辛丑朔日有食之皷用牲于社非禮也得常皷之月而於社用牲為非禮日有食之天子不舉去盛饌伐皷于社責羣隂伐猶擊也諸侯用幣于社社尊於諸侯故請救而不敢責之伐皷于朝退自責以昭事神訓民事君天子不舉諸侯用幣所以事神尊卑異制所以訓民示有等威古之道也是年秋齊侯懿公侵魯西鄙謂諸侯不能也不能討也遂伐曹入其郛討其來朝也魯季文子曰齊侯其不免乎已則無禮執王使伐無罪而討於有禮者曰女何故行禮禮以順天天之道也已則反天而又以討人難以免矣詩曰胡不相畏不畏于天畏天之威于時保之不畏於天將何能保以亂取國奉禮以守猶懼不終多行無禮弗能在矣宣公三年春正月郊牛之口傷改卜牛牛死乃不郊猶三望不郊而望皆非禮也言牛雖傷死當更改卜取其吉者郊不可廢也望郊之屬也不郊亦無望可也八年夏六月辛巳有事于太廟仲遂卒於垂有事祭也仲遂卒與祭同日畧書有事為繹張本垂齊地非魯境故書地壬午猶繹萬入去籥繹又祭陳昨日之禮所以賔尸萬舞名籥管也猶者可止之辭魯人知卿佐之䘮不宜作樂而不知廢繹故内舞去籥惡其聲聞非禮也十七年春晉侯景公使郤克徵㑹于齊徵召也欲為斷道㑹齊頃公帷婦人使觀之郤子登婦人笑於房跛而登階故笑之獻子出怒而誓曰所不此報無能涉河不復渡河而去成公二年十一月晉侯景公使鞏朔獻齊捷于周王弗見使單襄公辭焉曰蠻夷戎狄不式王命式用也淫湎毁常王命伐之則有獻捷王親受而勞之所以懲不敬勸有功也兄弟甥舅侵敗王略兄弟同姓國甥舅異姓國略經略法度王命伐之告事而已不獻其功所以敬親䁥告伐事而不獻囚俘禁淫慝也今叔父克遂有功于齊克能也而不使命卿鎮撫王室所使來撫余一人而鞏伯實來未有職司於王室鞏朔上軍大夫非命卿名位不達于王室又奸先王之禮謂獻齊捷余雖欲于鞏伯欲受其獻其敢廢舊典以忝叔父夫齊甥舅之國也而大師之後也齊世與周昏故曰甥舅寧不亦淫從其欲以怒叔父抑豈不可諫誨士莊伯不能對莊伯鞏朔王使委于三吏委屬也三吏三公禮之如侯伯克敵使大夫告慶之禮降於卿禮一等王以鞏伯宴而私賄之使相告之曰非禮也勿籍相相禮者籍書也六年二月季文子以鞌之功立武宫非禮也鞌戰在二年聴于人以救其難而以立武立武繇已非繇人也言請人救難非已功十七年晉侯田厲公與婦人先殺而飲酒後使大夫殺傳言厲公無道先婦人而後卿佐襄公二年夏齊姜薨齊侯靈公使諸姜宗婦來送葬宗婦同姓大夫之婦婦人越疆送𦵏非禮四年春楚師為陳叛故猶在繁陽前年何忌之師侵陳今猶未還繁陽楚地在汝南銅陽縣南陳成公卒楚人將伐陳聞䘮乃止軍禮不伐䘮陳人不聴命襄公魯大夫臧武仲聞之曰陳不服于楚必亡大國行禮焉而不服在大猶有咎而況小乎夏楚彭名侵陳陳無禮故也二十三年春杞孝公卒晉悼夫人䘮之悼夫人晉平公母杞孝公姊妺平公不徹樂非禮也徹去也禮為鄰國闕禮諸侯絶期故以鄰國責之二十九年春公在楚楚人使公親襚諸侯有遣使賵襚之禮今楚欲依遣使之比時楚康王也公患之穆叔曰祓殯而襚則布幣也先使巫祓除殯之凶邪而行襚禮與朝而布幣無異乃使巫以桃茢先祓殯茢黍穰楚人弗禁既而悔之禮君臨臣䘮乃祓殯故楚悔之昭公九年晉知悼子卒未葬悼子晉大夫荀盈平公飲酒與羣臣燕平公晉侯彪也師曠李調侍侍與君飲也燕禮記曰請旅侍臣鼓鐘樂作也燕禮賔入門奏肆夏既獻而樂闋君亦如之杜蕢自外來聞鐘聲曰安在恠之也杜蕢或作屠蒯曰在寢燕于寢杜蕢入寢歴階而升酌曰曠飲斯又酌曰調飲斯又酌堂上北面坐飲之降趨而出三酌自罰平公呼而進之曰蕢曩者爾心或開予是以不與爾言曩曏也始來入時開謂諫諍有所發起爾飲曠何也曰子卯不樂紂以甲子死桀以乙卯亡王者謂之疾日不以舉樂為吉事所以自戒懼知悼子在堂斯其為子卯也大矣言大臣䘮重於疾日也雜記曰君於卿大夫比葬不食肉比卒哭不舉樂曠也太師也不以詔是以飲之也詔誥也太師典奏樂爾飲調何也曰調也君之䙝臣也為一飲一食忘君之疾是以飲之也言調貪酒食䙝嬖近臣亦當規君疾憂爾飲何也曰蕢也宰夫也非刀匕是共又敢與知防是以飲之也防禁放溢平公曰寡人亦有過焉酌而飲寡人聞義則服杜蕢洗而揚觶舉爵於君也禮揚作媵揚舉也媵送也揚近得之公謂侍者曰如我死則必毋廢斯爵也欲後世以為戒至于今既畢獻斯揚觶謂之杜舉此爵遂因杜蕢為名畢獻獻賔與君定公元年秋立煬宫煬宫伯禽子廟毁已乆立者不宜立者也十五年春邾子來朝邾子名益子貢觀焉邾子執玉髙其容仰公受玉卑其容俯子貢曰以禮觀之二君者皆有死亡焉夫禮死生存亡之體也將左右周旋進退俯仰於是乎取之朝祀䘮戎於是乎觀之今正月相朝而皆不度不合法度心已亡矣嘉事不體何以能久髙仰驕也卑俯替也驕近亂替近疾君為主其先亡乎為此年公薨哀七年以邾子益歸傳哀公十二年夏五月甲辰孟子卒孟子者何據魯大夫無孟子昭公之夫人也其稱孟子何據不稱夫人某氏諱娶同姓蓋呉女也禮不娶同姓買妾不知其姓則卜之為同宗共祖亂人倫與禽獸無别昭公既娶諱而謂之呉孟子春秋不繫呉者禮婦人繫姓不繫國雖不諱猶不繫國也不稱夫人不言薨不書葬者深諱之二十四年公子荆之母嬖荆哀公庶子將以為夫人使宗人釁夏獻其禮宗人禮官對曰無之公怒曰女為宗司立夫人國之大禮也何故無之對曰周公及武公娶於薛武公敖也孝惠娶於商孝公稱惠公弗皇商宋也自桓以下娶於齊桓公始娶文姜此禮也則有若以妾為夫人則固無其禮也公卒立之而以為太子國人始惡之惡公册府元龜卷二百五十四
