body:
  text: 冊府元龜卷七百四宋王欽若等撰令長部仁惠静治亷儉仁恵傳曰中心􅉃怛愛人之仁也又曰徳以施恵若夫居宰邑之任藴恤下之志誠信既篤吏不忍欺仁恵所化民用胥悦斯固道徳齊禮庶㡬乎耻格者也至有遭疫癘而給以醫藥值伏臘而免其徒繫遣囚申孝活人甘戾開公廪以賑乏出私榖以濟貧重絶世嗣俾有遺育或便人而坐罰或受餉而代輸及夫興利以厚其生捍患而濟其戻裒多以矜弱克己以愛人用能興㢘譲之風成愷悌之政非夫恂恂君子以教化為任者疇能及是哉漢朱邑廬江舒人也少時為桐鄉嗇夫㢘平不苛以愛利為行仁愛於人而安利也未嘗笞辱人存問耆老孤寡遇之有恩所部民吏愛敬焉後漢馮魴為郟令光武西征隗囂潁川盗賊群起郟賊延褒等衆三千餘人攻圍縣舍魴率吏士七十許人力戰連日弩矢盡城䧟魴乃遁去帝聞郡國反即馳赴潁川魴詣行在所帝案行鬬處知魴力戰乃嘉之曰此徤令也所當討擊勿拘州郡褒等聞帝至皆自髠剔負鉄鎻將其衆請罪帝且赦之使魴轉降諸聚落縣中平定詔乃悉以褒等還魴誅之魴責譲以行軍法皆叩頭曰今日受誅死無所恨魴曰汝知悔過伏罪今一切相赦聼各反農桑為令作耳目皆稱萬嵗是時每有盗賊並為褒等所發無敢動者縣界清静虞延為細陽令毎至嵗時伏臘輙休遣徒繫各使歸家並感其恩徳應期而還有囚於家被病自載詣獄既至而死延率掾吏殯于門外百姓咸悦之鮑昱為泚陽長政化仁愛境内清浄縣人趙堅殺人繋獄其父母詣昱自言年七十餘惟有一子適新娶今繫獄當死長無種類涕泣永哀昱憐其言令將妻入獄觧械上宿遂全其有子鍾離意㑹稽山隂人少為郡督郵太守賢之任以縣事建武十四年㑹稽大疫死者萬數意獨身自隠親經給醫藥隐親謂親自隐恤之經給謂經營濟給之所部多䝉全濟後為堂邑令初到市無屋意乃出俸錢作屋民齎茅竹或持材木爭赴趣作不日而成既畢為觧土祝曰興工役者令也如有禍祟令自當之民皆大悦邑人防廣為父報讐繫獄其母病死廣哭泣不食意憐傷之乃聼廣歸家使得殯斂丞掾皆争意曰罪自我歸義不累下遂遣之廣歛母訖果還入獄意宻以状聞竟得以减死論曹褒為圉令以禮理人以徳化俗時它郡盗徒五人來入圉界吏捕得之陳留太守馬嚴聞而疾惡風縣殺之褒勑吏曰夫絶人命者天亦絶之臯陶不為盗制死刑管仲遇盗而升諸公今承㫖而殺之是逆天心順府意也其罰重矣如得全此人命而身生之吾所願也遂不為殺嚴奏褒耎弱免官歸郡吴祐為膠東侯相安丘男子丘長與母俱行市道遇醉客辱其母長殺之而亡安丘追蹤於膠東得之祐呼長謂曰子母見辱人情所耻然孝子忿必慮難動不慮親今若背親逞怒白日殺人赦若非義刑若不忍將如之何長以械自繫曰國家制法囚身犯之明府雖加哀矜恩無所施祐問長有妻子乎對曰有妻未有子也即移安丘送長妻到觧其桎梏使同宿獄中妻遂懐孕冬至盡行刑長泣謂母曰負母應死當何以報吴君乎乃齧指而吞之􅍭血言曰妻若生子名之吴生言我臨死吞指為誓屬兒以報吴君因投繯而死崔瑗為汲令為人開稻田數百頃視事七年百姓歌之蘇章為武原令時嵗饑輙開倉廪活三千餘户度尚為文安令遇時疾疫榖貴人饑尚開倉廪給營救疾者百姓䝉其濟時冀州刺史朱穆行部見尚甚竒之周澤為澠池令奉公克己矜恤孤羸吏人歸愛之韓韶為嬴長賊聞其賢相戒不入嬴境餘縣多被冦盗廢耕桑其流入縣界索衣糧者甚衆韶愍其饑困乃開倉賑之所資贍萬餘户主者爭謂不可韶曰長活溝壑之人而以此伏罪含笑入地矣太守素知韶名徳竟無所坐陳登為東陽長養耆育孤視民如傷吴朱桓為餘姚長往遇疫癘榖食荒貴桓分部長吏隠親醫藥餐粥相繼士民感戴之晉喬智明隆慮共二縣令部人張兑為父報讐母老單身有妻無子智明愍之停其獄嵗餘令兌将妻入獄兼隂縱之人有勸兑逃者兑曰有君如此吾何忍累之縱吾得免作何面目視息世間於獄産一男㑹赦得免其仁感如是華譚為郟令于時兵亂之後境内饑饉譚傾心撫䘏司徒王戎聞而善之出榖三百斛以助之譚甚有政績范廣為堂邑令丞劉榮坐事當死郡劾以付縣榮即縣人家有老母至節廣輙聼暫還榮亦如期而反縣堂為野火所及榮脱械救火事畢還自著械後大旱米貴廣㪚私榖賑饑人至數千斛逺近流寓投之戸口十倍卒於官夏方為髙山令百姓有罪應加捶撻者方向之涕泣而不加罪大小莫敢犯焉曹攄為臨淄令獄有死囚嵗夕攄行獄愍之曰卿等不幸致此非所如何新嵗人情所重豈不欲暫見家耶衆囚皆涕泣曰若得暫歸死無恨也攄悉開獄出之剋日令還掾吏固爭咸謂不可攄曰此雖小人義不見負自為諸君任之至日則相率而還並無違者一縣歎服號曰聖君南齊周顒為山隂令縣舊訂滂民以供雜使顒言之於太守聞喜公子良曰竊見滂民之困困實極矣役命有常祗應轉竭蹙迫驅催莫安其所險者或竄避山湖困者或自經溝瀆亦有摧臂斮手首目殘落貶傭貼子權赴急難毎至滂使發動遵赴常促輙有植杖被緼稽顙皆垂泣涕告哀不知所振下官未嘗不臨食罷筯當書偃筆為之久之愴不能已交事不濟不得不就加捶罰見此辛酸時不可過山隂邦治事倍餘城然畧聞諸縣亦處處皆躓唯上虞以百户一滂大為優足過此列城不無彫罄宜應有以普救倒懸設流開便則轉患為功得之何逺何思澄為長城令有能名在縣清㢘不受禮遺夏節至忽牓門受餉數日得米二千餘斛他物稱是悉以代貧人輸税梁傅岐為始新令縣民有因鬬相毆而死者死家訃郡郡録其仇人考掠備至終不引咎郡乃移獄于縣岐即命脱械以和言問之便即首服法當償死㑹冬節至岐乃放其還家使過節一日復獄掾曹固争曰古者乃有此於今不可行岐曰其若負信縣令當坐主者勿憂竟如期而反太守深相嘆異遽以状聞隋房恭懿開皇初為新豐令政為三輔之最文帝聞而嘉之賜物四百叚恭懿以所得賜分給窮乏未幾賜米三百石恭懿又以賑貧人帝聞而止之時應州諸縣令毎朝謁帝必呼恭懿至榻前訪以化下之言魏徳深大業末為貴鄉長越王侗徵兵於郡丞元寳藏令徳深率兵千人赴東都俄而寳蔵以武陽歸李宻徳深所領皆武陽人也以本土從賊念其親戚輙出都門東向慟哭而反人或謂之曰李宻兵馬近在金墉去此二十餘里汝欲歸誰能相禁何為自苦如此其人皆垂泣曰我與魏明府同来不忍棄去豈以道路難乎其得人心如此唐李大亮為土門令屬百姓饑荒盗賊充斥大亮賣所乗馬分給貧弱勸以墾田嵗因大稔員半千為武陟尉屬頻嵗旱饑勸縣令殷子良開倉以賑貧餒子良不從㑹子良赴州半千便發倉粟以給饑人懐州刺史郭齊宗大驚因而按之時黄門侍郎薛元超為河北道存撫使謂齊宗曰公之百姓不能救之而使恵歸一尉豈不愧也遽令釋之裴耀卿開元初為長安令舊有配戸和市之法百姓苦之耀卿到官一切令出儲蓄之家預給其直遂無姦僦弊公私甚以為便盧坦為夀安令時河南尹徵賦限窮而縣人許以機織未就坦請延十日府不許坦令人但就其織而輸勿顧限也違之不過罰令俸耳既成而輸坦亦坐罰由是知名韋景駿為肥鄉令縣北界漳水連年泛溢舊堤迫近水漕雖修築不息而漂流相繼景駿審其地勢拓南數里因髙築堤暴水至而堤南以無水患水去而堤北稱腴田澤水舊有架柱長橋毎年修葺景駿又改造為浮橋自是無復水患至今賴焉時河北饑景駿躬撫合境村閭必通贍恤貧弱獨免流離晉史圭初仕後唐同光中為寧晉令擅給驛廪以代饑民民甚感之及為樂夀令里人為之立碑静治令長之徳有仁恕有明察有强毅有清儉各行其志同歸於理然字人之道簡易為先不嚴而理不肅而成民性本静斯得不煩之㫖焉古人有足不下堂智周於物不求課最政寛務簡渾無朕迹化若神明幾乎無為之治清静之化老氏曰治大國若烹小鮮斯之謂矣子竒齊人年十八齊君使之治阿既行矣悔之使使追曰未至阿及之還之已至勿還也使者及之而不還君問其故對曰臣見所與共載者白首也夫以老者之智以少者之决必能治阿矣是以不還至阿鑄其庫兵以為農耕器出倉廪以賑貧窮阿縣大化宓子賤魯人為單父宰子賤辭去因請借善書者二人使書憲法數品魯君與之至單父使書子賤從旁引其肘書醜則怒之欲好書又引之書者患之請辭去歸以告魯君魯君曰子賤苦吾憂之使不得施其善政也乃命有司無得擅徵發單父大治宓子賤弹鳴琴身不下堂單父治巫馬期亦治單父以星出以星入日夜不處以身親之而單父亦治巫馬期問其故宓子曰我之謂任人子之謂任力任力者勞任人者佚漢原渉為大司徒史丹舉􅀎治劇為谷口令在馮翊之縣今之雲陽谷口是其處也時年二十餘谷口聞名不言而治李歴為新城長政貴無為後漢陳寔為太丘長修徳清静百姓以安鄰縣人户歸附者寔輙訓導譬觧發遣各令還本縣司官行部吏慮有訟者白欲禁之寔曰訟以求直禁之理將何申其勿有所拘司官聞而歎息曰陳君所言若是豈有怨於人乎亦竟無訟者劉永國字叔儒為東城令聞其名枉者更直濁者强清肅然無事唯以著作為務魏倉慈字孝仁文帝黄初末為長安令清約有方吏民畏而愛之吉茂字叔暢為臨汾令在官清静吏民不忍欺晉夏侯湛出為野王令以䘏隠為急而緩於公調政清務閑優㳺多暇李裔為樂平侯相政尚清簡王衍為元城令終日清談而縣務亦理劉超為句容令推誠於物為百姓所懐當年賦税主者常自四出結誣家皆至超但作大函封别付之使各自書家産投函中訖送還縣百姓依實投上課輸所入有踰當年賀循為陽羡令以寛恵為本不求課最宋顧凱之為山隂令山隂民户三萬海内劇邑前後官長晝夜不得休事猶不舉凱之理繁以約縣用無事晝日垂簾門堦閑寂自宋世為山隂務簡而績修莫􅀎尚也江秉之為山隂令民户三萬政事煩擾訟訴殷積庭堦常數百人秉之御繁以簡常得無事南齊傅翽琰之子翽為官亦有能名後為吴令别建康令孫㢘㢘因問曰聞丈人發姦摘伏恵化如神何以至此荅曰無他也唯勤而清清則憲綱自行勤則事無不理綱自行則吏不􅀎欺事自理則物無凝滯欲不理得乎後為建康令復有􅀎名梁劉霽為海鹽令前後宰二邑並以和理著稱何炤為永康令以和理著稱後魏泉企字思道年十二為豐陽令雖童㓜而好學恬静百姓安之隋劉曠文帝開皇初為平鄉令人有争訟者輙丁寕曉以義理不加繩刻各自引咎而去魏徳深煬帝大業中為貴鄉長為政清静不嚴而化唐張元濟隋末為武陽令務以徳教訓百姓懐之㢘儉亷以自歛儉為恭徳誠以約而鮮失亦逺耻而斯在乃有分蒞邑政克敦清節彰明於素履率厲於頽俗處脂膏而弗潤立折貉而無愧服飲蔬菲器玩質樸唯仰給於俸祿咸抑譲其饋禮損己䘏下致孝愽愛迨乎罷秩罔能治生乃至云亡曽無餘粒若乃浮雲公廪脱屣室家徹庖㸑之具减芻秣之㣲雖切自修亦矯激太過耳後漢董宣為雒陽令卒於官詔遣使者臨視唯見布被覆屍妻子對哭有大麥數斛敝車一乗光武傷之曰董宣㢘潔死乃知之孔奮建武初為姑臧長時天下擾亂唯河西獨安而姑臧稱為富邑通貨羗胡市日四合每居縣者不盈數月輙至豐積奮在職四年財産無所增事母孝謹雖為儉約奉養極求珍膳躬率妻子同甘菜茹時天下未定士多不修節操而奮力行清潔為衆人所笑以為身處脂膏不能以自潤徒益苦辛耳奮既立節治貴仁平太守梁綂深相敬待不以官屬禮之嘗迎於大門引入見母隴蜀既平河西守令咸被徵召財貨連榖彌竟川澤唯奮無資單車就路姑臧吏民及羗胡更相畏曰孔君清㢘仁賢舉縣䝉恩如何今去不共報徳遂相賦歛牛馬器物千萬以上追送數百里奮謝之而已一無所受胡紹為河南懐令三日一視事十日一詣倉受俸米於閣外炊作乾飯食之不設釜竈宋度為定陵令素杯食麥飯范丹字史雲為莱蕪長去官於市賣卜妻績紡以自給閭里歌之曰甑中生塵范史雲釜中生魚范莱蕪魏時苖字徳胄為夀春令其始之官乗薄軬車黄㹀牛布被嚢居官嵗餘牛生一犢及其去留其犢謂主簿曰令来時無此犢犢是淮南所生者也羣吏曰六畜不識父自當隨母苗不聼時人皆以為矯激然由此名聞天下蜀董和漢末為江原長成都令蜀土富實時俗奢侈貨殖之家侯服玉食婚姻葬送傾家竭産和躬率以儉惡衣蔬食防遏踰僣為之軌制晉杜軫為建寕令秩滿將歸羣蠻追送路遺甚多軫一無所受去如初至宋何子平有孝行為六郡海虞令縣禄唯給供養一身妻子不犯一毫人或疑其儉薄子平曰希禄夲在養親不在為己問者慙而退南齊禇球為溧陽令在縣清白資公俸而已周洽歴句容曲河上虞吴令亷約無私卒於都水使者無以殯歛吏人為買棺器武帝聞而非之曰洽累歴名邑而居處不理遂坐無車宅死令吏衣棺之此故宜罪貶無論褒䘏乃勑不給贈賻梁孫謙為寕朔將軍錢塘令治煩以簡獄無繫囚及去官百姓以謙在職不受餉遺追載縑帛以送之謙却不受毎去官輙無私宅常借官空庫廊居焉何敬叔為東海令在縣清㢘不受饋劉香為餘姚令在縣清潔人有饋遺一無所受郡守湘東王發教褒稱之樂法才為建康令不受俸秩比去任將至百金縣曺啟輸臺庫髙祖嘉其清節曰居職若斯可以為百城表矣何逺為武康令愈厲㢘節除淫祀正身率職民甚稱之太守王彬廵屬縣諸縣盛供帳以待焉至武康逺獨設糗水而已彬去逺送至境進斗酒隻雞為别彬戲曰卿禮有過陸綗将不為古人所笑乎嚴植之建武中為康樂侯相在縣清白民吏稱之丘師施以㢘潔稱罷臨安縣還唯有二十籠簿書並是倉庫劵帖當時以比范述曽位至臺郎范述曽事具牧守門陳禇玠為山隂令在任嵗餘守禄俸而已去官之日不堪自致因留縣境種蔬菜以自給或嗤玠以非百里之才玠答曰吾委輸課最不後列城除殘去暴姦吏跼蹐若謂其不能自潤脂膏則如来命以為不達從政吾未服也時人以為信隋髙世衡為櫟陽令劉髙為蕭令劉熾為成臯令大業之末長吏多贓惟衡髙及熾清節逾厲馮履謙為河北尉有部人張懐道任江陽尉與謙疇舊餽鏡一面謙集寮吏遍示之曰此張公所致也吾與之有舊吾效官以俸禄自守豈私受遺哉昌言曰清水見底明鏡炤心余之效官必至於此復書於使者乃歸之唐袁承序武徳中為建昌令在任清潔士吏懐之馮元淑為浚儀始平二縣令單騎赴職未嘗以妻子之官所乗馬午後則不與芻云令其作齋身及奴僕毎旦食而已俸禄之餘皆備公用並給與貧乏或譏其邀名元淑曰此本性不為苦栁公綽為渭南尉屬嵗饑其家雖給而毎飲不過一器嵗稔復初晉李為光初仕後唐為臨潁令己俸之外未嘗受邑人饋遺其縣署被損有年矣累政因循無復修者為光以文告乃屬縣上户出材植人工營葺悦而使之百姓子来不數月公宇一新暨得替移家唯有大豆數石漢鄧守中為開封令妻子不之官舍其所履有可稱者冊府元龜卷七百四
