body:
  text: 册府元龜卷七百四十六宋王欽若等撰陪臣部公正死節公正古之君子進思盡忠有犯無隱在公正色當官而行者何嘗不以尊主庇民為心濟時利物為務雖復參家陪之列仕諸侯之國而能秉心忠義臨事感慨規政教之失盡獻替之道竭節於公室馳聲於隣境風軌可尚盖不勝紀至有亡身殞命義存君親扶危持顛志厲金石此皆特立不囘之士疾惡如讐之人茍能明哲保身進退以禮斯可謂全德者矣詩之司直豈過是乎石碏衛大夫也魯隱公四年衛州吁弑桓公而立未能和其民石碏子厚問定君於石子石子石碏也以州吁不安諮其父石子曰王覲為可曰何以得覲曰陳桓公方有寵於王陳衛方睦若朝陳使請必可得也厚從州吁如陳石碏使告于陳曰衛國􅄶小老夫耄矣無能為也此二人者實弑寡君敢即圖之八十曰耄稱國小已老自謙以委陳使因其徃就圖之陳人執之而請涖於衛請衛人自臨討之九月衛人使右宰醜涖殺州吁于濮石碏使其宰獳羊肩涖殺石厚于陳君子曰石碏純臣也惡州吁而厚與焉大義滅親其是之謂乎卜偃晉大夫也魯僖公二十三年晉懐公殺狐突卜偃稱疾不出曰周書有之乃大明服周書康誥言君能大明則民服已則不明而殺人以逞不亦難乎民不見德而惟戮是聞其何後之有臧文仲魯大夫也僖公二十八年温之㑹晉人執衛成公臧文仲言於僖公請於晉而免之衛侯聞其臧文仲之為也使納賂焉辭曰外臣之言不越境不敢及君士季晉大夫㑹也魯文公七年晉先蔑奔秦士㑹在秦三年不見士伯士伯先蔑其人曰能亡人於國言能與人俱亡於晉國不能見於此焉用之何用如此士季曰吾與之同罪俱有迎公子雍之罪非義之也將何見焉言已非慕先蔑之義而從之及歸遂不見責先蔑為正卿而不直諫且俱出奔惡有黨也士㑹歸在三十年季文子魯大夫文公十八年莒太子僕弑其君紀公以其寳玉來奔納諸宣公公命與之邑曰今日必授季文子使司冦出諸竟曰今日必逹未見公而文子出之郤獻子名克晉大夫也靡笄之役魯成公二年韓獻子將斬人獻子馳將救之至則既斬之矣郤獻子請以狥其僕曰子不將救之乎郤獻子曰敢不分謗乎言欲與韓子分謗厲公將作難胥童曰必先三郤公曰然郤氏聞之郤錡欲攻公曰雖死君必危郤至曰人所以立信知勇也信不叛君知不害民勇不作亂失兹三者其誰與我死而多怨將安用之言俱死無用多其怨咎君實有臣而殺之其謂君何我之有罪吾死後矣若殺不辜將失其民欲安得乎不得安君位待命而已受君之祿是以聚黨有黨而争命争死命罪孰大焉傳言郤至無反心子臧曹公子也魯成公十五年晉侯以曹伯殺太子而自立執而歸諸京師諸侯將見子臧於王而立之子臧辭曰前志有之曰聖逹節次守節下失節為君非吾節也雖不能聖敢失守乎遂逃奔宋十六年六月曹人請于晉曰自我先君宣公即世在十三年國人曰若之何憂猶未弭弭息也既葬國人皆將從子臧所謂憂未息而又討我寡君前年晉侯執曹伯以亡曹國社稷之鎮公子謂子臧逃奔宋是大冺曹也冺滅也先君無乃有罪乎言今君無罪而見討得無以先君故若有罪則君列諸㑹矣諸侯雖有簒弑之罪侯伯已與之㑹則不復討前年㑹于戚曹伯在列盟畢乃執之故曹人以為無罪君惟不遺德刑遺失也以伯諸侯豈獨遺諸敝邑敢私布之七月曹人復請于晉晉侯謂子臧反吾歸而君以曹人重子臧故子臧反曹伯歸子臧自宋還子臧盡致其邑與卿而不出不出仕范文子晉大夫也魯成公十六年四月晉侯將伐鄭范文子曰若逞吾願諸侯皆叛晉可以逞逞快也晉厲公無道三郤驕故欲使諸侯叛冀其懼而思徳若惟鄭叛晉國之憂可立俟也五月晉師濟河聞楚師將至范文子欲反曰我偽逃楚可以紓憂舒緩也夫合諸侯非吾所能也以遺能者我若羣臣輯睦以事君多矣武子曰不可六月晉楚遇於鄢陵范文子不欲戰郤至曰韓之戰惠公不振旅衆散敗也在僖十五年箕之役先軫不反命死於狄也在僖二十三年邲之師荀伯不復從荀林父奔走不復故道在宣十二年皆晉之耻也子亦見先君之事矣見先君成敗之事今我辟楚又益耻也文子曰吾先君之亟戰也有故亟數也秦狄齊楚皆彊不盡力子孫將弱今三彊服矣齊秦狄敵楚而已惟聖人能外内無患自非聖人外寧必有内憂驕亢則憂患生也盍釋楚以為外懼乎及楚宵遁晉入楚軍三日榖食楚粟三日也范文子立於戎馬之前曰君㓜諸臣不佞佞才也何以及此君其戒之戒勿驕周書曰惟命不于常有德之謂周書康誥言勝無常命惟德是與范文子反自鄢陵使其祝宗祈死祝宗主祭祝祈禱也曰君驕侈而克敵是天益其疾也難將作矣愛我者惟祝我使我速死無及於難范氏之福也魏絳晉司馬也魯襄公三年夏晉悼公㑹諸侯盟于雞澤晉侯之弟揚干亂行於曲梁魏絳戮其僕悼公怒謂羊舌赤曰合諸侯以為榮也揚干為戮何辱如之必殺魏絳魏絳至授僕人書將伏劔公跣而出曰寡人之言親愛也吾子之討軍禮也子無重寡人之過與之禮食匠慶為大匠魯襄公四年秋定姒薨不殯于廟無櫬不虞櫬親身棺季孫以定姒本賤既無器備議其䘮制欲殯不過廟又不反哭匠慶謂季文子曰子為正卿而小君之䘮不成謂如季孫所議則為夫人禮不成不終君也慢其母是不終事君之道君長誰受其咎言襄公長將責季孫初季孫為已樹六檟於蒲圃東門之外蒲圃塲圃名季文子樹檟欲自為櫬匠慶請木為定姒作襯季孫曰畧不以道取為畧匠慶用蒲圃之檟季孫不御御止也傳言遂得成禮故經無異文君子曰志所謂多行無禮必自及也其是之謂乎子罕為宋司城魯襄公六年宋華弱與樂轡少相狎長相優又相謗也狎親習也優調戯也子蕩怒以弓梏華弱于朝子蕩樂轡也張弓以貫其頭若械之在手故曰梏平公見之曰司武而梏於朝難以勝矣司武司馬言其懦弱不足以勝敵遂逐之夏宋華弱來奔子罕曰同罪異罰非刑也專戮於朝罪孰大焉亦逐子蕩子蕩射子罕之門曰㡬日而不我從言我射女門女亦當以不勝任見逐子罕善之如初言子罕雖見辱不追忿所以得安向戍宋大夫也魯襄公十年晉侯㑹諸侯于柤晉士匄請伐偪陽以封向戍五月甲午遂滅偪陽以與向戍向戍辭曰君若猶辱鎮撫宋國而以偪陽光啓寡君羣臣安矣其何貺如之言見賜之厚無過此若專賜臣是臣興諸侯以自封也其何罪大焉敢以死請乃予宋公晏嬰為齊卿齊惠欒髙氏皆耆酒欒髙二族皆出惠公信内多怨説婦人言故多怨彊於陳鮑氏而惡之惡陳鮑有告陳桓子曰子旗子良將攻陳鮑亦告鮑氏桓子授甲而如鮑氏遭子良醉而騁欲及子良醉故驅告鮑文子遂見文子文子鮑國則亦授甲矣使視二子二子子旗子良則皆將飲酒桓子曰彼雖不信彼傳言者聞我授甲則必逐我及其飲酒也先伐諸陳鮑方睦遂伐欒髙氏子良曰先得公陳鮑焉徃欲以公自輔助遂伐虎門欲入公不聽故伐虎門晏子端委立于虎門之外端委朝服四族召之無所徃四族欒髙陳鮑其徒曰助陳鮑乎曰何善焉言無善義何助助欒髙乎曰庸愈乎罪惡不差于陳鮑然則歸乎曰君伐焉歸公召之而後入穿封戍楚大夫魯襄公二十六年楚子侵鄭五月至于城麋鄭皇頡戍之出與楚師戰敗穿封戍囚皇頡公子圍與之争之正於伯州犂伯州犂曰請問於囚乃立囚伯州犂曰所争君子也其何不知上其手曰夫子為王子圍寡君之貴介弟也下其手曰此子為穿封戍方城外之縣尹也誰獲子囚曰頡遇王子弱焉戍怒抽戈逐王子圍弗及魯昭公八年楚靈王滅陳靈王即王子圍也使戍為陳公曰城麋之役不謟侍飲酒於王王曰城麋之役女知寡人之及此女其辟寡人乎及此謂為王對曰若知君之及此臣必致死禮以息楚魯公冶季氏屬大夫襄公二十九年公入楚還及方城季武子取卞取卞邑以自益使公冶問問公起居璽書追而與之璽印也曰聞守卞者將叛臣帥徒以討之既得之矣敢告公冶致使而退致季氏使命及舍而後聞取卞發書乃聞之公曰欲之而言叛祗見䟽也言季氏欲得卞而欺我言叛益疏我公謂公冶曰吾可以入乎以季氏䟽已故不敢入對曰君實有國誰敢違君公與公冶冕服以卿服𤣥冕賞之固辭强之而後受公欲無入榮城伯賦式微乃歸式微詩􅆁風曰式微式微胡不歸式用也義取寄寓之㣲陋勸公歸五月公至自楚公冶致其邑於季氏本從季氏得邑故還之而終不入焉不入季孫家曰欺其君何必使余季孫見之則言季氏如他日不見則終不言季氏及疾聚其臣大夫家臣曰我死必無以冕服歛非德賞也言公畏季氏而賞其使非以我有德且無使季氏葬我叔孫豹魯大夫也昭公元年諸侯盟于虢季武子伐莒取鄆莒人告於㑹楚告於晉曰尋盟未退尋弭兵之盟而魯伐莒瀆齊盟瀆慢也請戮其使時叔孫豹在㑹欲戮之樂桓子相趙文子桓子樂王鮒相佐也欲求貨於叔孫而為之請使請帶焉難指求貨故以帶為辭弗與梁其踁曰貨以藩身子何愛焉踁叔孫家臣叔孫曰諸侯之㑹衛社稷也我以貨免魯必受師言不戮其使必伐其國是禍之也何衛之為人之有牆以蔽惡也喻已為國衛如牆為人蔽牆之隙壊誰之咎也咎在牆衛而惡之吾又甚焉罪甚於牆雖怨季孫魯國何罪怨季孫之伐莒叔出季處有自來矣吾又誰怨季孫守國叔孫出使所從來久今遇此戮無所怨也然鲋也賄弗與不已召使者裂裳帛而與之曰𢃄其褊矣言𢃄褊盡故裂裳示不相逆叔孫歸虢㑹歸曽夭御季孫以勞之旦及日中不出恨季孫伐莒使已㡬被戮曽夭謂曽阜曽阜叔孫家臣曰旦及日中吾知罪矣魯以相忍為國也忍其外不忍其内焉用之欲受楚戮是忍其外日中不出是不忍其内阜曰數月於外言叔孫勞役在外數月一旦於是庸何傷賈而欲贏而惡囂乎言譬如商賈求贏利者不得惡喧囂之聲阜謂叔孫曰可以出矣叔孫指楹曰雖惡是其可去乎乃出見之楹柱也以喻魯有季孫猶屋有柱芋尹無宇楚大夫也魯昭公元年楚靈王即位初楚子之為令尹為王旌以田析羽為旌王旌㳺至於軫芋尹無宇斷之曰一國兩君其誰堪之及即位為章華之宮納亡人以實之章華南郡華容縣無宇之閽入焉有罪亡入章華宮無宇執之有司弗與王有司也曰執人於王宮其罪大矣執而謁諸王執無宇也王將飲酒遇其歡也無宇辭曰天子經畧經營天下畧有四海故曰經畧諸侯正封封疆有定分古之制也封畧之内何非君土食土之毛誰非君臣毛草也故詩曰普天之下莫非王土率土之濱莫非王臣詩小雅濱涯也天有十日甲至癸人有十等王至臺下所以事上上所以共神也故王臣公公臣大夫大夫臣士士臣皁皁臣輿輿臣𨽻𨽻臣僚僚臣僕僕臣臺馬有圉牛有牧養馬曰圉養牛曰牧以待百事今有司曰女胡執人於王宮將焉執之周文王之法曰有亡荒閲荒大也閲蒐也有亡人當大蒐其衆所以得天下也吾先君文王楚文王作僕區之法僕區刑書名曰盗所隱器隱盗所得器與盗同罪所以封汝也行善法故能行啓疆北至汝水若從有司是無所執逃臣也逃而舍之是無陪臺也言皆將逃王事無乃闕乎昔武王數紂之罪以告諸侯曰紂為天下逋逃主萃淵藪萃集也天下逋逃悉以紂為淵藪集而歸之故夫致死焉人欲致死討紂君王欲求諸侯而則紂無乃不可乎若以二文之法取之盗有所在矣言王亦為盗王曰取而臣以徃徃去也盗有寵未可得也盗有寵王自謂遂赦之杜洩魯叔孫氏宰也昭公四年冬叔孫豹卒五年正月舍中軍卑公室也初作中軍三分公室而各有其一季氏盡征之叔孫氏臣其子弟孟氏取其半焉及其舍之也四分公室季氏擇二二子各一皆盡征之而貢于公以書使杜洩告於殯告叔孫之柩曰子固欲毁中軍既毁之矣敢告杜洩曰夫子惟不欲毁也故盟諸僖閎詛諸五父之衢皆在襄十一年受其書而投之投擲也帥士而哭之痛叔孫之見誣叔向晉大夫也魯昭公十四年冬十二月晉邢侯與雍子争鄐田邢侯楚申公巫臣之子也雍子亦故楚人久而無成士景伯如楚士景伯晉理官叔魚攝理攝代景伯韓宣子命斷舊獄罪在雍子雍子納其女於叔魚叔魚蔽罪邢侯蔽斷也邢侯怒殺叔魚與雍子於朝宣子問其罪於叔向叔向曰三人同罪施生戮死可也施行罪也雍子自知其罪而賂以買直鲋也鬻獄邢侯專殺其罪一也已惡而掠美為昏掠取也昏亂也貪以敗官為墨墨不潔之稱殺人不忌為賊忌畏也夏書曰昏墨賊殺逸書三者皆死刑臯陶之刑也請從之乃施邢侯而尸雍子與叔魚於市仲尼曰叔向古之遺直也言叔向之直有古人遺風治國制刑不隱於親謂國之大問已所答當也至於他事則宜有隱三數叔魚之惡不為末減末薄也減輕也皆以正言之曰義也夫可謂直矣於義未安直則有之平丘之㑹數其賂也謂言瀆貨無厭以寛衛國晉不為暴歸魯季孫稱其詐也謂言鮒也能以寛魯國晉不為虐邢侯之獄言其貪也以正刑書晉不為頗三言而除三惡加三利三惡暴虐頗也三惡除則三利加殺親益榮榮名益已猶義也夫三罪唯答宣子問不可以不正其餘則以直傷義故重疑之奮揚為楚城父司馬魯昭公二十年春費無極言於楚子曰太子建與伍奢將以方城之外叛自以為猶宋鄭也齊晉又交輔之將以害楚其事集矣王信之問伍奢伍奢對曰君一過多矣一過納建妻何信於讒王執伍奢忿奢切言使奮揚殺太子未至而使遣之知太子寃故遣令走三月太子建奔宋王召奮揚使城父人執已以至王曰言出於余口入于爾耳誰告建也對曰臣告之君王命臣曰事建如事余臣不佞佞才也不能茍貳奉初以還奉初命以周旋不忍後命故遣之既而悔之亦無及已王曰而敢來何也對曰使而失命召而不來是再奸也奸犯也逃無所入王曰歸從政如他日叔孫婼魯大夫也昭公二十三年邾師過武城魯遂取邾師獲徐鉏丘弱茅地邾人愬于晉晉人來討叔孫婼如晉晉人執之晉人使與邾大夫坐坐訟曲直叔孫曰列國之卿當小國之君固周制也在禮卿得㑹伯子男故曰當小國之君邾又夷也邾又有東夷之風寡君之命介子服回子服回魯大夫為叔孫之介副請使當之不敢廢周制故也乃不果坐韓宣子使邾人聚其衆將以叔孫與之與邾使執之叔孫聞之去衆與兵而朝示欲以身死士彌牟謂韓宣子彌牟士景伯曰子弗良圖而以叔孫與其讐叔孫必死之魯亡叔孫必亡邾邾君亡國將焉歸時邾君在晉若亡國無所歸將益晉憂子雖悔之何及所謂盟主討違命也若皆相執焉用盟主聽邾衆取叔孫是為諸侯皆得輙相執乃弗與使各居一館分别叔孫子服回士伯聽其辭而愬諸宣子乃皆執之二子辭不屈故士伯愬而執之士伯御叔孫從者四人過邾館以如吏欲使邾人見叔孫之屈辱先歸邾子士伯曰以芻蕘之難從者之病將館子於都都别都謂箕也叔孫旦而立期焉立待命也從旦至旦為期乃館諸箕舍子服昭伯於他邑别囚之范獻子求貨於叔孫使請冠焉以求冠為辭取其冠法而與之兩冠曰盡矣既送作冠模法又進二冠以與之偽若不解其意為叔孫故申豐以貨如晉欲行貨以免叔孫叔孫曰見我吾告汝所行貨見而不出留申豐不使得出不欲以貨免吏人之與叔孫居於箕者請其吠狗弗與及將歸殺而與之食之示不愛叔孫所館者雖一日必葺其牆屋葺補葺也去之如始至不以當去而有所毁壊子家子魯大夫昭公三十二年十二月公疾徧賜大夫從公者大夫不受賜子家子䨇琥琥玉器一環一璧輕服細好之服受之大夫皆受其賜已未公薨子家子反賜於府人曰吾不敢逆君命也大夫皆反其賜定公元年夏叔孫成子逆昭公之䘮于乾侯成子叔孫婼之子季孫曰子家子亟言於我未嘗不中吾志也吾欲與之從政子必止之且聽命焉衆事皆諮問子家子子家子不見叔孫易幾而哭㡬哭㑹也不欲見叔孫故朝夕哭不同會叔孫請見子家子辭曰羈未得見而從君以出羈子家子名羈出時成子未為卿君不命而薨羈不敢見言未受昭公之命託辭以距叔孫叔孫使告之曰公衍公為實使羣臣不得事君二子始謀逐季氏若公子宋主社稷則羣臣之願也宋昭公弟定公凡從君出而可以入者將惟子是聽子家氏未有後季孫願與子從政此皆季孫之願也使不敢以告不敢叔孫成子名對曰若立君則有卿士大夫與守龜在羈弗敢知若從君者則貌而出者入可也貌出為以義從公與季氏無實怨冦而出者行可也與季氏為冦難者自可去若羈也則君知其出也君昭公而未知其入也羈將逃也䘮至壊隤公子宋先入從公者皆自壊隤反出奔石奢者楚昭王相也堅直亷正無所阿避行縣道有殺人者相追之乃其父也縱其父而還自繫焉使人言之王曰殺人者臣之父也夫以父立政不孝也廢法縱罪非忠也臣罪當死王曰追而不及不當伏罪子其治事矣石奢曰不私其父非孝子也不奉主法非忠臣也王赦其罪上惠也伏誅而死臣職也遂不受令自刎而死仲由字子路魯哀公十四年小邾射以勾繹來奔曰使季路要我吾無盟矣子路信誠故欲得與相要誓而不須盟使子路子路辭季康子使冉有謂之曰千乗之國不信其盟而信子之言子何辱焉對曰魯有事于小邾不敢問故死其城下可也彼不臣而濟其言是義之也由弗能濟成也釁夏魯宗人也宗人禮官也哀公二十四年公子荆之母嬖荆哀公庶子將以為夫人使釁夏獻其禮對曰無之公怒曰女為宗司立夫人國之大禮也何故無之對曰周公及武公娶於薛武公敖也孝惠娶於商孝公稱惠公弗皇商宋也自桓以下娶於齊桓公始娶文姜此禮也則有若以妾為夫人則固無其禮也公卒立之而以荆為太子國人始惡之惡公翟璜魏大夫文侯與士大夫坐問曰寡人何如君也羣臣皆曰君仁君也次至翟璜曰君非仁君也曰子何以言之對曰君伐中山不以封君之弟而以封君之長子臣是以知君之非仁君也文侯怒而逐翟璜翟璜起而出次至任座文侯問寡人何如君也任座對曰君仁君也子何以言之對曰臣聞之其君仁也其臣直向翟黃之言直臣是以知君仁君也文侯曰善復召翟黃入拜為上卿趙奢者趙之田部吏也収租稅而平原君家不肯出趙奢以法治之殺平原君用事者九人平原君怒將殺奢奢因説曰君於趙為貴公子今縱君家而不奉公則法削法削則國弱國弱則諸侯加兵諸侯加兵是無趙也君安得有此富乎以君之貴奉公如法則上下平上下平則國强國强則趙固而君為貴戚豈輕於天下耶平原君以為賢言之於王王用之治國賦國賦大平民富而府庫實死節古之事上者固有殺身以成仁刎頸以見志葢捨生取義輕鴻毛於一命以身狥節貫白日於丹心若乃春秋之世諸侯專政其有屬衰弱之在運逢艱虞之間作或奔走以狥死或周旋以從事秉志誓心無所變易捐軀殞首罔思畏避至於隣兵載交强戰相窘於是英勇感慨忠憤特立聞金皷而自奮塗肝腦而不顧復有上失其道政出多門䜛慝屢興姦詐萌起禮罔由節言以賈禍靡敢胥怨自求死所者亦不失為臣之義也並用著之于篇欒共子晉大夫也武公伐翼殺哀侯武公曲沃桓叔之孫莊伯之子武公稱也翼晉國都也哀侯晉昭侯孫鄂侯子哀侯光也初昭侯分國以封叔父桓叔為曲沃伯曲沃盛强昭侯微弱後晉潘父弑昭侯納桓叔不克晉人立昭侯之子孝侯於翼更為翼侯後桓叔之子莊伯伐翼殺孝侯翼人立其弟鄂侯鄂侯生哀侯魯桓三年曲沃武公伐翼殺哀侯後竟滅翼侯之後而兼之魯莊十六年王使虢公命武公以一軍為晉侯遂為晉祖止欒共子曰茍無死欒共子晉哀侯大夫共叔成也初桓叔為曲沃伯共子之父欒賓傅之故止共子使無死也吾以子見天子令子為上卿制晉國之政上卿執政命於天子者辭曰臣聞之民生於三事之如一三君父師也故一服勤至死父生之師教之君食之食謂祿也非父不生非食不長非教不知生之旌也故一事之旌類也一事之事之如一惟其所在則致死焉在君父為君父在師為師報生以死報賜以力人之道也賜惠也以力為臣臣敢以私利廢人之道私利謂不死為上卿君何以訓矣無以教為忠且君知成之從也未知其待於曲沃也君武公也言君知成將死其君為從臣道故使止臣未知成不死而待君於曲沃之為貳也從君而貳君焉用臣貳二心遂鬭而死荀息晉大夫也里克弑其君之子奚齊又弑其君卓子及其大夫荀息奚齊卓子者驪姬之子也荀息傅焉禮諸侯之子八崴受少傅教之以小學業小道焉履小節焉十五受太傅教之以大學業大道焉履大節焉驪姬者國色也其顔色一國之選獻公愛之甚欲立其子於是殺世子申生申生者里克傅之獻公病將死謂荀息曰士何如則可謂之信矣獻公自知廢正當有後患欲託二子於荀息故動之云爾荀息對曰使死者反生生者不愧乎其言則可謂信矣荀息察言觀色知獻公欲為奚齊卓子來動已故答之云爾獻公死奚齊立里克謂荀息曰君殺正而立不正廢長而立㓜長謂重耳如之何願與子慮之荀息曰君嘗訊臣矣上問下曰訊言臣者明君臣相與言不可負臣對曰使死者反生生者不愧乎其言則可謂信矣里克知其不可與謀退弑奚齊荀息立卓子里克弑卓子荀息死之荀息可謂不食其言矣狐突晉大夫也晉惠公卒懐公命無從亡人懐公子圉亡人重耳期期而不至無赦狐突之子毛及偃從重耳在秦弗召偃子犯也懐公執狐突曰子來則免未期而執突以不召子故對曰子之能仕父教之忠古之制也策名委質貳乃辟也名書於所臣之䇿屈膝而君事之則不可以貳辟罪也今臣之子名在重耳有年數矣若又召之教之貳也父教子貳何以事君刑之不濫君之明也臣之願也滛刑以逞誰則無罪臣聞命矣乃殺之先軫晉大夫晉侯敗狄于箕先軫曰匹夫逞志於君謂不顧而唾而無討敢不自討乎免胄入狄師死焉狄人歸其元元首面如生蕩意諸宋大夫宋公子鮑禮於國人宋饑竭其粟而貸之襄夫人欲通鮑而不可乃助之施昭公無道國人奉公子鮑以因夫人於是華元為右師元華督曽孫代公子成公孫友為左師華耦為司馬代公子卬鱗鱹為司徒蕩意諸為司城公子朝為司冦代華御事初司城蕩卒公孫壽辭司城壽蕩之子請使意諸為之意諸壽之子既而告人曰君無道吾官近懼及焉禍及已棄官則族無所庇子身之貳也姑紓死焉姑且也紓緩也雖亡子猶不亡族已在故也既夫人將使公田孟諸而殺之公知之盡以寳行蕩意諸曰盍適諸侯公曰不能其大夫至於君祖母以及國人君祖母諸侯祖母之稱謂㐮夫人諸侯誰納我且既為人君而又為人臣不如死盡以其寳賜左右而使行行去也夫人使謂司城去公對曰臣之而逃其難若後君何言無以事後君冬十一月甲寅宋昭公將田孟諸未至夫人王姬使帥甸攻而殺之襄夫人周襄王姊故稱王姬帥甸郊甸之師蕩意諸死之郤至晉大夫初厲公將殺三郤郤錡謂郤至曰君不道於我我欲以吾宗與吾黨夾而攻之雖死必敗國國敗君必危其可免乎郤至曰不可至聞之武人不亂知人不詐仁人不黨夫利君之富富以聚黨利黨以危君君之殺我也後矣且衆何罪均之死不若聽君之命是故皆自殺也惠伯魯大夫襄仲弑惡及視而立宣公仲以君命召惠伯詐以子惡命其宰公冉務人止之曰入必死叔仲曰死君命可也公冉務人曰若君命可死非君命何聽弗聽乃入殺而埋之馬矢之中惠伯死不書者史畏襄仲不敢書殺惠伯公冉務人奉其孥以奔蔡既而復叔仲氏孔逹衛大夫清丘之盟晉以衛之救陳也討焉尋清丘之盟以責衛使人弗去曰罪無所歸將加而師孔逹曰茍利社稷請以我説欲自殺以説晉罪我之由我則為政而亢大國之討將以誰任亢禦也謂禦宋討陳也我則死之孔逹縊而死衛人以説于晉而免以殺告故免于伐遂告于諸侯曰寡君有不令之臣逹搆我敝邑于大國既伏其罪矣敢告諸殺大夫亦皆告衛人以為成勞復室其子以有平國之功故以女妻之使復其位襲父祿位公孫敖魯大夫奔莒生二子敖死其二子來敖在莒所生孟獻子愛之聞於國獻子榖之子仲孫蔑或譛之曰將殺子獻子以告季文子二子曰夫子以愛我聞我以將殺子聞不亦逺於禮乎逺禮不如無一人門于句一人門于戾丘皆死句戻丘魯邑有冦攻門二子禦之而死唐茍鄭大夫也魯成公十六年晉侯及楚子鄭伯戰于鄢陵石首御鄭成公唐茍為右石首曰衛懿公惟不去其旗是以敗於熒乃内旌於􅌢中熒戰在閔二年唐苟謂石首曰子在君側敗者壹大我不如子子以君免我請止乃死荆蒯芮齊大夫初崔杼弑莊公荆蒯芮使晉而至其僕曰君之無道也四鄰諸侯莫不聞也以夫子而死不亦難乎荆蒯芮曰善而言也早言我能諫諫而不聽我能去今既不諫又不去吾聞之食其食死其事吾既食亂君之食矣又安得治君而死之遂驅車而入死其僕曰人有亂君猶必死之我有治長可無死乎乃結轡自刎乎車上君子聞之曰荆蒯芮可謂守節死義矣則僕夫無為死也猶食飲而遇毒也詩曰夙夜匪懈以事一人荆先生之謂乎易曰不恒其德或承之羞僕夫之謂矣叔孫昭子魯大夫昭公孫于齊昭子自闞歸見平子平子稽顙曰子若我何昭子曰人誰不死子以逐君成名子孫不忘不亦傷乎將若子何平子曰苟使意如得改事君所謂生死而肉骨也昭子從公于齊與公言子家子命適公館者執之恐從者知叔孫謀公與昭子言於幄内曰將安衆而納公昭子請歸安衆公徒將殺昭子伏諸道伏兵左師展告公公使昭子自鑄歸辟伏兵平子有異志不欲復納公昭子齊于其寝使祝宗祈死而卒耻為平子所欺因祈而自殺仲由字子路卞人衛大夫孔悝納莊公立之初孔圉取太子蒯瞶之姊生悝孔圉孔文子也蒯瞶姊孔伯姬孔氏之豎渾良夫長而美孔文子卒通於内通伯姬太子在戚孔姬使之焉使良夫詣太子所太子與之言曰茍使我入獲國服冕乗軒三死無與冕大夫服軒大夫車三死死罪三與之盟為請於伯姬良夫為太子請閠月良夫與太子入舍於孔氏之外圃園圃昏二人蒙衣而乗二人太子與良夫蒙衣為婦人服也寺人羅御如孔氏孔氏之老欒寧問之稱姻妾以告自稱昏姻家妾遂入適伯姬氏既食孔伯姬杖戈而先太子與五人介輿豭從之介被甲輿豭豚欲以盟廹孔悝於厠强盟之孔氏專政故刼孔悝欲令逐輙遂刼以登臺欒寧將飲酒炙未熟聞亂使告季子季子子路也為孔氏邑宰召獲駕乗車召獲衛大夫駕乗車言不欲戰行爵食炙奉衛侯輙來奔季子將入遇子羔將出子羔衛大夫髙柴孔子弟子將出奔曰門已閉矣季子曰吾姑至焉且欲至門子羔曰弗及不踐其難言政不及已可不須踐其難季子曰食焉不避其難謂食孔氏祿子羔遂出子路入及門公孫敢門焉守門曰無入為也言輙已出無為復入季子曰是公孫也求利焉而逃其難由不然利其祿必救其患有使者出乃入因門開而入曰太子焉用孔悝雖殺之必或繼之言已必繼孔悝為難攻太子且曰太子無勇若燔臺半必舍孔叔太子聞之懼下石乞孟黶敵子路二子蒯瞶黨敵當也以戈擊之斷纓子路曰君子死冠不免不使冠在地結纓而死孔子聞衛亂曰柴也其來由也死矣髙昭子名張齊人也齊景公病命其相國惠子與髙昭子以子荼為太子景公卒兩相髙國立荼是為安孺子而田乞不説欲立景公佗子陽生乃與鮑牧諸大夫以兵入公室昭子聞之與國惠子救公公師敗田乞之衆追國惠子惠子奔莒遂返殺髙昭子酅魁壘晉士也荀瑶帥師圍鄭未至鄭駟𢎞曰知伯愎而好勝早下之則可行也行去也乃先保南里以待之保守也南里在城外知伯入南里門于桔柣門鄭人俘酅魁壘賂之以晉政欲使反為鄭閉其口而死雍門狄齊大夫也初越甲至齊雍門狄請死之齊王曰皷鐸之聲未聞矢石未交長兵未接子何務死之為人臣之禮耶雍門狄對曰臣聞之昔者王田於囿左轂鳴車右請死之王曰子何為死車右曰為其鳴吾君也王曰左轂鳴者此工師之罪也子何事之有焉車右對曰吾不見工師之乗而見其鳴吾君也遂刎頸而死有是乎王曰有之雍門狄曰今越甲至其鳴吾君豈左轂之下哉車右可以死左轂而臣獨不可以死越甲耶遂刎頸而死是日越人引軍而退七十里曰齊王有臣均如雍門狄擬使越社稷不血食遂歸齊王葬雍門狄以上卿之禮肥義趙大夫初武靈王傳國於子惠文王又封長子章為代安陽君章素侈心不服其弟所立主父又使田不禮相章也李兌謂肥義曰公子章彊壯而志驕黨衆而欲大殆有私乎不禮之為人也忍殺而驕二人相得必有謀隂賊起一出身徼幸夫小人有欲輕慮淺謀徒見其利而不顧其害同類相推俱入禍門以吾觀之必不久矣子任重而勢大亂之所始禍之所集也子必先患仁者愛萬物而智者備禍于未形不仁不智何以為國子奚不稱疾毋出傳政于公子成毋為怨府毋為禍梯肥義曰不可昔者主父以王屬義也曰毋變而度毋異而慮堅守一心以殁而世義再拜受命而籍之今畏不禮之難而忘吾籍變孰大焉進受嚴命退而不全負孰甚焉變負之臣不容于刑諺曰死者復生生者不愧吾言已在前矣吾欲全吾言安得全吾身且夫貞臣也難至而節見忠臣也累至而行明子則有賜而忠我矣雖然吾有語在前者也終不敢失李兊曰諾子勉之矣吾見子已今年耳涕泣而出李兊數見公子成以備田不禮之事異日肥義謂信期曰公子與田不禮甚可憂也其于義也聲善而實惡此為人也不子不臣吾聞之也奸臣在朝國之殘也讒臣在中主之蠧也此人貪而欲大内得主而外為暴矯令為慢以擅一旦之命不難為也禍且逮國今吾憂之夜而忘寐饑而忘食盗賊出入不可不備自今已來若有召王者必見吾面我將先以身當之無故而王乃入信期曰善哉吾得聞此也既而公子章即以徒與田不禮作亂先殺肥義扈輙趙幽繆王二年秦攻武城輙率師救之軍敗死之韓舉韓將也宣惠公八年與齊魏戰死于桑丘冊府元龜卷七百四十六
