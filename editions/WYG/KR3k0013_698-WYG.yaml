body:
  text: 册府元龜巻六百九十八宋王欽若等撰牧守部懦劣失政專恣懦劣夫居専城之任責共守之功既須才賢必資果斷乃可以外申幹國之力内成庇民之術者也乃有巽耎無立骫骳茍存處金湯之固委符於外寇挾兵衞之勢斂袵於凶徒條敎靡行僚吏不率政歸於下民無攸措豈惟敗事之責盖成滅身之禍書之於册良可羞焉後漢劉度為荆州刺史桓帝延熹三年武陵蠻寇江陵度與謁者馬睦南郡太守李肅皆奔走肅主簿胡爽扣馬首諌曰蠻夷見郡無儆備故敢乘間而進眀府為國大臣連城千里舉旄鳴皷應聲十萬奈何委符守之重而為逋逃之人乎肅㧞刃向爽曰掾促去太守今急何暇此計爽抱馬固諌肅遂殺爽而走桓帝聞之徵肅棄市度睦減死一等復爽閭門拜家一人為郎甘定為蒼梧太守延熹五年長沙賊起寇桂陽攻沒蒼梧取銅虎符定與刺史侯輔各奔出城焦和為青州刺史靈帝時黄巾羣盜處處颷起而青郡殷實軍革尚衆和欲與諸同盟西赴京師未及得行而賊已屠城邑和不理戎警但坐列巫史禜禱羣神又恐賊乘凍而過命多作陷氷丸以投於海衆遂潰散和亦病卒劉璋襲父焉為益州牧性柔寛無威畧獻帝建安初督義司馬張魯據漢中以璋闇懦不復承順十九年蜀先主圍成都數十日城中有精兵三萬人糓支一年吏民咸欲拒戰璋言父子在州二十餘歳無恩徳以加百姓而攻戰三載肌膏草野者以璋故也何忍能安遂開城出降羣下莫不流涕宋周嶠為吳興太守文帝元嘉末元凶劭弑立隨王誕舉義於㑹稽劭加嶠冠軍將軍誕檄又至嶠素懦怯迴惑不知所從為府司馬丘珍孫所殺南齊戴元孫為汶陽太守太祖建元元年北土黄蠻文勉徳冦汶陽元孫孤城力弱慮不自保棄戍歸江陵房法乘為交州刺史至鎮屬疾不理事専好讀書長史伏登之因此擅權改易將吏不令法乘知錄事房季文白之法乘大怒繫登之於獄十餘日登之厚賂法乘妹夫崔景叔得出將部曲襲州執法乘謂之曰使君既有疾不宜勞囚之别室法乘無事復就登之求書讀之登之曰使君静處猶恐動疾豈可看書遂不與乃啟法乘心疾動不任視事孝武仍以登之為交州刺史法乘還至嶺而卒梁謝覽為新安太守髙祖天監九年山賊吳承伯破宣城郡餘黨散新安叛吏鮑叙等與之合攻沒黟歙諸縣進兵擊覽覽遣郡丞周興嗣於錦沙立塢拒戰不敵遂棄郡奔㑹稽臺軍平山寇覽復還郡左遷司徒諮議參軍袁君正為吳興太守髙祖太清末侯景亂賊遣干子悦攻之新城戍主戴僧勸令距守吳人陸映公等懼不勝賊遂族其家乃曰賊軍甚鋭其鋒不可當今若距之恐民心弗從也君正性怯懦乃送米及牛酒郊迎子悦子悦既至掠奪其財物女子君正因感疾卒陳蕭乾為建安太守文帝天嘉二年留異反陳寶應將兵助之又資周廸兵粮出寇臨川因逼建安乾單使臨郡力不能守乃棄郡以避寶應後魏房伯祖為歴城郡内史闇弱委事於功曹張僧皓僧皓大有受納伯祖衣食不充皮喜為豫州刺史在州寛怠以飲酒廢事威不禁下乙瓊為濟南太守時逆賊劉桃攻郡瓊踰城獲免後都督李叔仁討桃平之瓊乃還郡崔道固為北齊郡太守是時頻歳不登郡内饑弊道固雖在位積年撫慰未能周盡是以多有怨叛王衍為兖州刺史届治未㡬屬爾朱仲逺稱兵内向州既路衝為其攻逼衍不能守為仲逺所擒以其名望不害也令其騎牛從軍久乃見釋隋史祥為燕郡太守被賊髙開道所圍祥稱疾不視事及城陷開道甚禮之㑹開道與羅藝通和送祥於涿郡卒於途唐韋光裔徳宗建中中為汝州刺史時李希烈反叛朝廷以汝州與賊接壤而光裔懦弱不任職乃以李元平代之李元平自湖南觀察判官為宰臣闗播所薦授檢校吏部郎中兼汝州别駕知州事既至郡募工徒繕理郛郭李希烈乃使勇士應募執役版築凡入數百人元平不之覺希烈將李克誠以百騎突至先應募執役者應於内縳元平馳去既見希烈遺下汚地希烈見其無鬚𦕈小戲謂克誠曰使汝取李元平何得將元平兒來因慢罵曰盲宰相使汝當我何待我淺耶後唐王正言莊宗同光中為興唐尹留守鄴都時武徳使史彥瓊監守鄴都廪帑出納兵馬制置皆出彥瓊將佐官吏頥指氣使正言不能以道御之但趦趄聽命及貝州戍兵亂入魏州彥瓊望風敗走亂兵剽刼坊市正言促召書吏寫奏章家人曰賊已殺人縱火都城已陷何奏之有是日正言引諸寮佐謁趙在禮望塵再拜請罪在禮曰尚書重徳勿自卑屈余受國恩與尚書共事但思歸之衆倉卒見迫耳失政牧守之任本乎長人提封之内所以觀政盖夫知微䘏隱恕已愛人之謂仁摘姦屏盜抑强扶弱之謂眀敦本務農立學阜俗之謂化惡衣菲食約已奉公之謂清反是四徳政何有焉民何仰焉中世而下乃有専務縱弛致紀律之靡修失於簡御俾羣下之肆暴或愆於保障之義或乖夫惕厲之訓或偏執而違道或詐矯以市恩或委任非其人而亂乎倫理或酣縱過乎度而成乎湎滛斯亦何以綱紀列城表正庶吏至有罹厥刑典以被廢黜者固其宜哉後漢向栩為趙相及到官畧不視文書舍中生蒿萊孔融為北海相自以智能優贍溢才命世當時豪俊皆不能及亦自許大志且欲舉軍耀甲與羣賢要功自於海岱結殖根本不肯碌碌如平居郡守事方伯赴期㑹而已然其所任用好竒取異皆輕剽之才至於稽古之士謬為恭敬禮之雖備不與論國政也髙密鄭𤣥稱之鄭公執子孫禮及髙談敎今盈溢官曹詞氣温雅可玩而誦論事考實難可悉行但能張磔網羅其自理甚疎租賦少稽一朝殺五部督郵姦民汙吏猾亂朝市亦不能治幽州精兵亂至徐州卒到城下舉國皆恐融直出説之令無異志遂與别校謀夜覆幽州幽州軍敗悉有其衆無㡬時還復叛亡黄巾將至融大飲醇酒躬自上馬禦之淶水之上冦令上部與融相拒兩翼徑涉水直到所治城城潰融不得入轉至南縣左右稍叛連年傾覆事無所濟遂不能保障四境棄郡而去後徙徐州以北海相自還領青州刺史治郡北郵欲附山東外接遼東得戎馬之利建樹根本孤立一隅不與共也于時曹袁公孫共相首尾戰士不滿數百穀不至萬斛王子法劉孔慈凶辨小才信為腹心左承祖劉義遜清俊之士備在坐席而已言此民望不可失也承祖勸融自託强國融不聽而殺之義遜棄去遂為袁譚所攻自春至夏城小冦衆流矢雨集然融憑几安坐讀書論議自若城壊衆亡身奔山東室家為譚所虜陶謙為徐州刺史時徐州百姓殷盛穀米豐贍流民多歸之而謙背道任情廣陵太守瑯琊趙昱徐方名士也以忠直見疎曹宏等讒慝小人也謙親任之刑政失和良善多被其禍由是漸亂劉類為𢎞農太守郡民尹昌年垂百嵗聞類出行當經過謂其兒曰扶我迎府君欲陳恩兒扶昌在道左類望見呵其兒曰安用是死人扶來見我其視人無禮皆此類也舊俗民謗官長者有三不肯謂遷免與死也類在𢎞農吏民患之乃題其門曰劉府君有三不肯類雖聞之猶不能自改其後安東將軍司馬文王西征路經𢎞農𢎞農人告類荒耄不任宰郡乃召入為五官中郎將晉劉琨為并州刺史人士奔迸者多歸於琨琨善於懐撫而短於控御一日之中雖歸者數千去者亦相繼初單于猗㐌以救東羸公騰之功琨表其弟猗盧為代郡公與劉希合衆於中山王浚以琨侵已之地數來擊琨琨不能抗由是聲實稍損鄭冲為陳留太守以儒雅為徳􅊩民不為幹局之譽王機為成都内史終日醉酒不存政事由是百姓怨之人情騷動王澄為荆州刺史澄既至鎮日夜縱酒不親庶事雖寇戎急務亦不以在懐擢順陽人郭舒於寒悴之中以為别駕委以州府殷仲堪出鎮江陵時以仲堪雖有美譽議者未以分陜許之既受腹心之任居上流之重朝野屬想謂有異政乃在州綱目不舉而好行小恵宋蕭思話為丹陽尹時京邑多有刼掠二旬中十七發引咎陳遜不許張淹為東陽太守逼郡吏燒膏炤佛百姓有罪使禮佛贖刑動至數千拜後免官禁錮起為光祿勲南齊虞袤失志不仕王敬則反取袤監㑹稽郡而軍事悉付寒人張靈寶郡人攻郡殺靈寶袤以不豫事得全謝朏為義興太守不省雜事悉付綱紀曰吾不能作王者吏但能作太守耳後魏李元䕶為齊州刺史值州内饑儉民人困弊志存隐䘏表請賑貸蠲其賦役但多有部曲時為侵擾城邑苦之故不得為州良刺史也劉尼為定州刺史在州清慎然率多酒醉治事日甚少馮熙為洛州刺史洛陽雖經破亂而舊三字石經宛然猶在至熙與常伯夫相繼為州廢毁分用大至頺落北齊李元忠魏永安初就拜南趙郡太守以好酒無政績徐之才為兖州刺史在州無所侵害但不甚閑法理頗亦疏慢用捨自由隋丘和為代州刺史煬帝北巡過州和獻食至精及至朔州刺史楊廓獨無所獻帝不悦而宇文述又盛稱之乃以和為博陵太守仍令楊廓至博陵觀和為式及駕至博陵和上食又豐帝甚稱之由是所幸處獻食者競為華侈衞元字文昇與代王留守京師大業十一年詔元安撫闗中時盜賊蜂起百姓饑饉元竟不能恤而官方壊亂貨賂公行唐義師入闗自知不能守憂懼稱疾不知政事城陷歸於家唐任瓌為徐州總管選補官吏頗私親故或依倚其勢多所求納瓌知而不禁侯希逸為淄青節度政事怠惰尤崇釋敎且好畋逰興工創寺宇軍州苦之崔寓為河中尹代宗廣徳二年秋河中府鎮兵叛大掠河中廨署及居人廬舍貲貨不可勝紀葢寓失政故也時將征蕃寇寓發防秋將行為法不一衆遂叛終夕乃定王翃為京兆尹屬發涇原兵討李希烈軍次滻水翃備頓肉敗粮糲衆怒借以為名而叛翃奔至奉天杜亞為揚州長史淮南節度觀察使時陳少逰征税繁重奢侈僣濫之後又遭王紹亂兵剽掠淮南之人望亞之至革剗舊弊冀以康寧亞自以臨當公輔之選而聨出外職志頗不適政事多委參佐但招引賔客談論而已孟簡為浙西觀察使初李遜亷問越俗勵心為政抑士族太過而編户恣横及簡莅政一皆反之農估賤夫多受其弊當時議者謂兩未適中李徳裕為揚州節度使先是府庫倉廪節度使交代例皆申奏州帑藏見在者八十餘萬貫匹徳裕所申奏交割止於四十萬仍元未到已前張鷺知留務又用其半徳裕之黨不知以為府庫虚竭欲發制使鞫問前節度之罪時宰相李固言得交割之數於前淮南節度副使張鷺宰相李石因許徳裕再具交割人數申奏徳裕既知隱沒事已彰露遂錄軍資雜以朽敗竒零之物廣為數百萬之數上聞仍以表自陳初到疾病為下吏所誤且請自罰兼罪胥吏以解其過當時補闕王績魏謨崔讜韋有翼拾遺令狐綯韋楚老樊宗仁等抗疏論之中外黨庇事竟不行梁李思安乾化元年為相州刺史思安自謂當擁旄仗鉞久矣得是殊不快但因循宴安無意為政及太祖出幸以候騎之設落然無所備而復壁壘荒圯帑廪空涸帝怒甚遂貶栁州司户尋以怨望斬之後唐王瓉初仕梁歴兖華等州節度使頗能除盜而眀不能炤下及尹正京邑委政於愛壻牙將辛廷尉曲法納賄因緣為姦王正言莊宗同光中為興唐尹知留守事正言年耄風病事多忽忘比無經治之才武徳使史彦瓊者以伶官得幸帝待以腹心之任都府之中威福自我正言已下皆脅肩低首曲事不暇由是政無統攝姦人得以窺圖袁建豐為相州刺史領相州軍事行營在外委州事於小人失於撫馭指揮使孟守謙據城以叛李從璋為彰國軍節度使眀宗天成中以璋昧於政理詔歸闕張進為鄭州防禦使與副使咸繼威並停任以盜掠城中居人故也晉皇甫遇歴團練使節度使所至苛暴以誅斂為務髙祖入都自襄鄧移領中山與鎮州叛臣安重榮結姻好仍移上黨改平陽咸以憸人執事政皆隳紊及鎮河陽部内創别業開畎水泉以通溉灌所經墳墓悉毁之時朝廷姑息羣帥莫之敢訴張景遷前為登州刺史為三司所奏景遷自到任至得替月日合徵去年秋税課利等比並諸州係欠最多其官吏省司已行決罰其張景遷伏候進止勅張景遷宜降階爵各一級勒歸私第漢王松初仕晉權知青州軍州事松性坦率不事邊幅樂於歡宴政事不治人士譏之周趙鳳為單州刺史廣順三年十一月入朝有本州民張州僧智温等十餘人捉鳳馬於皇城門訟鳳在郡不道勅遣通事舍人劉言控鶴官二人監鳳下御史臺收繫又為宋亳宿三州刺史部下綱紀號宋蠻刁孫矩者始隨鳳為暴至是委以心腹平民因捕盜而破家者多矣専恣書曰臣有作福作威玉食害於而家凶於而國禮曰敖不可長欲不可縱斯盖聖人立言垂訓以警乎臣子之亂大猷者也乃有剖符守土分憂治俗憑恃恩寵廢格科法聽訟由其喜怒任人係乎愛憎戮辱俊良刻轢黔庶或前吏不由中覆或宥罪非從詔令以至露兇戾之迹形貪黷之咎侈汰自任逸豫無度小則瘝官而廢職大則亡身而覆族書良史之筆為吉士之笑固與夫守靖恭之節樹謙讓之徳者不可同年而語也千載之下其鑒之哉漢周陽由景帝時為郡守史闕郡名武帝即位吏治尚修謹然由居二千石中最為暴酷驕恣所愛者撓法活之所憎者曲法滅之黎扶封軑侯元封九年坐為東海太守行郡擅發卒為衞當斬㑹赦免後漢魯平為陳留太守請郡人李充署功曹充不就平怒乃援充以捐溝中因謫署都亭長晉申儀魏末為魏興太守時司馬宣王平孟達於新城儀久在魏興専威疆塲輒承制刻印多所假授達既誅有自疑心時諸郡守以宣王新克㨗奉禮求賀皆聽之乃使人諷儀儀至問承制狀執之歸於京師宋褚叔度晉末為廣州刺史晉安帝義熙八年盧循餘黨劉敬道等窘廹詣交州歸降刺史杜慧度以事言統府叔度以敬道等路窮請命事非欵誠報使誅之慧度不加防錄敬道招集亡命攻破九真殺太守杜章民慧度討平之叔度輒貶慧度號為奮揚將軍坐不先上為有司所糾詔原之南齊李叔獻交阯人初從兄長仁殺交州刺史據州叛數年病死叔獻嗣事號令未行遣使求刺史宋朝以南海太守沈煥為交州刺史以叔獻為煥寧逺軍司武平新昌二郡太守叔獻得朝命人不服從發兵守險不納煥煥停欝林病之太祖建元元年仍以叔獻為交州刺史就安慰之叔獻受命繼而斷割外國貢獻寡少世祖欲討之永眀三年以司農劉楷為交州刺史發南康廬陵始興郡兵征交州叔獻聞之遣使願更申數年獻十二隊純銀兠鍪及孔雀毛世祖不許叔獻懼為楷所襲間道自湘州還朝梁魚𢎞襄陽人歴南譙盱眙竟陵太守嘗曰我為郡有四盡水中魚鼈盡山中麞鹿盡田中米榖盡村里人庶盡丈夫生如輕塵棲弱草白駒之過隙人生但歡樂富貴在何時於是恣意酣賞侍妾百餘人所用金翠服翫車馬皆窮一時之奢麗有眠牀一張皆是蹙栢四周無一有異通用銀鏤金花福夀兩重為脚後魏濟陰王誕為齊州刺史家人奴𨽻悉廹取良人為婦元麗為雍州刺史其妻誕一男麗遂出州獄囚死及徒流案未申䑓者一時放免馮熙為雒州刺史因事取人子女為奴婢有容色者幸之為妾有子女數十人號為貪縱北齊髙慎為光州刺史時天下初定聽慎以本鄉部曲數千人自隨慎為政嚴酷又縱左右吏民苦之平鑒為揚州刺史其妻生男因喜飲醉擅免境内囚誤免闗中細作二人醒而知之上表自劾庫狄伏連為鄭州刺史開府參軍多是衣冠士族皆捶撻逼遣築墻隋燕榮為幽州總管每巡省管内聞官人及百姓妻女有容色輒舍其室而滛之貪暴放縱日甚髙祖遣考功侍郎劉士龍馳驛鞫問奏榮毒虐非虚又贓穢狼藉遂賜死唐段綸髙祖武徳中為益州總管于時巴蜀初降得以便宜行事承制拜授益州富饒而綸生殺自已乃髙下恣情多所凌傲有人告綸將反遣使覈之無狀徵還京師張䖍陀眀皇天寶中為雲南太守舊事南詔嘗與其妻女謁見都督䖍陀皆私之又有所徵求閤羅鳳皆不應䖍陀遣人罵辱之仍密奏其罪惡閤羅鳳忿怒因發兵反攻圍䖍陀殺之張登徳宗貞元中為漳州刺史暴狠貪冐擅賦百姓沒買州人為奴婢者三十人姦亂禆將家財非一其不堪辱有縊死者部人蔡化訴于闕下詔命就鞫幽死州獄于頔貞元中為蘇州刺史雖為政有績然横暴已甚追憾湖州舊尉封杖以計强決之觀察使王緯奏其事徳宗不省及後頔累遷乃與緯書曰一蒙惡奏三度改官由大理卿遷陜虢觀察使自以為得志益恣威虐官吏日加笞罰掾曹姚峴不勝其虐與其弟汎舟於河遂自投而死嚴礪貞元末為東川節度使擅籍沒管内官吏居人等八十八户田宅一百一十一所奴婢二十七人税外徵草四十一萬五千束錢七千貫米五千石死後為監察御史元􅍬劾奏之崔元畧文宗太和中為京兆尹以徵畿甸放免緡錢萬七千貫為侍御史蕭澈彈劾有詔刑部郎中趙元亮大理正元從質侍御史温造充三司覆理元畧有中助止於削兼大夫庾威太和中為湖州刺史貶吉州長史以御史䑓所奏威為郡日自立條制應田地奴婢下及竹樹鵝鴨等並估計出税差軍人一千一百五十人散入鄉村撿責剩徵税錢四千九百餘貫王晏平開成初為靈武節度使擅將官馬四百一十五匹并旗旛器械六千一十七事歸東郡私第河南府奏之准勅收納册府元龜卷六百九十八
