body:
  text: 􅉺府元龜卷五百三十二宋王欽若等撰諌諍部䂓諌第九唐張行成為太子詹事以本官檢校尚書左丞太宗幸靈州太子常從行成上疏曰臣愚以為太子養徳春宫日月未㡬華夷逺邇停聴徳音如留京師監國接對百僚决斷庶務明習政理既為京師重鎮且示四方盛徳與其出就私愛曷若俯從公道太宗以為忠進位銀青光禄大夫郝處俊為中書侍郎髙宗御含元殿東翔鸞閣觀大脯時京城四時及太常音樂分為東西兩朋帝令雍王賢為東朋周王顯為西朋務以角勝為樂處俊諌曰臣聞禮所以示童子無誑者恐其欺詐之心生也伏以二王春秋尚少意趣未定當須推梨讓棗相視如一今忽分為二朋遞相誇競且俳優小人言辭無度酣樂之後難為禁止恐其交爭勝負譏誚失禮非所以遵仁義示和睦也帝瞿然曰卿之逺識非衆人所及也遽令止陳子昂埀拱初為秘書省正字子昻上疏曰臣伏見陛下憂勤政理而未以刺史縣令為念臣竊見吏部選人補縣令如補一縣尉耳但以資次考第從官遊歴即補之不論賢良徳行何能以化人而㧞擢見補者縱使吏部侍郎時有知此弊而欲超越用人則天下小人已囂然則謗矣所以然者習於常也所以天下庸流皆任縣令庸流一雜賢人不肖莫分但以資次為選不以能得職所以天下凌遲百姓無由知陛下聖徳勤勞夙夜之念但以愁怨以為天子之令遣如是也自有國已來此弊最深而未能除也又曰竊惟刺史縣令之職實陛下政教之首也得其人則百姓家見而戸聞不得其人但委棄有司而挂壁耳陛下欲使家傳禮義吏朂清勤不重選刺史縣令將何道以致之耶臣比在草野為百姓乆矣縣令之化臣實委知國之興衰莫不在此職也何者一州得賢明刺史以至公循良為政者則十萬家頼其福若得貪暴刺史以狥私苛虐為政者則十萬家受其禍一州禍福且如是况天下之衆豈得勝道哉故臣以為陛下政化之首國家興衰在此職也伏願深思妙選以救此弊魏𤣥同埀拱初為鸞臺侍郎兼天官侍郎以吏部選舉不得人上表曰漢諸侯得自置吏四百石以下其傅相大官則漢為之置州郡掾吏督郵從事悉任之於牧守爰自魏晉始歸吏部遞相祖襲以迄於今用刀筆以量才按簿書而察行法令之弊由來久矣盖君子重因循而憚改作有不得已者亦當運獨見之明定卓然之議如今選司所行者非上皇之令典乃近代之權道所宜遷革實為至要且天下之大士人之衆而可委之數人之手乎假如平如權衡明如水鏡力有所極照有所窮鈐索既多紊失斯廣又以比居此任時有非人情故既行何所不至悠悠風塵此焉奔競擾擾遊宦同乎市井加以厚貎深衷險如溪壑擇言觀仁猶懼不周今吏考行究能折衷於一靣具僚庶品專斷於一司不亦難乎况今諸色人流嵗有千計羣司列位無復新加官有常員人無定限選集之始霧積雲屯擢序於終十不收一淄澠既混玉石難分用捨去就得失相半周穆王以伯奭為太僕正命之曰慎簡乃僚無以巧言令色便僻側媚其唯吉士此則命其自擇下吏之文也太僕正中大夫耳尚以僚屬委之則三公九卿亦必然矣夫委任責成君之體也所委者衆所用者精故能得濟濟之多士盛芃芃之棫樸裴子野有言曰官人之難先人言之尚矣居家視其孝友鄉黨服其誠信出入觀其志義憂難取其智謀煩之以事以觀其能臨之以義以察其度始之於學校掄之於州里告諸六事而後貢之於王庭其在漢家猶尚然矣州郡積其功能然後為五府所辟五府舉其掾屬而昇於朝三公參得除署尚書奏之天子一人之身所關者衆一賢之進其課也詳故能官得其人鮮有敗事晉魏反是所失𢎞多子野所論盖區區之宋耳猶謂不勝其弊而况於當今乎今不待州縣之舉直取之於書判恐非先徳行而後言語之義也臣又聞漢書云張耳陳餘之賔客皆天下俊傑彼之蕞爾猶能若斯况以國家而不建久長之䇿為無窮之根盡得賢取士之術而但顧望魏晉之遺風留意周隋之末事臣竊惑之伏願依周漢之䂓以分吏部之選即望所用精詳鮮於差失朱敬則為右補闕聖歴二年請告絶羅織之徒上疏曰臣聞李斯之相秦也行申商之法重刑名之家杜私門張公室棄無用之費損不急之官惜日愛功疾耕急戰人繁國富遂屠諸侯此救弊之術也故曰刻薄可施于趨進變詐可陳於攻戰兵猶火也不戢自焚况鋒鏑已銷石城又毁諒可易之以寛泰潤之以淳和八風之樂以柔之三代之禮以導之秦既不然淫虐滋甚徃而不返卒至土分此不知變之禍也陸賈叔孫通之事漢王也當滎陽成臯之間糧饋已窮知勇俱困不敢開一説効一竒進豪猾之才薦貪暴之客及區宇適平干戈向戢金皷之聲未歇傷痍之病尚聞二子顧眄雍容綽有餘態廼陳詩書説禮樂闡王道謀帝圖髙皇帝忿然曰吾以馬上得之安事詩書乎對曰陛下馬上得之安可馬上理之乎髙皇黙然於是陸賈著新語叔孫通定禮儀始知天子之尊方覺帝王之貴此則變之善也向使髙皇排二子而不收置詩書而不顧重攻戰之吏尊首級之材複道争功張良已知其變㧞劍擊柱吾屬不得無謀即晷漏難逾何十二帝乎亡秦是續何二百年乎故曰仁義者聖人之蘧廬禮經者先王之陳迹然謂祝祠向畢芻狗須投淳精已流糟粕可棄仁義尚捨况輕於此者乎自文明草昧天地屯䝉二叔流言四凶搆難不設鈎距無以應天順人不峻刑名不可摧姦息暴故置神匭以開告端曲直之影必呈包藏之心盡露神道助直無罪不除人心保能無妖不戮以兹妙筭窮造化之幽深用此神謀入天人之祕術故能計不下席聴不出闈蒼生晏然紫宸易主大哉偉哉無得而稱也豈比造攻鳴條大戰牧野血變草木頭折不周可同日而語乎然而急趨無善跡膠柱少和聲拯溺不規行療饑非鼎食即向時之妙䇿乃當今之芻狗也伏願覽秦漢之得失考時事之合宜審糟粕之可遺覺蘧廬之須毁見機而作豈勞于終日陛下必不可偃蹇太平徘徊中路伏願改法制立章程下怡愉之辭流曠蕩之澤刓萋菲之牙角頓姦險之鋒鋩杜告密之源絶羅織之迹使天下蒼生坦然大悅豈不樂哉王方慶聖歴中為麟臺監時欲以冬季講武有司稽緩延入孟春方慶上䟽曰謹案禮記月令孟冬之月天子命將帥講武習射御角力此乃三時務農一時講武習射御校才力盖王者常事安不㤀危之道也孟春之月不可以講兵兵者干戈甲胄之總名兵金也金性克木春盛徳在木而舉金以害盛徳逆生氣孟春行冬令則水潦為敗雪霜大摯首種不入蔡邕月令章句云大隂新收少陽尚微而行冬令以導水氣春水潦至而敗生物也雪霜大摯折陽者也大隂干時雨雪而霜故大傷首種謂宿麥也麥以秋種故為之首種入收也春為沍寒所傷故夏至麥不成長今孟春講武是行冬令隂政犯陽氣害發生之徳臣恐水潦敗物雪霜損稼夏麥不登無所收入也伏望天恩不逆時令至孟冬教習以順天道手制荅曰此為久屬太平多歴年載人皆廢戰竝習學文今者用耀兵威故令教習卿以春行冬令則水潦為敗舉金傷木則便害發生循覽所陳深合典禮若違卿請乃月令虛行佇啓直言用依來表張説為右補闕久視中以車駕在三陽宫不時還都上疏曰陛下屯萬乗幸離宫暑退凉歸未降還㫖愚臣固陋非為長䇿請為陛下陳其不可三陽宫至雒城一百六十里有伊水之隔崿坂之峻過夏涉秋水潦方積道壊山險不通轉運河廣無梁咫尺千里扈從兵馬日費咨給連雨彌旬即難周濟陛下太倉武庫竝在都邑紅粟利器藴若丘山奈何去宗廟之上都安山谷之僻處是猶倒持劍㦸示人鐏柄夫禍變之生在人所忽故曰安樂必戒無行所悔今國家北有勁敵覷邊南有夷獠伺釁浙西小旱耕稼是憂安東近平輸漕方始臣願陛下及時旋駕彼蒼羣生莫不幸甚劉知㡬天授中為獲嘉縣主簿上疏曰臣聞漢宣帝云與我共理天下其惟良二千石乎二千石者今之刺史也移風易俗其寄不輕求瘼字人僉屬斯在然則歴觀兩漢已降迄乎魏晉之年方伯岳牧臨州按都或十年不易或一紀仍留莫不盡其化下之方責以理人之術既而日就月將風加草靡故能化行千里恩漸百城今之牧伯有異於是倐來忽徃蓬轉萍流近則日月仍遷逺則踰年必徙待㕔事為逆旅以下車為傳舎或云來嵗入朝必應改職或道今兹㑹計必是移藩既懐茍且之謀何暇循良之績用使百城千邑無聞亷杜之歌萬國九州罕見趙張之政臣願自今已後刺史非三嵗已上不可遷官仍以明察功過精甄賞罰兾𢎞共理之風以贊垂衣之化又上疏曰昔有唐御歴列職命官國多刓印之譏人有積薪之歎自陛下臨朝頓革此風然矯枉過正以為甚矣至如六品已下職事清官遂乃方之土芥比之砂礫其有行無聞於十室即厠朝流識不反於三隅俄登士伍斯固比肩咸是舉目皆然罕聞翹楚之歌惟見伐檀之刺今尸禄謬官其流非一若遂不加沙汰誠恐有累皇風薛謙光為左補闕天授三年上疏曰戎夏不雜自古所誡夷狄無頼易動難安故斥居塞外不遷中國前史所稱其來久矣然而帝徳廣被有時朝謁受向化之誠請納梯山之禮貢事畢則歸其父母之國導以指南之車此三王之盛典也自漢魏已後遂革其風務飾虛名徴求侍子諭令解辮使襲衣冠築室京師不令歸國此又中葉之故事也較其利害則三王是而漢魏非論其得失則拒邊長而徴質短殷鑒在乎徃世豈可不懐經逺之慮哉昔郭欽獻䇿於武皇江綂納諌於惠王咸以為夷狄處中夏必為變更晉武不納二臣之逺䇿好慕向化之虛名縱其習史漢等書官之以五部都尉此皆計之失也竊惟突厥吐蕃契丹等徃因入侍竝叨殊奬或執㦸丹墀䇿名戎秩或曵裾庠序髙步黌門服改氊裘語兼中夏明習漢法覩衣冠之儀目覽朝章知經國之要窺成敗於圖史察安危於古今識邊塞之盈虛知山川之險易或委以經畧之功令其展効或矜其首丘之志放使歸蕃於國家雖有冠帶之名在夷狄廣其縱横之智雖有慕化之美茍悅於當時而狼子孤恩旋生於過後及歸部落口不稱兵邊鄙罹災寔由於此故老子曰國之利器不可以示人在於齊人猶不以示之况於夷狄乎又按秦漢帝遷五部匈奴於汾晉其後卒有劉石之難向使五部不徙則晉祚猶未可量也鮮卑不遷幽州則慕容無中原之僭又按漢書陳湯云夫胡兵五而當漢兵一何者兵刃頗鈍弓弩不利今聞頗得漢工然由三而當一由是言之利兵尚不可使胡人得法况處之中國而使其習是哉臣竊計漢初冒頓之彊盛乗中國虚弊髙祖餒厄平城而冒頓不能入中國者何也非兵不足以侵諸夏力不足以破汾晉其所以解圍而縱髙祖者為不習中土之風不安中國之美生長磧漠之兆以穹廬勝於城邑以氊􅄢美於章紱既安其所習而樂其所生是以無窺中國之心者為生不習漢故也豈有心不樂漢而欲深入者乎劉元海五部離散之餘而卒能自振於中國者為少居内地明習漢法元海悅漢而漢亦悅之一朝背誕四方饗應遂鄙單于之號竊帝王之寳賤沙漠而不居擁平陽而鼎峙者為居漢故也向使元海不曾内徙正當刼邊人繒綵麯蘖以歸隂山之北安能使倡亂邪當今皇風遐覃含識革面凡有虺性莫不懐馴方使由余效忠日磾盡節以臣愚慮者國家方傳無窮之祚於後脫備守不謹邊防失圖則夷狄稱兵不在方外非所以肥中國削四夷經營萬乗之業貽厥孫謀之道也臣愚以為願充侍子者一皆禁絶必若在中國亦可使歸蕃則夷人保疆邊邑無事矣徐堅為萬年主簿如意元年六月上疏曰臣聞書有五聽之道慮失情實也今著三覆之奏恐致虛枉也竊見比有勅勘當反逆令使者得實便决殺人命至重死不可生儻萬分之中有一不實欲訴無路懐枉誰明飲恨吞聲赤族從戮豈不痛哉此不足肅姦逆而明刑典適所以長威福而生疑懼臣望絶此處分依法覆奏則死者丼伏知泣辜之恩生人澡悅見祥刑之意又法官之任人命所懸若不簡擇恐招枉濫諸官僚之内有用法寛平百姓所稱者願親而任之有處事深酷不允衆望者願踈而退之則囹圄無寃億兆幸甚臣又聞罰不及嗣虞帝之明䂓罪不至孥漢君之茂徳故卻芮作亂而卻缺登朝嵇康被刑而嵇紹卒用終能立功白狄効死湯隂千載美談斯為稱首父子猶其若此餘親尚何疑哉竊見逆人之親選曹廣責至於無親無服亦數十條士子之中十將三四今聖人在上寳命維新有道賤貧實為深耻遂令此等長從遐棄懐才抱器將何望哉是以聖意哀矜頻降恩制令同常例各使坦懐故姚璹之徒皆逢任委而在下僚列不識天恩為求微疵不𢎞大體又准勅逆人同堂親不得任京及兩畿三輔准法刑戮緦麻親不得充近侍宿衛臣望申勑有司勑令之外不得輙為勘責收其賢能示之曠蕩斯則巍巍之徳作範百王穆穆之風垂裕千祀張柬之為蜀州刺史舊例每嵗差兵募五百人徃姚州鎮守路越山險死者甚多柬之表論其弊曰臣竊按姚州者古哀牢之舊國絶域荒外山髙水深自生人已來洎於後漢不與中國交通前漢唐䝉開夜郎滇筰而哀牢不附至光武季年始請内屬漢置永昌郡以統理之乃收其鹽布氈􅄢之稅以利中土其國西通大秦南通交趾竒珍異寳進貢嵗時不闕劉備據有巴蜀嘗以甲兵不充及備死諸葛亮五月渡瀘收其金銀鹽布以益軍儲使張伯岐選其勁卒甲兵以増武備故蜀志稱自亮南征之後國以富饒甲兵充足由此言之則前代置郡其利頗深今鹽布之稅不供珍竒之貢不入戈㦸之用不實於戎行寳貨之資不輸於大國而空謁府庫驅率平人受役蠻夷肝膽塗地臣竊為國家惜之昔漢以得利既多歴博南山涉蘭滄水更置博南哀牢二縣蜀人愁怨行者作歌曰歴博南越蘭津渡蘭滄為他人盖譏漢貪珍竒鹽布之利而為蠻夷之所驅役也漢獲其利人且怨歌今减耗國儲費用日廣而使陛下之赤子身膏野草骸骨不歸老母㓜子哀號望祭於千里之外於國家無絲髪之利在百姓受終身之酷臣竊為國家痛之徃者諸葛亮破南中使其渠率自相統領不置漢官亦不留兵鎮守人問其故亮言置官留兵有三不易大意以置官夷漢雜居猜嫌必起留兵運糧為患更重忽若反叛勞費更多但粗設紀綱自然久定臣竊以亮之此䇿妙得覊縻蠻夷之術今姚府所置之官既無安邊靜冦之心又無諸葛且縱且擒之伎惟知詭謀狡筭恣情割剥貪饕刼掠積以為常扇動酋渠遣成朋黨折技謟笑取媚蠻夷拜跪趨伏無復慚耻提挈子弟嘯引凶惡聚㑹蒱博一擲累萬劍南逋逃中原亡命有二千餘戸見散在彼州専以掠奪為業姚州本龍朔中武陵縣主簿石子仁奏置之後長史李孝讓辛文協並為羣蠻所殺前朝遣郎將趙武貴討擊貴及蜀兵應時破敗噍類無遺又使將軍李義總等徃征郎將留惠基在陣戰死其州乃廢臣竊以諸葛亮稱置官留兵有三不易其言乃驗至垂拱四年蠻郎將王善寳昆州刺史㸑乾福又請置州奏言所有課稅自出姚府管内更不勞擾蜀中及置州後録事叅軍李陵為蠻所殺延載中司馬成琛奏請於瀘南置鎮七所遣蜀兵防守自此蜀中騷擾于今不息且姚府總管五十七州巨猾逰客不可勝數國家設官分職本以化俗防姦無耻無厭狼籍至今不問夷夏負罪並深見道路刼殺不能禁止臣恐一旦驚擾為禍轉大伏乞省罷姚州使𨽻嶲府嵗時朝覲同之蕃國瀘南諸鎮亦皆悉廢於瀘北置關百姓自非奉使入蕃不交通徃來増嶲府兵選擇精良宰牧以統理之臣愚將為稳便疏奏則天不納盧藏用為左拾遺長安四年正月毁三陽宫取其材木造興泰宫於夀安縣之萬安山藏用上表諫曰臣愚雖不達時變竊嘗讀書見自古帝王之迹衆矣臣聞土堦三尺茅茨不剪彩椽不斵者唐堯之徳也卑宫室菲飲食盡力於溝洫者大禹之行也惜中人十家之産而罷露臺之制者漢文之明也並能垂名無窮為帝王之烈豈不以克念狥物博施濟衆以臻於仁恕哉今陛下崇臺䆳宇離宫别館亦已多矣更窮人之力以事土木臣恐議者以陛下為不愛人務奉巳也左右近臣多以順意為忠朝廷具僚皆以犯忤為患至今陛下不知百姓失業百姓亦不知左右傷陛下之仁也小臣固陋不識忌諱敢冐死上聞乞下臣此章與執政者議其可否宋務光為右衛騎曹叅軍神龍元年七月雒水暴漲壊百姓廬舎二千餘家溺死者數百人八月一日以水災令文武九品以上直言極諌務光上疏曰伏見明制令文武九品以上直言極諫大哉徳音真堯舜之用心禹湯之責已也臣嘗謂天人相與之際休咎冥符之兆有感必通其間甚宻是以政失於此變生於彼亦猶影之象形響之赴聲動而輙隨各以類應故曰天垂象見吉凶聖人象之竊見自夏已來水氣勃戾天下郡國多罹其災去月二十七日雒水暴溺漂損百姓臣謹按五行傳曰簡宗廟廢祠祀則水不潤下夫王者即位必郊祀天地嚴配祖宗是故鬼神歆饗多獲福助自陛下光臨寳極綿歴炎凉郊廟遲留時不殷薦山川寂寞未議懐柔水之貽災殆因此發臣又按水者隂類臣妾之道隂氣盛滿則水泉逆溢加以虹蜺紛錯澍雨滯霪雖丁厥時而汨常度亦隂勝陽之沴也臣恐從庭近習或有離中饋之職干外朝之政伏願陛下深思天變杜絶其萌以萬方為念不以聲色為娯以百姓為憂不以犬馬為樂蹔勞宵旰用緝明良豈不休哉夫災變應天實係人事故日蝕修徳月蝕修刑若乃雨𤾉或􅄽則貎言之咎雩禜之法存乎禮典今蹔降霖雨即閉坊門棄先聖之明訓導後來之淺術時偶中者安足神邪盖當屏翳收津豐隆戢響之日也豈有一坊一市遂能感召皇靈蹔閉蹔開便欲發揮神道必不然矣何其謬哉至今巷議街談共呼坊門為宰相謂能節宣風雨爕理隂陽天工人代乃為虛設悠悠蒼生復何望哉吕元泰神龍初為清源縣尉上疏陳時政所宜曰臣聞國家者至公之神器神器一正則難傾神器一傾則難正逺自虞夏及乎周秦金水相生成敗相繼者豈惡於成而欲於敗盖迷於事而失於㡬者也夫㡬者事之微也當今中興之初政教之始㡬微之際可不慎哉昔夏之興也卑宫菲食四海㑹同其衰也峻宇彫墻五子咸怨殷之興也佑賢輔徳輯寧邦家其亡也崇信姦回放出師保周自文武及乎成康風化大行夷夏有截暨乎幽厲王室遂卑強弱相吞㝢縣交戰秦皇以降罷侯置守焚書坑儒頭㑹箕歛嚴刑峻法驪山之徒未息閭左之兵已起夫夏桀殷紂非不欲傳子孫也周幽秦皇非不欲保社稷也而軍敗牧野鳥竄南巢國殘於犬戎地奪於項籍者豈不以侮慢自賢反道敗徳開邪僻之路鉗忠直之口左右侍奉惜禄位而不悟焉伏惟應天皇帝陛下再造區宇重光日月應五行之運景嗣累聖之洪基九服歸心三靈叶贊廻羲舒之燿無幽不燭灑雲雨之澤無生不潤然萬方百姓顒顒然莫不傾耳以聴拭目以視思聞太平之風願見先朝之化如農夫之望嵗同善人之愒日自頃營建寺塔廣度僧尼朝夕依歸襯施不絶陛下好善之徳以被蒼生然濟時之道恐非急務何則頃者烏桓叛渙獯粥侵擾帑藏虛竭户口流亡豈人有厭於枌榆乃事良由於賦歛下人失業不可謂太平也邊兵未解不可謂無事也水旱為災不可謂年登也倉廪未實不可謂國富也而乃驅役饑凍雕鐫木石營搆不急勞費日深恐陛下中興之務又異如來慈悲之法臣比見都邑坊市相率為渾脫隊駿馬胡服名為蘇莫遮旗皷相當軍陣之勢也騰逐喧噪戰爭之象也錦綉誇競害女工也徴歛貧弱傷政體也胡服相觀非雅樂也渾脫為號非美名也安可以禮義之朝法胡虜之俗以軍陣之勢列庭闕之下竊見諸王亦有此好衣馬既盛奢麗相髙今藩邸初開庶官必具何不董之賢傅教之義方明君臣之禮磐石之固豈不偉哉方乃驅率下人相尚胡戲自家刑國豈若是焉詩云京邑翼翼四方是則非先王之禮樂而示則於四方者斯實愚臣之所未喻也臣謹按洪範八政曰謀時寒若君能謀事則時寒順之何必祼露形體澆灌衢路鼓舞跳躍而索寒焉又禮記曰立秋之月行夏令則寒暑不節夫隂陽不調政教之失也休咎之應君政之感也理均影響可不戒哉夫樂者動天地感鬼神移風易俗布徳施化重戎狄之曲不足以移風也非宫商之度不足以易俗也無八佾之制不足以布徳也非六代之樂不足以施化也四者無一何以教人臣本凡愚不識忌諱而生草澤頗曉物情知而不言非忠也言而不實罔上也忠於國者以臣為讜言佞於朝者以臣為誹謗伏惟陛下少留意焉臣聞君舉必書有國彛訓書而不法後嗣何觀臣又聞建國君人尊師重道禮由天作樂以地制禮樂備風化行焉伏願陛下敦風化之本重黎庶之費興念或躍思締搆之艱難矜孤恤窮思時政之可否安人和衆覽先朝之事業非軍國之衆則息而罷之有佞䛕之言則察而退之有忠直之諌則誘而進之豈惟天下幸甚實亦社稷之大計也臣奉陛下捜賢之制忝所知直言之舉雖乘鴈雙鳬不為損益而主聖臣直敢不庶㡬安能和光同塵懐忠蓄憤上失陛下求賢之望下􅉻愚臣事主之節亦何以視息於人間飲啄於聖代伏惟陛下少加詳擇疏奏不納成大琬為絳州刺史景龍中宴侍臣於梨園亭因問以時政得失大琬對曰夫釋教之設以慈悲為主盖欲饒益萬姓濟㧞羣生若乃䆳宇層軒珍臺寳塔耗竭府庫勞役生人懼非菩薩善利之心或異如來大悲之㫖臣備職方岳叨膺洪化敢陳蒭蕘狂妄死罪中書令蕭至忠奏言方今百姓貧乏邊境未寧府藏内空倉廪不實誠宜節財用之費省土木之工務存農時愛惜人力寺觀之役實可且停大琬之言伏希采納帝曰善韋嗣立為兵部尚書景龍中上疏曰設官分職量事置吏官得其人天下自理古者取人必須採鄉曲之譽然後辟於州縣有聲州縣然後辟於五府才著五府然後升之天朝此則用一人所擇者甚悉擢一士所歴者甚深用得其才則理用非其才則亂理亂所繫焉可不深擇之哉今之取人有異此道多未試効則頓至遷擢夫趨競者人之常情僥倖者人之所趣而今務進不避僥倖者接踵比肩布於文武之列補授無限員闕不供遂至員外置官數倍正闕官署典吏困於祗承府庫倉儲竭於資奉國家大事豈甚於此古者懸爵待士唯有才者得之若任以無才則有才之路塞賢人君子所以遁迹消聲懐歎恨也盧懐慎景龍中為御史中丞上疏言時政得失其一曰臣聞孔子曰為邦百年可以勝殘去殺又曰如有用我期月而已三年有成故書云三載考績挍其功也昔鄭子産相鄭更法令布刑書一年而人歌之曰取我田疇而伍之取我衣冠而褚之孰殺子産吾其與之三年而人又歌之曰我有子弟子産教之我有田疇子産殖之子産而死誰其嗣之終有遺愛流芳史䇿子産賢者也其為政尚累年而化成况其常材乎臣竊見比來州牧上佐及兩畿縣令下車布政罕終四考在任多者一二年少者三五月遽即遷除不論課最或有歴時未改便傾耳而聴企踵而望爭求冐進不顧廉耻亦何暇為陛下宣風布化求瘼恤人哉禮義不能興行風俗未能齊一户口所以流散倉米所以空虛百姓彫弊日更滋甚職為此也何則人知吏之不久則不從其教吏知遷之不遙又不盡其力偷安爵禄但養資望陛下雖勤勞之懐宵衣旰食然僥倖路啓上下相䝉共為茍且而已寧盡於公乎此國之病也昔賈誼所謂􅏓盭之疾乃小小者耳此弊久而不革臣恐為膏肓雖和緩不能療豈􅏓盭而已哉漢宣帝綜覈名實興理教化黄覇良二千石也就増秩賜金以旌其能而不遷於潁川前代之美政也又古之為吏者長子孫倉氏庫氏即其後也書云事不師古以克永世匪説攸聞臣望請諸州郡都刺史上佐及兩畿縣令等在任未經四考已上不許遷除察其課效尤異者或錫以車裘或就加禄秩或降使臨問并璽書慰勉若公卿有闕則擢以勸能其政績無聞其犯貪暴者放歸田里以明聖朝賞罰之信則萬方之人一變于道矣致此之美革彼之弊易於反掌何惜而不行哉其二曰臣聞尚書云唐虞稽古建官惟百夏商官倍亦克用乂此省官之義也又云官不必備惟其材又言無曠庶官天工人其代之此為官擇人之義也臣竊見京諸司員外官所以委積多者數餘十倍近古以來未之有也官不必備此則有餘人代天工多不釐務廣有除拜無所裨益寗原悌睿宗時為諫議大夫上疏五條具陳政體一曰臣聞俗正時康則因循而易守人訛道替則馳騖而難安或垂衣而有餘或日娯而不足雖唐虞之盛烈文武之鴻徽未有不委任股肱留情陟用故善人者天地之綱紀帝王之羽翼靡革於仇讐莫限於芻𨽻不可失也自天授以來二十餘載周興來俊臣等譛害忠良壅蔽正直先皇舊臣夷㓕殆盡惟有狄仁傑魏元忠尚存仁傑等處先帝之朝猶為小吏及周室之際實謂忠臣或樹績當時狥身王室近者變故頻及衣冠掃地忠臣名士纔餘數人為陛下之棟梁作聖朝之耳目今者元惡已誅佞臣咸黜而人訛俗壊為日已久理宜開張聖聴杜絶猜嫌用是求人宣力王室使醜正惡直之士不有容其間隙䜛邪佞媚之徒無所施其巧辯然後可以議黎元安邦國則僥倖源塞聖王道興若使浸潤旁通危人路啓顔俊忠而獲罪茂先直以招怨雖有渭濵之賢傅巖之秀途遘卒遇難以為用也則危亡之期或未可保拯濟之道將安所施二曰求材之難每留連於大聖知人不易亦惆悵於先哲今天下諸州良牧盖寡何者古難其選今侮其職也然而代所重於京都時見輕於州縣者何也古者牧守政成擢登三事郎官特秀先宰一同潁川則黄覇為公㑹稽則五倫入輔事不師古何能垂濟誠願尚書曠職則於方伯求材即位闕官必以循良擢用事懸象魏道著彞章茲令克行仁風大闡考績三載誠為故實三曰隆周之君垂仁義以朂後亡秦之主訓刑罰以流嗣或八百延慶或二代亡家餘烈可知前史明鑒伏以太子初建養徳春宫諸王在藩飭躬朱邸並請逺去邪佞親近正人知好佞之危身識尊儒之廣徳動遵師傳之訓察納風雅之言誠使宫府官僚賔客侍讀日資其道徳月奏其藝能兾仁義於邦家樹雍穆於天下臣又以悖逆庶人先朝之愛女也肆䜛慝干朝政崇甲舘之華麗極宇内之驕奢新都宜城先朝之庶孽也新都宜城二公主邑名賜不踰於巳分言不預於外謀抑以全身踈以逺害故寵者則驕矜而遇害踈者則抑損而獲全誠使悖逆新都易地而處則存亡去就可立而待也故長安非賢燕后為愛古今明驗斷可知矣誠願公主駙馬不得假以權要所犯必有懲所習必有藝則九族既睦萬邦以寧臣觀老尚虛無釋尚寂㓕義極幽𤣥之㫖思逰通方之外故入道流者則虛室生白净慮𤣥門該釋教者則春池得寳澄心净域然後法貫羣有道垂兼濟過此以徃莫非邪惑其有鬻販先覺詭飾浮言以複殿為經坊用層臺為道法皆無功於𤣥慮誠有害於生人梁武靡報於前先朝殷鑒於後咸耳目所接黎元憤怨伏以公主入道京城置觀雖昭報之成有功於天㫖而社稷之計莫踰於净人若使廣事修營假飾圖像盡宇内之功巧傾萬國之資儲為福則靡効於先朝樹怨則取謗於天下自隋室以降寺觀尤多禪定東明之域泛愛緇黄之衆更為建立罕見其宜後失請收前弊未逺又先朝所狎僧衆或有猶居聖側無益於政理有紊於朝章並請屏退無令親近五曰邊陲有釁廟堂之憂也近壘多虞大夫之耻也今聞彊敵擅命堅昆娑葛養精蓄鋭以南侵為多事而人戸全虛府庫半减倘或後嵗之始來秋之末良弓漸勁塞草將衰朔代交鋒靈夏受敵中國將何猝應哉伏願共天下以禦匈奴率王公以憂邊事輕租薄歛和下士之心簡賢任能結衆人之愛去奢從儉實府庫之積推仁重信納將士之謀去私恩布公道故知兩夷有隙上國之資也髙璧藏威待兵觀變因二敵之相持擅漁夫之厚利計有可舉時不可失斯五者竝政之要也伏願陛下舉宏綱省衆務髙拱嵓廊責成賢哲徘徊於大道之域從容於無為之塲故立綱垂制後嗣流範至仁也安上全下先業不墜至孝也感而必通姦不暇伏至明也神化風行萬方草靡至徳也必使休徴累及聖政日隆遐邇宅心戎夷慕義神功光乎區宇鴻業格乎天地三代之興皆由此也帝覽而善之韓琬景雲中為監察御史上疏陳時政曰臣敢以耳目所聞見而陳之伏願少留意省察臣竊聞永淳之初尹元貞任岐州雍縣令界内婦人修路御史彈免之頃年婦人夫役修平道路盖其常也調露之際劉憲任懐州河内縣尉父思立在京身亡選人有通索關者于時選司以名教所不容頃者以為見機俊人矣頃年國家和市所由以尅剥為公雖以和市為名而實抑奪其價殊不知百姓足君孰與不足矣徃年兩京及天下州縣學生佐史里正坊正每一員闕先擬者輙十人頃年差人以充猶致仕逸徃年選司從容安問而以禮敬待頃年選司無復曩時引接但如仇敵估道耳徃年効官交替者必儲蓄什物以待之頃年替人必諠競為隙手執省符紛然不已徃年召募之徒人百其勇爭以自効頃年差㸃勒遣逃亡相繼若此者臣粗言之不可勝數夫量事置官量官置人使官稱其人須人不虛位除此之外使其耕桑任其商賈何為引令入仕廢其本業臣愚以為國家開仕進之門廣矣皆棄農戰工商而爭趨之當今一夫耕而共數百人食庶使公私皆無儲蓄矣若不釐革其弊必引政令風化年年不等也册府元龜卷五百三十二
