body:
  text: 册府元龜卷九百四十三宋王欽若等撰總錄部不誼夫人者最萬物之靈誼者居五行之一故行誼者必克己恕物急病讓夷固其窮不可以利誘守其節不可以兵刼如斯而已矣乃有反道敗徳壞法亂紀傾險其行邪僻其心遺骨肉之親棄故舊之好背乎僚友之惠忘其所事之恩因利乘便竊發搆難或肆其慘毒或寘諸刑辟或縱行離間之術或靡顧翻覆之迹擁已自恣蹈害無悔歴代之下比比而有故古人有言曰不恥不仁不畏不誼其斯人之謂乎子伯季子衞大夫也魯哀公十六年衞侯飲孔悝酒于平陽東郡燕縣東北有平陽亭重酬之大夫皆有納焉納財賄也醉而送之夜半而遣之夜遣者慚負孔悝不欲令人見載伯姬於平陽而行載其母俱去及西門平陽門使貳車反祏於西圃使副車還取廟主西圃孔氏廟所在祏藏主石函子伯季子初為孔氏臣新登于公升為大夫請追之遇載祏者殺而乘其車子伯殺載祏者許公為反祏孔悝怪載祏者久不來使公為反逆之遇之曰與不仁人争明無不勝不仁人謂子伯季子也明無不勝言必勝必使先射射三發皆遠許為許為射之殪傳言子伯不仁所以死也或以其車從從為公得祏於櫜中孔悝出奔宋吴起者衞人也好用兵嘗學於曾子事魯君齊人攻魯魯欲將吴起吴起娶齊女為妻而魯疑之吴起於是欲就名遂殺其妻以明不與齊也魯卒以為將而攻齊大破之漢韓信既徙為楚王都下邳項王亡將鍾離昧昧音莫曷反家在伊廬東海朐南有此邑素與信善項王敗昧亡歸信漢怨昧聞在楚詔楚捕之信初之國行縣邑陳兵出入行音下更反有變告信欲反凡言變告者謂告非常之事書聞聞於天子帝患之用陳平謀偽游於雲夢者實欲襲信信弗知高祖且至楚信欲發兵自度無罪度音大各反欲謁帝恐見禽人或說信曰斬昧謁上上必喜亡患信見昧計事昧曰漢所以不擊取楚以昧在公若欲捕我自媚漢吾今死公隨手亡矣乃罵信曰公非長者卒自剄信持其首謁於陳高祖令武士縛信載後車械信至雒陽赦以為淮隂侯樓䕶為廣漢太守元始中王莾為安漢公專政莾長子宇與妻兄呂寛謀以血塗莾第門欲懼莾令歸政發覺莾大怒殺宇而呂寛亡寛父素與䕶相知寛至廣漢過䕶不以事實語也到數日名捕寛詔書至舉姓名而捕之也護執寛莾大喜徴護入為前煇光莾分三輔置前煇光後承烈以護為之煇音暉封息鄉侯列於九卿後漢隗囂字季孟天水成紀人也囂季父崔素豪俠能得衆聞更始立王莾兵連敗遂聚衆數千人乃與兄義及上邽人楊廣等共推囂為上將軍崔為白虎將軍義為左將軍更始二年徴囂與崔及義至長安更始以囂為右將軍崔義皆即舊號其冬崔義謀欲叛歸囂懼并禍即以事告之崔義誅死更始感囂忠以為御史大夫子密者彭寵之蒼頭也彭寵反自立為燕王建武五年春寵齋獨在便室便坐之室非正室也子密等三人因寵卧寐共縛著牀告外吏云大王齋禁皆使吏休偽稱寵命敎收縳奴婢各置一處又以寵命呼其妻妻入大驚東觀記曰妻入驚曰奴反奴乃捽其妻頭擊其頰寵急呼曰趣為寵寵謂守奴曰若小兒我素所愛也今為子密所廹刼爾解我縳當以女妹妻汝家中財物皆與若小奴意欲觧之視戸外見子密聽其語遂不敢觧於是收金玉衣物至寵所裝之被馬六匹使妻縫兩縑囊昏夜後觧寵手令作記告城門將軍云今遣子密等至子后蘭卿所速開門出勿稽留之稽停也書成即斬寵及妻頭置囊中便持記馳出城因以詣闕封為不義侯呂布字奉先五原郡九原人也以驍武給并州刺史丁原為騎都尉屯河内以布為主簿大見親待靈帝晏駕原將兵詣雒陽與何進謀誅諸黄門拜執金吾進敗董卓卓入京都將為亂欲殺原并其兵衆卓以布見信於原誘布令殺原布斬原首詣卓卓以布為騎都尉甚愛信之誓為父子魏令狐愚為兖州刺史與王陵謀立楚王彪時楊康單固皆豫之及愚先卒康乃發其事於司馬宣王兾得封拜後以辭頗參錯亦并斬臨刑俱出獄固罵康曰老奴汝死自分爾若令死者有知汝何面目以行於地下也王陵坐楚王事司馬宣王誅之其子明山走向太原投親家食親家告吏乃就執蜀許邵為郡功曹先是從兄靖與邵俱知名有人倫盛名私情不叶邵排擯靖不得齒叙吴笮融所為徐州牧陶謙督運及曹公攻陶謙徐土騷動融將男女萬口馬三千匹走廣陵廣陵太守趙昱待以賔禮先是彭城相薛禮為陶謙所偪屯秣陵融利廣陵之衆因酒酣殺昱放兵大畧因載而去媯覽戴員皆吴郡太守盛憲孝廉也大帝殺憲覽員亡匿山中孫翊為丹陽皆禮致之覽為大都督督兵員為郡丞及翊為左右邊洪所害孫河河字伯海本姓俞孫䇿賜姓孫列之屬籍馳赴宛陵責怒覽員以不能全權令使奸變得施二人議曰伯海與將軍疎遠而責我乃爾討虜若來吾屬無遺矣遂殺河使人北迎揚州刺史劉馥令住歴陽以丹陽應之會翊帳下徐元孫高傅嬰等殺覽員吴歴曰媯覽戴員親近邊洪等數為翊所困嘗欲叛逆因吴主出征遂其奸計也晉王如京兆人也遇亂流移至宛濳結諸無頼少年衆至四五萬自號大將軍軍既敗歸于王敦敦從弟稜愛如驍武請敦配已麾下敦曰此軰虓險難畜汝性忌急不能容飬更成禍端稜固請與之稜置諸左右甚加寵遇如數與敦諸將角射屢鬬爭為過稜果不容而杖之如甚以為恥初敦有不臣之迹稜每諫之敦嘗怒其異已及敦聞如為稜所辱密使人激怒之勸令殺稜如詣稜因間宴請舞劔為歡稜從之如於是舞刀為戲漸漸來前稜惡而呵之不止叱左右使牽去如直前害稜敦聞而陽驚亦捕如誅之杜曾為竟陵太守先是胡亢聚衆竟陵自號楚公假曾為太守曾既殺亢并其衆自稱南中郎將前秦張猗為王兖功曹兖固守博陵與慕容垂相持垂遣將慕容驎攻兖于博陵兖糧竭矢盡猗踰城聚衆應驎兖臨城數之曰卿秦之人也吾卿之君也起衆應賊號稱義兵何名實相悖之甚卿兄往合鄉宗親逐城主天地不容為世大戮身滅未幾卿復續之卿見為吾吏親尋干戈競為戎首為爾君者不亦難乎今人可取卿一切之功寧能忘卿不忠不孝之事古人有云求忠臣必出孝子之門卿母在城不能顧之何忠義之可望惡不絶世卿之謂也不圖中州禮義之邦而卿門風若斯卿去老母如脱屣吾復何論哉既而城陷兖及固安侯苻鑒竝為驎所殺苻師好者纂之弟也苻登之討姚萇使蘭犢率衆數萬自潁陽人子和寧與苻纂首尾將圖長安師好勸其兄稱尊號纂不從乃殺纂自立為秦公蘭犢絶之皆為姚萇所敗南齊劉祥初為臨川王驃騎從事中郎祥兄勑為廣州卒官祥就勑妻求還資事聞朝廷齊人姓周史不書名陸超之門生也超之預晉安王議徐𤣥慶欲囚將還都而超之亦端坐待命周謂殺超之當得賞乃伺超之坐自後斬之頭墮而身不僵𤣥慶嘉其節厚備殯斂周又助舉棺未出戸棺墜正壓其頭折死聞之者莫不以為有天道焉于琳之為晉安王子懋中兵參軍即子懋之母阮同産弟也子懋鎮潯陽聞鄱陽隨郡二王見殺欲起兵赴難母阮在都遣書欲密迎上阮阮報琳之為計琳之弟瑶之馳告高宗高宗遣王廣之裴叔業與瑶之先襲潯陽琳之說子懋重賂叔業子懋使琳之往琳之因說叔業請取子懋叔業遣軍主徐𤣥慶將四百人隨琳之入州城僚佐皆奔散琳之從二百人拔刃入齋子懋罵曰小人何忍行此事琳之以袖鄣面使人害之梁羊鵾為侯景庫真都督景以其妹為小妻及景敗鵾密圖之乃隨其東走景於松江戰敗惟餘三舸下海欲向蒙山會景晝寢鵾語海師此中何處有䝉山汝但聽我處分遂直向京口至湖豆洲景覺大驚聞岸上云郭元建猶在廣陵景大喜將依之鵾拔刀叱海師使向京口鵾與王元禮謝答仁弟葳蕤竝景之昵也三人謂景曰我等為王百戰百勝自謂無敵卒至於此豈非天乎今就王乞頭以取富貴景欲透水鵾抽刀斫之景乃走入船中以小刀抉船鵾以矟入刺殺之後魏崔鍾為金紫光禄大夫兄敞亡後鍾貪其財物誣敞息子積等三人非兄之裔辭訴累歲人士嫉之爾朱世隆為尚書令奏除其官終身不齒崔僧淵原妻房氏生二子伯驎伯驥後薄房氏更納平原杜氏僧淵之徙也與杜俱去生四子伯鳳伯龍伯螭伯虯得還之後棄絶房氏遂與杜氏及四子家于青州伯驥與母房氏居于冀州雖往來父間而心存母氏孝慈之道頓阻一門僧淵卒年七十餘伯驎雖往奔赴不敢入家哭沙門寺伯龍性剛躁父亡後與兄伯驎訟競嫡庶竝以刀劔自衞若怨讎焉崔模初事慕容氏後為宋滎陽太守太武神䴥中滑臺平模歸降始模在南妻張氏有二子仲智季柔模至京師賜妻金氏生子幼度仲智等以父隔遠乃聚貨物間託關境規贖模歸其母張氏每謂之曰汝父性懷本自無決必不能來也行人遂以財賄至都當竊模還模果顧念幼度等指幼度謂行人曰吾何忍捨此軰令坐致刑辱當為爾取一人使名位不減於我乃授以申謨謨宋東郡太守與朱修之守滑臺神䴥中被執入國俱得賜妻生子靈度申謨聞此乃棄妻子走還江外靈度刑為閹人崔攸之者道固之兄也道固父輯為太山太守道固賤出適母生攸之目連等輕侮之輯謂攸之曰此兒姿識如此或能興人門户汝等何以輕之攸之等遇之彌薄畧無兄弟之禮時宋孝武帝為徐兖二州刺史得辟他州民為從事輯乃資給道固令其往南既至彭城帝以為從事會青州刺史新除過彭城帝謂之曰崔道固人身如此豈可為寒士至老乎而世人以其偏庶便相陵侮可為歎息青州刺史至州辟為主簿轉治中後為宋文帝諸子參軍事被遣向青州募人長史已下皆詣道固諸兄等逼道固所生母自致酒炙於客前道固驚起接取謂客曰家無人力老親自執劬勞諸客皆知其兄等所作咸起拜謝其母母謂道固曰我賤不足以報貴賔汝宜答拜諸客皆歎羙固母子賤其諸兄穆壽太武時與崔浩等輔政遇諸父兄弟有如僕𨽻夫妻竝共食而令諸父食餕餘其自矜無禮如此為時人所鄙笑王建為左大夫建兄㢠諸子多不順法建具以狀聞㢠父子伏誅李寳凉王暠孫也太武討沮渠無諱寳奉表歸誠累遷鎮北將軍李氏自初入魏人位兼舉因寳子冲寵遇遂為當世盛門而仁義吉凶情禮淺薄期功之服殆無慘容至於窘乏不加拯濟識者以此貶之陸定國娶河東桞氏生子安保後納范陽盧度世女生昕之二室俱為舊族而嫡妾不分定國亡後兩子爭襲父爵僕射李冲有寵於時與度世子泉婚親相好冲遂左右申助之繇是承爵尚主職位赫奕安保沈廢貧賤不免飢寒宼彌為尚書郎為城陽王徽所親待孝莊永安末徽避爾朱兆脫身南走歸命於彌彌不納遣人加害時論深責之盧度世者散騎常侍𤣥之子也𤣥有五子嫡唯度世餘淵敏昶尚皆别生及度世為中書學生以崔浩之難其庶兄弟嘗欲危害之度世常深忿恨及度世有子每誡約令絶妾孽不得使長後患至淵兄弟婢賤生子雖形貌相類皆不舉接為識者所非張彞為光禄大夫既貴大起第宅微號華侈頗侮其疎宗舊戚不甚存紀時有怨憾焉李靜齊州刺史元護之弟也為前將軍性甚貪忌兄亡未斂便剝脱諸妓服玩及餘財物斛斯椿為車騎將軍恒州刺史及爾朱榮之死椿與爾朱度律仲逺等北拒齊獻武王次陽平會爾朱兆與度律等相疑遁還椿後復與度律等同拒義旗敗於韓陵椿謂都督賈顯智等曰若不先執爾朱我等死無類矣遂與顯智等夜於桑下盟約倍道兼行椿入北中城收爾朱部曲盡殺之令長孫稚賈顯智等率數百騎襲爾朱世隆彥伯兄弟斬於閶闔門外椿入雒懸世隆兄弟首於其門樹椿父出見謂椿曰汝與爾朱約為兄今何忍懸其頭於門樹寧不愧負天地乎椿乃傳世隆等首并囚度律天光於齊獻武王馮穆為員外通直散騎常侍穆與叔輔興不和輔興亡贈相州刺史祖載在庭而穆方高車良馬恭受職命言宴滿堂忻笑自若為御史中丞東平王匡所劾裴茂伯為廣平王文學與兄景融别居景融貧窘茂伯了無賑恤殆同行路世以此貶薄之李洪之為秦益二州刺史洪之微時妻張氏助洪之經營資産自貧至貴多所補益有男女幾十人洪之後得劉氏劉芳從妹也洪之欽重而疎薄張氏為兩宅别居偏厚劉子繇是二妻妬競互相訟詛兩宅母子往來如讎及􅊩西州以劉自隨高遵字世禮渤海蓨人父濟隂太守遵賤出其兄矯等嘗欺侮之及父亡不令在䘮位遵為立忠將軍齊州刺史建節歴本州宗鄉改觀而矯等彌妬毁之遵為中書侍郎弟次文雖無官位而貲産巨萬遵每責其失而結憾於遵吉凶不相及時論責之北齊陳元康為高祖相府功曹參軍時魏尚書僕射范陽盧道處女為右衞將軍郭瓊子婦瓊以死罪没官高祖啓以賜元康為妻元康乃棄故婦李氏識者非之薛琡為尚書僕射乆在省闥閑明簿領然天性險忌情義不篤魏東平王元康妾張氏婬逸放恣琡初與姦通後納以為婦咸共謗之逐前妻于氏不認其子怨家内忿競相告列深為世所譏鄙韋子粲字暉茂京兆人佐郡功曹史累遷為大行臺郎中從爾朱天光平關右周武入關以為南汾州刺史神武命將出討城陷子弟俱被獲送晉陽䝉放免以粲為并州長史累遷豫州刺史卒初子粲兄弟十三人子姪親屬闔門百口悉在西魏以子粲陷城不能死難多致誅滅歸國獲存唯與弟道諧二人而已諧與粲俱入國粲富之後遂特棄道諧令其異居所得廪禄畧不相及其不顧恩義如此李訢獻文帝時為湘州刺史以貪黷被告尚書李敷與訢少長相好每左右之及訢就劾有司諷訢告敷隱罪可得自全又趙郡范摽具條列敷兄弟事狀有司以聞敷坐得罪詔列訢貪冒罪應死以糾李敷兄弟故得降免有司百鞭髠刑配為厮役後訢為太倉尚書亦信任摽腹心之事皆以告之摽以無功起家拜盧奴令及明太后臨朝摽知后忿訢又知内外疾之會鎮南人告訢外叛乃徵訢至京師言其叛狀訢曰無之引摽證訢言爾妄云知我吾又何名雖然爾不顧余之厚徳而忍為此不仁甚矣摽曰何若李敷之徳於公公昔忍於敷摽今敢不忍於公乎遂見誅楊寛邯鄲人也楊愔父津為并州刺史北道大行臺愔隨之任寛求義從出藩愔請津納之俄而孝莊幽殁愔時適欲還都行達邯鄲過楊寛家為寛所執至湘州見刺史劉誕以愔名家盛徳甚相嗟念付長史慕容白澤禁止焉元景安永之子也永兄杜襲爵陳留王杜卒子景皓嗣天保時諸元帝室親近者多被誅戮疏宗如景安之徒議欲請姓高氏景皓云豈得棄本宗逐他姓大丈夫寧可玉碎不能瓦全景安遂以此言白顯祖乃收景皓誅之家屬徙彭城繇是景安獨賜姓高氏自外聽從本姓永弟种子豫字景豫美姿儀有器幹為濮陽郡守魏彭城王韶出鎮定州啓為定州司馬及景安告景皓慢言引豫云相應和豫占云爾時以衣袖掩景皓口云兄莫妄言及問景皓與豫所列符同獲免自外同聞語者數人皆流配遠方豫卒於徐州刺史後周司馬消難高祖時為大將軍性貪滛輕於去就故世之言反覆者皆引消難云其妻高氏齊神武之女在鄴敬重之後入關便相棄薄消難之赴䢵州留高及三子在京高言於隋文曰滎陽公性多變詐今以新寵自隨必不顧妻子願防慮之消難入陳而高母子因此獲免隋李安字𤣥德高祖相周引之左右遷職方中大夫復拜安弟哲為儀同安叔父梁州刺史璋時在京師與周趙王謀害高祖誘哲為内應哲謂安曰隨之則不忠言之則不義失忠與義何以立身安曰丞相父也其可背之遂隂白之及王等伏誅將加官賞安頓首而言曰兄弟無汗馬之勞過蒙奬擢合門竭節無以酬謝不意叔父無狀為兇黨之所熒惑覆宗絶嗣其甘若薺蒙全首領為幸實多豈可將叔父之命以求官賞於是俯伏流涕悲不自勝高祖為之改容曰我為汝特存璋子乃命有司罪璋正身高祖亦為安隱其事而不言尋授安開府唐邴元真為李密右長史高祖武徳元年密將入雒口倉城元真已遣人潛引王世充密隂知之不發其事欲待世充兵半渡雒水然後擊之及世充軍至密候騎不時覺比將出戰世充軍已濟矣密自度不能支引騎而遁徑赴武牢元真竟以城降於世充鄧曉武徳初為李軌尚書左丞使長安聞軌敗舞蹈稱慶高祖曰汝委質於人為使來此聞軌淪陷曾無戚容茍悅朕情妄為慶躍既不能留心於李軌何能盡節於朕乎曉無以對丘行恭為左衞將軍貞觀中坐與嫡兄爭𦵏所生母為法司所劾除名趙履温為易州刺史履温即侍中桓彥範妻兄也彥範誅張易之後奏言先與履温謀其事於是召拜司農少卿履温徳之遂以二婢遺彥範及彥範罷知政事履温又脅奪其婢大為時論所譏焉房孺復太尉琯之子為浙西從事初娶鄭氏惡賤其妻多畜婢僕妻之保母亟言之孺復乃先具棺櫬而集家人生斂保母遠近驚異及妻在産蓐未三日遽令上船即路數日妻遇風而卒孺復以宰相子少年有浮名而姦惡未甚露累拜杭州刺史韓􅁮尚書右丞臯之從弟也臯恃前軰頗以簡倨自處順宗時王叔文黨盛臯嫉之謂人曰吾不能事新貴􅁮幸於叔文以告之因出為鄂州刺史岳鄂蘄沔等州觀察使梁朱瑾為兖州節度使乾寧二年春太祖令大將朱友恭攻瑾瑾掘塹柵以環之朱瑄遣將賀環及蕃將何懐寳赴援為友恭所擒十一月瑾從兄齊州刺史瓊以州降太祖令執賀環懷寳及瓊狥於城下謂瑾曰卿兄已敗早宜效順瑾偽遣牙將胡規持書幣送降太祖自至延壽門外與瑾交語瑾謂太祖曰欲令大將送符印願得兄瓊來押領所貴骨肉盡布腹心也太祖遣瓊與客將劉捍取符印瑾單馬立于橋上揮手謂捍曰可令兄來余有密欵即令瓊往瑾先令驍果董懐進伏于橋下及瓊至懐進突出擒瓊而入俄而斬瓊首投於城外太祖乃班師王珂河中人父重榮河中節度使唐僖宗光啓三年重榮為部將常行儒所害推重榮弟重盈為蒲帥以珂為行軍司馬及重盈卒軍府推珂為留後時重盈子珙為陜州節度使瑶為絳州刺史繇是爭為蒲帥瑶珙連上章論列又與太祖書云珂非吾兄弟蓋余家之蒼頭也小字忠兒安得繼嗣珂亦上章云亡父有興復之功又遣使求援於太原李克用為保薦於朝昭宗可之既而珙厚結王行瑜李茂貞韓建為援三鎮互相表薦昭宗詔諭之曰吾以太原與重榮有再奏之功已俞其奏矣乾寧二年五月三鎮率兵入覲賊害時政請以河中授珙瑶又連兵以攻河中克用聞之出師以討三鎮瑶珙兵退晉師拔絳州擒瑶斬之及克用駐軍於渭北昭宗以珂為河中節度使正授旄鉞克用因以女妻珂珂至太原謝婚成禮克用令李嗣昭將兵助珂攻珙於陜焉馬希聲湖南節度楚王殷之次子也殷初薨長子希振次當嗣立時希聲以先為副使方握權私遣其大將歐宏練矯父命請立為帥乃自稱留後後唐劉守文為滄州節度唐天祐六年五月守文為其弟守光敗於薊州之雞蘇守文為弟所擒歸幽州初劉仁恭輦幽府積實營大安山以自固會汴人攻其城守光堅守之因自為幽帥囚仁恭于大安别室守文素蓄奸謀志大才短利燕薊之土疆乃令子延祐質於汴自將兵討守光以迎父為名頻年出軍不利至是大舉以重賂誘契丹吐渾之衆合四萬屯薊州運滄景芻粟海船而下以給軍費及大戰守光之兵敗也守文詐慈單馬立于陣場泣諭於衆曰勿殺吾弟為守光將元行欽識之見擒滄州失帥自潰守光復縶兄於别室援以叢棘滄州兵敗守光乃進攻滄州滄州賔佐孫鶴呂兖以推守文之子延祚為滄州帥守光􅂝守文於城下攻圍累月城中乏食人餓殍軍士食人百姓食墐土驢馬相遇食其鬃士人出入多為强者屠殺呂兖率城中饑羸丁口以麩麫飼之團為宰殺務旋烹以充軍食危酷之狀遠古未聞延祚力窮以城降守光守光以其子繼威為滄帥大將張邁進佐之守光既得志父兄雖結託於我而以狀告梁祖曰臣守光謬叨戎寄向受國恩既有血誠合宜披訴伏自陛下初登寳位纔建皇基四方尚擾於干戈諸道未賔於聲敎唯臣不勞兵刃不俟詔書便貢表章率先歸欵致令河北一面晏然無虞其後又以河東結搆邠岐朋附淮蜀乆稽天討屢軫宸襟臣又密設機謀指揮夏侯敬受已下令翻賊寨遣向朝廷鑾輿纔至於陜郊兵騎悉歸於行在使兇渠北遁致翠輦東歸獲立微勞稍寛聖慮其於向國粗竭丹誠昨者兄守文遽於明時擅興兵革堅貯吞并之志全無友愛之情誑惑宸聰即言迎侍勾牽戎虜元逞他圖兄之行藏臣實所諳悉當於此際備見狡謀必知要當道之土疆為朝廷之患害累曾申奏莫不丁寧今者既破賊軍足以細驗前事昨於陣上所殺契丹兵馬絶多及寨内收得契丹與往來文字不少今又捉得自來與臣兄謀事人道士褚𤣥嗣學院使鄭緖等皆言兄本計謀極大妄動絶深不唯窺取其一方實亦將圖於大事茍非臣親當戰陣手執干戈大掃羣兇生擒戎首則滄州得志蕃衆轉狂合勢連衡為患非細固不是臣自矜小㨗妄有飾詞其褚𤣥嗣等分析文狀謹同封進其褚𤣥嗣文狀多述守文結搆說誘幽州將士及會契丹窺筭幽州城池皆是自相魚肉又言如守文得志必謀亂中原以迎侍為名實欲并吞燕薊又滄州皷角門東有誓衆碑一所其辭願破梁國却興唐朝及見幽州歸向朝廷遂拆却碑樓其碑坑於樓下文字見在又守文所遣男延祜入質不是親兒又守文令褚𤣥嗣將琉璃水精金銀等器錦綵與契丹將領約取幽州後别圖富貴其契丹少君遂差使還書願與守文勑命守文乃言得契丹下大夫所贊也梁祖覽之大噱守光復置書於莊宗言同破偽梁事李小喜幽帥劉守光之愛將雖守光兇滛出於天性然而稔惡侈毒多為小喜贊成燕城將破前一日踰垣請罪莊宗宥之至守光之將伏鑕泣而訴曰臣死無恨敎臣為惡不早歸向者繇小喜熒惑故也罪人不死臣必訴於地下急召小喜至小喜瞋目睨守光曰囚父殺兄烝滛骨肉亦小喜敎耶守光大慙帝怒其失舊君之節即命斬之王緘先事幽州劉仁恭後歸莊宗及從征幽州既獲仁恭父子莊宗命緘為露布觀其㫖趣緘既起草無所辭避義士以此少之張文禮者鎮州之大將大為趙王王鎔倚任文禮見鎔之政荒僻嘗蓄異圖酒酣之後對左右每惡言聞者莫不寒心唯鎔待之如初畧無猜間及獻言者漸為腹心乃以符習代其行營以文禮為防城使自此專其間隙及鎔殺李宏規委政於其子昭祚昭祚性偪戾未識人間情偽素飬名持重坐作貴人既事權在手朝夕欲代其父向來附勢之徒無不族滅初李宏規李藹持權使事樹立兄弟子姪及諸親舊分董要職故奸宄之心不能揺動文禮頗深畏憚及宏規見殺其部下五百人懼罪將欲奔竄聚泣偶語未有所之文禮因其離心密以奸詞激之曰令公命我盡坑爾曹我念爾曹十餘年荷戈隨我為國為家不忍一朝併膏鋒刃我若不即殺汝則得罪於令公我若不言又負爾軰事既如斯其將柰何衆軍感泣是夜作亂殺王鎔父子舉族灰滅唯留王昭祚妻朱氏以通汴人尋間道告曰王氏䘮於亂軍普寧公主無恙文禮狥賊帥張友順所請因為留後於潭城視事以事上聞兼要旄節亦奉牋勸進上含容之可其請文禮比厮役小人偶居重任行歩動息皆不自安出則千餘人露刃相隨賊殺不辜莫可勝載自度罪逆難容尚慮王師問罪奸心百變或陳情梁汴託援契丹多脩絹書藏於蠟彈塞上烽鋪黄河渡口往往擒獲其使莊宗遣人送還繇是愈切慙恐先是腹上患疽醫藥無効聞史建瑭下趙州驚悸而卒其子處瑾秘䘮軍府内外皆不之知每日於寢室前問安如生處瑾與其腹心韓正時參決大事同謀姦惡温韜初事梁為許州節度使累官至檢校太尉平章事韜素善趙巖每依附之莊宗入汴巖恃韜與已素厚遂奔許州韜延之於第斬首傳送闕下李繼儔潞州節度嗣昭之子也初嗣昭死其子繼韜以州叛及繼韜伏誅之後詔其兄繼儔赴闕時繼儔權知軍府繼韜房中所畜婢僕玩好之類悉為已有每日於其房中料選妓妾筭較財物遷延不時上路其弟繼達怒謂人曰吾仲兄被罪父子誅死骨肉之情自然傷痛大兄不仁樂禍畧無慟懐二弟併命言音尚在而便烝滛妻妾詰責貨財慙恥見人生不如死繼達服縗麻引數百騎坐於㦸門呼曰為我反乎即令人斬繼儔首投於㦸門之内繼達弟繼珂聞其亂也募市人千餘攻于城門繼達登城樓知事不濟啟于城東門至其私第盡殺其孥得百餘騎出潞城門將奔契丹行不十里麾下奔潰自剄於路隅其下小校薛萬金率衆歸於闕下李繼忠初為北京皇城使明宗天成三年十月繼忠弟姪三人進馬二百五匹金器八百兩銀萬兩家機錦百疋白羅三百疋綾三千疋絹三千疋繼忠者故昭義帥嗣昭之子少有心疾其母楊夫人自潞州積聚百萬輦於并州私第繼韜之叛没之于官莊宗南郊助大半賞給兄繼韜伏法其母又輦及晉者餘百兩楊氏卒其弟相州刺史繼能潞府司馬繼襲聞哀俱至繼忠等詣官告變繼能繼襲伏法弟姪遂得分其所聚故有獻聶嶼明宗時為起居舍人嶼早依郭崇韜門庭致身朱紫名登兩史浙江使廻生涯巨萬嶼為河東節判時郭氏次子之婦孀居於家嶼䘮偶未乆復忍而納幣人皆罪之明宗在藩邸時素聞其醜聲天成中與温韜等同詔賜死晉秘瓊初仕後唐為董温琪衞内指揮使倚以腹心及温琪為幽州連帥趙徳鈞所奏同赴太原之役軍敗没蕃瓊乃害温琪之家載其屍都以一坎瘞之温琪在任貪暴積鏹巨萬瓊悉輦之以藏其家遂自稱留後李彝殷為夏州節度使天福末奏衞内指揮拓拔崇斌等五人作亂當時收擒處斬訖相次綏州刺史李彝敏擅將兵士直抵城門尋差人掩殺彝敏知事不濟與弟五人將家南走詔李彝敏潛結兇黨顯恣逆謀骨肉之間尚興屠害炤臨之内難以含容送夏州處斬李鏻初入恒山謁要人李宏規以宗姓請兄事之繇是得進趙王王鎔辟為從事鎔卒復為王徳明賔客徳明使鏻聘於唐莊宗鏻密疏徳明之罪且言可圖之狀莊宗嘉之及恒山平以鏻為霸府支使嘗從容請於莊宗曰鏻有四子請誅之莊宗問其故對曰此軰生於恒山稟悖亂之氣不可留也莊宗笑而止漢馬希蕚湖南節度希範弟希廣之庶兄希範卒大將等立其母弟希廣繼位希蕚自桂州為朗帥而怒希廣擅命始搆參啇之隙漢高祖乾祐中希廣希蕚交訴於朝廷累降詔命和解之而濳佑希廣於是希蕚怨望乃依附淮夷未幾率朗人及溪洞羣蠻向長沙為長沙軍所敗三年希蕚大合羣蠻再攻長沙陷希廣及其妻皆杖死於市左右用事者皆臠割而死希蕚自號楚王武安軍節度使周王繼宏在晉為奉國指揮使虜陷中原從虜主至相州遂令以本軍戍守虜主留高唐英為相州節度使唐英善待繼宏每候其第則升堂拜繼宏之母贈遺甚厚倚若戚親又給與兵仗略無猜忌會虜主死漢祖赴雒唐英遣使歸漢漢祖大悅將厚待唐英使未廻繼宏與指揮使樊暉等共殺唐英繼宏自稱留後令判官張易奉表于漢祖人或責以見利忘義繼宏曰吾儕小人也若不因利乘便以求富貴畢世以來未可得志也及漢祖討杜重威至徳清軍繼宏來朝乃授節旄册府元龜卷九百四十三
