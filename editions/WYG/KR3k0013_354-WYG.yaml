body:
  text: 册府元龜卷三百五十四宋王欽若等撰將帥部立功第七後魏崔亮孝明初為撫軍將軍定州刺史梁左游擊將軍趙祖悦率衆偷據硤石詔亮假鎮南將軍齊王蕭寳夤鎮東將軍章武王融安南將軍並使持節都督諸軍事以討之靈太后勞遣亮等賜戎服雜物亮至硤石祖悦出城逆戰大破之賊復於城外置二柵欲拒官軍亮焚擊破之殺三千餘人亮與李崇為水陸之期日日進攻而崇不至及李平至乃進軍共平硤石崔孝芬為龍驤將軍時荆州刺史李神儁為梁遣將攻圍詔加孝芬通直散騎常侍以將軍為荆州刺史兼尚書南道行臺領軍司率諸將以援神儁因代焉於時州郡内戍悉已陷没且路繇三鵶賊已先據孝芬所統既少不得徑進遂從𢎞農堰渠山道南入遣弟孝直輕兵在前出賊不意賊便奔散人還安堵孝明嘉勞之并賚馬及綿絹等物孝昌三年梁將成景雋率衆逼彭城除孝芬寧朔將軍率大都督李叔仁柴集等赴戰景雋等力屈退走永安二年莊帝聞元顥有内侵之計勅孝芬南赴徐州顥遂潛師向考城擒大都督濟陽王暉業乘勝徑進遣其後軍都督侯暄守梁國城以為後援孝芬勒諸將馳徃圍暄恐顥遣援乃急攻之晝夜不息五日暄遂突出擒斬之俘其卒三千餘人源子雍為夏州刺史㑹破落汗㧞陵首為反亂北海王顥為大行臺子雍具陳賊可滅之狀顥給子雍兵馬令其先行時東夏合境反叛所在屯結子雍轉鬭而前九旬之中凡數十戰乃平東夏徵稅租粟運於統萬城於是二夏漸寧及蕭寳寅等為賊所敗賊帥宿勤明達遣息阿非率衆邀路華州白水被圍逼關右騷擾咫尺不通時子雍新平黑城遂率士馬并夏州慕義之民攜家席卷鼓行南出賊帥康維摩擁率羌胡守鋸谷斷􅀈棠橋子雍與交戰大破之生擒維摩又攻賊帥契官斤於楊氏堡破之子雍出自西夏漸至於東轉戰千里至是朝廷始得其委問加散騎常侍使持節假撫軍將軍都督兼行臺尚書復破賊帥紇單步胡提於曲沃堡孝明璽書勞勉之子雍在白水郡復破阿非軍斬獲詔遣侍中尚書令城陽王徽於潼關宣㫖慰勞李苗為西北道行臺與大都督宗正珍孫討汾絳蜀賊平之還除司徒司馬崔延伯為征西將軍時莫折念生兄天生下隴東冦征西將軍元志為天生所擒賊衆甚盛進屯黑水詔延伯為使持節征西將軍西道都督與行臺蕭寳夤討之寳夤與延伯結壘馬嵬南北相去百餘歩寳夤日集督將論討賊方畧延伯每云賊新制勝難與争鋒寳夤正色責之曰君荷國寵靈總戎出討便是安危所繫每云賊不可討以示怯懦損威挫氣乃君之罪延伯明晨詣寳夤自謝仍云今當仰為明公參賊勇怯延伯選精兵數千下渡黑水列陣西進以向賊營寳寅率衆於水東尋原西北以示後繼於時賊衆大盛水西一里營營連接延伯徑至賊壘揚威脇之徐而還退賊以延伯衆少開營競追衆過十倍臨水逼蹙寳夤親觀之懼有虧損延伯不與戰身自殿後抽衆東渡轉運如神須臾濟盡徐乃自渡賊徒奪氣相率還營寳夤大悦謂官屬曰崔公古之闗張也今年何患不制賊延伯馳見寳夤曰此賊非老奴敵公但坐看後日延伯勒衆而出寳夤為後拒天生悉衆來戰延伯申令將士身先士卒陷其前鋒於是勇鋭競進大破之俘斬十萬餘追奔及於小隴秦賊勁强諸將所憚朝廷初議遣將咸云非延伯無以定之果能尅敵授右衞將軍常景為左將軍徐州刺史杜洛周反於燕州乃以景兼尚書為行臺與幽州都督平北將軍元譚以禦之景表求勒幽州諸縣悉入古城山路有通賊之處權發兵夫隨宜置戍以為防遏又以頃來差兵不盡强壯今之三長皆是豪門多丁為之今求權發為兵帝皆從之進號平北將軍别勅譚西至軍都關北從盧龍塞據此二嶮以杜賊出入之路又詔景山中險路之處悉令捍塞景遣府録事參軍裴智成發范陽三長之兵以守白㠈都督元譚據居庸下口俄而安州石離冗城斛鹽三戍兵反結洛周有衆二萬餘自松岍赴賊譚勒别將崔仲哲等截軍都關以待之仲哲戰没洛周又自外應之腹背受敵譚遂大敗諸軍夜散詔以景所部别將李琚為都督代譚征下口降景為後將軍解州任仍詔景為幽安𤣥等州行臺賊既南出鈔掠薊城景命統軍梁仲禮率兵士邀擊破之獲賊將禦夷鎮軍主孫念恒都督李琚為賊所攻薊城之北軍敗而死率屬城人禦之賊不敢逼洛周還據上谷授景平北將軍光祿大夫行臺如故洛周遣其都督王曹紇真馬叱斤等率衆薊南以掠人穀乃遇連雨賊衆疲勞景與都督于榮刺史王延年置兵粟國邀其走路大敗之斬曹紇真洛周率衆南趣范陽景與延年及榮復破之又遣别將重破之於州西虎眼泉禽斬及溺死者甚衆一云景破杜洛周斬其武川王賀㧞文興别帥侯莫陳升生擒男女四百口牛馬五千餘頭楊昱為東南道都督時泰山太守羊􅋲據郡南叛梁遣將軍王辯率衆侵冦徐州畨郡人續靈珍受梁平北將軍畨郡刺史擁衆一萬攻逼畨城昱遣别將劉馘擊破之臨陣斬靈珍首王辯退走李􅁮為中散大夫正光二年南荆州刺史桓叔興驅掠城民叛入于梁梁資以兵糧令築谷陂城以立洛州逼土山戍詔􅁮持節兼尚書左丞為行臺督諸軍討叔興大破之乗勝抜谷陂叔興退走軍還除尚書左丞源子恭為冠軍將軍正光中秦益氐反詔子恭持節為都督河間王琛軍司以討之事平仍行南秦州事後加後將軍平絳蜀反丹谷清亷二路險􅉣不通以子恭為當郡别將俄而建興蜀復反相與連勢進子恭為持節散騎常侍假平北將軍征建興都督仍兼尚書行臺與正平都督長孫稚合勢進討大破之正平賊帥范明逺與賊帥劉牙奴並面縳請降武泰初郢州刺史元願逹以城降梁詔徵都督尉慶賔還京師回衆𨽻子恭以討之梁將夏侯䕫率衆數萬来冦逺近不安䕫乗勢分兵遂逼新蔡自攻毛城子恭隨方應援賊並破走梁豫州刺史夏侯亶復遣四將率衆三萬入圍南頓北攻陳項子恭遣軍禦之賊復奔退梁直閣將軍軍主胡智逹等八將與其監軍閻次洪入冦屯於州城東北四十餘里子恭擊破之斬智逹生擒次洪板橋蠻文石活石忌麤受梁印節扇誘黨類據險冦竊子恭躬率將士徑襲其柵數日之中殱殪畧盡後叛蠻雷亂清受梁兖州刺史章綬入為冦掠諸蠻從之置立郡縣子恭討平之蕭寳夤為鎮東將軍都督東南揚徐兖三州諸軍事賊將姜慶真内侵圍逼夀春遂據外郭寳夤躬貫甲胄率衆力戰破走之後為車騎大將軍都督徐州東道諸軍事正光末梁遣其將裴􅃉虞鴻等率衆冦揚州詔寳夤率諸將討之既而揚州刺史長孫稚大破􅃉軍斬鴻賊遂奔退初秦州城人薛珍劉慶杜遷等反執刺史李彦推莫折大提為首自稱秦王大提尋死其第四子念生竊號改年置官寮遣其弟天生率衆出隴東攻没汧城陷岐州執元志裴芬之等遂冦雍州屯於黑水朝廷甚憂之乃除寳夤開府西道行臺所部西征寳夤與大都督崔延伯擊天生大破之斬獲十餘萬仍進討高平賊帥万俟醜奴於安定更有負捷時有天水人吕伯度兄弟始共念生同逆後與兄衆保于顯親聚衆討念生戰敗降於胡琛琛以伯度為大都督秦王資其士馬還征秦州大敗念生將杜粲於成紀又破其金城王莫折普賢於永洛城遂至顯親念生率衆身自拒戰又大奔敗伯度乃背胡琛襲琛將劉抜破走之遣其兄子忻和率騎東引國軍念生事迫乃詐降於寳夤朝廷喜伯度立義之功授撫軍將軍涇州刺史平秦郡開國公食邑三千户孝昌二年除寶夤侍中驃騎大將軍寶夤初自黒水終至平凉與賊相對數年攻擊賊亦憚之關中保全寳夤之力矣裴衍為征虜將軍孝昌初梁將曹景宗冦荆州山蠻應之大路斷絶都督崔暹率數萬之衆盤桓魯陽不能前討荆州危急朝廷憂之詔衍為别將假前將軍與𢎞農太守王羆率軍一萬出武關以救荆州賊逆戰於折楊衍大破之賊遂退走荆州圍解費穆為平南將軍孝昌中妖賊李洪於陽城起逆連結蠻左詔穆兼武衞將軍率衆討擊破於闗口之南遷金紫光祿大夫武衞將軍李神軌為武衞將軍相州刺史安樂王鑒據州反詔神軌與都督源子邕等討平之武泰初蠻帥李洪扇動諸落伊闕已東于鞏縣多被燒刼詔神軌為都督與寧朔將軍崔孝暐持節討平之爾朱榮為游擊將軍蠕蠕主阿那瓌冦掠北鄙詔假榮節冠軍將軍别將𨽻都督李崇北征榮率其所部四千人追擊度磧不及而還秀容内附胡民乞扶莫于破郡殺太守南秀容牧子萬子乞真反叛殺太僕卿陸延并州牧子素和婆崘嶮作逆榮並前後討平之遷直閤將軍冠軍將軍仍别將内附叛胡乞步落堅胡劉阿如等作亂𤓰肆勅勒北列步若反於沃陽榮並滅之以功封安平縣開國侯食邑一千戸尋加通直散騎常侍勅勒斛律洛陽作逆桑乾西與費也頭牧子迭相犄角榮率騎破雒陽於深井逐牧子於河西孝莊建義初北海王顥南奔于梁時邢杲冦亂三齊與顥應接顥都督宗正珍孫河内太守元襲固守不降榮攻而尅之斬珍孫元襲以徇帝幸河内城榮與顥相持於河上顥令都督安豐王延明緣河據守榮既未有舟舩不得即渡議欲還北更圖後舉黄門郎楊侃高道穆等並謂大軍若還失天下之望固執以為不可屬會馬渚諸楊云有小船數艘求為鄉導榮乃令都督爾朱兆等率精騎夜濟登岸奮擊顥子領軍將軍冠受率馬歩五千拒戰兆大破之臨陣擒冠受延明聞冠受見擒遂自逃散顥便率麾下南奔後遷天柱大將軍還晉陽先是葛榮枝黨韓婁仍據幽平二州榮遣都督侯淵討斬之時賊帥万俟醜奴蕭寳夤擁衆豳涇兇勢日盛榮遣其從子天光為雍州刺史率都督賀抜岳侯莫陳悦等總衆入關討之天光既至雍州以衆少不敵逡巡未進榮大怒遣其騎兵參軍劉貴馳驛詣軍加天光杖罰天光等大懼乃進討連破之擒醜奴寳夤並檻車送闕門天光又擒王慶雲万俟道樂關西悉平於是天下大難便以盡矣賈顯度孝莊時為統軍將軍從上黨王天穆破邢杲元顥入洛仍與天穆渡河赴行宫於河内顥平以本將軍除廣州刺史樊子鵠為平北將軍元顥入洛薛修義及降蜀陳雙熾等受顥處分率衆攻晉州子鵠出與戰大破之又破修義於土門以功拜撫軍將軍後兼右僕射為行臺督賈智等討吕文欣於東徐州平之出帝太昌初兼尚書左僕射東南道大行臺總大都督杜徳等追討爾朱仲逺仲逺奔梁收其兵馬甲仗時梁遣元樹入冦陷據譙城詔子鵠與德討之樹屯兵梁國欲來逆戰見子鵠軍盛夜退還譙子鵠引兵追躡樹又背城為陣子鵠勒兵直趣城下縱騎衝突樹衆大敗奔入城門城閉隘塞多自殺害於是斬千餘級獲馬數百匹大收鎧仗遂圍城鹿悆為給事黄門郎及東徐城民吕文欣殺刺史元大賓南引賊衆屯柵曲術詔悆使持節散騎嘗侍安東將軍為六州大使與行臺樊子鵠討破文欣之黨重以購之文欣同逆人韓端正斬文欣送首魁帥同死者十二人詔書褒慰侯淵為驃騎將軍前廢帝立幽州刺史劉靈助舉義兵屯於安國城淵與叱列延慶等破擒之崔孝直後廢帝時為寧逺將軍汝南王開府掾領直寢兄孝芬除荆州詔孝直假征虜將軍别將總羽林二千騎與孝芬俱行孝直潛師徑進賊遂破走孝芬入城後梁將曹義宗仍在馬圏鼔動順陽蠻夷緣邉冦竊孝直率衆禦之賊皆退散東魏鄭模為安東將軍万俟醜奴遣將郝虎南侵模攻破其營擒虎以功封槐里縣開國伯邑五百戸鄭尚為統軍東西征討以軍功賜爵汝陽男高元盛為衞將軍天平四年滎陽人張儉等聚衆反於大魏山通西魏元盛討破之賀抜仁為大都督天平四年十二月河間人邢磨納范陽人盧仲禮等各聚衆反元象元年九月抜仁擊破平之北齊慕容儼初仕魏正光中為河間王元琛左廂軍主率衆救夀春以戰功賞帛五十匹軍次西硤石因解渦陽之圍平倉陵城荆山戍梁遣將鄭僧等要戰儼擊之斬其將蕭喬梁人奔遁又襲破王神念等軍擒二百餘人神念僅以身免三年梁遣將攻東豫州詔遣大都督元寳掌討之儼督别將鄭海珍與戰斬其軍主朱僧珍軍副秦太又擊賊王茍於陽夏平之孝昌中爾朱榮入洛授儼京畿南面都督永安中又破梁將馬元逹蔡天起栁伯嘉等累有功除强弩將軍與梁將王𤣥真董當門等戰並破之解穣城圍尅復南陽新鄉轉積射將軍持節豫州防城大都督高祖時為鎮南將軍鎮河橋五城侯景叛儼擊陳郡賊獲景麾下厙狄曷賴及偽署太守鄭道合兖州刺史王彦夏行臺狄暢等擒斬百餘級旋軍項城又擒景偽署刺史辛光及蔡遵并其部下二千人除譙州刺史屢有戰功多所降下高市貴初仕後魏孝昌初恒州内部勅勒劉胡崘等聚衆反市貴為都督率衆討崘一戰破之累遷撫軍將軍諫議大夫及爾朱榮立莊帝市貴預翼戴之勲遷衞將軍光祿大夫秀容大都督第一領民酋長賜爵上雒縣伯爾朱榮擊葛榮於滏口以市貴為前鋒都督葛榮平除使持節汾州刺史後遷驃騎大將軍高祖起義市貴預其謀及樊子鵠據州反隨大都督婁昭討之子鵠平除西兖州刺史高祖以洪峒要險遣市貴鎮之高祖沙苑失利晉州行事封祖業棄城而遁州民柴覽聚衆作逆高祖命市貴討之覽奔柴壁市貴破斬之是時東雍南汾二州境多羣聚為盜因市貴平覽皆散歸復業後秀容人五千户叛應山胡復以市貴為行臺統諸軍討平之叱列平代郡西部人世襲第一領軍酋長魏孝昌末抜陵反叛茹茹餘衆入冦馬邑平以統軍屬有戰功補别將後牧子作亂劉胡崘斛律可那律俱時搆逆以平為都督討定胡崘等魏孝莊初除武衞將軍隨爾朱榮破葛榮平元顥遷中軍都督右衞將軍封癭陶縣伯邑七百户榮死平與榮妻及爾朱世隆等北走長廣王曄立授右衞將軍加京畿大都督李渾仕後魏為散騎常侍普泰中崔社客反於海岱攻圍青州詔渾為征東將軍都官尚書行臺赴援而社客宿將多謀諸城各自保固堅壁清野議有異同渾曰社客賊之根本圍城復踰晦朔烏合之衆易可分離若簡練驍勇銜枚夜襲徑趣營下出其不意咄嗟之間便可擒殄如社客就擒則諸郡可傳檄而定何意冐熱攻城疲損軍士諸將遲疑渾乃決行未明逹城下賊徒驚散生擒社客斬首送洛海隅清定斛律羌舉仕魏為大都督潁川人張儉聚衆反叛西逼闗右羌舉隨都督侯景髙昻等討平之薛修義仕魏為關右行臺樊子鵠之據兖州修義從大司馬婁昭破平之後為衞尉卿山胡侵亂晉州遣修義追討破之王琳初仕梁為建寧縣侯侯景遣將宋子仙據郢州琳攻尅之擒子仙又隨王僧辯破景後拜湘州刺史平景之勲與杜龕俱為第一以罪下吏復除湘州刺史陳霸先既殺王僧辯推立敬帝以侍中司空徵琳不從命乃大營樓艦將圖義舉琳將帥各乘一艦每行戰艦以千數以野猪為名陳武帝遣將侯安都周文育等誅琳乃受梁禪安都嘆曰我其敗乎師無名矣逆戰於沌口琳乘平肩輿執鉞而麾之擒安都文育其餘無所漏唯以周鐵虎一人背恩斬之鏁安都文育寘琳所坐艦中令一閹豎監守之堯雄初仕魏為宣威將軍從叱列延討劉靈助平之拜鎮東將軍燕州刺史及高祖義旗初建以為車騎大將軍瀛州刺史武帝入關雄為大都督隨高昂破賀拔勝於穣城周旋征討三荆仍除二豫揚郢四州都督豫州刺史及梁以元慶和為魏王侵擾南境雄率衆討之大破慶和於南頓尋與行臺侯景破梁楚二州民上書更乞雄為刺史復行豫州事隨行臺任延敬討賀若徽于潁川延敬等失利雄收集散卒保大梁州文帝因延敬之敗遣右丞韋孝寛等攻豫州雄都督郭丞伯程多寳等舉豫州降敵雄外兵參軍王恒伽等從大梁邀斬多寳西魏以丞伯為潁川太守雄仍與行臺侯景討之雄别攻破樂口擒丞伯進討懸瓠逐西魏刺史趙繼宗韋孝寛等復以雄行豫州事任延敬初仕西魏為徐州刺史潁川長史賀若徽執刺史田迅據城降魏復令延敬率豫州刺史堯雄等討之魏遣其將怡峯率衆來援延敬等與戰失利收還北豫仍與行臺侯景司徒高昂等相㑹共攻潁川拔之斛律金初仕東魏為汾州大都督從高祖破紇豆陵於河西元象中與行臺薛修義共圍喬山之冦俄而高祖至仍共討平之因從高祖攻下南絳邵郡等數城武定初北豫州刺史高仲密據城西叛周文帝入冦洛陽高祖使金統劉豐步大汗薩等歩騎數萬守河陽城以拒之高祖到仍從破宻軍還除大司馬改封石城郡公邑一千戸轉第一領民酋長三年高祖出軍襲山胡分為二道以金為南道軍司繇黄櫨嶺出高祖自出北道度赤谼嶺㑹金於烏突戍合擊破之軍還出為冀州刺史四年詔金率衆從烏蘇道㑹高祖於晉州仍從攻玉壁軍還高祖使金總督大衆從歸晉陽後為肆州刺史高祖詔金率衆㑹攻潁川事平復使金率軍從崿坂送米宜陽西魏九曲戍將馬紹隆據險要鬭金破之以功别封安平縣男後遷太師文宣天保中茹茹為突厥所破種落分散慮其犯塞驚擾邉民乃詔金率騎三萬屯白道以備之而虜帥豆婆吐久備將三千餘戸密欲西過候騎還吿金勒所部追擊盡俘其衆茹茹但鉢將舉國西徙金獲其候騎送之并表陳虜可擊取之勢顯祖於是率衆與金共討之於吐賴獲二萬餘戸而還進位右丞相李愍東魏時為南荆州大都督時梁遣南司州刺史任思祖隨郡太守桓和等率馬步三萬兼發邉蠻圍逼下㳾戍愍躬自討擊之詔加車騎將軍慕容紹宗魏末從爾朱榮以軍功封索盧縣侯後從髙祖破羊侃又與元天穆平邢杲累遷并州刺史後為豫州刺史西魏將獨孤如願據洛州梁潁之間冦盜蜂起高祖命紹宗率兵赴武牢與行臺劉貴等平之進爵為公還朝遷御史中尉屬梁人劉烏黑入冦徐方令紹宗率兵討擊之大破因除徐州刺史烏黑收其散衆復為侵竊紹宗密誘其徒黨數月間遂執烏黑殺之侯景反叛命紹宗為東南道行臺加開府轉封燕郡公與韓軌等詣瑕邱以圖進取梁武帝遣其兄子貞陽侯淵明等率衆十萬頓軍寒山與侯景犄角壅泗水灌彭城仍詔紹宗為行臺節度三徐二兖州軍事與大都督髙岳等出討大破之擒淵明及其將帥等俘獲甚衆乃囘軍討侯景于渦陽于時景軍甚衆前後諸將徃者莫不為其所輕及聞紹宗與岳將至深有懼色謂其屬曰岳所部兵精紹宗舊將宜共慎之於是與景接戰諸將持疑無肯先者紹宗麾兵徑進諸將從之因而大捷景遂奔遁軍還别封永樂縣子范舍樂初從爾朱兆為都督髙祖義舉棄兆歸信都從高祖破兆於廣阿韓陵並有功賜爵平舒男每從征役多有克捷除相府左廂大都督敬顯儁初為高祖别駕及義舉以儁為行臺倉部郎中從攻鄴令顯儁督造土山城拔又從平西胡轉都官尚書與諸將征討累有功又從高祖平冦難破周文帝敗侯景平夀春定淮南又畧地三江口多築城戍累除兖州刺史段韶為高祖親信都督從帝出晉陽追爾朱兆於赤谼嶺平之以軍功封下洛縣男後遷武衞將軍周宇文䕶母閻氏先配中山宫䕶聞閻尚存乃因邉境移書請還其母并通隣好文襄許之䕶得其母乃遣將尉遲迥等襲雒陽韶與蘭陵王長恭大將軍斛律光率衆擊之韶旦將帳下二百騎與諸軍共登邙阪聊觀周軍形勢至太和谷便值周軍即遣馳吿諸營追集兵馬仍與諸軍結陣以待韶為左軍蘭陵王為中軍斛律光為右軍與周人相對韶遥謂周人曰汝宇文䕶幸得其母不能懐恩報徳今日之來竟何意也周人曰天遣我來有何可問韶曰天道賞善罰惡當遣汝送死來耳周軍乃以歩人在前上山逆戰韶以彼徒我騎且却且引待其力敝乃下馬擊之短兵始交周人大潰其中軍所當者亦一時瓦解投墜溪谷而死者甚衆雒城之圍亦即奔遁盡棄營幕從邙山至榖水三十里中軍資器物彌滿川澤車駕幸雒陽親勞將士於河陰置酒高㑹䇿勲命賞除太宰封靈武縣公天保中梁將東方白額潜至宿豫招誘邉民殺害長吏淮泗擾動詔徵韶討之既至㑹梁將嚴超逹等軍逼涇州又陳武帝率衆將攻廣陵刺史王敬寳遣使告急復有尹令思率衆萬餘人謀襲盱眙三軍咸懼韶謂諸將曰自梁氏喪亂國無定主人懐去就强者從之霸先等智小謀大政令未一外託同徳而内有離心諸君不足憂吾揣之熟矣乃留儀同敬顯儁堯雄等圍守宿豫自將步騎數千人倍道赴涇州塗出盱眙令思不虞大軍卒至望旗奔北進與超逹合戰大破之盡獲其舟艦器械謂諸軍士曰呉人輕躁本無大謀今破超逹霸先必走即回赴廣陵陳武帝果遁去追至揚子柵望揚州城乃還大獲其軍資器物旋師宿豫六月韶遣辯士喻白額禍福白額於是開門請盟韶與行臺辛術等議且為受盟盟訖度白額終不為用因執而斬之并其諸弟等並傳首京師江淮帖然民皆安輯顯祖嘉其功詔賞呉口七十人封平原郡王蔡儁初仕魏從高祖為都督隨領軍婁昭攻樊子鵠於兖州又與行臺元子思討元慶和俱平之侯深反復以儁為大都督率衆討之深敗走厙狄回雒為高祖右廂都督從征山胡先鋒斬級除朔州刺史破周文於河陽轉授夏州刺史邙山之役力戰有功増邑通前七百戸王則為征南將軍從行臺侯景周旋征討屢有功績暴顯東魏時為征南將軍廣州刺史武定二年侯景反於河南為景所攻顯率左右百餘騎突出賊營拔河南歸國時高岳慕容紹宗等即配顯士馬隨岳等破景於渦陽三年與清河王高岳襲歴陽取之為贓貨解鄭州大理禁止處斷未訖為合肥被圍遣與步汗薩慕容儼等同攻梁北徐州擒刺史王疆與梁秦州刺史嚴超達戰於涇城破之五年授儀同三司又與髙岳臨漢水攻下梁西楚州獲刺史許法光薛震為廣州刺史從慕容紹宗討侯景以功别封膚施縣男文宣天保四年從討山胡破茹茹並有功績累遷譙州刺史杜弼文襄時為中軍大將軍破蕭明於塞山别與領軍潘樂攻拔梁潼州仍與樂等撫軍恤民合境傾賴斛律平為肆州刺史周太祖遣其右將軍李小光據梁州平以偏師討擒之出為燕州刺史入兼左衞將軍領衆一萬討北徐賊破之綦連猛文宣天保元年為都督東秦州刺史隨斛律敦北征茹茹敦令猛輕將百騎深入覘候還至白道與軍相㑹因此追躡遂大破之賚帛三百段皇建初為左右大將軍從孝昭討奚賊大捷獲馬二千疋牛羊三萬頭盧潜天保中為南討經畧陳秦譙二州刺史王奉國合州刺史周令珍前後入冦潜輙破平之以功加散騎常侍斛律光為左衛將軍天保中從征出塞光先驅破敵多斬首虜并獲雜畜還除晉州刺史後遷衞將軍河清三年周將逹奚成興等來冦平陽詔光率步騎三萬禦之興等聞而退走光逐北遂入其境獲三千餘口而還遷司徒左衞將軍其年周遣柱國大司馬尉遲迥齊國公宇文憲柱國庸國公可叱雄等衆稱十萬冦雒陽光率騎五萬馳徃赴擊戰於邙山迥等大敗光親射雄殺之斬捕首虜三千餘級迥憲僅而獲免盡收其甲兵輜重仍以死者積為京觀世祖幸雒陽䇿勲班賞遷太尉又封冠軍縣公後主天統三年十二月周遣將圍雒陽壅絶粮道武平元年正月詔光率步騎三萬討之軍次定隴周將張掖公宇文桀中州刺史梁士彦開府司水大夫梁景興等又屯鹿盧交道光擐甲執鋭身先士卒鋒刃纔交桀衆大潰斬首三千餘級直到宜陽與周齊國公宇文憲申國公㩉跋顯敬相對十旬光置築統闗豐化二城以通宜陽之路軍還行次安鄴憲等衆號五萬乃躡軍後光縱騎擊之憲衆大潰虜其開府宇文英都督越勤世良韓延等又斬首三百餘級憲仍令桀及其大將軍中部公梁雒都與景興士彦等步騎三萬於鹿盧交塞斷要路光與韓貴孫呼延族王顯等合擊大破之斬景興獲馬千疋詔加右丞相并州刺史册府元龜卷三百五十四
