body:
  text: 册府元龜卷八百八十七宋王欽若等撰總錄部游說第二張儀魏人為秦相惠王十二年免相相魏臣欽若等曰為魏襄王相也以為秦欲令魏先事秦而諸侯效之魏王不肯聼儀秦王怒伐取魏之曲沃平周復隂厚張儀益甚張儀慙無以歸報留魏四歲而魏襄王卒哀王立張儀復說哀王哀王不聼於是張儀隂令秦伐魏魏與秦戰敗明年齊又來敗魏於觀津秦復欲攻魏先敗韓申差軍斬首八萬諸侯震恐而張儀復說魏王曰魏地方不至千里卒不過三十萬地四平諸侯四通輻凑無名山大川之限從鄭至梁二百餘里車馳人走不待力而至梁南與楚境西與韓境北與趙境東與齊境卒戍四方守亭障者不下十萬梁之地勢固戰塲也梁南與楚而不與齊則齊攻其東東與齊不與趙則趙攻其北不合於韓則韓攻其西不親於楚則楚攻其南此所謂四分五裂之道也且夫諸侯之為從者將以安社稷尊主彊兵顯名也今從者一天下約為昆弟刑白馬盟于洹水之上以相堅也而親昆弟同父母尚有争錢財而欲恃詐偽反覆蘇秦之餘謀其不可成亦明矣大王不事秦秦下兵攻河外據卷衍酸棗刼衞取陽晉則趙不南趙不南而梁不北梁不北則從道絶從道絶則大王之國欲毋危不可得也秦折韓而攻梁韓怯於秦秦韓為一梁之亡可立而待也此臣所為大王患也為大王計莫如事秦事秦則楚韓必不敢動無楚韓之患則大王髙枕而卧國必無憂矣且夫秦之所欲弱者莫如楚而能弱楚者莫如梁楚雖有富大之名而實空虚其卒雖多然而輕走易北不能堅戰悉梁之兵南面而伐楚勝之必矣割楚而益梁虧楚而適秦嫁禍安國此善事也大王不聼臣秦下甲士而東伐雖欲事秦不可得矣且夫從人多奮辭而少可信說一諸侯而成封侯是故天下之游談說士莫不日夜搤腕瞋目切齒以言從之便以說人主人主賢其辯而牽其說豈得無眩哉臣聞之積羽沈舟羣輕折軸衆口鑠金積毁銷骨故願大王審定計議且賜骸骨辟魏哀王於是乃倍從約而因儀請成于秦張儀歸復相秦三歲而魏復背秦為從秦攻魏取曲沃明年魏復事秦張儀後使楚聞蘇秦死乃說楚王曰秦地半天下兵敵四國被險帶河四塞以為固虎賁之士百餘萬車千乘騎萬匹積粟如丘山法令既明士卒安難樂死主明以嚴將智以武雖無出甲席卷常山之險必折天下之脊天下有後服者先亾且夫為從者無以異於驅羣羊而攻猛虎虎之與羊不格明矣今王不與猛虎而與羣羊臣竊以為大王之計過也凢天下彊國非秦而楚非楚而秦兩國交争其勢不兩立大王不與秦秦下甲據宜陽韓之上地不通下河東取成臯韓必入臣梁則從風而動秦攻楚之西韓梁攻其北社稷安得毋危且夫從者聚羣弱而攻至彊不料敵而輕戰國貧而數舉兵危亾之術也臣聞之兵不至彊勿與挑戰粟不如丘勿與持乆夫從人飾辯虛辭髙主之節言其利不言其害卒有秦禍無及為己是故願大王之熟計之秦西有巴蜀大船積粟起於汶山浮江以下至楚三千餘里船舫載卒一舫載五十人與三月之食下水而浮一日行三百餘里里數雖多然而不費牛馬之力不至十日而距扞關巴郡魚腹有扞水扞關扞關驚則從境以東盡城守矣黔中巫郡非王之有秦舉甲出武關南面而伐則北地絶秦兵之攻楚也危難在三月之内而楚待諸侯之救在半歲之外此其勢不相及也夫待弱國之救㤀彊秦之禍此臣所為大王患也大王嘗與呉人戰五戰而三勝陣卒盡矣偏守新城存民苦矣臣聞功大者易危而民敝者怨上夫守易危之功而逆彊秦之心臣竊為大王危之且夫秦之所以不出兵凾谷十五年以攻齊趙者隂謀有合一作吞天下之心楚嘗與秦搆難戰于漢中楚人不勝列侯執珪死者七十餘人遂亡漢中楚王大怒興兵襲秦戰于藍田此所謂兩虎相搏者也夫秦楚相敝而韓魏以全制其後計無危於此者矣願大王熟計之秦下甲攻衞陽晉必大關天下之㓙關一作開大王悉起兵以攻宋不至數月而宋可舉舉宋而東指則泗上十二諸侯盡王之有也凢天下而以信約從親相堅者蘇秦封武安君相燕即隂與燕王謀伐破齊而分其地乃佯有罪出走入齊齊王因受而相之居二年而覺齊王大怒車裂蘇秦於市夫以詐偽之蘇秦而欲經營天下混一諸侯其不可成亦明矣今秦與楚接境壤界固形親之國也大王誠能聼臣臣請使秦太子入質於楚楚太子入質於秦請以秦女為大王箕箒之妾效萬室之都以為湯沐之邑長為昆弟之國終身無相攻伐臣以為計無便於此者於是楚王已得張儀而重出黔中地與秦欲許之屈原曰前大王見欺於張儀張儀至臣以為大王烹之今縱弗忍殺之又聼其邪說不可懐王曰許儀而得黔中羙利也後而倍之不可故卒許張儀與秦親張儀去楚因遂之韓說韓王曰韓地險惡山居五穀所生非菽而麥民之食大抵飯菽藿羮一歲不收民不饜糟糠地不過九百里無二歲之食料大王之卒悉之不過三十萬而厮徒負養在其中矣除守徼亭障塞見卒不過二十萬而已矣秦帶甲百餘萬車千乘騎萬匹虎賁之士跿跔跿跔跳躍也又云偏舉一足曰跿跔科頭謂不著兠鍪入敵貫頥奮戰者至不可勝計言執㦸奮怒而入陣也秦馬之良戎兵之衆探前趹後蹄間三尋騰者不可勝數山東之士被甲䝉胄以㑹戰秦人捐甲徒裼以趨敵左挈人頭右挾生虜夫秦卒與山東之卒猶孟賁之與怯夫以重力相壓猶烏獲之與嬰兒夫戰孟賁烏獲之士以攻不服之弱國無異埀千鈞之重於鳥卵之上必無幸矣夫羣臣諸侯不料地之寡而聼從人之甘言好辭比周以相飾也皆奮曰聼吾計可以彊覇天下夫不顧社稷之長利而聼須臾之說詿誤人主無過此者大王不事秦秦下甲據宜陽斷韓之上地東取成臯滎陽則鴻臺之宫桑林之苑桑一作栗非王之有也夫塞成臯絶上地則王之國分矣先事秦則安不事秦則危夫造禍而求其福報計淺而怨深逆秦而順楚雖欲毋亡不可得也故為大王計莫如為秦秦之所欲莫如弱楚而能弱楚者莫如韓非以韓能彊於楚也其地勢然也今王西面而事秦以攻楚秦王必喜夫攻楚以利其地轉禍而說秦計無便於此者韓王聼儀計張儀歸報秦惠王封儀五邑號曰武信君使張儀東說齊湣王曰天下彊國無過齊者大臣父兄殷衆富樂然而為大王計者皆為一時之說不顧百世之利從人說大王者必曰齊西有彊趙南有韓與梁齊負海之國也地廣民衆兵彊士勇雖有百秦將無奈齊何大王賢其說而不計其實夫從人朋黨比周莫不以從為可臣聞之齊與魯三戰而魯三勝國以危亡隨其後雖有戰勝之名而有亡國之實是何也齊大而魯小也今秦之與齊也猶齊之與魯也秦趙戰於河漳之上再戰而趙再勝秦戰於畨吾之下再戰又勝秦四戰之後趙之亡卒數十萬邯鄲僅存雖有戰勝之名而國已破矣是何也秦彊而趙弱也今秦楚嫁女娶婦為昆弟之國韓獻宜陽梁效河外趙入朝澠池割河間以事秦王不事秦秦驅韓梁以攻齊之南地悉趙兵渉清河指博關臨淄即墨非王之有也國一日見攻雖欲事秦不可得也是故願大王熟計之也齊王曰齊僻陋隱居東海之上未嘗聞社稷之長利也乃許張儀張儀西去說趙王曰敝邑秦王使使臣效愚計於大王大王收率天下以賓秦秦兵不敢出凾谷關十五年大王之威行於山東敝邑恐懼懾伏繕甲厲兵飭車騎習馳射力田積粟守四封之内愁居懾處不敢動揺惟大王有意督過之也今以大王之力舉巴蜀并漢中包兩周遷九鼎守白馬之津秦雖僻逺然而心忿含怒之日乆矣今秦有敝甲凋兵軍於澠池願渡河踰漳據畨吾㑹邯鄲之下願以甲子合戰以正殷紂之事敬使使臣先聞左右凡大王之所信為從者恃蘇秦蘇秦熒惑諸侯以是為非以非為是欲反齊國而自令車裂於市夫以天下之不可一亦明矣今楚與秦為昆弟之國而韓梁稱為東藩之臣齊獻魚鹽之地此斷趙之右臂也夫㫁右臂而與人鬭失其黨而孤居求欲毋危豈可得乎今秦發三將軍其一軍塞午道告齊使興師渡清河軍於邯鄲之東一軍軍成臯驅韓梁軍於河外一軍軍於澠池約四國為一以攻趙趙服必四分其地是故不敢匿意隱情先以聞於左右臣竊為大王計莫如與秦王遇於澠池靣相見而口相結請案兵無攻願大王之定計趙王曰先王之時奉陽君專權擅勢蔽欺先王獨擅綰事寡人居屬師傅不與國謀計先王棄羣臣寡人年㓜奉祭祀之日新心固竊疑焉以為一從不事秦非國之長利也乃且願變心易慮割地謝前過以事秦方將約車趨行適聞使者之眀詔趙王許張儀張儀乃去北之燕說燕昭王曰大王之所親莫如趙昔趙襄子嘗以其姊為代王妻欲并代約與代王遇于句注之塞乃令工人作為金斗長其尾令可以擊人與代王飲隂告厨人曰即酒酣樂進熱啜反斗以擊之於是酒酣樂進熱啜厨人進斟因反斗以擊代王殺之王腦塗地其姊聞之因摩筓以自刺故至今有摩筓之山代王之亡天下莫不聞夫趙王之狼戾無親大王之所明見且以趙王為可親乎趙興兵攻燕再圍燕都而劫大王大王割十城以謝今趙王已入朝澠池效河間以事秦今大王不事秦秦下甲雲中九原驅趙而攻燕則易水長城非大王之有也且今時趙之於秦猶郡縣也不敢妄舉師以攻伐今王事秦秦王必喜趙不敢妄動是西有彊秦之援而南無齊趙之患是故願大王熟計之燕王曰寡人蠻夷僻處雖大男子裁如嬰兒言不足以采正計今上客幸教之請西面而事秦獻恒山之尾五城燕王聼張儀儀歸未至咸陽而秦惠王卒武王立武王自為太子時不說張儀及即位羣臣多讒張儀曰無信左右賣國以取容秦必復用之恐為天下笑諸侯聞張儀有郤武王皆畔復合從秦武王元年羣臣日夜惡張儀未已而齊讓又至張儀懼誅乃因謂秦武王曰儀有愚計願效之王曰奈何對曰為秦社稷計者東方有大變然後王可以多割得地也今聞齊王甚憎儀儀之所在必興師伐之故儀願乞其不肖之身之梁齊必興師而伐梁齊之兵連於城下而不能相去王以其間伐韓入三川出兵凾谷而無伐以臨周祭器必出挾天子案圗籍此王業也秦王以為然乃具革車三十乗入儀之梁齊果興師伐之梁哀王恐張儀曰王勿患也請令罷齊兵乃使其舍人馮善之楚借使之齊謂齊王曰王甚憎張儀雖然亦厚矣王之託儀於秦也齊王曰寡人憎儀儀之所在必興師伐之何以託儀對曰是乃王之託儀也夫儀之出也固與秦王約曰為王計者東方有大變然後王可以多割得地今齊王甚憎儀儀之所在必興師伐之故儀願乞其不肖之身之梁齊必興師伐之齊梁之兵連於城下而不能相去王以其間伐韓入三川出兵凾谷而無伐以臨周祭器必出挾天子案圗籍此王業也秦王以為然故具革車三十乗而入之梁也今儀入梁王果伐之是王内罷國而外伐與國廣隣敵以内自臨而信儀於秦王也此臣之所謂託儀也齊王曰善乃使解兵張儀相魏一歳卒於魏唐且魏人秦魏為與國齊楚約而欲攻之魏王使人求救於秦冠盖相望秦救不出且年九十餘謂魏王曰老臣請西說秦令兵先臣出可乎魏王曰敬諾遂約車而遣之且見秦王秦王曰丈人㒺然乃逺至此甚苦矣魏來求救數矣寡人知魏人之急矣唐且答曰大王已知魏之急而救不至者是大王籌筴之臣失之也且夫魏一萬乗之國稱東藩受冠帶祠春秋者為秦之彊足以為與也今齊楚之兵已在魏郊矣大王之救不至魏急則且割地而納楚王雖欲救之豈有及哉是亡一萬乗之魏而彊二敵之齊楚也竊以為大王籌筴之臣失之矣秦王戄然而悟遽發兵救之馳騖而徃齊楚聞之引兵而去魏氏復故唐且一說定彊秦之筴解魏國之患散齊楚之兵一舉而折衝消難辭之功也孔子曰言語宰我子貢故詩曰辭之輯矣民之洽矣辭之懌矣民之莫矣唐且有辭魏國頼之故辭不可以已犀首者魏之隂晉人犀首魏官名若今虎牙將軍名衍姓公孫氏與張儀不善張儀為秦之魏魏王相張儀犀首弗利故令人謂韓公叔曰張儀已合秦魏矣其言曰魏攻南陽秦攻三川魏王所以貴張子者欲得韓地也且韓之南陽已舉矣子何不少委焉以為衍功則秦魏之交可錯矣然則魏必圗秦而棄儀收韓而相衍公叔以為便因委之犀首以為功果相魏陳軫者游說之士與張儀俱事秦惠王惠王終相張儀而陳軫奔楚楚未之重也而使陳軫使於秦過梁欲見犀首犀首謝弗見軫曰吾為事來公不見軫軫將行不得待異日犀首見之陳軫曰公何好飲也犀首曰無事也曰吾請令公饜事可乎曰奈何曰田需約諸侯從親楚王疑之未信也公謂於王曰臣與燕趙之王有故數使人來曰無事何不相見願謁行於王王雖許公公請毋多車以車三十乗可陳之於庭明言之燕趙燕趙客聞之馳車告其王使人迎犀首楚王聞之大怒曰田需與寡人約而犀首之燕趙是欺我也怒而不聼其事齊聞犀首之北使人以事委焉犀首遂行三國相事皆㫁於犀首軫遂至秦韓魏相攻朞年不解秦惠王欲救之問於左右左右或曰救之便或曰勿救便惠王未能為之决陳軫適至秦惠王曰子去寡人之楚亦思寡人不陳軫對曰王聞夫越人莊舄乎王曰不聞曰越人莊舄仕楚執珪有頃而病楚王曰舄故越之鄙細人也今仕楚執珪貴富矣亦思越不中謝對曰凡人之思故在其病也彼思越則越聲不思越則楚聲使人徃聼之猶尚越聲也今臣雖棄逐之楚豈能無秦聲哉惠王曰善今韓魏相攻朞年不解或謂寡人救之便或曰勿救便寡人不能决願子為子主計之餘為寡人計之陳軫對曰亦嘗有以夫卞莊子刺虎聞於王者乎莊子欲刺虎館竪子止之曰兩虎方且食牛食甘必争争則必鬬鬬則大者傷小者死從傷而刺之一舉必有䨇虎之名卞莊子以為然立須之有頃兩虎果闘大者傷小者死莊子從傷者而刺之一舉果有䨇虎之功今韓魏相攻期年不解是必大國傷小國亡從傷而伐之一舉必有兩實此猶莊子刺虎之類也臣主與王何異也惠王曰善卒弗救大國果傷小國亡秦興兵而伐大尅之此陳軫之計也楚使柱國昭陽將兵而攻魏破之於襄陵得八邑又移兵而攻齊齊王患之懐王六年昭陽移和而攻齊軍門曰和陳軫適為秦使齊齊王曰為之奈何陳軫曰王勿憂請令罷之即徃見昭陽軍中曰願聞楚國之法破軍殺將者何以貴之昭陽曰其官為上柱國封上爵執珪陳軫曰其有貴於此者乎昭陽曰惟令尹耳陳軫曰今君已為令尹矣此國官之上臣請得譬之人有遺其舍人一巵酒者舍人相謂曰數人飲此不足以徧請遂畫地為蛇蛇先成者獨飲之一人曰吾蛇先成舉酒而起曰吾能為之足及其為之足而後成人奪之酒而飲之曰蛇固無足今為之足是非蛇也今君相楚而攻魏破軍殺將功莫大焉官之上不可以加矣今又移兵而攻齊攻齊勝之官爵不加於此攻之不勝身死爵奪有毁於楚此為蛇為足之說也不若引兵而去以徳齊此持滿之術也昭陽曰善引兵而去其後秦伐魏軫合三晉而東謂齊王曰古之王者之伐也欲以正天下而立功名以為後世也今齊楚燕趙韓梁六國之逓其伐也不足以立功名適足以彊秦而自弱也非山東之上計也能危山東者彊秦也不憂彊秦而逓相罷弱而兩歸其國於秦此臣之所以為山東之患天下為秦相割秦曾不出力天下為秦相烹秦曾不出薪何秦之智而山東之愚耶願大王之察也古之五帝三王五覇之伐也伐不道者今秦之伐天下不然必欲反之主必死辱民必死虜今韓梁之目未嘗乾而齊民獨不也非齊親而韓梁䟽也齊逺秦而韓梁近今齊將近矣今秦欲攻梁絳安邑秦得絳安邑以東下河必表裏河山而東攻齊舉齊屬之海南面而孤楚韓梁北向而孤燕趙齊無所出其計矣願大王熟慮之今三晉已合矣復為兄弟約而出銳師以戍梁絳安邑此萬世之計也齊非急以銳師合三晉必有後憂三晉合秦必不敢攻梁必南攻楚楚秦搆難三晉怒齊不與已也必東攻齊此臣之所謂齊必有大憂不如急以兵合於三晉齊王敬諾果以兵合於三晉游騰為楚王客秦武王既立使樗里子以車百乗入周周以卒迎之意甚敬楚王怒讓周以其重秦騰為周說楚王曰智伯之伐仇猶仇猶夷狄之國遺之廣車廣車横陣之車因隨之以兵仇猶遂亡何則無備故也齊桓公伐蔡號曰誅楚其實襲蔡今秦虎狼之國使樗里子以車百乗入周周以仇猶蔡觀焉故使長㦸居前彊弩在後名曰衞疾而實囚之且夫周豈能無憂其社稷哉恐一旦亡國以憂大王楚王乃說胡衍不知何許人秦昭王元年樗里子將伐蒲蒲守恐請衍衍為蒲謂樗里子曰公之攻蒲為秦乎為魏乎為魏則善矣為秦則不為頼矣頼利也夫衛之所以為衛者以蒲也今伐蒲入於魏衛必折而從之魏亡河西之外而無以取者兵弱也今并衛於魏魏必彊魏彊之日西河之外必危矣且秦王將觀公之事害秦而利魏王必罪公樗里子曰奈何胡衍曰公釋蒲勿攻臣試為公入言之以徳衞君樗里子曰善胡衍入蒲謂其守曰樗里子知蒲之病矣其言曰必㧞蒲衍能令釋蒲勿攻蒲守恐因再拜曰願以請因効金三百斤曰秦兵茍退請必言子於衛君使子為南面故胡衍受金於蒲以自貴於衞於是遂解蒲而去惠盎宋人以客見宋康王康王蹀足聲速疾言曰寡人之所說者勇有力也不說為仁義者客將何以教寡人盎曰臣有道於此此謂勇冇力也使人雖勇刺之不入雖力擊之不中大王獨無意耶宋王曰善此寡人之所欲聞也盎曰夫刺之不入擊之不中此猶辱也臣有道於此使人雖有勇不敢刺雖有力不敢擊夫不敢非無其志也臣有道於此使人本無其志也夫無其志也未有愛利之心也臣有道於此使天下丈夫女子莫不驩然皆欲愛利之此其賢於勇有力也四累之土也大王獨無意耶宋王曰此寡人之所欲也盎曰孔墨是已孔丘墨翟無地為君無官為長天下丈夫女子莫不延頸舉踵而願安利之今大王萬乗之主也誠有其志則四境之内皆得其利矣其賢於孔墨也逺矣宋王無以應盎趨而出宋王謂左右曰辯矣客之以說服寡人也册府元龜卷八百八十七
