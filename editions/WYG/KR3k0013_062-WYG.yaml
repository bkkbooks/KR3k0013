body:
  text: 册府元龜卷六十二宋王欽若等撰帝王部發號令第一易姤之象曰后以施命告四方書曰令出惟行盖夫誥誓之文自三王而始作者矣若夫履至尊之重司生人之命固必講求治道疇咨政典稽合謨訓懋建皇極使命令之出若流水之順化導所及類随風之偃其或因事立制乗時創法防禁之設以謹乎踰矩約束之行以昭乎垂範明懸賞格以速於夷兇申嚴憲度以臻於敦俗自非較若畫一簡而易從理契於物宜事式於古訓垂可久而靡忒示必信而不愆亦何以厭伏乎羣心渙汗乎大號者也商成湯既黜夏命出其王命還亳作湯誥維三月王至自東郊告諸侯羣后無不有功於民勤力廼事予廼大罰殛女毋予怨曰古禹臯陶久勞於外其有功於民民乃有安東為江北為濟西為河南為淮四瀆已偹萬民乃有居后稷降播農殖百榖三公咸有功於民故後有立一作工昔蚩尤與其大夫作亂百姓帝力弗予音與有状先王言不可不勉曰不道毋之一作政在國女毋我怨以令諸侯周成王歸自奄伐奄歸在宗周誥庻邦誥以禍福作多方衆方天下諸侯惟五月丁亥王来自奄至於宗周周公歸政之明年淮夷奄又叛魯征淮夷作費誓王親征奄滅其國五月還至鎬京周公曰王若曰猷告爾四國多方周公以王命順大道告四方稱周公以别王自告惟爾殷侯尹民我惟大降爾命爾㒺不知殷之諸侯正民者我天下汝命謂誅紂也言天下無不知紂暴虐以取亡洪惟圖天之命弗永寅念於祀惟帝降格於夏大惟為王謀之命不長敬念于祭杞謂夏桀惟天下至戒於夏以譴告之謂灾異有夏誕厥逸不肻慼言於民有夏桀不畏天戒而大其逸豫不􅈕憂言於民無憂民之言乃大淫昏不克終日勸於帝之迪言桀乃大為過昏之行不能終日勸於天之道乃爾攸聞言桀之惡乃汝所聞厥圖帝之命不克開於民之麗桀其謀天之命不能開于民所施政教䴡施也言昏昧乃大降罰崇亂有夏因甲於内亂桀乃大下罰於民重亂有夏言殘虐外不憂民内不勤徳因甲於内亂内之言昏甚不克靈承於旅罔丕惟進之恭洪舒於民言桀不能奉善於人衆無大惟進恭徳大舒惰於治民亦惟有夏之民叨懫日欽劓割夏邑桀洪舒於民政亦惟有夏之民貪叨忿懫而逆命於是桀日尊敬其能劓割夏邑者謂殘賊臣天惟時求民主乃大降顯休命于成湯天惟時桀惡改更求民主以代之正大明羙之命於成湯使王天下刑殄有夏惟天不畀純命湯刑絶冇夏惟天不與桀亦已大乃惟以爾多方之義民不克永於多享天所以不與桀以其乃惟用汝多方之義民為臣而不能長久多享國故惟夏之恭多士大不克明保享於民惟桀之所謂恭人衆士大不克明安享於民言亂王所任任同己者乃胥惟虐於民至於百為大不克開桀之衆士乃相與惟暴虐于民至于百端所為言虐非一大不能閽民以善言于桀合志乃惟成湯克以爾多方簡代夏作民主乃惟成湯能用汝衆方之賢大代夏政為天下民主慎厥麗乃勸厥民刑用勸湯慎其施政於民民乃勸善其人雖刑亦用勸善言政刑清以至於帝乙㒺不明徳慎罰亦克用勸言自湯至于帝乙皆成其王道畏慎輔相無不明有徳慎去刑罰亦能勸善要囚殄戮多罪亦克用勸開釋無辜亦克用勸帝乙巳上要察囚情絶戮衆罪亦能勸善開于無罪之人必無枉縱亦能用勸善今至於爾辟弗克以爾多方享天之命今至于汝君謂紂不能用汝衆方享天之命故誅滅之嗚呼王若曰誥告爾多方非天庸釋有夏歎而順其事以告汝多方非天用釋棄桀桀縱惡自棄故誅放非天庸釋有殷乃惟爾辟以爾多方大淫圖天之命屑有辭非天用棄有殷乃惟汝君紂用汝衆方大為過惡者共謀天之命惡事盡有辭説布在天下故見誅滅乃惟有夏圖厥政不集於享天降時䘮有邦間之夏説桀也言桀謀其政不成於享故天下是䘮亡以禍之使天下有國聖人代之言有國明皇天無親佑有徳乃惟爾商後王逸厥逸後王紂逸豫其過逸言縱恣無度圖厥政不蠲烝天惟降時䘮紂謀其政不潔進於善故天惟下是䘮亡謂誅滅惟聖罔念作狂惟狂克念作聖惟善人無念於善則為狂人惟狂人能念於善則為聖人言桀紂非實狂愚以不念善故滅亡天惟五年須暇之子孫誕作民主罔可念聴天以湯故五年須暇湯之子孫兾其改悔而紂大為民上肆行無道事無可念言無可聴武王服䘮三年還師二年天惟求爾多方大動以威開厥顧天天惟求汝衆方之賢大動紂以威開其能顧天可以代者惟爾多方罔堪顧之惟我周王靈承於旅惟汝衆方之中無堪顧天之道者惟我周王善奉於衆言以仁政得人心克堪用徳惟典神天言周文武能堪用徳惟可以主神天之祀任天王天惟式教我用休簡畀殷命尹爾多方天以我周徳之故惟教我用羙道伐殷大與我殷之王命以正汝衆方之諸侯今我曷敢多誥我惟大降爾四國民命今我何敢多誥汝而已我惟大下汝四國民命用誅管蔡商奄之君爾曷不忱裕之于爾多方汝曷不以誠信行寛裕之道於汝衆方欲其戒四國崇和協爾曷不夾介乂我周王享天之命夾近也汝何不近大見治於我周王以享天之命而為不安乎今爾尚宅爾宅畋爾田爾曷不恵王熙天之命今汝殷之諸侯皆尚得居汝常宅君臣民皆尚得畋汝故田汝何不順從王政廣天之命而自懐疑爾乃廸屢不静爾心未愛汝所蹈行數為不安汝心未爱我周故爾乃不大宅天命爾乃屑播天命汝乃不大居安天命是汝乃盡播棄天命爾乃自作不典圖忱於正汝未爱我周播棄天命是汝乃自為不常謀信于正道我惟時其教告之我惟時其戰要囚之我惟汝如是不謀信於正道故其告教之謂許以文誥其戰要囚之謂討其倡亂執其朋黨至於再至於三再謂三監淮夷叛時三謂成王即政又叛言廸屢不静之事乃有不用我降爾命我乃其大罰殛之我誥教戰要囚汝已至再三汝其有不用我命我乃大下誅汝君乃其大罰誅之非我有周秉徳不康寕乃惟爾自速辜非我有周執徳不安寕自誅汝乃惟汝自召罪以取誅王曰嗚呼猷告爾有方多士暨殷多士王歎而以道告汝衆方與殷多士今爾奔走臣我監五祀監謂成周之監此指謂所遷頑民殷衆士今汝奔走来從臣我我監五年無過則得還本土越惟有胥伯小大多正爾罔不克臬於惟有相長事小大衆正官之人汝無不能用法欲其皆用法自作不和爾惟和哉爾室不睦爾惟和哉爾邑克明爾惟克勤乃事小大多正自為不和汝有方多士當和之哉汝親近室家不睦汝亦當和之哉汝邑中能明是汝惟能勤汝職事爾尚不忌於㐫徳亦則以穆穆在乃位汝庻幾不自忌入於㐫徳亦則用敬敬常在汝位克閲於乃邑謀介爾乃自時洛邑尚永力畋爾田汝能使我閲其於汝邑而以汝所謀為大則汝乃用是洛邑庻幾長力畋女田矣言雖遷徙而以脩善得反邑里矣天惟畀矜爾我有周惟其大介賚爾汝能脩善天惟與汝憐汝我有周惟共大賜汝言受多福之祚廸簡在王庭尚爾事有服在大僚非但受憐賜又乃蹈大道在王庭庻幾脩汝事有所服行在大官王曰嗚呼多士爾不克勸忱我命爾亦則惟不克享凡民惟曰不享王歎而言曰衆士汝不能勸信我命汝亦則惟不能享天祚矣凡民亦惟曰不享於汝祚矣爾乃惟逸惟頗大逺王命則惟爾多方探天之威我則致天之罰離逖爾土若爾乃惟逸豫頗僻大棄王命則惟汝衆方取天之威我則致行天罰離逺汝土将逺徙之王曰我不惟多誥我惟祗告爾命我不惟多誥汝而已我惟敬告汝吉㐫之命又曰時惟爾初不克敬於和則無我怨又誥汝是惟汝初不能敬於和道故誅汝汝無我怨觧所以再三加誅之意康王既尸天子尸主也主天下之正號遂誥諸侯作康王之誥既受顧命羣臣陳戒遂報告之因是曰遂康王之誥求諸侯之見輔弼也王出在應門之内出畢門立應門内之中庭南面太保率西方諸侯入應門左畢公率東方諸侯入應門右二公為二伯各率其所掌諸侯随其方為位皆北面皆布乗黄朱諸侯皆陳四黄馬朱􅀈以為庭實賔稱奉圭兼幣曰一二臣衛敢執壌奠賔諸侯也舉奉圭兼幣之辭言一二見非一也為藩衛故曰臣衛来朝而遇䘮遂因見新王敢執壌地所出而奠贄也皆再拜稽首王義嗣德答拜諸侯拜送幣而首至地盡禮也康王以義繼先人明徳答其拜受其幣太保暨芮伯咸進相揖皆再拜稽首冡宰與司徒皆共羣臣諸侯兼進陳戒不言諸侯以内見外曰敢敬告天子皇天改大邦殷之命大天改大國殷之王命謂誅紂也惟周文武誕受羑若克恤西土言文武大受道而順之能爱我西土之民本其所起惟新陟王畢協賞罰戡定厥功用敷遺後人休惟周家新升王位當盡和天下賞罰能㝎其功用布遺後人之羙言施及子孫無窮今王敬之哉敬天道務崇先人之羙張皇六師無壊我髙祖寡命言當張大六師之衆無壊我髙徳之祖寡有之教命王若曰庻邦侯甸男衛順其戒而告之不言羣臣以内見外惟予一人釗報誥報其戒昔君文武丕平富不務咎言先君文武道大政化平羙不務咎惡底至齊信用昭明於天下致行至忠信之道明顯明於天下言聖徳洽則亦有熊羆之士不二心之臣保乂王家言文武既聖則亦有勇猛如熊羆之士忠一不二心之臣共安治王家用端命於上帝皇天用訓厥道付畀四方君聖臣良用端直之命於上天天大用訓其道付與四方之國王天下乃命建侯樹屏在我後之人言文武乃施政令立諸侯樹以為藩屏𫝊王業在我後之人謂子孫今予一二伯父尚胥暨顧綏爾先公之臣服於先王天子稱同姓諸侯曰伯父言今我一二伯父庻幾相與顧念文武之道安汝先公之臣服於先王而法循之雖爾身在外乃心罔不在王室言雖汝身在外土為諸侯汝心常當忠篤無不在王室熊羆之士勵朝臣此督諸侯用奉恤厥若無遺鞠子羞各當用心奉憂其所行順道無自荒怠遺我稚子之羞辱稚子康王自謂也羣公既皆聴命相揖趨出已聴誥命趨出罷退諸侯歸國朝臣就次王釋冕反䘮服脱去黼冕反服䘮服居倚廬漢髙祖二年使諸将畧地㧞隴西以萬人若一郡䧏者封萬户若者豫及之辭言以萬人或以一郡䧏者皆封萬户六年令天下縣邑城皇后公主所食田邑令各築其城也縣之與邑皆令築城十一年冬以代相國陳豨反帝親征之詔諸縣堅守不降反寇者復租三嵗十二年二月詔曰吾立為天子帝有天下十二年於今矣與天下之豪士賢大夫共定天下同安輯之其有功者上致之王次為列侯下乃食邑而重臣之親或為列侯皆令自置吏得賦歛女子公主為列侯食邑者皆佩之印賜大第室吏二千石徙之長安受小第室入蜀漢定三秦者皆世世復吾於天下賢士功臣可謂亡負矣其有不義背天子擅起兵者與天下共伐誅之布告天下使明知朕意文帝七年十月令列侯太夫人諸侯王子及吏二千石無得擅徵捕列侯之妻稱夫人列侯死子後為列侯乃得稱太夫人子不為列侯不得稱也景帝後二年十月省徹侯之國文帝遣列侯之國今省之省音所領反武帝天漢二年十一月詔關内都尉曰今豪傑雖逺交依東方羣盗其謹察出入者征和二年戾太子反帝在甘泉賜丞相璽書曰捕斬反者自有賞罰以牛車為櫓櫓楯也逺與敵戰故以車馬櫓用自蔽也一説櫓望敵之樓也毋接短兵多殺傷士衆用短兵則士衆多死傷堅閉城門毋令反者得出宣帝本始四年四月郡國地震或山摧詔律令有可蠲除以安百姓條奏五鳳二年八月詔曰夫婚姻之禮人倫之大者也酒食所以行禮樂也今郡國二千石或擅為苛禁民嫁娶不得具酒食相賀召由是廢鄉黨之禮令民亡所樂非所以導民也詩不云乎民之失徳乾餱以愆小雅伐木之詩也餱食也愆過也言人無恩徳不相飲食則闕乾餱之事為過惡也乾音干餱音侯勿行苛政成帝陽朔二年春寒詔曰昔在帝堯立羲和之官羲氏和氏世掌天地之官命以四時之事令不失其序故書云黎民於蕃時雍黎衆也時是也雍和也言衆民於是變化用是大和蕃多也尚書作變而此紀作蕃兩説並通蕃音扶元反明以隂陽為本也今公卿大夫或不信隂陽薄而小之謂為輕小之事也所奏請多違時政時政月令也𫝊以不知周行天下言逓相因循以所不知之事施設教令周徧天下而欲望隂陽和調豈不謬哉其務順四時月令永始四年六月詔曰聖王明禮制序尊卑異車服以章有徳雖有其財而無其尊不得踰制故民興行上義而下利以義為上以利為下方今世俗奢僣罔極罔無也極中也靡有厭足公卿列侯親属近臣四方所則則法也未聞脩身遵禮同心憂國者也或乃奢侈逸豫務廣第宅興治園池多畜奴婢被服綺縠被皮義切設鐘鼔備女樂車服嫁娶𦵏埋過制吏民慕效寖以成俗寖漸也而欲望百姓儉節家給人足豈不難哉詩不云乎赫赫師尹民具爾瞻小雅節南山之詩也赫赫盛貌也師尹尹氏為大師之官也言居位盛髙備為衆庻所瞻仰其申勅有司以漸禁之謂約束也青緑民所常服且勿止然則禁紅紫之属列位近臣各自省改省視也視而改之論語稱曾子曰吾日三省吾身司𨽻校尉察不變者哀帝綏和三年四月即位六月詔郡國察吏殘賊酷虐者以時退有司無得舉赦前徃事博士弟子父母死與寕三年寕與處家䘮後漢光武建武六年六月詔曰夫張官置吏所以為人也今百姓遭難户口耗少而縣官吏職所置尚繁其令司𨽻州牧各實所部省减吏貟縣國不足置長吏可并合者并必政切上大司徒大司馬二府於是條奏并省四百餘縣吏職减損十置其一七年正月詔曰世以厚𦵏為徳薄終為鄙至於富者奢僣貧者單財單盡也法令不能禁禮義不能止倉卒乃知其咎倉卒謂䘮亂也謂厚𦵏者皆被發掘故乃知其咎咎惡也其布告天下令知忠臣孝子慈兄悌弟薄𦵏送終之義明帝永平十二年五月詔曰昔曽閔奉親竭歡致養仲尼𦵏子有棺無槨䘮貴致哀禮存寕儉今百姓送終之制競為奢靡生者無擔石之儲而財力盡於墳土伏臘無糟糠而牲牢兼於一奠糜破積世之業以供終朝之費子孫饑寒絶命於此豈祖考之意哉又車服制度恣極耳目田荒不耕逰食者衆游食謂浮食者有司具申明科禁宜於今者宣之郡國章帝建初七年九月幸偃師至河内下詔曰車駕行秋稼觀收穫因陟郡界皆精騎輕行無它輜重不得輙脩橋道逺離城郭遣吏逢迎刺探起居刺探謂候伺探音湯檻切出入前後以為煩擾動務省約但患不能脱粟瓢飲耳所過欲令貧弱有利無違詔書元和二年正月詔三公曰方春生養萬物莩甲宜助萌陽以育時物其令有司罪非殊死且勿案驗及吏人條書相告不得聴受兾以息事寕人敬奉天氣立秋如故夫俗吏矯飾外貎似是而非揆之人事則悦耳論之隂陽則傷化朕甚厭之甚苦之安静之吏悃愊無華日計不足月計有餘如㐮城令劉萬吏人同聲謂之不煩雖未有它異斯亦殆近之矣間勅二千石各尚寛明而今富姦行賂於下貪吏枉法於上使有罪不論而無過被刑甚大逆也夫以苛為察以刻為明以輕為徳以重為威四者或興則下有怨心吾詔書數下冠盖接道而吏不加理人或失職其咎安在勉思舊令稱朕意焉順帝永建二年二月詔以民入山鑿石發洩蔵氣勅有司簡察所當禁絶魏太祖為漢丞相建安八年五月令曰司馬法将軍死綏魏書云綏却也有前一尺無却一寸故趙括之母乞不坐括是古之将軍者破於外而家受罪於内也自命将征行但賞功而不罰罪非國典也其令諸将出征敗軍者抵罪失利者免官爵魏書載庚申令曰議者或以軍吏雖有功能徳行不足堪任郡國之選所謂可與適道未可與權管仲曰使賢者食于能則上鬬士食于功則率輕於死二者設子國則天下治未聞無能之人不鬭之士并受禄賞而可立功興國者也故明君不官無功之臣不賞不戰之士治平尚徳行有事賞功能昔之言一似管窺虎歟文帝黄初五年詔日近之不綏何逺之懐今事多而民少上下相弊以文法百姓無所措其手足昔泰山之哭者以為苛政甚於猛虎吾被儒者之風服聖人之遺教豈可以目翫其辭行違其誡者哉廣議輕刑以恵百姓明帝太和三年七月詔曰禮王后無嗣擇建支子以繼大宗則當纂正統而奉公義何得復顧私親哉漢宣繼昭帝後加悼考以皇號哀帝以外藩援立而董宏等稱引亡秦或誤時朝既尊恭皇立廟京都又寵藩妾使比長信叙昭穆於前殿並四位於東宫僣差無度人神弗佑而非罪師丹中正之諌用致丁傅焚如之禍自是之後相踵行之昔魯文逆祀罪繇夏父宋國非度譏在華元其令公卿有司深以前世行事為戒後嗣萬一有繇諸侯入奉大統則當明為人後之義敢為佞邪導諛時君妄建非正之統以干正統謂考為皇稱妣為后則股肱大臣誅之無赦其書之金策蔵之宗廟著於令典晉武帝太始元年十二月詔曰昔王凌謀廢齊王而王竟不足以守位鄧艾雖矜功失節然束手受罪今大赦其家還使立後興㓕繼絶約法省刑除魏氏宗室禁錮諸将吏遭三年䘮者遣寕終䘮百姓復其徭役罷部曲将長吏以下質任省郡國御調禁樂府靡麗百戲之伎及雕文㳺畋之具開直言路置諌官以掌之五年正月勅戒郡國計吏諸郡國守相令長務盡地利禁㳺食商販其休假者令與父兄同其勤勞豪勢不得侵役寡弱私相置名咸寕四年詔曰石獸碑表既私褒羙興長虗誕傷財害人莫大於此一禁斷之其犯者雖㑹赦令皆當毁壊恵帝永平元年正月詔子弟及羣官並不得謁陵元帝太興元年四月初禁招䰟𦵏成帝咸和八年正月令諸郡舉力人能舉千五百斤以上者安帝義熈元年五月禁絹扇及摴蒲後魏道武天興三年十二月詔曰世俗謂漢髙起於布衣而有天下此未達其故也夫劉承堯統曠世繼徳有蛇龍之徵致雲彩之應五緯上聚天人俱協明革命之主大運所鍾不可以非望求也然狂狡之徒所以顛蹶而不已者誠惑於逐鹿之説而迷於天命也故有踵覆車之軌蹈釁逆之蹤毒甚者傾州郡害㣲者敗邑里至乃身死名頽殃及九族縱亂随滅死而不悔豈不痛哉故春秋之義大一統吳楚僣號乆加誅絶君子賤其偽名比之塵垢自非繼聖載徳天人合㑹帝王之業夫豈虗應歴觀古今不義而求非望者徒䘮其保家之道而伏刀鋸之誅有國有家者誠能推興廢之有期保天命之不易察徵應之潜授杜競逐之邪言絶奸䧺之僣肆思多福於止足則幾於神智矣如此則可以保榮禄於天年流餘慶於後世夫然故禍悖無縁而生兵甲何因而起凡厥来世朂哉戒之可不慎歟時太史属奏天文錯亂帝親筮占多云改王易政故數革官號一欲防塞㓙狡二欲消災應變已而慮羣下疑惑心謗腹非丙申復詔曰上古之治尚徳下名有任而無爵易治而事序故邪謀閉而不起奸慝絶而不作周姬之末下凌上替以號自定以位制禄卿世其官大夫遂事陽徳不暢義發家倍故釁繇此起兵繇此作秦漢之弊捨徳崇侈能否混雜賢愚相亂庻官失序任非其人於是忠義之道寝廉耻之節廢退讓之風絶毁譽之議興莫不繇乎貴尚名位而禍敗及之矣古置三公職大憂重故曰待罪宰相将委任責成非虗寵禄也而今世俗僉以台輔為榮貴企慕而求之夫此職司在人主之所任耳用之所重舍之所輕所貴者至矣何取於鼎司之虛稱也夫桀紂之南面雖髙而不可薄姬之為下雖卑而不可尊一官可以效智華門可以垂範苟以道徳為實賢於覆餗蔀家矣故量已者令終而義全昧利者身陷而名滅利之與名毁譽之疵競道之與徳神識之家寳是故道義治之本名爵治之末名不本於道不可以為宜爵無補於門不可以為用用而不禁為病深矣能通其變不失其正者其唯聖人乎来者誠思成敗之理察治亂之繇鑒殷周之失革秦漢之弊則幾於治矣太武大延三年五月詔曰方今冦逆消殄天下漸晏比年以来屢詔有司班宣恵政與民寕息而内外羣官及牧守令長不能憂勤所司紀察非法廢公帶私更相隐置濁貨為官政存苟且夫法之不用自上犯之其令天下吏民得舉告守令不如法者太平真君五年正月詔曰自王公以下至於庻人私養沙門巫及金銀工巧之人在其家者皆遣詣官曺限今年二月十五日過期不出巫沙門身死主人門誅九年十月以婚姻奢靡䘮𦵏過度詔有司更為料限文成興光元年九月閉都城門大索三日獲姦人亡命數百人大安五年詔曰夫褒賞必於有功刑罰審於有罪此古今之所同繇来之常式牧守蒞民侵食百姓以營家業王賦不充雖嵗滿去職應計前逋正其刑罪而主者失於督察不加弹坐使有罪者優游獲免無罪者妄受其辜是啟姦邪之路長貪暴之心豈所謂原情處罪以正天下自今諸遷代者仰别在職殿最案制治罪克舉者加以爵寵有愆者肆之刑戮使能否殊異刑賞不差主者明為條制以為常楷和平四年十二月辛丑詔曰名位不同禮亦異數所以殊等級示軌儀今䘮𦵏嫁娶大禮未備貴勢豪富越度奢靡非所謂式昭典憲者有司為之條格使貴賤有章上下咸序著之於令壬寅詔夫婚姻者人之始是以夫婦之義三綱之首禮之重者莫過於斯尊卑髙下宜令區别然中世以来貴族之門多不率法或貪利財賄或因縁私好在於苟合無所擇選今貴賤不分巨細同貫塵穢清化虧損人倫将何以宣示典謀垂之来裔今制皇族師傅王公侯伯及士民之家不得與百工技巧卑姓為婚犯者加罪獻文天安元年七月辛亥詔諸有詐取爵位罪特原之削其爵職其有祖父假爵號貨求正名者不聽繼襲諸非勞進超遷者亦各還初不以實聞者以大不敬論皇興五年三月乙亥詔曰天安以来軍國多務南定徐方北掃遺虜征戍之人亡竄非一雖罪合刑書每加哀宥然寛政猶水逋逃遂多宜申明典刑以肅奸偽自今諸有逃亡之兵及下代守宰浮游不赴者限六月三十日悉聽歸首不首者論如律孝文延興二年詔沙門不得去寺浮游民間行者仰去聲以公文四年二月辛未禁斷寒食五年四月詔禁畜鷹鷂開相告之制六年禁殺牛馬太和二年五月詔婚聘過禮則嫁娶有失時之弊厚𦵏送終則生者有糜費之苦聖王知其如此故申之以禮數約之以法禁廼者民漸奢尚婚𦵏越軌致貧富相髙貴賤無别又皇族貴戚及士民之家不惟氏族下與非類婚耦先帝親發明詔為之科禁而百姓習常仍不肅改朕今憲章舊典祇案先制著之律令永為定准犯者以違制論三年詔曰治因教寛弊由網宻今侯職千數姦巧㺯威重罪受財不列細過吹毛而舉其一切罰之於是更置謹直者數百人以防諠鬭自是街術吏民安其職業七年正月詔曰朕每思知百姓之所疾苦以増脩寛政而明不燭逺寔有缺焉故見問守宰苛虐之状於州郡使者令秀孝計掾而對多不實甚乖朕虛求之意宜案以大辟明罔上必誅然情猶未忍可恕罪聴歸申下天下使知後犯無恕十九年正月帝伐齊至懸瓠詔禁淮北之民不得侵掠犯者以大辟論六年乙亥詔不得以北俗之語言於朝廷若有違者免所居官是年廣川王諧薨有司奏廣川王妃薨於代京未審以新尊從於卑舊為復以卑舊来就新尊詔曰遷雒之人自兹厥後恐可歸骸卭嶺皆不得就塋常代其有夫先𦵏在北婦今𦵏在南婦人從夫宜還代𦵏若欲移父就母亦得任之其妻墳在常代夫死於雒不得以尊就卑欲移母就父宜亦從之若異𦵏亦從之若不在𦵏限身在代䘮𦵏之彼此皆得任之其户属燕趙身官京雒去留之宜亦從所擇其属諸州者各得任意二十五年三月癸丑詔介山之邑聴為寒食自餘禁斷七月丁亥詔邪佞毁朝固惟治蠧貪夫竊位大政以虧主者弹劾不肖明黜資禄又曰輕徭薄賦君人常理嵗中常役具以状聞宣武景明四年十二月詔曰先朝制立軌式庻事唯允但嵗積人移物情乖惰比或擅有增損廢墜不行或守舊違宜時有妨舛或職分錯亂互相推委其下有司列其疑闕速以奏聞正始元年十月詔斷羣官白衣募吏永平二年四月詔曰聖人濟世随物汙隆或正或權理無常在先朝以雲駕甫遷嵩基始構河雒民庻徙舊未安代来新宅尚不能就伊闕西南郡蠻填聚沔陽賦城連邑作戍蠢爾愚巴心未純欵故暫抑造育之仁權受肅姦之法今京師天固與昔不同楊郢荆益皆為我有保嶮諸蠻罔不歸附商洛民情誠倍徃日唯樊襄已南仁乖道政被拘隔化非民之咎而無頼之徒輕相刧掠屠害良善離人父兄蕭衍為酷實亦深矣便可放彼掠民示其大恵捨此殘賊未令之愆并勑緣邉州鎮自今以後不聴境外冦盗犯者罪同境内若州鎮主将知容不紏坐之如律六月詔曰江海方同車書宜一諸州軌轍南北不等今可申勑四方使逺近無二四年五月詔禁天文之學延昌二年二月詔定奴良之制以景明為斷九月詔以貴族豪門崇習奢侈詔尚書嚴立限級節其流宕孝明熈平元年七月重申殺牛之禁二年十月詔曰北亰根舊帝業所基南遷二紀猶有留住懐本樂故未能自遣若未遷者悉可聴之仍停安堵永業門才術藝應於時求者自别徵引不在斯例周之子孫漢之劉族遍於海内咸致蕃衍豈拘南北千里而已哉神龜元年十二月詔曰民生有終下歸兆域亰邑隐賑口盈億萬貴賤攸憑未有定所為民父母尤宜存恤今制乾甫山以西擬為九原也正光五年八月詔曰賞貴宿勞明主常徳恩沾舊績哲后彛範太祖道武皇帝應期撥亂大造區夏世祖太武皇帝纉戎丕緒光闡王業躬率六師掃清逋穢諸州鎮城人本充牙爪服勤征旅契濶行間備嘗勞劇逮顯宗獻文皇帝自北被南淮海思韙便差割強族分衛方鎮髙祖孝文皇帝逺遵盤庚将遷嵩雒規遏北疆蕩闢南境選良家酋俯増戍􅃋陲戎捍所寄寔惟斯等先帝以其誠效既亮方加酬賜㑹宛郢馳烽胊泗告警軍旗頻動兵連積嵗兹恩仍寝用迄于今怨叛之興頗繇於此朕叨承乾歴撫馭宇宙調風布政思廣恵液宜追述前恩敷兹後施諸州鎮軍貫元非犯配者悉免為民鎮改為州依舊立稱此等世習干戈率多勁勇今既甄㧞應思報効可三五簡發討彼沙隴當使人齊其力奮擊先驅妖黨犯醜必可蕩滌衝鐸斬級自依常賞孝昌元年八月癸酉詔斷逺近貢獻珍麗違者免官十二月壬午詔曰髙祖以大明定功世宗以下武寕亂聲溢􅃋南化清中宇業盛隆周祚延七百朕㓜齡纂歴夙馭鴻基戰戰兢兢若臨深淵闇於治道政刑未孚權臣擅命亂我朝式致使西秦䟦扈􅃋漠搆妖蠢爾荆蠻氛埃不息孔熾甚於涇陽出車切於細栁師旅盤桓留滯不進北淯懸危南陽告急将虧荆沔之地以致蹙國之憂今茅轂挹腕爪牙歎憤並欲摧挫封豕勦截長蛇使人神兩泰幽明獻吉朕将躬馭六師掃蕩逋穢其配依六軍分𨽻熊虎前驅後隊左翼右師必令将帥䧺果軍吏明齊糧仗車馬速度時須其有失律亡軍兵卒逃叛盗賊刼掠伏竄山澤者免其徃咎録其後効别立募格聴其自新廣下州郡令赴軍所先討荆蠻疆理南服戈旗東指掃平淮外然後奮七萃於西戎騰五牛於北狄躬撫亂離之苦面恤饑寒之患爾乃還蹕蒿宇飲至廟庭沉璧河雒告成泰岱豈不盛歟百官外内牧守軍宰宜各肅勤用明爾職孝荘建義元年六月己酉詔諸有私馬仗從戎者職人侵優兩大階亦授實官若武藝超倫者雖無私馬亦依前條雖不超倫但射槊超闢一藝而膽畧有施者依第出身外者優一大階一軍級實官若無姓第者從八品出身階依前加特授實官七月丁已詔從四品以上從征者不得優階正四品者優一軍級從三品以上從征者優一大階正五品已下還依前格若有正階十餘計入四品三品限授五階永安二年五月詔私馬仗從戎優階授官又詔職人及民出馬優階各有差八月庚戌􅃋詔諸有公私債負一錢以上巨萬以還悉皆禁斷不得徵責十一月詔羣官休停在外者皆令赴闕程㑹有差三年十月丁未詔募攻河橋格賞帛授官各有差前廢帝普泰元年四月詔有司不得復稱偽梁罷細作之條無禁鄰國還徃出帝大昌元年六月詔諸授建明普泰封爵况級優特之㫖悉追册府元龜卷六十二
