body:
  text: 册府元龜卷七十二宋王欽若等撰帝王部命相第二晉元帝建武元年二月以撫軍大將軍西陽王羕為太保太尉荀組為司徒時帝即晉王位欲以組為司徒問太常賀循循曰組舊望清重忠勤顯著遷訓五品實允衆望於是拜之十一月以司空劉琨為太尉太興四年七月以驃騎將軍王導為司空永昌元年十一月以司徒荀組為太尉明帝太寧三年閏八月遺詔以太宰西陽王羕司徒王導輔太子太子即成帝也成帝即位初以司徒王導錄尚書事與中書令庾亮參輔朝政咸和四年三月以征西大將軍陶侃為太尉車騎將軍郗鑒為司空咸康四年五月以司徒王導為太傅都督中外諸軍事司空郗鑒為太尉征西將軍庾亮為司空六月改司徒為丞相以太傅王導為之册曰朕夙罹不造肆陟帝位未堪多難禍亂旁興公文貫九功武經七徳外緝四海内齊八政天地以平人神以和業同伊尹道隆姬旦仰思唐虞登庸雋乂申命羣官允釐庶績朕思憑髙謀𢎞濟逺猷維稽古昔建爾于上公永為晉輔往踐厥職敬敷道訓以亮天工不亦休哉公其戒之五年八月復改丞相為司徒十二月以驃騎將軍瑯琊王岳為之六年正月以左光禄大夫陸玩為司空康帝即位諒陰不言委政于中書監庾冰建元元年十月以驃騎將軍何充為中書監揚州刺史錄尚書事輔政以禇裒為衛將軍領中書令穆帝永和二年二月以左光禄大夫蔡謨領司徒錄尚書六條事撫軍大將軍㑹稽王昱及謨並輔政八年七月以鎮軍大將軍武陵王晞為太宰撫軍大將軍㑹稽王昱為司徒征西大將軍桓温為太尉哀帝興寧元年五月加桓温侍中大司馬都督中外諸軍錄尚書事廢帝太和元年十月以㑹稽王昱為丞相簡文帝咸安元年十一月以大司馬桓温為丞相孝武帝太元元年正月以尚書僕射謝安為中書監錄尚書事二年八月以謝安為司徒五年六月以驃騎將軍瑯琊王道子為司徒六年十一月以鎮東大將軍郗愔為司空九年三月以衛將軍謝安為太保安帝即位初以司徒㑹稽王道子為太傅輔政元興二年十二月帝蒙塵于尋陽桓𤣥逼帝西上帝宻詔以幽逼於𤣥萬機虛曠令武陵王遵依舊典承制總百官行事加侍中大將軍義熈元年三月帝至自江陵以瑯琊王徳文為大司馬武陵王遵為太保鎮軍將軍劉裕為侍中車騎將軍揚州刺史錄尚書事十四年六月劉裕為相國封宋公恭帝元熈元年正月以驃騎將軍劉道憐為司空後魏道武皇始元年七月即位二年五月以東平公元儀為驃騎大將軍都督諸軍事左丞相天興元年四月以征虜將軍歴陽公穆崇為太尉安南將軍鉅鹿公長孫嵩為司徒五年十一月徵相州刺史庾岳為司空明元泰常七年四月以泰平王燾為相國加大將軍五月以燾輔政左丞相奚斤為左輔太尉穆觀為右弼紀傳奚斤拜右丞相觀拜太尉年月出則統輔朝政入則應對左右事無巨細皆闗决焉九月以奚斤為司空行揚州刺史太武始光二年三月以司徒北平王長孫嵩為太尉平陽王長孫翰為司徒宜城王奚斤為司空神䴥三年七月詔大鴻臚杜超為太宰行征南大將軍鎮鄴四年九月以左光禄大夫崔浩為司徒征西大將軍長孫道生為司空太延中以侍中盧魯元為太保錄尚書事太平真君五年正月皇太子始總百揆以侍中中書監穆夀司徒崔浩侍中張黎古弼輔政文成興安元年十月即位以驃騎大將軍元夀樂為太宰都督中外諸軍事錄尚書事十二月以樂陵王周忸為太尉平原王陸麗為司徒鎮西將軍杜元寳為司空興光元年正月以侍中伊馛為司空太安元年十月以遼西公常英為太宰獻文即位初以侍中車騎大將軍乙渾為太尉錄尚書事東安王劉尼為司徒尚書左僕射和其奴為司空又以乙渾為丞相居諸王上事無大小皆决於渾皇興元年閏正月以頓丘王李峻為太宰二年六月以昌黎王馮熈為太傅四年二月以東郡王陸定國為司空孝文延興三年四月假上黨王長孫觀司空討吐谷渾拾寅承明元年六月征西將軍安樂王長樂為太尉尚書左僕射南平公目辰為司徒南部尚書李訢為司空太和元年三月徵征西大將軍雍州刺史東陽王丕為司徒三年九月以侍中司徒東陽王丕為太尉侍中尚書右僕射陳建為司徒侍中尚書荀頽為司空九年十二月侍中淮南王他為司空十三年十二月以尚書令尉元為司徒左僕射穆亮為司空十五年十二月以安定王休為太傅齊郡王簡為太保十六年十月以特進馮誕為司徒十八年十月以太尉東陽王丕為太傅二十三年二月以長兼太尉咸陽王禧為正太尉中軍大將軍彭城王勰為司徒宣帝即位初以司徒彭城王勰總攝百揆以侍中北海王祥為司空公鎮南將軍王肅為尚書令廣陽王嘉為左僕射尚書宋弁為吏部尚書與侍中太尉公禧左僕射任城王澄等六人輔政景明元年二月復以彭城王勰為司徒十月改授勰司徒錄尚書事二年正月以太尉咸陽王禧為太保司空北海王詳為大將軍錄尚書事又以太保王禧領太尉大將軍廣陵王羽為司徒十一月以驃騎大將軍穆亮為司空大將軍北海王詳為太傅領司徒四年七月以彭城王勰為太師正始元年閏十二月以驃騎大將軍髙陽王雍為司空四年九月詔曰朕秉厯承天履年將紀徙正宫極嵗浹歸餘台懿茂親祗勤已乆列司英彦庸績未酬非所謂有功見知賞以時及其以司空髙陽王雍為太尉尚書令廣陽王嘉為司空永平二年十月以司空廣陽王嘉為司徒延昌元年正月以車騎大將軍尚書令髙肇為司徒光禄大夫清河王懌為司空二年二月太尉髙陽王雍進位太保孝眀延昌四年正月即位詔太保髙陽王雍入居西柏堂决庶政又詔任城王澄為尚書令百官總已以聼於二王臣欽若等曰孝明即位年六嵗委政於二王也二月太保髙陽王雍進位太傅領太尉司空清河王懌為司徒驃騎大將軍廣平王懐為司空七月司徒清河王懌進位太傅領太尉司空廣平王懐為太保領司徒驃騎大將軍任城王澄為司空十二月以髙陽王雍為太師熈平二年四月以中書監胡國珍為司徒公八月詔侍中太師髙陽王雍入居門下參决尚書奏事神龜二年五月以司空任城王澄為司徒驃騎大將軍京兆王繼為司空正光元年九月以太師髙陽王雍為丞相十月以驃騎大將軍汝南王悦為太尉公十二月以司空京兆王繼為司徒公二年三月以儀同劉騰為司空公四月司徒京兆王繼進位太保車騎大將軍崔光為司徒公三年十二月太保京兆王繼為太傅司徒崔光為太保四年九月詔侍中太尉安南王悦入居門下與丞相髙陽王雍參尚書奏事十二月以悦為太保五年十二月詔太傅京兆王繼為太師孝昌元年正月以太師京兆王繼為太尉二年正月以太保汝南王悦領太尉三年正月以司空公皇甫度為司徒儀同三司蕭寶寅為司空又以皇甫度為太尉孝莊建義元年四月即位以前太尉公江陽王繼為太師北海王顥為太傅光祿大夫李延寔為太保并州刺史元天穆為太尉公侍中楊椿為司徒公車騎大將軍穆紹為司空公領尚書令七月以大將軍爾朱榮為柱國大將軍錄尚書事永安元年九月以爾朱榮為大丞相都督河北諸軍事以司徒公楊椿為太保城陽王徽為司徒十月以爾朱榮為太師二年七月以大將軍上黨王天穆為太宰司徒公城陽王徽為大司馬太尉公閏七月以侍中太傅李延實為司徒十月以前司空公丹陽王蕭贊為司徒公十一月以司空公蕭贊為太尉公雍州刺史長孫稚為司徒公三年十一月以司徒公長孫稚為太尉公前廢帝普太元年三月詔太師青州刺史魯郡王肅還為太師車騎大將軍沛郡王欣清河王亶並太傅驃騎大將軍尚書令爾朱世隆為太保前太尉公長孫稚為司徒公錄尚書事稚固辭除驃騎大將軍以趙郡王諶為司空公四月以侍中驃騎大將軍爾朱彦伯為司徒公後廢帝中興元年十月即位以大將軍髙歡為侍中丞相都督中外諸軍事以兼侍中撫軍將軍髙乾邕為侍中司空公二年二月以丞相髙歡為大丞相柱國大將軍太師出帝太昌元年四月即位髙歡為大丞相大柱國大將軍太師世襲定州刺史五月以太傅淮陽王欣為太師司徒趙郡王諶為太保南陽王寶矩為太尉侍中太保錄尚書事長孫稚為太傅前司空髙乾邕復司空侍中清河王亶為司徒永熈二年二月以司空髙乾邕為驃騎大將軍以咸陽王坦為司空公三月以侍中太保趙郡王諶為太尉公侍中太尉公南陽王寶矩為太傅開府尚書令七月以太師廣陵王欣為大司馬侍中以太尉公趙郡王諶為太師以前司徒公燕郡王賀拔允為太尉公三年五月以大司馬侍中廣陵王欣為左軍大都督太傅錄尚書事西魏文帝大統元年正月以闗西大行臺宇文泰都督中外諸軍事大行臺錄尚書事十四年五月進泰為太師廢帝即位初以太師宇文泰為大冢宰總百揆恭帝三年正月行周禮建六官以宇文泰為太師大冢宰柱國李弼為太傅大司徒趙貴為太保大宗伯獨孤信為大司馬于謹為大司冦侯莫陳崇為大司空後周閔帝元年時不建年紀正月以大冢宰大司馬獨孤信為太保大宗伯中山公䕶為大司馬二月以大司空侯莫陳崇為太保大司馬晉國公䕶為大冡宰柱國賀蘭祥為大司馬髙陽公逹奚武為大司冦九月甲子明帝即天王位二年正月以大冡宰晉公䕶為太師髙祖武帝保定元年正月以太師大冡宰晉公䕶為都督中外諸軍令五府總於天官三年四月以柱國逹奚武為太保天和三年四月以太保逹奚武為太傅大司馬尉遅迴為太師建徳元年三月太師大冢宰晉公䕶誅以太傅尉遅迥為太師柱國竇熾為太傅大司空李穆為太保齊國公憲為大冢宰宣政元年二月大冢宰譙王儉薨以上柱國越王盛為大冢宰宣帝即位初以趙王招為太師陳王純為太傅大象元年正月初置四輔官以大冡宰越王盛為大前疑蜀國公尉遅迥為大右弼申國公李穆為大左輔隋國公楊堅為大後丞二月以大前疑越王盛為太保大右弼尉遅迥為大前疑代王逹為大右弼五月越王盛代王逹之國七月以大後丞楊堅為大前疑柱國司馬消難為大後丞八月以雍州牧畢王賢為太師上柱國韓建業為大左輔静帝即位初以漢王賛為右大丞相隋國公楊堅為左大丞相帝居諒闇百官總己以聼於左丞相又以漢王賛為太師并州總管李穆為太傅宋王實為大前疑秦王贄為大右弼燕國公寔為大左輔又去丞相左右之號以隋公楊堅為大丞相又以為大冢宰五府總於天官大定元年二月以大丞相楊堅為相國總百揆尋禪于隋髙祖文帝開皇元年二月即位以并州總管李穆為太師鄧國公竇熾為太傅幽州總管于翼為太尉相國司馬髙熲為尚書左僕射兼納言相國司録虞慶則為内史監相國内郎李徳林為内史令三月以太子少保蘇威為納言九年四月以晉王廣為太尉六月以荆州總管楊素為納言十年七月以納言楊素為内史令仁夀元年正月以晉王昭為内史令二年十月以工部尚書楊逹為納言煬帝大業二年六月以尚書令楊素為司徒三年九月以户部尚書楊文思為納言唐髙祖武徳元年五月即位六月以相國長史裴寂為尚書右僕射相國司馬劉文静為納言户部尚書蕭瑀相國司錄竇威並為内史令是年以將作大匠竇抗兼納言二年正月以黄門侍郎陳叔逹為納言十月以黄門侍郎楊恭仁為納言三年三月改納言為侍中内史令為中書令以内史侍郎封徳彜兼中書令六年四月詔曰端揆之職綜理百司任望斯重勲賢攸寄尚書左僕射魏國公寂風格淹粹局量𢎞雅早預經綸元功特著燮諧治本茂蹟以宣中書令宋國