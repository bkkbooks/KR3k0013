卿兼蜀郡長史持節劍南節度使度支營田等副大使本道兼山南西道採訪處置使兩京太府司農出納監倉祠祭木炭宫市長春九成宫使闗内道及京畿採訪處置使上柱國𢎞農縣開國伯楊國忠純粹精明懸觧虛受比之管樂文多體要之詞擬于邴魏武有韜鈐之學直方其道簡易成能往自星郎爰秉天憲軍國大政𢎞益滋多則造膝沃心已期王佐彌綸經濟同致雍熈况南臺冡宰尤思藻鑒西垣鼎座深佇燮和㑹予宿心升爾為相宜兼宻啟式總如綸可守右相兼吏部尚書集賢殿學士修國史崇𤣥館大學士太清太微宫使仍判度支及蜀郡大都督府長史劍南節度度支營田副大使本道兼山南西道採訪處置使兩京出納勾當租庸鑄錢等使並如故十三載八月以吏部侍郎韋見素為武部尚書同中書門下平章事十五載六月𤣥宗幸蜀次河池郡劍南留後司勲郎中崔圎奏西川嵗稔民安儲供無缺授圎中書侍郎同中書門下平章事七月至普安郡憲部侍郎房琯從及乗輿見于郡舍與語甚悦即日拜琯吏部尚書同中書門下平章事是日車駕至巴西郡太守崔渙迎謁即日拜門下侍郎中書門下平章事以武部尚書同中書門下平章事韋見素為左相初崔渙為司門貟外郎楊國忠出不附已者渙以例遷劍南刺史至是抗詞忠懇皆究理體𤣥宗嘉之以為得渙晩册府元龜卷七十二
