body:
  text: 冊府元龜卷六百五十七宋王欽若等撰奉使部機變古者慎使乎之選重越境之任故聘禮大矣受命不受辭盖外事不素制也大易曰見幾而作不俟終日古語曰變通之際間不容髪非夫智畧輻凑計慮周洽者孰能與於斯乎若乃受命而行臨事以敏遇其變故適與時㑹理既先覺行乎中權或習俗以遂事或詭辭以應物當有疑而立斷將履危而先發俾夫敵人無所施其詐智者不能為其謀用能成命而立功守節而獲考斯固得專對之義而成出疆之美矣齊景公使使於楚楚王與之上九重之臺顧使者齊亦有臺若此乎使者曰吾君有治位之堂土階三等茅茨不剪采桷不斵猶以為為之者勞居之者泰吾君惡有臺若此者於是楚王盖悒如也枝如子躬楚大夫也昭十三年夏楚平王棄疾即位使枝如子躬聘于鄭且致犫櫟之田犫櫟本鄭邑楚中取之平王新立故還以賂鄭事畢弗致知鄭自說服不復湏賂故鄭人請曰聞諸道路將命寡君以犫櫟敢請命對曰臣未聞命既復王問犫櫟降服而對降服如今解冠也謝違命曰臣過失命未之致也王執其手曰子毋勤姑歸不榖有事其告子也王善其有權有事將復使也藺相如者趙人也爲趙宦者令繆賢舎人恵文王得楚和氏璧秦昭王聞之使人遺趙王書願以十五城請易璧趙王與大將軍㢘頗諸大臣謀欲予秦秦城恐不可得徒見欺欲勿予即患秦兵之來計未定求可使報秦者未得宦者令繆賢曰臣舎人藺相如可使王問何以知之對曰臣嘗有罪竊計欲亡走燕臣舎人相如止臣曰君何以知燕王臣語曰臣嘗従大王與燕王㑹境上燕王私握臣手曰願結友以此知之故欲往相如謂臣曰夫趙强而燕弱而君幸扵趙王故燕王欲結於君今君乃亡趙走燕燕畏趙其勢必不敢留君而束君歸趙矣君不如肉袒伏斧鑕請罪則幸得脫矣臣従其計大王亦幸赦臣臣竊以爲其人勇士有智畧宜可使於是王召見問藺相如曰秦王以十五城請易寡人之璧可予不相如曰秦强而趙弱不可不許王曰取吾璧不與我城柰何相如曰秦以城求璧而趙不許曲在趙趙予璧而秦不予趙城曲在秦均之二策寧許以負秦曲王曰誰可使者相如曰王必無人臣願奉璧往使城入趙而璧留秦城不入臣請完璧歸趙趙王扵是遂遣相如奉璧西入秦秦王坐章臺見相如相如奉璧獻秦王秦王大喜傳以示美人及左右皆呼萬嵗相如視秦王無意償趙城乃前曰璧有瑕請指示王王授璧相如因持璧却立倚柱怒髪上衝冠謂秦王曰大王欲得璧使人發書至趙王趙王悉召群臣議皆曰秦貪負其彊以空言求璧償城恐不可得議不欲予秦璧臣以爲布衣之交尚不相欺況大國乎且以一璧之故逆彊秦之驩不可於是趙王乃齋戒五日使臣奉璧拜送書於庭何者嚴大國之威以修敬也今臣至大王見臣引觀禮節甚倨得璧傳之美人以戲弄臣臣觀大王無意償趙王城邑故臣復取璧大王必急臣臣頭今與璧俱碎於柱矣相如持其璧睨柱欲以擊柱秦王恐其破璧乃辭謝固請召有司按圖指従此以往十五都予趙相如度秦王特以詐佯爲予趙城實不可得乃謂秦王曰和氏璧天下所共傳寶也趙王恐不敢不獻趙王送璧時齋戒五日今大王亦宜齋戒五日設九賔於廷九賔即周禮九儀臣乃敢上璧秦王度之終不可彊奪遂許齋五日舎相如廣城傳舎相如度秦王雖齋决負約不償城乃使其従者衣褐懷其璧従徑道亡歸璧于趙秦王齋五日後乃設九賔禮於廷引趙使者藺相如相如至謂秦王曰秦自繆公以来二十餘君未嘗有堅明約束者也臣誠恐見欺於王而負趙故令人持璧間歸至趙矣且秦强而趙弱大王遣一介之使至趙趙立奉璧來今以秦之彊而先割十五城予趙趙豈敢留璧而得罪於大王乎臣知欺大王之罪當誅臣請就湯鑊唯大王與羣臣熟計議之秦王與羣臣相視而嘻左右或欲引相如秦王因曰今殺相如終不能得璧也而絶秦趙之驩不如因而厚遇之使歸趙趙王豈以一璧之故欺秦邪卒廷見相如畢禮而歸之相如既歸趙王以爲賢大夫使不辱於諸侯拜相如爲上大夫漢隋何爲謁者時漢王與楚大戰彭城不利出梁至虞宋州虞城縣謂左右曰彼等者無足與計天下事者何進曰不審陛下所謂漢王曰孰能爲我使淮南使之發兵背楚留項王於齊數月我之取天下可以萬全隋何曰臣請使之與二十人俱使淮南至太宰主之淮南太宰作内主也三日不得見隋何因說太宰曰王之不見何必以楚爲强以漢爲弱使何得見言之而是邪則大王所欲聞言之而非邪使何二十人伏斧鑕淮南市以明背漢而與楚也太宰乃言之王王見之隋何說淮南王王曰請奉命隂許叛楚與漢未敢泄楚使者在方急責布發兵隋何直入曰九江王已歸漢楚何以得發兵布驚曰何至是楚使者出何曰事已構可殺楚使者無使歸而疾走漢併力布従之遂歸漢王烏武帝元鼎中使匈奴匈奴法漢使不去節不以墨黥其面不得入穹廬以墨㸃面也王烏北地人習胡俗去其節黥面入廬單于愛之渉何元封中武帝使譙諭朝鮮王右渠終不肯奉詔譙責讓也音才笑反何去至界臨埧水使馭刺殺送何者朝鮮俾王長長者俾王名也送何至沮水何因刺殺之即度水馳入塞遂歸報天子曰殺朝鮮將上爲其名美弗詰拜何爲遼東部都尉常恵太原人也少時家貧自應募隨栘中監蘇武使匈奴匈奴徙蘇武北海上昭帝即位數年匈奴與漢和親漢求武等匈奴詭言武死後漢使復至匈奴常恵請其守者與俱得夜見漢使具自陳道教使者謂單于言天子射上林中得鴈足有係帛書言武等在某澤中使者大喜如恵語以讓單于讓責也單于視左右而驚謝漢使曰武等實在陳饒爲右卒王莽建國元年遣五威將軍王駿率甄阜王颯陳饒帛敞丁業六人颯音立多齎金帛重遺單于諭以受命代漢狀因易單于故印故印文曰匃奴單于璽莽更曰新匈奴單于章新者莽自係其國號將率既至授單于印紱紱者印之組也音弗詔令上故印紱單于再拜受詔譯前欲解取故印紱單于舉腋授之左姑夕侯蘇従旁謂單于曰未見新印文宜且勿與單于止不肯與請使者坐穹廬單于欲前爲夀五威將軍曰故印紱當以時上單于曰諾復舉腋授譯蘇復曰未見印文且弗與單于曰印文何繇變更遂解故印紱奉上將率受著新紱不解視印飲食至夜乃罷饒謂諸將率曰鄉者姑夕侯疑印文㡬令單于不與人鄉讀曰向㡬音鉅依切如令視印見其變改必求故印此非辭説所能距也既得而復失之辱命莫大焉不如椎破故印以絶禍根將率猶與莫有應者與讀曰豫饒燕士果悍果决也悍勇也音胡幹切即引斧椎壞之明日單于果遣右骨都侯當白將率曰漢賜單于印言璽不言章又無漢字諸王已下迺有漢言章今印去璽加新與臣下無别願得故印將率示以故印謂曰新室順天制作故印隨將率所自為破壞單于宜承天命奉新室之制當還白單于知已無可柰何又多得賂遺即遣右賢王輿奉馬牛隨將卒入謝因上書求故印後漢吴漢南陽宛人素聞光武長者獨欲歸心光武於廣阿拜漢為偏將軍光武將發幽州兵夜召鄧禹問可使行者禹曰間數與吴漢言其人勇􅋧有知謀諸將鮮能及者即拜漢爲大將軍持節北發十郡突騎更始幽州牧苖會聞之隂勒兵勅諸郡不肯應調漢乃將二十騎先馳至無終曾以漢無備出迎於路漢即撝兵騎收曾斬之而奪其軍北州震駭城邑莫不望風弭従遂悉發其兵引而南與光武㑹清陽諸將望見漢還士馬甚盛皆曰是寧肯分兵與人邪及漢至幕府上兵簿諸將人人多請之光武曰屬者恐不與人今所請又何多也諸將皆慙班超字仲升明帝永平十六年奉車都尉竇固出擊匈奴以超爲假司馬將兵别擊伊吾戰於蒲類海多斬首虜而還伊吾匈奴中地名在今伊州納職縣界前書音義曰蒲類匈奴中海名在燉煌北也固以爲能遣與従事郭恂俱使西域超到鄯善鄯善本西域樓蘭國也昭帝元鳳四年改爲鄯善去陽闗一千五百里去長安六千一百里鄯善王廣奉超禮敬甚備後忽更疏懈超謂其官屬曰寧覺廣禮意薄乎此必有北虜使來狐疑未知所従故也明者覩未萌况已著邪乃召侍胡詐之曰匈奴使來數日今安在乎侍胡惶恐具服其狀超乃閉侍胡悉㑹其吏士三十六人與共飲酒酣因激怒之曰卿曹與我俱在絶域曹軰也欲立大功以求富貴今虜使到才數日而王廣禮敬即廢如令鄯善收吾屬送匈奴骸骨長為豺狼食矣為之柰何官屬皆曰今在危亡之地生死従司馬超曰不入虎穴不得虎子當今之計獨有因夜以火攻虜使彼不知我多少必大驚怖可殄盡也滅此虜則鄯善破膽功成事立矣衆曰當與従事議之超怒曰吉凶决於今日従事文俗吏聞此必恐而謀泄死無所名非壯士也衆曰善初夜遂將吏士往奔虜營㑹天大風超令十人持皷藏虜舍後約曰見火然皆當鳴皷大呼餘人悉持弓弩夾門而伏超乃順風縦火前後皷噪虜衆驚亂超手格殺三人吏兵斬其使及従士三十餘級餘衆百許人悉燒死東觀記曰斬得匈奴節使屋頼𢃄副使北離支首及節也明日乃還告郭恂恂大驚既而色動超知其意舉手曰掾雖不行班超何心獨擅之乎恂乃恱超於是召鄯善王廣以虜使首示之一國震怖超曉告撫慰遂納子為質還奏於竇固固大喜具上超功効并求更選使使西域帝壯超節詔固曰吏如班超何故不遣而更選乎今以超為軍司馬令遂前功超復受使固欲益其兵超曰願將本所従三十餘人足矣如有不虞多益為累是時于闐王廣徳新攻破莎車遂䧺張南道于闐國去長安九千六百七十里南與侯𦍑西與姑墨接莎車國去長安九千九百五十里西域南北有大山中央有河東西六千餘里東至玉門陽闗有兩道従鄯善傍南山北波河西行至莎車爲南道䧺張猶熾盛也張音丁亮切波傍也波音詖而匈奴遣使監䕶其國超既西先至于闐廣徳禮意甚踈且其俗信巫巫言神怒何故欲向漢漢使有騧馬急求取以祠我廣徳乃遣使就超請馬續漢書及華嶠書騧字並作騩說文馬淺黑色也音京媚切超宻知其狀報許之而令巫自來取馬有頃巫至超即斬其首以送廣徳因辭讓之廣徳素聞超在鄯善誅滅虜使大惶恐即攻殺匃奴使者而降超超重賜其王以下因鎮撫焉時龜茲王建為匈奴所立倚恃虜威據有北道攻破䟽勒殺其王而立龜茲人兠題為疏勒王超従間道至疏勒去兠題所居槃槖城九十里逆遣吏田慮先往降之勅慮曰兠題本非疏勒種國人必不用命若不即降便可執之慮既到兠題見慮輕弱殊無降意慮因其無備遂前刼縛兠題左右出其不意皆驚懼奔走慮馳報超超即赴之悉召疏勒將吏說以龜茲無道之狀因立其故王兄子忠為王國人大恱忠及官屬皆請殺兠題超不聽欲示以威信釋而遣之疏勒繇是與龜茲結怨十八年帝晏駕焉耆以中國大喪遂攻没都䕶陳睦超孤立無援而龜茲姑墨數發兵攻疏勒超守槃槖城與忠為首尾士吏單少拒守嵗餘章帝初即位以陳睦新没恐超單危不能自立下詔徴超超發還疏勒舉國憂恐其都尉黎弇曰漢使棄我我必復為龜茲所滅耳誠不忍見漢使去因以刀自剄超還至于闐王侯以下皆號泣曰依漢使如父母誠不可去抱超馬脚不得行超恐于闐終不聽其東又欲遂本志乃更還疏勒疏勒兩城自超去後復降龜茲而與尉頭連兵超捕斬反者擊破尉頭殺六百餘人疏勒復安吴張紘字子綱廣陵人避難江東孫䇿表為正議較尉漢獻帝建安四年孫䇿遣紘奉章至許宫留為侍御史少府孔融等皆與親善紘至與在朝公卿及知􅃇述䇿才畧絶異平定三郡風行草偃加以忠敬欵誠乃心王室時曹公為司空欲加恩厚以恱逺人至乃優文褒崇改號加封辟紘為掾舉髙第補侍御史後以紘為九江太守紘心戀舊恩思還反命以疾辭曹公聞策薨欲因喪伐吴紘諌以為乗人之喪既非古義若其不克成讐弃好不如因而厚之曺公従其言即表大帝為討虜將軍領㑹稽太守顧徽為東曺掾時傳曺公欲東大帝謂徽曰卿孤腹心今傳孟徳懐異意莫足使揣之卿為吾行拜輔義都尉到北與曺公相見公具問境内消息徽應對婉順因說江東大豐山藪宿惡皆慕化為善義出作兵公笑曰孤與孫將軍一結婚姻共輔漢室義如一家君何為道此徽曰正以明公與主將義固盤石休戚共之必欲知江表消息是以及耳公厚待遣還大帝問定云何徽曰敵國隠情卒難探察然徽濳采聽方與袁譚交爭未有它意晉衞瓘初仕魏為陳留王為廷尉卿鄧艾鍾㑹之伐蜀也瓘以本官持節監艾㑹軍事行鎮西兩軍司給兵千人蜀既平艾輒承制封拜㑹隂懷異志因艾専擅宻與瓘俱奏其狀詔使檻車徴之㑹遣瓘先收艾㑹以瓘兵少欲令艾殺瓘因加艾罪瓘知欲危已然不可得而距乃夜至成都檄艾所統諸將稱詔收艾其餘一無所問若來赴官軍爵賞如先敢有不出誅及三族比至鷄鳴悉來赴瓘唯艾帳内在焉平旦開門瓘乗使者車徑入至成都殿前艾臥未起父子俱被執艾諸將圖欲刼艾整仗趨瓘營瓘輕出迎之偽作表章將申明艾事諸將信之而止俄而㑹至乃悉請諸將胡烈等因執之囚益州廨舎遂發兵反於是士卒思歸内外騷動人情憂懼㑹留瓘謀議乃書板云欲殺胡烈等舉以示瓘瓘不許因相疑貳瓘如厠見胡烈故紿使使宣語三軍言㑹反㑹逼瓘定議經宿不眠各横刀膝上在外諸軍已潛欲攻㑹㑹既不出未敢先發㑹使瓘慰勞諸軍瓘心欲去且堅其意曰卿三軍主宜自行㑹曰卿監司且先行吾當後出瓘便下殿㑹悔遣之使呼瓘辭眩疾動詐仆地比出閤數十信追之瓘至外廨服鹽湯大吐瓘素羸便似困篤㑹遣所親人及醫視之皆言不起㑹繇是無所憚及暮門閉瓘作檄宣告諸軍諸軍並已唱義陵旦共攻㑹㑹率左右距戰諸將擊敗之唯帳下數百人隨㑹繞殿而走盡殺之瓘於是部分諸將羣情肅然後魏楊昱孝明時為給事黄門侍郎時賊圍豳州詔昱兼侍中持節督西北道大都督北海王顥仍隨軍監察豳州圍解雍州蜀賊張映龍姜神逹知州内空虚謀欲攻掩刺史元修義懼而請援一日一夜書移九通都督李叔仁遲疑不赴昱曰長安闗中基本今大軍頓至在涇豳與賊相對若使長安不守大軍自然瓦散此軍雖往有何益也遂與叔仁等俱進於陣斬神逹及諸賊四百許人餘悉奔散後周申徽西魏大統十年為給事黄門侍郎先是東陽王元榮為𤓰州刺史其女婿劉彦隨焉及榮死𤓰州首望表榮子康為刺史彦遂殺康而取其位屬四方多難朝廷不遑問罪因授彦刺史頻徴不奉詔又南通吐谷渾將圖叛逆文帝難於動衆欲以權畧致之乃以徽為河西大使宻令圖彦徽輕以五十騎行既至止於賔館彦見徽單使不以為疑徽乃遣一人勸彦歸朝以揣其意彦不従徽又使贊成其主計彦便從之遂來至館徽先與𤓰州豪右宻謀執彦遂叱而縛之彦辭無罪徽數之曰君無尺寸之功濫居方岳之重恃逺背誕不恭貢職戮辱使人輕忽詔命計君之咎實不容誅但受詔之日本令相送歸闕所恨不得即申明罰以謝邉逺耳於是宣詔慰勞吏人及彦所部復云大軍續至城内無敢動者使還遷都官尚書杜杲武帝建徳初為司城中大夫使於陳陳宣帝謂杲曰長湖公軍人等雖築館處之然恐不能無北風之戀王褒庾信之徒既覊旅闗中亦當有南枝之思耳杲揣陳宣意欲以元定軍將士易王褒等乃答之曰長湖總戎失律臨難茍免既不死節安用以為且猶牛之一毛何能損益本朝之議初未及此陳宣帝乃止杲還至石頭又遣謂之曰若欲合従共圖齊氏能以樊鄧見與方可表信杲答曰合從圖齊豈唯弊邑之利必湏城鎮宜待之於齊先索漢南使者不敢聞命隋崔彭性剛毅有武畧善騎射髙祖為丞相時周陳王純鎮齊州髙祖恐純為變遣彭以兩騎徴入朝彭未至齊州三十里因詐病止傳舎遣人謂純曰天子有詔書至王所彭苦疾不能彊歩願王降臨之純疑有變多將従騎至彭所彭出傳舎迎之察純有疑色恐不就徴因詐純曰王可避人將宻有所道純麾遣従騎彭又曰將宣詔王可下馬純遽下彭顧其騎士曰陳王不従詔徴可執也騎士因執而鎖之彭乃大言曰陳王有罪詔徴入朝左右不得輒動其従者愕然而去髙祖見而大悦拜上儀同長孫晟為左勲衞車將軍開府奉使突厥突厥可汗染干因晟奏雍閭作攻具欲打大同城詔發六總管並取漢王節度分道出塞討之雍閭大懼復共逹頭同盟合力掩襲染干大戰于長城下染干敗績殺其兄弟子姪而部落亡㪚染干與晟獨以五騎逼夜南走至旦行百餘里收得數百騎乃相與謀曰今兵敗入朝一降人耳大隋天子豈禮我乎玷厥雖來本無寃隙玷厥别部可汗名若往投之必相存濟晟知其懷貳乃宻遣従者入伏逺鎮速舉烽染干見四烽俱發問晟曰城上然烽何也晟紿之曰城髙地逈必遥見賊來我國家法若賊少舉二烽來多舉三烽大逼舉四烽使見多而又近耳染干大驚謂其衆曰追兵已逼且可投誠既入鎮晟留其逹官執室以領其衆自將染干馳驛入朝帝大喜進授左勲衞驃騎將軍裴矩為内史侍郎煬帝遣將軍薛世䧺城伊吾令矩共往經畧矩諷諭西域諸國曰天子為蕃人交易懸逺所以城伊吾耳咸以為然不復來競崔君肅為司朝謁者大業初處羅可汗為鐵勒所敗時裴矩在燉煌引致西域聞國亂復知處羅思其母氏因奏之煬帝遣君肅齎書慰諭之處羅甚倨受詔不肯起君肅謂處羅曰突厥本一國也中分為二自相仇敵每歳交兵積數十年而莫能相尚者明知啟民與處羅國其勢敵耳今啟民舉其部落兵且百萬入臣天子甚有丹誠者何也但以切恨可汗而不能獨制故卑事天子以借漢兵連二大國欲滅可汗耳百宫兆庶咸請許之天子弗違師出有日矣顧可汗母向氏本中國人歸在京師處于賔館聞天子之詔懼可汗之滅旦夕守闕哭泣悲哀是以天子憐焉為其輟策向夫人又匍匐謝罪因請發使以召可汗令入内屬乞加恩禮同於啟民天子従之故遣使到此可汗若稱藩拜詔國乃永安而母得延夀不然者向夫人為誑天子必當取戮而傳首虜庭發大隋之兵資北藩之衆左提右挈以擊可汗死亡則無日矣柰何惜兩拜之禮剿慈母之命恡一句稱臣喪匈奴之國也處羅聞之矍然而起流涕再拜跪受詔書君肅又說處羅曰啟民内附先帝嘉之賞賜極厚故致兵强國富今可汗後附與之爭寵湏深結於天子自表至誠既以道逺未得朝覲宜立一功以明臣節處羅曰如何君肅曰吐谷渾者啓民少子莫賀咄設之母家也今天子又以義城公主妻於啓民啓民畏天子之威而與之絶吐谷渾亦因憾漢故職貢不修可汗若請誅之天子必許漢擊其内可汗攻其外破之必矣然後身自入朝道路無阻因見老母不亦可乎處羅大喜遂遣使朝貢唐陳大徳為職方郎中貞觀十五年大徳使于髙麗初入其境欲窺其國俗每至城邑輒以綾綺遺其官守莫不懽悅大徳因謂之曰吾性好山水所不能忘在此何處有林泉勝地吾欲時往逰踐其國人信之遇有好山水之處輒引大徳觀之遂得在道屈曲而行往往見中國人自云家在某郡隋大業末因平壤敗遂没於此髙麗妻以逰女子孫盈室與髙麗錯居殆將半矣因謂親戚存不大徳紿之曰汝之親屬悉無恙莫不垂涕而去更相吿示數日之後大徳在塗隋人望之而哭者徧於田野大徳未至平壤五十里士女夾道而觀者如堵以屬於其都及與其王相見乃盛陳兵甲盖懼中國而自强也陸䞇為翰林學士徳宗興元元年李懷光異志已萌欲激怒諸軍表論諸軍衣糧薄神策衣糧厚厚薄不均難以驅戰意在橈沮進軍李晟宻奏恐其有變帝憂之遣䞇使懷光宣諭使還贄奏事曰賊泚稽誅保聚宫院勢窮援絶引日偷生懷光總仗順之軍乘制勝之氣鼔行芟翦易若摧枯而乃宼奔不追師老不用諸帥每欲進取懷光輒沮其謀據茲事情殊不可解陛下意在全䕶委曲聽従觀其所為亦未知感若不别為規畧漸相制持唯以姑息求安終恐變故難測此誠事機危迫之秋也固不可以尋常容易處之今李晟奏請移軍適遇臣衘命宣慰懷光偶論此事臣遂訊問所宜懷光乃云李晟既欲别行某亦都不要藉臣猶慮有翻覆因美其軍强盛懷光大自矜誇轉有輕晟之意臣又従容問云昨發離行在之日未知有此商量今日従此却迴或恐聖㫖顧問事之可否决定何如懷光已肆輕言不可中變遂云恩命許去事亦無妨要約再三非不詳審雖欲追悔固難為辭伏望即以李晟表出付中書勑下依奏别賜懷光手詔示以移軍事繇其手詔大意云昨得李晟奏請移軍城東以分賊勢朕縁未知利害本欲委卿商量適㑹陸贄従彼宣慰迴云見卿論叙軍情語及於此仍言許去事亦無妨遂勑本軍允其所請卿宜授以謀畧分路夾攻務使叶齊尅平宼孽如此辭婉而直理當而明雖蓄異端何繇起怨臣初奉使論㫖本縁糧料不均偶屬移軍事相諧㑹又幸懷光詭對且無阻絶之言機宜合并若有幽贊一失其便後何可追幸垂裁察徳宗初望懷光迴意破賊故晟屢奏移軍不許及䞇縷陳懷光反狀乃可晟之奏遂移軍渭橋而鄜坊節度李建徽神筭行營陽恵元猶在咸陽贄慮懷光併建徽等軍又奏曰懷光當管師徒足以獨制兇宼逗留未進抑有他繇所患太彊不資傍助比者又遣李晟李建徽陽恵元三節度之衆附麗其營無益成功秪憂生事何則四軍接壘羣帥異心論勢力則懸絶髙卑據職名則不相統屬懷光輕晟等兵㣲位下而忿其制不従心晟等疑懷光養宼蓄姦而怨其事多凌已端居則互防飛謗欲戰則遞恐分功齟齬不和嫌釁遂搆俾之同處必不兩全彊者惡積而後亡弱者勢危而先覆敗亡之禍翹足可期舊宼未平新患方起憂歎所切實堪疚心太上消患於未萌其次救失於始兆况乎事情已露禍難垂成委而不謀何以制亂李晟見機慮變先請移軍就東建徽恵元勢轉孤弱為其吞噬理在必然他日雖有良圖恐不能自㧞拯其危急惟在此時今因李晟願行便遣合軍同徃託言晟兵素少慮為賊所邀藉此兩軍迭為掎角仍先諭㫖宻使促装詔書至營即日進路懷光意雖不欲然亦計無所施是謂先人有奪人之心疾雷不及掩耳也夫制軍馭將所貴見情離合疾徐各有宜適當離者合之則召亂當合者離之則寡功當疾而徐則失機當徐而疾則漏策得其要契其時然後舉無敗謀措無危勢今者屯兵而不肯為用聚將而罔能叶心自為鯨鯢變在朝夕留之不足以相制徒長厲階析之各競於擅能或成勲績事必有應斷無可疑徳宗曰卿之所料極善然李晟移軍懷光必已惆悵若遣建徽恵元就東則足得為辭且俟旬時晟至東渭橋不旬日懷光果奪兩節度兵建徽单騎遁而獲免恵元中路被執害之報至行在人情大恐翌日移幸山南贄練逹兵機率如此類册府元龜卷六百五十七
