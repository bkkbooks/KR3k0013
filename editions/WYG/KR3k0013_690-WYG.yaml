body:
  text: 册府元龜卷六百九十宋王欽若等撰牧守部强眀古者列爵分土以封諸侯威福自専政令已出故俗既易治民亦恭命秦氏而下罷侯置守地廣於曩日勢輕於昔人至於抑兼并制豪猾評獄犴静鄉閭非强以立威眀以鑒物則何以致尤異之治興謡誦之聲乎然則寬猛相濟韋弦在御乃有誡之於懦以苛為强防之在闇用察為眀即古之循良異乎斯矣茍或强而不苛眀而不察曲直立斷而輔以簡易情偽洞見而兼以仁恕固可以三月而報政百年而勝殘焉漢田廣眀為淮陽太守歳餘故城父令公孫勇與客胡倩等謀反倩音千見反倩詐稱光祿大夫從車騎數十言使督盜賊止陳留𫝊舍太守謁見欲收取之廣眀覺知發兵皆捕斬焉而公孫勇衣繡衣乘駟馬車至圍陳留縣名圉使小史待之亦知其非是守尉魏不害與費嗇夫江徳尉史蘇昌共收捕之趙廣漢為京兆尹吏咸願為用僵仆無所避廣漢聰眀皆知其能之所宜盡力與否其或負者輒先聞知風風讀曰諷諭不改乃收捕之無所逃案之辠立具即時伏辜廣漢為人强力天性精於吏職見吏民或不寢至旦尤善為鉤距以得事情鉤致也距閉也使對者無疑若不問而自知衆罔覺所繇以閉其術為距也鉤距者設欲知馬賈則先問狗賈讀曰價下同已問羊又問牛然後及馬參伍其賈以類相凖則知馬之貴賤不失實矣唯廣漢至精既行之它人效者莫能及郡中盜賊閭里輕俠其根株窟穴所在及吏受請求銖兩之姦皆知之廣漢嘗記召湖都亭長為書記以召之若今之下符追呼人也湖都亭長西至界上界上亭長戲曰至府為我多問趙君多厚也言千萬問訊也亭長既至廣漢與問事畢謂曰界上亭長寄聲謝我謝告也何以不為致問亭長叩頭服實有之廣漢因曰還為我謝界上亭長勉思職事有以自效京兆不忘卿厚意其發姦摘伏如神皆此類也長老以為自漢興治京兆者莫能及時左馮翊右扶風皆治長安中犯法者從迹喜過京兆界從讀曰縱喜許吏反廣漢歎曰亂吾法者常二輔也誠令廣漢得兼治之直差易耳張敞為京兆尹為人敏疾賞罰分眀見惡輒取時時越法縱舍有足大者越法縱舍即足大者也其治京兆畧循趙廣漢之迹方畧耳發伏禁姦不如廣漢然敞本治春秋以經術自輔其政頗雜儒雅往往表賢顯善不醇用誅罰以此能自全竟免於刑戮京兆與京師長安中浩穰於三輔尤為劇浩大也穰盛也言人衆之多也穰人掌反郡國二千石以髙第入守及為其久者不過三二年近者數月一歳輒毁傷失名以罪過罷唯廣漢及敞任職敞為京兆朝廷每有大議引古今處便宜公卿皆服天子數從之田延年為河東太守選㧞尹翁歸等以參爪牙誅鉏豪强姦邪不敢發以選入為大司農尹翁歸為東海太守治郡眀察吏民賢不肖及姦邪罪名盡知之縣縣有記籍自聽其政言決斷諸縣姦邪之事不委令長有急名則少緩之吏民小解輒披籍披有罪者籍也解讀曰懈縣縣收取黠吏豪民案致其罪常至於死取人必於秋冬課吏大㑹中及出行縣於大㑹之中及行縣時則收取罪人以警衆也不以無事其有所取也以一警百吏民皆服恐懼改行自新以髙第入守右扶風選用亷平疾姦吏以為右職治如在東海故迹姦邪罪名亦縣縣有名籍盜賊發其比伍中比為左右相次者若今伍保也翁歸輒召其縣長吏曉示以姦黠主名敎使用類推迹盜賊所過抵抵歸也所經過及所歸投也類常如翁歸言無有遺脱黄霸為頴川太守吏民見者語次尋繹繹謂抽引而出也問他陰伏以相參考嘗欲有所伺察擇長年亷吏遣行屬令周密屬戒也周密不泄漏也屬之欲反吏出不敢舍郵亭止舍也食於道傍鳥攫其肉攫搏持之也民有欲詣府口言事者適見之霸與語道此後日吏還謁霸霸見迎勞之曰甚苦食於道傍乃為鳥所盜肉吏大驚以霸具知其起居所問毫釐不敢有所隠鰥寡孤獨有死無以塟者卿部書言霸具為區處區處謂分别而處置也某所大木可以為棺某所猪子可以祭吏往皆如言其識事聰眀如此識記也音式二反吏民不知所出不知其果何術也咸稱神眀姦人去入他郡盜賊日少薛宣守左馮翊滿歳稱職為真始髙陵令楊湛櫟陽令謝㳺皆貪猾不遜持郡短長前二千石數案不能竟雖每案驗之不能窮竟其事及宣視事詣府謁宣設酒飯與相對接待甚備已而陰求其罪贓具得所受取宣察湛有改節敬宣之效乃手自牒書條其姦贓牒書為書於簡牒也封與湛曰吏民條言君如牒或議以為疑於主守盜法有主守盜斷官錢自入馮翊敬重令又念十金法重不忍相暴章依當時律條減直十金則至重罪故密以手書相曉欲君自圖進退可復申眉於後申眉言無憂也且令自去職不廢其後更為官者即無其事復封還記為君分眀之記謂所與湛書也分眀為考問使知清白也宣恐其匪諱即欲驗治之湛自知罪贓皆應記與宣書記相當宣辭語温潤無傷害意湛即時解印綬付吏為記謝宣終無怨言而櫟陽令㳺自以大儒有名輕宣宣獨移書顯責之曰告櫟陽令吏民言治行煩苛適罰作使千人以上適讀曰謫賊取錢財數十萬給為非法言歛取錢物以供給與造非法之用賣買聽任富吏賈數不可知賈讀價證驗以眀白欲遣吏考案恐負舉者恥辱儒士㳺本因薦舉得官而身又是儒者故云故使掾平鐫令平掾之名鐫謂琢鑿也孔子曰陳力就列不能者止令詳思之方調守言欲選人具代游守令職㳺得檄亦解印綬去又頴陽縣北當上郡西河為數郡湊多盜賊其令平陵薛恭本縣孝者功次稍遷未嘗治民職不辨而粟邑縣小辟在山中辟讀曰僻民謹樸易治令鉅鹿尹賞久郡用事吏為樓煩長舉茂才遷在粟宣即以令奏賞與恭換縣時令條有不稱職得改之二人視事數月而兩縣皆治宣因遺書勞勉之曰昔孟公綽優於趙魏而不宜滕薛孔子曰孟公綽為趙魏老則優不可以為滕薛大夫言器能各有所施也趙魏晉卿之家老家之長相也滕薛小國諸侯也故或以徳顯或以功舉君子之道焉可憮也憮音誣同也兼也屬縣各有賢君馮翊垂拱蒙成言自端拱無為而受縣之成功願勉所職卒功業朱博為冀州刺史博本武吏不更文法更歴也音上衡反及為刺史行部行下更反吏民數百人遮道自言官寺盡滿從事白請且留此縣録見諸自言者事畢乃發欲以觀試博博心知之告外趣駕趣讀曰足既白駕辦博出就車見自言者使從事眀勅告吏民欲言縣丞尉者刺史不察黄綬各自詣郡丞尉職卑皆黄綬欲言二千石墨綬長史者行部還詣治所治所刺史止理事所其民為吏所寃及言盜賊辭訟事各使屬其部從事屬委也音之欲反博駐車決遣四五百人皆罷去如神吏民大驚不意博應事變乃至於此後博徐問知老從事敎民聚㑹博殺此吏州郡畏博威嚴徙為并州刺史䕶漕都尉遷瑯琊太守齊部舒緩養名言齊人之俗性遲緩多自髙大以養名聲博新視事右曹掾史皆移病卧右曹上曹也移病謂移書言病也一曰以病而移居也博問其故對言惶恐言懼新太守之威故事二千石新到輒遣吏存問致意乃敢起就職博奮髯抵几曰髯頰毛也抵擊也音紙觀齊兒欲以此為俗耶乃召見諸曹史書佐及縣大吏選視其可用者出敎置之皆新補置以代移病書皆斥罷諸病吏白巾走出府門郡中大驚頃之門下掾贛遂贛古送反耆老大儒敎授數百人拜起舒遲博出敎主簿以此敎告主簿贛老生不習吏禮主簿且敎拜起閑習乃止又勅功曹官屬多褒衣大袑音紹謂大袴也不中節度自今掾史衣皆令去地三寸博尤不愛諸生所至郡輒罷去議曹曰豈可復置謀曹耶文學儒吏時有奏記稱説云云博見謂曰如太守漢吏奉三尺律令以從事耳亡奈生所言聖人道何也言不能用且持此道歸堯舜君出為陳説之其折逆人如此視事數年大改其俗掾史禮節如楚趙吏博治郡嘗令屬縣各用其豪傑以為大吏文武從宜各因其材而任之縣有劇賊及它非常博輒移書以詭責之其盡力有效必加厚賞懐詐不稱誅罰輒行稱副也以是豪强慹服慹之渉反姑幕縣有羣輩八人執仇廷中皆不得於縣廷之中執仇殺人而其賊亡捕不得也長吏自繫書言府賊曹掾史自白請至姑幕事留不出功曹諸掾即皆自白復不出於是府丞詣閣博乃見丞掾曰以為縣自有長吏府未嘗與也丞掾謂府當與之耶與讀皆曰預閣下書佐入博口占檄文曰隠度其言口授之占之瞻反府告姑幕令丞言賊發不得有書言巳得縣之文書如此檄到令丞就職㳺徼王卿力有餘如律令㳺檄職主捕盜賊故云如律令王卿得勑惶怖親屬失色晝夜馳騖十餘日間捕得五人博復移書曰王卿憂公甚效檄到齎閥閱詣府閥功勞也閱所經歴也部掾以下亦可用漸盡其餘矣部掾所部之掾也其操持下皆此類也以髙第入守左馮翊滿歳為甄其治左馮翊文理聰眀殊不及薛宣而多武譎網絡張設少愛利敢誅殺言少仁愛而不能便於人然亦縱舍時有大貸縱放也舍置也貸謂寛假於下也音土戴反下吏以此為盡力長陵大姓尚方禁姓尚方名禁少時嘗盜人妻見斫創著其頰府功曹受賂白除禁調守尉博聞知以它事召見視其面果有瘢博辟左右問禁辟讀曰闢是何等創也禁自知情得言其得被斫之情狀叩頭服狀博歎曰丈夫固時有是言情欲之事人所不免馮翊欲洒卿恥抆拭用禁洒音先里反抆音丈粉反能效不禁且喜且懼對曰必死言盡死力也博因勅禁毋得泄語有便宜輒記言令不泄抆拭之言而外有便宜之事為書記以言於博因親信以為耳目禁晨夜發起部中盜賊及它伏姦有功效博擢禁連守縣令久之召見功曹閉閣數責以禁等事與筆札自記積受取一錢以上無得有所匿積累前後受取之事欺謾半言斷頭矣謾誑也音慢又莫連切功曹惶怖具自疏姦贓大小不敢隠博知其對以實乃令就席受勅自改而已投刀使削所記遣出就職功曹後常戰栗不敢蹉跎博遂成就之言進達也何武為楚内史遷沛郡太守疾朋黨問文吏必於儒者問儒者必於文吏以相參簡欲除史先為科例以防請託後漢孔奮繇武都郡丞為武都太守奮自為府丞已見敬重及拜太守舉郡莫不改操為政眀斷甄善疾非見有美徳愛之如親其無行者忿之若讐郡中稱為清平羊續為南陽太守當入郡界乃羸服間行侍童子一人觀歴縣邑採問風謡然後乃進其令長貪潔吏民良猾悉逆知其狀郡内驚悚莫不震懾法雄為青州刺史每行部錄囚徒察顔色多得情偽長吏不奉法者皆解印綬去欒巴為桂陽太守視事七年政事眀察荀淑為朗陵侯相􅊩事眀理稱為神君刁題為魯東海二郡相性抗厲有眀畧所在稱神陳蕃為樂安太守民有趙宣塟親而不閉埏隧因居其中行服二十餘年鄉邑稱孝州郡數禮請之郡内以薦蕃與相見問及妻子而宣五子皆服中所生蕃大怒曰聖人制禮賢者俯就不肖企及且祭不欲數以其易黷故也況乃寢宿冢蔵而孕育其中誑時惑衆誣汚鬼神乎遂致其罪王吉為沛相吉宦者王甫養子年二十餘曉達政事能斷察疑獄發起姦伏多出衆議課使郡内各舉姦吏豪人諸嘗有微過酒肉為贓者雖數十年猶加貶棄注其名籍謝夷吾為荆州刺史雅性眀達能決斷罪疑行部始到南陽縣遇章帝巡狩駕幸魯陽有詔勑荆州刺史入博錄見囚徒誡長吏勿廢舊儀朕將覽焉帝臨西廂南面夷吾處東廂分帷隔中央夷吾所決正一縣三百餘事與帝合帝歎息曰諸州刺史盡如此者朕不憂天下常以勵羣臣馬嚴為陳留太守下車眀賞罰發姦慝郡界清静時京師訛言賊從東方來百姓奔走轉相驚動諸郡惶急各以狀聞嚴察其虛妄獨不為備詔書勑問使驛係道嚴固執無賊後卒如所言張禹為楊州刺史歴行郡邑深幽之處莫不畢到親錄囚徒多所眀舉黄昌為蜀郡太守李根年老多悖政百姓稱寃及昌到吏人訟者七百餘人悉為斷理莫不得所密捕盜帥一人脅使條諸縣强暴之人姓名居處乃分遣掩討無有遺脱宿惡大姦皆奔走他疆魏倉慈為燉煌太守屬城獄訟衆猥縣不能決多集治下慈躬往省閱料簡輕重自非殊死但鞭杖遣之一歳決刑曹不滿十人袁渙為梁相榖熟長吕岐善朱淵袁津遣使行學還召用之與相見出署淵師友祭酒津決疑祭酒淵等因各歸家不受署岐大怒將吏眀收淵等皆杖殺之議者多非焉渙敎勿劾主簿孫徽等以為淵等罪不足死長吏無専殺之義孔子稱唯器與名不可以假人謂之師友而加大戮刑名相伐不可以訓渙敎曰主簿以不請為罪此則然矣謂淵等罪不足死則非也夫師友之名古今有之然有君之師友有士大夫之師友君置師友之官者所以敬其臣也有罪加於刑焉國之法也今不論其罪而謂之戮師友斯失之矣主簿取弟子戮師之名而加君誅臣之實非其類也夫聖哲之治觀時而動容不必循常將有權也間者世亂民陵其上雖務尊君卑臣猶或未也而反長世之過不亦謬乎遂不劾司馬岐為陳留相梁郡有繫囚千數連及數歳不決詔書徙獄於岐屬縣請豫治牢具岐曰今囚有千數既巧詐難符且已倦楚毒其情易見豈當復久處囹圄耶及囚至詰之皆莫敢匿詐一朝決竟遂超為廷尉陳矯為魏郡太守時繫囚千數至有歴年矯以為周有三典之制漢約三章之法今惜輕重之理而忽久繫之患可謂謬矣悉自覽罪狀一時論決王修為魏郡太守為治抑强扶弱眀賞罰百姓稱之蜀楊洪字李休諸葛亮表洪領蜀郡太守衆事皆辦遂使即真晉茍晞為兖州刺史練於官事文簿盈積斷決如流人不敢欺陶侃為荆州刺史性纎密好問頗類趙廣漢嘗課諸營種栁都尉夏施盜官栁植之於已門侃後見駐車問曰此是武昌西門前栁木何因盜來此種施惶怖謝罪紀瞻為㑹稽内史時有詐稱大將軍府符收諸軍令令受拘瞻覺其詐便破檻出之訊問使者果伏詐妄劉頌為淮南相任官嚴整有政績舊修陂年用數萬人豪强兼并孤貧失業頌使大小戮力計功受分百姓歌其平恵劉道規為荆州刺史善於為治政刑眀理州民莫不畏而愛之周處為廣漢太守郡多滯訟有經三十年而不決者處詳其枉直一朝決遣前秦苻融為司𨽻校尉苻堅及朝臣雅皆歎服疑獄莫不折之於融融觀色察形無不盡其情狀南齊王敬則歴南兖州刺史丹陽尹雖不大識書然性警黠臨州郡令省事讀辭下敎判決皆不失理豫章王嶷為荆州刺史時太祖輔政務在約省停府州儀迎物初沈攸之欲聚衆開民相告士庶坐執役者甚衆嶷至鎮一日遣三千餘人見囚五歳刑以下不連臺者皆原遣裴昭眀為始安内史郡民龔元宣云神人與其玉印玉板書不須筆吹紙便成字自稱龔聖人以此惑衆前後郡守敬事之昭眀付獄治罪梁始興忠武王憺為荆州刺史民辭訟者皆立能待符敎決獄俄頃曹無留事民益悦焉安成康王秀牧荆州時武寧太守為弟所殺乃偽云土反秀眀其隐慝望風首伏咸謂之神蕭異為晉陵太守下車勵名迹除煩苛眀法憲嚴於姦吏優養百姓旬日之間郡中大化蕭景為兖州刺史居州清恪有威裁眀解吏職文案無擁下不敢欺吏人畏敬如神孔休源為宣恵將軍監揚州而神州都㑹簿領殷繁休源割斷如流傍無私謁張􅃡為淮南太守時年十八髙祖疑其年少未閑吏事乃遣主書封取郡曹文案見其決斷允愜甚稱賞之江革為㑹稽郡丞行府州事郡境殷廣辭訟日數百革分判辯析曽無疑滯陳周羅㬋為豫章内史獄訟庭決不闗吏手民懐其恵立碑頌徳焉後魏崔光韶知青州事清直眀斷吏民愛之楊逸字遵道為光州刺史折節綏撫乃心民務或日昃不食夜分不寢法令嚴眀寬猛相濟於是合境肅然莫敢干犯逸為政愛人尤憎豪猾廣設耳目其兵吏出使下邑皆自持粮人或為設食者雖在闇室終不敢進咸言楊使君有千里眼那可欺之在州政績尤美陸馛音歩木反為相州刺史簡取諸縣彊門百餘人以為假子誘接殷勤賜以衣服令各歸家為耳目於外於是發姦擿伏事無不驗百姓以為神眀無敢刼盜者江文遥為咸陽太守勤於禮節終日坐㕔事至者見之假以恩顔屏人密問於是民所疾苦大盜姓名奸猾吏長無不知悉郡中震肅姦刼悉止治為雍州諸郡之最徵拜驍騎將軍孝眀初拜平原太守在郡六年政治如在咸陽樊子鵠為兖州刺史先遣腹心緣歴民間採察得失及入境太山太守彭穆㕘候失儀子鵠責讓穆并載其罪狀穆皆引伏於是州内震悚宋世景為滎陽太守縣吏三正至即見之嘗屏人密語民間之事巨細必知發姦擿伏有若神眀嘗有一吏休滿還郡食人雞豚又有一幹受人一㡌又食二雞世景叱之曰汝何敢食甲乙雞豚取丙丁之㡌吏幹叩頭伏罪於是上下震悚莫敢犯禁淮南王他孫法夀為安州刺史先令所親微服入境觀察風俗下車便大行賞罰於是境内肅然北齊司馬子如行冀州事甚有聲譽發擿姦偽寮吏畏伏之轉行并州事彭城景思王浟為滄州刺史為政嚴察郡内肅然守令㕘佐下及胥吏行逰往來皆自齎粮食浟纎介知人間事有濕沷縣主簿張達嘗詣州夜於人舍食雞羮浟察知之守令畢集浟對衆曰食雞羮何不還價直達即伏罪合境號為神眀蘇瓊為南清河太守郡中舊賊一百餘人悉充左右人間善惡及長吏飲人一盞酒無不即知馮翊王潤為定州刺史性亷慎方雅習於吏職擿發隠偽姦吏無所匿其情郎基為頴川郡守積年留滯數日之中剖判咸盡而臺報下並允基所陳條綱既疎獄訟清息官民遐邇皆相慶悦後周齊王憲子貴為幽州刺史貴雖出自深宫而留心庶政性聰過目輒記嘗道逢一人謂其左右曰此人是縣黨何因輒行左右不識貴便説其姓名莫不嗟服白獸烽經為商人所燒烽師納貨不言其罪他日此師道隨例來㕘貴乃問曰商人燒烽何因私放烽師愕然遂自首伏眀察如此崔兼為鉅鹿太守下車道人以禮豪族皆放心整肅事無巨細必自親覽在縣有貧弱未理者皆曰我自告白鬚公不慮不決于仲文字次武為始州刺史屈突尚宇文䕶之黨也先坐事下獄無敢繩者仲文至郡窮治遂竟其獄蜀中為之語曰眀斷無雙有于公不避强禦有次武隋乞伏恵為曹州刺史曹武舊俗民多姦隠戸口簿帳嘗不以實恵下車案察得戸數萬後為齊州刺史得隠戸數千裴政為襄州總管妻子不之官所受秩俸散給察吏犯罪者陰悉知之或竟歳不發至再三犯乃因都㑹時於衆中召出親案其罪五人處死流徙者衆合境惶懼令行禁止髙權為雍州司馬以眀斷見稱裴藴為京兆贊治發擿纎毫使民懾憚梁彦光為相州刺史以静鎮之鄴都雜俗人多變詐作歌稱其不能理坐是免官歳餘拜趙州刺史彦光言於文帝曰臣前待罪相州百姓呼為戴㡌􅄳臣自分廢黜無復衣冠之望不謂天恩復垂收採請復為相州改絃易調庶有以變其風俗上答洪恩帝從之復為相州刺史豪猾者聞彦光自請而來莫不嗤笑彦光下車發擿姦隠有若神眀狡猾之徒莫不濳竄合境大服辛公義為牟州刺史下車先至獄中因露坐牢側親自簡問十餘日間決斷咸盡方還大㕔受領新訟皆不立文案遣當直佐寮一人側坐訊問事若不盡應須禁者公義即宿㕔事終不還閣韋鼎為光州刺史中州有土豪外修邊幅而内行不軌嘗為刼盜鼎於都㑹時謂之曰卿是好人那忽作賊因條其徒黨謀議逼留其人驚懼即自首伏陳孝意為雁門郡丞發姦擿伏動若有神吏民稱之楊元感為郢州刺史到官濳布耳目察長吏能不其有善政及賍汙者纎介必知之往往發其事莫敢欺隠吏民敬服皆稱道其能樊子盖為齊州刺史武威太守臨民眀察下莫敢欺薛胄為兖州刺史有陳州人向道力者偽稱髙平郡守將之官胄遇諸塗察其有異將留詰之司馬王君馥固諌乃聽詣郡既而悔之即遣主簿追禁道力有部人徐俱羅者嘗任海陵郡守先是以為道力偽代之比至秩滿公私不悟俱羅遂語君馥曰向道力已經代俱羅為郡使君豈容疑之君馥以俱羅所陳又固請胄呵君馥曰吾已察知此人之詐也司馬容姦當連其罪君馥乃止遂往收之道力懼而引偽其發姦擿伏皆此類也時人謂為神眀唐張亮歴懐州刺史歴夏幽麟三州都督府長史督府長史所􅊩之職濳遣左史伺察善惡發擿姦隠動若有神抑豪强而恤貧弱故所在見稱武士彠武徳末為揚州都督府長史移丹陽郡於都不日而就時論以為眀幹李晦河間王孝恭之子為右金吾衞將軍兼檢校雍州長史京輦殷煩姦豪所聚前後官長多不能檢察晦糾發其姦無所容貸甚為人吏畏服姚璹則天時為益州大都督府長史時蜀中官吏多貪暴璹屢發擿姦無所容則天嘗謂侍臣曰凡為官長者能清身甚易得寮屬甚難至於姚璹可謂兼之矣李栖筠為浙西觀察使浙西大藩且為中原衣食之本栖筠眀於政術臨事風生當時嗟伏若有神助吳溱貞元中為京兆尹府縣掾吏等以溱自少因緣外戚為官當未閑習吏事有疑獄鬭競難決者多候溱將出府時方諮呈冀免指摘瑕纇溱每閱視必能盤根錯節舉其利病而批押之未嘗分毫差舛官吏過犯者以理曉諭之罕有責罰李選歴湖南江西觀察使鋭於為理持下以法吏不敢欺而動必知察嗣曹王臯累為潭洪荆襄觀察使性勤儉眀察知人疾苦多設監伺能㕘聽於下將吏短長賞罰必信每遺人粮肉令自持量衡以致之官署布帛令縱書其幅而印之以絶吏之更易李憲西平王晟之子憲宗元和中歴衞絳二州刺史累遷江西觀察使後為鎮南節度使憲雖出自勲伐之家弱冠以吏道自進前後所至能平反寃獄全活無辜者數百人政無敗事人頗稱之楊於陵為京兆尹先是禁軍影占編户無以别白於陵請置挾名勅每五丁者得兩丁入軍四丁三丁者差以條限繇是京師豪强復知所畏劉栖楚為京兆尹摧抑豪右不顧患難事無大小必設鉤鉅故時人異之或稱其機往往有類於西漢時趙廣漢者梁趙犨季弟珝為忠武留後珝公幹之才播於逺邇至於符籍虚實財榖耗登備閱其根本民之利病無不洞知庶事簡亷公私俱濟太祖深加慰薦尋加特進檢校司徒後唐張憲為興唐尹知留守事憲學識優深尤精吏道剖析聽斷人不敢欺晉髙漢筠為曹州刺史以勾吏積欺在已妄擾封民民去者半漢筠鞫而得情殺吏於廷民不踰月呼尋比戸歌之盧文進為昭義節度使將吏以兇狡相尚言訟成風數政不能治文進至止鞫其罪必誅之其事漸息武臣臨事潔身有斷當時少比相里金為忻州刺史凡部曲私屬皆不令干預民事但優其贍給使分掌家事而已故郡民安之大有聲績安重榮為成徳軍節度使嘗有夫婦共訟其子不孝者重榮靣詰責抽劔令自殺之其父泣曰不忍也其母詬罵杖劔逐之重榮疑而問之乃其繼也因叱出後射之一箭而斃聞者以為快意繇此境内以為强眀大得民情漢劉銖為青州節度使乾祐中淄青大理銖下令捕蝗畧無遺漏田苖無害先是濵海郡邑皆有兩浙回易務取民利如有所負回易吏自置刑案追攝士民前後長吏利其厚賂不能禁止銖即告所部不得與吳越徵償及擅行追攝浙人惕息莫敢干命册府元龜卷六百九十
