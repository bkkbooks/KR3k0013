body:
  text: 册府元龜卷六百六十九宋王欽若等撰内臣部朋黨恣横譴責貪貨朋黨夫親丹扆游黄閣上應躔次下聞謀議其來久矣自兩漢之季五代已徃或值王道浸衰朝綱靡振本以宮闈之職遂參樞衡之任共相樹置逓為表裏乃有擢自行伍膺節制之權㧞於寒㣲踐公台之貴吹嘘所至羽翼斯生故無益於為邦但有紊於政治觀夫賢愚之用舍乃知時運之汚隆耳漢石顯元帝時為中書令與中書僕射牢梁少府五鹿充宗結為黨友諸附倚者皆得寵位倚依也民歌之曰牢邪石邪五鹿客邪印何纍纍綬若若邪纍纍重積也若若長貎言其兼官據勢也後漢張讜靈帝時為中常侍封列侯與中常侍趙忠曹節王甫等相表裏後魏劉騰自小黄門遷侍中與領軍元乂廢靈太后使中常侍賈粲假言侍孝明書宻令防乂以騰為司空表裏擅權共相對置乂為外禦騰為内防迭直禁闥共裁刑賞及卒葬日内官為乂服杖絰衰縞者以百數賈粲自小黄門累遷為光禄大夫與元乂劉騰等同共謀謨粲既乂黨威福亦震於京邑唐魚朝恩代宗時為觀軍容使鎮陜州與周智光昵狎朝恩以扈從功恩渥崇厚奏請多允屢於上前賞㧞智光智光本以騎射將後軍嘗有戎㨗自行間登偏禆累遷同華二州節度使及潼關防禦使薛盈珍憲宗時為中貴人有權力於元和初薛謇為代北營田水運使善畜牧有良馬時以賂朝權及中貴人以族人附進盈珍頗延譽以助之故自泗州刺史遷福建觀察使魏𢎞簡穆宗時知樞宻初元稹貶江陵士曹荆南監軍崔潭峻甚禮接稹不以掾吏遇之長慶初潭峻歸朝出稹連昌宮辭等百餘篇奏御穆宗大悦即日轉祠部郎中知制誥無何召入翰林為承㫖學士中人以潭峻之故爭與稹交而𢎞簡尤與稹相善穆宗愈深知重河東節度使裴度三上疏言稹與𢎞簡為刎頸之交謀亂朝政言甚激訐穆宗乃罷稹内職以𢎞簡為弓箭庫使崔潭峻穆宗時為内常侍京兆尹崔元畧以宗人附之遷户部侍郎外以元畧板圗之拜出於宣授時諌官有疏指言潭峻方有權寵元畧以諸父事之故雖彈劾而遽遷顯要元畧亦上章自辯且曰一時府縣條流臺司舉劾孤立無黨謗言益彰不謂詔出宸𠂻恩延望外處南宮之重選列左右之清班豈臣庸愚敢自干冒天心所擇致驚特逹之恩衆口相非遂致因縁之說詔答之曰朕所命官豈非公選卿能稱職奚恤人言然元畧不能迯父事潭峻之名王守澄為内常侍穆宗暴得風恙興元節度使裴度三疏請立儲嗣宰相李逢吉亦請立敬宗為皇太子時守澄掌樞宻自穆宗不愈事權益隆翼城人鄭注自言能為黄金藥服一刀圭可去痿弱重腿之疾後能使老年人如壯男子守澄得是藥頗効嘗神而親之注又有竒辯言必通夕出入禁中無時於是李逢吉用族子仲言之諫因注日與守澄通令守澄濳結敬宗於東宮且言逢吉實立殿下敬宗深徳之逢吉既内倚守澄之助而外又有門舘人張又新李績之軰為籌畫即廣進虚薄邪妄之徒置於班級謂之清流自承郎已下多以黨進又新與績皆逢吉藩僚也後唐安希倫為内官長興二年夏被誅以其受樞宻使安重誨宻㫖令於内中伺帝起居故也恣横周禮建寺人之官掌女宮之戒自兹厥後命數寖隆宣帷幄之勤豫臺省之務其有任居要近性異專良忘兢慎之規昧真素之理專與奪之柄總營衛之威謝任恩親光寵支附非復掖庭黄闥之職正内永巷之任亦有忌刻不顧崇侈滋豐獨坐之謗以興鈎黨之誣斯起招釁罹患盖自取焉竪貂齊人魯僖公二年秋九月濟侯宋公江人黄人盟於貫服江黄也江黄楚與國也始來服齊故為合諸侯齊寺人貂始漏師於多魚齊桓多嬖寵内則如夫人者六人外則幸竪貂易牙之等終以此亂國傳言貂於此始擅貴寵漏洩桓公軍事秦趙髙二世時為郎中令所殺及報私怨衆多恐大臣入朝奏事毁惡之乃說二世不坐朝廷見大臣居禁中髙常侍中用事事皆决於髙髙後欲為亂乃先設驗持鹿獻於二世曰馬也二世笑曰丞相誤耶謂鹿為馬問左右左右或黙或言馬以阿順趙髙或言鹿者髙因隂中諸言鹿者以法羣臣皆畏髙漢石顯元帝時為中書令為人巧慧習事能探人主㣲指内深賊持詭辯以中傷人詭違也違道之辯忤恨睚眦輒被以危法被加也音皮義反餘具内臣害賢門後漢孫程順帝時為騎都尉永建元年程與張賢孟叔馬國等為司隸校尉虞詡訟罪懐表上殿呵叱左右帝怒遂免程官左悺瓘綰二音桓帝時為小黄門史以誅大將軍梁冀功遷中常侍與單超貝瑗徐璜唐衡五人同日封侯故世謂之五侯超疾薨其後四侯轉横天下為之語曰左囘天具獨坐獨坐言驕貴無偶也徐臥虎唐兩墮兩墮謂隨意所為不定也今人謂持兩端而任意為兩墮兩或作雨多取良人美女以為姬妾兄弟姻戚皆宰州臨郡辜較百姓盜賊無異超弟安為河東太守弟子正為濟隂太守璜弟盛為河内太守悺弟敏為陳留太守瑗兄恭為沛相皆為所在蠧害璜兄子宣為下邳令暴虐尤甚先是求故汝南太守李暠女不能得及到縣遂將吏卒至暠家載其女歸戯射殺之東海相黄浮按宣罪棄市璜於是訴怨於帝帝大怒浮坐髠鉗輸作右校五侯宗族賓客虐徧天下民不堪命起為寇賊侯覧桓帝時為中常侍以誅梁冀功封髙鄉侯小黄門叚珪家在濟隂與覧並立田業近濟北界僕從賓客侵犯百姓刼掠行旅濟北相滕延一切收捕殺數十人陳尸路衢覧珪大怒以事訴帝延坐多殺無辜徵詣廷尉免覧等得此愈放縱靈帝建寧二年䘮母還家大起塋塜督郵張儉因舉奏覧虜奪良人妻畧婦子及諸罪釁請誅之而覧伺侯遮截章竟不上儉遂破覧冡宅籍没資財具言罪狀又奏覧母生時交通賓客干亂郡國復不得御御進也覧遂誣儉為鈎黨夷㓕之曹節靈帝時為中常侍以定策迎帝封長安鄉侯時竇太后臨朝后父大將軍武與太傅陳蕃謀誅中官節與長樂五官史朱瑀從官史共普張亮共音恭中黄門王尊長樂謁者騰是等十七人共矯詔以長樂食監王甫為黄門令將兵誅武蕃等節累轉大長秋熹平元年有何人書朱雀闕何人不知何人也言天下大亂曹節王甫幽殺太后常侍侯覧多殺黨人公卿尸禄無有忠言者節女婿馮方上章言尚書郎桓彬與左丞劉歆右丞杜希為酒黨尚書令劉猛雅善彬等不舉正節大怒劾奏阿黨請收下詔獄在朝者為之寒心猛意氣自若旬日得出免官禁錮彬遂以廢張讓與趙忠夏惲郭勝孫璋畢嵐梁暠叚珪髙望張恭韓悝宋典十二人皆為中常侍封侯貴寵父兄子弟布列州郡所在貪殘為人蠧害黄巾既作盜賊糜沸郎中張均上書言張角所以能興兵作亂其源皆繇十常侍宜斬之縣頭南郊以謝百姓靈帝以均章示讓等復重上猶如前章輒寢不報詔使廷尉侍御史考為張角道者御史承讓等㫖遂誣奏均學黄巾道收掠死獄中而讓等實多與角交通後中常侍封諝徐奏事獨發覺坐誅帝因怒詰讓等曰汝曹嘗言黨人欲為不軌皆令禁錮或有伏誅今黨人更為國用汝曹反與張角通為可斬未皆叩頭云故中常侍王甫侯覧所為帝乃止蹇碩為上林校尉碩雖擅兵於中而猶畏忌於大將軍何進乃與諸常侍共說靈帝遣進西擊邊章韓遂帝從之進亦不往魏張當齊王時為黄門齊王正始末大將軍曹爽專政常私出掖庭才人石英等十一人皆與曹爽為伎人後魏劉騰孝明時為中常侍中吏部嘗望騰意奏其弟為郡帶戍人資乖越清河王懌抑而不與騰以為恨遂與領軍元乂害懌乂以騰為司空公表裏擅權共相樹置乂為外禦騰為内防迭直禁闥共裁刑賞騰遂與崔光同受詔乘步挽出入殿門四年之中生殺之威决於乂騰之手八座九卿且造騰宅参其顔色然後方赴省府亦有歴日不能見者北齊陳徳信後主時與數十人並肆其姦佞敗政虐人古今未有多授開府甲正儀同亦有加光禄大夫金章紫綬者多帶侍中中常侍此二職神虎門外有朝貴憩息之所時人號為解卸㕔内臣暫放歸休所乘之馬牽至神虎門階然後升騎飛鞭競走數十為羣馬塵必坋諸朝貴爰至唐趙韓駱皆隠㕔趨避不敢有言唐李輔國肅宗初為殿中監嘗在銀臺門受事置察事㕔子數十人官吏有小過無不周知即加推訊府縣按鞫三司制獄必詣輔國取决隨意區分皆稱制勅無敢異議者每出則甲士數百人衞從中貴人不敢呼其官但呼五郎後遷兵部尚書驕恣日甚求為宰相帝曰以公勲力何官不可但未允朝望如何輔國諷僕射裴冕聨章薦巳冕曰吾臂可截宰相不可得也及代宗即位輔國與元振有定策功愈恣横私奏曰大家但内裏坐外事聽老奴處置代宗怒其不遜以方握禁軍不欲遽責乃尊為尚父政無巨細皆委參决程元振代宗初代李輔國判元帥行軍司馬是時元振之權甚於輔國軍中呼為中郎既誣搆襄陽節度使來瑱坐誅宰相裴冕貶施州刺史天下方鎮皆解體元振猶以驕豪自處不顧物議魚朝恩為天下觀軍容察使專典神策軍出入禁中賞賜無算性本凡劣恃勲自伐靡所忌憚時引腐儒及輕薄文士於門下講授經籍作為文章粗能把筆釋義乃大言於朝士之中自謂有文武才幹以邀恩寵代宗優遇之加判國子監事侍詔給錢萬貫充食本以為附學士㕑料朝恩恣横求取無厭凡有奏請以必允為度幸臣未有其比章敬太后忌日百寮於興唐寺行香朝恩置齋饌於寺門外之車坊延宰臣百寮就食朝恩恣口談時政公卿惕息劉清潭為内侍監大厯十年九月代宗命齎金帛萬計宣慰河北諸軍清潭所至躭嗜宴㑹頗稽程期甚沮人望楊志廉徳宗時與孫榮義代竇文塲霍仙鳴為左右軍中尉亦踵竇霍之事怙寵驕恣貪利晉寵之徒利其納賄多附麗之田全操文宗時為辟仗使太和二年五月休祥坊百姓三百人竝於光宅坊西接宰相訴云當坊右龍武軍飛騎地勅賜百姓已久不出地課經今四十年被田全操竝刼徵索逡巡全操命角舷者五十人分捕所訴者遂鬬於通衢良乆方散後數日帝以其地為百姓居業矣不欲仗集因賜左右三軍錢各一千五百貫充當軍給用其休祥坊官地復盡歸於百姓仇士良為左軍中尉開成三年正月甲子宰臣李石遇盜於是石求出鎮除荆南節度使癸未石謝官便發赴鎮石與士良比相疑阻石之遇盜人多疑之以士良摠兵密近恃權恣横帝多姑息之故石忿遂赴鎮錫宴皆不及於嘗等田令孜僖宗時為觀軍容使中和三年天下兵馬都監楊復光卒於河中其部下忠武八都都頭鹿晏𢎞晉暉王建韓建等各以其衆散去復光兄復恭知内樞密令孜以復光立破賊功憚而惡之故賊平賞薄及聞復光死甚恱復擯復恭罷樞密為飛龍使楊復恭昭宗時為内樞密使初復恭以文徳元年冊帝於藩邸及自監國即位恃勲多養假子時帝大政咸訪於宰臣尤忌復恭專柄帝元舅王瓌亦見委任復恭惡其導逹外事奏授瓌黔南觀察使溺於吉柏江後唐楊希朗復恭其叔祖也荘宗時為學士使怙寵用事先是條制為朱氏時權豪強占人田宅或陷害籍沒顯有屈塞者許人自理希朗自復恭獲罪伯仲竄迹太原武宗荘宗時皆中㳙任事至是宦官方盛人皆畏避希朗治復恭之舊業田宅宰相趙光裔留勅不行言復恭謀亂山南顯當國法本朝未經昭洗安得治認田園尤不可與偽朝枉害為比希朗聞之泣訴於帝因令自見光裔言之希朗陳訴十餘紙言吾祖雖獲罪扵前朝當時蓋強臣掣肘國命不繇天子及行喻梟首天子顯降徳音昭雪今制書尚在公博通故事安得謂之未雪予叔祖彥博洎伯仲連為監獲者數人何也漸至聲色極抗光裔方恃名望忽為所折悒悒不樂又以希朗幸臣慮摭他事危不自安病疽而薨張居翰為樞密使時蕭希甫知制誥有詔定内宴樞密使坐宴否希甫以為不可坐居翰聞之怒召希甫責曰據子所言有何按據老夫事過三朝天子逮内宴數百子本田舍兒慿何所見有此横議如有按據郎具奏聞希甫無以對繇是居翰及李紹宏等切齒怒之宰相豆盧革等亦希旨排斥乃以希甫為駕部郎中譴責周官寺人列職於正内漢制常侍分任於黄闥自兹厥後名數寖擾或兼摠扵官常亦間領於兵政若奉命之不謹暨行巳之違方官謗既興吏議攸屬自貽譴累用干刑書采諸簡編咸用論次漢許廣漢武帝時為宦者丞上官桀謀反廣漢部索部分搜索罪人也其殿中廬有索長數丈可以縛人者數千枚滿一箧緘封殿中廬桀所止宿廬舍在宫中者也緘束箧也廣漢索不得它吏往得之須得此繩索者用為桀之反具廣漢論坐為鬼薪輸掖庭石顯元帝時為中黄門累遷中書令成帝即位以顯為長信宫太僕秩中二千石顯失倚離權數月丞相史條奏顯舊惡及其黨牢梁陳順皆免官顯與妻子徙歸故鄉憂懣音悶不食道病死後漢蔡倫和帝時為中常侍累遷長樂太僕倫初受竇后諷旨誣陷安帝祖母宋貴人及帝親萬機勅使自致廷尉倫恥受辱乃沐浴整衣冠飲藥而死籍建安帝時為小黄門監太子家太子廢為濟隂王傅髙梵長秋長趙熹丞良賀藥長夏􅎇皆以無過獲罪建坐徙朔方黄龍為中常侍與楊佗孟叔李建張賢史汎王道李元李剛及阿母宋娥等更相貨賂求髙官増邑又誣罔曹騰孟賁等永和二年發覺竝遣就國减租四分之一貝瑗桓帝時為中常侍封東武陽矦司隸校尉韓演奏瑗兄沛相恭臧罪徴詣廷尉瑗詣獄謝上還東武矦印綬詔貶為都鄉矦卒於家矦覧靈帝時為中常侍累遷長樂太僕熹平元年有司舉奏覧專權驕奢策收印綬自殺阿黨者皆免張譲與趙忠夏惲郭勝孫璋畢嵐栗嵩叚珪髙望張恭韓悝宋典十二人皆為中常侍與張角交通後中常侍封諝徐奏事獨發覺坐誅靈帝因怒詰譲等曰汝曹嘗言黨人欲為不軌皆令禁錮或有伏誅今黨人更為國用汝曹反與張角通為可斬未譲等皆叩頭云故中常侍王甫矦覧所為帝乃止後魏趙黑獻文時為侍御典監藏累遷侍中與選部尚書李訢有隙訢列黑為監藏時多所截没先是法禁寛緩百司所典與官竝食故多所損折遂黜為門士王遇孝文時為中散累遷華州刺史封宕昌矦幽后之前廢也遇頗言其過及後進幸帝對僕射李冲等言申后無咎而稱遇謗議之罪冲言果爾遇合死也帝曰遇舊人未忍盡之當止黜廢耳遂遣御史馳驛免遇官奪其爵收衣冠以民還私第符承祖為侍中知都曹事初文明太后以承祖居腹心之任許以不死之詔後承祖坐贓應死孝文原之命削職禁錮在家授悖義將軍佞濁子月餘遂死王温孝明時為左中郎髙陽王雍既居冢宰慮中人朋黨出為鉅鹿太守唐程元振代宗時為右監門衞大將軍充寳應軍使專掌禁軍吐蕃黨項入犯京畿車駕幸陜州太常博士桺伉上疏切諌請誅元振以謝天下代宗顧人情歸咎乃罷元振官放歸田里及車駕還京元振服縗麻於車中入京城以規任用時與御史大夫王仲昇飲酒為御史所弹詔長流溱州百姓吕如金憲宗時為翰林使元和四年杖四十配恭陵行至閿鄉而卒如金以密書請託於鹽鐡使李㢲故有是責吐突承璀為左軍中尉鎮州王承宗叛以承璀為鎮州以東招撫處置等使及罷兵班師仍為禁軍中尉諌官叚平仲等抗疏極論承璀輕謀弊賦請斬之以謝天下憲宗不獲己降為軍噐庫使俄復為左衛上將軍知内侍省事時弓箭庫使劉希光取羽林大將軍孫璹錢以求方鎮事連承璀出為淮南監軍使吐突士昕敬宗時與武自和俱為中官寳歴二年入新羅取鷹鷂各杖四十剝邑士昕流恭陵自和配南衙咸以受新羅問遺不進獻故也楊文端與李孝温俱為内飬寳歴中送幽州春衣節度使朱克融嫌踈弱執之以聞敬宗特優容别命中人宣諭仍更賜衣服流文端崇陵孝温元陵劉承偕以穆宗長慶中為澤潞監軍頗恃㤙權嘗對衆辱節度使劉悟悟不能平異日有中使至承偕宴之請悟悟欲徃左右皆曰徃則必為其困辱軍衆因亂朝廷不獲己貶承偕楊叔元為興元監軍文宗太和四年興元軍亂殺節度使李絳事因叔元以言激之温造代絳盡殺亂卒叔元擁造靴以請命遣兵衛出以俟朝旨配流康州田獻銛為閤門使咸通十三年國子司業韋殷裕於閤門進狀論郭淑妃弟郭敬述隂事懿宗怒甚杖殺殷裕以獻銛受殷裕狀奪紫配橋陵貪貨夫天象著明四星侍於皇位周官作則五人典於正内沿襲既多登用亦廣増金璫石貂之貴豫紫闈清禁之謀有匪其人不稱是職因縁權寵寖恣驕貪前史必書不無其迹後人斯覧足戒其非齊夙沙衛寺人也魯襄公二年齊矦伐萊萊人使正輿子賂夙沙衛以索馬牛皆百匹索簡擇好也齊師乃還君子是以知齊靈公之為靈也謚法亂而不損曰靈言謚應其行漢石顯為中書令貴幸傾朝賞賜及賂遺訾一萬萬賂遺謂百官羣下賂遺也訾與資同後漢李剛為中常侍順帝即位剛等及中常侍黄龍楊位孟叔李建張賢史汎王道李元九人與阿母山陽君宋娥更相貨賂求髙官増邑髙梵為中常侍坐贓罪减死一等矦覧桓帝初為中常侍以佞猾進倚勢貪放受納財遺以巨萬計王甫為中常侍渤海王悝既貶為癭陶王後因甫求復國許謝錢五千萬桓帝遺詔復為渤海王悝知非甫功不肯還謝錢甫怒隂求其過誣奏大逆迫責自殺張譲為中常侍有監奴典任家事交通貨賂威刑諠赫扶風人孟佗佗音駝資產饒贍與奴朋結傾竭饋問無所遺爱奴咸徳之問佗曰君何所欲力能辦也曰吾望汝曹為我一拜耳時賓客求謁譲者車嘗數百千兩佗時詣譲後至不得進監奴乃率諸蒼頭迎拜於路遂共轝車入門賓客咸驚謂佗善於譲皆爭以􅎇玩賂之佗分以遺譲譲大喜遂以佗為涼州刺史佗字伯朗一云以葡萄酒一斗遺譲譲即拜佗為涼州刺史後魏李堅髙陽易人也宣武初為太僕卿瀛州刺史本州之榮同於王質王質者亦髙陽易人髙祖時為瀛州刺史所在受納家產巨萬劇買奴歴位幽州刺史是時有李豐之徒數人皆被眷寵出入禁闈竝致名位積資巨萬第宅華壯文明太后殂後乃漸衰矣劉騰孝明帝時為秋卿榮陽鄭雲諂事騰貨騰紫纈四百疋得為安州刺史唐牛仙童為内謁者監𤣥宗開元二十七年以坐贓杖殺太子太師蕭嵩坐累貶官制曰王者立法所貴無私有過必懲古之令典太子太師蕭嵩累踐清資嘗居重任身寵茅土家榮姻戚人臣之貴莫二止足之分當知曽不是思乃行非道城南别業地即膏腴畝直千金蓋謂於此遂將數頃輒遺仙童名位若斯恩遇亦甚昵於庸竪更欲何求静言其情深所未諭但乆經任使措在朝廷自不飾觀良用驚聽豈可輔導太子頡頑正人宜從貶出以肅紀綱可青州刺史仙童又與幽州節度使張守珪財貨交通制曰張守珪本自戎行夙承任遇去歳軍務失實乃命謁者監牛仙童宣諭朕意輒便結託凡細令其詭詞賂以百金兼之數口恐懼邊塞或容茍求遣謁軒墀何不早自披露用兹奉國曷以為顔猶念舊勲俾從寛典可括州刺史輔璆琳天寳末宰相楊國忠韋見素等陳安禄山反狀𤣥宗濳使璆琳送柑子於范陽賜禄山私候其狀璆琳受其重賂還固稱無事後賄賂事泄𤣥宗怒因祭龍堂遣備諸供責以不䖍遂命左右撲殺之馬日新為内常侍代宗廣徳中江左右荒詔日新領汴滑軍五千人鎮之日新貪暴賊蕭廷蘭時人怨訴逐之而刼其衆邵光超徳宗初加李希烈淮南節度使令光超授之節希烈遺之僕馬及縑七百疋事發杖六十配流自兵興以來中貴用事宣傳詔命於四方不禁其求取既鞭邵光超四方節度有以曩例賂中官者皆不敢受朱如玉爲内給事貞元初使於闐國得大珪一玉珂珮五副玉枕一玉𢃄胯靴𢃄胯各三百具玉簮四十枝玉合三十玉釧十具杵三及瑟瑟三百斤幷金銀寳刀劔􅈿藥等如玉稱是假道回紇遂隠藏之奏曰悉為回紇所奪及是為其下所發搜獲在法絞論減死杖一百流恩州薛盈珍憲宗元和中代北營田水運使薛謇善畜牧有良馬時以賂中貴人盈珍有權力於元和初謇以族人附進盈珍頗延謇以助之故自泗州刺史遷福建觀察使朱超晏王志忠皆品官為五坊監多縱鷹隼入富人家廣有求取憲宗知之立召晏忠二人笞二十奪其職劉希光元和中為弓箭庫使受羽林將軍孫璹之錢二十萬為求方鎮又每年嘗受靈武庫衣糧六十分事發賜死籍其家財吐突士昕武自和皆中使也敬宗寳歴初入新羅取鷹鷂咸受其問遺不以進獻各杖四十剝邑士昕流恭陵自和配南衙王踐言為四川監軍節度使李徳裕加徵疲人三十萬貫緡因踐言赴闕盡以餞行及踐言為樞密使徳裕果為宰相李國澄為大原監軍時李徳裕為本府司録叅軍時謂國澄曰何不以近貴取事而自滯於外閫乎國澄曰豈所不欲其如貧何乃許借錢十萬貫促國澄赴闕國澄初為未信及至闕咸如其諾尋除中尉遂為中人所稱册府元龜卷六百六十九
