body:
  text: 册府元龜卷六百六十二宋王欽若等撰奉使部便宜請行絶域便宜傳曰君之使臣也任之以事不制之以辭故古者大夫出疆有可以安國家利社稷專之可也漢氏之後乃有將命於外臨事有謀應變决機周物成務克寧閫外之政善救民家之急或興功利以佐用度或宣威罰以誅暴横乃至發屬國之兵收功於異域草幕府之檄揚威於鄰境置戍以禦羣盜矯命以全舊勲斯固誠心之所存本於利國王事之靡盬彰乎匪躬者焉漢陳平為䕶軍中尉從高祖擊黥布還至長安燕王盧綰反帝使樊噲以相國將兵擊之既行人有短惡者陳其短失過惡於上譖毁之帝怒曰噲見吾病時高祖病瘡迺㡬我死也㡬幸我死也㡬音冀用平計召絳侯周勃受詔床下曰陳平乘馳傳載勃代噲將傳音張戀切平至軍中即斬噲頭二人既受詔馳傳未至軍行計曰樊噲帝之故人功多行計謂於道中且計也又吕后弟吕須夫有親且貴帝以忿怒故欲斬之即恐後悔寧囚而致上令上自誅之未至軍為壇以節召樊噲噲受詔即反接反縳兩手也載檻車詣長安而令周勃代將公孫遂前為濟南太守時左將軍荀彘樓舩將軍楊僕征朝鮮兩將乖異以故乆不決武帝使遂徃征之有便宜得以從事遂至左將軍曰朝鮮當下乆矣不下樓舩數期不㑹具以素所意告遂曰今如是不取恐為大害非獨樓舩又且與朝鮮共滅吾軍遂亦以為然而以節召樓舩將軍入左將軍軍計事即令左將軍戲下執縛樓舩將軍并其軍以報汲黯為謁者時河内失火燒千餘家武帝使黯徃視之還報曰家人失火屋比延燒比近也言屋相近故連延而燒也比音頻寐切不足憂臣過河内河内貧人傷水旱萬餘家或父子相食臣謹以便宜持節發河内倉粟以賑貧民請歸節伏矯制罪矯託也託奉制詔而行之帝賢而釋之徐偃為博士使行風俗偃矯制矯託也託言受詔也使膠東魯國鼓鑄鹽鐡鑄銅鐡扇熾人謂之鼓還奏事徙為太常丞事具憲官弹劾門終軍為謁者使行郡國所見便宜以聞還奏事武帝甚悦馮奉世為郎先是漢數出使西域多辱命不稱或貪汙為外國所苦苦謂困辱之是時烏孫大有擊匈奴之功而西域諸國新輯輯與集同和也漢方善遇欲以安之選可使外國者前將軍韓増舉奉世以衞侯使節送大宛諸國客至伊修城在鄯善國漢於其中置屯田也都尉宋將言莎車與旁國兵攻殺漢所置莎車王萬年莎車國名萬年其王名并殺漢使者奚充國時匈奴大發兵攻車師城不能下而去莎車遣使揚言北道諸國已屬匈奴矣於是攻刼南道與㰱盟畔漢從鄯善以西皆絶不通鄯音善都䕶鄭吉挍尉司馬意皆在北道諸國間奉世與其副嚴昌計以為不亟擊之則莎車日彊亟急也音居力切其勢難制必危西域遂以節諭諸國王以發其兵南北道合萬五千人進擊莎車攻㧞其城莎車王自殺傳其首詣長安諸國悉平威振西域奉世乃罷兵以聞宣帝召見韓増曰賀將軍所舉得其人奉世遂西至大宛大宛聞其斬莎車王敬之異於他使得其名馬象龍而還言馬形似龍者常惠為挍尉持節䕶烏孫兵擊匈奴宣帝以惠奉使克䕶封長羅侯復遣惠持金幣還賜烏孫貴人有功者惠因奏請龜兹國嘗殺挍尉賴丹未伏誅請便道擊之帝不許大將軍霍光風惠以便宜從事所至專命而行也風讀曰諷惠與吏士五百人俱至烏孫還發西國兵二萬人令副使發龜兹東國二萬人烏孫兵七千人從三面攻龜兹兵未合先遣人責其王以前殺漢使狀王謝曰乃我先王時為貴人姑翼所誤耳我無罪惠曰既如此縛姑翼來吾置王置猶放也王執姑翼詣惠惠斬之而還後漢杜詩建武初為侍御史安集雒陽時將軍蕭廣放縱兵士暴横民間百姓惶擾詩勑曉不改遂格殺廣還以狀聞光武召見賜以棨㦸棨㦸前驅之器也以木為之後代以赤油韜之謂之油㦸王公以下通用之鍾離意辟大司徒侯霸府詔部送徒詣河内時冷寒徒病不能行路過𢎞農意輙移屬縣使作徒衣縣不得已與之而上書言狀意亦具以聞光武得奏以見霸曰君所使掾何乃仁於用心誠良使也宋均為謁者㑹武陵蠻反圍武威將軍劉尚光武詔使均乘傳發江夏奔命三千人擢選精勇聞命奔走謂之奔也徃救之既至而尚已殁時㑹伏波將軍馬援至詔令均監軍與諸將俱進賊拒抗不得前及馬援卒於師軍士多温濕疾病死者大半均慮軍遂不反乃與諸將議曰今道遠士病不可以戰欲權承制降之何如諸將皆伏地莫敢應均曰夫忠臣出境有可以安國家專之可也乃矯制調伏波司馬吕种守沅陵長命种奉詔書入虜營告以恩信因勒兵隨其後蠻夷震懼即共斬其大帥而降於是入賊營散其衆遣歸本郡為置長吏而還均未至先自劾矯制之罪光武嘉其功迎賜以金帛令過家上冡其後每有四方異議數訪問焉樊凖和帝時為光禄大夫使冀州到部開倉廩食慰安生業流人咸得蘇息王誧為議郎獻帝建安二年奉詔書以孫䇿為騎都尉襲爵烏程侯領㑹稽守䇿自以統領兵馬但以騎都尉領郡為甚輕欲得將軍號乃使人諷誧誧便承制假䇿明漢將軍賈逵為太祖丞相主簿太祖征劉備先遣逵至斜谷觀形勢逄水衡載囚人數十車逵以軍事急輙竟重者一人皆放其餘太祖善之拜諫議大夫與夏侯尚並掌軍計荀禹為治書侍御史慰勞邊方時眀帝始即位吳孫權攻江夏郡太守文聘堅守禹到江夏發所經縣兵及所從歩騎千人乘山舉火權退走晉劉頌為文帝丞相府掾奉使于蜀時蜀新平人饑土荒頌表求賑貸不待報而行宋沈演之為司徒左西掾文帝元嘉十二年東諸郡大水人民饑饉以演之廵行拯恤許以便宜從事演之乃開倉廩以賑饑民民有生子口賜米一斗刑獄有疑枉悉制遣之百姓蒙頼轉别駕從事後魏辛子馥為太尉府司馬長白山連接三齊瑕丘數州之界多有盗賊子馥受使簡覆因辨山谷要害宜立鎭戍之所又諸州豪右在山鼓鑄姦黨多依之又得密造兵仗亦請破罷諸冶朝廷善而從之北齊張纂為高祖行臺右丞從征王璧大軍將還山東行逹晉州忽値寒雨士卒饑凍至有死者州以邊禁不聽入城于時纂為别使遇見輙令開城内之分寄民家給其火食多所全濟高祖聞而善之唐邕為大司農武成河清元年突厥來宼遣邕驛赴晉陽纂集兵馬在路聞虜將逼邕斟酌事宜改勑更促期㑹繇此兵士限前畢集白建為大丞相騎兵叅軍河清三年突厥入境代忻牧悉是細馬合數萬匹在五臺山栢谷中避賊經二十餘日賊退後勑建就彼簡較續遣使人詣建間領馬送定州付民飬飼建以馬乆不得食瘦弱遠送恐多死損遂違勑以便宜從事隨近散付軍人啓知勑許焉戎乘無損建有力焉後周桞帶韋為太祖丞相參軍時侯景作亂江右太祖令帶韋使江郢二州與梁邵陵南平二王通好行至安州値假寳等反帶韋乃矯為太祖書以撫安之並即附降既至郢見邵陵具申太祖意邵陵使遂帶韋報命以奉使稱㫖授輔國將軍中散大夫唐魏徴貞觀初為諫議大夫奉使安輯河北許以便宜從事徵謂副使李桐客曰吾等受命之日前宫齊府左右皆令赦原不問今復送思行此外誰不自疑徒遣使徃彼必不信此乃差之毫釐失之千里且公家之利知無不為寧可累身不可廢國家之大計今若釋遣思行不問其罪則信義所感無遠不臻古者大夫出疆茍利社稷專之可也况今日之行許以便宜從事主上既以國士見待安可不以國士報之乎既釋遣思行等仍以啓聞太宗甚悦裴行儉為吏部侍郎儀鳳中高宗聞吐蕃贊普卒而嗣主未立詔行儉為安撫使乘間經畧之行儉以贊普新立復委政於欽陵未有間隙乃止嗣虢王巨天寳末為河南節度使兼統領南陽節度事時有詔貶南陽節度使魯炤為東毅巨奏曰若魯能存城其功足以補過則何以處之𤣥宗曰卿隨宜處置之巨至内鄉趣南陽賊將畢深聞之解圍走巨使追何履光趙國珎同至南陽宣勑貶魯削其章服令隨軍効力至日晩以恩命命魯復位栢耆為諫議大夫代宗大厯初横海軍節度使李全畧卒子同㨗為副大使居喪擅領留後仍重賂藩鄰以求纘襲詔授同㨗兖海節度使以天平節度烏重裔為滄州節度以代之詔下同㨗託以三軍乞留拒命乃命重裔率鄆濟兵加討鎭州王廷湊本畜狼心欲吞横海乃出兵於境以赴同㨗同㨗既窘王廷湊援之至慈州遇前宫千牛李志安齊王䕶軍李思行錮送詣京師徴不及又詔以李祐代為横海節度三年三月詔耆軍前慰撫四月李祐收德州同㨗乞降於祐祐疑其詐耆請以騎兵三百入滄州祐從之耆徑入滄州取同㨗與其家屬赴京師其月二十六日至德州界諜言廷湊兵來刼簒耆乃斬同㨗首傳而獻㨗百寮稱賀孔巢父德宗時為給事中魏博宣慰使田悦背叛日乆其下厭亂且喜巢父之至數日田承嗣之子緒以失職怨望因人心之揺動遂搆謀殺悦而與大將邢曹俊等禀命巢父巢父因其衆意令曰緒權知軍務以紓其難請行古之王者在經綸之際志滅宼戎當臨御之初思拓土宇莫不採折衝之謀延離合之士則可以屈人之兵而舉無遺筭也故有奮忠誠騁飛辯請以一介之使宣乎萬乘之威發應對以應變蹈危機而制勝俾梟雄革心殊俗請吏垂諸竹素亦士之難能也漢隨何為漢王謁者漢王與楚大戰彭城不利出梁地至虞今宋州虞城縣謂左右曰彼等皆無足與計天下事者何進曰不審陛下所謂漢王曰孰能為我使淮南使之發兵背楚留項王於齊數月我之取天下可以萬全何曰臣請使之乃與二十人俱使淮南張騫漢中人武帝建元中為郎時匈奴降者言匈奴破月氏王以其頭為飲器月氏遁而怨匈奴無與共擊之無人援助也漢方欲事胡聞此言欲通使道必更匈奴中廼募能使者騫以郎應募使月氏與堂邑氏奴丼父堂邑姓也漢人其奴名丼父一云堂邑之奴本胡人名丼父下云堂邑父者葢取主之姓以為氏而單稱其名曰父俱出隴西終軍武帝時為謁者當發使匈奴漢朝欲遣人為使於匈奴也軍自請曰臣無横草之功言行草中使草偃卧故云横草也得列宿衛食禄五年邊境時有風塵之警臣宜被堅執鋭當矢石啓前行駑下不習金革之事今聞將遣匈奴使者臣願盡精厲氣奉佐明使畫吉凶於單于之前臣年少材下孤於外官孤遠也外官謂非侍衛之臣也不足以亢一方之任亢當也竊不勝憤懣詔問畫吉凶之狀帝竒軍對擢為諫議大夫南越與漢和親廼遣軍使南越路温舒為右扶風丞武帝詔書令公卿選可使匈奴者温舒上書願給厮飬暴骨方外求為卒而隨使至匈奴也以盡臣節事下度遼將軍范明友太僕杜延年問狀罷歸故官以其言無可取故罷而遣歸故官江充趙國邯鄲人武帝召見大䑓宫既至前問以當世政事帝悦之充因自請願使匈奴詔問其狀充對曰因變制宜以敵為師事不可豫圖帝以充為謁者使匈奴傅介子北地人昭帝時以從軍為官先是龜兹樓蘭皆嘗殺漢使者至元鳳中介子以駿馬監求使大宛因詔令責樓蘭龜兹國陳湯元帝時以薦為郎數求使外國乆之遷西域副較尉與丼延壽俱出班伯為奉車都尉家本北邊志節忼慨數求使匈奴河平中單于來朝成帝使北持節迎於塞下後漢來歙建武初為太中大夫是時光武方以隴蜀為憂獨謂歙曰今西州未附西州謂隗囂也子陽稱帝子陽公孫述字道途阻遠諸將方務關東思西州方畧未知所任其謀若何歙因自請曰臣嘗與隗囂相遇長安其人始起以漢為名今陛下聖德隆興臣願得奉威命開以丹青之信囂必束手自歸則述自亡之勢不足圖也帝然之三年乃以歙使隗囂蜀諸葛亮初從先主在樊聞荆州劉琮已降曹公遂率衆南行為曹公所追破先主至於夏口亮曰事急矣請奉命求救於孫將軍吳大帝也及至吳即遣水軍三萬隨亮詣先主吳魯肅初事大帝以荆州劉表死進説曰夫荆楚與國鄰接水流順北外帶江漢内阻山陵有金城之固沃野千里士民殷富若據而有之此帝王之資也今表新亡二子素不輯睦軍中諸將各有彼此加劉備天下梟雄與操有隙寄寓於表表惡其能而不能用也若備與彼恊心上下齊同則宜撫安與結盟好如有離違宜别圖之以濟大事肅請得奉命弔表二子并慰勞其軍中用事者及説備使撫表衆同心一意共拒曹操備必喜而從命如其克諧天下可定也今不速徃恐為曹所先帝即遣肅行到夏口聞曹公已向荆州晨夜兼道比至南郡而表子琮已降曹公後魏鹿悆為殿中侍御史監臨淮王彧軍時梁遣其豫章王綜鎭徐州綜密信通彧云欲歸欵綜梁帝愛子衆子咸為不然彧募人入報驗其虚實悆遂請行曰若綜有誠心與之盟約如其詐也豈惜一人命乎隋高熲為高祖相府司録時劉昉為司馬鄭譯為長史尉遲迥起兵高祖令韋孝寛討之至武陟諸將不一高祖欲遣昉譯一人徃監軍因謂之曰須得心膂以綂大軍公等兩人誰當行者昉自言未嘗為將譯又以母老為請高祖不懌熲遂請行深合上㫖遂遣之陸知命開皇中為儀同三司數年不得調詣朝堂上表請使高麗曰臣聞聖人當扆物色芻蕘匹夫奔踶或陳狂瞽伏願蹔輟旒纊覽臣所謁昔軒轅御厯既緩夙沙之誅虞舜握圖猶稽有苖之伐陛下當百代之末膺千載之期四海廓清三邊底定惟高麗小竪狼顧燕垂王度含𢎞每懷遵養者良繇惡殺好生欲諭之以德也臣請以一節宣示皇風使彼君臣面縛闕下書奏天子異之唐蔣儼貞觀中為右屯衞兵曹叅軍太宗將征遼東募使高麗者衆皆畏憚儼謂人曰主上雄畧華夷畏威高麗小蕃豈敢圖其使者縱其凌虐亦是吾死所也遂出請行及至高麗莫離支置於窟室脅以兵刅終不屈撓㑹高麗敗得歸太宗竒之拜朝散大夫喬寳明為紀王府叅軍太宗征遼寳明以乘輿暴露堅城之下賊乆末平不勝其憤因至長安為司空房𤣥齡陳取高麗之算𤣥齡表送詣行在謁太宗與語甚竒之謂曰今安市不降平壤尚遠我慮三軍寒凍已命班師卿既遠來今者欲陳何䇿寳眀曰昔魯連飛矢而燕將死陸賈使越而趙佗順臣願將命平壤申諭高麗承駐蹕之後心膽破裂臣得進説其必靣縛而自致耳若懷不遜臣請為傅介子斷蘇文之首以降其國太宗壯其言曰我之求人甚於人之求禄如卿之軰終不投之死地也於是引寳眀叅侍從之列尋守通事舍人吳漵章敬皇后之弟建中初為左金吾大將軍時涇原兵叛德宗幸奉天盧杞白志貞稱朱泚必當向順固無背叛之事帝擇大臣可使者衆憚其行漵歎息謂親友曰國難不能死非人臣也吾忝恩戚知死所矣遂請使焉栢耆將軍良器之子素負志畧學縱横家流憲宗元和中王承宗以常山叛朝庭厭兵欲以恩澤撫之耆於蔡州行營以畫千裴度請以朝㫖奉使鎭州乃自處士充左拾遺充使絶域王者文眀之治既成於中震叠之威將加乎外思布皇澤必選竒材若乃經畧遠夷懷柔絶域一介而徃單車載馳齎三歳之糧通百金之貨泛浮金没羽之水歴沍寒多雨之國窮山川之源覽氣象之異至於飲食非䫫言語靡通道閉不開兵阻攸隔而能罔憚回遠志期宣導莫不愼乃風操奉其幣帛以結於驩好以致其琛賮至於死亡畧盡星紀屢周握節而歸不辱王命非乎心比金石志在功名者豈及此哉漢婁敬高祖時為中郎號奉春君高祖取家人子為公主妻單于使敬徃結和親張騫為郎武帝遣使通西域使月支行時百餘人去十三歳唯二人得還騫身所至者大宛大月氏大夏康居而傳聞旁大國五六具為天子言其地形所有土地之形及所生之物也吕越人武帝時與王然于栢始昌等十餘軰間出西南夷求間隙而出也指求身毒國王滇滇王當羗迺留為求道當羗滇王名四歳餘皆閉昆明莫能通為昆明所閉塞後南粤破使王然于以粤破及誅南夷兵威風諭滇王入朝司馬相如字長卿武帝時為郎唐蒙已略通夜郎因通西南夷道發巴蜀廣漢卒作者數萬人治道二歳道不成士卒多物故物故死也費以億萬計蜀民及漢用事者多言其不便帝乃召相如為中郎將建節徃使副使者王然于壺充國吕越人馳四乘之傳因巴蜀吏幣物以賂西南夷相如使畧定西南夷卭筰冉駹斯榆之君皆請為臣妾除邊關益斥西至沫若水沫水出蜀廣平徼外若水出旄牛徼外南至牂牁為徼徼以木石水為界斯榆之君等自求去邊關欲與牂牁作徼塞也通靈山道橋孫水鑿開靈山道孫水出臺登縣南至㑹无入若水於孫水上作橋也以通卭筰還報天子大悦王烏北地人元鼎中匈奴數使使好辭丼言求和親漢又使楊信使於匈奴楊信既歸漢使烏等如匃奴匃奴復讇以丼言紿烏曰吾欲入漢見天子靣結為兄弟烏歸報漢漢為單于築邸于長安蘇武為栘中廐監時匈奴留使郭吉路充國等匃奴使來漢亦留之天漢元年且鞮侯單于初立盡歸漢使路充國等武帝嘉其義乃遣武以中郎將持節送匈奴使留在漢者武與副中郎將張勝及假吏常惠募士斥候百餘人俱常惠太原人少時家貧自奮應募隨蘇武使匈奴昭帝時乃還宣帝本始二年使烏孫其後復遣惠持金幣賜烏孫貴人有功者王忠為光禄大夫以馬宏為副使西國文忠為關内尉時罽賔遣使奉獻漢使忠送其使其後軍侯使罽賔奚充國宣帝時為使者送烏孫公主小子萬年為莎車王馮奉世宣帝時以衞侯使持節送大宛諸國客至伊修城魏和意宣帝時為衞司馬副侯任昌送烏孫侍子竺次為謁者宣帝遣次以期門丼延壽為副送烏孫楚主侍者馮夫人馮夫人錦車持節立楚主子元貴靡為大昆彌樂奉為侍郎宣帝時烏孫公主遣女至京師學鼓琴漢遣奉送主女過龜兹殷廣徳為侍郎宣帝時車師王奔烏孫烏孫留不遣漢遣廣德責烏孫求車師王董忠為長樂衞尉宣帝丼露三年單于來朝遣歸國漢遣忠與車騎都尉韓昌將騎一萬六千送單于出朔方鷄鹿塞詔忠等留衞單于助誅不服元帝即位漢復遣韓昌光禄大夫張猛送呼寒邪單于侍子夏侯蕃為中郎將成帝綏和元年漢遣蕃副較尉韓容使匈奴韓况為中郎將哀帝元壽二年單于來朝遣况送之單于出塞到休屯井北度車田盧水道里回遠况等乏食單于乃給其糧失期不還五十餘日王咸濟南人王莾前誅單于侍子登莾天鳳二年單于既和親莾選儒生能顓對者以咸為大使五咸將軍琅邪伏黯等為帥使送登屍敕令掘單于知墓棘鞭其屍又令匈奴却塞於漢北止責單于馬萬匹牛三萬羊十萬頭及稍所畧邊民生口在者皆還之莾好為大言如此咸到單于庭陳莾威德責單于背畔之罪應敵縱横單于不能詘遂致命而還咸入塞病死陳遵為河南尹免官更始至長安大臣薦遵為大司焉䕶軍與歸德侯劉颯使匈奴匈奴亦遣使來獻漢復令綂報命叚郴田吟切為中郎將建武二十六年南單于遣使詣闕奉稱蕃臣遣郴副挍尉王郁使南單于三十一年單于薨郴將兵赴弔祭以酒米鄭衆為越騎司馬明帝永平八年北單于遣使來朝命衆北使報命甘英為西域都䕶班超掾和帝永元九年超遣英使大秦抵條支臨大海欲渡而安息西界舩人謂英曰海水廣大徃來者逢善風三月乃得渡若遇遲風亦有三歳者故入海人皆齎三歳糧海中善使人思土戀慕數有死亡者英聞之乃止皆前世所不至山經所未詳莫不備其風土傳其珎怪焉蜀馬良為侍中時東征吳遣良入武陵招納五溪蠻夷蠻夷渠帥皆受印號吳康㤗為中郎使扶南先是漢和帝時天竺數遣使貢獻魏晉絶不復通唯吳時扶南王范旃遣親人蘇勿使其國從南發投拘利口循海大湾中正西北入歴言邊數國可一年餘到天竺江口逆水行七千里乃至焉天竺王驚曰海極遠猶有此人乎即令觀視國内仍差陳宋等二人以月支馬四匹報旃遣勿等還積四年方至其時㤗使扶南乃見陳宋等具問天竺土俗云佛道所興也劉咸㑹稽人為吏黄武五年有大秦賈人秦論來到交趾太守劉邈遣送詣大帝大帝問方土謡俗論具以事對時諸葛恪討丹陽獲黝歙短人論見之曰大秦希見此人大帝以男女各十人差咸送論咸於道物故論乃徑還本國南齊江景𤣥為益州刺史劉悛使丁零宣國威徳道經鄯善于闐鄯善為丁零所破人民散盡于闐尤信佛法丁零借稱天子勞接景𤣥使反命茵芮嘗繇河南道而抵益州後魏高徽宣武延昌中假員外散騎常侍使於嚈噠西域諸國莫不敬憚之破雒侯烏孫並因之以獻名馬劉長文為大鴻臚卿持䇿拜高麗王安孫紹孝明正光初兼中書侍郎使高麗元孚從出帝入關為司空兼尚書令太保時蠕蠕主與孚相識先請見孚然後遣女于是乃使孚行蠕蠕君臣見孚莫不歡悦奉皇后來歸北齊斛律羗舉為東夏州刺史時高祖欲招懷遠夷令羗舉使於阿至羅宣揚威德前後稱㫖甚被知賞張纂為右光禄大夫使於茹茹後周庫狄峙初為西魏黄門侍郎時與東魏爭衡蠕蠕乘虚屢為邊患朝議欲結和親乃使峙徃王慶為將軍使吐渾與其分疆仍論和好之事隋元暉初仕後周為武伯下大夫時突厥屢為㓂患朝廷時結和親令齎錦綵十萬使于突厥長孫晟初仕後周為司衞上士宣帝時突厥攝圖請婚于周以趙王招女妻之然周與攝圖各相誇競妙選驍勇以充使者因遣晟副汝南公宇文慶送千金公主至于其牙前後使者數十軰攝圖多不禮見晟而獨愛焉開皇四年為奉車都尉副虞慶則使於攝圖七年攝圖死晟持節拜其弟處羅侯莫何可汗八年處羅侯死又遣晟徃弔十三年又使焉辛彦之仕周為開府儀同三司奉使迎突厥皇后賀若誼仕周為直閣將軍嘗使詣杏城屬茹茹種落携貳齊遣其舍人楊暢結好於茹茹太祖恐其并力為邊境之患使誼聘茹茹誼因㗖以厚利茹茹信之遂與周連和執暢付誼太祖嘉之長孫平為工部尚書時突厥逹頭可汗與都監可汗相攻各遣使請援高祖使平持節宣諭令其和解賜縑三百疋良馬一匹而遣之平至突厥所為陳利害遂各解兵柳謇之為光禄少卿時吐谷渾來降朝廷以宗女光化公主妻之以謇之兼散騎常侍送公主於西域俄而突厥啓民可汗求結和親復令謇之送義成公主於突厥杜行滿為司𨽻從事煬帝即位之後遣行滿使於西域至安國得五色鹽而返常駿為屯田主事煬帝即位募能通絶域者大業三年駿與虞部主事王君政等請使赤土帝大悦賜駿等帛各百疋時服一襲而遣齎物五千叚以賜赤土王其年十月駿等自南海郡乘舟晝夜二旬每値便風至焦石山而過東南泊陵伽鉢拔多洲西與林邑相對上有神祠焉又南行至獅子島自是島於赤土又行二三日西望見狼牙須國之山於是南逹鷄籠島於赤土之界其王遣婆羅門鳩摩羅以舩三十艘來迎吹蠡擊鼓以樂隋使進金鏁以纜駿舩月餘至其都王遣其子那邪迦請與駿等禮見先遣人送金盤貯香花并鏡鑷金合二枚貯香油金瓶八枚貯香水白疊布四條以擬供使者盥洗其日未時那邪迦又將象二頭持孔葢以迎使人并致金花金盤以籍詔凾男女百人奏蠡鼓婆羅門二人道路至王宫駿等奉詔上閤王以下皆坐宣詔訖引駿等坐奏天竺樂事畢駿等還舘又遣婆羅門就舘送食以草葉為盤其大方丈因謂駿曰今是大國中人非復赤土國矣飲食踈薄願為大國意而食之後日請駿等入宴儀衞導從如初見之禮王前設兩牀牀上並設草葉盤方一丈五尺上有黄白紫赤四色之餅牛羊魚鼈猪蝳蝐之肉百餘品延駿升牀從者坐於北席各以金鍾置酒女樂迭奏禮儀甚厚尋遣那邪迦隨駿貢方物并獻金芙蓉冠龍腦香以鑄金為多羅葉隱起成文以為表金凾封之令婆羅門以香花奏蠡鼓而送之既入海見緑魚羣飛水上浮海上十餘日至林邑東南並山而行其海水濶千餘歩色黄氣腥舟行一日不絶云是大魚糞也循海北岸逹於交阯駿以六年春與那耶迦於𢎞農謁帝帝大悦賜駿等物二百叚俱授秉義尉迦那等官賞各有差裴清為文林郎煬帝遣清使於倭國渡百濟行至竹島南望躭羅國經都斯麻國迥在大海中又東至月支國又至竹斯國又至東秦王國其人同於華夏以為夷洲疑不能明也又經十餘國逹於海岸自竹斯國以東皆附庸於倭王韋節為侍御史與司𨽻從事杜行滿使於西藩諸國至罽賔得碼碯杯王舍城得佛經史國得十儛女獅子皮䑕毛而還唐劉文靜為晉陽司馬高祖起義文靜請連突厥以益兵威高祖因遣文靜使于始畢可汗襄武公琛與太常卿鄭允璠齎女妓遺突厥始畢可汗以結和親高表仁為新州刺史貞觀中倭國朝貢太宗矜其道遠詔所司無令歳貢又遣表仁持節撫之表仁浮海數月方至云路經地獄之門親見其上氣色葱欝有烟火之狀若爐錘號呌之聲行者聞之莫不危懼郭元振為通泉尉則天聞其名召見與語甚竒之時吐蕃請和乃授元振右武衞鎧曹充使聘於吐蕃蕭斯為右散騎常侍武宗大歴九年為回鶻宣尉使崔漢衡以檢校禮部員外郎大歴六年為和吐蕃副使還遷右司郎中後為鴻臚卿建中四年加簡較工部尚書復使吐蕃韋倫為郴州防禦使坐事貶隋州司馬建中初德宗選堪使絶域者擢拜倫太常少卿兼中丞持節充通和吐蕃使倫至蕃中宣諭皇恩次述國家威德遠振蕃人大悦贊普入獻方物使還遷太常卿再入吐蕃西蕃畏服樊澤為都官員外郎充和蕃使蕃中用事宰相尚結贊深禮之于頔以櫟陽主簿攝監察御史充入蕃使判官後為司門員外郎兼侍御史充西蕃計㑹使張薦為太常博士貞元四年廻紇求和親使送咸安公主入廻紇以薦為判官改授殿中侍御史累遷諫議大夫十一年册廻紇可汗薦以秘書少監持節為使還乆之遷秘書監二十年吐蕃贊普死以薦為工部侍郎兼御史大夫持節徃弔贈卒於赤嶺東紇辟驛吐蕃傳歸其柩順宗即位贈禮部尚書前後三使異國袁滋為祠部郎中兼御史中丞充册南詔使及還以清平官尹輔酋來朝吕温為左拾遺貞元二十年副工部侍郎張薦為入吐蕃使吐蕃以中國喪禍留温經年武少儀為太常少卿元和四年命少儀兼御史中丞持節充册立南詔及弔祭使先是諫議大夫叚平仲充使繼命諫議大夫吕元膺充湖南江西宣慰使議者以為諫議盡去慮乖大體繇是元膺行平仲繼止乃遣少儀殷侑為太常博士元和中廻紇請和憲宗仍命宗正少卿李孝誠奉使宣命以侑為副鄭權為右散騎常侍長慶二年自回鶻告哀回穆宗初即位欲重其使以權嘗歴顯位器質魁偉有詞辨可以將命故選任之至虜庭詞氣頗得使臣之體虜衆敬憚焉劉元鼎為大理卿長慶二年自吐蕃使還對於麟德殿奏徃來渡黄河上流在洪濟橋去西南十餘里其水極為淺狹春可掲渉秋夏則以舩渡其南三百餘里有三山形如􅌯河源在其間水甚清冷流出六十里然經一赤岸長五十餘里土色如頳河流經歴水色遂赤續為諸水所注漸就黄濁又其源西去蕃云烈舘約四驛每驛約二百餘里東北去莫賀延磧尾約五百餘里其磧尾濶五十里向南漸狹小北自沙州之西乃南入吐渾國至北轉㣲故號磧尾計其地理當劔南之直西元鼎初見贊普於悶但盧川葢贊普夏衙之所其川在邏婆川南百里臧河之所流也李從易為宗正少卿文宗太和四年兼御史中丞賜紫金魚袋充入吐蕃答賀正使後唐李彦楷為供奉官明宗天成元年與高品李光裕使雲南烏昭遠為左金吾衞將軍天成二年以昭遠守左衞上將軍充入蠻國信使册府元龜卷六百六十二
