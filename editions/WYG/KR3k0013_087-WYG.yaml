body:
  text: 册府元龜卷八十七宋王欽若等撰帝王部赦宥第六唐肅宗至徳元年七月甲子即位於靈武御南門下詔曰朕聞聖人畏天命者奉天時知皇靈眷命不敢違而去之知厯數有歸不獲已而當之在昔帝王靡不繇斯而有天下者也乃者羯胡亂常京闕失守天未悔禍羣兇尚扇聖皇久厭天位思𫝊𦕈身軍興之初已有成命予恐不徳罔敢祗承今羣公卿士僉曰孝莫大於繼徳功莫大於中興朕所以理兵朔方将殄㓂逆務以大者本其孝乎須安兆庶之心敬順羣臣之請乃以七月癸丑朔十二日甲子即皇帝位於靈州崇徽號上尊聖皇曰上皇天帝所司擇日昭告於上帝朕以薄徳謬當重任既展承天之禮宜覃率土之澤可大赦天下改元曰至徳大辟罪己下常赦所不免者咸赦除之其逆賊李林甫王鉷楊國忠近親合累者不在免限百姓官吏能率親屬去逆歸順者有官加其優奨斬得逆賊父子不問首從當錫茅土别有褒崇其直言極諫才堪牧宰文詞博達武藝絶倫孝悌力田沉淪草澤委所在長官聞薦􅍗闕自陳者亦聴東宫官屬既㑹昌期合承寵命量加改轉諸色勾徴逋租懸調及官錢在百姓腹内並宜免放靈州改為靈武郡大都督府上縣為望中縣為上官寮等一切便授天下耆夀各賜物五段侍老版授太守縣令有差各賜物五段諸道百姓委本道採訪使差郡縣存問四方将士各賜馬一匹六品已下賜物十段天下寺觀度七人太守並限三考然後轉御史取曽任郡縣理人官者後可薦用所有彈奏一依貞觀故事官吏枉法犯贓終身勿齒自古聖帝明王忠臣烈士五嶽四瀆名山大川並令所在致祭孝子順孫義夫節婦旌表門閭内外文武官九品已下各賜兩階賜勲兩轉三品已上賜爵一級二年十二月戊午御丹鳳樓門下詔曰軒轅有版泉之戰堯帝有丹水之師湯有葛伯不祀周有獫狁孔熾古之王者奉若天命違道不敢不正干紀不得不誅日者逆胡猖狂敢行稱亂朕嗣守鴻業欽承睿圖枕戈嘗膽撫劒泣血罔不夙夜若渉春氷賴天地疾威社稷憑怒上皇丕烈萬國永懐因時致討為人請命繇是義夫奮發回紇籍兵邦圻闗輔之士汧隴河湟之衆沙朔羌戍之騎微盧蠻貊之人萬里雲超四方霧合既張我伐咸乃一心蠢兹蜂蠆之餘尚負螳蜋之力自京南合戰雒北追奔百萬摧鋒一戍而定昔夏以有竆之亂克之者四十年漢以新莽之亂復之者六千日今環周未載氛祲廓清風振海而波盪雷破山而石裂區宇重闢日月増輝此皆三靈叶賛累聖垂祉豈予小子能集大勲頃以先掃宫室奉迎鑾駕紫宸初正黄屋未歸耆老之望則深庭闈之戀猶積所以自天之澤必奉於承顔作解之恩尚稽於候命今六龍届止萬姓昭蘇義本奉親慶深家國不失舊物與俗惟新宜𢎞肆眚之典共喜以康之福可大赦天下常赦所不免者咸赦除之其逆人能自投降率衆欵附反逆殺人并獲逆人其以所部郡縣軍城降者並加超賞應與安禄山同謀反支黨及李林甫王鉷楊國忠等一房並不在免限武徳開元及蜀郡靈武元從功臣有亡歿死王事者並加優贈各與子孫一人官乘輿幸蜀天步多難人心且揺臣節斯見太子太師豳國公韋見素開府儀同三司内侍監齊國公髙力士開府儀同三司右龍武大将軍潁川郡陳元禮開府儀同三司右龍武大将軍田長文開府儀同三司右龍武大将軍張崇俊右龍武大将軍杜休祥等勇不顧死危能致命或竭誠羽翼仰北辰而環拱或叶契心膂聚東井以全歸疇兹錫社之封以永誓河之義見素加開府儀同三司實封三百户力士加實封三百户元禮進封蔡國公實封三百户長文進封雁門郡公崇俊進封南陽郡公休祥進封馮翊郡公各實封二百户朕躬行天罰誓兵朔野幸以一旅之衆遂成九有之師言念經綸豈忘締搆銀青光禄大夫尚書右僕射裴冕識宇冲深體局貞固輸忠佐命肇啟興王開府儀同三司封冀國公食實封三百户光禄大夫殿中監同正員判行軍李輔國志除軍惡忠誠濟危加開府儀同三司殿中監依前判行軍事封成國公實封五百户銀青光禄大夫宗正卿兼工部侍郎李尊義切維城勲㕘定國加特進封鄭國公封二百户開府儀同三司兼鴻臚卿同正員中軍都知兵馬使副大使管崇嗣能訓戎律以佐兵權進封鉅鹿郡公實封二百户中軍都虞候特進鴻臚卿同正員李鼎加開府儀同三司進封保定公加雲麾将軍右武衛大将軍在羽林軍宿衞内供養王競加特進太原縣侯仍各實封一百户自冦賊姦宄王師未振瞻言京國尚聚犬羊廣平王俶循學好古令徳孝恭志存邦家誓雪讐耻爰鞠其旅元戎啓行可封為楚王實封二千户銀青光禄大夫尚書左僕射兼武部尚書同中書門下平章事兼靈武大都府長史單于安北副都䕶持節充朔方節度使六城水運朔方管内採訪處置使子儀才光三傑功格十臣克焯皇威載昌大業加司徒兼尚書左僕射進封代國公食實封二千户平章事已下並如故開府儀同三司兼鴻臚卿同正朔方左廂兵馬事同節度副使姑臧縣伯僕固懐恩進封豐國公兼實封二百户開府儀同三司兼右衞金吾大将軍同正仍充四鎮伊西北庭行軍兵馬使李嗣業履險亡軀破敵定難兼衞尉卿同正封虢國公食實封二千户銀青光禄大夫守司徒兼户部尚書同中書門下平章事御史大夫鴻臚卿太原尹北京留守河東節度副大使蘇國公光弼全徳挺生英才間出干城禦侮坐甲安邉可司空兼六部尚書同中書門下平章事進封魏國公食實封八百户開府儀同三司御史大夫兼工部尚書特節充招討西京并定武威武興平等軍兼闗内節度河西隴右伊西四郡行營兵馬使王思禮養銳先鳴蓄竒後殿可開府儀同三司行工部尚書兼御史大夫封霍國公實封六百户光禄大夫太常侍卿同正兼御史大夫淮南西道節度採訪使潁川太守来瑱可開府儀同三司兼御史大夫封潁國公餘如故特進太僕卿南陽太守兼御史大夫權知襄陽事金鄉縣公魯炤藴是韜畧副兹臨制可開府儀同三司兼御史大夫封祁國公仍各食實封二百户兼京兆尹持節充京畿在採訪計㑹招討宣慰處置事崔光逺毁家成國致命前茅可特進行禮部尚書封鄴國公食實封三百户開府儀同三司李光進慎固封守克獻殊勲封范陽郡公食實封三百户賢非后不享后非賢罔乂社稷之固必在良臣左相苖晉卿忠不忘君才惟濟世弼成大業保乂王家可特進行侍中封韓國公食實封五百户憲部尚書同中書門下平章事李麟藴徳成務含貞軌物發揮帝業潤色皇猷可金紫光禄大夫刑部尚書同中書門下三品封褒國公銀青光禄大夫中書侍郎同中書門下平章事崔圎允釐庶績康濟多難一匡天下大庇生人可特進行中書令封趙國公食實封五百户朝散大夫守中書侍郎同中書門下平章事河南節度採訪賜紫金魚袋張鎬謀猷惟允綱紀立程總兹戎律懿是謀府封南陽縣公餘並如故銀青光禄大夫太子少師房琯嘗以經術輔道朕躬加金紫光禄大夫少保嗣虢王巨頃以宗枝居守經邑加光禄大夫御史大夫越國公峘總兼元戎克寧全蜀可金紫光禄大夫户部尚書銀青光禄大夫守吏部尚書郇國公韋陟持衡流品式序百工可金紫光禄大夫吏部尚書銀青光禄大夫守禮部尚書李峴饋運周給開物成務可光禄大夫行御史大夫兼京兆尹封梁國公大中大夫吏部侍郎賜金紫魚袋蘇震供億蒸徒臨事益辦可銀青光禄大夫行吏部侍郎其赴蜀郡靈武元從官及在路扈從官三品已上與一子官四品以下與一子出身六品已上量與進改功臣将士勲業髙者别有處分應見任五品已上當别與一品階其陣亡人令所在郡縣收骸骨瘞埋具酒食致祭各與追贈其家給復二載諸郡縣民或隔絶賊境則困於幽殘或犒宴官軍則弊於賦歛其来載租庸三分放一其天下百姓應諸色人勾徴及欠負官物一切放免宜令中書門下簡使即分道宣慰所至郡縣審問百姓間利害有須釐革處置者一一聞奏其園苑内有閑廐使總監各據所管地界耕種所牧草粟以僃國馬其宫女及狗豽雞鷹鷂之類宜即停減屋宇車輿衣服器用並宜準式珠玉寶鈿平脫金泥織成刺繡之類一切禁斷學官即宜精選務令講習簡擇郎官有堪任太守縣令者委京清資五品已上及郎官御史聞薦其郡縣官有灼然清白理行尤異百姓中孝悌力田不求聞達者委採訪使聞奏其有文經邦國學究天人博於經史工於詞賦善於著述精於法理軍謀制勝武藝絶倫並任於所在自舉委郡守銓擇奏聞不限人數其律令格式未折中者委中書門下簡擇通明識事官兩三人並法官兩三人刪定近日所改百官額及郡名官名一切依故事頃以上皇在蜀朕以居岐蜀郡宜改為南京鳳翔宜改為西京西京為中京蜀郡改為成都府鳳翔府尹以下官寮並依三京名號吴山為吴嶽其祠享官屬並準五嶽故事天柱山老君廟改為啟聖宫五品已上清資官及三品已上官上郡太守父見在無官及官卑並與五品官父母先亡歿者贈一人官祖母亡歿亦賜邑號忠臣事君有死無二烈士狥義雖㓕猶存其李憕盧奕顔杲卿袁履謙許逺張廵張介然蒋清龎堅等即與追贈訪其子孫厚其官爵家口深加優賞其内外文武官有枉遭逆賊殺害及身赴朝廷并逃難山谷其父子兄弟伯叔等為賊捕捉損害及謀反城人言語洩漏因遭殺戮並勘責聞奏當以追贈天下侍老八十已上版授有差並贈緋魚袋大原久遭逼圍給復三載上黨三度被攻給復五載其南陽潁川靈昌睢陽雍丘等郡縣堅壁多時力窮方下絶食尚守情亦可務各給復三年其好畤奉仙兩縣進退禦㓂徴求復多各給復三載蜀郡上皇親幸萬乘久居明年租賦宜依常式起後載給復三載良姊張氏既望氣知歸亦當熊見節可冊為淑妃進封南陽王為趙王新城王僅為彭王潁川王僩為兖王第九男傜為襄王第十男佋封興王第十一男傀封祝王第十二男侗封定王淑妃以下所司擇日即行冊命雖知人之明慙於則哲而収親之儀盖所隨時持盈尊師儀王已下各賜五百疋諸長公主各與一子官嗣王及郡縣主各與一子六品官皇五等已下及九廟子孫及親等人見在者並與轉改内外文武官三品已下各加一階應叙三品五品量加減兩考蜀郡鳳翔扈從從官九品已上賜勲兩轉溥天下賜酺五日乾元元年二月丁未御明鳳門大赦詔曰古者父有天下傳歸於子子有天下尊歸於父有國所以繼統立身莫若揚親其義逺矣我太上至道聖皇天帝惟皇降衷敷祐於上允文允武乃聖乃神道合乎乾坤徳明於日月粤若増崇九廟廵謁五陵天子之孝也嚴禋二郊升中東嶽聖人之表也制禮作樂闡學明刑帝王之業也戡定多難懐柔百蠻霸王之功也於是乎為而不宰成而勿居神超象外之光心契合莫之境釋負於小子俾承於丕搆討伐叛逆綏懐四方豈朕所能皆聖皇之訓也頃者親授寶符載錫美稱顧朕不徳以克負荷君父之命若登於天祖宗之緒恐墜於地一昨與羣臣百寮庶尹衆士圖惟帝載欽若聖譽自古已来百工垂範文明濬哲孝友寛仁豈有如我開元之盛也乃稽大典上徽號曰太上至道聖皇天帝累日誠請不蒙許納至於數四今兹俯從允膺天休克副人望朕上廹嚴㫖曲被殊私迎春之初承奉嘉命聖皇所賜曰光天文武大聖孝感皇帝名以制義亦為實賔卑不踰尊是昭物則恭惟聖造何敢當仁頃以鴻業載昌有虧公議伏以大聖二字深僣皇猷讓非飾詞言必形泣承順顔色而宸睠不廻祗膺寵光乃夕惕増厲今惟新景命禮洽於尊親誕受徽章敬在於順上發生萬物行慶其時孚佑兆人緩刑斯在宜𢎞霈澤以布陽和可大赦天下改至徳三年為乾元元年起二月五日已前大辟罪無輕重常赦所不免者咸赦除之其兩京文武官應三司先推勘者本罪中逓減等處分其合放者三司具條件奏聞自開元已来将相大臣非反逆及犯名教枉法贓罪者流死許其家人以禮收葬其陥在賊境為其殺戮未經追贈公主并郡王嗣王郡主縣主及皇五等已上親被逆賊殺害者各與子孫一人官使其瘞藏亡失骸骨者各招魂葬身死者三品已上各與追贈仍各與一子官五品已上一子出身六品已下量事追贈其元從聖皇天帝至成都府文武官五品已上宜與一子官六品已下超資進改聖皇至成都府後到官及寧州靈州首末扈從三品已上與一子官五品已上放一子出身情愿廻授周親及親近亦聴六品已下量與改轉鳳翔府以歸順前者普恩外加一階車駕出城後任官潜藏不仕逆賊即與處分唐隆功臣普恩外賜爵一級身亡歿者子孫一人加一階其諸道節度下将士三品已上與一子官五品已上放一子出身六品已下量與改轉勲業髙者各委本使聞奏諸道留後将士普恩外賜恩三轉自開元已来宰輔之家不為逆賊所汚者與子孫一人官賊陥兩京文武常參官及諸州刺史絶脰仰藥不事叛人為衆所知者量加優贈有脫身賊庭妻子被屠戮者委所司勘㑹聞奏其天下孝義門各與一子官為採訪使具名聞奏量文武處分其左䧏官非反逆縁坐及犯惡逆名教枉法盗贓如有親年八十已上及疾患在牀枕者不堪扶持更無兄弟許其停官終養其流人亦準此自今已後應有以醫術入仕者同明法例處分天下百姓今年租庸並放其百司府縣諸色雜供各宜減半其雜徭役非要切者一切並停其天下州縣有遭逆賊攻擊堅守不下竟以獲全其官人百姓中有識效灼然為衆所知者宜令本道使案驗奏聞據狀迹酬其官賞身亡歿者重加褒贈有父母存者仍與一官及邑號無父母者與妻子仍令州縣以官物賑恤并量造舍宇使得安存其州因城陥被賊殺戮殘毁者委本道使勘責取實各量免其二年租賦自逆賊以來有匹夫匹婦節義可稱者並旌表其閭墓其流亡户復業者委本道使與刺史勾當賑給并與種子犂牛仍免三年租賦内外文武官三品已上各賜爵一級四品已下及四方通表使各加一階五品已下有父歿者各賜勲兩轉其刺史上佐録事叅軍縣令委中書門下速於諸色人中精加訪擇補擬判司丞已下宜令所繇先於兩京潜藏不仕逆賊及固託疾病官中簡擇資考深才堪者銓注續發遣皇五等已上親及九廟子孫有才學政理委宗正寺揀擇聞薦其有任偽官及掌兵馬軍将能即来各還本官仍别優賞其左降官諸色流移配𨽻安置罰鎮効力之類亡官失爵解退放歸田里及安禄山反黨縁坐不在免限李林甫王鉷楊國忠等一房去年十二月十五日制後所犯並準前制處分四月甲寅親行享廟之禮乙夘御丹鳳門大赦天下詔曰朕聞皇天有命皇王受之命之為君孝理為本莫不欽崇前烈聿修祼享之儀對越上𤣥式陳郊禋之敬美其盛徳商頌有奏鼓之音告厥成功夏書有錫珪之慶國之大事實在於斯間者孽胡亂常暴殄天物致圖書禮樂或阻於干戈宗廟神祗有虧於享祀朕誕受明命恭行天罰羣妖克殄討鯨鯢以示威王室既寧奉鑾輿而載復太上聖皇天帝功格天地道邁胥庭思凝神於姑射将釋負於宸扆俾予小子纘承大統夙夜祗懼俯盡臣子之心親親尊尊庶極於此是用追崇先后建立中宫永言孝思感徽音於父母俾行婦道想釐降于虞嬪情理於是獲申人倫以之攸叙然後執瓉清廟歌五聖之重光燔柴圜丘覩百神之受職復修祭禮再備樂章尊祖配天不失舊物今大禮斯舉𤣥符允答行慶施恵尚屬於陽和出繫挺囚必當於時令思與天下更布惟新宜覃肆眚之恩以洽雍熙之化可大赦天下除反逆之黨縁坐謀殺十惡刦盜臨監主掌自餘一切原免其餘逆賊元謀及脅從今但歸投並原其罪仍與官賞其成都府元從聖皇功臣及靈武原從功臣並收兩京将士京留守諸道節度採訪使普恩外三品已上賜爵一級四品已上加一階行人賜勲三轉自㓂賊以来官吏百姓中有勞未經酬賞者委所在官長具状奏聞當與甄録天下百姓除正租庸外一切不得别有使役如縁軍務所要自令和市兵士有尫弱羸老並揀擇放其長安萬年兩縣各借錢一萬貫每月收利以充和雇勅其别索物及供諸司并蕃客等左藏雖給價值奏請每引時月宜先給兩縣各五十貫貯於兩市差官専知旋還價值其州府縣門夫勲官並於舊額數減一半其庸丁殘疾人等不須更差其州縣官上什物並以公廨及官人料錢依時價和雇造買不得分配典正其年支口味宜減一半諸使應進鷹狗豹豽等一切並停應縁南郊百司張設有損百姓苖稼者委京兆尹隨損多少陪酬所損錢物便即聞奏百姓中有能行仁義分濟貧窮免填溝壑賴救恤者具名聞奏當寵以官職鰥寡惸獨篤疾不能自存及陣亡人家並租免户州縣隨事優恤賑給百姓中有事親不孝别籍異財㸃汙風俗虧敗名教先决六十配𨽻磧西有官品者禁身奏聞京官九品以上許封事極言時政得失朕将親覽用佇嘉謀才有可觀别當甄録草澤及卑位之間有不求聞達未經推薦者一藝已上恐遺俊乂令兵部吏部作徴召條目奏聞録事㕘軍職司糾舉自今已後宜升判司一政以彰委任國子監學生明經法帖䇿口試各十並通四已上進士通三與及第鄉貢明經準常式州縣學生放歸營農待賊平之後任役常式二王三恪各與一子官内外文武官三品已上賜爵一級四品已下加一階十月甲辰上御宣政殿冊成王為皇太子詔曰守器為重擇賢而立萬國繇其永貞百王以之垂範盖以重社稷而奉粢盛也朕纉承洪緒惟懐永圖丕膺皇極既符域中之大茂建元儲用崇天下之本皇太子俶植性恭懿因心孝友文武之徳克聞於日躋君親之誠實原於天性徃以時屬艱阻義扶宗社故能外清𤣥祲内復皇圖繇是肇啓重華懋昭嘉緒今撰辰斯及冊命攸行宜承繼明之慶俾廣洊雷之澤可大赦天下頃者頻興大典累洽殊私率土之間屢經蕩滌猶慮近有冒法或滯狴牢其天下見禁囚徒已下罪一切放内外文武官三品已上者賜爵一級四品已上各加一階五品已上官子為父後者賜勲兩轉頃因國用不足頒賜未周今所鑄新錢數盈於萬其京官文武五品已上及常叅官六軍将士東京北留守及諸道節度将士等各賜有差其唐隆功臣成都元從及朕元從功臣等普恩之外更賜一爵四品已下更加兩階其在靈州及寧州至鳳翔者仰所司類例更逓加一等皇親及諸色陪位人各賜勲兩轉其鴻臚蕃客賜絹一千疋天下義夫節婦孝子順孫旌表門閭終身不仕京官五品已上各舉忠正孝友文儒周慎堪任東宫官者務取實才不得虛薦今餘寇未殄有脅在賊中未歸順者一切不以為罪其有受賊節制能以兵降者酬其封爵且為政之要求賢是急比令中外薦舉多非實才所以詢事考言登科葢寡猶慮嵓穴之内尚有沉淪宜令所在州縣更加搜擇其懐才抱器隱遁丘園以禮徴送如或不赴具以名聞凡與前詔科目相當一切委内外文武五品已上官有所知者不限人數任各荐聞如自舉者亦聴於所在投狀有堪任用不限常資其行人家及羸老單貧鰥寡惸獨已頻有處分宜令州縣長官倍加優恤應元冊禮職掌要重者及撰冊書舁寶官禮官等普恩之外賜勲兩轉其禮儀使特賜一階副使普恩之外賜爵一級敕文有不該者所司類例奏聞二年二月壬戌帝遣侍中苖晉卿中書侍郎王璵分録大理寺御史臺京兆府見禁囚徒已下罪皆免之三月丁亥詔曰古之哲王臨御區夏莫不好生慎罰以理人命故易稱緩死書貴恤刑所以樂時布和奉天育物者也朕恭守丕緒祗膺皇極順時調氣庶欽若於𤣥樞旰食宵衣每憂勤於黄屋頃自獻春之後膏液稍愆言念人時或稽政本雖離畢之應未獲滂沱而滋萌之漸亦頻霑沐是用申兹渥澤助彼發生宜崇寛大之典俾達陽和之氣其天下應合死罪特降從流流已下罪放免其事縁反逆造偽頭首情狀難容者所司詳議聞奏其流移左降該恩合量移者宜令所司即類例處分朕為人父母義當亭育時有或愆於令物有不遂其生敢懐自逸之至實受在予之責但以兇徒尚阻戎旅多虞致使黎庶不堪徭役未息雖國家之事休戚當同而君父之誠寧忘愧惻况春農在候田事方興百姓之間固須優恤天下州縣應欠租庸課稅傳馬粟貸糧種子糴糶變税及營田少作諸色勾徴納未足者一切放免其正義等倉及諸色攤徴亦宜準此其至徳二載十二月三十日已前和糴和市并負欠官物及諸色官錢欠利常平義倉欠負五色一切放免州縣百姓頃屬軍興户口之間不無流散宜令州縣長官審加勘責且立簿書據見在户徴課稅其迯亡者别立文案設法招輯終年類例以為褒貶如勘責虛望所繇官長並節級科貶其所繇典正等先决六十仍罰効力其百姓先逃散即能還者並每季申省給復三年其逃户有田宅邸店堪充課稅者宜令所繇即為租賃不得因兹妄有欺隠主到即却令分付比者不急之務尋已詔停如聞所司未全減省載求人瘼實切朕懐固當革弊息人勵精為理自今已後内外不得輙别徵求妄為進奉諸色力役造作非軍國灼然要急及諸色率稅亦一切並停太常寺音聲除禮用雅樂外并教坊音聲人等並仰所司疎理使敦生業非祠祭大祀及宴蕃客更不得輒有追呼其内将作少監及諸供司丁匠等各仰長官逐要量留餘者並委御史臺専加糾察如有違犯具録奏彈宣示中外令知朕意三年二月丙子詔曰國之用刑兼在於慎恤王者布澤亦貴於乘時所以大易陳規必議於獄周官設教遵於中興朕躬臨寶位憂念黎元乾乾之心日慎一日况兵戎未息征役尤繁哀此下人無忘夕惕如聞州縣之内多有累囚囹圄之間動淹時序每念納隍之慮常懐解網之仁屬陽春布和品彚咸達宜覃在宥之澤俾叶生成之化其天下見禁囚徒死罪降流流已下一切放免其十惡反逆及偽造頭首強盗刦殺官吏犯贓枉法等害政既甚在法難容不在此限其諸供司及作曹非切要外並宜減省京畿諸色和糴一切並停其天下百姓灼然單貧交不存者縁租庸先立限長行每鄉量降十丁猶恐編户之中懸罄者衆限數既少或未優矜其實不支濟者宜令每鄉量更矜放待資産稍成任依常式以天下未寧頻申赦令公私庶務優恤葢多載覃宥過之恩庶及措刑之美宣示中外知朕意焉上元元年閏四月己卯御鳴鳳門詔曰自古哲王恭承景命莫不執象以御宇厯時以建元必當上立乾符下立人極者也朕承累聖之鴻業紹大中之寶位冦孽干紀王師尚勞乾乾之心豈忘鑒寐一物失所每軫納隍之憂萬邦未寧深懐馭朽之懼賴上𤣥垂福宗廟降靈百辟卿士同心戮力方兾干戈載戢區宇乂寧每勵躬於帝圖常取則於天道屬天人叶紀景象垂文爰遵革故之典将契惟新之命義存更始庶有應於天心澤被無私宜載覃於率土可大赦天下改乾元三年為上元元年閏四月十九日昧爽已前大辟罪已下已發覺未發覺已結正未結正見禁囚徒罪無輕重常赦不免者咸赦除之其與逆賊元謀及脅從受驅使懼法来降并潜藏不出者已頻處分但能歸順赦罪除元惡之外一無所問其史恩明心能改圖束手来欵亦當洗其瑕釁議以勲封内外文武官賜爵各有差其六軍及飛龍閑廐加賜物其成都靈武元從扈從逓加有差在外諸軍各加録賞物陣亡将士優加褒贈行人家口所在賑給定禍亂者必先於武徳拯生靈者諒在於師貞周武創業克寧區夏惟師尚父寔佐興王况徳有可師義當禁暴稽諸古昔爰崇典禮其太公望可追封為武成王有司依文宣王置廟仍委中書門下擇古今名将配享并置亞聖及十哲等享祭之典一同文宣自古百王欽慎刑法盖以法者人之命刑者國之權苟或失其科條固難措其手足頃或奸臣擅命中興不修造次便行哀敬何在自今已後其有犯極刑者宜令本司依舊三覆庶平反之際人謂不􅁈幽明之間理皆無濫又書稱羣望咸集詩曰祠事孔明爰自遐代尤崇祭祀朕深惟古義必在至誠苟徳之不修則神亦無據故知精誠有感黍稷非馨而况宋景發言固三徙而可驗漢文深戒為千載之明徴事可遵行理當變革有司所立秘祝之法或移於嵗或移於人君人之心寧所忍也自今已後削去此法其中祀下祀并雜祭祀等一切並停其諸應合祭祀列於常典所用祭科一依古制務從減省以副朕心又車服以庸有虞盛典威儀以等周禮舊章徃屬承平多厯年所至於公卿列位中外在官多以奢僣為心流弊成俗宜令所司定王公以下車服産業各詳古制及令式作節限聞奏自頃戎車未息殘孽猶虞軍史獻功務陳首級且四海之内孰非王人豈以苟從昏迷陥在夷戮一朝授首懸彼稾街朕志在好生憫其驅脅其諸軍所獲首級除元惡之外一切不得傳送又設官以禮本在安人逓遷之政勞於利物今寰瀛之内兵革未清加以時或不登物皆踴貴軍儲是急廩稍靡供冗官之流固甚勞弊其京閒司官等有材堪釐務者宜命中書門下即類例量資厯出授外官王者設教擇賢以理廣徴嵓穴用副薪槱宜令中外五品已上文武正員官各舉賢良方正直言極諫一人武藝文才俱堪濟理者亦任狀舉其或文乏詞䇿武非騎射但權謀可以集事材力可以臨戎方圓可收亦任通舉並限制到一月内奏畢自古明王聖帝名山大川並委州縣長吏擇日致祭義夫節婦孝子順孫旌表門閭終身勿事二年正月甲寅詔曰乗時布澤有國之彞訓議獄緩刑前王之茂典繇是洽其麛卵殷湯𢎞解網之仁順彼陽和漢后有録囚之詔育物施恵抑惟舊章朕纉服鴻業祗膺寶位何嘗不日旰忘食中夜求衣慮一物之失所憂四方之未乂雖身居黄屋而志在蒼生今宼孽為虞征輸未息猶恐提戈釋耒未有厚於人時寘棘理梧或慮盈於幽圄屬三陽啓候萬物遂生宜覃在宥之澤庶叶維新之令其天下見禁徒囚死罪降流徒以下並釋放京城宜令中書門下即分徃府縣御史臺大理寺即自親按問疏决訖具状聞奏諸府州各委所繇長官準此處分諸色流人及左降官等所繇類例並與量移仍委中書門下議覆奏取處分其先縁安禄山偽署三司有名應在流貶者原情議罪負國誠深朕以捨其殊死竄於荒徼固當與衆共棄長為匪人然皆邦國舊臣嘗挂纓冕使其終歿裔土永匿慙魂孰若貸以殊私俾令效節亦準例處分兼委中書門下量輕重類例奏取處分比縁宼盗之内干戈脅從白刃臨頸胡寧忍决所以陥於兇黨苟免者多前從詔書頻以該及其史思明将士及偽署官屬等有束身歸順并率衆来降官爵如初一無所問以城邑降者仍别加封爵餘兇黨之流亦同此例天實臨照朕無食言王者設教務農為首今土膏方起田事将興敦本勸人寔惟政要宜令天下刺史繇令各於所部親勸農桑百姓中有勤勞耕耘積其菽粟或贍於閭里或能益軍儲委所繇長吏具狀奏聞當特與甄賞仍令有司第其髙下量酬五品以下官員其百司及州縣興工力役不急之務一切並停諸軍兵健應在行營有羸老疾病不任戰陣者各委節度使速揀擇放還路次州縣量加濟恤諸色歩役各令所司減省放其營農且宼孽未平軍戎當偹甿庶之内征賦猶繁朕所以親帥公卿躬行節儉而詔書屢下蠲免盖多國計軍儲取給而已猶欲累加損益以恵黔黎宜委中書門下勾當令度支使與諸供司一切減省應可蠲免每司各條件聞奏當使施行九月壬寅詔曰為人上者與衆守邦自古哲王懼其滿假聰明濬哲罔不在躬文武聖神乃以為號顧予菲薄運屬經綸一旅成師復其舊物聖皇納人夀域逰意道源神器之重𫝊歸於朕獲守丕業若履春氷敢忘謙冲日益招損欲垂範而自我亦去華而就實其乾元大聖光天文武孝感等尊崇之稱何徳以當之以欽若昊天定時成嵗春秋五始義在體元惟以紀年更無潤色至於漢武飾以浮華非昔王之茂典豈永代而為則三代受命正朔皆殊宗周之王實得天統陽生元氣之本律首黄鍾之尊制度可行叶用斯在自今已後朕號稱皇帝其年但號元年去上元之號其以今年十一月為天嵗首便建丒建寅每月以所建為數承天陟后稽古臨人必繇革故之源方合大中之道風行㝢縣澤被無涯欽承上帝之心申錫蒼生之慶可大赦天下自二年九月二十一日昩爽已前大辟罪無輕重已發覺未發覺已結正未結正見繫囚徒常赦所不免者咸赦除之其十惡五逆及造偽頭首官典犯贓法實難容刑故無小並不在免限其史朝義若能翻然改圖背逆歸順罪無所問加以勲封自乾元元年已前開元已来應反逆連累赦慮節度限所未該及者並宜釋放有官者降資與官無官者依本色例收叙内外官三品已上賜爵一級四品五品各加一階六品已下賜勲兩轉成都府及靈武元從普恩之外三品已下更賜爵一級四品更加一階六品已下更賜勲一轉眷及勤勞俾其卓叙每以田功在謹農事惟勤不有司存何成重榖諸州等各置司田叅軍一人専主農事每縣各置田正二人於當縣揀明閒田種者允務令勸課國之大事郊祀為先貴其至誠不美多品黍稷雖設猶或非馨牲牢空多未謂能享今以𤣥元孚佑至道為心将臻太和不欲多殺禮樂殊制孝敬同歸圜丘方澤任依常享宗廟時祠但臨時獻熟用懐明徳之馨庶合西隣之祭唐虞之代肇有九州王者所都文無異制其京兆府河南府太原府三京之號宜停其鳳翔先為西京亦宜準此所設諫曹欲聞諷議允副從䋲之望須成削稾之書其諫官令每月一上封事指陳時政得失若不舉職事當别有處分其諸州别駕可依舊却置每除京官五品已上正員清望官及郎官御史諸州刺史皆用推荐一兩人以自代仍具録行能聞奏觀其所舉以行殿最文武官等賜物各有差自今已後有隱欺須勾剥者宜勾當年若事連去年亦任通勾其隔年者不在勾限官典隠藏在腹内不在此限其氏姓雖得之久逺者與俗諱及隱疾同聲者宜改與本族望所出大姓自逐穩便名山大川明王聖帝所在廟祠各委州縣官長䖍誠致祭天下侍老先版授者改與版授未版授者與版授鰥寡惸獨不能存立者委刺史縣令量加賑恤義夫節婦孝子順孫旌表門閭終身勿事赦書有所未及者各令有司速勘㑹類例條件聞奏元年建卯月臣欽若曰是去年號稱月建事具帝王年號門辛亥朔御鳴鳳門詔曰惟天為大事之在明惟聖能享承之在徳朕託於人上獲守丕圖思大道之行去鴻名之節文武徽號存而不稱開統履端建元叶紀美皆有讓言必可陳䖍告𤣥元致齋清廟恭行舊典展禮南郊百神允懐上帝臨我升聞之際其亦可言昭事以誠寔膺多福髙而不逺復見其心乃候發生之時用行嚮勸之道暘谷出日登大明於域中泰山起雲遍膏雨於天下君人臨照徳澤周洽布其寛大豈止於兹宜行肆眚之恩益廣萬邦之慶可大赦天下自元年建卯月一日昧爽已前大辟罪已下罪無輕重已發覺未發覺已結正未結正繫囚見徒常赦所不免者咸赦除之其反逆造偽頭首謀殺故殺并十惡死罪官吏及典正犯贓為蠧既深在法難容並不在赦限其史朝義已下脅從将士及受偽官等棄逆歸順因事立功封賞之外餘無所問其諸色流人及左降官等前後頻有處分並與量移所繇稽遲動厯年數宜令有司即申明前後制勑節文速勘責類例聞奏其中外行業夙著情状可矜久踐朝班曽經任用者委在朝五品已上清望官及郎官御史於流貶人中素相諳委為衆所推者各以名薦須當才實其内外文武官三品已上賜爵一級四品已上各加一階成都府靈武元從功臣三品已上更賜爵一級四品已上更加一階朕敬授人時慎徽月令庶無極否以獲休徴自今以後每至四孟月迎氣之日與百辟卿士舉而行之建辰月應蕃彍騎宜三分量留一分其餘即放歸營農至建巳月任依常式諸州刺史縣令及司田叅軍令設法勸課令其耕種不得失時貧不支濟户仍方圓處置量事借貸務令存立嵗終廵按量其功效便申賞罰諸道貢獻除馬畜供軍之外其餘鷹鷂狗豽竒禽異獸並不得輙進五都之號其来自久宜以京兆府為上都河南府為東都鳳翔府為西都江陵府為南都太原府為北都孝本天經禮崇國典横於四海漏及三泉其京資清正員文官五品已上武官三品已上并兩省供奉官御史諸州刺史並諸道節度已下三品已上父母亡歿未經追贈者並量與追贈文武不墜道𢎞於人務在捜揚俾其展效其諸道人中有詞學髙深兼通政理軍謀制勝明習韜鈐者委所在刺史揀擇薦京四品已上員文武官任各舉一人孝子順孫義夫節婦旌表門閭終身勿事建辰月壬午詔曰元首之義以人為心外有凋傷内懐慘怛罪歸於己情見乎辭伯禹深泣辜之仁漢皇下哀痛之詔與理同道惟刑是恤朕志𢎞覆載運屬艱難思措大刑俾登夀域風以解愠時當發生國有舊章已懸書於象魏恩成在宥宜釋繫於狴牢其天下見禁囚徒罪無輕重一切放免其官典犯贓情雖難恕特從寛典許以自新並宜納贓放所犯罪左降官等即與量移近處諸色流人及効力罰鎮人等並即放還其有亡官失爵亦與收叙比来兵革不息年榖未登百姓流離至於困弊戰士暴露頗聞闕乏或先有結聚及有違軍令但宜改過自效前事捨而不論艱虞以来多冒刑憲道存善貸屢有徳音庶其最靈咸自改勵宣示中外知朕意焉己未又詔曰左降收叙官及流人等今月三日已有處分若準例更待本處文解必恐動經嵗年恩不及時殊乖先意宜令所繇計會勘責五品已上及郎官御史俱貶中書門下六品已下委兵吏部各詳犯状輕重量才改轉其本犯非巨蠧曽經清班名行夙著者仰具名銜聞奏諸色流人等所司簡勘明厯牒所繇州縣軍鎮等放還流貶人所在身亡者任其親故收以歸葬仍州縣量給棺櫬發遣寶應元年四月乙丑詔曰上天降寶獻自楚州神明告厯數之符合璧定妖災之氣總集瑞命祗承鴻休因以體元叶乎五紀其元年宜改為寶應元年建巳月改為四月其餘月並為常數仍舊以正月一日為嵗首受兹福應佇以升平因日月之重光布雨雲之渥澤其天下見禁囚徒罪無輕重并已發覺未發覺已結正未結正四月十五日昧爽已前一切放免左降官宜即量移近處流人一切放廻有司更不得輒有類例條件其楚州刺史并出寶縣官及進寶官量與進改随進寶官典傔等各量與一子官宣示中外宜知朕意冊府元龜卷八十七
