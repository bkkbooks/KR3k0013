body:
  text: 册府元龜卷四百五十七宋王欽若等撰臺省部總序三代之前職官之制罕存於載籍靡得而周詳然考於遺文觀其大指卨作司徒以敷五教即周之地官也伯夷作秩宗以典三禮䕫典樂以和人神即周之春官也咎繇作士以正五刑即周之夏官秋官也埀作共工以利噐用即周之冬官也龍作納言出入帝命即周之内史也雖其名未正然其職已同周之天官曰冡宰地官曰司徒春官曰宗伯夏官曰司馬秋官曰司寇冬官曰司空是為六卿方於後世冡宰即今之吏部也司徒即今之户部也宗伯即今之禮部也司馬即今之兵部也司寇即今之刑部也司空即今之工部也秦漢之制以丞相御史大夫領朝政九卿分庶職其御史屬官有二丞秩千石一曰中丞在殿中蘭臺掌圖籍秘書外督刺史内領侍御史員外十五人受公卿奏事舉劾按章事具憲官門又有符節御史主符璽位次御史中丞郎中令屬官有太中大夫中大夫諫大夫掌論議皆無員多至數十人後改太中大夫為光禄大夫比二千石中大夫比千石諌大夫比八百石謁者掌賓贊受事員七十人秩比六百石少府屬官有尚書武帝以逰宴後庭以中官主中書遂罷尚書之官至成帝建始四年罷中書置尚書五人一人為僕射四人分為四曹通掌圖秘記章奏之事各有其任其一曰常侍曹主丞相御史公卿事其二曰二千石曹主刺史郡國事其三曰民曹主吏民上書事其四曰主客曹主外國夷狄事後又置三公曹主斷獄分為五曹又置丞四人郎四人其一主匈奴單于其一主羌夷吏民其一主户口墾田其一主財帛委輸又以左右曹諸吏平分尚書奏事又以大將軍事騎將軍大司馬領尚書事皆為樞要又有中書謁者又有侍中中常侍入直禁中諸吏舉非法散騎騎而散從無常職給事中侍從左右無常員皆列侯將軍卿大夫博士已下加官焉又有議郎掌顧問應對侍中尚書謁者皆有僕射古者重武官故有主射以督課之後漢以御史大夫為司空中丞遂為御史臺率其屬有治書侍御史二貟事具刑法部侍御史十五員事具憲官門蘭䑓令史六百石掌奏及印工文書又有尚書令一員掌凡選署及奏下尚書曹文書衆事秩千石故公為之者秩二千石朝㑹不陛奏事咸銅印墨綬屬官有僕射一人秩六百石置尚書事至景帝分置左右僕射尚書六人秩六百石初分六曹一曰三公曹主嵗盡考課諸州郡事二曰吏部曹改前漢常侍曹為之主選舉祠祀事三曰民曹主繕修工作鹽池園苑事四曰客曹主䕶駕羌胡朝賀事五曰二千石曹主辭訟事六曰中都官曹主水火盗賊事凡六曹并令僕二人謂之八座尚書雖有曹名不以為官號靈帝以侍中梁鵠為選部於此始見曹名置左右丞各一人郎三十四人秩四百石郎主作文書起草更直五日於建禮門内初從三署郎詣䑓試守尚書郎中嵗方稱尚書郎三年稱侍郎選有吏能者為之又和帝以太傅録尚書事尚書始有録名其後以三公為之蓋唐虞大麓之職又置侍中給事黄門侍郎散騎給事中前後同兩漢尚書而下皆文𨽻少府而已魏置御史中丞治書侍御史皆如漢制又置侍御史凡八人又置治書執法掌奏劾又置殿中侍御中禁防御史事具邦憲部又置尚書令一人尚書僕射或一人或二人置二人則為左右若令闕則左為省主又有選部左民客曹大兵度支五尚書又置二丞又置殿中吏部駕部金部虞曹比部南主客祠部度支庫部農部水部儀曹三公倉部民曹二千石中兵外兵都兵别兵考功定課凡二十三郎青龍二年又置都官騎兵二郎每一郎缺白試諸孝亷能結文案者五人謹封奏具姓名補之凡尚書令僕射尚書三品左右丞郎中六品又置謁者十人僕射一人四品又置侍中四人其加官則非數掌儐贊威儀大駕出則次在侍中䕶駕正直侍中負璽陪乘餘不𢃄劍皆騎從登殿與散騎常侍對仗侍中居左常侍居右偹切問近對拾遺補闕又置給事黄門侍郎四人又置散騎常侍無員掌規諌不典事貂璫侍中左挿散騎右挿又置員外散騎常侍無員散騎侍郎四貟與侍中給事黄門侍郎共平尚書奏事又置給事中無員凡侍中散騎常侍三品給事中給事黄門侍郎員外散騎常侍散騎侍郎五品武帝初為魏王又置秘書令典尚書奏事文帝黄初初改為中書置監令各一人秘書事具卿監門又置通事郎次黄門郎黄門郎已署事過通事郎乃置名色署奏入帝省讀書可其給事黄門侍郎並如漢制凡中書令三品中書侍郎五品中書通事舍人七品符節御史别為一臺掌授節銅虎符竹使符晉御史中丞治書侍御史如魏制侍御史置九人殿中侍御史四人江左減二人又有檢校御史事並具憲官門又置尚書令秩千石銅印墨綬進賢兩梁冠納言幘五時朝服佩水蒼玉食俸月五十斛受拜則册命之賈充以目疾表置省事吏四人省事蓋自此始也僕射與魏同又置吏部三公客曹駕部屯田度支六尚書咸亨二年省駕部四年省一僕射又置駕部太康中改置吏部殿中五兵田曹度支左民六尚書又置右民度支五尚書祠部常與右僕射通職不置祠部則以右僕射攝之闕右僕射則以祠部攝知其事又以左丞主臺内禁令宗廟祠祀朝儀禮制選用署吏急假右丞掌臺内庫藏廬舍凡諸噐物及廪振租布刑獄兵器督録逺道文書章表奏事又置直事殿中祠部儀曹吏部三公比部金部倉部度支都官二千石左民右民虞曹屯田起部水部左右士駕部車部庫部左右中兵左右外兵别兵都兵騎兵左右士北主客南主客凡三十四曹後又置運曹凡置郎二十三人更相統攝及江左罷直事左民屯田車部别兵都兵騎兵左右士運曹其後罷虞曹二千石有殿中祠部吏部儀曹三公比部金部倉部度支都官左民起部水部主客駕部庫部中兵外兵十八曹郎後又省主客起部水部共十五曹又咸康中分置三録王導荀崧陸暐為之又有四録郎四人叅録又西朝張華江左庾亮並闕尚書七條又何充叅闕尚書自漢而後八座及郎初拜並集都座交禮遷職又解官焉西朝八座丞郎朝晡詣都座江左唯朝而退凡尚書令僕射尚書並三品左右丞郎並六品又置侍中如魏制哀帝興寧四年省二人後復舊又置給事黄門侍郎四人又置通直散騎常侍二人並令員外散騎常侍與正員散騎常侍通直故謂之通直又置員外散騎常侍侍郎元帝又置通直散騎侍郎二人後増置四人散騎常侍給事黄門散騎侍郎皆如魏制江左始罷其平尚書奏事又置中書令監而已下皆如漢制改通事郎為中書侍郎江左初復曰通事郎俄復為中書侍郎又武帝初置舍人通事各一人江左合為通事舍人掌呈奏案後省之以侍郎直西省凡侍中散騎常侍中書監令並三品給事中給事黄門散騎中書侍郎並五品門下中書舍人第七品宋置御史中丞治書侍御史殿中侍御史如晉制事具憲官門又置謁者臺謁者僕射一人掌大拜授及百官班次謁者十人掌小拜授及報章先是晉省謁者僕射以謁者𨽻蘭臺江左復置俄省大明中復置尚書寺有尚書令任總樞衡僕射尚書分領諸曹僕射領殿中主客凡二曹吏部尚書領吏部删定三公比部凡四曹祠部尚書領祠部儀曹凡二曹度支尚書領度支金部倉部起部凡四曹左民尚書領左民駕部凡二曹都官尚書領都官水部庫部論功凡四曹五兵尚書領中兵外兵凡二曹若營宗廟宫室則置起部事畢省之又髙祖置騎兵主客起部凡四曹合晉十五為十九郎文帝元嘉十年省儀曹主客比部騎兵四郎十一年並十八年増删定郎事見刑法部三十年置功論郎明帝省騎兵凡二十郎比部主法制度支主算都官主軍事刑獄其餘諸郎所掌各如其名自漢已後尚書官上朝及下朝禁斷行人丞郎見尚書呼曰明時郎見二丞呼曰左君右君其屬有都令史令史書令史書朝之名或減或益其制不常但八座解交丞郎已下不復解交也孝武不欲威權外假故罷録焉其後或置或否凡尚書令僕射尚書並三品丞郎並六品又置侍中而下皆如晉制初散騎常侍與侍中通官其後漸替大明雖革選比侍中而人情久習終不見重又置中書令中書舍人各一人中書侍郎四人中書通事舍人四人初以中書侍郎掌呈奏案及置通事舍人則侍郎之任輕舍人直内閣𨽻中書其下有主事本用武官宋改用吏凡侍中散騎常侍中書監令並三品給事黄門散騎中書侍郎並五品南齊之制置御史丞一人治書侍御史二人侍御史十人謂之蘭臺事見憲官門又置謁者僕射一人謂之謁者臺又置尚書令為内臺主行遇諸王以下皆禁駐無令則左僕射為臺主與令同左僕射領殿中客三曹通關諸曹事又置吏部尚書領吏部刪定三公比部凡四曹度支尚書領度支金部倉部起部凡四曹左民尚書領左民駕部凡二曹都官尚書領都官水部庫部功論凡四曹五兵尚書領中兵外兵凡二曹祠部尚書領儀曹與右僕射通職領祠部二官不並置起部尚書興宫室宗廟權置事畢而省左丞掌宗廟郊祠格制案彈選用等事右丞掌兵士百工庫藏刑獄諍訟等事白案右丞上署左丞次署黄案左丞上署右丞次署凡二十四曹各置郎中令史以下又置都令史又庫部領武庫令駕部領車府令丞起部領材官將軍司馬是謂之尚書臺又置侍中祭酒高功者稱之侍中謂之門下給事黄門侍中世呼小門下焉門下領公車令太官太醫令丞内外殿中監内外驊騮廐丞又置散騎通直散騎員外散騎常侍散騎通直散騎員外散騎侍郎給事中奉朝請駙馬都尉謂之集書省又置中書監令各一人侍郎四人通事舍人無員謂之中書省梁御史臺初置御史大夫天監元年復為中丞屬官治書侍御史殿中侍御史事具憲官門又有符節令史員事見憲官門謁者臺署謁者僕射一人掌朝覲賓饗之事屬官謁者十人掌奉詔出使拜假朝㑹儐贊等事謁者僕射六班尚書省置令左右僕射吏部祠部度支在户部官五兵尚書左右丞各一人吏部刪定三公比部祠部儀曹虞曹主客度支殿下金部倉部左右戸駕部起部屯田都官水部庫部功論中兵外兵騎兵等郎二十三人尚書掌出納王命敷奏萬機令總統之僕射副焉廢置之制亦與齊同凡尚書文書詣中書發者密事皆以契嚢盛之封左丞印自晉以後八座及郎多不奏事天監元年始詔曹郎依舊奏事三年又置侍郎詔通直郎凡郎中在職勤能滿三嵗者遷為侍郎又有五都令史與左右丞共事省中謂之尚書五都用人常輕九年革用士流視奉朝請駕部别領車府署庫部别領南北武庫署凡尚書令為十六班尚書僕射為十五班吏部尚書為十四班列曹尚書為十三班吏部郎為十一班左丞為九班右丞為八班侍郎為六班郎中為五班又門下省置侍中給事黄門侍郎各四人掌侍符從左右儐相威儀盡規獻納紏正違闕監合嘗御藥封璽書侍中髙功者在職一年詔加侍中祭酒與侍郎髙功者一人對掌禁令凡領公事大官太醫司令驊騮廐丞集書省置散騎通直散騎常侍散騎通直散騎侍郎各四人又置員外散騎常侍給事中奉朝請無員並侍從左右獻納得失省諸奏聞文書意異者隨事為駁焉諸優文策文平處諸文章詩頌常侍髙功者一人為祭酒與侍郎髙功者一人對掌禁令紏諸逋違天監六年又革常侍之選分門下二局𨽻散騎常侍又令尚書案分曹入集書自是散騎視侍中通直視中丞員外視黄門郎中書省置監令各一人掌出納帝命侍郎四人髙功者一人主省事又有通事舍人主事令史等員通事舍人入直内閣以才而授不限資多以他官兼領其後除通事直云中書舍人凡中書監為十五班中書令為十三班侍中散騎常侍為十二班通直散騎常侍為十一班給事