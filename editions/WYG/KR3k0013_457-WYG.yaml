禮儀以和萬邦以弼庻務所謂佐天子而統大政也凡軍國之務與中書令叅而總焉坐而論之行而舉之此其大較也又置侍郎二員掌二侍中之職給事中四員掌陪侍左右分判省事凡百司奏抄侍中審定侍郎覆省給事中讀而署之以較正違失制勅大事覆奏而請施行小事署而頒之又置左右散騎常侍二人掌侍從規諷備顧問應對左諌議大夫四員掌侍從贊相規諌諷諭起居郎二員掌以修記事之史右補闕右拾遺各二員掌供奉諷諌扈從乗輿凡發令舉事有不便於時不合於道大則庭議小則上封若賢良之遺滯於下忠孝之不聞於上則條其事狀而薦言之又置典議二員贊者十二人掌殿上賛喝之事事具賓禮門又置城門郎四員掌京城皇城宫殿諸門啟閉之節及出納管鑰又置符璽郎四人掌入寳及國之符節又有録事主事令史書令史傳制楷書門僕以分掌曹事先是武徳初改隋之侍内曰納言龍朔二年改納言曰東臺左廂改左右散騎常侍曰左右侍極給事中曰東臺舍人起居郎曰左史咸亨中復曰納言左右散騎常侍給事中起居光宅初以東臺曰鸞臺神龍初又改納言曰侍中開元三年又改侍中曰黄門監五年又改黄門監曰侍中天寳二年又改侍中曰左廂至徳二年又改左廂曰侍中又領𢎞文舘武徳初置之名昭文舘後改為𢎞文舘又改為昭文舘開元七年復曰𢎞文舘有大學士多以宰相領之又有學士無員數掌詳正圖籍教授生徒凡朝廷有制度沿革禮儀輕重得叅議焉校書郎二人掌校理典籍刋正錯繆領學生三十人中書省初沿隋制曰内書省武徳三年改曰中書省龍朔二年改曰西臺光宅二年改為鳳閣神龍元年復為中書省開元元年改為紫微五年復為中書省置中書令之職掌軍國之政令緝熈帝載統和天人入則告之出則奏之以利萬邦以度百揆蓋佐天子而執政也又置侍郎二員掌貳令之職置舍人六員掌侍奉進奏叅議奏章凡詔㫖中書令置侍郎奉舍人署而行之舍人事具詞臣門又置右散騎常侍起居舍人左補闕右拾遺各二員散騎而下並與左同起居舍人掌修繕之史侍中中書令三品至徳中昇為二品兩省侍郎初正四品至徳中昇為正三品常侍初從三品廣徳中昇為正三品給事中舍人正五品上諌議大夫初正五品上㑹昌二年昇為正四品下與丞相出入迭用起居郎舍人從六品上左右補闕從七品上左右拾遺從八品上有主書主事令史傳判分行曹事焉先是武徳初改隋之内書令曰内史令乂改為中書令龍朔二年改中書令為西臺左廂起居舍人曰右史咸亨中復改為中書令起居舍人光宅元年改中書令為鳳閣令神龍初改鳳閣令曰中書令開元元年改中書令曰紫㣲令五年復為中書令天寳二載改中書令曰右相至徳二年復改右相曰中書令領四方舘置通事舍人十六人掌朝見引納及辭謝及四方通表華夷納貢之事又領集賢殿書院掌判緝古今之經籍以辯明邦國之大典先是梁武帝於文徳殿藏書北齊有文林舘學士後周有麟徳殿學士明皇於西京乾元殿廊下駕部書于東都麗正殿置修書使開元十三年改集僊殿為集賢殿改麗正修書使為集賢書院置大學士初以尚書左丞相張説為之自後多以宰相兼領又置學士五品已上官為之置學士六品已下官為之學士一人知院事一人副知院事又置侍講學士修撰校理待制直院檢討等官凡承㫖撰集文章校理經籍月終則進課于内嵗終則考最於外又領史舘掌修國史監修國史多以宰相為之又置修撰多以外朝官為之又置直舘以未登朝為之事具國史門又領知匭使唐太后垂拱元年置以逹寃滯天寳九載改為獻納乾元元年復名知匭以諫議大夫及補闕拾遺一人充使受納訴狀每日暮進内向晨出之又尚書省自至徳之後以他官分判户部度支又置鹽鐵轉運使分六卿之職以成一時之務事具邦計門又五代梁開平二年改左右丞為左右司侍郎三年升尚書令為正一品後唐李琦以故相為御史大夫自後不置長興元年升右丞與左丞同並為四品晉天福五年升御史中丞為清望正四品門下中書侍郎為清望正三品左右諌議大夫為清望正四品七年又詔門下侍郎位在左散騎常侍之下先是開元已後兩省侍郎皆𢃄平章事罕有單為之者至是竇貞固自刑部侍郎遷門下侍郎而不𢃄平章事故有是詔周顯徳五年又詔諌議大夫改為正五品班在給事中之下大夫出入宫闈陪侍左右或典治憲度或協佐樞機或贊相禮容或出納詔命或切問近對或獻可替否蓋朝廷之劇任公台之歴試也非夫噐識通荗材行交修以慎密而基心以明逹而致用孰可膺眷簡而處清要乎故稱任者有公忠清任之節博洽謨猷之能充羽儀於臺閣為圭璋於簮冕焉至於非其才者有窺伺競躁之心朋附貪黷之迹故多士之所惡明廷之攸玷焉今總述其事以埀于後庻使見其善而仰止懲其惡而自戒凡臺省部二十九門云選任夫知人則哲能官人安民則恵大禹之訓也慎簡乃僚其惟吉士周穆之命也盖邦國治亂在乎庻官選賢任能其來尚矣自舜命衆職以熈帝載西漢之後政歸尚書機務所出推擇斯妙或以政事用或以文學升内則叅侍左右論思治道外則坐曹夙夜修明官業厥職尤重其才益難詳求遺策博觀歴代曷嘗不慎選衆之舉致得人之慶哉虞舜曰疇若予工僉曰埀哉問誰能順我百工事者朝臣舉垂埀臣名帝曰俞咨􅂷汝共工共謂供其職事􅂷拜稽首讓于殳斨暨伯與殳斨伯與三臣名帝曰俞徃哉汝諧汝能諧和此官帝曰疇若予上下草木鳥獸僉曰益哉上謂山下謂澤若謂順其政殺之有時用之有節言伯益能之帝曰俞咨益汝作朕虞虞掌山澤之官益拜稽首讓于朱虎熊羆帝曰俞往哉汝諧朱虎熊羆二臣名垂益所讓四人皆在元凱之中帝曰龍朕堲讒説殄行震驚朕師堲疾殄絶震動也言我疾讒説絶君子之行而動驚我衆欲遏絶之命汝作納言夙夜出納朕命惟允納言喉舌之官聽下言納于上受上言宣于下必以信漢張安世少以父任為郎用善書給事尚書武帝行幸河東亡書三篋詔問莫能知惟安世識之具作其事後購求得書以相校無所遺失帝竒其才擢為尚書令孔光為博士成帝時博士選三科髙為尚書次為刺史其不通政事以久次補諸侯太傅光以髙第為尚書後漢衛颯建武二年辟大司徒鄧禹府舉能案劇除侍御史胡廣字伯始舉孝亷試為天下第一旬日拜尚書郎周舉為諌議大夫順帝時詔遣八使廵行風俗皆選有威名者乃拜舉侍中翟酺為侍中時尚書有缺詔將大夫六百石以上試對政事天文道術以髙第者補之繇是酺對第一拜尚書盧植為廬江太守嵗餘復徵拜議郎與諌議大夫馬日磾議郎蔡邕楊彪韓説等並在東觀校中書五經記傳補續漢紀靈帝以非急務轉為侍中遷尚書潘朂獻帝時為尚書郎遷右丞詔以朂前在二千石曹才敏兼通明舊事勑並領本職蔡邕舉髙第補侍御史遷尚書三月之間用歴三臺遷巴郡太守復留為侍中張馴為議郎擢拜侍中典領祕書近署甚見納異魏孫資劉放文帝即位同轉為左右丞數月放徙為令黄初初改秘書為中書以放為監資為令各加給事中遂掌機宻明帝即位尤見寵任盧毓文帝時為侍中詔曰官人秩才聖帝所難必湏良佐進可替否侍中毓禀性貞固心平體正可謂誠明有功不懈于位者也其以毓為吏部尚書使毓自選代者曰得如卿者乃可毓舉常侍鄭冲帝曰文和吾自知之更舉吾所未聞者乃舉阮武孫邕帝於是用邕吳張純字元基少厲操行學博才秀而切問㨗對容止可觀擢拜郎中李肅字偉恭南陽人少以才聞善論議臧否得中甄竒録異薦述後進題目品藻曲有條貫以此人服之權擢為選曹尚書晉安平王孚宣帝弟也仕魏為清河太守初魏文帝置度支尚書専掌軍國支計朝議以征討未息勤湏節量及明帝即位欲用孚問左右曰有兄風不答曰似兄帝曰吾得司馬一二人復何憂哉轉為度支尚書裴楷為尚書郎武帝為撫軍以楷為叅軍事㑹吏部郎缺文帝問其人於鍾㑹㑹曰裴楷清通王戎簡要皆其選也於是以楷為吏部郎羊祜為秘書監散騎常侍泰始初詔曰夫總齊璣衡允釐六職朝政之本也祜執徳清劭忠亮純茂經緯文武謇謇正直雖處腹心之任而不總樞機之重非垂拱無為委任責成之意也其以枯為尚書右僕射衛將軍給本營兵陳劭為燕王師泰始中詔曰劭清身潔静行著邦族篤志好古博通六籍耽悦典誥老而不倦宜在左右以篤儒教可為給事中文立為太子中庻子武帝詔曰立忠貞清寔有思理噐幹前在濟隂政事修明後事東宫盡輔導之節昔光武平隴蜀皆收其賢才以叙之蓋所以㧞幽滯而濟殊方也其以立為散騎常侍王戎為議郎太熈元年詔曰夫總百揆之得失管王政之通塞者端右之職也漢代以來每選此官必慎其人議郎王戎可為尚書令劉頌為淮南相元康初從淮南王允入朝㑹誅楊駿頌屯衛殿中其夜詔以頌為三公尚書陸􅁮元帝時為太子詹事時帝以侍中皆北士宜兼用南人曄以清貞著稱遂拜侍中謝尚鎮雒陽都督豫州揚州之五郡軍事在任有政績上表求入朝因留京師署僕射事温嶠為散騎常侍侍講明帝手詔曰卿既以令望忠允之懐著於周旋且文周而㫖逺宜居深宻今欲以卿為中書令朝論亦咸以為宜王洽字敬和成帝時為中書令帝曰敬和清裁昔為中書郎吾尚小數見意甚親之今以中書令欲共講文章之事也宋徐湛之為尚書僕射初劉湛伏誅殷景仁卒文帝委任沈演之庾炳之范曄等後又有江湛何瑀之􅁮誅炳之免演之瑀之並卒至是江湛為吏部尚書與湛之並居權要世謂之江徐焉蕭思話自雍州刺史徴為吏部尚書文帝詔思話曰沈尚書暴病不救其體業貞審立朝盡公年時尚可方相委任奄忽不永痛惋特深銓管要機通塞所寄丈人才用體國二三惟允王景文為司徒左長史孝武以散騎常侍舊與侍中俱掌獻替欲髙其選以景文及㑹稽孔覬俱南北之望並以補之孔覬為臨海太守初晉世散騎常侍選望甚重與侍中不異其後職任閒散用人漸輕孝建三年孝武欲重其選詔曰散騎職為近侍事居規納置任之本實惟親要而頃選常侍陵遲未允宜授時良永寘清澈於是吏部尚書顔竣奏曰常侍華選職任候才新除臨海太守孔覬意業閑素司徒長史王彧懐尚清理並任為散騎常侍帝不欲威權在下其後分吏部尚書置二人以輕其任侍中蔡興宗謂人曰選曹要重常侍閑淡改之以名而不以實雖主意欲為輕重人心豈可變耶既而常侍之選復卑選部之貴不異覬領本州大中正王彧為侍中時孝武選侍中四人並以風貌彧與謝莊為一雙阮韜何偃為一䨇嘗充兼假南齊謝眺自中書郎出為宣城太守以選召復入為中書郎江斆轉都官尚書領驍騎將軍王晏啟武帝曰江斆今重登禮閣兼掌六軍慈渥所覃寔是優榮但語其事任殆同閒輩天㫖既欲升其名位愚謂以侍中領驍騎望實清顯有殊納言帝曰斆嘗啓吾為其鼻中惡今既以何𦙍王瑩還門下故有此回換耳梁孔休源為臨川王府行叅軍武帝謂徐勉云今帝業初搆須一人有學藝解朝儀者為尚書儀曹郎勉曰孔休源識見清通詳練故事自晉宋起居注畧誦上口帝亦聞之即日除兼尚書儀曹郎張緬為太子舍人殿中郎缺武帝謂徐勉曰此曹舊用文學且居鴈行之首宜詳其人勉舉緬充選劉孝綽為太子舍人兼尚書水部郎中啟陳謝手勑答曰美錦未可便製簿領亦宜稍習頃之即真後自上虞令遷秘書丞武帝謂舍人周捨曰第一官當用第一人故以孝綽居此職到沆為洗馬管東宫書記散騎省天監二年詔尚書郎在職清能或人才髙妙者為侍郎以沆為殿中曹侍郎沆從父兄漑洽並有才名時皆相代為殿中當世榮之蕭介為散騎常侍㑹侍中闕選司舉王筠等四人並不稱㫖武帝曰我門中久無此職宜用蕭介為之博物强識應對左右多所規正帝甚重之遷都官尚書每軍國大事必先詢談於介焉帝謂朱异曰端古之才也王通為給事黄門侍郎侯景之亂奔于江陵元帝以為散騎常侍遷守太常卿自侯景亂後臺内宫室普皆焚燼以通兼起部尚書歸於京師専掌繕造陳蕭𢎞為黄門侍郎吏部侍郎缺所司屡舉王寛謝爕等帝並不用乃中詔用𢎞姚察為吏部尚書雅允朝望初吏部尚書蔡徴移中書令後主方擇其人尚書令江總等咸薦察勅答曰姚察非惟學藝優博亦是操行清修典選難才今得之矣乃神筆草詔讀以示察察辭譲甚切後主曰選士之舉僉議所歸昔毛玠雅量清恪盧毓心平體正山濤舉不失才就卿而求必兼此矣且我與卿雖君臣禮隔情分殊常藻鏡人倫良所期寄亦以無慙則哲也江總至徳中授尚書令策曰於戯夫文昌政本司㑹治經韋虎謂之樞機李固方之斗極况其五曹斯綜百揆是諧同冡宰之司専中臺之任惟爾道業標峻宇量𢎞深勝範清規風流以為凖的辭宗文學衣冠以為領袖故能師長六官具瞻允塞明府八座儀型載逺其端朝握揆朕所望焉徃欽哉懋建爾徽猷亮采我邦家可不慎歟後魏崔𤣥伯為尚書道武天興元年十一月詔尚書吏部郎中劉淵典官制立爵品定律呂協音樂儀曹郎中董鑑撰郊廟社稷朝聘饗燕之儀三公郎中王徳定律令申科禁太史令晁崇造渾儀考天象𤣥伯總而裁之茍頽獻文時為雒州刺史承明元年文明太后令百官舉才堪幹事人足委仗者於是公卿咸以頏應選徵拜散騎常侍殿中尚書宋弁為散騎常侍遷右衛將軍領黄門弁屢譲孝文曰吾為相加者卿亦不可有辭豈得専守一官不助朕為治且散騎位在中書之右常侍者黄門之麤冗領軍者二衛之假攝不足空存推譲而棄大委後孝文車駕征馬圏留弁以本官兼祠部尚書攝七兵事及行執其手曰國之大事在祀與戎故令卿綰攝二曹弁頓首辭謝裴夙字宵興沉雅有噐識儀望甚偉孝文見而異之自司空主簿轉尚書左主客郎中范紹少聰敏頗渉經史孝文選為門下通事舍人遷録事合掌奏文帝善之又為侍中李冲黄門崔光所知出内文奏多以委之帝曽謂近臣曰崔光從容范紹之力崔振為髙陽内史孝文南討徵兼尚書左丞留京振既才幹被擢當世以為榮崔亮為尚書二千石孝文在雒欲剏革舊制選置百官謂羣臣曰為朕舉一吏部郎必使才望兼允者給卿三日假又曰朕已得之不煩卿輩也馳驛徴亮兼吏部郎朱元旭為尚書度支郎中孝明神龜之末以郎選不精大加沙汰元旭與隴西辛雄范陽祖瑩泰山羊深西平源子恭並以才用見留辛雄神龜中除尚書駕部郎中轉三公郎其年沙汰郎官惟雄與羊深等八人見留餘悉罷遣後兼司州别駕加前軍將軍冀州刺史侯剛啟為長史孝明以雄長於世務惜不之用更除司空長史羊深為尚書駕部郎中于時沙汰郎官務精才實深以才堪見留在公明斷尚書僕射崔亮吏部尚書甄琛咸敬重之孝明行釋奠之禮講孝經深於儕軰中獨䝉引聽時論美之李業興為通直散騎侍郎普泰元年沙汰侍官業興仍在通直北齊宋㳺道初仕東魏為大將軍司馬文襄以吏部郎中崔暹為御史中尉以㳺道為尚書左丞謂暹㳺道曰卿一人處南臺一人處北省當使天下肅然崔昂為廷尉卿文宣幸東山百官預讌帝召昂於御座前諭曰舊人多出為州我欲以臺閣中相付當用卿為令僕勿望刺史卿六十外當與卿本州中間不可得也天保十年策拜儀同燕于殿百司陪列昂在行中文宣特召昂在御所曰歴思羣臣可綱紀省闥者惟冀卿一人即日除為兼右僕射數日後昂因入奏事帝謂尚書令楊愔曰昨不與崔昂正者言其太速欲明年真之終事除正何事早晩可除正僕射明日即拜為真張景仁除通直散騎常侍及奏御筆㸃通直字遂以為正常侍後周樂遜為太學助教閔帝踐阼以遜有理務才除秋官府上士章瑱自行臺左丞出為郢州刺史復入為行臺左丞瑱明察有幹局再左轄時論榮之李旭為御正中大夫時以近侍清要盛選國華乃以旭及安昌公元則中都公陸逞臨淄公唐謹等並為納言隋楊注為雒州長史高祖嘗謂諌議大夫王逹曰卿為我覔一好左丞逹遂私於注曰我薦君為左丞若事果當以良田相報也注以逹言奏之逹竟以此獲罪卒拜注為尚書左丞斛斯政煬帝時為尚書兵部郎遼東之役兵部尚書段文振卒侍郎明雅復以罪廢帝彌屬意尋遷兵部侍郎唐盧承慶美風儀博學有才幹貞觀初為秦州都督府户曹叅軍因奏河西軍事太宗竒其明辯擢考功員外郎李道裕太宗時為將作少監㑹刑部尚書張亮反帝命百僚議其獄多言亮當誅惟道裕言亮反形未具明其無罪太宗既盛怒竟斬于市籍沒其家嵗餘刑部侍郎有闕令執政者妙擇其人累奏皆不可太宗曰朕得其人也徃者李道裕議張亮云反形未具此言當矣時雖不即從至今追悔遂授道裕刑部侍郎岑文本為中書舍人時中書侍郎顔師古以譴免職温彦博言於太宗曰師古諳練政事長於文誥時無逮者冀上復用之太宗曰我自舉一人公勿憂也於是以文本為中書侍郎楊𢎞禮為中書舍人太宗有事遼東以𢎞禮有文武才擢拜兵部侍郎専權兵機之務王及善則天時為益州都督府長史以老病致仕加光禄大夫後契丹作亂東山不安召授滑州刺史顧曰卿比在外知國家事有何不穏及善陳理亂之宜十餘道則天曰彼末事也此為本也卿不可行遂留拜内史任雅相為右驍衛將軍兵部侍郎髙宗聞其亷正擢為兵部尚書兼受將相之任崔𤣥暐為天官侍郎每介然自守都絶請謁頗為執政者所忌轉文昌左丞經月餘則天謂曰自卿改職以來選司大有罪過或聞令史乃設齋自慶此欲盛為貪惡耳今要復舊任又除天官侍郎李昭徳為鳳閣侍郎長夀二年増置夏官侍郎三員時選昭徳與婁師徳侯知一為之席豫為吏部侍郎𤣥宗謂之曰以卿前為考功職事平允故有此授蘇頲為工部侍郎𤣥宗謂宰臣曰有從工部侍郎得中書侍郎否對曰任賢用能非臣等所及帝曰蘇頲可中書侍郎仍供政事食明日加知制誥有政事食自頲始也頲入謝帝曰常欲用卿每有好官闕即望宰相論及宰相皆卿之故人卒無言者朕為卿嘆息中書侍郎朕極重惜自陸象先改後朕每思之無出卿者趙退翁自湖南觀察使受代歸京師閤門静居不與人交徃久之特召對於别殿退翁多學問有詞辯敷奏稱㫖徳宗悦之拜給事中蔣乂為司勲貟外郎貞元十八年時集賢闕學士求者甚衆㑹詔問神策軍建置之繇相府討求不知所出乃訪於乂又徴引根源對甚詳悉宰臣髙郢鄭珣瑜相顧曰集賢有人矣翌日詔兼判集賢院事趙宗儒貞元六年為司勲貟外郎判考功宗儒復行貶考之令自至徳以來考績之司事多失寔常叅官及諸州刺史未嘗分其善惡悉以中上考褒之及是褒貶稍明人知戒懼帝善之遷宗儒考功郎中薛播貞元中為禮部侍郎朝廷難貢舉之任以播素有監裁遂膺其命李遜元和中為浙江東道觀察使入朝憲宗曰諌官給事中若除授有私政􅆾允當各令論駁舉其職業以遜浙東有政能遷為給事中呂元膺元和中為給事中出為同州刺史及入謝憲宗問以時政得失元膺論奏詞甚激切帝嘉其剛正翌日謂宰臣曰呂元膺讜言直氣今欲留在左右使言得失卿等以為何如李蕃裴垍進賀曰陛下納諌超冠前王乃宗社無疆之福臣等不能廣求直士又不能數進直言孤負聖心合當罪責今請以元膺復為給事中以備顧問帝悦而從之孟簡長慶中代崔羣為戸部侍郎是官有二員其判使案者别居一署謂之左户元和以還號為清重之最宰輔登用多繇此而去故羣入相以簡代焉班肅為坊州刺史長慶初以肅為司封員外郎時宰臣上言曰將欲清風俗必在厚人倫竊見皇甫鎛惟位盛時班行之中多所親附及得罪後議論立變憎嫉如讐俗之衰薄一至於此惟班肅以曽為郎官判度支案終始如一獨送出城周行之間多美其事今郡秩已罷望授一省官以表其行故有是拜韋顗為户部侍郎長慶四年十月以顗為御史中丞兼户部侍郎以御史中丞鄭覃為權知工部侍郎以刑部侍郎韋景為吏部侍郎以權知禮部侍郎李宗閔為權知兵部侍郎以工部侍郎于敖為刑部侍郎以中書舍人楊嗣復權知今年貢舉是日尚書六曹無不更換人情異之王播為河南尹太和二年十月以播為尚書右丞勅吏部今年東都選事宜令播權判待銓試畢日領官吏赴上都桞公權以中書舍人翰林學士兼侍書開成二年四月以公權為諌議大夫知制誥學士侍書如初初上於便殿召公權周墀對公權論事切直忤㫖周墀為之惴慄公權詞氣益堅帝徐謂公權曰朕知舍人不合却作諌議以卿論事有爭臣之風今授卿諌議大夫翌日詔下魏謩為起居舍人充𢎞文舘直學士開成四年以謩為諌議大夫兼起居舍人充𢎞文舘直學士詔云朕以邦國之大機務之多恵有所未周化有所未洽不有忠讜之士左右輔益逮暗無燭不其難歟今即髙選正人俾居諌省朝政闕失期乎必聞是用簡自朕心特申奨命所期稱職豈限賞資謩累䟽譲官帝遣宰臣宣㫖謩乃就官元晦為吏部郎中㑹昌三年二月除右諌議大夫制曰昔汲黯薄淮陽守願出入禁闥補過拾遺則諌諍之任實資諒直我求其比今得正人吏部郎中元晦徃在内廷曽感先顧奮發忠懇不私形骸俯伏青蒲至於零涕數共工之罪不蔽堯聰辯垣平之詐益彰文徳近因旌别邪正宰弼上言以魯公藏罟莫如寘革於左右漢后葺檻孰若列雲於公卿是用命爾登于文陛爾其副我寵擢不替初心無沽小名以枉大節勉服官業期于有終周世宗顯徳六年車駕幸滄州四月辛卯以前左諌議大夫薛居正為刑部侍郎權判吏部銓司公事仍賜金紫是時居正衘命先至滄州以均定民租為事帝既至聞其幹事故有是拜册府元龜卷四百五十七
