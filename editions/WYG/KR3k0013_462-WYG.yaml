body:
  text: 册府元龜卷四百六十二宋王欽若等撰臺省部清儉恭慎練習清儉傳曰儉徳之基也又曰以約失之者鮮矣蓋禄不期侈著于格訓貴而能貧謂之美徳繇兩漢而下盛臺閣之選令人髦士舉集其中乃有素尚清簡至性高潔靡營貲産不事儲畜薄於奉已急於濟衆委不義之貨甘食貧之樂饋遺咸屏澣濯以朝不求所居之安靡争下民之利以至家人困於舂藁諸子疲於樵採去官而徒四壁啓手而無餘財斯皆砥礪廉隅樹立名節造次於是始終不渝用能儀表於官聮敦尚於俗化俾貪夫之知耻中人而思勉者也若夫禄有代耕之制用有量入之義而偪下已甚不堪其憂者斯亦矯枉過正非可以訓後漢鍾離意明帝時為尚書時交阯太守張恢坐贓千金徴還伏法以資物簿入大司農詔班賜羣臣意得珠璣悉以委地而不拜賜帝怪而問其故對曰臣聞孔子忍渴於盗泉之水曽参廻車於勝母之閭惡其名也此贓穢之寳誠不敢拜帝嗟嘆曰清乎尚書之言朱暉為尚書禄仕數十年蔬食布衣家無餘財藥崧為郎家貧嘗獨直臺上無被枕杫杫爼几也方言云蜀漢之郊曰杫食糟糠帝每夜入臺輙見崧問其故甚嘉之自此詔大官賜尚書以下朝夕餐給帷被皁袍及侍史二人蜀劉巴為尚書令躬履清儉不治産業呉陳化為太常兼尚書令正色立朝勅子弟廢田業絶治産仰官廪禄不與百姓争利是儀為侍中服不精細食不重膳拯贍貧困家無儲畜孫權聞之幸儀舎求視蔬飯親嘗對之歎息即増俸賜益田宅儀辭譲以恩為戚晉鄧攸為吏部尚書蔬食敝衣周急振乏華恒為光禄大夫開府常侍清恪儉素雖居顯列常布衣蔬食年老彌篤死之日家無餘財惟有書數百卷時人以此貴之李𦙍為尚書令侍中雖歴職内外而家至貧儉兒病無以市藥武帝聞之賜錢十萬山濤為尚書以母老辭職詔除議郎武帝以濤清儉無以供養特給日契加賜牀帳茵褥後遷僕射薨左長史范晷上言濤舊第茅屋十間子孫不相容帝為之立屋初濤布衣家貧謂妻韓氏曰忍饑寒我後當作三公但不知卿堪公夫人否耳及居榮貴貞慎儉約雖爵同千乘而無嬪媵禄賜俸秩散之親故初陳郡袁毅嘗為鬲令貪濁而賂遺公卿以求虚譽亦遺濤絲百斤濤不欲異於時受而藏於閣上後毅事露檻車送廷尉凡所受賂皆見推簡濤乃取絲付吏積年塵埃印封如初裴憲楷之子也為侍中永嘉末王浚承制以憲為尚書石勒破浚簿其官僚親屬皆貲至巨萬惟憲與荀綽家有書百帙鹽米僅十數斛而已呉隠之為度支尚書以竹蓬為屏風坐無氊席後遷中領軍清儉不革每月俸禄裁留身糧其餘悉分賑親族家人績紡以供朝夕時有困絶或并日而食身常布衣不完妻子不沾寸禄卞壼為尚書廉潔儉素居甚貧約劉超為中書舎人處身清苦衣不重帛家無擔石之儲每元帝所賜皆固辭曰凡陋小臣横竊賞賜無徳而禄殃咎是懼帝嘉之不奪其志超出補句容令入為中書通事郎以父憂去職家貧妻子不贍帝手詔褒之賜以魚米超辭不受魏舒為侍中武帝以舒清素特賜絹百匹阮放字思度素知名而性清約不營産業為吏部郎不免饑寒王導庾亮以其名士嘗供給衣食周顗為尚書左僕射為王敦所害敦使繆垣籍顗家收得素簏數枚盛故絮而已酒五甕米數石在位者服其清約陸納為吏部尚書謝安嘗欲詣納而納殊無供辦其兄子俶不敢問之乃宻為之具安既至納所設惟茶果而已俶遂陳盛饌珍羞畢具客罷納大怒曰汝不能益光叔父乃復穢我素業耶於是杖之四十其舉措多此類宋向彌為散騎常侍治身儉約不營室宇無園田商貨之業時人稱之沈演之為吏部尚書領太子右衞率而謙約自持文帝賜以女妓不受孔顗代庾徽之為御史中丞先是徽之在職性豪麗服玩甚華顗代之衣冠器用莫不麄率江湛為吏部尚書家甚貧約不營財利餉饋盈門一無所受無兼衣餘食嘗為文帝所召值澣衣稱疾經日衣成然後起牛餓馭人求草湛良乆曰可與飲柳元景為尚書令元景起自將帥及當朝理務雖非所長而有𢎞雅之美時在朝勲要多事産業唯景獨無所營南岸有數十畆菜園守園人賣得錢二萬送還宅元景曰我立此園種菜以供家中啖耳乃復賣菜以取錢奪百姓之利也以錢乞守園人何尚之為侍中領尚書令立身簡約車服率素妻亡不娶又無姬妾顔延之為光禄大夫其子竣初為孝武南中郎諮議叅軍及帝登祚以為金紫光禄大夫領湘東王師竣既貴重權傾一朝凡所資供延之一無所受器服不改宅宇如舊嘗乘羸牛車逢竣鹵簿即屏住道側揚運長後廢帝時與阮佃夫俱兼通事舎人以平桂陽王休範功封南城縣子運長質本亷正修身甚清不事園宅不受餉遺孔琳之為祠部尚書不治産業家尤貧素南齊庾杲之為尚書駕部郎清貧自業食惟有韭葅􅊪韭生韭雜菜或戲之曰誰謂庾郎貧食時常有二十七種言三韭也褚炫武帝時為吏部尚書炫居身清正非弔問不雜交游論者以為美其在選部門庭蕭索賓客罕至出行左右捧黄紙㡌箱風吹紙剥僅盡前為江夏内史及罷郡得錢十七萬於石頭並分於親族病無以市藥表自陳觧改授散騎常侍領安成王師褚淵初仕宋明帝為吏部尚書有人求官宻䄂中將一餅金因求請間出金示之曰人無知者彦囘曰足下自應得官無假此物若必見與不得不相啓此人大懼收金而去彦囘叙其事而不言其名時人莫之知也至高帝建元初為中書監時淮北屬江南無復鰒魚或人有間關得至者一枚直數千錢有餉彦回鰒魚三十枚彦囘時雖貴而貧薄過甚門生有獻計賣之云可得十萬錢彦回變色曰我謂此是食物非曰財貨且不知堪賣錢聊爾受之雖復儉乏寧可賣餉取錢也悉與親族啖之少日便盡張緒為金紫光禄大夫口不言利有財輙散之清言端坐或竟日無食門生見緒饑為之辦餐然未嘗求也陸慧曉為吏部尚書令王晏選門生補内外要局慧曉為用數人而止晏恨之送女妓一人欲與申好慧曉不納張瓌與沈文季同為侍中俱在門下文季每還直器物若遷瓌止朝服而已時集書每兼門下東省寔多清貧有不識瓌者嘗呼為散騎梁傅昭初仕宋明帝為中書通事舎人時居此職皆勢傾天下昭獨廉静無干豫器服率陋身安麤糲嘗挿燭於板牀明帝聞之賜漆合燭盤等勑曰卿有古人之風故賜卿古人之物徐勉為中書令雖居顯位不營産業家無蓄積俸禄分贍親族之窮乏者周捨為尚書吏部郎性儉素衣服器用居處牀席如布衣之貧每入官府雖廣厦華堂閨閤重邃捨居之則塵埃滿積以荻為鄣壊亦不營顧恊為通直散騎侍郎兼中書通事舎人恊少清介有志操及為舎人同官者皆潤屋恊在省十六載器服飲食不改於常有門生始來事恊知其亷潔不敢厚餉止送錢二千恊發怒杖二十因此事者絶於饋遺到溉為左民部尚書所蒞以清白自修性又率儉不好聲色虗室單牀旁無姬侍自外車服不事鮮華冠履十年一易朝服或至穿補傳呼清路示有朝章而已沈約為左光禄大夫性不飲酒少嗜欲雖時遇隆重居處儉素陳陸瓊為吏部尚書瓊性謙儉不自封植雖位望日隆而執志愈下園池室宇無所改作車馬衣服不尚鮮華四時俸禄皆散之宗族家無餘財暮年深懐止足因避權要遂謝病不視事姚察為吏部尚書自居顯要甚勵清潔且廩錫以外一不交通嘗有門人逺至不敢厚餉止送南布一端花練一疋察謂之曰吾所衣者止是麻布蒲綀此物於吾無用既欲相欵接幸不煩爾此人遜請猶冀受納察厲色驅出因此伏事者莫敢饋遺後魏崔𤣥伯為吏部尚書為道武所任勢傾朝野而儉約自居不營産業家徒四壁出無車乘朝晡歩上母年七十供養無重膳道武嘗使人宻察聞而益重厚加饋賜時人亦或譏其過約而𤣥伯為之愈甚賈賁歴尚書郎以清素稱盧義僖為左光禄大夫性清儉不營財利雖居顯位每至困乏麥飯蔬食忻然甘之高允為中書侍郎領著作以忠諫拜中書令著作如故司徒陸麗曰高允雖蒙寵待而家貧布衣妻子不立文成怒曰何不先言今見朕用之方言其貧是日幸允第唯草屋數間布被緼袍厨中鹽米而已于時百官無禄允嘗使稚子樵采自給文成歎息曰古人之清貧豈有此乎即賜帛五百疋粟千斛游肇為尚書右僕射清貧寡欲資仰俸禄而已崔亮為中書侍郎兼尚書左丞亮雖歴顯任其妻子不免親事舂簸孝文聞之嘉其清貧詔帶野王令楊機為度支尚書家貧無馬多乘小犢車時論許其清白高崇為尚書三公郎家資富厚僮僕千餘而崇志高儉素車馬器服充事而已約己自修與物無競鹿悆為給事黄門侍郎而自無室宅嘗假賃居止布衣糲食寒暑不變莊帝嘉其清潔時復賜以錢帛山偉為侍中中書令不營産業身亡之後賣宅營葬妻子不免飄泊士友歎愍之常景歴黄門侍郎右光禄大夫自少及老嘗居事任清儉自守不營産業至於衣食取濟而已友人刁整每謂曰卿清徳自居不事家産雖儉約可尚將何以自濟也吾恐摯太常方餒於栢谷耳遂與衞將軍羊深矜其所乏乃率刁䨇司馬彦邕李諧畢祖彦畢義顯等各出錢千文而為買馬焉韓子熈為黄門侍郎清白自守不交人事北齊李元忠為侍中孫騰司馬子如嘗共詣元忠見其坐樹下擁被對壺庭室蕪曠謂二公曰不意今日披藜藿也因呼妻出衣不曳地二公相顧歎息而去大餉米絹衣服元忠受而散之元文遥為侍中既不與趙彦深清真守道又不為和士開貪滛亂政在於孟季之間然性和厚遷鄴唯有地十頃與物無競故時論不在彦深之下家貧所資衣食而已辛術為東南道行臺尚書時睢州刺史及所部守俱犯大辟朝廷以其奴婢百口及貲財盡賜術三辭不見許術乃送詣所司邢邵聞遺術書曰昔鍾離意云孔子忍渴於盗泉便以珠璣委地足下今能如此可謂異代一時袁聿修為吏部郎中在官亷謹當時少匹魏齊世臺郎多不免交通饋遺聿修在尚書十年未嘗受升酒之饋尚書邢邵與聿修舊欵每於省中語戲嘗呼聿修為清郎盧叔武為右光禄大夫魏收曽來詣之訪以雒京舊事不待食而起云難為子費叔武留之良乆食至但有粟餐葵菜木椀盛之片脯而已所將僕從亦盡設食一與此同後周張軌為度支尚書性清素臨終之日家無餘財唯有素書數百卷柳慶為左僕射拜司㑹中大夫與楊寛有隙明帝武成二年慶除宜州刺史慶自為郎迄於司㑹府庫倉儲並其職也及在宜州寛為小冡宰乃囚慶故吏求其罪失按驗積六十餘日吏或有死於獄者終無所言唯得乗錦數匹時人服其廉慎陸通為大司㓂通性柔謹雖乆處列位常清慎自守所得禄賜盡與親故共之家無餘財嘗曰凡人患貧而不貴不患貴而貧也辛慶之為通直散騎常侍儀同三司慶之任遇雖隆而率儉素車馬衣服不尚華侈隋薛濬開皇初為考功侍郎性儉死之日家無遺貲滑儀煬帝時為尚書右司郎于時政漸亂濁貨賂公行凢當樞要之職無問貴賤並家累金寳天下士大夫莫不變節而儀勵志守常介然獨立帝嘉其清苦超拜京兆郡丞柳調為尚書左司郎時王綱不振朝士多贓貨唯調清素守節為時所稱唐裴矩仕隋為黄門侍郎于時朝士類多贓貨唯矩清素自守時人稱之竇威為内史令性儉素不樹産業及卒家無餘財温彦博為中書令彦博家無正寢及卒之日殯於别室太宗命有司為造宅堂焉蘇頲為禮部尚書知吏部選事性亷儉所得俸禄盡推與諸弟或散之親族家無餘貲盧懐慎為黄門監兼吏部侍郎清儉不營産業器用服飾無金玉綺文之麗所得俸禄皆随時分散而家無餘蓄妻子匱乏及太宗幸東都西門博士張星上言懐慎忠清直道始終不虧不加寵贈無以勸善乃詔賜其家物百段米粟二百石于休烈為工部尚書在朝凡三十餘年歴掌清要家無擔石之儲蔣鎮徳宗時為工部侍郎以簡儉稱於時奚陟貞元中為中書舎人先是右省雜給率分等皆據職田頃畆即主事所受與右史等陟乃約以料錢為率自是主事所得减於拾遺時中書令李晟所謂紙筆雜給皆不受但告雜事舎人令且貯之它日便悉以遺舎人前例雜事舎人自㩗私入陟以所得均分省内官陸贄為中書舎人翰林學士母卒持䘮於河南豐樂佛寺四方賻贈為詞厚致金帛贄絲毫無所受唯與劍南節度使韋臯布衣友善臯以事奏聞每有所致輙稱詔以授之李建穆宗長慶初為刑部侍郎建名位雖顯以亷儉自處為家不理垣屋士友推之李懐遠以兵部尚書知東都留守懐遠乆居榮位而好尚清廉宅舎屋宇無所増改常乘欵段馬豆盧欽望之謂曰榮貴如此何不易駿乘之答曰此馬幸免驚蹶何假别求聞者莫不歎服郭承嘏尚父子儀曽孫為刑部侍郎自没之後家無餘財喪祭所費皆親友供給而後具縉紳之徒無不痛惜晉姚顗為户部尚書疎於財而御家無術既死歛葬之資不備家人俟賻物鬻第方能舉喪而去士大夫愛其廉而鄙其拙周張沆為刑部尚書驟歴顯重家無餘財死之日書圖之外唯使鄆之貲耳臣欽若等曰齊王高行周鎮鄆州沆為册贈使嗣子尚幼親友慮其耗散太祖前言之乃令三司差人主葬餘資市邸舎僦稅以贍其孤顔術為吏部侍郎儒學之外雅有政術累更清吏皆以廉幹著名恭慎傳曰如承大祭言乎恭也詩曰如履薄氷志乎慎也是故君子率禮以奉上思患而豫防俯仰抑畏周旋謹宻然後臻夫寡過保其克終者焉大漢之後歴禁省之任者莫不叅預宻勿經綸政典備預顧問侍從朝宁推擇攸重俊乂並列乃有質性端方志尚惇固靡通於謁客無洩於𠂻言非公事而不談居官次而匪懈小心惕厲罔見於惰容退食閒燕彌加於慎獨用能保持名檢便蕃左右終寡於尤悔克隆乎恩紀蓋書之夙夜惟寅易之夕惕若厲皆斯之謂歟漢石奮為太中大夫無文學恭謹舉無與比舉皆也金日磾武帝時為侍中光禄大夫自在左右目不忤視者數十年忤逆也賜出宫女不敢近帝欲納其女後宫不肯其篤慎如此霍光武帝時為郎遷諸曹侍中光禄大夫出則奉車入侍左右出入禁闥二十餘年宫中小門謂之闥小心謹慎未甞有過甚見親信梁丘賀宣帝時為太中大夫給事中小心周宻帝信重之孔光成帝時領尚書給事中有所薦舉唯恐其人之聞知沐日歸休兄弟妻子燕語終不及朝省政事或問光温室省中樹皆何木也長樂宫中有温室殿光嘿不應更答以它語其不洩如此後漢樊宏時為光禄大夫每當朝㑹輙迎期先到俯伏待事時至乃起帝聞之嘗勑騶騎臨朝乃告勿令預到宏所上便宜及言得失輙手自書冩毁削草本公朝訪逮不敢衆對宗族染其化未甞犯法帝甚重之樊􅆊為郎二十餘年三署服其重慎每當直事嘗晨駐馬待漏雖在閒署冠劍不解於身每漏初恐失時乃張燈俯伏徐防明帝時補尚書郎職典樞機周宻畏慎奉事二帝未嘗有過焉藥崧河内人天性朴忠家貧為郎甞獨直臺上明帝每夜入臺輙見崧問其故甚嘉之陳寵章帝時為尚書性周宻慎重所表薦輙自手書人莫得知嘗稱人臣之義苦不畏慎自在樞機謝遣門人拒絶知友唯在公家而已朝廷器之延篤桓帝時為侍中帝數問政事篤詭辭宻對動依典義魏荀彧為尚書令嘗以書陳事臨薨皆焚燬之故竒䇿宻謀不得盡聞也荀攸為尚書令深宻有志自防嘗從太祖征伐㑹謀謨帷幄時人及子弟莫知其所言攸姑子辛韜曽問攸説太祖取冀州時事攸曰佐治為袁鐸乞䧏王師自往平之吾何知焉自是韜及内外莫敢復問軍國事也攸與鍾繇善前後凡畫竒䇿十二唯繇知之繇撰集未就㑹薨故世不得盡聞也劉􅁮黄初中為侍中在朝略不交接時人或問其故􅁮答曰魏室即祚尚新智者知命俗或未咸僕在漢為支葉於魏備心腹寡偶少徒於㡬宜未失也任嘏為黄門侍郎每納忠言輙手書懐本自在禁省歸書不封帝嘉其淑慎蜀劉巴為尚書令恭黙守静退無私交非公事不言晉羊祜為尚書僕射歴仕二朝任典樞要政事損益皆諮訪焉勢利之求無所闗與其嘉謀讜議皆焚其草故世事莫聞凡所進達人皆不知所繇或謂祜慎宻太過者祜曰是何言歟夫入則造膝出則詭辭君臣不宻之誠吾惟懼其不及不能舉賢取異豈得不媿知人之難哉且拜爵公朝謝恩私門吾所不敢劉超為中書舎人拜騎都尉奉朝請時臺閣初建庶績未康超職典文翰而畏慎静宻彌見親待後為中書侍郎蘇峻亂遇害超天性謙慎歴事三帝嘗在機宻並蒙親遇而不敢因寵驕謟故士人皆安而敬之超子訥為中書侍郎謹飭有石慶之風訥子亨亦清慎為散騎郎宋殷景仁為中書令卧疾者五年雖不見上而宻表去來日中以十數朝政大小必以問焉形迹周宻莫有窺其際者謝𢎞微元嘉中為侍中每有獻替又論時事必手書焚草人莫知之太祖以𢎞微能營膳羞嘗就求食𢎞微與親故經營既進之後親人問帝所御不答别以餘語酬之時人比漢世孔光𢎞微臨終語左右曰有二封書湏劉領軍至可於前燒之慎勿開也書皆是太祖手勑帝甚痛惜之南齊禇澄為侍中領右軍將軍以勤謹見知梁吕僧珍為散騎常侍直秘書省僧珍性甚恭慎當直禁中盛暑不敢解衣每侍御坐屏氣鞠躬果食未嘗舉箸韋叡為散騎常侍䕶軍將軍居朝廷恂恂未嘗忤視髙祖甚禮敬之周捨為尚書吏部郎捨素辯洽與人談論終日不絶口而竟無漏洩機事衆尤歎之王瑩為尚書令雲麾將軍侍中瑩性清慎居官恭恪髙祖敬之孔休源為尚書儀曹郎累遷給事中黄門侍郎性慎宻寡嗜好出入帷幄未嘗言禁中事世以此重之陳袁樞為吏部尚書是時僕射到仲舉雖叅掌選事銓衡汲引並出於樞其所舉薦多㑹上㫖謹慎周宻清白自居文武職司鮮有遊其門者王瑒為西部尚書瑒性寛和及居選職務在清静謹守文案無所抑揚尋加侍中遷左僕射叅掌選事姚察為吏部尚書入隋為散騎常侍盡心事上知無不為侍奉機密未嘗洩漏後魏盧魯元以忠謹給侍東宫及太武即位以為中書侍郎拾遺左右寵待彌渥而魯元益加謹肅太武愈親信之内外大臣莫不敬憚焉古弼太武時為尚書令端謹慎宻口不言禁中之事功名等於張黎而廉不及也許彦為散騎常侍質厚慎宻與人言不及内事太武以此益親待之李孝伯為比部尚書性方慎忠厚每朝廷大事有不足必手自書表切言陳諫或不從者至於再三削滅藁草家人不見自崔浩誅後軍國謀謨咸出孝伯太武寵養有亞於浩亦以宰輔遇之獻替補闕其迹不見時人莫得而知崔𤣥伯為黄門侍郎與張衮對總機要𤣥伯自非朝廷文誥四方書檄初不染翰故世無遺文司馬仲文為中書舎人以謹敏著稱高允為中書令遷中書監魏初法嚴朝士多見杖罰允歴事五帝出入三省五十餘年初無譴咎楊津為符璽郎津身在禁宻不外交游至於宗族姻表罕相祇候焉陸凱為給事黄門侍郎在樞要十餘年以忠孝見稱希言屢中孝文嘉之庫狄峙大統元年拜中書舎人叅掌機宻以恭謹見稱北齊封隆之為右僕射自義旗始建經略竒謀妙算宻以啟聞手書削藁罕知於外髙祖嘉其忠謹每多從之宋士素沉宻少言有才識歴中書黄門侍郎遷儀同三司散騎常侍自處機要近二十年周慎温恭劉世清為侍中情性修整周慎謹宻隋李徳林為内史令自從官以後即典機宻性慎重嘗云古人不言温樹何足稱也張䖍威煬帝初為謁者大夫時淮南太守楊綝嘗與十餘人同來謁見帝問䖍威曰其首立者為誰䖍下殿就視而答曰淮南太守楊綝帝謂䖍威曰卿為謁者大夫而乃不識叅見人何也䖍威對曰臣非不識楊綝但慮不審所以不敢輕對石建數馬蓋慎之至也帝甚嘉之唐徐岱代宗時為給事中史舘修撰充皇太子及舒王已下侍讀承兩宫恩顧時無與比而謹慎過甚未嘗洩禁中之事亦不談人之短韋綬徳宗朝為翰林學士貞元之政多叅决於内署綬所議論嘗合中道然危慎致傷晩得心病故不極其用高郢貞元中為中書舎人守官奉法勤恪掌誥累年家無制草或謂曰前軰皆留制集公焚之何也曰王言不可存私家時人重其慎宻王紹貞元中為户部尚書判度支於時徳宗以紹謹慎恩遇特異凡主重務八年政之大小多所訪决紹未嘗漏洩亦不務矜衒裴垍元和中在翰林承㫖屬憲宗初平呉蜀勵精思理機密之務一以問垍垍小心敬慎甚稱上意練習夫思不出位君子所重官修其方前經攸尚自漢之中葉政歸省闥典章品式軌儀故實咸在是焉乃有居其職者明習厥事濳思探􅄨黙識彊記咨疑議而必决訪墜簡而能舉叅預詳綴多所刋正儕類服其諳練時論稱其折衷斯故不假求禮於野而學官於夷者矣漢孔光為尚書觀故事品式數嵗明習漢制及法令成帝甚信任之後漢張純光武時為武官中郎將在朝歴世明習故事建武初舊章多闕每有疑議輒以訪純自郊廟婚冠䘮祭禮儀多所正定帝甚重之樊凖為尚書令明習故事遂見任用郭賀能明法為尚書令在職六年曉習故事多所裨益黄瓊為尚書僕射初瓊在臺閣習見故事及後居職達練官曹爭議朝堂莫能抗奪劉祐為尚書侍郎閑練故事文禮彊辯每有奏議應對無滯為僚類所歸黄香為尚書令曉習邊事均量軍政皆得事宜楊球為尚書侍郎閑達故事其章奏處議常為臺閣所崇信魏潘勗漢末為尚書郎遷右丞詔以朂前在二千石曹才敏兼通明習舊事勅並領本職數加特賜桓範為尚書在臺閣號為曉事晉何邵為尚書左僕射博學善屬文陳說近代事若指諸掌傅祗為右僕射明達國體朝廷制度多所經綜刁恊元帝渡江拜尚書左僕射于時朝廷草創憲章未立朝臣無習舊儀者恊乆在中朝諳練舊事凡所制度皆禀於恊焉深為當時所稱許孔衍字舒元元帝中興初與庾亮俱補中書郎于時庶事草創衍經學博通練識舊典朝儀軌制多取正焉王彪之為僕射桓温將廢海西公時廢立之儀既絶於曠代朝臣莫有識其故典者彪之神采毅然朝服當堦文武儀凖莫不取定朝廷以此服之彪之父彬尚書僕射子臨之孫納之竝御史中丞以彪博聞多識練習朝儀自是家世相傳並諳江左舊事緘之青箱世人謂之王氏青箱學宋王淮之王處曽孫也為都官尚書改領吏部淮之䆒識舊儀問無不對時大將軍彭城王義康録尚書事每嘆曰何湏高論𤣥虗政得如王淮之兩三人天下便治矣撰儀注朝廷遵用之殷景仁為中書侍郎於國典朝儀舊章記注莫不撰録識者知其有當世之志矣高祖甚知之遷太子中庶子南齊王琨在宋為度支尚書景和中討義陽王昶六軍戒嚴應湏紫檦左右欲營辦琨曰元嘉初征謝晦有紫檦在匣中不湏更作簡取果得焉王儉為左僕射朝廷初基制度草創儉識舊事問無不答高帝嘆曰詩云維嶽降神生甫及申今亦天為我生儉也儉長學禮諳䆒朝儀每博議證引先儒罕有其例八座丞郎無能異者儉手筆典裁為當時所重梁到洽高祖時為尚書左丞時鑾輿欲親戎軍國容禮多自洽出焉周捨為尚書禮部郎時天下草創禮儀損益多自捨出焉何敬容為吏部侍郎左僕射遷尚書令乆處臺閣詳悉舊事孔休源為尚書儀曹郎時多所改作每逮訪前事休源即以誦記随機斷決曽無疑滯吏部郎任昉嘗謂之為孔獨誦累遷尚書左丞時太子詹事周捨撰禮疑義漢魏至於齊梁並皆搜採休源所有奏議咸預編録謝幾卿為尚書左丞幾卿詳悉故習僕射徐勉每有疑滯多詢訪之陳劉師知善儀禮臺閣故事多所詳悉高祖入輔以師知為中書舎人掌詔誥是時兵亂之後朝儀多闕高祖為丞相及加九錫并受禪其儀注並師知所定焉袁樞遷都官尚書掌選樞博聞强識明悉舊章沈文阿初為梁國子博士尋領歩兵校尉兼掌儀禮自太清之亂臺閣故事無有存者丈阿父峻梁武世嘗掌朝儀頗有遺藁於是酌量裁撰禮度皆自之出後魏劉懋為尚書外兵郎中加輕車將軍凡所撰制朝廷軌儀皆與叅量尚書博議懋與殿中郎袁翻嘗為議主達於從政臺中疑事咸所訪决受詔叅議新令劉昶領儀曹尚書於時改革朝議詔昶與蔣少游專主其事昶條上舊式略不遺􅁯崔休為殿中尚書休乆在臺閣明習典禮每朝廷疑議咸取决焉諸公咸相謂曰崔尚書下意處我不能異也常景為中散大夫領中書舎人朝廷典章疑而不决則訪景而行之北齊裴讞之為儀曹郎尤悉歴代故事儀注喪禮皆能裁之後周徐招初從魏孝武入闗為尚書左丞朝廷播遷典章有闕至於臺閣軌儀多招所叅定論者稱之唐瑾為尚書右丞吏部郎中於時魏室播遷庶務草創朝章國典瑾並叅之柳敏拜禮部為司宗乆處臺閣明練故事近儀式乖先典者皆按處舊章刋正之隋趙賢通為相州刺史朝廷以其曉習故事徴拜尚書右僕射元善雒陽人少随父之江南開皇初拜内史侍郎陳使袁雅來聘上令善就舘受書雅出門不拜善論舊事有拜之儀雅不能對遂拜成禮而去蘇威為吏部尚書承戰争之後憲章蹐駁帝令朝臣釐改舊法為一代通典律令格式多威所定世以為能趙芬為少卿正芬明習故事每朝廷有所疑議衆不能决者芬輙為平斷莫不稱善唐裴矩為民部尚書年且八十精爽不衰以曉習故事甚見推重蘇瓌中宗時為尚書右丞以明習法律多識臺閣故事特命删定律令格式郭正一為中書侍郎在中書累年明習故事鄭餘慶為尚書右僕射憲宗以餘慶諳練典章朝廷禮樂制度有乖故事專委餘慶叅酌施行遂用為詳定使餘慶復奏刑部侍郎韓愈禮部侍郎李程為副使左司郎中崔郾吏部郎中陳佩刑部貟外郎楊嗣復禮部貟外郎庾敬休並充詳定判官朝廷儀制吉㓙五禮咸有損益焉後唐盧文紀為吏部郎文紀熟於故事銓綜條流剖析無滯册府元龜卷四百六十二
