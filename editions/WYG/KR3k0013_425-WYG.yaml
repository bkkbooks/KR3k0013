body:
  text: 册府元龜卷四百二十五宋王欽若等撰将帥部死事第二南齊成買為軍主戍用城太祖建元三年魏宼淮陽圍角城買謂人曰我今作甬城戍我兒當得一子或問其故買曰甬城與虜同岸危險具多我豈能使虜不敢南向我若不沒虜則應破虜兒不作孝子便當作世子也至是魏圍買數重帝遣領軍将軍李安民為都督救之勅周盤龍曰用城漣口賊始復進西道便是無賊卿可率馬歩下淮隂就李領軍鍾離船少正可致依仗數日糧軍人挾淮歩下也買與魏拒戰手所傷殺無數晨朝早起手中忽有數升血其日遂戰死張佛護為驍騎将軍崔慧景舉兵奉江夏王寳𤣥向闕臺遣佛護及直閤将軍徐元稱屯騎校尉姚景珍西中郎将軍徐景知遊盪軍主董伯珍騎官桓靈福等據竹里為數城寳𤣥遣信謂佛護曰身自還朝君何意苦相斷遏佛護荅曰小人荷國重恩使於此創立小戍殿下還朝但自直過豈敢千齡遂射慧景軍因戰惠景子覺及崔恭祖領前鋒皆傖楚善戰又輕行不㸑食以數舫㳂江載酒食為軍糧每見臺軍城中煙火起輙盡力攻擊臺軍不復得食以此饑困元稱等議欲降佛護不許十二日恭祖等復攻之城䧟佛護單馬走追得斬首尹畧為遊擊将軍武帝永明八年討巴東王子響見害贈輔國将軍梁州刺史席謙父恭穆任鎮西司馬為魚復侯所害及謙為新蔡太守鎮湓城聞梁王義師東下曰我家世忠貞殞死不二為陳伯之所殺梁韋粲為衡州刺史武帝太清三年侯景反至京師與司州刺史柳仲禮髙州刺史李遷仕帥軍入援粲仲禮分據南岸正月丁巳賊濟軍於青塘襲破粲營粲拒戰而死戊辰李遷仕天門太守樊文皎進軍青谿東為賊所破文皎死之杜岸為平北将軍北梁州刺史請襲襄陽元帝許之岸乃晝夜兼行先往攻其城不剋岳陽王至遂走依其兄巘於南陽巘時為南陽太守岳陽王尋遣攻䧟其城岸及巘俱遇害胡僧祐為車騎将軍西魏宼至元帝以僧祐為都督城東諸軍事魏軍四面起攻百道齊舉僧祐親當矢石晝夜督戰奨勵将士明於賞罰衆皆感之咸為致死所向摧殄賊莫敢前俄而中流矢卒裴之横為吳興太守江陵既䧟北齊遣上黨王髙渙挾貞陽候明攻東闗晉安王承制以之横為使持節鎮北將軍徐州刺史都督衆軍給皷吹一部出守蘄城之横營壘未周而魏軍大至兵盡矢窮遂於陣沒贈侍中司空裴畿為太子右衛率嶲州刺史西魏攻䧟江陵畿力戰死之陳馬明字世朗梁元帝時為散騎常侍北兖州刺史領廬江太守荆州䧟沒歸於髙祖紹泰中復官位封西華縣侯隨周文育督征王琳於沌口軍敗明力戰死之贈使持節征西将軍郢州刺史周鐵虎為嚴威将軍初自梁歸於陳尋隨周文育於江南拒蕭勃甞為前軍文育又命鐵虎偏軍於苦竹灘襲勃前軍歐陽頠又隨文育西征王琳於沌口敗績鐵虎與文育侯安都並為琳所擒琳引見諸軍将與之語唯鐵虎辭氣不屈故琳盡宥文育之徒獨鐵虎見害陳詳為神威将軍吳州刺史天嘉五年周廸復出臨川乃以詳為都督率水部討廸軍至南城與賊相遇戰敗死之始興昭烈王道談髙祖兄也仕於梁世為東宮直後主帥侯景之亂領弩手三千援臺城中流矢卒後魏魏勤封永安侯明元永興五年與将軍元屈㑹稽公劉潔等擊吐京叛胡失利潔被傷勤死之司馬天助晉驃騎将軍元顯之子歸魏拜青徐二州刺史太武真君三年從駕北征在陣歿羅雲獻文時為給事中西征勅勒為賊所襲殺章武王融弟武為光禄大夫賊帥鮮于修禮宼暴瀛定二州長孫稚等討之失利除融車騎将軍為前駈左軍都督與廣陽王淵等共討修禮師渡津葛榮殺修禮而自立轉營至白牛邏輕騎擊融融苦戰終日更無外援遂大奔敗於陣見殺崔延伯為右衛将軍討万俟醜奴為其所敗復收兵襲賊大破之賊皆退而兵人採掠散亂不整還來衝突遂大奔敗延伯中流矢為賊所害士卒死者萬餘人李龍環以勇壯為将孝明正光中北征戰死白道裴衍為北道大都督與源子邕北討葛榮軍次陽平之東北陽曲賊來拒戰衍軍敗見害朝野人情莫不駭惋崔楷為殷州刺史孝昌三年葛榮䧟殷州楷固節死之酈惲為征虜将軍與唐州刺史崔元珍固守平陽武泰中爾朱榮稱兵赴雒惲與珍不從其命為榮行臺郎中樊子鵠所攻城䧟被害崔元珍為唐州刺史爾朱榮之趣雒也遣其都督樊子鵠取唐州元珍與行臺酈惲拒守不從為子鵠所害裴約為别将行渤海郡事時冀州大乗賊起約為賊所敗遂圍郡城城䧟見害元志為雍州刺史時莫折念生反詔志為西征都督討之念生遣其弟天生屯龍口與志相持為賊所乗遂棄大衆奔還岐州賊遂攻岐州刺史裴芬之疑城人與賊潛通将盡出之志不聼城人果開門引賊鎻志及芬之送念生見害節閔初贈尚書僕射奚文為散騎常侍從征蠕蠕戰沒尉豹行潁州事與梁將裴禮戰没丘䟦爲安遠將軍征蓋呉戰没高徽孝明時使嚈噠廻至河州前刺史息景進等招引莫折念生攻河州長史元永平等推徽行州事别駕乞伏世則濳通景進徽殺之徴兵于吐谷渾吐谷渾率衆救之景進敗退走奔秦州尋率羌夷復來攻逼徽遣統軍六景相馳表請師詔徽仍行河州事乆無救援力屈城陷為賊所害李裔為使持節大将軍陜州刺史宇文黒獺攻䧟州城被執見害崔伯鳳為前將軍孝莊永安末與都督源子恭守丹父戰沒崔伯麟為中堅將軍冀州長史大乗賊起伯麟率州軍討之於煑棗城為賊所殺贈龍驤将軍雒州刺史李苗為冠軍將軍討爾朱世隆於河南橋兵盡浮河而沒苗死之日朝野悲壯之及世隆入雒主者追苗贈封白世隆世隆曰吾爾時羣議更一二日便欲大縱兵士焚燒都邑任其採掠頼苗京師獲全天下之善一也宜追之薛長瑜為征東將軍雒州刺史擊賊沒于陣贈都督冀定泰三州諸軍事車騎将軍冀州刺史寇治為前将軍時蠻反於三鴉治為都督追討戰沒贈持節都督雍華岐三州諸軍事鄭模為征東将軍行岐州事未幾擊賊深入沒於陣贈撫軍将軍相州刺史裴仲規以司徒主簿免久之中山王英征義陽引為統軍奏復本職規陣戰歿贈河東太守謚曰貞孫瓚為姚泓安定護軍時赫連屈子來侵人懐危懼亡奔者相屬瓚獨率衆拒守見殺李長壽為華州刺史孝武西遷長壽率勵義士拒東魏孝武嘉之復授潁州郡守遷廣州刺史東魏遣行臺侯景率兵攻之長壽衆少城䧟遂遇害崔仲哲為别将初父康為燕州刺史時天下多事遂為杜雒周攻圍康堅守歴年朝廷遣都督元譚與仲哲赴救到下口遇賊仲哲戰沒北齊尉興敬為神武帳内都督高祖敗周文帝於邙山興敬因戰為流矢所中卒贈涇岐幽三州軍事尉興慶為神武親信都督帝與西魏戰退走從者六七人追騎至興慶曰王去矣興慶腰邊百箭足殺百人神武勉之曰事濟以爾為懐州若死則用爾子興慶曰兒小願用兄許之興慶鬭矢盡而死高昻為軍司大都督與侯景等同攻獨孤如願于金墉城周文帝率衆救之戰於邙隂昻所部失利左右分散單騎東出欲趨河陽南城門閉不得入遂為西軍所害劉豐自左将軍除殷州時西魏大将王思政據長社文襄命豐與清河王岳攻之豐建水攻之䇿遂遏洧水以灌之水長魚鱉皆遊焉九月至四月城将䧟豐與行臺慕容紹宗見北有白氣同入船忽有暴風從東北來正晝昏暗飛沙走礫船纜忽絶漂至城下豐㳺水向土山為浪所激不得至西人鈎之並為敵人所害豐壯勇善戰諸将所推死之日朝野駭惋王琳為特進侍中時陳将吳明徹來宼秦州琳與戰大敗單馬突圍僅而獲免明徹進圍之堰淝水灌城而皮景和等屯於淮西竟不赴救明徹晝夜攻擊城内水氣轉侵人皆患腫死病相枕從七月至十月城䧟被執百姓泣而從之明徹恐其為變遂殺之慕容紹宗為河南道行臺拒西魏大将王思政船為西人所鈎投水而死三軍将士莫不悲惋元景安天統中為領軍大将軍入周以大将軍義寧郡開國公率衆討稽胡戰沒後周王勵為千牛直長沙苑之役勵以都督領兵從太祖勵居左翼與帳下十數人用短兵接戰當其前者死傷甚衆勵以被傷重遂卒于行間太祖深悼焉楊㯹為少師武帝保定四年十月詔晉公護率軍伐齊出潼闗大将軍權景宣出豫州􅋆出枳關蜀國公尉遲迥率師圍雒陽景宣攻齊豫州護次陜州十二月齊師渡河晨至雒陽諸軍驚散尉遲逈率麾下數十騎扞敵得却至夜引還柱國庸國公王雄力戰死之遂班師楊㯹於軹闗戰敗權景宣亦棄豫州而還韋祐字法保為驃騎大将軍東魏遣軍送糧饋宜陽法保潛邀之轉戰數十里兵少不敵為流矢所中卒於陣韋總從武帝東征總每率麾下先驅䧟敵遂於并州戰沒王雄從晉公護東征至邙山與齊将斛律明月接戰雄馳殺三人明月退走雄追之明月左右皆散矢又盡唯餘一奴一矢雄案矟不及明月者丈餘曰惜爾不殺但生将爾見天子明月反射雄中額焉退走至營而薨劉雄為上大将軍出鎮幽州宣政元年四月突厥宼幽州擁略居民雄出戰為突厥所圍臨陣戰沒贈亳州總管十州諸軍事亳州刺史楊祥為建武将軍討鮮于修禮遂死之隋權武父襲慶為周開府從武元皇帝戰於并州被圍百餘重襲慶力戰矢盡短兵接戰殺傷甚衆於是刀矟皆折脱胄擲地向賊大罵曰何不來斫頭賊遂殺之柳雄亮父檜為周華陽太守遇黄寳作亂攻䧟華陽檜為賊所害皮子信為旭州刺史開皇初吐谷渾來寇邊子信出兵拒戰為賊所敗子信死之趙世模為上開府開皇初嘗典宿衛後從晉王伐陳先鋒遇賊力戰而死韋洸開皇中為廣州總管嵗餘畨禺夷王仲宣聚衆為亂以兵圍洸洸勒兵拒之中流矢而卒贈上柱國劉𢎞開皇中為泉州刺史㑹高智慧作亂以兵攻州𢎞城守百餘日救兵不至前後出戰死亡大半糧盡無食與士卒數百人煑犀甲腰𢃄及剥樹皮而食一無離叛賊知其饑餓欲降之𢎞抗節彌厲賊悉衆來攻城䧟為所害楊武通為左武衛将軍歴岷蕳二州總管與周法尚討嘉州叛獠法尚軍初不利武通率數千人為賊斷其歸路武通於是束馬懸車出賊不意頻戰破之賊知其孤軍無援傾部落而至武通轉鬬數百里為賊所拒四面路絶武通輕騎接戰墜馬為賊所執殺而噉之李崇為幽州總管開皇中突厥大為宼掠崇率歩騎三千拒之轉戰十餘日師人多死遂保於砂城突厥圍之城本荒廢不可守禦曉夕力戰又無所食每夜出掠賊營復得六畜以繼軍糧突厥畏之厚為其備毎夜中結陣以待之崇軍苦饑出輒遇敵死亡畧盡遲明奔還城者尚且百許人然多傷重不堪更戰突厥意欲降之遣使謂崇曰若來降者封為特勒崇知必不免命其士卒曰崇䘮師徒罪當死今日效命以謝國家待看吾死不可䧏賊方便散走努力還鄉若見至尊道崇此意乃挺刃突賊復殺二人賊亂射之卒於陣楊崇封秦興縣公從行軍總管逹奚長儒擊突厥於周槃力戰而死贈大将軍豫州刺史以子義臣襲崇官爵楊思恩為車騎将軍煬帝嗣位漢王諒作亂并州時代州總管李景為漢王将喬鍾葵圍之詔朔州總管楊義臣救之義臣率馬歩二萬夜出西陘遲明行數十里鍾葵覘見義臣兵少悉衆拒之鍾葵亞将王抜饒勇善用矟射者不能中每以數騎䧟陣義臣患之募能當㧞者思恩請當之義臣見思恩氣貎雄勇顧之曰壯士也賜以巵酒思恩望見拔立於陣後投觴於地䇿馬赴之再往不剋義臣復選騎士十餘人從之思恩遂突擊殺數人直至拔麾下短兵方接所從騎士退思恩為拔所殺拔遂乗之義臣軍北者十餘里於是購得思恩屍義臣哭之甚慟三軍莫不泣所從騎士皆腰斬周羅㬋為右武候大将軍漢王諒餘黨據晉綘吕三州未下詔羅㬋行綘晉吕三州諸軍事進兵圍之為流矢所中卒於師張定和為右屯衛大将軍從煬帝征吐谷渾至覆袁川時吐谷渾主與數騎而遁其名王詐為渾主保車我真山帝命定和率衆擊之既與賊相遇輕其衆少呼之令䧏賊不肯下定和不被甲挺身登山賊伏兵於巖谷之下發矢中之而斃其亞将柳武達擊賊悉斬之帝為流涕梁黙為柱國行軍總管大業五年從煬帝征吐谷渾遇賊力戰而死李瓊為右翊衛将軍大業五年吐谷渾主率衆保覆袁川帝遣左光禄大夫梁黙與瓊追渾主皆遇賊死之馮孝慈為右武候衛将軍大業九年清河賊張金稱衆數萬孝慈討金稱於清河反為所敗孝慈死之楊逹煬帝遼東之役領右武衛将軍進位左光禄大夫卒於師煬帝歎息久之贈吏部尚書始安侯謚曰恭贈物三百五十叚麥鐵杖為右屯衛大将軍煬帝待之逾宻鐵杖自以荷恩深重每懐竭命之志及遼東之役請為前鋒顧謂醫者吳景賢曰大丈夫性命自有所在豈能艾炷炙頞𤓰蔕歕鼻療黄不差而卧死兒女手中乎将渡遼謂其三子曰阿奴當備淺色黄衫吾荷國恩今是死日我既被殺爾當富貴唯誠與孝爾其勉之及濟橋未成去東岸尚數丈賊大至鐵杖跳上岸與賊戰死武賁郎将錢士雄孟金义亦死之左右更無及者帝為之流涕梁文謙大業中為鷹揚将軍從衛𤣥擊楊𤣥感於東都力戰而死贈通議大夫張須陁大業中為齊郡通守領河南道十二郡黜陟討捕大使将兵拒東郡賊翟讓前後三十餘戰每破走之轉滎陽通守時李宻說讓取雒口倉讓憚須陁不敢進宻勸之讓遂與宻率兵逼滎陽須陁拒之讓懼而退須陁乗之逐北十餘里時李宻先伏數千人於林間邀擊須陁軍遂敗績宻與讓合軍圍之須陁潰圍輙出左右不能盡出復躍馬入救之往來數四衆敗散乃仰天曰兵敗如此何面見天子乎乃下馬戰死郭絢大業末為涿郡通守将兵擊竇建徳於河間戰死人吏哭之數月不息源崇嗣大業中自上黨贊治入為尚書虞部郎及天下盗起将兵討北海賊與賊力戰而死贈正議大夫王辯為武賁郎将與王世充討李宻於雒口官軍大潰辯至雒水橋已壞不得渡遂渉水至中流為溺人所引墜馬辯時身被重甲敗兵前後相蹈藉不能復上馬竟溺死三軍莫不痛惜之隂世師大業末為左翊衛将軍與代王留守京師及唐公義軍至世師自以世荷隋恩又藩邸之舊遂勒兵拒守月餘城䧟與京兆郡丞骨議等見誅孟善誼為河内通守恭帝義興二年王世充為李宻所敗善誼與武賁郎将王辯楊威劉長恭梁徳董知通皆死之唐孫華馮翊人義師起歸於高祖與劉𢎞基等破隋将桑顯和於餘馬泉拜為馮翊太守封武鄉公從圍京師為流矢所中卒劉感武徳初以驃騎将軍鎮涇州薛仁杲率衆圍之感嬰城拒守城中糧盡遂殺所乗之馬以分将士感一無所噉唯煑馬骨取汁和木屑食之城垂䧟者數矣長平王叔良援兵至仁杲解圍而去感與良出戰為賊所擒仁杲復圍涇州令感語城中云援軍已敗徒守孤城何益也宜早出䧏以全家室感許之及至城下大呼曰逆賊饑餓亡在朝夕秦王率數十萬衆四面俱集城中勿憂各自勉以全忠節仁杲大怒執感於城邊馳騎射殺之至死聲色逾厲賊平高祖購得其屍祭以少牢羅士信為綘州總管封郯國公從太宗繫黒闥於河北有洺水人以城來降遣士信入城據守賊悉衆攻之甚急遇雨雪大軍不得救經數日城䧟為賊所擒黒闥聞其勇意欲活之士信辭色不屈遂遇害吕子臧武徳初為鄧州刺史與馬元規擊山南賊帥朱粲遇霖雨城壞賊攻之急所親者知城必䧟或勸其降子臧曰安有天子刺史降賊者乎於是率左右數百人赴敵而死俄而城䧟元規亦遇害李育徳為陟州刺史其兄厚徳時䧟王世充逃歸渡河為宼所執世充囚之於獲嘉使其作書召育徳育徳陽許之故其兄繫獄久不死世充殷州刺史叚大師遣小師趙君頴以兵守之厚徳隂結於君頴及城中人賈慈行謀翻獲嘉以背世充慈行與子弟奴客十餘人大呼於上云李家兵悉登城矣君頴於獄中以馬載厚徳擁獄囚及援兵數十人呌譟而出至衙門門外逢偽長史趙景休斬之以徇衆皆懾伏至㕔前後者數百大師踰城而遁遂尅殷州拜厚徳為刺史厚徳歸省親疾遣育徳居守世充怒悉衆擊之數日城陷育徳力戰於中門之外及弟三人皆死之趙景慈為華州刺史領行軍總管擊堯君素於蒲州被創墮馬為賊所執君素囚之十餘日景慈憤恚飲寒水數升受風而死君素斬之梟首於城外贈秦州刺史謚曰忠何潘仁右屯衛将軍武徳二年討山賊張子惠於絲竹園輕敵遇害梁禮為鄜州刺史封鄜城郡公武徳二年梁師都侵延州禮力戰沒於陣曹四郎為鄧州總管武徳三年九月王世充䧟鄧州四郎因戰死之張孝珉為驃騎将軍驍勇善戰初為王世充将軍後以衆歸國高祖令督本兵經畧世充武徳三年六月為世充所圍衆寡不敵力屈就擒見世充辭色不撓遂為所殺盧君諤為行軍總管武徳四年隨齊王元吉擊王世充世充騎将楊公信犯官軍元吉擊之反為所敗君諤死之權威為魏州刺史武徳四年八月劉黒闥䧟鄃縣威與貝州刺史戴元祥討之反為所敗威及元祥皆死之長平王叔良高祖從父弟鎮涇州武徳四年胡賊入宼召叔良等五将帥師北伐為流矢所中師旋道薨盧士叡為瀛州刺史武徳四年劉黒闥䧟瀛州士叡死之先是黒闥之亂士叡勒兵拒守黒闥遣輕騎襲之破其羅城士叡據子城拒戰經半日士卒並河間人見羅郭已䧟親屬為虜莫有闘志皆踰城而出士叡為賊所擒遣人執之出說諸城堡士叡不從為賊所殺李大恩為代州總管上表言馬邑可圖髙祖令内殿少監獨孤晟率兵與其合勢大恩率所部直趨馬邑晟軍不至大恩頓於新城突厥與劉黒闥合圍之髙祖聞之遽令将軍李髙遷為援未至大恩糧盡夜遁為賊所邀軍遂大潰大恩為虜所敗死之髙祖聞之傷惜久之張徳政為鄆州都督武徳八年八月及并州道行軍總管督兵張公瑾與虜戰於大谷我師敗績徳政死之姜確為左屯衛将軍貞觀十九年從太宗征遼東以行軍總管督兵攻盖牟城中流矢而卒王君諤為左武衛将軍從太宗征遼東兼領左屯營兵與髙麗戰於駐驆山君諤先鋒䧟陣遂與賊短兵相接賊以鉞斧擊之墜馬左右不繼以至於難還卒於營太宗深痛惜之左右坐誅者數人子及善嗣拜朝散大夫謝萬嵗為梓州都督髙宗永徽元年與兖州刺史謝法興黔州都督李孟嘗討琰州獠賊萬嵗法興入洞招慰為賊所殺來濟顯慶中為中書令左遷台州二年徙庭州刺史俄有突厥入冦濟總兵拒之謂其衆曰吾嘗挂刑網蒙赦性命當以身塞責特報國恩不擐甲胄赴賊沒於陣蘇孝祥為右監門衛将軍則天文明元年徐敬業據揚州與其将李導㑹於高郵之下阿谿列營拒守孝祥為後軍總管率兵五千人夜用小船先渡水擊之反為所敗孝祥臨陣見殺兵士溺死者過半許欽明為凉州都督萬嵗通天元年九月吐蕃寇凉州欽明嘗出按行有吐蕃數萬奄至城下欽明拒戰久之力屈被執賊将欽明至靈州城下欽明大呼曰賊中都無飲食城中有羙醤乞二升梁米乞二㪷墨乞一挺是時賊營處四面阻浧河唯有一路得入欽明詐乞此物以喻城中冀其揀兵練将候夜掩襲城中無悟其㫖尋遇害王孝傑為清邊道行軍總管萬嵗通天二年孝傑與蘇宏暉等率兵十七萬與孫萬榮戰於東硤石谷官軍敗績盡䧟於賊孝傑死之牛師奨為安西都䕶軍中宗景龍二年十一月與娑葛戰于火燒城師奨敗績沒於陣王海賔為太子右衛率豐安軍使以驍勇聞𤣥宗開元二年七月吐蕃入寇朝廷以薛訥攝左羽林將軍為隴右防禦使禦之以海賔為先鋒及賊至渭川西界武階驛苦戰勝之殺獲甚衆諸将嫉其功按兵不救海賔沒於陣大軍乗其勢擊而敗之斬首一萬七千級獲馬七萬五千匹牛羊十四萬頭帝聞而憐之詔贈左金吾大将軍郭英傑為幽州道副總管開元二十一年討契丹於都山為賊所敗英傑死之褚誗為隴右副将時皇甫惟明為隴右節度使天寳四年奚及契丹酋長各殺公主舉部落以叛惟明與吐蕃戰於石堡官軍不利誗死之王伯倫為御史大夫崔光逺行軍司馬肅宗正徳二年八月光逺於駱谷破賊千餘人賊寇鳳翔伯倫與光逺判官李椿領兵二千人自中渭橋攻殺守橋賊一千人伯倫等乗勝至􅁐門賊先有本軍屯武功聞官軍入􅁐燒營幕而退走伯倫遇賊於􅁐伯倫死於陣前李椿為賊所得李元忠為涇原兩州團練兵馬使上元元年死王事吕希倩為左龍武大将軍徳宗建中四年十月徳宗避難於奉天朱泚賊将於城東西南三面偷城渾瑊率招召突将三百人分道連戰翌日辰時殺傷太甚力屈而退希倩死之贈太尉賜實封三百户髙重傑為将軍奉天之難泚賊攻城重傑力戰而死贈司空實封三百户酈定進為左神䇿軍大将軍封陽山郡王定進時號為勇将嘗征蜀有功憲宗元和五年討王承宗力戰陣敗馳歸馬倒賊識曰酈王也遂為所害官軍為之䘮氣繇是贈兵部尚書賻布帛米有差田布𢎞正子也元和十五年𢎞正移鎮以布為河陽節度長慶元年春移鎮涇原其秋鎮州軍亂𢎞正被殺朝廷以李愬疾不能軍無以扞廷湊之亂且以魏州田氏舊衆乃疾徵布使起復為之節度仍遷撿校工部尚書詔布乗急傳之鎮布䘮服居堊室去節旄導從之飾及入魏州居䘮御事動皆得禮其禄俸月入百萬一無所取又籍魏中家之舊産無巨細計錢十餘萬貫皆出之以頒軍士乃選其将史憲誠為先鋒兵馬使以憲誠前出已麾下必能輸竭故盡以精銳付焉是時屢有中使齎急詔促其進兵至十月布遂以全軍三萬七千出討賊抵冀州南宫縣十二月進軍下賊二栅而魏人怯於格戰且以寒雪餽餉不給寢無闘志憲誠因從而間之俄有詔分布軍與李光顔合勢東救深州其衆因大潰多為憲誠所有布提兵八千以是月十日還魏州十一日㑹諸将復議興師而将卒益驕惰皆曰尚書能行河朔舊事則死生行之若使戰皆不能也布自度其衆終不為用歎曰功無成矣即日宻表陳軍情且稱遺表曰臣觀衆意終負國恩臣既無功敢忘即死伏願陛下速救光顔元翼不然者義士忠臣皆為河朔屠害奉表號哭授其從事李石乃入啓父靈抽刅刺心曰上以謝君父下以示三軍言訖而絶時議以布才雖不足能以死謝國家心志决烈得燕趙之古風梁翟存初為太祖諸軍都指揮使唐昭宗大順二年正月令丁㑹下黎陽龎師古與存西路下淇門衛縣自是常為先鋒雄猛善戰士皆仗之為氣大破朱瑾衆於墉下督戰晝夜不懈勒戰卒閲礟倚立修竿忽為飛矢所中卒太祖深傷惜之朱友寧太祖仲兄之子也領嶺南西道節度使天復三年四月率師破青州之博昌臨淄二邑殺戮五千餘衆暨北海焉六月丙子友寧復進逼青州及石樓與賊相遇决戰我師未振友寧馳騎督軍薨於陣牛裕為桐墟鎮使乾元二年淮人寇桐墟殺畧吏民裕死之郭言為宿州刺史於時徐宿兵鋒日夕相接控扼偵邏以言為首景福初時溥大舉來攻宿州言勇於野戰喜逢大敵自引銳兵擊溥殺傷甚衆徐戎立退為流矢所中一夕而卒王彦章為滑州節度使晉師䧟鄆州代戴思逺為北面招討使彦章渡汶以畧鄆境至逓坊鎮為晉人所襲彦章退保中都兵敗為晉将夏魯竒所擒晉王素聞其勇悍欲全活之令中使慰撫以誘其意彦章曰我是匹夫本朝擢居方面與皇帝十五年抗衡今日兵敗力窮死有常分皇帝縱垂矜宥何面目見人豈有為臣為将朝事梁而暮事晉乎得死為幸遂遇害符道昭為秦州節度使與康懷英等攻潞州以蚰蜒塹繚之飛鳥不度既踰嵗晉人援至王師大敗道昭為晉軍所殺後唐朱元禮始為郡将梁太祖聞其名擢為軍校從龎師古渡淮戰沒於淮南安福遷與其兄福慶俱驍勇為武皇親校景福末汴人急攻兖鄆朱瑄求援於武皇乃令福順等三将率騎軍以赴之福順與汴人戰沒福慶從史儼奔淮南朱瑄之敗福遷亦遇害周徳威為幽州節度使天祐十五年下揚劉城莊宗大閲諸軍渡河趨汴徵徳威進討師之将起威以為不利深入是夜鎮星犯文昌上将臨戰徳威軍為輜重所擾大亂梁軍乗之父子躍馬出血戰而死史建瑭為相州刺史張文禮叛總北面行營兵馬攻趙州進攻鎮州營於西南隅日以輕騎逼門為伏弩所中歸營而卒李嗣昭權幽州軍府事㑹閻寳為鎮州張處瑾所敗莊宗以嗣昭代之嗣昭為流矢所中尋卒於師孫重進為大將性嚴重立法士卒畏憚天祐末張文禮據鎮州重進攻之戰沒於東垣渡李存進為魏博馬歩都將㑹王師討張文禮於鎮州招討李嗣昭不利而歿以存進代之遂討鎮州王處瑾盡率其衆乗其無備奄至壘門存進聞之得部下數人出闘驅賊於橋下俄而賊大至後軍不繼血戰而死夏魯竒明宗時為遂州節度使劉訓討荆南魯竒為副招討使移鎮遂州時孟知祥董璋據有兩川魯竒僻居南鄙董璋之叛與知祥攻遂州旬日援路斷絶兵盡食乏勢知必屈乃自刎而卒安審通為横海軍節度觀察等使兼北面行營諸道馬軍都指揮使圍中山躬冐矢石以先士卒志平氛祲為飛矢所中卒朱建豐為趙州刺史王師討定州為北面行營右廂歩軍都指揮使張延朗以偏師先圍新樂卒於王事詔贈太傅晉郭璘為易州刺史契丹攻其郡璘率勵士衆同其丼苦虜不能克復以州兵擊賊數獲其利朝廷嘉之就加撿校太保虜主嘗謂左右吾不畏一天下乃為北人所抑挫㑹杜重威降虜使通事耿崇羙誘其民衆璘不能制為崇羙所殺宋廷浩為房州刺史汜水闗廵撿使天福二年為賊軍所害梁漢璋為永清軍節度使天福八年詔領千騎戍冀州尋以杜重威北討詔以漢璋充北面軍馬都排陣使戍游口闗與虜騎五千相遇於浮陽之北界苦戰竟日以衆寡不侔為流矢所中沒於陣王清為奉國都虞候谿州刺史少帝開運二年從杜重威非征解陽城之圍清苦戰為歩校之最加撿校司空及從杜重威收瀛州聞契丹大至重威率諸軍㳂淲水而将保常山及至中渡橋虜已屯於北岸且扼歸路清知勢蹙請於重威曰軍去常山五里守株於此營孤食盡將若之何請以歩軍二千為其前鋒奪橋開路公可率諸軍繼之期入常山必矣重威可之遣宋彦筠俱行清一擊獲其橋虜為之小却重威猶豫不進宻已貳於國矣彦筠尋退走清列陣北岸嚴戒部曲日暮酣戰不息虜以生軍繼至我無寸刃益之清與其下俱沒焉吳巒為復州防禦使開運中權知貝州虜復南牧擾我河塞巒以城無戍兵為虜所䧟遂死之沈斌為祁州刺史趙延壽知其無備與蕃賊急攻之仍呼謂斌曰沈使君我故人也擇禍莫若輕早以城降無自辱也斌登城呼曰侍中父子誤計䧟於腥膻忍以犬羊之衆殘害父母之邦不自羞慙反有徳色沈斌寧為國家死必不效所為也翌日城䧟而卒漢史萬山為深州刺史乾祐三年春虜大入寇萬山城守有功虜退周太祖遣索方進率騎七百屯深州一日虜數十騎侵周東門萬山父子以虜不多乃率牙兵百餘人襲虜虜偽退十餘里而兵發萬山血戰急請救於方進方進勒兵不出萬山死之禹洪遷為夏州節度使㑹趙思綰據永興叛從郭從義進討之戰傷卒於陣安文祐潞人也初孟方立據邢洺率兵攻上黨朝廷授文祐昭義節度使令討方立自蜀至澤州與方立戰敗沒於陣李瓊為威州刺史行及鄭遇羣盗攻郡瓊禦賊中流矢而卒周蕭處仁為右金吾衛将軍世宗率兵渡淮以先鋒兵馬都監攻䧟滌州為流矢所中而卒白延遇為濠州刺史帥衆從侍衛使李重進攻圍濠州力戰為賊所傷數日而卒册府元龜卷四百二十五
