body:
  text: 册府元龜卷二百二十七宋王欽若等撰僣偽部謀畧倚任謀畧夫巨猾乗時偷安天位雖目下裁物終底於阽危而臨事制機多擅於權譎合竒正於樽爼料虚實於帷幄脗如神契夐出人表惜乎志踰其量任過於力福不盈堦禍重於地借使識寳命之有數知神器之難移而能戮力勤王奮庸熈載忠畧兼茂功名並劭則可謂知終以存義可久以立徳與夫僣竊茍得禍移宗族者異矣噫叔皮之論王命士衡之賦豪士者盖謂此也前凉張茂為凉州牧雅有志節能斷大事凉州大姓賈摹寔之妻弟也勢傾西土先是謡曰手莫頭圖凉州茂以為信誘而殺之於是豪右屏跡威行凉域前趙劉曜僣即帝位既破隴右賊陳安時劉曜與凉州刺史張茂相持於河上曜自隴長驅至西河戍卒二十八萬五千臨河列營百餘里中鐘鼓之聲沸河動地自古軍旅之盛未有斯比茂臨河諸戍皆望風奔退揚聲欲百道俱渡直至姑臧凉州大怖人無固志諸將咸欲速濟曜曰吾軍旅雖盛不踰魏武之東也畏威而来者三有二焉中軍宿衛已皆疲老不可用也張氏以吾新平陳安師徒殷盛以形聲言之非彼五郡之衆所能抗也必怖而歸命受制稱藩吾復何求卿等試觀之不出中旬張茂之表不至者吾為負卿矣茂懼果遣使稱藩餘具僣偽事大門後趙石勒初為劉聰冀州牧既攻取鄴三臺以從子季龍為魏郡太守鎮鄴三臺時幽州王浚署置百官奢縱滛虐勒有吞并之意欲先遣使以觀察之議者僉曰宜如羊祐陸抗書相聞時長史張賓有疾勒就而謀之賓曰王浚假三部之力稱制南面雖曰晉藩實懐僣逆之志必思協英雄圖濟事業將軍威聲震于海内去就為存亡所在為輕重浚之欲將軍猶楚之招韓信也今權譎遣使無誠欵之形脫生猜疑圖之兆露後雖竒略無所設也夫立大事者必先為之卑當稱藩推奉尚恐未信羊陸之事臣未見其可勒曰右侯之計是也乃遣其舎人王子春董肇等多齎珍寳奉表推崇浚為天子曰勒本小胡出自戎裔值晉綱弛御海内饑亂流離屯厄竄命冀州共相帥合以救性命今晉祚淪夷逺播吳㑹中原無主蒼生無繫伏惟眀公殿下州鄉貴望四海所宗為帝王者非公復誰勒所以捐軀命興義兵誅暴亂者正為眀公驅除耳伏願陛下應天順時踐登皇祚勒奉戴眀公如天地父母公當察勒微心慈盼如子也亦遺棗暠書而厚賂之浚謂子春等曰石公一時英武據趙舊都成鼎峙之勢何為稱藩于孤其可信乎子春對曰石將軍英才俊拔士馬雄盛實如聖㫖仰惟眀公州鄉貴望累葉重光出鎮藩嶽威聲播于八表固以胡越欽風戎夷歌徳豈惟區區小府而敢不歛袂神闕者乎昔陳嬰豈其鄙王而不王韓信薄帝而不帝者哉但以知帝王不可以智力争故也石將軍之擬眀公猶隂精之比太陽江河之比洪海爾項籍子陽覆車不逺是石將軍之眀鑒眀公何恠乎且自古胡人而為名臣者實有之帝王則未之有也石將軍非所以惡帝王而讓眀公也顧取之不為天人之所許耳願公勿疑浚大悅封子春等為列侯遣使報勒答以方物浚司馬㳺統時鎮范陽隂叛浚馳使降于勒勒斬其使送于浚以表誠實浚雖不罪統彌信勒之忠誠無復疑矣子春等與王浚使至勒命匿勁卒精甲虚府羸師以示之北面拜使而受浚書浚遺勒麈尾勒偽不敢執懸之于壁朝夕拜之云我不得見王公見王公所賜如見公也復遣董肇奉表于浚期親詣幽州奉上尊號亦修牋于棗暠乞并州牧廣平公以見必信之誠者也於是輕騎襲幽州浚將佐咸請出擊勒浚怒曰石公来正欲奉戴我也敢言擊者斬乃命設饗以待之於是勒晨至薊叱門者開門疑有伏先驅牛羊數千頭聲言上禮實欲填諸街巷使兵不得發浚乃或坐或起勒升其㕔事命甲士執浚驛送襄國市斬之前燕慕容廆初為鮮卑都督晉恵帝太安初宇文莫圭遣弟屈雲冦邉城雲别帥大素延攻掠諸部廆親擊敗之素延怒率衆十萬圍棘城衆咸懼人無距志廆曰素延雖犬羊蟻聚然軍無法制已在吾計中矣諸君但為力戰無所憂也乃躬貫甲胄馳出擊之素延大敗追奔百里俘斬萬餘人懐帝永嘉初廆自稱鮮卑大單于時平州刺史東夷校尉崔毖自以為南州士望意存懐集而流亡者莫有赴之毖意廆拘留乃隂結髙句驪及宇文叚國等謀滅廆以分其地元帝大興初三國伐廆廆曰彼信崔毖虚說邀一時之利烏合而来耳既無統一莫相歸服吾今破之必矣彼軍初合其鋒甚鋭幸我速戰若逆擊之落其計矣靖以待之必懐疑貳迭相猜防一則疑吾與毖譎而覆之二則自疑三國之中與吾有韓魏之謀者待其人情沮惑然後取之必矣於是三國攻棘城廆閉門不戰遣使送牛酒以犒宇文大言於衆曰崔毖昨有使至於是二國果疑宇文同於廆也引兵而歸廆簡鋭士配世子皝推鋒於前次子翰領精騎為竒兵從旁出直衝其營大敗之宇文悉獨官僅以身免盡俘其衆於其營慕容皝既為燕王將圖石氏從容謂諸將曰石季龍自以安樂諸城守防嚴重城之南北必不設備今若詭路出其不意冀之北土盡可破也於是率騎二萬出蠮螉塞長驅至於薊城進渡武遂津入于髙陽所過燒焚積聚掠徙幽冀三萬餘户慕容雋僣即帝位自和龍至薊城幽冀之人以為東遷互相驚擾所在屯結其下請討之雋曰群小以朕東廵故相惑耳今朕既至尋當自定然不虞之備亦不可不為於是内外戒嚴前秦符堅僣即天王位宻謀兼并欲觀審慕容暐釁隙乃遣其西戎主簿郭辯潜結匈奴左賢王曹轂令轂遣使詣鄴辯因從之燕太尉侍中皇甫真兄典仕堅為散騎常侍從子奮覆並顯關西辯既至鄴歴造公卿言於真曰辯家為秦所誅故寄命曹王貴兄常侍及奮覆兄弟並相知在素真怒曰臣無境外之交斯言何以及我君似奸人得無因縁假託乎乃白慕容暐請窮詰之暐并不許辯還謂堅曰燕朝無綱紀實可圖之鑒機識變唯皇甫真耳堅曰以六州之地豈無智識一人哉真亦秦人而燕用之固知關西多君子矣後秦姚萇初僣稱萬年秦王聞慕容冲攻長安議進趨之計群下咸曰宜先據咸陽以制天下萇曰燕因懐奮之士而起兵若功成事建咸有東歸之思安能久固秦川吾欲移兵嶺北廣収資實湏秦弊燕廻然後垂拱取之兵不血刄坐定天下此卞莊得二虎之義也萇遣諸將攻新平克之因畧地至安定嶺北諸城盡降之乃執符堅遂僣即帝位還安定以其太子興鎮長安而與登相距登馮翊太守蘭犢與符師奴離貳慕容永攻之犢遣使請救萇將赴之尚書令姚旻左僕射尹緯等言於萇曰符登近在瓦亭陛下未宜輕舉萇曰登遲重少决每失時機聞吾自行正當廣集兵資必不能輕軍深入兩月之間足可克此三豎吾事必濟矣遂帥師于渥源師奴率衆来距大戰敗之盡俘其衆又擒蘭犢収其士馬及符登進逼安定諸將勸萇决戰萇曰與窮冦競勝兵家之下吾將以計取之於是留其尚書令姚旻守安定夜襲登輜重于大界克之諸將咸欲因登駭亂擊之萇曰登衆雖亂怒氣猶盛未可輕也遂止登將雷惡地率衆降萇拜為鎮東將軍魏褐飛自稱大將軍衝天王率氐胡數萬人攻安北姚當成於杏城雷惡地應之攻鎮東姚漢得於李潤萇議將討之群臣咸曰陛下不憂六十里符登乃憂六百里褐飛萇曰登非可卒殄吾城亦非登所能卒圖惡地多智非常人也南引褐飛東結董成甘言美說以成姦謀若杏城李潤惡地據之控制逺近相為羽翼長安東北非復吾有於是潛軍赴之萇時衆不滿二千褐飛惡地衆至數萬氐胡赴之者首尾不絶萇每見一軍至輙有喜色群下恠而問之萇曰今同惡相濟皆来㑹集吾得乗勝席卷一舉而覆其巢穴東北無復餘也褐飛等以萇兵少盡衆来攻萇固壘不戰示之以弱潜遣子崇率騎數百出其不意以乗其後褐飛兵擾亂萇遣鎮逺王超平逺譂亮率歩騎擊之褐飛衆大潰斬褐飛及首級萬餘時鎮東荀曜據逆萬堡宻引符登萇與登戰敗於馬頭原収衆復戰姚碩徳謂諸將曰上慎於輕戰每欲以計取之今戰既失利而更逼賊者必有繇也萇聞而謂碩徳曰登用兵遲緩不識虚實今輕兵直進逕據吾東必荀曜堅子與之連結也事久變成其禍難測所以速戰者欲使豎子謀之未就好之未深散敗其事耳進戰大敗之登退屯于郿萇如隂密攻登勑其太子興曰荀曜好奸變將為國害聞吾還北必来見汝汝便執之曜果見興於長安興遣尹緯讓而誅之符登與竇衝相持萇議擊之尹緯言於萇曰太子純厚之稱著於遐邇將領英畧未為逺近所知宜遣太子親行可以漸廣威武防闚􅎿之原萇從之戒興曰賊徒知汝轉近必相驅入堡聚而掩之無不尅矣比至胡空堡衝圍自解登聞興向胡空堡引還而興因襲平凉大獲而歸咸如萇䇿使興還鎮長安後凉吕光初仕符登為鷹揚將軍會符雙反於秦州堅將楊世成為雙將荀興所敗光與王鑒欲速戰光曰興初破世成姦氣漸張宜持重以待其弊興乗勝輕来粮竭必退退而擊之可以破也二旬而興退諸將不知所為光曰揆其奸計必攻榆眉若得榆眉據城斷路資儲復贍非國之利也宜速進師若興攻城尤須赴救如其奔也彼粮既盡可以滅之鑒從焉果敗興軍西秦乞伏國仁自稱大都督領秦河二州牧眀年長安秘宜及諸羗虜来擊國仁四面而至國仁謂諸將曰先人有奪人之心不可坐待其至宜抑威餌敵羸師以張之軍法所謂怒我而怠冦也於是勒衆五千襲其不意大敗之秘宜奔還南安尋與其弟莫侯悌率衆三萬餘户降於國仁乞伏乾歸自稱大將軍河南王為吕光所伐咸勸其東奔成紀乾歸不從謂諸將曰昔曹孟徳敗袁本初於官渡陸伯言摧劉𤣥徳於白帝皆以權畧取之豈在衆乎光雖舉全州之軍無經逺之算不足憚也且其精卒盡在吕延延雖勇而愚易以竒䇿制之延軍若敗光亦遁還乗勝追奔可以得志衆咸曰非所及也隆安元年光遣其子纂伐乾歸使吕延為前鋒乾歸泣謂衆曰今事勢窮蹙逃命無所死中求生正在今日凉軍雖四面而至然相去遼逺山河既沮力不周接敗其一軍而衆軍自退乃縱反間稱秦王乾歸衆潰東奔成紀延信之引師輕進為乾歸所敗遂斬之北燕馮䟦初為慕容熈所怒密欲誅䟦兄弟䟦兄弟謀曰熈今昏虐兼忌吾兄弟既還首無路不可坐受誅滅當及時而起立公侯之業事若不成死未晚乎遂與萬泥等二十二人結謀䟦與二弟乗車使婦人御潛入龍城匿于北部司馬孫䕶之室遂殺熈立髙雲為主南凉秃髪烏孤自稱武威王從容謂其群下曰隴右區區數郡地耳因其兵亂分裂遂至十餘乾歸擅命河南叚業阻兵張掖虐氐假息據姑藏吾藉父兄遺烈思廓清西夏兼弱攻昧三者何先楊統進曰乾歸本我所部終必歸服叚業儒生才非經世權臣擅命制不繇已千里伐人粮運懸絶且與我鄰好許以分災共患乗其危弊非義舉也吕光衰老嗣紹冲闇二子纂𢎞雖頗有文武而内相猜忌若天威臨之必應鋒瓦解宜遣車騎鎮浩亹鎮北據亷川乗虚迭出多方以誤之救右則擊其左救左則擊其右使纂疲於奔命人不得安其農業兼弱攻昧於是乎在不出二年可以坐定姑臧姑臧既㧞二冦不待兵戈自然服矣烏孤然之遂隂有并吞之志南燕慕容徳初為慕容暐所封范陽王俄而符堅將符䨇據陕以叛堅將符栁起兵枹罕將應之徳勸暐乗釁討堅辭㫖慨慷識者言其有逺畧暐竟不能用後遇暐敗徙于長安及符堅以兵臨江拜徳為奮威將軍堅之敗也還次滎陽徳言於暐曰昔勾踐棲於會稽終獲吳國聖人相時而動百舉百全天將悔禍故使秦師䘮敗宜乗弊以復社稷暐不納北凉沮渠䝉遜自稱凉州牧率歩騎三萬伐秃髪傉檀次于西郡大風從西北来氣有五色俄而晝昏至顯美徙數千户而還傉檀追及䝉遜于窮泉䝉遜將擊之諸將皆曰賊已安營弗可犯也䝉遜曰傉檀謂吾逺来疲弊必輕而無備及其壘壁未成可以一皷而滅進擊敗之乗勝至于姑臧夷夏降者萬千餘户傉檀懼請和許之而歸其後䝉遜攻浩亹而蛇盤于帳前䝉遜笑曰前為騰蛇今盤在吾帳天意欲吾廻師先定酒泉燒攻具而還次于川巖聞李士業徴兵欲攻張掖䝉遜曰入吾計矣但恐聞吾廻軍不敢前也兵事尚權乃露布西境稱得浩亹将進軍黄谷士業聞而大悅進入都瀆澗䝉遜潜軍逆之敗士業于壊城夏赫連勃勃僣稱天王大單于諸将言於勃勃曰陛下将欲經營宇内南取長安宜先固根本使人心有所憑系然後大業可成髙平險固山川沃饒可以都也勃勃曰卿徒知其一未知其二吾大業草創衆旅未多姚興亦一時之雄闗中未可圖也且其諸鎮用命我若専固一城彼必并力於我衆非其敵亡可立待吾以雲騎風馳出其不意救前則擊其後救後則擊其前使彼疲於奔命我則游食自若不及十年嶺北河東盡我有也待姚興死後徐取長安姚泓凡弱小兒擒之方畧已在吾計中矣昔軒轅氏亦遷居無常二十餘年豈獨我乎於是侵掠嶺北其後宋髙祖為晉将将兵伐後秦姚泓勃勃謂群臣曰劉裕伐秦水陸兼進且裕有髙世之畧姚泓豈能自固吾驗以天時人事必當尅之又其兄弟内叛安可以距人裕既克長安利在速返正可留子弟及諸将守關中待裕發軫吾取之若拾芥耳不足復勞吾士馬於是秣馬厲兵休養士卒尋進據安定姚泓嶺北鎮戍郡縣悉降勃勃於是盡有嶺北之地遂僣即帝位羣臣勸都長安勃勃曰朕豈不知長安累帝舊都有山河四塞之固但荆吳僻逺勢不能為人之患東魏與我同壤境去北京裁數百餘里若都長安北京恐有不守之憂朕在統萬彼終不敢濟河諸卿適未見此耳其下咸曰非所及也前蜀王建初為西川節度使大起蜀軍敗岐梓之兵於利州東川節度使顧彦暉懼而乞和請與岐人絶建許之其後山南之師冦東川彦暉求援於建建出兵赴之大敗興元之衆洎軍旋建乗虚掩襲梓州虜彦暉置於成都遂兼有兩川自此軍鋒益熾山南諸州皆為建所有復攻秦隴等州李茂貞削弱不能守或勸建因取鳳翔建曰此言失策吾所得已多不俟復増岐下茂貞雖常才然名望宿著與朱公力争不足僅守有餘韓生所謂入為扞敵出為席籍是也適宜援而固之為吾盾鹵耳後蜀孟知祥初為西川節度使後唐天成中安重誨専權用事以知祥莊宗舊識方據大藩慮久而難制潛欲圖之是時客省使李嚴以前使於蜀洞知其利病因獻謀於重誨請以已為西川監軍庶效方畧以制知祥朝廷可之及嚴至蜀知祥延揖甚至徐謂嚴曰都監前因奉使請兵伐蜀遂使東西兩朝俱至破滅三川之人其怨已深今既復来人情大駭固奉令不暇也即遣人執下階斬於階前其後朝廷每除劒南牧守皆令提兵而徃或千或百分守郡城時董璋作鎮東川已數年矣亦有雄據之意會唐朝以夏魯竒鎮遂州李仁矩鎮閬州皆領兵數千人赴鎮復授以宻㫖令制禦西川董璋覺之乃與知祥通好結為婚家以固輔車之勢知祥慮唐軍驟至與遂閬兵合則勢不可支吾遂與璋協謀令璋以本部軍先取閬州知祥遣大將軍李仁罕趙廷隠等率軍圍遂州長興元年冬唐軍伐蜀至劒門二年二月以遂閬既䧟又粮運不接乃班師三年知祥又破董璋乃自領東西兩川節度使倚任書曰任賢勿二𫝊曰知臣莫若君則知魚水之契小大之用何莫繇斯觀夫僣竊之主委任所至絶疑慮之心杜䜛邪之口用其方畧倚以事權或致效於當時或建功於不世開地千里専制一方幸獲保全未至覆滅者亦可謂得信任之效也前凉張軌為凉州刺史威著西州化行河右以宋配隂充汜瑗隂澹為股肱謀主張天錫襲凉州牧燉煌索泮世為冠族天錫輔政以泮為冠軍記室參軍天錫即位拜司兵歴位禁中録事執法御掾州府肅然郡縣改迹遷羽林左監有勤幹之稱出為中壘将軍西郡武威太守典戎校尉政務寛和戎夏懐其恵天錫甚敬之前趙劉元海初即漢王位皆從祖劉宣之謀也故以宣為丞相特荷尊重勲威莫二軍國内外靡不専之王彌叛亂進逼雒陽既敗走謂其黨劉靈曰晉兵尚强歸無所厝劉元海昔為質子我與之周旋京師深有分契今稱漢王將歸之可乎靈然之乃渡河歸元海元海聞而大悅遣其侍中兼御史大夫郊迎致書於彌曰以將軍有不世之功超時之徳故有此迎耳速望將軍之来孤今親行將軍之館輙拂席洗爵敬待將軍及彌見元海勸稱尊號元海謂彌曰孤本謂將軍如竇周公耳今真吾孔眀仲華也烈祖有云吾之有將軍如魚之有水於是署彌司𨽻校尉加侍中劉聰僣即帝位劉曜攻郭黙于懷城收其米粟八十餘萬斛列三屯以守之聰遣使謂曜曰今長安假息劉琨游魂此國家所尤宜先除也郭黙小醜何足以勞公神畧可留征虜將軍貝丘王翼光守之公其還也於是曜歸蒲坂俄而徴聘輔政永嘉之亂劉殷没於聰聰竒其才而擢用之累至侍中太保録尚書事後趙石勒初為劉元海輔漢將軍引張賔為謀主機不虚發算無遺䇿成勒之基業皆賔之勲也及勒為趙王累加賔右長史大執法封濮陽侯専總朝政位冠百寮常呼曰右侯謂賔曰吾所未了右侯已了復何疑哉石季龍僣稱居攝趙天王使太子􅃉省可尚書奏事選牧守祀郊廟唯征伐刑斷乃親覽之及殺􅃉立子宣為太子以石韜為太尉與太子宣迭日省可尚書奏事又命石宣石韜生殺拜除皆迭日省决不復啟也時豪戚侵恣賄託公行季龍患之擢殿中侍御史李巨為御史中丞特親任之自此百寮震懾州郡肅然前燕慕容廆初為大單于既立四郡以統流人於是推舉賢才委以庶政以河東裴嶷代郡魯昌北平陽耽為謀主北海逢羡廣平游􅃉北平西方􅐚勃海封抽西河宋奭河東裴開為股肱勃海封奕平原宋該安定皇甫岌蘭陵繆愷以文章才雋任居樞要以裴嶷為長史委以軍國之謀廆後謂群僚曰裴長史名重中朝而降屈于此豈非天以授孤也慕容皝僣即王位以陽裕為郎中令遷大將軍左司馬破髙句麗北滅宇文歸皆豫其謀皝甚器重之慕容雋僣即帝位既寝疾謂慕容恪曰吾所疾惙然當恐不濟修短命也復何所恨但二㓂未除景茂冲幼景茂暐字慮其未堪多難吾欲逺追宋宣以社稷屬汝恪曰太子雖幼天縱聰聖必能勝殘刑措不可以亂正統也雋怒曰兄弟之間豈虚飾也恪曰陛下若以臣堪荷天下之任者寜不能輔少主乎雋曰汝行周公之事吾復何憂李績清方忠亮堪任大事汝善遇之慕容暐既嗣偽位以慕容恪為大宰録尚書事行周公事慕容評為大傅副賛朝政暐既庸弱國事皆委之於恪其後暐境内多水旱恪評竝稽首歸政請遜位還第暐斷其讓表恪評等乃止前秦符徤僣即帝位弟雄字元才為佐命元勲徤嘗曰元才吾姫旦也及卒徤哭之嘔血曰天不欲吾定四海邪何奪元才之速也又以中書令王墮著匪躬之稱徤嘗歎曰天下群官皆如王令君者隂陽曷不和乎甚敬重之符堅僣即符秦天王位以王猛為中書侍郎累遷尚書左僕射輔國將軍司𨽻校尉加騎都尉居中宿衛時猛年三十六嵗中五遷權傾内外宗戚舊臣皆害其寵尚書仇騰丞相長史席寳數譛毁之堅大怒黜騰為甘松䕶軍寳白衣領長史爾後上下咸服莫有敢言堅既平慕容暐命猛留鎮冀州堅遣猛於六州之内聽以便宜從事簡召英雋以補闗東守宰授訖俄又除王猛為丞相加都督中外諸軍事猛表讓久之堅曰卿昔螭蟠布衣朕龍潛弱冠屬世事紛紜厲事之際顛覆厥徳朕竒卿於暫見擬卿為卧龍卿以異朕於一言廻考槃之雅志豈不精契神交千載之會雖傅巖入夢姜公悟兆今古一時亦不殊也自卿輔政幾將二紀内釐百揆外蕩群凶天下向定彞倫始叙朕且欲從容於上望卿勞心於下𢎞濟之務非卿而誰遂不許其後數年復授司徒猛上疏讓不從乃受命軍國内外萬機之務事無巨細莫不歸之猛宰政公平流放尸素㧞幽滯顯賢才外修兵革内崇儒學勸課農桑教以亷恥無罪而不刑無才而不任庶績咸熈百揆時叙於是兵强國富垂及升平猛之力也猛死堅哭之慟謂太子𢎞曰天不欲使吾平一六合邪何奪吾景畧之速也堅季弟融封安樂王固辭堅以為侍中銓綜内外刑政修理進才理滯王景畧之流也尤善斷獄姦無所容故為堅所委任後秦姚襄初為并州刺史以王亮為長史俄而亮卒襄哭之甚慟曰天将不欲成吾事乎王亮捨我去也姚萇初僣稱萬年秦王稱制行事以南安姚晃尹緯為左右司馬天水狄伯支為師及僣即帝位以緯為左僕射晃為右僕射伯支為從事中郎尚書萇疾篤召太尉姚旻及緯晃伯支等入遺授輔政萇謂興曰有毁此諸人者慎無受之姚興初為姚萇偽太子萇死興祕不發䘮自稱大將軍以左僕射尹緯為長史緯與興滅符登成興之業皆緯之力也及緯死興甚悼之後蜀李班既嗣偽位以李夀録尚書事輔政班居中執䘮禮政事皆委夀及司徒何㸃尚書令王懐等後燕慕容垂僣即帝位以偽太子寳録尚書政事巨細皆委之垂摠大綱而已又以寳領侍中大單于驃騎大將軍幽州牧建留臺于龍城以髙陽王慕容隆録留臺尚書事北燕馮䟦僣稱天王以弟素弗為侍中車騎大将軍録尚書事䟦之偽業素弗所建也素弗死䟦哭之哀慟比葬七臨之南凉秃髪利鹿孤嗣偽王位垂拱而已軍國大事皆委其弟車騎將軍傉檀及利鹿孤寝疾令曰内外多虞國機務廣其令車騎嗣業南燕慕容徳僣即帝位以慕容鍾為司徒累進竒策徳用之頗中繇是政無大小皆以委之遂為佐命元勲徳平青州至莒城渤海太守封孚出降徳曰朕平青州不以為慶嘉於得卿也嘗外摠機事内參密謀北凉沮渠䝉遜自稱凉州牧以燉煌張穆博通經史才藻清贍擢拜中書侍郎委以機密之任後僣稱河西王平酒泉得宋繇曰孤不喜尅李歆欣得宋繇耳拜尚書吏部郎中委以銓衡之任䝉遜将死也以子牧犍委託之偽燕劉守光僣竊於幽州有雲州人張萬進初為本州小校亡命投幽州守光厚遇之任為禆将守光兼有滄景之地令其子繼威主留務繼威年幼未能政事以萬進佐之凡闗軍政一皆委任冊府元龜卷二百二十七
