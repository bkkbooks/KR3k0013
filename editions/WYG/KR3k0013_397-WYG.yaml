body:
  text: 册府元龜卷三百九十七宋王欽若等撰將帥部懷撫𫝊載招攜之訓書紀柔遠之説斯懷撫之謂矣其奉辭為將授命致討總戎作鎮守邊固圉而能推以恩信布之仁惠招輯流散收恤孤弱綏懷新附撫柔異類俾鄰邦敵境愛之如椒蘭外夷殊俗歸之如父母用能固守疆塲謐清障塞成勞來安定之績致和平富庶之羙詩曰民之攸暨又曰懷我好音自非誠心内著德聲外暢亦何以致其感悦哉漢段㑹宗再為西域都䕶㑹宗既出諸國遣子弟郊迎小昆彌安日前為㑹宗所立德之懷㑹宗之恩德也欲徃謁諸翎侯止不聽遂至龜兹諸城郭甚親附謂城郭諸國後漢鄧禹為前將軍建武初光武分麾下精兵一萬人使鄧禹西入闗時赤眉入長安三輔連覆敗赤眉所過殘賊百姓不知所歸聞禹乗勝獨克而師行有紀皆望風相攜負以迎軍降者日以千數衆號百萬禹所止輙停車駐節以勞來之父老童穉垂髪戴白滿其軍下莫不感悦於是名震闗西帝嘉之數賜書褒美祭彤為遼東太守使招呼鮮卑示以財利其大都䕶偏何鮮卑名也遣使奉獻願得歸化彤慰納賞賜稍復親附其異種滿離髙句驪之屬遂駱驛欵塞彤為人質厚重毅撫夷狄以恩皆畏而愛之故得其死力鄧訓章帝時為謁者會上谷太守任興欲誅赤沙烏桓恐恨謀反詔訓將黎陽營兵屯狐奴以防其變漢官儀曰漢興以幽冀并州兵克定天下故於黎陽立營以謁者監之狐奴縣屬漁陽郡也校尉張紆誘誅燒當種羗迷吾等繇是諸羗大怒謀欲報怨朝廷憂之公卿舉鄧訓代紆為校尉諸羗激忿遂相與解仇結婚交質盟詛衆四萬餘人期氷合渡河攻訓先是小月氏胡分居塞内勝兵者二三千騎皆勇徤富彊每與戎戰常以少致多雖首施兩端首施猶首鼠也漢亦時收其用時迷吾子迷唐别與武威種羗合兵萬騎來至塞下未敢攻訓先欲脅月氏胡擁衞稽故稽故謂稽留事故稽故字一作諸故令不得戰議者咸以羗胡相攻縣官之利以夷伐夷不宜禁䕶訓曰不然今張紆失信衆羗大動經常屯兵不下二萬轉運之費空竭府帑涼州吏人命縣絲髪原諸胡所以難得意者皆恩信不厚耳今因其迫急以德懷之庶能有用遂令開城及所居園門悉驅羣胡妻子内之嚴兵守衞羗掠無所得又不敢逼諸胡因即解去由是湟中諸胡皆言漢家常欲鬭我曹今鄧使君待我以恩信開門内我妻子乃得父母咸歡喜叩頭曰唯使君所命訓遂撫養其中少年勇者數百人以為義從竇憲為車騎將軍和帝永元元年出鷄鹿塞遣軍司馬吳汜梁諷奉金帛遺北單于宣明國威而兵隨其後時虜中乖亂氾諷所到輙招降之前後萬餘人遂及單于於西海上宣國威信致以詔賜單于稽首拜受諷因説宜修呼韓邪故事保國安人之福言依附漢家自保䕶其國也宣帝時呼韓邪單于欵塞朝于甘泉宫請留居光禄塞下有急保漢受降城單于喜恱即將其衆與諷俱還到私渠海聞漢軍已入塞乃遣弟右温禺鞮王奉貢入侍隨諷詣闕憲以單于不自身致奏還其侍弟明年單于復遣車諧儲王等欵居延塞欲入朝見願請大使竇憲上遣大將軍䕶軍班固行中即将與司馬梁諷迎之㑹北單于為南匈奴所破被創遁走固至私渠海而還陳禪左轉𤣥莬候城障尉㑹北匈奴入遼東追拜遼東太守胡憚其威疆退還數百里禪不加兵但使吏卒徃曉慰之單于隨降還郡禪於學行禮為説道義感化之單于懷服遺以胡中珍物而去种暠為尚書㑹匈奴冦并凉二州桓帝以為度遼將軍暠到營所先宣恩信誘降諸胡羗虜先時有生見獲質於郡縣者悉遣還之誠心懷撫信賞分明由是羗胡龜兹莎車烏孫等皆來順服劉虞為幽州刺史民夷感其德化自鮮卑烏桓扶餘穢貊之軰皆隨時朝貢無敢擾邊者後前中山相張純等與烏桓大人共連盟攻薊下復以虞為幽州牧虞到薊罷省屯兵務廣恩信遣使告烏桓峭王等以朝恩寛𢎞開許善路又設賞購純等純走出塞餘皆降散魏蘇則為金城太守是時喪亂之後吏民流散饑窮户口損耗則撫循之甚謹外招懷羗胡得其牛羊以養貧老與民分糧而食旬日之間流民皆歸得數千家毌丘興為武威太守内撫吏民外懷羗胡卒使柔附及羣雜胡棄惡詣興興皆安䘏使盡力田牽招為使持節護鮮卑校尉屯昌平是時邊民流散山澤又亡叛在鮮卑中者處有千數招廣布恩信招誘降附建義中即將公孫集等率將部曲咸各歸命使還本郡又懷來鮮卑素利彌加等十餘萬落令皆欵塞吳孫歆為鎮北将軍為邊將數十年青徐汝沛頗來歸附淮南濱江屯候皆徹兵逺徙徐泗江淮之地不居者各數百里陸遜為大将軍大帝嘉禾五年北征遜遣将軍周峻張梁等擊江夏新市安陸石陽石陽盛峻等奄至人皆捐物入城城門噎不得闗其所生獲皆加營䕶不令兵士干擾侵侮将家屬來者使就料視若亡其妻子者即給衣糧厚加慰勞發遣令還或有感慕相携而歸者隣境懷之江夏功曹趙濯弋陽僃将裴生及夷王梅頥等竝帥支黨來附遜遜傾財帛周贍經恤孫皎為征虜将軍督夏口皎嘗遣兵候獲魏邊将吏羙女以進皎更其衣服送還之下令曰今所欲誅者曹氏其百姓何罪自今已徃不得擊其老弱由是江淮間多歸附之魯肅代周瑜鎮江陵後下屯陸口威恩大行衆増萬餘人拜漢昌太守偏将軍吕蒙為左䕶軍虎威将軍襲蜀軍于南郡蒙入據城盡得蜀中之将士家屬皆撫慰令軍中不得干歴人家蒙旦暮使親近存恤耆老問所不足疾病給醫藥飢寒者賜衣糧凡府藏財寳皆封閉以待大帝至蜀軍在道路數使人與􅂪相聞䝉輙厚其使周遊城中家家致問或手書示信蜀使還私相叅詢咸知家門無恙見待過於平時故蜀吏士無鬪心㑹權尋至衆自知孤窮乃走麥城西至漳鄉人皆委蜀而降荆州遂定晉羊祜鎮荆州増修德信以懷柔初附慨然有吞併之心每遇吳人交兵剋日方戰不為掩襲之計将帥有欲進譎詐之䇿者輙飲以醇酒使不得言人有略吳二兒為俘者祜遣送還其家後吳将夏詳邵顗等來降二兒之父亦率屬與俱吳将陳尚潘景來冦祜追斬之羙其死節而厚加殯殮景尚子弟迎喪祜以禮遣還吳将鄧香掠夏口祜募生縛香既至宥之香感其恩率部曲而降祜出軍行吳境刈榖為糧皆計所侵送絹償之每㑹衆江沔㳺獵常止晉地若禽獸先為吳人所傷而為晉所得者皆封還之杜預為征南大将軍荆土肅然吳人赴者如歸矣張華為都督幽州諸軍事領䕶烏桓校尉安北將軍華撫納新舊戎夏懷之東夷馬韓星彌諸國依山帶海去州四千餘里歴世未附二十餘國并遣使朝貢於是逺夷賓服四境無虞王渾為安東將軍鎮壽陽渾不尚刑名處斷明允時吳人新附頗懷畏懼渾撫循覊旅虚懷綏納座無空席門不停賓於是江東之士無不悦附周浚為折衝将軍揚州刺史移鎮秣陵時吳初平屢有逃亡者頻討平之賓禮故老搜求俊乂甚有威德吳人悦服劉琨為并州刺史時東瀛公騰自晉陽鎮鄴并土饑荒百姓隨騰南下餘户不滿二萬冦賊縱横道路斷塞琨募得千餘人轉鬪至晉陽府寺焚毁僵屍滿地其有存者飢羸無復人色荆棘成林豺狼滿道琨剪除荆棘收𦵏枯骸造府朝建市獄冦盗至來掩襲常以城門為戰塲百姓負盾以耕屬鞬而耨琨撫循勞徠甚得物性在官未朞流人稍復鷄犬之音復相接矣士奔迸者多歸於琨琨善於懷撫而短於控御一日之中雖歸者數千去者亦相繼剋期與猗盧討劉聰盧父子相圖盧及兄子振皆病死徒屬四散琨子遵先質於盧衆皆附之及是遵與箕澹等率盧衆三萬人牛馬羊十萬悉衆歸琨琨由是復振率衆百騎自平城撫納之祖逖為奮威将軍討樊雅陳川遣將李頭率衆援之力戰有勲逖時獲雅駿馬頭甚欲之而不敢言逖知其意遂與之頭感逖恩遇每嘆曰若得此人為主吾死無恨川聞而怒遂殺頭頭親黨馮寵率其屬數百人歸於逖後鎮雍丘數遣軍要截石勒勒屯戎漸慼候騎嘗獲濮陽人逖厚待遣歸咸感逖恩德率郷里五百家降逖勒又遣精騎萬人距逖復為逖所破勒鎮戍歸附者甚多時趙固上官已李矩郭黙等各以詐力相攻擊逖馳使和解之示以禍福遂受逖節度逖愛人下士雖踈交賤𨽻皆恩禮遇之由是黄河已南盡為晉土河上堡固先有任子在胡者皆聴兩屬時遣㳺軍偽抄之明其未附諸塢主感戴胡中有異密以聞前後剋獲亦由此也荀羡監青州諸軍事領兖州刺史先是石季龍死胡中大亂羡撫納降附甚得衆心魏浚為武威太守以亂不之官及雒陽陷屯于雒北石梁塢撫養遺衆漸修軍噐其附賊者皆先解喻説大晉運數靈長行已建立歸之者甚衆其有恃遠不從命者遣将討之服從而已不加侵暴於是遠近感悦襁負至者甚衆應詹為南平太守都督平天門武陵軍事天門武陵谿蠻竝反詹討降之時政令不一諸蠻怨望并謀背叛詹召蠻酋破銅劵與盟由是懷詹數郡無虞其後天下大亂詹境獨全百姓歌之又為平南将軍江州刺史時王敦新平人情未安詹撫而懷之莫不得其歡心百姓賴之陶侃為龍鑲将軍武昌太守時天下饑荒亡者歸之盈路侃竭資賑給焉桓宣為平北将軍鎮襄陽宣乆在襄陽綏撫僑寓甚有稱績又監沔中軍事南中即将江夏相石勒荆州刺史郭敬戍襄陽陶侃使其子平西參軍斌與宣俱攻樊城拔之竟陵太平李陽又破新野敬懼遁走宣與陽遂平襄陽侃委宣鎮之以其淮南部曲立義成郡宣招懷初附桓伊都督豫州諸軍事西中郎将豫州刺史在州十年綏撫荒雜甚得物情桓冲卒遷都督江州荆州十郡豫州四郡軍事江州刺史将軍如故假節伊到鎮以邊境無虞宜以寛䘏為務乃上疏以江州虚耗加連歲不登今餘户有五萬六千宜并合小縣除諸郡逋米移州還鎮豫章詔令移州尋陽其餘皆聴之伊隨宜拯撫百姓頼焉禇翜為豫州司馬督司州軍事太傅恭軍王𤣥代翜為郡時梁國部曲将耿奴甚得人情而專勢翜常優遇之𤣥為政既急翜知其不能容奴因謂曰卿威殺已多而人情難一宜深慎之𤣥納翜言外覊縻奴而内懷憤及遷為陳留将發乃收奴斬之餘黨聚衆殺𤣥梁郡既有内難而徐州賊張平等欲掩襲之郡人遑惑将以郡歸平荀組遣徃撫之衆心乃定郗恢督梁秦雍司荆揚并等州諸軍事建威将軍雍州刺史假節鎮襄陽恢甚得闗隴之和降附者動有千計瑯琊武王伷起家為寜朔将軍監守鄴城有綏懷之稱宋柳元景為建威将軍北伐斬魏将張是提乂斬三千餘級面縛軍門者二千餘人元景輕騎晨至魏兵之面縛者多河内人元景詰之曰汝等怨王澤不接請命無所今并為魏盡力便是本無善心順附者存恤從惡者誅滅欲知王師正如此也衆皆曰虐虜見驅後出赤族以騎蹙歩未戰先死此将軍所親見非敢背中國也諸将欲盡殺之元景以為不可曰今王旗北掃當令仁聲先路乃悉釋而遣之家在闗裏者符守闗諸軍聽出皆稱萬歲而去檀道濟為冠軍将軍武帝北征道濟為前鋒至雒陽凡㧞城破壘俘四千餘人議者謂應悉戮為京觀道濟曰伐罪弔人正在今日皆釋而遣之於是戎夷感悦相率歸之者甚衆梁孫謙宋明帝泰始初事建安王休仁休仁以為司徒參軍言之明帝擢為明威將軍巴東建平二郡太守郡居三峽常以威力鎮之謙將述職勅募千人自隨謙曰蠻夷不賓蓋待之失節耳何煩兵役以為國費固辭不受至郡布恩惠之化蠻獠懷之競餉金寶謙慰喻而一無所納及掠得生口皆放還家俸秩出吏民者悉原除之郡境翕然威信大著視事三年徵還為撫軍中兵恭軍徐文盛武帝大同末為持節督寜州刺史先是州在僻遠所管羣蠻不識教義貪欲財賄劫奪相尋前後刺史莫能制文盛推心撫慰示以威德夷獠感之風俗遂改張興世為㳺擊将軍北伐次下邳號令嚴明所至獨剋下邳人多有欲來降惠紹曰我若得城諸卿皆是國人若不能破賊徒令公等失鄉非朝廷弔人本意也今且安堵復業勿妄自辛苦降人感悦陳沈恪宣帝時都督廣衡東衡交越成定新合羅愛德宜黄利安石雙等州諸軍事鎮南將軍平越中郎將廣州刺史恪未至鎮前刺史歐陽紇舉兵拒險恪不得進朝廷遣司空章昭逹督衆軍討紇紇平乃入州州罹兵荒所在殘毁恪綏懷安輯被以恩惠嶺表賴之裴忌以大建五年為都官尚書吳明徹督諸軍北伐詔忌以本官監明徹軍淮南平授軍師将軍豫州刺史忌善於綏撫甚得民和後魏冦讚初為後秦襄邑令姚泓滅秦雍人千有餘家推讚為主歸順拜綏遠将軍魏郡太守其後秦雍之民來奔河南滎陽河内户至萬數拜讚安遠将軍南雍州刺史軹縣侯治於雒陽立雍州之郡縣以撫之由是流民襁負自逺而至三倍於前于栗磾明元時為鎮遠将軍河内鎮将撫導新邦甚有威惠刁雍為鎮東将軍與叔孫建攻青州建先攻東陽雍至招集義衆得五千人遣撫慰郡縣土人盡下送租供軍又詔令南入以亂賊境雍攻克項城㑹有勅追令隨機立効雍於是招集譙梁彭沛民五千餘家置二十七營遷鎮濟隂東平王翰初封秦王太武時鎮枹䍐以信惠撫衆羌戎敬服改封東平王陸俟轉都督雒豫二州諸軍事虎牢鎮大将平涼休屠金崖羗狄子玉等叛復轉為使持節散騎常侍平西将軍安定鎮大將既至懐柔羌戎莫不歸附盧度世為假節鎮逺将軍齊州刺史州接邊境将士數相侵掠度世乃禁勒所統還其俘虜二境以寜趙逸為寜朔将軍赤城鎮将綏和荒服十有餘年百姓安之叔孫建為平原鎮大将征南大将軍在平原十餘年綏懷内外甚得邊稱陸真文成時為安西将軍長安鎮将東平王道符反于長安殺雍州刺史魚𤣥明闗中草草以真為長安鎮将賜爵河南公長安兵民素服威信真到撫慰之皆怡然安靜尉撥為晉昌鎮将綏懷邊民甚著稱績後為杏城鎮将在任九年大收民和山民一千餘家上郡徒各盧水胡八百餘落盡附為民王斤為平北将軍時并州胡酋田卜謀反誅餘衆不安遣斤鎮虎威以撫慰之斤綏靜胡醜甚收聲稱李洪之獻文時為内都大官河西羗胡鎮部落反叛獻文親征命洪之與侍中東郡王陸定總統諸軍輿駕至并州詔洪之為河西都将討山胡山胡皆保險拒戰洪之築壘於石樓南白鷄原以對之諸将悉欲進攻洪之乃開以大信聽其復業胡人遂降獻文嘉之遷并尚書外都大官李崇為鎮西大将軍孝文時巴夷擾動詔崇以本将軍為荆州刺史鎮上洛勅發陜秦二州兵送崇至治崇辭曰邊人失和本怨刺史奉詔代之自然易帖但湏一宣詔旨而已不勞發兵自防使懷懼也孝文從之乃輕發數十騎直到上洛宣詔綏慰當即帖然尋勅邊戍掠得南齊人者悉令還之南人感德仍送荆州之口二百許人兩境交和無復烽燧之警在治四年甚有稱績召還京師賞賜隆厚莫雲為鎮西大將軍時初平河西人心未一雲撫慰新舊皆得其所杜纂除積弩将軍領衆詣淮迎降民楊廂等脩立楚鎮招納山蠻李天保等五百户李輔為鎮逺將軍潁川太守帶長社戍輔綏懐招集甚得邊和任城王澄為征南大將軍都督梁益荆三州諸軍事梁州氐帥楊仲顯婆羅楊卜兄弟及符叱盤等自以居邊地險世為凶狡澄至州量彼風俗誘導懐附表送婆羅授仲顯循城鎮副將楊卜為廣業太守叱盤固道鎮副将自餘首帥各隨才而用之附者賞違命者加誅於是仇池帖然西南欵順盧淵為京兆王愉徐州刺史南徐州長史沈陵殺将佐勒宿預之衆逃叛陵在邊歴年結搆既廣二州人情咸相煽惑陵之餘黨頗見執送淵皆撫而赦之唯歸罪於陵由是衆稍安崔敬邕為龍驤将軍管州刺史庫莫奚國有馬百匹因風入境敬邕悉令送還於是夷人感附韓均為冀州刺史都督定冀相三州諸軍事均親身率下明為耳目廣設方略禁斷姦邪於是趙郡屠谷西山丁零聚黨山澤以刦害為業者均皆誘慰追捕遠近震跼先是河内未賓民多去就均撫懷之民咸受優復皮喜為侍中都督秦雍荆梁益五州諸軍事開府仇池鎮将以其父豹子昔鎮仇池有威信故也喜至深恩布惠民夷大悦酋帥强好子等各率户歸附於是置廣業固道二郡以居之傅豎眼宣武時為建威將軍討揚州賊破之仍鎮於合肥齊民歸之者千户又詔假節行南兖州事竪眼善於綏撫南人多歸之又為益州刺史進號冠軍將軍撫蜀人以恩信為本保境安民不以小利侵竊有掠數民入境者移送還本撿勒部下守宰肅然逺近雜夷相率欵謁仰其德化思為魏民矣是以蜀民請軍者旬月相繼宣武甚嘉之李紹為撫軍西道都督行秦州事時隴右新經師旅之後百姓多不安業紹善撫納甚得夷夏之心彭城王勰為司徒領揚州刺史既定壽春進位大司馬獲南齊汝隂太守王果豫州治中庾稷等數人勰傾心禮之常叅坐席果承問進曰果等契濶生平皓首播越顧瞻西夕餘光幾何今遭聖化正應力兹愚老申展尺寸但在南百口生死分張乞還江外以申德澤勰矜而許之果又謝曰殿下賜處有過國士果等今還仰負慈澤請聽仁駕振旅反跡江外至此乃還其為遠人所懷如此王肅為散騎常侍都督淮南諸軍事揚州刺史肅頻在邊悉心撫接遠近歸懷附者若市以誠綏納咸得其心安豐王猛子延明孝明時為尚書右僕射元法僧反詔為東道行䑓徐州大都督節度諸軍事與都督臨淮王彧尚書李憲等討法僧梁武帝遣其豫章王綜鎮徐州延明先牧徐方甚得人譽招懷舊土遠近歸之爾朱天光孝莊時為鎮東將軍初元顥入雒天光與天穆㑹爾朱榮於河内榮發之後并肆不安詔天光以本官兼尚書僕射為并肆雲恒朔燕蔚顯汾九州行臺仍行并州以安静之天光至并州部分約勒所在寜輯顥破尋還京師北齊盧濳為揚州道行臺左丞與陳隣接濳輯諧内外甚得邊俗之和又為揚州刺史領行臺尚書濳在淮南十三年任總軍民顯祖初平淮南給十年優復平滿之後逮後主天綂永平中徴税煩雜高文海執政斷漁獵人家無以自資諸商胡負官責息者宦者陳德信縱其妄注淮南富家令州縣徴責又勅送突厥馬數千匹於揚州管内令土豪貴買之錢直始入便出勅括江淮間馬并送至官廐由是百姓搔擾切齒嗟怨濳隨事撫慰兼行權政故得寜靜辛術為東徐州刺史為淮南經畧顯祖天保元年侯景徵江西租稅術率諸軍渡淮斷之還鎮下邳人隨術北渡淮者三千餘家及王僧辯破侯景術招擕安撫城鎮相繼欵附前後來二十餘州斛律羡為幽安平南北營東燕六州都督突厥來冦州境羡禦之望見軍威不敢戰來欵附慮其有詐且喻之曰爾輩此行本非朝貢見機始變未是宿心若有誠實宜速歸巢穴别遣使來於是退走後主天綂初突厥木汗遣使請朝獻羡始以聞自是朝貢歲時不絶羡有力焉後周韋旭後魏永安二年拜右將軍南幽州刺史時氐賊數為抄竊旭隨機招撫竝即歸附李賢初為西魏原州刺史賢雖少從戎旅而頗閑政事撫導鄉里甚得民和文帝大綂十二年隨獨孤信征凉州平之又撫慰張掖等五郡而還宇文測為大都督行汾州事政存簡惠頗得民和地接東魏數相抄竊或有獲其為冦者多縛送之測皆命解縛置之賓舘然後引與相見如客禮焉設酒殽宴勞放還其國并給糧餼衞送出境自是東魏大慙乃不為冦汾晉之間各安其業兩界之民遂通慶弔不復為仇讐矣時論稱之比於羊叔子赫連逹初從賀拔岳西征為都督及岳為侯莫陳悦所害逹馳詣太祖太祖引軍向高平令逹率騎據彈筝峽時百姓惶懼多奔散者有數村民方扶老弱驅畜牧欲入山避難軍士爭欲掠之逹曰遠近民黎多受制于賊今若值便掠縛何謂伐罪弔民不如因而撫之以示義師之德乃撫以恩信民皆悦附於是迭相曉語咸復舊業太祖聞而嘉之尉遲迥既平蜀為都督益等十州諸軍事益州刺史自劍閣以南得承制刺拜及黜陟迥乃明賞罸布德威綏輯新邦經畧未附夷夏懷而歸焉侯莫陳頴為開府儀同三司從滕王追擊龍泉文城叛胡頴與柱國竇盧勣分路而進頴懸軍五百餘里破其三柵先是稽胡叛亂輙略邊人為奴至是詔胡有厭匿良人者誅籍没其妻子有人言為胡村所隱匿者勣將斬之頴曰將在外君命有所不行諸胡固非悉反但相逼脅為亂今撫慰之自可不戰而定如即誅之轉相驚恐為難不細未若召其渠帥以隱匿者附之令自歸首則羣胡可安勣從之諸胡爭附北土以安楊敷孝閔帝時為使持節蒙州諸軍事刺史先是蠻左等多受齊假署數為亂逆敷推誠布信隨方撫慰蠻左等感之相率歸附敷乃送酋帥四十餘人赴闕請因齊所假而授之諸蠻等愈更感悦州境獲寜司馬裔自孝閔踐祚為驃騎大將軍後為御正中大夫及大軍東討與少卿楊標守軹闗即授懷州刺史武帝天和初隨上庸公陸滕討信州反蠻令賢等裔自開州道入先遣使宣示禍福羣蠻率服齊王憲討北齊任城王湝廣憲王孝衍於信都憲至信都登張耳冡以望俄而湝領軍尉相願偽出戰略陣遂以衆降相願湝之腹心也衆駭因破之擒湝及孝衍憲謂湝曰任城王何苦至此湝曰下官神武帝子兄弟十五幸而獨存逢宗社顚覆今日得死無愧墳陵憲壯之命歸其妻子厚加資給又問孝衍孝衍自陳國難辭淚俱發俯仰有節憲亦為之改容韋世康自武帝平齊授司馬總管長史時東夏初定百姓未安世康綏撫之士庶胥附楊雄為通雒防主雄處疆塲務在保境息民接待敵人必推誠仗信齊雒州刺史獨孤永業深相欽尚移書稱美之楊忠為大將軍再舉盡定漢中之地寛以御衆甚得新附之心隋虞慶則初仕後周為并州總管長史時稽胡數為反叛越王盛御史下大夫髙熲討平之將班師熲等咸謀湏文武幹畧者鎮遏之表請慶則於是即拜石州總管甚有威惠境内清肅稽胡慕義而歸者八千餘户高熲為左軍大將蕭巖之叛也詔熲綏集江漢甚得民和韋冲開皇初為開府時發南汾胡千餘州人北築長城在塗皆亡高祖呼冲問計冲曰夷狄之性易為反覆皆由牧宰不稱之所致也臣謂以禮綏靜可不勞兵而定帝然之命冲綏懷叛者月餘皆至并赴長城下書勞勉之尋拜石州刺史甚得諸胡歡心後為營州總管冲容貎都雅寛厚得衆心撫靺羯契丹皆能致其死力奚霫畏懼朝貢相續開皇中為南寜州總管持節撫慰冲既至南寜帥㸑震及西㸑首領皆詣府叅謁帝大悦下詔褒揚之韋洸開皇中平陳之後為江州總管進圖嶺南既至廣州説陳渝州都督王猛下之嶺表皆定帝聞而大悦許以便宜從事洸所綏集二十四州拜廣州總管長孫晟為左勲衞驃騎將軍持節䕶突厥晟遣降虜覘俟雍問知其牙内屢有災變夜見赤虹光照數百里天狗霣雨血三日流星墜其營内有聲如雷每夜自驚言隋師且至并遣奏知仍請出討突厥都速等歸染於前後至者男女萬口晟安置之由是突厥悦附後都藍大亂為其部下所殺晟因奏請曰今王師臨境戰數有功賊内横離其王被殺乘此招誘必竝來降請遣染於部下分頭撫慰帝許之果盡來附慕容三藏以功授大將軍又授廓州刺史州極西界與吐谷渾隣接姦宄犯法者皆遷配彼州流人多有逃逸及三藏至招納綏撫百姓愛悦襁負日至吏民歌頌之周法尚為柱州總管桂州人李光仕作亂詔法尚討之光仕率勁兵保白石洞其黨有來降附輙以妻子還之居旬日降者數千人唐韋仁壽初為嶲州都督府長史時南寜州内附朝廷使安撫類皆受賄邊人患之或有叛者高祖以仁壽素有能名令檢校南寜州都督寄聴政於越嶲使每嵗一至其地以慰之仁壽將兵五百人至西洱河承制置八州十七縣授其豪帥牧宰法令清肅人懷懽悦許紹為陜州刺史行軍總管紹與王世充蕭銑疆境深接紹之士卒為賊輙殺之紹執得敵人皆資給放去諸賊感媿自是以後不復侵掠合境獲安張士貴高祖起義初遣經略河南士貴勒兵遇桑顯和擊破之召所俘虜三千餘人慰喻遣還盧士良武德中為河南刺史吐谷渾及黨項入冦士良擊破之前後歸附者六十餘户後檢校晉州事及在河南既兵亂之後户口去散到官之始城邑蕭條纔數百家士良撫納夷夏大𢎞恩信數載之後復業者三千餘家時黨項羗依阻山谷頻為冦盗士良戰㨗之後諸羗畏懼相率内屬卒不為患劉咸為廣州總管武德六年崗州刺史馮士翽以新㑹反咸討降之復其位李靖為兵部尚書討蕭銑降之仍渡嶺至桂州遣人分道招撫其大首領馮盎李光度等皆遣子弟來謁自餘州縣莫不服從量其誠效授以官爵凡所招慰户數十萬優詔勞勉授靖嶺南道安撫大使簡較桂州總管靖以南方去朝廷遙逺喪亂以來不見恩德若不遵以禮樂兼示兵威無以變其風俗遂率所部兵馬發徃桂州南廵所經之處靖請自存撫耆老問其疾苦遠近悦服又突厥種落離叛朝廷進取以靖為代州行軍總管撫納降附靖輕騎先據定襄城突厥部落望風逃散由是突厥頡利可汗率衆歸欵進封代國公張儉貞觀初為朔州刺史突厥頡利敗後恩給部落飢寒離散儉招慰安輯之其不來者便居磧北既親屬分徃私相徃還儉雅得其情亦不禁止但存綱紀覊縻而已及儉移勝州都督州司謂其將叛遽以奏聞詔起儉為使觀動靜儉單馬推誠入其部落召諸首領布以腹心咸匍匐稽顙應時而至便移就代州即令檢校代州都督恩給部落竟無叛離儉遂勸其營田每年豐熟慮其私蓄富實易生驕侈表請和糴擬就貯備蕃人喜悦鋭意營田長城之北有同中壤由是邊儲實焉李素立為揚州大都督府司馬時突厥鐡勒部落相率内附太宗於其地置瀚海都䕶府以綂之以素立為瀚海都䕶又有闕泥熟别部尤為邊患素立遣使招諭降之夷人感其惠争奉牛酒素立唯收其酒一杯餘悉還之建立廨舍開屯田久之轉綿州刺史蘇定以高宗顯慶二年為伊麗道行軍總管破阿史那賀魯於金牙山盡收其所據之地於是悉命諸部歸其所居間通道路列置舘驛埋瘞骸骨所在問疾苦分其疆界復其産業賀魯所擄掠者悉括還之於是西域諸國安堵如故裴行儉以麟德二年為安西大都䕶西域諸國多慕義歸降薛仁貴總章元年為安東都䕶總兵二萬人以鎮高麗仁貴恤孤老躬儉約盜賊有幹者隨才任使忠孝節義咸加旌表高麗人衆莫不欣然慕化薛訥為幽州都督睿宗太極元年為并州大都督府長史和戎軍大使訥鎮幽州二十餘載邊人懷之未嘗深入虜亦不敢犯李晟德宗時鎮涇原常曰河隴之陷也非吐蕃能之皆以將帥貪暴種落攜貳人不得耕稼展轉皆東徙自棄之耳且土無絲絮人苦征役思唐之心豈有已乎乃傾家財賞降者以懷來之降虜浪息曩晟奏封王每蕃使至晟必置浪息曩别座衣以錦袍金帶以寵異之蕃人皆相指因榮羡息曩李復為嶺南節度使瓊州久陷於蠻獠中復累遣使降之因奏瓊州設都督府以撫綏之韋臯為劒南節度使貞元四年四月東蠻鬼王驃旁等自陷嶲州臣於吐蕃絶朝貢者二十餘年及是臯招誘之始棄吐蕃内附來朝特封為和義順政等郡王且衣以冠帶仍給兩林勿鄧等部落功而遣之又臯以雲南蠻衆一萬與吐蕃和好蕃人入冦必以蠻為前鋒於是遣使通雲南蠻以離吐蕃之助其王異牟尋因遣使願受正朔於是朝廷命詞部郎中兼御史中丞袁滋持節冊異牟尋為南詔王自是遂修朝貢而吐蕃不冦蜀邊馬總憲宗時為淮西節度使總以申光蔡等州久陷賊冦人不知法威刑勸導咸令率化奏改彰義軍曰淮西賊之偽迹一皆削盪李遜為濠州刺史先是濠之都將楊騰刻削士卒州兵三千人各謀殺騰騰覺走揚州而家屬皆死濠兵不自戢因行攘剽及遜至郡餘亂未殄徐驅其間為陳逆順利害之勢衆皆釋甲請罪因以寜息鄭權為德棣滄景節度使朝廷用兵討淄青李師道權奏於安德平原二縣之間置歸化縣以集降民李夷簡為西川節度使時有嶲州刺史王顒以貪虐為蠻戎所怒相率攻之嶲州遂亂夷簡發使曉諭戎人畏伏盧簡求凡歴四鎮皆接邊郵屬雜虜冦邊因之移授所至撫御邊鄙晏然太原素管退渾契苾沙陀三部落或撫納不至多為邊患前政或要之詛盟質之子弟然為盗不息簡求撫之以德接以恩信所執子弟一切遣之故五部之人欣然聽命崔從為鄜坊丹延節度使鄜時内接畿甸外連羗落從鎮撫甚得其制黨項有以羊馬來致之從皆撫慰還之後唐魏王繼岌以莊宗同光三年冬平蜀遣使齎書詔南詔蠻時郭崇韜欲聲教逹於南荒募蜀川曽使南詔者有秦州副使徐藹諳雲南苴羊城途路且云中和二年僖宗在蜀令嗣王龜年使雲南藹季父䖍為副使藹為判官時不到苴羊城只逹於善閘回時約為甥舅許出降安化公主雲南使來迎公主次驛報收長安黄巢東走乃託以佗歲霍彥威初仕梁為邠州節度使鳳翔李茂貞攻圍半年竟不能下或得俘掠悉放之歸秦人懷之遂無侵擾王處直為定州節度使處直為人精簡好求吏理雖地處一隅介於大國招懷撫納甚得人和藥彥稠明宗時授邠州節度使詔㑹兵制置鹽州蕃戎逃遁獲陷蕃士庶千餘竝遣復鄉里張希崇鎮靈武閔帝應順元年正月沙州𤓰州遣牙將各以方物朝貢迴鶻可汗仁美遣使獻故可汗仁裕遺留貢物鞍馬噐械仁羙又獻羙玉圓玉鞦轡碙砂羚羊角波斯寶緤玉帶蓋希崇招懷邊鎮内附故也張敬詢為大同軍節度使至鎮招撫室韋曷刺鉢于鉞萬餘帳以捍北邊晉馮暉為滑州節度使移鎮靈武初張希崇鎮靈州以久在北蕃頗究邊事能駕御河西邊人而數年之間侵盗屏息希崇卒未有主帥蕃部冦鈔無復畏憚而暉疆暴之名聞於遐徼及暉到鎮蕃部集慶暉大張宴席酒殽豐備羣夷告醉爭陳獻賀暉皆以錦綵酬之蕃情大悦黨項拓拔彥超者州界部族之大者暉至來謁厚加待遇仍為在城治第豐其服玩因留之不令歸部河西養馬所產易為交市暉朞年得馬五千匹而蕃部歸心漢薛懷德為邢州節度上言昨契丹侵逼諸縣人户入山逃避臣已散差人招攜安撫漸已復業周向訓知延州太祖廣順三年六月上言所屬蕃部侵盗漢户臣已招喚諸部酋率設酒食仍令誓約更不敢侵犯王景為鳳翔節度使世宗顯德二年五月上言今月七日收下黄牛新城大忌等三砦相次又收下鬼迷黄花下湛滴水皂莢等五砦其鄉村人户竝已招攜安撫册府元龜卷三百九十七
