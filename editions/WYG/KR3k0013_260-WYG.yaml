body:
  text: 册府元龜卷二百六十宋王欽若等撰儲宫部尊師傅禮士齒胄講學尊師傅學記曰師嚴然後道尊自周公抗世子之法德教斯著前後出入罔不降禮故能慎成其業克保元吉漢魏而下史氏所記或有致恭北面親授經義明備法服屈體申誠進見周旋崇尚爵齒以致延宿宫闈輿升殿陞訪對請益歡待隆篤省視疾疢豐潔珍御傷弔淪逝曲申恩禮賜予豐渥備罄寵數自非老成碩望勤宣令範者疇克當之哉後漢明帝始立為皇太子世祖拜桓榮為議郎入使授太子後拜愽士常令止宿太子宫榮嘗寢病太子朝夕遣中傅問病賜以珍羞帷帳奴婢謂曰如有不諱無憂家室也不諱謂死也死者人之常故言不諱也後為少傅榮以太子經學成畢上䟽謝曰臣幸得侍帷幄執經連年而智學淺短無以補益萬分今皇太子以聰睿之姿通明經義觀覽古今儲君副主莫能專精博學若此者也斯誠國家福祐天下幸甚臣師道已盡皆在太子謹使掾臣汜再拜歸道太子報書曰莊以童䝉學道九載而訓典不明無所曉識夫五經廣大聖言幽逺非天下之至精豈能與於此况以不才敢承誨命昔之先師謝弟子者有矣上則通逹經㫖分明章句下則去家慕鄉永謝師門今䝉下列不敢有辭願君慎疾加餐重愛玊體桓郁榮子也為侍中虎賁中郎將永平五年入授皇太子經遷越騎校尉太子奉賀致禮魏文帝為太子何夔為太子太傅每月朔太傅入見太子太子正法服而禮焉梁茂亦為太子太傳甚見禮敬吳太子和大帝第三子也闞澤為太傳薛綜為少傅蔡頴張純等從容侍從和尊敬師傅愛好人物頴等每朝見進賀和常降意歡以待之講校經義綜察是非及訪諮朝臣考績行能以知優劣各有條貫晉李裔為太子少傅後為司徒太康三年薨皇太子命舍人王賛誄之明帝為太子時杜彝拜國子祭酒辭疾未嘗朝㑹皇太子三至彝第執經問義梁昭明太子天監初尚㓜未與臣僚相接髙祖勑太子洗馬王錫秘書郎張纉親表英華朝中髦俊可以師友事之陳周𢎞正大建五年為尚書左僕射尋勑侍東宫講論語孝經太子以𢎞正朝廷舊臣德望素重于是降情屈禮横經請益有師資之敬焉徐孝克為國子祭酒至德中皇太子入學釋奠百司陪列孝克發孝經題後主詔皇太子北面致敬後魏崔光延昌元年遷中書監侍中如故二年宣武幸東宫召光賜坐謂曰卿是朕西臺大臣當令為太子師傅光起拜固辭詔不許即命孝明出從者十餘人勅以光為𫝊之意令孝明拜光光又拜辭不當受太子拜復不䝉許孝明遂南面再拜詹事王顯啓請從太子拜於是宫臣畢拜光北面立不敢荅拜唯西面拜謝而出北齊馬敬德後主時為侍講令子元熈待詔文林舘轉正員武平中皇太子將講孝經有司請擇師友帝曰馬元熈朕師之子文學不惡可令教兒於是以孝經入授皇太子儒者榮其世職性和厚在内甚得名譽皇太子亦親敬之唐常山王承乾貞觀初為太子李綱為太子少師時綱患脚不能踐履皇太子命三衛輿上殿親拜之訪以得失大見崇重綱於是陳君臣父子之道問寢視膳之方理順詞直聽者㤀倦蕭瑀貞觀十六年為太子太保後授金紫光祿大夫二十一年卒太子為之舉哀遣使弔祭髙宗為皇太子貞觀十九年太宗詔伐髙麗發定州皇太子監國髙士廉攝太子太傅仍典朝政皇太子下令曰攝太傅申國公士廉朝望國華儀刑攸屬寡人忝膺監守寔資訓導比日聽政嘗屈同榻庻因諮詢少祛蒙滯但㨿案奉對情所未安近已約吏不許更進太傅誨訓深至使遵常式辭不獲免輙復敬從所司亦宜别以一案供太傅士亷固讓不敢當順宗為皇太子禮重師𫝊引見輙先拜莊恪太子文宗長子也太和六年冬立為皇太子八年十月皇太子於崇明門見太師路隨禮士夫貴而能降見賢而思齊德之盛者也若夫居元良之重為天下之本而能杜驕盈之志守卑損之誠優禮髦士樂聞善道或推以師友之分或申以談宴之樂博約以文義咨諏以致理厚其贈貺形於詠歎加旌賁之寵舉延辟之命乃至飾終異數懐賢述美形於筆牘垂之話言用能增明兩之輝成温文之德萬方以之風偃羣士以之響臻盖夫貞邦之宏業日躋之懿望蔑以加於此矣漢明帝為太子時桓榮為博士授太子經常令止宿太子宫積五年榮薦門下生九江胡慮侍講乃聽得出旦一入而已榮嘗寢病太子朝夕遣中傅問病賜以珍羞帷帳奴婢謂曰如有不諱無憂家室也不諱謂死也死者人之嘗故言不諱也後病愈復入侍講魏文帝初為太子書與元城令吳質曰昔年疾疫親故多罹其災徐陳應劉一時俱逝觀古今文人類不䕶細行鮮能以名節自立而偉長徐幹字也獨懷文抱質恬淡寡欲有箕山之志可謂彬彬君子矣著中論二十餘篇辭義典雅足傳于後德璉應瑒字也嘗斐然有述作意其才學足以著書美志不遂良可痛惜孔璋陳琳字也章表殊徤微為繁富公幹劉禎字也有逸氣但未遒耳元瑜阮瑀字也書記翩翩致足樂也仲宣王粲字也獨自善於辭賦惜其體弱不足起其文至於所善古人無以逺過也昔伯牙絶絃於鍾期仲尼覆醢於子路痛知音之難遇傷門人之莫逮也諸子但為未及古人自一時之儁也邯鄲淳從三輔客荆州荆州内附太祖素聞其名召與相見甚敬異之時太子亦宿聞淳名因啓淳欲使在文學官屬中㑹臨菑侯植亦求淳太祖遣淳詣植劉􅘙字恭嗣自揚州歸太祖太祖辟為丞掾轉五官将文學太子器之命􅘙通草書􅘙荅書曰初以尊卑有踰禮之常分也是以貪守區區之節不敢修草必如嚴命誠知勞謙之素不貴殊異若彼之髙而惇白屋如斯之好茍使郭隗不輕於燕九九不忽於齊樂毅自至覇業以隆虧匹夫之節成巍巍之美雖愚不敏何敢以辭陳羣為侍中領丞相東西曹掾太子深敬器焉待以交友之禮嘗歎曰自吾有回門人日以親張範為議郎叅丞相軍事太祖征伐嘗令範及邴原留與太子守太祖謂太子舉動必諮此二人世子執子孫禮荀攸為尚書令太祖謂太子曰荀公逹人之師表也汝當盡禮敬之攸嘗病世子問病獨拜牀下其見尊異如是吳孫登為皇太子諸葛恪張休顧譚陳表等以選入侍登待接寮屬畧用布衣之禮與恪休譚等或同輿而載或共帳而寢太傅張温言於帝曰夫中庻子官最親密切問近對宜用儁德於是乃用表等為中庻子後又以庻子禮拘復令整巾侍坐及帝即位登為皇太子恪為左輔休為右弼譚為輔政表為翼正都尉是為四友而謝景范慎刀𤣥羊衜等皆為賔客於是東宫號為多文休嘗以漢書授登指摘文義分别事物並有章條毎外堂宴飲酒酣樂作登輙降意與同歡樂休為人觧逹登甚愛之常在左右是儀為吳主所委任及大駕東遷太子登留鎮武昌使儀輔太子太子敬之事先諮詢然後施行進封都鄉侯後從太子還建業復拜侍中孫和為太子帝命中書令闞澤教以書藝好學下士甚見稱述晉明帝為太子時欽賢愛客雅好文辭當時名臣自王導庾亮温嶠桓彛阮放等咸見親待尚書郎郭璞亦以才學見重論者美之南齊文惠太子長懋武帝長子既正位東儲善立名尚引接朝士人人自以為得意文武多士多所招集㑹稽虞炎濟陽范岫汝南周顒陳郡袁廓並以學行才能應對左右而武人畧陽垣歴生襄陽蔡道貴拳勇秀出當時以比關羽張飛其餘安定梁天惠平原劉孝慶河東王世興趙郡李居士襄陽黄嗣祖魚文康絢之徒並為後來名将沈約為歩兵校尉管書記直永夀省校四部圖書時大㑹東宫多士約特被親遇毎入見景斜方出王侯到宮咸不得進約每以為言太子曰吾生平嬾起是卿所悉得卿談論然後㤀寢卿欲我夙興可恒早入梁昭明太子統武帝長子性寛和容衆喜愠不形於色引納才學之士賞愛無倦初徐勉為太子中庻子太子尚㓜勅知宫事禮之甚重每事詢謀王筠為太子洗馬歴中書舍人並掌東宫管記太子嘗與筠及劉孝綽陸倕到洽殷等好宴𤣥圃太子獨執筠袖撫孝綽肩而言曰所謂左挹浮丘袖右拍洪厓肩其尊異見重如此孝綽為太子僕射掌東宫管記太子起樂賢堂乃使畫工先圖孝綽形狀太子文章繁富羣才咸欲撰録太子獨使孝綽集而序之劉勰為歩兵校尉兼太子舎人謝舉為太子庻子家令掌東宫管記深為昭明賞接陸襄為盧陵王記室叅軍太子聞襄業行啓武帝引與㳺處除太子洗馬遷中書舍人並掌管記劉杳為東宫通事舎人遷歩兵校尉太子謂杳曰酒非卿所好而為酒厨之職正為不媿古人耳太子有瓠食器因以賜焉曰卿有古人之風故遺卿古人之器陸倕歴太子中舎人中庻子除太常卿明山賔歴太子率更令中庻子右衛率權攝北兖州事到洽歴太子中舍人家令中庻子出為雲麾長史張率為太子家令出為新安太守倕普通七年山賔洽大通元年俱卒官太子與晉安王令曰明北兖到長史遂相繼彫落傷怛悲惋不能已已去歳陸太常殞殁今茲二賢長謝陸生資貞履忠氷清玉潔文該四始學徧九流髙情勝氣貞然直上明公儒學稽古淳厚篤誠立身行道始終如一儻值夫子必升孔堂到子風神開爽文義可觀當官莅事介然無私皆海内之俊乂東序之祕寶此之嗟惜更復何論但游處周旋並淹歳序造膝忠䂓豈可勝説幸免祗悔實二三子之力也談對如昨音言在耳零落相仍皆成異物每一念至何時可言天下之寶理當惻愴近張新安又致故其人文筆𢎞雅亦足嗟惜随弟府朝東西日乆尤當傷懷也比人物零落特可傷惋屬有今信乃復及之又與前司徒左長史殷芸令曰北兖信至明常侍遂至殞逝聞之傷惻此賢儒術該通志用稽古温厚淳和倫雅𢎞篤授經以來迄今二紀若其上交不謟造膝忠䂓非顯外迹得之胷懷者盖亦積矣攝官連率行當歸歟不謂長徃𦕈成疇日追憶譚緒皆為悲端徃矣如何昔經聯事理當酸愴也初山賔自右衛率為青冀二州大中正在州所部平陸縣不稔啓出倉米以贍民後刺史檢州曹失簿書以山賔為耗闕有司追責籍其宅入官山賔黙不自理更市地造宅太子聞築室不就有令曰明祭酒雖出撫大藩擁旄推轂珥金拖紫而恒事屢空聞構宇未成今送薄􅂇并貽詩曰平仲古稱竒夷吾昔擅美今則挺伊賢東秦固多士築室非道傍置宅歸仁里庚桑方有繼原生今易擬必來三徑人将招三徑士陸罩大同七年以母老求去公卿已下祖道於征虜亭皇太子賜黄金五十斤時人方之䟽廣張緬為太子舍人歴洗馬中庻子既卒昭明親徃臨哭與緬弟纘書曰賢兄學業該通莅事明敏雖倚相之讀墳典卻縠之敦詩書惟今望古蔑以斯過自列青宫二紀將及義雖僚屬情實親友文筵講席朝逰夕宴何曽不同茲勝賞共此言寄如何長謝奄然不追且年甫强仕方中才力摧苖落頴彌可傷惋念天倫素睦一旦相失如何可言言及增哽攬筆無次張率為太子家令丁母憂服未闕而卒昭明太子遣使賜贈簡文帝初為晉安王時劉遵領記室及王為太子遵隨入藩為中庻子以舊恩特䝉寵遇同時莫及及卒太子深悼惜之與遵從兄陽羡令孝儀令曰賢從中庻奄至殞逝痛可言乎其孝友淳深立身貞固内含玉潤外表瀾清美譽嘉聲流於士友言行相符終始如一文史該富琬琰為心辭章博贍𤣥黄成采既以鳴謙表性又以難進自居未嘗自請公卿締交榮利是以新沓莫之舉杜武弗之知自阮放之宫野王之職棲遲門下已踰五載同僚已陟後進多升而怡然清靜不以少多為念確爾之志亦何易得西河觀寶東江獨歩書籍所載必不是過吾昔漢南連翩書記及忝朱方從容坐首良辰美景清風月夜鷁舟乍動朱鷺徐鳴未嘗一日而不追随一時而不㑹遇酒闌耳熱言志賦詩校覆忠賢𣙜揚文史益者三友此實其人及𢎞道下邑未申善政而能使民結去思野多馴雉此亦威鳯一羽足以驗其五德比在春坊載獲申晤博望無通賔之務司成多節文之科所頼故人永相嫓偶而此子溘然實可嗟痛惟與善人此為虚説天之報施豈若此乎想卿痛悼之情當何已已徃矣柰何投筆惻愴吾昨欲為誌銘并為撰集吾之劣薄其生也不能揄揚吹嘘使得騁其才用今者為銘為集何益既徃故為痛惜之情不能已已耳王䂓字威明為中書黄門侍郎勑與殷鈞王錫張緬同侍東宫俱為太子所禮遷太子中庻子卒官太子出臨哭與湘東王繹令曰威明昨宵奄復殂化甚可痛傷其風韻遒上神峯標映千里絶迹百尺無枝文辯縱横才學優贍跌宕之情彌逺濠梁之氣特多斯實俊民也一爾過隙永歸長夜金刀掩芒長淮絶涸去歳冬中已傷劉子今茲寒孟復悼王生俱徃之傷信非虚説謝嘏為太子中庻子出守建安於宣猷堂宴餞並召時才賦詩同用十五刪韻家令蕭愷詩先就其辭又美太子與湘東王令曰王筠本自舊手後有蕭愷可同稱為才子沈文阿為國子五經愽士太子引為學士深相禮遇及撰長春義記多使阿撮異聞以廣之王元䂓為員外散騎侍郎太子引為賔客每令講論甚見優禮庾肩吾為太子中庻子掌管記東海徐摛為左衛率肩吾子信摛子陵並為妙選學士父子在東宫出入禁闥恩禮莫與比隆孔休源初為晉安王府長史後卒太子令曰金紫光禄大夫孔休源立身中正行已清恪昔歲西浮渚宫東泊枌壤毗佐藩政實盡厥誠安國之詳審公儀之亷白無以過之奄至殞喪情用惻怛今須舉哀外可備禮庾仲容初為晉安王功曹史後為安成王中記室當出隨府太子以舊恩特降餞宴賜詩曰孫生陟陽道夫子朝歌縣未若樊林舉置酒臨華殿時輩榮之陳後主為皇太子時岑之敬授東宫儀省學士太子素聞其名尤隆賞爵時陸琛為司徒左西掾掌東宫管記太子愛琛才辯深禮遇之褚玠自太子中庻子出為山隂令在任歳餘守祿俸而已去官之日不堪自致太子知玠無還裝手書賜粟米二百斛於是還都太子愛玠文辭令入直殿陸琰為武陵王明威府功曹史兼東宫管記丁母憂去官而卒太子甚傷悼之為制誌銘琰弟瑜為太子中舍人太子好學欲博覽羣書以子集繁多命瑜鈔撰未就而卒太子為之流涕仍與詹事江總書曰管記陸瑜奄然殂化悲傷悼惜此時何已吾生平愛好卿等所悉自以學渉儒雅不逮古人欽賢慕士是情尤篤梁室亂離天下糜沸書史殘缺禮樂湮淪晩生後學匪無墻面卓爾出羣斯人而已吾識覽雖局未曽以言議假人至於片善小才特用嗟賞况復洪識竒士此故㤀言之地論其愽綜子史詣究儒墨經耳無遺觸目成誦一褒一貶一激一揚語𤣥析理披辭摛句未嘗不聞者心服聽者觧頥㑹意相得自以為布衣之賞吾監撫之暇事隙之辰頗用談笑娛情琴樽間作雅篇豔什迭互蜂起每清風朗月美景良辰對羣山之參差望巨波之滉瀁或翫新花時觀落葉既聽春鳥又聆秋鴈未嘗不促膝舉觴連情發藻且代以琢磨間以嘲謔俱怡耳目並留情致而流年甚速朝露可傷豈謂玉折蘭摧遽從短運以此為恨當復何言遺迹餘文觸目増泫絶絃投筆但有酸恨以卿與同志聊復敘懷涕之無從言不寫意其見重如此瑜弟玠為中書舍人兼東宫管記甚見親待尋以疾失明将還鄉里太子觧衣贈玠為之流涕姚察為東宮學士太子深加禮異情越羣僚宫内所須方幅手筆皆付察立草又數令共顧野王遞相䇿問常䝉賞擊及卒太子親製誌銘以表惟舊陸繕大建初為太子詹事行東宫事後遷左僕射卒太子以繕東宫舊臣特贈祖奠北齊廢帝初為皇太子文宣令黄門侍郎宋欽道在東宫時鄭子黙以文學見知亦被親寵欽道本學法諳識古今凡有疑事必詢於子黙二人幸於兩宫雖諸王貴臣莫不敬憚天保末文宣在晉陽太子監國集諸儒講孝經令楊愔傳㫖謂國子助教許散愁曰先生在世何以自資對曰散愁自少以來不登孌童之牀不入季女之室服膺簡策不知老之将至平生素懷若斯而已太子曰顔子縮屋稱貞柳下嫗而不亂未若此翁白首不娶者乃賚絹百疋隋太子勇文帝長子東宫既建𢎞明克讓姚察陸開明等為之賔友克讓自太子内舍人轉率更令太子以師道處之恩禮甚厚每有四方珍味輙以賜之元德太子昭煬帝子大業初東宫既建特髙士廉舉人才擢甲科為太常奉禮郎非其好也太子美其才以本官奏兼通事舍人唐隱太子建成在東宫李綱為太子詹事禮遇甚厚建成嘗徃温湯綱時以疾不從有進生魚於建成者将召饔人作膾時唐儉趙元楷在座各自賛能為膾建成從之既而謂曰飛刀鱠鯉調和鼎食公實有之至於審諭弼諧固屬於李綱矣於是遣使送絹二百疋以遺之韋挺武德中累遷太子左衛驃騎將軍檢校左衛率隱太子恩遇甚隆宫臣罕與為比岑文本為中書侍郎是時新立晉王為皇太子名士多兼領宫官太宗欲令文本兼攝文本不願更希東宫恩澤太宗乃止仍令五日一參東宫皇太子執賔友之禮與之荅拜見待如此髙宗為皇太子引太學博士馬加運為崇賢館學士與洗馬秦暐等侍講殿中恩禮甚渥時譙人李敬𤣥博覽羣書特善五禮馬周啓薦之召入崇賢館兼領侍講借御書令讀之太子賢髙宗子也時王勃六歳善屬文未弱冠應幽逺舉及第乾封初詣闕上表游東岳頌時東都初造乾元殿勃又上乾元殿頌賢聞其才名奏就府修撰甚愛重之中宗為皇太子永隆二年二月親行釋奠之禮畢上表請博延耆碩英髦之士為崇文館學士許之裴耀卿守貞子也少聰敏數歳觧屬文童子舉弱冠拜袐書正字俄輔相王府典籖時睿宗在藩甚重之令與掾丘悦文學韋利器更直府中以備顧問府中稱為學直𤣥宗為皇太子景雲元年十二月表請備禮辟隱士前太子中舎人王友貞以至孝故也齒胄禮太子入學以齒盖受學之道明長㓜辨尊卑也是知居副君之位當主器之重遵三善之教崇四術之功親臨於國庠釋奠於先聖講論經義稽合古訓然後均其好賜錫以宴喜弦誦之業斯著元良之德増茂風教之本其在茲乎元帝太興三年皇太子即明帝也講論語通太子並親釋奠以大牢祠孔子顔回配太子進爵於先師中庻子進爵於顔回南齊武帝永明三年十月詔曰皇太子釋奠王公已下可悉徃觀禮即文惠火子長懋也梁髙祖天監八年九月昭明太子於壽安殿講孝經盡通大義講畢親臨釋奠于國學九年三月乙未詔曰王子從學著自禮經貴㳺咸在實惟前誥所以成廣義方克隆教道今成均大啓元良齒上自斯以降並宜肄業皇太子及王侯之子年在從師者可令入學大同七年皇太子即簡丈也表其子寧國臨城公入學時議者以與太子有齒胄之義疑之侍中尚書令臣敬容尚書僕射臣纉尚書臣僧旻臣之遴臣筠等以為參㸃並事宣尼回路同諮泗水鄒魯稱盛洙汶無譏師道既光得一資敬無虧亞二况於兩公而云不可制曰可陳宣帝大建三年八月辛丑皇太子親釋奠于太學即後主也二傳祭酒以下賚帛各有差後主至德三年皇太子裔躬出太學講孝經講畢又釋奠於先師先聖其日設金石之樂於太學王公卿士及太學生並預宴唐太宗貞觀二十一年二月丁丑詔皇太子之國學釋奠於先師即髙宗也皇太子為初獻國子祭酒張後裔為亞獻光州刺史攝司業趙𢎞智為終獻既講𢎞智開講孝經敷𢎞忠臣孝子之義皇太子歡甚因令宣勞胄子以上言名教之所繇學校之所作君臣父子之義風化訓導之端加之以𢎞奨因之以誡勵凡數百言詞義甚美聽者竦然無不歡悦更相顧曰此誠德音也於是賜學官冑子帛各有差仍擢其髙業者右庻子許敬宗上四言詩以美其事髙宗緫章元年二月皇太子𢎞幸國學釋奠永隆二年二月皇太子親行釋奠之禮即中宗也睿宗景雲二年八月詔皇太子詣國子監行釋奠之禮即𤣥宗也詔曰庠序之興教自元子禮經之最奠始先師中古迄今斯道無替皇太子天資聖敬日就文明絃誦之業已髙元良之德斯茂自昇儲博望主器承華執經之問雖勤用幣之意未展今仲丁獻吉有事兩塾備禮三尊宜遵舊章俾緝徽典太極元年二月皇太子将行釋奠之禮因下令曰夫談講之務貴於名理所以解疑辯惑鑿瞽開聾使聽者聞所未聞視者見所未見爰自近代此道漸微問禮言詩惟以篇章為主浮詞廣説多以嘲謔為能遂使講座作俳優之塲學堂成調弄之室嗇夫利口可以驤首先鳴太𤣥儁才自當俛首垂翅捨茲慤實競彼浮華取悦無知見嗤有識假令曹張重出馬鄭再生終亦藏鋒匿鋭閉關却埽者矣寡人今既親行齒胄躬詣講筵思聞啓沃之談庻叶温文之德其侍講所有合難釋嫌疑不得别搆虚言用相凌忽如有違者所司量事紏彈是月丁亥皇太子釋奠於國學追贈顔回為太子太師曾參為太子太保每年春秋釋奠𤣥宗開元七年十一月乙丑以貢舉人将謁先師勑皇太子瑛及諸子行齒胄禮庚午勅曰皇太子今月二十四日行齒胄禮所以崇儒重道尚德𢎞風宜有錫賚以成光寵其在陪位定等差與賜乙亥皇太子入國學行齒胄禮謁先聖太子初獻其亞獻終獻竝以胄子充右常侍褚旡量開講孝經并禮記文王世子篇初詔侍中宋璟亞獻中書侍郎蘇頲終獻及臨享帝思齒胄之義乃改焉德宗建中元年正月辛未拜南郊還御丹鳯樓大赦天下其東宫官宜擇端厚之士皇太子即順宗也時幸太學行齒胄之禮諌議大夫孔述濬宜充太子侍讀講學夫王之教世子必以禮樂春誦夏弦太師詔之繇古道也是知處儲副之位當主器之重自非博約於道義浸潤於經術服聖人之丕訓聞先王之法言資之以講耨加之以祖習其何以貞天下之本聳民神之望哉歴代已還踐明兩者或討論方䇿通其大義臨習講問精理煥察横經師授令儀允穆皆所以勤時習之業茂日新之德崇四術以隆道敦三善而成美盖元良之懿烈曽何以加於此乎晉武帝㤗始七年皇太子講孝經通咸寧三年皇太子講詩通太康三年皇太子講禮記通惠帝元康三年皇太子講論語通元帝太興二年皇太子講論語通宋前廢帝初皇太子講孝經於崇政殿南齊武帝永明三年皇太子於崇政殿講孝經少傅王儉令摘句太僕周顒撰為義䟽五年冬皇太子臨國學親臨策試諸生於坐問少傅王儉曰曲禮云無不敬尋下之奉上可以盡禮上之接下慈而非敬今緫同敬名将不為昧儉曰鄭𤣥云禮主於敬便當是尊卑所同太子曰若如來説通則忠惠可以一名孝慈不須别稱儉曰尊卑號稱不可悉同愛敬之名有時相次忠惠之異誠如聖㫖孝慈互舉竊有徴據禮云不勝喪此於不慈此即其義太子曰資敬奉君慈愛事親兼此二塗惟在至極今乃移敬接下豈復在三之義儉曰資敬奉君必同至極移敬逮下不慢而已太子曰敬名雖同深淺既異而文無差别彌復增疑儉曰繁文不可備設畧言深淺已見傳云不㤀恭敬民之主也書云奉先思孝接下思恭此又經典明文互相起發太子問金紫光祿大夫張緒緒曰愚謂恭敬是立身之本尊卑所以竝同太子曰敬雖立身之本要非接下之稱尚書云惠鮮鰥寡何不言恭敬鰥寡邪緒曰今别言之居然有恭恵之殊緫開記首所以共同斯稱竟陵王子良曰禮者敬而已矣自上及下愚謂非嫌太子曰本不謂有嫌正欲使言與事符輕重有别耳臨川王映曰先舉必敬以明大禮尊卑事數備列後章亦當不以緫畧而礙太子又以此義問諸學生謝幾卿等竝以筆對太子問王儉曰周易乾卦本施天位而説卦云帝出乎震本非天義宰相王儉曰乾徤震動天以運動為德故言帝出震太子曰天以運動為徳君自體天居位震雷為象豈體天所出儉曰主器者莫若長子故受之以震萬物出乎震故亦帝所與焉儉又諮太子曰孝經仲尼居曾子侍夫孝理宏深大賢方盡其致何故不授顔子而寄曾參太子曰曾參雖德慙體二而色養盡禮去物尚近接引非隔𢎞宣䂓教義在於此儉曰接引非隔𢎞宣雖易去聖轉逺其事彌輕既云人能𢎞道将恐人輕道廢太子曰理既有在不容以人廢言而況中賢人才𢎞上聖之教寧有壅塞之嫌臨川王映諮曰孝為德本當時所疑德施萬善孝繇天性自然之理豈因積習太子曰不因積習而至所以可為德本映曰率繇斯至不俟明德大孝榮親衆德光備以此而言豈得為本太子曰孝有淺深德有小大因其分而謂之本何所稱疑太子以長年臨學亦前代未有者也梁髙祖天監八年九月昭明太子於壽安殿講孝經盡通大義時徐勉為太子中庻子侍東宫太子尚㓜嘗於殿中講孝經臨川静惠王尚書令沈約備二傅勉與國子祭酒張元為執經王瑩張稷柳愷王暕為侍講簡文帝初為太子時張譏為士林舘學士太子出士林舘發孝經題譏論議徃復甚見嗟賞自是每有講集必遣使召譏又戚衮為太學博士在東宫召衮講論又嘗置宴集𤣥儒之士先命道學互相質難次令中庻子徐摛馳騁大義間以劇談摛辭義縱横難以答抗諸人懾氣皆失次序衮時講聘義摛與徃復衮精采自若對荅如流太子深加歎賞又以朱异博通儒學大同六年皇太子又召异於𤣥圃講易陳廢帝初為太子時沈文阿為通直散騎嘗侍兼國子博士領羽林監仍令於東宫講孝經論語後主為皇太子時王元䂓為鄱陽王府記室参軍領國子助教太子引為東宫學士親授禮記大傳喪服等義賞賜優厚國子祭酒新安王伯固入東宫適㑹元䂓將講乃啓請執經時論以為榮廢太子裔後主長子至德三年躬出太學講孝經北齊廢帝初為皇太子天保九年文宣在晉陽太子監國集諸儒講孝經唐髙宗顯慶四年十月丙子皇太子𢎞初入東宫請觀講及讀書詔許敬宗及學士史𤣥道上官儀郭瑜李善等為都講令侍講講孝經親臨釋奠禮畢羣臣上夀頒賜有差龍朔二年五月乙亥詔太子端尹左右中護少尹崇賢舘學士每日詣處化門聽進止皇太子若須討論經史則引入講諷時太子受春秋左氏傳於司徒大夫郭瑜至楚子商臣事大驚曰此事臣子所不忍聞經籍聖人垂訓何故書此瑜對曰孔子修春秋義存褒貶故善惡必書褒善以示法貶惡以示後故使商臣之惡顯於千載太子曰非唯口不可道故亦耳不忍聞請改讀餘書瑜再拜賀曰理名勝母曾子不入邑號朝歌墨子回車殿下誠孝𡨕資睿情天發㐫悖之迹黜於視聽循奉德音實深慶躍臣聞安上理人莫大於禮非禮無以事天地之神非禮無以辨君臣之位故先王重焉孔子曰不學禮無以立請停春秋而讀禮記太子從之𤣥宗初為皇太子太極元年太子親釋奠於國學命國子司業禇旡量開孝經及禮記題太子問疑義數條旡量皆依古典以對微加䂓諷太子悦賜物百段并紫袍金帶學官及陪位官學生等賜物有差册府元龜卷二百六十
