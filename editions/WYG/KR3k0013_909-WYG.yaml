body:
  text: 册府元龜卷九百九宋王欽若等撰總錄部窮愁憂懼窮愁子夏有言曰死生有命富貴在天屈原亦云人窮則反本故勞苦倦極未嘗不呼天也葢士之坎窞流離幽憂困辱終乎天運亦曷能免焉中古而下乃有躬聖哲之姿挾霸王之術属世道之交䘮致才命之乖舛棲遑道路廹於凍餒遭罹罪罟濱於死亡或淪䧟於殊鄉或流放於裔壤百齡奄而忽已六合廣而莫容猶復寓情於文翰遺恨於來裔誠以有生之至艱人倫之共恨也至或無德而祿以至疾顛枉道事人自貽伊戚雖攖咎悔非世之所嘆云寗戚齊人家貧無以自資扣牛角而歌曰南山矸白石爛生不遭堯與舜禪短布單衣纔至骭從昏飯牛薄夜半長夜漫漫何時旦越石父齊人也凍餓爲人臣僕三年晏嬰解左驂贖之戈夷違齊如魯天大寒而與門弟子宿於郭外寒愈甚謂弟子曰子與我衣我活我與子衣子活我國士也爲天下惜子不肖人不足愛也子與我衣弟子曰夫不肖人惡能與國士衣哉戈夷解衣與弟子夜半而死弟子遂活漢鄧通官至上大夫免官家居無何人有告通盗出徼外鑄錢徼猶塞也東北謂之塞西南謂之徼下吏騐問頗有遂遂成也成其罪狀也竟案盡没入之通家尚負責數鉅萬積共前後所犯合沒官者數多除其見在財物以外尚負官數鉅萬長公主賜通即舘陶長公主文帝女吏輙隨沒之一簪不得著身於是長公主乃令假衣食公主給其衣食而恐吏没入故託云假借之爾非通自有也此所謂不得名一錢竟不得名一錢寄死人家息夫躬封宜陵侯爲左曹光祿大夫免官就國未有第宅寄居丘亭丘空也姦人以爲侯家富常夜守之躬邑人河内掾賈惠往過躬教以祝盗方以桑東南指枝爲匕桑東南出之枝畫北斗七星其上躬夜自披髪立中庭向北斗持匕招指祝盗或招或指以求福排禍人有上書言躬懷怨恨祝詛上遣侍御史廷尉監建繫雒陽詔獄欲掠問躬仰天大謼因僵仆吏就問云咽已絶血從耳鼻出食頃死初躬侍詔數危言高論自恐遭害著絶命辭後數年乃死如其文後漢馮衍字敬通更始僕射鮑永安集北方以衍爲立漢將軍領狼孟長屯太原光武即位永衍知更始已歿乃罷兵幅巾降河内帝怨衍等不時至永以立功得贖罪遂任用之而衍獨見黜建武六年日食衍上書陳八事帝將召見初衍爲狼孟長以罪摧䧟大姓令狐略是時略爲司空長史讒之於尚書令王䕶尚書周生豐曰衍所以求見者欲毁君也䕶等懼之即共排間衍遂不得入後外戚陰興新陽侯陰就深敬重衍衍遂與交結帝懲西京外戚賓客故皆以法繩之衍繇此得罪嘗自詣獄有詔赦不問西歸故郡閉門自保不敢復與親故通建武末又上疏自陳猶以前過不用衍不得志退而作顯志賦顯宗即位又多短衍以文過其實遂廢於家常慷慨嘆曰衍少事名賢經歴顯位懷金垂紫掲節奉使不求茍得常有凌雲之志三公之貴千金之富不得其願不槩於懷貧而不衰賤而不恨年雖疲曳猶庶幾名賢之風修道德於幽㝠之路以終身名爲後世法居貧年老卒張升陳畱人桓帝世黨錮事起升守外黄令去官歸鄉里道逢友人共班草而言升曰吾聞趙殺鳴犢仲尼臨河而反覆巢竭淵龍鳳逝而不至今宦􅆆日亂䧟害忠良賢人君子其去朝乎夫德之不建人之無援將性命之不免奈何因相抱而泣有老父不知何許人趨而遇之植其杖太息言曰二大夫何泣之悲也夫龍不隱鱗鳳不藏羽網羅高懸去將安所雖泣何及乎二人欲與之語不顧而去莫知所終趙岐京兆人爲郡功曹是時中常侍唐衡兄玹爲京兆虎牙都尉郡人以玹進不繇德皆輕侮之岐又數爲貶議玹深毒恨及玹爲京兆尹岐懼禍及與從子戩逃避玹果收岐家盡殺之岐遂逃難四方江淮海岱靡所不歴自匿姓名賣餅北海市中時安丘孫嵩遊市見岐非常人停車呼與共載岐懼失色嵩曰視子非賣餅者又相問而色動不有重怨即亡命乎我北海孫賔石勢能相濟岐素聞嵩名即以實聞之遂以俱歸藏岐複壁中數年岐作戹屯歌二十三章後諸唐死滅因赦乃出官至太僕范滂汝南征羌人郡署功曹建寜二年大誅黨人詔下急捕滂滂即自詣獄謂其子曰吾欲使汝爲惡則惡不可爲使汝爲善則我不爲惡行路聞之莫不流涕趙壹字元叔恃才倨傲爲鄉里所擯後屢抵罪幾至死友人救得免壹乃貽書謝恩曰昔原大夫贖桑下絶氣傳稱其仁秦越人還虢太子結脈世著其神設曩之二人不遭仁遇神則結絕之氣竭矣然而糒脯出乎車軨鍼石運乎手爪今所賴者非直車軨之糒脯手爪之鍼石也乃收之於斗極還之於司命使乾皮復含血枯骨復被肉允所謂遭仁遇神真所宜傳而著之余畏禁不敢班班顯言竊爲窮鳥賦一篇胡母班王康之妹夫董卓使班奉詔到河内解釋義兵康受袁紹㫖收班繫獄欲殺之以狥軍班與康書云自古以來未有下土諸侯舉兵向京師者劉向傳曰擲鼠忌器器猶忌之况卓今處宫闕之内以天子爲藩屏幼主在宮如何可討僕與太傅馬公太僕趙岐少府陰脩俱受詔命闗東諸郡雖實嫉卓猶以衘奉王命不敢玷辱而足下獨囚僕於獄欲以釁鼓此悖暴無道之甚者也僕與董卓有何親戚義豈同惡而足下張虎狼之口吐長蛇之毒恚卓遷怒何甚酷哉死人之所難然恥爲狂夫所害若亡者有靈當訴足下於皇天夫婚姻者禍福之機今日著矣曩爲一體今爲隙仇亡人子二人則君之甥身没之後慎勿令臨僕屍骸也康得書抱班二子而泣遂死於獄蜀許靖汝南人少與從弟邵俱知名而私情不協邵爲郡功曹排擯靖不得齒叙以馬磨自給吳孟宗爲驃騎朱據軍吏將母在營既不得志又夜雨屋漏因起涕泣以謝母母曰但當自勉之何足泣也晉王尼辟車騎府舍人不就雒陽䧟避亂江夏王澄爲荆州刺史遇之甚厚尼早䘮婦止有一子無居宅唯蓄露車有牛一頭毎行輙使子御之暮則共宿車上常歎曰滄海横流處處不安也俄而澄卒荆土饑荒尼不得食乃殺牛壞車煮肉噉之既盡父子俱餓死劉琨鎮荆州父母爲劉聰所害琨與段匹磾期討冦琨慮及危亡而大恥不雪亦知匹磾夷狄難以義仗冀輸寫至誠僥倖萬一毎見將佐發言慷慨悲其道窮欲率部曲死於賊壘斯謀未果竟爲匹磾所拘自知必死神色怡然也爲五言詩贈其别駕盧諶曰幄中有懸璧本自荆山球惟彼太公望昔是渭濱􅅱鄧生何感激千里來相求白登幸曲逆鴻門賴畱侯重耳憑五賢小白相射鈎能隆二霸主安問黨與讐中夜撫枕歎相與數子遊吾衰乆矣夫何其不夢周誰云聖逹節知命故無憂宣尼悲獲麟西狩涕孔丘功業未及建夕陽忽西流時哉不我與去矣如雲浮朱實隕勁風繁英落素秋狹路傾華葢駭駟摧雙輈何意百鍊剛化爲繞指柔琨詩託意非常攄暢幽憤逺想張陳感鴻門白登之事用以激諶諶素無奇畧以常詞酬和殊乖琨心㑹王敦密使匹磾殺琨琨聞敦使至謂其子曰處仲使來而不我告處仲敦字是殺我也死生有命但恨仇恥不雪無以下見二親爾因􅒣欷不能自勝殷浩爲中軍將軍以軍亂廢爲庶人徙于東陽之信安縣浩雖被出放口無怨言夷神委命談詠不輟雖家人不見其有流放之戚但終日書空作咄咄怪事四字而已浩甥韓伯浩素賞愛之隨至徙所經歳還都浩送至渚側詠曹顔逺詩云富貴他人合貧賤親戚離因而泣下殷仲文爲桓𤣥侍中轉尚書𤣥敗歸晉抗表解職不許因月朔與衆至大司馬府中府中有老槐樹顧之良乆而歎曰此樹婆娑無復生意仲文素有名望自謂必當朝政又有謝混之徒疇昔所輕者竝皆比肩常怏怏不得志忽遷爲東陽太守意彌不平東陽爲何無忌所統仲文許當便道脩謁無忌故益欽遲之令府中命文人撰義搆文以俟其至仲文失志恍惚遂不過府無忌疑其薄已大怒思中傷之時慕容超南侵無忌言於劉裕曰桓𤣥殷仲文乃腹心之疾北虜不足爲憂義熙三年又以仲文與駱球等謀反及其弟叔文竝伏誅宋劉湛爲丹陽尹散騎常侍時委心於彭城王義康湛所生母亡時文帝與義康形迹既乖釁難將結湛亦知無復全地及至丁艱謂所親曰今年必敗常日正頼口舌爭之故得推遷耳今既窮毒無復此望禍至其能乆乎湛被收入獄見弟素曰乃復及汝耶相勸爲惡惡不可爲相勸爲善正見今日如何毛修之爲冠軍將軍安西司馬軍敗爲後魏所獲後朱修之亦䧟魏毛經年不忍問家消息乆之乃訪焉朱具答曰賢子元矯甚能自處爲時人所稱毛悲不得言直視良乆乃長歎曰嗚呼自此一不復及梁王僧儒爲南康王長史被讒免官友人盧江何烱猶爲王府記室乃致書於烱以見其意曰近别之後將隔暄寒思子爲勞未能忘弭昔季􅅱入秦梁生適越猶懷悵恨且或吟謡况岐路之日將離嚴網辭無可憐罪有不惻葢畫地刻木昔人所惡叢棘既累於何可聞所以握手戀戀離别珍重弟愛同鄒季滛滛承睫吾猶復抗手分背羞學婦人素鍾肇節金飈戒序起居無恙動静履宜子雲筆札元瑜書記信用既然可樂爲甚且使目明能祛首疾甚善甚善吾無昔人之才而有其病癲眩屢動消渇頻増變化任期故不復呼醫飲藥但恨一旦離大辱蹈明科去皎皎而非自汚抱鬰結而無誰告丁年蓄積與此銷亡徒竊高價厚名横承公器人爵智能無所報筋力未之酬所以悲至撫膺泣盡而繼之以血顧惟不肖文質無所底取葢困於衣食廹於饑寒依隱易農所志不過鍾庾乆爲尺板斗食之吏以從皂衣黒綬之役非有奇才絕學雄畧高謨吐一言可以正俗振民動一義可以固邦興國全璧歸趙飛矢救燕偃息藩魏甘卧安郢腦日逐髓月支擁十萬而横行提五千而深入將能執珪裂壤功勒景鍾錦繡爲衣朱丹被轂斯大丈夫之志非吾曹之所能及也直以章句小才䖝篆末藝含吐緗縹之上跰跣樽俎之側委曲同之鍼鏤繁碎譬之米鹽孰致顯榮何能至致加性疎澁拙於進取未嘗去來許史遨遊梁竇俛首脅肩先意承㫖是以三葉靡遘不與運并十年未徙孰非能薄及除舊布新清晷方旦抱樂衘圖訟謳有主而猶限一吏於岑石隔千里於泉亭不得奉扳中㳙預衣裳之㑹提戈後勁厠龍豹之謀及其投劾歸來恩均舊􅈻升文石登玉陛一見而降顔色再覩而接話言非藉左右之容無勞羣公之助又非同席共硯之夙逄笥餌巵酒之早識一旦陪武帳仰文陛備􅅨佚之柱下充嚴朱之席上入班九棘出專千里據操撮之雄官叅人倫之顯職雖古之爵人不次取士無名未有躡景追風奔驟之若此者葢基薄墻高途遥力躓傾蹶必然顛匐可俟竟以福過災生人指鬼瞰將均宥器有騐傾巵是以不能早從曲影遂乃取疑邪徑故司𨽻懍懔思得應弦譬懸厨之獸如離􅗤之鳥將充庖鼎以餌鷹鸇雖事異鑚皮文非刺骨猶復因兹舌杪成此筆端上可以投畀北方次可以論輸左校變為丹赭充彼舂薪幸聖主畱善貸之德紆好生之施解網祝禽下車泣罪愍兹恚詬憐其觳觫加肉朽胔布葉枯株輟薪止火得不銷爛所謂還魂斗極追氣泰山止復除名為民幅巾家巷此五十年之後人君之賜焉木石感陰陽犬馬識厚薄員首方足孰不戴天而竊自有悲者葢士無賢不肖在朝見嫉女無美惡入宫見妬家貧無苞苴可以事朋類惡其鄉原恥彼戚施何以從人何以狥物外無奔走之友内乏強近之親是以媾布之徒隨相媒孽及一朝捐棄以快怨者之心吁可悲矣葢先貴後賤古富今貧季倫所以發此哀音雍門所以和其悲曲又廹以嚴秋殺氣具物多悲長夜展轉百憂俱至况復霜銷草色風搖樹影寒蟲夕叫合輕重而同悲秋葉晚傷雜黄紫而俱墜蜘蛛結幕燿熠争飛故無車轍馬聲何聞鳴鷄吠犬俛眉事妻子舉手謝賓遊方與飛走為鄰永用蓬蒿自没愾其長息忽不覺生之為重素無一􅌀之田而有數口之累豈曰匏𤓰不食方當長為傭保糊口寄身溘死溝渠以實螻蟻悲夫豈復得與二三士友抱影接膝履足摩肩摛綺縠之清文談希㣲之道徳唯吳馮之遇夏馥范彧之值孔嵩愍其畱賃憐此行乞爾儻不以垢累時存寸札則雖先犬馬猶松喬焉去矣何生髙樹芳裂裁書代面筆淚俱下後魏韓顯宗為鎮南廣陽王嘉諮議恭軍以自矜伐訴前征勲詔免顯宗既失意遇信向雒乃為五言詩贈御史中尉李彪曰賈生謫長沙董儒詣臨江愧無若人跡忽尋兩賢踪追昔渠閣遊䇿駑厠羣龍如何情愿奪飄然獨逺從痛哭去舊國衘淚届新邦哀哉無援民嗷然失侣鴻彼蒼不我聞千里告志同李諧爲金紫光祿大夫元顥入雒以爲給事黄門侍郎顥敗除名乃為述身賦一千五百餘言末云願自託於魚鳥求得性於飛沉庶保此以獲没不再罪於當今李洪之為秦益二州刺史以贓罪賜死及臨自盡沐浴換衣防卒扶持將出却入遍遶家庭如是再三泣嘆良乆乃卧而引藥曹外北海人以學識清立見知出帝時為國子祭酒不營家産至以餒卒於鄴時人傷歎之隋劉炫河間人為太學博士嵗餘以品卑去任歸於河間於時盗賊蜂起穀食踊貴經籍道息教授不行炫與妻子相去百里聲聞斷絶欎􅊊不得志乃自為贊曰通人司馬相如揚子雲馬季長鄭康成等皆自敘風徽傳芳來葉余豈敢仰均先逹貽笑後昆徒以日廹桑榆大命將近故友飄零門徒雨散溘死朝露埋魂朔野親故莫炤其心後人不見其迹殆及餘喘薄言胸臆貽及行邁傳示州里使夫將來俊哲知余鄙志爾余從綰髪以來迄於白首嬰孩為慈親所恕捶撻未嘗加從學為明師所矜檟楚弗之及暨乎敦叙邦族交結等夷重物輕身先人後己昔在幼弱樂叅長者爰及耆艾數接後生學則服而不厭誨則勞而不倦幽情寡適心事多違内省生平顧循終始其大幸有四其深恨有一性本愚蔽家業貧窶為父兄所饒厠搢紳之末遂得博覽典誥窺渉今古小善著於丘園虛名聞於邦國其幸一也隠顯人間沉浮世俗數忝徒勞之職乆執城旦之書名不挂於白簡事不染於丹筆立身立行慙恧實多啓手啓足庶幾可免其幸二也以此庸虛屢動宸眷以此卑賤毎升天府齊鑣驥騄比翼鵷鴻整緗素於鳳池記言動於麟閣叅謁宰輔造請羣公厚禮殊恩増榮改價其幸三也晝漏方盡大耋已嗟退反初服歸骸故里翫文史以怡神閱魚鳥以散慮觀省野物登臨園沼緩歩代車無罪為貴其幸四也仰休明之盛世慨道教之陵遲蹈先儒之逸軌傷羣言之蕪穢馳騖墳典釐改僻謬脩撰始畢事業適成天違人願時不我與世路未夷學校盡廢道不備於當時業不傳於身後衘恨泉壤定在兹乎其深恨一也時在郡城糧餉斷絶其門人多隨盗賊哀炫窮乏詣郡城下索炫郡官乃出炫與之炫為賊所將過城下堡未幾賊為官軍所敗炫饑餓無所依復投縣城長吏意炫與賊相知恐為後變遂閉門不納時夜冰寒因此凍餒而死唐盧炤隣為鄧王府典籖炤隣始去新都也寓于京城鄱陽公主之廢府時詔徵太白山隱士孫思邈亦居此府思邈時年九十餘而視聽不衰炤隣自傷年纔强仕而沈疾困憊乃作病梨樹賦以傷稟氣之不同詞甚麗美韋安石為尚書左僕射同中書門下三品後罷知政事出為蒲州刺史属太常卿姜皎有所請託安石拒之皎大怒後轉青州刺史皎弟晦為御史中丞以安石等作相時同受中宗遺制宗楚客韋温陰削相王輔政之詞安石不能正其事令侍御史舉劾之詔貶沔州别駕晦又奏安石常檢校定陵造作隱官物入已勑符下州徵贓安石歎曰此祗應須我死爾憤激而卒韋陟為東京畱守早有台輔之望間被李林甫楊國忠所擠及中原起兵天下事殷陟常自謂負經緯之器遭後生騰謗明主見疑常鬱鬱不得志乃歎曰吾道窮於此乎有志不伸得非天命乎因遘疾而終陸䞇為中書侍郎平章事罷相貶忠州别駕十餘年常閉戸不出人無識其面者後唐崔貽孫為吏部侍郎貶官塞北馳驛至潞州致書於帥府孔勍曰十五年穀城山裏自謂逸人二千里沙塞途中今為逐客勍以其年過八十奏畱府下明年量移澤州司馬憂懼夫憂懼之來發於心術而形於外者也乃有乗艱虞之㑹履崇高之位謀人之國䇿慮之匪臧遭事之變進退之無措蹈危機於夙暮覿咎徵之明白乃至遭離誣謗播身非所逼畏權倖見忌當途危言高論而爲世不容時移事改而投迹㒺寄繇是隱憂充積恐懼交至愁歎兼倍惴慄靡遑乃至志消而神竭中乾而疢作愆和遘沴傷性隕軀者亦比比有之矣仲尼曰内省不疚夫何憂何懼自非體道無悶安之若命又孰能恬漠而不蔕芥哉冶厪衛大夫初衛侯出奔楚晉人復衛侯衛侯使賂周歂冶厪曰茍能納我吾使爾為卿恐元咺距已故賂周冶周冶殺元咺及子適子儀公入祀先君周冶既服將命服御服將入朝受命周歂先入及門遇疾而死冶厪辭卿范睢魏人秦昭王拜為相封以應號為應侯而與武安君白起有隙言而殺之任鄭安平使將擊趙鄭安平為所困急以兵二萬人䧏趙應侯席藁請罪秦之法任人而所任不善者各以其罪罪之於是應侯罪當收三族秦昭王恐傷應侯之意乃下令國中有敢言鄭安平事者以其罪罪之而加賜相國應侯食物日益厚以順適其意後三嵗王稽為河東守與諸侯通坐法誅而應侯日益以不懌昭王臨朝歎息應侯進曰臣聞主憂臣辱主辱臣死今大王中朝而憂臣敢請其罪昭王曰吾聞楚之鐵劍利而倡優拙夫鐵劍利則士勇倡優拙則思慮逺夫以逺思慮而御勇士吾恐楚之圖秦也夫物不素具不可以應卒今武安君既死而鄭安平等畔内無良將而外多敵國吾是以憂欲以激厲應侯應侯懼不知所出李斯為秦丞相長男繇為三川守諸男皆尚秦公主女悉嫁秦諸公子繇告歸咸陽斯置酒於家百官長皆前為壽門延車騎以千數李斯喟然而歎曰嗟乎吾聞之荀卿曰物禁太甚夫斯乃上蔡布衣閭巷之黔首上不知其駑下遂擢至此當今人臣之位無居臣上者可謂富貴極矣物極則衰吾未知所税駕也漢谷永字子雲長安人為光祿大夫出為安定太守時成帝諸舅平阿侯王譚年次當繼大將軍王鳳輔政尤與永善鳳病困薦從弟御史大夫音自代帝從之以音為大司馬車騎將軍領尚書事而譚位特進領城門兵永聞之與譚書宜辭職保謙讓之路譚遂辭讓不受領城門職繇是譚音相與不平永逺為郡吏恐為音所危病滿三月免楊雄為郎給事黄門王莽時以耆老乆次轉為大夫時劉歆子棻甄豐子尋獻符命莽誅豐父子投棻四裔辭所連及便收不請不須奏請時雄校書天禄閣上治獄使者來欲收雄雄恐不能自免乃從閣上自投下幾死莽聞之曰雄素不與事何故在此間請問其故使人密問之廼劉棻嘗從雄學作奇字古文之異者雄不知情不知獻符命之事也有詔勿問然京師為之語曰惟寂寞自投閣爰清净作符命以雄解嘲言譏之也後漢馮衍字敬通京兆杜陵人也初與衛尉陰興新陽侯陰就交結繇是為諸王所䀻請尋為司𨽻從事光武懲西京外戚賓客故皆以法䋲之大者抵死徙其餘至貶黜衍繇此得罪常自詣獄有詔赦不問時衍又與就書曰奏曹掾馮衍叩頭死罪衍材素愚駑行義汙穢外無鄉里之譽内無汗馬之勞偎䝉明府天覆之德華寵重疊間者掾史疑衍之罪衆煦飄山當為灰土頼蒙明察揆其素行復保首領倍加厚德篤於慈父寢滛肌膚滲漉骨髓德重山岳澤深河海前送妻子還淄縣遭雨逢暑以七月還至陽武聞詔捕諸王賓客惶怖詣闕冀先事自歸十一日到十二日書報歸田里即日束手詣雒陽詔獄十五日夜詔書勿問得出遭雨又疾大困冀高世之德施以田子老馬之惠贈以秦穆駿馬之恩使長有依歸以効忠心於是西歸故鄉閉門自保不敢復與親故通張奐燉煌人也為太常䧟罪禁錮歸田里奐前為度遼將軍與段紀明爭擊羌不相平及紀明為司𨽻校尉欲逐奐歸燉煌將害之奐憂懼奏記謝紀明曰小人不明得過州將千里委命以情相歸足下仁篤炤其辛苦使人未反復獲郵書恩詔分明前以寫白而州期切促郡縣惶懼屏營延企側待歸命父母朽骨孤魂相託若蒙矜憐壹惠咳唾則澤流黄泉施及㝠寞非奐生死所能報塞夫無毫髪之勞而欲求人丘山之用此淳于髠所以拍髀仰天而笑者也誠知言必見譏然猶未能無望何者朽骨無益於人而文王葬之死馬無所復用而燕昭寶之儻同文昭之德豈不大哉凡人之情寃則呼天窮則叩心今呼天不聞叩心無益誠自傷痛俱生聖世獨為匪人孤㣲之人無所告訴如不哀憐便為魚肉企心東望無所復言紀明雖剛猛省書哀之卒不忍也魏夏侯𤣥曹爽姑子也爽誅𤣥為大鴻臚徙太常太傅司馬宣王薨許允謂𤣥曰無復憂矣𤣥歎曰士宗許允字也卿何不見事乎此人猶能以通家年少遇我子元子上不吾容也子元司馬宣王子晉景帝也子上景帝弟文帝也司馬望為散騎常侍時景文相繼輔政未嘗朝覲權歸晉室望雖見寵待毎不自安繇是求出為征西將軍持節都督雍凉二州諸軍事吳聶友為丹陽太守友與諸葛恪善恪誅後孫峻忌友欲以為欝林太守友發病憂死晉衞瓘武帝時為司空子宣尚公主太尉楊駿與黄門等毁之諷帝奪宣公主瓘慙懼告老遜位樂廣為尚書令成都王頴廣之婿也及與長沙王乂遘難而廣既處朝望羣小讒謗之乂以問廣廣神色不變徐答曰廣豈以五男易一女乂猶以為疑廣竟以憂卒李重字茂曽江夏鍾武人永康初為趙王倫相國左司馬及倫僭逆重以憂逼成疾而卒王坦之字文廣簡文帝末為左衛將軍帝詔大司馬桓温依周公居攝故事坦之自持詔入於帝前毁之後温於新亭大陳兵衛將移晉室呼謝安及坦之欲於坐害之坦之甚懼問計於安安曰晉祚存亡在此一行既見温坦之流汗沾衣倒執手板宋諸葛長民為豫州刺史自以多行無禮常憂國憲時高祖西討劉毅以長民監畱府事疑其難獨任畱劉穆之輔之長民果有異謀而猶豫不能發屏人謂穆之曰悠悠之言謂太尉於我不平何以至此穆之曰公泝流逺伐以老母弱子委節下若一毫不盡豈容若此長毫意乃小安穆之亦厚為之備謂所親曰貧賤常思富貴富貴必踐機危今日思為丹徒布衣不可得也傅亮字季友北地靈州人也景平中為尚書令領䕶軍將軍時少帝失德内懷憂懼作感物賦以寄意焉後廢少帝立文帝初奉迎大駕道路賦詩三首其一篇有悔懼之辭顔邵剛正有局力為謝晦所知晦為領軍以為司馬廢立之際與之叅謀晦鎮江陵請為諮議參軍領録事軍府之務悉委焉邵慮晦將有禍出求竟陵太守未及之郡值晦見討晦與邵謀起兵拒朝廷邵飲藥死南齊劉撝字茂謙彭城武原人為安南諮議叅軍有愛伎陳玉珠明帝遣求不與逼奪之撝頗怨望帝令有司誣奏撝罪付廷尉將殺之撝入獄數宿鬚鬢皆白陳顯逹為江州刺史明帝世心懷不安在江州遇疾不治尋而自差意甚不説謝超宗陳郡陽夏人為竟陵王征北諮議叅軍有罪下廷尉一宿髪白皓首魏凖㑹稽人為太學生以才學為王融所賞融既欲奉竟陵王子良而凖鼓成其事太學生虞羲邱國賓竊相謂曰竟陵才弱王中書無斷敗在眼中矣及融誅召凖入舍人省詰問遂懼而死舉體皆青時人以凖膽破蕭頴胄為荆州刺史時梁高祖初舉義兵巴東太守蕭惠訓子璝巴西太守魯休烈弗從舉兵侵荆州敗輔國將軍任漾之於硤口破大將軍劉孝慶於上明頴胄遣軍拒之而高祖已平江郢圖建康頴胄自以職居上將不能拒制璝等憂愧不樂發疾數日而卒徐榮祖為秘書監常有罪繫獄旦日原之而髪皓白齊武問其故曰臣思􅗅於内髪變於外當時所以稱之梁沈約字休文高祖時為左光祿大夫侍中太子太傅高祖初與張稷有憾及稷卒因言之約曰尚書僕射出則邉州刺史往事何足論帝以為婚家相為大怒曰卿言如此是忠臣耶乃輦歸内殿約懼不覺高祖起猶坐如初及還未至牀而憑空頓於戸下因病常夢齊和帝劍㫁其舌乃呼道士奏赤章於天稱禪代之事不繇已出武帝聞大怒中使譴責者數焉約懼遂卒後魏樂良王萬壽景穆帝之子文成和平三年拜征東大將軍鎮和龍性貪暴徵還道憂死李式字景則其兄敷為中書監皇興四年為獻文所誅式時為兖州刺史式自以家據權要心慮危禍帝勑津吏臺有使者必先啓聞然後渡之既而使人平曉卒至津吏欲先告式使者紿云我須南過不停此則不煩令刺史知也津人信之與使俱渡使者既濟突入執式赴都與兄俱死張湛燉煌人初仕沮渠蒙遜為兵部尚書凉州平入國崔浩識禮之湛至京家貧浩常給其衣食毎嵗贈浩詩頌浩常報答及浩被誅湛懼悉焚之閉門却掃慶弔皆絶以壽終北齊魏蘭根為開府高乾之死蘭根懼去宅避於寺武帝大加譴責蘭根憂怖乃移病解僕射魏收初仕後魏為中書侍郎黄門郎崔㥄從齊神武入朝熏灼於世收初不詣門㥄為孝武登祚赦云朕託體孝文收􅅓其率直正員郎李慎以告之㥄深忿忌時節閔帝殂令收為詔㥄乃宣言收普泰世出入幃幄一日造詔優為詞㫖然則義旗之士盡為逆人又收父老合解官歸侍南臺將加彈劾頼尚書辛雄為言於中尉綦雋乃解收有賤生弟仲同先未齒錄因此怖懼上籍遣還鄉扶侍初神武固讓天柱大將軍魏帝勑收為詔令遂所請欲加相國品秩收以實對帝遂止收既未測主相之意以前事不安求解詔許焉後周侯植為司倉下大夫時晉公䕶誅趙貴而諸宿將等多不自安植從兄龍恩為䕶所親任植因謂龍恩曰兄既受人任使安得知而不言龍恩不能用植承間言於䕶曰公以骨肉之親當社稷之寄願公推誠王室擬迹伊周䕶曰我蒙太祖厚恩且當猶子之親誓將以身報國賢兄應見此心卿今有是言豈謂吾有他志邪又聞其先與龍恩言乃陰忌之植懼不免禍遂以憂卒尉遲運以宣帝在東宫為右宫正帝即位為上柱國運之為宫正也數進諌於帝帝不能納反疎忌之時運又與王軌宇文孝伯等皆為高祖所親待軌屢言帝失於高祖帝謂運豫其事愈更衘之及軌被誅運懼及於禍問計於宇文孝伯尋而得出為秦州總管秦渭等六州刺史然運至州猶懼不免大象元年二月遂以憂薨隋崔宏度字摩訶博陵安平人也高祖時方檢校太府卿其妹為秦王妃弟宏昇女為河南王妃未幾秦王以罪誅河南王妃復被廢黜宏度憂恚謝病於家諸弟乃與之别居彌不得志煬帝即位河南王為太子帝將復立崔妃遣中使就家宣㫖使者詣宏昇家宏度不之知也使者反帝曰宏度有何言使者曰宏度稱有疾不起帝黙然其事竟寢宏度憂憤未幾卒元善河南雒陽人為國子祭酒善常以高熲有宰相之具常言於煬帝帝初然之及熲得罪帝以善之言為熲游説深責望之善憂懼先患消渴於是疾動而卒唐薛萬均貞觀中為右屯衛大將軍太宗幸芙蓉園萬均屏人不盡以之属吏萬均服石乳及憂憤發疾㑹將慮過遂卒東堂邢文偉為内史則天天授初貶州刺史嘗有制使至其州境文偉以為有罪見誅遽自縊而死趙遜德宗建中末為寜州刺史遜李忠臣壻也聞忠臣受朱泚偽宰相憂懼自縊死郭鋼為朔方節度使杜希全判官攝豐州刺史父晞慮其幼不任邊職上請罷之德宗遣中使就召鋼懼以他事見收遂奔吐蕃後唐王瓉仕梁為開封尹莊宗入汴瓉出城迎䧏伏地請死帝曰朕與卿家世密親兵戈阻闊卿即時竭心所事人臣之節也何罪之有乃命復舊職及誅張漢傑朱珪輩瓉大恐憂駭不自安所有家財相繼入貢帝慰諭之終以憂病而卒趙光裔同光中拜平章事先是條制權豪强買人田宅或䧟害籍没顯有屈塞者許人自理内官楊希朗者故觀軍容使復恭從子也援例理復恭舊業事下中書光裔謂郭崇韜曰復恭與南山謀逆顯當國法本朝未經昭雪安得論理崇韜私抑宦者因具奏聞希朗泣訴於帝帝令自見光裔言之希朗訴陳叔祖復光有大功王室伯祖復恭為張濬所搆得罪前朝當時强臣掣肘國命不行及王行瑜伏誅德音昭洗制書尚在相公本朝氏族諳練故事安得謂之未雪耶若言未雪吾伯氏彦博洎諸昆仲監䕶諸鎮何途得進漸至聲色俱厲光裔先恃名德為其所折悒然不樂又以希朗幸臣慮摭他事危已必不自安因病疽卒張全義濮州臨濮人也同光四年為忠武節度使尚書令是時趙在禮據魏州諸軍進討無功元行欽又北征不利全義奏言明宗為兵馬總管威名素著速請渡河招撫鄴都時明宗以為羣小間言莊宗猶豫未决全義力懇進言故曲從之及明宗為亂兵所擁全義先被疾既聞其變憂懼不食薨於雒陽之私第李愚為翰林學士承㫖長興初除太常卿時大臣加恩所為制詞不愜愚尤深憂惴家皇城内國忌日行香即宿于雒水南佛寺以防糾劾于鄴天成中初除工部郎中時盧文紀為工部尚書鄴往公參文紀以鄴名其父諱不之見或謂鄴曰南宫故事郎中入省如本行尚書侍郎不容公參何以有主鄴憂畏太過一夕醉歸雉經于室索自通大原清源人明宗時為西京畱守楊彦温據河中叛逆自通出師討平之時末帝鎮河中臨事失於周旋帝深衘之及帝即位自通為右龍武統軍常憂悸求死清㤗元年七月因朝退渉雒水陽墮而卒晉趙在禮為晉昌節度使契丹入汴自鎮赴之過雒謂朝廷曰戎王嘗言致莊宗遇亂者我也我深以此行為憂或曰戎人好利宜以厚贐餌之何過慮耶時有契丹諸部渤海首領高牟瀚奚王拽刺相遇於途在禮望塵致敬牟瀚拽刺與諸部偏帥咸倨以受之在禮憤以致疾及至鄭州泊於逆旅見一歩健趨而過詢之乃同州劉繼勲之爪牙也問繼勲先至闕戎王作何安置歩健曰已鏁矣在禮大驚及夜以衣帶就馬櫪自絞而死册府元龜卷九百九
