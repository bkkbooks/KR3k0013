body:
  text: 册府元龜卷五百十二宋王欽若等撰憲官部總序古之王者建邦立制設都鄙官府之治分班爵品職之序創刑典以詰暴慢修禮範而别等威百職竝分萬邦承式乃設糾督之任以專察舉之事刺檢兇慝糾正違繆然後内外之政允釐姦宄之萌自塞者矣天官經星太㣲南蕃中二星間曰端門西曰執法御史大夫之象所以舉刺不法者也三五之世官簿散逸靡得而詳焉周監二代之制春官之屬有御史掌邦國都鄙及萬民之治令以贊冡宰幷掌王之贊書非糾舉之任而天官小宰掌建邦之宫刑以治王宫之政令凡宫之糾禁鄭康成為漢御史中丞之職又有柱下史老􅔶嘗為之戰國有執史執法之官御史掌記事執法掌糾彈之任秦趙澠池之㑹各命御史書其事淳于髠謂齊王曰執法在旁御史在後即其事也秦置御史大夫位上卿掌副丞相有兩丞其一御史丞其一御史中丞在殿中蘭臺掌圖籍秘書外督部刺史内領侍御史員十五人受公卿奏事舉劾按章中丞亦謂之中執法又有監御史掌監都漢因秦制叔孫通定儀有御史執法舉不如儀者是也武帝時侍御史有繡衣直指出討奸猾治大獄不常置元狩五年置丞相司直掌佐丞相舉不法征和四年置司𨽻校尉持節從中都官徒千二百人捕巫蠱督大奸猾後罷其兵察三輔三河𢎞農亦皆糾察之職周禮秋官有司𨽻掌五𨽻之法司𨽻謂四翟之𨽻也其名與漢同而所職異元帝初元四年去司𨽻節成帝元延四年省其官綏和元年更名御史大夫為大司空比丞相置長史中丞官職如故故事選郡守相高第為之任職者為丞相哀帝初復置司𨽻無校尉之名屬大司空比司直建平二年復以大司空為御史大夫其任無改元壽二年復為大司空而御史中丞常為憲臺之率謝靈運晉書載漢御史為憲臺又有諸吏為加官後漢遵用西京之制唯諸吏之職無聞焉更始至長安以隗囂為御史大夫光武中元元年東巡太山以張純為御史大夫從封禪又有治書侍御史二人掌選明法律者為之凡天下諸讞疑事掌以法律當其是非蔡質漢儀曰選御史高第者補之胡廣曰孝宣感路温舒言秋季後請讞時帝幸宣室齊居而决事令侍御史二人治書治書御史起於此後因别置與符節郎共平廷尉奏罪當其輕重又有蘭臺令史掌書劾奏建武中復置司𨽻校尉領一州蔡質漢儀曰職在典京師外部諸郡無所不糾封侯外戚三公以下無尊卑入宫開中道稱使者每㑹後到先去是也從事史十二人都官從事主察舉百官犯法者功曹從事主州選署及衆事者别駕從事主校尉行部則奉引録衆事簿曹從事主財糓簿書其有軍事則置兵書從事主兵事及所部京兆尹左馮翊右扶風河南𢎞農河内河東凡七郡郡各從事一人主督促文書察舉非法假佐二十五人主簿録閣下事省文書門亭長主州正門功曹書佐主選用孝經師主監試經月令師主時節祠祀律令師主平法律令簿曹書佐主簿書其餘都官書佐及每郡國各有典郡書佐一人各主一郡文書以郡吏補而侍御史二漢所掌凡五曹一曰令曹掌律令二曰印曹掌刻印三曰供曹掌齊祀四曰馬曹掌廐馬五曰乗曹掌䕶駕獻帝建安十三年罷三公官復置御史大夫以郗慮為之魏文帝黄初二年又以御史大夫為司空自魏以前御史大夫皆三公之職非專主於風憲而中丞常主憲臺彈糾不法今幷叙者盖詳述御史之職稱也改中丞為宫正後皆復舊名侍御史八人又置治書執法掌奏劾治書侍御史但掌律令呉亦有御史大夫孫休永安元年命大將軍孫綝領之後又置左右御史大夫五年以廷尉丁密光禄勲孟宗分為之晉初罷大夫因漢制以中丞為臺主置治書侍御史員四人㤗始四年又置黄沙獄治書侍御史一人掌詔獄及廷尉不當者皆治之秩與中丞同侍御史員九人所掌有十三曹吏曹課第曹直事曹印曹中都督曹外都督曹媒曹符節曹水曹中壘曹營軍曹法曹筭曹又置殿中侍御史四人魏制蘭臺遣二御史居殿中伺察非法即其始也而司𨽻校尉之官歴魏不替屬官有功曹都官曹從事諸曹從事部郡從事主簿録事門下書佐省事記室書佐諸曹書佐守從事武猛從事等員凡吏一百人卒三十二人又有尚書左丞主臺内禁令亦為彈糾之任漢成帝建始四年初置尚書有四丞後漢光武減其二為左右丞歴魏至晉不改又有禁防御史魏晉官品有此亦蘭臺之職後省黄沙治書侍御史太康中又省治書侍御史二員江左省殿中侍御史二人侍御史所掌曹有課第曹置庫曹掌廐牧牛馬市租後分曹置外左庫内左庫又有檢校御史孝武大元中以吳崑為之亦蘭臺之職司𨽻校尉自元帝渡江即罷其官其職即楊州刺史宋因晉制置御史丞一人掌奏劾不法治書侍御史掌舉劾官品第六以上侍御史十人文帝元嘉中省外左庫而内左庫直云左庫孝武大明中復置前廢帝景和元年又省順帝初省營軍幷水曹省算曹幷法曹吏曹不置御史凡十御史焉而殿中侍御史遂廢齊氏因之梁國初建又置大夫天監元年復曰中丞置一人掌督司百僚皇太子以下其在宫門行馬内違法者皆糾彈之雖在行馬外而監司不舉亦得奏之自齊梁皆謂中丞為南司其侍御史員九人復置殿中御史四人掌殿中禁衛内事陳氏因之元魏之盛建號北土置御史中尉乃中丞之職又有治書侍御史殿中侍御史北齊御史臺置中尉一人治書侍御史二人侍御史八人殿中侍御史檢校御史十二録事四人自梁歴後魏至北齊御史臺或謂之為南臺後周六官之建改中丞為司憲中大夫御史臺為司憲屬秋官府置司憲上士二人中士人數闕下士八人隋革周制復置御史臺避諱改中丞為大夫置一人治書侍御史二人侍御史八人殿内侍御史監察御史各十二人録事二人煬帝大業三年置主簿書二人掌印及受事發辰勾檢稽失漢張忠為大夫置孫寳為主簿後無聞焉唐因隋制侍御史殿中侍御史各置四人監察御史置八人貞觀二十二年加殿中監察各二人高宗初避諱改治書侍御史為御史中丞龍朔二年改御史臺為憲臺大夫為大司憲中丞為司憲大夫咸亨元年復舊光宅元年改置左右肅政臺左臺專在京管百司及監軍旅右臺案察京師外文武官僚各置大夫中丞一人侍御史殿中監察各二十人又置肅政臺使六人畧同御史尋廢中宗神龍元年改為左右御史臺睿宗景雲二年廢右臺明皇先天二年復置右臺停諸道按察使其年又置諸道按察使罷右臺初置兩臺每年春秋發使春曰風俗秋曰亷察以察州縣已後奉勅乃巡毎年不出開元之制中丞加一人侍御史置四人主簿一人録事二人令史十七人書令史二十三人亭長六人掌固十二人殿中侍御史置六人令史八人書令史十八人監察御史置十人史三十四人侍御史年深者一人判臺事知公廨雜事等次知西推賍贖三司受事監奏定糾察推理匭殿中侍御史掌殿庭供奉之儀式郊祀巡省檢察彈糾兩京城内分知左右巡監察御史掌分察百寮巡案郡縣糾視刑獄肅整朝儀及監嶺南黔府選補監决囚徒忌齊行香分察尚書六司知大府司農出納監察監議館驛使本司直門領訟而侍御史六職其三司理匭則與給事中中書舍人更直朝堂受表臺中唯四職推彈廨雜而已又有内供奉裏行裏使推官之名貞觀末置監察御史裏行始太宗令馬周作監察御史裏行遂置此名中丞亦舊有裏行一人武后文明元年置殿中裏行以三員為定其殿中第一人監倉第二人監庫聖歴中加中丞内供奉一人尋省長安二年始置侍御史内供奉不得過正員之數先天中復増御史中丞内供奉一人開元二十二年三月以中丞為京畿採訪處置使自是不改乃古司𨽻之任其後知雜御史多以省官兼之監察裏行及試以七員為定開元初又置侍御史裏使殿中裏使等官裏行同無員數尋罷建中三年又置推官二人與本推御史同推覆興元元年罷推官以殿中第一同知東推第二同知西推其後遂有四推之名曰臺一推臺二推殿一推殿二推尚書左右丞掌糾舉憲章御史糾劾不當者兼得彈奏亦憲官之任也東都留司置御史臺中丞侍御史各一人殿中侍御史二人監察御史三人大歴後多以留臺中丞兼東都畿汝觀察處置使元和後但以侍御史殿中侍御史監察御史共主留臺之務而三院御史亦不常備馬五代憲臺之制皆因其舊而員多不備其四推但以御史從士配之晉天福初罷省郎知雜但委年深御史開運二年復以省郎兼之稽夫處風憲之任當繩糾之職乗驄簪豸車服之異等霜簡白筆職業之尤重所以振肅内外提正綱紀故其選任之際必加精擇其有克揚雋望以著乎威稜内藴剛志允歸乎正直典章之廢墜務於修舉臣工之頗僻行於案劾居官有塞職之舉事上顯盡忠之節斯皆無忝厥位休有烈光至乃以殘虐為事唯阿曲是圖希媚以合上之㫖巧誣以致人之罪以至不稱其服彰於外議罔慎所履蒙於朝譴斯固歸於為惡自貽乎伊戚其或善行昭著時應寵賞寮寀參佐形於論拔者亦皆類而次之凡憲部十有五門選任稱職威望選任夫憲官之職大則佐三公統理之業以宣導風化小則正百官紀綱之事以糾察是非故漢魏以還事任尤重至於選用必舉賢才乃有負謇諤之稱彰才識之譽得法平允敷奏詳明端慎克成其官政婞直不畏於權幸繼乃執我公憲助兹朝治使豪戚歛手奸邪屛跡允所謂邦之司直者焉為官擇人於斯為善矣漢蓋寛饒為大中大夫使行風俗多所稱舉貶黜奉使稱意擢為司𨽻校尉諸葛豐為郡文學名特立剛直貢禹為御史大夫除豐為屬舉侍御史元帝擢為司𨽻校尉晉高光字宣茂陳留圉城人魏太尉柔之子也光少習家業明練刑理為潁川太守時武帝置黄沙獄以典詔囚以光歴世明法用為黄沙御史秩與中丞同庾峻為秘書丞長安有大獄久不决拜峻侍御史往斷之朝野稱允侯史光為城門校尉武帝泰始初詔曰光忠亮篤素有居正執義之心歴職内外恪勤在公其以光為御史中丞雖屈其列校之位亦以伸其司直之才也陳壽為長廣太守不就杜預為鎮南入辭口啓陳壽才史通博宜補黄散也武帝曰壽可作治書否預對曰惟在聖詔即手詔用之傅咸為議郎長兼司𨽻校尉咸前後固辭詞㫖懇切惠帝不聴勅使者逼就拜咸復送還印綬公車不通催使攝職李臣為石季龍殿中侍御史時豪戚侵恣賄託公行季龍患之擢臣為御史中丞時親任之自此百寮震懾州郡肅然季龍曰我聞良臣如猛獸高步通衢而豺狼避路信矣哉宋蕭惠開為御史中丞孝武與劉秀之詔曰今以蕭惠開為憲司冀當稱職但一往眼額已自殊有所震大明八年入為侍中詔曰惠開前在憲司奉法直繩不阿權戚朕甚嘉之可更授御史中丞梁張綰為中軍宣城王長史徙御史中丞武帝遣其弟中書舍人絢宣㫖為國之急惟在執憲直繩用人本不限升降晉宋世周閔蔡廓竝以侍中為之卿勿疑是左遷也時宣城王府望重故有此㫖焉後魏温子昇文章清婉孝明熈平初中尉東平王匡愽召辭人以充御史同時射䇿者八百餘人子昇與盧仲宣孫搴等二十四人為髙第大被引决康使子昇當之皆受屈而去搴謂人曰朝來靡旗亂轍者皆子昇逐退遂補御史時年二十臺中彈文皆委焉北齊崔暹為吏部郎文襄用暹為御史中尉宋遊道為尚書左丞謂之曰卿一人處南臺一人處北省當使天下肅然李廣魏末時中尉崔暹選御史皆是世胄廣獨以才學兼御史修國史南臺文奏多其辭也後周李旭為黄門侍郎太祖嘗謂旭曰卿祖昔在中朝為御史中尉卿操尚貞固理應不墜家風但孤以中尉彈劾之官愛憎所在故未即授耳然此職久曠無以易卿乃奏旭為御史中尉唐李素立丁憂高祖令所司奪情授一七品清要官所司擬雍州司録參軍高祖曰此官要而不清又擬秘書郎高祖曰此官清而不要遂擢授侍御史張行成太宗貞觀初累補殿中侍御史糾劾不避權戚帝以為能謂房𤣥齡曰觀古今用人皆因媒介若行成者朕自舉之無先容也王至愔為汴州刺史太極元年睿宗以志愔有政聲名兼御史中丞李栖筠為蘇州刺史大歴六年栖筠自蘇州入覲敷奏詳明不事權貴代宗嘉其忠讜留掌邦憲特出内制授御史大夫以寵之穆贊為刑部郎中因次對德宗嘉其材擢為御史中丞薛存誠為給事中瓊林庫使奏占工役太廣存誠以為比者姦人竄名以避征徭不可許咸陽縣尉袁儋與軍鎮相競軍人無理遂肆侵誣儋反受罰二勅繼至存誠皆執之憲宗聞甚恱命中使嘉慰之由是擢拜御史中丞未幾再授給事中數月中丞闕帝思存誠前効謂宰臣曰持憲無以易存誠遂復為御史中丞丁居晦為翰林學士文宗於麟德殿召對因面授御史中丞翼日制下帝謂宰臣曰丁居晦作中丞何如因悉數大臣而品第之歎曰宋申錫堪任此官惜哉又曰牛僧孺可為大夫宰臣鄭覃曰僧孺頃為中丞未嘗搏撃恐無風望帝曰不然鸞鳯與鷹隼事異帝又曰居晦作得此官朕曽以時諺謂杜甫李白輩為四絶問居晦居晦曰此非君上要知之事常以此記得居晦今所以擢為中丞漢邉蔚天福十二年為御史中丞時高祖幸東京以將整朝倫務求能者至是有斯命焉稱職禮曰其人存則其政舉傳曰守道不如守官故上無虛授必擇於髦俊下無茍得克效於智能然後官事允釐王命無廢者矣乃有居憲簡之任當紀綱之重勤勞于位惕厲在公或獻言以盡規或持法而惟允或申明事典或糾正邪慝藹然風望動於朝倫斯乃任能物官使人以器者之謂也漢薛宣以明習文法成帝初詔補御史中丞是時成帝初即位宣為中丞執法殿中外總部刺史上疏曰陛下至德仁厚哀閔元元躬有日昃之勞而亡佚豫之樂周書無逸之篇稱文王之德曰至于日中昃弗遑暇食宣引此言也昃古側字也佚與逸同允執聖道刑罰惟中允信也中行仲切然而嘉氣尚凝隂陽不和凝謂不通也是臣下未稱而聖化獨有不洽者也臣竊伏思其一端殆吏多苛政政教煩碎大率咎在部刺史或不循守條職刺史所察本有六條今則踰越故事信意舉劾妄為苛刻也六條解在百官公卿表舉錯各以其意多與郡縣事錯置也音干故切與讀曰豫豫干也至開私門聽讒佞以求吏民過失譴呵及細㣲責義不量力言求備於人郡縣相迫促亦内相刻流至衆庶是故鄉黨闕於嘉賔之懽九族忘其親親之恩飲食周急之厚彌哀送往勞來之禮不行勞郎到切來音郎代切夫人道不通則隂陽否鬲否閉也音皮鄙切鬲與隔同和氣不興未必不由此也詩云民之失德乾餱以愆詩小雅伐木之詩也餱食也音侯鄙語曰苛政不親煩苦傷恩方刺史奏事時宜明申勅申束也謂約束也使昭然知本朝之要務臣愚不知治道惟明主察焉帝嘉納之宣數言政事便宜舉奏部刺史郡國二千石所貶退稱進白黑分明稱舉也白黑猶言清濁也繇是知名後漢宣秉為司𨽻校尉務舉大綱簡畧苛細樊凖字幼陵為御史中丞舉正非法鮑昱為司𨽻校尉典司京都執憲持平多所舉正陳謙為御史中丞執憲奉法多所糾正馬嚴為御史中丞舉劾案章申明舊典奉法案舉無所迴避晉庾峻為御史時長安大獄久不决峻斷之朝野稱當劉暾五為司𨽻允恊物情傅𤣥為司𨽻校尉每有奏劾或值日暮捧白簡整簮帶竦踊不寐坐而待旦石鑒為御史中丞多所糾正嗣譙王恬為御史中丞正有幹局宋蔡廓為御史中丞多所糾奏鄭鮮之為御史中丞甚得司直之體荀伯子為御史中丞位職勤恪有匪躬之稱殷冲為御史中丞有司直之稱梁樂藹為御史中丞性公強居憲臺甚稱職褚球為御史中丞性公强在憲司甚稱劉潛為御史中丞在職彈糾无所顧望當時稱之臧盾為御史中丞性公强居憲臺甚稱職陳宗元饒為御史中丞性公平善持法諳曉政事明練治體吏有犯法政不便民及於名教不足者隨事糾正多所禆益禇玠為御史中丞甚有直繩之稱自梁末喪亂朝章廢弛司憲因循守而勿革玠方欲改張大為條例綱維畧舉而編次未訖孔奐為御史中丞善持理多所糾劾後魏高道穆為御史在公有能名王顯為御史中尉糾折庶獄究其奸回北齊司馬子瑞為御史中丞正色舉察為朝廷所許隋梁毗為治書侍御史名為稱職唐唐臨太宗時為侍御史在官簡肅甚為時所稱徐有功為左臺侍御史則天時褒異之時逺近聞有功授職皆欣然相賀齊幹弱冠為監察御史彈劾違犯先於風教當時以為稱職崔隱甫為御史大夫故事大夫與監察皆得專事畧無承稟隱甫一切督責之無大小悉令諮决稍有忤意列上其罪前後貶黜者過半羣寮側息𤣥宗嘗謂曰卿為大夫海内咸云稱職深副朕所委也顔真卿為御史大夫軍國之事知無不言李夷簡為御史中丞奏彈京兆尹楊憑當時翕然謂紀綱復振及遷御史大夫風彩益峻未踰月遷門下侍郎平章事王播為工部郎中知雜事整持臺憲頗有能稱崔植為御史中丞入閣彈事頗振紀綱威望夫案章糾劾督察中外繩愆繆而振綱紀者御史之任也由漢以來頗重其選乃有懷剛毅之節履中正之道厲厥鋒氣申其搏撃不畏强禦無憚權右靡阿貴戚深嫉佞倖以枰彈為任挺謇直之風邦憲以之修明姦邪為之讋畏此詩所謂邦之司直者歟至或洞達治體善舉官業罔事苛細弗為繳察中立而不撓率職而敢行譽望著於朝右威稜振於輦轂布之謡誦隆乎任遇兹豈惟風采之足尚固亦器識之不羣者哉漢嚴延年為侍御史宣帝即位劾奏霍光擅廢立奏雖寢然朝廷肅然敬之鄭賓明法律為御史名公直葢寛饒宣帝為司𨽻校尉刺舉無所迴避小大輙舉所劾奏衆多廷尉處其法半用半不用以其峻劾故有不用者公卿貴戚及郡國吏繇使至長安皆恐懼莫敢犯禁繇讀與傜同供傜役及為使而來者薛宣為中丞執法殿中外總部刺史郡國二千石所貶退稱進白黑分明由是知名陳咸為中丞總領州郡奏事課第諸刺史執法殿中公卿以下皆敬憚之諸葛豐元帝時為司𨽻校尉刺舉無所避京師為之語曰間何闊逢諸葛言間者何久闊不相見以逢諸葛故也上嘉其節加豐秩光禄大夫翟方進為丞相司直旬嵗間舉奏免兩司𨽻旬徧也滿也旬嵗猶言滿嵗也若十月之一周朝廷由是憚之後漢鮑永光武建武十一年徴為司𨽻校尉帝叔父趙王良尊威貴重永以事劾良不敬由是朝廷肅然莫不戒慎乃辟扶風鮑恢為都官從事恢亦抗直不避强禦帝曰貴戚且宜斂手以避二鮑其見憚如此牟融為司𨽻校尉典司京都執憲持平多所舉正百僚莫不敬憚宣秉遷司𨽻校尉務舉大綱簡畧苛細百僚敬之説文曰苛細草也以喻煩雜也陳忠為司𨽻校尉糾正中官外戚賓客近倖憚之不欲忠在内明年出為江夏太守復留拜尚書令桓典為侍御史執正無所迴避常乘驄馬京都畏憚為之語曰行行且止避驄馬御史應奉為司𨽻校尉糾舉姦違不避豪戚以嚴厲為名樊凖為御史中丞舉止正法百僚震悚陳謙字伯讓拜御史丞執憲奉法多所糾正為百僚所敬馬嚴為御史中丞舉劾案章申明舊典奉法案舉無所迴避百寮憚之趙謙為司𨽻校尉車師王侍子為董卓所愛數犯法謙収殺之卓大怒殺都官從事而素敬憚謙故不加罪魏徐邈為司𨽻校尉百寮敬憚之鮑勲為宫正宫正即御史中丞也百寮嚴憚罔不肅然晉何曽魏世為司𨽻校尉時校事尹模憑寵作威曽奏劾之朝廷稱焉時人敬憚之傅𤣥為司𨽻校尉毎有奏劾或值日暮捧白簡整簪帶竦踊不寐坐而待旦於是貴遊懾伏臺閣生風傅咸為司𨽻校尉奏免河南尹何攀等京都肅然貴戚懾伏石鑒為御史中丞多所糾正朝廷憚之顧和為御史中丞百寮憚之劉毅為司𨽻都官從事後為司𨽻校尉糾正豪右京師肅然司部守令望風投印綬者甚衆時人以毅方之諸葛豐盖寛饒周處為御史中丞正繩直筆權豪震肅李𦙍為御史中丞㳟恪直繩百官憚之崔洪為御史治書奏免散騎常侍翟嬰官朝廷憚之尋為尚書左丞時人語曰叢生棘刺來自博陵在南為鷂在北為鷹温嶠為司𨽻都官從事時散騎常侍庾敳有重名而頗聚斂嶠舉奏之京都震肅卞壼為御史中丞忠於奉上權貴屛跡鍾雅為御史丞直法繩違百寮皆憚之嗣譙王恬為御史大夫忠正有幹局在朝憚之宋王淮之初為宋臺御史中丞為寮友所憚孔琳之為御史中丞奏劾尚書令徐羨之自是百寮震肅莫敢犯禁袁顗字景章陳郡人初庾徽之為御史中丞性豪麗服玩甚華顗代之衣冠器用莫不麄率蘭臺令史竝三吳富人咸有輕顗之意顗蓬首綬帶風貌清嚴皆重跡屏氣莫敢欺犯荀伯子為御史中丞莅職勤恪有匪躬之稱立朝正色内外憚之蕭惠開拜御史中丞在任百寮畏憚之蔡廓為御史中丞多所糾奏百寮震肅王鎮之為御史丞秉正不撓百寮憚之南齊袁昻為御史中丞劾奏不憚權豪當時號為正直梁江淹在齊為御史中丞彈中書令謝朏等及諸郡二千石幷大縣官長多被劾治内外肅然明帝謂淹曰宋世以來不復有嚴明中丞君今日可謂近世獨步陸杲為御史中丞性悻直無所顧望臺稱不畏强禦到洽為御史中丞彈糾無所顧望號為勁直張緬為御史中丞彈糾無迴避豪右憚之孔休源為御史中丞正色直繩無所迴避百寮莫不憚之劉潜為御史中丞彈糾無所顧望當時稱之陳孔奐為御史中丞奐性剛直善持理多所糾劾朝廷甚敬憚袁憲為御史中丞朝野皆嚴憚焉褚玠為御史中丞甚有直繩之稱後魏李彪遷御史中尉彪性剛直多所彈糾遠近畏之豪右屛氣元仲景性嚴峭莊帝時兼御史中尉京師肅然毎向臺常駕赤牛時人號赤牛中尉陽固為治書侍御史使懷荒鎮鎮將方貳望風逃走王顯為御史中尉多所彈劾百寮肅然北齊趙郡王深初仕魏為御史中尉正色糾彈無所迴避遠近肅然竇泰為御史中尉泰以勲戚居臺雖無多糾舉百寮畏懼崔暹為御史中丞文襄欲假暹威勢諸公在坐令暹髙視徐步兩人掣裾而入文襄分庭對揖暹不讓席而坐觴再行便辭退文襄曰下官薄有蔬食願公少留暹曰適受勅在臺以檢校遂不待食而去文襄降陛送之旬月後文襄與諸公出之東山遇暹在道前驅為赤棒所撃文襄回馬避之暹後彈尚書令司馬子如及尚書元羨殷州刺史慕容獻又彈太師咸陽王坦并州刺史可朱渾道元罪狀極筆竝免官其餘死黜者甚衆神武書與鄴下諸貴曰崔暹昔事家弟為定州長史佐吾兒開府諮議及遷左丞吏部郎吾未知其能也始居憲臺乃爾糾劾咸陽王司馬令竝是吾對門布衣之舊尊貴親昵無過二人同時獲罪吾不能救諸君其慎之又文襄嘗謂暹曰我尚畏羨何况餘人由是威名日盛内外莫不畏服隋柳彧為治書侍御史當朝正色甚為百寮之所敬憚陸知命為治書侍御史侃然正色為百寮所憚後又奏劾齊王暕百寮震慄皇甫誕字元慮少剛毅有器局開皇中累遷治書侍御史朝臣無不肅憚焉唐王志愔中宗神龍中累除左臺御史執法剛正百寮畏憚時人呼為皁鵰言其顧瞻人吏如鵰鶚之視雀也李栖筠為御史大夫正身守道無所顧憚朝綱益振百度肅然名重於時竇參為御史中丞不避權貴理獄以嚴稱李夷簡為御史中丞彈奏京兆尹楊憑當時翕然謂紀綱復振李絳為御史大夫威望時振魏謩為御史中丞彈駙馬都尉杜中立贓罪貴戚憚之孔緯為御史中丞器志方雅嫉惡如讐既總憲剛中外不繩而自肅册府元龜卷五百十二
