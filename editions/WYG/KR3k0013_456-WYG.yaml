body:
  text: 册府元龜卷四百五十六宋王欽若等撰將帥部不和傳曰師克在和不在衆又曰安民和衆盖軍旅之尚和也久矣夫師出以律順成為臧固當輯睦兵戎克濟勲略其有處營衛之任握旗鼓之要受脤偕出援枹並行忘從帥之義恣兼人之勇專逞其欲不相為謀或大呼於私門或盛氣於幕府至有乖異籌畫違沮期㑹反干戈而闘奪鼓吹以徃棄公家事為仇方利以至覆軍奪爵而不悔焉孟子云天時不如地利地利不如人和誠哉是言矣胥甲晉大夫魯文公十二年冬秦伯伐晉取覊馬覊馬晉邑晉人禦之趙盾將中軍荀林父佐之郤缺將上軍臾駢佐之欒盾將下軍胥甲佐之范無恤御戎以從秦師於河曲臾駢曰秦不能久請深壘固軍以待之從之秦人欲戰秦伯謂士㑹曰若何而戰晋士㑹七年奔秦對曰趙氏新出其屬曰臾駢必實為此謀將以老我師也臾駢趙盾屬大夫新出佐上軍趙有側室曰穿晉君之壻也側氏支子穿趙夙庻孫有寵而弱不在軍事弱年少也又未嘗渉知軍事好勇而狂且惡臾駢之佐上軍也若使輕者肆焉其可肆暫徃而退也十二月戊午秦軍掩晉上軍趙穿追之不及上軍不動趙穿獨追之反怒曰褁糧坐甲固敵是求敵至不擊將何俟焉軍吏曰將有待也待可擊穿曰我不知謀將獨出乃以其屬出宣子曰秦獲穿也獲一卿矣秦以勝歸我何以報乃皆出戰交綏司馬兵法曰逐奔不逺從綏不及逐奔不逺則難誘從綏不及則難䧟然則古名退軍為綏秦晉志未能堅戰短兵未致争而兩退故曰交綏秦行人夜戒晉師曰兩軍之士皆未憖也明日請相見也憗缺也臾駢曰使者目動而言肆懼我也目動則心不安言肆則聲常失節也將遁矣薄諸河必敗之薄廹也胥甲趙穿當軍門呼曰死傷未收而棄之不恵也不待期而薄人於險無勇也乃止晉師止秦師夜遁復侵晋入瑕荀林父晉大夫魯宣公十二年六月晉師救鄭荀林父將中軍代郤缺先縠佐之彘季代林父士㑹將上軍河曲之役郤缺將上軍宣公年代趙盾為政将中軍士㑹代将上軍郤克佐之郤缺之子代臾駢趙朔將下軍代欒盾欒書佐之欒盾之子代趙朔趙括趙嬰齊為中軍大夫括嬰齊皆盾異母弟鞏朔韓穿為上軍大夫荀首趙同為下軍大夫荀首林父弟趙同嬰齊弟韓厥為司馬韓萬𤣥孫及河聞鄭既及楚平桓子欲還曰無及於鄭而勦民焉用之桓子林父勦勞也楚歸而動不後動兵伐鄭隨武子曰善武子士㑹㑹聞用師觀釁而動釁罪也徳刑政事典禮不易不可敵也不為是征言征伐為有罪不為有禮楚君討鄭怒其貳而哀其卑叛而伐之服而舍之徳刑成矣伐叛刑也柔服徳也二者立矣昔嵗入陳討徵舒今兹入鄭民不罷勞君無怨讟讟謗也政有經矣經常也荆尸而舉荆楚也尸陳也楚荘王始更為此陳法遂以為名商農工賈不敗其業而卒乘輯睦步卒車乗事不奸矣奸犯也蒍敖為宰擇楚國之令典宰令尹蔿敖孫叔敖軍行右轅左追蓐在軍之右者挟轅為戰備在左者追求草蓐為宿偹傳曰令尹南轅又曰改乘轅楚陳以轅為主前茅慮無慮無如今軍行前有斥侯蹋伏皆持以絳及白為幡見騎歩賊舉絳白幡備慮有無也茅明也或曰時楚以茅為旌識中權後勁中軍制謀後以精兵為殿百官象物而動軍政不戒而備物猶類也戒勅令能用典矣其君之舉也内姓選於親外姓選於舊言親踈並用舉不失徳賞不失勞老有加恵賜老則不計勞旅有施舍旅客來者施之以恵舍不勞役君子小人物有服章尊卑别也貴有常尊賤有等威威儀有等差禮不逆矣徳立刑行政成事時典從禮順若之何敵之見可而進知難而退軍之善政也兼弱攻昧武之善經也昧皆亂經法也子姑整軍而經武乎姑且也猶有弱而昧者何必楚彘子曰不可彘子先穀晉所以霸師武臣力也今失諸侯不可謂力有敵而不從不可謂武繇我失覇不如死且成師以出聞敵彊而退非夫也非丈夫命為軍帥而卒以非夫惟羣子能我弗為也以中軍佐濟佐彘子所帥也濟渡河知荘子曰此師殆哉莊子荀首周易有之在師坎下坤上之臨兑下坤上師初六變為臨曰師出以律否臧凶此師卦初六爻解律法否不也執事順成為臧逆為否今彘子逆命不順成故應不臧之凶衆散為弱坎為衆今變為兑兑柔弱川壅為澤坎為川今變為兊兊為澤是川見壅有律以如己也如従法行則人従法法敗則法従人坎為法象今為衆則散為川則壅是失法之用從人之義故曰律否臧且律竭也竭敗也坎變為兑是法敗盈而以竭夭且不整所以凶也水遇夭塞不得整流則竭涸也不行之謂臨水變為澤乃成臨卦澤不行之物有帥而不從臨孰甚焉此之謂矣譬彘子之達命亦不可行果遇必敗遇敵彘子尸之主此禍雖免而歸必有大咎明年晋人殺先縠韓獻子謂桓子獻子韓厥曰彘子以偏師陷子罪大矣子為元帥師不用命誰之罪也失屬亡師為罪已重不如進也今鄭屬楚故曰失屬彘子以偏師陷故曰亡師事之不㨗惡有所分㨗成也與其專罪六人同之不猶愈乎三軍皆敗則六卿同罪不得獨責元帥師遂濟荀偃晉大夫將中軍士匄佐之趙武將上軍韓起佐之欒黶將上軍魏絳佐之魯襄公十四年夏諸侯之大夫從晉侯伐秦晉侯待於境使六卿帥諸侯之師以進至于棫林棫林秦地不獲成焉秦不服荀偃令曰鷄鳴而駕塞井夷竈示不反唯余馬首是瞻言進退從已欒黶曰晉國之命未是有也余馬首欲東乃歸黶惡偃自專故棄之歸下軍從之左史謂魏莊子曰不待中行伯乎中行伯荀偃也莊子魏絳也左史晉大夫莊子曰夫子命從帥夫子謂荀偃欒伯吾帥也吾將従之從帥所以待夫子也伯㳺曰吾今實過悔之何及多遺秦禽軍師不和恐多為秦所禽獲乃命大還晉人謂之遷延之役吳子山吳王子魯定公四年吳伐楚楚敗吳入郢以班處宫以尊卑班次處楚之宫室子山處令尹之宫夫槩王欲攻之懼而去之夫槩王入之入令尹宫也言吳無禮所以不能遂克荀瑶晉大夫魯悼公四年帥師圍鄭悼公哀公之子寧也哀公出孫魯人立悼公未至鄭駟𢎞曰知伯愎而好勝知伯荀瑤也早下之則可行也行去聲乃先􅍖南里以待之保守也南里在城外知伯入南里門于桔柣之門知伯謂趙孟入之對曰主在此主謂知伯也言主在此何不自入知伯曰惡而無勇何以為子惡貌醜也簡子廢嫡子伯魯而立㐮子故夫知伯言其醜且無勇何故立以為子對曰以能忍恥庻無害趙宗乎知伯不悛趙㐮子繇是惎知伯惎毒也遂䘮之漢荀彘為左將軍楊僕為樓船將軍擊朝鮮左將軍破浿水上軍乃前至城下圍其西北樓船亦徃㑹居城南其王右渠遂堅城守數月未能下左將軍素侍中幸幸親於天子將燕代卒悍乗勝軍多驕樓船將齊卒入海已多敗亡其先與右渠戰困辱亡卒卒皆恐將士慙其圍右渠嘗持和節左將軍急擊之朝鮮大臣廼隂間使人私約降樓船與樓船為要約而請降徃來言尚未肯决左將軍數與樓船期約戰樓船欲就其約不㑹左將軍亦使人求間隙降下朝鮮不肯心附樓船以故兩將不相得左將軍心意樓船前有失軍罪意疑也今與朝鮮和善而又不降疑其有反計未敢發天子曰將率不能前乃使衛山諭降右渠不能顓决與左將軍相誤卒沮約顓與専同卒終也沮瓌也今兩將圍城又乖異以故久不决使故濟南太守公孫遂往正之有便宜得以從事遂至左將軍曰朝鮮當下久矣不下者樓船數期不㑹具以素所意告遂曰今如此不取恐為大害非獨樓船又且與朝鮮共滅吾軍遂亦以為然而以節召樓船將軍入左將軍軍訃事即令左將軍戯下執縳樓船將軍戯讀與麾同并其軍以報朝鮮平左将軍徴至坐争功相嫉乖計棄市樓船將軍亦坐兵至列口當待左將軍列口縣名也度海先得之擅先縱失亡多當誅贖為庶人後漢耿䕫為雲中太守行度遼將軍䕫勇而有氣數侵陵匈奴中郎將鄭戬元初元年坐徵下獄以減死論笞一百魏桓範為征虜將軍東中郎將都督青徐州軍事與徐州刺史鄒岐争屋引節欲斬岐為岐所奏不直坐免蜀劉封為先主養子為副將軍先主定益州劉璋遣扶風將軍孟逹與法正各將兵二千迎先主先主因令逹并領兵衆進攻上庸先主隂恐逹難獨任乃遣封自漢中乘沔水下統逹軍封與逹忿争不和封尋奪逹鼔吹逹既懼罪又忿恚封遂發表辭先主率所領降魏劉琰為車騎將軍領兵千餘隨丞相亮後主建興十年與前軍帥魏延不和言語虚誕亮責譲之遣歸成都魏延為前軍帥征西大將軍延既善養士卒勇猛過人又性矜髙當時皆避下之惟楊儀不假借延延以為至忿有如水火建興十二年亮出北谷口延為前鋒去亮營十里秋亮病因宻與長史楊儀司馬費禕䕶軍姜維等作身歿之後退軍節度令延斷後姜維次之若延或不從命軍便自發亮適卒秘不發䘮儀令禕徃揣延意指延曰丞相雖亡吾自見在府親官屬便可將䘮還𦵏吾自當率諸軍擊賊云何以一人死廢天下之事耶且魏延何人當為楊儀所部勒作斷後將乎因與禕共作行留部分令禕手書與已連名告下諸將禕紿延曰當為君還觧楊長史長史文吏稀更軍事必不違命也禕出門馳馬而去延尋悔追之已不及矣延遣人覘儀等遂使欲案亮成規諸營相次引軍還延大怒纔儀未發率所領徑先南歸所過燒絶閣道延儀各相表叛逆一日之中羽檄交至後主以問侍中董允留府長史蔣琬琬允咸􅍖儀疑延儀等槎山通道晝夜兼行亦繼延後延先至據南谷口遣兵逆擊儀儀等令何平在前禦延平叱延先登曰公亡身尚未寒汝輩何敢乃爾延士衆知曲在延莫為用命軍皆散延獨與其子數人逃亡奔漢中儀遣馬岱追斬之致首於儀儀起自踏之曰庸奴復能作惡不遂夷延三族吳潘濬初仕蜀先主為荆州治中典留州事與關羽不睦吳大帝襲羽遂入吳周瑜為將軍性度恢廓大率為得人惟與程普不睦江表傳曰普自以年長數陵侮瑜瑜折莭容下終不與校普後自敬服而親重之乃告人曰與周公瑾交若飲醇醪不覺自醉時人以其謙讓服人孫皎堅弟静子也為征虜將軍嘗以小故與甘寧忿争或以諌寧寧曰臣子一例征虜雖公子何可專行侮人耶吾值明主但當輸効力命以報所天誠不能隨俗屈曲矣權聞之以書讓皎曰自吾與北方為敵中間十年初時相持年少今者且三十矣孔子言三十而立非但謂五經也授卿以精兵委卿以大任都䕶諸將於千里之外欲使如楚任昭奚恤揚威於北境非徒相使逞私志而已近聞卿與甘興覇飲因酒發作侵陵其人求屬吕䝉督中此人雖麄豪有不如人意時然其較畧大丈夫也吾親之者非私之也吾親愛之卿踈憎之卿所為每與吾違其可久乎夫居敬而行簡可以臨民愛人多容可以得衆二者尚不能知安可董督在逺禦㓂濟難乎卿行長大特受重任上有逺方瞻望之觀下有部曲朝夕從事何可恣意有盛怒邪人誰無過貴其能改宜追前愆深自咎責今故煩諸葛子瑜重宣吾意臨書摧愴心悲淚下皎得書上䟽陳謝遂與寧結厚南齊曹虎為平北將軍聚兵襄陽建武四年魏軍攻沔北虎與南陽太守房伯玉不協不急赴救乃移頓樊城陳王質仕梁為寧逺將軍吳州刺史領鄱陽内史荆州陷侯瑱鎮于湓城與質不協遣偏將羊毫代質且以兵臨之質率所部渡信安嶺依于留異時文帝鎮㑹稽以兵助質令鎮信安縣後魏崔亮為鎮南將軍攻梁將趙祖悦於硤石時李平為鎮軍大將軍兼尚書右僕射為行臺節度諸軍一以禀之以軍法從事平部分諸軍將水陸兼進以討堰城亮違平節度以疾請還隨表而發平表曰臣以梁將湛僧田道龍㳺魂境内猶未收迹義之神念尚住梁城令都督崔亮權據下蔡别將瓮生即徃東岸與亮接勢以防橋道臣發引向堰舍人曹道至奉敕更有處分而亮已輙還京案亮受付東南推轂是託誠應憂國忘家致命為限而始届汝隂盤桓不進曁到㓂所停淹八旬所營土山攻道並不克就損費糧力坐延嵗序頼天威逺被士卒憤激東北騰上乗至北門而亮遲廻仍不肯上臣逼以白刅甫乃登陟及平硤石宜聽處分方更肆其專恣輕輙還歸此而不紏法將焉寄案律臨軍征討而故留不赴者死又云軍還先歸者流軍罷無還尚有流坐况亮被符令停委棄而反失乘勝之機闕水陸之㑹縁情據理咎深故留今處亮死上議靈太后令曰亮為臣不忠去留自擅既損威稜違我經畧雖有小㨗豈免大咎但吾攝御萬㡬庻茲惡殺可特聽以功補過及平至亮與争功於禁中形於聲色爾朱兆為都督十州諸軍事世襲并州刺史齊神武之克雍州也兆與其族仲逺度律約共討之仲逺度律次於陽平兆出井陘屯於廣阿衆號十萬神武廣縱反間或云世隆兄弟謀欲害兆復言與歡同圖仲逺等於是兩不相信各致猜疑徘徊不進仲逺等頻使斛斯椿賀㧞勝徃諭之兆輕騎三百來就仲逺同坐幕下兆性麤獷意色不平手舞馬鞭長嘯凝望深疑仲逺等有變遂趨出馳還仲逺遣椿勝等追而暁譬兆遂拘縳將還經日放遣仲逺等於是奔退神武乃進撃兆兆軍大敗兆與仲逺度律遂相疑阻度律大懼引軍還兆將斬勝數之曰爾殺可孤罪一也天柱薨後復不與世隆俱來罪二也我欲殺爾久矣今復何言勝曰可孤作逆為國巨患勝父子誅之其功不小反以為罪天下未聞天柱被戮以君誅臣勝寧負王不負朝廷今日之事生死在王但知賊宻邇内搆嫌隙自古迄今未有不破亡者勝不憚死恐王失策兆乃捨之後與爾朱兆陳於韓陵度律惡兆之驍悍懼其凌己勒兵不進勝以其携貳遂率麾下降於神武北齊李希光為安南將軍南兖州刺史文宣責陳武廢蕭明命儀同蕭軌率希光東方光裴英起王敬寳歩騎數萬伐之以天􅍖七年三月渡江襲克石頭城五將名位相侔英起以侍中為軍司蕭軌與希光並為都督軍中抗禮不相服御競説謀略動必乖張頓軍丹陽城下值霖雨五十餘日及戰兵器並不堪施用故致敗亡將帥俱死士卒得還者十二三所沒噐械軍資不可勝紀王琳初自梁歸齊乃鎮夀陽琳在鎮與行臺尚書盧潜不協更相是非被詔還鄴齊武成置而不問除滄州刺史後周趙剛為利州總管時剛以信州濵江負阻表請討之詔剛經畧仍加渠州刺史剛師出踰年士卒疲弊尋復亡叛後遂以無功而還又與所部儀同尹才失和被徴赴闕遇疾卒於路隋李藝大業中屢以軍功官至武賁郎將煬帝征遼令藝督運於北平受武衛大將軍李景莭度藝少習戎旅軍法嚴肅然使氣縱暴每凌侮景頻為景所辱藝甚衘之唐淮陽王道𤣥髙祖時為雒州總管劉黒闥引突厥寇河圯令道𤣥率史萬寳以擊之萬寳與之不協及道𤣥出戰萬寳擁兵不進謂所親曰我奉手詔淮陽小兒雖有軍事進止終委老夫何得輕脱妄戰大軍若動必陷泥濘此敗之道也莫若結陣以王陷之雖不利於王而利於國淮陽若敗賊必争進我堅陣而待之破賊必矣須臾䕶軍桞濬戰死道𤣥復陷於陣軍遂敗萬寳將戰士卒莫有鬬志於是大潰道𤣥尋遇害時年十九薛萬徹為青丘道將軍伐髙麗在軍中與副將裴行方不協太宗貞觀二十三年有人上書告萬徹為怨望之詞於是廷辨曲直萬徹辭屈乃除名流於蒙州蘇定方為右屯衛將軍高宗顯慶初從程知節討阿史那賀魯與其别部䑕尼施戰于鴈娑川大破賊衆追奔二十里斬首千餘級獲馬二千匹死馬及所棄甲仗綿亘山野不可勝計副總管王文度害其功謂知節曰雖云破賊官軍亦有死傷盖未決成敗法耳何急而為此事自今正可結為方陣輜重盡納腹中四靣布隊人馬被甲賊來即戰自保萬全無為輕脫致有傷損文度又矯稱别奉㫖以知節恃勇輕敵使文度為節制遂收軍不許深入終日跨馬被甲結陣繇是馬多痩死士卒疲勞無有鬬志定方謂知節曰本來討賊今乃自守馬餓兵疲逢賊即敗怯懦如此何繇立功又公為大将閫外之事而許自節制别遣軍副専其號令理必不然須囚縶文度飛表奏之知節不從至恒篤有胡開門乞降文度又曰比我兵廻此還作賊不如盡殺取其資財定方曰如此自作賊耳何成伐叛文度又不從乃分財惟定方一無所取師還知節文度皆被劾除名乃擢定方為軍行大總管以征賀魯扵是率兵金山之北先擊䖏木昆部落大破之薛仁貴為邏逤道行軍大總管其副將郭待封嘗為鄯城鎮守與仁貴齊列及仁貴為大總管恥在其下每事多建議違之軍至大非川將進赴烏海仁貴謂待封曰烏海險逺車行艱澁若引輜重將失事機又破賊即廻又煩轉運彼多瘴癘無宜久留大非川嶺上寛平足堪置柵可留二萬人作兩栅輜重並留栅内吾等輕鋭倍道掩其未整即撲滅之矣仁貴遂率衆先行至河遇賊撃破之斬獲甚衆收其牛羊萬餘頭進至烏海城以俟後援待封不從仁貴之䇿領輜重繼進未至烏海吐蕃二十餘萬悉衆救其前軍迎擊待封敗走趨出軍糧及輜重並為賊所掠仁貴遂退屯大非川吐蕃又益四十餘萬來拒戰官軍又大敗死傷畧盡仁貴待封及阿吏那道真並脱身走免李光弼為朔方行營既平懐州朝㫖欲速收東都城光弼屢抗表請候時而動不可輕進僕固懐恩貳於光弼乃潜上言曰賊可討詔遂從懐恩言逼光弼進軍列陣于北邙山下賊悉發精鋭來拒官軍不利詔以本非光弼謀乃徵懐恩入拜工部尚書留在京師又徵光弼入拜河南副元帥都統河南淮西山南東道等節度使移鎮汴州李抱真為澤潞節度使馬燧領河陽三城抱真常欲殺懐州刺史楊鈢鈢奔燧納之且奏其無罪抱眞不勝其忿後用觧邢州圍所獲軍糧燧全有之而後給與抱真抱真益怒洹水之㨗諸軍進至魏州田恱領騎兵突犯燧營李芄疾出援之抱真自固不為動燧將攻悦城假攻具於抱真又請雜兩軍之伍冀分其功抱真皆不諾而請獨當一面繇此隙甚不復相見諸軍以是頗逗撓徳宗數使中人和解之韓𢎞為宣武節度統諸軍討淮西時賊軍當徑攻烏重裔之壘重裔禦之中數槍馳請救於忠武軍節度李光顔光顔以小溵橋賊之􅍖也乗其無偹使其大將田頴宋朝隠襲而取之遂平其城壍繇是不克救重裔韓𢎞以光顔違令取頴及朝隠將戮之頴及朝隠勇而多材軍中皆惋惜之光顔畏𢎞不敢留㑹中使景忠信至知其情乃矯詔令所在械繋之走馬入見具以本末聞憲宗赦忠信矯詔罪即徃釋頴及朝隠𢎞及光顔迭以表論憲宗謂𢎞使曰頴等違都統令當處死但光顔以其襲賊有功亦可宥之軍有三令五申宜捨此以收來效及以詔諭𢎞不恱劉沔為太原節度使討回鶻初沔以精兵六千留鎮横水栅以備殘虜自迎太和公主還宫後太原功最為先幽州張仲武亦降滅回鶻赤心宰相王子將軍等數萬人繼受詔追襲烏介可汗恃其兵與沔不足朝廷知之曽遣御史中丞李囘因和解仲武終不平之帝方委仲武北收殘虜乃移沔滑州以李石為太原節度以代之梁謝彦章為許州節度使末帝貞明四年冬滑州節度使賀瓌為北靣招討使彦章為排陣使同領大軍與晉人對壘是時咸謂瓌能將歩軍彦章能領騎士既名聲相軋故瓌衷心忌之一日與瓌同設仗於郊外瓌指一方地謂彦章曰此地岡阜隆起中央坦夷好列栅之所尋而晉人舍之故瓌疑彦章與晉人通又瓌欲速戰彦章欲持重以老敵人瓌益疑之㑹為行營馬歩都虞候朱珪所誣瓌遂與珪協謀因享士伏甲以殺彦章及濮州刺史孟審澄别將侯温裕等於軍以謀叛聞晉王聞之喜曰彼將帥如是亡無日矣審澄温裕亦善將騎軍然所領不過三千騎多而益辦惟彦章有焉劉鄩軍於莘縣末帝遣使問鄩决勝之策鄩曰臣無竒術但人給糧十斛盡則破敵末帝大怒譲鄩曰將軍蓄米將療饑耶将破敵耶乃遣中使督戰鄩集諸校而謀曰主上深居宫禁未曉兵家與白面兒謀之終敗人事大將出征君命有所不受臨機制變安可預謀今揣敵人未可輕動諸君更籌之時諸將皆欲戰鄩黙然他日復召諸校列坐軍門人具河水一器因命飲之衆未測其㫖或飲或辭鄩曰一噐而難若是滔滔河流可勝既乎衆皆失色居數日鄩率萬餘人薄鎮定之營時鄩軍淹至上下騰亂殺獲甚多少頃晉軍繼至乃退二年三月鄩自莘引軍襲魏州與晉王戰於故元城王師敗績鄩脱身南奔自黎陽濟河至滑州尋授滑州節度使詔屯黎陽後唐康延孝初名李紹琛為保儀軍節度使莊宗同光三年討蜀為先鋒排陣使平蜀之功延孝居最時邠州節度使董璋為行營右廂馬歩使葉州節度使毛璋為行營左廂馬歩使以軍禮當事延孝郭崇韜私愛董璋及西川平定之後崇韜每有軍機必召璋叅决延孝不平之時延孝軍於城西毛璋軍於城東董璋軍於城中延孝因酒酣謂董璋曰吾有平蜀之功公等樸遫相從反首䑕於侍中之門謀相傾陷吾為都將公乃禆校力能斬公璋惶恐謝之而退酒罷璋訴于崇韜崇韜因衘之乃署董璋為東川節度使落軍職延孝怒謂毛璋曰吾冒白刄犯險阻平定兩川董璋何功遽有其地二人因謁見崇韜曰東川重地宜擇良帥工部任尚書有文武才幹甚洽衆心請表為東川帥崇韜怒曰紹琛反耶敢違吾節度延孝等惶恐而退未㡬崇韜為繼岌所害二人因責董璋曰公復䑕首何門璋俛首祈哀而已朱洪實為兵馬軍都指揮使閔帝應順元年三月判六軍諸衛事唐義誠將議出征帝幸左藏庫親給軍士錢帛是日義誠與洪實同於庫中靣論用兵利害洪實言自出軍討逆累發兵師今聞小衂無一人一騎來者不如禁軍據門自固彼安敢徑來然後徐圖進取全策也義誠怒曰若如此言洪實反矣洪實曰公自惟誰反其聲漸厲帝聞召而詳之洪實猶理前謀又曰義誠言臣圖反據發兵計義誠反必矣帝不能辨遂命誅洪實周慕容彦超漢初為澶州節度使杜重威叛於鄴下以鄆州節度使髙行周為招討使彦超為副及兵至城下二帥不協杜重威之子婦即行周之息女也行周用兵持重彦超舉措輕易彦超欲速於攻城行周以為未可彦超乃揚言稱行周以愛女之故惜賊而不攻行周忿之漢祖聞其事懼有他變以是親征及車駕至鄴彦超數因事凌廹行周行周不勝其憾嘗一日至行營幕次雨泣告於執政聲氣甚厲聞於至尊又自掬糞茹于口中分雪其事宰相蘇逄吉樞宻使楊邠宻奏於漢祖漢祖深知彦超之曲遣二臣和解行周亦召彦超於帳中責之兼令首過於行周行周稍解王峻為内客省使永興趙思綰亂峻為郭從義兵馬都監從義與峻不協甚如水火符彦卿天雄軍節度使顯徳元年從世宗親征河東命彦卿赴忻州時契丹駐忻北㳺騎每及近郊其月二十三日彦卿與諸將勒兵列陣以待之先鋒將史彦超以二千騎遇賊於前彦超勇憤俱發左右馳擊解而復合者數四當其鋒者無不顛仆李筠張永徳以偏師自後撃之軍退史彦超死之不獲其屍前鋒為敵隔絶我軍重傷者數百人蕃戎死者亦衆是行諸將論議各有矛盾故不能成大功張永徳顯徳中為殿前都指揮使守下蔡與淮南招討使李重進素不協每宴將吏各暴其短一日永徳乗醉乃大言重進潜蓄姦謀當時將校無不驚駭册府元龜卷四百五十六
