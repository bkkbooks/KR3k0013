body:
  text: 冊府元龜卷六百十三宋王欽若等撰刑法部定律令第五唐文宗太和元年六月勅文武常叅官承前朝叅不到臺司皆據品秩書罰其中班位雖同俸入懸隔一例書罰事未得中宜自今已後檢㸃不到據所請料錢每貫罰二十五文其疾病為衆所知者不在罰限餘任准臺司徃例處分三年六月壬申中書門下奏元和四年閏三月四日勅應有鈆錫錢並合納官如有人糾得一錢賞百錢當時勅條貴在峻切今詳事實必不可行則有入告一百貫錫錢須賞一萬貫銅錢執此而行是無畔際今請令以鈆錫錢交易者一貫以下州府行常杖決脊杖二十十貫以下決六十徒三年過十貫已上集衆決殺其受鈆錫交易者亦准此其鈆錫錢並納官其能糾告者一貫賞五千不滿貫者准此計賞累至三百千仍且取當處官錢給付其所犯人罪不至死者徴納家資充填賞錢可之七年九月乙夘御史臺奏准太和四年十月二十五日勅大理寺決㫁刑獄大事二十日中事十五日小事十日奏畢刑部詳覆大事十五日中事十日小事八日奏畢近日省寺詳㫁有踰勅限七十餘日者抑由條奏之間未盡事理舞文之吏得以遷延徃徃決㫁未下瘐死獄中臣請自今已後刑獄本曹詳覽奏狀有節目未具者大事七日内小事五日内條流事由只行一牒再勘本推官三日内具事由牒報省寺如情狀要節已具省寺不得以小小節目移牒徃來四逺州府牒勘本推後事有不具結罪不得者請具事由奏聞不得更逾勅限又准貞觀三年七月十七日勅允推狀内錢物大段事狀已具小小節目末盡不妨詳㫁者省寺更不要移牒盤勘又准名例律二罪俱發以重者論臣深詳勅文律意惟懼刑獄淹延使無辜者拘繫囹圄罪惡者潛啟倖門臣請勅下後御史臺嚴加察訪如或踵前廢格知彈御史臺不舉又省寺可㫁不㫁不具可結㫁事情聞奏使結㫁不得須便牒本處致其稽遲並請臨時量大小論罪按罰可之七月大理寺奏准今年五月二十九日御史臺奏勅大事限二十日中事限十五日小事限十日奏畢刑部覆大事限十五日中事十日小事八日奏畢詳臺司所奏即大理刑部兩司俱炤詳具獄未經刑部覆一則失聖朝慎恤刑獄意二則未合以生事上黷聖聰伏請依舊程限大理寺㫁了申刑部覆同訖方奏可之餘准今年五月二十九日勅處分十二月刑部奏先奉勅詳定前大理丞謝登新編格後勅六十卷者臣等據謝登所進詳諸理例叅以格式或事非久要恩出一時或前後差舛或書寫錯誤並已下落及改正訖去繁舉要列司分門都為五十卷狀請宣下施行可之八年二月中書門下奏准貞元二十一年六月六日勅訴事人不得越州縣臺府便經中書門下陳狀者近日狡猾論競皆不待州府推勘便來詣闕非惟煩黷天聽實亦頗啟倖門請自今已後有此類先科越訴罪然後推勘又准開元十二年八月二十四日勅比來小有訴競即自刑割自今已後犯者先決四十然後依法勘當伏以先自毁傷律令所禁近日此類稍多不至甚傷徒驚物聽請連勅牓白獸門如進狀人􅋇耳者准前勅處分又鞫讞已具便合就行刑皆近嵗時覬望恩澤或緣一人稱寃即十數人停决囚繫淹久奸吏用情自今後同罪人並伏雖一兩人解寃不相連者並先科决稱寃者依前収禁聞奏從之四月詔應犯輕罪人除情狀巨蠧法所難原者其他過誤罪􅄽及尋常公事遣犯不得鞭背遵太宗之故事也開成四年九月中書門下奏兩省詳定刑法格一十卷勅令施行武宗以開成五年正月即位十月勅配流囚人行李所在州縣申報到發時刻月日頗甚違遲今再條流其逓過流囚准律日行五十里所在州縣各具月日時刻相承申報自今更或停滯囚徒有淹申發其本判官罰五十直縣令罰三十直本典決脊杖五十㑹昌元年正月詔曰朝廷典刑理當畫一官吏贓坐不宜有殊内外文武官犯入已贓絹三十疋盡處極法惟鹽鐵度支户部等司官吏破使物數雖多只遣填納盜使之罪一切不論所以天下官錢悉為應在姦吏贓汚多則轉安此弊最深切要杜塞自今以後度支鹽鐵户部等司官吏及行綱脚家等如隱使官錢計贓至三十疋並處極法除估納家産外並不使徴納其取受贓亦准此一條從鹽鐵使栁公綽所奏也九月庫部郎中知制誥紇干泉等奏刑部犯贓官五品以上合抵死刑准獄官令賜死於家者伏請永為定式從之四年七月京兆府奏擒盜賊并鬬行鬬毆人等被奸惡所由與府縣人吏同情欺罔因緣卜射求取恣為不顧典刑隱藏愆犯臣見今推鞫須立條科應府縣所由輙因事取錢及恐嚇平人遣重囚典引坊市人户推問得實贓至十貫已上者從今後伏請集衆決殺十貫以下者即量情科斷如捕賊所由捉搦賊贓至五十貫請賞三十貫如贓至一百貫以上取本贓一半以上充賞庶賞罰必行奸欺止息從之十一月勅准中書門下奏應合處極刑囚等郊禮日近望有鴻恩每引决之時皆稱寃屈及至推鞫依前伏罪容此延引恐開倖門今日已後前件因經兩度稱寃重推問無異同者更不在聞奏從之五年正月據律已去任者公罪流以下勿論公罪之條情有輕重茍渉欺詐豈得勿論向後公罪情狀難恕并不在勿論之限宣宗大中元年二月詔持杖行劫必欲害人茍遇支敵即行殺戮拒敵追捕肆意姦兇不懲此流無以除惡并故殺人者雖已傷未傷已死更生欺冒老小以取財物意欲殺傷偶得免者並以殺人法處分不在赦原之限仍編如格令二年二月刑部請起今後縣令有贓犯録事叅軍不舉者請減縣令二等結罪録事叅軍有犯贓刺史有贓犯事發觀察使不舉並令所司奏聽勅㫖從之四年正月詔此後有故殺傷偶得免者並同已殺人處分又曰攘竊之興起于不足近日刑罰頗峻盜賊益繁贓至一千便處極法輕人性命重彼貨財既多殺傷且乖教化況非舊制須議改更其㑹昌元年二月二十六日勅宜委所司重詳定條流聞奏三月刑部奏監臨主守應將官物私自貸使并借貸人及以己物中納官司者并專知别當主掌所由如有犯贓並同犯入已贓不在原赦之限從之五月御史臺奏准今年正月一日節文據㑹昌元年二月二十六日勑盜贓至一貫文處死宜委所司重詳定條目聞奏者臣檢勘並請准建中三年三月二十四日勑每有盜賊贓滿三疋以上決殺如贓數不充量事科放從之五年四月刑部侍郎劉琢等奏勅修大中刑法縂要格後勅六十卷起貞觀二年六月二十日至大中五年四月十三日凡二百二十四年雜勅都計六百四十六門三千一百六十五條七年五月左衛率倉曹叅軍張戣進大中刑法統類六十二卷勅刑部詳定奏行之梁太祖開平三年十一月詔太常卿李燕御史憲蕭頃中書舍人張衮户部侍郎崔沂大理卿王鄯刑部郎中崔誥共删定律令格式四年十二月宰臣薛貽矩奏太常卿李燕等重刋定律令三十卷式二十卷格一十卷律并目録一十三卷律疏三十卷凡五部十一帙共一百三卷中書舍人李仁儉詣閣門奉進伏請目為大梁新定格式律令仍頒天下施行從之是時大理卿李保撰刑律總要十二卷後唐莊宗同光元年十二月御史臺奏當司刑部大理寺本朝法書自朱温僣逆删改事條或重貨財輕入人命或自徇枉過濫加刑罰今見在三司収貯刑書並是偽廷删改者兼偽廷先下諸道追取本朝法書焚毁或經兵火所遺皆無舊本節目只定州勑庫有本朝法書具在請勑定州節度使速寫副本進納庶刑法令式並合本朝舊制從之未㡬定州王都進納唐朝格式律令凡二百八十六卷二年二月刑部尚書盧質奏纂集同光刑律綂類凡一十三卷上之三年六月詔曰刑以秋冬雖關惻隱罪多連累翻慮淹滯若或十人之中止為一夫抵死豈可以輕附重禁錮逾時言念哀矜又難全廢其諸司囚徒罪無輕重委本司據罪詳斷申奏輕者即時疎理重者侯過立春至秋分然後行法如是事繫軍機須行嚴令或謀逆惡或畜姦邪或行劫殺人難于留滯並不在此限明宗天成元年九月御史大夫李琪奏奉八月二十八日勑以大理寺所奏見管四部法書内有開元格一十卷開成格一十一卷故大理卿楊遘所奏行偽梁格并目録一十一卷與開成格微有差舛未審只依楊遘先奏施行為復别頒聖㫖令臣等重加商校刋定奏聞者今未若廢偽梁之新格行本朝之舊章遵而守之違者抵罪至其年十月二十一日御史臺刑部大理寺奏奉九月二十八日勑宜依李琪所奏廢偽梁格施行本朝格式者伏詳勑命未該律式伏以開元朝與開成隔越七帝年代既深法制多異且律重輕格無二等若將兩朝格文允行伏慮重疊差舛況法者天下之大信非一人之法天下人之法也故謂一成不變之制又准格文後勑合破前格若將開元與開成格之行實難檢舉又有太和格五十一卷刑法要録五十卷格式律令事類四十卷大中刑法格後勑六十卷共一百六十一卷久不檢舉伏請定其與奪奉勑宜令御史臺刑部大理寺同詳定一件格施行者今衆集商量開元格多是條流公事開成格關于刑獄今且請使開成格從之二年六月大理少卿王鬰奏准貞觀五年八月二十一日勑極刑雖令即決仍三覆奏在京五覆奏決前三奏次日兩奏惟犯惡逆者一覆奏著於格令又准建中三年十一月十四日勑應決大辟罪在京者宜令行決之司三覆奏決前兩奏決日一奏又謹按㫁獄律諸死罪囚不待覆奏報下而決者流二千里即奏報應決者聽三日乃行刑若限未滿而行刑者徒一年伏以人命至重死不再生近年以來全不覆奏或蒙赦宥已被誅夷伏乞勑下所司應在京有犯極刑者令決前決日各一覆奏聽進止有凶逆犯軍令者亦許臨時一覆奏應諸州府乞别降勑指揮奉勑宜依是時少府少監申屠奏請禁責情狀皆從之長興二年四月大理正劇可乆奏引開成格應盜賊須得本贓然後科決如有推勘因而致死者以故殺罪論臣詳此理未便且云無持贓待捕之賊或偷生隱諱所司又須訊拷死反償命實恐惠姦起今後如因而致死者如無故則請減一等别增患病而死者從辜限正賊減本罪五等中書覆云今後凡關賊徒若推勘因而致死者有故以故殺論無故減一等如拷次因增疾患侯驗分明如無他故雖辜内致死亦以減一等論是月刑部郎中周知微奏臣毎詳覆案文静究贓罪條件或有因緣勘鞫滋蔓告陳雖廣訟論漸異根本其間有物關獻遺事同情異或果實紙筆之徒或絲履茶藥之類逐色目計錢不及三二百聚都數不過四五千為案牘之微贓傷朝廷之大體引律二罪俱發以重者論不累輕以加重請非正論事條外定贓之時並許除落中書覆奏云周知微踐揚華省獻納明廷所貢讜言深符治道蓋慮細微之物便為贓賄之名遂致刑章過行深刻須知撙節務守亷隅或是監臨之司或因公事之際凡關取與便渉阿私物若顯屬貨財並宜為贓罪其餘不是監臨不因公事不在此限應推㫁科條不得有違格律六月勅諸道州府推斷刑獄或慮所司因循仍以赦令前事輒有申治紊亂刑罰宜令盡舉中興以來所降赦書德音釐革恩勅曉示王者應天順人發號施令布絲綸于逺邇示恩信於華夷儻隱而不行則主者有罪須重提舉免致因循宜令御史臺兼三京及諸道州府應受辭狀及推勘詳斷之所須將此令文牓壁各令詳審無致逾違如或公然以赦書德音及恩勅前事輙敢受而違理者應狀案經過處宜當勘責以故違勅令律格科罪兼自此後凡有詳㫁刑獄並須先編坐律令格式條件及新勑釐革次第施行十二月勑國祚中興皇綱再整合頒公事徧委羣臣先勑依錄六典法書分為二百四十卷從朝至夕自夏徂冬御史臺為之等或同切催驅或逓專勘讀校前王之舊制布當代之明規宜有奬酬以勵勤恪御史中丞劉賛近别除官今加階爵宜從别勑處分吕琦姚遐致宜加朝散大夫李凝吉朝議大夫馬義朝朝散大夫仍賜柱國勲于遼李濤並朝散大夫徐禹卿張可復王曉並賜緋魚袋四年五月獲嘉縣令盧嵩拖曳户民致死其盧嵩減死配流今據所司引減死配天德五城流人格文内只言兩京闗内河南河東北淮南山南東西等道州府繫囚並不言荆南湖南江南嶺南浙江東西福建等道亦不言劍南黔南隴右河西等道又云京兆府界内持杖强盜不論有贓無贓及竊盜贓三疋以上并依前後格勑處分此又酷秦中之人資海内之盜既兹有二豈曰大同況天下府州凢竊盜贓滿三疋皆處極法並不以律内十五疋加役流定罪亦不減死配流據所司斷盧嵩以故殺定罪又不該此條今或却將此條旋舉定刑憲以愛惡於人教之上下其手今日已後所司凢有刑獄據罪欵准後勑文案律令格式條法詳斷不得引此減死條格惑人其間或有情非巨蠧繫勑命處分六月大理正張仁瑑奏臣嘗歴外任見州府刑殺罪人雖有骨肉尋時不容収瘞皆令給喪葬行人載于城外殘害屍髪多致邀求實越彛章頗傷仁化准獄官令諸大辟罪並官給酒食聽親故辭訣宣告犯狀日未後乃行刑法云決之經宿所司即為埋瘞若有親故亦任収𦵏又條諸囚死無親戚者官給棺于官地埋瘞置磚銘于壙内立牌於塜上書姓名請依令指揮從之其月勑御史中丞龍敏給事中張鵬中書舍人盧遵刑部侍郎任賛大理卿李延範等詳定大中刑法綂類末帝清泰元年閏五月勑律令格式六典凢闗庶政盡有區分久不舉明遂至隳紊宜令京百司各于其間録出本司事裁成卷軸或粉壁冩在廨署本司官常宜省覽以備顧問自勑下至今累年如聞諸司或以無廨宇處並未書冩施行令御史臺兩差巡司分巡百司取已冩未冩司局以聞如因事未辦處與限五日須抄録依元勅指揮其諸道州縣亦有六曹内合行公事條件抄錄粉壁官吏長宜觀省其律令格式事繁昨已撮成四卷州縣差人抄録以備檢尋今後宜令御史臺每至正初具録前後勅文告示百司及諸州府永為常式六月大理正劇可久上疏臣曾披法律深究臧否州縣令律之中具存條格軍鎮按推之吏未載明文事若不均何以示勸其三京軍巡使諸州府馬歩都虞侯有精於推劾雪活寃濫者請量事超擢如按鞫偏私故入人罪者亦刑之無赦詔曰義存兩造善推鞫者故合奬酬法貴一成務欽守者豈煩更改劇可久所陳章奏備驗忠勤然於取舍之間未盡諮詢之理其軍巡使都虞侯能覆推刑獄雪活人命及推按不平致人負屈者起今後宜以長興四年五月二十三日勅條施行合有奬酬亦等第比附行遣其故入人罪律有本條何煩别定九月大理寺奏所用法書竊盜條建中年贓三疋已上決殺數不充量情決杖先朝以量情法不定命御史中丞龍敏等議贓滿三疋准舊法一疋已上決杖十八一疋已下量罪決杖大理又以量罪之文不定其定奪下寺詔集寺官議議云贓一疋杖􅆃十八不滿一疋杖十五不得財杖臋十五從之是月天雄軍節度使范廷光上言副使王欽祚報管内頻有盜賊剽劫坊市鄉村差兵巡捕嚴加隄防縁此嵗蠶麥不熟㳺惰之民結集為惡或傷殺攘奪及捕獲處㫁又前後法條不一以天成二年勅應山林羣盜害物殘人若捕捉勘結不虛全家處置有偶然劫盜者正身准法知情者同罪又以長興四年勅據天成勅只為界内連結黨惡害物殘人所以誅族此中興之初權行之法若㫁獄只坐此條恐違于律令今後結黨連羣為害者并男十五已上並准元勑處㫁其父母兄弟妻女小兒一切不罪有骨肉中與賊同惡者亦同罪如同謀不行或受贓不受贓則准律科㫁臣當管賊盜屢發蓋見用法太寛只罪一身又不籍没家産又不連累家屬得以恣行兇惡今後捕盜權行重條俾其知懼易為禁止詔曰應劫掠鄉村宜依長興四年勑條處㫁攻劫城鎮宜依天成二年勑處㫁三年四月御史中丞盧損等進清泰元年已前十一年内制勑可乆逺施行者凢三百九十四道編為三十卷其不中選者各令本司分閉不得行用詔付御史臺頒行五月中書門下奏刺史位列公侯縣令為人父母只合倍加乳哺豈合自至瘡痍一昨張宗裔胥吏訟論合當極典法司據律罪止徒流向來此法極嚴纔可存其軀命即一二十年不復還鄉却縁近日赦宥稍頻遷易頗數致其兇物不顧嚴刑臣竊惟立法稍嚴則人不敢犯其見行法律望下所司更加詳酌及下御史臺刑部大理議云舊律枉法贓十五疋絞天寳元年加至二十疋請今後犯枉法贓十五疋准律絞不枉法贓舊律三十疋加役流受所監臨五十疋流二千里今請依綂類不枉法贓過三十疋受所監贓過五十疋從之晋髙祖天福二年三月勅大理寺奏見管綂類一十二卷編勅三卷散勅七十六道宜差侍御史李遐刑部郎中鄭觀與本寺官員同為叅詳今踏逐到靜僧坊便欲删定再候進止者勅李遐改官鄭觀去世更候差遣轉慮稽延宜令大理寺其合改正國號廟諱等文字如是不動格條不礙理義便可集本寺官員檢尋改正如或顯繫重輕須要商議别具奏聞其御史臺刑部所有法書合改正文字者亦宜准此四月勅應在京及諸道監臨主當倉庫官吏等當受納時例破加耗及交替日豈合虧懸自今後如得替交割及非時㸃檢無故妄稱欠少者並准唐長興二年勅條計贓絹五十疋決重杖一頓處死所有錢物家業盡底通納餘外不徴其有自盜及私專用擅借各依格律本條處分三年六月中書門下奏伏覩天福元年十月勅節文唐明宗朝勑受法制仰所在遵行不得更易今諸司每有公事見執清泰元年十月十四日編勅施行稱唐明宗朝勅除編集外盡已封鏁不行臣等商量望差官將編集及封鏁前後勅文並再詳定其經文可行條件别錄聞奏施行從之遂差右諫議大夫薛融秘書監吕琦尚書駕部員外郎知雜事劉皜尚書刑部郎中司結詡大理正張仁瑑同叅詳十二月尚書刑部郎中馬承翰奏伏見都下衢街窄狹人物殷繁其有歩履艱難眼目昬暗老者幼者悉在其間車馬若縱於奔馳生性必見於傷害况律禁無故走馬傷人殺人素有嚴典臣切恐功勲之子軍伍之人向來偶昧於憲章此際忽思於馳騁害人者死是殺二人殺人既多亦傷至化臣以為不若令之在前使民知禁臣乞特降明詔示諭内諸司以下及諸軍巡於街衢坊曲並不得走馬兼乞指揮逐界金吾司所由及軍巡所由常切止約如有故違走馬者不問是何色目人並捉搦申所司請依律科㫁若所由不切止約致走馬害人者逐界分所由與所犯人同罪科㫁其或自内中急傳宣㫖者即請賜銀牌或牙牌令以手持之俾路人及所由辯認易為奔避上行其令而下不敢違非惟得罪者無同抑亦所犯者應少勅曰馬承翰所貢封章俾人知禁雖曾條貫恐未周詳宜依餘准近勅處分仍付所司四年七月右諌議大夫薛馳等上疏詳定編勅三百六十八道分為十二卷詔令百司寫録與格式叅用九月相州節度桑維翰上言管内獲賊人從來籍没財産云是鄴都舊例格律未見明文勅桑維翰佐命功全臨戎寄重舉一方之徃事合四海之通規況賊盜之徒律令俱載此為撫萬姓而安萬國豈忍罪一夫而破一家聞將相之善言成國家之美事既資王道實契人心今後凢有賊人准格律定罪不得没納家資天下諸州皆准此處分五年十月癸丑詔曰朕自臨區夏每念生靈惡殺為心實慈是務凡於獄訟嘗切哀矜況時漸興文民皆知禁宜伸輕典用緩峻刑今後竊盜贓滿五疋處死三疋以上決杖配流以盜論者依律文處分六年五月尚書刑部員外郎李象奏請今後凡是散官不計髙低若犯罪不得當贖亦不得上請詳定院覆奏應内外文武官有品官者自依品官法有散試官者應内外帶職廷臣賓從有功將挍等並請同九品官例其京都軍巡使及諸道州府衛前職員内外雜任鎮將等並請准律不得上請當贖其巡司馬步司判官雖有曾歴品官者亦請同流外職准律杖罪已下依決罰例徒罪已上仍依當贖法少帝天福七年十二月詔四京諸道州府決大辟罪起今後宜令遇大祭祀正冬寒食立春夏雨雪未晴已上並不得行極刑如有已㫁案可取次日及雨雪定後施行仍付所㫁漢髙祖即位稱天福十二年八月勅應天下凢關盜賊捕獲不計贓物多少按驗不虛並宜處死俾其重法斯為愛民又五代史志云漢之濫刑也如是周太祖廣順元年正月即位制曰古者用刑本期止辟今兹作法義切禁非盖承弊之時非猛則姦兇難制及知勸之後或寛則典憲得宜相時而行庶臻中道今後應犯竊盜贓及和姦者並依晋天福元年已前條制施行應諸處犯罪人等除反逆罪外其餘罪並不得籍没家産誅及骨肉一依格令處分六月勅侍御史盧億刑部員外郎曹匪躬大理正段濤同議定重寫法書一百四十八卷先是漢隱帝末因兵亂法書亡失至是大理奏重寫律令格式綂類編勅凡改㸃畫及義理之誤字凡二百一十四以晋漢及國初事關刑法勅條凡二十六件分為二卷附于編勅目為大周續編勅命省寺行用焉二年二月中書門下奏准元年正月五日赦書節文今後應犯竊盜贓及和姦者並依晋天福元年已前條制施行諸處犯罪人等除反逆罪外其餘罪並不得籍没家産誅及骨肉一依格令處分者請再下明勅頒示天下乃下詔曰赦書節文明有釐革切慮邉城逺郡未得審詳宜更申明免至差誤其盜賊若是强盜并准自來格條斷遣其犯竊盜者計贓滿絹三疋已上者並集衆決殺其絹以本處上估價為定不滿三疋者等第決㫁應有夫婦人被強姦者男子決殺婦人不坐其犯和姦者並准律科㫁罪不至死其餘姦私罪犯准格律處分應諸色罪人除謀反大逆外其餘並不得誅殺骨肉籍没家産先是晋天福中勅凢和姦者男子婦人並極法至是始改從律文焉八月勅承前所立鹽麴條法毎犯至少盡處極刑近年以來抵罪甚重兼以邑居人户隨税請鹽既不許將入城隍又不容向外販賣立法之弊一至于斯爰自新朝尚法舊制昨因鄭州按獄備見百姓銜寃既詳㫁之踰違亦條令之疑誤覩兹深刻須議改更庶令輕重得中兼復上下知禁國計之重立法為先貴在必行何須過當凡鹽麴犯一斤以下至一兩杖臋十七配役一年五斤以下一斤已上杖脊二十役三年五斤以上杕死之煎鹻鹽犯一斤已下杖脊二十役三年一斤已上杖死之若捉獲鹻土及水煎成鹽了秤之定罪顆鹽末鹽各有界分如界分相侵同犯鹽罪論鄉村所請蠶鹽只自充用不得將入城邑村坊郭博易貨賣如違同犯鹽論所請蠶鹽處道路津鎮須驗公慿凢賣鹽麴並須官塲官務若衷私興販同犯鹽麴例論官塲官務有羨餘鹽麴並盡底納官如輙將貨賣同犯鹽麴論凢鹽户酒户衷私與塲官院官買賣同犯例論凢鹽麴同情共犯若是卑幼骨肉奴婢同犯只罪家長主者不知情只罪造意者其餘減等凢城郭人户係屋税鹽並於城内請給若外縣鎮郭下人户亦許將所請鹽歸家供食即本部官據人户合請數都計於俵塲請數㸃檢入城不得因便帶入其郭下户或城外有庄田合并户税者亦本處官預前分説勿令逐處都請凡鹽麴鹽鹻隨處地分節級專切捉搦如透漏必重科斷其告犯鹽麴人死罪者賞錢五十千文不死罪賞三十千文以本處係省錢充故斟酌輕重立此科條宜令三司施行其中有合指揮件目隨事處分以聞十二月開封府言商賈及諸色人等訴稱被牙人店主人引領百姓賖買財貨違限不還其價亦有將物去便與牙人設計公然隱没又庄宅牙人亦多與有物業人通情重叠將店宅立契典當或虚指别人産業或浮造屋舍偽稱祖父所置更有卑幼骨肉不問家長衷私典賣及將倚當取債或是骨肉物業自己不合有分倚強凌弱公行典賣牙人錢主通同蒙昧致有争訟起今後欲乞明降指揮應有諸色牙人店主引致買賣並須錢物交相分付或還錢未足仰牙人店主明立期限勒定文字逓相委保如數内有人前却及違限别無抵當便仰連署契人同力填還如諸色牙行人内有貧窮無信行者恐已後誤索即許衆狀集出如是客旅自與人商量交易其店主牙行人並不得邀難遮占稱須依行店事例引致如有此色人亦加深罪其有典質倚當物業仰官牙人業主及四鄰人同署文契委不是曾將物業已經别處重叠倚當及虛指他人物業印税之時于税務内納契日一本務司㸃檢須有官牙人鄰人押署處及委不是重叠倚當錢物方得與印如違犯應關連人並行科㫁仍徴還錢物如業主别無抵當只仰同署契牙保鄰人均分代納如是卑幼不問家長便將物業典賣倚當或雖是骨肉物業自己不合有輙敢典賣倚當者所犯人重行科㫁其牙人錢主並當深罪所有物業請准格律指揮如有典賣庄宅准例房親鄰人合得承當若是親鄰不要及著價不及方得别處商量和合交易只不得虚擡價例蒙昧公私如有發覺一任親鄰論理勘責不虚業主牙保人並當科㫁仍改正物業或親戚實自不便承買妄有遮􅈔阻滯交易者亦當深罪從之三年九月勅辰象𤣥逺罕克精研術數幽深驟難窮究則有閭閻之内卜祝之流粗學隂陽務求衣食妄談休咎以誑民氓比設律條止兹誕妄久疎法網是啟妖訛自今後𤣥象品物天文圗書䜟記七曜厯太一雷公式法等私家不合有及衷私傳習見有者並須焚毁司天臺翰林院本司職員不得以前件所禁文書出外借人傳寫其諸時日五行占筮之書不得禁限其年厯日須候本司筭造奏定方得雕印所司不得衷私示外如違准律科㫁遍下諸道州府各令告示先是本司術數人以其術私教㕓里富民好事者而市兒有解筭七曜厯經者每年筭造供御及賜藩鎮厯日而富民之室皆有之今嵗水而星文差度街市大扇妖言故有是命世宗顯德四年五月中書門下奏准宣法書行用多時文意古質條目繁細使人難㑹兼前後勅格互換重叠亦難詳定宜令中書門下並重删定務從節要所貴天下易為詳究者伏以刑法者御人之銜勒救弊之斧斤故鞭扑不可一日弛之於家刑法不可一日廢之于國雖堯舜淳古之代亦不能捨此而致理矣今奉制㫖删定律令有以見聖君欽恤明罰勅法之意也竊以律令之書政理之本經聖賢之損益為古今之章程歴代以來謂之彛典今朝廷之所行用者律一十二卷律疏三十卷式二十卷令三十卷開成格一十卷大中綂類一十二卷後唐以來至漢末編勅三十二卷及皇朝制勑等折獄定刑無出于此律令則文辭古質看覽者難以詳明格勅則條目繁多撿閲者或有疑誤加以邉逺之地貪猾之徒緣此為姦寖以成弊方屬盛明之運宜伸畫一之規所冀民不陷刑吏知所守臣等商量望准聖㫖施行仍差侍御史知雜事張湜太子右庶子劇可久殿中侍御史率汀職方郎中鄧守中倉部郎中王瑩司封員外郎賈玭太常博士趙礪國子博士李光賛大理正蘇曉太子中允王伸等一十人編集新格勒成部帙律令之有難解者就文訓釋格勅之有繁雜者隨事删除止要詣理省文兼且直書易會其中有輕重未當便於古而不便於今矛盾相違可於此而不可於彼盡宜改正無或牽拘候編集畢日委御史臺尚書省四品以上及兩省五品以上官叅詳可否送中書門下議定奏取進止詔從之自是湜等于都省集議删定仍令大官供膳七月詔曰准令諸田宅婚姻起十一月一日至三月三十日州縣爭論舊有釐革毎至農月貴塞訟端近聞官吏因循由此成弊凡有訴競故作逗遛至時而不與盡辭入務而即便停罷強猾者因兹得地孤弱者無以自伸起今後應有人論訴物業婚姻取十一月一日後許陳辭狀至二月三十日權停如有未了絶者仰本處州縣亦與盡理勘逐須見定奪了絶其本處官吏如輙違慢並當重責其三月一日後至十月三十日前如有婚田辭訟者州縣不得與理若交相侵奪情理妨害不可停滯者不拘此限五年七月中書門下奏侍御史知雜事張湜等九人奉詔編集刑書悉有條貫兵部尚書張昭逺等一十人叅詳㫖要更加損益臣質臣溥據文評議備見精審其所編集者用律為主辭㫖之有難解者釋以疏意義理之有易了者畧其疏文式令之有附近者次之格勅之有廢置者又次之事有不便于今該説未盡者别立新條于本條之下其有文理深古慮人疑惑者别以朱字訓釋至於朝廷之禁令州縣之常科各以類分悉令編附所冀發函展卷綱目無遺究本討源刑政咸在其所編集勒成一部别有目録凡二十一卷刑名之要盡綂于兹目之為大周刑綂伏請頒行天下與律疏令式通行其刑法綂類開成格編勅等採掇既盡不在法司行使之限自來有宣命指揮公事及三司臨時條法州縣見今施行不在編集之數應該京百司公事逐司各有見行條件望令本司删集送中書門下詳議聞奏勅宜依仍頒行天下乃賜侍御史知雜事張湜等九人各銀器二十兩雜綵三十疋賞删定刑綂之勞也册府元龜卷六百十三
