body:
  text: 册府元龜卷九百七十一宋王欽若等撰外臣部朝貢第四唐𤣥宗先天元年八月吐蕃遣使朝貢九月突騎施守忠十月突厥汝陁金山十一月突厥十姓十二月吐蕃新羅並遣使來朝二年正月突厥二月新羅室韋吐蕃處月突厥焉耆于闐六月南天竺新羅各遣使朝貢凡夷狄朝貢太上皇皆御門樓以見之開元元年十二月靺鞨王子來朝奏曰臣請就市交易入寺禮拜許之林邑國王建多達摩遣使獻象五頭帝降書謂之曰卿國在海南逺通朝貢所獻方物深達欵誠今賜卿馬兩匹宜知朕意二年二月突厥遣使阿史那鞫來朝帝御承天門見之是月拂湼靺鞨首領失異蒙越喜大首領烏施可蒙鐵利部落大首領闥許離等來朝新羅遣使級食朴裕來賀正八月西天竺國遣使獻方物二年二月天竺國使翟曇恵感來獻方物六月林邑國遣使來朝四年三月佛誓國遣使朝貢新羅遣其臣金楓厚來賀七月大食國黒密牟尼蘇利漫遣使上表獻金線織袍寶装玉灑池瓶各一一云開元初進馬及寶鈿帶等方物閏十二月東蕃逺蕃靺鞨部落拂湼部落勃律國皆遣大首領來朝五年三月拂湼靺鞨勃律新羅安國並遣使獻方物康國王遣使獻毛錦青黛五月真臘文單新羅靺鞨中天竺國並遣使來朝并獻方物六月突騎施遣使獻槖駞及馬降書謂曰卿逺貢忠信詣獻駞馬朕𤣥黙為神澹泊為徳稅彼部落則有勞費已勅所司不令輙受深領厚意宜體至懐是月習阿薛般國王安殺遣使朝貢于闐國遣使獻打毬馬兩匹風脚野駞一頭豽一頭七月突厥遣使獻馬十月日本國遣使朝貢命通事舍人就鴻臚宣慰六年二月契丹新羅米國石靺鞨鐵利鞨湼蕃守並遣使來朝四月米國王遣使獻拓壁舞筵及鍮是年康國遣使貢獻鎻子甲水精盃瑪瑙瓶駞鳥卵及越諾之類史不書月七年正月奚王李大輔及新羅國並遣使來賀正突騎施匐車鼻施啜蘇祿笄波斯國並遣使朝貢石拂林國王遣吐火羅國大首領獻獅子二零羊二拂湼靺鞨鐵利靺鞨越喜靺鞨並遣使來朝二月波斯國奚拂湼靺鞨三月安國並遣使獻方物四月契丹松漠都督李婆固遣使獻馬十匹九姓同羅都督末啜曳遣使獻野馬胯皮甲吐火羅葉䕶及俱宻國並遣使朝貢己夘訶毘施國捺塞使吐火羅大首領羅摩娑羅獻獅子及五色鸚鵡帝以其逺蕃脩貢加宴勞賜錦綵五百疋五月俱宻國遣使獻胡旋女子及方物六月大食國吐火羅國康國南天竺國並遣使朝貢其吐火羅國支汗那王帝賒上表獻解天文人大慕闍其人智慧幽深問無不知伏乞天恩喚取慕闍親問臣等事意及諸教法知其人有如此之藝能望請令其供奉并置一法堂依本教供養七月佛律國蘇弗舍利遣使來朝謝册立恩也波斯國遣使朝貢八月大拂湼靺鞨遣使獻鯨鯢魚睛貂鼠皮白兎貓皮八年正月中天竺國遣使來朝二月􅄢賓國遣使來朝進天文經一夾秘要方并蕃藥等物五月南天竺國遣使獻豹及五色鸚鵡問日鳥六月吐火羅國遣使獻馬及䮫九月􅄢賓國獻善馬謝䫻國遣使來朝十一月吐蕃使蘇和素董悉曩等來朝貢南天竺王遣使來朝十二月吐蕃石國及謝䫻國並遣使來朝貢九年二月石國王遣使朝貢處密國遣使獻駞及馬六月龜兹王白孝節遣使獻馬及狗十一月己酉渤海郡靺鞨大首領鐵利大首領拂湼大首領契丹蕃郎將俱來朝並拜折衝放還蕃十年正月癸夘朔帝御含元殿受朝賀是日諸蕃國各獻方物七月丹州獻朱􅐢白馬十月乙巳新羅遣大奈麻金仁壹來賀正并獻方物越喜遣首領茂利蒙來朝并獻方物波斯國遣使獻獅子十一月渤海遣其大臣味勃計來朝並獻鷹十一年四月新羅王金興光遣使獻果下馬一匹及牛黄人參頭髪朝霞紬魚牙紬鏤鷹鈴海豹皮金銀等興光上言曰臣鄉居海曲地處遐陬元無泉客之珍本乏賔人之貨敢將方産之物塵黷天官駑蹇之才滓穢龍廐竊方燕豕敢類楚雞深覺靦顔彌増戰汗十二年二月契丹遣使湼禮來賀正并獻方物奚遣大首領李奚奴等十人渤海靺鞨遣其臣賀作慶新羅遣其臣金武勲勃律遣大首領蘇磨羅來賀正各賜帛五十匹放還蕃三月大食遣使獻馬及龍腦香識匿國王遣使獻馬及金精契丹遣使來朝且謝恩往嵗契丹使木㨿離奉國信歸蕃是以來也四月康國王烏勒遣使獻侏儒一人馬狗各二五月松漠府契丹遣使來朝饒樂府奚遣使獻麝香七月吐火羅國遣使獻胡藥乾陁婆羅等三百餘品尸利佛誓國王遣使俱摩羅獻侏儒二人僧祗女一人雜樂人一部及五色鸚鵡授摩羅折衝賜帛百疋放還蕃十二月越喜靺鞨遣使破支蒙來賀正并獻方物突厥遣使裴羅啜來朝堅昆遣使獻馬契丹遣使獻馬契丹新羅王金興光遣使獻方物閏十二月突厥遣其大臣阿史徳暾泥孰來朝十三年正月契丹遣使渤海遣大首領烏借芝蒙黒水靺鞨遣其將五郎子大食遣其將蘇黎等十三人並來賀正旦獻方物三月大食國遣使蘇黎滿等十三人獻方物又云獻馬及毛錦識匿國遣使獻馬七月室韋遣使來朝丁未中天竺國遣使來朝是年契丹遣其臣可突于朝貢方物十四年正月突厥遣其大臣臨河達干康思琮來朝契丹遣其臣邵固來朝突騎施可汗遣首領阿句支來獻馬二月安國遣使獻豹雄雌各一突厥遣使執失頡利發等三百餘人來賀封山四月新羅遣使金忠臣來賀正契丹遣大首領李闊等六人來朝五月安國王波婆提遣其弟可悉爛達干拂耽發黎來朝獻馬及豹新羅遣其弟金欽質來朝突厥遣其大臣臨河達干康思琮來朝七月契丹部落刺史出利縣令蘇固多等來朝十一月吐火羅國遣使來朝突厥遣其大臣梅錄啜來朝渤海靺鞨王遣其子義信來朝并獻方物奚遣使阿布高來朝康國王遣使獻豹及方物十五年正月新羅遣使來賀正五月康國獻胡旋女子及豹史國獻胡旋女子及蒲萄酒安國獻馬七月突厥骨吐祿遣使獻馬及波斯錦史國王阿忽必多遣使獻胡旋女子及豹八月渤海王遣其弟大寶方來朝九月突厥毘伽可汗遣其大臣梅錄啜來朝十月識匿國遣使賀正靺鞨遣使來朝并獻方物四月䕶密國王遣米國大首領米忽汗來朝並獻方物十一月佛誓國王遣使獻五色鸚鵡米國王遣使獻獅子是年新羅國遣使來獻方物十七年正月米使獻胡旋女子三人及豹獅子各一骨咄俟斤遣男骨都施來朝獻馬二匹二月渤海靺鞨遣使獻鷹是月渤海靺鞨遣使獻鯔魚三月䕶密國大首領烏鶻達干來朝六月北天竺國三蔵沙門僧宻多獻質汗等藥七月吐火羅使僧難陁獻須那伽帝釋夌等藥九月大食國遣使來朝並獻方物十八年正月波斯王子繼忽娑來朝獻香藥犀牛等吐蕃靺鞨遣其弟大郎雅來朝賀正獻方物波斯國王及新羅國王各遣使來朝賀正二月突厥遣使哥觧骨支車鼻頡斤來獻方物渤海靺鞨大首領遣使知蒙來朝並獻方物馬三十匹四月米國石國吐蕃突厥各遣使來朝貢五月渤海靺鞨遣使烏那達初來朝獻海豹皮五張貂䑕皮三張瑪瑙盃一馬三十匹契丹遣使獻馬十二匹吐火羅僧難陁來朝貢獻瑞夌香藥等黒水靺鞨遣使阿布科思來朝獻方物九月靺鞨新羅國並遣使朝貢十月吐蕃遣其大臣名悉獵獻方物十一月契丹奚中天竺國並遣使朝貢十二月吐蕃贊普遣其臣諾勃蔵來朝貢獻方物十九年二月室韋渤海靺鞨新羅並遣使來賀正八月吐蕃遣其國相論尚他硉來朝命鴻臚少卿李祺至界首宣勞申命中官路次宣慰十月中天竺國王伊沙伏磨遣其臣大徳僧勃達信來朝並獻方物林邑國獻象四突厥遣其大臣蘇農出邏達干等二十四人來朝嶺西室韋遣使來朝渤海靺鞨王遣其大姓取珍等百二十人來朝二十年正月壬子奚歸義王遣其首領細蘇等來朝新羅奚並遣使賀正七月庚子突厥可汗堂弟何支監􅎄來朝九月波斯王遣首領潘那密與大徳僧及烈朝貢二十一年二月骨咄王頡利發遣使獻馬并女樂三月可汗那王易米施遣使獻馬突厥遣使新斯壁紆思鮮闕等十六人來朝閏三月勃律國王没謹忙遣使大首領察卓那斯磨没勝來朝謝册立之恩四月突厥大使烏鶻達干來朝八月日本國朝賀使真人廣成與傔從五百九十人舟行遇風飄至蘇州刺史錢惟正以聞詔通書舍人韋景先往蘇州宣慰焉是月骨咄王遣大首領如達干來朝九月突厥遣其大臣牟伽伊難達干等十三人來朝十二月可汗那王易米施遣使首領婆延達干大食國王遣首領摩思覽達干等來朝二十二年正月吐蕃遣使來朝四月日本國遣使來朝獻美濃絁二百匹水織絁二百疋突厥遣其大臣斯壁紆思鮮闕來朝西南蠻大酋率蒙歸義遣使獻口麝香牛黄新羅王興光遣其大臣金㟨嵑丹來賀正先時興光遣其姪志亷謝恩獻小馬兩匹狗三頭金百兩銀二千兩布六十疋牛黄二十兩人參二百斤頭髪一百兩海豹皮一十六張及是授志亷鴻臚少卿員外置六月林邑國遣使獻沉香二十三年正月突厥哥解骨支車鼻施頡斤來朝新羅遣使金義忠等來賀正二月吐蕃贊普遣其臣悉諾勃蔵來賀正貢獻方物兼以銀器遺宰臣侍中裴耀卿中書令張九齡禮部尚書平章事李林甫等奏曰臣等忝職樞近不合輙受吐蕃餉方物並望勅鴻臚進内帝不從三月日本國遣使獻方物渤海靺鞨王遣其弟蕃來朝八月鐵利部落拂湼部落越喜部落俱遣使來朝獻方物林邑國遣使獻馴象九月辛巳吐火羅國十二月新羅並遣使來獻方物林邑國遣使獻白象二十四年正月吐蕃遣使貢獻方物金銀器玩數百事皆形制竒異帝令列於提象門外以示百僚六月新羅王金興光遣使賀獻表曰伏奉恩勅􅀈江以南宜令新羅安置臣生居海裔沐化聖朝雖丹素為心而功無可効以忠正為事而勞不足賞陛下降雨露之恩發日月之詔錫臣土境廣臣邑居遂使墾闢有期農桑得所臣奉絲綸之㫖荷榮寵之深粉骨糜身無繇上答九月越喜靺鞨遣使獻方物二十五年正月焉耆大首領龍長安牂牁大酋長趙君道渤海靺鞨大首領木智蒙來朝波斯王子繼忽娑來朝二月新羅遣使沙食金抱質突厥遣使哥解骨支車鼻頡斤並來朝賀正且獻方物四月渤海遣其臣公伯計來獻鷹鶻東天竺國三蔵大徳僧達摩戰來獻胡藥卑斯比支等及新咒法梵本雜經論持國論占星記梵本諸方十二月新羅國王金承慶遣使獻方物吐蕃遣其大臣屬盧論莽蔵來朝且獻方物二十六年正月吐火羅國遣大首領伊難如達干羅底賝來獻方物三月新羅使其大臣金元元來賀正閏八月渤海靺鞨遣使獻貂䑕皮一千張乾文魚一百口二十七年二月渤海王遣使獻鷹又拂湼靺鞨遣使獻方物四月拔汗那王阿悉爛達干史國王斯謹提突騎施大將索俟斤並遣使獻表起居十月渤海遣使其臣受福子來謝恩二十八年二月越喜靺鞨遣其臣野古利來獻方物鐵利靺鞨遣其臣綿度户來獻方物牂牁大酋長遣使獻蠟三月骨咄國遣使首領慱勒達干刺勿來朝命有司享之十月渤海靺鞨遣使獻貂䑕皮昆布安國遣使獻寶牀子及駞鳥卵盃康國遣使獻寶香爐及白玉環瑪瑙水精眼藥瓶子二十九年正月拔汗那王遣使獻馬二月渤海靺鞨遣其臣失阿利越喜靺鞨遣其部落與舍利黑水靺鞨遣其臣阿布利稽三月拂湼靺鞨遣首領那弃勃史國王斯謹提遣首領勃帝米施拔汗那王遣首領阿解支達干思伽並來朝賀正具獻方物突厥遣使首領伊難如來賀正具獻方物上表曰頂禮天可汗禮諸天奴身曾祖已來向天可汗忠赤每徵發為國出力今新年獻月伏願天可汗夀命延長天下一統所有背恩逆賊奴身共拔汗那王盡力枝敵如有歸附之奴即和好今謹