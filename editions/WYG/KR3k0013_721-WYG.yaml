body:
  text: 册府元龜卷七百二十一宋王欽若等撰幕府部謀畫第二南齊紀僧真為太祖領軍功曹太祖將廢立謀於袁粲禇淵僧真啓曰今朝廷猖狂人不自保天下之望不在袁禇明公豈得黙然坐受夷滅存亡之機仰希熟慮太祖納之太祖欲渡廣陵起兵僧真又啓曰主上累世皇基猶固磐石今百口北渡何必得俱縱得廣陵城天子居深宫施號令目明公為逆何以避此如其不勝則應北走胡中竊謂此非萬全䇿也太祖曰卿顧家豈能逐我行耶僧真頓首稱無貳梁夏侯詳仕宋為豫州刺史殷琰主簿㤗始初琰叛明帝遣輔國將軍劉勔討之攻守連月人情危懼將請救於魏詳説琰曰今日之舉本效忠節若社稷有奉便歸身朝廷何可屈身北面異俗且今魏氏之卒近在淮次三軍未測去就懼有異圖今若遣使致欵必厚相慰納豈免罪而已若謂不殺請充一介琰許之出見勔曰将軍嚴圍崤壘矢刃如霜城内愚迷實同困獸士庶懼誅咸欲投魏僕所以踰城歸德敢布腹心願将軍宏曠蕩之恩垂霈然之惠觧圍退舍則皆相率而至矣勔曰審爾當如君言請反命勔遣人到城下呼城中人語以勔辭即日琰及衆俱出一州以全勔為刺史又補詳主簿陳毛喜為宣帝叅軍時廢帝冲昧僕射到仲舉與右衛将軍韓子髙通謀其事未發喜請帝曰且簡選人馬配與子髙并賜鐡炭使修器甲帝驚曰子髙謀反即欲收執何為更如是耶喜答曰山陵始畢邉㓂尚多而子髙受委前朝名為効順然甚輊狷不時授首脱其稽誅或愆王度冝推心安誘使不自疑一壯士之力耳帝深然之卒行其計後魏李先為衛王府左長史從平鄴到義臺破慕容驎軍囬定中山先毎一進䇿所向尅平道武還代以先為尚書左中兵郎酈範為征南大将軍慕容白曜左司馬師次無鹽宋戍主申纂慿城拒守識者僉以攻具未周不冝便進範曰今輕軍逺襲深入敵境無冝淹留久稽機候且纂必以我軍来速不去攻守謂方城可慿弱卒可恃此天亡之時也今若外潜威刑内整戎旅密厲将士出其非意可一攻而尅之白曜曰一日縱敵數世之患今若舒遲民心固矣司馬之䇿是也遂潜軍偽退示以不攻纂果不設備於是即夜部分旦便騰城崇朝而尅白曜将盡以其人為軍實範曰齊四履之地世號東秦不逺為經略恐未可定也今皇威始被民未霑澤連城有懷貳之将比邑有拒守之夫冝先信義示之軌物然後民心可懷二州可定白曜曰此上䇿也乃免之進次肥城白曜将攻之範曰肥城雖小攻則淹日得之無益軍聲失之有損威勢且見無鹽之卒死者塗炭成敗之機足為鍳矣若飛書告喻可不攻自伏縱其不降亦當逃散白曜乃以書曉之肥城果潰白曜目範於衆曰此行也得卿三齊不足定矣軍達升城宋太原守房崇吉棄母妻東走宋青州刺史沈文秀遣其寜朔將軍張元孫奉牋歸欵請軍接援白曜將遣偏師赴之範曰桑梓之戀有懷同徳文秀家在江南青土無墳栢之累擁衆數萬勁甲堅城強則拒戰勢屈則走師未逼之朝夕無事竟何所畏已求援軍且觀其使詞煩而顔愧視下而志怯幣厚言甘誘我也若不逺圗懼虧軍勢既進無所取退遇強敵羝羊觸籓羸角之謂未若先守歴城平盤陽下梁鄒尅樂陵然後方軌連鑣揚旌直進何患不壺漿路左以迎明公者哉白曜曰卿前後納䇿皆不失衷今日之筭吾所不取何者道固孤城裁能自守盤陽諸戍勢不野戰文秀必能尅除意在先誠天與不取後悔何及範曰如範短見猶謂不真歴城足食足兵非一朝可㧞文秀既據東陽為諸城根本多遣軍則歴城之固不立少遣衆則無以懼敵心脫文秀還叛閉門拒守偏師在前為其所挫梁鄒諸城追擊其後文秀身率大軍必相乗廹腹背受敵進退無途雖有韓白恐無全理願更思審勿入賊計中白曜乃止遂表範為青州刺史以撫新民李璨為中書郎太安初宋徐州刺史薛安都舉彭城降詔鎮南大将軍博陵公尉元鎮東将軍陽城公孔伯恭等率衆迎之獻文復以璨叅二府軍事逹九里山安都率文武出迎元不加禮出接安都還城使遂不至時宋将張永沈攸之等率先屯下􅔫元令璨與中書郎髙閣入彭城説安都安都即與俱載赴軍元等入城收管鑰其夜永攻南門不尅退還時永輜重在武原璨勸元乗永失據攻永米船大破之斫首數千級時大雪寒氷軍凍死者萬計於是遂定淮地加璨寜朔将軍鄭羲為中書博士大安初宋司州刺史嘗珍竒據汝南来降獻文詔殿中尚書元石為都将赴之并招慰淮汝遣羲叅右軍事到上蔡珍竒率文武三百人来迎既相見議欲頓軍於汝北未即入城羲謂石曰機事尚速今珍竒雖来意未可量不如直入其城奪其管鑰據有府庫雖出其非意要以全制為勝石從羲言遂䇿馬徑入其城城中尚有珍竒親兵數百人在珍竒宅内石既尅城意益驕怠置酒嬉戲無警防之虞羲謂石曰觀珍竒甚有不平之色可嚴兵設備以待非常其夜珍竒果使人燒府廂屋欲因救火作難以石有備乃止明旦羲齎白虎幡慰郭邑衆心乃定明年春又引軍東討汝隂劉彧汝隂太守張超城守不下石率精鋭攻之不尅遂退至陳項議欲還軍長社待秋擊之諸將心樂早還咸稱善計羲曰今張超驅市人負擔石蟻聚窮城命不延月冝安心守之超食已盡不降當走可翹足而待成擒物也而欲棄還長社道塗懸逺超必修城深塹多積薪榖將来難圖矣石不納遂旋師長社至冬復往攻超超果設備無功而還歴年超死楊文長代戍食盡城潰乃尅之竟如羲䇿楊侃為長孫稚揚州錄事叅軍梁豫州刺史裴䆳治合肥城規相掩襲宻購夀春郭人李𤓰花袁建等令為内應䆳已募勒兵士有期日矣而慮夀春疑覺遂謬移云魏始於馬頭置戍如聞復欲修白捺舊城若爾便稍相侵逼此亦湏營歐陽設交境之備今板卒已集唯聼信還白捺佐寮咸欲以實答之云無修白捺意而侃曰白捺小城本非形勝䆳好小黠今集兵遣移虚搆是言得無有别圖也稚深悟之乃云錄事可造移報侃曰彼之募兵想别有意何為妄搆白捺也他人有心予忖度之勿謂秦無人也䆳得移謂已知覺便爾散兵𤓰花等以期契不㑹便相告發伏辜者十數家酈惲字㓜和為長孫稚行臺郎惲頗兼武略嘗以功名自許毎進計於稚多見納用以功賞魏昌縣開國子邑三百户甄楷中山無極人為尚書儀曹郎丁憂在鄉時定州刺史廣陽王淵被徴還朝臨發召楷兼長史委以州任尋值鮮于修禮毛普賢等率北鎮流民反於州西北之左人城屠村掠野引向州城州城之内先有燕常雲三州避難之民皆依傍市􅆵草廬攅住修禮等聲云欲收此軰共為舉動既外㓂將逼恐有内應楷見人情不安慮有變起乃收州人中麄豪者皆殺之以威外賊固城民之心及刺史元固大都督楊津等至楷乃還家陽固孝明初征陜右以固為僕射李平行臺七兵郎中平命固節度水軍固設竒計先期乗賊獲其外城北齊魏蘭根初仕魏為尚書令李崇討茹茹都督長史因說崇曰緣邊諸鎮控攝長逺昔時初置地廣人稀或激發中原強宗子弟或國之肺腑寄以爪牙中年以来有司乖實號曰府户役同厮養官婚班齒致失清流而本宗舊類各各榮顯顧瞻彼此理當憤怨更張琴瑟今也其時静境寕邉事之大者宜改鎮立州分置郡縣凡是府户悉免為民入仕次叙一凖其舊文武兼用威恩竝施此計若行國庶無北顧之慮矣崇以奏聞事寢不報薛琡初仕魏為上黨王天穆討邢果行臺尚書時元顥已據鄼城天穆集文武議其所先議者咸以果衆強盛宜先經略唯琡以為邢果聚衆無名雖強猶賊元顥皇室昵親来稱義舉此恐難測果鼠盗狗竊非有逺志宜先討顥天穆以羣情所欲遂先討果果降軍還顥入雒天穆謂琡曰不用君言乃至於此天平初髙祖引為丞相長史時髙祖大舉西伐将渡蒲津琡諌曰西戎遇年饑饉無可食㗖故冒死来入陜州欲取倉粟今髙司徒已圍陜城粟不得出但置兵諸道勿與野戰比及来年麥秋人民盡應餓死寳炬黒獺自然歸降願王無渡河也侯景亦曰今者之舉兵衆極大萬一不㨗卒難收歛不如分為二軍相繼而進前軍若勝後軍承之髙祖皆不納遂有沙苑之敗陳元康為相府功曹􅄁軍從髙祖破周文帝於邙山大會諸将議進退之䇿咸以為野無青草人馬疲痩不可逺追元康曰兩雄交争歲月已久今得大捷便是天授時不可失必湏乗勝追之髙祖曰若遇伏兵孤何以濟元康曰王前沙苑還軍彼尚無伏今奔敗若此何能逺謀若捨而不追必成後患髙祖竟不從後為大行臺右丞及髙祖疾篤謂文襄曰邙山之戰不用元康之言方貽汝患以此為恨死不瞑目後周徐招初仕後魏為廣陽王深府長流㕘軍深討鮮于修禮招陳䇿請離間之葛榮竟殺修禮自為魁帥盧柔初仕後魏為賀㧞勝荆州大行臺郎中掌書記軍之機務柔多預之及勝為太保以柔為掾孝武後召勝引兵赴雒勝以問柔柔曰髙歡託晋陽之甲意實難知公宜席卷赴都與决勝負存没以之此忠臣之上䇿也若北阻曽陽南并舊楚東連兖豫西接闗中帶甲十萬觀釁而動亦中䇿也舉三荆之地通欵梁國可以身免功名去矣䇿之下者勝輕柔年少唯而不應及孝武西遷東魏遣侯景襲穣勝敗南奔梁唐瑾初仕後魏吏部尚書于謹南伐江陵以瑾為元帥府長史軍中謀略多出瑾焉李棠字長卿初仕東魏為髙仲宻北豫州掾先是仲宻與吏部郎中崔暹有隙暹被齊文襄委遇仲宻恐其搆已毎不自安將圗来附時東魏又遣鎮城奚夀興典兵事仲宻但知民務而已既至州遂與棠謀伏壮士欲因此執之夀興辭而不赴棠遂往見之曰君與髙公義符昆季今日之席以為君首豈有賓客總萃而公無事不行将恐逺近聞之竊有疑恠夀興遂俱赴便發伏執之乃帥其士衆據城遣棠詣關歸欵宇文深為太祖丞相府直閣齊神武屯蒲坂分遣其將竇泰趣潼闗髙敖曹圍雒陽太祖將襲泰諸将咸難之太祖乃隐其事陽若未謀者而獨問䇿於深深對曰竇氏歡之驍將也頑凶而勇戰亟勝而輕敵歡毎仗之以為禦侮今者大軍若就蒲坂則髙歡拒守竇泰必援之内外受敵敗之道也不如選輕銳之卒潜出小闗泰性躁急必来决戰髙歡持重未即救之則泰可擒也既虜竇泰歡勢自阻廻師禦之可以制勝太祖喜曰是吾心也軍遂行果獲泰而齊神武亦退深又説太祖進取𢎞農復克之太祖大悅謂深曰君即吾家之陳平也隋李詢初仕後周為司衛大将軍髙祖為丞相尉遲逈作亂遣韋孝寛擊之以詢為元帥長史委以心膂軍至永橋諸将不一詢宻啟髙祖請重臣監䕶髙祖遂令髙熲監軍與熲同心恊力唯詢而已李德林為髙祖丞相府屬時鄖公韋孝寛為東道元帥師次永橋為沁水泛長兵未得渡長史李詢上宻啓云大将梁士彦宇文欣崔宏度竝受尉遲逈金軍中恟恟人情大異髙祖得詢啟深以為憂與鄭譯議欲代此三人德林獨進計云公與諸将竝是國家貴臣未相伏馭今以挾令之威使得之耳安知後所遣者能盡腹心前所遣人獨致乖異又取金之事虚實難明即令換易彼将懼罪恐其逃逸便湏禁錮然則鄖公以下必有驚疑之意且臨敵代将自古所難樂毅所以辭燕趙括以之敗趙也如愚所見但遣公一腹心明於智略為諸将舊来所信服者速至軍所觀其情偽縱有異志必不敢動丞相大悟曰若公不發此言幾敗大事即令髙熲馳驛往軍所為諸将節度竟成大功凡厥謀多此類也李徹為左武衛将軍突厥沙鉢略可汗犯塞髙祖令衛王爽為元帥擊之以徹為長史遇虜於白道行軍總管李充請襲之諸将多以為疑唯徹奨成其事請同行遂掩擊大破之沙鉢略棄所服金甲而遁因此稱籓唐裴寂為髙祖大将軍府長史從至河東屈突通拒命攻之不下三輔豪傑歸義者日有千數髙祖將先定京師議者恐通為後患猶豫未决寂進説曰今通據蒲闗若不先平前有亰城之守後有屈突之援此乃腹背受敵敗之道也未若攻蒲州下之後入闗亰師無援可不攻而定太宗曰不然兵法尚權權在於速宜乗機早度以駭其心我若遲留彼則生計且闗中羣盗所在此徒未有定主易可招懷賊附兵強何城不尅屈突通自守賊耳不足為虞若入関之機則事未可知矣髙祖两從之留兵圍河東而引軍入闗劉文静為髙祖大将軍府司馬文静勸改旗幟以彰義舉又請連突厥以益兵威髙祖竝從之房元齡為太宗秦王府記室叅軍太宗甞至隐太子所食中毒而歸府中震駭計無所出元齡因謂長孫無忌曰今嫌隙已成禍機将發天下恟恟人懷異志變故一作大亂必興非直禍及府朝正恐傾危社稷此之際會安可不深思也僕有愚計莫若遵周公之事外寜區夏内安宗社申孝飬之禮古人有云為國者不顧小節此之謂歟孰若國家淪亡身名俱滅乎無忌曰乆懷此謀未敢披露公定所説深㑹宿心乃入白之太宗召元齡謂曰阽危之兆其跡已見将若之何對曰國家患難今古何殊自非睿聖欽明不能安輯大王功盖天地事鍾壓紐神賛所在匪藉人謀因與府屬杜如晦同心戮力隐太子将有變太宗令無忌召房𤣥齡及如晦令衣道士服潜引入閣計事遂平内難杜如晦為太宗秦王府屬從征薛仁杲劉武周王世􅂶竇建徳甞叅謀帷幄及隐太子之變如晦嘗入畫䇿及事㨗與房元齡功等薛收為太宗秦王府主簿判陜東道行臺北部郎中太宗之討王世充也竇建徳率兵来拒諸将皆以為宜且退軍以觀賊形勢收獨建䇿曰世充據有東都府庫填積其兵皆是江淮精鋭所患者在於乏食是以為我所持求戰不可建徳親總軍旅来拒我師亦當盡彼驍雄期於奮决若縱其至此两㓂相連轉河北之糧以相資給則伊雒之問戰鬪不已今冝分兵守營深其溝防即世充欲戰慎勿出兵大王親率猛鋭先據成臯之險訓兵坐甲以待其至彼以疲敝之師當我堂堂之勢一戰必尅建徳即破世充自下矣不過两旬二國之君可面縛麾下若退兵自守計之下也太宗納之卒擒建德叚秀實天寳十二年為安西節度封嘗清判官開大勃律師次賀薩勞城一戰而勝嘗清逐之秀實進曰賊兵行餌我也請備左右搜其山林遂殱其伏大歴中秀實為涇原節度馬璘行軍司馬時吐蕃来㓂戰于鹽倉官軍不利璘為㓂戎所隔逮暮未還敗将潰兵争道而入時都将焦令諶與諸将四五輩狼狽而至秀實召譲之曰兵法大将麾下當斬公等忘其死而欲安其家耶令諶等恐懼下拜數十秀實乃悉驅城中士卒未出戰者使驍将統之東依古原列竒兵示賊将戰且以收合敗亡蕃衆望之不敢逼及夜璘方獲歸李芃永泰初為江西觀察使李勉判官時宣饒二州人方清陳莊聚衆據山洞西絶江路刼商旅以為亂芃乃請於秋浦置州守其要地以破其謀勉然其計以聞代宗嘉之以宣州之秋浦青陽饒州之至徳置池州以芃攝行州事齊抗大歴中為夀州刺史張鎰判官鎰為江西觀察隴西節度前後籌量幕中事多出抗嚴郢為河東副元帥郭子儀判官子儀遷鎮邠州郢領留府時軍士乆處河中各有生業不樂遷徙多匿名姓自邠逃還郢悉捕得其渠帥戮之人心方定李自良徳宗初為試殿中監𨽻浙東節度使薛兼訓移鎮太原自良從至鎮兼訓卒鮑防代為節度使㑹囬鶻入㓂防令大将焦伯瑜杜榮國将兵擊之自良言於防曰囬鶻逺来不可與争鋒不如于歸路築二壘以兵守之堅壁不動虜求戰不得師老必退還然後出兵逐之二壘扼其歸路䇿之上者也防不從趣伯瑜等與戰于百井軍大敗自良繇是稍知名齊映建中末為鳳翔行軍司馬時徳宗居奉天鳯翔逼於賊泚節度使張鎰懦緩不曉事部将有李楚琳者剽悍兇暴軍中皆畏之乗間将謀亂先數日映與同列齊抗皆覺之乃宻言於鎰令殺之鎰不從映言乃示其寛大召楚琳語云欲令公使於外楚琳恐懼是夜作亂乃殺鎰以應泚軍中多為映指導故得免因赴奉天行在除御史中丞崔宏禮元和中為東都留守呂元膺從事時淮西吴少陽初死吴元濟阻兵拒命山東反側之徒為之影援東平李師道謀驚東雒以脅朝廷宏禮為元膺籌畫部分兵衆以固東都平亦無累梁謝曈唐末居太祖門下太祖據同州遂署右職廣明初太祖與河中交戰再不利連上章請兵於黄巢偽右軍中尉孟楷抑而不進曈揣太祖有擇福意乃進説曰黄家以數十萬之師值唐朝乆安人不習戰因利乗便遂下両京然始竊偽號任用已失其所今将軍勇冠三軍力戰於外而孟楷專務壅蔽奏章不逹下為庸才所制上無獨斷之明破亡之兆必矣况土徳未厭外兵四集漕運波注日以收復為名惟所天察之太祖曰我意素决爾又如是復何疑哉翌日遂定䇿戮偽監軍使悉衆歸順于河中王重榮表曈為檢校屯田員外郎賜緋令奉表于蜀僖宗大悦召入顧問錫賚甚厚以功授朝散大夫太子率更令賜紫李振為太祖從事唐光化中往長安議事時昭宗為中尉劉季述廢為太上皇振東歸太祖方在邢雒遽還于梁大計未决季述遣飬子希度以社稷委輸於梁欲中帝意又遣供奉官李奉本副介支彦勲稱上皇誥喻以傳皆季述黨也振入言曰夫䜿刁伊戻之亂所以資霸者之事也今閹䜿幽辱天子王不能討無以令諸侯時監軍使劉重楚季述兄也固黨其族舊相張濬在河南緱氏亦来謂帝曰同中官則事易濟且得所欲唯振堅執不改獨曰行正道則大勲可立帝英悟忽厲色曰張公勸我同勅使是欲傾附自求宰相耶乃定䇿縶偽使李奉本支彦勲與希度等即日召程巖折足械至鎮杖殺之請振将命于京師遂與宰臣謀返正裴廸為太祖節度判官唐天復中太祖駐軍于岐下忽有青州徤步苖公立者齎其帥王師範書問至府廸召之詢以東事㣲覺色動因去左右宻徴其説公立乃具述師範稱兵之状時太祖猶子友寕為馬步軍指揮使廸不俟命遽請友寕統在府諸軍至兖鄆廵警以示軍威及昭宗還長安太祖歸梁邸凡府僚竝被命遷秩兼錫功臣之號廸獨轉官為檢校司徒號寕鑾叶賛功臣一日賓佐集謁太祖目廸曰叶賛之名唯司徒獨有之他人莫及也其見重如此李班為成汭荆州掌書記天復中淮㓂大舉圍夏口逼巴陵太祖患之飛命成汭率水軍十萬援于鄂李班入言曰今舳艫容介士千人載稻倍之緩急不可動吳人剽輕若為所絆則武陵武安皆我之讎也将有後慮不如遣饒将屯巴陵大軍對岸一月不與戰則吳㓂粮絶而鄂圍觧矣汭性剛决不聼淮人果乗風縱火舟盡焚兵盡溺汭亦自沉于江郎人潭人遂入荆渚一如所料後唐李愚同光中自翰林學士為魏王繼岌征蜀都綂判官仍帶夲職從軍物議以蜀險阻未可長驅招計使郭崇韜問計於愚愚曰如聞蜀人厭其主荒恣倉卒必不為用冝乗其人情二三風馳電掣彼必破膽安能守險及前軍至固鎮守軍食十五萬斛崇韜因謂愚曰公能料事吾軍濟矣招討判官陳乂至寳鷄稱疾乞留在後愚厲聲曰陳乂見利則進懼難則止今大軍涉險人心易惑正可斬之以殉繇是軍中無敢遲留者是時軍書羽檄皆出其手筆蜀平就拜中書舍人冊府元龜卷七百二十一
