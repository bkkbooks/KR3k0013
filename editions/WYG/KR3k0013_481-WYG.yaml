  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_481-1a}
body:
  text: 册府元龜卷四百八十一宋王欽若等撰臺省部輕躁譴責輕躁伯陽有言曰動為輕根靜為躁君是以君子終日行不離輜重誠哉聖人之言也若夫失重而後輕失靜而後躁固將蹈于匪彛而自底于不類况乎臺省分職名器為重必繇徳舉以契民望而魏晉已來史氏所載乃有營求封爵希假榮禄得位則志滿失權則怨生人或驟遷不能相下已未成績即云久次非惟形于辭色至有列于奏䟽蓋夫前王所以惇慎退之風先儒所以著崇讓之論矯時鎮俗抑有㫖哉魏王粲為侍中與和洽杜襲並用粲强識博聞故太祖逰觀出入多得驂乗至其見敬不及洽襲襲嘗獨見至于夜半粲性躁競起坐曰不知公對杜襲道何等也洽笑答曰天下事豈有盡耶卿晝侍可矣悒悒於此欲兼之乎晉荀朂為中書監遷尚書令朂久在中書博管機事及失之甚罔罔悵恨或有賀之者朂曰奪我鳯凰池諸君賀我邪傅𤣥為司𨽻校尉獻皇后終于𢎞訓宫設喪位舊制司𨽻於端門外坐在諸卿上絶席其入殿按本品秩在諸卿下以次坐不絶席而謁者以𢎞訓宫為殿内制𤣥位在卿下𤣥恚怒厲聲色而責謁者謁者妄稱尚書所處𤣥對百寮而罵尚書以下御史中丞庾純奏𤣥不敬𤣥又自表不以實坐免官成公簡為中書郎時周馥已為司𨽻校尉遷鎮東將軍簡自以才髙而在馥之下謂馥曰揚雄為郎三世不徙而王莽董賢位列三司古今一揆耳馥甚慙之宋謝靈運太祖時為侍中日夕引見賞遇甚厚靈運以名軰才能應叅時政初被徴召便以此自許既至太祖唯接以文義每侍宴止賛賞而已王曇首王華殷景仁等名位素不踰之並見任遇靈運意不平多稱疾不朝直穿池植援種竹樹堇驅課公役無復期度出郭逰行或一日百六七十里經旬不歸既無表聞又不請急帝不欲傷大臣諷㫖令自解靈運乃上表陳疾賜假東歸王華為侍中時王𢎞輔政而𢎞弟曇首為太祖所任與華相埒華嘗為己方用不盡每歎息曰宰相頓有數人天下何由得治何衍性躁動為黄門郎拜竟求司徒司馬得司馬復求太子右率拜一二日復求侍中旬日之間求進無已不得侍中以怨罵賜死庾炳之為侍中遷吏部尚書領義陽王師内外歸附勢傾朝野炳之為人强急而不耐煩賓客干訴非理者忿詈形於辭色素無學術不為衆望所推王僧䖍為御史中丞領驍騎將軍時甲族多不居臺憲王氏以分枝居烏衣者位宦微减僧䖍為此官乃曰此是烏衣諸郎坐處我亦可試為爾南齊王融為中書自恃人地三十内望為公輔直中書省夜歎曰鄧禹笑人行逢大􅟘開喧啾不得進又歎曰車前無八騶何得稱為丈夫陸恵曉除尚書殿中郎鄰族來相賀恵曉舉酒曰陸恵曉年踰三十婦父領選始作尚書郎卿軰乃復以為慶耶茹法亮為中書通事舎人以王敬則事平法亮復受勅宣慰除法亮為大司農中書勢利之職法亮不樂去固辭不受既而代人已到法亮垂涕而出梁沈約為僕射自負髙才昧於榮利乗時藉勢頗累清談及居端揆有志台司咸謂為宜而髙祖終不用乃求外出又不見許與徐勉素善遂以書陳情於勉勉為言於髙祖請三司之儀弗許但加鼓吹而已范雲為吏部尚書性頗激厲少威重有所是非形於造次士或以此少之陳蔡徵為吏部尚書啓後主借鼓吹後主謂所司曰鼓吹軍樂有功乃授蔡徴不自量揆紊我朝章然其父景歴既有締構之功宜且如所啓拜訖即追還徵不修㢘隅皆此類也後魏郭祚宣武時為左僕射先是梁遣將康絢遏淮將灌揚徐祚上表宜勅揚州選猛將攻之朝議從之出為征西將軍雍州刺史初孝文太和已前朝法尤峻貴臣蹉跌便致誅夷李冲之用事也欽祚識幹薦為左丞又兼黄門意便滿足每以孤門往經崔氏之禍常慮危亡苦自陳挹辭色懇然發於誠至冲謂之曰人生有運非可避也但當眀白當官何所顧畏自是積二十餘年位秩隆重而進趣之心更復不息列辭尚書志在封侯儀同之位尚書令任城王澄為之奏聞及為征西雍州雖喜於外撫尚以府號不優心望加大執政者頗怪之裴植自兗州刺史累遷度支尚書性非柱石所為無常自兖州還表請静官隠於嵩山宣武不許深以為怪然公私集論自言人門不後王肅怏怏朝廷處之不髙及為尚書志意頗滿欲以政事為己任謂人曰非我須尚書尚書亦須我辭氣激揚見於言色入參議論時對衆官而有譏毁又表毁征南將軍田益宗言族姓㣲末不應在百世衣冠之上率多侵侮皆此類也髙聰為宣武光禄大夫心望中書令然後出作青州願竟不果袁翻為度支尚書尋轉都官翻表曰臣往忝門下翼侍帳幄同時流軰皆以出離左右蒙數陌之陟惟臣奉辭非但直去黄門今為尚書後便在中書令下於臣庸朽誠為叨濫准之倫匹或有未盡竊惟安南之與金紫雖是異品之隔實政有半階之較加以尚書清要位遇通顯准秩論資似如少進語望此官人不願易臣自揆自顧力極求此伏願天地成造有始有終矜臣疲病乞臣骸骨願以安南尚書换一金紫時天下多事翻雖外請閒秩而内有求進之心識者怪之於是加撫軍將軍宇文忠之為中書郎六七年好榮利遇尚書省選右丞預選者皆射䇿忠之入試焉既獲丞職大為忻滿志氣囂然有驕物之色識者笑之北齊魏蘭根初為岐州刺史除儀同三司蘭根既預義勲位居端揆至是訴復岐州勲封永興縣侯邑千户孫搴為左光禄大夫世宗初欲之鄴總知朝政髙祖以其年少未許搴為致言乃果行恃此自乞特進世宗但加散騎常侍徐之才自左僕射出為兖州刺史後主徴之尋左僕射闕之才曰自可復禹之績後主武平元年重除尚書左僕射尉瑾為吏部尚書右僕射閨門穢雜為世所鄙及官髙任重便大躁急省内郎中將論事者逆瞋詈不可諮承既居大選彌自驕狠陽休之領中書監便謂人云我已三為中書監用此何為隆化還鄴舉朝多有遷授封休之燕郡王謂其所親云我非奴何意忽有此授魏收為尚書右僕射收碩學大才然性褊不能逹命體道見當途貴㳺每以言色相恱後周叱羅恊為司㑹中大夫形貌痩小舉措褊急既以得志每自矜髙朝士有來請事者輙云汝不解吾今教汝及其所言多乖事實當時莫不笑之唐朱前疑為駕部郎中是時有契丹之役前疑出馬三疋以助軍未幾抗表求階級者數四朝廷鄙其貪冐特令還馬歸私第張均𤣥宗時為刑部尚書自以才名當為宰輔嘗為李林甫所抑及林甫卒依輔權臣陳希烈期於必取既而楊國忠用事心頗惡之罷希烈知政事引文部侍郎韋見素代之仍以均為大理卿既大失望意常欝欝裴延齡徳宗貞元中為祠部郎中集賢院直學士崔造作相改易度支之務令延齡知度支東都院及韓滉領度支召赴京師本官延齡不待命遂入集賢院親事宰相張延賞惡其輕進出為昭應令常渠牟貞元中為諫議大夫風貌佻躁無君子器志尚不根道徳衆雅知不能以正理開𢎞帝意裴均為右僕射交結權倖得位貴而在列班甞踰位而立御史中丞盧坦請退之均不受坦曰姚南仲為僕射例如此均曰南仲何人坦曰南仲是守正而不交權倖者也尋罷坦為右庶子時人歸咎於均楊歸厚為左拾遺元和七年八月己丑延英宰臣對訖歸厚次請對時憲宗坐久宣令後坐日對奏歸厚堅辭固請宰相諭之不退帝乃召見歸厚首論中官許遂振次力詆宰輔皆過激切然而自衒求試其詞甚繁逾刻而罷十二月丙申勅左拾遺楊歸厚可國子主簿分司東都歸厚好矜誇敢言前請對時帝怡色優假之歸厚謂己得若已深自責直誠章疏詞述或過差舊例卿士婚嫁多借郵逓院於京尹府縣亦為之設具歸厚將娶婦謂已官處近侍當動以聞率然奏請帝責其輕肆遂黜焉宰臣李絳營救之帝怒益甚李吉甫謝引用之失方稍解焉張平叔元和末為戸部侍郎判度支平叔狡險大言因王播以進既掌財用常居公利嬖倖多狎之既有寵於上進退便辟雜以優諧或自稱老奴無復大臣之禮因奏事畢降階復昇又有論奏佻盪輕脫帝每為笑容之在班列間玩狎郎吏譁肆無忌請變𣙜鹽法請宰相為之使因以自求樞機之任每有内制出輙疑授已整衣冠以候人多笑之前後散失官錢四十萬貫御史按得其實故貶之李翺敬宗時為吏部郎中有文學性彊褊自謂詞藝當知制誥以久未遂志嘗鬰鬰不樂寳歴二年十一月因面數宰相李逢吉之過既而請假滿百日乃授廬州刺史舒元輿為刑部員外郎文宗太和五年八月以其上表累請効用并進章疏朝廷責其躁速自伐故授著作郎分司東都後唐鄭希閔為金部貟外郎莊宗同光二年差充灃朗副使希閔進狀乞換章服帝欲懲之改差祠部貟外郎李盈休蕭希甫明宗天成初為諫議大夫初希甫至豆盧革惡之俄而革為河南府訟論事發希甫乃上䟽論革與韋說罪伏革等既又貶擢為右散騎常侍希甫性既褊忿躁於進取封章言事自比魏徴屬明宗郊禮宿齋前一日百官閱儀於殿前詰旦郡官趨班次宰相馮道趙鳯河南尹秦王從榮樞密使安重誨鳯翔節度使李曮於月華門外廊下候班定整衣冠或坐或立希甫與兩省班入赴殿前禮畢歸省希甫召朝堂驅使官堂頭直省面責之曰宰相樞密使與諸人比肩事主何得見兩省官安坐失禮又曰皇城内一人天子更無兩人三人于嶠天成初為戸部員外郎知制誥逾嵗當轉未行聞周倉程遜轉舍人甚怒退朝謁宰相趙鳯欲以言訟鳯知其故辭未之見乃叱閽伯省吏語言不遜揮袂而去吏譖於鳯言嶠詬詈又溺於客次鳳怒翌日上章貶謫李琪為尚書右僕射長興以後尤為宰執所忌琪凡有奏陳靡不望風横沮然琪雖博學多才拙於遵養時晦知時不可為然猶多岐求進動而見排繇已不能鎮靖也何澤為倉部郎中充書判㧞萃考試官澤與宰相趙鳳舊同戎幕屢以情告求為給諫鳯怒其躁進且欲抑之乃遷太常少卿勅未下有宗人堂吏告人澤便稱新銜上章訴出其畧曰臣伏尋近例自郎中拜給諌者即崔聽張延雍是也臣在郎署粗有勤勞無罪左遷有同排擯事下中書宰臣奏澤新命未行便敢稱謂聞知天下澤於何處受此官位侮弄朝綱法當不敬遂改太僕少卿致仕漢李鏻初仕後唐歴工部戸部侍郎工部尚書長興中以與明宗有舊嘗佇入相之意從容謂時相曰唐祚中興宜敦敘宗室才髙者合居相位僕雖不才曽事莊宗霸府見今上於藩邸時家代重侯累相靖安李氏不在諸侯之下論才較藝何讓衆人久置僕於朝行諸君安乎馮道趙鳯每怒共譖鏻日生妄動切欲為宰相人望非允鏻乃引偽吳覘人見樞密使安重誨云吳國執政徐知誥將舉國稱藩願得令公一信即來歸向重誨不察事機即以實然因出玉帶與覘者令歸工估其數千緍經嵗無所聞竟成虛語初鏻以此曲中冀得宰相乃左授行軍司馬愍帝應順初以兵部尚書使潭州聞末帝即位謂左右曰吾久合作相被人沮滯否泰之道信然吾於大相公事舊太祖公作帝矣予輔宜然從者相慶鏻至荆州留信宿告髙從誨求賀升極貢物言已必當輔弼從誨從其所求翌月延召酒闌從誨謂副使馬承翰曰朝廷大僚孰有相望承翰素不恱鏻所為即對曰朝士聞相望者崔居儉尚書姚顗左丞盧文紀太常又其次今聞拜矣諸士皆無相望鏻赧然不恱從誨坐中索今日報狀示鏻姚顗命相制下鏻曰吾老矣安能輔大政知稅駕之所矣周賈緯初仕晉為中書舍人冦䧟京師隨冦至真定諸將逐麻谷後與公卿還朝授諌議大夫緯以久次綸閣此望丞郎之拜乃遷諫署深懐觖望廣順初為給事中上言曰臣久塵西掖近綴東臺既居封駁之官兼處編修之職凡關聞見合補聰明茍避事不言是上孤至聖臣聞無偏無黨王道蕩蕩無黨無偏王道平平前書所載言之者誡千古大君恐有毫髪之私也臣覩陛下降赦後普行恩勅武臣之内咸協舊規文吏之中未符通論臣竊見改轉朝官自太子少保尚書丞郎内例超秩次仍峻戸封唯兩省侍從卿監之官及員外郎贊洗等依資昇進者不過數人餘並止於一階或自右入左上下都不畫一臣伏思階勲爵邑至為重事當以徳以勞次第而進雖遇慶澤不可妄加况官者代天理物國家公器雖有親昵無得輕授故曰官不必備唯其人若才稱其官常時當有顯議能不副職宜便無宜濫昇以公器而為普恩以普恩而有差等一厚一薄何疎何親臣不敢封還制書以阻成命欲乞陛下顯詢故事爰下有司不次超拜者必徴殊美以第進秩者須守常規望明廷再與僉諧願陛下曲留省察兼有前朝人為執政見排左授官秩者及在官無累或丁憂已滿未蒙叙遷各許進狀以自申明或顯見於蹤疏幸特頒於制命或期効用不致沈埋則免使得路者自伐自矜結恩私室失意者愈嗟愈歎流怨公朝光陛下聖明之規表陛下均平之徳將恢至理以致太和時中書議朝臣加恩以漢隠帝三年之内稀有改轉故商量西班上将軍統軍金吾及東班三署久次不遷者因加溥澤依資序進其餘月限合替者只加三階階已髙叙勲進爵邑示普恩而已時李糓魚崇諒趙上交改為丞郎故逓轉數人用其貟闕緯切於進用謂當路者有私尤恨竇貞固蘇禹珪每發論形於言色太祖召見又奏漢朝遷改不平有貟外郎盧振者自殿中侍御史超十資授左司貟外郎太祖驚訝久之殿中平轉中行貟外郎令授前行超一資今云十資蓋罔上以求媚也李詳廣順中為吏部侍郎時兵部侍郎盧賈先改吏部待郎奉使未還詳繼授先謝及賈復命入班臺吏叙賈在上詳曰朝廷故事授官同者先謝在上况詳舊任也乃勃然出班臺吏竟以詳居上非故事也李知損廣順中自諫議大夫責授棣州司馬世宗即位切於求賢素聞知損狂狷好上封事謂有可采且欲聞外事遽與復資數月之間日貢章疏多斥讟貴近自謀進取至是又上章求為過海使帝因發怒仍以其醜行日彰故除名逐之於沙門島也譴責夫黜其不端所以正邦典已而無慍所以保士常其有侍從禁闥周旋帝幄參切近之職典清要之任或處躬之匪恪莅事之靡精視履之致愆操心之多僻而乃罹於公憲加乎威讓身被斥免以從吏議至乃嬰絓煩令遵承縟禮智力不逮成乎違闕斯亦國章之所及焉復有内敦直操聿修仁行遭横怒之攸及以朴忠而獲戾者良可嗟矣漢東方朔武帝時為大中大夫給事中坐醉入殿中小遺殿上劾不敬詔免為庶人王章為諌議大夫元帝初擢左曹中郎將與御史中丞陳咸相善共毁中書令石顯為顯所䧟免官鄭崇哀帝時為尚書僕射數以職事見責發疾頸癰欲乞骸骨不敢尚書令趙昌佞謟素害崇知其見踈因奏崇與宗族通疑有姦請治帝責崇曰君門如市何以欲禁切主上崇對曰臣門如市臣心如水願得考覆帝怒下獄窮治死獄中唐林為尚書僕射司𨽻孫寳奉請覆治中山孝王母馮太后獄傅太后大怒哀帝順指下寳獄林争之帝以林朋黨比周左遷燉煌魚澤障候王林卿為侍中通輕俠傾京師後坐法免後漢虞詡順帝永和初為尚書令以公事去官蔡衍為議郎符節令順帝時南陽太守成瑨等以收糾宦官考廷尉衍與議郎劉瑜表救之言甚切厲坐免官還家杜門不出張俊與兄龕並為尚書郎年少勵氣節朱濟丁盛立行不修俊欲舉奏之二人聞恐因郎陳重雷義往請俊俊不聽因其私賂侍史使求俊短得其私書與司空袁敞子遂封上之皆下獄當死俊自獄中占獄吏上書自訟占謂口授也書奏而俊獄以報謂奏報論死也廷尉將出糓門臨行刑糓門雒陽北靣中門鄧太后詔馳騎以減死論魏諸葛誕明帝時為尚書與夏侯𤣥鄧颺等相善收名朝廷京都翕然言事者以誕颺等修浮華合虚譽漸不可長帝惡之免誕官蜀楊儀先主為漢中王時拔儀為尚書先主稱尊號東征吳儀與尚書令劉巴不睦左遷遥署𢎞農太守來敏後主時為光禄大夫坐過黜敏前後數貶削皆以語言不節舉動違常也晉華廙恵帝時為尚書令應太傅揚駿召不時還有司奏免官孔坦元帝時為尚書郎有典客令萬黙領諸胡胡人相誣朝廷疑黙有所偏助將加大辟坦獨不署繇是被譴遂棄官刁協為尚書侍郎盧綝將入直遇協於大司馬門外協醉使綝避之綝不廻協令威儀牽捽綝墮馬至協車前而後釋御史中丞熊逺奏免協官蔡謨成帝時為吏部尚書㑹冬蒸謨領祠部主者忘設明帝位與太常張泉俱免白衣領職宋謝景仁晉末為吏部尚書坐選吏部令史邢安泰為都令史平原太守二官共除安泰以令史職拜謁陵廟為御史中丞鄭鮮之所糾白衣領職傅隆文帝時為民部尚書以正直受節假對人未至委出白衣領職顧琛為尚書庫部郎帶本邑中正舊制八座以下門生隨入者各有差不得雜以人士琛以宗人顧碩頭寄尚書張茂慶門名而與碩頭同席坐明年坐遣出免中正凡尚書官大罪則免小罪則出出者百日無代人聽還本職蔡興宗孝武時為侍中每正言得失無所顧憚繇是失㫖竟陵王誕據廣陵城為逆事平興宗奉㫖慰勞州别駕范義與興宗素善在城内同誅興宗至廣陵躬自收殯致喪還豫章舊墓帝聞之甚不恱廬陵内史周朗以正言得罪鏁付寜州親戚故人無敢贍送興宗直在請急詣朗别帝知尤怒坐屬疾多白衣領職袁粲初名愍孫孝武時為吏部尚書皇太子冠孝武臨宴東宫愍孫勸顔師伯酒師伯不飲愍孫因相裁辱師伯見寵於帝帝嫌愍孫以寒素凌之因此發怒出為海陵太守泰始二年為僕射遷尚書令坐選武衛將軍江栁為江州刺史栁有罪降為守尚書令殷恒明帝時為度支尚書屬父道矜疾積乆為有司所奏詔曰殷道矜生便有病更無横疾恒愚習惰久妨清序左遷散騎常侍王諶明帝時為中書舎人見帝所行慘僻屢諌不從請退坐此見怒繫尚方少日出之陸澄為尚書殿中郎郎官舊有坐杖有名無實澄在官積前後罰一日并受千杖南齊薛淵武帝時為散騎常侍帝車駕幸安樂寺淵從駕乗虜橋先是勅羌虜橋不得入仗為有司所奏免官見原王奐武帝時為尚書右僕射本州中正校籍郎王植屬吏部郎孔琇之以校籍令史俞公喜求進署矯稱奐意植坐免官梁陸杲髙祖時起家齊中軍法曹行參軍太子舎人衛軍王儉主簿遷尚書殿中曹郎拜日八座丞郎並到上省交禮而杲至晩不及時刻皆免官王騫為中書令加貟外散騎常侍髙祖於鍾山西造大愛敬寺騫舊堡在寺側有良田八十餘頃即晉丞相王導賜田也帝遣主書宣㫖就騫求市欲以施寺騫答㫖云此田不賣若是勅所取不敢言酬對又脫畧帝怒遂付市評田價以直逼還之由是忤㫖出為吴興太守謝㡬卿髙祖時為尚書左丞以在省署夜著犢鼻褌與門生登閤道飲酒酣嘑為有司糾奏坐免官庾仲容為尚書左丞坐推糾不直免官顧協為通直散騎侍郎兼中書通事舎人大通三年霆擊大船華表然盡建康縣馳啓協以為非吉祥未即呈聞後髙祖知之曰霆之所擊一本罰惡龍一彰朕之有過協掩惡揚善非曰忠公由是免陳陸山才為度支尚書坐侍宴與蔡景歴言語過差為有司所奏免官後魏封懿道武時自慕容寳民部尚書歸闕除給事黄門侍郎帝數引見問以慕容舊事懿應對疎慢廢還家張彛孝文時為尚書引襲常山王素孫昭兼殿中郎帝将為齊郡王蘭舉哀而昭乃作宫懸帝大怒昭曰阿倪昭小字愚騃誰引為郎於是黜彛白衣守尚書昭遂停廢陸叡為尚書令時廣陵王羽字叔翻為太尉録尚書事領廷尉卿孝文謂羽曰汝自在職以來功勤之績不聞於朝阿黨之音頻干朕聽汝之過失已備積於前不復能别敘今黜汝録尚書廷尉但居特進太保又謂叡曰叔翻在省之初甚有善稱自近以來偏頗懈怠豈不繇卿等隨其邪偽之心不能相導以義雖不成大責已致小罰今奪卿尚書令禄一周謂左僕射元贊曰卿夙徳老成久居機要不能光贊物務奨勵同僚賊人之謂豈不在卿計叔翻之黜卿應大辟但以咎歸一人不復相罪又為少師未允所授今解卿少師之任削禄一周詔吏部尚書澄曰叔父既非端石又非座元豈宜濫歸衆過也然觀叔父神志驕傲少保之任似不能存意可解少保謂長兼尚書于杲曰卿履厯卑淺超昇名任不能勤謹夙夜數辭以疾長兼之職位亞正貟今解卿長兼可光禄大夫守尚書削禄一周又謂守尚書尉羽曰卿在集書殊無憂存左史之事今降為長兼常侍守尚書亦削禄一周又謂守尚書盧淵曰卿始為守尚書未合考績然卿在集書雖非髙功為一省文學之士嘗不以左史在意如此之咎罪無所歸今降卿長兼王師守常侍尚書如故奪常侍禄一周謂左丞公孫良右丞乞伏義受曰二丞之任所以協賛尚書光宣出納而卿等不能正心直言規佐尚書論卿之罪應合大辟但以尚書之失事鍾叔翻故不能别致貶責二丞可以白衣守本官冠服禄恤盡皆削奪若三年有成還復本任如其無成則永歸南畞又謂散騎常侍元景曰卿等自任集書合省逋墮致使王言遺滯起居不修如此之咎責在於卿今降為中大夫守常侍奪禄一周任城王澄為吏部尚書孝文曰王者不降佐於蒼昊皆拔才而用之朕失於舉人任許一羣婦人軰竒事當更詮簡耳任城在省為舉天下綱維為當署事而已澄曰臣實署事而已帝曰如此便一令史矣何待任城又曰我遣舍人宣詔何為使小人聞之澄曰時雖有幹吏去榜亦逺帝曰逺則不聞聞則不逺既得聞詔理故可知於是留守羣臣遂免冠謝罪崔侃以竊級為中書郎為尚書左丞和子岳彈糾失官李彦為諫議大夫孝文考績謂彦曰卿雖處諫議之官實人不稱職可去諫議退為元士邢昕孝明時為中書侍郎光禄大夫時言冐竊官級為中尉所劾免官乃為述躬賦北齊宋㳺道東魏末為御史中尉東萊人王道習參御史選限外投狀道習與㳺道有舊使令史受之文襄怒杖㳺道而判之曰㳺道禀性遒悍是非肆口吹毛洗垢瘡疵人物往與郎中蘭景雲忿競列事十條及加推窮便是虚妄方共道習凌侮朝典法官而犯特是難原宜付省科㳺道被禁獄吏欲為脫枷㳺道不肯曰此令公命所著不可輙脫文襄聞而免之㳺道抗志不改王松年文宣時為尚書郎中魏收撰魏書成松年有謗言帝怒禁止之仍加杖罰嵗餘得免除臨漳令崔瞻為尚書吏部郎中因患取急十餘日舊式百日不上解官吏部尚書尉瑾性褊急以瞻舉措舒緩曹務繁劇遂附驛奏聞因而被代瞻遂免歸郷里唐邕為尚書令封晉昌王録尚書事屬周師來宼丞相髙阿那肱率兵赴援邕配割不甚從允因此有隙肱譖之遣侍中斛律孝卿宣㫖責讓留身禁止尋釋之隋鄭譯初仕後周宣帝時為天官都府司㑹總六府事以職汚被踈以上柱國歸第及隂呼道士章醮以祈福助其婢奏譯壓蠱左道帝謂譯曰我不負公此何意也譯無以對譯又與母别居為憲司所劾由是除名下詔曰譯嘉謨良䇿寂爾無聞鬻獄賣官沸騰盈耳若留之於世在人為不道之臣戮之於朝入地為不孝之鬼有累幽顯無以置之宜賜以孝經令其熟讀仍遣與母共居李徳林為内史令初後周大象末髙祖以逆人王謙宅賜之文書已出至地官府忽復改賜崔謙帝語徳林曰夫人欲得與其舅於公無形迹不須争之可自選一好宅若不稱意當為營造并覔莊店作替徳林乃奏取逆人髙阿那肱衛國縣市店八十塸為王謙宅替開皇九年車駕幸晉陽店人上表訴稱地是民物髙氏强奪於内造舎帝命有司斷還價直遇蘇威自長安至奏云髙阿那肱是亂世宰相以謟媚得幸枉取民地造店賃之徳林誣罔妄奏自入李圎通馮世基等又進云此店收利如食千戸請計日追賍帝因責徳林徳林請勘逆人文簿及本換宅之意帝不聴乃悉追店給所住者由是益嫌之十年虞慶則等於關東諸道廵省還並奏云五百家鄉正専理辭訟不便於民賞罰愛憎公行貨賄帝仍令廢之徳林復奏云此事臣本以為不可然署來始爾復即停廢政令不一朝成暮毁深非帝王設法令之義臣望陛下若於律令輙欲改張即以軍法從事不然者紛紜未已帝遂發怒大詬云爾欲將我作王莽耶初徳林稱父為太尉諮議以取贈官李元操與陳茂等隂奏之曰徳林之父終於校書妄稱諮議帝甚銜之至是復庭議忤意因數之曰公為内史典朕機密比不預計議者以公不𢎞耳寕自知乎朕方孝治天下恐斯道廢闕故立五教以𢎞之公言孝繇天性何須設教然則孔子罔說孝經也又㒺冐取店妄加父官朕實忿之而未能發今當以一州相遣耳因出為湖州刺史徳林拜謝曰臣不敢望内史令請預散參侍陛下登封告成一觀盛禮然後守拙丘園死且不恨帝不許蘇威為納言開皇中從上太山坐不敬免俄而復位仁夀初復拜尚書右僕射文帝幸仁夀宫以威總留後事及帝還御史奏威職事多不理請推之帝怒詰責威威拜謝帝亦止楊約煬帝時為光禄大夫時帝在東都令約詣京師享廟行至華隂見其兄墓遂枉道拜哭為憲司所劾坐是免官唐裴矩太宗時為民部尚書奏突厥踐暴之處戸請給絹一匹太宗曰朕臨天下惟誠與信不欲空有存恤之名而無其實但戸有大小各須存濟給物雷同豈公私之至也治書御史孫伏伽進曰裴矩受國恩賞未聞陳讓救恤百姓則欲茍釣虛名用心若是豈當朝寄請鞫其罪太宗從之其後計口為率貧人賴焉許敬宗為中書舍人貞觀十年百官為文徳皇后縗絰率更令歐陽詢狀貌醜異衆或指之敬宗見而大笑為御史所劾左授洪州都督府司馬劉允濟中宗時為鳳閣舍人神龍初坐與張易之欵狎左授青州長史竇希玠為工部尚書神龍中坐以子死秘不發喪冐充懿徳太子宜婚使左授太子詹事李繁徳宗時為左拾遺貞元十五年七月詔以山南西道節度都虞候嚴礪為本道節度使宣詔畢諫議大夫苗拯給事中許孟容李元素陳京補闕王紓等並歸門下省或議以嚴礪資歴既淺人望亦輕遽領旄節恐未允當既兼雜論言議喧然繁遂上言昨除拜嚴礪衆議以為不當拯云已三度表論未蒙見聽許孟容問拯論實奏乎拯頷頤而笑孟容曰誠如此不曠職矣又云李元素陳京王紓並見拯及孟容言議帝遣三司使詰之拯狀云實於衆中言曾論奏不言三度繁證之不已孟容等又云拯實言二度拯請依衆狀由是貶拯萬州刺史繁播州參軍並同正段平仲為監察御史磊落尚氣節嗜酒敢言時徳宗春秋髙多自聽斷由是庶務或不理中外畏帝嚴察無敢言者平仲常謂人曰主上聰明神武但臣下畏懼各自循黙耳使某一得召見必當大有開悟㑹貞元十四年京師旱詔擇御史郎官各一人發廪賑䘏平仲與考功貟外郎陳歸當奉使因得對及入坐粗陳本事帝察平仲意有所蓄以陳歸在側不言及事奏畢當出平仲獨不退欲有啓帝因兼留陳歸聲色甚厲雜以他語平仲錯愕都不得言因誤稱其名帝怒叱出之平仲蒼惶又誤直趨御障後陳歸下階連呼乃得出由是坐廢七年亦因此名顯張彧貞元十四年自刑部侍郎除衛尉卿初有詔令三司使推按僧法湊獄不叶頗甚中丞宇文邈上表辭官不許彧時又疾病請歸休帝意以為假托事故彧改官邈受令刑部郎中宇文炫同推事以邈與炫宗姓又改令盧䖍裴郁為兵部貟外郎郁褊狭但獨見自是因徴本曹㕑利錢苛細寡恕令史凡四十人並曹而逃信宿招綏乃復詔移郁閒官乃左授太子洗馬罪令史之首惡者笞四十楊於陵憲宗時為戸部侍郎元和初以考䇿登進直言為累出為嶺南節度使崔迾音列為右部補闕李諒為左拾遺元和二年咸以交㳺猥雜迾貶為長水縣令諒貶為澄城縣令王涯為翰林學士拜右拾遺元和三年四月詔賢良方正能直言極諫舉人第三等牛僧孺皇甫湜李宗閔等委中書門下優與處分時牛僧孺皇甫湜李宗閔條對甚直無所畏避權倖惡其抵已有不中第者注解其䇿同為班誹言王涯與外甥皇甫湜登科不先上言遂左授涯為都官員外郎考官吏部貟外郎韋貫之為果州刺史數月再黜為巴州刺史涯為虢州刺史楊歸厚為左拾遺元和七年十二月勅曰楊歸厚頃以詞藝擢於諌垣自處班行頗修職業但列於清近當慎威儀以婚姻之私假借公館表章上獻慢凟則多俾移秩於國庠仍分曹於雒邑可國子主簿分司東洛歸厚将娶婦謂已官處近侍當動以聞率然上章借郵逓院帝責其輕易遂黜焉鄭良宰為通事舍人元和十一年四月詔曰聞鄭良宰本非士族豈容塵參班行宜削鄉所官通事舎人知館事楊造輕有論薦頗乖言慎宜罰一月俸嚴公衡為右司郎中韋𢎞景為吏部郎中元和十三年出公衡為和州刺史𢎞景為緜州刺史初張仲方以駁李吉甫謚得罪或謂仲方之議皆𢎞景教之公衡又助成焉故有是命李景儉為諫議大夫元和十五年正月貶建州刺史景儉初坐竇羣自監察御史貶山陵戸曹轉忠州刺史授代至京除豐州刺史延英辭曰景儉恃有中助因盛言己屈退及日華門遽宣不令赴郡除倉部貟外郎未一月拜中大夫性凌物自髙視將相如匹庶因酒則誇傲尤甚至是宰相奏逐之制曰夫士之出處則辨其正邪人之踐修宜勵其始終茍不容於公論誠難逭於國章况其擢自宗支常探儒術洊歴臺閣亦分郡符而動或違仁行不繇義附權倖以虧節通姦黨之隂謀衆情皆疑羣議難息據因縁之狀當置嚴科順長養之時特從寛典免於省過無或狥非可建州刺史李益為右常侍元和十五年入閣失儀侍御史許康佐叅奏乖錯俱待罪各罰俸一月李師素為兵部貟外郎元和十五年九月坐與令狐楚親出為資州刺史李渤穆宗時為考功貟外郎長慶元年五月貶為䖍州刺史渤既請書宰相下考時論不一而識者以宰輔官不上疏陳列而越職釣竒非盡事君之道者也至是杜元穎等奏曰渤賣直沽名動多狂躁聖恩含貸且使守官而干進多端外交方鎮逺求奏請不能自安久留在朝轉恐生事遂出之楊嗣復為庫部郎中知制誥長慶元年十二月諫議大夫李景儉與起居舍人温造等自史館同飲乗醉遂入中書面詰侮宰相景儉貶彰州刺史造朗州刺史嗣復與兵部郎中知制誥馮宿能雖先起亦合有懲宜罰一年俸張權輿為左拾遺敬宗寳厯二年坐前侵毁裴度出為河中府虞鄉縣令裴夷為右拾遺文宗太和元年正月夷與直史館李虞集賢修撰劉軻各罰一月俸以送桂州觀察使劉栖楚至藍田縣經宿方廻為監館驛御史所舉也韋處厚為考功貟外郎早為宰相韋賢之所重時賢之以議兵不合上㫖處厚坐友善出為開州刺史楊虞卿為吏部貟外郎太和三年三月勑三司推勘吏部渝濫官事其間要切節目皆如臺按李賔過狀稱虞卿奴受錢三百千勘其察知自送府縣奴已決責錢亦納官又稱送錢并買婢等事悉無證據但虞卿兩年専判曹務偽濫六十餘人連甲團空近日無例遂令禄位制自滑偍雖能續自舉明終失從前鈐轄况勘官知偽久不公論𨼆闕報銓每將私用公私且乖於簡下事理故難於守官宜停見任餘准前勅處分韋厚叔為左補闕太和四年十月貶為河中府河西縣令右補闕内供奉張文規為河南府温縣令右拾遺内供奉南卓為江陵府松滋縣令史三人裴度先所引擢不厭公議至是度出鎮執政者採公論而去之卓與厚叔時人尤以為當舒元輿為刑部員外郎太和五年貶為秘書省著作郎仍分司東都以其上表累請効用并進文章朝廷責其躁進自伐故有此授王直方為右補闕太和九年出為興元府城固縣令直方始為鎮州册贈使謁祖墓於邢州時節度使劉從諫自以位兼宰相於直方禮有所不至直方飲酣頗以語侵之從諫怒具以表聞直方素有直疏帝雖嘉之然非當時姦邪所樂及是以直方家於城固因而遣之崔侑為工部侍郎充皇太子侍讀太和九年貶為洋州刺史吏部郎中張諷為䕫州刺史考功郎中充皇太子侍讀蘇滌為忠州刺史戸部郎中楊敬之為連州刺史殿中侍御史蘇特為潘州司戸侍御史李甘為封州司馬臣欽若等按文宗本紀時李訓鄭注用事不附己者即時貶黜梁王舜卿為吏部侍郎翰林學士乾化二年九月太祖北廵廻至化黄縣勅舜卿等駕發魏州之初扈從不至各罰兩月俸後唐李鏻莊宗時自宗正卿遷工部侍郎同光三年七月勅罰罪賞功大朝常憲掩瑕宥過前聖格言工部侍郎李鏻宗正少卿李瓊等早在公途忝居班列靡思畏懼各犯刑章因補置官吏之秋見詐偽依違之迹自招罪狀合置嚴科但以常預臣僚始當興復特示哀矜之㫖俾寛流遣之文降秩趨朝殊為輕典推恩念舊所宜慎思鏻可責授朝散大夫司農少卿瓊可責授朝議郎守太子中舎初魏州興建李鏻為宗正卿李仁為少卿赴州昭應縣有獻祖宣皇帝建初陵少祖光皇帝啓運陵帝踐阼之後宗正司條奏陵園故事請量建建初啓運陵臺令許之時偽稱宗子者數百宗寺既無譜牒無憑證據有昭慶百姓稱宗子言世為丹陽竟陵臺令投詣宗寺請為臺令李瓊莫測其繇憑其偽書即而補之其人既至本處出入建絳旌豪視長吏復侵奪近墓民田百餘頃言是陵園壖地百姓詣府陳訴州府不能辨疑乃具狀聞天子下公卿訪丹陽竟陵故事是何帝寝遂簡列聖陵園及追封髙祖太子諸王尊號者皆無丹陽竟陵之號其偽百姓宗正司吏皆伏法瓊鏻以不覆實謬補奸人貶之盖以有鏻從龍舊恩也丹陽之地比無南方竟陵之名六朝故事鏻等不知書之故也王丞弁為祠部郎中明宗長興元年九月以奏狀背縫著姓罰一月俸裴坦為司封郎中長興二年八月渭州刺史石可球母在而所司悮入贈封之甲勅㫖可球母王氏可别封太原縣君裴坦㸃簡不精罰一月俸本行令史委吏部流内銓量罪科决晉王權髙祖時為兵部尚書天福三年十月詔曰王權昨差北朝國信使堅不肯收接勅牒兼有狀推托事故不遵朝命者王權久在班行衆推夙舊固曉為臣之節宜遵事主之規豈得纔命乗軺遽聞托故莫有奉公之道益彰慢事之心若以道路迢逺即鸞閣之台臣亦往若以筋骸衰減即鳳山之册禮纔廻既黷憲綱宜從殿黜宜停是任仍勒歸私家周賈緯太祖時為給事中史館修撰廣順元年十月貶為平盧軍節度行軍司馬檢校禮部尚書緯歴官平轉心常憤悱太祖踐祚竇貞因蘇禹珪仍在相緯駁其除改不當上章論列又於所修厯日内言有歴詆中外人士者時王峻監修國史覽之不恱曰賈給事家有子自兹亦要門閥無玷今非毁滿朝教士子何以進身備於帝前言其短故有此授册府元龜卷四百八十一
