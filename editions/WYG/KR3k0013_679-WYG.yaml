body:
  text: 册府元龜卷六百七十九宋王欽若等撰牧守部廉儉班固有言曰謹身帥先居以廉平不至於嚴而民從化者循吏之道也是知公廉則絶私清儉則寡欲故能使政平而訟理吏肅而民服焉周禮小宰之職弊羣吏之治者有六皆以廉為本傳曰以約失之者鮮矣歴代而下居牧守之任以清白著稱者比比有之是皆以道化人砥名礪節確然有守湼而不緇者也至若斬馬芻而席羊皮衣祗裯而宿樹下者斯固克已過差偪下已甚然迹其矯抗亦有所激云漢何並為潁川太守名次黄覇性清廉妻子不至官舍後漢張堪為蜀郡太守後遷漁陽光武嘗召見諸郡計吏問其風土及前後守令能否蜀郡計掾樊顯進曰漁陽太守張堪昔在蜀其仁以惠下威能討姦前公孫述破時珍寳山積捲握之物足富十世而堪去職之日乗折轅車布被囊而已帝聞良久歎息羊續為南陽太守府丞嘗獻其生魚續受而懸於庭丞後又進之續乃出前所懸者以杜其意第五倫為㑹稽太守雖為二千石躬自斬芻養馬妻執炊㸑受俸裁留一月糧餘皆賤貿與民之貧羸者趙咨為東海相在官清簡計日受俸豪黨畏其儉節袁忠為沛相乗葦車到官以清亮稱周䊸為渤海太守免歸䊸廉潔無資嘗築塹以自給章帝聞而憐之復以為郎楊震為東萊太守當之郡道經昌邑故所舉荆州茂才王宻為昌邑令謁見至夜懐金十斤以遺震震曰故人知君君不知故人何也宻曰暮夜無知者震曰天知神知我知子知何謂無知宻愧而出後轉涿郡太守性公廉不受私謁子孫嘗蔬食歩行故舊長者或欲令為開産業震不肯曰使後世稱為清白吏子孫以此遺之不亦厚乎楊秉震之子歴豫荆徐兖四州刺史遷任城相自為刺史二千石計日受俸餘祿不入私門故吏齎錢八萬遺之閉門不受以廉潔稱張禹為下邳相廵行守舍止大樹下食糒飯飲水而已羊陟為河南尹計日受俸嘗食乾飯茹菜禁制豪右京師憚之李庸為蜀郡太守蜀之珍玩不入於門益州紀其政化劉虞為甘陵相綏撫荒餘以蔬儉率下後為幽州刺史清静儉約以禮義化民靈帝時南宫災吏遷補州郡者皆責助治宫錢或一千萬或二千萬富者以私財辦或發民財以備之貧而清慎者無以充調或至自殺帝以虞清貧特不使之出錢劉表在荆州幾二十年家無餘積魏楊沛漢建安中代張旣領京兆尹前後宰歴城守不以私計介意又不肯以事貴人故身退之後家無餘積治疾於家借舍從兒無他奴婢後占河南夕陽亭部荒田二頃起蝸牛廬居止其中其妻子凍饑沛病亡鄉人親友及故吏民為殯葬之梁習再為并州刺史在州二十餘年而居處貧窮無方面珍物明帝異之禮賜甚厚司馬朗為兖州刺史雖在軍旅嘗麄衣惡食儉以率下令狐邵為𢎞農太守所在清如氷雪妻子希到官省孟康為𢎞農太守時出案行皆豫勅督郵卒吏不得令屬官遣人探候修設曲敬又不欲煩損吏民嘗豫勅吏卒行各持鐮所在刈馬草不止停傳露宿樹下又所從嘗不過十餘人郡帶道路其諸過賔客自非公所無所出給若知舊造之自出於家康之始拜衆人雖知其有志量以其未嘗宰牧不保其能也而康恩澤治能乃爾吏民稱焉裴潜歴代郡太守沛國相兖州刺史每之官不將妻子妻子貧乏織䔧芘以自供為兖州時嘗作一胡牀及其去也留以挂柱髙慎為東萊太守老病歸家草屋蓬户甕缶無儲其妻謂之曰君累經宰守積有年嵗何能不少為儲畜以遺子孫乎慎曰我以勤身清名為之基以二千石遺之不亦可乎胡威字伯武荆州刺史質之子為徐州刺史勤於政術風化大行後入朝武帝語及平生因歎其父清謂威曰卿孰與父清對曰臣不如也帝曰卿父以何為勝耶對曰臣父清恐人知臣清恐人不知是臣不及逺也初質為荆州威自京都定省家貧無車馬僮僕自驅驢单行每至客舍躬放驢取樵炊㸑食畢復隨侣進道既至見父停廐中十餘日告歸父賜絹一疋為装威曰大人清髙不審於何得此絹曰是吾俸祿之餘以為汝糧耳威受之辭歸質帳下都督先威未發請假還家隂資裴於百餘里要威為伴每事佐助行數百里威疑而誘問之既知乃取所賜絹與都督謝而遣之後因他信以白質質杖都督一百除吏名其父子清白如此晉鄭冲自尚書郎出補陳留太守以儒雅為徳蒞職無幹局之譽簞食緼袍不營資産世以此重之鄧攸為太子中庻子時吳郡闕守人多欲之元帝以授攸攸載米之郡俸祿無所受唯飲吳水而已其後以疾去職郡嘗有送迎錢數百萬攸去郡不受一錢吳隠之為晉陵太守在郡清儉妻自負薪及為廣州刺史未至州二十里地名石門有水曰貪泉飲者懐無厭之欲隠之旣至語其親人曰不見可欲使心不亂越嶺喪清吾知之矣乃至泉所酌而飲之因賦詩曰古人云此水一飲懐千金試使夷齊飲終當不易心及在州清操愈厲常食不過菜及乾魚而已帷帳器服皆付外庫時人頗謂其矯然亦始終不易帳下人進魚毎剔去骨存肉隠之覺其用意罰而黜焉歸舟之日装無餘資及至自番禺其妻劉氏齎沉香一斤隠之見之遂投於湖亭之水王遜為上雒太守私牛馬在郡生駒犢者秩滿悉以付官云是郡中所産也謝尚為江夏相始到官郡府以布四十疋為尚造烏布帳尚壊之以為軍士襦袴丁潭為東陽太守以清潔見稱孔愉為㑹稽内史在郡三年乃營山隂湖南侯山下數畆地為宅草屋數間便棄官居之送資數百萬悉無所取病篤遺令歛以時服鄉邑義􅈖一不得受陸納為吳興太守將之郡先至姑孰辭桓温因問桓公曰公致醉可飲幾酒食肉多少温曰年大來飲三升便醉白肉不過十臠復云卿何納曰素不能飲止可二升肉亦不足言後伺温閑謂之曰外有㣲禮方守逺郡欲與公一醉以展下情温欣然納之時王坦之刁彛在坐及受禮唯酒一斗鹿肉一柈坐客愕然納徐曰明公近云飲酒三升納止可二升今有一斗以備杯杓餘瀝温及賔客並歎其率素更勅中厨設精饌酣飲極懽而罷納至郡不受俸祿頃之徴拜左民尚書領州大中正將應召外白宜装幾船納曰私奴裝糧食來無所復須也臨發止有被襆而已其餘並封以還官殷仲堪為荆州刺史連年水旱百姓饑饉仲堪食常五椀盤無餘肴飯粒落席間輙拾以噉之雖欲率物亦縁其性真素也毎語子弟云人物見我受任方州謂我豁乎昔時意今吾處之不易貧者士之常焉得登枝而捐其本爾其存之桓嗣為江州刺史蒞事簡約修所住齋應作版檐嗣命以茅代之版付船官宋臨川王義慶為荆州刺史性謙虚始至及去鎮迎送物並不受劉亮為梁益二州刺史在任廉儉不營財貨所得公祿悉以還官明帝嘉之下詔褒美申怙為青州刺史又督冀州性清約頻處州郡妻子不免饑寒世以此稱之死之日家無餘財劉秀之為梁州刺史遷益州秀之折留俸祿二百八十萬付梁州鎮庫此外蕭然王鎮之為安成太守以母憂去職在官清儉妻子無以自給乃棄家致喪還上虞曰墓畢為子標之求安復令隨子之官後為廣州刺史宋髙祖時為相謂人曰王鎮之少著清績必將繼美吳隠之嶺南之弊非此不康也在鎮不受俸祿蕭然無營去官之日不異始至江秉之為新安太守轉臨海並以簡約見稱所得祿秩悉㪚之親故妻子嘗饑寒人有勸其營田者秉之正色曰食祿之家豈可與農人競利在郡作書案一枚及去官留以付庫阮長之為武昌郡先是郡縣田祿以芒種為耕期此前去官者則一年秩祿皆入前人此後去官者則一年秩祿皆入後人始以元嘉末改此科計月分祿長之去武昌郡代人未至以芒種後一日觧印綬初發京師親故或以器物贈别得便緘錄後歸悉以還之長之前後所蒞官皆有風政為後人所思王琨自廷尉出為廣州刺史先是刺史但經城門一過便得三千萬琨無所取納表獻禄俸之半州鎮舊有鼓吹又啟輸還及罷任孝武知其清問還資多少琨曰臣賣宅百三十萬餘物稱之帝悦其對復為廷尉加給事中朱修之為雍州刺史徴為左民尚書去鎮秋毫不犯計在州然油及牛馬榖草以私錢十六萬償之南齊王延之初仕宋為吳郡太守罷郡還家産無所增益後為江州刺史在州祿俸以外一無所納劉亮仕宋為梁益二州刺史在任廉儉所得公禄悉以還官宋明帝下詔褒美王僧䖍為湘州刺史清簡無所欲不營財産百姓安之丘仲起為晉平郡守清亷自立褚淵歎曰見可欲心能不亂此楊公所以遺子孫也劉懐慰為齊郡太守不受請謁民有餉其新米一斛者懷慰出所食麥飯示之曰且食有餘幸不煩此因著亷吏論以逹其意太祖聞之手勅褒賞進督秦沛二郡妻子在都賜米三百斛兖州刺史栁世隆與懐尉書曰膠東淵化潁川致美以今方古曾何足云王沈為長沙太守清亷戒慎身嘗居禄而居處日貧死之日無宅可憇故吏為營棺柩裴昭明為廣陵太守嘗謂人曰人生何事須聚蓄一身之外亦復何須子孫若不才我聚彼㪚若能自立則不如一經故終身不治産業范述曾為永嘉太守勵志清白不受饋遺明帝下詔褒美徴為逰擊將軍郡送故舊錢二十餘萬一無所受唯得白桐木火籠朴十餘枚而已孔琇之為臨海太守在任清約罷郡還獻乾薑二千斤世祖嫌少及知琇之清乃歎息蕭赤斧為雍州刺史在州不營産利勤於奉公蕭恵基為淈東武陵内史豫章東陽太守凡歴四郡無所蓄聚蕭坦之為右將軍東昏侯時遣主帥黄文濟領兵圍坦之宅收之坦之從兄翼宗為海陵郡將發坦之謂文濟曰從兄海陵宅故應無他文濟曰海陵宅在何處坦之告文濟曰應得罪仍遣收之簡家赤貧唯有質錢帖子數百還以啟帝原死繫尚方梁庾蓽仕齊為輔國長史㑹稽郡丞行郡府事時承凋弊之後百姓㐫荒所在榖貴米至數千民多流㪚蓽撫循甚有治理唯守公禄清節逾厲至有經日不舉火太守永陽王聞而饋之蓽謝不受及天監元年卒停屍無以殮柩不能歸髙祖聞之詔賜絹百疋米五十斛顧憲之初仕齊為豫章太守中興二年義師平建康髙祖為揚州牧徴憲之為别駕從事史比至髙祖已受禪憲之風疾漸篤固求還吳天監二年就家授大中大夫憲之雖累經宰郡資無擔石及歸環堵不免饑寒楊公則初仕齊為晉夀太守在任清潔自守後為武寕太守在郡七年資無擔石百姓便之及天監初為湘州刺史四年徴中護代至乗二舸便發送故一無所取王僧孺天監初為南海太守郡嘗有髙凉生口及海船每嵗數至外國賈人以通貿易舊時州郡以半價就市又買而即賣其利數倍歴政以為常僧孺乃歎曰昔人為蜀郡長史終身無蜀物吾欲遺子孫者不在越裝竝無所取任昉天監中為義興太守在任清潔兒妾食麥而已友人彭城到漑漑弟洽與昉共為山澤㳺及被代登舟止有米五斛旣至無衣鎮軍將軍沈約遺裙衫迎之傅昭為成安内史郡溪無魚或有暑月薦昭魚昭旣不納又不欲拒遂餒于門側又為臨海太守郡有宻巖前後太守皆自封固專收其利昭以周文之囿與百姓共之大可喻小乃教勿封縣令嘗餉粟寘絹于簿下昭笑而還之裴䆳為梁秦二州太守開創屯田民吏獲安乃相率餉絹千餘疋䆳從容曰汝等不應爾吾又不可違納其絹二疋而已夏侯亶歴為六郡二州不修産業租賜所得隨㪚親故性儉率居處服用充足而已不事華侈晚年頗好音樂有妓妾數十人竝無被服姿容每有客嘗隔簾奏之時謂簾為夏侯妓衣也王瞻為晉陵太守潔已為政妻子不免饑寒江革為武陵王長史㑹稽郡丞行府州事門生故吏家多東州聞革應至並齎持縁道迎候革曰我通不受餉不容獨當故人箱篚至鎮唯資公俸食不兼味及徴為都官尚書將還民皆戀惜之贈遺一無所受送故依舊舸舫革並不納唯乗臺所給一舸艚偏欹不得安卧或謂革曰船旣不平濟江甚險當移徙重物以迮輕艚革旣無物乃於西陵岸取石十餘片以實之其清貧如此庾域為懐寜太守罷任還家猶事井臼而域所衣大布餘俸專充供養蕭勵為廣州太守邉海舊饒外國舶至多為刺史所侵每年舶至不過二數及勵至纎毫不犯嵗十餘至俚人不賔多為海暴勵征討所獲生口寳物軍賞之外悉送還臺前後刺史皆營私蓄萬物之貢少登天府自勵在州嵗中數獻軍國所須相繼不絶武帝歎曰朝廷便是更有廣州蔡樽為吳興太守口不言錢在吳興不飲郡井齋前自種白莧紫茄以為常餌詔褒其清加信武將軍伏暅為永陽内史在郡清潔治務安静郡民何貞秀等一百五十四人詣州言狀湘州刺史以聞詔勘有十五事為吏民所懐髙祖善之徴為新安太守在郡清恪如永陽時民賦税不登者輙以太守田米􅂇之郡多麻苧家人乃至無以為繩其厲志如此屬縣始安新安海寜並同時生為立祠孫謙自少及老歴二縣五郡所在廉潔居身儉素牀施籧篨屏風冬則布被莞席夏日無幬帳而夜未嘗有蚊蚋人多異焉何逺為武昌太守杜絶交逰饋遺秋毫無所受武昌俗皆汲江水盛夏逺患水温每以錢買民井寒水不取錢者則輦水還之其他事率多如此跡雖似偽而能委曲用意焉車服尤弊素器物不用銅漆江左多水族甚賤逺每食不過乾魚數片而已蕭洽為南徐州治中旣近畿重鎮吏數千人前後居之者皆致巨富洽為之清身率職饋遺一無所受妻子不免饑寒范縝為晉安太守在郡清約資公禄而已王勵為南海太守行廣州府事越中饒沃前後守宰例多貪縦勵獨以清白著聞王珍國為桂陽内史罷任還都路經江州刺史栁世隆臨渚餞别見珍國還裝輕素乃數曰此真可謂良二千石也陳孔奐為晉陵太守晉陵自宋齊以來舊為大郡雖經冦擾猶為全實前後二千石多行侵暴奐清白自守妻子並不之官唯以單船臨郡所得秩俸隨即分贍孤寡郡中大悦號曰神君曲阿富人殷綺見奐居處儉素乃餉衣襲氊被一具奐曰太守身居羙禄何為不能辦此但民有未周不容獨享温袍耳勞卿厚意幸勿為煩後魏廣陵侯衍性清慎所在廉潔又不營産業歴牧四州皆有稱績亾日無歛屍具陸馥為相州刺史在州七年家至貧約徴為㪚騎常侍吏民大歛布帛以遺之馥一皆不受荀孤為并州刺史不治産業死之日家無餘財百姓追思之劉芳為青州刺史為政需緩不能禁止奸盗而廉清寡欲無犯公私崔挺為光州刺史掖縣有人年踰九十板轝造州自稱少曾充使林邑得一羙玉方尺四寸甚有光彩藏之海島垂六十嵗欣逢明治今願奉之挺曰吾雖徳謝古人未能以玉為寳遣船隨取光潤果然竟不肯受仍表送都韓麒麟為齊州刺史卒於官臨終之日唯有俸絹數十疋其清貧如此沈文秀為持節平南將軍懐州刺史是時河南富饒人好奉遺文秀一無所納卒守清貧邢臧為東牟太守時天下多事在職少能廉白臧獨清慎奉法吏人愛之羊敦為廣平太守雅性清儉屬嵗饑饉家餽未至使人外㝷陂澤採藕根而食之遇有疾苦家遂觧衣質米以供之張恂為廣平太守時喪亂之後罕能克勵唯恂當官清白不營産業身死之日家無餘財張膺延興中為魯郡太守履行貞素聲績著聞妻子採樵以自供孝文深嘉其能遷京兆太守所在清白故吏民咸欣心焉泉企為東雍州刺史性清約纎毫不擾於民在州五年每於鄉里運米以自給北齊杜弼初行海州事又除膠州刺史儒雅寛恕尤曉吏職所在清潔為吏民所懐祖鴻勲為髙陽太守在官清素妻子不免寒餒時議髙之石曜字白曜中山安喜人居官至清儉武平中為黎陽郡守值斛律武都出為兖州刺史武都即丞相咸陽王世子皇后之兄性甚貪暴先過衛縣令丞已下聚歛絹數千疋以遺之及至黎陽令左右諷動曜及郡治下縣官曜手持一縑而謂武都曰此是老石機杼聊以奉贈自此外並須出於吏民之物一毫不敢輙犯武都亦知曜清素純儒笑而不責蘓瓊為南清河太守郡民趙頴曾為樂陵太守年八十因事歸五月初得新􅏨一雙自來送頴恃年老苦請便為留仍致於㕔事梁上竟不剖人遂競貢新果至門聞之頴􅏨猶在相顧而去郎基為潁川郡守性清儉無所營求曾語人曰任官之所木枕亦不煩作况重於此乎唯頗令冩書潘子義曾遺之書曰在官寫書亦是風流罪過基荅書曰觀過知仁斯亦可矣後周唐永初仕魏大統初為東雍州刺史性清廉家無蓄積妻子不免饑寒世以此稱之孟信魏末為趙平太守政尚寛和豪權無犯山中老人曾以㹠酒饋之信和顔接引殷勤慰勞乃自出酒以鐵鐺温之素木盤盛蕪菁爼器唯此而已乃以一鐺與老人俱執一盃各自斟酌申酬酢之意謂老人曰吾至郡來無人以一物見遺今卿獨有此餉且食菜已久欲為卿受一㹠髆耳酒旣自有不能相費老人大悦再拜擘㹠進之酒盡方别泉仲遵歴雒荆南雒三州刺史歴官之處皆以清白見稱劉璠為同和郡守先羌除附前後郡守多經營以致貲産唯璠秋毫無所取妻子並隨羌俗食麥衣皮始終不改韋瑱為􅏨州刺史州通西域蕃夷徃來前後刺史多受賂遺故冦犯邉又莫能禦瑱雅性清儉兼有武畧蕃夷贈遺一無所受胡人畏威不敢為冦公私安静夷夏懐之申徽為襄州刺史時南方初附舊俗官人皆通餉遺徽性廉慎乃盡楊震像於寝室以自戒竇熾為原州刺史州城之北有泉水焉熾屢經逰踐嘗與僚吏宴於泉側因酌水自飲曰吾在此州唯當飲水而已及去職之後人吏感其遺惠每至此泉者莫不懐之冦雋為梁州刺史在州清苦不治産業其子等並徒歩而還吏民送雋留連於道久之乃得出界辛慶之為荆州刺史率性儉素車馬衣服示不尚華侈志量淹和有儒者風度特為當時所重裴俠為河北郡守躬履儉素愛人如子所食惟菽麥鹽菜而已吏人莫不懐之此郡舊制有魚獵夫三十人以供郡守俠亦不以私並收庸為市官馬嵗時旣積馬遂成羣去職之日一無所取王思政為荆州刺史都督藺小歡繕治城塹掘得黄金二十斤夜中宻送之至旦思政召佐吏以金示之曰人臣不宜有私悉封金送上太祖嘉之賜錢二十萬隋庫狄士文為具州刺史性清苦不受公料家無餘財其子嘗噉官厨餅士文枷之於獄累日杖之二百歩送還京又嘗入朝遇文帝賜公卿入左藏任取多少人皆極重士文獨口銜絹一疋兩手各持一疋帝問其故士文曰臣口手俱足餘無所須帝異之别齎遺之後為雍州刺史旣死家無餘財有三子朝夕不繼親賔無贍之者栁儉為沔州刺史坐與蜀王秀交通免職反還鄉里乗弊車羸馬妻子衣食不贍見者咸歎服焉唐李大亮太宗貞觀中為越州都督在州寫書數百卷及去皆委之廨宇皇甫無逸貞觀中歴同州刺史寜州都督閉門自守不通賔客左右不得出門凡所貿易皆往他州每按郡樵採不犯於人嘗夜宿人家遇燈炷盡主人將續之無逸遽抽佩刀斷衣帶以為炷其廉介如此王方慶則天時為廣州都督地際南海嵗有崑崙乗船以珍物與中國交市舊都督路元叡冐求其貨崑崙懐刃殺之方慶在任數載秋毫不犯蘓瓌為揚州大都督府長史嵗時轉陜州刺史揚州地當衝要多富商大賈珠翠珍玩之産承前長史皆致之數萬惟瓌挺身而退時論服其清潔朱敬則為廬州刺史經數月代到還鄉里無淮南一物惟有所乗馬一匹諸子姪歩從而歸劉之濟中宗神龍初為青州長史為吏清白河南道廵察使路敬潜甚稱薦之李齊物肅宗乾元中歴鳯翔京兆尹清廉自飭人吏莫敢抵犯李勉代宗大歴中為廣州刺史前後西域舶泛海者嵗纔四五勉性廉潔舶來都不簡閲故末年舶至者四十餘在官累年器用車服無增餙者耆老以為可繼前朝宋璟盧奐李朝隠之徒人吏詣闕請立碑代宗許之韓滉徳宗貞元初為潤州節度素持節儉志在奉公衣裘茵袵十年一易居處陋薄纔蔽風雨弟泂嘗於故里宅增修廊宇滉自江南至即命撤去之曰先公容焉吾軰奉之嘗恐失墜所有摧圯葺之則已豈敢改作以傷儉徳薛萃為浙西觀察使理身儉薄嘗衣一緑袍十餘年不易恩加朱紱然後觧去萃歴三鎮凡十餘年家無聲樂俸禄悉以㪚親族故人子弟裴玢為鄜坊節度使憲宗元和三年改興元尹山南西道節度等使玢武臣為政以清廉聞衣服飲食同於士卒故遷授大鎮孔戣元和末為廣州刺史戣剛正清儉南海請刺史俸料之外絶其取索薛戎為衢湖常三州刺史浙東觀察使儉身處約不務虚名俸入之餘㪚宗族身歿之後人無譏焉令􅈢楚為宣武軍節度使先是汴州主帥始至率以錢二百萬實其私蔵楚悉以歸公府繇是汴人愛其廉徴為户部尚書殷洧為桂州觀察使轉江西觀察使皆以廉潔著稱盧均文宗開成中為廣州節度先是蕃船到府節度使已下争以賤估其珍貨均悉不問時人服其潔廉王龜懿宗咸通中為浙東觀察使凡天下有倉庫羡餘皆𨽻於本州名曰賞設庫以偹地主之費龜所至兩州有給于公者則給之或遊客故人皆以已俸而奉之餘可知矣晉郭延魯初仕後唐為復州刺史正俸之外未嘗歛貨庶事求理一郡頼焉髙漢筠至廉在襄陽有薛吏常課外獻白金二十鎰漢筠嘆曰非多納麳麰則刻削闤闠吾有正俸此何用焉因戒其主者不得復然其白金皆以狀上進有詔嘉之安元信少帝開運二年為復州防禦使卒元信歴數任皆名郡也親族嘗謂曰公身俸二千石鬢有白髮家無肥美田園何以為子孫計元信曰吾本無文經武畧遭遇先帝風雲之㑹繼提郡印位在親人平生之望過矣每以衣食豐足為愧安有積貨治産欲為豚犬軰後計不亦愚乎聞者美之漢武漢球為雒州刺史至郡未期以目疾請代乾祐二年秋卒於京師漢球雖出自行伍然長於撫理嘗以掊歛為戒民懐其惠身死之日家無餘財册府元龜卷六百七十九
