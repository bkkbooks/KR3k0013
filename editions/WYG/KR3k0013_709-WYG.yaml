body:
  text: 册府元龜卷七百九宋王欽若等撰宫臣部正直夫明神之介福本夫正直宗室之成徳由乎輔導自漢而下崇建儲貳分樹藩戚精選端士並列宫屬資其明智導之治體其或安於佚樂不遵憲度簡局非慎驕奢自恣則必箴規以正道補察其邪心至於簡督羣下忠亮自處形誾誾之色有凛凛之風俾夫聞義則遷以嚴見憚王制是守國政用修斯古人任夫賢直輔以徳義之明效也若乃切辭而被惡由諫而免罪斯又出於誠心立身無撓者矣漢汲黯字長孺以父任孝景時為太子洗馬大臣任舉其子弟為官以嚴見憚龔遂為昌邑王賀郎中令昭帝亡子賀嗣立官屬皆徴入王相安樂遷長樂衛尉遂見安樂流涕謂曰王立為天子日益驕溢諫之不復聽今哀痛未盡謂新居䘮服日與近臣飲食作樂鬭虎豹貂皮軒車九流驅馳東西所為誖道誖乖音布内切古制寛大臣有隠退今去不得佯狂恐知身死為世戮奈何君陛下故相宜極諫爭王即位二十七日卒以淫亂廢昌邑羣臣坐䧟王於惡不道皆誅死者二百餘人唯遂與中尉王吉以數諫争得减死髠為城旦王吉字子陽為昌邑中尉昌邑王既即位二十餘日以行淫亂廢昌邑羣臣坐在國時不舉奏王罪過令漢朝不聞知又不能輔道䧟王大惡道讀曰導皆下獄誅惟吉與郎中令龔遂以忠直數諫正得减死髠為城旦王式字翁思為昌邑王師王嗣立以行淫亂廢昌邑羣臣皆下獄誅惟中尉王吉郎中令龔遂以數諫减死論式繫獄當死治事使者責問曰師何以亡諫書式對曰臣以詩三百五篇朝夕授王至於忠臣孝子之篇未嘗不為王反復誦也復方目切至於危亡失道之君未嘗不流涕為王深陳之也臣以三百五篇諫是以亡諫書使者以聞亦得减死論疏廣為太子太傅太子外祖父特進平恩侯許伯以為太子少自使其弟中郎將舜監護太子家上以問廣廣對曰太子國儲副君師友必於天下英俊不宜獨親外家許氏且太子自有太傅少傅官屬已備今復使舜護太子家視陋非所以廣太子徳於天下也視讀曰示言獨親外家示天下以淺陋上善其言以語丞相魏相相免冠謝曰此非臣等所能及王尊為東平相是時東平王以至親驕奢不奉法度傅相連坐前任傅相者頻坐以王得罪及尊視事奉璽書至庭中王未及出受詔尊持璽書歸舎食已乃還致詔後謁見王太傅在前説相鼠之詩相鼠􅅠風篇名刺無禮之詩也尊曰毋持布皷過雷門雷門㑹稽城門也有大皷越擊此皷聲聞雒陽故尊引之也布皷謂以布為皷故無聲王怒起入後宫尊亦直趨出就舎先是王數私出入驅馳國中與后姬家交通尊到官召敇廄長大王當從官屬鳴和鸞乃出自今有令駕小車叩頭争之言相教不得後尊朝王王復延請登堂尊謂王曰尊来為相人皆弔尊也以尊不容朝廷故見使相王耳天下皆言王勇顧但負貴安能勇顧念也負持也安焉也如尊乃勇耳王變色視尊意欲格殺之即好謂尊曰願觀相君佩刀陽為好語也尊舉掖顧謂傍侍郎前引佩刀視王視讀曰示王欲誣相㧞刀向王邪王情得謂尊所測王得其情也又雅聞尊髙名大為尊屈酌酒具食相對極驩梁荒王太傅輔史不書姓成帝鴻嘉中奏荒王立一日至十一犯法臣下愁苦莫敢親近不可諫止願令王非耕祠法駕毋得出宫盡出馬置外苑收兵仗藏私府毋得以金錢財物假賜人事下丞相御史請許許太傅所奏奏可後數復毆傷郎毆捶擊音一口切夜私出宫傅相連奏坐削或千戸或五百戸如是者數焉後漢魯丕章帝時為趙相趙王商嘗欲避疾商趙王良之孫便時移住學官丕止不聽學官謂學舎人王乃上疏自言詔書下丕丕奏曰臣聞禮諸侯薨於路寢大夫卒於嫡室死生有命未有逃避之典也學官傳五常之道修先王禮樂教化之處王欲廢塞以廣㳺讌事不可聽詔從丕言王以此憚之張酺以尚書教授明帝令入授皇太子酺為人質直守經義每侍講間隙數有規正之辭以嚴見憚東觀記曰太子家時為奢侈物未嘗不正諫甚見重焉章帝即位出為東郡太守帝每見諸王師傅嘗言張酺前入侍講屢有諫正誾誾惻惻出於誠心可謂有史魚之風矣沈景吳郡人順帝時為河間王相王政傲狠不奉法憲景到國謁王王不正服箕踞殿上侍郎賛拜景峙不為禮峙立也問王所在虎賁曰是非王耶景曰王不服常人何别今相謁王豈謁無禮者邪王慙而更服景然後拜出住宫門外請王傅責之曰前發京師陛下見受詔以王不恭使相檢督諸君空受爵祿而無訓導之義因奏治罪詔書讓政而詰責傅景因捕諸姦人上案其罪殺戮尤惡者數十人出寃獄百餘人政遂為改節悔過自修李燮字徳公靈帝時為安平相先是安平王續為張角賊所畧國家贖王得還朝廷議復其國燮上奏曰續在國無政為妖賊所虜守藩不稱損辱聖朝不宜復國時議者不同而續竟歸藩燮以謗毁宗室輸作左校未滿歳王果坐不道被誅乃拜燮為議郎京師語曰父不肯立帝子不肯立王魏邴原為太子五官中郎將長史太子燕會衆賔百數十人太子建議曰君父各有篤疾有藥一丸可救一人當救君邪父邪衆人紛紜或父或君時原在坐不與此論太子諮之於原原勃然對曰父也太子亦不復難之司馬孚為陳思王植文學掾植負才凌物孚每切諫初不合意後乃謝之又孚為中庶子太子即位時當選侍中常侍等官太子左右舊人頗諷諭主者便欲就用不調餘人孚曰雖有堯舜必有稷契今嗣王新立當進用海内英賢猶患不得如何因際會自相薦舉邪官失其任得者亦不足貴遂更他選吳陸遜字伯言黄龍初為上大將軍大帝東廵建業留太子皇子及尚書九官乃徴遜輔太子并掌荆州及豫章三郡事董督軍國時建昌侯慮於堂前作鬬鴨欄頗施小巧遜正色曰君侯宜勤覽經典以自新益用此何為慮即時毁撤之射聲校尉松於公子中最親戲兵不整遜對之髠其職吏南陽謝景善劉廙之先刑後禮之論遜訶景曰禮之長於刑乆矣廙以細辯而詭先聖之教皆非也君今侍東宫宜遵仁義以彰徳音若彼之談不須講也晉杜錫為太子中舎人性亮直忠烈屢諫愍懐太子言辭懇切太子患之後置針著錫常所坐處氊中刺之流血他日太子問錫向著何事錫對曰醉不知太子詰之曰君喜責人何自作過也江統㕘大司馬齊王軍事冏驕荒將敗統切諫又為成都王頴請為記室多所箴諫申論陸雲兄弟辭甚切至孔衍為太子中庶子王敦專權衍私於太子曰殿下宜博延朝彥捜揚才俊詢謀時政以廣聖聰敦聞而惡之乃唘出衍為廣陵郡時人為之寒心而衍不形于色宋謝景仁為㑹稽王輔國㕘軍事王世子元顯嬖人張法順權傾一時内外無不造門者惟景仁不至沈演之為彭城王義康别駕從事史領本郡中正深為義康所待故在府州前後十餘年後劉湛劉威等結黨欲排廢尚書僕射殷景仁演之雅仗正義與湛等不同湛因此讒之於義康嘗因論事不合㫖義康變色曰自今後我不復相信演之與景仁素善盡心于朝廷太祖甚嘉之阮韜為征南江州長史桂陽王休範在鎮數出行㳺韜性方峙未嘗随從南齊范述曾為太子步兵校尉帶開陽令述曾為人謇諤在官多所諫争太子雖不能全用然亦弗之罪也竟陵王深相器重號為周舎時太子左衛率沈約亦以述曾方汲黯梁范雲初仕齊為竟陵王子良記室㕘軍事時子良兄文惠王子嘗出東田觀穫顧謂衆賔曰刈此亦殊可觀衆皆唯唯雲獨曰夫三時之務實為長勤伏願殿下知稼穡之艱難無徇一朝之宴逸既出侍中蕭緬先不相識因就車握雲手曰不圖今日復聞讜言江革為廬陵王長史時王少行事多傾意於籖帥革以正直自居不與典籖等同坐陳袁憲字徳章為太子詹事皇太子頗不率典訓憲手表陳諫凡十條皆援引古今言辭切直太子雖外示容納而心無悛改後主欲立寵姬張貴妃子始安王為嗣嘗從容言之吏部尚書蔡徴順㫖稱贊憲厲色折之曰皇太子國家儲嗣億兆宅心卿是何人輕言廢立是夏竟廢太子為吳興王後主知憲有規諫之事歎曰袁徳章實骨鯁之臣即日詔為尚書僕射後魏髙道悦為太子中庶子正色立朝儼然難犯宫官上下咸畏憚之陽固領汝南王悅郎中令先是清河王懌舉固為步兵校尉領是職時悅年少行多不法䙝近小人固上疏切諫并面陳往代諸王賢愚之分以感動悅悦甚敬憚之懌大恱以為舉得其人懌領太尉辟固從事中郎屬懌被害及悅為太尉選舉多非其人又輕肆撾撻固以前為元卿雖離國猶上疏切諫恱辟固為從事中郎不就楊昱為廣平王懐左常侍王好武事數出㳺獵昱每規諫宣武正始中以京兆廣平二王國臣多有縱恣公行囑請於是詔御史中尉崔亮窮治之伏法於都市者三十餘人其不死者悉除名為民惟昱與博陵崔楷以忠諫得免崔楷為廣平王懐文學正始中以王國官非其人多被刑戮惟楷與楊昱以數諫諍獲免北齊王昕字元景汝南王恱辟為騎兵㕘軍恱嘗散錢於地令諸佐争拾之昕獨不拾悦又散銀錢以目昕昕乃取其一悦與府寮飲酒起自移牀人争進手昕獨執版却立悅於是作色曰我帝孫帝子帝弟帝叔今為宴適親起輿牀卿是何人獨為偃蹇對曰元景位望微劣不足使殿下式瞻儀刑安敢以親王寮寀從厮養之役悦謝焉坐上皆引滿酣暢昕先起卧於閒室頻召不至恱乃自詣呼之曰懐其才而忽府主可謂仁乎昕曰商辛沈湎其亡也忽諸府主自忽微寮敢任其咎悅大笑而去後周宇文孝伯髙祖深委信之為東宫正建徳之後皇太子稍長既無令徳惟昵近小人孝伯謂髙祖曰皇太子四海所屬而徳聲未聞臣忝宫官實當其責且春秋尚少志業未成請妙選正人為其師友調䕶聖質猶望日就月將如或不然悔無及矣帝歛容曰卿世載鯁直竭誠所事觀卿此言有家風矣孝伯拜謝曰非言之難受之難願陛下思之帝曰正人豈復過君於是以尉遲運為右宫正孝伯仍為左宫正宗師中大夫累遷右宫伯嘗因侍坐帝問我兒比長進不答曰皇太子比懼天威更無罪失及王軌因内宴捋帝鬚言太子之不善帝罷酒責孝伯曰公嘗謂我云太子無過今軌有此言公為誑矣孝伯拜曰臣聞父子之際人所難言臣知陛下不能割情忍愛遂爾結舌帝知其意黙然乆之又曰朕已委公矣公其勉之隋裴政為太子左庶子時右庶子劉榮性甚專固時武職交畨通事舎人趙元愷作辭見帳未及成太子有㫖再三催促榮語元愷云但爾口奏不須造帳及奏太子問曰名帳安在元愷曰禀承劉榮不聽造帳太子即以語詰榮榮便拒諱云無此語太子付政推問未及奏狀有附榮者先言於太子曰政欲䧟榮推事不實太子召責之政奏曰凡推事有兩一察情一據證審其曲直以定是非臣察劉榮位髙任重縱令實語元愷盖是纎介之􅄽計理而論不須隠諱又察元愷受制於榮豈敢以無端之言妄相㸃累二人之情理正相似元愷引左衛率崔蒨等為證蒨等款伏悉與元愷符同察情既敵須以證定臣謂榮語元愷事必非虚太子亦不罪榮而稱政平直政好面折人短而退無後言時雲定興數入侍太子為竒服異器進奉後宫又縁女寵來往無節政數切諫太子不納政因謂定興曰公所為者不合禮度又元妃暴薨道路藉藉此於太子非令名也願公自引退不然將及禍定興怒以告太子益踈政由是出為襄州總管劉行本拜太子左庶子領治書如故皇太子勇虚襟敬憚時唐令則亦為左庶子太子昵狎之每令以絃歌教内人行本責之曰庶子當正太子以正道何有嬖昵房幄之間哉令則甚慙而不能改時沛國劉臻平原明克讓魏郡陸爽並以文學為太子所親行本怒其不能調䕶每謂三人曰卿等止解讀書耳時左衛率長史夏侯福為太子所昵嘗於閣内與太子戲福大笑聲聞於外行本在閣下聞之待其出行本數之曰殿下寛容賜汝顔色汝何物小人敢為䙝慢因付執法者治之數日太子為福致請乃釋之太子嘗得良馬令福乗而觀之太子甚恱因欲令行本復乗之行本不從正色而進曰至尊置臣於庶子之位者欲令輔導殿下以正道非為殿下作弄臣也太子慙而止未幾卒於官上甚傷惜之及太子廢上曰嗟乎若使劉行本在勇當不及乎此唐李綱在隋開皇末為太子洗馬皇太子勇嘗以嵗首宴宫臣左庶子唐令則自請奏琵琶又歌武媚娘之曲綱白勇曰令則身任宫卿職當調䕶乃於宴座自比倡優進淫聲穢視聽事若上聞令則罪在不測豈不累於殿下臣請遽正其罪勇曰我欲為樂耳君勿多事綱起而出文帝廢太子勇召東宫寮屬切讓之無敢對者綱進曰今日之事乃陛下之過也非太子之罪太子才非上品性是常人得賢明之士輔導之足嗣皇業方今多士盈朝當擇善人居任奈何以絃歌鷹犬之才日在其側致令至此乃陛下訓導不足豈太子之罪耶文帝竒其對擢為尚書右丞貞觀中又為太子少師太子每親政事太宗必令綱及左僕射房𤣥齡侍中王珪侍坐太子嘗商略古来君臣名教竭忠盡節之事綱凛然曰託六尺之孤寄百里之命古人以為難綱以為易每吐論發言皆辭色慷慨有不可奪之志權萬紀為西韓州刺史㑹吳王恪以驕縱被譴拜萬紀為長史萬紀厲其抗直恪遂折節從之太宗以齊王祐溺情羣小以萬紀為長史萬紀性剛毅所在以强直稱祐聞其名望風畏憚親愛左右咸詭示疎斥外接萬紀而内深疾之萬紀見祐非法常犯顔切諫初尚有從者後皆相反焉左右昝君謩梁猛虎並以善射野豕得幸於祐萬紀驟諫不納遂皆劾逐之而祐潜遣招延狎暱愈甚會萬紀宅中有土塊夜落萬紀以為君謩等將害己悉收繫獄而乗傳以聞雖不顯言而意指於祐又云與小人聚飲殺馬而食内人代判畋獵無時同為非者數十人詔遣刑部尚書劉徳威往覆之事頗有實者孔頴達為太子右庶子庶人承乾不循法度頴達每犯顔進諫庶人乳母遂安夫人見其發言亮直謂頴達曰太子成長何宜屢得靣折頴達對曰蒙國厚恩死無所恨諫諍逾切崔義𤣥為左司郎中兼韓王府長史與友孟神慶雖志好不同各以介直規正府寮王並委任之蘇良嗣髙宗時為周王府司馬王時年少舉事不法良嗣正色規諫甚見敬憚王府官屬多非其人良嗣守文簡括莫敢有犯深為髙宗所稱王及善遷左奉裕率孝敬皇帝之居春宫宴集命之擲倒及善對曰殿下自有樂官正當守職此非臣任也臣將奉令恐非殿下羽翼之美太子謝而遣之後唐劉賛為尚書刑部侍郎時言事者云親王舊有師傅以為輔導請為親王置師傅上顧問近臣王官如何執政以秦王從榮名勢既隆凡事不敢制置因王官冝委從榮自擇從榮奏賛為秘書監兼秦王傅賛朝之正人也有節操不趨競方為列曹侍郎一旦為王官掩泣陳訴素知從榮之為人尤懼獲禍時秦王府叅佐皆新進小生動多輕脱或稱頌從榮功徳阿意譚笑而賛每見從容諷議必獻嘉言時從榮溺於篇章凡門客及通謁㳺士必坐於客次日出題目令賦一章然後接見酒筵之中悉令秉筆賦詠賛雖師傅亦與諸生混然令秉筆賦詩賛雖承命容狀不悅從榮心知其意自是戒左右勿通令每月一度至府賛既官係王府不敢朝叅不通慶弔閉闗喑嗚而已册府元龜卷七百九
