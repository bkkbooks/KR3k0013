body:
  text: 册府元龜卷二百十五宋王欽若等撰閏位部招懐和好却貢獻招懐傳曰招攜以禮懐逺以徳是知有國者務輯寧於初附將誘致於來者而外示其優禮而内彰乎大度俾危疑者得自安之地翔引者無失所之嗟誠接物之宏猷經逺之大畧也自漢氏之末羣雄並起𤣥徳奮於庸蜀孫氏據有江東其餘趦趄陸梁往往而在莫不懐去就之分審廢興之命跨州連郡以待所歸於是析珪以􅇺其心遣使以達其意或委質以從命或脩貢以稱藩故能撫有其民人恢拓乎疆宇鼎峙之業雄視二隅繇宋齊以還南北分壤逮夫髙齊至於梁氏疆場之事一彼一此反側之子改過自新咸用接納存䘏俾其安集斯誠君國者之永圖哉蜀先主初圍劉璋於成都時偏將軍馬超領其父騰部曲依張魯魯不與計事内懐於邑密書請降先主遣人迎超超將兵徑到城下城中震怖璋即稽首又云先主使李恢至廣中交好馬超超遂從命黄權為劉璋廣漢長及先主襲取益州将帥下郡縣郡縣望風景附權閉城堅守劉璋稽服而詣降先主假權偏将軍呉大帝初為呉侯建安十五年遣步隲為交州刺史時士奕為綏南中郎將董督七郡領交阯太守隲到燮率兄弟奉承節度帝加燮為左將軍建安末年燮遣子厥入質帝以為武昌太守諸子在南者皆拜中郎將又誘𨗳益州豪姓雍門等率郡人民遥使東附帝益嘉之遷衛將軍弟合浦太守壹時貢馬凡數百疋帝輒為書厚加寵賜以答􅇺之嘉禾元年十月魏遼東太守公孫淵遣校尉宿舒閬中令孫綜稱藩於大帝并獻貂馬帝大悦加淵爵位二年春正月詔以幽青二州十七郡七十縣封為燕王宋髙祖初為晉太尉垣遵與其弟苗並為南燕慕容超委任遵為尚書苗為京兆太守帝圍廣固遵苗踰城歸降並以為太尉行參軍孝武大明中黟歙二縣有亡命數千人攻破縣邑殺害官長豫章王子尚為揚州刺史在㑹稽遣主帥領三千人水陸討伐再往失利帝遣殿中侍御史吳喜數十人至二縣誘說羣賊賊即日歸降明帝即位初南雍州刺史袁顗與晉安王子勛同反帝使朝士遺顗書曰夫夷陂相因興革遞數或多難而固其國或殷憂而啟聖明此既著於前史亦彰於聞見王室不造昏凶肆虐神鼎將淪宗稷幾泯幸天未亡宋乾厯有歸主上體自聖文繼明作睿而辱均牖里屯喻夏臺既天地俱憤義勇同奮克殄鯨鯢三靈更造應天順民爰集寳命四海屬息肩之歡庶民見來蘇之㤗吾等獲免刀鋸僅全首領復身奉惟新命承亨運緩帶談笑擊壤聖世汝雖劬勞於外迹阻京師然心期所寄江漢何逺自九江告變皆謂鄧氏狂惑比日國言藉藉頗塵吾子道路之議豈其或然聞此之日能無駭惋凶人反道敗徳日夜滋深昵近狡慝取謀犲虎非惟毒流外物惡積中朝乃欲毁陵邑虐崇憲燒宗廟鹵御物然後蕩覆京都必使蘭蕕俱盡自非聖上廟筭靈圖俛首遜避維持内外擁衛臣下則赤縣為戎百姓其魚矣此事此理寧可熟念既天道輔順百姓謳歌有奉髙祖之孫文皇之子徳洞九幽功貫三曜匡拯家國提毓黔首若不子民南面将使神器何歸而羣下搆慝妄懐窺覬成軫惑燕貫髙亂趙讒人㒺極自古有之汝中京冠冕儒雅世襲多見前載縣鑒忠邪何逺遺郎中之清軌近忘太尉之純槩相與或羣從舅甥或姻婭周欵一旦胡越能無悵恨若疑誑所至邪詖無窮汝當誓衆奮戈翦此朝食若自延過聽迷途未逺聖上臨物以仁接下以愛豈直雍齒先封乃當射鈎見相矣跂予南服寤寐延首若反棹㳂流歸誠鳳闕錫珪開㝢非爾而誰吾等並過荷曲慈俱叨非服紆金拖玉改觀蓬門入奉舜禹之渥出見羲唐之化雍容揄揚信白駒空谷之時也奈何毁擲先基自蹈凶戾山門蕭瑟松庭誰歸言念楚路豈不思父母之邦幸納惡石以蠲美疢裁書表意爾其圖之時尚書右僕射蔡興宗是顗舅領軍将軍袁粲是顗從父弟故書云羣從舅甥也後又使顗舊門生徐碩奉手詔譬顗曰卿歴觀古今險之與强何嘗可恃自朕踐祚塗路梗塞卿无繇奉表未經為臣今追蹤竇融猶未為晚也沈文秀為青州刺史與晉安王子勛同反泰始二年八月子勛平帝遣文秀弟文炳詔文秀曰皇帝問前督青州徐州之東莞東安二郡諸軍事建威将軍青州刺史朕去嵗撥亂功振普天於卿一門特有殊澤卿得延命至今誰之力邪何故背國負恩逺同逆豎今天下已定四海寧一卿獨守窮城何所歸奉且卿百口在都兼有墳墓想情非木石猶或顧懐故指遣文炳具相宣示凡諸逆節親為戎首一不加罪文炳所具卿獨何人而能自立便可速率部曲同到軍門别詔有司一無所問如其不爾國有常刑非唯戮及弟息亦當夷卿墳墓既以謝齊土百姓亦以勞將士之心故有今詔三年二月文秀歸命請罪即安本任崔道固為二州刺史與沈文秀同逆㑹四方平定明帝遣使宣慰道固奉詔歸順殷琰為建武將軍豫州刺史亦同子勛反叛其將留胡敗走尋陽平定明帝遣琰參軍杜叔寳之從父弟季文至琰城下與叔寳語說四方已定勸令時降叔寳曰我乃信汝恐為人所誑耳叔寳閉絶子勛敗問有傳者即殺之時琰子邈東在京邑繫建康帝送邈與琰令說南賊已平之問自建康出便防送就道議者以為宜聽邈與伯父瑗私相見不爾無以解城内之惑不從邈至叔寳等果疑守備方固後帝以南賊降者送琰城下令與城内交言繇是人情沮喪琰遂降韋珍竒為汝南郡司馬同殷琰反琰降珍竒㨿城招魏留勔與珍竒書勸令反魏珍竒乃與子超越羽林監垣式寳於譙殺魏子都贊拔等凡三千餘人勔馳驛以聞明帝大喜以珍竒為使持節都督司北豫二州諸軍事平北將軍司州刺史汝南新蔡縣侯食邑千户蕭惠開為平西将軍都督益寧二州晉安王子勛反惠開乃集将佐謂之曰湘東太祖之昭晉安世祖之穆其於當璧並無不可但景和雖昏本是世祖之嗣不任社稷其次猶多吾奉武文之靈兼荷世祖之眷今便當投袂萬里推奉九江乃遣巴郡太守費欣夀領二千人東下為巴東人任叔兒起義所邀欣夀敗没峽口道不復通更遣州治中程法度領三千人歩出梁州又為氐賊楊僧嗣所斷先是惠開為治多任刑誅蜀士咸懐猜怨及聞欣夀沒法度又不得前晉原一部遂反於是諸郡悉應之並來圍城城内東兵不過二千凡蜀人惠開疑之皆悉遣出子勛尋平蜀人並欲屠城以望厚賞惠開每遣軍出戰未嘗不捷前後所摧破殺傷不可勝計外衆逾合勝兵者十餘萬人時天下已平明帝以蜀土險逺赦其誅責遣惠開之弟惠基步道使蜀具宣朝㫖惠基既至涪而蜀人志在屠城不使王命逺達遏留惠基不聽進惠基率部曲破其渠帥馬興懐等然後得前惠開奉㫖歸順城圍得解及還都明帝待之益厚時帝遣惠開宗人寳首水路慰勞益州寳首欲以平蜀為功更奨說蜀人於是處處蜂起凡諸離散者一時還合渠帥趙燕句文章等與寳首屯軍於上去成都六十里衆號二十萬惠開欲遣擊之将佐咸曰攻破蜀賊誠不為難但慰勞使至未獲奉受而遣兵相距何以自明本心惠開曰今水陸四斷表啟路絶寳首或相誣陷謂我不奉朝㫖我之欲戰本在通使若得通則誠心達矣乃作啟事具陳事情使腹心二人帶啟戒之曰須賊破路開便躍馬馳出遣永寧太守蕭恵訓别駕費欣業分兵並進與戰大破之生擒寳首囚於成都縣獄遣使至帝令執送寳首除惠開晉平王長史南郡太守後廢帝元徽中遣武衛将軍王世武使河南是歲隨拾寅使來獻詔答曰皇帝敬聞使持節散騎常侍都督西秦河沙三州諸軍事車騎大將軍開府儀同三司領䕶羌校尉西秦河二州刺史新除驃騎大將軍河南王寶命革授爰集朕躬猥當大業祇惕兼懐憂中増感王世武至徳元徽五年五月二十一日表聞之涇熱想比平安又卿乃誠遙著保寳遐疆命詔升徽號以酬忠欵遣王世武銜命拜授又仍使王世武等往芮芮想即資遣使得時達又奏所上馬等物悉至今往别牒錦綿紫碧緑黄青等各十疋南齊太祖建元兀年詔曰交阯北景獨隔書朔斯乃前運方季負海不朝因迷遂往歸欵莫繇曲赦交州部内李叔獻一人即撫南土文武詳才選用并遣大使宣揚朝恩以試守武平太守行交州府事李叔獻為交州刺史東昏侯永元三年後魏東徐州刺史沈陵降以為北徐州刺史梁髙祖天監十三年後魏太常博士崔靈恩歸國髙祖以其儒術擢拜員外散騎常侍元願達魏支庶也天監中為後魏司州刺史因大軍北伐攻義陽願達舉州獻欵詔封樂平公侍中王神念太原郡人天監中以後魏潁川守據郡歸欵封南城侯青冀二州刺史元法僧為後魏鎮東將軍徐州刺史普通六年以彭城内附授司空封始安王法僧魏氏支屬鎮彭城是時魏室亂遂據鎮稱帝魏討之乃歸欵請為附庸髙祖遣奉朝請陳慶之與胡龍牙成景雋率諸軍應接及還朝甚加優寵時方事招攜賜法僧甲第女樂金帛遷太尉元樹字君立後魏近屬也仕魏為宗正卿爾朱榮亂歸國封為鄴王鎮北将軍羊侃為魏征東大将軍大通三年歸國詔授安北將軍徐州刺史并其兄黙及三弟悅元皆拜為刺史胡僧祐為魏銀青光禄大夫大通三年避爾朱氏之難南歸頻上封事武帝器之拜主帥使之送魏北海王元顥入雒陽僧祐又南歸除南天水天門二郡太守侯景為魏司徒太清元年求以豫廣潁雒陽西揚東荆北荆襄東豫南兖齊等十三州内屬髙祖以景為大將軍封河南王大行臺承制如鄧屬故事遣同州刺史羊鴉仁兖州刺史桓和仁州刺史湛海珍等應接之孝元帝時湘州刺史王琳以平侯景之勲第一縱暴於建業王僧辯啟請誅之琳令長史陸納率部曲前赴湘州身輕上江陵陳謝帝以琳下吏使廷尉卿黄羅漢大舟卿張載宣喻琳軍納等及軍人縶羅漢殺載帝遣僧辯討納是時湘州未平武陵王兵下又甚盛江陵公私恐懼人有異圖納啟申琳無罪請復本位求為奴婢帝乃鎖琳送僧辯時納出兵方戰㑹琳至僧辯升樓車以示之納等投戈俱拜舉軍皆哭曰乞王郎入城即出放琳入納等乃降湘州平仍復琳本位陳髙祖永定元年以晉安太守陳寳應為持節散騎常侍信武將軍閩州刺史領㑹稽太守寳應梁末為晉安太守時東西嶺路寇賊擁隔寳應自海道趨於㑹稽貢獻故有是命二年三月梁湘州刺史王琳立永嘉王蕭莊於郢州六月詔侯瑱討之又遣吏部尚書謝哲諭琳琳請還鎮湘州詔追衆軍緩其伐魯悉達梁末以侯景之亂糾率鄉人保新蔡及晉熈等五郡及王琳據有上流琳授悉達鎮北將軍髙祖等遣趙知禮授征西將軍江州刺史各送鼓吹女樂悉達兩受之遷延顧望皆不欲降髙祖遣安西將軍沈泰潛師襲之不能克濟齊遣行臺慕容紹宗以衆三萬來攻鬱口諸鎮兵甲甚盛悉達與戰敗齊軍紹宗僅以身免王琳欲圖東下以悉達制其中流恐為已患頻遣使招誘悉達終不從琳不得下乃速擊於齊共為表裏齊遣清河王髙岳助之相持嵗餘㑹禆将梅天養等懼罪乃引齊軍入城悉達勒麾下數千人濟江而歸髙祖髙祖見之甚喜曰來何遲也悉達對曰臣鎮撫下流願為藩屏陛下授臣以官恩至厚矣沈泰襲臣威以深矣然臣所以自歸於陛下者以陛下豁達大度同符漢祖故也髙祖笑曰卿言得之矣授平南将軍散騎常侍北江州刺史封彭澤縣侯宣帝大建十二年八月周使持節上柱國鄖州總管滎陽郡公司馬消難以鄖隨温應土順沔儇岳等九州魯山甑山沌陽應城平靖武陽上明涓水等八鎮内附詔以消難為使持節侍中大都督總督安隨等九州八鎮諸軍事車騎將軍司空封隨郡公給鼓吹女樂各一部東魏孝静帝興和二年五月西魏行臺宫延和峽州刺史元慶率户内屬置之河北新附賑廩各有差武定七年正月梁北徐州刺史湘山侯蕭正表以鎮内附封蘭陵郡公呉郡王北齊神武為東魏大将軍爾朱榮都督濟州刺史張瓊因爾朱兆敗歸神武用為汾州刺史堯雄初仕後魏為燕州刺史隨爾朱兆敗於廣阿遂率所部據定州以歸神武時雄從兄傑爾朱兆用為滄州刺史至瀛州知兆敗亦遣使歸降神武以其兄弟俱有誠欵便留傑行瀛州事尋以雄為車騎大将軍瀛州刺史以代傑王則初𨽻爾朱仲逺為征虜将軍仲逺敗始歸神武加征南將軍金紫光禄大夫慕容紹宗初為爾朱兆長史神武從鄴討兆於晉陽兆窘急走赤谼嶺自縊而死紹宗行到馬突城見神武追至遂攜榮妻子及兆餘衆自歸神武仍加恩禮所有官爵並如故軍謀兵略時參預焉可朱渾元後魏末為渭州刺史侯莫陳恱之殺賀拔岳也周文帝率賀拔岳所部還共圖恱元時助恱恱走元収其衆入據秦州為周攻圍苦戰結盟而罷元既早為神武知遇兼其母兄在東嘗有思歸之志恒遣表疏與神武隂相往來周文攻圍忌元智勇知元懐貳發兵攻之元乃率所部發自渭州西北烏蘭津周文頻遣兵邀之元戰必摧之引軍歴河源二州境乃得東出靈州刺史曹渥女壻劉豐與元深相交結元因說豐以神武英武非常克成大業豐自此便有委質之心遂資遣元從靈州東北入雲州神武聞其來也遣平陽守高嵩持金環一枚以賜元并運資糧逺遣候接元至晉陽引見執手賜帛千疋并奴婢田宅兄弟四人先在并州者進官爵元所部督將皆賞以爵邑封元縣公除車騎大將軍任延敬廣寧人初從葛榮為賊榮署為王甚見委任榮敗延敬擁所部先降拜鎮逺將軍廣寧太守文襄初為東魏大將軍封渤海王時侯景據河南反令韓軌等討之不克議者咸云侯景猶有北望之心但信命不至耳又景將蔡遵道北歸稱景有悔過之心王以為信然謂可誘而致乃遺景書曰先王與司徒契濶夷險孤孑相依偏所眷屬義貫終始情存嵗寒目為國士者乃立漆身之節饋以一餐者便致扶輪之效況其重於此乎嘗以故舊之義欲將子孫相託方為秦晉之匹共成劉范之親況聞負杖行歌便以狼顧反噬不蹈忠臣之路乃陷叛人之地力不足以自强勢不足以自保率烏合之衆為累卵之危西取救於宇文南請援於蕭氏以狐疑之心為首䑕之事入秦則秦人不容歸吳則呉人不信當是不逞之人曲為無端之説遂懐市虎之疑乃致投杼之惑昔來舉止事已可見人相疑誤想自覺知闔門大小悉在司宼意謂李氏未滅猶言少卿可扶孤子無状招禍丁天酷罰但禮繇權奪志在忘私聊遣偏禆前驅致討南兖揚州應時克復即欲乗機席卷縣瓠屬以炎暑欲為後圖且令還師待時更舉今寒膠向折白露將團方憑國靈龔行天罸器械精新士馬强盛内外感恩上下戮力三令五申可赴湯火使旗鼓相望埃塵相接勢如渥雪事等注熒夫明者去危就安智者轉禍為福寧人負我我不負人當開從善之徒使有改迷之路若能卷甲來朝垂櫜還闕者當即相授豫州必使終君身世所部文武更不追攝進得保其禄位退則不喪功名今王思政等皆孤軍偏將逺來深入然其性命在君掌握脫能刺之想有餘力即相加授永保疆塲君門眷屬可以無恙寵妻愛子亦送相還仍為通家共成親好君今不能東封函谷南面稱孤受制於人威名頓盡得地不欲自守聚衆不以為强空使身有背叛之名家有惡逆之禍覆宗絶嗣自貽伊戚戴天履地能無愧乎孤于今日不應遣此但見蔡遵道云司徒本無西歸之心深有悔過之意不知此語為虚為實吉凶之理想自圖之景報書曰僕鄉曲布衣本乖藝用出身為國綿歴一紀犯危履難豈避風霜遂得富貴當年榮華身世一旦舉旗斾援枹鼔北面相抗者何哉實以畏懼危亡恐招禍害故耳往年之暮尊王遘疾神不祐善祈禱莫瘳遂使嬖倖弄權心腹離二妻子在宅無事見圍及迴歸長社希自陳状簡書未遣鈇鉞已臨既旌旗相對咫尺不逺飛書每奏冀申鄙情而羣帥恃雄眇然弗顧運㦸推鋒専欲屠滅掘圍堰水僅存三版舉目相看命懸漏刻不忍死亡出戰城下拘秦送地豈樂為之但禽獸惡死人倫好生僕實不辜桓荘何罪且尊王平昔見於比肩戮力同心共奨帝室雖復權勢參差寒暑小異丞相司徒雁行而已福禄官榮自是天爵勞而後授理不相干欲求吞炭何其謬也然竊人之財猶謂之盜禄去公室抑謂不取今魏徳雖衰天命未改拜恩私第何足闗言暘嗤不能東封函谷授制於人當似教僕賢蔡仲而哀季氏無主之國在禮未聞動而不法将何以訓竊以分財養幼事歸令終舍宅存孤誰云隙末復言僕衆不足以自强身之䧟危如累卵然億兆夷人卒降十亂紂之百克終自無後潁川之戰即是殷鑒輕重繇人非鼎在徳茍能忠信雖弱必强殷憂啟聖處危何若況今梁道邕熈招攜以禮被我虎文縻之好爵方欲苑五岳而池四海掃氛穢以拯黎元東霸甌越西通汧隴吳越悍勁帶甲千羣秦兵冀馬控弦十萬大風一棬枯榦必摧凝霜暫落秋蔕自殞此而為弱誰足稱雄又見誣两端受疑二國斟酌物情一何太甚昔陳平背楚歸漢則强百里出虞入秦斯霸皆昏明繇主用舍在人奉禮而行神其吐邪書稱士馬精新尅日齊舉誇張形勢必欲相滅切以寒膠白露節候乃同秋風揚塵馬首何異徒知北方之力爭未識西南之合從茍欲狥意於前途不覺坑穽在其側去危就安今歸正朔轉禍為福已脫網羅彼常􅅓僕之愚迷此亦笑君之晦昧今引二邦揚旌北討熊虎齊奮克復中原荆襄廣潁已屬闗右項城縣弧亦奉江南幸自取之何勞見援然權變非一理有萬塗為君計者莫若割地而和三分鼎峙燕魏趙晉足相俸禄齊魯宋衛悉歸大梁使僕得輸力南朝北敦􅊚好束帛自行戎車不駕僕立當世之功君卒父禰之業各保疆壘聘享嵗時百姓乂寧四方安堵孰若驅農夫於隴畝抗勍敵於三方避干戈於首尾當鋒鏑於心腹縱太公為将不能獲存歸之髙明何以克濟來書曰妻子老幼悉在司冦以此見要庶其可反當是見疑褊心未説昔王陵附漢母在不歸太公囚楚乞羮自若矧伊妻子而可介意脫謂誅之有益欲止之不能殺之無損復加阬戮家累在君何闗僕也而遵道所説頗亦非虚故重陳辭更論欵曲所望良圖時惠報㫖然昔與盟主事等琴瑟讒人間之翻為仇敵撫弦搦矢不覺傷懐裂帛還書其何能述文宣帝天保六年梁司徒都督郢州刺史陸法和舉州來降帝以法和為大都督十州諸軍事太尉公以西南都督五州諸軍事荆州刺史安湘郡公宋茝為郢州刺史義興縣公梁将造為散騎常侍儀同三司湘州刺史義興縣公梁将侯瑱來逼江夏齊軍棄城而退法和與宋茝兄弟入朝帝問其竒術虚心相見之備三公鹵簿於城南十三里供帳以待之法和遙見鄴城下馬禹步卒術謂曰公既萬里歸城主上虚心相待何作此術法和手持香爐步從路車至於館明日引見給通幰油絡網車伏身百人詣闕通名不稱官爵不稱臣但云荆州刺史文宣宴法和及其徒屬於昭陽殿賜法和錢百萬物千段甲第一區田一百頃奴婢二百人生資什物稱是宋茝千段其餘儀同刺史以下各差等梁太祖開平二年九月帝西幸至於陜幽州都将康君紹等十人自蕃賊寨内來投又幽州騎将髙彦章八十人騎先在并州乃於晉州軍前來降至是到行在皆賜分物衣服放歸本道以示懐服三年二月同州節度使劉知俊奏延州都指揮使髙萬興部領節級家累三十八人來降三月以萬興檢校司徒為丹延等州安撫招誘等使又八月制左慿背叛元惡遁逃如聞相濟之徒多是脅從之輩若能迴心向國轉禍全身當與加恩必不問罪仍令同華雍等州切加招諭如能梟斬温韜或以鎮寨歸化必加厚賞仍奨官班兼委本界招復人户切加安存閏八月襄陽叛将李供差小将進表帝示以含𢎞特賜勅書慰諭四年二月賜潞州投歸軍馬張行恭錦服銀帶并食五年二月武安軍節度使馬殷進呈䖍州刺史盧延昌牋表䖍州北支郡也兵甚銳自得韶州益强大昇為百勝軍使始洪州之陷盧光稠願收復使府立功自効上因兼授江西觀察留後光稠卒復命延昌領州事方伯亦頗慰薦揚渭遣人為署爵秩延昌佯受官牒禮遣其使因胡南自表其事曰郡小寇迫欲緩其姦謀且開導貢路非敢貳也以其為制来自陳上覽奏曰我方有北事不可不爾甚加撫䘏尋兼授鎮南將軍節度使觀察留後命使慰勞乾化元年六月乙卯命北面都招討使鎮國軍節度使楊師厚出屯邢雒丁巳鎮定鈔我蕩陰詔曰常山背義易水傚尤誘其蕃戎動我邊鄙南侵相魏東出邢雒是用遣將徂征為人除害但初頒赦令不欲食言宥而伐之諒非獲已况聞謀始不自帥臣致此厲階並繇奸佞宻通人使􅇓結犬戎既懼罪誅乃生離叛今雖行討伐已舉師徒亦開詔諭之門不阻歸降之路矧又王鎔處置未曾削爵除名若翻然改圖不逺而復必仍舊貫當保前功如有率衆向明㧞州效順亦行殊賞冀狥来情免令受弊於疲民用示惟新於汚俗宜令行營都招討使及陳暉軍前准此勅文敬加招諭將安衆懼特舉明恩鎮州只罪李宏規一人其餘一切不問末帝貞明元年三月邠州留後李保衡以城歸順保衡楊崇本養子崇本又李茂貞養子任邠州二十餘年去嵗為其子彦魯所毒彦魯權知州事五十餘日保衡殺彦魯送欵於帝即以保衡為華州節度使以河陽留後霍彦威為邠州節度使和好自三代之季天統棄絶皇綱不振豪傑並立干戈日熾禹跡幅裂互奪我疆桀犬吠堯各是其主勢未服徳民思息肩則必奉春秋之盟以修鄰好逹往来之使申其聘禮用和為貴無言不酧恵養疲甿保守封畧力穡以滋其調度通商以便其有無至於天災流行交相救䘏顧謀靈命質諸鬼神盖以随時之大義弭兵之良術也蜀先主之得成都也吳孫權使使報欲得荆州先主言須得凉州當以荆州相與權忿之乃遣吕蒙襲長沙零陵桂陽三郡先主引兵五萬下公安令闗侯入益陽㑹曹公定漢中張魯遁走巴西先主聞之與權連和分荆州江夏長沙桂陽東屬南郡零陵武陵西屬引兵還江州權使大中大夫鄭泉来聘因謂其羣臣曰近得𤣥徳書𤣥徳先主字已深引咎求復舊好前所以名西為蜀者以漢帝尚存故耳今漢已廢自可名為漢中王也章武二年先主侵吳為吳所敗先主駐白帝大帝甚懼遣使請和先主許之遣大中大夫宗瑋報命後主建興元年吳遣信都尉馮熙来聘且弔䘮也是嵗南中諸郡並皆叛亂丞相諸葛亮以新遭大䘮故未便加兵遣尚書郎鄧芝固好於吳致馬二百匹錦千叚及方物二年夏吳遣輔義中郎將張温来聘亦致方土所出以答厚意遂為與國是年後主又遣鄧芝聘於吳重結盟好權謂芝曰山民作亂邊守兵多輙慮曹丕乘空㺯態而反求和議者以為内有不暇幸来求和於我有利宜當與通以自辨定恐西川不能明孤赤心用致嫌疑孤土地邊外閒隙萬端而長江巨海皆當防守丕觀釁而動惟不見便寧得志此復有他圖芝再使吳帝數與芝相聞饋遺優渥七年吳大帝稱尊號其羣臣以並尊二帝来告議者咸以為交之無益而名體弗順宜顯名正義絶其盟好丞相諸葛亮曰吳有僣逆之心乆矣國家所以略其釁情者求犄角之援也今若加顯絶讐我必深便當移兵東戍與之角力須并其土乃議中原彼賢才尚多將相輯睦未可一朝定也頓兵相持坐而湏老使北賊得計非筭之上者昔孝文卑辭匃奴先帝優與吳盟皆應權通變𢎞思逺益非丈夫之為忿者也今議者咸以權利在鼎足不能并力且志望已滿無上岸之情推此皆似是而非也何者其智力不侔故限江自保權之不能越江猶魏賊之不能渡漢非力有餘而利不取也若大軍致討彼髙當分裂其地以為後規下當畧民廣境示武於内非端坐者也若就其不動而睦於我我之北伐無東顧之憂河南之衆不得盡西北之為利亦已深矣權僣之罪未宜明也乃遣衛尉陳震慶權正號震到武昌大帝與震升壇㰱盟交分天下以徐豫幽青屬吳并凉冀兖屬漢其司州之土以函谷闗為界造為盟曰天降䘮亂皇綱失叙逆臣乗釁刼奪國柄始於董卓終於曹操窮凶極惡以覆四海至今九州幅裂普天無統民神痛怨靡所戾止及操子丕桀逆遺醜薦作姦回偷取天位而叡么䯢尋丕凶蹟阻兵盗土未伏厥誅昔共工亂象而髙辛行師三苗干度而虞舜征焉今日滅叡禽其徒黨非漢與吳將復誰任夫討惡翦暴必聲其罪宜先分裂奪其土地使士民之心各知所歸是以春秋晉侯伐衞先分其田以畀宋人斯其義也且古建大事必在盟誓故在周禮有司盟之官尚書有告誓之文漢之與吳雖信繇中然分土裂境宜有盟約諸葛亮丞相徳威逺著翼戴本國典戎在外信感陰陽誠動天地重復結盟廣誠約誓使東西士民咸共聞知故立壇殺牲昭告神明再歃加書副之天府天髙聴下靈威棐諶司慎司盟羣臣羣祀莫不臨之自今日漢吳既盟之後戮力一心同討魏賊救危䘏患分災共慶好惡齊之無或携貳若有害漢則吳伐之若有害吳則漢伐之各守分土無相侵犯傳之後葉克終若始凡百之約皆如載書信言不豔實居於好有渝此盟創禍先亂違貳不協慆慢天命明神上帝是討是督山川百神是紏是殛俾墜其師無克祚國於兹大吳神明鑒之是嵗吳黄龍元年也吳大帝初為吳王黄武元年以使聘魏具破蜀軍獲印綬及首級所得土地并表將吏功勤宜加爵賞之恩文帝報使致鼲子裘明光鎧騑馬又以素書所作典論及詩賦與權詔曰老虜邊窟越險深入曠日持乆内廹罷弊外困智力故見身於雞頭分兵擬西陵其計不過謂可轉足前迹以揺動江東根未著地摧折其支雖未刳偹五臓使身首分離其所降誅亦足使虜部衆兇懼昔吳漢先燒荆門後廢夷陵而子陽無所逃其死来歙始襲略陽文叔喜之而知隗囂無所施其巧今討北虜正似其事將軍勉建方畧務全獨克景帝永安六年十月蜀以伐魏来告使大将軍丁奉督諸軍向魏壽春將軍留平别詣施績於南郡議兵所向將軍丁封孫異如沔中皆救蜀蜀主降魏問至前後罷後主元興元年晉司馬昭為魏相國遣昔吳壽春城降將相國參軍徐紹散騎常侍水曹屬孫彧齎書喻皓以平蜀之事致馬錦等物以示威懐書曰聖人稱有君臣然後有上下禮義是故大必字小小必事大然後上下安服羣生獲所逮至末塗純徳既毁勦民之命以争强於天下違禮順之至理則仁者弗繇也方今主上聖明覆幬無外僕備位宰輔屬當國重唯華夏乖殊方隅圮裂六十餘載金革亟動無年不戰暴骸䘮元困悴㒺定每用悼心坐以待旦將欲止戈興仁為百姓請命故分命偏師平定蜀漢役未經年全軍獨克於時猛將謀夫朝臣庶士咸以奉天時之宜就既征之軍藉吞敵之勢宜遂囬旗東指以臨吳境舟師汎江順流而下陸軍南轅徑取四郡兼成都之械漕巴漢之粟然後以中軍整旅三方雲㑹未及浹辰可使江表底平南夏順軌然國朝深惟伐蜀之舉雖有靖難之功亦悼蜀民獨罹其害戰於綿竹者自元帥以下並受斬戮伏尸蔽地血流丹野一之於前猶追恨不忍况重之於後乎是故旋師案甲思與南邦共全百姓之命夫料力忖勢度資量險逺考古昔廢興之理近鑒西蜀安危之效隆徳保祚去危即順屈已以寧四海者仁哲之髙致也履危偷安隕徳覆祚而不稱於後世者非智者之所居今朝廷徐紹孫彧獻書喻懐若書御於前必少留意回慮革筭結歡弭兵共為一家恵矜吳㑹及於中土豈不㤗哉此昭心之大願也敢不承受若不獲命則普天率土期於大同雖重干戈固不獲已也甘露元年三月皓遣使随紹彧報書曰知以髙世之才處宰衡之任漸導之功勤亦至矣孤以不徳階承統緒思與賢良共濟世道而以壅隔未有所縁嘉意乆著深用依依今遣光禄大夫紀陟五官中郎将𢎞璆宣明至徳江表傳載皓書兩言白稱名言而不著姓陟璆至雒遇晉王相國薨乃遣還寳鼎元年正月遣大鴻臚張儼五官中郎将丁忠弔祭晉王相國宋髙祖大明四年十二月後魏遣通和明帝太始五年十一月魏人来和七年三月魏人來聘後廢帝元徽元年正月魏人來聘三年六月魏人来聘南齊武帝永明元年八月魏人来聘十月使騎将軍劉纉聘於魏二年十二月魏人来聘三年三月使輔國将軍劉纉聘於魏十一月魏人来聘四年二月使通直郎裴昭明聘於魏七年九月魏人来聘十一月詔平南參軍顔明聘於魏八年六月魏人来聘九年正月詔射聲校尉裴昭明聘于魏五月魏人来聘八月使司徒參軍蕭琛聘于魏十月魏人来聘十年二月使司徒叅軍蕭琛聘于魏十一年四月魏人来聘廢帝以永明十一年七月即位十一月魏人来聘隆昌元年正月使司徒參軍劉斆聘于魏海陵王延興元年八月魏人来聘梁髙祖普通七年十月放魏揚州刺史李憲還北大通二年六月魏臨淮王元彧求還本國許之十月以魏北海王元顥為魏主遣東宫直閣将軍陳慶之衛送還北魏中大通元年正月魏汝南王元悦求還本國許之二年六月遣魏太保汝南王元悦還北為魏主八月庚戍輿駕幸徳陽堂設絲竹㑹祖送魏王元悦四年正月以太子左率衛薛法䕶為平北将軍司州牧衛送元悦入雒二月以親除太尉元法僧還北為魏王大同二年十二月東魏請通和許之三年七月東魏遣使來聘九月使兼散騎常侍張臯聘于東魏四年五月東魏遣使來聘七月使兼散騎常侍劉孝儀聘于東魏五年十一月東魏遣使來聘十二月使兼散騎常侍桞彴聘于東魏六年七月東魏遣使來聘是月遣兼散騎常侍陸晏于報聘七年四月東魏遣使來聘是年遣兼散騎常侍明少遐報聘十一月東魏又遣使來聘是月遣兼散騎常侍來狎報聘十一年四月東魏遣使來聘太清元年十二月遣太子舍人元貞還北為東魏主二年七月使兼散騎常侍謝珽聘于東魏結和元帝太清五年簡文太寳二年也時帝承制於江陵猶稱太清年號二月魏遣使來聘承聖元年五月魏遣來賀平侯景敬帝太平元年二月齊人來聘使侍中王廓報聘二年四月齊遣使請和太平元年三月後齊軍繼至陳覇先皆大敗之至是通和陳文帝天嘉二年六月齊人通好三年四月齊遣使來聘五年四月周遣使來聘五月周齊並遣使來聘十二月齊遣使來聘六年四月一作六月周遣使來聘十月齊遣使來聘廢帝天康元年四月即位十一月周人來弔國哀宣帝大建元年五月齊遣使來聘二年五月齊遣使來弔三年四月齊遣使來聘五月周遣使來聘四年八月周遣使來聘五年五月周遣使來聘六年正月周遣使來聘七年八月周遣使來聘東魏孝静帝天平四年七月遣使散騎常侍李楷使于梁十二月梁武遣使來元象元年十月梁武遣使來十二月遣陸操使于梁興和元年六月梁武遣使來八月遣兼散騎常侍王元景使于梁二年三月梁武遣使來五月遣兼散騎常侍李象使于梁十月梁武遣使來十二月遣兼散騎常侍崔謙使于梁三年六月梁武遣使來八月遣兼散騎常侍李騫使于梁四年正月梁武遣使來四月遣散騎常侍李繪使于梁十月梁武遣使來十二月遣兼散騎常侍楊裴使于梁武定元年六月梁武遣使來八月遣兼散騎常侍李渾使于梁二年三月梁武遣使來五月遣兼散騎常侍魏季景使于梁十一月梁武遣使來三年正月帝遣兼散騎常侍李奨使于梁七月梁武遣使來十月遣中書舍人尉瑾使于梁四年五月梁武遣使來七月遣兼散騎常侍元廊使于梁五年正月梁武遣使來四月帝遣兼散騎常侍李緯使於梁六年九月梁武遣使來七年二月遣兼散騎常侍鄭伯猷使于梁時魏收為散騎常侍兼中書舍人自魏梁和好書下紙每云想彼境内寜靜此率土安和梁後使其書乃去彼字自稱猶著此欲示無外之意收定報書云想境内清晏今萬國安和梁人復書依以為禮北齊文宣帝天保元年十一月梁湘東王蕭繹遣使朝貢二年正月梁湘東王蕭繹遣使朝貢四月十日又遣使朝貢三年十一月梁王蕭繹即帝位于江陵是為元帝遣使來聘四年閏十一月梁元帝遣使來聘五年十月西魏伐梁元帝于江陵語清河王岳等率衆救之未至而江陵䧟梁元帝為西魏将于謹所殺梁将王僧辯在建康共推晉安王蕭方智為太宰都督中外諸軍事承制置百官六年正月清河王岳以衆軍渡江尅夏首送梁郢州刺史陸法和詔以梁散騎常侍貞陽侯蕭明為梁王遣尚書左僕射上黨王渙率衆送之五月蕭明入於建鄴按梁書云七月入於京師六月詔曰梁國遘禍主䘮臣離逷彼炎方盡生荆棘興亡繼絶義在於我納以長君拯其危弊比送梁主已入金陵蕃禮既修分義方篤越鳥之思豈㤀南枝凡是梁民宜聽反國以禮發遣是月梁主蕭明遣其子章兼侍中袁泌兼散騎常侍楊裕奉表朝貢初明在梁為豫州刺史明梁武兄子兵敗為魏擒之世宗髙澄禮明甚重謂之曰先王與梁王和十有餘年聞彼禮佛文嘗云奉為魏主并及先王此甚是梁王厚意不謂一朝失信致此紛擾自出師薄伐無戰不克無城不䧟今日欲和非是力屈境上之事知非梁主本心當是侯景違命扇動耳朕可遣使諮論若猶存先王分義重成通和者吾不敢違先王之㫖侯及諸人並即放還於是使人以明書告梁主梁主乃致書以慰世宗是嵗梁元帝為西魏所滅顯祖詔立明為梁主前所獲梁将湛海珍等皆聽從明歸令上黨王渙率衆以送是時梁太尉王僧辯司空陳覇先在建康推晉安王方智為丞相顯祖賜僧辯覇先璽書僧辯未奉詔上黨王進軍明又與僧辯書徃復再三陳禍福僧辯初不納既而上黨王破東關斬裴之横江表危懼僧辯乃啓上黨王求納明遣舟艦迎接上黨王饗梁朝将士及與明刑牲㰱血載書而盟於梁與東度齊師比及侍中裴英起衛送明入建康遂稱尊號以智方為太子是冬覇先襲殺僧辯復立方智以明為太傅明疽發背殂八年十月陳髙祖武帝立遣使稱藩朝賀十年三月梁主蕭荘至郢州遣使朝貢九月使酈懐則陸仁惠使於蕭荘荘在梁為永嘉王蕭明殂帝以莊主梁祀自湓賊城濟江即位于郢州莊為陳人所敗入朝封侯朝廷許以興復竟不果武成帝河清元年正月詔散騎常侍崔瞻聘于陳十月陳人來聘十一月詔兼散騎常侍封孝琰使于陳十二月陳人來聘三年四月詔兼散騎常侍皇甫亮使于陳六月歸宇文媪于周九月歸閻媪于周陳人來聘四年四月陳人來聘後主天統元年六月太上皇帝詔兼散騎常侍王季髙使于陳二年三月陳人來聘六月太上皇帝詔兼散騎常侍韋道儒聘於陳十二月陳人來聘三年四月太上皇帝詔兼散騎常侍司馬幼之使于陳九年周人來通和太上皇帝詔侍中斛斯文略報聘于周十一月太上皇帝詔兼散騎常侍李諧使于陳五年二月詔侍中比烈長文使于周武平元年正月詔兼散騎常侍裴讞之聘于陳二年正月詔兼散騎常侍劉環儁使于陳四月陳遣使連和謀反周朝議弗許九月陳人來聘十一月詔侍中赫連子俛使于周三年三月周人來聘八月使領軍封輔相聘于周九月陳人來聘四年正月詔兼散騎常侍崔象使于周二月周人來聘四月又來聘六月詔開府王師使于周却貢獻古者貢獻之制有藝有極茍非其道庸可取乎觀夫宋齊而下逮於梁室雖眷命攸屬而運厯非正乃有恭已修徳稽古發號不寳逺方之物不納非時之貢志存抑損道符簡易斯亦一時之美足垂於後焉宋髙祖永初中廣州嘗獻入洞細布一端八丈惡其精麗勞人即付有司彈太守以布還之并制嶺南禁作此布帝素有熱病并患金創末年尤劇坐卧常須冷物後有人獻石牀寢之極以為佳乃嘆曰木牀甚費而況石邪即令毁之南齊太祖建元元年四月即位斷四方上慶禮明帝建武元年十月即位詔斷逺近上禮又詔蕃牧守宰或有薦獻事非任土嚴加禁斷十一月立皇太子詔東宫肇建逺近或有慶禮可悉斷之二年十一月皇太子納妃禇氏斷慶禮三年閏十二月皇太子冠㫁逺近上禮梁髙祖天監元年四月即位㫁逺近上慶禮八月交州獻能歌鸚鵡詔不納二年五月㫁諸郡縣獻奉二宫唯諸州及會稽職惟岳牧許薦任土若非地産亦不得貢十四年正月朔皇太子冠停逺近上慶禮陳宣帝大建七年四月監豫州陳桃根於所部得青牛獻之詔遣還民梁太祖乾化二年以丁審衢為陳州而審衢厚以鞍馬金帛為謝恩之獻帝慮其漁民復其獻而停之册府元龜卷二百十五
