  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_329-1a}
body:
  text: 册府元龜卷三百二十九宋王欽若等撰宰輔部任職兼領奉使任職夫百器周用陶甄之工也大川攸濟舟楫之利也是知寅亮衮職財成景化民具爾瞻其任重矣中古而下賢英間作乃有敷五教叙九功撫四夷親百姓緫緝綱領彌縫闕漏致主於垂拱濟俗於仁厚非夫體道仁正暢達物理不將迎於去就不吐茹於剛柔靖恭秉直獻替為任茍思自固疇克用乂至於參决獄訟執操利病隨時適變允資餘力書曰懋徳克勤詩曰不懈於位皆斯之謂也周周公旦自武王即位旦常輔翼武王用事居多及相成王成王在豐天下已安周之官牧政未次序於是周公作周官官别其宜作立政以便百姓百姓皆説召公奭成王時為三公自陜以西召公主之召公之治西方甚得兆民和召公廵行郷邑有棠樹决獄政事其下自侯伯至庶人各得其所無失職者鄭桓公友幽王時為司徒和集周民周民皆悦河洛之間乆更思之子武公亦為司徒善於其職國人宜之故作緇衣之詩美其徳以明有國善善之功焉司徒之秩掌十二教善善者治之有功也鄭國之人皆謂桓公武公居司徒之官政得其宜漢蕭何初為漢王丞相漢王與諸侯撃楚何守闗中侍太子治櫟陽為法令約束立宗廟社稷宫室縣邑輙奏上可許以從事即不及奏上輙以便宜施行上來以聞闗中事計户口轉漕給軍漢王數失軍遁去何常興闗中卒輙補闕上以此專任何闗中何謹守管鑰因民之疾奉法順流與之更始霍光昭帝時為大司馬秉政承奢侈師旅之後海内虚耗光因循守職無所改作至於始元元鳯之間匈奴向化百姓益富舉賢良文學問民所疾苦於是罷酒𣙜而議鹽鐵矣魏相字弱翁宣帝初即位為丞相帝始親萬幾厲精為治練羣臣核名實而相總領衆職甚稱上意相明易經有師法好觀漢故事及便宜章奏既觀國家故事又觀前人所奏便宜之章以為古今異制方今務在奉行故事而已數條漢興已來國家便宜行事及賢臣賈誼晁錯董仲舒等所言奏請施行之相勑椽史按事郡國及休告從家還至府輙白四方異聞或有逆賊風雨災變郡或不時上相輙奏言之時丙吉為御史大夫同心輔政帝皆重之于定國為丞相貢禹為御史大夫數處駁議言與定國不同定國明習政事率常丞相議可天子皆可定國所言翟方進為丞相知能有餘兼通文法吏事以儒雅緣飾法律號為通明相天子甚器重之奏事無不當意後漢趙熹為衞尉行太尉事内典宿衛外幹宰職正身立朝未嘗懈惰杜林為大司空慱雅多通稱為任職相陳寵為司空寵雖傳法律而兼通經書奏議温粹號為任職相胡廣字伯始太傅錄尚書性温柔謹素常遜言恭色練達事體明觧朝章雖無謇直之氣屢有補闕之益故京師諺曰萬事不理問伯始天下中庸有胡公楊秉為太尉是時宦官方熾任人及子弟為官布滿天下競為貪滛朝野嗟怨秉與司空周景上言内外吏職多非其人自項所徴皆特拜不試致盗竊縱恣獄訟紛錯舊典中臣子弟不得居位秉勢而今枝葉賔客布列職署或年少庸人典據守宰上下忿患四方愁毒可遵用舊章退貪殘塞災謗請下司𨽻校尉中二千石城門五营校尉北軍中候各實覈所部應當斥罷自以狀言三府亷察有遺漏續上帝從之於是秉條奏牧守以下匈奴中郎將燕瑗青州刺史羊亮遼東太守孫諠等五千餘人或死或免天下莫不肅然時郡國計吏多㽞拜為郎秉上言三署見郎七百餘人帑藏空虚浮食者衆而不良守相欲因國為池澆灌釁穢宜絶横拜以塞覬覦之端自此終桓帝世計吏無復留拜者劉矩延熹四年為太尉與司空黄瓊司徒种暠同心輔政號為賢相王允初平元年為司徒㑹董卓遷都闗中允悉収歛蘭臺石室圖書秘緯要者以從既至長安皆分别條上又集漢朝舊事所當施用者一皆奏之經籍具存允有功焉蜀諸葛亮為丞相後主建興元年封亮武鄕侯開府治事又領益州牧政事無巨細咸决於亮呉顧雍為丞相平尚書事其所選用文武將吏各随能所任心無適莫滕裔與諸葛恪俱輔政恪伐魏以裔為都下督掌統留事裔日接賓客夜省文書或通曉不􅄰一云裔寵任彌髙接士愈勤表奏書䟽皆自經意不以委下晋裴秀為司空創制朝儀廣陳刑政朝廷多遵用之以為故事在位四載為當世名公李裔為尚書令武帝以司徒舊丞相之職詔以裔為司徒在位五年簡亮持重稱為任職庾氷為中書監揚州刺史是時王導新喪人情怛然氷兄亮既固辭不入衆望歸氷既當重任經綸時務不舍夙夜賔禮朝賢升擢後進繇是朝野注心咸曰賢相又隠實户口科出無名萬餘人以充軍宋徐羨之為司空録尚書事朝野推服咸謂有宰臣之望傅亮蔡廓常言徐公曉萬事安異同南齊禇淵為司徒尚書令朝廷機事多與諮謀毎見從納禮遇甚重梁何敬容大同中為尚書令侍郎参掌朝政機宻敬容乆處臺閣詳悉舊事且聰明識治勤於簿領詰朝理事日旰不休自晋宋以來宰相皆文義自逸敬容獨勤庻務為世所嗤鄙時蕭琛子廵頗有輕薄才因制卦名離合等詩以嘲之敬容處之如初亦不屑也北齊白建武平末歴特進侍中中書令建雖無他才勤於在公屬王業始基戎寄為重建與唐邕俱以典執兵馬致位卿相晋陽國之下都每年臨幸徵詔差科責成州郡本藩寮佐爰及守宰諮承陳請趨走無暇唐邕為尚書令性識明敏通解時事齊氏一代典執兵機是時九州軍士四方勇募强弱多少畨代徃還及噐械精粗粮儲虚實精心勤事莫不諳知自大寕以來奢侈糜費比及武平之末府藏漸虚邕度支取舍大有禆益楊愔為左僕射徙尚書令愔居端揆擢綜機衡千端萬緒神無滯用自天保已後文宣喪徳維時營救實有賴焉隋髙熲為僕射與納言蘇威同心恊賛政刑大小無不籌之故革運數年天下稱治虞世基為内史侍郎煬帝重其才親禮愈厚專典機宻與納言蘇威左翊衛大將軍宇文述黄門侍郎裴矩御史大夫裴藴等叅掌朝政於時天下多事四方表奏日有百數帝方凝重事不庭决入閤之後始召世基口授節度世基至省方為勑書日且百紙無所遺謬其精審如是唐房故齡為尚書左僕射既摠百司虔恭夙夜盡心竭節不欲一物失所明達吏治以文學審定法令意在寛平杜如晦為尚書右僕射與房𤣥齡共掌朝政至於臺閣規模及典章文物皆二人所定岑文本為中書令征遼之役凡所支度一皆委之粮運甲兵並自料配筭不去手文簿盈前計深慮逺神用頓竭言辭舉措頗異平常太宗見而憂之謂左右曰文本今與我同行恐不與同返俄遇暴疾須臾而卒侯君集為吏部尚書叅議朝政君集綜衡流定考課出為將領入豫訏謨有當時之譽杜淹為御史大夫判吏部尚書叅議朝政當塗用事法令明肅為人所稱郭正一為平章事又在中書明習舊事凡有制勑多出其手當時號為稱職姚崇為中書令宋璟為吏部尚書同中書門下三品崇及璟進忠良退不肖賞罰必中朝綱克舉又選補平允委用亷吏權門請託無所復行時議以為復貞觀永徽之政也景雲二年出崇為申州刺史璟為楚州刺史韋安石為侍中自是之後安石與李日知用事官僚繁冗綱紀不振時議思姚宋焉𤣥宗初即位務修徳政軍國庶務多訪於崇同時宰相盧懐慎源乾曜等但唯諾而已崇獨當重任明於吏道㫁割不滯張嘉貞為中書令斷决敏速善於敷奏崔祐甫大歴末為相謀猷啓沃多所𢎞益天下以為可復貞觀開元之太平也楊炎建中初為相出内庫錢帛付之有司以制國用行两税法救時之弊頗有嘉聲趙憬貞元中與賈躭盧邁二人為相躭邁各有假故憬獨對延英敷陳政體言求賢審官等數事徳宗嘉納其言自是特䝉恩顧陸贄貞元中為相精於吏事叅酌裁㫁不失錙銖政不便於時者多所條奏徳宗雖不能皆可而心頗重之裴垍作相請旌别淑慝杜塞蹊徑齊整法度考課吏理帝皆垂意聽納李吉甫元和中自淮南節度使再入相請减省職貟並諸色出身胥吏等及量定外官俸料時以為當李石開成初與鄭覃同平章事三月中因奏事於紫宸殿時方乏雨文宗曰麥苖得未損否石曰春澤之時亦未至損自赦書頒行逺近皆已来賀未見有依節文處置事上聞者臣即進條目伏望省覧比者下令不曽及時今條奏赦書中十一件事最切臣欲提舉令其必行鄭覃曰朝廷法乆不行殊宜愓厲石曰度支每年有十人合有得官臣悉令各守公事留其舊人就加酧奨十年間免一百人入任後唐任圜拜平章事判三司簡㧞賢俊杜絶倖門百官俸入乆為孔謙减折以廷臣為國家之羽儀故優假班行禁其虚偽欲致恭於儒道期月之内庫府充贍朝廷修葺軍民咸足憂國如家晋桑維翰為侍中两朝秉政出上將揚光逺景延廣俱為州守又甞一制除節將五十餘人各領軍職無不屈而服之漢蘇逢吉自河東節度判官拜平章事從髙祖至汴朝廷百司庶務逢吉以為己任參决處置並出胸臆雖有當否而事無留滯王章隠帝初平章事居無何蒲雍岐三鎮叛是時契丹犯闕之後國家新造物力未充與周太祖史𢎞肇楊邠等盡心王室知無不為兼領夫兼領之職出於人主之意初無定制或以司徒領著作或以僕射領太子太傅或領使或遥領或兼知或兼判云石苞為司徒奏州郡農桑未有賞罰之制宜遣掾屬循行皆當均其土宜舉其殿最然後黜陟武帝詔苞督察州郡播殖若宜有所循行者増置掾屬十人聽取主管更練事業者張華為司空領著作荀顗為侍中太尉武帝詔曰顗温恭忠允志行純偹博古洽聞耆艾不怠其以公兼太子太傅侍中太尉如故荀組為司空領尚書左僕射义兼司𨽻賈充為太尉行太子太保魏舒為司徒署兖州中正劉寔為開府儀同三司領冀州都督石鍳為司空領太子太傅南齊王儉為尚書右僕射領吏部尋遷左僕射領太子詹事永明二年領丹陽尹三年領國子祭酒又領太子少傅七年改領中書兼叅選事唐長孫無忌為司徒太宗貞觀十七年四月立皇太子加無忌太子太師兼撿挍侍中房喬為司空貞觀十七年四月立皇太子加喬太子太傅同中書門下三品崔湜中宗景龍中以中書侍郎同平章事與吏部侍郎鄭愔同知選事張説為兵部尚書同中書門下三品𤣥宗開元十年四月己亥勑曰朔方之地雍州之域宻邇闗輔是稱河塞頃者胡孽為宼擾其居人王師有征戎事斯大戍役之弊邉甿既勤雖妖醜厎清而政理未洽不有經制曷云昭蘇且和衆為武者所以詰姦慝總軍命將者所以訓甲兵匪夫大賢孰允兹任兵部尚書中書門下三品燕國公張説天與明秀自然才傑光備九徳𢎞宣七政爰掌邦政實為國禎謀而必忠言期無隠寅亮之美用熈帝載談笑之餘更陳戎備所謂善行樽爼事立封疆宜以上台之尊遥統中軍之任可持節兼知朔方軍節度大使餘如故李林甫為中書令開元二十五年秋兼河西隴右两道節度使遥制政焉天寳十載加右相朔方節度等使詔曰經邦論道允屬於賢才保大定功聿求於長䇿不有兼領孰張綱維開府儀同三司行尚書左僕射兼右相崇𤣥舘大學士集賢院學士太清太㣲宫使脩國史上柱國晋國公林甫器惟國楨材乃人範文標楷式學究精㣲沃啓之誠罄嘉猷於造膝清貞之節盡公忠於匪躬自登於三事式是百辟具瞻惟允茂績居多任總廟堂既賛雍熈之化智髙帷幄更資决勝之謀宜因公輔之重兼受元戎之寄可兼安北副大都督持節朔方節度闗内度支營田鹽池押諸蕃部落副大使知節度事六城水運節度管内軍郡採訪䖏置等使餘並如故時河西節度安思順權知朔方事帝重其任故特委宰臣俾遥領之楊國忠代李林甫為右相兼吏部尚書集賢殿太學士太清宫太㣲宫使判度支劍南節度山南西道採訪两京出納租庸錢使並如故牛仙客為侍中持節朔方節度等副大使開元二十六年兼持節河東節度副大使蕭暠初為河西節度使邉境獲安後遷中書令集賢殿學士知院事兼修國史加金紫光祿大夫常帶河西節度遥領之陳希烈為左相天寳十二載十二月詔曰國之載籍政之本源故藏於蓬山緘以芸閣所以垂一代之成謩三五以還皆率兹道也故每加求購兾補逸遺四部名目悉索而來七畧條流兼該頗盡豈直羽陵之蠧簡汲冢之殘編如聞頃者以來不存勾當或詮次失序或鉤校涉踈或擅取借人或濳将入已因循斯乆散失遂多思革前弊允資盛徳宜令左相兼武部尚書陳希烈充監秘書令省圖書爰假丹青之餘以振鈆黄之美則金華侍講足繼寵於班伯石渠司籍方嗣徽於劉向至公之選可不務乎張鎬為中書侍郎同平章事肅宗至德中方興軍戎帝注意將帥以鎬有文武才乃命兼河南道節度使持節都統河南淮南等處諸軍事第五琦乾元二年以户部侍郎平章事判度支領河南等道支度都勾當轉運租庸鹽鐵鑄錢司農太府出納山南東西江淮南舘驛等使劉晏代宗寳應二年以吏部尚書平章事領度支鹽鐵轉運租庸使杜祐為撿挍司空平章事徳宗貞元二十一年三月進位撿挍司徒充度支鹽鐵等使依前平章事武元衡為門下侍郎平章事憲宗元和三年八月詔兼判户部侍郎事王播穆宗長慶元年七月以刑部尚書領鹽鐵轉運等使十月兼中書侍郎平章事領使如故文宗太和元年五月自淮南入覲六月拜尚書左僕射同平章事領使如故裴度敬宗寳歴二年八月以司空平章事判度支孔緯為門下侍郎吏部尚書平章事僖宗光啟三年領諸道鹽鐵轉運使至昭宗龍紀元年自左僕射門下侍郎平章事加守司空太清宫使𢎞文舘大學士延資庫使領諸道鹽鐵轉運等使杜讓能為右僕射門下侍郎平章事昭宗龍紀六年加左僕射判度支大順二年加延資庫使諸道鹽鐵轉運等使張濬為中書侍郎户部尚書平章事龍紀元年判戸部事劉崇望為中書侍郎吏部尚書平章事大順二年進位門下侍郎判度支事崔昭緯為兵部侍郎平章事大順二年兼判戸部事又加右僕射充諸道鹽鐵轉運等使鄭延昌為户部尚書大順二年以中書侍郎平章事判度支事韋昭度特進行左僕射景福二年為司空門下侍郎同平章事𢎞文舘大學士太清宫延資庫使徐孝若為尚書左僕射門下侍郎同平章事監修國史乾寜二年制勑授司空門下侍郎同平章事太清宫使奉太廟等使𢎞文舘大學士延資庫使充諸道鹽鐵轉運等使王摶為中書侍郎同平章事加户部尚書門下侍郎修國史判度支正議大夫中書侍郎同平章事崔裔為中書侍郎同平章事加禮部尚書集賢殿大學士判户部事陸扆為户部侍郎平章事乾寜三年加中書侍郎兼判户部事裴樞為吏部侍郎光化三年授中書侍郎同平章事判户部天祐元年加右僕射諸道鹽鐵轉運等使獨孤損為戶部尚書門下侍郎平章事天祐元年兼判度支栁璨為中書侍郎平章事天祐六年兼判戸部事梁薛貽矩太祖開運三年九月為門下侍郎平章事判建昌宫于兢乾化二年五月以門下侍郎平章判建昌宫事後唐郭崇韜莊宗同光元年十月以侍中樞宻使兼領成徳軍節度鎮冀深趙等州觀察處置等使真定尹崔協明宗天成三年正月己未中書門下奏國子祭酒闕伏以祭酒之資歴朝所貴爰從近代不重此官經天緯地莫如文戡定禍亂莫如武武不可不講文不可不修况屬聖朝方勤庻政須𢎞雅道以振時風望令宰臣兼判國子祭酒事如䝉允許乞内賜處分奉勑令崔恊兼判張延朗末帝清泰二年自䧺武軍節度使授吏部尚書兼中書侍郎平章事判三司晋劉昫初仕後唐為中書侍郎兼刑部尚書平章事清泰初兼判三司周范質為司徒兼門下侍郎平章事王溥為中書侍郎兼禮部尚書平章事顕徳六年六月以質溥並叅知樞宻院事奉使夫承君命以使四方其選亦重矣至或事繫安危時有緩急雖復公輔之貴股肱攸属亦必奉辭于役宣達王命至於省問風俗宣布徳澤綏懐亡叛撫慰灾沴巡勞屯戍恊和戎虜皆政之大者率以倚成春秋傳曰天子之宰通於四海是之謂也後漢馬日磾為太傅獻帝西都使日磾撫慰天下以太僕趙岐為副日磾行至洛陽表别遣岐宣揚國命所到郡縣百姓皆喜曰今日乃復見使者車騎蜀費禕為大將軍錄尚書事後主延熈八年十二月至漢中行圍守九年六月還成都隋裴矩為黄門侍郎參預朝政令徃張掖引致西蕃至者十餘國大業三年煬帝有事於北嶽咸來助祭帝將巡河右復令矩徃燉煌矩遣使説髙昌王趍伯雅及伊吾吐屯設等啗以厚利導使入朝唐裴寂為右僕射髙祖武徳元年詔巡京城以西詣彼門閻見其耆老觀省風俗亷察吏民乏絶之徒量加賑給如有寃滯並為伸理髙年疾病就致束帛三年五月遣寂犒旋師於蒲州李靖為尚書左僕射太宗貞觀八年為畿内道大使伺察風俗劉仁軌為右相髙宗乾封三年為熊津道安撫大使來常為黄門侍郎同中書門下三品儀鳯元年十二月詔常為河南道大使申理寃屈賑貸乏絶薛元超為中書侍郎同中書門下三品儀鳯元年十二月詔元超為河北道大使分道巡撫婁師徳為夏官侍郎同鳯閣鸞臺平章事長夀二年則天謂師徳曰王師外鎮必藉邉境營田卿須不憚劬勞更充使撿挍乃以為河源積石懐逺等軍及河蘭鄯廓等州撿挍營田大使神功元年拜納言又充隴右諸軍大使仍撿挍河西營田事狄仁傑為撿挍納言兼御史大夫聖歴元年十月奉命安撫河北諸州遭賊之處陸象先為中書侍郎平章事明皇開元八年出為劍南道按察使韋見素為左相天寳末𤣥宗在蜀遣見素與宰臣房琯崔渙使靈武送册書傳位於太子崔渙為門下侍郎平章事肅宗至德元年十二月奉詔宣慰江南仍補署官吏兼知選舉裴遵慶為黄門侍郎平章事廣徳初僕固懐恩阻兵汾上指中官為詞代宗以遵慶忠純特遣徃汾州宣慰蕭復建中末為吏部尚書平章事時盧杞對徳宗前奏議阿䛕順㫖復正色曰盧杞之詞不正帝愕然大驚退謂左右曰蕭復頗輕朕遂令徃江淮山南道宣撫安慰興元二年正月改門下侍郎依前平章事充宣撫袁滋憲宗元和初為中書侍郎平章事㑹韋皋歿劉闢擁兵自擅命滋持節安撫裴度為中書侍郎平章事元和十二年為淮西宣慰處置使刑部侍郎馬總副之周馮道初仕晋髙祖為首相天福二年虜遣使加徽號於髙祖髙祖亦獻徽號於虜始命兵部尚書王權啣其命權辭以老病晋祖謂道曰此行非卿不可道無難色髙祖又曰卿官崇徳重不可深入沙漠道曰陛下受北朝恩臣受陛下恩何不可之有將達西樓虜長欲自出迎道虜之羣僚曰天子無迎宰相之禮因止焉其名動殊俗也如此王峻為樞宻使廣順三年正月辛未太祖御便殿顧謂侍臣曰去嵗霖潦為災河隄决壞今大興工役分命使臣此時計畫務從經乆一勞永逸以息吾民宜得幹才徃彼規畫峻對曰興作事大臣欲自徃區分太祖曰此土工之事不勞大臣峻堅請即途從之及辭賜襲衣金帶綵絹二千疋楚軍指揮使何徽史暉各領龍揵虎揵兩指揮兵士從行頒賜袍帛有差壬申峻進發百官班送於金義門外羣官祖帳甚盛李榖為司空平章事顯徳元年三月壬午治河堤迴見先是河水自揚劉北至慱州界一百二十里連嵗潰東岸而為𣲖者十有二焉復滙為大澤瀰漫數百里又東北壞石堤而出注齊棣淄青至於海澨壞民廬舍占民良田殆不可勝計流民但收野稗捕魚而食朝廷連年命使視之無敢議其功者世宗嗟東民之病故命輔相親督其事凡役徒六萬三十日罷册府元龜卷三百二十九
