body:
  text: 册府元龜卷二百九十六宋王欽若等撰宗室部追封傳曰慎終追逺民徳歸厚矣乃有聯華帝胄齒于宗盟景命弗融遘兹短折或未極封爵之制或不及光華之旦或遭罹横枉沉痛載懷或帝構艱難勲業靡究繇是舉敦族之義申追命之典以至胙土建國節惠易名加尊極之稱升儲副之號備物典䇿寵章渥縟斯王者興仁敦睦化下美俗之道又豈止厚親親之恩而已哉後漢建武十五年追諡兄伯升為齊武公兄仲為魯哀公又依本傳其年追諡伯升為齊武王魏蕭懷王熊太祖子早薨黄初二年追封諡蕭懷公太和三年又追進爵為王鄧哀王冲太祖子建安十三年薨黄初二年追贈諡冲曰鄧哀侯又追號為公太和五年加冲號曰鄧哀王范陽閔王矩太祖子也早薨無子建安二十二年以樊安公均子敏奉矩後封臨晉侯黄初三年追封諡矩為范陽閔公五年改封敏范陽王七年徙封句陽太和六年追進矩號曰范陽閔王豐愍王昻太祖子也太祖南征為張繡所害黄初二年追封曰悼公五年追加號曰豐悼王太和三年改諡曰愍相殤王鑠太祖子也早薨太和三年追封諡曰殤濟陽懷王太祖子也建安十六年封西鄉侯早薨太和四年追進爵諡曰懷公六年又進號曰懷王廣宗殤公子棘太祖子也早薨太和五年追封諡曰殤公郿戴公子整太祖子也建安二十二年封郿侯二十三年薨黄初二年追諡曰戴公靈殤公子京太祖子也早薨太和五年追封諡臨邑殤公子上太祖子也早薨太和五年追封諡剛殤公子勤太祖子也早薨太和五年追封諡樊安公子均太祖子也建安二十二年封樊侯二十四年薨黄初二年追進公爵諡曰安榖城殤公子乗太祖子也早薨太和五年追封諡臣欽若等按魏裴松之注魏武諸子以母貴賤為次不計兄弟之年賛哀王恊文帝子早薨太和五年追封諡曰經殤公青龍二年更追改爵諡為王吳長沙桓王䇿太帝之兄也漢末為討逆將軍㑹稽太守帝稱尊號追諡䇿曰長沙桓王晉隋穆王整義陽王望之子初封清泉侯先父望卒武帝以義陽一縣追封為隋縣王城陽哀王兆字千秋文帝子年十歲而夭武帝踐阼詔曰亾弟千秋少聰慧有夙成之質不幸早亡先帝先后特所哀愍每追遺意情懷感傷於是追加兆詔封諡遼東悼惠王定國文帝子年三歲薨咸寧初追加封諡廣漢殤王廣徳文帝子年二歲薨咸寧初追加封諡毗陵悼王軌武帝子年二歲而夭太康十年追加封諡渤海殤王恢武帝子太康五年薨時年二歲追加封諡南陽王虨愍懷太子子永康元年正月薨四月追封臨川獻王郁㑹稽王道子之子也寧康中追封諡宋臨川王道規高祖少弟也初以起義功封華容縣公後為征西大將軍義熈八年薨追封南郡公高祖受命追封臨川王新野懷王夷父文帝第十七子也元嘉二十九年薨時年六歲泰始五年追加封諡池陽縣侯懷逺晉熙王昶子也早卒明帝即位追封池陽縣侯齊敬王子羽孝武帝第十四子太明三年生當年卒追加封諡淮陽思王子霄孝武帝第二十三子也大明五年生八年薨追加封諡南齊衡陽王道度太祖長兄仕至安定太守卒於宋世建元二年追加封諡始安貞王道生太祖次兄也宋世為奉朝請卒建元元年追加封諡始安靖王鳯貞王子明帝兄也官至正員郎卒於宋世明帝建武元年贈始安靖王安陸昭王緬始安貞王之子也永明九年卒明帝建武元年追贈梁文宣侯尚之高祖從父也仕齊為歩兵校尉卒官天監初追諡文宣侯尚之子靈鈞仕齊廣徳令高祖義師至行㑹稽郡事頃之卒高祖即位追封東昌縣侯忠簡侯崇之高祖從父齊永明中為東陽太守時錢塘唐瑀之反崇遇害天監初追諡髙祖踐阼封崇之子景為吳平侯乃追封諡長沙宣武王懿高祖長兄也仕齊為尚書令東昏時遇害天監元年追崇丞相封長沙郡王諡曰宣武永陽昭王敷高祖次兄也齊建武四年薨高祖即位追封永陽郡王諡曰昭衡陽王暢高祖第四弟仕齊至太常封江陵縣侯卒天監元年追封衡陽郡王諡曰宣桂陽王融高祖弟仕齊太子洗馬永元中宣武之難融遇害天監元年追封桂陽郡王諡曰簡陳始興昭烈王道談高祖兄也仕梁為東宮直閣將軍侯景之亂援臺中中流矢卒紹泰二年追贈義興郡公諡曰昭烈高祖受禪重封始興郡王南康郡王休先高祖母弟梁太清中卒高祖受禪追封南康郡王諡曰忠壯豫章王立長沙王權皆高祖子永定二年追封立諡曰獻權諡曰思後魏高凉王孤平文皇帝子也道武時以孤勲髙追封髙凉王諡曰神武順陽王郁桓帝之後也文成時為殿中尚書賜爵順陽公及乙渾專權郁從順徳門入欲誅渾渾窘怖遂奉獻文臨朝後復謀殺渾為渾所誅獻文録郁忠正追贈順陽王諡曰簡秦明王翰昭成帝子建國十年卒道武即位追贈秦王諡曰明王翰子愍王觚使於慕容垂垂止觚道武討中山慕容普驎害觚及平中山追封諡曰秦愍王陳留王䖍昭成孫登國初封陳留公後慕容寳來冦虎戰没道武追惜傷慟追諡陳留桓王江夏王吕道武族弟初以軍功封江夏公卒贈王爵淮陵侯大頭烈帝之曾孫文成初封淮陵侯卒贈高平公河間公齊烈帝𤣥孫太武時賜爵河間公卒諡曰敬樂陵王胡兒景穆子和平四年三月追封樂陵王章武王大雒景穆子皇興二年薨追贈征北大將軍章武郡王諡曰敬河間王若文成帝第七子年十六未封而薨追封河間王諡曰孝長鄉縣侯提臨淮王譚子太武孫也以貪縱削除加罰後詔提從駕南伐至雒陽參定遷都之議尋卒以預參遷都功追長鄉縣侯提子濟南王昌宣武時復封臨淮王未拜而薨贈齊州刺史諡曰康追改封濟南王都昌伯誘中山王熙弟也熙起兵誅元乂為其長史柳元章等所殺誘被誅後追封都昌縣開國伯諡曰恭東安王凝弟湛為廷尉少卿莊帝初遇害河隂贈征東大將軍青州刺史追封漁陽王武邑王義興景穆曾孫也初於河隂遇害永安中追封燕郡王尋改封鉅鹿王又改封武邑王陳留王真孝莊之兄也建義元年六月追封為陳留王後周邵國惠公顥武帝伯父保定元年七月追封邵國公諡曰惠顥子景公什肥年十五而顥沒後魏永安中太祖入關什肥不能離母遂留晉陽及太祖定秦隴什肥為齊神武所害追贈大冢宰襲封邵公諡曰景杞簡公連武帝伯父追賊定州戰殁保定元年七月追封杞公諡曰簡連子烈公元寶為齊神武所害保定初追贈襲杞國公諡曰烈莒國莊公洛生亦武帝伯父也保定元年七月追封莒公諡曰莊洛生子穆公菩提為齊神武所害保定初追贈大將軍襲爵諡曰穆宋國公震文帝子也保定元年七月追封虞國公仲武帝族祖保定元年十二月封隋河間公元孫髙祖從父也帝受禪贈尚書令河間郡公義成縣公鍾葵髙祖族祖帝受禪追贈義成縣公蔡王整高祖弟也周明帝時賜爵陳留郡公從武帝平齊戰死高祖受禪追封蔡王諡曰景河間王𢎞高祖從祖弟也為太子太保薨大業六年追封郇王唐鄭王亮高祖從父隋海州刺史武徳初追封畢王璋高祖從父仕周梁州刺史謀殺隋文事泄被誅高祖即位追封畢王郇王禕高祖從父武徳初追封蔡王蔚高祖從父武徳初追封西平王安蔚子武徳初追封濟南王哲安弟武徳初追封雍王繪高祖從父武徳初追封河南王贄繪子武徳初追封東平王韶贄弟武徳初追封梁王澄蜀王湛漢王洪皆高祖兄並早卒武徳初追封衞王𤣥覇高祖子早薨武徳元年追封諡曰懷楚王智雲高祖子大業末從高祖於河東及義師將起建成濳歸太原以智雲年小委之而去因為吏所簿送于長安為隂世師所害義寧元年追封楚國公武徳元年進封王諡曰哀寧王憲睿宗長子天寶元年十一月制曰能以位讓為吳太伯存則用成其節殁則當表其名非常之稱旌徳斯在故太尉寧王憲誕含粹靈允膺大雅孝悌之至本乎中誠仁和之深非繇外奬率繇禮度雅尚文儒謙以自牧樂於為善比兩獻而有光與二南而合徳自出臨方鎮入配台階逾勵忠勤益聞周慎實謂永為藩屏以輔邦家曾不憗遺奄焉殂没友于之痛震動良深惟王朕之元昆合升上嗣以朕奉先朝之睿略定社稷之阽危推而不居請予主鬯又承慈㫖焉敢固違不然者則震極之尊豈歸于薄徳茂行若此易名是慿自非大號孰副休烈按諡法推功尚善曰讓徳性寛柔曰讓敬追諡曰讓皇帝宜令所司備禮册命册曰皇帝若曰於戲古者崇徳考行猶諡大名飾終追逺亦應徽册况乃元昆之戚天倫之重豈循常典者哉咨爾故太尉寧王憲純粹秉靈冲和成量孝友之性發乎天然仁義之道彰乎日用加以好賢不倦樂善有聞休問掩於閒平清猷光於魯衛實謂儀刑邦家保祐藩維景命不融奄從薨逝興言震動哀疚纒懷惟王地居元子合膺主鬯昔朕上禀先訓克清羣兇遂固守撝謙懇讓儲副然則深仁厚徳茂行已表於生前寶位尊名盛禮寧忘於歿後是用諡王為讓皇帝令遣使尚書左丞相耀卿副使太常卿韋縚等持節禮册因心之感備物飾情瞻典䇿而哀深想棣華而望絶所冀幽穸嘉兹寵榮申王撝睿宗子開元十二年薨制曰徳盛者必享休名道高者必膺殊典况人倫之重義切因心天屬之深情殷追逺故司徒申王撝叡哲聰明本乎天性温恭孝友挺自生知樂善好書清猷邁於兩獻深仁厚義美化侔於二南可謂具瞻百寮儀刑列辟朕將永康兆庶方自友于天不憗遺􅍕從薨逝永惟仁範哀慟纒懷用表非常之榮少寄天倫之戚可追贈惠莊太子宜令所司備禮就加册命陪葬橋陵以禮部尚書蘇頲為䘮葬使京兆尹李休光為副使尚書左丞楊承令為鹵簿使遣侍中攝太尉元乾曜持節册曰維開元十二年十一月甲申皇帝若曰於戯夫縟禮所以飾情崇名所以表徳義存追逺愛洽因親惟故司徒申王撝璿極禀虛邦家維翰體孝友以成性用淳和而合道沛獻受易率以鳴謙河間聚書時其好學加以出為方伯𢎞宣六條入登司徒大敷五教而天則不憗奄薨於行留邸無期同氣遂逺興哀痛震動於厥心夫先王演親親之恩春秋著加等之義上嗣之位飾終斯在宜率茂典以永徽猷魂而有靈式昭哀贈岐王範睿宗于開元十四年薨陪葬橋陵制曰褒崇名器所以尊徳也光昭典禮所以飾終也况天倫之愛親親之至乎故太子太傅上柱國岐王範特禀聰明率繇孝友好書不倦樂善無忘固已作則列藩儀刑百辟方慿魯衛之政率流雍穆之風豈圖輔徳愆期殱良奄及想同氣而莫遂望驂駕而何追言念平生情深震動宜加殊禮之命用寄孔懷之哀可追贈惠文太子薛王業睿宗子開元二十一年薨明年册贈惠宣太子隋王隆悌睿宗子也初封汝南郡王早薨唐隆元年追贈義豐郡王光順桂陽郡王守義皆章懐太子賢之子也先天二年三月太上皇詔追封光順為莒王守義為畢王慶王琮𤣥宗長子天寶十一載薨贈靖徳太子後肅宗元年建寅月詔曰聖人立號天下至公膺其美者必歸有徳有其徳者或無其位苟徽烈可紀則追崇之典行焉况義貫因心禮優加等稽夫往䇿抑有前聞盛業鴻猷久不可替故靖徳太子琮慶鍾霄極親則朕兄性與天道行高時望宣慈惠和聰明睿哲四科兼綜一以貫之而福壽不遐既隨往運緬惟友愛實軫于心朕昔踐儲宮顧誠非次於君人之命所不敢違以少長而言豈忘其序每思懇讓竟莫獲從遽順聖慈嗣兹寶位安可不申夙志有闕推恩宜加尊異之名載茂哀榮之典敬用追諡曰奉天皇帝妃竇氏曰恭應皇后宜委有司即擇日册命更以禮葬仍令右僕射晃充使監護少府竇履信為副榮王琬𤣥宗子天寶十四載薨贈靖恭太子夏王一𤣥宗子開元五年孩孺而薨追封夏王諡曰悼懷王敏𤣥宗子纔晬開元八年二月薨封懷王諡曰哀建寧郡王倓肅宗第三子天寶中封肅宗至靈武為張良娣李輔國所搆賜死代宗即位追贈齊王大厯三年五月詔曰故齊王倓承天祚之慶保鴻名之光降志尊賢高才好學藝文博洽智畧宏通斷必知來謀皆先事識無不逹理至逾精乃者冦盗横流鑾輿南幸先聖以宸扆之戀將侍君親惟王以宗廟之重誓寧家國克協朕志載符天時立辨群議之非同獻五原之計中興之盛實藉竒功景命不融早從厚穸天倫之愛震惕良深流涕追封胙于東海傾加表飾未極哀榮夫以參舊邦再造之勤成天下一家之業而存未峻其等沒未尊其稱非所旌徽烈明至公也朕以𦕈身纘膺大寶不及讓王之禮莫申太弟之嗣所懷靡從追想逾切非常之命寵錫攸宜敬用追諡曰承天皇帝與興信公主第十四女張氏冥婚諡曰恭順皇后有司准式擇日册命改葬于順陵仍袝於奉天皇帝廟同殿異室焉衛王佖肅宗第四子天寶中封西平郡王早薨寶應元年五月追封鄆王榮肅宗第八子天寶中封靈昌郡王早世寶應元年追封鄆王恭懿太子佋肅宗第十二子至徳二年封興王上元元年薨詔曰厚禮所以飾終易名所以表行况情鍾天屬寵及褒封載疇加等之美式備元儲之贈永懐軫念有惻彞章第十二子故興王佋毓慶璿源分華若木天資純孝神假聰明河閒聚書㓜聞樂善之㫖延陵聽樂早得知音之妙頃以蹔嬰沉瘵殆積旬時而資敬益章頴晤逾爽愛親之戀言不間於斯須告訣之詞事先符於夢寐顧惟至性實切深衷將分土析珪載崇藩翰聞詩對易爰就琢磨方兾成立未虞天䘮瑶英始茂遽摧於當春隙駟俄遷忽沉於厚夜興言痛悼憫惜良深宜賁寵於青宮俾哀榮於𤣥穸可贈太子諡曰恭懿佋薨時七八嵗既薨之夕肅宗張后俱夢佋有如平昔拜辭流涕而去帝方寢疾追念過深故特以儲嗣之贈寵之上疾累日方平宋王僖肅宗第十四子早世建中二年正月追封昭靖太子邈代宗第二子寶應元年封鄭王大厯九年薨帝惜其才早夭册贈昭靖太子均王遐代宗第三子早夭貞元八年追封荆王選代宗第十一子早世建中三年追封靈溪郡王詠昭靖太子第二子大厯十年七月追封代王諲徳宗第八子本封縉雲郡王早薨建中三年正月追封邕王謜順宗子徳宗命之為子貞元四年封十五年十月薨時年十八贈文敬太子晉王普敬宗長子太和二年詔曰王者重統紀尊儲副所以上嚴國本祗叶禮經睦人倫以正邦典崇丕基而昭彞式其或徳契元良恩當追命道雖間於存歿義有表於哀榮仰惟舊章用攄憫志故開府儀同三司晉王普先帝冢嗣閒氣夙鍾孝敬發於岐嶷温仁形於襁褓翦珪分社光祝册於參墟錫土啓藩假威尊於上黨朕頃戡内難謬屬與能以王齒在嬰提事絶推讓方期就傅謂致修齡既因猶子之義俾膺主鬯之選天不憗遺殱我本枝泣悼永往空餘典禮嗟樂善而莫報顧卜起而何追衘悲良慟此誠無極是用稽諸前訓申我宿愛布曩懷於此日告如在于幽靈式備虛儀曷瘳深痛可贈悼懷太子仍令有司擇日備禮追册梁永王義方太祖伯父韶王義談太祖叔父開平四年追封朗王存太祖仲兄唐乾符中與太祖俱逐黄巢中流矢而卒開平四年四月追封郴王友裕太祖長子唐末為華州節度使守興徳尹天祐元年卒開平五年追封宻王友倫太祖兄子唐末為宿衛都指揮使遥領容州節度使因㑹客擊鞠馬逸墜車而薨開平三年追封安王友寧太祖兄子唐末遥領邕州節度使昭宗自奉鳯翔還降詔書以青冦未殄委之攻討友寧進師逼青州青人悉出大戰于石樓王師少却友寧自峻阜騎馳殿軍馬蹶仆為敵人所及而薨開平三年追封晉陳王重杲高祖子㓜亡天福六年五月追封福王徳高祖弟後唐末為沂州馬歩軍都指揮使天福初贈太傅七年正月贈太尉追封通王殷高祖弟天福初贈太傅七年正月贈太尉追封廣王威高祖弟後唐末為彰聖后第三軍都指揮使長州刺史天福初贈太傅七年正月贈太尉追封虢王重英高祖子天福二年正月贈太保七年正月贈太傅追封壽王重義高祖子天福二年權東都留守遇害贈太傅七年正月贈太尉追封郯王重𦙍高祖子天福二年正月贈太保七年正月贈太傅追封沂王重信高祖子天福二年為河陽節度使遇害贈太尉七年正月贈太師追封䕫王重進高祖子天福二年正月贈太保七年正月贈太傅追封韓王暉高祖弟為曹州防禦使以疾終於官歸葬太原天福八年追封周郯王侗杞王信皆太祖子乾祐末遇害廣順元年二月詔以故第二子青哥贈太保賜名侗第三子意哥贈司空賜名信顯徳四年四月制曰禮以縁情恩以悼往矧在友于之列尤鍾惻愴之思故皇弟贈太保侗贈司空信等玉葉聯芳金莖比瑞屬景運之初啓何大年之不登未剪桐珪連雕棣蕚俾予終鮮實動永懷既登叙以無階在疏封而豈恡贈其王爵慰我天倫侗追封郯信追封杞王越王誼吳王誠韓王諴皆世宗子乾祐末遇害廣順元年二月太祖詔故皇孫三人宜哥贈左驍衛大將軍賜名誼二哥贈左武衛大將軍賜名誠三哥贈左屯衛大將軍賜名諴顯徳四年四月制曰父子之道聖賢不忘再思夭閼之端愈動悲良之抱故皇子贈左驍衛大將軍誼贈左武衛大將軍誠贈左屯衛大將軍試等鳯雛龍翰常聳其殊姿玉折蘭摧早罹於非禍載惟往事有足傷懷宜贈一字之封仍贈三台之秩表吾追念慰乃英靈誼追封越王誠追封吳王諴追封韓王册府元龜卷二百九十六
