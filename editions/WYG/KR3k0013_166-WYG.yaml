body:
  text: 册府元龜卷一百六十六宋王欽若等撰帝王部招懐第四後唐武皇以大順二年三月邢州節度使安和建叛入汴軍武皇令李存孝定邢洺因授之節鉞時幽州李威與鎮州王鎔屢弱中山將中分其疆土定州王處存求援于武皇武皇命存孝侵鎮趙之南鄙又令李存信李存審率師出井陘以㑹之併軍攻臨城柏鄉李威救至且議旋師乾寧元年五月鄆州節度使朱瑄為汴軍所攻遣使來乞師武皇遣騎將安福順安福應安福遷督精騎五百假道於魏州以應之三年五月汴人大舉以攻兖鄆朱瑄朱瑾再乞師於武皇武皇假道於魏州羅𢎞信許之乃令都指揮使李存信將歩騎三萬與李承嗣史儼㑹軍以拒汴人存信軍於莘與朱瑾合勢頻挫汴軍四年九月河中王珂來告急言王拱引汴軍來冦武皇遣李嗣昭將兵三千以援之屯於胡壁堡汴軍萬餘人來拒戰嗣昭擊退之天復三年梁太祖所署昭義節度使丁㑹以潞州歸帝納之賜甲第於太原位在諸將上莊宗初為晉王天祐八年正月南伐至邢州遣李存璋治械攻城時梁將王檀為邢帥乃約矢飛書諭以禍福曰天維助順神亦害盈有道即興無道即滅昔漢朝中否俄成王莽之妖晉祚中㣲復起桓𤣥之禍莫不因縁多難構合異圖謂天地可以心欺謂帝王可以力取殊不知雪霜之後寒松驗貞翠之姿喪亂之期義士見忠勤之節是故南陽宗室京口英雄皆懐仗順之謀悉建平勲之䇿逆温萑蒲餘孽􅅵畝㣲民因黄巢將敗之秋於白水喪師之後自知勢蹙遂乃向明聖朝以方切招懐顯行恩渥使從賊將委以齊壇錫全忠之嘉名居夷門之重地爾後連侵四鎮累擁雙旌非聖朝恩澤不深非聖朝有負此賊而乃結連姦逆攻逼河岐謀害近臣刼遷鑾輅終成大逆遂弑昭皇殺戮宗支逼辱妃后萬民相顧而抆淚百辟飲恨以吞聲以致神堯萬代之基䧟入碭山䜿子之手人祗痛憤天地惨傷况復自僭逆以來猜狂愈甚忌勲舊則殺傷已盡貪財貨則溪壑難盈氏叔琮朱友㳟之徒蔣𤣥暉張廷範之軰罪無毫髮皆被誅夷王仲師覆族於前劉知俊脫身於後如斯統馭何以扶持稍成𤓰李之嫌便中䜛邪之口且鎮定兩地聖唐重藩皆世嗣山河代分旄鉞各以生靈是念封壤求安既拜表以稱臣又竭財而入貢而逆温不察忠瘁潜肆窺圖詐稱應援之師盗取深冀兩郡見利忘義一至於斯欲令天下歸心乃至舟中敵國昨鎮定大王特差人數徑告弊藩予遂統師徒躬來應援逆温已令其將王景仁等七八萬衆屯據柏鄉日令歩騎攻圍其城終不出鬭遂令引退即便前來既落彀中須施毒手東西掩擊勢若山摧擒戰將二百餘員奪鐡騎五千餘匹横屍滿野皆龍驤神㨗之徒棄甲如山悉長劍銀鎗之類程思權縷陳表本張濤亦備述事機燃董卓之臍何煩再舉斬桓𤣥之首正在此時近又岐下淮南皆通間使咸期春首同起義師計柏鄉之勝㨗遠聞在兩地之戈鋋轉急天時人事昭然可知伏以公緱嶺名家聖唐勲族因逢國難偶在賊庭當華夷無事之時滿朝朱紫儻社稷中興之後足顯勲名予曽髙自憲宗朝赴闕以來世荷恩寵敢因此際誓復聖唐必不與碭山田夫同戴天而履地予幕賓王緘僕射九月中鳳翔使廽劉知俊令公因遺書示兼傳宻意具述足下相與之分最異他人兼憑附逹絹書尋令通送又累得潞州相公家兄文字及招得魏博子將聞得逆温於公君臣之分已有猜嫌曾於故鎮着人密欲窺筭皆言紀綱不少謀害稍難頗得事機極不虛謬且公彭門侍中之後鴻勲茂業播在史書豈忍屈節賊庭㸃汙盛族轉禍為福去就奚安箕子去殷項伯歸漢棄骨肉猶稱先智全富貴固是良圖今三鎮嚴師已及城下敢假丹抱仰逹英聰儻蒙俯賜忠言見機知變叶同討逆興復聖唐則身與金石齊堅名與天地同固蓋以乆欽重德是敢先貢直言如明鍳未廻丹誠尚阻則長濠巨塹築室返耕使飛走以無門固展覿而有日二月南伐鄆州歩騎三千自黎陽歸國其都指揮使張從楚曹儒謁見帝賜衣袍韉馬額其兵為左右是月命從楚儒為都將俱賜姓李氏從楚改名紹文曹儒曰紹武十三年八月攻邢衛洛磁下之相州節度張筠棄城遁去邢州節度閻寳嬰城拒守帝令軍士諭以張筠宵遁令降將張温率汴軍五百於城下招諭之寳知勢危窘援軍路絶請以城降帝嘉之進位檢校太尉同平章事遙領天平節度東南面招討等使待以賓禮位在諸將上九月梁將戴思遠為滄州帥時已定魏博思遠勢蹙棄州遁走毛璋毛璋本滄州小校乗虛據之以城歸國因授貝州刺史轉遼州十四年二月梁將謝彦璋帥衆數萬逼楊劉城帝自魏州聞之輕騎趣于河下賊軍遂壘以自固又決河水瀰漫數里以陷我軍我軍不得進自破安彥之後其潰亡之卒多嘯聚於兖鄆山谷間觀時勝負有投來者帝以書諭之曰夫相時逹變為智士之良圖擇福知機蓋丈夫之能事故有竄身山谷不處危邦今古攸同豪傑共貫近聞鄆州山塞聚徒實繁竝是汴雒舊人兖鄆竒士見河南之失險知偽數之必亡厭血刄於連年避淫刑於虐主必想元元失所恟恟無依莫知投足之方未有息肩之地予自去冬親提虎旅徑取楊劉既獲通津已諧大計視逆豎而便同机上算梁園而已在彀中謝彥璋營葺梟巢嘯聚河上撩虎頭而難逃碎首伸螗臂而何暇爭鋒今則虐使生民決開天塹築隄壅水自固軍營偷生取笑於庸夫作事頗同於兒戲公私塗炭内外分離既板蕩以不披固氷消而在即予俯詳人事仰察天時既畫成謀已圖大舉控新覊之鐡馬礪却日之霜戈屈指定期長驅決戰誓平國耻須復家仇廓妖祲於西郊奉中興於萬葉諸君等或中州義士或大國遺民困兵革而不保田園避殘酷而深藏溪洞聞余義舉計各歡然今既屯聚衆多已相統屬須自謀畫首立功名或則攻取城池便可跨據州縣因滋事勢以決遠圖梁冦既西有多虞固不暇分兵東去青兖則無人之境齊鄆則喪亂之州彼若圖之必定成事斯為上䇿不可後時凡有兵機予能應接當俟寰區一統海内為家可於所得封疆遂其冨貴之願蒼窘白水予所不期若守險偷生濳身匿迹終為亡命自棄何多時不再來機須速決長謀遠筭自可擇焉自是兖鄆羣盗往徃率衆歸于行臺十五年梁河中節度使朱友謙來乞師友謙本名簡梁太祖畜為假子以為陜州節度後為河中節度及友珪弑逆意深不懌友珪徵之友謙不奉命友珪令其將韓勍等將兵攻之友謙乞師於帝帝赴援大敗汴軍與友謙㑹於猗氏陳詞瀝懇願為附庸帝嘉其忠頗厚待之十六年攻下濮陽獲其良吏乃下教告諭曹濮百姓曰干紀亂常人神共怒弑君盗國天地何容激忠良仗順之心拯黎庶倒懸之急予援從近歳親舉義師毎惟戡難之謀所切弔民之患而賊黨不分逆順憑附妖兇唯偷晷漏之生不慮覆亡之禍去秋予暫歸寧覲留侍并都賊將王瓚輙渡洪河偷營巢穴不敢前來決戰遠出交兵閉壁偷安可知羸懦予親臨賊壘率士登城賊遂出營門與吾合戰纔交鋒刄便委干戈戮甲士二萬餘人奪鐡騎三千餘匹敬千李立之軰已釁鼓於軍前拱辰侍衛之徒盡横屍於大野所殘無幾不日翦除料彼友貞難逃鈇鉞豈能保完生聚禦捍疆陲予昨徑出偏師徇地曹濮閔其蒸庶罹此百殃空多轉餉之勞殊失保全之望予示其禍福各擇安危勿附賊以亡家須決機而保族若能自攜老㓜歸我封廵亦議撫綏俾令蘓息如懐鄉戀土苟免待時則須遠避兵鋒慎於去就佇平兇醜冀復鄉園其諸軍兵士州縣長吏等自解圍上黨對陣柏鄉華縣交兵楊劉接戰亦合諳吾機略可料興衰何必阿附元兇自貽伊戚不如嚮義自卜永圖旦旦之懐元元共悉十七年秋六月梁將劉鄩尹皓冦同州先是河中節度使朱友謙取同州以其子令德王留務請梁王降節梁王怒不與遂請旄節於帝梁王乃遣劉鄩與華州節度使尹皓帥師圍同州友謙來告難帝遣蕃漢總管李存審昭義節度使李嗣昭代州刺史王庭及率師赴援九月師至河中朝夕濟梁人不意王師之至望之大駭明日次於朝邑與朱友謙謀遲明進軍距梁壘梁人悉衆以出蒲人在南王師在北騎軍既接蒲人小却李嗣昭以輕騎抗之梁軍奔潰追捕二千餘級是夜劉鄩收餘衆保營自是閉壁不出數日鄩遂宵遁王師追及於渭河所棄兵仗輜重不可勝計劉鄩尹皓單騎獲免未幾鄩憂恚發病而卒二十年四月莊宗即位制曰澤潞封疆兄弟之國追思舊績言念疲民惠在綏懐恩加招撫各仰㳂路鎮戍布命宣陳咸令樂業營生無使侵疆為患同光元年八月梁行營右先鋒指揮使康延孝自髙陵津渡剽於臨河帝以騎軍挑戰延孝率百餘騎倒戈來歸延孝本晉陽人家世部率少𨽻太祖軍負罪奔於梁漸至偏禆性剛烈負氣不居人下知賊庭終敗來奔帝虛懐引見解御衣金帶以賜之翌日賜田宅於鄴以為捧日都軍使兼南面招討都指揮使檢校司徒守博州刺史時河朔危急延孝至軍情稍壯十月己夘車駕至汴州梁開封尹王瓉恐懼出城迎降伏地請死帝曰朕與卿家世宻親兵或阻闊卿時竭心所事人臣之節也何罪之有乃命復舊職及誅張漢傑朱珪軰瓉大憂駭不自安以憂病所有家財相繼入貢帝慰諭之終以憂病而卒壬午梁將段凝所部馬歩軍伍萬解甲於封丘勅㫖令於州城北十里排立俄而凝等率大將先至泥首請死帝慰之曰偽主詿誤卿軰無罪各賜錦袍御馬錢帛有差帝出封丘門撫勞兵士歡呼之聲殷動天地帝慰之曰爾等皆吾赤子被賊驅率暴露征行數十年來不安耕織今誅逆孽平一天下自此休兵罷戰何樂如之可各復本營餘勿憂懼癸巳勅朕親驅義旅徑下偽庭兇讐雖已翦除内外或聞搔擾貴行招諭以示綏懐應諸色官員竝宜仍舊勾當當軍百姓各自安居永無勞弊之虞共睹昇平之代如無量之軰扇動人情便仰宻加追捕嚴行處斷貴從寧謐當體朕懐是月入雒為雒京留守河南尹張全義羸老不勝拜蹈帝令人掖之臨軒慰勞稠沓初全義棄澤州而趨河陽弟全武及家屬為我軍所得歸之太原太祖給賜田宅厚加撫恤天復中宻令人通情至是帝重其宿望謂之曰張侯無恙卿識機知變無繇與我早通卿家弟姪幸復相見全義垂涕謝恩進幣馬千計謝恩帝命皇子繼岌皇弟存紀等弟兄之是同詔曰叛之則懲服之則捨蓋前經奥㫖為當代之通規既屬纂承是務遵守應舊偽庭位居藩翰任處專城或掌握兵權或捍防邉鄙各為其主以全其名既解甲以歸明或飛章而送欵變通斯覩忠節可嘉其逐處節度觀察防禦團練等使及諸州刺史監押及偽庭先差出行營將校都監等竝須恩詔不議改更仍許且稱舊禦當俟别加新命是月偽梁宋州節度使袁相先至覲於𤣥德殿泥首待罪詔赦之十一月梁河中節度使西平王朱友謙自河中至見于𤣥德殿進金鞍名馬帝慰勞加等友謙乞割磁隰依舊為蒲之屬郡乃以絳州𨽻之又求為安邑解縣兩池𣙜鹽使亦許之尋加守太師尚書令進邑至一萬八千戸西平王如故又賜姓名繼麟兼賜鐡劵恕死罪是月中書奏河南諸方鎮節度刺史昭洗之後未有新官毎上表章只書姓名未頒渙汗必負憂疑望宣付各降制命以表新恩從之二年二月遣左武衛大將軍張紹虔押國信宣賜淮南五月路州賊首領楊立遣守將韓暉奏表乞行赦宥帝令樞宻副使宋唐玉齎勅招撫四年二月癸丑中書門下奏偽蜀官員先有赦㫖黜降近者員數極多相次到闕並是未承前勅慮抱憂疑宜令御史臺具所到官員出身歴任三代家狀約偽官品秩准前勅次第當擬同正官奏復如是偽蜀將相家屬稍多即於山東州府安置如位卑家屬少者或是本朝舊人有骨肉見在班行即任便居止或是三川居人願還本土亦俟三兩日放歸本處或有本朝曾登科第歴任班行材噐為衆所知可以甄録即續具人才酌量奏擬從之是時偽蜀宰相王鍇庾傅表張格皆本朝衣冠之後也豆盧革韋說素知之既聞歸欵意欲處之善地故有是條奏以俟其來孫彦韜字德光少以勇力聞於鄉里唐末朱氏將圖革命兼領四鎮擢彦韜于伍卒歴諸軍偏校及朱氏僭竊軍鋒屢為莊宗所敗彦韜北屯河上知大事不濟乃間行繇官渡委質來歸帝喜而納之授親從定㨗右廂指揮使劉玘梁貞明末為晉州觀察留後莊宗收復汴州玘來朝玘在平陽八年日與上黨太原之師交鬭境上莊宗見而勞之曰劉侯無恙爾控吾晉陽之南鄙歳時乆矣不早相聞今日見訪不其晏歟玘頓首謝之郊天後復令歸鎮正授旄節尋有詔改授安遠軍明宗初以天祐九年領内衙親兵時周德威攻圍幽州劉守光困蹙令元行欽於山北募兵以應契丹時帝攻行欽於山北與之接戰矢及帝馬鞍既而以勢廹來䧏帝憐其有勇奏𨽻為假子後因從征恩禮特隆嘗臨敵擒生必有所獲名聞於軍中天成元年八月以偽蜀開府儀同三司行尚書右僕射兼中書侍郎同中書門下平章事上柱國趙國公食邑五千戸張格可金紫光禄大夫檢校兵部尚書守太子賔客上柱國仍封南陽縣開國伯食邑七百戸充三司副使從判三司宰臣任圜所奏請也九月幽州奏契丹平州守將偽置幽州節度使盧文進率戸口歸明所率降戸孽畜人口在平州西首尾約七十里十一月鎮州又奏文進所率歸業戸口蠲免稅租三年仍毎口給粮五斗是月文進及將吏四百人見賜鞍馬玉帶衣被噐玩錢帛有差仍下制契丹盧龍軍節度使檢校太尉盧文進遼西飛將薊北雄才傾以被讒因而避禍雖附茹毛之俗長懐向國之誠將軍寧屈于蕃庭校尉終還于漢壘洎予纂紹果卜旋歸繼飛鴈足之書累殄龍庭之寇前冐白刄中推赤心擁塞垣之車帳八千復唐土之民軍十萬氣吞沙漠義貫神明爰降寵章以旌壯節可特進依前檢校太尉同中書門下平章事使持節滑州諸軍事守滑州刺史充義成軍節度滑濮管内觀察處置等使仍封范陽郡開國侯食邑一千三百戸兼賜推忠翊聖保義功臣二年十月汴州節度使朱守殷閉州城拒命帝親平之辛丑德音曰衛生亡軀摧兇効命偶徇脅從之勢終懐忠藎之誠首議向明理宜行賞昨車駕初到城下之時有將士率先開門及城下朝見宜令石敬瑭奏聞當與甄酬三年四月制夫忠而能力蓋臣子之嘉猷賞不踰時乃君親之大義其有一心奉國萬里勤王宣至化於遐陬振威聲於異俗宜升寵秩式示優恩竭忠建策興復功臣東南面行營副招討使寧江軍節度觀察等使光禄大夫檢校司徒使持節都督䕫州諸軍事守䕫州刺史西方鄴壯節挺生英材間出居家克孝事主能忠總銳旅以遄征飛㨗書而薦至一日千里復峽内之土疆七縱七擒盪荆門之妖祲近令偏將徑取敵城運籌之智神輸破竹之威電速漸平兎穴當覆梟巢方堅倚仗之誠宜降褒崇之命俾兼為保益重殿邦既虎踞於上流佇鯨吞于下瀬於戲功名既立節義彌髙鼎鐘方示於鐫銘綸綍寧煩於訓誡唯期帶礪永協雲龍可檢校太保使持節都督䕫州諸軍事守䕫州刺史寧江軍節度觀察等使十月戊午契丹署平州刺史張希崇將麾下八十餘人歸闕見于𤣥德殿便召赴宴例加賞賜希崇幽州人䧟蕃歳乆契丹署于平州至是殺其蕃兵率平營人戸來歸四年二月丁亥夏州行營都監安重益率師赴西軍時夏州李仁福身亡其子彛超擅稱留後詔邠州藥彥稠總兵赴夏州至此因降勅書曉諭夏綏銀宥等州將吏百姓曰近據西北藩鎮聞奏定難軍節度使李仁福薨變朕以仁福自分戎閫逺鎮塞垣威惠俱行忠孝兼著當本朝藩越之後及先皇興創之初或大𠞰兇徒或遥尊聖主夙夜毎勤于規救始終罔怠於傾輸爰今𦕈躬益全大節協和羣敵惠飬蒸民致朕端拱無為修文偃武頼彼統臨有術遠肅邇安委仗方深凋殞何早忽窺所奏深愴予懐不朽之功既存於社稷有餘之慶冝及於子孫但以彼蕃地處窮邉毎資經略厥子年纔弱冠未歴艱難或虧駕御之方定啓姦邪之便此令嗣襲貴示優恩必若踐彼危機不如置之安地其李彛超已除延州節度觀察留後前延州節度使安從進却除夏州節度留後各降宣命指揮使勤赴任但夏銀綏宥等州最居邉遠乆屬亂離多染夷狄之風少識朝廷之命既作當於移易宜普示於渥恩應夏銀綏宥等州管内罪無輕重常赦所不原者竝公私債負殘欠稅物一切竝放兼自刺史以下指揮使押衙以下皆勒仍舊勾當及與各轉官資宜令安從進到日倍加安撫連具名銜分析聞奏朕自總萬機難引一德内安華夏外撫夷狄先既懐之以恩後必示之以信且如李從曮之守岐隴疆土極寛髙允韜之鎮鄜延甲兵亦衆咸能識時知變舉族來朝從曮則見領大梁允韜則尋除鉅鹿次其昆仕竝建節麾下至將僚悉分符竹又若王都之貪上谷李賔之吝朔方或則結搆契丹偷延旦夕或則依慿党項竊據山河罔禀除移唯謀依拒比及朝廷差命良將徵發銳師謀悉萬全戰皆百勝纔興討伐己見覆亡數萬騎之契丹隻輪莫返幾千族之党項一鼓俄平尋㧞孤城盡誅羣黨無遠無近悉見悉聞何必廣引古今方明利害只陳近事聊諭將來彼或要覆族之殃則王都李賓足為鍳戒彼或要全身之福則允韜從曮可作規繩朕設兩途爾宜自擇無貽後悔有玷前修今以天命初行人情未定或慮將校之内親要之間幸彼㓜冲恣其熒惑遂成騷動致累人靈今特差邠州節度使藥彥稠部領馬歩兵士五萬人騎送安從進赴任兼以别降宣命嚴切指揮安從進等委其訓戒師徒叅詳事理從命者秋毫勿犯違命者全族必誅先令後行有犯無捨更慮孤恩之軰樂禍之徒居安則廣造異端貴令擾亂臨難則却謀相害自要功勲宜令李彛超體認朕懐宣諭彼衆無聽邪說有落姦機宣布丁寧咸令知悉六月權知京南節度髙從誨上章乞許自新重修職貢初從誨父季興以請峽内三州事據城阻命繕甲締結梟夷從誨屢諫不從及王師問罪孔循令門客李湜見季興諭以禍福季興悖慢不遜從誨俟其有間私與湜曰令公性强不能遠圖此事予嘗號泣言之竟未聽從然予之操心必不負于國家茍王師退舍聖上許其改圖予必可致令公首過公為予言于朝執至是季興卒從誨屢遣使致書于湖南襄陽帥請上章保明願垂昭洗先是襄湖表章交至至是從誨復自上章首罪帝曰先臣叛命不預從誨事可待之如初長興元年九月淮南降將海州馬歩軍都指揮使王傳極率黑雲都兵士七百三十五人見于内殿各賜鞍馬衣段錢帛袍帶有差三年三月辛丑以淮南降人潤州觀察廵官嚴澤為亳州譙縣令仍賜緋晉髙祖天福二年二月勅聞訪諸道州府等昨以朝廷近有指揮捜羅官健震驚戸口搔動鄉原致彼編甿不思樂業結集徒伴藏避山林其間亦有接便為非率意行刼事不獲已想非故心今既國歩晏寧春事興作宜行告諭各便歸還但務耕農况無徭役切慮有無知之軰懼罪不歸頃示條流冀令安静限勅到後與量地里遠近與限各令復業已前為非一切不問如限内不來者其物業許鄰近人請射承佃或有不忍招㩦尚行偷刼者一聽居停及鄰人宻來陳告便許占射賊人物業充賞如賊無物業即與逐處指揮毎告一人即與賞錢二十貫文如至十人已上更賜銀鞍轡馬一匹此外竝依所告得人數支與賞錢仍據所願穩便處與補職安排委逐處長吏遍下管内令於山谷道口津渡如法粉壁曉諭仍不時差人四向專切招攜如是不能悛改尚務結集者委逐處差兵掩殺七月敕昨者魏府帥臣忽與狂悖河陽兵士小有驚搔已各命於討除竚盡平於巢窟軍興之際賊計多姦時發細人濳賫獵彈意在離間上下㸃汚忠良朕固無疑人何懐懼近聞尹暉忽然出外不赴朝叅又婁繼英悞有傳聞亦兹濳匿且尹暉婁繼英位居班列事合審詳不謂此特偶乖斟酌朕情深軫憫恩在矜寛專遣招㩦時議釋放各委家人諸處招喚出來却令如舊一切不問此後諸處收捉到姦細文字等其捉事人依舊支給優賞其細人畫時處斬文字當處焚傷冀表推誠免令惑衆布告中外咸使聞知仍付所司暉魏州人也少以勇健事連帥楊師厚為爪牙莊宗竝其弟昇為小校從戰河上毎於馬前歩鬭有功莊宗即位連改諸軍指揮使明宗天成後領數郡刺史應順中王師討潞王於岐下暉與楊師權首歸潞王潞王約以鄴園授之潞王即偽位帝入雒甞遇暉通衢暉上馬横鞭揖帝帝甚怒之及因朝謁謂偽主曰尹暉常才以歸命稍先陛下欲令出鎮名藩外論皆云不當偽主乃授應州節度帝即位改西衛將軍時延光以暉失意宻使人以榮利㗖之暉懼㳂汴水欲奔歸淮南未出王畿為人所殺繼英未詳何許人也事偽梁歴為内職唐莊宗朝歴諸衛將軍出為絳州刺史明宗天成中改冀州北面水陸轉運使旋移耀州團練使入為執命轉左監門衛上將軍繼收懐州金州加檢校太保帝即位復居西衛至是以有弟為魏州子城都虞候故延光使人誘焉繼英不自安逃許州匿於所親温延沼弟以繼英有女嫁延沼之故也竟不為温氏兄弟所容知張從賔據泥水叛命繼英往依之尋為杜重威所擒送闕梟首北市焉繼英有子曰德懐為萬全令蒲中連帥安審信械而奏之尋有勅追毁所授告亦釋之以繼英因匿身不容本非為逆故也是時楊光遠討范延光於鄴送賊軍都頭王洪等十人至大寧宫前竝釋放三年三月詔送箭書二百遣楊光遠射入賊城除范延光竝不為罪八月帝以范延光據鄴城攻之經歳不下以師老民勞思解其役遣謁者入謂之曰卿既危蹙敗在朝夕若能返掌轉規改節歸我我當以大藩處之如降而殺之則何以享國明明白日可質是言因賜鐡劵改封髙平郡王移鎮天平延光謂門人李式曰主上敦信明義言無不踐許之不死則不死矣因徹去守備素服請降十月制七萃師徒五營吏士偶因罪累遂至逋逃念曾効於忠勤宜顯行於招誘自用軍已來應有諸軍及軍色負罪逃軍諸處人等限一百日内許所在陳告竝不問罪却與收管如限内不出復罪如舊諸州府應有見禁此色人家口骨肉竝從釋放五年五月安州節度使李金全叛歸淮南命馬全節以汴雒汝鄭鄆宋陳蔡曹濮周唐之兵討之帝使供奉官劉彦瑶馳詔諭李金全曰邉藩都䕶三載一更古之制也嗣守世及則勞役不均朕俾全節代􅀸將授􅀸以重領何猶豫熒惑而有異圖近覽復州上言云東陵洄口官渡三戍皆稱江下鳩集水軍大發樓櫓與􅀸應接又賈貞蔡進等咸以蠟書章表來投闕庭故旋命六將徵兵三萬如能轉負從順朕亦待爾如初予之食言何以享國若其迷途不返即聾從昧則夷宗覆族良可哀也六月淮南偽安州節度使李承裕率衆大掠輦其資貨而夜遁擒其監軍杜光業及部下將毛璘孫厚呂太徐引李仲福等五七百人露布詣闕帝曰此等何罪乃以所獲之馬與噐幣資裝豐厚而賜之及待以館糓光業等無不仰天感激涕泣請死帝終不戮一人悉放還之六年八月制曰天覆地載無所不容改過自新於斯為美應亡命山澤負罪濳匿者並放罪招擕各令歸業所在切加安撫如過百日不出首復罪如初十一月襄州投來將士三百餘人到闕宣付侍衛司安排其首領賜衣帛有差七年正月鎮州安重榮偽署深州刺史李從禎指揮使張仁希竝都頭十將長行共九十七人先歸降到闕見賜衣物有差尋仍押赴鎮州少帝開運二年宣收降到泰州刺史晉庭謙軍州官吏以下至行宫前勅令釋縛賜晉庭謙噐帛鞍馬銀帶公裳又賜録事叅軍李崇義司法叅軍張唯諫清苑主簿李正佑部署指揮使劉繼暉噐帛有差漢髙祖以天福二年四月即位於太原五月至霍邑詔諭鎮州趙贊曰􅀸燕臺大族唐室懿親作鎮方隅既多善政應時制置素有嘉謀實兼文武之才比擅方圓之譽惟卿之身乆從廹脅居胡土而當全骨肉還漢疆而近脫鋒鋩浮沉祗係於虜情舒卷非繇於己意想其扼腕常所吞聲朕猥以𦕈躬式隆丕構承皇天眷命副羣后樂推方救阽危用拯塗炭昨契丹見華人不附尋已促還今酋長為神物所誅俄聞暴卒興亡之兆其理昭然其永康王遁入鎮州與卿顯相疑惑今月一日於待賢館内已被縶俘所有僚屬將校並遭誅戮寃聲遥聽􅆭性可量想計聞之必多酸楚􅀸一門忠孝三代王公須自雪家寃當共清國難於我則既明向日於彼則無與同天自然錫土分茅長居爵位重茵列鼎永慶來雲孟津之㑹宜先塗山之期勿後况車駕按幸已及晉州無致他人别邀富貴臨軒睠注寤寐不忘所有諸道申奏蕃賊等逃遁事繇表章文狀等竝同封往其三軍官吏僧道百姓等别降勅曉示撫問用符􅀸意當體朕懐六月至雒詔應有契丹除授諸道節度觀察防禦團練使刺史及令録賔僚將吏等竝各安職不議改更十一月杜重威據鄴城拒命城中散指揮使穆彦章相次與軍士等來歸彥章賜帛百段銀帶噐皿鞍馬等餘有差乾祐元年詔曰其有先曾事契丹并有骨肉見在契丹者其本人本家所在切須安存不得妄有恐動隱帝乾祐二年正月乙巳朔制曰河府李守真鳳翔王景從永興趙思綰等此與國家素無讐釁偶因疑懼遂致叛違所以命將陳師徵辭問罪止期旦夕必見攻收然以彼之提封朕之黎庶乆䧟孤壘可念非辜易子析骸填溝委壑為人父母寧不軫傷但以屈己愛人先王厚德包荒含垢列聖美談宜𢎞濟物之恩用廣好生之道其李守真王景從趙思綰等宜令逐處都部署分明曉諭若能飜然歸順朕竝待之如初當保始終享其富貴申明信誓固無改易其或不認推誠堅欲拒命便可應時攻擊尅日蕩平候復收城池罪止元惡其餘詿誤一切不問仍預告諸軍破城日不得殺人放火諸處草冦等抛棄耕農聚集林藪晝伏夜動害物殘人前後累令翦除繼行招諭尚恐疑懼特示寛恩如能改過知非出來陳首者應以前所有非為一切不問宜令逐處節度刺史及廵檢使臣明行曉示宣逹朝廷恩㫖冀其歸業常切撫安不得信任節級所繇𠂻私恐動重念征討以來勞役滋甚兵猶在野民未息肩急賦繁徵財殫力匱矜恤之澤未下於瘦羸愁嘆之聲幾盈於道路尚以軍旅未息帑廩無餘猶稽蠲復之恩空懐愧憫之意即俟邉烽少弭國患漸除當議優饒冀獲蘓息諸道藩侯郡守咸分寄任共體憂勞更宜念彼瘡痍倍加勤䘏䆒鄉閭之疾苦去州縣之煩苛勸課農桑少察寃濫共挾政理用副憂勞凡百臣僚當體朕意辛未夏州節度使李尋殷獻馬謝𨽻静州為屬郡彛殷祖拓拔思恭唐光啓初得夏州節鉞自相繼襲後唐明宗時命藥彥稠等討之彛殷招引黨項攻奪餉道食不能給彛殷登城言曰夏州虚名耳無珍寳帑藏貢賦朝廷但以父子相傳寓居此郡或朝廷指使征伐願誓衆先登幸國家哀憐繇是赦之自是傲視中原隂結叛臣朝廷知其心而羈維之四月永興趙思綰遣牙將劉成詣闕乞降制遂授思綰華州節度留後檢校太保以永興城内都指揮使彦常􅀸為虢州刺史九月以契丹偽署前武州刺史髙奉明為右衛將軍奉明曾任蔚州録事叅軍頃歳契丹䧟蔚州奉明為蕃將南大王飬子累授刺史戎王死永康立以奉明為邢州節度使以代麻荅麻荅主留鎮州未幾聞髙祖南渡髙唐英死於安陽心不自安乃請麻荅署馬部都指揮使留鐸為本州副使尋令知軍府事奉明歸於鎮州麻荅被逐奉明赴闕故授環衛之官二年三月徐州部送所獲淮南都將李暉等三十人徇于市復給與衫㡌放還淮南册府元龜卷一百六十六
