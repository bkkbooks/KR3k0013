body:
  text: 册府元龜卷八百三宋王欽若等撰總録部義第三晉馬隆字孝興少而智勇好立名節魏末兖州刺史令狐愚坐事伏誅舉州無敢收者隆以武吏託稱過客以私財殯葬服䘮三年列植松栢禮畢乃還一州以爲美談署武猛從事後至東羗較尉卲續字嗣祖魏郡人叚疋磾爲從弟末杯所敗北依續末杯又攻敗之疋磾被瘡謂續曰吾夷狄慕義以至破家君若不忘舊要與吾追討君之惠也續曰頼公威徳續得效節今公有難豈敢不俱遂并力追末杯斬獲畧盡後進平北將軍假節封祝阿子徐苗髙宻淳于人鄉鄰有死者便輟耕助營棺槨門生亡於家即歛於講堂其行已純至類皆如此遠近咸歸其義師而行焉徵辟並不就范廣者范隆之踈族也隆㓜孤無緦功之親廣愍而養之迎歸教書爲立祠堂隆好學脩謹奉廣如父廣史不載官韋忠平陽人太守陳楚廹爲功曹㑹山羗破郡楚攜子出走賊射之中三創忠冐刅伏楚以身捍之泣曰韋忠願以身代君乞諸君哀之亦遭五矢賊相謂曰義士也舍之忠於是負楚以歸桓冲字㓜子溫之弟也爲振武將軍鎮江州卒贈太尉初郗鍳庾亮庾翼臨終皆有表樹置親戚惟冲獨與謝安書云玅靈靈寳尚小亡兄寄託不終臣欽若等曰玅靈靈寳即桓溫二子偉元别名也以此爲恨言不及私論者益嘉之劉驎之字子驥車騎將軍桓仲辟長史不受驎之雖冠冕之族信義著於羣小凡厮五之家婚娶葬送無不躬自造焉居于陽岐在官道之側人物來徃莫不投之驎之躬自供給士君子頗以勞累更憚過焉凡人致贈一無所受去驎之家百餘里有一孤姥疾將死歎息謂人曰誰當埋我惟有劉長史耳何繇令知驎之先聞其有患故徃候之值其命終乃身爲棺殯送之其仁愛隠惻若此卒以壽終孫晷吳國富春人見人饑寒並周贍之親有窮老者數人嘗徃來吿索人多厭慢之而晷見之欣敬逾甚寒則與同衾食則與同器或解衣推被以恤之公車徵㑹卒朱綽有二兄憲斌俱爲西中郎袁貞所殺綽從桓溫平壽陽真時已死輙發棺戮屍溫怒將斬之溫弟冲苦請得免綽爲人忠烈受冲更生之恩事冲如父叅冲車騎軍事西陽廣平太守及冲薨綽嘔血死冲諸子遇綽子齡石亦如兄弟前燕李績范陽人父產仕於石民爲本郡太守績爲郡功曹刺史王午辟爲主簿慕容雋之南征也隨午奔魯口鄧嘗謂午績鄉里在北父已隆燕今雖在此終不爲用方爲人患午曰績於䘮亂之中捐家立義情節之重有侔古烈若懷嫌害之必駭衆望嘗乃止午恐績終為嘗所害乃資遣之及到雋責其背親後至績荅曰臣聞豫譲報知伯仇稱於前史既官身所在何事非君陛下方宏唐虞之化臣實未謂歸順之晚也雋曰此亦事主之一節耳宋俞僉永嘉人爲郡吏晉末孫恩之亂太守司馬逸之被害妻子並死兵冦之際莫敢收藏僉以家財買棺歛逸之等六䘮送致還郡塟畢乃歸鄉里元嘉中老病卒王宏晋末爲司馬道子驃騎將軍時桓𤣥尅京邑收道子付廷尉臣吏畏恐莫敢贍送宏時尚在䘮獨於道側拜攀車涕泣論者稱焉何叔度恭謹有行業姨適沛郡劉􅟛與叔度母早卒奉姨有若所生姨亡朔望必徃致哀並設祭奠食並􅈿新躬自臨視若朔望應有公事則先遣送祭皆手自料簡流涕對之公事畢即徃致哀以此爲常至三年服竟張邵字茂宗初爲瑯琊内史王誕龍驤府功曹桓𤣥徙誕於廣州親故咸離棄之惟邵情意彌謹流涕追送時變亂饑饉又饋送其妻子朱齡石晋末爲殿中將軍嘗追隨桓脩兄弟爲脩撫軍叅軍在京口髙祖克京城以爲建武叅軍從至江乘戰齡石言於髙祖曰世受桓氏厚恩不容以兵刅相向乞在軍後髙祖義而許之朱超石晋末爲衞將軍桓謙行參軍後歸髙祖謙死超石收迎桓謙身首躬營殯塟龔頴少好學益州刺史毛璩辟爲勸學從事璩爲譙縱所殺故佐吏並迯亡頴號哭奔赴殯送以禮縱後設宴延頴不獲已而至樂奏頴流涕起曰北面事人亡不能死何忍聞舉樂蹈跡逆亂乎縱大將譙道福引出將斬之道福母即頴姑跣出救之故得免崔慰祖父慶緖爲梁州刺史父亡梁州之資家財千萬散與宗族漆器題爲日字日字之器流乎遠近後得父時假貸文䟽謂族子紘曰彼有自當見還彼無吾何言哉悉火焚之王曇首有識局智度喜怒不見於色閨門之内雍雍如也兄弟分財曇首惟取圖書而已後爲侍中驍騎將軍謝𢎞㣲從叔峻無後以𢎞㣲爲嗣所繼叔父混義熈八年以劉毅黨見誅妻晋陵公主改適瑯琊王練公主雖執意不行而詔與謝氏離絶公主以混家事委之𢎞㣲混累世相輔一門兩封田業十餘處僮僕千人惟有二女年數嵗𢎞㣲經紀生業正若在公一錢尺帛出入皆有文簿遷通直郎髙祖受命晋陵公主降東鄉君以混得罪前代東鄉君節義可嘉聼還謝氏自混亡至是九載而室宇修整倉廪充盈門徒僕使不異平日田疇墾闢有加於舊東鄉君嘆曰僕射平生重此子可謂知人僕射爲不亡矣中外姻親道俗義者見東鄉之歸者入門莫不嘆息或爲流涕感𢎞㣲之義也後至侍中張暢吳郡人起家爲太守徐佩之主簿佩之被誅暢馳出奔赴制服盡哀爲論者所美沈道處冬月無複衣戴顒聞而迎之爲作衣服并與錢一萬及還分身上衣及錢悉供諸兄弟子無衣者鄉里年少相率受學道處嘗無食以立學徒武康令孔頎之厚相資給受業者咸得有成文帝聞之遣使存問賜錢三萬米三百斛悉供孤兄子嫁娶徵貟外散騎侍郎不就范義爲竟陵王誕别駕誕舉兵反母妻子並在城内有勸義出降義曰我人吏也豈可自求活耶誕敗被誅蔡興宗字子度㓜立風概家行尤謹奉宗姑事寡嫂養孤兄子有聞於世太子左率王錫妻范聰明婦人也有才學與錫弟僧達書詰譲之曰昔謝太𫝊奉嫂王夫人如慈母今蔡興宗亦有恭和之稱其爲世所重如此興宗與王僧綽友善僧綽爲元凶所誅凶威方盛親故莫敢徃興宗獨臨哭盡哀後爲侍中竟陵王誕㨿廣陵城爲逆事平興宗奉㫖慰勞州别駕范義與興宗素善在城内同誅興宗至廣陵躬自收殯致䘮還豫章舊墓孝武聞之甚不悅盧陵内史周朗以正言得罪鎻付寧州親戚故人無敢贍送興宗在直請急詣朗别帝知尤怒後爲中書監左光禄大夫開府儀同三司常侍如故孟詡嗣封臨波公南郡王義宣反問其子五兵尚書宜陽侯愷於尚書寺内著婦人衣乘問訊車投詡詡於妻室内爲地窟藏之事覺收付廷尉詡伏誅蕭惠開爲益州刺史罷還京師府録事参軍到希㣲負蜀人債將百萬爲債主所制未得俱還惠開與希微共事不厚以爲隨其同上不能擕接得還意耻之廐中凢有馬六十匹悉以給希㣲償債許昭先伯舅夫妻並疫病死亡家貧無以送昭先賣衣物以營殯塟舅子三人並㓜贍䕶皆得成長本邑補主簿固辭董陽西陽人五世同財爲鄉邑所美史無官張進之永嘉安固人爲太守王味之吏味之有罪當見收迯避投進之家供奉經時盡其誠力以本村淺近移入池谿味之墮水沉沒進之投水拯救相與沉淪危而得免范叔孫吳郡錢塘人少而仁厚拯窮濟急同里范法先父母兄弟七人同時疫死惟餘法先病又危篤䘮屍經月不収叔孫悉備棺器親爲殯埋又同里施淵夫病疾父母死不殯又同里范苗父子並亡又同里范敬宗家内六人俱得病二人䘮沒親隣畏遠莫敢營視叔孫並殯塟躬䘏病者並皆得全鄉曲貴其義行莫有呼其名者世祖孝建初除竟陵王國中軍將軍不就嚴世期㑹稽山隂人好施慕善出自天然同里張邁三人妻各産子時嵗饑儉慮不相存欲棄而不收世期聞之馳往拯救分食觧衣以贍其乏三子並得成長同縣俞陽妻莊年九十莊女蘭年七十各老病單孤無所依世期衣飴之二十餘年死並殯塟宗親嚴宏鄉人潘伯等十五人荒年饑死露骸不收世期買棺器殯埋存育孩㓜徐耕晋陵延陵人元嘉二十一年大旱民饑耕詣縣陳辭曰今年亢旱多稼不登民黎饑餒採掇存命聖上哀矜已埀存極但饉罄來乆困殆者衆米榖轉貴糴索無所方渉春夏日月悠長不有㣲救水無濟理不惟凢𤨏敢憂身外鹿鳴之求思同野草氣内之感能不傷心民糴得少米資供朝夕志欲自竭義存分飡今以千斛助官賑貸此境連年不熟今嵗尤甚晋陵境特爲偏枯此郡雖弊猶有富室承被之家處處而是並皆保熟所失盖㣲陳積之榖皆有巨萬旱之所弊是鍾貧民溫富之家各藏其財寳謂此等並宜助官得過儉月所損至輕所濟甚重令敢自勵爲勸造之端實願掘水揚塵崇益山海縣為言上當時議者以耕比漢卜式詔書褒美酬以縣令嚴成東海人王道東莞人大明八年東土饑旱成等各以榖五百斛助官賑䘏史無官王文和爲征北義陽王㫤府佐㫤於彭城奔魏部曲皆散文和獨送至界上㫤謂曰諸人皆去卿有老母何獨不去文和乃去沈文季爲晉平王休祐驃騎長史休祐被殺雖用薨禮僚佐多不敢至文季獨徃墓展哀劉休與陳郡謝儼爲犮􅌂同丞相義宣反休坐匿之被繋尚方七年乃得出南齊杜淵少有世譽父卒淵持財與弟惟取書數千卷爲司徒卒劉善明平原人宋元嘉末青州饑荒人相食善明家有積粟躬食饘粥開倉以救鄉里多獲全濟百姓呼其家田爲續命田後至征虜將軍虞悰初仕宋爲黃門侍郎宋明帝誅山陽王休祐至塟日寒雪厚三尺故人無至者惟悰一人來赴劉瓛字子珪宋末爲袁粲所薦除秘書郎不見用􅙾誅瓛㣲服徃哭并到賻助何昌寓宋末爲建平王景素征北南徐州府主簿以風素見重母老求禄止爲湘東太守還為髙帝驃騎功曹昌寓在郡景素被誅昌寓痛之至是啓髙帝理其寃又與司空褚彥回書極言髙帝嘉其義王思遠宋末辟建平王景素南徐州主簿景素被誅左右離散思遠親視殯塟手種松栢與廬江何昌寓沛郡劉璡上表理之事感朝廷景素女廢為庶人思遠分衣食以相資贍年長爲備笄總訪求素對傾家送遣又與顧暠之爲友暠之卒後家貧思遠迎其妻子隠䘏甚至劉靈哲封霄城侯父懷􅈿卒當襲爵靈哲固辭以兄子在虜中存亡未測無容越當茅土朝廷義之後至寧朔將軍西陽王右軍司馬吳達之姨亡無以塟自賣爲士夫客以營冡槨從祖弟敬伯夫妻荒年被畧賣江北達之有田十畆貨以贖之同財共宅劉諷爲丹陽丞時始安王遥光記室崔慰祖與諷素善遥光據東府反慰祖在城内城未潰一日諷謂之曰卿有老母宜其出矣命門者出之慰祖詣闕自首繋尚方病卒王續蜀郡人郝道福華陽人並累世同㸑明帝詔表門閭蠲調役譚宏寳零陵人何宏華衡陽人踈從四世同居共衣食詔表門閭蠲租税董僧惠爲晋安王子懋防閣子懋起兵徐𤣥慶既平子懋知其豫子懋之謀執之僧惠曰晋安舉義兵僕實豫議古人云非死之難得死之難僕得爲主人死不恨矣願至主人大歛畢退就湯鑊雖死猶生𤣥慶義而許之還具白明帝乃配東冶言及九江時事輙悲不自勝子懋子昭基九嵗以方二寸絹爲書參其消息并遺錢五百以金假人﨑嶇得至僧惠觀書對錢曰此郎君書也悲慟而卒陸超之吳人以清净閑雅爲晋安王子懋所知子懋既爲于琳之所害人勸其迯亡荅曰人皆有死此不足懼吾若迯亡非惟孤晋安之眷亦恐田橫客笑人徐𤣥慶等以其義欲囚還都超之端坐待命其門生周姓者謂殺超之當得重賞遂斬之徐生東海人范安祖李聖伯范道根俱武陵人並五世同居封延伯僑居東海三世同財爲此州所宗邵榮興文獻叔並武陵人八世同居陳𤣥子義興人四世同居户口一百七人韓靈敏早孤與兄靈􅈿並有孝性靈􅈿亡無子妻韓氏守節不嫁慮家人奪其志未嘗吿歸靈敏事之如母紀僧真宋末隨逐征西將軍蕭思話及子惠開皆被賞遇惠開性苛僧真以㣲過見罰既而委任如舊及罷益州還都不得志而僧真事之愈謹惠開臨終歎曰紀僧真方當富貴我不見也乃以僧真託劉康周顒後除司農卿江泌字士清濟陽人也歴仕南中郎行叅軍所給募吏去役得時病莫有舍之者吏扶扙投泌泌親自隠䘏吏死泌爲買棺無僮役兄弟共與埋之夏侯恭叔譙國人桓崇祖爲豫州辟爲主簿崇祖被誅故人無敢至者獨恭叔以家財爲殯時人以比欒布張融少爲封溪令兄與顧凱之有恩好凱之卒融身負墳土在南與交阯太守卞展有舊展於嶺南爲人所殺融挺身奔赴梁陶季直初仕齊爲褚彦囘司空司徒主簿彥回卒季直請王儉爲彥回立碑終始營䕶甚有吏節時人美之曹景宗爲雍州中兵叅軍督峴南與州里張道門厚善道門車騎將軍敬兒少子也爲武陵太守敬兒誅道門於郡伏法親屬故吏莫敢入景宗自襄陽遣人船到武陵收其屍骸迎還殯塟鄉里以此義之謝幾卿爲威戎將軍免官卒雖不持簡操然於家門篤睦兄才卿早卒子藻㓜孤幾卿撫養甚至及藻成立歴清官皆幾卿奬訓之力也鄭紹叔仕齊爲壽州治中從事時刺史蕭誕以弟諶誅臺遣收兵卒至左右莫不驚散紹叔聞難獨馳赴焉誕死侍送䘮柩衆咸稱之到京師司空徐孝嗣見而異之曰祖逖之流也樂藹仕齊爲豫章王嶷荆州主簿後嶷還都藹後爲荆州治中及嶷薨藹解官赴䘮率荆湘二牧故吏建碑墓所范雲好節尚竒專趨人之急少時與領軍長史王畡善畡亡於官舍貧無居宅雲乃迎䘮還家躬營殯殮後至僕射袁昻爲武陵王衛軍長史丁内憂服未除而從兄彖卒昻㓜孤爲彖所養乃制期服人有恠而問之者昻致書以諭之曰竊聞禮繇恩斷服以情申故小功他邦加制一等同㸑有緦麻之典籍孤子夙以不天㓜傾乾廕資敬未及過庭莫承藐藐冲人未達朱紫從兄提養訓教示以義方每假其談價虚其聲譽得及人次實亦有繇兼開拓房宇處以華曠同財共有資具取是爾來三十餘年憐愛之至無異己生姊妹孤姪就居一時篤念之深在終彌固此恩此愛畢壤不忘既情若同生而服爲諸從言心即事實未忍安昔馬稜與弟毅同居毅亡稜爲心服三年繇也之不除䘮亦縁情而致制雖不及古誠實感慕嘗願千秋之後從服㫷齊不圖衰禍猥集一旦草土殘息復罹今酷尋惟慟絶彌劇彌深今以餘喘欲遂素志庶寄其罔慕之痛少伸無己之情雖禮無明據乃事有先例率迷而至必欲行之君問禮所歸謹以諮白臨紙號哽言不識次王份十四而孤觧褐車騎主簿出爲寧逺將軍始安内史袁粲之誅親故無敢視者份獨徃致慟繇是顯名周捨初辟丹陽尹王亮主簿後爲鴻臚卿王亮得罪歸家時莫有至者捨獨敦恩舊及卒身營殯塟時人稱之楊公則爲散騎常侍爲人敦厚慈愛居家篤睦視兄子過於其子家財悉委焉顏恊爲兼御史中丞恊㓜孤養於舅氏陳郡謝暕暕卒恊以有鞠養之恩居服如伯叔之禮議者重焉廋詵隣人有被誣爲盜者被治刻妄欵詵矜之乃以書質錢二萬令門下詐爲親代之酬備隣人獲免謝詵詵曰吾矜天下無辜豈期謝也其行多如此類卒謚貞白處士阮孝緖字士宗父彥之宋太尉從事中郎孝緒七嵗出從伯裔之裔字本作太祖廟諱下字裔之母周卒有遺財百餘萬應歸孝緖孝緖一無所納盡以歸裔之姉瑯邪王晏之母聞者咸歎異之卒謚文貞處士劉璠爲上黄侯曄所知及曄終於毗陵故吏多分散璠獨奉曄䘮還都墳成乃退簡文時在東宮遇曄素重諸不送者皆被劾責惟璠獨被優賞廋泳兄子仲容㓜孤泳養之仲容初爲安西法曹行叅軍泳時已貴顯吏部尚書徐勉擬泳子晏爲官僚泳埀泣曰兄子㓜孤人才粗可願以晏嬰所忝廻授之許焉因轉仲容爲太子舍人孫謙力於仁義行已過人甚遠從兄靈慶嘗病寄於謙謙出行還問起居靈慶曰向飲冷􅉯不調即時獨渴謙退遣其妻有彭城劉融者行乞疾篤無所歸求人與送謙舍謙開㕔舍以待之及融死以禮殯塟之衆咸服其行義終光禄大夫劉凝之南郡枝江人隠居不仕荆州饑衡山王義季慮凝之餒斃餉錢十萬凝之大喜將錢至市門觀有饑色者悉分與之俄頃立盡何㸃字子哲齊永元中崔惠景圍城人間無薪㸃悉伐園樹以贍親黨累徵不就任昉爲新安太守卒事兄嫂恭謹外氏貧缺嘗營奉供養禄俸所収四方饋遺皆班之親戚即日便盡廋黔婁爲鄧元起益州長史元起死于蜀部曲皆散黔婁身營殯殮携持䘮柩歸鄉里龔愜遂寧人爲劉季連益州主簿後季連兵敗還京師將發人莫之視惟愜送焉褚冕錢塘人南康王子㑹理之舊㑹理欲圖侯景事敗冕亦囚於省問事之所起拷掠千計終無所言㑹理隔壁聞之遥曰褚郎卿豈不爲吾致此耶然勿言㑹理遇害冕竟以不服赦之歐陽頠爲天門太守與左衛將軍蘭欽相善欽征交州頠同行欽度領以疾終頠除臨賀内史啓乞送欽䘮還都然後之任陳周文育本姓項氏義興人周薈養爲己子同州刺史陳慶之與薈同郡素相善啓薈爲前將軍軍主慶之使將五百人徃新蔡懸郀慰榮白水蠻謀執薈以入魏事覺與文育拒之時賊徒甚盛一日之中戰數十合文育前鋒䧟陣勇冠軍中薈於戰陣死文育馳取其屍賊不敢逼及夕各引去文育身被九創創愈辭請還塟慶之壯其節厚加贈遺而遣之吳明徹初仕梁東宮直後及侯景冦京師天下大亂明徹有粟麥三千餘斛而隣里饑餒乃白諸兄曰當今草竊人不圖乆柰何有此而不與鄉家共之於是計口平分同其豐儉羣盜聞而避焉賴以存者甚衆後爲侍中司空南平郡公杜之偉㓜精敏有逸才湘隂侯蕭昻爲江州刺史以之偉掌記室昻卒廬陵王續代之又手教招引之偉固辭不應命乃送昻䘮柩還京司馬暠梁承聖中爲太子庶子江陵䧟隨例入關而梁室屠戮太子瘞殯失所暠以官臣乃抗表周朝求還江陵改塟辭甚酸切周朝優詔荅曰昔主父從戮孔車有長者之風彭越就誅欒布得陪臣之禮庶子鄉國已改猶懷送徃之情始驗忠貞方知臣道即勑荆州以禮安厝許亨梁末爲王僧辨太尉從事髙祖受禪授中散大夫領羽林監初僧辨之誅也所司收僧辨及其子頠於方山同坎瘞埋至是無敢言者亨以故吏抗表請塟之乃與故義徐陵張種孔覆等相率以家財營塟具凡七柩皆改􅉎焉陳智深爲蕭摩訶騎士及摩訶入隋授開府儀同三司與漢王諒同作逆伏誅其子光已籍沒智深收摩訶屍手自殯歛哀感行路君子義之殷不佞字季仰陳郡長平人第三兄不疑次不占次不濟並早亡不侫最小事弟二寡嫂張氏甚謹所得禄俸不入私室終於右丞散騎常侍後魏栗法光上黨屯留人素敦信義中山王熈誅弟畧潜行自託舊識河内司馬始賔始賔便爲荻筏夜與俱渡盟津詣法光家法光忻而納之畧舊識刁䨇爲西河太守復歸之停止經年䨇乃令從子昌送畧渡江蕭衍甚敬禮之崔寛爲鎮西將軍卒初自隴右歸世祖見司徒崔浩浩與齒次厚存撫之及浩誅以踈族獨得不坐遂家於武城居祖魏司空林舊墟以一子繼浩弟覧妻封氏相奉如親長孫稚初生而母亡為姨兄元洪超所養後為太傅録尚書事封開國子稚表請廻授洪超次子憚許之刁整爲驍騎將軍丁父憂相州刺史山陽王熙在鄴起兵將誅元乂等事敗𫝊首京師熙之親故莫敢視整弟婦即熙姊遂收其屍藏之後乃還熙所親元畧曾於整坐泣謂黃門王誦尚書袁翻曰刁公收歛我家卿即宜知房景逺字叔遐重然諾好施與頻嵗凶儉分贍宗親又於通衢以食餓者存濟甚衆以母疾不應州命韋朏字尊顯少有志業年十八辟州主簿時屬嵗荒儉朏發家粟造粥以飼饑人所活甚衆盧義僖范陽涿人少時幽州頻遭水旱先有榖數萬石貸民義僖以年榖不熟乃燔其契州閭悦其恩徳邢晏篤於義讓初爲南兖州刺史例得一子解褐乃啓其孤弟子子慎爲奉朝請子慎年甫十二而其子已弱冠矣後爲滄州復啓孤兄子子昕爲府主簿而其子並未從官世人以此多之鄭羆髙陽人中書學生盧度世以崔浩事棄官逃於羆家羆匿之使者囚羆長子將加箠楚羆戒之曰君子殺身以成仁汝雖死勿言子奉命雖被拷掠至乃火爇其體因以物故卒無所言度世後令弟娶羆妹以報其恩盧度世爲濟州刺史國家初平升城太守房崇母傅氏度世繼外祖母兄之子婦也兖州刺史申纂妻賈氏崇之姑女也皆亡破軍途老病憔悴而度世推計中表致其恭恤每觀見傅氏跪問起居隨時奉送衣被食物亦存賑賈氏供其服膳青州既䧟諸崔墜落多所收贖度世子淵㫤等父母亡後同居共財自祖至孫家内百口在雒時有饑年無以自贍然尊卑恪穆豐儉同之髙允少孤夙成有竒度年十餘嵗奉祖父䘮還本郡推財與二弟爲沙門名法净未乆而罷後爲尚書散騎常侍獻文平青齊徙其族望於代時諸士人流移逺至率皆饑寒徙人之中多允姻媾皆徒歩造門允散財竭產以相贍賑慰問周至無不感其仁厚初尚書竇瑾坐事誅瑾子遵亡在山澤遵母焦沒入縣官後焦以老得免瑾之親故莫有恤者允愍焦年老保䕶在家積六年遵始蒙赦其篤行如此髙聰生而䘮其祖母王撫育之大軍攻尅東陽聰徙入平城與蔣少㳺同為雲中兵戸窘困無所不至族祖允視之若孫大加賙急林白奴京兆儒生時姑臧叚暉因慕容璝内附暉歸國大武以爲上客從至長安有人吿暉欲南奔帝斬之於市暴屍數日白奴欽暉德音夜竊其屍置之枯井暉女爲燉煌張氏婦乆而聞之乃向長安收塟崔挺爲北海王司馬三世同居門有禮讓後值饑年家始分析挺與弟振推讓田宅舊資惟守墓田而已家徒壁立兄弟怡然楊摽字顯進正平髙凉人少豪俠有志氣孝昌中爾朱榮殺害朝士大司馬城陽王元徽迯難摽藏而免之孝莊帝立徽乃出復爲司州牧繇是摽以義烈聞陽猛上雒人爲大谷鎮將元顒入雒孝莊帝渡河范陽王誨脱身投猛猛保藏之及孝莊反正繇是知名俄而廣陵王恭僞瘖疾復來歸猛猛亦深相保䕶孝武即位甚嘉之授征虜將軍行河北郡守張亮少有幹用初仕爾朱兆拜平遠將軍以功封隰城縣伯邑五百戸髙祖討兆於晋陽兆奔秀容兆左右皆宻通誠欵惟亮獨無啓䟽及兆敗􅇡於窮山令亮及蒼頭陳山隄斬兆首以降皆不忍兆乃自縊於樹鄭仲明榮陽人爾朱榮入雒彭城王邵以子韶寄仲明仲明尋爲城人所殺韶因亂與乳母相失遂與仲明兄子僧副避難雒中爲賊逼僧副恐不免因令韶下馬僧副謂賊曰窮鳥投人尚或矜愍况諸王如何棄乎僧副舉刀逼之賊乃退韶逄一老母姓程哀之引於私家居十餘日莊帝訪而獲焉襲封彭城王山偉爲中書令有弟少亡偉撫寡訓孤同居二十載恩義甚篤明亮爲陽平太守屬相州刺史中山王熈引兵討元乂時并州刺史城陽王徽亦遣使詣亮宻同熈謀熈敗亮詭其使辭繇是徽竟獲免張讜妻皇甫氏被掠賜中宫爲婢皇甫遂乃詐癡不能梳沐後讜爲宋兾州長史因貸千餘疋購求皇甫髙宗怪其納財之多也引見之時皇甫年垂六十矣帝曰南人竒好能重室家之義此老母復何所任乃能如此致費也皇甫氏歸讜令諸妾境上奉迎數年卒畢衆敬爲兖州刺史寧南將軍篤於姻䫫深有國士之風張讜之亡也躬徃營視有若至親王衍爲侍中車騎將軍篤於交舊有故人竺虩於西兖州爲仲遠所害其妻子饑寒衍置之於家累年贍䘏世人稱其敦厚甄宻叅中山王英軍事英鍾離敗還鄉人蘇良沒於賊手宻盡私財以贖之良既傾資報宻宻一皆不受謂良曰濟君之日本不求貨非相贈之意也馮亮慱覧諸書又篤好物理中山王英平義陽而獲焉英素聞其名以禮待接亮至雒隠居嵩山感英之德以時展覲及英亡亮奔赴盡其哀慟刁冲渤海人爲裴植故吏植爲度支尚書與僕射郭祚都水使者韋雋等同時見害於後祚雋事雪加贈而植追復封爵而已冲上䟽訟之於是贈植征南將軍尚書僕射揚州刺史乃改塟植夏侯道遷初自南齊歸國封濮陽侯食千戸道遷以㧞漢中歸誠本繇王頴興之計求分邑戸五百封之宣武不許靈太后臨朝道遷重求分封太后大竒其意議欲更以三百戸封頴興㑹卒遂寢陽固爲清河王懌太尉從事中郎屬懌被害元乂秉政朝野震悚懌諸子及門生寮吏莫不慮禍隠避不出素爲懌所厚者彌不自安固以嘗被辟命遂獨詣䘮所盡哀慟哭良乆乃還僕射游肇聞而歎曰雖欒布王修何以尚也君子哉若人張普惠初爲任城王澄所知及爲諫議大夫澄薨普惠吏民之義又荷其恩待朔望奔赴至於禫除雖寒暑風雨無不必至又好有進舉敦於故舊兾州人侯堅固少時與其游學早終其子長瑜普惠每於四時請禄無不减贍給其衣食及爲豫州啓長瑜解褐擕其合門極給之劉仁之爲西兖州刺史性愛好文史敬重人流與齊州馮元興交欵元興死後積年仁之營視其家嘗出隆厚時人以此尚之祖瑩性爽俠有節氣士有窮厄以命歸之必見存極時亦以此多之至䕶軍將軍汲宗交州人爲杜超故吏超宻皇后之兄也後從弟遺子元寳謀反伏誅時朝議欲追削超爵位中書令髙允上表理之宗與故吏等以超子道雋坐爵受誅委骸土壤求得收塟書奏詔義而聽之贈超散騎常侍安南將軍南康公謚曰昭馮熈生於長安爲姚氏魏母所養以叔父樂陵公邈因戰入蠕蠕魏母擕熈逃避至氐羗中撫育年十二好弓馬有勇幹氐羗皆歸附之魏母見其如此將還長安始就學士學從師受孝經論語好隂陽兵法後授内都大官太師熈事魏母孝謹如事所生魏母卒乃散髪徒跣水漿不入口三日詔不聽服熈表求依趙氏之孤孝文以熈情難奪聼服齊衰期崔巨倫以宣武挽郎除兾州鎮北府墨曹叅軍太尉記室叅軍叔楷爲殷州巨倫仍爲長史在州䧟賊歛恤亡存爲賊所義後逃歸雒授别將北討初楷䘮之始巨倫收殯倉卒事不周固至是遂偷路改殯并竊家口以歸吳悉達雖於儉年糊饘不繼賔客經過必傾所有每守宰殯䘮私辦車牛送終塟所隣人孤貧困窘者莫不解衣輟粮以相賑恤鄉閭五百餘人詣州稱頌焉有司奏聞標閭復役以彰孝義馬人龍輕財重義友人尹靈哲在軍䘮亡人龍聞即奔赴負屍而歸以家財殯塟爲制緦服撫其孤遺恩如所生州郡髙龍詔表門閭杜纂字榮孤嘗山九門人少以清苦自立縣令齊羅䘮亡無親屬收瘞纂以私財殯塟繇是郡縣標其門閭髙遵字世禮父濟隂太守遵賤出其兄矯等嘗欺侮之及父亡不令在䘮位遵遂馳赴平城歸從祖兄中書令允允乃爲遵父舉哀以遵爲䘮主京邑無不吊集朝貴咸識之徐歸奔赴免䘮允爲營官路得補樂浪王侍郎遵感成益之恩事允如諸父趙令安孟蘭强天水白石人並四世同居行著州里王閭北海宻人數世同居有百口劉業興大山人四世同居蓋擕都郡人六世同居並共財產家門雍睦鄉里敬異石文德中山蒲隂人有行義真君初縣令黄宣在任䘮亡宣單貧無期親文德祖父苗以家財殯塟持服三年奉養宣妻二十餘載及亡乃衰絰歛祔率禮無闕自苗逮文德刺史守令卒官者制服送之五世同居門庭雍睦石祖興嘗山九門人太守田文彪縣令和真等䘮亡祖興自出家絹二百餘疋營䕶䘮事州郡表列髙祖嘉之張烈爲順陽太守以母老歸養積十餘年頻值凶儉烈爲粥以食饑人蒙濟者甚衆鄉黨以此稱之李幾博陵安平人七世同居共財家有二十二房一百九十八口長㓜濟濟風禮著聞至於作役卑㓜競進鄉里嘆美標其門閭張安祖襲世爵山北侯有元承貴曾爲河陽令家貧且赴尚書求選逄天寒甚遂凍死路側一子㓜停屍門巷棺殮無託安祖悲哭盡禮買木爲棺手自營作歛殯周給朝野嘉歎尚書聞奏標其門閭汲固東郡梁城人爲兖州從事刺史李式坐事被收吏人皆送至河上時式子憲生始滿月式大言於衆曰程嬰杵臼何如人也固曰今古豈殊遂便潜還不復顧徑來入城於式婦閨抱憲歸藏及捕者收憲屬有一婢產男毋以婢兒受之事尋泄固乃擕憲逃道遇赦始歸憲即爲固長育至十餘歳嘗呼固夫婦爲郎婆後髙祐爲兖州刺史嘉固節義以爲主簿劉侯仁豫州人郡人白早生殺刺史司馬悅據城南叛悅息朏走投侯仁賊雖重加購募又􅃊其捶楚侯仁終無漏泄朏遂免禍事寧有司奏其操行請免府藉叙一小縣詔可邵洪哲上谷沮陽人縣令范道榮先自朐城歸欵乃除縣令道榮鄉人徐孔明妄經公府訟道榮非勲道榮坐除名覊旅孤貧不能自理洪哲不勝恚憤遂代道榮詣京師明申曲直經歴寒暑不憚勤勞道榮卒得復雪又北鎮反亂道榮孤單無所歸附洪哲兄伯川復率鄉人來相迎接送達幽州道榮感其誠節訴省申聞詔下州郡標其里閭册府元龜卷八百三
