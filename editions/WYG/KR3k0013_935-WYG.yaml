body:
  text: 册府元龜卷九百三十五宋王欽若等撰總録部搆患釁勇嗇禍斯為小人掩義隠賊謂之凶徳乃有務逞已欲罔顧時艱崇飭詖辭専任小智騁強辯之䇿激怒所趣肆威寵之勢斂怨於下至有携離天族猜阻臣節煽惑有漸翻覆靡常承間隙而率作因觖望而交搆外虞莫禦内蠱攸興實啓厲階豈思敗類湯止沸而寧息火燎原而莫向亂是用長職此之繇亦有始謀不臧矯枉過正欲滌蕭牆之禍終掇無名之舉用殄厥族其可悲矣漢蒯通范陽人也始韓信虜魏王破趙代降燕定三國引兵將東撃齊未度平原聞漢王使酈食其説下齊信欲止蒯通説信曰將軍受詔撃齊而漢獨發間使下齊寧有詔止將軍乎間使謂使人伺間隙而軍行何以得無行且酈生一士伏軾掉三寸舌下齊七十餘城掉揺也從釣切將軍將數萬之衆廼下趙五十餘城為將數嵗反不如一豎儒之功乎於是信然之從其計遂度河齊已聽酈生即留之縱酒罷􅊀漢守禦信因襲歴下軍遂至臨淄齊王以酈生為欺己乃烹之因敗走主父偃齊國臨淄人也學長短縱横術初欲因齊宦者徐甲内女齊王後宫太后怒偃繇此與齊有隙偃方幸用事因言齊臨淄十萬户市租千金收一市之租值千金也人衆殷富鉅於長安鉅大也非天子親弟愛子不得王此今齊王於親屬盖疎乃從容言吕太后時齊欲反從音千容切及吳楚時孝王幾為亂幾音巨衣切今聞齊王與其姊亂於是武帝拜偃為齊相且正其事偃至齊急治王後宫宦者為王通於姊翁王所者辭及王王年少懼大罪為吏所執誅乃飲藥自殺後漢賈詡為討虜校尉董卓之壻中郎將牛輔屯陜詡在輔軍卓敗輔又死衆恐懼校尉李傕郭汜張濟等欲解散行歸鄉里詡曰聞長安議欲盡誅凉州人而諸君棄衆單行即一亭長能束君矣不如率衆而西所在收兵以攻長安為董公報仇幸而事濟奉國家以征天下若不濟走未後也衆以為然傕乃西攻長安魏丁謐為尚書初司馬宣王以曹爽魏之肺腑每推先之爽以宣王名重亦引身卑下當時稱焉謐與畢軌等既進用數言於爽曰宣王有大志而甚得民心不可以推誠委之繇是爽常猜防焉禮貎雖存而諸所興造皆不復繇宣王宣王力不能爭且懼其禍故避之陳陳寶應晉安侯官人世為閩中四姓父羽有才幹為郡雄豪寶應性反覆多變詐梁代晉安數反累殺郡將羽並扇惑合成其事後復為官鄉導破之繇是一郡兵權皆自已出北齊斛斯椿初為爾朱榮所委任及榮死椿乃殺爾朱世隆兄弟等以歸齊獻武王出帝拜椿侍中儀同開府初獻武王之入雒頓於卭山朱仲逺帳下都督橋寧張子期自滑臺而至獻武王責寧等曰汝事仲逺擅其榮利盟契百重許同生死前仲逺自徐為逆汝為戎首今仲逺南走汝復背之於臣節則不忠論事人則無信犬馬尚識恩飬汝今犬馬之不如遂斬之椿自以數為反覆見寧等之死意常不安遂密搆間勸出帝置閣内都督部曲又增武直人數自直閣已下員列數百皆選天下輕彯者以充之又説帝數出游幸號令部曲别為行陣椿自約勒指麾其間從此以後軍謀朝政一决於椿又勸帝徴兵詭稱南討將以伐齊獻武王帝從之遂陳兵城南北接卭山南至雒水帝詰旦戎服與椿臨閲焉獻武王以椿亂政欲誅之椿䜛謗既行因此遂相恐動出帝勒兵河橋椿為前軍營於山北尋遣椿率歩騎數千鎮虎牢椿弟豫州刺史元壽與都督賈顯智守滑臺獻武王令相州刺史竇泰撃破之椿懼已不免復啓出帝假説游聲以刼脅帝信之遂入闗椿亦走長安椿狡猾多事好亂樂禍干時敗國朝野莫不讐疾之元壽尋為部下所殺隋竇建徳大業七年山東大饑建徳謂孫安祖曰文帝時天下殷盛發百乗之衆以討遼東尚為髙麗所敗今水潦為災黎庻困窮而主上不恤親駕臨遼加以徃歲西征瘡痍未復百姓疲困累年之役行者不歸今重發兵易可揺動丈夫不死當立大功豈可為逃亡之虜也我知髙鷄泊中廣大數百里莞蒲阻深可大逃難承間而出虜掠足以自資既得聚人且觀時變必有大功於天下矣安祖然其計建徳招誘逃兵及無産者得數百餘人令安祖率之入泊中為羣盗唐盧楚煬帝之末江都亂作東都留守元文郁等共立越王侗為帝時王充與文郁有隙文郁知之隂有誅充之計侗復以文郁領御史大夫充固執而止盧楚説文郁曰王充外軍一將耳本非留守之徒何得預吾事且雒口之敗罪不容誅今者敢懐跋扈宰制時政此而不除方為國患文郁然之遂懐奏入殿事臨發有人以告充時在朝堂懼而馳還含嘉城議作亂文郁頻遣呼之充稱疾不赴至夜作亂攻東太陽門而入拜於紫微觀下侗遣人謂之曰何為者充曰文郁盧楚謀相殺害請斬文郁歸罪司冦侗見兵勢漸盛度終不免謂文郁曰公自見王將軍也文郁遷延而立侗遣其署將軍黄桃樹執文郁以出文郁顧謂侗曰臣今朝亡陛下亦當夕及侗慟哭而遣之左右莫不憫然出至興教門充令左右亂斬之諸子並見害楊國忠為右相時安禄山𤣥宗尤所親重又握兵柄國忠知其跋扈終不出其下將圖之屢為𤣥宗言其悖逆之狀時禄山隂圖逆節而未有名帝不信之國忠乃使門吏蹇昻何盈求禄山隂事圍捕其宅得李岱等使侍御史鄭昂縊殺於御史臺又奏徙其黨告温於合浦以激怒禄山幸其動揺以取信於帝帝意不悟也繇是禄山惶懼遂舉兵以誅國忠為名李訓為國子博士翰林侍讀學士文宗性守正嫉惡以宦者權寵太過繼為禍胎訓在翰林解詩之際或語及巷伯事則再三憤激以動帝心帝以其言論縱横謂能成事遂以其誠謀於訓及鄭注太和九年累遷禮部侍郎平章事出鄭注為鳳翔節度使約以其年十一月誅中宦至其月二十一日帝御紫宸殿左右班定金吾使韓約不報平安上書臣本署内㕔後有石榴樹昨夜三更甘露降臣已有狀遞門賀訖臣以甘露上瑞味甘氣香其色炫燿此實聖徳廣被上天降休臣目睹嘉祥不勝慶悦蹈舞再拜宰相王涯賈餗舒元輿香案前拜賀百官相次皆稱賀訓元輿因奏曰甘露發祥俯邇宫禁陛下實宜親觀以受天慶帝允之班退出閤百官復列班於含元殿庭日至辰時帝乗軟舁出自紫宸門内官兩中尉樞密使已下翼侍而進繇含元殿東階昇殿宰相供奉官分列於副階之上南班官兩列于殿下渠北帝曰宰相及兩省官且徃樹下觀之於是宰相領兩省官東入金吾仗將軍㕔事同看甘露曰此非真甘露也訓謂兩省官曰公等子細視之帝令辨騐不可容易良久歸班訓奏曰臣與兩省官細視其狀恐非甘露此事不可輕言言出之後四方須有稱賀臣恐未是真瑞帝曰豈當有如此事顧左右軍中尉及内官等曰爾等徃驗之皆羅拜而去時新除太原節度使王璠邠寧節度使郭行餘並在本班訓皆相約曰有急須相就共張形勢於是訓急召王璠郭行餘曰來受勅㫖時邠寧兵士來迎行餘數百人皆執弓刀立於丹鳳門外訓復遍呼之曰兩鎮軍將官健悉入聖上欲親有處分王璠恐悚不前行餘獨拜殿下邠寧兵士竟亦不至内官至甘露下廻旋良久韓約氣懾汗流不能舉首左右軍中尉曰將軍何故如此後風吹㕔幙内見執兵仗者甚衆内官驚恐走出閽者執闗欲鎻其外門為衆所叱執闗而不能舉内官廻或持樹枝及以小瓷椀盛甘露以進訓見如此連聲呼金吾兵仗令上殿䕶衛乗輿每人賞錢一百貫文内官以事勢非常衆扶輦輿决破罘罳自含元殿北下殿疾趨訓攀輦連呼曰陛下不得入内金吾兵仗數十人亦随訓而入京兆少尹知府事羅立言領其徒自東來御史中丞李孝本領其徒自西來各二百餘人皆上殿縱擊但聞有呌呼寃枉之聲内官或有被血羅拽出者數人訓持輦愈急迤邐入宣政門帝叱之内官卻志榮以手擊其胷訓仆於地輦入東上閣門閣門既閉聞呼萬歲者數四百官錯愕莫知所為王涯賈餗舒元輿歸中書就食曰必將開延英召對兩省官就見宰相涯曰不知是何事也諸公且各自取便須臾吏走曰有兵自内來遇人即殺宰相已下愴惶走出兩省人吏及金吾健兒共千餘闐門爭出宰相等纔及出門兵士已合在門内不能出者凡六七百人皆死時王璠男遐休直𢎞文館其日初蒞所職館中官屬駕部郎中充學士令狐定領其僚六人送之悉為兵士所擒欲殺者三四内官大盈庫使宋守義自號為斬斫使翌日執遐休送神䇿軍戮之其餘皆䕶而免焉其日王涯歩行至永昌里茶肆為左神策所擒舒元輿易服單騎出安化門右神策軍騎追及之賈餗變服宿於人間明日自詣右神策軍其日夜半左神策軍取王璠於長興里私第取羅立言於太平里私第自王涯已下骨肉妻子一時捕繫訓再從弟户部員外郎元臯涯子工部郎中集賢殿學士孟堅太常博士仲興其餘稚少皆連襟繋頸送入兩軍無少長盡誅之婦女或有存者配没掖庭天下州府捕索尤切至於嬰孩亦皆流竄是日己午之際禁軍突入修行里故嶺南節度使胡証之家以搜賈餗為名其實以証多積因而刼之証之子溵送捕入軍害焉癸亥進朝羣臣至建福門猶尚閉朝官共止於郎官待漏院隔門傳呼只許一人随從及日欲出門方開朝官得入自建福門迤邐死僵塞路門亦有兵守提及下馬橋死者亦然光範門闗鎻甚固自橋北盡兵士嚴衛之兩省官不得進皆取金吾右仗人及龍尾道方令下馬左右兵士轉抵宣政衛兵士皆露刃為隊至正衙門尚未開時無宰相又無御史中丞兩省官寓立朝堂無人吏百官無行列逡廵唯閣門使馬元贄斜開宣政衙門出連呼常侍張仲方可京兆尹然後門大啟時無知班吏百官雜沓而進衙門兩廊廡下亦兵對不缺立次有衣緋中使乗馬自東上閣門出宣問兵士時閣門喚仗帝已御紫宸殿兩省官與南班一時入閣亦自序其班立定通事舍人杜例宣召左右僕射令狐楚鄭覃皆至龍墀南宣授王涯所通反狀涯狀云與李訓同謀欲行大逆册立鄭注帝問楚等曰此是涯書否楚曰乃是涯自書誠如此罪不容誅班退近晩復召令狐楚鄭覃王源中入内殿對令草制􅃯一夕而出是夜皆欲以為相楚以制勑稍直為内臣所不樂翌日遂有鄭覃李石相次之命焉李孝本單騎投鄭注其日右神策軍擒之於咸陽西原甲子右神策軍盭厔鎮遏使宋楚擒獲訓以兵士送至昆明池訓恐入軍别被榜笞謂兵士曰所在有兵得我者即富貴不如持我首去兵士於是斬訓傳首初訓與僧宗密善及敗走單騎投宗密於鄠縣終南山下宗密欲髠其頭其徒不可乃以一人引去下欲西投鄭注為候騎所得後右軍縳宗密至欲誅之宗密怡然曰識訓年多亦知訓反叛然本師教云見苦即救不愛身命死固所甘中尉魚志宏遂釋不殺是時三舘圖書并中書一物已上盡為兵士剽掠其兩閤應所有悉無存者次日朝官亦入其兵士稍减光範門方開其他如故行儀班退及午又追朝洎百僚至召入閣以鳳翔告㨗獻鄭注首悉稱賞拜舞而退兩軍懽呼動地自此兵士皆放歸本軍其鄭注首懸於光宅坊西北角鋪三日而去之其時兩省官尚多疑懼不歸本署多寓四方舘暫憇而歸甲子勑王涯等身為宰相委任至重與其徒恣行凶惡潜搆姦謀鄭注草萊卑末寵遇殊常而乃竊發殿庭同為扶豎險邪之狀古今未聞頼宗社降靈重臣協力斯須消滅京師晏寧天下之人所同懽快謀惡之罪國有常刑其王涯賈餗舒元輿王璠郭行餘李孝本羅立言等宜令左右神策差兵馬防援准舊例領赴郊廟及兩市令衆訖於獨柳樹下並仰准法處分是日左神策軍以兵馬三百人領王涯王璠羅立言右神策軍以兵馬三百人領賈餗舒元輿李孝本等並於子城西南隅舊號獨樹下腰斬涯以㩁茶事百姓怨恨詬之於衢或投瓦石以撃之其中書門下省吏人焦㝢焦璿御史臺驅使官李楚等數十人兩軍爭取殺之并夷其家戊辰詔曰朕以寡徳祗荷膺圖于兹十年夙夜惟寅嘗恐至誠不逹景化未敷屈己以安四方推信以待百辟豈有患生毗倚變起姦兇亦以失於任人致此氛沴然朕為人父母子育生靈憂萬姓之靡寧懼一物之失所况至理之代先徳而後刑以上下歡康中外清晏慮有連累即傷太和且賞不逾時式彰褒勸其今月二十一日排難宣力功成謀議及能應機梟斬鄭注者節級各加官賞其次立功及車墜將士合在賞級者即有差等處分其將校等合與改轉委本軍條流具名開奏謀逆之人已斷腰領子戮家破俾當極誅元惡李訓王涯家族除已處置外妻女奴婢並入官資貨産業天下所在切加檢責據數開奏其餘親黨除同居知情外不同謀計者一切不問諸色官吏所繇其受逆長指合欲出力同惡者並已兩軍推問尋捕處斬訖尚慮因縁讐隙妄告平人自今已後縱同官司微渉詿誤者一切不潜藏疑懼者許三日内各歸本司不得輙相恐動韓約首為詐惡逆罪滔天雖羅捕未獲終天網不漏宜委御史臺京兆府兩金吾速催促所繇齊出搜索獲日聞奏如輙有人隠藏不告者罪及一門如知處隠藏密來告説者必當厚有賞賜於戲朕求理之心惟才是與聽言信行不慮包藏豈謂邪人負我如此其中誘䧟必有脅從須挂刑名載深寃歎其中節目疎理未盡須更商量者委中書門下續即條奏宣示逺邇咸使聞知是日左神策攻於崇義坊捉獲韓約己巳勑以左神策軍兵馬二百餘人領韓約於東市西北隅狗脊嶺處斬庚午咸陽縣令武公緒詔京兆府杖殺之以其與李孝本路糧錢三千辛未勅兇徒竊發震駭京師中外同心即時擒斬昨者將戮叛黨咸告廟社且國之大事合謁諸陵宜令所司擇日撰儀差官後唐安重誨為樞密使時東川帥董璋恃險難制乃以武䖍裕為緜州刺史董璋益懐疑忌乃執䖍裕以叛朱宏昭馮贇並為樞密使時秦王從榮屢宣忿言執政大臣皆懼禍及明宗疾篤秦王知人情不附已恐大事􅆾誤與將吏謀以兵入侍先制權臣謂康義誠曰予欲居中侍醫藥何處宿止為便對曰子侍父疾何向不可仍懐疑慮十一月十九日令牙將馬延嗣謂贇曰秦王明日入侍公等止於何處贇跪對曰奉詔二十日五鼓馬延嗣復至贇第秦王言公等處事所宜和允各有家族祻福頃刻贇復跪對是日遂馳馬守右掖門至廣壽殿門見朱康具述延嗣語又謂義誠曰秦王言禍福頃刻事即可知此事宗社所繋侍中勿顧慮也義誠未暇對監門報秦王領兵在端門外二人切告義誠對曰惟公所使孟漢瓊拂衣而言曰諸君平時惟恨禄位不大及危疑之際便持兩端非丈夫也乃至雍和殿奏曰從榮謀大逆陳兵在端門明宗愕然問義誠不能游詞言事實明宗曰爾圖之勿驚動京師孟漢瓊率控鶴指揮李重吉馬軍指揮朱洪實等拒戰是日誅之遂令漢瓊自赴魏州迎愍帝二十六日明宗晏駕月晦帝至京師主䘮倉卒中内外制置皆出贇宏昭愍帝即位贇宏昭並典機密贇與宏昭素猜忌潞王初明宗不豫潞王夫人繼入省視及宫車變故辭疾不來西使者又伺得潞邸隂事贇等不能長轡逺馭以制之遂出李重吉於外延比丘於内又移鎮太原是時不除制書惟以宣授而已遂至於稱兵焉薛文遇為樞密院直學士末帝初疑河東有異志欲移石某晉髙祖名於鄆州九月近臣房嵩等堅言不可司天監趙延義亦言星辰失度尤宜好静繇是稍緩其事㑹文遇獨宿禁中帝召之諭以太原之事文遇奏曰臣聞作舍於道三年不成國家利害斷自宸𠂻以臣料之石某除亦叛不除亦叛不如先事圖之帝喜曰聞卿此言豁吾憤氣即令手書除曰子夜下學士院草制翌日宣制之際西班失色居六七日河東上章言甚不遜遂稱兵晉景延廣為侍衛親軍使少帝即位以為己功尋加使相彌有矜伐之色始朝廷遣使告哀北虜無表致書去臣稱孫虜怒以使來讓延廣乃奏令契丹圖運使喬榮告邪律氏曰先帝則北朝所立今上則中國自册為鄰為孫則可無稱臣之理且言晉朝有十萬口横磨劍翁翁要戰蚤來他日不禁孫子則取笑天下成後悔矣繇是與虜立敵干戈日尋所謂惟口起戎是也又請下詔追揚光逺髙祖在位時宣借騎兵光逺忿延廣怨朝廷遂遣間使泛海搆虜明年十二月虜乃南牧以三年正月下甘陵河北儲蓄悉在其郡帝大駭率六師親駐澶淵虜攻張從恩於鄴下克又分衆濟汶陽黄河北津以趣榮丘為我騎將皇甫遇李守真挫其鋒虜尋退次攻澶淵延廣為上將凡六師進退皆出胸臆自帝以下不能制衆咸憚而忌之虜既還猶閉栅自固士大夫曰昔與虜絶好言何勇也今虜至若是氣何憊也時延廣在軍母凶問至自澶淵津北移津南不信宿而復蒞戎事曾無戚容下俚之士亦聞而惡焉王緒性姦猾多心術為魏博杜重威從事聚斂無已重威承詔攻安重榮於常山緒從之城未下獻謀於重威率境内百姓地畆錢以備贍給俄而城下依前令督之重威素貪黷深重之尋以他事忤意乃薦於朝廷授太常丞家於營丘嘗致書於楊光逺時緒有妾之兄以貧匱告緒緒不為賙給又詬辱之繇是挾隙告與楊光逺連謀每密書述朝廷機事侍衛使景延廣收捕下獄奏斬於澶州北市漢聶文進為樞密院承㫖右領軍大將軍遇周太祖出征稍至驕横久未遷改深所怨望與李業軰搆成變亂史宏肇等遇害之前夕文進與同黨預作宣詔制置朝廷之事凡闗文字並出文進之手明日難作文進㸃閲兵籍徴發軍衆指揮取舍以為己任内外咨禀前後填咽太祖在鄴被搆初謂文進不預其事驗其事迹方知文進亂階之首也大詬詈之太祖過封丘帝次於北郊文進告太后曰臣在此請宫中勿憂兵散之後文進召同黨痛飲歌笑自若遲明帝遇祻文進奔竄為軍士所追梟其首册府元龜卷九百三十五
