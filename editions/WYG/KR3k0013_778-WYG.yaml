body:
  text: 册府元龜卷七百七十八宋王欽若等撰總録部高尚易曰髙尚其事仲尼之稱儒有不臣不仕者焉斯盖抱樸以自守處晦而無悶不降其志獨善其身絶俗以高蹈確乎其不可拔也三代以還乃有恥厠家陪之列不齅驕君之餌棄卿相之位辭封爵之富安車徵聘而靡屈公府交辟而不起雖復蒲帛賁于邱園羔鴈陳於庭戸視之蔑如也非夫徳充於内道茂乎已厲行無爽處躬有裕又安能不隕穫而充詘哉然而當時之君亦曷嘗不優容全度以成其高世之節今並採其事迹著之于篇或有雖在早嵗抗志而避名暨及晚年逢辰而貴仕出處有道亦無媿焉閔損字子騫魯人孔子弟子也不仕大夫不食汚君之禄季氏使子騫為費宰子騫曰善為我辭焉不欲為季氏宰語使者善為我作辭説令不復召我如有復我者復我者重來召我必在汶上矣去之汶水之上欲北如齊莊周蒙人也楚王史記作威王遣使者持金千斤白璧百雙聘欲以為相莊子固辭而不許使者曰黄金白璧寳之至重卿相之位至尊先生辭而不受何也莊子曰子所謂見其一未知其二者也獨不見入廟之犠乎衣以文繡飼以茭穀出則清道而行止則居帳之内此寧不貴邪及其不免於死庖宰執刀於前或持刃在後當是之時雖欲與孤豚伍雞䑕游豈得乎哉僕聞之左手據天下之圖右手刎其喉愚者不為也何則身重於天下也又况卿相之位乎終辭而不受魯仲連齊人也好竒偉俶儻之畫䇿而不肯仕宦任職好持高節游於趙㑹秦圍趙魏王使客將軍新垣衍間入邯鄲因平原君欲令趙尊秦為帝魯連責而歸之秦軍引去於是平原君欲封魯連魯連辭譲使者三往終不肯受平原君乃置酒酒酣起前以千金為魯連夀魯連笑曰所謂貴於天下之士者為人排患釋難解紛亂而無取也即有取者是商賈之事也而連不忍為也遂辭平原君而去終身不復見其後復為齊將田單遺燕將書下聊城田單欲爵之魯連逃隠於海上曰吾與富貴而詘於人寧貧賤而輕世肆志焉淳于髠齊人客有見髠於梁惠王惠王再見之而終無言也知王之志在驅逐音聲也後復見一語連三日三夜無倦惠王欲以卿相位待之髠因謝去於是以安車駕駟束帛加璧黄金百鎰終身不仕顔蠋齊人宣王謂蠋請受教為弟子且先生與寡人游食必太牢出必乘車妻子衣服麗都顔蠋辭去曰夫玉生於山制則破焉非弗寶貴矣然太璞不完士生乎鄙野推選則禄焉非不得尊遂也然而形神不全蠋願得蔬食以當肉安步以當車無罪以當貴清静貞正以自虞制言者王也盡忠直言者蠋也言要道已備矣願得賜歸安行而反臣之邑屋則再拜而辭去君子曰蠋知足矣歸真反璞則終身不辱也漢鄭子真耕於谷口非其服弗服非其食弗食大將軍王鳯以禮聘子真子真遂不屈後漢王扶客居瑯邪國相張宗謁請不應欲强致之遂杖䇿歸鄉里連請固病不起太傅鄧禹辟不至亷范喪親服竟詣京師受業事愽士薛漢京兆隴西二郡更請召皆不應後舉茂才累遷至蜀太守承宫少勤學不倦經典既明乃歸家教授三府更辟皆不應三府謂太尉司徒司空府鄭均常稱病家庭不應州郡辟召郡將欲必至之使縣令譎將詣門既至卒不能屈均於是客於濮陽建初三年司徒鮑昱辟之後舉直言並不詣趙典性明達至節清亮益州舉茂才以病辭太尉黄瓊胡廣舉有道方正皆不應桓煜舉孝亷有道方正茂才三公並辟皆不應張衡雖才高於世而無驕尚之情嘗從容淡静不好交接俗人永元中舉孝亷不行連辟公府不就安帝雅聞衡善術學公車特徴拜郎中累遷至尚書周燮字彦祖汝南安城人專精禮易不讀非聖之書不修賀問之好有先人草廬結于岡畔下有陂田嘗肆勤以自給非身所耕漁則不食也鄉黨宗族希得見者舉孝亷賢良方正特徴皆以疾辭延光二年安帝以𤣥纁羔幣聘爕及南陽馮良二郡各遣丞掾致禮宗族更勸之曰夫修徳立行所以為國自先世以來勲寵相承君獨何為守東崗之陂乎爕曰吾既不能隠處巢穴追綺季之跡而猶顯然不逺父母之國斯固以滑泥揚波同其流矣夫修道者度其時而動動而不時焉得享乎因自載到潁川陽城遣生送敬送敬猶致謝也遂辭疾而歸良亦載病到近縣送禮而還詔書告二郡嵗以羊酒養病至七十餘而卒孫期習京氏易古文尚書牧豕於大澤中以養親郡舉方正遣吏齎羊酒請期期驅豕入草不顧司徒黄琬特辟不行終於家李固司𨽻益州並命郡舉孝亷辟司空掾皆不就謝承書曰五察孝亷益州再舉茂才不應五府連辟皆辭以疾後公卿舉固對䇿以為議郎累加至太尉張芝少持高節以名臣子勤學文為儒宗武為將表太尉辟公車有道徴皆不至號張有道周勰汝南汝陽人父舉光禄大夫以父任為郎自免歸家父故吏河南召䕫為郡將卑身降禮致敬於勰恥交報之因杜門自絶後太守舉孝亷復以疾去時梁冀貴盛被其徴命者莫敢不應惟勰前後三辟皆不能屈後舉賢良方正不應又𤣥纁備禮固辭廢疾嘗隐處竄身慕老耼清静杜絶人事巷生荆棘十有餘嵗至延熹二年乃開門延賓游談宴樂及秋而梁冀誅年終而勰卒時年五十蔡邕以為知命姜肱諸公争加辟命皆不就二弟名聲相次亦不受徵聘時人慕之桓帝乃下彭城使畫工圖其形狀肱以被韜面終不得見年七十七卒徐穉屢辟公府不起時陳蕃為太守以禮請署功曹穉不免之既謁而退建武中卒於家趙曄受韓詩州召補從事不就舉有道卒於家張康山陽人習韓詩舉有道博士徵不就卒於家宗慈南陽人舉孝亷九辟公府有道徴皆不就後為修武令棄官去徴拜議郎未到道疾而卒侯瑾州郡累召公車有道徴並稱疾不到李南少篤學明風角後舉有道辟公府並不行終於家孔喬幽居修志銳意典籍至厯年身不出門鄉里莫得瞻見公車徴不行卒於家桓鸞以世濁州郡多非其人恥不肯仕黄憲汝南人太守王龔在郡進禮賢達多所降致卒不能屈憲初舉孝亷又辟公府有人勸其仕憲亦不拒之暫到京師而還意無所就年四十八終天下號日徴君法真字高卿高一作喬性恬静寡欲不交人間事太守請見之真乃幅巾詣謁太守曰昔魯哀公雖為不肖而仲尼稱臣太守虗薄欲以功曹相屈光賛本朝如何真曰以明府見待有禮故敢自同賓末若欲吏之真將在北山之北南山之南矣太守戄然不敢復言辟公府舉賢良皆不就同郡田羽薦真曰處士法真體兼四業學窮典奥幽居恬泊樂以忘憂將蹈老成之高蹤不為𤣥纁屈也臣願聖朝就加衮職必能唱清廟之歌致來儀之鳯矣㑹順帝西巡羽又薦之帝虗心欲致前後四徴真曰吾既不能遯形逺世豈飲洗耳之水哉遂深自隠絶終不降屈友人郭正稱之曰法真名可得而聞身不可得而見逃名而名我隨避名而名我追可謂百世之師者矣乃共刻石頌之號曰𤣥徳先生年八十九以夀終董扶有重名永康元年日有蝕之詔舉賢良方正之士䇿問得失左馮翊趙亷等舉扶扶以病不詣遙於長安上封事遂稱疾篤歸家前後宰府十辟公車三徴再舉賢良方正愽士有道皆不就名稱尤重許邵有高行辟公府掾拜鄢陵令方正徴皆不就避亂江南所厯之國必翔而後集終於豫章宗人許相沈没榮利致位司徒舉宗莫不匍匐相門承風而驅官以賄成惟邵不過其門申屠蟠再舉有道不就前後徴辟文書悉挂於樹初不顧眄也大將軍何進連徴不詣進必欲致之使蟠同郡黄忠書勸曰前幕府初開至如先生特加殊禮優而不名申以手筆設几杖之坐經過二載而先生抗志彌高所尚益固竊論先生高節有餘於時則未也今潁川荀爽載病在道北海鄭𤣥北面受署彼豈樂羇牽哉知時不可逸豫也昔人之隠遭時則放聲滅跡巢棲茹薇其不遇也則裸身大笑披髪狂歌今先生處平壌游人間吟典籍襲衣裳事異昔人而欲逺蹈其跡不亦難乎孔子可師何必首陽蟠不答太尉黄瓊辟不就及瓊卒歸塟江夏四方名豪㑹帳下者六七千人互相談論莫有及蟠者惟南郡一生與相酬對既引執蟠手曰君非聘則徴如是相見於上京矣蟠勃然作色曰始吾以子為可與言也何意乃相拘教樂貴之徒邪因振手而去不復與言年七十四終於家劉淑明隠居講授州郡禮請五府連辟並不就永興二年司徒种暠舉淑明賢良方正辭以疾桓帝聞其名勅責州郡使輿病詣京師淑明不得已而赴雒陽對䇿為天下第一累遷至侍中虎賁中郎將陳寔嘗為太丘長以沛相賦歛違法乃解印綬去及黨禁始解大將軍何進司徒袁隗遣人喻寔欲特表以不次之位寔乃謝使者曰寔乆絶人事飾巾待終而已時三公每缺議者歸之累見徴命遂不起閉門懸車棲遲飬老實子紀遭黨錮著書數萬言黨禁解四府並命無屈就种岱字公祖好學養志舉孝亷茂才辟公府不就辟車特徴病卒楊彪字文先少傳家學初舉孝亷州舉茂才辟公府皆不應郭林宗游於雒陽名震京師司徒黄瓊辟太常趙典舉有道或勸林宗仕進者對曰吾夜觀乾象晝察人事天之所廢不可支也遂並不應卒於家田盛與郭林宗同好亦名知人優游不仕並以夀終孟敏游學十年遂知名三公俱辟並不屈頴容通春秋左氏郡舉孝亷州辟公府徴皆不就初平中避亂荆州劉表以為武陵太守不肯起卒於家皇甫嵩朝郡人也太尉陳蕃大將軍竇武連辟並不到靈帝公車徴為議郎後拜太尉其冬以流星䇿免復拜光禄大夫遷太常卒鍾皓九辟三府徴廷尉正愽士林慮長皆不就年六十九卒張𤣥字處虗沉深有才略以時亂不仕司空張温數以禮辟不能致及董卓秉政辟以為掾舉侍御史不就卓臨之以兵不得已彊起病終鄭𤣥袁紹舉茂才為左中郎將皆不就公車徴為大司農給安車一乘所過長史送迎𤣥乃以病自乞還家年七十四而卒李燮父固誅後亡匿遇赦乃還鄉里追服州郡禮命四府並辟皆無所就後徴拜議郎擢遷河南尹賀純字仲真㑹稽山隂人少為諸生博極羣藝十辟公府三舉賢良方正五徴博士四公車徴皆不就袁𢎞恥其門族貴勢乃變姓名徒步師門不應徴辟終於家初𢎞嘗入太學其從父逄為太尉呼𢎞與相見遇逢宴㑹作樂𢎞伏稱頭痛不聽聲音而退遂不往紹術兄弟亦不與通仲長統每州郡命召輒稱疾不就嘗以為凡遊帝王者欲以立身揚名耳而名不常存人生易滅優遊偃仰可以自娱欲卜居清曠以樂其志論之曰使居有良田廣宅背山臨流溝池環匝竹木周布塲圃築前果園樹後舟車足以代步涉之艱使令足以息四體之役養親有兼珍之膳妻孥無苦身之勞良朋萃止則陳酒肴以娱之嘉時吉日則烹羔豚以奉之躇蹰畦苑遊􅃧平林濯清水追凉風釣游鯉弋高鴻風於舞雩之下詠歸高堂之上安神閨房思老氏之𤣥虗呼吸精和求至人之彷彿與達者數子論道講書俯仰二儀錯綜人物彈南風之雅操發清商之妙曲逍遥一世之上睥睨天地之間不受當時之責永保性命之期如是則可以凌霄漢出宇宙之外矣豈羡夫入帝王之門哉又作詩二篇以見其志尚書令荀彧舉為尚書郎後參丞相曹操軍事孔融與平原陶邱洪陳留邉讓齊聲稱州郡禮命皆不就後獻帝徴為將作大匠遷少府復拜大中大夫廖扶汝南平輿人嘗歎曰老子有言名與身孰親吾豈為名乎遂絶志世外專精經典尤明天文䜟緯風角推步不應辟召時人號為北郭先生趙壹郡舉上計名動京師及還州郡争致禮命十辟公府並不就終於家王烈字彦方太原人察孝亷三府辟皆不就避地遼東太守公孫度欲以為長史烈乃為商賈自穢得免曹操聞烈高名遣徴不至建安二十四年終於遼東繆斐字文雅該覽經傳事親色養徴愽士六辟公府獻帝在長安公卿博舉名儒時舉斐任侍中並無所就張儉為山陽東部督郵坐黨事亡命中平元年黨事解乃還鄉里大將軍三公並辟又舉敦朴公車特徴起家拜少府皆不就王雋為人外静而内明不應州郡獻帝之都許復徴為尚書又不就張奉字公先弟表字公儀河内人兄弟少有高節諸公連徴不就謂之張氏兩賢襄楷平原隰隂人在齊州臨邑縣西好學博古延熹中宦官專朝政刑暴濫又比失皇子災異尤數楷自家詣闕上書其詞切直坐論司冦及靈帝即位以楷書為然太僕陳蕃舉方正不就鄉里宗之每太守至輙致禮請中平中與荀爽鄭𤣥俱以博士徴不至卒於家魏邴原字根矩少與管寧俱以操尚稱州府辟命皆不就孔融為北海相舉原有道後徙署丞相徴事代凉茂為五官將長史管寧字㓜安漢末避亂遼東黄初中來歸司徒華歆舉寧詔以寧為太中大夫固辭傅子曰寧上書天子且以病辭曰臣聞傅說發夢以感殷宗呂尚啟兆以動周文以通神之才悟於聖主用能輔佐帝業克成大勲臣之器朽實非其人雖貪清時釋體蟬蛻内省頑病日薄西山惟陛下聽野人山藪之願使一老者得盡微命書奏帝親覽焉明帝即位太尉華歆遜位讓寧遂下詔曰太中大夫管寧耽懐道徳服膺六藝清虗足以侔古亷白可以當世曩遭王道衰缺浮海遁居大魏受命則襁負而至斯盖應龍潜升之道聖賢用舍之義而黄初以來徴命屢下每輙辭病拒違不至豈朝廷之政與生殊趣將安樂山林往而不能反乎夫以姬公之聖而考徳不降則鳴鳥弗聞以秦穆之賢猶思詢乎黄髪况朕寡徳曷能不願聞道於子大夫哉今以寧為光禄勲禮有大倫君臣之道不可廢也望必速至稱朕意焉又詔青州刺史曰寧抱道懐真潜翳海隅比下徴書違命不至盤桓利居高尚其事雖有素履幽人之貞而失考父兹恭之義使朕虚心引領厯年其何謂邪徒欲懐安必肆其志不惟古人亦有翻然改節以隆斯民乎日逝月除時方已過澡身浴徳將以曷為仲尼有言吾非斯人之徒與而誰與哉其命别駕從事郡丞掾奉詔以禮發遣寧詣行在所給安車吏從茵褥道上厨食上道先奏寧稱草莽臣上疏曰臣海濱孤微罷農無伍禄運幸厚横蒙陛下纂承洪緒徳侔三皇化溢有唐乆荷渥澤積祀一紀不能仰荅陛下恩養之福沈委篤痾寢疾彌留逋違臣𨽻顛倒之節夙宵戰怖無地自厝臣元年十二月被公車司馬令所下州郡八月甲申詔書徴臣更賜安車衣被茵褥以禮發遣光寵並臻優命屢至怔營悚息悼心失圖思自陳聞申展愚情而明詔抑割不令稍修章表是以欎滯訖於今日誠謂乾覆恩有紀極不意靈潤彌以隆赫奉今年二月被州郡所下三年十二月辛酉詔書重賜安車衣服别駕從事與郡功曹以禮發遣又時被璽書以臣為光禄勲躬秉勞謙引喻周秦損上益下受詔之日精魄飛散靡所投死臣重自省揆徳非園綺而蒙安車之榮功無竇融而蒙璽封之寵楶梲駑下荷棟梁之任埀没之命獲九棘之位懼有朱博鼓妖之眚又年疾日侵有加無損不任扶輿進路以塞元責望慕閶闔徘徊闕庭謹拜章陳情乞蒙哀省抑恩聽放無令骸骨填於衢路自黄初至於青龍徴命相仍嘗以八月賜牛酒詔書問青州刺史程喜寧為守節高乎審老疾尫頓邪喜上言寧有族人管貢為州史與寧比隣臣嘗使經營消息貢說寧常著皂帽布襦袴布裙隨時單複出入閨庭能自任杖不須扶持四時祠祭輙自力强改加衣服著絮巾故在遼東所有白布單衣親薦饌饋跪拜成禮寧少而喪母不識形象嘗特加觴泫然流涕又居宅離水七八十步夏時詣水中澡洒手足闚於園圃臣揆寧前後辭讓之意猶自以生長潜逸耆艾智衰是以栖遲每執謙退此寧志行所欲必全不為守高正始二年中書侍郎王基薦寕於是安車蒲輪束帛加璧聘焉㑹寧卒胡昭字孔明潁川人養志不仕始避地冀州亦辭袁紹之命遁還鄉里太祖為司空丞相頻加禮辟昭往應命既至自陳一介野生無軍國之用歸誠求去太祖曰人各有志出處異趣勉卒雅尚義不相屈昭乃轉居陸渾山中躬耕樂道以經籍自娱閭里敬而愛之徙宅宜陽幽州刺史杜恕嘗過昭所居草廬之中言事論理辭義謙敬恕甚重焉太尉蔣濟辟不就張臻字子明鉅鹿人少游太學學兼内外後歸鄉里袁紹前後辟命不應移居上黨并州牧高幹表除樂平令不就徙遁常山門徒且數百人遷居任縣太祖為丞相辟不詣太和中詔求隠學之士能消灾復異者郡累上臻發遣老病不行廣平太守盧毓到官三日綱紀曰承前致版謁臻毓教曰張先生所謂上不事天子下不友諸侯者也豈此版謁所可光飾哉但遣主簿奉書致羊酒之禮徐奕字季才東筦人避難江東孫䇿禮命之奕改姓名微服還本郡太祖為司空辟為掾後拜諌議大夫卒王暢字叔茂少以清實為稱無所交黨初舉孝亷辭病不就張楷字公超司𨽻舉茂才除長陵令不至官隠居𢎞農山中學者隨之所居成市後華隂山南遂有公超市五府連辟舉賢良方正不就漢安元年順帝特下詔告河南尹曰故長陵令張楷行慕原憲操擬夷齊輕貴樂賤竄跡幽藪高志確然獨拔羣俗前此徴命盤桓未至將主者翫於常格優賢不足使其難進與郡使以禮發遣楷復告疾不到建和三年下詔安車備禮聘之辭以篤疾不行楊厚字仲桓廣漢人潜身藪澤耦耕自給司徒楊震表薦其高操公車下徴不就蜀秦宓緜竹人少有才學州郡辟命輒稱疾不往劉璋時宓同郡王商為治中從事與宓書曰貧賤困苦亦何時可以終身卞和衒玉以耀世宜一來與州尊相見宓荅書曰昔堯優許繇非不𢎞也洗其兩耳楚聘莊周非不廣也執竿不顧易曰確乎其不可拔夫何衒之有且以國君之賢子為良輔不以是時建蕭張之䇿未足為智也僕得曝背乎隴畝之中誦顔氏之簞瓢詠原憲之蓬戸時翺翔於林澤與沮溺之等儔聽𤣥猿之悲吟察鶴鳴於九臯安身為樂無憂為福處空虛之名居不靈之龜知我者希則我貴矣斯乃僕得志之秋也何困苦之戚焉及丞相亮領益州迎為别駕累遷至大司農卒楊慮字威方儀之兄也少有徳行為江南冠冕州郡禮召諸公辟請皆不能屈年十七夭鄉人宗貴號曰徳行楊君周舒字叔布少學術於廣漢楊厚名亞董扶任安數被徴不詣吴張紘字子綱少游學京都還本郡舉茂才公府辟皆不就吴書曰大將軍何進太尉朱雋司空荀爽三府辟為掾皆稱疾不就避難江東孫䇿創業表為正議校尉後權以為長史晉郭象字子𤣥少有才理州郡辟召不就嘗閒居以文論自娱後辟司徒掾稍至黄門侍郎東海王越引為太傅主簿卒李喜字季和上黨銅鞮人父佺漢大鴻臚喜少有高行博學研精與北海管寧以賢良徴不行累辟三府不就及景帝輔政命喜為大將軍從事後累遷至尚書僕射特進拜光禄大夫以年老遜位徐苗郡察孝亷州郡從事治中别駕舉異行公府五辟博士再徴並不就武惠時以疾居臺帝輙訪其安不終於家汜毓濟北盧人奕世儒素或薦之武帝召補南陽王文學祕書郎太傅參軍並不就于時青土隠逸之士劉兆徐苗等皆務教授惟毓不蓄門人清静自守時有好古慕徳者諮詢亦傾懐開誘以一隅示之七十一而卒孫綽字興公博學善屬文少與高陽許詢俱有高尚之志居於㑹稽游訪山水十有餘年後徴為太學博士累轉至廷尉卿領著作卒皇甫謐字士安安定朝那人沉静寡欲始有高尚之志以著述為務自號𤣥晏先生著禮樂聖真之論後得風痺猶手不輟卷或勸謐修名廣交謐以為非聖人孰能兼存出處居田里之中亦可以樂堯舜之道何必崇接世利事官鞅掌然後為名乎作𤣥守論以答之魏郡召上計掾舉孝亷景元初相國辟皆不行其後鄉親勸令應命謐為釋勸論以通志焉其後武帝頻下詔敦逼不已謐上疏自稱草莽臣曰臣以尫弊迷於道趣因疾抽簮散髮林阜人綱不閑鳥獸為羣陛下披榛採蘭并收蒿艾是以臯陶振褐不仁者逺臣惟頑蒙備食晉粟猶識唐人擊壤之樂宜赴京城稱夀闕外而小人無良致灾速禍乆嬰篤疾軀半不仁右脚偏小十有九載又服寒食藥違錯節度辛苦荼毒於今七年隆冬裸袒食水當暑煩悶加以咳逆或若温瘧或類傷寒浮氣流腫四支酸重於今困劣救命呼噏父兄見出妻息長訣仰迫天威扶輿就道所苦加篤不任進路委身待罪伏枕歎息臣聞韶衛不並奏雅鄭不兼御故郤子入周禍延王叔虞兵稱賢樊姬掩口君子小人禮不同器况臣糠䵃糅之彫胡庸夫錦衣不稱其服也竊聞同命之士咸以畢到惟臣疾疢抱釁牀褥雖貪明時懼斃命路隅設臣不疾居遭堯舜之世執志箕山猶當容之臣聞上有明聖之主下有輸實之臣上有在宥之政下有委情之人惟陛下留情垂恕更旌瓌俊索隠於傅巖收釣於渭濵無令泥滓乆濁清流謐辭切言至遂見聽許嵗餘又舉賢良方正並不起咸寧初又詔曰男子皇甫謐沉静履素守學好古與俗流異趣其以謐為太子中庶子謐固辭篤疾帝初雖不奪其志尋發詔徴為議郎又詔補著作郎司𨽻校尉劉毅請為功曹並不應劉實字子真平原高唐人也漢濟北惠王夀之後父廣斥丘令實少貧苦賣牛衣以自給然好學手約繩口誦書博通古今清身潔已行無瑕玷郡察孝亷州舉秀才皆不行後入雒調為河南尹丞至懐帝時為太尉郤說字廣基博學多才瓌偉倜儻不拘細行州郡禮命並不應王接字祖游馮收薦接於江東太守劉原即時禮命接不受原乃呼見曰君欲慕肥遯之高邪對曰接薄祜少孤而無兄弟母老疾篤故無心為吏及母終柴毁骨立居墓次積年王長文字徳獻廣漢郪人少以才學知名而放蕩不覊州府辟命皆不就州辟别駕乃微服竊出舉州莫知所之後於成都市中蹲踞齧胡餅刺史知其不屈以禮遣之閉門自守不交人事太康中蜀土荒饉開倉振貸長文居貧貸多後無以償州郡切責送長文到州刺史徐幹捨之不謝而去後成都王頴引為江源令梁王彤為丞相以為從事中郎卒劉兆字延世濟南東平人愽學洽聞武帝時五辟公府五徴博士皆不就安貧樂道潜心著述不出門庭數十年後以夀終杜夷博覽百家筭厯圖緯靡不畢究寓居汝潁之間十載足不出門年四十餘始還鄉里閉門教授生徒千人惠帝時三察孝亷州命别駕永嘉初公車徴拜愽士太傅東海王越辟並不就范喬字伯孫父粲字武威粲陽狂不言喬與二弟並棄學業絶人事侍疾家庭至粲没足不出邑里司𨽻校尉劉毅嘗抗論於朝庭曰使范武威疾若不篤是為伯夷叔齊復存於今如其信篤益是聖主所宜哀矜其子乆侍父疾名徳著茂不加叙用深為朝庭惜遺賢之譏也元康中詔求亷讓冲退履道寒素者不計資以參選叙尚書郎王琨乃薦喬曰喬禀徳真粹立操高潔儒學精深含章内奥安貧樂道栖志窮巷簞瓢詠業長而彌堅誠當今之寒素著厲俗之清彦時張華領司徒天下所舉凡十七人於喬特發優論又吏部郎郝隆亦思求海内幽遁之士喬供飬衡門至於白首於是除樂安令辭疾不拜喬凡一舉孝亷八薦公府再舉清白異行又舉寒素一無所就伍朝字世明武陵漢夀人少有雅操閑居樂道不修世事性好學以博士徴不就刺史劉𢎞薦朝為零陵太守主者以非選例不聽尚書郎胡濟奏曰臣以為當今資喪亂之餘運承百王之遺弊進趨者秉國政以僥倖守道者懐藴匱以終身故令敦褒之化虧退讓之風薄案朝能游心物外不屑時務守静衡門志道日新年過耳順而所尚無虧誠江南之竒才丘園之逸老也不加飾進何以勸善且白衣為郡前漢有舊宜聽光顯以奬風尚奏可而朝不就終於家虞喜少立操行博學好古諸葛恢臨郡屈為功曹察孝亷州舉秀才司徒辟皆不就元帝初鎮江左上疏薦喜懐帝即位公車徴拜博士不就喜邑人賀循為司空先達貴顯每詣喜信宿忘歸自云不能測也太寧中與臨海任旭俱以愽士徴不就復下詔曰夫興化致政莫尚乎崇道教明退素也喪亂以來儒雅陵夷每覽子衿之詩未嘗不慨然増歎臨海任旭㑹稽虞喜並㓗静其操嵗寒不移研精墳典居今行古志操足以勵俗博學足以明道前雖不至其更以博士徴之喜辭疾不赴咸和末詔公卿舉賢良方正直言之士太常華恒舉喜為賢良㑹國有軍事不行咸康中内史何充上疏曰臣聞二八舉而四門穆十亂用而天下安徽猷克闡有自來矣方今聖徳欽明思恢遐烈旌輿整駕俟賢而動伏見前賢良虞喜天挺貞素高尚邈世束脩立徳皓首不倦加以傍綜廣深博聞强識鑚堅研微有弗及之勤處静味道無風塵之志高枕柴門怡然自足宜使蒲輪紆衡以旌殊操一則翼賛大化二則敦勵薄俗疏奏詔曰潯陽翟湯㑹稽虞喜並守道清貞不營世務躭學高尚操擬古人往雖徴命而不降屈豈素絲難染而搜引禮簡乎政道須賢宜納諸廊廟其並以散騎常待徵之又不起年七十六卒任旭字次龍元帝初鎮江東聞其名召為參軍手書與旭欲使必到旭固辭以疾帝進位鎮東大將軍復召之及為左丞相辟為祭酒並不就卒於家册府元龜卷七百七十八
