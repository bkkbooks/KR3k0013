body:
  text: 册府元龜卷九百三十九宋王欽若等撰總録部譏誚詩云善戲謔兮不為虐兮言君子之德有張有弛不甞矜莊而時戲謔也故仲尼有戲耳之言左氏明耻之之義士大夫出處市朝之内周旋醜夷之間以游以戲載笑載言或臨事以興譏或因人而暴謔不為患虐亦為善矣孟明秦大夫魯僖三十三年晉敗秦師于殽獲孟明旣釋之使陽處父以左驂贈之孟明曰三年將拜君賜意欲報伐晉文二年孟明帥師伐晉以報殽之役戰于彭衙秦師敗績晉人謂秦拜賜之師以孟明言拜賜故􅅓之華元宋大夫鄭伐宋獲華元華元逃歸宋城華元為植廵功植將主也城者謳曰睅其目皤其腹棄甲而復睅出目皤大腹棄甲謂亡師于思于思棄甲復來于思多須之貌使其驂乘謂之曰牛則有皮犀兕尚多棄甲則那那猶何也役人曰從其有皮丹漆若何魯宣公十二年邲之戰晉人或以廣隊不能進廣兵車楚人惎之脫扄惎教也扄車上兵闌少進馬還又惎之拔斾投衡乃出還便旋不進斾大旗也㧞斾投衡上使不帆風差輕曰吾不如大國之數奔也臧紇魯大夫襄四年冬十月邾人莒人伐鄫臧紇救鄫侵邾敗於狐駘臧紇武仲也鄫属魯故救之狐駘邾地魯國蕃縣東南有目台亭國人逆䘮者皆髽魯於是乎始髽髽麻髪合結也遭䘮者多故不能備㓙服髽而已國人誦之曰臧之狐裘敗我於狐駘臧紇時服狐裘我君小子朱儒是使朱儒朱儒使我敗於邾襄公㓜弱故曰小子臧紇短小故曰朱儒敗不書魯人諱之子罕宋大夫鄭尉氏司氏之亂餘盗在宋鄭人納賂於宋以馬與師茷師慧子罕以賊與之鄭人醢之師慧過宋朝將私焉私小便其相曰朝也相師也慧曰無人焉相曰朝也何故無人慧曰必無人焉若猶有人豈以其千乘之相易淫樂之矇必無人焉故也千乘相謂子産等也言不為子産殺三盗得賂而歸之是重淫樂而輕相國子罕聞之固請而歸之言子罕能改過孫蒯衛大夫田于曹隧越竟而獵孫蒯林父之子飲馬于重丘重丘曹邑毁其瓶重丘人閉門而詬之詬罵也曰親逐而君爾父為厲厲惡鬼林父逐君在十四年是之不憂而何以田為叔孫穆叔魯大夫叔孫豹也昭公元年諸侯盟于虢楚公子圍設服離衛設君服二人執戈陳於前以自衛離陳也叔孫穆子曰楚公子美矣君哉美服似君鄭子皮曰二執戈者前矣禮國君行有二執戈者在前蔡子家曰蒲宫有前不亦可乎公子圍在㑹特緝蒲為王殿屋屏蔽以自殊異言旣造王宫而居之雖服君服無所怪也楚伯州犁曰此行也辭而假之寡君聞諸大夫譏之故言假以餙令尹過鄭行人揮曰假不反矣言將遂為君伯州犁曰子姑憂子晳之欲背誕也襄三十年鄭子晳殺伯有背命放誕將為國難言子且自憂此無為憂令尹不反戈子羽曰當璧猶在假而不反子其無憂乎子羽行人公孫揮當璧謂棄疾事在昭十三年言棄疾有當璧之命圍雖取國猶將有難不無憂也齊國子曰吾代二子愍矣國子國弱也二子謂王子圍及伯州犁圍此冬便簒位不能自終州犁亦尋為圍所殺故言可愍也陳公子招曰不憂何成二子樂矣言以憂生事事成而樂衛齊子曰茍或知之雖憂何害齊子齊惡言先知為備雖有憂難無所損害宋合左師曰大國令小國共吾知共而已共承大國令不能知其禍福晉樂王鮒曰小旻之卒章善矣吾從之小旻詩小雅其卒章義取非唯暴虎馮河之可畏也不敬小人亦危殆王鮒從斯義故不敢譏誚公子圍退㑹子羽謂子皮曰叔孫絞而婉絞切也譏其似君反謂之美故曰婉宋左師簡而禮無所臧否故曰簡共事大國故曰禮樂王鲋字而敬字愛也不犯㓙人所以自愛敬子與子家持之子子皮子家蔡公孫歸生持之言無所取與皆保世之主也齊衛陳大夫其不免乎國子代人憂子招樂憂齊子雖憂弗害夫弗及而憂與可憂而樂與憂而弗害皆取憂之道也憂必及之太誓曰民之所欲天必從之逸書三大夫兆憂憂能無至乎聞憂兆也言以知物其是之謂矣物類也察言多知禍福之數八年陳招殺太子國弱齊惡當身各無患董叔晉大夫將娶於范氏叔向曰范氏富盍已乎曰欲為繫援焉他日董祁愬之於范獻子曰不吾敬也獻子執而紡於庭之槐叔向過之曰子盍為我請乎叔向曰求繫旣繫矣求援旣援矣欲而得之又何請焉叔孫武叔魯大夫也武叔之母死武叔公子牙之六世孫名州仇毁孔子者既小斂舉者出尸出戸袒且投其冠括髪尸出户乃變服失哀節冠素委貌子游曰知禮􅅓之也公叔文子衛大夫也升於瑕丘蘧伯玉從文子獻公之孫名枝文子曰樂哉斯丘也死則我欲葬焉蘧伯玉曰吾子樂之則瑗請前刺其欲害人良田瑗伯玉名成人有其兄死而不為衰者聞子臯將為成宰遂為衰成人曰蠶則績而蟹有筐范則冠而蟬有緌兄則死而子臯為之衰􅅓兄死者言其衰之不為兄死如蟹有筐蟬有緌不為蠶之績范之冠范蜂也蟬蜩也緌謂蜩喙長在腹下齊人見田駢曰聞先生髙誼設為不宦而願為役田駢曰子何聞之對曰臣聞之鄰人之女田駢曰何謂也對曰臣鄰人之女設為不嫁行年三十而有七子不嫁則不嫁然嫁過畢矣今先生設為不宦訾養千鍾徒百人不宦則然矣而富過畢矣田子辭漢蕭望之字長倩大將軍霍光秉政長史丙吉薦儒生王仲翁與望之等數人皆召見當見者露索去刀兵兩吏挾持望之獨不聽光獨不除用望之仲翁三歲間至光禄大夫給事中望之復署小苑東門侯仲翁顧謂望之曰不肯録録反抱闗為望之曰各從其志五鹿充宗為少府貴幸為梁丘易與朱雲論難雲連拄五鹿君拄刺也音知庾切故諸儒為之語曰五鹿嶽嶽朱雲折其角後漢王良東海人建武三年徵諫議大夫遷沛郡太守至蘄縣稱病不之府上疾篤乞骸骨徵拜大中大夫遷司徒司直以病歸一歲復徵至滎陽疾篤不任進退乃過其友人友人不肯見曰不有忠言竒謀而取大位何其往來屑屑不憚煩也遂拒之良慙自後連徵輙稱病詔以𤣥纁聘之遂不應劉寛為太尉簡畧嗜酒不好盥浴京師以為諺樂恢薦杜安為宛令以病去章帝行過潁川安上書召拜御史遷至巴郡太守而恢在家安與恢書通問恢告吏口對且讓之曰為宛令不合志病去可也干人主闚踰非也違平生操故不報樊英南陽人隱於壺山之陽順帝永建二年徵之英不得已到京師待以師傅之禮拜五官中郎將數月英稱疾篤詔以為光禄大夫英辭位不受有詔譬㫖勿聽英初被詔命僉以為必不降志及後應對又無竒謀深䇿談者以為失望初河南張楷與英俱徵既而謂英曰天下有二道出與處也吾前以子之出能輔是君也濟斯人也而子始以不訾之身怒萬乘之主及其享受爵祿又不聞扶救之術進退無所據矣周福甘陵人桓帝為蠡吾侯受學於福及即位擢為尚書時同郡河南尹房植有名當朝鄉人為之謡曰天下規矩房伯武因師獲印周仲進二家賔客互相譏揣遂各樹朋徒漸成仇隙葛龔梁國人善為文奏或有請龔奏以干人者龔為作之其人寫之忘自載其名因并寫龔名以進之故時人為之語曰作奏雖工宜去葛龔後為蕩陰臨汾令魏賈逵河東襄陵人少孤家貧冬常無袴過其妻兄栁孚宿至明無何着孚袴去故時人謂之通達逵後為豫州刺史封陽里亭侯蘇則為侍中舊儀侍中親省起居故俗謂之執虎子始則同郡吉茂者仕厯縣令遷為冗散茂見則嘲之曰仕進不止執虎子則笑曰我誠不能效汝蹇蹇驅鹿車馳也李豐為尚書僕射弟翼及偉仕數歲間並歴郡守豐常於人中顯誡二弟言當用榮位及司馬宣王久病偉為二千石荒於酒亂新平扶風二郡而豐不召衆人以為恃寵曹爽專政豐依違二公皆無有適莫故于時有謗書曰曹爽之勢熱如湯太傅父子冷如漿李豐兄弟如游光其意以為豐雖外清淨而内圖事有佀於游光也王忠扶風人少為亭長三輔亂忠饑乏噉人隨輦南向武闗值婁子伯為荆州遣迎北方客人忠不欲去因率等伍逆擊之奪其兵聚衆千餘以歸太祖拜忠中郎將從征討五官將知忠嘗噉人因從駕出令行排取冡間髑髏繫着忠馬鞍以為歡笑常林文帝初為少府林性既自負當官又嚴少府寺與鴻臚對門時崔林為鴻臚崔性濶達不與林同數數聞林撾吏聲不以為可林夜撾吏不勝痛呌呼敖敖徹曙明日崔出門與林車相遇乃調林曰聞卿為廷尉爾邪林不覺答曰不也崔曰卿不為廷尉昨夜何故考囚乎林大慙黙不能答丁謐為度支郎中曹爽宿與相親時爽為武衛將軍數為明帝說其可大用㑹齊王即位爽輔政乃拔謐為散騎常侍遂轉尚書謐為人外似疎畧而内多忌其在臺閣數有所彈駁臺中患之事不得行又其意輕貴多所忽畧雖與何晏鄧颺等同位而皆少之唯以勢屈於爽爽亦敬之言無不從故于時謗書謂臺中有三狗二狗崖柴不可當一狗慿黙作疽􅇸三狗謂何鄧丁也黙者爽小字也其意言三狗皆欲嚙人而謐尤甚也劉放為中書監孫資為中書令並兼侍中光禄大夫放資乆典機宻夏侯獻曹肇心内不平殿中有鷄棲樹二人相謂曰此亦久矣其能復幾指謂放資也蜀黄承彦者髙爽開朗為沔南名士謂諸葛孔明曰聞君擇婦身有醜女黄頭黑色而才堪相配孔明許即載送之時人以為笑樂鄉里為之諺曰莫作孔明擇婦正得阿承醜女承彦史不載官吳麋芳初為魏南郡太守既降吳虞翻嘗乘船行與麋芳相逢芳船上人多欲令翻自避先驅曰避將軍船翻厲聲曰失忠與信何以事君傾人二城而云將軍可乎芳闔戸不應而遽避之後翻乘車行又經芳營閉門不得過翻復怒曰當閉反開當開反閉豈得事宜邪芳聞之有慙色晉王濟為散騎常侍國子祭酒武帝嘗與濟棊時孫皓在側謂皓曰何以好剝人面皮皓曰見無禮於君者則剝之濟時伸脚局下而皓譏焉謝鯤初辟東海王掾任達不拘尋坐除名隣家高氏女有美色鯤嘗挑之女投梭折其兩齒時人為之語曰任達不已㓜輿折齒鯤字㓜輿鯤聞之傲然長嘯曰猶不廢我嘯歌祖納字士言范陽人有操行性至孝平北將軍王敦聞之遺其二婢而辟為從事中郎有戲之曰奴價倍婢納曰百里奚何必輕於五羊皮邪納嘗問梅陶曰君鄉里立月旦評何如陶曰善褒惡貶則嘉法也納曰未益時王隱在坐因曰尚書稱三載考績三考黜陟幽明何得一月便行褒貶陶曰此官法也月旦私法也隠曰易稱積善之家必有餘慶積不善之家必有餘殃稱家者豈不是官必須積久善惡乃著公私何異古人有言貞良而亡先人之殃酷烈而存先人之勲累世乃著豈但一月若必月旦則顔回食埃不免貪汚盗蹠引少則為清廉朝種暮穫善惡未定矣時梅陶及鍾雅數說餘事納輒困之因曰君汝潁之士利如錐我幽冀之士鈍如槌持我鈍槌捶君利錐皆當摧矣陶雅並稱有神錐不可得捶納曰假有神錐必有神槌雅無以對劉輿為范陽王虓魏郡太守虓薨東海王越將召之或曰輿猶膩也近則汚人及至越疑而却之傅廸為右丞時劉柳為尚書左僕射廸好廣讀書而不解其義柳云卿雖讀書多而無所解可謂書簏矣時人重其言石崇為衛尉嘗與王敦入太學見顔回原憲之像顧而歎曰若與之同升孔堂古今何必有間敦曰不知餘人云何子貢去卿差近崇正色曰士當身名俱泰何至甕牖哉其立意類此王粹以貴公子尚主舘宇甚盛圖莊周於室廣集朝士使郎中嵇含為之讚含援筆為弔文文不加㸃其序曰帝壻王宏逺華池豐屋廣延賢彦圖莊生垂綸之像記先達辭聘之事畫真人於刻桷之室載退士於趣進之堂可謂託非其所可弔不可讚也其辭曰邁矣莊周天縱特放大塊受其生自然資其量噐虚神清窮𤣥極曠人偽俗季真風既散野無訟屈之聲朝有爭寵之歎上下相陵長㓜失貫於是借𤣥虚以助溺引道德以自奬户詠恬曠之辭家畫老莊之像今王生沉淪名利身尚帝女連耀三光有出無處池非巖石之溜宅非茅茨之宇馳屈産於皇衢畫茲像其焉取嗟乎先生高跡何局生處巖岫之居死寄彫楹之屋託非其所没有餘辱悼大道之湮晦遂含悲而吐曲粹有愧色袁山松陳郡人少有才名時張湛好於齋前種松柏袁山松每出游好令左右作挽歌人謂湛屋下陳尸山松道上行殯山松歴顯位為吳郡太守王導為丞相妻曹氏性妬導甚憚之乃宻造别舘以處衆妾曹氏知將往焉導恐妾被辱遽令命駕猶恐遅之以所執麈尾柄驅牛而進司徒蔡謨聞之戲導曰朝廷欲加公九錫導弗之覺但謙退而已謨曰不聞餘物惟有短轅犢車長柄麈尾導大怒謂人曰吾往與羣賢共遊雒中何曾聞有蔡充兒也庾亮鎮江州時王導為太傅丞相亮雖居外鎮而執朝廷之權既據上流擁彊兵趣向者多歸之導内不能平嘗遇西風塵起舉扇自蔽徐曰元規塵汚人羊􅅨字彭祖太傅祜兄孫也少不經學時論皆鄙其凢庸先是兖州有八伯之號其後更有四伯大鴻臚陳留江泉以能食為榖伯豫章太守史疇以大肥為笨伯散騎郎高平張嶷以狡妄為猾伯而􅅨以狼戾為𤨏伯盖擬古之四㓙後為廬陵守坐罪除名郄超為桓温大司馬參軍深自結納時王珣為主簿亦為温所重府中語曰髯參軍短主簿能令公喜能令公怒超髯珣短故也陶侃為荆州牧既平蘇峻王導入石頭城令取故節侃笑曰蘇武節似不如是導有慙色使人屏之蔡謨為左光祿大夫開府儀同三司謨初渡江見彭蜞大喜曰蟹有八足加以二螯令烹之既食吐下委頓方知非蟹後詣謝尚而說之尚曰卿讀爾雅不熟㡬為勸學死何充為揚州刺史侍中録尚書事充性好釋典阮裕嘗戲之曰卿志大宇宙勇邁終古充問其故裕曰我圖數千户郡尚未能得卿圖作佛不亦大乎郄愔為司空及弟曇奉天師道而何充與弟凖崇信釋氏謝萬譏之云郄謟於道何佞於佛劉惔為丹陽尹許珣嘗就惔宿牀帷新麗飲食豐甘詢曰若此保全殊勝東山惔曰卿若知吉㓙繇人吾安得不保此王羲之在坐曰令巢許遇稷契當無此言二人並有愧色謝安少有重名初辟司徒府除佐著作郎並以疾辭寓居㑹稽除尚書吏部郎並不至後征西大將軍桓温請為司馬將發新亭朝士咸送中丞高崧戲之曰卿屢違朝㫖高卧東山諸人每相與言安石不肯出將如蒼生何蒼生今亦將如卿何安甚有愧色王愉子綏字彦猷愉為殷桓所捕綏未測存亡在都有憂色居處飲食每事貶降時人每謂試守孝子後為荆州刺史誅戴逵譙國人謝敷㑹稽人隱於太平山初月犯少㣲少㣲一名處士星占者以隱士當之逵有美才人或憂之俄而敷死故㑹稽人士以嘲吳人云吳中高士便是求死不得死宋何尚之為尚書令太子詹事致仕於方山孝武徴之乃起拜開府天子臨軒百僚陪位沈慶之累辭爵命朝廷敦勸甚篤尚之謂曰主上虚懐側席詎宜固辭慶之曰沈公不效何公去而復還也尚之有愧色張暢初為南譙王義宣安北長史及義宣反戰敗暢為軍人所掠執送都下付廷尉見原起為都官尚書轉侍中孝武宴朝賢暢亦在坐何偃因醉曰張暢竒才也與義宣作賊而卒無咎茍非竒才安能致此暢曰太初之時誰黄其閤帝曰何事相苦初何尚之為元㐫司空及義師至新林門人皆逃尚之父子共洗黄閤故暢以此譏之王逺為光禄勲人為之語曰王逺如屛風屈曲從俗能蔽風露庾登之為謝晦荆州長史晦拒王師欲登之留守登之不許晦敗登之以無任免官禁錮還家何承天戲之曰因禍為福未必皆知登之曰我亦㡬與三􅆆同戮承天為晦作表云便當浮舟東下戮此三􅆆故登之為嘲謝莊為左將軍莊有口辯孝武嘗問顔延年曰謝希逸月賦何如答曰美則美矣但莊始知隔千里兮共明月帝召莊以延年答語語之莊應聲曰延年作秋胡詩始知生為久離别没為長不歸帝撫掌大笑竟日後莊代顔竣為吏部尚書竣留心選舉自强不息任遇既隆奏無不可而容貌嚴毅莊風姿甚美賔客喧訴嘗懽笑答之意多不行時人為之語曰顔竣嗔而與人官謝莊笑而不與人官位終中書令散騎常侍金紫光禄大夫何昌㝢為吏部尚書嘗有一客姓閔求官昌㝢謂曰君是誰後答曰子騫後昌㝢團扇掩口而笑謂坐客曰遥遥華胄顔延之為太常與何尚之少相好狎二人並短小尚之嘗謂延之為猨延之目尚之為猴同遊太子西池延之問路人云吾二人誰似猴路人指尚之為似延之喜笑路人曰彼似猴耳君乃真猴南齊丘靈鞠為正員常侍靈鞠好飲酒臧否人物在沈淵座見王儉詩淵曰王令文章大進靈鞠曰何如我未進時此言達儉靈鞠宋世文名甚盛入齊頗减蓬髪弛縱無形儀不治家業王儉謂人曰丘公仕宦不進才亦退矣沈文季吳興人為尚書右僕射明帝即位加領太子詹事尚書令王晏嘗戲文季為吳興僕射文季答曰瑯琊執法似不出卿門禇淵仕宋為尚書令侍中受宋明帝顧命為中書監開府儀同三司司空太祖即位又為尚書令輕薄子頻以名節譏之淵眼多白精謂之白虹貫日言為宋亡徴也禇炤字彦宣少秉高節一目眇官至國子博士不拜嘗非從兄淵身事二代聞淵拜司徒歎曰使淵作中書郎而死即當是一名士德之不昌遂有期頥之壽張敬兒為散騎常侍車騎將軍加開府儀同三司既拜王敬則戲之呼為禇淵敬兒曰我馬上所得終不能作華林閣勲也敬則甚恨陸澄為光禄大夫散騎常侍當世稱為碩學讀易三年不解文義欲撰宋書竟不成王儉戲之曰陸公書厨也梁何敬容為尚書令參掌機宻自晉宋以來宰相皆文義自逸敬容獨勤庶務為當世所􅅓鄙時蕭琛子廵頗有輕薄才因制卦名離合等詩以嘲之敬容處之如初亦不屑也敬容捨宅東為伽藍趨勢者因􅂇財造搆敬容並不拒故此寺堂宇校餙頗為宏麗時輕薄者因呼為衆造寺焉何㸃宋司空尚之孫也父鑠素有風疾無故害妻坐法死㸃感家禍欲絶婚宦尚之彊為之娶王氏涕泣求執本志得罷既老又娶魯國孔嗣女雖婚亦不與妻相見築别室以處之人莫諭其意吳國張融少時免官而為詩有高尚之言㸃答詩曰昔聞東都日不在簡書前雖為戲也而融深病之及㸃後婚融始為詩贈㸃曰惜哉何居士薄暮遘荒婬㸃亦病之而無以釋也孫廉東莞莒人便僻巧宦為吳興太守時廣陵高爽有險薄才客於廉廉委以文記爽嘗有求不稱意乃為屐謎以喻廉曰刺鼻不知􅅉蹋面不知瞋齧齒作歩數持此得勝人譏其不計耻辱以此取名位也爽博學多才劉蒨為晉陵縣爽途經詣之了不相接爽甚衘之俄而爽代蒨為縣蒨遣迎贈甚厚爽受餉答書云高晉陵自答人問其所以答云劉蒨餉晉陵令爾何關爽事又有人送書與爽告躓云比日守羊困苦爽答曰守羊無食何不貨羊糴米孫抱為延陵縣爽又詣之抱了無故人之懐爽出從縣閣下過取筆書皷云徒有八尺圍腹無一寸腸面皮如許厚受打未渠央抱東莞人形體肥壯腰帶十圍爽故以此激之鮑泉為通直侍郎嘗乘高幰車從數十左右繖蓋服玩甚精道逢國子祭酒王承承疑非舊貴遣訪之泉從者答曰鮑通直承怪焉復欲辱之遣逼車問鮑通直復是何許人而得如此都下少年遂以為笑謔蕭推字智進歴淮南晉陵吳郡太守所臨必赤地大旱吳人呼為旱母焉到溉為吏部尚書時何敬容以令參選事有不允溉輙相執敬容謂人曰到溉尚有餘臭遂學作貴人敬容方貴寵人皆下之溉忤之如初溉父彦之初以擔糞自給故世為譏焉後魏孝明靈太后嘗幸左藏王公嬪主從者百餘人皆令任力負布絹即以賜之多者過二百疋唯長樂公主手持絹二十疋而出示不異衆而無勞也世稱其廉儀同陳留公李崇章武王融並以所負多顛仆於地崇傷腰融損脚時人語曰陳留章武傷腰折股貪人敗類穢我明主廣陵侯衍弟欽曾託青州人高僧壽為子求師至未幾逃去欽以讓僧壽僧壽性滑稽反謂欽曰凡人絶粒七日乃死始經五朝便爾逃遁去食就信實有所闕欽乃大慙於是待客稍厚公孫軌為虎牢鎮將初太武將北征發民驢以運糧使軌部調雍州軌令驢主皆加絹一疋乃與受之百姓為之語曰驢無强弱輔脊自壯衆共􅅓之坐徴還郭祚宣武時為太子少師祚曾從宣武幸東宫孝明㓜弱祚懐一黄㼐出奉孝明時應詔左右趙桃弓與御史中尉王顯迭相唇齒深為宣武所信祚私事之時人謗祚者號為桃弓僕射黄㼐少師邢昕為通直常侍中軍將軍既有才藻兼長几案自孝昌之後天下多務世人竟以吏行取達文學大衰司州中從事宋遊道以公斷見知時與昕嘲謔昕謂之曰世事同知文學外逰道有慙色興和中以本官副李象使於梁昕好忤物人謂之牛是行也談者謂之牛象鬬於江南北齊楊愔為吏部尚書典選取士多以言貌時致謗言以為愔之用人似貧士市𤓰取大者愔聞不以屑意愔自居大位前後賞賜散之九族架篋之中唯有書數千卷太保平原王陵之與愔隣宅愔嘗見其門外有富胡數人謂左右曰我門前幸無此物陽休之魏武定二年除中書侍郎時有人士戲嘲休之云有觸藩之羝羊乘連錢之騘馬從晉陽而向鄴懐屬書而盈把尚書左丞盧斐以其文書請謁啓高祖禁止㑹赦不治祖珽初為文宣開府倉曹參軍所乘老馬嘗稱騮駒又與寡婦王氏姦通每人前相聞往復裴讓之與珽卑狎於衆中嘲珽曰卿那得如此詭異老馬年十歲猶號騮駒一妻耳順尚稱娘子于時諠然稱之趙彦深為中書令廢帝既殺楊愔乃以彦深代摠機務鴻臚少卿陽休之私謂人曰將渉千里殺騏驥而䇿蹇驢可悲之甚隋柳調為侍御史左僕射楊素嘗於朝堂見調因獨言曰柳條通體弱獨揺不須風調斂板正色曰調信無取者公不當以為侍御信有可取不應發此言公當具瞻之地樞機何可輕發素甚竒之周羅㬋初為陳將陳平行軍總管賀若弼謂羅㬋曰聞公在郢漢提兵即知揚州可得王師利渉果如所量羅㬋答云若得與公周旋勝負未可知也後為儀同三司先是陳裨將羊翔歸降使為鄉導位至上開府班在羅㬋上韓擒虎於朝堂戲之曰不知機變立在羊翔之下能無愧乎羅㬋答曰昔在江南乆承令聞謂公天下節士今日所言殊匪誠臣之論擒虎有愧色柳機初仕後周為司宗中大夫遷御正上大夫開皇中為冀州刺史後徵入朝初機在周與族人文城公昂俱歴顯要及此機昂並為外職楊素時為納言方用事因帝賜宴素戲機曰二柳俱摧孤楊獨聳坐者皆笑機竟無言李文博初在内省校書虞世基子亦在其内盛餙容服而未有所知文博因從容問其年紀答云十八文博乃謂之曰昔賈誼當此之年議論何事君今從事儀容欲何為者唐姜恪為左相咸亨元年閏九月為凉州道行軍大總管以禦吐蕃時右相閻立本以善畫見稱與恪皆無輔弼之譽時人為之語曰左相則宣威沙漠右相則馳譽丹青三舘學生放散五臺令史明經至今相傳以為口實來常及弟濟相次為侍中其父䕶兒初在隋為猛將而常濟俱以學行見稱時虞世南子昶既無才術歴將作少匠工部侍郎累居工作之司濟初升相位許敬宗歎曰士之登用不繫世業得道則為衣冠失緒則為匹庶來䕶兒兒作宰相虞世南男作木匠忠賢文武固無種也裴光庭為吏部尚書時有門下主事閻麟之為光庭腹心專知吏部選官每麟之裁定光庭隨而下筆時人語曰麟之口光庭手也崔日知為太常卿自以歴仕年乆每朝士參集常與尚書同列時人號為尚書裏行遂為口實楊再思為内史為人邪佞時左補闕戴令言作兩脚野狐賦以譏刺之再思聞之甚怒出令言為長杜令朝士尤加嗤笑周寶為潤州節度使軍變奔毗陵淮南節度使高駢聞之大喜遂遣使致書於寶曰伏承走馬已及奔牛堰名在常州今附虀一瓶葛粉十斤以充道路所要蓋諷其為虀粉也梁成汭為荆南節度使初澧朗二州本屬荆南乾寧中為土豪雷滿所據汭奏請割𨽻宰相徐彦若執而不行汭由是銜之及彦若出鎮南海路過江陵汭雖加延接而猶怏怏嘗因對酒語及其事彦若曰今公位尊方面自比桓文雷滿者偏州一草賊爾今公何不加兵而反怨朝廷乎汭赧然而屈因思嶺外有黄茅瘴患者皆落髪乃謂彦若曰黄茅瘴望相公保重彦若應聲答曰南海黄茅瘴不死成和尚蓋譏汭曾為僧也汭終席慙耻後唐馮道為相工部侍郎任贊因班退與同列戲道於後曰若急行必撲下兎策道尋知之召贊謂曰兎䇿皆名儒所集道能諷之中朝士子止看文埸秀句便為舉業皆竊取公卿何淺狹之甚邪贊大愧焉封舜卿仕梁為禮部侍郎知貢舉開平三年奉使幽州以門生鄭致雍從行復命之日又與致雍同受命入翰林為學士致雍有俊才舜卿雖有文辭才思拙澁及試五題不勝困弊因託致雍秉筆當時譏者以為座主辱門生蕭希甫為駕部郎中莊宗初平汴雒希甫奉詔宣慰青齊方知其母死妻袁氏亦已改嫁乃持服於魏州時議者戲引李陵書譏之云老母終堂生妻去室安重霸善事人好賂遺君側人目之為傀渉瓦切胡崔貽孫為吏部侍郎黜於塞北遇赦還京時崔沂方為左丞沂之年小貽孫數歲貽孫切於其闕每言於僚友曰崔丞已薄桑榆何無止足王緘幽州劉仁恭故吏也莊宗承制授魏博節度副使緘博學善屬文燕薊多文士緘後生未知名及在太原名位驟達燕人馬郁有盛名於鄉里而緘素以吏職事郁及郁在太原謂緘曰公在此作文士所謂避風之鳥受賜於魯人也每於公宴但呼王緘而已王思同幽州人初仕武皇為飛勝指揮使從莊宗累典諸軍思同性踈俊粗有文性喜為詩什與人唱和稱薊門戰客魏王繼岌待之若子時内養呂知柔侍興聖宫頗用事思同不平之呂為終南山詩末句有頭字思同曰料伊直擬衝霄漢頼有青天壓着頭盧文紀入相時有蜀人史在德為著作郎出入權要之門評品朝士多有譏彈乃上章云文武兩班宜選能進用見在軍都將校朝廷士大夫並請閱試澄汰能者進用否者黜退不限名位高下疏下中書文紀以為非已怒甚召諫議盧損為覆狀辭㫖蕪蔓無以抑其狂率為衆所􅅓馬𦙍孫初仕後唐為相𦙍孫純儒事多凝滯遽被疇庸未悉朝廷舊事初馮道罷左相馮入朝拜司空唐朝故事三公為加官無單拜者是時朝議率爾命道制出或曰三公正宰相便合參大政又云合受册衆言藉藉盧文紀又欲祭祀時便令掃除馮道聞之曰司空掃除吾職也吾無所憚既而知非乃止劉昫為僕射性剛羣情嫉之乃共贊右常侍孔昭序論行香次第言常侍侍從之臣行立可在僕射前疏奏下御史臺定例同光已來李琪盧質繼為僕射質性輕脫不能守師長之體故昭序輕言𦙍孫以羣情不悦劉昫馮道欲微抑之乃責臺司須簡則例而臺言舊不見例據南北班位常侍在前屬國忌將就列未定𦙍孫即判臺狀曰即有援據定可遵行各示本官劉昫怒揮袂而退自後日責臺司定例崔居儉謂南宫同列曰孔昭序解語是朝廷人總不解語也僕射師長中丞大夫就班修敬常侍班南宫六卿之下况僕射乎已前騎省年深望南宫工部侍郎如霄漢癡人舉止何取笑之深邪旬日聞居儉言紛議稍息文士哂𦙍孫堂判有援據二字其中書百職𦙍孫素未詳悉無能專使署名而已其故人干進者不如意故啁之曰馬公為輔三不開為門口印也後為太子賔客卒後旬日侍婢零語如𦙍孫聲氣處分家事仍曰借某書負某物當速還明宗朝崔協物故亦有婢忽作協語時知制誥于嶠與閣下諸舎人嘲曰生前爕治曾不聞於上言死後魂靈但空聞其下語𦙍孫侍婢傳言時人復念之蓋其事甚類矣盧損為太子少保致仕損梁開平初與任贊劉昌素薛均高摠同年擢第所在相詬時人謂之相罵牓册府元龜卷九百三十九
