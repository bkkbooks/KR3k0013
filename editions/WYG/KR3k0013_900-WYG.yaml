body:
  text: 册府元龜卷九百宋王欽若等撰􅄣錄部自薦干謁自薦士之自負其能將以效用於世而知己未過良時難偶居常用晦雖屈於等夷一朝乘便思有以樹立繇是挺然自述以露其才冀施於有政而見於行事者也至有臨危制變而奮厥庸佐命戡難而申其術居上治民而成務切問近對以盡規曷嘗不􅅚躬以踐形循名而副實者已頃復自衒自媒昔人之所醜若乃􅘆􅕟之士不覊之子以勲名為任而貧賤是耻者豈復拘於常簡而安可不試哉毛遂趙平原君之門下客也平原君以秦之圍邯鄲趙使求救合從於楚約與食客門下有勇力文武備具者二十人偕平原君曰使文能取勝則善矣文不能取勝則㰱血於華屋之下必得定從而還士不外索取於食客門下足矣得十九人全無可取者無以滿二十人毛遂者前自贊於平原君曰遂聞君將合從於楚約與食客門下二十人偕不外索今少一人願君即以遂備員而行矣平原君曰先生處勝之門下幾年於此矣毛遂曰三年於此矣平原君曰夫賢士之處世也譬若錐之處囊中其末立見今先生處勝之門下三年於此矣左右未有所稱誦勝未有所聞是先生無所能也毛遂曰臣乃今日請處囊中爾使遂早得處囊中乃頴脱而出非特其末見而已平原君竟與毛遂偕漢酈食其陳留高陽人也食音異其音基好讀書家貧落魄無衣食業魄音薄落魄失業無次也皆謂之狂生及陳勝項梁等遣諸將狥地過高陽者數十人狥亦略也音辭峻反食其聞其將皆握齱好荷禮握齱急促之貌荷與苛同苛細也齱音初角切自用不能聽大度之言食其乃自匿後聞沛公畧地陳留郊沛公麾下騎士適食其里中子食其里中子適㑹取沛公騎士沛公時時聞邑中賢豪騎士歸食其見謂曰吾聞沛公嫚易人有大畧此眞吾所願從游莫為我先先謂紹介也若見沛公若汝也謂曰臣里中有酈生年六十餘長八尺人皆謂之狂生自謂我非狂騎士曰沛公不喜儒喜好也音許吏切諸客冠儒冠來者沛公輙解其冠溺其中溺讀曰尿音乃釣切與人言常大罵未可以儒生説也食其曰苐言之苐但也騎士從容言食其所戒者從音千容切沛公至高陽傳舍傳舍者人所止息前人已去後人復來轉相傳也一音張戀切謂傳置之舍也其義兩通使人召食其食其至入謁沛公方踞牀令兩女子洗冼足也音先典切而見食其食其入即長揖不拜曰足下欲助秦攻諸侯乎欲率諸侯破秦乎沛公罵曰竪儒言其賤劣如童竪夫天下同苦秦久矣故諸侯相率攻秦何謂助秦食其曰必欲聚徒合義兵誅無道秦不宜踞見長者於是沛公輟洗起衣輟止也起衣着衣服也延食其上坐謝之食其因言六國從衡時從音子容切衡横也沛公喜賜食其食號為廣野君常為説客馳使諸侯婁敬齊人也漢五年戍隴西過雒陽高帝在焉敬脱輓輅輅音東洛之洛一木横遮車前一人挽之三人推之又曰輅音胡格切見齊人虞將軍曰臣願見帝言便宜虞將軍欲與鮮衣敬曰臣衣帛衣帛見衣着也帛謂繒也衣褐衣褐見此褐謂織毛布之衣不敢易衣虞將軍入言帝帝召見言入關都秦地拜為郎中號曰奉春君吾丘壽王武帝時為中郎坐法免上書謝罪願養馬黄門帝不許請為黄門供養馬之事後願守塞扞冦難復不許久之上疏願擊匈奴詔問狀壽王對良善復召為郎卜式河南人武帝拜為郎式不願為之帝曰吾有羊在上林中欲令子牧之式既為郎布衣草蹻而牧羊蹻即今之鞋也南方謂之蹻字本作屩嵗餘羊肥息息生也言羊既肥而又生多也帝過其羊所善之式曰非獨羊也治民亦猶是矣以時起居惡者輙去去除去也毋令敗羣帝竒其言欲試使治民拜式緱氏令東方朔字曼倩倩音千見切平原厭次人厭音一涉切又音一琰切武帝初即位四方士多上書言得失自衒鬻者千數衒行賣也鬻亦賣也衒音州縣之縣其不足采者輙報聞罷報云天子聞其所上之書而罷之令歸朔初來上書曰臣朔少失父母長養兄嫂年十二學書三冬文史足用貧子冬日乃得學書言文史之事足可用也十五學擊劔十六學詩書擊劔遥擊而中之非斬刺之也誦二十二萬言十九學孫呉兵法戰陣之具鉦皷之敎征皷所以為進退士衆之節也鉦音征亦誦二十二萬言凡臣朔固已誦四十四萬言又常服子路之言無宿諾臣朔年二十二長九尺三寸目若懸珠齒若編貝編列次也音鞭勇若孟賁孟賁衛人古之勇士也尸子説云人謂孟賁生乎曰勇貴乎曰勇富乎曰勇三者人之所難而皆不足以易勇故能攝三軍服猛獸也㨗若慶忌王子慶忌也射之矢滿把不能中駟馬追之不能及也亷若鮑叔齊大夫也與管仲分財自取其少而説者乃妄解云鮑焦非也焦自介士耳信若尾生古之信士與女子期於梁下待之不至遇水而死一曰即微生髙也若此可以為天子大臣矣臣朔昧死再拜以聞朔文辭不遜高自稱譽帝偉之令待詔公車武帝既招英俊程其器能用之如不及程謂量計之也如不及者恐失之也時方外事胡越内興制度國家多事自公孫宏以下至司馬遷皆奉使方外或為郡國守相至公卿而朔嘗至大中大夫後常為郎與枚臯郭舍人俱在左右詼啁而已啁與嘲同音竹交切久之朔上書陳農戰强國之計因自訟獨不得大官欲求試用其言專商鞅韓非之語也指意放蕩頗復詼諧辭數萬言終不見用朔因著論設客難已用位卑以自慰諭朔初入長安至公車凡用三千奏牘公車令兩人共侍舉其書僅能勝之人主從上方讀之止輙乙處讀之二月乃盡詔拜以為郎常在側侍數召至前談語人主未嘗不説也朔後為中郎張敞河東平陽人為山陽太守宣帝時渤海膠東盜賊並起敞上書自請治之曰臣聞忠孝之道退家則盡心於親進宦則竭力於君夫小國忠君猶有奮不顧身之臣况於明天子乎今陛下逰意於太平勞精於政事亹亹不舍晝夜亹亹言勉强也舍息也亹音尾羣臣有司宜各竭力致身山陽郡户九萬三千口五十萬以上訖計盜賊未得者七十七人訖盡也它課諸事亦略如此臣敞愚駑既無以佐思慮久處閒郡閒讀曰閑身逸樂而忘國事非忠孝之節也伏聞膠東渤海左右郡嵗數不登年穀頗不熟也盜賊並起至攻官寺簒囚徒搜市朝刼列侯吏失綱紀姦宄不禁臣敞不敢愛身避死唯明詔之所處願盡力摧挫其暴虐存撫其孤弱事即有業所至郡條奏其所由廢及所以興之狀有業言各得其所書奏天子徴敞拜膠東相賜黄金三十斤馮野王字君卿受業博士通詩少以父任為太子中庻子年十八上書願試守長安令宣帝竒其志聞丞相魏相相以為不可許後以功補當陽長尹翁歸河東平陽人也為獄小吏曉習文法去吏居家㑹田延年為河東太守行縣至平陽悉召故吏五六十人延年親歸見令有文者東有武者西閲數十人次到翁歸獨伏不肯起對曰翁歸文武兼備唯所施設功曹以為此吏倨敖不遜敖讀曰傲延年曰何傷遂召上辭問為文辭而問之甚竒其對除補卒吏便從歸府案事發姦窮竟事情延年大重之自以能不及翁歸徙署督郵班伯成帝時為奉車都尉家本北邉志節慷慨數求使匈奴河平中單于求朝帝使伯持節迎單于於塞下㑹定襄大姓石李羣軰報怨冦殺追捕吏伯上狀因自請願試守期月伯既至分部收捕咸稱神明後漢馮衍字敬通京兆杜陵人也光武時為曲陽令建武六年上書召見為尚書令王䕶等排間遂不得入後衛尉隂興新興侯隂就以外戚貴顯深敬重衍衍遂與交結衍與就書曰衍聞神龍驤首幽雲景蒸明聖脩德志士思名是以意同情合聲比則應也伏見君侯忠孝之性慈仁殷勤論議周宻思慮深遠顧以微賤數􅂪聖恩被侯大惠衍年老被病恐一旦無祿命先犬馬懷抱不報齎恨入㝠思剖肝膽有以塞責方今天下安定四海咸服􅂪更生之臣無所效其死力側聞東平山陽王壯當之國澤隆官屬衍不自量願侯日以衍備門衛鄙語曰水不激不能破舟矢不激不能飲羽不念舊惡名賢所高負責之臣欲言不敢惟侯哀憐深留聖心則闔棺之日魂復何恨耿純字伯山鉅鹿宋子人也王莽時為納言士光武即位為前將軍建武二年眞定王劉楊與綿曼賊通光武遣純使幽冀純遂誅劉楊及還京師因自請曰臣本吏家子孫幸遭大漢復興聖帝受命備位列將爵為通侯天下略定臣無所用志願試治一郡盡力書效帝笑曰卿既治武復欲修文邪乃拜純東郡太守時東郡未平純視事數月盗賊清寧皇甫規順帝時為安定上計掾㑹羌衆大合攻燒隴西朝廷患之規乃上疏求乞自効曰臣比年以來數陳便宜羌戎未動䇿其將反馬賢始出頗知必敗誤中之言在可校考臣每惟賢等擁衆四年未有成功縣師之費且百億計出於平人回入姦吏故江湖之人羣為盗賊青徐荒饑襁負流散夫羌戎潰叛不由承平皆因邉將失於綏御乘常守安則加侵暴茍競小利則致大害微勝則虚張首級軍敗則隠匿不言軍士勞怨困於猾吏進不得快戰以徼功退不得温飽以全命餓死溝渠暴骨中原徒見王師之出不聞振旅之聲酋豪泣血驚懼生變是以安不能久敗則經年臣所以摶手叩心而増歎者也願假臣兩營二郡屯列坐食之兵五千出其不意與䕶羌校尉趙冲共相首尾土地山谷臣所曉習兵勢巧便臣已更之可不煩方寸之印尺帛之賜高可以滌患下可以納降若謂臣年少官輕不足用者凡諸敗將非官爵之不高年齒之不邁臣不勝至誠沒死自陳時帝不能用後終於䕶羌校尉呉諸葛恪守節度呉初置節度官掌典軍糧恪以丹陽山險民多果勁雖前發兵徒得外縣平民而已其餘深遠莫能盡屢自求乞為官出之三年可得甲士四萬衆議以丹陽地勢險阻與呉郡㑹稽新都鄱陽四郡鄰接周旋數千里山谷萬里其幽䆳民人未嘗入城邑對長吏皆伏兵野逸白首於林莽逋亡宿惡咸共逃竄山出銅鐵自鑄甲兵俗好武習戰高尚氣力其升山赴險抵突叢棘若魚之逰淵猨狖之騰木也時觀間隟出為冦盗每致兵征伐尋其窟藏其戰則蠭至敗則鳥竄自前世已來不能覊也皆以為難恪父瑾聞之亦以事終不逮恪盛陳其必㨗擢拜恪撫越將軍領丹陽太守於是長㓜相携而出嵗期人數皆如本規晉袁甫字公胄歴陽人少能言議與華譚齊名友善大安中甫入雒詣中領軍何朂自言能治劇縣朂曰君子法應多以何宜唯欲宰民何不為一臺職乎甫曰人各有能否譬由錦繒中之好而不可以為祫口洽切稻食中之好而不可以為虀是以孔子曰及其使人也器之茍非大才何能悉備久之除松滋令宋劉穆之字道和小字道人世居京口博學有通識高祖克京城問何無忌急須府主簿何由得之無忌曰無過劉道人高祖曰吾亦識之即馳信召焉時穆之問京城有呌噪之聲晨起出陌頭屬與信㑹穆之直視不言者久之既而反室壞布裳為袴往見高祖高祖謂之曰我始舉大義方造艱難須一軍吏甚急卿謂誰堪其選穆之曰貴府始建軍吏實須其才倉卒之際畧當無見踰者高祖笑曰卿能自屈吾事濟矣即於坐受署南齊王融中書令僧遠之孫為太子舍人以父宦不通弱年便欲紹興家業啟世祖求自試曰臣聞春庚秋蟀集候相悲露木風榮臨年共悦夫惟動植且或有心况在生靈而能無感臣自奉望宮闕沐浴恩私㧞迹庸流叅名盛列纓劔紫履趨歩丹墀嵗時歸來誇榮邑里然無懃而官在昔貽議不任而祿有識必譏臣所用慷慨憤懣不遑自晏誠以深恩鮮報聖主難逢蒲柳先秋光隂不待貪及明時展悉遇效以酬陛下不世之仁若微誠獲信短才見序文武吏法唯所施用夫君道含𢎞臣術無隠翁歸乃居中自是充國曰莫若老臣竊景前修敢蹈輕節輙敢冐不謀之鄙式罄奉公之誠抑又唐堯在上不叅二八管夷吾耻之臣亦耻之願陛下裁覽遷秘書丞張融為南陽王友以王瞻父𤣥謨曽欲殺融父暢瞻為南陽王長史融啟求去官不許融家貧願祿乃與從叔征北將軍永書曰融昔稱㓜學早訓家風雖則不敏率以成性布衣韋帶弱年所安簞食瓢飲不覺不樂但世業清貧人生多待榛栗棗修女贄既長束帛禽鳥男禮已大勉身就官十年七仕不欲代耕何至此事昔求三呉一丞雖屬舛錯今聞南康缺少願得為之融不知階級階級亦可不知融政以求丞不得所以求郡求郡不得亦可復求丞又與吏部尚書王僧䖍書曰融天地之逸民也進不辯貴退不知賤兀然造化總如草木實以家貧累積孤寡傷心八姪俱孤二弟頓弱撫之而感古人以悲豈能山海陋祿申融情累阮籍愛東平土風融亦欣晉平閑外時議以融非御人才竟不果辟太傅掾歴驃騎豫章王司空諮議叅軍遷中書郎非其所好乞為中散大夫不許梁劉坦字德度南康王為荆州刺史坦為西平中郎中兵叅軍領長流義師起遷諮議叅軍時輔國將軍楊公則為湘州刺史師起夏口朝義行州事者坦謂衆曰湘境人情易擾難信若專用武士則百姓畏侵漁若遣文人則威畧不振必欲鎭靜一州城軍足食則無踰老臣先零之役竊以自許遂從乃除輔國將軍長沙太守行湘州事蕭昱字子眞景第四子也天監初除秘書郎累遷太子舍人洗馬中書舍人侍郎每求自試高祖以為淮南永嘉襄陽郡並不就志願邉州高祖以其輕脱無威望抑而不許後魏韓顯宗啟乞宋王釗相府諮議叅軍事欲佐效南境孝文不許邢遜字子言撫軍將軍巒子為國子博士本州中正因謁靈太后自陳功名之子久抱沈屈臣父屢為大將而臣身無軍功階級臣父唯為忠臣不為慈父靈太后慨然以遜為長兼吏部郎中後周楊寛字景仁𢎞農華隂人也兵部尚書北道大行臺鈞之子也頗解屬文尤尚武藝弱冠除奉朝請屬鈞出鎭恒州請從展效乃改授將軍高闕戍王時蠕蠕亂其主阿那瓌來奔魏帝遣使納之詔鈞率兵衛送寛亦從行以功拜行臺郎中隋柳彧少好學頗渉經史仕周為寧州總管掾武帝親摠萬機彧詣闕求試帝異之以為司武中士唐張嘉貞為并州長史開元六年奏事至京師常因謁見奏曰臣今心力方壯是效命之秋更數年即衰老無能為也惟陛下早垂任使死且不憚帝以其明辯尤重之第五琦為北海郡錄叅軍𤣥宗西幸時琦奏事至蜀中得謁見因奏言方今之急在兵兵之强弱在賦賦之所出江淮居多若假臣職任使濟軍需臣能使賞給之資不勞聖慮𤣥宗大喜即日拜監察御史勾當租庸使李抱眞代宗時為陳鄭澤潞節度留後因中謝言曰臣雖無可取當今百姓勞逸係在牧守願得一郡以自試帝許之改授澤州刺史兼為澤潞節度副使張建封字本立兖州人也少頗愛屬文好談論以立功名為已任寶應中李光弼鎭河陽時蘇常等州有草賊冦掠州縣詔中使馬日新與光弼將兵馬同征討之建封乃見日新自請説諭賊徒日新許之遂入虎窟蒸里等賊營説以利害禍福一夕賊黨數千人並詣日新請降遂悉放歸田里後為徐州節度使竇羣貞元末以處士徴拜左拾遺遷侍御史充和蕃使判官羣因對曰陛下即位二十餘年始自草澤擢臣為拾遺是難其進也今陛下以二十年難進之臣為和蕃判官一何易其任乎乃留之後唐劉師武為揚州楊漢章行軍司馬自言有經畧安邉之䇿乞入朝從之胡裝禮部尚書曽之孫汴將楊師厚之鎭魏州裝與副使李嗣業有舊因往依之薦授貴鄉令及張彦之亂嗣業遇害裝罷秩客於魏州莊宗初至裝謁見求為假官司空頲以其居官貪濁不得調者久之莊宗還太原裝候於離亭謁者不内乃排闥而入曰臣本朝公卿子孫從知至此殿下比雪唐祚勤求英俊以壯霸圖臣雖不才比於進九九納竪刁頭須亦所庻幾而覊旅累年執事者不垂顧錄臣臣不能赴海觸樹走胡適越今日歸死於殿下也莊宗愕然曰孤未之知何至如此且賜酒食慰遣之謂郭崇韜曰便與擬議是嵗署館驛廵官未幾受監察御史裏行遷節度廵官賜緋魚袋尋歴推官撿校員外郎晉白奉進少善馳射唐昭宗以天復中為朱氏脅遷東營洛邑後唐太宗鎭太原有扶救之志奉進謁於軍門以求自效太祖納之麾下以功遷龍武指揮使干謁夫有為之士將以盡思慮之變效智計之用以逹於有位而奮於當世然以貧賤之姿風期攸隔先容莫致厥路無由故寓詞以感動􅅚躬以干進或矯激以世竒遲留而不去蓋其䇿慮幅憶無所發明或以機事微宻有以關説乃至靡因介者期於自逹故有當傾蓋之遇恨相得之晩邀功於一時垂裕於將來者斯亦感慨發憤而為之也然而衒鬻以求售其在君子之後乎若乃嚮其風聲以道義為貴或在懼其侵辱因僶俛而往亦人無間然矣寗戚齊人欲干桓公窮困無以自逹於是為商旅將軍以適於齊暮宿於郭門飯牛車下望見桓公乃擊牛角而商歌桓公聞之曰異哉歌者非常人也後命車載之三齊記載其歌曰南山粲白石爛生不逄堯與舜禪短布單衣適至骭從昏飰牛至夜半長夜漫漫何時旦公悦之以為大夫馮驩聞孟嘗君好客躡屨而見之孟嘗君曰先生遠辱何以教文也馮驩曰聞君好士以貧身歸於君置傳舍十日孟嘗君問傳舍長曰客何所為答曰馮先生甚貧猶有一劔爾又蒯緱彈其劔而歌曰長鋏歸來乎食無魚孟嘗君遷之幸舍食有魚矣五日又問傳舍長答曰客復彈劔而歌曰長鋏歸來乎出無輿孟嘗君遷之代舍出則乘輿矣五日孟嘗君復問傳舍長舍長答曰先生又嘗彈劔而歌曰長鋏歸來乎無以為家孟嘗君不悦楚丘先生行年七十披裘帶索往見孟嘗君欲趨不能進孟嘗君曰先生老矣春秋高矣何以教之先生曰噫將我而老乎噫將使我追車而赴馬乎投石而超距乎逐麋鹿而摶豹虎乎吾已死矣何暇老哉噫將使我出正辭而當諸侯乎决嫌疑而定猶豫乎吾始壯矣何老之有孟嘗君逡廵避席面有愧色漢魏勃少時欲求見齊相曹參家貧無以自通乃常獨早掃齊相舍人門外舍人輕之以為物而伺之得勃物謂鬼神伺者察視之勃曰願見相君無因故為子掃欲以求見於是舍人見勃曹參因以為舍人一為叅御言事以為賢言之悼惠王王召見拜為御史雋不疑字曼倩渤海人也治春秋為郡文學進退以禮名聞州郡武帝末郡國盗賊羣起暴勝之為直指使者衣繡衣持斧逐捕盗賊督課郡國督謂察視之東至海以軍興誅不從命者有所追捕及行誅罰皆依興軍之制威震州郡勝之素聞不疑賢至渤海遣吏請與相見不疑冠進賢冠帶櫑具劔古長劔首以玉作并鹿盧形上刻木作山形如蓮花初生未敷時今大劔木首其狀似此佩環玦環玉環也玦即玉佩之玦也帶環而又著玉佩也禮記曰孔子佩象環也褒衣博帶褒大裾也言着褒大之衣廣博之帶也而説者以為朝服垂褒之衣非也盛服至門上謁上謁者若今通名也門下欲使解劔不疑曰劔者君子武備所以衛身不可解請退吏白勝之勝之開閤延請望見不疑容貌尊嚴衣冠甚偉勝之躧履起迎履不着跟曰躧納履未正曵之而行言其遽也後為京兆尹後漢孔融年十嵗隨父詣京師時河南尹李膺以簡重自居不妄接士賔客勑外自非當世名人及與通家皆不得見融欲觀其人故造膺門語門者曰我是李君通家子弟門者言之膺請融問曰高明祖父嘗與僕有恩舊乎融曰然先君孔子與君先人李老君同德比義而相師友則融與君累世通家衆坐莫不歎息融位至少府王符安定臨涇人時度遼將軍皇甫規解官歸安定鄉人有以貨得鴈門太守者亦去職還家書刺謁規規卧不迎既入而問卿前在郡食鴈美乎有頃又白符在門規素聞符名乃驚遽而起衣不及帶屣履出迎援符手而還與同坐極歡時人為之語曰徒見二千石不如一縫掖禮記儒行孔子曰􅉌少居魯衣縫掖之衣鄭𤣥注曰逢猶大也大掖之衣大袂單衣也言書生道義之為貴也符竟不仕終於家高彪字義方呉郡無錫人無錫今常州縣家本單寒至彪為諸生逰太學有雅才而訥於言嘗從馬融欲訪大義融疾不獲見乃覆刺遺融書曰承服夙問從來有年故不待介者而謁大君子之門冀一見龍光以叙腹心之願毛詩曰既見君子為龍為光龍寵也不圖遭疾幽閉莫啟昔周公旦父文兄武九命作伯以尹華夏猶揮沐吐餐垂接白屋白屋匹夫也故周道以隆天下歸德公今養疴傲士故其宜也融省書慙追還之彪逝而不顧後為内黄令卒禰衡字正平平原般人也般縣故城在今德州平昌縣東少有才辯而氣尚剛傲好矯時慢物興平中避難荆州建安初來逰許下始逹潁川乃隂懷一刺既而無所之適至於刺字漫滅孔融薦於曹公衡自稱狂病後為黄祖所殺第五倫始以營長詣郡尹鮮于褒見而異之署為吏後褒坐事左轉高唐令臨去握臂訣曰恨相知晩趙壹漢陽西縣人往造河南尹羊陟不得見壹以公卿中非陟無足以託名者乃日往到門陟自强許通尚卧未起壹逕入上堂遂前臨之曰竊伏西州承高風舊矣乃今方遇而忽然謂死也奈何命也因舉聲哭門下驚皆奔入滿側陟知其非常人乃起延與語大竒之謂曰子出矣陟明旦大從車騎奉謁造一時諸計吏多盛餙車騎帷幕而壹獨柴車草屏露宿其傍延陟前坐於車下左右莫不歎愕陟遂與言談至曛夕極歡而去執其手曰良璞不剖必有泣血而相明者矣陟乃與袁逢共稱薦之名動京師士大夫想望其風采及西還道經𢎞農過候太守皇甫規門者不即通壹遂遁去岑晊南陽棘陽人年少未知名往候同郡宗慈慈方以有道見徴賔客滿門以晊非良家子不肯見晊留門下數日晩乃引入慈與語大竒之遂將俱至雒陽因詣太學受業後三府交辟並不就呉歩隲字子山臨淮淮隂人也世亂避難江東單身窮困與廣陵衛旌同年相善俱以種𤓰自給晝勤四體夜誦經傳㑹稽集征羌郡之豪族呉錄曰征羌名矯尚為征羌令人客放縱隲與旌求食其地懼為所侵乃共修刺奉𤓰以獻征羌征羌方在内卧駐之移時旌欲委去隲止之曰本欲以來畏其强也而今舍去欲以為高祗結怨爾良久征羌開牖見之身隱几坐帳中設席致地坐隲旌於牖外旌愈耻之隲辭色自若征羌作食自享大案殽膳重沓以小盤飯與隲旌惟菜茹而已旌不能食隲極飯致飽乃辭出旌怒隲曰何能忍此隲曰吾等貧賤是以主人以貧賤遇之固其宜也當何所耻時大帝為討虜將軍召隲為記室晉陸機呉人也文章冠代與弟雲造太常張華華素重其名如舊相識曰伐呉之役利獲二俊機後為平原内史孫惠呉國富陽人成都王潁引為大將軍叅軍奮威將軍白沙督後惠擅殺頴牙門將梁雋懼罪因改姓名以遁及東海王越舉兵下邳惠乃詭稱南嶽逸士秦秘之以書干越曰天禍晉國遘兹厄運歴觀危亡其萌有漸枝葉先零根株乃斃伏惟明公咨睿哲之才應神武之畧承衰亂之期當傾險之運側身昏䜛之俗跼蹐㓙謟之間執夷正立則取疾姦佞抱忠懷直則見害賊臣餔糟非聖性所堪茍免非英雄之節是以感激於世發憤忘身抗辭金門則謇諤之言顯扶翼皇家則翊主之功著事雖未集大命有在夫以漢祖之賢猶有平城之耻魏武之能亦有濮陽之失孟明三退終於致果句踐䘮衆期於擒呉今明公名著天下聲振九域公族歸美萬國宗賢加以四王齊聖仁明篤友急難之感同奬王室股肱爪牙足相維持皇穹無親惟德是輔惡盈福謙鬼神所讚以明公逹存亡之符察成敗之變審所履之運思天人之功虎視東夏之藩龍躍海嵎之野西諮河間南結征鎭東有勁呉鋭卒之富北有幽并率義之旅宣喻青徐啟示羣王旁收雄俊廣延秀傑糾合擕貳明其賞信仰惟天子􅂪塵鄴宮外矯詔命擅誅無辜豺狼簒噬其事無遠夫心火傾移䘮亂可必太白横流兵家攸仗嵗鎭所去天厭其德𤣥象著明讁譴彰見違天不祥奉時必尅明公思安危人神之應慮禍敗前後之徴𢎞勞謙日昃之德躬吐握求賢之義傾府竭庫以賑貧乏將有濟世之才渭濵之士含竒謨於朱脣握神䇿於玉掌逍遥川嶽之上以俟眞人之求目想不世之佐耳聽非常之輔舉而用之則元勲建矣秘之不夭値此衰運竊慕墨翟申包之誠䟦渉荆棘重繭而至櫛風沐雨來承禍難思以管宂毗佐大猷道險時吝未敢自顯伏在川泥繫情宸極謹先白箋以啟天慮若能沉吟際㑹徘徊二端徼倖在險請從恕宥之例明公今旋軫臣子之邦宛轉名義之國指麾則五嶽可傾呼噏則江湖可竭况履順討逆執正伐邪是烏獲摧氷賁育拉朽猛獸吞狐泰山壓卵因風燎原未足方也今時至運集天與神助復不能鵲起於慶命之㑹㧞劔於時哉之機恐流濫之禍不在一人自先帝公王海内名士近者死亡皆如蟲獸尸元曵於糞壤形骸捐於溝澗非其口無忠貞之辭心無義正之節皆希目下之小生而惑終焉之大死凡人知友獨有刎頸之報朝廷之内而無死命之臣非獨秘之所耻惜乎晉世之無人久矣今天下喁喁四海注想社稷危而復安宗廟替而復紹惟明公兄弟能𢎞濟皇猷國之存亡在斯舉矣秘之以不才之姿而値危亂之運竭其狗馬之節加以忠貞之心左屬平亂之鞬右握滅逆之矢控馬鵠立計日俟命時難獲而易失機速變而成禍介如石焉實無終日自求多福惟君裁之陶侃為廬江郡主簿太守張䕫察侃孝亷至洛陽數詣張華華初以遠人不甚接遇侃每往神無忤色華後與語異之梁蕭琛起家齊太學博士時王儉當朝琛年少未為儉所識負其才氣候儉宴于樂逰乃著虎皮靴䇿桃枝杖直造儉坐儉與語大悦儉為丹陽尹辟為主簿劉勰為歩兵校尉兼東宮通事舍人撰文心雕龍既成未為時流所稱勰自量其文欲取定於沈約約時貴盛無由自逹乃負其書候約出干之於車前狀若貨鬻者約便命取讀大重之謂為深得文理常陳諸几案後魏高恭之字道穆每謂人曰人生厲心立行貴於見知當使夕脱羊裘朝佩珠玉者若時不我知便須退迹江海自求其志御史中尉元匡高選御史道穆奏記於匡曰道穆生自蓬簷長於陋巷漁獵羣書無純碩之德尚好章詠乏雕掞之工雖欲厠影髦徒班名俊伍其可得哉然凝明獨斷之主雄才不世之君無藉朽株之資求人屠釣之下不牽闔投之誚取士商歌之中是以聞英風而慷慨望雲路而低徊者天下皆是也若得身𨽻繡衣名充直指雖謝陳王騎上之敏實有茅氏就鑊之心匡大喜曰吾久知其人適欲召之遂引為御史隋潘徽善屬文能持論陳尚書令江摠引致文儒之士徽乃詣摠摠甚敬之釋褐新蔡王國侍郎唐孫逖㓜而英俊始年十五謁雍州長史崔日用小之令為土火爐賦握翰即成辭理典贍日用覽之駭然遂為忘年之交官至中書舍人陸贄為華州鄭縣尉罷秩東歸省母路由壽州刺史張鎰有時名贄往謁之鎰初不甚知留三日再見與語遂大稱善贄後至宰相武儒衡擢進士第故相國鄭餘慶性儉自持不事華潔後進趨其門多垢巾敗服以望其知餘慶見之必悦以為風俗因已而厚儒衡每謁見未嘗輙易所好但高言直論與之切磨蓋若不知餘慶之所尚爾餘慶因此亦嘉重之終兵部侍郎栢耆將軍良器之子素負志氣縱横家流㑹王承宗再以常山叛朝廷稍厭武事思用恩澤濡煦耆為處士於行營以書干裴度願為是行承宗果請質二男獻兩郡既而疇其使功寘之諫列劉三復潤州句容人以所業文詣郡干謁浙西觀察使李德裕德裕閲其文倒屣迎之後唐司空頲屬天子播遷三輔大亂乃還鄉里羅紹威為節度副大使頲以所業干之幕客公乘億為延譽羅宏信署為府叅軍辟館驛廵官李琪字台秀昭宗時李谿父子以文學知名於時琪年十八九袖賦一軸謁谿谿覽賦驚異倒屣迎門因出琪啞鍾捧日等賦指示謂琪曰予常患近年文士辭賦皆數句之後未見賦題吾子入句見題偶屬典麗吁可畏也琪由是益知名晉張希崇字德峯幽州蘇縣人也希崇少通左氏春秋復癖於吟詠劉守光為連帥慘酷不喜文士希崇乃擲筆入謁軍門以求自效守光納之漸升為禆將册府元龜卷九百
