body:
  text: 冊府元龜卷一百六十八宋王欽若等撰帝王部却貢獻禹别九州以任土實周設九貢以致邦用量逺近之宜制輕重之法各以所有陳之藝極諸侯述職非為重幣也四海㑹同非寳逺物也歸於􅈗旅賦之以時其或獻未有程人匪知禁或以竒而入貢或以貴而樂輸逺方之珍不足以登爼豆非時之物不足以充庖厨徒罄下情靡資國用歴代王者知上之所好下有甚者故斥之而不御還之而不有書於簡冊垂為軌範茲亦有國之盛羙也故錯綜其事於篇云漢文帝時曾有獻千里馬者詔曰鸞旗在前屬車在後鸞旗編以羽毛列繫幢旁載於車上大駕出陳於道而先行屬車相連屬而陳於後也吉行五十里朕乘千里馬獨先安之安之言何所適徃於是還馬道里費而下詔曰朕不受獻也其令四方毋求來獻後漢光武建武十三年異國有獻名馬者日行千里又進寳劒價兼百金詔以馬駕鼓車劒賜騎士是年詔曰往年已勅郡國異味不得有所御獻今猶未止非徒有豫飬導擇之勞豫飬謂未至其時豫前飬之導亦擇也至乃煩擾道上疲費過所其令太官勿復受太官令一人秩六百石掌御膳飲食明勅下以逺方口實所以薦宗廟自如舊制口實膳羞之事也章帝建初二年四月癸巳詔齊相省氷紈方空縠吹綸絮紈素也氷言色鮮潔如氷穀紗也方如也紗薄如空也或曰空孔也即今之方目紗也齊有三服官故詔齊相罷之和帝時舊南海獻龍眼荔枝十里一置五里一堠南海郡秦置今廣州縣也廣雅曰益智龍眼也交州記曰龍眼樹髙五六丈似荔枝而小廣州記曰子似荔枝而員七月熟荔枝樹髙五六丈大如桂樹實如鷄子甘而多汁安石榴有甜醋者至日禺中翕然而赤即可食置為驛也奔騰阻險死者繼路時臨武長縣汝南唐羗縣接南海臨武縣屬桂陽即今廣州縣也乃上書陳狀元興元年帝下詔曰逺國珍羞夲以薦奉宗廟茍有傷害豈愛民之本其勅太官勿復受珍繇是遂止焉唐羗字伯㳺辟公府補臨武長縣接交州舊獻龍眼荔枝及生鮮獻之驛馬晝夜傳送之至有遭虎狼毒害頓仆死亡不絶道徑臨武羗乃上諫曰臣聞上不以滋味為德下不以貢獻為功故天子食太牢為尊不以果木為珍伏見交趾七郡獻生龍眼等鳥驚風發南州土溽惡蟲猛獸不絶於路至於傷犯死亡之害死者不可復生來者猶可救也此二物升獻未必延年益夀帝從之安帝永初五年二月詔省減郡國貢獻太官口珍順帝永建四年五月詔曰海内頗有災異朝廷修政太官減膳珍玩不御而桂陽太守文龍不惟竭忠宣暢本朝而逺獻大珠以求􅄑媚今封以還之晉武帝咸寧四年十二月太醫司馬程據獻雉頭裘帝以竒技異服曲禮所禁焚之於殿前勅内外敢有犯者罪之穆帝升平元年扶南天竺旃檀獻馴象詔曰昔先帝以殊方異獸或為人患禁之今及其未至可令還本國後魏孝文太和二年八月詔罷諸州禽獸之貢六年三年行􅄑虎圏詔曰虎狼猛暴食肉殘生取捕之日每多傷害既無所益損費良多從今勿復捕貢宣武永平二年十月郢州獻七寳牀詔不納又龍驤將軍郢州刺史韓務獻七寳床象牙席詔曰晉武帝却雉頭裘朕嘗嘉之今務所獻亦此之流也竒麗之物有乖佩素可付其家人孝明時城陽王徽為鎮軍將軍時戎馬在郊王師屢變徽以軍旅乏費上國封絹二千疋粟一萬石以助軍用帝不納隋高祖開皇元年三月詔犬馬器玩口味不得獻上十五年六月相州刺史豆盧通貢綾文布焚之於朝堂唐髙祖武徳元年十一月詔曰逸遊損徳昔賢貽訓玩物喪志前典格言西旅獻獒召公於是作誡東齊饋樂尼父所以離心隋末無道肆極奢靡内騁倡優之樂外崇耳目之娛冠蓋相望徴求不息公私擾遽徭費無窮朕受命君臨志在約日旰忘食昧爽求衣纂組珠璣皆云屏絶雕琢綺麗久從抑止其侏儒短節小馬痺牛異獸竒禽皆非實用諸有此獻悉宜停斷宣布逺邇咸使聞知二年曷娑那可汗獻大珠帝曰珠信為寳朕所寳者赤心耳何用珠為竟不受六年欽州總管甯長直獻大珠昆州刺史沈遜融州刺史歐陽世普象州刺史秦元賢竝獻筒中布建州刺史葉顥獻練布吳玉杜伏威獻竹帳帝以勞民皆不受之九年九月突厥頡利獻馬三十匹羊萬口帝不受詔頡利所掠中國戸口者令歸之太宗貞觀五年新羅獻女樂帝不受并五色鸚鵡各令將還本國二十年五月髙麗王藏及莫離支蓋金遣使來謝罪并獻二美女蓋金即蘇文也帝謂其使曰歸語爾主羙色者人之所重爾之所獻信為佳冶憫其離父母兄弟于夲國留其身而忘其親愛吾若取其色而傷其心我不為也竝還之髙宗永徽二年閏八月吐谷渾河源郡王慕容諾曷鉢遣使獻駿馬帝問其馬之種性對曰臣國中之最者所以獻之帝曰良馬人之所欲豈可輟彼不足而加我之有餘哉乃命還之十一月詔曰弋獵畋游素非所好常謂此志布于逺近而蕃夷有獻鷹犬者有阻來逺之情時復為受示以不違其意其諸州及京官仍有訪求狗馬鷹鶻之􅁼來進深非道理自今後更有進者必加罪責咸亨二年五月周澄國遣使上表云訶迦國有白象首垂四牙身運五足象之所在其土必豊既有威靈又弭災患力兼十象强制百人以水洗牙飲之愈疾請發兵迎取以獻之帝謂使臣曰舜用漆器而人叛紂用玉杯而國亡此亦所費不多但是奢麗之漸不可啟也夫作法於儉其弊猶奢作法於奢豈能制止故聖人越席以昭儉茅茨以戒奢書云珍禽竒獸不育於國方知無益之源不可不遏朕安用竒象令其逺獻乃勞其使而遣之儀鳳三年十月詔以來年正月􅄑東都劒南隴右諸州每年供進物一二年且停開耀元年十二月吐火羅進金衣一領帝不受中宗神龍二年真臘國遣使表請往文單採光明珠玻黎玳􅈘以獻手制不許𤣥宗開元五年以康安國突騎施等貢獻多是珍異謂之曰朕所重惟榖所寳惟賢不作無益之費不貴逺方之物故錦繡珠玉焚於殿庭車渠瑪瑙總賜蕃國今之進獻未識朕懷宜收其情百中留一計價酬答務從優厚餘竝却還是年突騎施遣使獻槖駝及馬降書謂曰卿逺貢忠信請獻駝馬朕𤣥黙為神淡泊為德税彼部落則有勞費已𠡠有司不令輙受深領厚意宜體至懷七年二月癸未𠡠伊州嵗貢年支米一萬石宜停肅宗至德二年六月戊寅帝降誕日公卿以下咸以進獻帝以行在竝不受乾元元年四月詔曰諸使應進鷹鶻狗豽等一切竝停元年建卯月制諸道貢獻除馬畜供軍之外其餘鷹鷂狗豽竒禽異獸竝不得輙進代宗廣德二年七月停饒州進乳米德宗以大歴十四年五月即位閏五月丙子詔曰天下州府及新羅渤海嵗貢鷹鷂者皆罷既來者所在放之戊寅詔曰山南之枇杷江南之甘橘嵗次第貢者取一次以供廟享餘皆罷之是月癸未詔曰劒南嵗貢生嵗酒十斛罷之六月己亥朔詔諸州府祥瑞珍禽異獸鷹犬之􅁼竒器異服錦繡珠玉等竝不得輙有進獻己未詔曰揚州每嵗以端午之日鑄貢鏡於江中者及幽州嵗貢麝香皆罷之七月辛巳商州嵗貢黐膠罷之十月詔九成宫嵗貢立獸爐炭襄州貢蔗蒻及種蒔之工皆罷之建中元年四月癸丑德宗降誕之日也先是元日南至端午及降誕之日四方競貢獻者數千萬及是帝以為非故事皆不納淄青節度使李正已魏博節度使田悦各獻綾三萬疋悉以歸度支以代租税妃父王景仙駙馬髙怡獻金銅佛像以為帝夀帝謂使曰有為功德吾不欲悉還之興元元年正月癸酉帝在奉天行在宫受朝賀大赦改元制諸道貢獻自非供宗廟軍國之用一切竝停順宗以貞元二十一年正月即位二月甲子詔諸州府常貢外不得别進錢物金銀器皿竒綾異錦雕文刻鏤之􅁼若已發在路者竝納在藏庫己丑停鹽鐡使月造錢舊鹽鐡錢物悉入正庫以助經費其後主此務者稍以時市珍玩時新物充進獻欲以求恩澤後益甚進錢物謂之羨餘而經入益少及貞元遂月獻焉謂之月進及是而罷憲宗永貞元年九月襄州節度使于頔進鷹詔却歸之元和元年八月韓全義之子進女樂八人竝入見帝曰吾方節約以訓天下宫中妓樂尚有出之者此獻何為遂不受六年四月以張茂昭妓樂女子四十七人歸之八年九月淄青節度使李師道進鶻十二命還之十年九月勅澤潞及鳳翔天威軍每進鷂子既傷物性又勞人力宜停進是嵗王師討淮蔡諸侯皆貢財助軍太子賔客于頔進銀七千兩金五千兩玉帶二詔不納復還十一年三月詔諸道今年端午進奉宜權停十月勑兩路兵戈尚未寧息眷言供億每慮勞煩將贍軍需必資省用其今年賀冬來年賀正進奉宜並停十二年二月勑今年端午進奉宜權停八月己巳處州刺史苖稷進助軍錢絹及鞋等詔曰天下成敗固有常規刺史進錢固非舊典恐為後例弊及疲民言念于兹義在隠惻其苖稷所進助軍錢絹共二萬六千疋端麻鞋一萬兩宜却還本州苖稷將代貧下户差稅箭一萬隻令付本道都團練使收管辛未勅伐叛興師久勞于外饋軍給費固已為煩獻賀之儀屢至諒非朕志務從簡約式表憂勤其今年冬至及來年元日諸司諸道進奉宜停十三年四月劒南西川奏南詔請貢獻助軍牛羊奴婢等帝發詔褒美不令進獻十四年六月己酉韓𢎞進女樂十人命還賜之癸丑又進女妓二十人命放歸本道穆宗以元和十五年正月即位三月罷中州嵗貢茶以數少勞人從觀察使李程之請也長慶三年正月詔應縁御服及器用在淮南兩浙宣歙等道供進竝端午降誕常例進獻者一切權停并鷹犬之類除備蒐狩餘一切放之十月停浙東每年進淡菜及海蚶等四年三月壬子詔天下常貢之外更不得别有進獻縱節度觀察使入朝亦不得進奉諸道監軍自今以後在本道竝入奏竝不得進獻天下所貢竒綾異錦雕文刻鏤一事以上有渉踰制者悉皆禁斷鷹犬之流本備蒐狩委所司量留多少其餘竝解放仍勒州府更不用進來七月左金吾衞大將軍李祐進馬一百五十匹詔還之敬宗寳厯元年六月乙酉詔公主郡王自今以後無得進女口文宗以寳厯二年十一月即位是月鳳翔府淮南進女樂二十四人放還本道太和元年三月右軍中尉梁守謙表請致仕獻馬五十匹玉帶五十條銀器五擔勅竝不受四年二月尚書左丞王起進亡兄播銀壺瓶百枚玉及通天犀帶各一條刀劒各一口器杖一副馬二匹私白身三人有詔止令受銀瓶刀劒器杖及馬其白身却還翊日重進復不受旋命中使就宅宣白身三人更不用進來七年五月東川浙東奏准詔立春後造新茶是月吳蜀更以盛冬進貢帝深務仁儉逆物之時凡諸道非時而貢者詔皆禁絶八年九月詔應進奉口味時果進獻之外不得廣為般次煩于郵傳開成元年正月詔諸道賀正端午降誕賀冬進奉起今權停三年其錢充折放百姓兩稅所在除藥物口味茶果外不得輙有進獻百司及諸道應宣索製造一物已上竝停二月勑諸道應以禽鳥畋犬等上獻者依舊節例權停三年所進監軍嘗進者如例十二月勑河東每年進蒲萄酒西川進春酒竝宜停三年六月諸道征鎮各奏准詔停進奉以放貧下戸租税宣宗初魏謩為戸部侍郎平章事時詹毗國獻象謩以其性不安中土請還其使帝從之大中七年二月興元進犀牛有詔還之哀帝天祐二年六月以福建每年進橄㰖子勑曰禹别九州秦分百郡勉務隨方之職須資利物之源朕所以鄙蒟醤於漢朝慕菁茅於周室用為儆戒以省征徭福建一道逺在海隅常勤土貢每年所進橄㰖子頗甚勞役徃來本因閽䜿生長甌閩自為躭愛率令供進以為定規况非薦熟之珍仍異厥包之禮雖彰忠藎無濟闕如每年但供進臘面茶外不要進奉橄㰖子永為常例後唐莊宗同光元年十一月勑朕大平國患顯紹帝圖廓天地之妖氛救生靈之塗炭方懷至理永保鴻休敦去華務實之規成革故從新之化足可塞僥倖之路絶繁費之源恊我無私告爾有位應隨處官吏務局員寮諸軍將校等如聞前例各有進獻直貢奏章不唯䙝瀆于朝廷實且傍滋於誅歛速宜止絶以肅風化明宗即位初勑曰八表來王蓋率朝宗之義四方述職咸遵任土之宜茍獻奉之過常固煩費而滋甚將隆景運以俟雍熈但思於碎枕焚裘豈悦于珍禽異寳德宜從儉法在鼎新起今後中外臣寮藩部牧伯時節獻賀量事逹情不得掊歛生靈致令愁嘆鷹犬之類勿有進獻同光改元天成下制曰征賦上供國之常典别因進獻懼削生靈應節度防禦等使除四正至端午及降誕四節量事逹情自於内庫圓融不得輙科百姓其四州刺史不要貢奉長興二年九月辛亥勑曰馳騁畋獵聖人每抑其心竒獸珍禽明王不畜於國朕猥將寡薄䖍奉宗祧覧前代之興亡思昔人之取捨所以尋頒明詔遍諭遐方推好生惡殺之仁罷鵰鶚鷹鸇之貢一則杜盤逰之漸一則遂飛走之情近日諸色人不稟詔條頻獻鷹隼既不能守兹近勅則何以示彼後人頗謂踰違須行止絶其五方見在鷹隼之類竝宜就山林解放此後諸色人等竝不得輙將進獻仰閤門使凡有此色貢奉表章不得引進三年二月帝謂侍臣曰自今後行幸處宜令止絶進奉是月河東節度使石敬瑭進玉帶光潤異常帝謂之曰朕不少此物復以賜卿敬瑭拜獻數四方受翊日賜以良馬是月藥彦稠進回鶻可汗先遣使送金装胡䩮遺秦王為党項所掠至是獲之而獻帝曰此物已經剽掠况曽曉諭凡破賊所獲軍中自收今後却賜彦稠所貴示人以信彦稠又進納党項所刼回鶻玉二團尋却賜之十月癸酉湖南馬希範荆南髙從誨竝進銀及茶所上章各稱與强冦比隣長資防捍希宣賜戰馬以助軍容帝曰湖南接淮冦請馬為宜荆南在内地何煩設備趙延夀奏曰藩臣求馬不宜受直請還其獻量賜馬數十匹帝曰然乃賜希範馬五十匹從誨二十匹還其獻十一月宣㫖在京臣寮不得進奉賀長至馬及物色末帝清㤗元年七月萊亳陳汾四州刺史丁審琪而下各進馬賀中宫受冊詔不納二年五月詔曰朕聞竒伎滛巧增費損功古先哲王常戒其事朕憲章百代臨御萬方以其欲致延洪必絶驕奢之漸將期富庶須除蠧耗之源每務實以去華期化民而成俗近者諸色進奉寳装龍鳳雕鏤刺作組織之異既經釐革尚敢踰違宜再舉行貴於遵守今後此色物諸處不得進奉所繇司不得輙通晉髙祖天福二年四月詔下北京留守石重貴凡有諸道禮物不得收留四年六月陳郡民王武穿地得黄金數鉼州牧取而貢之帝曰宿藏之地既非符寳不合入官命付所獲之家九月勑曰朕恭已臨民虛心求理務崇儉約以致和平乃眷臣寮悉懐忠義每觀貢助備見傾輸雖嘉奉上之誠宜示酌中之道其寒食七夕重陽及十月煖帳内外羣后進獻宜停五年四月詔罷雒陽京兆進苑囿𤓰菓憫勞人也六年正月詔曰朕自御寰區每思黎庶貴除聚斂以活疲羸訪聞遐僻邉境之州或無公廨利用之物每因節序亦備於貢輸輟官吏之俸錢率鄉園之人戸雖云奉上其奈害公今後冬年寒食端午天和節及諸色謝賀所屬州縣處俱不得進奉周太祖廣順元年正月庚辰御札宣示羣臣曰朕以𦕈末之身託王公之上深懼弗類撫躬匪遑豈可化未及人而過自奉飬道未方古而不知節量與其耗費以勞人曷若儉約而克己昨者所頒赦令已述至懷宫闈服御之所須悉從減損珍巧纎竒之厥貢竝使寝停尚有未該再宜條舉應天下州縣舊貢滋味食饌之物所宜除減其兩浙進細酒海味薑𤓰湖南枕子茶乳糖白沙糖橄㰖子鎮州髙公米水梨易定栗子河東白杜梨米粉菉豆粉玉屑粹子麵永興玉田紅花秔米新大麥麵興平蘓小栗子華州麝香羚羊角熊膽獺肝朱柿熊白河中樹紅棗五味子輕􅄳同州石􅌯餅晉絳葡萄黄消棃陜府鳳栖梨襄州紫薑新笋橘子安州折粳米糟味青州水梨河陽諸雜菓子許州御李子鄭州新笋鵞梨懐州寒食杏仁申州蘘荷亳州萆薢㳂淮州郡淮白魚如聞此等之物雖即出於土産亦有取于民家未免勞煩率多糜費至時奔迫以來獻逐歲收斂以為常所奉止于朕躬所損被于甿庶加之力役負荷馳驅道途積于有司之中甚為無用之物此而不止孰曰知㣲其常貢上件物色今後竝不許進奉諸州府更有舊例所進食味其未該者宜奏取進止此外猶有數處時新之物不敢全罷蓋或奉于太后薦于祖宗茍至悉除恐隳常敬告于中外宜副朕心帝嘗于便殿謂樞密使王俊曰語云飢者不厭糟糠寒者不厭裋褐是知充飲禦寒取足而已存理路者亦不可以貴賤易其操朕少孤㣲艱辛備歴逢時喪亂享帝王之位安敢過自奉飬以困黎民卿可為予疏録前代州府所獻滋味時菓之􅁼不便于民者一切減省之故有是詔二月鄭州吳處裕言州貢除新笋鵞梨之外今進櫻桃勑命不該令取進止勑此後勿獻二年十月右叅議大夫裴㢲右監門大將軍李崇本皆自兩浙使廻見進綾絹犀牙帝以海路艱險使臣復命不欲更令進貢却令賜之十二月邠州侯章獻銀千兩馬七匹上夀不納又進請開宴絹千疋銀五百兩太祖顧侍臣曰諸侯入朝帝王自備宴以申魚水之樂豈俟貢奉然後致宴其侯章所進請開宴銀絹宜却賜之今後諸侯入朝更有如此進奉亦當不受三年正月甲子前安州節度使王令温進開宴絹五百疋教坊二百疋不納二月前鄧州節度張彦成獻錢七千萬請開宴不納四月丁巳鳳翔節度趙暉進奉錢絹請開宴不納壬申前同州節度使薛懐讓進請開宴錢一百萬不納八月戊申邢州節度劉詞獻開宴錢不納十一月甲辰兩浙回使千牛大將軍賈延勲副使大府少卿李玭等千牛將軍安崇贊獻犀牙綾絹不納世宗顯德元年正月通事舍人王演髙麗復命進黒水馬新羅刀劒不納六年三月己酉回鶻到闕進玉及碙砂皆不納所入馬量給價時帝以玉之為用無濟于軍國故因而却之冊府元龜卷一百六十八
