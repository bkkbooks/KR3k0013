body:
  text: 册府元龜卷六百七十八宋王欽若等撰牧守部興利勸課興利昔大禹之叙九功曰利用以阜財厚生以養民班固之述循吏曰所居民富盖夫君子之為政必求所以利於人而行之也歴代而下賢守接武乃能相其土宜以興物役始資乎悦使終啟於善利或導逹溝瀆以滋扵灌漑或闢除汚萊以繁於稼穡築堤堨以備水潦䟽河漕以通輸運興鑄冶以贍農器造橋梁以濟徒渉陶瓦覆屋以寜室居鑿山通道以便行旅皆豐功被於甿庶休眀載於緗簡流風餘烈沒而不朽其古之良二千石者歟漢召信臣為南陽太守時行視郡中水泉開通溝瀆起水門堤閼凡數十處閼所以壅水以廣漑灌嵗嵗增加多至三萬頃民得其利畜積有餘信臣為民作均水約束言用之有次第也刻石立於田畔以防分争禁止嫁娶送終奢靡務出於儉約府州縣吏家子弟好㳺敖不以田作為事輙斥罷之甚者案其不法以示好惡其化大行郡中莫不耕稼力田百姓歸之户口增倍盗賊獄訟衰止吏民親愛信臣號之曰召父荆州刺史奏信臣為百姓興利郡以殷富賜黄金四十斤後漢文齊廣漢人王莽末益州羣夷起兵殺郡守以齊為太守造起陂池開通漑灌田千餘頃鄧晨為汝南太守興鴻郤陂數千頃田鴻郤陂名今在豫州汝陽縣東汝土以殷魚稻之饒流衍它郡汝南舊有鴻郤陂成帝時丞相翟方進奏毁敗之建武中晨欲修復其功聞許楊曉水脉召與議之楊曰昔成帝用方進之言尋而自夢上天天帝怒曰何故敗我濯龍淵是後民失其利多致饑困時有謡歌曰敗我陂者翟子威飴我大豆享我芋魁及乎覆陂當復昔大禹决江䟽河以利天下明府今興立廢業富國安民童謡之言將有徴於此誠願以死効力晨大悦因署楊為都水掾史典其事楊因髙下形勢起塘四百餘里數年乃立百姓便累嵗大稔馬稜為廣陵太守時榖貴民饑奏罷監官以利百姓賑貧羸薄賦税興復陂湖灌田二萬餘頃吏民刻石頌之鮑昱為汝南太守郡多陂池嵗嵗决壊年費嘗三十餘萬昱乃上作方梁石洫水常饒足漑田倍多人以殷富杜詩為南陽太守造作水排鑄為農器冶鑄為排以吹炭今激水以皷之是也用力少見功多百姓便之又修治陂池廣拓土田郡内比室殷足時人方於召信臣故南陽為之語曰前有召父後有杜母魯丕為趙相遷東郡太守丕在二郡為人修通漑灌百姓殷富任延為武威太守河西舊少雨澤乃為置水官吏修理溝渠皆蒙其利何敞為汝南太守修理鮦陽舊渠百姓頼其利鮦陽縣屬汝南郡墾田增三萬餘頃吏人共刻石頌敞功徳秦彭為山陽太守興起稻田數千頃每於農月親度頃畆分别肥瘠差為三品各立文簿藏之鄉縣於是姦吏跼蹐無所容詐彭乃上言宜令天下齊同其制詔書以其所立條式班令三府並下州郡任光為信都太守墾田增多三嵗間流民占著者五萬餘口張堪為漁陽太守於孤奴開稻田八千餘頃勸民耕種以致殷富張禹為下邳相徐縣北界有蒲陽陂東觀記曰陂水廣二十里􅈳且百里在道西其東有田可萬頃旁多良田而堙廢莫修禹為開水門通引灌漑遂成熟田數百頃勸率吏民假與種糧親自勉勞遂大收榖實鄰郡貧者歸之千餘户室廬相屬其下成市後嵗至墾千餘頃民用温給東觀記曰禹廵行守舍止大樹下食糒乾飯屑飲水而已後年鄰國貧人來歸之者茅舍草廬千户屠酤成市墾田千餘頃得榖百萬餘斛虞詡為武都太守先是運道艱險舟車不通驢馬負載僦五致一詡乃自將吏士案行川谷自沮至下辯沮及下辯並縣名沮今興州順政縣也下辯今成州同谷縣也數十里中皆燒石剪木開漕船道一云下辯東三十餘里有陜中當水泉生大石障塞水流每至春夏輙溢沒秋稼壊敗營郭詡乃使人燒石以水灌之石皆折裂因鐫去石遂無汎溺之患也以人僦直僱借傭者於是水運通利嵗省四十餘萬魏劉馥為揚州刺史廣屯田興治芍陂及茹陂七門吳塘諸堨以漑稻田官民有畜歴代為利賈逵為豫州刺史外修軍旅内治民事遏鄢汝造新陂又斷山淄長谿水造小弋陽陂鄭渾為陽平沛郡二太守郡界下濕患水澇百姓饑乏渾於蕭相二縣界興陂遏開稻田郡人皆以為不便渾曰地勢洿下宜漑灌終有魚稻經久之利此豐民之本也遂躬率吏民興立功夫一冬間皆成比年大收頃畆嵗增租入倍常民頼其利刻石頌之號曰鄭陂徐邈為凉州刺史河右少雨常苦乏榖邈上修武威酒泉鹽池以收蘆榖又廣開水田募貧民佃之家家豐足倉庫盈溢乃支度州界軍用之餘以市金帛犬馬通供中國之費牽招為鴈門太守郡所治廣武井水鹹苦民皆擔輦逺汲流水往反七里招凖望地勢因山陵之宜鑿原開渠注水城内民頼其益晉𫝊祗為滎陽太守自魏黄初大水之後河濟汎溢鄧艾嘗著濟河論開石門而通之至是復浸壊祗乃造汎萊堰至今兖豫無水患百姓為立碑頌焉張闓為晉陵内史時所部四縣並以旱失田闓乃立曲阿新豐塘漑田八百餘頃每嵗豐稔葛洪為其頌計用二十一萬一千四百二十工以擅興造免官後公卿並為之言曰張闓興陂灌田可謂益國而反被黜使臣下難復為善帝感悟乃下詔曰丹陽侯闓昔以勞役部人免官雖從吏議猶未掩其忠節之志也倉稟國之本宜得其才今以闓為大司農闓陳黜免始爾不宜便居九列䟽奏不許然後就職杜預都督荆州諸軍事鎮襄陽修召信臣遺跡激用滍淯諸水以浸原田萬餘頃分疆刻石使有定分公私同利衆庶頼之號曰杜父孔愉為㑹稽内史句章縣有漢時舊陂毁廢數百年愉自廵行修復故堰漑田二百餘頃皆成良業荀羡為北府都督鎮下邳今臨淮郡縣也起田於東陽之石鼈公私利之劉義欣為豫州刺史鎮夀陽芍陂良田萬餘頃堤堨久壊秋夏常苦旱義欣遣諮議叅軍殷肅循行修理有舊溝引渒水坡不治積久樹木榛塞肅伐木開榛水得通注旱患繇是得除劉悛為武陵内史郡南江古堤久廢不葺悛修治未畢而江水忽至百姓棄役奔走悛親率厲之於是乃止宋張邵為南雍州刺史至襄陽築長圍修立堤堰開田數千頃郡人頼之富贍南齊劉懐慰為齊郡太守懐慰至郡修治城郭安集居民墾廢田二百頃决沈湖灌漑竟陵王子良為丹陽尹上表曰京尹雖居都邑而境壤兼跨廣袤周輪幾將千里縈原抱隰其處甚多舊遏古塘非唯一所而民貧業廢地利久蕪近啟遣五官殷濔典籖劉增瑗到諸縣循履得丹陽溧陽永世等四縣觧并村耆辭到堪墾之田合計荒熟有八千五百五十四頃修治塘遏可用十一萬八千餘夫一春就功便可成立帝納之㑹遷官事􅆍梁陳慶之為都督南北司西豫三州諸軍事罷義陽鎮兵停水陸轉運江湖諸州並得休息開田六千頃二年之後倉廪充實髙祖每嘉賞之後魏元萇為河内太守以河橋船絙路狭不便行旅又秋水汎漲年常破壊乃為船路遂廣募宣車從京出者率令輸石一雙累其㟁橋濶往来便利近橋諸郡無復勞擾公私頼之崔鑒為徐州刺史於州内銅冶以為農具兵民獲利崔挺為光州刺史先是州内少鐡器用皆求之他境挺表復鐡官公私有利沈文秀為懐州刺史大興水田於公私頗有利益崔亮為安西將軍雍州刺史城北渭水淺不通船行人艱阻謂寮佐曰昔杜預乃造河梁况此有異長河且魏晉之日亦自有橋吾今决欲營之咸曰水淺不可為浮橋汎長無常又不可施柱恐難成立亮曰昔秦居咸陽横橋渡渭以像閣道此即以柱為橋今唯慮長柱不可得耳㑹天大雨山水暴至浮出長木數百根藉此為用橋遂成立百姓利之至今猶名崔公橋亮在州讀杜預傳見為八磨嘉其有濟時用遂教民為碾裴延雋為幽州刺史范陽郡有舊督亢渠徑五十里漁陽燕郡有故戾陵諸堰廣袤三十里皆廢毁多時莫能修復時水旱不調民多饑餒延雋謂䟽通舊跡勢必可成乃表營造遂躬自履行相度水形随力分督未幾而就漑田百萬餘畆為利十倍百姓至今頼之李愍為南荆州刺史􅉖於境内開立陂渠漑稻千餘頃公私頼之杜弼行海州事在州奏通陵道并韓信故道又於州東帶海而起長堰外遏鹹潮内引淡水勅並依行李繪為髙陽内史髙陽舊多陂淀繪至後淀水皆涸乃置農正専主勸課墾田倍增家給人足隋盧賁為懐州刺史决沁水東注名曰和民渠又派入温縣名曰温潤渠以漑㵼鹹民頼其利薛胄為兖州刺史先是兖州城東沂泗二水合而南流汎濫大澤中胄遂積石堰之使决令西注陂澤盡為良田又通轉運利盡淮海百姓頼之號為薛公豐兖渠趙軌開皇中為夀州總管長史芍陂舊有五門堰蕪穢不修軌於是勸課人吏開三十六門灌田五十餘頃人頼其利楊尚希為蒲州刺史在州甚有恵政復引瀵水立堤防開稻田數千頃民頼其利唐李襲譽為揚州大都督府長史江都俗好商賈不事農業襲譽乃引雷陂水又築旬城塘以溉田八百頃百姓獲其利長孫操武徳中為陜州刺史自州東引水入城以代井汲百姓至今頼之河間王孝恭為荆州大縂管開置屯田創立銅冶百姓利焉髙士廉為益州大都督府長史秦時李􅖅守蜀導引汶江創浸灌之利至今地居水側者頃直千金富強之家多相侵奪士廉乃於故渠外别更疏决蜀中大獲其利裴行方檢校幽州都督引盧溝水廣開稲田數千頃百姓頼以豐給薛大鼎為滄州刺史界有無棣河隋末填廢大鼎奏開之引魚鹽於海百姓歌之曰新河得通舟檝利直逹滄海魚鹽至昔日徒行今騁駟美哉薛公徳滂被大鼎又以州界卑下遂决長蘆及漳衡等三河分洩夏潦境内無復水災張儉為朔州刺史廣營屯田嵗致數十萬斛邉糧益饒及遭喪亂儉勸百姓相贍遂免饑餒州境獨安嗣楚王靈龜為魏州刺史開永濟渠入新市控引商旅百姓利之王晙景龍末為桂州都督桂州糧饋乏晙始改築羅郭奏罷屯兵及轉運又堰江水開屯田數千頃百姓頼之李傑為河南尹先是河汴之交有梁公堰年久堰破江淮漕運不通傑奏調發汴鄭丁夫以濬之省功速就公私深以為利刻石水濵以紀其績宋璟為廣州都督仍為五府經畧使廣州舊俗皆以竹茅為屋屢有火災璟教人燒瓦改造店肆自是無復延燒之患夷夏懐惠立碑以紀其政姜師度為同州刺史開元八年十月詔曰昔史起漑漳之䇿鄭白鑿涇之利因兹厥後聲塵缺然同州刺史姜師度識洞於微智形未兆匪躬之節所懐必罄奉公之道知無不為頃職大農首開溝洫嵗功猶昧物議紛如縁其忠欵可嘉委任仍舊暫停九列之重假以六條之察白藏過半績用斯多食乃人天農為政本朕故兹廵省不憚祁寒將申勸䘏之懐特冐風霜之弊今原田彌望畎澮連屬繇來榛棘之所遍為秔稻之川倉庾有京坻之饒闗輔致畆金之潤本營此地欲利平人縁百姓未開恐三農虗棄所以官為開發兾令逓相教誘功既成矣思與共之其屯田内先有百姓挂籍之地比来召作作主亦量准頃畆割還其官屯熟田如同州有貧下欠地之户自辦功力能營種者准數給付餘地且依前官取師度以功加金紫光祿大夫賜帛三百疋李栖筠為常州刺史時冦亂之後旱暵仍嵗編户轉徙廬井半空乃濬河渠導江流以資漑灌是嵗大稔流民畢復李復為廣州刺史勸導百姓令變茅屋為瓦舍杜亞興元中為淮南觀察使揚州官河填淤漕輓堙塞又僑寄衣冠及工商等多侵街衢造屋行旅擁蔽之亞乃開拓疏啟公私悦頼焉嗣曹王臯貞元初為江陵尹東北七十里有廢田旁漢古堤壊决凡二處每夏水溢為浸澤臯始命塞之廣田五十頃悉良羙畆收一鍾又規江南廢洲為廬舍江為二橋流人自占者二千餘户自荆至樂鄉凡二百餘里旅舍鄉聚凡十數大者皆數百家楚俗佻薄舊不鑿井悉汲陂澤至夏與牛畜同潦或汲水數里行旅重困臯乃令合錢作井民以為便陳孝陽為雋州刺史領二十餘年蠻夷愛之雋州隔瀘水常苦餽餫孝陽設法營田後嵗收榖數萬石軍食之餘又以北餫黎州清溪開鎮軍皆足蜀人至今謂之倒般後以老歸成都蠻夷交持之泣涕數百里方免李西華貞元中為商州刺史商州西至藍田東至内鄉七百餘里山岨重沓小遇暴雨則隔絶行旅或露居糧絶旬日不止則往往僵仆西華上請役功十餘萬置橋立廬又廻山通偏路以避盛水自是行李不滯李景畧貞元中為豐州刺史西受降城使鑿感應永清二渠溉田數百頃公私利焉于頔為湖州刺史因行縣至長城方山下有水曰西湖南朝疏鑿溉田三千頃嵗久堙廢頔命設堤塘以復之嵗獲秔稻蒲魚之利人頼以濟髙瑀元和初為忠武軍節度使比年水旱人民薦饑瑀召集州民繞郭立堤塘一百八十里蓄洩既均人無饑年孟簡元和中為常州刺史簡始到郡開漕古孟瀆長四十一里得沃壤四千餘頃李吉甫元和中為淮南節度使吉甫於髙郵縣築堤為塘溉田數千頃人受其利韋丹元和中為江西觀察使江西邑屋皆以草履竹椽嘗多火患及丹到悉以瓦木大革前俗裴度為興元觀察使寳歴二年度奏修斜谷路及創造館驛畢自京師氏漢中列郵傳於駱谷久矣而艱難阻險人嘗病之度旣到鎮因訪故老熟其利害遂决請移路於斜谷橋梁館宇尅期而就人心大惬李聽為靈武節度使境内有光祿渠廢塞嵗久將議屯田詔聽復開舊渠溉田千餘頃至今頼之王起太和中代裴度鎮襄陽為民修淇堰以灌田一境利之温造太和中為河陽節度使修河枋口堰役四萬工溉灌濟源河内温縣武徳武陟五縣百姓田五千餘頃髙璠為陳許節度使奏修築許州繞城水堤及開渠溝周回一百八十里畢功髙駢咸通末為安南都䕶奏開本州海路從之初交阯以北距南滇有水路多覆巨舟駢往視之乃有横石隠然在於水中因奏請開鑿以通南海之利其表畧云人牽財利石限衡津纔登一去之舟便作九泉之計今若稍加疏鑿以導往来自然貨殖貿遷華戎利渉時有詔聽之駢乃召工者啖以厚利竟削其石交廣之民至今頼之以濟焉晉陳暉為靈州節度使作舟車百數代民轉輸行商坐賈蠲其征税勸民播植薄其賦歛蕃漢貿易禁其欺詆屬郡筦𣙜田課悉復漢慕容彦超為磁州刺史地饒水田則西門豹史起所理漳滏十二磴之遺跡也時以郡邑薦饑溝渠堙塞彦超日引已之親僕及郡衙㪚卒出俸錢以給其食自旦及夕親令開鑿期嵗之間民獲其惠及以政聞於朝遷領軍州百姓遮留於路彦超始以代者未至營渠不息左右勸而止之彦超曰有未成功處與成之何頓輟而不終其志也聞者嘉之勸課易曰利物以和義書曰厚生以養民班固之述循吏曰所居民富繇漢而下牧守之可紀者曷嘗不以勸課為先焉乃有朂之以耕耨勉之以樹藝鑄作乎田器敦率乎稼政教之以孳畜而祭養無闕訓之以􅅙績而纕帛是供居土者勤身以濟衆在下者知方而從化弊俗丕革羙利敦洽繇是家給人足政平訟治耻格之風著徳讓之道隆管子所謂衣食足知榮辱者其識治體矣漢黄覇為潁川太守務耕桑節用殖財種樹畜養去食榖馬米鹽靡宻初若煩碎米鹽言雜而且細然覇精力能推行之龔遂為渤海太守既屏盗民安土樂業遂乃開倉廪假貧民假謂給與選用良吏尉安牧養焉遂見齊俗奢侈好末技不田作乃躬率以儉約勸民務農桑令口種一樹榆百本䪥五十本葱一畦韭每一家即如此種也家二母彘五母鷄每一家則如此養之也民有帶持刀劍者使賣劍買牛賣刀買犢謂曰何為𢃄牛佩犢乎春夏趨田畆趨向也秋冬課收歛益畜果實菱芡勞來循行郡中皆有蓄積菱芡也芡鷄頭也勞來勸勉也吏民皆富實獄訟止息召信臣為南陽太守為人勤力有方畧好為民興利務在富之躬勸耕農出入阡陌止舍離鄉亭言休息之時皆有野次稀有安居時府縣吏家子弟好㳺敖不以田作為事輙斥罷之甚者案其不法以示好惡其化大行郡中莫不耕稼力田百姓歸之户口增倍後漢樊凖為鉅鹿太守時饑荒之餘人庶流迸家户且盡凖課督農桑廣施方畧期年間榖粟豐賤數十倍任延為九真太守九真俗以射獵為業不知牛耕民常告糴交阯每致困乏延乃令鑄作田器教之墾闢田疇嵗嵗開廣百姓充給樊曄為揚州牧教民耕田種樹理家之術視事十餘年茨充為桂陽太守善其政教民種植桑柘麻紵之屬勸令養􅅙織屨民得利益焉東觀記載元和中荆州刺史上言臣行部入長沙界觀者皆徒跣臣問御佐曰人無屨亦苦之否御佐對曰十二月盛寒時並多剖裂血出燃火燎之春温或濃潰建武中桂陽太守茨充教人種桑蚕人皆得其利至今江南頗知桑蠶織屨皆茨充之化也崔寔為五原太守五原土宜麻枲而俗不知織績民冬月無衣集細草而卧其中見吏則衣草而出寔至官斥賣儲㣥為作紡績織絍練緼之具以教之民得以免寒苦織絍織布者緼枲也王景為廬江太守先是百姓不知牛耕致地力有餘而食常不足郡界有楚相孫叔敖所起芍陂稻田景乃驅率吏民修起蕪廢教用犂耕繇是墾闢倍多境内豐給遂銘石刻誓令民知常禁又訓令蠶織為作法制皆著于鄉亭廬江傳其文辭劉虞為幽州牧舊幽部應接荒外資費甚廣嵗嘗割青兾賦調二億有餘以給足之時處處斷絶委輸不至而虞務存寛政勸督農植開上谷胡市之利通漁陽鹽鐵之饒民悦年登榖石三十魏杜畿為河東太守漸課民畜㹀牛草馬下逮鷄䐁犬豖皆有章程百姓勤農家家豐實蘇則為金城太守時喪亂之後則親自教民耕種其嵗大豐繇是歸附者日多皇甫隆為燉煌太守初燉煌不甚曉田常灌漑滀水使極濡洽然後乃耕又不曉作樓犂用水及種人牛工力旣費而收榖更少隆到教作樓犁又教衍漑嵗終半計其所省用力過半得榖加五又燉煌俗婦人作裙攣縮如羊腸用布一疋隆禁改之所省復不訾夏侯惇領陳留濟隂太守時大旱蝗蟲起惇乃斷大夀水作陂身自負土率將士勸種稻民頼其利轉領河南尹顔裴為京兆太守始京兆從馬超破後民人多不專於農殖又歴數四二千石取觧目前亦不為民作久逺計裴到官乃令屬縣整阡陌樹桑果是時民多無車牛裴又課民以閑月取車材使轉相教匠作車又課民無牛者令畜猪狗賣以買牛始者民以為煩一二年間家家有丁車大牛又起文學聽吏民欲讀書者復其小徭又於府下起菜園使吏役閑鉏治課民當輸租時車牛各因便致薪兩束為冬寒氷炙筆硯於是風化大行吏不煩民民不煩吏京兆與馮翊扶風接界二郡道路旣穢塞田疇又荒萊人民饑凍而京兆皆整頓開明豐富常為雍州十郡最王昶為雒陽興農時都畿樹木成林昶砍開荒萊勤勸百姓墾田特多遷兗州刺史鄭渾為魏郡太守郡下百姓苦乏材木乃課樹榆為籬竝益樹五果榆皆成藩五果豐實入魏郡界村落齊整如一民得財足用饒鄧艾為汝南太守所在荒野開闢軍民竝豐晉王宏字正宗為汲郡太守撫百姓如家耕桑樹藝屋宇阡陌莫不躬自教示曲盡事宜在郡有殊績司𨽻校尉石鑒上其政術武帝下詔稱之范晷為凉州刺史轉雍州于時西土荒毁氐羗蹈籍田桑失收百姓困弊晷傾心化導勸以農桑所部甚頼之劉𢎞為荆州刺史勸課農桑寛刑省賦嵗用有年百姓愛悦祖逖為豫州刺史躬自儉約勸督農桑克已務施不畜資産子弟耕耘負擔樵薪桓宣為江夏相鎮襄陽招懐初附勸課農桑簡刑罰畧威儀或載鉏耒於軺軒或親耘穫於隴畆宋申怙為青州刺史加督兾州齊地連嵗興兵百姓彫弊怙初防衛邊境勸課農桑二三年間遂皆優實南齊劉善明為海陵太守郡境邉海無樹木善明課民種榆雜菓遂獲其利梁徐摛為新安太守至郡為治清浄教民禮義勸課農桑期月之中風俗便改孫謙為零陵太守謙為郡縣嘗勤勸課農桑務盡地利收入常多於隣境後魏崔寛為秦州刺史先是河東年饑刦盗大起寛至修龔遂之法勸農桑周年之間冦盗止息吕羅漢父温為上黨太守善勸課有治名杜纂為清河内史勸督農桑親自簡視勤者賞以物帛惰者加以罪譴弔死問生甚有恩紀後周郭彦孝為澧州刺史蠻左生梗未遵朝憲至於賦税違命者多聚㪚無常不營農業彦孝勸以耕稼罷其逰獵民皆務本家有餘糧亡命之徒咸從賦役先是以澧州糧儲乏少每令荆州逓送自彦孝蒞職倉庾充實無復轉輸之勞隋公孫景茂為道州刺史好單騎廵人家至户入閲視百姓産業有修理者於都㑹時乃褒揚稱述如有過惡隨即訓導而不彰也繇是人行義讓有無均通男子相助耕耘婦人相助紡績大村或數百户皆如一家之務唐竇軌貞觀初為雒川都督雒陽因隋末喪亂人多浮偽軌並遣務農各令屬縣有逰手怠惰者皆按之繇是人吏懾憚風化整肅蘓幹為魏州刺史時河北饑饉主吏苛酷百姓多有流㪚乃督察姦吏務勸農桑繇是逃㪚者皆復業劉晏為京兆尹奏當府蒿荒地其本户有能復業請蠲免三年差科如無復業者請㪚給居人及客户并資䕃家隨例納官税所兾田畆不荒從之李融為鄭州刺史作賦税法得其條貫無兼并豪奪之家而農者競勸境内無荒田人到于今頼之韋丹為江西觀察使課百姓墾田人多儲蓄張仲武為幽州節度使以邉塞旣寜尤勤撫育每春則勸農及夏親行縣以較其民之稼穡見稊莠不去者必撻之見滋長如雲者必坐於木隂賜酒茗以厚之梁韓建唐末為華州刺史建少勤農穡尤加勸課曲盡其能在華數年軍民饒衍後唐張全義唐末為河南尹雒都自黄巢大亂之後繼之以蔡賊十餘年間冦盗往來都城灰盡無寸椽尺㭒滿目荆榛李罕之尹正也唯部下聚居坊市窮民不滿百户加以罕之貪殘治民無術流人來者㝷復㪚去及全義為尹鉏萊披榛招復流庸待之如子每嵗農務勸耕之始全義必自立畎畆間諭其耕者賞以酒食政寛事簡吏不敢犯繇是數年之間京畿無閑田民户數十萬周知裕明宗朝歴絳州淄州刺史宿州團練使知裕老於軍旅勤於稼穡凡為郡勸課皆有政聲朝廷嘉之晉劉審交為陳州刺史出省風俗見耕夫田器鈚鏵甚薄而拙乃於河北取様特鑄造以給民册府元龜卷六百七十八
