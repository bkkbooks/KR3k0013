body:
  text: 冊府元龜卷六百四十八宋王欽若等撰貢舉部對策第三晉郤詵濟隂人博學多才州郡禮命竝不應泰始中詔天下舉賢良直言之士濟隂太守文立舉詵應選詔曰蓋太上以德撫時易簡無文至於三代禮樂大備制度彌繁文質之變其理何繇虞夏之際聖明係踵而損益不同周道既衰仲尼猶曰從周因革之宜又何殊也聖王既没遺制猶存覇者迭興而翼輔之王道之缺其無補乎何陵遲之不反也豈霸德之淺歟期運不可致歟且夷吾之智而功止於霸何哉夫昔人之為政革亂亡之弊建不刋之綂移風易俗刑措不用豈非化之盛歟何修而嚮兹朕獲承祖宗之休烈於兹七載而人未服訓正道罔述以古况今何不相逮之遠也雖明之弗及猶思與羣賢慮之將何以辯所聞之疑昧獲至論於讜言乎加自頃戎狄内侵害灾屢作邊甿流離征夫苦役豈政刑之謬將有司非其任歟各悉乃心䆒而論之上明古制下切當今朕之失德所宜振補其正議無隱將敬聽之詵對曰伏惟陛下以聖德君臨猶垂意於博采故招賢正之士而臣等薄陋不足以降大問也是以切有自疑之心雖致身於闕庭亦僶俛矣伏讀聖策乃知下問之㫖篤焉臣聞上古推賢譲位教同德一故易簡而人化三代世及季末相承故文繁而後整虞夏之相因而損益不同非帝王之道異救弊之路殊也周當二代之流承雕偽之極盡禮樂之致窮制度之理其文詳備孔子因時宜而曰從周非殊論也臣聞聖王之化先禮樂五覇之興勤政刑禮樂之化深政刑之用淺勤之則可以小安墮之則遂以陵遲所繇之路殊故所補之功不侔也而齊桓失之葵丘夷吾淪於小器功止於霸不亦宜乎策曰建不刋之統移風易俗使天下和洽何修而嚮兹臣以為莫大於擇人而官之也今之典刑匪無一統宰牧之才優劣異績或以之興或以之替此蓋人能𢎞政非政𢎞人也舍人務政雖勤何益臣切觀乎古今而考其美惡古人相與求賢今人相與求爵古之官人君責之於上臣舉之於下得其人有賞失其人有罰安得不求賢乎今之官者父兄營之親戚助之有人事則通無人事則塞安得不求爵乎賢茍求達達在修道窮在失義故静以待之也爵茍可求得在進取失在後時故動以要之也動則争競争競則朋黨朋黨則誣罔誣罔則臧否失實眞偽相冐主聽用惑姦之所㑹也静則貞固貞固則正直正直則信譲信譲則推賢推賢不伐相下無饜主聽用察德之所趨也故能使之静雖曰髙枕而人自正不能禁動雖復夙夜俗不一也且人無愚智咸慕名宦莫不適正於外藏邪於内故邪正之人難得而知也任得其正則衆正益至若得其邪則衆邪亦集物繁其類誰能止之故亡國失正者未常不為衆邪所積也方其初作必始於微微而不絶其終乃著天地不能頓為寒暑人主亦不能頓為隆替故寒暑漸於春秋隆替起於得失當今之世䆠者無關梁邪門啓矣朝廷不責賢正路塞矣得失之源何以甚此所謂責賢使之相舉也所謂闗梁使之相保也賢不舉則有咎保不信亦有罰故古者諸侯必貢士不貢者削貢而不適亦削矣士者難知也不適者薄過也不得不責彊其所不知也罰其所不適深其薄過非恕也且天子於諸侯有不純臣之義其責之矣施刑之道寕縱不濫之矣今皆反是何也夫賢者天地之紀品物之宗其急之也故寧濫以保之無縱以失之也今則不然世之悠悠者各自取辯耳故才行竝不可必於公則政事紛亂於私則汙穢狼藉自頃長吏特多此累有亡命而被購懸者矣有縛束而絞戮者矣貪鄙竊位不知誰升之者獸兕出檻不知誰可咎者網漏吞舟何以過此人之於利如蹈水火焉前人雖敗後人復起如彼此無已誰止之者風流日競誰憂之者雖今聖思勞於夙夜所使為政常得此屬欲聖世化美俗平亦俟河之清耳若欲善之宜創舉賢之典峻闗梁之防其制既立則人愼其舉而不茍則賢者可知知賢而試則官得其人矣官得其人則事得其序事得其序則物得其宜物得其宜則生生豐植人用資給和樂興焉是故寡過而遠刑知恥以近禮此所以建不刋之統移風易俗刑措而不用也策曰自頃夷狄内侵災𤯝屢降將所任非其人乎何繇而至此臣聞蠻夷猾夏則臯陶作士此欲善其末而先其本也夫任賢則政惠使能則刑恕政惠則下仰其施刑恕則人懷其勇施以殖其財勇以結其心故人居則資贍而知方動則親上而志勇茍思其利而除其害以生道利之者雖死不貳以佚道勞之者雖勤不怨故其命可授其力可竭以戰則克以攻則㧞是以善者慕德而安服􅁖者畏懼而削迹止戈而武義實在文惟任賢然後無患耳若夫水旱之灾自然理也故古者三十年耕必有十年之儲堯湯遭之而人不困有備故也自頃風雨雖頗不時攷之萬物或境土相接而豐約不同或頃畆相連而成敗異流固非天之必害於人人實不能均其勞苦失之於人而求之於天則有司惰職而不勸百姓殆業而咎時非所以定人志致豐年也宜勤人事而已臣誠愚鄙不足以奉對聖朝猶進之于廷者將使取諸其懷而獻之乎臣懼不足也若收不知言以致知言臣則可矣是以辭鄙不隱也以對策上第拜議郎摯虞京兆長安人才學通博郡檄主簿舉賢良與夏侯湛等十七人策為下第拜中郎武帝詔曰省諸賢良答策雖所言殊塗皆明於王義有益政道欲詳覧其對䆒觀賢士大夫用心因詔諸賢良方正直言㑹東堂策問曰頃日蝕正陽水旱為灾將何所修以變大𤯝及法令有不宜於今為公私所患苦者皆何事凡平世在於得才得才者亦借耳目以聽察若有文武器能有益於時務而未見申叙者各舉其人及有負俗謗議宜見洗濯者亦各言之虞對曰臣聞古之聖明原始以要終體本以正末故憂法度之不當而不憂人物之失所憂人物之失所而不憂災害之流行誠以法得於此則物理於彼人和於下則灾消於上其有日月之𤯝水旱之灾則反聽内視求其所繇逺觀諸物近騐諸身耳目聽察豈或有蔽其聰明者乎動心出令豈或有傾其常正者乎大官大職豈或有授非其人者乎賞罰黜陟豈或有不得其所者乎河濱山巖豈或有懷道釣築而未感於夣兆者乎方外遐裔豈或有命世傑出而未蒙膏澤者乎推此類也以求其故詢事攷言以盡其實則天人之情可得而見咎徴之至可得而救也若推之於物則無忤求之於身則無尤萬物理順内外咸宜祝史正辭言不負誠而日月錯行夭厲不戒此則隂陽之事非吉凶所在也期運度數自然之分固非人事所能供御其亦振廪散滯貶食省用而已矣是故誠遇朝運則雖陶唐殷湯有所不變茍非其運則宋衛之君諸侯之相猶能有惑惟陛下審其所由以盡其理則天下幸甚臣生長蓽門不逮異物雖有賢才所未接識不敢瞽言妄舉無以疇答聖問擢為太子舍人阮种字德猷陳畱尉氏人察孝亷為公府掾是時西虜内侵災𤯝屢見百姓飢饉詔王公卿尹常伯牧守各舉賢良方正直言之士於是太保何曽舉种賢良策曰在昔哲王承天之序光宅宇宙咸用䂓矩乾坤惠康品類休風流衍彌于千載朕應踐洪運統位七載於今矣惟德弗嗣不明於政宵興惕厲未燭厥猷子大夫韞韥道術儼然而進朕甚嘉焉其各悉乃心以闡諭朕志深陳王道之本勿有所隱朕虗心以覧焉种對曰夫天地設位聖人成能王道至深所以行化至逺故能開物成務而功業不匱近無不聽逺無不服徳逮羣生澤被區宇聲施無窮而典垂百代故經曰聖人乆於其道而天下化成宜師蹤往代襲迹三五矯世更俗以從人望今率土遷義下知所適播醇美之化杜邪枉之路斯誠羣黎之所欣想盛德而幸望休風也又問政刑不宣禮樂不立對曰政刑之宣故繇乎禮樂之用昔之明王唯此之務所以防遏暴慢感動心術制節生靈而陶化萬姓也禮以體德樂以詠功樂本於和而禮師於敬矣又問戎蠻猾夏對曰戎蠻猾夏侵敗王畧雖古盛世猶有此虞故詩稱獫狁孔熾書歎蠻夷帥服自魏氏以來夷虜内附鮮有桀悍侵漁之患繇是邊守遂怠障塞不設而令醜虜内居與百姓雜處邊吏擾習人又忘戰受方任者又非其才或以狙詐侵侮邊夷或干賞㗖利妄加討戮夫以微覊而御悍馬又乃操以煩策其不制者固其理也是以羣醜蕩駭縁間而動雖三州覆敗牧守不支此非胡虜之甚勁蓋用之者過也臣聞王者之伐有征無戰懷遠以德不聞以兵兵凶噐而戰危事也兵興則傷農衆集則費積農傷則人匱積費則國虗昔漢武之世承文帝之業資海内之富役其材臣以甘心匈奴競戰勝之功貪攻取之利良將勁卒屈於沙漠勝敗相若克不過當夭百姓之命塡飢狼之口及其以衆制寡令匈奴遠迹收功祁連飲馬瀚海天下之耗以過大半矣夫虗中國以事夷狄誠非計之得者也是以盜賊䗬起山東不振暨宣帝之時趙充國征西零馮奉世征南羌皆兵不血刃摧抑强暴擒其首惡此則折衝厭難勝敗相辨中世之明效也又問咎徴作見對曰隂陽否㤗六沴之灾則人主修政以禦之思患而防之建皇極之首詳庶徴之用詩曰敬之敬之天惟顯思天聰明自我民聰明是以人主祖承天命日愼一日也故能應受多福而永世克祚此先王之所以退灾消𤯝也又問經化之務對曰夫王道之本經國之務必先之以禮義而致人於亷恥禮義立則君子軌道而譲於善亷恥立則小人謹行而不淫於制度賞以勸其能威以懲其廢此先王所以保乂定功化洽黎元而勲業長世也故上有克讓之風則下有不争之俗朝有矜節之士則野無貪冐之人夫亷恥之於政猶樹藝之有豐壌良嵗之有膏澤其生物必油然茂矣若㢘恥不存而惟刑是御則風俗凋弊人惟錐刀之末皆有争心雖峻刑嚴辟猶不勝矣其於政也如農者之殖磽野旱年之望豐穡必不幾矣此三代所以享德長乆風淳俗美皆數百年保天之禄而秦二世而弊者蓋其所繇之塗殊也又問將使武成七德文濟九功何路而臻於兹凡厥庶事曷後曷先對曰夫文武經德所以成功丕業咸熈庶績者莫先於選建明哲授才任能令才當其官而功稱其職則萬機咸理庶寮不曠書曰天工人其代之然則代天理物寧國安家非賢無以成也夫賢才之畜於國猶良工之湏利器巧匠之待䋲墨也器用利則斵削易而材不病䋲墨設則曲直正而衆形得矣是以人主必勤求賢而佚以任之也賢臣之於主進則忠國愛人退則砥節潔志營職不干私義出心必繇公塗明量度以呈其能審經制以效其功此昔之聖王所以恭已南面而化於陶鈞之上者以其所任之賢與所賢之信也方今海内之士皆傾望休光希心紫極惟明主之所趣舍若開四聰之聽廣疇咨之求抽羣英延俊乂考工授職呈能制官朝無素餐之士如此化流罔極樹功不朽矣時种與卻詵及東平王康俱居上第即除尚書郎然毁譽之徒或言對者因縁假託武帝乃更延羣士庭以問之詔曰前者對策各指答所問未盡子大夫所欲言故復延見其具陳所懷又比年連有水旱災𤯝雖戰戰兢兢未能䆒天人之理當何修以應其變人遇水旱饑饉者何以救之中間多事未得寧静思以省息煩務令百姓不失其所若人有所患苦者有宜損益使公私兩濟者委曲陳之又政在得人而知之至難惟有因人視聽耳若有文武隱逸之士宜各舉所知雖幽賤負俗勿有所限故虗心思聞實事勿務華辭莫有所諱也种對曰伏惟陛下以聖哲𤣥覽降卹黎蒸將濟元元同之三代旁求俊乂以輔至化誠堯舜之用心也臣猥以頑魯之質應清明之舉前者對策不足以疇塞聖詔所陳不䆒臣誠蒙昧所以為罪臣聞天生蒸庶樹君以司牧之人君道洽則彜倫攸叙五福來備若政有愆失刑理頗僻則庶徴不應而淫亢爲災此則天人之理而興廢之繇也昔之聖王政道備而制先具軌人以務致之於本是以雖有水旱之𤯝而無飢饉之患也自頃隂陽隔并水旱為災亦猶期運之致不然則亦有司之不帥不能宣承聖德以賛揚大化故和氣未降而人事未叙也方今百姓凋弊公私無儲誠在於休役静人勸嗇務農此其救也人之所患繇于役煩網密而信道未孚也役煩則百姓失業網密則下背其誠信道未著則人無固志此則損益之至務安危之大端也傳曰始與善善進則不善蔑繇至孔子曰視其所以觀其所由人焉廋哉若夫文武隱逸之士幽賤負俗之才故非愚臣之所能識謹竭愚以對策奏帝親覽焉又擢為第一轉中書郎華譚廣陵人揚州刺史周浚引為從事史太康中徐州刺史􅄞紹舉譚秀才譚至雒陽武帝親策之曰今四海一統萬里同風天下有道莫斯之盛然北有未覊之虜西有醜施之氐故謀夫未得髙枕邊人未獲晏然將何以長弭斯患混清六合對曰臣聞聖人之臨天下也祖乾綱以流化順風俗以興仁兼三才以御物開四聰以招賢故勞謙日異務在擇才宣明嵓穴垂光隱滯俊乂龍躍帝道以光清德鳳翔皇化克舉是以臯陶見舉不仁者遠陸賈重漢遠夷折節今聖朝德音發於帷幄清風翔乎無外戎旗南指沔漢席捲干戈西征羌蠻慕化誠闢四門之秋興禮教之日也故髦俊聞聲而嚮赴殊才望險而雲集虗髙館以俟賢設重爵以待士急善過於飢渴用人疾于影響杜佞謟之門廢鄭聲之樂混清六合實繇乎此雖西北有未覊之宼殊漠有不朝之虜征之則勞師得之則無益故班固云有其地不可耕而食得其人不可臣而畜來則懲而禦之去則備而守之蓋安邊之術也又策曰吳蜀恃險今既蕩平蜀人服化無擕貳之心而吳人趦雎屢作妖宼豈蜀人敦樸易可化誘吳人輕鋭難安易動乎今將欲綏静新附何以為先對曰臣聞漢末分離英雄鼎峙蜀棲岷隴吳據江表至大晉龍興應期受命文皇運籌安樂順軌聖上濳謀歸命向化蜀染化日乆風教遂成吳始初附未改其化非為蜀人敦慤而吳人易動也然殊俗逺境風土不同吳阻長江舊俗輕悍所安之計當先籌其人士使雲翔閶闔進其賢才待以異禮明選牧伯致以威風輕其賦歛將順咸悦可以永保無窮長為人臣者也又策曰聖人稱如有王者必世而後仁今天成地平大化無外雖匈奴未覊羌氐驕黠將修文德以綏之舞干戈以來之故兵戈載戢武夫寖息如此已可消鋒刃為田器罷尚方武庫之用未邪對曰夫唐堯歴載頌聲乃作文武相承禮樂大同清一八紘綏盪無外萬國順軌海内晏然雖復被髪之鄉徒跣之國皆習章甫而入朝要衣裳以罄折夫大舜之德猶有三苗之征以周之盛獫狁為宼雖有文德又湏武備以預不虞古之善教安不忘危聖人常誡無為罷武庫之常職鑠鋒刃為農器自可倒戢干戈包以虎皮將帥之士使為諸侯於散樂休風未為不㤗也又策曰夫法令之設所以隨時制也時險則峻法以取平時㤗則寛網以將化今天下太平四方無事百姓承德將就無為而又至干律令應有所損益否對曰臣聞五帝殊禮三王異教故或禪譲以光政或干戈以攻取至於興禮樂以和人流清風以寧俗其歸一也今誠風教大同四海無虞人皆感化去邪從正夫以堯舜之盛而猶設象刑殷周之隆而甫侯制律律令之存何妨於政若乃大道四達禮樂交通凡人修行黎庶勵節刑罰懸而不用律令存而無施適足以隆太平之雅化飛仁風乎無外矣又策曰昔帝舜以二八成功文王以多士興周夫制化在於得人而賢才難得今大統始同宜搜才實州郡有貢薦之舉猶未獲出羣卓越之倫將時無其人有而致之未得其理也對曰臣聞興化立法非賢無以光其道平世理亂非才無以宣其業上自皇羲下及帝王莫不張皇網以羅遠飛仁風以被物故得賢則教興失人則教廢今四海一統萬里同風州郡貢秀孝臺府簡良才以八紘之廣兆庶之衆豈當無卓越雋逸之才乎譬猶南海不少明月之寳大宛不乏千里之駒也異哲難見逺效難覩故堯舜太平之化二八繇舜而甫顯殷湯革命之王伊尹負鼎而方用當今聖朝禮亡國之士接遐裔之人或貂蟬於帷幄或剖符於千里巡狩必有呂公之遇宵夣必有巖穴之感賢雋之出可企踵而待也時九州秀孝策無逮譚者尋除郎中紀瞻字思遠丹陽秣陵人少以方直知名舉秀才尚書郎陸機策之曰昔三代明王啓建洪業文質殊制而令名一致然夏人尚忠忠之弊也樸救樸莫若敬殷人革而修焉敬之弊也鬼救鬼莫若文周人矯而變焉文之弊也薄救薄則反之於忠然則王道之反覆其無一定邪亦所祖之不同而功業各異也自無聖王人散乆矣三代之損益百姓之變遷其故可得而聞邪今將反古以救其弊明風以蕩其穢三代之制將何所從太古之化有何異道瞻對曰瞻聞有國有家者皆欲邁化隆政以康庶績垂􅁔億載永傳于後然而俗變事弊而不隨時雖歴聖哲無以易也故忠弊質野敬失多儀周監二王之弊崇文以辨等差而流遁者歸薄而無欵誠欵誠之薄則又反之於忠三代相循如水濟火所謂隨時之義救弊之術也羲皇簡樸無為而化後聖因承所務或異非賢聖之不同世變使之然耳今大晉闡元聖功日隮承天順時九有一貫荒服之君莫不來同然而大道既逺人變繇乆謂當今之政宜去文存樸以反其本則兆庶漸化太和可致也又問在昔哲王象事備物明堂所以崇上帝清廟所以寧祖考辟雍所以班禮教太學所以講藝文此蓋有國之盛典為邦之大司亡秦廢學制度荒闕諸儒之論損益異物漢氏遺作居為異事而蔡邕月令謂之一物將何所從對曰周制明堂所以宗其祖以配上帝敬恭明祀永光孝道也其大數有六古者聖帝明王南面而聽政其六則以明堂為主又其正中皆云太廟以順天時施行法令宗祀飬老訓學講肄朝諸侯而選造士備禮辨物一教化之繇也故取其宗社之類則曰清廟取其正室之貌則曰太廟取其室則曰太室取其堂則曰明堂取其四門之學則曰太學取其周水圜如璧則曰辟雍異名同事其實一也故蔡邕謂之一物又問庶明亮采故時雍穆唐有命既集而多士隆周故書稱明良之􅁔易貴金蘭之美此長世所以廢興有邦所以崇替夫成功之君勤于求才立名之士急于招世理無世不對而事千載常背古之興王何道而如彼後之衰世何闕而如此對曰興隆之政務在得賢清平之化急於㧞才故二八登庸則百揆序有亂十人而天下㤗武丁擢傅嵓之徒周文攜渭濱之士居之上司委之國政故能龍奮天衢垂勲百代先王身下白屋搜揚仄陋使山無扶蘇之材野無伐檀之詠是以化厚物感神祗來應翔鳳飄颻甘露豐墜醴原吐液朱草自生萬物滋茂日月重光和氣四塞大道以成序君臣之義敦父子之親明夫婦之道别長幼之宜包九州被八荒海内移心重譯入貢頌聲穆穆南面埀拱也今貢賢之塗已闓而教學之務未廣是以競進之志常鋭而務學之心不修若闢四門以延造士宣五教以明令德攷績殿最審其優劣厝之百寮置之羣司使調物度宜節宣國典必協濟康哉符契往時明良來應金蘭復存也又問昔唐虞埀五刑之教周公明四罪之制故世歎清問而時􅁔緝熈姦宄既殷法物滋有叔世崇三辟之文暴秦加族誅之律淫刑淪胥虐濫已甚漢魏遵承因而弗革亦繇險㤗不同而救世異術不得已而用之故也寛尅之中將何立而可族誅之法足為永制與否對曰二儀分則兆庶生兆庶生則利害作利害之作有繇而然也太古之時化道德之教賤勇力而貴仁義仁義貴則彊不凌弱衆不暴寡三皇結䋲而天下㤗非惟象刑緝熈而已也且太古之法所以遠獄及其末不失有罪是以獄用彌繁而人彌暴法令滋章盜賊多有書曰惟敬五刑以成三德叔世道衰既興三辟而文公之弊又加誅族淫刑淪胥感傷和氣化染後代不能變改故漢祖指麾而六合響應魏承漢末因而未革將以俗變繇乆權時之宜也今四海一統人思反本漸尚簡樸則貪夫不競尊賢黜否則不仁者遠爾則斟參夷之刑除族誅之律品物各順其生緝熈異世而偕也又問曰夫五行迭代隂陽相湏二儀所以陶育四時所以化生易稱在天成象在地成形形象之作相須之道也若隂陽不調則大數不得不否一氣偏廢則萬物不得獨成此應同之至驗不偏之明証也今有溫泉而無寒火其故何也思聞以辯之以釋不同之理對曰蓋聞隂陽升降山澤通氣初九純卦潜龍勿用泉源所託其溫宜也若夫水潤下火炎上剛柔燥濕自然之性故陽動而外隂静而内内性柔弱以含容為資外動剛直以外接為用是以金水之明内鑒火日之光外輝剛施柔受陽勝隂伏水之受溫含容之性也又問曰夫窮神知化才之盡稱備物致用功之極目以之為政則黄羲之規可踵以之革亂則𤣥古之風可紹然而唐虞密皇人之闊網夏殷繁帝者之約法機心起而日進淳德往而莫反豈太樸一離理不可振將聖人之道稍有降殺邪對曰政因時以興機隨物而動故聖王究窮通之源審始終之理適時之宜期於濟世皇代質朴禍難不作結䋲為信人知所守大道既離智慧擾物夷險不同否㤗異數故唐虞密皇人之網夏殷繁帝者之法皆興廢有繇輕重有節此窮神之道知化之術隨時之宜非有降殺也永康初州又舉寒素大司馬辟東閣祭酒位終驃騎將軍散騎常侍北齊樊遜字孝謙河東猗氏人為潁州長史天保四年梁州表舉遜為秀才五年正月制詔問升中紀號遜對曰臣聞廵嶽之禮勒載虞書省方之義著於羲易往帝前王匪惟一姓封金刋玉億有餘人仲尼之觀梁甫不能盡識夷吾之對齊桓所有未幾然盛德之事必待太平茍非其人更貽靈譴秦皇無道致風雨之災漢武奢淫有奉車之害及文叔受命炎精更輝四海安流天下輯睦劒賜騎士馬駕皷車乃用張純之文始從伯陽之説至於魏晉雖各有君量德而處莫能擬議蔣濟上言於前徒穢紙墨袁淮發論於後終未施行世歴三朝年將十祀啓聖之期兹為昌㑹然自水德不競函谷封泥天馬息歌苞茅絶貢我太祖收寳鷄之瑞握鳯凰之書體一德以端朝屈三分而事主蕩此妖宼易如沃雪但既受命發乃行誅雖太白出髙中國宜戰置之度外望其遷善伏惟陛下以神武之姿天然之畧馬多冀北將異山西凉風至白露下北上太行東臨碣石方欲吞巴蜀而掃崤函苑長洲而池江漢復恐迎風縱火芝艾共焚按此六軍未申九伐夫周發牙璋漢馳竹使義在濟民非聞好戰至如投䑕忌噐之説蓋是常談文德懐逺之言豈識權道今三䑓令子六郡良家畜鋭須時褁糧待詔未若龍駕虎服先收隴右之民電轉雷驚因取荆南之地昔秦舉長平金精食昴楚攻鉅鹿枉矢霄流况我威靈能無協贊但使彼之百姓一覩六軍似見周王若逢司𨽻然後除其苛令興其約法振旅而還止戈為武摽金南海勒石山東紀天地之竒功被風聲於千載若令馬兒不死子良尚存便欲按明堂之圖草射牛之禮比德論功多慙往列升中告禪臣用有疑又問求才審官孝謙對曰臣聞雕虎􅀞龍徒有風雲之勢金舟玉馬終無水陸之功三駕禮賢將收實用一毛不㧞復何足取是以堯作虞賓遂全箕山之操周移商鼎不納孤竹之言但處士盗名雖云乆矣朝臣竊位蓋亦實多漢拜丞相便有鐘皷之妖魏用三公乃致孫權之笑故山林之與朝廷得容非毁肥遯之與賓王翻有優劣至於時非蹈海而曰羞作秦民事異出闗而言恥從衛亂雖復星干帝座不易髙尚之心月犯少微終存耿介之志自我太嶽之後克廣洪基禹至神宗舜格文祖陛下受天明命光華日月爰自納麓乃格文祖儀天地以設官象星辰而布職漢家神鳳慙用紀年魏氏青龍羞將改號上膺列宿咸是異人下法山川莫非竒士所以􅀞堂甲觀修德日新廟鼎􅁔鐘王勲嵗委循名責實選衆舉能朝無銅臭之公世絶錢神之論昔百里相秦名存雀籙蕭張輔沛姓在河書今日公卿抑亦天授與之為治何欲不從未必稽首天師方聞牧馬之術膝行山上乃得治身之道但使帝德休明自强不息乙夜觀書支日通奏周昌桀紂之論欣然開納劉毅桓靈之比終自含𢎞髙懸王爵唯能是與管庫靡遺漁鹽畢録無令桓譚非讖官止於郡丞趙壹負才溘死於計掾則天下宅心幽明知感嵗精仕漢風伯朝周眞人去而復歸台星折而還歛詩稱多士易載羣龍從此而言可以無愧又問釋道兩教孝謙對曰臣聞天道性命聖人所不言蓋以理絶渉求難為稱謂伯陽道德之論荘周逍遙之㫖遺言取意猶有可尋至若玉簡金書神經秘録三元九轉之竒絳雪𤣥霜之異淮南成道犬吠雲中王喬得仙劒飛天上皆是慿虚之説海棗之談求之如係風學之如捕影而燕君齊后秦皇漢帝信彼方士冀遇其眞徐福去而不歸欒大往而無獲猶謂升遐倒影抵掌可期祭鬼求神庶或不死江璧既返還入驪山之墓龍媒已至終下茂陵之坟方知劉向之信鴻寳没有餘責王充之非武帝比為不相又末葉已來大存佛教寫經西土畵像南宫昆池地黒以為刼燒之灰春秋夜明謂是降神之日法王自在變化無窮置世界於微塵納湏彌於黍米蓋理本虛無示諸方便而妖妄之軰茍求出家藥王燔軀波斯灑血假未能然猶當克念寧有改形易貌有異世人恣意放情還同俗物龍宫餘論鹿野前言此而得容道風前墜伏惟陛下受天明命屈已濟民山鬼効靈海神率職湘中石鷰沐時雨而羣飛䑓上銅烏愬和風而杓轉以周都洛邑治在鎬京漢宅咸陽魂歸豐沛汾晉之地王迹始維眷言遊幸且勞經畧猶復降情文苑斟酌百家想執玉於瑶池念求珠於赤水竊以王母獻環繇感周德上天賜佩實報禹功二班勒史兩馬製書未見三世之辭無聞一乘之㫖帝樂王禮尚有時而㳂革左道怪民亦何疑於沙汰又問刑罰寛猛孝謙對曰臣聞惟王建國刑以助禮猶寒暑之贊隂陽山川之通天地爰自末葉法令稍滋秦篆無以窮書楚竹不能盡載有司因此開以二門髙下在心寒暑隨意周官三典棄之若吹毛漢律九章違之如覆手遂使長平獄氣得酒而始消東海孝婦因災而方雪詔書挂壁有善而莫遵姦吏到門無求而不可皆繇上失其道民不見德而議者守迷不尋其本鍾繇王朗追怨張倉祖納梅陶共尤文帝便謂化屍起偃在復肉刑致治興邦無闗周禮伏惟陛下待旦坐朝留心政術明罰以糾諸侯申恩以孩百姓黄旗紫蓋已絶東南白馬素車將降軹道若夫峻典深文臣實未悟何則人肖天地俱禀隂陽安則願存擾則圖死故王者之治先務禮樂如有未從刑書乃用寛猛兼設水火俱陳未有專任商韓而能長乆昔秦歸士㑹晉盜來奔舜舉臯陶不仁者逺但令釋之定國迭作理官龔遂文翁繼為郡守科簡律令一此憲章欣聞汲黯之言泣㫁昭平之罪則天下自治大道公行豸獸含牙蒼鷹垂翅楚王錢府不復頒封漢獄寃囚自然蒙理後服之徒既承風而慕化有截之内皆蹈德而詠仁號以成康何難之有又問禍福報應孝謙對曰臣聞五方易辨尚待指南百世可知猶湏吹律天道秘遠神迹難原不有通霛孰能盡悟乘槎至於河漢唯覩牽牛假􅄰遊於上𤣥止逢翟犬造化之理既寂寞而無傳報應之來固難得而妄説但秦穆有道勾芒錫年虢公凉德蓐收降禍髙明在上定自有知不可謂神㝠昧難信若夫仲尼厄於陳蔡孟軻困於齊梁自是不遇其時寧闗性命之理子胥無君馬遷腐下受誅取辱何可尤人至如協律見親擢舩得幸從此而言更不足怪周王漂杵致天之罰白起誅降行已之意是以七百之祚仍加姬氏杜郵之戮還屬武安昔漢問上計不過日蝕晉策秀才止於寒火前賢往士咸用為難推古比今臣見其易然草萊百姓過荷恩私三拆寒膠再遊金馬王言昭賁思若有神占對失圖伏深悚懼尚書擢第以遜為當時第一八年詔尚書開東西二省官選所司策問遜為當時第一册府元龜卷六百四十八
