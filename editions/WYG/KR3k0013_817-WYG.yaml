body:
  text: 册府元龜卷八百十七宋王欽若等撰摠錄部訓子第二南齊劉懷民平原人仕宋為齊北海二郡太守子善明年四十刺史劉道隆辟為治中從事懷民謂善明曰我已知汝立身復欲見汝立官也王僧䖍為侍中兄子儉為朝宰起長梁齋制度小過僧䖍視之不悦竟不入户儉即毁之僧䖍嘗有書誡子曰知汝恨吾不許汝學欲自悔厲或以闔棺自欺或更擇美業且得有慨亦慰窮生但亟聞斯唱未覩其實請從先師聽言觀行冀此不復虗身吾未信汝非徒然也徃年有意於史取三國志聚置床頭百日許復徙業就𤣥𤣥自當小差於史猶未近彷彿曼倩有云談何容易見諸𤣥志為之逸腸為之抽專一書轉通數十家注自㓜至老手不釋卷尚未敢輕言汝開老子卷頭五尺許未知輔嗣何所道平叔何所説馬鄭何所異指例何所明而便盛旋麈尾自呼談士此最險事設令袁令命汝言易謝中書挑汝言莊張吳興叩汝言老端可復言未嘗看邪談故如射前人得破後人應解不解即輸賭矣且論注百氏荆州八􅐆又才性四本聲無哀樂皆言家口實如客至之有設也汝皆未經拂耳瞥目豈有庖厨不修而欲延大賔者哉就如張衡思侔造化郭象言類懸河不自勞苦何繇至此汝曽未窺其題目未辨其指歸六十四卦未知何名莊子衆篇何者内外八􅐆所載凡有幾家四本之稱以何為長而終日欺人人亦不受汝欺也繇吾不學無以為訓然重華無嚴父放勲無令子亦各繇已耳汝輩竊議亦當云阿越不學在天地間可嬉戱何忽自課讁幸及盛時逐嵗暮何必有所減汝見其一耳不全爾也設令吾學如馬鄭亦必甚勝復倍不如今亦必大減致之有繇從身上來也汝今壯年自勤數倍許勝劣及吾耳世中比例舉眼皆是汝足知此不復具言吾在世雖乏德業要復推排人間數十許年故是一舊物人或以比數汝等耳即化之後若自無調度誰復知汝事者舎中亦有少負令譽弱冠超越清級者於時王家門中優者則龍鳳劣者猶虎豹失䕃之後豈龍虎之議况吾不能為汝䕃正應各自努力耳或有身經三公蔑爾無聞布衣寒素卿相屈體或父子貴賤殊兄弟聲名異何也體盡讀數百卷書耳吾今悔無所及欲以前車誡爾後乗也汝年入立境方應從官兼有室累牽役中情何處復得下帷如王郞時邪為可作世中學取過一生耳試復三思勿諱吾言猶捶撻志輩志輩為僧䖍子志及彬寂等冀脱萬一未死之間望有成就者不知當有益否各在爾身已切身豈復闗吾邪愧唯知愛深松茂栢寜知子弟毁譽事因汝有感故略叙胸懐耳王志侍中特進僧䖍子其弟寂建武初欲獻中興頌志謂之曰汝膏梁年少何患不逹不鎮之以静將恐貽譏寂乃止寂卒為秘書郞吕安國為湘州刺史有疾徴為光祿大夫加􅄆騎常侍安國欣有文授謂其子曰汝後勿作袴褶驅使單衣猶恨不稱當為朱衣官也陳顯達為侍中鎮軍將軍有子十餘人誡之曰我本志不及此汝等勿以富貴凌人復謂其子曰麈尾扇是王謝家物汝不須捉此自隨張融為司徒左長史永明中遇疾為門律自序曰吾文章之體多為世人所驚汝可師耳以心不可使耳為心師也夫文豈有常體但以有體為常正當使常有其體丈夫當刪詩書制禮樂何至因循寄人籬下且中代之文其體闕變尺寸相資彌縫舊物吾之文章體亦何異何常顛温涼而錯寒暑綜哀樂而横歌哭哉正以屬辭多出比事不羇不阡不陌非途非路耳然其傳音振逸鳴節竦異或當未極亦已極其所矣汝若復别得體者吾不拘也吾義亦如文造次乗我顛沛非物吾無師無友不文不句頗有孤神獨逸耳義之為用將使性入清波塵洗猶沐無得釣聲同利舉價如髙俾是道塲險成軍路吾昔嗜僧言多肆法辨此盡遊乎言笑而汝等無幸又云人生之口正可論道説義唯飲與食此外如樹網焉吾每以不爾為恨爾曹當振綱也臨卒又誡其子曰手澤存焉父書不讀沉父音情婉在其韻吾意不然别遺爾旨吾文體英絶變而屢竒豈吾天挺盖不隤家聲汝可號哭而看之周顒為中書侍郎有名於時子捨㓜聰頴顒異之臨卒謂曰汝不患不富貴但當將之以道德王騫太尉儉之子為黄門郞司徒右長史性凝簡不狎當世嘗從容謂諸子曰吾家門户本素族自然隨流可進不須茍求也梁韋叡為䕶軍將軍􅄆騎常侍雖老暇日猶課諸兒以學第三子稜尤明經史世稱其洽聞叡每坐稜便説書其所發摘稜猶弗之逮也徐勉為中書令嘗為書誡其子崧曰吾家世清廉故常居貧素至於產業之事所未嘗言非直不經營而已薄躬遭逢遂至今日尊官厚祿可謂備之每念叨竊若斯豈繇才致幸藉先代風範及以福慶故臻此耳古人所謂以清白遺子孫不亦厚乎又云遺子黄金滿籯不如一經詳求此言信非徒語吾雖不敏實有本志庻得遵奉斯義不敢墜失所以顯貴以來將三十載門人故舊亟薦便宜或使創闢田園或勸興立邸店又欲舳艫運致亦令貨殖聚斂若此衆事皆距而不納非謂㧞葵去織且欲省其紛紜中年聊於東田閒營小園者非存播藝以要利正欲穿池種樹少寄情賞又以郊際閑曠終可為宅儻獲懸車致事實欲歌哭於斯慧日十住等既應營婚又須住止吾清明門宅無相容處所以爾者亦復有以前割西邉施宣武寺既失西廂不復方幅意亦謂此逆旅舍耳何事須華嘗恨時人謂是我宅古往今來豪富繼踵高門甲第連闥洞房宛其死矣定是誰室但不能為培塿之山聚石移菓雜以花卉以娱休沐用託性靈隨便架立不在廣大惟功德處小以為好所以内中逼仄無復房宇近營東邉兒孫二宅乃藉十住南還之資其中所須猶為不少既牽挽不至又不可中塗而輟郊間之園遂不辦保貨與韋黯乃獲百金成就兩宅已消其半尋園價所得何以至此繇吾經始歴年粗已成立桃李茂宻桐竹成隂塍陌交通渠畎相屬華樓逈榭頗有臨眺之美孤峯叢薄不無糾紛之興瀆中並饒菰蔣湖裏殊富芰蓮雖云人外城闕宻邇韋生欲之亦雅有情趣追述此事非有希心盖是筆勢所至耳憶謝靈運山家詩云中為天地物今成鄙夫有吾此園有之二十載矣今為天地物物之與我相校幾何哉此吾所餘今以分汝營小田舍親累既理亦須此且釋氏之教以財物謂之外命儒典亦稱何以聚人曰財况汝曹常情安得忘此聞汝所買姑熟田地甚為舄鹵彌復可安所以如此非物競故也雖事異寢丘聊可髣髴孔子曰居家治理可移於官既已營之宜使成立進退兩亡便貽恥笑若有所收穫汝可自分贍内外大小宜令得所非吾所知又復應沾之諸女耳汝既居長故有此及凡為人長殊復不易當使中外諧緝人無間言先物後己然後可貴老子云後其身而身先若能爾者更招巨利汝當自朂見賢思齊不宜忽略以棄日也棄日乃是棄身身名美惡豈不大哉可不慎歟今之所勅略言此意正謂為家已來不成資產既立墅舍以乖舊業陳其始末無愧懐抱兼吾年時朽暮心力稍殫牽課奉公略不克舉其中餘暇聊可自休或復冬日之陽夏日之隂良辰美景文案間隙負杖躡屫逍遙陋舘臨池觀魚披林聽鳥濁酒一杯彈琴一曲求數刻之暫樂庶居常以待終不宜復勞家間細務汝交闗既定此書又行凡所資須付給如别自兹以後吾不復言及田事汝亦勿復與吾言之假使堯湯水旱吾豈知如何若其溢庾盈箱爾之幸遇如斯之事並無俟令吾知也記云夫孝者善繼人之志善述人之事今且望汝述吾志則無所恨矣王筠為秘書監光禄大夫與諸兒書論家世集云史傳稱安平崔氏及汝南應氏並累世有文才所以范蔚宗世擅雕龍然不過父子兩三世耳非有七葉之中名德重光爵位相繼人人有集如吾門世者也沈少傅約語家人云吾少好百家之言身為四代之史自開闢以來未有爵位蟬聨文才相繼如王氏之盛者也汝等仰觀堂構思各努力謝幾卿為威戎將軍南平王長史兄才卿早卒其子藻㓜孤幾卿撫飬甚至及藻成立歴官清慎皆幾卿奬訓之力也世以此稱之藻歴官祭酒主簿王褒著㓜訓以誡諸子其一章云陶士行曰昔大禹不吝尺璧而重寸隂文士何不誦書武士何不馬射若乃立冬修夜朱明長日肅其居處崇其牆仭門無揉雜坐無號呶以之求學則仲尼之門人也以之為文則賈生之外堂也古者盤盂有銘几杖有誡進退修焉俯仰觀焉文王之詩曰靡不有初鮮克有終立身行道終始若一造次必於是君子之言歟儒家則尊卑差等吉凶隆殺君南靣而臣北靣天地之義也鼎俎竒而籩豆偶隂陽之義也道家則墮肢體黜聰明棄義絶仁離形去智釋氏之義也義見苦斷集證滅修道明因辨果俾凡成聖斯雖為教差等而義歸汲引吾始乎㓜學及於知命既崇周孔之教兼修老釋之談江左以來斯業不墜汝能修之吾之志也何昌㝢為侍中驍騎將軍從子烱嘗慕恬退不樂進仕昌㝢謂曰求㸃皆已高蹈汝無宜復爾且君子出處亦各一途求㸃皆何氏諸從也後魏源賀為太尉遺令勅諸子曰吾頃以老患辭事不悟天慈降恩爵逮於汝汝其毋傲吝毋荒怠毋奢佚毋嫉妬疑思問言思審行思恭服思度遏惡揚善親賢逺佞目觀必真耳屬必正誠勤以事君清約以行已吾終之後所𦵏時服單櫝足申孝心芻靈明器一無用也刁雍為特進征南大將軍汎施愛士恬静寡欲篤信佛道著教誡二十餘篇以訓𨗳子孫陸崇教訓六子雅有法度楊椿為太保侍中致政椿臨行誡子孫曰我家入魏之始即為上客給田宅賜奴婢馬牛羊遂成富室自爾至今二十年二千石方伯不絶禄恤甚多至於親姻知故吉凶之際必厚加贈襚來往賔僚必以酒肉飲食是故親姻朋友無憾焉國家初士夫好服綵色吾雖不記上谷翁時事然記清河翁時服餙見翁著布衣韋帶常約勅諸子曰汝等後世脱若富貴於今日者慎勿積金一斤綵帛百疋已上用為富也又不聽治生求利又不聽與世家作婚姻至吾兄弟不能遵奉今汝等服乗以漸華好吾是以知恭儉之德漸不如上世也又吾兄弟若在家必同盤而食若有近行不至必待其還亦有過中不食忍飢相待吾兄弟八人今存者有三是故不忍别食者也又願畢吾兄弟世不異居異財汝等眼見非為虛假如聞汝等兄弟時有别齋獨食此又是不如吾等一世也吾今日不為貧賤然居住舍宅不作壯麗華餙者正慮汝等後世不賢不能保守之方為勢家所奪北都時朝法嚴急太和初吾兄弟三人並居内職兄在高祖左右吾與津在文明太后左右於時口勅責諸内官十日仰宻得一事不列便大瞋嫌諸人多有依勅宻列者亦有太后高祖中間傳言搆間者吾兄弟自相誡曰今忝二聖近臣居母子間甚難宜深慎之又列人事亦何容易縱被瞋責慎勿輕言十餘年中不嘗言一人罪過當時大被嫌責答曰臣等非不聞人語正恐不審仰誤聖聽是以不敢言於後終以不言蒙賞及二聖間言語終不敢輙爾傳通太和二十一年吾從濟州來朝在清徽堂豫讌高祖謂諸王諸貴曰北京之日太后嚴明吾每得杖左右因此有是非言語和朕母子者惟楊椿兄弟遂舉爵賜兄及我酒汝等脱若萬一蒙時主知遇宜深慎言語不可輕論人惡也吾自惟文武才藝門望姻援不勝他人一旦登位侍中尚書四歴九卿十為刺史光禄大夫儀同開府司徒太保津今復為司空者正繇忠貞小心謹慎口不嘗論人過無貴無賤待之以禮以是故至此耳聞汝等學時俗人乃有坐而待客者有驅馳勢門者有輕論人惡者及見貴勝則敬重之見貧賤則慢易之此人行之大失立身之大病也汝家仕皇魏以來高祖以下乃有七郡太守三十二刺史内外顯職時流少比汝等若能存禮節不為奢淫驕慢假不勝人足免尤誚足成名家吾今年始七十五自惟氣力尚堪朝覲天子所以孜孜求退者正欲使汝等知天下滿足之義為一門法耳非是茍求千載之名也汝等能記吾言吾百年之後終無恨矣崔光韶為廷尉卿永安末擾亂之際遂還鄉里誡子孫曰吾自謂立身無慙古烈但以禄命有限無容希進在官以來不冐一級官雖不逹經為九卿且吾平生素業足以遺汝官閥亦何足言也吾既運薄便經三娶而汝之兄弟各不同生合𦵏非古吾百年之後不須合也然贈謚之及出自君恩豈容子孫自求之也勿須求贈若違吾志如有神靈不享汝祀吾兄弟自㓜及老衣服飲食未嘗一片不同至於兒女冠婚榮利之事未嘗不先以推弟弟頃罹横禍權作松襯亦可為吾作松棺使吾見之卒七十一孝静初侍中賈思同申啓稱述光韶贈散騎常侍驃騎將軍青州刺史甄琛為黄門侍郞時李謐博通諸經不就徴辟琛謂其子曰昔鄭𤣥盧植不逺數千里詣扶風馬融今汝明師甚邇何不就業也北齊魏収為左光祿大夫行齊州刺史以子姪少年申以戒勵著枕中篇其詞曰吾曽覽管子之書其言曰任之重者莫如身途之畏者莫如口期之逺者莫如年以重任行畏途至逺期惟君子為能及矣追而味之喟然長息若夫嶽立為重有潛載而不傾山藏稱固亦趨負而弗停吕梁獨浚能行歌而匪惕焦原作險或削踵而不驚九陔方集故眇然而迅舉五紀當定想窅乎而上征茍任重也有度則任之而愈固乗危也有術盖乗之而靡恤彼期逺而能通果應之而可必豈神理之獨爾亦人事其如一嗚呼處天壤之間勞死生之地攻之以嗜欲牽之以名利梁肉不期而共臻珠玉無足而俱致於是乎驕奢仍作危亡旋至然則上知大賢唯幾唯哲或出或處不常其莭其舒也濟世成務其卷也聲銷迹滅玉帛子女椒蘭律吕謟䛕無所先稱肉度骨膏脣挑怨惡莫生勲名共山河同久志業與金石比堅斯盖厚棟不撓遊刄砉然逮於厥德不常䘮其金璞馳騖人世皷動流俗挾陽日而謂寒包溪壑而未足源不清而流濁表不端而影曲嗟乎膠漆詎堅寒暑甚促反利而成害化榮而就辱欣戚更來得䘮仍續至有身禦魑魅魂沉狴獄詎非足力不强迷在當局孰可謂車戒前傾人師先覺聞諸君子雅道之士遊遨經術厭飫文史筆有竒鋒談有勝理孝悌之至神明通矣審蹈而行量路而止自我及物先人後己情無繫於榮悴心靡滯於愠喜不養望於丘壑不待價於城市言行相顧慎終猶始有一於斯鬱為羽儀恪居䘮事知無不為或左或右則髦士攸宜無悔無吝故高而不危異乎勇進忘退茍得患失射千金之產徼萬鍾之秩投烈風之門起炎火之室載蹶而墜其貽宴或蹲乃䘮其貞吉可不畏歟門有倚禍事不可不宻牆有伏㓂言不可而失宜諦其言端其行言之不善行之不正鬼執强梁人囚逕廷幽奪其魄明夭其命不服非法不行非道公鼎為己信私玉非身寳過淄為紺踰藍作青持繩視直置水觀平時然後取未若無欲知止知足庻免於辱是以為必察其幾舉必慎於㣲知幾慮㣲斯亡則稀既察且慎福禄攸歸昔蘧瑗識四十九年非顔子仁幾三月不違跬步無已至於千里覆一簣進及於萬仭故云行逺自邇登髙自卑可大可久與世推移月滿如規後夜則虧槿榮於枝望暮而萎夫奚益而不損孰有損而不害益不欲多利不欲大唯居德者畏其甚體真者懼其大道尊則羣謗集任重而衆怨㑹其逹也則尼父栖遑其忠也而周公狼狽無曰人之我狹在我不可而覆無曰人之我厚在我不可而咎如山之大無不有也如谷之虛無不受也能剛能柔重可負也能信能順險可走也能智能愚期可久也周廟之人三緘其口漏巵在前欹器留後俾諸來裔傳之座右宋遊道為御史中尉兼太府卿剛直使氣每戒其子曰吾數遭屯蹇性自如此子孫不足以師之諸子奉父言柔和謙遜顔之推字介為黄門侍郎撰家訓二十篇行於世後周于謹為太傅大宗伯參議朝政每教訓諸子務存静退子孫繁衍皆至顯逹當時莫比焉賀若敦為忠州刺史鎮函谷為晉公䕶所怒徴還逼令自殺臨刑呼子弼語曰吾必欲平江南然心不果汝當成吾志吾以舌死汝不可不思因引錐刺弼舌出血誡以慎口隋牛𢎞為右光祿大夫𢎞常謂其諸子曰吾受非常之遇荷恩深重汝等子孫宜以誠敬自立以答恩遇之隆也趙軌為齊州别駕其東鄰有桑椹落其家軌遣人悉拾還其主誡其諸子曰吾非以此求名意者非機杼之物不願侵人汝等宜以為誡房彦謙居家每子姪定省嘗為講説督勉之亹亹不倦終於涇陽令裴矩字𢎞大襁褓而孤及長好學頗愛文藻有智數世父讓之謂矩曰觀汝神識足成才士欲求宦逹當資幹世之務矩始留情世事後入唐朝官至民部尚書唐李襲譽為太府卿每謂子孫曰吾性不好貨財遂至貧乏然吾近京城有賜田十頃耕之可以充食河内有賜桑千樹事之可以充衣江東所冩書讀之可以得官吾殁之後爾曹但能勤此一事亦何羡於人房𤣥齡嘗誡諸子以驕奢沉溺必不可以地望陵人故集古今聖賢誡子書於屏風令各取其一因曰若能留意足以保身成名又云我家累葉忠莭是吾所尚汝宜師遵王友貞琅琊人素好學於九經讀皆百遍訓誨子弟如嚴君焉劉晏善訓諸子咸有學藝李叔明建中初為東川節度及駕幸奉天其子昇翊從有功叔明每私疏誡勵見危臨難當誓以死昇奉父嚴訓果著勲效識者嘉之穆寜通逹體命不嘗服藥每誡諸子曰吾聞君子之事親養志為大直道而已慎無為謟吾之志也張茂昭為武寜節度使自祿山之亂兩河繼為阻命之地茂昭表請舉族歸闕遣其妻李氏及男克讓克恭等先焉將行戒之曰爾曹將侍親出易定後之子孫勿為風俗所染吾無恨矣田融魏博節度興之兄興㓜孤融睦友而教𨗳之㑹軍中分曹習射以角勝負興發矢連中融退抶而責曰爾不能自晦取禍之道也故興於暴亂之時能全其身而致其位及興之節制六州請融為屬郡守朝廷察興誠不忍離其兄故特授焉令狐彰為義成軍節度使臨行誡子以忠孝守節柳玭為御史大夫玭嘗著書誡其子弟曰夫門第髙者可畏不可恃可畏者立身行已一事有墜先訓則罪大於他人雖生可以苟取名位死何以見祖先於地下不可恃者門髙則自驕族盛則人之所嫉實藝懿行人未必信纎瑕㣲累十手爭指矣所以脩已不得不懇為學不得不堅夫人生世以己無能而望他人用以己無善而望他人愛無狀則曰我不遇時時不急賢亦猶農夫鹵莽種之而怨天澤之不潤雖欲弗餒其可得乎予㓜聞先訓講論家法立身以孝悌為基以恭黙為本以畏怯為務以勤儉為法以交結為末事以氣義為凶人肥家以忍順保友以簡敬百行備疑身之未周三緘宻慮言之或失廣記如不及求名如儻來去奢與驕庻幾減過蒞官則潔己省事而後可以言守法守法而後言養人直不近禍廉不沽名廩祿雖㣲不可易黎甿之膏血榎楚雖用不可忽褊狹之胸襟憂與福不偕潔與富不並比見家門子孫其先正直當官耿介特立不畏强禦及其衰也唯好犯上更無他能如其先遜順處已和柔保身以逺悔尤及其衰也但有暗劣莫知所宗此際幾微非賢不逹夫壞名菑己辱先䘮家其失尤大者五宜深志之其一自求安逸靡甘淡泊茍利於己不恤人言其二不知儒術不悦古道懵前經而不恥論當世而解頤身既寡知惡人有學其三勝己者厭之佞已者悦之唯樂戱譚莫思古道聞人之惡揚之浸漬頗僻銷刓德義簪裾徒在厮飬何殊其四崇尚慢遊躭嗜麴糵以銜盃為髙致以勤事為俗流習之易荒覺已難悔其五急於名宦匿近權要一資半級雖或得之衆怒羣猜鮮有存者兹五不韙甚於痤疽痤疽則砭石可瘳五失則巫醫莫及前賢明誡方册具存近代覆車聞見相接夫中人以下修辭力學者躁進患失思展其用審命知退者則業荒文蕪一不足採唯上智則研其慮博其聞堅其習精其業用之則行舍之則藏苟異於斯豈為君子韓叔豐華州節度使建之父乾寜末建逼昭宗殺中山都將李筠教近衛諸軍害其八王册德王為皇太子及李塘奔入鳳翔兼領同州乃修南莊起樓觀欲為南内行廢立之事叔豐見其䟦扈謂建曰汝陳許一白丁乗時危亂位至方牧不能感君父之恩欲以同華兩州百里之地行其廢位覆族在旦暮矣吾不如先自裁免為爾所累繇是建稍稍而沮其志後唐符存審為幽州盧龍節度使檢校太師中書令嘗戒諸子曰予本寒家少小擕一劒而違郷里四十年間位極將相其間屯危患難履鋒冐刄入萬死而無一生身方及此前後中矢至百餘乃出鏃以示諸子因以奢侈為戒劉玭魏州人為縣令子贊㓜有文性玭誨以詩書志學之年夏月青布襦單衫玭每食肉食别於牀下置蔬食以飯贊謂之曰肉食君之祿也爾欲食肉則苦心文藝自可致之吾祿不可分也繇是贊既及冠有文辭三十餘舉進士錢寛為杭越節度使鏐之父鏐嘗於臨安故里興造第舍窮極壯麗嵗時遊於里中車從雄盛萬夫羅列寛每聞鏐至竄避之鏐即徒步訪寛請言其故寛曰吾家世田漁為事未嘗有貴逹如此爾為十三州上將三靣受敵與人争利吾所以不忍見汝矣鏐即泣謝之晉髙漢筠在常山嘗戒其子曰吾遊歴多矣觀風俗淳厚以經術相尚罕得如此地者教子訓孫可為終焉之計因負郭鑿荒為田種樹成圃凡議婚嫁必接士人竟𦵏於常山從其欲也漢筠官至左驍衛大將軍内客省使漢張瓘同州車渡村人故太原監軍使承業之猶子也承業佐後唐武皇莊宗有功甚見委遇瓘聞之與昆仲五人自故里奔於太原莊宗皆任用之瓘天祐十三年補麟州刺史承業治家嚴毅小過無所容恕一姪為磁州副使以其殺河西賣羊客承業立捕斬之常誡瓘等曰爾等係車渡村百姓豈如劉開道等賊慣作非為今須改行若故態不除死無日矣故瓘所至不敢誅求册府元龜卷八百十七
