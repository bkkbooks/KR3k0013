body:
  text: 冊府元龜卷八百九宋王欽若等撰總録部隱逸夫隱居以求志遯世而無悶含華匿耀髙翔逺引非夫德充而義富學優而誠篤又孰能懷道自晦絶俗而孤舉哉故仲尼之序逸民馬遷之述隱君子班范而下罔不論次焉觀其明哲兼茂卷懷自得潔己而無汚亢節而靡屈遺榮去羨保和養素忘機委順達天遂命得喪不嬰其慮悔吝靡集其躬乃至形于話言晦其名氏混於屠釣同其出處辭避徵聘轉造窮僻屏跡長往流風莫挹人遐室邇形於歎息斯固素履之君子考槃之碩人視富貴如浮雲入山林而不返者與牧者不知姓名齊人也吳延陵季子遊於齊見遺金呼牧者取之牧者曰何子居之髙而視之下也貌之君子而言之野也吾有君不臣有侯不友暑衣葛寒衣裘吾豈取金者乎延陵子知其為賢者請問姓字牧者曰子乃皮相之士也何足語姓字哉遂去延陵季子立而望之不見乃止老子脩道德為周守藏室之史孔子往問禮焉其學以自隱無名為務居周久之見周之衰乃遂去孔子死後百二十九年而周太史儋見秦獻公或曰儋即老子或曰非也世莫知其然否老子隱君子也楚狂接輿歌而過孔子接輿楚人佯狂而來歌欲以感切孔子也曰鳳兮鳳兮何德之衰比孔子為鳳待聖王乃見非孔子周行求合故曰衰也往者不可諫已往所行不可復諫止也來者猶可追自今已來可追自止避亂隱居已而已而今之從政者殆而言已而者言世亂已甚不可復治也再言之者傷之深也孔子下欲與之言下下車也趨而辟之不得與之言長沮桀溺耦而耕孔子以為隱者使子路問津焉長沮曰彼執輿者為誰子路曰為孔丘曰是魯孔丘與曰然曰是知津矣言數周流自知津處桀溺謂子路曰子為誰曰為仲由曰子孔丘之徒與曰然桀溺曰滔滔者天下皆是也而誰以易之滔滔者流而不反之意言當今天下治亂同空舍此彼適故曰誰以易且而與其從辟人之士豈若從辟世之士哉士有辟人之法有辟世之法長沮桀溺謂孔子之為士從辟人之法者也己之為士則從辟世之法也耰而不輟耰覆種也輟止也覆種不止不以津告也子路行以告孔子憮然為其不達己意而非己曰鳥獸不可與同羣隱于山林是同羣天下有道丘不與易也凡天下有道者丘皆不與易也己大而人小故也晨門者石門之閽人也子路宿於石門晨門曰奚自子路曰自孔氏曰是知其不可而為之者與言孔子知世不可為而强為之有荷蕢而過門者曰有心哉擊磬乎時孔子擊磬於衛蕢草器也有心契契然也硜硜乎莫己知也斯己而己矣此硜硜者徒信己而己言亦無益也深則厲淺則掲以衣渉水為厲掲掲衣也言隨世之行己若過水必以濟知其不可則當不為子曰果哉末之難矣未知己志而便譏己所以為果丈人以杖荷篠丈人老人也篠竹器子路問曰子見夫子乎丈人曰四體不勤五榖不分孰為夫子丈人云不勤勞四體不分植五榖誰為夫子而索之邪植其杖而芸植倚也除草曰芸子路拱而立未知所以答止子路宿殺雞為黍而食之見其二子焉明日子路行以告夫子曰隱者也使子路反見之至則行矣子路反至其家丈人出行不在伯夷叔齊虞仲夷逸朱張栁下惠少連此七人皆逸民之賢者顔闔得道之人也魯君聞之使人以幣先焉顔闔守閭麄布之衣而自飯牛魯君之使者至顔闔自對之使者曰此顔闔之家耶顔闔對曰此闔之家也使者致幣顔闔對曰恐聽謬而遺使者罪不若審之恐誤謬致幣而得罪故勸令審之也使者還審之後來求之則不得顔闔踰垣而逃之故不得漢東園公甪里先生綺里季夏黄公年皆八十有餘鬚眉皓白四人者皆以髙祖慢侮人故逃匿山中義不為漢臣安丘望之少治老子經恬靜不求進宦號曰安丘丈人成帝聞欲見之望之辟不肯見為巫醫於人間也谷口鄭子真蜀嚴君平地理志謂君平為嚴尊三輔決録云子真名樸君平名遵則君平子真皆其字也皆修身自保非其服弗服非其食弗食大將軍王鳳以禮聘子真子真遂不詘而終君平卜筮成都市杜陵李彊素善揚雄久之為益州牧喜謂雄曰吾真得嚴君平矣雄曰君備禮以待之彼可見而不可得詘也彊心以為不然及至蜀致禮與相見卒不敢言以為從事乃歎曰揚子雲誠知人君平年九十餘遂以其業終蜀人愛敬至今稱焉後漢梅福為南昌尉居家嘗以讀書養性為事平帝元始中王莽顓政福一朝棄妻子去九江至今傳以為仙其後人有見福於㑹稽者變姓名為吳市門卒涪翁者不知何出嘗漁釣於涪水因號涪翁乞食人間見有疾者時下針石輒應手效乃著針經診脈法傳於世弟子程髙尋求積年翁乃授之髙亦隱跡不仕逢萌北海都昌人也居瑯邪勞山養志脩道光武詔書徵萌萌以老耊迷路東西語使者云朝廷所以徵我者以其益於政尚不知方向所在安能濟時乎即便駕歸連徵不起以夀終王霸字孺仲太原廣武人也少有清節建武中徵至尚書拜稱名不稱臣有司問其故霸曰天子有所不臣諸侯有所不友司徒侯霸讓位於霸閻陽毁之曰太原俗黨孺仲頗有其風遂止太原多晉公族子孫以詐力相傾矜夸功名報仇過直漢興號為難化以病歸隱居守志茅屋蓬户連徵不至以壽終淳于恭不慕榮名州郡連召不應建武中郡舉孝亷司空辟皆不應客隱瑯邪黔陬山數十年嚴光字子陵㑹稽餘姚人少有髙名與光武同逰學及光武即位光乃變名姓隱身不見帝思其賢乃令以物色訪之後至舍於北軍車駕幸其館良久乃張目熟視曰昔唐堯著德巢父洗耳士故有志何至相迫乎除為諫議大夫不屈乃耕於富春山建武十七年復特徵不至終於家馮胄隱處山澤不應徵辟樊英南陽魯陽人隱於壺山之陽受業者四方而至州郡前後禮請不應公卿舉賢良方正有道皆不行鄭敬字次都清志髙世光武連徵不至隱處於大陂中逢隂就虞延並避不行同郡鄧敬因折茭為坐以荷薦肉瓠以盛酒言談彌日蓬廬草門琴書自娛野王二老者不知何許人也初光武貳於更始㑹闗中擾亂遣前將軍鄧禹西征送之於道既反因於野王獵路見二老者即禽即就也光武問禽何向並舉手西指言此多虎臣每即禽虎亦即臣大王勿往也光武曰茍有其備虎亦何患父曰何大王之謬邪昔湯即桀於鳴條而大城於亳武王亦即紂於牧野而大城於郟鄏彼二王者其備非不深也是以即人者人亦即之雖有其備庸可忽乎光武悟其㫖顧左右曰此隱者也將用之辭而去莫知所在向長字子平河内朝歌人隱居不仕性尚冲和好通老易王莽大司空王邑辟之連年乃至欲薦之於莽固辭乃止潛隱於家讀易至損益卦喟然數曰吾已知富不如貧貴不如賤但未知死何如生耳建武中男女娶嫁既畢勅斷家事勿相闗當如我死也於是遂肆意與同好北海禽慶俱逰五嶽名山竟不知所終王君公平原人曉隂陽懷德穢行王莽末遭亂儈牛自隱儈謂平㑹兩家賣買之價時人為之語曰避世牆東王君公嵇康髙士傳曰君公明易為郎數言事不用乃自汚與官婢通免歸徉狂儈牛口無二價也梁鴻字伯鸞扶風平陵人也嘗欲隱居避患乃與妻孟光共入霸陵山中因東出闗過京師作五噫之歌曰陟彼北芒兮噫顧覽帝京兮噫宫室崔嵬兮噫人之劬勞兮噫遼遼未央兮噫肅宗聞而悲之求鴻不得乃易姓運期名燿字侯光與妻子居齊魯之間有頃又去適吳將行作詩至吳依大家臯伯通居廡下為人賃舂每歸妻為具食不敢於鴻前仰視舉案齊眉伯通察而異之曰彼傭能使其妻敬之如此非凡人也乃方舍之于家鴻潛閉著書十餘篇韋逢泰以經行知名不應州郡之命大將軍梁冀辟不就桓帝公車備禮徵至霸陵稱病歸乃入雲陽山采藥不反有司舉泰加罪帝特原之髙鳯字文通南陽葉人也年老執志不倦名聲著聞太守連召請恐不得免自言本巫家不應為吏又詐與寡嫂訟田遂不仕將作大匠任隗舉鳯直言到公車託病逃歸推其財産與兄子隱身漁釣終於家臺佟字孝威魏郡鄴人隱於武安山鑿穴為居採藥自給章帝建初中州辟不就刺史行部乃使從事致謁佟載病往謝刺史乃執贄見佟曰孝威居身如是甚苦如何佟曰佟幸得保終性命存神養和如明使君奉宣詔書夕惕庶事反不苦邪遂去隱逸終不見韓康字伯休一名恬休京兆霸陵人家世著姓常采藥名山賣長安市口不二價三十二年時有女子從康買藥康守價不移女子怒曰公是韓伯休耶乃不二價乎康歎曰我本欲避名今小女子皆知有我何用藥為乃遯入霸陵山中博士公車連徵不至桓帝乃備𤣥纁之禮以安車聘之使者奉詔造康不得已乃許諾辭安車自乘柴車冐晨先使者發至亭亭長以韓徵君當過方發人牛脩道橋及見康柴車幅巾以為田叟也使奪其牛康即釋駕與之有頃使者至奪牛翁乃徵君也使者欲奏殺亭長康曰此自老子與之亭長何罪乃止康因道逃遁以壽終矯慎字仲彦扶風茂陵人少好黃老隱遯山谷因穴為室仰慕松喬導引之術汝南吳蒼甚重之因遺書以觀其志曰仲彦足下勤處隱約雖乘雲行泥棲宿不同每有西風何嘗不歎蓋聞黃老之言乘虛入㝠藏身逺遯亦有理國養人施於為政至如登山絶迹神不著其證人不觀其驗吾欲先生從其可者於意何如昔伊尹不懷道以待堯舜之君方今明明四海開闢巢許無為箕山夷齊悔入首陽足下審能騎龍弄鳳翔嬉雲間者亦非狐兔燕崔所敢謀也慎不答年七十餘竟不肯娶後忽歸家自言死曰及期果卒後人有見慎於燉煌者故前世異之或云神仙焉馬瑶隱於汧山以兔置為事所居俗化百姓美之號馬牧先生戴良汝南慎陽人舉孝亷不就再辟司空府彌年不到州郡迫之乃遯辭詣府悉將妻子既行在道因逃入江夏山中優㳺不仕以壽終初良五女並賢每有求姻輒便許嫁疎裳布被竹笥木屐以遣之五女能遵其訓皆有隱者之風焉漢隂老父者不知何許人也桓帝延熹中幸竟陵過雲夢臨沔水百姓莫不觀者有老父獨耕不輟尚書郎南陽張温異之使問曰人皆來觀老父獨耕不輟何也老父笑而不對温下道百步自與言老父曰我野人耳不達斯語請問天下亂而立天子邪理而立天子邪立天子以父天下邪疲天下以奉天子邪昔聖王宰世茅茨采椽而萬人以寧今子之君以勞人自縱逸逰無忌吾為子羞之子何忍欲人觀之乎温大慙問其姓名不告而去陳留老父者不知何許人也桓帝世黨錮事起守外黄令陳留張升去官歸鄉里道逢友人共班草而言升曰吾聞趙殺鳴犢仲尼臨河而反覆巢竭淵龍鳯逝而不至今宦豎日亂陷害忠良賢人君子其去朝乎夫德之不建人之無援將性命之不免奈何因相抱而泣老父趨而過之植其杖太息言曰吁二大夫何泣之悲也夫龍不隱鱗鳯不藏羽網羅髙縣去將安所雖泣何及乎二人欲與之語不顧而去莫知所終龎公者南郡襄陽人也居峴山之南未嘗入城府夫妻相敬如賔荆州刺史劉表數延請不能屈乃就候之謂曰夫保全一身曷若保全天下乎龎公笑曰鴻鵠巢於髙林之上暮而得所棲黿鼉穴於深淵之下夕而得所宿夫趨舍行止亦人之巢穴也且各得其棲宿而已天下非所保也因釋耕於壠上而妻子耘於前表指而問曰先生苦居􅅵畝而不肯官祿後世何以遺子孫乎龎公曰世人皆遺之以危今獨遺之以安雖所遺不同未為無所遺也表歎息而去後遂攜其妻子登鹿門山因采藥不反魏焦先字孝然河東人後漢中平末白波賊起時先年二十餘與同郡侯武陽相隨武陽年小有母先與相扶接避白波東客揚州取婦建安初來西還武陽詣太陽占户先留陜界至十六年闗中亂先失家屬獨竄於河渚間食草飲水無衣履太陽長朱南望見之謂為亡士欲遣船捕取武陽語縣此狂癡人耳遂注其籍給廩日五升後有疫病人多死者縣常使埋藏童兒豎子皆輕易之然其行不踐邪徑必循阡陌及其捃拾不取大穗饑不茍食寒不茍衣結草以為裳科頭徒跣每出見婦人則隱翳須去乃出自作一蝸牛廬淨掃其中營木為牀布草蓐其上至天寒時構火以自炙呻吟獨語饑則出為人客作飽食而己不取其直又出於道中邂逅與人相遇輒下道藏匿或問其故常言草茅之人與狐兔同羣不肯妄語明帝太和青龍中嘗持一杖南度淺河水輒獨云未可也繇是人頗疑其不狂至齊王嘉平中太守賈穆初之官故過其廬先見穆再拜穆與語不應與食不食穆謂之曰國家使我來為卿作君我食卿卿不肯食我與卿語卿不應我如是我不中為卿作君當去耳先乃曰寧有是邪遂不復語其明年大發卒將伐吳有竊問先今討吳何如先不肯應而謬歌曰祝衂祝衂非魚非肉更相追逐本心為當殺牂羊更殺其羖䍽邪郡人不知其謂㑹諸軍敗好事者乃推其意疑牂羊謂吳羖䍽謂魏於是後人僉謂之隱者也議郎河東董經特嘉異節與先非故人密往觀之經到乃奮其白鬚為如與之有舊者謂曰阿先濶乎念共避白波時不先熟視而不言經素知其昔受武陽恩因復曰念武陽不先乃曰己報之矣經又復挑欲與語遂不肯復應後歲餘病亡時年八十九矣髙士傳曰世莫知先所出或言生乎漢末自陜居太陽無父母兄弟妻子見漢室衰乃自絶不言及魏受禪常結草為廬於河之湄獨止其中冬夏常不著衣卧不設席又無草蓐以身親土其體垢洿皆如泥漆五形盡露不行人間或數日一食欲食則為人賃作人以衣衣之乃使限功受直足得一食輒去人欲多與終不肯取亦有數日不食時行不繇邪徑目不與女子逆視口未嘗言雖有驚急不與人語遺以食物皆不受河東太守杜恕嘗以衣服迎見而不與語司馬景王聞而使安定太守董經因事過視又不肯語經以為大賢其後野火燒其廬先因露寢遭冬雪大至先袒卧不移人以為死就視如故不以為病人莫能審其意度年可百歲餘乃卒或問皇甫謐曰焦先何人也曰吾不足以知之也考之於表可畧而見矣夫世之所常趣者榮味也形之所不可釋者衣裳也身之所不可離者室家也口之所不能己者言語也心之不可絶者親戚也今焦先棄榮味釋衣服離室家絶親戚閉口不言曠然與天地為棟宇闇然合至道之前出羣形之表入𤣥寂之幽一世之人不足以掛其意四海之廣不能以回其顧妙乎與夫三皇之先者同矣結繩己來未及其至也豈羣言之所能髣髴常心之所得測量哉彼行人所不能行堪人所不能堪犯寒暑不以傷其性居曠野不以恐其形遭驚急不以迫其慮離榮愛不以累其心捐視聽不以汙其耳目舍足於不損之地居身於獨立之處延年歴百夀越期頤雖上識不能尚也自羲皇已來一人而已矣故梁州刺史耿黼以先為仙人也北地傅𤣥謂之性同禽獸並為之傳而莫能測之扈累字伯重京兆人後漢初平中山東人有青牛先生者字正方客三輔曉知星歴風角鳥情常食青葙芫華年似五六十者人或親識之謂其已百餘歲矣初累年四十餘隨正方逰學人謂之得其術有婦無子建安十六年三輔亂又隨正方南入漢中漢中壞正方入蜀累與相失隨徙民詣鄴遭疾疫喪其婦至文帝黄初元年又徙詣雒陽遂不復娶婦獨居道側以㼾甎為障施一厨牀食宿其中晝日潛思夜則仰視星宿吟詠内書人或問之閉口不肯言至齊王嘉平中年八九十才若四五十者縣官以其孤老給廩日五升五升不足食頗行傭作以禆糧糧盡復出人與不取食不求美衣弊緼故後一二年病亡寒貧者本姓石字德林安定人也後漢建安初客三輔是時長安有宿儒欒文博者門徒數千德林亦就學始精詩書後好内事於衆輩中最𤣥黙至十六年闗中亂南入漢中初不治産業不畜妻孥常讀老子五千文及諸内書晝夜吟詠到二十五年漢中破隨衆還長安遂癡愚不復識人食不求味冬夏常衣弊布連結衣體如無所勝目如無所見獨居窮巷小屋無親里人與之衣食不肯取郡縣以其鰥窮給廩日五升食不足頗行乞乞不取多人問其姓字口不肯言故因號之寒貧也或素有與相知者往存䘏之輒拜跪繇是人謂其不癡車騎將軍郭淮以意氣呼之問其所欲亦不肯言淮因與脯糒及衣不取其衣取其脯一朐糒一升而止蜀譙秀字元彦巴西人性清靜不交於世知將大亂豫絶人事從兄弟及諸親舊不與相見州郡辟命及李雄盜蜀安車徵秀又雄叔父驤驤子壽辟命皆不應常冠鹿皮躬耕山藪晉孫登字公和汲郡共人無家屬於郡北山為土窟居之夏則編草為裳冬則披髪自覆好讀易撫一絃琴見者皆親樂之性無恚怒人或投諸水中欲觀其怒登既出便大笑時逰人間所經家或設衣食者一無所受辭去皆捨棄常往宜陽山有作炭人見之知非常人與語登亦不應文帝聞之使阮籍往觀於蘇門山遇之與商畧終古及栖神導氣之術登皆不應籍因長嘯而退至半嶺聞有聲若鸞鳯之音響乎巖谷乃登之嘯也遂歸著大人先生傳嵇康從之㳺三年問其所圖終不答康每歎息將别謂曰先生竟無言乎登乃曰子識火乎火生而有光而不用其光果在於用光人生而有才而不用其才果在於用才故用光在乎得薪所以保其耀用才在乎識真所以全其年今子才多識寡難乎免於今之世矣子無求乎康不能用果遭非命仍作幽憤詩曰昔慙栁下今愧孫登或謂登以魏晉去就易生嫌疑故或嘿者也竟不知所終董京字威輦不知何郡人初與隴西計吏俱至雒陽被髮而行逍遥吟詠常宿白社中時乞於市得殘碎繒絮結以自覆全帛佳緜則不肯受或見推排罵辱曽無怒色孫楚時為著作郎數就社中與語遂載與俱歸京不肯坐楚乃貽之書勸以今堯舜之世胡為懷道迷邦京答之以詩其卒章云萬物皆賤惟人為貴動以九州為狹靜以環堵為大後數年遁去莫知所之於其所寢處惟有一石竹子及詩二篇朱沖南安人好學而貧武帝咸寧四年詔補博士沖稱疾不應尋又詔曰東宫官屬亦宜得履蹈至行敦悦典籍者其以沖為太子右庶子沖每聞徵書至輒逃入深山時人以為梁管之流夏統字仲御㑹稽永興人㓜孤貧養親以孝聞睦於兄弟每採梠求食星行夜歸或至海邊拘螊􅒹以資養雅善談論宗族勸之仕謂之曰卿清亮質直可作郡綱紀與府朝接自當顯至如何甘辛苦於山林畢性命於海濵也統勃然作色曰諸君待我乃至此乎使統屬太平之時當與元凱評議出處遇濁代念與屈生同汙共泥若行汙隆之間自當耦耕沮溺豈有辱身曲意於郡府之間乎聞君之談不覺寒毛盡戴白汗四匝顔如渥丹心熱如炭舌縮口張兩耳壁塞也言者大慙統自此遂不與宗族相見㑹母疾統視醫藥宗親因得見之郭文字文舉河内軹人少愛山水尚嘉遯年十三每逰山林彌旬忘返父母終服畢不娶辭家逰名山歴華隂之崖以觀石室之石函雒陽陷乃步擔入吳興餘杭大滌山中窮谷無人之地倚木於樹苫覆其上而居焉亦無壁障時猛獸為暴入室害人而文獨宿十餘年卒無患害常著鹿裘葛巾不飲酒食肉區種菽麥獵者時往寄宿文夜為擔水而無勌色王導聞其名遣人迎之文不肯就船車荷擔徒行既至導置之西園園中果木成林又有鳥獸麋鹿因以居文焉於是朝士咸共觀之文頺然箕踞傍若無人温嶠常問文曰人皆有六親相娛先生棄之何樂文曰本行學道不謂遭世亂欲歸無路是以來也又問曰饑而思食壯而思室自然之性先生安獨無情乎文曰情繇憶生不憶故無情又問曰先生獨處窮山若疾病遭命則為烏鳥所食顧不酷乎文曰藏埋者亦為螻蟻所食復何異乎又問曰猛獸害人人之所畏而先生獨不畏邪文曰人無害獸之心則獸亦不害人又問曰茍世不寧身不得安今將用先生以濟時若何文曰山草之人安能佐世張忠字巨和中山人永嘉之亂隱于太山恬靜寡欲清虛服氣飡芝餌石脩導養之法冬則緼袍夏則𢃄索無琴書之適不脩經典勸教但以至道虛無為宗其居依崇巖幽谷鑿地為窟室弟子亦以窟居去忠六十餘步五日一朝其教以形不以言弟子受業觀形而退立道壇于窟上每旦朝拜之食用瓦器鑿石為釡左右居人饋之衣食一無所受好事少年頗或問以水旱之祥忠曰天不言而四時行焉萬物生焉隂陽之事非窮山野叟所能知之其遣諸外物皆此類也年在期頤而視聽無爽苻堅遣使徵之使者至忠沐浴而起謂弟子曰吾餘年無幾不可以逆時主之意浴訖就車及至長安堅賜以冠衣辭曰年朽髪落不堪衣冠請以野服入覲從之及見堅謂之曰先生考槃山林研精道素獨善之美有餘兼濟之功未也故逺屈先生將任齊尚父忠曰昔因喪亂避地太山與鳥獸為侶以全朝夕之命屬堯舜之世思一奉聖顔年衰志謝不堪展効尚父之况非敢竊擬山棲之性情存巖岫乞還餘齒歸死岱宗堅以安車送之范長生隱蜀西山巖居穴處求道養志後蜀李雄欲立為君而臣之長生固辭謝敷字敬緒㑹稽人性澄靜寡欲入太平山十餘年鎮軍郗愔召為主簿臺徵博士皆不就初月犯少微少微一名處士星占者以隱士當之譙國戴逵有美才人或憂之俄而敷死㑹稽人士以嘲吳人云吳中髙士便是求死不得死陶淡侃之孫於長沙臨湘山中結廬居之養一白鹿以自偶親故有候之者輒移渡澗水莫得近之州舉秀才淡聞遂轉逃羅縣埤山中終身不反莫知所終宋纎燉煌效榖人隱居于酒泉南山太守楊宣畫其象於閣上出入視之作頌曰為枕何石為潄何流身不可見名不可求酒泉太守馬岌髙尚之士也具威儀鳴鐃鼓造焉纎髙樓重閣距而不見岌歎曰名可聞而身不可見德可仰而形不可覩吾今而後知先生人中之龍也銘詩于石壁曰丹崖百丈青壁萬尋竒木蓊鬱蔚若鄧林其人如玉維國之琛室邇人遐實勞我心葛洪為人木訥不好榮利閉門却掃未嘗交逰於餘杭山見何㓜道郭文舉目擊而已各無所言洪尤好神仙導養之法從祖𤣥吳時學道得仙號曰葛仙公以其鍊丹秘術授弟子鄭隱洪就隱學悉得其法焉後師事南海太守鮑𤣥𤣥亦内學逆占將來見洪深重之以女妻洪洪傳𤣥業兼綜練醫術後選為散騎常侍領大著作洪固辭不就以年老欲鍊丹以祈遐壽聞交阯出丹求為句漏令成帝以洪資髙不許洪曰非欲為榮以有丹耳帝從之洪遂將子姪俱行至廣州刺史鄧嶽留不聽去洪乃止羅浮山鍊丹嶽表補東莞太守又辭不就嶽乃以洪兄子望為記室參軍在山積年優㳺閒養著述不輟後忽與嶽疏云當逺行尋師尅期便發嶽得疏狼狽往别而洪坐至日中兀然若睡而卒嶽至遂不及見時年八十一視其顔色如生體亦柔軟舉尸入棺甚輕如空衣世以為尸解得仙云許邁字叔𤣥一名映丹陽句容人家世上族而邁少恬靜不慕仕進未弱冠嘗造郭璞璞為之筮遇泰之大畜其上六爻發璞謂曰君元吉自天宜學升遐之道時南海太守鮑靚隱跡潛遁人莫之知邁乃往候之探其至要父母尚存未忍違親謂餘杭懸霤山近延陵之茅山是洞庭西門潛通五嶽陳安世茅季偉嘗所逰處于是立精舍于懸霤而往來茅嶺之洞室放絶世務以尋仙館朔望時節還家定省而已父母既終乃遣婦孫氏還家攜其同志徧逰名山焉初採藥于桐廬縣之桓山餌术涉三年映欲斷穀以此山近人不得專一四面藩之好道之徒欲相見者登樓與語以此為樂嘗服氣一氣千餘息穆帝永和二年移入臨安西山登巖茹芝𦕈爾自得有終焉之志乃改名𤣥字逺逰與婦書告别又著詩十二首論神仙之事焉王羲之造之未嘗不彌日忘歸相與為世外之交𤣥遺羲之書云自山隂南至臨安多有金堂玉室仙人芝草左元放之徒漢末諸得道者皆在焉羲之自為之傳述靈異之迹多不可詳記𤣥自後莫測所終好道者皆謂之羽化矣翟莊字祖休湯之子少以孝友著名遵湯之操不交人物耕而後食語不及俗唯以弋釣為事及長不復獵或問漁獵同是害生之事而先生止去其一何哉莊曰獵自我釣自物未能頓盡故先節其甚者且夫貪餌吞鈎豈我哉時人以為知言晩節亦不復釣端居蓽門歠菽飲水州府禮命及公車徵並不就瞿硎先生者不得姓名亦不知何許人也海西公太和末常居宣城郡界文脊山中有瞿硎因以為名焉大司馬桓温嘗往造之既至見先生被鹿裘坐于石室神無忤色温及僚佐數十人皆莫測之乃命伏滔為之銘贊竟卒于山中孟陋武昌人少而貞立清操絶倫衣布蔬食以文籍自娛口不及世事未曽交㳺時或弋釣孤興獨往雖家人亦不知其所之也劉驎之字子驥南陽人光祿大夫耽之族也驎之少尚質素虛退寡欲不脩儀操人莫之知好㳺山澤志存遯逸常採藥至衡山深入忘反見有一澗水南有二石囷一囷閉一囷開水深廣不得過欲還失道遇伐弓人問徑僅得還家或説囷中皆仙靈方藥諸雜物驎之欲更尋索終不復知處也車騎將軍桓沖聞其名請為長史驎之固辭不受沖嘗到其家驎之于樹條桑使者致命驎之曰使君既枉駕光臨宜先詣家君沖聞大愧於是乃造其父父命驎之然後方還拂短褐與沖言話父使驎之于内自持濁酒蔬菜供賔沖勅人代驎之斟酌父辭曰若使從者非野人之意也沖慨然至昏乃退公孫鳳字子鸞上谷人隱于昌黎之九城山谷冬衣單布寢處土牀夏則并食于器停令臭敗然後食之彈琴吟咏陶然自得人或異之莫能測也慕容暐以安車徵至鄴及見暐不言不拜衣食舉動如在九城賔客造請尠得與言數年病卒公孫永字子陽襄平人少好學恬虛隱于平郭南山不娶妻妾非身所墾植則不衣食之吟咏巖間欣然自得年餘九十操尚不虧與公孫鳯俱被慕容暐徵至鄴及見暐不拜王公已下造之皆不與言雖經隆冬盛暑端然自若一歲餘詐狂暐送還平郭後苻堅又將備禮徵之難其年耆路逺乃遣使者致問未至而永亡堅深悼之諡曰崇虛先生石垣字洪孫自云北海劇人居無定所不娶妻妾不營産業食不求美衣必麤敝或有遺其衣服受而施人人有喪葬輒杖策弔之路無逺近時有寒暑必在其中或同日共時咸皆見焉又能闇中取物如晝無差姚萇之亂莫知所終王嘉隴西安陽人不食五榖不衣美麗清虛服氣不與世人交㳺隱於東陽谷鑿崖穴居弟子受業者數百人亦皆穴處石季龍之末棄其徒衆至長安潛隱于終南山結菴廬而止門人聞而復隨之乃遷于倒獸山苻堅累徵不赴公侯已下咸躬往㕘請好尚之士無不師宗之郭瑀燉煌人隱于臨松薤谷鑿石窟而居服栢實以輕身作春秋墨説孝經錯緯弟子著録千餘人張天錫遣使者孟公明持節以蒲輪𤣥纁備禮徵之遺瑀書曰先生潛光九臯懷真獨逺心與至境㝠符志與四時消息豈知蒼生倒懸四海待拯者乎孤㳟承時運負荷大業思與賢明同贊帝道昔傅説龍翔殷朝尚父鷹揚周室孔聖車不停軌墨子駕不俟旦以皆黔首之禍不可以不救君不獨立道繇人𢎞故也况今九服分為狄埸二都盡為戎穴天子辟陋江東名教淪于左袵創毒之甚開闢未聞先生懷濟世之才坐觀而不救其于仁智孤竊惑焉故遣使者虛左授綏鶴企先生乃眷下國公明至山瑀指翔鴻以示之曰此鳥也安可籠哉遂深逃絶跡公明拘其門人瑀歎曰吾逃祿非避罪也豈得隱居行義害及門人乃出而就徵及至姑臧值天錫母卒瑀括髮入弔三踊而出還于南山及天錫滅苻堅又以安車徵瑀定禮儀㑹父喪而止董景道𢎞農人晉永平中知天下將亂隱于商雒山衣木葉食樹果彈琴歌嘯以自娛毒蟲猛獸皆遶其傍是以劉元海及聰屢徵皆避而不達至劉曜時出山廬于渭汭曜徵為太子少傅散騎當侍並固辭竟以壽終宋韋𤣥避吏隱于長安南山武帝入闗以太尉掾徵不至戴顒字仲若父逵兄勃並隱遁有髙名顒年十六丁父憂幾滅性乃與勃居桐廬及卒顒以桐廬僻逺難以養疾乃出居吳下吳下士人共為築室聚石引水植林開澗少時繁密有若自然乃述莊周大㫖著逍遥論注禮記中庸三吳將守及郡内衣冠要其同逰野澤堪行便去不為矯介衆論以此多之武帝命為太尉行㕘軍不就及踐阼徵為通直郎散騎常侍皆不起文帝每欲見之嘗謂黄門侍郎張敷曰吾東巡之日當讌戴公山也孔淳之字彦深魯郡人父粲秘書監徵不就淳之少有髙尚愛好墳籍為太原王恭所稱居㑹稽剡縣性好山水每所逰必窮其幽峻或旬日忘歸嘗逰山遇沙門釋法崇因留共止遂停三載法崇歎曰緬想人外三十年矣今乃傾蓋于兹不覺老之將至也及淳之還反不告以姓除著作佐郎不就與徵士戴顒王𢎞之及王敬𢎞等共為人外之逰敬𢎞以女適淳之子尚㑹稽太守謝方明苦要入郡終不肯往茅屋蓬户庭草蕪徑唯牀上有數帙書元嘉初復徵為散騎侍郎乃逃於上虞縣界弟黙之為廣州刺史出都與别即日命駕東歸遂不顧也雷次宗字仲倫豫章南昌人也少入廬山事沙門釋慧逺篤志好學尤明三禮毛詩隱退不交世務本州辟從事員外散騎侍郎徵並不就文帝元嘉十五年徵次宗至京師開館於鷄籠山聚徒教授置生百餘人㑹稽朱膺之潁川庾蔚之並以儒學監總諸生時國子學未立文帝留心藝術使丹陽尹何尚之立𤣥學太子率更令何承天立史學司徒謝元立文學凡四學並建車駕數幸次宗學館資給甚厚又除給事終不就冬還廬山公卿以下並設祖道二十五年詔散騎侍郎徵詣京邑為築室于鍾山西巖下謂之招隱館使為皇太子諸王講喪服經次宗不入公門乃使自華林東門入延賢堂就業二十五年卒于鍾山劉凝之字志安小名長年南郡枝江人也父期公衡陽太守兄盛公髙尚不仕凝之慕老萊嚴子陵為人推家財與弟及兄子立屋于野外非其力不食州里重其德行州三禮辟不就後又徵為秘書郎不就臨川王義慶使存問凝之答書頓首稱僕不脩民禮人或譏焉凝之曰昔老萊向楚王稱僕嚴陵亦亢禮光武未聞巢許稱臣堯舜時戴顒與衡陽王義季書亦稱僕凝之性好山水一旦攜妻子泛江湖隱居衡山之陽登髙嶺絶人迹為小屋居之采藥服食妻子皆從其志元嘉二十五年卒朱百年㑹稽山隂人少有髙情親亡服闋攜妻入㑹稽南山樵採為業頗能言𤣥理時為咏歌往往有髙勝之言除太子舍人不就卒山中闗康之字伯愉河東楊人世居京口寓南平昌少而篤學元嘉中文帝聞康之有學義詔徵之不起棄人事守志閒居下邳趙繹以文義見稱康之與友善特進顔延之等當時名士十許人入山候之見其散髮被黄布帊席松葉枕一塊白石而卧了不相盻延之等咨嗟而退不敢干也孝武即位遣大使巡行天下使反薦康之宜加徵聘不見省康之性清約獨處一室希與妻子相見不通賓客明帝時與平原明僧紹俱徵辭以疾王素少有志行家貧母老住東陽隱居不仕頗營田園之資而得以自立愛好文義不以人俗累懷孝武即位欲搜揚隱退下詔召為太子中舍人不就周續之字道祖鴈門廣武人好讀老易入廬山事沙門釋慧逺時彭城劉遺民遁迹廬山陶淵明亦不應徵命謂之潯陽三隱以為身不可遣餘累宜絶遂終身不娶布衣蔬食徵為太學博士不就江州刺史每相招請續之不尚節峻頗從之逰嘗以嵇康髙士傳得出處之美因為之注有漁父者不知姓名亦不知何許人也孫緬為潯陽太守落日逍遥渚際見一輕舟凌波隱顯俄而漁父至神韻瀟灑垂綸長嘯緬甚異之乃問有魚賣乎漁父笑而答曰其釣非釣寧賣魚者耶緬益怪焉遂褰裳涉水謂曰竊觀先生有道者也終朝鼓枻良亦勞止吾聞黄金白壁重利也駟馬髙葢榮勢也今方王道文明守在海外隱鱗之士靡然向風子胡不贊緝熙之美何晦用其若是也漁父曰僕山海狂人不達世務未辨賤貧何論榮貴乃歌曰竹竿籊籊河水浟浟相忘為樂貪餌吞鈎非夷非惠聊以忘憂于是悠然鼓棹而去王𢎞之字方平瑯邪臨沂人性髙尚從兄敬𢎞嘗薦于朝徵之不就敬𢎞又嘗解貂裘與之即著以采藥性好釣上虞江有一處名三石頭𢎞之常垂綸于此經過者不識之或問漁師得魚賣不𢎞之曰亦自不得得亦不賣旦夕載魚入上虞郭經親故門各以一兩頭置門内而去始寧汰川有佳山水𢎞之又依巖築屋翟法賜潯陽柴桑人曽祖湯湯子莊莊子矯並髙尚不仕逃避徵辟矯生法賜少守家業立屋於廬山頂母喪後便不復還家不食五榖以獸皮結草為衣徵拜著作佐郎補散騎侍郎皆不就後家人至石室尋求因復逺徙違避徵聘遁迹幽深潯陽太守鄧文子表法賜隱跡廬山于今四世栖身幽巖人罕見者如當逼以王憲束以嚴科驅山獵草以期禽獲慮致顛殞有傷盛化乃止後卒于巖石之間冊府元龜卷八百九
