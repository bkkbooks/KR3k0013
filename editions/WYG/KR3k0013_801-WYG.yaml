body:
  text: 册府元龜卷八百一宋王欽若等撰總録部義傳曰不爲義疚又曰義者天下之制也蓋管氏以爲國維呂覽謂之事紀故在上者好之民莫敢不服者矣中古以還大道云䘮邦乏純德之士鄉鮮不貳之老巧智競逐媮薄日滋乃有秉操殊特挺志英果捐已以濟物捨生而殉名急病讓夷解紛排難收恤惸獨保障宗戚歴屯夷而無改來急難而必赴不謀舊國不忘故君蹈危機以明節冐白刅而舒患觸類而長其流實繁皆本乎剛毅之存誠忠厚之成性藴至德於深𠂻彰盛烈乎所履用能孤風激於頽俗英名傳於遐世凛然之氣乆而益振仲尼所謂聞而不徙者可憂見而不爲者非勇斯亦感激於衰世而發論也晋祁彌明爲晋趙盾車右祁大夫驂乘有車右有御者靈公欲殺盾衆莫可使往者於是伏甲于宮中召趙盾而食之彌明者國之力士也仡然從乎趙盾而入仡然壯勇貌放乎堂下而立趙盾已食靈公謂盾曰吾聞子之劍蓋利劒也子以示我吾將觀焉授君劒當㧞而進其首靈公因欲以推殺之趙盾起將進劍彌明自下呼之曰盾食飽則出何故抜劍於君所趙盾知之躇階而走躇猶超遽不暇以次靈公有周狗周狗可以比周之狗所指如意謂之獒犬四尺曰獒呼􅋙而屬之獒亦躇階而從之彌明逆而踆之以足逆蹋曰踆絶其頷趙盾顧曰君之獒不若臣之獒也然而宮中甲鼓而起甲即上所道伏甲約勒聞皷聲當起殺盾有起于甲中者抱趙盾而乘之欲趨疾走趙盾顧曰吾何以得子尤曰吾何以得此救急之恩於子邪非所以意悟曰子某時所食活我於暴桑下者也某時者記傳者失之暴桑蒲蘇桑傳道此者明人當素積恩德趙盾曰子名爲誰後欲報之曰吾君孰爲介介甲也猶曰我晋君爲誰興此甲兵豈不爲盾乎子之乘矣何問吾名之乘即上車也猶曰子已上車矣何不疾去而反徐問吾名乎趙盾趨而出衆無留之者明盾賢人不忍殺也左傳載晋侯飲盾酒伏甲將攻之其右提彌明知之登曰臣侍君晏過三爵非禮也遂扶以下公嗾夫獒焉明摶而殺之盾曰棄人用犬雖猛何爲闘且出提彌明死之董安于爲晋趙孟臣十三年孟怒邯鄲午遂殺之趙稷渉賔以邯鄲叛上軍司馬籍秦圍邯鄲午荀寅之甥也荀寅范吉射之姻也壻父曰姻荀寅子娶吉射女而相與睦故不與圍邯鄲將作亂作亂攻趙鞅董安于聞之安于趙氏臣告趙孟曰先備諸趙孟曰晋國有命始禍者死爲後可也安于曰與其害於民寧我獨死俱見攻必傷害民請以我說趙孟不可晋國若討可殺我以自解說十四年春衞侯逐公叔戍與其黨故趙陽奔宋戍來奔終史魚之言梁嬰父惡董安于謂知文子曰不殺安于使終爲政於趙氏趙氏必得晋國盍以先發其難也討於趙氏文子使告於趙孟曰范中行氏雖信爲亂安于則發之是安于與謀亂也晋國有命始禍者死二子既伏其罪矣敢以告告使討安于趙孟患之安于曰我死而晋國寧趙氏定將焉用生人誰不死吾死莫戾乃縊而死趙孟尸諸市而告於知氏曰主命戮罪人安于既伏其罪矣敢以告知伯從趙孟盟知伯荀躒而後趙氏定祀安于於廟韓厥爲晋卿景公之三年司冦屠岸賈將作亂誅靈公之賊趙盾趙盾已死矣欲誅其子趙朔韓厥止賈賈不聽厥告趙朔令亡朔曰子必能不絶趙祀死不恨矣韓厥許之及賈誅趙氏厥稱疾不出程嬰公孫杵臼之藏趙孤趙武也厥知之景公十七年病卜之大業之後不遂者爲祟韓厥稱趙成季之功今後獨無祀以感景公景公問曰尚有世乎厥於是言趙武而復與故趙氏田邑續趙氏祀鄭國僑字子產爲相時鄭大夫伯有出奔許既而自墓門之瀆入因馬師頡介于襄庫以伐舊北門馬師頡子羽孫駟𢃄率國人以伐之駟帶子西子子晳之宗主皆召子産駟氏伯有俱召子産曰兄弟而及此吾從天所與兄弟恩等故無所偏助伯有死於羊肆羊肆市列子產禭之枕之股而哭之歛而殯諸伯有之臣在市側者既而葬諸斗城斗城鄭地名子駟氏欲攻子産子皮怒之曰禮國之幹也殺有禮禍莫大焉乃止襄公十年鑪金宦於楚大夫子期會吳伐楚楚子敗奔隨吳人從之隨人隨吳吳乃退鑪金實與隨人要言要言無以楚王與吳并欲脱子期王使見王喜其意欲引見之以比王臣且欲使盟隨人辭曰不敢以約爲利此約謂要言也此一時之事非爲德舉故辭不敢見亦不肯爲盟主王割子期之心以與隨人盟當子期心前割取血以盟示其至心吳句卑爲楚左司馬戍之臣吳伐楚楚子敗左司馬戍及息而還息汝南新息也聞楚敗故還敗吳師于雍澨傷司馬先敗吳師而身被創初司馬臣闔廬故恥爲禽焉司馬嘗在吳爲闔廬臣是以今耻於見禽謂其臣曰誰能免吾首吳句卑曰臣賤可乎司馬曰我實失子可哉失不知子賢三戰皆傷曰吾不可用也已句卑布裳剄而裹之司馬已死剄取其首藏其身而以其首免定公四年伍胥父舉事楚平王太子建平王聽䜛殺舉太子建奔鄭胥亦奔鄭鄭又殺太子建建有子名勝伍胥懼乃與勝俱奔吳到昭關昭關欲執之伍胥遂與勝獨身歩走幾不得脱追者在後走至江江上有一魚父乘船知伍胥之急乃渡伍胥伍胥既渡解其劍曰此劍直百金以與父父曰楚國之法得伍胥者賜粟五萬石爵執珪豈徒百金劍邪不受胥遂奔吳竟破楚張柳朔晋人范氏之臣王生惡柳朔言諸昭子使爲栢人爲栢人宰也昭子范吉射也昭子曰夫非而讎乎對曰私讎不及公公家之事也好不廢過惡不去善義之經也臣敢違之及范氏出出栢人奔齊柳朔謂其子爾從主勉之我將止死王生授我矣授我死節吾不可以僣之遂死於栢人爲吉射距晋戰死趙公子勝爲趙相封平原君先是魏齊嘗辱范睢已而睢相秦魏齊懼走趙匿平原君家秦昭王欲爲范睢必報其仇乃佯爲好書召平原君爲十日之飲平原君入秦見昭王昭王與平原君飲數日昭王謂平原君曰昔周文王得呂尚以爲太公齊桓公得管夷吾以爲仲父今范君亦寡人之叔父也范君之仇在君之家願使人歸取其頭來不然吾不出君於關平原君曰貴而爲友者爲賤也富而爲交者爲貧也夫魏齊者勝之友也在固不出也今又不在臣所昭王乃遺趙王書趙孝成王乃發卒圍平原君家急魏齊夜亡出見趙相虞卿虞卿度趙王終不可說乃解其相印與魏齊亡之梁將見信陵君信陵君尤豫未肯見魏齊聞信陵君之初難見之遂自殺虞卿困於魏漢夏侯嬰沛人秦末試補縣吏與髙祖相愛髙祖戲而傷嬰人有告髙祖髙祖時爲亭長重坐傷人爲吏傷人其罪重告故不傷嬰嬰證之移覆嬰坐髙祖繫嵗餘掠笞數百終脱髙祖髙祖起沛嘗爲太僕竟髙祖以太僕事惠帝鄭君者鄭當時之先也嘗事項籍死而屬漢髙祖令諸故項籍臣名籍臣欽若等曰名籍謂令名呼項籍也鄭君獨不奉詔詔盡拜名籍者爲大夫而逐鄭君欒布爲燕將漢擊燕虜布梁王彭越聞布賢乃言於髙祖請贖布爲梁大夫使於齊未反漢召彭越責以謀反夷三族梟首雒陽下詔有收視者輙捕之布還奏事彭越頭下祠而哭之吏捕以聞帝召罵布曰若與彭越反邪吾禁人勿收若獨祠而哭之與反明矣趣烹之方提趨湯顧曰願一言而死帝曰何言布曰方上之困彭越敗滎陽成臯間項王所以不能遂西徒以彭王居梁地與漢合從苦楚也當是之時彭王一願與楚則漢破與漢則楚破且陔下之㑹㣲彭王項氏不亡天下已定彭王剖符受封亦欲傳之萬世今帝徵兵於梁彭王病不行而疑以爲反反形未見以苛細誅之臣恐功臣人人自危今彭王已死臣生不如死請就烹上乃釋布拜爲都騎卜式河南人初以田畜爲事弟竒忽請於式欲分財異居式便脱身出唯取羊百頭遂入山放牧經十餘年十倍於初却買田宅居焉弟竒悉破其産矣式輙分與之後爲御史大夫太子太𫝊竇嬰封魏其侯爲丞相免後竇太后益䟽不用無勢諸公稍自引而怠驁唯故齊相灌夫獨否故嬰墨墨不得意而厚遇夫也丞相田蚡㑹宗室列侯而夫醉罵坐被繫嬰鋭爲救夫嬰夫人諫曰灌將軍得罪丞相與太后家迕寧可救邪嬰曰侯自我得之自我捐之無所恨且終不令灌仲孺獨死嬰獨生仲孺灌夫字乃匿其家竊出上書立召入具告言灌夫醉飽事不足誅武帝然之賜嬰食曰東朝廷辯之竟以太后故嬰及夫皆棄市公孫敖爲騎郎與衞青友青娣子夫得入宮幸武帝皇后大長公主女也無子妬之大長公主捕青囚欲殺之敖與壯士往簒之故得不死帝聞乃召青爲建章監孔車爲主父偃客偃方貴幸時客以千數及族死無一人視獨車收葬焉武帝聞之以車爲長者任安初居衞青門下時青與霍去病俱爲大司馬青恩衰而去病日益貴青故人門下多去事去病輙得官爵唯獨安不肯去後爲益州刺史朱博與陳咸爲友咸爲御史中丞坐漏泄省中語下獄博去吏間歩至廷獄下候司咸事掠治困篤博詐得爲醫入獄得見咸具知其所坐罪博出獄又變如名爲驗治數百爲被掠笞也卒免咸死罪咸得論出而博以此顯名後至丞相朱詡沛人爲董賢吏爲賢所厚賢死詡自劾去買棺衣收賢尸葬之王莽聞之而大怒以它辜擊殺詡樓䕶爲天水太守免初有故人呂公無子歸䕶䕶身與呂公妻與嫗同食及䕶家居妻子頗厭呂公䕶聞之流涕責其妻子曰呂公以故舊窮老託身於我義所當奉遂養呂公終身原渉字巨先爲谷口令自劾去官亡命嵗餘逢赦出􅄎以振施貧窮赴人之急爲務人嘗置酒請渉渉入里門客有道渉所知母病避疾在里宅者此在里之中宅也渉即往候叩門家哭渉因入弔問以䘮事家無所有渉曰且絜歸除沐浴待渉還至主人對賔客歎息曰人親卧地不收渉何必鄉此願徹去酒食賔客爭問所當得渉乃側席而坐削牘爲䟽具記衣被棺木下至飯含之物分付諸客諸客奔走市買至日昳皆會渉親閲視已謂主人曰願受賜矣既共飲食渉獨不飽廼載棺物從賔客往至䘮家爲棺歛勞倈畢葬其周急待人如此後有人毁渉者曰姦人之雄也䘮家子即時刺殺言者云敞師事吳章章坐王莽子宇腰斬初章爲當時名儒教授尤盛弟子千餘人莽以爲惡人黨皆當禁錮不得仕宦門人盡更名他師敞時爲大司徒掾自劾吳章弟子收抱章尸歸棺歛之京師稱焉車騎將軍王舜髙其志節比之欒布表奏以爲掾薦爲中郎後漢馮魴湖陽人爲郡族姓王莽末四方潰叛乃聚賔客招豪傑作營壍以待所歸是時湖陽大姓虞都尉反城稱兵先與同縣申屠季有仇而殺其兄謀㓕季族季亡歸魴魴將季欲還其營道逢都尉從弟長卿來欲執季魴叱長卿曰我與季雖無素故士窮相歸要當以死任之卿爲何言遂與俱歸季謝曰􅂪恩得全死無以爲報有牛馬財物願悉獻之魴作色曰吾老親弱弟皆在賊城中今日相與尚無所顧何云財物乎季慙不敢復言魴自是爲縣邑所敬信後至執金吾周嘉汝陽人仕郡主簿王莽末羣賊入汝陽城嘉從太守何敝討賊敝爲流矢所中郡兵奔北賊圍繞數十重白刅交集嘉擁敝以身扞之因呵賊曰卿曺皆人𨽻也爲賊既逆豈有還害其君者邪嘉請以死贖君命因仰天號泣羣賊於是兩相視曰此義士也給其車馬遣送之孫堪河南緱氏人以節介氣勇自行王莽末兵革並起宗族老弱在營保間堪嘗力戰䧟敵無所廻避數被創刅宗族賴之郡中咸服其義勇後爲侍中騎都尉卒官第五倫京兆長陵人少介然有義行王莽末盜賊起宗族閭里往往附之倫乃依險固築營壁有賊輙奮厲其衆引彊持滿以拒之銅馬赤眉之屬前後數十軰皆不能下時米石萬錢人相食倫獨收養孤兄子外孫分糧共食死生相守鄉里以此賢之後至司空黃顯南陽人與李守相善王莽末守子通從光武舉兵守時爲王莽宗卿師通遣從兄子季之長安以事報守季於道病死守宻知之欲亡歸顯時爲中郎將聞之謂守曰今關門禁嚴君狀貌非凡將以此安之不如詣闕自歸事既未然脱可免禍守從其計即上書歸死章未及報留闕下㑹事發覺通得亡走莽聞之乃繫守於獄而顯爲請曰守聞子無狀不敢迯亡守義自信歸命宮闕臣顯願質守俱東曉説其子如遂悖逆令守北向刎首以謝大恩莽然其言㑹前隊復上通起兵之狀莽怒欲殺守顯爭之遂迸被誅索盧放東郡人爲郡門下掾更始時使者督行郡國太守有事當就斬刑放前言曰今天下所以苦毒王氏歸心皇漢者實以聖政寛仁故也而傳車所過未聞恩澤太守受誅誠不敢言但恐天下惶懼各生疑變夫使功者不如使過願以身代太守之命遂前就斬使者義而赦之繇是顯名趙熹爲更始偏將軍更始敗熹爲赤眉所圍迫急乃踰屋亡走與所善韓仲伯等數十人携小弱越山阻徑出武關仲伯以婦色美慮有强暴者而已受其害欲棄之於道熹責怒不聼因以泥塗仲伯婦靣載以鹿車身自推之每道逢賊或以逼路熹輙言其病狀以此得免既入丹水遇更始親屬皆祼跣塗炭饑困不能前熹見之悲感所裝縑帛資糧悉以與之將䕶歸鄉里劉恭爲更始侍中會赤眉立恭弟盆子爲帝恭自繫詔獄聞更始敗乃出歩從至髙陵止傳舍右傳都尉嚴本恐失更始爲赤眉所誅將兵在外號爲屯衛而實囚之赤眉下書曰聖公降者封爲長沙王過二十日勿受更始遣恭請降赤眉使其將謝禄往受之更始遂隨禄肉􅃝詣長樂宮上璽綬於盆子赤眉坐更始置庭中將殺之恭禄爲請不能得遂引更始出恭追呼曰臣誠力極請先死拔劒欲自刎赤眉帥樊崇等遽共救止之乃赦更始封爲畏威侯劉恭復爲固請竟得封長沙王更始嘗依謝禄居恭亦擁䕶之三輔苦赤眉暴虐皆憐更始而張卯等以爲慮謂禄曰今諸營長多欲簒聖公者一旦失之合兵攻公自滅之道也於是禄使從兵與更始共牧馬於郊下因令縊殺之恭夜往收藏其屍光武聞而傷焉赤眉降恭爲更始報仇殺禄自繫獄赦不誅劉茂爲太原郡門下掾建武二年赤眉二十餘萬衆攻郡縣殺長吏及府掾史茂負太守孫福踰墻藏空穴中得免其暮俱奔孟縣晝則逃隠夜求糧食積百餘日賊去乃得歸府明年詔書求天下義士福言茂曰臣前爲赤眉所攻吏民壞亂奔走趨山臣爲賊所圍命如絲髪賴茂負臣踰城出保孟縣茂與弟觸冐兵刅緣山負食臣及妻子得度死命節義尤髙宜􅂪表擢以厲義士詔書即徵茂拜議郎楊賢爲隗􅅝刺客時杜林客河西林弟成物故􅅝聼林持䘮東歸既遣而悔追之令賢於隴􅀈遮殺之賢見林身推鹿車載致弟䘮乃歎曰當今之世誰能行義我雖小人何忍殺義士因亡去劉平爲郡楚守孫萌吏時平狄將軍寵萌反於彭城攻敗萌平冐白刅伏萌身上被七創困頓不知所爲號泣請曰願以身代府君賊乃歛兵止曰此義士也勿殺遂解去萌傷甚氣絶有頃蘇渴求飲平傾其創血以飲之後數日萌竟死平乃褁創扶送萌䘮至其本縣伏湛爲平原太守時倉卒兵起天下驚擾而湛獨晏然教授不廢謂妻子曰夫一穀不登國君徹膳今民皆饑柰何獨飽乃共食麄糲悉分俸禄以賑鄉里來客者百餘家王青東郡人父隆建武初爲都尉功曹青爲小吏與父俱從都尉行縣道遇賊隆以身衞全都尉遂死於難青亦被矢貫咽音聲流喝前郡守以青身有金夷夷與痍同竟不能舉及張酺爲東郡太守見之歎息曰豈有一門忠義而爵賞不及乎遂擢用極右曹臣欽若等曰秦漢以前尚右言居曹掾之上也禮震字中威師事汝南太守歐陽歙歙在郡教授數百人徵爲大司徒坐在汝南贓罪千餘萬發覺下獄諸生守闕爲歙求哀者千餘人至有自髠剔者震年十七聞獄當斷馳之京師行到河内獲嘉縣自繫上書求代歙死曰伏見臣師大司徒歐陽歙學爲儒宗八世博士而以贓咎當伏重辜歙門單子㓜未能傳學身死之後永爲廢絶上令陛下獲殺賢之譏下使學者䘮師資之益乞殺臣身以代歙命書奏而歙已死獄光武嘉其仁義拜震爲郎中髙獲與光武有素舊師事歐陽歙歙下獄當斷獲冠鐡冠帶鐡鑕詣闕請歙帝雖不赦而引見之謂曰敬公朕欲用子爲吏宜改常性獲對曰臣受性於父母不可改之於陛下出便辭去三公爭辟不應杜真字孟宗廣漢綿竹人也兄事同郡翟酺酺後被繫獄真上檄章救酺繫獄笞六百竟免酺難京師莫不壯之魏譚爲饑寇所獲等軰數十人皆束縳以次當烹賊見譚似謹厚獨今主㸑暮輙執縳賊有夷長公特哀念譚宻解其縳語曰汝曹皆應就食急從此去對曰譚爲諸君㸑嘗得遺餘餘人家茹草菜不食我長公義之相曉放遣得俱免永平中爲主家令陳元爲歐陽歙大司徒掾歙建武中坐爲汝南太守贓罪千餘萬死獄中元上書追訟之言甚切至帝乃賜歙棺木贈印綬􅉠縑三千疋歙子復嗣鮑永初爲更始尚書僕射建武十一年爲司𨽻較尉行縣到覇陵路經更始墓引車入陌從事諫止之永曰親北面事人寧有過墓不拜雖以獲罪司𨽻所不避也遂下拜哭盡哀而去至扶風椎牛上荀諫冡帝聞之意不平問公卿曰奉使如此何如大中大夫張堪對曰仁者行之宗忠者義之主也仁不遺舊忠不亡君行之髙者也帝意乃釋一云永爲揚州牧遭母憂去官悉以財產與弟子孫馬稜字伯威援之族孫少孤依從兄毅共居業恩猶同產毅卒無子稜心䘮三年稜後至河内太守朱暉南陽宛人爲郡吏太守阮况嘗欲車暉婢暉忤不從及况卒暉乃厚贈送其家人或譏焉暉曰前阮府君有求於我所以不敢聞命誠恐以財貨汚君今而相送明吾非有愛也後爲臨淮太守坐法免建初中南陽大饑米石千餘暉盡散其家資以分宗里故舊之貧羸者鄉族皆歸焉初暉同縣張堪有名德每與相見嘗接以友道暉以堪宿望盛名未敢安之堪至把暉臂曰欲以妻子託朱生暉舉手不敢答堪後仕爲漁陽太守暉自爲臨淮太守絶相聞見時南陽饑堪妻子貧窮暉乃自往候視其家因分所有以賑給之暉又與同郡陳揖交善揖早卒有遺腹子友暉嘗哀之及司徒桓虞爲南陽太守召暉子駢爲吏暉辭駢而薦友虞嘆息遂召之其義烈如此李善南陽淯陽人本同縣李元之蒼頭建武中疫疾元家相繼死沒唯孤兒續始生數旬而貲財千萬諸奴婢私共計議欲謀殺續分其財産善深傷李氏而力不能制乃潛負續逃亡隠山陽瑕邱界中親自哺養乳爲生湩推燥居溫備嘗艱勤續雖在孩抱奉之不異長君有事輙長跪請白然後行之閭里感其行皆相率修義續年十嵗善與歸本縣修理舊業吿奴婢於長史悉收殺之顯宗時善辟公府以能理劇再遷日南太守從京師之官道經淯陽過李元家未至一里乃脱朝服持鉏去草及拜墓哭泣甚悲身自炊㸑執鼎爼以脩祭祀埀泣曰君夫人善在此盡哀數日乃去任末少習齊詩遊京師友人董奉德於雒陽病亡末乃身推鹿車載奉德䘮致其墓所繇是知名爲郡功曹辭以病免張歆守臯長有報父仇賊自出歆召囚詣閣曰欲自受其辭歆既入解械飲食便發遣遂棄官亡命逢赦出繇是鄉里服其髙義歆卒子禹以田宅推與伯父身自寄止亷范爲隴西太守鄧融功曹永平初融爲州所舉按范知事譴難解欲以權相濟乃託病求去融不達其意大恨之范於是東至雒陽變名姓求代廷尉獄卒居無幾融果徵下獄范遂得衛侍左右盡心勤勞融怪其貌類范殊不意乃謂曰卿何似我故功曹邪范訶之曰君困戹瞀亂邪語遂絶融繫出困病范隨而養視及死竟不言身自將車送䘮至南陽葬畢乃去後至蜀郡太守坐法免肅宗崩奔赴敬陵時盧江郡掾嚴麟奉章弔國俱會於路麟乘小車塗深馬死不能自進范見而愍然命從騎下馬與之不吿而去麟事畢不知馬所歸乃縁蹤訪之或謂麟曰故蜀郡太守亷叔度好周人窮急今奔國䘮獨當是耳麟亦素聞范名以爲然即牽馬造門謝而歸之世服其好義陸續會稽吳人爲郡戸曹史刺史尹興行部見續辟爲别駕從事以病去還爲郡門下掾是時楚王英謀反隂䟽天下善士及楚事覺明帝得其録有尹興名乃徵興詣廷尉獄續主簿梁宏功曹史駟勲及掾史五百餘人詣雒陽詔獄就考諸吏不堪痛楚死者大半唯續宏勲掠考五毒肌肉消爛終無異辭遂得赦鄧宏封西平侯收恤故舊無所遺失父所厚同郡郎中王臨年老貧乏私乞與衣裘輿馬施之終竟鄭均好義篤實養寡嫂孤兒恩禮敦至東觀記曰均失兄養孤兒元子甚篤已冠娶出令别居並門盡推財與之使得一尊其母然後隨䕶視賑給之後至議郎劉般收恤九族行義尤著時人稱之後至宗正劉翊字子相曾行於汝南界中有陳國張季禮遠赴師䘮遇寒氷車毁頓滯道路翊見而謂曰君慎終赴義行宜速達即下車與之不吿姓名自策馬而去季禮意其子相也後故到潁隂還所假乘翊閉門辭行不與相見後至陳留太守任隗阿陵侯光之子嗣父爵清静寡欲所得俸秩嘗以賑恤宗族收養孤寡明帝聞之擢奉朝請樂恢京兆人仕本郡戸曹吏太守張恂坐法誅故人莫敢往恢獨奔䘮行服坐以抵罪歸許荆會稽陽羡人少爲郡吏兄子世嘗報讎殺人怨者操兵攻之荆聞乃出門迎怨者跪而言曰世前無狀相犯咎皆在荆不能訓導兄既早沒一子爲嗣如令死者傷其滅絶願殺身代之怨家扶荆起曰許掾郡中稱賢吾何敢相侵因遂委去荆名譽益著李恂安定人大守潁川李鴻請署功曹未及到而州辟爲從事㑹鴻卒恂不應州命而送鴻䘮還鄉里既葬留起塜墳持䘮三年陳禪巴郡人仕郡功曹察孝亷州辟治中從事時刺史爲人所上受納贓賂禪當得考無它所齎但持䘮歛之具而已及至笞掠無筭五毒畢加禪意自若辭對無變事遂散釋載封濟北人年十五詣太學師事鄮令東海申君申君卒送䘮到東海還京師卒業時同學石敬溫病卒封養視殯歛以所齎糧市小棺送䘮到家更歛見敬平時書物皆在棺中乃大異之後至太常卿王忳廣漢新都人嘗詣京師於空舍中見一書生病困愍而視之書生謂忳曰我當到雒陽而被病命在須㬰腰下有金十斤願以相贈死後乞藏骸骨未及問姓名而命絶忳即鬻一斤營其殯葬餘金悉置棺下人無知者後歸數年縣署忳大度亭長初到之日有馬馳入亭中而止其日大風飄一繡被復墮忳前即言於縣縣以歸忳忳後乘馬到雒縣馬遂奔走牽忳入它舍主人見之喜曰今禽盜矣問忳所繇得馬忳具說其狀并及繡被主人悵然良乆乃曰被隨旋風於馬俱亡卿何隂德而致此二物忳自念有葬書生事繇說之并道書生形貌及埋金之處主人大驚號曰是我子也姓金名彦前往京師不知所在何意卿乃葬之大恩乆不報天以此彰卿德耳忳悉以被馬還之彦父不敢取又厚遺忳忳辭譲而去時彦父爲州從事因吿新都令假忳休息自迎彦䘮餘金具存忳繇是顯名後爲郿令茨克字子河初舉孝亷之京師同侶馬死􅂶到前亭輙合車持馬還往相迎鄉里號之曰一馬兩車茨子河繆彤汝南召陵人仕縣爲主簿時令被章見考吏皆畏懼自誣而肜獨證據其事掠考苦毒至乃體生蟲蛆因復傅換五獄踰渉四年令卒以自免太守隴西梁湛召爲决曹吏安帝初湛病卒官肜送䘮還隴西始葬㑹西羗反叛湛妻子悉避亂它郡肜獨留不去爲起墳塜乃潛穿井傍以爲窟室晝則隠竄夜則負土及賊平而墳已立其妻子意肜已死還見大驚關西咸稱𫝊之共給車馬衣資肜不受而歸鄉里范式字巨卿山陽金鄉人受業大學時諸生長沙陳平子亦同在學與式未相見而平子被病將亡謂其妻曰吾聞山陽范巨卿烈士也可以託死吾殁後但以屍埋巨卿戸前乃裂素爲書以遺巨卿既終妻從其言時式出行適還省書見瘞愴然感之向墳揖哭以爲死友乃營護平子妻兒身自送䘮於臨湘未至四五里乃委素書於柩上哭别而去其兄弟聞之尋求不復見雷義爲尚書侍郎有同時郎坐事當論刑作義黙自表取其罪以此論司冦同臺郎覺之委位自上乞贖義罪順帝詔皆除刑童恢少仕州郡爲吏司徒楊賜聞其執法亷平乃辟之及賜被劾當免掾屬悉投刺去恢獨詣闕爭之楊賜爲光禄勲時崔實卒家徒四壁立無以殯歛賜與太僕袁逢少府段頴爲備棺槨葬具楊康陳留人故爲太尉杜喬掾喬與李固被誅俱暴屍於城北家屬故人莫敢視者康聞之號泣星行到雒陽乃著故赤幘託爲夏門亭吏守衞屍䘮驅䕶蠅蟲積十二日都官從事執之以聞梁太后義而不罪康於是帶鐡鑕詣闕上書并乞李杜二公骸骨太后許之成禮殯歛送喬䘮還家葬送行服隠匿不仕郭亮汝南人年始成童遊學雒陽太尉李固爲梁兾所誅露固屍於四衢令有敢臨者加其罪亮乃左提章鉞右秉鐡鑕詣闕上書乞收固屍不許因往臨哭陳辭於前遂守䘮不去夏門亭長呵之曰李杜二公爲大臣不能安上納忠而興造無端卿曹何等腐生公犯詔書干試有司乎亮曰亮含隂陽以生載乾履坤義之所動豈知性命何爲以死相懼亭長歎曰居非命之世天髙不敢不跼地厚不敢不蹐耳目適宜視聼口不可以妄言也梁太后聞而不誅董班南陽人少遊大學宗事李固聞固死乃星行奔赴哭泣盡哀司𨽻案狀奏聞天子釋而不罪班得守屍積十日不去桓帝嘉其義烈聼許送䘮到漢中赴葬畢而還也班遂隠身莫知所歸裴瑜河東人察孝亷時太守史弼殺中常侍侯覽門生覽大怒遂詐作飛章下司𨽻誣弼誹謗檻車徵吏人莫敢近者唯瑜送到崤澠之間大言於路傍曰明府摧折虐臣選德報國如其獲罪足以埀名竹帛願不憂不懼弼曰誰謂荼苦其甘如薺昔人刎頸九死不恨及下廷尉詔獄前孝亷魏劭毁變形服詐爲家僮贍䕶於弼弼遂受誣事當棄市劭與同郡人賣郡邸郡邸旅舍之寺邸也行賂於侯覽得减死罪一等論輸左較時人或譏曰平原行貨以免君無乃蚩乎陶邱洪曰昔文王牖里閎散懷金史弼遭患義夫獻寳亦何疑焉於是議者乃息孫嵩字賔石安邱人先是中常侍唐衡兄玹爲京兆虎牙都尉郡人以玹進不繇德皆輕侮之京兆功曹趙岐及從兄襲又數爲貶議玹深毒恨後爲京兆尹岐懼禍及乃逃避之玹盡殺岐家屬岐遂逃難四方江淮海岱靡所不歴自匿姓名賣餅北海市中嵩年二十餘遊市見岐察非常人停車呼與共載岐懼失色嵩乃下車帷令屏行人宻問岐曰視子非賣餅者又相問而色動不有重怨即亡命乎我北漢孫賔石闔門百口勢能相濟岐素聞嵩名即以實吿之遂以俱歸嵩先入白母曰今日出行乃得死友迎入上堂饗之極歡藏岐複壁中數年後諸唐死滅國赦乃出後岐遷太僕興平中南說劉表時嵩亦寓於表表不爲禮岐乃稱嵩素行篤烈因共上爲青州刺史孫斌爲衛相第五種門下掾種以斌賢善遇之種遷兖州刺史時中常侍單超兄子康爲濟隂太守種按其罪超種懷恨忿遂以事䧟種竟坐徙朔方超外孫董援爲朔方太守稸怒以待之及當徙斥斌具聞超謀乃謂其友人同縣閭子直及髙宻甄子然曰蓋盜憎其主從來舊矣第五使君當投裔土而單超外屬爲彼郡守夫危者易仆可爲寒心吾今方追使君庶免其難苦奉使君以還將以付子二人曰子其行矣是吾心也於是斌將俠客晨夜追種及之太原遮險格殺送吏因下馬與種斌自歩從一日一夜行四百餘里遂得脱歸種匿於閭甄二氏數年徐州從事臧旻上書訟寃會赦得出朱震爲太尉陳蕃友蕃被殺震時爲銍令銍屬沛郡聞而棄官哭之收葬蕃屍匿其子逸於甘陵界中事覺繫獄合門桎梏震受栲掠誓死不言故逸得免後黃巾賊起大赦黨人乃追還逸官至魯相桓鸞沛郡人少立操行本郡太守向苗有名迹舉鸞孝亷遷爲膠東令始到官而苗卒鸞即去職奔䘮終三年然後歸淮汝之間髙其義桓典鸞從子舉孝亷爲郎居無幾會國相王吉以罪被誅沛相故人親戚莫敢至者典獨棄官收歛歸葬服䘮三年負土成墳爲立祠堂盡禮而去𫝊爕再舉孝亷聞所舉郡將䘮乃棄官行服後至漢陽太守蔡邕與叔父從弟同居三世不分財鄉黨為其義後至左中郎將申屠蟠始與濟隂王子居同在大學子居臨殁以身託蟠蟠乃躬推輦車送䘮歸鄉里遇司𨽻於河鞏之間從事義之爲封傳䕶送蟠不肯受投傳於地而去事畢還學封傳封書以傳送也累徵不至景毅蜀郡人爲侍御史時李膺坐黨事死詔獄毅子顧爲膺門徒而未有録牒故不及於譴乃慨然曰本謂膺賢遣子師之豈可以漏奪名籍茍安而已遂自表免歸時人義之許敬字鴻卿汝南人與同郡周伯靈爲交友伯靈早亡敬育養其子范滂汝南人爲郡功曹坐黨事繫獄吏將加掠拷滂以同囚多嬰病乃請先就格遂與同郡袁忠爭受楚毒建寧二年大誅黨人詔下急捕滂等篤郵吳導至縣抱詔書閉傳舍伏牀而泣滂聞之曰必爲我也即自詣獄縣令郭揖大驚出解印綬引與俱亡曰天下大矣子何爲在此滂曰滂死則禍塞何敢以罪累君遂死獄中荀爽爲郎中棄官去司空遠逢舉有道不應及奉卒爽制服三年當世往往化以爲俗後至司空張儉山陽人獻帝初百姓饑荒而儉資計差溫乃傾財産與巴里共之賴其存者以百數後至衞尉賈淑鄉里有憂患者淑輙傾身營救爲州閭所稱李篤外黃人中常侍侯覽上書吿東部督郵張儉與同郡二十四人爲黨儉得亡命止篤家外黃令毛欽操兵到門篤引欽謂曰張儉知名天下而亡非其罪縱儉可得寧忍執之乎欽因起撫篤曰蘧伯玉耻獨爲君子足下如何自專仁義篤曰篤雖好義明廷今日載其半矣欽歎息而去彭脩字子陽會稽毗陵人州辟從事時賊張子林等數百人作亂脩與太守俱出擊賊賊望見車馬競交射之飛矢雨集脩以身障太守而爲流矢所中死太守得全賊素聞其恩信即殺弩中脩者餘悉皆降散言曰自爲彭君故降不爲太守服也胡騰桂陽人爲大將軍竇武掾武爲中官曹節所害騰少師事武獨殯歛行䘮坐以禁錮武孫輔時年二嵗迸竄得全事覺節捕之急騰乃令史南陽張敞共逃輔於震陵界詐云已死騰以爲已子而使聘娶焉後舉桂陽孝亷至建安中荆州牧劉表聞而辟焉以爲從事使還竇姓以事列上會表卒朱雋會稽人同郡周規辟公府當行假郡庫錢百萬以爲冠幘費而後倉卒督責規家貧無以備雋乃竊母繪帛爲規解對母既失產業深恚責之雋曰小損當大益初貧後富必然理也雋稍歴郡職太守尹端署雋爲主簿端坐討賊許昭失利爲州所奏罪應棄市雋乃羸服間行輕齎數百金到京師賂主章吏遂得刋定州奏故端得輸作左較心喜於降免而不知其繇雋亦終無所言廖扶汝南平興人尤明天文䜟緯推歩之術逆知嵗荒乃聚榖數千斛悉用給宗族姻親辟召並不應王允太原人年十九爲郡吏時小黃門晋陽趙津貪横放恣爲一縣巨患允討捕殺之而津兄弟謟事䆠官因緣譛訴桓帝震怒徵太守劉瓆遂下獄死允送䘮還平原終畢三年然後歸家兆溫爲京兆丞棄官去遭嵗大饑散家糧以賑窮餓所活萬餘人趙戬爲司徒王允故吏允爲李催郭汜所害莫敢收允屍者戬時爲平陵令棄官營䘮訾寶爲射聲較尉沮俊督戰後與李催戰死寶負其屍而瘞之張繡武威祖厲人邉章韓遂爲亂凉州金城麴勝襲殺祖厲長劉雋繡爲縣吏間伺殺勝郡内義之公孫瓚遼西令支人爲郡小吏舉上計吏太守劉君坐事檻車徵官法不聼吏下親近瓚乃改容服詐稱侍卒身執徒養御車到雒陽太守當徙日南瓚具豚酒於北芒山祭辭先人酹觴祝曰昔爲人子今爲人臣當詣日南日南多瘴氣恐或不還便當長辭墳塋慷慨悲泣再拜而去觀者莫不嘆息既行於道得赦瓚還尾敦爲幽州牧劉虞故吏虞爲公孫瓚所殺敦於路刼虞首歸葬之陶升故内黃小吏也冀州牧袁紹討公孫瓚南還州郡兵反與黑山賊子毒等共覆鄴城升在賊中有善心獨將部衆踰西城入閉宋州門不内他賊以車載紹家及諸衣冠在州内者身自扞衞送到斥邱乃還紹到遂屯斥丘以升爲建義中郎將册府元龜卷八百一
