body:
  text: 册府元龜卷二百十宋王欽若等撰閏位部旌表明賞延賞旌表周書云表厥宅里樹之風聲盖所以彰徳而揚善也自古令王率行茲道若乃雄視區宇裂疆鼎峙餘分應厯希古崇教何嘗不旌别懿行敦厲風俗其有先賢餘俗拱木斯存忠臣英烈碎首不屈孝感發乎誠性義讓興於閭里固守儉行髙避世紛博施以周急居身以挺操者莫不嚴其祠祀申之􅐠禮臨弔加諡廪給賜爵優錫異等給復累世故雖匹夫之特其敢忽諸秦始皇時巴蜀寡婦清其先得丹穴涪陵出丹而擅其利數世家亦不貲清能守其業用財自衛不見侵犯帝以為貞婦而客之為築女懷清臺宋髙祖初為宋公北征軍次留城經張良廟令曰夫盛徳不冺義在祀典微管之歎撫事彌深張子房道亞黄中炤鄰殆庶風雲𤣥感蔚為帝師大拯横流夷項定漢固以參軌伊望冠徳如仁若乃神交圯上道契商雒顯嘿之間窈然難究源流淵浩莫測其端矣塗次舊沛佇駕留城靈廟荒殘遺像陳昧撫迹懷人慨然永歎過大梁者或佇想於夷門逰九原者亦流連於隨㑹可改搆榱桷修飾丹青蘋蘩行潦以時致薦以紓懷古之情存不刋之烈永初元年追封王鎮惡為龍陽縣侯食邑千五百户初鎮惡為沈田子所害髙祖表於天子曰故安西司馬征虜将軍王鎮惡志節亮直機畧明舉自䇿名州府屢著成績荆南遘釁勢據上流難興彊藩憂兼内侮鎮惡輕舟先邁神兵電臨旰食之虞一朝霧散及王師西伐有事中原長驅雒陽肅清湖陜入渭之捷指麾無前遂廓定咸陽俘執偽主克城之效莫與為疇實干城所寄國之方召也近北虜逰魂㓂掠渭北統率衆軍曜威撲討賊既逺奔還次涇上故龍驤將軍沈田子忽發狂易奄加刃害忠勲未䆒受禍不圖痛惜兼至惋悼無已伏惟聖懷為之傷惻田子狂悖即已備憲鎮惡誠著艱難勲參前列殊績未酬宜蒙追寵願勅有司議其褒贈於是追贈左將軍青州刺史至是帝受命又追封焉文帝初即位詔曰乃者權臣陵縱兆亂基禍故吉陽令張約之抗疏矢言至誠慷慨遂事屈羣醜殞命遐彊志節不申感悼兼至昔關老奏書見紀漢䇿閻纂獻規荷榮晉代考其忠概參近前蹤宜加旌顯式揚義烈可贈以一郡賜錢十萬布百疋元嘉三年贈會稽諸暨人賈思天水郡顯親縣左尉思母亡居喪過禮未塟為隣火所逼思及妻栢氏號哭奔救隣追赴助棺櫬得免思及栢俱見燒死有司奏改其里為孝義里蠲租布三世繇是追贈四年改吳興人潘綜所居之里為純孝里蠲租布三世孫恩亂綜與父俱逃父老不能去謂綜速去無並死綜不忍迎賊叩頭曰父年老乞賜生命賊義而舍之故有是命是年勅牓表㑹稽永興人郭世道閭門蠲其租調改所居獨楓里為孝行里又牓㑹稽山隂人嚴世期門曰義行嚴氏之閭復其身徭役蠲租稅十年世期少有孝行母亡負土成墳仁厚之風行於鄉里大小莫敢呼其名者㑹遣大使廵行天下散騎常侍袁愉表其惇行帝嘉之故有是命世期好施慕善出自天然同里張邁兄弟三人妻各産子時歲饑歉慮不相存欲棄而不舉世期聞之馳往拯救分食解衣以贍其乏三子並得成長同縣俞陽妻荘年九十荘女蘭七十並各老病單孤無所依世期衣服之二十餘年死並殯𦵏宗親嚴𢎞鄉人潘伯等十五人荒年並饑死露骸不收世期買棺為殯埋存育孩㓜山隂令何曼之表言之故有是命八年詔曰故綏逺將軍晉夀太守郭啓𤣥往銜命虜庭秉義不屈受任白水盡勤靡懈公奉私餼纎毫弗納布衣蔬食飭躬惟儉故超受顯邦以甄亷績而介誠苦節始終匪貳身死之日妻子凍餒志操殊俗良可哀悼可賜其家榖五百斛二十五年幸江寧經劉穆之墓詔曰故侍中司徒南康文宣公穆之秉徳佐命翼亮景業謀猷經逺元勲克茂功銘鼎彛義彰典䇿故已嗣徽前哲宣風後代者矣近因遊踐瞻其塋域九原之想情深悼歎可致祭墓所以申永懷二十六年幸丹徒遣使祭晉故司空忠肅公何無忌之墓孝武帝即位初詔曰日者逆豎犯蹕釁變卒起廣威將軍關中侯卜天與提戈赴難挺身奮節斬殪㓙黨而旋受虐刃勇冠當時義侔古烈興言追悼傷痛予心宜加甄贈以旌忠節贈龍驤將軍益州刺史諡曰壯侯帝親臨哭給天與家長稟初天與為廣威將軍領左細仗兼帶營禄元㓙劭入弑事變倉卒舊將羅訓徐罕皆望風屈附天與不暇被甲執刀持弓疾呼左右出戰徐罕曰殿下入汝欲何為天與罵曰殿下常來云何即時方作此語只汝是賊手射劭於東堂幾中逆徒擊之臂斷倒地乃見殺其隊將張泓之朱道欽陳滿與天與同出拒戰並死故有是命又詔曰徐湛之江湛王僧綽湛之等以議廢立事為元㓙邵所害門户茶酷遺孤流寓言念既往感痛兼深可令歸居本宅厚加䘏賜於是三家長給廩又詔曰司徒故左長史張敷正心簡立㓜樹風規居哀毁滅孝道淳至宜在追甄於以報美可追贈侍中仍改其所居稱為孝張里敷吳興人父亡成服凡十餘日始進水漿𦵏畢不進蔬菜遂毁瘠成疾伯父茂度每譬止之敷益更感慟絶而復續茂度曰我軰譬汝有益但更甚耳自是不復往來未朞年而卒又詔曰夫輕道重義亟聞其教世弊國危希遇其人自非達義之至識正之深者孰能抗禦衛主遺身固節者哉故太子左衛卒袁淑文辯優給秉忠貞慤當要逼之切意色不撓厲辭道逆氣震兇黨虐刃交至取斃不移古之懷忠殞難未有出其右者興言嗟悼無廢乎心宜在加禮永旌宋有臣焉可贈侍中太尉諡曰忠憲公淑為元㓙邵所殺故有是命大明二年改晉陵人余齊民所居之里為孝義里齊民為邑書吏父殖在家病亡家人以父病報之信未至齊民謂人曰比者内痛心煩有若割截居常惶駭必有異故信尋至便歸四百餘里一日而至至門方知父死號踊慟絶良乆乃蘇問母父所遺言母曰汝父臨終恨不見汝曰相見何難於是號呌殯所須㬰便絶州郡上言有司奏曰收賢旌善萬代無殊心至自天古今豈異齊民至性繇中情非外感淳精凝至深心天徹跪訊遺㫖一慟殞亡雖迹異參柴而誠均丘趙方今化淳以禮治本惟孝靈祥歸應其道先彰齊民越自氓𨽻行貫生品旌閭表墓允出在茲改其里為孝義里蠲租布錫其母榖百斛從之五年行幸經殷景仁墓詔曰故司空文成公景仁徳量淹正風識明允徽績忠謨夙逹光炤惠政茂舉寔留民屬近瞻丘墳感往興悼可遣使致祭又經王𢎞等墓下詔曰故侍中中書監太保錄尚書事揚州刺史華容文炤公𢎞徳猷光邵鑒識明逺故散騎常侍左光録大夫太子詹事豫章文侯曇首夙尚恬素理心身正並綢繆先眷契濶屯夷内亮王道外流徽譽以國圗令勲民思茂惠朕簿廵都外瞻覽墳塋永言想慨良深于懷便可遣使致祭墓所七年車駕幸南豫州詔遣祭晉大司馬桓温征西將軍毛􅟛墓明帝即位初以栁元景為前廢帝所害詔曰故侍中尚書令驃騎大將軍巴東郡開國公新除開府儀同三司南豫州刺史元景風度𢎞簡體局深沉正義亮時恭素範物幽明道盡則首贊孝圖盛運開厯則毗爕皇化方任孚漢輔業懋殷衡而蜂豺肆濫顯加禍毒寃動勲烈悲深朝貫朕承七廟之靈纂臨寳業情典既申痛悼彌軫宜崇賁徽册以旌忠懿可追贈使持節都督南豫江二州諸軍事太尉侍中刺史國公如故給班劒三十人羽葆皷吹一部諡曰忠烈公又以故侍中太尉沈慶之為廢帝所害追贈侍中司空諡曰襄公㤗始三年徐州刺史薛安都反遣信要引魏魏遣尉遲茍人等救之安都降魏初安都起兵長史蘭陵儼宻欲圖之見殺安都未向桑乾前軍裴祖隆謀殺茍人舉彭城歸順事洩見誅員外散騎侍郎孫耿之往安都從孑索肥戰死及劉彌之張靈慶皆戰敗見殺並為帝所哀追贈儼光禄勲祖隆寧朔將軍兖州刺史耿之羽林監彌之輔國將軍青州刺史靈慶寧朔將軍冀州刺史南齊太祖建元三年遣兼散騎常侍虞炎等十二部使行天下表列公孫僧逺等二十三人詔並表門閭蠲租稅公孫僧逺㑹稽剡人事父母以孝聞弟亡無以𦵏身販貼與鄰里共歛送之費兄妹未婚嫁乃自賣為之成禮華寳晉陵無錫人父豪義熙末戍長安寳年八歲臨别謂寳曰須我還當為汝上頭及長安䧟歿寳年至七十不婚冠或問之者輙號慟彌日不忍答也薛天生劉懷𦙍亦晉陵人天生母遭艱菜食天生亦菜食母未免喪而死天生終身不食魚肉與弟有恩義懷𦙍與弟懷則年十歲遭父喪不絮帛不食鹽菜吳欣之晉陵利城人宋元嘉末弟尉之為武進縣戍隨王誕起義太祖遣軍主華欽討之吏民皆散尉之獨留見執將死欣之詣欽乞代弟命辭淚哀切兄弟皆見原呉逹之義興人嫂亡無以𦵏自賣為十夫客以營塜槨從祖弟敬伯夫妻荒年被略賣江北逹之有田十畆貨以贖之與之同財共宅郡命為主簿因以讓兄又讓世業舊田與族弟弟亦不受田遂閒廢韓係伯以桑枝䕃妨他地遷界上開數尺鄰畔隨復侵之係伯輙更改種乆之鄰人慙愧還所侵地躬往謝之孫淡太原人僑居長沙事母孝母疾不眠食以痊為期母哀之後有疾不使知也蔣雋之妻黄氏義興人夫亡不重嫁家逼之欲赴水自殺乃止封延伯者僑居東海三世同財為北州所宗附義興陳𤣥子四世一百七十口同居武陵郡邵榮興文獻叔八世同居東海徐生之武陵范安祖李聖伯范道根五世同居零陵譚𢎞寳衡陽何𢎞華陽楊黒頭踈從四世同居並共衣食栁世隆以母憂去職太祖踐祚起為平南將軍南豫州刺史進爵為公帝手詔與司徒褚淵曰向見世隆毁瘠過甚殆欲不可復職非直使人惻然實亦世珍國寳也淵答曰世隆至性純深哀過乎禮事陛下在危盡忠喪親居憂杖而後起立人之本二理同極加榮増寵足以厲俗敦風張瓌為呉興太守瓌以既有國秩不取郡俸太祖勅上庫别藏其俸以表其清武帝永明元年詔曰魏矜袁紹恩洽丘墳晉亮兩王榮覃餘裔二代𢎞義前載美談袁粲劉秉並與先朝同奨宋室沈攸之於景和之世特有乃心雖末節不終而始誠可録歲月彌往宜軫優隆粲秉前年改𦵏塋兆未修材槨可為經理粗令周禮攸之及其諸子喪柩在西者可符荆州送返舊墓在所為塋葬事是年又詔㑹稽永興兒翼之母丁表門閭蠲租税丁少喪夫性仁愛遭年荒分衣食以飴里中饑餓者鄰里求借未嘗違之同里陳禳父母死孤單無親戚丁收養之及長為營婚娶又同里王禮妻徐荒年客死山隂丁為置棺器自往歛塟元徽末大雪商旅斷村里比屋饑丁自出鹽米計口分賦同里左僑家露四喪無以𦵏丁為辦塜槨有三調不登者代為輸送丁長子婦王氏守寡執志不再醮州郡上言有詔蠲表五年詔曰龍驤將軍安西中兵參軍松滋令蕭叡明愛敬淳深色養盡禮喪過乎哀遂致毁滅雖未逹名教而一至可愍宜加榮命以旌善人可贈中書郎叡明少有至性奉親謹篤母疾躬禱夕不假寐及亡不勝哀而卒故有是贈鬰林王即位初呉興太守孔琇之表曰故鄣人王文殊性挺五常心符三教以父沒獯庭抱終身之痛專席常居銜罔極之䘏服紵縞以經年餌蔬菽以俟命婚義滅於天情官序空於素抱儻降甄異之恩牓其閭里有詔牓門改所居為孝行里明帝建武三年蜀郡王續祖華陽郝道福並累世同㸑詔表門閭蠲調役又呉興乘公濟妻姚氏生二男而公濟及兄公願乾伯並卒各有一子欣之天保姚養育之賣田宅為取婦自與二男寄止鄰家詔其為二子婚仍加蠲詔時司徒東閣祭酒廬陵王主簿江蒨居父憂以孝聞廬于墓側帝勅遣仗二十人防墓所王虛之廬江人十三喪母二十三喪父二十五年鹽酢不入口庭中楊梅隆冬三實每夜所居有光如燭永明中詔牓門蠲其三世和帝中興三年以故侍中中書監徐孝嗣謀廢東昏未决並子演况遇害贈太尉侍中中書監如故二年孝嗣改葬宣徳太后詔贈班劒四十人加羽葆鼔吹諡文忠改封餘干縣公贈子演侍中諡簡世子况散騎侍郎梁高祖初為雍州刺史州人韋愛遭母憂廬于墓側負土起墳帝聞之親往臨弔天監元年陸璉奉使巡行風俗表言豫章南昌人滕曇恭母卒水漿不入口晝夜哀慟曇恭有子三人皆有行業又長沙臨湘人徐普濟居喪未及𦵏而鄰家火延其舍普濟號慟伏棺上以身蔽火鄰人往救之焚炙已悶絶累日方蘇宣城宛陵有女子與母同牀寝母為猛獸所摶女號呌拏獸獸毛盡落行十數里獸乃棄之女抱母還猶有氣經時乃絶太守蕭琛􅐠焉表言其狀並有詔旌其門閭大通四年詔曰旌善表行前王所敦新野庾詵荆山珠玉江陵把梓静侯南渡固有名徳獨貞苦節孤芳素履奄隨運往惻愴于懷宜諡貞節處士以顯高烈帝少與詵善雅重之起義署為平西府記室普通中徴為中書侍郎皆稱疾不起及卒遂有是詔周捨為太子詹事時南津獲武陵太守白渦書許遺捨錢百萬津司以聞雖書自外入猶為有司所奏免官既卒贈侍中高祖詔曰故侍中䕶軍簡子捨義該𤣥儒博窮文史奉親能孝事君盡忠歴掌機宻清貞自居食不重味身靡兼衣終亡之日内無妻妾外無田宅兩兒單貧有過古烈往者南司白渦之劾恐外議謂朕有私致此黜免追愧若人一介之善可量加褒異以旌善人荀匠丁父兄服歴四年不出户哭泣目皆爛郡縣以状言高祖詔遣中書舍人為其除服擢為豫章王國左常侍匠雖即吉毁悴逾甚外祖孫謙誡之曰主上以孝治天下汝行過古人故發明詔擢汝此職非唯君父之命難拒故亦揚名後世所顯豈獨汝身哉匠於是乃拜沈崇傃呉興武康人母卒廬於墓側自以家貧初行喪禮不備復以葬後更治服三年乆食麥屑不噉鹽酢坐卧於單薦因虛腫不能起郡縣舉其至孝高祖聞之即遣中書舍人慰勉之乃下詔曰前軍沈崇傃少有志行居喪踰禮齊制不終未得大𦵏自以行乞淹年哀典多闕方欲以永慕之辰更為再朞之禮雖即情可矜而禮有明斷可更令除釋擢補太子洗馬旌彼門閭敦兹風教崇傃奉詔釋服而涕泣如居喪固辭不受官苦自陳讓甄恬江陵人喪父廬于墓側州將始興王憺表其行狀高祖詔曰朕虛已欽賢寤寐盈想詔彼羣岳務盡搜揚恬既孝行殊異聲著邦壤敦風厲俗𢎞益兹多牧守騰聞義同親覽可旌表室閭加以爵位臧盾有孝性隨父宿直於廷尉母劉氏在宅夜暴亡左右手中指忿痛不得寝及曉宅信果報㓙問其感通如此服制未終父又卒盾居喪五年不出廬户形骸枯瘁家人不復識郷人王端以状聞高祖嘉之勑累遣抑譬服闋除丹陽尹丞元帝承聖初追贈故呉興太守張嵊侍中中衛將軍開府儀同三司謚曰忠貞子初太清二年侯景圍臺城嵊遣弟伊率郡兵千人赴援景遣侯于鑒率精兵二萬擊嵊為賊所害賊平乃有是命陳宣帝時改王知𤣥所居清苦里為孝家里知𤣥太原人僑居于㑹稽剡縣居家以孝聞及丁父憂哀毁而卒故有是命後主至徳元年詔曰李陵矢竭不免請降于禁水漲猶且生獲固知用兵上術世罕有人故侍中司空南平郡公明徹明徹呉明徹也爰初躡足迄届元戎百戰百勝之寄决機决死之勇斯亦侔於古焉及拓定淮淝長驅彭汴覆勍冦如舉毛掃銳師同沃雪風威慴於異俗功効著於同文乃欲息駕隂山解鞍瀚海既而歸山已老數亦終竒不就結纓之功無辭入褚之屈望封崤之為易冀平翟之非難雖志在屈伸而奄中霜露埋恨絶域甚可嗟傷斯事已往累逢肆赦凡厥罪戾皆蒙洒濯獨此孤魂未霑寛惠遂使爵土湮沒饗醊無主棄瑕録用宜在兹辰可追封邵陵縣開國侯食邑一千户以其息惠覺為嗣明徹為隋師所執卒於長安故有是命東魏静帝武定末高貞與弟謚俱至孝父亡治喪墓次甘露白雉降集焉有司以聞詔標閭里北齊神武為東魏丞相時尉興敬為帳内都督神武敗周文於邙山興敬為流矢所中卒贈涇岐幽三軍事爵為公諡曰閔荘神武哀惜之親臨弔賜其妻子祿如興敬存焉文宣帝受禪初詔故太傅孫騰故太保尉景故大司馬婁昭故司徒高昂故尚書左僕射慕容紹宗故領軍万俟干故定州刺史段榮故御史中尉劉貴故御史中尉竇太故殷州刺史劉豐故濟州刺史蔡雋等並左右先帝經贊皇基或不幸早殂或殞身王事可遣使者就墓致祭並撫問妻子慰逮存亡天保元年祭告故贈太尉魏㤗之墓㤗初從神武西討為周文所襲自殺妻武平婁后妹也㤗雖以親見幸而功名自建陸彦師字雲房初仕後魏為襄城王元旭參軍以父難去職哀毁殆不勝喪與兄卭廬於墓次負土成墳公卿重之多就墓側存問晦朔之際車馬不絶文宣聞而加歎旌表門閭號其所住為孝終里武成帝以清河王岳顯祖時為高歸彦䜛構憂悸而薨後歸彦反世祖知其所譖曰清河忠烈盡力皇家而歸彦毁之間吾骨􅘰籍沒歸彦以良賤百口賜岳家又後思岳之功重贈太師太保梁太祖開平元年十二月詔故荆南節度使守中書令上谷王周汭贈太師故武昌軍節度使兼中書令西平王杜洪贈太傅先是鄂渚再為淮夷所侵攻圍甚急杜洪以兵食將盡繼來乞師帝料其隔越大江難以赴援兼以荆州據上㳺多戰艦去江夏甚邇因命周汭舉舟師㳂流以救之汭於是引兵東下纔及鄂界遇朗州背盟作亂乘江陵之虛縱兵襲破之俘掠且盡既而汭士卒知之皆顧其家咸無鬬志遂為淮冦所敗將卒潰散汭忿恚自投于江汭之本姓犯文穆皇帝廟諱臣欽若等曰汭本姓成至是因追贈以其系出周文故賜姓周氏及汭兵敗之後武昌以重圍經年糧盡力困救援不至訖為淮㓂所䧟載洪以送淮揚遂殺之此二鎮也皆以忠節歿於王事帝每言諸藩屏豫經綸之業必有首痛汭洪之薨至是追贈之後深加軫悼各以其子孫宗屬録用焉三年八月贈故山東道節度使留後王班太保贈故同州觀察判官盧匪躬工部尚書班故河陽將累以軍功為郡守主留事於襄陽為小將王求所殺匪躬嘗為劉知俊判官知俊反不偕行為亂兵所害是年贈牢牆使梁祖諱誠故曰牢牆王仁嗣司空故同州押衙史肇右僕射押衙王彦洪高漢詮丘奉言仇瓊並刑部尚書王筠御史司憲初知俊將叛謀㑹諸將詢所宜仁嗣等持正不撓悉罹其酷至是褒贈之明賞夫爵以報徳賞以報功盖百王不易之令典也而况閏位之君臨御非廣鄰有疆國下覽羣心儻非示彼寛仁厚其褒賞則何以致文武之輸誠被衆庶之為服所以當旋凱而振旅也則行飲至䇿勲之禮或拓宇而開邑也則施疏爵疇庸之典故使忠義激於肝腸華寵浹於家族捨此道也其可濟乎秦始皇初為秦王二十年燕太子丹使荆軻獻督亢之地圖軻既取圖奏之秦王發圖圖窮而匕首見荆軻逐秦王秦王環柱而走羣臣皆愕卒起不意盡失其度而秦法羣臣侍殿上不得持尺寸之兵軻乃逐秦王而卒惶急無以擊軻而以手共摶之是時侍醫夏無且以其所奉藥囊提荆軻也左右既前殺軻秦王不怡者良乆已而論功賞羣臣及當坐者各有差而賜夏無且黄金二百鎰曰無且愛我乃以藥囊提荆軻也蜀先主定益州賜諸葛亮法正張飛關羽金各五百觔銀千觔錢五千萬錦千匹其餘班賜各有差西蜀圍成都劉璋出降蜀中殷盛先主置酒大饗士卒取蜀中金銀分賜將士還其榖帛呉大帝黄武五年攻石碭孫奐為揚武將軍領江夏太守以地主使所部將軍鮮于丹帥五千人先斷淮道自帥吳碩張梁五千人為軍前鋒降高城得三將大軍引還大帝詔使在前住駕過其軍見奐軍陣整齊帝歎曰初吾憂其遲鈍今治軍諸將少能及者吾無憂矣拜揚威將軍封沙羡侯呉碩張梁皆禆將軍賜爵關内侯景帝初封琅邪王廢帝廢孫琳使宗正孫楷中書郎董朝迎帝即位永安元年十月壬午詔曰夫褒徳賞功古今通義其以大將軍綝為丞相荆州牧増食五縣武衛將軍恩為御史大夫衛將軍中軍督封縣侯威逺將軍授為右將軍縣侯偏將軍幹雜號將軍亭侯長水校尉張布輔道勤勞以布為輔義將軍封永康侯董朝親迎封為鄉侯十一月帝聞孫綝逆謀隂與張布圖計十二月誅綝己巳詔以左將軍張布討姦臣加布為中軍督封布弟惇為都亭侯給兵三百人惇弟恂為校尉後主大帝孫和子也初封烏程侯景帝薨丞相濮陽興左將軍張布迎立之元興元年八月以上大將軍施績大將軍丁奉為左右大司馬張布為驃騎將軍加侍中諸増位班賞一皆如舊宋高祖踐祚思佐命之功詔曰散騎常侍尚書僕射鎮軍將軍丹陽尹徐羡之監江州豫州之西陽新蔡諸軍事撫軍將軍江州刺史華容侯王𢎞散騎常侍䕶軍將軍作唐男檀道濟中書令領太子詹事傅亮侍中中領軍謝晦前左將軍江州刺史宜陽侯檀韶使持節雍梁南北秦四州荆州之河北諸軍事後將軍雍州刺史關中侯趙倫之使持節督北徐兖青三州諸軍事征虜將軍北徐州刺史南城男劉懷慎散騎常侍領太子左衛率新淦侯王伸徳前冠軍北青州刺史安南男向彌左衛將軍灄陽男劉粹使持節南蠻校尉佷山子劉彦之西中郎司馬南郡宜陽侯張邵參西中郎軍事建威將軍河東太守資中侯沈林子等或忠規逺謀扶贊洪業或肆勤樹績𢎞濟艱難經始圖終勲烈惟茂並宜與國同休饗兹大賚羡之可封南昌縣公𢎞可華容縣公道濟可改封永循縣公亮可建城縣公晦可武昌縣公食邑各二千户韶可更増邑二千五百户伸徳可増邑二千二百户懷慎彦之各進爵為侯粹改封建安縣侯並増邑千户倫之可封霄城縣侯食邑千户邵可封臨沮縣伯林子可封漢夀縣伯食邑六百户開國之制率循舊章羡之遷尚書令揚州刺史加散騎常侍進位司空録尚書事常侍刺史如故明帝初即位下詔曰夫良圖宣國賞崇彛命殊績顯朝榮勤王府安南將軍江州刺史王景文風度淹粹理授清暢體兼望實誠備夷岨寳歴方啓密贊義機妖徒干紀豫毗廟畧宜登茅社永傳厥祚朕澄氛寧極實資多士疏爵疇庸寔膺徽烈尚書左僕射領衛尉蔡興宗識懷詳正思局通敏吏部尚書領太子左衛率褚淵器情閑茂風業昭逺並謀參軍政績亮時艱拓宇開邑寔允勲典景文可封江安縣侯食邑八百户興宗可始昌縣伯淵可南城縣伯食邑五伯户景文固讓不許乃受五百户南齊太祖建元元年四月即位五月詔封佐命文武功臣新除司徒禇淵等三十一人進爵増户各有差明帝建武末王敬則叛逆既敗封左興盛新呉縣男崔恭祖遂興縣男劉山陽湘隂縣男胡松沙陽縣男各四百户賞平敬則也梁太祖開平二年十月以行營左廂步軍指揮使賀瓌為左龍虎統軍以左天武軍夾馬指揮使尹皓為輝州刺史以右天武都頭韓塘為神㨗指揮使左天武第三都頭胡賞為右神㨗指揮使仍賜帛有差以解晉州圍之功也三年六月同州節度使劉知俊據郡叛知俊弟内直右保勝指揮使知浣自雒奔至潼關右龍虎軍十將張温以上二十二人於潼關擒獲劉知浣送至行在勅知浣逆黨之中最為頭角龍虎軍親兵之内實冠𤓰牙昨者攻取潼關率先用命尋則擒獲知浣最上立功頗壯軍威將除國難所懸賞格便可支分許賜官階固須除授但昨捉獲劉知浣是張温等二十二人一時向前共立功効其賞錢一千貫文數内一百貫文與最先打倒劉知浣衙官李稠四十三貫文與十將張温二十人各與錢四十二貫八百五十文立功勅救命便授郡府亦縁同時立功人數不少所除刺史難議偏頗宜令逐月共支給正刺史料錢二百貫文數内十將張温一人每月與十貫文餘二十一人每月每人各分九貫文仍起七月一日以後支給人與轉官職仍勘名仰分析申奏當與施行乾化元年九月帝駐相州賞左親騎指揮使張仙右雲騎指揮使宋鐸嘗身先陷陣各賜帛二年三月勅以攻下棗彊縣有功將校杜暉等一十一人並超加檢校官衙官宋彦等二十五人並超授軍職延賞夫念功不忘延賞及後邦家之治所以有成人臣之心於是知勸雖商周之盛典墳所載未嘗易此也而况當艱危之際有戰伐之事或分據於一方或抗衡於中國必在總攬豪傑網羅英俊顯忠遂良育才樂善而已其有同徳之臣一心之士生著功烈沒樹風聲思有以答彼忠誠昭斯國典則有軫遺孤䘏宗黨或錫以土宇或授之冠冕或接於姻婭或修乎廢絶盖惻隠之至仁不朽之盛徳也以至推流根之澤頒錫壤之恩又足以慰罔極之悲成不匱之孝焉蜀先主時龎統為軍師中郎將從入蜀進圍雒陽統率衆攻城為流矢所中卒先主痛惜言則流涕拜統父議郎遷諌議大夫法正為尚書令卒先主為之流涕賜子邈爵關内侯董允為大將軍卒後主痛惜賜子粲爵關内侯呉大帝時陳武為偏將軍奮命戰死帝哀之武子修有武風建安末追録功臣後封都亭侯凌操為破賊校尉從大帝討夏口先登破其前鋒中流矢死子統年十五左右多稱述者帝亦以操死國事拜統别部司馬行破賊都尉使攝父兵凌統為偏將軍病卒二子烈封年各數歲帝内養於宫愛待與子同及八九歲追錄統功封烈亭侯還其故兵後烈有罪免封復襲爵領兵蔣欽為津右䕶軍大帝討關帥欽督水軍入沔道病卒帝素服舉哀以蕪湖民二百户田二百頃給欽妻子子壹封宣城侯黄盖領武陵太守加偏將軍大帝踐祚追論其功賜子柄爵關内侯孫皎為征虜將軍建安二十四年卒大帝追録其功封子裔為丹陽侯程普為盪冦將軍卒及大帝稱尊號追論普功封子咨為亭侯顧雍為丞相初疾微時大帝令醫趙泉視拜其少子濟為騎都尉雍聞悲曰泉善别死生吾必不起故帝欲及吾目見濟拜也濟襲爵無後絶景帝永安元年詔曰故丞相雍至德忠賢輔國以禮而侯統廢絶朕甚愍之其以雍次子裕襲爵為醴陵侯以明著舊勲朱據為驃騎將軍賜死後二子熊損復為全公主所譖皆死永安中追録前功以熊子宣襲爵雲陽侯尚公主後主即位詔曰故僕射屈晃志扶社稷忠諫忘身封晃子緒為東陽亭侯弟幹恭為立義都尉緒亦至尚書僕射晃大帝時為尚書僕射帝時廢太子和晃固諌斥還鄉里至是追其功封其子弟焉宋高祖時初劉鍾從帝為行參軍征廣固以功封永新縣男食邑五百戸後平蜀有功應封四百戸男以先有封爵减戸賜以次子敬順高昌縣男食邑百戸沈慶之為侍中太尉義陽王昶反慶之從帝渡江總領衆軍少子文耀年十餘歲善騎帝愛之又封永陽侯食邑千戸謝𢎞微繼從叔峻後襲爵建昌侯晉世名家身有國封者起家多拜員外散騎侍郎𢎞微亦拜員外散騎侍郎王大司馬參軍沈文季字仲達呉興武康人父慶之為司空孝建三年文季起家辟州主簿遷秘書郎以慶之勲重大明五年封文季山陽縣五等伯南齊武帝時王敬則為右衛將軍又封敬則子元遷為東鄉侯食邑三百七十户梁髙祖時江淹為金紫光祿大夫醴陵侯卒子為襲封自丹陽丞為長城令有罪削爵晉通四年帝追念淹功復封為呉昌伯邑如先楊公則為中衛軍寧都侯卒子瞟嗣有罪國除髙祖以公則勲臣特詔聽庶長子眺嗣固讓歴年乃受北齊孝昭帝時詔九州勲人有重封者聽分授子弟以廣骨肉之恩武成時張雕為國子祭酒待詔文林舘子徳冲謙謹善於人倫聰敏好學頗渉文史以帝師之子早見旌擢歴員外散騎侍郎太師府掾入中書舍人隨例待詔梁太祖開平元年九月魏博羅紹威二男廷望廷矩年在㓜稚皆有材器帝以其藩屏勲臣之胄宜受非次之用皆擢為郎恩命既行之後二子亦就班列紹威乃上章以齒㓜未任公事乞免主印宿直從之四年四月壬戌詔曰追養以禄王者推歸厚之恩欲静而風人子抱終身之感其以刑部尚書致仕張䇿及三品四品常參官二十二人先正各追贈一等五年五月甲申朔制曰諸道節度使錢鏐張宗奭馬殷王審知劉隠各賜一子六品正員官高季昌賜一子八品正員官賀徳倫賜一子九品正員官冊府元龜卷二百十
