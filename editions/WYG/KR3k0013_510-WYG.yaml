body:
  text: 册府元龜卷五百十宋王欽若等撰邦計部重歛希㫖交結重歛古者賦有藝而歛有時故財不匱而人不怨蓋事舉其中取之以道也傳曰作法于凉其弊猶貪其或用度靡節事役滋煩始以邊鄙之聳加以軍旅之動故取之過籍率其倍征有餘則謂之豐財不足則因而變法乃至行誅求之政侵削于下畜掊克之臣聚歛為務上有罷民之失下有浚我之歎雖經費之暫足亦靡弊之實多倘或事貴從權舉非獲已迫于用度人如之何雖出于一時亦致逺恐泥然而射利無厭殘民以逞借曰無害人不信也夫子所謂鳴鼔而攻之者其有㫖哉夏桀率遏衆力率割夏邑言桀君臣相率為勞役之事以絶衆力謂廢農功相率割刹夏之邑居征賦重也商紂都河内朝歌厚賦稅以實鹿臺之錢鹿臺臺名今在朝歌城中又紂重賦傷民歛聚怨讐之道魏侯時詩不載侯之謚國人刺其君重歛蠶食于民不修其政貪而畏人若大鼠故作石鼠之詩云魯宣公十五年初稅畆非禮也糓出不過藉周法民耕百畆公田十畆借民力而稅不過此以豐財也成公元年三月作丘甲周禮九夫為井四井為邑四邑為丘丘十六井出戎馬一匹牛三頭四丘為甸六十四井出長轂一乗戎馬四匹牛十二頭甲士三人步卒七十二人此甸所賦今魯使丘出之譏重歛也昭公四年鄭子産作丘賦邱十六井當出馬一匹牛三頭今子産别賦其田如魯之田賦國人謗之曰其父死于路謂子國為尉氏所殺已為蠆尾謂子産重賦毒害百姓以令于國國將若之何哀公十二年春用田賦直書之者以示改去重歛哀公問于有若曰年饑用不足如之何有若對曰盍徹乎盍何不也周法十一而稅謂之徹徹通也為天下之通法曰二吾猶不足如之何其徹也二謂十一而稅秦始皇時内興功作外攘夷狄收泰半之賦三分取其二男子力耕不足糧饟古餉字女子紡績不足衣服竭天下之資財以奉其政猶未足以澹其欲澹古贍字海内愁怨遂用潰畔下逃其上曰潰又云秦為亂政頭㑹箕歛家一頭數出糓以箕歛之也以供軍費財匱力盡漢武帝元狩四年縣官衣食振業用度不足請收銀錫造白金及皮幣以足用是時禁苑有白鹿而少府多銀錫乃以白鹿皮方尺緣以繢繢繡也繪五采而為之為皮幣直四十萬王侯宗室朝覲聘享必以皮幣薦璧然後得行又造銀錫白金雜鑄銀錫為白金以為天用莫如龍地用莫如馬人用莫如龜故白金三品其一曰重八兩圜之其文龍名白撰直三千二曰次重差小方之其文馬直五百以半斤之重差為三品此重六兩則下品重四兩也三曰復小撱之其文龜直三百撱圎而長也音他果切先是匈奴渾邪等降漢大興兵伐匈奴山東水旱貧民流徙皆卬給縣官卬音五剛切縣官空虚御史大夫張湯承上指請造白金及五銖錢籠天下鹽鐵籠羅其事皆令利入官排富商大賈出告緡令鉏豪强并兼之家舞文巧詆以鋪法又大農丞孔僅東郭咸陽言異時筭軺車賈人之緡貲錢有差小異時言往時也軺小車也緍謂錢貫也軺音弋昭切緡音武巾切請筭如故諸賈人末作貰貸賣買居邑貯積諸物貰除也貸便與也貰音式制切貸音士載切及商以取利者雖無市籍各以其物自占占隠度也各隠度其財物多少而為名簿送之於官也占音之瞻切率緡錢四千而筭一率計有二十錢者則出一等諸作有租及鑄以手力所作而賣之者率緡錢四千筭一非吏比者三老北邊騎士軺車一筭此制也身非為吏之例非三老北邊騎士而有軺車皆令出一筭比音必視切商賈人軺車二筭商賈人有軺車人使多出一筭重其賦船長五丈以上一筭匿不自占不悉戍邊一歲沒入緡錢悉盡也有能告者以其半畀之元鼎五年九月列侯坐獻黄金酎祭宗廟不如法奪爵者百六人六年卜式為御史大夫式既在位見郡國多不便縣官作鹽鐵器苦惡賈貴或强令民買之而船有筭商者少物貴乃因孔僅言船筭事上不說漢連出兵三歲誅羌滅兩粤番禺以西至蜀南者置初郡十七元鼎六年定越地以為南海蒼梧鬰林合浦交趾九真日本珠崖儋耳郡定西南夷夷以為武都牂柯越嶲門沈黎文山郡及地理志西南傳所置犍為零陵益州郡凡十七且以其故俗治賦稅南陽漢中以往各以地比給初郡吏卒奉食幣物傳車馬被具地比謂依其次第自近及逺比音頻寐切傳音張阮切被音吏義切而初郡又時小反殺吏漢發南方吏卒往誅之間歲萬餘人間歲隔一歲費仰大農大農以均輸調鹽鐵助賦故能澹之然兵所過縣縣以為貲給母乏而已不敢言輕賦法矣宣帝五鳯四年耿夀昌為大司農中丞上言増海租二倍天子皆從其計御史大夫蕭望之奏言故御史屬徐宫御史大夫屬家在東萊言往年加海租魚不出長老皆言武帝時縣官嘗自漁海魚不出後復予民魚乃出夫隂陽之感物類相應萬事盡然王莽天鳳六年一切稅天下吏民貲三十取一縑帛皆輸長安後漢順帝永和六年七月甲午詔假民有貲者户錢一千靈帝中平二年南宫災宦者張讓趙忠等說帝令歛天下田畆稅十錢以修宫室發太原河東狄道諸材木及文石每州郡部送至京師刺史二千石及茂才孝亷遷除皆責助軍修宫錢大郡至二三千萬餘各有差當之官者皆先至西園諧價然後得去諧謂平論定其價也有錢不畢者或至自殺其守清者乞不之官皆廹遣之晉孝武太元八年始増百姓稅米口五石宋文帝元嘉中始興太守徐豁上表曰武吏年滿十六便課米六十斛十五以下至十三皆課三十斛一户内隨丁多少悉皆輸米且十三歲兒未堪田作或是單迴便自逃匿户口歲减寔此之由宜更量課限使得存立今若減其米課雖有交損考之將來理有深益詔善之孝武時齊庫上絹年調鉅萬疋綿亦稱此期限嚴峻民間買絹一疋至二三千綿一兩亦三四百貧者賣妻兒甚者或自縊死沈懐文具陳民困繇是綿絹薄有所減俄復舊隋煬帝時東西遊幸靡有定居每以供費不給逆收數年之賦唐代宗大厯末韓滉為户部侍郎判度支苛剋頗甚覆治按牘勾剝深文人多咨怨徳宗嗣位素惡滉掊克改為太常卿羣議未息又出為晉州刺史徳宗建中三年四月太常博士韋都賓陳京建議以為泉貨所聚在于富商錢出萬貫者請留其萬貫為業有羨官借以給軍計天下不借一二十商人而國家數年之用足矣徳宗從之許罷兵後以公錢還之仍令度支條上判度支杜佑以是時諸道軍用三月費錢百餘萬貫借商若獲五百萬貫可給數月矣乃詔京師大索兾盈五百萬貫京兆少尹韋禎督責頗峻長安令薛苹荷校乘車捜人財貨意其不實輙遣榜笞笞人不勝寃痛或自縊而死京師囂然如被盜賊統計田宅奴婢等估纔餘八十萬貫又以僦櫃納質積錢貨貯粟麥等一切借其四分之一封其櫃窖長安為之罷市百姓相率千萬衆邀宰相於道盧杞懼無以遏乃疾馳他道而歸由是禎復奏市錢不足百貫粟麥不足五十斛者免僦櫃納質積所得與借商兼計纔二百萬貫人亦竭矣五月淮南節度使陳少遊請於本道兩稅錢每千増二百因詔他道悉如淮南又㩁鹽每斗更加百文四年六月初稅間架除陌錢時馬燧李懐光李抱真李芄四節度之兵屯於魏縣判度支趙賛以軍須迫蹙常平利不時集乃請稅屋間架筭除陌錢間架法凡屋兩架為一間屋有貴賤約價三等上價間出錢二千中價一千下價五百所繇吏秉筆執筭入人廬舍而計其數衣冠士族或貧無他財獨守故業坐多出筭者動數千萬人不勝其苦凡沒一間者杖六十告者賞錢五十貫取於其家除陌法天下公私給與貨易率一貫舊筭二十一益加筭五十給與他物或兩換者約錢為率筭之市主人市牙各給印紙人有賣買隨自署記翌日合筭之有自貨易不用市牙者騐其私簿投狀自道其有隠錢百沒入二千杖六十告者賞錢十千出於其家法既行而主人市牙得專其柄率多隠盗公家所入曽不得半而怨黷之聲囂然滿於天下貞元八年四月劒南西川節度使韋臯請加稅十二以増給官吏從之五月初増稅京兆苗畆三錢以給掌閑彍騎憲宗元和十一年王師討蔡州呉元濟是時州縣近淮西者行輸尤苦東畿供饋車常數千兩相錯于路每車駕三牛將卒有副所在霖潦汝潁汎溢饋車多阻其至者或不以時歸之于是東畿有以驢耕者十一年九月罷湖南觀察使韋貫之為太子詹事仍分司東都時軍用轉乏亟責諸道進獻貫之坐率管内刺史錢助軍故有是命十四年六月丁巳判度支皇甫鏄重奏諸道州府監院每年送上都兩稅㩁酒鹽利度支米價等疋叚加估定數詔許之其先下州府監院連四月二十五日勑牒更不在行用限鏄急於掊聚先是奏近年天下所納鹽酒等利擡估者一切追行詔既可給事中崔植抗論以為用兵歲久百姓凋弊往者雖估踰其實今固不可復追疏奏命宰臣召植宣㫖嘉諭許輟已行之詔物議大罪鏄而美植鏄懼至是乃文前過且重條奏請申勑以示之及鏄作相剝下以希旨時李渤為庫部員外郎㑹陳許節度使郗士美卒令渤充弔祭使路次陜西渤上疏曰臣自出使厯求利病竊知渭南縣長源鄉本有四百户今纔四十餘户閿鄉縣本有三千户今纔有一千餘户其他州縣大略相似其弊所自起于攤逃大約十家内一家逃亡即攤賦稅使九家共出稅額長定有逃既攤似投石井中不到底不止攤逃之弊户不盡不休此皆聚歛之臣競剝下以奉上唯思竭澤不慮無魚伏乞詔書絶其攤逃以見在户家産錢數為定其餘有欠且特恩免之計不數年人必歸于農矣夫農者國之本本立然後可以議太平若不繇此而云已太平者是邪佞之臣也伏乞陛下察而逐之疏奏仍具狀申中書門下穆宗長慶元年六月知懐州河陽節度參謀兼監察御史韋珩奏論當州元和九年秋至十四年夏准旨額外加徵并節度使司見簡苗徵子及草等共計五百六十萬三千五百八十石束詔曰前刺史烏重𦙍等並位居守土職在牧人加稅縱緣軍須豈得不先聞奏遇赦雖當原宥亦合量有科徵烏重𦙍令狐楚魏義通等宜各罰五月俸料知州官釋放敬宗寳厯元年七月鹽鐵使王播進羨餘絹一百萬疋仍請日進二萬計五十日方畢播自掌鹽鐵正入不充而羨進相次侵求聚歛迫于星火文宗太和九年九月鹽鐵轉運使王涯奏請變江淮嶺南茶法并請加稅以贍邦計十月加宰臣王涯開府儀同三司兼諸道鹽鐵轉運㩁茶使初鄭注自謂有經濟之方帝問以安人富國之術無以對因請㩁茶涯知不可而不敢違及詔下商人計鬻茶之資不能當所㩁之多復以江淮間百姓茶園官自造作量給其直分命使者主之江淮人什二三以茶為業皆公言曰果行是勑止有盡殺使人入山反耳兵興以來山澤江淮海㩁莞之利無遺逸矣利益歸于上民益窘于下涯尚欲希恩加稅重用其法以窮其人後唐末帝清泰元年詔禁軍鳳翔城下歸閲帑藏無貨財率城中士庶至於鼎釡之類亦估給及經雍華陜率如鳳翔士民之家不勝其苦至京師三司調計左藏金帛不過二三萬續内外貢奉計外少四十五萬緡詔盧貭而下率配京城市民及舍屋計不過六萬緡帝怒軍巡使下獄命供奉官丁昭溥史思温為軍巡使晝夜督促囚繫滿獄貧民不濟有投井自經者而軍中揚揚于市四坊民聚詬云爾為主征行勞苦不羞見天子俾我輩鞭胸打背出賞錢莫氣槩揚揚天眼㑹有開時也帝聞之不懌是夜李專宿于禁署讓之曰韓昭𦙍首鼠我不責辦卿士人子弟嘗言有才術今致我至此不能運度以濟時事留才術何所施也専惶恐待罪良乆奏曰臣才力駑劣屬當興運陛下猶垂録任無以裨益聖朝然府藏空竭軍賞不給非臣之罪也臣思先皇棄代之際是時府庫濫賞已竭繼以鄂王臨朝紀綱大壊縱有無限之財賦不能滿驕卒谿壑之心所以陛下孤立岐陽而得天下臣以為國之存亡不專在行賞須刑政立于上恥格行于下賞當功罰當罪乃理道也若陛下不改覆車之轍以賞無頼之軍徒困蒸民存亡未可知也今宜以見收財賦以給之不必踐前言而希茍恱帝然之故有是給數二十餘萬緡漢少帝時王章為簡校太尉同平章事判三司專於權利剥下過當歛怨歸上物論非之舊制秋夏苗租民輸一斛别輸二升謂之雀鼠耗乾祐中輸一斛者别令輸二斗目之為雀耗百姓苦之又官庫出納緡錢皆以八十為陌至是民輸者如舊官給者以七十七為陌民有訴田者雖無數十口章必命全州覆視幸其廣有苗額以増邦賦曽未數年民力大困章與楊邠不喜儒士郡官所請月俸皆取不堪資軍者給之謂之閒雜命物所司髙估其價估定更添謂之擡估章亦不滿其意隨事更令添估章急於財賦峻於刑法民有犯鹽麴之令雖絲毫滴瀝盡處極刑吏緣為姦民不堪命希旨禮曰寧蓄盜臣不蓄聚歛之臣以害其民也况復希意先指要寵固恩以尅下為忠以媚上為徳重筦㩁之禁増賦歛之規罔䘏天災謬陳經據供億支費底貢羨贏務竭民財以從主欲雖賜予蕃庶光寵隆極盖無取焉唐宇文融𤣥宗開元中為觀農使與楊慎矜父子以勾剥財物爭行進獻而致恩顧王鉷天寳中為户口色役使以希旨事勾剥財物百姓雖給復一年鉷即徵其脚錢廣張其數𤣥宗在位多載妃御承恩賞賜頗盛不欲頻於左右藏取之鉷探旨意歲進錢百億萬貯於内庫以恣主恩賜賚鉷云此是常年額外物非征稅物帝以為鉷有富國之術利於王用益厚待之楊國忠天寳中為户部侍郎判度支謟諛以利隂中為己之功𤣥宗幸左藏庫賜文武百官縑帛有差時國忠徵夫丁租地稅皆變為布帛用實京庫屢奏帑藏充物有踰漢制帝是以觀焉又賤貿天下義倉易以布帛於左藏庫列造數百間屋以示羨餘請與公卿就觀之又詐言鳳凰集於庫第五琦肅宗乾元初為度支鹽鐵使時京師多豪將求取無節琦不能禁乃悉以租賦進入大盈内庫以中人主之意天子以取給為便故不復出劉晏代宗大厯中為東都江南江淮山南等道轉運鹽鐵等使江淮茶橘晏與本道觀察使各歲貢之皆欲其先至有圡之官或封山斷道禁前發者晏厚以財力致之嘗先佗司繇是不為藩鎮所便裴延齡徳宗貞元中為户部侍郎判度支嘗因奏對請積錢帛以實帑藏帝曰若為可得錢物延齡奏曰開元天寳中犬下户僅千萬百司公務殷繁官員尚或有缺自兵興以來户口減耗大半令一官可兼領數司伏請自今已後内外百司官闕未須補置收闕官禄俸以實帑藏後因對事帝謂延齡曰朕所居浴堂院殿一袱以多年之故似有損蠧欲換之未能對曰宗廟事至重殿袱事至輕况陛下自有本分錢物用之不竭帝曰本分錢何也對曰此是經義證據愚儒常材不可能知陛下正合問臣惟臣知之准禮經云天下賦稅當為三分一分充乾豆一分充賓客一分充君之庖㕑乾豆者供宗廟也今陛下奉宗廟至敬至嚴至豐至厚亦不能用一分財物也只如鴻臚禮賓諸蕃客至于迴紇馬價用一分錢物尚有贏羨甚多况陛下御膳宫厨皆極簡儉所用外分賜百官充俸料飱錢等猶未能盡據此而言庖厨者之餘其數尚多皆陛下本分也用修數十殿亦不合疑慮何况一袱帝曰經義如此人總不曽言之頷之而已李錡貞元末為鹽鐵轉運等使天下㩁酤漕運繇其操剸専事貢獻牢其寵渥裴均為尚書左僕射判度支憲宗元和三年五月奏請取荆南雜錢萬貫修尚書省許之均前鎮荆南自言府庫饒羨因有是請時議非之王播為刑部侍郎充諸道鹽鐵轉運等使元和十年討淮西憲宗以饋餉為功播能積聚號為羨餘専有貢獻帝頗顧遇超遷禮部尚書穆宗即位復進用播刑部尚書充諸道鹽鐵等使長慶元年冬十月特拜中書侍郎同中書門下平章事依前充使當長慶時中外政權多所假借播本因權故得擢升大用及在相府無所弼諧頗不厭公望居半歲以簡校右僕射同平章事出為淮南節度仍領轉運鹽鐵如舊至淮南遇歲旱有至骨肉相食者播方務聚歛貢獻人益怒之四年四月罷鹽鐵轉運使以王涯代之來年復以使務令播就淮南統之諫官大臣章疏迭上終不能阻播闗通之計當元和中兩河宿兵發運殆無虚歲播掌財賦以希恩取媚特每歲送錢號為羨餘寳厯元年十二月進羨餘綾絹五十萬疋又太和元年五月己卯自淮南節度兼諸道鹽鐵轉運進綾絹三萬疋丙戌又進銀榼二百枚銀盖椀一百枚散椀二千枚綾絹各二十萬疋並稱鹽鐵羨餘播自淮南入朝方圗大用故極其進獻仍偽以羨餘為名九月播進玉帶十三條四年正月丁亥進羨餘綾絹二十萬疋皇甫鏄判度支元和十三年正月進錢二萬貫鹽鐵使程异進絹十萬疋並號羨餘王遂為光禄卿充供軍使元和十四年討鄆州李師道調兵食三百萬及賊平遂進羨餘一百萬繇是拜沂海等州觀察使王涯為諸道鹽鐵轉運使文宗太和四年四月庚戌進第九船羨餘綾絹一萬疋癸丑涯進第十船羨餘綾絹二萬疋十月王涯進降誕綾絹羅錦綵等共一萬二千八百疋銀器一百事十二月戊寅涯進羨餘綾絹前後凡八百餘疋五年二月庚辰涯進羨餘疋段進銀碗一千五百口丁酉涯進羨餘綾絹共十萬疋八月戊寅涯進羨餘絹二萬疋甲申涯進羨餘綾絹二萬疋九月辛丑涯進羨餘綾絹二萬疋六年六月涯進羨餘絹二十萬疋王起判度支太和四年十月進綾絹夾纈雜綵等共一萬四千三百疋御衣一副鏡一面諸方鎮稱是交結夫位司邦本職在均輸或請謁以求名或朋附而固寵妄交要路謟事中人總計失于成謀節均虧于適用利權莫舉經制靡修信不可委以計㑹之任助于富庶之政也唐元載肅宗元年為户部侍郎度支并諸道轉運使與倖臣李輔國善輔國妻元氏載之諸宗因是相昵狎時輔國權傾海内舉無違者㑹選京尹輔國乃以載兼京兆尹載意屬國柄就輔國懇辭京兆尹輔國識其意然之翌日拜同中書門下平章事度支轉運使如故劉晏代宗寳應初為吏部尚書平章事領度支鹽鐵轉運租庸等使坐與中官程元振交通元振得罪晏罷相為太子賓客尋授御史大夫領東都河南江淮山南等道轉運租庸鹽鐵等使當時權勢或以親戚為託晏亦應之俸給之多少命官之遲速必如其志然未嘗得親職事班宏徳宗貞元中以為户部尚書為宰相竇叅度支使之副每奉詔營建宏必極壯麗親程課役又厚結權倖以傾叅知為上所疎乃讓度支使遂以宏專判李錡貞元中為浙江西道都團練觀察及諸道鹽鐡轉運等使具以天下㩁酤漕運繇其操剸以故額有驕恣專事貢獻牢其權寵中朝柄事者悉以利交之程异貞元末為虞部員外郎充鹽鐡轉運楊子留後順宗即位王叔文恃恩亂紀時之捷給見利者皆附焉异亦被引用叔文敗出為岳州刺史翌日又貶柳州司馬薛謇貞元末為代北營田水運使善畜牧有良馬時以賂朝權及中貴人時中官薛盈珍有勤力於元和初謇以族人附進盈珍頗延譽以助之故自泗州刺史遷福建觀察使張平叔穆宗長慶中為户部侍郎判度支平叔險狡大言因王播以進既掌財用常屈公利以便私嬖倖多狎之王播長慶末為淮南節度諸道鹽鐡轉運等使敬宗即位罷鹽鐵轉運使時中尉王守澄用事播自落利權廣求珍異令腹心吏内結守澄以為之助守澄乘間啟奏言播有才上於延英言之諫議大夫獨孤朗張仲方起居郎孔敏行柳公權宋申錫補闕韋仁實劉敦儒拾遺李景讓薛廷老等請開延英面奏播之姦邪交結寵幸復求大用天子沖㓜不能用言自是物議紛然不息明年正月播復領鹽鐵轉運使播既得舊職乃銅鹽之内巧為賦歛以事月進名為羨餘其實正額務希奬擢不恤人言王涯文宗太和末為司空領鹽鐵轉運使江南𣙜茶使涯與判度支王播交結中尉王守澄請託中納材木至開成元年正月勑度支自此不得收貯材木如或宣索即以其直市供諸色作料亦如之先是度支奏舊管右神䇿軍及諸色人假商人名中納材木計支價值三十三萬二千四百餘貫所中材木茶無至者御史臺推鞫皆涯播之中納故有是命王彦威文宗開成中為户部侍郎判度支既掌利權心希大用時内官仇士良魚𢎞志禁中用事先是左右神䇿軍多以所賜衣服于度支中估判使多曲從厚給其價開成初有詔禁止然趨利者猶希意從其請託明年彦威大結私恩凡内官請託無不如意物議鄙其躁妄一說開成二年四月彦威奏左神䇿及立三軍共中納衣賜紫綾二萬二千五百疋請與收納從之近年諸司於度支納賣貨蠧國用積弊不能去之自開成初時降明詔禁斷至是彦威以仇士良威福日熾故復為奏請時論大為不可册府元龜卷五百十
