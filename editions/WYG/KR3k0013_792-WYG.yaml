body:
  text: 册府元龜卷七百九十二宋王欽若等撰總録部慕賢思賢慕賢詩云我思古人實獲我心語曰見賢思齊焉葢夫立志之士抗心希古緬慕前哲踵武時彦所以勵自訟之操申樂與之願見於行事跂而及之知其為人進吾徃也斯皆崇徳廣業修身踐言瞻之在前猶恐不及者也至其降心屈體從游請益冐渉危難樂聞道義形於詠歌著之繪素不憚行役期揖符采逺摭風尚以自倫儗詩曰髙山仰止景行行止其斯之謂歟趙文子晉大夫與叔譽觀乎九原叔譽叔向也晉羊舌大夫之孫名肸文子曰死者如可作也吾誰與歸作起也叔譽曰其陽處父乎陽處父㐮公之太𫝊文子曰行并植於晉國不沒其身其智不足稱也并猶專也謂剛而專已為狐射姑所殺沒終也植或為恃其舅犯乎文子曰見利不顧其君其仁不足稱也謂久與文公辟難至將反國無君君之心及河授璧詐請亡要君以利是我則隨武子乎利其君不忘其身謀其身不遺其友武子士㑹也食邑於隨范字季晉人謂文子知人見其所善於前則知其來所舉孔子之所嚴事於周則老子於衛蘧伯玉外寛而内直自娯於隠括之中直而不沒人之善存亡汲汲盖蘧伯玉之行於齊晏平仲於楚老萊子於鄭子産君擇臣而使之臣擇君而亊之有道順命無道衡命盖晏平仲之行於魯孟公綽數稱臧文仲柳下惠孝恭慈仁允徳圖義約貨去怨盖栁下恵之行銅鞮伯華介山子然孔子皆後之不竝世子曰述而不作信而好古竊比於我老彭老彭商賢大夫好述古事我若老彭但述之耳淳于髠者齊之贅婿也事齊威王髠博聞强記學無所主其諫説慕晏嬰之為人也漢袁盎景帝時為太常與大將軍竇嬰素相善是時諸陵長安中賢大夫争附兩人車騎隨者日數百乘汲黯為主爵都尉好游俠任氣節行修絜其諌犯主之顔色嘗慕𫝊伯袁盎之為人鄭當時為世子舍人其慕長者如恐不稱恐不稱其意自見年少官薄然其知友皆大父行天下有名之士司馬相如字長卿蜀郡成都人少時名犬子既學慕藺相如之為人也更名相如藺相如義而有勇故追慕之終文園令司馬遷為太史令嘗曰晏子諌説犯君之顔此所謂進思盡忠退思補過者哉假令晏子而在余雖為之執鞭所忻慕焉又曰詩有之髙山仰止景行行止雖不能至然心鄉徃之余讀孔氏書想見其為人適魯觀仲尼廟堂車服禮器諸生以時習禮其家余低徊留之不能去後漢張純為大司空在位慕曹參之跡務於無為申屠剛扶風茂陵人也質性剛直嘗慕史鰌汲黯之為人為大中大夫病去官卒於家侯覇字君房為大司徒時京兆王丹隠居養志質性方潔建武中徵丹為太子少傅覇欲與交友及被徴覇遣子昱候於道昱迎拜車下丹下答之昱曰家公欲與君結交何為見拜丹曰君房有是言丹未之許也梁鴻字伯鸞扶風平陵人也漢末入覇陵山中以耕織為業詠詩書彈琴以自娯仰慕前世髙士而為四皓以來二十四人作頌鄧隲為虎賁中郎將當朝貴盛聞侍中張覇名行欲與為交霸逡廵不答馮胄字世威奉世之後為司徒李郃門人嘗慕周伯況閔仲叔之為人後隠處山澤不應徴辟荀爽字慈明少時嘗就謁李膺因為其御既還喜曰今日乃得御李君矣其見慕如此爽後位至司空張楷字公超蜀郡成都人侍中覇之子也通嚴氏春秋古文尚書門徒嘗百人賓客慕之自父黨夙儒皆造門焉車馬塡街徒從無所止黄門及貴戚之家皆起舍巷次以候過客徃來之利楷疾其如此輒徙避之建和三年下詔安車備禮聘之辭以篤疾不行崔瑗為濟北相李固為太山太守美瑗文雅奉書禮叙殷勤范丹字史雲陳留外黄人好違時絶俗為激詭之行嘗慕梁伯鸞閔仲叔之為人為萊蕪令不到官後辟太傅司空府馬實字伯騫所欲友接負笈荷擔不逺萬里王暢未仕時實慕其髙名徃薦之郭泰字林宗太原介休人也林宗有母憂徐穉徃弔之置生芻一束於廬前而去衆怪不知其故林宗曰此必南州髙士徐孺子也詩不云乎生芻一束其人如玉又嘗於陳梁間行役雨巾一角折時人乃故折巾一角以為林宗巾其見慕皆如此泰别傳曰泰名顯士争歸之載刺嘗盈車林宗卒四方之士千餘人皆來㑹葬同志者乃共刻石立碑蔡邕為其文既而謂涿郡盧植曰吾為碑銘多矣皆有慙徳惟郭有道無愧色耳黄憲字叔度汝南慎陽人也同郡戴良才髙倨傲而見憲未嘗不正容及歸惘然若有失也其母問曰汝復從牛醫兒來邪對曰良久不見叔度自以為不及既覩其人則瞻之在前忽然在後固難得而測矣同郡陳蕃周舉嘗相謂曰時月之間不見黄生則鄙吝之萌復存乎心憲初舉孝亷又辟公府竟無所就天下號曰徴君陳實為太丘長遭黨錮隠居荆山逺近宗師之何進輔政引用天下名士徴實欲以為參軍以老病遂不屈節實之亡也司空荀爽太僕令韓融竝制緦麻執子孫禮四方至者車數千乘自太原郭泰等無不造門實亡天下致弔㑹其葬者三萬人制縗麻者以百數鍾皓字季明潁川長社人也少以篤行稱皓及荀淑竝為士大夫所歸慕九辟公府徴為廷尉正博士林慮長皆不就及終於家諸儒頌之曰林慮懿徳非禮不處悦此詩書絃琴樂古五就州招膺台輔逡廵王命卒嵗容與袁紹字太初汝南汝陽人時何顒與陳蕃李膺善蕃膺之敗遂為宦官所䧟顒乃改名姓亡匿汝南間所至皆親豪傑有聲荆豫之域紹慕之私與徃來及黨錮觧辟顒司空府魏邴原北海人黄巾起將家屬至遼東原在遼東一年中徃歸原居者數百家游學之士授教之聲不絶後得歸太祖辟為司空掾原至謁訖而出軍中士大夫詣原者數百人蘇則字文師扶風武功人也性剛直疾惡嘗慕汲黯之為人卒於東平相管寜字幼安北海朱虛人累以安車蒲輪束帛加璧聘不起卒初寜妻先卒故知勸更娶寜曰每省曽子王駿之言意嘗嘉之豈自遭之而違本心哉田豫漁陽人為衛尉遜位拜大中大夫罷官歸居魏縣病亡戒其妻子曰葬我必於西門豹墓邉妻子難之言西門豹古之神人那可葬於其邊乎豫言豹所履行與我敵等耳使死而有靈必與我善妻子從之呉曹暠燉煌人為滎陽令東海相趙咨之官道經滎陽暠慕咨之故孝㢘也路迎謁候咨不為留暠送至亭次望塵不及謂主簿曰趙君名重今過界不見必為天下笑即棄印綬追至東海謁咨畢辭歸家晉傅咸字長虞剛簡有大節推賢樂善嘗慕季文子仲山甫之為人至元庸中為司𨽻校尉卒和嶠字長輿汝南西平人也少有風格以雅重稱嘗慕其舅夏侯𤣥之為人厚自崇重有盛名於世起家為太子舍人劉疇字王喬位至司徒左長史尋為閻鼎所殺司空蔡謨每歎曰若使劉王喬得南渡司徒公之美選也又王導初拜司徒謂人曰劉王喬若過江我不獨拜公也其為名流之所推服如此王尼字孝孫本兵家子寓居雒陽卓犖不覊初為䕶軍府軍士胡母輔之與琅邪王澄北地𫝊暢中山劉輿潁川荀䆳河東裴遐迭屬河南功曹甄述及雒陽令曹攄請解之攄等以制㫖所及不敢輔之等齎羊酒詣䕶軍門門吏疏名呈䕶軍歎曰諸名士持羊酒來將有以也尼時以給府養馬輔之等入遂坐馬廐下與尼炙羊飲酒醉飽而去竟不見䕶軍䕶軍大驚即與長假因免為兵嵇紹為侍中及遇害門人故吏思慕遺愛行服墓次畢三年者三十餘人王機字令明長沙人也嘗慕王澄為人澄亦雅知之以為已亞遂為友善内總心膂外為爪牙尋用為成都内史王導為司徒以帑藏空竭庫中惟有練布數千端鬻之不售而國用不給導患之乃與朝賢俱制練布單衣於是士人翕然競服之練遂踊貴乃令主者出賣端至一金其為時所慕如此阮修字宣子嘗居貧年四十餘未有室王敦等歛錢為婚皆名士也時慕之者求入錢而不得後為太傅行參軍太子洗馬謝安字安石少有盛名時多愛慕過江為太保專朝政鄉人有罷中宿縣者還詣安問其歸資答曰只有蒲葵扇五萬安乃取其中者捉之京師士庶競市價増數倍安本能為雒下書生詠有鼻疾故其音濁名流愛其詠而弗能及或手掩鼻以斆之孫晷字文度呉國富春人恭孝清約學識有理義濟陽江惇少有髙操聞晷學行過人自東陽徃候之始靣便終日譚宴結歡而别司空何充為揚州辟晷為主簿郄超為司徒左長史死之日貴賤操筆而為誄者四十餘人其為衆所宗貴如此尹緯字景亮天水人也仕後秦姚萇為左僕射緯性剛簡清亮慕張子布之為人宋王𢎞為太保凡動止施為及書翰義體後人皆依放之謂為王太保家法劉湛字𢎞仁南陽平陽人也少負其志氣嘗慕汲黯崔琰為人故名長子曰黯字長孺第二子曰琰字季珪湛後為丹陽尹光禄大夫謝靈運為琅邪王大司馬行參軍襲封康樂公性奢豪車服鮮麗衣裳器物多改舊制世共宗之咸稱謝康樂也劉凝之字志安南郡支江人少慕老萊嚴子陵為人立屋野外州里重其徳三禮辟不就王宏之字方平琅邪臨沂人也有髙尚之操謝􅂕運顔延之竝相欽重宏之初為衛軍參軍後解職家㑹稽上虞及卒顔延之欲為作誄書與宏之子暠生曰家君髙世之節有識歸重豫染毫翰所應載述況僕託慕末風竊以叙徳為事但恨短筆不足書美誄竟不就袁粲陳郡夏陽人為司徒中書監初名愍孫㓜慕荀奉倩之為人白孝武求改名為粲不許至後言於明帝乃改為粲字景倩南齊何戢字慧景廬江􅈞人美容儀動止與禇淵相慕時人呼為小禇公為左將軍呉興太守卒栁世隆河東觧人少有風器當時名士張緒王延之沈淡之徒雅相欽慕以為君子之交為左光禄大夫侍中卒徐伯珍東陽太末人也於䝉山立精舍講授宋明帝除奉朝請固乞不受早喪妻晚不復重娶自比曽參王寂僧䖍子也性迅動好文章讀范滂傳未嘗不歎挹為秘書郎卒周顒字彦倫汝南安成人每賓友㑹同虛席晤語辭韻如流轉國子博士故太學諸生慕其風争事華辨宗測隐居廬山侍中王秀之彌所欽慕乃令陸探微畵其形與己相對又貽書曰昔人有圖畵僑札輕以自方耳王儉亦雅重之贈以蒲褥筍席頃之測送弟喪還西仍留舊宅永業寺絶賔友惟與同志庾易劉虬宗人尚之等徃來講説荆州刺史隨王子隆至遣别駕宗沂口致勞問測咲曰貴賤理隔何以及此竟不答劉璡為武陵王畢叅軍行至呉璡謂人曰吾聞張融與陸慧曉竝宅其間有水此水必有異味遂徃酌而飲之曰飲此水則鄙恡之萌盡矣梁韋叡為䕶軍居家無事慕萬石陸賈之為人因書之於壁以自況王騫字思寂性凝簡慕樂廣為人未嘗言人之短不事産業有田墅在鍾山八十餘頃與諸宅及故舊共佃之嘗為人曰我不如鄭公業有田四百頃而食嘗不周以此為愧後為度支尚書卒王筠初除尚書殿中郎王氏過江以來未有居郎署者或勸之逡巡不就筠曰陸平原東南之秀陸機曽為殿中郎後為平原内史王文度王坦之字文度獨歩江東吾得比蹤昔人何所多恨乃欣然就職陶𢎞景字通明丹陽秣陵人在齊為諸王侍讀奉朝請後辭禄止於句容之句曲山深慕張良之為人云古賢莫比沈顗字處黙呉興武康人也顗幼清静有志行慕黄叔度徐孺子之為人屢徴南陽王左常侍太子舍人皆不起馮道根字臣基湘陽人也㣲時不學既貴初讀書自謂少文嘗慕周勃之器量累遷左右上將軍後魏傅永為平東將軍嘗登北邙於平坦處奮矟躍馬盤旋瞻望有終焉之志逺慕杜預近好李沖王肅欲葬附其墓遂買左右地數頃遺勑子叔偉曰此吾之永宅也崔承宗齊州人其父仕漢中母䘮因殯彼後青徐歸國遂為隔絶承宗性至孝萬里投險偷路負喪還京師黄門侍郎孫惠尉聞之曰吾於斯人見廉范之情矣於是弔贈盡禮如舊相識北齊司馬膺之字仲慶好讀太𤣥經注揚雄蜀都賦每云我欲與揚子雲周旋河清末為光禄大夫盧叔武范陽涿人也少機悟豪率輕俠好竒策慕諸葛亮之為人徴太子中庶子不起後周裴寛字長寛河東聞喜人也銀青光禄大夫静慮子也親沒撫諸弟以篤孝聞滎陽鄭穆嘗謂其從弟文直曰裴長寛兄弟天倫篤睦人之師表吾愛之重之汝可與之遊處寛後官至渉州刺史于謹封燕公時驃騎大將軍開府儀同三司唐璞賜姓宇文氏謹勲髙望重朝野所屬白文帝言璞學行兼修願與之同姓結為兄弟庶子孫承其餘論有益義方文帝歎異者久之更賜謹姓萬紐于氏謹乃深相結納敦長幼之序璞亦庭羅子孫行弟姪之敬謹為朝望所宗如此楊敷字文衍華山公寛之子也少有志操重然諾每覽書傳見忠臣烈士之事嘗慨然思慕之官至汾州刺史韋夐髙尚不仕陳遣其尚書周𢎞正來聘素聞夐名請與相見朝廷許之𢎞正乃造夐談謔盡日恨相遇之晚後請夐至賓館夐不時赴𢎞正仍贈詩曰徳星猶未動真車詎肯來其為時所欽挹如此隋虞慶則京兆櫟陽人初以弋獵為事中便折節讀書嘗慕傅介子班仲叔為人大業中桂州道行軍總管唐崔敦禮雍州咸陽人少渉文史重節義嘗慕蘇子卿之為人顯慶初為太子少師同中書門下三品李綱觀州蓚人也初名瑗字子玉讀後漢書張綱傳慕而改之字文紀卒為太子少師楊師道為侍中性周慎謹宻未嘗漏洩内事嘗曰吾少窺漢史至孔光不言温室之樹毎欽餘風潘好禮初為鹿城縣主簿則天朝徐有功為地官員外郎好禮深慕其為人因著論焉陸象先為工部尚書象先即禮部侍郎集賢院學士充皇太子侍讀賀知章族姑子也知章性放曠善諧謔當時賢達皆仰慕之象先與知章特相友善象先嘗謂人曰賀兄言論情態真可謂風流之士吾與子弟離濶都不思之一日不見賀兄則鄙恡生矣李進太僕少卿暈子樂善愛才慕當時名士與之交結裴冕為左僕射自創巾子其狀新竒市肆因竊其貨謂曰僕射様也後唐宰相李愚少慕晏嬰之為人故初名晏平思賢詩有彼留之嗟語有則亡之感故知賢者既徃遺思是深乃有服其嘉言念其婉畫失師律以追悼不聞過而増歎以至經舊遊而慟哭瞻髙壠而盡哀乃知擅其風流必加欽慕雖年祀寢逺而聲猷益彰故曰髙山仰止景行行止趙簡子晉大夫劉文公㑹諸侯大夫伐楚反自召陵鄭子太叔未至而卒簡子為之臨喪甚哀曰黄父之㑹在魯昭二十五年夫子語我九言曰無始亂無怙富無恃寵無違同無傲禮無驕能以能驕人無複怒復也無謀非徳非所謀也無犯非義傳曰簡子能用善言所以遂興又簡子有臣曰周舍立於門下三日三夜簡子使問之曰子欲見寡人何事周舍對曰願為愕愕之臣墨筆操牘從君之過而日有記也月有成也嵗有効也簡子居則與之居出則與之出居無幾何而周舍死簡子復與諸大夫飲於洪陂之臺酒酣簡子涕泣諸大夫皆出曰臣有罪而不自知巳簡子曰大夫無罪昔者吾友周舍有言曰千羊之皮不如一狐之腋衆人唯諾不如一士之愕愕昔者紂王黙黙而亡武王愕愕而昌今自周舍之死吾未嘗聞過吾亡無日矣是以寡人泣也孔子哭顔淵慟慟哀過也從者曰子慟矣曰有慟乎不自知己之悲哀過非夫人之為慟而誰為又曰噫噫痛傷之聲天䘮予天䘮予天䘮予者若䘮已也重言之者痛惜之甚叔向晉大夫也見司馬侯之子撫而泣之曰自此其父之死吾蔑之與比而事君矣昔者其父始之我終之我始之夫子終之無不可無不可言皆從後漢梁鴻友人髙恢字伯達少好老子隱華隂及鴻東遊思恢作詩田豐字元皓為袁紹别駕天姿􅅛傑權畧多竒紹軍之敗也土崩奔北徒衆畧盡軍將皆撫膺而泣曰向使田豐在此不至於是蜀諸葛亮為丞相先主將東征呉以復闗羽之恥羣臣多諌一切不從章武二年大軍敗績還住白帝亮歎曰法孝直法正字孝直若在則能制主上令不東行就復東行必不傾危矣頼尤荆州人為丞相西曹令史隨諸葛亮於漢中早夭亮甚惜之與留府長史參軍張允蔣琬書曰令史失頼尤掾屬䘮楊顒為朝中損益多矣楊顒為諸葛亮東普屬典選舉顒死亮垂泣三日蔣琬為大將軍問張休曰漢嘉前輩有王元㤗今誰繼者休對曰至於元㤗州里無繼况鄙郡乎其見重如此王謀字元㤗漢嘉人也有容止操行先主以謀為少府晉羊曇太山人知名士也為謝安所愛重安薨後輟樂彌年行不繇西州路嘗因石頭大醉扶路唱作樂不覺至州門左右白曰此西州門曇悲不己以馬策扣扉誦曹子建詩曰生存華屋處零落歸山丘因慟哭而去孫惠為大將軍參軍陸機及弟雲雲弟耽為成都王所害惠與淮南内史朱誕書曰不意三陸相攜闇朝一旦湮滅道業淪䘮痛酷之深荼毒難言國䘮雋望悲豈一人謝鯤為王敦長史時衛玠卒葬於南昌鯤哭之慟人問曰子有何恤而致斯哀答曰棟梁折矣不覺哀耳王衍為領軍阮柯為長史性純篤閑雅好禮無違存心經誥博學浩聞及卒衍哭之甚慟何充為吏部尚書咸康六年司空庾亮薨及葬充㑹之歎曰埋玉樹於土中使人情何能已劉惔為丹陽尹雅善言理簡文初作相與王濛竝為談客濛卒臨殯惔以犀把麈尾置棺中因慟久之孫綽字興公善屬文有高尚之志丹陽尹劉惔卒惔字真長綽為之誄云居官無官之事處事無事之心時人以為名言後綽嘗詣禇裒言及惔流涕曰可謂人之云亡邦國殄瘁裒大怒曰真長生平何嘗相比數而卿今日作此靣向人邪其為名流所敬重如此桓𤣥聞王珣卒與㑹稽王道子書曰珣神情爽悟經史明徹同流之美公私所寄雖逼嫌謗用才不盡然君子在朝𢎞益自多時事艱難忽爾䘮失歎懼之深但風流相悼而已其﨑嶇之九折風霜備經雖頼明公神鑒亦識居之故也棄以夀終殆無所哀但情發去來寘之未易耳宋顔竣為湘東王師時㑹稽太守張暢卒於官顔竣表世祖曰張暢遂不救疾東南之秀早樹風範聞之悽愴深切常懐梁殷芸陳郡人也累遷秘書監任昉好奬進士友延譽者率多外擢時人慕之號曰任君言如漢之三君也及卒芸與建安太守到溉書曰哲人云亡儀表長謝元龜何寄指南誰託其為士友所推如此劉之遴為南郡太守劉顯為郡陵王長史及卒之遴啓皇太子曰嘗聞夷叔栁下惠不逢仲尼一言則西山餓夫東國黜士不朽之事寄之題目懐珠抱玉殁世而名不稱者可謂長太息孰過於斯竊痛沛國劉顯耽讀藝文聰明特逹合棺郢都魂歸上國下宅有日須鐫墓板畧撰其事今輒上呈伏願鴻慈降兹眷藻其枯胔以慰幽魂乃命誌銘後魏蘇湛中書侍郎姜儉從母兄也儉為蕭寶夤雍州從事寶夤反敗儉為城人所殺湛每謂人曰以姜儉才志堪致富貴惜其不遇命也如何李神雋為儀同路法嘗㓜而修立為郡功曹早卒神雋與之有舊每云諸路前輩中有路法嘗足為名士謂必逺至而竟無年天下事誠難知也隋楊素字處道髙祖時為御史大夫時御史大夫栁𢎞卒於官廨楊素誄之曰山陽王弼風流長逝潁川荀粲零落無時修竹夾池永絶梁園之賦長楊映沼無復雒川之文其為士友所痛惜如此唐房𤣥齡魏徴俱為相竝美戴胄才用俱與之親善及胄卒後嘗見其遊處之地數為之流涕宋璟為相魏知古為工部尚書卒璟聞而歎曰叔向古之遺直子産古之遺愛能兼者其在魏公乎周馮道為相初漢劉審交為汝州刺史卒道聞之曰予嘗為劉汝州僚佐知其為人亷平慈善無害之長也判遼磁治陳襄青皆稱平允不顯殊尤理汝也又安有異哉民之租賦不能减也餒役不能息也寒者不能衣也餒者不能食也百姓自汲汲然而使君何有於我哉然身死之日致黎民懐感如此者誠以不行鞭撲不行刻剥不因公以狥私不害物以利己確然行長利之事薄罰宥過謹身節用安俸禄守禮分而已凡從事於斯者孰不能乎但前之守土者不能如是是以汝民咨嗟愛慕之今天下戎馬之後四方凶盜之餘杼軸空而賦歛繁人民稀而倉廩匱謂之康恭未易輕言侯伯牧宰若能哀矜之不至聚歛不殺無辜知民是邦本政為民命和平寛易即劉君之政安足稱耶復何患不至於令名哉道仍為著哭詞六章鐫於墓碑之隂焉册府元龜卷七百九十二
