body:
  text: 册府元龜卷一百八十四宋王欽若等撰閏位部勲業第二宋高祖武皇帝漢高帝弟楚元王交二十一世孫初為晉冠軍孫無終司馬安帝隆安三年十一月妖賊孫恩作亂於會稽衛將軍謝琰前將軍劉牢之東討牢之請帝參府軍事十二月牢之至呉而賊縁道屯結牢之命帝與數十人覘賊逺近㑹遇賊至衆數千人高祖便進與戰所將人多死而帝意方厲手奮長刀所殺傷甚衆牢之子敬宣疑高祖淹久恐為賊所困乃輕騎尋之既而衆騎並至賊乃奔退斬獲千餘人摧鋒而進平山陰恩遁還入海四年五月恩復入㑹稽殺衛將軍謝琰十月劉牢之復率衆東征恩退走牢之屯上虞使帝戍句章城既卑小戰士不盈數百帝常被堅執鋭為士卒先每戰輒摧鋒陷陣賊乃退還浹口時東伐諸帥御軍無律士卒暴掠甚為百姓所苦唯帝法令明整所至莫不親頼焉五年春孫恩頻攻句章帝屢摧破之恩復走入海三月北出海鹽帝追而翼之築城於海鹽故治賊日來攻城城内兵力甚弱帝屢出破之臣欽若等曰事具閏位謀畧門五月孫恩破滬瀆殺吳國内史袁山松死者四千人是月帝復破賊於婁縣六月恩乗勝浮海奄至丹徒戰士十餘萬劉牢之猶屯山陰京邑震動帝倍道兼行與賊俱至於時衆力既寡加以步逺疲勞而丹徒守軍莫有鬭志恩率衆數萬皷譟登蒜山居民皆荷楯而立帝率領數百奔擊大破之投巘赴水死者甚衆恩以皷排自載僅得還船雖被摧破猶恃其衆力徑向京師樓船高大値風不得進旬日乃至白石尋知劉牢之已還朝廷有備遂走向鬱洲八月以帝為建武將軍下邳太守領水軍追討至鬱洲復大破恩恩南走十一月帝追恩於滬瀆及海鹽又破之三戰並大獲俘馘以萬數恩自是饑饉疾疫死者大半自浹口奔臨海元興元年驃騎將軍司馬元顯西伐荆州刺史桓𤣥𤣥亦率荆楚大衆下討元顯遣鎭北將軍劉牢之拒之帝參其軍事次溧洲𤣥至帝請擊之不許將遣子敬宣詣𤣥請和帝與牢之甥東海何無忌並固請不從遂遣敬宣詣𤣥𤣥克京邑殺元顯以牢之為㑹稽内史懼而告帝曰便奪我兵禍其至矣今當北就高雅於廣陵舉事卿能從我去乎答曰將軍以勁卒數萬望風降服彼新得志威震天下三軍人情都已去矣廣陵豈可得至耶吾當反復還京口耳牢之叛走自縊死何無忌謂帝曰我將何之帝曰鎭北去必不免卿可隨我還京口桓𤣥必不能守節北面我當與卿圖之今方是𤣥矯情任筭之日必將用我軰也桓𤣥從兄修以撫軍鎭丹徒以帝為中兵參軍孫恩自奔敗之後徒旅漸散懼生見獲乃於臨海投水死餘衆推恩妹夫盧循為主桓𤣥欲且緝寧東土以循為永嘉太守循雖受命而肆暴不已五月𤣥復遣帝東征時循自臨海入東陽二年正月𤣥復遣帝破循於東陽循奔永嘉復追破之斬其大帥張士道追討至於晉安循浮海南走六月加帝彭城内史十二月桓𤣥簒位帝從桓修入朝𤣥見帝謂司徒王謐曰昨見劉裕風骨不常葢人傑也每遊集輒引接慇懃贈賜甚厚帝愈惡之或説𤣥曰劉裕龍行虎步視瞻不凡恐不為人下宜早為之所𤣥曰我方欲平蕩中原非劉裕莫可付以大事關隴平定然後當别議之耳𤣥乃下詔曰劉裕以寡制衆屢摧妖鋒汎海窮追十殄其八諸將力戰多被重創自元帥以下至於將士並宜論賞以叙勲烈先是帝東征盧循何無忌隨至山陰勸於㑹稽舉義帝以為𤣥未據極位且㑹稽遥逺濟事為難俟其簒逆事著徐於京口圖之不憂不克至是桓修還京帝託以金創疾動不堪步從乃與無忌同船共還建興復之計於是與弟道規沛郡劉毅平昌孟昶任城魏詠之高平檀憑之琅邪諸葛長民太原王元德隴西辛扈興東莞童厚之並同義謀時桓修弟𢎞為征虜將軍青州刺史鎭廣陵道規為𢎞中兵參軍昶為州主簿乃令毅濳徃就昶聚徒於江北謀起兵殺𢎞長民為豫州刺史刁逵左軍府參軍謀據歴陽相應元德厚之謀於京邑聚衆攻𤣥并尅期齊發三年二月己丑朔乙卯帝託以遊獵與無忌等收集義徒凡同謀何無忌魏詠之詠之弟欣之順之檀憑之從子韶弟祗隆與叔道濟道濟從兄範之帝弟道憐沛郡劉藩河内向彌平昌孟懷玉管義之陳留周安穆臨淮劉蔚從弟珪之東莞臧喜從弟寶符從子穆生童茂宗陳郡周道民漁陽田演譙國范清等二十七人願從者百餘人丙辰詰旦城開無忌服傳詔服稱詔居前義衆馳入齊聲大呼吏士驚散莫敢動即斬桓修以徇帝哭甚慟厚加殯歛孟昶勸𢎞其日出獵未明開門出獵人昶道䂓毅等率壯士五六十人因開門直入𢎞方噉粥即斬之因收衆濟江義軍初尅京城修司馬刁𢎞率文武佐吏來赴帝登城謂之曰郭江州已奉乗輿反正於尋陽我等並被密詔誅除逆黨同會今日賊𤣥之首已當梟於大航矣諸君非大晉之臣乎今來欲何為𢎞信之收衆而退毅既至帝命誅𢎞衆推帝為盟主先移檄於京邑曰夫治亂相因理不常泰狡焉肆虐或値聖明自我大晉陽九屢搆隆安已來難結皇室忠臣碎於虎口貞良敝於豺狼逆臣桓𤣥陵虐人鬼阻兵荆郢肆暴都邑天未亡難凶力繁興踰年之間遂傾皇祚主上播越流幸非所神器沉淪七廟毁墜夏后之罹浞豷有漢之遭莽卓方之於𤣥未足為喻自𤣥簒逆於今歴年亢旱彌時民無生氣加以庻士疲於轉輸文武困於造築父子乖離室家分散豈唯大東有杼軸之悲摽梅有傾筐之慨而已哉仰觀天文俯察人事此而能久孰有可亡凡在有心誰不扼腕裕等所以叩心泣血不遑啓處者也是故晝寐宵興㧞奬忠烈濳搆﨑嶇險過履虎輔國將軍劉毅廣武將軍何無忌鎭北主簿孟昶兖州主簿魏詠之寧遠將軍劉道䂓龍驤將軍劉藩振威將軍檀憑之等忠烈斷金精貫白日荷戈奮袂志在畢命益州刺史毛璩萬里齊契掃定荆楚江州刺史郭昶之奉迎主上宫於尋陽鎭北參軍王元德等並率部曲保據石頭揚武將軍諸葛長民收集義士已據歴陽征虜參軍庾頥之等濳相連結以為内應同力恊䂓所在蜂起即日斬偽徐州刺史安城王修青州刺史𢎞首義衆既集文武爭先咸謂不有一統則事無以輯裕辭不獲已遂總軍要庶上憑祖宗之靈下罄義夫之力翦馘逋逆蕩清京輦公侯諸軍或世樹忠貞或身荷爵寵而並俛睂猾豎自効莫繇顧瞻周道寧不弔乎今日之舉良其會也裕以虚薄才非古人接勢於己替之機受任於既頽之運丹誠未宣感慨憤躍望霄漢以永懷眄山川以增厲授檄之日神馳賊庭帝乃以孟昶為長史總攝後事檀憑之為司馬百姓願從者千餘人三月戊午朔遇吳甫之於江乗甫之𤣥驍將也其兵甚鋭帝躬執長刀大呼以衝之衆皆披靡即斬甫之進至羅落橋皇甫敷率數千人逆戰寧遠將軍憑之與帝各御一隊憑之戰敗見殺其衆退散帝進戰彌厲前後奮擊應時摧破即斬敷首𤣥聞敷等並没愈懼使桓謙屯東陵口卞範之屯覆舟山西衆合二萬已未旦義軍食畢棄其餘粮進至覆舟山東使張旗幟於山上以為疑兵𤣥又遣武騎將軍庾禕之配以精卒利器助謙等帝躬先士卒以奔之將士皆殊死戰無不一當百呼聲動天地時東北風急因命縱火煙熖張天皷譟之音震京邑謙等諸軍一時奔潰𤣥始雖遣軍置陣而走意已决别使領軍將軍殷仲文具舟於石頭仍將子姪浮江南走庚申帝鎭石頭城立留臺總百官焚桓温神主於宣陽門外造晉新主立於太廟遣諸將帥追𤣥尚書王假率百官奉迎乗輿司徒王謐與衆議推帝領揚州固辭乃以謐為錄尚書事領揚州刺史以帝為使持節都督揚徐兖豫青冀幽并八州諸軍事領軍將軍徐州刺史先是朝廷承晉氏亂政百司縱弛桓𤣥雖欲釐整而衆莫從之帝以身範物先威禁内外百官皆肅然奉職二三日間風俗頓改時諸葛長民失期不發刁逵執送之未至而𤣥敗𤣥經㝷陽江州刺史郭昶之備乘輿法物資之𤣥收畧得二千餘人挾天子走江陵冠軍將軍劉毅輔國將軍何無忌振武將軍劉道規率諸軍追討四月奉武陵王遵為大將軍承制大赦天下唯桓𤣥一祖後不在赦例𤣥子韶又聚衆向歴陽高祖命輔國將軍諸葛長民擊走之無忌道䂓破𤣥大將鄭鈐等於桑落州衆軍進據尋陽加高祖都督江州諸軍事𤣥既還荆郢大聚兵衆召水軍造樓船器械率衆二萬挾天子發江陵浮江東下與冠軍將軍劉毅等相遇於崢嶸州衆軍大破之𤣥棄衆復挾天子還復江陵𤣥黨殷仲文奉晉二皇后還京師𤣥至江陵因西走南郡太守王騰之荆州别駕王康産奉天子入南郡府初征虜將軍益州刺史毛據遣從孫祐之與參軍費恬送弟喪州下有衆二百璩弟子修之時為𤣥屯騎校尉誘𤣥以入蜀至枚囘州恬與祐之迎射之益州都護馮遷斬𤣥首傳京師又斬𤣥子昇於江陵市初𤣥敗於崢嶸州義軍以為大事已定追躡不速𤣥死幾一旬衆軍猶不至𤣥從子振逃於華容之浦中招聚逆黨數千人晨襲江陵城居民競出赴之𤣥從兄謙先匿於沮川亦聚衆以應振為𤣥舉哀立喪庭謙乃率衆官奉璽綬於安帝無忌道規既至江陵與桓振戰於靈溪𤣥黨馮該又設伏于楊林義軍奔敗退還尋陽兖州刺史辛禺懷貳㑹北青州刺史劉該反禺求征該次淮隂又反禺長史羊穆之斬禺傳首十月帝領青州刺史甲仗百人入殿劉毅諸軍復進至夏口毅攻魯城道䂓攻偃月壘皆㧞之十二月諸軍進平巴陵義熈元年正月毅等至江津破桓謙桓振江陵平天子至江陵以帝為侍中車騎將軍都督中外諸軍事使持節徐青二州刺史帝固讓加錄尚書事又不受屢請歸藩天子不許遣百僚敦勸又親幸帝第帝惶懼詣闕陳請天子不能奪是月旋鎮丹徒天子重遣大使敦勸又不受乃改授都督荆司梁益寧雍凉七州并前十六州諸軍事盧循浮海破廣州二年三月督交廣二州十月帝上言曰昔天禍皇室巨狡縱簒臣等義惟舊𨽻豫蒙國恩仰契信順之符俯厲人臣之憤雖社稷之靈抑亦事繇衆濟其翼奬忠勤之佐文武畢力之士孰執在已之謙用虧國體之大輙申攝衆軍先上同謀起義始平京口廣陵二城臣及撫軍將軍毅等二百七十二人并後赴義出都縁道大戰所餘一千五百六十六人又輔國將軍長民故給事中王元德等十人合一千八百四十八人乞正封賞其西征衆軍須論集續上於是尚書奏封倡義謀主鎮軍將軍裕豫章郡公食邑萬户賜絹三萬疋其餘封賞各有差鎮軍府佐吏降故太傅謝安府一等十一月天子重申前令加帝侍中進號車騎將軍開府儀同三司固讓詔遣百僚敦勸三年二月帝還京師將詣廷尉天子先詔獄官不得受詣闕陳讓乃見聽旋於丹徒四年正月天子徵帝入輔授侍中車騎將軍開府儀同三司揚州刺史録尚書徐兖二州刺史如故帝表解兖州先是遣冠軍劉敬宣伐蜀賊譙縱無功而返九月以敬宣挫退遜位不許乃降為中軍將軍五年二月南燕鮮卑慕容超大掠淮北執陽平太守劉千載濟南太守趙元驅畧千餘家三月帝抗表北討以丹陽尹孟昶監中軍留府事四月舟師發京都泝淮入泗五月至下邳留船艦輜重步軍進琅邪所過皆築城留守鮮卑梁父莒城二戍並奔走六月慕容超遣五樓及廣寧王賀賴先據臨胊城既聞大軍至留羸老守廣固乃悉出臨胊有巨蔑水去城四十里超告五樓曰急徃據之晉軍得水則難擊也五樓馳進龍驤將軍孟龍符領騎居前奔徃爭之五樓乃退衆軍步進有車四千兩分車為兩翼方軌徐行車悉張幔御者執矟又以輕騎為游軍軍令嚴肅行伍齊整未及臨胊數里賊鐡騎萬餘前後交至帝命兖州刺史劉藩弟并州刺史道憐諮議參軍劉敬宣陶延夀參軍劉懷玉慎仲道索邈等齊力擊之遣諮議叅軍檀韶直趨臨胊韶尅臨胊悉虜超輜重超聞臨胊已㧞引衆走帝親皷之賊乃大奔超遁還廣固獲超馬偽輦玉璽豹尾等送於京師斬其大將段暉等十餘人其餘斬獲千餘計明日進軍廣固即屠大城超退保小城於是設長圍守之圍高三丈外穿三重壍停江淮轉輸舘穀於齊土撫納降附華戎歡悦援才授爵因而任之七月詔加帝北青冀二州刺史超大將垣遵遵弟苗並率衆歸順帝方治攻具城上人曰汝不得張綱何能為也綱者超偽尚書郎其人有巧思㑹超遣綱稱藩於姚興乞師請救興偽許之而實憚帝不敢遣綱從長安還泰山太守申宣執送之乃升綱於樓上以示城内城内莫不失色於是使綱大治攻具超求救不獲綱反見虜轉憂懼乃請稱藩求割大峴為界獻馬千匹不聽圍之轉急河北居民荷戈負糧至者日以千數九月進帝太尉中書監固讓十月張綱治攻具成設諸竒巧飛樓木幔之屬莫不畢備城上火石弓矢無所用之六年二月丁亥屠廣固超踰城走征虜賊曹喬胥獲之殺其王公以下納口萬餘馬二千匹送超京師斬於建康市帝之北伐也徐道覆至畨禺説盧循及循率衆過嶺㓂南康廬陵豫章諸郡守皆委任奔走於時平齊問未至即馳使徵帝帝之初克齊也欲停鎮下邳清盪河雒既而被徵使至即日班師鎮南將軍何無忌與徐道覆戰於豫章敗績無忌被害内外震駭朝廷欲奉乘輿北走就帝尋知賊衆未至人情小安帝至下邳以船運輜重自率精鋭步歸至山陽聞無忌被害則慮京邑失守乃卷甲兼行與數十人至淮上問行旅以朝廷消息人曰賊尚未至劉公若還便無所憂也帝大喜單船過江逕至京口衆乃大安四月癸未帝至京師解嚴息甲循之初下也使道覆向尋陽自㓂湘中諸郡荆州刺史道規遣軍至長沙為循所敗循逕至巴陵與道覆連旗而下帝以南藩覆没表送章綬詔不聽五月劉毅敗績於桑落洲問至内外恟擾時北師始還多創痍疾病京師戰士不盈數千賊既破江豫二鎮戰士十餘萬舟車百里不絶奔敗還者並聲其雄盛孟昶諸葛長民懼㓂漸逼欲擁天子過江帝不聽昶固請不止帝曰今重鎮外傾强㓂内逼人情危駭莫有固志若一旦遷動便自瓦解江北亦豈可得至設令得至不過延日月耳今兵士雖少自足以一戰若其克濟則臣主同休苟厄運必至我當以死衛社稷横尸廟門遂其繇來以身許國之志不能遠竄於草間求活也我計决矣卿勿復言於是開賞募投身赴義者一同登京城之上科發居民治石頭城建牙戒嚴帝率劉毅諸葛長民北出拒之七月庚申羣賊自蔡州南走還屯尋陽遣輔國將軍王仲德廣川太守劉鍾河間太守蒯恩追之帝還東府大治水軍皆大艦重樓高者十餘丈十月率兖州刺史劉藩寧朔將軍檀韶等舟師南伐以後將軍劉毅監太尉留守府後事皆委焉是月徐道覆率衆三萬㓂江陵荆州刺史道規又大破之斬首萬餘級道覆走還湓口初帝之遣索邈也邈在道為賊所斷道覆敗後方達自循東下江陵斷絶京邑之間傳者皆云已没及邈至方知循走循初自蔡州南走留其親黨范崇民五千人高艦百餘戍南陵王仲德等聞大軍且至乃進攻之十一月大破崇民軍焚其舟艦收其散卒循廣州守兵不以海道為防是月建威將軍孫季高乘海奄至而城池峻整兵猶數千季高焚賊舟艦悉力而上四面攻之即日屠其城循又以輕舟奔始興季高撫其舊民戮其親黨勒兵謹守初帝之遣季高也衆咸以海道艱遠必至為難且分撤見力二三非要帝不從勑季高曰大軍十二月之交必破妖虜卿今時當至廣州傾其巢窟令賊奔走之日無所歸投季高受命而行如期尅㨗循方治兵艦設諸攻備帝欲御以長筭乃屯軍雷池賊揚聲不攻雷池當乘流逕下帝知其欲戰且慮賊敗或於京口入海遣王仲德以水艦三百於吉陽下斷之十二月循道覆率衆數萬方艦而下前後相抗莫見舳艫之際帝悉出輕利鬭艦躬提幡皷命衆軍齊力擊之又上步騎伏于西岸右軍參軍庾樂生乘艦不進斬而徇之於是衆軍並踴騰爭先軍中多萬鈞神弩所至莫不摧䧟帝中流蹙之因風水勢賊艦悉泊西岸上軍先備火具乃投火焚之煙熖張天賊衆大敗追奔至夜乃歸循等還尋陽初分遣步軍莫不疑怪及燒賊艦衆乃悦服召王仲德請還為前驅留輔國將軍孟懷玉守雷池循聞大軍上欲走向豫章乃悉立柵斷左里帝攻栅而進循兵雖殊死戰弗能禁諸軍乘勝奔之循單舸走所殺及投水死凡萬餘人循收散卒尚有數千人逕還廣州帝旋自左里天子遣侍中黄門勞師於行所七年正月振旅於京師改授大將軍揚州牧二月盧循於畨禺為孫季高所破収餘衆南走劉藩孟懷玉斬徐道覆於始興交州刺史杜慧度斬盧循傳首京師八年四月以後將軍劉毅為荆州刺史毅與帝俱舉大義興復晉室既有雄才大志厚自矜許與尚書僕射謝混相結帝知毅不能居下終為異端密圖之毅表求從弟兖州刺史藩以為副貳九月藩入朝帝收藩及混並於獄賜死自表討毅壬午發自京師遣參軍王鎮惡襲江陵十月尅之毅及黨與皆伏誅十一月帝以西陽太守朱齡石為益州刺史率衆伐蜀進帝太傅揚州牧九年二月乙丑至自江陵初諸葛長民貪淫驕横為士民所患劉毅既誅將謀作亂帝密命左右壯士丁旿等自幔後出於坐拉殺之死於牀側輿尸付廷尉并誅其弟黎民七月朱齡石平蜀斬偽主譙縱傳首京師十年荆州刺史司馬修之宗室之重又得江漢人心帝疑其有異志而修之兄子譙王文思在京師招集輕俠帝執文思送還修之令自為其所修之表廢文思十一年正月帝収修之子文寶次子文祖并於獄賜死率衆軍西討三月軍次江陵修之奔襄陽四月帝復率衆進討至襄陽修之奔姚興八月甲子至自江陵十二年三月加中外大都督初帝平齊乃有定闗雒之意值盧循侵逼故其事不諧荆雍既平方謀外畧㑹姚興死子泓立兄弟相殺關中擾亂帝乃戒嚴北討加領征西將軍司豫二州刺史又加北雍州刺史九月次于彭城加領徐州刺史先是遣冠軍將軍檀道濟龍驤將軍王鎮惡步向許雒羗縁道屯守皆望風降服偽兖州刺史韋華先據倉垣亦率衆歸順帝又遣北兖州刺史王仲德先以水軍入河仲德破索虜於東郡凉城進平滑臺十月衆軍至雒陽圍金墉泓弟偽平南將軍洸請降送于京師修復晉五陵置守衛天子以帝為相國封宋公加九錫十三年正月帝以舟師進討二月檀道濟等次潼關三月庚辰大軍入河後魏步騎十萬營據河津帝命諸軍濟河擊破之帝至雒陽七月至陜城龍驤將軍王鎮惡伐木為舟自河浮渭八月扶風太守沈田子大破姚泓於藍田王鎮惡尅長安生禽泓九月帝至長安長安豐稔帑藏盈積帝先收其彞器渾儀土圭之屬獻於京師其餘珍寶珠玉以班賜將帥執送姚泓斬於建康市十月進爵為王十四年正月還京固讓進爵六月受相國宗公九錫之命十二月晉大司馬琅邪王即位元熈元年徵公入輔又申前命進爵為王七月乃受命二年四月徵王入輔六月至京師晉帝禪位於宋遂即帝位孝武帝文帝第三子元嘉十二年立為武陵王十六年為湘州刺史十七年遷南豫州刺史並領石頭戍至二十八年為江州刺史四郡諸軍事時縁江蠻為㓂文帝遣太子步兵校尉沈慶之等伐之使帝總統衆軍三十年正月帝出次西陽之五洲㑹元凶劭弑逆以帝為征南將軍帝率衆入討荆州刺史南譙王義宣雍州刺史臧質並舉義兵四月辛酉次溧陽癸亥冠軍將軍柳元景前鋒至新亭脩建營壘甲子賊劭親率衆攻元景大敗退走丙寅帝次江寧丁卯大將軍江夏王義恭來奔表上尊號戊辰至於新亭己巳即皇帝位五月甲戍輔國將軍申坦克京城乙亥輔國將軍朱修之克東府丙申克定京邑劭及始興王濬諸同逆並伏誅庚辰解嚴南齊太祖高皇帝宋右軍將軍南泰山太守承之之子年十三治禮及左氏春秋宋元嘉十七年大將軍彭城王義康出鎮豫章承之領兵防守帝捨業南行十九年竟陵蠻動文帝遣帝領偏軍討沔北蠻二十一年伐魏至丘檻山並破走二十三年雍州刺史蕭思話鎮襄陽啓帝自隨戍沔北討樊鄧諸山蠻破其聚落初為左軍中兵參軍二十七年魏軍圍汝南戍主陳憲臺遣寧朔將軍臧質安蠻司馬劉康祖救之文帝使帝宣㫖授節度聞魏太武向彭城質等回軍救援至盱眙帝與質别軍主胡宗之等五軍步騎數千人前驅魏主已濳過淮卒相遇於莞山下合戰敗績縁淮奔退宗之等皆䧟没帝還就質固守為虜所攻圍甚危急事寕還京師二十九年領偏軍征仇池梁州西界舊有武興戍晉隆安中没屬氐武興西北有蘭臯戍去仇池二百里帝擊二壘皆破之遂從谷口入關未至長安八十里梁州刺史劉秀之遣司馬馬汪助帝攻談堤城㧞之虜偽河間公奔走虜救兵至帝軍力疲少乃燒城還南鄭襲爵晉興縣五等男孝建初除江夏王大司馬參軍隨府轉太宰遷員外直閣中書舍人西陵王撫軍參軍建康令新安王子鸞有盛寵簡選僚佐為北軍中郎中兵參軍母陳氏憂起為武烈將軍復為建康令中兵如故景和中除後軍將軍值明帝立為右軍時四方反叛㑹稽太守尋陽王子房及東諸郡皆起兵加輔國將軍率衆東討至晉陵與賊前鋒將程捍孫曇瓘等戰一日破賊十二壘分軍定諸縣晉陵太守袁標棄城走東境諸城相繼奔散徐州刺史薛安都反彭城遣從子索兒㓂淮陰山陽太守程天祚舉城叛徐州刺史申令孫又降徵帝討之時帝平東賊還又將南討出次新亭前軍已發而索兒自睢陵渡淮馬步萬餘人擊殺臺軍主孫耿縱兵逼前軍張永營告急明帝聞賊渡遽追帝徃救之屯破釡索兒向鍾離永遣寜朔將軍王寛據盱眙遏其歸路索兒擊破臺軍主髙道慶走之於石鼈將西歸王寛與軍主任農夫先據白鵠澗張永遣帝馳督寛索兒東要擊帝使不得前帝皷行結陣直入寛壘索兒望見不敢發經數日索兒引軍頓石梁帝追之至葛冢候騎還云賊至帝乃頓軍引管分兩馬軍夾營外以待之俄頃馬步奄至又推火車數道攻戰相持移日乃出輕兵攻賊西使馬軍合擊其後賊衆大敗追奔獲其器仗進屯石梁澗北索兒夜遣千人來斫營營中驚帝臥不起宣令左右按部不得動須㬰賊散帝議欲於石梁西南高地築壘通南道斷賊走路索兒果來爭之帝率軍擊破之賊馬自相踐藉死索兒走向鍾離帝追至黯黮而還除驍騎將軍封西陽縣侯邑六百户遷巴陵王衛軍司馬鎮㑹稽江州刺史晉安王子勛遣臨川内史張淹自鄱陽嶠道入三呉臺軍主沈思仁與偽龍驤將軍任皇鎮西參軍劉越緒各據險相守明帝遣帝領三千人討之夜舉火進軍賊望見恐懼未戰而走還除桂陽王征北司馬南東海太守行南徐州事初明帝遣張永沈攸之以衆喻降薛安都安都引魏軍敗沈攸之於彭城淮南孤弱以帝為假冠軍將軍持節都督北討前鋒諸軍事鎮淮陰泰始三年沈攸之吳喜北敗於睢口諸城戍大小悉奔歸虜遂退至淮北圍角城戍主賈法度力弱不敵諸將勸帝渡岸救之帝不許遣軍主高道慶將數百張弩浮艦淮中遙射城外虜弩一發數百箭俱去虜騎相引避之乃命進戰城圍即解遷督南兖徐二州諸軍事南兖州刺史五年進督兖青冀三州刺史六年除黄門侍郎領越騎校尉不拜復授冠軍將軍留本任明帝常嫌帝非人臣相而民間流言云蕭道成當為天子明帝愈以為疑遣冠軍將軍吳喜以三千人北使令喜留軍破釡自持銀壺酒封賜帝帝戎服出門迎即酌飲之喜還明帝意乃悦七年徵還京師部下勸勿就徵帝曰諸卿闇於見事主上自誅諸弟為太子稚弱作萬歲後計何關他族唯應速發事緩必見疑今骨肉相害非靈長之運禍難將興方與卿等戮力耳拜散騎常侍太子左衛率時帝世子以功當别封贑縣帝以一門二封固辭不受詔許之加邑三百户明帝遣詔為右衛將軍領衛尉加兵五百人與尚書令袁粲䕶軍禇淵領軍劉勔共掌機事又别領東北選事尋解衛尉加侍中領石頭戍軍事初明帝誅戮藩戚江州刺史桂陽王休範以人凡獲全及蒼梧王立更有窺伺覬望密與左右閹人於後堂習馳馬招聚亡命元徽二年五月興兵於尋陽收畧官民數日便辦衆二萬人騎五百匹發盆口悉乘商旅船舫大雷戍主杜道欣鵲頭戍主劉諐期告變朝廷遑駭帝與䕶軍禇淵征北張永領軍劉勔僕射劉秉游擊將軍戴明寶騎將軍阮佃夫右軍將軍王道隆中書舍人孫千齡員外郎楊運長集中書省計議莫有言者帝曰昔上流謀逆皆因淹緩至於覆敗休範必懲前失急下乘我無備今應變之術不宜念逺若偏師失律則大阻衆心宜頓新亭白下堅守宮掖東府石頭以待賊千里孤軍後無委積求戰不得自然瓦解我請頓新亭以當其鋒征北可以見甲守白下中堂舊是置兵地領軍宜頓宣陽門為諸軍節度諸貴安坐殿中右軍諸人不須競出我自前驅破賊必矣因索筆下議並注同孫千齡與休範有密契獨曰宜依舊遣軍據梁山魯顯間右衛若不出白下則應進頓南州帝正色曰賊今已近梁山豈可得至新亭即是兵衝所以欲死報國耳常日乃可屈曲相從今不得也坐起帝顧謂劉勔曰領軍已同鄙議不可改易乃單車白服出新亭加帝使持節都督征討諸軍平南將軍加皷吹一部治新亭城壘未畢賊前軍已至帝方解衣高臥以安衆心乃索白虎幡登西垣使寧朔將軍高道慶羽林監陳顯達員外郎王敬則浮舸與賊水戰自新林至赤岸大破之燒其船艦死傷甚衆賊步上新林帝馳使報劉勔急開大小桁撥淮中船舫悉渡北岸休範乘肩輿率衆至壘上遣寧朔將軍黄囘馬軍主周盤龍將步騎出壘對陣休範分兵攻壘東短兵接戰自巳至午衆皆失色帝曰賊雖多而亂尋破也楊運長領三齊射手七百人引强命中故賊不得逼城未時張敬兒斬休範首帝遣隊主陳靈寶送首還臺靈寶路中遇賊軍埋首道側臺軍不見休範首愈疑懼賊衆亦不知休範已死别率杜黑蠡急攻壘東司空主簿蕭惠朗領數百人突入東門呌譟至堂下城上守門兵披退帝挺身上馬率數百人出戰賊皆推楯而前相去數丈分兵横射帝引滿將發左右將戴仲緒舉楯杆之箭應手飲羽傷百餘人賊死戰不能當乃却衆軍復得保城與黒蠡拒戰自晡達明旦矢石不息其夜大雨皷呌不復相聞將士積日不得寢食軍馬夜驚城内亂走帝秉燭正坐厲聲呵止之如是者數四賊帥丁文豪設伏破臺軍於皂莢橋直至朱雀桁劉勔欲開桁王道隆不從勔及道隆並戰没賊進至杜姥宅車騎典籖茅恬開東府納賊冠軍將軍沈懷明於石頭奔散張永潰於白下宫内傳新亭亦䧟太后執蒼梧王手泣曰天下敗矣帝遣軍主陳顯達任農夫張敬兒周盤龍等從石頭濟淮間道從承明門入衛宮闕休範既死典籖許公輿詐稱休範在新亭士庶惶惑詣壘投名者千數帝隨得輙燒之乃列兵登城北謂曰劉休範父子先昨皆已即戮屍在南岡下身是蕭平南諸君善見觀君等名皆已焚除勿有懼也臺分遣衆軍擊杜姥宅宣陽門諸賊皆破平之帝振旅凱入百姓縁道聚觀曰全國家者此公也帝與袁粲禇淵劉秉引咎解職不許遷散騎常侍中領軍都督南兖徐青冀五州諸軍事鎮軍將軍南兖州刺史持節如故進爵公増邑二千户帝固讓又與禇淵袁粲書述讓意淵粲答書固勸乃受命帝欲分其功請益粲等户四年加尚書左僕射本官如故休範平後蒼梧王漸行凶暴南徐州刺史建平王景素少有令譽朝野歸心景素亦濳為自全之計布欵誠於帝帝拒而不納七月羽林監袁祗奔景素使舉兵帝出屯𤣥武湖遣衆軍北討事平乃還帝威名既重蒼梧深相猜忌幾加大禍陳太妃罵之曰蕭道成有功於國今若害之後誰復為汝著力者乃止帝密謀廢立五年七月戊子楊玉夫陳奉伯等二十五人殺蒼梧王持首送帝帝夜開承明門乘常所騎馬走入殿中驚怖既知蒼梧王死咸稱萬嵗己丑帝戎服出殿召袁粲禇淵劉秉等議迎立順帝甲午帝移鎮東府與粲等各甲仗五十人入殿丙申進位侍中司空錄尚書事驃騎大將軍封竟陵郡公邑五千户給油幢絡車班劒三十人帝固辭上命即驃騎大將軍開府儀同三司庚戍進督南徐州刺史封楊玉夫等二十五人爵邑各有差十月戊辰又進督豫司二州初荆州刺史沈攸之與帝同直殿省申以歡好帝以長女妻攸之第三子文和帝既廢立攸之舉兵東下京師恐懼是歲十二月乙卯帝入居朝堂命諸將西討前湘州刺史王藴太后兄子遭母䘮罷任還至巴陵停舟一月與攸之密相交搆還至東府期帝出弔帝既不出外謀愈固司徒袁粲尚書令劉秉見帝威權稍盛慮不自安與藴相結舉事帝遣諸將攻石頭並禽斬之帝屯閲武堂馳結軍旅閏月辛丑詔假黄鉞率大衆出屯新亭中興堂治嚴築壘二年正月攸之攻郢城不克衆潰自經死傳首京邑丙子帝旋鎮東府二月癸未加太尉増封三千户都督南徐南兖徐兖青冀司豫荆雍湘郢梁益廣越十六州諸軍事帝解驃騎辭都督不許乃表送黄鉞三月己酉増班劔為四十人甲仗百人入殿丙子加羽葆皷吹辛卯封帝為齊公備九錫之禮加璽紱遠遊冠位在諸王公上加相國緑綟綬其驃騎大將軍揚州牧南徐州刺史如故三讓公卿敦勸固請乃受甲寅䇿相國齊公曰天地變通莫大乎炎凉懸象著明莫崇乎日月嚴冬播氣貞松之操自高光景時昏若華之暎彌顯是故英睿當亂而不囘忠賢臨危而盡節自景和昏虐王綱弛紊太宗受命紹開中興運屬屯難四郊多壘肅將軍威實資義烈康國濟民於是乎在朕以不造夙罹閔凶嗣君失德書契未絕威侮五行䖍劉九縣神厭靈繹海水羣飛彞器已塵宗禋誰主綴旒之殆未足為譬豈直小宛興刺黍離作歌而已哉天贊皇宋實啓明宰爰登寡昧纂兹大業鴻緒再維宏基重造高勲至德振古絕倫昔保衡翼殷愽陸佐漢方斯蔑如也今將授公典禮其敬朕命乃者袁鄧搆禍臣欽若等曰袁顗鄧琬舉兵向闕實繁有徒子房不臣臣欽若等曰尋陽王子房舉兵反齊公東討平之稱兵恊亂跨蹈五湖憑陵呉越浮祲虧辰沉氛晦景桴皷振於王畿鋒鏑交乎天邑顧瞻宮掖將成茂草言念邦國翦為仇讐當此之時人無固志公投袂殉難超然奮發執金板而先馳登寅車而戒路軍政端嚴卒乘輯睦麾鉞一臨凶黨氷泮此則霸業之基勤王之始也安都背叛臣欽若等曰薛安都為除州刺史引魏軍侵叛竊據徐方敢率犬羊陵虐淮滸索兒愚悖臣欽若等曰索兒安都從子也攻淮陰齊公破走之同惡相濟天祚無狀背順歸逆北鄙黔黎奄墜塗炭均人廢職邊師告警公授命宗祊精貫朝日擁節私門氣踰霄漢破釡之㨗斬䤋蔽野石梁之戰禽其渠師保境全民江陽即序此又公之功也張淹迷昧臣欽若等曰晉安王子節遣臨川内史張淹自鄱陽入三呉齊公討之弗顧本朝爰自南區志圖東夏濳軍間入竊覬不虞於時江服未夷皇塗薦阻公忠誠慷慨在險彌亮深識九變妙察五色以寡制衆所向風偃朝廷無東顧之憂閩越有來蘇之慶此又公之功也匈奴野心侵掠疆塲前師失律王旅摧撓灑血成川伏尸千里醜羯侜張勢振彭泗臣欽若等曰羯言魏軍也乘勝長驅窺覦京甸冠帶之軌將湮被髪之容行及公奉辭伐罪戒旦晨征兵車始交氛祲蕩滌弔死撫傷𢎞宣皇澤俾我淮淝復沾盛化此又公之功也自兹厥後獫狁孔熾封豕長蛇重窺上國而世故相仍師出日老戰士無臨陣之心戎卒有懷歸之思是以下邳精甲望風振恐角城高壘指日淪䧟公眷言王事發憤忘食躬擐甲胄視險若夷短兵纔接巨猾鳥散分疆畫界開創青兖此又公之功也泰始之末入參禁旅任兼軍國事同顧命桂陽負衆臣欽若等曰桂陽王休範為江州刺史舉兵向闕輕問九鼎裂冠毁冕㧞本塞原揮戈萬乘之國頓㦸象魏之下烈火焚於王城飛矢集於君幄機變儵忽終古莫二羣后憂惶元戎無主公按劒凝神則竒謀貫世秉旄指麾則懦夫成勇曾不崇朝新亭獻㨗信宿之間宣陽底定雲霧廓清區宇康乂此又公之功也皇室多難釁起戚藩䢴晉應韓翻為讐敵建平失圖臣欽若等曰建平王景素為南徐州刺史舉兵為自全之計興兵内侮公又指授六師義形乎色役未踰旬朱方寧晏此又公之功也蒼梧肆虐臣欽若等曰蒼梧王即後廢帝也諸夏糜沸淫刑以逞誰則無罪火炎崑崗玉石俱焚黔首相悲朝不謀夕高祖之業已淪文明之軌誰嗣公遠稽殷漢之儀近遵魏晉之典猥以眇躬入奉宗祏七廟清謐九區反正此又公之功也袁粲無質劉秉擕貳臣欽若等曰司徒袁粲尚書令劉秉為黄囘内應韞述相扇成此亂階臣欽若等曰領軍劉韞秉弟也述簡未獲醜圖濳搆危機竊發據有石頭志犯應路公神謨内運霜鋒外舉妖沴載澄國塗悦穆此又公之功也沈攸之包藏禍釁臣欽若等曰攸之為荆州刺史舉兵攻郢城歲月兹彰蜂目豺聲阻兵安忍哀彼荆漢獨為匪民乃眷西顧緬同異域而經綸維始九伐未申長惡不悛遂逞凶逆驅合奸囘勢過虓虎朝野憂疑三軍沮氣公秉鉞出關凝威江甸正情與皦日同亮明畧與秋雲競爽至義所感人百其心鼖皷一麾黔首寧謐雲梯未舉魯山尅定積年逋誅一朝顯戮沮浦安流章臺從軌此又公之功也公有濟天下之勲重之以明哲道庇生民志扶宇宙戮力一心劬勞王室自東徂西靡有寧晏險阻艱難備嘗之矣若乃締搆宗社之勤造物資始之澤雲布霧散光被六幽弼予一人永清四海是以秬草騰芳於郊園景星垂暉於清漢遐方欵關而慕義荒服重譯而來庭遐哉邈乎無得而名焉朕聞疇庸表徳前王盛典崇樹侯伯有國攸同所以文命成功𤣥珪顯錫姬旦秉哲曲阜啓藩或改玉以宏風或祚土以宣化禮絶常班寵冠羣辟爰逮桓文車服異數惟公勲業超於先烈而褒賞闕於舊章古今之道何其爽歟静言欽歎良有缺然今進授相國以青州之齊郡徐州之梁郡南徐州之蘭陵魯郡琅邪東海晉陵義興揚州之呉郡會稽凡十郡封公為齊公錫兹𤣥土苴以白茅定爾邦家用建冡社斯實尚父故藩世作盟主紀綱侯甸率繇舊則徃者周召建國師保兼任毛畢執珪入作卿士内外之寄同規在昔可命使持節兼太尉侍中中書監司空衛將軍雩都縣開國侯淵即禇淵也授相國印綬齊公璽紱持節兼司空副守尚書令僧䖍王僧䖍也授齊公茅土金虎符第一至第五左竹使符第一至第十相國位總百辟秩踰三事職以禮移號隨事革其以相國總百辟去録尚書之稱送所假節侍中貂蟬中外都督太傅太尉印綬竟陵公印䇿其驃騎大將軍揚州牧南徐州刺史如故又加公九錫其敬聽後命以公秉禮宏律儀刑區宇遐邇一體民無異業是用錫公大輅各一𤣥牡二駟公崇脩南畝所寶惟糓王府充實百姓繁阜是用錫公衮冕之服赤舄副焉公居身以謙導物以義鎔鈞庶品罔不和恱是用錫公軒縣之樂六佾之舞公翼贊王猷聲教逺洽蠻夷竭歡囘首内附是用錫公朱户以居公明鍳人倫澄辨涇渭官方與能英乂克舉是用錫公納陛以登公保佑皇朝厲身化下杜漸防萌含生寅式是用錫公虎賁之士三百人公禦宄以刑禦奸以德君親無將將而必誅是用錫公鈇鉞各一公鳯舉四維龍騫八表威靈所振異域同文是用錫公彤弓一彤矢百玈弓十玈矢千公明發載懷肅恭禋祀孝敬之重義感靈祗是用錫公秬鬯一卣珪瓚副焉齊國置丞相以下一遵舊式徃欽哉其祗聽朕命經緯乾坤宏亮洪業茂昭爾大德闡揚我高祖之休命又詔齊公十郡之外隨宜除用齊國初建給錢五百萬布五千疋絹千疋四月癸酉詔進齊公爵為王九月丙午進位假黄鉞都督中外諸軍事太傅領揚州牧劒履上殿入朝不趨贊拜不名置左右長史司馬從事中郎掾属各四人使持節太尉驃騎大將軍録尚書南徐州刺史如故固辭詔遣敦勸乃受黄鉞辭殊禮甲寅給三望車三年正月丁巳命太傅府依舊辟召丁卯給甲仗五百人出入殿省甲午重申前命劒履上殿入朝不趨贊拜不名三月甲辰増封陳郡潁川陳留南兖州之盱眙山陽秦郡廣陵南沛十郡改立王社丙戌命齊王冕十有二旒建天子旌旗出警入蹕乗金根車駕六馬備五時副車置旄頭雲竿樂舞八佾設鍾簴宫縣王世子為太子王女王孫爵命一如舊儀辛卯宋帝禪位甲午遂即皇帝位世祖武皇帝高帝長子初仕宋為尋陽國侍郎辟州西曹書佐出為贑令江州刺史晉安王子勛反帝不從命南康相沈肅之繫帝於郡獄族人蕭欣祖門客桓康等破獄迎出帝肅之率將吏數百人追撃帝與左右拒戰生獲肅之斬首百餘級遂率部曲百餘人舉義兵始興相殷孚將萬兵赴子勛於尋陽或勸帝擊之帝以衆寡不敵避屯揭陽山中聚衆至三千人子勛遣其將戴凱之為南康相及軍主張宗之千餘人助之帝引兵向郡擊凱之别軍主程超數百人於南康口又進擊宗之破斬之遂圍郡城凱之以數千人固守帝親率將士盡日攻之城䧟凱之奔走殺偽贑令陶冲之帝即據郡城遣軍主張應期鄧惠貞三千人襲豫章子勛遣軍主談秀之等七千人與應期相拒於西昌築營壘交戰不能决聞帝將自下秀之等退散事平徴為尚書庫部郎征北中兵參軍元徽四年累遷晉熈王鎮西長史江夏内史行郢州事順帝立徴晉熈王爕為撫軍揚州刺史以帝為左衛將軍輔爕俱下沈攸之事起未得朝廷處分帝以中流可以待敵即據盆口城為戰守之備高帝聞之喜曰此真我子也帝表求西討不許乃遣偏軍援郢平西將軍黄囘等皆受帝節度加冠軍將軍持節昇明二年事平轉散騎常侍都督江州豫州之新蔡晉熈二郡軍事征虜將軍江州刺史封聞喜縣侯二千户其年徴侍中領軍將軍尋加督京畿諸軍事三年加尚書僕射中軍大將軍開府儀同三司進爵為公給班劒二十人齊國建為世子高帝即位為皇太子建元四年三月即皇帝位册府元龜卷一百八十四
