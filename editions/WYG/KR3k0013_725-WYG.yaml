body:
  text: 冊府元龜卷七百二十五宋王欽若等撰幕府部盡忠夫委質事人有死無貳烈士之節也繇漢而下公府方面咸得聘署以至丞掾之選率多英豪乃有當艱虞之際盡忠貞之效亢直以禦侮奔走以赴難盡力扵救惡而忘其楚毒悉心扵濟難而安乎厮役勵節以固守蹈刃而無悔以至規諫之不聽死以為謝事勢之既去義不改圖追懐恩紀甘就鼎鑊斯固英風激於頺俗茂烈著於信史千載之下凛乎其有生氣矣後漢周榮辟司徒袁安府安數與議論甚器之及安舉奏竇景與竇憲爭立北單于事皆榮所具草竇氏客太尉掾徐齮深惡之脅榮曰子為袁公腹心之謀排奏竇氏竇氏悍士刺客滿城中謹備之矣榮曰榮江淮孤生蒙先帝大恩以歴宰二城今復得備宰士榮辟司徒府故稱宰士縱爲竇氏所害誠所甘心故嘗勅妻子若卒遇飛禍無得殯歛飛祸言倉卒而死也冀以區區腐身覺悟朝廷及竇氏敗榮繇此顯名袁祕汝南汝陽人爲郡門下議生黄巾起祕從太守趙謙擊之軍敗祕與功曹封觀主簿陳端門下督范仲禮賊曹劉偉徳主記史丁子嗣記室史張仲然等七人以身扞刃皆死於陣謙以得免詔祕等旌表門閭號曰七賢耿武爲韓馥冀州長史袁紹至馥從事十人棄馥去唯恐在後獨武與别駕閔純杖刀兵不能禁紹後令田豐殺此二人鮮于輔漢末爲幽州牧劉虞從事時公孫瓉既殺劉虞輔以燕國閻柔有恩信共推柔爲烏丸司馬及瓉敗死輔持其衆奉王命以輔爲建忠將軍督幽州六郡太祖與袁紹相拒於官渡閻柔遣使詣太祖受事遷䕶烏丸較尉而輔身詣太祖拜左渡遼將軍封亭侯遣還鎮撫本州祖授為袁紹冀州别駕官渡之敗授為曺公軍所執乃大呼曰授不降也為所執爾曹公見授謂曰分野殊異遂用起絶不圖今日乃得相見授對曰冀州失策自取奔北授智力俱困宜其見禽曹公曰本初無謀不相用計今喪亂過紀國家未定十二年曰紀方當與君圖之授曰叔父母弟懸命袁氏若䝉公靈速死為福曹公歎曰孤早相得天下不足慮也遂赦而厚遇焉授尋謀歸袁氏乃誅之魏賈逵為太祖丞相主簿太祖欲伐呉而大霖雨三軍多不願行太祖知其然恐外有諫者教曰今孤戒嚴未知所之有諫者死逵受教謂其同僚三主簿曰今實不可出而教如此不可不諫也乃建諫草以示三人三人不獲已皆署名入白事太祖大怒収逵等當送獄取造意者逵即言我造意遂去詣獄獄吏以逵主簿也不即著械謂獄吏曰促械我尊者且疑我在近職求緩扵卿今将遣人來察我逵著械適訖而太祖果遣家中人就獄視逵既而教曰逵無惡意原復其職魯芝為大将軍曹爽司馬爽将誅芝與主簿楊綜斬闗奔爽及爽之将歸罪也芝綜泣諫曰公居伊周之任挟天子杖天威孰敢不從舎此而欲就東市豈不痛哉一云公挟天子權捨此以至東市乎爽不從有司奏収芝綜科罪司馬宣王赦之曰以勸事君者龎淯為凉州從事守破羗長㑹武威太守張猛反殺刺史邯鄲啇淯號哭尸所猛兵欲來縳淯猛聞之歎曰猛以殺刺史為罪此人以至忠為名如又殺之何以勸一州履義之士邪遂使行服蜀黄權為益州牧劉璋主簿璋欲迎先主權諫不聽出為廣漢長及先主襲取益州将帥分下郡縣望風景附權閉城堅守須劉璋稽服乃詣降先主先主假權偏將軍呉虞翻為孫策功曹時策討山越斬其渠帥悉令左右分行逐賊獨騎與翻相得山中翻問左右安在策曰悉行逐賊翻曰危事也令策下馬此草深卒有驚急馬不及縈策但牽之執弓矢以歩翻善用矛請在前行得平地勸策乘馬策曰卿無馬奈何答曰翻能歩行日可三百里自征討以來吏卒無及翻者明府試躍馬翻能䟽歩隨之行及大道得一鼓吏策取角自鳴之部曲識聲小大皆出遂從周旋平定三郡策薨權統事定武中郎將暠策之從兄也屯烏程整帥吏士欲取㑹稽㑹稽聞之使民守城以俟嗣主之命因令人告諭暠翻説暠曰討逆明府不竟天年今攝事統衆宜在孝亷翻已與一郡吏士嬰城固守必欲出一旦之命為孝亷除害惟執事圖之扵是暠退晉郭瑀敦煌人苻氏之末為雒陽王穆太府左長史穆惑扵䜛間西伐敦煌索嘏瑀諫曰昔漢定天下然後誅功臣今事業未建而誅之立見麋鹿㳺扵此庭矣穆不從瑀出城大哭舉手謝城曰吾不復見汝矣還而引被覆面不與人言不食七日輿疾而歸旦夕祈死郭舒為荆州刺史王澄别駕澄終日酣飲不以衆務在意舒嘗切諫之及天下大亂又勸澄修徳養威保完州境澄以為亂自京都起非復一州所能防禦雖不能從然重其忠亮荆土士人宗欽嘗因酒忤澄澄怒叱左右棒欽舒厲色謂左右曰使君過醉汝軰何敢妄動澄恚曰别駕狂邪誑言我醉因遣搯其鼻炙其眉頭舒領而受之澄意少釋而欽遂得免桓雄長沙人少仕州郡譙王承為湘州刺史命為主簿王敦之逆承為敦将魏乂所執佐吏奔散雄與西曹韓階從事武延竝毁服為僮豎隨承向武昌又見雄姿貌長者進退有禮知非凡人有畏憚之色因害之謝純字景懋晉末為劉毅豫州别駕毅鎭江陵以為衛軍長史南平相髙祖遣王鎭惡率軍襲毅已至城下時毅疾病佐吏皆入叅承純叅承畢已出聞兵至馳還入府左右引車欲還外􅇬純叱之曰我人吏也逃欲安之乃入及毅兵敗衆散時已暗夜司馬毛修之謂純曰君但隨僕純不從挟兩人出火光中為人所殺韓延之為平西將軍荆州刺史司馬休之平西府録事叅軍休之以子文思為宋髙祖所殺遂結雍州刺史魯宗之謀誅執政髙祖討之未至江陵宻使與延之書曰文思事源逺近所知去秋遣康之送還司馬君者推至公之極也而了無愧心又絶表䟽此是天地之不容吾受命西討止其父子而已彼土僑舊為所驅逼一無所問徃年郗僧施謝邵任集之等交搆積嵗専為劉毅謀主所以至此卿等諸人一時逼廹本無纎釁吾虚懐期物自有繇來今在近路正是諸人歸身之日若大軍先登交鋒接刃蘭艾雜揉或恐不分故白此意并可示同懐諸人延之報曰承親率戎馬逺履西畿闔境士庶莫不驚駭何者莫知師出之名故也今辱來䟽始知以譙王前事良増歎息司馬平西體國忠貞欵愛待物當扵古人中求爾以君公有興復之勲家國䝉頼推徳委誠每事詢仰譙王徃以微事見劾猶自表遜位况以大過而當嘿然邪但康之前言有所不盡故重使胡道諮白所懐道未及反已奏表廢之所不盡者命爾推寄相與之懷正當如此有何不可便興兵戈自義旗秉權以來四方方伯誰敢不先相諮疇而徑表天子可謂欲加之罪其無辭乎劉裕足下海内之人誰不見足下此心而復欲欺誑國士天地所不容在彼不在此矣來言虚懷期物自有繇來今伐人之君䧟人以利眞可謂虚懷期物自有繇來者矣劉藩死扵閶闔之門諸葛斃扵左右之手甘言詫方伯襲之以輕兵遂使席上靡欵懷之士閫外無自信諸侯以是為得筭良可耻也貴府将佐及朝廷賢徳寄性命以過日心企太平久矣吾誠鄙劣嘗聞道扵君子以平西之至徳寕可無授命之臣乎未能自投虎口比迹郗任之徒明矣假令天長喪亂九流渾濁當與臧洪逰扵地下不復多言公視書歎息以示諸佐曰事人當使如此宋劉穆之爲髙祖司馬食必方丈嘗爲十人饌穆之嘗謂髙祖曰穆之家本貧贍生多闕自叨沗以來雖每存納損而朝夕所須微爲過豐自此之外一毫不以負公胡藩初爲荆州刺史殷仲堪恭軍嘗説仲堪以崇待桓𤣥太過後恭𤣥軍事𤣥敗髙祖素聞藩直言扵殷氏又爲𤣥盡節召爲員外散騎侍郎恭鎮軍事謝方明爲髙祖中兵主簿方明事思忠益知無不爲髙祖謂之曰愧未有𤓰衍之賞且當與卿共豫章國禄屢加賞賜賀弼爲竟陵王誕記室叅軍孝武将誅誕誕閉城拒弼固諌再三誕怒抽刀向之乃止或勸弼出降弼曰公舉兵向朝廷此事既不可從荷公厚恩又義無違背唯當死明心爾乃服藥自殺邉榮爲沈攸之荆州倉曹恭軍嘗爲府録事所辱攸之爲榮鞭殺録事及攸之自江陵下以榮爲留府司馬守城張敬兒将至人或説之使詣敬兒降榮曰受沈公厚恩一朝緩急便改易本心不能也城敗見敬兒問曰邉公何為同人作賊不早來榮曰沈荆州舉義兵安社稷身雖可滅要是宋世忠臣天下尚有直言之士不可謂之為賊身本不蘄生何湏見問敬兒曰死何難命斬之榮歡􅀏而去容無異色臧寅為沈攸之功曹攸之兵敗諸将軍皆奔散唯寅曰我委質事人豆可茍免乃投水死宗儼之為沈攸之記室攸之抗齊太祖表檄文䟽皆儼之辭也及事敗責之答曰士為知巳用豈為軍軰所識遂伏誅南齊房叔安為青州刺史王𤣥邈長史齊髙帝之鎮淮隂為宋明帝所疑乃北勸魏遣書結𤣥邈叔安進曰夫布衣韋𢃄之士御一飡而不忘義使之然也今将軍居方州之重托君臣之義無故舉忠孝而棄之三齊之士寧蹈東海死爾不敢随将軍也𤣥邈意乃定仍使叔安使建業發髙帝謀髙帝扵路執之并求𤣥邈表叔安答曰寡君使表上天子不上将軍且僕之所言利國家而不利将軍無所應問荀伯玉勸殺之髙帝曰物各為主無所責也鄭紹叔為夀州治中從事時刺史蕭誕以弟湛誅䑓遣収誕兵卒至左右莫不驚散紹叔聞難獨馳赴焉誕死侍誕喪柩人咸稱之到京師司空徐孝嗣見而異之曰祖逖之流也北齊孫騰初為髙祖晉州長史髙祖自晉陽出塗口行至襄垣爾朱兆率衆追髙祖髙祖與兆宴飲扵水濵誓為兄弟各還本營明旦兆復招髙祖髙祖欲安其意将赴之臨上馬騰牽衣止之兆乃隔水肆罵馳還晉陽髙祖遂東綦連猛魏末為爾朱兆都督猛父母兄弟皆在山東爾朱京纒欲投髙祖謂猛曰王以爾父兄皆在山東每懷不信爾若不走今夜必當殺爾可走去猛以素䝉兆恩拒而不從京纒曰我今亦欲去爾從我不猛又不從京纒乃舉矟曰爾不從我必刺爾猛乃從之去城五十里即背京纒復歸及爾朱兆敗乃歸髙祖問曰爾朱京纒将爾投我爾中路背去何也猛乃具陳服事之理不可貳心髙祖曰爾莫懼服事人法須如此遂補都督慕容紹宗魏末為爾朱兆長史兆之敗於韓陵也士卒多奔兆懼将欲潜遁紹宗建旗鳴角招集義徒軍容既振與兆徐而上馬後周周惠逹㓜有志操魏齊王蕭寳寅為瀛州刺史召惠逹及河間馮景同在閣下甚禮之及寳寅還朝惠逹隨入雒陽領軍元乂勢傾海内惠逹嘗因寳寅與乂言論乂歎重之扵座遺惠逹衣物孝昌初魏臨淮王彧北討以惠逹為府長流叅軍及万俟醜奴等搆亂蕭寳寅西征惠逹復隨入闗寳寅後與賊戰不利退還仍除雍州刺史令惠逹使雒陽未還而寳寅反謀聞扵京師有司以惠逹是其行人将執之乃私馳還至潼闗遇大使楊侃侃謂惠逹曰蕭氏逆謀已成何為故入虎口惠逹曰蕭王為左右所誤今徃庶其改圖及至寳寅反形已露不可彌縫遂用惠逹為光祿勲中書舎人寳寅既敗人悉逃散唯惠逹等數人從之寳寅語惠逹曰人生富貴左右咸言盡節及遭厄難乃知嵗寒也後為賀㧞岳闗中大行臺從事中郎嘗使至雒魏孝武與惠逹語及世難惠逹陳天下事勢述岳有誠節唯以憂國定難為事言辭激切帝甚嘉之及還具以白岳岳曰人生扵天受命於君豈有利人榮祿而不憂其禍難卿之所奏實獲吾心自是更被親禮岳每征討嘗命惠逹居守又轉岳府屬岳為侯莫陳悦所害悦得惠逹辭以疾不見許乃遁入漢陽之麥積崖賈直言從事扵李師道時師道不恭朝命直言冒刃説者二輿襯説者一師道訖不從劉昌裔太原陽曲人少逰三蜀楊琳之亂昌裔説其歸順及琳授雒州刺史以昌裔為從事琳死乃去馮宿為徐州節度使張建封掌書記建封卒其子愔為軍士所立淄清李師古欲乘喪襲取冀鎮時王武俊且觀其釁愔恐懼計無所出宿乃以檄書招師古而説武俊曰張公與君爲兄弟欲同力驅兩河歸天子衆所知也今張公殁㓜子爲亂兵所脅内則誠欵隔絶扵朝廷外則境土侵逼扵强冦孤危若此公安得坐視哉誠能奏天子念先僕射之忠勲捨其子之迫脅使得束身歸闕公扵朝廷有靖亂之功扵張氏有繼絶之徳矣武俊大悦即以表聞繇是朝廷賜愔節仍贈建封司徒蘇兆爲淮西呉少陽判官與陽元卿及其将侯惟清同爲少陽畫朝覲計及元濟自領軍事昏狠無知所暱皆軍中凶悍之徒素不便兆等既不受詔其左右告兆等有異志元濟乃引兆扵别寝縊殺之歸其屍扵家械侯惟清而囚之時朝廷聞清已死贈兵部尚書贈兆以右僕射後唐苻習爲鎮州王鎔都校自荘宗經略河朔與鎔連衡嘗令率師從征鎔爲大将軍王徳明所害徳明據鎮州時習在徳勝行臺徳明上書請習歸藩荘宗召習謂之曰王徳明召爾歸藩自為行計習雨泣而進曰臣本趙人家世事王氏嘗効忠義而徳明乃幽滄叛卒趙王知人不盡過意任使果致此反噬臣等雖不武願在霸府血戰而死不能委身於兇首被其屠割荘宗曰爾等既懷舊君之愛則能復􅄷乎吾當助爾習等舉身投地號動感激良久謝曰王必以故使輔翼之勞雪其寃耻臣不敢期師旅爲助但悉本軍可以誅其逆豎帝即令閻寳史建塘助習興師討徳明乃以習為鎮冀節度留後及徳明誅将正授節鉞習不敢當其任辭曰臣縁故使未葬無嗣息臣合服斬衰候臣禮制畢聽命及莊宗兼領鎮州乃割相衛二州置義寧軍以習為節度使習奏曰魏慱六州覇王之府不宜遽有割𨽻但授臣河南一鎮臣自攻取便也乃授天平軍節度鄆齊埭觀察東南面招討等使習有器度性忠壯於荷恩感遇之際而能􅁬勵思報自荘宗十年㳂河拒戰左犄右角習嘗以本軍景從心無顧望諸将服其為人淳于晏登州人以明經登第自霍彦威為禆将日寄食於門下彦威嘗敗獨脱其身左右莫繼唯晏仗劍從之徒歩草莾自是彦威髙其氣義相得甚歡及歴數鎮皆為判官軍府之事咸取决焉至扵私門簿籍婢僕支分事無巨細但取决扵晏幕下兼家宰之任爾後公卿之門客往徃效焉時謂之效淳俾彦威數鎮稱治晏之盡心他人又不可階也晉顔衍為青州節度房知温從事知温貪暴積貨數百萬治第於南城出則以妓樂相隨任意所之曽不以政事為務衍委曲陳其利病知温不能用焉及髙祖建義入雒尚不即進獻耀兵扵牙帳之下衍正色謂曰清泰帝富有天下多力善戰豈明公之比而天運有歸坐成灰燼今青州遷延不貢何以求安千百武夫無足為恃深為大王之所憂也知温遂馳表稱賀青州乃安未幾以沉湎成病而卒部曲将吏分其所聚例為富室衍又勸其子彦儒進錢十萬貫以助國用朝廷除彦儒爲沂州刺史其家幸獲保全皆衍之力也漢李恕初仕後唐爲燕王趙延夀賔佐延夀䧟虜十年朝廷不欲恕在朝出爲從事未幾虜犯京師延夀爲虜相輔復召恕委用㑹延夀子賛爲河中尹命恕徃佐之其年虜主死髙祖有中原移賛於京兆賛懼漢不能容潜通蜀軍将謀夜遁恕謂賛曰燕王入胡非所願也漢朝建國必務懐來太尉泥首歸朝必保富貴今若狼狽入蜀理難萬全所謂蹄涔不能容吞舟之魚後悔無及願公歸漢其福萬全茍聽卑言請先入朝爲公申理即命恕上章髙祖引見謂恕曰賛何以附西川軍恕曰賛以家在胡中身受胡命自懷憂恐謂陛下終不能容招引川軍蓋圖茍免以㣲臣意必料國家撫安所以令臣哀祈請覲髙祖曰賛父子皆吾人也事虜出扵不幸今聞延夀落扵檻穽吾爭忍不容賛恕未還賛已離永興朝廷嘉恕之忠以爲邠州節度判官周和凝仕梁為滑州節度賀瓌賓幕時瓌與後唐荘宗相拒於河上戰於胡桞陂瓌軍敗而北唯凝随之瓌顧曰無相隨當自努力凝對曰大丈夫受人知有難不報非素志也但恨未有死所旋有一禆将來逐瓌凝叱之不止遂引弓以射應弦而斃瓌復免既而謂諸子曰昨非和公無以致此和公文武全才而有志氣後必享重位爾宜謹事之遂以女妻之繇此聲望益隆王敏仕晉為杜重威數鎮從事漢初重威叛扵鄴時敏為㽞守判官嘗泣諌重威懇請歸順重威始則不從及其窮也納敏之言以其城降時魏之饑民十猶四五咸保其餘生者敏之力也册府元龜卷七百二十五
