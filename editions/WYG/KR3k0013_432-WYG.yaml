body:
  text: 册府元龜卷四百三十二宋王欽若等撰將帥部矯命而勝立後効矯命而勝夫兵用詭道智尚先見應變貴於神速轉禍在於俄頃又豈俟白丈人以救火同守株而待兎哉故曰将在外君命有所不受又曰茍利國家專之可也若乃謀雖素講勢不中順敵非遥度事有從權敏則可以成功緩乃自奪其便繇是或先出而奮節或詐制以調衆固不暇圖上方略以俟報聞罔逃擅命之咎兾臻必尅之理斯乃發於忠憤獲此戰勝議不與猶豫首䑕者同焉若夫料敵非審決勝或愆出於無名成乎輕舉斯亦足以虞首事之失慎不戢之禍哉夫槩王吳王闔廬之弟也吳伐楚二師陳于柏舉二師吴楚夫槩王晨請於闔廬曰楚瓦不仁瓦楚令尹子常名其臣莫有死志先伐之其卒必奔而後大師繼之必尅弗許夫槩王曰所謂臣義而行不待命者其此之謂也今日我死楚可入也以其屬五千先擊子常之卒子常之卒奔楚師亂吴師大敗之子常奔鄭漢陳湯元帝時為西域副校尉先是郅支單于殺漢使谷吉等漢遣使三軰至康居求谷吉等死死尸也郅支困辱使者不肯奉詔而因都䕶上書言居困戹願歸計彊漢遣子入侍故為此言以調戲也歸計謂歸附而受計策也其驕慢如此建昭二年湯既領外國乃與西域都䕶騎都尉甘延壽謀曰夷狄畏服大種其天性也西域本屬匈奴今郅支單于威名遠聞侵陵烏孫大宛常為康居畫計欲降服之如得此二國北擊伊利西取安息南排月氏山離烏弋數年之間城郭諸國危矣山離烏弋不在三十六國中去中國二萬里謂西域國為城郭者言不隨畜牧遷徙以别於匈奴也且其人剽悍剽輕也悍勇也剽頻妙切悍胡幹切好戰伐數取勝久畜之必為西域患郅支單于雖所在絶逺蠻夷無金城強弩之守如發屯田吏士敺從烏孫衆兵直指其城下彼亡則無所之守則不足自保千載之功可一朝而成也延壽亦以為然欲奏請之湯曰國家與公卿議大策非凡所見事必不從延壽猶與與讀曰豫不聽會其久病湯獨矯制發城郭諸國兵車師戊巳校尉屯田吏士延壽聞之驚起欲止焉湯怒按劍叱延壽曰大衆已集會豎子欲沮衆邪沮止也壞也音才女切延壽遂從之部勒行陳益置揚威白虎合騎之校西域陳法之名也或云一校則别為一部軍故稱校耳湯時新置此等諸校名以為威聲也漢兵胡兵合四萬餘人延壽湯上疏自劾奏矯制陳言兵狀即日引兵分行别為六校其三校從南道踰葱嶺經大宛其三校都䕶自将發温宿國從北道入赤谷過烏孫渉康居界至闐池西而康居副王抱闐将數千騎冦赤谷城東闐音填殺略大昆彌千餘人􅇌畜產甚多從後與漢軍相及頗冦盜後重重謂輕重也湯縱胡兵擊之殺四百六十人得其所略民四百七十人還付大昆彌其馬牛羊以給軍食又捕得抱闐貴人伊奴毒入康居東界令軍不得為冦間呼其貴人屠墨見之間宻呼也諭以威信與飲盟遣去徑引行未至單于城可六十里止營復捕得康居貴人貝色子男開牟以為導貝色子即屠墨母之弟皆怨單于繇是具知郅支情眀日引行未至城三十里止營郅支單于遣使問漢兵何以來應曰單于上書言居困阨願歸計彊漢身入朝見天子哀閔單于棄大國屈意康居故使都䕶将軍來迎單于妻子恐左右驚動故未敢至城下使數注來相答報延壽湯因讓之我為單于逺來而至今無名王大人見将軍受事者名王諸王之貴者受事受教命而供事也何單于忽大計失客主之禮也兵來道遠人畜罷極食度大各切且盡恐無以自還願單于與大臣審計策眀日前至郅支城都頼水上離城三里止營傅陳傅讀曰敷敷布也望見單于城上立五采幡幟幟讀曰織音式志切數百人被甲乘城乘謂登之備守也又出百餘騎往來馳城下歩兵百餘人夾門魚鱗陳言其相接次形若魚鱗講集用兵城上人更招漢軍曰鬭來更互也音工行切百餘騎馳赴營營皆張弩持滿指之騎引却頗遣吏士射城門騎歩兵騎歩兵皆入延壽湯令軍聞皷音皆薄城下四面圍城各有所守穿塹塞門戸鹵楯為前㦸弩為後仰射城中樓上人樓上人下走上城外有重木城從木城中射頗殺傷外人外人發薪燒木城夜數百騎欲出外迎射殺之初單于聞漢兵至欲去疑康居怨己為漢内應又聞烏孫諸國兵皆發自以無所之郅支已出復還曰不如堅守漢兵逺來不能乆攻單于乃披甲在樓上諸閼氏夫人數十皆以弓射外人外人射中單于鼻諸夫人頗死單于下騎傳戰大内下騎謂下樓而騎馬也傳戰轉戰也大内單于之内室也言且戰且行而入内室夜過半木城穿中人郤入王城乘城呼乘登也呼火故也次下亦同時康居兵萬餘騎分為十餘處四面環城亦與相應和環繞也音患和音禍夜數奔營不利輙郤平眀四面火起吏士喜大呼乘之鉦皷聲動地康居兵引郤漢兵四面推鹵楯鹵楯竝入土城中單于男女百餘人走入大内漢兵縱火吏士爭入單于被創死軍候假丞杜勲斬單于首得漢使節二及谷吉等所齎帛書諸鹵獲以畀得者畀子也各以與所得人畀必寐切凡斬閼氏太子名王以下千五百一十八級生虜百四十五人降虜千餘人賦予城郭諸國所發十五王賦謂班與之也所發十五王謂所發諸國之兵共圍郅支王者也於是延壽湯上疏曰臣聞天下之大義當混為一混同也音乎本切昔有唐虞今有強漢匈奴呼韓邪單于已稱北蕃惟郅支單于叛逆未伏其辜大夏之西以為強漢不能臣也郅支單于慘毒行於民大惡通於天臣延壽臣湯将義兵行天誅頼陛下神靈隂陽竝應天氣精眀陷陳尅敵斬郅支首及名王已下宜縣頭槀街蠻夷邸間按黄圖槀街在長安城門内槀街街名蠻夷邸在此街也邸名今鴻臚客舘也以示萬里眀犯強漢者雖遠必誅初中書令石顯常欲以姊妻延壽延壽不取及丞相匡衡亦惡其矯制皆不與湯與猶許也既至論功石顯匡衡以為延壽湯擅興師矯制幸得不誅如復加爵土則後奉使者爭欲乘危徼幸生事於蠻夷為國招難漸不可開帝内嘉延壽湯功而重違衡顯之宜重難言也議乆不決宗正劉向上疏請尊寵爵位以勸有功於是天子下詔封延壽為義成侯湯爵關内侯食邑各三百戸以延壽為長水校尉湯為射聲校尉後漢臧宫為威武将軍光武建武十一年討公孫述宫與征南大将軍岑彭等破荆門别至垂鵲山通道出秭歸至江州岑彭下巴郡使宫将降卒五萬從涪水上平曲述将延岑盛兵於沅水時宫衆多食少轉輸不至而降者皆欲散畔郡邑復更保聚觀望成敗宫欲引還恐為所反會帝遣謁者将兵詣岑彭有馬七百匹宫矯制取以自益晨夜進兵多張旗幟登山鼓譟右歩左騎挾船而引呼聲動山谷岑不意漢軍卒至登山望之大震恐宫因從擊大破之斬首溺死者萬餘人水為之濁流延岑奔成都其衆悉降盡獲其兵馬珍寳自是乘勝追北降者以十萬數宋均為謁者建武二十四年武陵蠻反圍武威将軍劉尚詔使均乘𫝊發江夏奔命三千人往救之擢選精勇聞命奔走者既至而尚已沒會伏波将軍馬援至因詔令均監軍與諸将俱進賊拒扼不得前㑹馬援卒於師軍士多温濕疾病死者大半均慮軍遂不得反乃與諸將議曰今道逺士病不可以戰欲權乘制降之何如諸将皆伏地莫敢應均曰夫忠臣出境有可以安國家專之可也公羊傳曰聘禮大夫受命不受辭出境有以安社稷全國家則專之可也乃矯制調伏波司馬吕种守沅陵長命种奉詔書入虜營告以恩信因勒馬兵隨其後蠻夷震怖即共斬其大帥而降於是入賊營散其衆遣歸本郡為置長吏而還均未至先自劾矯制之罪光武嘉其功迎賜以金帛叚紀眀桓帝時為遼東屬國都尉時鮮卑犯塞紀眀即率所領馳赴之既而恐賊驚去乃使驛騎詐齎璽書詔紀眀紀眀於道偽退潛於還路設伏虜以為信然乃入追紀眀紀眀因大縱兵悉斬獲之坐詐璽書伏重刑以有功論司寇刑竟徵拜議郎魏李典漢末為禆将軍時太祖擊譚尚於黎陽使典與程昱等以船運軍糧會尚遣魏郡太守高蕃将兵屯河上絶水道太祖勑典昱若船不得過下從陸道典與諸将議曰蕃軍少甲而恃水有懈怠之心擊之必尅軍不内馭茍利國家專之可也宜亟擊之昱亦以為然遂北渡河攻蕃破之水道得通田豫眀帝太和末以殄夷将軍督青州諸軍假節討遼東會吴賊遣使與公孫淵相結帝以賊衆多又已渡海詔豫使罷軍豫度賊舩垂還歲晚風急必畏漂浪東隨無岸當赴成山成山無藏船之處輒便循海案行地形及諸山島徼截險要列兵屯守自入成山登漢武之觀賊還果遇惡風船皆觸山沉没波蕩著岸無所迯竄盡虜其衆晉李憙魏末為揚威将軍假節領護𦍑校尉羌虜犯塞憙因其隙會不及啓聞輒以便宜出軍深入遂大尅獲以功重免譴時人比之漢朝馮甘焉毛寳為温嶠平南參軍蘇峻作逆寶領千人為嶠前鋒俱次茄子浦初嶠以南軍習水峻軍便歩欲以所長制之宣令三軍有上岸者死時蘇峻送米萬斛饋祖約約遣司馬桓撫等迎之寳告其衆曰兵法軍令有所不從豈可不上岸邪乃設變力戰悉獲其米殺虜萬計約用大饑嶠嘉其勲上為廬江太守唐李靖太宗貞觀四年頡利可汗請舉國内附以靖為定襄道行軍總管往迎頡利雖外請朝謁而潜懷猶與帝遣鴻臚卿唐儉将軍安脩仁慰諭靖揣知其意謂副将張公謹曰詔使到彼虜必自寛遂選精騎一萬賫二十日粮引兵自間道襲之公謹曰詔許其降行人在彼未宜討擊靖曰此兵機也時不可失韓信所以破齊人如唐儉等軰何足可惜督軍疾進師至隂山過其斥候千餘帳皆俘以隨軍頡利見使者大悦不虞官兵至也靖軍将逼其牙十五里虜始覺頡利畏威先奔部衆因而潰散靖斬萬餘級俘男女十餘萬殺其妻隋義成公主頡利乘千里馬投吐渾西道行軍總管張寳相擒之以獻立後効夫先迷後得實顯於羲經善敗不亡蓋聞於軍志若夫孟眀二陵之戰大樹回溪之役覆軍擒将䘮師失律可謂敗矣然而念德不怠乃立於後圖出竒無窮終邀於有勝又兵者機事也故用之以危地窮而能變屈而能伸審多筭之可慿雖小衂而何害此乂制勝之嘉術整軍之善敎也是故再戰皆北北氣未衰一立後功可刷前恥得失之際燦然可觀秦孟眀視殽之役晉人既歸秦帥秦大夫及左右皆言於穆公曰是敗也孟眀之罪也必殺之穆公曰是孤之罪復使為政三十五年春孟眀視帥師伐晋以報殽之役晉侯禦之戰于彭衙秦師敗績穆公猶用孟眀孟明增修國政重施於民三十六年夏穆公以孟眀伐晉濟河焚舟示必死也取王官及郊王官郊晉地晉人不出遂自茅津濟封殽屍而還茅津在河東大之也陽縣西封埋藏遂霸西戎用孟明也漢韓信為左丞相封齊王高帝五年與諸侯兵共擊項羽決勝垓下信将三十萬自當之孔将軍居左費将軍居右帝在後絳侯柴将軍在帝後臣欽若等按漢書孔将軍名聚封蓼侯絳侯即周勃費柴史失其名項羽之卒可十萬信先合不利却孔将軍費将軍縱楚兵不利信復乘之大敗垓下後漢吴漢建武二年為大司馬率驃騎大将軍杜茂彊弩将軍陳俊等圍蘇茂於廣樂劉永将周建别招聚収集得十餘萬人救廣樂漢将輕騎迎與之戰不利墮馬傷膝還營建等遂連兵入城諸将謂漢曰大敵在前而公傷卧衆心懼矣漢乃勃然褁創而起椎牛饗士令軍中曰賊衆雖多皆刼掠群盜勝不相讓敗不相救非有仗節死義者也今日封侯之秋諸君勉之於是軍士激怒人倍其氣旦日建茂出兵圍漢漢選四部精兵黄頭吴河等及烏桓突騎三千餘人齊皷而進建軍大潰反還奔城漢長驅追擊爭門竝入大破之茂建突走十二年征公孫述攻㧞廣都遣輕騎燒成都市橋武陽以東諸小城皆降光武戒漢曰成都十萬餘衆不可輕也但堅據廣都待其來攻勿與爭鋒若不敢來公轉營迫之須其力疲乃可擊也漢乘利遂自将歩騎二萬餘人進逼成都去城十餘里阻江北為營作浮橋使副将武威将軍劉尚将萬餘人屯於江南相去二十餘里帝聞大驚譲漢曰比勑公千條萬端何意臨事勃亂既輕敵深入乂與尚别營事有緩急不復相及賊若出兵綴公以大衆攻尚尚破公即敗矣幸無它者急引兵還廣都詔書未到述果使其将謝豐袁吉将衆十許萬分為二十餘營并出攻漢使别将萬餘人刼劉尚令不得相救漢與大戰一日兵敗走入壁豐因圍之漢乃召諸将厲之曰吾共諸君踰越險阻轉戰千里所在斬獲遂深入敵地至其城下而今與劉尚二處受圍勢既不接其禍難量欲潜師就尚於江南并兵禦之若能同心一力人自為戰大功可立如其不然敗必無餘成敗之機在此一舉諸将皆曰諾於是饗士秣馬閉營三日不出乃多樹幡旗使煙火不絶夜啣枚引兵與劉尚合軍豐等不覺眀日乃分兵拒水北自将攻江南漢悉兵迎戰自旦至晡遂大破之斬謝豐袁吉獲甲首五千餘級於是引還廣都留劉尚拒述具以状上而深自譴責帝報曰公還廣都甚得其宜馮異為征西大将軍與鄧禹等共攻赤眉大為赤眉所敗禹得脱歸宜陽異棄馬歩走上回溪阪與麾下數人歸營復堅壁收其散卒招集諸營保數萬人與賊約期會戰使壮士變服與赤眉同伏於道側旦日赤眉使萬人攻異前部異裁出兵以救之賊見勢弱遂悉衆攻異異乃縱兵大戰日昃賊氣衰伏兵卒起衣服相亂赤眉不復識别衆遂驚潰追擊大破於崤底降男女八萬人餘衆尚十餘萬東走宜陽降璽書勞異曰赤眉破平士吏勞苦始雖垂翅回溪終能奮翼澠池可謂失之東隅収之桑榆方論功賞以答大勲馬武明帝永平初為中郎将時西羌冦隴右覆軍殺将朝廷患之復拜武捕虜將軍以中郎将王豐副與監軍使者竇固右輔都尉陳訢将烏桓黎陽營三輔募士光武置􅀺陽營涼州諸郡𦍑胡兵及弛刑合四萬人擊之到金城浩亹與𦍑戰浩亹縣名屬金城郡斬首六百級及戰於雒都谷為𦍑所敗湟水一名雒都水西自吐谷渾界入在今鄯州湟水縣死者千餘人𦍑乃率衆引出塞武復追擊到東西邯大破之酈元水經注白邯川城左右有水自北出南經邯亭注于河蓋以此水分流謂之東西邯也在今廓州化隂縣東斬首四千六百級獲生口千六百人餘皆降散武振旅還京師吴劉繇漢末為揚州刺史時袁術在淮南繇畏憚不敢之州欲南渡江吴景孫賁迎置曲阿術圖為僣逆攻没諸郡縣繇遣樊能張英屯江邉以拒之以景賁術所授用乃迫逐使去於是術乃自置揚州刺史與景賁并力攻英能等歲餘不下朝廷命加繇為牧振武将軍衆萬餘人孫䇿東渡破英能等繇奔丹徒遂沂江南保豫章駐彭澤笮融先至殺太守朱皓入居郡中繇進討融為所破更復招合屬縣攻破融融敗走入山為民所殺晉高宻王略懷帝時為使持節都督荆州諸軍事征南大将軍京兆流人王逌與叟人郝洛聚衆數千屯于冠軍略遣參軍崔曠率将軍皮初張雒等討逌為逌所譎戰敗略更遣左司馬曹攄統曠等進逼逌將大戰曠在後宻自退走攄軍無繼戰敗死之略乃赦曠罪復遣部将韓松又督曠攻逌逌降陳侯安都高祖時為鎮北将軍與周文育討王琳戰敗竝為琳所囚逃歸復其官爵尋出為都督南豫州諸軍事鎮西将軍南豫州刺史令繼周文育攻余孝勵及王琳將曹慶常衆愛等安都自宫亭湖出松門躡衆愛後文育為熊曇朗所害安都廻取大艦值琳将周炅周恊南歸與戰破之生擒炅恊孝勵弟孝猷率部下四千家欲就王琳遇炅敗乃詣安都降又進軍於禽竒洲破曹慶常衆愛等焚其舩艦衆愛奔于廬山為村人所殺餘衆悉平文帝即位王琳下至柵口大軍出頓蕪湖時侯瑱為大都督而指麾經略多出安都天嘉元年增邑千户及王琳敗走入齊安都進軍湓城討琳餘黨所向皆下後魏李佐道武帝時為安南将軍攻赭陽為賊所敗坐徙􅘵州為民車駕征宛鄧復起佐假平逺将軍統軍齊新野太守劉忌馮城固守佐率所領攻㧞之爾朱天光為驃騎大将軍既尅万俟醜奴而都督長孫邪利為賊行臺万俟道雒襲殺爾朱榮責天光失邪利不獲道雒復遣使杖之一百詔降為散騎常侍撫軍將軍雍州刺史削爵為侯天光與岳悦等復向牽屯討之天光身討道雒道雒戰敗率數千騎走追之不及遂入隴投略陽賊帥王慶雲慶雲以道雒驍果絶倫得之甚喜便謂大事可圖乃自稱皇帝以道雒為将軍天光欲討之而荘帝頻勑榮復有書以隴中險䆳兼天盛暑令待冬月而天光知其可制乃率諸軍入隴至慶雲所居永雒城慶雲遣道雒出城拒戰天光復射中道雒臂失弓還走破其東城賊遂併趣西城城中無水衆聚熱渇有人走降言慶雲道雒欲突出死戰天光恐失賊帥其釁未已乃遣謂慶雲曰力屈如此可以早降若未敢決當聽諸人今夜共議眀晨早報而慶雲等兾得少緩待夜突出報天光云請待眀日天光因謂曰相知須水今為少退任取河飲賊衆安悦無復走心天光宻使軍人多作木槍各長七尺至黄昏時布立人馬為防衞之勢周匝立槍要路加厚又伏人槍中備其衝突兼令宻縛長梯於城北其夜慶雲道雒果便突出馳馬先進不覺至槍馬各傷倒伏兵便起同時擒獲餘衆皆出城南遇槍而止城北軍士登梯上城賊徒路窮乞降至眀盡収其伏天光岳悦等議悉坑之死者萬七千人分其家口於是三秦河渭𤓰涼鄯善咸來欵順天光頓軍略陽詔復天光前官爵尋加侍中儀同三司增邑至三百戸崔延伯為左衞将軍與行臺蕭寳寅討万俟醜奴軍大敗寳寅歛軍退保涇州延伯修繕噐械購募驍勇復從涇州西進去賊彭坑谷柵七里結營延伯恥前挫辱不報寳寅獨出襲賊大破之俄頃間平其數柵賊皆逃迸北齊斛律金為汾州大都督從神武戰於沙宛不利班師因此東雍諸城復為西軍所據遣金與尉景庫狄干等討復之後周陽猛為武衞将軍鎮善渚為竇泰所襲猛脱身得免太祖以衆寡不敵弗之責也仍配兵千人守牛尾堡尋而太祖擒竇泰猛亦别獲東魏𢎞農郡守淳于業于謹為驃騎大将軍從太祖攻東魏邙山大軍不利謹率其麾下偽降立於路左齊神武軍乘勝逐北不以為虞謹乃自後擊之齊軍亂以此大軍得全隋叚文振高祖仁壽初為太僕卿嘉州獠反文振以行軍總管討之引軍山谷間為賊所襲前後阻險不得相救軍遂大敗文振復収散兵擊其不意竟破之薛世雄煬帝大業中為沃沮道将軍征遼與宇文述同敗績於平壤還次白石山為賊所圍百餘重四面矢下如雨世雄以羸師為方陣選勁騎二百先犯之賊稍却因而縱擊之遂破之而還唐劉文靜高祖起義初為大将軍府司馬将兵與隋将屈突通桑顯和戰於潼闗義軍不利文靜為流矢所中義軍氣奪垂至於敗而文靜㳺軍數百騎自南首而來擊其背顯和大敗匹馬而歸薛訥為檢校左衞大将軍𤣥宗開元二年詔與将軍杜賔客崔宣道率衆討契丹六月師至灤河盡為契丹所覆除削官爵其年八月吐蕃大将勃達延乞力徐等率衆十萬寇臨洮軍又進冦蘭州及渭州之渭源縣掠羣牧而去詔訥白衣攝左羽林将軍為隴右防禦使與太僕少卿王晙等率兵邀擊之十月訥領衆至渭源縣遇賊戰於武階驛與王晙犄角夾攻之大破賊衆追奔至洮水又戰于長城堡豐安軍使王海賔先鋒力戰死之将士乘勢進擊又破之殺獲數萬人擒其将六指鄉彌洪盡収其所掠羊馬并獲其器械不可勝數時有詔将以十二月親征吐蕃及聞訥等尅㨗帝悦遂停親征拜訥左羽林大将軍復封平陽郡公仍拜子暢朝散大夫俄又充涼州鎮軍大摠管復為朔方軍大總管王思禮天寳末為哥舒翰元帥馬軍都将及潼闗失守思禮西赴行在帝至安化郡思禮與吕崇賁李承光竝引於纛下責以不能堅守竝從軍令或救之可収其後效遂斬李承光而釋思禮後從郭子儀領廻紇之衆収西京嘗為先鋒以功遷兵部尚書封霍國公食實封三百戸郭子儀肅宗至德中為關内河東副元帥從元帥廣平王討安慶緒于闗東慶緒遣偽将嚴荘悉其衆十萬來赴陜州與張通儒同抗官軍賊聞官軍至悉其衆屯於陜西負山為陣子儀以大軍擊其前廻紇登山乘其背遇賊潜師於山中與鬭過期大軍稍却賊分兵三千人絶我歸路衆心大揺子儀麾廻紇令進盡殺之師馳至其後於黄埃中發十餘箭賊驚顧曰廻紇來即時大散僵屍徧山澤嚴荘張通儒走歸雒陽遂與安慶緒渡河保相州郭子儀奉廣平王入東都晉安元信初仕後唐為武皇太原騎将唐光啓末燕帥李威與吐渾酋長赫連鐸入寇大同武皇遣元信拒之以衆寡不侔為流矢所中兵敗居庸闗懼武皇法峻南奔中山中山連帥主帥王處存喜而納之用為突騎都校奏授檢校工部尚書乾寧末處存卒子郜嗣為梁人所攻歸太原與元信偕行武皇待之如舊授元信鐵林軍使俄以梁将氏叔琮引兵五萬薄我城下郡縣多陷梁又遣葛從周出軍馬嶺武皇遣元信以精騎擊而退之以功奏加檢校尚書左僕射册府元龜卷四百三十二
