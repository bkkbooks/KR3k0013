body:
  text: 册府元龜卷七百五十二宋王欽若等撰總錄部孝第二晉王祥字休徵性至孝早喪親繼母朱氏不慈數譖之由是失愛於父母每使掃除牛下祥愈謹父母有疾衣不解帶湯藥必親嘗有丹柰結實母命守之每風雨祥輙抱樹而泣其篤孝純至如此漢末遭亂扶母攜弟覽避地廬江隱居三十餘年不應州郡之命母終居喪毁瘁杖而後起位至太保曹志為􅄆騎常侍遭母憂居喪盡哀因得疾病喜怒失常李喜初辟太傅屬因辭疾郡縣扶輿上道時喜母病篤乃竊踰泫氏城而徒還遂遭母喪論者嘉其節操李宻字令伯犍為武陽人一名䖍父早亡母何氏改醮密時年數嵗感戀彌至烝烝之性遂以成疾祖母劉氏躬自撫養密奉事以孝謹聞劉氏有疾則涕泣側息未嘗解衣飲食湯藥必先嘗後進泰始初詔徴為太子洗馬密以祖母年髙無人奉養遂不應命乃上疏曰臣以險釁夙遭閔凶生孩六月慈父見背行年四嵗舅奪母志祖母劉愍臣孤弱躬親撫養臣少多疾病九嵗不行零丁辛苦至于成立既無伯叔終鮮兄弟門衰祚薄晚有兒息外無朞功強近之親内無應門五尺之童㷀㷀孑立形影相弔而劉早嬰疾病常在牀蓐臣侍湯藥未嘗廢離自奉聖朝沐浴清化前太守臣逵察臣孝㢘後刺史臣榮舉臣秀才臣以供養無主辭不赴命明詔特下拜臣郎中尋䝉國恩除臣洗馬猥以微賤當侍東宫非臣隕首所能上報臣具以表聞辭不就職詔書切峻責臣逋慢郡縣逼迫催臣上道州司臨門急於星火臣欲奉詔奔馳則劉病日篤茍狥私情則告訴不許臣之進退實為狼狽伏惟聖朝以孝治天下凡在故老猶䝉矜恤況臣孤苦尫羸之極且臣少仕偽朝歴職郎署本圖宦逹不矜名節今臣亡國賤俘至微至陋猥䝉拔擢寵命殊私豈敢盤桓有所希冀但以劉日薄西山氣息奄奄人命危淺朝不慮夕臣無祖母無以至今日祖母無臣無以終餘年母孫二人更相為命是以私情區區不敢棄逺臣密今年四十有四祖母劉今年九十有六是臣盡節於陛下之日長而報養劉之日短也烏鳥私情願乞終養臣之辛苦非但蜀之人士及二州牧伯之所明知皇天后土實所鑒見伏願陛下矜愍愚誠聽臣微志庶劉僥倖保卒餘年臣生當隕身死當結草帝覽之曰士之有名不虚然哉乃停召位至漢中太守荀顗為司空年踰耳順孝養烝烝以母憂去職毁幾滅性海内稱之何曽有清徳傅𤣥著論稱曽及荀顗曰以文王之道事其親者其潁昌何侯乎其荀侯乎古稱曽閔今曰荀何内盡其心以事其親外崇禮讓以接天下孝子百世之宗仁人天下之命有能行孝之道君子之儀表也詩曰髙山仰止景行行止令徳不遵二夫子之景行者非樂中正之道也又曰荀何君子之宗也又曰潁昌侯之事親其盡孝子之道乎存盡其和事盡其敬亡盡其哀予於潁昌侯見之矣又曰見其親六十而孺慕予於潁昌侯見之矣位至太傅李宣伯遼東襄平人祖敏漢河内太守去官還鄊里遼東太守公孫度欲強用之敏乗輕舟浮滄海莫知所從宣伯父信追求積年浮海出塞無所見欲行喪制服則疑父尚存情若居䘮而不婚娶後有隣居故人與其父同年者亡因行喪服制燕國徐邈與之州里以大孝莫大於無後勸使娶妻既生宣伯遂絶房室常如居喪禮不堪其憂數年而卒宣伯既㓜孤母有改行有識之後降食哀戚亦以喪禮自居又以祖不知存亡設木主以事之由是以孝聞一云敏生宣伯而遣妻宣伯不識生母及有識蔬食哀戚亦如三年之喪也郄詵為議郎母憂去職詵母病苦無車及亡不欲車載柩家貧無以市馬乃於所住堂北壁外假葬開户朝夕拜哭養雞種蒜竭其力術喪過三年有馬八匹輿棺至冢負土成墳傅咸自尚書左丞出為冀州刺史繼母杜氏不肯隨咸之官自表解職羊祜年十二喪父孝思過禮事叔父耽甚謹遭母憂長兄發又卒毁慕寢頓十餘年位至征南大将軍霍原字休明燕國廣陽人也少有志力叔父坐法當死原入獄訟之楚毒備加終免叔父許孜東陽吴寧人二親没哀毁骨立杖而能起建墓於縣之東山躬自負土不受鄉人之助或愍孜羸憊苦求来助孜晝則不逆夜便除之孜以方營大功乃棄其妻獨宿墓所列植松柏亘五六里積二十餘年孜乃更娶妻立宅墓次烝烝朝夕奉亡如存餘具孝感門子玉亦有孝行圖孜像於堂朝夕拜焉庾衮字叔褒父亡作筥賣以養母母見其勤曰我無所食對曰母食不甘衮將何居母感而安之州郡禮辟令具供養不起父母終後廬於墓側或有斬其墓栢莫知其誰乃召隣人集於墓而自責焉因叩頭涕泣謝祖禰曰徳之不修不能庇先人之樹衮之罪也父老咸為之垂泣自後人莫之犯初衮父誡衮以酒每醉輙自責曰余廢先父之誡其何以訓人乃於父墓前自杖三十鄰人徳逸者善事其親老而不倦衮每拜之孫晷富春人以孝行聞父母嘗饌雖諸兄親饋而晷不離左右富春車道既少動經江川父難於風波每行乗籃輿晷躬自扶持所詣之處則於門外樹下藩屏之間隱息以待不令主人知之王戎字濬沖為吏部尚書以母憂去職性至孝不拘禮制飲酒食肉或觀奕棊而容貌毁悴杖然後起裴頠往弔之謂人曰若使一慟果能傷人濬沖不免滅性之譏也時和嶠亦居父喪以禮法自持量米而食哀毁不踰於戎武帝謂劉毅曰和嶠毁頓過禮使人憂之毅曰嶠雖寢苫食粥乃生孝耳至於王戎所謂死孝陛下當先憂之戎先有吐疾居䘮增甚帝遣醫療之并賜藥物又斷賔客王接字祖游㓜喪父哀毁過禮鄊親皆歎曰王氏有子哉母終柴毁骨立居墓次積年位征虜將軍司馬傅宣字世引年六歳喪繼母哭泣如成人中表異之閻纘字緒伯博覽墳典父卒繼母不慈纘恭事彌謹而母疾之愈甚乃誣纘盜父時金寳訟于有司遂被清議十餘年纘無怨色孝謹不怠母後意解更移中正乃得復品為太傅楊駿舍人王況字處道少孤養於從叔司空昶事昶如父奉繼母寡嫂以孝義稱位尚書令喬智明字元逹鮮卑前部人少喪二親哀毁過禮位折衝將軍盛彦廣陵人也母王氏因疾失明彦每言及未嘗不流涕仕本邑小中正鄭黙拜大鴻臚遭母喪舊制既葬還職黙自陳懇至久而見許遂改法定令聽大臣終喪自黙始山濤為侍中遷尚書以母老辭職詔曰君雖乃心在於色養然職有上下旦夕不廢醫藥且當割情以隆在公濤心求退表疏數十上久乃見聽除議郎韋忠平陽人也年十二喪父哀慕毁悴杖而後起司空裴秀弔之匍匐號訴哀慟感人秀出而告人曰此子長大必為佳器歸而命子頠造焉服闋遂廬於墓所頠慕而造之皆託行不見王堪遭父喪居於墓次位汝南内史荀崧遷侍中中䕶軍王彌入雒崧與百官奔於密未至而母亡賊追將及同旅散走崧被髪從車守䘮號泣賊至棄其母屍于地奪車而去崧被四創氣絶至夜方蘇葬母密山潘尼少有清才初應州辟後以父老歸供養居家十餘年父終晚乃出仕位太常卿嵇紹字延祖中散大夫康之子十嵗而孤以父得罪靖居私門事母至孝和色柔聲常若不足謹身節儉朝夕孜孜親執刀俎非無使役以他人不如己之誠至也位至侍中王延字延元西河人也九嵗喪母泣血三年幾至滅性每至忌日則悲啼三旬後母卜氏遇之無道常以蒲穰及敗麻頭與延貯衣其姑聞之而問之延知而不言事母彌謹夏則扇枕冬則以身溫之盛寒體無全衣而親極滋味劉殷七嵗喪父服喪三年未曾見齒事曾祖母王氏以孝聞郡命主簿州辟從事皆以供養無主辭不赴命司空齊王攸辟為掾征南將軍羊祜召參軍事皆以疾辭及王氏卒殷夫婦毁瘠幾至滅性桑虞魏郡黎陽人年十四䘮父毁瘠過禮日以米百粒用糝藜藿其姊諭之曰汝毁瘠如此必至滅性滅性不孝宜自抑割虞曰藜藿雜米足以勝哀虞諸兄仕於石勒之世咸登顯位惟虞耻臣非類隂欲避地海東㑹丁母憂遂止哀毁骨立廬于墓側五年范粲為武威太守以母老罷官郡既接近冦戎粲以重鎮輙去職朝廷尤之左遷樂涫令王裒字偉元城陽營陵人也父儀髙亮雅直為文帝司馬東關之役帝問于衆曰近日之事誰任其咎儀對曰責在元帥帝怒曰司馬欲委罪於孤邪遂引出斬之裒痛父非命未嘗西向而坐示不臣朝廷也於是隱居教授三徵七辟皆不就母性畏雷母没每雷輙到墓曰裒在此及讀詩至哀哀父母生我劬勞未嘗不三復流涕門人受業者並廢蓼莪之篇及雒京傾覆寇盜蜂起親族悉欲移渡江東裒戀墓壟不去賊大盛方行猶思慕不能進遂為賊所害王長文廣漢人州府辟命皆不就後成都王穎引為江原令或問曰前不降志今何為屈長文曰祿以養親非為身也庾闡少隨舅孫氏過江母隨兄肇為樂安長史在項城永嘉末為石勒所䧟闡母亦没闡不櫛沐不婚冠絶酒肉垂二十年郷親稱之州舉秀才元帝為晉王辟之皆不行位吴國内史王允之為建武將軍錢塘令以父舒卒去職既葬除義興太守以憂哀不拜從伯導與其書曰太保安豐侯以孝聞天下不得辭司𨽻和長輿嶠字海内名士不免作中書令吾羣從死亡畧盡子弟零落遇汝如親如其不爾吾復何言允之固不肯就陶侃為荆州刺史時武昌號為多士殷浩庾翼等皆為作史侃每飲酒有定限當歡有餘而限已竭浩等勸更少進侃悽懷良久曰年少曾有酒失亡親見約故不敢踰何琦年十四喪父哀毁過禮性沈敏有識度好古博學居于宣城陽榖縣事母孜孜朝夕色養嘗患甘鮮不贍乃為郡主簿察孝㢘除郎中以選補宣城縣涇縣令司徒王導引為參軍不就及丁母憂居喪泣血杖而後起卞壼為明帝東中郎長史遭繼母憂既葬起復舊職累辭不受元帝遣中使敦逼壼牋自陳曰壼天性狷狹不能和俗退以情事欲畢志家門亡父徃為中書令時壼蒙大例望門見辟信其所執得不祗就門户遇禍迸竄易名得存視息私志有素加嬰極難流寄蘭陵為茍晞所召恐見逼迫依下邳裴盾又見假授思暫之郡兾得託身尋䝉見召為從事中郎豈曰貪榮直欲自致冀暫恭命行當乞退屬華軼之難不敢自陳軼既梟縣壼亦嬰病具自歸聞未䝉恕遣世子北征選寵顯望復以無施忝充元佐榮則榮矣實非素懐顧以命重人輕不敢辭憚聞西䑓召壼為尚書郎實欲因此以避賢路未及陳誠奄丁窮罰壼年九嵗為先母所見孤背十二䝉亡母張所見覆育壼以陋賤不能榮親家業屢空養道多闕存無歡娱終不備禮拊心永恨五内抽割於公私無效如彼私情艱苦如此實無情顔昧冐榮進若廢壼一人江北便有傾危之慮壼居事之日功績隆著誠不得私其身今東中郎岐嶷自然神明日茂軍司馬諸叅佐並以明徳宣力王事壼之去留曾無損益賀循謝端顧景丁琛傳晞等皆荷恩命髙枕家門壼委質二府漸冉五載考效則不能已彰論心則頻累恭順奈何哀孤之日不見愍恕哉帝以其辭苦不奪其志壼後征蘇峻苦戰死之二子眕盱見父没相隨赴賊見害壼贈侍中驃騎將軍開府儀同三司諡曰忠貞祠以太牢贈其子眕散騎侍郎眕弟盱奉車都尉眕母裴氏撫二子屍哭曰父為忠臣汝為孝子夫何恨哉徵士翟湯聞之歎曰父死于君子死于父忠孝之道萃于一門吳猛豫章人也少有孝行夏日嘗手不驅蚊懼其去已而噬親何充為東陽太守以墓被發去郡臣欽若等曰以墓謂其親之墓詔徵侍中不拜改葬畢除建威將軍丹陽令劉超為射聲校尉咸和初遭母憂去官衰服不離身朝夕號泣朔望輙歩至墓所哀感路人鄧攸七嵗喪父尋喪母及祖母居喪九年以孝致稱少孤與弟同居初祖父殷有賜官勑攸受之後太守勸攸去正官欲舉為孝㢘攸曰先人所賜不可改也位右僕射吴隱之字處黙遭母喪哀毁過禮嘗食鹹菹以其味㫖掇而棄之位金紫光禄大夫應詹字思逺魏侍中璩之孫詹㓜孤為祖父所養年十餘嵗祖母又終居喪毁頓杖而後起遂以孝聞位平南將軍祖約性至孝少孤貧常自炊㸑以養母位光祿大夫顧衆字長始驃騎將軍榮之族弟父祕交州刺史衆出後伯父早喪終事伯母以孝聞位尚書僕射范汪父早卒少孤貧年十三喪母居喪盡禮親鄰哀之位安北將軍陸􅁮字士光居喪以孝聞同郡顧榮與鄉人書曰士光氣息裁屬慮其性命言之傷心矣位衛將軍孔掄年十三而孤養祖母以孝聞位㑹稽内史徐邈遭父憂邈先患疾因哀毁増篤不踰年而卒州里傷悼識者悲之位驍騎將軍張翰性至孝遭母憂哀毁過禮為齊王大司馬東曹掾郗愔字方回性至孝居父母憂殆將滅性位司空謝沉字行思少孤事母至孝㑹稽内史何充引為叅軍以母老去職平西將軍庾亮命為功曹征北將軍蔡謨版為叅軍皆不就閒居養母不交人事顧和為國子祭酒母憂去職居喪以孝聞既練衛將軍褚裒上疏薦和起為尚書令遣散郎喻㫖和每見催逼輙號跳慟絶謂所親曰古人或有釋其憂服以祗王命葢以才足幹時故不得不體國狥義吾在常日猶不屈人況今中心荒亂將何以補於萬分祗足以示輕忘孝道貽素冠之議耳康帝又下詔曰百揆務殷端在總要而曠職經久甚以悒然昔先朝政道休明中夏隆盛山賈諸公皆釋服從時不獲遂其情禮況今日艱難百王之弊尚書令禮已過祥練豈得聽不赴急疾而遂罔極之情乎和表䟽十餘上遂不起服闋然後視職髙悝少孤事母以孝聞年十三值嵗饑悝菜蔬不饜每致甘肥於母悝後為丹陽尹封建昌侯以納妾致訟被黜及終子崧乃自繋廷尉訟寃遂停喪五年不葬表䟽數十上穆帝哀之乃下詔曰悝備為大臣違憲被黜事已久判其子崧求直無已今特聽傳侯爵由是見稱王䝉事諸母甚謹俸祿資産常推厚居薄位司徒左長史范宣陳留人也家至貧儉躬耕供養親没負土成墳廬于墓側汜毓濟盧人也少履髙操安貧有志業父終居于墓所三十餘載至晦朔躬掃墳壠循行封樹還家則不出門庭桓彞子雲為義城太守遭母憂去職葬畢起為江州刺史稱疾廬于墓次詔書敦逼固辭不行服闋然後莅職殷仲堪父病積年仲堪衣不解帶躬親學醫術究其精妙執藥揮涙遂眇一目父喪服闋孝武帝召為太子中庶子甚相親愛仲堪父嘗患耳聰聞牀下蟻動謂之牛鬭帝素聞之而不知其人至是從容問仲堪曰患此者為誰仲堪流涕而起曰臣進退惟谷帝有愧焉位荆州刺史桓𤣥襲父溫爵南郡公年七嵗温服終府州文武辭其叔父沖撫𤣥頭曰此汝家之故吏也𤣥因涕淚覆靣衆並異之孟陋武昌人也少孤喪母毁瘠殆于滅性不飲酒食肉十有餘年親族迭勸之曰聖人制禮令賢者俯就不肖者企及若使毁性無嗣更為不孝也陋感此言然後從吉由是名著海内王華父廞王恭舉兵假廞建武將軍令起軍助為聲援及恭罷兵廞怒廻衆討恭戰敗奔走遂不知所在華以不知廞存亡憂毁布衣蔬食後從兄謐言其死所華始發喪入仕至宋時貴顯一以情事異人未嘗預宴集終不飲酒有讌不之詣若宜論事者乗車造門主人出車就之位䕶軍劉敬宣父牢之鎮西將軍敬宣八嵗喪母輔國將軍桓序鎮蕪湖牢之叅序軍事四月八日敬宣見衆人灌佛乃下頭上金鏡以為母灌因悲泣不自勝序歎息謂牢之曰卿此兒既為家之孝子必為國之忠臣位冀州刺史前燕李績字伯陽范陽人父産仕石氏為本郡太守績以風節知名清辨有辭理弱冠為郡功曹時石季龍親征段遼師以范陽百姓饑儉軍供有闕季龍大怒太守惶怖避匿績進曰郡帶北裔與冦接壌疆塲之間人懷危慮聞輿駕親戎將除殘賊雖嬰兒白首咸思效命非惟為國亦自求寧雖身膏草野猶甘為之敢有私吝而闕軍實但以年災嵗儉家有菜色困弊力屈無所取濟違廢之罪情在可矜季龍見績年少有壯節喜而恕之於是獲免宋孔季恭仕晉為司徒左西掾未拜遭母憂安帝隆安五年於喪中被起建威將軍山隂令不就謝方明有志行晉末孫恩之亂父沖伯父邈皆遇害於時荒亂之後吉凶禮廢方明合門遇禍資産無遺而營舉凶功盡其力用數月之間葬送並畢雖平世備禮無以加焉位㑹稽太守潘綜吴興烏程人孫恩之亂妖黨攻破村邑綜與父驃共走避賊驃年老行遲賊轉逼近驃語綜我不能去汝走可脱幸勿俱死驃困乏坐地綜迎賊叩頭曰父年老乞賜生命賊至驃亦請曰兒年少自能走今為老子不走去老子不惜死乞活此兒賊因斫驃綜抱父於腹下賊斫綜頭靣凡四創綜當時悶絶有一賊從傍来相謂曰卿欲舉大事此兒以死救父云何可殺殺孝子不祥賊良久乃止父子並得免後為遂昌長臧燾以母老家貧與弟熹俱棄人事躬耕自業約已養親者十餘載父母喪亡居喪六年以毁瘠著稱燾位光祿大夫胡藩少孤居䘮以孝稱太守韓伯見謂藩叔尚書少廣曰卿此姪當以義烈成名位太子左衛率蔡廓遭母憂性至孝三年不櫛沐殆不勝喪位禮部尚書孟懷玉為江州刺史丁父艱有孝性因抱篤疾上表陳解不許又自陳弟仙客出繼喪主唯己乃見聽張敷吴興太守邵之子生而母没年數嵗問母所在家人告以死生之分敷雖童䝉便有思慕之色年十許嵗求母遺物而散施已盡唯得一畵扇乃緘錄之每至感思輙開笥流涕見從母常悲感哽噎為司徒左長史未拜父在吴興亡報以疾篤敷往奔省自發都至吴興成服凡十餘日始進水漿葬畢不進鹽菜遂毁瘠成疾世父茂度每止譬之輙更感慟絶而復蘇茂度曰我兾譬汝有益但更甚耳自是不復往未朞而卒瑯琊顔延之書弔茂度曰賢弟子少履貞規長懷理要清風素氣得之天然言面以來便申忘年之好比雖艱隔成阻而情問無暌薄暮之人冀其方見慰悦豈謂中年奄為長往聞問悼心有兼怛痛足下門教敦至兼實家寳一旦䘮失何可為懷其見重如此羊崇廣州刺史希子希遇亂被害時崇丁母憂毁瘠過禮及聞廣州亂即日便徒跣出新亭不能歩渉頓伏江渚門義以小船致之于是進路父葬畢不勝哀沈曇慶遭母憂哀毁致稱本縣令諸葛闡之公解言上位祠部尚書周績之字道祖鴈門廣武人年八嵗喪母哀戚過於成人奉兄如事父宗炳字少文南陽徑陽人父由之湘鄉令卒炳居䘮過禮為鄉閭所稱謝㬭字宣鏡㓜有殊行年數嵗所生母郭氏久嬰痼疾晨昏溫清嘗藥奉膳不闕一時動心戚顔未嘗蹔改恐僕役營疾懈怠躬自執勞母病畏驚一家尊卑感㬭至性咸納履而行屏氣而語如此者十餘年位黄門侍郎謝瞻㓜孤叔母劉撫養有恩紀兄弟事之同於至親劉弟柳為吴郡將姊俱行曕不能違解職隨從為柳建威長史賈思㑹稽諸暨人少有志行母亡未葬為鄰火所逼思及妻栢氏號哭奔救鄰近赴助棺櫬得免思及栢俱見燒死劉瑜歴陽人七嵗喪父事母至孝年五十三喪母三年不進鹽酪號泣晝夜不絶聲勤身運力以營葬事服除後二十餘年布衣蔬食言輙流涕常居墓側未嘗暫違戴顒譙郡銍人也父逵兄勃並隱遯有髙名顒年十六遭父憂幾於滅性因此常抱羸患顒勃並受琴於父父卒所傳之聲不忍復奏各造新弄勃造五部顒又制長弄一部並傳於世郭世道㑹稽永興人生而失母父更娶世道事父及後母孝道淳備年十四又喪父居喪過禮殆不勝喪家貧無産業傭力以養繼母婦生一男夫妻共議曰勤身供養力猶不足若養此兒所費者大乃垂泣瘞之母亡負土成墳親戚或共賻助微有所受葬畢傭賃倍還先直服除後哀戚思慕終身如喪者以為追逺之思無時去心故未嘗釋衣㡊仁厚之風行於鄉黨鄰村大小莫有呼其名者孫法宗一名宗之吴興人父隨孫恩入海被害屍骸不收母兄並餓死法宗年小流迸至十六方得逺歸單身勤苦霜行草宿營辦棺椁造立母兄冢墓儉而有禮以父屍不測入海尋求聞世間論是至親以血瀝骨當悉凝侵乃操刀沿海見枯骨則刻肉灌血如此十餘年臂脛無完皮血脉枯竭終不能逄遂衰絰終身常居墓所山禽野獸皆悉馴附每麕鹿觸網必解放之償以錢物後忽苦頭創夜有女人至曰我是天使来相謝行創本不關善人使者逺相及取牛糞煑傅之即驗一傅便差一境賴之終身不娶饋無所受孝武初揚州辟為文學從事不就卒余齊民晉陵人少有孝行為邑書吏父殖大明二年在家病亡家人以父病報之信未至齊民謂人曰比者肉痛心煩有若割截居常惶駭必有異故信尋至便歸至門方知父死號踊慟絶良久乃蘇問母父所遺言母曰汝父臨終恨不見汝曰相見何難於是號叫殯所須㬰便絶何子平陳郡陽夏人世居㑹稽少有志行見稱於鄊曲事母至孝揚州辟從事史月俸得白米輙貨市粟麥人或問曰所利無幾何足為煩子平曰尊老在東不辨常得生米何心獨饗白粲每有贈鮮肴者若不可寄致至家則不肯受母本側庶籍注失實實未及養而籍年已滿便去職歸家時鎮軍將軍顧顗之為州上綱謂曰尊上年實未八十親故所知州中差有微祿當啟相留子平曰公家正取信黄籍年既至便應扶持私庭何容以實年未滿茍冐榮利且歸養之願又切微情顗之又勸令以母老求縣子平曰實未及養何假以希祿顗之益重之既歸家竭身運力以給供養後為海虞令母喪去職哀毁踰禮每至哭踊頓絶而方蘇值大明末東土飢荒繼以師旅八年不得營葬晝夜號絶擗踊不闋俄頃叫慕之音常如袒括之日冬不衣絮暑不就清凉日以數合米為粥不進鹽菜所居屋敗不蔽風雨兄子伯興採伐茅竹欲為葺治子平不肯曰我情事未申天地一罪人耳屋何宜覆蔡興宗為㑹稽太守甚加旌賞明帝泰始六年為營冢槨十年居䘮毁甚困瘠踰久及至免喪支體殆不相屬袁彖顗弟子也顗在雍州起事見誅明帝投顗屍江中不聽歛葬彖與舊奴一人微服濳行求屍四十餘日乃得密瘞石頭後崗身自負土懷其父集未嘗離身後廢帝即位乃得改葬顗從叔司徒粲舅征西將軍蔡興宗並器之沈演之為司徒主簿丁母憂起為武康令固辭不允到縣百許日稱疾去官沈冲父懷文為晉安王征虜長史廣陵太守得罪被繋沖兄弟行謝情哀貌苦見者傷之柳元景欲救懷文言於明帝曰沈懐文三子塗炭不可見願陛下速正其罪帝竟殺之元景為之歎息沖兄弟以此知名吴逵吴興烏程人經荒饑饉係以疾疫父母兄弟嫂及羣從小功之親男女死者十三人逵時病困隣里以葦蓆褁之埋於村側既而逵疾得瘳親屬皆盡唯逵夫婦獲全家徒壁立冬無被袴晝則傭賃夜則伐木燒塼無有懈倦逵夜行遇虎虎輙下道避之朞年中成七墓葬十三棺隣里嘉其志義葬日悉出赴助送終之事亦儉而周禮逵時逆取隣人夫直葬畢衆悉以施之逵一無所受皆傭力報答焉許昭先義興人也叔父肇之坐事繋獄七年不判子姪二十許人昭先家最貧薄専獨料訴無日在家餉饋肇之莫非珍新家産即盡賣宅以充之肇之諸子倦怠昭先無有懈息如是七載尚書沈演之嘉其操行肇之事由此得釋昭先父母皆病家無僮役竭力致養甘㫖必從宗黨嘉其孝行朱百年㑹稽山隂人少有節操隱迹避人唯與同郡范顗善亦嗜酒相得百年家素貧母以冬月亡衣並無絮自此不衣綿帛嘗寒時就顗宿衣悉夾布飲酒眠顗以卧具覆之百年引去謂顗曰綿定竒溫因流涕悲慟顗亦為之感動阮長之年十五喪父有孝性哀感傍人服除蔬食者猶積載閒居篤學未嘗有惰容位臨海太守郭原平字長泰㑹稽永興人世道之子又禀至行養親必己力性閑木功傭貨以給供養性謙虚每為人作匠取散夫價主人設食原平自以家貧父母不辨有肴味唯飡鹽飯而已若家或無食則虚中竟日義不獨飽要須日暮作畢受直歸家於里中買糴然後舉㸑父抱篤疾彌年原平衣不解帶口不嘗鹽菜者跨積寒暑又未嘗睡卧父亡哭踊慟絶數日方蘇以為奉終之義情理所畢營冢凶功不欲假人本雖智巧而不解作墓乃訪邑中有營墓者助人運力經時展勤工乃閑練又自賣工夫以供衆費窀穸之事儉而當禮性無術學因心自然葬畢詣所買主執役無懈與諸奴分務每譲逸取勞主人不忍使每遣之原平服勤未曾暫替所餘私夫傭賃養母有餘聚以自贖本性智巧既學構冢尤善其事毎至吉嵗求者盈門原平所赴必自貧始既取賤價又以夫直助之父喪既終自起兩間小屋以為祠堂每至節歳蒸嘗於此數日中哀思絶飲粥父服除後不復食魚肉於母前亦有所噉在私室未曾妄嘗自此迄終三十餘載髙陽許瑶之居在永興罷建安郡丞還家以綿一斤遺原平原平不受送而復反者前後數十瑶之乃自往曰今嵗過寒而建安綿好以此奉尊上下耳原平乃拜而受之母終毁瘠彌甚僅乃免喪墓前有數十畝田不屬原平每至農月耕者常裸袒原平不欲使人慢其墳墓乃販質家資貴買此田三農之月輙束帶垂泣躬自耕墾沈林子年十三遇家禍時雖逃竄而哀號晝夜不絶聲王母謂之曰汝當忍死強親何為空自殄滅林子曰家門酷横無復假日之心直以至讐未復故且茍存耳一門既䧟妖黨兄弟並應從誅逃伏草澤唯慮及禍而沈預家甚強富志相䧟滅林子與兄晝藏夜出即於所居宅營墓葬父祖諸叔兄六喪儉而有禮位西中郎兵叅軍虞悰字景豫少而謹正有至性父秀之亡悰東出奔水漿不入口位正員常侍雙泰真隨郡人有幹力荆州刺史沈攸之反召不肯来後泰真至江陵有以告攸之者因留補隊副厚加料理泰真無停志少日叛走攸之遣二十人被甲追之逐討甚急泰真殺數人餘者不敢近欲過家將母去事迫不獲單身走入蠻追者既失之畧其母而去泰真既失母乃出自歸攸之不罪曰此孝子也賜錢一萬轉補隊主徐文伯事母孝謹母終毁瘠幾至自滅俄而兄亡扶杖臨喪撫膺一慟遂以哀卒位都陽正常侍秦綿河南人遭母憂送葬不忍復還鄉人為作茅菴仍止其中若遇有米則食粥無米食菜而已哀號之聲行者為之澘淚服訖猶不還家遇疾不療卒臨亡告人曰若死者無知固不宜獨存有知則大獲吾志袁粲初忤於孝武其母候乗輿出負塼叩頭流血塼碎傷一目自此後粲與人語有誤道眇目者輙涕泣彌日後丁母憂葬竟攝令親職加衛將軍不受敦逼備至中使相望粲終不受性至孝居喪毁甚祖日及祥變常發詔衛軍斷客二年桂陽王平珍授中書監即本號開府儀同三司領司徒以揚州廨為府固不肯移三年徙尚書令衛軍開府如故並固辭服終乃受册府元龜卷七百五十二
