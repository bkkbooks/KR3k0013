body:
  text: 册府元龜卷一百八十六宋王欽若等撰閏位部勲業第四陳高祖武帝少俶儻有大志不冶生産既長讀兵書多武藝明達果斷爲當時所推服梁大同初新喻侯蕭映爲廣州刺史以帝爲中直兵叅軍隨府之鎮映令帝招集士馬衆至千人仍命帝監宋隆郡安化二縣不賓帝討平之尋監西江督䕶高要郡守先是武林侯蕭諮為交州刺史以掊克失衆心土人李賁連結數州豪傑同時反臺遣髙州刺史孫冏新州刺史盧子雄將兵擊之冏等不時進皆於廣州伏誅子雄弟子畧與冏子姪及其主帥杜天合杜僧明共舉兵執南江督䕶沈顗進㓂廣州晝夜苦攻州中震恐帝率精兵三千捲甲兼行以救之頻戰屢㨗天合中流矢死賊衆大潰僧明降梁武帝深歎異焉授直閤將軍封新安食邑三百戸仍遣畫工圖帝容貌而觀之其年冬蕭映卒帝送䘮還都至大庾嶺㑹有詔以帝為交州司馬領武平太守與刺史楊㬓南討帝益招勇敢器械精利㬓喜曰能克賊者必陳司武也委以經畧帝與衆軍發自番禺是時蕭勃為定州刺史於西江相㑹勃知軍士憚役隂購誘之因詭説㬓㬓集諸將問計於帝對曰交阯叛渙罪繇宗室遂使僣亂數州彌歴年稔定州復欲昧利目前不顧大計節下奉辭伐罪故當生死以之豈可畏憚宗室輕於國憲今若奪人沮衆何必交州討賊問罪之師卽廻有所指矣於是勒兵鼓行而進十一年六月軍至交州賁衆數萬於蘇歴江口立城栅以拒官軍㬓推帝為前鋒所向摧陷賁於屈獠界立砦大造船艦充塞湖中衆軍憚之頓湖口不敢進帝謂諸將曰我師已老將士疲勞歴歲相持恐非良計且孤軍無援入人心腹若一戰不㨗豈望生全今藉其屢奔人情未固夷獠烏合易為摧殄正當共出百死決力取之無故停留時事去矣諸將皆黙然莫有應者是夜江水暴起七丈注湖中奔流迅激帝勒所部兵乗流先進衆軍鼓噪俱前賊衆大潰賁竄入屈獠洞中屈獠斬賁傳首京師是歲太清元年也賁兄天寶遁入九真刼帥李紹隆收餘兵二萬殺德州刺史陳文戒進圍愛州帝率衆討平之除振逺將軍西江督䕶髙要太守督七郡諸軍事二年冬侯景冦京師帝將帥兵赴援廣州刺史元景仲隂有異志將圖帝帝知其計與成州刺史王懐明行臺選郎殷外臣等密議戒嚴三年七月集兵於南海馳檄以討景仲景仲窮蹙縊于閣下帝迎蕭勃鎮廣州是時臨賀内史歐陽頠監衡州蘭裕蘭京禮扇誘始興十郡共舉兵攻頠頠請援於勃勃令帝率衆救之悉擒裕等仍監始興郡十一月帝遣杜僧明胡穎將二千人頓于嶺上并厚結始興豪傑同謀義舉侯安都張偲等率千餘人來附蕭勃聞之遣鍾休悦説帝曰侯景驍雄天下無敵前者援軍十萬士馬精强然而莫敢當鋒遂令羯賊得志君以區區之衆欲何所之如聞嶺北王侯又皆鼎沸河東桂陽相次屠戮邵陵開建親尋干戈李遷仕託身當陽便奪馬仗以君疎外何自暗投若且住始興遙張聲勢保此㤗山自求多福帝泣謂休悦曰僕本庸虛蒙國成造往聞侯景渡江即欲赴援遭值元蘭梗我中道今京都覆没主上蒙塵君辱臣死誰敢愛命君侯體則皇枝任重方嶽不能摧鋒萬里雪此寃痛見遣一軍猶賢乎已若降後㫖使人慨然僕行計決矣憑為披述乃遣間道往江陵稟承軍期節度時蔡路養起兵據南康勃遣腹心譚世逺為曲江令與路養相結同遏義軍大寶元年正月帝發自始興次大庾路養出軍頓南野依山水立四城以拒帝帝與戰大破之路養脱身竄走帝進頓南康湘東王承制授帝員外散騎常侍持節明威將軍交州刺史改封南野縣伯六月帝修嶂頭古城徙居焉髙州刺史李遷仕據大臯遣主帥平虜率千人入灨石魚梁命周文育將兵擊走遷仕奔寧都承制授帝通直散騎常侍使持節信威將軍豫州刺史豫章内史改封長城縣侯尋授散騎常侍持節都督六郡諸軍事軍師將軍南江州刺史餘如故時寧都人劉藹等資遷仕舟艦兵仗將襲南康帝遣杜僧明等率二萬人據白口築城以禦之遷仕亦立城以相對二年三月僧明等攻㧞其城生擒遷仕送南康帝斬之承制命帝進兵定江州仍授江州刺史餘如故六月帝發自南康是時承制遣東將軍王僧辯督衆軍討侯景八月僧辯軍次湓城帝率杜僧明等衆軍及南川豪帥合三萬人將會焉時西軍乏食帝先貯軍糧五十萬石至是分三十萬以資之仍頓巴丘會侯景廢簡文帝立豫章嗣王棟帝遣兼長史沈衮奉表于江陵勸進十一月承制授帝使持節都督會稽東陽新安臨海永嘉五郡諸軍事平東將軍揚州刺史領會稽太守豫章内史餘如故三年正月帝率甲士三萬人强弩五千張舟艦三千乗發自豫章二月次桑落州遣中記室叅軍江元禮以事表江陵承制加帝鼓吹一部是時僧辯已發湓城會帝于白茅灣乃登岸結壇刑牲約盟進軍次蕪湖侯景城主張黑棄城走帝與諸軍進克姑熟仍次蔡州侯景以􅀈䑰貯石沉塞淮口緣淮作城自石頭迄青溪十餘里中樓雉相接諸將未有所決僧辯遣杜崱問計于帝帝曰前柳仲禮數十萬兵隔水而坐韋之在青溪竟不渡岸賊乃登髙望之表裏俱盡肆其兇虐覆我王師今圍石頭須渡北岸諸將若不能當鋒請先往立栅帝即於石頭橫隴築柵衆軍次連八城直出東北賊恐西州路斷亦於東北果林作五城以遏大路景率衆萬人鉄騎八百餘匹結陣而進帝曰軍志有之善用兵者如常山之蛇首尾相應今我師既衆賊徒甚寡應分賊兵勢以弱制强何故聚其鋒鋭令必死於我乃命諸將分處置兵賊直衝王僧志僧志小縮帝遣徐度領弩手二千橫截其後賊乃去帝與王琳杜龕等以鐡騎悉力乗之賊退據其栅景儀同盧輝畧開石頭北門來降盪主戴冕曹宣等攻㧞果林一城衆軍又克其四城賊復還殊死戰又盡奪所得城栅帝大怒親率攻之士卒騰栅而入賊復散走景與百餘騎棄矟執刀左右衝陣不動景衆大潰逐北至西明門景至闕下不敢入臺遣腹心取其二子而遁帝率衆出廣陵應接景將郭元建會元建奔齊帝納其部曲三千人而僧辯啟帝鎮京口五月北齊遣將辛術圍嚴超達於秦都帝命徐度領兵助其固守齊衆七萬填塹起土山穿地道攻之甚急帝乃自率萬人解其圍縱兵四面擊齊軍弓弩亂發齊平秦王中流矢死斬首數百級齊人收兵而退帝振旅南歸遣記室叅軍劉本仁獻㨗于江陵承制授帝使持節散騎常侍都督南徐州諸軍事征北大將軍開府儀同三司南徐州刺史及王僧辯率衆征陸納於湘州承制命帝代鎮揚州梁元帝承聖二年旋鎮京口三年三月進位司空十一月西魏攻陷江陵帝與僧辯等進啟江州請晉安王以太宰承制又遣長史謝哲奉牒勸進十二月晉安王至自尋陽入居朝堂給帝班劒二十人四年五月北齊送貞陽侯蕭淵明還主社稷僧辯納之即位改元天成以晉安王為皇太子九月壬寅帝召徐度侯安都周文育等討僧辯甲辰帝步軍至石頭前進遣勇士自城北踰入擒僧辯及子頠縊殺之丙午貞陽侯遜位百僚奉晉安王上表勸進十月己酉即位改元紹泰元年以帝為侍中大都督中外諸軍事車騎將軍揚南徐州刺史甲仗百人出入殿省震州刺史杜龕僧辯之壻也據吳興與義興太守韋載同舉兵反帝命周文育率衆攻戰于義興龕遣其從弟杜北叟將兵拒戰敗歸義興辛未帝表自東討留髙州刺史侯安都石州刺史杜稜宿衞臺省甲戌軍至自義興丙子㧞其水栅秦州刺史徐嗣徽據其城以入齊又要南豫州刺史任約共舉兵應龕載齊人資其食嗣徽等以京師空虛率精兵五千奄至闕下侯安都領驍勇五百人出戰嗣徽等退據石頭丁丑載及北叟來降帝撫而釋之以嗣徽冦逼捲甲還都命周文育進討杜龕十一月己卯北齊遣兵五千濟渡據姑熟帝命台州刺史徐度於冶城等立栅南抵淮渚齊又遣安州刺史翟子崇楚州刺史劉仕榮淮州刺史柳達摩領兵萬人於胡墅渡米粟三萬石馬千匹入于石頭癸未帝遣侯安都領水軍夜襲胡墅燒齊船千餘艘周鉄虎率舟師斷齊運輸擒其北徐州刺史張領州獲運舫米數千石仍遣韋載於野航築城使杜稜據守齊人又於金門水南立二柵以拒官軍甲辰嗣徽等攻冶城栅帝領鐡騎精甲出自西明門襲擊之賊衆大潰嗣徽留柳達摩等守城自率親屬腹心往南州采石以迎齊援十二月癸丑帝遣侯安都領舟師襲嗣徽家口于泰州俘獲數百人官運連艦塞淮口斷賊水路丙辰帝盡命衆軍分部甲卒對冶航渡兵攻其水南二栅柳達摩等渡淮置陣帝督兵疾戰縱火燒栅烟塵漲天賊潰爭舟排擠溺死者以千數時百姓夾淮觀戰呼聲震天地軍士乗勢無不一當百盡取其船艦賊軍懾氣是日嗣徽約等領齊兵水步萬餘人還石頭帝遣兵往江寧據要險以斷賊路賊水歩不敢進頓江寧浦口帝遣侯安都領水軍襲破之嗣徽等乗单舸脱走丁巳㧞石頭南岸栅移度北岸起栅以絶其汲路又堙塞東門故城中諸井齊所據城中無水水一斗貿米一升米一升貿絹一疋或炒米食之達摩謂衆曰聞在此童謠云石頭擣兩襠擣青復擣黃侯景服青身倒於此今吾徒衣黃豈謠言騐耶庚申達摩遣使侯子欽劉仁榮等潛來請和帝許之乃於城門外刑牲盟約其將士部曲一無所問從其南北辛酉帝出石頭南門陳兵數萬送齊人歸北者壬戌和州長史烏九逺自南州奔還歴陽江寧令陳嗣黃門侍郎曹朗據姑熟反帝命侯安都徐度等討平之斬首數千級聚為京觀石頭採石南州悉收其馬仗船米不可勝計是月杜龕以城降二年正月癸未誅杜龕于吳興龕從弟北叟司馬沈孝敦並賜死二月庚申帝遣侯安都周鐡虎率舸艦備江州仍頓梁山起栅甲子勅司空有軍旅之事可騎馬出入城内三月戊戌北齊遣水軍儀同蕭軌等率衆十萬出栅口向梁山帝遣侯安都及定州刺史沈泰呉郡太守裴忌共據梁山以禦之五月己亥帝率宗室王侯及朝臣將帥於大司馬門外白虎闕下刑牲告天以齊人背約發言慷慨涕泗交流同盟皆莫能仰視士卒觀者益奮丙申齊兵至秣陵故治六月丙子至𤣥武湖己卯帝率帳内麾下衆軍首尾齊舉臨水大戰破之帝表解南徐州以授安都七月丙子詔授帝中書監司徒揚州刺史進爵為公増邑并前五千戸食安吉武康二縣侍中使持節都督諸軍事乗給碧幢皁輪車是月侯瑱以江州入附遣侯安都鎮上流定南中諸郡九月壬寅改年曰太平元年進帝位丞相錄尚書事鎮衞大將軍改刺史為牧進封義興郡公二年二月庚午蕭勃舉兵自廣州度嶺頓南康遣將歐陽頠傅㤗及其子孜為前軍至于豫章分屯要險南江州刺史余孝頃起兵應勃帝命周文育侯安都率衆討平之八月甲午進位太傅加黃鉞臣欽若等曰自此以後褒寵並具閏位錫命門是月湘州刺史王琳擁兵不應命帝遣周文育侯安都率衆討之九月辛丑詔曰肇昔元台剖判太素氤氲崇建人皇必慿洪宰故賢哲之后牧伯征于四方神武之君太監治乎萬國又有一匡九合渠門之錫以隆戮𢃄圍温行宮之寵斯茂時危所以貞固運㤗所以光熈斯乃千載同風百王不刋之道也太傅義興公允文允武廼聖廼神固天生德康濟黔首昔在休期早隆朝寄逺踰滄海大拯交越皇運不造書契未聞中國其亡兵凶總至哀哀噍類譬彼窮牢悠悠上天莫云斯極否終泰始元輔應期將此方摧援兹已溺乗舟履輂架險浮深經畧中途畢殱羣醜洎乎石頭姑熟流髓履腸一朝指撝六合清宴是用先朝下武翼亮中都雪三后之勁讐夷三靈之巨慝堯台禹佐未始能階殷相周師固非云擬重之以屯剥餘象荆楚大摧天地無心乗輿委御劉石薦食競謀諸夏八方棊跱莫有裨救彊臣放命黜我冲人顧影於荼孺之魂甘心於寗卿之辱却按下髻求哀之路莫從竊鈇逃責容身之地無所公神兵奄至不日清澄惟是孱䝉再膺天祿斯又巍巍蕩蕩無得所稱焉加以仗兹忠義屠彼祅逆震部夷氛稽山罷祲番禺蠡澤北鄙西郊殱厥凶徒罄無遺種斯則兆民之命修短所懸率土之基興亡是頼於是刑禮兼訓沿革有章中外咸平遐邇寧一用能使陽光合魄曜象呈暉棲閣游庭抱仁含信宏勲該於厚地大道格於𤣥天羲農炎昊以來卷領垂衣之世聖人濟物未有如斯者也夫備物典䇿桓文是膺助理隂陽蕭曹不讓未有功髙於㝢縣而賞薄於伊周凡厥人祗固懐延佇實繇公撝謙自牧降損為懐嘉數遲囘永言増歎豈可申兹雅尚乆廢朝猷宜戒司勲敬昇鴻典且重華大聖媯汭惟賢盛德之祀無忘公侯之門必復是以殷嘉亶父繼后稷之官堯命羲和纂重黎之位况其本枝攸建宜誓山河者乎其進公位相國總百揆封十郡為陳公備九錫之禮加璽垂紱逺遊冠綏綬位在諸侯王上其鎮衞大將軍揚州牧如故䇿曰大哉乾元資日月以貞觀至哉坤元慿山川以載物故惟天為大陟配者欽明惟王建國翼輔者齊聖是以文武之佐磻磎藴其玉璜堯舜之臣榮河鏤其金版况乎體得一之鴻姿寧陽九之危厄拯橫流于碣石撲燎火於崑岑驅馭於韋彭跨蹍於齊晉神功行而靡用聖道運而無名者乎今將授公典䇿其敬聽朕命日者昊天不弔鍾亂於我國家網漏吞舟彊敵内贔茫茫宇宙惵惵黎元方足圓顱萬不遺一太清否亢橋山之痛已深大寶屯如平陽之禍相繼上宰膺運康救兆民鞠旅於潢池之南揚旌於桂嶺之北懸三光於既墜謐四海於羣飛屠猰窳於中原斮鯨鯢於濛汜蕩寧上國光啟中興此則公之大造於皇家者也既而天未悔禍羣醜薦臻南夏沸騰西京蕩覆羣方孔熾藉亂乗間推納藩枝盜假神器冡司昏撓旁引冦讎既見貶於桐宮方謀危於漢閣皇運已殆何殊贅旒中國揺然非徒如綫公赫然投袂匡救本朝復莒齊都平戎王室朕所以還膺寶厯重履宸居挹建武之風猷歌宣王之雅頌此又公之再造於皇家者也公應務之初登庸惟始二州五嶺莫不窺臨銀洞珠宮所在寧謐孫盧肇釁越貊為羣番郡阽危勢將淪殄公赤旗所指祅壘洞開白羽纔撝兇徒粉潰非其神武乆䘮南藩此又公之功也大同之末邊政不修李賁狂迷竊我交愛敢稱大號驕蹇甚於尉陀據有連州雄豪熾於梁碩公英謨雄筭電掃風行馳禦樓船直跨滄海新昌典激備履艱難經歴嘉寧盡為京觀三山獠洞八角蠻陬逖矣水㝢之鄉悠哉火山之國馬援之所不屆陶璜之所未開莫不懼我王靈爭朝邊候歸琛天府獻狀鴻臚此又公之功也自寇虜陵江宮闈幽辱公枕戈嘗膽提劒拊心氣湧清霄神飛紫閣而番禺連率本自諸夷言得其朋是懐同惡公仗此忠誠乗機勦定執沛令而釁鼓平新野而據鞍此又公之功也世道初艱方隅多難勲門桀黠作亂衡嶷兵切池隍衆兼夷獠公以國盜邊警知無不為恤是同盟誅其醜類莫不魚驚鳥散面縛頭懸南土黔黎重保蘇息此又公之功也長驅嶺嶠夣想京畿縁道酋豪逓為榛梗路養渠率全據大都畜聚逋逃方謀阻亂百樓不戰雲梯之所未窺萬弩齊張髙輣之所非敵公龍驤虎步嘯叱風雲山靡堅城野無彊陣清祅氛於灨石滅沴氣於雩都此又公之功也遷仕凶慝屯據大臯臣欽若等曰遷仕姓李為髙州刺史據大臯叛攻南康乞活類馬騰之軍流民多杜弢之衆摧鋒轉鬭自北徂南頻歲稽誅實惟勍虜公坐揮三畧遙制六竒義勇同心貔貅騁力風驅電擊谷靜山空列郡無犬吠之驚叢祠罷狐鳴之盜此又公之功也王師討虜次屆淪波兵乏兼儲士有饑色公迴麾蠡澤積谷巴丘億庾之詠斯豐壺漿之迎是衆軍民轉漕曽無砥柱之難艫舳相望如運敖倉之粟犀渠貝胄顧蔑雷霆髙檻層樓仰捫霄漢故三軍勇鋭百戰無前承此兵糧遂誅兇逆此又公之功也若夫英圖邁俗義旅如雲湓壘猜携用淹戎畧公志唯同奬師克在和鵠塞北虞鴻門是㑹若晉侯之誓白水如蕭王之推赤心屈禮交盟人祗感咽故能使舟師竝路逺邇同心此又公之功也姑熟襟要崤函憑凌冦虜據其關梁大盜負其扄鐍公一校裁撝三雄竝奮左賢右角音祿沙潰土分木甲殪於中原氊裘赴於江水佗佗藉藉萬計千羣鄂坂之隘斯開夷庚之進無塞此又公之功也義軍大衆俱奮帝京逆豎兇徒猶屯皇邑若夫表裏山河金湯嶮固疏龍首以抗殿剪華嶽以為城雜虜憑焉强兵自若公迴兹地軸抗此天羅曽不崇朝俾無遺噍軍容甚穆國政方修物重覩於衣冠民還瞻於禮樂楚人滿道爭覩於葉公漢老啣悲俱歡於司𨽻此又公之功也内難初靜諸侯出關外郡傳烽鮮卑犯塞莫非且渠當戸中貴名王冀馬列於淮南胡笳動於徐北公舟師步甲亘野横江殱厥羣羝遂殫封豕莫不絓木而止戎車靡遺遇濘而旋歸驂盡殪此又公之功也公克平禍難劬勞皇室而孫寗之黨飜啟狡心伊雒之間咸為異境雖金陵佳氣石壘天嚴朝闇邊塵夜喧征鼓公三籌既畫八陣斯張載舉靈鉟未抽金僕咸俘醜類悉反髙墉異李廣之皆誅同龎元之盡赦此又公之功也任約叛渙梟聲不悛戎羯貪婪狄心無改公左甄右落箕張翼舒掃是攙搶驅其獫狁長狄之種埋於國門椎髻之酋烹於軍市投秦坑而盡沸噎滍水而不流此又公之功也一相居中自安彜鼎五湖小守妄懐同惡公夙駕兼道衣甲仗戈玉斧將揮金鉦且戒祅酋震慴遽請灰釘爇櫬以表其含𢎞焚書以安其反側此又公之功也賊龕兇横凌虐具區臣欽若等曰賊龕即震州刺史杜龕舉兵據吳興叛也阻兵安忍憑災怙亂自古蟲言鳥迹渾沌洪荒人或䖍劉末此殘酷公雖宗居汝潁世寓東南育聖誕賢之鄉含章挺生之地眷言桑梓公私憤切卓爾英猷承規奉算戮此大憝如烹小鮮此又公之功也亂離永久羣盜孔多浙左羣渠連兵搆逆豈止千兵五校白雀黄龍而已哉公以中軍無帥選是親賢姦冦途窮漼然氷泮刑溏之所文命動其大威雷門之間勾踐行其嚴戮英規聖迹異代同風此又公之功也同姓有扈頑兇不賔憑藉宗盟圖危社稷觀兵匯澤勢震京師驅率南蠻已為東帝公論兵於廟堂之上決勝於樽俎之間冦賈樊滕浮江下瀬一朝翦撲無待甸師萬里澄清非勞新息此又公之功也豫章祅冦依憑山澤繕甲完聚多歴歲時結縱連横爰洎交廣呂嘉既獲吳濞已摐命我還師征其不恪連營盡拔偽黨斯擒曜聖武於廬山迴神姓於蠡辰此又公之功也自八紘九野𤓰割豆分竊帝偷王連州比縣公武靈已暢大德又宣折簡馳書風猷斯逺至於蒼蒼浴日杳杳無雷北洎幽都南踰丹徼莫不屈膝膜拜求吏欵關此又公之功也京師禍亂孔亟積暄雙闕低昻九門寥豁寧秦宮之可顧豈魯殿之猶存五郡簮弁百僚卿士胡服縵纓咸為戎俗髙冠厚履非復華風宋微子麥穟之刺周大夫黍離之歎方之於斯未足為悲矣公求衣昧旦反席髙舂興搆宫闈具瞻遐邇郊庠宗稷之典六符十算之章還聞太始之髙風重覩永平之遺事此又公之功也公有濟世之勲重之以凝神體道合德符天用百姓以為心隨萬機以自務恥一物非唐虞之民歸含靈於仁壽之域上德不德無為以為夏長春生顯仁藏用忠信為寶風雨弗愆仁惠為基馬牛勿踐功成治定樂奏咸雲安上治民禮兼文質物色丘園衣裾里巷朝多君子野無遺賢菽粟同水火之饒工商富倚頓之旅是以天無藴寶地有呈祥潏露卿雲朝團曉暎山車澤馬服馭登閑既炳煥於圖書方葳蕤於史牒髙勲踰於象緯積德冠於嵩華固無得而稱者矣朕又聞之前王宰世茂賞尊賢式樹藩長總征羣伯二南崇絶四履遐曠泱泱表海胙土維齊巖巖泰山俾侯于魯抑又勤王反鄭夾輔遷周召伯之命斯隆河陽之禮咸備况復經營宇宙豈唯斷鰲足之功宏濟蒼生非直鑿龍門之險而疇庸報德寂爾無聞朕所以垂拱當宁載懐慙悸者也今授公相國以南豫州之陳留南丹陽宣城揚州之吳興東陽新安寧國南徐州之義興江都之鄱陽臨川十郡封公為陳公錫之青土苴以白茅爰定爾邦用建冡社昔旦奭分陜俱為保師晉鄭諸侯咸作卿士兼其内外禮實攸宜今命持節兼太尉王通授相國印綬陳公璽紱使持節兼司空王瑒授陳公茅土金虎符第一至第五左竹使符第一至第十相國秩踰三鉉任總百司位絶朝班禮繇事革其以相國總百揆除錄尚書之號上所假節侍中貂蟬中書監印章中外都督太傅印綬義興公印䇿其鎮衛大將軍揚州牧如故又加公九錫其敬聴後命以公禮為楨幹律等衘䇿四維皆舉八柄有章是用錫公大輅戎車各一𤣥牡二駟以公賤寶崇榖疏爵待農室富京坻民知榮辱是用錫公衮冕之服赤舄副焉以公調理隂陽爕諧風雅三靈允降萬國同和是用錫公軒懸之樂六佾之舞以公宣導英猷𢎞開風教光景所炤鞮象必通是用錫公朱戸以居以公抑揚清濁褒德進賢髦士盈朝幽人虛谷是用錫公納陛以登以公嶷然廊廟為世鎔範持衡四表臨御八荒是用錫公虎賁之士三百人以公執兹明罰期在刑措象恭無赦干紀必誅是用錫公斧鉞各一以公英猷逺量跨厲嵩溟包一車書括囊寰宇是用錫公彤弓一彤矢百盧弓十盧矢千以公天經地義貫徹幽明春露秋霜尤恭粢盛是用錫公秬鬯一卣圭瓉副焉陳國置丞相已下一遵舊式往欽哉其恭循朕命克相皇天宏建邦家佐興洪業以光我髙祖之休命十月戊辰進陳公爵為王以揚州之㑹稽臨清永嘉建安南徐州之晉陵信義江州之尋陽豫州安成廬陵并前二十郡益封陳國其相國揚州牧鎮衛大將軍竝如故又命陳王冕十有二旒建天子旌旗出警入蹕乗金根車駕六馬備五畤副車置旄頭雲䍐樂舞八佾設鐘簴宮懸王妃王子王女爵命之號陳臺百官一依舊典是月辛未遂受梁禪世祖文帝始興昭烈王之子少沈敏有識量留意經史舉動方雅造次必遵禮法髙祖甚愛之侯景之亂鄉人多依山湖冦抄帝獨保家無所犯時亂日甚乃避地臨安及髙祖舉義兵侯景使收帝及衡陽王獻王帝乃密褁小刀冀因入見而害景至便屬吏故其事不行髙祖大軍圍石頭景欲加害者數矣㑹景敗乃得出起家吳興太守時宣城刼帥紀機郝仲等各聚衆千餘人侵掠郡境帝討平之梁承聖二年授信武將軍監南徐州三年髙祖北往廣陵使帝為前軍每戰克㨗髙祖之討王僧辯也先召帝與謀時僧辯女婿杜龕據吳興兵衆甚盛髙祖令帝還長城立栅以備龕帝收兵纔數百人戰備又少龕遣其將杜泰領精兵五千乗虛奄至將士相視失色而帝言笑自若部分益明於是衆心乃定泰知柵内人少日夜苦攻帝激勵將士身當矢石相持數旬泰乃退走髙祖遣周文育率兵討龕龕兵尚衆斷據要衝水步連陣相結帝命將軍劉澄蔣元舉率衆攻龕龕軍大敗窘急因請降東揚州刺史張彪起兵圍臨海太守懐振振遣使求救帝與周文育輕兵往㑹稽以掩彪彪將沈泰開門納帝帝盡收其部曲家累彪至又破走若耶村民斬彪傳其首以功授持節都督㑹稽等十郡諸軍事宣毅將軍㑹稽太守山越深險皆不賔附帝分命討擊悉平之威惠大振髙祖即位封為臨川郡王邑二千戸拜侍中安東將軍及周文育侯安都敗於沌口詔帝入衞軍儲戎備皆以委焉尋命率兵城南晥永定三年六月即帝位北齊髙祖神武皇帝渤海蓨人高樹之子素家貧自隊主轉為函使與懐朔省事雲中司馬子如及秀容人劉貴中山人賈顯智為奔走之友懐朔戸曹史孫騰外兵使侯景亦相友結柔𤣥鎮人杜雒周反於上谷帝與同志從之醜其行事私與尉景段榮蔡儁圖之不果而逃奔葛榮又亡歸爾朱榮以帝為親信都督時後魏孝明銜鄭儼徐紇逼靈太后未敢制私使榮舉兵内向榮以帝為前鋒至上黨㑹孝莊立以定䇿勲封為銅鞮伯及爾朱榮擊葛榮令帝諭下賊别稱王者七人後與行臺于暉破羊侃于泰山又與元天穆破邢杲于濟南累遷第三鎮人酋長晉州刺史於是大聚斂因劉貴貨榮下要人盡得其意及孝莊誅榮其從子兆自晉陽舉兵入雒執孝莊立長廣王􅁮改元建明封帝為平陽郡公及費也頭紇豆陵步藩入秀容逼晉陽兆徴帝帝將往賀㧞焉過兒請緩行以備之帝乃往逗遛辭以河無橋不得渡步藩軍盛兆敗走初孝莊之誅爾朱榮知其黨必有逆謀乃密勅步藩令襲其後步藩既敗兆等以兵勢日盛兆又請救於帝帝内圖兆復慮歩藩後之難除乃與兆悉力破之藩死兆深徳於帝誓為兄弟時爾朱榮從弟度律從父弟世隆及彦伯共執朝政從祖兄子仲逺㩀東郡天光據關右兆據并州各擁兵為暴天下苦之葛榮衆流入并肆者二十餘萬為契丹陵暴皆不聊生大小二十六反誅夷者半猶草竊不止兆患之問計於帝帝曰六鎮反賊不可盡殺宜選王素腹心者私使統焉若有反者直罪其帥則所罪者寡兆曰善誰可行也賀㧞允時在坐帝拳毆之折其一齒曰生平天柱時臣欽若等曰爾朱榮為天柱大將軍奴軰伏處分如鷹犬今日天下安置在王而阿鞠泥敢誣下罔上請殺之兆以帝為誠遂以委焉帝以兆醉恐醒後或致疑貳遂出宣言受委綂州鎮兵可集汾東受令乃建牙陽曲川陳部分有欵軍門者絳巾袍自稱梗陽驛子願厠左右訪之則以力聞嘗於并州市格殺人者乃署為親信兵士素惡兆而樂神武於是莫不皆至居無何又使劉貴請兆以并肆頻嵗霜早降戸掘黃䑕而食之皆面無穀色徒汚人國土請令就食山東待温飽而處分之兆從其議其長史慕容紹宗諌曰不可今四方擾擾人懐異望况高公雄畧又握大兵將不可為兆曰香火誓重何所慮也紹宗曰親兄弟尚難可信何論香火時兆左右已受帝金即譖紹宗與帝舊有隙兆乃禁紹宗而催帝帝乃自晉陽出滏口路逢爾朱榮妻北鄉長公主自雒陽來馬三百匹盡奪易之兆聞乃釋紹宗而問焉紹宗曰猶掌握中物也於是自追帝至襄垣㑹漳水暴長橋壊帝隔水拜曰所以借公主馬非有他故備山東盜耳王受讒言自來賜追今渡河而死不辭此衆便叛兆乃陳無此意因輕馬渡與帝坐幕下陳謝遂授刀引頭使帝斫己帝大哭曰自天柱薨背賀六渾臣欽若等曰賀六渾神武字也更何所仰願大家千萬嵗以申力用今傍人搆間至此大家何忍復出此言兆投刀於地遂刑白馬而盟誓為兄弟留宿夜飲尉景伏壯士欲執兆帝齧臂止之曰今殺之其黨必奔歸聚結兵饑馬痩不可相支若英雄崛起則為害滋甚不如且置之兆雖勁㨗而兇狡無謀不足圖也旦日兆歸營又召帝將上馬詣之孫騰牽衣乃止隔水肆罵馳還晉陽兆心腹念賢領帝戸家累别為營帝偽與之善觀其佩刀因取之以殺其從者盡散於是士衆咸悦倍願附從既出滏口倍加約束纎毫之物不聽侵犯將過麥地帝輒歩牽馬逺近聞之皆稱高儀同將兵整肅益歸心焉遂前行屯鄴求糧於相州刺史劉誕誕不供有軍營租米帝自取之魏普泰元年二月神武自軍次信都髙乾封隆之開門以待遂據冀州是月爾朱度律廢長廣王而立節閔封帝為渤海王四月又加東道大行臺第一鎮人酋長龎蒼鷹自太原來奔帝以為行臺郎尋以為安州刺史神武自向山東養士繕甲禁侵掠百姓歸心乃詐為書言爾朱兆將以六鎮人配契胡為部曲衆皆愁又為并州符徵兵討步落稽發萬人將遣之孫騰尉景為請留如此者再帝親送之郊雪涕執别人皆號慟哭聲動地帝乃諭之曰與爾俱殊鄉客義同一家不意在上乃爾徵召直向西已當死後軍期又當死配國人又當死奈何衆曰唯有反耳帝曰反是急計須推一人為主衆曰願奉帝曰爾鄉里難制不見葛榮乎雖百萬衆無刑法終自灰滅今以吾為主當與前異不得欺漢兒不得犯軍令生死任吾則可不爾不能為取笑天下衆皆頓顙死生唯命帝曰若不得已明日椎牛饗士諭以討爾朱之意封隆之進曰千載一時普天幸甚帝曰討賊大順也拯時大業也吾雖不武以死繼之何敢讓為六月庚子建義於信都尚未顯背爾朱氏及李元忠與髙乾平殷州斬爾朱羽生首來謁帝撫膺曰今者反決矣乃以元忠為殷州刺史是時兵威既振乃抗表罪狀爾朱氏世隆等秘表不通八月爾朱兆攻陷殷州李元忠來奔孫騰以為朝廷隔絶不權立天子則衆望無所係十月壬寅奉章武王融子渤海太守王朗為皇帝年號中興是為廢帝時爾朱度律仲遠軍次雒陽爾朱兆㑹之帝用竇泰䇿縱反間度律仲逺不戰而還帝乃敗兆於廣阿十一月攻鄴相州刺史劉誕嬰城固守帝起土山為地道往往建大柱一時焚之城陷入地麻祥時為湯隂令帝呼之曰麻都祥慚而逃永熈元年正月壬午拔鄴城據之廢帝進帝大丞相柱國大將軍太師是時青州建義大都督崔靈珍大都督耿翔皆遣使歸附行汾州事劉貴棄城來降閏三月爾朱天光自長安兆自并州度律自雒陽仲遠自東郡同㑹鄴衆號二十萬夾洹水而軍節閔以長孫承業為大行臺總督焉帝令封隆之守鄴自出頓紫陌時馬不滿二千步兵不至三萬衆寡不敵乃於韓陵為圓陣連牛驢以塞歸道於是將士皆為死志四面赴擊之爾朱兆責帝以背己帝曰本戮力者共輔王室今帝何在兆曰永安枉害天柱我報讐耳帝曰我昔日親聞天柱訃汝在戸前立豈得言不反耶且以君殺臣何報之有今日義絶矣乃合戰大敗之爾朱兆對慕容紹宗叩心曰不用公言以至於此將輕走紹宗反旗鳴角收聚散卒成軍容而西上高季式以七騎追奔度野馬崗與兆遇高昂望之不見哭曰䘮吾弟矣夜乆季式還槊血滿袖斛斯椿倍道先㨿河橋四月斛斯椿執天光度律以送雒陽長孫承業遣都督賈顯智張歡入雒陽執世隆彦伯斬之兆奔并州仲逺奔梁州遂死焉時匈蠧既除朝廷慶悦帝至雒陽廢節閔及中興王而立孝武孝武即位以帝為天柱大將軍太師世襲定州刺史增封并前十五萬戸帝自􅇭口入爾朱兆大掠晉陽北保秀容并州平帝以晉陽四塞乃建大丞相府而定居焉兆既至秀容分兵守險出入冦抄帝揚聲討之師出止者數四兆意怠帝揣其歲首當宴㑹遣竇泰以精騎馳之一日一夜行三百里帝以大軍繼之二年正月竇泰奄至爾朱兆庭軍人因宴休惰忽見泰驚走追破之於赤洪嶺兆自縊帝親臨厚𦵏之初帝之入雒也爾朱仲逺部下都督喬寧張子期自滑臺歸命帝以其助亂且數反覆皆斬之斛斯椿繇是内不自安乃與南陵王竇炬及武衞將軍元毗魏光禄王思政搆帝於孝武舍人元士弼又奏帝受勑大不敬故孝武心貳於賀拔岳時司空髙乾密啟帝言孝武之貳帝封呈孝武殺之天平元年二月封隆之與孫騰私言隆之䘮妻孝武欲妻以妹騰亦未之信隆之泄其言於斛斯椿以白孝武又孫騰帶仗入省擅殺御史竝亡來奔稱孝武撾舍人梁續於前光禄少卿元子幹攘臂擊之謂騰曰語爾高王元家兒拳正如此領軍婁昭辭疾歸晉陽魏帝於是以斛斯椿兼領軍分置督將及河南關西諸刺史華山王縶在徐州帝使邸珍奪其管籥建州刺史韓賢濟州刺史蔡㒞皆帝同義魏帝忌之故省建州以去賢使御史中尉綦儁察儁罪以開府賈顯智為濟州㒞拒之魏帝愈怒五月下詔云將征句呉發河南諸州兵増宿衛守河橋六月丁巳密詔帝曰宇文黒獺自平破秦隴多求非分脱有變詐事資經畧但表啟未全背戾進討事涉怱怱遂召羣臣議其可否僉言假稱南伐内外戒嚴一則防豫不虞二則以威吳楚時魏帝將伐帝部恐帝部將帥慮疑故有此詔帝乃表曰荆州綰接蠻右密邇畿服關隴恃逺將有逆圖臣今潛勒兵馬三萬擬從河東而渡又遣鎮州刺史厙狄千瀛州刺史郭瓊汾州刺史斛律金前武衛將軍彭樂擬兵四萬從其來違津渡遣領軍將軍婁昭相州刺史竇泰前燕州刺史堯雄并州刺史髙隆之擬兵五萬以討荆州遣冀州刺史尉景前冀州刺史髙敖曹濟州刺史蔡儁前侍中封隆之擬山東兵七萬突騎五萬以征江左皆約勒所部伏聽處分魏帝知覺其變乃出帝表命羣伯議之欲止帝諸軍帝乃集在并州僚佐令其博議還以表聞仍以信誓自明忠欵曰臣為嬖佞所間陛下一旦賜疑令猖狂之罪爾朱時計臣若不盡誠竭節敢負陛下則使身受天殃子孫殄絶陛下若垂信赤心使干戈不動佞臣一二人願斟量廢黜辛未魏帝復錄在京文武議意以答帝使舍人温子昇草勑子昇逡巡未敢作魏帝據胡床拔劒作色子昇乃為勑曰前持心血逺以示王深冀彼此共相體悉而不良之徒坐生間貳近孫騰倉卒向彼致使聞者疑有異謀故遣御史中尉綦擕具申朕懐今得王啟言誓懇惻反覆思之猶所未解以朕眇身遇王武畧不勞尺刅坐為天子所謂生我者父母貴我者髙王今若無事背王親相攻討則使身及子孫還如王誓皇天后土實聞此言近慮宇文為亂賀拔勝應之故纂嚴欲與王俱為聲援宇文今日使者相望觀其所為更無異迹賀拔在南開擴邊境為國立功念無可責君若欲分討何以為詞東南不賓為日已乆先朝已來置之度外今天下戸口減半未宜窮兵極武朕既闇昧不知佞人是誰可列其姓名令朕知也如聞庫狄千語王云本欲取懦弱者為主王無事立此長君使其不可駕御今但作十五日自可廢之更立餘者如此議論自是王間勲人豈出佞臣之口去歲封隆之背叛今年孫騰逃走不送誰不恠王騰既為禍胎曽無愧懼若事君盡誠何不斬送二首王雖啓圖西去而四道俱進或欲南度雒陽或欲東臨江左言之者猶怪聞之者寧能不疑王若守誠不貳晏然居北在此雖有百萬之衆終無圖彼之心王脱信邪忘義舉旗南指縱無匹馬隻輪猶欲奮空拳而爭死朕本寡德王立之百姓無知或謂實可若為他所圖則彰朕之惡假令還為王殺幽辱韲粉了無遺恨向者王既以德見推以義見舉一朝背德舍義便是過有所歸本望君臣一體若合符契不圖今日分疎到此古語云越人射我笑而道之吾兄射我泣而道之朕既親王情如兄弟所以投筆拊膺不覺歔欷初帝自京師將北以為雒陽乆經䘮亂王室衰盡雖有山河之固土地褊狹不如鄴請遷都魏帝曰髙祖定鼎河雒為永永之基經營制度至世宗乃畢王既功在社稷宜遵太和舊事帝奉詔至是復謀焉遣三千騎鎮建興益河東及濟州兵於白溝虜船不敢向雒諸州和糴粟運入鄴城魏帝又勑帝曰王若厭伏人情杜絶物議唯有歸河東之兵罷建興之戌送相州之粟追濟州之軍令蔡儁受代使邸珍出徐止戈散馬各事家業脱須糧廪别遣轉輸則䜛人結舌疑悔不生王髙枕太原朕垂拱京雒終不舉足渡河以干戈相指王若馬首南向問鼎輕重朕雖無武欲止不能必為社稷宗廟出萬死之䇿決在於王非朕能定為山止簣相為惜之魏帝時以任祥為兼尚書左僕射加開府祥棄官走至河北據郡待帝魏帝乃勑文武官北來者任去留下詔罪狀帝為北伐經營帝亦勒馬宣告曰孤遇爾朱擅權舉大義于四海奉戴主上義貫幽明横為斛斯椿䜛搆以誠節為逆首昔趙鞅興晉陽之甲誅君側惡人今者南邁誅樁而已以髙昻為前鋒曰若用司空言豈有今日之舉司馬子如答帝曰本欲立小者正為此耳魏帝徵兵關右召賀拔勝赴行在所遣大行臺長孫承業大都督潁川王斌之斛斯椿共鎮虎牢汝陽王暹鎮石濟行臺長孫子彦帥前𢎞農太守元洪畧鎮陜賈顯智率豫州刺史斛斯元壽伐蔡儁帝使竇泰與左相大都督莫多婁貸文逆顯智韓賢逆暹元素軍降泰貸文與顯智遇於長壽津顯智隂約降引軍退軍司元𤣥覺之馳還請益師魏帝遣大都督侯幾紹赴之戰於滑臺東顯智以軍降紹死之七月魏帝躬率大衆屯河橋帝至河北十餘里再遣口申誠欵魏帝不報乃引軍渡河魏帝問計於羣臣或云南依賀拔勝或云西就關中或云守雒口死戰未決而元斌之與斛斯椿爭權不睦斌之棄椿逕還紿魏帝云帝兵至即日魏帝遜於長安己酉帝入雒陽停永寧寺八月甲寅召集百官謂曰為臣奉主拯救危亂若處不諫諍出不陪隨緩則耽寵爭榮急便逃竄臣節安在遂收開府儀同三司叱列延慶兼尚書左僕射辛雄兼吏部尚書崔孝芬都官尚書劉廞兼度支尚書楊機散騎常侍侍中元士弼並殺之誅其貳也士弼籍没家口帝以萬幾不可曠廢乃與百僚議以清河王亶為大司馬居尚書下舍而承制決事焉王稱警蹕帝尋至𢎞農遂西克潼關執毛洪賓進軍長城龍門都督薛崇禮降帝退舍河東命行臺尚書長史薛瑜守潼關大都督厙狄温守封陵於蒲津西岸築城守華州以薛紹宗為刺史髙昻行豫州事帝自發晉陽至此凡四十啓魏帝皆不答九月庚寅帝還至雒陽乃遣僧道榮奉表關中又不答乃集百僚沙門耆老議所推立以為自孝昌衰亂國綂中絶神主靡依昭穆失序永安以孝文為伯考永熈遷孝明於夾室業䘮柞短職此之繇議立清河王世子善見是為孝静帝魏於是始分為二帝以孝武既西恐逼崤陜雒陽復在河外接近梁境如向晉陽形勢不能相接依議遷鄴䕶軍祖塋贊焉詔下三日車駕便發戸四十萬狼狽就道帝留雒陽部分事畢還晉陽自是軍國政務皆歸相府二年正月西魏渭州刺史爾朱渾道元擁衆内屬帝迎納之壬戌帝襲擊山胡劉蠡升大破之是月孝静褒詔以帝為相國假黃鉞劒履上殿入朝不趨帝固辭三月帝欲以女妻蠡升太子候其不設備辛酉潛師襲之其北部王斬蠡升首以送其衆復立其子南海王帝進擊之又獲南海王及其弟西海王北海王皇后公卿以下四百餘人胡魏五萬戸三年正月甲子帝帥厙狄千等萬騎圍西魏夏州身不火食四日而至縛矟為梯夜入其城於是生擒費也頭斛㧞俄彌突因而用之留都督張瓊以鎮守遷其部落五千戸以歸西魏靈州刺史曹泥與其婿凉州刺史劉豐遣使請内屬周太祖圍泥水灌其城不没者四尺帝命阿至羅發騎三萬徑度靈州繞出西軍後獲馬五十匹西師乃退帝率騎迎泥豐生拔其遺戸五千以歸復泥官爵孝静詔加帝九錫固讓乃止二月帝令阿至羅逼西魏秦州刺史建忠王万俟普撥帝以衆應之三月普撥與其子太宰壽㑹于幽蒲津以氷薄不得赴救乃班師是月髙昻克上雒十一月壬辰帝西討自蒲津濟衆二十萬周太祖軍於沙苑帝以地阨少却西人鼓噪而進軍大亂棄器甲十有八萬帝跨槖駝候船以歸元象元年三月辛酉帝固請觧丞相孝静許之七月壬午行臺侯景司徒髙昻圍西魏將獨孤信於金墉西魏帝及周太祖並來赴救大都督厙狄千帥諸將前驅帝總衆繼進八月辛卯戰於河隂大破西魏軍俘獲數萬司徒髙昻大都督李猛宗顯死之西帥之敗獨孤信先入關周太祖留其都督長孫子彦守金墉遂燒營以遁帝遣兵追奔至崤不及而還初帝知西師來侵自晉陽率衆馳赴至孟津未濟而軍有勝負既而帝渡河子彦亦棄城走帝遂毁金墉而還十一月庚午朝京師十二月壬辰還晉陽興和元年七月丁丑孝靜進帝為相國錄尚書事固讓乃止十二月乙丑帝以新宮成朝於鄴辭渤海王及都督中外諸軍事詔不許四年五月辛巳朝鄴六月甲辰還晉陽九月帝西征十月己亥圍西魏儀同三司王思政於玉璧城欲以挑敵西師不敢出武定元年二月壬申北豫州刺史髙慎據虎牢西叛三月壬辰周太祖率衆援髙慎圍河橋南城戊申帝大敗之於芒山擒西魏督將已下四百餘人俘斬六萬計是時軍士有盜殺驢者軍令應死帝弗殺將至并州決之明日復戰奔西軍告帝所在西師盡鋭來攻衆潰帝失馬赫連陽順下馬以授帝與蒼頭馮文雒扶上俱走西魏大帥賀拔勝以十三騎逐帝河州刺史劉洪徽射中其二勝矟將中帝段先横射勝馬殪遂免豫雒二州平帝使劉豐追奔至𢎞農還八月孝静詔帝為相國錄尚書事固辭乃止十二月己卯朝京師庚辰還晉陽二年三月癸巳帝巡行冀定二州因朝京師四月丙辰還晉陽十一月帝討山胡破平之俘獲一萬餘户口分配諸州三年正月甲午開府儀同三司爾朱文暢開府司馬任胄都督鄭仲禮中府主簿李世林前開府參軍房子逺等謀弑帝因十五夜打簇懐刄而入其黨薛季孝以告並伏誅三月乙未帝朝鄴丙午還晉陽四年八月帝將西伐自鄴㑹兵於晉陽九月圍玉璧以挑西師不敢應西魏晉州刺史韋孝寛守玉璧城中出鐵面帝使兀盜射之每中其目用李業興孤虛術萃其北北天險也乃起土山鑿十道又於東面鑿二十道以攻之城中無水汲於汾帝使移汾一夜而畢孝寛奪據土山頓軍五旬城不拔死者七萬人聚為一冢是月帝有疾十一月庚子輿疾班師以無功表解都督中外諸軍事五年正月丙午終於晉陽天保初文宣即位追崇為獻武帝廟號大宗世祖文襄皇帝神武長子魏中興元年為渤海王世子二年加侍中開府儀同三司尚孝靜帝妹馮翊長公主天平元年加使持節尚書令大行臺并州刺史三年入朝輔政加領左右京畿大都督興和二年加大將軍領中書監武定四年十一月神武西討不豫班師帝馳赴軍所侍衞還晉陽五年正月神武晏駕七月魏帝詔以帝為使持節大丞相都督中外諸軍錄尚書事大行臺渤海王八月戊辰文襄啟申神武遺令請減國邑分封將督各有差辛未朝鄴固辭丞相魏帝詔曰既朝野攸憑安危所繫不得令遂本懐須有權奪可復前大將軍餘如故七年七月辛卯遇盜而終文宣受禪追諡為文襄皇帝廟號太宗顯宗文宣皇帝神武第二子時天平二年授散騎常侍驃騎大將軍儀同三司左光祿大夫太原郡開國公武定元年加侍中二年轉尚書左僕射領軍將軍五年授尚書令中書監京畿大都督武定七年七月文襄遇害帝乃走晉陽親總庶政十一月梁齊州刺史茅靈斌德州刺史劉領隊南豫州刺史皇甫眘等並以州内屬八年正月魏帝詔進帝位使持節丞相都督中外諸軍錄尚書事大行臺齊郡王食邑一萬戸三月進封齊王五月進相國總百揆封冀州之渤海長樂安德武邑瀛州之河間髙陽之章武定州之中山常山博陵十郡邑二十萬戸加九錫殊禮齊王如故遣兼太尉彭城王韶司空潘相樂冊命曰於戲敬聽朕命夫唯天為大列星宿而垂象謂地盖厚疏川嶽以阜物所以四時代序萬類駢羅庶品得性羣形不彫然則皇王統歴深視髙居拱黙垂衣寄成師相此則夏伯殷尹竭其股肱周成漢昭無為而治也往者天下多難國命如旒則我太廟之業將墜於地齊獻武王奮迅風雲大濟區域援翼朕躬國為再造經營庶土以至憂勤及文襄承搆愈廣前業康邦夷難道格穹蒼王縱德應期千齡一出唯幾唯深乃神乃睿大崇霸德實廣相猷雖㝠功妙實藐絶言象標聲示迹典禮宜宣令申後命其敬虚受王摶風初舉建旟上地庇民立政時雨滂流下識亷恥仁加水陸移風易俗自齊變魯此王之功也仍攝天臺總叅戎律䇿出若神威行朔土引弓竄跡松塞無烟此又王之功也逮光統前緒持衡匡合華戎混一風海調夷日月光華天地清晏聲接響隨無思不偃此又王之功也逖矣炎方逋違正朔懐文曜武授畧申規淮楚連城漼然桑落此又王之功也關峴襟帶跨躡蕭條腸胃之地嶽主鴟跱偏師纔指渙同氷散此又王之功也晉熈之所險薄江雷逈隔聲教迷方未改命將鞠旅覆其巢穴威畧風騰傾懾南海此又王之功也羣蠻䟦扈世絶南疆揺蕩邊陲亟為塵梗懐德畏威向風請順傾陬盡落其至如雲此又王之功也胡人别種延蔓山谷酋渠萬族廣袤千里慿險不恭恣其桀黠有樂淳風相携叩􅍁粟帛之調王府充積此又王之功也茫茫涉海世敵諸華風行鳥逝倐來忽往既飲醇醪附同膠漆氊裘委物竒獸衘尾此又王之功也秦川尚阻作我仇讎爰挹椒蘭飛書請好天動其𠂻辭卑禮厚區宇乂寧遐邇畢至此又王之功也江隂告禍民無適歸蕭宗子弟尚想投庇如鳥還山猶川赴海荆江十部俄而獻割乗此㑹也將混朱方此又王之功也天平地成率土咸茂禎符顯見史不停筆既連百木兼呈九尾素過秦雀蒼比周烏此又王之功也捜揚管庫衣冠獲序禮云樂云銷沉俱振輕徭徹賦矜獄寛刑大信外彰深仁逺洽此又王之功也王有安天下之大勲加以表光明之盛德宣贊洪猷以左右朕言昔旦奭外分毛畢入佐出内之任王宜總之人謀鬼謀兩儀恊契錫命之行義申公道以王踐律蹈禮軌物蒼生圓首安志率心歸道是以錫王大輅戎輅各一𤣥牡二駟王深重民天唯本是務衣食之用榮辱所繇是用錫王衮冕之服赤舄副焉王深廣惠和易調風化神祗且格功德可象是用錫王軒懸之樂六佾之舞王風聲振赫九域咸綏逺人率俾奔走委盡是用錫王朱户以居王求賢選衆草萊以盡陳力就列罔非其人是用錫王納陛以登王英圖猛槩抑揚千品毅然之節肅是非違是用錫王虎賁之士三百人王興亡所繫制極幽顯糾行天討罪人斯得是用錫王鈇鉞各一王鷹揚豹變實扶下土狼顧鴟張罔不彈射是用錫王彤弓一彤矢百盧弓十盧矢千王孝弟之至通於神明率民興行咸達區宇是用錫王秬鬯一卣珪瓉副焉往欽哉其祗順往册保弼皇家用終爾休德對揚我太祖之顯命又詔以齊國大妃為王太后戊子遂受魏帝禪冊府元龜卷一百八十六
