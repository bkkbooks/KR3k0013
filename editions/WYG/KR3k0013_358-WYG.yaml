body:
  text: 册府元龜卷三百五十八宋王欽若等撰將帥部立功第十一唐張寶相為大同道行軍副總管貞觀四年寶相獲頡利可汗於塞表其沙鉢羅設蘇尼失以餘衆舉國來降牛進達為􅀈江府統軍貞觀七年陵嘉二州獠反令進達率衆往擊破之尋拜左武衛将軍又二十一年從征高麗至駐蹕山與司徒長孫無忌率軍出自賊後先後奮擊大破之師旋拜左武衛大将軍又與右武衛將軍李海岸等浮海以伐髙麗襲破石城虜男女數百人進次稽利城髙麗列陣来戰進達擊之斬首二千餘級張士賔為行軍總管貞觀八年討東西王洞反僚平之姜磪為左屯衛将軍貞觀中髙昌之役以為交河道行軍副總管率衆數千先大軍出伊吾趣栁谷依山採木造攻城器械其地有班超紀功碑磪磨去文刋頌國威而去遂與侯君集等㓕高昌力戰有功軍還封金城郡公食邑二千戸劉師立為岷州都督貞觀中河西党項丑氏常為邉患又阻新附奉詔擊破之丑氏大懼遁於山谷師立至䘏于真山與吐谷渾相遇擊破之多所虜獲而還張士貴貞觀中為屯衛大将軍時薛延陁犯塞士貴督夏州騎士倍道邀擊大破之契苾何力為左領軍将軍貞觀中與将軍薛萬均征吐谷渾萬均為賊所攻何力救之獲免時吐谷渾主在突倫川何力復欲襲之萬均懲其前敗固言不可何力曰賊非有城郭逐水草以為生若不襲其不虞便恐鳥驚魚散一失機㑹安可傾其巣穴耶乃自領驍兵千餘騎直入突倫川襲破吐谷渾牙帳斬首數千級獲駝馬牛羊二十餘萬頭渾主脱身以免俘其妻子而還後為右驍衛大将軍永徽二年弓月處宻叛以何力為弓月道大總管討平之擒其渠帥處宻時健侯斤等以歸乾封元年又為遼東道行軍大總管兼安撫大使高麗有衆十五萬屯於遼水又引靺鞨數萬據南蘇城何力奮擊皆大破之斬首萬餘級乗勝而進凡拔七城乃廻軍㑹英國公李勣於鴨緑水共攻辱夷大行二城破之勣頓軍於鴨緑栅何力引蕃漢兵五十萬先臨平壤勣仍繼至拔平壤城執男建虜其王還席君買為果毅都尉貞觀十五年率精騎百二十襲擊吐谷渾之丞相宣王破之斬其弟兄三人初丞相宣王專其國權隂謀作難詐言祭山神乃結人仗將襲𢎞化公主刼其王誥曷鉢等奔于吐蕃期有日矣誥曷鉢知而大懼率輕騎走鄯城所部咸信王以兵迎之君買除其害國人仍相驚擾詔遣戸部尚書唐儉中書舍人馬周持莭慰撫之其衆乃安郭孝恪為安西都䕶貞觀十八年詔孝恪討焉耆乃選步騎三千出銀山道以焉耆王弟粟婆淮為鄉道焉耆所都城四面有水自恃其甲不虞於我孝恪倍道兼行夜至城下潜遣将士浮水而渡及明一時攀堞鼓角齊震城中大擾孝恪縱兵擊之虜其王突騎支斬首虜七千級以粟婆淮為軍導有功留攝國事而還時屈利啜将兵來援焉耆以勁騎五千追孝恪至於銀山之下孝恪逆擊破之追奔數十里而還田仁㑹為左武侯中郎将貞觀十八年太宗征遼發後薛延陁數萬騎抄掠河内帝令仁會及執失思力率兵擊破之逐北數百里延陁脱身走免帝嘉其功降璽書慰勞楊𢎞禮為兵部侍郎貞觀十九年從太宗征遼領馬步二十四軍出其不意以擊之所向摧破二十一年為崑丘道副大總管軍将咸受節度於是破處月降處密殺焉耆王降馺支部獲龜兹於闐王凱還喬師望為夏州都督貞觀二十年與右領軍大将軍執失思力等擊薛延陁大破之斬獲二千餘人梁建方為右武侯将軍貞觀二十二年擊松外蠻破之初嶲州都督劉伯英上言松外諸蠻雖暫降欵旋即背叛請出師討之西洱河天竺道可通也由是建方發蜀州十二州兵討之蠻帥䨇舎率衆拒戰建方擊破之殺獲千餘人羣蠻震擾各竄山谷建方分遣使者説以利害爭來欵附前後至者七十餘部戸十萬九千三百建方署其首領蒙和為縣令各綂所部莫不感悦建方乗勝遣使往西洱河其帥楊盛見使至大駭具船将遁使者曉諭禍福示以威信盛遂稽顙請降遣首領十人来謁軍門建方振旅而還及至太宗勞其勤老賜以上駟趙孝祖為朗州道總管高宗永徽三年大破白水蠻其地與青蛉弄棟相接酋長楊承顛私自署侵陵隣境朗州都督任懐王屢招懐之承顛不從攻刼尤數及孝祖軍至夷人多棄城投險惟小勃弄酋長師盛守白旗城率步騎一萬逆戰孝祖破之斬師盛首進至大勃弄承顛嬰城自固孝祖遣人招之承顛大罵無禮孝祖進軍攻之臨陣獲承顛餘衆走險往往屯聚大者數萬小者數千人孝祖與戰皆破降之西南夷遂定程名振為營州都督兼東夷都䕶顯慶二年率兵破高麗於貴端水焚其新城殺獲甚衆薛仁貴為左領軍郎将顯慶二年詔副程名振於遼東經畧大破高麗於貴端水焚其新城斬三千級龍朔元年授左武威衛将軍封河東縣男其後破九姓從李勣平高麗皆有大功劉仁軌為檢校帶方州刺史兼熊津道行軍長史顯慶五年大軍征遼仁軌仍别領水軍二萬襲破倭賊數萬於白江虜掠船艦四百餘艘倭賊及眈羅等國皆遣使詣之請降初仁軌将發帶方州謂人曰天将富貴此翁耳於州司請厯日一卷并七廟諱人怪其故答曰擬削平遼海頒示國家正朔使夷俗尊奉焉至果以軍功顯正除帶方州刺史又檢校熊津都督總知留鎮兵馬事咸亨五年為雞林道大總管東伐新羅仁軌徑度瓠蘆河破其北方大鎮七重城以功進爵為公并子姪三人並授上柱國州黨榮之高侃為東州道行軍總管左監門大将軍咸亨三年與高麗餘衆戰於白水山大破之時新羅還将救髙麗以拒官軍侃與副将李謹行等引兵迎擊髙麗斬首三千級李謹行為燕山道總管右領軍大将軍咸亨四年大破高麗叛徒於瓠蘆河之西俘獲數千人自是平壤餘衆走投新羅黑齒常之為左領軍員外将軍儀鳯中吐蕃入㓂從河西道大總管李敬𤣥拒之總管劉審禮之没於陣敬𤣥欲抽軍却阻泥溝而計無所出常之夜率敢死五百人進斫賊營賊酋䟦地設棄軍宵遁高宗大悦擢授左武衛将軍永隆二年為河源道經畧大使率兵以討吐蕃軍至良非川吐蕃大将賛婆引退常之進軍追討獲其羊馬甲仗而還垂拱三年八月突厥骨咄禄元珍冦朔州常之為燕山道大總管擊賊於黄花堆大破之追奔四十餘里遂散走磧北裴行儉為定襄道行軍大總管調露二年大破突厥於黑山擒其首領奉職偽可汗泥熱匐為其下所殺斬其首來降竇懐哲為岱州都督調露二年突厥餘衆圍雲州懐哲與左領軍中郎将程務挺率兵擊破之程務挺為右衛将軍封平原郡公永淳二年綏州城平縣人白䥫餘率部落稽之黨據縣城反偽稱尊號署百官又進冦綏德殺掠人吏焚燒村落務挺與夏州都督王方翼討之務挺進攻其城拔之生擒白䥫餘盡平其餘黨又以功拜左驍衛大将軍李孝逸為玉鈴衛大将軍則天文明元年李敬業據揚州亂詔孝逸討破之斬首七千級投于谿水死者數千追奔二十餘里敬業窘急與其弟敬猷及唐之竒杜求仁駱賔王等輕騎遁走至江都攜其妻子奔潤州又将逃入海投于髙麗孝逸乗勝進據揚州分遣将士捕之敬業至海陵界阻風頓於灘上其偽将王那相斬敬業及敬猷賔王而降傳其首於東都求仁之竒等咸赴水而死揚潤楚三州悉平馬敬臣為揚州道副總管文明元年李敬業據揚州亂敬臣與賊帥尉遲昭戰于都梁山斬之盡降其衆魏元忠為侍御史李敬業於揚州作亂元忠督軍征之敬業平授司刑正王果為廣州都督垂拱元年討嶺外反獠平之王孝傑為武威軍總管長壽元年與阿史那忠莭大破吐蕃克復龜兹于闐疎勒碎葉等四鎮唐休璟為隴右諸軍大使乆視元年吐蕃賛普遣将麴莾布支冦涼州圍逼昌松縣休璟與莾布支戰于洪源谷斬其副将二人獲首二千五百級陳大慈為都督長安二年十月吐蕃賛普率衆萬餘人冦悉州大慈與賊四戰皆破之斬首千餘級唐九徵為姚嶲道討擊使中宗神龍三年擊姚州叛蠻敗之俘虜三千餘級遂樹碑以紀功焉郭䖍瓘為右衛将軍北庭都䕶𤣥宗開元二年突厥黙啜遣其子同俄特勒率衆冦北庭䖍瓘擊敗之斬同俄於城下突厥女壻火拔頡利發石阿失畢與同俄特勒同領兵同俄之死懼不敢歸遂與其妻歸降䖍瓘以破賊功拜冠軍大将軍行右驍衛大将軍封太原郡開國公郭知運為伊吾軍使開元二年副郭䖍瓘破突厥於北庭以功封介休縣公擢拜右武衛将軍其年秋吐蕃入冦知運與薛納王晙等掎角擊敗之拜知運鄯州都督隴右諸軍節度大使四年冬突厥降戸阿悉爛􅎤跌思素等率衆反詔知運領朔方兵横擊之大破賊衆於黒山呼延谷六年又率兵入討吐蕃賊徒無僃遂掩至九曲獲鏁甲及馬羊牛等數萬計拜知運為兼鴻臚卿御史中丞八年六州胡康待賔反詔知運與王晙討平之拜左武衛大将軍阿史那獻為北庭大都䕶瀚海軍使開元二年梟突厥都擔首獻于闕下并擒其孥及胡禄等部落五萬餘帳内屬王晙為隴右郡牧使開元二年攝右羽林將軍薛訥邀擊吐蕃至武衛谷去大来谷二十里為賊所隔晙率兵迎訥之軍賊置兵於兩軍之間連亘數十里晙夜出壮士銜枚擊之賊大潰乃與訥合軍掩其餘衆追奔至洮水殺獲不可勝數盡收所掠牧馬而還以功加銀青光禄大夫封清源縣男兼源州都督其後降虜復叛勅晙帥并州兵西濟河以討之殺一千五百餘人生獲一千四百餘人駞馬牛羊甚衆以功遷散騎常侍持莭朔方道行軍大總管孫仁獻為松州都督開元四年大破吐蕃于城下初仁獻率驍勇候夜掩入賊營亂斫之賊震栗奔散乃以刀斫馬脚而大潰帝聞之特命御史就松州録其勞降書慰勞仁獻及将吏張説為并州大都督開元九年胡賊康待賔率衆反據長泉縣自稱葉䕶攻陷蘭池等六州詔王晙率兵討之仍令説相知經畧時叛胡與黨項連結攻銀城連谷以據倉糧説綂馬步萬人出合河關掩擊大破之追至駱駞堰胡及黨項自相殺阻夜胡乃西遁入鐵建山餘黨潰散説招集黨項復其居業其年拜兵部尚書同中書門下三品十年為朔方軍節度大使時康待賔餘黨慶州方渠降胡康願子自立為可汗舉兵反謀掠監牧馬西涉河出塞説進兵討擒之并獲其家屬於木盤山送京都斬之其黨悉平張嵩為北庭節度使開元十年九月吐蕃圍小勃律王沒謹忙求救于嵩曰勃律之國是漢西門漢若失之則已西諸國並陷吐蕃矣都䕶其若之何嵩方開葱嶺既聞之許諾報曰國家西岳乆被聲教王忠勤之至貫於神明何彼犬戎敢此凌侮嵩忝司鎮禦必不容縱當整師徒為王翦㓕謹忙大喜嵩乃遣疏勒副使張思禮率蕃漢馬歩四千人赴援晝夜倍道兼進謹忙復乗勢出兵左右夾攻吐蕃大破殺其衆數萬收其器械羊馬等甚衆盡復其九城之胡初勃律王來朝上字之為子於其國置綏逺軍以地隣吐蕃常為所困吐蕃每謂之曰我非謀于爾國假爾道以攻四鎮自嵩此征之後不敢西向趙頥貞為安西副大都督開元十六年敗吐蕃於曲子城王君㚟為河西隴右莭度使開元十六年吐蕃将悉諾邏率衆入㓂大小谷又移攻甘州焚燒市里而去君㚟候其兵疲整士馬以掩其後㑹大雪賊徒凍死者甚衆賊遂取磧石軍西路而還君㚟令副使馬元慶禆将軍李車蒙追之不及君㚟先令人潛入賊境於歸路燒草悉諾邏還至大非山将息甲牧馬而野草皆盡馬死過半君㚟與秦州都督張景慎等率襲其後入至青海之西時海氷合将士並乗氷而度㑹悉諾邏已度大非山輜重及疲兵尚在青海之側君㚟縱兵盡俘獲之及羊馬數萬君㚟以功遷右羽林軍大将軍張審素為嶲州都督開元十七年攻破蠻拔昆明城及監城殺獲萬人王忠嗣為左威衛郎将專知行軍兵馬開元二十一年秋吐蕃大入忠嗣以所部策馬而前殺數百人賊衆遂亂三軍翼而擊之吐蕃大敗忠嗣以功最詔拜左金吾衛将軍天寶中累遷河東朔方莭度使頻戰青海磧石皆大尅捷又伐吐渾於墨離虜其全國而歸張守珪為幽州長史河北莭度副大使開元二十二年發兵討契丹斬其王屈烈及其大臣可突千等傳首東都餘衆及叛奚皆散山谷立其酋長李過析為契丹王二十五年為幽州莭度使破契丹餘黨於榛禄山殺獲甚衆葢嘉運為磧西莭度使開元二十七年大破突騎施于碎葉城之東賀邏嶺擒可汗吐火仙及葉䕶特勒及弟撥斯獲駞馬牛羊數千計初嘉運銜命招輯突騎施拔汗那巴西諸國㑹突騎施可汗蘇禄死其子吐火仙嗣立與葉䕶特勒首領都磨度竊據碎葉城又引黒姓可汗爾微特勒據怛邏斯城以拒官軍嘉運自率精兵攻碎葉與火仙接戰火仙棄旗而走遂擒之分遣疎勒鎮守使夫蒙靈詧綂驍雄與拔汗那王俱進掩其不僃遂入怛邏城斬可汗爾微特勒及弟撥斯其黨遂遁及入曵建城因收得交河公主及獲蘇禄可敦爾微可敦遂收諸散落百姓凡數萬人悉付拔汗郍王阿悉爛達于以歸諸國皆來降附裴敦復為河南尹天寶三載屬狂賊吳令光扇聚兇黨於四明間據海以叛詔敦復持莭率晉陵太守劉巨鱗綂兵討之敦復既至江夏賊黨自潰生擒令光以獻𤣥宗嘉其功拜刑部尚書王難得為金吾衛郎将天寶初以并定戎城破木栅功授威衛羽林将軍七載從哥舒翰擊吐蕃於磧石軍擒吐渾王子悉弄恭及子壻悉頰藏累拜左武衛大將軍充關西遊奕使九載破吐蕃收其五橋又破樹敦域加白水軍使十三載從收九曲加特進至德中為鳯翔都知兵馬使難得後遇安慶緒於淦陽誘以入壁擊破之封瑯邪郡公髙仙芝為安西副都䕶四鎮都知兵馬使小勃律國王為吐蕃所招妻以公主西北二十餘國皆為吐蕃所制貢獻不通節度使田仁琬葢嘉運夫蒙靈詧累討之不捷天寳五載特勅仙芝以馬歩萬人為行營節度往討之自安西行十五日至撥換城三十餘日至握瑟德又十餘日至疎勒又二十餘日至葱嶺守捉又二十餘日至播宻川又二十餘日至特勒滿川仙芝乃分為三軍使疎勒守捉趙崇玭綂三千騎趋吐蕃連雲堡自北谷入使撥換守捉賈崇瓘自赤佛堂路入仙芝與中使邉令誠自䕶宻國入約七月十三日辰時㑹于連雲堡遂登山挑擊從辰至巳大破之至夜奔逐殺四五千人生擒千人餘並走散得馬千餘匹軍資器械不可勝數仙芝遂進至勃律國招諭其王并公主出降並平其國六載八月仙芝虜勃律王及公主取赤佛堂路班師制授仙芝鴻臚卿攝御史中丞代靈詧為四鎮莭度使九載将兵討石國平之獲其王以歸哥舒翰為隴右莭度使先是吐蕃石堡城路逺而險久不拔天寶八載詔翰率河東西靈武及突厥阿布思等兵士六萬三千攻城拔之更名神武軍分兵鎮守翰以功拜鴻臚員外卿李忠臣本姓董名秦天寳中歴仕幽州莭度薛楚玉張守珪安禄山等頻征討積功勞遷折衝郎将左武衛将軍同正平盧軍先鋒使及安禄山反與其倫輩宻議殺偽莭度使吕知誨立劉正臣為莭度使正臣以忠臣為兵馬使攻長楊戰獨山襲榆關北平殺賊将申子貢榮先欽擒周釗送京師忠臣功多又從正臣破漁陽逆將李歸仁李咸白秀芝等来拒戰約十合並摧破之無何潼闗失守郭子儀李光弼退師忠臣乃引軍北歸奚王阿篤孤初以衆與正臣合後乃言請以萬餘騎同收范陽至后城南中夜反攻正臣忠臣與戰逐至温泉山破之擒大首領阿布離斬以祭纛釁鼓正臣卒又與衆議以安東都䕶王𤣥志為莭度使至德二年正月𤣥志令忠臣以歩卒三千自雍奴爲葦笩過海賊將石帝庭烏承洽来拒忠臣與董竭忠退之轉戰累日遂收魯城河間景城等大獲資粮以赴夲軍復與大将田神功率兵討平原樂安郡下之擒偽刺史臧瑜等防河招討使李銑承制以忠臣為德州刺史屬史思明歸順河南莭度張鎬令忠臣以兵赴鄆州與諸軍收河南州縣又與禆将楊惠元大破賊將王福德于舒舍口肅宗累下詔褒慰仍令鎮濮州尋移韋城乾元元年九月改光禄卿同正其年與郭子儀等九莭度圍安慶緒於相州明年二月諸軍潰歸忠臣亦退至滎陽賊将敬釭来襲官船忠臣大破之獲米二百餘艘以資汴州軍士尋拜濮州刺史縁河守捉使移鎮杏園渡及史思明陷汴州莭度使許叔冀與忠臣並力屈降賊思明撫忠臣背曰吾比只有左手今得公兼有右手矣與俱冦河陽數日忠臣夜以五百人斫其營突圍歸光弼光弼以聞詔加開府儀同三司殿中監同正賜實封二百户召至京師賜姓李氏名忠臣封隴西郡公賜良馬庄宅銀器綵物等時陜西神策兩節度郭英乂衛伯玉鎮陜州以忠臣為兩軍莭度兵馬使魚朝恩亦在陜俾忠臣與賊将李歸仁李感義等戰於永寧莎栅前前後數十陣皆摧破之㑹淮西節度王仲昇為賊所擒寳應元年七月拜忠臣太常卿同正兼御史中丞淮西十一州莭度使尋加安州刺史仍鎮蔡州其年令忠臣㑹元帥諸軍收復東都二年六月就加御史中丞時廻紇可汗既歸其國留判官安恪石帝庭于河南守禦財物因此招聚亡命為㓂道路擁隔詔忠臣討平之永泰元年吐蕃犯西陲京師戒嚴代宗命中使追兵諸道多不時赴難使至淮西忠臣方㑹鞠即令整師飾駕監軍大将固請曰軍行須擇吉日忠臣奮臂於衆曰焉有父母遇宼難待擇好日方救患乎即日進發自此方隅有警忠臣必先期而至繇是代宗嘉其忠莭加夲道觀察使寵賜頗厚及同華節度周智光舉兵反詔忠臣與神策軍将李太清討平之大厯三年檢校工部尚書加實封通前三百戸五年加蔡州刺史七年檢校右僕射知省事李靈曜之叛田承嗣使姪悦援之忠臣與諸軍大破悦等汴州平郭子儀為朔方節度兵馬使天寶十四載安禄山反詔以子儀為衛尉卿充朔方節度使率夲軍東討遂舉軍出單于府收静邉軍斬賊将周萬頃傳首闕下禄山使大同軍使髙秀巖㓂河曲子儀大破之進收雲中馬邑開東陘以功加御史大夫十五載二月與太原節度使李光弼出井陘拔常山郡破史思明於九門又南拔趙郡生擒四千人皆捨之斬偽太守郭獻璆獲器械數十萬進軍而南思明以數萬衆躡其後子儀與光弼選驍騎五百人更挑之三日至行唐賊疲乃退因乗之大破於沙河㑹𤣥宗西幸於是光弼保太原子儀朝於靈武至德元年加武部尚書平章事賊将阿史那從禮以蕃虜五千騎出塞門誘河曲九蕃府六胡州部落數萬皆從叛子儀率諸将合擊大破之斬獲不可勝計河曲平子儀入塞而南收河東郡擊走偽将崔乾祐二年四月進位司空充關内河東副元帥是年九月副廣平王東征子儀率㢠廻紇及南蠻大食之衆十五萬屯京西南隅陳於洨水西鎮北庭節度使李嗣業為前軍闗内莭度王思禮為後軍子儀奉元帥為中軍彌亘三十里賊将李歸仁安守忠衆十萬陣於其北歸仁先薄我軍我軍将亂李嗣業前衝之殺十餘騎乃定廻紇以竒兵出其後而夾攻之賊軍大潰斬首六萬級偽将張通儒等走陜州翼日子儀整軍入京師遂收華隂𢎞農數日而東十月安慶緒悉師屯陜西負山為陣子儀以大軍攻其前廻紇登山乗其背遇賊潜師於山中與鬬過期大軍稍却賊分兵三千人絶我歸路衆心大揺子儀麾廻紇令進盡殺之潜師馳至其後於黄埃中發十數矢賊驚顧曰㢠廻紇来廻紇来乃大潰僵屍遍山澤遂復東都以功加司徒封代國公食邑千戸乾元元年九月與李光弼等九節度之師討安慶緒大敗之獲偽鄭王安慶和以獻遂收衛州廣德元年十月吐蕃陷涇州虜刺史髙暉暉遂與蕃軍為鄉道引賊深入京畿掠奉天武功濟渭而南縁山而東渭北行營兵馬使吕日将逆戰于盩厔自辰至酉殺蕃軍數千然其徒多殞賊将逼京師代宗計無所出遽詔子儀為關内副元師出鎮咸陽子儀自相州不利李光弼代掌兵柄及徵還朝廷部曲散去及是承詔部下唯二十騎强取民家畜産以助軍至咸陽蕃軍已過渭水其日天子避狄幸陜州子儀聞帝避狄雪涕還京至則軍駕已發射生将王獻忠從駕㳂路遂以四百騎判乃逼豐王已下十王欲投於賊子儀入開逺門遇之詰豐王等所向遂䕶送行在子儀以三千騎傍南山至商州得武關防兵及六軍散卒四千招輯士衆其軍漸振蕃冦犯京城得故邠王守禮孫廣武王承宏立帝號假署百官子儀遣六軍兵馬使張知節烏崇福羽林軍使長孫全緒等将兵萬人為前鋒營於韓公堆盛張旗幟鼓鞞震山谷全緒遣禁軍舊将王甫入長安隂結少年豪俠以為内應一日齊擊鼓於朱雀街蕃軍惶駭而去大将李忠義先屯兵苑中渭北莭度使王仲昇守朝堂子儀以大軍續進至滻西而射生将王撫自署為京兆尹聚兵二千人擾亂京城子儀召撫殺之詔子儀權京城留守子儀子晞少善騎射常従父以戰功授左賛善大夫又從收復二京力戰於陜西加銀青光禄大夫鴻臚卿同正叛兵殺其帥李國貞荔非元禮於絳州詔以子儀至絳州誅首亂者餘黨頗不安将謀復亂晞選精卒四千以侍其父常持弓警夜不寐者凡七日謀亂者不敢動以功拜殿中監同正廣德二年僕固懐㤙誘吐蕃廻紇来冦加晞御史中丞領朔方軍前鋒擊破之其冬懐㤙又以吐蕃及廻紇冦邠州陣於涇北子儀令晞将步兵五千騎五百出西南擊之以兵少相持不戰及暮乗其退半渡擊大破之斬首五千級連戰皆破之李光弼為河東莭度副使知莭度事天寶十五載以朔方兵五千㑹郭子儀軍東下井陘攻收常山郡賊将史思明率衆數萬来援常山光弼擊破之進收藁城等十餘縣南攻趙郡拔之授河北莭度使與賊将蔡希德史思明尹子竒戰於常山郡之嘉山大破賊黨斬首萬計生擒四千思明露髪跣足奔於博陵河北歸順者十餘郡是嵗𤣥宗幸蜀肅宗即位於靈武改元至德光弼赴行在除戸部尚書北京留守以景城河間之卒五千赴太原二年正月賊将史思明蔡希德髙秀巖牛庭玠等四偽帥衆十餘萬来攻光弼率敢死之士出擊大破之斬首七萬餘級軍資器械一皆委棄以功轉檢校司徒收清夷横野等軍擒賊将李𢎞義以歸拜守司空乾元二年為天下兵馬元帥趙王係之副知節度行營事河北節度支度營田經畧等使與九莭度兵圍安慶緒於相州史思明自范陽来救屢絶粮道光弼身先士卒苦戰勝之思明既殺慶緒即偽位縱兵河南光弼以太尉兼侍中代郭子儀為朔方莭度兵馬副元帥以東師委之光弼至河陽思明於河陽城南築月城掘壕以拒光弼賊攻城光弼於中潬城西大破逆黨五千餘斬首千餘級生擒五百餘人溺死者大半光弼使將軍李抱玉守南城賊帥周摯攻之不下光弼置栅於中潬城外賊捨南城併力攻中潬光弼連麾三軍俱進聲動天地一鼓而賊大潰斬萬餘級生擒八千餘人軍資器械粮儲數萬計臨陣擒其大将徐璜玉李秦其大将安太清走保懐州思明不知摯等敗尚攻南城光弼悉驅俘囚臨河以示之殺數十人以威之餘衆俱投河赴南岸光弼皆斬之賊既敗走光弼收懐州思明来救迎擊於沁水之上又敗之月餘抜其城生擒安太清周摰楊希文等送於闕下以功進爵臨淮郡王後為河南淮南山南東道荆南等道副元帥出鎮臨淮史朝儀乗印山之勝冦申光等十三州自領精騎圍李岑於宋州光弼徑赴徐州以鎮之遣田神功擊敗之浙東賊首袁晁攻剽郡縣浙東大亂光弼分兵除討克定江左寶應元年進封臨淮王僕固懐恩為左領軍大将軍同正𨽻安西莭度使天寶末從郭子儀討髙秀巖於雲中破之又敗薛忠義於背度山下坑賊七千騎生擒忠義男襲下馬邑郡進軍與李光弼合勢及史思明戰于常山趙郡沙河嘉山皆大破之懐恩功居多肅宗即位於靈武懐恩從子儀赴行在所時同羅部落自西京叛賊北冦朔方子儀與懐恩擊之遂破同羅千餘騎於河上盡收其器械駞馬至德二年正月又從子儀下馮翊河東二郡走偽将崔乾祐子儀既為廣平王元帥之副懐恩領廻紇兵以從之破賊於陜西之新店收兩京皆立殊功以前後功加開府儀同三司鴻臚卿同正貟同莭度副使封豐國公乾元二年進封大寧郡王朔方行營節度使又從李光弼守河陽破周摰擒徐璜玉安太清拔懐州皆摧鋒陷敵功冠諸将寶應初以同平章事領河東朔方節度行營及鎮西廻紇兵馬㑹于陜州受天下兵馬元師雍王莭度懐㤙賈勇将廻紇兵前驅大破逆賊史朝義於雒陽朝義脱身潜遁殺賊十萬東都平遷左僕射兼中書今充河北副元帥乃席卷討除兩河諸州先為賊所陷者悉平旬日朝義傳首獻于闕下懐恩北拯幽薊所向披靡渾瑊初以戰功為中郎将天寶末安禄山反渾瑊從李光弼討河北郡縣賊将李立莭素稱驍勇瑊射殺之特拜右驍衛将軍旣而肅宗即位于靈州瑊統兵赴行在次天德軍遇蕃冦侵邉瑊又破之復從郭子儀收京都又圍相州破賊於新鄉改檢校太僕卿充右武鋒使又從僕固懐恩討史朝義戰功居多朝義平加開府儀同三司太常卿興元元年三月瑊為奉天軍行營兵馬副元帥四月與吐蕃首領論莾羅合軍破朱泚偽将韓炤等於武功瑊便赴奉天鳩合諸軍兵馬應李晟收京城朱泚既竄瑊率兵掩逐至岐陽已東仍令先鋒兵馬追躡至涇州賊将誅泚傳首来獻七月瑊為河中同陜虢等州節度及朔方行營副元帥令討李懐光與賊連戰數百陣貞元元年四月與諸軍大破賊衆降其驍将石崇憲尉遲珪徐庭光等遂收復同州長春宫至八月又與諸将總兵圍河中賊將牛名俊梟懐光首来降邢君牙為平盧兵馬使天寶末安禄山亂隨節度使侯希逸過海至青徐間田神功之討劉展君牙又從神功戰伐有功歴将軍試光禄卿神功既為兖鄆莭度君牙領防秋兵入鎮好峙時屬吐蕃陵犯代宗幸陜君牙𨽻屬禁軍扈從後又以戰功加鴻臚卿累封河間郡公建中初君牙𨽻禁軍扈從時河北諸莭帥叛換李晟率禁軍助馬燧等征之晟以君牙為都虞侯於武安襄國洹水魏縣清苑討賊有功君牙擒生斬級居多曲環天寶末為果毅别将安禄山亂從㐮陽莭度魯炤守鄧州拒賊賊將武令珣戰數十合環功居多超授左清道率别將兵守澤州破賊驍將安曉特拜羽林将軍又将别部兵合諸軍同討史朝義平河北累轉金吾大将軍並同正因隨李抱玉移軍京西大厯中領兵隴州頻破吐蕃加特進太常卿徳宗初嗣位吐蕃大冦劔南詔環以豳隴兵五千馳徃大破戎虜收七盤城威武及維茂二州西戎奔遁環大振功名還加太子賔客賜以名馬錦綵又與諸将討涇州叛將劉文喜平之拜開府儀同三司兼御史中丞充豳隴两軍都知兵馬使時李納擁兵侵逼徐州令環與劉𤣥佐同救援累破李納逆黨環以功最加御史大夫衛伯玉為諸衛貟外将軍肅宗即位興師靜難伯玉激憤思立功名自安西歸長安初為神策軍兵馬使出鎮陜州行營以功累遷右羽林軍大將軍元年建丑月以破永寧等縣逆賊功進位特進封河東郡公馬璘為安西禆校累遷至左金吾衛将軍同正至徳元年王室多難璘統甲士三千自二庭赴于鳯翔肅宗竒之委以東討殄冦陜郊破賊河陽皆立殊効明年蕃戎冦邉詔璘赴援河西廣徳初僕固懐恩不順誘吐蕃入冦代宗避狄陕州璘即日自河右轉鬬戎虜間至於鳯翔時蕃軍雲合鳯翔節度孫志直方閉城自守璘乃持滿外向突入懸門不解甲背城出戰吐蕃奔潰璘以勁騎追擊俘斬數千計血流於野繇是雄名益振代宗還宫召慰勞之授兼御史中丞永泰初拜四鎮行營莭度兼南道和蕃使委之禁旅俾清殘冦俄遷四鎮北庭行營莭度及邠寧莭度使兼御史大夫旋加檢校工部尚書以犬戎浸驕歳犯郊境涇州最隣戎虜乃詔璘移鎮涇州兼權知鳯翔隴右莭度副使涇原莭度涇州刺史四鎮北庭行營莭度使如故復以鄭滑二州𨽻之璘詞氣慷慨以破虜為己任既至涇州分建營伍繕完戰守之具頻破吐蕃以其生口俘馘来獻前後破吐蕃約三萬餘衆賀蘭進明為河南莭度至德二年收髙宻瑯邪等郡殺逆賊二萬餘衆王思禮為闗内莭度使至德二年從元帥廣平王收西京又從司徒郭子儀戰陕城曲沃新店賊軍既敗又於絳郡破賊六千餘衆器械山積馬牛十萬餘匹遷兵部尚書封崔國公乾元二年於潞城縣東直十嶺擊破史思明兵馬使楊是等一萬餘衆郝廷玉為太尉李光弼帳中愛将乾元中史思明再陷雒陽光弼拔東都之師保河陽時三城壁壘不完芻粮不支旬日賊将安太清等率軍數萬四面急攻光弼懼賊勢西犯河潼極力保孟津以掎其後晝夜嬰城血戰不解将士夷傷光弼召諸将訊之曰賊黨何面難抗或對曰西北隅最為勍敵乃亟召廷玉謂之曰兇渠攻西北者難奈爾為我決勝而還辭曰廷玉所領歩卒也願得騎軍五百光弼以精騎三百授之光弼法令嚴峻是日戰不利而還者不解甲斬之廷玉奮命先登流矢雨集馬傷不能軍而退光弼登堞見之駭然曰廷玉奔還吾事敗矣促令左右取廷玉首来廷玉見使者曰馬中毒箭非敗也光弼命易馬而復輕騎衝賊陣馳突數四俄而賊黨大敗於河壖廷玉擒賊將徐璜玉而還繇是賊解中潬之圍信宿退去前後以戰功累授開府儀同三司試太常卿封安邉郡王李抱玉為鄭陳潁亳四州莭度乾元中從太尉李光弼討史思明固河陽復懐州皆功居第一代宗即位擢為澤潞節度使加領陳鄭二州廣德元年冬吐蕃㓂京師乗輿幸陕州諸軍潰卒及村閭逋客相聚為盗京城南面子午等五谷羣盗充斥頗害居人朝廷遣薛景仙領兵為五谷招討使連月不捷乃詔抱玉兼鳯翔莭度使討之抱玉審探知賊帥行止之處先分屯諸谷乃設竒潜使輕鋭數百南自洋州入攻之賊帥髙玉方與諸偷㑹遽為鋭卒數十人掩擒之因大捷獲偷黨悉斬之餘黨不討自潰旬日内五谷平以功遷司空大厯十年抱玉奏大破吐蕃于隴州義寧縣册府元龜卷三百五十八
