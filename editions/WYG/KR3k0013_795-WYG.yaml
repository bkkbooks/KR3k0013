body:
  text: 册府元龜卷七百九十五宋王欽若等撰總録部先見伊尹曰予天民之先覺者也予將以斯道覺斯民也非予先覺之而誰也孔子曰抑亦先覺者是賢乎盖識在機先智周物表見於未萌明於未兆達於事變知微知彰導生人之耳目真賢人之高跡也辨興亡明理亂知進退定禍福立身行道以御于邦家不臻斯理未盡善也是故入境知化入國知政色斯舉矣翔而後集觀其容而辨其心聽其音而審其變鳥巢高而舊屋大識其政暴要我飲而樂不作知彼誠哀謂被髪而將戎覩超乘而必敗先見之明皆斯類也殷箕子為太師紂始為象箸箕子歎曰彼為象箸必為玉盃為玉盃則必思逺方珍怪之物而御之矣輿馬宫室之漸自此始不可振也周太公始封周公問何以治齊太公曰舉賢而上功周公曰後世必有簒弑之臣其後二十九世為彊臣田和所滅而和自立為齊侯周公始封太公問何以治魯周公曰尊尊而親親太公曰後世寖弱矣故魯自文公以後禄去公室政在大夫季氏逐昭公陵夷微弱三十四世而為楚所滅王孫滿周大夫也襄王二十四年秦師將襲鄭過周北門左右免胄而下超乘者三百乘王孫滿尚幼觀之言于王曰秦師必有讁王曰何故對曰師輕而驕輕則寡謀驕則無禮無禮則脫寡謀自陷入險而脫能無敗乎晉人敗諸殽獲其三帥丙術視芮良夫周大夫也周厲王說音悦榮夷公良夫曰王室其將卑乎夫榮公好專利而不知大難夫利百物之所生也天地之所載也而或專之其害多矣以是教王王能久乎夫王人者將導利而布之上下者也使神人百物無不得極猶日怵惕懼恐難之來也故頌曰思文后稷克配彼天立我蒸民莫匪爾極大雅曰陳錫載周是不布利而懼難乎故能載周以至于今今王學專利其可乎匹夫專利猶謂之盜王而行之其歸鮮矣榮公若用周必敗也厲王不聽卒以榮公為卿士諸侯不朝王流于彘史伯周大夫也鄭桓公為司徒甚得周衆與東土之人問於史伯曰王室多故余懼及焉其何所可以逃死史伯對曰王室將卑戎翟必昌不可偪也當成周者南有荆蠻申吕應鄧陳蔡隨唐荆蠻􅇗姓之蠻鬻熊之後申吕姜姓應蔡唐皆姬姓應武王子所封鄧曼姓陳媯姓也北有衞燕翟鮮虞路雒泉徐蒲衞康叔之封燕召公之封皆姬姓翟北翟也鮮虞姬姓在翟者也路雒泉徐蒲皆赤翟隗姓也西有虞虢晉隗霍揚魏芮八國皆姬姓虞虞仲之後虢虢叔之後西虢也東有齊魯曹宋滕薛鄒莒齊姜姓魯曹滕皆姬姓宋子姓也薛任姓鄒曹姓東夷也是非王之支子母弟甥舅也則皆蠻荆戎翟之人也非親則頑不可入也其濟雒河潁之間乎是其子男之國虢鄶為大虢東虢仲之後姬姓也鄶姫姓當幽王時於子男此二國為大虢叔恃勢鄶仲恃險是皆有驕侈怠慢之心而加之以貪冐君若以周難之故寄孥與賄焉不敢不許妻子曰孥賄財也周亂而弊是驕而貪必將背君君若以成周之衆奉辭伐罪無不克矣若克二邑二邑虢鄶鄢蔽補丹依㽥厯莘君之土也言克虢鄶則此八國皆可得若前莘後河右雒左濟主芣騩而食溱洧修典刑以守之惟是可以少固公曰南方不可乎對曰惟荆實有昭德若周衰其必興矣姜嬴荆芈實與諸姬代相干也姜齊姓嬴秦姓荆芈楚也代更干犯也言其代强更相犯也姜伯夷之後也伯夷堯秩宗炎帝之後四岳之族也嬴伯翳之後也伯翳舜虞官少皥之後伯益也伯夷能禮於神以佐堯者也伯翳能議百物以佐舜者也百物草木鳥獸議使各得其所也其後皆不失祀而未有興者周衰其將至矣公曰謝西之九州何如謝宣王之舅申伯之國今在南陽謝西有九州二千五百家曰州也對曰其民沓貪而忍不可因也惟謝郟之間間謂郟南謝北也虢鄶取在焉郟後屬鄭鄭衰楚之魯昭公元年𫝊曰葬王于郟謂之郊敖者是也其冢君侈驕其民怠沓其君而未及周德怠慢也忠信為周言民慢黷其君而未及於忠信也若更君而周訓之是易取也更以君道道之則易取且可長用也長用乆處公曰周其弊乎對曰殆於必弊者太誓曰民之所欲天必從之今王棄高明昭顯而好讒慝暗昧惡角犀豐盈而近頑童窮固角犀謂顔角冇伏犀豐盈謂頰輔豐滿皆賢明之相也去和而取同夫和實生物同則不繼以他平它謂之和故能豐長而物生之若以同禆同盡乃棄矣故先王以土與金木水火雜以成百物是以和五味以調口剛四支以衞體和六律以聰耳正七體以役心役營也七體首七竅謂目為心視耳為心聽口為心談鼻為心芳平八索以成人平正也八索者謂八體以應八卦乾為首坤為腹震為足㢲為股離為目兊為口坎為耳艮為手建九紀以立純徳建立也純純一不駁也九紀九藏正藏五藏又有胃膀胱腹膽也紀所以紀性命立純德也周禮曰九藏之動也賈唐云九紀九功也合十數以訓百體所謂近取諸身逺取諸物也賈唐云十數自王以下位有十等王臣公公臣大夫大夫臣士士臣皂皂臣輿輿臣隸隸臣僚僚臣僕僕臣臺百體者百官各有體屬也合此十數之名以訓導百官之體也出千品具萬方百官有徹品十於王位謂之千品五物之官位陪屬萬位謂之萬方方道也計億事材兆物収經入行姟極計算也材裁也賈唐說皆以萬萬為億鄭司農云十萬曰億十億曰兆從古數也經嘗姟僃也數極於姟萬方曰姟自十等至千品萬方轉相生故有億事兆物王収其嘗入舉九姟之數也故王者居九畡之田収經入以食兆民周訓而能用之和樂如一夫如是和之至也於是乎先王聘后於異姓求財於有方擇臣取諫工而講以多物務和同也聲一無聽物一無文味一無果物一不講王將棄是類而與剸同天奪之明欲無弊得乎夫虢石父讒謟巧從之人也而立以為卿士與剸同也棄聘后而立内妾好窮固也侏儒戚施實御在側近頑童也周法不昭而婦言是行用讒慝也不建立卿士而妖試幸措行暗昧也試用也措置也不建立有德之人以為卿士而乃妖嬖之臣用之於位佞倖之臣置之於側者也是物也不可以久且宣王之時有童謡曰檿弧箕服實亡周國山桑曰檿弧箕木名服矢房也於是宣王聞之有夫婦鬻是器者王使執而戮之府之小妾生女而非王子也懼而棄之此人也収之以奔褒褒人有獄而以為入天之命此久矣其又可為乎訓語有之曰夏之衰也褒人之神化為二龍以同於王庭共處曰同而言曰余褒之二君也夏后卜殺之與去之與止之莫吉卜請其漦而藏之吉乃布幣焉而策告之龍亡而漦在櫝而藏之傳郊之至殷周莫之發也及厲王之末發而觀之漦流于庭不可除也王使婦人不幃而譟之裳正幅曰幃化為元黿以入于王府黿或為蚖蚖蜥蜴象龍府之童妾未既齓而遭之既笄而孕當宣王時而生不夫而育故懼而棄之夫為弧服者方戮在路夫婦哀其夜號也而取之以逸逃于褒褒人褒姠有獄而以為入于王褒姁褒君王遂置之置赦也而嬖是女也使至於為后而生伯服天之生此久矣其為毒也大矣將俟滛德而加之焉毒之酋腊者其殺也滋速精熟為酋腊極也滋益也申繒西戎方彊申姜姓幽王前后太子宜臼舅繒姒姓申之與國西戎亦黨於申周衰故戎狄强王室方騷將以縱欲不亦難乎王欲殺太子以成伯服必求之申申人弗畀必伐之畀予若伐申而繒與西戎會以伐周周不守矣繒與西戎方將德申申吕方强其隩愛太子亦必可知也凡周存亡不三稔矣君若欲避其難速規所矣時至而求用恐無及也公曰若周衰諸姬其孰興對曰其在晉乎公曰姜嬴其孰興對曰秦仲齊侯姜嬴之雋也且大其將興乎秦仲嬴姓附庸秦公伯之子為宣王大夫詩叙云秦仲始大齊侯齊莊公姜姓之有德者此二人為姜嬴之雋且國大故近興也公説乃東寄孥與賄虢鄶受之十邑皆有寄地十邑謂虢鄶鄢蔽補丹依㽥厯莘也後桓公之子武公取十邑之地而居之今河南新鄭是也幽王八年而桓公為司徒九年而王室始騷騷亂也十一年而斃及平王之末而秦晉齊楚代興衆仲魯大夫衞州吁弑桓公自立公問於衆仲曰衞州吁其成乎對曰臣聞以德和民不聞以亂亂謂阻兵而安忍以亂猶治絲而棼之也絲見棼縕益所以亂夫州吁阻兵而安忍阻兵無衆安忍無親衆叛親離難以濟矣恃兵則民殘民殘則衆叛安忍則過刑刑過則親離也夫兵猶火也弗戢將自焚也夫州吁弑其君而虐用其民於是乎不務令德而欲以亂成必不免矣秋衞人殺州吁于濮洩伯鄭大夫陳及鄭平陳五父如鄭涖盟及盟㰱如忘洩伯曰五父必不免不賴盟矣洩伯鄭洩駕良佐鄭大夫如陳涖盟亦知陳之將亂也入其國觀其政治故總言之也師服晉大夫也魯惠公之二十四年晉始亂故封桓叔于曲沃晉文侯卒子昭侯元年危不自安故封成師為曲沃伯靖侯之孫欒賓傅之靖侯桓叔之高祖父言得貴寵公孫為傅相師服曰吾聞國家之立也本大而末小是以能固故天子建國立諸侯也諸侯立家卿大夫稱家卿置側室側室衆子也得立此一官大夫有貳宗適子為小宗次子為貳宗以為相輔貳也士有隸子弟士卑自以其子弟為僕隸庻人工商各有分親皆有等衰庻人無復尊卑惟以親䟽為分别也衰殺也是以民服事其上而下無覬覦下不冀望上位今晉甸侯也而建國本既弱矣其能久乎又晉穆侯之夫人姜氏以條之役生太子命之曰仇條晉地太子文侯也意取於戰相仇怨其弟以千畝之戰生命之曰成師桓叔也西河界休縣南有地名千畝意取能成其衆師服曰異哉君之名子也夫名以制義名之必可言也義以出禮禮從義出禮以體政政以成禮政以正民是以政成而民聽易則生亂反易禮義則亂生也嘉耦曰妃怨耦曰仇古之命也自古有此言今君命太子曰仇弟曰成師始兆亂矣兄其替乎穆侯愛少子桓叔俱取於戰以為名所附意異故師服知桓叔之黨必盛於晉以傾宗國故因名以諷諫鬬伯比楚大夫也魯桓公十三年春楚屈瑕伐羅鬬伯比送之還謂其御曰莫敖必敗舉趾高心不固矣趾足也遂見楚子曰必濟師難言屈瑕將敗故以益師諷諫楚子辭焉不解其㫖故拒之入告夫人鄧曼鄧曼曰大夫其非衆之謂鄧曼楚武王夫人言伯比意不在於益衆也其謂君撫小民以信訓諸司以德而威莫敖以刑也莫敖狃於蒲騷之役將自用也狃㐲也蒲騷役十一年必小羅君若不鎭撫其不設僃乎夫固謂君訓衆而好鎭撫之撫小民以信也召諸司而勸之以令德訓諸司以徳也見莫敖而告諸天之不假易也諸之也言天不借貸慢易之人威莫敖以刑也不然夫豈不知楚師之盡行也楚子使賴人追之不及羅大敗之莫敖縊于荒谷騅甥􅅨甥養甥皆鄧祁侯之甥莊公六年楚文王伐申過鄧鄧祁侯曰吾甥也祁諡也姊妹之子曰甥止而享之三甥請殺楚子皆鄧甥仕於舅氏也鄧侯弗許三甥曰亡鄧國者必此人也若不早圖後君噬臍若腹臍喻噬不可及其及圖之乎圖之此為時矣鄧侯曰人將不食吾餘言自害其甥必為人所賤對曰若不從三臣抑社稷實不血食而君焉取餘言君無復餘弗從還申年楚子伐鄧伐申還之年十六年楚復伐鄧滅之原伯周大夫也莊公二十年冬王子頺享五大夫樂及徧舞皆舞六代之樂鄭伯聞之見虢叔叔虢公字曰寡人聞之哀樂失時殃咎必至今王子頽歌舞不倦樂禍也夫司寇行戮司寇刑官君為之不舉去盛饌而况敢樂禍乎奸王之位禍孰大焉臨禍忘憂憂必及之莊二十一年鄭伯殺子頺享王于闕西辟樂僃闕象魏也樂備備六代之樂也原伯曰鄭伯效尤其亦將有咎原伯原莊公也言效子頽舞徧樂也五月鄭厲公卒史蘇晉大夫也獻公伐驪戎克之滅驪子獲驪姬以歸立為夫人生奚齊其娣生卓子驪姬請使申生處曲沃以速縣縣縊也重耳處蒲城夷吾處屈奚齊處絳以儆無辱之故公許之史蘇朝告大夫曰二三大夫其戒之乎亂本生矣伐木不自其本必復生塞水不自其源必復流滅禍不自其基必復亂基始也今君滅其父而蓄其子禍之基也蓄其子又從其欲子思報父之恥而信其欲雖好色必惡心好美也不可謂好好其色必授之情彼得其情以厚其欲厚益也從其惡心必敗國且深亂必自女戎三代皆然驪姬果作難殺太子而逐二公子二公子重耳奔翟夷吾奔梁君子曰知難本矣謂史蘇知難本士蒍晉大夫也魯閔公元年晉侯作二軍晉本一軍見莊十六年公將上軍太子申生將下軍趙夙御戎畢萬為右為公御右也夙趙衰兄也畢萬魏犨祖父也以滅耿滅霍滅魏平陽皮氏縣東南有耿永安縣東北有霍大山三國皆姬姓還為太子城曲沃賜趙夙耿賜畢萬魏以為大夫蒍曰太子不得立矣分之都城而位以卿先為之極又焉得立位以卿謂將下軍不如逃之無使罪至為吳太伯不亦可乎太伯周太王之適子知父欲立季厯故讓位而適吳猶有令名愈其及也言雖去猶有令名勝於留而及禍且諺曰心苟無瑕何恤乎無家天若祚太子其無晉乎為晉殺申生傳張本卜偃曰畢萬之後必大卜偃掌晉卜大夫萬盈數也魏大名也以是始賞天啓之矣天子曰兆民諸侯曰萬民今名之大以從盈數其必有衆僕人賛晉太子申生之僕也晉獻公使申生伐東山衣之偏之衣佩之金玦在中左右異故曰偏玦如環而缺以金為之僕人賛聞之曰太子殆哉殆危也君賜之奇奇生怪怪生無嘗無嘗不立奇異不立不得立使之出征先以觀之觀其用衆故告之以離心而示之以堅忍之權離心偏中分也堅忍金玦玦亦離傳曰金寒玦離則必惡其心而害其身矣惡其心必内險之險危害其身必外危之外危使之攻伐也危自中起難哉且是衣也狂夫阻之衣也狂夫方相氏之士也阻古詛字將服是衣必先詛之周禮方相氏黄金四目𤣥衣朱裳執戈揚盾以驅疫也其言曰盡敵而反言謂狂夫祭詛之言雖盡敵其若内讒何申生勝翟而反讒言作於中君子曰知微知微謂僕人賛舟之僑虢大夫也閔公二年虢公敗犬戎于渭汭犬戎西戎别在中國者渭水出隴西東入河水之隈曲曰汭舟之僑曰無德而禄殃將至矣遂奔晉明年晉滅虢虢射晉大夫也魯僖公八年晉里克帥師梁繇靡御虢射為右以敗狄于采桑傳言前年事也平陽北屈縣西南有采桑津梁繇靡曰狄無恥從之必大克不恥走故可逐里克曰懼之而已無速衆狄恐怨深而羣黨來報虢射曰期年狄必至示之弱矣夏狄伐晉報采桑之役也復期月明期年之言郭偃晉大夫也惠公既殺里克而悔之曰芮也使寡人過殺我社稷之鎭芮冀芮鎭重也偃聞之曰不謀而諫者冀芮也不圖而殺者君也不謀而諫不忠不圖而殺不祥不忠受君之罰不祥罹天之禍受君之罰死戮罹天之禍無後無後嗣志道者勿忘將及矣志識及至及文公入文公重耳秦人殺冀芮而施之冀芮既納文公又悔將殺之文公知之潜會秦伯于王城冀芮焚公宫求公不得遂如河上秦伯誘而殺之陳尸曰施宰孔周大夫也僖公九年齊㑹諸侯於葵丘宰孔先歸既會先諸侯而去遇晉侯曰可無會也晉侯欲來會葵丘齊侯不務德而勤逺畧故北伐山戎在莊公三十一年南伐楚在四年西為此會也東畧之不知西則否矣言或向東必不能復畧西其在亂乎君務靖亂無勤於行在察也微戒獻公言晉將有亂晉侯乃還卜偃晉大夫也僖公二年虢公敗戎于桑田桑田虢地在𢎞農陜縣東北卜偃曰虢必亡矣亡下陽不懼而又有功是天奪之鑒鑒所以自炤而益其疾也驕則生疾也必易晉而不撫其民矣不可以五稔稔熟也為下五年晉滅虢張本也内史過周大夫也魯僖公十一年周使内史過賜晉惠公命受玉惰過歸告王曰晉侯其無後乎王賜之命而惰於受瑞先自棄也已其何繼之有禮國之幹也敬禮之輿也不敬則禮不行禮不行則上下昬何以長世二十一年晉惠公卒子懷公立晉人殺之更立文公王孫說周大夫也周簡王八年魯成公朝周使叔孫僑如先聘且告見使先修聘且告將朝說與之語說言於王曰魯叔孫之來也必有異焉其享覲之幣薄而言謟殆請之也若請之必欲賜也魯執政惟彊故不歡焉而後遣之魯執政之人惟畏其强難拒其欲故不歡說而後遣之也且其狀方上而銳下宜觸冐人王其勿賜若貪凌之人來而盈其願是不賞善也且財不給故聖人之施捨也議之其喜怒取予也亦議之是以不主寛惠亦不主猛毅主猶名也主徳義而已賞得人罰當罪是為德義也王曰諾使私問諸魯請之也王遂不賜禮如行人及魯侯至仲孫蔑為介在賔為介上介所以佐相禮儀王孫說與之語説讓說說好也言蔑好讓也以語王王厚賄之辛有周大夫也初平王之東遷也周幽王為犬戎所滅平王嗣立故東遷雒邑辛有適伊川見被髪而祭於野者曰不及百年此其戎乎其禮先亡矣被髪而祭有象夷狄僖二十二年秋秦晉遷陸渾之戎于伊川石癸鄭大夫也鄭公子蘭出奔晉事晉文公甚謹晉文公欲入蘭為太子以告鄭石癸曰吾聞姞姓乃后稷之元妃姞姓之女為后稷妃其後當有興者子蘭母其後也且夫人子盡已死餘庻子無如蘭賢今圍急晉以為請利孰大焉遂許晉與盟卒而立子蘭為太子晉兵乃罷去蘭立是為繆公先軫晉大夫也秦晉戰于殽晉獲百里孟明視西乞術白乙丙以歸文公夫人秦女謂襄公曰秦欲得其三將戮之公許遣之先軫聞之謂襄公曰患生矣軫乃追秦將渡河已在舟中頓首謝卒不及後三年秦果使孟明伐晉報殽之敗取晉汪以歸叔仲惠伯魯人也魯文公九年冬楚使越椒來聘執幣傲叔仲惠伯曰是必滅若敖氏之宗傲其先君神弗福也宣四年楚滅若敖氏王子伯廖鄭大夫鄭公子曼滿與王子伯廖語欲為卿伯廖告人曰無德而貪其在周易豐離下震上豐之離豐上六變而為純離也周易論變故雖不筮必以變言其義豐上六曰豐其屋蔀其家闚其戸閴其无人三歲不覿凶義取无德而大其屋不過三歲必滅亡弗過之矣不過三年間一歲鄭人殺之晏桓子齊大夫也公孫歸父㑹齊侯于穀見晏桓子與之言魯樂桓子告高宣子桓子晏嬰父宣子高固也曰子家其亡乎懷於魯矣子家歸父字懷思也懷必貪貪必謀人謀人人亦謀己一國謀之何以不亡十八年歸父奔晉劉康公周卿士也魯成公十三年公及諸侯朝王遂從劉康公伐秦成子受脤于社不敬脤宜社之肉也盛以脤器故曰脤宜社者出兵祭社之名劉子曰吾聞之民受天地之中以生所謂命也是以有動作禮義威儀之則以定命也能者養之以福養威儀以致福不能者敗以取禍是故君子勤禮小人盡力勤禮莫如致敬盡力莫如敦篤敬在養神篤在守業國之大事在祀與戎祀有執膰膰祭肉也戎有受脤神之大節也交神之大節今成子惰棄其命矣惰則失中和之氣其不反乎為成肅公卒于瑕張本晉侯使趙同獻狄俘于周不敬劉康公曰不及十年原叔必有大咎原叔趙同也天奪之魄矣後晉人殺趙同士貞伯晉大夫也魯成公六年鄭伯如晉拜成謝前年再盟子游相子游公子偃也授玉于東楹之東禮授玉兩楹之間鄭伯行疾故東過士貞伯曰鄭伯其死乎自棄也已視流而行速不安其位宜不能久視流不端諦也行速不詳緩也季文子魯大夫也魯成公四年季文子相公如晉晉侯見公不敬季文子曰晉侯必不免言將不能壽終也詩曰敬之敬之天惟顯思命不易哉詩商頌言天道顯明受其命甚難不可不敬以奉之夫晉侯之命在諸侯矣可不敬乎申公巫臣晉大夫也魯成公八年晉侯使巫臣如吳假道於莒與渠丘公立于池上渠丘公莒子朱也池城池也渠丘邑名莒縣有渠里也曰城巳惡莒子曰辟陋在夷其孰以我為虞虞度也對曰夫狡焉狡猾之人思啓封疆以利社稷者何國蔑有惟然故多大國矣惟或思或縱也世有思開封疆者又有縱其暴掠者莒人當以此為戒勇夫重閉况國乎明年莒潰甯惠子名殖衞大夫也成公十四年衞定公享苦成叔甯惠子相苦成叔傲甯子曰苦成家其亡乎古之為享食也以觀威儀省禍福也故詩曰兕觥其觩㫖酒思柔彼交匪傲萬福來求今夫子傲取禍之道也後三年苦成家亡孟獻子魯大夫也成公十三年晉郤錡乞師于魯將事不敬獻子曰郤氏其亡乎禮身之幹也敬身之基也郤子無基且先君之嗣卿也受命以求師將社稷是衞而惰棄君命也不亡何為十七年郤氏亡矣又晉欒黶來乞師獻子曰有勝矣卑譲有禮故知其將勝楚又襄公十年六月鄭子耳伐宋七月侵魯西鄙九月侵宋北鄙孟獻子曰鄭其有災乎師競已甚競爭競也周猶不堪競况鄭乎周謂天王有災其執政之三士乎鄭簡公幼少子駟子國子耳秉政故知三士任其禍也為下盗殺三大夫傳韓獻子晉大夫也魯成公十五年晉三郤害伯宗譖而殺之及欒弗忌欒弗忌賢大夫伯州犁奔楚伯宗子韓獻子曰郤氏其不免乎善人天地之紀也而驟絶之不亡何待既殺伯宗又及弗忌故曰驟也十七年晉殺三郤初伯宗每朝其妻必戒之曰盜憎主人民惡其上子好直言必及於難范文子晉大夫也晉厲公敗荆於鄢而反文子謂其宗祝曰君驕泰而有烈夫以德勝者猶懼失之而况驕泰乎君多私今以勝歸私必昭昭私難必作吾恐及焉凡吾宗祝為我祈死先難為免七年夏范文子卒冬難作始於三郤卒於公長魚蟜晉大夫也厲公殺三郤長魚蟜乃脅欒中行而言于公曰不殺此二子者憂必及君公曰一旦而尸三卿不可益也對曰臣聞之亂在内為宄在外為姦禦宄以德禦姦以刑今治政而内亂不可謂德除鯁而避彊不可謂刑徳刑不立姦宄並至臣脆弱弗能忍俟也乃奔翟三月厲公弑單襄公周大夫也晉既克楚于鄢使郤至告慶于周未將事王叔簡公飲之酒王叔簡公周大夫王叔陳生也交酬好貨皆厚飲酒宴語相說也明日王叔子譽諸朝郤至見召桓公與之語召公以告單襄公曰王叔子譽溫季以為必相晉國相晉國必大得諸侯勸二三君子必先導焉可以樹今夫子見我以晉國之克也為己實謀之曰微我晉不戰矣楚有五敗晉不知乘我則彊之背宋之盟一也華元善楚令尹子重又善晉欒武子故遂合二國之盟在魯成十二年至十六年楚鄭背盟而伐宋薄德而以地賂諸侯二也鄭人不從楚以汝陰之田賂鄭鄭叛晉從楚也棄壯之良而用幼弱三也壯之良謂申叔時幼弱司馬子反建立卿士而不用其言四也夷鄭從之三陳而不整五也夷楚東之夷也三陳夷鄭楚罪不由晉晉得其民四軍之帥旅力方剛卒伍治整諸侯與之是有五勝也有辭一也得民二也軍帥彊禦三也行列治整四也諸侯輯睦五也有一勝猶足用也有五勝以伐五敗而避之者非人也不可以不戰欒范不欲我則彊之欒欒書范士燮戰而勝是吾力也且夫戰也微謀吾有三伐勇而有禮反之以仁吾三逐楚君之卒勇也見其君必下而趨禮也能獲鄭伯而赦之仁也若是而知晉國之政楚越必朝吾曰子則賢矣吾曰桓公自謂抑晉國之舉也不失其次吾懼政之未及子也郤子位在七人下故恐次未及也謂我曰夫何次之有昔先大夫荀伯自下軍之佐以政趙宣子未有軍行而以政今欒伯自下軍徃是三子也吾有過於四之無不及三子荀趙欒也得郤至四人言己之材反優於往四人也三人之中無有所不及若佐新軍而升為政不亦可乎將必求之是其言也君以為奚若襄公曰人有言曰兵在其頸其郤至之謂乎君子不自稱也非以讓也惡其蓋人也蓋揜夫人性凌上者也不可蓋也求蓋人其抑下滋甚故聖人貴讓且諺曰獸惡其網民惡其上今郤至在七人之下而上之是求蓋七人也其亦有七怨怨在小醜猶不可堪而况在侈卿乎其何以待之晉之克也天有惡于楚也故儆之以晉而郤至佻天以為己功不亦難乎佻天不祥乘人不義不祥則天棄之不義則民叛之且郤至何三伐之有夫仁禮勇皆民之為也以義死國謂之勇奉義順則謂之禮蓄義豐功謂之仁姦仁為佻姦禮為羞姦勇為賊有三姦以求替其上遠於德政矣以吾觀之兵在其頸不可久也雖吾王叔未能違難在太誓曰民之所欲天必從之王叔欲郤至能勿從乎郤至歸明年死難及伯輿之獄王叔陳生奔晉又柯陵之會單襄公見晉厲公視逺步高晉郤錡見單子其語犯犯凌犯人郤犨見其語迂犨晉卿錡之族父步揚之子苦成也迂迂囘加誣人郤至見其語伐伐好自伐其功齊國佐見其語盡盡者盡其心意善惡褒貶無所諱魯成公見言及晉難及郤犨之譖單襄公曰君何患焉晉將有亂其君與三郤其當之乎魯侯曰寡人懼不免於晉今君曰將有亂敢問天道乎抑人故也對曰臣非瞽史焉知天道臣見晉君之容而聽三郤之語矣殆必禍者也夫君子目以定體足以從之是以觀其容而知其心矣目以處義足以歩目今晉侯視逺而足高目不在體而足不步目其心必異矣目體不相從何以能久夫合諸侯國之大事也於是乎觀存亡故國將無咎其君在會步言視聽必皆無謫則可知德矣視逺日絶其義足高日棄其德言爽日反其信聽滛日離其名故不可不慎也偏䘮有咎喪亡也步言視聽四者而亡其一為偏䘮偏喪有咎咎及身也既喪則國從之既四者盡䘮國從而亡晉侯爽二吾是以云夫郤氏晉之寵人也三卿而五大夫可以戎懼矣高位實疾憤厚味實腊毒腊音昔厚味喻重禄腊亟也若酒之味厚者其毒亟今郤伯之語犯叔迂季伐伯錡也叔犨季至也犯則凌人迂則誣人伐則揜人有是寵也而益之以三怨其誰能忍之雖齊國子亦將與焉立於滛亂之國而好盡言以招其過怨之本也惟善人能受盡言齊其有乎吾聞之國德而鄰於不修必受其福國德己國有德也鄰於不修與不修徳者為鄰今君偪於晉而鄰於齊齊晉有禍可以取覇無德之患何憂於晉大夫長翟之人利而不義長翟之人叔孫僑如也父得臣敗翟于鹹獲長翟僑如因名其子為僑如好利不義通于穆姜欲逐季氏而專魯國其利淫矣流之若何言其所利驕淫之事流之放之者何也魯侯歸乃逐叔孫僑如簡王十一年諸侯會于柯陵十二年晉殺三郤十三年晉侯殺于翼東門葬以車一乘齊人殺國武子又晉孫談之子周適周事單襄公立無跛視無還聽無聳言無逺言敬必及天言忠必及意言信必及身言仁必及人言義必及利言智必及事言勇必及制言教必及辯言孝必及神言惠必及和言讓必及敵晉國有憂未嘗不慼有慶未嘗不怡襄公有疾召其子頃公而告之曰必善晉周將得晉國夫敬文之恭也忠文之實也信文之孚也仁文之愛也義文之制也智文之輿也勇文之帥也教文之施也孝文之本也惠文之慈也讓文之材也此十一者夫子皆有焉大子晉周天六地五數之常也天有六氣陰陽風雨晦㝠地有五行金木水火土也經之以天緯之以地以六氣為經以五行為緯而成之也經緯不爽文之象也文王質文故天祚之以天下夫子被之矣言文王質性有文德故得天下晉周則被服之可以得國其昭穆又近可以得國夫立無跛正也視無還端也聽無聳成也言無逺慎也夫正德之道也端德之信也成德之終也愼德之守也守終純固道正事信明令德矣慎成端正德之相也為晉休慼不背本也被文相德非國何取被服文德又以四行輔助之必得國也成公之歸也吾聞晉之筮之也遇乾之否曰配而不終君三出焉乾天也君也故曰配配先君也不終子孫不終為君也乾下變為坤坤地也臣也天地不交也故曰否變有臣象三爻故三世終上有乾乾天子也五亦天子五體不變周天子國也三爻有三變故君三出於周也一既往矣後之不知其次必此一謂成公已往為晉君也後之不知不知最後者在誰也其次必此次成公而往者必周且吾聞之成公之生也其母夢神規其臀以墨曰使有晉國三而畀驩之孫畀予也三世為君而更予驩之孫驩晉襄公名也孫曾孫周也自孫以下皆稱孫詩云周公之孫孫謂僖公故名之曰黑臀於今再稱矣襄公曰驩此其孫也此周子者晉襄公之孫也而令德孝恭非此其誰且其夢曰必驩之孫實有晉國其卦曰必三取君於周其德又可以君國三襲焉襲合也三合徳夢卦也吾聞之太誓故曰朕夢協于朕卜襲于休祥戎商必克以三襲也晉仍無道而鮮胄其將失之矣仍數鮮寡胄後也晉厲公數行無道晉公族之後又寡少殆將失國也必早善晉子其當之也頃公許諾及厲公之亂召周子立之是為悼公士莊子晉大夫也魯襄公十年三月齊高厚相太子光以先會諸侯于鍾離不敬呉子未至光從東道與諸侯會遇非本期地故不書㑹高厚高固子也士莊子曰高子相太子以會諸侯將社稷是衞而皆不敬厚與光俱不敬棄社稷也其將不免乎為十九年齊殺高厚二十五年殺其君光傳叔孫穆子魯大夫也襄公七年衞孫文子聘于魯公登亦登叔孫穆子相趨進曰諸侯之會寡君未嘗後衞君今吾子不後寡君未知所過吾子其少安孫文子亡辭亦亡悛容穆子曰孫子必亡為臣而君過而不悛亡之本也十四年孫子逐其君而外叛叔豫楚人也魯襄公二十一年夏楚子庚卒楚子使薳子馮為令尹訪于叔豫叔豫叔時孫叔豫曰國多寵而王弱王弱政教微多寵而貴臣强國不可為也遂以疾辭方暑闕地下氷而牀焉重繭衣裘鮮食而寢繭綿衣楚子使醫視之復曰瘠則甚矣瘠瘦也而血氣未動言無疾乃使子南為令尹子南公子追舒也二十二年殺追舒臧紇魯大夫也魯襄公二十三年齊侯將為臧紇田與之田邑臧孫聞之見齊侯與之言伐晉齊侯自道伐晉之功對曰多則多矣抑君似鼠夫鼠晝伏夜動不穴於寢廟者畏人故也今君聞晉之亂而後作焉作起兵也寧將事之非鼠而何乃弗與田臧孫知齊侯將敗不欲受邑故以鼠比之欲使其怒而止仲尼曰知之難也有臧武仲之知謂能辭齊禍而不容于魯國抑有由也作不順而施不恕也夏書曰念兹在茲逸書也念此身言行事當常念在己身也順事恕施也然明鄭大夫也魯襄公二十四年冬晉侯嬖程鄭使佐下軍代欒盈也鄭行人公孫揮如晉聘揮子羽也程鄭問焉曰敢問降階何由問自䧏下之道何由子羽不能對以語然明然明鬷蔑也然明曰是將死矣不然將亡貴而知懼懼而思降乃得其階階猶道也下人而已又何問焉且夫既登而求降階者知人也不在程鄭其有亡釁乎不然其有惑疾將死而憂也言鄭本小人為明年程鄭卒張本太叔文子衞大夫也魯襄公二十五年衞獻公自夷儀使與甯喜言求復國也甯喜許之太叔文子聞之太叔儀也曰嗚呼詩所謂我躬不說遑恤我後者甯子可謂不恤其後矣遑暇也詩小雅言今我不能自容說何暇念其後乎謂甯子必受禍不得恤其後也將可乎哉殆必不可君子之行思其終也思始終可成思其復也思其可復也書曰慎始而敬終終以不困逸書詩曰夙夜匪懈以事一人一人以喻君今甯子視君不如奕棊奕圍棊也其何以免乎奕者舉棋不定不勝其耦而况置君而弗定乎必不免矣九世之卿族一舉而滅之可哀也哉甯氏出自衞武公及喜九世也趙孟晉大夫也魯襄公二十七年鄭伯享趙孟于垂隴伯有賦鶉之賁賁鶉之賁賁詩􅅠風衛人刺其君淫亂鶉鵲之不若義取人之無良我以為兄我以為君也趙孟曰牀第之言不踰閾况在野乎非使人之所得聞也第簀也此詩刺淫亂故云牀第之言閾門限也使人趙孟自謂也卒享文子告叔向曰伯有將為戮矣詩以言志志誣其上而公怨之以為賓榮言誣則鄭伯未有其實趙孟倡賦詩有評上之言公怨之以為賓榮其能久乎幸而後亡言必先亡叔向曰然已侈所謂不及五稔者夫子之謂矣稔年也為三十年鄭殺良霄傳子産鄭大夫也魯襄公二十八年蔡侯歸自晉入于鄭鄭伯享之不敬子産曰蔡侯其不免乎不免禍日其過此也徃日至晉時君使子展迋勞於東門之外而傲迋往也吾曰猶將更之今還受享而惰乃其心也君小國事大國而惰傲以為己心將得死乎若不免必由其子其為君也淫而不父通太子班之妻僑聞之如是者恒有子禍為三十年蔡世子班弑其君𫝊三十年六月子產如陳蒞盟歸復命告大夫曰陳亡國也不可與也不敢與結好聚禾粟繕城郭恃此二者而不撫其民其君弱植公子侈太子卑大夫傲政多門政不由一人以介于大國介問也能無亡乎不過十年矣為昭八年楚滅陳𫝊昭公十一年秋季孫意如會晉韓起齊國弱宋華亥衞北宫佗鄭罕虎曹人把人于厥憖謀救蔡也不書救蔡不能書鄭子皮將行子產曰行不逺不能救蔡也蔡小而不順楚大而弗德天將棄蔡以壅楚盈而罰之盈楚惡蔡必亡矣且喪君而能守者鮮矣三年王其有咎乎美惡周必復王惡周天元年楚子弑君而立嵗在大梁後三年十三歳星周復於大梁也晉人使狐父請蔡于楚弗許狐父晉大夫游吉鄭大夫也襄公二十八年鄭伯使㳺吉如楚歸復命告子展曰楚子將死矣不修其政德而貪昧于諸侯以逞其願欲久得乎周易有之在復震下坤上之頥震下艮上頥復上變得頥曰迷復凶復上六爻亂也復反也極隂反陽之卦上處極位迷而復反失道已逺逺而無應故凶其楚子之謂乎欲復其願謂欲得鄭朝以復其願而棄其本不修德復歸無所是謂迷復失道已逺又無所歸能無凶乎君其往也送葬而歸以快楚心言楚君必死君往當送之楚不幾十年未能恤諸侯也幾近也言失道者復之亦逺吾乃休吾民矣休息也言楚不能復為害是年鄭伯如楚康王卒汝齊晉大夫也襄公二十九年齊高子容與宋司徒見晉知伯汝齊相禮賓出汝齊語知伯曰二子皆將不免子容專司徒侈皆亾家之主也專則速及侈將以其力斃專則人實斃之將及矣九月高子出奔燕季札呉公子也魯襄公二十九年來聘遂聘于齊說晏平仲謂之曰子速納邑與政納歸之公無邑與政乃免於難齊國之政將有所歸未獲所歸難未歇也歇盡也故晏子因陳桓子以納政與邑是以免於欒高之難穆叔魯大夫也襄公三十一年穆叔㑹晉歸告孟孝伯曰趙孟將死矣其語偷不似民主且年未盈五十而諄諄焉如八九十者弗能久矣若趙孟死為政者其韓子乎吾子盍與季孫言之可以樹善君子也孝伯曰人生幾何誰能無偷朝不及夕將焉用樹穆叔告人曰孟孫將死矣吾語諸趙孟之偷也而又甚焉九月孟孝伯卒又襄公作楚宫適楚好其宫歸而作之穆叔曰太誓云民之所欲天必從之今尚書太誓亦無此文故諸儒疑之君欲楚也夫故作其宫若不復適楚必死是宫也俄而公薨于楚宫立胡女敬歸之子子野子野卒立敬歸之娣齊歸之子公子稠齊諡稠昭公名穆叔不欲曰太子死有母弟則立之無則立長立庻子則以年年均擇賢義均則卜古之道也先人事後卜筮也義均謂賢等也非適嗣何必娣之子言于野非適嗣且是人也居喪而不哀在慼而有嘉容是謂不度不度之人鮮不為患若果立之鮮不為季氏憂武子不聽卒立之比及葬三易衰衰袵如故衰言其嬉戲無度於是昭公十九年矣猶有童心君子是以知其不能終也為昭公二十五年公孫于齊傳北宫文子衞大夫也襄公三十一年衞侯在楚文子見楚令尹圍之威儀言於衞侯曰令尹似君矣將有他志雖獲其志弗能終也公曰子何以知之對曰詩云敬慎威儀惟民之則令尹無威儀民無則焉民所不則以在民上何以終世屈狐庸呉行人也魯襄公三十一年聘于晉狐庸巫臣之子也成七年適呉為行人通路也通呉之路晉趙文子問焉曰延州來季子其果立乎延陵州來季札邑巢隕諸樊在二十五年閽戕戴呉在二十九年戴呉餘祭也天似啓之何如對曰不立是二王之命也非啓季子也若天所啓其在今嗣君乎嗣君謂夷昧甚德而度德不失民民歸德度不失事審事情民親而事有序其天所啓也有吳國者必此君之子孫實終之季子守節者也雖有國不立言其三兄雖欲傳國與之終不肯立子服惠伯魯大夫也魯襄公薨滕成公來會葬惰而多涕惰不敬也子服惠伯曰滕君將死矣怠于其位而哀己甚兆於死所矣有死兆能無從乎劉定公周卿士也昭公元年周使劉定公勞晉趙孟因曰子弁冕以治民臨諸侯盍亦逺績禹功而大庇民乎對曰老夫罪戾是懼焉能恤逺吾儕偷食朝不謀夕何其長也劉子歸以語王曰諺所謂老將知而耄及之者其趙孟之謂乎為晉正卿以主諸侯而儕於𨽻人朝不謀夕棄神人矣神怒民叛何以能久趙孟不復年矣晏嬰齊大夫也齊侯使晏嬰請繼室于晉既成婚晏子受禮叔向從之宴相與語叔向曰齊其何如問興衰晏子曰此季世也吾弗知齊其為陳氏矣不知其他官惟知齊將為陳氏公棄其民而歸於陳氏棄民不恤齊舊四量豆區釡鍾四升為豆各自其四以登于釡四豆為區區斗六升四區為釡六斗四升登成也釡十為鍾六斛四斗陳氏三量皆登一焉鍾乃大矣登加也謂加舊量之一也以五升為豆五豆為區五區為釡則區二斗釡八斗鍾八斛以家量貸而以公量収之貸厚而収薄山木如市弗加於山魚鹽蜃蛤弗加於海賈如在山海不加貴民參其力二人於公而衣食其一言公重賦歛公聚朽蠧而三老凍餒三老謂上壽中壽下壽皆八十已上不見養遇也國之諸市屨賤踊貴刖足者多民人疾痛而或噢咻之噢咻痛念之聲謂陳氏也其愛之如父母而歸之如流水欲無𫉬民將焉辟之箕伯直柄虞遂伯戲四人皆舜後陳氏之先其相胡公大􅁎已在齊矣胡公四人之後周始封陳之祖大􅁎其妃也言陳氏雖為人臣然將有國其先祖鬼神已與胡公共在齊叔向曰然雖吾公室今亦季世也戎馬不駕卿無軍行言晉衰弱不能征討救諸侯也公乗無人卒列無長百人為卒言人皆非其人非其長庻人罷敝而宫室滋侈滋益也道殣相望餓死為殣而女富溢尤女嬖寵之家民聞公命如逃宼讎欒郤胥原狐續慶伯降在皂𨽻公姓晉舊臣之族也皂𨽻賤官政在家門大夫専政民無所依君日不悛以樂慆憂慆藏也悛改也公室之卑其何日之有言至今讒鼎之銘讒鼎名也曰昧旦丕顯後世猶怠昧旦早起也丕大也言夙興以務大顯後世猶懈怠况日不悛其能久乎晏子曰子將若何問何以免此難也叔向曰晉之公族盡矣肸聞之公室將卑其宗族枝葉先落則公從之肸之宗十一族同祖為宗也惟羊舌氏在而已肸又無子無賢子公室無度無法度幸而得死言得以壽終為幸豈其獲祀後皆如之又云齊晏來聘與叔向語叔向曰晉季世也公厚賦為臺池而不恤政在私門其可久乎晏子然之又田釐子乞事齊景公為大夫其収賦稅於民以小斗受之其粟予民以大斗行陰德於民而景公弗禁由此田氏得齊衆心宗族益强民思田氏晏子數諫景公弗聽已而使於晉與叔向私語曰齊國之政其卒歸于田氏者矣叔向晉大夫也聘于周發幣於大夫及單靖公靖公享之儉而敬賓禮贈餞視其上而從之宴無私送不過郊語說昊天有成命單之老送叔向告之曰異哉吾聞之曰一姓不再興今周其興乎其有單子也昔史佚有言曰動莫若敬居莫若儉德莫若讓事莫若咨單子之况我禮也皆有焉夫宫室不崇器無雕鏤儉也身聳除絜外内齊給敬也宴好享賜不踰其上讓也賓之禮事放上而動咨也如是而加之以無私重之以不殽能避怨矣其有不興乎且其語説昊天有成命頌之盛德也其詩曰昊天有成命二后受之成王不敢康夙夜基命宥密緝熈亶厥心肆其靖之是道成王之德也成王能明文昭能定武烈者也始於德讓中於信寛終於固龢故曰成單子儉敬讓咨以應成德單若不興子孫必蕃後世不忘詩曰其類維何室家之壼君子萬年永錫祚𦙍類也者不忝前哲之謂也壼也者廣裕人民之謂也萬年也者令聞不忘之謂也祚𦙍也者子孫蕃育之謂也單子朝夕不忘成王之德可謂不忝前哲矣膺保明哲以佐王室可謂廣裕民人矣若能類善物以混厚民人者必有章譽蕃育之祚則單子必當之矣單若有闕必茲君之子孫實續之不出於他矣魯昭公十一年葬齊歸公不慼晉士之送葬者歸以語史趙曰必為魯郊言昭公必出在郊野不能有國侍者曰何故曰歸姓也不思親祖不歸也姓生也言不思親則不為祖考所歸祐叔向曰魯公室其卑乎君有大喪國不廢蒐謂蒐比蒲有三年之喪而無一日之慼國不恤喪不忌君也忌畏也君無慼容不顧親也國不忌君君不顧親能無卑乎殆其失國單子會韓宣子于戚單子單成公視下言徐叔向曰單子其將死乎朝有著定著定朝内列位常處謂之表著會有表野會設表以為位衣有禬帶有結禬領㑹結𢃄結㑹朝之言必聞于表著之位所以昭事序也視不過禬結之中所以道容貌也言以命之容貌以明之失則有闕今單子為王官伯而命事於會視不登帶言不過歩貌不道容而言不昭矣不道不共不昭不從貌正曰共言順曰從無守氣矣是年單成公卒昭十三年楚公子干立韓宣子問叔向曰子干其濟乎對曰不就宣子曰同惡相求如市賈焉謂國人共惡相求者如市賈之人求利何為不就對曰無與同好誰與同惡言無黨於内當與誰共同好惡取國有五難有寵無人一也寵須賢人而固有人無主二也雖有賢人當須内主為應有主無謀三也謀策謀也有謀而無民四也有民而無德五也子干在晉十三年矣晉楚之從不聞達者可謂無人晉楚之士從子干游皆非達人族盡親叛可謂無主無釁而動可謂無謀為羇終世可謂無民亾無愛徵可謂無德楚人無愛念者王虐而不忌靈王暴虐無所畏忌將自亡子干渉五難以弑君誰能濟之有楚國者其棄疾乎君陳蔡方城外屬焉苛慝不作盜賊伏隠私欲不違民無怨心先神命之國民信之􅇗姓有亂必季實立楚之常也子干之官則右尹也數其貴寵則庻子也以神所命則又逺之民無懷焉將何以立宣子曰齊桓晉文不亦是乎指庻子而出奔對曰齊桓衞姬之子也有寵於僖公有鮑叔牙賓須無隰朋以為輔佐有莒衞以為外主齊桓公出奔莒自莒先入衞人助之也有高國以為内主國子高子皆齊之正卿從善如流施惠不倦有國不亦宜乎昔我文公狐季姬之子也有寵于獻公好學而不貳生十七年有士五人有先大夫子餘子犯以為腹心子餘趙衰有魏犨賈佗以為股肱有齊宋秦楚以為外主有欒郤狐先以為内主亾十九年守志彌篤惠懷棄民民從而與之文公有國不亦宜乎子干無施於民無援於外去晉晉不送歸楚楚不迎何以有國子干果不終焉卒立棄疾如叔向言也昭公十五年荀躒如周葬穆后籍談為介既葬除喪以文伯宴樽以魯壺籍談歸以告叔向叔向曰王其不終乎吾聞之所樂必卒焉今王樂憂若卒以憂不可謂終王一歲而有三年之喪二焉天子絶期惟服三年故后雖期通謂之三年喪也於是乎以喪賓宴又求彛器樂憂甚矣且非禮也彛器之來嘉功之由非由喪也三年之䘮雖貴遂服禮也天子諸侯除喪當在卒哭今王旣葬而除故譏其不遂王雖弗遂宴樂以早亦非禮也言今雖不能遂服猶當靜黙而便宴樂又失禮也禮王之大經也一動而失二禮無大經矣失二禮謂既不遂服又設宴樂言以考典考成也典以志經亡經而多言舉典將焉用之為二十二年王室亂傳趙文子問于叔向曰晉六將軍其孰先亡乎六將軍韓趙魏范中行知伯也對曰中行知氏文子曰何乎對曰其為政也以苛為察以切為明以刻下為忠以計多為功譬之猶廓華者也廓之大則大矣裂之道也故老子曰其政惛惛其民沌沌其政察察其民􅆙􅆙子服昭伯魯大夫也魯昭公十六年公在晉晉人止公以取鄭故也夏四月公至自晉晉人德公得歸子服昭伯語季平子昭伯惠伯之子子服囘也隨公從晉還曰晉之公室其將遂卑矣君幼弱六卿彊而奢傲將因是以習習實為常能無卑乎平子曰爾幼惡識國昭伯尚幼年平子不信其言冬十月季平子如晉葬昭公平子曰子服囘之言猶信自往見之乃信囘言子服氏有子哉有賢子也萇𢎞周大夫也魯昭公十七年秋晉侯使屠蒯如周請有事於雒與三塗屠蒯晉侯之膳宰也以忠諫見進雒雒水也三塗山名在陸渾南萇𢎞謂劉子曰客容猛非祭也其伐戎乎陸渾氏甚睦於楚必是故也君其僃之乃警戎備警戒以僃戎也欲因晉以合勢九月丁卯晉荀呉帥師渉自棘津河津名使祭史先用牲于雒陸渾人弗知師從之庚午遂滅陸渾數之以其二於楚也陸渾子奔楚其衆奔甘鹿甘鹿周地周大獲先警戎僃故獲魯昭公十八年春二月己卯周毛得殺毛伯過毛伯周大夫得過之族而代之也居位萇𢎞曰毛得必亡是昆吾稔之日也侈故之以昆吾夏伯也稔熟也侈惡積熟以己卯日與桀同而毛得以濟侈于王都不亡何待毛得果亡二十三年八月丁酉南宫極震經書紀云地震魯地也丁酉南宫極震周地亦震也為室所壓而死萇𢎞謂劉文公曰君其勉之先君之力可濟也文公劉蚠也先君謂蚠之父獻公亦立子猛未及而卒周之亾也其三川震謂幽王時也三川涇渭雒水也地動謂川崖摧也今西王之大臣亦震天棄之矣子朝在王城故謂西王東王必大克敬王居狄泉在王城之東故曰東王既而子朝亡鬬且楚大夫也廷見令尹子常鬬且楚大夫子常子嚢之孫嚢瓦也子常與之語問蓄貸聚馬歸以語其弟曰楚其亡乎不然令尹其不免乎吾見令尹令尹問蓄聚積實如餓豺狼焉殆必亡者也夫古者聚貨不妨民衣食之利聚馬不害民之財用國馬足以行軍國馬民馬也十六井為丘有戎馬一疋牛三頭足以行軍公馬足以稱賦公馬公之戎馬稱舉也賦兵賦也不是過也公貨足以賓獻賓享贈獻貢也家貨足以共用不是過也夫貨馬郵則闕於民郵過也民多闕則有離叛之心將何以封矣昔鬬子文三舍令尹無一日之積恤民之故也成王聞子文之朝不及夕也於是乎毎朝設脯一束糗一筐以羞子文至于今令尹秩之成王每出子文之祿必逃王止而後復人謂子文曰人生求富而子逃之何也對曰夫從政者以庇民也庇覆民多曠者而我取富焉是勤民以自封也死無日矣我逃死非逃富也故莊王之世滅若敖氏惟子文之後在至于今處鄖為楚良臣是不先恤民而後己之富乎今子常先大夫之後也先大夫子襄也而相楚君無令名于四方民羸餧日日已甚羸瘠日日甚也四境盈壘道殣相望盜賊司目民無所倣倣依是之不䘏而蓄聚不厭其速怨于民多矣積貨滋多蓄怨滋厚不亡何待夫民心之慍也慍怨若防大川焉潰而所犯必大矣犯敗子常其能賢於成靈乎成不禮於穆願食熊蹯不獲而死成王穆王之父欲黜商臣而立其弟職商臣圍成王王請食熊蹯而死不聽遂自殺蹯掌也靈王不顧於民一國棄之如遺迹焉子常為政而無禮不顧甚於成靈其獨何力以待之待猶衞也期年乃有柏舉之戰子常奔鄭昭王奔隨叔孫昭子名婼魯大夫也昭公十二年夏宋華定來聘通嗣君也宋元公新即位享之為賦蓼蕭弗知又不答賦蓼蕭詩小雅義取燕笑語兮是以有譽處兮樂與華定燕語也又曰旣見君子為龍為光欲以寵光賓也又曰宜兄宜弟令德壽豈言賓有令德可以壽樂也又曰和鸞雍雍萬福攸同言欲與賓同福祿者也昭子曰必亡宴語之不懷懷思也寵光之不宣宣掦也令德之不知同福之不受將何以在為二十年華定出奔傳二十一年三月葬蔡平公蔡太子朱失位位在卑不在嫡子位以長幼齒大夫送葬者歸見昭子昭子問蔡故以告昭子歎曰蔡其亡乎若不亡是君也必不終詩曰不解于位民之攸墍詩大雅今蔡侯即位而適卑身將從之十月蔡侯朱出奔楚其年秋七月日有食之於是叔輒哭日食意在於憂哭昭子曰子叔將死非所哭也八月叔輒卒二十五年春昭子聘于宋桐門右師見之右師樂大心居桐門語卑宋大夫而賤司城氏司城樂氏之大宗也卑賤謂其才德昭子告其人曰右師其亡乎君子貴其身而後能及人是以有禮惟禮可以貴身貴身故尚禮今夫子卑其大夫而賤其宗是賤其身也賤人人亦賤已能有禮乎無禮必亡師曠晉大夫也晉平公説新聲師曠曰公室其將卑乎君之明兆于衰矣夫樂以開山川之風以耀德於廣逺也風德以廣之風山川以逺之風物以聽之修詩以詠之修禮以節之夫德廣逺而有時節是以逺服而邇不遷叔孫豹魯大夫也晉趙武會諸侯於虢楚公子圍設服離衞設君服二人執戈陳設於前以自衛離陳也叔孫穆子曰楚公子美矣君哉美服似君鄭子皮曰二執戈者前矣禮國君行有二執戈者在前蔡子家曰蒲宫有前不亦可乎公子圍在會特緝蒲為王殿屏蔽以自殊異言既造王宫而居之服無所怪之也楚伯州犂曰此行也辭而假之寡君聞諸大夫譏之故言假以飾令尹過鄭行人揮曰假不反矣言將遂為君伯州犂曰子姑憂子晢之欲背誕也襄三十年鄭子晳殺伯有背命放誕將為國難言子但自憂此無為憂令尹不反戈也子羽曰當璧猶在假而不反子其無憂乎子羽行人揮當璧謂棄疾事在昭十三年言棄疾有當璧之命圍雖取國猶將有難無不憂之也齊國子曰吾代二子愍矣國子國弱也子謂子圍及伯州犂圍此冬便簒位不能自終伯州犂又尋為圍所殺故言可愍陳公子昭曰不憂何成二子樂矣言以憂生事事成而樂衞齊子曰茍或知之雖憂何害齊子齊惡也言先知雖有憂難無所損害宋合左師曰大國令小國共吾知共而已共承大國命不能知其禍福晉樂王鮒曰小旻之卒章善矣吾從之小旻詩小雅其卒章義取非惟暴虎憑河之可畏也不敬小人亦危殆王鮒從斯義故不敢譏議公子圍也退會子羽謂子皮曰叔孫絞而婉絞切也譏其似君反謂之美故曰婉宋左師簡而禮無所臧否故曰簡共事大國故曰禮樂王鮒字而敬字愛也不犯凶人所以自愛敬子與子家持之子子皮子家即蔡公孫歸生持之言無所取與也皆保世之主也齊衞陳大夫其不免乎國子代人憂子昭樂憂齊子雖憂弗害夫弗及而憂與可憂而樂與憂而弗害皆取憂之道也憂必及之太誓曰民之所欲天必從之逸書三大夫兆憂憂能無至乎開憂兆也言以知物其是之謂矣物類也察言以知禍福之類八年陳昭殺太子國弱齊惡當身各無患后子名鍼秦伯之弟也魯昭公元年后子出奔晉見趙孟曰吾子其曷歸問何時當歸對曰鍼懼選於寡君是以在此將待嗣君趙孟曰秦君何如對曰無道孟曰亡乎對曰何為一世無道國未艾也艾絶也國於天地有與立焉言欲輔助之者多不數世淫弗能斃也趙孟曰天乎對曰有焉趙孟曰其幾何對曰鍼聞之國無道而年穀和熟天賛之也賛佐助也鮮不五稔鮮少也少尚當厯五年多則不啻趙孟視蔭曰朝夕不相及誰能待五蔭日景也趙孟意衰以景自喻故言朝夕不及誰能待五后子出而告人曰趙孟將死矣主民翫歲而愒日翫惰也愒貪也其與幾何五年秦后子復歸于秦景公卒故也終五之年行人揮鄭大夫也昭公元年晉侯有疾鄭伯使公孫僑如晉聘與叔向言叔向出行人揮送之送叔向叔向問鄭故焉且問子晢對曰其與幾何言將敗不久無禮而好凌人怙富而卑其上弗能久矣沈尹戍楚莊王曾孫葉公諸梁父也魯昭公十九年冬楚人城州來沈尹戍曰楚人必敗十三年吴城州來今就城而取之昔吴滅州來在十三年子旗請伐之王曰吾未撫吾民今亦如之而城州來以挑呉能無敗乎侍者曰王施舍不倦息民五年可謂撫之矣戍曰吾聞撫民者節用於内而樹德於外民樂其性而無宼讐今宫室無量民人日駭勞罷死轉轉遷徙也忘寢與食非撫之也傳言平王所以不能霸昭二十四年楚子為舟師以略呉疆略行也行呉界將侵之沈尹戍曰此行也楚必亡邑不撫民而勞之呉不動而速之速召也呉踵楚躡楚踵跡而疆場無􅊀邑能無亡乎楚大夫胥犴勞王於豫章之汭汭水名楚公子倉歸王乗舟歸遺也倉及壽夢帥師從王壽夢楚大夫王及圉陽而還圉陽楚地吳人踵楚而邊人不備遂滅巢及鍾離而還鍾離不書告敗畧也沈尹戍曰亡郢之始於此在矣王一動而亡二姓之師二姓之師守巢鍾離大夫幾如是而不及郢詩曰誰生厲階至今為梗詩大雅厲惡階道梗病也其王之謂乎為定四年吴入郢傳閔馬父魯大夫也魯昭公二十二年周王子朝奔京叔鞅至自京師葬景王還言王室之亂也經所以書閔馬父曰子朝必不克其所與者天所廢也閔馬父閔子馬也所廢謂羣喪職秩者樂祁宋大夫也魯昭公二十五年春宋公享昭子賦新宫逸詩昭子賦車轄詩小雅周人思得賢女以配君子昭子將為季孫迎宋公女故賦之明日宴飲酒樂宋公使昭子右坐坐宋公右以相近言改禮坐語相泣也樂祁佐助宴禮退而告人曰今茲君與叔孫其皆死乎吾聞之哀樂可樂而哀而樂哀可哀而樂皆喪心也心之精爽是謂魂魄魂魄去之何以能久為此冬叔孫宋公卒𫝊公若從從昭子謂曹氏勿與魯將逐之曹氏宋元夫人曹氏告公公告樂祁樂祁曰與之如是魯君必出政在季氏三世矣文子武子平子魯君喪政四公矣宣成襄昭無民而能逞其志者未之有也國君是以鎮撫其民詩曰人之云亡心之憂矣詩大雅言無人則憂虞至魯君失民矣焉得逞其志靖以待命猶可動必憂為下公孫于齊傳子家子魯大夫也昭公在鄆季氏使孟懿子陽虎伐鄆陽虎季氏家臣伐鄆欲奪公鄆人將戰子家子曰天命不慆久矣慆疑也言棄君不疑使君亡者必此衆也言君據鄆衆以與魯戰必敗亡天既禍之而自福也不亦難乎猶有鬼神此必敗也嗚呼為無望也夫其死于此乎公使子家子如晉公徒敗于且知册府元龜卷七百九十五
