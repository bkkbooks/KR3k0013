body:
  text: 册府元龜卷四百三十七宋王欽若等撰將帥部強愎失士心強愎夫自任則小前訓攸非愎諫不從昔賢深戒矧夫握兵之要為人司命而胷臆是縱狼戾自專為識者之所非冒兵家之所忌而行之自若處之不疑至於敗事失機莫之知悔恃勇尚勝蓋其有素斯亦將將之道所宜深察者也荀瑶為晉大夫帥師圍鄭未至鄭駟𢎞曰知伯愎而好勝早下之則可行也行去也乃先保南里以待之保守也南里在城外知伯入南里門於桔柣之門鄭人俘酅魁壘酅魁壘晉士賂以致政欲使反為鄭閉其口而死將門攻鄭門知伯謂趙孟入之對曰主在此主謂知伯也言主在此何不自入知伯曰惡而無勇何以為子惡貌醜也簡子廢嫡子伯魯而立襄子故知伯言其醜且無勇何故立以為子對曰以能忍耻庶無害趙宗乎知伯不悛趙襄子由是惎知伯惎毒也遂喪之知伯貪而愎故韓魏反而䘮之後漢呂布為左將軍故琅邪相蕭建為臧覇所襲破得建資實布聞之自將歩騎向莒高順諌曰將軍攻殺董卓威震夷狄端坐顧眄逺近自然畏伏不宜輕自出軍如或不㨗損名非小布不從覇畏布引還抄暴果登城固守布不能㧞乃引還下邳順每諫布言凡破家亡國非無忠臣明智者也但患不見用耳將軍舉事不肯詳思輙喜言誤誤不可數也布知其忠然不能用袁紹為冀州牧與曹公相拒於官渡許攸説紹曰公無與曹相攻也急分諸軍持之而徑從他道迎天子則事立濟矣紹不從曰吾自當先圍取之張郃又説紹曰公雖連勝然勿與曹公戰也密遣輕騎鈔絶其南則兵自敗矣紹愎不從之紹後果敗周慎為車騎將軍張温裨將温討邊章章敗走温遣慎將三萬人追擊之叅軍事孫堅説慎曰賊城中無穀當外轉糧食堅願得萬人斷其運道將軍以大兵繼後賊必困乏而不敢戰若走入羗中并力討之則涼州可定也慎不從引軍圍榆中城而章遂分屯圍峽反斷慎運道慎乃棄輜重而退魏曹休為大司馬征呉於夾石口瑯邪太守孫禮諌以為不可深入不從而敗蜀關羽為前將軍攻曹仁於樊降于禁等威震華夏孫權遣使為子索求羽女羽罵辱其使不許婚權大怒典畧曰羽圍樊權遣使求助之敕使莫速進又遣主簿先致命於羽羽忿其淹遲又自己得于禁等乃罵曰狢子敢爾如使樊城㧞吾不能滅汝耶權聞之知其輕已偽手書以謝馬謖為諸葛亮叅軍亮伐魏㧞謖統大衆在前謖舍水上山舉措煩擾牙門將王平連䂓諫謖謖不能用大敗於街亭姜維為衞將軍議欲出軍伐魏征西大將軍張翼庭争以為國小民勞不宜黷武維不聽將翼等行進翼位鎮南大將軍維至狄道大破魏雍州刺史王經經衆死於洮水者以萬計翼曰可止矣不宜復進進或毁此大功維大怒曰為蛇畫足維竟圍經於狄道城不能克自翼建異論維心與翼不善然常牽率同行翼亦不得已而往呉朱桓為前軍性䕶非耻為人下每臨敵交戰節度不得自繇輙嗔恚憤激諸葛恪為荆揚二州牧督中外諸軍事恪有輕敵之心與魏戰克復欲出軍諸大臣以為數出罷勞同辭諫恪恪不聽中散大夫蔣延或以固争扶出恪乃著論諭衆意曰夫天無二日土無二王王者不務兼并天下而欲垂祚後世古今未之有也昔戰國之時諸侯自恃兵強地廣互有救援謂此足以傳世人莫能危恣情縱懷憚於勞苦使秦漸得自大遂以并之此既然矣近者劉景升在荆州有衆十萬財榖如山不及曹操尚微與之力競坐觀其強大吞滅衆袁北方都定之後曹操率三十萬衆來向荆州當時雖有智者不能復為畫計於是景升皃子交臂請降遂為囚虜凡敵國欲相吞即仇讐欲相除也有讐而長之禍不在巳則在後人不可不為逺慮也昔伍子胥曰越十年生聚十年教訓二十年之外呉其為沼乎夫差自恃強大聞此邈然是以誅子胥而無備越之心至於臨敗悔之豈有及乎越小於呉尚為呉禍况其強大者邪昔秦但得關西耳尚以并吞六國今賊皆得秦趙韓魏燕齊九州之地地悉戎馬之鄉士林之藪今以魏此古之秦土地數倍以呉與蜀比古六國不能半之然今所以能敵之但以操時兵衆於今適盡而後生者未悉長大正是賊㓜小未盛之時加司馬懿先誅王凌續自隕斃其子㓜弱而專彼大任雖有智計之士未得施用當今伐之是其厄會聖人急於趨時誠謂今日若順衆人之情懷偷安之計以為長江之險可以傳世不論魏之終始而以今日遂輕其後此吾所以長歎息者也自本朝來務在産育今者賊民歳月繁滋但以尚小未可得用耳若復十數年後其衆必倍於今而國家勁兵之地皆已空盡唯有此見衆可以定事若不早用之端坐使老復十數年畧當損半而見子弟數不足言若賊衆一倍而我兵損半雖復使伊管圖之未知如何今不達逺慮者必以此言為迂夫禍難未至而豫憂慮此固衆人之所迂也及於難至然後頓顙雖有智者又不能圖此乃古今所病非獨一時昔呉始以伍員為迂故難至而不可救劉景升不能慮十年之後故無以詒其子孫今恪無具臣之才而受大呉蕭霍之任智與衆同思不經逺若不及今日為國斥境俛仰年老而讐敵更強欲刎頸謝責寧有補邪今聞衆人或以百姓尚貧欲務閑息此不知慮其大危而愛其小勤者也昔漢祖時已幸有三秦之地何不閉關守險以自娯樂空出攻楚身被瘡痍介胄生蟣虱將士厭困苦豈甘鋒刃而忘安寧哉慮於長久不得兩存者耳每覽荆邯説公孫述以進取之圖近見家叔父表陳與賊争競之計未嘗不喟然歎息也夙夜反側所慮如此故聊疏愚言以達二三君子之末若一朝隕没志或不立貴令來世知我所憂可思於後衆皆以恪此論欲必為之辭然莫敢復難初滕𦙍與恪俱受遺詔輔政恪將悉衆伐魏𦙍諌恪不如按甲息師觀隙而動恪曰諸云不可者皆不見計筭懷居茍安者也而子復以為然吾何望乎夫以曹芳闇劣而政在私門彼之臣民固有離心今吾因國家之資藉戰勝之威則何往而不克哉於是遣衆出軍始失人心晉劉琨為并州都督屬石勒攻樂平太守韓據請救於琨而琨自以士衆新合欲因其銳以威勒箕澹諌曰此雖晉人久在荒裔未習恩信難以法御今内收鮮卑之餘穀外抄殘胡之牛羊且閉關守險務農息士既服化感義然後用之則功可立也琨不從悉發其衆命澹領歩騎二萬為前驅琨自為後繼勒先據險要設伏以擊澹大敗之一軍皆没茍晞為大將軍刑政苛虐縱情肆欲遼西閻亨以書固諌晞怒殺之晞從事中郎明預有疾居家聞之乃轝病諌晞曰皇晉遭百六之數當危難之機明公親禀廟筭將為國家除暴閻亨美士奈何無罪一旦殺之晞怒曰我自殺閻亨何關人事而轝病來罵我左右為之戰慄預曰明公以禮見進預欲以禮自盡今明公怒預其若逺近怒明公何昔堯舜之在上也以和理而興桀紂之在上也以惡逆而㓕天子且猶如此况人臣乎願明公且置是怒而思預之言晞有慚色甘卓為安南將軍梁州刺史鎮襄陽王敦稱兵卓露檄逺近率所綂致討次猪口王師敗績卓徑還襄陽何無忌及家人皆勸令自警卓轉更很愎聞諌輙怒方散兵使人佃而不為備功曹榮建固諌不納襄陽太守周慮等密承敦意知卓無備詐言湖中多魚遣卓左右皆捕魚乃襲害卓於寢傳首於敦庾亮為中書令蘇峻之役假節督諸軍司馬陶回謂亮曰峻知石頭有重戍不敢直下必向小丹陽南道歩來宜伏兵要之可一戰而擒亮不從峻果繇小丹陽經秣陵迷失道逢郡人執以為鄉導時峻夜行甚無部分亮聞之深悔不從回言殷浩為揚州刺史與桓温不恊時王羲之以國家之安在於内外和同因與浩書以戒之浩不從及浩將北伐羲之以為必敗以書止之言甚切至浩遂行果為姚襄所敗劉毅為衛將軍時何無忌為盧循所敗賊軍乘勝而進朝廷震駭毅具舟船討之將發而疾篤内外失色朝議欲奉乗輿北就中軍劉裕會毅疾瘳將率軍南征裕與毅書曰吾往與妖賊戰曉其變態今脩船垂畢將居前撲之尅平之日上流之任皆以相委又遣毅從弟藩往止之毅大怒謂藩曰我以一時之功相推耳汝便謂我不及劉裕也投書於地遂以舟師二萬發姑孰次桑落州與賊戰敗績宋王𤣥謨為寧朔將軍伐魏受輔國將軍蕭斌節度𤣥謨向碻磝戌主奔走遂圍滑臺積旬不克魏率大衆號百萬鞞鼓之聲震動天地𤣥謨軍衆亦盛器械甚精而𤣥謨專仗所見多行殺戮初圍城城多茅屋衆求以火箭燒之𤣥謨恐損亡軍實不從城中即撤壞之空地以為窟室及魏救將至衆請發車為營又不從將士多離怨遂敗蕭思話為青州刺史時到彦之北伐大敗魏軍乗勝破青部諸郡國思話欲委州保險濟南太守蕭順之固諌不從思話失據潰走南齊胡諧之為中庻子西討巴東王子響詔以鎮軍張欣泰為副欣泰謂諧之曰今太歳在西南逆歳行軍兵家深忌若且頓軍夏口宣示禍福可不戰而擒也諧之不從進據江津尹畧等見殺梁李奉伯為益州中兵叅軍時巴西人雍道晞率羣賊逼郡刺史劉季連遣奉伯討擒之奉伯因獨進巴西之東鄉討餘賊李膺止之曰卒惰將驕乘勝履險非良策也不如少緩更思後計奉伯不納悉衆入山大敗而出遂奔還州曹景宗為鎮軍將軍為人自恃尚勝每作書字有不解不以問人皆以意造焉後魏趙郡王幹為都督冀定瀛三州諸軍事孝文詔以李慿為長史唐茂為司馬盧尚之為諮議叅軍以佐之而慿等諫諍幹殊不納劉昶為大將軍征義陽昶嚴暴治軍甚急三軍戰慄無敢言者法曹叅軍陽固啟謀并靣陳事宜昶大怒欲斬之爾朱榮為大將軍稱兵入雒榮私告慕容紹宗曰雒中人士繁盛驕侈成俗若不加除剪恐難制馭吾欲因百官出迎仍悉誅之爾謂可不紹宗對曰太后臨朝滛虐無道天下憤惋共所棄之公既身控神兵心執忠義忽欲殱夷多士謂非良策深願三思榮不從辛纂為荆州刺史時蠻酋樊伍能破析陽郡纂議欲出軍討之纂行臺郎中李廣諌曰析陽四靣無民唯一城之地耳山路深嶮表裏羣蠻今若少遣軍則力不能制賊多遣則減徹防衛根本虛弱脱不如意便大挫威名人情一去州城難保纂曰豈得縱賊不討令其為患日深廣曰今日之事唯須萬全但慮在心腹何暇疥癬聞臺軍已破洪威計不久應至公但約勒屬城使各修完壘壁善撫百姓以待救兵雖失析陽如棄雞肋纂曰卿言自是一途我意以為不爾遂遣兵攻之不克而敗諸將因亡不返城人又密招關西宇文遣都督獨孤如願率軍潛至突入州城遂至㕔閤纂左右唯五六人短兵接戰為賊所擒遂害之後周賀拔岳仕魏為關西大行臺時欲討曹泥遣都督趙貴至夏州與太祖計事太祖曰曹泥孤城阻逺未足為憂侯莫陳悦怙衆密邇貪而無信必將為患願早圖之岳不聽遂與俱討泥至於河南岳果為悦所害其士衆散還平凉唯大都督趙貴率部曲收岳屍還營隋崔𢎞度開皇中為江陵總管高智惠等作亂復以為行軍總管出泉門道𨽻於楊素𢎞度與素品同而年長素每屈下之一旦𨽻素意甚不平素言多不用素亦容優之唐馬元規武徳初為慰撫山南使時賊帥朱粲新敗鄧州刺史呂子臧率所領數千人與元規并力擊之子臧謂元規曰朱粲新破之後上下危懼一戰可擒如更遷延部衆稍齊力強食盡必死戰於我為患不細也元規不納子臧請以本兵獨戰元規又禁之不得戰俄而粲衆大至元規懼退保南陽子臧拊膺曰言不見從者今兹坐公死粲果率兵圍之城陷元規遇害淮安王神通武徳初為山東道安撫大使擊宇文化及於魏縣化及不能抗東走聊城神通進兵躡之至聊城㑹化及糧盡請降神通不受其副使黄門侍郎崔幹勸納之神通曰兵士暴露已久賊計窮糧盡尅在旦暮正當攻取以示國威散其玉帛以為軍賞若受降者吾何藉手乎幹曰今建徳方至化及未平兩賊之間事必危廹不攻而下之此勲甚大今貪其玉帛敗無日矣神通怒囚幹於軍中既而士及自濟北餽之化及軍稍振遂拒戰神通督兵薄而擊之貝州刺史趙君徳攀堞而上神通心害其功因止軍不戰君德大詬而下城又堅守神通乃分兵數千人往魏州取攻具中路復為莘人所敗建德軍且至遂引軍而退後三日化及為建徳所虜賊勢益張山東城邑多歸建德神通兵漸散退保黎陽依徐勣俄為建徳所陷高祖令神通持節安撫趙魏擊宇文化及於魏縣化及不能抗走聊城神通兵躡之秘書丞魏徵謂神通曰化及今據聊城莒人為其固守若兵至而莘不降即冝改取但㧞莘縣聊城益懼因而廹之易同俯拾未若以攻具自隨一足威敵二不乏用如其不然兵至莘城見無攻具必不下矣不能克莘而逺廹化及恐亦勞而無功化及若不即降攻之旬月可陷莘人阻我糧運士及為之外援恐非計之善者神通不從軍次莘果不下失士心士蒍曰禮樂慈愛戰所蓄也申叔時曰德以施惠戰所由克是知將帥之道師克在和士卒之心理不可失善為將者動之以善濟之以仁惠洽投醪恩均挾纊反是道者鮮不敗焉夫同甘苦共勞逸多禮下士善撫勤恤此將帥之易也蹈城湟冐鋒刃捐捨親戚不顧軀命此士卒之難也􅈔其所易要其所難而兾謀夫竭其才勇士罄其命不亦難哉陳勝字涉陽城人地里志屬汝南郡呉廣字叔陽夏人也地里志屬淮陽夏音工雅切勝少時與人傭耕與人與人俱也傭耕言受其雇直而為之耕言賣工傭也輟耕之壟上輟止也之往也壟上謂田中之高處悵然甚久曰茍富貴無相忘但一人富貴不問彼此皆不相忘也傭者笑而應曰若為傭耕何富貴也勝太息曰嗟乎燕雀安知鴻鵠之志哉鴻大鳥也水居鵠黄鵠也一舉千里鵠音胡督切秦二世元年勝立為陳王勝王凡六月其御莊賈殺勝以降秦勝初為王故人嘗與傭耕者聞之乃之陳叩宮門曰吾欲見涉宮門令欲縛之自辨數乃置辨數謂自分别其姓名也并歴道與涉故舊之時舍而不縛也數音山羽切不肯為通勝出遮道而呼涉呼謂大喚也音火故切廼召見載與歸入宮見殿屋帷帳客曰夥涉之為王沈沈者夥音禍沈沈宮室深逺也沈音長含地楚人謂多為夥故天下傳之夥涉為王繇陳渉始客出入愈益發舒言勝故情或言客愚無知專妄言輕威勝斬之諸故人皆自引去繇是無親勝者以朱防為中正胡武為司過主司羣臣諸將徇地至令之不是者繫而罪之以苛察為忠其所不善者不下吏輙自治不以付吏而房武自治之勝信用之諸將以故不親附此其所以敗也晉新蔡王騰鎮鄴為羣盗汲桑等攻陷而死騰性儉嗇無所振惠臨急乃賜將士米可數升帛各丈尺是以人不為用周札為右衛將軍會稽内史為王敦所襲見殺札性貪財好色惟以業産為務兵至之日庫中有精仗外白以配兵札猶惜不與以弊者給之其鄙吝如此故士卒莫為之用謝萬為豫州刺史領淮南太守監司豫冀并四州軍事既受任北征矜豪傲物嘗以嘯詠自高未嘗撫衆兄安深憂之自隊主將帥已下安無不慰勉謂萬曰汝為元帥諸將宜數接對以悦其心豈有傲誕若斯而能濟事也萬乃召集諸將都無所説直以如意指四坐云諸將皆勁卒諸將益恨之茍晞為征東大將軍假節都督青州諸軍事領青州刺史晞刑政苛虐遼西閻亨以書固諌晞怒殺之繇是衆心稍離莫為致用加以疾疫饑饉其將温畿傅宣皆叛之石勒攻陽夏滅王讚馳襲蒙城執晞宋殷孝祖為冠軍負其誠節凌鑠諸將臺軍有父子兄弟在南者孝祖并欲推治繇是人情乖離莫樂為用汝南侯堅侯景圍城堅屯太陽門終日沉飲不撫軍政吏士有功未嘗申理疫癘所加亦不存恤士咸憤怨堅書佐董勛華白曇朗等以繩引賊登樓城遂陷堅遇害後魏侯莫陳悅為秦州刺史時賀㧞岳督關中出帝永熙三年正月岳召悦共討靈州悦誘岳斬之岳左右奔散悦遣人安慰云我别禀意㫖正在一人諸軍無怖衆皆畏伏無敢拒違悦心猶豫不即撫納乃還入隴止永雒城岳之所部聚於平凉規還圖悦北齊邸珍字寳安本中山上曲陽人也從神武起義為尚書右僕射大行臺節度諸軍事彭城珍御下殘酷衆士離心為民所害唐陳政為梁州總管山東道安撫副使行至汲縣為其部下蘭威所殺擁固其首投於東都王世充梟之城外政恃才輕物馭下嚴刻故及於難羅士信為新安道行軍總管恃法嚴暴無問親友必皆斬之繇是下不附而畏之郭英乂為劒南節度使英乂暴虐人不堪命為西山兵馬使崔旰以麾下五千衆反討英乂英乂出軍拒之遂奔於簡州州人斬首以送旰遂并屠其妻子張鎰為鳳翔節度使徳宗將幸奉天鎰竊知之將迎鑾駕具財貨服用獻行在李楚琳者嘗事朱泚得其心軍司馬齊映等宻謀曰楚琳不去必為亂乃遣楚琳屯於隴州楚琳知其謀乃託故不時發鎰始以迎駕心憂惑以為楚琳承命去矣殊不促其行鎰修餙邊幅不為軍士所悦是夜楚琳遂與其黨王玢李卓牛僧伽等作亂鎰夜縋而走出鳯翔三十里及二子皆為候騎所得楚琳俱害之殷仲卿為商州刺史充本州防禦使為部下兵馬使劉洽所殺仲卿馭下無政威惠不行故及於難韓遊瓌為邠寧節度使初遊瓌入覲其將吏以遊瓌子謀大逆又軍府無政謂必受代餞送之禮多闕及遊瓌至京見德宗德宗特達委用因請築豐義城以備寇且使歸鎮軍中多懼遊瓌以大將范希朝素整肅有聲畏其逼已迴至鎮求其過將殺之故希朝懼而奔帝因召赴京師及遊瓌遣士衆築豐義城兩板而潰寧州戍卒數百縱掠而叛其無方畧失士心如此李融為鄭滑節度初融疾甚召其副使鄭州刺史趙植將委以後事植既至軍士頗不悦偏將張良率所領二百入刼庫兵授甲以攻中城城中率宿兵千餘人拒之城門將張粲自後擊之大將宋朝晏率兵又至良兵敗驅其餘衆及家屬夜濟河走衛州融驚駭明日卒程懷直為橫海軍節度使懷直出畋宿於野數日不恤軍士軍士頗凍餒大將程懷信懷直之從父兄也因衆怒遂閉門不納懷直奔赴闕王佖為朔方靈鹽節度使佖在鎮無智術以馭下居嘗猜忌乃多殺人以懼之衆益不附及召至踰月而授以諸衛將軍李進賢為振武節度使初進賢領使事怠於恤下判官嚴澈年少用事以刻剥為能邊軍苦之初廻鶻之上鸊鵜泉也振武發營將楊遵憲以五百騎赴於東受降城所給資糧其價多不實及至鳴砂其將屋宿而師衆暴露軍士益忿至夜各負一束薪積將舍而焚之卷甲而還進賢既令歸次而漏其責言下益不安遂燔城門而攻進賢進賢既帥左右射之不能止乃縋而亡李瓚為桂管觀察御軍無政為卒所逐貶死韋士宗貞元中為黔南觀察使黔中宴後將傅近何遷等作亂逐出士宗盖士宗苛刻軍州不安奔赴施州王遂為沂州刺史沂兖海等州觀察使遂性狷忿不存大體而軍州民吏乆染汙俗率多獷戾而遂數因公事訾罵將卒曰反虜將卒不勝其忿牙將王弁乘人心怨怒遂方宴集弁譟集其徒害遂於席判官張敦實李鉅甫等同遇害韓全義為神策行營節度長武城使代韓潭為夏綏銀宥節度詔以長武兵赴鎮全義貪而無勇短於撫御制未下軍中知之相與謀曰夏州沙磧之地無耕蠶生業盛夏移徙吾所不能是夜戍卒鼓譟為亂全義踰城而免殺其親將王栖嵓趙䖍曜等賴都虞候高崇文誅其亂首而止全義方獲赴鎮李道古為鄂岳都團練使時呉元濟叛道古攻申州尅其羅城乃進攻其城中城守卒夜帥婦人登城而呼懸門竊發分出其衆道古之衆驚亂多為虜殺初李聽守安州未嘗退衂及道古誣奏聽移去之乃自帥兵出穆陵關士卒驕惰賜給多闕其度支供軍錢道古半以奉權倖半以没巳士皆怨怒不肯力戰賊亦易道古以羸兵抵之故道古前後再攻破申州外城而不能㧞盧坦為劒南東川節度使在鎮三年後請收閏月軍吏糧料以助行營人多非之李愿為宣武節度使先是張𢎞靖為汴帥屢以厚賞安士心及愿之至帑藏耗矣而愿恣其奢侈門内數百口皆仰給官司不恤軍政賞賚既不及𢎞靖時又娯於酒色不親政事以嚴刑馭下人心皆怒愿復令其妻弟竇緩領親兵宿直衙内緩素驕恣黷貨無厭兵士忿之於是宿直將李臣則薛志忠秦鄰等三人因人之心結謀為亂夜取宿直刀入竇緩帳斬其首因大呼衙内聞而響應遂叩愿門愿與一子及左右十數人露髪而走登於城北樓懸縋而下越濠水得及外城復踰而逸比曉行十餘里遇野人以驢負薪賣於城者愿奪而乗之馳入鄭州界亂兵求愿不得殺其妻竇氏三子伏匿得免姬妾三十餘人軍士分取焉又殺其私暱奴僕二十餘人張𢎞靖代劉總盧龍軍節度使𢎞靖之入幽州也薊人無老㓜男女皆夾道而觀焉河朔軍帥冒寒暑多與士卒同無張盖安輿之别𢎞靖久富貴又不知風土入郡之時遂肩輿於三軍之中薊人頗駭之𢎞靖又以祿山思明之亂始自幽州欲於事初盡革其俗乃發禄山墓毁其棺柩人尤失望從事有韋雍張宗厚數軰復輕肆嗜酒嘗夜飲醉歸燭火滿街前後呵叱薊人所不習之事又雍等詬責吏卒多以反虜名之薊人不勝其憤遂相率以叛囚𢎞靖於薊門館執韋雍張宗厚軰數人皆殺之杜元頴出相為西川節度使減削軍食以務畜取人頗苦之於西南兩路防守戍卒悉大為減省衣糧給與又不以時代其戍卒饑寒者反取給於蠻戎成都府動静好惡蜀人反為蠻之鄉導以是寇及子城元穎方覺知蠻帥恣為俘刼數日而去後唐李克恭為昭義節度使人士離心時武皇初定邢雒三州將有事於河朔大蒐軍實潞州有後院軍馬之雄勁者克恭選其五百人獻於武皇軍使安建惜其兵不悦克恭令禆校李元審安建紀綱馮霸部送太原行次銅鞮縣馮霸刼衆謀叛殺都將劉果縣令戴勞謙循山而南北及沁水有衆三千冊府元龜卷四百三十七
