body:
  text: 册府元龜卷七百十一宋王欽若等撰宫臣部文學智識褒寵文學傳曰言之無文行之不逺記曰玉不琢不成器人不學不知道是知文學者士君子立身修己之本也乃有鍾粹和之氣挺暐􅁮之才列職宫坊曳裾藩邸摛辭奮藻著適用之稱索隠鈎深得待問之㫖故彬彬儒雅冠映一時者焉漢疏受為太子家令好禮恭謹敏而有辭宣帝幸太子宫受迎謁應對及置酒宴奉觴上夀辭禮閑雅上甚驩說吳韋曜為太子中庶子時蔡頴亦在東宫性好博奕太子和以為無益命曜論之晉潘尼元康初為太子舍人上釋奠頌江統為愍懷太子洗馬及太子之死改塟統作誄叙哀為世所重宋謝恵連為彭城王義康法曹叅軍時義康治東府城城塹中得古冡為之改塟使恵連為祭文留信待成其文甚美南齊謝超宗初仕宋為新安王子鸞國常侍王母殷淑妃卒超宗作誄奏之孝武大嗟賞曰超宗殊有鳯毛恐靈運復出超宗靈運之孫謝朓為齊王子隆文學子隆在荆州武帝敕朓還都朓道中為詩以寄西府梁沈約為齊文恵太子步兵校尉管記室直永夀省校四部圗書時東宫多士特被親遇王筠為太子洗馬中書舎人並掌東宫管記昭明太子愛文學士嘗與筠及劉孝綽陸倕到洽等游宴𤣥圃太子獨執筠袖撫孝綽肩而言曰所謂左把浮丘袂右拍洪厓肩昭明薨敕為哀册文大見嗟賞劉孝綽為太子僕掌東宫管記時昭明太子好士愛文孝綽與王筠等同見賔禮太子起樂賢堂乃使畫工圗孝綽焉太子文章繁富羣才咸欲撰録太子獨使孝綽集而序之劉孝威為太子中舎人庶子率更令並掌管記大通九年白雀集東宫孝威上頌其辭甚美徐摛為太子家令兼掌管記摛文體既别春坊盡學之宫體之號自斯而起髙祖聞之怒召摛加讓及見應對明敏詞義可觀髙祖意釋劉香為東宫通事舎人注太子徂歸賦稱為博悉庾肩吾為簡文晉安王國常侍兼記室㕘軍王為皇太子肩吾兼東宫通事舎人歴率更令中庶子初簡文在藩雅好文章士時肩吾與東海徐摛吳郡陸杲彭城劉遵劉孝儀儀弟孝威同被賞接及居東宫又開文徳省置學士肩吾子信摛子陵吳郡張長公北地傅引東海鮑至等充其選蕭愷為太子洗馬中舎人家令並掌管記簡文在東宫早引接之時中庶子謝嘏出守建安於宣猷堂宴餞並召時才賦詩同用十五劇韻愷詩先就其辭甚美簡文與湘東王令曰王筠本自舊手後進有蕭愷可稱信為才子陳徐伯陽為新安王記室鄱陽王為江州刺史伯陽奉使造焉王率府僚與伯陽登匡嶺置宴酒酣命筆賦劇韻二十伯陽與祖孫登先成王賜以奴婢雜物及皇太子幸太學詔劉安王於辟雍發論語題仍命伯陽為辟雍頌甚見嗟賞陸瑜為東宫學士太建二年太子釋奠令宫臣並賦詩命瑜為序文甚贍麗顧野王為太子率更令兼通事舎人時後主在東宫宫僚有濟陽江總吳國陸瓊北地傅縡吳興姚察並以才學顯著論者推重焉隋栁䛒為晉王諮議㕘軍王朝京師還作歸藩賦命䛒為序詞甚典麗初王屬文為庾信體及見䛒已後文體遂變潘徽為秦孝王俊學士嘗從俊朝京師在塗令徽於馬上為賦行一驛而成名曰述思賦俊覽而善之復令為萬字文并遣撰集字書名為韻纂徽為序唐杜淹武徳中為秦王府文學館學士嘗侍宴賦詩時八人同賦淹為稱首賜以銀鍾褚亮為秦王文學秦府初開文學館以房𤣥齡等十八人為學士皆圖畫其象令亮為之贊薛元敬武徳末太宗入東宫時為太子舎人時軍國之勞總於東宫元敬專掌文翰號為稱職崔融字安成中宗在春宫為侍讀兼侍屬文東宫表疏多成融手智識傳曰智者不惑又曰識者不求所告葢觀乎事機非智則不周察乎人情非識則不達若夫列藩國之任居傅相之地懐研幾之慮臨事而洞分負先見之明未萌而預辨陳王覇之體序君臣之分繼之以禮樂濟之以規諷逮漢而下世有人焉皆著於篇以永其譽漢宋昌為代王中尉太尉周勃朱虚侯章等既誅諸吕遂使人迎代王郎中令張武等議皆曰漢大臣皆故髙帝時將習兵事多謀詐其屬意非止此也言嘗有異志也屬意猶言注意也屬音之欲切特畏髙帝吕太后威耳今已誅諸吕新喋血京師喋音長頰切本字當作蹀蹀謂履涉之耳以迎大王為名實不可信願稱疾無徃以觀其變昌進曰羣臣之議皆非也夫秦失其政豪傑並起人人自以為得之者以萬數然卒踐天子位者劉氏也卒終也天下絶望一矣髙帝王子弟地犬牙相制所謂磐石之宗也犬牙言地形如大之牙交相入也天下服其强二矣漢興除秦煩苛約法令施徳惠約省也人人自安難動搖三矣夫以吕太后之嚴立諸吕為三王擅權專制然而太尉以一節入北軍一呼呼呌也音文故切士皆袒左為劉氏叛諸吕卒以滅之此乃天授非人力也今大臣雖欲為變百姓弗為使為音于偽反其黨寧能專一邪内有朱虚東牟之親外畏吳楚淮南琅邪齊代之强方今髙帝子獨淮南王與大王大王又長賢聖仁孝聞於天下故大臣因天下之心而欲迎立大王大王勿疑也代王遣太后弟薄昭見勃勃具言所迎立王者昭還報信矣代王笑謂昌曰果如公言大王即文帝也董仲舒為江都相事易王久之王問仲舒曰越王勾踐與大夫泄庸種蠡謀伐吳種大夫種也蠡范蠡也種之勇切蠡音禮遂滅之孔子稱殷有三仁寡人亦以為越有三仁泄庸一也大夫種二也范蠡三也桓公决疑於管仲寡人决疑於君仲舒對曰臣愚不足以奉大對大對謂大問也聞昔者魯君問栁下惠吾欲伐齊何如栁下惠曰不可歸而有憂色曰吾聞伐國不問仁人此言何為至於我哉徒見問耳且猶羞之况設詐以伐吳乎由此言之越本無一仁夫仁人者正其誼不謀其利明其道不計其功是以仲尼之門五尺之童羞稱五伯伯讀曰霸此下亦同為其先詐力而後仁誼也茍為詐而已故不足稱於大君子之門也仲尼之門故稱大也五伯比於他諸侯為賢其比三王猶碔砆之與美玉也碔砆石之似玉者也王曰善閻崇為太子少傅時哀帝自定陶王立為太子月餘天子立楚孝王孫景為定陶王奉恭王後太子議欲謝崇以為春秋不以父命廢王父命王父謂祖也為人後之禮不得顧私親不當謝太傅趙𤣥以為當謝太子從之詔問所以謝狀尚書劾奏𤣥左遷少府吳是儀為尚書僕射時南魯二宫初立儀以本職領魯王傅儀嫌二宫相近切乃上疏曰臣竊以魯王天挺懿徳兼資文武當今之時宜鎮四方為國藩輔宣揚徳美廣耀威靈乃國家之良規海内所瞻望但臣言辭鄙野不能究盡其意愚以二宫宜有隆殺正上下之序明教化之本書三四上為傅盡忠動輙規諌晉脩肅為懐帝豫章王典書令帝立為皇太弟且以清河王覃本太子也懼不敢當肅曰二相經營王室志寧社稷儲貳之重宜歸時望親賢之舉非大王而誰清河幼弱未允衆心是以既升東宫復贊藩國今乗輿播越二宫久曠嘗恐氐羗飲馬於涇川螘衆控弦於霸水宜及吉辰登儲副上翼大駕早寧東京下允黔首喁喁之望帝曰卿吾之宋昌也乃從之宋王華為文帝宜都王司馬帝將入奉大統以少帝見害不敢下華曰先帝有大功於天下四海所服雖嗣主不綱人望未改徐羡之中才寒士傅亮布衣諸生非有晉宣帝王大將軍王大將軍謂王敦也之心明矣畏廬陵嚴斷將来必不自容殿下寛睿慈仁中外所知己且越次奉迎冀以見徳悠悠之論殆必不然羡之亮晦又要檀道濟王𢎞五人同功孰肯相讓勢必不行今日就徴萬無所慮帝從之曰卿復欲為吾之宋昌矣乃留華總後任帝即位以華為侍中右衛將軍梁何敬容為太子詹事時簡文帝頻於𤣥圃自講老莊二書學士吳孜時寄詹事府每日入聽敬容謂孜曰昔晉代䘮亂頗由祖尚虚𤣥胡賊殄覆中夏今東宫復襲此殆非人事其將為戎乎俄而侯景難作其言有徴北齊魏收為太子少傅仍兼詹事文宣帝數宴喜收每須侍從皇太子之納鄭良娣也有司偹設牢饌帝既酣飲起而自毁覆之仍召收曰知我意否收曰臣愚謂良娣既東宫之妾理不須牢仰惟聖懐縁此毁去帝大笑握收手曰卿知我意王晞為常山王友時文宣昏亂王録尚書事新除官者必詣王謝職去必辭晞言於王曰受爵天朝拜恩私第自古以為干犯朝廷文武出入辭謝宜一約絶主上顒顒賴殿下扶翼王納焉唐尉遲敬徳為太宗秦王府左二副䕶軍太宗討隠太子巢刺王命敬徳侍衛髙祖南衙北門兵馬及二宫左右猶相拒戰敬徳奏請降手敕令諸軍兵兼受秦王處分於是内外遂定髙祖勞敬徳曰卿於國有安社稷功也褒寵三王之教世子也咸建保傅之職以敦道徳之訓曷嘗不咨求碩徳申擇雋望為之輔導而申其教諭焉兹所以重燕翼之謀増磐維之固者也漢室而下英偉間出蒙被選擢周旋翼亮或以經術精䆳進見講授或以志行修整雍容翼從或以才藻蒙賞或以故舊見思由是厚其賜予之數異其褒命之禮形於奬歎申之委遇乃至不幸淪逝飾終彌渥褒賢之典不其韙歟漢夏侯勝宣帝時為太子太傅受業詔撰尚書論語賜黄金百斤卒官賜冡塋塟平陵疏廣為太子太傅太子外祖父特進平恩侯許伯為太子少傅自使其弟中郎將舜監䕶太子家宣帝以問廣廣以為不宜獨親外家許氏帝善其言廣由是見器重數受賞賜及乞骸骨帝以其年篤加賜黄金二十斤後漢桓榮光武時為太子少傅賜以輜車乗馬榮大㑹諸生陳其車馬印綬曰今日所蒙稽古之力也可不勉哉桓郁明帝時為侍中入授皇太子經遷越騎校尉詔敕太子諸王各奉賀致禮桓焉為太子少傅月餘遷太傅以母憂自乞聽於大夫行喪踰年詔使者賜牛酒奪服即拜光禄大夫魏應習魯經為五官中郎將章帝詔入授千乗王伉應經明行修章帝甚重之數進見論難於前特受賞賜魏袁渙字曜卿為魏國郎中令及卒武帝為之流涕賜榖二千斛一教以太倉榖千斛賜郎中令家一教以垣下榖千斛與曜卿家外不解其意教曰以太倉榖者官法也以垣下穀者親舊也吳程秉為太子太傅黄武四年大帝為太子登聘周瑜女秉守太常迎妃於吳大帝親幸秉船深見優禮晉山濤字巨源武帝時為太子少傅在東宫年已七十疾病告退手詔不聽帝嘗講武於宣武塲時有疾詔濤乗步輦導皇太子温嶠元帝時為太子中庶子嶠在東宫特見嘉寵僚屬莫與為此賀循為太子太傅及疾篤車駕親幸執手流涕太子親臨者三焉往還皆拜儒者以為榮太興二年卒元帝素服舉哀哭之甚慟贈司空謚曰穆將葬帝又出臨其柩哭之盡哀遣兼侍御史持節監護皇太子追送近塗望舩流涕南齊王儉領太子詹事加兵三十人張緒永明中為太子詹事每朝見世祖目送之謂王儉曰緒以位尊我我以徳貴緒也梁栁惔為太子詹事加散騎常侍武帝因宴為詩貽惔曰爾實冠羣后惟余實念切周捨為右驍騎將軍知太子詹事普通五年卒武帝臨哭哀動左右詔曰太子詹事豫州大中正捨奄至殞䘮惻愴于懐其學思堅明志行開敏劬勞機要多歴歳年才用未究彌可嗟慟宜隆追逺以旌善人可贈侍中䕶軍將軍鼓吹一部給東園秘器朝服一具衣一襲䘮事隨用資給諡曰簡子王規為散騎常侍太子中庶子大同二年卒詔贈散騎常侍光禄大夫賻錢二十萬布百疋諡曰章陸倕為太子中舎人管東宫書記詔為右闕銘記奏之敕曰太子中舎人陸倕所製闕銘詞義典雅足為佳作昔虞丘辯物邯鄲獻賦賞以金帛前史美談可賜絹三十疋遷太子庶子到洽與從弟沆齊名洽為太子舎人髙祖御幸華光殿詔洽及沆蕭琛任昉侍讌賦二十韻詩以洽辭為工賜絹二十疋髙祖謂昉曰諸到可謂才子昉對曰臣嘗竊議宋得其武梁得其文洽祖彦之仕宋武有戰功王僉為太子中庶子掌東宫管記太清二年卒贈侍中給東園袐器朝服一具衣一襲蕭時為太子舎人卒遺啟簡文求為墓誌銘帝為製銘焉庾於陵為太子洗馬舊東宫官屬通為清選洗馬當文翰尤其清者近世用人皆取甲族有才望者於陵與周捨並擢充職髙祖曰官以人而清豈限以甲族時論以為美陳孔奐為仁威將軍始興王長史奐在職清儉多所規正宣帝嘉之賜米五百斛并累降敕書殷勤勞問張譏宣帝時為建安王府記室㕘軍兼東宫學士轉武陵王限内記室學士如故後主在東宫集官僚置宴時造玉柄塵尾新成後主親執之曰當今雖復多士如林至於堪捉此者獨張譏耳即手授譏仍令於温文殿講老莊宣帝幸宫臨聽賜御所服衣一襲後主嗣位領南平王府諮議㕘軍東宫學士尋遷國子博士學士如故後主嘗幸鍾山開善寺召從臣坐於寺西南松林下敕召譏􅆆義時索塵尾未至後主敕取松枝手以屬譏曰可代塵尾顧謂羣臣曰此即是張譏後事袁憲為侍中信威將軍太子詹事後主至徳元年太子加元服二年行釋奠之禮憲於是表請解職後主不許給扶二人進號雲麾將軍置佐使阮卓為始興王叔陵記室叔陵之誅也後主謂朝臣曰阮卓素不同逆宜加旌異後魏張黎太武時賜爵廣平公恭宗初總百揆黎與東郡公崔浩等輔政忠於奉上非公事不言詔曰侍中廣平公黎東郡公浩等保傅東宫有老成之勤朕甚嘉焉其賜布帛一千疋以褒舊勲古弼太武時為安西將軍建興公及恭宗總攝萬機徴為東宫四輔與宜都王穆夀等並㕘政事詔以弼保傅東宫有老成之勤賜帛千疋綿千斤盧統父魯元為太保録尚書事統以父任侍東宫太武以元舅陽平王杜超女南安長公主道妻之恩禮甚厚每有四方珍異輙以賜之唐李綱為太子少保髙祖以綱隋代名臣甚加優禮每手敕未嘗多稱名其見重如此貞觀四年拜太子少師時綱有脚疾不堪踐履太宗特賜歩輿令綱乗至閣下數引禁中問以政道及綱遇疾太宗遣尚書左僕射房𤣥齡詣宅存問賜絹二百疋五年卒年八十五贈開府儀同三司諡曰貞太子為之立碑房𤣥齡為秦府記室㕘軍髙祖嘗謂侍臣曰此人深識機宜足堪委任每為我兒陳事必㑹人心千里之外猶對靣語耳孔頴達為太子右庶子太宗以頴達在東宫數規諫太子承乾與左庶子于志寧各賜黄金一斤絹百疋仍遷志寧為詹事于志寧為太子詹事太子承乾敗徙黔州左庶子張𤣥素等皆免為庶人唯志寧以驟諫承乾太宗嘉之而特慰勞焉李勣為太子詹事太宗嘗閒宴顧謂勣曰朕將囑以幼孤思之無越卿者公往不遺於李宻今豈負於朕哉勣雪涕辭謝因嚙指流血俄而沈醉乃解御衣覆之劉武仲以國子四門助教充奉諸王講讀上於禁中㑹讌諸王因命武仲每雙日入内對諸王仍令上食供食陸敦信為太子舎人嘗纂録古先太子善惡之事多所規諷太宗嘗召勞之曰爾所録誠有可嘉因賜帛五十疋秦暐為太子舎人從幸定州加授朝散大夫守洗馬還京未幾而卒皇太子深憫惜之弔贈甚厚蕭徳言為太子侍讀尋以年老請致仕太宗不許又遺之書曰朕歴觀前代詳覽儒林至於顔冉之才不終其夀游夏之徳不逮其學惟卿幼挺珪璋夙彰美譽下帷閉戸包括六經映雪聚螢牢籠百氏自隋季板蕩庠序無聞儒道墜泥塗詩書填坑穽眷言墳典每用傷懐頃年以来天下無事方欲建禮作樂偃武修文而卿年齒已衰教將何恃所冀才徳猶茂卧振髙風更使濟南伏生重存於兹日闗西孔子復顯於當今令聞令望何其美也尋賜爵封陽縣侯拜祕書少監兩宫禮賜甚厚李百藥為太子右庶子貞觀五年與左庶子于志寧中允孔頴達舎人陸敦信侍讀于𢎞教殿時太子頗留意典墳然閒讌之處嬉戲過度百藥作賛道賦以諷焉太宗見而遣使謂百藥曰朕於皇太子處見卿所獻賦悉述古来儲貳事以戒太子甚是典要朕選卿以輔弼太子正為此事大稱所委但須善始令終耳因賜綵帛三百段王方慶聖歴初為麟臺監兼檢校太子左庶子二年正除太子左庶子俸料並同職事三品兼侍皇太子讀書及卒贈兖州都督諡曰貞薛元超為中書令兼太子左庶子髙宗幸東都太子於京師監國因留元超侍太子元超數上疏諫太子髙宗知而稱善遣使慰諭賜帛百段王及善為左奉裕率孝敬居春宫因宴集令宫臣擲倒次至及善及善辭曰此非臣任也孝敬謝而遣之髙宗聞之特加賞慰賜絹百疋姚珽為太子詹事兼左庶子節愍太子舉事不法前後上書諫諍太子雖稱善竟不悛革太子敗詔遣索其宫中得珽諫書中宗嘉其切直時宫臣皆貶黜唯珽擢拜右散騎常侍源乾曜為太子少傅安陽郡公薨贈幽州大都督帝於洛城南門舉哀深悼惜之陸象先為太子太保兖國公開元二十四年七月薨制曰象先含和毓粹體道居身跡在區中心游象外懋昭丕徳光輔先朝爰悉優恩是為師保方期承命以配上祥厲疾無瘳徽音劇隔興言念舊震悼于懐宜旌端揆之職用光窀穸之事贈尚書左丞賻物二百段米粟二百石韋見素代宗時為太子太師寶應中詔曰太子太師見素太子少傅李遵太子少保韓擇木太子賔客嗣吳王祗太子詹事兼揚州長史崔圓並承東宫優異品秩已髙不可更改宜各與子孫一人官見素後以疾終帝以老臣悼之贈司徒輟朝一日册府元龜卷七百十一
