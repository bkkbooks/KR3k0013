body:
  text: 册府元龜卷九百九十二宋王欽若等撰外臣部備禦第五唐中宗神龍元年六月以左驍衛大將軍裴思諒攝右御史臺大夫充靈武軍大總管以備突厥三年正月命内外官各進破突厥之䇿右補闕盧浦上疏曰臣聞有虞咸熈苖人逆命殷宗大化鬼方不賓則戎狄交侵其來逺矣漢髙帝納劉敬之議與匈奴和親妻其宗女賂以鉅萬冐頓益驕邉冦不止則逺荒之地凶悍之俗難以徳綏可以威制而䧏自三代無聞上䇿今匈奴不臣擾我亭障皇赫斯怒將整元戎臣聞方叔帥師功周雅去病耀武勲列燕山則萬里折衝在於擇將春秋謀元帥取其説禮樂敦詩書晉臣杜預射不穿札而建平吳之勲是知中權制謀不在一夫之勇其蕃將沙吒忠義等身雖驍悍志無逺圖此乃騎將之材本不可當大任且師出以律將軍死綏秦尅長平趙括受戮胡去馬邑王恢坐誅則棄軍有刑古之常典近者鳴沙之役主將先逃輕挫國度湏正邦憲又其中軍既敗陣亂矢窮義勇之士猶能死戰功合紀錄以勸戎行賞罰既明將士盡節此擒敵之術也臣聞以蠻夷攻蠻夷中國之長筭故陳湯統西域而郅支㓕常惠用烏孫而匈奴敗請購辨勇之士班傅之儔旁結諸蕃與圖攻取此犄角之勢也臣聞昔者漢置新秦以實塞下宜因古法募人徙邉選其勝兵免其行役次廬伍明教令則狃習戎事䆒識夷險其所虜獲因而賞之近戰即守家逺戰則利貨趨赴鋒鏑不勞訓誓朝賦楊桞夕歌枤杜十年之後可以乆安臣聞漢用郅都匈奴避境趙命李牧林胡逺竄則朔方之安危邉城之勝負地方千里則在一賢其邉州刺史不可不慎擇於其人而任之蒐乗訓兵屯田積衆謹設烽燧精餙戈矛來則懲而禦之去則備而守之此古之善經也去嵗亢陽天下不稔利在保境不可窮兵使内郡黔黎各安其業釋其芻牧輕其徭賦事無過舉爵不以私愛人之財節其浮侈惜人之力不廣臺榭察地利天時以趨耕穫命秋獮冬狩以教戰陣則數年之後有勇知方帑藏山積金革犀利然後整六軍絶大漠雷擊萬里風掃二庭斬蹛林之酋懸藁街之邸使百蠻震怖五兵載戢則上合天時下順人事理内以及外綏近以來逺以惠中國以静四方臣少慕文儒不習軍旅竒正之術多媿前良獻替是司輕陳瞽議帝覧而善之五月戊戍命右屯衛大將軍張仁亶為朔方道大總管以備突厥景龍元年十月丁丑又命左屯衞將軍張仁亶攝右御史臺大夫充朔方道大總管以備突厥睿宗景雲元年九月以前太子少師唐休璟為特進兼朔方道大總管以備突厥二年十月命太僕卿李回秀持節朔方後軍大總管以備胡冦阿史那獻為持節招慰十姓使延和元年六月吏部尚書郭元振為朔方道行軍大總管節度諸軍以備胡冦𤣥宗先天元年八月乙巳於河北漢州北界置渤海軍常陽軍媯蔚州界置懐柔軍毎軍置兵五萬人開元二年二月以鴻臚少卿王晙為朔方軍副大使總管制曰古者獫狁孔熾匈奴浸驕設以三䇿雖屬備胡之典方於五材未聞去兵之義不有行者誰能扞之王晙倜儻多智堅剛立節毎讀前史思齊古人辭家而志㓕獯戎報國而躬先將校頃虞南牧城彼朔方蕭關洞開沙漠無事既獲全軍之利則惟保塞之勞嘉其善謀必有成績昔北逐虜者任專而决外西䕶羌者功遂而條上用明分閫之重式副齋壇之期朝實僉諧爾其俞徃其豊安定逺三城等軍及側近軍州宜竝受晙節度其安北都䕶府移於中受降城置兵湏足食理籍加屯今正農時足務耕種處置訖奏聞八月庚申制曰朕聞天生五材廢一不可不教人戰是謂棄之我國家光宅天下守在海外後於弔伐之義豈窮兵以黷武先以威徳之懐欲安人而和衆將戒不虞諒不獲已突厥比通和好頗負盟約不有金革孰寧疆塲不有師徒誰扞牧圉昔者命彼南仲城于朔方軍出隴西勞於渭北此其備也今寒露腓草秋風揚塵必順時以致師方休農以簡卒我圖靖國其在綏邉衛尉卿蒹檢校左金吾衛大將軍凉國公李延昌克樹勲庸遍該韜略關張萬人之敵勇不顧身程李二將之名忠於衛主董司戎事行料兵權可充隴右道防禦大使左武衛將軍白道恭等居運六竒行謀百勝早聞營平之議思覩嫖姚之㨗可為之副宜取朔方後軍兵及前年朝堂應募㨗兒等總十萬人群牧馬四萬匹於秦州成蘭渭等州界逐便屯集教練仍書報賛普其為聲援明加偵候勿使失機十月戊辰宰臣盧懐慎姚崇等奏曰頃者吐蕃以河為界神龍年中䧏公主􅄍蕃遂過河築城置獨山九曲兩軍去積石三百里又於河上造橋􅄍蕃今既叛我此橋既因毁折橋既見毁城自然㧞臣等望與郭知運蓋㤙貴等計議尅期翦撲從之四年三月闗内節度薛訥請於夏州加三二千兵宰相姚崇盧懐慎議曰兵雖不厭多多則費廣䧏人既納甲仗固亦無虞雖欲縱之其將何徃况夏州素有馬二千匹兵一千三百人茍能用之足堪鎮遏待一二年後更量宜處分許之七月以突厥黙啜背㤙䧏書於䧏附突厥等曰三姓葛邏禄大漢都督特進朱斯隂山都督謀雒匐維𤣥池都督實力胡鼻等卿積伐巳來為國藩捍比縁黙啜侵擾中間屢阻欵誠遂能改圖不逺而復毎思忠節嘉歎實深已頻遣書當達此意然金山安置雖是舊居未知初來竝得好否黙啜兇忍神怒天亡豈唯不識朕恩亦乃負於卿等􅂧讐雪恥今正其時度卿等忠勇之誠挍彼殘遺之孽取之有同拾芥滅之何異摧枯兵威暫臨必自靣縳故命鴻臚卿鄭嘉祚賫告身袍帶等馳徃宣慰便與卿等計㑹乗其衰弱早就翦除如或因循更令聚結非直有妨於此亦是不利於卿進退籌量固在於速其能捉獲黙啜者已立賞格付嘉祚將徃宜各勉思以副朝委今寄卿等錦􅂁鈿帶并刀子礪石至竝領取五年三月庚戍復置營州於桞城詔曰朕聞舞干戚者所以懷荒逺固城池者所以欵戍夷國家徃有營州茲為虜障此北狄不敢窺覘東藩由其輯睦者乆矣自趙翽失於鎮静部落因此攜離頗見負塗之暌旋聞改邑之歎髙墉填塹故里為􅇕言念於此毎思開􅂧奚饒樂郡王李大酺賜婚來朝已納呼韓之拜契丹松漠郡王李失活遣子入侍彌嘉􅀈侯之節咸申懇請朕所難違宜恢逺圖用光舊業其營州都督府宜依舊於桞州置管内州縣鎮戍等竝准舊額太子詹事姜師度貝州刺史宋慶禮左驍衞大將軍兼營田都督邵宏鄭州刺史劉嘉言屯田貟外郎游子騫等竝貞以幹事恪勤在公爰精衆官之選任以一方之役師度可充營慶度支及修築使游子騫為之副宏可兼充燕郡經畧鎮副使仍兼知修築使事應湏人夫粮等一物已上依别勅處分有司仍速支配師度等竝馳驛發遣七月郭知運大破吐蕃獻俘闕下初帝欲遣阿史那獻為北蕃主而蘓禄拒而不納乃命王惠宣㤙賜慰喻惠未行㑹安西陽嘉㑹奏至宰相宋璟蘓頲奏曰嘉㑹表稱突騎施車鼻施勾引天食吐蕃擬取四鎮見圍鉢換及大石城嘉㑹已發三姓葛邏祿兵與史獻同掩襲臣等伏以突騎施等跡已叛換葛邏禄等志欲討除自是夷狄相攻元非朝廷所遣若大傷小滅皆利在國家成敗之狀即當聞奏王惠充使本為綏懐事意既殊未可令去望待以西表至續更商量從之是月辛酉并州置天兵軍制曰大原薄伐之地勾注出屯之所兵戈不可以不習亭障不可以不備黙啜鳴鏑之餘自貽泯滅骨咄祿勇殺覆巢之餘仍敢陸梁九姓等雖類頗親而仇讐乆著譬彼西戎已獻郅支之馘同夫東越初雪㑹稽之恥深憂復怨固請防萌况髙秋在律胡風振野正可以揚武功順殺氣振茲地險張我天威宜於并州集兵八萬衆置天兵軍并州長史上柱國張嘉貞有文武之才勵忠公之操較陳利害頻奏封章必能料敵於未形臨宜以決勝可充天兵軍大使并州司馬王喬典禮不易其可用也右監門衞中郎將薛徽軍旅之事則嘗聞焉竝為副左拒遼陽之師右連河上之戍車徒列次鼓角傳聲俾其雷斷一方雲横萬里宏茲廟算稱朕意焉六年二月戊子制曰戢兵始於威武扼險先於要害以制憬俗用綏逺人九姓等頃立勲庸先除桀驁列在蕃服保其疆宇然而獷戎頗近冦盗時侵雖文徳未宏武備素設漢垣通於句注夏屋枕於燕山是稱近胡諒藉遮虜固可節其萬部成犄角之形屯我六師示張皇之勢其蔚州横野軍宜移於山北古代郡大安城南仍置漢兵三萬人以為九姓之援㧞曵固都督頡質略等竝望雄蕃緒聲振朔垂戎畧既昭兵旅惟緝各陳武列分統軍政頡質畧出馬騎三千人充横野軍討擊大使同羅都督比言出馬騎二千人充横野後軍討擊大使廻紇可汗都督移徤頡利發出馬騎一千人充大將軍右軍討擊大使僕固都督曵勒哥出馬騎八百人充大武軍右軍討擊大使左縈右拂先偏後伍作扞雲代指清沙漠宣威料敵度功蕆務咨爾庶士稱朕意焉其五都督討擊大使各量給賜物一百疋領本部落蕃兵取天兵軍節度其兵有事應湏討逐探候量宜追集無事竝放在部落營生竝使本軍存問務使安輯應修築所及支運兵馬粮等所司亦與節度使商量處置六月己丑松漠郡王失活卒䧏書於契丹衙官靜拆軍副大使可突于曰自從松漠郡王殂歿已遣使吊祭卿蕃部大臣衆情所望事生送死惟義與忠竝敦舊好以副深委近淂捍蕃使薛㤗表云突厥殺兒到大雒揚言萬衆欲抄兩蕃左手有急右手不助既在一身得其自勉力捍時須覺察審防姦詐自從黙啜破敗殘賊困窮非時逺來冐死邀利以卿智勇制彼狂愚拉朽摧枯不足為喻深思此便以効忠功動靜與宋慶禮等籌度勿失事理九年四月甲辰詔曰制國立軍以為武備安人和衆諒在師貞必將簡其車徒務其蒐獮不教人戰何以訓兵今寰宇雖寧燧燔時警故設備邉之政更申用武之略其劔南磧西闗内隴右河東北通燕薊既接邉隅是防夷狄㨿山川險要量冦賊多少分置軍旅足成修備有事赴敵可以拉朽摧枯無事飬人可以㧞距投石而將吏非謹甲兵不修加之侵暴仍且役使雖則屢提綱領然猶故忽科條豈法有未明將官無所畏永言此弊增歎于懷又諸道軍城例管夷落舊戸乆應淳熟新降更佇綏懷如聞頗失於宜蕃情不得其所若非共行割剝何乃相繼離散既徃者理宜招討見在者湏加安全熟户既是王人章程湏依國法比來表奏多附漢官或洩其事宜不為聞達或換其文狀乖違本情自今已後蕃臣應有表奏竝令自差蕃使不湏更附漢官雖復化染淳風終是情因本性刑罸不中心固不安其有犯法應科不得便行决罰具狀聞奏然後科繩咨爾軍僚勉我王事兵必湏賈勇奮力馬必湏芻牧秩飬器仗必湏磨礪粮儲必湏贍積馭蕃夷必湏以威以恩誓將士必湏以罰以賞辨於旗物稱爾戈矛使有勇而知方將料敵而常勝所謂文武竝用國之大經團結十萬衆兵别令訓習分割數萬匹馬皆有供湏什物備陳行裝具足候時而動我武惟揚俾夫凉風至白露下將以執有罪覆昏慝宏厥戎略振斯天聲清彼四方期此一舉其諸軍官吏輙更私役兵及侵漁一錢已上兼失偵候仍堕敎習倉儲或乏器械莫修畨部不能安窮冦不能制有一是犯國有嚴誅事或未同仍令所司作條件處分六月己亥胡賊康待賓反北州不安詔曰國家天覆萬方子育庶彚要荒所列竝入提封日月所炤俱為臣妾莫不熈我徳澤納之仁壽神人以和鳥獸咸若河曲之地宻邇京畿諸蕃所居舊在於此自服王化列為編甿安其耕鑿積有年序而飜然造謀搆此紛孽勞我師旅擾其邉隅不思亭育之愛坐取滅亡之道官軍纔及一鼓而潰雖肇其首謀則有元惡然率以從亂咸為匪人朕思宏其有宥之恩振以好生之惠伐彼有罪捨其脅從使反側自安胡耉靡獲則譸張之釁爾實自取生成之徳我則有焉宜令朔方軍大總管兵部尚書王晙宣崇恩命示以柔服諸軍戰士應湏酬録功勲及却投來吐渾党項左右廂䧏戸雜蕃并胡殘部落或善惡未分或乆長取穏若湏釐革一事已上竝委王晙叙録處置訖奏聞十二年七月詔曰懐逺夷納欵附國家常事也邉塞嚴甲兵備軍旅本職也雖萬方和同不可薄其武備百蠻朝貢不可輕其疆塲今年十月東幸雒京西北􅁟邉倍宜嚴警其河西隴右朔方太原幽州平盧諸節度使咸宜裹粮坐甲秣馬利兵明教隊伍逺為偵候使風塵預知邀截有所安我邉鄙威加戎狄賞罰在茲各宜砥礪十三年帝將東廵中書令張説謀欲加兵以備突厥兵部郎中裴光庭曰封禪者告成之事忽此徵發豈非名實相乖説曰突厥比雖請和獸心難測且小殺者仁而愛人衆為之用闕特勒驍武善戰所向無前暾欲谷深沉有謀老而益智李靖徐勣之流也二虜叶心動無遺策知我舉國東廵萬一窺邉何以禦之光庭請遣使徵其大臣扈從則突厥不敢不從又亦難為舉動説然其言乃遣中書直省袁振攝鴻臚卿徃突厥以告其意小殺與其妻及闕特勒暾欲谷等環坐帳中設宴謂振曰􅄍蕃狗種唐國與之為婚奚及契丹舊是突厥之奴亦尚唐家公主突厥前後請結和親獨不蒙許何也袁振曰可汗既與皇帝為子父子豈合婚姻小殺等曰兩蕃亦蒙賜姓猶得尚主但依此例有何不可且聞入蕃公主皆非天子之女今之所求豈問真假若請不得實亦羞見諸蕃振許為奏請小殺乃遣其大臣阿史徳頡利發入朝貢獻因扈從東廵十四年五月辛丑於定鎮莫勿滄等五州置軍備突厥十五年十二月制曰慎守疆場所以備不虞訓理甲兵所以存禁暴列代通典有國永圖朕以虗薄君臨㝢縣上奉天道務在於生育下順人心無隔於夷夏柔服四裔底綏萬邦慕義向風盡為臣妾納貢述職咸赴闕庭唯􅄍蕃小醜忘我大徳侵軼封域抄掠邉甿言念於茲無忘鑒􅄰且本設方鎮以防緣邉至於警急宜相救援今故紏合諸軍團結勁卒務令首尾相衛心力叶同張羅網之刑開犄角之勢俾窮冦進不能犯退無所歸秣馬練兵觀釁而動屯田積榖固敵是求殄戎可期戰勝斯在隴右通共團結馬歩三萬九千人臨洮軍團八千人河原軍團六千人安仁白水軍各團一千五百人積石莫門軍各團二千人河西道蕃漢兵團結二萬六千人赤水軍團一萬人玉門豆盧軍各二千人竝依舊統領以候不虞更於闗内徴驍兵一萬人以六月下旬集臨洮十月無事放散朔方取徤兒弩手一萬人六月下旬集㑹州下十月無事便赴本道候賊所向賊於河西下即令隴右兵取閤川過朔方合兵取新泉過與赤水軍合勢邀襲令河源積石莫門兵取背掩撲賊於河源下朔方兵從乳漫渡河并臨洮軍兵馬河源軍合勢邀襲赤水軍取背掩撲賊於鳳林闗下朔方兵赴臨洮與鄯州兵合勢邀襲河源積石兵取背掩撲所要甲兵遂便支候公私營種且耕且戰各宜訓朂以副朕懐十六年三月丁未制曰隴右河西地接邉冦雖令團練士卒終湏常戒不虞如聞吐蕃尚聚青海宜令蕭嵩張志亮等審察事勢倍加防禦當湏畜鋭以逸待勞其當賊路其要害軍縣處湏量加兵馬任逐便通融處置仍㨂擇有幹略人檢校明為探候動靜湏知主將已下若捉搦用心事無不理者當加重賞如廢官慢盗式遏乖所者必寘嚴憲仍曉示使各勉職以副所委其管城壘應築未了者竝早令畢功無致延緩闕於備守二十七年正月詔曰遏冦防邉在於有備興師訓卒用戒不虞隴右諸軍地當戎虜尤資振耀以壯邉威宜令隴右節度經略度支營田大使開府儀同三司兼京兆牧榮王琬自徃隴右廵按處置庶宏廟略因達朕懐宜於闗内及河東納資飛騎諸色人中揀召取徤兒三五萬人赴隴右防捍至秋末無事放還仍於當道將内詮擇一人與所由相知擇召應給糧賜所司還作條列處分二十八年三月益州司馬章仇兼瓊宻與安戎城中􅄍蕃翟都局及維州别駕董承晏䓁通謀都局等遂飜成歸欵因引官軍入城盡殺􅄍蕃將士使監察御史許逺率兵鎮守帝聞之甚悦中書令李林甫上表曰伏以􅄍蕃此城正當衝要慿險自固每以窺邉積年以來蟻聚為患縱百萬之衆難以施功陛下親紆祕策不興師旅頒令中使李思敬暁喻羌族莫不懐㤙飜然改圖自相謀䧟神筭及於不測睿略通於未然累載逋誅中朝蕩盡又臣等今日奏事陛下從容謂臣等曰卿今但看四夷不乆當漸摧喪徳音纔降遂聞克㨗則知聖與天合應如響至前古已來所未有也請宣示百僚編諸史策手制答曰此城儀鳳年中羗引吐蕃遂被固守歳月既乆攻伐亦多其地嚴險非力所制朝廷群議不勸取之朕以小蕃無知事湏處置授以竒計所以行之獲彼戎心歸我城守有足為慰也十月吐蕃又引衆冦安戎城及雍州章仇兼瓊遣禆將率衆禦之仍發中彍騎以救援焉時屬凝寒賊乆之自引退詔改安戎城為平戎城天寳八年六月隴右哥舒翰率河東河西靈武及突厥阿布思䓁兵士六萬三千攻吐蕃石保城援之更令神武軍分兵鎮守是載又於木刺山置横塞軍城及安北大都䕶府命郭子儀領其役拜武衛大將軍後移横塞軍城及安北府於永清栅北築城改横塞軍為天徳軍子儀仍為之使十三載七月隴右哥舒翰以前年之役收黄河九曲之地請分置郡縣及軍於是新置洮陽郡及神䇿軍於臨洮郡之西二百里洮河郡於磧石軍之西百里及宛秀軍以實河曲之地命臨洮郡太守漢門軍使成如璆兼臨洮郡太守仍充神䇿軍使前磧石軍使臧奉忠為洮河郡太守充本郡鎮守使代宗大厯三年十二月以吐蕃歳犯西疆增修鎮守乃以邠寧節度馬璘為涇原節度使鎮涇州以邠寧慶等州𨽻入朔方時朝議以馬璘孤軍在邠州不足捍蔽遂徙郭子儀軍自河中居邠仍兼邠寧節度令馬璘居涇自是京師寧晏五年徙置嘗悉柘靜恭五州于山險要害之地備吐蕃也八年夏城奉天縣以備蕃冦是年朝議以為近歳蕃戍入邠寧之後三輔已西無襟帶之固而涇州散地不足為守宰臣元載嘗為西州刺史知河西隴右之要害指畫於帝前曰今國家西境極于潘原吐蕃防戍在摧沙堡與原州界其間原州當西塞之口接隴山之固草肥水甘舊壘存焉吐蕃比毁其垣墉棄之不居其西則監牧故地皆有長壕巨塹重􅃨深固原州雖早霜黍稷不藝而有平凉附其東獨耕一縣可以足食請移京西軍戍原州乗間築之貯粟一年戎人夏收多在青海羽書覆至已閲月矣令運築竝作不二旬可畢移子儀大軍居涇以為根本分兵守石門木峽隴山之闗北抵于河皆連山峻嶺冦不可越稍置鳴沙縣豊安軍為之羽翼北帶靈武五城為之形勢然後與隴右之地以至安西是謂斷西戎之脛朝廷可髙枕矣兼圖其地形以獻載宻使人踰隴山入原州量井泉計徒庸車乗畚鍤之器皆具檢校左僕射田神功沮之曰興師料敵老將所難陛下信一書生言舉國從之聽悞矣帝遅疑不決㑹載得罪乃止九年四月甲申闗内河東副元帥中書令郭子儀如行營引辭於延英殿語及邉事涕泗交集由是中書舍人常衮率常侍給舍諫議遺補一十八人詣閣門請論事有詔三人一引各盡已懷帝皆畢詞聽納乙酉勑曰自古聖帝明王之臨御也莫不法乾坤之覆載體山川之受納立徳於太上還淳於至道清净無事保合太和濟于群生洽於四海豈埀意兵革勞心戰争也蓋有徳化之所不綏招懐之所未諭不式王命毒流生人故有除暴禁滛之師安人止戈之武則神農黄帝堯舜禹湯之所不免也朕君臨萬邦十有三載薄徳内愧中夜再興至如易簡寛仁恭黙元淡素懐所慕終食豈忘然自承統已來屬當多難伊川有盗國之孽朔野有叛君之將江湖海島伏戎數軰其在右武妄能觧嚴所以請於宗廟親授經略誅詰姦宄摧殄暴强三年之間方内底定此皆皇天佑我烈祖群后戴予一人是用集大勲于國家保萬姓于區夏豈伊寡薄能及此邪每思偃兵姑務柔逺將息馬以論道期舞干而修徳而西戎負約間歳犯邉朕常棄細過庶𢎞大體疆臣兵吏亟請長驅屢有誡勑不令掩襲兼約㳺騎不許擒生庶或誤之亦使還遣固以亭育之義豈隔柔夷綏撫之㤙寧殊逺邇故布文告以訓之叙舅甥以睦之彼亦甞遣聘臣來修舊好玉帛之禮以至於上國烽燧之候已及於近郊長其無猒昧於事大去冬踰我闗隴入我郇邠驅人之馬牛掠人之士女朕許其通好本在人安乗此不虞飜貽我詐每一興念悼于厥心豈朕不叶於親鄰豈朕有負於㤙信猶期懲艾未忍討除今大閲甲兵以增扞禦且宏不戰之道用舉備邉之常所以然者念其載勤欵疏求繼嘉姻事或由𠂻義從割愛因之寧逺豈復顧私當罷四方之師永全二國之好儻更侵冐必示威刑宜令子儀以上郡北地四塞五原義渠稽胡鮮卑雜種馬歩五萬衆嚴㑹栒邑克壯舊軍抱玉以晉之髙都韓之上黨河湟義從汧隴少年凡三萬衆横絶髙壁斜界連營馬璘以西域前庭車師後部兼廣武之戎下蔡之徭凡三萬衆據于朝那遏當路之塞忠誠以盧龍桞城洎在北平漢東諸鎮江黄申息之師凡三萬衆屯于回中張大軍之援忠誠以武落别挍右地竒鋒凡二萬衆出岐陽而北㑹希譲以三輔大常之徒六郡良家之子自渭上而西合汴東淄青河陽幽前總四萬衆分列前後魏成徳昭義永平總六師衆大舒左右朕内整禁旅親誓諸將資以千金之費錫以六牧之馬戎裝戰器軍用邉儲各有司存素皆精辦咨爾將相文武宣力之臣夫師克在和善戰不陣各宜保據經界屯據要衝斥候惟明首尾相應若能悔過何必勞人如或不然自當伐罪然後眷求統一以制諸部進取之宜俟於後命各敬爾守無黷武經賞罰之科國有明典宣示中外知朕意焉八月甲辰詔諸軍分統防秋將士其淮西鳳翔防秋兵士馬璘統之汴宋淄青成徳軍兵士朱泚統之河陽永平兵士子儀統之揚楚兵士抱玉統之十一年正月辛巳加朔方五城戍兵及增修屯田備囘紇也十二年秋詔幽州盧龍節度使朱泚如奉天行營以備西戎册府元龜卷九百九十二
