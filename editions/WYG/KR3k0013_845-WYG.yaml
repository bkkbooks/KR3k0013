body:
  text: 冊府元龜卷八百四十五宋王欽若等撰總録部膂力趫捷善武藝執御膂力詩云孔武有力又云有力如虎斯盖萬人之敵百夫之防者也其有血氣方剛筋骨秀出懻忮自任伉健無對絶邁乎倫品時負於壯勇誠禀賦之有殊而才力之尤異然則恃之者亡稱之者賤聖人不語其惟力乎小民所用在於壯爾自非處之若怯而戒之在鬭進以戡難而禦侮退乃卷懐而若虛亦何以全養勇之道成率義之美哉其或肆陸梁恃鷙猛謂衆莫予拒而務於勝人是乃暴虎之徒不足算已奡寒浞子多力能陸地行舟蜚亷秦之先也蜚亷生惡來有力手裂虎兕蜚亷善走父子俱以才力事紂潁考叔鄭大夫鄭伯將伐許授兵於太宫太宫鄭祖廟也公孫閼與潁考叔争車公孫閼鄭大夫潁考叔挾輈以走輈車轅也子都拔棘以逐之子都公孫閼也棘㦸也南宫長萬宋大夫曹師伐宋長萬奔陳以乗車輦其毋一日而至乗車非兵車駕人曰輦宋去陳二百六十里言萬之多力宋人請南宫萬于陳以賂陳人使婦人飲之酒而以犀革裹之比及宋手足皆見宋人醢之叔山冉楚人晉楚戰于鄢陵楚師薄于險薄迫也叔山冉摶人以投中車折軾晉師乃止秦堇父魯孟獻子家臣魯師從晉伐偪陽堇父輦重如役叔挽重車以從師叔梁紇魯人為鄹邑大夫從伐偪陽偪陽人啓門諸侯之士門焉見門開故攻之懸門發紇抉之以出門者狄虒彌魯人從晉伐偪陽叔梁紇既抉懸門虒彌建大車之輪而蒙之以甲以為櫓蒙覆也櫓大楯也左執之右拔㦸以成一隊孟獻子曰詩所謂有力如虎者也慶舎字子之為齊大夫封之子慶封之亂欒髙陳鮑之徒介慶氏之甲欒子雅髙子尾陳陳須無鮑鮑國子尾抽桷擊扉三桷椽也扉門闔也以桷擊扉為期盧蒲癸自後刺子之王何以戈擊之解其左肩猶援廟桷動於甍以俎壺投殺人而後死言其甚多力子期楚司馬白公勝作亂殺子期于朝子期曰昔者吾以力事君不可以弗終拔豫章以殺人而後死以效其多力豫章大木孟説不知何許人秦武王有力好戲力士任鄙烏獲與説皆至大官王與説舉鼎絶臏而死臏作脉孟賁生拔牛角夏育衛人力舉千鈞吾邱鴧中山之人多力也趙氏攻中山吾丘鴧衣鐵甲操鐵杖以戰而擊無不碎所衝無不陷以車投車以人投人漢項籍字羽下相人力扛鼎扛舉也才氣過人申屠嘉梁人文帝時為丞相初以材官蹶張今之弩以手張者曰臂張以足蹋者曰蹶張從髙帝上官桀隴西上邽人少時為羽林期門郎從武帝上甘泉天大風車不得行解盖授桀桀盖雖風嘗屬車屬連也雨下盖輒御帝竒其才力遷未央廐令甘延壽字君况少以良家子善騎射為羽林投石拔距絶於等倫投石以石投人也拔距者有人連坐相把據也距以為堅而能拔取之皆言其有手掣之力超踰亭樓又言其趫捷耳非拔距也今人猶有拔𤓰之戲盖拔距之遺法後漢盖延漁陽人彎弓三百斤邊俗尚勇力而延以氣聞官終左馮翼將軍祭肜字次孫有勇力能貫三百斤弓位太僕虞延字予大力能扛鼎官終太僕郭涼身長八尺氣力壯猛葛龔以善文記知名性慷慨壯烈勇力過人位臨汾令魏許褚勇力絶人漢末聚少年及宗族數千家共堅壁以禦冦時汝南葛陂賊萬餘人攻褚壁褚衆少不敵力戰疲極兵矢盡乃令壁中男女聚治石如杵斗者置四隅褚飛石擲之所值皆摧碎賊不敢進糧乏偽與賊和以牛與賊易食賊來取牛牛輒奔還褚乃出陣前一手逆曳牛尾行百餘歩賊衆驚遂不敢取牛而走繇是淮汝陳梁間聞皆畏憚之後從太祖討韓遂馬超於潼闗太祖將北渡臨濟河先渡兵獨與褚及虎士百餘人留南崖斷後超將步騎萬餘人來奔太祖軍矢下如雨褚白太祖賊來多今兵渡以盡宜去乃扶太祖上船賊戰急軍争濟船重欲没褚斬攀船者左手舉馬鞍蔽太祖船舵工為流矢所中死褚右手並泝船僅乃得渡是日㣲褚幾危其後太祖與遂超等單馬㑹語左右皆不得從惟將褚超負其力隂欲前突太祖素聞褚勇疑從騎是褚乃問太祖曰公有虎侯者安在太祖顧指褚褚瞋目眄之超不敢動乃各罷後數日㑹戰大破超等褚身斬首級遷武衛中郎將武衛之號自此始也軍中以褚力如虎而癡故號曰虎癡是以超問虎侯至今天下稱焉皆謂其姓名也典韋陳留已吾人形貌魁梧膂力過人初平中張邈舉義兵韋為士屬司馬趙寵牙門旗長大人莫能勝韋以一手建之寵異其才力韋好持大雙㦸與長刀等軍中為之語曰帳下壯士有韋君提一雙㦸八十斤蜀劉封隨先主入蜀自葭萌還攻劉璋時封年二十餘有將數人將兵俱與諸葛亮張飛等泝流洄而上所在戰克位副軍將軍吳韓當為孫堅别部司馬嘗從堅征伐周旋數犯危難陷敵擒虜董龔字元代㑹稽餘姚人長八尺武力過人位偏将軍朱據字子範吳郡吳人有姿貌膂力又能論難位新都郡丞晉庾東以勇力聞武帝時有西域健胡趫㨗無敵晉人莫敢與較帝募勇士惟東應選遂撲殺之名振殊俗蔡裔少有勇力呼聲若雷嘗有盜入室裔撫几一呼賊衆皆殞時人憚之後為兖州刺史吳彦字士則吳郡吳人出自寒㣲有文武才幹身長八尺手格猛獸膂力絶羣位交州刺史張昌本義陽蠻少為平氏縣吏武力過人後蜀李庠為中軍騎督弓馬便㨗膂力過人時論方之文鴦宋孟龍符驍果有膽氣幹力絶人位殿中將軍孟係祖有筋幹異力能擔負數人入𨽻羽林為殿中将軍劉唐祖新康縣男䖍之子便弓馬膂力絶人佼長生出身為縣將本府以其膂力召為府將張東有勇力手格猛獸位左将軍南齊周山圖家業寒賤年十五六氣力絶衆食噉嘗兼數人鄉里獵戲聚嘗為主帥指麾處分皆見從位黄門郎張敬兒南陽冠軍人好射虎南陽新野風俗出騎射而敬兒尤多膂力求入隊為曲阿戎驛將焦度為青州刺史顔師伯輔國府參軍師伯啓孝武稱度氣力弓馬絶人帝召還充左右見度身形黒壯謂師伯曰真健物也梁羊侃少而雄勇膂力絶人泗橋有數石人長八尺大十圍侃執以相擊悉皆破碎位都官尚書鄧元起字仲居南郡當陽人也少有膽幹膂力過人位益州刺史陳周鐵虎不知何許人梁世南渡語音傖重膂力過人位太子左衛程靈洗少以勇力聞歩行日二百餘里位安西将軍杜僧明形貌𦕈小而膽氣過人有勇力善騎射位平北將軍任忠字奉誠小名蠻奴膂力過人尤善騎射位開府儀同三司周廸少居山谷有膂力能挽彊弩以弋獵為事位平南將軍乙瓌代人慕化入貢世祖留之瓌便弓馬善騎射手格猛獸膂力過人位西道都督徐世譜字典宗居荆州為主帥征伐蠻蜑尤敢勇有膂力善水戰後魏于栗磾代人為冠軍將軍道武畋于白登山見熊領數子帝謂栗磾曰能縳之乎栗磾曰能帝曰若搏之不勝豈不虚斃一壯士耶栗磾曰自可能致御前而制之尋擒之崔延伯博陵人也有氣力以勇壯聞位征西将軍韓茂字元興父耆龍驤将軍茂年十七膂力絶人尤善騎射明元曽親征丁零翟猛茂為中軍執幢時大風諸軍旌皆偃仆茂於馬上持幢初不傾倒明元異而問之徴茂所屬具以狀對明元謂左右曰記之尋徴詣行在所試以騎射明元深竒之以茂為虎賁中郎将陸真代人少善騎射大武初以真膂力過人拜為内郎劉尼少壯健有膂力勇果善射太武見而善之拜羽林郎中谷渾字元冲昌黎人父衮膂力兼人彎弓三百斤勇冠一時位安南將軍伊馥代人善射多力曳牛却行位太子太保長孫頺善射彎弓三百斤位征南將軍宇文福少驍果有膂力位征南將軍鄭思明左光祿大夫連山子思明及弟思和並以武力自効位直閣將軍傅永字修期清河人有氣幹拳勇過人子叔偉九嵗為州主簿及長膂力過人彎弓三百斤左右馳射見者以為得永之武而不得永之文也奚康生性驍勇有武藝弓力十石為南青州刺史時梁武帝聞康生能引强弩力至十餘石故特作大弓兩張送與康生康生得弓便㑹集文武乃用平射猶有餘力其弓長八尺把中圍尺二寸箭麄殆如今之長笛觀者以為希世絶倫弓即表送置之武庫崔鳳少便弓馬壯勇有膂力北齊侯景懷鎮人少驍勇有膂力善騎射以選為北鎮兵綦連猛魏元象中為中外府帳内都督梁使來聘云有武藝求訪北人欲與相角文襄遣猛就館接之雙帶兩鞬左右馳射兼共試力挽强梁人引弓兩張力皆三石猛遂併取四張叠而抗之過度梁人嗟服之後周韓雄字木蘭河東垣人也少敢勇膂力絶人工騎射有将帥材略位驃騎大将軍竇熾字光成善騎射膂力過人位太保宇文顯和膂力絶人彎弓數百斤能左右馳射王勇代州武川人本名胡仁少雄健有膽决便弓馬膂力過人位大将軍王傑少有志每以功名自許善騎射有膂力位上柱國崔説本名士約少有氣概膂力過人尤工騎射位大将軍楊汪字元度少兇疎好與人羣鬬拳所毆擊無不顛踣位吏部尚書韓盛善騎射膂力過人位新平郡守隋張威少倜儻有大志善騎射膂力過人在周數從征伐位至柱國京兆尹和洪濟南人少有武力勇烈過人周武帝時數從征伐以戰功累遷車騎大将軍段文振北海平原人少有膂力膽氣過人位左候大將軍魚俱羅馮翼下邽人膂力絶人聲氣雄壯言聞數百歩弱冠為親衛累遷大都督董純字徳厚少有膂力便弓馬在周仕歴司御上士周範偉儀姿有膂力仕隋齊王府佐唐張士貴本名忽㖀𢎞農盧氏人也膂力過人彎弓一百五十斤左右騎射矢不虚發位左領軍大將軍喬軌字文度京兆渭南人慷慨有志略身長八尺膂力過人善擊劒左右馳射而頗渉書傳梁崇義長安人以升斗給役于市井間有膂力能卷金舒鉤後為羽林射生衛伯玉有膂力自幼習知武藝天寳中仗劒之安西以邊功累遷至員外諸衛将軍康藝全為河東偏伍勇力絶人節度使馬燧以其多藝因以藝全名之李載義以武力稱繼為幽州屬郡守載義少孤與鄉曲之不令者遊有勇力善挽强角觝劉濟為幽州節度使見而偉之置於親軍毎從征伐梁王彦章曹南人少好勇多力太祖領四鎮擢為偏校嘗持一鐵槍重踰百斤所向無敢當者後唐朱漢賔亳州人少有膂力形神壯偉膽氣過人位太子少保致仕晉翟璋好男力時目為大蟲即癡虎之稱也位左羽林綂軍張郎年十八善射膂力過人鄉里憚之位慶州刺史周王繼𢎞少勇悍後唐明宗作鎮致之麾下善歩鬬多力位河陽節度使趫㨗夫有力善走剽悍勁疾斯趫㨗之謂也若乃禀肖之異伉健殊尤屬方剛之際挺孔武之力跳盪輕疾絶出流類雖則一介之士亦乃百夫之特也然則壯有所用力供時使仡仡之氣既有所取﨣﨣之武亦可足稱或乃恃其過人昧乎養勇失於繇禮之訓違夫率義之㫖斯故輕生而嗇禍者哉蜚亷秦之先也足走千里手制兕虎以材力事商紂圉人犖魯人圉人掌養馬者犖名也史失其姓能投盖于稷門盖覆也稷門魯南門走而自投接其尾之桷反覆門上慶忌吳人勇為人所門走及奔馬漢甘延壽字君况北地郁都人為羽林投石㨗手絶於等倫嘗超踰羽林亭樓繇是遷為郎試弁為期門尉以材力愛幸為西域都䕶與陳湯共誅斬郅支單于封義成侯後漢董卓臨洮人膂力過人雙帶兩鞬左右馳射為羌胡所畏桓帝末以六郡良家子為羽林郎後位太師張燕常山真定人剽悍㨗速過人故軍中號曰飛燕後為平北将軍吕布字奉先五原郡九原人也漢末以驍武給并州便弓馬膂力過人號曰飛将稍遷至中郎將董卓自以遇人無禮恐人謀已嘗以布自衛卓性剛而褊忿布嘗小失意拔手㦸擲布布拳㨗避之而改容顧謝卓意亦解吳虞翻㑹稽餘姚人為孫䇿功曹從䇿討山越䇿獨騎與翻相待山中得平地勸䇿乗馬䇿曰卿無馬奈何答曰翻能歩行日可三百餘里自征討以來吏卒無及翻者明府試躍馬翻隨之行及大道得一鼓吏䇿取角自鳴之部曲識聲小大皆出遂從周旋平定三郡晉唐彬字儒宗魯國鄒人少便弓馬好遊獵身長八尺走及奔鹿强力兼人後為前将軍領西戎校尉雍州刺史王彌東萊人惠帝末入長廣山為羣盜彌多權略凡有所掠必豫圖成敗舉無遺䇿弓馬迅㨗膂力過人青土號為飛豹郭黙河内懷人少㣲賤以壯勇事太守裴整嘗身被重甲跳三丈餘時人莫不憚之後為西中郎将豫州刺史桓石䖍荆州刺史豁之子小字鎮惡有才幹趫㨗絶倫從父在荆州於獵圍中見猛獸被數箭而伏諸督将素知其勇戲令拔箭石䖍因急往拔得一箭猛獸跳石䖍亦跳高於猛獸獸伏復拔一箭以歸終冠軍将軍豫州刺史陳安字虎侯隴右人驍壯果毅武幹過人多力善射持七尺刀貫甲奔及馳馬宋傅𢎞之北地泥陽人也素善騎乗為建威将軍順陽太守從高祖至長安𢎞之於姚泓馳道内綏服戲馬或馳或驟往反二十里中甚有姿致羌胡聚觀者數十人並驚惋歎息初上馬以馬鞭柄䇿挽致兩股内及下馬柄折尺天生吳興餘杭人天興之弟也天生少為隊将十人同火屋後有一大坑廣二丈餘十人共跳之皆度惟天生墜坑天生乃取實中苦竹剡其端使利交横布坑内更呼等類共跳並畏懼不敢天生曰我向已不度今者必墜此坑中丈夫跳此不度亦何活乃復跳之往反十餘曽無留礙衆並歎服南齊張敬兒為雍州刺史部伍泊沔口敬兒乗舴艋過江詣晉熈王爕中江遇風船覆左右丁壯者各泅走餘二小吏没船下呌呼張敬兒兩掖挾之隨船覆仰嘗得在水上如此翻覆行數十里方得迎接失所持節更給之王敬則晉陵南沙人也年二十餘善拍張跳刁髙與白虎幢等如此五六接無不中補挾轂隊主領細鎧左右梁羊偘泰山梁甫人也少雄勇膂力絶人於兖州堯廟蹋壁直上至五尋横行得七跡後為都官尚書蘭欽字休明幼而果决趫㨗過人宋末隨父子雲在雒陽嘗於市騙槖駞天監中兼文徳主師征南中五郡諸洞反者所至皆平欽有謀略勇决善戰歩行日二百里勇武過人善撫馭得人死力以軍功封安懐縣男陳周文育義興陽羡人也年十一能反覆游水中數里髙跳六尺與羣兒聚戲衆莫能及後為鎮南将軍封壽昌公黄法􅉤音俱字仲昭巴山新建人少勁健有膽力歩行日三百里距躍三丈頗便書疏閑明簿領出入郡中為鄉里所憚後為豫州刺史後魏傅永廣平易陽人也有氣幹拳勇過人能手執鞍橋倒立馳騁後為平東将軍光禄大夫傅叔偉永之子也亦能立馬上與人角騁九嵗為州主簿楊大眼武都氐難當之孫少有膽氣跳走如飛然側出不為一宗親顧待頗有饑寒之切太和中起家奉朝請時孝文自代将南伐令尚書李冲典選征官大眼往求焉冲弗許大眼曰尚書不見知聴下官出一伎便出長繩三丈許繫髮而走繩直如矢馬馳不及見者莫不驚歎冲曰自千載以來未有逸才若此者也遂用為軍主大眼顧謂同寮曰吾之今日所謂蛟龍得水之秋自此一舉終不復與諸君齊列矣未幾遷為統軍從孝武征宛葉襄鄧九江鍾離之間所經戰陣莫不勇冠六軍伊馥代人少而勇健走及奔馬善射多力位終太子太保平尚書事爾朱兆字萬仁榮從子也少驍猛善騎射手格猛獸趫㨗過人數從榮遊獵至於窮巖絶澗人所不能升降者兆必先之榮以此特加賞愛任為爪牙以軍功為平逺将軍歩兵校尉後周韓果字阿六拔代州武川人驍雄善騎射從賀拔岳西征為岳帳卒果膂力絶倫被甲荷戈昇陟峯嶺猶涉平路雖數十百日不以為勞以功授宣威将軍後從大軍破稽胡於北山胡地險阻人迹罕至果進兵窮討散其種落稽胡憚果勁健號為著翅人太祖聞之笑曰著翅之名寧減飛将達奚震字猛略代人也同州刺史武之子少驍勇便騎射太祖嘗於渭北較獵兎過太祖前震與諸将競射之馬倒而墜震足不傾躓因歩走射之矢發中兎顧馬纔起遂迴身騰上太祖喜曰非此父不生此子乃賜震雜綵百段震後累遷上柱國隋賀若敦仕周文為都督封安陵縣伯嘗從太祖較獵於甘泉宫時圍人不齊獸多逃逸太祖大怒人皆股戰圍内惟有一鹿俄亦突圍而走敦躍馬馳之鹿上東山敦棄馬歩逐至山半便掣之而下太祖悦諸将因得免責長孫晟趫㨗過人年十八為後周司衛上士崔𢎞度年十七周大冡宰宇文䕶引為親信軍校都督累轉大都督時䕶弟中山公訓為蒲州刺史令𢎞度從焉嘗與訓登樓至上層去地四五丈俯臨之訓曰可畏也𢎞度曰此何足畏欻然擲下至地無損傷訓以其拳㨗大竒之麥鐵杖始興人驍勇有膂力日行五百里走及奔馬陳宣帝大建中聚結為盜俘役為官戸配執御􅏛毎罷朝後行百餘里夜至南徐州踰城而入行光火刼盜旦還及牙時仍又執􅏛如此者十餘度物主識之州以狀奏朝士見鐵杖毎旦嘗在不之信也後數告變尚書蔡徴曰此可騐耳於仗下時購以百金求人送詔書與南徐州刺史鐵杖出應暮齎勑而往明旦及奏事帝曰信然為盜明矣惜其勇㨗誡而釋之陳亡後徙居清流縣遇江東反楊素遣鐵杖覘賊後叙戰勲不及鐵杖遇素馳驛歸于京師鐵杖歩追之毎夜則同宿素見而特悟奏授儀同三司以不識書放還鄉里成陽公李徹稱其驍武沈光字總持少驍㨗初建禪定寺其中幡竿髙十餘丈適遇繩絶非人力所及諸僧患之光見而謂僧曰持繩來當相為上耳諸僧驚喜因取而與之光乃銜索拍竿而上直至龍頭繫繩畢手足皆放透空而下以掌據地倒行數十歩觀者駭悦莫不嗟異時人號為肉飛僊從煬帝攻遼東以衝梯擊城竿長十五丈光昇其端臨城與賊戰短兵接殺十數人賊競擊之而墜未及於地適遇竿有垂絙光接而復上帝望見壯異之即拜朝散大夫史萬嵗少英武善騎射驍㨗若飛後以軍功拜上大将軍宇文忻字仲樂幼而敏惠年十二能左右馳射驍㨗若飛位至右領軍大将軍權武拜開府襲爵齊城郡公武少勁果能重甲上馬嘗倒投於井未及泉復躍而出其拳勇如此頻以軍功増邑終右屯衛大将軍唐髙開道世家寒㣲煑鹽以自給少而驍㨗走及奔馬後為尉州總管趙持滿工書善射力摶猛獸㨗及奔馬改為涼州都督府長史而親仁愛士多所交結在涼州嘗逐野馬自從射之無不洞于胸腋邊人深伏之史敬奉靈武人為本軍牙将形甚短小若不能勝衣至于野外馳逐能擒奔馬自執鞍勒隨鞍躍上然後覊帶矛矢在手前無强敵漢史𢎞毅字化元少游俠無行拳勇健歩日行二百里走及奔馬髙祖時為侍衛親軍都指揮使周王進幽州良鄉人為人勇悍走及奔馬符彦超為河朔郡守以略誘寘之左右長興初彦超領鎮安州屬王希全搆亂令進變狀聞於朝廷明宗賞其迅速錄寧衛将軍善武藝弧矢之妙擊刺之能皆古人之所尚俠少之所務也其有忠信為質拳勇絶人既藴其壯心又輔之武藝復有負彼英姿目為飛将矟著折樹之名騎擅驚軍之號而能奉上盡節臨難不免此皆百夫之雄足以垂之不朽儻或心蓄姦賊志在飛揚雖使刀矛俱發左右馳騁所謂勇而無禮徒為兆亂之本者也荆軻衛人也衛人謂之慶卿既而之燕燕人謂之荆卿荆卿好讀書學擊劔以説衛元君元君不用漢司馬相如字長卿通西南夷拜中郎将少時好讀書學擊劔魏典韋陳留已吾人仕太祖至校尉好持大㦸與長刀軍中為之語曰帳下壯士有典君提一雙㦸八十斤嚴翰字公仲器性重厚篤好擊劔晉楊濟字文通厯位鎮南征北将軍武帝重兵官多授貴戚清望濟以武藝號為稱職桓𤣥字靈寳襲爵南郡公在江陵甚豪横士庶畏之過於刺史殷仲堪𤣥於仲堪㕔事前戲馬以矟擬仲堪仲堪中兵參軍劉邁在座謂𤣥馬矟有餘精理不足仲堪為之失色陳安為劉曜将後叛曜自稱大将軍雍涼秦梁四州牧涼王曜使其将軍平先立中伯率勁騎追安安與壯士十餘騎於陜中格戰安左手奮七尺大刀右手執丈八蛇矛近交則刀矛俱發輒害五六逺則雙帶鞬服左右馳射平先亦壯健絶人與安搏戰三交奪其蛇矛及安死隴上歌之曰隴上健兒有陳安軀幹雖小腹中寛䯀騘文馬鐵鍜鞍七尺大刀奮如湍丈八蛇矛左右盤十盪十決無當前南齊王宜興為屯騎校尉與黄回同石頭之謀宜興拳㨗善舞刀楯回嘗使十餘人以水交灑不能著周盤龍北蘭陵人為征虜将軍濟陽太守世祖數搆武帝令盤龍領軍校尉騁矟陳天福為前軍将軍善馬矟至今諸将法之梁羊侃為大軍司髙祖時車駕幸樂遊苑侃預宴時少府奏新造兩刀矟成長二丈四尺圍一尺三寸帝因賜侃河南國紫騮馬令試之侃執矟上馬左右擊刺特盡其妙觀者登樹帝曰此樹必為侍中折矣俄而果折因號此矟為折樹矟王神念為爪牙将軍少善騎射既老不衰嘗於髙祖前執二方楯左右交度馳馬往來冠絶郡伍有楊華者能作驚軍騎並一時妙㨗後魏來大千為騎都尉驍果善騎射永興初襲爵遷中散至於朝賀之日大千嘗著御鎧盤馬殿前朝臣莫不嗟歎于栗磾代人也為冠軍将軍左右馳射武藝過人好持黒矟以自標明元時拜黒矟将軍北齊尉興敬幽州刺史長命之子便弓馬有武藝髙祖引為帳内都督獨孤楷少謹厚便弄馬槊為宇文䕶執刀累轉車騎将軍田式字顯標為襄州總管性剛果多武藝拳勇過人燕榮字貴華髙祖受禪為大将軍性剛嚴有武藝擊突厥有功唐單雄信為李宻将少驍健尤能馬上用槍宻軍號為飛将羅士信始年十四為滎陽通守張須陁執衣遇翟讓來寇士信因請自効須陁小之士信重著一甲左右雙鞬躍而上馬陣方列士信執長槍立於馬上馳至賊所刺倒數人斬一人首擲於空中用槍承之戴以略陣賊衆愕然莫敢逼者士信乃棄鞍馳馬為十上十下而還秦叔寳為上柱國封翼國公毎從太宗征伐敵中有驍将鋭卒炫燿人馬出入來去太宗輒命叔寳往取叔寳應命躍槍而進必刺之萬衆之中哥舒翰初為别将吐蕃冦邊翰拒之于苦拔海吐蕃之衆三道從山相續而下翰持半叚槍當兵鋒逆擊之無不摧靡又擊其次軍復走又擊其後軍皆大破之繇是知名翰有家臣曰左車年十五毎隨翰入陣翰善使槍追賊及之以槍搭其肩而喝之賊驚顧翰從而刺其喉皆剔髙三五丈而墜左車輒下馬斬其首率以為常王難得有膽力天寳初吐蕃大冦河源軍難得以騎将為軍鋒贊普有子曰琅支都恃其趫悍乗諳真馬寳鈿裝鞍軍前求較鬬者難得横槍突往刺殺之斬其首以其馬歸軍使以聞𤣥宗召至御殿問之因令馳突作殺琅支都狀壯之賜以錦袍拜羽林将軍郭子儀初以武舉補左衛長史累以武藝登科為諸軍使李懐光為朔方節度少從軍為朔方死将以武藝壯勇稱朔方節度使郭子儀禮之益厚李觀徳宗時為四鎮北庭節度使少習武藝沈厚寡言有将帥識度梁王敬蕘潁州汝隂人為武寧軍節度使敬蕘魁傑沈勇多力善戰所用槍矢皆以純鐵鍜就槍重三十斤摧鋒突陣率以此勝王彦章少從軍嘗持鐵槍衝堅陷陣敵人畏之目之為王鐵槍後至正國軍節度使王景仁廬州合肥人材質魁偉性暴率無威儀善用槊頗推驍悍後至檢校太尉同平章事王重師潁川長杜人也唐天祐中為雍州節度使同平章事材力兼人沈黙大度臨事有權變劔矟之妙冠絶於一時中和末蔡冦陷許昌重師脱身而來太祖異其狀貌乃􅈻于拔山都毎於軍前效用頗出儕類晉萇從簡陳州人天福初為許州節度使世以屠羊為事力敵數人善用槊初事唐莊宗為小校攻取城邑召人為梯頭從簡多應募焉安審暉為邢州節度使器局謹重從父戰陣武藝絶人起家長直軍副兵馬使執御仲尼曰吾何執吾執御矣若夫衘勒無失則控御有力輗軏斯正則夷險可履況乎任重致逺而徐疾以攸宜自邇陟遐故驅馳而莫擬盖競畏之無斁信動静而有常若乃蹉跌稍失用舍不精非徒敗律喪師抑亦失身隕志其為執御可不慎歟商費昌夏桀之時去夏歸商為湯御以敗夏桀于鳴條孟戲中衍太戊聞而卜之使御尹遂致使御而妻之周造父以善御幸於穆王得驥溫驪溫一作盗為馬純頸驪黒色驊騮色如華而赤今名馬驃赤者為棗駵駵馬赤也騄耳之駟紀年云北唐之君來見以一驪馬是生騄耳八駿皆因其毛色為名西巡狩樂而忘歸奄父公仲宣王伐戎以為御縣賁父魯人魯公及宋人戰于乗丘縣賁父御縣賁皆氏也凡車右勇力者為之卜國為右馬驚敗績驚奔失列公墜佐車授綏戎車之貳曰佐授綏乗公公曰末之卜也末之猶㣲哉言卜國無縣賁父曰他日不敗績而今敗績是無勇也公他日戰其御馬未嘗驚奔遂死之二人赴敵而死圉人浴馬有流矢在白肉圉人掌養馬者白肉服裏肉公曰非其罪也流矢中馬非御與右之罪也遂誄之誄其赴敵之功以為謚歩揚晉人秦穆公侵晉至于都都晉地韓原惠公謂慶鄭曰冦深矣若之何對曰君深其怨能淺其冦乎卜右慶鄭吉公曰鄭也不遜以家僕徒為右步揚御戎戎御公戎車梁繇靡御韓簡號射為右以承公晉師潰戎馬還濘而止梁繇靡御韓簡輅秦公将止之輅迎止獲也慶鄭曰釋來救君亦不克救遂止于秦許伯楚人邲之戰許伯御樂伯攝叔為右以致晉師許伯曰吾聞致師者御靡旌摩壘而還靡旌疾馳也摩近也樂伯曰吾聞致師者左射以菆左車左㬰菆矢之善也代御執轡御下兩馬掉鞅而還兩示也掉正也閒暇攝叔曰吾聞致師者右入壘折馘折馘斷耳執俘而還皆行其所聞而復邴夏齊人鞍之戰邴夏御齊侯逢丑父為右晉解張御郤克鄭邱緩為右郤克傷於矢流血及屨未絶鼓音中軍将自執旗鼔故雖傷而擊鼔不息曰余病矣張侯曰自始合而矢貫余手及肘余折以御左輪朱殷豈敢言病吾子忍之張侯解張也朱血色血色久則殷殷音近烟人謂赤黒為殷色言血多汚車輪御猶不敢息緩曰自始合茍有險余必下推車子豈識之然子病矣以其不識已推車張侯曰師之耳目在吾旗鼓進退從之此車一人殿之可以集事殿鎮也集成也若之何其以病敗君之大事也擐甲執兵固即死也病未及死吾子勉之左并轡右援枹而鼓馬逸不能止師從之晉師從郤克車齊師敗績韓厥将戰夢子輿謂已曰且辟左右子輿韓厥父故中御而從齊侯居中代御者自非元師御者皆在中将左右邴夏曰射其御者君子也公曰謂之君子而射之非禮也齊侯不知戎禮射其左越于車下射其右斃于車中郵無正郵無正大夫王良也晉人鐵之戰趙簡子曰鄭人擊我伏􅋶􅋶弓衣流血鼔音不衰今日之事莫我若也衛莊公為右莊公奔晉簡子将納之故為右曰吾九登九下擊人盡殪今日之事莫我加也郵無正曰吾兩鞅将絶吾能止之今日之事我御之上也駕而乗材材横木兩鞅皆絶一云趙簡子使王良與嬖奚乗終日而不獲一禽嬖奚反命曰天下之賤工也或以告王良良曰請復之彊而後行一朝而獲十嬖奚反命曰天下之良工也良請辭曰吾為範御終日不獲一為之詭遇一朝而獲十範法也詭不依法也東野畢魯人以善御聞定公問于顔闔曰東野畢之御善乎對曰善則善矣然其馬將佚定公不說入謂左右曰君子固誣人乎三日而牧來謁之曰東野畢之馬佚兩驂引兩服入廐定公越席而起召顔闔曰子言東野畢其馬将佚不識何以知之對曰臣以政知之昔者舜巧于使民而造父巧于使馬舜不窮其民造父不窮其馬是以舜無佚民造父無佚馬今東野畢之御上車執轡御體正矣歩驟馳騁朝禮畢矣厯險致逺其方盡矣然而求馬不已是以知之公曰善哉宛射犬鄭人楚子伐鄭諸侯救鄭晉侯使張輅輔躒致楚師求御于鄭卜宛射犬吉使御廣車而行尹需學御三年而無得焉嘗寢想之寢卧思之中夜夢受秋駕於師秋駕美御之師明日往朝望而謂之曰吾非愛道於子也恐子不可予也今日將敎子以秋駕尹承而反走北面再拜曰臣有天幸今夕因夢受之漢祕彭祖以卒開沛城門為太公僕又為中廐令擊陳豨封戴侯夏侯嬰為沛廐司御髙祖為沛公以嬰為太僕嘗奉車為沛公御車也荀彘太原廣武人以御見為侍中以善御得見因為侍中也晉王湛宗族皆以為痴兄子濟詣湛既而辭去湛送至門濟有從馬絶難乗濟問湛曰叔頗好騎否湛曰亦好之因騎此馬姿容既妙迴策如縈善騎者無以過之後至汝南内史宋劉徳願孝武時為豫州刺史善於御車嘗立兩柱使其中通車軸乃於百餘歩上振轡長驅未至數尺痛與牛杖從柱間直過其精如此世祖聞其能乃為之乗畫輪車幸太宰江夏王義恭第徳願著龍冠短朱衣執轡進止甚有容狀上欣歡賞賜甚厚唐齊映為御史中丞從徳宗幸梁州映嘗執轡㑹御馬遽駭奔跳頗甚帝懼傷映令舍轡映堅執久之乃止帝問其故曰馬奔踶不過傷臣茍捨之或犯清塵雖臣萬死何以塞責上嘉奨無已冊府元龜卷八百四十五
