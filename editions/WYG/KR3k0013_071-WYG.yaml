body:
  text: 册府元龜卷七十一宋王欽若等撰帝王部命相天生蒸民樹之以君而司牧之必選賢舉能而為之輔弼故天有三台之象易有鼎足之義所以佐天子理隂陽親萬民也武丁命傅説則曰朝夕納誨以輔台徳穆王命君牙亦曰今命爾予翼作股肱心膂此古先哲王命相之㫖也昔者黄帝得六相而天地理神明和虞舜亦舉八元八愷而百揆時序内成外平自時厥後或非其人而望興化若縁木求魚登山採珠不可得也故歴代以還寅亮天工登翼王室者不亦重乎黄帝得蚩尤而眀乎天道得太常而察乎地利得蒼龍而辨乎東方得祝融而辨乎南方得風后而辨乎西方得后土而辨乎北方得六相而天地治神明至一云置左右太監監于萬國虞舜即天子位曰咨四岳有能奮庸熈帝之載奮起庸功載事也訪羣臣有能起發其功廣堯之事者言舜曰以别堯使宅百揆亮采惠疇亮信恵順也求其人使居百揆之官信立其功順其事者誰乎僉曰伯禹作司空四岳同辭而對禹代鯀為崇伯入為天子司空治洪水有成功言可用之帝曰俞咨禹汝平水土惟時懋哉然其所舉稱禹前功以命之懋勉也惟居是百揆勉行之禹拜稽首讓於稷契暨臯陶居稷官者棄也契臯陶二臣名稽首首至地帝曰俞汝往哉然其所推之賢不許其讓勅使往宅百揆帝曰棄黎民阻饑汝后稷播時百榖阻難播布也衆人之難在於饑汝后稷布種是百榖以濟之羙其前功以勉之帝曰契百姓不親五品不遜五品謂五常遜順也汝作司徒敬敷五教在寛布五常之教務在寛所以得人心亦羙其前功帝曰臯陶蠻夷猾夏冦賊奸宄猾亂也夏華夏羣行攻刼曰冦殺人曰賊在外曰奸在内曰宄言無教之致汝作士五刑有服士理官也五刑墨劓剕宫大辟服從也言得輊重之中正五服三就既從五刑謂服罪也行刑當就三處大罪于原野大夫于朝士于市五流有宅五宅三居謂不加刑則流放之若四凶者五刑之流各有所居罪四居之差又有三等之居大次九州之外次千里之外惟明克允言臯陶能眀信五刑施之遠近蠻夷猾夏使咸信服無敢犯者因禹讓三臣故厯述之帝曰疇若予工僉曰垂哉問誰能順我百工事者朝臣舉垂垂臣名帝曰俞咨垂汝共工垂拜稽首讓於殳斨暨伯與帝曰俞往哉汝諧汝能諧和此官帝曰疇若予上下草木鳥獸僉曰益哉上謂山也下謂澤也順謂施其政教取之有時用之有節伯益能之帝曰俞咨益汝作朕虞虞掌山澤之官益拜稽首讓於朱虎熊羆帝曰俞往哉汝諧朱虎熊羆二臣垂益所讓四人皆在元愷之中帝曰咨四岳有能典朕三禮僉曰伯夷三禮天地人之禮伯夷臣名姜姓帝曰俞咨伯汝作秩宗秩序宗尊也主郊廟之官夙夜惟寅直哉惟清夙早也言早夜敬思其職典禮施政教使正直而清明伯拜稽首讓於䕫龍䕫龍二臣名帝曰俞往欽哉然其賢不許讓帝曰䕫命汝典樂教胄子冑長也謂元子以下至卿大夫子弟以歌詩蹈之舞之教長國子中和祇庸孝友直而温寛而栗教之正直而温和寛𢎞而能莊栗剛而無虐簡而無傲剛失入虐簡失入傲教之以防其失詩言志歌永言謂詩言志以導之歌其意以長其言聲依永律和聲聲謂五聲宫商角徵羽律謂六律六吕十二月之音氣言當依聲律以和樂八音克諧無相奪倫神人以和倫理也八音能諧理不錯奪則神人咸和命䕫使勉之䕫曰於予擊石拊石百獸率舞石磬也磬音之清者拊亦擊也舉清者和則其餘皆從矣樂感百獸使相率而舞則神人和可知帝曰龍朕堲讒説殄行震驚朕師堲疾殄絶震動也言我疾讒說絶君子之行而動驚我衆欲遏絶之命汝作納言夙夜出納朕命惟允納言喉舌之官聽下言納于上受上言宣于下必以信夏禹既立舉臯陶且授政焉臯陶卒舉益任之政殷湯初為諸侯舉伊尹作咸有一徳一云仲虺為湯左相太戊立伊陟為相伊陟尹之子髙宗武丁即位思復興殷而未得其佐三年不言政事决定於冡宰冡宰天官卿貳王事者以觀國風夜夢得説夢得賢相其名曰説使百工營求諸野得諸傅巖使百官以所夢之形象絰營求之于外野得之于傅巖之谿作説命命説為相使攝政曰王宅憂亮隂三祀隂黙也居憂信黙三年不言既免䘮其惟弗言除䘮猶不言政羣臣咸諫于王曰嗚呼知之曰明哲明哲實作則知事則為明智明智則能制作法則天子惟君萬邦百官承式天下待令百官仰法王言惟作命不言臣下罔攸禀令禀受令亦命也王庸作書以誥曰以台正於四方台恐徳弗類兹故弗言用臣下怪之故作誥類善也我正四方恐徳不善此故不言恭黙思道夢帝賚予良弼其代予言夢天與我輔弼良佐将代我言政教乃審厥象俾以形旁求於天下審所夢之人刻其形象以四方旁求之于民間説築傅巖之野惟肖傅氏之岩在虞虢之界通道所經有澗水壊道嘗使胥靡刑人築護此道説賢而隐代胥靡築之以供食肖似所夢之形爰立作相王置諸其左右于是禮命以為相使在左右命之曰朝夕納誨以輔台徳言當納諫誨直辭以輔我徳若金用汝作礪鐵須礪以成利噐若濟巨川用汝作舟楫渡大水待舟楫若嵗大旱用汝作霖雨霖三日雨霖以救旱啓乃心沃朕心若藥弗暝眩厥疾弗瘳開汝心以沃我心如服藥必瞑眩極其病乃除欲其出切言以自警若跣弗視地厥足用傷跣必視地足乃無傷言欲使為已視耳惟暨乃僚罔不同心以匡乃辟與汝並官皆當倡率無不同心以匡正汝君俾率先王廸我髙后以康兆民言匡正汝君使修先王之道蹈成湯之蹤以安天下嗚呼欽予時命其惟有終敬我是命修其職使有終説復于王曰惟木從繩則正后從諫則聖言木以繩直君以諫明后克聖臣不命其承君能受諫則臣不待命其承意而諫之疇敢不祇若王之休命史記曰武丁夜夢得聖人名曰説以所見視羣臣百吏皆非也于是乃使百工營求之野得于傅險中是時説為胥靡築于傅險見于武丁武丁曰是也得而與之語果聖人舉以為相殷國大治故遂以傅險姓之號曰傅説應邵註漢書云胥相也靡随也言相随坐刑也周武王即位太公望為師周公旦為輔召公畢公之徒左右王師修文王之緒業康王為太子成王懼太子之不任乃命召公畢公率諸侯以相太子而立之穆王命君牙為大司徒穆王康王孫昭王子作君牙君牙臣名王若曰嗚呼君牙順其事而嘆稱其名而命之惟乃祖乃父世篤忠貞服勞王家厥有成績紀於太常言汝父祖世厚忠貞服事勤勞王家其有成功見記録書于王之太常以表顯之王之旌旗畫日月曰大常惟子小子嗣守文武成康遺緒亦惟先王之臣克左右亂四方惟我小子繼守先王遺業亦惟父祖之臣能佐助我治四方言已無所能心之憂危若蹈虎尾渉于春冰言祖業之大已才之弱故心懐危懼虎尾畏噬春冰畏陥危懼之甚今命爾予翼作股肱心膂今命汝為我輔翼股肱心膂之臣言委任纘乃舊服無忝祖考𢎞敷五典式和民則繼汝先祖故所服忠勤無辱累祖考之道大布五常之教田和民令有法則爾身克正罔敢弗正民心罔中惟爾之中若汝身能正則下無敢不正民心無中從汝取中必當正身示民以中正夏暑雨小民惟曰怨咨冬祁寒小民亦惟曰怨咨夏暑冬寒亦天之常道民猶怨嗟厥惟艱哉思其艱以圖其易民乃寜天不可怨民猶嗟怨治民其惟難哉當思慮其難以謀其易民乃寜嗚呼丕顯哉文王謨歎文王所謀大顯明丕承哉武王烈言武王業羙大可承奉佑啓我後人咸以正罔缺文武之謀業大明可承奉開助我後嗣皆以正道無邪缺爾惟敬眀乃訓用奉若于先王汝惟當敬明汝五教用奉順于先王之道對揚文武之光命追配於前人言當答揚文武光明之命君臣各追配于前令名之人王若曰君牙乃惟由先正舊典時式民之治亂在兹汝惟當奉用先正之臣所行故事舊典文籍是法民之治亂在此而已用之則民治廢之則民亂率乃祖考之攸行昭乃辟之有乂言當循汝父祖之所行明汝君之有治功漢髙祖初為漢王以沛相蕭何為丞相周勃為御史大夫守滎陽二年以大将軍韓信為左丞相與曹參灌嬰擊魏四年拜中尉周昌為御史大夫後昌為趙相既行乆之髙祖持御史大夫印弄之曰誰可以為御史大夫者孰視趙堯曰無以易堯易代也遂拜堯為御史大夫五年將軍盧綰為太尉九月為燕王十年髙祖自将討陳豨音許衣反于代舞陽侯樊噲以功遷左丞相十一年淮隂侯韓信謀反闗中吕后用丞相蕭何計誅信髙祖在邯鄲聞之使使拜丞相為相國絳侯周勃為太尉惠帝二年七月相國蕭何薨以齊相曹參為相國初何病帝親自臨視何病因問曰百嵗後誰可代君對曰知臣莫若主帝曰曹參何如須臾曰帝得之矣何死不恨矣及何薨參聞之告舍人趣治行舍人私屬官主家事者趣音浞速也治行謂修治行装也吾且入相居無何使者果召參六年十月以安國侯王陵為右丞相曲逆侯陳平為左丞相文帝元年以太尉勃為右丞相位第一左丞相平為丞相位第二秦漢以前尊右而卑左以丞相灌嬰為太尉初勃親以兵征吕氏功多平欲讓勃廼謝病帝怪問之平曰髙帝時勃功不如臣今誅諸吕臣功亦不如勃願以相讓勃帝從之勃自知其能弗如平廼謝免相而平顓為丞相顓與專同三年十月平薨帝復用勃為相三年十二月丞相勃就國以太尉潁隂侯灌嬰為丞相罷太尉官屬丞相四年十二月丞相嬰薨以御史大夫張蒼為相初蒼代平陽侯曹窟音竹律切為御史大夫窟代廣阿侯任敖敖代江邑侯趙堯任敖張蒼曹窟為御史大夫皆呂后稱制附于此篇七年以典客馮敬為御史大夫十六年以淮揚守申屠嘉為御史大夫後元二年八月丞相蒼免帝以皇后弟竇廣國有賢行欲相之曰恐天下以吾私廣國乆念不可而髙帝時大臣餘見無可者見謂見在之人乃以御史大夫申屠嘉為丞相因故邑封為故安侯是月以開封侯陶青為御史大夫景帝二年六月丞相嘉薨八月以御史大夫陶青為丞相左内史晁錯為御史大夫七年六月丞相青免太尉周亞夫為丞相太僕劉舍為御史大夫中元三年九月丞相亞夫免御史大夫劉舍為丞相太子太傅衛綰為御史大夫後元元年七月丞相舍免八月御史大夫衛綰為丞相衛尉直不疑為御史大夫三年死武帝建元元年六月丞相綰免魏其侯竇嬰為丞相齊相牛抵為御史大夫二年十月丞相嬰免三年太常許昌為丞相四年武強侯莊青翟為御史大夫三年免六年六月丞相昌免武安侯田蚡為丞相大農令韓安國為御史大夫四年病死元光元年三月丞相蚡薨五月平棘侯薛澤為丞相中尉張毆為御史大夫五年病死元朔三年左内史公孫𢎞為御史大夫五年十一月丞相澤免御史大夫公孫𢎞為丞相四月河東太守九江畨係為御史大夫元狩元年樂安侯李蔡為御史大夫三年二月丞相𢎞薨御史大夫李蔡為丞相廷尉張湯為御史大夫六年有罪自殺五年三月丞相蔡有罪自殺四月太子少傅莊青翟為丞相元鼎元年二月丞相青翟有罪自殺太子太傅趙周為丞相太子太傅石慶為御史大夫五年九月丞相周下獄死御史大夫石慶為丞相六年齊相卜式為御史大夫一年貶為太子太傅元封元年左内史倪寛為御史大夫八年卒太初二年正月丞相石慶薨閏月太僕公孫賀為丞相六年正月膠東太守延廣為御史大夫天漢元年濟南太守瑯琊王卿為御史大夫二年有罪自殺二年二月執金吾杜周為御史大夫四年卒征和二年四月丞相賀下獄死五月涿郡太守劉屈氂為左丞相九月大鴻臚商丘成為御史大夫四年坐祝詛自殺三年六月丞相屈氂下獄死四年六月大鴻臚田千秋為丞相後元元年二月捜粟都尉桑𢎞