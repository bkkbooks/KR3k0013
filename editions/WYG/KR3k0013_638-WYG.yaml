  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_638-1a}
body:
  text: 册府元龜卷六百三十八宋王欽若等撰銓選部不稱謬濫貪賄不稱天官之職銓管是司稽周禮理典之制舉魏氏官人之法必資公方之器藻鑒之能所以總百官而式九流也乃有性質凝滯才識駑下不能執守與時浮沉多所懐私狥於情託無裁斷之用失品藻之方以髙簡而自矜惟酣醉以為適繇是輪轅失序衡鑑不明興非據之譏負敗官之咎豈獨貽其身禍亦乃紊於國經布於簡書可以為耻魏時苗鉅鹿人為大官令領其郡中正定九品至於叙人才不能寛大然紀人之短雖在久逺蓄之不置晉王戎為吏部尚書以晉室方亂慕遽伯玉之為人與時舒卷無謇諤之節自經典選未嘗進寒素退虚名但與時浮沉而已畢卓為吏部郎常飲酒廢職梁王亮仕齊為吏部尚書建武末尚書右僕射江祐管朝政多所進㧞為士子肆亮自以身居選部每持異議始亮未為吏部郎時以祐齊明帝之内弟故深友祐祐為之延譽益為帝所器重至是與祐昵之如初及祐遇誅羣小放命凡所除拜悉繇内寵亮更弗能止外若詳審内無明鑒其所選用示資次而已當世不謂為能任昉為吏部郎中㕘掌大選居職不稱尋轉御史中丞蕭子顯為吏部尚書性凝簡負才氣見九流賓客不與交言但舉扇一揮而已衣冠竊恨之陳到字仲舉為左僕射叅掌選事仲舉既無學術朝章非所長選舉引用皆出自袁樞性疎簡不涉世務與朝市無所親狎但聚財酣飲而已後魏任城王澄為吏部尚書孝文曰王者不降佐於蒼昊皆㧞才而用之朕失於舉人任許一羣婦人革竒事當更銓簡耳任城在省為舉天下綱維為當署事而已澄曰臣實署事而已孝文曰如此便令史足矣何待任城李神雋為吏部尚書意尚風流情在推引人物而不能守正奉公無多聲譽有鉅鹿人李炎上書言神雋之失天柱將軍爾朱榮曾聞補人為曲陽縣令神雋以階懸不用榮聞大怒謂神雋自樹親黨排抑勲人神雋懼啓求解官宋弁為黄門郎司徒左長史時大選内外羣官并定四海士族弁專㕘銓量之任事多稱㫖然好言人之陰短髙門大族意所不便者弁因毁之至於舊族淪滯人非可忘者又申達之又為本州大中正姓族多所降抑頗為時人所非東魏襲常山王嶷孝靜時為尚書令攝選部嶷雖居重任隨時而已北齊赫連子悅為都官尚書以本官兼吏部子悅在官惟以清勤自守既無學術又闕風儀人倫清鑒去之彌逺一旦居銓衡之首大招物議繇是除太常卿卒袁韋脩為吏部尚書初馮子琮以僕射攝選婚嫁相尋韋脩常非笑之語人云馮公營婚日不暇給及自居選曹亦不免時論盖地勢使然冦猛為武衞將軍自以上谷冦氏得補燕州大中正而不能甄别士庻也隋盧愷為禮部尚書權吏部尚書時預選者甚多愷即授官皆作色而遣之唐溫彦博太宗時為吏部郎中知選事意在沙汰多所擯抑而退者不伏囂訟盈庭彦博惟騁辭辯與之相詰終日喧擾為識者所􅅓戴胄為民部尚書兼檢校吏部尚書及在銓衡抑文雅而奬法吏不適輪轅之用楊纂為吏部侍郎抑文雅進黠吏觀時任數為時論所譏唐皎為吏部侍郎當引人銓問何方便穏或云其家在蜀乃注與吳復有云親老先任江南即唱之隴右論者莫能測其意楊師道為吏部尚書師道貴公之子四海人物未能委練所署用多非其才而深抑勢貴及其親黨將以避嫌然亦無藻鑑之譽從征髙麗及師還人有言其非典選之才乃轉工部尚書師道乞為太常卿從之楊思𤣥髙宗時為司列少常伯恃外戚貴待選流多不以禮而排斥之為選者夏侯彪所訟而御史中丞郎餘慶彈奏免官魏克己為吏部侍郎銓路喧譁大為冬集人援引指擿貶為太子中允鄧𤣥挺為吏部侍郎既不稱職甚為時談所鄙又時患消渴病選人因目為鄧渴作鄧渴詩牓衢路自有唐已來掌選之失未有如𤣥挺者坐此左遷澧州刺史遷晉州刺史召拜麟臺少監重為天官侍郎其失有甚於前韋待賈為吏部尚書素無才術志識凡下出自武官而驟居選部凡所銓綜多為朝野所嗤鄙許子儒為吏部侍郎性無藻鑑所視銓綜皆委令史緱直謂曰汝平配也後唐崔貽孫為吏部侍郎性好干人喜得小惠天官任重昏耄罔知瞀目將瞑猶以所欲託於選人銓管難虚遂除禮部尚書致仕謬濫論材定官存於周制興廉舉孝著於漢典得人有進律之褒濫進有絀爵之罰故天下愼法莫敢謬舉魏晉以降其道駁䘮條教所頒既殊於古銓選所屬復罕其人靡能平心守正量才揆職繇是用捨狥意詞辯飾非或觀時而任數或為朋而受賕俾夫補授失次資格差謬多所抑損或成紛訴至有附會權勢親狎姦民上不能資朝廷之聰明下則積山林之怨憤是使古道不復來者喟然漢王勲成帝時襲封卬城侯坐選舉不以實免魏何晏為尚書主選舉其宿與之有舊者多被㧞擢梁王亮為吏部尚書拘資次而已當代謂為不能後魏李韶為吏部尚書在選曹不能平心守正通容而已議者貶之崔亮為吏部尚書時羽林軍新害張彛之後靈太后令武官得依資入選官員既少應選者多前尚書李韶循常擢人百姓大為嗟怨亮乃奏為格制不問士之賢愚專以停解日月為斷雖復官須此人停日後者終於不得庸才下品年月久者灼然先用沉滯者皆稱其能亮外甥司空諮議劉景安書規亮曰殷周以鄉塾貢士兩漢繇州郡薦才魏晉因循又置中正諦觀在昔莫不審舉雖未盡美足應十收六七而朝廷貢秀才止求其文不取其理察孝廉惟論章句不及治道立中正不考人才行業空辨氏姓髙下至於取士之途不溥沙汰之理未精而舅屬當銓衡宜須改張易調如之何反為停年格以限之天下士子誰復修厲名行哉亮答書曰汝所言乃有深致吾乗時僥倖得為吏部尚書當其壯也尚不如人况今朽老而居帝難之任常思用賢舉直以報明主之恩盡忠竭力不為貽後之累昨為此格有繇而然今已為汝所恠千載之後誰知我哉可靜念吾言當為汝論之吾兼正六為吏部郎三為尚書銓衡所宜頗知之矣但古今不同時宜須異何者昔有中正品其才第上之尚書尚書據狀量人授職此乃與天下羣賢共爵人也吾謂當爾之時無遺才無濫舉矣而汝猶云十收六七况今日之選專歸尚書以一人之鑒照察天下劉毅所云一吏部兩郎中而欲究竟人物何異以管闚天而求其博哉今勲人甚多又羽林入選武夫崛起不解書詩唯可彍弩前驅指蹤捕噬而已忽令垂組乘軒求其烹鮮之効未曾操刀而使專割又武人至多官員至少不可周溥設令十人共一官猶無官可授况一人望一官何繇可不怨哉吾近面執不宜使武人入選請賜其爵厚其禄既不見從是以權立此格限以停年耳昔子産鑄刑書以救弊叔向譏之以正法何異汝以古禮難權宜哉仲尼云徳我者春秋罪我者亦春秋吾之此指其繇是也但令當來君子知吾意焉後甄琛元脩義城陽王徽相繼為吏部尚書利其便已踵而行之自是賢愚同貫涇渭無别魏之失人從亮始也楊愔超拜吏部尚書典選二十餘年奬擢人倫以為已任然取士多以言貌時致謗言以為愔之用人似貧士市𤓰取其大者愔聞不以屑意馮子琮為右僕射仍攝選子琮微有識鑒及位望轉隆宿心頓改擢引非類以為深交縱其子弟官位不依倫次又專營婚媾歴選上門例以官爵許之旬日便驗許子儒則天時為天官侍郎不以藻鏡為意有令史句直是其腹心每注官多委令下筆子儒但髙枕而臥語句直云平配繇是補授失次無復綱紀道路喧然以為口實是時則天臨朝引見風俗使舉人無賢愚咸加擢用髙者試鳯閣舍人給事中次或試員外郎侍御史補闕拾遺校書郎故時人為之諺曰補闕連車載拾遺平斗量杷椎侍御史腕脫校書郎試官之起自兹始宋遥𤣥宗時與苗晉卿俱為吏部侍郎天寶二年貶遥為武當郡太守晉卿為安康郡太守是時海内晏平選人萬計委有司考覈書判詔重其事兼命他司考之務求其實遥與晉卿茍媚朝廷又無廉潔之操取舍渝濫甚為當時所醜有張奭者御史中丞倚之子不辯菽麥假手為判時升甲科會下第者常為薊令以其事白于范陽節度使安禄山禄山恩寵崇盛謁請無時因具奏之帝乃大集登科人御花蕚樓親試升第者十無一二焉奭手持試紙竟日不下一字時謂之曳白帝大怒遥晉卿既受責乃貶倚為淮陽郡太守制曰庭闈之間不能訓子選調之際乃以託人時士子皆以為戲笑或託於詩賦諷刺考判官禮部郎中裴朏起居舍人張烜監察御史宋昱左拾遺孟朝皆貶官嶺外韋陟天寶中為吏部侍郎陟風神髙逺以門地自負時以選賢㧞能為己任博采浮薄不狥於行屢以此失人出為襄陽太守楊國忠天寶中以便僻取宰相欲其能事皆出於己猶兼吏部尚書故事吏部置三銓尚書侍郎分掌選事三注三唱自春及夏纔終其事國忠使猾吏於私第暗定官員集百僚於尚書省對注唱一日令畢以誇神速資格差謬無復倫序乃令其所昵京兆尹鮮于仲通中書舍人竇華侍御史鄭昻之徴賂於選人於尚書省門立碑以頌己之徳崔渙肅宗至徳初為黄門侍郎平章事時未復京師舉選路絶詔渙充江淮選補使以收遺逸渙選士惑於聽受又為下吏所鬻濫進者非一以不稱職聞乃罷知政事為王傅徐浩代宗朝為吏部侍郎坐以妄第冐選俾侍郎薛邕注授京尉為御史大夫李栖筠所彈奏坐貶潮州别駕令狐峘大歴中為刑部員外判吏部南曹時劉晏為尚書楊炎為侍郎峘以晏舉分闕必擇其善者與晏而以惡者與炎劉滋為刑部尚書徳宗貞元九年御史中丞韋貞伯劾奏吏部貞元七年冬以京兆府踰濫解選已授官摠六十六人或有不到京銓試懸受官告又按選格銓狀選人自書試日書跡不同即駁放殿選違格文者不復驗及降資不盡或與注官伏以承前選曹乖謬未有如此遂使衣冠以貧乏待闕奸濫以賄賂成名非陛下求才審官之意繇是滋以前任吏部尚書及吏部侍郎杜黄裳皆削一階陳歸貞元中為考功員外郎充嶺南選補使選人流放注官美惡違背令文唯意出入復供求無厭郵傳患之監察御史韓泰奏劾其罪配流恩州權徳輿貞元中為吏部侍郎吏誤用官闕改守太子賓客鄭絪文宗時為吏部尚書丁公著為工部侍郎知選事太和二年閏三月己亥都省奏落下吏部三銓甲内今春注超資官凡六十七人勑都省所執是格銓司所引是例互相陳列頗以紛紜所貴清而能通亦猶議事以制今選期已過方此争論選人可哀難更停滯其三銓已授官都省落下竝依舊注與重團奏仍限五日内畢其中如官超一資半資比格令已令據稍優者至後選日量事降折尚書侍郎注擬不一致令都省以此興詞鄭絪丁公著各罰一季俸東銓所落人數較少楊嗣復罰兩月俸其今年選格仍分明標出近例有可行者收入格不可者於格内書破則所司有文可守選人無路僥求時尚書左丞韋𢎞景以吏部注擬不公選多超資授官糺按其事落下勑申吏部引例以為據選人軰又惜官已成道路沸騰日接宰相喧訴遂降此勑楊虞卿為吏部員外郎太和二年十二月御史臺奏准勑推勘踰濫官都六十五人應取受錢物偽出告身籖符賣鑿空偽官令赴任南曹令史李賨等六人及賣鑿空偽官人許稜等共取受錢都一萬六千七百四十貫文又據李賨等欵稱去年三月已後商量斂錢三千貫文與吏部員外郎楊虞卿㕔典溫亮囑求楊虞卿不舉勘濫官事得楊虞卿狀虞卿跡忝郎署為明天子舉偽捕奸幸無差謬今李賨之軰結黨搆虚而云商量斂率甚明用此致尤誰則無罪據李賨欵本與溫亮錢物囑求虞卿不舉踰濫官者若虞卿遂不舉勘則小吏卜射計行今虞卿簡舉偽官牒臺推勘於公事足以自明縁溫亮在宅外居住於李賨處取受虞卿無繇得知簡下不明伏候嚴責勑李賨等八人竝偽造印符搆賣巨蠧推窮盡法伏斷死刑宜付京兆府各決痛杖一頓處死馬羽卿等一十二人引致梯媒合成奸計各決六十配流嶺外楊虞卿勾舉雖則盡心簡下終是無術親吏逃逸贓狀未明量罰兩月俸料踰濫官六十五人内已付所司者速令詳斷見勘具申奏其贓及偽印等竝付所司准法處分後唐明宗長興元年七月吏部南曹奏磨勘南郊行事官前守濮州范縣主簿李範是同光元年不納告身人數准勑終身不齒今又冐名於四方舘行事前河南府長水縣主簿趙知逺使兄為父蔭行事者勑㫖李範巳該恩赦特放罪收納文書趙知逺以兄為父未之前聞既遇郊禋特從恩宥出身歴任文書付所司焚毁放罪勒歸鄉貫本道長吏與改昭穆奏聞貪賄彌綸治典銓綜多士周官冡宰之職也若乃端己以居位潔身以率下旌别淑慝澄汰流品使朝有多士國無倖人斯可謂官修其方矣若乃名浮於實言不顧行黷貨以自穢瘝官而靡懼冐黜幽之典貽敗類之咎歴代而下實繁有徒論而次之用戒於後宋庾炳之字仲文為吏部尚書領選既不緝衆論又頗通貨賄用少府卿劉道錫為廣州刺史道錫至鎭餉白檀牽車炳之性好潔常自乗焉或以白文帝帝見問曰道錫餉卿小車裝飾甚麗有之乎炳之懼起謝梁劉孝綽為吏部郎在職頗通贓貨為從弟尚書左丞覽所劾奏免官何敬容為左僕射叅掌大選通苞苴餉餽無賄則畧不交語後魏李宣茂孝文時為司空府司馬兼定州大中正坐受郡中鄉人財貨為御史所劾除名為民楊尼為國子祭酒兼幽州中正後除平北府長史帶漁陽太守未拜坐為中正時受鄉人貨免官元暉常山王遵之孫宣武時為吏部尚書納貨用官皆有定價大郡二千疋次郡一千疋下郡五百疋其餘授職各有差天下號曰市曹皇甫瑒孝明時為吏部郎性貪婪多所受納鬻賣官吏皆有定價元修義汝陰王天錫之子為吏部尚書在銓衡唯事貨賄授官大小皆有定價時中散大夫髙居者有㫖先叙上黨郡缺居遂求之修義私已許人抑居不與居大言不遜修義命左右牽曳之居對大衆呼天唱賊人問居曰白日公庭安得有賊居指修義曰此座上者違天子明詔物多者得官京師白刼此非大賊乎修義失色居行罵而出後欲邀車駕論修義罪狀左僕射蕭寶寅諭之乃止元世雋任城王澄之孫出帝時為吏部尚書居選曹不能厲心多所受納為中尉所彈坐免官北齊叚孝言為吏部尚書既無深鑒又待物不平抽擢之徒非賄則舊馮子琮後主時為吏部尚書其妻胡太后妹也恃親放縱請謁公行賄貨填積守宰除授先定錢帛多少然後奏聞其所通致事無不允子琮亦不禁制唐鄭元毓髙祖時為選部郎中以􅂍犯處極刑李義府髙宗時為司列太常伯本無藻鏡才怙武后之勢專以賣官為事補授失次人多怨言李元㳟中宗時以大理少卿為長寧安樂二公主所引用令知吏部侍郎分往東都掌選事亦以贓汙聞於天下故時人為之語曰長寧安樂竝狂顚既敎翻地亦翻天賣弄大家猶未足便使元恭來取錢鄭愔謟事武三思及韋氏悖逆庶人歴選吏部侍郎愔掌選專以賣官為務人多怨讟時京師大旱為之語曰殺鄭愔天必陰其為人所惡如此崔湜為中書舍人與鄭愔同掌選賣官鬻獄一時巨蠧並為御史所彈中宗勑所司以理勘問勿加窮迫繇是希㫖無所發明然猶斷愔配流嶺南湜貶江州司馬而更授湜襄州刺史愔江州司馬李彭年𤣥宗時為吏部侍郎坐贓伏罪制曰彭年幸以資序累登清貴委之銓綜任以權衡不能狥公滅私持平守直而乃貪財敗類黷貨無厭既玷清朝有冐法度頃令推鞫皆自欵承據其罪名合當誅死但以陽和布令善貸好生特舍嚴刑俾從流竄宜除名長流嶺南臨賀郡仍即差綱馳驛領送朕以為制理之本期返淳風庶叶至公期於不犯永言議罪良用憮然且陳力就列本於正己從事劾官義存守法為惡者與衆共棄務善者以才必升凡百庶僚深宜自勉立身之道可不愼歟彭年先朝宰臣愼遠之孫也以吏才知名掌選七年好聚財無廉潔之操而善接待選人惟黷貨無厭人多怨之至是睢陽太守路齊暉之子曰畿納絹千疋求官為選人所發制下有司訐鞫彭年引紙稱伏贓狀狼籍遠近恥之咸以為戒陳歸徳宗時為考功員外郎充嶺南選補使選人流放注官美惡違背令文以意出入復供求無厭郵傳患之監察御史韓㤗奏劾得罪配流恩州册府元龜卷六百三十八
