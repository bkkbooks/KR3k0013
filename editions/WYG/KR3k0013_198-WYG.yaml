body:
  text: 册府元龜卷一百九十八宋王欽若等撰閠位部耕籍務農節儉耕籍周禮有王籍之制以時入之上以供粢盛下以致蕃殖祈農務穡於是乎在而嬴氏并吞收大半之賦孫劉鼎峙定三分之業甸師所掌史䇿無聞故不可得而論也若乃繇宋泊陳迭王江左北齊髙氏建都鄴下皆親御耒耜率勸農功所謂國之大典民之大事于斯而已矣其或致誠齋祭草具禮儀除壇於國之震離卜月於春之孟仲隨時㳂革亦載于篇宋文帝元嘉二十年十二月詔曰古者從時胙土以訓農功躬耕帝籍敬供粢盛仰瞻前王思遵令典便可量處千畝考卜元辰朕當親率百辟致禮郊甸庶幾誠素將被斯民初帝將親耕而其儀乆廢使何承天撰定儀注時史學生山謙之已私鳩集因以奏聞於時斟酌衆條造定圖注先立春九日尚書宣攝内外各使隨局從事司空大農京尹令尉度宫之辰地八里之外整制千畝開阡陌立先農壇於中阡西陌南御耕種壇於中阡東陌北將耕宿設青幕於耕壇之上皇后帥六宫之人出穜稑之種付籍田令耕日太祝以一大牢告祠先農悉如祠帝社之儀孟春之月擇上辛後吉亥日御乘耕根三盖車駕蒼駟青旂著通天冠青幘朝服青衮帶佩蒼玉藩王已下至六百石皆衣青唯三䑓武衛不耕不改服章車駕出衆事如郊廟之儀車駕至籍田侍中跪奏帝降車臨壇大司農跪奏先農已享請皇帝親耕大史令讃曰皇帝親耕三推三反於是羣臣以次耕王公五等開國諸侯五推五反孤卿大夫七推七反士九推九反籍田令率其属耕竟畝灑種即耰禮畢孝武帝大明四年正月乙亥躬耕籍田明帝大始五年正月癸亥躬耕籍田後廢帝元徽四年正月己亥躬耕籍田南齊武帝永明三年十二月詔曰九榖至重八財為末是故潔粢豊盛祝史無愧於辭不籍千畝周宣所以貽諌昔期運初啟庶政草昧三推之典我則未暇朕嗣奉鴻基思隆先軌載耒躬親率繇舊式可以開春發歲敬簡元辰鳴青鸞於東郊冕朱紘而莅事仰薦宗禋俯朂黔黎將使囷庾内充遺秉外牣既富而教兹焉攸在四年閏正月辛亥親耕籍田梁髙祖天監十三年二月丁亥親耕籍田先是籍田依宋齊以正月用事不齋不祭帝以為啟蟄而耕則在二月節内書云以殷仲春理在建卯於是改用二月十六年二月辛亥親耕籍田普通二年四月丙辰詔曰夫欽若昊天厯象無違躬執耒耜盡力致敬上恊星鳥俯訓民時平秩東作義不在南前代因襲有乖禮制可以震方檢求沃野具兹千畝庶允舊章於是徙籍田於建康北岸築兆域大小列種梨柏便殿及齋宫省如南北郊别有望耕臺在壇東帝親耕畢登此臺以觀公卿之推反又有祈年殿云四年二月乙亥躬耕籍田詔曰夫耕籍之義大矣哉粢盛繇之而興禮節因之以著古者哲王咸用此作眷言八政致兹千畝公卿百辟恪恭其儀九推禮畢馨香靡替兼以風雲叶律氣象光華屬覧休辰思加奬勸可班下逺近廣闢良疇公私􅅵畝務盡地利若欲附農而糧種有乏亦並加貸給每使優徧孝弟力田賜爵一級預耕之司尅日勞酒中大通六年二月癸亥親耕籍田大同元年二月丁亥躬耕籍田二年二月乙亥躬耕籍田三年二月丁亥親耕籍田四年二月己亥親耕籍田六年二月己亥親耕籍田七年二月辛亥親耕籍田太清元年二月丁亥躬耕籍田陳宣帝大建元年二月乙亥親耕籍田三年二月丁酉親耕籍田六年二月辛亥親耕籍田九年二月壬午親耕籍田十一年二月癸亥親耕籍田十三年二月乙亥親耕籍田北齊文宣帝天保二年正月辛亥親耕籍田于東南其制千畝内種赤梁白糓大豆赤黍小豆黒穄麻子小麥色别一頃自餘一頃地中通阡陌作祠壇於陌南阡西廣輪三十六尺髙九尺四陛三壇四門又為大營於外設御耕壇於阡東陌北每歲正月上辛後吉亥使公卿以大牢祠先農神農氏於壇上無配饗祭訖親耕先祠司農進穜稑之種六宫主之行事之官並齋設齋省於壇所列宫懸又置先農坐於壇上衆官朝服司空一獻不燎祠訖帝乃服通天冠青紗袍黒介幘佩蒼玉黄綬青帶林舄備法駕乘木輅耕官青朝服從殿中監進御耒於壇南百官定列帝出便殿升耕壇南陛即御坐應耕者各進於列帝降自南陛至耕位釋劔執耒三推三反升壇即坐耕官一品五推五反二品七推七反三品九推九反籍田令帥其屬以牛耕終千畝以青箱奉穜稑跪呈司農詣耕所灑之種訖司農省功奏事畢帝降之便殿更衣饗宴禮畢班賚而還務農夫四人之業農居其一焉盖務穡播糓所以厚下而豐財授時勉人所以敦本而成務致國於富彊躋俗於仁夀未始不由兹道也嬴秦肆暴靡修稼政孫劉裂壤南北更政以迄于朱梁或勸課纎悉形於詔令或優恤深篤著於條禁以至蠶月云及申其帛襄之刑耕事方急緩其觳觫之戮親臨畎畝形於奬誨然後餘糧委於甫田游手縁於東作既富而教可以君國而永命也蜀後主建興三年春詔務農植糓閉闗息民吴大帝黄武五年陸遜以所在少糓表令諸將増廣農畝報曰甚善今孤父子親自受田車用八牛以為四耦雖未及古人亦欲與衆均等其勞也赤烏三年正月詔曰盖君非民不立民非糓不生頃者以來民多征役歲又水旱年糓有損而吏民不良侵奪民時以致饑困自今以來督軍郡守其警察非法當農桑時以役事擾民者舉正以聞景帝永安二年三月詔曰朕以不徳託于王公之上夙夜戰兢㤀寢與食今欲偃武修文以崇大化推此之道當繇士民士民之贍必湏農桑管子有言倉廩實知禮節衣食足知榮辱夫一夫不耕有受其飢一婦不織有受其寒飢寒並至而民不為非者未之有也自頃年以來州郡民吏及諸營兵多違此業皆浮長江賈作上下良田漸廢見糓日少欲求大定豈可得哉亦繇租入過重農人利薄使之然乎今欲廣開田業輕其賦税差科彊羸課其田畝務令優均官私得所使家給戸贍足相供飬則愛身重命不犯刑法然後刑罰不用風俗可整以羣僚之忠賢若盡心於時雖太古盛化未可卒致漢文升平庶幾可及及之則臣主俱榮不及之則損削侵辱何可從容俯仰而諸卿尚書可共咨度務取便佳田桑已至不可後時事定施行稱朕意焉宋文帝元嘉八年閏六月詔曰自頃農桑惰業逰食者衆荒萊不闢督課無聞一時水旱便有罄匱茍不深存務本豐給靡因郡守賦政方畿縣宰親民之主宜思奬訓導以良規咸使肆力地無遺利耕蠶樹藝各盡其力若有力田殊衆歲竟條名列上二十年十二月詔曰國以民為本民以食為天故一夫輟稼飢者必及倉廩既實禮節以興自頃所在貧罄家無宿積賦之暫偏則人懐愁墊歲或不稔而病至比室誠繇政徳弗孚以臻斯弊抑亦耕桑未廣地利多遺宰守㣲化導之方氓庶㤀勸分之義永言𢎞濟明發載懐雖制令亟下終莫懲勸而坐望滋殖庸可致乎有司其班宣舊條務盡敦課逰食之徒咸令附業考覈勤惰行其誅賞觀察最殿嚴加黜陟二十一年七月詔曰比年糓稼傷損滛亢成災亦由播殖之宜尚有未盡南徐兖豫及揚州浙江江西屬郡自今悉督種麥以助闕乏速運彭城下邳郡見種委刺史貸給徐豫土多稲田而民間專務陸作可符二鎮履行舊陂相率修立并墾闢使及來年凡諸州郡皆令盡勤地利勸導播殖蠶桑麻紵各盡其方不得奉行公文而已孝武帝大明二年三月以田農要月大官停殺牛明帝泰始三年正月以農役將興大官停宰牛南齊武帝永明三年正月詔曰守宰親民之要刺史案部所先宜嚴課農桑相土揆時必窮地利若耕蠶殊衆足厲浮惰者所在即便列奏其違方驕矜佚事妨農亦以名聞將明賞罰以勸勤怠較覈殿最以申黜陟鬱林王隆昌元年正月詔曰執耜蹔虧懸罄比室秉機或惰無褐終年非怠非荒雖繇王道不稂不莠實頼民和頃歲多稼無爽遺秉如積而三登之美未臻萬斯之基尚逺且風土異宜百姓殊務刑章治緒未必同源妨本害政事非一揆冕旒屬念無㤀夙興可嚴下州郡務滋耕殖履畝闢疇廣開地利深樹國本克阜民天明帝建武二年正月詔曰食惟民天義髙姬載蠶實生本教重軒經前哲盛範後王茂則布令審端咸必繇之朕肅扆巖廊思𢎞風訓深務八政永鍳在勤静言日昃無㤀寢興守宰親民之主牧伯調俗之司宜嚴課農桑罔或懈惰揆景肆力必窮地利修固堤防考校殿最若耕蠶殊衆具以名聞㳺怠害業即便列奏主者詳為條格梁簡文大寳二年正月甲戌下令曰軍國多虞戎旃未静青領雖熾黔首宜安時唯星鳥表年祥於東秩春紀宿龍歌歲取於南畯况三農務業尚看夭桃敷水四民有令猶及落杏飛花化俗移風常在所急勸耕且戰彌湏自許豈直燕垂寒谷積黍自温寧可墯此𤣥苖坐飡紅粒不植䴏鴒空候蟬鳴可悉深耕概種安堵復業無棄民力並分地利班勒州郡咸使遵承陳文帝天嘉元年三月詔守宰明加勸課務急農桑庶鼓腹含哺復在兹日八月詔曰菽粟之貴重於珠玉自頃冦戎㳺手者衆民失分地之業士有佩犢之譏朕哀矜黔庶念康弊俗思俾阻饑方存富教麥之為用要切斯甚今九秋在即萬寳可收其班宣逺近並令播種守宰親臨勸課務在及時其有尤貧量給種子後主大建十四年正月即位二月詔曰躬耕為勸義顯前經力農見賞事昭徃誥斯乃國儲是資民命攸屬豐儉隆替靡不繇之夫入賦自古輸藁惟舊沃饒貴于十金磽确至於三易腴塉既異盈縮不同詐偽日興薄書歲改稻田使者著自西京不實峻刑聞諸東漢老農懼於祗應俗吏因以侮文輟耒成羣㳺手為伴永言妨蠧良可太息今陽和在節膏澤潤下宜展春耨以望秋坻其有新闢塍􅅵進墾蒿萊廣袤勿得度量征租悉皆停免私業久廢咸許占作公田荒縱亦隨肆勤儻良守教耕淳民載酒有兹督課議以賞擢外可為格班下稱朕意焉北齊文宣帝天保元年八月詔諸牧民之官仰專意農桑勤心勸課廣收天地之利以備水旱之災武成帝河清三年定令每歲春月各依鄉土早晩課人農桑自春及秋男子十五已上皆就田畝桑蠶之月婦女十五已上皆營蠶桑孟冬刺史聴審邦教之優劣定殿最之科品有人力無牛無人力有牛者湏令相便皆得佃種使地無遺利人無㳺手焉梁大祖開平三年八月己卯幸西苑觀稼四年二月己丑出光政門至谷水觀麥五年二月甲子幸曜村民舎閲農事乾化元年五月癸巳觀稼于伊水八月戊辰幸故上陽宫至榆林觀稼節儉夫節用愛人宣尼之教也去奢去泰𤣥元之㫖也葢有國有家者曷嘗不遵卑菲之訓申竒巧之禁厚生而務本克巳以率下然後致民於富庶饗祚於悠久者也自江吴傳國逮於北齊朱梁亦嘗斥棄珍玩禁止貢獻裁減玉食之制削去輿服之餙戒風俗之踰侈化民徳以歸厚或形於詔誥或著之行事亦有始初清明憲章稽古中道而廢不終令聞傳所謂非知之艱行之惟艱又曰其身不正雖令不從雖復條教周悉亦何益於治乎吴大帝赤烏五年四月禁進獻御減大官膳十年三月改作太初宫諸將及州郡皆義作帝詔曰建業宫乃朕從京來所作將軍府寺耳材柱率細皆以腐朽常恐損壊今未復西可徙武昌宫材瓦更繕治之有司奏言曰武昌宫已二十八年恐不堪用宜下所在通更伐致帝曰大禹以卑宫為美今軍事未巳所在多賦若更通伐妨損農桑徙武昌材瓦自可用也宋髙祖清簡寡欲嚴整有法度未嘗視珠玉輿馬之御後庭無紈綺絲竹之音寧州嘗獻琥珀枕光色甚䴡價盈百金時將北征以琥珀治金創帝大悅命𢷬碎分付諸軍平闗中得姚興財帛皆在外府内無私藏宋䑓既建有司奏東西堂施局脚牀銀塗釘帝不許使用直脚牀釘用鐵廣州嘗獻入筒細布一端百尺帝惡其精麗勞人即付有司彈太守以布還之并制嶺南禁作此布帝素有熱病并患金創末年猶劇坐卧常湏冷物後有獻大石牀寢之極以為佳乃歎曰木牀且費而况石耶即令毁之制諸主出適遣送不過二十萬無錦綉金玉内外奉禁莫不節儉性尤簡易常著連齒木屐好出神虎門逍遥左右從者不過十餘人諸子旦問起居入閣脱公服止著裙如家人之禮孝武大明中壊帝所居隂室於其處起玉燭殿與羣臣觀之牀頭有土障壁上有葛燈籠麻䋲拂侍中袁顗盛稱帝儉素之徳孝武不答擉曰田舍翁得此已為過矣文帝元嘉八年三月詔曰頃軍役殷興國用増廣資儲不給百度尚繁宜存簡約以應事實内外可通共詳思務令節儉帝性存儉約不好奢侈車府令嘗以輦轝故請改易之又輦席舊以烏皮縁故欲代以紫皮帝以竹轝未至於壊紫色貴並不聽改其率素如此孝武帝元嘉三十年四月即位六月詔曰興王立訓務𢎞治節輔臣佐時勤獻政要仰惟聖䂓每存兹道猥以𦕈躬屬承景業闡揚遺澤無廢厥心夫量入為出邦有舊典而經紀之宜多違常度兵役糜耗府藏散減外内重供未加損約非所以聿遵先㫖敬奉遺命自今諸司薄已厚民去煩從簡悉宜施行以稱朕意七月辛酉詔崇儉約禁淫侈大明四年四月詔曰昔弋衣御宇貶甘示節土簋臨人飭儉昭度朕綈帛之念無㤀于懐雖深詔有司抑浮務實而歲用兼積年量虚廣豈以捐豐從損允稱約心四時供限可詳減大半庶裘絺順典有偃民華纂組傷功無競㕓市明帝泰始元年十二月詔曰皇室多故糜費滋廣且乆歲不登公私歉弊方刻意從儉𢎞濟時艱政道未孚慨愧兼積大官供膳可詳所减撤尚方御府雕文篆刻無益之物一皆蠲省務存簡約以稱朕心二年十一月詔曰治崇簡易化嫉繁侈逺闗隆替明著軌跡者也朕縁斯墜運屬此屯極仍之以彫耗因之以師旅而識昧前王務艱昔代舊賦既失為費彌廣鑒寐庶務每思𢎞革方欲緩繇優調愛民為先有司詳加寛惠更立科品其方物職貢各順土宜來獻納貢敬依時令凡諸蠧俗妨民之事趍末違本之業雕華靡麗竒器異技並嚴加裁斷務歸要實其尚方御府諸署供御制造咸存儉約庶淳風至教㣲遵太古阜財興讓少敦季俗後廢帝元徽二年五月詔曰頃國賦多愆公儲罕給近治戎雖淺而軍費已多廩藏虚罄難用馭逺宜矯革淫侈務在節儉供奉服御悉就減撤雕文靡麗廢而勿修凡㳺費一皆禁斷外可詳為科格三年閠三月詔曰頃民俗滋弊國度未殷歲時屢騫編户不給且邉隅尚警供費彌繁永言夕惕寢興増疚思𢎞豐耗之制以惇約素之風庶在拯民以康法道大官珍膳御府麗服諸所供擬一皆減撤可詳為其格務從簡𠂻順帝昇明元年七月詔曰露臺息構義光漢徳雉裘焚制事因晉道故以檢奢軌化敦儉馭俗頃甸服未静師旅連年委蓄屢空勞敝莫偃而丹雘之餙糜耗難訾寳賂之費徴賦靡計今車服儀制寔宜約損使徽章有序勿得侈溢可罷省御府二署凡工麗雕鐫傷風毁治一皆禁斷庶永昭憲則𢎞兹始政南齊太祖即位後身不御精細之物勑中書舎人桓景真曰主衣中似有玉介導此制始自大明末後泰始尤増其麗留此置主衣正是興長疾源可即時打碎凡復有異物皆宜随例毁棄後宫器物欄檻以銅為餙者皆改用鐵内殿施黄紗帳宫人著紫皮履華葢除金花𤓰用鐵廽釘每曰使我治天下十年當使黄金與土同價欲以身率天下移變風俗武帝為治緫大體以冨國為先頗不喜逰宴雕綺之事言常恨之未能頓遣又詔凡諸遊費宜從休息自今逺近薦獻務存節儉不得出界營求相髙奢麗金粟繒纊弊民已多珠玉玩好傷工尤重嚴加禁絶明帝初封西昌侯王子侯舊乘縓帷車帝獨乘下帷車儀從如素士建武元年十一月詔曰自今雕文篆刻歲時光新可悉停省藩牧守宰或有薦獻事非任上嚴加禁斷二年十月詔曰軌世去奢事殷哲后訓物以儉理鏡前王朕屬流弊之末襲澆浮之季雖恭已敷化刻意隆平而禮讓未興侈華猶競永鑒𤣥風競言集愧思所以還淳改俗反古移民可罷東田毁興光樓并詔水衡量省御乘三年三月詔車府乘輿有金銀餙較者皆剔除制御親幸臣下肅清驅使寒人不得用四幅繖大存儉約罷武帝所起新林苑以地還百姓廢文惠太子所起東田斥賣之永明中輿輦舟乘悉剔取金銀還主衣庫以牙角代之常用皂夾訖授餘濼與左右曰此猶堪明日用太官進御食有裹蒸帝曰我食此不盡可四片破之餘充晚食而武帝掖庭宫殿服御一無所改其儉約如此梁髙祖初仕齊録尚書事下令曰在上化下草偃風從世之澆淳常繇此作自永元失徳書契未紀窮㐫極悖焉可勝言既而璇室外搆傾宫内積竒伎異服殫所未見上慢下暴滛侈競馳國命朝權政移近習販官鬻爵賄貨公行並甲第康衢漸臺廣室長袖低昻等和戎之賜珍羞百品同伐氷之家愚民因之浸以成俗驕艶競爽夸麗相髙至乃市井之家貂狐在御工商之子緹繡是襲日入之次夜分未反昧爽之朝期之清旦聖明肇運厲精惟始雖曰纉戎殆同創革且滛費之後繼以興師巨橋鹿臺彫罄不一孤忝荷大寵務在澄清思所以仰述皇朝大帛之㫖俯厲微躬鹿裘之義觧而更張斵雕為樸自非可以奉粢盛修紱冕習禮樂之容繕甲兵之備此外衆費一皆禁絶御府中署量宜罷省掖廷備御妾之數大享絶鄭衛之音其中有可以率先卿士凖的氓庶菲食薄衣請自孤始加羣才並軌九官咸事若能人務退食競存約已移風易俗庶朞月有成昔毛玠在朝士大夫不敢靡衣渝食魏武嘆曰孤之法不如毛尚書孤雖徳謝徃賢任重先逹實望多士得其此心外可詳為條格及即位身服浣濯之衣御府無文餙宫掖不過綾綵無珠璣錦繡大官撤牢饌每日膳菜蔬按不過三醆以儉先海内身衣布衣木綿皂帳一冠三載一被二年常克儉於身凡皆此類五十外便斷房室後宫職司貴妃已下六宫禕䄖三翟之外皆衣不曳地傍無錦綺不飲酒不聴音聲非宗廟祭祀大㑹饗宴及諸法事未嘗作樂陳髙祖以儉素自率常膳不過數品私饗曲宴皆瓦器蚌盤殽核庶羞裁令充足而不為虛費初平侯景及立紹泰臣欽若等曰紹泰梁敬帝年號也子女玉帛皆班將士其充闈房者衣不重綵餙無金翠歌鐘女樂不列於前及乎踐阼彌厲恭儉故隆功茂徳光有天下焉文帝天嘉元年八月詔曰汙樽土皷誠則難追畫卵雕薪或可易革梁氏之末奢麗已甚芻豢壓於胥史歌鍾列於管庫土木被朱丹之采車馬餙金玉之珍逐欲澆流遷訛遂逺朕自諸生頗為内足而家敦退素室靡浮華觀覽時俗常所扼腕今妄假時乘臨馭區極屬當淪季思聞治道菲食卑宫自安儉陋俾兹薄俗獲反淳風徃者雕鏤滛飾非兵器及國容所湏金銀珠玉衣服雜玩悉皆禁斷帝起自艱難知百姓疾苦國家資用務從儉約常所調全事不獲已者必咨嗟改色若在諸身宣帝大建七年四月監豫州陳桃根上織成羅紋錦被裘各二詔於雲龍門外焚之十年四月詔曰惟堯葛衣鹿裘則天為大伯禹弊衣菲食夫子曰無間然故儉徳之恭約失者鮮朕君臨宇宙十變年籥旰日勿休乙夜㤀寢跂予思治若濟巨川念兹在兹懍同馭杇非貪四海之富非念黄屋之尊導仁夀以寘羣生寧勞役以奉諸已但承梁季亂離斯瘼宫室禾黍有名亡處雖輪奐未覩頗事經營去泰去甚猶為勞費加以戎車屢出千金日損府帑未充民疲征賦百姓不足君孰與足興言静念夕愓懐抱垂訓立法良所多慙斵雕為朴庶幾可慕雉頭之服既焚弋綈之衣方襲損撤之制前自朕躬草偃風行冀以變俗徃者御府堂署所營造禮樂儀服軍器之外其餘悉皆停息掖庭常供王侯妃主諸有俸䘏並各量減十三年十二月己巳詔非軍國所湏多所減損歸于儉約北齊神武帝雅尚儉素刀劔鞍勒無金玉之餙少能劇飲自當大任不過三爵文宣天保元年七月詔曰古人鹿皮為衣書囊成帳有懐盛徳風流可想其魏朝御府所有珍竒雜綵常所不給入者徒為人蓄積宜命悉出送納後園以供七日宴賜梁太祖開平二年六月詔曰敦尚儉素抑有前聞斥去浮華期臻至理如聞近日貢奉競務奢滛或竒巧蕩心或雕鎸溢目徒殫資用有費工庸此後應諸道進獻不得以金寳裝飾戈甲劔㦸至於鞍勒不用塗金及雕刻龍鳳如有此色所司不得引進册府元龜卷一百九十八
