body:
  text: 册府元龜卷五百五十一宋王欽若等撰詞臣部詞學才敏器識詞學自漢氏之後代言潤色之任歸於省闥非夫學窮物表識通治體藻翰英發可以丹青帝載文辭雅奥可以揚導天律亦何能憲章古昔發揮號令使温純郁穆有上世之風烈哉乃有練識舊典博通經術鋒氣宏拔章彩彬蔚典暢情理率循軌度祖述前訓綽有遺妍約束機務洞臻體要以至藹稱職之譽增時乂之美或屢蒙嘉奬或専以委任布於佳話良以韙歟魏劉放初為太祖記室文帝眀帝時為中書令善為書檄三祖詔命有所招諭多放所為吳胡綜為大帝書部與是儀徐詳俱典軍國宻事凡自文帝統事諸文誥策命鄰國書符畧皆綜之所造也晋孔演為中書侍郎于時中興肇建庶事草創演經學博通又練識舊典朝儀軌制多取正焉繇是元眀二帝並親愛之范寗為中書侍郎専掌西省康帝雅好文學而寗眀習五經甚見親愛朝廷疑議輙諮訪之南齊丘靈鞠宋末為正員外郎兼中書郎時方禪讓高帝使靈鞠叅掌詔策建元元年轉中書郎勑知東宫手筆靈鞠宋時文名甚盛王融為中書郎世祖永眀九年幸芳林園禊宴朝臣詔融為曲水詩序文藻富麗當世稱之梁任孝恭為中書通事舍人勑遣製建陵寺刹下銘又啟撰高祖集序文並富麗自是専公家筆翰朱异為尚書儀曹郎兼中書通事舍人自周捨卒後异代掌機謨方鎮改換朝儀國典詔誥勑書並兼掌之丘遲為中書郎待詔文徳殿武帝著連珠詔羣臣繼作者數十人遲文最美陳徐陵初仕梁為吏部郎掌詔誥有陳創業文檄軍書及禪授詔策皆陵所製而九錫尤美為一代文宗亦不以此矜物未嘗詆訶作者其於後進文徒接引無倦世祖高宗之世國家大手筆皆陵草之姚察為中書侍郎歴嘉徳宣眀二殿及東宫三學士每有制述多用新竒専志著書白首不倦徐陵名髙一代每見察述作尤所推重嘗謂子儉曰姚學士徳學無前汝可師之也後魏趙逸為中書侍郎太武神䴥三年三月上巳帝幸白虎殿命百僚賦詩逸製詩序時稱為善崔光本名孝伯歴中書侍郎給事黃門侍郎甚為孝文所知待嘗曰孝伯之才浩浩如黃河東注固今日之文宗也髙閭為中書侍郎軍國書檄詔令碑頌銘贊百有餘篇其文亦髙允之流世稱二髙北齊魏收初仕後魏為中書舍人與濟隂温子昇河間邢子才齊譽世號三才收後為散騎常侍兼中書侍郎神武入朝静帝授以相國固令收為啟啟成上王文襄時侍側神武指收曰此人當復為崔光又季秋大射普令賦詩收詩末云尺書徵建鄴折簡召長安文襄壯之顧諸人曰在朝今有魏收便是國之光彩雅俗文墨通達縦橫我亦使子才子昇時有所短至扵詞氣並不及之吾有志而不語語而不盡意有未及收呈草皆已周悉此亦難有又侯景既䧟梁土鄱陽王範時為合州刺史文襄勑收以書諭之範得書仍率部伍西上刺史崔聖念入據其城文襄謂收曰今定一州卿有其力猶恨尺書徵建鄴未效耳廢帝即位扵晋陽驛召收及中山太守楊休之叅政議吉凶之禮并掌詔誥文宣謚及廟號陵名皆收議也及孝昭居冢宰事命收禁中為諸詔文積日不出轉中書監邢劭字子才為中書侍郎所作詔文體容麗累遷中書監文宣幸晋陽路中頻有甘露之瑞朝臣皆作甘露頌尚書附令劭為之序崔陵為侍中歴覽羣書兼有詞藻自中興之後迄扵武帝詔誥表檄多陵所為荀士遜為中書舍人以文辭見重累遷中書侍郎號為稱職顔之推為中書舍人帝有取索嘗令中使傳㫖之推稟承宣誥館中皆受進止所進文章皆是其封署扵進賢門奏之待報方出兼善扵文字監校繕冩處事勤敏號為稱職後周劉祥字休徵為内史上士髙祖北征休徴陪侍帷幄平齊露布即休徴之文也隋薛道衡為内史侍郎上儀同三司久當樞要才名益顯太子諸王争相與交髙熲楊素雅相推重聲名籍甚無競一時牛𢎞為納言上士代専掌文翰甚有美稱唐徐齊聃髙宗時為西臺舍人齊聃善扵文詞甚為當時所稱髙宗愛其文令侍周王等屬文以職在樞極仍勑間日徃來郭正一為中書舍人後為中書侍郎在中書累年眀習舊事兼有詞學制勑多其手出當時號為稱職劉憲字𤣥度則天時為鳳閣舍人文詞為世所稱李嶠為鳳閣舍人則天深加禮待朝廷每有大文詞令嶠為之崔融為司理少卿知制誥時張易之兄弟頗招集文學之士融與納言李嶠鳳閣侍郎蘓味道麟臺少監王紹宗等俱以文才降節事之賈曽開元初為中書舍人與蘓晋同掌制誥皆以詞學見知時人稱為蘓賈許景先開元中為中書舍人與齊澣王丘韓休張九齡掌知制誥以文翰見稱中書令張說常稱曰許舍人之文雖無峻峯激流斬絶之勢然屬辭豐美得中和之氣亦一時之秀也席豫為中書舍人與韓休許景先徐安貞孫逖相次掌制誥皆有能名齊澣為中書舍人潤色王言皆以古義謨誥為凖的侍中宋璟中書侍郎蘓頲並重之孫逖為中書舍人逖掌誥八年制勑所出為時流歎服議者以為自開元以來蘓頲齊澣蘓晋賈曾韓休許景先及逖為王言之最逖尤苦思文理精練加之謙退不伐人多稱之韋陟為吏部郎中張九齡一代詞宗為中書令引陟為中書舍人與梁逖對掌綸誥時人以為美談常衮代宗永泰中為中書舍人衮文章俊拔當時推重與楊炎同掌制誥時稱為常楊崔元瀚徳宗時為禮部員外郎竇參為相舉知制誥詔令温雅合扵典訓令狐楚為職方員外知制誥善扵牋表制誥毎為一詞纔成衆立傳冩憲宗聞其名召見擢為翰林學士王仲舒元和中為職方郎中知制誥文思温雅制誥既出人皆傳冩元稹穆宗長慶初為禮部郎中知制誥詞誥所出夐然與古為侔遂盛傳扵代繇是極承恩顧稹嘗為長慶宫詞數十篇京師競相傳唱柳公權為翰林學士文宗嘗因夏日與學士聨句帝曰人皆苦炎熱我愛夏日長公權續曰薫風從南來殿閣生㣲凉時丁袁五學士皆屬繼臣欽若等曰時丁居晦袁郁並為學士帝獨諷公權兩句曰辭清不可多得乃令公權題扵殿壁梁杜曉開平初為中書舍人翰林學士居兩制之重祖述前載甚得王言之體後唐李琪初仕梁専掌文翰下必稱㫖寵遇踰倫是時琪之名播扵海内趙光逢為禮部郎中歴内外兩制俱有能名轉尚書左丞翰林承旨周申文炳太祖廣順初為中書舍人翰林學士為文典雅有訓誥之風才敏仲尼曰我好古敏以求之者也傳曰敏則有功又曰敏於事盖敏之時義逺矣哉若乃祇率官次躬膺眀詔國典有稽緩之禁公家有疊委之命至扵奉閒宴陪豫㳺授簡為文無容宿搆扵坐立奏煥然成章非英氣積中天機俊發又安能翰動若飛筆不停綴措辭令扵俄頃獻嘉頌扵行在夫如是則持橐簮筆端神束帶竝集龍鳳之署待詔承眀之廷斯謂無曠其職者也若乃不野不史有徳有言然後親日月之光潤金玉之度始可以無媿矣漢枚臯武帝時為郎武帝春秋二十九廼得皇子羣臣喜枚臯與東方朔作皇太子生賦及立皇子禖祝禮月令祀扵髙禖髙禖求子之神也武帝晩得太子喜而立此禖祠而令臯作祭祀之文也文詔所為皆不従故事重皇子也初衛皇后立臯奏賦以戒終令慎終如始也臯為賦善扵朔也從行至甘泉雍河東廵狩封泰山塞決河宣房㳺觀三輔離宫館臨山澤弋獵射馭狗馬蹵鞠刻鏤蹵足蹵之也鞠以韋為之中實以物蹵蹋為戲樂也帝有所感輒使賦之為文疾受詔輒成故所賦者多吳薛綜為尚書僕射大帝勑綜祝祖不得用常文綜承詔卒造文義信辭粲爛大帝曰復為兩頭謂更添一頭更祝之語使滿三也綜復再祝辭令皆新衆咸善晋鍾㑹為中書侍郎時司馬景王命中書令虞松作表再呈輒不可意命松更定以經時松思竭不能改心存之形扵顔色㑹察其有憂問松松以實答㑹取視為定五字松悅服以呈景王王曰不當爾邪誰所定也松曰鍾㑹向亦欲啟之㑹公見問不敢饕其能王曰如此可大用可令來㑹問松王所能松曰博學眀識無所不貫㑹乃絶賓客精思十日平旦入見至二皷乃出後王獨拊手歎息曰此真王佐材也南齊劉係宗為中書通事舍人太祖廢蒼梧眀日呼正直舍人虞整醉不能起係宗歡喜奉命太祖曰今天地重開是卿盡力之日使冩諸處分勑令及四方書疏使主書七人書吏二十人配之事皆稱㫖梁裴子野掌中書詔誥髙祖普通七年王師北伐勑子野為諭魏文受詔立成髙祖以其事體大召尚書僕射徐勉太子詹事周捨鴻臚卿劉之遴中書侍郎朱异集夀光殿以觀之時並歎服髙祖目子野而言曰其文甚壯俄又勑為書諭魏相元乂其夜受㫖子野謂可待旦方奏未之為也及五皷勑催令開齋速上子野徐起操筆昧爽便就奏之髙祖深嘉焉自是凡諸符檄皆令草創子野為文典而速不尚華靡之詞其制作多法古與今文體異時或有詆訶者及末皆翕然重之或問有為文速者子野答云人皆成扵手我獨成扵心雖有見否之異其扵刋改一也俄遷中書侍郎朱异普通中為散騎常侍异容貌魁梧能舉正雖出自諸生甚閑軍國故實自周捨卒後异代掌機宻其軍旅謀謨方鎮改換朝儀國典詔誥勑書並掌典之每四方表疏當局簿領諮議詳斷塡委扵前屬辭落紙覽事下議縦横敏贍不暫停筆頃刻之間諸事便了任孝恭為中書通事舍人為文敏速受詔立成若不留思每奏髙祖輒稱善累賜金帛蕭介博渉經史善屬文初髙祖招延後進二十餘人置酒賦詩臧盾以詩不成罰酒一斗盾飲盡顔色不變自若介染翰便成文不加㸃髙祖兩美之曰臧盾之飲蕭介之文即席之美也劉孺為太子中書舍人孺少好文章性敏速嘗扵御坐為李賦受詔便成文不加㸃髙祖甚稱賞之到沆為太子洗馬通籍文徳殿學士省時髙祖讌華光殿命羣臣賦詩獨詔沆為二百字三刻便成沆扵坐立奏其文甚美謝徵為鴻臚卿時後魏中山王元畧還北髙祖餞於武徳殿賦詩三十韻限三刻成徵二刻便就其辭甚美髙祖稱監焉謝監為吏部郎嘗侍髙祖坐勑與侍中王暕為詩答贈其文甚工髙祖善之仍使重作復合旨王規為黄門侍郎髙祖扵文徳殿餞廣州刺史元景隆詔羣臣賦詩同用五十韻規援筆立奏其文又美髙祖嘉焉即日詔為侍中禇翔為太子舍人宣城王主簿髙祖宴羣臣樂遊苑别詔翔與王訓為五十韻詩限三刻成翔扵坐立奏髙祖異焉即日轉宣城王文學陳蔡景歴髙祖初為中書通事舍人掌詔誥景歴屬文不尚雕靡而長扵叙事應機敏速為當世所稱顔晃文帝天嘉初為中書舍人掌制誥其表奏詔書下筆立成便得事理而雅有氣質陰鏗㓜聰慧天嘉中為始興王府中録事叅軍世祖嘗讌羣臣賦詩徐陵言之扵世祖即日召鏗預讌使賦新成安樂宫鏗援筆便就世祖甚歎賞之傅縡為中書通事舍人掌詔誥縡為文典麗性又敏速雖軍國大事下筆輒成未嘗起草沉思者亦無以加焉甚為後主所重後魏徐紇字武伯少好學有眀理頗以文詞見稱靈太后臨朝紇為中書舍人摠攝中書門下之事軍國誥命莫不繇之時有急速令數吏執筆或行或卧人别占之造次俱成不失事理雖無雅裁亦不通情時黄門侍郎太原王遵業瑯邪王誦竝稱文學亦不免為紇秉筆承其指授文筆駁論數十卷多有遺落時或有存扵世髙恭之字道穆為中書舍人元顥逼虎牢道穆勸莊帝北渡循河東下徵大將軍元天穆扵榮陽别徵爾朱王赴河内以犄角之臣竊謂萬全之計不過於此帝曰髙舍人語是其夜到河内郡北未有城守可依帝命道穆秉燭作詔書數十紙布告逺近扵是四方知乗輿所在北齊魏收初仕後魏為主客郎中莭閔帝立妙簡近侍詔試收為封禪書收下筆便就不立藁草文將千言所改無幾時黄門郎賈思同侍立深竒之帝曰雖七歩之才無以過此時年二十六孝武初又詔收攝大職文誥塡積事咸稱㫖侯景叛入冦梁南境文襄時在晋陽令收為檄五十餘紙不日而就又檄梁朝令送侯景初夜執筆三更便成文過七紙文襄善之帝曾逰東山勑收作詔宣揚威徳譬諭闗西俄頃而就詞理宏壯帝對百寮大嗟賞之收自東魏孝静武定二年已後國家大事詔命軍國文詞皆收所作每有警急受詔立成或時中使催促收下筆有同宿搆敏速之工邢温所不逮也其叅議典禮與邢相埒杜弼為大行臺郎中従武帝破西魏扵卬山命為露布弼手即書絹曾不起草盧詢祖有學術文章華靡為後生之俊舉秀才入京李祖勲嘗宴文士文宣使小黄門勑祖勲母曰茹茹既破何故無賀表使者佇立待之諸賓皆為表詢祖俄頃便成後朝廷大遷除同日擢拜詢祖立扵東上車門外為二十餘人作表文不加㸃辭理可觀後周吕思禮沙苑之㨗命為露布食頃便成太祖歎其工而且速隋楊素初仕周為車騎大將軍武帝命素為詔書下筆立成詞義兼美帝嘉之顧謂素曰善自勉之勿憂不富貴素應聲答曰臣但恐富貴來逼臣臣無心圖富貴唐顔師古武徳初為中書舍人専掌機宻于時軍國多務奏請填委師古性既眀敏達扵従政凡有詔誥皆成其手岑文本為中書舍人武徳中詔誥及軍國大文皆出扵顔師古至是文本所草詔誥或衆務繁凑即命書僮六七人随口便冩須臾悉成亦殆盡其妙張昌齡弱冠以文詞知名舉進士及第翠㣲宫成詣闕獻頌太宗召見試作息兵詔俄頃而就帝甚說楊師道為侍中時太宗好五言詩見師道所製咸稱善嘗宴近臣謂師道曰卿善篇什工毫翰如聞酣賞之際援筆直疏有如宿搆今可試為之師道拜伏奉詔造次便成畧無㸃竄仍令再三吟諷舉坐莫不嗟賞許敬宗為太子左庶子兼修國史貞觀十九年従太宗征遼敬宗與髙士廉等共知機要及岑文本卒于行所驛召敬宗令草駐蹕山破賊詔書敬宗立扵馬前俄頃而就詞甚典麗深見嗟賞自是専知制誥韋承慶為鳳閣舍人属文敏㨗雖軍國大事下筆輙成未嘗起草後為鳳閣侍郎同平章事中宗神龍初坐附推張易之弟昌宗失實配流時易之等伏誅承慶去巾解帶而待罪欲草赦書衆議以為無如承慶者乃詔承慶為之承慶神色不擾援筆而成詞甚典美當時咸歎服之劉褘之字希美則天臨朝拜中書侍郎同中書門下三品時軍國多事所有詔勑獨出褘之搆思敏速皆可立待王勮長夀中為太子典膳兼知鳳閣舍人事時夀春王成器衡陽王成義等五王初出閣同日受冊有司撰儀注不載冊文及百寮在列方知闕禮宰臣相顧失色勮乃召小吏五人各執筆口授分冩一時俱畢詞理典贍時人歎服之劉幽求為朝邑尉夜従𤣥宗平韋庶人是夜所下詔勑百餘道皆出扵幽求蘓頲為中書舍人景龍四年𤣥宗初定内難屬機事塡委文誥萬計頲在太極殿後手操口對無毫釐差誤主書韓禮談子陽傳書草詔屢謂頲曰乞眀公稍遲禮等書不及恐手腕將廢中書令李嶠歎曰舍人思如涌泉嶠所不及也李白天寳初待詔翰林白與飲徒醉扵酒肆𤣥宗度曲欲造樂府新詞亟召白白已卧扵肆矣召入以水洒面即令秉筆頃之成十餘章帝頗嘉之徐浩肅宗初為中書舍人時天下事殷詔令多出扵浩浩属詞贍給又工楷𨽻肅宗恱其能加兼尚書右丞韓臯字仲文父滉檢校左僕射平章事臯為考工員外郎丁父艱徳宗遣中人就第慰問仍宣令撰滉之事業臯號泣承命立草數千言徳宗嘉之陸贄為翰林學士建中四年朱泚謀逆従駕幸奉天時天下叛亂機務填委徵發指縦千端萬緒一日之内詔書數百贄揮翰起草思如泉注初若不經思慮既成之後莫不曲盡事情中扵機㑹日吏應答不暇同舍皆服其能其扵議論應對眀練理體敷陳剖判下筆如神當時名流無不推挹韋處厚穆宗時為中書舍人侍講學士敬宗嗣位詔以本官充翰林承旨學士每草詔立就惬㑹帝㫖柳公權文宗時為翰林學士中書舍人從幸未央宫苑中駐輦謂公權曰我有一喜事邊上衣物久不及時今年二月給春衣訖公權輦前奉賀上曰單賀未了卿可賀我以詩宫人廹其口進公權應聲曰去嵗雖無戰今春未得歸皇恩何以報春月得春衣上恱激賞久之封敖為翰林學士中書舍人搆思敏速語近而理勝不務竒澁武宗深重之陸扆昭宗時為中書舍人文思敏速初無思慮揮翰如飛文理俱惬同舍服其能天子顧待特異後唐劉岳昭宗末為殿中侍御史召入翰林為學士岳為文敏速好詼諧秉筆無滯李琪初仕梁為翰林學士累遷戸部侍郎翰林承旨梁祖西抗邠岐北攻潞出師燕趙經畧四方暫無寧嵗而琪以學士居帳中専掌文翰下筆稱旨寵遇踰倫是時琪之名播扵海内器識夫天地粹和之氣賢者稟之而生故藴而為器識發而為事業乃有踐禁掖之地居文翰之職沉黙以逺勢謙讓以鎮俗敷陳嘉誥聿沮扵羣議罄竭眀誠克清扵大憝或見事扵未兆或形言扵必中或應機立斷或守正不回斯皆國家之光生民之秀咸用論次垂諸不朽者也齊傅昭眀帝時為中書舍人時居此職者皆權傾天下昭獨廉静無干預唐楊綰為起居舍人知制誥歴司勲員外郎職方郎中掌誥如故遷中書舍人兼修國史故事舍人年深者謂之閣老公廨雜料歸閣老者五之四綰以為品秩同列給受宜均悉平分之甚為時論歸美崔祐甫為中書舍人大厯十三年六月隴州汧源縣河西軍都虞侯趙貴莊營田有猫䑕同乳不為害隴右節度使朱泚籠而獻之代宗遣内常侍吳承倩出示百寮宰臣常衮等及文武百寮蹈舞稱賀祐甫獨不賀曰猫者猛鷙之類本合食䑕猫䑕不相傷是反天性違物理也不宜稱瑞對百寮白扵衮衮愕眙久之謂曰國家祥瑞舍人獨執異見聽舍人自奏祐甫將附中使口奏承倩不受乃抗疏曰今日中使吳承倩宣進止以籠盛猫䑕示百寮者臣知天生萬物剛柔有性聖人因之垂訓作則禮記郊特牲篇曰迎猫為其食田䑕也然則猫之食䑕載在祀典以其除害利人雖㣲必録今此猫䑕不食仁則仁矣無乃失其性乎䑕之為物晝伏夜動詩人賦之曰相䑕有體人而無禮又曰石䑕石䑕無食我黍其序曰貪而畏人若大䑕也臣旋觀之雖云動物異扵麋鹿麏兎彼皆以時殺獲為國家用此之有害亦何愛而曲全之猫受人養棄職不修亦何異扵法吏不勤觸邪疆吏不勤扞敵又接部式具列三瑞無猫不食䑕之文以兹稱賀臣所未詳伏以國家化洽理平天符洊至紛論雜沓史不絶書若以劉向五行論此恐須申命憲司察視貪吏誡諸邊候無失徼廵則猫能致功䑕不為害輒塵扆旒伏勝戰越宰臣常衮以為和同之象上表陳賀及祐甫疏入帝甚嘉之不復省常衮之表陸贄徳宗時為翰林學士贄性忠藎既居近宻感人主重知思有効報故政或有缺巨細必陳繇是顧待益厚建中四年朱泚謀逆從駕幸奉天贄嘗啟帝曰今盜遍天下輿駕播遷陛下宜痛自引咎以感動人心昔湯武以罪已勃興楚昭以善言復國陛下誠能不恡改過以言謝天下使書詔無所忌臣雖愚陋可以仰副聖情庶令反側之徒革心向化帝然之故奉天所下書詔雖武夫悍卒無不揮涕感激多贄所為也姜公輔為翰林學士建中四年十月涇師犯闕徳宗蒼黄自苑北便門出幸公輔馬前諫曰朱泚嘗為涇原帥得士心昨以朱滔叛坐奪兵權泚嘗憂憤不得志不如使人捕之使陪鑾駕忽羣兇立之必貽國患臣頃曾奏陛下若不能坦懐待之則必殺之養獸自貽其患悔無所及帝曰已無及矣李昭初自尚書郎出為蘓州刺史朞月以中書舍人召還不拜謂宰輔曰省郎拜舍人以知制誥為次序便繇刺史玷綸闈非敢聞命乃以兵部郎中知制誥翌嵗拜舍人受之崔羣為翰林學士元和七年恵昭太子薨穆宗時為遂王憲宗以澧王居長又多内助將建儲貳命羣與澧王作讓表羣上言大凡已合當之而不為則有陳讓之儀理不合當因何遽有讓表今遂王嫡長所宜正位青宫竟従其奏章處厚為翰林學士敬宗寳厯二年十二月中官劉克眀作難是時變起宫闈事生倉卒處厚博通古今雅有體識其夕制置皆處厚詳定既行無不得禮為時所伏時詔命將降未有所定處厚聞難奔赴昌言曰春秋之法大義滅親内惡必書以眀逆順正名討罪扵義何嫌安可依違更事恥諱遂奉藩教行焉後唐盧導眀宗長興末為中書舍人權知貢舉眀年春潞王自鳳翔擁大軍赴闕閔帝奔于衛州宰相馮道李愚集百官扵天宫寺將出迎潞王時軍衆離潰人情奔駭百官移時未有至者導與舍人張昭先至馮道請導草勸進牋導曰潞王入朝郊迎可也若勸進之事安可造次且潞王與主上皆太后之子或廢或立當從教令安得不稟母后率爾而行馮道曰事要務實勸進其可已乎導曰今主上蒙塵在外遽以大位勸人若潞王守道修睦以忠義見責未審何辭以對不如率羣臣詔宫門取太后進止即去就善矣道未及對㑹京地廵檢安従進報曰潞王至矣安得百寮無班即紛然而去是日潞王未至馮道等止于上陽門外又令導草勸進牋導執之如初李愚曰舍人之言是也吾軰信罪人矣導之守正也如是晋李懌初仕後唐天成初為中書舍人充翰林學士在職轉户部侍郎右丞充承旨時常侍張文寳知貢舉中書奏落進士數人仍請詔翰林學士作一詩一賦下貢部為舉人格様學士竇夢徵張礪軰撰格詩格賦各一送中書宰相未以為允夢徴等請懌為之懌笑而答曰李懌識字有數頃嵗因人偶得及第敢與後生髦俊為標格假令今却業進士就春官求試落第必矣格詩不敢應詔君子多其識大體册府元龜卷五百五十一
