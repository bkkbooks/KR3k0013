body:
  text: 册府元龜卷三百五十六宋王欽若等撰將帥部立功第九隋李雄初仕後周太祖時為輔國將軍從逹奚武平漢中定興州又討汾州叛胡錄前後功拜驃騎大將軍儀同三司竇榮定初仕周為平東將軍從太祖與齊人戰於北邙周師不利榮定與汝南公宇文神慶帥精騎二千邀擊之齊師乃郤以功拜上儀同元景山仕周閔帝時從大司馬賀蘭祥擊吐谷渾以功拜撫軍將軍其後與齊人戰於北邙斬級居多高祖受禪拜上柱國明年大舉伐陳以景山為行軍元帥率行軍總管韓延吕哲出漢口遣上開府鄧孝儒將勁卒四千攻陳甑山鎮陳人遣其將陸綸以舟師來援孝儒逆擊破之陳將魯逹陳紀以兵守溳口景山復遣兵擊走之陳人大駭甑山沌陽二鎮守將皆棄城而遁宇文欣年十八嵗從周齊王憲討突厥有功拜儀同三司韋孝寛之鎮玉壁也以欣驍勇請與同行屢有戰功加位開府驃騎將軍從武帝伐齊遂拔晉陽齊平進位大將軍又從韋孝寛討尉遲迥迥遣子惇盛兵武陟欣先鋒擊走之進臨相州迥遣精甲三千伏於野馬岡欲擊官軍欣以五百騎襲之斬獲畧盡進至草橋迥又拒守欣率竒兵擊破之直趨鄴下李衍仕周武帝時為義州刺史從韋孝寛鎮玉壁城數與賊戰敵人憚之及平齊以軍功進授大將軍後為定鄜二州刺史及王謙作亂高祖以衍為行軍總管從梁睿擊車之進位上大將軍于繭仕周武帝時為少胥附從齊王憲破齊師於雒陽以功賜爵豐寧縣子邑五百戸趙仲卿周大將軍綱之子從齊王憲擊北齊攻臨秦統戎威逺伏龍張辟等五城盡平之又擊齊將段孝先於姚襄城苦戰連日破之以功授大都督尋典宿衞平齊之役以功遷上儀同兼趙郡太守開皇中拜朔州總管㑹突厥啓人可汗求婚於國帝許之仲卿因是間其骨肉遂相攻擊十七年啓人窘迫與隋使長孫晟投通漢鎮仲卿率騎千餘馳援之逹頭不敢逼潜遣人誘致啓人所部至者二萬餘家其年從高熲指白道以擊逹頭仲卿率兵三千為前鋒至族蠡山與虜相遇交戰七日大破之追奔至乞伏泊復破之虜千餘口雜畜萬計突厥悉衆而至仲卿為方陣四面拒戰經五日㑹高熲大兵至合擊之虜乃敗走追度白道踰泰山七百餘里時突厥降者萬餘家帝命仲卿處之常安以功進位上柱國賜物三千段朝廷慮逹頭掩襲啓人令仲卿屯兵二萬以備之代州總管韓洪永康公李藥王蔚州刺史劉隆等將步騎一萬援常安逹頭騎十萬來冦韓洪軍大敗仲卿自樂寧邀擊斬首虜千餘級楊素仕周武帝時為車騎大將軍從齊王憲與齊人戰於河陰以功封清河縣子邑五百戸及高祖為丞相素深自結納高祖甚嘉之以素為汴州刺史行至雒陽㑹尉遲迥作亂榮州刺史宇文胄據武牢以應迥素不得進高祖拜素大將軍發河内兵擊胄破之遷徐州總管及伐陳為行軍元帥率水兵東下陳主遣其信州刺史顧覺鎮安蜀城荆州刺史陳紀鎮公安皆懼而退走巴陵以東無敢守者湘州刺史岳陽王陳叔慎遣使請降又為内史令以浙江賊帥高智慧等未殄復乘傳至㑹稽先是泉州人王國慶南安豪族也殺刺史劉𢎞據州為亂諸亡賊皆歸之自以海路艱阻非北人所習不設備素汎海掩之王國慶惶遽棄州而走餘黨散入海島或守溪洞素分遣諸將水陸追捕乃宻令人謂國慶曰爾之罪狀計不容誅唯有斬送智慧可以塞責國慶於是執送智慧斬於泉州自餘支黨悉來降附江南大定後遷尚書左僕射時漢王諒反帝以素為荆州道行軍總管河北道安撫大使率衆數萬討諒時晉絳莒三州並為諒城守素各以二千石縻之而去諒遣趙子開擁衆十餘萬䇿絶徑路屯據高壁布陣五十里素令諸將以兵臨之自引竒兵潛入霍山緣崖谷而進直指其營一戰破之殺傷數萬諒所署介州刺史梁脩羅屯介休聞素至懼棄城而走進至并州三十里諒率其將王世宗趙子開蕭摩訶等衆且十萬來拒戰又擊破之擒蕭摩訶諒退保并州素進兵圍之諒窮蹙而降餘黨悉平韓擒虎仕周武帝時為儀同三司齊將獨孤永業守金墉城擒虎説下之進平范陽加上儀同陳人逼光州擒虎以行軍總管擊破之又從宇文欣平合州高祖作相遷利州刺史陳將甄慶任蠻奴蕭摩訶等共為聲援頻冦江北前後入界擒虎屢挫其鋒陳人奪氣伐陳之役晉王遣行軍總管杜彦與擒虎合軍歩騎二萬陳叔寳遣領軍蔡徵守朱雀航聞擒虎將至衆懼而潰任蠻奴為賀若弼所敗棄軍降於擒虎擒虎以精騎五百直入朱雀門陳人欲戰蠻奴撝之曰老夫尚降諸君何事衆皆散走遂平金陵逹奚長孺仕周武帝時為行軍總管北巡沙塞卒與虜遇接戰大破之李徹仕周為車騎大將軍從武帝破齊師於汾北乘勝下高壁拔晉陽擒高楷於冀州俱有力焉錄前後功加開府别封蔡陽縣公邑千戸崔仲方仕周為平東將軍從武帝攻北齊晉州齊亞將崔景嵩請為内應仲方與段文振等登城應接遂下晉州又令仲方説翼城等四城下之授儀同開皇末為㑹州總管時諸羌猶未賓附詔令仲方擊之與賊三十餘戰紫祖四隣望方渉題千碉小鐵圍山白男王弱水等諸部悉平賜奴婢二百三十口黄金三十斤雜物稱是段文振仕周為中外府兵曹從武帝攻北齊晉州下之進拔文侯華谷高壁三城皆有力焉及攻并州陷東門而入齊安徳王延宗懼而出降開皇末為太僕卿越雋蠻叛擊平之賜奴婢二百口大業初為兵部尚書從征吐谷渾督兵屯雪山連營三百餘里東接楊義臣西連張夀合圍渾主於覆袁川以功進位右光祿大夫李崇周武帝時為將兵都督隨宇文䕶伐齊功最擢授儀同三司權武仕周為開府武帝時從王謙破齊服龍等五城增邑八百戸平齊之役攻陷邵州别下六城以功增邑三百戸郭衍仕周為儀同大將軍從武帝與齊主大戰於晉州追齊師至高壁敗之仍從平并州以功加授開府封武强縣公累遷右中軍熊渠中大夫尉遲迥之起逆韋孝寛戰於武陟進戰於相州迥遣弟子勤為青州總管率青齊之衆來助迥迥敗勤與迥子惇祐等欲東奔青州衍將精騎一千追破之執祐於陣勤遂遁走而惇亦逃逸衍至濟州入據其城又擊其餘黨於濟北累戰破之執送京師超授上柱國封武山郡公開皇中從晉王出鎮揚州江表搆逆命衍為總管領精鋭萬人先屯京口於貴洲南與賊戰敗之生擒魁帥大獲舟楫粮儲以充軍實仍討東陽永嘉宣城黟歙諸洞盡平之授蔣州刺史李禮成仕周武帝時為車騎大將軍伐齊之役禮成從帝圍晉陽以兵擊南門齊席毗羅率精甲數千拒帝禮成力戰退之加開府封冠軍縣公李子雄仕周武帝時從平齊以功授帥都督高祖作相從韋孝寛破尉遲迥於相州拜上開府伐陳之役以功進位大將軍漢王諒之亂煬帝以子雄為上大將軍發幽州兵三萬自井陘以討諒時諒遣大將軍劉建畧地燕趙正攻井陘相遇於抱犢山下力戰破之遷幽州總管李景仕周武帝時平齊之役頗有力焉授儀同三司後平尉遲迥進位開府開皇九年以行軍總管從王世積伐陳陷陣有功進位開府及高智慧等作亂江南復以行軍總管從楊素擊之别平倉嶺還授鄜州刺史開皇末從史萬嵗擊突厥於大斤山别路邀賊大破之大業初擊叛蠻向思多破之又擊吐谷渾於西海攻高麗武厲城皆破之薛世雄年十七嵗從周武帝平齊以功拜帥都督開皇時數有戰功累遷儀同三司右親衞車騎將軍煬帝嗣位畨禺夷獠相聚為亂詔世雄討平之賀若誼仕周武帝時為雒州刺史北齊范陽王高紹義之奔突厥也誼以兵追之戰於馬邑遂擒紹義以功進位大將軍高祖為丞相拜亳州總管馳驛之部西遏司馬消難東拒尉遲迥申州刺史李慧反誼討平之進爵范陽郡公授上大將軍梁士彦仕周為東南道行臺使持節徐州總管三十二州諸軍事徐州刺史與烏丸軌擒陳將呉明徹裴忌於吕梁别破廣陵畧定淮南地高祖作相轉亳州總管二十四州諸軍事尉遲迥之反也以為行軍總管從韋孝寛擊之至河陽與迥軍相對令家僮梁㸃等數人為前鋒士彦以其徒繼之所當皆破乘勝至草橋迥衆復合進戰大破之及圍鄴城攻北門而入馳啓西門納宇文欣之兵及迥平除相州刺史杜彦仕周武帝時為左侍上士後從柱國陸通擊陳將呉明徹於土州破之又擊叛蠻尅倉搥白楊二栅並斬其渠帥進平郢州賊帥樊志以戰功拜大都督高祖為丞相從韋孝寛擊尉遲迥於相州每戰有功開皇中為左武衞將軍平陳之役以行軍總管與新義公韓擒虎相繼而進軍至南陵賊屯據江岸彦遣儀同樊子葢率精兵擊破其栅獲船六百餘艘渡江擊南陵城拔之擒其守將許翼進至新林與擒虎合軍及平陳進位柱國時高智慧等之作亂也復以行軍總管從楊素討之别解江州圍智慧餘黨徃徃屯聚保投溪洞彦水陸兼進攻錦山陽父若石壁西洞悉平之皆斬其渠帥賊李陀擁衆數千據彭山彦襲擊破之斬陀傳其首又擊徐州宜豐二洞悉平之和洪仕周武帝時數從征伐烏丸軌之擒陳將呉明徹也洪有功焉加位開府遷折衝中大夫尉遲迥作亂相州以洪為行軍總管從韋孝寛擊之軍至河陽迥遣兵圍懐州洪與總管宇文述等擊走又破尉惇於武陟及平相州每戰有功拜柱國封廣武郡公邑二千戸劉方仕周武帝時為承御上士以戰功拜上儀同高祖為丞相方從韋孝寛破尉遲迥於相州以功加開府賜爵河陰縣侯仁夀中交州俚人李佛子亂方為交州總管至都隆嶺遇賊二千餘人來犯官軍方遣營主宋纂何貴嚴願等擊破之進兵臨佛子先令人諭以禍福佛子懼而降送於京師其有桀黠者恐於後為亂皆斬之尋授驩州道行軍總管以尚書右丞李綱為司馬經畧林邑方遣欽州刺史寗長真驩州刺史李暈上開府秦雄以歩騎出越常方親率大將軍張愻司馬李綱舟師趨北景大業元年正月軍至海口林邑王梵志遣兵守險方擊走之師次闍梨江賊據南岸立栅方盛陳旗幟擊金鼓賊懼而潰既渡江行三十里賊乗巨象四面而至方以弩射象中瘡却蹂其陣王師力戰賊奔於栅因攻破之俘馘萬計於是濟區粟渡六里前後逢賊每戰必擒進至大緣江賊據嶮為栅又擊破之過馬援銅柱南行八日至其國都林邑王梵志棄城奔海獲其廟主金人汙其宫室刻石紀功而還楊文思仕周為儀同三司從武帝攻拔北齊晉州以勲進授上儀同三司夀陽劉叔仁作亂從清河公宇文神舉討之戰於塼井在陣生擒叔仁後從王誼破賊於鯉魚栅其後累以軍功遷果毅右旅下大夫高祖為丞相文思從韋孝寛拒尉遲迥於武陟迥遣其將李儁圍懐州與行軍總管宇文述擊走之破尉遲惇平鄴城皆有功進授上大將軍崔𢎞度仕周為上開府宣帝嗣位從鄖國公韋孝寛經畧淮南𢎞度與化政公宇文欣司水賀婁子幹至肥口陳將潘深率兵數千來拒戰隔水而陣欣遣𢎞度諭以禍福深至夕而遁攻夀陽降陳守將呉之立𢎞度功最以前後勲進位上大將軍于顗仕周為郢州刺史宣帝時為水軍總管從韋孝寛經畧淮南顗率開府元紹貴上儀同毛猛等以舟師自潁口入淮陳防主潘深棄栅而走進與孝寛攻拔夀陽復引師圍硤石守將許約懼而降顗乃拜東廣州刺史後拜呉州總管陳將錢茂和率數千人襲江陽顗逆擊走之陳復遣將陳紀周羅㬋燕合兒等襲顗顗拒之而退馮昱仕周宣帝時以行軍總管與王誼李威等討叛蠻平之拜柱國王誼仕周為邠州總管司馬消難舉兵反高祖以誼為行軍元帥率四總管討之軍次近郊消難懼而奔陳于時北至商洛南拒江淮東西二千餘里巴蠻多叛共推渠帥蘭雒州為主雒州自號河南王以附消難北連尉遲迥誼率行軍總管李威馮暉李逺等分討之旬月皆平韋藝仕周為魏郡太守高祖為丞相尉遲迥陰圖不軌朝廷遣藝季父孝寛馳徃伐迥藝因投孝寛即從孝寛擊迥以功進位上大將軍李穆仕周宣帝時為大左總管尉遲迥之亂令其所署行臺韓長業攻陷雒州執刺史趙署城民郭子勝為刺史穆遣兵討之獲子勝高祖嘉之以穆勞效同破鄴城第一勲加三轉聽分授其二子榮才及兄賢子孝軌榮及才並儀同大將軍孝軌進開府儀同大將軍又别封其子雄為宻國公邑三千戸韓僧夀仕周宣帝時為侍伯中旅下大夫從韋孝寛平尉遲迥每戰有功授大將軍封昌樂公邑千户韋洸仕周宣帝時為開府高祖為丞相洸從季父孝寛擊尉遲迥於相州以功拜柱國進封襄陽郡公開皇初突厥冦邉皇太子屯咸陽令洸統兵出源州道與虜相遇擊破之拜江陵總管伐陳之役領行軍總管及陳平拜江州總管率步騎二萬畧定九江遂進圖嶺南高祖與書慰勉之洸至廣州嶺表皆降之帝聞而悦許以便宜從事洸所統集二十四州拜廣州總管高熲仕周宣帝時為開府擊尉遲迥既至軍為橋於沁水賊於上流縱大栰熲預為木狗以禦之既度焚橋而戰大破之遂至鄴下與迥交戰仍共宇文忻李詢等設策因平尉遲迥及突厥犯塞以熲為元帥擊賊破之又出白道進圖入磧破賊而還元褒仕周為趙州刺史褒從韋孝寛擊尉遲迥以功超拜柱國乞伏慧仕周為佽飛右旅熊渠中大夫從韋孝寛擊尉遲惇於武陟所當皆破授大將軍田仁恭仕周為大將軍從韋孝寛破尉遲迥於相州拜柱國樊叔畧仕周為營構監尉遲迥之亂高祖令叔畧鎮大梁迥將宇文威來冦叔畧擊走之以功拜大將軍宇文述仕周為英果中大夫尉遲迥作亂相州述以行軍總管率步騎三千從韋孝寛擊之軍至河陽迥遣將李雋攻懐州述别擊嶲軍破之又與諸將擊尉遲惇於永橋述先鋒陷陣俘馘甚衆平尉遲迥每戰有功超拜上柱國開皇初拜右衞將軍平陳之役以行軍總管率衆三萬自六合而濟時韓擒虎賀若弼兩軍趣丹陽述進據石頭城為聲援陳主既擒而蕭瓛蕭巖據東呉之地擁兵拒守述領行軍總管元契張黙言等討之水陸兼進落叢公燕榮以舟師自海至亦受述節度陳永新侯陳君範自晉陵奔瓛并軍合勢見述軍且至瓛懼立栅於晉陵城東又絶塘道留兵拒述瓛自義興入太湖圖掩述後述進破其栅廻兵擊瓛大敗之斬瓛司馬曹勒又前軍復陷呉州瓛以餘衆保包山燕榮擊破之述進至奉公埭蕭巖陳君範等以㑹稽請降述許之二人面縳路左呉㑹悉平以功拜安州總管大業中為左衞大將軍從煬帝幸榆林時鐵勒契弊歌稜攻敗吐谷渾其部攜散遂遣使請降求救帝令述以兵屯西平之臨羌城撫納降附吐谷渾見述擁强兵懼不敢降遂西遁述領鷹揚郎將梁元禮張峻崔師等追至曼頭城攻拔之斬三千餘級乗勝至赤水城復拔之其餘黨走屯丘尼川述進擊大破之獲其王公尚書將軍二百人前後虜男女四千口而還渾主南走雪山其故地皆亡明年從帝西巡至金山登燕支述每為斥侯時渾賊復冦張掖進擊走之明年帝有事遼東與將軍楊義臣率兵復臨鴨綠水㑹楊𤣥感作亂帝詔述班師令馳驛赴河陽發諸郡兵以討𤣥感時𤣥感逼東都聞述軍將至懼而西遁前圖關中述與刑部尚書衞𤣥左禦衞將軍來䕶兒武衞將軍屈突通等躡之至閿鄉五丈原與𤣥感相及述與來䕶兒列陣當其徑道屈突通以竒兵擊其後大破之遂斬𤣥感傳首行在所賜物數千段梁睿仕周為涼安二州總管及高祖總百揆代王謙為益州總管行至漢川而謙反遣兵攻始州睿不得進高祖命睿為行軍元帥率行軍總管于義張威逹奚長儒梁昇石孝義步騎二十萬討之時謙遣開府李三王守通谷睿使張威擊破之擒數千人進至龍門謙將趙儼秦㑹擁衆十萬據嶮為營周亘三十里睿令將士啣枚自開逺道西南奮擊力戰破之蜀人大駭睿鼓行而進謙將敬豪守劒閣梁巖拒平林並懼而來降又令高阿那環逹奚惎等以盛兵攻利州聞睿將至惎分兵據開逺睿顧謂將士曰此虜據要欲遏吾兵勢吾當出其不意破之必矣遣上開府拓拔宗超劒閣大將軍宇文夐指巴西大將軍趙逹水軍入嘉陵睿遣張威王倫賀若震于義韓相貴阿那惠等分道攻惎自午及申破之惎奔歸于謙睿進逼成都謙令逹奚惎乙弗䖍城守親率精兵五萬背城結陣睿擊之謙不利將入城惎䖍以城降拒謙謙將麾下三十騎遁走新都令王寳執之睿斬謙於市劒南悉平進位上柱國于義仕周宣帝時為開府高祖作相王謙搆逆其將逹奚惎擁衆據開逺義以都督將左軍擊破之拜潼州總管李惲仕周為義州刺史王謙作亂以行軍總管從梁睿擊平之進上大將軍開皇元年以行軍總管討平叛蠻進位柱國長孫熾仕周為大都督王謙作亂熾從信州總管王長述泝江而上以熾為前軍破謙一鎮定楚合等五州擒偽總管荆山公元振以功拜儀同三司大業初擢拜户部尚書吐谷渾冦張掖令熾率精騎五千擊走之追至青海而還以功授銀青光祿大夫楊文紀開皇初為車騎大將軍儀同三司安州總管長史將兵迎陳降將李瑗於齊安與陳將周法尚軍遇擊走之以功進授開府張奫開皇初為大都督領鄉兵賀若弼之鎮夀春也嘗為間諜平陳之役頗有功焉進位開府儀同三司又率水軍破逆賊笮子游於京口薛子建於和州拜大將軍後從楊素征江表别破高智慧於㑹稽呉世華於臨海進位上大將軍龎晃開皇初為上開府拜右衞將軍河間王𢎞之擊突厥也晃以行軍總管從至馬邑别路出賀蘭山擊賊破之斬首千餘級權武開皇六年為大將軍檢校潭州總管桂州人李世賢作亂武以行軍總管與武侯大將軍虞慶則擊平之王檦開皇中以行軍總管屯兵江北禦陳冦數有戰功為陳人所憚伐陳之役及高智慧反攻討皆有殊績官至柱國趙賢通開皇中為民部中大夫從上柱國于義率衆數萬自三鵶道以伐陳冦尅陳十九城而還賀若弼開皇中為行軍總管伐陳之役進屯蔣山之白土岡陳將魯逹周智安任蠻奴田瑞樊毅孔範蕭摩訶等以勁兵拒戰田瑞先犯弼擊走之魯逹等相繼逓進弼軍屢却弼揣知其驕士卒且惰於是督厲將士殊死戰遂大破之劉權開皇中為車騎將軍從晉王瑋平陳以功進授開府儀同三司大業五年從征吐谷渾權率衆出伊吾道與賊相遇擊走之逐北至青海虜獲千餘口王世積開皇中為蘄州總管平陳之役晉王已平丹陽世積於是移書告諭遣于全公權始璋畧取新蔡陳江州司馬黄偲棄城而遁始璋入據其城世積繼至陳豫章太守徐澄廬陵太守蕭亷潯陽太守陸仲容巴山太守王誦太原太守馬頓齊昌太守黄正始安城太守任瓘等及鄱陽臨川守將並詣世積降以功進位柱國荆州總管桂州人李光仕作亂世積以行軍總管討平之進位上柱國高勵開皇中以行軍總管從宜陽公王世積下陳江州以功拜上開府周法尚開皇中為黄州總管伐陳之役以行軍總管𨽻秦孝王率舟師三萬出于樊口陳城州刺史熊門超出師拒戰法尚擊破之擒超於陣累遷永州總管安集嶺南未㡬桂州人李光仕舉兵作亂令法尚與上柱國王世積討之法尚馳徃桂州發嶺南軍世積出岳州徵嶺北軍俱㑹于尹州光仕來􅊇擊走之世積所部多遇瘴不能進頓於衡州法尚獨討之光仕帥勁兵保白石洞法尚捕得其弟光畧光度大獲家口其黨有來降附法尚輙以妻子還之居旬日降者數千人法尚遣兵列陣以當光仕親率竒兵蔽林設伏兩陣始交法尚馳擊其栅栅中人皆走散光仕大潰追斬之拜武衞將軍時黔安夷向思多反殺將軍鹿愿圍太守蕭造法尚與將軍李景分路討之法尚擊思多于清江破之斬首三千級還從討吐谷渾法尚别出松州道逐捕亡散至于青海遼東之役以舟師指朝鮮道㑹楊𤣥感反與將軍宇文述來䕶兒等破之以功進右光祿大夫時有齊郡人王薄孟讓等舉兵為盗衆十餘萬保長白山頻戰每挫其鋭燕榮開皇中為青州總管伐陳之役以為行軍總管率水軍自東萊傍海入太湖取呉郡既破丹陽呉人共立蕭瓛為主阻兵於晉陵為宇文述所敗退保包山榮率精甲五千躡之瓛敗走為榮所執晉陵㑹稽悉平李元通開皇中以尚書左丞領左翊衞驃騎將軍伐陳之役元通以行軍總管從楊素出信州道以功進位大將軍劉仁恩開皇中以行軍總管從楊素伐陳與素破陳將吕仲肅於荆門仁恩之計居多授上大將軍來䕶兒開皇中為大都督平陳之役䕶兒有功進位上開府從楊素擊高智慧于浙江智慧將逃於海䕶兒追至閩中餘黨皆平進位大將軍除泉州刺史封襄陽縣公食邑一千戸時智慧餘黨盛道延阻兵為亂䕶兒又討平之遷建州總管又與蒲山公李寛討平黟歙逆黨汪文進進位柱國大業中遼東之役䕶兒率樓船指滄海入自浿水去平壤六十里與高麗相遇進擊大破之乗勝直造城下破其郛郭於是縱軍大掠稍失部伍高元弟建武募敢死士五百人邀擊之䕶兒因却屯營海浦以待期㑹後知宇文述等敗遂班師明年又出滄海道師次東萊㑹楊𤣥感作逆黎陽進逼鞏雒䕶兒勒兵與宇文述等擊破之封榮國公又帥師渡海至卑奢城高麗來戰䕶兒大破之斬首千餘級魚俱羅開皇中以大都督從晉王平陳有功拜開府未㡬沈𤣥懀高智慧等作亂江南楊素以俱羅同行每有戰功加上開府又從素出靈州道擊突厥以功進位柱國大業中以交通内臣除名㑹越雋飛山蠻作亂詔俱羅白衣領將并率蜀郡都尉段鍾葵討平之册府元龜卷三百五十六
