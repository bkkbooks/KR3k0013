body:
  text: 册府元龜卷六百四十九宋王欽若等撰貢舉部對策第四唐員半千晉州臨汾人上元初應入科舉授武陟尉又應嶽牧舉髙宗御武成殿召諸州舉人親問曰兵書所云天陣地陣人陣各何謂也半千越次而進曰臣觀載籍此事多矣或謂天陣星宿孤虚地陣山河向背人陣偏伍彌縫以臣愚見謂不然矣夫師出以義有若時雨得天之時此天陣也兵在足食且耕且戰得地之利此地陣也善用兵者使三軍之士如父子兄弟得人之和此人陣也三者去矣其何以戰髙宗深嗟賞之及對策擢為上第白居易貞元中擢進士第書判㧞萃為秘書省校書郎元和元年應才識兼茂明於體用科制曰朕觀古之王者受命君人兢兢業業承天順地靡不思賢能以濟其理求讜直以聞其過故禹拜昌言而嘉猷罔伏漢徴極諫而文學稍進經時濟俗率繇於兹厥後相循有名無實而又設以科條増求茂異捨斥己之至言角無用之虚文指切著明罕稱於代朕所以歎息欝悼思索其眞是用發懇惻之誠咨體用之要庶乎言之可行行之不倦上獲其益下輸其情君臣之間懽然相與子大夫得不勉思朕言而茂明之我國家光宅四海年將二百十聖𢎞化萬邦懷仁三王之禮靡不講六代之樂罔不舉浸澤于下升中於天周漢以還莫斯為盛自禍階漏壌兵宿中原生人困竭耗其大半農戰非古衣食罕儲念兹疲甿遂乖富庶督耕植之業而人無戀本之心峻𣙜酤之科而下有重歛之困舉何方而可以復其盛用何道而可以濟其艱既往之失何者宜愆將來之虞何者當戒昔主父懲患於晁錯而用推恩夷吾致霸於齊桓而行寓令精求古人之意啓廸來哲之懐眷兹洽聞固所詳究又執契之道埀衣不言委之於下則人用其私專之於上則下無其效漢元優游於儒學盛業竟衰光武責課於公卿峻政非美兩途取舎未獲所從余心浩然益所疑惑子大夫熟究其㫖屬之于篇興自朕躬無悼後害居易對曰臣聞漢文帝時賈誼上疏云可為痛哭者一可為流涕者二可為長太息者三是時漢興四十載萬人大理四海太和而賈誼非不見之所以過言者以為詞不切志不激則不能囘君聽感君心而發憤於至理也是以雖盛時也賈誼過言而無愧雖過言也文帝容之而不非故臣不失忠君不失聖書之史冊以為美譚然臣觀自茲已來天下之理未曽有髣髴於文帝時者激切之言又未有髣髴於賈誼疏者豈非君之聖明不侔於文帝乎臣之忠讜不逮于賈誼乎不然何謂衰亂之時愈多而切直之言愈少也今陛下思禹之昌言而拜之而念漢之極諫而徴之病虚文之無用者奬至言之斥己者詢臣以可行之策諭臣以不倦之意懇惻欝悼發於重誠此眞聖王思至理求過言之明㫖也斯則陛下之道已𢎞於前代臣之才誠劣於古人輙欲過言以禆陛下明德萬分之一也禆之者非謂言之必可行也體用之必可明也且欲使後代知陛下踐祚之後有樸直敢言之臣出焉無俾文帝賈誼專美於漢代然後退而俯伏以待罪戻焉臣誠所甘心也謹以過言昧死上對伏蒙陛下賜臣之策有思興禮樂之道念救疲甿之方辨懲往戒來之宜審推恩寓令之要至矣哉陛下之念此實萬葉之福也豈唯一代之人受其賜而已哉臣聞疲病之作有因縁焉救療之方有次第焉臣請為陛下究因縁陳次第而言之臣聞太宗以神武之姿揆天下之亂𤣥宗以聖文之德致天下之肥當二宗之時利無不興弊無不革逺無不服近無不和貞觀之功既成而太樂作焉雖六代之盡美無不舉也開元之理既定而盛禮興焉雖三代之明備無不講也禮行故上下輯睦樂達故内外和平所以兵偃而萬邦懐仁刑清而兆人自化動植之類咸煦嫗而自遂焉雖成康文景之理無以出於此矣洎天寳已降政教寖微宼既荐興兵亦繼起兵以遏宼寇生於兵兵宼相仍迨五十載征徭繇是而重人力繇是而罷下無安心雖日督農桑之課而生業不固上無定費雖日峻管𣙜之法而嵗計不充日削月脧以至於耗竭其半矣此臣所謂疲病之因縁者也豈不然乎繇是觀之蓋人疲繇乎税重税重繇乎軍興軍興繇乎宼生宼生繇乎政缺然則未修政教而望宼戎之銷未銷宼戎而望兵革之息雖太宗不能也未息兵革而望征徭之省未省征徭而望黎庶之安雖𤣥宗不能也雖然事有所必然雖常人足可致勢有所不可雖聖哲不能為伏惟陛下將欲安黎庶先念省征徭將欲省征徭先念息兵革將欲息兵革先念銷宼戎將欲銷寇戎先念修政教何者若政教修則下無詐偽暴悖之心而宼戎所繇銷矣宼戎銷則境無興發攻守之役而兵革所繇息矣兵革息則國無餽運飛輓之費而征徭所繇省矣征徭省則人無流亡轉徙之憂而黎庶所繇安矣臣切觀今天下之宼雖已盡銷伏願陛下不以易銷而自怠今天下之兵雖未盡散伏願陛下不以難散而自疑無自怠之心則政教日肅無自疑之意則誠信日明政教肅則暴亂革心誠信明則獷鷔歸命革心則天下將萌之宼不遏而自銷歸命則天下已聚之兵不散而自息然後重歛可日减疲甿可日安富庶可日滋困竭可日補日安則和悦之􅂔積日富則亷譲之風形因其亷譲而示之以禮則禮易行矣乘其和悦而鼓之以樂則樂易達矣舉斯方而可以復其盛用斯道而可以濟其難懲既往之失莫先於誠不明而政不修戒將來之虞莫大於宼不銷而兵不息此臣所謂救療之次第者也豈不然乎至若齊行寓令之法以覇諸侯漢用推恩之謀以懲七國施之今日臣恐非宜何者且今萬人一綂四海一家無鄰國可傾非夷吾用權之秋也雖欲寓令令將何所寓邪今除國建郡置守罷侯無爵土可䟽非主父矯弊之日也雖欲推恩將何所推邪但陛下嗣貞觀之初𢎞開元之理必將光二宗而福萬葉矣何區區齊漢之法而足為陛下所慕哉精究之端實在於此矣又蒙陛下賜臣之問有執契垂衣之治委下專上之宜敦儒學而業衰責課實而政失者此皆政化之所急古今之所疑陛下幸念之臣有以見天下之理興矣夫執契之道垂衣不言者蓋言已成之化非謀始之謂也委之於下者言王者之理庀其司分其務而已非謂政無大小悉委之於下也專之於上者言王者之道秉其樞執其要而已非謂事無巨細悉專之於上也漢元優游於儒學而盛業竟衰者非儒學之過學之不得其道也光武責課於公卿而峻政非美者非攷課之累也責之不得其要也臣請重為陛下别啓而明之夫垂衣不言者豈不謂無為之道哉臣聞無為而理者其舜也歟舜之理道臣粗知之矣始則懋於修己勞於求賢明察其刑明慎其賞外序百揆内勤萬樞昃食宵衣念其不息之道夫如是非大有為者乎終則安於恭已逸於得賢明刑至於無刑明賞至於無賞百職不戒而舉萬事不勞而成端拱凝旒立於無過之地夫如是豈非眞無為者乎故臣以為無為者非無所為也必先有為而後至於無為也老子曰無為而無不為蓋是之謂矣夫委下而用私專上而無效者此繇非所宜委而委之也非所宜專而專之也臣請以君臣之道明之臣聞上下異宜君臣殊道蓋大者簡者君道也小者繁者臣道也臣道者百職小而衆萬事細而繁誠非人君一聰所能徧察一明所能周覽也故人君之道但擇其人而任之舉其要而執之而已矣昔九臣各掌其事而唐堯乘其功以帝天下十亂各效其能而周武總其理以王天下三傑各宜其功而漢髙兼其用而取天下三君者不能為一焉但執要任人而已亦猶心之於四支九竅百骸也不能為一焉然而寢食起居言語視聽皆以心為主也故臣以為君得君之道雖專之於上而下自有以展其效焉臣得臣之道雖委之於下而人亦無所用其私矣繇此而言光武考責而政未盡美者非他昧君臣之道於小大繁簡之際也元帝優游而業以寖衰者非他昧無為之道於始終勞逸之間也二途俱失較然可知陛下但舉中而行則無所惑矣伏以聖策首曰思賢能以濟其理求讜直以聞其過又曰上獲其益下輸其情其末章則曰興自朕躬無悼後害此誠陛下思酌下言樂聞上失勤勤懇懇慮臣軰有所隐情者也敢不再竭狂直以副天心之萬一焉臣聞古先聖主之理也制敬於未萌除害於未兆故静無敗事動有成功自非聖王則異於是莫不以欲逞於始悔追於終政失於前功補於後利害之效可畧而言且如軍暴而後戢之兵亂而後遏之善則善矣不若防其微杜其漸使不至於暴亂也官邪而後責之吏姦而後誅之懲則懲矣不若審其才得其人使不至於姦邪也人餒而後食之人凍而後衣之惠則惠矣不若輕其徭薄其税使不至於凍餒也舉一知十不其然乎今陛下初嗣祖宗新臨蒸庶承多虞之運當鼎盛之年此誠制欲於未兆之時也伏惟陛下欲惜其時重慎於事既往者且追救於弊後將來者宜蚤防於事先夫然則保邦當在於未危恭已當居於無過三五之道夫豈逺哉臣生也幸得為唐人當陛下臨御之時覩陛下升平之始斯則臣朝聞而夕死足矣而况充才識之貢承體用之問乎今所以極千慮昧萬死當盛時獻過言者此誠微臣喜朝聞甘夕死之志也不然何輕肆狂瞽不避斧鑕若此容易焉伏惟少垂意而覽之則臣生死幸甚策入第四等授盩厔縣尉集賢校理劉蕡寳厯二年進士擢第博學善屬文尤精左氏春秋與朋友交好譚王覇大畧耿介嫉惡言及世務慨然有澄清之志自元和末閽寺權盛握兵宮闈横制天下天子廢立繇其可否干撓庶政當時因為南北司愛惡相攻有同水火蕡草澤中居常憤惋文宗即位恭儉求理太和二年策試賢良曰朕聞古先哲王之理也𤣥黙無為端拱思道陶民心以居簡凝日用而不宰厚下以立本推誠而建中繇是天人通隂陽和俗躋仁壽物無疵癘噫盛德之所臻巋乎莫可及已三代令王質文迭究百為滋熾風流寖微自漢而降足徴蓋寡朕顧惟昧道祗荷丕搆奉若謨訓不敢怠荒任賢惕厲宵衣旰食詎追三五之遐軌庶紹祖宗之鴻緒而心有所未達行有所未孚繇中及外厥政斯廣是以人不率化氣或湮厄災旱竟嵗播植愆時國廪罕蓄乏九年之儲吏道多端微三載之績京師諸夏之本也將以觀理而豪猾時踰檢太學明教之源也期於變風而生徒多惰業列郡在乎頒條而干禁或未絶百工在乎按度而淫巧或未衰俗怪風靡積訛成蠧其擇官濟理也聽人以言則枝葉難辨御下以法則恥格不形其阜財發號也生之寡而食之衆煩於令而鮮於理思所以救此繆盭致之治平兹心浩然若渉泉水故前詔有司博延羣彦佇啓宿懵冀致治平子大夫識達古今明於康濟造廷待問副朕虚懐必當箴主之闕辨政之疵明綱條之致紊稽冨庶之所急何施斯革於前弊何澤斯惠乎下土何施而理古可近何道而和氣克充推之本源著於條對至於夷吾輕重之權孰輔於理嚴尤底定之策孰叶於時元凱之考課何先叔子之克平何務推此龜鑑擇乎中庸期在洽聞朕將親覧是時對策者百餘人所對只循常務惟蕡切論黄門大横將危宗社對曰臣誠不佞有經國致君之術無位而不得行有犯顔敢諌之心無路而不得進但懷憤欝思有時而一發耳常欲與庶人議於道商旅謗於市得通上聽一悟主心雖被詆言之罪無所悔焉况逄陛下以至德嗣興以大明垂炤詢求過闕恣訪謨猷制詔中外舉能直言極諌者臣既辱斯舉專承大問敢不悉意以言至於上之所忌時之所禁權幸之所諱惡有司之所與奪臣愚不識伏惟陛下少加優容不使聖朝有讜直而受戮者乃天下之幸也謹昧死對伏以聖策有思古先之理念𤣥黙之化將通天人以濟俗和隂陽以治物見陛下慕道之深也臣以為格王之理其則不逺惟陛下致之之道何如耳伏以聖策有荷丕搆而不敢荒寕奉謨訓而罔有怠忽見陛下憂勞之至也若夫任賢惕厲宵衣旴食宜黜左右之纎佞進股肱之大臣若夫追蹤三五紹復祖宗宜鑒前古之興亡明當時之成敗心有所未達以下情塞而不得上通行有所未孚以上澤壅而不得下浹欲人之化也在修己以先之欲氣之和也在遂性以道之救災患在致乎精神廣播植在示乎食力國廪罕蓄本乎冗食尚繁吏道多端本乎選用失當豪猾踰檢繇中外之法殊生徒墮業繇學校之官廢列郡干禁繇授任非人百工淫巧繇制度不立伏以聖策有擇官濟理之心阜財發號之嘆見陛下教化之本也且進人以行則枝葉安有難别乎防下以禮則恥格安有不形乎念生寡而食衆可罷斥惰游念令煩而理鮮要察其行否博延羣彦願陛下必納其言造廷待問則小臣安敢愛死伏以聖策有求賢箴闕之言審能辨疵之令見陛下咨訪之勤也遂小臣屛姦豪之志則弊革於前守陛下念俗之心則惠敷於下邪正之道分則理古可近禮樂之方著而和氣克充至若夷吾之法非皇王之權嚴尤所陳無最上之策元凱之所先不若唐虞之考績叔子之所務不若重華之舞干且俱非大德之中庸未為上聖之龜鏡何足以為陛下道之哉或有以繋安危之機兆存亡之變臣請披瀝肝膽為陛下别白而重言之臣前所謂格王之理其則不逺者在陛下愼思之力行之始終不懈而已臣謹按春秋元者氣之始也春者嵗之始也春秋以元加於嵗以春加於王明王者當奉若天道以謹其始也又舉時以終嵗舉月以終時春秋雖無事必書首月以存時明王者當奉若天道以謹其終也王者動作始終必法於天以其運行不息也陛下既能謹其始又謹其終懋而修之勤而行之則可以執契而居簡無為而不宰廣立本之大業崇建中之盛德矣又安有三代循環之弊百偽兹熾之漸乎臣故曰惟陛下致之之道何如耳臣前所謂任賢愓厲宵衣旰食宜出左右之纎佞進股肱之大臣若實以陛下憂勞之至也臣聞不宜憂而憂者國必衰宜憂而不憂者國必危今陛下不以國家存亡之事社稷安危之策而降於清問臣未知陛下以布衣之臣不足以定大計邪或萬機之勤聖慮有所未至邪不然何宜憂而不憂者也臣以為陛下宜先憂者宮闈將變社稷將危天下將傾四海將亂此四者國家已然之兆故臣謂聖慮宜先及之夫帝業既艱難而成之固不可容易而守之太祖兆其機髙祖勤其績太宗定其業𤣥宗繼其明至於陛下二百有餘載其間明主相因擾亂繼作未有不委賢士親近正人而能紹興其徽烈者也或一日不念則顚覆大器宗廟之恥萬古為恨臣謹按春秋人君之道在體元以居正昔董仲舒為漢武帝言之畧矣其所未盡者臣得為陛下備而論之夫繼故不書即位所以正其始也終必書所終之地所以正其終也故為君所發必正言所履必正道所居必正位所近必正人臣又按春秋閽殺吳子餘祭譏其疎逺賢士昵近刑人有不君之道矣伏惟陛下思祖宗開國之勤念春秋繼故之誡將明法度之端則發正言而履正道將杜簒弑之漸則居正位而近正人逺刀鋸之賤親骨鯁之直輔相得以居其任庶職得以守其官奈何以䙝近五六人總天下大政外專陛下之命内竊陛下之權威懾朝廷勢傾海内羣臣莫敢指其狀天子不得制其心禍稔蕭牆姦生帷幄臣恐曹節侯覽復生於今日此宮闈將變也臣謹按春秋魯定公元年春王不言正月者春秋以為先君不得正其終則後君不得正其始故曰定無正也今忠賢無腹心之寄閽寺專廢立之權䧟先帝不得正其終致陛下不得正其始况皇儲未建郊祀未修將相之職不歸名分之宜不定此社稷將危也臣謹按春秋王禮子殺邵伯毛伯春秋之義兩相殺不書而此書者重其專王命也且夫天之所授者在君君之所授者在命操其命而失之者是不君也侵其命而專之者是不臣也君不君臣不臣此天下所以將傾也臣謹按春秋晉趙鞅以晉陽之兵叛入于晉書其師者以其能逐君側之惡人以安其君故春秋善之今威柄凌夷籓臣䟦扈或有不達人臣之節首亂者以安君為名不究春秋之微稱兵者以逐惡為義則政刑不繇于天子征伐必自於諸侯此海内之所以將亂也又樊噲排闥而雪涕袁盎當車以抗詞京房發憤以殞身竇武不顧而畢命此皆陛下明知之矣臣謹按春秋晉狐射姑殺陽處父書㐮公殺者以其漏言言㐮公不能顧險重之戒處父所以及戕賊之禍春秋非之夫上漏其情則下不敢盡意上泄其事則下不敢盡言傳有造膝詭辭之文易有殺身害成之戒今公卿大臣亦不敢為陛下言之慮陛下必不能用之陛下既忽之而不用必洩其言臣下既言之而必不行必嬰其禍適足以鉗直臣之口以重姦臣之威是以欲盡其言則有失身之懼欲盡其意則有害成之憂故徘徊欝塞以候陛下感悟然後盡其啓沃耳陛下何不以聽朝之餘時御便殿召當時賢相舊德老臣訪持變扶危之謀求定傾救亂之術塞隂邪之路屏䙝狎之臣制侵凌迫脅之心復門户掃除之役戒其所宜戒憂其所宜憂既不能治於前當治於後既不能正其始當正其終則可以䖍奉典謨克承丕搆終任賢之效無旰食之憂矣臣前所謂若夫追蹤三五紹復祖宗鑒前古之興亡明當時之成敗臣聞堯禹之為君而天下之人理者以其能任九官四嶽十二牧不失其舉不二其業不侵其職居官惟其能左右惟其賢元凱在下雖微必舉四兇在朝雖彊必誅考其安危明其取捨至秦之二代漢之元成咸欲措國如唐虞致身如堯禹而終敗亡者以其不見安危之機不知取捨之道不任大臣不辨姦人不親忠良不逺䜛佞伏惟陛下察唐虞之所以興而景行於前鑒秦漢之所以亡而戒懼於後陛下無謂廟堂無賢相庶官無賢士今紀綱未絶典刑猶在人誰不欲自致為王臣致時為太平陛下何忽而不用之邪人有居官非其能左右非其賢其惡如四兇其讐如趙髙其毒如恭顯陛下又何為而不去之邪神器固有歸天命固有心陛下其念之哉昔秦之亡也失於强暴漢之亡也失於微弱强暴則賊臣畏死而害上微弱則姦臣竊權而震主伏見敬宗皇帝不虞亡秦之禍不翦其萌伏惟陛下深軫亡漢之憂以杜其漸則祖宗之洪業可紹三五之遐軌可追矣臣前所謂陛下心有所未孚以上澤壅而不得下浹者乃百姓有塗炭之苦陛下無繇而知則陛下有子惠之心百姓無繇而信臣謹按春秋書梁亡者梁自亡也以其思慮昏而耳目塞下出惡政人為宼盜皆不知其所以然自取其滅亡也臣聞國君之所以尊者重其社稷也社稷之所以重者存其百姓也茍百姓之不存則雖社稷不得固其重茍社稷之不重則雖國君不得保其身故治天下不可不知百姓之情夫百姓者陛下之赤子也陛下宜命仁慈者親之視之如母傳焉如乳哺焉如師之教導焉故人之於上也敬之如神明愛之如父母今或不然陛下親其貴倖分曹連署補除卒吏召致賓客因其貨賄氣勢大者統籓方小者為牧守居上無濟惠之政而有饕餮之害居下無忠誠之節而有姦欺之罪故人之於上也畏之如豺狼惡之如讐敵今海内困窮處處流散饑者不得養加以國之權柄專在左右貪臣聚歛以固寵姦吏因縁而弄法寃痛之聲上達九天入于九泉鬼神發怒隂陽為之愆錯君門萬里而不得告訴士人無所歸化百姓無所歸命官亂人貧盜賊竝起瓦觧之勢憂在旦夕即不幸因之以師旅繼之以凶荒臣恐陳勝吳廣不獨起于秦赤眉黄巾不獨起於漢故臣所以為陛下發憤扼腕痛心泣血耳如此則百姓有塗炭之苦陛下何繇而知之陛下有子惠之心百姓安得而信之乎致使陛下行有所未孚心有所未達固然也臣聞昔漢元帝即位之初更制七十餘事其心甚誠其指甚美然而綱紀日紊國祚日衰姦宄日彊黎元日困者以其不能擇賢明而任之失其操柄也自陛下御宇憂勤兆庶屢降徳音四海之内莫不抗首而長息自喜復生於死亡之中也伏帷陛下愼終如始以塞萬方之望誠能揭國權以歸其相持兵柄以歸其將去貪臣聚歛之政除姦吏因縁之害惟忠賢是近惟正直是用内寵便佞無所聽焉選清慎之官擇仁惠之長動之以利煦之以和教之以孝慈導之以德義去耳目之塞通上下之情俾萬國歡康兆人蘇息則心無不達而行無不孚矣臣前所謂欲人之化也在修己以先之者臣聞德以修己教以導人修己則人不勸而自至導人則人敦行而率從是以君子欲政之必行也故以身先之欲人之從化也故以道御之今陛下先之以身而政未必行御之以道而人未從化豈不以立教之㫖未盡其方邪夫立教之方在乎君以明制之臣以忠行之君以知人為明臣以佐時為忠知人則任賢而去邪佐時則固本而守法賢不任則重賞不足以勸善邪不去則嚴刑不足以禁非本不固則民流法不守則政散而欲教之必至化之必行不可得也陛下能斥姦邪不私其左右舉賢正不遺其疎逺則化浹於朝廷矣愛人以敦本分職而奉法修其身以及其人始於中而成於外則化行天下矣臣前所謂欲氣之和也在遂性以導之者當納人於仁壽也夫欲人之夀在乎立制度修教化夫制度立則財用省財用省則賦歛輕賦歛輕則人富矣教化修則争競息争競息則刑罰清刑罰清則人安矣既富矣則仁義興焉既安矣則夀考至焉仁夀之心感於下和平之氣應於上故灾害不作休祥薦臻四方底寕萬物咸遂矣臣前所謂救災旱在致乎精誠者臣謹按春秋魯僖公一年之中二書不雨者以其君有䘏人之志也魯文公三年之中一書不雨者以其君無憫人之心也故僖致精誠而旱不害物文無卹憫而旱則成灾陛下誠能有卹人之心則無成災之變矣臣前所謂廣播植在視乎食力者臣謹按春秋君人者必時視人之所勤人勤於力則功築罕人勤於財則貢賦少人勤於食則百事廢今財食與力人皆勤矣願陛下廢百事之用廣三時之務則播植不愆矣臣前所謂國廪罕蓄本乎宂食尚繁者臣謹按春秋臧孫辰告糴于齊春秋譏無九年之蓄一年不登而百姓飢臣願斥游惰之人篤其耕植省不急之費以贍黎元則廪蓄不乏矣臣前所謂吏道多端本乎選用失當者繇國家取人不盡其才任人不明其要故也今陛下之用人也求其聲而不得其實故人之不進也務其末而不務其本臣願覈考課之實定遷序之制則多端之吏息矣臣前所謂豪猾踰檢繇中外之法殊者以其官禁不一也臣謹按春秋齊桓公盟諸侯不日而葵丘之盟特以日者美其能一明天子之禁奉王官之法故春秋備而書之夫官者五帝三王之所建也法者髙祖太宗之所制也法宜畫一官宜正名今又分外官中官之員立南司北司之局或犯禁於南則亡命於北或正刑於外則破律于中法出多門人無所措實繇兵農勢異而中外法殊也臣聞古者因井田而制軍賦間農事以收武備提封約率乘之數命將在公卿之列故兵農一致而文武同方可以保乂邦家式遏禍亂暨太宗皇帝肇建邦典亦置府兵省䑓軍衛文武參掌居閑歲則櫜弓力穡將有事則釋耒荷戈所以修復古制不廢舊物今則不然夏官不知兵籍止於奉朝六軍不知兵事止於飬勲階軍容合中官之政戎律附内臣之職首一戴武弁嫉文吏如仇讐足一䧟軍門視農夫如草芥謀不足以翦除兇逆而詐足以抑揚威福勇不足以鎮衛社稷而暴足以侵暴里閭覊絏藩臣干陵宰輔隳裂王度汨亂朝經張武夫之威上以制君父假天子之命下以御英豪有藏姦觀釁之心無仗節死難之義豈先王經文緯武之㫖邪臣願陛下貫文武之道均兵農之功正貴賤之名一中外之法還軍衛之職修省署之官近崇貞觀之䂓逺復成周之制自邦畿以刑于下國始天子以達於諸侯則可以制豪猾之彊無踰檢之患矣臣前所謂生徒墮業繇學校之官廢者蓋以國家貴其禄而賤其能先其身而後其行故庶官無通經之學諸生無修業之心矣臣前所謂列郡干禁繇授任非其人者臣以刺史之任理亂之根本繋焉朝廷之法制在焉權可以抑豪猾恩可以惠孤寡彊可以禦姦寇政可以移風俗其將校有曽經戰陣及功臣子弟各請隨宜酬賞如無治人之術者不當授任此官則絶干禁之患矣臣前所謂百工淫巧繇制度不立者臣請以官位禄秩制其器用車服禁人金銀珠玉錦繡雕鏤不蓄於私室則無蕩心之巧矣臣前所謂辨枝葉者考言以詢行也臣前所謂恥格行者導德而齊禮也臣前所謂念生寡而食衆可罷斥隋遊者已備之於前矣臣前所謂命令煩而理鮮要察其行否臣聞號令者乃理國之具也君審而出之臣奉而行之或虧止畱罪在不赦今陛下令煩而理鮮得非持之者有所蔽欺乎臣前所謂博延羣彦願陛下必納其言造廷待問則小臣不敢愛死者臣聞晁錯為漢畫削諸侯之策非不知禍之將至也有忠臣之心壯夫之節者茍知社稷之危哀生人之困豈忍姑息時忌竊陛下一命之寵哉昔龍逢死而啓殷比干死而啓周韓非死而啓漢陳蕃死而啓魏今臣之來也有司或不敢薦臣之言陛下又無以察臣之心退必受誅於權臣之手臣幸得從四子於地下固臣之願也所不知殺臣者臣死之後將孰為啓之哉至於人主之闕政教之疵前日之弊臣既言之矣若乃流下土之惠修近古之理而致其和平者在陛下行之而已然上之所陳者實以臣親奉聖問敢不條對雖臣之愚以為未極教化之大端皇王之要道伏惟陛下事天地以教人敬奉宗廟以教人孝飬髙年以教人悌長字百姓以教人慈幼調元氣以煦育扇太和於仁夀可以逍遥無為端拱成化至若念陶鈞之道在擇宰相而任之使權造物之柄念保定之功在擇將相而任之使修分閫之寄念百度之未貞在擇庶官而任之使專職業之守念百姓之愁痛在擢長吏而任之使深養惠之術自然言足為天下教行足為天下法仁足以勸善義足以禁非又何宵衣旰食勞神竭慮然後以致其理哉是歲左散騎常侍馮宿太常少卿賈餗庫部郎中龎嚴為考策官三人者時之文士也覩蕡條對歎服嗟挹以為漢之晁錯無以過之言論激切士林感動時登科者二十二人而中官當途考官不敢畱蕡在籍中物論喧然不平守道正人傳讀其文至有相對垂泣者諫官御史扼腕憤發而執政之臣從而彌之以避黄門之怨惟登科人李郃謂人曰劉蕡下第我軰登科實厚顔矣請以所授官讓蕡事雖不行人士多之册府元龜卷六百四十九
