body:
  text: 册府元龜卷二百十四宋王欽若等撰閏位部權略訓兵權略夫濟多難建大業以安反側集事機蓋有任夫權謀者焉故其智不足仲尼之所非以竒用兵老氏之攸述而况天保未定世故紏紛専㨿一方抗衡上國或經綸伊始戰鬭未寜或維御方物統制斯在乃有反乎常道奮乎英畧理絶於侔揣事等於符契終能成經世之務申除惡之志應變之術良可稱焉雖復捨正從譎受譏於春秋期於反經合道有濟乎當世易之見㡬而作傳之好謀而成者皆是之謂矣蜀先主初在吳時益州牧劉璋綱維頽弛周瑜甘寜並勸孫權取蜀權以咨先主先主内欲自規乃偽報曰備與璋託為宗室冀慿英靈以輔漢朝今璋得罪左右備獨悚懼非所敢聞願加寛貸若不獲請備當放髪歸於山林後先主西圖璋留關羽守權曰猾虜乃敢挾詐初魏太祖始征柳城先主説劉表使襲許表不從及太祖還表謂先主曰不用君言故失此大㑹也先主曰今天下分裂日尋干戈事㑹之來豈有終極乎若能應之於後者則此未足為恨也先主既得成都曹公自長安舉衆南征先主遥䇿之曰曹雖來無能為也我必有漢川矣及曹公至先主斂衆拒險終不交鋒積月不拔亡者日多夏曹公果引軍還先主遂有漢中吳大帝初為吳侯漢建安十八年正月曹公出濡須作油船夜渡洲上權以水軍圍取得三千餘人其没溺者亦數千人權數挑戰公堅守不出權乃自來乗輕船從濡須口入公軍諸將皆以為是挑戰者欲擊之公曰此必孫權欲身見吾軍部伍耳勅軍中皆嚴精弓弩不得妄發權行五六里廻還作鼓吹公見舟船器仗軍伍整肅喟然嘆曰生子當如孫仲謀劉景升兒子若豚犬耳二十四年劉備將關羽圍樊襄陽偏將軍全琮上疏陳羽可討之計權時已與吕䝉隂議襲之恐事泄故寢琮表不答及擒羽權置酒公安顧謂琮曰君前陳此孤雖不相答今日之㨗抑亦君之功也於是封陽華亭侯二十五年魏文帝受漢禪權聞魏受禪而劉備稱帝乃呼問知星者已分野中星氣何如遂有僣意而以位次尚少無以威衆又欲先卑而後倨之為卑則可以假寵後倨則必致討然後可以怒衆衆怒然後可以自大故深絶蜀而専事魏魏封權為吳王羣臣議以為宜稱上將軍九州伯不應受魏封權曰九州伯於古未聞也昔沛公亦受項羽拜漢王此蓋時宜耳復何損耶遂受之又魏欲遣侍中辛毗尚書桓楷徃與盟誓并徴任子權辭譲不受魏乃命曹休張遼臧霸出洞口曹仁出濡須曹真夏侯尚張郃徐晃圍南郡權遣吕範等督五軍以舟軍拒休等諸葛瑾潘璋楊粲救南郡朱桓以濡須督拒仁時楊越蠻夷多未平集内難未弭故權卑辭上書求自改厲若罪在難除必不見置當奉還土地民人乞寄命交州以終餘年魏文帝報曰君生於擾攘之際本有從横之志降身奉國以享茲祚自君䇿名以來貢獻盈路討備之功國朝仰成埋而掘之古人之所耻國語云狸埋之狸掘之是以無成功朕之與君大義已定豈樂勞師逺臨江漢廊廟之議王者所不得専三公上君過失皆有本末朕以不明雖以曽母投杼之疑猶冀言者不信以為國福故先遣使者犒勞又遣尚書侍中踐修前言以定任子君遂設辭不欲使進議者恠之又前都尉浩周勸君遣子乃實朝臣交謀以此卜君君果有辭外引隗囂遣子不終内喻竇融守忠而已世殊時異人各有心浩周之還口陳指麾益令議者發明衆嫌終始之本無所據杖故遂俛仰從羣臣議今省上事欵誠深至心用慨然悽愴動容即日下詔勅諸君但深溝髙壘不得妄進若君必効忠節以解疑議登身朝到夕召兵還此言之誠有如大江魏畧曰浩周字孔異上黨人建安中仕為蕭令至徐州刺史後領䕶于禁軍軍没為關羽所得權襲羽并得周甚禮之及文帝即王位權乃遣周為牋魏王曰昔討關羽獲于將軍即白先王當發遣之此乃奉欵之心不言而發先王未深留意而謂權中間復有異圖愚情慺慺用未果决遂值先王委離國祚殿下承統下情始通公私契濶未獲備舉是令本誓未即昭顯梁㝢傳命委曲周至深知殿下以為意望權之赤心不敢有他願垂明恕保權所執謹遣浩周東里衮至情至實皆周等所具又曰權本性空薄文武不昭昔承父兄成軍之緒得為先王所見奬飾遂因國思綏撫東土而中間寡慮庶事不明畏威忘徳所取重戾先王恩仁不忍遐棄既釋其宿罪且開明信雖致命虜庭梟獲關羽功効淺薄未報萬一事業未究先王即世陛下踐祚威仁流邁私懐情願未䝉照察梁㝢來到具知陛下不遂疏逺必欲撫録追本先緒權之得此欣然踊躍心開目明不勝其慶權世受寵遇分義深篤今日之事永執一心惟察慺慺重垂含覆又曰先王以權推誠已驗軍當引還故除合肥之守著南北之信令權長驅不復後顧近得守將周㤗全琮等白事過月六日有馬歩七百徑到横江又篤將馬和復將四百人進到居巢琮等聞有兵馬渡江視之為兵馬所擊臨時交鋒大相殺傷卒得此間情用恐懼權實在逺不預聞知約勅無素敢謝其罪又聞張征東朱横海今復還合肥先王盟要繇來未乆且權自度未獲罪釁不審今者何以發起牽軍逺次事業未訖南當為國討除賊備重聞斯問深使失圖凡逺人所恃在於明信願殿下克卒前分開示坦然使權誓命得卒本規凡所願言周等所當傳也初東里衮為于禁軍司馬前與周俱没又俱還到有詔皆見之帝問周等周以為權必臣服而東里衮謂其不可必服帝恱周言以為有以知之是嵗冬魏王受漢禪遣使以權為吳王詔使周與使者俱徃周既致詔命時與權私宴謂權曰陛下未信王遣子入侍也周以闔門百口明之權因謂周曰浩孔異卿乃以舉家百口保我我當何言耶遂流涕沾襟及與周别又指天為誓周還之後權不遣子而設辭帝乃乆留其使到八月權上書謝又與周書曰自道路開通不忘修意既新奉國命加知起居假歸河北故使情問不獲果至望想之勞曷云其已孤以空闇分信不昭中間招罪以取棄絶幸䝉國恩復見赦宥喜乎與君克卒本圖傳不云乎雖不能始善終可也又曰昔君之來欲令遣子入侍于時傾心歡以承命徒以登年幼欲假年嵗之間耳而赤心未䝉昭信遂見討責嘗用慙怖自頃國恩復加開𨗳忘其前愆取其後效喜得因此尋竟本誓前已有表具説遣子之意想君假還已知之也又日今子當入侍而未有妃耦昔君念之以為可上連綴宗室若夏侯氏雖中間自棄常奉戢在心當垂宿念為之先後使獲攀龍附驥永自固定其為分惠豈有量哉如是欲遣孫長緒與小兒俱入奉行禮聘成之在君又曰小兒年弱加教訓不足念當與别為之緬然父子恩情豈有已耶又欲遣張子布追輔䕶之孤性無餘凡所欲為令盡宣布惟恐赤心不克暢逹是以俱為君説之宜明所以於是詔曰權前對浩周自陳不敢自逺樂于委質長為外臣又前後辭㫖頭尾撃地䑕子自知不能保爾許地也又今與周書請以十二月遣子復欲遣孫長緒張子布隨子俱來彼二人皆權股肱心腹也又欲為子於京師求婦此權無異心之明效也帝既信權甘言且謂周為得其真而權但華偽竟無遣子意自是之後帝既彰權罪周亦見疎逺終身不用權遂改年臨江拒守黄武二年八月魏文帝在廣陵吳人大駭權乃臨江為疑城自石頭至于江乗車以木楨衣以葦席加采飾焉一夕而成魏人自江西望甚憚之遂退軍孫休永安元年大將軍孫綝秉政一門五侯皆典禁兵權傾人主有所陳述敬而不違於是益恣休恐其有變數加賞賜十一月丙申詔曰大將軍忠欵内發首建大計以安社稷卿士内外咸贊其議並有勲勞昔霍光定計百寮同心無復是過亟案前日與議定等告廟人各依故事應加爵位者促施行之戊戌詔曰大将軍掌中外諸軍事事統多煩其加衞将軍御史大夫恩侍中與大将軍分省諸事恩者綝之弟頃之休聞綝逆謀隂與張布圖計十二月戊辰臘百寮朝賀公卿升殿詔武士縛綝即伏誅宋髙祖武帝初叅劉牢之軍事孫恩頻攻句章帝屢摧破之恩復走入海三月恩北出海鹽帝追而翼之築城于海鹽故治賊日來攻城城内兵力甚弱帝乃選敢死之士百人咸脫甲胄執短兵並皷噪而出賊震懼奪氣因其懼而奔之並棄甲散走斬其大帥姚盛雖連戰剋勝然衆寡不敵帝深獨慮之一夜偃旗匿衆若已遁者明晨開門使羸疾數人登城賊遥問劉裕所在曰夜已走矣賊信之乃率衆大上帝乗其懈怠奮擊大破之恩知城不可下乃進向滬瀆帝復棄城追之海鹽令鮑陋遣子嗣之以吳兵一千請為前驅帝曰賊兵甚精以吳人不習戰若前驅失利必破我軍可在後為聲援不從是夜裕多設伏兵兼置旗皷然一處不過數人明日賊率衆萬餘迎戰前驅既交諸伏皆出舉旗鳴鼓賊謂四面有軍乃退嗣之追奔為賊所没帝且戰且退賊盛所領死傷且盡帝慮不免至向伏兵處乃止令左右脱取死人衣賊謂當走反停疑猶有伏帝因呼更戰氣色甚猛賊衆以為然乃引軍去帝徐歸然後散兵稍集南齊太祖初迎立順帝平西將軍郢州刺史黄囘與司徒袁粲相結舉事粲據石頭囘頓新亭聞石頭鼓噪率兵來赴之朱雀航有戍軍受節度不聽夜過會石頭已平因稱救援太祖知而不言撫之甚厚遣囘西上流涕告别後終誅之囘弟駟及從弟馬兄子奴亡逸太祖與征虜將軍王廣之書曰黄囘雖有㣲勲而罪過轉不可容近遂啓請御大小二輿為刺史服飾吾乃不惜為啓聞正恐得輿復求畫輪車此外罪不可勝數弟自悉之今啓依法令廣之於江西搜捕駟等薛淵為冠軍將軍魏遣薛道摽冦夀春帝以道摽淵之親近勅齊郡太守劉懐慰曰聞道摽兒婦並在都與諸弟無復同生者凡此類可多方誤之縱不全信足使豺狼疑惑令為淵書與道摽示購之之意魏得書果追道摽遣他將代之武帝不豫時後魏侵邊帝慮朝野憂惶乃力疾召樂府奏正聲伎梁髙祖義師起陳伯之為齊冠軍據潯陽以距義師及衆軍次潯陽然後歸附與衆俱下伯之頓離門尋進西明門建康城未平每降人出伯之輙喚與耳語髙祖恐其後懐飜覆宻語伯之曰聞城中甚忿卿舉江州降欲遣刺客中卿宜以為慮伯之未之信會東昏將鄭伯倫降髙祖使伯倫過伯之謂曰城中甚忿欲遣信誘卿以封賞湏卿復降當生割卿手脚卿若不降復遣刺客殺卿宜深為備伯之懼自是無異志矣力戰有功吕僧珍為前軍將軍直殿省孫文川等作亂進燒尚書省及閣道雲龍僧珍帥羽林兵邀擊不能却髙祖戎服御前殿謂僧珍曰賊夜來是衆少曉則走矣命打五皷賊謂已曉乃散官軍捕文川斬于東市北齊神武性深密高岸終日儼然人不能測機權之際變化若神至於軍國大略獨運懐抱文武將吏罕有豫之諸將出討奉行方略罔不克㨗違失指畫多致奔亡初髙祖雖内有逺圖而外迹未見爾朱羽生為殷州刺史髙祖密遣李元忠舉兵逼其城令乾率衆偽徃救之乾遂輕騎入見羽生與指畫軍計羽生與乾俱出因擒之遂平殷州文襄東魏孝静帝武定中為大將軍時侯景㨿河南反令韓軌討之不克文襄欲間景於梁乃與景書而謬其辭云本使景陽叛欲與圖西西人知之故景更以圖南為事漏其書於梁梁人亦不之信朱梁太祖乾寜中急攻兖鄆朱瑄求援於太原時李克用遣大將李存信率師赴之假道於魏屯於莘縣存信御軍無法稍侵魏之芻牧羅𢎞信不平之太祖因遣使謂𢎞信曰太原志吞河朔廻戈之日貴道堪憂𢎞信懼乃歸欵於太祖仍出師三萬攻李存信敗之未㡬李克用領兵攻魏營於觀音門外屬邑多㧞太祖遣葛從周援之戰於洹水擒克用男落落以獻太祖令送於𢎞信斬之晉軍乃退是時太祖方圖兖鄆慮𢎞信離貳每嵗時賂遺必卑辭厚禮𢎞信每有答貺太祖必對魏使北面拜而受之曰六兄比予有倍年之長兄弟之國安得以常隣遇之故𢎞信以為厚已開平五年二月以蔡州順化軍指揮使王存儼權知軍州事蔡人士習叛逆刺史張慎思又裒歛無狀帝追慎思至京而乆未命代右廂指揮使劉行琮乗虛作亂因縱火驅擁為度淮計存儼誅行琮而撫遏其衆都将鄭遵與其下奉存儼為主而以衆情馳奏時東京留守慱王友文不先請遂討其亂兵至鄢陵上聞之曰誅行琮功也然存儼方懼若臨之以兵蔡必速飛矣遂馳使還軍而擢授存儼蔡人安之乾化元年以權知輝州事前鄆州支使檢校金部郎中叚知新為輝州刺史仍進階超至銀青光禄大夫進官超至檢校工部尚書武威郡開國男食邑三百户帝英果迅邁顧事之繇于司存者皆逶迤不速意甚惡之况肇樹丕搆方以肥養生物惣一赤縣為念故戎将之超寵異數咸宜發宸㫖靡繇宰司用之以激諸勇毅冀夫急效亦王者之權道也末帝貞明初租庸使趙巖租庸判官邵贊獻議於帝曰魏博六州精兵數萬蠧害唐室百有餘年羅紹威前恭後倨太祖每深含怒太祖口未屬纊師厚即肆隂謀蓋以地廣兵彊得肆其志不如分削使如身使臂即無不從也陛下不以此時制之寜知後之人不為師厚邪若分割相魏為兩鎮則朝廷無北顧之患矣帝曰善詔以平盧軍節度使賀德倫為天雄軍節度使遣劉鄩率兵六萬屯河朔詔曰分疆裂土雖賞勲勞建節屯師亦從機便比者魏慱一鎮廵屬六州為河朔之大藩實國家之巨屏所分憂寄允為重難將叶事機須期通濟但縁鎮定賊境最為魏慱親隣其次相衛兩州皆控澤潞山口兩道並連於并晉分頭常㓂於魏封既須日有枝梧未若俱分節制免勞兵力困奔命於兩途稍泰人心俾安居於終日其相州宜建節為昭德軍以澶衛兩州為屬郡以張筠為相州節度使訓兵傳曰春蒐夏苖秋獮冬狩皆於農隙以講武事周禮大司馬之職掌仲春教振旅皆所以訓戎政而簡軍實也自江左建國以逮夫宋梁莫不循經武之制舉治兵之典或考禮於前代或寓令於游畋或閲水戰之備或叅華戎之選至廼躬秉武節以明乎申律近處禁囿聿勤於肄習繇是少長有敘卒乗競勸允符申儆之義以成式遏之業故仲尼有言曰以不教民戰是謂棄之斯可監也已吳廢帝亮始親政事時孫綝専政亮乃取兵子弟年十八已下十五已上得三千餘人選大將子弟年少有勇力者為之將帥亮曰吾立此軍欲與之俱長日於苑中習焉宋太祖在位依故事肄習衆軍兼用漢魏之禮其後講武於宣武堂文帝元嘉五年正月臨𤣥武舘閱武十六年正月戊寅於北郊閱武二十年二月於白下閱武二十五年二月詔曰安不忘危經世之所同治兵教戰有國之常典故服訓明耻然後少長知禁頃戎政雖修而號令未審今宣武塲始成便可克日大習衆軍當因郊獵肄武講事閏二月大蒐於宣武塲主者奉詔列奉申攝克日校獵百官備辦設行官殿便坐武帳於幕府山南岡設王公百官便坐幔省如常儀設南北左右四行旌門建獲旗以表獲車殿中郎一人典獲車主者二人收禽吏二十四人配獲車十二兩校獵之官著袴褶有帶武冠者脫冠者上纓二品以上擁刀備槊麾幡三品以下帶刀皆騎乗將領部曲先獵一日遣屯布圍領軍將軍一人督右甄䕶軍將軍一人督左甄大司馬一人居中董正諸軍悉受節度殿中郎率獲車部曲在司馬之後尚書僕射都官尚書五兵尚書左右丞都官諸曹郎令史都官諸曹令史幹蘭臺治書侍御史曹令史諸曹令史幹督攝糺司校獵非違至日㑹於宣武塲列為重圍設留守填街位於雲龍門外内官道南以西為上設從官位於雲龍門内大官階北小官階南以西為上設先置官位於行止車門外官道東以北為上設先置官還位於廣莫門外道之東西以南為上校獵日平旦正直侍中奏中嚴上水一刻奏搥一皷為一嚴上水二刻奏搥二皷為再嚴殿中侍御史奏開東中華雲龍門引仗為小駕鹵簿百官非校獵之官著朱服集列廣莫門外應還省者還省留守填街後部從官就位前部從官依鹵簿先置官先行上水三刻奏搥三鼓為三嚴上水四刻奏外辦正次直侍中散騎常侍給事黄門侍郎軍校劍履進夾上閤正直侍中負璽通事令史帶龜印中書之印上水五刻皇帝出著黒介幘單衣乗輦正直侍中負璽陪乗不帶劍殿中侍御史督攝黄麾以内次直侍中次直黄門侍郎䕶駕在前又次直侍中佩信璽與正直黄門侍郎從䕶駕在後不鳴皷角不得諠譁以次引出警蹕如常儀車駕出贊陛者再拜皇太子入守車駕将至威儀唱引先置前部從官就位再拜車駕至行殿前廻輦正直侍中跪奏降輦次直侍中稱制曰可正直侍中俛伏起皇帝降輦登御座侍臣升殿直衞鈒㦸虎賁毛頭文衣鶡尾以次列階正直侍中奏解嚴先置從駕百官還便坐幔省帝若躬親射禽變御戎服内外從官以及虎賁悉變服如校獵儀鈒㦸抄鞘以備武衛黄麾内外從入圍裏列置部典廣張甄圍旗皷相望銜枚而進甄周圍㑹督甄令史奔騎號法施令春禽懐孕蒐而不射鳥獸之肉不登於爼不射皮革齒牙骨角毛羽不登於器不射甄㑹大司馬鳴皷蹙圍衆軍皷譟警角至宣武塲止大司馬屯旌門二甄帥屯左右旌門殿中中郎率䕶軍部曲入次北旌門内之右皇帝從南旌門入射禽謁者以獲車收載還陳於獲旗北王公以下以次射禽各送詣獲旗下付收禽主者事畢大司馬鳴鼓解圍復屯殿中郎率其屬收禽以實獲車充庖厨列言統曹正厨置樽酒爼肉于中逵以犒饗校獵衆軍至晡正直侍中奏嚴從官還著朱服鈒㦸復鞘再嚴先置官先還三嚴後二刻正直侍中奏外辦皇帝著黒介幘單衣正次直侍中散騎常侍給事黄門侍郎軍校進夾御正直侍中跪奏還宫次直侍中稱制曰可正直侍中俛伏起乗輿登輦還衛從如常儀大司馬鳴鼓散屯以次就舍車駕將至威儀唱引留守填街先置前部從官就位再拜車駕至殿前廻輦正直侍中跪奏降輦次直侍中稱制曰可正直侍中俛伏起乗輿降入正直次直侍中散騎常侍給事黄門侍郎散騎侍郎軍校從至閣亦如常儀正直侍中奏解嚴孝武孝建二年九月丁亥於宣武塲閱武大明五年二月閱武詔曰昔人稱人道何先於兵為首雖淹紀勿用忘之必危朕以聽覽餘閒因時講事坐作有儀進退無爽軍幢以下普量班錫七年正月詔曰春蒐之禮著自周令講事之誥書于魯史所以昭宣德度示民軌則今嵗稔氣榮中外寜晏當因農隙葺是舊章可克日於𤣥武湖大閱水師开廵江右講武校獵十月戊申幸南豫州癸巳習水軍於梁山南齊武帝永明二年八月幸𤣥武湖講武四月正月幸宣武堂講武詔曰今親閱六師少長有禮領馭羣帥可量班賜六年九月幸琅邪城講武習水歩軍九年九月幸琅邪城講武觀者傾都普頒酒肉十年十月幸𤣥武湖講武梁武帝大同四年九月閱武于樂遊苑陳文帝天嘉元年八月幸正陽堂閱武宣帝大建十一年八月丁卯幸大壯觀大閲武命都督任忠領歩騎十萬陣於𤣥武湖都督陳景領樓艦五百出于𤓰歩江帝登𤣥武門歡宴羣臣以觀之因幸樂遊苑仍重幸大壯觀集衆軍振旅而還戊寅還宫後主至德四年九月甲午幸𤣥武湖肄樓艦閱武北齊文宣帝受魏禪多所創革六坊之内從者更加簡練每一人必當百人任其臨陣必死然後取之謂之百保鮮卑又簡華人之勇力絶倫者謂之勇士以備邊要梁太祖開平元年十月幸繁臺因農隙以講武事二年三月幸澤州甲申登東北隅逍遥樓蒐閱騎乗旌甲滿野七月幸髙僧臺閱禁衞六軍十一月出開明門登髙僧䑓閱兵三年三月幸右軍舊杏園講武十一月幸榆林坡閲兵教諸部馬歩兵四年正月帝出師子門至榆林坡下閲教二月帝出師子門幸榆林東北坡教諸軍兵事十月幸開化門大閱軍實十二月親閱禁軍命格鬬于教馬亭乾化元年八月庚申幸保寜殿閱天興控鶴兵事軍使將校各有賜丙子閱四畨将軍及親衛兵士於天津橋南至龍門廣化寺戊寅幸興安鞠塲大教閱帝自指麾無不踊抃坐作進退聲振宫掖十月帝北征駐蹕相州癸丑閱武於州闉之南樓丙子帝御城東教塲閱兵諸軍都指揮北面招討使太尉楊師厚總領鐵馬歩甲十萬廣亘十數里陳焉士卒之雄鋭部隊之嚴肅旌旗之雜遝戈甲之照曜屹若山嶽勢動天地帝甚恱焉即命丞相洎文武從臣列侍賜食逮晩方歸二年三月甲午幸貝州之東闉閱武乙未帝復幸東闉閱騎軍册府元龜卷二百十四
