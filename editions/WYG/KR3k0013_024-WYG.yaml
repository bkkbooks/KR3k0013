body:
  text: 册府元龜卷二十四宋王欽若等撰帝王部符瑞第三唐髙祖武徳元年五月隴州獻嘉麥六月虞州獻嘉麥一莖六穗七月京師慶雲見八月永州獻嘉禾異畝同頴九月益州上言景雲見十一月藍田玉山南嶺有樹連理十二月麟州獻芝草一株紫莖黄蓋是年新豐鸚鵡谷水清代傳云此水清天下平開皇之初暫清尋濁至是復清二年正月寜州獻白雉壬子麟州獻白鹿二月涪州上言李樹連理閏二月沁州上言慶雲見又渝州言甘露降三月安昌縣言太行山聖人崖響云唐國興治萬年四月有獻李樹連理盤屈如龍六月澤州言騶虞見七月益州獻嘉禾一莖六穗九月合州言慶雲見又梓州言景雲見十月河州言慶雲見三年二月鄯州言一角獸見鹿身五色牛尾馬蹄三月丼露降於華隂又丼露降於御史臺五月郇州獻瑞石有文曰天下萬年七月靈州言白龍見商州言白狼見鄯州言麟見四年二月白狐見𤣥武門緜州言丼露降肅州獻嘉禾一莖五頴四月慶州言慶雲見六月方州言慶雲見益州獻芝草如人狀亳州上言老子廟枯樹生枝葉五年正月代州言慶雲見豐州言騶虞見梁州言野蠶成繭百姓得而用之六年西沙州言丼露降彌漫一十五里益州言慶雲見管州言麟見七年陜州獲白石璽一紐章與傳國璽同仁州言騶虞見長安古城監渠水生藍色紅白而味丼狀如方印遼州獲𤣥兎萬年縣言甘露降九月丹州言河水清八年四月赤雀巢於殿門宴五品以上上頌者十餘人極歡而罷連州言甘露䧏徧於城郭九年正月西韓州獻芝草異莖同蓋二月蒲州言河水清四月甘露降於中華殿之桐樹凝泫如冰霰以示羣臣六月於納義門獲白雀一己卯雅州涇陽縣生嘉禾異畝同頴是月益州獻白鹿陜州言白狼見七月幽州慶雲見海州言鳳凰見於城上羣鳥數百隨之東北飛向蒼梧山徐州言慶雲見太宗以武徳九年八月即位是月丙午宋州言慶雲見辛未秦州景雲見嶲州言鳳凰見九月雒州赤雀見秦州言慶雲見乙未定州言景雲見莒州言鳳凰二見羣鳥隨之其聲若八音之奏辛酉利州言慶雲見壬戌林州獻禎石隱起成文曰聖主某大吉子孫五千嵗素質𤣥字篆𨽻相參西麟州言麟見十月沂州言騶虞見十二月鄭州言𤣥狐見貞觀元年閏三月甘露降於長安縣五月豫州言白狼見十月和州言鸞見二年三月宜州言白狼見六月長安縣獻嘉禾戊戌郭州言白狼見九月甘州獻白馬朱鬛十月安州言騶虞見三年四月甘露降於雍州五月癸亥龍見玉女泉乙丑幽州言麟見七月宣州言甘露降壬子申州言木連理十二月潞州獻嘉禾四年三月赤雀見於萬年縣五年二月嶲州慶雲見四月甘露降於萬年縣六年四月楚州言騶虞見癸卯醴泉出丹霄殿之西命公卿以上示之因置酒於側賜帛各有差七年二月醴泉湧出於緜州之香溪痼疾者飲之多愈八年四月沂州言白鹿見九年閏四月衡州言騶虞見五月萬年縣獲白雀戊申和州言棠樹連理十月黎州言鳳凰見十一月瀛州獻白狼十二月京師蒼烏見揚州獻白雀是月獲麟於徳州十年二月白鹿見於九成宫之冷泉谷三月襄州言騶虞見八月雒州言鳳凰見十一年五月麟見京師之後苑九月醴泉出痼疾者服之皆愈十二年六月滁州言野蠶食槲菜成繭大如柰凡六千五百七十碩九月楚州野蠶成繭徧於山谷濠州廬州獻野繭十月隰州言青龍見營州獻𤣥狐十三年正月濟州獻白鹿三月吉辰廐産白馬朱􅎸八月幽州獻嘉禾一莖九穗十四年二月陜州言河水變清司空無忌等詣闕上表曰臣聞崑崙載極道𤣥液以周天積石流源委蒼波而括地俯作神州之紀仰􅈾上帝之官水徳靈長斯其謂矣故能道符千戴位長百川瑞馬開圖發榮光於逺代應龍闢壌致宅土於遐年自此以還寂寥難俟天之祚聖復在於兹伏惟皇帝陛下則哲承基窮神闡化功緜㝢外徳耀瀛表文教蔚乎三五至道格乎地天是以禎凝藪澤慶溢風煙丹井輝奇青丘表異嘉苖合頴入豐膳以鳴鐘天駟攝雲播頌聲於綴兆西鶼南雉之貴日至月書連珠湧醴之徵雲飛霧集宜其展事嬴里仰告成功出豫介丘方騰茂實猶且宵衣旰食若有追而不逮對越嘉祉乃固辭而弗居遂使萬土韜華三神鞅望西皇佇詔申以徳水之祥東岳希封朂以清河之貺伏見陜州刺史房仁裕狀稱所管界内二百餘里正月元日黄河載清謹案易乾鑿度曰聖人受命河水清京房飛候曰河水清天下太平繇是納渭含涇混流同潔凌門泑澤别派俱清馬頰馳波詳觀若鏡龍門激箭囘眺飛空拍天之典煥然馮夷之都可見千尋郎徹俯映𤣥珠一曲澄鮮遥觀紫貝盡河宗之奥秘洞水府之仙靈豈非天鑑詳明不愛其道神心昭著有感斯通何幽顯合符人祗交際理均形見若斯之效歟臣等沐道醉心觀洋駭目披圖逖聽曠古無聞實慶生涯親承旦暮詔答曰嘉瑞爰降必資至徳大河効祉寔為希世顧惟寡昧但增慙惕乃天地表祥宗社垂祐欲使四海隆平八荒禔福王公卿士内外庶僚宜勉修正道以副靈貺焉三月秦州言河清七月白龍見於富平九月杭州言青龍見十五年二月開州言白龍見三月肅州言所部川原遍生芝草四月慶州言騶虞見冀州獻白狼五月癸未廬山府獻白鹿乙酉安禮門御榻産芝草五莖六月滁州言青龍見庚子商州言慶雲見七月洪州獻𤣥珪滄州言青龍見丁亥靈州言景雲見八月嘉州撫州各言慶雲見衡州言白鹿見九月滄州言龍見十一月幽州言五色雲見十六年正月宣州言慶雲見七月朔鄜州言白龍見溫州各言景雲見八月申州獻白雉九月金州言青龍見十月滑州獻白狼十一月箕州言景雲見湖州言慶雲見十二月宋州言青龍見十七年三月杭州言木連理二十四株有植黎二木合為一體有雄雉飛集東宮顯徳殿前太宗問羣臣曰頃來頻有雉集是何祥也諫議大夫禇遂良曰昔秦文時有童子化為雉雌者鳴於陳倉雄者鳴於南陽童子言曰得雄者王得雌者覇文公遂以為寳鷄祠漢光武得雄遂起南陽而有四海陛下舊封秦王故雄雉見於秦地既古來將為祥貺所以彰表眀徳太宗曰立身之道不可無學遂良所對深為可重五月雍州獻三足烏己未湖州言甘露降潤州言慶雲見華平出於𤣥武門之池懐州獻白狼湖州言慶雲見閏六月柳州言慶雲見丹州獻白鹿七月鄜州言景雲見辛卯常州言青龍見八月凉州言昌松縣鴻池谷有石青質白章為文曰髙皇海出多子李九王八千太平天子李世民王千年太子李治書燕山人士樂大國主尚汪諤奬文仁道千古天王五王六王七王十王鳳毛才子七佛八菩薩及上果佛佛田天子文武貞觀昌大聖延四方上下萬里忠者仙戈八為善九月魏州言慶雲見皇太子寢室産紫芝二十四莖竝為龍興鳳翥之形十一月并永滁州景雲見鄭州河水清懷州河水清永州言慶雲見廓州獻白狐十八年正月嘉州言青龍見台州言甘露降嶲州言慶雲見四月豫州言白龍見五月鄆州獻白狼六月辛亥鄭王府獻白狐瀛州言慶雲見七月㑹州言青龍見朗州言青龍見壬午滁州言景雲見八月商宋蘭鄧雒五州言景雲見曹雒二州言景雲見趙州獻白鹿九月汝州言青龍見十月潞州言慶雲見山南獻木連理交錯玲瓏有同羅目一丈之餘并枝者二十餘所十一月湖州言慶雲見十九年二月岳州獻毛龜二滁州言騶虞見十月老人星見十一月費州言慶雲見渠州言青龍見二十年正月汝州言甘露降二月潮州言慶雲見戊午許州獲白狼二月徳州言景雲見鄆州言一角獸見丙戌冀州景雲見四月房州言赤雀見五月襄州言慶雲見丙申澤州言甘露降七月安州言白龍及慶雲見榖州言景雲見八月老人星見九月澤州言白鹿見十月亳州言甘露降十一月雍州言甘樹一株有十八處連理李樹生芝英赤紫莖光色鮮麗陜州言青石理成文曰李君王三字汾州言青龍白龍見白龍吐物初在空中有光如火至地䧟入二尺掘之則𤣥金之形團斜廣髙六七寸疊州言五色雲見兖州言青龍見二十一年四月兖州鸞見易州言慶雲見六月始州言景雲見淄州言鳳凰見壬申亳宋二州各言慶雲見白龍見於鄆州懷荆二州言景雲見辛酉趙州言慶雲見七月懷襄同鳳瀘宋亳蓬綏等州言慶雲見鄆州言白龍見八月綏州言慶雲見九月崖州言白龍見岷州言慶雲見老人星見開州言景雲見十月南代州騶虞見戊戌綏州言景雲見二十二年正月玉華宫李樹連理隔濶合枝二月懷州河水清原州言景雲見六月洮州言白龍見循州言景雲見七月襄州言慶雲屢見定襄都督府言慶雲見八月昭州洪州言慶雲見九月晉州言慶雲見巴州沂州皆言慶雲見遂州涪水中獲古鼎受五石三㪷旁有銘刻取初風雨晦冥響若洪鐘十二月絳綿代潞四州並言慶雲見閏十二月郎州言慶雲見二十二年三月代州言慶雲見四月壬申靈州言河水清髙宗永徽五年六月濟州言黄河清一十六里皎然澄徹是嵗大稔雒州米斛至兩錢半粳米斗至十一文顯慶元年二月岐州獻一角獸五月岐州五龍見於皇后泉龍朔元年二月益緜等五州皆言龍見於是改元六月兖州青龍三十九見三年十二月詔以絳州麟見於介山含元殿前琅臺閣内竝覩麟趾改來年正月為麟徳元年在京及雍州諸縣見繫囚徒各降一等杖罪以下竝免之上元三年十一月陳州上言鳳凰見宛丘縣睿宗唐隆元年六月甲辰即位大赦天下是日慶雲見於東方丙午揚州上言慶雲白雉見七月己巳册𤣥宗為皇太子是日有景雲之慶改元為景雲元年景雲二年六月雒州上言兩岐麥八月以高祖舊宅有柿樹天授中已經枯死至是重生因而大赦天下十月寜州嘉禾異畝同頴江州上言神泉湧十二月光州上言李樹連理三年正月有事於南郊是日佳氣四塞太極元年五月戊寅睿宗有事於北郊是日東南有紫氣扶日上延和元年六月凉州上言赤雀見𤣥宗先天二年八月江州獻靈龜六眸腹下有𤣥文象卦文懷州上言有嘉禾四穗十月有事於太廟是日慶雲見開元元年十二月有麟見於峽州逺安縣之鬼谷仙洞二年正月丙寅凉州獻朱騣尾白馬庚午原州獻肉角羊八月太子賔客薛謙光獻東都九鼎銘其豫州鼎銘武后所製文曰羲農首出軒昊膺期唐虞繼踵湯禹乗時天下光宅域内雍熙上𤣥降祉方建隆基宰相姚崇盧懷慎等奏曰聖人啟運休兆必彰故化馬為龍預流謡頌秀為天子早著㝠符臣等今見薛謙光所獻東都鼎銘大聖天后所製其文云上𤣥降祉方建隆基豫州處天地之中所以逺包四海銘文獨聖后所製固必先感二儀靈慶昭彰曠絶今古臣等忝陪近侍喜邁常情請宣付史官并頒示内外許之七年閏七月虢州奏閿鄉縣桃林鄉醴泉湧出揚州奏揚子縣一角獸見八月老人星見其色黄明而大八年正月甘露降五月徳州奏平原縣麥一莖兩岐分秀八月老人星見十二月隰州慶雲見璧州甘露降齊州嘉禾生鄂州芝草生徐州獲白野鷄岐州獲白鷰進之九年二月汝州奏魯山縣之堯山有白鵲見於許昌縣之唐祠掘地得古銅鐏上又隠起䨇鯉篆書文曰宜子孫竝請宣付史官從之五月絳州奏正平太守兩縣瑞麥七莖兩穗一莖四穗十月洪州慶雲見十一月蘄州奏蘭溪縣芝草生十一年正月行幸北都紀功於太原府之南街有連理李樹連理甘棠生於太原縣二月祠后土於汾隂之脽上太史奏榮光出河休氣四塞徘徊遶壇日揚其光有司奏脩壇掘地獲古銅鼎二其大者容一斗色皆青又獲古甎長九寸上有篆書千秋萬嵗及長樂未央字又有赤兎見於壇側十一月癸酉日長至太史奏曰平明隂雲祁寒及其日出有雲迎日又有祥風至湏臾日出有黄白冠及日南有珥臣謹按黄帝占云冬至之日隂雲祁寒來歳大稔人安五榖豐熟又曰風不及地和緩而來謂之祥風王者徳至於天則祥風起日冠且珥人主有嘉並太平之嘉應臣請宣付所司許之十二年五月溱州慶雲見太原獻異馬駒其耳如筒左右各一十六肋肉尾無毛六月丙申光州五色雲見乙巳河南府之告成縣王利文家瑞麥生穗分岐一莖三秀利文上表曰陛下徃在藩邸扈從三陽在臣宅上休憇臣宅北坂之下陛下以為毬場自夏徂秋徃來遊賞其地因感聖氣今有瑞麥生苖或六穗分榮或一莖數秀方圓縱横不離場邊自非至徳濳通豈有瑞應若此詔賜利文絹三十疋遣之十月合州慶雲見閏十一月豫州言白麞見十三年五月甲申瑞麥生於河南府之夀安縣勸農使宇文融上表稱賀甲午潞州白鹿見戊戌以親製西嶽碑示百寮有五色雲見於前己亥代州甘露降九月兖州奏白雀見十月丁卯太史奏白雀見壬申萬年人王慶築垣掘地獲寳鼎五獻之四鼎皆有銘銘曰垂作尊鼎萬福無疆子孫永寳丁丑白鵲見於行宫十一月丙戌封禪至泰山之下戊子有雄野鷄飛入齋宮馴而不去久之飛入仗衛忽不見邠王守禮等賀曰臣謹按舊典雌來者覇雄來者王又聖誕酉年鷄主於酉斯葢王道遐祚天命休禎請宣付史官以彰靈貺從之己丑日南至上備法駕登山至齋室其夕陰霧􅆭烈勁風四起裂幕折柱寒氣切骨上露立祈請仰天自誓曰某身有過請即降罰萬人無福亦請某為當罪應時風雨止天地清晏日氣和煦及升壇休氣四塞登歌奏樂有祥風自南而至絲竹之聲飄若天外及禪社首五色雲見日重輪及還山下之齋宮有慶雲隨馬祥風遶路時中書令張說等蹈舞拜賀帝曰朕以薄徳恭膺大寳雲物休洽皆是輔弼之力君臣相保勉副天心長如今日不敢矜怠說等又奏曰聖心誠懇昨夜齋居則息風反雨今朝封祀則天清日暖復有祥風助樂卿雲引燎靈迹盛事自古未聞陛下又思慎終如初長福萬姓天下幸甚十四年八月梓州言慶雲見通州言芝草生九月晉州神山縣𤣥元皇帝廟根子樹兩枝連理合成一枝十月己巳帝至自汝州之溫湯時有五色鸚鵡能言育於宮中帝令左右試牽御衣鳥輙瞋目叱咤岐王文學能延景因獻鸚鵡篇以贊其事帝以鳥及延景詩示百寮尚書左丞相張說上表賀曰伏見大恩以靈異鸚鵡及能延景所述篇出示朝列臣按南海異物志有時樂鳥鳴皆曰天下太平有道則見臣驗其圖丹首紅臆朱冠綠翼與此鸚鵡無異而心聰性辨䕶主報恩故非常品凡禽實瑞經所謂樂鳥也延景雖識其事未正其名望編國史以彰聖瑞許之十二月丙午越州言李樹連理癸丑邢州甲州各言慶雲見十五年四月彭州言白兎見八月壬寅海州白麞見丁丑資州言慶雲見閏九月億歳殿生芝草一莖十月汝州言嘉禾生簡州言慶雲見十六年三月京兆府三原縣浪井出七月慶雲見於仙州葉縣十一月日南至帝御含元殿受朝賀太史奏黄雲扶日請付所司從之十七年五月庚寅有靈芝草産於太廟第九室殿柱甲寅有赤雀見於冀州一雄一雌六月有浪井出梓州十月睦州獻竹實十八年四月辛酉夀州獻白雀甲午嘉州奏楠木生連理枝廣州獻紅鸚鵡五月辛丑徐州奏慶雲見甲辰陜州奏靈芝産六月甲申沁州奏月抱瑞彩揚光五色乙酉鄂州奏景雲見十九年二月癸未皇太子鴻等奏曰昨正月二十七日伏見陛下於興慶宮親耕三百餘歩旣而青光紫氣覆地四月已卯揚州奏穭生稻二百一十頃再熟稻一千八百頃其粒與常稻無異壬辰河南府登封縣唐村李嗣谷當陽山南面石文舊有帝字新生上字識者以為聖明之應河南尹孟溫禮奏賀六月癸未有浪井出於卭州之龍興觀之平地泛溢五色相煇浮彩彪炳壬申芝草生於京城之勝業寺一本七莖心黄外紫八月辛巳上降誕之日有黄雲三道於西方九月乙未冀州任丘縣孝悌鄉嘉禾生庚申􅄔州永康縣嘉禾生一莖五穗神羊産於京兆之興平縣二十年三月有一角獸肉角當頂白毛上捧識者以為獬豸二十一年二月衢州獲魚有銘獻之侍中裴光庭等奉賀六月庚子眉州獻寳鼎重七百斤無耳足有篆文數字時渝州刺史叚懷本奏此鼎到陳州界之對溪驛雲霧暗合有白虹逼鼎臣恐淪失不勝驚懼請至合州取陸路至京許之癸丑蓬州奏枯樹上生李枝結實絳州奏龍興觀池同心蓮一莖八月癸亥沂州産紫芝三莖是夜五更二籌後南方丙位老人星見其色黄白太史奏曰臣謹按春秋文曜鈎云王者安静則老人星臨其國主壽昌萬人安常以秋分節候之南郊今應期而見請付所司從之二十二年五月河州慶雲見八月幽州奏千秋節日有慶雲見於夷軍又軒轅皇帝廟中古井湧浪泛溢又安次縣百姓家産連理樹及大麥一夲一十八莖穗秀兩岐十月尚書左丞相蕭嵩率百寮奏曰伏見所司奏今年祥瑞祥風起日抱戴嘉禾秀芝草生甘露降醴泉湧木連理瓜同蒂竹再生李成實馴鳩𤣥鶴慈烏鶺鴒寳鼎魚銘錢刀甎字等二十有一事臣聞惟徳感神惟祥祚聖有欲之而莫致或不召而自彰葢所謂天之輔人福之先見者也伏惟開元神武皇帝陛下狥齊敦敏欽明光宅三靈以泰百度惟貞故感應日聞珍符歳積葢祥風者昭乎號令抱戴者表以納忠嘉禾主於同文芝草明於敬老甘露洒神靈之液醴泉發徳澤之滋草木秀其地靈羽毛呈其天瑞其餘山川異氣器用殊姿爭自効靈不可勝紀斯並𤣥天幽贊黄靈合徳非大聖不能降其祥非太平不能當其應請宣付史官傳於後代上手詔報曰䖍奉宗社昭事天地幸蒙垂祐降此禎祥豈自厥中以彰其外歸之於朕是用多慚宣付史官依卿所請二十三年二月丁未緜州白鹿見己酉安州慶雲見五月丁卯藍州有浪井出及醴泉滂湧癸未晉州慶雲見六月丙戌文州慶雲見壬子京兆富平縣瑞大麥生一莖五穂華州下邽縣瑞大麥生一莖三穂京畿採訪使御史中丞盧奐奏賀八月幽州長史張守珪奏榆闗内有􅀈蝗蟲食田稼蔓延入平州界俄頃有羣雀來食此蟲一日食盡平州稼穡無有傷者九月乙丑楚州慶雲見十月沂州芝草生一莖九寸十岐乙未京兆府奏盩厔縣嘉禾生戊申揚州奏獲毛龜其色青庚戌朔州奏甘露降嘉禾生十一月楚州陵州㑹州並言慶雲見沂州宻州皆奏芝草生十二月龍池聖徳頌石自鳴其音清逺有如鐘聲百官等上表稱賀二十四年三月獲瑞獸首耳形類虎尾長於身有豹文能食虎七月辛巳沂州慶雲見瑞麥生壬午台州鄆州並言慶雲見乙酉荆州萬州並言慶雲見八月戊申常州有神龜見緑毛黄甲庚戌老人星見黄色明静而大太史奏曰臣謹按春秋文耀鉤王者安静則老人星見孫氏應瑞圖云王者承天則老人星見臨其國又黄帝占云老人一名夀星色黄明大則主夀昌天下多賢士伏惟陛下以千秋節日祀於星壇而祭期將臨美應先至知厯數之方永嘉萬夀之昌期請付史官以光典策許之二十五年四月丁卯幽州慶雲見五月丁丑白鵲見戊寅河清八月丁未千秋節宴羣臣於勤政樓下太史奏曰今日卯時有祥雲出東方及其樂作非煙燭於西北己午之時日有抱戴伏以陛下聖厯方永福履無疆洊臻嘉瑞之符載洽繞樞之日臣等不勝忭躍請宣付史館許之十月庚申宰臣李林甫牛仙客祭南北郊有瑞氣縈壇祥風拂地太史奏今日陛下䖍報豐稔昭祭神祗臣謹候天地清謐星辰明朗初祭則樽爼適陳祥風拂地既奠之後瑞氣縈壇其風則暢和緩之候其氣乃蓄龍鳳之色臣謹按王者徳至於天則祥風起又堯沈璧於河休氣四塞伏惟陛下一徳馭物而天祥薦祉盡皇王之靈貺躋蒼生於仁夀請宣付所司編入史冊許之十一月青州奏日光五色十二月泗州奏日抱戴二十七年七月己卯蒲州刺史韓朝宗奏新置靈貞觀有慶雲見連理樹生壬午河西隴右節度使蕭炤討吐蕃大破之有慶雲見於陣前白兎舞於營中請編史册許之二十八年陜州青州皆言慶雲見四月庚辰有慈烏巢於紫宸殿之栱侍中牛仙客中書令李林甫上表賀曰臣等伏因侍奉之際天恩令臣升殿觀此烏巢陛下孝弟之至通於神明仁慈所育豈獨黎庶故得上𤣥協應靈烏呈瑞翺翔不離於廷際栖集必歸於軒檻雖人俗所有但止於園林今感聖而來乃巢於殿栱依人無懼戀主愈馴博考圖籍未之有也臣等幸忝樞近親覩休祥望頒示中外以彰靈感手詔報曰所聞不如所見故引卿等觀之頒示寰中俯依來請辛巳又有慈烏巢於宣政殿之栱仙客林甫又上表賀曰陛下孝友因心慈仁被物故得上帝儲祉靈烏發祥髙棟重櫨共瞻爰止前軒内殿皆覩來巢視之彌馴逼之不懼休祐重沓而交應徵求古今而未聞臣等何人屢觀嘉瑞望與前狀同宣中外克紀禎符手詔報曰兩殿巢禽其義一也但有慙徳深謝仁慈頒示四方隨卿所請二十九年正月亳州刺史鄭愿奏𤣥元皇帝廟中之井涌氣成雲五色相暎三月甲申滑州刺史李邕獻馬一匹表云其馬肉鬃鱗臆嘶不類馬聲日三百里邕任淄青刺史日遇一老翁云聖主將得龍馬以應太平邕遂於青州馬㑹思家獲而獻之己丑亳州奏老君廟九井先涸自奉詔増脩觀宇九泉皆湧及樹已枯復榮四月甲寅深州奏連理甘棠樹生於陸澤縣甲戌温州奏日抱戴揚光五色五月戊午有白雀白烏見於原州之平原戊寅有慶雲見於亳州真源縣之𤣥元皇帝廟兼有白鵲翔於廟門樓六月甘露降於司農寺八月命有司於興唐觀設齋自内迎𤣥元皇帝真容於觀宰臣已下百官悉行香有慶雲見天寳元年正月戊申安西都䕶田仁畹於于闐東王河獲瑞玉龜一畫以獻癸丑太史上言今旦卯時日有紅碧黄氣數見及紫赤雲氣潤澤鮮明在日上謹按瑞應圖名曰慶雲太平之應請編入史冊許之六月壬辰信都瑞麥生臨州郡人李嘉裔所居柱上芝草生形類尊容屢陳光彩太守張景佚㧞柱獻之乙未隴右節度皇甫惟明奏龍支縣人厙狄孝義有馬生龍駒經九旬有九日身有鱗而不生毛臣就簡視時有慶雲五色遥覆馬上久而不散伏望宣付史官以光實録從之睢陽郡嘉麥生一莖八十一穗八月乙酉老人星見二年三月南郡奏所部紫極宫有慶雲見三載三月癸酉興慶宫合鍊院芝草生一本六莖丙子武威郡上言番禾縣之天寳山有醴泉湧出嶺石化為瑞麵逺近貧乏者取以給食五月京兆尹奏所部芝草生四載八月戊子有斑鹿産白鹿於苑中獻之請宣付史舘上曰宮苑之内屢薦嘉祥今又縞質霜毛變林虞之獸族殊姿馴性實雲駕之龍媒允謂休徵用為慰也所請者依癸巳京兆之新豐嘉禾生或九穗六穗九月河南府登封縣嘉禾生一本十二穗五載五月乙卯河東郡太守李知柔奏乗泉縣潘水修功徳處有白魚引舟五色雲起望宣付史館從之丙戌鄱陽郡上言甘露降於所部紫極宮之松樹綘郡上言姑射山修功徳處有慶雲捧日七月汝隂郡上言有嘉麥生一莖兩岐七載三月有玉芝生於大同殿之柱礎一本兩莖神光炤於殿上命文武百寮入觀之八載六月大同殿又産芝一莖九載二月甲戌獻陵昭陵乾陵定陵橋陵等五陵栢樹盡垂甘露壬寅華隂郡奏白鶴見於西嶽五福峯甘露降大羅峯之醮壇白鹿見於大羅東南峯駕鶴嶺衛叔卿之得仙處請付史館從之七載七月有鹿産白麛於閑廐之試馬殿八月癸丑黔中郡紫極宫慶雲見甲寅上雒陽慶雲見丁巳丹陽郡茅山鍊丹院生芝草一莖庚午蘄春郡之天長觀聖容玉石蓮花座上生紫芝一本七莖九月壬午夜太史奏夀星見於丙方大明色黄十月乙丑御朝元閣有慶雲見上賦詩羣臣畢和癸酉丹陽郡茅山慶雲見白鶴羣飛十一月長至太史奏北方有黑雲氣四方俱有薄黄雲佳氣濃厚又有黄氣扶日十二月餘杭郡慶雲見化樓閣勢兼有仙人形象乙卯彭城郡有慶雲見十四載三月南道觀察使源涓奏江陵郡古紀城東有紫氣成雲中有一人衣白衣乗雲氣向上其時安南招討使康令謙及同行軍將等同見臣謹畫圖奉獻伏望宣示中外編諸史冊從之四月劒南道獲白兎一獻之八月癸巳老人星見己亥中書省五色雲見庚子樂安郡上言嘉禾及獲白鵲白雀壬寅京兆府奏嘉禾生而獻之癸卯東平太守嗣吳王祗奏所部夀張順昌兩縣鹹榖穭生丙辰蜀郡奏慶雲九見十月盧江郡人王恭家有李樹連理結紫實癸酉幸華清宫有石産玉芝宰相楊國忠請宣付示朝廷編諸史冊從之十五載六月𤣥宗幸蜀七月壬戌至益昌郡濟州於吉伯渡有䨇白魚夾御舟而躍識者謂之兩雙飛龍焉册府元龜卷二十四
