body:
  text: 册府元龜卷五百六十七宋王欽若等撰掌禮部作樂第三後魏道武天興元年十一月詔尚書吏部郎中劉淵定律吕協音樂追尊皇曾祖皇祖皇考樂用八佾舞皇始舞皇始舞太祖所作明開太始祖之業也後更制皇帝入廟門奏王夏太祝迎神于廟門奏迎神曲猶古降神之樂乾豆上奏登歌猶古清廟之樂曲終下奏神祚嘉神明之饗也皇帝行禮七廟奏陛歩以為行止之節皇帝出門奏摠章次奏八裔次奏送神曲又舊禮孟秋祀天西郊兆壇西備列金石樂具皇帝入兆内行禮咸奏舞八佾之舞孟夏有事於東廟用樂畧與西郊同太祖初冬至祀天于南郊圓丘樂用皇矣奏雲和之舞事訖奏維皇將燎夏至祭地於北郊方澤樂用天祚奏大武之舞正月上日饗羣臣宣布政教僃列宫懸正樂兼奏燕趙秦吳之音五方殊俗之曲四時饗㑹亦用焉凡樂者樂其所自生禮不忘其本掖庭中歌真人代歌上敘祖宗開基所由下及君臣廢興之跡凡一百五十章昏晨歌之時與絲竹合奏郊廟宴饗亦用之六年冬詔太樂摠章鼔吹増修雜戲造五兵角抵麒麟鳳凰仙人長蛇白象白虎及諸畏獸魚龍辟邪鹿馬仙車髙絙百尺長趫緣橦跳丸五案以僃百戲大饗設之於殿庭如漢晉之舊明元時撰合大曲更為鐘鼓之節大武時破赫連昌獲古雅樂及平涼州得其伶人器服竝擇而存之後通西域又以帨鞶鼓舞設於樂署孝文太和初垂心雅古務正音聲時司樂上書樂章有闕求集中秘羣官議定其事幷訪吏民有能體解古樂者與之修廣器數甄立名品以諧八音詔可雖經衆議於時率無洞曉聲律者樂部不能立其事彌缺然方樂之制四夷歌舞稍増列于太樂金石羽旄之飾為壯麗於往時矣五年文明太后及帝竝為歌章誡勸上下皆宣之管絃七年秋中書監髙允奏樂府歌詞陳國家王業符瑞及祖宗徳美又隨時歌謠不準古舊辨雅鄭也十一年春文明太后令曰先王作樂所以和風改俗非雅曲正聲不宜庭奏可集新舊樂章參採音律除去新聲不典之曲俾増鐘縣鏗鏘之韻十五年冬詔曰樂者動天地感神祇調隂陽通人鬼故能關山川之風以播徳無外繇此言之治用大矣逮乎末俗陵遲正聲頓廢多好鄭衞之音以悅耳目故使樂音散缺伶官失守今方釐革時弊稽古復禮庶令樂正雅頌各得其宜今置樂官實須任職不得仍令濫吹也遂簡置焉十六年春詔曰禮樂之道自古所先故聖王作樂以和中制禮以防淫音聲之用其致逺矣所以通感人神移風易俗至乃簫韶九奏鳯凰來儀擊石拊石百獸率舞有周之季斯道亡缺故夫子忘味於聞韶正樂於反魯逮漢魏之間樂章復闕然博採音韻粗有篇條自魏室之興太祖之世尊崇古式舊典無墜但干戈仍用文教未淳故令司樂失治定之雅音習不典之繁曲比太樂奏其職司永與中書參議覽其所請愧感兼懐然心喪在躬未忍聞此但禮樂事大乃為化之本自非通博之才莫能措意中書監髙閭器識詳富志量明允毎聞陳奏樂典頗體音律可令與太樂詳採古今以備兹典其内有堪此用者任其參議也宣武正始元年秋詔曰太樂令公孫崇更調金石爕理音律准其書二卷并表悉付尚書太和中中書監髙閭引給事中公孫崇昔考音律景明中崇乃言樂事至是成焉夫禮樂之事有國所重可依其請八座已下四門博士已上此月下旬集太樂署考論同異必博採古今以成一代之典也十月尚書李崇奏前被㫖勅以兼太樂令公孫崇更調金石并其書表付外考試登依㫖勅以去八月初詣署集議但六樂該深五音妙逺至如仲尼淵識故將忘味吳札善聽方可論辨自斯已降莫有詳之今既草剙悉不窮解雖微有詰論畧無究悉方欲商𣙜淫濫作範將來寧容聊爾一試便垂竹帛今請依前所詔之官并博聞通學之士更申一集考其中否研窮音律辨括權衡若可施用别以聞請制可時亦未能考定也四年春公孫崇復表言伏惟皇魏龍躍鳳舉配天光宅世祖太武皇帝革靜荒嵎廓清宇内兇醜尚繁戎軒仍動制禮作樂致有闕如髙祖孝文皇帝徳鍾後仁之期道協先天之日顧雲門以興言感簫韶而忘味以故中書監髙閭博識明敏文思優洽紹蹤成均實允所寄乃命閭廣程儒林究論古樂依據六經參諸國志錯綜隂陽以制聲律鐘石管絃畧以充具八音聲韻事别粗舉値遷邑崧瀍未獲周密五權五量竟不能就自爾迄今率多禠落金石虚懸宫商未㑹伏惟陛下至聖承天纂戎鴻烈以金石未協詔臣緝理謹即廣捜秬黍選其中形又採梁山之竹更裁律吕制磬造鐘依律竝就但權量差謬其來久矣頃蒙付并州民王顯達所獻古銅權稽之古範考以今制鐘律准度與權參合昔造猶新始剙若舊異世同符竝合規矩樂府先正聲有王夏肆夏登歌鹿鳴之屬六十餘韻又有始皇五行酌舞太祖初興制始皇之舞復有吳夷東夷西戎之舞樂府之内有此七舞太和初郊廟但用文始五行始皇三舞而已竊惟周之文武頌聲不同漢之祖宗廟樂又别伏惟皇魏四祖三宗道邁隆周功超鴻漢頌聲廟樂宜有表章或文或武以旌功徳自非懿望茂親雅量淵逺博識洽聞者其孰能識得失衞軍將軍尚書右僕射臣髙肇器度淹雅神賞入微徽讚大猷聲光海内宜委之監就以成皇代典謨之美昔晉中書監荀勗前代名賢受命成均委以樂務崇述舊章儀刑古典事光前載豈逺乎哉又先帝明詔内外儒林亦任髙閭申請今之所須求依前比世宗知肇非才詔曰王者功成治定制禮樂以宣風化所以通明神理萬品贊隂陽光功徳治之大本所宜詳之可令太常卿劉芳亦與主之永平二年秋尚書令髙肇尚書僕射清河王懌等奏言案太樂令孫崇所造八音之器并五度五量太常卿劉芳及朝之儒學執諸經傳考辨合否尺寸度數悉與周禮不同問其所以稱必依經文聲則不協以情増減殊無凖據竊惟樂者皇朝治定之盛事光贊祖宗之茂功垂之後王不刋之制宜憲章先聖詳依經史且二漢魏晉歴諸儒哲未聞器度依經而聲調差謬臣等參議使臣芳准依周禮更造樂器事訖之後集議竝呈從其善者詔可芳上書言調樂諧音本非所曉且國之大事亦不可決於數人今請更集朝彦衆辨是非明取典據資決元凱然後營制肇及尚書邢巒等奏許詔可於是芳主修營時揚州民張陽子義陽民倪鳳鳴陳孝孫戴當千吳殿陳文顯陳成子等七人頗解雅樂正聲八佾文武二舞鐘磬管絃登歌聲調芳皆請令教習參取是非三年冬太常卿劉芳上言觀古帝王罔不據功象徳而制舞名及諸樂章今欲教文武二舞施之郊廟請參制二舞之名竊觀漢魏以來鼓吹之曲亦不相縁今亦須制新曲以揚皇家之徳美詔芳與侍中崔光郭祚黄門游肇孫惠蔚等四人參定舞名并鼓吹諸曲芳又上言臣聞樂者感物移風調民變俗先王所以教化黎元湯武所以改章功徳晉氏失政中原紛蕩劉石以一時姦雄跋扈魏趙苻姚以部帥强豪趦趄關輔於是禮壊樂隳廢而莫理大魏應期啟運奄有萬方雖日不暇給嘗以禮樂為先古樂虧闕詢求靡所故頃年以來剙造非一考之經史毎乖典制遂使鏗鏘之禮未備於郊廟鼓舞之式尚闕於庭陛臣忝官宗伯禮樂是司所以仰慙俯愧不遑寧處者矣自獻春被㫖賜令博採經傳更制金石并教文武二舞及登歌鼓吹諸曲今始校就謹依前勅延集公卿并一時儒彦討論終始莫之能異謹以申聞請與舊者參呈若臣等所營形合古制擊拊㑹節元日大饗則須陳列既嵗聿云暮三朝無逺請共本曹尚書及郎中部率呈試如蒙允許賜垂勅判詔曰舞可用新餘且仍舊鼓吹雜曲遂寢焉孝明神龜二年夏有司問陳仲儒樂事仲儒者自江南歸國頗行樂事請依京房立准以調八音有司問狀仲儒言前被符問京房准定六十之數後雖有存曉之者尠至熹平末張光等猶不能定絃之急緩聲之清濁仲儒受自何師出何典籍而云能曉但仲儒在江左之日頗愛琴文嘗覽司馬彪所撰續漢書見京房准術成數昞然而張光等不能定仲儒不量庸昧竊有意焉遂竭愚思鑽研甚久雖未能測其機妙至於聲韻頗有所得度量衡厯出自黄鍾雖造管察氣經史備有但氣有盈虚黍有巨細差之毫釐失之千里自非管應時候聲騐吉凶則是非之原諒亦難定此則非仲儒淺識所敢聞之至於准者本以代律取其分數調較樂器則宫商易辨若尺寸小長則六十宫商相與微濁若分數加短則六十徵羽類皆小清語其大本居然微異至於清濁相宣諧㑹歌管皆得應合雖積黍驗氣取聲之本清濁諧㑹亦須有方若閑准意則辨五音清濁之韻若善琴術則知五調調音之體參此二途以均樂器則自然應和不相奪倫如不練此必有乖謬案後漢順帝陽嘉二年冬十月行禮辟雍奏應鍾始復黄鍾作樂器隨月律是為十二之律必須次第為宫而商角徵羽以類從之尋調聲之體宫商宜濁徵羽用清若依公孫崇止以十二律聲而云還相為宫清濁悉足非唯未練五調調器之法至於五聲次第自是不足何者黄鍾為聲氣之元其管最長故以黄鍾為宫太簇為商林鍾為徵則宫徵相順若均之八音猶須錯採衆聲配成其美若以應鍾為宫大吕為商㽔賓為徵則徵濁而宫清雖有其韻不成音曲若以夷則為宫則十二律中唯得取中吕為徵其商角羽竝無其韻若以中吕為宫則十二律内全無所取何者中吕為十二之竅變律之􅈡依京房書中吕為宫乃以去滅為商執始為徵然後方韻而崇乃以中吕猶用林鍾為商黄鍾為徵何由可諧仲儒以調和樂器文飾五聲非唯不妙若如嚴嵩文子心賞清濁是則為難若依案見尺作准調緩急清濁可以意推耳但音聲精微史傳簡畧舊誌唯云准形如瑟十三絃隠間九尺以應黄鍾九寸調中一絃今與黄鍾相得案尺以求其聲遂不辨准須柱以成柱有髙下絃有精細餘十二絃復應若為致今覽者望風拱手又案房准九尺之内為一十七萬七千一百四十七分一尺之内為萬九千六百八十三分又復十之是為於准一寸之内亦為萬九千六百八十三分然則於准一分之内乘為二千分又為小分以辨强弱中間至促雖復離朱之明猶不能窮而分之雖然仲儒私曽考驗但前却中柱使入准常尺寸之内則相生之韻已自應合分數既微器宜精妙其准面平直須如停水其中絃一柱髙下須與二頭臨岳一等移柱上下之時不使離絃不得舉絃又中絃粗細與琴宫相類中絃須施軫如琴軫調聲令與黄鍾一管相合中絃下依數盡出六十律清濁之節其餘十二絃須施柱如箏又凡絃皆須豫張使臨時不動即於中絃案盡一周之聲度著十二絃上然復依相生之法以次運行取十二律之商徵商徵既定又依琴五調調聲之法以均樂器其瑟調以宫為主清調以商為主平調以徵為主五調各以一聲為主然後錯採衆聲以文飾之方如錦繡上來消息調准之方竝史文所畧出仲儒所思若事有乖此聲則不和仲儒尋准之分數精微如彼定絃緩急艱難若此而張光等親掌其事尚不知藏中有准既未識其器又焉能施絃也且燧人不師資而習火延夀不束脩以變律故云知之者欲教而無從心達者體知而無師茍有一毫所得皆闗心授豈必要經師受然後為竒哉但仲儒自省膚淺才非一足正可粗識音韻纔言其理致耳時尚書蕭寳夤奏言金石律吕制度調均中古以來尠或通曉仲儒或粗述書文頗有所説而學不師受云出已心又言舊器不任必須更造然後克諧上違成勅用舊之㫖輒持已心輕欲制作臣竊思量不合依許詔曰禮樂之事盖非常人所明可如所奏正光中侍中安豐王延明受詔監修金石博採古今樂事令其門生河間信都芳考辨之屬天下多難終無制造芳後乃撰延明所集樂説竝諸器物凖圖二十餘事而注之不得在樂署考正聲律也孝莊永安末以樂器殘缺命萬年鄉男元孚監儀注孚上表曰昔太和中中書監髙閭太樂令公孫崇修造金石數十年間乃奏功成時大集儒生考其得失太常卿劉芳請别營造久而方就復召公卿量推合否論者沸騰莫有適從登被㫖勅竝見使用往嵗大軍入雒戎馬交馳所有樂器亡失垂盡臣至太樂署問太樂令張乾龜等云承前以來置宫樂四箱栒簴六架東北架編黄鍾之磬十四雖器名黄鍾而聲實夷則考之音制不甚諧韻姑洗懸於東北太簇編於西北㽔賓列於西南竝皆像器差位調律不和又有儀鐘十四簴懸架􅈡初不叩擊今便刪廢以從正則臣今據周初鳧氏修廣之規磬氏倨句之法吹律求聲叩鐘求音損除繁雜討論實録依十二月為十二吕各准辰次當位懸設月聲既備隨用擊奏則㑹還相為宫之義又得律吕相生之體今量鐘磬之數各以十二架為定奏可于時搢紳之士咸往觀聽靡不咨嗟歎服而反太傅錄尚書長孫永業妙解聲律特復稱善前廢帝普泰中詔錄尚書長孫稚太常卿祖瑩營理金石出帝永熈二年春長孫稚等表曰臣聞安上治民莫善於禮移風易俗莫善於樂易曰先王以作樂崇徳殷薦上帝以配祖考書曰戛擊鳴球搏拊琴瑟以詠祖考來格詩言志律和聲敦敘九族平章百姓天神于焉降歆地祇可得而禮故樂以象徳舞以象功干戚所以比其形容金石所以發其歌頌薦之宗廟則靈祇饗其和用之朝廷則君臣協其志樂之時義大矣哉雖復沿革異時晦明殊位周因殷禮百世可知也太祖道武皇帝應圖受命光宅四海義合天經德符地緯九戎薦舉五禮未詳太宗世祖重輝累耀髙宗顯祖誕隆丕基而猶經營四方匪遑制作髙祖孝文皇帝承太平之緒纂無為之運帝圖既逺王度維新太和中命故中書監髙閭草剏古樂閭尋去世未就其功閭亡之後故太樂令公孫崇續修遺事十有餘載崇敷奏其功時太常卿劉芳以崇所作體制差舛不合古義請更修營被㫖聽許芳又釐綜久而申呈時故廣平王匡共相論駁各樹朋黨爭競紛綸竟無底定及孝昌已後世屬艱危内難孔殷外敵滋甚永安之季寇入京師燔燒樂庫所有之鐘悉畢其手其餘磬石咸為灰燼普泰元年臣等奉勅營造樂器責問太樂前來郊丘懸設之方宗廟施安之分故太樂令張乾龜答稱芳所造六格北箱黄鍾之均實是夷則之調其餘三箱宫商不和共用一笛施之前殿樂人尚存又有姑洗太簇二格用之後官簡其聲韻復是夷則於今尚在而芳一代碩儒斯文攸屬討論之日必應考古深有明證乾龜之辨恐是厯歳稍逺伶官失職芳久殂殁遺文殘毁無可遵訪臣等謹詳周禮分樂而序之凡樂圜鐘為宫黄鍾為角太簇為徵姑洗為羽若樂六變天神可得而禮函鐘為宫太簇為角姑洗為徵南吕為羽若樂八變地祇可得而禮黄鍾為宫大吕為角太簇為徵應鍾為羽若樂九變人鬼可得而禮至於布置不得相生之次兩均異宫並無商聲而同用一徵書曰於予擊石拊石百獸率舞八音克諧神人以和計五音不具則聲豈成文七律不備則理無和韻八音克諧莫曉其㫖聖道幽𤣥微言已絶漢魏以來未能作者案春秋魯昭公二十年晏子言於齊侯曰先王之齊五味和五聲以平其心成其政也聲亦如味一氣二體三類四物五聲六律七音八風九歌以相成服子慎注云黄鍾之均黄鍾為宫太簇為商姑洗為角林鍾為徵南吕為羽應鍾為變宫㽔賓為變徵一懸十九鐘十二懸二百二十八鐘八十四律即如此義乃可尋究今案周禮小胥之職樂懸之法鄭𤣥注云鐘磬徧懸各二八十六漢成帝時犍為郡於水濱得古磬十六枚獻呈漢以為瑞復依禮圖編懸十六去正始中徐州薛城送玉磬十六枚亦是一懸之器檢太樂所用鐘磬各一懸十四不知何據魏侍中繆襲云周禮以六律六同五聲八音六舞大合樂以致鬼神今之樂官徒知古有此制莫有明者又云樂制既亡漢成謂韶武武徳武始大均可以備四代之樂奏黄鍾舞文始以祀天地奏太簇舞大舞以祀五郊明堂奏姑洗舞武徳廵狩以祭四望山川奏㽔賓舞武始大均以祀宗廟祀圜丘方澤羣廟祫祭之時則可兼舞四代之樂漢亦有雲翹育命之舞罔識其源漢以祭天魏又以雲翹兼祀圓丘天郊育命兼祀方澤地郊今二舞久亡無復知者臣等謹依髙祖所制尺周官考工記鳬氏為鐘鉦鼓之分磬氏為磬倨句之法典禮五聲十二律還相為宫之義以律吕為之劑量奏請制度經紀營造依魏晉所用四箱宫懸鐘磬各十六懸塤箎箏筑聲韻區别盖理三稔于此始就五聲有節八音無爽笙鏞和合不相奪倫元日備設百僚允矚雖未極萬古之徽蹤實是一時之盛事竊唯古先哲王制禮作樂各有所稱黄帝有咸池之樂顓頊作承雲之舞大章大韶堯舜之異名大夏大濩禹湯之殊稱周言大武秦曰夀人及焚書之後舊章淪滅無可准據漢髙祖時叔孫通因秦樂人制宗廟樂迎神廟門奏嘉至皇帝入廟門奏永至登歌再終下奏休成之樂通所作也髙祖六年有昭容樂禮容樂又有房中祀樂髙祖時唐山夫人所作也孝惠二年使樂府令夏侯寛備其簫管更名安世樂髙祖廟奏武徳文始五行之舞孝文廟奏昭徳文始四時五行之舞孝武廟奏盛徳文始四時五行之舞武徳者髙祖四年作也以象天下樂已行武以除亂也文始舞者舜韶舞髙祖六年更名曰文始以示不襲也五行舞者本周舞秦始皇二十六年更名曰五行也四時舞者孝文所作以明天下之安和也孝景以武徳舞為昭徳孝宣以昭徳舞為盛徳光武廟奏大武諸帝廟並奏文始五行四時之舞及夘金不祀當塗勃興魏武廟樂改云韶武用虞之大韶周之大武摠號大均也曹失其鹿典午乘時晉氏之樂更名正徳自昔帝王莫不損益相沿徽號殊别者也而皇魏統天百三十載至於樂舞迄未立名非所以聿宣皇風章明功徳贊揚懋軌垂範無窮者矣案今后宫饗㑹及五郊之祭皆用兩懸之樂詳覽先誥大為紕繆古禮天子宫懸諸侯軒懸大夫判懸士特懸皇后禮數徳合王者名器所資豈同於大夫哉孝經言嚴父莫大於配天宗祀文王於明堂以配上帝即五精之帝也禮記王制庶羞不踰牲燕衣不踰祭服論語禹卑宫室盡力於溝洫惡衣服致美於黻冕何有殿庭之樂過於天地乎失禮之差逺於千里昔漢孝武帝東巡狩封禪還祀泰一於甘泉祭后土於汾隂皆盡用明其無減普泰元年前侍中臣孚及臣瑩等奏求造十二懸六懸裁訖續復營造尋蒙㫖判今六懸既成臣等思量鐘磬各四鈲鐏相從十六格宫懸已足今請更營二懸通前為八宫懸雨具矣一具備於太極一具列於顯揚若圓丘方澤上卒四時五郊社稷諸祀雖時日相礙用之無闕孔子曰周道四達禮樂交通傳曰魯有禘樂賓祭用之然則天地宗廟同樂之明證也其升斗權量當時未定請即刋校以為長准周存六代之樂雲門咸池韶夏濩武用於郊廟各有所施但世運遙緬隨時亡缺漢世唯有虞韶周武魏為武始咸熈錯綜風聲為一代之禮晉無改造易名正徳今聖朝樂舞未名舞人冠服無准稱之文武舞而已依魏景初三年以來衣服制其祭天地宗廟武舞執干戚著平冕黒介幘𤣥衣裳白領袖絳領袖中衣絳合幅袴袜黑韋鞮文舞執羽籥冠委貌其服同上其奏於廟廷武舞武弁赤介幘生絳袍單衣練領袖皂領袖中衣虎文畫合幅袴白布袜黑韋鞮文舞者進賢冠黒介幘生黄袍單衣白合幅袴服同上其魏晉相因承用不改古之神室方各别所故聲歌各異今之太廟連基接棟樂舞同奏於義得通自中原喪亂晉室播蕩永嘉以後舊章湮沒太武皇帝破平統萬得古雅樂一部正聲歌五十曲工伎相傳間有施用自髙祖遷居世宗晏駕内外多事禮物未周今日所有王夏肆夏之屬二十三曲猶得擊奏足以闡累聖之休風宣重光之盛美伏惟陛下仁格上皇義光下武道契𤣥機業隆寳祚思復典章留心軌物反堯舜之淳風復文武之境土飾宇宙之儀刑納生人於福地道徳熈泰樂載新聲天成地平於是乎在樂舞之名乞垂㫖判臣等以愚昧忝司問道呈御之日日伏増懼詔其樂名付尚書博議以聞其年夏集羣官議之瑩復議曰夫樂所以乘靈通化舞所以象物昭功金石播其風聲絲竹申其歌詠郊天祀地之道雖百世而可知奉神育民之理經千載而不昧是以皇帝作咸池之樂顓頊有承雲之舞堯為大章舜則大韶禹為大夏湯為大濩周曰大武秦曰夀人漢為大予魏名大均晉曰正徳雖三統遞變五運代降莫不述作相因徽號殊别者也皇魏道格三才化清四宇奕世戴徳累葉重光或以文教興邦或以武功平亂功成治定於是乎在及主上龍飛載造景命維新書軌自同典刑罔二覆載均於兩儀仁澤被於四海五聲有序八音克諧樂舞之名宜以詳定案周兼六代之樂聲律所施咸有次第滅學以後經禮散亡漢來所存二舞而已請以韶武為崇徳武舞為章烈摠名曰嘉成漢樂章云髙張四懸神來醼饗宗廟所設宫懸明矣計五郊天神尊於人鬼六宫隂極體同至尊理無減降宜皆用宫懸其舞人冠服制裁咸同舊式庶得光贊鴻功敷揚大業錄尚書事長孫稚已下六十人同議申奏詔曰王者功成作樂治定制禮以成為號良無間然又六代之舞皆以大為名今可准古為大成也凡音樂以舞為主故干戈羽籥禮文無别但依舊為文舞武舞而已餘如議初侍中崔光臨淮王彧竝為郊廟歌詞而迄不施用樂人傳習舊曲加以訛失了無章句後太樂令崔九龍言於太常卿祖瑩曰聲有七聲調有七調今之七律起於黄鍾終於仲吕今雜曲隨調舉之將五百曲恐諸曲名後致亡失今輒條記存之於樂府瑩依而正之九龍所録雅鄭或至於淫俗四夷但記其聲折而已不能知其本意又名多謬舛莫識所繇隨其淫正而取之樂署今見傳習其中復有所遺至於古雅尤多亡矣初髙祖討淮漢世宗定夀春收其聲伎江左所傳中原舊曲明君聖主公莫白鳩之屬及江南呉歌荆楚四聲摠謂清商於殿庭饗宴兼奏之其圓丘方澤上辛地祇五郊四時拜廟三元冬至社稷馬射藉田樂人之數各有差等焉北齊文宣受東魏禪未改舊章宫懸各設十二鎛鐘於其辰位四面竝設編鐘磬各一筍簴合十二架設建鼓於四隅郊廟㑹同用之其後將有剙革尚樂典御祖珽自言舊在雒下曉知舊樂上書曰魏氏來自雲朔肇有諸華樂操土風未移其俗至道武帝皇始元年破慕容寳於中山獲晉樂器不知採用皆委棄之天興初吏部郎鄧彦海奏上廟樂創製宫懸而鐘管不備樂章既闕雜以􅉫邏迴歌初用八佾作皇始之舞至太武帝平河西得沮渠蒙遜之伎賓嘉大禮皆雜用焉此聲所興盖苻堅之末吕光出平西域得西戎樂因又改變雜以秦聲所謂秦漢樂也至武帝永熈中錄尚書長孫承業共臣先人太常卿瑩等斟酌繕修戎華兼採至於鐘律煥然大備自古相襲損益可知今之創制請以為准珽因採魏安豐王延明及信都芳等所著樂説而定正聲始具宫懸之器仍雜西京之曲樂名廣成而舞不立號所謂雒陽舊樂者也孝昭帝皇建元年九月詔議定三祖樂十一月癸丑有司奏太祖獻武帝廟宜奏武徳之樂昭烈之舞太宗文襄皇帝廟宜奏文徳之樂宣政之舞顯祖文宣皇帝廟宜奏文政之樂光大之舞詔曰可武成帝時始定四郊宗廟之樂羣臣出入奏肆夏牲入出薦毛血竝奏昭夏迎送神及皇帝初獻亞禮五方上帝竝奏髙明之樂為覆燾之舞皇帝入壇門及升壇飲福酒就燎位還便殿竝奏皇夏以髙祖配饗奏武徳之樂為昭烈之舞祼地奏登歌其四時祭廟及禘祫皇六世祖司空五世祖吏部尚書髙祖秦州刺史曾祖太尉武貞公文穆皇帝諸神室竝奏始基之樂為恢祚之舞髙祖神武皇帝神室奏武德之樂為昭烈之舞文襄皇帝神室奏文德之樂為宣政之舞顯祖文宣皇帝神室奏文正之樂為光大之舞肅宗孝昭皇帝神室奏文明之樂為休德之舞其出入之儀同四郊之禮其鼔吹工十曲皆改古以敘功德第一漢朱鷺改名水徳謝言魏亡齊興也第二漢思悲翁改名出山東言神武帝戰廣阿創大業破爾朱兆也第三漢艾如張改名戰韓陵言神武滅四寇定京雒逺近賓服也第四漢上之回改名殄闗隴言神武遣侯莫陳悦誅賀抜岳定闗隴平河外漢北欵秦中附也第五漢雍離改名滅山胡言神武屠劉蠡升髙車懐殊俗蠕蠕來向化也第六漢戰城南改名立武定言神武立魏王天下既安而能遷於鄴也第七漢巫山髙改名戰芒山言神武斬周十萬之衆其軍將脱身走免也第八漢上陵改名擒蕭明言梁遣兄子貞陽侯來㓂彭城宋文襄帝遣太尉清河王岳一戰擒殄俘馘萬計也第九漢將進酒改名破侯景言文襄遣清河王岳摧殄侯景克復河南也第十漢君馬黄改名定汝潁言文襄遣清河王岳擒周大將軍王思政於長葛汝潁悉平也第十一漢芳樹改名尅淮南言文襄遣清河王岳南翦梁國獲其司徒陸法和尅壽春合肥鍾離淮隂盡取江北之地也第十二漢有所思改名嗣丕基言文宣帝統纘大業也第十三漢雉子班改名聖道洽言文宣克隆堂構無思不服也第十四漢聖人出改名受魏禪言文宣應天順人也第十五漢上邪改名平瀚海言蠕蠕盡部落入㓂武州之塞而文宣命將出征平殄北荒滅其國也第十六漢臨髙臺改名服江南言文宣道洽無外梁主蕭繹來附化也第十七漢逺如期改名刑罰中言孝昭帝舉直錯枉獄訟無怨也第十八漢石留行改名逺夷至言時主化霑海外西夷諸國遣使朝貢也第十九漢務成改名嘉瑞臻言世主應期河清龍見符瑞摠至也第二十漢𤣥雲改名禮樂成言時主功成化治制禮作樂也古又有黄雀釣竿二曲畧而不用竝議定其名被於鼔吹諸州鎮戍各給鼓吹樂人多少各以大小等級為差諸王為州皆給赤鼓赤角皇子則増給吳鼓長鳴角上州刺史皆給青鼓青角中州以下給諸鎮戍皆給黑鼓黑角樂器皆有衣竝同鼔色雜樂有西涼鼙舞清樂龜兹等然吹􅅇彈琵琶五絃及歌舞之伎自文襄以來皆所愛好後主亦能度曲親執樂器悦翫無倦倚絃而歌别採新聲為無愁曲音韻窈窕極於哀思使閹宦之輩齊唱和之曲終樂闕莫不殞涕雖行幸道路或時馬上奏之樂往哀來竟以亡國後周太祖為西魏丞相恭帝元年平荆州大獲梁氏樂器以屬有司及建六官乃詔曰六樂尚矣其聲歌之節舞蹈之容寂寥已絶不可得而詳也但方行古人之事可不本於兹乎自宜依准制其歌舞祀五帝日月星辰於是有司詳定郊廟請祀五帝日月星辰用黄帝樂歌大吕舞雲門祭九州社稷水旱雩禜用唐堯樂歌應鍾舞大咸祀四望饗諸侯用虞舜樂歌南吕舞大韶祀四類幸辟雍用夏禹樂歌函鍾舞大夏祭山川用殷湯樂歌小吕舞大濩享宗廟用周武王樂歌夾鍾舞大武皇帝出入奏皇夏賓出入奏肆夏牲出入奏昭夏畨國客出入奏納夏功臣出入奏章夏皇后進羞奏深夏宗室會聚奏族夏上酒宴樂奏陔夏諸侯相見奏驁夏皇帝大射歌騶虞諸侯歌貍首大夫歌采蘋士歌采蘩雖著其文竟未之行也明帝武成二年正月朔旦會羣臣於紫極殿始用百戲初長孫紹逺為大司樂廣召工人創造樂器土木絲竹為得其宜唯黄鍾不調紹逺毎以為意嘗因退朝經韓使君佛寺前過浮屠三層之上有鳴鐸焉忽聞其音雅合宫調取而配奏方始克諧紹逺乃啓明帝行之武帝保定元年詔罷百戲帝又以梁鼓吹熊羆十二案毎元正大㑹列於懸間與正樂合奏天和元年十月甲子初造山雲舞以備六代之樂南北郊雩壇太廟禘祫俱用六舞南郊則大夏降神大濩獻熟次作大武正徳武徳山雲之舞北郊則大濩降神大夏獻熟次作大武正徳武徳山雲之舞雩壇以大武降神正徳獻熟次作大夏大濩武徳山雲之舞太廟禘祫則大武降神山雲獻熟次作正徳大夏大濩武徳之舞時享太廟以山雲降神大夏獻熟次作武徳之舞拜社以大濩降神大武獻熟次作正徳之舞五郊朝日以大夏降神大濩獻熟神州夕月藉田以正徳降神大濩獻熟建徳二年十月甲辰六代樂成奏於崇信殿羣臣咸觀其宫懸依梁三十六架朝會則皇帝出入奏皇夏皇太子出入奏肆夏王公出入奏驁夏五等諸侯正日獻玉帛奏納夏宴族人奏族夏大會至尊執爵奏登歌十八曲食舉奏深夏舞六代大夏大濩大武正德武德山雲之舞於是正定雅音為郊廟樂創造鐘律頗得其宜初太常卿長孫紹逺奏樂以八為數故梁黄門侍郎裴正上書以為昔者大舜欲聞七始下洎周武爰創七音時林鍾作黄鍾以為正調之首詔與紹逺詳議往復於是遂定以八為數焉及武帝讀史書見武王克殷而作七始又欲廢八而懸七幷除黄鍾之正宫用林鍾為調首紹逺奏云天子懸八肇自先民百王共軌萬古不易下逮周武甫循七始之音詳諸經義又無廢八之典且黄鍾為君王子正位今欲廢之未見其可後武帝竟廢七音屬紹逺遘疾未獲面陳慮有司遽損樂器乃書與樂部齊樹言之後疾甚乃上遺表又陳之而卒帝省表涕零㴱痛惜之宣帝時革前代鼓吹制為十五曲第一改漢朱鷺為𤣥精李言魏道凌遲太祖肇開王業也第二改漢思悲翁為征隴西言太祖起兵侯莫陳悦掃清隴右也第三改漢艾如張為迎魏帝言魏武西幸太祖奉迎宅闗中也第四改漢上之回為平竇泰言太祖擁兵討泰悉擒斬也第五改漢雍離為復恒農言太祖尅復陜城闗東震肅也第六改漢戰城南為尅沙苑言太祖俘斬齊十萬衆於沙苑神武脱身至河單舟走免也第七改漢巫山髙為戰河隂言太祖破神武於河上斬其將髙敖曹魚多婁貸文等也第八改漢上陵為平漢東言太祖命將平隨郡安陸俘馘萬計也第九改漢將進酒為取巴蜀言太祖遣兵平定蜀地也第十改漢有所思為拔江陵言太祖命將擒蕭繹平南土也第十一改漢芳樹為受魏禪言閔帝受終於魏君臨萬國也第十二改漢上邪為宣重光言明帝入承大統載隆皇道也第十三改漢君馬皇為哲皇出言髙祖以聖徳繼天天下向風也第十四改漢雉子班為平東下言髙祖親率六師破齊主於青州一舉而定山東也第十五改漢古聖人出為擒明徹言陳將吳明徹侵軼除部髙祖遣將盡俘其衆也册府元龜卷五百六十七
