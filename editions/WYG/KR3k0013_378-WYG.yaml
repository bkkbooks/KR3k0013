body:
  text: 册府元龜巻三百七十八宋王欽若等撰將帥部褒異第四晉何曾魏正光中為鎭北將軍都督河北諸軍事假節將之鎭文帝使武帝齊王攸辭送數十里曾盛為賓主備太牢之饌侍從吏騶莫不醉飽帝既出又過其子邵曽先勑邵曰客必過汝汝當豫嚴邵不冠帶停帝良久曾深以譴邵曾見崇重如此遷征北將軍進封頴昌侯石苞為奮武將軍綂青州諸軍督逆擊諸葛誕兵大破之壽春平苞拜鎭東將軍封東光侯羊祜為征南大將軍祜以伐吳必藉上流之勢乃表王濬為龍驤將軍令修舟楫為順流之計祜繕甲訓卒廣為戎備乃上䟽武帝深納之後詔以泰山之南武陽牟南城梁父平陽五縣為南城郡封祜為南城侯置相與郡公同及卒帝素服哭之甚哀是日大寒帝涕淚滂沱鬚鬢皆為氷焉賜東園祕器朝服一襲錢三十萬布百疋詔曰征南大將軍南城侯祜蹈德冲素思心清逺始在内職値登大命乃心篤誠左右王事入綜機密出綂方岳當終顯烈永輔朕躬而奄忽殂隕悼之傷懐其追贈侍中太傅持節如故喪既引帝於大司馬門南臨送祜卒二歳而吳平羣臣上壽帝執爵流涕曰此羊太傅之功也因以克定之功策告祜廟乃依蕭何故事封其夫人萬歳縣君食邑五千户又賜帛萬疋穀萬斛杜預為征南大將軍都督荆州諸軍事預既至鎭繕兵甲耀威武乃簡精鋭襲吳西陵督張政大破之以功贈封三百六十五戸預既平吳振旅凱入以功進封當陽縣侯増邑并前九千六百戸賜絹八千匹王沈為征虜將軍持節都督江北諸軍事平蜀之役吳人大出聲為救蜀振動邉境沈鎭御有方㓂聞而退轉鎭南將軍武帝受禪以佐命之勲轉驃騎將軍賈充為典農中郎將叅大將軍軍事從景帝討毌丘儉文欽於樂嘉以勞増邑三百五十户後為文帝大將軍司馬轉右長史充進計征諸葛誕帝先歸雒陽使充統後事進爵宣陽侯増邑千户五等初建封臨沂侯為晉元勲深見寵異賜禄常優於羣臣伐吳之役詔充為使持節假黄鉞大都督總統六師給羽葆皷吹緹幢兵萬人騎二千置左右長史司馬從事中郎將増叅軍騎司馬各十人帳下司馬二十人大車官騎各三十人及吳平武帝遣侍中程咸犒勞賜充帛八千匹增邑八千户及薨帝為之慟使使持節太常奉䇿追贈太宰加衮冕之服緑綟綬御劔賜東園祕器朝服一具衣一襲大鴻臚䕶䘮事假節鉞前後部羽葆皷吹緹麾大輅鑾輅輼輬車帳下司馬大車椎斧文衣武賁輕車介士葬禮依霍光及安平獻王故事給塋田一頃與石苞等為王功配享廟庭自充薨至塟賻賜二千萬髙光為奉車都尉預討成都王穎有勲封延陵縣公邑二千八百户王渾為征虜將軍監豫州諸軍事渾與吳接境吳將薛瑩魯淑衆號十萬渾擊破之遷安東將軍都督揚州諸軍事鎭壽春及大舉伐吳渾率師出横江遣諸將擊破諸軍吳人大震孫皓遣司徒何植建威將軍孫晏送印節詣渾降武帝下詔曰王渾督率所綂遂逼秣陵令賊孫皓救死自衛不得分兵上赴以成西軍之功又摧破大軍獲張悌使皓塗窮勢盡靣縳乞降遂平定秣陵功勲茂著其增封八千户進爵為公賜絹八千匹轉征東大將軍王濬為龍驤將軍監梁益諸軍事既平吳拜濬輔國大將軍領歩兵校尉舊校唯五置此營自濬始也有司又奏輔國依比未為逹官不置司馬不給官騎詔依征鎭給親騎百人官騎十人置司馬封為襄陽縣侯邑萬户賜絹萬匹又賜衣一襲錢三十萬及食物時人咸以濬功重報輕武帝乃遷濬鎭軍大將軍加散騎常侍領後軍將軍後又轉濬撫軍大將軍開府儀同三司加特進散騎常侍後軍將軍如故太康六年卒時年八十葬栢谷山大營塋域塟垣周四十五里靣别開一門松栢茂盛唐彬為廣武將軍監邑東諸軍事上征吳之䇿甚合武帝意後與王濬共伐吳應機制勝多所擒獲吳平帝詔曰廣武將軍唐彬受任方隅東禦吳㓂南臨蠻越撫寜疆塲有綏禦之績又每忼慨志在立功頃者征討扶疾奉命首啓戎行獻俘授馘勲效顯著其以彬為右將軍都督巴東諸軍事徴拜翊軍校尉改封上庸縣侯食邑六千户賜絹六千匹王戎為建威將軍受詔伐吳降江夏太守劉朗及牙門將孟㤗吳平進爵安豐縣侯増邑六千户賜絹六千疋盧欽為淮北都督伏波將軍甚有聲績徵拜散騎常侍吏部尚書進封大梁侯武帝受禪以為都督沔北諸軍事平南將軍假節給追鋒軺卧車各一乘第二駙馬二乘騎具刀器御府人馬鎧等及錢三十萬馬隆為司馬督時凉州刺史楊欣失羌戎之和欣為虜所沒武帝以隆為武威太守假節宣威將軍加赤幢曲葢皷吹隆到武威前後誅殺及降附者以萬計凉州遂平加授衞將軍胡奮為監軍假節擊斬匃奴中部帥劉猛以功累遷征南將軍假節都督荆州諸軍事遷䕶軍加散騎常侍張光為牙門將伐吳有功遷江夏西部都尉轉北地都尉擊破反叛氐羌擢授新平太守加皷吹趙誘為廣武將軍與甘卓周訪共討華軼破之又攻㓕杜弢累功賜爵平阿縣侯周浚為折衝將軍揚州刺史封射陽侯隨王渾伐吳與渾共行吳城壘綏撫新附以功進封成武侯食邑六千户賜絹六千匹周馥為鎭東將軍與周玘等討陳敏㓕之以功封永寜伯茍晞為北中侯及惠帝還雒陽范陽王虓承制用晞行兖州刺史汲桑之破鄴也東海王越出次官渡以討之命晞為前鋒晞䧟其九壘遂定鄴而還西討吕朗等㓕之進位撫軍假節都督青兖諸軍事封東平郡侯邑萬户劉喬為建威將軍太子洗馬以誅楊駿功賜爵闗中侯張昌之亂為威逺將軍豫州刺史與劉𢎞共討昌進左將軍惠帝西幸長安喬與諸州郡舉兵迎大駕東海王越承制轉喬安北將軍劉琨為范陽王虓司馬及惠帝幸長安東海王越謀迎大駕劉喬攻虓於許昌也琨與汝南太守杜育等率兵救之未至而虓敗琨與虓俱奔河北共破東平王楙於廩丘南走劉喬又斬石超䧏吕朗因諸軍奉迎大駕於長安以勲封廣武侯邑二千户索靖為蕩㓂將軍時西戎反叛靖屯兵粟邑擊賊敗之遷始平内史又以左將軍討孫秀有功加散騎常侍遷後將軍索琳為奮威將軍時劉聰侵掠闗東琳破聰黨遷新平太守後為安西將軍馮翊太守及懐帝蒙塵長安又䧟琳紏合義衆頻破賊黨修復舊館遷定宗廟小大百戰手擒賊帥李羌與閻鼎立秦王為皇太子及即尊位是為愍帝綝遷侍中太僕以首迎大駕升壇授璽之功封弋居伯累遷衛將軍及劉曜進逼王城以琳為都督征東大將軍持節討之破曜將日逐王呼延莫以功封上雒郡公食邑萬户拜夫人荀氏為新豐君曜入闗綝又擊破之敗劉聰將趙染轉驃騎大將軍周玘為建威將軍三定江南開復王畧元帝嘉其勲以玘為吳興太守封烏程縣侯帝又以玘頻興義兵勲誠並茂乃以陽羡及長城之西鄉丹陽之永世别為義興郡以彰其功周札為寜逺將軍初討錢璯以功賜爵漳浦亭侯轉從事中郎又以徐馥平為奮武將軍吳興内史録前後功改封東遷縣侯進號征虜將軍周訪為揚烈將軍率衆擊破武昌太守馮翊及斬華軼遂平江州元帝以訪為振武將軍尋陽太守加皷吹曲葢復命訪與諸軍共征杜弢弢遣杜𢎞出海昏訪擊破之𢎞奔於臨賀帝又進訪龍驤將軍王敦表為豫章太守加征討都督賜爵尋陽縣侯又討賊帥杜曾曽等走固武當以功遷南中郎將督梁州諸軍事梁州刺史屯襄陽又擊破杜曾并獲第五琦胡混摯瞻等送於王敦進位安南將軍持節都督刺史如故及卒帝哭之甚慟詔贈征西將軍立碑於本郡戴淵為振威將軍義軍督以討賊有功賜爵秣陵侯遷治書御史驃騎司馬拜散騎侍郎元帝召為鎭東右司馬將征杜弢加淵前將軍後為征西將軍都督兖豫幽冀雍并六州諸軍事假節加散騎常侍發投刺王官千人為軍吏調揚州百姓家奴萬人為兵配之以散騎常侍王遐為軍司鎭壽陽與劉隗同出帝親幸其營勞勉將士臨發祖餞置酒賦詩應詹為都督前鋒軍事䕶軍將軍假節都督與建威將軍趙𦙍等擊敗南賊斬賊率杜發梟首數千級賊平封觀陽縣侯食邑一千六百户賜絹五千匹後遷使持節都督江州諸軍事平南將軍江州刺史卒贈鎭南大將軍儀同三司祠以太牢甘卓初為吳王常侍討石氷以功賜爵都亭侯元帝初渡江授卓前鋒都督揚威將軍歴陽内史討周馥征杜弢屢經苦戰多所擒獲以前後功進爵南鄉侯葛洪為元帝丞相掾石氷作亂吳興太守顧祕為義軍都督與周玘等起兵討之祕檄洪為將兵都尉攻氷别帥破之遷伏波將軍氷平洪不論功至是以平賊功賜爵闗内侯王廙為元帝司馬預討周馥杜弢以功屢贈封邑除冠軍將軍孔愉初叅元帝丞相軍事以討華軼功封餘不亭侯孟觀為積弩將軍上谷郡公時氐帥齊萬年反於闗中觀大戰皆破之轉東羌校尉劉演為北中郎將兖州刺史鎭廪丘斬王桑走趙固得衆七千人為石勒所攻演拒戰勒退元帝拜為都督後將軍祖逖為奮威將軍豫州刺史給千人廪布三千疋及卒册贈車騎將軍李矩為梁王肜牙門將伐氐帥齊萬年有殊功封東明亭侯後討賊帥侯都等㓕之太尉荀藩建行臺假矩滎陽太守又破石勒衆藩表元帝加矩冠軍將軍軺車幢葢進封陽武縣侯遷冠軍將軍矩破劉聰衆聰因憤恚而死帝嘉其功除都督河南三郡軍事安西將軍滎陽太守封修武縣侯劉𢎞為寕朔將軍假節監幽州諸軍事領烏桓校尉為幽朔所稱以勲德兼茂封宣城公及卒贈新城郡公郄鍳為衛將軍都督從駕諸軍事與明帝謀㓕王敦又以鍳為尚書令領諸屯營平錢鳯等封髙平侯賜絹四千八百疋後進鍳都督揚州八郡軍事㑹蘇峻死大業圍解及蘇逸等走吳興鍳遣參軍李閎追斬之降男女萬餘口拜司空加侍中更封南昌縣公時賊帥劉徵聚抄東南諸縣鍳遂城京口加都督揚州之晉陵吳郡諸軍事率衆討平之進位太尉華當為驃騎將軍以討王敦功封宛陵縣侯郄恢為建威將軍雍州刺史時後秦姚萇遣其子畧攻上雒恢遣建武將軍辛㳟靜救雒陽畧懼而退恢以功進征虜將軍又領秦州刺史加督隴上軍紀瞻為揚威将軍都督京口以南至蕪湖諸軍事以距石勒勒退除㑹稽内史俄轉領軍將軍瞻以久病去官明帝不聽復加散騎常侍及王敦之逆帝使謂瞻曰卿雖病但為朕卧䕶六軍所益多矣乃賜布千疋賊平復自表還家帝不許固辭不起詔曰瞻忠亮雅正識局經濟屢以年耆病久逡廵吿誠朕深明此操重違髙志今聽所執其以為驃騎將軍常侍如故服物制度一按舊典遣使就拜止家為府尋卒册贈本官開府儀同三司遣御史持節監䕶喪事卞敦為振威將軍領江夏相戍夏口敦攻討沔中皆平既而杜弢㓂湘中加敦征討大都督伐弢有功賜爵安陵亭侯鎭東大將軍明帝之討王敦以為鎭南將軍假節事平更拜尚書以功封益陽侯徙光禄勲劉超為安東上將軍從明帝征錢鳯事平以功封零陵伯庾亮為都督征東諸軍事征沈充於吳興事平以功封永昌縣開國公賜絹五千四百疋固讓不受轉䕶軍將軍後鎭蕪湖頃之後將軍郭黙據湓口以叛亮表求親征於是以本官加征討都督㑹太尉陶侃俱討破之進號鎭西將軍固讓初以誅王敦功封永昌縣公亮陳讓疏數十上至是許之虞譚為輔國將軍以討沈充功進爵零陵縣侯鄧嶽為西陽太守率衆討平郭黙遷督交廣二州軍事建武將軍領平越中郎將廣州刺史假節録前後勲封宜城縣伯嶽又遣軍伐夜郎破之加督寜州進征虜將軍鍾雅為廣武將軍時錢鳯作逆廣徳縣人周玘為鳯起兵雅討玘斬之鳯平拜尚書左丞又北中郎將劉遐卒部曲作亂以雅監征討軍事事平拜驍騎將軍陶侃為南蠻長史後以軍功封東鄉侯邑千户陳敏之亂為江夏太守加鷹揚將軍侃備威儀迎母官舍鄉里榮之敏遣其弟恢來㓂武昌侃出兵禦之又加督䕶使與諸軍擊恢所向必破後以母憂去職服闋參東海王越軍事江州刺史元帝加侃奮威將軍假赤幢曲葢軺車皷吹頃之遷龍驤將軍武昌太守王敦又表拜侃為使持節寜逺將軍南蠻校尉荆州刺史時諸將皆請乘勝擊温邵侃以書諭之邵懼而走追獲於始興以功封柴桑侯食邑四千户太興初進號平南將軍尋加都督交州軍事及王敦反侃以本官領江州刺史尋轉都督湘州刺史敦得志侃復本職加散騎常侍時交州刺史王諒為賊梁碩所䧟侃遣將高寳追擊平之以侃領交州刺史録前後功進封征南大將軍開府儀同三司及王敦平遷都督荆雍益梁州諸軍事領䕶南蠻校尉征西大將軍荆州刺史既平蘇峻旋江陵尋以為侍中太尉加羽葆皷吹改封長沙郡公邑三千户賜絹八千疋加都督交廣寜七州軍事侃又平郭黙詔侃都督江州領刺史増置左右長史司馬從事中郎四人掾屬十二人咸和七年侃薨成帝詔曰故使持節侍中太尉都督荆江雍梁交廣益寜八州諸軍事荆江二州刺史長沙郡公經徳秉哲謀猷𢎞逺作藩於外八州肅清勤王於内皇家以寜乃者桓文之勲伯舅是憑方頼大猷俾屏予一人前進位大司馬禮秩䇿命未及加崇昊天不弔奄忽薨殞朕震悼于厥心今遣鴻臚追贈大司馬假密章祠以太牢魂而有靈嘉兹寵榮温嶠為中壘將軍持節都督東安北部諸軍事時王敦搆逆嶠率衆與賊夾水戰擊王含敗之後督劉遐追錢鳯於江寜事平封建寜縣開國公賜絹五千四百疋進號前將軍又代應詹為江州刺史持節都督平南將軍鎭武昌及平蘇峻拜驃騎將軍開府儀同三司加散騎常侍封始安郡公邑三千户及薨成帝下册書追贈侍中大將軍持節都督刺史公如故賜錢百萬布千疋祠以太牢詔塟建平陵北謝尚出為建武將軍江夏相成帝詔曰尚往以戎戍事要故輟黄散以授軍旅所據險要宜崇其威望今以為南中郎將後進號安西將軍時苻堅將揚平戍許昌尚遣兵襲破之徵授給事中賜軺車皷吹王舒為撫軍將軍㑹稽内史時蘇峻作逆舒監浙江東五郡軍事遣子允之督䕶吳郡義興晉陵三郡征討軍事擊賊韓晃於長蕩湖大破之賊平以功封彭澤縣侯尋卒於官贈車騎大將軍儀同三司允之討賊有功封畨禺縣侯邑千六百户顧衆為揚威將軍以討蘇峻功封鄱陽縣伯禇翜為侍中典征討軍事時蘇峻作逆翜與陸􅁮出據苑城蘇逸任讓圍之翜等固守賊平以功封長平縣伯毛寳為温嶠前鋒時蘇峻作亂峻既死保守南城賊遣韓晃攻之寳登城射殺數十人晃退賊平封州陵縣開國侯千六百户庾亮西鎮請為輔國將軍擊賊將石遇破之進征虜將軍庾懌為左衛將軍以討蘇峻封廣饒男庾氷為祕書郎預討華軼功封都鄉侯後為奮武將軍擊走蘇峻别帥張健於吳中乘勝又遣司馬滕含攻賊石頭城㧞之氷勲為多封新吳縣侯周撫為寜逺將軍江夏相蘇峻作逆率所領從温嶠討之峻平遷監沔北軍事南中郎將後桓温征蜀進撫督梁州之漢中巴西梓潼隂平四郡軍事撫擊破蜀餘㓂以功遷平西將軍又與龍驤將軍朱壽擊斬范賁以功進爵建成縣公又征西督䕶蕭敬文作亂撫伐之敬文出䧏進撫鎭西將軍及卒贈征西將軍周楚為鷹揚將軍監梁益二州假節襲爵建城公時梁州刺史司馬勲作逆討平之進冠軍將軍毛穆之為安西將軍庾翼司馬翼薨大將于瓉戴羲等作亂穆之討平之又從桓温平蜀以功尋除揚威將軍累遷右將軍西蠻校尉卒追贈中軍將軍庾翼為輔國將軍假節及邾城失守石城被圍翼屢設竒兵潜致糧杖石城得全翼之勲也賜爵都亭侯後為征西將軍領南蠻校尉及卒追贈車騎將軍桓石民為鎭武將軍攻破苻堅監荆州軍事西中郎將荆州刺史擊斬并州賊黄淮以前後功進左將軍桓石康為振威將軍荆州刺史以討庾仄功封武陵王桓冲為鷹揚將軍鎭蠻䕶軍西陽太守從桓温征伐有功遷督荆州之南陽襄陽新野義陽順陽雍州之京兆揚州之義城七郡軍事寜朔將軍義城新野二郡太守鎭襄陽又從温破姚襄及虜周成進號征虜將軍賜爵豐城公尋遷振威將軍江州刺史領鎭蠻䕶軍西陽醮二郡太守又遷車騎將軍都督江州梁益交廣寜七州揚州之義城雍州之京兆司州之河東軍事領䕶南蠻校尉荆州刺史持節將軍侍中如故冲將之鎭孝武餞於西堂賜錢五十萬又以酒三百四十石牛五十頭犒賜文武送至溧州後遷督荆江十郡軍事又以討降苻堅諸將功詔賜錢百萬袍表千端謝安為侍中都督揚豫徐兖青五州幽州之燕國諸軍事假節時苻堅彊盛疆塲多虞諸將敗退相繼安遣弟石及兄子𤣥等應機征討所在克㨗拜衛將軍開府儀同三司封建昌縣公謝琰為輔國將軍苻堅之役與從兄𤣥俱䧟陣破堅以勲封望蔡公謝𤣥為建武將軍兖州刺史領廣陵相監江北諸軍事大破苻堅軍罷彭城下邳二戍詔遣殿中將軍慰勞進號冠軍加領徐州刺史還於廣陵以功封東興縣侯後又破堅衆詔遣殿中將軍慰勞進號前將軍假節固譲不受賜錢百萬綵千疋既而安奏苻堅喪敗宜乘其釁會以𤣥為前鋒都督率冠軍將軍後以兖青司豫平和加𤣥都督徐兖青司幽冀并七州軍事𤣥上疏以方平河北幽冀宜須總督司州懸逺應統豫州以勲封康樂縣公桓宣為四品將軍時石勒别將圍譙城祖逖留宣討諸未服皆破之遷譙國内史後為都督司雍梁黄州荆州之南陽襄陽新野南鄉四郡軍事以前後功封竟陵縣男桓伊為建威將軍歴陽太守與謝𤣥共破賊别將王鍳張蚝等以功封宣城縣子又進都督豫州諸軍事西中郎將豫州刺史及苻堅南㓂伊與冠軍將軍謝𤣥輔國將軍謝琰俱破堅於淝水以功封永修縣侯進號右軍將軍賜錢百萬袍表千端後拜䕶軍將軍以右軍府千人自隨配䕶軍府官贈右將軍加散騎常侍朱伺為綏夷都尉時陶侃鎭江夏以伺為左甄摧破陳敏於武昌以功封亭侯領騎督累加威逺將軍督䕶又以平蜀賊功加廣威將軍毛安之為遊擊將軍孝武初擊㓕妖賊盧悚遷左衛將軍及卒又追論討悚勲賜爵平都子朱序為征討都䕶以討司馬勲功拜征虜將軍封襄平子後轉揚州豫州五郡軍事豫州刺史屯雒陽後丁零翟遼反序遣將軍秦膺童斌與淮泗諸郡共討之又監兖青二州諸軍事二州刺史將軍如故進鎭彭城序求鎭淮隂孝武許焉序還遣秦膺討翟遼子釗於陳潁走之拜征虜將軍劉牢之為謝𤣥前鋒百戰百勝牢之破苻堅將句難輜重於旴􅇇獲其運船遷鷹揚將軍淮淝之役牢之進平譙城遷龍驤將軍彭城内史以功賜爵武崗縣男食邑五百户諸葛長民為揚武將軍討桓𤣥以功拜輔國將軍又與劉敬宣破桓歆於芍陂封新淦縣公食邑二千五百户何無忌為輔國將軍既破桓𤣥衆侍衛安帝還京師以無忌督豫州揚州淮南廬江安豐歴陽堂邑五郡軍事右將軍豫州刺史加節甲杖五十人入殿未之職遷會稽内史督江東五郡軍事持節將軍如故給皷吹一部義熈二年遷都督江州荆州江夏隨義陽綏安豫州西陽新蔡汝南潁川八郡軍事江州刺史將軍持節如故以興復之功封安城郡開國公食邑三千户増都督司州之𢎞農揚州之松滋加散騎侍郎進鎭南將軍毛璩為建威將軍益州刺史安帝初進征虜將軍及桓𤣥簒位遣使加璩散騎常侍左將軍璩列𤣥罪狀遣諸太守擊之及安帝反正詔曰夫貞松標於嵗寒忠臣亮于國危益州刺史璩體識𢎞正誠契義旗受命偏帥次于近畿輔翼之勲實感朕心可進征西將軍都督益梁秦涼寧五州軍事行宜都寜蜀太守及遇害詔給錢三十萬布三百疋論璩討𤣥功追封歸鄉公千五百户册府元龜卷三百七十八
