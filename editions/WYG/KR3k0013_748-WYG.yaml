body:
  text: 册府元龜卷七百四十八宋王欽若等撰陪臣部交争變詐賊害交争春秋之世陪臣執國命彊公室寄任亦多儀制猶簡或奉干戈之役或修朝㑹之儀而乃進退由心輕重在已始於放肆卒以交爭起讐專戮生於此矣公孫閼鄭大夫魯隱公十五年五月鄭伯將伐許授兵於大宫大宫鄭祖廟公孫閼與頴考叔爭車頴考叔挾輈以走輈車轅也子都挾棘以逐之子都公孫閼棘㦸也及大逵弗及子都怒逵道方軌也七月鄭伯傅于許傅于許城下頴考叔取鄭伯之旗蝥弧以先登蝥弧旗名子都自下射之顛樂轡宋大夫華弱與樂轡少相狎長相優又相謗也狎親習也優調戲也子蕩怒以弓梏華弱于朝子蕩樂轡也張弓以貫頸若械之在手故曰梏平公見之曰司武而梏於朝難以勝矣司武司馬言其懦弱若不足以勝敵遂逐之華弱奔魯司城子罕曰同罪異罰非刑也專戮於朝罪孰大焉亦逐子蕩子蕩射子罕之門曰㡬日而不我從言我射汝門汝亦當以不勝任見逐子罕善之如初言子罕雖見辱而不忿所以得安子朱晉大夫魯襄公二十六年春秦伯之弟鍼如晉修成修㑹夷儀嵗之成叔向命召行人子員欲使答秦命行人子朱曰朱也當御御進也言次當行三云叔向不應子朱怒曰班爵同同為大夫何以黜朱於朝黜退也撫劍從之從叔向也叔向曰秦晉不和久矣今日之事幸而集集成晉國頼之不集三軍暴骨子員道二國之言無私子嘗易之姦以事君者吾所能御也拂衣從之拂衣褰裳也人救之平公曰晉其庶乎庶㡬于治吾臣之所爭者大師曠曰公室懼卑臣不心競而力爭謂二子不心競為忠而撫劍拂衣不務德而爭善爭謂所行為善私欲已侈能無卑乎穿封戍楚大夫魯襄公二十六年楚子侵鄭至於城麋鄭皇頡戍之皇頡鄭大夫守城麋之邑出與楚師戰敗穿封戍囚皇頡公子圍與之爭之公子圍共王子靈王也正於伯州犁正曲直也伯州犁曰請問於囚乃立囚伯州犁曰所爭君子也其何不知言王子圍及穿封戍皆非細人易别識也上其手曰夫子為王子圍寡君之貴介弟也介大也下其手曰此子為穿封戍方城外之縣尹也誰獲子上下手以道囚意囚曰頡遇王子弱焉弱敗也言為王子所得戍怒抽戈逐王子圍弗及楚人以皇頡歸公孫黑鄭大夫魯襄公二十九年鄭伯有使公孫黑如楚黑子晢辭曰楚鄭方惡而使余往是殺余也伯有曰世行也言女世為行人子晢曰可則往難則已何世之有伯有將强使之子晢怒將伐伯有氏大夫和之鄭大夫盟於伯有氏禆諶曰是盟也其與㡬何言不能久也禆諶鄭大夫詩曰君子屢盟亂是用長今是長亂之道也禍未歇也必三年而後能舒舒解也子晢又與子南爭聘徐吾犯之妹及適子南氏子晢怒櫜甲以見子南欲殺之而取其妻子南知之執戈逐之及衝擊之以戈子晢傷而歸衝交道也士彌侔晉大夫魯定公元年正月辛巳晉魏舒合諸侯之大夫于狄泉將以城成周孟懿子㑹城成周庚寅裁裁設版築宋仲㡬不受功曰滕薛郳吾役也欲使三國代宋受功役也郳小邾薛宰曰宋為無道絶我小國於周以我適楚故我常從宋晉文公為踐土之盟曰凡我同盟各復舊職若從踐土若從宋亦唯命仲㡬曰踐土固然固曰從舊薛舊為宋役薛宰曰薛之皇祖奚仲居薛以為夏車正皇大也奚仲為夏禹掌車服大夫奚仲遷于邳邳下邳縣仲虺居薛以為湯左相仲虺奚仲之後若復舊職將承王官何故以役諸侯承奉也仲㡬曰三代各異物薛焉得有舊言居周世不得以夏殷為舊為宋後亦其職也士彌侔曰晉之從政者新言范獻子新為政未習故事子姑受功歸吾視諸故府求故事仲㡬曰縱子忌之山川鬼神其忘諸乎山川鬼神盟所告士伯怒謂韓簡子曰薛徴於人典籍故事人所知也宋徵於鬼取證于鬼神宋罪大矣且已無辭而抑我以神誣我也啟寵納侮其此之謂矣開寵過分則納受侵侮必以仲㡬為戮乃執仲㡬以歸樂溷宋大夫魯定公九年春宋公使樂大心盟于晉且逆樂祁之尸辭偽有疾乃使向巢如晉盟且逆子梁之尸子明謂桐門右師出子明樂祁之子溷也右師樂大心子明族父也右師往到子明舎子明逐使出門去曰吾猶衰絰而子擊鍾何也忿其不逆父䘮因責其無同族之恩右師曰䘮不在此故也既而告人曰已衰絰而生子余何故舎鍾已子明也子明聞之怒言於公曰右師將不利戴氏樂氏公族不肯適晉將作亂也不然無疾乃逐桐門右師韓傀相韓嚴遂重於君二人相害也嚴遂政議直指舉韓傀之過韓傀以之叱之於朝嚴遂㧞劍趍之於是嚴遂懼亡去變詐古者諸侯各奠方國必有命卿至于大夫以輔其政洎晚周微弱五霸迭起以機先而為勝内由權變以取威繇是仁義廢而變詐興矣則有屈已而就事違道以成功欺割地之言反好用之物定君於詭詐之際還兵於倉卒之間蓋亦才出一時智通羣萃施之變亂庶可嘉然與夫皇王之道斯為美矣禮所謂用人之智去其詐良有以乎叔孫僑如魯大夫通於穆姜欲去季孟而取其室季文子孟獻子成公十六年冬十月出僑如而盟之僑如奔齊諸大夫共盟以僑如為戒齊聲孟子通僑如聲孟子齊靈公母宋女使立於髙國之間位比二卿僑如曰不可以再罪奔衛亦間於卿傳亦終言僑如之佞胥梁帶晉大夫魯襄公二十六年齊人城郟之嵗在二十四年其夏齊烏餘以廪丘奔晉烏餘齊大夫也廪丘今東郡廪丘縣故城是襲衛羊角取之今廩丘縣所治羊角城是遂襲我髙魚髙魚城在廪丘縣東北有大雨自其竇入雨大故水竇開介于其庫入髙魚庫而介其中以登其城克而取之取魯髙魚又取邑於宋於是范宣子卒宣子范匄諸侯弗能治也及趙文子為政乃卒治之文子言於晉侯曰晉為盟主諸侯或相侵也則討而使歸其地今烏餘之邑皆討類也言於此類宜見討而貪之是無以為盟主也請歸之公曰諾孰可使也對曰胥梁帶能無用師晉侯使往能無用師言有權謀也至二十七年春胥梁帶使諸䘮邑者具車徒以受地必周諸䘮邑謂齊魯宋也周宻也必宻來勿以受地為名使烏餘具車徒以受封烏餘以邑故詐許封之烏餘以其衆出出受封也使諸侯偽刼烏餘之封者刼致也使齊魯宋偽若致邑封鳥餘者而遂執之盡獲之皆獲其徒衆皆取其邑而歸諸侯諸侯是以睦於晉傳言趙文子賢故平公雖失政而諸侯猶睦韓起晉大夫魯昭公三年如齊逆女為平公逆公孫蠆為少姜之有寵也以其子公女而嫁公子更嫁公女人謂宣子子尾欺晉晉胡受之宣子曰吾欲得齊而逺其寵寵將來乎寵謂子尾薳啟疆楚大夫魯昭公七年三月公如楚楚子享公于新臺章華臺也使長鬛者相鬛鬢也欲先夸魯侯好以大屈宴好之賜大屈弓名既而悔之薳啟疆聞之見公公語之拜賀公曰何賀對曰齊與晉越欲此久矣寡君無適與也而傳諸君君其備禦三鄰言齊晉越將伐魯而取之愼守寳矣敢不賀乎公懼乃反之言楚靈不信所以不終冉猛魯人定公八年正月公侵齊門於陽州師退冉猛偽傷足而先欲先歸其兄㑹乃呼曰猛也殿㑹見師退而猛不在列乃大呼詐言猛在後為殿傳言魯無軍政二月公侵齊攻廩丘之郛主人出師奔攻郛人少故遣後師走往助之陽虎偽不見冉猛者曰猛在此必敗陽州之役猛先歸言若在此必復敗猛逐之顧而無繼偽顚逐廪丘人虎曰盡客氣也言皆客氣非勇子服景伯魯大夫哀公十三年秋七月辛丑盟吳晉爭先爭㰱血先後吳人曰於周室我為長晉人曰於姬姓我為伯為侯伯乃先晉人吳人將以公見晉侯景伯對使者吳人乃止既而悔之謂景伯欺之將囚景伯景伯曰何也立後於魯矣何景伯名將以二乗與六人從遲速唯命遂囚以還及户牖户牖陳留外黃縣西北東昏城是謂太宰嚭曰魯將以十月上辛有事於上帝先王季辛而畢何世有職焉有職於祭事自襄以來未之有改也魯襄公若不㑹祝宗將曰吳實然言魯祝宗將告神云景伯不㑹坐為吳所囚吳人信鬼故以事恐之且謂魯不共而執其賤者七人何損焉大宰嚭言於王曰無損於魯而祗為名適為惡名不如歸之乃歸景伯智伯晉卿也魯哀公二十七年晉荀瑶帥師伐鄭次于桐丘鄭駟𢎞請救于齊𢎞駟顓子齊陳成子帥師救鄭智伯聞之乃還使謂成子曰大夫陳子陳之自出陳之不祀鄭之罪也十七年楚獨㓕陳非鄭之罪蓋智伯誣陳子故陳子怒謂其多陵人故寡君使瑶察陳衷焉衷善也謂大夫其恤陳乎若利本之顚瑶何有焉言陳㓕已何傷成子怒曰多陵人者皆不在智伯其能久乎張儀相秦秦欲伐齊齊楚從親於是張儀往相楚楚懐王聞張儀來虚上舎而自館之曰此僻陋之國子何以教之儀說楚王曰大王誠能聽臣閉闗絶約於齊臣請獻商於之地六百里使秦女得為大王箕箒之妾秦楚娶婦嫁女長為兄弟之國此北弱齊而西益秦也計無便此者楚王大說而許之羣臣皆賀陳軫獨吊楚王怒曰寡人不興師發兵得六百里地羣臣皆賀子獨吊何也陳軫對曰不然以臣觀之商於之地不可得而齊秦合齊秦合則患必至矣楚王曰有說乎陳軫對曰夫秦之所以楚重者以其有齊也今閉闗絶約於齊則楚孤秦奚貪夫孤國而與之商於之地六百里張儀至秦必負王是北絶齊交西生患於秦也兩國之兵必俱至善為王計者不若隂合而陽絶于齊使人隨張儀茍與吾地絶齊未晚也不與吾地隂合謀計也楚王曰願陳子閉口毋復言以待寡人得地乃以相印授張儀厚賂之於是遂閉闗絶約於齊使一將軍隨張儀張儀至秦佯失綏墮車不朝三月楚王聞之曰儀以寡人絶齊未甚耶乃使勇士至宋借之符北罵齊王齊王大怒折節而下秦秦齊之交合張儀乃朝謂楚使者曰臣有奉邑六里願以獻大王左右楚使者曰臣受令於王以商於之地六百里不聞六里還報楚王楚王大怒發兵而攻秦陳軫曰軫可發口言乎攻之不如割地反以賂秦與之并兵而攻齊是我出地於秦取償於齊也王國尚可存楚王不聽卒發兵而使將軍屈匄擊秦秦齊共攻楚斬首八萬殺屈匄遂取丹陽在枝江漢中之地楚又復益發兵而襲秦至藍田大戰楚大敗於是楚割兩城以與秦平秦要楚欲得黔中地欲以武闗外易之楚王曰不願易地願得張儀而獻黔中地秦王欲遣之口弗忍言張儀乃請行惠王曰彼楚王怒子之負以商於之地是且甘心於子張儀曰秦彊楚弱臣善靳尚尚得事楚夫人鄭䄂所言皆從且臣奉王之節使楚楚何敢加誅假令誅臣而為秦得黔中之地臣之上願遂使楚楚懐王至則囚張儀將殺之靳尚謂鄭袖曰秦王甚愛張儀而不欲出之今將以上庸之地六縣賂楚以美人聘楚以宫中善歌謳者為勝楚王重地尊秦秦女必貴而夫人斥矣不若為言而出之於是鄭䄂日夜言懐王曰人臣各為其主用今地未入秦秦使張儀來至重王王未有禮而殺張儀秦必大怒攻楚妾請子母俱遷江南毋為秦所魚肉也懐王後悔赦張儀厚禮之如故樓緩趙大夫秦攻趙於長平大破之引兵而歸因使人索六城于趙而謀計未定樓緩新從秦來趙王與樓緩計之曰與秦地與不與孰吉樓緩辭讓曰非人臣所知也王曰雖然試言公之私樓緩曰王亦聞公父文伯乎公父文伯官於魯病死婦人之為自殺房中者二人其母聞之不肯哭也其相室曰焉有子死不哭者乎其母曰孔子賢人也逐於魯是人不隨今死而婦人為死者二人若是者其於長者薄於婦人厚也故從母言之為賢母也從婦人言之為妬婦故言之一也言者異則人心變矣今臣新從秦來言勿與則非計也言與之則恐以臣為秦也故不敢對使臣得為王計不如與之王曰諾虞卿聞之入見王王以樓緩言告之虞卿曰此飾說也王曰何謂也虞卿曰秦之攻趙倦而歸乎王以其力尚能進愛王而不攻乎王曰秦之攻我也不遺餘力矣必以倦而歸也虞卿曰秦以其力攻其所不能取倦而歸王又為之攻其力之所不能取以資之是助秦自政也來年秦復攻王王無救矣王以虞卿言告樓緩樓緩曰虞卿能盡知秦力之所至乎誠知秦力之進也此彈丸之地猶不與也今秦來年復攻王得無割其内而媾乎王曰請聽子割矣子能必來年秦不復攻乎樓緩曰此非臣之所敢任也他日者三晉之交于秦相善也今秦善韓魏而獨攻王王之所以事秦必不如韓魏也今臣為足下解負親之攻啟闗通幣於齊交韓魏至來年而王獨不攻於秦王之所以事秦者必在韓魏之後也此非臣之所敢任也王以樓緩言告虞卿虞卿曰樓緩言不媾來年秦復攻王得無更割其内而媾乎今樓緩又不能必秦之不復攻也雖割何益來年復攻之割其力之所不能取而媾此自盡之術也不如無媾秦雖善攻不能嵗取六縣趙雖不能收不至嵗失六城秦倦而歸兵必罷我以六城收天下以攻罷秦是我失之于天下而取償於秦也吾國尚利孰與坐而割地自弱以彊秦哉今樓緩曰秦善韓魏而攻趙者必以王之事秦不如韓魏也是使王嵗以六城事秦也坐而地盡矣來年秦復求割地王將與之乎不與則是棄前費而挑秦禍也與之則無地而給之語曰彊者善攻而弱者不能守今坐而聽秦秦兵不弊而多得地是彊秦而弱趙也以益彊之秦而割逾弱之趙其計固不止矣且秦虎狼之國也無禮義其求無己而王之城有盡以有盡之地給無己之求其勢必無趙矣故曰此飾說也王必勿與王曰諾樓緩聞之入見王王又以虞卿言告之樓緩曰不然也虞卿得其一不得其二夫秦趙搆難天下皆恱何也我將因强而乗弱今趙兵困于秦故不如亟割地為和以疑天下慰秦之心不然天下將因秦之怒乗趙之弊而𤓰分之趙見亡之不暇何秦之敢圖願王以此斷之勿復計也虞卿聞之復入見王曰危矣樓緩之為秦也夫趙兵困于秦又割地為和是愈疑天下而何慰秦心哉是亦獨不言其示天下弱乎且臣曰勿與者非固勿與而已也秦索六城于王王以五城賂齊齊秦深讐也得王五城并力而西擊齊秦之聽王又不待辭之畢矣則是王失之于齊而取償于秦也而齊趙之讐可以報示天下有能為也王以此發聲兵未闚境臣見秦之重賂而反媾於王也從秦為媾韓魏聞之必盡重王重王必出重噐以先於王是一舉而結三國之親而與秦易道也趙王曰善因發虞卿東見齊王與之謀秦虞卿未還秦之使者已在趙矣樓緩聞之逃而去也賊害古人有言曰士無賢愚入朝見嫉又曰堆生於岸水必湍之斯固逹者因事而立喻也若乃利害相形曲直異禀當其勝㑹突起狠心乃有取其善而害其人懼其逼而奪其位兹乃賢愚之共弊古今之深戒者也在昔曽陪繼世名位迭居茍以一時之忿或至勦類之􅆭姑因私怨搆其事端終為深禍危乎邦本斯則猜賊者之議得讒毁者之計行故受枉被誅莫不由是徵諸前史可覆視也比其事類以存戒焉狐射姑晉大夫也晉侯使射姑將陽處父諫曰射姑民衆不說不可使將於是廢將陽處父出射姑入君謂射姑曰陽處父言曰射姑民衆不説不可使將射姑怒出刺陽處父於朝而走明君漏言殺之當坐殺也易曰君不宻則失臣臣不宻則失身㡬事不宻則害成箕鄭父晉大夫也夷之蒐晉侯將登箕鄭父先都登之於上軍也使而士縠梁益耳將中軍士縠本司空先克曰狐趙之勲不可廢也從之狐偃趙衰有從亡之勲先克奪蒯得田于革隂七年晉禦秦師于革隂以軍事奪其田也先克中軍佐故箕鄭父先都士縠梁益耳蒯得作亂使賊殺先克屠岸賈晉大夫也屠岸賈欲殺趙朔賈始有寵於靈公及至於景公而賈為司㓂將作難乃治靈公之賊以致趙盾徧告諸將曰盾雖不知猶為賊首以臣弑君子孫在朝何以懲罪請誅之韓厥曰靈公遇賊趙盾在外吾君以為無罪故不誅今諸君將誅其後是非先君之意而今妄誅妄誅謂之亂臣有大事而君不聞是無君也賈不聽韓厥告趙朔趣亡朔不肯曰子必不絶趙祀朔死不恨韓厥許諾稱疾不出賈不請而擅與諸將攻趙氏於下宫殺趙朔趙同趙括趙嬰齊皆㓕其族郤錡郤犨郤至皆晉大夫也三郤害伯宗譛而殺之及欒弗忌欒弗忌晉賢大夫伯州犁奔楚伯宗子韓獻子曰郤氏其不免乎善人天地之紀也而驟絶之不亡何待既殺伯宗又及弗忌故曰驟也初伯宗每朝其妻必戒之曰盗憎主人民惡其上子好直言必及於難子尾齊大夫也害閭丘嬰欲殺之使帥師以伐陽州陽州魯地我問師魯以師往問齊何故伐我子尾殺閭丘嬰以說于我師言伐魯者嬰所為也工僂灑渻竈孔虺賈寅出奔莒四子嬰之黨季平子魯大夫也平子伐莒取郠郠莒邑獻俘始用人於亳社以人祭殷社臧武仲在齊聞之曰周公其不饗魯祭乎周公享義魯無義詩曰德音孔昭視民不佻詩小雅佻偷也言明德君子必愛民佻之謂甚矣而一用之將誰福哉一同也同人于畜牲駟歂鄭大夫殺鄧析而用其竹刑鄧析鄭大夫欲改鄭所鑄舊制不受君命而私造刑法書之于竹簡故言竹刑君子謂子然於是不忠茍有可以加于國家者棄其邪可也加猶益也棄不責其邪惡也靜女之三章取彤管焉詩􅆁風也言靜女三章之詩雖説美女義在彤管彤管赤管筆女史記事規誨之所執干旄何以告之取其忠也詩鄘風也録干旄詩者取其忠心願告人以善道也言此二詩皆以一善見采而鄧析不以一善存身故用其道不棄其人詩云蔽芾甘棠勿翦勿伐召伯所茇詩召南也召伯决訟於蔽芾小棠之下詩人思之不伐其樹茇草舎也思其人猶愛其樹况用其道而不恤其人乎子然無以勸能矣傳言子然嗣大叔為政鄭所以衰弱陳逆齊大夫也齊簡公之在魯也闞止有寵焉簡公悼公昜生子壬也闞止子我也及即位使為政陳成子憚之驟顧諸朝成子陳常心不安故數顧之諸御鞅言於公曰陳闞不可並也君其擇焉擇用一人弗聽子我夕夕視事陳逆殺人逢之陳逆子行陳氏宗也子我逢之遂執以入執逆至朝陳氏方睦欲謀齊國故宗族和使疾而遺之潘沐備酒肉焉使詐病因内潘沐并得内酒肉潘米汁可以沐頭享守囚者醉而殺之而逃白公勝楚太子建之子也太子建之遇讒也自城父奔宋又避華氏之亂于鄭鄭人甚善之又適晉與晉人謀襲鄭乃求復焉鄭人復之如初晉人使諜於子木請行而期焉請行襲鄭之期子木即建也子木暴虐於其私邑邑人訴之鄭人省之得晉諜焉遂殺子木其子曰勝在吳子西欲召之葉公曰吾聞勝也詐而亂無乃害乎葉公子髙沈諸梁也子西曰吾聞勝也信而勇不為不利舎諸邊境使衛藩焉使為藩屏之衛葉公曰周仁之謂信周親也率義之謂勇率行也吾聞勝也好復言言之所許必欲復行之不顧道理而求死士殆有私乎私謀復讐復言非信也期死非勇也期必也子必悔之弗從召之使處吳竟為白公白楚邑也汝隂褒信縣西南有白亭請伐鄭子西曰楚未節也言楚國新復政令猶未得節制不然吾不忘也他日又請許之未起師晉人伐鄭楚救之與之盟勝怒曰鄭人在此讐不逺矣比子西于鄭人勝自厲劍子期之子平見之曰王孫何自厲也曰勝以直聞不告女庸為直乎將以殺爾父子平以告子西子西曰勝如卵余翼而長之以鳥為喻楚國第用士之次第我死令尹司馬非勝而誰勝聞之曰令尹之狂也得死乃非我言我必殺之若得自死我乃不復成人子西不悛勝謂石乞石乞勝之徒曰王與二卿士二卿子西子期皆五百人當之則可矣乞曰不可得也五百人不可得曰市南有熊宜僚若得之可以當五百人矣乃從白公而見之與之言說告之故辭告欲作亂宜僚辭拒之承之以劍不動挾劍指其喉勝曰不為利謟不為威惕不洩人言以求媚者去之吳人伐愼白公敗之汝隂慎縣也請以戰備獻與吳戰之所得車仗兵噐皆備而獻之欲因此作亂許之遂作亂殺子西子期于朝而刼恵王子西以袂掩面而死慙於葉公大宰嚭吳大夫也嚭既與子胥有隙因讒曰子胥為人剛暴少恩猜賊其怨望恐為深禍也前日王欲伐齊子胥以為不可王卒伐之而有大功子胥恥其計謀不用乃反怨望而今王又復伐齊子胥專愎彊諫沮自吕切毁用事徒幸吳之敗以自勝其計謀耳今王自行悉國中武力以伐齊而子胥諫不用因輟謝佯病不行王不可不備此起禍不難且嚭使人微伺之其使於齊也乃屬其子於齊之鮑氏夫為人臣内不得意外倚諸侯自以為先王之謀臣今不見用嘗怏怏怨望願王早圖之吳王曰微子之言吾亦疑之乃使使賜伍子胥屬鏤鏤力侯反之劔曰子以此死伍子胥仰天歎曰嗟乎謟臣嚭為亂矣王乃反謀我我令若父覇自若未立時諸公子爭立我以死爭之于先王㡬不得立若既得立欲分吳國予我我顧不敢望也然今若聽諛臣言以殺長者乃告其舎人曰必樹吾墓上以梓令可以為噐而抉吾眼縣吳東門之上以觀越冦之入㓕吳也乃自經死趙鞅晉大夫簡子也竇鳴犢舜華晉國之賢大夫也簡子未得志之時須此兩人而後從政及其已得志殺之乃從政須賈為魏中大夫為魏昭王使於齊范睢從之留數月未得報齊襄王聞睢辯口乃使人賜睢金十斤及牛酒睢辭謝不敢受須賈知之大怒以為睢持魏隂事告齊故得此饋令睢受其牛酒還其金既歸心怒睢以告魏相魏齊魏齊大怒使舎人笞擊睢折脅摺齒睢佯死即卷以簀置厠中賔客飲者醉更溺睢故僇辱以懲後令無妄言者睢從簀中謂守者曰公能出我我必厚謝公守者乃請出簀中死人魏齊醉曰可矣范睢得出趙襄子晉大夫也襄子姊前為代王夫人簡子既葬未除服北登夏屋山在廣武請代王使厨人操銅枓以食代王及從者行斟隂令宰人各一作雒以枓擊殺代王及從官遂興兵平代地其姊聞之泣而呼天摩笄自殺代人憐之所死地名之為摩笄之山遂以代封伯魯子周為代成君册府元龜卷七百四十八
