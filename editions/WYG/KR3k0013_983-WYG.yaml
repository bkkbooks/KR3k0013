body:
  text: 册府元龜卷九百八十三宋王欽若等撰外臣部征討第二後漢光武建武十年正月匃奴左南將軍將數千騎救盧芳將賈覽於向桞大司馬吳漢率捕虜將軍王霸等五將軍與戰于平城下破之追出塞斬首數百級十三年漢復將弛刑徒起亭障自代至平城三百餘里凡與匃奴烏桓大小數十百戰十一月先零羌寇金城隴西中郎將來歙率諸將擊羌於五谿大破之隴西襄武縣有五谿聚十一年先零羌寇臨洮隴西太守馬援破降之徙置天水隴西扶風三郡十二年武都叅狼羌反隴西太守馬援討降之十九年九月西南夷寇益州郡故城在今昆州晉寧縣是遣武威將軍劉尚討之二十一年正月諸夷悉平二十一年四月安定屬國胡叛屯聚青山青山在今慶州馬嶺縣西北遣將兵長吏陳訢討平之訢音欣十月遣伏波將軍馬援出塞擊烏桓不克二十三年正月南郡蠻叛遣武威將軍劉尚討破之徙其種人於江夏郡名故城在今安州雲夢縣東南十二月武陵蠻叛寇掠郡縣遣劉尚討戰于沆水武陵郡今郎州也沆水名出牂牁東北過臨洮縣至長沙洞庭湖尚軍敗殁二十四年七月武陵蠻寇臨洮遣謁者李嵩中山太守馬成討蠻不克於是伏波將軍馬援率四將軍討之二十五年十月叛蠻悉降中元元年十二月叅狼羌寇武都敗郡兵隴西太守劉盱遣軍救之及武都郡兵討叛羌皆破之於是軍遂班師明帝以中元二年二月即位九月燒當羌寇隴西敗郡兵于允衙縣名屬金城郡遣謁者張鴻討叛羌于允吾縣名屬金城郡十一月遣中郎將竇固捕虜將軍馬武等二將軍討燒當羌明年七月大破之永平元年史不書月遼東太守祭肜使鮮卑擊赤山烏桓大破之斬其渠帥赤山在遼東西北數千里是年復遣中郎將竇固捕虜將軍馬武等擊滇吾於西邯大破之始復夷叛益州刺史發兵討破之斬其渠帥傳首京師十五年帝欲遵武帝故事擊匃奴通西域以竇固明習邊事固舊隨融在河西曉知邊事拜為奉車都尉以騎都尉耿忠為副忠弇之子謁者僕射耿秉為駙馬都尉秦彭為副皆置從事司馬並出屯涼州明年固與忠率酒泉燉煌張掖甲卒及盧水羌胡案湟水東經臨羌縣故城北又東盧溪水出西南盧川即其地也萬二千騎出酒泉塞耿秉秦彭率武威隴西天水募士及羗胡萬騎出居延塞居延塞在今甘州張掖縣東北太僕祭肜度遼將軍吳棠將河東北地西河羌胡及南單于兵萬一千騎出髙闕塞髙闕山名在朔方北騎都尉來苗䕶烏桓校尉文穆將太原雁門代郡上谷漁陽右北平定襄郡兵及烏桓鮮卑萬一千騎出平城塞固忠至天山即祁連山也今在西川交河縣東北今名祁縣羅漫山擊呼衍王斬首千餘級呼衍王走追至蒲類海蒲類海今名婆悉海在庭州蒲昌縣東南也留吏士屯伊吾盧城伊吾今伊州縣也本匃奴地明帝置宜禾都尉以為屯田故地今伊州納職縣伊吾故小城地也耿秉秦彭絶漠六百餘里至三水樓山匃奴山名中來苖文穆至匃奴河水上虜皆奔走十六年命將帥北征匃奴取伊吾盧城十七年十一月遣奉車都尉竇固駙馬都尉耿秉騎都尉劉張出燉煌崑崙塞崑崙山名因以為塞在今肅州酒泉縣西南山有崑崙之體故名之周穆王見西王母于此山有石室王母臺擊破白山虜於蒲類海上遂入車師章帝建初元年正月酒泉太守叚彭討擊車師大破之二月武陵澧中蠻陳從等叛十月郡兵討破降之九月永昌哀牢夷叛明年三月永昌越嶲益州三州民夷討叛平之二年六月燒當羌叛金城太守郝崇討之敗績羌遂寇漢陽八月遣行車騎將軍馬防討平之斬首一千級其年燒當迷吾與封養種豪布橋等五萬人共寇隴西漢陽於是遣行車騎將軍馬防長水校尉耿恭討之明年四月防等破燒當羗於臨洮三年閠四月西域假司馬班超擊姑墨大破之先是莎車以為漢兵不出遂降於龜兹而䟽勒都尉畨辰亦復反叛㑹假司馬徐幹適至超遂與幹擊畨辰大破之斬首千餘級多獲生口超既破畨辰欲進攻龜兹以烏孫兵强宜因其力乃上言烏孫大國控弦十萬故武帝妻以公主至孝宣皇帝卒得其用今可遣使招慰與共合力帝納之復遣假司馬和恭等四人將兵八百詣超超因發䟽勒于闐兵擊莎車莎車陰通使䟽勒王忠啖以重利忠遂反從之西保烏郎城超乃更立其府丞成大為䟽勒王悉發其不反者以攻忠積半歲而康居遣精兵救之超不能下是時月氏新與康居為婚相親超乃使使多齎錦帛遣月氏王令曉示康居王康居王乃罷兵執忠以歸其國烏郎城遂降於超後三年忠説康居王借兵還據損中損中未詳東觀記作頓中續漢書及華嶠書並作損中本或作植未知其孰是也密與龜兹謀遣使詐降於超超内知其姦而外偽許之忠大喜即從輕騎詣超超密勒兵待之為供張設樂供音居角切張音竹亮切酒行乃叱吏縛忠斬之因擊破其衆殺七百餘人南道於是遂通後永元三年超為西域都䕶徐幹為長史拜白霸為龜兹王遣司馬姚光送之超與光共脅龜兹廢其王尤利多而立白霸使光將尤利多還詣京師超居龜兹此乾城徐幹屯䟽勒西域惟焉耆危須尉犁以前没都䕶懷二心其餘悉定六年秋超遂發龜兹鄯善等八國兵合七萬人及吏士賈客千四百人討焉耆兵到尉犁界而遣曉説焉耆尉犁危須曰都䕶來者欲鎮撫三國即欲改過向善宜遣大人來迎賞賜王侯已下事畢即還今賜王綵五百疋焉耆王廣遣其左將北鞬支奉牛酒迎超超詰鞬支曰汝雖匃奴侍子而今秉國之權都䕶自來王不以時迎皆汝罪也或謂超可便殺之超曰非汝所及此人權重於王今未入其國而殺之遂令自疑設備守險豈得到其城下哉於是賜而遣之廣乃與大人迎超於尉犁奉獻珍物焉耆國有葦橋之險廣乃絶橋不欲令漢軍入國超便從他道厲度七月晦到焉耆去城二十里正營大澤中廣出不意大恐乃欲悉驅其人共入山保焉耆左侯元孟先常質京師密遣使以事告超即斬之示不信用乃期大㑹諸國王因揚聲重加賞賜於是焉耆王廣尉犁王汎及北鞬支等二十人相率詣超其國相腹久等十七人懼誅皆亡入海十七字或為七十而危須王亦不至坐定超怒詰廣曰危須王何故不到腹久等所縁逃亡遂叱吏士收廣汎等於陳睦故城斬之傳首京師因縱兵鈔掠斬首五千餘級獲生口萬五千人馬畜牛羊三十餘萬頭更立元孟為焉耆王半歲慰撫之於是西域五十餘國悉皆納質内屬焉五年三月荆豫諸郡兵討破武陵漊中叛蠻先是三年冬漊中蠻覃兒健等復反攻燒零陽作唐孱陵界中明年春發荆州七郡及汝南潁川弛刑徒吏士五千餘人拒守零陽募充中五里蠻精夫不叛者四千人擊漊中賊五年春覃兒徤等請降不許郡因進兵與戰于宏下大破之斬兒健首餘皆棄營走還漊中者也章和元年春羌胡雜種叛䕶羌校尉傅育上請發隴西張掖酒泉各五千人諸郡太守將之育自領漢陽金城五千人合二萬兵與諸郡尅期擊之命隴西兵據河南張掖酒泉兵遮其西并未及㑹育軍獨進迷吾聞之徙廬落去育選精騎三千窮追之夜至建威南三兠谷去虜數十里須旦擊之不設備迷吾乃伏兵三百人夜突育營營中驚壞散走育下馬手戰殺十餘人而死死者八百八十人及諸郡兵到羌遂引去七月燒當羌寇金城䕶羌校尉劉旴討之斬其渠帥和帝以章和二年二月即位十月以侍中竇憲為車騎將軍伐北匃奴永元元年六月車騎將軍竇憲出雞鹿塞今在朔方窳渾縣北闞駰十三州志云窳縣有大道西北出雞鹿塞窳音羊王切度遼將軍鄧鴻出棝陽塞棝陽縣屬五原郡故城在今勝州銀城縣界棝音固南單于出滿夷谷滿夷谷關名與北匃奴戰於稽落山大破之追至和渠北鞮海憲遂登燕然山刻石勒功而還二年五月月氐國遣兵攻西域長史班超擊降之三年二月大將軍竇憲遣左校尉耿䕫出居延塞居延縣屬張掖郡圍北單于於金㣲山大破之獲其母閼氏四年冬漊中澧中蠻潭戎等反燒燔郵亭殺畧吏民武陵郡兵擊破降之五年九月北匃奴單于於除鞬自畔還北帝遣將兵長史王輔以千餘騎與中郎將任尚共追誘將還斬之破滅其衆是年䕶羌校尉貫友討燒當羌羌乃遁去南單于安國叛骨都侯喜斬之六年七月西域都䕶班超大破焉耆尉犁斬其王南單于安國從弟子逢侯率叛胡亡出塞九月癸丑以光禄勲鄧鴻行車騎將軍事與越騎校尉馮柱行度遼將軍朱徽使匃奴中郎將杜崇討之十一月䕶烏桓校尉任尚率烏桓鮮卑大破逢侯闞駰十三州志云䕶烏桓擁節秩比二千石武帝置以䕶内附烏桓既而并於匃奴中郎將中興初班彪上言宜復此官以招附東胡於是復更置焉馮柱遣兵追擊復之武陵漊中蠻叛郡兵討平之八年五月南匃奴右溫禺犢王叛為寇七月行度遼將軍龎奮越騎校尉馮柱追討斬右溫禺犢王是年衆羌擊破隴西兵殺大夏長遣行征西將軍劉尚越騎校尉趙代副將北軍五營黎陽雍營三輔積射及邊兵羌胡三萬人討之九年三月遣西域將兵長史王林發涼州六部兵及羌虜胡二萬餘人以討車師後部王涿鞮獲首虜千餘人涿鞮入北匃奴漢軍追擊破之立涿鞮弟農竒為王七月燒當羌寇隴西殺長史遣行征西將軍劉尚越騎校尉趙世等討破之十二年四月日南象林蠻夷二千餘人寇掠百姓燔燒官寺郡縣發兵討擊斬其渠帥餘衆乃降十三年二月西羌迷唐復將兵向塞䕶羌校尉周鮪與金城太守侯覇及諸郡兵屬國湟中月氏諸隴西牢姐羌合三萬人出塞至允州與迷唐戰周鮪還營自守惟侯覇兵陷陳斬首四百餘級羌衆折傷種人瓦解降者六千餘口分徙漢陽安定隴西迷唐遂弱其種衆不滿千人遠踰賜支河首依發羌居十四年四月遣使者督荆州兵討巫蠻破降之安帝永初三年十月南單于叛圍中郎將耿种於羙稷遣車騎將軍何熈度遼將軍梁慬等討之明年正月破之於屬國故城一云三年夏漢人韓琮隨南單于入饑朝既還説南單于云䦕東水潦人民餓死盡可擊也單于信其言遂起兵反叛攻中郎耿种於羙稷秋彪卒冬遣行車騎將軍何熈副中郎龎雄擊之四年春擅遣千餘騎寇常山中山以西域校尉梁慬行度遼將軍與遼東太守耿䕫擊單于單于見諸軍並進大恐怖顧謂韓琮曰汝言漢人死盡今是何等人也乃遣使乞降許之單于脱㡌徒跣對龎雄等拜陳道死罪於是赦之遇待如初乃還所鈔漢民男女及羌所畧轉賣入匃奴中者萬餘人五年九月先零諸種羌攻陷上邽城七年七月䕶羌校尉侯覇騎都尉馬賢討破先零羌元初二年三月先零羌寇益州詔遣中郎將尹就討之十二月武陵澧中蠻叛州郡擊破之又云元初二年灃中蠻以郡縣徭稅失平懷怨憾遂結充中諸種二千餘人攻城殺長吏州郡募五里蠻夷六亭兵擊破之三年正月蒼梧鬰林合浦蠻夷反叛二月遣侍御史任逴督州郡兵討之五月武陵蠻夷叛州郡討破之又云是年秋漊中蠻四千人並為盜賊又零陵蠻羊孫陽湯等千餘人著赤幘稱捋軍燒官寺鈔掠百姓州縣募善蠻討平之是月度遼將軍鄧遵率南匃奴擊先零羌於靈州破之六月中郎將任尚將羽林緹騎五營子弟三千五百人屯三輔尚遣兵擊破先零羌於丁奚城十二月尚又遣假司馬募陷陣士擊零昌於北地殺其妻子得牛馬羊二萬頭燒其廬落親斬首七百餘級得僣號文書及所假諸將印綬四年十二月中郎將任尚將諸郡兵與馬賢並進北地擊狼莫賢先至安定青石崖狼莫逆擊敗之㑹尚兵到高平因合勢俱進狼莫等引退乃轉營廹之至北地相持六十餘日戰於富平河上大破之斬首五千級還得所畧人男女千餘人牛馬驢羊駱駝十餘萬頭狼莫逃走五年正月越嶲夷以卷夷大牛種等反叛永昌益州蜀郡夷皆叛應之破壞二十餘縣詔益州刺史張喬選堪能從事討之喬遣從事楊竦將兵至楪榆擊之斬首三萬餘級六年春姐種與隴西種羌號良等通謀欲反䕶羌校尉馬賢逆擊之於安胡斬號良及種人數百級餘皆降散七月鮮卑寇馬城在今朔州度遼將軍鄧遵率南單于擊破之建光元年正月幽州刺史馮煥率二郡太守討高句驪濊貊不尅又云元初五年句驪復與濊貊寇𤣥莵攻華臺城建光元年春幽州刺史馮煥𤣥莵太守遼東太守蔡諷等將兵出塞擊之捕斬濊貊渠帥獲兵馬財物其秋句驪又率馬韓濊貊數千騎圍𤣥莵扶餘王遣子尉仇台將二萬餘人與州郡并力討破之斬首五百餘級延光元年七月虔人種羌與上郡胡反叛攻榖羅城屬西河郡度遼將軍耿􅇪將諸郡兵及烏桓騎赴擊破之二年正月旄牛夷叛寇靈開殺縣令靈開道屬越嶲郡益州刺史屬郡西部都尉討之三年五月南匃奴左日逐王叛使匃奴中郎將馬翼討破之時烏稽侯尸逐鞮單于新降一部大人阿族等遂反叛脅呼尤徽欲與俱去呼尤徽曰我老矣受漢家恩寧死不能相隨衆欲殺之有救之者得免阿族等遂將妻子輜重亡去翼遣兵與胡騎追擊破之斬首及自投河死者殆盡殆近也死盡所餘無幾獲馬牛羊萬餘頭四年西域長史班勇擊車師後王軍就初永寧元年軍就反叛殺後部司馬及燉煌行事至是大破斬之順帝永建元年二月隴西種羌叛䕶羗校尉馬賢將七千餘人戰于臨洮斬首千餘級皆率衆人降自是涼州無事二年二月鮮卑寇遼東𤣥莵䕶烏桓校尉耿􅁮率南單于擊破之六月西域長史班勇燉煌太守張朗討焉耆尉犁危須三國破之陽嘉元年燉煌太守徐繇遣䟽勒王臣槃發二萬人擊于闐先是永建四年于闐王放前殺拘彌王興自立其子為拘彌王而遣使者貢獻於漢繇上言求討之帝赦于闐罪令歸拘彌國放前不肯至是繇討破之斬首數百級放兵大掠更立興宗人成國為拘彌王而還二年三月使匃奴中郎將王稠率左骨都侯等擊鮮卑破之三年四月車師後部司馬率後部王加特奴等掩擊匃奴大破之獲其季母七月鍾羌良封等寇隴西漢陽䕶羌校尉馬續擊破之斬首千八百級獲馬牛羊五萬餘頭復進擊鍾羌且昌且昌等詣凉州降永和二年二月廣漢屬國都尉擊白馬羌斬首六百餘級初羌攻破屯官反叛連年至是破之䕶羌校尉馬賢又擊斬其渠帥饑指鬼祖等二百級於是隴右復平三年十月燒當種耶離等三千餘騎突金城塞馬賢將兵赴擊斬首四百餘級獲馬千四百匹是年冬澧中漊中蠻二千人圍充城八千人寇夷道遣武陵太守李進討破之四年四月馬賢討燒當大破之斬耶離獲首虜千二百餘級五年四月南匃奴左部句龍大人吾斯車紐等叛圍羙稷度遼將軍馬續討破之九月且凍傅難種羌等反叛攻金城與西塞及湟中雜種羌胡大寇三輔殺害長吏發京師近郡及諸州兵討之拜李賢為征西將軍以騎都尉耿叔副將左右羽林五校士及諸州郡兵十萬人屯漢陽又於扶風漢陽作塢壁三百所置屯兵以保聚百姓且凍分遣種人寇武都燒隴關掠苑馬十一月匃奴中郎將張眈將幽州烏桓諸郡營兵擊畔虜車紐等戰於馬邑斬首三千級獲生口及兵器牛羊甚衆車紐等將諸豪帥骨都侯乞降六年正月東西羌大合鞏唐羌種三千餘騎寇隴西遣中郎將龎浚募勇士千五百人頓羙陽為涼州援武都太守趙冲追鞏唐羌斬首四百餘級得馬牛羊驢萬八千餘頭羌二千餘人降五月使匃奴中郎將張眈大破烏桓羌胡於天山一云眈將吏兵繩索相懸上通天山又是年征西將軍馬賢將五六千騎擊且凍難種羌等到射姑山賢軍敗漢安二年四月䕶羌校尉趙冲與漢陽太守張貢擊燒當羌於參戀破之參戀屬安定郡先是元年罕種羌率邑落五千餘戸詣冲降惟燒何種三十餘落據叅戀北界至是掩擊之斬首千五百級得牛羊驢十八萬頭閠十月趙冲擊諸種斬首四千餘級復追擊於河陽縣名屬天水郡斬首八百級於是諸種前後詣涼州刺史降建康元年三月䕶羌從事馬𤣥為諸羌所誘時羌衆亡出塞領䕶羌校尉衛琚追擊𤣥等斬首八百餘級得牛馬二十餘萬頭四月使匃奴中郎將馬實擊南匃奴左部破之於是胡羌烏桓悉詣實降桓帝建和二年白馬羌寇廣漢屬國殺長史是時西羌及湟中胡復叛為寇益州刺史率板楯蠻討破之永壽元年七月南匃奴左臺且渠伯德等叛寇羙稷安定屬國都尉張奐討除之三年四月九眞蠻夷叛太守兒式討之戰没遣九眞都尉魏朗擊破之延熹元年十二月鮮卑寇邊使匃奴中郎將張奐率南單于擊破之二年十二月燒當等八種羌叛寇隴右䕶羌校尉叚熲追擊於羅亭破之一云追到積石山即羅亭相近今在鄯州三年閠正月燒當羌叛寇張掖䕶羌校尉叚熲追擊於積石山大破之十一月勒姐羌圍允街叚熲擊破之四年十月先零沈氏羌與諸種羌寇并涼二州十一月中郎將皇甫規監關西兵擊破之斬首八百級降者十餘萬五年七月烏吾羌寇漢陽隴西金城諸郡兵討破之八月武陵蠻叛寇長沙十月寇江陵以太常馮鯤為車騎將軍討之十一月大破於武陵七年十月䕶羌校尉叚熲擊當煎羌破之八年二月叚熲擊罕姐羌破之六月叚熲擊當煎羌於湟中大破之今鄯州湟水縣九年六月南匃奴及烏桓鮮卑分騎數萬人入縁邊九郡並殺掠吏人七月遣匃奴中郎將張奐擊之鮮卑乃出塞去南匃奴烏桓率衆詣奐降永康元年正月先零羌寇三輔使匃奴中郎將奐破平之當煎羌寇武威䕶羌校尉叚熲追擊於鸞烏大破之鸞烏縣名屬武威郡十月先零羌寇三輔中郎將張奐擊破之靈帝建寧元年七月破羌將軍叚熲復破先零羌於涇陽縣名屬安定郡二年七月叚熲大破先零羌於射虎塞外谷東羌悉平九月江夏蠻叛州郡討平之是年𤣥莵太守耿臨討高句驪斬首數百級其王伯固降服乞屬𤣥莵熹平五年益州郡諸夷反叛執太守雍陟遣御史中丞朱龜討之不能尅太尉掾巴郡李顒建策討伐乃拜顒益州太守與刺史龎芝發板楯蠻擊破平之還得雍陟顒卒後夷人復叛以廣漢景毅為太守討平之光和二年十月巴郡板楯蠻叛遣御史中丞蕭瑗督益州刺史討之中平三年十月武陵蠻叛寇郡界郡兵討破之五年十一月巴郡板楯蠻叛遣上軍别駕司馬趙瑾討平之獻帝建安十二年八月司空曹公大破烏桓於桞城斬其蹋頓蹋頓匃奴王號柳城今營州縣時蹋頓驍武邊長老皆比之冐頓恃其阻遠敢受亡命以雄百蠻公潜師北伐出其不意一戰而定夷狄懾服威振朔土遂引烏桓之衆服從征討而邊民得用安息初公之北征三郡烏桓五月至無終七月大水傍海道不通田疇請為鄉導公從之引軍出盧龍塞塞外道絶不通乃塹山堙谷五百餘里經白檀歴平岡渉鮮卑庭東指柳城未至二百里虜乃知之尚熈與蹋頓遼西單于樓班右北平單于能臣抵之等將數萬騎逆軍八月登白狼山卒與虜遇衆甚盛公車重在後被甲者少左右皆懼公登高望虜陣不整乃縱兵擊之使張遼為先鋒虜衆大潰斬蹋頓及名王巳下胡漢降者二十餘萬口遼東單于速僕丸及遼西北平諸豪棄其種人與尚熈奔遼東衆尚有數千騎二十三年四月代郡上谷烏桓無臣氐等叛魏王曹公遣鄢陵侯彰討破之魏文帝黄初二年十一月鎮西將軍曹眞命衆將及州郡兵討破叛胡治元多盧水封賞等斬首五萬餘級獲生口十萬羊一百一十一萬口牛八萬河西遂平六年三月并州刺史梁習討鮮卑軻比能大破之明帝青龍元年六月保塞鮮卑大人歩度根與叛鮮卑大人軻比通私通并州刺史畢軌表輙出軍以外威比能内鎮歩度根帝省表曰歩度根以為比能所誘有自疑心今軌出軍適使二郡驚合為一何所威鎮乎促勅軌以出軍者慎勿越塞過句注也比詔書到軌已進軍屯陰舘遣將軍蘇尚董弼追鮮卑比能遣子將千餘騎迎歩度根部落與尚弼相遇戰于樓煩二將没歩度根部落皆叛出塞與比能合寇邊帝遣驍騎將軍秦朗將中軍討之虜乃走漢北比能將其部衆降是後帝乃聽王雄遣劍客刺之然後種落離散互相侵伐强者遠遁近者請服繇是邊隣益安漢南少事雖時頗鈔盜不能復相扇動矣景初元年秋遣幽州刺史毋丘儉率衆軍討遼東右北平烏丸單于寇婁敦遼西烏丸都督率衆王䕶留等昔隨袁尚奔遼西聞儉軍至率衆五千餘人降寇婁敦遣弟阿羅槃等詣闕朝貢封其渠帥三十餘人為王侯齊王正始七年二月幽州刺史毋丘儉討高句驪五月討濊貊皆破之韓那奚等數十國各率種落降八年隴西南安金城西平諸羌餓阿燒戈伐同蛾遮塞等相結叛亂攻圍城邑南招蜀兵涼州名胡治無載復叛應之討蜀䕶軍夏侯覇諸軍屯為翅時雍州刺史郭淮軍始到狄道議者僉謂宜先討定枹罕内平惡羌外折賊謀淮策蜀將姜維必來攻覇遂入渢中轉南迎覇維果攻為翅㑹淮軍適至維遁退進討叛羌斬餓阿燒戈降服者萬餘落九年遮塞等屯河關白土故城據河拒軍淮見形上流密於下渡兵據白土城擊大破之治無載圍武威家屬留在西海淮進軍􅃐西河欲掩取其累重㑹無載折還與戰於龍夷之北破走之令居西虜在石頭山之西當大道止斷絶王使淮還過討大破之册府元龜卷九百八十三
