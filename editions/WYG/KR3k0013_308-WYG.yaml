  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_308-1a}
body:
  text: 冊府元龜卷三百八宋王欽若等撰宰輔部總序夫輔相之職所以左右天子總領庶尹彌綸機務宣翼統紀燮調元化甄敘流品親附百姓鎮撫四夷裁決庶政班布王度乃其任也是故公台之任無所不總與元首而同體乃謂之股肱秉邦國之會要乃譬之鈞軸百官承式治本之是繫萬邦為憲民瞻之所在自黄帝得六相而治舜臣於堯舉八元八凱謂之十六相又逸書所記虞夏商周世皆有四輔三公之職非其人而不處而六籍之載成湯居亳初置二相以伊尹仲虺為之有阿衡佐相之號洎武丁之得傅説爰立作相置諸左右成王作周官著之典訓立太師太傅太保以為三公又立三孤之位皆所以論道經邦寅亮天地共司宰弼之事春秋之世寰内諸侯入為卿士皆掌國政秦氏之霸始置左右丞相御史大夫副之後復有丞相相國中丞相之名漢室之興置一丞相亦有左右丞相之名而御史大夫實亞其任兼置太尉仍用秦制後以蕭何為相國孝惠高后復置左右丞相亦置太傅之官未幾而罷太尉之職盖不嘗置一丞相武帝兼置太尉數年而廢元狩中置大司馬以代太尉之職征和二年置左丞相分長史以備兩府成帝綏和元年改御史大夫為大司空并大司馬丞相為三公哀帝復以大司空為御史大夫復置太傅在三公之上俄改丞相為大司徒御史大夫復為大司空并大司馬以備三公之位平帝增置太師王莽居攝又置四輔之官世祖中興但存三公之號有太傅而不嘗置建武末改大司馬為太尉二府並去太字是為宰相總治衆務中平之後事歸臺閣選舉誅賞一繇尚書機衡所總不在公府盖有其名而無其實矣建安之世始罷三公官復置丞相以曹公居之又有相國之號黃初受禪改為司徒而中書監令專掌機宻雖有太傅太尉司徒司空之官不預朝政厥後定制大丞相第一品又置相國以司馬二王相繼為之末年增置太保呉蜀鼎國皆有丞相而呉氏復有左右之名二邦政事率以尚書總綂而呉有大司馬左右大司馬太尉司徒司空及帝太傅蜀亦有司徒大司馬之號其平尚書事録尚書事領中外諸軍事總綂國事皆為宰相之任晉武之初有太宰太傅太保是為上公以太尉司徒司空為三公復有大司馬大将軍凡八公同時並置而無丞相之名惠帝復置丞相俄頃而罷後置司徒元帝渡江罷司徒為丞相以王導居之導卒又罷丞相為司徒府三公之職雖無所改而司徒丞相兩不並置中書之署實總機要是為宰相以毗大政宋孝武復置丞相而司徒之府如故又有相國之官齊氏以丞相相國著為贈典梁罷相國置丞相兼置司徒又有太保大司馬大将軍太尉司空開府儀同三司是為諸公陳以相國列於丞相之上并太宰太保大司馬大将軍凡六號亦有贈秩然而相國是為尊崇之位非尋常之秩丞相之任亦廢置靡定魏晉以來多以他官㕘掌機宻或委知政事毗贊朝政録尚書事居門下領中書或總朝權或管朝政或單侍中皆為宰相唯侍中機宻所出不必他名嘗為宰相之職元魏以太師太傅太保為三師大司馬大将軍為二大又有三公之名然尤重門下之官多以侍中輔政樞宰之任歸於省闥北齊初置丞相復分左右而居侍中之職者皆秉國政宇文建國逺遵周治改三師為三公置三孤以為之二分司徒司馬司空以備六官之職而無復太尉三師之號宣帝復置四輔之官又置左右丞相既而罷為大丞相隋置三師三公㕘議國之大事朝之衆務總於臺閣内史令納言是為宰輔或以他官㕘掌機事及專掌朝政者並為輔弼其後納言為侍内唐室受命悉仍隋制武徳初改内史令為中書令侍内為侍中并左右僕射是為四輔至貞觀末除僕射者必加同中書門下三品方為宰相而中書令侍中之名自龍朔至天寶凡經四易中書令為右相為内史為紫㣲令復為右相侍中為左相為納言為黄監復為左相凡四易名而侍中復舊而嘗為宰相其單任僕射不復預於機政先天以前宰相多至十餘人開元之後嘗二人至三人天寶之末勲賢並建備位者衆然秉鈞當國亦不過一二人繇武徳貞觀以來但加同中書門下三品及平章事知政事㕘掌機務參與政事平章軍國重事者皆為宰相唐初宰相嘗於門下省議事謂之政事堂永淳中裴炎為中書令以中書就政事遂移在中書省開元中張説奏改政事堂為中書門下政事印為中書門下之印其後唯侍中中書令及平章事是為正宰相之任五代相承未之或改後唐及周亦有同中書門下三品盖辟當時臣父之名非嘗制也今之論次繇二帝三代以託於顯徳凡居輔弼之任美惡之迹悉區别而類例之唐氏中葉有樞宻之任宣𫝊制命掌以内侍宋梁而降大建官署崇署使號並分史局兵戎之政邦國之務多所參掌均於宰府迹其行事咸用編述凡宰輔部四十二門佐命商頌曰實維阿衡實左右商王説命曰若濟巨川用汝作舟楫夫天造草昧真人撫運允資英傑戡濟時艱故有感㑹風雲奮起草莽朝捨屠釣之業夕為廊廟之器倚任如手足相諧如律呂服勞保乂曠日持久厥有成績紀于太常降及秦漢世資戰力以强國之術干好謀之主運籌帷幄指蹤将佐轉禍為福易危從安罄竭力貞輔成景業者何可勝道哉乃至運屬陽九雄視一方亦必有縱橫之才倜儻之士咸能矢陳逺馭贊集洪勲者矣商伊尹初欲干湯而無繇乃為莘氏媵臣湯妃有莘氏女負鼎爼以滋味説湯致於王道或曰伊尹處士湯使人聘迎之五反然後肯往從湯言素王九主之事九主者有法君專君授君勞君等君寄君破君國君三歳社君九九品圖畫其形出劉向别録湯舉任以國政孟云伊尹耕於有莘之野而樂堯舜之道焉非其義也非其道也祿之以天下弗顧也繫馬千駟弗視也非其義也非其道也一介不以與人一介不以取諸人湯使人以幣聘之囂囂然曰我何以湯之聘幣為哉我豈若處畎畆之中由是以樂堯舜之道哉湯三使往聘之既而幡然改曰與我處畎畆之中由是以樂堯舜之道吾豈若使是君為堯舜之君哉吾豈若使是民為堯舜之民哉吾豈若於吾身親見之哉當是時夏桀為虐政淫荒而諸侯昆吾氏為亂湯乃興師率諸侯伊尹從湯湯自把鉞以伐昆吾遂伐桀勝夏於是諸侯畢服湯乃踐天子位平定海内周吕尚東海人謂東夷之士本姓姜氏後從其封姓夏商之時申呂也尚盖嘗困窮年老矣以漁釣干周西伯西伯將出獵卜之曰所獲非龍非彲非虎非羆所獲霸王之輔於是西伯獵果遇太公於渭之陽與語大悦曰自吾先君太公曰當有聖人適周周以興子真是邪吾太公望子久矣故號之太公望載與俱歸立為師或曰太公𫝊聞嘗事紂紂無道去之遊説諸侯無所遇而卒西歸周西伯或曰呂尚處士隱海濵周西伯拘羑里散宜生閎夭素知而招呂尚呂尚亦曰吾聞西伯賢又善養老盍往焉三人者為西伯求美女竒物獻之於紂以贖西伯西伯得以出反國言呂尚所以事周雖異然要之為文武師周西伯昌之脱羑里歸與呂尚隂謀修德以傾商政其事多兵權與竒計故後世之言兵及周之隂權皆宗太公為本謀周西伯政平及斷虞芮之訟而詩人稱西伯受命曰文王伐崇宻須犬夷大作豐邑天下三分其二歸周者太公之謀計居多以後事皆将帥佐命門周公旦武王弟也自文王在時旦為子孝篤仁異於羣子及武王即位旦嘗輔翼武王用事居多武王九年東伐至盟津周公輔行十一年伐紂至牧野周公佐武王作牧誓破殷入商宮以殺紂周公把大鉞召公把小鉞以夾武王釁社告紂之罪于天及殷民封周公於少昊之墟曲阜是為魯公不就封留佐武王武王終成王少在襁褓之中周公恐天下聞武王終而畔周公乃踐祚代成王攝行政當國管叔及其羣弟流言於國曰周公将不利於成王放言於國以誣周公以惑成王也周公乃告太公望召公奭曰我之所以弗辟而攝行政者誠恐天下畔周無以吿我先王太王王季文王三王之憂勞天下久矣於今而后成武王蚤終成王少将以成周我所以為之若此於是卒相成王而使其子伯禽代就封於魯召穆公虎康公之後也厲王時王無道出奔彘王太子靜匿召公之家國人圍之召公乃以其子代王太子太子竟得脱召公與周公二相臣欽若等曰周公即旦之後世行政號曰共和共和十四年厲王死於彘太子靜長于召公家二相乃共立之為王是為宣王宣王即位二相輔之脩政法文武成康之遺風諸侯復宗周秦李斯楚上蔡人入秦為秦相呂不韋舍人不韋賢之任以為郎斯因以得説秦王曰胥人者去其幾也成大功者在因瑕釁而遂忍之昔者秦穆公之霸終不東并六國者何也諸侯尚衆周徳未衰故五霸迭興更尊周室自秦孝公以來周室卑微諸侯相兼闗東為六國秦之乗勝役諸侯盖六世矣今諸侯服秦譬若郡縣夫以秦之彊大王之賢繇竈上騷除騷音掃足以滅諸侯成帝業為天下一統此萬世之一時也今怠而不急就諸侯復彊相聚約從雖有黄帝之賢不能并也秦王乃拜長史聽其計隂遣謀士齎持金玉以㳺説諸侯諸侯名士可下以財者厚遺結之不肯者利劔刺之離其君臣之計秦王乃使其良将隨其後秦王拜斯為客卿秦王用其計謀官吏廷尉二十餘年竟并天下尊王為皇帝以斯為丞相夷羣縣城銷其兵刃示不復用漢蕭何沛人為沛主吏掾高祖為布衣時數以吏事䕶高祖至為亭長亦嘗佑之及高祖起為沛公何嘗為丞督事謂為沛丞專督衆事沛公至咸陽諸将皆争走金帛財物之府分之走謂趣向之何獨先入收秦丞相御史律令圖書藏之沛公具知天下阨塞户口多少彊弱處民所疾苦者以何得秦圖書也沛公既為漢王欲謀攻項羽周勃灌嬰樊噲皆勸之何諫之曰雖王漢中之惡不猶愈於死乎漢王曰何為乃死也何曰今衆弗如百戰百敗不死何為周書曰天予不取反受其咎語曰天漢其稱甚美語古語也天漢河漢夫能詘於一人之下而信於萬乗之上者湯武是也臣願大王王漢中養其民以致賢人收用巴蜀還定三秦天下可圖也漢王曰善乃就國以何為丞相何進韓信以為大将軍漢王還定三秦何以丞相留收巴蜀鎮撫諭告使給軍食漢三年漢王與諸侯擊楚何守關中侍太子治櫟陽為令約束立宗廟社稷宫室縣邑輒奏上可許以從事可其所奏許其所請依以行事即不及奏輒以便宜施行王來以聞高祖出還乃以所為聞也計户轉漕給軍漢王數失軍遯去何嘗興關中卒輒補缺王以此剸屬任何闗中事是年四月漢王與項籍戰敗睢水五月屯滎陽何發闗中老弱未傳者悉詣滎陽傳著也言著名籍給公家徭役也戰京索間敗楚楚以故不能過滎陽而西韓信亦收兵與漢王㑹兵復大振漢五年既殺項籍即皇帝位論功行封羣臣争功歳餘不決高祖以何功最盛先封為酇侯酇屬南陽食邑八千户九年拜丞相為相國曹参沛人秦時為獄掾與蕭何俱為豪吏高祖為沛公参以中涓從涓潔也言其在中主知潔清洒近之事盖親近左右也擊胡陵方與攻秦監公軍大破之秦一郡置守尉監三人公者時人尊稱之東下薛擊泗水守軍薛郭西復攻胡陵臣欽若等曰此已下有官號無姓名及有名無姓皆史氏闕文取之徙守方與方與反為魏擊之豐反為魏攻之賜爵七大夫北擊司馬欣軍碭東取狐父祁善置善置置名今之驛也狐父祁二縣名又攻下邑以西至虞擊秦将章邯車騎攻轅戚及亢父先登遷為伍大夫北救東阿擊章邯軍陷陳追至濮陽攻定陶取臨濟南救雍丘擊李繇軍破之殺李繇虜秦侯一人章邯破殺項梁也沛公與項羽引兵而東楚懐王以沛公為碭郡長将碭郡兵於是封参為執帛楚爵也號曰建成君遷為戚公屬碭郡為戚縣之令其後從攻東郡尉軍破之成武南擊王離軍成陽南又攻社里大破之追北西至開封擊趙賁軍破之圍趙賁開封城中西擊秦将楊熊軍於曲遇破之虜秦司馬及御史各一人遷為執珪爵名從西攻陽武下轘轅緱氏絶河津擊趙賁軍尸北破之尸鄉之北從南攻犨與南陽守齮戰陽城郭東陷陳取宛虜齮定南陽郡從西攻武關嶢關取之前攻秦軍藍田南又夜擊其北軍大破之遂至咸陽破秦項羽至以沛公為漢王漢王封参為建成侯從至漢中遷為将軍從還定三秦攻下辯故道武都二縣雍斄二縣名在扶風擊章平軍於好畤南破之圍好畤取壤鄉壤地名擊三秦軍壤東及高櫟破之復圍章平平出好畤走因擊趙賁内史保軍破之東取咸陽更名曰新城參将兵守景陵二十四日景陵縣名三秦使章平等攻参参出擊大破之賜食邑於寧秦今華隂以将軍引兵圍章邯廢丘以中尉從漢王出臨晉闗至河内下修武度圍津在東郡東擊龍且項佗定陶破之東取碭蕭彭城擊項籍軍漢軍大敗走参以中尉圍取雍丘王武反於外黄程處反於燕漢将燕東郡之縣往擊盡破之天柱侯反衍氏進破取衍氏擊羽嬰於昆陽追至葉葉南陽縣還攻武彊武彊城在陽武因至滎陽参自漢中為将軍中尉從擊諸侯及項羽敗還至滎陽敗謂彭城戰敗漢二年拜為假左丞相入屯兵闗中月餘魏王豹反以假左丞相别與韓信東攻魏将孫遫東張東張屬河東大破之因攻安邑得魏将王襄擊魏王於曲陽追至東垣生獲魏王豹取平陽得豹母妻子盡定魏地几五十二縣賜食邑平陽因從韓信撃趙相國夏説軍於鄔東鄔大原縣也大破之斬夏説韓信與故常山王張耳引兵下井陘撃成安君陳餘而令参還圍趙别将戚公於鄔城中戚公出走追斬之廼引兵詣漢王在所韓信已破趙為相國東撃齊参以左丞相屬焉攻破齊厯下軍遂取臨淄還定濟北郡收著漯隂平原鬲盧五縣名時未有濟北郡史追書之已而從韓信擊龍且軍於上假宻一作高宻大破之斬龍且虜其亞将周蘭定齊郡凡得七十縣得故齊王田廣相田光其守相許章謂為相居守者及故將軍田既韓信立為齊王引兵東詣陳與漢王共破項羽而參留平齊未服者漢王即皇帝位韓信徙為楚王參歸相印焉後漢鄧禹字仲華南陽新野人年十三能誦詩受業長安時光武亦逰學京師禹年雖㓜而見光武知非常人遂相親附數年歸家及漢兵起更始立豪傑多薦舉禹禹不從及聞光武安集河北即仗䇿北渡追及於鄴光武見之甚歡謂曰我得專封拜生逺來寧欲仕乎禹曰不願也光武曰即如是何欲為禹曰但願明公威徳加於四海禹得效其尺寸垂功名於竹帛耳光武笑因留宿閒語私語也禹進説曰更始雖都關西今山東未安赤眉青犢之屬動以萬數三輔假號往往羣聚更始既未有所挫而不自聽斷諸将皆庸人崛起念在財幣争用威力朝夕自快而已非有忠良明智深謀逺圖欲尊主安民者也四方分隳離析形勢可見明公雖建藩輔之功猶恐無所成立於今之計莫如延攬英雄務悦民心立高祖之業救萬民之命以公而慮天下不足定也光武大悦因令左右號禹曰鄧将軍嘗宿止於中與定計議及王朗起兵光武自薊至信都使禹發奔命得數千人令自将之别攻拔樂陽縣名屬常山從至廣阿光武舍城樓上披輿地圖指示禹曰天下郡國如是今始乃得其一子前言以吾慮天下不足定何也禹曰方今海内淆亂人思明君猶赤子之慕慈母古之興者在德厚薄不以大小光武悦時任使諸将多訪於禹禹每有所舉者皆當其才光武以為知人使别将騎與盖延等擊銅馬於清陽延等先至戰不利還保城為賊所圍禹遂進與戰破之生獲其大将光武追賊至蒲陽連大克獲北州畧定及赤眉西入闗光武方事山東故授禹以西討之畧拜為前将軍持節中分麾下精兵二萬人遣西入闗建武元年正月禹自箕闗将入河東箕闗在今王屋縣東河東都尉守闗不開禹攻十日破之進圍安邑更始大将軍樊参将數萬人度大陽欲攻禹大陽縣屬河東禹遣諸将逆擊於解南大破之又破王匡成丹劉均等軍收得節六印綬五百兵器不可勝數遂定河東會光武即位於鄗使使者持節拜禹為大司徒封酇侯食邑萬户李通字次元南陽宛人王莾時為五威将軍從事出補巫丞有能名王莽置五威将軍從事謂驅使小官也巫縣屬南郡故城在今䕫州巫山縣北莾末百姓愁怨通素聞其父守説讖云劉氏復興李氏為輔私嘗懐之且居家富逸為閭里雄以此不樂為吏乃自免歸及下江新市兵起南陽騷動通從弟軼亦素好事乃共計議曰今四方擾亂新室且亡漢當更興南陽宗室獨劉伯升兄弟汎愛容衆可與謀大事通笑曰吾意也會光武避事在宛通聞之即遣軼往迎光武初以通士君子相慕也故往答之及相見共語移日握手極歡遂相約結定謀議期以材官都試騎士日漢法以立秋日都試騎士謂課殿最也欲刼前隊大夫及屬正前隊大夫謂南陽太守甄阜屬正謂梁丘賜也因以號令大衆乃使光武與軼歸舂陵舉兵以應莽聞之誅通兄弟門宗六十四人皆焚屍宛市時漢兵亦已大合通與光武李軼相遇棘陽遂共破前隊殺甄阜梁丘賜更始立以通為柱國大將軍輔漢侯從至長安更拜為大将軍封西平王使通持節還鎮荆州通因娶光武女弟伯姬是為寧平公主寧平縣屬淮陽國光武即位㣲通為衛尉建武二年封固始侯六年拜大司空通布衣唱義助成大業重以寧平公主故特見親重自為相謝病不視事連年乞骸骨帝毎優之魏鍾繇字元常頴川長社人漢末舉孝廉累遷尚書僕射封東武亭侯時關中諸将馬騰韓遂等各擁强兵相與争太祖為漢相方有事山東以關右為憂乃表繇以侍中守司𨽻校尉持節督關中諸軍委之以後事特使不拘常制繇至長安移書騰遂等各遣子入侍太祖在官渡與袁紹相持繇帥諸軍圍之未拔而袁尚所置河東太守郭援到河東衆甚盛繇遣馬騰子超將精兵逆之援濟汾水未半擊大破之斬援降軍于會河東衛固作亂與張晟張琰及高幹等並為寇繇又率諸将計破之自天子西遷雒陽人民單盡繇徙關中民又招納亡叛以充之數年間民户稍實太祖征關中得以為資表繇為前軍師魏國建為大理遷相國文帝踐祚拜太尉荀攸字公達漢尚書令彧之從子漢末為黃門侍郎董卓之亂棄官歸後為蜀郡太守以道絶不得至駐荆州太祖迎天子都許遺攸書曰方今天下大亂智士勞心之時而顧觀變蜀漢不已久乎於是徴攸為汝南太守入為尚書太祖素聞攸名與語大悦謂荀彧鍾繇曰公達非常人吾得與之計事天下當何憂哉以為軍師建安三年從征張繡攸言於太祖曰繡與劉表相恃為强然繡以逰軍仰食於表表不能供也勢必離不如緩軍以待之可誘而致也若急之其勢必相救太祖不從遂進軍之穰與戰繡急表果救之軍不利太祖謂攸曰不用君言至是乃設竒兵復戰大破之太祖自宛征呂布至下邳布敗退固守攻之不拔連戰士卒疲太祖欲還攸與郭嘉説曰呂布勇而無謀今三戰皆北其鋭氣索矣三軍以將為主主衰則軍無奮意夫陳宮有智而遲今及布氣之未復宮謀之未定進急攻之布可收也乃引沂泗灌城城潰生擒布後從救劉延於白馬攸畫䇿斬顏良太祖拔白馬還遣輜重循河而西袁紹渡河追卒與太祖遇諸将皆恐説太祖還保營攸曰此所以擒敵奈何去之太祖目攸而笑遂以輜重餌賊競奔之陣亂乃縱歩騎擊大破之斬其騎将文醜太祖遂與紹相拒於官渡軍食方盡攸言於太祖曰紹運車旦暮至其将韓􅀢鋭而輕敵擊可破也韓􅀢或作韓猛或云韓若太祖曰誰可使攸曰徐晃可乃遣晃及史渙邀撃破走之燒其輜重會許攸來降言紹遣淳于瓊等将萬餘兵迎運糧将驕卒惰可要撃也衆皆疑唯攸與賈詡勸太祖乃留攸及曹洪守太祖自將攻破之盡斬瓊等紹将張郃高覧燒攻櫓降紹遂棄軍走郃之來洪疑不敢受攸謂洪曰郃計不用怒而來君何疑乃受之七年從討袁譚袁尚於黎陽明年太祖乃征劉表譚尚争冀州譚遣辛毗乞降請救太祖将許之以問羣下羣下多以為表彊宜先平之譚尚不足憂也攸曰天下方有事而劉表坐保江漢之間其無四方志可知矣袁氏據四州之地帶甲十萬紹以寛厚得衆借使二子和睦以守其成業則天下之難未息也今兄弟搆惡其勢不兩全若有所并則力專力專則難圖也及其亂而取之天下定矣此時不可失也太祖曰善乃許譚和親遂還擊破尚其後譚叛從斬譚於南皮冀州平太祖表封攸曰軍師荀攸自初佐臣無征不從前後克敵皆攸之謀也於是封陵樹亭侯轉為中軍師魏國建為尚書令太祖毎稱曰公達外愚内智外怯内勇外弱内强不伐善無施勞智可及愚不可及雖寗武子不能過也文帝在東宮太祖謂曰荀公達人之師表汝當盡禮敬之賈詡字文和武威姑臧人漢末為光祿大夫獻帝東遷詡上還印綬張繡在南陽詡隂結之勸繡率衆歸太祖太祖表詡為執金吾封都亭侯遷冀州牧冀州未平留參司空軍事袁紹圍太祖於官渡太祖糧方盡問詡計焉出詡曰公明勝紹勇勝紹用人勝紹決機勝紹有此四勝而半年不定者但顧萬全故也必決其機須㬰可定也太祖曰善乃并兵出圍擊紹三十餘里營破之紹軍大潰河北平太祖領冀州牧徙詡為大中大夫建安十三年太祖破荆州欲順江東下詡諫曰明公昔破袁氏今收漢南威名逺著軍勢既大若乗舊楚之饒以饗吏士撫安百姓使安土樂業則可不勞衆而江東稽服矣太祖不從軍遂無利太祖後與韓遂馬超戰於渭南超等索割地以和并求任子詡以為可偽許之又問詡計䇿詡曰離之而已太祖用詡謀卒破遂超文帝即位以詡為太尉進爵夀鄉侯增邑并前八百户華歆字子魚平原高唐人漢末為豫章太守孫䇿畧地江東待以上賔之禮䇿死太祖在官渡表天子徴歆拜議郎參司空軍事入為尚書轉侍中尚書令太祖征孫權表歆為軍師魏國建為御史大夫文帝即王位拜相國封安樂鄉侯及受禪歆登壇相儀奉皇帝璽綬以成受命之禮拜歆為司徒明帝時拜太尉蜀諸葛亮字孔明琅邪陽都人從父𤣥為袁術所署豫章太守漢朝以朱皓代之𤣥素與荆州牧劉表有舊往依之𤣥卒亮家于南陽之鄧縣號曰隆中亮每自比於管仲樂毅時人莫之許也會先主屯新野徐庶謂曰諸葛孔明卧龍也将軍宜枉駕顧之由是先主詣亮三往乃見因屏人與語曰漢室傾頺姦臣竊命主上䝉塵孤不度徳量力欲信大義於天下而智術淺短遂用猖蹶至於今日然志猶未已君謂計将安出亮答曰自董卓已來豪傑並起跨州連郡者不可勝數曹操比於袁紹則名微而衆寡然操遂能克紹以弱為强者非惟天時抑亦人謀也今操已擁百萬之衆挾天子而令諸侯此誠不可與争鋒孫權據有江東已厯三世國險而民附賢能為之用此可與為援而不可圖也荆州北據漢沔利盡南海東連呉會西通巴蜀此用武之國而其主不能守此殆天所以資将軍将軍豈有意乎益州險塞沃野千里天府之國高祖因之以成帝業劉璋闇弱張魯在北民殷國富而不知存恤智能之士思得明君将軍既帝室之胄信義著於四海總覽英雄思賢如渴若跨有荆益保其巖阻西和諸戎南撫夷越外結孫權内修政理天下有變則命一上将将荆州之軍以向宛雒将軍身率益州之衆出於秦川百姓孰敢不簞食壺漿以迎将軍者乎誠如是則霸業可成漢室可興矣先主曰善是時曹公方定河北亮知荆州次當受敵而劉表性緩不曉軍事亮乃見先主衆賔皆去而亮獨留先主亦不問其所欲言先主性好結毦適有人以髦牛尾獻者因手自結之亮乃進曰明将軍當復有逺志但結毦而已邪先主投毦而答曰是何言與我聊以忘憂耳亮遂言曰将軍度劉鎮南孰與曹公邪先主曰不及又曰将軍自度何如也曰亦不及曰今皆不及而将軍之衆不過數千人以此待敵得無非計乎先主曰我亦愁之将若之何亮曰今荆州非少人也而著籍者寡平居發調則人心不悦可語鎮南令國中凡有㳺户皆使自實因録以益衆可也先主從其計故衆遂彊由此知亮有美畧乃以上客禮之遂與亮情好日宻關羽張飛等不悦先主解之曰孤之有孔明猶魚之有水也諸君勿復言俄而劉表卒曹公來征先主在樊城聞之率其衆南行亮與徐庶並從先主於夏口亮曰事急矣請奉命求救於孫将軍時權擁軍在柴桑觀望成敗亮説權曰海内大亂将軍起兵據有江東劉豫州亦收衆漢南與曹操並争天下今操芟夷大難畧已平矣遂破荆州威震四海英賢無所用武故豫州遁逃至此将軍量力而處之若能以呉越之衆與中國抗衡不如早與之絶若不能當何不案兵束甲北靣而事之今将軍外託服從之名而内懐猶豫之計事急而不斷禍至無日矣權曰茍如君言劉豫州何不遂事之乎亮曰田橫齊之壮士耳猶守義不辱況劉豫州王室之胄英才盖世衆士仰慕若水之歸海若事之不濟此乃天也安能復為之下乎權勃然曰吾不能舉全呉之地十萬之衆受制於人吾計決矣非劉豫州莫可當曹操者然豫州新敗之後安抗此難乎亮曰豫州軍雖敗於長阪今戰士還者及關羽水軍精甲萬人劉琦合江夏戰士亦不下萬人曹操之衆逺來疲弊聞輕騎一日一夜行三百餘里此所謂彊弩之末勢不能穿魯縞者也故兵法忌之曰必蹶上将軍且北方之人不習水戰又荆州之民附操者偪兵勢耳非心服也今将軍誠能命猛將綂兵數萬與豫州協規同力破操軍必矣操軍破必北還如此則荆呉之勢强鼎足之形成矣成敗之機在於今日權大悦即遣周瑜程普魯肅水軍三萬隨亮詣先主并力以拒曹曹公敗於赤壁引軍歸鄴先主遂收江南以亮為軍師中郎将使督零陵桂陽長沙三郡調其賦税以充軍實建安十六年益州牧劉璋遣法正迎先主使擊張魯亮與關羽鎮荆州先主自葭萌還攻璋亮與張飛趙雲等率衆泝江分定郡縣與先主共圍成都成都平以亮為軍師将軍署左将軍府事先主外出亮嘗鎮守成都二十六年先主即帝位䇿亮為丞相録尚書事後主禪建興元年封亮為武鄉侯又領益州牧政事無巨細咸決於亮謂亮曰政由葛氏祭則寡人亮亦以禪未閑於政遂總内外呉孫邵字長緒北海人初為孔融功曹融稱曰廟廊才也從劉繇於江東及大帝綂事數陳便宜以為應納貢聘大帝即從之拜盧江太守遷車騎長史黃武初為丞相封陽羡侯顧雍字元歎呉郡呉人弱冠為合肥長轉在婁曲阿上虞皆有治迹大帝領會稽太守不之郡以雍為丞行太守事數年入為左司馬大帝為呉王累遷大理奉嘗領尚書令封遂鄉侯又改大常進封醴陵侯黄武四年代孫邵為丞相平尚書事陸遜字伯言呉郡呉人大帝為討虜将軍遜年二十一始仕幕府厯東西曹令史出為海昌屯田都尉幷領縣事遷定威校尉大帝以兄䇿女配遜數訪世務遜建議曰方今英雄棊峙豺狼闚望克敵寧亂非衆不濟而山寇舊惡依阻深地夫腹心未平難以圖逺可大部伍取其精鋭大帝納其䇿以為帳下右部㑹丹陽賊帥費棧受曹公印綬曹公印綬扇動山越為作内應遜破㪚之拜偏将軍右都督代呂䝉以禦蜀将關羽又領宜都太守撫邊将軍封華亭侯遜遣将軍李異謝旌等将三千人攻蜀将詹晏陳鳯等前後斬獲招納凡數萬計遷右䕶軍鎮西将軍進封婁侯黄武元年蜀先主率大衆來向西界遜為大都督假節督朱然等五萬人拒之破其四十餘營其舟船器械水歩軍資一時畧盡拜輔國将軍領荆州牧改封江陵侯蜀後主禪既襲位諸葛亮秉政與大帝連和大帝每與禪亮書嘗過示遜輕重可否有所不安便令改定以封印行之黄龍元年拜上大将軍右都䕶赤烏七年代顧雍為丞相歩隲字子山臨淮淮隂人漢末避難江東種𤓰自給大帝為討虜将軍召隲為主記歳餘以疾免除海鹽長還辟車騎将軍東曹掾為大帝徐州治中從事建安十五年出領鄱陽太守徙交州刺史劉表所置蒼梧太守呉巨隂懐異心隲因斬狥之威聲大震士爕兄弟相率供命益州大姓雍闓等殺蜀所署太守正昻與爕相聞求欲内附隲因承制遣使宣恩撫納由是拜平武将軍封廣信侯延康元年将交州義士萬人出長沙會蜀先主東下武陵蠻夷蠢動隲上益陽蜀兵敗績而零桂諸郡猶相驚擾處阻兵隲周旋征討皆平之黃武二年遷右将軍左䕶軍改封臨湘侯黃龍元年拜驃騎将軍領冀州牧是嵗都督西陵代陸遜撫二境隲前後薦達屈滯救解患難書數十上大帝雖不能虗納然時采其言多蒙濟頼赤烏九年代陸遜為丞相冊府元龜卷三百八
