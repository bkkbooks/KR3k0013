body:
  text: 册府元龜卷七百七十五宋王欽若等撰總錄部幼敏第三後魏賈彛字彦倫父爲苻堅鉅鹿太守坐訕謗繫彛年十歲詣長安訟父獲申逺近歎之僉曰此子英俊賈誼之後莫之與京後太祖即位拜尚書左丞加給事崔元伯少有俊才號曰冀州神童苻融牧冀州虛心禮敬拜陽平公侍郎領冀州從事後位至天部大人進爵爲公李丞字伯業寳之子也少有竒畧太武時寳欲謀歸欵民僚多有異議丞時年十三勸寳速定大計於是遂決仍令丞隨表入質太武深相器異禮遇甚優賜爵姑臧侯陸琇字伯琳第五子有以爵傳琇之意琇年九歲謂之曰汝祖東平王有十二子我爲適長承襲家業今巳年老屬汝幼冲詎堪爲陸氏宗首乎琇對曰茍非鬬力何患童稚竒之遂立琇爲世子韋纘荆州刺史彌之子年十三補中書學生聰敏明辯爲博士李彪所稱除祕書中散裴安祖少而聰慧年八九歲就師講詩至鹿鳴篇語諸兄云鹿雖禽獸得食相呼而况人也自此之後未曽獨食裴駿字神駒幼而聰慧親表異之稱爲神駒因以爲字位至中書侍郎胡叟字倫許少聰慧年十三辯疑釋理知名鄉國其意之所悟與成人交論尠有屈焉叟以姚氏將衰遂入長安觀風化隱匿名行懼人見知時京兆韋祖思少閲典墳多蔑時彦知叟至召而見之祖思習嘗待叟不足聊與温良叟拂衣而出祖思固留之曰當與君論天人之際何遽而反乎叟對曰論天人者其亡乆矣與君相知何夸言若是也遂不坐而去至主人家賦杜韋二族一宿而成時年十有八歲具述前載無違舊羙敘中世有協時事而未及鄙凟人皆竒其才畏其筆世有傳誦之以爲笑狎叟後拜武威將軍賜爵始復男卒李志字鴻道博學有幹才年十餘歲便能屬文父彪甚竒之李安世太尉祥之子幼而聰悟興安二年文成引見侍郎博士之子簡其秀雋者欲爲中書學生安世年十一帝見其尚小引問之安世陳説父祖甚有次第即以爲生帝每幸國學嘗獨被引問詔曰汝但守此至大不慮不富貴祖瑩范陽人八歲能誦詩書十二爲中書學生内外親屬呼爲聖小兒後厯秘書監遷車騎將軍李琰之字景珍司空詔之族弟早有盛名時人號曰神童位至兼侍中車騎大將軍左光祿大夫袁翻子聿修九歲州辟主簿性深沉有鑒識清靜寡欲與物無競姨夫尚書崔林深知所賞李謐涿郡人年十三通孝經論語毛詩尚書厯數之術尤盡其長州閭鄉黨有神童之號後徵拜著作郎辟以授第郁公府二辟皆不就及卒命謚曰貞靜處士表其門曰文德里曰孝義北齊邢邵十歲便能屬文雅有才思聰明强記日誦萬餘言族兄彎有文鑒謂子弟曰宗室中有此兒非常人後爲太常卿中書監攝國子祭酒復授特進卒杜弼㓜聰敏家貧無書年十二寄郡學受業教授之際師每竒之位至膠州刺史王紘性機敏應對辯㨗年十三見揚州刺史太原郭元貞元貞撫其背曰汝讀何書對曰誦孝經曰孝經云何曰在上不驕爲下不亂元貞曰吾作刺史豈其驕乎紘曰公雖不驕君子防未萌亦願留意元貞稱善年十五隨父在北豫州行臺侯景與人論掩衣法爲當左爲當右尚書敬顯雋曰孔子云微管仲吾其被髮左袵矣以此言之左袵爲是紘進曰國家龍飛朔野雄歩中原五帝異儀三王殊制掩衣左右何足是非景竒其早慧賜以名馬後官至散騎常侍兼侍中李繪字敬文年六歲便自願入學家人以偶年俗忌約而弗許遂伺其伯妺筆牘之閒而輒竊用未幾遂通急就章内外異之以爲非常兒也天保初爲司徒右長史卒徐之才幼而儁發五歲誦孝經八歲畧通義㫖曽與從兄康造梁太子詹事汝南周捨宅聽老子捨爲設食乃戲之曰徐郎不用心思義而但事食乎之才答曰葢聞聖人虚其心而實其腹捨嗟賞之年十三召爲大學生粗通禮易彭城劉孝綽河東裴子野吳郡張等每共論周易及䘮之服儀酬答應之如響咸共歎曰此神童也位至僕射卒楊愔字遵彦小名秦王宏農華隂人父津魏時累爲司空侍中愔兒童時口若不能言而風度深敏出入門閭未嘗戲弄六歲學史書十一受易好左氏春秋幼䘮母曽詣舅源子恭子恭與之飲問讀何書曰誦詩子恭曰誦至渭陽未邪愔便號泣感噎子恭亦對之歔欷遂爲之罷酒子恭後謂津曰嘗謂秦王不其察慧從今已後更欲刮目視之愔一門四世同居家甚隆盛昆季就學者三十餘人學庭前有李樹實落地羣兒咸争之愔頽然坐其季父暐適入學舘見之因大嗟異顧謂賓客曰此兒恬裕有我風宅内有茂竹遂爲愔於林邊别葺一室命獨處其中嘗銅盤具盛饌以飯之因以督厲諸子曰汝輩但如遵彦謹愼自得竹林别室銅盤重肉之食愔從父兄黄門侍郎昱特相器重曽謂人曰此兒駒齒未落已是我家龍文更十歲後當求之千里外後拜尚書令又拜特進驃騎大將軍李稚廉趙高邑人齊州刺史義深之弟少而寡欲爲兒童時初不從家人有所求請嘗故以金寳授之終不取强付輒擲之於地州牧以其蒙稚而廉故名曰稚廉聰敏好學年十五頗尋覽五經章句嘗爲青州刺史未幾徵爲并省都官尚書卒孫靈暉深州武强人魏大儒祕書監惠蔚靈暉之族曽王父也靈暉少明敏有器度惠蔚一子早卒其家書籍多在焉靈暉年七歲便好學日誦數千言惟尋討惠蔚手錄章疏不求師友三禮及三傳皆通宗㫖然始就鮑季詳熊安生質問疑滯其所發明熊鮑無以異也後爲大將軍司馬蘇瓊字珍之幼時隨父在邊嘗謁東荆州刺史曹芝芝戲問曰卿欲官否對曰設官求人非人求官芝異其對署爲府長流參軍後爲博陵太守和士開幼而聰慧選爲國子學生解悟㨗疾爲同業所尚武平元年封淮王除尚書令錄尚書事後周檀翥字鳯翔高平金鄉人六世祖毓晉歩兵校尉父江始還北任至太常少卿翥十歲䘮父還京師宅與營人雜居幼孤寒不與鄰人來往好讀書解屬文能鼓琴早爲瑯琊王誦所知宗慄少聰敏好讀書晝夜不倦語輒引古事鄉里呼爲小兒學士後拜車騎大將軍卒韋瑱字世珍聰敏有夙成之量閭里咸敬異之後位至侍中驃騎大將軍柳慶年十三時父僧習爲潁川郡地接都畿民多豪右將選鄉官皆依倚貴勢競來請託選用未定僧習謂諸子曰權貴請託吾并不用其使欲還皆須有答汝等各以意爲吾作書也慶乃具書草云下官受委大邦選吏之日有能者進不肖者退此乃朝廷常典僧習讀書歎曰此兒有意氣大丈夫理當如是即依慶所草以報後爲宜州刺史入爲司會卒李旭頓邱臨黄人小名那祖彪名重魏朝爲御史中尉父游亦有才行爲當世所稱游兄志爲荆州刺史游從至州屬爾朱之亂與志俱奔江左旭性峻急不雜交游幼年已解屬文有聲雒下時雒陽創置明堂旭年十數歲爲明堂賦雖優洽未足才制可稱觀者咸曰有家風矣長孫澄字士亮魏太師稚之子年十歲司徒李琰之見而竒之遂以女妻焉十四從征討有䇿謀勇冠諸將後拜大將軍封義門公爲玉璧總管卒李賢字賢和九歲從師受業畧觀大㫖而已不尋章句或謂之曰學不精勤不如不學賢曰夫人各有志賢豈能强學待問領徒受業耶惟當粗聞教義補已不足至如忠孝之道實銘之於心問者慚服位至大將軍賢子崇文字永隆以父賢勲封迴雒縣侯時年少拜爵親族相賀崇獨泣下賢問之對曰無勲於國幼少封侯當報主恩不得終於孝養是以悲耳賢由此大竒之位至大府中丞大夫斛斯徵字士亮太傅尚書令椿之子幼聰頴五歲誦孝經周易識者異之及長渉羣書尤精三禮後爲太子太保柳霞幼而爽邁神采嶷然髫歲便有成人之量篤好文學動合規矩其世父慶逺特器異之後爲驃騎大將軍霍州刺史卒劉祥幼而聰慧占對俊辯賓客見者號爲神童年十歲能屬文十二通五經顔之儀幼頴悟三歲能讀孝經位至集州刺史蕭大圜幼而聰敏神情俊悟年四歲能誦三都賦及孝經論語七歲居母䘮便有成人之性後爲内史侍郎西河郡守卒蕭字智遐梁武帝弟安成王秀之子也性温裕有儀表年十二入國學博觀經史雅好屬文在梁封永豐縣侯沈重字德厚吳興武康人性聰悟有異常童七歲而孤居䘮合禮位至散騎常侍太常卿張元字孝始年六歲祖父成以夏中熱欲將元就井浴元固不肯從謂其貪戲乃以杖擊其脛曰汝何爲不肯洗浴元對曰衣以蓋形爲覆其䙝不能露其體於白日之下祖異而捨之南鄰有二杏樹杏熟多落元園中有諸小兒競取而食之元所得者送還其主鄭譚年十餘歲嘗詣相府司錄李長宗長宗於衆中戲之譚從容謂長宗曰明公位望不輕瞻仰斯屬輒相翫狎無乃䘮德長宗甚異之隋王述字長述後周驃騎大將軍罷之孫少聰敏有識度年八歲周太祖見而竒之曰王公有此孫足爲不朽後位至大將軍復授行軍總管于仲文後周大佐輒實之子九歲嘗於雲陽宫見周太祖問曰聞兒好讀書書有何事仲文對曰資父事君忠孝而已太祖甚嗟歎之後爲右翊衞大將軍進位光祿大夫卒裴政字德表㓜學明敏博聞强記達於時政爲當世所稱年十五辟邵陵王府法曹㕘軍事終於襄州總管于宣敏字仲達少沉密有才思年十一詣周趙王命之賦詩宣敏爲詩甚有幽貞之志王大竒之坐客莫不嗟賞位至奉車都尉史萬歲京兆杜陵人父靜周滄州刺史萬歲少英武善騎射驍㨗若飛好讀兵書兼精占候年十五値周齊戰於邙山萬歲時從父入軍旗鼔相望萬歲令左右趣治裝急去俄而周師大敗其父由是竒之後爲河州刺史行軍總管蘇䕫八歲誦詩兼解騎射年十三從父威至尚書省與安德王雄馳射賭得駿馬而歸十四詣學與諸儒議論詞致可觀見者皆稱善位至通議大夫李德林幼聰敏年數歲誦左思蜀都賦十餘日便畢高隆之見而嗟嘆遍告朝士云若假其年必爲天下偉器鄴京人士多就宅觀之月餘日中車馬不絶年十五誦五經及古今文集日數千言後終於懐州刺史宇文欣字仲樂幼而敏慧爲兒童時與羣輩戲輒爲部伍進止行列無不用命者位至右領軍大將軍韋師字公頴少沉謹有至性初就學始讀孝經捨書而歎曰名教之極其在兹乎終於汴州刺史楊异字文殊羙風儀沉深有器局齠齓就學日誦千言見者竒之後爲刑部尚書除吳州總管卒栁肅少聰敏閑於占對起家周齊王文學武帝見而異之召拜宣納上士位至工部侍郎韋世康幼而沉敏有器度年十歲州辟主簿後拜荆州總管卒於家劉顯字嗣芳幼而聰敏當時號曰神童辛德源字孝基沉靜好學年十四解屬文及長博覽書記後爲諮議㕘軍陸爽字開明少聰敏年九歲就學日誦二千餘言齊尚書僕射楊遵彦見而異之曰陸氏代有人焉官至太子洗馬胡克讓年十四釋褐梁湘東王法曹㕘軍時舍人朱异在儀賢堂講老子克讓與焉堂邊有修竹异令克讓詠之克讓攬筆輒成其卒章曰非君多愛賞誰貴此貞心异甚竒之後爲通直散騎常侍卒游元字楚客少聰敏年十六齊司徒徐顯秀以爲㕘軍事後位至朝請大夫兼侍御史何妥字棲鳯西域人少機警八歲游國子學助教顧良戲之曰汝既姓何是荷葉之荷爲是河水之河應聲答曰先生姓顧是眷顧之顧是新故之故衆咸異之終於國子祭酒庾質字行修少而明敏早有志向八歲誦梁世祖元覽言志等十賦拜童子郎位至太史袁充少警悟年十餘歲其父黨至門時冬初充尚衣葛衫客戲充曰袁郎子絺兮綌兮凄其以風充應聲答曰惟絺與綌服之無斁以是大見嗟賞後位至祕書令盧大翼字協昭河間人本姓章仇氏七歲詣學誦數十言州里號曰神童及長閒居味道不求榮利卒於雒陽庾季才幼頴悟八歲誦尚書十二通周易好古元象後爲通直散騎常侍崔頥字祖濬七歲能屬文容貎短小有口才開皇初秦孝皇薦之射䇿高第後爲越王長史薛道衡字元卿河東汾隂人祖聰衛齊州刺史父季通常山太守道衡六歲而孤專精好學年十三講左氏傳見子産相鄭之功作國僑贊頗有詞致見者竒之後才名益著位至司𨽻大夫許善心字務本九歲而孤爲母范氏所鞠養幼聰明有思理所聞輙能誦記多聞黙識爲當世所稱家有舊書萬餘卷皆遍通渉十五解屬文牋上父友徐陵大竒之謂人曰才調極高此神童也後爲給事中薛世雄爲兒童時與羣輩游戲輒畫地爲城郭令諸兒爲攻守之勢有不從令者世雄輒撻之諸兒畏憚莫不齊整其父見而竒之謂人曰此兒當興吾家矣位至左禦衞大將軍房彦謙字孝沖早孤不識父爲母兄之所鞠養長兄詢雅有清鑒以彦謙天性頴悟每竒之親教之讀書年七歲誦數萬言爲宗黨所異終於涇陽令郎茂少敏慧七歲誦騷雅日千餘言後爲尚書左丞鮑宏字潤身父機仕梁爲治書侍御史宏七歲而孤爲兄泉之所愛育年十二能屬文嘗和湘東王繹詩嗟賞不已引爲中記室位至均州刺史唐陳叔達初在陳年十餘歲嘗侍宴賦十韻援筆便就僕射徐陵甚竒之貞觀中位至吏部尚書蘇世長父振仕周爲岩州刺史武帝時世長十餘歲上書言事帝以其年少召問讀何書對曰讀孝經論語武帝曰孝經論語何所言對曰孝經云治國者不敢侮於鰥寡論語云爲政以德帝善其對令於獸門舘讀書武德中爲天䇿府軍諮秦府開引爲學士高士廉幼而精爽絶倫占對敏慧位至開府儀同三司李百藥字重規博陵安平人父德林仕隋内史令百藥幼而聰敏年數歲德林於燈下教以四聲一聞便解七歲頗能屬文齊中書舍人陸乂嘗過德林宴齋有誦徐陵文者云將刈琅琊之稻坐客並不識其事百藥進曰傳稱鄅人籍稻杜預注云鄅國在琅琊開陽縣乂等驚喜云此兒神童也官至宗正卿百藥子安期幼聰辯七歲解屬文終於荆州大督都府長史孔頴達年八歲就學日讀千餘言至暮更誦未嘗嬉戲有異凡童三禮義宗盡能闇記官至國子祭酒房元齡幼而聰敏五歲能誦毛詩及乎志學尤工草𨽻博覽墳史位至司空呂方毅才之子年七歲能誦周易毛詩太宗聞其㓜敏召見甚竒之賜以縑帛王勃字子安太常博士福畤子也六歲善屬文與兄勔勮俱稱少俊父友杜易簡嘗稱曰此王氏三珠樹也楊炤幼聰敏博學善屬文應神童舉拜校書郎爲崇文舘學士孫思邈京兆華原人也七歲就學日誦千餘言顯慶中高宗召拜諫議大夫不受狄仁傑字懷英爲兒童時門人有被害者縣吏就詰之衆皆接對惟仁傑堅坐讀書吏責之仁傑曰黄卷之中聖賢備在尤不能接對何暇偶俗吏而見責耶位至内史元萬頃河南人德州總管白澤之孫也幼解屬文起家爲通事舍人孫述幼而英俊文思敏速始年十五謁雍州長史崔日用日用小之令爲士大爐賦握翰即成辭理典贍日用覽之駭然遂爲忘年之交以是價譽益重開元初應哲人竒士舉韋陟字殷卿尚書左僕射安石之子少聰頴頗異常童自㓜風標整峻獨立不羣安石尤愛之位至吏部尚書東京留守蘇震京兆武功人少以門䕃補千牛聰敏好學博渉經史年未志學有老成人風伯頊異之嘗謂所親曰吾家有子矣嚴武中書侍郎挺之之子神氣俊爽敏於聞見幼有成人之風讀書不究精義渉獵而已弱冠以門䕃䇿名隴右節度使哥舒翰奏充判官後爲城都尹改檢校吏部尚書封鄭國公楊綰生而聰慧年四歲處羣從之中敏識過人嘗夜宴親賓客舉坐中物以四聲呼之諸賓未言綰應聲指鐵燈樹曰燈盞柄曲衆咸異之位至中書侍郎同中書門下平章事劉晏字士安曹州南華人年七歲舉神童授秘書省正字終於忠州刺史高郢字公楚其先渤海蓚人九歲通春秋能屬文郢子定幼聰警絶倫年七歲時讀尚書湯誓問郢曰奈何以臣伐君郢曰應天順人不爲非道又問曰用命賞於祖不用命戮於社是順人乎父不能對定仕至京兆㕘軍房孺復太尉綰之子少慧黠年七八歲即解綴文親黨竒之位至容州刺史本管經畧使權德輿生四歲能諷詩十五爲文數百篇編爲董蒙集十卷名聲日大後爲檢校吏部尚書出鎭回元卒蔣義字德源其先常州義興人後徙家於河南國子司業集賢學士蔣明之子史官吳競之外孫代以儒學稱年七歲讀庾信哀江南賦數遍而能暗記始以聰敏精强聞於親黨弱冠該博羣籍時論以史職許之位至秘書監令狐楚字殻士世以儒雅著稱楚少强記年十五善屬文位至檢校左僕射興元尹充山南西道節度使李聰西平王太尉晟之第十三子七歲以䕃授太常寺協律嘗入公署胥吏小之不敬聰鞭之見血西平因大竒之元禎九歲能屬文十五明兩經擢第太和中終於檢校户部尚書兼鄂州刺史李德裕宰相吉甫之子幼而壯志苦心力學吉甫每以敏辯誇於同列武元衡曽召之謂曰吾子在家所嗜何書意欲探其志也德裕不應翊日元衡具以告吉甫因戲曰公誠渉大癡耳吉甫歸以責之德裕曰武公身爲帝弼不問理國調隂陽而問所讀書書者成均禮部之職也其言不當所以不應吉甫復告元衡大慚由是振名德裕會昌中爲太尉宣宗時爲東都留守後累貶崔州司馬卒郭承嘏字復卿汾陽王子儀曽孫生而異乳保之間即好筆硯比及成童能誦五經楊收七歲䘮父居䘮有如成人而母長孫夫人知書親自教授十三畧通諸經義善於文詠吳人稱爲神童兄發戲令詠蛙即曰澗邊分玉樹龍底耀銅儀會當同鼓吹不復問官私又令詠筆仍賦鑽字即曰雖非嚢中物何堅不可鑽一朝操政柄定使冠三端每良辰羙景吳人造門觀神童請爲詩什觀者壓敗其藩後自宣歙觀察使貶端州司馬尋削官封梁羅周敬年七八歲學賦詩往往傳於人口後唐馬希範湖南節度使殷之第三子少而温雅稍渉文史開平中授著作佐郎國子博士俄解金紫光祿大夫檢校右僕射典湖南親軍同光中殷遣希範入貢莊宗問洞庭廣狹希範對曰洞庭至狹若車駕南巡止可飲馬莊宗拊背嘉之超授檢校太保永州刺史李琪年十三詞賦詩頌大爲王鐸所知然亦疑其假手一日鐸召父縠讌於公署密遣人以漢高祖得三傑賦題就其第試之琪援筆立成賦尾云得士則昌非賢罔共龍頭之友斯貴鼎足之臣可重宜哉項氏之所以亡一范増而不能用鐸覽而駭之曰此兒大器也將擅文價趙美幽州節度使德鈞之孫天成四年德鈞奏美年五歲黙念何論孝經令於汴州取解就試勅封尉之孫能念儒書備彰家訓不勞就試特與成名宜賜别勅及第仍附今年春榜晉盧質幼聰慧善屬文年十六陜帥王重盈奏授芮城令安元信幼爲兒童時嘗與里中同輩戲爲營陣獨申明進退交擊之勢宛成部分邑之耆老有尚懷古者謂元信父萬金曰此子成人必逹軍旅之事若賦以壽則爲將爲侯爾其志之後至耀州團練使漢李崧深州饒陽人父舜卿本州錄事㕘軍崧幼而聰敏十餘歲爲文家人竒之弱冠本府署爲㕘軍其父嘗謂宗人李璘曰大醜坐處竒形氣異前途應不居徒勞之地頼吾兄誨激之大醜即崧之小字也後至宰相周皮台符字光信深州武强人幼善屬文唐同光中擢進士第釋褐爲鎭定從事位至翰林學士和凝幼而聰敏姿狀秀㧞神彩射人少好學書一覽者咸逹其大義後至相位王朴幼警慧好學善屬文位至樞密使册府元龜卷七百七十五
