body:
  text: 册府元龜卷五百九十宋王欽若等撰掌禮部奏議第十八唐歸崇敬為膳部郎中肅宗寳應元年以百官朔望朝服袴褶非古禮上疏云案三代典禮兩漢史籍並無袴褶之制亦未詳所起之繇隋代以来始有服者事不師古伏請停罷從之又議東都太廟不合置木主謹案典禮虞主用桑練主用栗作桑主則埋栗主作栗主則埋桑主所以神無二主天無二日土無二王也今東都太廟是則天后所建以置武氏木主中宗去其主而存其廟盖將以備行幸遷都之制也殷人屢遷前八後五則殷遷都一十三度不可每都而别立神主也議者或云東都神主己曽䖍奉而禮之豈可一朝而廢乎且虞祭則立桑主而䖍祀練祭則立栗主而埋桑主豈桑主不曽䖍祀而乃埋之又所闕之主不可更作作之不時恐非禮也又議云每年春秋二時釋奠文宣主祝板御署訖北面揖臣以為其禮太重謹按大戴禮師尚父授周武王丹書武王東面而立今署祝板伏請准武王東面禮之輕重庶得其中是年崇敬與禮儀使杜鴻漸禮官薛頎等議以髙祖神堯皇帝非始封之君不合配天地太祖景皇帝始封於唐郊天地請以景皇帝配告宗廟亦以景皇帝酌獻詔可之永泰二年夏大旱時上封事者云太祖景皇帝追封唐國髙祖受命之祖唐有天下不因於景皇今配享失位故神不降福愆陽為灾詔下百司就尚書省議崇敬確執前議乃止崇敬又議祭五人帝不合稱臣云太皥五帝人帝也於國家即為前後之禮無君臣之義若於人帝而稱臣則天地復何稱也議者或云五帝列於月令分配五時則五神五音五祀五蟲五獸皆備五數以此備其時之色數非謂别有尊也黎幹為諌議大夫寳應元年禮儀使太常卿杜鴻漸與水部員外郎薛頎歸崇敬等議以神堯受命之主非始封之君不得為太祖以配天地太祖景皇帝始受封於唐即殷之契周之后稷也請以太祖景皇帝郊配天地告請宗廟亦以太祖景皇帝酌獻諌議大夫黎幹議以太祖景皇帝非受命之君不合配享天地二年五月進議狀為十詰十難曰據集賢校理潤州别駕歸崇敬議狀及水部員外郎薛頎等議曰禘謂冬至祭天於圓丘周人以逺祖配今欲以景皇帝為始祖配昊天於圓丘臣幹詰曰國語云有虞氏夏后氏俱禘黄帝商人禘舜周人禘嚳俱不言祭昊天於圓丘一也詩商頌曰長發大禘也又不言祭昊天於圓丘二也詩周頌曰雍禘太祖也又不言祭昊天上帝於圓丘三也禮記祭法曰有虞氏夏后氏俱禘黄帝殷人周人俱禘嚳又不言祭昊天上帝於圓丘四也禮記大傳曰不王不禘王者禘其祖之所自出以其祖配之又不言祭昊天上帝於圓丘五也爾雅釋文曰禘大祭也又不言祭昊天上帝於圓丘六也家語曰凡四代帝王之所郊皆以配天也其所謂禘者皆五年大祭也又不言祭昊天上帝於圓丘七也盧植云禘祭名禘者諦也事取明諦故曰禘又不言祭昊天上帝於圓丘八也王肅曰禘謂五年大祭又不言祭昊天上帝於圓丘九也郭璞云禘五年之大祭也又不言祭昊天上帝於圓丘十也臣幹謂禘是五年宗廟之祭詩禮經傳文義昭然今畧舉十詰以明之臣唯見禮記祭法及禮記大傳商頌長發等之處鄭𤣥注或稱祭昊天或云祭靈威仰臣精詳典籍更無禘為祭昊天於圓丘及郊天者審知禘是祭之最大則孔子說孝經為萬代百年法稱周公大孝何不言禘祀帝嚳於圎丘以配天而反言郊祀后稷以配天是以五經俱無其説聖人所以不言輕議大典亦何容易猶恐不悟今更作十難其一難曰周頌雍禘太祖也鄭𤣥箋云禘大祭也太祖文王也商頌云長發大禘也鄭𤣥箋云大禘祭天也夫商周之頌其文互説或云禘太祖祭天其禘俱是五年宗廟之大祭詳覽典籍更無異同惟鄭𤣥箋長發乃稱是郊祭天詳𤣥之意因此商頌禘加大字便云祭天始春秋大事雖有大字亦是宗廟之大祭可得便稱祭天乎若如所説大禘即是郊祭稱禘即是祭宗廟又祭法説虞夏商周禘黄帝與嚳大傳不王不禘上俱無大字云何因便稱祭天乎又長發所云亦不歌嚳與感生帝故知長發之禘非禘嚳及郊祭天明矣殷周五帝之大祭羣經衆史及鴻儒碩學自古立言著論序之詳矣無以禘為祭天何棄周孔之法獨取康成之小注便欲違經非聖誣亂祀典謬哉其二難曰大傳稱不王不禘王者禘其祖之所自出以其祖配之諸侯則及其太祖者説王者則當禘謂祭法虞夏殷周禘黄帝及嚳不王則不禘所當禘其祖之所自出謂虞夏出黄帝殷周出帝嚳以近祖配而祭之自出之祖既無宗廟即是自外至者故同之天地神祇以祖配而祀之自出之說非但於天於父母亦然左傳子産云陳則我周之自出此可得稱出於太微五帝乎故不王不禘王者禘其祖之所自出以其祖配此之謂也及諸侯之禘則降於王者不得祭自出之祖祇及太祖而已諸侯及其太祖此之謂也鄭𤣥錯亂分禘為三注祭法云禘謂祭昊天於圓丘一也注左傳稱郊祭昊天以后稷配靈威仰箋商頌又稱郊祭天二也注周頌云禘大祭大於四時之祭而小於祫太祖謂文王三也禘是一祭𤣥析之為三顛倒錯亂皆率胸臆曽無典據何足可慿其三難曰虞夏殷周已前禘祖之所自出其義昭然自漢魏晋已還千餘嵗其禮遂闕又鄭𤣥所説其言不經先儒所棄未曽行用愚以為錯亂之義廢棄之注不足以正大典其四難曰所稱今三禮行於代者皆是鄭𤣥之學請據鄭以明之議雖云據鄭學今欲以景皇帝為始祖之廟以配天復與鄭議相乖何者王制云天子七廟𤣥云此周禮也七廟者太祖及文武之祧與親廟四也殷則六廟契及湯與二昭二穆也據鄭學夏不以鯀及顓頊昌意為始祖昭然可知也而欲引稷契為例其義又異且稽上古洎今無以人臣為始祖者唯殷以契周以稷夫稷契者皆天子元妃之感神而生者帝嚳以妃簡狄有娀氏之女吞𤣥鳥之卵因生契長而佐禹治水有大功舜乃命契作司徒百姓既和遂封於商故詩曰天命𤣥鳥降而生商此之謂也后稷者其母有邰氏之女曰姜嫄為帝嚳妃出野履巨跡歆然有孕生稷稷長而勤於稼穡堯聞舉為農師天下得其利有大功舜封於邰號曰后稷唐虞夏之際皆有令徳故詩曰履帝武敏歆居然生子即有邰家室此之謂也舜禹有天下稷契在其間量功比徳抑其次也舜受職則播百榖敷五教禹讓功則平水土宅百揆故國語曰聖人之制祀徳施於人則祀之以死勤事則祀之契為司徒而人輯睦稷勤百榖皆居前代祀典子孫有天下得不尊而祖之乎其五難曰既遵鄭説小徳配寡遂以后稷祇配一帝尚不得全配五帝今以景皇帝特配昊天於鄭義可乎其六難曰衆議詰臣云上帝一也所引春官祀天旅上帝祀地旅四望旅訓衆也則上帝是五帝臣曰不然旅雖訓衆乃出於爾雅及為祭名春官則訓旅為陳注有明文若於所言旅上帝便成五帝則季氏旅於泰山可得便是四鎮乎其七難曰所云據鄭學則景皇帝親盡主合祧却欲配祭天地錯亂宗祖夫始祖者經綸草昧體大則天所以比元氣廣大萬物之宗尊以長至陽氣萌動之始乃俱祀於南郊也夫萬物之始天也人之始祖也日之始至也掃地而祭質也器用陶匏性也牲用犢誠也兆於南郊就陽位也至尊至質不敢同於先祖禮也故白虎通云祭天嵗一何天至尊至質事之不敢䙝黷故因嵗之陽氣始達而祭之今國家一嵗四祭黷莫大焉上帝五帝其祀遂闕怠亦甚矣黷與怠皆禮之失不可不知夫親有限祖有嘗聖人制禮君子不以情變易國家重光累聖厯紀百數豈不知景帝始封於唐當時通儒議功度徳乃尊神堯以配天宗太宗以配上帝神有定主為日已久今黜神堯配含樞紐以太宗配上帝則紫微五精上帝佐也以子先父豈禮意乎非止神祇錯位亦以宗祖乖序何以上稱皇天祖宗之意哉若夫神堯之功太宗之徳格于皇天上帝臣以郊祀無以加焉其八難曰欲以景皇帝為始祖既非造我區宇經綸草昧之主故非與夏始祖禹殷始祖契周始祖稷漢始祖髙帝魏始祖武帝晉始祖宣帝國家始祖神堯皇帝同功比徳而忽升于圓丘之上與昊天匹曽謂圓丘不如林放乎其九難曰所言魏文帝丕以武帝操為始祖晉武帝炎以宣帝懿為始祖者孟徳仲達皆人傑擁天下之强兵挾漢魏之微主專治海内令行草偃服衮冕陳軒懸天子决事於私第公卿列拜於道左名雖為臣勢實為君後主因之而業帝前王繇之而禪代子孫尊而祖之不亦可乎其十難曰所引商周魏晉既已審矣則景皇帝不為始祖明矣髙祖拔出羣之才廓清隋室拯生民之塗炭則夏禹之勲不足多成帝業於數年則漢祖之功無以比然而夏以禹為始祖漢以髙帝為始祖則我唐以神堯為始祖法夏則漢於義何嫌今欲革皇天之祀易太祖之廟事之大者莫大於斯曽無按據一何寡陋不愧於心不畏於天乎以奉詔令諸司各據禮經定議者臣忝竊朝列官以諌為名名以直見知身以學見達不敢不罄竭以禆萬一議奏不報杜鴻漸為太常卿充禮儀使代宗廣徳二年正月命有司定祀典鴻漸奏曰冬至祀昊天上帝夏至祀皇地祇請以太祖景皇帝配享孟春祈榖祀昊天上帝孟冬祀神州請以髙祖神堯大聖大光孝皇帝配享孟夏雩祀昊天上帝請以太宗文武大聖大廣孝皇帝配享季秋大享明堂祀昊天上帝請以肅宗文明武徳大聖大宣孝皇帝配享從之李岧為司門郎中禮儀使判官徳宗建中三年十月肅王詳薨詳徳宗第六子薨時年四嵗廢朝三日贈揚州大都督帝念甚不令起墳穿壙特命層塼造塔如西國法岧上言曰墳墓之式經典有常爰自古今不聞異制塼塔出於天竺號為浮圗行之中華竊恐非禮况肅王天屬品位尊崇喪葬之儀存於簡䇿舉而不法垂訓非經伏請准令造墳庶遵典禮從之關播為刑部尚書知刪定禮儀使貞元二年二月奏上元中詔擇古今名將十人於武成王廟配享如文宣王廟之儀伏以太公古稱大賢今其下置亞聖賢之有聖於義不安又孔門十哲皆是當時弟子今所擇名將年代不同於義既乖於事又失臣請刪去名将配享之儀及十哲之稱從之三年正月脩昭徳皇后别廟帝初務從省約欲藏皇后神主於陵所祠寢殿播與禮官奏以典故無文且陵所祠殿非安神主之所准故事昭成肅明元獻皇后並置别廟今太廟之西即元獻皇后故廟也今請修葺以為昭徳皇后别廟從之李紓為兵部侍郎貞元四年八月奏准開元十九年勅置齊太公廟以張良配太常卿少卿及丞充三獻官又案開元禮祝文云皇帝遣某官昭告于齊太公漢留侯至於上元元年勅追贈太公為武成王享祭之典一同文宣王有司因差太尉充獻兼御署祝板伏以太公即周之太師張良即漢之少傅聖朝列於祀典已極褒崇今屈禮於至尊施敬於臣佐理或過當神何敢歆伏以文宣王垂教百代宗師五常訓明紀綱制立家國繇是正素王之位加先聖之名樂用宫懸獻羞太尉尊師崇道雅合政經且太公述作止於六韜勲業形于一代豈擬諸盛徳均其殊禮其祝文請不進署敢昭告請改為敬祭于其昭告請改為致祭于留侯其獻官請准舊式詔百寮集議刑部員外郎陸淳請罷封王立廟之制依貞觀之磻溪置祠命有司時享左領軍大将令狐建等諸将軍二十四人請仍舊大理卿于頎四十六人請依李紓帝謂曰文化武功皇王之二柄自今上将軍已下充獻官餘依紓奏劉滋為吏部侍郎貞元六年正月詔羣官有私喪並宜禁㫁公祭初御史監祭者以開元禮有緦已上喪不享廟移牒吏部詰以差奏祭官有私喪者於是吏部乃奏曰准禮諸侯絶周大夫絶緦所以殺旁親之喪不敢廢太宗之祭士則緦不祭謂同宫未𦵏欲人吉凶不相黷也魏晋以降變禮行權緦已上喪假内衣縗謂之喪服假滿即吉謂之公除凡既𦵏公除即為吉祭者非也故其時公除者皆行公祭盖大夫不以家事亂王事春秋之義也今國家公除之令既已即吉於祭無嫌今私家之祭則無廢者公家之祭則猶禁之是以有司限文進退維谷若以服為禁即懼廢祭禮若以例奏差則懼違令文先王立禮所以進人為善也立法所以禁人為非也被公除者人思君親莫不欲祭使子得祭其父孝莫大焉臣得祭其君厚莫重焉茍祭而不許是禁人為善茍私祭不禁則公祭無嫌是則垂之空文不若行其變禮今請申明舊令使行之可守凡有慘服既葬公除及聞哀假滿者請許吉服赴宗廟之祭其同宫未𦵏唯公除者請依前禁之庶輕重有倫以一王法從之栁冕為吏部郎中貞元六年将有事於南郊徳宗重慎其禮每事必詢訪於禮官乃命冕與司封郎中徐岱倉部郎中陸質工部員外郎張薦皆攝太常博士同修儀注以備顧問既詔以皇太子亞獻親王終獻帝令問冕等當受誓戒否冕與禮官等奏請准開元禮並以前七日内受誓戒詞云各惕其職不供其事國有常刑冕等以誓皇太子更其詞云各惕其職肅奉常儀帝又問升郊廟云劒履及象劒尺寸之度祝文輕重之宜冕等咸引據禮經及厯代沿革故事奏聞帝甚嘉賞之是年復親王母號曰太妃定公母曰太儀初帝以諸王若叔父諸弟長公主若姑姊妹其母多無封號朝謁之際無以稱之乃下有司詳議禮官苐奏曰伏尋漢制諸王母稱王國太后晋宋以降則曰王國太妃國朝酌前代典故從晉宋之儀王母命為太妃著在程式謹按封爵及大唐六典王母為太妃髙祖宇文昭儀生韓王元嘉後為韓國太妃太宗燕妃生越王貞後為越國太妃位號所崇存于簡冊其長公主之母厯代故事並無稱案大典内命婦有六儀位次三妃秩正三品公主母既因女貴伏請降王母一等命為太儀各以公主本封加太儀之上其品位同儀者取母儀之盛太者請因子而尊庶辨等威以𢎞敦睦詔可其奏裴郁為太常卿貞元七年十一月奏䟽曰禘祫之禮以遷廟皆出太祖之後故得合食有序尊卑不差及漢髙受命無始封祖以髙皇帝為太祖太上皇髙帝之父立廟享禮不在昭穆合食之列為尊於太祖故也魏武創業文帝受命亦即以武帝為太祖其髙皇太祖處士君等並為屬尊不在昭穆合食之列晋宣創業武帝受命亦即以宣帝為太祖其征西潁川等四府君亦為屬尊不在昭穆合食之列國家誕受天命累聖重光景皇帝始封唐公實為太祖中間世數既近在三昭三穆之内故皇家太廟唯有六室其𢎞農府君宣光二祖尊于太祖親盡則遷不在昭穆之數著在禮志可舉而行開元中加置九廟獻懿二祖皆在昭穆是以太祖景皇帝未得居東向之尊今二祖已祧九室惟序則太祖之位又安可不正伏以太祖上配天地百代不遷而居昭穆獻懿二祖親盡廟遷而居東向徴諸故實實所未安請下百寮僉議勅㫖依八年二月又奏乃者宗子名御皆云皇某親行於文䟽曹署此非避嫌自卑之道也謹按儀禮曰諸侯之子禰公子公子不得禰先君公子之子禰公孫公孫不得祖諸侯此自卑别尊之道也又禮記云君有合族之道族人不得以其戚戚君位也鄭𤣥注云族人皆臣也不得以父兄子弟之親自戚於君位謂齒列也所以尊君别嫌今宗子若以皇字為稱首從數為序親誠非卑别尊不戚君位之義又按儀禮從父昆弟即今同堂也従祖昆弟即今再従也族昆弟即今三從也聖朝方崇敦叙宜辯等威其三従内伏請依舊其餘各以祖禰本封為某王公子孫則親踈有倫名理歸正從之九年六月郁奏議曰謹案孝敬皇帝忌不廢務伏以讓皇帝位非正綂親則旁尊詳考舊章合同孝敬其忌日廢務請罷詔可是月郁奏議准季冬盡日以十一月九日貢舉人謁先師今與親享太廟日同准六典上丁釋奠若與大祠同即用中丁其謁先師請别擇日從之李嶸為太子左庶子貞元八年正月議太常卿裴郁所論禘祫之禮曰王制天子七廟三昭三穆與太祖而七周制也七者太祖及文王武王之祧與親廟四也太祖后稷也殷則六廟契及湯與二昭二穆夏則五廟無太祖禹與二昭二穆而晋朝博士孫欽議云王者受命太祖及諸侯始封之君其己前神主據己上數過五代即毁其廟禘祫不復及也禘祫所及者謂受命太祖之後未毁主上升藏扵二祧者也雖百代禘祫及之伏以獻懿二祖則太祖以前親盡之主也擬三代以降之制則禘祫不及矣代祖神主則太祖已下毁廟之主則公羊傳所謂已毁廟之主陳于太祖者是也謹案元帝下詔議罷郡國廟及親盡之祖丞相韋元成議太上孝恵廟皆親盡宜毁太上廟主宜瘞扵園孝恵主遷于太祖廟奏可太上則太祖已前之主瘞于園禘祫不及故也則今獻懿二祖之比也孝恵遷于太祖廟明太祖以下子孫則禘祫所及則今代祖元皇帝神主之比也自魏晋及宋齊隋陳相承始受命之君皆立廟虚太祖之位自太祖之後至七代君則太祖東向位乃成七廟太祖以前之主魏明帝則遷處士置於園邑嵗時使令丞奏薦世數猶近故也至東晋成帝時以征西等三祖遷入西儲名之曰祧以准逺廟至穆帝立於是京兆遷入西儲同謂之祧如前之禮並禘祫所不及國朝始享四廟宣光并太祖世祖神主祔于廟至貞觀九年将祔髙祖于太廟朱子奢請准禮立七廟其三昭三穆各置神主太祖依宋以来故事虚其位待遞遷方立東向位扵是始祔𢎞農府君及髙祖為六室虚太祖之位而行禘祫至二十三年太宗祔廟宏農府君乃藏于西夹室文明元年髙宗祔廟始遷宣皇帝西夹室開元元年𤣥宗特立九廟於是追尊宣皇帝為獻祖復列于正室光皇帝為懿祖以備九室禘祫猶虚太祖之位祝文于三祖不稱臣明全廟數而已至徳二載尅復後新作九廟神主遂不造宏農府君神主明禘祫不及故也至寳應二年祔𤣥宗肅宗于廟遷獻懿二祖於西夹室始以太祖當東向位以獻懿二祖為是太祖以前親盡神主准禮禘祫不及凡十八年建中二年十月将祫享禮儀使顔真卿伏奏合出獻懿二祖主行事其布位次第及東向尊位請准東晉蔡謨等議為定遂以獻祖東向以懿祖於昭位南向以太祖於穆位北向以左昭右穆陳列行事且蔡謨當時雖有其議事竟不行而我唐廟祧豈可為准嶸伏以嘗禘郊社尊無二上瘞毁遷藏禮有義㫁獻懿以為親盡之主太祖以當東向之尊一朝改移實非典故謂宜復先朝故事獻懿神主藏于西夹室以合祭法所謂逺廟為祧去祧為壇去壇為墠壇墠有禱則祭無禱乃止太祖既昭配天地位當東向之尊庶上守貞觀之首制中奉開元之成規下遵寳應之嚴式符合經義不失舊章又後魏時公孫闕遷主藏于文武之廟其周已受命之祧乎故有二祧所以異廟也今獻祖已下之祧猶先公也太祖已下之祧猶先王也請築别廟以居二祖則行周之禮復古之道故漢因于周魏因于漢隋因于魏皆立三廟有二祧又立私廟四扵南陽亦後漢制也以為人之子事太宗降其私親故私廟所以尊本宗太廟所以尊正統雖古今異時文質異禮而知禮之情與問禮之本者莫不通其變酌而行之故上致其崇則太祖屬尊乎上矣下盡其殺則祧主親盡于下矣中處其中則主者主祧于中矣工部郎中張薦等議曰昔殷周以稷卨之後所以昭穆合祭尊卑不差如夏后氏以禹始封遂為不遷之祖故夏五廟禹與二昭二穆而已據此不先鯀鯀之親盡其主已遷左氏既稱禹不先鯀足明遷廟之主雖屬尊于始封祖者不在合食之位矣又據晋宋齊周隋史其太祖已下並同禘祫未嘗限㫁遷毁之主伏以南北八代非無碩學巨儒宗廟大事議必精騐於史册其禮僉同又詳魏晋宋齊梁北齊周隋事及貞觀明慶開元所禘祫並虚東向既行之已久實羣情所安且太祖處清廟第一之室其神主雖百代不遷永歆蒸嘗上配天地於郊廟無不正矣若至禘祫之時蹔居昭穆之列屈己申孝以奉祖禰豈非伯禹蒸敬鯀之道歟亦是魏晋及周隋之太祖不敢以卑􅐦尊之義也議者或欲遷二祖於興聖廟及請别置築室至禘祫年享之夫祫合也此乃分食殊乖禮意又欲蔵於西夹室永不及祀無異漢氏瘞園尤為不可輙敢徴據正經考論舊史請奉獻懿二祖與太祖並從昭穆之位而虧東向司勲員外郎裴樞議曰禮必立宗子者盖為收其族人東向之主亦由是也若祔於逺廟無乃中一有間等上不倫西位嘗虚則太祖永厭于昭穆異廟别祭則祫享事主乎合食永祕此于姜嫄則推祥禖而無事禮云親親故尊祖尊祖故敬宗敬宗故收族收族故宗廟嚴宗廟嚴故重社稷由是言也太祖之上復有追尊之祖則親親尊祖之義無乃乖乎太祖之外輕置别祭之廟則宗廟無乃不嚴社稷無乃不重乎且漢丞相韋𤣥成請瘞主于園晋徴士虞喜請瘞主于廟两階之間喜又引左氏説古者先王日祭于祖考月祀于曽髙時享及二祧嵗祫及壇墠終禘及郊宗古室是謂郊宗之祖斯最近矣但當時議所居石室未有准的喜請於夹室中愚以為石室可據所以處之之道未安何者夹室謂居太祖之下毁主非是安太祖之上藏主也未有卑處正室尊位尊在旁居考理即心恐非允叶今若建石室于園寝遷神主以永安採漢晋之舊章依祫禘之一祭修古禮之殘缺為國朝之典故庶乎春秋變之正禮動也中者焉考功貟外郎陳京議曰京前為太常博士已于建中二年九月四日奏議祫享獻懿二祖所安之位請下百寮博採所從其時禮儀使顔真卿因是上状與京議異京議未行伏見去年十一月二十八日詔下太常卿裴郁所奏大抵與京議相㑹伏以興聖皇帝則獻祖之曽祖懿祖之髙祖夫以曽孫祔於曽髙之廟豈禮之不可哉實人情之大順也京兆少尹韋武議曰凡三年一祫五年一禘祫則羣廟大合禘則各序其祧謂主遷彌逺祧室既修當祫之嵗當以獻祖居于東向而懿祖序其昭穆以極行所親若行禘禮則太祖復筵於西以衆主列其左右是則於太祖不為降屈於獻祖無所厭卑考禮酌情謂當行此為勝同官縣尉仲子陵議曰今儒者乃援子雖齊聖不先父食之語欲令已祧獻祖權居東向配天太祖屈居昭穆此不通之甚也凡左氏不先食之言且以正文公之逆祀儒者安知非夏后廟數未足之時而言禹不先鯀乎且漢之禘祫盖不足徴魏晋己還太祖之上皆有遷主厯代所疑或引閟宫之詩而永閟或因虞主之義而瘞園或縁逺廟為祧以築宫或言太祖實卑而虛位唯東晋蔡謨慿左氏不先食以為説欲令正西東向均之數者最不安且蔡謨此議非晋所行前有司不本謨改築之言取正西東向之一句為萬代法此其不可甚也臣又思之永閟瘞園則臣子之心有所不安權虚正位則太祖之尊無時而定則别築一室義差可安且興聖之于獻祖乃曽祖也昭穆有序享祀以時伏請奉獻懿二祖遷于徳明興聖廟此其大順也或以祫者合也今二祖别廟是分食也何合之為臣以為徳明興聖二廟每禘祫之年亦皆享薦是亦分食奚疑于二祖乎其月二十七日吏部郎中栁冕上禘祫義證凡一十四道以備顧問并議奏聞至三月十二日祠部奏郁議状並留中盧邁為尚書右丞貞元八年七月将作監元亘當攝太尉薦享昭徳皇后廟以私忌日不受誓戒為御史劾奏令尚書省與禮官法官集議於是邁等奏曰謹案禮記曰大夫士将奉祭于公既視濯而父母死猶是奉祭也又案唐禮散齋有大功喪致齋有周親喪齋中疾病則還家不奉祭事皆無忌日不受誓戒之文雖假寧令忌日有給假一日春秋之義不以家事辭王事今亘以假寧常式而辭攝祭新命酌其輕重誓戒則祀事之嚴較其禮式忌日乃循常之制詳求典據事縁薦獻不宜以忌日為辭由是亘坐罰陸淳為左司郎中貞元十一年七月十二日勅于頎等議状論禘祫事所請各殊理在討論用求精當宜令尚書省㑹百寮與國子監儒官切磋舊状定可否仍委所司具事件聞奏其月二十六日淳奏曰臣竊尋七年百寮所議雖有一十六状總其歸趣三端而已于頎等一十四状並云復太祖之位張薦状則云並列昭穆而虚東向之位韋武状則云當祫之嵗獻祖居于東向行禘之禮太祖復筵于西謹按禮經及先儒之説復太祖之位正也義在不疑太祖之位既正獻懿二主當有所歸詳考十四状其意有四一曰藏諸夹室二曰置之别廟三曰遷於園寝四曰祔于興聖藏諸夹室是無享獻之期異乎周人藏于二祧之義禮不可行也置之别廟始于魏明之説禮經實無文晋義熙九年雖立此義已後亦無行者遷于園寝是亂宗廟之儀既無所慿殊乖禮意不足徴也唯有祔于興聖之廟禘祫之嵗乃一祭之庶乎亡於禮者之禮而得變之正也時雖奏議竟亦不决册府元龜卷五百九十
