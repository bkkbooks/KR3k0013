body:
  text: 冊府元龜卷四百三宋王欽若等撰將帥部識略第二吳董襲為揚武都尉從孫䇿伐黃祖於江夏䇿死大帝年少初統事太妃憂之引見張昭及襲等問江東可保安不襲對曰江東地勢有山川之固而討逆眀府恩徳在民討虜承基大小用命張昭秉衆事襲等為爪牙此地利人和之時也萬無所憂衆皆壯其言周瑜字公瑾為中䕶軍時曹公新破袁紹兵威日盛下書責大帝質任子大帝召羣臣㑹議張昭秦松等猶豫不能决大帝意不欲遣質乃獨將瑜詣母前定議瑜曰昔楚國初封於荆山之側不滿百里之地繼嗣賢能廣土開境立基於郢遂據荆揚至於南海傳業延祚九百餘年今將軍承父兄餘資兼六府之衆兵精糧多將士用命鑄山為銅煑海為鹽境内富饒人不思亂汎舟舉㠶朝發夕到土風勁勇所向無敵有何偪廹而欲送質質一入不得不與曹氏相首尾與相首尾則命召不得不往便見制於人也極不過一侯印僕從十餘人車數乗馬數匹豈與南靣稱孤同哉不如勿遣徐觀其變若曹氏能率義以正天下將軍事之未晚若圖為暴亂兵猶火也不戢將自焚將軍韜略抗威以待天命何送質之有大帝母曰公瑾議是也遂不送質後瑜屯據江陵劉備以左將軍領荆川牧治公安備詣京口見大帝瑜上疏曰劉備以梟雄之資而有關羽張飛熊虎之將必非久屈於人下者用愚謀計宜徙備置吳盛為築宫室多其美女玩好以娛其耳目分此二人各置一方使如瑜者得挾與攻戰大事可定也今猥割土地以資業之聚此三人俱在疆塲恐蛟龍得雲雨終非池中物也大帝以曹公在北方當廣擥英雄又恐備難卒制故不納鍾離牧為濡湏督深以進取可圖而不敢陳其策與侍中東觀令朱育宴慨然嘆息育謂牧恨於策爵未副因謂牧曰朝廷諸君以際㑹坐取髙官亭侯功無與比不肯在人下見顧者猶以於邑况於侯也牧笑而答曰卿之所言未獲我心也馬援有言人當功多而賞薄吾功不足録而見寵已過當豈以為恨國家不深相知而見害朝人是以黙黙不敢有所陳若其不然當建進取之計以報所受之恩不徒自守而已憤歎以此也育復曰國家已自知侯以侯之才無為不成愚謂可自陳所懐牧曰武安君謂秦王云非成業難得賢難非得賢難用之難非用之難任之難武安君欲為秦王并兼六國恐授事而不見任故先陳此言秦王既許而不能卒隕將成之業賜劒杜郵今國家知吾不如秦王之知武安君而害吾者有過范雎大皇帝時陸丞相討鄱陽以二千人授吾潘太常討武陵吾又有三千人而朝廷下議棄吾於彼使江渚諸督不復發兵相繼蒙國威靈自濟今日何可為常向使吾不料時度宜茍有所陳至見委以事不足兵勢終有敗績之患何無不成之有鍾離徇領兵為將拜偏將軍戍西陵與監軍使者唐盛論地形勢謂宜城信陵為建平援若不先城敵將先入盛以施績留建平智略名將累經於彼無云當城之者不然狥計後半年晉果遣將修信陵城虞翻為騎都尉大帝與魏和先是魏將于禁降吳欲遣禁還歸北翻諫曰禁敗數萬衆身為降虜又不能死北習軍政得禁必不如所規還之雖無損猶如放盗不如斬之以令三軍示為人臣有二心者大帝不聼羣臣送禁翻謂禁曰卿勿謂吳無人吾謀適不用耳禁雖為翻所惡然猶盛歎翻魏文帝嘗為翻設虛座吕蒙為橫野中即將蒙與周瑜等圍曹仁於南郡益州將龔肅舉軍來附瑜表以肅兵益蒙蒙盛稱肅有膽用且慕化逺來於義宜益不宜奪也大帝善其言還肅兵又蒙當襲南郡帝欲令征虜將軍孫皎與蒙為左右部大督蒙說帝曰若至尊以征虜能宜用之以蒙能宜用蒙昔周瑜程普為左右部督共攻江陵雖事决於瑜普自恃久將且俱是督遂共不睦㡬敗國事此目前之戒也帝悟謝蒙曰以卿為大督命皎為後繼又甘寕粗暴好殺既常失蒙意又時違帝令帝怒之蒙輙陳請天下未平鬬將如寕難得宜容忍之帝遂厚寕卒得其用全琮為徐州牧督歩騎五萬征六安民皆散走諸將欲分兵捕之琮曰夫乗危徼倖舉不百全非國家之大體也今分兵捕民得失相半豈可謂全㢤縱有所獲猶不足以弱敵而副望也如或邂逅虧損非小與其獲罪琮寕以身受之不敢徼功以負國也駱統為濡湏督數陳便宜前後書數十上所言皆善尤以召募在民間長惡敗俗生離叛之心急宜絶置大帝與相反覆終遂行之滕𦙍與諸葛恪俱受遺詔輔政加衛將軍恪將悉衆伐魏𦙍諫恪曰吾以䘮代之際受伊霍之託入安本朝出摧彊敵名聲振於海内天下莫不震動萬姓之心兾得蒙君而息今猥以勞役之後興師出征民疲力屈逺主有備若攻城不克野略無獲是䘮前勞而招後責也不如案甲息師觀隙而動且兵者大事事以衆濟衆茍不恱君獨安之恪不從丁奉為冠軍將軍魏遣諸葛誕胡遵等攻東興太傅諸葛恪率軍拒之諸將皆曰敵聞太傅自來上岸必遁走奉獨曰不然彼動其境内悉許雒兵大舉而來必有成規豈虚還哉無恃敵之不至恃吾有以勝之陸遜為征西將軍劉備大衆東侵大帝命遜為大都督拒之諸將並欲迎擊備遜以為不可曰備舉衆東下銳氣始盛且乗髙守險難可卒攻攻之縱下猶難盡克若有不利損我大勢非小故也今但且奬勵將士廣施方略以觀其變若此間是平原曠野當恐有顛沛交馳之憂今縁山行軍勢不能展自當罷於木石之間徐制其敝耳備知其計引兵從谷中出當禦備時諸軍或是孫䇿時舊將或公室貴戚各自矜恃不相聼從遜按劒曰劉備天下知名曹公所憚今在境界此彊敵也諸君並荷國恩當相輯睦共剪此虜上報所受而不相順非所謂也僕雖書生受命主上國家所以屈諸君使相承望者以僕有尺寸可稱能忍辱負重故也各任其事豈復得辭軍令有常不可犯也至破備計多出遜諸將乃服大帝聞之曰君何以初不啟諸將違節度者邪遜對曰受恩深重任過其才又此諸將或任腹心或堪爪牙或是功臣皆國家所嘗與共克定天下者臣雖駑懦竊慕相如㓂恂相下之義以濟國事帝大笑稱善加拜遜輔國將軍領荆州牧即改封江陵侯又即將周祗乞於鄱陽召募事下問遜遜以為此郡民易動難安不可與召恐致賊寇而祗固陳取之郡民吳遽等果作賊殺祗攻没諸縣豫章廬陵宿惡民並應遽為宼遜自聞輙討即破遽等相率䧏遜陸抗字㓜節父遜卒時年二十拜建武校尉領遜衆五千人送𦵏東還詣都謝恩大帝以楊竺所白遜二十事問抗禁絶賔客中使臨詰抗無所顧問事事條答帝意漸解賀齊為武威中即將嘗討山賊賊中有善禁者毎當交戰官軍刀劒不拔􅃓弩射矢皆還自向輙致不利賀將軍長情有思乃曰吾聞金有刃者可禁蟲有毒者可禁其無刃之物無毒之蟲則不可禁彼必是能禁吾兵者也必不能禁無刃物矣乃多作勁木白棓選有力精卒五千人為先登盡捉棓彼山賊恃其有善禁者了不嚴備於是官軍以白棓擊之彼禁者果不復行所擊殺者萬計陸凱為鎮西大將軍時丁忠使於晉歸說後主曰北方守戰之具不設弋陽可襲而取後主訪羣臣凱曰夫兵不得已而用之耳且三國鼎立己來更相侵伐無嵗寕居今彊敵新并巴蜀有兼土之實而遣使求親欲息兵役不可謂其求援於我今敵形勢方彊而欲徼倖求勝未見其利也車騎將軍劉纂曰天生五材誰能去兵譎詐相雄有自來矣若其有闕庸可棄乎宜遣間以觀其勢後主隂納纂言且以蜀新平故不行然遂自絶蔡珪為將在秣陵時珪弟敏等守沔中晉折衝將軍周浚在弋陽南北為互市而諸將多相襲奪以為功珪與敏書曰古者兵交使在其間軍國固舉信義以相髙比聞疆塲之上往往有襲奪互市甚不可行弟慎無為小利而忘大備也候者得珪書以呈浚浚曰君子也及渡江求珪得之問其本曰汝南人也浚戲之曰吾固疑吳無君子而卿果吾鄉人張悌字巨先少善名理景帝時為屯騎校尉魏伐蜀吳人問悌曰司馬氏得政以來大難屢作智力雖豐而百姓未服也今又竭其資力遠征巴蜀兵勞民疲而不知恤敗於不暇何以能濟昔夫差伐齊非不克勝所以危亡不憂其本也况彼之争地乎悌曰不然曹操雖功蓋中夏威震四海崇詐挾術征伐無已民畏其威而不懐其徳也丕叡承之繼以慘虐内興宫室外懼雄豪東西驅馳無嵗獲安彼之失民為日久矣司馬懿父子自握其柄累有大功除其煩苛而布其平惠為之謀主而救其疾民心歸之亦已久矣故淮南三叛而腹心不擾曹髦之死四方不動摧堅敵如折枯蕩異國如反掌任賢使能各盡其心非智勇兼人孰能如之其威武張矣本根固矣羣情服矣奸計立矣今蜀閹宦專朝國無政令而玩戎黷武民勞卒弊競於外利不修守備彼彊弱不同智算亦勝因危而伐殆其克乎若其不克不過無功終無退北之憂覆軍之慮也何為不可哉昔楚劍利而秦昭懼孟眀用而晉人憂彼之得志固我大患也吳人笑其言而蜀果䧏於魏晉羊祜為平南將軍祜有清徳祜女夫嘗勸祜有所營置令有歸戴者可不美乎祜黙然不應退告諸子曰此可謂知其一不知其二人臣樹私則背公是大惑也汝宜識吾此意及出鎮荆州時長吏喪官後人怨之多毁壊舊府祜以死生有命非繇居室書下征鎮普加禁斷又祜為征南大將軍上疏曰先帝順天應時西平巴蜀南和吳㑹海内得以休息兆庶有樂安之心而吳復背信使邊事更興夫期運雖天所授而功業必繇人而成匪大舉掃滅則衆役無時得安非所以隆先帝之勲成無為之化也堯有丹水之伐舜有三苖之征咸以寕静宇宙戢兵和衆者也蜀平之時天下皆謂吳當并亡自此來十二年是謂一周平定之期復在今日矣議者常言吳楚有道後服無禮先強此乃諸侯之時耳當今一統不得與古同論夫適道之論皆未應權是故謀之雖多而决之欲獨凢以險阻得存者謂所敵者同力足以自固茍其輕重不齊彊弱異勢則智士不能謀而險阻不可保也蜀之為國非不險也髙山尋雲霓深谷肆無景束馬懸車然後得濟皆言一夫荷㦸千人莫當其進兵之日曽無藩籬之限斬將搴旗伏屍數萬乗勝席捲徑至成都漢中諸城皆鳥棲不敢出非皆無戰心誠力不足相抗至劉禪䧏服諸營堡者索然俱散今江淮之難不過劍閣山川之險不過岷漢孫皓之暴侈於劉禪吳人之困甚於巴蜀而大晉兵衆多於前世資儲器械盛於往時今不於此平吳而更阻兵相守征夫苦役日尋干戈經歴盛衰不可久長宜當時定以一四海今若引梁益之兵水陸俱下荆楚之衆進臨江陵平南豫州直指夏口徐兖揚青並向秣陵鼓斾以疑之多方以誤之以一隅之吳當天下之衆勢分形散所備皆急巴蜀竒兵出其空虚一處傾壊則上下震蕩吳縁江為國無有内外東西數千里以藩籬自恃所敵者大無有寕息孫皓恣情任意與下多忌名臣重將不復自信是以孫秀之徒皆畏逼而至將疑於朝士困於野無有保世之計一定之心平常之日猶懐去就兵臨之際必有應者終不能齊力致死已可知也其俗急速不能持久弓弩㦸楯不如中國惟有水戰是其所便一入其境則長江非復所固還保城池則去長入短而官軍懸進人有致節之志吳人戰於其内有憑城之心如此軍不踰時尅可必矣帝深納之㑹秦凉屢敗祐復表曰吳平則胡自定但當速濟大功耳而議者多不同祜歎曰天下不如意嘗十居七八故有當斷不斷天與不取豈非更事者恨於後時㢤祜鎮荆州寢疾求入朝既至雒陽㑹景獻宫車在殯臣欽若等曰景獻皇后祜同産姊也哀慟至篤中詔申諭扶疾引見命乗輦入殿無下拜甚見優禮及侍坐面陳伐吳之計帝以其病不宜數入遣中書張華問其籌策祜曰今主上有禪代之美而功徳未著吳人虐政已甚可不戰而尅混一六合以興文教則主齊堯舜臣同稷契為百代之盛孰如舍之若孫皓不幸而没吳人更立令主雖百萬之衆長江未可得而越也將如後患何華深賛成其計祜謂華曰成吾志者子也帝欲祜卧䕶諸將祜曰取吳不必湏臣自行但既平之後當勞聖慮耳功名之際臣所不敢居若事了當有所付受願審擇其人疾篤薦杜預自代杜預為征南大將軍將伐吳衆軍㑹議或曰百年之㓂未可盡剋況今向暑水潦方降疾疫將起宜俟來冬更為大舉預曰昔樂毅藉濟西一戰以并強齊今兵威已振譬如破竹數節之後皆迎刃而解無復著手處也遂指授羣帥徑造秣陵所過城邑莫不束手議者乃以書謝之平吳之役詔書使益州刺史王濬下建平受預節度至秣陵受王渾節度預至江陵謂諸將帥曰若濬得下建平則順流長驅威名已著不宜令受制於我若不能克則無縁得施節度濬至西陵預與之書曰足下既摧其西藩便當徑取秣陵討累世之逋㓂釋吳人於塗炭自江入淮逾於泗汴泝河而上振旅還都亦曠世一事也濬大恱表呈預書劉𢎞為南蠻校尉荆州刺史恵帝幸長安河間王顒挾天子詔𢎞為劉喬繼援𢎞以張方殘暴知顒必敗遣使受東海王越節度周訪為揚烈將軍時華軼為江州刺史自以受雒京所遣而為夀陽所督時雒京尚存不能祗承元帝敎命郡縣多諫之軼不納曰吾欲見詔書耳時帝遣訪率衆屯彭澤以備軼訪過姑孰著作即干寳見而問之訪曰大府受分令屯彭澤彭澤江州西門也華彦夏彦夏軼字有憂天下之誠而不欲碌碌受人控御頃來紛紜粗有嫌隙今又無故以兵守其門將成其釁吾當屯潯陽故縣既在江西可以捍禦北方又無嫌於相遏也陶侃鎮荆州南蠻司馬新野杜曽永嘉之亂曽斬胡亢而并其衆自稱南中即將領竟陵太守既而致箋於平南將軍荀崧求討丹水賊以自效崧納之侃遺崧書曰杜曽凶狡所將之卒皆豺狼也可謂鴟梟食母之物此人不死州土未寕足下當識吾言崧以宛中兵少藉曽為外援不從侃言曽復率流亡三千餘人圍襄陽數月不下而還祖逖元帝用為徐州刺史徵為軍諮祭酒逖以社稷傾覆嘗懐振復之志逖進說曰晉室之亂非上無道而逃民怨叛也繇藩王爭權自相誅滅遂使戎狄乗隙毒流中原今天下既被殘酷遺黎思本人有奮擊之心但悉無所憑倚大王誠能命將帥使若逖等執殳前驅上為國家雪恥下為百姓請命則郡國豪傑必因風響赴沉溺之士欣於來蘇庶㡬國恥可雪願大王圖之帝乃以逖為奮威將軍豫州刺史温嶠為前將軍時王敦既敗制以敦綱紀除名參伍禁錮嶠上疏曰王敦剛愎不仁忍行殺戮親任小人疎逺君子朝廷所不能抑骨肉所不能間處其朝者常懼危亡故人士結舌道路以目誠賢人君子道窮數盡遵養時晦之辰也且敦為大逆之日拘録人士自免無路原其私心豈遑宴處如陸玩羊曼劉𦙍蔡謨郭璞嘗與臣言備知之矣必其凶悖自可罪人斯得如其枉入姦黨宜施之以寛加以玩等之誠聞於聖聼當受同賊之責實負其心陛下仁聖含宏思求允中臣階縁博納干非其事誠在愛才不忘忠益帝從之後出鎮武昌陳豫章十郡之要宜以刺史居之潯陽濵江都督應鎮其地今以州帖府進退不便且古鎮將多不領州皆以文武形勢不同故也宜選單車刺史别撫豫章專理黎庶詔不許嶠又平蘇峻黨路永匡術賈寕中塗悉以衆歸順王導將褒顯之嶠曰術輩首亂罪莫大焉晚雖改悔未足以補前失全其首領為幸已過何可復寵授哉導無以奪陶侃為荆州刺史議者以武昌北岸有邾城宜分兵鎮之侃毎不答而言者不已侃乃渡水獵引將佐語之曰我所以設險而禦㓂正以長江耳邾城隔在江北内無所倚外接羣夷夷中利深晉人貪利夷不堪命必引㓂虜乃致禍之繇非禦冦也且吳時此城乃三萬兵守今縱有兵守之亦無益於江南若羯虜有可乗之㑹此又非所資也後庾亮戍之果大敗蔡謨為征北將軍都督徐兖青三州揚州之晉陵豫州之沛郡諸軍事領徐州刺史假節時左衛將軍陳光上疏請伐胡詔令攻夀陽謨上疏曰今夀陽城小而固自夀陽至瑯琊城壁相望其間逺者纔百餘里一城見攻衆城必救且王師在路五十餘日劉仕一軍早已入淮又遣數部北取玉壁大將未至聲息久聞而賊之郵驛一日千里河北之騎足以來赴非惟鄰城相救而已夫以白起韓信項籍之勇猶廢梁焚舟背水而陣今欲停船水渚引兵造城前對堅敵顧臨歸路此兵法之所戒也若進攻未拔胡騎卒至懼桓子不知所為而舟中之指可掬今征軍五千皆王都精銳之衆又光為左衛逺近聞之名為殿中之軍宜令所向有征無戰而頓之堅城之下勝之不武不勝為笑今以國之上駟擊宼之下邑得之則利薄而不足損敵失之則害重而足以益宼懼非䇿之長者臣愚以為聞宼而致討賊退而振旅於事無失不勝管見謹冐陳聞朱伺為陶侃騎督時西陽夷賊抄掠江夏太守楊珉毎請督將議拒賊之計伺獨不言珉言朱將軍何以不言伺答曰諸人以舌擊賊伺惟以力耳珉又問將軍前後擊賊何以毎得勝邪伺曰两敵共對唯當忍之彼不能忍我能忍是以勝耳珉大笑袁喬督沔中諸戍江夏隨義陽三郡軍事建武將軍江夏相時桓温謀伐蜀衆以為不可喬勸温曰夫經略大事故非常情所具智者了於胸中然後舉無遺算耳今天下之難二㓂而已蜀雖險固方胡為弱將欲除之先從易者今泝流萬里歴經天險彼或有備不可必克蜀人自以斗絶一方恃其完固不修攻戰之具若以精卒一萬輕軍速進比彼聞之我已入其險要李勢君臣不過自力一戰擒之必矣論者恐大軍既西胡必闚覦此又似是而非何者胡聞萬里征伐以為重備必不敢動縱復越逸江渚諸軍足以守境此無憂矣蜀土富實號稱天府昔諸葛武侯欲以抗衡中國今誠不能為害然勢據上流易為冦盗若襲而取之者有其人衆此國之大利也温從之桓冲為車騎將軍都督江荆梁益寕交廣七州領䕶南蠻校尉侍中荆州刺史鎮江陵苻堅彊盛冲欲移阻江南乃上疏曰自中興已來荆州所鎮隨宜迴轉臣亡兄温以石季龍死經略中原因江陵路便即而鎮之事與時遷勢無常定且兵者詭道示之以弱今宜全重江南輕戍江北南平孱陵縣界地名上眀田土膏梁可以資業軍人在吳時樂鄉城以上四十餘里北枕大江西挾二峽若狂狡送死則舊郢以北堅壁不戰接會濟江路不云逺乗其疲墮撲剪為易臣司存閫外輙隨宜處分於是移鎮上眀使冠軍將軍劉波守江陵諮議叅軍楊亮守江夏宋沈林子髙祖伐𦍑叅征西軍事破姚泓將姚紹初諸將破賊皆多其首級而林子獻捷書至每以實聞髙祖問其故林子曰夫王者之師本有征無戰豈可復増張虜獲以自夸誕國淵以事實見賞魏尚以盈級受罰此前事之師表後乗之良轍也髙祖曰乃所望於卿也徐羡之為髙祖太尉左司馬掌留任以副貳劉穆之髙祖議欲北伐朝士多諫唯羡之黙然或問之何獨不言羡之曰吾位至二品官為二千石志願久充今二方已平拓地萬里唯有小𦍑未定而公寢食不忘意量乖殊何可輕豫未㡬髙祖受晉禪檀道濟為冠軍將軍髙祖北伐以道濟為前鋒徑進雒陽凡拔城破壘俘四千餘人議者謂應悉戮以為京觀道濟曰伐罪弔民正在今日皆釋而遣之於是戎夷咸恱相率歸之者甚衆進據潼關與諸將軍共破姚紹長安既平以為征虜將軍瑯琊内史王仲徳為安北將軍與到彦之北伐大破魏軍諸軍進屯靈昌津司兖既定三軍咸喜仲徳獨有憂色曰胡雖仁義不足而兇狡有餘今歛戈北歸併力完聚若河氷冬合豈不能為三軍憂其年冬魏軍於委粟津渡河進逼金墉虎牢雒陽諸軍相繼奔走彦之聞二城不守欲焚舟歩走仲徳曰雒陽既䧟則虎牢不能獨全勢使然也今賊去我千里滑臺猶有彊兵若便捨舟奔走士卒必散且當入濟至馬耳谷口更詳所宜乃廻軍㳂濟南歴城歩上焚舟棄甲還至彭城劉康祖為左軍將軍太祖欲大舉北伐康祖以嵗月已晚請待明年帝以河北義徒並起若頓兵一周沮尚義之志不許已而果敗到彦之為使持節南蠻校尉時太祖入奉大統以徐羡之等新有簒虐懼欲使彦之領兵前驅彦之曰了彼不二便應朝服順流若使有虞此師既不足恃更開嫌隙之端非所以副逺邇之望也沈慶之元嘉二十七年遷為歩軍校尉太祖北伐慶之副王𤣥謨向碻磝戍主棄城走𤣥謨圍滑臺慶之與蕭斌留守碻磝斌仍領輔國司馬𤣥謨攻滑臺積旬不拔魏主率大衆南向斌遣慶之率五千人救𤣥謨慶之曰𤣥謨兵疲衆老虜㓂已逼各軍營萬人乃可進耳少軍輕往必無益也斌固遣令去㑹𤣥謨退斌將斬之慶之固諫乃止太祖後問何故諫斌殺𤣥謨對曰諸將奔退莫不懼罪自歸而死將至逃散且大兵至未宜自弱故以攻為便耳蕭斌以前驅敗績欲固守碻磝慶之曰夫深入㓂境規求所欲退敗如此何可久住今青兾虚弱而坐守窮城若虜衆東過清口非國家有也碻磝孤絶復作朱修之滑臺耳㑹詔使至不許退諸將並謂宜留斌復問計於慶之慶之曰閫外之事將所得專詔從逺來事勢已異節下有一范増而不能用空議何施斌及坐者並笑曰沈公乃更學問慶之厲聲曰衆人雖見古今不如下官耳學也𤣥謨自以退敗求戍碻磝斌乃還歴城申坦垣䕶之共據清口慶之乗驛馳歸未至帝驛詔止之使還援𤣥謨㑹魏師已至彭城不得向北太尉江夏王義恭留領府中兵叅軍魏主至仰山義恭遣慶之率三萬拒之慶之以為魏衆彊往必見擒不肯行太祖後謂之曰進止處分皆合事宜惟恨不棄碻磝耳卿在左右久偏解我意正復違詔濟事亦無嫌也二十九年十月督討羣蠻於江沔三十年正月世祖出次五洲總統羣帥慶之從巴水出至五洲諮受軍略㑹世祖典籖董元嗣自京師還陳元㓙弑逆世祖遣慶之還山引諸軍慶之謂腹心曰蕭斌婦人不足數其餘將帥並是所悉皆易與耳東宫同惡不過三千人在外屈逼必不為用力今輔順討逆不憂不濟也胡藩為鄱陽太守從武帝伐劉毅初毅當之荆州日表求東道還建業辭墓去都數十里不過拜闕帝出倪塘㑹毅藩請殺之謂髙祖曰公謂劉衛軍為公下乎帝曰卿謂何如對曰夫豁達大度功髙天下連百萬之衆允天下之望毅固以此服公至於渉獵記傳一語一黙自許以雄豪加以誇伐縉紳白面之士輻輳而歸此毅不肯為公下也帝曰吾與毅俱有克復功其過未彰不可自相圖至是謂藩曰昔從卿倪塘之謀無今舉也沈攸之眀帝即位四方反叛張興世領水軍拒南賊于赭圻時豫州刺史殷琰之據夀陽同逆為劉勔所攻南賊遣龎孟虬率軍助琰之劉勔遣使求援甚急建安王休仁欲遣興世救之問攸之攸之曰孟虬蟻㓂必無能為遣别將馬歩數千足以相制若有意外且以江南餌之上流若捷不憂不殄興世之行是安危大機必不可輟乃遣段佛榮等援勔王景文太宗初即位為左衛將軍時六軍戒嚴景文仗士三千人入六門諸將咸云平殄小賊易於拾遺景文曰敵固無小蜂蠆有毒何可輕乎諸將當臨事而懼好謀而成先為不可勝之術耳垣䕶之為寕朔將軍督徐州之東莞二郡軍事孝武以歴下要害欲移青州并鎮歴城議者多異䕶之曰青州北有河濟又多陂澤非虜所向毎來寇掠必繇歴城二州并鎮此經逺之略也北又近河歸順者易近息民患逺申王威安邊之上計也繇是遂定冊府元龜卷四百三
