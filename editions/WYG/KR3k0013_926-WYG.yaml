body:
  text: 册府元龜卷九百二十六宋王欽若等撰總録部愧恨忍耻愧恨夫不能是耻則為愧寔多雖悔可追者飲恨何及是知君子作事謀始可以逺耻辱砥名勵節不以私汚義事若過舉或承之羞其有言之不從計有非允或功立而名辱或行潔而道違將義士之見非懼長者之所短俯仰天地慙靦靣目是可忍也洵孰甚焉故有愧情一集伏恨而死者已斯亦徃者不諫近乎知耻在昔賢者其猶病諸若乃名節自虧家道匪正然諾之際信義無聞雖復終身恨之蓋亦何嗟及矣子重為楚令尹魯㐮公三年春子重伐呉為簡之師簡選練克鳩兹至于衡山鳩兹呉邑在丹陽蕪湖縣東今臯夷也衡山在呉興烏程縣南使鄧廖帥組甲三百被練三千組甲被練皆戰備也組甲漆甲成組文被練袍也以侵呉呉人要而撃之獲鄧廖其能免者組甲八十被練三百而已子重歸既飲至三日呉人伐楚取駕駕良邑也鄧廖亦楚之良也君子謂子重於是役也所獲不如所亡當時君子楚人以是咎子重子重病之遂遇心疾而卒憂恚故成心疾子西為楚令尹故太子建之子勝在呉子西欲召之葉公曰聞勝也詐而亂無乃害乎子西曰吾聞勝也信而勇不為不利召之為白公後遂作亂殺子西子西以􅃑掩靣而死慙於葉公也端木賜字子貢原憲字思皆孔子弟子也孔子卒原憲亡在草澤中子貢相衛而結駟連騎排藜藿入窮閻過原憲憲攝敝衣冠見子貢子貢耻曰夫子殆病乎原憲曰吾聞之無財者謂之貧學道而不能行者謂之病若憲貧也非病也子貢慙不懌而去終身耻其言之過也漢韓安國字長孺梁成安人為材官將軍屯漁陽以匈奴入漁陽徙東屯右北平初安國為御史大夫及䕶軍後稍下遷新壯將軍衛青等有功益貴安國既斥疏將屯又失亡多甚自愧幸得罷歸兾得罷歸以為幸也廼益東徙意忽忽不樂數月病嘔血死後漢鄭均為太尉西曹掾明帝欲更修太尉府而均以為舊府自足相容太尉趙憙即表罷之其冬帝祀辟雍歴二府先觀壯麗而太尉獨卑陋帝東顧嘆息曰椎牛縱酒勿令乞兒為宰時憙子世為侍中驂乗歸具白之憙以為恨頻譴責均均自劾去道發病亡魏于禁初為左將軍後漢獻帝建安二十四年曹仁討雲長於樊太祖使禁與龎徳助仁及兵敗禁䧏關而龎徳不屈節而死文帝踐祚孫權擒羽獲其衆禁復在呉及權稱藩遣禁還拜安逺將軍欲遣使呉先令北詣鄴謁高陵帝使豫於陵屋盡闗羽戰克龎徳憤怒禁䧏服之狀禁見慙恚發病薨曹休為大司馬都督揚州牧太和二年明帝為二道征呉遣司馬宣王從漢水下督休諸軍向尋陽賊將偽䧏休深入戰不利退還宿石亭軍夜驚士卒亂棄甲兵輜重甚多休上書謝罪帝遣屯騎校尉楊曁慰諭禮賜益隆休因此癕發背薨􅃽濟為太尉隨司馬宣王屯雒水浮橋奏免大將軍曹爽濟書與爽言宣王㫖惟免官而已爽遂誅滅濟病其言之失信發病卒蜀鄧芝為督江州遷車騎將軍後主延熈十一年征涪陵見𤣥猿縁山芝性好弩手自射猿母中之猿子㧞其箭卷木葉塞其創芝曰嘻吾違物之性其將死矣一曰芝見猿抱子在樹上引弩射之中猿母其子為㧞箭以葉塞創芝乃嘆息投弩水中自知當死晋盧諶愍帝時為劉琨從事中郎将流離世故為石季龍所得以為中書監及石氏誅遇害諶名家子早有聲譽才高行㓗為一時所推値中原䘮亂與清河崔悦潁川荀綽河東裴憲北地傅暢竝淪䧟非所雖俱顯於石氏嘗以為辱諶每謂諸子曰吾身殁之後但稱晋司空從事中郎王𨗳敦之從弟敦舉兵劉隗勸帝盡除諸王王𨗳為司空率羣從詣闕請罪値僕射周顗將入𨗳呼顗謂曰伯仁以百口累卿顗直入不顧既見帝言𨗳忠誠申救甚切帝納其言顗喜飲酒致醉而出導猶在門又呼顗顗不與言顧左右曰今年殺諸賊奴取金印如斗大繫肘既出又上表明導言甚切至導不知救已而甚衘之敦既得志問導曰周顗戴若思南北之望當登三司無所疑也導不荅又曰若不三司便應令僕耶又不荅敦曰若不爾正當誅爾導又無言導後料簡中書故事見顗表救已慇勤欵至導執表流涕悲不自勝告其諸子曰吾雖不殺伯仁伯仁繇我而死幽㝠之中負此良友伯仁顗字也祖逖初為徐州刺史蔡豹為司馬逖素易豹後豹為建威將軍徐州刺史逖為豫州俱受征討之寄逖甚愧之禇裒為征討大都督徐兖青揚豫五州諸軍事先遣督䕶徐龕将兵伐沛郡中二千人歸䧏又魯郡五百餘家建義請授行次代陂為石遵将李莬所敗裒還鎭京口及石季龍死其國大亂遺户二十萬口渡河将歸順乞師救援會裒已旋威勢不振莫能自㧞皆為慕容皝及符徤之衆所掠死亡咸盡裒以逺圖不就憂慨發疾及至京口聞哭聲甚衆裒問何哭之多左右曰代陂之役也裒益慙恨􅃽秀為臨海郡將時任旭為郡功曹秀居官貪穢每不奉法旭正色苦諫秀既不納旭謝去閉門講習飬志而已乆之秀坐事被收旭狼狽營送秀慨然嘆曰任功曹眞人也吾違其讜言以至於此復何言哉桓温為大司馬温自以雄姿風氣是宣帝劉琨之儔有以其比王敦者意甚不平及後於北方得一巧作老婢訪之乃劉琨妓女也一見温便澘然而哭温問其故荅曰公甚似劉司空温大悦出外整理衣冠又呼婢問婢云面甚似恨薄眼甚似恨小鬚甚似恨赤形甚似恨短聲甚似恨雌温於是褫冠觧帶昏然而睡不怡者數日徐廣為祠部郎時㑹稽王世子元顯録尚書欲使百僚致敬臺内使廣立議繇是内外竝執下官禮廣嘗為愧恨焉宋劉穆之為尚書左僕射高祖北征領監軍中軍二府時王宏為高祖太尉長史轉左長史從北征前鋒已平雒陽而未遣九錫宏衘使還京師諷㫖朝廷穆之既掌㽞住而㫖反從北來穆之懐懼發病遂卒何文惠為湘州行事同晋安王子安叛文惠才兼將吏幹畧有施後乃害王師明帝特加原宥使呉喜宣㫖赦之文惠曰既䧟逆節手害忠義天網雖復恢恢何面目以見天下之士和藥將飲門生覆之乃不食而死王𤣥謨為領軍將軍時廢帝失徳蔡興宗遣𤣥謨典籖包法榮言廢立之事𤣥謨不從及明帝踐祚𤣥謨責所親故吏郭季産女婿韋希眞等曰當艱難時周旋軰無一言相扣發者季産曰蔡尚書令包法榮所道非不會機但大事難行耳季産言亦何有益元謨有慙色張永以後廢帝元徽二年為征北將軍南兖州刺史未至鎮遇桂陽王休範作亂率兵屯白下休範至新亭前鋒攻南掖門永遣人覘賊既反唱言臺城䧟永軍潰散永棄軍而走朝廷以舊臣止削官爵永亦愧嘆發病三年卒南齊王洪軌齊郡臨淄人為太祖所親信後為青冀二州刺史私占丁侵虜界奔敗結氣卒謝朓初告妻父王敬則反朓妻嘗懐刀欲報朓朓不敢相見及為吏部郎謙抑尤甚尚書郎沈昭畧謂朓曰卿人地之羙無忝此職但恨今日刑於寡妻朓有愧色後臨誅嘆曰天道不可昧乎我不殺王公王公繇我而死梁庾華為輔國長史㑹稽郡丞行郡府事初華為西楚望族早歴顯官鄉人樂藹有幹用素與華不平互相􅇒競藹事齊豫章王嶷嶷薨藹仕不得志自歩兵校尉求助戎歸荆州時華為州别駕益忽藹及高祖踐祚藹以西勲遷御史中丞華始得㑹稽行事既耻之矣㑹事微有譴高祖以藹其鄉人也使宣㫖誨之華大憤發病卒到溉為民部尚書少孤貧與弟洽為任昉所知繇是聲名益廣昉復與溉為山澤逰及昉卒其子流離不能自振劉孝標作絶交論溉見其論抵之於地終身恨之張稷為左僕射預殺齊東昬侯稷雖居朝右每慙口實乃名其子伊字懐尹霍字希光畯字農人同字不見見字不同以旌其志既懼且恨乃求出許之出為青冀二州刺史不得志嘗閉閣讀佛經禁防寛弛僚吏頗致侵擾州人徐道角等夜襲州城乃害之有司奏削官爵後魏韓子熈為衛大將軍先是子熈與其弟聘王氏為妻姑之女也生二子子熈尚未婚後遂與寡嫗李氏姦合而生三子三子不穆迭相告言歴年不罷子熈因此慙恨遂以發病卒隂鳯北海人也史不載其官賈思伯初與弟思同師事鳯授業無資酬之鳯遂質留衣物及思伯為南青州刺史之部送縑百疋遺鳯因具車馬迎之鳯慙不徃時人稱嘆焉楊尼為國子祭酒兼幽州中正受鄉人財貨免官尼毎自傷曰吾昔未仕不曾羡人今日失官與人何異然非吾宿志命也如何既而還鄉遂卒於冀州北齊楊愔字遵彦𢎞農華隂人及為黄門侍郎尚公主其後衣紫羅袍金鏤大帶遇李庻頗以為耻謂曰我此衣服都是内裁既見子將不能無愧揚周王勇為大將軍矜功伐善好揚人之惡柱國侯莫陳崇勲高望重與諸將同謁晋公䕶聞勇數論人之短乃於衆中折辱之勇遂慙恚因疽發背而卒隋庫逖士文從妹為齊氏嬪有色齊滅之後賜薛國公長孫覽為妾覽妻鄭氏性妬譛之於文獻后后令覽離之士文耻之不與相見後應州刺史唐君明居母憂䀻以為妻繇是士文君明竝為御史所劾士文性剛在獄數日憤恚而死王韶字士隆慷慨有父風官至備身將軍越王侗稱帝士隆率千兵自江淮而至㑹王世充僣號甚禮重之署尚書右僕射士隆憂憤疽發背卒唐張𤣥素為太子左庻子𤣥素與大理卿孫伏伽在隋竝嘗任令史伏伽毎於廣坐陳説徃事初不介意元素尤䕶其事未嘗渉言太宗嘗對衆問元素出身歴任元素初猶不言太宗固問之既以實荅出閣外忙然色變不復言笑行歩失措而歸閻立本以善畵知名太宗嘗與侍臣學士泛舟於春苑池中有異鳥隨波容與太宗悦之詔座者為召立本令寫之閣外傳呼云畫師閻立本到立本時為主爵郎中趨走流汗俛伏池側手持丹粉瞻望座賓深為愧赧退而誡其子曰吾少好讀書幸免墻面縁情染翰頗及儕流唯以丹青見知躬厮役之務辱莫大焉汝宜深誡勿習此末伎也李義琰為中書侍郎同中書門下三品義琰將改塟父母使舅氏移其舊塋高宗聞而不悦義琰不自安因足疾上疏乞骸骨詔許之許彦伯為太子舍人彦伯高陽郡公敬宗孫也父昻為䖍化令初敬宗侍婢有姿色而昻通之敬宗怒奏昻不孝流於嶺外敬宗卒太常博士袁思古定謚曰繆彦伯訟請改謚彦伯既與思古忿競又於路上欲邀擊之思古曰吾與賢家君報讐耳彦伯大慙而退後唐誠惠五臺山僧也自云能役使毒龍可致風雨其徒號曰䧏龍大師同光三年京師旱莊宗迎至雒下士庻瞻仰謂朝夕可致甘澤禱之數旬無徴應或以焚燎為聞懼之潛去至其寺慙恚而終張筠前任興元節度使請歸私第筠昔在山南縶其副使判官都校輙加楚掠誣其反狀按之無驗帝俱釋之筠知其非故乞歸私第閻寳為天平軍節度使討鎮州張文禮文禮死子處瑾祕不發喪城中饑處瑾之衆出城求食寳縱其出伏截擊之饑賊大至諸軍未集為賊所乗寳乃収軍退保趙州因慙憤成疾疽發背而卒周宋彦筠仕漢以太子太師致仕閑居累嵗聞太祖之起也復有秉旄之望迎太祖於臯門延㽞乆之彦筠從容進曰當日懸車本非所願漢朝寡援排斥至此老夫筋力未衰願賜展力之所太祖笑而頷之廣順初除左衛上將軍彦筠深失所望退謂所親曰余以軍伍立身歴藩部十數任今日第一度昇朝也未幾當叅墜笏失儀為御史所劾太祖以勲武之臣欲責其失樞宻使王峻請依常例薄罰乃奪一月俸彦筠大以為耻私謂人曰入仕四十年未嘗遭一罰今日甚可羞矣忍耻士有時運之未亨饑寒之切已忍耻自適志在功名茍活土糞之中甘心傭保之下或負薪以自給或滌噐而雜作或畧賣而為奴或乞食以見辱及夫君臣交感智畧獲伸則龍蛇起陸非復蚯蚓之類鴻鵠逺引何傷鷰雀之比哉管仲齊大夫少時與鮑叔牙逰仲曰公子紏敗召忽死之吾幽囚受辱鮑叔不以我為無耻知我不羞小節而耻功名不顯於天下也高漸離燕人善擊筑荆軻至燕日與漸離飲於燕市及軻誅漸離變名姓為人傭保匿作於宋子縣名屬鉅鹿乆之作苦念乆隐畏約無窮時乃退出其装匣中筑與其善衣更容貌而前舉坐客皆驚下與抗禮以為上客漢張耳大梁人少時及魏公子無忌為客言其尚及見無忌為之賔客陳餘亦大梁人父事耳秦滅魏購求耳餘兩人變姓名俱入陳為里監門吏嘗以過笞餘餘欲起耳攝使受笞攝謂引指之吏去耳數之曰數責也始吾與公言何如今見小辱而欲死一吏乎餘謝罪後封為趙王韓信淮隂人淮隂少年侮信曰雖長大好帶刀劔怯耳衆辱信曰能死刺我不能出跨下衆辱於衆中辱之跨下兩股之間於是信熟視俛出跨下俛亦俯字一市皆笑信以為怯後為大將軍封楚王欒布梁人始彭越為家人時嘗與布㳺家人猶言編户之人也窮困賣傭於齊為酒家保謂傭作受僱也為家保可任使數嵗别去而布為人所畧賣為奴於燕燕將臧荼舉以為都尉季布楚人有名於楚項籍使將兵數窘漢王窘困也窘音求隕切項籍滅高祖購求布千金敢有舍匿罪三族舍止匿隐也布匿濮陽周氏周氏曰漢求將軍急跡且至臣家跡尋其蹤跡也能聼臣臣敢進計即不能􅂅先自剄布許之廼髠鉗衣褐置廣桞車中廣栁大隆穹也周禮説衣翣栁聚也衆餙之所聚也此為載以䘮車欲人不知也隆穹所謂車軬者耳軬音扶晚切並與其家僮數十人之魯朱家所賣之朱家魯人見㳺俠傳朱家心知其季布也買置田舍乃之雒陽見汝隂侯滕公為帝言之帝乃赦布當是時皆多布能摧剛為柔後至河東守司馬相如為武騎常侍因病免客臨卭臨卭富人卓王孫女文君夜亡奔相如相如與文君馳歸成都家徒四壁立徒空也但有四壁更無資産卓文孫大怒曰女不材我不忍殺一錢不分也人或謂王孫王孫終不聽文君乆之不樂謂長卿曰第俱如臨卭第但也發聲之急耳從昆弟假貸猶足以為生何至自苦如此相如與俱之臨卭盡賣車騎買酒舍乃令文君當壚賣酒之處累土為壚以居酒瓮四邊隆起其一靣高形如鍜壚故名壚耳而俗之學者皆謂當壚謂對温候火壚失其義矣相如身自著犢鼻裩即今之衳也形似犢鼻故以名名云衳音之容切與傭保雜作庸即謂賃作者保謂庸之可信任者也滌噐於市中滌洒也噐酒噐也食已則洒之賤人役也洒先禮切卓王孫耻之為杜門不出朱買臣為㑹稽太守初買臣家貧嘗艾薪樵賣以給食艾讀曰割給供也其妻亦負戴相隨數止買臣毋歌嘔道中嘔讀曰謳買臣愈益疾歌妻羞之求去買臣不能㽞即聽去其後買臣獨行歌道中負薪墓間故妻與夫家俱上塜見買臣饑寒呼飯飲之飯飲飯之音扶晚切飲音於禁切司馬遷被刑之後為中書令荅益州刺史任安書曰且夫臧獲婢妾猶能引决海岱之間罵奴曰臧罵婢曰獲燕之北郊民而婿婢謂之臧女而歸奴謂之獲况若僕之不得已乎所以隐忍茍活幽糞土之中而不辭者恨私心有所不盡鄙沒世而文采不表於後也後漢皇甫嵩字義眞為議郎董卓怨嵩及卓秉政為御史中丞卓還長安公卿百官迎謁道次卓諷令御史中丞以下皆拜以屈嵩既而抵手言曰義眞偹未乎僃音服説文曰服牛乘馬僃即古服字也今河朔人猶有此言音僃嵩笑而謝之卓乃解釋呉歩隲為丞相初避難江東單身窮困與廣陵衛旌同年相善俱以種𤓰自給晝勤四體夜誦經傳㑹稽焦征羌郡之豪族呉錄曰征羌名矯甞為征羌令人客放縱隲與旌求食其地懼為所侵乃共修刺奉𤓰以獻征羌征羗方在内臥駐之移時旌欲委去隲止之曰本所以來畏其彊也而今舍去欲以為高祗結怨耳良乆征羌開牖見之身隐几坐帳中設席致地坐隲旌於牖外旌愈耻之隲辭色自若征羌作食身享大案殽膳重㳫以小盤飯與隲旌惟菜茹而已旌不能食隲極飯致飽乃辭出旌怒隲曰何能忍此隲曰吾等貧賤是以主人以貧賤遇之固其宜也當何所耻宋劉穆之為尚書左僕射少時家貧誕節嗜酒食不修拘檢好徃妻兄弟乞食多見辱不以為耻唐路隨元和初以通經調授潤州叅軍為李錡所困使知市事隨翛然坐市中一不介意册府元龜卷九百二十六
