body:
  text: 册府元龜卷四百六十三宋王欽若等撰臺省部謙退夫讓之謂懿徳紀於春秋謙之能有終載於易象非夫明哲之兼藴㡬神之内朗其孰能與於此乎漢氏而下政歸臺閣典掌機要叅預顧問權任斯劇位望彌峻乃有畏逺名勢推避光寵深戒盛滿固懐冲抑薦賢而自代者期乎達人引年而斂迹者表乎知止或形於封疏極其剖陳或面述至誠發於悃愊固亦感動時主獲寢成命高謝榮爵言還故里者斯不乏焉雖復周旋敦諭黽勉就職然其孤風逸軌亦足以厲俗矣傳所謂難進而易退見利而思義者皆斯人之徒歟漢金日磾為侍中武帝病屬霍光以輔少主讓日磾日磾曰臣外國人且使匈奴輕漢於是遂為光副武帝遺詔以討莽何羅功封日磾秺侯日磾以帝少不受封孔覇宣帝時拜太中大夫為人謙退不好權勢嘗稱爵位泰過何徳以堪之帝欲致覇相位自御史大夫貢禹卒及薛廣徳免輒欲拜覇覇讓位自陳至三帝深知其至誠廼弗用以是敬之賞賜甚厚貢禹為河南令去官元帝初即位徴為諌大夫遷光禄大夫禹上書曰臣禹年老貧窮家貲不滿萬錢妻子糠豆不贍裋褐不完有田百三十畆陛下過意徴臣過猶誤也臣賣田百畆以供車馬至拜為諌大夫秩八百石俸錢月九千二百廩食太官謂太官給其食又蒙賞賜四時雜繒緜絮衣服酒肉諸果物徳厚甚深疾病侍醫臨治侍醫天子之醫也頼陛下神靈不死而活又拜為光禄大夫秩二千石俸錢月萬二千禄賜愈多家日以益富身日以益尊誠非草茅愚臣所蒙也晋山濤太康初遷右僕射加光禄大夫侍中掌選如故濤以老疾固辭手詔曰君以道徳為世模表况自先帝識君逺意吾將倚君以穆風俗何乃欲舎逺朝政獨高其志邪吾之至懐故不足以喻乎何來言至懇切也且當以時自力深副至望君不降志朕不安席濤又上表固讓不許紀瞻轉尚書上疏諌諍多所規益帝甚嘉其忠烈㑹乆病不堪朝請上疏曰臣疾疚不痊曠廢轉久比陳誠欵未見哀察重以尸素抱罪枕席憂責之重不知埀没之餘當所投厝臣聞易失者時不再者年故古之志士義人負鼎趣走商歌於市誠欲及時效其忠規名傳不朽也然失之者億萬得之者一二耳常人之情貪求榮利臣以凡庸邂逅遭遇勞無負俎口不商歌横逢大運頻煩饕竊雖思慕古人自效之志竟無毫釐報塞之效而犬馬齒衰衆疾廢頓僵卧救命百有餘日叩棺曳衾日頓一日如復天假之年蒙陛下行葦之惠適可薄存性命枕息陋巷亦無繇復厠八座升降臺閣也臣目㝠齒墮胸腹氷冷創既不差足復偏跛為病受困既以荼毒七十之年禮典所遺衰老之徴皎然露出臣雖欲勤自藏護隠伏何地臣之職掌户口租税國之所重方今六合波盪人未安居土被大化百度草創發卒轉運皆湏人力以臣平强兼以晨夜尚不及事今俟命漏刻而當乆停機職使王事有廢若朝廷以之廣恩則憂責日重以之序官則官廢事弊湏臣病差則臣日月衰退今以天慈使官曠事滯臣受偏私之宥於大望亦有虧損今萬國革面賢俊比迹而嘗虚停好爵不以縻賢以臣穢病之餘妨官固職誠非古今黜進之急惟陛下割不已之仁賜以敝帷隕仆之日得以藉尸時銓俊乂使官修事舉臣免罪戮死生厚幸因以疾免尋除尚書右僕射屢辭不聽遂稱病篤還第不許蔡謨遷五兵尚書領瑯琊王師謨上疏讓曰八座之任非賢莫居前後所用資命有常孔愉諸葛恢竝以清節令才少著名望昔愉為御史中丞臣尚為司徒長史恢為㑹稽太守臣為尚書郎恢尹丹陽臣守小郡名軰不同階級殊懸今猥以輕鄙超倫踰等上亂聖朝貫魚之序下違羣士凖平之論豈唯㣲臣其亾之誡實招聖政惟塵之累且左長史一超而侍帷幄再登而厠納言中興以來上徳之舉所未嘗有臣何人斯而猥當之是以叩心自忖三省愚身與其茍進以穢清塗寕受違命狷固之罪疏奏不許何充為尚書令加左將軍充以内外統任宜相糾正若使事綜一人於課對為嫌乃上疏固讓許之從中書令加散騎常侍領軍如故又領州大中正以州有先達宿徳固讓不拜後為驃騎將軍獻后臨朝詔曰驃騎任重可以甲仗百人入殿又加中書監録尚書事充自陳既録尚書不以復監中書許之卞壼為尚書令廉潔儉素居甚貧約息當婚成帝特賜錢五十萬固辭不受孔愉為左僕射詔給親信二十人廪賜愉上疏固讓優詔不許重表曰臣以朽闇忝厠朝右而以惰劣無益毗佐方今疆場日駭政煩役重百姓困苦姦吏擅威暴人肆虐大弊之後倉庫空虚功勞之士賞賜不足困悴之餘未見拯恤呼嗟之怨人鬼感動宜并官省職貶食節用勤撫其人以濟其艱臣等不能賛揚大化糾明刑政而偷安高位横受寵給無徳而禄殃必及之不敢横受殊施以重罪戾從之王彪之為東海王文學從伯導謂曰選官欲以汝為尚書郎汝幸可作諸王佐邪彪之曰位之多少既不足計自當任之於時至於超遷是所不願遂為郎顔含除國子祭酒加散騎常侍遷光祿勲以年老遜位成帝美其素行就加右光禄大夫門施行馬賜牀帳被褥勑太官四時致膳固辭不受王洽加中書令固讓表疏十上穆帝詔曰敬和清裁貴令昔為中書郎吾時尚小數呼見意甚親之今所以用為令既機任湏才且欲時時相見共講文章待以友臣之義而累表固讓甚違本懐其催洽令拜苦讓遂不受郄愔再遷黄門侍郎時呉郡守闕欲以愔為太守愔自以望少不宜超蒞大郡朝議嘉之轉為臨海太守宋王裕之字敬𢎞為吏部尚書兼散騎常侍敬𢎞每被除名即便祗奉既到宜退旋復解官高祖嘉其志不茍違也復除廬陵王師加散騎常侍自陳無徳不可師範令王固讓不拜又除秘書監金紫光禄大夫加散騎常侍本州中正又不就文帝元嘉六年遷尚書令敬𢎞固讓本求還東帝不能奪改授侍中特進左光禄大夫給親信二十人讓侍中特進求减親信之半不許十六年以為光禄大夫開府儀同三司侍中敬𢎞詣京師乃上表曰臣比自啓聞謂誠心已達天監𤣥邈未䝉在宥不敢晏處牽曳載馳臣聞君子行道􅁯其為身三復斯言若可庶勉顧惜惛耄志與願違禮年七十老而傳家家道猶然况於在國伏願陛下矜臣西夕愍臣一至時廻聖恩賜反其所則天道下濟愚心盡矣竟不拜東歸二十三年重申前命又表曰臣躬耕南澧不求聞達先帝拔臣於蠻荆之域賜以國士之遇陛下嗣徽特蒙眷齒由是感激委質聖朝雖懐犬馬之誠遂無塵露之益年上九十生理始盡永絶天光淪没丘壑謹冒奉表傷心乆之王曇首文帝時為太子詹事侍中謝晦平後帝欲封曇首等㑹讌集舉酒勸之因拊御牀曰此坐非卿兄弟無復今日時封詔已成出以示曇首曇首曰近日之事釁難將成頼陛下英明速斷故罪人斯戮臣等雖得仰慿天光効其毫露豈可因國之災以為身幸陛下雖欲私臣當如直史何帝不能奪故封事遂寢王僧綽為侍中先是王曇首與王華竝為文帝所任華子嗣人才既劣位遇亦輕僧綽嘗謂中書侍郎蔡興宗曰弟名位應與新建齊超至今日蓋繇姻戚所致也新建者嗣之封也及為侍中時年二十九始興王濬嘗聞問其年僧綽自嫌早逹逡廵良乆乃荅其謙虚自退若此元嘉末文帝頗以後事為念以其年少方欲大相付託朝政小大皆與叅焉從兄㣲清介士也懼其太盛勸令損抑僧綽乃求呉郡及廣州帝竝不許殷景仁拜侍中累表辭讓又固陳曰臣志幹短弱歴著出處值皇塗隆泰身荷恩榮階牒推遷日月頻積失在饕餮患不自量而奉聞今授固守愚心者竊推殊次之寵必歸器望喉唇之任非才莫居三省諸躬無以克荷豈可茍順甘榮不知進退上虧朝舉下貽身咎求之公私未見其可顧涯審分誠難庶㡬踰方越序益以誡懼所以俯仰周徨無地寕處若惠澤廣流蘭艾同潤廻改前㫖賜以降階雖實不敏敢􅁯循命臣迕違之愆既已屢積寕當徒尚浮采塵黷天聽丹情悾欵仰希炤察詔曰景仁退挹之懐有不可改除黄門侍郎以申君子之請顔俊為丹陽尹加中書令丹陽如故上表讓中書令曰虚竊國靈生玷禁要聞命慚惶形魂震越臣東州凡鄙生於㣲族長自閭閫不窺官轍門無富貴志絶華伍值以委身壠畆饑寒交切先朝陶鈞庶品不遺愚賤得免耕税之勤厠仕進之末陛下盛徳居藩揔攬英異越以不才超塵清軌奉躬歴稔勞効莫書仰恃曲成之仁畢願守宰之秩豈期天地中闋殷憂啓聖倚附興運擢景神塗雲飛海泳冠絶倫等曽未三期殊命八萃詳科賞典則臣不應科瞻言勤良則臣當與責方欲訴欵皇朝降階盛序㣲已國言少徹身謗而制書猥下爵秩彌隆臣小人也不及逺謀寵利之來何能居約徒以上凟天明下汨彛議災謫之興懼必在邇今之過授以先㣲身茍曰非據危辱将及十手所指喻等膏肓所以寤寐兢遽維縈苦疾者也伏願陛下察其丹誠矜其疾願絶惠收恩以全愚分則造化之施方兹為薄見許江智淵為中書侍郎智淵愛好文雅辭采清贍孝武世祖深相知待恩禮冠朝帝讌私甚數多命羣臣三五人游集智淵常為其首同侣未及前轍獨蒙引進智淵每以越衆為慙未嘗有喜色每從游幸與羣僚相随見傳詔馳來知當呼已聳動愧恧形於容貌論者以此多之謝莊為吏部尚書莊素多疾不願居選部與大司馬江夏王義恭牋自陳曰下官凡人非有達槩異識俗外之志實因羸疾嘗恐奄忽故少来無意於人間豈當有心於崇達耶頃年乘事廻薄遂累叨非次既足貽誚明時又亦取愧朋友前以聖道初開不遑引退及此諸夏事寧方陳㣲請欵志未申仍荷今授被恩之始具披寸心非唯在已知尤實懼塵穢彛序禀生多病天下所悉兩臂癖疾殆與生俱一月發動不減兩三每至一惡痛來逼心氣餘如綖斯患數年遂成痼疾吸吸惙惙甞如行尸常居死病而不復道者豈是疾痊直以荷恩深重思荅殊施牽課尫瘵以綜所忝眼患五月來便不復夜坐嘗閉惟避風日晝夜惛懵為此不復得朝謁諸王慶弔親舊惟被勑見不容停耳此段不堪見賔已數十日持此苦生而使銓綜九流應對無方之訴實由聖慈罔已然當之信自苦劇若才堪事任而體氣休健承寵異之遇處自効之塗豈茍欲思閒避事耶家素貧敝宅舎未立兒息不免麄糲而安之若命寕復是能􅁯㣲禄正以復有切於此處故無復他願耳今之所希唯是小閒下官㣲命於天下至輕在已不能不重屢經披請未蒙哀恕良繇誠淺辭訥不足上感家世無年高祖四十曽祖三十二亾祖四十七下官新嵗便三十五加以疾患如此當復㡬時見聖世就其中煎憹若此實在可矜前時曽啓願三呉勅㫖云都不湏復議外出莫非過恩然亦是下官生運不應見一閒逸今不敢復言此當待之來生耳但得保餘年無復物務少得飬痾此便是志願永畢在衡門下有所懐動止必聞亦無假居職患於不能裨補萬一也識淺才常羸疾如此孤負主上擢授之恩私心實自哀愧入年便當更申前請以死自固但庸近所訴恐未能仰徹公恩盻𢎞深粗照誠懇願侍坐言次賜垂拯助則苦誠至心庶獲哀允若不蒙降祐下官當於何希兾邪仰慿愍察願不垂恠二年坐辭疾多免官劉勔拜散騎常侍中領軍勔以世路糾紛有懐止足求東陽郡明帝以勔啓遍示朝臣自尚書僕射袁粲以下莫不稱贊咸謂宜許帝曰巴陵建平二王竝有獨往之志若世道寕安皆當繇其所請勔經始鍾嶺之南以為栖息聚石蓄水髣髴丘中朝士愛素者多往逰之王景文為中書監太子太傅自陳求解揚州曰臣凡猥下劣方圓無算特逢聖私頻叨不次乗非其任理宜復折雖加恭謹無補横至夙夜憔戰無地容䖏六月中得臣外生女殷常妻蔡疏欲令其兒啓聞乞禄求臣署入云凡外人通啓先經臣署于時驚怖即欲封疏上呈更思此家落寞庻非通謗且廣聽察幸無復所聞比忽得兖州都送迎西曹解季遜板云是臣屬既不識此人即問郄顒方知虛託比十七日晩得征南叅軍事謝儼口信云臣使人畧奪其婢臣遣李武之問儼元繇荅云使人謬伏自念終誤誤之與實雖所不知聞此之日唯有憂駭臣之所知便有此三變臣所不覺尤不可思若守爵散軰寕當招此誠繇闇拙非復可防自竊州任倐已七月無徳而禄其殃将至且傅職清峻元禮儲極以臣凡走豈可暫安荷恩懼罪不敢執固燋䰟褫氣憂迫失常况臣髮醜人羣病絶力効穢朝㸃列顧無與等獨息易駭慙懼難持伏願薄廻矜愍全臣身計大夫之俸足以自周乆懐欣羡未敢千請仰希慈宥照臣欵誠明帝詔荅曰去五月中吾病始差未堪勞役使卿等㸔選牒署竟請勑施行此非宻事外間不容都不聞然傳事好訛繇來常患殷常妻匹婦耳閨閣之内傳聞事復作一兩倍落寞兼謂卿是親故希卿署不必云選事獨闗卿也常妻雖是傳聞之僻大都非可駭異且舉元薦愷咸繇疇諮可謂唐堯不明下干其政也愚人好詐貴人及在事者屬卿偶不悉耳多是其周旋門生軰作其屬託貴人及在事者永無繇知非徒止于京師乃至州郡縣中或有詐作書疏灼然有文迹者諸舎人右丞軰及親近驅使人慮有作其名載禁物求停檢校强賣猥物與官仍求交直或屬人求乞州郡資禮希蠲呼召及慮發船車竝啓班下在所有即駐録但卿貴人不容有此啓繇來有是何故獨驚人居貴要但問心若何耳大明之世巢徐二戴位不過執㦸權亢人主顔師伯白衣僕射横行尚書中今袁粲作僕射領選而人往往不知有粲粲遷為令居之不疑今既省録令便居昔之録任置省事及幹僮竝依録格粲作令来亦不異為僕射人情向粲淡淡然亦復不改常以此居貴位要任當有致憂兢理不卿今雖作揚州太子傅位雖貴不闗朝政可安不懼差于粲也想卿虚心受榮而不為累貴高有危殆之懼卑賤有溝壑之憂張單䨇災木鴈兩失有心于避禍不如無心于任運夫千仭之木既摧於斧斤一寸之草亦悴於踐蹋高崖之脩榦與深谷之淺條存亾之要巨細一揆耳晋卿畢萬七戰皆獲死於牗下蜀相費禕從容坐談斃於刺客故甘心於履危未必逢禍縱意於處安不必全福但貴者自惜故每憂其身賤者自輕故易㤀其已然為教者每誡貴不誡賤言其貴滿好自恃也凢名位貴達人以在懐恭則觸人改容否則行路嗟愕至如賤者否泰不足以動人存亾不足以絓數死於溝瀆死於塗路者天地之間亦復何限人不以係意耳以此而推貴何必難處賤何必易安但人生也自應卑慎為道行已用心務思謹惜若乃吉㓙大期正應委之理運遭随参差莫不繇命也既非聖人不能見吉㓙之先正是依稀於理言可行而為之耳得吉者是其命吉遇不吉者是命㐫以近事論之景和之世晋平庻人從夀陽歸亂朝人皆為之戰慄而乃遇中興之運袁顗圗避禍於襄陽當時皆羡之謂為凌霄駕鳯遂與義嘉同滅駱宰見㓜主語人云越王長頸烏喙可與共憂不可與共樂范蠡去而全身文種留而遇禍今主上口頸頗有越王之状我在尚書中乆不去必危遂求南江小縣諸都今史住京師者皆遭中興之慶人人蒙爵級宰值義嘉染罪金木纒身性命㡬絶卿耳眼所聞見安危在運何可預圗耶册府元龜卷四百六十三
