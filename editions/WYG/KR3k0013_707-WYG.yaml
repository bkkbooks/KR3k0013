  text: 欽定四庫全書冊府元龜卷七百七宋王欽若等撰
  hash: sha256:2039cc0a41f7a411826407d53296830c46da4687ab24771e7b54e0f5edd450bf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_707-1a}
body:
  text: 令長部酷暴黜責貪黷酷暴逸徳比於烈火苛政甚於猛虎雖百里之非廣乃編氓之攸頼則有性既嚴酷貌復兇很惟申韓之是法於理刑而失中報虐以威歛怨於下峻罰是長殘殺無罪或馮勢而成濫亦擊强而過正乃至榜楚不絶網穽交設重足斯畏謡言載興寕失不經斯可鍳矣漢義縱補上黨郡中令治敢往少温藉敢行暴害之政少温藉言無所含容也温於問切藉才夜切嚴延年為平陵令坐殺不辜去官尹賞為頻陽令坐殘賊免後漢陽球為髙唐令性嚴厲好申韓之學以嚴苛過理郡守收舉收擊舉劾之㑹赦見原周紆為雒陽令章帝知紆奉法疾姦不事貴戚然苛慘失中􅆭虐也數為有司所奏遂免官徐宣為下邳令暴虐尤甚先是求故汝南太守下邳李暠女不能得及到縣遂將吏卒至暠家載其女歸戯射殺之埋著寺内魏滿寵漢末為許令時曹洪宗室親貴有賔客在界數犯法寵收治之洪書報寵寵不聼洪白太祖召許主者寵知將欲原乃速殺之太祖喜曰當事不當爾耶故太尉楊彪收付縣獄尚書荀彧少府孔融等並属寵但當受辭勿加考掠寵一無所報考訊如法數日求見太祖言之曰楊彪考訊無他辭諸當殺者宜先彰其罪此人有名海内若罪不明必大失民望竊為明公惜之太祖即日赦出彪初彧融聞考掠彪皆怒及因此得出復善寵裴松之以為楊公積徳之門身為名士縱有愆負猶宜宥免滛刑所濫而可加其楚掠乎若理應考訊荀孔二賢豈其妄有相請属哉寵以此為䏻酷吏之用心耳雖有後善何觧前虐齊江介為吴令其父謐為長沙内史謐政治苛刻介治亦深切民間榜死人髑髏為謐首介棄官而去梁沈瑀為餘姚令冨吏鮮衣羙服以自彰别瑀怒曰汝等下縣吏何自擬貴人邪悉使著芒履麄布侍立終日足有蹉跌輙加榜棰陳庚時為臨安令坐杖殺縣民免唐權懐恩髙宗咸亨中為萬年令不避强禦時有雒陽令楊徳幹亦以威嚴為人吏所畏時人語曰寜喫三斗塵不逢權懐恩寕喫三斗炭不逢楊徳幹楊徳幹為雒陽令杖殺人吏以立威名雒州長史賈敦實曰政在養人義須存撫傷生過多雖􅀎亦不足貴也常抑止徳幹徳亦為稍減楊廻為盈川令政殘酷人吏動不如意輒榜殺之王鈞𤣥宗開元中為雒陽尉與河南丞嚴安之皆性毒虐笞罰人畏其不死决杖訖不放起須其腫憤徐乃重杖之懊血流地苦楚欲死鈞與安之始眉目喜暢故人吏懾懼毛若虗天寳中為蜀川尉若虗眉毛覆於眼性殘忍使司以推勾見任侯遵徳宗貞元中為富平令縣人李載配納元陵園糞兩車愆期或譛毁載於遵者因寄怒以痛䋲之載所負之值不過數千而罰之三百貫文枷禁拽辱焉載妹壻昭得皇后弟王杲奏之帝命御史臺鞫之遵具欵伏宰臣董晉竇㕘進曰李載不納差科未為巨蠧侯遵峻其懲罰頗越常倫况是國親去就有禮毁損過甚理當罪責望貶澧州司户㕘軍帝不欲以戚属之故而罪吏止停其官黜責令長字民之重任也黜陟馭下之大典也列國以大夫守邑漢氏以郎官出宰自兹已降名數寖優宜乎撫恵黎蒸宣暢徳澤若乃性異明逹行非貞素依違不㫁苛刻無恩訟起獄豐土荒民散或沉湎棄職聚歛是圖儲峙闕供裁處非允瘡痏既積怨讟並興廢百里之威煩三尺之法為人臣者可不慎歟其有因虐吏之奏劾繇要臣之誣毁以䧟於非罪者亦類次于篇云阿大夫史不書姓名齊威王即位召阿大夫語曰自子之守阿譽日聞然吾使人視阿田野不闢民人貧苦是子以幣厚吾左右以求譽也乃烹阿大夫漢任安為三百石長坐上行出㳺共帳不辦斥免尹賞為頻陽令坐殘賊免朱雲為杜令坐故縱亡命㑹赦後漢鄭興為蓮勺令蓮音輦勺音酌故城在今下邽縣是時䘮亂之餘郡縣殘荒興方欲築城郭修禮教以化之㑹以事免尹敏為長陵令明帝永平五年詔書捕男子周慮慮素有名稱而善於敏敏坐繫免官及出歎曰瘖聾之徒真世之有道者也何謂察察而遇斯患乎周紆為雒陽令苛􅆭失中數為有司所奏遂免官陽球為髙唐令以嚴苛過理郡守收舉收繫舉劾之㑹赦見原曹褒為圉令以禮理人以徳化俗時它郡盗徒五人来入圉界吏捕得之陳留太守馬嚴聞而疾惡風縣殺之褒勑吏曰夫絶人命者天亦絶之臯陶不為盗制死刑管仲遇盗而升諸公今承㫖而殺之是逆天心順府意也其罰重矣如得全此人命而身坐之吾所願也遂不為殺嚴奏褒耎弱免官歸郡蜀􅃽琬字公琰為廣都長先主嘗因遊觀奄至廣都琬衆事不理時又躭酒先主大怒將加罪戮軍師將軍諸葛亮請曰􅃽琬社稷器非百里之才其為政以安民為本不以修飾為先願主公重加察之先主雅重亮乃不加罪倉卒免官而已宋沈文秀字仲逹為建康令坐為尋陽王鞭殺私奴免官加杖百尋復官南齊沈㠝之為丹徒令性疎直在縣自以清㢘不事左右浸潤日至遂鏁繫尚方歎曰一見天子足矣武帝召問曰復欲何陳答曰臣坐清復以獲罪帝曰清復何以獲罪曰無以承奉要人帝曰要人為誰㠝之以手板四面指曰此赤衣諸賢皆是若臣得更鳴必令清譽日至㠝之雖危言帝亦不責梁庾仲容歴永康錢唐武康令治縣並無績多被劾唐裴行儉為長安令髙宗顯慶中坐禇遂良事左遷西州都督府長史王同慶為汾州平遥縣令𤣥宗開元十一年坐貶處州贛縣尉勑曰朕問俗觀人務存節儉先有䖏分不許煩勞王同慶違法擾人借歛無紀望鄉科被率户出鞋屏風花盤計盈數百徵求既廣般運又勞以此字人豈我良宰冝書刑典以誡具寮李泳為鄧州南陽縣令開元二十四年坐擅興賦役遂貶康州都城縣尉薛近為長安縣尉徐綱為萬年尉代宗大厯五年四月貶近連州連山縣尉綱邵州武岡縣尉並員外置是月久雨京城饑代宗令出米五萬石减價分糶貧人近等踰法狥私是以懲也劉澡為渭南令大厯十二年京畿水旱京兆尹黎幹奏損田户部侍郎判度支韓滉執奏幹不實乃命廵覆時澡曲附度支具干善名以縣界田並無損白於府及戸部分廵御史趙計不欲忤度支奏報恊澡代宗覧奏以為水旱咸均不宜渭南獨免特命侍御史朱敖再覆敖覆命渭南損田三千餘頃帝歎息久之大怒澡因謂敖曰縣令職在字人不損猶宜稱損損而不問豈有恤隠之意耶卿之此行可謂稱職下有司訊覆澡及趙計並伏罪乃貶澡為萬州南浦縣員外尉計為澧州員外司户㕘軍荀曽為三原縣令徳宗貞元二年四月以無政理改授司議郎李佇為䖍化縣令憲宗元和九年七月勑佇虐下以慘訊罪違律至使饋餉皆絶瘐死非辜因其壅隔更令殘毁戕人及此良用憮然俾投禦魅之鄉以戒字氓之長可守雷州海康縣尉劉行餘為馮翊縣尉敬宗寳厯元年十月坐擅决軍人貶道州延昌尉姚中立為萬年縣令孟琯為長安縣令文宗太和九年十一月兩縣捕賊官領其徒受羅立言指使王欽若等曰立言為同李訓鄭注事内萬年縣捕賊官鄭洪懼而詐死令其家人䘮服而哭中立隂識之慮其詐聞不􅀎免所累以其状告之洪藏入左神䇿軍洪銜中立之告返言追集所繇皆縣令指揮故貶中立為朗州長史琯為硤州長史尋再貶中立為韶州司户叅軍琯為梧州司户叅軍朱儔為京兆府羙原縣主簿文宗開成三年十二月貶為衡州衡山縣尉初奉先馮翊等縣百姓為牛羊使占其田産儔奉使推鞫盡以百姓田歸牛羊司給事姚合列䟽其事遂貶之梁髙綰為封丘令太祖開平元年六月以封丘境内虫蝗為災最甚太祖令近界撲滅下明勑以懸賞罰之戒以綰不恭罰金仍免官田光裔為糓熟縣令開平四年四月宋州衡王友諒進瑞麥一莖三穟太祖覧奏不懌曰古来上瑞惟在豐年合頴兩岐皆是虛事乃停光裔官仍追毁歴任官牒以瑞麥故也後唐劉知章為醴泉縣令長興元年七月明宗命廻鶻侯三走馬入廻鶻部給程有日沿路乗驛而行醴泉既非衝要素無驛馬長吏供億無准洎侯三至縣索驛馬舘榖所司未辦適遇知章不在縣或謂侯三云知章出從禽之矣鎮將以馬給之俄而知章至哀訴引過侯三不之顧因奏其状明宗大怒促命械送至京事幾不測安重誨從容奏覆方得减死配流沁州張紹業為湘州臨漳令長興元年縣人劉暉訟紹業贓賄不公及借便官物勅㫖張紹業勒停見任薛文玉為武功縣令長興元年九月西京奏武功縣百姓三千餘人持白棒入縣亂擊人吏分刼縣庫税錢公廨什物尋差兵士捉到結集首領武功鎮將􅎤跌琉等三十二人各招本罪稱縣令以大竿尺簡田所以衆心難抑其􅎤跌琉准法科㫁文玉罰七十直主簿李彦柔罰五十直並勒停鄭延朗為衛縣令長興元年九月魏慱奏延郎自於獄中推劾盗賊妄引平人孫厚延郎自行拷决孫厚致死勑㫖付大理詳覆以聞盧嵩為獲嘉令長興元年五月坐户民關延韜不伏責問喧悖令從人曵撲良久致死大理寺斷配流大徳勑㫖盧嵩容易宰邑造次怒人不如法以行刑遂尋時而致死原情則本非故殺據律則當處極刑小不忍而難追内自訟而何及法不可墜義亦須明但究彼根繇似縁公事罪雖甚重理稍可疑峻行則慮致民驕輕恕則恐滋吏酷永從逺竄特貸餘生聊以慰往者之䰟兼可戒為官之属嵩宜配蔚州長流百姓縱逢恩赦不在放歸之限其出身歴任告勅付所司焚毁餘依省寺詳㫁王韜玉前為湖陽令愍帝時於端門接宰臣陳考績事不實配流坊州晉張嗣宗為襄邑縣令少帝開元二年開元府奏嗣宗先被百姓趙覺直論訟不公法寺定罪合徒一年半以官收贖贖銅三十斤府司尋科放訖㨿新除㐮邑令王允昇状申稱張嗣宗不肯交割縣務稱未考滿者勅㫖張嗣宗已招過犯㫁處徒刑雖定徵銅更難居任既聞除替便合禀承乃敢拒違益彰狡惡須加竄謫俾省􅄽尤宜配流商州周陳權前為清水令太祖廣順三年四月勑追奪前任官牒毁棄仍長流房州權居許州舞陽縣與隣子曙争地詐埋石為記及揩改契内文字既伏其罪故有是責駱延規為開封縣令世宗顯徳六年九月除名流沙門昻先是延規有過停任有司召延規宣勑延規拒命為憲司所按故有是命貪黷夫製錦之重象雷之威有社稷焉有民人焉可以専刑辟可以移風俗一同之地祸福所繇百乗之賦豐約斯繫自非守不欺之誡存慎獨之心則何以奉政經去民瘼其或罔思潔己姑務藩身忘清白之訓恣貪墨之欲或凌厲其氣以威下民或便辟其容以附權右肆豺狼之心盈谿壑之志或人不堪命盗以之興或法不可逃身繇之殞雖惡有巨細事有隠顯然而流毒於下歛怨于上則一揆焉爾詩云貪人敗類其惡之深矣漢楊湛為髙陵令謝㳺為櫟陽令皆貪猾不遜左馮翊薛宣手自牒書條其姦贓湛自知罪贓皆應記即時解印綬付吏為記謝宣而㳺自以大儒有名輕宣宣獨移書顯責之曰告櫟陽令吏民言令治行煩苛適罰作使千人以上賊取錢財數十萬給為非法賣買聼任富吏賈數不可知賈讀曰價證驗明白㳺得檄亦觧印綬去後漢居風令史不書姓名貪暴無度縣人朱逹等及蠻夷相聚攻殺之張朔為野王令貪殘無道聞司𨽻校尉李膺威嚴懼罪逃還京師晉袁毅陳郡人為鬲令貪濁而賂遺公卿以求虚譽後事露檻車送廷尉李彰為姚萇槐里令以黷貨誅於是郡國肅然矣梁丘仲孚仕齊為山隂令居職甚有聲稱齊末頗有贓賂為有司所舉將見收仲孚竊逃逕還京師詣闕㑹赦得不治唐王鈞為雒陽縣主簿𤣥宗開元十年三月坐贓杖殺裴景仙為冀州武强令開元十年八月坐贓逃匿聼集衆殺之勑曰有善必賞所以勸􅀎有罪必誅所以懲惡代天理物勤憂萬姓求瘼恤人寄之牧宰共理天下寔在於兹裴景仙幸以緒餘素無名檢恣行貪冐不憚典刑聚歛之贓至五十疋肆其威虐剥我黎元自作何逃仍更亡命此而將捨罪孰可誅雖法有常科合寘投竄而情在難恕用申懲肅宜令集衆决殺仍宣告遐邇宋廷暉為宣州溧陽令周仁公為涇州良原令裴裔為寕州彭原令開元二十五年正月皆犯贓坐死刑𤣥宗以陽和在候特恕之悉杖六十配流于龔州勅曰朕思致時和每矜刑典而貪饕之吏抵犯自多猶冀耻格豈在哀矜宣州溧陽令宋廷暉等各效官榮非無禄利不能砥礪乃黷貨贓使者繩違刑曹定罪並當極法合正嚴科然而發生在時布澤兹始永言惻隠䏻無恵恤乃期改過且用輕刑宜並配流即差綱領送雖止殺之義頗乖於國體而好生之徳冀洽於人心教而不誅庶乎不及何必峻罰然後為善凡今在位宜副此懐栁昇為長安縣令天寳三年坐贓於朝堂杖殺之竇崟為萬年縣令代宗永泰元年坐贓流䖍州百姓髙曖為鄭州陽武縣令憲宗元和九年七月坐侵蠧百姓貶恩州陽江縣尉殷復易為長水縣令元和九年九月坐求利擾人貶永州司户叅軍韓晤為萬年捕賊尉元和十二年以姦贓發京兆尹竇易直使法曹掾韋正收鞫之得贓三十萬帝意其未盡令復鞫之果得贓三百萬晤除名配流昭州王仲堪為激州上蔡縣令穆宗長慶元年八月坐贓錢八百二十貫勑上蔡久經冦虐方藉緝綏忍加厚歛􅊣此疲俗委本道觀察使决重杖處死龎驥為遂寕縣令長慶四年東川觀察使奏驥犯贓事下大理寺以法論中書舎人楊嗣復等叅酌曰龎驥贓貨之數為錢四百餘千其間大半是枉法㩀贓定罪合處極刑雖經恩赦不在原先伏以近日贓吏皆䝉小有矜寛類例之間慮須貸死勑長吏犯贓其數不少縱寛刑典難免鞭笞但以近遇鴻恩人思减等雖節文不在免限於情理亦要哀矜龎驥宜除名溪州其贓付所司准法孟孚為蘇州嘉興縣令敬宗寳厯元年六月坐贓杖四十除名流康州劉伉為藍田令寳厯二年三月御史臺推勘在任日将諸色錢隠沒破用凡九十餘萬制曰劉伉所犯贓私其數至廣恣為貪猾固抵刑章若㨿本條合當極法以其大父於國有勞特為矜量俾從寛宥宜除名流雷州伉故宰相晏之孫也李林宗為河南縣令為縣未數月賤買市人縑帛文宗太和七年三月坐贓貶梁陳知古為華隂縣令太祖開平元年十一月同州劉知俊奏知古因抽選丁藏匿冨户以受其賂誾縣訴論今已按驗罪状帝惡其貪猾委本道以法誅之王渙為青州夀光令黷貨聚歛强奪下民資粮材木修建私第百姓苦之乃訴於㢘使者因鞫劾計贓十餘萬有司以聞帝怒開平二年三月委本郡長吏准格處分尹崇規為青州北海令殘虐於民賄賂彰顯開平二年七月委本道長吏斃之後唐張延輝為許州臨潁令明宗長興元年九月為縣人韋知進所訟稱知進父充所繇為衙􅄁不到决杖致死又論延輝取贓賂法司估計錢三十三貫以絹平之得絹二十二疋准法决重杖一頓處死主簿髙延誨罰两月俸楊鐐為皷城令長興四年七月鎮州奏鐐與主簿徐延同情出賣官麴一十二碩計錢三十八千估絹三十四疋二丈其錢入己破使事下法司大理正張仁瑑刑部郎中康澄㫁准律主當監官罪並當絞徐延専掌賣麴縣令監臨據罪並絞闗連典吏笞杖徒流有差從之吕澄為秦州清水縣令長興四年七月觀察使奏澄於長興元年二年三年相以乞歛人户財物共計一千一百二十九碩顯貼貫計贓三百六十八貫事下法司大理少卿康澄㫁准律受所監臨贓罪當贖流三千里吕澄以兩任官當三年徒罪餘二年徒罪徵銅四十斤刑部員外郎薛冲又詳覆吕澄贓賂事發因鎮將上論乞取之贓又無文簿鎮將遍下鄉村勘問又無人户姓名積數雖多未甞正格量其情状難逭刑章勑㫖吕澄命為宰字委以民人不守公㢘恣行聚歛贓數甚廣情状難矜當寘重刑仍從逺竄宜决脊杖二十配流嵐州闗連人吏依法司所奏晉郭綰為絳州翼城令少帝開運二年法寺奏綰乞門户人粟八百一十五碩五斗計贓絹八十疋准律徒四年以官當注毁四任告勅流三千里從之周陸憲為曹州寃句令太祖廣順元年十月坐贓絲五萬兩先是本部民楊文投匭論憲下開封府推鞫憲以本部内放絲伏罪獄成追毁入任官牒陳守愚為唐州方城令廣順三年二月在任尅留人户蠺一千五百斤貨之兼丐率資金為民所訟守愚擕牌印自訴於闕下御史臺推劾伏罪杖死之冊府元龜卷七百七
