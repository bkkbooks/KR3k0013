body:
  text: 册府元龜卷五百四十九宋王欽若等撰諫諍部褒賞春秋述五諫之義戰國垂三賞之令葢褒揚諍臣有從來矣非含忠秉直讜言正義挺匪躬之節竭愛君之誠者胡能感悟上心受兹寵錫者已繇漢室而下以諫諍著稱者乃有激昂辭氣面論虧失或伏閤奏牘傳置飛章援引古今箴切時病世之賢君樂聞其説釋然嘉納穆然稱善言對慰喻璽書優奬増加爵秩便蕃賜予至於輟服御之物申宴餘之樂以其話言載之史策皆所以勵骨鯁而懲䛕佞焉漢郅都為中郎將敢直諫從景帝入上林賈姬在厠野彘入厠帝欲持兵救賈姬都伏帝前曰一姬死更一姬進天下所少寧賈姬乎陛下縱自輕奈宗廟太后何太后聞而嘉之錫都金百斤帝亦錫金百斤東方朔為常侍郎武帝使中大夫吾丘壽王與待詔能用筭者二人舉籍阿城以南盩厔以東宜春以西提封傾畆及其賈直欲除以為上林苑属之南山吾丘夀王奏事帝大説稱善時朔在傍進諫曰夫殷作九市之宫而諸侯畔靈王起章華之臺而楚民散秦興阿房之殿而天下亂糞土愚臣忘生觸死逆盛意犯隆指罪當萬死不勝大願願陳泰階六符以觀天變是日因奏泰階之事上迺拜朔為大中大夫給事中賜黄金百斤又董偃得幸於竇太主帝為竇太主置酒宣室使謁者引内董偃是時朔陛㦸殿下持㦸列陛側辟㦸而前曰偃安得入乎帝曰何謂也朔曰以人臣私侍公主乃國家之大賊人主之大蜮昔伯姬燔而諸侯憚奈何臣乎武帝黙然良乆曰吾業以設飲後而自改朔曰不可夫宣室者先帝之正處也非法度之政不得入焉帝曰善乃置酒北宫引偃從東司馬門賜朔黄金三十斤于定國為御史中丞昌邑王即位多行淫亂定國上書諫後王廢宣帝立大將軍光領尚書事條奏羣臣諫昌邑王者皆超遷定國繇是為光禄大夫平尚書事甚見任用路温舒為廷尉史宣帝初上書請除誹謗以招切言開天下之口廣箴諫之路掃亡秦之失遵文武之徳省法制寛刑罰以廢治獄則太平之風可興於世永履和樂與天罔極天下幸甚言與天長乆無窮極也帝善其言遷廣陽私府長匡衡為給事中是時有日蝕地震之變元帝問以政治得失衡上疏言遂宜減宫室之度省靡麗之飾考制度修外内近忠正遠巧佞放鄭衞進雅頌舉異材開直言任温良之人退刻薄之吏顯潔白之士昭無欲之路覽六藝之意察上世之務明自然之道帝悦其言遷衡為光禄大夫貢禹為諫議大夫元帝數虚已問以政事禹上言廐馬太多請減乗輿服御及請復田與貧民天子納善其忠乃下詔令太僕減食穀馬水衡减食肉獸省宜春下苑以與貧民又罷角抵諸戯及齊三服官遷禹為光禄大夫後漢郅惲為上東城門候光武嘗出獵車駕夜還惲拒闗不開帝令從者見面於門間惲曰火明遼逺遂不受詔帝乃迴從東中門入明日惲上書諫曰昔文王不敢盤於遊田以萬人為憂而陛下逺獵山林夜以繼書其如社稷宗廟何暴虎馮河未至之誡誠小臣所竊憂也書奏賜布百疋貶東中門候為參封尉張禹和帝時為太尉帝南巡祠園廟禹兼衛尉留守聞車駕當進幸江陵以為不宜冒險逺幸驛馬上諫詔報曰祠謁既訖當南祀大江㑹得君奏臨漢回輿而旋及至京禹特蒙賞賜郭廙為鄴奚都官上書陳五事以諫言甚切直擢為屯留令魏楊阜為將作大匠明帝初理宫室發美女以充役後庭出入弋獵秋大雨震電多殺鳥雀阜上疏請諸所繕理務從約節等事詔報曰間得宻表先陳往古明王聖主以諷闇政切至之辭欵誠篤實退思補過將順匡救備至矣覽思苦言吾甚嘉之帝既作新宫又營雒陽宫殿觀閣阜又上疏諫之奏御天子感其忠言手筆詔答晉閻纘為西戎校尉愍懐太子之廢也纘輿棺詣闕上書理太子之寃書奏御不省後皇太子孫立纘復上書言東宫宜妙選忠直亮正之士又潘岳繆徽等皆賈謐父黨共相沉抑宜皆齊黜以肅風教朝廷善其忠烈擢為漢中守梁郭祖深武帝時為後軍將軍時帝溺情内教朝政縱弛祖深輿櫬詣闕上封帝嘉其直擢為豫章鍾陵令員外散騎常侍後魏周澹明元時為特進神瑞二年京師饑朝議將遷都於鄴澹與博士祭酒崔浩進計論不可之意帝大然之曰唯此二人與朕意同也詔澹浩妾各一人御衣一襲絹五十疋綿五十斤崔浩為祭酒時劉裕在雒議欲以軍絶其後路明元問浩浩對以為不可帝大悦語至中夜賜浩御縹醪酒十觚水精戎鹽一兩曰朕味卿言若此鹽酒故欲與卿同其甘也髙允文成時為中書侍郎領著作郎前後諌事非一帝從容聽之或有觸迕帝所不忍聞者命左右扶出事有不便允輒求見帝知允意逆尋屏左右以待之禮敬甚重晨入暮出或積日居中朝臣莫知所論或上事有得失者帝省而謂群臣曰君父一也父有是非子何為不作書諫之使人知惡而諫於家内隱處也豈不以父親恐惡彰於外也今國家善惡不能面諫而上表顯諌此豈不彰君之短明己之美至如髙允者真忠臣矣朕有是非常正言面論至朕所不樂聞者皆侃侃言説無所避就朕聞其過而天下不知其諫豈不忠乎汝等在左右曽不聞一正言但伺朕喜時求官乞職汝等把弓刀侍朕左右徒立勞耳皆至公王此人把筆輔我國家不過著作郎汝等不自愧乎於是拜允中書令著作如故宿石為中壘將軍遷内行令嘗從獵文成親欲射虎石叩馬而諫引帝至髙原上後虎騰躍殺人詔曰宿石忠臣叩馬切諫免虎之害後有犯罪宥而勿坐賜駿馬一匹成淹孝文時為謁者僕射時孝文自徐泛泗入河還雒淹以黄河浚急慮有傾危上疏陳諫帝勑淹曰朕以常代無運漕之路故京邑民貧今移都伊雒欲通運四方而黄河浚急人皆難渉我因有此行必須乗流所以開百姓之心知卿至誠而今者不得相納勑賜驊騮馬一匹衣冠一襲李彪為秘書丞嘗上封事七條後孝文詔曰歴觀古事才能非一或微承籍廕著徳當時或見拔幽陋流名後葉故毛遂起賤奮亢楚之辯茍有才能何必拘族也彪雖宿非清第本闕華資然識性嚴聰學博墳籍剛辯之才頗堪時用兼愛國若家載宣朝美若不賞庸敘績將何以勸奬勤能可特遷秘書令以酬厥欵髙道悦為治書侍御史加諫議大夫正色當朝不畏強禦詔曰道悦資性寛篤禀操貞亮居法樹平肅之䂓處諫著必犯之節王公憚其風梗朕實嘉其一至謇諤之誠何愧黯鮑也其以為主爵下大夫諫議如故後周張衡武帝時為太學士帝居太后憂與左右出獵衡露髮輿櫬叩馬切諫帝嘉焉賜衣一襲馬一匹擢拜漢王侍讀唐孫伏伽武徳初為萬年縣法曹上疏陳三事以諫髙祖覽之大悦賜帛三百疋擢拜治書侍御史盧政力武徳三年為屯田郎中髙祖謂政力曰每見卿奏諫志存正直古人有言曰君明臣直朕何徳而堪之楊纂武徳中為侍御史數上書言事因被召問擢拜考功郎中張藴古貞觀初為幽州記室直中書省上大寶箴深存䂓誡之體太宗嘉納之賜以束帛焉魏徵為諫議大夫太宗新即位勵精政道數引徵入卧内訪以得失徵雅有經國之才性又抗直無所屈撓太宗每與之言未嘗不忻然納受徵亦喜逢知己之主思竭其用知無不言太宗嘗勞之曰卿所陳諫前後二百餘事非卿至誠奉國何能若是虞世南為秘書監太宗謂侍臣曰朕因向日每與虞世南商畧今古朕有一言之善世南未嘗不悦有一言之失未嘗不一悵恨朕嘗戯作豔詩世南便進表諫曰聖作雖工體制非雅上之所好下必隨之此文一行恐致風靡輕薄成俗非為國之利賜令繼和輒申狂簡而今之後更有斯文斷以死請不敢奉詔其懇誠若此朕用嘉焉羣臣皆若虞世南天下何憂乎不治因顧謂虞世南曰朕更有此詩卿能死不虞世南對曰臣聞詩者動天地感鬼神上以風化下下以諷刺上故季札聽詩而知國之興廢盛衰之道實繼於兹臣雖愚誠願不奉詔太宗大悦賜絹五十疋戴胄為尚書左丞領諫議大夫貞觀三年遷民部尚書太宗將脩復雒陽宫胄上封事諫太宗甚嘉之因謂侍臣曰戴胄於我無骨肉之親但以忠直勵行情深體國事有機要無不以聞所進官爵以酬厥誠耳姚思㢘為𢎞文館學士太宗將幸九成宫思㢘進諫曰此秦皇漢武之事耳故非堯舜禹湯之所為也言甚切至太宗嘉之賜帛五十疋張行成為殿中侍御史太宗嘗言及山東關中人意有同異行成正侍宴跪而奏曰臣聞天子以四海為家不當以東西為意若如是則示人以隘狹太宗然其言賜名馬一匹錢十萬衣一襲自是每有大政常預議焉髙季輔為太子右庶子上疏切陳得失太宗特賜鍾乳一劑曰卿進藥石之言故以藥石相報李大亮為凉州都督貞觀三年嘗有臺使到州見有名鷹諷大亮獻之大亮宻表曰陛下乆絶畋獵而使者求鷹若是陛下之意深乖昔旨如其自擅便是使非其人太宗下書曰以卿兼資文武忠懐貞確故委藩牧當兹重寄比在州鎮聲績逺彰念此忠勤無忘寤寐使遣獻鷹遂不曲順論今引古遠獻直言披露腹心非常懇到覽用嘉歎不能自已有臣若此朕復何憂宜守此誠終始若一古人稱一言之重侔於千金卿之此言深足貴矣今賜御金胡瓶一枚雖無千鎰之重是朕自用之物張𤣥素為給事中時發卒修雒陽宫以備巡狩𤣥素上書切諫太宗覽之甚悦謂房𤣥齡曰雒陽土中朝貢道均朕故欲脩營意在便於百姓今元素上表實亦可依後必事理須行露坐亦復何苦所有作役宜即停之然以卑干尊古來不易非其忠直安能若此乎可賜綵二百匹谷那律為諫議大夫嘗從太宗出獵在途遇雨因問曰油衣若何為得不漏那律曰能以瓦為之必不漏矣太宗大悦賜帛二百疋杜正倫為中書侍郎常與御史大夫韋挺秘書少監虞世南著作郎姚思㢘等咸上封事稱旨太宗為之設宴因謂曰朕歴觀自古人臣立忠之事若值明王便得盡誠規諫至如龍逢比干竟不免孥戮為君不易為臣極難我又聞龍可擾而馴然喉下有逆鱗觸之則殺人人主亦有逆鱗卿等遂不避犯觸各進封事常能如此朕豈有慮危亡我思卿等此意不能暫忘故聊設宴樂也仍竝賜帛有差蕭鈞為諫議大夫有左武侯引駕盧文操盜左藏庫物髙宗令殺之鈞進諫遂特免其死罪顧謂侍臣曰此乃真諫議也來公敏為詳刑大夫總章二年冬髙宗特幸凉州時隴外虚耗識者咸云車駕西巡不便帝聞之御延福殿召五品已上謂曰帝王五載一巡狩羣后四朝此葢常禮朕欲暫幸凉州觀風省俗如聞在外咸謂非宜必若此行不可自合以實聞奏今對面不言退有移議何也宰相已下再三莫有對者公敏進曰臣聞省方出豫王者常規陛下愛育蒼生每思靜鎮今欲巡幸凉州遐宣王畧求之故實未虧令典但隨時度事臣下竊有所疑既見明制施行所以不敢塵黷奉勑顧問敢不盡言但髙麗雖平扶餘尚梗兼西道經畧兵猶未停且隴右諸州人戸猶少供侍鑾駕備擬稍難臣聞在外實有竊議帝黙然良乆曰卿等既有此言我止度隴存問故老蒐狩即還計亦不至勞費今時已涉秋節候漸冷且賜卿繒綵以充衣叚於是賜物有差竟下詔停西幸無何公敏自詳刑少卿擢為黄門侍郎賞其能直言也魏元忠儀鳳中以前大學生赴雒陽上封事召見對敭稱旨授秘書省正字令直中書省袁利貞為太常博士永隆二年春王公已下及朝集使以太子初立獻食勑於宣政殿㑹百官及命婦利貞上疏切諫從之改向麟徳殿陳設至㑹日羣臣樂飲帝使中書侍郎薛元超謂利貞曰卿門承忠鯁能抗疏直言不加厚錫無以奬勸於是賜物百叚朱敬則則天長安中為正諫大夫兼修國史時賦役繁重戸口逃免敬則多所諫奏言甚切至太后大嘉之頻召入禁中訪以時俗要務俄令同鳳閤鸞臺平章事郭山惲為國子司業景龍三年春與羣臣宴遊令各効技藝以為笑樂山惲獨奏曰臣無所解請歌古詩兩篇帝許之乃歌鹿鳴蟋蟀篇翌日帝嘉山惲之意降詔曰郭山惲業優經史識綜古今八索九丘繇來遍覽前言往行實所核詳昨者同有豫遊式延朝彦既乘歡洽咸使詠歌遂能志在輔時雅申諷諭謇謇之誠彌切諤諤之志愈明宜有褒揚美兹鯁直可錫時服一副和元祐為真化府長史景龍末元祐獻詩十首其詞猥陋皆寓意嬖幸而意及兵戈韋氏命鞫於大理而將戮之月餘而韋氏就誅其詩言若符䜟景雲初以元祐為千牛衞長史韓朝宗為左拾遺景雲三年上疏諫作乞寒胡戯睿宗覽而稱善特賜以中上考張九齡韓朝宗元宗時為左拾遺先天元年九月將幸新豐之溫湯九齡朝宗以時屬收穫恐妨農事上疏切諫帝大悦召見慰諭各賜衣一副魏知古為侍中先天元年十月上詩諫獵元宗手詔曰卿所進獵渭濱十韻三復研精良增歎美今賜物五十叚以申勸奬嚴挺之為左拾遺先天二年三月元宗御文徳殿宣示百官以挺之上書切直賜物六十叚衣一襲姚南仲代宗時為右補闕大厯十三年将葬貞懿皇后恩寵所屬令繕陵寢邇章敬寺後當遊幸近地左右莫敢言者南仲上疏諫之代宗覽表歎息立從其議賜緋魚袋特加五階宣付史臣時左拾遺何士幹亦上封論事特詔褒賞遷為補闕李絳元和二年為司勲郎中充翰林學士嘗因浴堂北廊奏對違忤上旨指切時病及論中官縱恣方鎮進獻事宜憲宗怒甚厲聲曰卿所論事何太過耶絳前論不已曰臣所陳豈臣身之利是國家之利陛下不以臣愚使處腹心之地豈可見事虧聖徳致損清時而惜身不言仰屋竊歎是臣負陛下也若不顧患禍盡誠奏論旁忤倖臣上犯聖旨以此獲罪是陛下負臣也且臣與内官素不相識又無嫌隙只是恐威福太盛上損聖朝臣所以不敢不論耳使臣緘黙非社稷之福也上見其誠切不迴怒色却散稍慰喻曰卿盡節於朝人之不能言者卿悉言之使朕聞所不聞真忠正誠節之臣也他日南面亦須如今日絳拜恩而退上遽宣宰臣命與改官中書舍人依前翰林學士翌日面賜金紫帝親為絳擇良笏鄭澣餘慶之子也為左補闕獻疏切直人為危之及餘慶入覲憲宗謂之曰卿之令子朕之直臣可更相賀遂遷起居舍人裴潾穆宗即位初自江陵縣令為兵部員外郎潾前為起居舍人以桺泌事抗疏論陳忤旨出官至是酬奬髙釴為中書舍人因諫敬宗以求理莫若躬親用示憂勤之旨帝深納其言賜綵五十疋劉栖楚為左拾遺敬宗即位初百寮入閤日絶髙未坐羣臣候立紫宸門外有不任其乆欲傾踣者諫議大夫李渤出次白宰相曰昨日已有疏論坐晩今日又益晩今不能迴上意是渤之罪請出閤赴金吾仗待罪有頃旣坐百官班退栖楚獨留帝前而進諫曰臣歴觀前王嗣位之初莫不躬勤庶政坐以待旦陛下即位已來放情嗜寢樂色忘憂安卧宫闥日晏方起西宫宻邇未過山陵皷吹之聲日喧於外伏以憲宗皇帝大行皇帝皆是長君恪勤庶政四方猶有叛亂陛下運當少主即位未幾惡徳布聞臣恐福祚之不長也臣忝諫官致陛下有此請碎首以謝遂以額叩龍墀乆之不已宰臣李逢吉出位宣曰劉栖楚休叩頭候進止栖楚捧首而起因更陳論榼額見血帝為之動容以袖連揮令出栖楚又云不可臣奏臣即碎首而死中書侍郎牛僧孺復宣示栖楚曰所奏知門外待進止栖楚即拜舞而出待罪於金吾仗然後宰臣更贊其事於帝前命中人就仗宣諭并李渤竝令各且歸第後數日擢栖楚為起居郎賜緋栖楚矯譲不拜以疾歸雒是嵗淮南節度使王播以錢十萬貫遺恩倖求鹽鐡使諫議大夫獨孤助張仲方起居郎孔敏行桺公權起居舍人宋申錫補闕韋仁寶劉敦儒拾遺李景譲薛廷老十人前一日詣延英抗論其事帝問前時廷諍者得不在其中邪即日宣付宰臣令除栖楚為諫議大夫韋處厚為翰林學士遷兵部侍郎於思政殿中謝恩諫畋遊及晏起曰臣有大罪願面首於陛下前帝曰何處厚對曰臣不以死諫先聖縱先聖好畋及色以致不夀合當誅戮然所以不死諫者為陛下春宫年已十五今則陛下皇子始一嵗矣臣安得更避死亡之誅帝深感其言賜錦綵一百疋銀器四事崔郾為給事中敬宗即位選為翰林侍讀學士轉中書舍人入思政殿謝恩郾奏曰陛下用臣為侍講半嵗有餘未嘗問臣經義今蒙轉改實慙尸素有愧厚恩帝曰俟朕機務稍閒即當請益髙釴曰陛下意雖樂善既未延接儒生天下之人寧知重道帝深引咎錫之錦綵李渤為諫議大夫時長慶寶厯政出多門事歸邪倖渤居位章疏無虛日敬宗雖日事淫縱亦為之感寤遷給事中謝日賜紫金魚袋魏謩為右拾遺時御史中丞李孝本以罪誅文宗取孝本女二人入宫謩上疏切諫帝立出之尋除右補闕文宗謂宰臣曰太宗皇帝得魏徵採拾闕失弼成政令我得魏謩於疑似之間必極忠諫雖不敢希及貞觀之政庶幾處無過之地今授謩右補闕委舍人善為之辭未幾遷起居舍人兼𢎞文館直學士文宗謂曰卿從來論事無所顧望頗有文貞之風甚慰朕懐今故不循月限擢卿此官因問曰卿家有何舊圗書詔勑謩曰家書悉無唯有文貞公笏在文宗曰卿可進來鄭覃在側曰在人不在笏文宗曰卿渾未曉但甘棠之義非要笏耳覃大慙又謂謩曰自今有事即論謩曰頃為諫官合盡規諷今為起居職在記言伏望遣臣歸職文宗曰凡在兩省官即合論事不得固辭繇是起居舍人超拜諫議大夫其制略曰朕以邦國之大機務之多恵有所未周化有所未洽不有忠讜之士左右䂓益逮暗無燭不其難歟今則髙選正人俾居諫省朝政闕失期於必聞是用簡自帝心特申奬命所宜稱職豈限常資可諫議大夫仍兼起居充職王直方為右補闕太和八年直方上疏曰臣伏見近嵗已來災害不作兵革休息百穀豐稔四方寧泰者非他是陛下事異於前時中外之心有所驚惜比者雖有教坊音樂陛下未嘗賞悦因有賜宴與人共之如此則雖有伶人不害於事陛下即位之始宣徽教坊悉令停减人數或聞近來稍不如此樂工弟子賜與至廣每有此事向外流傳傷陛下聖徳豈容易也臣以為鄭聲娛人新音動聽能使人情迷亂捨棄萬事而為樂不足也臣伏以聖體未安加以聲色之翫侵蠧聖祚得不憂乎上覽奏嘉歎賜帛百疋并以表示宰臣令宣付史館殷侑為刑部尚書開成元年賜侑黄金十斤命中人就第宣賜以奬直書竇洵直為右拾遺開成三年文宗以仙韶樂人尉遲璋為王府率洵直紫宸廷諫以為不可伏下後命中人齎絹一百疋賜之宋邧為右拾遺開成四年四月宰臣奏事罷退及半庭帝却召諭曰昨論坊州事者為誰楊嗣復曰宋邧帝曰宋邧論事至當殊可奬何時授官李珏曰去年擢授嗣復曰諫官論事如當陛下記其姓名稍加優奬如不當亦須令知陳夷行曰論事是其本職若論一事即賞何繇得官爵以為賞此不免有情帝曰情固不免理平之事亦不免夷行曰情若公言即不可翌日賜宋邧絹一百疋先是除郭薳為坊州刺史邧上疏以薳不可薳至任以贓罪聞故有是賜後唐李詳任左補闕長興二年上疏直諫先是太原地震留守宻奏人不之知無敢言者及詳奏聞帝甚嘉之賜詳五品章服晉何澤仕後唐為雒陽令莊宗出獵屢踐民田澤屏其從者伏於叢薄中截馬諫曰陛下急征暴歛下不堪命今稼穡將登而縱騎耗暴如是使官吏何以求理集其征賦臣請賜死於此以悟陛下莊宗慰而遣之尋遷倉部郎中明宗天成三年駕在汴水欲幸鄴人情不願執政近侍進言未從澤因伏門切諫竟罷其行明宗心賞之乃拜吏部侍郎于鵬為右拾遺天福二年鵬上章言事其一請頻御外殿採納忠言其二請添擇大臣十人每共僉諧其三請罷修燒毁宫殿恐勞民力其四以太原傷殘所蠲半税未嘗為當今請全放勑曰于鵬官居諫諍志在輔禆所閱貢陳咸闗政化備詳端盡良切歎嘉宜陟階資以申酬奬其于鵬加朝散大夫册府元龜卷五百四十九
