body:
  text: 册府元龜卷五百八十三宋王欽若等撰掌禮部奏議第十一後魏張普惠為司空倉曹叅軍孝明熈平二年十一月廣陵王恭北海王顥疑為所生祖母服朞與三年博士執意不同太尉清河王懌表曰臣聞百王所尚莫尚於禮禮之重者喪紀斯極世代㳂革損益不同遺風餘烈景行終在至如前賢往喆商𣙜有異或並證經文而論情别緒或各言所見而討事其端雖憲章祖述人自名家而議論紛綸理歸詳正莫不隨時所宗各為一代之典自上達下罔不遵用是使叔孫之儀專擅於漢朝王肅之禮獨行於晉世所謂其同軌文四海畫一者也至乃折旋俯仰之儀哭泣升降之節去來閫巷之容出入閨門之度尚須疇咨禮官博訪儒士載之翰紙著在通法辯答乖殊證據不明即詆訶疵謬紏劾成罪此乃簡牒成文可具閲而知者也未有皇王垂範國無一定之章英賢贊治家制異同之式而欲流風作則永貽來世比學官雖建庠序未修稽考古今莫專其任暨乎宗室喪禮百寮㐫事冠服製裁日月輕重率令博士一人輕議邇廣陵王恭北海王顥同為庶母服恭則治重居廬顥則齊朞居室論親則恭顥俱是帝孫語貴則二人並為藩國不知兩服之證據何經典俄為舛駁莫有裁正懿王昵戚尚或如斯自兹已降何可紀極歴觀漢魏喪禮諸儀卷盈數百或當時名士往復成規或一代詞宗較然為則况堂堂四海藹藹如林而令喪禮叅差始於帝族非所以儀刑萬國綴旒四海臣忝官臺傅備位喉脣不能秉國之鈞致斯爽缺具瞻所誚無所逃罪謹略舉恭顥二國不同之狀以明喪紀乖異之失乞集公卿樞納内外儒學博議定制班行天下使禮無異凖得失有歸并因事而廣永為條例庶塵嶽沾河微酧萬一靈太后令曰禮者為政之本何得不同如此可依表定議普惠議曰謹按二王祖母皆受命先朝為二國太妃可謂受命於天子為始封之母矣喪服慈母如母在三年章傳曰貴父命也鄭注云大夫之妾父在子為母大功則士之妾子為母朞父卒則皆得申此大夫命其妾子以為母所慈猶曰貴父命為之三年况天子命其子為列國王命其所生之母為國太妃反自同公子為母練冠之與大功乎輕重顛倒之甚也傳曰始封之君不臣諸父昆弟則當服其親服若魯衞列國相為服朞判無疑矣何以明之喪服君為姑姊妹女子嫁於國君者傳曰何以大功尊同也尊同則得服其親服諸侯之子稱公子公子不得禰先君然則兄弟一體位列諸侯自以尊同得相為服不可還凖公子逺壓天王故降有四品君大夫以尊降公子大夫之子以壓降名例不同何可亂也禮大夫之妾子以父命慈己申其三年太妃既受命先帝光昭一國二王胙土茅社顯錫大邦舍尊同之髙據附不禰之公子雖許蔡失位亦不是過服問曰有從輕而重公子之妻為其皇姑公子雖壓妻尚獲申况廣陵北海論君則封君之子語妃則命妃之孫承妃纂重逺别先皇更以先后之正綂壓其所生之祖嫡方之皇姑不亦遥乎今既許其申服而復限之以期比之慈母不亦爽歟經曰為君之祖父母父母妻長孫傳曰何以朞父母長子君服斬妻則小君父卒然後為祖後者服斬今祖乃獻文皇帝諸侯不得祖之母為太妃蓋二王三年之證議者近背正經以附其類差之毫毛所失何逺且天子尊則配天莫非臣妾何為命之為國母而不聼子服其親乎記曰從服者所從亡則已又曰不為君母之黨服則為其母之黨服今所從既已不以親服服其所生則屬從之服於何所施若以諸王入為公卿便同大夫者則當今之議皆不須以國為言也今諸王自同列國雖不之國别置臣寮玉食一方不得以諸侯言之敢據周禮輙同三年當時議者亦有異同國子博士李郁於議罷之後書難普惠普惠據禮還答鄭重三返郁議遂屈任城王澄為侍中司空公領尚書令熈平二年十二月與度支尚書崔亮奏謹按禮記曾子問曰諸侯旅見天子不得成禮者㡬孔子曰四太廟火日蝕后之喪雨沾服失容則廢臣等謂元日萬國賀應是諸侯旅見之義若禘廢朝會孔子應云五而獨言四明不廢朝賀也鄭𤣥禮注云魯禮三年畢喪祫於太祖明年春禘於羣廟又鄭志檢魯禮春秋昭公十一年夏五月夫人歸氏薨十三年夏五月大祥七月釋禫公會劉子及諸侯於平丘八月歸不及於祫冬公如晉明十四年春歸乃祫明十五年春乃禘也經曰二月癸酉有事於武宫傳曰禘於武宫謹按明堂位曰魯王禮也喪畢祫禘似有退理詳考古禮未有以祭事廢元會者禮云吉事先近日脱不吉容改筮三旬㝷攝太史令趙翼等列稱正月二十六日祭亦吉請移禘祀在中旬十四日時祭移二十六日猶曰春禘又非退義祭則無疏怠之譏三元有順軌之美既被成㫖宜即宣行臣等伏度國之大事在祭與戎君舉必書恐貽後誚輙訪引古籍竊有未安臣等學缺通經識不稽古僃位樞納可否必陳冒陳所見伏聼裁𠂻靈太后令曰可如所執源子恭正光中為起部郎時明堂璧雍並未建就子恭上書曰臣聞璧臺望氣軌物之徳既髙方堂布政範世之道斯逺是以書契之重理冠於造化推尊之美事絶於生民至如郊天享帝葢以對越上靈宗祀配天是用酬膺下土大孝莫之能加嚴父以兹為大乃皇王之休業有國之盛典竊惟皇魏居震綂極總宙馭宇革制土中垂式無外自北徂南同卜惟於雒食定鼎遷民均氣候於寒暑髙祖所以始基祖宗於是恢搆按功成作樂治定制禮乃訪遺文修廢典建明堂立學校興一代之茂矩標千載之英規永平之中始剙雉構基址草昧迄無成功故尚書令任城王澄按故司空臣冲所造明堂様并連表誥答兩京模式奏求營起緣期發㫖即加葺繕侍中領軍臣乂總勤作官宣贊授令自兹厥後方配兵人或給一千或與數百進退節縮曾無定凖欲望速了理在難尅若使專役此功長得營造委成責辦容有就期但所給之夫本自寡少諸處競借動即千計雖有繕作之名終無就功之實爽塏荒茫淹積年載結架崇構指就無兆仍令肄胄之禮奄抑而不追養老之儀寂寥而不返搆厦止於尺土為山頓於一簣良可惜歟愚謂兆民經始必有子來之歌興造勿亟將致不日之美况兵本不多兼之牽役廢此興彼循環無極便是輟剙禮之重資不急之費廢經國之功供寺舘之役求之逺圖不亦闕矣今諸寺又作稍以麄舉並可徹减專事經綜嚴勒工匠務令尅成使祖宗有薦配之期蒼生覩禮樂之富書奏從之李崇為驃騎大將軍冀州刺史不行上表曰臣聞世室明堂顯於周夏二黌兩學盛自虞殷所以宗配上帝以著莫大之嚴宣布下土以彰則天之軌養黄髮以詢格言育青襟而敷典式用能享國久長風徽萬祀者也故孔子稱巍巍乎其有成功郁郁乎其有文章此其盛矣爰暨亡秦政失其道坑儒滅學以蔽黔首國無黌序之風野有非時之役故九服分離祚終二世炎漢勃興更修儒術文景以降禮樂復彰化致昇平治幾刑措故西京有六學之美東都有三本之盛莫不紛綸菴藹響流無已逮自魏晉廢亂相因兵革之中學校不絶遺文燦然方軌前代仰惟髙祖孝文皇帝禀聖自天道鏡今古徙馭嵩河光宅函雒模唐虞以革軌儀規周漢以新品制列教序於鄉黨敦詩書於郡國使揖讓之禮横被於崎嶇歌咏之聲洋溢於側陋但經始事殷戎軒屢駕未遑多就弓劍弗追世宗統厯聿遵先緒永平之中大興板築續以水旱戎馬生郊雖逮為山還停一簣竊惟皇遷中縣垂三十祀而明堂禮樂之本乃欎荆棘之林膠序徳義之基空盈牧豎之跡城隍嚴固之重闕塼石之功墉堞顯望之要少樓榭之餙加以風雨稍侵漸致虧墜又府寺初營頗亦壯美然一造至今更不修繕㕔宇凋朽墻垣頺壊皆非所謂追隆堂構儀刑萬國者也伏聞朝議以髙祖大造區夏道侔姬文擬祀明堂式配上帝今若基宇不修仍同丘畎即使髙皇神享闕於國陽宗祀之典有聲無實此臣子所以匪寧億兆所以失望也臣又聞官方授能所以任事事既任矣酬之以祿如此上無曠官之議下絶尸素之謗今國子雖有學官之名而無教授之實何異兎絲燕麥南箕北斗哉昔劉向有言王者冝興辟雍陳禮樂以風化天下夫禮樂所以養人刑法所以殺人而有司勤勤請定刑法至於禮樂則曰未敢是則敢於殺人不敢於養人也臣以為當今四海清平九服寧晏經國要重理應先營脱復稽延則劉向之言徵矣但事不兩興須有進退以臣愚量冝罷上方雕靡之作頗省永寧土木之功并减瑤光材瓦之力兼分石窟鐫琢之勞及諸事役非急者三時農隙修此數條使辟雍之禮蔚爾而復興諷誦之音煥然而更作美榭髙墉嚴壯於外槐宫棘宇顯麗於中更發明令重遵鄉飲敦進郡學精課經業如此則元凱可得之於上序游夏可致之於下國豈不休歟誠知佛理淵妙含識所宗然比之治要容可少緩茍使魏道緝熈元首唯康爾乃經營未為晩也靈太后令曰省表具悉體國之誠配饗大禮為國之本比以戎馬在郊未遑修繕今四表晏寧年和嵗稔當勅有司别議經始賈思伯為衞尉卿于時議建明堂多有同異思伯上議曰按周禮考工記云夏后氏世室殷重屋周明堂皆五室鄭注云此三者或舉宗廟或舉王寢或舉明堂互言之以明其制同也若然則夏殷之世已有明堂矣唐虞以前其事未聞戴徳禮記云明堂凡九室十二堂蔡邕云明堂者天子太廟享功養老教學選士皆於其中九室十二堂按戴徳撰記世所不行且九室十二堂其於規制恐難得厥中周禮營國左祖右社明堂在國之陽則非天子太廟明矣然則禮記月令四堂及太室皆謂之廟者當以天子暫配享五帝故爾又王制云周人養國老於東膠鄭注云東膠即辟雍在王宫之東又詩大雅云雝雝在宫肅肅在廟鄭注云宫謂辟雍宫也所以周之文王養老養老則尚和助祭則尚敬又不在明堂之驗矣孟子云齊宣王謂孟子曰吾欲毁明堂若明堂是廟則不應有毁之問且蔡邕論明堂之制云堂方一百四十四尺象坤之䇿屋圓徑二百一十六尺象乾之䇿方六丈徑九丈象陰陽九六之數九室以象九州屋髙八十一尺象九九之數二十八柱以象宿外廣二十四丈以象氣按此皆以天地陰陽氣數為法而室獨象九州何也若立五室以象五行豈不决也如此蔡氏之論非為通典九室之言或未可從竊尋考工記雖是補缺之書相承已久諸儒注述無言非者方之後作不亦優乎且孝經援神契五經要義舊禮圖皆作五室及徐劉之論同考工記者多矣朝廷若獨絶今古自為一代制作者則所願也若猶祖述舊章規摹前事不應捨殷周成法襲近代妄作且損益之極極於三王後來疑議難可准信鄭𤣥云周人明堂五室是帝各有一室也合於五行之數周禮依數以為之室施行於今雖有不同時説然爾㝷鄭此論理非無當按月令亦無九室之文原其制置不乖五室其青陽右个即明堂左个明堂右个即總章左个總章右个即𤣥堂左个𤣥堂右个即青陽左个如此則室猶是五而布政十二五室之理謂為可按其方圓髙廣自依時量戴氏九室之言蔡子廟學之議子幹靈臺之說逸民一屋之論及諸家紛紜並無取焉學者善其議西魏崔猷為司徒大長史武帝大統中太廟初成四時祭祀猶設俳優角觝之戯其郊廟祭官多有假兼猷上疏諫書奏並納焉東魏崔昂為度支尚書孝静武定六年二月將營齊獻武王廟議定室所形制昻與司農卿盧元明秘書監王元景散騎常侍裴獻伯國子祭酒李渾御史中尉陸操黄門侍郎李騫中書侍郎陽休之前南青州刺史鄭伯猷秘書丞崔劼國子博士邢峙國子博士宗惠振太學博士張毓太學博士髙元夀國子助教王顯季等議按禮諸侯五廟太祖及親廟四今獻武王始封之君便是太祖既通親廟不容立五室且帝王親廟亦不過四今宜四室二間兩頭各一頰室夏頭徘徊鵄尾又按禮圖諸侯止開南門而二王後祔祭儀法云執事列於廟東門之外既有東門明非一門獻武禮數既隆僃物殊等准據今廟宜開四門内院南面開三門餘靣及外院四面皆一門其内院四面皆架為歩廊南出夾門各置一屋以置禮器及祭服内外門牆并用赭堊廟東門道南置齋坊道北置二坊西為典祠廨并厨宰東為廟長廨並置車輅其北為養犧牲之所詔從之北齊魏收為中書令文宣天保元年皇太子監國在西林園冬羣臣會議皆東面二年於北城第内冬會又議東面吏部郎陸卬疑非禮收改為西面邢子才議欲依前曰凡禮有同者不可令異詩說天子至於大夫皆乘四馬况以方面之少何可皆不同乎若太子定西面者王公卿大夫士復何靣邪南靣人君正位今一官之長無不南靣太子聼政亦南靣坐議者言晉舊事太子在東宫西靣為避尊位非為向臺殿也子才以為東晉博議依漢魏之舊太子普臣四海不以為嫌又何疑於東靣禮世子絶旁親世子冠於阼冢子生接以太牢漢元著令太子絶馳道此皆禮同於君又晉王公世子攝命臨國乘七旒安車駕用三馬禮同三公近宋太子乘象輅皆有同處不以為嫌况東靣者君臣通禮獨何為避明為向臺所以然也近皇太子在西林園在於殿猶且東靣於北城非宫殿之處更不得邪諸人以東靣為尊宴會須避按燕禮燕義君位在東賓位則在西君位在阼階故有武王踐阼篇不在西也禮乘君之車不敢曠左君在惡空其位左亦在東不在西也君在阼夫人在房鄭注人君尊東也前代及今皇帝宴會接客亦東堂西靣若以東靣為貴皇太子以儲后之禮監國之重别第宴臣賓自得申其正位禮者皆東宫臣屬公卿接宴觀禮而已若以西面為卑實是君之正位太公不肯北靣説丹書西靣則道之西靣乃尊也君位南靣有東有西何可皆避且事雖少異有可相比者周公臣也太子子也周公為冡宰太子為儲貳明堂尊於别第朝諸侯重於宴臣賓南靣貴於東西臣疎於子冡宰輕於儲貳周公攝政得在明堂南靣朝諸侯今太子監國不得於别第異宫東靣宴客情所未安且君行以太子監國君宴不以公卿為賓明父子無嫌君臣有嫌按儀注親王受詔冠婚皇子皇女皆東靣今不約王公南靣而獨約太子何所取邪議者南尊改就西靣轉君位更非合禮方靣既少難為節文東西二靣君臣通用太子宜然於禮為允收議云去天保初皇太子監國冬會羣官於西園都亭坐從東靣義取於向中宫臺殿故也二年於宫冬會坐乃東靣收竊以為疑前者遂有别議議者同之邢尚書以前定東西之議復申本懐此乃國之大禮無容不盡所見收以為太子東宫位在於震長子之義也按易八卦震位向中皇太子今居北城於宫殿為東北南靣而坐於義為背也前者立議據東宫為本又按東宫舊事太子宴會多以西靣為禮此又誠證非徒言也不言太子常無東南二靣之座但用之有所至如西園東靣所不疑也未知君臣車服有同異之議何謂而發就如所云但知禮有同者不可令異不知禮有異者不可令同茍别君臣同異之禮恐重紙累札書不盡也子才竟執東靣收執西靣援引經據大相往復其後竟從西靣為定皇建中詔議二王三恪收執王肅杜預義以元氏司馬氏為二王通曹氏僃三恪詔諸禮學之官皆執鄭𤣥五代之議孝昭后姓元議恪不欲廣及故議從收邢邵字子才天保初為太常卿中書監時議疑宫吏之姓與太子名同子才謂曰按曲禮大夫士之子不與世子同名鄭注云若先生亦不改漢法天子登位布名於天下四海之内無不咸避按春秋經衞石惡出奔晉在衞侯衎卒之前衎卒其子惡始立明石惡與長子同名諸侯長子在一國之内與皇太子於天下禮亦不異鄭言先生不改蓋以此義衞石惡宋向戌皆與君同名春秋不譏皇太子雖有儲貳之重未為海内所避何容便改人姓然事有消息不得皆同於古宫吏至微而有所犯朝名從事亦是難安宜聼出宫尚書更補佗職制曰可刁柔為國子博士叅議律令時議者以為立五等爵邑承襲者無嫡子立嫡孫無嫡孫立嫡子弟無嫡子弟立嫡子孫弟柔以為無嫡子立嫡孫無嫡孫應立嫡曽孫不應立嫡子弟議曰柔按禮立嫡以長故謂長子為嫡子嫡子死以嫡子之子為嫡孫死則曽𤣥亦然然則嫡子名本為傳重故喪服曰庶子不為長子三年不繼祖與禰也禮記公儀仲子之喪檀弓曰何居我未之前聞仲子舍其孫而立其子何也子服伯子曰仲子亦猶行古之道也昔者文王舍伯邑考而立武王發㣲子舍其孫盾而立弟衍仲子亦猶行古之道也鄭注曰伯子為親者諱爾立子非也文王之立武王權也微子嫡子死立其弟衍殷禮也子游問諸孔子孔子曰否立孫注曰據周禮然則商以嫡子死立嫡子之母弟周以嫡子死立嫡子之子為嫡孫故春秋公羊之義嫡子有孫而死質家親親先立弟文家尊尊先立孫喪服云為父後者為出母無服小記云祖父卒而後為祖母後者三年為出母無服者喪者不祭故也為祖母三年者大宗傳重故也今議以嫡子死子立嫡子母弟嫡子母弟者則為父後矣嫡子母弟本非承嫡以無嫡故得為父後則嫡孫之弟理亦應得為父後則是父卒然後為祖後者服斬既得為祖服斬而不得為傳重者未之聞也若用商家親親之義本不應嫡子死而立嫡孫若從周家尊尊之文豈宜舍其孫而立其弟或文或質愚用惑焉小記復云嫡婦不為舅姑後者則舅姑為之小功注云謂夫有廢疾佗故若死無子不受重者小功庶婦之服凡父母於子舅姑於婦将不傳重於嫡及將所傳重者非嫡服之皆如衆子庶婦也言死無子者謂絶世無子非謂無嫡子如其有子焉得云無後夫雖廢疾無子婦猶以嫡為名嫡名既在而欲廢其子者其如禮何有損有益革代相沿必謂宗嫡可得而變者則為後服斬亦宜有因而改册府元龜卷五百八十三
