body:
  text: 册府元龜卷七百二十二宋王欽若等撰幕府部禆贊二漢而下公卿牧伯皆有官屬㕘于幕府盖其辟署之為盛焉故丗之英髦多齒乎賓佐其於周旋禆賛著之話言者亦不乏其人矣觀其被知己之遇敦報徳之義或推達名士置于賓舘或裁製條式施於軍務辨刑章之枉則釋其非辜陳政事之失則救其不逮乃至轉禍為福知所去就狥公滅私不畏彊禦竭慮而納忠盡規而補過用能彌縫其失激揚其美臨機事而無爽全大節而克終仲尼之所謂益友者斯近之矣漢杜欽字子夏成帝時為議郎以病免徵詣大將軍王鳳幕府國家政謀鳳嘗與欽慮之慮計也數稱達名士王駿韋安世王延等王駿王陽子也韋安世韋賢之孫方山之子也王延即成帝時塞河堤者救觧馮野王王尊胡嘗之罪過及繼功臣絶丗鎮撫四夷當世善政多出於欽者後漢陳寵沛國人少為州郡吏辟司徒鮑昱府是時三府掾屬專尚交逰以不肯視事為髙寵常非之獨勤心物務數為昱陳當世便冝昱髙其能韓稜潁川人為郡功曹時太守葛興中風病不能聼政稜隂代興視事出入二年令無違者興子嘗發教欲署吏稜拒執不從因令怨者章之事下案騐吏以稜掩蔽興病專典郡職遂致禁錮明帝知其忠後特詔原之劉􅀈為頴川功曹時陽翟黄綗恃程夫人權力求占山澤以自營植太守种拂召􅀈問曰程氏貴盛在帝左右不聼則恐見怨與之則奪民利為之柰何􅀈曰名山大澤不以封盖為民也明府聼之則被侫倖之名矣若以此獲禍貴子申甫則自以不孤也拂從􅀈言遂不與之魏國淵為太祖司空屬太祖征闗中以淵為居府長史綂留事田銀蘇伯反河間銀等既破後有餘黨皆應伏法淵以為非首惡請不行刑太祖從之頼淵得生者千餘人董昭為司空軍祭酒時建議冝修古建封五等太祖曰建設五等者聖人也又非人臣所制吾何以堪之昭曰自古以来人臣佐世未有今日之功有今日之功未有乆處人臣之勢者也今明公恥有慙德而未盡善樂保名節而無大責德美􅂈於伊周此至德之所極也然太甲成王未必可遭今民難化甚於殷周處大臣之勢使人以大事疑己誠不可不重慮也明公雖邁威徳明法術而不定其基為萬世計猶未至也定基之本在地與人冝稍建立以自藩衛明公忠節頴露天威在顔耿弇牀下之言朱英無妄之論不得􅂈耳昭受㤙非凡不敢不陳何䕫為太祖丞相東曹掾言於太祖曰自軍興以来制度草創用人未詳其本是以各引其類時忘道徳䕫聞以賢制爵則民慎徳以庸制祿則民興功以為自今所用必先核之鄉閭使長㓜順敘無相踰越顯忠直之賞明公實之報則賢不肖之分居然别矣又可修保舉故不以實之令使有司别受其負在朝之臣時受教與曹竝選者各任其責上以觀朝臣之節下以塞争競之源以督羣下以率萬民如是則天下幸甚太祖稱善劉壹為豫章太守華歆功曹時孫䇿在椒邱遣虞翻説歆翻既去歆請壹入議壹勸歆在城遣檄迎軍歆曰吾雖劉刺史新置上用猶是剖符吏也劉繇為楊州刺史豫章楊之屬郡也今從卿計恐死有餘責矣壹曰王景興既漢朝所用且爾時㑹稽人衆盛彊猶見原恕明府何慮於是夜遂作檄明旦出城遣吏齎迎䇿便進軍與歆相見待以上賓接以朋友之禮王基字伯輿為青州刺史王凌别駕凌流稱青土盖繇基恊和之輔也蜀来忠敏之子也博覧經學有敏風與尚書向充等竝能恊賛大将軍姜維維善之以為叅軍吴駱綂字公緒大帝領㑹稽太守召為功曹行騎都尉妻以從兄輔女綂志在補察茍所聞見夕不待旦甞勸帝以尊賢接士勤求損益饗賜之日可人人别進問其燥濕加以宻意誘諭使言察其志趣令皆感㤙戴義懷欲報之心帝納用焉晉丁􅄨為齊王攸主簿攸都督青州将就國不悦􅄨曰昔太公封齊猶表東海桓公九合以長五伯况殿下誕徳欽明恢弼大藩穆然東軫莫不得所何必綘闕乃宏帝載攸曰吾無佐時之用卿言何多何攀蜀郡郫人也王濬為益州辟為别駕濬謀伐吴遣攀奉表詣臺口陳事機詔再引見乃令張華與攀籌量進討之冝濬兼遣攀􅂈羊祜面陳伐吴之䇿攀善於将命武帝善之詔攀叅濬軍事及孫皓降於濬而王渾恚於後機将攻濬攀勸濬送皓與渾繇是事觧以攀為濬輔國司馬封闗内侯何惲為周浚揚州别駕浚随王渾伐吴惲勸浚速渡江詣建業浚言於王渾渾不從及孫皓降王濬渾深恨之而欲與濬争功惲牋與浚曰書貴克謙易大謙光斯古文所詠道家所崇前破張悌吴人失氣龍驤因之䧟其區宇論其前後我實緩師動則為傷事則不及而今方競其功彼既不吞聲将虧雍穆之宏興矜争之鄙斯愚情之所不取也浚得牋即諫止王渾渾不能納遂相表奏孫洵為新野郡公歆叅軍時趙王倫簒位以歆為南中郎将及齊王冏舉義移檄天下歆未知所從嬖人王綏曰趙親而彊齊疎而弱公冝從趙洵大言於衆曰趙王凶逆天下當共討之大義滅親古之明典歆從之乃使洵詣冏冏迎執其手曰使我得成大節者新野公也冏入雒歆躬冐甲胄率所領導冏以勸進封新野郡王嵇含為長沙王乂驃騎記室都尚書郎乂與成都王頴交戰頴軍轉盛尚書郎旦出督戰夜還理事含言於乂曰昔魏武每有軍事増置掾属青龍二年尚書令陳嶠以有軍務亦奏増郎今姦逆四逼王路擁塞倒懸之急不復過此但居曹理事尚湏増郎况今都官中騎三曹晝出督戰夜還理事一人两役内外廢乏含謂今有千萬人都督各有主帥推轂授綏委付大将不宜復令臺僚雜與其間乂從之乃増郎及令史郭舒為荆州刺史王澄别駕澄終日酣飲不以衆務在意舒嘗切諌之及天下大亂又勸澄修徳養威保完州境澄以為亂自京都起非復一州所能禦雖不能從然重其忠亮虞預會稽人太守庾琛命為主簿預上記陳時政所失曰軍㓂以来賦役繁數兼值年荒百姓失業是輕繇薄歛寛刑省役之時也自頃長吏輙多去来送故迎新交錯道路受迎者惟恐船馬之不多見送者惟恨吏卒之常少窮奢竭費謂之忠義省煩從簡呼為薄俗轉相倣效流而不反雖有常防莫肯遵修加以三途未夷所在停滯送者經年永失播植一夫不耕十夫無食况轉百數所妨不訾愚謂宜勒属縣若令尉先去官者人船吏侍皆具條例到當依法减省使公私允當又今綂務多端動加重制毎有特急輙立督郵計今直兼三十餘人人船吏侍皆當出官益不堪命冝復减省嚴為之防琛善之即皆施行孔嚴為殷浩揚州别駕時朝廷崇樹浩以抗擬桓温温深以不平浩又引接荒人謀立功於閫外嚴言於浩曰當今時事艱難可謂百六之運使君屈己應務屬當其㑹聖懷所以日昃匪懈臨朝斤斤毎欲深根固本静邉寕國耳亦豈至私哉而處任者所志不同所見各異人口云云無所不至頃来天時人情良可寒心古人為政防人之口甚於防川間日侍坐亦已粗申所懷不審竟當何以鎮之老子云夫惟不争則萬物不能與之争此言不可不察也愚意故謂朝廷冝更明授任之方韓彭可專征伐蕭曹可守管籥内外之任各有攸司亷藺屈伸之道平勃相和之義令婉然通順人無間言然後乃可保大定功平濟天下也又觀頃日降附之徒皆人面獸心貪而無親難以義感而聚著都邑雜處人間使君嘗疲聖體以接之虚府庫以拯之足以疑惑視聼耳浩深納之習鑿齒為桓温别駕温出征伐鑿齒或從或守所在任職毎處機要蒞事有績宋劉穆之髙祖初定京城辟為主簿時晋綱寛弛威禁不行盛族豪右負勢陵縱小民窮蹙自立無所重以司馬元顯政令違舛桓𤣥科條繁宻穆之斟酌時宜随方矯正不盈旬日風俗頓改髙祖書素拙穆之曰此雖小事然宣被四逺願公小復留意髙祖既不能留意又禀分有在穆之乃曰公但縱筆為大字一字徑尺無嫌大既足有所􅊶且其勢亦偉髙祖從之一紙不過六七字便滿穆之外所聞見莫不大小必白雖復閭里言謔塗陌細事皆一一以聞髙祖毎得民間委宻消息以示聰明皆繇穆之也又爱好賓逰坐客甞滿布耳目以為視聼故朝野同異穆之莫不畢知雖復親䁥短長皆陳奏無隐人或譏之穆之曰以公之明将来㑹自聞逹我蒙公恩義無隐諱此張遼所以告闗侯欲叛也謝晦為髙祖太尉主簿從征闗雒内外要任悉委之帝於彭城大㑹命紙筆賦詩晦恐帝有失起諌帝即代作曰先蕩臨淄穢却清河雒塵華陽有逸驥桃林無伏輪於是群臣並作張邵為髙祖太尉叅軍髙祖鎮揚州邵補主簿悉心政事精力絶人及誅劉藩邵時在西州直廬即夜誡衆曹曰大軍當大討可各修舟船倉庫及曉取辨旦日髙祖求諸簿署應時即至怪問其速諸曹答曰昨夜受張主簿處分髙祖曰張邵可謂同我慮憂矣殷景仁為髙祖太尉叅軍建議冝令百官舉才以所薦能否為黜陟蒯恩為世子征虜将軍中兵叅軍髙祖北伐留恩侍衛世子命朝士與之交恩益自謙損與人語甞呼位官而自稱為鄙人撫待士卒甚有綱紀衆咸親附之張暢為南譙王義宣司空長史元凶弑逆義宣發哀之日即便舉兵暢為元佐舉哀畢改服着黄韋袴褶出射堂簡人音儀容止衆皆矚目見者皆願為盡命事平徵為吏部尚書封夷道縣侯顔竣為世祖撫軍主簿甚被愛遇竣亦盡心補益沈懐文為西陽王子尚揚州别駕從事及子尚移鎮會稽遷撫軍長史行府州事時囚繋甚多動經年月懐文到任訊五郡九百三十六獄衆咸稱平後為竟陵王誕驃騎録事叅軍淮陵太守時國哀未釋誕欲居内齋懐文以為不可乃止南齊蔡約為宜都王冠軍長史時諸王行事多相裁割約在任主佐之閒穆如也梁庾黔婁鄧元起之鄉人也元起為益州刺史黔婁為録事叅軍又得荆州刺史蕭遥欣故客􅃽光濟竝厚待之任以州事黔婁甚清潔光濟多計謀竝勸為善政陳虞寄初為梁岳陽王詧中記室詧為會稽太守寄領郡五官掾在職簡略去煩苛務存大體曹局之内終日寂然後魏髙允為樂安王範從事中郎範大武之寵弟西鎮長安允甚有禆益秦人稱之游肇為南安王禎鎮北府長史王薨復為髙陽王雍鎮北府長史為政清簡加以禆賛歴佐二王甚有聲迹韓務為征蠻都督李崇司馬崇翦蕩羣蠻除近畿之患務有力焉傅永字脩期為王肅豫州平南長史咸陽王禧慮肅難信言於孝文孝文曰已選傅脩期為其長史雖威儀不足而文武有餘矣肅以永宿士禮之甚厚永亦以肅為孝文眷遇盡心事之情義至穆酈範為慕容白矅征南大将左司馬範前後屢陳䇿畫大破宋師乃表範為青州刺史以撫新民髙顥為冀州别駕時軍旅之後因之饑饉顥為綱紀務在寛静甚收時譽路恃慶為定州河間王琛長史琛貪暴肆意恃慶毎進苦言王則驍果有武藝初随叔父廣平王内史老生征討毎有戰功盧道約為開府髙岳長史岳除青冀二州道約仍為長史兩藩有毗佐之稱北齊徐逺為髙祖丞相騎兵叅軍事嘗征伐克濟軍務深為髙祖所知後周蘇綽為太祖行臺郎中在官嵗餘太祖未深知之然諸曹疑事皆詢於綽而後定所行公文綽又為之條式臺中咸稱其能㓂儁為太祖行臺記室時侯莫陳悦阻兵隴右太祖志在平之乃令儁偽作魏帝勅書與費也頭令将兵助太祖討悦儁依舊勅模冩及代舍人主書等署與真無異太祖悦費也頭已曽得魏帝勅書及見此勅不以為疑遂遣步騎一千受太祖節度唐温彦博初仕隋為幽州總管羅藝司馬藝以幽州歸國彦博賛成其事授幽州總管府長史禇亮為秦王文學太宗平王世充竇建徳等亮甞侍從軍中宴筵必預歡賞從容諷議多所禆益元萬頃乾封中從英國公李勣征髙麗為遼東道管記時别帥馮本以水軍援禆将郭待封船破失期待封作書與勣恐髙麗知其救兵不至乗危廹之乃令萬頃作離合詩贈勣勣不逹其意大怒曰軍機危切何用詩為必斬之萬頃為觧釋之乃止第五琦天寳末為湏江丞時太守賀蘭進明甚重之㑹安禄山反進明遷北海郡太守奏琦為録事叅軍禄山已䧟河間信都等五郡進明未有戰功元宗大怒遣中使封刀促之曰不即進復斬進明之首進明惶懼不知所出琦乃勸令厚以財帛募勇敢士出竒力戰遂收所䧟之郡齊映大歴中為滑亳節度令狐彰掌書記彰疾甚草遺表因與謀後事映説彰令上表請代令子建歸京師彰然之劉昌為宋州牙門将李靈曜據汴州反刺史李僧惠将受靈曜牽制宻遣僧神表潜説僧惠僧惠因問昌昌泣賛其事乃使神表齎表詣闕下遂翦靈曜左翼汴州平李忠臣嫉僧惠功遂殺之昌潜遁及劉元佐為刺史乃復其職柳渾為江西觀察使魏少遊判官時與崔祐甫同在使府竝推公正州有開元寺僧徒夜飲因醉失火延燒講堂翌日歸罪於守門瘖奴虞侯亦受財而同其狀械奴送府少逰将斷獄人知瘖奴之寃莫敢言者渾與祐甫遽入具言醉僧之罪内外蒙蔽致有寃濫少逰大驚趣令訊鞫醉僧首狀瘖奴見原少逰謝曰㣲二君子之言幾成老夫闇劣矣馬彛為㐮陽節度嗣曹王臯賓介以正直彊幹稱漢陽王張柬之有園林在州西公府多假之宴集臯甞謂彛曰漢陽子孫貧弱欲買之如何彛歛容曰張漢陽有中興大功其遺業故第當百世保之王縱欲之柰何令其子孫自衒鬻焉臯黙然有慚色謂彛曰臯失詞為足下羞微足下臯安得聞此言李憲晟之子也起家太原叅軍于頔鎮襄陽憲自醴泉尉為從事時吴少誠據淮西與襄陽壓境少誠叛頔屢有功淮西獨惮頔之令以憲之軍謀致使然也韋詞為韋夏卿東都留守從事頗有禆助其後累佐使府以公才聞後唐李冲為平盧軍節度使房知温行軍司馬初明宗鎮北靣知温為副部署廢帝為别将長興末知温在青州位望驕倨及聞京師變起廢帝起鳳翔隂有窺伺之志甞於宻室召冲謀之曰吾嘗為眀宗軍副自有天下吾受恩隆異今岐陽不順内侮王室豈可坐觀其危亡哉吾養士數千鎧仗萬計有錢數室今圗建義何慮不成冲曰以公之英武誠如所料然主上冲年未更大事以岐帥之聲望勇略世亦罕儔又藉以屬親以彊侮弱何事不濟禍福紏纒不可誤計也僕願為公奉表而西徐觀其釁然後圖之及冲到京廢帝已改元踐阼羣藩職貢冲還優詔奨諭冲謂知温曰京邑熈熈然速宜入覲以保逺圖及知温至帝以宿舊待之異禮晉顔衎正直之士也為青州房知温幕客知温厚歛不已積貨數百萬治第於南城出則以妓樂相随任意所之曾不以政事為務衎委曲陳其利病知温不能用及髙祖建義入雒尚不即進獻耀兵於牙帳之下衎正色謂曰偽主當有天下多力善戰豈明公之比而天運有歸坐成灰燼今青州遷延入貢何以求安千百武夫無足為恃深為明公之所憂也知温遂馳表稱賀青人乃安及知温卒部曲將吏分其所聚列為富室衎又勸其子彦儒進錢十萬貫以助國用朝廷除彦儒為沂州刺史其家保全皆衎之力也熊皦閩人多知數邠州節度使劉景巖辟為判官景巖比以盗據延州朝廷嘗姑息之皦前入朝言已説景巖肯移近地遂降命改鎮執政以為皦有緩頰之力乃賜以金紫漢王敏有文學舉進士第依杜重威歴數鎮從事重威在任以黷貨為務毎箕歛民賦敏力止之十亦行其一二人甚嘉之及重威鎮鄴不以朝命為事多失人情敏嘗勸之泣下重威始則不從及其窮也納敏之言翻然来降時以敏深逹逆順有紓難之力亦近代之良士也髙祖命以憲秩奨其節義時重威幕容有劉當王祐鞫明德皆謫焉周邉蔚為毛璋邠寜觀察判官時璋為麾下所惑有䟦扈之意蔚知其事急因乗間極言又喻以逆順之理璋即時遣妻子入貢朝廷以蔚有賛畫之效錫以三品章綬改許州戍判冊府元龜卷七百二十二
