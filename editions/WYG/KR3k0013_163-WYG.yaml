body:
  text: 册府元龜卷一百六十三宋王欽若等撰帝王部招懐傳曰招攜以禮懐逺以德賈誼所謂降者親酌而手食之以懐其心乃五餌之一也盖王者創業垂統握契御辯征不譓討不庭推亡固存式遏亂畧必使威加于外信著于内桀驁革心英俊乂用輔成大業光昭帝圖如斯而已矣故其始也或喻之以文告或結之以要誓推心置腹曠然不疑分茅胙土待之不次以至賜田宅以安之錫臧獲以寵之其㫖也漢髙祖五年十二月既平項籍齊王田横懼誅與其徒屬五百餘人入海居嶋中海中山曰嶋帝聞之以横兄弟本定齊齊人賢者多附焉今在海中不收後恐有亂廼使使赦横罪而召之横謝曰臣烹陛下之使酈食其今聞其弟商為漢將而賢臣恐懼不敢奉詔請為庶人守海嶋中使還報帝廼詔衛尉酈商曰齊王横即至人馬從者敢動揺者致族夷言平除其族廼復使使持節具吿以詔意曰横來大者王少者乃侯耳大者謂横身少者其徒屬不來且發兵加誅横廼與其客二人乗傳詣雒陽十年九月代相國陳豨反帝東至邯郸令周昌選趙壯士可令將者白見四人白於天子而召見也帝嫚罵曰嫚者渫汙也豎子能為將乎四人慙皆伏地帝封各千户以為將左右諫曰從入蜀漢伐楚賞未徧行今封此何功帝曰非汝所知陳豨反趙代地皆豨有吾以羽檄徵天下兵未有至者檄者以木簡為書長尺二寸用徵召也其有急事則加以鳥羽挿之示速疾也魏武奏事云今邉有警輙露挿羽徵今計唯獨邯郸中兵耳吾何愛四千户不以慰趙子弟皆曰善十一年五月詔曰粤人之俗好相攻擊前時秦徙中縣之民南方三郡使與百粤雜處會天下誅秦南海尉陁居南方長治之甚有文理中縣人以故不耗减粤人相攻擊之俗益止俱賴其力今立陁為粤王使陸賈即授璽綬陁稽首稱臣文帝元年以南粤王陁親屬在真定廼為置守邑親謂父母也歳時奉祀召其從昆弟尊官厚賜寵之詔丞相陳平舉可使粤者平言陸賈先帝時使粤帝召賈為大中大夫謁者一人為副使賜陁書曰皇帝謹問南粤王甚苦心勞意朕髙皇帝側室之子言非正嫡所生也棄外奉北藩于代道里遼逺壅蔽樸愚未嘗致書言未得通使於粤髙皇帝棄羣臣孝恵皇帝即世髙后自臨事不幸有疾日進不衰言疾病益甚也以故誖暴乎治誖乖也諸呂為變故亂法不能獨制廼取他姓子為孝恵皇帝嗣賴宗廟之靈功臣之力誅之已畢朕以王侯吏不釋之故辭讓帝位不見置也不得不立今即位乃者聞王遺將軍隆慮侯書求親昆弟請罷長沙兩將軍陁之昆弟在故鄉者求訪之而兩將軍將兵繫城者請罷之以賔附於漢也言親昆弟者謂有服屬者也朕以王書罷將軍博陽侯親昆弟在真定者已遣人存問修治先人冢前日聞王發兵於邉為冦灾不止當其時長沙苦之南郡尤甚雖王之國庸獨利乎言越兵冦邉長沙南郡皆厭苦之而漢軍亦當相拒方有戰闘於越亦非利也必多殺士卒傷良將吏寡人之妻孤人之子獨人父母得一亡十朕不忍為也朕欲定地犬牙相入者以問吏吏曰髙皇帝所以介長沙土也介隔也朕不得擅變焉吏曰得王之地不足以為大得王之財不足以為富服嶺以南王自治之山嶺名也長沙南界也雖然王之號為帝兩帝竝立亡一乗之使以通其道是爭而不譲仁者不為也願與王分棄前患彼此共棄故云分終今以來通使如故從今通使至於終乆故云今以來也故使賈馳諭告王朕意王亦受之毋為冦灾矣上褚五十衣中褚三十衣下褚二十衣遺王以緜装衣曰禇上中下者緜之多少薄厚之差也願王聽樂娱憂存問鄰國謂東越及甌駱等陸賈至南粤王恐乃頓首謝願奉明詔長為藩臣奉貢職因使者獻白璧一雙翠鳥千犀角十紫貝五百桂蠧一器桂樹中蝎䖝也漢書常以獻陵廟載以赤轂小車此䖝食桂故味辛而漬之以蜜食之也生翠四十雙孔雀二雙平帝元始二年募汝南南陽勇敢吏士三百人諭説江湖賊成重等二百餘人皆自出送家在所收事言身既自出又各送其家人詣本屬縣邑從賊役耳重徙雲陽重成重也作賊長帥故徙之也賜公田宅後漢光武建元元年九月辛夘朱鮪舉城降初帝即位拜岑彭廷尉行大將軍事與大司馬吳漢大司空王梁建義大將軍朱祐右將軍侯進偏將軍馮異祭遵王霸等圍雒陽數月朱鮪等堅守不肻下帝以彭嘗為鮪校尉令往説之鮪在城上彭在城下相勞苦歡語如平生彭因曰彭往者得執鞭侍從蒙薦舉㧞擢常思有以報恩今赤眉已得長安更始為三王所反皇帝受命平定燕趙盡有幽冀之地百姓歸心賢俊雲集親率大兵來攻雒陽天下之事逝其去矣公雖嬰城固守將何待乎鮪曰大司徒被害時鮪與其謀與音預又諫更始無遣蕭王北伐誠自知罪深彭還具言於帝帝曰夫建大事者不忌小怨鮪今若降官爵可保况誅罰乎河水在此吾不食言指河以為信言其明白也彭復往告鮪從城上下索曰必信可乗此上彭趣索上鮪見其誠即許降後五日鮪將輕騎詣彭顧敕諸部將曰堅守待我我若不還諸君徑將大兵上轘轅歸郾王乃面縛與彭俱詣河陽帝即解其縛召見之復令彭夜送鮪歸城明旦悉其衆出降拜鮪為平狄將軍封扶溝侯二年正月更始復漢將軍鄧畢輔漢將軍于康降皆復爵位三年西州大將軍隗囂奉奏帝素聞其風聲報以殊禮言稱字用敵國之儀所以慰藉之良厚慰安也藉薦也言安慰而薦藉之良甚也􅀄囂據涼州鄧禹承制遣使持節命囂為西州大將軍得專制凉州朔方事及赤眉去長安欲西上隗囂遣將軍楊廣迎擊破之又追敗之於烏氏涇陽間囂既有功於漢又受鄧禹爵署其腹心議者多勸通使京師囂乃上書詣闕時陳倉人呂鮪擁衆數萬與公孫述通冦三輔囂復遣兵佐征西大將軍馮異擊之走鮪遣使上狀帝報以手書曰慕樂徳義思相結納昔文王三分猶服事殷但駑馬鈆刀不可强扶數蒙伯樂一顧之價而蒼蠅之飛不過數歩即託驥尾得以絶羣隔於盜賊聲聞不數將軍操報欵誠扶傾救危南拒公孫之兵北御𦍑胡之亂是以馮異西征得以數千百人躑躅三輔微將軍之助則咸陽已為他人禽矣今關東冦賊往往屯聚志務廣逺多所不暇未能觀兵成都與子陽角力臣欽若等曰子陽公孫述字也如令子陽到漢中三輔願因將軍兵馬鼓旗相當儻肻如言蒙天之福即智士計功割地之秋也管仲曰生我者父母成我者鮑子自今以後手書相聞勿用傍人解構之言自是恩禮愈篤其後公孫述數出兵漢中遣使以大司空扶安王印綬授囂囂自以與述敵國耻為所臣乃斬其使出兵擊之連破述軍以故蜀兵不復北出是年劉永將慶吾斬永首降封吾為列侯帝又徵馮魴為虞令魴當王莽末四方潰畔聚賔客招豪傑作營塹以待所歸待真主也時天下未定而四方之士擁兵矯稱者甚衆唯魴自守兼有方略帝聞而嘉之徵詣行在所見於雲臺拜官五年四月河西大將軍竇融始遣使貢獻帝賜融璽書黄金二百斤授涼州牧後融與五郡大守共砥厲兵馬上疏請師期以討隗囂帝深嘉美之賜融外屬圖及大史公五宗外戚世家景帝子十三人為王而冊五人同母者為一宗故曰五宗言景帝以竇氏所生而致子孫衆多也魏其侯列傳詔報曰每追念外屬孝景皇帝出自竇氏定王景帝之子朕之所祖昔魏其一言繼統以正長君少君遵奉師傅脩成淑徳施及子孫施延也音羊跂切此皇太后神靈上天祐漢也從天水來者寫將軍所讓隗囂書痛入骨髄叛臣見之當股慄慙愧忠臣則酸鼻流涕義士則曠若發矇非忠孝慤誠孰能如此豈其徳薄者所能克堪囂自知失河西之助族禍將及欲設間離之説亂惑其心轉相解構以成其姦又京師百僚不曉國家及將軍本意多能採取虚偽誇誕妄談令忠孝失望傳言乖實毁譽之來皆不徒然不可不思今關東盜賊已定大兵今當悉西將軍其抗厲威武以應期會融被詔即與諸郡守將兵入金城後融歸朝拜冀州牧尋遷大司空十月好畤侯耿弇等擊破張歩軍於臨淄歩走還劇帝勞軍至臨淄謂弇曰田横烹酈生及田横降髙帝詔衛尉不聽為仇張歩前亦殺伏隆三年帝遣隆諭歩歩殺之若歩來歸命吾當詔大司徒釋其怨大司徒湛即隆父歩乃肉袒負斧鑕於軍門封安兵侯十二月西州大將軍隗囂遣長子恂入侍帝以為胡騎校尉封鐫羗侯鐫謂鐫鑿六年帝與公孫述書曰圖䜟言公孫即宣帝也代漢者當途髙君豈髙之身邪一云光武與述書曰承赤者書也姓當途其名髙也乃復以掌文為瑞時述妄引䜟記乃刻其掌文曰公孫帝也王莽何足效乎君非吾賊臣亂子倉卒時人皆欲為君事耳何足數也君日月已逝妻子少當早為定計可以無憂天下神器不可力爭宜留三思署曰公孫皇帝述不答是年隗囂使周游詣闕先到馮異營游為仇家所殺帝遣衛尉銚期持珍寳繒帛賜囂期至鄭被盜鄭今華州縣是亡失財物帝稱囂長者務欲招之聞而歎曰吾與隗囂事欲不諧使來見殺得賜道亡帝復使來歙至汧陽賜隗囂書曰昔柴將軍與韓信書云柴將軍柴武也韓信韓王也信入匈奴武與韓書也陛下寛仁諸侯雖有亡叛而後歸輙復位號不誅也以囂文吏曉義理故復賜書深言則似不遜略言則事不决今若束手復遣恂弟歸闕庭者則爵祿獲全有浩大之福矣浩亦大也吾年垂四十在兵中十歳厭浮語虚辭即不欲勿報七年以隗囂所署明威將軍王遵為大中大夫遵字子春霸陵人雖與囂舉兵而常有歸漢意囂既稱臣於公孫述帝因令來歙以書詔遵乃與家属東詣京師拜為大中大夫封尚義侯一云遵降封乙誰侯是冬盧芳臣欽若等曰芳王莽末起兵為西平匈奴單于立為漢帝所置朔方太守田颯雲中太守喬扈各舉郡降帝令領職如故八年隗囂大將十三人衆十餘萬降囂奔西城帝復詔告隗囂曰若束手自詣父子相見保無他也高皇帝云横來大者王小者侯若遂欲為黥布者亦自任也十二年公孫述弟恢及子壻史興並為大司馬吳漢輔威將軍臧宮所破戰死自是將帥恐懼日夜離叛述雖誅滅其家猶不能禁帝必欲降之乃下詔諭述曰往年詔書北下開示恩信勿以來歙岑彭受害自疑今以時自詣則家族完全若或不諭委肉虎口痛哉奈何將帥疲倦吏士思歸不樂乆相屯守詔書手記不可數得朕不食言述終無降意是歳盧芳將随昱欲脅芳降芳知心膂内潰遂亡入匈奴其衆盡歸昱乃随使者程恂詣闕叙昱為五原太守封鐫胡侯昱弟慮武侯十六年盧芳入居髙栁縣名故城在定襄縣與閔堪兄林使使請降乃封芳代王堪為代相林為代太傅賜繒二萬疋因使知和集匈奴魏太祖為漢大將軍建安四年四月圍射於長楊故長史薛洪河内太守繆尚率衆降封為列侯十一月張繡率衆降封為列侯十二月袁術所署盧江太守劉勲率衆䧏封為列侯八年十月袁尚將呂曠呂詳叛尚屯陽平率其衆降封為列侯是年吳以太史慈為建昌都尉治海昏太祖具召遺慈書以篋封之發省無所道而但貯當歸十年正月袁熈大將焦觸張南等叛攻熈熈并弟尚奔三郡烏丸觸等舉其縣降封為列侯四月黑山賊張燕率其衆十餘萬降封為列侯十三年七月太祖征劉表八月表卒其子琮嗣屯襄陽大將蒯越從事中郎韓嵩東曹掾𫝊巽等説琮歸太祖後太祖軍到襄陽琮舉州降太祖以琮為青州刺史封列侯蒯越等侯者十五人越為光祿勲韓嵩大鴻臚鄧羲侍中劉先尚書令其餘多至大官又以表大將文聘為江夏太守使統本兵十六年十月北征楊秋圍安定秋降復其爵位使留撫其民人二十年七月破漢中賊帥程銀侯選詣太祖降皆復官爵銀選及李堪皆河東人興平之亂各有衆千餘家並與馬超合超破走堪臨陣死銀選南入漢中至是來降十一月張魯自巴中將其餘衆降封魯及五子皆為列侯文帝初為魏王延康元年五月馮翊山賊鄭甘王炤率衆降皆封列侯魏書曰初鄭甘王炤及盧水胡率其属來降王得降書以示朝曰前欲有令吾討鮮卑者吾不從而降又有欲使吾及今秋討盧水胡者吾不聽今又降昔魏武侯一謀而當有自得之色見譏李悝吾今説此非自是也徒以為坐而降之其功大於動兵革也七月蜀將孟達率衆降帝自筆手令曰吾前遣使宣國威靈而達即來吾惟春秋褒儀父即封并遣使還領新城太守近復有扶老攜幼首向王化者吾聞夙沙之民自縳其君以歸神農豳國之衆襁負其子而入酆鎬斯豈區略迫脅之所致哉乃風化動其情而仁義感其𠂻歡心内發使之然也以此而推西南將萬里無外權備將與誰守死乎臣欽若等曰權備謂吴蜀主也黄初三年八月蜀大將黄權及嶺南郡太守史郃等三百一十八人詣荆州刺史奉上所假印綬棨㦸幢麾牙門鼓車權等詣行在所在帝置酒設樂引見於承光殿權郃等人人前自陳帝為論説軍旅成敗去就之分諸將無不喜悦賜權金帛車馬衣裘帷帳妻妾下及偏禆皆有差拜權為侍中鎮南将軍封列侯即日詔使驂乗及封史郃等四十二人皆為列侯為將軍郎將者百餘人明帝大和二年蜀將諸葛亮冦邉帝幸長安露布天下并班吿益州曰劉備背恩自竄巴蜀諸葛亮棄父母之國阿殘賊之黨神人被毒惡積身滅亮外慕立孤之名而内貪專擅之實劉升之兄弟空城而已亮又悔易益土虐用其民是以利狼宕渠高定清羗莫不瓦解為亮仇敵而亮反裘負薪裏盡毛殚刖趾適屨刻肌傷骨反更稱説自以為能行兵於井底游歩於牛蹄自朕即位三邉無事猶哀憐天下數遭兵革且欲養四方之耆老長後生之孤幼先移風於禮樂次講武於農隙置亮度外未以為虞而亮懐季熊愚勇之智不思荆邯度徳之戒驅畧吏民盜利祁山王師方振膽破氣奪馬謖高祥望旗奔敗虎臣逐北蹈尸渉血亮也小子震驚朕師猛鋭踴躍咸思長驅朕惟率土莫非王臣師之所處荆棘生焉不欲使十室之邑忠信貞良與夫淫昏之黨同受塗炭故先開示以昭國誠勉思變化無滯亂邦巴蜀將吏士民諸為亮所劫追公卿已下皆聽束手是年魏興太守申儀來朝拜樓船將軍在禮請中初儀兄耽漢末在西平上庸間聚數千家後與張魯通又遣使詣太祖加其號為將軍因使領上庸都尉至建安末為蜀所攻以其郡西属黄初中儀復來還詔即以兄散號加儀因拜魏興太守封侯後與新城太守孟達不和數上言達有二心於蜀及達反儀絶蜀道使救不到達死後儀詣宛見司馬宣王勸使來朝故有是命一云儀久在魏興專威疆塲輙承制刻印多所假綬孟達既誅自有疑心時諸郡守以司馬宣王新克捷奉禮求賀皆聽之宣王使人諷儀儀至問承制狀執之歸于京師青龍元年遼東太守公孫淵通於孫權國家知淵兩端而恐遼東吏民為淵所誤故公文下遼東因赦之曰告遼東𤣥莬將校吏民逆賊孫權遭遇亂階因其先人劫掠州郡遂成羣凶自擅江表含垢藏疾兾其可化故割地王權使南面稱孤位以上將禮以九命權親乂手北面稽顙假人臣之寵受人臣之榮未有如權者也狼子野心告令難移卒歸反覆背恩叛主滔天逆神乃敢僣號恃江湖之險阻王誅未加比年已來復逺遣樓船越渡大海多持貨物誑誘邉民邉民無知與之交關長吏以下莫肻禁止至使周賀浮舟百艘沈滯津岸貿遷有無既不疑拒齎以名馬又使宿舒随賀通好十室之邑猶有忠信䧟君於惡春秋所書也今遼東𤣥莬奉事國朝紓青拖紫千百為數戴纚垂纓咸佩印綬曾無規正納善之言龜玉毁於匵虎兕出於匣是誰之過歟國朝為子大夫羞之昔狐突有言父教子貳何以事君䇿名委質貳乃辟也今乃阿順邪謀脅從姦惑豈獨父兄之教不詳子弟之舉習非而已哉若苗穢害田随風烈火芝艾俱焚安能自别乎且又此事固然易見不及鍳古成敗書傳所載也江南海北有萬里之限遼東君臣無怵惕之患利則義所不利貴則義所不貴此為厭安樂之居求危亡之禍賤忠貞之節重背叛之名蠻貊之長猶知愛禮以此事人亦難為顔且又宿舒無罪擠使入吳奉不義之使始與家訣涕泣而行及至賀死之日覆衆成山舒雖脱死魂魄離身何所逼迫乃至於此今忠臣烈將咸忿遼東反覆㩦貳皆欲乗桴浮海期於肆志朕為天下父母加念天下新定既不欲勞動干戈逺渉大川費役如彼又悼邉陲遺餘黎民迷誤如此故遣郎中衛慎邵􅈘等且先奉詔示意若股肱忠良能效節立信以輔時君反邪就正以建大功福莫大焉儻恐自嫌已為惡逆所見染汚不敢倡言永懐伊戚其諸與賊使交通皆赦除之與之更始是歳公孫淵斬送孫權所遣使張濔許晏首帝於是拜淵大司馬封樂浪公持節領郡如故高貴鄉公甘露二年六月乙巳詔吳使持節都督夏口將軍事鎮軍將軍沙羡侯孫壹賊之枝属位為上將畏天知命深鍳禍福翻然與衆逺歸大國雖微子去殷樂毅遁燕無以加之其以壹為侍中車騎將軍假節交州牧吳侯開府辟召儀同三司依古侯伯八命之禮衮冕赤舄事從豐厚陳留王咸熈元年九月辛未詔曰吳賊政刑暴虐賦歛無極孫休遣使鄧句勅交趾太守鎻送其民發以為兵吳將呂興因民心憤怒又承王師平定巴蜀即紏合豪傑誅除句等驅逐太守長史撫和吏民以待國命九真日南郡聞興去逆即順亦齊心響應與興恊同興移書日南州郡開示大計兵臨合浦吿以禍福遣都尉唐譜等詣進乗縣因南中都督䕶軍霍弋上表自陳又交阯將吏各上表言興創造事業大小承命郡有山寇入連諸郡懼其計異各有㩦貳權時之宜以興為督交阯諸軍事上大將軍定安縣侯乞賜褒奬以慰邉荒乃心欵誠形於辭㫖昔儀父朝魯春秋所美竇融歸漢待以殊禮今國威逺震撫懐六合方包舉殊裔混一四表興首向王化舉衆稽服萬里馳義請吏帥職宜加寵遇崇其爵位既使興等懐忠感悦逺人聞之必皆兢勸其以興為使持節都督交州諸軍事南中大將軍封定安縣侯得以便宜從事先行後上䇿命未至興為下人所殺十月丁亥詔曰昔聖帝明主静亂濟世保大定功文武殊塗勲烈同歸是故或舞干戚以訓不庭或陳師旅以威暴至於愛民全國康惠庶類必先脩文教示之軌儀不得已然後用兵此盛徳之所同也往者季漢分離九土顛覆劉備孫權乗間作禍三祖綏寜中夏日不暇給遂使遺冦僣逆厯世幸頼宗廟威靈宰輔忠武爰發四方拓定庸蜀役不浹時一征而克自頃江表衰弊刑政荒闇巴漢平定孤危無援交荆揚越靡然向風今交阯偽將呂興已帥三郡萬里歸命武陵邑侯相嚴等糾合五縣請為臣妾豫章廬陵山民舉衆叛吳以助北將軍為號又孫休病死主帥改易國内乖違人各有心偽將施績賊之名臣懐疑自猜深見忌惡衆叛親離莫有固志自古及今未有亡徵若此之甚若六軍震曜南臨江漢吴會之域必扶老攜幼以迎王師必然之理也然興動大衆猶有勞費宜告諭威徳開示仁信使知順附和同之利相國叅軍事徐紹水曹掾孫彧昔在夀春並見虜獲紹本偽南陵督才質開壯彧孫權支屬忠良見事其遣紹南還以彧為副宣揚國命告諭吳人諸所示語皆以事實若其覺悟不損征伐之計盖廟勝長􅄸自古之道也其以紹兼散騎常侍加奉車都尉封都亭侯彧兼給事黄門侍郎賜爵關内侯紹等所賜妾及男女家人在此者悉聽自随以明國恩不必使還以開廣大信晉武帝㤗始八年吳西陵督歩闡來降拜衛將軍開府儀同三司封宜都公咸寜二年六月吳京下督孫階帥衆來降以為車騎將軍封丹陽侯成帝時凉州牧張駿遣䕶羗叅軍陳寓從事徐虓華馭等至京師征西大將軍庾亮上疏曰陳寓等冐險逺至宜蒙銓叙詔除寓西平相虓等為縣令孝武帝時凉州牧張天錫既䧏苻堅後堅冦淮南大敗于淮肥時天錫為苻融征南司馬於陣歸國詔曰昔孟明不替終顯厥功豈以一眚而廢才用其以天錫為散騎常侍左員外後魏道武皇始二年二月幸陽城大破慕容寳衆寳所署尚書閔亮秘書監崔逞太常孫沂殿中侍御史孟輔等並降降者相屬賜拜職爵各有差初其將張驤李况慕容文等先來降尋皆亡還是日復獲之皆赦而不問三月慕容寳走和龍寳燕郡太守髙湖率户三千歸國帝賜爵東阿侯加右將軍總代東諸部五月以中山城内為慕容普隣所脅而大軍迫之欲降無路乃宻招諭之是歳寳鉅鹿太守高甞率郡降賜爵經縣侯加龍驤將軍仍守鉅鹿以寳唐郡内史遼東公子文括弟一客是時代人薛逹顯自姚萇率部落歸國帝嘉其忠欵賜爵聊城侯散員大夫待以上客之禮達顯閑雅恭慎帝深器之明元太常二年八月宋滅姚泓渤海刁雍等歸國上表陳誠於南境自効帝許之假雍建義將軍十二月詔河東河内有姚泓子弟播越民間能有送致京師者賞之七年山陽公奚斤南討軍至潁川宋陳留太守嚴稜率文武五百人詣斤降驛送稜朝帝於冀州嘉其誠欵拜平逺將軍賜爵郃陽侯假荆州刺史随駕南征還為上客是時赫連昌寜東將軍費峻率衆來降拜龍驤將軍賜爵犍為公大武神䴥四年二月冠軍將軍安頡等平滑臺擒宋將朱修之帝善其固守授以内職以宗室女妻之延和元年七月代和龍馮䟦石城太守李崇率十餘郡歸降帝甚禮之呼曰李公以崇為平西將軍北幽州刺史固安侯是年河西王秃髪傉檀子保周棄沮渠蒙遜來奔以保周為張掖公太延五年九月西征凉士乞伏西秦大夏鎮將嘗但子爽與兄仕國歸欵軍門帝嘉之賜仕國爵五品顯美男爽為六品拜宣威將軍太平眞君元年八月沮渠無諱降尋拜為征西大將軍凉州牧酒泉王三年四月凉武昭王孫李寳據燉煌遣使内附十二月遣使授寳使持節侍中都督西垂諸軍事鎮西大將軍開府儀同三司領䕶西戎校尉沙州牧燉煌公仍鎮燉煌四品以下聽承制假授寳隴西狄道人伯父歆為沮渠蒙遜所滅寳徙於姑臧歳餘随舅唐契北奔伊吾臣於蠕蠕其遺民歸附者稍至二千寳傾身禮接甚得其心衆皆樂為用每希報雪屬帝遣將討沮渠無諱於燉煌無諱捐城遁走寳自伊吾南歸燉煌遂修繕城府規復先業遣弟懐達奉表歸誠帝嘉其忠欵故有是拜仍以懐達為散騎常侍燉煌太守十一年十一月南伐至鄒山太守鉅平人羊祉與魯郡太守崔耶利及其属縣徐遜愛猛之等俱降賜祉爵鉅平子拜鴈門太守是時合鄉令張忠歸降賜爵新昌男拜新興太守髙育為馮文通建徳令值太武東封率其所部五百餘家歸命軍門帝授以建徳將軍齊郡建徳二郡太守賜爵服如子獻文即位初遼東髙崇歸國賜爵陽關男居遼東詔以沮渠牧犍女賜潜為妻封武威公主拜駙馬都尉天安元年九月宋徐州刺史薛安都以彭城内屬宋將張允沈攸之繫安都詔北部尚書尉元為鎮戍大將軍都督諸軍事孔伯恭為副出東道救彭城時宋明帝自立羣情不恊共立前廢帝弟晉安王子勛安都與沈文秀崔道固常珍竒等舉兵應之明帝遣將張永等討安都安都遣使來降請兵救援帝召羣臣議之羣官咸曰昔世祖嘗有并儀隆之心臣欽若等曰世祖太祖諡儀隆宋文帝名故親御六軍逺臨江浦今江南阻亂内外離心安都今者求降千載一會機事難遇時不可逢取亂侮亡於是乎在帝納之安都又遣第四子道次為質并與李敷等書絡繹相繼乃遣尉元等率騎一萬赴之拜安都使持節散騎常侍都督徐南北兖州青冀五州豫州之梁郡諸軍事鎮南大將軍徐州刺史賜爵江東公勅安都之子散騎常侍駙馬都尉拔詣彭城勞迎除拔冠軍將軍南豫州刺史十一月宋兖州刺史畢衆敬遣使内屬皇興元年閏正月宋青州刺史沈文秀冀州刺史崔道固竝遣使請舉州内屬詔平都將軍長孫陵南平將軍侯窮竒赴援之二年二月鎮東大將軍尉元討徐州羣盜平之宋冠軍將軍東徐州刺史張讜順於元元亦表授冠軍東徐州刺史遣中書侍郎髙閣與讜對為刺史是年薛安都與畢衆敬朝于京師見大禮重子姪羣從竝處上客皆封侯至于門生無不收敘焉又為起第宅館宇崇麗資給甚厚安都從祖弟真度初與安都南奔及安都為徐州真度為長史頗有勇幹為其爪牙從安都來降為上客衆敬弟衆愛随兄歸國以勲為第一客賜鉅平侯衆敬子元賔爵須昌侯加平逺將軍是時清河司馬房法夀與弟從并州刺史崇吉及冀州刺史崔道固兖州刺史劉休賔俱至京師以法夀為上客崇吉為次客崔劉為下客法夀供給亞於薛安都等以功賜爵莊武侯加平逺將軍給以田宅奴婢孝文㤗和十七年齊尚書左僕射王奐子肅以其父及兄弟俱為齊武所殺乃自建業來奔帝虚襟待之除輔國將軍長史賜爵關陽伯肅固辭伯爵許之十八年十月詔曰比聞緣邉之蠻多有竊掠致有父子乖離室家分絶既虧和氣有傷仁厚朕渾一區宇子育萬姓若茍如此南人豈知朝徳哉可詔荆郢東三州勒勅蠻民勿有侵暴十九年二月車駕至鍾離軍士擒齊卒三千帝曰在君為君其民何罪於是免歸是年拜光城蠻酋田益員外散騎常侍都督光城弋陽汝南新蔡宋安五郡諸軍事冠軍將軍南司州刺史光城縣開國伯食蠻邑一千户以益宗十七年自齊歸欵故也二十二年南討既克宛外城命舍人公孫延景宣詔於南陽太守房伯玉曰天無二日土無兩主是以躬總六師蕩一四海宛城小戎豈足以懟抗王威深可三思封侯胙土事在俯仰伯玉對曰外臣最荷國恩忝任疆境為臣之道未敢聽命伏惟逰蠻逺渉願不損神又遣謂曰朕親率麾斾逺渉清江此之小戎豈足徘徊王師但戎路所經纎介須殄宜量力三思自求多福且蒙蕭頥殊常之眷曽不懐恩報以塵露蕭鸞妄言入繼道成頥子了無子遺卿不能建忠烈於君親返立節於逆豎卿之罪一又頃年傷我偏師卿之罪二今鑾斾親戎清一南服不先面縛待罪麾下卿之罪三卿之此戌多則一年中則百日少則二旬尅殄豈逺宜善思之後悔無及伯玉對曰昔蒙武帝愷悌之恩忝侍左右此之厚遇無忘夙夜但繼主失徳民望有歸主上龍鳯踐極光紹太宗非直副億兆之深望實兼武皇之遺勑是以懃懃懇懇不敢失墜往者北師深入冦擾邉民輙厲將士以救蒼生此乃邉戎常事陛下不得垂責及克宛伯玉面縛而降帝引見伯玉并其參佐二百人特宥之時伯玉從祖弟三益南陽内附孝文與語善之曰三益三益殊不惡拜員外散騎侍郎册府元龜卷一百六十三
