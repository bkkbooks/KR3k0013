body:
  text: 册府元龜卷六百八十二宋王欽若等撰牧守部遺愛仲尼之稱子産曰古之遺愛班固之述循吏曰所去見思夫君子之為政也仁愛深矣故其恩德淪於骨髓風烈播於弦詠攀轅遮道而惜其罷去號呼啜泣而形於戀慕以至邀車駕而願借留守關門而求代罪取其姓以名子避其名以易官申奉祠之禮脩服喪之報致恭於丘墓懐德於息裔自非明允惇篤宣慈惠利以濟衆救物為任者亦何以及兹盖桃李不言而下自成蹊非可驅而致之也已周召公奭治西方甚得兆民和召公巡行鄉邑有棠樹决獄政事其下自侯伯至庶人各得其所無失職者召公卒而民思召公之政懐棠樹不敢伐歌詠之作甘棠之詩漢文翁景帝末為蜀郡太守仁愛好教化終於蜀吏民為立祠堂嵗時祭祀不絶召信臣九江人為上蔡令其治視民如子後為南陽太守其治如上蔡吏民親愛信臣號之曰召父元始四年詔書祀百辟卿士有益於民者蜀郡以文翁九江以召父應詔書歲時郡二千石率官屬行禮奉祠魏相為南陽太守後有人告相賊殺不辜事下有司河南卒戍中都官者二三千人來京師諸官府為戍卒若今衛士上番分守諸司遮大将軍自言願復留作一年以宥太守罪河南老弱萬餘人守關欲入上書關吏以聞大将軍光用武庫令事遂下相廷獄初霍光用丞相車千秋子為雒陽武庫令千秋死而相治郡嚴恐獲罪乃自免去官以此書責相乆繫踰令㑹赦出趙廣漢為京兆尹坐事下廷尉吏民守闕號泣者數萬人或言臣生無益縣官願代趙京兆死使牧養小民竟坐要斬廣漢亷明威制豪彊小民得職百姓追思歌之韓延夀為左馮翊蕭望之劾奏延夀在東郡時上僣不道坐棄市吏民數千人送至渭城老小扶持車轂争奏酒炙奏進也延夀不忍距逆人人為飲計飲酒石餘使掾史分謝送者逺苦吏民延夀死無所恨百姓莫不流涕王章為京兆尹二歲為大将軍王鳯所陷死不以其罪衆庶寃之號為三王王陽王駿及章也駿陽子也何武歴揚兖州刺史京兆尹所居亦無赫赫名去後嘗見思後漢侯霸為淮平大尹王莽改臨淮郡為淮平更始元年遣使徴霸百姓老弱相携號哭遮使者車或當道而卧皆曰願乞侯君復留期年民至戒乳婦勿得舉子侯君當去必不能全使者慮霸就徴臨淮必亂不敢受璽書具以狀聞㑹更始敗道路不通乃止耿純前為東郡太守後從光武擊董憲道過東郡百姓老小數千隨車駕涕泣云願復得耿君帝謂公卿曰純年少被甲胄為軍吏耳治郡乃能見思若是乎祭肜為遼東太守招至烏桓鮮卑皆遣子入侍肜死烏桓鮮卑追思肜無已每朝賀京師常過冡拜謁仰天號泣乃去遼東吏人為立祠四時奉祭焉㓂恂前為潁川太守後光武至潁川盗賊悉降而竟不拜郡百姓遮道曰願從陛下復借冦君一年乃留恂長社鎮撫吏人受納餘降武成侯順建武中擊破六安賊因拜為六安太守數年光武欲徴之吏人上書請留郭伋再為并州牧前在并州素結恩德及後入界所到縣邑老幼相携逢迎道路宋均為東海相在郡五年坐法免官客授潁臣欽若等曰客授謂為客以經業教授也而東海吏民思均恩化為之作歌詣闕乞還者數千人明帝以其能徴拜尚書令第五倫為㑹稽太守坐法徴老小攀車叩馬號呼相隨日纔行數里不得前倫乃偽止亭舎隂乗船去衆知復追之及詣廷尉吏民上書守闕者千餘人是時明帝方按梁松事亦多為松訟者帝患之詔公車諸為梁氏及㑹稽太守上書者勿復受㑹帝幸廷尉録囚徒得免歸田里張翕為越嶲太守政化清平得夷人和在郡十七年卒夷人愛慕如䘮父母蘇祈叟蘇祈縣名二百餘人齎牛羊送喪至翕本縣後明帝以翕有遺愛乃拜其子湍為太守夷人歡喜奉迎道路曰郎君儀貌類我府君後湍頗失其心有欲叛者諸夷耆老相曉語曰當為先府君故遂以得安張綱犍為人為廣陵太守卒百姓老幼相携詣府赴哀者不可勝數初綱自被疾吏人咸為祠祀祈福皆言千秋萬歲何時復見此君張嬰等五百餘人制服行䘮到犍為負土成墳种暠為梁州刺史甚得百姓歡心被徴當遷吏人詣闕請留之梁太后歎曰未聞刺史得人心若是乃許之暠復留一年遷漢陽太守戎夷男女送至漢陽界暠與相揖謝千里不得乗車後為司徒薨并凉邊人咸為發哀任延為九眞太守視事四年徴詣雒陽以病稽留左轉睢陽令九眞吏人生為立祠許荆為桂陽太守在事十二年父老稱歌以病自上徴拜諌議大夫卒於官桂陽人為立廟樹碑劉寵為㑹稽太守徴為将作大匠山隂縣有五六老叟龎眉皓髪自若耶山谷間出人齎百錢以送寵寵勞之曰父老何自苦對曰山谷鄙生未嘗識郡朝他守時吏發求民間至夜不絶或狗吠竟夕民不得安自明府下車以來狗不夜吠民不見吏年老遭值聖明今聞當見棄去故自扶奉送寵曰吾政何能及公言邪勤苦父老為人選一大錢受之孟嘗為合浦太守以病自上被徴當還吏民攀車請之嘗既不得進乃載鄉民船夜遁去張奐為武威太守其俗多妖忌凡二月五月産子及與父母同月生者悉殺之奐示以義方嚴加賞罰風俗遂改民生為立祠陳龜為五原太守後卒西域胡夷并涼民庶咸為舉哀弔祭其墓周嘉為零陵太守視事七年卒零陵頌其遺愛吏民為立祠駱俊為陳國相人有産子厚致米肉逹府主意生男女者以駱為名袁術使部曲将張闓陽私行到陳之俊所俊往從飲酒因詐殺俊一郡吏人哀號如喪父母劉虞為幽州牧以恩厚得衆懐及為公孫瓉所殺北州百姓流舊莫不痛惜焉袁紹為冀州牧為人政寛百姓德之及軍敗病死河北士女莫不傷怨市巷揮淚如喪其親陳登為廣陵太守以破吳主功遷為東城太守廣陵吏民佩其恩德共拔郡隨登老弱襁負而追之登曉語令還曰太守在卿郡頻致吳冦幸而克濟諸卿何患無令君乎袁渙為梁相以病去官百姓思之魏賈逵為豫州刺史及薨吏民追思之為刻石立祠倉慈為燉煌太守數年卒官吏民悲感如喪親戚圖畵其形思其遺像及西域諸胡聞慈死悉共㑹衆於戊巳挍尉及長吏治下發哀或有以刀畫面以明血誠又為立祠遥共祠之顔斐為京兆太守數歲遷為平原太守吏民啼泣遮道車不得前歩歩稽留十餘日乃出界東行至崤而疾困斐素心戀京兆其家人從者見斐病甚勸之言平原當自勉勵作健斐曰我心不願平原汝曹等呼我何不言京兆邪遂卒還平原京兆聞之皆流涕為立碑于今稱頌之滿寵為汝南太守領豫州太和三年遷督揚州諸軍事汝南兵民戀慕大小相率奔隨道路不可禁止䕶軍表上欲殺其為首者詔使寵将親兵千人自隨其餘一無所問田豫為汝南太守後遷衛尉遜位歸居魏縣會汝南遣健歩詣征北感豫宿恩過拜之豫為殺雞炊黍送至陌頭謂之曰罷老苦汝來過無能有益若何健歩愍其貧羸流涕而去還為故吏民説之汝南為具資數千疋遣人餉豫一不受㑹病亡汝南聞其死也悲之既為畵像又就為立碑銘牽招為鴈門太守在郡十二年威風逺振其治邊之稱次於田豫百姓追思之崔林為司𨽻挍尉屬郡皆罷非法除過員吏為政推誠簡存大體是以去後毎輙見思魯芝為天水太守郡鄰于蜀數被侵掠戸口减消冦盗充斥芝傾心鎭衛更造城市數年間舊境悉復遷廣平太守天水夷夏慕德老幼赴闕獻書乞留明帝許焉仍䇿書嘉歎勉以黄霸之美蜀何祗為成都令時汶山夷反以祗為汶山太守民夷服信遷廣漢後夷反叛辭令得前何府君乃能安我耳時難屈祗㧞祗族人為汶山復得安王嗣為西安圍督汶山太守後從姜維北征為流矢所傷數月卒戎夏會葬贈送數千人號呼涕泣嗣為人美厚篤至衆所愛信嗣子及孫羌胡見之如骨肉或結兄弟恩至於此張嶷為越嶲太守在郡十五年邦域安穆屢乞求還乃徴詣成都夷民戀慕扶轂泣涕過旄牛邑邑君襁負來迎及追尋至蜀郡界其督相率隨嶷朝貢者百餘人嶷至拜盪冦将軍後與魏戰死南土越嶲民夷聞嶷死無不悲泣為嶷立廟四時水旱輙祀之吳張俊為豫章太守坐掃除孫奮母墳塋為後主車裂之豫章吏千人乞代俊死皓不聽黄盖為武陵太守以病卒官盖當决斷事無留滯國人思之圖畵盖形四時祭祀陶璜為交州牧後徴為武昌都督以合浦太守脩允代之交土人請留璜以千數於是遣還璜在南三十年威恩著於殊俗及卒舉州號哭如喪慈親晉扶風王駿嘗為征西大将軍凉州都督善撫御有威恩後西土聞其薨也泣者盈路百姓為之樹碑長老見碑無不下拜其遺愛如此羊祜為荆州刺史及薨襄陽百姓於峴山祜平生遊憇之所建碑立廟歲時饗祭焉望其碑者莫不流涕杜預因名為墮淚碑荆州為祜諱名屋室皆以門為稱改戸曹為辭曹焉樂廣為河南尹為政無當時功譽然每去職遺愛為人所思鄭袤為廣平太守徴拜侍中百姓戀慕涕泗路隅丁詔為廣平太守遷徐州刺史士庶戀慕攀附如歸未之官復轉荆州刺史從車千乗曹攄為襄城太守後髙密王鎮襄陽以攄為征南司馬時流人王逌作亂攄戰死故吏及百姓竝奔喪㑹𦵏號哭即路如赴父母焉劉𢎞為荆州刺史自以老疾将解州未及上表卒於襄陽士女嗟痛若喪所親及髙密王畧代鎮荆州冦盗不禁詔起𢎞子璠為順陽内史江漢之間翕然歸心及畧薨山簡代之簡至以璠得衆心恐百姓逼以為主表陳之由是徴璠為越騎挍尉璠亦深慮逼迫被書便徑至雒陽然後遣迎家累僑人侯脱路難等相率衛送至都然後辭去南夏遂亂父老追思𢎞雖甘棠之詩召伯無以過也陶侃為荆州刺史王敦深忌侃功左轉侃廣州刺史敦平遷都督荆雍益梁州諸軍領䕶南蠻挍尉征西大将軍荆州刺史楚郢士女莫不相慶侃薨遺令𦵏國南二十里故吏刋立石碑畵像於武昌西應詹為南平太守遷益州刺史詹之去郡士庶攀車號泣若戀所生鄧攸為吳郡太守去郡百姓數千人留牽攸船不得進攸乃少停夜中發去吳人歌之曰紞如打五鼓雞鳴天欲曙鄧侯挽不留謝令推不去臣欽若等曰謝令史失其名百姓詣臺乞留一歲不聽謝安為吳興太守在官無當時譽去後為人所思蔡豹為徐州刺史坐討徐龕退敗斬之豹在徐土内撫将士外懐諸侯甚得逺近情聞其死多悼惜之桓冲初鎮江陵其後冲卒喪下至江陵士女老幼皆臨江瞻送號泣盡哀宋劉道産為寧蠻挍尉南雍州刺史甚得人情惠澤被於西土及喪還諸蠻皆被縗絰號哭追送至於沔口羊𤣥保為吳郡太守加秩中二千石文帝以𤣥保亷素寡欲故授名郡為政雖無幹績而去後嘗見思蕭承之為漢中太守既卒梁士民思之於峩公山立祠豫章王嶷為荆湘二州刺史将還都修治廨宇及路陌東歸部曲不得齎府州物出城發江津士女親送數千人皆垂泣安陸王緬為雍州刺史既卒喪還百姓緣沔水而泣設祭於峴山為立祠南齊王元載為寧益二州刺史在京益有清蹟西州至今思之蘇偘為山陽太守清修有治理百姓懷之劉悛為武陵内史㑹國哀表奔赴勑𢃄郡還都吏民送者數千人悛執手涕泣百姓感之崔景貞為平昌太守有惠政嘗懸一蒲鞭而未嘗用去任之日士人思之為立祠梁始興王憺為荆州刺史有惠西土徴為侍中薨荆州人聞之皆哭於巷嫁娶有吉日移以避哀安成康王秀都督雍梁南北秦四州郢州之竟陵司州之隨郡諸軍事初西之郢州民相送出境聞其疾百姓商賈咸為請命既薨四州民裂裳為白㡌哀哭以迎送之雍州蠻迎秀聞薨祭哭而去南康簡王績為南兖州刺史在州以善政稱尋有詔徴還民曹嘉樂等三百七十人詣闕上表稱績尤異一十五條乞留州任優詔許之進號北中郎将柳惲為吳興太守為政清静民吏懷之於郡感疾自陳解職父老千有餘人拜表陳請事未施行而卒蕭昱為晉陵太守暴疾卒百姓行號哭市里為之諠沸設祭奠於郡庭者四百餘人田舍有女人夏氏年百餘歲扶曾孫出郡悲泣不自勝其惠化所感如此百姓相率為廟建碑以紀其德又詣京師表求贈諡贈湘州刺史諡曰恭蕭勵自豫章徙廣州刺史去郡之日吏人悲泣數百里中舟乗塡塞各齎酒肴以送勵人為納受隨以錢帛與之至新塗縣岓山村有一老姥以槃檠鰌魚自送舟側奉上之童兒數十人入水扳舟或歌或泣陸襄為鄱陽内史在政六年郡中大治民李晛等四百三十人詣闕拜表陳襄德化求於郡立碑降勑許之又表乞留襄襄固求還徴為吏部郎夏侯亶為徐豫二州刺史卒州民夏侯簡等五百人表請為亶立碑置祠詔許之袁君正為東陽太守尋徴還都郡民士徐天祐等三百人詣闕乞留一年詔不許仍除豫章内史王僧孺為南海太守視事期月有詔徴還郡民道僧六百人詣闕請留不許劉之亨少有名望代兄之遴為南郡太守有異政荆土懷之惡斥其名號為大南郡小南郡謝舉為晉陵太守罷郡還吏詣闕請立碑詔許之任昉為新安太守為政清省吏民便之視事期嵗卒於官舍閤境痛惜百姓共立祠堂於城南王冲為南郡太守元帝鎮荆州以冲為鎮西長史冲性和順事上謹肅習於法令政在平理佐藩蒞人鮮有失德雖無赫赫之譽乆而見思由是推重累居二千石劉坦為長沙太守行湘州事坦嘗在湘州多舊恩道迎者甚衆褚翔為義興太守徴為吏部郎去郡百姓無老少追送出境涕泣拜辭丘仲孚為豫章内史卒官豫章老幼相將號哭舉送車輪不得前范述曾為永川太守徴為遊擊将軍民無老幼皆出拜辭號哭聞于一十里陳鄭萬頃為豐州刺史在州甚有惠政吏民表請立碑詔許焉毛喜為南安内史在郡有惠政及徴入朝道路送百里册府元龜卷六百八十二
