body:
  text: 册府元龜卷一百三十五宋王欽若等撰帝王部愍征役好邊功愍征役昔軒轅氏撫萬民度四方天下有不順者從而征之則征役之興有自來矣然而王者致治貴於無為聖人用兵盖不得已一夫不獲則曰時予之辜一物失所則若納之於隍况乎蒙霜露冐鋒鏑行有攻戰之苦居有徭戍之勤而可不愍之者哉是以歴代帝王下蠲復之詔降賑給之命存者待以爵賞沒者歛以衣衾故曰悦以使民民忘其死君子之於人序其情而閔其勞詩之東山所繇作也今之紀者非唯乘塞守邊飛芻輓粟之謂凡于力役第而次之周文王為西伯時西有昆夷之患北有玁狁之難以殷王之命其屬為將帥將戍役禦西戎及北狄之難以守衛中國故歌采薇以遣之詩曰采薇采薇薇亦柔止柔始生也曰歸曰歸心亦憂止憂心烈烈載饑載渴我戍未定靡使歸聘漢髙祖為漢王四年八月令軍士不幸死者吏為衣衾棺歛轉送其家四方歸心焉八年十一月令士卒從軍死者為槥槥音衛小棺也今謂之櫝歸其縣縣給衣衾棺𦵏具初為槥櫝至縣更給衣及棺備其𦵏具耳祠以少牢長吏親𦵏九年三月行如雒陽令吏卒從軍至平城及其守城邑者平城左右諸城能堅守也皆復終身勿事武帝建元元年秋七月詔曰衛士轉置送迎二萬人鄭氏曰去故置新常二萬人其省萬人元光六年冬詔曰夷狄無義所從來乆間者匃奴數冦邊境故遣將撫師古者治兵振旅因遭虜之方人將吏新會上下未輯代郡將軍敖鴈門將軍廣所任不肖校尉又背義妄行棄軍而北少吏犯禁用兵之法不勤不教將帥之過也教令宣明不能盡力士卒之罪也將軍已下廷尉使理正之而又加法於士卒三者竝行非仁聖之心朕閔衆庻䧟害欲刷耻改行復奉正義厥路亡繇無繇也其赦鴈門代郡軍士不循法者元狩三年减隴西北地上郡戍卒半宣帝五鳯元年夏赦徒作杜陵者元帝初元三年六月詔曰惟烝庻之饑寒逺離父母妻子勞於非業之作衛於不居之宫不急之事故云非業恐非所以佐隂陽之道也其罷丼泉建章宫衛令就農百官各省費成帝永始元年七月詔曰將作大匠萬年解萬年也言昌陵三年可成作治五年中陵司馬殿門内尚未加功天下虛耗百姓罷勞罷讀曰疲客土疏惡取他處土以増髙為客土終不可成朕惟其難怛然傷心惟思也其罷昌陵及故陵勿徙吏民令天下無有動搖之心後漢質帝永嘉元年五月詔曰兵役連年死亡流離或支骸不歛或停棺莫收朕甚愍焉昔文王𦵏枯骨人頼其徳今遣使者案行若無家屬及貧無資者隨宜賜䘏以慰孤魂桓帝建和元年四月詔曰比起陵塋彌歴時歲力役既廣徒𨽻尤勤頃雨澤不沾宻雲復散儻或在兹其令徒作陵者减刑咎魏太祖為漢丞相以建安七年令曰吾起義兵為天下除暴亂舊土人民死䘮畧盡國中終日行不見所識使吾悽愴傷懐其舉義兵已來將士絶無後者求其親戚以後之授土田官給耕牛置學師以教之為存者立廟使祀其先人魂而有靈吾百年之後何恨哉十四年令曰自頃已來軍數征行或遇疫氣吏死士亡不歸家室怨曠百姓流離而仁者豈樂之哉不得已也其令死者家無基業不能自存者縣官勿絶廪長吏存恤撫循以稱吾意文帝初為魏王漢延康元年下令曰諸將征伐士卒死亡者或未收歛吾甚哀之其告郡國給槥櫝殯歛送致其家官為設祭齊王嗣位詔諸所興作宫室之役皆以遺詔罷之齊王正始七年八月詔曰吾乃當以十九日親祀而昨出已見治道得雨當復更治徒棄功夫毎念百姓力少役多夙夜存心道路但當期於通利聞乃撾箠老小務崇修餙疲困流離以至哀嘆吾豈安乘此而行致馨徳於宗廟邪自今以後明申勑之髙貴鄉公正元二年八月蜀將姜維冦狄道九月姜維退還詔曰朕以寡徳不能式遏冦虐乃令蜀賊陸梁邊陲洮西之戰至取負敗將士死亡計以千數或沒命戰塲寃魂不反或牽掣虜手流離異域吾深痛愍為之悼心其令所在郡典農及安撫夷二䕶軍各部大吏慰其門户無差賦役一年其力戰死事者皆如舊科勿有所漏十一月詔曰徃者洮西之戰將吏士民或臨陣戰亡或沉溺洮水骸骨不收棄於原野吾甚痛之其告征西安西將軍各令部人於戰處及水次鈎求屍䘮收歛藏埋以慰存亡晉武帝太康元年五月庚午詔諸士卒年六十罷歸于家恵帝永安元年十二月詔曰自頃戎車屢征勞費人力供御之物皆减三分之二户調田租三分减一蠲除苛政愛人務本清通之後當還京師成帝咸康二年三月旱詔免所旱郡縣役孝武帝太元四年三月詔凢諸役費自非軍國事要皆宐停省以固時務後魏孝文延興三年二月太上皇帝至自北討死王事者復其家又詔畿内民從役死事者郡縣為迎䘮給以𦵏費又詔醴陽被掠之兵有得還者賜絹二十匹南部尚書公孫䆳奏為貴賤等級帝稱善太和六年二月詔曰蕭道成逆亂江淮戎旗頻舉七州之民既有征軍之勞深乖輕徭之義朕甚愍之其復常調三年八年五月己卯詔賑賜河南七州戍兵十七年十二月詔隐恤軍士死亡疾病務令優洽十九年二月南伐齊幸八公山路中雨甚詔去盖見軍士病者親急恤之八月詔諸徒兵從征被傷者皆聽還本處宣武正始四年十二月詔兵士征硤石者復租賦一年孝明熈平元年七月詔兵士鍾離沒落者復一房田租三年二年五月詔曰楊州硤石荆山新淮鄼城兵士戰沒者追給歛財復一房五年若無妻復其家一人二年身被三瘡賞一階雖一瘡而四體廢落者亦同此賞孝莊永安二年二月朔詔諸禁衛之官從戎有功及傷痍者赴選先叙出帝永熈三年六月詔曰頃年已來天步時阻干戈不戢荆棘斯生或殉節感恩奮不顧命或臨戎對敵赴難如歸身首横分體骨不歛勲誠靡錄榮贈莫加寤寐矜之良有嗟悼可普告内外咸許言列若無親近聽故友陳之尚書簡實隨狀科贈庻慰寃魂少申惻隐後周明帝武成元年六月詔曰潁川從我是曰元勲無忘父城實起王業文考屬天地草昧造化權輿拯彼横流興兹頺運頼英賢盡力文武同心翼賛大功克隆帝業而披堅執鋭櫛風沐雨永言疇昔良用憮然至若功成名遂建國剖符予惟休也其有致死王事妻子無歸者朕甚傷之凡是從先王向夏州從來見在及薨亡者竝量賜錢帛稱朕意焉武帝平齊之役見軍士有跣而行者帝親脱鞾以賜之毎宴㑹將士必自執盃勸酒或手付賜物建徳元年三月詔曰民亦勞止則星動於天作事不時則石言於國故知為政欲靜在寧民為治欲安在息役興起無度徴發不已加以頻歲師旅農畆廢業去秋災蝗年穀不登民有散亡家空杼軸朕毎旦恭已夕􅅥兢懐自今正調以外無妄有發庻時殷俗阜稱朕意焉隋文帝開皇元年九月詔戰亡之家遣使賑給仍令使者就家勞問六年八月詔大象已來死事之家咸令賑恤煬帝大業四年九月詔免長城役者一年租賦八年二月詔曰朕觀風燕裔問罪遼濵文武叶力爪牙思􅁬莫不執鋭勤王捨家從役罕蓄倉廪之資兼損播殖之務朕所以夕􅅥愀然慮其匱乏雖復素飽之衆情在亡私悦使之人宜從其厚諸行從一品以下佽飛募人以上家口郡縣宜數存問若有糧食乏少皆宜賑給或雖有田疇貧弱不能自耕種可於多丁富室勸課相助使之居者有歛積之豐行役無顧後之慮十年二月詔曰竭力王役致身戎事咸繇狥義莫匪勤誠委命草澤棄骸原野興言念之毎懐愍惻徃年出軍問罪將屆遼濱廟筭勝畧具有進止而楊諒惛凶罔識成敗髙熲愎狠本無智謀臨三軍猶兒戲視人命如草芥不遵成規坐貽撓退遂令死亡者衆不及埋藏今宐遣使人分道收𦵏設祭於遼西郡立道塲一所恩加泉壤庻弭窮魂之寃澤及枯骨用𢎞仁者之恵唐髙祖武徳三年六月以沁州被圍一載忠勤可嘉乃以絹三千疋頒賜將士八年八月令民部尚書皇甫無逸於并州設祭戰亡將士太宗貞觀十年十月征遼廻次營州詔遼東道戰亡人骸骨竝集柳城東南有司設太牢以祭之太宗臨哭盡哀從臣無不流淚御製祭文曰夫忠烈盡世徃賢明軌忘身殉國先哲良規惟爾等心苞鐡石志烈風霜勇氣雄圖衝冠裂眥懐忠立節重義輕生􅁬劒提戈摧城䧟陣冒鋒刄而不顧赴湯火而如歸殞命戰塲殘形冦壘膏潤原鉞身䘮名存揺落寒闗遂非生入蒼茫雷野無復餘蹤渉出塞之前途掩靈櫬而反骨歌陽春之徃路黯長夜之歸魂山川宛其不殊存亡颯焉非昔然而身者今之所重名者後之所貴身乃常有而愚夫怯焉功則難立惟烈士成焉若以一生之短期收千載之令譽此聖賢之操也豈直忠勇者乎所以按轡停輿撫膺一慟嘉乃誠節痛爾遺靈酒爼既陳魂其斯享十五年十一月贈戰亡將士官三轉聽授一子􅉍其尸櫃還鄉棺歛而𦵏焉十九年三月征遼輿駕在定州將士毎到者遣於定州北門過太宗御城樓撫慰之明告賞罰優勞甚至悉踊躍歌呼足蹈手舞有從卒一人病不能進太宗召至御牀親加撫慰付州縣廪療之是以將士莫不欣然願從其役有不預征名而請以私裝從軍者動以千計皆云不願受國家官賞乞於髙麗城下効一旦之命詔皆不許其人心齊一自古出師命將未之有也七月詔以征遼從行及遼東平壤二道軍人戰死者各加四級聽一子承襲分遣使人就家弔祭又詔從軍死亡之徒恐致湮沒埋人之處宜立標榜軍廻之日各令將還并給棺以𦵏焉二十二年二月制渡遼有功之徒未授勲班而犯罪者與成官同優之也六月令陜州刺史孫伏伽與河南太子詹事張行成於河北渭州親見父老存撫百姓從軍之家州縣為之營農髙宗龍朔中左武衛大將軍鄭仁泰等討鐡勒無功遣右驍衛大將軍契苾何力為鐡勒道安撫使左衛將軍姜恪為副以輯其餘衆其兵士道死者令所在差軍收瘞之仍蠲免其家睿宗唐隆元年六月即位詔諸道征鎮人家令州縣簡校𤣥宗開元二年六月詔曰吐蕃小冦僻處大荒先朝外撫許其内屬結以和戎之好優以外臣之禮野心易動朝奨遄忘不度徳以量力敢窺邊而犯塞薛納等擁旌為將按節持兵驅之逐之指期殄滅使苞桑莫繫破竹無遺實頼宗廟之靈兼資將士之力比來酬叙多歴歲年命賞踰時有乖勸善已令紫㣲舎人倪若水就軍叙錄即有處分五年五月詔曰王者制五服綏四方申畫郊畿慎固封守是乃選徒興役禦寇備邊欽若前載率繇兹道朕以薄徳紹膺丕運奉天明命為人父母永隔綏養夢寐以之每念征戍良可矜者其有渉河渡磧冐險乘危多歴年所逺辭親愛壯齡應募華首未歸眷此勞止期於折𠂻但磧西諸鎮道阻且長數有替易難於煩擾其鎮兵宜以四年為限散之州縣務取富户丁多差遣後量免户納雜科税其諸軍鎮兵近日逓加年限者各依舊以三年二年為限仍竝不得延留其情願留鎮者即稍加賜物得代願徃聽令復行為貴勞逸且均公私咸適宣布遐邇識朕意焉九年二月詔諸府衛士役重人㣲既毎征行又常畨上言念艱辛更無是過不稍優矜何以存濟自今已後征行及當畨處衛士除公乘配手力㕔事及復身以外官人輙私抽役使宜令御史金吾按察使嚴加採察十二年九月詔曰為國之道莫不欲家給人足令行禁止而族談者苦邊疆之戎役偶語者傷户口之凋殘且夫懐土重遷人之常性離邦去里孰無其情或委非其材或政非其要致令父不保子兄不寧弟井邑有流離之怨道路有吁嗟之聲靜言思之良可歎息是以晝分不食夜不安寢庻息彼弊政就此凉風故發使車以廵郡縣其承前處置不便不利於人即宜當處商量隨事釐革其緣邊兵士等或逺辭鄉壤乆事戎旃饑寒而衣食不充疾病而醫藥不拯邊烽忽警將何以堪宜令使人各親勞苦其有年齒衰暮或抱􅠰羸弱即與軍司選擇給糧放還行人之家委州縣優䘏所到宣撫稱朕意焉十三年正月詔曰陽和布氣是物萌芽仁者用心無遺枯杇自開元元年已來諸軍兵士殞歿骸骨不歸墳壠者宜令軍使為造棺逓送本貫委州縣府助其埋殯河曲隴外徃歲戰塲殂歿無歸隂雨猶哭言念於此良用惻然亦委朔方隴右河西節度使聚歛骸骨就髙燥處同𦵏祭以酒脯髙大築墳使乆逺標識又詔曰乘塞守邊義不可輟逺征乆戍人亦告勞朕身處九重心在四逺因時遇物無日不思停障有行役之勤室家無杼軸之用不少優惜何以為安方春發生湏急農事其諸軍長征人家單貧乏無力者宜令本管州縣勸率其家助其營種使有秋望十四年六月詔曰朕為人父母撫有海内以百姓為心恐一夫失所至於兵募尤令存䘏去給行賜還給程糧以此優矜不合辛苦如聞比來兵募年滿者皆食不充腹衣不蔽形䭾募什物散落畧盡既不能致便流浪不歸丁壯减耗實繇於此自今已後諸鎮兵募每准額至交替時所司預檢勘兩月前奏聞當差御史分道檢察若渉欺隐委御史彈奏其有衣資盡者量以逃死兵衣給三兩軍使得支濟如病患者逓給驢乘令及伴侣十五年二月命中官李善才宣慰於河南河北州縣制曰北河遭水處城旁及諸蕃投降人先令安置及州縣被差征行人家口等去年水澇漂損田苗頻遣使人所在廵撫兼令州縣倍加矜恤不知竝得安存與否今舊穀既沒新麥未登丁壯既差逺行老少慮不支濟朕身居黄屋念在蒼生每思優養無忘夢寐今故遣中使左監門衛將軍李善才重此宣慰宜令州縣檢責有乏絶者准例給糧俾令安堵以副朕意十六年三月詔曰諸軍鎮行人家緣其身在征戍事湏優矜比來頻有處分令州縣長官存問檢校如聞每事牽挽不異居人竟不存恤是何道理宜令所司申明前後勑嚴加處分如是侵擾委御史䑓採訪奏聞十二月詔曰邊鄙未清尚湏式遏既加鎮守遂勞力役朕宵衣旰食務在安人求瘼恤隐宜從簡要如聞諸軍兵募處置多乖年滿之日逃亡甚衆自今已後各委本道節度使及兵部侍郎裴光庭同檢校年終類㑹文奏使健兒長鎮何以克堪可分為五畨每一年放一畨洗沐逺取先年人為第一畨周而復始每五年共酬勲五轉二年四月詔曰王者經畧以正區夏武夫干城式固封域將以戢兵禁暴安國庇人朕所以選擇忠良鎮守疆場念踐更之役有徭戍之勤備以武守示之威恵故得夷狄欵附靡然順風九有晏如四方無事雖備豫之誡不可蹔闕而鰥㷀之徒思有矜憫其天下諸州鎮兵募及健兒等或年月已乆頗亦辛勤或老疾尫羸或單弱貧窶或親老孤獨致闕晨昏言念於斯深用矜嘆宜委節度使及軍州簡擇有如此色一切放還咸宜精審以稱朕意二十六年春正月親迎氣於東郊畢制曰朕每念黎甿弊於征戍親戚多别離之怨關山有徃復之勤何嘗不惻隐於懐寤寐增嘆所以别遣召募以實邊軍賜其厚賞便令長徃今諸軍所召人數向足在於中夏自可罷兵既無金革之事足保農桑之業自今已後諸軍兵健竝宜停遣其見鎮兵竝一切放還京畿之内雜役殷繁言念劬勞豈忘優恤二十九年詔曰諸軍行人皆逺離鄉貫扞彼疆塲動即逾年言念艱勞豈忘優恤有疾病老弱不堪闘戰者委節度揀擇放還天寳三載正月詔曰凡在黎獻實資存恤一失生業則流痡不歸毎軫於懐深可矜愍諸色當畨人應送資課者宜當郡具申尚書省勾覆如身至上處勿更抑令納資致使徃來辛苦從閏二月至六月已來其當上人中有單貧老弱者委郡縣長官與所繇計㑹便放營農十二月制曰諸軍行人逺為邊扞修短之分雖有定期從役而終良深軫念其有陣亡及在軍亡歿骸骨尚未還本貫者宜令節度使給其棺櫬逓歸本鄉若家内無人付近親收塟仍令所繇郡縣量事優恤使得濟辦八載閏六月上尊號大赦詔曰征鎮之役其來自乆雖存素備諒在變通頃者用兵盖非獲已今西戎摧殄北虜歸降南蠻東夷咸來稽顙亦可謂四海無事萬里廓清减戍息人思𢎞善貸其軍鎮兵非切要可均减者宜令本道節度使與所司商量處置聞奏其百姓有頻經鎮戍者已後差㸃之次不在取限十載正月南郊詔曰京兆府及三輔三郡百役殷繁自今已後應差防丁屯丁宜令所繇支出别郡肅宗至徳二年詔陣亡將士郡縣具棺櫬瘞埋之遇傷者特加恤養十二月詔曰陣亡人令所在郡收骸骨瘞埋具酒食致祭各與追贈其家給復二載乾元元年四月甲寅詔曰陣亡人家竝損免户州縣隨事優恤賑給上元二年五月詔曰百司及州縣興功力役不急之務一切竝停諸軍兵健應在行營有羸老病疾不任戰陣者各委節度使速揀擇放還路次州縣量加濟䘏諸色畨役各令所司减省放其營農代宗廣徳二年二月南郊祀昊天上帝禮畢制曰自凶孽亂常王室多故干戈不息今已十年軍國務繁關輔尤劇念兹疲耗乆困徴科其京城諸司諸使應配彍騎官散官諸色丁匠募士供膳音聲人執祭齋郎問事掌閑魚師并諸司門僕京兆府驛丁屯丁及諸色納資人毎月摠八萬四千五十八人數内宜毎月共支二千九百四十四人仍令河東關内諸州府配不得偏出京兆府餘八萬一千一百一十四人竝停所湏諸衛役使宜撙節定數官給資錢不得干擾百姓又曰征人不息勤戍斯乆丁壯疲弊老弱困窮光武有言頭為之白戢藏鋒刃牧養元元方面重臣宜悉朕意大厯七年十一月詔以淮南數州秋夏無雨揚洪宣等三州作坊徃以軍興是資戎噐既屬時歲大歉慮乎人不寧居徴夫役工損費尤甚務從省約以息疲人亦宜竝停九年四月制曰在軍將士有刀箭所傷乆嬰沉疾者戮力疆塲致身鋒刃各委所繇量給藥物厚加優賞其陣亡將士亦仰本使隨事優䘏妻子各申錫賚十二年十一月日長至帝不受朝賀以防秋將士曝在野故也徳宗建中元年六月命給事中蔣鎮弔祠涇州將士之戰亡者三年二月既誅李惟岳下詔易定深趙常兾節觀察管内自官軍出征所有誅戮竝令州縣瘞埋勿令暴露有家屬者竝許收塟興元元年四月帝在梁州山南地偏及夏尤熱將士未給春服帝亦御裌服以視朝左右請御衫帝曰將士從我者冬服未易我豈可獨衣衫乎将士聞之無不感涕至五月諸道財賦稍至先令給將士衣服而後御衫六月帝發興元邸七月至京師帝自發興元即路踰月時當盛暑赫日未嘗張盖加幅左右數以為請帝曰從官將士皆以朕之故尚露首於赫曦之中朕寧以已之適而不同其寒暑也竟不從貞元二年四月李希烈平詔曰淮西百姓等乆經淪䧟兼被傷痍想兹彫殘實足哀愍除供當道軍用之外宜給復二年將士之中不樂在軍願歸農業者委節度使刺史量給逃户田宅并錢借貸種糧優復終身使之存濟三年閏五月崔漢衡副渾瑊㑹盟吐蕃漢衡及判官鄭叔矩皆為吐蕃所執六月辛亥詔賜崔漢衡鄭叔矩家粟布四年正月赦書涇隴邠寧振武靈鹽銀夏官健常例之外毎年加賜兩叚三月涇原節度劉昌以平凉盟㑹所亡歿將士骸骨在焉乃令聚而瘞之因感夢於昌有媿謝之意遂以上聞帝乃下詔深自剋責仍遣秘書少監孔述睿及中官以御厨饌物及内造衣服數百襲令劉昌收其骸骨以歸分為大將三十人將士一百人皆棺槥斂以衣服𦵏於淺水原置二塜其大將曰旌義塜將士曰懐忠塜詔翰林學士撰二塜誌文及祭文其日劉昌陳兵於𦵏所先設幕次具牢饌祖祭之禮昌及大將皆素服臨之焚其衣及紙錢千幅又立二堠題以塜名竪於道傍師人觀之莫不感泣十五年四月詔應在城諸州軍及畿内諸縣鎮兼京西歩鐸并奉天行營雜職掌所繇兼長行官徤共五萬八千二百七十二人宜令所司毎人賜粟一石憲宗永貞元年八月詔曰諸道節度使團練經畧防禦等將士乆執干戈式遏封畧勤勞王室深用嘉之㩀其優勞竝與甄錄各委本軍本使即具名衘奏聞元和元年春正月南郊大赦天下京兆府諸司色役人各令條流簡省十一年春正月朔不受朝賀以師在原野故也十二年十月淮西平詔其官軍陣亡將士等審勘名衘即與褒贈其家口委本軍優賞仍五年不停衣食其將士因戰陣傷損尤宜優異至殘廢者各委本軍厚加優恤仍勿停衣糧其䧟在賊中官吏將士百姓等應節義著明無辜受戮者宜令長吏致祭收𦵏竝委節度具名跡聞奏當有褒贈仍優賞其家穆宗長慶元年七月十八日詔應經戰陣之處所在州縣收瘞遺骸仍量事與槥櫝兼以禮致祭敬宗以長慶四年正月即位十月賜山陵持路夫絹各二疋時蜀連雨役人饑凍頗甚至有持鍤抱篲而死者帝聞而惻然故有賜文宗太和二年七月賜魏博行營將士裹瘡帛一千疋金瘡散一千貼便令奏事官押送本道四年七月内庫出綾三千疋赴宥州賜修城將校七年正月詔諸色工役非灼然交切者勒停開成元年十月京兆尹薛元賞奏昆明池條造功畢欲大為其防上曰時方凝沍築堤可否元賞曰正當人閒上曰王者動作必法時令不計人閒遂罷之二年五月帝御紫宸殿宰相鄭覃李石奏襄陽殷侑論當道防秋兵請就邊上招召徐泗薛元賞請留舊防秋兵二年帝曰殷侑所請邊上募兵恐不得其實又遷動農者防秋既有年限元賞豈得苟留念其邊戍鄉情不可爽及𤓰之信懿宗咸通五年五月丁酉詔邕州巴西黎嶲界内昨因蠻叛互有殺傷宜令本道收拾埋瘞量設祭酬後唐莊宗初嗣晉王位栢鄉之役日晩戰酣突陣都將遼州刺史安元信傷重帝自臨傅藥撫諭同光元年十二月勑自十數年來累經戰陣殺傷暴露有足憫嗟其徳勝寨莘縣楊劉鎮通津鎮胡栁陂戰陣之所宜令逐處差人檢收骸骨埋瘞取係省錢備酒紙招祭以慰亡魂明宗天成元年五月丙寅差供奉官張殷祚押夏衣一萬副賜湖南行營將士十月詔曰嫌疑之釁多起於蒼黄似是之名卒難於明辨應去年四月一日諸州府軍變内有詿誤身歿者竝許子孫禮𦵏頃以兩軍對壘仍歲交鋒亡歿甚多暴露不少宜令滑濮鄆澶衛等州各㩀地界内應有暴露骸骨竝與埋瘞長興三年三月帝謂六軍副使石敬瑭曰神武馬軍就糧鞏縣昨日雨甚何不賜油衣敬瑭對曰去京師近不敢奏請帝曰百寮入朝至近尚湏油衣縱與未必禦濕然表朕意耳十二月賜修雒水堤岸工徒毎夫酒一升十夫共一羊癸丑帝幸龍門觀工徒修伊河石堰以羊酒賜役夫如雒堰例伊水中流榜夫墮水遣人拯之以錦袍賜之四年二月乙丑勑倉門開河役夫數日春寒稍甚宜俟晴暖作役十一月樞宻使安重誨奏欲近南别開一河以導水計功六十萬權倩京師户人帝曰勞役百姓不宜有此商量遂止末帝清泰元年七月甲子詔鳯翔西面來徃兵士或疾病傷損者留醫養候住行李則人給千錢勒歸本處晉髙祖天福二年十二月宣遣承㫖劉貞義押風藥徃軍前賜中傷将校少帝開運二年二月乙酉勑曰契丹違天背恵猾夏渝盟無名侵犯於封疆縱暴殺傷於生聚毒流數郡怒積羣情果敗衂於漳州乃退歸於燕塞今則長驅虎旅誓掃龍庭雪萬姓之沉寃期四方之昭泰毎念契丹經過之處邊隅䧟沒之人未掩殭尸何安恨魄軫傷既切恵澤宜加其常定邢洺管界契丹經過之處枉遭殺害無主收𦵏者宜令本州差大將一人所在收瘞量事祭奠訖具事以聞漢隐帝乾祐元年四月庚辰勑青州收瘞用兵討楊光逺時骸骨癸卯勑三京鄴都諸道州府自契丹南下羣盗刼傷所有被殺暴露骸骨及墳墓被發掘者竝令逐處長吏㨿地分收拾埋瘞初契丹犯闕四郊墳墓無不發掘故有是詔三年正月丙寅詔遣供奉官梁再筠使河中侯樞使鳯翔竝為收拾用兵時城内外殺傷餓殍遺骸令瘞而祭之時已有僧收拾尸首至二十萬周太祖廣順二年五月平慕容彦超於兖州詔諸軍將士等有歿於王事者各等第給孝繒仍以本人半分衣糧給與本家一年有親子者官中竝與收錄安排自軍使都頭已上皆與贈官九月勑兖州自逆臣盗㨿多有殺傷永為𦵏朽之仁式示掩骸之義宜令樂院使黄知筠徃兖州收暴露骸骨於髙地為壙埋瘞祭奠以聞世宗顯徳元年正月赦文諸軍將士年老病患不任征行情願歸農者本軍具以名聞給憑繇放免四月討太原迴詔昨殺戮賊軍處四面山谷間屍首絶多宜令逐處官吏差人收歛埋瘞勿令暴露二年十一月以秦鳯平詔城下功役百姓為矢石所害致死者本户除二税外放免三年差徭仍賜本家孝服絹三疋其部署人夫州縣官竝與加階减選四年二月壬戌詔諭淮南招討使李重進都監向訓廬州行府劉重進等令於淮南管内戰陣之處收其骼胔悉埋瘞之三月詔曰自攻討壽州已來應有將士歿於王事者宜差殿直劉漢卿於壽州四面收歛其屍以官物祭奠本家仍以優給有男者量與叙用五年五月帝以征淮南廻降徳音云疾風勁草既驗忠誠臨難捐軀所宜旌異應淮南行營將士歿於王事者各與贈官逐人若有親的子孫竝與叙錄内有中傷殘廢不任征行者等第給救接錢帛排難疆塲馬革無慙於壯志遺骸暴露牛岡有軫於深仁載循掩骼之文俾釋窮泉之恨凢經戰陣處應有暴露骸骨仰逐處州縣收拾埋瘞淮南界内逐處墳墓有曾遭發掘處委逐州縣差人掩閉好邊功聖人制兵以威天下五材竝用弗可闕也然而有道之守實在於外夷好戰之危盖存於深戒其或中區大定海内同軌乃復恃其富彊肆其材力采疆吏之丼言信行人之詭計貪其土地利其俘獲出師命將窮兵黷武靡思餽運之苦罔念征戍之役以致百姓騷動中國罷弊損多益寡得虛䘮實乆而迷復何救於治哉周穆王將征犬戎犬一作趺祭公謀父諌祭畿内之國周公之後為王卿士謀父字也曰不可犬戎氏以其職來王天子曰予必以不享征之且觀之兵無乃廢先王之訓而王幾頓乎吾聞犬戎樹敦樹一作竪竪立也言犬戎立惟敦篤也率舊徳而守終純固其有以禦我矣王遂征之得四白狼四白鹿以歸自是荒服者不至漢武帝建元六年八月閩越王郢攻南越遣大行王恢將兵出豫章大司農韓安國出㑹稽擊之未至而越人殺郢以報恢因兵威使番陽令唐蒙風曉南粤畨音皤風讀曰諷蒙歸至長安上書曰南粤王黄屋左纛言為天子之車服地東西萬餘里名為外臣實一州主今以長沙豫章徃水道多絶難行竊聞夜郎所有精兵可得十萬浮船牂牁出不意此制粤一竒也誠以漢之疆巴蜀之饒通夜郎道為置吏甚易帝許之乃拜蒙以郎中將將千人食重萬餘人食糧度衣重也重音直用也從巴莋闗入遂見夜郎侯多同多同其侯名也厚賜諭以威徳約為置吏使其子為令比之于漢縣也夜郎旁小邑皆貪漢繒帛以為漢道險終不能有也廼且聽蒙約還報廼以為犍為郡發巴蜀卒治道自􅈎道指牂牁江蜀人司馬相如亦言西夷卭莋可置郡使相如以郎中將徃諭皆如南夷為置一都尉十餘縣屬蜀元光四年夏發巴蜀治南夷道作者數萬人千里負擔餽饟餽亦饋字饟古餉字也率十餘鍾致一石言其勞費再功重散幣於卭􅈎以輯之卭今卭州也􅈎今􅈎道縣也輯與集同謂安定也數歲而道不通蠻夷因以數攻吏發兵誅之悉巴蜀租賦不足以更之悉盡也更償也雖盡租税不足償其功費也更音庚廼募豪民田南夷入粟縣官而内受錢於都内都内京師主藏者也大司農屬官有師内令坐也西南夷又數發兵興擊耗費亡功帝患之使公孫𢎞徃視問焉還報言其不便及𢎞為御史大夫時築朔方㨿河逐胡𢎞等因言西南夷為害言通西南夷大為損害可且罷專力事匈奴帝許之罷西夷獨置南夷兩縣一都尉稍令犍為自保就令自保守且修成其業犍為今嘉州縣元朔二年春收河南地置朔方五原郡興十餘萬入築衛朔方既築其城又守衛之轉漕甚逺自山東咸被其勞費數十百鉅萬數十百萬乃至百萬府庫竝虗迺募民能入奴婢得以終身復為郎増秩庻人入奴婢則復終身而為郎者就増其秩也一曰入奴婢少者復終身多者得為郎舊為郎更増秩也及入羊為郎是時主父偃盛言朔方地肥饒外阻河蒙恬城以逐匃奴内省轉輸戍漕廣中國威胡之本也上覧其説下公卿議皆言不便公孫𢎞曰秦時嘗發三十萬衆築此河終不可就就成也已而棄之朱買臣難詘𢎞遂置朔方本偃計也元狩元年博望侯張騫言使大夏時見卭竹杖蜀布問安得此大夏國人曰吾賈人徃市之身毒國毒音篤一名天篤則浮屠胡是也身毒國大夏東南可數千里其俗土著土著謂有城郭常居不隨畜牧移徙也著音直畧切其下亦同與大夏同而卑溼暑熱其民乘象以戰其國臨大水焉以騫度之度計也大夏去漢萬二千里居西南今身毒又居大夏東南數千里有蜀物此其去蜀不逺矣今使大夏從羗中險羗人惡之少北則爲匈奴所得從蜀宜徑又無冦徑直也宜猶當也從屬面大夏其道當直天子既聞大宛及大夏安息之屬皆大國多竒物土著頗與中國同俗而兵弱貴漢財物其北則大月氐康居之屬兵彊可以賂遺設利朝也設施也施者以利誘令入朝誠得而以義屬之謂不以兵革則廣地萬里重九譯致殊俗威徳徧於四方天子欣欣以騫言為然迺令因蜀􅀈為發間使四道竝出間使者求間隙而行出駹出莋出徙卭出􅈎皆夷名駹音龍莋村各切徙音斯􅈎蒲北切皆各一二千里其北方閉氐莋漢使見閉于夷也氐與莋二種也南方閉巂昆明嶲昆明亦皆夷種名也嶲先橤切昆明之屬無君長善冦盗輙殺畧漢使終莫得通然聞其西可千餘里有乘象國名湞越湞音顛湞馬出其國而蜀賈間出物者或至焉間出物謂私徃市者於是漢以求大夏道始通湞國時吏士爭上書言外國竒怪利害求使天子為其絶逺非人所樂聽其言人皆不樂去故有自謂為使者即聽而遣之予節募吏民無所從來不為限禁逺近雖家人私𨽻竝許應募為其備人衆遣之以廣其道來還不能無侵盗弊物及使失指乘天子指意天子為其習之輙覆按致重罪言其串習不以為難必當敬求充使地以激怒令贖令立功以贖罪復求使使端窮而輕犯法其吏卒亦輙盛推國所有言大者予節言小者為副故妄言無行之徒皆爭相效其使皆私縣官齎物言所齎官物竊自用之司于私者欲賤市以私其利所市之物得利多者不盡入官也外國亦厭漢使人人有言輕重漢使言于外國人人輕重不實度漢兵逺不能至而禁其食物以苦漢使令其困苦也漢使乏絶匱怨至相攻擊樓蘭姑師小國當空道空即孔也攻刧漢使王恢等尤甚而匈奴竒兵又時時遮擊之使者爭言外國利害言服之則利不討則為害皆有城邑兵弱易擊於是天子遣從票侯趙破奴將屬國騎謂外國屬漢者及郡兵數萬擊姑師王恢數為樓蘭所苦帝令恢佐破奴將兵破奴與輕騎七百人先至虜樓蘭王遂破姑師因暴兵威以動烏孫大宛之屬暴謂顯揚也還封破奴為浞野侯恢為浩侯於是漢列亭障至玉門闗矣王門闗龍勒界而大宛諸國發使隨漢使來觀漢光大以大鳥卯及黎軒昡人獻於漢鳥卯大如汲水之甕昡讀與幻同即令吞刀吐火植𤓰種樹屠人截馬之術皆是也天子大悦太初元年八月遣貳師將軍李廣利發屬國六千騎及郡國惡少年數萬人伐宛期至貳師城取善馬故浩侯王恢使道軍既西過監水當道小國各堅城守不肯給食攻之不能下下者得食不下者數日則去北至郁成士財有數千北音必寐功財與才同皆饑罷罷讀日疲攻郁成城郁成距之所殺傷甚衆貳師將軍與左右計至郁成尚不能舉况至其王都乎失利而還徃來二歲至敦煌士不過什一二十人之中一二人得還使使上書言道逺多乏食且士卒不患戰而患饑人少不足以㧞宛願且罷兵益發而復徃益多也天子聞之大怒使使遮玉門闗曰軍有敢入斬之貳師恐因留屯敦煌其夏漢亡浞野之兵二萬餘於匈奴趙破奴後封浞野侯浞音士角切公卿議者皆願罷宛軍專力攻胡天子業出兵誅宛小國而不能下則大夏之屬漸輕漢而善馬絶不來烏孫輪䑓易苦漢使易輕也輪䑓亦國名爲外國笑廼案言伐宛尤不便者鄧光等案其罪而行罰赦囚徒扞冦盗使從軍為斥發惡少年及邊騎歲餘而出敦煌六萬人興發部署歲餘乃行負私從者不與負私糧食及私從者不在六萬人數中也與讀曰豫牛十萬馬三萬匹驢槖駝以萬數齎糧兵弩甚設設張甚具也天下騷動轉相奉伐宛五十餘校尉宛城中無井汲城外流水於是遣水工徙其城下水空以宂其城空孔也從其城下水者令從也道流不廹其城也空以宂其城者圍而攻之令作孔使穿宂也下云决其水源移之又大圍其城攻之皆再叙其事也曰既徙其水不令于城下流而因其舊引水入城之孔攻而宂之益發甲卒十八萬酒泉張掖北置居延休屠以衛酒泉立二縣以衛邊也或曰置二部都尉而發天下七科適適讀曰讁及載糒給貳師糒乾飯音備轉車人徒相連屬至敦煌而拜習馬者二人為執驅馬校尉習便也一人為執馬校尉一人為驅馬校尉備破宛擇取其善馬云於是貳師後復行兵多所至小國莫不迎出食給軍至輪䑓不下數日屠之自此而西平行至宛城平行言無宛難兵到者三萬宛兵迎擊漢兵漢兵射敗之宛兵走入保其城貳師欲攻郁成城恐留行而令宛益生詐留行謂留上軍廢其行廼先至宛决其水源移之則宛固已憂困圍其城攻之四十餘日宛貴人謀曰王母寡匿善馬殺漢使母寡宛王名今殺王而出善馬漢兵宐解即去廼力戰而死未晩也宛貴人皆以為然共殺王其外城壊虜宛貴人勇將煎靡宛之貴人為將而勇者名煎靡也宛大恐走入中城相與謀曰漢所為攻宛以王母寡持其頭遣人使貳師約曰漢無攻我我盡出善馬恣所取而給漢軍食即不聽我我盡殺善馬康居之救又且至我居内康居居外與漢軍戰孰計之何從令二師熟計之而欲攻戰乎欲不攻而取馬乎是時康居候視漢兵尚盛不敢進貳師聞宛城中新得漢人知穿井而其内食尚多計以為來誅首惡者母寡頭已至於此不許則堅守而康居候漢兵罷來救宛破漢軍必矣罷讀曰疲軍吏皆以為然許宛之約宛廼出其馬令漢自擇之而多出食食漢軍下食讀曰飲漢軍取其善馬數十匹中馬以牝牡三千餘匹而立宛貴人之故時遇漢善者名昧蔡為宛王昧音本末之末祭音千曷切與盟而罷兵終不得入城中罷而引歸賈捐之曰武帝元狩中太倉之粟紅腐而不可食粟乆腐壊則色紅赤也都内之錢貫朽而不可較計也廼探平城之事追計其事故言探録冐頓以來數為邊害厲兵馬因服民以攘服之攘却也西連諸國至于安息東過碣石以𤣥莬樂浪為郡樂音落浪音郎北郤匃奴萬里更起營塞制南海以為八郡則天下斷獄萬數民賦數百造鹽鐡酒榷之利以佐用度猶不能足當此之時冦賊竝起軍旅數發父戰死於前子鬭傷於後女子乘亭鄣孤兒號於道老母寡婦飲泣巷哭淚流被面以入于口故言飲泣也遥設虗祭想魂乎萬里之外淮南王盗冩虎符隂聘名士関東公孫勇等詐為使者是皆廓地泰大征伐不休之故也後魏太武神䴥二年練兵于南郊將襲蠕蠕公卿皆不願行保太后固止帝皆不聼唯太常卿崔浩賛成帝從浩計而行帝縁粟水西行過漢將竇憲故壘平城三千七百餘里分軍搜討東至瀚海西接張掖水北渡燕然山東西五千餘里南北四千里隋煬帝大業三年令羽騎尉朱寛入海求訪異俗海師何蠻言每春秋二時天清風靜東望依稀似有煙霧之氣亦不知幾千里遂與蠻俱徃因到流求國言不相通掠一人而返明年帝復令寛慰撫之流求不從取其布甲而還時倭國使來朝見之曰此夷邪乃國人所用也帝遣武賁郎將陳稜朝請大夫張鎮州率兵自義安浮海擊之至髙華嶼又東行二日至寵甓嶼又一日便至流求初稜將南方諸國人從軍有崑崙人頗解其語遣人慰諭之流求不從拒逆官軍稜擊走之進至其都頻戰皆敗焚其宫室虜其男女數千人載軍實而還自爾遂絶五年五月吐谷渾王率衆保覆袁州帝分命將擊之六月癸卯大升㧞谷山路隘險魚貫而出風霰晦暝與後宫相失士卒凍死者大半八年正月親征髙麗大軍集於涿郡摠管一百一十萬三千八百號二百萬其饋運者倍之三月帝御師於遼水四月進遼東時諸將各奉㫖不敢赴機既而髙麗各城守攻之不下六月己未幸遼東責怒諸將止城西數里御六合城七月壬寅宇文述等敗績於薛水右屯衛將軍辛世雄死之九軍竝䧟一日一夜還至鴨渌水行四百五十里初度遼九軍三十萬五千人及還至遼東城唯二千七百既班師敗將宇文述于仲文等除名為民斬尚書右丞劉士就以謝天下九年正月徴天下兵募民為驍果集於涿郡復宇文述等官爵又徴兵討髙麗四月庚午車駕度遼壬申遣宇文述楊義以趣平壤六月禮部尚書楊𤣥感反於黎陽遂逼東都兵部侍郎斛斯政奔於髙麗帝乃班師十年二月詔百寮議伐髙麗數日無敢言者遂下詔親征三月壬子行幸涿郡四月甲午次北平七月甲子髙麗遣使降囚送斛斯政帝大悦遂班師初帝以天下承平日乆召募行人分使絶域諸畨至者厚加禮賜有不恭命以兵擊之盛興屯田於玉門栁城之外課天下富實益市武馬疋直十餘萬坐而凍餧者十家而九唐太宗貞觀十八年二月謂侍臣曰莫離之賊弑其主盡殺大臣用刑有同坑穽百姓轉死怨痛在心道路以目夫出師弔伐須有其名因其弑君虐下取之甚易也十九年命刑部尚書張亮為平壤道行軍大摠管領將常何等率江淮嶺硤勁卒四方戰船五百艘自莱州汎海趨平壤又以特進英國公李勣爲遼東道行軍大摠管禮部尚書江夏王道宗為副領將軍張仕貴等率歩騎六萬趨遼東兩軍合勢太宗親御六軍以㑹之後張亮與髙麗再戰於建安城下皆破之及道宗遣果毅都尉傅伏愛領隊兵於山頂以防敵土山自髙而陟排其城城隳㑹伏愛私離所部髙麗百人自頽城而戰遂據有土山而塹斷之積火縈排以自守固太宗大怒斬伏愛以狥命諸將擊之三日不能克太宗以遼東倉儲無幾士卒寒凍乃詔班師二十二年又遣右武衛大將軍薛萬徹等徃青丘道伐之萬徹渡海八鴨渌水進破其泊灼俘獲甚衆太宗命江南造大船遣陜州刺史孫伏伽召募勇敢之士莱州刺史李道裕運糧及噐械貯於烏湖島將欲大舉以伐髙麗不果行初太宗征髙麗雖有功所損亦甚謂左右曰使復有魏徴在必無此行髙宗嗣位又命兵部尚書任雅相左武衛大將軍蘇定方左驍衛大將軍契苾何力等前後討之皆無大功而還乾封元年十一月命英國公李勣為遼東行軍大摠管率裨將郭待封等以征髙麗總章元年十一月㧞平壤册府元龜卷一百三十五
