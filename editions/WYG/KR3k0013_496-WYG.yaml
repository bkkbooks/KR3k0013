body:
  text: 冊府元龜卷四百九十六宋王欽若等撰邦計部河渠洪範五行其一曰水自三五之世物有其官少皥之後是為𤣥囂世不失職至於臺駘宣汾洮障大澤乃錫封於汾州皆勤職於水者也大禹時乘四載以救方割之患隨山浚川通道陂澤决九川距海濬畎澮距川蒸民乃粒無復水患班固曰中國川原以百數而河為宗自漢文之代始潰金堤及武帝元光中復决瓠子自時厥後頗多災害故賈讓陳其三䇿桓譚言其兩便亦各一時之事也至於决漳以溉始於史起引渭而漕由夫鄭莊皆澤被於當時功濟於異代後之賢者多興水利魏晉而降實繁有徒其有田不償種岸或奔潰功費居多績用不就者亦云衆矣斯皆國家之利害故廣記而備存之夏禹堙洪水十三年堙塞也洪通而止塞氾溢疏堙音因過家不入門陸行載車水行乘舟泥行乘毳毳亦如箕擿行泥上毳音茅蕝之蕝謂以板置泥上通行路上山行則挶挶謂以鐵如錐頭長半寸施之履下以上山不蹉跌也又曰挶木器如今輿牀人舉而行也挶音居足切以别九州分其界隨山浚川順山之髙下而深其流也任土作貢通九澤度九山通九州之道及障其澤商度其山也度音大各切然河災之羡溢害中國也尤甚羡讀與行同音弋戰切惟是為務故導河自積石導治也引也從積石山而治引之令疏通也及盟津雒内至於大伾内讀曰納伾音皮鄙切於是禹以為河所從來者髙水湍悍難以行平地急流曰湍悍勇也湍音他端切數為敗廼釃三渠以引其河釃分也分其流泄其怒也三渠其一出貝丘西南其一則漯川也釃音山支切漯音它合切北載之髙地過降水至於大陸播為九河播布也同為逆河入于勃海九州既疏九澤既陂諸夏乂安功施乎三代自是之後滎陽下引河東南為鴻溝以通宋鄭陳蔡曹衞與濟汝淮泗㑹於楚西方則通渠漢川雲夢之際東方則通溝江淮之間於吳則通渠三江五湖於齊則通淄濟之間蜀守李氷鑿離􅕞􅕞古堆字避沫水之害沫音本末之末沫水蜀西南徼外東南入江穿二江成都中此渠皆可行舟有餘則用溉溉灌也百姓饗其利至於它往往引其水用溉田渠溝甚多然莫足數也魯哀公九年秋吳城䢴溝通江淮於䢴江築城穿溝東北通射陽湖西北至宋口入淮通糧道也今廣陵韓江是也西門豹魏文侯時為鄴令豹發民鑿十二渠引河水灌民田田皆溉當其時民治渠以煩苦不欲也豹曰民可與樂成不可與慮始今父老子弟雖患苦我然百歲後期令父老子孫思我言至今皆得水利民人以給足富十二渠經絶馳道到漢之立而長吏以為十二渠橋絶馳道相比近不可欲合渠水且治馳道合三渠為十橋鄴民人父老不肯聽長吏以為昔西門君所為也賢君之法式不可更也長吏終聽置之初豹引漳水溉鄴以富魏之河内而韓聞秦之好興事欲罷之無令東伐息秦滅韓之計也罷讀曰疲令其疲勞不能出兵廼使水工鄭國間說秦間音居蒐切其下亦同令鑿涇水自中山西邸瓠口為渠中讀曰仲即今九嵏之東仲山也邸至也並北山東注雒三百餘里並音步浪切雒中即馮翊漆沮水欲以溉田中作而覺中作謂用功中道事未竟也秦欲殺鄭國曰臣為間然渠成亦秦之利也臣為韓延數歲之命而為秦建萬世之功秦以為然卒使就渠渠成而用溉注填閼之水溉舄鹵之地四萬餘頃收皆畆一鍾注引也閼讀與淤同音於據切填閼謂壅泥也言引淤濁之水灌鹹鹵之田更令肥美故一畆之收至六斛四斗於是關中為沃野無㐫年秦以富强卒并諸侯因名曰鄭國渠史起事襄王王與羣臣飲酒王為羣臣祝曰令吾臣皆如西門豹之為人臣也史起進曰魏氏之行田也以百畆賦田之法一夫百畆也鄴獨二百畆是惡田也漳水在其旁西門豹不知用是不智也知而不興是不仁也仁智豹未之盡何足法也於是以史起為鄴令遂引漳水溉鄴以富魏之河内民歌之曰鄴有賢令兮為史公决漳水兮灌鄴旁終古舄鹵兮生稻梁趙惠文王二十四年趙徙漳水武平西漢文帝時河决酸棗東潰金隄潰横决也金隄名也在東郡白馬界於是東郡大興卒塞之武帝元光中河决於瓠子東南注鉅野通於淮泗帝使汲黯鄭當時興人徒塞之輙復壊是時武安侯田蚡為丞相其奉邑食鄃鄃居河北奉音捧用切鄃音輸清河之縣也河决而南則鄃無水災邑收入多蚡言於帝曰江河之决皆天事未易以人力强塞之未必應天而望氣用數者亦以為然是以久不復塞也武帝紀又載元光三年五月河水决濮陽汜郡十六年發卒十萬救决河起龍淵宫汜音敷劍切鄭當時為大司農言異時關東漕粟從渭上異時往時也度六月罷計度其功六月而後可罷也度音大各切而渭水道九百餘里時有難處引渭穿渠起長安旁南山下至河三百餘里徑易漕度可令三月罷罷而渠下民田萬餘頃又可得以溉此損漕省卒而益肥闗中之地得榖帝以為然令齊人水工徐伯表巡行穿渠之處而表記之今之竪標是發卒數萬人穿漕渠三歲而通以漕大便利其後漕稍多而渠下之民頗得以溉矣武帝紀又載元光六年春穿漕渠通渭畨係為河東守姓畨名係也畨音普安切言漕從山東西歲百餘萬石謂從山東運漕而西入關也更底柱之艱敗亡甚多而煩費穿渠引汾溉皮氏汾隂下引河溉汾隂蒲坂下引汾水可用溉皮氏及汾隂以下而引河水可用溉汾隂及蒲坂以下地也度可得五千頃故盡河堧而棄地謂河岸以下縁河邉地素不耕墾者也堧音而縁切民茭牧其中矣茭亂草也謂收茭草及牧畜産於其中茭音交今溉田之溉而種之度可得榖二百萬石以上榖從渭上與關中無異雖從自闗中而來於渭水運上皆可致之故曰與闗中收榖無異而底柱之東可無復漕帝以為然發卒數萬人作渠田數歲河移徙渠不利田者不能償種言所收之直不足償糧之費也久之河東渠田廢予越人令少府以為稍入時越人有徙者以田與之其租稅入少府也越人習於水田又新至未冇業故與之也稍漸也其入未多故謂之稍也張湯為御史大夫時有人上書欲通褒斜道及漕褒斜二谷名事下御史湯湯問之言抵蜀從故道多阪回逺抵至也故道屬武都有蠻夷故曰道即今鳯州界也囘音胡為切今穿褒斜道少阪近四百里而褒水通沔沔斜通渭皆可以行船漕漕從南陽上沔入褒褒絶水至斜間百餘里以車騎從斜下渭如此漢中榖可致而山東從沔無限便於底柱之漕且褒斜材木竹箭之饒擬於巴蜀帝以為然拜湯子印為漢中守發數萬人作褒斜道五百餘里道果便近而水多湍石不可漕嚴熊言臨晉民願穿雒以溉重泉以東萬餘頃故惡地臨晉重泉皆馮翊之縣也洛即漆沮水誠即得水可令畆十石於是為發卒萬人穿渠自徴引雒水至商顔下徴在馮翊商顔山名也徵音懲也今所謂澄城也商山之顔者譬人之顔額也亦猶山領象人之頸領岸善摧洛水岸善摧也乃鑿井深者四十餘丈往往為井井下相通行水水潰以絶商顔下流曰潰東至山領十餘里間井渠之往自此始穿得龍骨故名曰龍首渠作之十餘歲渠頗通猶未得其饒兒寛為左内史武帝元鼎六年寛奏請穿鑿六輔渠在鄭國渠之裏今尚謂之輔渠亦曰六渠也以益溉鄭國傍髙卬之田田素不得鄭國之溉灌者也卬謂上向也讀曰仰帝曰農天下之本也泉流灌寢所以育五榖也寢古浸字左右内史地名山川原甚衆細民未知其利故為通溝瀆蓄陂澤所以備旱也今内史稻田租挈重不與郡同租挈收田租之約令也郡謂四方諸郡也挈音若計切其議減令吏民勉農盡地利平繇行水勿使失時平繇者均齊渠堰之力役謂俱得水利也繇讀曰徭元封元年武帝既封禪巡祭山川自河决瓠子後二十餘歲歲因數不登而梁楚之地尤甚其明年乾封少雨乾音干帝乃使汲仁郭昌發卒數萬人塞瓠子决河於是帝以用事萬里沙則還自臨决河湛白馬玉璧湛讀曰沉沉馬及璧以禮水神也令羣臣從官自將軍以下皆負薪寘决河寘音大千切是時東郡燒草以故薪柴少而下淇園之竹以為揵淇園衞之苑也樹竹塞水决口稍稍布挿安淇之水稍弱以草塞其裏乃以土填石故謂之揵音其偃切帝既臨决河悼功之不成廼作歌曰瓠子决兮將奈何浩浩洋洋兮慮殫為河殫盡也殫為河兮地不得寧功無己時兮吾山平鑿山以填河也已止也言用功多不可畢止也吾山平兮鉅野溢瓠子决灌鉅野澤使溢也魚弗鬱兮柏冬日鉅野滿溢則衆魚弗鬱憂不樂也水長湧溢穢濁不清故魚不樂又迫於冬日將甚苦也柏讀與迫同弗音佛正道弛兮離常流言河道皆弛壊蛟龍騁兮放逺游歸舊川兮神哉沛水還舊道則羣害消除神祐滂沛也沛音普大切不封禪兮安知外言不因巡狩封禪而出則不知關外有此水皇謂河公兮何不仁皇武帝也河公河伯也泛濫不止兮愁吾人齧桑浮兮淮泗滿齧桑邑名為水所浮漂久不反兮水維緩水維水之網維也一曰河湯湯兮激潺湲歌有二章曰河湯湯以下是其一故云一也潺湲激流也湯音傷潺音士連切湲音于權切北度囘兮迅流難迅疾也搴長茭兮湛美玉搴取也茭草也音交一曰茭竿也取長竿樹之用著石間以塞决河也竹􅓗絙謂之茭也所以引置玉石搴收也絙索也湛美玉者以祭河也茭字宜從竹搴音騫茭音交湛讀曰沈絙音王登切河公許兮薪不屬草燒故薪不足也沈玉禮神見許祐福但以薪不屬逮故無功也屬音之欲切薪不屬兮衞人罪陳郡本衞地故言此衞人之罪也燒蕭條兮噫乎何以御水燒草皆盡故野蕭條然也噫乎歎辭也噫音於期切隤林竹兮揵石甾隤林竹者即上所說下淇園之竹以為揵也石甾者謂重石立之然後以土就填塞也甾亦重取音側其切義與種同宣防塞兮萬福來於是卒塞瓠子築宫其上名曰宣防而道河北行二渠復禹舊迹而梁楚之地復寧無水災自是之後用事者爭言水利朔方西河河西酒泉皆引河及川谷以溉田而關中靈軹成國湋渠盩厔有靈軹渠武帝穿左扶風有成國渠在陳倉首受渭東北至上林入蒙龍渠湋音韋水出韋谷引諸川汝南九江引淮東海引鉅定鉅定澤名也泰山下引汶水皆穿渠為溉田各萬餘頃它川渠及陂山通道者不可勝言太始二年趙中大夫白公白姓也此時無公爵也葢相呼尊老之稱也復奏穿渠引涇水首起谷口尾入櫟陽谷口即今雲陽縣治谷是注渭中袤二百里袤長也音茂溉田四千五百餘頃因名曰白渠民得其饒歌之曰田於何所池陽谷口鄭國在前白渠起後鄭國興於秦時故云前舉臿為雲决渠為雨涇水一石其泥數斗且溉且糞長我黍禾水停淤泥可以當糞衣食京師億萬之口言此兩渠饒也延年齊人也史不得其姓時武帝方事匈奴興功利言便宜者甚衆延年上書言河出崑崙經中國注渤海是其地勢西北髙而東南下也可按圖書觀地形令水工准髙下開大河上領上領山頭也出之胡中東注之海如此關中長無水災北邊不憂匈奴可以省隄防備塞士卒轉輸胡寇侵盜覆軍殺將暴骨原野之患天下不常備匈奴而不憂百越者以其水絶壤斷也此功一成萬世大利書奏帝壯之報曰延年計議甚深然河廼大禹之所道也聖人作事為萬世功通於神明恐難更改自塞宣房後河復北决於館陶分為屯氏河屯音大門切而隋室分拆州縣誤以為屯氏河乃置屯州謬之甚矣東北經魏郡清河信都渤海入海廣深與大河等故因其自然不隄塞也此開通後館陶東北四五郡雖時小被水害而兖州以南六郡無水憂宣帝地節中光禄大夫郭昌使行河北曲三所水流之勢皆邪直貝丘縣直當也恐水盛隄防不能禁廼各穿渠直東經東郡界中不令北曲渠通利百姓安之元帝永光五年河决清河靈鳴犢口清河之靈縣鳴犢河口也屯氏河絶成帝初清河都尉馮浚奏言郡承河下流與兖州東郡分水為界城郭所居尤卑下土壤輕脆易傾所以濶無大害者以屯氏河通兩川分流也今屯氏河塞靈鳴犢口又益不利獨一川兼受數河之任雖髙增隄防終不能泄如有霖雨旬日不霽必盈溢靈鳴犢口在清河東界所在處下雖能通利猶不能為魏郡清河減損水害禹非不愛民力以地形有埶故穿九河今既滅難明屯氏河不流行七十餘年新絶未久其處易浚浚謂治道之令其深也又其口所居髙於一分流殺水力道里便宜可復浚以助大河泄暴水備非常又地節時郭昌穿直渠後三歲河水更從故第二曲間北河六里復南合今其曲勢復邪直貝丘百姓寒心宜復穿渠東行不豫修治北决病四五郡南决病十餘郡然後憂之晩矣事下丞相御史白博士許商治尚書善為筭能度功用白白於天子也度音大各切遣行視行音下更切以為屯氏河盈溢所為方用度不足言國家少財役可且勿浚後三歲河果决於館陶及東郡金堤泛濫兖豫入平原牛乘濟南凡灌四郡三十三縣水居地十五萬餘頃深者三丈壊敗官亭室廬且四萬所御史大夫尹忠對方畧疏濶帝切責之忠自殺遣大司農非調大司農名非調也調均錢榖河决所灌之郡令其調發均平錢榖遭水之使存給也調音徒釣切謁者二人發河南以東漕船五百艘一船為一艘音先勞切其字宜從木徙民避水居邱陵九萬七千餘口河隄使者王延世使塞命其為使而塞河也延世字長叔犍為資中人以竹落長四丈大九圍盛以小石兩船夾載而下之三十六日河隄成帝曰東郡河决漂流二州校尉延世隄防三旬立塞其以五年為河平元年卒治河者為著外繇六月以卒治河有勞雖執役日近皆得比繇戌六月也著謂著於簿籍也著音竹取切下云非受平賈為著外繇其義亦同也惟延世長於計䇿功費約省用功日寡朕甚嘉之其以延世為光禄大夫秩中二千石賜爵闗内侯黄金百斤後二歲河復决平原流入濟南千乘所壊敗者半建始時復遣王延世治之杜欽說大將軍王鳳以為前河决丞相史楊焉言延世受焉術以塞之蔽不肯見今獨任延世見前塞之易恐其慮害不深又審如焉言延世之功反不如焉且水勢各異不博議利害而任一人如使不及令冬成來春桃華水盛必羡溢有填淤反壤之害月令仲春之月始雨水桃始華葢桃方華時既有雨水川河氷泮衆流猥集波瀾盛長故謂之桃華水耳又云三月桃華水反壤者水塞不通故令其土壤反還也羡音戈繕切淤音於庶切如此數郡種不得下種五榖之子也民人流散盜賊將生雖重誅延世無益於事宜遣焉及將作大匠許商諫大夫乘馬延年雜作乘馬姓也乘音食登切延世與焉必相破壊深論便宜以相難極壊毁也音怪極窮也商延年皆明計筭能商功利商度也足以分别是非擇其善而從之必有成功鳳如欽言白遣焉等作治六月乃成復賜延世黄金百斤治河卒非受平賈者為著外繇六月平賈以錢取人作卒顧其時庸之平賈也賈音價鴻嘉四年楊焉言從河上下患底柱隘可鐫廣之鐫謂琢鑿之也帝從其言使焉鐫之鐫之裁沒水中不能去而令水益湍怒為害甚於是故歲渤海清河信都河水湓溢灌縣邑三十一湓踊也音普頓切敗官亭民舍四萬餘所河隄都尉許商與丞相史孫禁共行視圖方畧圖謀也行音下更切禁以為今河溢之害數倍於前决平原時令可决平原金隄間開通大河令入故篤馬河在平原縣至海五百餘里水道浚利又乾三郡水地得美田且二十餘萬頃足以償所開傷民田廬處又省吏卒治防救水歲三萬人以止許商以為古說九河之名有徒駭胡蘇鬲津今見在城平東光鬲界中此九河之三也徒駭在城平胡蘇在東光鬲津在鬲城東光屬渤海鬲屬平原徒駭者禹治成河用功極衆故人徒驚駭也胡蘇下流急疾之貌鬲津言其隘小可鬲以為津而渡也鬲與槅同自鬲以北至徒駭間相去二百餘里今河雖數移徙不離此域孫禁所欲開者在九河南篤馬河水之迹處執平夷旱則淤絶水則為敗不可許公卿皆從商言先是谷永以河為中國之經瀆經常也聖王興則出圖書王道廢則竭絶今潰溢横流漂沒陵阜異之大者也修政以應之災變自除是時李尋解光亦言隂氣盛則水為之長故一日之間晝減夜增江河滿溢所謂水不潤下雖常於卑下之地猶日月變見於朔望天道有因而作也衆庶見王延世蒙重賞競言便巧不可用議者嘗欲求索九河故迹而穿之今因其自决可且勿塞以觀水勢河欲居之當稍自成川跳出沙土然後順天心而圖之必有成功而用財力寡於是遂止不塞滿昌師丹等數言百姓可哀帝數遣使者處業振贍之處業謂安處之使得其居業哀帝初平當為鉅鹿太守以經明禹貢使行河為騎都尉領河隄奏言九河今皆填滅按經義治水有决河深川决分泄也深浚治也而無隄防雍塞之文雍讀曰壅河從魏郡以東北多溢决水迹難以分明四海之衆不可誣宜博求能浚川疏河者下丞相孔光明大司空何武奏請部刺史三輔三河𢎞農太守舉民吏能者莫有應書待詔賈讓奏言治河有上中下三策古者立國居民疆理土地必遺川澤之分度水勢所不及遺流也度計也言川澤水所流震之處皆度而治之不以為居邑而妄墾殖必計水所不及然後居而田之也分音扶問切度音大各切大川無防小水得入陂障卑下以為汙澤停水曰汙音一胡切使秋水得有所休息左右游波寛緩而不迫夫土有川猶人之有口也治土而防其川猶止兒啼而塞其口豈不遽止然其死可立而待也故曰善為川者决之使道道讀曰導導引也善為民者宣之使言蓋隄防之作近起戰國壅防百川各以自利齊與趙魏以河為境趙魏瀕山齊地卑下瀕山猶言以山為邊界也瀕音頻又音賓作隄去河二十五里河水東抵齊隄則西泛趙魏趙魏亦為隄去河二十五里雖非其正水尚有所遊盪時至而去則填淤肥美民耕之田或久無害稍築室宅遂成聚落水時至漂沒則更起隄防以自救稍去其城郭排水澤而居之湛溺自其宜也今隄防陿者去水數百步逺者數里近黎陽南故大金隄從河西西北行至西山南頭乃折東與山相屬之欲切民居金堤東為廬舍住十餘歲更起隄從東山南頭直南與故大堤㑹又内黄界中有澤方數十里環之有隄往十餘歲太守賦民以隄中之地給與民民今起廬舍其中此臣親所見者也東郡白馬故大隄亦復數重民皆居其間從黎陽北盡魏界故大隄去河逺者數十里内亦數重此皆前世所排也河從内黄北至黎陽為石隄激使東抵東平剛激者聚石於隄旁衝要之處所以激去其水也工歴切又為石隄使西北抵黎陽觀下觀縣名也音工喚切又為石隄使東北抵東郡津北又為石隄使西北抵魏郡昭陽又為石隄激使東北百餘里間河再西三東迫阨如此不得安息今行上䇿徙冀州之民當水衝者决黎陽遮害亭放河使北入海河西薄太山東薄金隄勢不能逺泛濫朞月自定難者將曰若如此敗壊城郭廬舍冡墓以數萬百姓怨恨昔大禹治水山陵當路者毁之故鑿龍門闢伊闕辟同折底柱破碭石墮斷天地之性此乃人功所造何足言也今瀕河十郡治隄歲費且一萬萬及其大决所殘無數如出數年治河之費以業所徙之民遵古聖之法定山川之位使神人各處其所而不相奸奸音干且以大漢方制萬里豈其與水爭咫尺之地哉此功一立河安民安千載無患故謂之上䇿若廼多穿漕渠於冀州地使民得以溉田分殺水怒雖非聖人法然亦救敗術也難者將曰河水髙於平地歲增隄防猶尚决溢不可以開渠臣竊按視遮害亭西十八里至淇水口乃有金隄髙一丈自是東地稍下隄髙至遮害亭髙四五丈往五六歲河水大盛増丈七尺壊黎陽南郭門入至隄下謂水從郭門南入北門出而至隄也水未踰隄二尺所從隄上北望河髙出民屋百姓皆走上山水流十三日隄潰吏民塞之臣循隄上視水勢南七十餘里至淇口水適至隄半計出地上五尺所今可從淇口以東為石隄多張水門初元中遮害亭下河去隄足數十步至今四十餘歲適至隄足由是言之其地堅矣恐議者疑河大川難禁制滎陽漕渠足以下之今礫谿口是也言作門通水流不為害也礫峪即水經所云涕水東過礫谿其水門但用木與土耳今據堅地作石隄勢必完安冀州渠首盡當卬此水門治渠非穿地也卬音仰但為東方一隄北行三百餘里入漳水中其西因山足髙地諸渠皆往往股引取之股支别也旱則開東方下水門溉兾州水則開西方髙門分河流通渠有三利不通有三害民常罷於救水半失作業罷讀曰疲此一害也水行地上湊潤上徹民則病溼氣木皆立枯鹵不生榖此二害也决溢有敗為魚鱉食此三害也若有渠溉則鹽鹵下濕填淤加肥此一利也故種禾麥更為秔稻髙田五倍下田十倍秔謂稻之不粘者也音庚此二利也轉漕舟船之便此三利也今瀕河隄吏卒郡數千人代買薪石之費歲數千萬足以通渠成水門又民利其灌溉相率治渠雖勞不罷罷讀曰疲民田適治河隄亦成富國安民興利除害支數百歲故謂之中䇿若廼繕完故隄增卑倍薄勞費無已數逢其害此最下䇿也召信臣為南陽太守行視郡中水泉開通渠瀆起水門隄閼凡數十處閼所以壅水音一曷切以廣灌溉歲歲増加多至三萬頃民得其利畜積有餘信臣為民作水約束刻石立於田畔以防紛爭關並平陵人為長水校尉並字子陽材智通達王莽三年河决魏郡泛清河以東數郡先是王莽恐河决為元城冡墓害及决東去元城不憂水故遂不隄塞莽時徵能治河者以百數其大畧異者並言河决率常於平原東郡左右其地形下而土疏惡聞禹治水時本空北地以為水猥盛則放溢猥多也少稍自索索盡也音先各切雖時易處猶不能離此上古難識近察秦漢以來河决曹衞之域其南北不過百八十里者可空此地勿以為官亭民室而已大司馬使長安張戎字仲功習溉灌事也言水性就下行疾則自刮除成空而稍深河水重濁號為一石水而六斗泥今西方諸郡以至京師東行民皆引河渭山川溉田春夏乾燥少水時也故使河流遲貯淤而稍淺雨多水暴至則溢决而國家數隄塞之稍益髙於平地猶築垣而居水也可各順從其性毋復灌溉則百川流行水道自利無溢决之害矣御史臨淮韓牧字子台善水事以為可畧於禹貢九河處穿之縱不能為九但為四五宜有益大司空掾王璜言河入渤海地髙於韓牧所欲穿處往者天嘗連雨東北風海水溢西南出浸數百里九河之曲已為海所漸矣漸進也禹之行河水本隨西山東北北去周普云定王五年河徙則今所行非禹之所穿也又秦攻魏决河灌其都决處遂大不可復補宜卻徙完平處更開空空猶穿也使縁西山足乘髙地而東北入海廼無水災沛郡桓譚為司徒掾典其議為甄豐言凡此數者必有一是宜詳考驗皆可豫見計定然後舉事費不過億萬亦可以事諸浮食無産業民事謂役使也空居與行役同當依縣官而為之作廼兩便言無産業之人端居無為及發行力役俱須衣食耳今縣官給其衣食而使修治河水具為公私兩便也可以上繼禹功下除民疾王莽時但崇空語無施行者又按地理志云南滎陽有浪蕩渠首受泲東南至入須過郡西行七百八十里陳留郡封邱有濮渠首受泲東北至都闗入羊里水過郡三行三􅔣三十里春秋傳敗狄于長丘今翟渠是常山郡蒲吾有大白渠㑹嵇郡句章渠水東入海張掖郡鑠得縣有千金渠西入澤羌谷鑠音鹿後漢光武建武初漢王梁為河南尹梁穿渠引谷水注洛陽城下東瀉鞏川及渠成而水不流七年有司劾奏之梁慚懼上書乞骸骨乃下詔以梁為濟南太守張純為大司空建武二十四年請穿陽渠引雒水為漕百姓得其利明帝永平十二年四月遣將作謁者王吳修汴渠自滎陽至於千乘海口汴渠即浪蕩渠也汴自滎陽首受河所謂石門在滎陽山北二里過汴以東磧石為隄亦號金隄成帝陽嘉中作十五年四月汴渠成辛巳行幸滎陽巡行河渠乙酉詔曰自汴渠决敗六十餘歲加頃年以來雨水不時汴流東侵日月益甚水門故處皆在河中渀瀁廣溢莫測崖岸蕩蕩極望不知綱紀今兖豫之人多被水患乃曰縣官不先人急好興他役又或以為河流入汴幽冀蒙利故曰左隄强則右隄傷左右俱强則下方傷宜任水勢所之使人隨髙而處公家息壅塞之費百姓無陷溺之患議者不同南北異論朕不知所從久而不决今既築隄理渠絶水立門河汴分流復其舊迹陶丘之北漸就壤墳故薦嘉玉潔牲以禮河神東過雒汭歎禹之績今五土之宜反其正色濱渠下田賦與貧民無令豪右得因其利庶繼世宗瓠子之作王景者沉深多伎藝辟司空伏恭府有薦景能理水者顯宗詔與諸作謁者王吳共修作浚儀渠吳用景馮流法水乃不復為害初平帝時河汴决壊未及得修建武十年楊武令張汜上書河决積久日月侵毁濟渠所漂數十許縣修理之費其功不難宜改修隄防以安百姓書奏光武即為發卒方營河功而浚儀令樂俊上言昔元光之間人庶熾盛縁隄墾殖而瓠子河决尚二十餘年不即壅塞今居家稀少田地饒廣雖未修理其患猶可且新被兵革方興役力勞怨既多民不堪命宜須平靜更議其事光武得此遂止後汴渠東侵日月彌廣而水門故處皆在河中兖豫百姓怨歎以為縣官常興他役不先民急永平十二年議修汴渠乃引見景問以理水形便景陳其利害應對敏給帝善之又以嘗修浚儀渠功業有成乃賜景山海經河渠書禹貢圖及錢帛衣物遂發卒十萬遣景與王吳修渠築隄自滎陽東至千乘海口千餘里景乃商度地勢鑿山阜破砥績直截溝澗防遏衝要疏决壅塞十里立一水門令更相洄注無復潰漏之患景雖簡省役費然猶以百億計明年夏渠成帝親自巡行詔濱河郡國置河隄員史如西京舊制成帝時河决大壊汎濫青徐兖豫四州畧徧乃以校尉王延世領河隄謁者秩十石或名其官為䕶都水使者中興以三輔掾屬為之景由是知王吳及諸從事掾史皆增秩一等景三遷為侍御史十五年從駕東巡狩至無鹽帝美其功績拜河隄謁者賜車馬縑錢二千和帝永元十年春三月壬戌詔曰隄防溝渠所以順助地理通利壅塞今廢慢懈弛不以為負刺史二千石其隨宜疏導勿因縁妄發以為煩擾將顯行其罰安帝元初二年正月修理西門豹所分漳水為支渠以溉民田西門豹為鄴令發人鑿十二渠引水灌田所鑿之渠在今相州鄴縣西臣欽若等按漢書溝洫志史起云漳水在其旁西門豹不知用是不智也此云豹分漳水為支渠未詳孰是二月辛酉詔三輔河内河東上黨趙國太原各修理舊渠通利水道以溉公私田疇三年春正月甲戌修理太原舊溝渠溉灌官私田昔智伯遏晉水以灌晉陽後踵其遺跡蓄以為沼分為二𣲖北溝即智氏故渠也其溝乘東北入晉陽城以溉灌東南出城注於汾水所修溝渠即謂此靈帝熹平四年六月遣守官令之鹽監穿渠為民興利今蒲州安邑縣西南有鹽城監也獻帝建安七年正月曹公至浚儀治睢陽渠十一年八月三郡烏丸數入塞為害曹公將征之鑿渠自呼浥入𣲖水𣲖音𤓰名平虜渠從泃河口泃音句鑿入潞河名泉州渠以通海十八年九月鑿渠引漳水入白溝以通河魏文帝黄初六年通討虜渠臣欽若等曰史不書月明帝青龍元年司馬宣王開成國渠自陳倉至槐里築臨晉峽引汧洛溉舄鹵之地三千餘頃國以充實焉正始初宣王又奏穿廣漕渠引河入汴溉東南諸陂大佃於淮北復以滅賊之要在於積榖乃大興屯守廣開淮陽百尺二渠又修諸陂於頴之南北京師農官屯兵連屬焉鄧艾傳又載宣王督諸軍伐吳將諸葛恪焚其積聚恪棄城遁走宣王因欲廣田積榖為兼併之計乃使鄧艾行陳頴以東至夀春地艾以為田良水少不足以盡地利宜開河以引水澆灌大積軍糧以通漕運之道乃著濟河論以喻其指遂北臨淮水自鍾離而南横石以西盡泚水四百餘里五里一營營六十人且佃且守兼修廣淮陽百尺二渠上引河流下通淮頴大治諸陂於頴南頴北穿渠三百餘里溉田二萬頃淮南淮北皆相連接自夀春到京師農官兵屯雞犬之聲阡陌相屬每東南有事大軍出征汎舟而下達於江淮資食有儲而無水害艾所建也臣欽若等曰開渠史不書月賈逵為豫州南與吳接修守戰之具堨汝水造新陂又通運渠二百餘里所謂賈侯渠者也吳景帝永安三年三月用都尉嚴密議作浦里塘薛瑩為選曹尚書領太子少傅時何定建議鑿聖谿以通江淮後王令瑩督萬人往遂以多盤石難施功罷晉武帝泰始十年光禄勲夏侯和上修新渠富夀遊陂三渠凡溉田千五百頃臣欽若等曰史不書月孔愉為㑹稽内史章句縣有漢時舊陂毁廢數百年愉自巡行修復故堰溉田二百餘頃皆成良業毛穆之為桓温太尉參軍加冠軍將軍温伐慕容暐使穆之監鑿鉅野百餘里引汶水㑹於濟川前秦苻堅以關中水旱不時議依鄭白故事發其王侯已下及豪望富室僮𨽻三萬人開涇水上源鑿山起隄通渠引瀆以溉舄鹵之田及春而成百姓賴其利宋世祖鎮襄陽以劉秀之為襄陽令襄陽有六門堰良田數千畆堰久壊公私廢業世祖遣秀之修復壅陪繇是大豐南齊沈瑀為揚州部傳從事刺史始安王遥光令瑀専治獄事湖熟縣方山埭髙峻冬月公私行旅以為艱難明帝使瑀行治之瑀乃開四洪斷行客就作三日立辦揚州書佐私行詐稱州使不肯就作瑀鞭之三十書佐歸訴遥光遥光曰沈瑀必不枉鞭汝覆之果有詐明帝復使沈瑀築赤山塘所費減材官所量數十萬帝益善之梁髙祖天監四年二月遣衞尉楊公則率宿衞兵塞洛口十三年作浮山堰王欽若等曰史不書月普通六年五月築宿預堰又修曹公堰於濟陰大通二年二月築寒山堰冊府元龜卷四百九十六
