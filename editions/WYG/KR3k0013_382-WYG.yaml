body:
  text: 册府元龜卷三百八十二宋王欽若等撰將帥部褒異第八北齊庫狄干初為後魏雲中刺史後從神武起兵破四胡於韓陵封廣平縣公堯䧺後魏孝莊時為宣威將軍從叱列延討劉靈助平之拜鎭東將軍燕州刺史封平城縣伯食邑五百户高昻後魏廢帝時為使持節冀州刺史隨神武討爾朱兆大敗之尋拜侍中開府進爵為侯食邑七百户高季式東魏孝靜時為侍中都督從河清公岳破蕭明於寒山敗侯景於渦陽除衛尉卿復為都督從清河公攻王思政於潁川抜之以前後功加儀同三司文宣天保初封乗氏縣子庫狄盛為伏波將軍每從神武征討以功封行唐縣伯累遷特進卒贈使持節都督朔瀛趙幽安五州諸軍事太尉朔州刺史薛孤延為征虜將軍永固侯𨽻神武為都督從破爾朱兆於廣阿因從平鄴以功進爵為公累遷恒州刺史從破周軍於邙山進爵為縣公封千户又從討破山胡西攻玉壁入為左衛將軍改封平秦郡公韓軌為鎭城都督從神武破爾朱兆於廣阿封平昌縣侯仍督中軍從破爾朱兆於赤谼嶺再遷秦州刺史頻以軍功進封安德郡公後拜大司馬從文宣征蠕蠕在軍暴薨贈假黄鉞太宰太師高市貴為晉州刺史從神武破紇豆陵於并州有功除驃騎大將軍儀同三司封常山郡公邑一千五百户又隨大都督婁昭討平樊子鵠除西兖州刺史潘樂初隨後魏爾朱榮為别將討元顥以功封敷城縣男神武出牧晉州引樂為鎭城都將從破爾朱兆於廣阿進爵廣宗縣伯累以軍功拜雍州刺史段榮為鎭北將軍定州刺史時神武攻鄴未尅榮轉輸軍資無闕神武入雒論功封姑臧縣侯邑八百户轉瀛州刺史後除山東大行臺大都督及卒贈使持節定冀滄瀛四州諸軍事定州刺史太尉尚書左僕射堯傑為給事中羽林監從神武破紇豆陵步藩有功除鎭東將軍封樂城縣伯邑百户出為滄州刺史又從神武平鄴及破爾朱兆進爵為都督隨樊子鵠討元樹平之除南兖州刺史蔡儁為平逺將軍帳内别將從神武破葛榮除諫議大夫又從平元顥封烏雒縣男尉長命為安南將軍樊子鵠據兖州反除東南道大都督與諸軍討平之轉鎭范陽城就拜幽州刺史督安平二州事王懐為大都督從神武討爾朱兆於廣阿破之除安北將軍蔚州刺史莫多婁貸文為武賁中郎將虞侯大都督從神武擊爾朱兆於廣阿有功加前將軍封石城縣子邑三百户又從破四胡於韓陵進爵為侯後除晉州刺史汾州胡賊為冦竊高祖往討焉以貸文為前鋒毎有戰功還賚奴婢三十人牛馬各五十布一千疋仍為汾陜東雍晉秦五州大都督可朱渾元為車騎大將軍討西魏儀同金祚皇甫智逹於東雍擒之遷幷州刺史又與諸將征伐數有尅捷降下天保初封扶風郡王頻從文宣討山胡茹茹累有戰功累遷太師薨贈假黄鉞太宰録尚書劉豐為汾州刺史與諸將征討平定冦亂又從神武破周文於河隂豐功居多神武執其手嗟賞之入為左衛將軍破六韓常為撫軍與諸將征討又從神武擊諸冦累遷車騎大將軍開府封平陽公除洛州刺史金祚為車騎將軍邙山之戰以大都督從神武破西軍除華州刺史文宣受禪加開府儀同三司别封臨濟縣子叱列平為武衛將軍隨爾朱榮破葛榮平元顥遷中軍都督右衛將軍封癭陶縣伯邑七百户後為東郡大行臺從神武平爾朱兆又從領軍婁昭討樊子鵠平之授使持節華州刺史步大汗薩為揚武將軍從爾朱榮討平葛榮累功加鎭南將軍堯奮為中堅將軍安夷縣子從神武平鄴破爾朱兆等進爵為伯出為南汾州刺史破西魏行臺薛崇禮衆轉驃騎將軍左光禄大夫潁州刺史卒贈兖豫梁三州諸軍事司空兖州刺史張保雒為奉事都尉𨽻神武為都督從討步蕃又為帳内從討爾朱兆於廣阿遷右將軍中散大夫又從圍鄴城既抜除平南將軍光禄大夫從破爾朱兆等於韓陵因隨神武入雒加安東將軍封平昌縣薄家城鄉男邑一百户封延之神武以為大行臺左光禄大夫以都督從婁昭討樊子鵠事平除青州刺史李景遺為龍驤將軍力戰爾朱兆有功除使持節大都督左將軍進爵昌平郡公増邑三百盧勇行雒州事時官軍圍廣州數旬未抜勇率騎擒西魏儀同程華降廣州守將雒超神武以勇行廣州事授儀同三司揚州刺史卒贈司空贈物之外别賜布絹四千疋斛律金後魏孝莊時為寧朔將軍屯騎校尉從破葛榮元顥頻有戰功加鎭南大將軍神武南攻鄴留金守信都别討李脩破之加右光禄大夫㑹神武於鄴仍從平晉陽追滅爾朱兆以金為汾州刺史大都督進爵為侯及周文帝入雒陽神武使金統劉豐步大汗薩等步騎數萬守河陽城以拒之神武到仍從破宻軍還除大司馬改封石城郡公邑一千户轉第一領民酋長文襄時為肆州刺史西魏九曲戍將馬紹隆據險要鬬金破之以功别封安平縣男文宣受禪封咸陽郡王刺史如故天保元年冬朝晉陽宫金病帝幸其宅臨視賜以醫藥中使不絶病愈還州三年就除太師帝征奚賊金亦從行軍還帝幸肆州與金宴射而去四年解州以太師還晉陽車駕復幸其第六宫及諸王盡從置酒作樂極夜方罷遷左丞相又詔金朝見聽乗步挽車至階武成登極禮遇彌重及卒武成舉哀西堂後主又舉哀於晉陽宫賜假黄鉞使持節都督朔定冀幷瀛青齊滄幽肆晉汾十二州諸軍事相國太尉公録尚書朔州刺史宋顯為神武行臺右丞樊子鵠據兖州反前西兖州刺史乙瑗等屯據五梁以應子鵠神武以顯行西兖州事率衆討破之拜西兖州刺史慕容紹宗為西南道軍司討破宜陽叛民李延孫軍還行揚州刺史尋行豫州刺史時西魏將獨孤如願據雒州神武命紹宗率兵赴武牢平之進爵為公薛循義為衛將軍行晉州事西魏儀同長孫子彦圍逼城下循義開門伏甲以待於是遁去神武嘉之就拜晉州刺史南汾東雍陜四州行臺賞帛千疋後為衛尉卿時山胡侵亂晉州遣循義追討破之進爵正平郡公加開府綦連猛為征虜將軍中散大夫東魏孝靜元象元年從神武向河陽與周文帝戰於邙山二年除平東將軍中散大夫其年又轉中外府帳内都督賞邙山之功封廣興開國公文宣天保九年除都督東秦州刺史隨斛律敦北征茹茹大破之賚帛三百段杜弼為衛尉卿㑹梁遣湞陽侯蕭淵明等入冦彭城大都督高岳行臺慕容紹宗率軍討之詔弼為軍司攝行臺左丞臨發文襄賜胡馬一匹語弼曰此廐中第二馬孤常自乗騎今方逺别聊以為賜庫狄迴雒後魏莊帝時為别將從神武破四胡於韓陵以軍功補都督加後將軍大中大夫封順陽縣子邑四百户遷左廂都督征山胡先鋒斬級除朔州刺史破周文於河陽轉授夏州刺史邙山之役力戰有功増邑通前七百户文襄嗣事從平潁川文宣天保初除建州刺史元景安為都督領親信都督邙山之役力戰有功賜爵西華縣都鄉男天保三年加征西將軍從破庫莫奚於代州轉領左右大都督四年從討契丹於黄龍領北平太守後頻從駕再破茹茹遷武衛大將軍又轉領左右大將軍兼七兵尚書獨孤永業為行臺尚書時周人逼雒毎為先鋒以寡敵衆周人憚之加儀同三司賞賜甚厚暴顯為衛大將軍文宣時與高岳南臨漢水攻下梁西楚州師還加開府儀同三司賞帛五百疋盧潛孝昭時為揚州道行臺左丞時陳秦雍二州刺史王奉國合州刺史周令珍前後入冦潛輒破平之以功加散騎常侍食彭城郡轉遷合州刺史段韶自神武建義初領親信都督攻劉誕於鄴及韓之戰韶督率所部先鋒䧟陣尋從神武出晉陽追爾朱兆於赤谼嶺平之以軍功封下洛縣男又從襲取夏州擒斛律彌娥突加龍驤將軍諫議大夫神武為西魏將賀抜勝軍所逼韶引弓反射斃其前驅西魏軍退賜馬幷金進爵為公及文襄還鄴韶留守晉陽文襄還賜女樂十數人金十斤繒帛稱是封長樂郡公文宣天保中梁將東方白額潛至宿豫招誘邉民殺害長吏淮泗擾動詔韶討之江淮帖然文宣嘉其功詔賞吴口七十人封平原郡王武成大寧二年除幷州刺史高歸彦作亂冀州詔韶與東安王婁叡率衆討平之遷太傅賜女樂十人幷歸彦果園一千畝是年十二月周文帝遣將率羗夷與突厥合衆逼晉陽韶戰大破之武成嘉其功别封懐州武德郡公進位太師後主武平二年二月周師來冦遣韶與右丞相斛律光太尉蘭陵王長恭同往捍禦軍還以功别封樂陵郡公竟以疾薨帝舉哀東堂賜物千段温明祕器輼輬車軍校之士陳衛送至平恩墓所發卒起冢贈假黄鉞使持節都督朔幷定趙冀滄齊兖梁雒晉建十二州諸軍事相國太尉録尚書事朔州刺史慕容儼後魏孝明時為河間王元琛左廂軍主率衆救壽春以功賜帛五十疋累遷安東將軍高梁太守轉五城太守東雍州刺史沙苑之敗西魏荆州刺史郭鸞率衆攻儼拒守二百餘日晝夜力戰大破鸞軍追斬三百餘級又擒西魏荆州刺史郭他時諸州多有翻䧟唯儼獲全進號鎭南將軍又從神武攻玉壁賜帛七百疋并衣帽等文宣天保初為開府儀同三司鎭郢州城大破梁軍除趙州刺史進爵為公賜帛一千疋錢十萬至孝昭皇建初别封成陽郡公後主天統四年又别封猗氏縣公并賜金銀酒鍾各一枚胡馬一匹皮景和後主武平中為領軍將軍陳將吴明徹圍夀陽勅令景和與賀抜伏恩等赴救景和以尉破胡軍始䘮敗怯愞而不敢進頓兵淮口頻有勅使催促然始渡淮屬壽陽已䧟狼狽北還器械軍資大致遺失陳將蕭摩訶率步騎於淮北倉陵城截之景和得士卒整旅逆戰摩訶退歸是時拒吴明徹者多致傾覆唯景和全軍而還繇是獲賞除尚書令别封西河郡開國公賜錢二十萬酒米十車斛律光為左衛將軍天保三年從文宣出塞光先驅破敵還除晉州刺史九年又率衆取周絳州白馬澮文翼城等四戍除朔州刺史武成河清三年冬周遣其柱國大司馬尉遲迥等冦洛陽光率騎五萬擊敗之文成幸洛陽䇿勲班賞遷太尉又封冠軍縣公後主武平二年光大破周柱國韋孝寛等軍於平隴封中山郡公増邑千户周長孫澄為征東將軍從太祖戰邙山進位驃騎大將軍開府孝閔踐阼拜大將軍封義門公為玉壁總管卒自䘮初至及𦵏明帝三臨之典祀中大夫宇文容諫曰君臨臣䘮自有節制今乘輿屢降恐乖禮典帝不從侯莫陳順為衛尉卿從太祖征討拜大都督西魏東討順與太尉王盟僕射周惠達等留鎭長安時趙青雀反盟及惠達等奉魏太子出次渭北順於渭橋與賊戰頻破之賊不敢出魏文帝還執順手曰河橋之戰卿有殊力便解所服金鏤玉帶賜之李弼為秦州刺史從太祖平竇泰先鋒䧟敵太祖以所乘騅馬賜之及泰所著牟甲亦賜之又從平𢎞農與齊神武戰於沙苑大破之以功拜特進爵趙郡公于謹為闗内大都督從太祖征潼關破廻雒城授北雍州刺史進爵藍田縣公後為柱國大將軍率衆出討江陵太祖餞於青泥谷及立梁宣帝振旅而還太祖親至其第宴語極歡賞謹奴婢一千口及梁寶物并金石絲竹樂一部趙貴為車騎大將軍從太祖復𢎞農戰沙苑拜侍中驃騎大將軍開府又從戰河橋及援玉壁又從戰邙山拜柱國大將軍獨孤信後魏孝文時為武衛將軍孝武西遷單騎及之於瀍澗孝武嘆曰武衛遂能辭父母捐妻子逺來從我世亂識忠良豈虚言哉即賜御馬一匹進爵浮陽郡公時荆州雖䧟東魏人猶戀本朝乃以信兼尚書右僕射東南道行臺荆州刺史以招懐之信遂大破東魏將又破諸蠻三荆遂定就拜車騎大將軍侯莫陳崇為驃騎大將軍開府從擒竇泰復𢎞農破沙苑從戰河橋崇功多進位柱國若干惠為中堅將軍從賀抜岳西征定隴右惠每力戰有功累遷征西將軍魏孝武西遷除右衛將軍從擒竇泰復𢎞農破沙苑惠每先登䧟陣加開府進爵長樂郡公又從太祖戰邙山太祖壯之遷司空怡峯為征虜將軍從太祖平隴右破竇泰復𢎞農破沙苑又與諸將征討毎皆尅捷威名大振累遷車騎大將軍開府夏州刺史劉亮以都督從賀抜岳西征常先鋒䧟陣以功拜大都督及太祖置十二軍簡諸將以將之亮領一軍每征討為騎將以迎魏武功遷左大都督從擒竇泰復𢎞農與沙苑之役並力戰有功遷車騎大將軍開府封長廣郡公亮以勇敢見知為當時名將兼屢陳謀䇿多合機宜太祖謂曰卿文武兼資即孤之孔明也出為東雍州刺史卒於州䘮還京文帝親臨之泣而謂人曰股肱䘮矣腹心何寄令鴻臚卿監䕶䘮事追贈太尉豆盧寧為别將封河陽縣伯常從太祖征討又與諸將破平諸冦累遷大司冦進封楚國公邑萬户楊忠為征西將軍河橋之役忠力戰守橋敵人不得進邙山之戰又先登䧟陣除侍中驃騎大將軍開府王盟為積射將軍隨賀抜岳為先鋒擒万俟醜奴平秦隴常先登力戰拜征西將軍平秦郡守太祖討侯莫陳悦以盟為留後大都督鎭高平悦平除原州刺史趙青雀之亂以節度闗中諸軍出頓渭北事平進爵長樂郡公増邑並前二千户賀蘭祥為都督從平侯莫陳悦又迎魏孝武以前後功封撫夷縣伯邑五百户仍從撃潼闗獲東魏將薛長儒又攻迴雒城抜之還拜左右直長進爵為公増邑並前一千三百户西魏文帝大統三年又從于謹攻楊氏壁祥先登克之遷右衛將軍加持節征虜將軍沙苑之役詔祥留衛京師後以留守功贈邑八百戸尋除鎭西大將軍四年文帝東伐祥以領軍從戰河橋以功加使持節大都督八年遷車騎大將軍儀同三司散騎常侍九年從太祖與東魏戰於邙山進位驃騎大將軍開府儀同三司加侍中尉遲綱西魏文帝時為殿中將軍大統元年授帳内都督討曹泥破之又從破竇泰以功封廣宗縣伯邑五百户仍從復𢎞農克河北郡戰沙苑皆有功河橋之戰綱與李穆等從太祖力戰以前後功増邑八百户進爵為公仍拜平逺將軍步兵校尉叱列伏龜後魏孝明時為别將從長孫稚西征以戰功累遷征西將軍金紫光禄大夫後還雒授都督後從太祖征討亟有戰功西魏文帝大統八年出為北雍州刺史加大都督尋進位驃騎大將軍儀同三司散騎常侍閻慶為中堅將軍奉車都尉河橋之役以功拜前將軍大中大夫遷後將軍封安次縣子邑四百户及邙山之戰先登䧟陣拜撫軍將軍大都督進爵為伯増邑五百户達奚武為東秦州刺史齊神武趣沙苑太祖遣武覘之具知敵之情狀以告太祖太祖深嘉焉遂破之進爵高陽公拜車騎大將軍太祖援洛陽武力戰斬其司徒高敖曹遷侍中驃騎大將軍開府後遷上柱國王謙為柱國大將軍討吐谷渾力戰有功是時高祖東征謙又力戰進上柱國益州總管蔡祐為都督從太祖討侯莫陳悦破之又從迎西魏孝武於潼闗以前後功封萇鄉縣伯邑五百户魏文帝大統初加寧朔將軍羽林監尋持節員外散騎常侍進爵為侯増邑一千一百户從太祖擒竇泰復𢎞農戰沙苑皆有功授平東將軍大中大夫魏恭帝二年為兵部中大夫江陵初附諸蠻騷動詔祐與大將軍豆盧寧討平之三年拜大將軍給後部皷吹以前後功増邑並前四千户常善為龍驤將軍從太祖平侯莫陳悦除天水郡守魏孝武西遷授武衛將軍進爵武始縣伯増邑二百户魏文帝大統初加平東將軍進爵為侯擒竇泰復𢎞農破沙苑累有戰功除使持節衛將軍假驃騎大將軍秦州刺史四年從戰河橋加大都督進爵為公除涇州刺史屬茹茹入冦抄掠北邉善率所部破之拜車騎大將軍儀同三司辛威為羽林監從太祖迎魏孝武因攻迴雒城功居最魏文帝大統元年拜寧逺將軍増邑二百户累遷通直散騎常侍進爵為侯増邑三百户從擒竇泰復𢎞農戰沙苑並先鋒䧟敵勇冠一時以前功授撫軍將軍銀青光禄大夫從于謹破襄城又從獨孤信入雒陽經河橋陣加持節進爵為公増邑八百户李賢為宣威將軍時賀抜岳為侯莫陳悦所害太祖西征賢與其弟逺穆等密應侯莫陳崇以功授都督仍守原州及大將軍至秦州悦棄城走太祖以賢為前驅轉戰悦自剄於陣太祖嘉之賞奴婢布帛及雜畜等授持節撫軍大將軍都督魏孝武西遷太祖令賢率騎士迎衛時山東人衆多欲逃歸帝乃令賢以精騎三百為殿衆皆憚之莫敢亡叛封下邽縣公邑一千户俄授左都督安東將軍還鎭原州西魏文帝大統三年州民豆盧狼害都督大野樹兒等據州城反賢一戰而敗之遷原州刺史尋行原州事四年莫折後熾連結賊黨所在冦掠賊大敗師還以功賞奴婢四十口雜畜數百頭八年授原州刺史十二年隨獨孤信征凉州平之又撫慰張掖等五郡而還俄而茹茹圍逼州城賢追撃捕獲不可勝計人得安堵加授使持節車騎大將軍儀同三司遷驃騎大將軍開府儀同三司太祖之奉魏太子西廵也至原州遂幸賢第讓齒而坐行鄉飲酒禮焉其後太祖又至原州令賢乘輅備儀服以諸侯㑹遇禮相見然後幸賢第歡宴終日凡是親族頒賜有差李逺為征東大將軍從征竇泰復𢎞農並有殊勲授都督原州刺史沙苑之役逺功居多除車騎大將軍儀同三司進爵陽平郡公邑三千户赫連達為都將從太祖平侯莫陳悦加平東將軍仍賜馬二百匹魏孝武入闗褒叙勲義以達首迎元帥匡復秦隴進爵魏昌縣伯邑五百户又破曹泥除鎭南將軍金紫光禄大夫加通直散騎常侍増邑并前一千户從復𢎞農戰沙苑皆有功又増邑八百户除白水郡守轉帥都督加持節除濟州刺史以達勲望兼隆乃除雲州刺史即本州也進爵為公拜大都督韓果為宣威將軍從太祖討平侯莫陳悦遷都督賜爵邯鄲縣男西魏孝武入闗進封石城縣伯邑五百户文帝大統初進爵為公増邑通前一千户加通直散騎常侍從太祖襲竇泰於潼闗太祖依其規畫軍以勝返賞眞珠金帶一􅆎帛二百疋授征虜將軍又從復𢎞農攻抜河南城獲守一人論功為最破沙苑戰河橋並有功授撫軍將軍銀青光禄大夫増邑九百户厙狄昌為衛將軍右光祿大夫從太祖迎後魏孝武復潼闗封長樂縣子邑八百户西魏文帝大統初進爵為公増邑一千户從破竇泰授車騎將軍左光祿大夫又從復𢎞農戰沙苑皆先登䧟陣太祖嘉之授帥都督四年從戰河橋除冀州刺史後與于謹破胡賊劉平伏於上郡授馮翊郡守乆之轉河北郡守十三年録前後功授大都督通直散騎常侍又從隋公楊忠破蠻賊田社清昌功為最増邑三百户拜儀同三司田𢎞為都督從太祖復𢎞農戰沙苑解洛陽圍破河橋陣𢎞功居多累䝉殊賞尋授原州刺史太祖在同州文武並集乃謂之曰人人如𢎞盡心天下豈不早定即授車騎大將軍儀同三司武帝天和中為大將軍抜宜陽等九城以功増邑五百户進位柱國大將軍尉遲迥初為西魏文帝帳内都督從太祖復𢎞農破沙苑皆有功累遷尚書左僕射兼領軍將軍後拜大將軍時梁元帝弟紀在蜀稱帝迥伐破之詔迥為大都督益潼等十八州諸軍事益州刺史以平蜀功遣大鴻臚郊勞仍賜衮冕服孝閔踐祚進位柱國大將軍以迥有平蜀之功同霍去病冠軍之義封寧蜀公爵邑萬户梁椿為都督從太祖平侯莫陳悦拜衛將軍右光祿大夫西魏文帝大統初進爵欒城縣伯増邑五百户出為隴東郡守尋進爵為公遷梁州刺史從復𢎞農破沙苑與獨孤信入雒從宇文貴破東魏將堯雄等累有戰功授車騎大將軍儀同三司大都督從戰河橋進爵東平郡公増邑一千户俄遷侍中驃騎大將軍開府儀同三司又從于謹討稽胡劉平伏椿擒其别帥劉持塞又從獨孤信討岷州羗梁企定破之除渭州刺史又從李弼赴潁川與侯景攻䧟韓鎭以功増邑四百户梁臺為趙平郡守與太僕石猛破兩山屠各増邑一百户轉平凉郡守與刺史史寧破莫折後熾復與于謹破劉平伏録前後勲授潁州刺史累遷驃騎大將軍孝明帝時從賀蘭祥征洮陽先登有功别封綏安縣侯邑一千户王勇為奉車都尉數從侯莫陳悦賀抜岳征討功居多拜别將太祖引為帳内直盪都督加後將軍從擒竇泰復𢎞農戰沙苑所當必破太祖嘆其勇敢賞賜特隆進爵為公邑一千五百戸拜鎭南將軍授帥都督從討趙青雀以平之論功居最除衛大將軍殷州刺史加通直散騎常侍兼太子武衛率邙山之戰勇及王文達耿令貴三人力戰皆有殊勲太祖於是賞帛二千疋令自分之軍還皆拜上州刺史後進侍中驃騎大將軍從柱國趙貴征茹茹破之進爵新陽郡公増邑通前二千户宇文虬為征虜將軍從獨孤信在荆州破梁兵於下溠以功加安西將軍銀青光祿大夫員外直閣將軍閣内都督封安南縣侯邑九百户及魏孝武西遷為獨孤信帳内都督破田八能及擒東魏荆州刺史辛纂虬功居多尋隨信奔梁魏文帝大統三年歸闕論前後功増邑四百户進爵為公擒竇泰復𢎞農及沙苑河橋之戰皆有功増邑八百户進車騎將軍左光祿大夫七年除漢陽郡守又從獨孤信討梁企定破之十二年出為南秦州刺史加車騎大將軍儀同三司進驃騎大將軍開府儀同三司追論斬辛纂功増邑一千户賀若敦為驃騎大將軍時岷蜀初開巴西人譙淹據南梁與梁西江州刺史共為表裏扇動羣蠻太祖令敦率軍討破之進爵武都公増邑通前一千七百户權景宣為平西將軍祠部郎中從太祖抜𢎞農破沙苑皆先登䧟陣轉外兵郎中及東魏將王元凱入雒景宣與延孫等擊走之以功授大行臺左丞進屯宜陽攻襄城抜之太祖嘉之徵入朝録前後功封顯親縣男邑三百户王傑為太祖都督復潼闗破沙苑爭河橋戰邙山皆以勇敢聞親待日隆賞賜加於倫等除岐州刺史加撫軍將軍銀青光祿大夫進爵為公邑八百户宇文深為尚書直事郎中從太祖戰河橋别監李弼軍討白額稽胡並有戰功進爵為侯史寧為賀抜勝大都督率步騎一萬攻梁下溠戍破之封武平縣伯邑五百户乆之遷車騎將軍行涇州事討破賊帥莫折後熾轉通直散騎常侍後為凉甘𤓰三州諸軍事及討茹茹每戰破之前後獲數萬人進爵安政郡公及吐谷渾通使于齊寧擊獲之就拜大將軍寧遣使詣太祖請事太祖即以所服冠履衣被及弓箭甲矟等賜寧陸騰為車騎大將軍與安康賊黄衆寳戰大破之軍還拜龍州刺史後為隆州總管討信州蠻蜑前後破平諸賊凡賞得奴婢八百口馬牛稱是宇文盛為威烈將軍兼都督從太祖擒竇泰復𢎞農破沙苑授都督平逺將軍步兵校尉進爵為公増邑八百户復遷驃騎大將軍開府儀同三司鹽州刺史及楚公趙貴謀為亂盛密赴京告之貴誅授大將軍進爵忠誠郡公除涇州都督賜甲一領奴婢二百口馬五百匹牛羊及賍田什物等稱是耿豪一名令貴為征虜將軍從太祖擒竇泰復𢎞農豪先鋒陷陣加前將軍中散大夫沙苑之戰豪殺傷甚多血染甲裳盡赤太祖見之嘆曰令貴武猛所向無前於是進爵為公増邑通前一千五百户除鎭北將軍金紫光祿大夫南郢州刺史又從太祖戰邙山當前者死傷相繼太祖嘉之拜北雍州刺史論前後戰功進授車騎大將軍儀同三司増邑通前一千八百户進位侍中驃騎大將軍開府儀同三司及卒太祖痛惜之贈以本官加朔州刺史高琳魏孝明正光初起家衛府都督從元天穆討邢杲破梁將沈慶之以功轉統軍又從爾朱天光破万俟醜奴論功為最除寧朔將軍奉車都尉魏孝文西遷從入闗至溱水為齊神武所追拒戰有功封鉅野縣子邑三百户進爵為侯増邑四百户轉龍驤將軍頃之遷平西將軍加通直散騎常侍從太祖破齊神武於沙苑轉安西將軍進爵為公增邑八百户累遷衛將軍又從擒莫多婁貸文仍戰河橋琳先驅奮撃勇冠諸軍太祖嘉之曰即我之韓白也拜太子左庶子尋以本官鎭玉壁復從太祖戰邙山除正平郡守加大都督増邑三百户又擊退齊將東方老老使人勸琳東歸琳斬其使以聞進使持節車騎大將軍儀同三司散騎常侍除鄜州刺史加驃騎大將軍開府儀同三司侍中孝閔帝踐祚進爵犍為郡公邑一千户世宗武成初從賀蘭祥征吐谷渾除延州刺史後遷江陵總管抗陳將吴明徹退之詔琳入朝親加勞問進授大將軍仍副衛公直鎭襄州進位柱國及薨贈本官加冀定滄齊等州諸軍事冀州刺史李和初為賀抜岳帳内都督以破諸賊功稍遷征北將軍金紫光祿大夫賜爵思陽公伊婁穆字奴干初為太祖内親信授奉朝請邙山之役力戰有功拜子都督丞相府參軍事累遷撫軍將軍大都督通直散騎常侍常入白事太祖望見悦之字之曰奴干作儀同面見我矣於是拜車騎大將軍儀同三司賜封安陽縣伯邑五百户孝閔時累遷金州刺史民部中大夫衛公直出鎭襄州以穆為長史郢州城民王道􅇧等反穆討平之進位大將軍入為小司馬從柱國李穆平軹闗等城賞布帛三百疋粟三百石田三十頃楊紹為輔國將軍從燕國公于謹圍江陵紹鬬於枇杷門流矢中股而力戰不衰事平賞奴婢一百口進驃騎大將軍王雅為都督從太祖擒竇泰於潼闗沙苑之戰所向披靡太祖壯之又從戰邙山諸將皆引退雅獨迴騎拒之敵衆稍却雅乃還軍録前後功進爵為伯達奚實為大行臺郎中從太祖擒竇泰復𢎞農破沙苑皆力戰有功増邑三百户加車騎將軍左光祿大夫劉雄為驃騎大將軍力戰齊將段孝先於長城西軍還遷軍司馬進爵為周昌侯邑一千四百户侯植為驃騎將軍從太祖破沙苑戰河橋進大都督加左光祿大夫凉州刺史宇文仲和據州作逆植從開府獨孤信討擒之拜車騎大將軍儀同三司封肥城縣公邑一千户又從于謹平江陵進驃騎大將軍開府儀同三司賜奴婢一百口竇熾初為撫軍將軍從魏孝武西遷仍與其兄善至城下與武衛將軍高金龍戰於千秋門敗之因入宫城取御馬四十匹並鞍勒進之行所帝大悦賜熾及善駿馬各二匹駑馬各十匹又加衛將軍從擒竇泰復𢎞農破沙苑皆有功増邑八百户又從太保李弼討白額稽胡破之除車騎將軍竇毅為符璽郎從擒竇泰復𢎞農戰沙苑皆有功拜右將軍大中大夫進爵為侯邑一千户李穆為都督河橋之戰免太祖於難擢授武衛大將軍加大都督車騎大將軍儀同三司進爵武安郡公邑一千七百户前後賞賜不可勝計乆之太祖美其忠節乃嘆曰人之所貴唯身命耳李穆遂能輕身命之重濟孤於難雖復加之以爵位賞之以玉帛未足為報也乃特賜鐵券恕以十死進驃騎大將軍開府儀同三司侍中初穆授太祖以驄馬及後中廐有此色馬者悉以賜之韋孝寛為大都督齊神武傾山東之衆志圖西入以玉壁衝要先命攻之孝寛捍退神武智力俱困遂殂魏文帝嘉孝寛功令殿中尚書長孫紹逺左丞王悦至玉壁勞問授驃騎大將軍開府儀同三司進爵建忠郡公魏恭帝元年以大將軍與燕國公于謹伐江陵平之以功封穰縣公還拜尚書右僕射元定為襄威將軍從太祖討侯莫陳悦以功拜平逺將軍步兵校尉從擊潼闗抜迴雒城進爵為伯増邑三百户加前將軍太中大夫從擒竇泰復𢎞農破沙苑戰河橋元定皆先鋒以前後功累遷都督征東將軍金紫光祿大夫増邑三百户邙山之戰元定殺傷甚衆論功為最賞賜甚厚楊􅋆為驃騎大將軍擊破東魏南綘郡虜其郡守屈僧珍録前後功封郃陽縣伯邑五百户邙山之戰抗禦魏將侯景太祖嘉之賜帛三百疋李遷哲為車騎大將軍從開府賀若敦討直洋􅇭三州叛賊平之又克巴州及鹿城軍還太祖嘉之以所服紫袍玉帶及所乘馬以賜之並賜奴婢三十口加授侍中驃騎大將軍開府儀同三司除直州刺史即本州也仍給軍儀皷節陽雄為積射將軍從于謹攻盤豆柵復從李逺經沙苑陣並力戰有功封安平縣侯加冠軍將軍中散大夫賞賜甚厚復入雒陽戰河橋解玉壁圍迎高仲密援侯景並預有戰功前後増邑四百五十户世襲邑陽郡守從大將軍宇文虬攻克上津遷通直散騎常侍都督進儀同三司册府元龜卷三百八十二
