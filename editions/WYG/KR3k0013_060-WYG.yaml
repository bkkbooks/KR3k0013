  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_060-1a}
body:
  text: 册府元龜卷六十宋王欽若等撰帝王部立制度聖人體國經野設官分職制作法度綱紀生民三代以還詳於典禮兩漢而降布在簡編故有制爵禄以懋功庸定車服以辨名數設闗梁之禁以譏乎姦立符契之規以謹乎信著休息之令以休息官司定䘮紀之宜以正雅俗酌民情而為之節縁世變而為之文時被大中建兹彛憲上得其道下知其方尊國庇民何莫繇此於戱傳云名不正則言不順言不順則事不成又曰作法於凉其弊猶貪然則王者之立制也誠宜慎其名而慮其弊焉漢髙祖五年五月詔曰七大夫公乗以上皆髙爵也七大夫公大夫之爵七故謂之七大夫公乗第八爵也諸侯子及從軍歸者甚多髙爵吾數詔吏先與田宅及所當求於吏者亟與亟急也爵或人君上所尊禮爵高有國邑者則自君其人故云或人君也上謂天子久立吏前曽不為决有辨訟及陳情者不早决斷甚無謂也異日秦民爵公大夫以上令丞與亢禮亢者當也言高下相當無所屈今吾於爵非輕也吏獨安取此於何取此輕爵之法且法以有功勞行田宅行猶付與也今小吏未嘗從軍者多滿多自滿足也而有功者顧不得顧反也若人反顧然背公立私守尉長吏教訓甚不善守郡守也尉都尉也長吏謂縣之長令也其令諸吏善遇高爵稱吾邑稱猶副也且㢘問有不如吾詔者以重論之八年三月令公爵非公乗以上毋得冠劉氏冠賈人毋得衣錦繡綺縠絺紵罽操兵乗騎馬賈人坐販賣者綺文繒也即今之細綾也絺細葛也紵織紵為布及紋也罽織毛若今褐及氍毹之類也操持也兵凡兵器也乗駕車也騎單騎也十一年詔諸侯王得自除内史以下漢獨為置丞相文帝二年九月初與郡守為銅虎符竹使符謂各分其半右留京師左以與之十月詔曰朕聞古者諸侯建國千餘各守其地以時入貢民不勞苦上下驩欣靡有違德今列侯多居長安邑逺所食之地去長安逺吏卒給輸費苦而列侯亦無由教訓其民其令列侯之國為吏及詔所止者遣太子為吏謂為卿大夫者詔所止時以恩愛見留十一年三月除闗無用𫝊景帝中六年五月詔曰夫吏者民之師也車馬衣服宜稱稱其官也吏六百石以上皆長吏也長大也六百石位大夫亡度者或不吏服出入閭里與民亡異令長吏二千石車朱兩轓㨿許慎李登説轓車之蔽也左傳云以藩載欒盈即是有鄣蔽之車也千石至六百石朱左轓車騎從者不稱其官衣服下吏出入閭巷亡吏體者二千石上其官屬三輔舉不如法令者謂主爵中尉及左右内史皆上丞相御史請之先是吏多軍功車服尚輕故為設禁武帝征和二年初置城門屯兵更節加黄旄以戾太子發節以戰故加其上黄以别之元帝初元五年冬從官給事宫司馬中者得為大父母父母兄弟通籍司馬中者宫内門也籍者為二尺竹牒計其年紀名字物色縣之宫門案省相應乃得入也從官親近天子嘗侍從者皆是哀帝綏和二年四月即位六月詔除任子令博士弟子父母死子寧三年平帝元始三年夏安漢公奏車服制度吏民飬生送終嫁娶奴婢田宅噐械之品後漢光武初伏波將軍馬援上書曰臣所假伏波將軍印書伏字犬外嚮城臯令印臯字為白下羊丞印四下羊尉印白下人人下羊即一縣長吏印文不同恐天下不正者多符印以為信也所宜齊同薦曉古文字者事下大司空正郡國印章奏可建武中杜詩為南陽太守初禁網尚簡但以璽書發兵未有虎符之信詩上疏曰臣聞兵者國之凶器聖人所慎舊制發兵皆以虎符其餘徴調竹使而已符䇿合㑹取為大信所以明著國命歛持威重也間者發兵但用璽書或以教令如有姦人詐偽無由知覺愚以為軍旅尚興賊虜未殄徴兵郡國宜有重慎可立虎符以絶姦端昔魏之公子威傾隣國猶假兵符以觧趙圍若無如姫之仇則其功不顯事有煩而不可省費而不得已葢謂此也書奏從之和帝元年六月己酉初令伏閉盡日漢官舊儀曰伏日萬鬼行故盡日閉不干它事安帝元初三年初聽大臣二千石刺史行三年䘮文帝遺詔以日易月於後大臣遂以為常至此復遵古制也建光元年復斷大臣二千石以上服三年䘮桓帝永興二年二月初聼刺史二千石行三年䘮服永夀二年春正月初聼中官得行三年服中官常侍以下魏明帝以公卿黼黻衮衣之飾擬於至尊多所减損始制天子服刺繡文公卿服織成文及帝受命遵而無改晉武帝泰始三年初令二千石得終三年䘮太康四年制依漢故事給九卿朝車駕四及安車各一乗七年始制大臣聼終䘮三年先是鄭黙拜大鴻臚遭母䘮舊制既葬還職黙遂自陳懇至久而見許遂改法定令聼大臣終䘮自黙始也後魏明帝永興三年詔侍臣常帶劒孝文延興二年五月詔軍警給璽印𫝊符次給馬印太和十年四月始制五等公服十七年九月詔厮養之户不得與士民婚有文武之才積勞應進者同庶族例聼之十八年十二月革衣服之制十九年九月丁亥詔曰諸有舊墓銘記見存昭然為人所知者三公及位從公者去墓三十歩尚書令僕九列十五歩黄門五校十歩各不聴墾植二十年二月壬寅詔自非金革聼終三年䘮宣帝景明四年閏九月禁大司馬門不得車馬出入孝明孝昌元年十一月辛亥詔曰大孝榮親著之昔典故安平耄耋諸子滿朝臣欽若等曰晉安平王孚年九十三有九子自今諸有父母年八十以上者聼居官禄養温凊朝夕孝荘建義元年五月詔以舊叙軍勲不過征虜自今以後依前式以上餘階積而為品其從輿駕北來之徒不在此例悉不聼破品受階破階請帛後周武帝保定四年三月初令百官執笏建徳二年六月詔諸軍符旗皆畫以猛虎鷙鳥之象三年正月初服短衣四年四月初令上書者並為表於皇太子以下稱啓六年九月初令民庶以上唯聼衣綢綿絲布絹綾紗絹綃葛布等九種餘悉停斷朝祭之服不拘此例宣政元年三月初服常冠以皂紗為之加簮而不施纓遵其制若今之折角巾也隋髙祖開皇三年五月改傳國璽曰受命璽四年四月乙亥勅總管刺史父母及子年十五以上不得將之官九年四月頒木魚符於總管刺史雌一雄一十年十月頒木魚符於官五品以上十五年五月制京官五品以上佩銅魚符七月制九品已上官以理去職者聼並執笏十六年六月辛丑詔九品以上妻五品以上妾夫亡不得改嫁十七年頒銅虎符於驃騎車騎府煬帝大業五年二月庚子制魏周官不得為䕃六月壬戌制父母聽随之官六年詔從駕歩逺者文武官等皆戎衣貴賤異等雜用五色五品以上通著紫袍六品以上兼用緋緑胥吏以青庶人以白屠商以皂士卒以黄唐髙祖初為唐王頒銀莵符於諸郡武德元年九月改銀莵符為銅魚符二年二月詔文官遭父母䘮聽去職先是帝從容謂侍臣曰隋末以來多有叛逆從坐之罪所及便多人有子姓皆令外繼簿籍雖别居處猶同至有無其人妄為承嗣非直誣罔鬼神且亦棄同即異非朕興化之意也有如此軰即令正之尚書左丞崔善為進曰欲求忠臣必於孝子比為時多金革頗遵墨絰之義丁憂之士例從起服無識之軰衣冠以變無復戚容飲㑹之時燕啖自若如不紏劾恐傷風俗髙祖曰既奪其情安可責其卒禮七年四月詔遭父母䘮者聽終制太宗貞觀元年十一月己未制子弟年十九以下聽随父兄之官四年八月丙午詔曰車服以庸昔王令典貴賤有節禮經彛訓自末代澆浮采章訛雜卿士無髙卑之序兆庶行僣侈之儀遂使金玉珠璣靡隔於工賈錦繡綺縠下通於皂𨽻習俗為常流蕩亡反因循已久莫能懲革朕繼踵百王欽承寳運思𢎞典制垂範後昆永鑒前失義存釐改其冠冕制度已備令文至於尋常服飾未為差等今已詳定具如别式宜即頒下咸使聞知於是三品以上服紫四品以下服緋六品七品以緑八品九品以青婦人從其夫也八年四月帝初服翼善冠賜貴臣進徳冠因謂侍臣曰幞頭起周武帝葢取於軍容耳今海内無虞當息武事此冠頗採古法無類幞頭廼宜常服可與袴褶通用十一年二月丁巳詔曰佐命功臣義深舟檝或定謀帷幄或身摧行陣同濟艱危克承鴻業追念在昔何日忘之使逝者無知咸歸寂寞若營魂有識還如疇曩居止相望不亦善乎漢氏使將相陪陵又給以東園秘器篤終之義恩意深厚古人之志豈異我哉自今已後功臣宻戚外徳業尤著如有薨亡宜賜塋地一所及其秘器使其窀穸之時䘮事無闕所司依此營備稱朕意焉十月癸丑詔曰乾坤合德爰著易簡之功君臣一體克成中和之治逺取諸物若舟楫之濟巨川近取諸身猶股肱之載元首同心叶契存殁以之故諸侯列葬周文始其禮大臣陪陵魏武重申其制去病佐漢還奉茂陵之塋夷吾相齊終托牛山之墓兹葢往聖垂範前賢遺則録曩昔之宿心篤始終之大義者也皇運之初時逢交䘮掃除多難光啓鴻業謀臣武將競進轅門之前明德異才爭趨魏闕之下或雲雷伊始功參締搆或先華在旦績著弼諧及宻戚懿親舊齒宿徳委質先朝特蒙殊遇者自今已後身薨之日所司宜即以墓地並給東園秘器事從優厚庶敦追逺之義以申罔極之懐二十二年癸夘令百僚朔望袴褶以朝髙宗永徽二年四月開府儀同三司及京官文武職事四品五品並給随身魚三年二月帝以天下無虞百姓務簡每至旬暇百寮許不視事五年八月己未詔五品以上薨卒者随身魚不必追収顯慶元年四月制文武官人五品以上老及病不因罪觧者並聽同致仕例龍朔二年六月乙丑初令僧尼道士女冠等致敬父母咸亨三年五月始令京四品五品職事佩銀魚袋上元元年八月戊戌詔一品已下文官並帶手巾筭袋刀子磨石其武官欲帶手巾筭袋者亦聽文武官三品已上服紫金玉帶四品服深緋金帶五品服淺緋金帶六品服深緑七品服淺緑並銀帶八品服深青九品服淺青並鍮石帶庶人服黄銅鐵帶先是九品以上入朝參及視事聽兼服黄雒陽尉栁延夜行為部人所毆帝聞之以章服錯亂下詔申明之自此朝參行列一切不許著黄辛丑詔公私齋㑹及參集之處道士女冠在東僧尼在西不湏更為先後三年閏三月詔曰制勅施行既為永式比用白紙多有蟲蠧自今以後尚書省頒下諸司諸州及下縣宜並用黄紙其承制勅之司量為卷軸以備披簡中宗神龍二年八月制京官五品已上依舊式佩銀魚袋九月戊辰詔停京官六品已下著緋袴褶令各依本品為定景龍元年十月勅宫殿門皇城門京城門禁苑門左右内外各給交魚符一合廵魚符一合左廂給開門魚一合右廂給閉門魚一合左符付監門掌交畨廵察每夜並非時開閉則用之睿宗景雲二年四月制九品已上一品已下文武依上元故事帶手巾筭袋武官咸帶七事䩞鞢並足其腰帶一品已下五品已上並用金六品七品並用銀八品九品共用鍮石魚袋著紫者金袋著緋者銀袋𤣥宗先天二年三月癸巳詔制勅表狀書奏牋牒年月等數作一十二十三十四十字開元二年閏二月癸亥令道士女冠僧尼致拜父母三月癸夘詔曰章服所施貴賤攸别苟容僣越未為奬勸承前諸軍人多有借緋及魚袋者軍中卑品此色甚多無功賞借深非道理宜勅諸軍鎮但是從京借魚袋及無灼然功者軍中權借者並委州軍長官勅到並即収取待立功日據功合得即將已上者委軍將先借後奏其靈武和戎大武幽州鎮軍赤水河源瀚海安西定逺等軍既臨賊衝事籍懸賞量軍大小各封賞金魚袋五十枚並委軍將臨時行賞七月戊戌詔曰雕文刻鏤衣紈履絲習俗相誇殊塗競爽傷風敗俗為弊良久珠玉錦繡既令禁斷准式三品已上飾以玉四品已上飾以金五品以上飾以銀者宜於腰帶及御鐙酒杯杓依式自外悉鑄為鋌婦人衣服各随其夫子其已有錦繡衣服聽染為皂成段者官為市取天下更不得採取珠玉刻鏤器玩造作錦繡珠繩織成帖縚二色綾綺羅作龍鳯禽獸等異文字及堅􅏌錦文者决杖一百受僱工匠降一等科之兩京及諸州舊有官織錦坊悉停是月又詔京官所帶跨巾筭袋每朝參日著外官牙日著餘日停五年九月戊申詔曰君臣之間不當有隠敷納之事必在無私比年百司及諸使奏陳皆侍仗下頗乖公道湏有革正自今已後非灼然秘宻不合彰露者並令封狀奏如文書浩大事理交雜者仍進先狀其史官自依舊例六年七月庚申詔曰有司及奏事皆合對狀公言比日已來多仗下獨奏宜申明舊式誥語令知如縁曹吏司細務及有秘宻不合對仗奏者聽仗下奏十二年詔曰朱紫貴服所以分别班品自非有德有功不可輕為賞借自今已後諸軍節度大使灼然有知功勞湏權行給賞任量借色及魚袋仍具狀奏十三年詔有司試天下僧尼年六十已下者限落者退還俗不得以坐禪對策儀試諸寺三階院通入大院不得有異十七年八月戊辰詔曰僧尼數多踰濫不少先經磨勘欲令真偽區分仍慮猶有非違都遣括撿聞奏憑此造籍以為凖繩如聞所繇條例非愜致姦妄轉更滋生因即舉推罪者使衆宜依開元十六年舊籍為之更不湏造寫自今已後綱維大徳侍飬權𨽻不得輙于外取二十一年七月詔曰道教釋教其來一體都忘彼我不自貴髙近者道士女冠稱臣子之禮僧尼企踵勤誠請之儀以為佛初㓕度付囑國王猥當負荷願在宣布葢欲崇其教而先於朕者也自今已後僧尼一依道士女冠例無拜其父母宜増修戒行無違僧律興行至道俾在於此二十二年諸道採訪使華州刺史李尚隲等奏請各置印從之二十三年六月吏部尚書李暠奏曰伏見告身印與曹印文同形同參離難以區分望請准司勲兵部印文中加告身兩字許之二十四年二月壬戌許寒食通清明四日為假二十五年五月丙子詔曰緋紫之服班命所崇以賞有功不可踰濫如聞諸軍賞借人數甚多曽無甄别是何道理自今已後除灼然有戰功餘不得輙賞十一月丁亥御史大夫李適之奏曰臣伏以朝服准式皆合備具比來有稱慘故式致乖疎臣望自今已後每當正止及縁大禮應朝官并六品清官並服朱衣餘六品以下望許通著袴褶朔望日請依舊文武官朝集使並服袴褶如有慘故准式不合著朱衣袴褶者其日聽不入朝自餘應合著不著者請奪一月俸以懲不恪其蕃官望不在此限如情愿著者請聽餘望依今式許之天寳元年正月一日改元詔曰文宣垂訓事必正名而黄鉞古來以金為飾金者應五行之數有肅殺之威去金稱黄理或未當其黄鉞宜改為金鉞副威武之義焉三載九月詔曰頃叙功勞累増勲級上柱國外許及周親是謂賞延載榮宗族廻充賜物匪厚朝恩其准格上柱國外有餘勲廻授周親五載六月勅三伏内令宰相辰時還宅七月勅應縁玉璽及符璽既改為寶其璽書宜改為寳書秦有符璽令歴代遵之唐長夀中改為神璽𫝊國及六璽並為寳神龍初復為璽開元初又改為寳也六載六月詔曰立身揚名所以廣孝流根自葉亦在推恩既切因親之心湏開議事之制其内外文官五品已上官父祖無資䕃者其所用䕃宜同子孫用䕃之例五服之紀宜所致及三年之屬以報免懐齊斬之殊雖存出母之致顧復之慕何申有子之思其出嫁母宜終服三載又詔曰重門夜開以達陽氣羣司朝宴樂在時和屬此上元當修齋籙其於賞㑹必備葷羶比來因循稍將非便自今已後每至正月改取十七十八十九日夜開坊市門仍永為常式七載正月太常卿韋韜奏御案褥牀帷等望去紫用赤黄從之十載正月詔曰禮之王制垂範作程亦既觀徳訓人孝敬故天子七廟諸侯五廟大夫三廟士一廟孝享奉先禮文有辨令三品已上乃許立廟永言廣敬載感于懐其京官正員四品清望官及五品清官並許立私廟是載改傳國寳為承天大寳代宗寳應二年三月戊子有司奏中書門下五品官准式賜物並同四品及叙三品即不霑恩並御史中丞自今已後望許叙名從之廣徳二年二月戊午詔曰三年之䘮謂之達禮自非金革不可從權其文官自今已後並許終制一切不得輙有奏請大歴七年秋七月壬辰勅中元前一日後一日宜准舊例並休假十三年詔自今已後寒食通清明休假五日德宗貞元三年十月復降魚書停刺史務准令刺史停代皆降魚符合之然後受命自至德以來多不施行又郎將恬權代刺史悉禀其教令魚符廢及是漳州刺史坐事将鞫之有司復請降魚書停務從之求其書式不獲乃創魚書曰勑漳州縁刺史張愻冇犯令遣監察御史蘓弁往彼停務問推宜知四年正月乙夘詔曰常㕘官比來請假東都拜掃多廢曠職事任遣子弟以申情禮五年正月乙夘詔曰四序嘉辰歴代増置漢崇上已晉紀重陽或説禳除雖因舊俗與衆共樂誠洽當時朕以春方發生候及仲月勾萌畢逹天地和同俾其昭蘓宜助暢茂自今宜以二月一日為中和節以代正月晦日備三令節之數内外官司休假一日於是宰臣李泌奏中和節請令文武百僚以是日進農書司農獻穜稑之種王公戚里上春服士庶以刀尺相問遺村社作中和酒祭勾芒以祈年榖從之六年三月丙午加寒食假寧七日八月初造藍田渭橋等鎮遏使印凡二十三紐九月初収諸道進奏院官印三十紐悉碎之七年三月初賜節度觀察使新制時服尚方織作呈閲所宜帝曰頃來賜衣文綵不常非制也朕今思之節度使以鶻銜綬帶取武毅以靖封内觀察使以鴈銜儀委取其行列有序牧人有威儀也儀委瑞草也瑞應圗云王者愛人則瑞草生也十一月令常㕘官入閣不得奔走周親已下䘮朝會禁慘服俄又命服衣綾袍金玉帶初金吾将軍沈房有弟䘮衣慘服入閣帝問宰相董晉等對曰准式許周已下服縵不合衣淺色帝曰南班何得有之曰因循而然又問冠冕之制曰古之服冠冕者動有珮玉之響所以飾歩也夫至敬之地歩武有常不趨而奔致僵君前虧敬慎也在朝武士袍以綾五品已上帶服金玉取其文綵畫飾以奉上也是以禹惡衣服而致羙乎黻冕君親一致昔尚書郎含香老萊子綵服皆此義也服純縵非制也帝乃詔各從舊制八年五月初令授䑓省官者各具舉主於授官詔先是郎官缺左右丞舉之御史缺大夫中丞舉之詔書不具所舉及趙憬陸贄為相建議郎官不宜専于左右丞宜令尚書及左右丞侍郎各舉其可詔書著具所舉官名御史亦如之異日考殿最以觀舉主能否從之未幾皆不行閏十二月門下省奏郵驛條式應給紙劵除門下外諸使諸州不得給往還劵至所詣州府納之别給劵俾還其常㕘官在外除授及分付假寧往來並給劵從之十年二月詔曰君臣之際義莫重焉每聞薨殂深用惻悼宜厚哀榮之禮以申終始之恩文武朝臣有薨卒者自今已後其月俸料宜全給仍更准本官一月俸料以為贈若諸司三品以上官及尚書省四品官仍令有司舉舊令聞奏行弔祭之禮務從優備用稱朕懐初左庶子雷威以是月朔卒冇司以故事計其月俸以日數給之帝聞之故有是命以廣恩澤無幾有致仕官卒者有司以官雖致仕而朝朔望請悉同正官卒者給賻從之三月初置司封司勲考功甲庫印各一十一年二月置度支水運供軍印四月勅書賜南詔異牟尋及子閣勸清平官鄭回尹仇寛等各一書書左始列中書二官宣奉行復舊制也五月初鑄河東監軍之印監軍有印自此始也十三年七月宗正卿嗣呉王獻奏簡王府諮議㕘軍嗣寧王子溆塟請鹵簿宰臣等議以子溆官卑不合給特詔令給因下詔自令已後嗣王薨日宜令所司供鹵簿永為常式憲宗元和元年三月戊辰詔常㕘官寒食拜墓在京兆府界内者聽進止八月甲申御史臺奏新授常㕘官在城未上及在外未到假故等准令式職事官假故滿百日即合停觧其未上官等並無正文武或滿百日無憑舉奏請自今已後如有在城授官疾病未上者在外授官勑到後計水陸程外滿百日者並停觧從之三年二月詔朝官寒食拜掃及出城任假内外來不須奏聴進止四年三月塩鐡轉運使李㢲奏職兼兩使請各為一印許之五年四月庚寅御史中丞王播奏准故事御史到館驛已處上㕔中使後至即就别㕔如中使先至御史亦就别㕔近日多不遵守中使或不諳往例貴欲逾越御史若不守故事俱失憲章喧競道途深乖事體伏請各令遵奉故事兾其守分制可其諸司三品官及中書門下尚書省官或出銜制命或入赴闕庭諸道節度觀察使赴本道及朝覲并前節度觀察使勅追赴朝廷者亦准此先是監察御史元稹自東臺赴闕至敷水驛宿上㕔中官仇士良後至爭㕔門閉斫入詰詈稹稹襪而走㕔後士良隨以鞭擊稹傷面遂兼以他事坐貶官臺司因請定制焉六年十二月甲申詔立㦸官中大夫守京兆尹上柱國臨淄縣開國男賜紫金魚袋元義方朝議大夫守尚書户部侍郎判度支䕶軍賜紫金魚袋盧坦立㦸雖令式所著似有闕文而䑓閣相承久為定制盧坦元義方如有所見即令上聞造次而行殊乖審慎宜各罰一月俸料其㦸仍令所司収納左司郎中陸則勾簡之任發付不精禮部貟外郎崔備工部貟外郎元祐等或以禮許人或守官假器比於申請其過尤深各罰一季俸料縁兵興以來勲賞超越其所立㦸湏有明文宜令所司准舊制侍官階勲至三品然後申請仍編於格令永為常式近例立㦸者率有銀青階而義方獨據令上柱國官三品者十二㦸無以階叙㦸之文牒省司不能詣准式立㦸之後轉為四品官者自非貶授兼判勲階其㦸不奪既而盧坦以前任宣州刺史是三品兼䕶軍又請㦸立已列於門議者以坦居四品官狀原無據䑓司将劾而未舉吏部尚書鄭餘慶諳練舊章至自東都揚言于朝以為大不可䑓司因移牒詰禮部狀稱今文内只言勲官並不言階而自貞元以來立㦸一十八家並無銀青色下階者遂以上聞故皆坐罰而申之續放免陸則崔備元祐一月俸料甲申勅盧坦等所罰錢宜令部省収貯充省中修補已後别勅量罰並送都省貯每至歳終奏數其餘賘罰依前御史䑓収管七年十一月丁丑詔自今遇輟朝日中書門下宜同假日不湏入八年八月壬寅吏部奏請差定文武官告紙軸之物色五品已上用大花異文綾紙紫羅褾檀木軸六品以下朝官並内裝寫許與大花綾褾餘小花綾紙通用紫綾褾檀木軸命婦邑號許用色牋花素紙小花諸色錦褾紅牙軸其紅地獨窠金錦線花牋紅花牙撥鏤鈿軸等除恩賜請並禁斷從之九年十月戊辰以尚書左丞吕元膺為工部尚書充東都留守舊例命留守必賜旗甲與方鎮畧同及元膺受任竟無所賜朝論以東有冦虞時用元膺尢不當削以沮威望諫官上疏援華汝夀三州例賜戍械居守之重固宜寵賜帝曰此數處並不當與其後遂皆停十三年八月乙亥詔應同司官有大功已上親者但非連判及勾檢之官並官長則不在廽避改換之限况國朝故事不少勅令明文具存其官署同職異司雖父子兄弟亦無所嫌起今已後宜准天寳二年七月六日勅處分時刑部貟外郎楊嗣復以父於陵户部侍郎遂以近例避嫌請出省宰臣等舉令式奏請故有是勅十四年四月横海軍節度使烏重𦙍奏臣以河朔能抗拒朝命者其大畧可見所管刺史失其權與職分反使鎮將領事若刺史各得職分又有鎮兵則節度使雖有安禄山史思明之奸惡豈能㨿一州為反哉所以河朔六十年能不奉朝命者只以奪刺史權與縣令職守而自作威福臣所管徳棣景三州已舉公牒各還刺史職事應在州兵并令刺史収管從之丙寅詔諸道節度都團練防禦經畧等使所管支郡除本州軍使外别置鎮遏守捉兵馬者並令屬刺史如刺史帶本州團練防禦鎮遏等使其兵馬名額便𨽻此使如無别使即屬軍事其有邉於溪洞接連蠻蕃之處特建城鎮不闗州郡者則不在此限自艱難以來天下右武節將權尤重遂於所管諸郡别置鎮兵以大將主之干擾郡政或為姦盗其弊日久至是宰臣因烏重𦙍之請始奏罷之穆宗元年正月即位三月詔淄青統押海蕃每年皆有朝賀比差部領人數較多今冦盗既夷典章湏守宜以後差此官正試相兼不得過五人六月賜河中節度使韓𢎞印一面先是皇甫鏄為相頗排故相李絳罷河中節度使為防禦使而命絳為之至𢎞復授旌節而以印賜焉七月平盧節度使奏准勅押加新羅渤海兩蕃請印一面從之長慶二年八月勅秋夏之間嘗多水潦如縁暮夜遭雨道路不通車駕宜使放其日朝㕘委御史䑓勾當仍每具聞奏如雨不至甚不在此例三年五月秘書省監李随奏請造當司圖書印一面從之四年二月甲辰勅文武百僚寒食出城及於京畿内拜掃宜令自今月二十六日已後任去餘准長慶二年二月十四日勅處分敬宗寳歴元年正月特建武昌軍額命宰相牛僧孺為節度使丙辰牛僧孺請奏使印從之冊府元龜卷六十
