  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_461-1a}
body:
  text: 册府元龜卷四百六十一宋王欽若等撰臺省部寵異自漢魏而下政歸臺省故六聯之任為百官之本蓋政治之攸岀而俊髦之所翔集者也乃有望藹當世道合人主隆其眷遇優其禮命至或掌壺参乘陪接天光專席隔坐便蕃左右或拜貺於金帛或疇庸於車服有疾則存問不幸則臨弔以至推恩延世追命飾終君臣之分於斯而著矣自非謨明寅亮忠肅恭懿進納誨而無隠居守官而匪解好是正直克稱其任者疇足以當之哉漢孔安國武帝時為侍中帝以其儒者特聽掌御唾朝廷榮之孔光成帝時為尚書令有詔光周宻謹慎未甞有過加諸吏官以子男放為侍郎給事黄門史丹元帝時為侍中出嘗陪乘有寵九男皆以丹任為侍中後漢宣秉建武元年為御史中丞光武特詔御史中丞與司𨽻校尉尚書令㑹同並專席而坐故京師號曰三獨坐竇攸為郎中光武㑹百寮於靈臺得䑕如豹文問羣臣攸曰鼮䑕詔曰何以知之曰見爾雅詔如攸言賜帛三百叚張湛為太中大夫居中東門候舎洛陽十二門每門候一人候舎皆候之所居故時人號曰中東門君光武數存問賞賜戴馮心為侍中拜虎賁中郎將以侍中兼領之在職十八年卒於官詔賜東園梓噐錢二十萬郭伋為太中大夫建武二十三年卒光武親臨弔賜塋地藥崧明帝時為郎常獨直臺上無被枕杫杫音賜俎几也食糟糠帝每夜入臺輒見崧問其故甚嘉之自此詔太官賜尚書以下朝夕餐給帷被皂袍及侍史二人承官明帝時為侍中建初元年卒帝褒歎賜以冡地妻上書乞歸葬鄉里復賜錢三十萬桓郁章帝時為侍中以毋憂乞身詔公卿議議者皆以郁身為名儒學者之宗可許之於是詔郁以侍中行服朱暉為尚書僕射因駁議不從遂稱病篤閉口不復言章帝意觧寢其事復數日詔使直事郎問暉起居太醫視疾大官賜食暉乃起謝復賜錢十萬布百疋衣十領後遷為尚書令以老病乞身拜騎都尉賜錢三十萬郎韓稜為尚書令與僕射郅夀尚書陳寵同時俱以才能稱章帝嘗賜諸尚書劍唯此三人特以寳劍自手署其名曰韓稜楚龍淵晉太康記汝南西平縣有龍淵水可淬刀劍特堅利郅夀蜀漢文陳寵濟南椎成漢官儀推成作鍜成時論者為之説以稜淵深有謀故得龍淵壽明逹有文章故得漢文寵敦樸善不外見故得椎成馮豹為尚書郎忠勤不懈每奏事未報常俯伏省閣或從昏至明章帝聞而嘉之使黄門持被覆豹勅令勿驚由是數加賞賜魯恭和帝時為侍中數召讌見問以得失賞賜恩禮寵異黄香為郎中召詣安福殿言政事拜尚書郎數陳得失賞賚増加嘗獨止宿臺上晝夜不離省闥帝聞善之永元四年拜左丞功滿當遷和帝留増秩六年累遷尚書令後以為東郡太守香上疏陳讓帝亦惜香幹用乆習舊事復為尚書令令増秩二千石賜錢二十萬是後遂管機衡甚見親重而香亦祗勤物務憂公如家帝知其精勤數加恩賞疾病存問賜醫藥宋嘉順帝時為大中大夫卒詔令將相大夫㑹葬嘉賜錢十萬朱穆桓帝時為尚書卒公卿共表穆立節清忠䖍恭機密守死善道宜蒙旌寵䇿詔褒述追贈益州太守魏桓階文帝踐祚為尚書令封高鄉亭侯加侍中階疾病帝自臨省謂曰吾方託六尺之孤寄天下之命於卿勉之徙封安樂鄉侯邑六百戸又賜階三子爵關内侯祐以嗣子不封病卒又追賜關内侯後階疾篤遣使者即拜太常薨帝為之流涕謚曰貞侯子嘉嗣以階弟纂為散騎侍郎賜爵關内侯徐宣明帝時為左僕射青龍四年薨詔曰宣體履至實直内方外歴事三司公亮正色有託孤寄命之節可謂柱石臣也嘗欲倚以台輔未及登之惜乎大命不永其追贈車騎將軍葬如公禮焉孫資齊王時為左光禄大夫劉放為中書監時大将軍曹爽專事多變易舊章資嘆曰吾累世蒙寵加以豫聞屬託今縱不能輔弼時事何以坐受素餐之禄耶遂因稱疾賜詔曰君掌機宻三十餘年經營庻事勲著前朝暨朕統位動頼良謀是以曩者増崇寵章同之三事外師羣臣内資讜言屬以年耆篤上還印綬前後鄭重辭㫖懇切天地以大順成徳君子以善恕成仁重以職事違奪君志今聽所執賜錢百萬使兼光禄勲少府親策詔君養疾於第君其勉進醫藥頥神和氣以求無疆之祚置舎人官騎加以日秩殽酒之膳焉司馬望為散騎常侍時高貴鄉公好才愛士望與裴秀王沈鍾㑹並見親待數侍筵宴公性急秀等居内職急有詔便至以望外官特給追鋒車一乘虎賁五人吴顧雍領尚書令黄武四年迎母於呉既至大帝臨賀之親拜其母於庭公卿大臣畢㑹後太子又往慶焉紀陟孫休時父亮為尚書令而陟為中書令每朝㑹詔以屏風隔其坐焉孫承字顯世孫皓時與顧榮俱為黄門侍郎皓嘗使二人記事承答顧問乃下詔曰自今以後用侍郎皆當令如孫承顧榮之儔也晉賈充文帝時為散騎常侍帝命充定法律假金章賜甲第一區五等初建封臨沂侯為晉元勲深見寵異山濤為吏部郎文帝與書曰足下在事清明雅操邁時念多所乏今致錢二十萬絲百斤糓二百斛魏舒武帝時為侍中三娶妻皆亡自表乞假還本郡葬妻詔賜葬地一頃錢五十萬鄭黙為散騎常侍武帝出祠南郊侍中已陪乗詔曰使鄭常侍叅乗焉劉頌為光禄大夫門施行馬尋卒使使者弔祭賜錢二十萬朝服一具謚曰貞劉毅為尚書僕射武帝以毅清貧賜錢三十萬日給米肉年七十告老乆之見許以光禄大夫歸第門施行馬復賜錢百萬虞欽為尚書僕射領吏部武帝以清貧特賜絹百疋咸寧四年卒詔曰卿履道清正執徳貞素文武之稱著於方夏入躋機衡惟允庶事肆勤内外有匪躬之節不幸薨沒朕甚悼心其贈衞将軍開府儀同三司賜秘器朝服一具衣一襲布五十疋錢三十萬傅祗為散騎黄門郎賜爵闗内侯食邑三百户母憂去職及葬母詔給太常五等吉㓙導從其後諸卿夫人葬給導從自此始李憙為僕射武帝以憙清素貧儉賜絹百匹又拜特進光禄大夫以年老遜位詔曰光禄大夫特進李憙仗徳居義當升台司毗亮朕躬而以年尊致仕雖優游無為可以頥神而虗心之望能不憮然其因光禄之號改賜金紫置官騎十人賜錢五十萬禄賜班禮一如三司門施行馬庾峻為諌議大夫常侍卒詔賜朝服一具衣一襲錢三十萬郭奕為尚書疾病詔賜錢二十萬日給酒米朱嵩元帝建武初為散騎侍郎時顧球為尚書郎俱卒帝痛之將為舉哀有司奏舊尚書郎不在舉哀之例曰衰亂之弊特相痛悼於是舉哀哭之甚慟賀循建武初為散騎常侍又以老疾固辭帝下令曰孤以徳寡忝當大位若渉巨川罔知所憑循言行以禮乃時之望俗之表也實頼其謀猷以康萬機疾患有素猶望卧相規輔而固守撝謙自陳懇至此賢履信思順非茍以讓為高者也今從其所執於是改拜太常常侍如故劉超為中書通事郎市純色牛不可得啓買官外廐牛元帝詔便以賜之顧和成帝時為尚書僕射以母老固辭詔書勅諭特聽暮出朝還其見優遇如此尋朝議以端右之副不宜處外更以銀青光禄大夫領國子祭酒荀嵩為右光禄大夫開府録尚書領秘書監咸和三年薨贈侍中升平四年嵩改葬詔賜錢百萬布五千匹陸玩與孔愉為尚書令僕射詔曰尚書令玩左僕射愉並恪居官次禄不代耕端右任重先朝所崇其給玩親信三十人愉二十人廩賜及王導郄鍳庾亮相繼而薨朝野咸以為三良既没國家殄瘁以玩有德望乃遷侍中司空給羽林四十人玩子納為尚書令恪勤貞固始終不渝尋除左光禄大夫開府儀同三司未拜而卒即以為贈何充為吏部尚書及司徒王導薨轉䕶軍將軍與中書監庾氷叅録尚書事詔充氷各以甲仗五十人至止車門尋遷尚書令丁潭為散騎常侍康帝即位屢表乞骸骨詔以光禄大夫還第門施行馬禄秩一如舊制給傳詔二人賜錢二十萬牀帳褥席殷仲堪孝武時為黄門郎寵任專隆帝甞示仲堪詩乃曰勿以已而笑不才宋范泰晉末度支尚書散騎常侍兼司空與右僕射袁湛授宋公九錫随軍到雒陽高祖還彭城共登城泰有足疾特命乗輿孔季恭為侍中左光禄大夫辭事東歸高祖餞之戲馬臺百僚咸賦詩以述其美王曇首為侍中元嘉七年卒文帝為之慟中書舎人周赳侍側曰王氏欲衰賢者先殞帝曰直是我家衰耳追贈左光禄大夫加散騎常侍詹事如故沈演之為右衞将軍遷侍中右衞將軍如故文帝謂之曰侍中領衞望實優顯此蓋宰相便坐卿其勉之帝欲伐林邑演之賛成帝意及平賜羣臣黄金生口銅器等物演之所得偏多上謂之曰廟堂之謀卿叅其力平此逺夷未足多建茅土俟廓清舊都鳴鸞東岱不憂河山不開也又為吏部尚書元嘉二十六年車駕拜京陵演之以疾不從帝還宫召見自勉到坐出至尚書下省暴卒時年五十三帝痛惜之追贈散騎常侍金紫光禄大夫江智淵為中書侍郎智淵愛好文雅辭采清贍世祖深相知待恩禮冠朝時讌私甚數多命羣臣五六人遊集智淵常為其首同侣未及前轍獨䝉引進殷淳為黄門侍郎黄門清切下直應留下省以父老特聽還家王敬𢎞為尚書令敬固讓表求還東上不能奪改授侍中特進左光禄大夫給親信二十人讓侍中特進求減親信之半不許及東歸車駕幸冶亭餞送朱修之為左民尚書後墜車折脚辭尚書領崇憲太僕仍加特進金紫光禄大夫以脚疾不堪獨行特給扶侍劉延孫孝武時為侍中尚書左僕射領䕶軍將軍延孫疾病不任拜起帝使於五城受封板乗船自清溪至平昌門仍入尚書下舎又欲以代朱修之荆州事未行大明四年卒時年五十二帝甚惜之下詔曰故侍中尚書左僕射領䕶軍將軍東昌縣侯延孫風局簡正體識沈明綢繆心膂自審外朝契濶唯舊幾將二紀靈業中圯則首賛宏圖義合既舉則任均肅冠器允棟幹勲實佐時歴事兩宫出入方牧惠政茂績著自民聽忠謀令節簡乎朕心方便台階永毗國道奄至薨殞震慟兼深考終定典宜盡哀敬可贈司徒給班劍二十人侍中僕射侯如故袁顗為侍中前廢帝景和元年誅羣公欲引進顗任以朝政遷為吏部尚書又下詔曰宗社多故釁因家司景命未渝神祚再乂自非忠謀宻契豈伊剋殄侍中祭酒領前將軍新除吏部尚書顗遊擊將軍領著作郎兼尚書左丞徐爰誠心内欵叅聞嘉䇿輔賛之效寔監朕懐宜甄茅社以奨義槩顗可封新淦陽縣子爰可封呉平縣子食邑各五百户劉秉明帝時為尚書左僕射大叅選元徽元年領吏部加兵五百人尋領衞尉辭不拜劉勔為中領軍桂陽王休範為逆勔出守石頭秉權兼領軍將軍所給加兵自隨入殿張緒為黄門郎明帝每見緒輙嘆其清談南齊張融太祖時為中書郎帝手詔賜融衣曰見卿衣服麤故誠乃素懐有本視爾藍縷亦虧朝望今送一通故衣意謂雖故乃勝新是吾所著已令裁減稱卿之體并履一量紀僧真武帝時為中書舎人僧真容貌言吐雅有士風帝嘗目送之笑曰人生何必計門户紀僧真堂堂貴人所不及諸權要中㝡被盻遇除越騎校尉餘官如故袁昂為黄門侍郎本名千里武帝謂之曰昂昂千里之駒在卿有之今改卿名昂即以千里為字庾杲之為黄門郎武帝永明中諸王年少不得妄與人接勅杲之與濟陽江淹五日一詣諸王使申遊好沈冲永明中徴為五兵尚書未至而卒武帝甚惜之䘮還車駕出臨冲䘮詔曰冲貞詳閑理志局淹正誠著蕃朝績彰出守不幸早世朕甚悼之追贈太保謚曰恭子劉係宗為中書通事舎人乆在朝省閑於職事明帝曰學士不堪治國唯大讀書耳一劉係宗足持如此軰五百人王慈為侍中郎患脚武帝勅曰慈在職未乆既有㣲疾不堪朝又不能騎馬聽乗車在仗後江左来少例也吕安國為光禄大夫加散騎常侍時有疾帝遣中書舎人茹法亮勑安國曰吾甞憂卿疾病應有所須勿致難也尋遷散騎常侍金紫光禄大夫兖州中正給扶侍上又勅茹法亮曰吾見吕安國疾狀自不宜勞且脚中既常惡扶人至吾前於禮望殊成有虧吾難勅之其人甚諱病卿可作私意向其若好差不復須扶人依例入幸勿牽勉柳世隆為侍中左光禄大夫䘚時年五十詔給東園秘器朝服一具衣一襲錢二萬布二百疋蠟三百斤又詔曰故侍中左光禄大夫貞陽公世隆秉徳居業才兼經緯少播清徽長𢎞美譽入叅内禁出賛西牧專寄郢郊尅挫巨猾超越前勲功著一代及總任方州民頌寛徳翼教崇闥朝稱元正忠謨嘉猷簡於朕心雅志素履邈不可踰將登鉉味用變鴻化奄至薨殞震慟良深贈司空班劍三十鼓吹一部侍中如故沈文秀為散騎常侍領軍將軍以疾遷金紫光祿大夫加親信二十人常侍如故轉侍中領太子詹事遷中䕶軍侍中如故以家為府梁傅昭仕齊明帝為中書通事舍人時居此職皆勢傾天下昭獨廉静無所干豫器服率陋身安粗糲甞挿燭於版牀明帝聞之賜漆合燭盤等勅曰卿有古人之風故賜卿古人之物後為散騎常侍高祖大通二年九月卒詔賻錢三萬布五十匹即日舉哀沈約自梁䑓建為散騎常侍吏部尚書兼右僕射高祖受禪為尚書僕射封建昌縣侯邑千户常侍如故又拜約母謝為建昌國太夫人奉策之日左僕射范雲等二十餘人咸來致拜朝野以為榮俄遷尚書左僕射常侍如故尋兼領軍加侍中天監二年遭母憂輿駕親出臨弔以約年衰不宜致毁遣中書舎人斷客節哭加特進如故十二年卒時年七十三詔贈本官賻錢五萬布百匹王峻天監中為中書侍郎高祖甚悅其風采與陳郡謝覧同見賞擢何佟之為尚書左丞天監二年卒官髙祖甚悼惜將贈之官故事左丞無贈官者特詔贈黄門侍郎儒者榮之孫謙為零陵太守天監九年以年老徴為光禄大夫既至髙祖嘉其清潔甚禮異焉每朝見猶請劇職自効髙祖笑曰朕當使卿智不當使卿力十四年詔曰光禄大夫孫謙清慎有聞白首不怠髙年舊齒宜加優秩可給親信二十人并給扶十五年卒官時年九十二詔賻錢三萬布五十匹髙祖為舉哀甚悼惜之范岫天監九年為祠部尚書領右驍騎將軍其年遷金紫光禄大夫加親信二十人十三年卒官賻錢五萬布百匹王份為散騎常侍金紫光禄大夫南徐州大中正給親信二十人遷尚書左僕射尋加侍中時修建二郊份以本官領大匠卿遷散騎常侍右光禄加親信為四十人遷侍中特進左光禄復以本官監丹陽尹髙祖普通五年三月卒詔賻錢四十萬布四百匹蠟四百斤給東園秘器朝服一具衣一襲蕭琛為侍中卒高祖臨哭甚哀詔贈本官雲麾將軍給東園秘器朝服一具衣一襲賻錢二十萬布百匹徐勉為尚書僕射上表修五禮成尋加中書令給親信二十人勉以疾自陳求觧内任詔不許乃令停下省三日一朝有事遣主書論決脚疾轉劇乆闕朝覲固陳求觧詔乃賚假須疾差還省中大通三年又以疾自陳移授特進右光禄大夫侍中中衞將軍置佐史餘如故増親信二十人兩宫叅問冠蓋結轍服膳醫藥皆資天府有勅每欲臨幸勉以拜伏有虧數啟停輿駕大同元年卒髙祖聞而流涕即日車駕臨殯乃詔贈特進右光禄大夫開府儀同三司餘並如故給東園秘器朝服一具衣一襲贈錢二十萬布百匹皇太子亦舉哀朝堂謝舉為尚書僕射侍中將軍如故舉雖居端揆未甞肯預時務多因疾陳觧勅輙賜假并手勅處分加給上藥其恩遇如此及卒於内臺武帝謂曰舉非止歴官已多亦人倫儀表久著公望悵恨未授之可贈侍中衞將軍開府儀同三司賀琛為員外散騎常侍舊尚書南坐無貂貂自琛始遷尚書左丞叅禮儀事每見高祖與語嘗移晷刻故省中為之語曰上殿不下有賀雅琛容止都雅故時人呼之蕭介為侍中中大同二年辭疾謝事高祖優詔不許終不肯起乃遣謁者僕射魏祥就拜光禄大夫柳惔為散騎常侍高祖因讌為詩以貽惔曰爾寔冠羣后惟余實念功張稷徴尚書左僕射輿駕將欲幸稷宅以盛暑幸僕射省舊臨幸供具皆酬太官饌直帝以稷清貧手詔不受王亮為散騎常侍卒詔賻錢三萬布五千匹王瑩為侍中尚書令累進左中權將軍給鼓吹一部瑩性清慎居官恭恪高祖深重之江淹為金紫光禄大夫卒高祖為素服舉哀賻錢三萬布五十匹范雲為散騎常侍尚書右僕射卒高祖為流涕即日輿駕臨殯詔曰追逺興懐常情所篤况問望斯在事深朝寄乎故散騎常侍尚書右僕射霄城侯雲器範真正思懐經逺爰初立志素履有聞脫巾来仕清績仍著爕務登朝其瞻惟允綢繆翊賛義簡朕心雖勤非負靮而舊同捨講方騁逺塗永毗庶政奄致䘮殞傷悼於懐宜加命秩式備徽典可贈侍中衞將軍僕射侯如故并給鼓吹一部禮官請謚曰宣勅賜謚曰文蕭子顯為侍中髙祖雅愛子顯才又嘉其容止吐納每御筵侍坐偏顧訪焉吕僧珍為散騎常侍直秘書省任總心膂恩遇隆宻性甚恭慎每侍坐屏氣鞠躬果食未甞舉箸嘗因醉後取一柑食之高祖笑謂曰便是大有所進禄俸之外又月給錢十萬其餘賜賚不絶於時王暕為侍中尚書左僕射領國子祭酒普通四年冬暴疾卒時年四十七高祖詔贈侍中中書令中軍將軍給東園秘器朝服一襲錢十萬布百疋謚曰靖有四子訓承雅訏並通顯暕子訓為侍中既拜入見高祖從容問何敬容曰禇彦囘年幾為宰相敬容對曰少過三十帝曰今之王訓無謝彦囘陸雲公為給事黄門侍郎雲公善奕棊嘗夜侍御坐武冠觸火高祖笑謂曰燭燒卿貂高祖將用雲公為侍中故以此言戲之也是時天淵池新制鯿魚舟形濶而短高祖暇日常汎舟唯引太常劉之遴國子祭酒到溉右衞朱异雲公時年位尚輕亦預焉其恩遇如此太清元年卒高祖悼惜之手詔曰給事黄門侍郎掌著作陸雲公風尚優敏後進之秀奄然殂謝良以惻然可剋日舉哀賻錢五萬布四十匹陳蕭引為金部侍郎甚為高祖所重嘗謂引曰我每有所忿見卿輙意觧何也引曰此自陛下不遷怒臣何預此恩沈衆為中書令高祖以衆州里知名甚敬重之賞賜優渥超於時軰王冲為左僕射加特進左光禄大夫領丹陽尹初高祖以冲前代舊臣特申長㓜之敬文帝即位益加尊重嘗從帝幸司空徐度宅宴筵之帝賜以几其見重如此蕭濟為侍中領太府卿比佐二主恩遇甚篤賞賜加於凡等蔡景歴宣帝時為度支尚書舊式拜官在午後景歴拜日適值輿駕幸𤣥武觀在位皆侍宴帝恐景歴不豫特令早拜其見重如此是嵗以疾卒贈太常卿周𢎞正為尚書右僕射領國子祭酒豫州大中正卒詔曰𢎞正識宇凝深藝業通備辭林儀府國老民宗道映庠門望高禮閣卒然殂殞朕用惻然可贈侍中中書監三事所須量加資給又出哭臨之袁憲為散騎常侍兼吏部尚書憲以乆居清顯累表自求觧任宣帝曰諸人在職屢有謗書卿處事已多可謂清白别相甄録且勿致辭杜稷為侍中歴事三帝並見恩寵末年不預征役優游京師賞賜優洽徐陵為侍中中書監領太子詹事右光禄大夫給鼓吹一部陵以年老累表求致仕宣帝亦優之乃詔將作為造大齋令陵就第攝事後主即位遷左光禄大夫太子太傅餘如故至徳元年卒時年七十七詔曰慎終有典抑乃舊章令徳可甄諒宜追逺侍中安右將軍左光禄大夫太子少傅南徐州大中正建昌縣開國侯陵弱齡覺尚登朝秀穎業高名軰文曰詞宗朕進秩承華時相引狎雖多卧疾方期克壯奄然殞逝震悼於懐可贈鎮右將軍特進其侍中左光禄大夫鼓吹侯如故并出舉哀䘮事所湏量加賞給陸瓊為吏部尚書丁母憂去職初瓊之侍東宫也母隨在官舎後主賞賜優異後及䘮柩還鄉詔加増并遣謁者黄長貴持册奠祭後主又自製誌朝野榮之孫楊為侍中五兵尚書卒尚書令江總為其誌銘後主又題銘後四十字遣左民尚書蔡徴宣勑就宅鐫之其詞曰秋風動竹烟水驚波幾人樵徑何處山阿今時日月宿昔綺羅天長路遠地乆雲多功臣未勒此意如何時論以為榮後魏盧魯元大武時為中書侍郎以工書有文才累遷中書監領秘書事賜爵㐮城公加散騎常侍右將軍賜其父為信都侯李孝伯為散騎常侍性方慎忠厚大武寵眷以宰輔遇之賈秀獻文時為中書侍郎年七十三遇疾給醫藥賜几杖時朝廷舉動及大事不決每遣尚書高平公李敷就第訪決皇興三年卒贈冀州刺史程駿孝文時為秘書令時文明太后臨朝詔曰程駿歴官清慎言事每愜又門無挾貲之賓室有懐道之士可賜帛六百匹旌其儉徳駿病甚髙祖文明太后遣使者更問其疾勅御史徐謇診視賜以湯藥臨終詔以少子公稱為中散從子靈虬為著作佐郎及卒孝文及文明太后傷惜之賜東園秘器朝服一襲帛三百匹贈官軍將軍兖州刺史曲安侯宋弁為尚書殿中丞孝文曽因朝㑹之次歴訪治道弁年少官微自下而對聲姿清亮進止可觀孝文稱善者乆之因是大被恩遇賜名為弁意取卞和獻玉楚王不知為寳也郭祚為散騎常侍仍領黄門與黄門宋弁叅謀幃幄隨其才用各有委寄祚承禀注疏特成勤劇嘗以立馮昭儀百官夕飲清徽後園孝文舉觴賜祚及崔光曰郭祚憂勞庶事獨不欺我崔光温良博物朝之儒秀不勸此兩人當勸誰也其見知若此邢巒為員外散騎侍郎為孝文所知賞轉中書侍郎甚見顧遇嘗叅坐席吕羅漢為内都大官太和六年卒於官孝文悼惜之賜命服一襲謚曰莊公李冲為南部尚書是時循舊王公重臣皆呼其名孝文帝謂冲為中書而不名之又改置百司開建五等以冲叅定典式封滎陽郡開國侯食邑八百户累遷尚書僕射卒孝文為舉哀於懸瓠悲泣不能自勝詔曰冲貞和資性懐義樹身訓業自家道素刑國太和之始朕在弱齡早委近機實康時務洪猷允洽朝選澄清升茲端右唯允出納忠肅柔明足敷朝範仁恭信惠有結民心可謂國之賢也朝之望也方昇寵秩以旌功舊奄至䘮逝悲痛於懐可贈司空給東園秘器朝服一具衣一襲賻錢三十萬布五百疋蠟二百斤有司奏謚曰文穆葬於覆舟山近杜預冡孝文之意也陸凱為黄門侍郎後遇患頻上書乞骸骨詔不許勅太醫給湯藥堯暄孝文太和中為南部尚書假中䕶軍將軍暄前後從征及出使簡察三十許度皆有克己奉公之稱賞賜衣服二十具綵絹千疋紬絹百餘段奴婢七口賜爵平陽伯高允為尚書散騎常侍加光禄大夫太和十一年卒年九十八先卒旬外微有不適猶不寢卧呼醫請藥出入行止吟咏如常孝文及文明太后聞而遣醫李修往脉視之告以無恙修入宻陳允榮衞有異懼其不乆於是遣使備賜御膳珍羞自酒米至於鹽醢百有餘品皆盡時味及牀帳衣服茵被几杖羅列於庭王官往還慰問相屬允喜形於色語人曰天恩以我篤老大有所賚得以贍客矣表謝而已不有他慮如是數日夜中卒家人莫覺詔給絹一千疋布二千疋絲三百斤錦五十疋雜綵百疋榖一千斛以周䘮用魏初以来存亡䝉賚者莫及焉朝廷榮之將葬贈侍中司空冀州刺史將軍公如故謚曰文賜命服一襲李仲裔為諌議大夫尚書左丞卒贈帛一百疋布五十疋綿五十斤贈鎮逺將軍光州刺史司馬躍為祠部尚書大鴻臚卿以疾表求觧任太和十九年卒贈金紫光禄大夫賜朝服一具衣一襲絹一千疋崔休為黄門侍郎常叅孝文侍席禮遇次於宋郭之軰宋弁遷尚書左丞孝文南伐從駕南行及車駕還幸彭城郭祚汎舟泗水詔休侍筵觀者榮之高遵為中書侍郎與游明根高閭李冲入議律令親對御坐時有陳奏以積年之勞賜粟帛牛馬成淹為侍郎孝文以淹清貧賜絹百匹淹後遷謁者僕射時遷都孝文以淹家無行資勑給事力送至雒陽并賜假日與家累相隨李翻為度支尚書孝明靈太后曽讌於華林園舉觴謂羣臣曰李尚書朕之杜預欲以此杯敬屬元凱令為盡之侍座者莫不羡仰游肇孝明時為尚書右僕射正光元年八月卒年六十九詔給東園秘器朝服一襲贈帛七百匹帝舉哀於朝堂贈使持節散騎常侍驃騎大將軍儀同三司冀州刺史羊深為尚書駕部郎中于時沙汰郎官務精求實深以才堪見留在公明斷尚書僕射崔亮吏部尚書甄琛咸敬重之孝明行釋奠之禮講孝經深於儕軰中蒙引聽時論美之靈太后曽幸印山集僧尼齊㑹公卿盡在坐㑹事將終太后引見深欣然勞問之深謝曰臣蒙國恩厚世荷榮遇寇難未平是臣憂責而隆恩忽被犬馬知歸太后顧謂左右曰羊深真忠臣也舉坐傾心崔亮為尚書僕射加散騎常侍正光二年秋疽發於背孝明遣舎人問疾亮上表乞觧僕射送所負荷及印綬詔不許尋卒詔給東園秘器朝服一襲賻物七百段蠟三百斤贈使持節散騎常侍車騎大將軍儀同三司冀州刺史謚曰貞烈崔光為侍中領國子祭酒永平四年八月詔光乗歩輓於雲龍門出入遷中書侍郎給事黄門侍郎甚為孝文所知嘗曰孝伯之才浩浩如河東注固今日之文宗也甄琛為車騎將軍特進加侍中以其衰老詔賜御府杖朝直杖以出入正光五年冬卒詔給東園秘器朝服一具衣一襲錢十萬物七百段蠟三百斤贈司徒公尚書左僕射加後部鼓吹孝明親送降車就輿弔哭之遣舎人􅇺其諸子鹿悆孝莊時為給事黄門侍郎而自無室宅嘗假賃居止布衣糲食寒暑不變帝嘉其清素時復賜以錢帛北齊魏蘭根仕魏時為僕射天平初以病篤上表求還鄉里魏帝遣舎人石長宣就家勞問猶以開府儀同門施行馬崔昂文㐮時為尚書左丞又兼度支尚書左丞兼尚書近代未有唯昂獨為冠首朝野榮之唐邕天保初為給事中兼中書舎人七年於羊汾堤講武令邕總為諸軍節度事畢仍監宴射之禮是日文宣親執邕手引至太后前坐於丞相斛律金之上啟太后云唐邕強幹一人當千仍别賜錦綵錢帛邕非唯強濟明辨然亦善揣帝意取進多途是以恩寵日隆委任彌重帝又嘗對邕曰太后云唐邕分明強記每有軍機大事手作文書口且處分耳又聽受實是異人一日之中六度賜物又嘗解所服青䑕皮裘賜邕云朕意在車馬衣裘與卿共敝十年從幸晉陽除兼給事黄門侍郎領中書舎人帝嘗登童子佛寺望并州城曰是何等城或曰此是金城湯池天府之國帝曰我謂唐邕是金城此非金城也其見重如此其後語邕曰卿劬勞既乆欲除卿作州頻勑楊遵彦更求一人堪代卿者遵彦云比遍訪文武如卿之徒實不可得所以遂停此意卿宜勉之文宣或時切責侍臣有不稱㫖者云觀卿等舉措不中與唐邕作奴其見賞遇多此類孝昭作相除黄門侍郎於華林園射特賜金帶寳器服玩雜物五百種魏收為中書監右僕射武成於華林别起𤣥洲苑備山水臺觀之麗詔於閣上畫收其見重如此尉瑾為右僕射病卒武成方在三臺飲酒元文遥奏聞遂命徹樂罷飲隋陸彦師開皇初為尚書左丞彦師素多病未㡬以務劇疾動乞觧所職高祖詔聽以本官就第嵗餘轉吏部侍郎于仲文為柱國高祖以尚書文簿繁雜吏多姦計令仲文勘録省中事其所發擿甚多帝嘉其明斷厚加勞賞焉盧凱攝尚書左丞每有敷奏侃然正色雖逢喜怒不改其常高祖嘉凱有吏幹賜錢二十萬并賚雜綵三百匹加散騎常侍高構為民部郎時有叔侄爭嫡尚書省不能斷朝臣三議不决構斷合理高祖以為能召入内殿勞之曰我聞尚書郎上應列宿觀卿才識方知古人言信矣嫡庻者禮教之所重我誦卿判數遍詞理愜當意所不能及也賜米百石由是知名王韶為并州行臺右僕射高祖幸并州以其稱職特加勞勉謂韶曰自朕至此公鬚鬢漸白無乃憂勞所致柱石之望唯在於公努力勉之韶辭謝曰臣比衰暮殊不觧作官人高祖曰是何意也不觧者是未用心耳韶對曰昔在昏季猶且用心况逄明聖敢不罄竭但神化精微非駑蹇所逮加以今年六十有六桑榆云晩比於疇昔昏忘又多豈敢自寛以速年累恐以衰暮虧紊朝綱耳帝勞而遣之牛𢎞為吏部尚書煬帝之在東宫也數有詩書遺𢎞𢎞亦有答及嗣位之後嘗賜𢎞詩曰晉家山吏部魏世盧尚書英言先哲異竒才亦佐余學行敦時俗道素乃冲虛納言雲閣上禮儀皇運初彛倫欣有叙垂拱事端居其同被賜詩者至於文詞賛揚無如𢎞美焉又為光禄大夫煬帝嘗引入内帳對皇后賜以同席飲酒其禮遇親重如此大業六年從幸江都其年十一月卒於江都郡時年六十六帝傷惜之賻贈甚厚歸𦵏安定贈開府儀同三司光禄大夫文安侯裴藴為民部郎時猶承高祖和平之後禁網疎濶户口多漏或年及成丁猶詐為小未至於老已免租賦藴歴為刺史素知其情因是條奏皆令貌閲若一人不實則官司觧職鄉正里長皆遠流配又許民相告糾得一丁者令被糾之家代輸賦役是嵗大業五年也諸郡帳進丁二十四萬三千新附口六十四萬一千五百帝臨朝覧狀謂百官曰前代無好人致此罔冒今進民户口皆從實者全由裴藴一人用心古語云得賢而治驗之信矣由是漸見親委蔡允恭為起居舎人與虞世南同為學士聲譽微出其下而寵遇過之允恭善吟詠煬帝屬詞賦多令其諷誦之淳于恭為侍中卒於官詔書褒歎賜榖千斛唐温彦博高祖時為中書侍郎彦博善於宣吐每奉使入朝詔問四方風俗承授綸言有若成誦聲韻髙朗響溢殿庭進止雍容觀者拭目高祖嘗讌朝臣詔太宗諭㫖既而顧謂近臣曰何如温彦博其見重如此薛收為陜東道大行臺金部郎中武徳六年以本官兼文學舘學士與房𤣥齡杜如晦特蒙殊禮受心腹之寄又嘗上書諌獵太宗手詔曰覧讀所陳實悟心膽今日治成我卿之力也明珠照乘豈比來言當以誠心書何能盡今賜卿黄金四十錠以酬雅意七年寢疾太宗遣使臨問相望於道尋命輿疾詣府太宗親以衣袂撫收論叙生平澘然流涕尋卒年三十三太宗親自臨哭哀動左右與收從父兄子元敬書曰吾與卿叔共事或軍旅多務或文詠從容何嘗不驅馳經畧款曲襟袍比雖疾苦日兾痊除何期一朝忽成萬古追尋痛惋彌用傷懐且聞其兒子㓜小家徒壁立未知何以處置加安撫以􅇺吾懐因使人弔祭賻物三百段杜淹為御史大夫判吏部尚書有疾太宗親自臨問賜帛三百疋貞觀二年卒贈尚書右僕射謚曰襄于志寧貞觀三年為中書侍郎太宗嘗命貴臣内宴怪不見志寧或奏曰勅詔三品已上志寧非三品所以不來太宗特令預宴即加授散騎常侍行太子左庶子王珪為禮部尚書卒太宗素服舉哀於别次悼惜乆之詔魏王奉率百官親往臨哭贈吏部尚書馬周為中書令攝吏部尚書太宗嘗以神筆賜周飛白書曰鸞鳳凌雲必資羽翼股肱之寄誠在忠良周病消渴彌年不瘳時駕幸翠微宫勅求勝地為周起宅名醫中使相望不絶每令尚食以膳供之太宗躬為調藥皇太子親臨問疾戴胄為尚書右丞胄家貧賚錢十萬時尚書左僕射蕭瑀免官僕射封徳彛又卒太宗謂胄曰尚書省天下綱維百司所禀若一事有失天下必有受其弊者今無令僕繫之於卿當稱朕所望及卒太宗為之舉哀廢朝三日贈尚書右僕射追封趙國公謚曰忠詔虞世南為撰碑文又以胄宅宇敝陋祭享無所令有司特為造廟顔相時為禮部侍郎羸瘠多疾病太宗嘗使賜以醫藥高季輔為禮部侍郎凡所銓叙時稱允當太宗賜金背鏡一面以表其清鍳宇文節為禮部尚書右丞明習法令以幹局見稱時江夏王道宗嘗以私事託於節遂奏之太宗大悅賜絹二百匹仍勞之曰朕所以不置左右僕射者正以卿在省耳劉林甫為吏部侍郎臨終上表薦賢太宗甚嘉悼之賜絹二百五十匹唐儉為民部尚書請致仕許之及卒太宗為之舉哀罷朝三日贈開府儀同三司并州都督賻綿布一千段米粟一千石陳叔達為侍中丁母憂叔達先有疾太宗慮其危殆遂遣使禁絶其弔賔裴行儉高宗朝為禮部尚書兼檢校右衞將軍卒贈幽州都督謚曰獻行儉子早卒詔皇太子差六品官一人檢校家事五六年間待兒孫稍長成日停之崔𤣥暐長安初為天官侍郎轉文昌左丞經月餘則天謂曰自卿改職以来選司大有罪過或聞令史乃設齋自慶此欲盛為貪汚耳今要卿復舊任又除天官侍郎賜雜綵七十段李逈秀為考功員外郎則天雅愛其才甚寵待之掌考功數年魏知古𤣥宗開元中罷相往東都知吏部尚書事深以為稱職手制曰卿以宰臣往知大選官人之委情寄尤切遂能端本革弊忘私狥公朕遠聞之益用嘉歎令賜衣一副聊以示懐宋璟開元中為尚書右丞相與張說源乾曜同日拜官勑大官設饌太常奏樂於尚書都省大㑹百寮𤣥宗賦詩褒述親札賜之二十二年以年老累乞退歸東都私第後帝幸東都璟於路左迎謁帝遣榮王親勞問之自是頻遣使送藥餌年七十五薨贈太師賻物二百匹粟二百石䘮事官給河南少尹一人充使監䕶謚曰文貞李朝隠為吏部侍郎銓叙平允甚為當時所稱降璽書褒美授一子太子通事舎人王丘為禮部尚書仍聽致仕丘雖歴要職固守清儉未嘗受人饋遺第宅輿馬稱為弊陋致仕之後藥餌殆將不給帝聞而嘉嘆下制曰王丘夙負良材累升茂秩比縁疾疹假以優閒聞其家道屢空醫藥靡給乆此從官遂無餘資持操若斯古人何遠且優賢之義方册所先周給之宜激勸攸在其俸禄一事已上竝宜全給式表殊常之澤用旌貞白之吏鄭少微為刑部侍郎開元二十五年𤣥宗因聽政問京師囚徒有司奏有五十人怡然有喜下詔曰官之為法法有其官寄以深仁能行禁令日者叢棘之地烏鵲来巢今結諸刑明纔逾五十雖化源自逺亦欽恤使然其鄭少微等一十七人各賜一中上考仍兼賜少物以存勸賞郭子儀代宗廣徳二年為尚書令詔於尚書省視事命宰臣已下常叅官送上特遣射生五百騎執㦸翼從朝堂至於省賜以教坊音樂裴遵慶大厯四年三月授左僕射與吏部尚書劉晏上本曹視事勑太常尚食許内侍魚朝恩及宰臣已下常叅官咸詣省送上増置儲供寵賢也馬璘大厯九年授檢校尚書左僕射知省事詔宰臣及常叅官並㑹尚書省送璘上本曹視事遣中使詣省勞慰仍賜酒饌裴延齡徳宗貞元中為户部尚書疾甚令中使連三軰候問李齊運為禮部尚書被疾嵗餘不能朝謁朝廷除改每遣中人就第訪决韋臯穆宗長慶二年為左僕射於尚書省上事命中使宣賜酒及宰臣百寮送上庾敬休為尚書左丞文宗太和九年二月卒贈吏部尚書癸酉詔曰官至丞郎皆朕所委不幸云亡者宜其為之廢朝况朝㑹班列本在諸司三品之上比限近勑或乖通理時因敬休殞喪載深傷惻自今丞郎宜准諸司三品官罷朝日王璠為尚書左丞大和九年召對浴堂門賜以錦器殷侑開成元年為刑部尚書時初經李訓之亂文宗問有治安之術侑極言委任責成宜任朝之耆徳新進小生無宜輕用帝深嘉之賜錦綵三百匹及中謝又令中使就第賜金十斤牛僧孺為東都留守判尚書省事開成三年九月授尚書左僕射仍令右軍副使王元直齎告身宣賜舊例自留守除内官無送誥身使帝以僧孺頃在淮南六表讓官故特遣中人宣宻㫖便令赴闕後唐盧箕為兵部尚書明宗長興元年五月勅除本官料錢外逐月别支錢三十貫并羊麵油米以寵舊臣也册府元龜卷四百六十一
