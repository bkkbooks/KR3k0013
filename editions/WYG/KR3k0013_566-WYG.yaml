body:
  text: 册府元龜卷五百六十六宋王欽若等撰掌禮部作樂第二晉武帝泰始二年詔郊祀明堂禮樂權用魏儀尊周室肇稱殷禮之義但改樂章而已使傅𤣥制為二十二篇述以功徳代魏改朱鷺為靈之祥言宣帝之佐魏猶虞舜之事堯既有石瑞之徵又能用武以誅孟達之逆命也改思悲翁為宣受命言宣帝禦諸葛亮養威重運神兵亮震怖而死改艾如張為征遼東言宣帝陵大海之表討滅公孫而梟其首也改上之囘為宣輔政言宣帝聖道深逺撥亂反正􅃠羅文武之才以定二儀之序也改雍熈離為時運多難言宣帝致討吳方有征無戰也改戰城南為景龍飛言景帝克明威教貴順夷逆隆無疆崇洪基也改巫山髙為平玉衡言景帝一萬國之殊風齊四海之乖心禮賢養士而纂洪業也改上陵為文皇統百揆言文帝始統百揆用人有序以敷太平之化也改將進酒為因時運言因時運變聖謀濳施觧長蛇之交離羣桀之黨以武濟文以邁其徳也改有所思為惟庸蜀言文帝既平萬乘之蜀封建萬國復五等之爵也改芳樹為天序言聖皇應歴受禪𢎞濟大化用人各盡其才也改上邪為大晉承運期言聖皇膺籙受圖化象神明也改君馬黄為金靈運言聖皇踐祚致敬宗廟而孝道行於天下也改雉子班為於穆我皇言聖皇受禪徳合神明也改聖人出為仲春振旅言大晉申文武之教畋獵以時也改臨髙臺為夏苗田言大晉畋狩順時為苗除害也改逺如期為仲秋獮田言大晉雖有文徳不廢武事順時以殺伐也改石留為順天道言仲冬大閲用武修文大晉之徳配天也改務成為唐堯言聖皇徳陟帝位化光四表也𤣥雲依舊名言聖皇用人各盡其才也改黄爵行為伯益言赤鳥銜書有周以興今聖皇受命神雀來也釣竿依舊名言聖皇徳配堯舜又有吕望之佐濟大功致太平也五年尚書奏使太僕傅𤣥中書監荀朂黄門侍郎張華各造正旦行禮及王公上夀酒食舉樂歌詩詔又使中書郎成公綏亦作張華表曰案魏上夀食舉詩及漢氏所施用其文句長短不齊未皆合古葢以依詠絃節本有因循而識樂知音足以制聲度典法用大率非凡近之所能改二代三京隨而不變雖詩章辭異興廢隨時至其韻逗遛曲折皆繋於舊有由然也是以一皆因就不敢有所改易荀氏則曰魏氏歌詩或二言或三言或四言或五言與古詩不類以問司律中郎將陳頎頎曰被之金石未必皆當故朂造晉歌皆為四言唯王公上夀酒一篇為三言五言此則華朂所明異㫖也一云元㑹大饗四樂辭太僕傳𤣥撰正旦大㑹行禮歌詩四章夀酒詩一章食舉東西樂十三章黄門侍郎張華作上夀食舉行禮詩十六章中書監荀朂侍郎成公綏作言數各異又傳𤣥作祀先農先蠶夕牲夏歌詩一篇八句迎送神一篇享社稷先農先聖先蠶歌詩三篇前一篇十二句中一篇十六句後一篇十二句辭皆敘田農事胡道安先農饗神詩一篇竝八句樂府相傳舊歌三章九年光禄大夫荀朂以杜䕫所制律吕較太樂摠章皷吹八音與律吕乖錯乃制古尺作新律吕以調聲韻律成遂班下太常使太樂摠章鼓吹清商施用朂遂典知樂事啟朝士解音律者共掌之使郭瓊宋識等造正徳大豫二舞而朂及傅𤣥張華又各造北舞歌詩朂所作新律􅅇十二枚散騎侍郎阮咸譏聲髙近哀思不合中和朂以其異已出咸為始平相晉又改魏昭武舞曰宣武舞羽籥曰宣文舞是時又有鼙舞歌詩五篇一曰洪業篇當魏曲明明魏皇帝古曲闗中有賢女二曰天命篇當魏曲太和有聖帝古曲章和二年中三曰景皇篇當魏曲魏歴長古曲樂久長四曰大晉篇當魏曲天生蒸民古曲四方皇五曰明君篇當魏曲為君不易古曲殿前生桂樹乂有鐸舞歌一篇幡舞歌一篇鼓舞伎六曲竝陳於元㑹咸寧元年詔定祖宗之號而廟樂乃停宣武宣文二舞而同用荀朂所使郭瓊宋識等所造正徳大豫二舞太康中天下為晉世寧舞矜手以接杯拌反覆之漢世惟有拌舞而晉加之以杯反覆之惠帝元康三年詔黄門侍郎荀藩修定金石以施郊廟藩朂之子朂既以新律造二舞又更修正鐘磬事未竟而朂薨乃詔藩修定尋値䘮亂遺聲舊制莫有記者元帝建武元年初立宗廟尚書下太常祭祀所用樂名太常賀循答云魏氏増損漢樂以為一代之禮未審大晉樂名所以為異遭離喪亂舊典不存然此諸樂皆和之以鍾律文之以五聲詠之於歌辭陳之於舞列宫縣在庭琴瑟在堂八音迭奏雅樂竝作登歌下管各有常詠周人之舊也自漢氏以來依放此禮自造新詩而已舊樂荒廢今既散亡音韻曲折又無識者則於今難以意言于時以無雅樂器及伶人省太樂幷鼓吹明帝大寧末以元帝時頗得登歌食舉之樂猶有未備又訪阮孚等増益之成帝咸和中乃復置太樂官鳩集遺逸而未有金石也咸康七年尚書蔡謨奏八年正㑹儀注唯作鼓吹鐘鼓其餘伎樂盡不作侍中張澄給事黄門侍郎陳逵駮以為王者觀時設教至於吉凶殊㫁不易之道也今四方觀禮陵有儐弔之位庭奏宫懸之樂二禮兼用哀樂不分體國經制莫大於此詔曰今既以天下體大禮從權宜三正之饗宜盡用吉禮也至娛耳目之樂所不忍聞故闕之耳事之大者不過上夀酒稱萬嵗已許其大不足復闕鐘鼓鼓吹也澄逵又啟今大禮雖降事吉於朝然儐弔顯於園陵則未減有哀禮服定於典文義無盡吉是以咸寧之㑹有徹樂之典實先朝稽古憲章垂式萬世者也詔曰若元日大饗萬國朝宗庭廢鐘鼓之奏遂闕起居之節朝無磬制之音賔無蹈履之度其於事義不亦闕乎亦惟有量輕重以制事中散騎侍郎顧臻表曰臣聞聖主作樂讚揚聖道養以仁義防其淫佚上享宗廟下訓黎元體五行之正音恊八風以陶物宫聲正方而好義角聲堅齊而率禮絃歌鐘鼔金石之作備矣故通神至化有率舞之感移風易俗致和樂之極末世之伎設禮外之觀逆行連倒頭足入筥之屬皮膚外剝肝心内摧敦彼行葦猶謂勿踐矧伊生靈而不惻愴加四海朝覲言觀帝庭耳聆雅頌之聲目覩威儀之序足以蹋天頭以履地反天地之至順傷彛倫之大方今敵人對岸外禦為急兵食七升忘身赴難過泰之戲日廩五升方掃神州經畧中甸若此之事不可示逺宜下太常纂備雅樂簫韶九成惟新於盛運功徳頌聲永著于來葉此乃所以燕及皇天克昌厥後者也諸伎而傷人者皆宜除之流簡儉之徳邁康哉之詠清風既行下應如草此之謂也愚管之誠惟垂採察於是除髙絙紫鹿跂行鼈食及齊王捲衣笮兒等樂又減其廩其後復髙絙紫鹿焉穆帝永和十一年謝尚鎮夀陽於是採拾樂人以備太樂并制石磬雅樂始具江表始有金石之樂自尚始也晉氏之亂也樂人悉沒于兵及其後鄴樂人頗有來者尚因之以具鐘磬孝武太元中破苻堅獲其樂工揚蜀等閑習舊樂於是四廟金石始備焉乃使曹毗王詢等増造宗廟歌詩然郊祀遂不設樂宋髙祖永初元年七月有司奏皇朝肇建廟祀應設雅樂太常鄭鮮之等八十八人各撰立新歌黄門侍郎王韶之所撰歌辭七首竝合施用詔可一云韶之造四夏四章行禮一章登歌二章食舉十章前後舞歌各一章十二月有司奏依舊正旦設樂參詳屬三省改太樂諸歌舞詩黄門侍郎王韶之立三十二章合用教試日近宜逆誦習輒申攝施行制可又改正徳舞曰前舞大豫舞曰後舞文帝元嘉九年太樂令鍾宗之更調金石十四年治書史史奚縱又改之十三年司徒彭成王義康於東府王㑹依舊給伎摠章工馮大列相承給諸王伎十四種其舞伎三十六人太常傅隆以為未詳此人數所由唯杜預注左傳八佾舞云諸侯六六三十六人嘗以為非夫舞者所以節八音者也八音克諧然後成樂必以八人為列自天子至士降殺以兩兩者減其二列耳預以為一列又減二人至士止餘四人豈復成樂案服䖍注傳云天子八八諸侯六八大夫四八士二八其義甚允今諸侯王不復舞佾其摠章舞伎即古之女樂也殿庭八八諸王則應六八理例坦然又春秋鄭伯納晉悼公女樂二八晉以一八賜魏絳此樂以八人為列之證也若如議者唯天子八則鄭應納晉三六晉應賜絳一六也自天子至士其文物典章尊卑差級莫不以兩未有諸侯既降二列又列輒減二人近降大半非唯八音不具於兩義亦乖杜氏之謬可見矣國典事大宜令詳正事不施行十八年九月有司奏二郊宜奏登歌又議宗廟舞事錄尚書江夏王義恭等十二人立議未及列奏値軍興事寝二十二年南郊始設登歌詔御史中丞顔延之造郊天夕牲迎送神饗神歌詩三篇饗地神辭一篇餘與南郊同孝武孝建二年九月甲午有司奏前殿中曹郎荀萬秋案禮祭天地有樂者為降神也故易曰雷出地奮豫先王以作樂崇徳殷薦之上帝以配祖考周官曰作樂於圜丘之上天神皆降作樂於方澤之中地祗皆出又曰乃奏黃鍾歌大吕舞雲門以祀天神乃奏太簇歌應鍾舞咸池以祀地祗由斯而言以樂祭天地其來尚矣今郊享闕樂竊以為疑祭統曰夫祭有三重焉獻之屬莫重於祼聲莫重於升歌舞莫重於武宿夜此周道也至於秦舞五行魏舞咸熈皆以用享爰逮晉氏泰始之初傅𤣥作晉郊廟歌詩三十二篇元康中荀藩受詔成父朂業金石四縣用之郊廟是則承郊廟有樂之證也今廟祠登歌雖奏而象舞未陳懼闕備禮夫聖王經世異代同風雖損益或殊隆殺迭運未嘗不執古御今同規合矩方兹休明在辰文物大備禮儀遺逸㒺不具舉而況出祗降神輟樂於郊祭昭徳舞功有闕於廟享謂郊廟宜設備樂於是使内外博議驃騎大將軍竟陵王誕等五十一人竝同萬秋議尚書左僕射建平王宏議以為聖王之徳雖同創制之禮或異樂不相㳂禮無因襲自寳命開基皇符在運業富前王風動振古朝儀國章竝循先代自晉東遷日不暇給雖大典畧備遺闕尚多至於樂號廟禮未該徃正今帝徳再昌大孝御㝢宜討定禮本以昭來葉尋舜樂稱韶漢改文始周樂大武秦革五行眷夫祖有功而宗有徳故漢髙祖廟樂稱武徳太宗廟樂曰昭徳魏制武始舞武廟制咸熈舞文廟則祖宗之廟别有樂名晉氏之樂正徳大豫國初不更名宜為前後二舞依據晉代義舛事乖今宜釐改權稱凱容為韶舞宣烈為武舞祖宗廟樂摠以徳為名若廟非不毁則樂無别稱猶漢髙文武咸有嘉號惠景二主樂無餘名章皇太后廟依諸儒議唯奏文樂何休杜預范甯注初獻六羽竝不言佾者佾則干在其中明婦人無舞事也郊祀之樂無復别名仍同宗廟而已尋諸漢志永至等樂各有義況宜仍舊不改宋及東晉太祝唯送神而不迎神近議者云廟以居神常如在也不宜有迎送之事意以為竝乖其衷立廟居靈四時致享以申孝思之情矣夫神之升降無常何必常安所處故祭義云樂以迎來哀以送往鄭注云迎來而樂樂親之來送往而哀哀其享否不可知也尚書曰祖考來格詩云神保遹歸注曰歸於天地也此竝言神有去來則有送迎明矣即周肆夏之名備迎送之樂古以尸象神故儀禮祝有迎尸送尸近代雖無尸豈可闕迎送之禮又傅𤣥有迎神送神歌辭明江左不迎非舊典也散騎常侍丹陽尹建城縣開國侯顔竣議以為徳業殊稱則干羽異容時無􅆓制故物有損益至於禮失道諐稱習忘反中興釐運視聽所革先代謬章宜見刋正郊之有樂盖生周易周官歴代著議莫不援準夫掃地而祭器用陶匏唯質與誠以章天徳文物之備理固不然周官曰國有故則旅上帝及四望又曰四圭有邸以祀天旅上帝兩圭有邸以祀地旅四望四望非地則知上帝非天孝經云郊祀后稷以配天宗祀文王於明堂以配上帝則豫之作樂非郊天也大司樂職奏黄鍾歌大吕舞雲門以祀天神鄭注天神五帝及日月星辰也王者以夏正月祀其所受命之帝於南郊則二至之祀又非天地考之衆經郊祀有樂未見考證宗廟之禮事炳載籍爰自漢元迄乎有晉雖時或更制大抵相因為不襲名號而已今樂曲淪滅知音世希改作之事臣聞其語正徳大豫禮容具存宜殊其徽號飾而用之以正徳為宣化之舞大豫為興和之舞庶足以光表世烈悦被後昆前漢祖宗廟處各異主名既革舞號亦殊今七廟合食庭殿共所舞蹈之容不得廟有别制後漢東平王蒼已議之矣又王肅韓祗以王者徳廣無外六代四夷之舞金石絲竹之樂宜備奏宗廟愚謂蒼肅祗議合於典禮適於當今左僕射建平王宏又議竣據周禮孝經天與上帝連文重出故謂上帝非天則易之作樂為非祭天也案易稱先王以作樂崇徳殷薦之上帝以配祖考尚書云肆類于上帝春秋傳曰告昊天上帝凡上帝之言無非天也天尊不可以一稱故或謂之天或謂昊天或謂上帝或謂昊天上帝不得以天有數稱便謂上帝非天徐邈推周禮國有故則旅上帝是以知禮天旅上帝同是祭天言禮天者謂常祀也旅上帝者有故而祭也孝經稱嚴父莫大於配天故云郊祀后稷以配天宗祀文王於明堂以配上帝既天為義則上帝猶天益明也不欲使二天文同故變上帝耳周禮祀天之言再見故鄭注以前天神為五帝後冬至所祭為昊天竣又云二至之祀又非天地未知天地竟應以何時致享記云掃地而祭噐用陶匏皆明所用質素無容以樂降神萬秋謂郊宜有樂事有典據竣又云東平王蒼以為前諸祖别廟是以祖宗之廟可得各有舞樂至於祫祭始祖之廟則專用始祖之舞故後漢諸祖共廟同庭雖祖宗不宜入别舞此誠一家之意而未統適時之變也後漢從儉故諸祖共廟猶以異室存别室之禮晉室以來登歌誦美諸室繼作至於祖宗樂舞何獨不可迭奏茍所詠者殊雖復共庭亦非嫌也魏三祖各有舞樂豈復是異廟邪衆議竝同宏祀南郊迎神奏肆夏皇帝初登壇奏登歌初獻奏凱容宣烈之舞送神奏肆夏祠廟迎神奏肆夏皇帝入廟門奏永至帝詣東壁奏登歌初獻奏凱容宣烈之舞終獻奏永安送神奏肆夏詔可漢郊祀歌皆四言至是孝武使謝荘造辭荘依五行數木數用三火數用四土數用五金數用九水數用六按洪範五行一曰水二曰火三曰木四曰金五曰土月令木數八火數七土數五金數九水数六蔡邕云東方有木三土五故數八南方有火二土五故數七西方有金四土五故數九北方有水一土五故數六又有納音數一言得土三言得火五言得水七言得金九言得木若依洪範木數用三則應水一火二金四也若依月令金九水六則應木八火七也當以洪範一二之數言不成文故有取捨而使两義竝遵未詳以數立言為何依據也十月辛未有司又奏郊廟舞樂皇帝親奉初登壇及入廟詣東壁竝奏登歌不及三公行事左僕射建平王宏重參議公卿行事亦宜奏登歌有司又奏元㑹及二廟齊祠登歌伎舊竝於殿庭設作㝷廟祠依新儀注登歌人上殿管絃往下今元㑹登歌人亦上殿管絃在下竝詔可大明中以鞞拂雜舞合鍾石施於殿庭初文帝太后廟未有樂章至是使尚書左丞殷琰造新歌明帝時自改鞞舞曲歌辭幷詔近臣虞龢竝作順帝昇明二年尚書令王僧䖍上表曰臣聞風雅之作由來尚矣大者繫乎興喪其次著於率舞存於心而木石感鏗鏘奏而國俗移故鄭相出郊辨聲知戚延陵入聘觀樂知風是則音不妄啟曲豈徒奏歌唱既設休戚已徵清濁是均山琴自應斯乃天地之靈和升降之明節今帝道四達禮樂交通誠非寡陋所敢裁酌伏以三古缺聞六代濳響舞詠與日月偕湮精靈與雲煙俱滅追餘操而長懷撫遺噐而太息此則然矣夫鍾縣之噐以雅為用凱樂之制以八佾為體故羽籥擊拊以相諧應季氏獲誚將在於此今摠章舊佾二八之流袿服既殊曲律亦異推今較古皎然可知又歌鐘一肆亦克諧女樂以歌為稱非雅噐也大明中即以宫縣合和鞞拂節數雖㑹慮乖雅體將來知音或譏聖世若謂鐘舞己諧不欲廢罷别立歌鐘以調羽佾止於别宴不闗朝享四縣所奏謹依雅則斯則舊樂前典不墜於地臣昔己制歌磬猶在樂官具以副鐘配成一部即義沿理如或可安又今之清商實猶銅雀魏氏三祖風流可懷京雒相髙江左彌重諒以金縣干戚事絶於斯而情變聼改稍復零落十數年間亡者將半自頃家競新哇人尚謡俗務在噍危不顧律紀流宕無涯未知所極排斥典正崇長煩淫卿士有等差無故不可以用之禮樂有攸序長㓜不可以共聞故諠醜之製日盛於閭里風味之韻獨盡於衣冠夫川震社亡同靈畢戒哀思靡澷異世齊驩休咎徵殊而欣畏竝用竊所未譬也方今塵静畿中波恬海外雅頌得所實在兹辰臣以為宜命典司務勤課習緝理舊聲迭相開曉凡所遺漏悉使補拾曲全者禄厚藝敏者位優利以動之則思以自勸風以靡之可不順自革反本還源庶可跂踵詔曰僧䖍表如此夫鐘鼓既陳雅頌斯辨所以風感人祗化動翔泳頃金籥弛韻羽佾未凝正俗移風良在兹日昔阮咸清識王度昭竒樂緒増修異世同功矣便可付外遵詳裴松之為太子洗馬于時議立五廟樂松之以臧氏廟樂亦宜與四廟同南齊太祖初為齊王令司空禇淵造太廟登歌二章建元元年詔黄門侍郎謝超宗造廟樂歌詩十六章武帝永明二年尚書殿中曹奏太祖髙皇帝廟神室髙徳宣烈之舞未有歌詩郊應湏歌詩郊應湏歌辭穆皇后廟神室亦未有歌辭案傅𤣥云登歌廟異其文饗神七室同辭此議為允又尋漢世歌篇多少無定皆稱事立文竝多八句然後轉韻時有兩三韻而轉其例甚寡張華夏矦湛亦同前式傅𤣥改韻頗數更傷簡節之美近世王韶之顔延之竝四韻乃轉得賖促之中顔延之謝莊作三廟歌皆各三章章八句此於序述功業詳畧為宜今宜依之郊廟之日改降尊作主禮殊宗廟穆后母儀之化事異經綸此二歌為一章八句别奏事奉御行詔可尚書令王儉造太廟二室及郊配辭四年藉田詔驍騎將軍江淹造藉田淹製二章口勅付太樂歌之明帝建武二年雩祭明堂謝眺造辭一依謝荘梁髙祖初在雍鎮有童謡云襄陽白銅蹄反縳揚州兒識者言銅謂金蹄謂馬白金色也及義師之興兵以鐵騎揚州之士皆面縳果如謡言故即位之後更造新聲帝自為之詞三曲又令沈約為三曲以被管絃篤敬佛法又制善哉大樂大歡天道仙道神王龍王滅過惡除愛水㫁苦輪等十篇名為正樂皆述佛法又有法童子伎童子倚歌梵唄設無遮大㑹則為之天監元年下詔訪百寮曰夫聲音之道與政通矣所以移風易俗明貴辨賤而韶濩之稱空傳咸英之實靡託魏晋以來凌替滋甚遂使雅鄭混淆鐘石斯謬天人缺九變之節朝讌失四懸之儀朕昧旦坐朝思求厥㫖而舊事靡存未獲釐正寤寐有懷所為歎息卿等學術通明可陳其所見於是㪚騎常侍尚書僕射沈約奏答曰竊以秦代滅學樂經殘亡至於漢武帝時河間獻王與毛生等共採周官及諸子言樂事者以作樂記其内史丞王定傳授常山王禹劉向校書得樂記二十三篇與禹不同向别録有樂歌詩四篇趙氏雅瑟七篇師氏雅琴八篇龍氏雅琴百六篇唯此而已晉中經簿無復樂書别錄所載已復亡逸案漢初典章滅絶諸儒捃拾溝渠墻壁之間得片簡遺文與禮事相闗者即編次以為禮記非皆聖人之言月令取吕氏春秋中庸表記緇衣皆取子思子樂記取公孫尼子檀弓殘雜非方幅典誥之書也禮記是行已經邦之切故前儒不得不補綴以備事用樂書事大而用緩自非逢欽明之主制作之君不見詳議漢氏以來主非欽明樂既非人臣急事故言之者寡陛下以至聖之徳應樂推之符實宜作樂崇徳殷薦上帝而樂書云亡尋案無所宜選諸生分令尋討經史百家凡樂事無大小皆别纂録乃委一舊學撰為樂書以起千載絶文以定大梁之樂使五英懷慙六莖興愧是時對樂者七十八家咸多引流畧浩蕩其詞皆言樂之宜改不言改樂之法帝既素善鍾律詳悉舊事遂自制定禮樂又立為四品噐名之為通通受聲廣九寸宣聲長九尺臨岳髙一寸二分每通皆施三絃一曰𤣥英通應鍾絃用一百四十二絲長四尺七寸四分差强黃鍾絃用二百七十絲長九尺大吕絃用二百五十二絲長八尺四寸三分差弱二曰青陽通太簇絃用二百四十絲長八尺夾鍾絃用二百二十四絲長七尺五寸弱姑洗絃用一百四十二絲長七尺一寸一分强三曰朱明通仲吕絃用一百九十絲長六尺六寸六分弱㽔賔絃用一百八十九絲長六尺三寸二分强林鍾絃用一百八十絲長六尺四寸四曰白藏通夷則絃用一百六十八絲長五尺六寸二分弱南吕絃用一百六十絲長五尺三寸大强無射絃用一百一十九絲長四尺九寸九分强因以通聲轉推月氣悉無差違而還相得中又制為十二笛黄鍾笛長二尺八寸大吕笛長三尺六寸太簇笛長三尺四寸夾鍾笛長三尺二寸姑洗笛長三尺一寸仲吕笛長二尺九寸㽔賓笛長二尺八寸林鍾笛長二尺七寸夷則笛長二尺六寸南吕笛長二尺五寸無射笛長二尺四寸應鍾笛長二尺三寸用笛以冩通聲合古鍾玉律幷周代古鍾玉律竝皆不差於是被以八音施以七聲莫不和韻先是鼓吹宋齊竝用漢曲又充庭用十六曲髙祖乃去四曲畱其十二合四時也更制新歌以述功徳其第一漢曲朱鷺改為永紀謝言齊謝梁升也第二漢曲思悲翁改為賢首山言武帝破魏兵於司部肇王迹也第三漢曲艾如張改為桐栢山言武帝牧司王業彌彰也第四漢曲上之回改為道亡言東昏䘮道義師起樊鄧也第五漢曲雍離改為忱威言破加湖元勲也第六漢曲戰城南改為漢東流言義師克魯山城也第七漢曲巫山髙改為鶴樓峻言平郢城兵威無敵也第八漢曲上陵改為昏主恣淫慝言東昏政亂武帝起義平九江姑熟大破朱雀伐罪弔民也第九漢曲將進酒改為石首篇言義師平京城仍廢昏主定大事也第十漢曲有所思改為期運集言武帝膺籙受禪盛德化逺也十一漢曲芳樹改為於穆言大梁闡運君臣和樂休祚方逺也十二漢曲上邪改為惟大梁言梁徳廣運仁化洽也四年掌賓禮賀瑒請議皇太子元㑹出入所奏帝别制養徳之樂瑒謂宜名元雅迎送二傅亦同用之取禮一有元良萬國以貞之議明山賓嚴稹之及徐勉等以為周有九夏梁有十二雅此竝則大數為一代之曲今加一雅便成十三瑒又疑東宫所奏武帝下其議瑒以為天子為樂以賞諸矦之有徳者觀其舞知其徳況皇儲養徳春宫式瞻攸屬謂宜備大壯大觀二舞以言文武之徳帝從之於是改皇太子樂為元貞奏二舞是時禮樂制度粲然有序普通中薦蔬之後改諸雅歌勅蕭子雲製辭既無牲牢遂省滌雅牲雅云南郊舞奏黄鍾取陽始也北郊舞奏林鍾取隂始也明堂宗廟所尚者敬㽔賓是為敬之名復有隂生之義故同奏焉其南北郊明堂宗廟之禮加以登歌又勅蕭子雲改諸歌辭為相和五引則依五音宫商角徵羽為第次非隨月次也舊三朝設樂有登歌以其頌祖宗之功烈非君臣之所獻也於是去之三朝第一奏相和五引第二衆官入奏俊雅第三皇帝入閣奏皇雅第四皇太子發西中華門奏裔雅第五皇帝進王公奏發足第六王公降殿同奏寅雅第七皇帝入儲奏變服第八皇帝變服出儲同奏皇雅第九公卿上夀酒奏价雅第十太子入預㑹奏裔雅十一皇帝食舉奏需雅十二撤食奏雍雅十三設大壯武舞十四設大觀文舞十五設雅歌五曲十六設徘伎十七設鼙舞十八設鐸舞十九設拂舞二十設巾舞幷白紵二十一設舞盤伎二十二設舞輪伎二十三設刺長追花幢伎二十四設受猾伎二十五設車輪折脰伎二十六設長蹻伎二十七設須彌山黄山三峽等伎二十八設跳鈴伎二十九設跳劒伎三十設擲倒伎三十一設擲倒案伎三十二設青絲幢伎三十三設一撒花幢伎三十四設雷幢伎三十五設金輪幢伎三十六設白獸幢伎三十七設擲蹻伎三十八設獼猿幢伎三十九設啄木幢伎四十設五案幢呪願伎四十一設辟邪伎四十二設青紫鹿伎四十三設白武伎作訖將白鹿來迎下四十四設寺子遵安息孔雀鳳凰文鹿胡舞登連上雲樂歌舞伎四十五設縁髙絙伎四十六設變黃龍弄龜伎四十七皇太子起奏裔雅四十八衆官出奏俊雅四十九皇帝興奏皇雅陳髙祖永定中詔求宋齊故事太常卿周宏譲奏曰齊氏承宋咸用元徽舊式宗祀朝饗樂俱同唯北郊之禮頗有増益皇帝入壇門奏永至飲福酒奏嘉胙太尉亞獻奏凱容埋牲奏幽帝還便殿奏休成衆官竝出奏肅成此乃元徽所闕永明六年之所加也唯送神之樂宋孝建二年秋起居注云奏肆夏永明中改奏昭夏帝遂依之是時竝用梁樂惟改七室舞文帝天嘉元年始定圓丘明堂及宗廟樂都官尚書到仲舉權奏衆入出皆奏肅成牲入出奏引犧上毛血奏嘉薦迎送神奏昭夏皇帝入壝奏永至皇帝升陛奏登歌皇帝初獻及太尉亞獻光禄大夫終獻竝奏宣烈皇帝飲福酒奏嘉胙就燎位奏昭逺還便殿奏休成至太建元年定三廟之樂採梁故事第一奏相和五引各隨王月則先奏其鍾唯衆官入奏俊雅林鍾作太簇參應之取其臣道也鼓吹作皇帝出閣奏皇雅黄鍾作太簇夾鍾姑洗大吕皆應鼓吹作皇太子入至十字陛奏裔雅太簇作南吕參應之取其二月少陽也皇帝延王公登奏寅雅夷則作夾鍾應之取其月法也皇帝入宁變服奏皇雅黃鍾作林鍾參應之鼓吹作皇帝出宁及升坐皆奏皇雅竝如變服之作上夀酒奏介雅太簇作南吕參應之取其陽氣盛長萬物輻輳也食舉奏需雅㽔賓作大吕參應之取火主於禮所謂食我以禮也撤饌奏雍雅無射作中吕參應之取其津潤已竭也武舞奏大壯夷則作夾鍾參應之取七月金始王以其堅㫁也鼓吹引而去來文舞奏大觀姑洗作應鍾參應之三月萬物必榮取其布惠也鼓吹引而去來衆官出奏俊雅㽔賓作林鍾夷則南吕無射應鍾太簇參應之鼔吹作皇帝起奏皇雅黄鍾作林鍾夷則南吕無射參應之鼓吹作詞用宋曲宴准梁樂盖取人神不雜也制曰可五年詔尚書左丞劉平儀曹郎張崔定南北郊及明堂儀注改天嘉中所用齊樂盡以韶為名工就位定協律校尉舉麾大樂令跪贊云奏懋韶之樂降神奏通韶牲入出奏潔韶帝入壝及還便殿奏穆韶帝初再拜舞七徳工執干楯曲終復綴出就懸東繼舞九序工執羽籥獻爵於天神及太祖之座奏登歌飲福酒奏嘉韶就望燎奏報韶至六年十一月侍中尚書左僕射建昌矦徐陵儀曹郎中沈罕奏來年元㑹儀注稱舍人蔡景歴奏勅先㑹一日太樂展宫懸髙絙五案於殿庭客入奏相和五引帝出黄門侍郎舉麾於殿上掌故應之舉於階下奏康韶之樂詔延王公登奏變韶奉珪璧訖初引下殿奏亦如之帝興入便殿奏穆韶更衣又出奏亦如之帝舉酒奏綏韶進膳奏侑韶帝御茶果太常丞跪請進舞七徳繼之九序其鼓吹雜伎取晉宋之舊微更附益舊元㑹有黃龍變文康獅子之類太建初定制皆除之至是蔡景歴奏悉復設焉其制鼓吹一部十六人則簫十三人笳二人鼓一人東宫一部降三人簫減二人諸王一部又降一人減簫一庶姓一部又降一人復減簫一册府元龜卷五百六十六
