body:
  text: 冊府元龜卷四百六十五宋王欽若等撰臺省部識量夫深智内朗沈㡬獨運周物而不殆謀事而有成先見表於未形逺慮出於羣萃斯識量之謂也二漢而下臺省為多賢焉咸以雍容侍從周旋宥密典司政要總率官屬備預切近之問對關決中外之敷納故其僉諧之重是為俊選之首乃有藴天人之深識逹古今之治體洞悉情偽周知損益當詢謀之攸及或議論之並作而能斟酌當世之務揣摩敵人之心言必有中舉無遺策觀其鈎深致逺可施於乆大臨機制變足挫乎糾紛雖復用舍之有殊才志之相戾其於遺風嘉話皆足以聳來者之聽焉後漢宋均明帝時為尚書令性寛和不喜文法嘗以為吏能𢎞厚雖貪汙放縱猶無所害至於苛察之人身或亷法而巧黠刻削毒加百姓災害流亡所繇而作及在尚書嘗欲叩頭争之以時方嚴切故遂不敢陳帝後聞其言而追悲之鄭㤗字公業靈帝末何進輔政徵用名儒以泰為尚書侍郎加奉車都尉進將誅黃門欲召董卓為助泰謂進曰董卓彊忍寡義志欲無饜若借之朝政授之大事將肆其心以危朝廷以明公之威德㨿阿衡之重任秉意獨斷誅除有罪誠不待卓以為資援也且事留變生其監不逺又為陳時之要務進不能用乃棄官去謂潁川人荀攸曰何公未易輔也進尋見害卓果專權廢帝魏董昭字公仁文帝初即王位昭為侍中時征東大將軍曹休臨江在洞浦口自表願將鋭卒虎歩江南因敵取資事必克㨗若其無臣不湏為念帝恐休便渡江驛馬詔止時昭侍側因曰竊見陛下有憂色獨以休濟江故乎今者渡江人情所難就休有此志勢不獨行當湏諸將臧覇等既富且貴無復他望但欲終其天年保守禄祚而已何肯乘危自投死地以求徼幸茍覇等不進休意自沮臣恐陛下須有勅渡之詔猶必沉吟未便從命也是後無㡬暴風吹賊船悉詣休等營下斬首獲生賊遂迸散詔勅諸軍促渡軍未時進賊救船至劉曄文帝黃初元年為侍中詔問羣臣令料蜀主當為闗侯出報吳不衆議咸云蜀小國耳名將唯闗闗死軍破國内憂懼無縁復出􅁮獨曰蜀雖狹弱而彼之謀欲以威武自强勢必用衆以示其有餘且闗侯蜀主義為君臣恩猶父子闗死不能為興軍報敵於終始之分不足後蜀果出兵擊吳吳悉國應之而遣使稱藩朝臣皆賀獨曄曰吳絶在江漢之表無内臣之心久矣陛下雖齊德有虞然醜虜之性未有所感因難求臣必難信也彼必外廹内困然後發此使耳可因其窮襲而取之夫一日縱敵數世之患不可不察也備軍敗退吳禮敬轉廢欲興衆伐之曄諫帝以為彼新得志上下齊心而阻帶江湖必難倉卒帝不聽五年帝幸廣陵泗口命荆揚州諸軍並進會羣臣問孫權當自來不咸曰陛下親征權恐怖必舉國而應又不敢以大衆委之臣下必自將而來曄曰彼謂陛下欲以萬乗之重牽已而超越江湖者在於别將必勒兵待事未有進退也大駕停住積日權果不至帝乃旋師云卿策之是也司馬孚文帝時為黄門侍郎時孫權稱藩請送任子當遣前將軍于禁還乆而不至天子以問孚孚曰先王設九服之制誠以要荒難以德懷不以諸夏禮責也陛下承緒逺人率貢權雖未送任子于禁不至猶宜以寛待之畜養士馬以觀其變不可以嫌疑責譲恐傷懷逺之義自孫策至權奕世相繼惟强與弱不在一禁禁之未至當有他故耳後禁至果以疾遲留而任子竟不至衞臻文帝時為侍中吏部尚書帝幸廣陵行中領軍從征東大將軍曹休表得降賊辭孫權已在濡湏口臻曰權恃長江未敢抗衡此必畏怖偽辭耳考核降者果守將詐所作也及明帝即位後遷右僕射典選舉如前蔣濟遺臻書曰漢祖遇亡虜為上將周武拔漁父為太師布衣厮養可登王公何必守文試而後用臻答曰古人遺智慧而任度量湏考績而加黜陟今子同牧野於成康喻斷蛇於文景好不經之舉開拔竒之津使天下馳騁而起矣後加光禄大夫諸葛亮出斜谷征南上將朱然等軍已過荆城臻曰然吳之驍將必下從權且為勢以綴征南耳權果召然入居巢進攻合肥帝欲自東征臻曰權外示應亮内實觀望且合肥城固不足為慮車駕可無親征以省六軍之費帝到尋陽而權竟退幽州刺史毋丘儉上疏曰陛下即位以來未有可書吳蜀恃險未可卒平聊可以此方無用之士克定遼東臻曰儉所陳皆戰國細術非王者之事也吳頻歲稱兵㓂亂邊境而猶按甲養士未果㝷致討者誠以百姓疲勞故也且淵姓公孫名淵生長海表相承三世外撫戎夷内修戰射而儉欲以偏軍長驅朝至夕卷知其妄矣儉行軍遂不利孫資文帝黄初初為中書令明帝即位加散騎常侍尤見寵任時諸葛亮出在南鄭議者以為可因大發兵就討之帝意亦然以問資資曰昔武皇帝征南鄭取張魯陽平之役危而後濟又自徃拔出夏侯淵軍數言南鄭直為天獄中斜谷道為五百里石宂耳言其深險喜出淵軍之辭也又武皇帝聖於用兵察蜀賊棲於山巖視吳虜竄於江湖皆撓而避之不責將士之力不爭一朝之忿誠所謂見勝而戰知難而退也今若進軍就南鄭討亮道既險阻計用精兵又轉運鎮守南方四州遏禦水賊凢用十五六萬人必當復更有所發與天下騷動費力廣大此誠陛下所宜深慮夫守戰之力力役参倍但以今日見兵分命大將㨿諸要險威足以震懾强寇鎮静疆場將士虎睡百姓無事數年之間中國日盛吳蜀二虜必自罷弊帝由是止時吳人彭綺又舉義江南議者以為因此伐之必有所克帝問資資曰鄱陽宗人前後數有舉義者衆弱謀淺旋輙乖散昔文皇帝常宻論賊形勢言洞浦殺萬人得船千萬數日間船人復會江陵被圍歴月權裁以千數百兵住東門而其土地無摧解者是有法禁上下相奉持之明驗也以此推綺懼不能為權腹心大疾也綺果㝷敗亡帝又詔資曰吾年稍長又歴觀書傳中皆歎息無所不念圖萬年後計莫過使親人廣據職勢兵任又重今射聲校尉缺又欲得親人誰可用者資曰陛下思深慮逺誠非愚臣所及書傳所載皆聖聽所䆒向使漢高不知平勃能安劉氏孝武不識金霍付屬以事殆不可言文皇帝始召曹真還時親詔臣以重慮及至晏駕陛下即祚猶有曹休外内之望頼遭日月銜勒不傾使各守分職纎介不問以此推之親臣貴戚雖當㨿勢握兵宜使輕重素定若諸侯典兵力均衡平寵齊愛等則不相為服不相為服則意有異同今五營所領見兵常不過四百選授校尉如其軰類為有疇匹至於重大之任能有所維綱者宜以聖恩簡擇如平勃金霍劉章等一二人漸殊其威重使相鎮固於事為善帝曰然如卿言當為吾逺慮所圖今日可參平勃侔金霍雙劉章者其誰哉資曰臣聞知人則哲惟帝難之唐虞之聖凢所進用明試以功陳平初事漢祖絳灌等謗平有受金盜嫂之罪勃以吹簫引彊始事高祖亦未知名也高祖察其行跡然後知可付以大事霍光給事中二十餘年小心勤愼乃見親信日磾匈奴以至孝質直特見擢用左右尚曰妄取休屠兒而重貴之平勃雖安漢嗣其終勃被反名平劣自免於吕嬃之讒上官桀桑𢎞羊與霍光爭權㡬成禍亂此誠知人之不易為臣之難也又所簡擇當得陛下所親當得陛下所信誠非愚臣之所能識别劉劭明帝時為散騎常侍時聞公孫淵受孫權燕王之號議者欲留淵計吏遣兵討之劭以為昔袁尚兄弟歸淵父康康斬送其首是淵先世之効忠也又所聞虗實未可審知古者要荒未服修德而不征重勞民也宜加寛貸使有以自新後淵果斬送權使彌晏等首傅嘏齊王正始中為尚書常以為秦始罷侯置守設官分職不與古同漢魏因循以至于今然儒生學士咸欲錯綜以三代之禮禮𢎞致逺不應時務事與制違名實未附故歴代而不至於治者蓋繇是也欲改定官制依古正今遇帝室多難未能革易鍾毓齊王正始中為散騎侍郎大將軍曹爽盛夏興軍伐蜀蜀拒守軍不得進爽方欲增兵毓與書曰竊以為廟勝之策不臨矢石王者之兵有征無戰誠以干羽可以服有苖退舍足以納原寇不必縱吳漢於江闗騁韓信於井陘也見可而進知難而退蓋自古之政惟君侯詳之爽無功而還後高貴鄉公正元中毓為尚書諸葛誕反大將軍司馬文王議自詣壽春討誕會吳大將孫壹率衆降或以為吳新有釁必不能復出軍東兵已多可湏後間毓以為夫論事料敵當以已度人今誕舉淮南之地以與吳國孫壹所率口不至千兵不過三百吳之所失蓋為無㡬若壽春之圍未解而吳國之内轉安未可必其不出也大將軍曰善遂將毓行淮南既平為青州刺史後加將軍鍾會為黄門侍郎高貴鄉公甘露二年徵諸葛誕為司空時會䘮寧在家策誕必不從命馳白文王文王以事已施行不復追改後誕果反吳闞澤字德潤文帝時為中書令諸官司有所患疾帝欲增重科防以簡御臣下澤每曰宜依禮律其和而有正皆此類也晉荀朂字公會武帝時為中書監加侍中帝議遣王公之國帝以問朂朂對曰諸王公已為都督而使之國則廢方任又分割郡縣人心戀本必用嗷嗷國皆置軍官兵還當給國而闕邊守帝重使朂思之朂又陳曰如詔準古方伯選才使軍國各隨方面為都督誠如明㫖至於割正封疆使親疎不同誠為佳矣然分裂舊土猶懼多所揺動必使人心忽擾思惟竊宜如前若於事不得不時有所轉封而不至分割土域有所損奪者可隨宜節度其五等體國經逺實不成制度然但虗名其於實事畧與舊郡縣鄉亭無異若造次改奪恐不能不以為恨今方了其大者以為五等可湏後裁度凡事雖有乆而益善者若臨時或有不解亦不可忽帝以朂言為允多從其意時又門下啓通事令史伊羡趙咸為舍人對掌文法詔以問朂朂曰今天下幸頼陛下聖德六合為一望道化隆洽垂之將來而門下上稱程咸張惲下稱此等欲以文法為政皆愚臣所未逹昔張釋之諫漢文謂虎圏嗇夫不宜見用邴吉住車明調和陰陽之本此二人豈不知小吏之惠誠重惜大化也昔魏武帝使中軍司荀攸典刑獄明帝時猶以付内常侍以臣所聞明帝時唯有通事劉泰等官不過與殿中同號耳又頃言論者皆云省官减事而求益吏者相㝷矣多云尚書郎大令史不親文書乃委付書令史及幹誠吏多則相倚也增置文法之職適恐更耗擾臺閣臣竊謂不可張華為中書令時杜預畫平吳之計武帝未從後帝與華圍棊而預表適至華推枰歛手曰陛下聖明神武朝野清晏國富兵彊號令如一吳主荒滛驕虐誅殺賢能當令討之可不勞而定帝乃許之李熹武帝時為僕射時凉州虜寇邊熹唱義遣軍討之朝士謂出兵不易虜未足為患竟不從之後虜果大縱逸凉州覆没朝廷深悔焉杜預為度支尚書預以孟津渡險有覆没之患請建河橋于富平津議者以為殷周所都歴聖賢而不作者必不可立故也預曰造舟為梁則河橋之謂也及橋成武帝從百僚臨㑹舉觴屬預曰非君此橋不立對曰非陛下明臣亦不得施其㣲功山濤為尚書僕射武帝平吳之後詔天下罷軍役示海内大安州郡悉去兵大郡置武吏百人小郡五十人帝常講武于宣武塲濤時有疾詔乗歩輦從因與盧欽論用兵之本以為不宜去州郡武備其論甚精于時咸以濤不學孫吳而闇與之合帝稱之曰天下名言也而不能用及永寧之後屢有變難宼賊焱起皆以無備不能制天下遂大亂如濤言焉郄鑒明帝時為尚書令王敦專制内外危逼鑒遂與帝謀敦既而錢鳳攻逼京都假鑒節加衞將軍都督從駕諸軍事鑒以無益事實固辭不受軍號以尚書令領諸屯營及錢鳳等平温嶠上言請宥王敦佐吏鑒以為先王崇君臣之教故貴仗死之節昏亡之主故開待放之門王敦佐吏雖多逼廹然居逆亂之朝無出關之操凖之前訓宜加義責又奏錢鳳母年八十宜䝉全宥乃從之卞壼成帝時拜光禄大夫加散騎常侍時庾亮將徵蘇峻言於朝曰峻狼子野心終必為亂今日徵之縱不順命為禍猶淺若復經年為惡滋蔓不可復制此是鼂錯勸漢景帝早削七國事也當時議者無以易之壼固争謂亮曰峻擁彊兵多藏無頼且逼近京邑路不終朝一旦有變易為蹉跌宜深思逺慮恐未可倉卒亮不納壼知必敗與平南將軍温嶠書曰元規召峻意定懷此於邑温生足下奈此事何吾今所慮是國之大事且峻已出狂意而召之更速必縱其羣惡以向朝廷朝廷威力誠桓桓交湏接鋒履刅尚不知便可即擒不王公亦同此情吾與之争甚懇切不能如之何本出足下為外藩任而今恨出足下在外若卿在内俱諫必當相從今内外戒嚴四方有備峻㐫狂必無所至耳恐不能使無傷如何壼司馬任台勸壼宜畜良馬以備不虞壼笑曰以逆順論之理無不濟若萬一不然豈湏馬哉峻果稱兵荀蕤為尚書左丞咸和中桓温平蜀朝廷欲以豫章郡封温蕤言於帝曰若温復假王威北平河雒修復園陵將何以加此於是乃止王述海西公太和中遷散騎常侍尚書令每受職不為虗譲其有所辭必於不受其子坦之諫以為故事應譲述曰汝謂我不堪耶坦之曰非也但克譲自美事耳述曰既云堪何為復譲人言汝勝我定不及也初桓温平雒陽議欲遷都朝廷憂懼將遣侍中止之述曰温欲以虗聲威朝廷非事實也但從之自無所至事果不行又議欲移雒陽鐘簴述曰永嘉不競暫都江左方當蕩平區宇旋軫舊京若其不爾宜改遷園陵不應先事鐘簴温竟無以奪之王彪之為尚書僕射時豫州刺史謝奕卒簡文遽使彪之舉可以代奕者對曰當今時賢備簡高鑒簡文曰人有舉桓雲者君謂如何彪之曰雲不必非才然温居上流割天下之半其弟復處西藩兵權盡在一門亦非深根固蒂之宜也人才非可豫量但當令不與殿下作異者耳簡文頷曰君言是也車𦙍字武子為中書侍郎太元中議郊廟明堂之事武子以明堂之制既甚難詳且樂主於和禮主於敬故質文不同音器亦殊既茅茨廣厦不一其度何必守其形範而不𢎞本順時乎九服咸寧四野無塵然後明堂辟雍可光而修之時從其議宋何承天太祖時為尚書左丞元嘉中故司徒掾孔邈奏事未御邈已喪殯議者謂不宜仍用邈名更以見官奏之承天議曰既没之名不合奏者非有他義正嫌於近不祥耳奏事一却動經歲時盛明之世事從簡易曲嫌細忌皆應蕩除何尚之為吏部尚書劉湛誅後左衞將軍范曄任叅機密尚之察其意趣異常白太祖宜出為廣州若在内釁成不得不加以鈇鉞屢誅大臣有虧皇化帝曰始誅劉湛等方欲超昇後進曄事迹未彰便預相黜斥萬方將謂卿等不能容才以我為信受讒説但使共知如此不憂致變也􅁮後謀反伏誅蔡廓為禮部尚書太祖入奉大統尚書令傅亮率百僚奉迎廓亦俱行至潯陽遇疾不堪前亮將進路詣别廓謂曰滎陽在吳少帝被廢為滎陽王幽于吳郡宜厚加供奉滎陽不幸卿諸人有弑主之名欲立于世將可得耶時亮已與徐羡之議害少帝乃馳信止之信至已不及羡之大怒曰與人共計議云何纔轉背便賣惡於人及太祖即位謝晦將之荆州與廓别屏人問曰吾其免乎廓曰卿受先帝顧命任以社稷廢昏立明義無不可但殺二昆而以之北面挾震主之威㨿上流之重以古推今自免為難耳蔡興宗前廢帝時為吏部郎先是大明世奢侈無度多所造立賦調煩嚴徴役過苦至是發詔悉皆削除繇此紫極殿南北馳道之屬皆被毁壞自孝建以來至大明末凡諸制度罕有存者興宗於都座慨然謂顔師伯曰先帝雖非盛德至要以道始終三年無改古典所貴今殯宫始撤山陵未逺而凡諸制度興造不論是非一皆刋削雖復禪代亦不至爾天下有識當以此窺人師伯不能用興宗後為尚書右僕射徐州刺史薛安都據彭城反後遣使歸欵泰始二年冬遣鎭軍將軍張永率軍迎之興宗曰安都遣使歸順此誠不虗今宜撫之以和即安所蒞不過湏單車使及咫尺書耳若以重兵迎之勢必疑懼或能招引北虜為患不測叛臣釁重必宜翦戮則比者所宥亦已𢎞矣况安都外據强地密邇邊關考之國計尤宜馴養如前遂叛將生旰食之憂彭城險固兵强將勇圍之既難攻不可拔疆塞之虞二三宜慮臣為朝廷憂之時張永已行不見從安都聞大軍過淮嬰城自守要取魏軍永戰大敗又值寒雪死者十八九遂失淮北四州其先見如此初永敗聞至帝在乾明殿先召司徒建安王休仁又召興宗謂休仁曰吾慙蔡僕射以敗書示興宗曰我愧卿殷琰據壽陽為逆遣輔國將軍劉勔攻圍之四方既平琰嬰城固守帝使中書為詔譬琰興宗曰天下既定是琰思順之日陛下宜下手詔數行以相慰引今直使中書為詔彼必疑謂非眞非所以速清方難也不從琰得詔疑劉勔詐造果不敢降攻戰經時乆乃歸順南齊張融初仕宋孝武為攝祠倉部二曹倉曹以正月俗人所忌太倉為可開否融議不宜拘束小忌領軍劉勔戰死祠曹議帝應哭勔否融議宜哭於是始舉哀王融為中書郎時魏遣使求書朝議欲不與融上疏云若來之以文德賜之以副書漢家軌儀重臨畿輔司𨽻傳節復入關河武帝答曰吾意不異卿今所啓比相見更委悉事竟不行梁王規為中書黄門侍郎髙祖普通初陳慶之北伐剋復雒陽百僚稱賀規退曰道家有云非為功難成功難也羯宼游䰟為日已乆桓温得而復失宋武竟無成功我孤軍無援深入寇境威勢不接餽運難繼將是役也為禍階矣俄而王師覆没其識逹事機多如此類朱异為員外常侍普通五年大舉北伐魏徐州刺史元法僧遣使請舉地内屬詔有司議其虗實异曰自王師北討剋獲相繼徐州地轉削弱咸歸罪法僧法僧懼祻之至其降必非偽也髙祖乃遣异報法僧并勑衆軍應接授异節度既至法僧遵承朝旨如异策焉傅岐為中書通事舍人太清元年豫州刺史湞陽侯蕭淵明率衆伐彭城兵敗䧟魏二年淵明遣使還述魏人欲更通和好勅有司及近臣定議左衞朱异曰髙澄此意當復欲繼好不爽前和邊境已得靜宼息民于事為便議者並然之岐獨曰髙澄既新得志其勢非弱何事湏和此必是設間故令湞陽遣使令侯景自疑當以湞陽易景景意不安必圖禍亂今若許澄通好正是墜其計中且彭城去歲喪師渦陽復新敗退今使就和益示國家之弱若如愚意此和宜不可許朱异等固執髙祖遂從异議及遣和使侯景果有此疑累啓請追使勅但依違報之至八月遂舉兵反十月入宼京師請誅异三年遷中領軍舍人如故二月景于闕前通表乞割江右四州安置部下當解圍還鎮勅許之乃于城西立盟求遣宣成王出送岐固執宣成嫡嗣之重不宜許乃遣石城公大欵送之及與景盟訖城中文武喜躍望得解圍岐獨言於衆曰賊舉兵為逆未遂求和夷情獸心必不可信比和終為賊所詐也衆兵怨恠之及景背盟莫不歎服陳毛喜為五兵尚書參掌選事及衆軍北伐得淮南地喜陳安邊之術髙宗納之即日施行又問喜曰我欲進兵彭汴於卿意如何喜對曰臣實非智者安敢預兆未然竊以淮左新平邊疆未乂周氏始吞齊國難與爭鋒豈以弊卒疲兵復加深入且棄舟楫之工踐車騎之地去長就短非吳人所便臣愚以為不若安民保境寢兵復約然後廣募英竒順時而動斯乆長之術也宣帝不從後吳明徹䧟于周帝謂喜曰卿之所言驗於今矣後魏公孫􅃉為南部尚書時孝文與文明太后引見王公已下帝曰比年方割畿内及京城三部於百姓頗有益否䆳對曰先者人民離散主司猥多至于督察實難齊整自方割以來衆賊易辯實有大益太后曰諸人多言無益卿言可謂識治機矣宋弁為散騎侍郎孝文曾論江左事因問弁曰卿比南行入其隅隩彼政道云何興亡之數可得知不弁對曰蕭氏父子無大功于天下既以逆取不能順守德政不理徭役滋劇内無股肱之助外有怨叛之民以臣觀之必不能貽厥孫謀保有南海若勿殫其威身免為幸臣欽若等曰其后南齊武帝之后明帝以族子嗣立髙武諸子誅戮皆盡王叡為尚書令時沙門法秀謀逆事發多所牽引叡曰與其殺不辜寧赦有罪宜梟斬首惡餘從疑赦不亦善乎孝文從之得免者千餘人李平宣武時為散騎常侍前來良賤之訟多有積年不决平奏不問眞偽一以景明年前為限於是獄訟止息武川鎮民饑鎮將任欵請貸未許擅開振恤有司䋲以費散之條免其官爵平奏欵意在濟人心無不善宣武原之張普惠孝明時為尚書右丞梁武帝弟子西豐侯正德詐稱降欵朝廷遣使徃迎普惠上疏請付揚州移還蕭氏不從俄而正德果逃還韓子熈為黄門時爾朱榮擒葛榮送至京師莊帝欲面見數之子熈以為榮元兇自知必死恐或不遜無宜見之爾朱榮聞而大怒請罪子熈莊帝恕而不責北齊陳元康為散騎常侍初魏朝授世宗相國齊王世宗頻譲不受乃召諸將及元康等密議之諸將皆勸世宗恭膺朝命元康以為未可又謂魏收曰觀諸人但專欲誤王我向已啓若王受命朝置官僚元康叨忝或得黄門郎但時事未可耳封隆之為侍中時髙祖自雒還師于鄴隆之將赴都因過謁見啓髙祖曰斛斯椿賀拔勝賈顯智等徃事爾朱仲逺中復乖阻及討仲逺又與之同猜忍之人志欲無限又叱列延慶侯念賢皆在京師王授以名位此等必搆祻隙髙祖經宿乃謂隆之曰侍中昨言實是深慮魏收為中書監時武成未發喪在内諸公以後主即位有年疑於赦令諸公引收訪焉收固執宜有恩澤乃從之馮子琮為給事黄門侍郎武成既禪位復駐在晉陽既居舊殿少帝未有别所詔子琮監造大明宮宮成武成親自廵幸恠其不甚宏麗子琮對曰至尊幼年纂承大業欲令執行節儉以示萬邦兼此北連天闕不宜過復崇峻武成稱善及武成晏駕僕射和士開先嘗侍疾秘喪三日不發子琮問士開不發喪之意士開引神武文襄皆秘喪不舉至尊年少恐王公有二心意欲盡追集凉風堂然後與公羣議時太尉録尚書事趙郡王叡先嘗居内預帷幄之謀子琮素知士開忌叡及領軍臨淮王婁定逺恐其矯遺詔出叡外任奪定逺禁衞之權因答云大行神武之子今上又見先皇傳位羣臣富貴者皆是至尊父子之恩但令在内貴臣無一改易王公以下必無異望世異事殊不得與覇朝相比且公出門經數日升遐之事行路皆傳乆而不舉恐有他變於是乃發喪後周王悦為左丞乆居管轄頗獲時譽侯景據河南來附仍請兵為援文帝先遣韋法保賀蘭碩德等帥衆助之悦言於帝曰侯景於髙歡始則篤鄉黨之情末乃定君臣之契位居上將職重台司論其分義有同魚水今歡始死景便離貳豈不知君臣之道有違忠義之禮不足蓋其圖既大不䘏小嫌然尚能背德於髙氏豈肯盡節于朝廷今若益之以勢援之以兵非惟侯景不為池中之物亦恐朝廷貽笑將來也帝納之乃遣追法保等而景㝷叛崔猷為司會中大夫及陳將蔡皎來附晉公護議欲南伐公卿莫敢言猷獨進曰前歲東征死傷過半比雖加撫循而創痍未復近者長星為災乃上𤣥所以埀鑒誡也豈可窮兵黷武而重其譴負哉護不從水軍果敗于翼為右官伯明帝雅愛文史立麟趾學士在朝有藝業者不限貴賤皆預聽焉及蕭撝王褒等與卑鄙之徒同為學士翼言於帝曰蕭撝梁之宗子王褒梁之公卿今與趨走同儕恐非尚賢貴爵之義帝納之詔翼定其班次於是有等差矣隋李德林為内史令開皇元年勅令與于翼髙熲同修律令令班後蘇威每欲改易事條德林以為格式義須畫一縱令小有蹐駁非過蠧政害民者不可數有改張威乃止盧昌衡為尚書祠部郎髙祖常大集羣下令自陳功績人皆競進昌衡獨無所言左僕射高熲目而異之裴矩為黄門侍郎從煬帝在江都時義兵入闗帝令虞世基就宅問矩方略矩曰太原有變京畿不静遥為處分恐失事機惟願鑾輿早還方可平定唐封倫為内史侍郎髙祖常幸温湯行經秦始皇墓謂倫曰古者帝王竭生靈之力殫府庫之財營起山陵此復何益倫曰上之化下猶風之靡草自秦漢帝王盛為厚葬故百官衆庶競相遵倣凡是古冡丘封悉多藏珍寶咸見開發若死而無知厚葬深為虗費若魂而有識被發豈不痛哉高祖稱善謂倫曰從今之後宜自上逮下悉為薄葬杜楚客為給事中貞觀四年太宗與羣臣議安邊之事楚客率爾而進曰遠方殊域未洽聖化難以德懷易以威服陛下納其降附處之河南夷不亂華聞之前典以臣愚見必為後患存亡繼絶列聖通規事不師古難以長乆太宗甚嘉其言然國家方以懷柔為務未便從之魏徵為特進知門下省事貞觀十五年太宗謂侍臣曰朕聞太平後必有大亂大亂後必有太平今承大亂之後即是太平之運能安天下惟在得人公等既不能知朕又不可通識日復一日無得人之理今欲令人自舉于事何如魏徵曰知人者智自知者明知人既以為難自知誠亦不易臣恐妄稱者衆不可行也鄭惟忠中宗朝為黄門侍郎時議請禁嶺南家畜兵器惟忠曰夫為政不可革以習俗且吳都賦云家有鶴膝户有犀渠如或禁之豈無驚擾耶遂寢裴光庭開元中為兵部郎中𤣥宗將有事于岱岳中書令張説以大駕東廵京師空虗恐邉方乘間竊發議欲加兵守邊以備不虞召光庭謀其事光庭曰封禪者所以告成功也夫成功者恩惠無不及百姓無不安萬國無不懷今將告成而懼邉釁何以昭德也大興力役用備不虞則非安人也方謀會同而生戎心又非懷逺也有此三者則名實乖矣且諸蕃之國突厥為大贄幣徃來願修恩好有年矣若遣一使徵其大臣赴會必欣然聽命突厥受詔則諸番君長必相率而來我雖偃旗息鼓髙枕有餘矣説曰善吾所不及因奏而行之李揆肅宗時為禮部侍郎以主司取士多不考實特峻其隄防索其書䇿殊未知藝不至者居文史之囿亦不能摛其詞深昧求賢之意也及其試進士文章請于廷中設五經諸史及切韻本于牀而引貢士謂之曰大國選士但務得才經籍在此請恣尋檢繇是數日之間美聲上聞未及畢事遷中書侍郎平章事顔眞卿肅宗在靈武時為御史大夫洎鑾輿將復宮闕遣左司郎中李選先行陳告宗廟之禮有司撰祝文稱嗣皇帝眞卿為禮儀使謂崔器曰上皇在蜀可乎器遽奏改之中旨宣勞以為名儒逹識李栖筠代宗朝為給事中時禮部侍郎楊綰以進士科無鄉舉之行試詩賦長澆浮之道請置五經秀才科下廷議栖筠為中書舍人賈至給事中李廙議與綰同雖事寢不行而有識之士至今稱述焉李承德宗初為吏部郎中淮南黜陟使時梁崇義縱恣倨慢朝廷將加討伐李希烈揣知之上表數稱崇義過惡請率先誅討帝悦之每對朝臣多稱希烈忠誠承自黜陟廻因奏對帝又言之承奏曰希烈將軍討伐必有微勲但恐立功之後縱恣跋扈不受朝廷指揮必勞王師問罪帝初未之信無幾希烈既平崇義果有不順之迹帝思承言故驟加擢用未兩歲累拜同州刺史河中尹蕭復為户部尚書建中四年十月德宗避難于奉天以城隘不可乆住議幸鳯翔且依張鎰復聞之遽請見曰竊聞移幸鳯翔未審虗實帝曰有之復曰陛下大誤且鳳翔將士俱朱泚舊兵今泚悖逆此中必有同惡相濟者臣尚慮張鎰不能乆奈何擬幸鳳翔帝曰朕行計已決試為卿駐駕一日屬鳳翔後營將李楚琳殺張鎰自為節度使乃止盧羣貞元中為侍御史有人誤告故尚父子儀嬖人張氏宅中有寶玉者張氏兄弟又與尚父家子孫相告訐詔促其獄羣上奏言張氏以子儀在時分財子弟不合争奪然張氏宅與親仁宅皆子儀家事子儀有大勲伏望陛下赦而勿問使私自引退帝從之時人賞其識大體也許孟容憲宗時為吏部侍郎㑹元和十年六月盜殺宰相武元衡并傷議臣裴度時淮夷逆命兇威方熾王師問罪未有成功言事者繼上章疏請罷兵及是盜賊竊發人情愈惑孟容詣中書雪涕而言曰昔漢廷有一汲黯耳姦臣尚為寢謀今主上英聖朝廷未有過失而狂賊敢爾無狀寧謂國有人乎然轉禍為福此其時也莫若上聞起裴中丞為相令主兵柄大索賊黨窮其姦源後數日度果為相下詔行誅時謂孟容論議有大臣風采令狐楚為左僕射時王涯等新誅楚請前所誅罪人願給衣衾槥櫝以順陽和之氣詔從之明年上巳於曲江宴百僚楚以新誅大臣不宜有樂疏奏不納因稱疾不赴宴議者美之魏謩為御史中丞兼户部侍郎判水司事謩奏曰御史臺紀綱之地不宜與泉貨吏雜處乞罷中司專綜户部公事從之後唐蕭頃為右補闕時國歩艱難連帥倔强率多奏請欲立家廟于本鎮朝㫖將俞允頃上章論奏乃止冊府元龜卷四百六十五
