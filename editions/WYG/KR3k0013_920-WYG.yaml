body:
  text: 册府元龜卷九百二十宋王欽若等撰總録部讎怨第二宋沈穆夫及父警坐孫恩事逃匿先是宗人沈豫素無士行為警所疾至是聞穆夫豫亂逃蔵將免矣豫以告官警及穆夫弟仲夫任夫珮夫並遇害唯穆夫子淵子雲子田子林子夏子䖍子獲全謝晦為太尉主簿内外要任悉委之劉穆之遣使陳事晦往往多異同穆之怒曰公復有還時不及髙祖欲以為從事中郎以訪穆之穆之堅執不與終穆之世不遷穆之䘮問至髙祖哭之甚慟晦時正直喜甚自入閣内審穆之死問其日教出轉晦從事中郎沈璞以元㓙之亂疾遂増篤不堪逺迎世祖義軍至新亭方得致身先是琅邪顔峻願交璞不酬其意峻以致恨及世祖將至都方有䜛説以璞奉迎之晚横罹其禍時年四十八始安王休仁文帝第十二子前廢帝嘗於休仁前使左右淫逼休仁所生母楊太妃左右並不得已順命以致右衛將軍劉道隆道隆懽以奉㫖盡諸醜狀眀帝即位以休仁為司徒尚書令揚州刺史時劉道隆為䕶軍休仁請求解職曰臣不得與此人同朝乃賜道隆死孟顗為㑹稽太守謝靈運以侍中退居郡中會稽東郭有廻踵湖靈運求决以為田太祖令州郡履行此湖去郭近水物所出百姓惜之顗堅執不與靈運既不得廻踵又求始寧岯崲湖為田顗又固執靈運謂顗非在利民正慮决湖多害生命言論毁傷之與顗遂搆讎隙劉瑀為吏部尚書與何偃有隙及瑀發背癰偃亦發背疽瑀疾已篤聞偃亡歡躍呌呼於是亦卒南齊沈文季宋司空慶之子也宋昇眀元年沈攸之反太祖加文季為冠軍將軍督吳興錢塘軍事攸之先為景和御史殺慶之至是文季收殺攸之弟新安太守登之誅其宗族王晏為吏部尚書以舊恩見寵時尚書令王儉雖貴而疏晏既領選權行臺閣與儉頗有隙儉卒禮官議謚帝欲依王導諡為文獻晏啓帝曰導乃得此諡但宋以來不加素族出謂親人曰平頭憲事已行矣張融為南陽王友融父暢先為丞相長史義宣事起暢為王𤣥謨所録將殺之時𤣥謨子瞻為南陽王前軍長史融啓求去官不許江祏為右僕射與弟侍中祀衛尉劉暄謀立江夏王寳𤣥廢東昏事發召祏入見停中書省直齋初袁文曠以王敬則勲當封祏執不與帝使文曠取祏以刀環築其心曰復能奪我封否祏祀同日被殺梁張𢎞䇿為髙祖雍州録事參軍從髙祖義師克京城為衛尉卿散騎常侍為東昏餘黨孫文眀所殺及文眀就擒張氏親屬臠食之鍾嶸為晉安王記室嶸嘗求譽於沈約約拒之及約卒嶸品古今詩為評言其優劣云觀休文衆製五言最優齊永眀中相王愛文王元長等皆宗附約于時謝朓未達江淹才盡范雲名級又㣲故稱獨歩故當辭密於范意淺於江盖追宿憾以此報約也頃之卒官劉孝綽為太子僕掌東宫記室與到溉到洽友善同遊東宫孝綽自以才優於洽每於宴坐嗤鄙其文洽深銜之及孝綽為廷尉卿擕妾入官府其母猶停私宅洽尋為御史中丞遣令史案其事遂劾奏之云擕少妹於華省棄老母於下宅髙祖為隠其惡改妹為姝坐免官孝綽弟時隨藩皆在荆雍乃與書論其不平者十事其辭皆鄙到氏又寫别本封呈東宫昭眀太子命焚之不開視也劉覽字孝智為尚書當官清正無所私姊夫御史中丞禇湮從兄吏部郎孝綽在職頗通贓貨覽劾奏並免官孝綽怨之嘗謂人曰犬嚙行路覽噬家人沈瑀為餘姚縣令大姓虞氏千餘家請謁如市前後令長莫能絶自瑀到非訟訴無所通其至者悉立之階下以法繩之縣南又有豪族數百家子弟縱横遞相庇廕厚自封殖百姓甚患之瑀召其老者為石頭倉監少者補縣僮皆號泣道路自是權右屏迹瑀初至富吏皆鮮衣美服以自彰别瑀怒曰汝等下縣吏何得自擬貴人耶悉使着芒屨粗布侍立終日足有蹉跌輙加榜捶瑀㣲時嘗自至此鬻瓦器為富人所辱故因以報焉由是士庶駭怨瑀㢘素自守故得遂行其意陳留異梁代為蟹浦戍主歴晉安安固二縣令侯景之亂還鄉里召募士卒東陽郡丞與異有隙引兵誅之及其妻子後魏奚斤世典馬牧父簞有寵於昭成皇帝時國有良馬為劉庫仁所盜簞聞而馳往取馬庫仁以國甥恃寵慙而逆擊簞簞捽其髮落傷其一乳及苻堅使庫仁與衛辰分領國部簞懼將家竄於民間庫仁求之急簞遂西奔衛辰及太祖滅衛辰簞晚乃得歸故名位後於舊臣公孫表燕郡人與渤海封愷友善後為子求愷從女愷不許表甚銜之及封氏為司馬叔璠所逮眀元以舊族欲原之表固證其罪乃誅封氏表為人外和内忌時人以此薄之後表為吳兵將軍攻滑臺不克又圍虎牢及車駕次汲郡太史令王亮奏表置軍虎牢東不得利便之地故令賊不時滅眀元雅好術數乃使人夜就帳中縊殺之初表本與王亮同營署及其出也輕侮亮故至於死李順為後將軍太武討赫連昌謂崔浩曰朕欲使李順總攝前驅之事卿以為何如浩曰順智足周務實如聖㫖但臣與之婚姻深知其行然性果於去就不可専委乃止初浩弟娶順妹又以弟子娶順女雖二門婚媾而浩頗輕順又弗之伏也由是潛相猜忌故浩毁之房崇吉初為宋眀帝太原太守戍升城其母叔在歴城為崔道固所拘繫及二城降俱至京師崇吉為歸安縣令頗懐昔憾與崔道固接事意甚不平後委縣出臺訟道固罪狀數條會赦不問崔孝芬為廷尉日章武王融以贓貨被劾孝芬案以重法及融為都督北討鮮于修禮於時孝芬弟孝演率勒宗從避賊於博陵郡城為賊攻陷尋為賊所害融乃密啓云孝演入賊為主遂見收捕合家逃竄遇赦乃出楊昱為中書舍人時靈太后嘗從容謂昱曰今帝年㓜朕親萬㡬然自薄徳化不能感親姻在外不稱人心卿有所聞慎勿諱隠昱於是奏揚州刺史李崇五車載貨恒州刺史楊鈞造銀食器十具並餉領軍元义靈太后召义夫妻泣而責之义深恨昱昱第六叔舒妻武昌王和之妹和即义之從祖父舒早䘮有一男六女及終䘮而元氏頻請别居昱父椿乃集親姻泣而謂之曰我弟不幸早終今男未婚女未嫁何怱怱便求離居不聽遂懐憾焉及元氏廢太后乃出昱為濟隂内史畢衆敬東平人少好弓馬射獵交結輕果常於疆境盜掠為業仕宋孝武為徐兗刺史辟為部從事孝武即位歴太山太守冗從僕射及眀帝立遣衆敬出詣兗州募人到彭城刺史薛安都召與密謀云晉安有上流之名且孝武第三子當共卿為計西徙乃矯眀帝命以衆敬行兖州事衆敬從之時兖州刺史殷孝祖留其妻子率文武二千人赴眀帝使司馬劉文石守城衆敬率衆取瑕兵殺文石安都與孝祖先不相協命衆敬誅孝祖諸子衆敬不得已遂殺之州内悉附唯東平太守申纂據無鹽城不與之同及眀帝平子勛授纂兖州刺史會安都引國援軍經其城下纂閉門城守深恨衆敬㑹有人發衆敬父墓遂令其母骸首散落衆敬發哀行服栲掠近墓細民死者十餘人又疑纂所為弟衆愛為安都長史亦遣人密至濟隂掘纂父墓以相報答及安都以城入國衆敬不同其謀子元賔以母并百口悉在彭城恐交致禍日夜啼泣遣請衆敬衆敬尤未從之衆従先已遣表謝宋宋眀授衆敬兖州刺史而以元賔有他罪獨不捨之衆敬拔刀砍柱曰皓首之年惟有此子今不原貸何用獨全及尉元至遂以城降元遣將入城事定衆敬悔恚數日不食皇興初就拜散騎常侍寧南將軍兖州刺史與中書侍郎李燦對為刺史慕容白曜攻尅無鹽申纂為亂兵所傷走出被擒送於白曜白曜無殺纂之意而城中火起纂創重不能避為火所焚死衆敬聞尅無鹽懼不殺纂乃與白曜書并表朝廷云家禍之酷皆由於纂聞纂死乃悦甄琛為侍中領中尉與黄門郎李憑以朋黨被召兼尚書元英邢巒窮其阿附之狀琛曽拜官諸賔悉集巒乃晚至琛謂巒曰卿何處放蛆来今晚始顧雖以言戲巒巒變色銜忿及此大相推窮琛遂免歸本郡髙謙之為國子博士初謙之弟道穆正光中為御史紏相州刺史李世哲事大相挫辱其家常以為憾至是世哲弟神軌為靈太后深所寵任值謙之家僮訴良神軌左右之入諷尚書判禁謙之於廷尉時將赦神軌乃啓靈太后發詔於獄賜死朝士莫不哀之朱瑞為車騎將軍爾朱榮死與爾朱世隆俱北走既而以莊帝待之素厚且見世隆終當䘮敗於路乃還帝大悦以為尚書左僕射西道大行臺慰勞爾朱天光既達長安㑹爾朱兆入雒後還京師都督斛斯椿先與瑞有隙數譛之於世隆世隆性多忌且以前日乖異忿恨更甚遂誅之北齊斛律光為左丞相嘗在朝堂垂簾而坐祖珽不知乗馬過其前光怒曰此人乃敢爾後珽在内省言聲髙慢光過聞之又怒珽知光怒賂其從奴搕頭曰自公用事相王每夜抱膝歎曰盲人用權國必破矣珽省事褚士達夢人倚户授其詩曰九升八合粟角斗定非真堰却津水中將留何處人以告珽占之曰角斗斛字津却水留何人合成律字非真者解斛律於我不實士達又言所夢狀乃其父形也珽由是懼又穆提婆求娶光庶女不許帝賜提婆晉陽之田光言於朝曰此田神武以来常種禾飼馬以擬寇難今賜無乃闕軍務也帝又以鄴清風園賜提婆租賃之於是官無菜賖買於人負錢三百萬其人訴焉光曰此菜園賜提婆是一家足若不賜提婆便百官足由是租穆積怨崔㥄初為常侍求人􅁱起居注或曰魏收可㥄曰收輕薄之徒更引祖鴻勲為之既居樞要又以盧元眀代收為中書郎由是收銜之及收聘梁過徐州㥄備刺史鹵簿而送之使人相聞收曰勿怪儀衛多稽古之力也收報曰崔徐州建義之勲何稽古之有㥄自以門閥素髙特不平此言收乗宿憾故以此挫之魏收初仕後魏為中書侍郎黄門崔㥄從齊神武入朝熏灼於世收初不詣門㥄為帝登祚敕云朕託體孝文收嗤其率直正員郎李慎以告之㥄深忿忌時節閔帝殂令收為詔㥄乃宣言收普泰世出入幃幄一日造詔優為辭㫖則義旗之士盡為逆人又收父老合解官歸侍南臺將加彈劾賴尚書辛䧺為言於中尉綦儁乃解收有賤生弟仲同先未齒録因此怖懼上籍遣還鄉扶侍後收既専典國史㥄恐被惡言乃悦之曰昔有班固今則魏子收笑而憾不釋後周楊寛與栁慶有隙武成二年慶除宜州刺史慶自為郎迄於司會府庫倉儲並其職也及在宜州寛為小冢宰乃因慶故吏欲求其罪失案騐積六十餘日吏或有死於獄者終無所言唯得錦數匹時人服慶㢘慎樂運為京兆丞時内史鄭譯嘗以私事請託運弗許譯因此銜之及隋文帝為丞相譯為長史遂左遷運為廣州滍陽令隋于顗初仕後周為廣州刺史尉逈之反也時總管趙文表與于顗素不協顗將圖之因卧閣内詐得心疾謂左右曰我見兩三人至我前者輙大驚即欲斫之不能自制也其有賔客候問者皆令去左右顗漸稱危篤文表往候之令從者至大門而止文表獨至顗所顗歘然而起抽刀斫殺之因唱言曰文表與尉逈通謀所以斬之其麾下無敢動者時髙祖以尉逈未平慮顗復生邊患因勞勉之唐李大恩為代州總管大恩常山人也家富於財見天下將亂致豪傑以為腹心與鷹揚郎將鄭乾廓府城鄰援嘗為乾廓所毁大恩求得其罪發使言於煬帝乾廓知之懼為所殺潛引土賊以圖大恩期有日矣大恩捕得其使因勒兵詐為山賊来詣乾廓城下乾廓不之覺輕騎来迎大恩執而殺之王溥為齊州都督托國公初從竇建徳在齊州溥遣使歸國及雒陽平盛彦師安輯徐兖溥率兵與彦師攻徐圓朗之湏昌縣徴軍糧於齊州刺史李義滿與溥有隙閉倉不與及下湏昌彦師收義滿繫齊獄髙祖聞之謂侍臣曰義滿忠誠朕之所悉此必溥所搆也遽令釋之而使未至義滿憂憤而卒溥旋經齊州頓於城内其夜義滿兄子武意執而殺之李襲譽為同州刺史坐在凉州隂憾畨禾縣丞劉武而杖殺之流於泉州未㡬而卒盧從愿為吏部侍郎典選六年因早朝塗中為人所射中其從者捕賊竟不獲時議從愿久在選司為被抑者所讐也楊炎肅宗時釋褐掌河西節度使書記先時神烏縣令李大簡因酒辱炎至是與大簡同在使府炎執縛大簡以鐵鞭撾之二百血流於地㡬死節度使吕崇賁愛其才不之問郝廷玉為幽州節度行軍司馬建中三年四月景子貶栁州司户要籍檢校大理少卿朱體㣲萬州南浦尉廷玉與朱泚同鄉里少友善初為小骨事安禄山泚為節度使累授軍司馬軍府之政動以咨之廷玉亦有吏能師人悦之泚判官鄭雲逵嘗忤廷玉廷玉白泚黜為莫州録事㕘軍雲逵與朱滔善復奏為判官因深搆廷玉於滔滔為泚留後事有請於泚廷玉又輙隳之體㣲亦蒙泚親信與廷玉密嘗從容言於泚曰滔非長者也不可以兵權付之滔竊知之後滔南討有功雲逵數激其怒乃抗表稱廷玉體㣲離間骨肉又累遺書於泚言廷玉體㣲罪惡請殺之泚不聽滔既反叛帝乃召泚示滔請殺二人表泚亦上其書故歸罪於廷玉等以悦滔滔終叛逆嚴郢為亰兆尹兼御史中丞時楊炎為相惡其異已誣以他罪削兼中丞及盧杞將傾炎炎既罷相乃引郢為御史大夫與協謀發炎罪及河中觀察使趙惠伯下御史臺獄箠楚無騐搆成其罪貶炎於崖州惠伯於費州郢既報怨過當人頗不直郢後得罪既至費州道左睹柩殯問其主名或曰趙惠伯之殯也郢黙然慙恧嵗餘而卒李㢲為湖南觀察使初竇參為宰相不悦於㢲自左司郎中出為常州刺史仍促其行不數月參貶郴州司馬郴即湖南屬郡也宣武軍節度使劉士寧代父為帥參嘗有助士寧素徳參之恩専使致幣於參㢲據奏其事云與節將交通徳宗遂殺參㢲性跋扈狡怨忌刻頗甚乗徳宗之怒謀殺參時人寃之令狐楚以宰相為憲宗山陵使以其下隠没官錢罷為宣州觀察使又貶為衡州刺史先是元稹為山陵使判官稹以他事求知制誥事欲就求楚薦之以掩其跡楚不應稹既得志深憾焉楚之再出稹頗有力復於詔中發楚在翰林及河陽舊事以詆訾之李宗閔為中書侍郎平章事太和七年李徳裕入相宗閔罷鎮興元其年十二月文宗暴風恙不能言者月餘八年正月十六日始力疾御紫宸見百僚宰臣進問安否上歎醫無名工者久之繇是王守澄進鄭注初注搆宋申錫事帝深惡之欲令京尹杖殺至是以藥稍效始善遇之守澄復進李訓善易其年秋帝欲以訓為諫官徳裕奏曰李訓小人不可在陛下左右頃年惡跡天下皆知無故用之必駭視聽帝曰人誰無過俟其悛改朕以逢吉所託不忍負言徳裕曰聖人有改過之義訓天性奸邪無悛改之理帝顧王涯曰商量别與一官遂授四門助教制出給事中鄭肅韓佽封還之王涯召肅面喻令下俄而鄭注亦自絳州至訓注惡徳裕排已九月十日復召宗閔於興元授中書侍郎平章事出徳裕為興元節度使徳裕中謝日自陳戀闕不願出藩追勑守兵部尚書宗閔奏制命已行不宜自便尋改檢校尚書右僕射潤州刺史鎮海軍節度蘇常潤等觀察使後唐崔協字文交父彦融與崔蕘素相友善彦融為萬年蕘謁於縣彥融未出有尺題在案皆賂遺於寺人矣蕘知其繇徑始惡其為人及彥融除司勲郎中蕘已為左丞通刺不見初以為戲再聞名於將命者蕘謂曰郎中行止鄙雜故非敢見丞相知之改楚州刺史卒於任誡其子曰世世無忘崔蕘故其子弟嘗云世讐協為兵部侍郎與中書舍人崔居儉相遇於幕次協厲聲而言曰崔蕘之子何敢相見居儉亦報之左降太子詹事朱漢賔莊宗時為左龍武統軍河中節度使朱友謙入朝時西軍未還閹伶用事害友謙者不一而漢賔伺知之時眀宗居雒陽以友謙故人置酒於第莊宗諸弟在席時友謙賜姓名繼麟坐在永王重霸之上酒酣漢賔以大觥奉友謙曰公雖名位髙坐於皇弟之上非宜也僕與公俱在梁朝以宗姓相厚自公入朝三發單函候問畧無報復忽於卑位不已甚乎元行欽恐其紛然乃解之曰素為昆仲今讓兄何也眀宗曰統軍亦湏飲大觥方止不數日友謙赤族晉王令崇為具州軍校天福八年自賊中至令温之弟也訴其舉家淪沒乃以令温為威勝軍節度鄧隨均房等州觀察處置等使又以具州都指揮使杜審澄為均州刺史以親族陷於寇難故也令温為麾下邵宗範剖心臠肉令衆噉之邵珂之子也初令温奉詔詣闕皆謂珂有異志乃以其子為帳内兵以質之冀珂惜其子而釋私憾珂素兇狠殊無所顧而令温覆族者自失其機斷也周許遷為單州刺史誤斷不合死罪人家詣闕致訟下開封府時陳觀知府素與遷不協深劾其事欲追遷對訟太祖以事猶可原但罷郡而已遷既入朝詬陳觀謂王峻曰相公當政所與叅議宜求賢徳如陳觀者為儒無士行為官多挟情茍知子細屠沽児恥與為侣况眀公乎峻無以沮之又於卿監幕次醜言備至既而嬰疾請歸天平而卒宋齊丘仕江南李景偽官至太傅中書令性倜儻不羈輕財好施頗為其國人所重及世宗南征吳人大懼時陳覺與李徴古皆齊丘門人因進説於景請退居後苑委國事於齊丘景繇是銜之初吳人遣鍾謨李徳眀奉表上世宗尋遣徳眀復命於金陵徳眀因説李景請割江北之地求和於我而陳覺李徴古等以徳眀為賣國請戮之景遂殺徳眀及江南内附世宗放鍾謨南歸謨本徳眀黨也思與復讐因言於景云齊丘當國危之際遣門人獻議欲因便以奪主位無人臣之禮景於是下偽制放齊丘歸九華山尋而幽死之陳覺李徴古並賜自盡册府元龜卷九百二十
