body:
  text: 冊府元龜卷八百九十宋王欽若等撰總錄部㳺説第五范雎字叔魏人秦昭王使王稽於魏王稽載雎入秦曰雎天下辯士也臣故載来秦王弗信使舍食草具待命嵗餘當是時昭王已立三十六年南拔楚之鄢郢楚懐王幽死於秦秦東破齊湣王嘗稱帝後去之數困三晉厭天下辯士無所信穣侯華陽君華一作葉昭王母宣太后之弟也而涇陽君高陵君皆昭王同母弟也穣侯相三人者更将有封邑以太后故私家富重於王室及穣侯為秦将且欲越韓魏而伐齊綱夀欲以廣其陶封范睢乃上書曰臣聞明主立政有功者不得不賞有能者不得不官勞大者其禄厚功多者其爵尊能治衆者其官大故無能者不敢當職焉有能者亦不得蔽隠使以臣之言為可願行而益利其道以臣之言為不可久留臣無為也語曰庸主賞所愛而罰所惡明主則不然賞必加於有功而刑必㫁於有罪今臣之胸不足以當椹質而要不足以待斧鉞豈敢以疑事嘗試於王哉雖以臣為賤人而輕辱獨不重任臣者之無反復於王前邪且臣聞周有砥砨宋有結綠梁有縣藜縣藜曰羙玉楚有和朴此四寳者土之所生良工之所失也而為天下名器然則聖王之所棄者獨不足以厚國家乎臣聞善厚家者取之於國善厚國者取之於諸侯天下有明主則諸侯不得善厚者何也為其割榮也良醫知病人之死生而聖王明於成敗之事利則行之害則捨之疑則少嘗之雖舜禹復生不能改已語之至者臣不敢載之於書其淺者又不足聴也意者臣愚而不概一作溉於王心邪亡其臣者賤而不可用乎自非然者臣願得少賜㳺觀之間望見顏色一語無効請伏斧質於是秦昭王大悦乃謝王稽使以傳車一云使持車召范雎於是范雎乃得見於離宫佯為不知永巷而入其中王来而宦者怒逐之曰王至范雎繆為曰秦安得王秦獨有太后穣侯爾欲以感怒昭王昭王至聞其與宦者争言遂延迎謝曰寡人宜以身受命乆矣㑹義渠之事急寡人旦暮自請太后今義渠之事已寡人乃得受命竊閔然不敏敬執賔主之禮范雎辭譲是日觀范雎之見者羣臣莫不灑然變色易容者秦王屏左右宫中虚無人秦王跽而請曰先生何以幸教寡人范雎曰唯唯有間秦王復跽而請曰先生何以幸敎寡人范雎曰唯唯若是者三秦王跽曰先生卒不幸教寡人邪范雎曰非敢然也臣聞昔者吕尚之遇文王也身為漁父而釣於渭濱爾若是者交疎也已説而立為太師載與俱歸者其言深也故文王遂収功於吕尚而卒王天下鄉使文王疎吕尚而不與深言是周無天子之德而文武無與成其王業也今臣覊旅之臣也交疏於王而所願陳者皆匡君之事處人骨肉之間願効愚忠而未知王之心也此所以王三問而不敢對者也臣非有畏而不敢言也臣知今日言之於前而明日伏誅於後然臣不敢避也大王信能行臣之言死不足以為臣患亡不足以為臣憂漆身為厲被髪為狂不足以為臣恥且以五帝之聖焉而死三王之仁焉而死五覇之賢焉而死烏獲任鄙之力焉而死成荆一作羗孟賁成荆古勇士孟賁衛人王慶忌呉越春秋曰吴王獠子慶忌夏育之勇焉而死或云夏育衞人力舉千鈞死者人之所必不免也處必然之勢可以少有補於秦此臣之所大願也臣又何患哉伍子胥槖載而出昭闗夜行晝伏至於陵水無以餬其口膝行蒲伏稽首袒肉鼔腹吹箎一作簫乞食於呉市卒興呉國闔閭為覇使臣得盡謀如伍子胥加之以幽囚終身不復見是臣之說行也臣又何憂箕子接輿漆身為厲被髪為狂無益於主假使臣得同行於箕子可以有補所賢之主是臣之大榮也臣有何恥臣之所恐者獨恐臣死之後天下見臣之盡忠而身死因以是杜口褁足莫肯鄉秦爾足下上畏太后之嚴下惑姦臣之態居深宫之中不離阿保之手終身迷惑無與昭姦大者宗廟滅覆小者身以孤危此臣之所恐爾若夫竆辱之事死亡之患臣不敢畏也臣死而秦治是臣死賢於生秦王跽曰先生是何言也夫秦國辟逺寡人愚不肖先生乃幸辱至於此是天以寡人慁先生亂先生也而存先王之宗廟也寡人得受命於先生是天所以幸先王而不棄其孤也先生奈何而言若是事無大小上及太后下至大臣願先生悉以教寡人無疑寡人也范睢拜秦王亦拜范雎曰大王之國四塞以為固北有甘泉谷南帶涇渭右隴蜀左關阪奮撃百萬戰車千乘利則出攻不利則入守此王者之地民怯於私闘而勇於公戰此王者之民也王并此二者而有之夫以秦卒之勇車騎之衆以治諸侯譬若馳韓盧而摶蹇兎也覇王之業可致也而羣臣莫當其位至今閉關十五年不敢觀兵於山東者是穣侯為秦謀不忠而大王之計亦有所失也秦王跽曰寡人願聞失計然左右多竊聽者范雎恐未敢言内先言外事以觀秦王之俯仰因進曰夫穣侯越韓魏而攻齊綱夀非計也少出師則不足以傷齊多出師則害於秦臣意王之計欲少出師而悉韓魏之兵也則不義矣今見與國之不親也越人之國而攻可乎其於計疎矣且昔齊湣王南攻楚破軍殺将再辟地千里而齊尺寸之地無得焉者豈不欲得地哉形勢不能有也諸侯見齊之罷弊君臣之不和也興兵而伐齊大破之士辱兵頓皆咎其王曰誰為此計者乎王曰文子為之大臣作亂文子出走故齊所以大破者以其伐楚而肥韓魏也此所謂借賊兵而齎盜糧者也王不如遠交而近攻得寸則王之寸也得尺亦王之尺也今釋此而逺攻不亦繆乎且昔者中山之國地方五百里趙獨吞之功成名立而利附焉天下莫之能害也今夫韓魏中國之處而天下之樞也王其欲覇必親中國以為天下樞以威楚趙楚彊則附趙趙彊則附楚楚趙皆附齊必懼矣齊懼必卑詞厚幣以事秦齊附而韓魏因可虜也昭王曰吾欲親魏乆矣而魏多變之國也寡人不能親請問親魏奈何對曰王卑詞重幣以事之不可則割地而賂之不可因舉兵而伐之王曰寡人敬聞命矣乃拜范雎為客卿謀兵事卒聽范雎謀使五大夫衛綰伐魏拔懐其後雎復說昭王曰秦韓之地形相錯如繡秦之有韓也譬如木之有蠧也人之有心腹之病也天下無變則已天下有變其為秦患者孰大於韓乎王不如收韓昭王曰吾故欲收韓韓不聽為之奈何對曰韓安得無聽乎王下兵而攻滎陽則鞏成臯之道不通北㫁太行之道則上黨之師不下王一興兵而攻滎陽則其國㫁而為三夫韓見必亡安得不聼乎若韓聴而覇事因可慮矣王曰善且欲發使於韓范睢日益親復説用數年矣因請間説曰臣居山東時聞齊之有田文不聞其有王也聞秦之有太后穣侯華陽高陵涇陽不聞其有王也夫擅國之謂王能利害之謂王制殺生之威之謂王今太后擅行不顧穣侯出使不報華陽涇陽等撃㫁無諱諱畏也高陵進退不請四貴備而國不危者未之有也為此四貴者下乃所謂無王也然則權安得不傾令安得從王出乎臣聞善治國者乃内固其威而外重其權穣侯使者操王之重決制於諸侯剖符於天下政適伐國莫敢不聽戰勝攻取則利歸於陶國弊御於諸侯戰敗則結怨於百姓而禍歸於社稷詩曰木實繁者披其枝披其枝者傷其心大其都者危其國尊其臣者卑其主崔杼淖齒管齊射王股擢王筋縣之於廟梁宿昔而死李兊管趙囚主父於沙丘百日而餓死今臣聞秦太后穣侯用事高陵華陽涇陽佐之卒無秦王此亦淖齒李兑之類也且夫三代所以亡國者君專授政縱酒馳騁弋獵不聴政事其所授者妬賢嫉能御下弊上以成其私不為主計而主不覺悟故失其國今自有秩以上至諸大吏下及王左右無非相國之人者見王獨立於朝臣竊為王恐萬世之後有秦國者非王子孫也昭王聞之大懼曰善於是廢太后逐穣侯高陵華陽涇陽君於闗外秦王乃拜范雎為相収穣侯之印使歸陶封范雎以應號為應侯范痤魏人虞卿謂趙王曰人情寧朝人乎寧朝於人也趙王曰人亦寧朝人耳何故寧朝於人虞卿曰夫魏為從主而違者范痤也今王能以百里之地若萬戸之都請殺范痤於魏范痤死則從事可移於趙趙王曰善乃使人以百里之地請殺范痤於魏魏王許諾使司徒執范痤而未殺也范痤獻書魏王曰臣聞趙王以百里之地請殺痤之身夫殺無罪范痤薄故也而得百里之地大利也臣竊為大王羙之雖然而有一焉百里之地不可得而死者不可復生也則王必為天下笑矣臣竊以為與其以死人市不若以生人市便也又遺其後相信陵君書曰夫趙魏敵戰之國也趙王以咫尺之書来而魏王輕為之殺無罪之痤痤雖不肖故魏之免相也嘗以魏之故得罪於趙夫國内無用臣外雖得地勢不能守然今能守魏者莫如君矣王聼趙殺痤之後強秦􅊞趙之欲倍趙之割則君将何以止之此君之累也信陵君曰善遽言之王而出之須賈為魏中大夫秦攻魏於華走芒夘入北宅魏㑹王五年與韓㑹宅陽而圍大梁賈為魏謂穣侯魏冉曰臣聞魏之大臣父兄皆謂魏王曰初時惠王伐趙戰勝乎三梁十萬之軍拔邯郸趙氏不割而邯郸復歸齊人攻燕殺子之破故國燕不割而燕國復歸燕趙之所以國全兵勁而地不并於諸侯者以其能忍難而重出地也宋中山數伐数割而隨以亡臣以為燕趙可法宋中山可為戒也夫秦貪戾之國也而無親蚕食魏氏又盡晉國戰勝暴子韓将暴鳶割八縣地未畢入而兵復出矣夫秦何厭之有哉今又走芒卯入北宅此非但攻梁也且刼王以求多割也王必勿聽也今王背楚趙而講秦楚趙怒而去王與王爭事秦秦必受之秦挟楚趙之兵以復攻梁則國求無亡不可得也已願王之必無講也王若欲講之以必少割而有質不然必見欺是臣之所聞於魏也願君以是慮事也周書曰惟命不于常此言幸之不可數也夫戰勝暴子而割八縣此非兵力之精非計之工也天幸為多矣今又走芒卯入北宅以攻大梁是以天幸自為常也知者不然臣聞魏氏悉其百縣勝兵以上戍大梁臣以為不下三十萬之衆守梁七仞之城臣以為雖湯武復生弗易攻也夫輕背楚趙之兵陵七仞之城戰三十萬之衆而志必舉之臣以為自天地之始分以至于今未嘗有之也攻而不能拔秦兵必罷陶邑必亡則前功必棄矣今魏方疑可以少割収也願君因楚趙之兵未至於大梁也亟以少割收魏魏方疑而得以少割為利必欲之則君得所欲矣楚趙怒於魏之先已講也必爭事秦從是以散而君後擇焉且君之嘗割晋國取地也何必以兵哉夫兵不用而魏效絳安邑又為陶開兩道㡬盡故宋衛必効尤憚秦兵已合而君制之何求而不得何為而不成臣願君之熟計而毋行危矣穣侯曰善乃罷梁圍蔡澤燕人㳺學於諸侯大小甚衆聞應侯范睢任鄭安平王稽皆負重罪於秦應侯内慙蔡澤乃西入秦将見昭王使人宣言以感怒應侯曰燕客蔡澤天下雄俊𢎞辯智士也彼一見秦王秦王必困君而奪君之位應侯聞曰五帝三代之事百家之說吾既知之衆口之辯吾皆摧之是惡能困我而奪我位乎使人召蔡澤蔡澤入則揖應侯固不快及見之又倨應侯因譲之曰子嘗宣言欲代我相秦寧有之乎對曰然應侯曰請聞其說蔡澤曰吁君何見之晚也夫四時之序成功者去夫人生百體堅强手足便利耳目聰明而心聖智豈非士之願與應侯曰然蔡澤曰質仁秉義行道施德得志於天下天下懐樂敬愛而尊慕之皆願以為君王豈不辯智之期與應侯曰然蔡澤復曰富貴顯榮成理萬物使各得其所性命夀長終其天年而不夭傷天下繼其統守其業傳之無竆名實純粹澤流千里世世稱之而無絶與天地終始豈道徳之符而聖人所謂吉祥善事者與應侯曰然蔡澤曰若夫秦之啇君楚之吴起越之大夫種其卒然亦可願與應侯知蔡澤之欲困已以說復謬曰何為不可夫公孫鞅之事孝公也極身無貳盧盡公而不顧私設刀鋸以禁姦邪信賞罰而致治披腹心示情素蒙怨咎欺舊友奪魏公子卬安秦社稷利百姓卒為秦擒將破敵攘地千里呉起之事悼王也使私不得害公䜛不得蔽忠言不取茍合行不取苟容不為危易行行義不辟難一云不困毁譽然為霸主彊國不辭禍凶大夫種之事越王也主雖困辱悉忠而不觧主雖絶亡盡能而弗離成功而弗矜貴富而弗驕怠若此三子者固義之至也忠之節也是故君子以義死難視死如歸生而辱不如死而榮士固有殺身以成名唯義之所在雖死無所恨何為不可哉蔡澤曰主聖臣賢天下之盛福也君明臣直國之福也父慈子孝夫信妻貞家之福也故比干忠而不能存殷子胥智而不能完呉申生孝而晉國亂是皆有忠臣孝子而國家滅亂者何也無明君賢父以聽之故天下以其君父為僇辱而憐其臣子今商君吳起大夫種之為人臣是也其君非也故世稱三子致功而不見德豈慕不遇世死乎夫待死而後可以立忠成名是微子不足仁孔子不足聖管仲不足大也夫人之立功豈不期於成全邪身與名俱全者上也名可法而身死者其次也名在僇辱而身全者下也於是應侯稱善蔡澤少得間因曰夫商君吳起大夫種其為人臣盡忠致功則可願矣閎夭事文王周公輔成王也豈不亦忠聖乎以君臣論之商君呉起大夫種其可願孰與閎夭周公哉應侯曰商君吴起大夫種弗若也蔡澤曰然則君之主慈仁任忠惇厚舊故其賢智與有道之士為膠漆義不倍功臣孰與秦孝公楚悼王越王乎應侯曰未知何如也蔡澤曰今王之親忠臣不過秦孝公楚悼王越王君之設智能為主安危修政治亂強兵批患折難廣地殖榖富國足家強主尊社稷顯宗廟天下莫敢欺犯其主主之威益震海内功彰萬里之外聲名光耀傳於千古君孰與商君吴起大夫種應侯曰不若蔡澤曰今王之親忠臣不忘舊故不若孝公悼王勾踐而君之功績愛信親幸又不若商君吴起大夫種然而君之禄位貴勝私家之富過於三子而身不退者恐患之甚於三子竊為君危之語曰日中則移月滿則虧物盛則衰天地之常數也進退盈縮與時變化聖人之常道也故國有道則仕國無道則隠聖人曰飛龍在天利見大人不義而富且貴於我如浮雲今君之怨已讐而德已報意欲至矣而無變計竊為君不取也且夫翠鵠犀象其處勢非不遠死也而所以死者惑於餌也蘓秦智伯之智非不足以辟辱逺死也而所以死者惑於貪利不止也是以聖人制禮節欲取於民有度使之以時用之有止故志不溢行不驕常與道俱而不失故天下承而不絶昔者齊桓公九合諸侯一匡天下至於葵丘之㑹有驕矜之志畔者九國呉王夫差兵無敵於天下勇强以輕諸侯陵齊晋故遂以殺身亡國夏育太史噭叱呼一作喑駭三軍然而身死於庸夫此皆乗至盛而不返道理不居卑退處儉約之患也夫商君為秦孝公明法令禁姦本尊爵必賞有罪必罰平權衡正度量調輕重決裂阡陌以靜生民之業而一其俗勸民耕農利土一室無二事力田畜積習戰陣之事是以兵動而地廣兵休而國富故秦無敵於天下立威諸侯成秦國之業功已成矣而遂以車裂楚地方數千里持㦸百萬白起率數萬之師以與楚戰一戰舉鄢郢以燒夷陵再戰南并蜀漢又越韓魏而攻彊趙北坑馬服誅屠四十餘萬之衆盡之于長平之下流血成川沸聲若雷遂入圍邯郸使秦有帝業楚趙天下之强國而秦之仇敵也自是之後楚趙皆懾服不敢攻秦者白起之勢也身所服者七十餘城功已成矣而遂賜劍死於杜郵吴起為楚悼王立法卑减大臣之威重罷無能廢無用損不急之官塞私門之請一楚國之俗禁㳺客之民精戰闘之士南收楊越北并陳蔡破横散從使馳說之士無所開其口禁朋黨以厲百姓定楚國之政兵震天下威服諸侯功已成矣而卒支解大夫種為越王深謀逺計免㑹稽之危以亡為存因辱為榮墾草入邑辟地殖榖率四方之士専上下之力輔勾踐之賢報夫差之讐卒擒勁吴令越成覇功已彰而信矣勾踐終負而殺之此四子者功成不去禍至於此此所謂信而不能詘往而不能返者也范蠡知之超然辟世長為陶朱公君獨不觀夫博者乎或欲大投或欲分功博縣於投不必在行謂投投瓊也此皆君之所明知也今君相秦計不下席謀不出廊廟坐制諸侯利施三川以實宜陽決羊腸之險塞太行之道又斬范中行之塗六國不得合從棧道千里通於蜀漢使天下皆畏秦秦之欲得矣君之功極矣此亦秦之分功之時也如是而不退則商君白公白起呉起大夫種是也吾聞之鍳於水者見靣之容鍳於人者知吉與凶書曰成功之下不可乆處四子之禍君何居焉君何不以此時歸相印譲賢者而授之退而巖居川觀必有伯夷之㢘長為應侯世世稱孤而有許繇延陵季子之譲喬松之夀孰與以禍終哉即君何居焉忍不能自離疑不能自決必有四子之禍矣易曰亢龍有悔此言上而不能下信而不能詘往而不能自反者也願君熟計之應侯曰善吾聞欲而不知止失其所以欲有而不知足失其所以有先生幸敎睢敬受命於是乃延入坐為上客後數日入朝言於秦昭王曰客新有從山東来者曰蔡澤其人辯士明於三王之事五伯之業世俗之變足以寄秦國之政臣之見人甚衆莫及臣不如也臣敢以聞秦昭王召見與語大恱之拜為客卿應侯因謝病請歸相印昭王彊起應侯應侯遂稱病篤范雎免相昭王新說蔡澤計畫遂拜為秦相東收周室蔡澤相秦數月人或惡之懼誅乃謝病歸相印號剛成君世均不知何許人秦召春平侯因留之世均為之請文信侯吕不韋曰春平侯者趙王之所甚愛也而郎中甚妬之故相與謀曰春平侯入秦秦必留之故謀而入之秦君今㽞之是空絶趙而郎中之計中也故君不如遣春平侯而留平都侯春平侯者言行於趙王必厚割趙以事君而贖平都侯文信侯曰善因與接意而遣之甘羅年十二事秦相文信侯吕不韋秦始皇帝使剛成君蔡澤於燕王喜使太子丹入質於秦秦使張唐往相燕欲與共伐趙以廣河間之地張唐謂文信侯曰臣嘗為秦昭王伐趙趙怨臣曰得唐者與百里之地今之燕必經趙臣不可以行文信侯不快未有以彊也甘羅曰君侯何不快之甚也文信侯曰吾令剛成君蔡澤事燕三年燕太子丹已入質矣吾自請張卿相燕而不肯行甘羅曰臣請行之文信侯叱曰去我身自請之而不肯汝焉能往之甘羅曰夫項槖生七嵗為孔子師今臣生十二嵗於此矣君其試臣何遽叱乎於是甘羅見張卿曰卿之功孰與武安君卿曰武安君南挫强楚北威燕趙戰勝攻取破城墮邑不知其數臣之功不如也甘羅曰應侯之用於秦也孰與文信侯専張卿曰應侯不如文信侯專甘羅曰卿明知其不如文信侯專與曰知之甘羅曰應侯欲攻趙武安君難之去咸陽七里而立死於杜郵今文信侯自請卿相燕而不肯行臣不知卿所死處矣張唐曰請因孺子行令装治行行有日甘羅謂文信侯曰借臣車五乗請為張唐先報趙文信侯乃入言之於始皇曰昔丼戊之孫甘羅年少爾然名家之子孫諸侯皆聞之今者張唐欲稱疾不肯行甘羅說而行之今願先報趙請許遣之始皇召見使甘羅於趙趙㐮王郊迎甘羅甘羅說趙王曰王聞燕太子丹入質秦歟曰聞之曰聞張唐相燕歟曰聞之燕太子丹入秦者燕不欺秦也張唐相燕者秦不欺燕也燕秦不相欺者伐趙危矣燕秦不相欺無異故欲攻趙而廣河間王不如齎臣五城以廣河間請歸燕太子與彊趙攻弱燕趙王立自割五城以廣河間秦歸燕太子趙攻燕得上谷三十城令秦有十一甘羅還報秦乃封甘羅以為上卿復以始甘戊田宅賜之李斯楚上蔡人入秦為秦相文信侯吕不韋舍人不韋賢之任以為郎李斯因以得說說秦王曰胥人者去其㡬也成大功者在因瑕釁而遂忍之昔者秦穆公之霸終不東并六國者何也諸侯尚衆周德未衰故五霸迭興更尊周室自秦孝公以来周室卑微諸侯相兼闗東為六國秦之乗勝役諸侯盖六世矣今諸侯服秦譬若郡縣夫以秦之彊大王之賢繇竈上騷除足以滅諸侯成帝業為天下一統此萬世之一時也今怠而不急就諸侯復彊相聚約從雖有黄帝之賢不能并也秦王乃拜斯為長史聴其計陰遣謀士齎持金玉以㳺說諸侯諸侯名士可下以財者厚遺結之不肯者利劍刺之離其君臣之計秦王乃使其良将随其後秦王拜斯為客卿會韓人鄭國来間秦以作注溉渠已而覺秦室宗大臣皆言秦王曰諸侯人来事秦者大抵為其主㳺間於秦爾請一切逐客李斯議亦在逐中斯乃上書曰臣聞吏議逐客竊以為過矣昔者繆公求士西取繇余於戎東得百里奚於宛迎蹇叔於宋求丕豹公孫支於晋此五子者不産於秦而繆公用之并國二十遂霸西戎孝公用商鞅之法移風易俗民以殷盛國以富彊百姓樂用諸侯親服獲楚魏之師舉地千里至今治彊惠王用張儀之計拔三川之地西并巴蜀北收上郡南取漢中包九夷制鄢郢東據成臯之險割膏腴之壌遂散六國之從使西靣事秦功施到今昭王得范雎廢穣侯逐華陽華一作菜強公室杜私門蠶食諸侯使秦成帝業此四君者皆以客之功繇此觀之客何負於秦哉向使四君却客而不内疏士而不用是使國無富利之實而秦無強大之名也今陛下致崑山之玉有隨和之寳垂明月之珠服太阿之劍乗纎離之馬纎離蒲植皆駿馬名建翠鳳之旗樹靈鼉之皷鼉皮可以冒皷此數寳者秦不生一焉而陛下說之何也必秦國之所生然後可則是夜光之璧不餙朝廷犀象之器不為玩好鄭衛之女不充後宫而駿馬駃騠不實外廐江南金錫不為用西蜀丹青不為采所以餙後宫充下陳娯心意說耳目者必出於秦然後可則是宛珠之簮傅璣之珥阿縞之衣錦繡之餙齊之東阿縣繒帛所出不進於前而隨俗雅化隨俗一作修使佳冶窈窕趙女不立於側也夫擊甕叩缻弹筝摶髀而歌呼嗚嗚快耳目者真秦之聲也鄭衛桑間昭虞舞象者異國之樂也昭一作韶今棄擊甕叩缻而就鄭衛退弹箏而取昭虞若是者何也快意當前適觀而已矣今取人則不然不問可否不論曲直非秦者去為客者逐然則是所重者在乎色樂珠玉而所輕者在乎人民也此非所以跨海内制諸侯之術也臣聞地廣者粟多國大者人衆兵強則士勇是以㤗山不譲土壌故能成其大河海不擇細流故能就其深王者不却衆庶故能明其德是以地無四方民無異國四時充美鬼神降福此五帝三王之所以無敵也今乃棄黔首以資敵國却賓客以業諸侯使天下之士退而不敢西向褁足不入秦此所謂藉寇兵而齎盗糧者也夫物不産於秦可寳者多士不産於秦而願忠者衆今逐客以資敵國損民以益讐内自虚而外樹怨於諸侯求國無危不可得也秦王乃除逐客之令復李斯官新序曰斯在逐中道上上諫書逹始皇始皇使人追至驪邑得還册府元龜卷八百九十
