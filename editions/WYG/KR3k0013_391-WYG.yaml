body:
  text: 冊府元龜卷三百九十一宋王欽若等撰將帥部習兵法申令示信示閒暇習兵法兵法者蓋出古司馬之職王公之武備也故言兵法者謂之司馬法焉繇太公以來能者間出踵而増之復有權謀形勢隂陽技巧之别是為四種繇是行師之道極其深趣矣大率用仁義禮譲者為之上以縱橫變詐者為之下歴代之為將者或達其善志臨敵而制勝或稽其要道著書以垂法篇籍斯著圖制咸在以至議論之流布部曲之講習皆可徴焉周太公望為武王師尚父師之尚之父之故曰師尚父伐紂謀居多撰六韜六卷後世之言兵皆宗太公為本隋唐志載太公隂謀一卷太公隂符鈐録一卷太公金匱二卷太公兵法六卷又太公雜兵書六卷太公伏符隂陽謀一卷太公書禁忌立成集二卷太公枕中記一巻孫叔敖為楚令尹晉荀林父帥師及楚子戰於邲楚人懼王之入晉軍也遂出陳孫叔敖曰進之寕我薄人無人薄我詩云元戎十乗以先啟行先人也元戎戎車在前也詩小雅言王者軍行必有戎車十乗在前開道先人為備軍志曰先人有奪人之心薄之也奪敵戰心田穰苴為大夫景公尊為大司馬穰苴死齊威王用兵行威大放穰苴之法而諸侯朝齊齊威王使大夫追論古者司馬兵法而附穰苴於其中因號曰司馬穰苴兵法隋書經籍志司馬穰苴兵法三卷公子無忌魏安釐王異母弟仁而下士魏王以上將軍印授公子逐秦軍威振天下諸侯之客進兵法公子皆名之故世俗稱魏公子兵法劉歆七畧有魏公子兵法二十一篇圖七卷藝文志魏公子兵法二十一篇圖十卷孫武齊人以兵法見於吳王闔閭闔閭曰子之十三篇吾盡親觀之矣可以小試勒兵乎對曰可闔閭曰可試以婦人乎曰可於是許之出宫中美人得百八十人孫子分為二隊以王之寵姬二人各為隊長皆令持㦸令之曰汝知而心與左右手背乎婦人曰知之孫子曰前則視心左視左手右視右手後即視背婦人曰諾約束既布乃設鈇鉞即三令五申之於是鼓之右婦人大笑孫子曰約束不眀申令不熟將之罪也復三令五申而鼓之左婦人復大笑孫子曰約束不眀申令不熟將之罪也既已眀而不如法者吏士之罪也乃欲斬左右隊長吳王從臺下觀見且斬愛姬大駭趣使使下令曰寡人非此二姬食不甘味願勿斬也孫子曰臣既已受命為將將在軍君命有所不受遂斬隊長二人以徇用其次為隊長於是復鼔之婦人左右前後跪起皆中規矩繩墨無敢出聲於是孫子使使報王曰兵既整齊王可試下觀之唯王所用雖赴水火猶可也吳王曰將軍罷休就舍寡人不願下觀孫子曰王徒好其言不能用其實於是闔廬知孫子能用兵卒以為將西破彊楚入郢北威齊晉顯名諸侯孫子與有力焉漢書藝文志孫子有兵法八十二篇圖九卷魏文帝註為三卷吳起魏人好用兵魏文侯問李克曰吳起何如人㦲克曰起貪而好色然用兵司馬穰苴不能過也於是魏文侯以為將擊秦拔五城文侯以起善用兵乃以為西河守藝文志吳起有兵法四十八篇孫臏與龎涓俱學兵法龎涓既事魏為將軍而自以為不能及孫臏疾之以法斷其两足而黥之齊威王以田忌為將孫臏為軍師大破梁軍孫臏以名顯天下世傳其兵法漢書藝文志載齊孫子八十九篇圖四卷公孫鞅為秦大良造秦官也將兵圍魏安邑䧏之有兵法二十七篇趙括自少時學兵法言兵事以天下莫能當常與其父奢言兵事奢不能難然不為善項梁楚名將項燕子也避仇吳中嘗隂以兵法部勒賔客子弟以知其能項羽少學書不成去學劒又不成季父梁怒之籍曰書足記姓名而已劒一人敵不足學學萬人敵爾於是梁竒其意乃敎以兵法籍大喜略知其意又不肯竟學漢韓信既破趙諸校効首虜休皆賀諸校諸部也猶今言諸營也効致也謂各致其所獲因問信曰兵法有右背山陵前左水澤今者將軍令臣等反背水陣曰破趙㑹食臣等不服然竟以勝此何術也信曰此在兵法顧諸君弗察爾顧念也兵法不曰䧟之死地而後生投之亡地而後存乎且信非得素拊循士大夫經所謂􅇌市人而戰之也經亦謂兵法也忽入市敺取其人令戰言非素所習其勢非致死地人人自為戰今即予生地皆走寕尚得而用之乎諸將皆服曰非所及也藝文志韓信兵法三篇廣武君李左車有兵法一篇趙充國始為騎士以六郡良家子六郡隴西天水安定北地上郡西河善騎射補羽林為人沈勇有大略少好將帥之節而學兵法通知四夷事馮奉世以良家子選為即年三十餘乃學春秋渉大義讀兵書前將軍韓増奏為軍司空令黥布反擊走荆王刼其兵渡淮擊楚楚發兵與戰徐僮間二縣之間也為三軍欲以相救為竒不聚一䖏分為三欲以相救出竒兵或說楚相曰布善用兵民素畏之且兵法諸侯自戰其地為散地謂在其本地戀土懐安故多逃散今别為三彼敗吾一餘皆走安能相救不聴布果破其一軍二軍散走後漢耿秉博通書記能說司馬兵法尤好將帥之略以父任為郎數上言兵事常以中國虚費邊陲不寕其患專在匃奴以戰去戰盛王之道顯宗既有志北伐隂然其言永平中詔詣省闥問前後所上便宜方略拜謁者僕射遂見親幸毎公卿㑹議帝引秉上殿訪以邊事多簡帝心馮緄少學春秋司馬兵法皇甫規安定朝那人也永和六年西羌圍安定郡將知規有兵略乃命為功曹使率甲士八百與羌交戰斬首數級賊遂退郤舉規上計椽馬援為伏波將軍善兵䇿帝常言伏波論兵與我意合毎有所謀未嘗不用魏鄧艾為征西將軍討蜀破姜維之衆維退守劍閣鍾㑹攻維未能克艾上言今賊摧折宜遂乗之從隂平繇邪徑經漢德陽亭趣涪出劒閣西百里去城都三百餘里竒兵衝其腹心劒閣之守必還赴涪則㑹方軌而進劍閣之軍不還則應涪之兵寡矣軍志有之曰攻其無備出其不意今掩其空虚破之必矣王昶為兖州刺史著兵書十餘篇言竒正之用青龍中奏之賈逵自為兒童戲弄常設部伍祖父習異之曰汝大必有將率才授兵法數萬言逵終豫州刺史蜀諸葛亮為丞相率衆南征在南中所在戰㨗聞孟獲者為夷漢所服募生致之既得使觀於營陣之間問曰此軍何如獲對曰吾向者不知虚實故敗今蒙賜觀看營陣若秪如此即定易勝爾亮笑縱使更戰七縱七擒而亮猶遣獲獲止不去曰公天威也南人不復反矣經籍志諸葛亮有兵法五卷吳朱才為偏將軍為人精敏文學兵法名聲殆聞於逺近晉陳勰特有才用解軍令武帝甚重兵官故軍校多選朝廷清望之士居之先是勰為魏文帝所倚帝為晉王委任使典兵事及蜀破後令勰受諸葛亮陣圖用兵倚伏之法又甲乙較標之勢勰悉諳練之遂以勰為殿中典兵中郎將桓温為安西將軍荆州刺史率衆伐蜀初諸葛亮造八陣圖於魚復平沙之上壘石為八行行相去二丈温見之謂此常山蛇勢也文武皆莫能識之宋沈攸之除東海太守未拜㑹四方反叛南賊已次近道以攸之為寕朔將軍尋陽太守率據虎檻時王元謨為大統未發前鋒有五軍在虎檻五軍後又終繹繼至毎夜各立姓號不相稟受攸之謂軍吏曰今衆軍姓號不同若有耕夫漁父夜相呵叱更致駭亂敗之道也乃就軍請號衆咸從之蜀李庠初至蜀趙廞深器之與論兵法無不稱善毎謂所親曰李立序蓋一時之關張也以為冠軍將軍宋王鎮惡初歸晉客居荆州頗讀諸子兵書論軍國大事騎乗非所長開弓亦甚弱而意略縱橫果决能斷梁杜龕崱第二兄岑之子少驍勇善用兵後歸元帝亦為忠武將軍後魏王宜弟為占授著作即造兵法孤虛立成圖三百六十源賀為征南將軍賀依古今兵法及先儒耆舊之說略採至要為十二陳圖以上之獻文覽而嘉焉賀拔岳尖山人能左右馳射驍果絶人不讀兵書而闇與之合識者咸異之斛律金字阿六敦朔州敕勒部人性敦直善騎射行兵用匃奴法望塵識馬歩多少嗅地知軍度逺邇江悦之初仕宋厯諸王參軍好兵書將略吳眀徹來㓂武成勑領軍尉破胡等出援秦州令琳為經畧悦之謂所親曰今太嵗在東南嵗星居牛斗分太白已髙皆利為客我將有䘮又謂破胡曰吾兵甚銳宜長䇿制之慎勿輕鬬破胡不從遂戰軍大敗琳单馬突圍僅以身免劉豐字豐生普樂人有雄姿壯氣果毅絶人有口辯好說兵事後周史寕為大將軍荆州刺史識諳兵權臨敵指揮皆如其䇿甚得當時之譽隋宇文欣為驃騎將軍封英國公欣妙解兵法馭戎齊整當時六軍有一善事雖非欣所建天下輒相謂曰此必英公法也其見推服者如此史萬嵗少英武好讀兵書兼精占候唐李靖少有文武材略其舅韓擒虎號為名將毎與論兵未嘗不稱善撫之曰可與論孫吳之術者惟斯人矣鄭元璹初仕隋為右候將軍後歸國為太常卿元璹少在戎旅乆閑軍法髙祖令廵諸軍敎其兵事裴行儉累為大總管安撫使置軍營行陣部統尅料勝負甄别器能等四十六訣則天令秘書監武承嗣詣宅並宻收入内行儉初為倉曹參軍時大將軍蘇定方甚竒之盡以用兵竒術授行儉魏元忠則天朝累年不調時有左史􅉦厔人江融撰九州設險圖備載古今用兵成敗之事元忠就傳其術王忠嗣以父海賓没於王事年九嵗養於宫中及長雄毅有武略𤣥宗以其兵家子與之論兵應對縱橫帝甚異之樊澤建中初為都官員外好讀兵書朝廷以其有將帥才尋兼御史中丞充和畨使後至山南節度使馬燧父季龍嘗舉眀孫吳俶儻善兵書官至嵐州刺史幽州經畧使燧略渉羣書尤善兵法大歴中為河東節度造甲者必令長短三等稱其所衣以便進趨又造戰車蒙以狻猊象列㦸於後行載兵甲止則為營陣或塞險阨以遏奔衝器械無不犀利後討魏博田恱恱求救於淄青恒冀燧軍次於漳恱遣將王光進以兵守長橋築月城以為固軍不得渡燧乃於下流以兵車數百乗維以鐵鏁絶中流實以土囊以遏水水稍淺諸軍畢渡是時軍糧少恱深壁不戰欲老燧師燧令諸軍持十日糧深進次倉口恱等夾洹水而軍李抱真等問曰糧少深入何也燧曰糧少利速戰兵法善於致人今田恱與淄青恒三軍為首尾計以老我師若分軍擊其左右兵少未可必破恱且來救是前後受敵也兵法所謂攻其必救固當戰也燧為諸軍合而破之郝廷玉代宗時為神䇿將軍時吐蕃回紇犯京畿廷玉率兵屯中渭橋軍容使魚朝恩聞廷玉善戰欲觀其敎閱廷玉乃於營内列部伍鳴鼓角而出分而為陣箕張翼舒乍離乍合坐作進退其衆如一朝恩歎曰吾在兵間十餘年始見郝將軍訓練耳治戎若此豈有前敵耶廷玉凄然謝曰此非末校所長是臨淮王之遺法也臨淮王李光弼也梁謝彦章㓜事葛從周為養父從周憐其敏慧敎以兵法嘗以千錢於大盤中列其行陣偏伍之狀示以出没進退之節彦章盡得其訣事太祖為騎將王擅少英悟美形儀好讀兵書洞曉韜略初太祖鎮大梁擅為小將趙珝字有郎㓜而剛毅器宇沉深既冠好書籍及壯工騎射尤精三略為忠武軍節度行軍司馬後唐周徳威初仕武皇為帳中騎督久在雲中諳熟邊事望烟塵之警懸知兵勢髙渤海蓨人少好兵術釋褐右金吾衞曹參軍李再豐為右武衞大將致仕再豐故鎮帥王鎔之禆校家世從軍再豐粗通星氣式法之學毎征伐戰陣自用其法鮮有敗失軍中目為李靖申令師出以律易象眀乎乃貞武之善經春秋著為嘉話在乎威克厥愛戒之用休示先甲後庚之期協三令五申之典金鼓有節稽進退之宜鈇鉞必誅懲驕惰之伍若乃申嚴示整出竒應卒約束素定防禁無越喻以激勸縣諸信賞所麾咸集所戰必勝或著為新令或脗合古法軍之善政其在斯乎宋義為楚上將號卿子冠軍北救趙下令軍中曰猛如虎狠如羊貪如狼強不可使者皆斬漢韓信髙祖三年為大將軍擊趙未至井陘口三十里止舍舍息也夜半傳𤼵傳令軍中使發也選輕騎二千人人持一赤幟旌旗之屬從間道萆山而望趙軍萆謂隱於山間使敵不得見也戒曰趙見我走必空壁逐我若直入拔趙幟立漢幟若汝也令其禆將𫝊餐曰今日破趙㑹食小飯曰餐破趙後乃當共飯食也諸將皆莫信陽應諾乃入趙壁擒王歇周勃髙后六年為太尉至北軍下令軍中曰為吕氏右袒為劉氏左袒軍中皆左袒勃子亞夫封條侯文帝後六年匃奴大入邊亞夫為將軍軍細柳以備胡帝自勞軍至灞上及棘門軍直馳大將軍下馬送迎已而之細柳軍軍士吏被甲銳兵刅彀弓弩持滿天子先驅至不得入先驅曰天子且至軍門都尉曰軍中但聞將軍令不聞天子詔居無何帝至又不得入於是乃使使持節詔將軍吾欲入勞軍亞夫乃傳言開壁門士吏謂從車騎曰將軍約例軍中不得驅馳於是天子乃按轡徐行至中營將軍亞夫持兵揖曰介胄之士不拜請以軍禮見禮介者不拜天子為動容軾車李陵為騎都尉將歩卒五千至浚稽山與單于相值騎可三萬圍陵軍軍居两山間以大車為營陵引士出營外為陳前行持㦸盾後行弓弩令曰聞鼓聲而縱聞金聲而止金謂鉦也後漢吳漢為大司馬建武二年擊蘇茂於廣樂為劉永將周建所攻漢墮馬傷膝還營乃勃然裹創而起椎牛饗士令軍中曰賊衆雖多皆刼掠羣盗勝不相讓敗不相救非有仗節死義者也今日封侯之際諸君勉之於是軍士激怒人倍其氣大破之岑彭為大將軍建武十一年伐蜀與大司馬吳漢等㑹荆門彭乃令軍中募攻浮橋先登者上賞乃長驅入江關令軍中無得虜掠蜀諸葛亮為丞相治戎講武率諸軍北駐漢中及據武功五丈原著軍令上中下三卷吳吕蒙為虎威將軍既䧏南郡入據城令軍中不得干歴人家有所求取晉齊王攸為驃騎將軍開府辟召禮同三司䧏身虛巳待物以信常歎公府不按吏然以董御戎政復有威克之宜乃下敎曰夫先王馭世眀罰勑法鞭朴作敎以正逋慢且唐虞之朝猶須督責前欲撰次其事使粗有常懼煩簡之宜未審其要故令劉程二君詳定然思惟之鄭鑄刑書叔向不韙范宣議制仲尼譏之令皆如舊無所増損其常節度詳所不及者隨事處决諸吏各竭乃心思同在公古人之節如有所闕以賴股肱匡佐之規庶以免負於是内外祗肅宋桞元景為冠軍將軍從孝武入討元凶元景宿令軍中曰鼓繁氣易衰呌數力易竭但各銜枚疾戰一聴吾營鼓音因此破賊唐竇軌初為髙祖丞相諮議參軍時稽胡掠宜春令軌討之不利乃率數百騎殿於後令衆曰聞鼓聲有不進者自後斬之既鼓士卒爭進擊賊破之李光弼為兵馬副元帥時史思眀已至偃師光弼悉軍赴河陽賊恃衆直逼其城光弼登城望曰彼雖衆亂而囂不足懼也當為公等日午而破之遽令郝玉倫惟貞往擊之令之曰爾等士望吾旗而戰若麾旗緩任爾觀望便宜吾旗連麾三至地則萬衆齊入生死以之少退者斬無捨遂大破賊軍李晟徳宗興元初為副元帥既收復京城乃勒兵屯於含元殿前舍於右金吾仗號令三軍曰晟不侫上憑睿筭次順人心今得克滅兇渠肅清天禁皆三軍之力也長安士庶久陷賊庭若小有震驚則非伐罪弔人之義晟與公等各有家累離别數年今已事成相見非晚五日内不得輒通家信違命者斬郗士美憲宗元和中為昭義軍節度使時討鎮州有兵馬使王言為前鋒逗撓士美立斬之令曰敢後出者斬士美親鼓之兵既合而賊軍大破李遜為忠武軍節度陳許溵蔡等州觀察處置等使是時新罹兵戰難遽完緝及遜至集大軍與之約束嚴具示賞罰必信號令數百言士皆感恱示信夫荷推轂之任當鑿門之權非沈㡬無以制勝非示信無以御下必在夫絶憎愛一賞罰賞既眀而足勸罰既嚴而可畏故宣父以為兵食可去而信不可去也傳曰信申也相申束使不相違也又曰信國之寳也民之庇也是知臨賊示信義逺矣㢤若乃戍及期而必代兵當下而不停或約賞家財或克日必戰俾敵人之服義得我衆之歡心故謀無不成功無不集者也楚司馬子反從莊王圍宋軍有七日之糧爾盡此不勝將去而歸爾於是使司馬子反乗堙而闚宋城宋華元亦乗堙而出見之堙距堙上城具司馬子反曰子之國何如華元曰憊矣曰何如問憊意也曰易子而食之析骸而炊之析破人骸骨也司馬子反曰嘻甚矣憊雖然雖如所言吾聞之也圍者古有見圍者柑馬而秣之秣以粟置馬口中柑者以木衘其口不欲令食示有畜積使肥者應客示飽足也是何子之情也猶曰何太露情華元曰吾聞之君子見人之厄則矜之矜憫小人見人之厄則幸之幸僥倖吾見子之君子也是以告情於子也司馬子反曰諾諾受語辭勉之矣勉猶努力使努力堅守之吾軍亦有七日之糧爾盡此不勝將去而歸爾揖而去之反於莊王反報於莊王莊王曰何如司馬子反曰憊矣曰何如曰易子而食之析骸而炊之莊王曰嘻甚矣憊雖然雖已憊吾今取此然後而歸爾司馬子反曰不可臣已告之矣軍有七日之糧爾莊王怒曰吾使子往視之子曷為彼告之司馬子反曰以區區之宋區區小貌猶有不欺人之臣可以楚而無乎是以告之也莊王曰諾先以諾受絶子反語舍而止更令築舍而止示無去計雖然雖宋已知我糧短吾猶取此然後歸爾欲徴糧待勝也司馬子反曰然則君請處於此臣請歸爾莊王曰子去我而歸吾孰與處於此吾亦從子而歸爾引師而去之樊遲魯人齊伐魯孟孺子洩帥右師顔羽御邴洩為右冉求帥左師管周父御樊遲為右師及齊師戰於郊齊師自稷曲稷曲郊地名師不踰溝樊遲曰非不能也不信子也請三刻而踰之與衆三刻約信如之衆從之如遲言乃踰也魏徐邈為梁州刺史邈與羌胡從事不問小過若犯大罪先告部帥使知應死者乃斬以徇是以信服畏威蜀諸葛亮為丞相帥師出祁山魏眀帝自征蜀幸長安遣宣王督張郃諸軍雍涼勁卒三十餘萬潜軍宻進規向劍閣亮時在祁山旌旗利器守在險要十二更下在者八萬時魏軍始陳幡兵適交參佐咸以賊衆疆盛非力不制宜權停下兵一月以并聲勢亮曰吾統武行師以大信為本得原失信古人所惜去者束裝以待期妻子鶴望而計日雖臨征難義所不廢皆催遣令去於是去者感恱願留與戰往者憤勇思致死命相謂曰諸葛公之恩死猶不報也臨戰之日莫不拔刅爭先以一當十殺張郃却宣王一戰大尅此信之由也晉陶璜初仕吳歴顯位孫皓時交阯郡吏吕興以郡内附武帝拜興交阯太守尋為其功曹李統所殺南中監軍霍弋遣犍為楊稷與將軍毛炅自蜀出交阯吳遣璜為蒼梧太守討稷初霍弋之遣稷炅等與之誓曰若賊圍城未百日而䧏者家屬誅若過百日救兵不至吾受其罪稷等未百日因糧盡乞䧏璜不許益其糧使守諸將並諌璜曰霍弋已死不能救稷等必矣可須其日滿然後受䧏使彼得無罪我受有義内訓百姓外懐鄰國不亦可乎稷等期訖糧盡救兵不至乃納之羊祜為征南大將軍都督荆州諸軍事與吳人交兵尅日方戰不為掩襲之計隋何稠開皇末討桂州賊有欽州刺史寗猛力帥衆迎軍初猛力倔強山洞欲圖為逆至是惶懼請身入朝稠以其疾篤因示無猜貳遂放還州與之約曰八九月間可詣京師相見稠還奏狀髙祖意不懌其年十月猛力卒帝謂稠曰汝前不將猛力來今竟死矣稠曰猛力共臣為約假令身死當遣子入侍越人性直其子必來初猛力臨終誡其子長真曰我與大使為約不可失信於國士汝葬我訖即宜上路長真如言入朝帝大恱曰何稠著信蠻夷乃至於此唐蘇定方為左驍衛大將軍顯慶五年討思結闕俟斤都曼俘還東都法司請斬之定方請曰都曼之叛罪合誅夷臣欲生致闕廷與之有約述陛下好生之徳必當待以不死今既面縳待罪臣望丐其餘命髙宗曰朕屈法伸恩全卿信誓乃命宥之馬燧為河東節度使討田恱恱兵大敗先戰燧誓於軍戰勝請以家財行賞既戰盡其私積以頒將士徳宗聞而嘉之乃詔度支出錢五萬貫行賞還其家財示閒暇傳稱好暇適臨事之宜志謂以舒得交兵之道夫制勝則尚速示宼則宜逸故有攝飲於行陣數闔於城壘解鞍而縱馬啟關而延敵故䇿畫可以先勝行伍可以立成故能雍容而觀變警急而無撓其或卧息旗鼓輕緩裘帶登樓而清嘯隱几而髙談不匆遽以失律務優㳺而集事者斯又得為將之大體也欒鍼晉大夫也魯成十六年晉楚戰於鄢陵欒鍼見子重之旌請曰楚人謂夫旌子重之麾也彼其子重也日臣之使於楚也子重問晉國之勇臣對曰好以衆整曰又何如又問其餘臣對曰好以暇暇閒暇也今两國治戎行人不使不可謂整臨事而食言不可謂暇食好整之言請攝飲焉攝持也持飲以飲子重公許之使行人執榼承飲造於子重承奉也曰寡君乏使使鍼御持矛御侍也是以不得犒從者使某攝飲子重曰夫子嘗與吾言於楚必是故也不亦識乎知其以往言好暇故致飲受而飲之免使者而復鼓免脫也范鞅晉大夫也魯襄公十八年晉伐齊十二月戊戌及秦周伐雍門之荻秦周魯大夫趙武及之共伐荻也雍門齊城門范鞅門于雍門其御追喜以戈殺犬於門中殺犬示閒暇孟莊子斬其橁以為公琴莊子孺子速也橁木名己亥焚雍門及西郭南郭劉難士弱率諸侯之師焚申池之竹木二子晉大夫壬寅焚東郭北郭范鞅門於楊門齊西門州綽門於東閭齊東門左驂廹還于東門中以枚數闔枚馬檛也闔門扇也數其板示不恐漢李廣為上郡太守時匃奴侵上郡廣上山匃奴數千騎見廣以為誘騎驚上山陳廣之百騎皆大恐欲馳還走廣曰我去大軍數十里今如此走匃奴追射我立盡今我留匃奴必以我為大軍之誘不我擊廣令曰前未到匃奴陳二里所止令曰皆下馬解鞍騎曰虜多如是解鞍即急奈何廣曰彼虜以我為走今解鞍以示不去用堅其意有白馬將出䕶兵廣上馬與十餘騎奔射殺白馬將而復還至其百騎中縱馬卧時㑹暮胡兵終怪之弗敢擊後漢孔融領青州刺史為袁譚所攻自春至夏戰士所餘裁數百人流矢雨集戈矛内接融隱几讀書談笑自若蜀諸葛亮為丞相益州牧率衆南征屯於陽平遣魏延諸軍并兵東下亮惟留萬人守城晉宣帝率二十萬衆拒亮而與延軍錯道徑至前當亮六十里所偵候白宣帝說亮在城中兵少力弱亮亦知宣帝垂至巳與相偪欲前赴延軍相去又逺回迹反追勢不相及將士失色莫知其計亮意氣自若勑軍中皆卧旗息鼓不得妄出菴幔又令大開四城門掃地郤灑晉宣帝常謂亮持重而猥見勢弱疑其有伏兵於是引軍北趣山晉羊祜為征南大將軍在軍常輕裘緩帶身不披甲鈴閣之下侍衛者不過十數劉琨為大將軍都督并州諸軍事在晉陽嘗為胡騎所圍數重城守窘廹無計琨乃乗月登樓清嘯賊聞之皆悽然長歎中夜奏胡笳賊又流涕歔欷有懐土之切向曉復吹之賊並棄圍而走南齊沈文季為右僕射加散騎常侍建武二年虜宼夀春豫州刺史豐城公遥昌嬰城固守數遣輕兵相抄擊眀帝以為憂詔文季領兵鎮夀春文季入城止㳺兵不聴出洞開城門嚴加備守虜軍尋退百姓無所傷損梁馮道根為南梁太守領阜陵城戍魏將党法宗傅竪眼率衆二萬奄至城下道根塹壘未固城中衆少莫不失色道根命廣開門緩服登城選精銳二萬人出擊魏軍敗之陳侯安都為仁威將軍都督南徐州諸軍事髙祖東討杜龕安都留臺居守徐嗣徽任約等引齊宼入據石頭㳺騎至於闕下安都閉門偃旗示之以弱令城中曰登陴看賊者斬及夕賊收軍還唐郝處俊為淇江道副總管髙宗乾封中髙麗反叛處俊嘗次賊城未遑置陣賊衆奄至軍中大駭處俊獨據胡床方餐乾糧乃潜簡精銳擊敗之將士多服其膽略冊府元龜卷三百九十一
