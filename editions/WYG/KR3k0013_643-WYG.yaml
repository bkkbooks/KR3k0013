body:
  text: 册府元龜卷六百四十三宋王欽若等撰貢舉部考試夫人君之有區宇也不可以獨治必求賢以共之賢士之懷德業也不可以自進必待君以任之所以舉善急賢前古之明訓掄才考藝有國之大方唐虞之際於斯為盛漢魏之下可得而論納敷奏之言則衆善必舉下賢良之詔則羣才競進經濟之業斯備甲乙之科乃懸以至較藝實之精微察器識之優異授之王爵任以民政郡國以康風俗以化得人之效於斯可見求賢之道百世可知漢文帝十五年詔有司舉賢良文學士帝親䇿詔之臣欽若等曰凡判䇿有對者並具貢舉對策門其史不對者即録於此武帝元光元年五月詔賢良曰朕聞昔在唐虞􅀞象而民不犯二帝但畫衣冠異章服而民不敢犯也白虎通云畫象者其衣服象五刑也犯墨者蒙巾犯劓者以赭着其衣犯髕者以墨䝉其髕象而􅀞之犯宫者扉犯大辟者布衣無領墨謂以墨黥其靣也劓截其鼻也髕去膝葢骨也宫割其隂也扉草履也劓音牛冀切字或作劓其音同耳髕音頻忍切扉音扶味切日月所燭莫不率俾燭炤也率循也俾使也言皆循其貢職而可使也周之成康刑措不用措置也音一故切徳及鳥獸敎通四海海外肅眘東夷今挹婁地是也在天余之東北千餘里大海之濱周書序云成王既伐東夷肅眘來賓即謂此北發渠搜禹貢析支渠搜屬雍州在金城河闗之西西戎也地理志朔方有渠搜縣孔子三朝記云北發渠搜南撫交趾此舉北以南為對也禹貢渠搜在雍州西北渠搜在朔方氐羌徠服徠古徃來之字也氐音丁奚切星辰不孛日月不蝕山陵不摧川谷不塞麟鳳在郊藪河雒出圖書嗚虖何道而臻此與虖讀曰呼今朕獲奉宗廟夙興以求夜寐以思若渉淵水未知所濟猗與偉與與讀曰歟音弋於切何行而可以章先帝之洪業休德上參堯舜下配三王朕之不敏不能逺徳言德不及逺也此子大夫之所睹聞也睹古覩字賢良明於古今王事之體受策察問咸以書對著之於篇篇謂竹簡朕親覧焉於是董仲舒公孫𢎞等出焉後漢光武建武十九年廵狩汝南召掾史試經郡小吏周防猶誦讀拜為守丞順帝陽嘉元年七月丙辰以太學新成試明經下第者補弟子増甲乙科員各十人除郡國耆儒凢十人補郎舎人二年有地動山崩火災之異公卿舉李固對䇿陽嘉二年詔公卿舉敦朴之士衛尉賈逹舉固也詔又特問當世之弊為政所宜質帝本初元年四月令郡國舉明經年五十以上七十以下詣太學自大將軍至六百石皆遣子受業嵗滿課試以髙第五人補郎中次五人太子舎人千石六百石四府掾屬三署郎四姓小侯先能通經者各令隨家法四府掾屬諸大將軍掾屬二十九人太尉府掾屬二十四人司徒府三十一人司空府二十九人漢官左右中郎將皆秦官也北二千石三署郎皆屬焉三署謂五官署左右署也儒生為詩者謂之詩家禮者謂之禮家故言各隨家法也四姓小侯解見上其髙第者上名牒當以資賞進靈帝熹平五年十二月試太學生年六十以上百餘人除郎中太子舎人至王家郎郡國文學吏獻帝初平四年九月試儒生四十餘人上第賜位郎中次太子舎人下第者罷之詔曰孔子歎學之不講不講則所識日忘今耆儒年踰六十去離本土營求粮資不得專業結童入學白首空歸長委農野永絶榮望朕甚愍焉其依科罷者聽為太子舎人時長安宮中為之謡曰頭白皓然食不充粮褁衣褰裳當還故鄉聖主愍念悉用補郎舎是布衣被服𤣥黄晉武帝泰始中詔天下舉賢良直言之士濟隂太守文立舉郤詵應選詔曰葢太上以徳撫時易簡無文至於三代禮樂大備制度彌繁文質之變其理何由虞夏之際聖明接踵而損益不同周道既衰仲尼猶曰從周因革之宜又何殊也先王既沒遺制猶存覇者迭興而翼輔之王道之缺其無補乎何凌遲之不反也豈覇德之淺期運不可致歟且夷吾之智而功止於覇何哉夫昔人之為政革亂亡之弊建不刋之統移風易俗刑措不用豈非化之盛歟何修而嚮茲朕獲承祖宗之休烈於兹七載而人未服訓政道罔述以古况今何不相逮之逺也雖明之弗及猶思羣賢慮之將何以辨所聞之疑昧獲至論於讜言乎如頃戎狄内侵災害屢作邊甿流離征夫苦役豈政刑之謬將有司非其任歟各悉乃心䆒而論之上明古制下切當今朕之失德所宜振補其正議無隱將敬聽之摯虞舉賢良與夏侯湛等十七人策為下第拜中郎武帝詔曰省諸賢良答策雖所言殊塗皆明於王義有益政道欲詳覧其對䆒觀賢士大夫用心因詔諸賢良方正直言㑹東堂策問曰頃日蝕正陽水旱為災將何所修以變大𤯝及法令有不宜於今為公私所患苦者皆何事凡平世在於得才得才者亦借耳目以聽察若有文武器能有益於時務而未見申叙者各舉其人及有負俗謗議宜見洗濯者亦各言之阮种察孝亷為公府掾是時西戎内侵災𤯝屢見百姓饑饉詔王公卿尹常伯牧守各舉賢良方正直言之士於是太保何曽舉种賢良策曰在昔哲王承天之序光宅宇宙咸用規矩乾坤惠康品類休風流衍瀰於千載朕應踐洪運統位七載於今矣惟德弗嗣不明於政宵興􅅥厲未燭厥猷子大夫韞韥道術儼然而進朕甚嘉焉其各悉乃心以闡喻朕志深陳王道之本勿有所隠朕虛心以覽之种對曰夫天地設位聖人成能王道至深所以行化至逺故能開物成務而功業不匱近無不服德逮羣生澤被區宇聲施施無窮而典垂百代故經曰聖人乆於其道而天下化成宜師蹤徃代襲迹三五矯世更俗以從人望令率土遷義下知所適播醇美之化杜邪枉之路斯誠羣黎之所欣想盛德而幸望休風也又問政刑不宣禮樂不立又問咎徵作見又問經化之務又問將使武成七德文濟九功何路而臻於兹凡厥庻事曷後曷先華譚廣陵人太康中徐州刺史嵇紹舉譚秀才譚至雒陽武帝親策之曰今四海一統萬里同風天下有道莫斯之盛然北有未覊之虜西有醜施之氐故謀夫未得髙枕邊人未獲晏然將何以長弭斯患混清六合又策曰吳蜀恃險今既蕩平蜀人服化無擕貳之心而吳人趦雎屢作妖冦豈蜀人敦樸易可化誘吳人輕鋭難安易動乎今將欲綏靜新附何以為先又策曰昔帝舜以二八成功文王以多士興周夫制化在於得人而賢才難得今大統始同宜搜才實州郡有貢薦之舉猶未獲出羣卓越之倫將時無其人有而致之未得其理也丼卓為湘州刺史中興初以邊冦未靜學校陵遲特聽不試孝亷而猶依舊策試卓上䟽以為答問損益當湏博通古今明逹政體必求諸墳索乃堪其舉臣所忝州往遭冦亂學校乆替人士流播不得比之餘州策試之繇當藉學功謂宜同孝亷例繇與限期䟽奏朝議不許卓於是精加隱括備禮舉桂陽榖儉為秀才儉辭不獲命州厚禮遣之諸州秀才聞當考試皆憚不行唯儉一人到臺遂不復策試儉取其州少士乃表求試以髙第除中郎宋髙祖永初二年二月車駕幸延賢堂策試諸州郡秀才孝亷揚州秀才顧練豫州秀才殷郎所對稱㫖並以為著作佐郎南齊武帝永明四年車駕幸中堂策秀才謝幾卿超宗之子召補國子生齊文惠太子自臨䇿試謂祭酒王儉曰幾卿本長𤣥理可以義訪之儉承㫖發問幾卿隨事辨對文惠大稱賞焉儉謂人曰謝超宗為不死矣梁戚衮年十九武帝勅策孔子正言并周禮禮記義衮對高第乃除揚州祭酒後魏孝文太和十六年正月帝臨思議殿策問秀才北齊正會日侍中黄門宣詔勞諸郡上計勞訖付紙遣陳土宜字有脱誤者呼􅁸席後立書迹濫劣者飲墨水一升文理孟浪無可取者奪容刀及席既而本曹郎中考其文迹才辭可取者録牒吏部簡用流外三品叙武成帝河清二年正月帝詔臨堂策試秀才馬敬德河間人也以好儒術河間郡王每於敎學追之將舉為孝亷固辭不就乃詣州求秀才例取文士州將以其純儒無意推薦敬德請試方畧乃策問之所答五條皆有文理乃欣然舉送至京依秀才策問十條並通擢授國子助敎遷太學博士隋房暉逺為國子博士開皇中文帝令國子生通一經者並悉薦舉將擢用之既䇿問訖博士不能的定臧否祭酒元善恠問之暉逺曰江南江北義例不同博士不能遍渉學生皆持其所短稱其所長博士各自疑所以乆而不决也祭酒因令暉逺考定之暉逺覽畢便下初無疑滯或有不服者暉逺問其所傳義䟽輙為始末誦之然後出其所短自是無敢餙非者所試四五百人數目便决諸儒莫不推其通博皆自以為不能測也杜正𤣥開皇末舉秀才尚書試方畧正𤣥應對如響下筆成章僕射楊素負才傲物正𤣥抗詞酬對無所屈撓素不悦乆之㑹林邑獻白鸚鵡素促召正𤣥使者相望及至即令作賦正𤣥倉卒之際援筆成章素見文不加㸃始異之因令更擬諸雜文筆十有餘條又皆立成而辭理華贍素乃嘆曰此真秀才吾所不及也唐太宗貞觀十八年三月己丑有鄜州所舉孝亷賜坐於御前帝問曰厯觀徃古聖帝明王莫不得一奉天必以黎元為本隆邦建國亦以政術為先天以氣變物莫知其象君以術化人不顯其機氣以隱質為虛術以潜通為妙運之無為施之無極故能清風蕩萬域長轡控八荒不令而行不言而信欲尊此術未辨其方想望髙才以陳良策孝亷等久之無對又令皇太子問之曰夫子何以為曽參說孝經孝亷答云夫子以弟子之中參最稱孝所以為說太子曰禮記云公明儀問曽子曰夫孝子先意承志喻父母於善參直養而已安能為孝據此而言參未云孝又問禮云居處不莊非孝也事君不忠非孝也蒞官不敬非孝也朋友不信非孝也戰陣無勇非孝也五者不遂災及於親此五孝施用若為差等孝亷不能答次令近臣迭問仁孝之名誰所創作明其優劣仁孝何先又問孝亷於四行之内居第㡬科又問社主之義殷栢周栗秦漢以來若為變改又問堯舜聖徳應貽厥孫謀何因朱均以降絶滅無後孝亷並不能答帝曰昔楚莊王謀事羣臣莫及退而有憂色曰諸侯能自得師者王自為謀而莫己若者亡今以不糓之不肖羣臣莫吾逮吾國㡬亡乎朕發語徵天下俊異纔以淺近問之咸不能答海内賢哲將無其人耶朕甚憂之令引就中書省射策所答乖㫖於是下詔曰朕遐想千載旁覽九流詳求布政之方莫若薦賢之典是以元凱就列仄微可以立帝功管隰為臣中人可以成覇業朕緬懷曩烈虛已英竒斷斷之士必昇於廊廟九九之術不棄於閭閻猶恐在隂弗和獨善難奪永言髦傑無忘寤寐是以去夏之中爰動翰墨披露丹府疇咨海内尺木既樹思覩游霧之羣雲羅宏舉佇降翔庭之翼而諸州所舉十有一人朕載懷仄席引入内殿借以温顔畧訪政道莫能對􅆒相顧結舌朕仍以其未覩廷闕能無戰慄令於内省更以墨對雖搆思彌日終不答問㫖理既乖違詞亦庸陋豈可飾丹漆於朽質假風雲於決起者哉宜並放還各從本色其舉主以舉非其人罪論仍加一等然則今之天下猶古之天下也寧仲舒伯始之流偏鍾美於往代秀彦廣基之侶猶絶響於今辰故其見之也則平津與樂安並進其不用也則敬通與寧伯同悲淮陽所以興言子長所以始嘆因斯論之良繇俊造難進或固棲遲之節牧宰循常未盡搜揚之道撫事長息彌増憮然其令州縣依前薦舉皆集今冬竒偉必收浮華勿採無使巴人之調濫吹於簫韶魏邦之珍沉光於江漢務盡報國之義以副興賢之懷髙宗顯慶四年二月引諸色目舉人謁見下詔策問之凡九百餘人唯李巢張昌宗秦相如崔行功郭待封五人為上第令待詔𢎞文舘仍時隨仗供奉調露元年十二月壬子帝臨軒引岳牧舉人問之曰兵書云天陣地陣人陣各何謂武陟尉員半千對曰臣觀載籍謂天陣星宿孤虛也地陣山川向背也人陣偏伍彌縫也臣以為不然夫師出以義有若時雨得天之時此天陣也兵在足食且耕且戰得地之利此地陣也三軍使兵士如父子兄弟得人之利此人陣也三者去矣將何以戰帝又問皇道帝道王道何以區别朕今可行何道長夀令蕭思問越州參軍周彦昭以次應詔帝皆稱善甲寅御製間目以試之則天載初元年太后臨朝二月十四日試貢舉人於雒城殿前數日畢臣欽若等曰殿前試人自兹始也𤣥宗開元九年四月甲戌親策試應舉人於含元殿謂曰古有三道今減從一道近無甲科朕將存其上第務收賢俊用寧軍國仍令有司設食五月壬戌有司引應制舉人見勑曰興化立理急於雋賢呈才效用屬在文武朕恭黙思道寤寐旁求長想幽仄屢申徵賁今邊隅未静師旅時興屬聽鼔鼙載懐屠釣廣求百夫之特以作四方之守總夫戎政爰詔武臣𢎞我風敎諒惟儒林卿等或謀慮深逺或學藝該通來應旌招深副虛佇並宜朝堂坐食訖且歸私第即當有試期也乙亥親試應制舉人於含元殿命有司置食勑曰卿等知藴韜畧學綜古今喬木將遷虛鍾待扣既膺旁求之辟佇聞明試之言各整爾能對􅤬所問古有三道朕今減其二策近無甲科朕將存其上第務收賢雋用寧軍國並宜即存緩詳思之十四年七月癸巳上御雒城南門樓親試岳牧舉人及東封獻賦頌人命太官置食賜物有差十五年五月詔中書門下引文武舉人就中策試於是藍田縣尉蕭諒右衛胄曹梁渉邠州柱國子張玘等對策稍優録奏帝謂源乾曜杜暹李元紘等曰朕宵衣旰食側席求賢所以每念搜揚者恐草澤遺才無繇自逹至如畿尉衛佐未經推擇更與褐衣爭進非朕本意繇是唯以張玘為下第放選餘悉罷之九月庚辰帝御雒城南門親試沉淪草澤詣闕自舉文武人等二十六年八月甲申親試文詞雅麗舉人命有司置食勑曰古者求士必擇其才考之以文施於有政自非體要何用甄明頃年以來亦常親試對策者衆而登科者少葢繇宿搆之詞不與所問相對所以然也卿等博逹古今聿膺推薦朕之所以問有節目宜指事而對勿措游辭並宜坐食食訖就試有郭納姚子彦等二十四人升第皆量資授官二十九年八月御興慶門樓親試明道徳經及莊文列子舉人問策曰朕聽政之暇常讀道德經文列莊子其書文約而義精詞髙而㫖逺可以理國可以保身朕敦崇其教以左右人也子大夫能從事於此甚用嘉之夫古今異宜文質相變若在宥而不理外物而不為行遂古之化非御今之道適時之術陳其所宜又禮樂政刑所以經邦國聖智仁義所以序人倫使之廢絶未知其㫖道德經曰絶學無憂則乖進德修業之敎列子力命曰汝奚功於物又違懲惡勸善之文二㫖孰非何優何劣文子曰金積折亷壁壟宜申其義莊子曰恬與和交相養明徴其言使一理混同二敎兼舉成不易之則副虛佇之懷有姚子彦靳能元載等入第各授之以官天寳元年九月庚申御花蕚樓試文武舉人命有司供食十月應文詞秀逸舉人崔明允等二十人儒學博通劉毖等八人軍謀越衆令狐朝等七人並科目各依資授官十載九月辛卯御勤政樓試懷材抱噐舉人命有司供食有舉人私懷文策坐殿三舉並貶所保之官丙申舉人並下第勑曰朕祗膺寳厯殷鍳逺圖慮草澤之遺賢降弓旌於屢辟是以三紀於兹羣材輻凑或一言可紀必適輪轅一善有經每加奨進庶六合之内靡然同風四科之門咸能一貫何兹意之緬邈而増修之寂寥今者舉人深乖宿望朕之所問必正經史卿等所答咸皆少通所問多否以獨鍳未周必資僉議爰命朝賢三事精加詳擇咸以為闕於聚學莫可登科至於每歲秀才有司考試帖經問策兼以雜文假如及第在階選序今之將舉待以榮班各非異才孰可超奬墾鑿經傳且未精勤俯拾青紫豈宜倖覬其懷才抱器舉人並放更習學即好去其有不對策羅嘉茂既是白丁宜於劍南効力全不答所問崔慎惑劉灣等勒為本郡充學生之數勿許東西其所舉官各量貶殿以示懲誡十三載十月御含元殿親試博通墳典洞曉𤣥經詞藻宏麗軍謀出衆等舉人命有司供食既而暮罷其詞藻宏麗科問策外更試律賦各一首制舉試詩賦自此始也時登甲科者三人太子正字楊綰最為所稱乙第者凡三十餘人肅宗乾元二年三月丁亥御宣政殿親試文經邦國等四科舉人代宗寳應二年五月丙寅尚書省試應制舉人在丞侍郎對試賜舉人食如舊儀大厯二年十月御紫宸殿策試茂才異行安貧樂道孝悌力田髙道不仕等四科舉人六年四月戊午御宣政殿親試諷諫主文茂才異等智謀經武博學專門等四科舉人帝親慰免有司常食外更賜御厨珍饌及茶酒禮甚優異舉人或有敝衣菜色者帝憫之謂左右曰兵革之後士庶未豐皆自逺來資糧不足故也因為之泣下時方炎暑帝具朝衣永日危坐讀太宗貞觀政要及舉人策成悉皆觀覽一百餘道將夕有策未成者命大官給燭令盡其才思夜分而罷時登科者凡一十五人冊府元龜卷六百四十三
