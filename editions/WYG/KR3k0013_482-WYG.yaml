body:
  text: 册府元龜卷四百八十二宋王欽若等撰臺省部朋附害賢謟佞貪黷朋附阿黨為比仲尼謂之小人頑嚚是親伊尹戒其亂俗况夫結綬雲臺之上引籍金馬之閨名數既隆事任尤重固宜直躬以奉上中立以自公勉樹淑聲式光妙簡其有賦囘邪之性昧貞介之方罔上以求安附下以求寵或職當史局媚彊臣而立傳或任總銓筦恃内戚而擅寵或伺朝廷之動静樹黨藩維或託儲副以婚姻竊弄機柄深可駭也漢谷永為太常丞待詔公車既隂為大将軍王鳯說矣能實最髙繇是擢為光禄大夫永奏書謝鳯曰永斗筲之材筲所交切竹器也斗筲喻小而不大也質薄學朽無一日之雅左右之介雅素也介紹也言非夙素之交又無介紹而進也将軍說其狂言說讀曰恱擢之皁衣之吏厠之争臣之末不聴浸潤之譖不食膚受之愬食猶受納也膚受謂初入皮膚至骨髓言其深也雖齊桓晉文用士篤宻察父悊兄覆育子弟誠無以加察明也悊智也昔豫子吞炭壊形以奉見異豫讓也為智伯報讐欲殺趙襄子恐人識之故吞炭以變其聲釁面以壊其形云智伯國士遇我故也齊客隕首公門以報恩施舍人魏子三收邑入不與孟嘗孟嘗怒之魏子曰假與賢者齊湣王受讒孟嘗出奔魏子所與粟賢者到宫門自剄以明孟嘗之心也知氏孟嘗猶有死士何况將軍之門鳳遂厚之魏劉放明帝末與孫資為中書監時帝不豫欲以燕王宇為大將軍及領軍將軍夏侯獻武衛將軍曹爽屯騎校尉曹肇驍騎將軍秦朗共輔政宇性恭良陳誠固辭帝引見放資入卧内問曰燕王正爾為放資對曰燕王實自知不堪大任故耳帝曰曹爽可代宇不放資因賛成之又深陳宜速召太尉司馬宣王以綱維王室帝納其言即以黄紙授放資既出帝意復變詔止宣王勿使來尋更見放資曰我自召太尉而曹肇反使吾止之幾敗吾事命更為詔帝獨召爽與放資受詔命遂免宇獻肇朗官太尉亦至登牀受詔遂大漸放資久典機任獻肇心内不平殿中有雞栖樹二人相謂此亦久矣其能復幾指謂放資放資懼故勸帝召宣王作手詔令給使辟邪至以授宣王宣王在汲獻等先詔令於軹關西還長安辟邪又至宣王疑有變呼辟邪具問乃乗追鋒車馳至京師帝問放資誰可與太尉對者放資曰曹爽帝曰堪其事否爽在左右流汗不能對放躡其足耳之曰臣以死奉社稷曹肇弟纂為大將軍司馬燕王頗失指肇出纂見驚曰上不安云何悉共出宜還已暮放資宣詔宫門不得復納肇等罷燕王肇明日至門不得入懼詣廷尉以處事失宜免帝謂獻曰吾已差便出獻流涕而出亦免丁謐為尚書宿於曹爽相親時爽為武衛將軍數為明帝說其可大用爽輔政乃授謐為散騎常侍遂轉尚書謐為人外似疎畧而内多忌其在臺閣數有所彈駁臺中患之事不得行又其意輕貴多所忽畧雖與何宴鄧颺等同位而皆少之唯以勢屈於爽爽亦敬之言無不從故于時謗言謂臺中有三狗三狗崖柴不可當一狗憑黙作疽囊三狗謂何鄧丁也黙者爽小字也其意言三狗皆欲嚙人而謐尤甚也蜀樊建為侍中守尚書令自諸葛瞻董厥統事姜維常征伐在外宦人黄皓竊㺯機柄咸共将䕶無能矯正晉荀朂為中書監賈充為侍中尚書令無公方之操専以謟媚取容侍中任愷中書令庾純咸共疾之及氐羌叛愷因進說請充鎮關中朝之賢良欲進忠規獻替者皆幸充此舉望隆維新之化充既外出自以為失職深銜任愷計無所從將之鎮百僚餞於夕陽亭朂私焉充以憂告朂曰公國之宰輔而為一夫所制不亦鄙乎然是行也辭之實難獨有結婚太子不頓駕而自㽞矣充曰然孰可寄懐對曰朂請言之俄而侍宴論太子婚姻事朂因言充女才質令淑宜配儲宫而楊皇后及荀顗亦並稱之帝納其言㑹京師大雪平地三尺軍不得發既而皇儲當婚遂不西行詔充居本職潘岳為給事黄門侍郎岳性輕躁趨世利與石崇等謟事賈謐每候其出與崇輙望塵而拜搆愍懐之文岳之辭也謐二十四友岳為其首謐晉書限斷亦岳之辭也其母數誚之曰爾當知足而乾沒不已乎岳終不能改徐邈為中書侍郎専掌綸詔孝武帝甚親昵之初范寗與邈皆為帝所任使共輔朝廷之闕寗才素髙而措正直遂為王國寳所讒出守逺郡邈孤官易危而無敢排强族乃為自安之計㑹帝頗疎㑹稽王道子邈欲和協之因從容言於帝曰昔淮南齊王漢晉成戒㑹稽王雖有酣媟之累而奉上純一宜加𢎞貸消散紛議外為國家之計内慰太后之心帝納焉宋劉湛為太子詹事給事中殷景仁為尚書僕射湛與景仁素欵又以其建議徴之甚相感恱及俱被時遇釁隙漸生以景仁専管内任謂為間巳時彭城王義康専秉朝權而湛昔為上佐遂以舊情委心自結欲宰相之力以廻主心傾黜景仁獨當時務義康屢搆之於太祖其事不行義康僚屬及湛諸附𨽻潛相約勒無敢歴殷氏門者湛黨劉敬文父成未悟其機詣景仁求郡敬文遽徃謝湛曰老父悖耄遂就殷鐵干禄繇敬文闇淺上負生成合門慙懼無地自處敬文之姦謟無愧如此義康擅勢専朝威傾内外湛愈推崇之無復人臣之禮帝稍不能平尋被誅南齊江謐為黄門侍郎謐性隨流俗善趨勢利初仕宋為于湖令宋明帝為南豫州謐傾身奉之即位累遷右丞元徽末朝野咸屬意建平王景素謐深自委結景素事敗僅得免禍蒼梧王廢後物情尚懐疑惑謐獨竭誠歸事太祖以本官領尚書左丞昇明元年遷黄門侍郎左丞如故沈攸之事起為加太祖黄鉞謐所建也齊臺建為侍中長沙内史及太祖登遐謐稱疾不入衆頗疑其怨不豫顧命也武帝即位謐又不遷官以此怨望時武帝不豫謐詣豫章王嶷問曰至尊非起疾東宫又非才公今欲作何計世祖知之出謐為征虜將軍鎮北長史南東海太守未發帝使御史中丞沈冲奏謐前後罪曰謐少懐輕躁長集謟薄交無義合行必利動將以奕世利局見擢宋朝而阿䛕内稔貨賂公行咎盈憲簡戾彰朝聴輿金輦寳取容近習以沈攸之地勝兵强終當得志委心托身嵗暮相結以劉景素親屬望重俯應樂推獻誠薦子窺窬非望時艱網漏得全首領太祖匡飭天地方知逺圗薄其難洗之瑕許其革音之効加以非分之寵推以不次之榮列跡勲良比肩朝徳以主者微勤刀筆小用賞厠河山任忝出入輕險之性在貴彌彰貪昧之情雖富無滿重莅湘部顯行斷盗及居銓衡肆意受納連席同乗皆詖黷舊侣密延閒讌必貨賄甞密理合升進者以為已恵事宜貶退者並稱中㫖謂販鬻威權姦回不露欺主罔上謗議可掩先帝寢疾彌留人神憂震謐病私舍曽無變容國諱經旬甫蹔入殿參訪遺詔覘恃時㫖以身列朝流宜蒙兼帶先顧不逮舊位無加遂崇餙惡言肆醜縦悖議誹朝政訕毁皇猷遍蚩忠賢歴詆台相至於蕃岳入授列代常規勲戚出撫前王彛則而謐妄發樞機坐構囂論復敢貶謗儲后不顧辭端毁折宗王每窮舌杪皆云誥誓乖禮崇樹失宜仰指天俯畫地希幸災故以申積憤犯上之迹既彰反噬之情已著請免官削爵土收送廷尉獄治罪詔賜死時年五十二王喧之為中書舍人時東昬侯所寵茹法珍海蟲兒等用事並為外監口稱詔敕喧之與相脣齒専掌文翰後魏盧昶為侍中守職而已無所激揚與侍中元暉等更相朋附為宣武所寵時論鄙之趙修為黄門侍郎時髙聰為散騎常侍修嬖幸聰深相朋附李憑阿附趙修為給事黄門武衛將軍定州大中正坐修黨免官徐紇為中書舍人詭附倖臣趙修遷通直散騎侍郎及修誅坐黨徙枹䍐得還久之復除中書舎人太傅清河王懌以文翰待之及元害懌出為鴈門太守未㡬入雒又飾貌事义大得义意义曲事靈太后倖臣鄭儼是以特被信任俄遷給事黄門侍郎仍領舎人總攝中書門下之事軍國詔命莫不由之紇既處腹心參斷機密勢傾一時逺近填湊與鄭儼李神軌寵任相亞時稱徐鄭焉李肅字彥邕為貟外常侍初謟附侍中元暉後以左道事侍中穆紹裸身被髪盡腹銜刀於隠屏之處為紹求福故紹愛之宋維孝明時為給事坐謟事髙肇出為益州龍驤府長史辭疾不行袁翻領給事中在門下並掌文翰翻既才學名重又善附㑹亦為靈太后所信待賈司馬為都官尚書為元乂所寵論者譏其趣勢盧同為尚書左丞元乂之廢靈太后也相州刺史中山王熈起兵於鄴熈敗以同為持節兼黄門侍郎慰勞使仍就州刑熈還授平東将軍正黄門營明堂副將尋加撫軍將軍光禄大夫本州大中正同善事在位為乂所親戮熈之日深窮黨與以希乂㫖論者非之又給同羽林二十人以自防衛劉仁之字山静尉元引為御史前廢帝時兼黄門侍郎深為爾朱世隆所用崔勉為尚書右中兵郎中後太尉豫章王啓為諮議參軍郎中如故坐舉人失衷免官前廢帝普泰中兼尚書左丞勉善附㑹世論以浮競譏之為尚書令爾朱世隆所親待而尚書魏季景尤為世隆知任勉與季景内頗不穆季景隂求右丞奪勉所兼世隆啓用季景勉遂悵怏自失山偉河南洛陽人前廢帝末為侍中中書令與宇文忠之之徒代入為黨時賢畏惡之陸希質為中書監希質名家子位宦又通不能平心於物唯與山偉宇文忠之等共為朋黨排毁朝俊有識者薄之北齊崔昂顯祖時累遷僕射前者崔暹季舒為之親援後乃髙徳政是其中表常有挾持意色矜髙以此不為名流所服崔季舒為黄門迹在魏朝歸心霸府賔客輻湊傾心接禮甚得名譽勢傾崔暹暹嘗於朝堂屏人拜之曰暹若得僕射皆叔父之恩其權重如此魏收撰後魏史成諸家子孫投訴百餘人衆口諠然號為穢史投牒者相次無以抗之時左僕射楊愔右僕射髙徳政二人勢傾朝野與收皆親收遂為其家並傳二人不欲言史不實抑塞訴辭終文宣世更不重論又尚書陸操嘗謂愔曰魏收魏書可謂博物宏才有大功於魏室馮子琮其妻胡皇后妹也為吏部尚書俄遷尚書右僕射仍攝選和士開居要日久子琮舊所托卑辭曲躬事事諮禀士開弟休與盧氏姻子琮簡較趨走與士開府僚不異是時内官除授多由士開奉擬子琮既恃内戚兼帶選曹自擅權寵頗生間隙張雕武成時為假儀同三司待詔文林舘胡人何洪珍大蒙帝親寵與張景仁結為婚媾雕以景仁宗室自託於洪珍傾心相禮情好日宻公私之事雕嘗為其指南時穆提婆韓長鸞與洪珍同侍帷幄知雕為洪珍謀主甚大惡之洪珍又奏雕監國史尋除侍中加開府奏度支事大被委任言多見從特勅奏事不趨呼為博士陽休之領中書監及鄧長顒顔之推奏立文林館之推本意不欲令耆舊貴人居之休之便相附會與少年朝請參軍之徒同入待詔時論貶焉劉逖為散騎侍郎兼中書侍郎和士開寵要逖附之正授中書侍郎入典機密兼散騎常侍徐之才為左僕射與和士開陸令萱母子曲盡卑狎二家若疾救䕶百端繇是遷尚書令封西陽郡王後周叱羅協本名與髙祖諱同後改為焉南岐州刺史晉公護既殺孫韋李植等欲委腹心於司㑹栁慶司憲令狐整並亂不堪俱薦䕶遂徴協入朝既至䕶引與同宿深寄託之協忻然承奉誓以軀命自効䕶大恱以為得協之晩則授軍司馬委以兵士尋治御史正又授䕶府長史進爵為公邑一千戸嘗在䕶側陳說時事多被納用明帝知其才識庸淺每抑之數謂之曰汝何知也猶以護所親任難即屏黜每含容之及帝晏駕便授協司㑹中大夫中外府長史唐封徳彛初仕隋煬帝為内史舎人而不被用見内史侍郎虞基幸於煬帝而基不閑吏務每承處分多失事理徳彛又託附之密為指畫宣行詔命謟順王心外有表疏知忤意者皆寢而不奏决斷刑法多濬文深詆䇿勲行賞必抑削之故虞基之寵日隆而隋政日亂皆徳彛之所為也魏𤣥同則天永昌元年為納言伏誅𤣥同素與裴炎交結預其流者號為耐久朋至黨與皆敗故誅劉永濟為鳳閣舍人中宗初坐與張易之款狎左授青州長史劉憲為天官侍郎張易之誅憲以託附出為海州刺史蕭至忠神龍中為吏部侍郎當武三思擅權至忠附之自知吏部選事恃三思勢無所忌憚請謁杜絶威風大行趙履温性巧佞長安中為左臺殿中侍御史歴尚書郎妹適桓彦範為韋氏所誅履温懼廼附武三思累遷司農卿傾國資以事安樂公主為其造宅窮奢極麗又通韋氏謟媚百端及少帝御安福門履温馳於樓下稱萬嵗聲未絶而萬騎斬之吉温為戸部郎中性便僻巧事權要知安禄山承恩厚結之時禄山入奏驟言温之能𤣥宗天寳十載禄山加河東節度因奏温為河東節度副使知留守兼鑄錢事賜紫金魚袋及楊國忠入相國忠素與温善徴為御史中丞充京畿關内採訪處置使制到温詣范陽與禄山别禄山甚厚之遣男慶緒親執温馬轡送出驛及温至朝廷動静必報禄山十三嵗禄山拜左僕射充閑廐使又奏温武部侍郎兼御史中丞楊國忠與禄山嫌隙已成温既厚於禄山國忠遂忌之其冬河東太守韋陟坐贜罹罪託溫結歡於禄山求免詔付中書門下與法官對鞫之溫遂伏罪李林甫為黄門侍郎時恵妃武氏有寵林甫密事中要求為黨援裴冕為尚書右僕射代宗寳應初充䕶山陵使勉以侍臣李輔國權盛將託附之乃表輔國親昵術士中書舎人劉煊為山陵使判官煊坐法勉累貶施州刺史裴士淹為禮部尚書禮儀使大厯五年誅魚朝恩黜士淹為處州刺史戸部侍郎判度支第五琦為饒州刺史皆朝恩黨也士淹掌禮儀琦典財賦皆暱於朝恩時論醜之杜亞大厯中為諌議大夫自以才用合當柄任李栖筠承恩衆望言必為宰相亞乃厚結之嚴武為黄門侍郎與宰臣元載深相結託冀其引在同列事未行求方面出為劒南節度使楊炎為吏部侍郎大厯十三年貶為連州員外司馬元載黨也炎與載同郡又元氏之出謂載為舅少好學博涉文史而性巧貪滛嫉毁忠良遂與載合凡在朝坐載累貶官者諌議大夫知制誥韓洄王定諌議大夫包佶徐縝大理少卿裴冀太常少卿王紀起居舎人韓㑹等十餘人又貶戸部郎中趙縱為和州刺史亦載黨也縱妻父郭子儀帝以勲臣之故特寛之授以郡守又貶刑部尚書王昂為連州刺史交通元載故也既行至萬州卒蘇端為比部郎中代宗既素重楊綰欲以政事委之綰尋卒常衮與綰志尚素異嫉而怒之有司謚議綰為文貞衮微諷端令駁之毁短綰過甚端坐黜官韓洄徳宗貞元二年自京兆尹為刑部侍郎以黨於宰相盧翰故也潘孟陽炎之子母劉晏女也公卿多父友及外祖賔從故得薦用累至兵部郎中徳宗末王紹以恩倖權移宰相數稱孟陽之才因擢授權知戸部侍郎李景儉元和末出為澧州刺史景儉素與翰林學士元稹厚善稹初承穆宗恩顧遂以景儉為請尋授諌議大夫李紳為戸部侍郎與龎嚴友善長慶中穆宗召嚴為翰林學士又賜以金紫皆紳引之也劉栖楚為諫議大夫敬宗寳厯元年拜刑部侍郎栖楚自為諌議大夫官業殊未有聞但時宰相用事者栖楚多敢言欲引為助遂不踰時致宣此官丞郎宣授自栖楚始也崔元畧自京兆尹遷戸部侍郎時以元畧版圖之拜出於宣授諌官有疏指言内常侍崔潭峻方有權寵元畧以諸父事之故雖劾而遽遷顯要元畧亦上章自辨且曰一昨府縣條䟽臺司舉劾孤立無黨謗言益彰不謂詔出宸𠂻恩延望外處南宫之重選列左戸之清班豈臣庸虚敢自干冐天心所擇雖驚特逹之恩衆口相非遂致因縁之說詔答之曰朕所命官豈非公選卿能稱職奚恤人言然元畧不能逃父事潭峻之名害賢夫讒說殄行靜言庸違盖匪人之至惡固凶徳之斯下豈有振纓華省結綬雲臺圗固寵榮嫉忌賢正既曲直之相異則嫌隙之滋豐以至誘䧟危機媒孽而成罪崇飾飛語萋菲而造端或被以非辜或移其要職幸君聴之斯惑冀榮路之自安豈蠅玷之足方固蠆毒之不若詩云取彼讒人投畀豺虎豺虎不食投畀有北其以是夫吴孫𢎞為中書令時朱據坐論太子慮之廢左遷新都縣丞未到𢎞譖潤據因大帝寢疾𢎞為詔書追賜死晉謝奕為尚書銓叙不允吏部郎江灌每執正不從奕託以他事免之灌受黜無怨色荀愷為僕射初武陔之弟茂以徳素稱名亞於陔為上雒太守散騎常侍愷年少於茂即武帝姑子自負貴戚欲與茂交距而不答繇是致怨及楊駿誅愷以茂駿之姨弟䧟為逆黨遂見害茂清正方直聞於朝廷一旦枉酷天下傷焉侍中傅祗上表申明之後追贈光禄勲後魏髙肈為尚書令初彭城王勰性仁孝言於朝廷以其舅潘僧固為冀州樂陵太守京兆王愉搆逆僧固見逼從之肈性既兇愎賊害賢俊又肈之兄女入為夫人順皇后崩宣武欲以為后勰固執以為不可肈於是屢譖勰於宣武不納因僧固之同愉逆肈誣勰北與愉通南招蠻賊勰國郎中令魏偃前防閣髙祖珍希肈提擕搆成其事肈初令侍中元暉以奏宣武暉不從令左衛元珍言之宣武訪之於暉暉明勰無此宣武更以問肈肈以魏偃祖珍為證宣武乃信之勰飲毒酒而斃裴植為度支尚書表毁征南將軍田益宗言族姓㣲末不應在衣冠之上侍中于忠黄門元昭覧之切齒寢而不奏㑹韋伯昕告植欲謀廢黜尚書又奏羊祉告植姑子皇甫仲逹云受植㫖詐稱被詔率合部曲欲圗領軍于忠臣等窮治辭不伏引然衆證明昞案律在邊合率部衆不滿百人已下身猶尚斬况仲逹公然在京稱詔聚衆諠惑都邑駭動人情諒其本意不可測度案詐偽律詐稱制者死今依衆證處仲逹入死金紫光禄大夫尚書崇義縣開國侯裴植身居納言之任為禁司大臣仲逹又稱其姓名募集人衆雖名仲逹功讓無忿懼之心衆證雖不是植皆言仲逹為植所使植召仲逹責問而不告列推論情狀不同之理不可分明不得同之常獄有所降减計同仲逹處植死刑又植親率城衆附從王化依律上議唯思裁處詔曰凶謀既爾罪不合恕雖有歸化之誠無容上議亦不須待秋分也時忠専擅朝權既構成其禍又矯為此詔朝野怨之北齊髙徳政為侍中時清河有二豪吏田轉貴孫舎與久吏姦猾多有侵削因事遂脅人取財計贓依律不至死太守裴讓之以其亂法殺之時清河王岳為司州牧遣部從事案之徳政舊與讓之不協密奏言當陛下受禪之時讓之眷戀魏朝嗚呼流涕比為内官情非所願既而楊愔請救之云罪不合死文宣大怒謂愔曰欲得與裴讓之同家邪於是無敢言者事奏竟賜死於家祖珽為左僕射勢傾朝野斛律光甚惡之竊罵珽盲人掌機密恐誤國家事珽頗聞其言因其女皇后無寵以謡言聞上曰百升飛上天明月照長安令其妻兄鄭道盖奏之帝問珽珽證實又說謡云髙山摧槲樹舉盲老翁背上下大斧多事老母不得語珽并云盲老翁是臣云與國同憂戚勸上行語其多事老母似道語侍中陸氏帝以問韓長鸞穆提婆并令髙元海段士良密議之衆人未從因光府軍封士讓啓光反遂滅其族唐張又新為給事中穆宗長慶中除庫部郎中知制誥賈餗為常州刺史時議以為餗不當出又新以私嫌搆於宰相李逢吉出之盧坦為中丞時僕射裴均立班踰位坦請退之均不受坦曰姚南仲為僕射例如此均曰南仲是何人坦曰南仲是守正而不交權倖者也尋罷為右庶子時人歸咎於均張權輿為左拾遺李逢吉之黨也時裴度鎮興元上疏請入覲京師權輿乃上疏曰度名應圗䜟宅據岡原不召自來其心可見先是姦黨忌度作謡詞云非衣小兒坦其腹天上有口被驅逐言度平吳元濟也又帝城東西横亘六岡合易象乾卦之數度平樂里第偶當第五岡故權輿取其語敬宗雖少年深明誣謗奨度之意不衰焉王璠為尚書左丞時李徳裕鎮浙西璠與戸部侍郎李漢進狀論徳裕厚賂宫人杜仲陽結託漳王圗為不軌文宗於蓬莱殿召宰相王涯李固言路隋及璠漢等回證其事璠漢加誣構結語甚切至路隋奏曰徳裕實不至此誠如璠漢之言微臣亦合得罪羣論稍息謟佞孔子曰放鄭聲逺佞人又曰惡紫之奪朱惡利口之覆邦家謟佞之人聖賢所惡其來甚矣巧言令色為國蟊賊雖云率性亦幸乗時何則懐黄佩玉竊位臺省朝謁夕見俯侍宫闥善揣時機逆迎主意譽乃生羽毛毁則成瘡痏沙狐水蜮潜傷闇害暨日月大明昭逹隠奥雷霆迅烈威震幽微必斥逐於時遐棄於野所謂魑魅不能晝行鵂鶹止期夜動者也魏孫資為侍中領中書監劉放為左光禄大夫轉驃騎放資既善承順主上又未嘗顯言得失抑辛毗而助王思以是獲譏於世秦朗明帝時為給事中每車駕出入朗常隨從時帝喜發舉數有以輕微而致大辟者朗終不能有所諫止又未嘗進一善人帝亦以是親愛每顧之多呼其小字阿蘇南齊王融為中書郎永明末武帝欲北伐使毛恵秀盡漢武北伐圖使融掌其事融好功名因上疏言北地殘氓東都遺老莫不茹泣吞悲傾耳戴目翹心仁政仰首王風若試馳咫尺之書具禋旅之年狥其墜域納其降卒可弗勞弦鏃無待干戈真皇王之兵征而不戰者也臣乞以執役先邁式道中原澄澣渚之常流掃狼山之積霧繫單于之頸屈左賢之膝習呼韓之舊儀拜鑾輿之廵幸然後天移雲動解封岱宗咸五登三追跡七十百神肅警萬國具僚㑹弁星離玉帛雲聚集三燭於蘭席聆萬嵗之禎聲豈不盛哉豈不韙哉昔桓公志在伐莒郭牙審其幽趣魏后心在亡漢徳宗究其深言臣愚昧才識不足以知微然伏揆聖心規模𢎞逺既圗載其事必克就其功臣不勝歡喜圗成上置琅邪城射堂壁上逰幸輙觀視焉梁何敬容髙祖時為吏部尚書性矜莊衣冠鮮麗帝雖衣浣衣而左右衣必須潔嘗有侍臣衣帶卷摺帝怒曰卿衣帶如繩欲何所縛敬容希旨故益鮮明常以膠清刷鬚衣裳不整伏牀熨之或暑月為之燋每公庭就列容止出入朱异髙祖時為尚書儀曹郎兼中書通事舎人歴散騎常侍居權要三十餘年善窺人主意曲能阿䛕以承上㫖故特被寵任髙祖嘗夢中原平舉朝稱慶旦以語异异對曰此宇内方一之徴及侯景歸降勅召羣臣議尚書僕射謝舉等以為不可髙祖欲納之未决嘗夙興至武徳閤自言我家國承平若此今便受地詎是事宜脫致紛紜悔無所及异探髙祖微㫖應聲答曰聖明御宇上應蒼𤣥北土遺黎誰不仰慕為無機㑹未逹其心今侯景分魏國大半輸誠送款逺歸聖朝豈非天誘其衷人將其計原心審事殊有可嘉今若不容恐絶後素望此誠易見願陛下無疑髙祖深納异言又感前夢遂納之及貞陽敗沒自魏使還述魏相髙澄欲更申和睦勅有司定議异又以和為允髙祖果從之其年六月遣建康令謝挺通直郎徐陵使北通好時侯景鎮夀春累啓絶好於异請追使又致書於异辭意甚切异但述勅㫖以報之後魏裴粲前廢帝時為中書令正月晦帝出臨洛濵粲起於御前再拜曰今年羙節聖駕出逰臣幸參陪從預奉醼樂不勝忻戴敢上夀酒帝曰昔嵗北海入朝蹔竊神器具聞爾日卿戒之以酒今欲使我飲何異於往情粲曰北海志在沈湎故諫其所失陛下齊聖溫克臣敢獻微誠帝曰實乃寡徳甚愧來譽仍為命酌隋裴矩煬帝時為吏部尚書時西域諸藩多至張掖與中國交市帝命矩掌其事知帝方勤逺畧諸商人至者矩誘令言其國俗山川險易撰西域圗計三卷入朝奏之帝大恱賜物五百段每日引矩至御坐親問西方之事矩盛言西域多諸寳物吐谷渾易可并吞帝由是甘心將通西域四夷經畧咸以委之唐許敬宗為禮部尚書髙宗永徽元年立長子燕王忠為皇太子其年王皇后被廢武昭儀所生皇子𢎞年已三嵗敬宗希㫖上疏曰伏惟陛下憲章千古含育萬邦爰立聖慈母儀天下既而皇后生子合處少陽出自塗山是謂吾君之裔夙聞胎教宜展問豎之心乃復為孽奪宗降居藩邸是使前星匿彩瑶岳韜峯臣以愚誠竊所未喻且今之守器素非皇嫡永徽爰始國本未生權引彗星越昇明兩近者元妃載誕正裔降神重光日融爝暉宜息安可以兹傍統叨據溫文國有諍臣孰逃其責竊惟息姑克讓可以思齊劉强守藩宜遵往軌追蹤太伯不亦休哉踵武延陵故嘗安矣寧可重植板榦久易位於天庭倒襲裳衣使違方於震位蠢爾黎庶云誰係心垂裕後昆將何播羙髙宗從之顯慶元年廢忠為梁王授梁州都督賜實封二千戸物二萬段甲第一區李矯則天時為侍御史雍州人唐同泰獻洛水瑞石矯上皇符一篇以美其事有識者多譏之閻朝隠為給事中則天不豫令朝隠往少室祈禱朝隠遂曲申恱媚以身為犧牲請代上所苦及將康復賜以絹綵百段金銀器十事竇懐貞中宗神龍初為御史大夫兼雍州長史嘗謟事帝左右盡得其歡心韋庶人微時有乳母王氏蠻婢也詔封莒國夫人嫁為懐貞妻俗謂乳母之壻曰阿㸙懐貞每因謁見之次及進表狀列其官位必曰翊聖皇后阿㸙時人或呼為國㸙忻然有自負之色後以名犯韋后父名改為從一焉韋庶人伏誅左遷亳州司馬轉益州大都督府長史累拜侍中兼左臺御史大夫尚書左僕射監修國史賜爵魏國公帝為二公主造金仙玉真兩觀料功甚多朝臣以為不可唯懐貞賛成其事躬自監役窮極奢侈時人為之語曰竇僕射前為韋氏國㸙後作公主邑丞時公主邑司官有丞言懐貞伏事公主同其邑官也及太平公主干預朝政懐貞每日退朝必詣主第以求佞媚權若訥為右補闕見鄭愔等既稱天后徳業皆獲榮賞乃上疏曰臣聞詩人闡教深懐罔極之恩孔氏立言式崇無改之道伏惟應天皇帝陛下孝徳純至超越禮經聖感潜通光昭瑞應置聖善報徳之閣義貫於終天存合宫永昌之號敬深於如在伏見天地日月君臣國人授載初慶殿等宇皆先朝創制久已施行陛下纂承丕緒嗣守洪業父子相傳家國仍舊此並則天能事生人積習何所要切登時削除當為賊臣敬暉等秉政包藏逆節前規務從變易所以多有改張今削之無益於淳化存之有光於孝理又神龍元年三月五日制書一事已上並依貞觀故事者但則天遺訓誠曰母儀太宗舊章是稱祖徳其於沿襲應從近逺無容近捨母儀逺尊祖徳昔永徽之時不聞依武徳舊章今陛下膺期乃欲追尊貞觀故事如其逺依貞觀實恐未益先朝以臣愚識請更詳審則望繼眀纂聖之業無替始終奉先成志之道増燿竹帛疏奏手制答曰卿資孝踐忠懐才韜義討論今古徴據典章循覽所陳再三嘉尚若訥雖曲蒙恩㫖褒羙然頗為正直者所譏楊慎矜𤣥宗天寳中為御史中丞知太府出納時右相李林甫握權慎矜以遷拜不繇其門懼不敢居其位固讓之因除諌議大夫兼侍御史仍依舊知太府出納以鴻臚少卿蕭諒為御史中丞諒出為陜郡太守林甫復擢慎矜為御史中丞仍充諸道鑄錢使餘如故後唐封翹為給事中明宗天成二年七月甲戌百官朝於中興殿翹上言以星辰合度風雨應時将修賽謝請以御前香一合聖上親爇一炷餘者即令分於所謝答廟中焚之貴表精至庶賢聖感通翹時推名族履歴清華出翰苑登𤨏闥甚有為霖之望居常自負人莫若已也自離亂之後條制有所求便祀事有所簡畧帝初臨御五日一朝羣臣方虚心傾耳以求叶賛翹為黄門郎不能駁議時政請豐潔粢盛振舉頽綱而以一炷神香有能感通賢聖之論近諸妖妄者矣貪黷詩刺貪人敗類傳惡黷貨無厭士之醜行於斯為甚矧佩服儒訓踐履清途飄纓帝庭分曹仙署而乃侵人自用趨利求私賣官以厚資販肆以求息或餉遺不却或聚斂公行以至結好於異類求財於外境門庭輻凑珍玩山積名節皆汚冠裳是恥議論所棄刑憲乃加鳴鼓而攻斯之謂矣晋王戎為侍中南郡太守劉肈賂戎筒中細布五十端為司𨽻所糾以知而未納故得不坐然議者尤之武帝謂朝臣曰戎之為行豈私懐茍得正當不欲為異耳帝雖以是言釋之然為清慎者所鄙繇是損名謝石為散騎常侍既無他才望直以宰相弟兼有大勲遂居清顯而聚斂無饜取譏當世王國寳為左僕射貪縱聚斂不知紀極後房妓妾以百數天下珍玩充滿其室宋戴法興為給事中與戴明寳同兼中書通事舎人法興明寳大通人事多納貨賂凡所薦逹言無不行天下輻凑門外成市家業並累千金南齊吕文顯為中書通事舎人時與茹法亮等迭出入為舎人並見親倖四方守宰餉遺一嵗咸數百萬並造大宅聚山開池時舎人四人各住一省世謂四户法亮於衆中語人曰何須覔外禄此一戸内年辨百萬蓋約言之也綦母珍之為中書舎人凡所論薦事無不允内外要職及郡丞尉皆論價而後施行貨賂交至旬月之間累至千金後梁徐矩為度支尚書有文善吏事頗黷於貨財陳唐特為尚書左丞以預長城之功封崇徳縣子受封之日請令史為客吏受其餉遺文帝怒之因坐免後魏谷洪初以經授文成及即位以舊恩為尚書洪性貪奢僕妾衣服錦綺皆累千金而求欲滋劇時獻文舅李峻等初至京師官給衣服洪輙截没為有司所糾並窮其前後贓罪坐以伏法杜遇為尚書起部郎中竊官財一萬起立居宅清論鄙之李崇為侍中尚書令性好財貨販肆聚斂家資巨萬營求不息髙遵為尚書侍郎性貪汚每假歸山東必借備騾馬將從百餘屯逼民家求絲縑不滿意則詬罵不去强相徴求旬月之間縑布千數邦邑苦之髙聰為黄門侍郎侍中髙顯出授䕶軍聰轉兼其處於時顯兄弟疑聰間搆而求之聰居兼十餘旬出入機要言即真無達藉貴因權耽於聲色納賄之音聞於遐邇北齊司馬子如為尚書令以贓賄為御史中丞崔暹所劾禁止於尚書省詔免其大罪削去官爵陳元康為侍中既貪貨賄文襄内漸嫌之元康頗亦自懼又欲用為尚書令以閒地處之事未施行後因蘭固成之難遂遇害魏收為中書監兼右僕射以託附陳使封孝琰牒令其門客與行遇崑崙航至得竒貨果然褥裘美玉盈尺等數十件罪當流以黷論髙隆之為尚書右僕射魏收副王昕使梁還隆之求南貨於昕收不能如志遂諷御史中尉髙仲密止昕收於其臺久之得釋和士開為侍中僕射尋除尚書令自河清天統以後威權轉盛富商大賈朝夕填門聚斂貨財不知紀極雖公府屬掾郡縣守長不拘階次啓牒即成見人將加刑戮多所營救既得免罪即令諷諭責其珍寳謂之贖命物雖有全濟皆非直道隋鄭譯周末為内史上大夫宣帝幸東京譯擅取官財以自營衛坐是除名為民後復領内史事髙祖總百揆以譯司擅六府事譯性輕險不親職務而贓貨狼籍髙祖因疏之然以其有定䇿功不忍廢放隂敕官屬不得白事於譯獨坐聽事無所關預譯懼頓首求辭職髙祖寛諭之接以恩禮王逹為諌議大夫髙祖謂逹曰卿為我覔一好左丞逹遂私於荆雒二州刺史楊汪曰我當薦君為左丞若事果當以良田相報也汪以逹所言奏之逹竟以獲罪卒拜汪為尚書左丞源師為刑部侍郎居職强明有口辨而無㢘平之稱裴藴為御史大夫于時軍國多務凡是興師勤衆京師留守及與諸互市皆令御史監之賔客附隸遍於郡國侵擾百姓煬帝弗之知也唐唐儉太宗時為民部尚書嘗託鹽州刺史張臣合收其私羊為御史所劾以舊恩免罪貶授光禄大夫許敬宗髙祖時為禮部尚書坐嫁女與蠻酋馮益之子多納金寳為有司所劾出為鄭州刺史来俊臣則天時為御史中丞監察御史紀履中劾奏之其罪有五其三曰贓賂貪濁宋渾𤣥宗時為御史中丞天寳九載四月坐贓伏罪詔曰渾幸因門緒累升榮秩頃委以澄清擢居風憲而公心有害私欲彌彰冐法受贓既墜於家業敗名狥利載犯於國章特申念舊之恩俾從流放之典宜除名長流嶺南髙要郡吉温為御史中丞天寳十三載十二月貶為澧州長史先是河東太守韋陟恣其利欲盛以河東土物入饋權要為部人所發詔下御史訊鞫陟時朝謁在華清宫惶怖不安乃厚遺温求救於禄山事泄為楊國忠奏遂坐貶王昂代宗時為刑部尚書與元載深相結専事奢靡廣修第宅多畜妓妾以逞其志在刑部雖公務有程昂耽私第宴連日不視曹事性貪滛不常在公乃鬻公廨菜園收其價錢以自潤甚為時論所醜載誅昂貶連州刺史張涉徳宗居春宫時為侍讀及即位累遷散騎常侍俄授湖南觀察使幸京果金事覺以舊恩不之罪廢於家李齊運徳宗時為禮部尚書薦李錡為浙西受財賄不可勝計韋執誼徳宗時為右拾遺充翰林學士性貪婪詭賊從祖兄夏卿為吏部侍郎執誼受賂為人求科第夏卿不應執誼乃探懐中金以納夏卿袖夏卿驚曰吾與汝賴先人之徳致其名位幸各以逹豈可如此毁擺袖引身而去執誼大慚恨盧景亮為中書舎人性貪恡好求取以斂人竭歡時議以此薄之王伾順宗時為左散騎常侍充翰林待詔伾下劣闒茸唯務金帛寳玩置無門大櫃上開一孔使足以受物夫妻寢止其上冊府元龜卷四百八十二
