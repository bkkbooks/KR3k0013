body:
  text: 冊府元龜卷三百二十七宋王欽若等撰宰輔部諫諍第三唐戴胄為民部尚書參豫朝政貞觀五年太宗将修復雒陽宮上封事諫曰陛下當百王之弊屬暴隋之後拯餘燼扵塗炭救遺黎扵倒懸逺至邇安率土清謐大功大徳豈臣之所穪贊臣誠小人才識非逺惟知耳目之近不逹長乆之䇿敢竭區區之誠論臣職司之事比見闗中河外盡置軍圑富室彊丁竝從戎旅重以九成作役餘力向盡去京二千里内先配司農将作假有遺餘勢何足紀亂雖甫定户口單弱一人就役舉家便廢入軍者督其戎仗從役者責其餱糧盡室經營多不能濟以臣愚慮恐致怨嗟七月以来霖潦過度河南河北厥田洿下時豐嵗稔猶未可量加以軍國所湏皆資府庫絹帛所出嵗過百萬丁役既盡賦調不減費用不止帑蔵其虗且雒陽宮殿足蔽風雨數年功畢亦謂非晚若頓修營恐傷勞擾太宗甚嘉之魏徴貞觀中為秘書監參豫朝政長樂公主文徳皇后之所生太宗特所鍾愛及将出降勑所司資送倍扵永嘉長公主徴諫曰不可昔漢明帝将封其皇子曰朕子安可與先帝子等可半楚淮陽前史以為美談天子姊妺為長公主子為公主既加長字即是有所尊崇或可情有淺深無容禮相踰越帝然其言太宗幸九成宮有宮人還京憇扵湋川縣之宮舍俄又右僕射李靖侍中王珪繼至官屬移宮人扵别所而舍靖等太宗聞之怒曰威福之柄豈繇靖等何為禮靖而輕我宮人邪即令案驗湋川官屬及靖等徴諫曰靖等陛下心膂大臣宫人皇后掃除之𨽻論其委付事理不同又靖等出外官吏訪朝廷法式歸来陛下問人間疾苦靖等自當與官吏相見官吏亦不可不謁也至扵宮人供食之外不合參承若以此罪責縣官恐不益徳音徒駭天下耳目帝曰公言是也乃釋官吏之罪李靖等亦寝而不問七年遷侍中太宗令魏王泰入居扵武徳殿徴上疏奏曰伏見勑㫖令魏王泰移居武徳殿此殿在内處所寛閑參軍徃来極為便近但魏王既是愛子陛下嘗欲其安全每事抑其驕奢不處嫌疑之地今移此殿便在東宮之西海陵昔居時人以為不可雖時殊事異猶􅂲人之多言又王之本心亦不安息既能以寵為懼伏願成人之美明早是朔日或恐未得面陳愚慮有疑不敢寧寝輕干聽覽追深戰慄太宗納其言後為特進知門下省事十一年三月上疏曰臣觀自古受圗膺運繼體守文控御英傑南面臨下皆欲配厚徳扵天地齊髙明扵日月本枝百代𫝊祚無窮然而克終者鮮敗亡相繼其故何哉所以求之失其道也殷鑒不逺可得而言昔在有隋統一區宇甲兵彊盛三十餘年風行萬里威動殊俗一旦舉而棄之盡為他人之有彼煬帝豈惡天下之治安不欲社稷之長乆故行桀虐以就滅亡哉恃其富彊不虞後患驅天下以從慾罄萬物而自奉採域中之子女求逺方之奇異宮苑是飾臺榭是崇徭役無時干戈不戢外示嚴重内多險忌䜛邪者必受其福忠正者莫保其生上下相蒙君臣相隔人不堪命率土分崩遂以四海之尊殞扵匹夫之手子孫殄滅為天下笑可不痛哉聖哲乗機拯其危溺八柱傾而復正四維絶而更張逺肅邇安不踰扵朞月勝殘去殺無待扵百年今宮觀臺榭盡居之矣奇珍異物盡収之矣姬妾淑媛盡侍扵側矣四海九州盡為臣妾矣若能鑒彼之所以亡念我之所以得日慎一日雖休勿休焚鹿臺之寳衣毁阿房之廣殿懼危亡扵峻宇思安處扵卑宮則神化濳通無為而治徳之上也若以成功不毁即仍其舊除其不急損之又損雜茅茨扵柱棟參玉砌以土階悦以使人不竭其力嘗念居之者逸作之者勞億兆悦以子来羣生仰而遂性徳之次也若惟聖罔念不慎厥終忘締搆之艱難謂天命之可恃忽采椽之恭儉追雕牆之侈靡因其基以廣之増其舊而飾之觸類而長不思止足人不見徳而勞役是聞斯為下矣譬之負薪救火揚湯止沸以暴易亂與亂同道莫可揣測也後嗣何觀夫事無可觀則人怨神怒人怨神怒則災害必生災害既生則禍亂必作禍亂既作而能以身名令終者鮮矣順天革命之后将隆七百之祚貽厥孫謀𫝊之萬世難得易失可不念哉四月又上疏曰臣聞求木之長者必固其根本欲流之逺者必浚其泉源思國之安者必積其徳義源不深而望流之逺根不固而求木之長徳不厚而思國之安雖在下愚知其不可而况扵明哲乎人君當神器之重居域中之大将崇極天之峻永保無疆之休不念扵居安思危戒奢以儉徳不處其厚情不勝其欲斯亦伐根以求木茂塞源而欲流長者也凡百元首承天景命莫不殷憂而道著功成而徳衰有善始者實繁能克終者盖寡豈其取之易而守之難乎昔取之而有餘今守之而不足何也夫在殷憂必竭誠以待下既得志則縱情以傲物竭誠則胡越為一體傲物則骨肉為行路雖董之以嚴刑振之以威怒終茍免而不懐仁貎恭而心不服怨不在大可畏惟人載舟覆舟所宜深慎奔車朽索其可忽乎君人者誠能見可欲則思知足以自戒将有作則思知止以安人念髙危則思謙冲而自牧懼滿溢則思江海之下百川樂盤遊則思三驅以為度憂懈怠則思慎始而敬終慮壅蔽則思虗心以納下想讒邪則思正身以黜惡爵所加則思無因喜以謬賞罰所及則思無因怒而濫刑總此十思𢎞兹九徳簡能而任之擇善而從之則智者盡其謀勇者竭其力仁者播其惠信者效其忠文武争馳在君臣無事可以盡豫遊之樂可以養松喬之夀鳴琴垂拱不言而化何必勞神苦思代下司職役聰明之耳目虧無為之大道哉五月又上疏曰臣聞書曰明徳慎罰惟刑恤哉禮云為上易事為下易知則刑不煩矣上多疑則百姓惑下難知則君長勞夫上易事下易知君長不勞百姓不惑故君有一徳臣無二心上播忠厚之誠下竭股肱之力然後太平之基不墜康哉之詠斯起當今道被華夷功髙宇宙無思不服無逺不臻然言尚扵簡大志在扵明察刑賞之本有所未盡夫刑賞之本在乎勸善而懲惡帝王之所以與天下為畫一不以親疎貴賤而輕重者也今之刑賞未必盡然或申屈在乎好惡或輕重繇乎喜怒遇喜則矜其情扵法中逢怒則求其罪扵事外所好則鑚皮出其毛羽所惡則洗垢求其瘢㾗瘢㾗可求則刑斯濫矣毛羽可出則賞典謬矣刑濫則小人道長賞濫則君子道消小人之惡不懲君子之善不勸而望政安刑措非所聞也且夫暇豫清談皆敦尚扵孔老威怒所至則取法扵申韓直道而行非無三黜危人自安蓋亦多矣故道徳之㫖未𢎞刻薄之風已扇夫刻薄既扇則下生百端人競趨時則憲章不一稽之王度實虧君道昔州犂上下其手楚國之法遂差張湯輕重其心漢朝之刑以弊以臣下之頗僻猶莫能止其欺罔况人君之髙下将何以措其手足乎以睿聖之聰明無幽微而不燭豈神有所不達智有所不通哉安其所安不以恤刑為念樂其所樂遂忘先災之變禍福相倚吉凶同域惟人所召安可不思頃者責罰稍多威怒微厲或以供帳不贍或以營作差違或以物不穪心或以人不從欲皆非致治之所急實乃驕奢之攸漸是知貴不與驕期而驕自来富不與奢期而奢自至非徒語也且我之所代實在有隋隋氏亂亡之原聖明之所臨炤以隋氏之府藏譬今日之資儲以隋氏之甲兵况當今之士馬以隋氏之户口較今時之百姓度長絜大曽何等級然隋氏以富彊而䘮敗動之也我以貧寡而安寧靜之也静之則安動之則亂人皆知之非隱而難見也非微而難察也然鮮蹈平易之塗多遵覆車之轍何哉在扵安不思危理不念亂存不慮亡之所致也昔隋氏之未亂自謂必無亂隋氏之未亡自謂必不亡所以甲兵屢動徭役不息至乎身將戮辱竟未悟其滅亡之所繇也可不哀哉夫鑒形之美惡必就扵止水鑒國之安危必取扵亡國故詩曰殷鑒不逺在夏后之世又曰執柯伐柯其則不逺臣願當今之動靜必思隋氏以為殷鑒則存亡治亂可得而知若能思其所以危則安矣思其所以亂則治矣思其所以亡則存矣知存亡之所在節嗜慾以從人省遊畋之娛息靡麗之作罷不急之務慎偏聽之怒近忠厚逺便佞杜悦耳之邪說甘苦口之忠言去易進之人賤難得之貨採堯舜之誹謗追禹湯之罪己惜十家之産順百姓之心近取諸身恕以待物思勞謙之受益不自滿以招損有動則庶類以和出言而千里思應超上徳扵前載樹風聲扵後昆此聖哲之宏規帝王之盛業能事斯畢在乎慎守而已夫守之則易取之實難既能得其所以難豈不能保其所以易其或保之不固則驕奢滛佚動之也慎終如始可不勉歟易曰君子安不忘危存不忘亡理不忘亂是以身安而國家可保誠哉斯言不可不深察也伏惟陛下欲善之志不減扵昔時聞過必改少虧扵曩日若能以當今之無事行疇昔之恭儉則盡善盡美固無得而稱焉七月又上疏曰臣聞為國之基必資扵徳禮君之所保惟在扵誠信誠信立則下無二心徳禮形則逺人斯格然則徳禮誠信國之大綱在扵父子君臣不可斯湏而廢也故孔子曰君使臣以禮臣事君以忠又曰自古皆有死人無信不立文子曰同言而信信在言前同令而行誠在令外然則言而不行言不信也令而不從令無誠也不信之言無誠之令為上則敗徳為下則危身雖在顛沛之中君子所不為也自王道休明十有餘載威加海外萬國来庭倉廩日積土地日廣然而道徳未益厚仁義未益博者何哉繇乎待下之情未盡扵誠信雖有善始之勤未覩克終之美故也其所繇来者漸非一朝一夕之故昔貞觀之始聞善若驚暨五六年間猶悦以從諫自兹厥後漸惡直言雖或勉強時有所容非復曩時之豁如也謇諤之士稍避龍鱗便佞之夫肆其巧辯謂同心者為朋黨謂告奸者為至公謂彊直者為擅權謂忠讜者為誹謗謂之為朋黨雖忠信而可疑謂之為至公雖矯偽而無咎彊直者畏擅權之議忠讜者慮誹謗之尤至扵竊斧生疑投杼致惑正人不得盡其言大臣莫能與之爭熒惑視聽欝扵大道妨治損徳其在兹乎故孔子惡利口之覆邦家蓋謂此也且君子小人貎同心異君子掩人惡揚人善臨難不茍免殺身以成仁小人不恥不仁不畏不義惟利之所在危人以自安夫茍在危人則何所不至今将求致治必委之扵君子事茍有得失或訪之扵小人其待君子則敬而疎遇小人必輕而狎狎則言無不盡疎則情或不通是則毁譽在扵小人刑罰加扵君子實興䘮之所在亦安危之所繫可不慎哉此孫卿所謂使智者謀之與愚者論之使修潔之士行之與汚邪之人疑之欲其成功不可得也夫中智之人豈無小惠然才非經國慮不及逺雖竭力盡誠猶未免扵傾敗况内懐姦宄承顔順㫖其為禍患不亦深乎故孔子曰君子或有不仁者焉未見小人而仁者然則君子不能無小惡惡不積無妨扵正道小人或時有小善善不積不足以立忠今謂之善人矣復慮其有不信何異夫立直木而疑其影之不直乎雖竭精神勞思慮其不可亦已明矣夫君能盡禮臣能竭忠在扵内外無私上下相信上不信則無以使下下不信則無以事上信之為道大矣哉故自天祐之吉無不利昔齊桓公問扵管仲曰吾欲酒盈扵爵肉腐扵爼得無害扵覇乎管仲曰此極非其善者然亦無害覇也知而不能用害覇也用而不能信害覇也既信而又使小人參之害覇也晉中行穆伯攻鼓經年而弗能下餽間倫曰鼓之嗇夫間倫知之請無疲士大夫而鼓可得穆伯不應左右曰不折一㦸不傷一卒而鼓可得君奚為不取穆伯曰間倫之為人也佞而不仁若使間倫下之吾可以不賞之乎賞之是賞佞人也佞人得志是使晉之士捨仁而為佞雖得鼓将何用之夫穆伯列國大夫管仲覇者之佐猶慎扵信任逺避佞人也如此况乎為四海之大君應千齡之上聖而可使巍巍之盛徳復将有所間然乎若欲令君子小人是非不雜必湏懐之以徳待之以信厲之以義節之以禮然後善善而惡惡審罰而明賞則小人絶其佞邪君子自彊不息無為之化何逺之有善善而不能進惡惡而不能去罰不及扵有罪賞不及扵有功則危亡之期或未可保永錫祚𦙍将何望哉太宗手詔嘉美優納之十二年禮部尚書王珪奏言三品以上遇親王於塗皆降乗違法申敬有乖儀凖太宗曰卿軰皆自崇貴卑我兒子乎魏徴進曰自古迄兹親王班次三公之下今三品皆天子列卿及八座之長為王降乗非王所宜當也求諸故事則無可憑行之扵今又乖國憲太宗曰國家所以立太子者擬以為君也然則人之修短不在老少設無太子則母弟次立以此而言安得輕我子邪徴曰殷家尚質有兄終弟及之義自周以降立嫡必長所以絶庶孽之窺覦塞禍亂之源本有國者之所深慎扵是遂可珪奏先是帝遣使詣西域立葉䕶可汗未還又遣使多齎金銀錢帛歴諸國市馬徴諌曰今以立可汗為名可汗未定即詣諸國市馬不為専意立可汗可汗得立則不甚懐恩諸蕃聞之以為中國薄義重利未必得馬而失義矣昔漢文有獻千里馬者曰吾吉行日三十里師行五十里鑾輿在前屬車在後吾獨乗千里馬将安之乃償其道里所費而返之漢光武有獻千里馬及寳劔者馬以駕鼓車劍以賜騎士陛下凡所施為皆邈逾三王之上奈何至扵此事欲為孝文光武之下乎又魏文帝欲求市西域大珠蘇則曰若陛下惠及四海則不求自至求而得之不足貴也陛下縱不能慕漢文之髙行可不畏蘇則之言乎太宗納其言而止十五年二月太宗謂侍臣曰守天下難易徴曰甚難太宗曰任賢能受諌諍即可何為難徴曰觀自古帝王在憂危之間則任賢受諫及至安樂心懐寛怠恃安樂而思寛怠言事者惟令兢懼安而能懼豈不為難長孫無忌貞觀中為司徒太宗既立晉王為太子又欲立第三子吳王恪無忌固爭以為不可太宗曰公豈以非己之甥而有疑慮此子英果類我若保䕶舅氏未可知也無忌曰晉王仁厚守文之良主也且舉棊不定前哲所誡儲佐至重豈宜數易惟陛下審思之太宗乃止禇遂良為黄門侍郎參綜朝政貞觀中髙麗莫離支遣使貢白金遂良言扵太宗曰莫離支虐殺其主九夷所不容陛下以之興兵将事弔伐為遼山之人報主辱之恥古者討弑君之賊不受其賂昔宋督遺魯君以郜鼎桓公受之扵太廟臧哀伯諫曰人君者昭徳塞違今滅徳立違而寘其賂器扵太廟百官象之其又何誅焉武王克商遷九鼎扵雒邑義士猶或非之而况将昭違亂之賂器扵太廟其若之何夫春秋之書百王取法若受不臣之厥篚納弑逆之朝貢不以為愆何所致伐臣謂莫離支所獻自不得受太宗納焉以其使屬吏太宗既滅髙昌每嵗調發千餘人防遏其地遂良上疏曰臣聞古者哲后必先事華夏而後夷狄務廣徳化不事遐荒是以周宣薄伐至境而止始皇逺塞中國分離漢武負文景之聚財翫士馬之餘力始通西域初置校尉軍旅連出将三十年復得天馬扵宛城採葡萄扵安息而海内虗竭生人失所所以租及六蓄筭至舟車因之凶年盗賊竝起搜粟都尉桑𢎞羊復希主意遣士卒逺田輪臺築城以威西域武帝翻然追悔情發扵中棄輪臺之野下哀痛之詔人神感恱海内乃康向使武帝復用𢎞羊之言天下生靈皆盡之矣是以光武中興不踰蔥嶺孝章即位都䕶来歸陛下誅滅髙昌威加西域收其鯨鯢以為州縣然則王師初發之嵗河西供役之年飛芻輓粟十室九空數郡蕭然五年不復陛下嵗遣千餘人逺事屯戍終年離别萬里思歸去者資装自湏營辨既賣菽粟傾其機杼經途死亡復在其外兼遣罪人増其防遏彼罪人者生扵販肆終朝惰業犯禁違公止能擾扵邊城實無益扵行陣所遣之内復有迯亡官司捕捉為國生事髙昌途路沙磧千里冬風冰烈夏風如焚行人去来遇之多死易云安不忘危理不忘亂設令張掖塵飛酒泉烽舉陛下豈能得髙昌一人斗粟而及事乎終須發隴右諸州星馳電擊繇斯而言此河西者方扵心腹彼髙昌者他人手足豈得糜費中華以事無用書曰不作無益害有益其此之謂乎陛下道映先天威行無外平頡利扵沙塞滅吐渾於西海突厥餘落為立可汗吐渾遺甿更樹君長復立髙昌非無前例此所謂有罪而誅之既伏而立之四海八蠻誰不聞見蠕動懷生畏威慕徳宜擇髙昌可立者立之徴給首領遣還本國負戴洪恩長為藩翰中國不擾既富且寜傳之子孫以貽永世二十年太宗於寝殿側别置一院令太子居絶不令徃東宮遂良復上疏諫曰臣聞周世問安三至必退漢儲視膳五日乃来前賢作法規模宏逺禮曰男子十年出就外傅出宿扵外學書計也然則古之達者豈無慈心減兹私愛欲使成立凡人尚猶如此况君之世子乎自當春誦夏絃親近師傅體人間之庶事適君臣之大道使翹足延首皆聆善聲若獻嵗之有陽春𤣥天之有日月𢎞此懿徳乃作元良伏惟陛下道育三才功包九有新樹太子莫不欣欣既云廢昬立明湏稱天下瞻望而教成之道實深乖闕不離膝下嘗居宮中保傅之説無暢經籍之談蔑如且朋友不可以深交深交必有怨父子不可以滯愛滯愛或生愆伏願逺鑒殷周近遵漢魏不可頓革事湏階漸嘗計旬日半遣還宮専學藝以潤身布芳聲扵天下則微臣雖死猶曰生年太宗從之遂良前後諫奏及陳便宜書數十上多見採納髙宗永徽中為右僕射六年髙宗将廢王皇后帝退朝後扵别殿召太尉長孫無忌司空李勣左僕射于志寜及遂良勣稱疾不至無忌等将入遂良曰今者多議中宮事遂良欲諌何如無忌曰公但極言無忌請繼焉及入髙宗難發扵言再三顧謂無忌曰莫大之罪無過絶嗣皇后無子今當廢立武士彠女如何遂良進曰皇后是先帝為陛下所娶伏奉先帝無􅄽婦徳先帝不豫親執陛下手以語臣曰我好兒好新婦今以付卿陛下親承徳音言猶在耳皇后自此未聞有􅄽失恐不可廢愚臣不敢曲從陛下上違先帝之命帝不悦而罷翌日又言之遂良曰陛下必欲易皇后伏請妙擇天下令族何必要在武氏且武昭儀經事先帝衆所共知陛下豈可蔽天下耳目萬代之後何以稱傳此事陛下儻虧人子之道自招不善之名則敗亂之端自此始也伏願再三思審臣今上忤聖顔罪合萬死但得不負先帝則甘從鼎鑊遂置笏於殿階叩首曰還陛下笏乞放歸田里帝大怒命引出之昭儀在簾中大言曰何不撲殺此䝤無忌曰遂良受先朝顧命大臣有罪不加刑遂良繇是貶潭州都督于志寜永徽初為侍中時雒陽人李𢎞泰坐誣告太尉長孫無忌詔令不待時而斬决志寜上疏諌曰伏願陛下情篤功臣恩隆右戚以無忌横遭誣告事竝是虗欲戮告人以明賞罰一以絶誣告之路二以慰勲戚之心又以所犯是真無忌便有破家之罪今告為妄𢎞泰宜戮不待時且真犯之人事當罪逆誣謀之類罪惟及身以罪較量明非惡逆若欲依律合待秋分今時屬陽和萬物生育而特行刑罰此謂傷春竊按左傳聲子曰賞以春夏刑以秋冬順天時也又禮記月令曰孟春之月無殺孩蟲省囹圄去桎梏無肆掠止獄訟又漢書董仲舒曰王者欲有所為宜求其端於天道天道之大者在隂陽陽為德而隂為刑刑主殺而徳主生陽嘗居大夏而以生育養長為事隂嘗居大冬而積扵空虗不用之處以此見天之任徳不任刑也伏惟陛下纂聖昇祚繼明御極追連胥之絶軌蹈軒頊之良規欲使舉動順扵天時刑罰依扵律令隂陽為之式序景宿扵是無差風雨不愆雩禜輟祀方今太簇統律青陽應期當生長之辰施肅殺之令伏願蹔廽聖慮察古人言儻䝉垂納則生靈幸甚疏奏帝從之是時衡山公主欲出降長孫氏議者以時既公除合行吉禮志寜上疏曰臣聞明君馭暦當俟獻㬱之臣聖主握圗必資塩梅之佐所以堯詢四岳景化洽扵區中舜任五臣懿徳被於無外左有記言之史右立記事之官大小咸書善惡俱載著懲勸於簡牘垂褒貶於人倫為萬古之範圍作千齡之龜鑑伏見衡山公主出降欲就今秋成禮竊按禮記云女十五而笄二十而嫁有故二十三而嫁鄭𤣥云有故謂遭䘮也固知湏終三年春秋云魯荘公如齊納幣杜預云母䘮未載朞而圗婚二傳不譏失禮明故也此即史䇿具載是非歴然斷在聖情不待問扵臣下其有議者云凖制公除之後湏竝從吉此漢文創制其儀為天下百姓至扵公主服是斬縗縱使服隨例除無宜情隨例改心䘮之内方復成婚非惟違於禮經亦是人情不可伏惟陛下嗣膺寳位臨統萬方理惟繼美羲軒齊芳湯禹𢎞奨仁孝之日敦崇名教之秋此事行之苦難猶湏抑而守禮况行之甚易何容廢而受譏此理有識之所共知非假愚臣之所説也伏願遵髙祖之令軌畧孝文之權制國家於法無虧公主情禮得畢扵是詔公主待三年服闋然後成禮韓瑗永徽中為侍中髙宗特號武氏為宸妃瑗與中書令来濟奏言帝王嬪妃自有恒數今若别立妃號臣等竊以為不可帝乃止及禇遂良左遷潭州都督瑗復上疏理之曰古之聖主立諫鼓設謗木冀欲聞逆耳之言甘苦口之義發揚大化禆益洪猷垂令譽於将来揚休聲於不朽者也伏以禇遂良運偶昇平道昭前烈束髮從官方淹累稔趨侍階陛多歴嵗年不聞涓滴之􅄽嘗覩勤勞之效加以竭忠誠扵早嵗罄直道扵兹年體國忘家捐身狥物風霜其操鐡石其心誠可重扵皇朝豈専方扵曩昔且先帝納之扵帷幄寄之以心膂徳逾水石義冠舟車公家之利言無不可及纒悲四海遏密八音竭忠國家親承顧託一徳無二千古凛然此不待臣言陛下備知之矣臣嘗懐此心未敢聞奏且萬姓失業旰食忘勞一物不安納隍軫慮在扵微細寜得過差况社稷之舊臣陛下之賢佐無聞罪状斥去朝廷内外甿黎咸嗟舉措觀其近日言事披誠懇惻蓋欲推陛下之徳光扵堯舜懼陛下之過塵扵史冊而乃深遭厚謗重負醜言可以痛志士之心損陛下之明也臣聞晉武𢎞裕不貽劉毅之誅漢祖深仁無恚周昌之直而遂良被遷已經寒暑違忤陛下其罸塞焉伏願緬鑒無辜稍寛非罪俯矜微欵以順人情疏奏帝謂瑗曰遂良之情朕亦知之矣然其悖戻好犯上以此責之朕豈有過邪卿言何若是之深也瑗對曰遂良可謂社稷忠臣但恐諛佞之軰蒼蠅㸃白損陷忠貞昔微子去之而殷國以亡張華不死而綱紀不亂國之欲謝善人其衰今陛下富有四海八紘清泰忽不懾亡國之迹而驅逐舊臣乎伏願違被覆車以收徃過垂勸戒扵事君則羣生幸甚竟不納薛元超為中書侍郎同中書門下三品髙宗幸温泉較獵諸蕃猷長亦持弓矢而從元超以為既非族類深為可虞上疏切諫帝納焉張文瓘龍朔中為東臺侍郎同東西臺三品時初造蓬萊上陽合璧等宮又征討四夷廐馬萬餘疋倉庫漸虚文瓘進言曰臣聞制理扵未亂保邦於未危人罔嘗懐懐扵有仁陛下不制之於未亂之前安能救之扵既危之後昔秦皇漢武多造宮室致使土分瓦觧户口減半百姓不堪其弊必搆禍難殷鑒不逺近在隋朝臣願稍安撫之無使生怨帝深納其言於是節減廐馬數千疋賜文瓘繒錦百叚累遷侍中髙宗将發兵以討新羅文瓘疾病在家輿疾入見諫曰比為吐蕃犯邊兵屯宼境新羅雖未即順師不内侵若東西俱事征伐臣恐百姓不堪其弊且偃兵修徳以安百姓帝從之郝處俊咸亨中同東西臺三品時有僧盧伽阿逸多受詔合長年藥髙宗将餌之處俊諫曰修短有命未聞萬乗之主輕服蠻夷之藥昔貞觀末年先帝令婆羅門僧那羅邇娑婆􅄰依其本國舊方合長年神藥胡人有異術徴求靈草秘石歴年而成先帝服之竟無異效大漸之際名醫莫知所為時議者歸罪扵胡人将申顯戮又恐取笑夷狄法遂不行龜鏡若是惟陛下深察髙宗納之但加盧伽為懐化大将軍不服其藥裴炎則天臨朝拜中書令武承嗣請立武氏七廟追尊父祖為王太后将許之炎進諫曰皇太后天下之母聖徳臨朝當存至公之事不可追王祖禰以示自私且獨不見呂后之敗乎臣恐後之視今亦猶今之視昔太后曰呂氏之王權在生人今者追尊事歸前代存殁殊迹豈可同日而言炎曰蔓草難圗漸不可長殷鑒未逺當絶其源太后不悦而止狄仁傑為内史則天乆視元年将造大像用功數百萬令天下僧尼每人日出一錢助成其事仁傑上疏諫曰臣聞為政之本必先人事陛下矜羣生迷妄溺䘮無歸欲令像教兼行覩相生善非為塔廟必欲崇奢豈令僧尼皆湏檀施得栰尚捨而况其奢今之伽藍制過宮闕窮奢極壮畫繪盡工寳玩殫扵綴飾瓌材竭扵輪奐功不使鬼必在使人物不天来終湏地出不損百姓将何以求生之有時用之無度編户所奉嘗苦不充痛切肌膚不辭箠楚遊僧一説矯陳禍福剪髪解衣仍慙其少亦有離間骨肉事均路人身自納妻謂無彼我皆託佛法詿誤生人里陌動有經坊闤闠亦立精舍化誘所急切扵官徴法事所湏嚴扵制勑膏腴美業倍取其多水磑荘園數亦非少逃丁避罪併集法門無名之僧凡有幾萬都下檢括已得數千且一夫不耕猶受其弊浮食者衆又刧人財臣每思惟實所悲痛徃在江表像法盛興梁武簡文捨施無限及其三淮浪沸五嶺煙騰列刹盈衢無救危亡之禍緇衣蔽路豈有勤王之師比年以来風塵屢擾水旱不節征役稍繁家業先空創痍未復此時興役力所未堪伏惟聖朝功徳無量何必要營大像而以勞費為名雖歛僧錢百未支一像容既廣不可露居覆以百層尚憂未遍自餘廊廡不得全無又云不損國財不傷百姓以此事主可謂盡忠臣今思惟兼採衆議以為如来設教以慈悲為主下濟羣品應是本心豈欲勞人以存虗飾當今有事邊境未寜宜寛征鎮之徭省不急之費設令雇作皆以利趨既失田時自然棄本今不樹稼来嵗必飢役在其中難以取給况無官助義無得成若費官財又盡人力一隅有難将何救之遂罷其役王方慶為鳳閣侍郎知政事則天嘗幸萬安山之玉泉寺以山逕危懸欲御腰轝而上方慶諫曰昔漢元帝當酹祭廟出便門御樓船光禄勲張猛奏曰乗船危就橋安元帝從橋即前代舊事今山徑危險石磴曲狭上瞻駭目下視寒心比扵樓船安危不等陛下蒸民父母奈何踐此畏塗伏望停鑾駐驛則天納其言而止姚璹則天時為納言九鼎初成制令以黄金千兩塗之璹進諫曰夫鼎者神器貴在質朴自然無假别為浮飾臣觀其状先有光彩輝煥錯雜其間豈待金色方為炫耀從之時有大石國使請獻獅子璹上疏諫曰獅子猛獸惟止食肉逺從碎葉以至神都肉既難得極為勞費陛下以百姓為心慮一物有失鷹犬不蓄漁獵揔停運不殺以闡大慈垂好生以敷至徳凡在翾飛蠢動莫不咸荷仁恩豈容自菲薄扵身而厚資給扵獸求之至理必不然矣疏奏遽停来使李嶠為成均祭酒平章事長安末則天時造大像扵白司馬坂嶠上疏諫之其畧曰臣以法王慈憫菩薩䕶持唯擬饒益衆生非要營修土木伏聞造像税非户口錢出僧尼不得州縣祗承必是不能濟辦終湏科索豈免勞擾天下編户貧弱者衆亦有傭力客作以濟餱糧亦有賣舍貼田以供王役造像錢見有一十七萬餘貫若将散施廣濟貧窮人與一貫濟得一十七萬餘户拯飢寒之弊省勞役之勤順諸佛慈悲之心霑聖君亭毒之意人神胥悦功徳無窮疏奏不納冊府元龜卷三百二十七
