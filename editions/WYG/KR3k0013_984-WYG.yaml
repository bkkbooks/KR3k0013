body:
  text: 册府元龜卷九百八十四宋王欽若等撰外臣部征討第三蜀後主建興三年三月丞相諸葛亮率衆南征越嶲夷王髙定遂至滇池南中平皆即其渠率而用之八年丞相叅軍領益州治中從事馬忠督將軍張嶷等討汶山郡叛羌嶷别督數營在先至佗里邑所在髙峻嶷隨山立上四五里羌於要厄作石門於門上施牀積石于其上過者下石搥擊之無不糜爛嶷度不可得攻乃使譯告曉之曰汝汶山諸種反叛傷害良善天子命將討㓕惡類汝等若稽顙過軍資給糧費福禄永隆其報百倍若終不從大兵致誅雷擊電下雖追悔之亦無益也耆帥得命即出詣嶷給糧過軍軍前討餘種聞佗里已下悉恐佈失所或迎軍出降或奔竄山谷放兵攻擊軍以克㨗十一年南夷豪帥劉胄反擾亂諸郡以馬忠為庲降都督討之忠遂斬胄平南土延熈三年春使越雋太守張嶷平定越雋郡初越雋自丞相諸葛亮討髙定之後叟夷數反殺太守龔禄焦璜是後太守不敢之郡只住安定縣去郡八百里其郡徒有名而已時論欲復舊郡除嶷為越雋太守嶷将所領徃之郡誘以恩信蠻夷皆服頗来降附北徼捉馬最驍勁不承節度嶷乃往討生縳其帥魏狼又解縱告喻使招懷餘類諸種聞之多漸降服斯都耆帥李求承昔手殺龔禄嶷求募捕得數其宿惡而誅之十年汶山平康夷反衛将軍姜維徃討破平之吳大帝黄龍三年二月遣太常潘濬率衆五萬討武陵蠻夷嘉禾三年潘濬平武陵蠻又云濬遷太常五溪蠻夷叛亂假節督諸軍討之自是羣蠻衰弱一方寜靜赤烏二年十月將軍薛秘南討夷賊晉武帝太始六年六月秦州刺史胡烈擊破虜戰死之詔遣尚書石鑒行安西将軍都督秦州諸軍事與奮威䕶軍田章討之七年匃奴單于猛叛屯孔邪城帝遣婁侯何楨持節討之楨素有志畧以猛衆凶悍非少兵所制乃潜誘猛左部督李恪殺猛於是匃奴震服積年不敢復反十年八月凉州虜寇金城諸郡鎮西將軍汝陰王駿討之斬其帥乞文泥等咸寜元年六月戊己校尉馬循討叛鮮卑破之斬其渠帥二年二月并州虜犯塞監并州諸軍事胡奮擊破之五月鎮西大將軍汝陰王駿討北胡斬其渠帥吐敦七月鮮卑阿羅多等寇邊西域戊己校尉馬循討之斬首四千餘級獲生口九千餘人於是来降三年正月使征北大將軍衛瓘討鮮卑破之二月平虜䕶軍文淑討叛虜樹機能破之五年正月虜帥樹機能攻䧟涼州使討虜䕶軍武威太守馬隆擊之十二月大破斬之涼州平穆帝永和五年四月征南大将軍桓溫遣督䕶滕畯率交廣之兵伐林邑國王范文於虜容為四年文冦九真也九年三月交州刺史阮敷討林邑范佛於日南破其五十餘壘范佛文之子嗣其父位升平三年十二月交州刺史溫放之帥兵討林邑叅黎耽潦並降之一云廣州刺史滕含伐林邑范佛詣降與盟而退宋髙祖永初元年交州刺史䕶國將軍杜慧度率文武萬人南討林邑所殺過半前後被抄畧悉得還本林邑乞降輸生口大象金銀吉貝等乃釋之遣長史江悠奉表獻㨗文帝元嘉十九年五月龍驤將軍裴方明等伐氐尅􅄷池二十三年六月交州刺史檀和之伐林邑尅之初帝以林邑雖貢奉而冦盗不已所貢亦陋薄忿其違傲使和之及振武將軍宗慤伐之和之遣司馬蕭景獻為前鋒向區栗城其王陽邁遣大帥范扶龍戍區栗城景獻攻城尅之斬扶龍獲金銀雜物不可勝計追討即尅林邑陽邁父子並挺身奔逃凡所獲珍異皆是未名之寳孝武帝大明四年十月遣司空沈慶之討㳂江蠻南齊太祖建元元年南襄城蠻秦逺寇潼陽比上黃蠻文勉徳寇汶陽荆州刺史豫章王遣中兵叅軍劉伾緒領千人討勉徳至當陽降之武帝永明十年武都王楊集始反率氐蜀雜種寇漢川涼州刺史陰智伯遣軍主寜朔將軍桓盧奴梁季郡宋王士隆等千餘人拒之不利退保白馬賊衆萬餘人縱兵火攻其城栅盧奴拒守死戰智伯又遣軍主陰仲昌等馬歩數千人救援至白馬城東千豁橋相去數里集始等悉力攻之官軍内外奮擊集始大敗十八營一時潰走殺獲數千人集始奔入虜界後魏道武天興元年七月漁陽烏丸庫傉官韜聚黨為寇詔冠軍將軍王建討平之二年三月丙子遣建義將軍庾真越騎校尉奚斤討庫狄部帥葉赤宥連部帥竇羽泥於大渾川破之庫狄勒支子沓亦于率其部落内附真等進破侯莫陳部獲馬牛羊十餘萬頭追殄遺迹并入大峨谷四年十二月卒亥詔征西大將軍常山王遵等率衆五萬討破多蘭部木易千材官將軍和突率騎六千襲黜佛素古延等諸部六年十月丁巳詔將軍伊謂率騎二萬北襲髙車十一月大破之明元永興二年正月詔南平公長孫嵩等北伐蠕蠕為元年冬犯塞五月聞帝親征乃遁走五年四月車駕西巡詔左丞相奚斤為先驅討越勤部勤一作勒於鹿那山大破之獲馬五萬匹牛羊二十萬頭徙二萬餘家而還泰常元年十月徙河部落庫傉官斌元降後復叛歸北燕馮跋驍騎將軍延普渡濡水討擊斬斌大破之及獲馮跋幽州刺史漁陽公庫傉官昌征北將軍關内侯庫傉官提等首生擒庫傉官女生縳送京師幽州平三年正月詔䕶髙車中郎將薛繁率髙車丁零十二部大人衆北畧至弱水降者二千餘人獲馬牛羊二萬餘頭太武始光元年八月蠕蠕率六萬騎入雲中殺掠吏民攻陷盛樂宫赭陽子尉普文率輕騎討之虜乃退走詔安集將軍平陽王長孫輸率北部諸將尉眷自叅合以北擊大檀别帥阿伏干於祁山斬首數千級獲馬萬餘匹十二月遣平陽王長孫輸等討蠕蠕車駕次祁山蠕蠕北遁諸軍追之大獲而還神䴥元年閏十月定州丁零鮮于臺陽翟喬等二千餘家叛入西山劫掠郡縣州兵討之失利詔鎮南將軍壽光侯叔孫建擊之二年八月帝以東部髙車屯已厄陂詔左僕射安原率騎萬餘討之三年四月勅勒萬餘落叛走詔尚書封鐵追討滅之延和三年三月金當川率其衆圍西川侯彭文暉於陰宻詔征西大將軍常山王素討獲當川斬之於長安以狥七月命諸軍討山胡白龍于西河九月戊子尅之斬白龍及其將帥屠其城大延二年五月仇池氐楊難當竊據上邽七月庚戍詔驃騎大將軍樂平王丕等督河西髙平諸軍討之九月以難當攝上邽守三年七月使撫軍大將軍永昌王健司空上黨王長孫道生討山胡白龍餘黨於西河滅之太平真君六年八月征西大將軍髙涼王那等討吐谷渾慕利延軍到曼頭城慕利延驅其部落西渡流沙那急追故西秦王慕世子被囊破之中山公杜豐追度三危至雪山擒被囊及慕利延元子什歸熾盤子成龍送於京師慕利延遂西入于闐國九年九月成周公萬度千里驛上大破焉耆國其王鳩尸卑那奔龜兹十二月詔成周公萬度歸自焉耆西討龜兹文成大安二年二月丁零數千家亡匿井陘山聚為寇盜詔定州刺史許宗之并州刺史乞佛成龍討平之八月平西將軍漁陽公尉眷北擊伊吾尅其城大獲而還和平元年二月衛將軍樂安王良督東雍吐京六壁諸軍西趣河征西將軍皮豹子等督河西諸軍南趣石樓以討河西叛胡六月甲午詔征西大将軍陽平王新城等督統萬髙平諸軍出南道南郡公李恵等督源州諸軍出北道討吐谷渾什寅八月西征諸軍至西平什寅走保南山九月諸軍濟河追之遇瘴氣多有疾病乃引軍還獲畜二十餘萬三年六月諸将軍陸真討雍州叛氐仇傉檀大破之五年七月北鎮游軍大破蠕蠕獻文皇興四年二月吐谷渾什寅不供職貢詔使持節征西大將軍上黨王長孫觀討之軍至曼頭山大破什寅什寅與麾下數百騎宵遁什寅從弟豆勿来及其渠帥匹婁拔累等率所領降附孝文延興元年十月沃野統萬二鎮勅勒叛詔太尉隴西王元賀追擊至枹罕滅之斬首三萬餘級徙其遺迸於冀定相三州為營戸二年正月統萬鎮胡民相率北叛詔寜南將軍交趾公韓拔追滅之三年四月詔假司空上黨王長孫觀等征吐谷渾什寅十月武都王反攻仇池詔長孫觀回師討之太和元年十二月蠕蠕犯塞詔任城王澄率衆討之十四年四月地豆千頻犯塞征西大將軍陽平王􅄨擊走之十六年八月詔陽平王􅄨左僕射陸叡督十二將七萬騎北討蠕蠕二十年閏十一月右將軍元隆大破汾州叛胡二十二年八月勅勒樹者相率反叛詔平北将軍江陽王繼都督北討諸軍事以討之宣武景明三年三月魯陽蠻叛詔撫軍將軍李崇討之四年十二月詔鎮南李崇討東荆反蠻明年崇大破諸蠻帥樊安正始二年十一月武興國王楊紹先叔父集起謀反詔光禄大夫楊椿討之十二月又詔驃騎大将軍源懐慎令討武興反氐三年正月梁秦二州刺史邢巒連破氐賊尅武興是日楊集起兄弟相率降永平三年二月秦州隴西羌殺鎮將趙雋阻兵反叛州軍討平之孝明以延昌四年正月即位四月梁州刺史薛懐古破反氐於沮水五月南秦州刺史崔暹擊破氐賊解武興圍正光四年二月蠕蠕主阿那環率衆犯塞遣尚書右丞相元孚持節喻之阿那環執孚驅掠畜牧北遁詔驃騎大將軍尚書令李崇中軍將軍兼尚書右僕射元纂率騎十萬討蠕蠕出塞三千餘里不及而還五年十二月汾州正平陽山胡叛逆詔復征東將軍章武王融封爵為大都督率衆討之孝昌元年十二月以臨淮王彧為征南大將軍率衆討魯陽蠻三年三月西部勅勒斛律雒陽反於桑乾西牧子通連别將爾朱榮擊破之五月以安西將軍光禄大夫宗正􅈿孫為都督討汾州反胡出帝永熈三年正月天柱大將軍髙歡討費也頭於河西苦洩河大破之獲其帥紇豆陵伊利遷其部落於内地二月東梁州為民夷侵逼詔使持節車騎大將軍行東雍州事泉企為東梁州行臺都督以討之西魏文帝大統七年三月襲胡帥夏州刺史劉平伏據上郡叛遣開府于謹討平之恭帝元年四月茹茹乙旃逹官寇廣武遣柱國趙貴追擊之斬首數千級收其輜重而還十一月柱國于謹既平江陵諸蠻騷動詔豆盧寜蔡祐等討破之東魏孝静太平二年正月齊神武為大丞相柱國大將軍襲擊中山胡劉蠡升大破之三月神武欲以女妻蠡升太子候其不設備乃潜師襲之其北部王斬蠡升首以送其衆復立其子南海王神武擊之又獲南海王及其弟西海王北海王皇后公卿以下四百餘人胡魏五萬户十一月齊神武討山胡叛平之俘獲一萬餘户口分配諸州北齊文宣天保三年正月帝親討庫莫奚於代郡大破之獲雜畜十餘萬分賚將士各有差以奚口付山東為民四年九月契丹犯塞帝北廵冀定幽安仍北討十月丁酉帝至平州遂從西道趣長塹詔司徒潘相樂帥精騎五千自東道趣青山辛丑至白狼城壬寅終昌黎城復詔安徳王韓軌率精騎四千東趣斷契丹走路癸卯至陽師水倍道兼行掩襲契丹甲辰帝親踰山嶺為士卒先指麾奮擊大破之虜獲十餘萬口雜畜數十萬頭樂又于青山大破契丹别部所虜生口皆分置諸州十二月突厥攻茹茹茹茹舉國南奔帝自晉北討突厥迎納茹茹乃廢其主庫提立阿那環子蓭羅辰為主置之馬邑川給其廪餼繒帛親退突厥於朔州突厥請降許之而還於是貢獻相繼五年正月帝討山胡從離石道遣太師咸陽王斛律金從顯州道常山王從晉州道犄角夾攻大破之斬首數萬獲雜畜十餘萬遂平石樓石樓絶險自魏世所不能至於是逺近山胡莫不懾服三月茹茹菴羅辰叛帝親討大破之辰父子北遁四月茹茹寇肆州帝自晉陽討之至恒州黃𤓰堆虜騎走時大軍已還帝率麾下千餘騎遇茹茹别部數萬四面圍逼帝神色自若指畫形勢虜衆披靡遂縱兵潰圍而出虜乃退走追擊之伏尸二十里獲菴羅辰妻子及生口三萬餘人五月北討茹茹大破之六月茹茹率部衆東徙將南侵帝率輕騎於金山下邀擊之茹茹聞而遠遁六年六月帝親討茹茹諸軍大會於祁連池七月己卯帝頓白道留輜重親率輕騎五千追茹茹壬午及於懐朔鎮帝躬當矢石頻大破之遂至沃野獲其俟利藹然力婁阿嘗吐頭發郁久閭㧞延等并口二萬餘牛羊數十萬頭茹茹俟利郁久閭李提率部人數百降孝昭皇建元年十一月親戎北討庫莫奚長城處奔遁分兵致討大獲牛馬括總入晉陽宫武成河清三年四月衞將軍斛律光率騎北討突厥獲馬千餘匹後周武帝天和元年九月信州蠻冉令賢向五子王反詔開府陸騰討平之先是巴西人譙淹扇動羣蠻以附於梁蠻帥向鎮侯向白彪等應之尋而冉令賢向五子王又攻䧟白帝殺開府楊長華遂相率作亂前後遣開府元契趙剛等總兵出討雖破翦其族類而元惡未除至是詔騰督王亮司馬裔等討之騰水陸俱進次于湯口先遣諭之而令賢方增浚城池嚴設捍禦遣其長子西黎諭子南王領其支屬於江南險要之地置立十城遠結涔陽蠻為其聲援令賢率其精卒固守水邏城騰乃總集將帥謀其進趣咸謂先取水邏然後經畧江南騰言於衆曰令賢内恃水邏金湯之險外託涔陽輔車之援兼復資糧充實器械精新以我懸軍攻其嚴壘脱一戰不克更成其氣不如頓軍湯口先取江南翦其羽毛然後旋軍水邏此制勝之計也衆皆然之乃遣開府王亮率衆渡江旬日攻㧞其八城凶黨奔散獲賊帥冉承公并生口三千人降其部衆一千户遂簡募驍勇數道入攻水邏路經石壁城此城峻險四面壁立故以名焉惟有一小路縁梯而上蠻蜑以為峭絶非兵衆所行騰被甲先升衆軍繼進備經危阻累日乃得舊路且騰先任隆州總􅃹雅知蠻帥冉伯黎冉安西與令賢有隙騰乃招誘伯黎等結為父子又多遺其金帛伯黎等悦遂為鄉𨗳水邏側又有石勝城者亦是險要令賢使其兄子龍真據之騰又密誘龍真云若平水邏使其代令賢處龍真大悦宻遣其子詣騰騰乃厚加禮接賜以金帛蠻貪利既深仍請立効乃謂騰曰欲翻所據城恐人力寡少騰許以三百兵助之既而遣二千人衘枚夜進龍真力不能禦遂平石勝城晨至水邏蠻衆大潰斬首萬餘級虜獲一萬口令賢遁走追而獲之并其子弟等皆斬之司馬裔又别下其二十餘城獲其蠻帥冉三公等騰乃積其骸骨於水邏城側為京觀後蠻蜑望見輒大號哭自此狼戻之心輟矣六年四月信州蠻渠冉祖喜冉龍驤舉兵反詔大將軍趙誾率師討平之建徳五年二月詔皇太子廵西土因討吐谷渾六年十一月稽胡反遣齊王憲率軍討平之初五年帝敗齊師於晉州乗勝逐北齊人所棄甲仗未暇收歛稽胡乗間竊出盗而有之乃立劉蠡升孫沒鐸為主號聖武皇帝年曰石平時帝定東夏討之議欲窮其巢穴齊王以為種類既多又山谷阻絶王師一舉未可盡除且當翦其魁首餘加慰撫帝然之乃以憲為行軍元帥督行軍總􅃹趙王招譙王儉滕王逌等討之憲軍次馬邑乃分道俱進沒鐸遣其黨天柱守河東大帥穆支據河西規欲分守險要犄角憲軍憲命譙王儉攻天柱滕王逌擊穆支並破之斬首萬餘級趙王招又擒沒鐸餘衆盡降宣帝宣政元年九月汾州稽胡帥劉受邏干舉兵反詔上柱國越王咸為行軍元帥率衆討之隋髙祖開皇元年八月甲午遣行軍元帥樂安公元諧擊吐谷渾于青海破而降之二年四月大將軍韓僧壽破突厥于雞頭山上柱國李充破突厥於河北山六月李充破突厥於馬邑十一月突厥沙鉢悉衆為寇縱兵自木硖石門兩道来寇武威天水安定金城上郡𢎞化延安六畜咸盡帝赫怒下詔曰往者魏道衰弊禍難相尋周齊抗衡分割諸夏突厥之虜俱通二國周人東慮恐齊好之深齊氏西虞懼周交之厚謂虜意輕重國遂安危非徒並有大敵之憂思減一邊之防竭生民之力供其来往傾府庫之財棄於沙漠華夏之地實為勞擾猶復刼剥烽戍殺害吏民無嵗月而不有也惡積禍盈非止今日朕受天明命子育萬方愍臣下之勞除既往之弊以為厚歛兆庻多恵豺狼未嘗感恩資而為賊違天地之意非帝王之道節之以禮不為虛費省徭薄賦國用有餘因入賊之物加賜將士息道路之民務於耕織清邊制勝成策在心凶醜愚暗未知深㫖將大定之日比戰國之時乗昔世之驕結今時之憾近者盡其巢穴俱犯北邊朕分置軍旅所在邀截望其深入一舉滅之而遠鎮偏師逢而摧剪未及南上遽已奔北應弦染鍔過半不歸且彼渠帥其數㡬何昆季爭長父叔相猜外示彌縫内乖心腹世行暴虐家法殘忍東夷諸國盡挾私讎西戎羣長皆有宿怨突厥之北契丹之徒切齒磨牙嘗伺其便達頭前攻酒泉其後于闐波斯挹怛三國一時即叛沙鉢畧近趣周槩其部内薄孤束紇羅尋亦翻動往年利稽察大為髙麗靺羯所破婆毗設又為紇支可汗所殺與其為隣皆願誅勦部落之下盡異純民千種萬類仇敵怨偶泣血拊心衘悲積憾圓首方足皆人類也有一於此更切朕懐彼地咎徵妖作年將一紀乃獸為人語人作神言云其國亡訖而不見每冬雷震觸地火生種類資給惟藉水草去嵗四時竟無雨雪川枯蝗暴草木燒盡饑疫死亡人畜相半舊居之所赤地無依遷徙漠南偷存晷刻斯盖上天所忿驅就齊斧幽明合契今也其時故選將治兵臝糧聚甲義士奮發壮夫肆憤願取名王之首思撻單于之背雲歸霧集不可數也東極滄海西盡流沙縱百勝之兵橫萬里之種亘朔野而追躡望天涯而一掃此則王恢所説其猶射癕何敵能當何遠不服但皇王舊迹北止幽都荒遐之表文軌所棄得其地不可而居得其民不忍皆殺無勞兵革逺規溟海諸將令行義兼含育有降者納有違者死異域殊方被其摧抑放聽復舊廣闢邊境嚴治關塞使其不敢南望永服威刑卧皷息􅇏蹔勞終逸制禦夷狄義在斯乎何用侍子之朝無勞渭橋之拜普告海内知朕意焉於是以河間王𢎞上柱國豆盧勣竇榮定左僕射髙熲右僕射虞慶則并為元帥出塞擊之沙鉢畧率阿波貪汗二可汗等来拒戰皆敗走遁去時虜饑甚不能得食于是粉骨為糧又多災疫死者極衆三年四月衛王爽破突厥於白道五月癸卯行軍總􅃹李晃破突厥于摩那渡口壬戍行軍元帥竇榮定破突厥及吐谷渾于涼州六月行軍總􅃹梁遠破吐谷渾於爾汗出山斬其名王八月遣尚書左僕射髙熲出寜州道内史監虞慶則出原州道並為行軍元帥以擊胡十七年二月太平公史萬嵗擊西寜羌平之十八年二月以漢王諒為行軍元帥率水陸三十萬伐髙句麗九月遇疫而還是年突厥雍虞閭數為邊患詔蜀王秀出靈州道以擊之十九年四月逹頭可汗犯塞遣八軍總􅃹史萬嵗擊破之是年遣漢王諒為元帥左僕射髙熲率將軍王詧上柱國趙仲卿並出朔州道右僕射楊素率柱國李徹韓僧夀出靈州上柱國燕榮出幽州以擊突厥是時啓民可汗歸朝帝於朔州築大利城以居之雍虞閭又擊之帝復令入塞雍虞閭侵掠不已遂遷於河南在夏勝二州之間發役掘塹數百里東西拒河盡為啓民畜牧之地於是遣越國公楊素出靈州行軍總􅃹韓僧夀出慶州太平公史萬嵗出燕州大將軍姚辦出河州以擊都藍師未出塞而都藍為其麾下所殺達頭自立為歩迦可汗其國大破遣太平公史萬嵗出朔州以擊之遇逹頭於大斤山虜不戰而遁追斬首虜二千餘人二十年四月突厥犯塞以晉王煬帝也為行軍元帥擊破之仁夀元年正月突厥寇恒安遣柱國韓洪擊破之洪復為虜所敗於恒安廢為庻人詔楊素為雲州道行軍元帥率啓民可汗北征斛薛薛等諸姓初附於啓民至是而叛素軍河北值突厥阿勿思力俟斤等南度掠啓民男女六千口雜畜二十餘萬而去素率上大將軍梁黙輕騎追之轉戰六十餘里大破俟斤悉得人畜以歸啓民素又遣柱國張定和領軍大將軍劉昇别路邀擊并多斬獲而還兵既定渡河賊復掠啓民部落素率驃騎范貴於窟結谷東南奮擊復破之追奔八十餘里煬帝大業元年四月大將軍劉方擊林邑破之初髙祖時天下無事羣臣言林邑多竒寳者仁夀末遣方為驩州道行軍總􅃹率欽州刺史寗長真驩州刺史李暈開府秦雄歩騎萬餘及犯罪者數千人擊之其王梵志率其徒乗巨象而戰方軍不利於是多掘小坑草覆其上因以兵挑之梵志悉衆而陣方與戰偽北梵志逐之至坑所其衆多䧟轉相驚駭軍遂亂方縱兵擊之大破之頻戰輒敗遂棄城而走方入其都獲其廟主十八枚皆鑄金為之盖其有國十八葉矣方班師梵志復其故地遣使謝罪於是朝貢不絶四年七月左翼衛大將軍宇文述破吐谷渾於曼頭赤水五年五月吐谷渾主保覆袁州詔左屯衛大将軍張定和往捕之定和挺身挑戰為賊所殺亞将栁武建撃破之斬首數百級六年二月武賁郎将陳稜朝散大夫張鎮州撃琉球破之獻俘萬七千口頒賜百官七年二月詔以髙麗髙元獻失藩禮将欲問罪遼左事具帝王親征册府元龜卷九百八十四
