body:
  text: 册府元龜卷七百六十宋王欽若等撰總録部忠義夫忠者臣下之髙行義者制事以合宜謂其益也狥死而無二語其大也㓕親而不顧然貞一之道存乎誠節而逆順之理著於艱危自正道寖微禍階萌立紀律隳弛而莫制英賢馳騖而不足諫或見拒黜之無怨難之將作奮不顧命乃至因利陳説唱合義舉借勢鼓怨用圖興復挺身而誓除逆節誓心而耻仕偽朝感至流涕憤以碎首精貫白日讐不同天雖或時移運謝齎志弗克其英風餘烈良足尚焉富辰周襄王之大夫也襄王十七年王以翟師伐鄭王德翟人將以其女為后富辰諌曰不可王弗聽十八年王黜翟后翟人來攻富辰曰吾驟諫王王弗從以及此難若我不出其以我為懟乎乃以其屬死言率其所屬以死難漢張充為期門郎時王莽居攝充等六人謀共刼莽立楚王發覺誅死後漢鮑永字君長宣之子也永初為郡功曹王莽以鮑宣不附己欲滅其子孫都尉路平承望風㫖䂓欲害永太守茍諫擁䕶召以為吏常置府中永因數為諫陳興復漢室翦滅簒逆之䇿諫每戒永曰君長幾事不密禍倚人門永感其言及諫卒日送䘮歸扶風路平遂收永弟升太守趙興到聞乃嘆曰我受漢茅土不能立節而鮑宣死之豈可害其子也勅縣出升復署永功曹郭丹為更始諫議大夫持節使南陽更始敗諸將悉歸光武並獲封爵丹獨保平氏不下為更始發䘮衰絰盡哀建武二年遂濳逃去敝衣間行渉歴險阻求謁更始妻子奉還節傳因歸鄉里趙熹為更始郎中累遷五威偏將軍更始敗熹遇更始親屬皆裸跣塗炭饑困不能前熹見之悲感所裝縑帛資糧悉以與之將䕶歸鄉里王遵字子春父為上郡太守遵少豪俠有才辨雖與隗囂舉兵而嘗有歸漢意曾於天水私謂來歙曰吾所以力不避矢石者豈要爵位哉徒以人思舊主先君蒙漢厚恩思効萬分耳又數勸囂遣子入侍前後辭諫切甚囂不從故去焉閔貢為河南中部掾時袁紹袁術誅宦官中常侍段珪刼天子出貢北到河上天子饑渇貢烹宰進之勵聲責張讓等曰君以閹宦之𨽻刀鋸之殘越從洿泥扶持日月賣弄國恩階賤為貴刼廹帝王蕩覆王室假息漏刻遊魂河津自亡新以來姦臣賊子未有如君者今不速死吾射殺汝讓等惶怖乂手再拜叩頭向天子辭曰臣等死陛下自愛遂投河而死臧洪廣陵人中平末棄官還家太守張超請為功曹時董卓圖危社禝洪説超曰明府歴世受恩兄弟並據大郡今王室將危賊臣虎視此誠義士効命之秋也今郡境尚全吏人殷富若動桴皷可得二萬人以此誅除國賊為天下倡義不亦宜乎超然其言與洪西至陳留見兄邈計事邈先謂超曰聞弟為郡委政臧洪洪者何如人超曰臧洪海内竒士才畧智數不比於超矣邈即引洪與語大異之乃使詣兖州刺史劉岱豫州刺史孔伷遂皆相善邈既先有謀約㑹超至定議乃與諸牧守大㑹酸棗設壇塲將盟而更相辭讓莫敢先登咸共推洪洪乃攝衣升壇操血而盟曰漢室不幸皇綱失統賊臣董卓乘釁縱害禍加至尊毒流百姓大懼淪䘮社稷翦覆四海兖州刺史岱豫州刺史伷陳留太守邈東郡太守瑁廣陵太守超糾合義兵並赴國難凡我同盟齊心一力以致臣節隕首䘮元必無二志有渝此盟俾墜其命無克遺育皇天后土祖宗明靈實皆鑒之洪辭氣慷慨涕泣横下聞其言者雖卒伍厮養莫不激揚人思致節魏田疇幽州人也漢末劉虞為本州牧時董卓遷獻帝於長安虞嘆曰賊臣作亂朝廷播蕩四海俄然莫有固志身備宗室之遺老不得自同於衆今欲奉使展效臣節安得不辱命之士乎衆議咸曰田疇雖年少多稱其竒疇時年二十二矣虞乃備禮請與相見大恱之遂署為從事具其車騎將行疇曰今道路阻絶冦虜縱横稱官奉使為衆所指名願以私行期於得逹而已虞從之疇乃歸自選其家客與少年之勇壯募從者二十騎俱往虞自出祖而遣之既取道疇乃更上西闗出塞傍北山直趣朔方循間徑去遂至長安致命詔拜騎都尉疇以為天子方蒙塵未安不可以荷佩榮寵固辭不受朝廷髙其義三府並辟皆不就初疇將行引虞密與議疇因説虞曰今帝王㓜弱姦臣擅命表上須報懼失事機且公孫瓚阻兵安忍不早圖之必有後悔虞不聼楊阜天水冀人凉州刺史韋康辟為别駕馬超率諸戎渠帥以擊隴上郡縣隴上郡縣皆應之惟冀城奉州郡以固守超盡兼隴右之衆而張魯又遣大將楊昻以助之凡萬餘人攻城阜率國中士大夫及宗族子弟勝兵者千餘人使從弟岳於城上作偃月營與超接戰自正月至八月拒守而救兵不至州遣别駕閻温循水濳出求救為超所殺於是刺史太守失色始有降超之計阜流涕諫曰阜等率父兄子弟以義相勵有死無二田單之守不固於此棄垂成之功䧟不義之名阜以死守之遂號哭刺史太守卒遣人請和開城門迎超超入拘岳於冀使楊昻殺刺史太守阜内有報超之志而未得其便頃之阜以䘮妻求𦵏假阜外兄姜敘屯歴城阜少長敘家見敘母及敘説前在冀中時事歔欷悲甚敘曰何為乃爾阜曰守城不能完君亡不能死亦何面目以視息於天下馬超背父叛君虐殺州將豈獨阜之憂責一州士大夫皆蒙其耻君擁兵專制而無討賊心此趙盾所以書弑君也超強而無義多釁易圖耳敘母慨然敕叙從阜計計定外與鄉人姜隠趙昻尹奉姚瓊孔信武都人李俊王靈結謀定討超約使從弟謨至冀州語岳并結安定梁寛南安趙衢龎恭等約誓既明十七年九月與敘起兵於鹵城超聞阜等兵起自將出而衢寛解岳閉冀城門討超妻子超襲歴城得敘母敘母罵之曰汝背父之逆子殺君之桀賊天地豈乆容汝而不早死敢以面目視人乎超怒殺之阜與超戰身被五創宗族昆弟死者七人超遂南奔張魯隴右平定金禕字德禕曹公為魏王禕自以世為漢臣自日磾討莾何羅忠誠顯著名節累葉覩漢祚將移謂可復興乃喟然發憤遂與少府耿紀司直韋晃太醫令吉本本子邈邈弟穆等結謀紀字季行少有羙名為丞相掾王甚敬異之遷侍中守少府邈字文然穆字思然以禕慷慨有日磾之風又與魏王丞相長史王必善因以聞之若殺必欲挾天子以攻魏南援劉備時蜀中強盛而王在鄴留必典兵督許中事文然等雜人及家僮千餘人夜燒門攻必禕遣人為内應射必中肩必不知攻者為誰以素與禕善走投禕夜喚德禕禕家不知是必謂為文然等錯應然曰王長史已死乎卿曹事立矣必乃更他路奔一曰必乃欲投禕其帳下督謂必曰今日事竟知誰門而投人乎扶必奔南城㑹天明必猶在文然等衆散故敗後十餘日必竟以創死收紀晃等將斬之紀呼魏王名曰恨吾不自生意竟為羣兒所誤耳晃頓首搏頰以至於死王聞王必死盛怒召漢百官詣鄴令救火者左不救火者右衆人以為救火者必無罪皆附左王以為不救火者非助亂救火者乃實賊也皆殺之張恭燉煌人為郡功曹太守馬艾卒官府又無丞恭素有學行郡人推行長史事恩信甚著乃遣子就東詣太祖請太守時酒泉黄華張掖張進各據其郡欲與恭并勢就至酒泉為華所拘執刼以白刄就終不回私與恭䟽曰大人率厲燉煌忠義顯然豈以就在困厄之中而替之哉昔樂羊食子要離覆家經國之臣寜懷妻孥邪今大軍垂至但當促兵以掎之耳願不以下流之愛使就有恨於黄壤也恭即遣從弟華攻酒泉沙頭乾齊兩縣恭又連兵尋繼華後以為首尾之援别遣鐡騎二百東縁酒泉北塞徑出張掖北河逄迎太守尹奉於是張進須黄華之助華欲救進西顧恭兵恐急擊其後遂詣金城太守蘇則降就竟平安奉得之官黄初二年下詔褒揚賜恭爵闗内侯拜西域戊巳校尉數歳徵還將授以侍臣之位而以子就代焉恭至燉煌固辭疾篤太和中卒贈執金吾就後為金城太守父子著稱於西州尹大目少為曹氏家奴髙貴鄉公時為殿中人嘗侍在帝側母丘尉文欽之舉兵也大將軍司馬景王將俱行景王目有瘤疾使醫割之文欽子鴦勇冠三軍鴦之來攻王驚而目出大目知大將軍一目已突出啟云文欽本是明公腹心但為人所誤耳又天子鄉里大目昔為文欽所信乞得追解語之令還與公復好大將軍聽遣大目單身徃乘大馬披鎧胄追文欽遥相與語大目心實欲曹氏安謬言君侯何苦苦不可復忍數日中也欲使欽觧其㫖欽殊不悟乃更厲聲罵大目汝先帝家人不念報恩而反與司馬師作逆不顧上天天不祐汝乃張弓傳矢欲射大目大目涕泣曰世事敗矣善自努力也蜀吕凱字季平永昌不韋人仕郡五官掾功曹時雍闓等聞先主薨於永安驕黠滋甚都䕶李嚴與闓書六紙解喻利害闓但答一紙曰蓋聞天無二日土無二王今天下鼎立正朔有三是以遠人惶惑不知所歸也其桀慢如此闓又降於呉呉遥署闓為永昌太守永昌既在益州郡之西道路壅塞與蜀隔絶而郡太守改易凱與府丞署郡王伉帥厲吏民閉境拒闓闓數移檄永昌稱説云云凱荅檄曰天降䘮亂姦雄乘釁天下切齒萬國悲悼臣妾大小莫不思竭筋力肝腦塗地以除國難伏惟將軍世受漢恩以為當躬聚黨衆率先啟行上以報國事下不負先人書功竹帛遺名千載何期臣僕呉越背本就末乎昔舜勤民事殞於蒼梧書籍嘉之流聲無窮隕於江浦何足可悲文武受命成王乃平先帝龍興海内望風宰臣聰睿自天降康而將軍不覩盛衰之紀成敗之符譬如野火在原蹈履河氷火滅氷泮將何所依附曩者將軍先君雍侯造怨而封竇融知興歸志世祖皆流名後葉世歌其羙今諸葛丞相英才挺出深覩未萌受遺託孤翊賛季興與衆無忌錄功忘瑕將軍若能卒然改圖易跡更歩古人難追鄙土何足宰哉蓋聞楚國不恭齊桓是責夫差僭號晋人不長况臣於非主誰肯歸之邪竊惟古義臣無越境之交是以前後有來無徃重承告示發憤忘食故畧陳所懷惟將軍察焉凱威恩内著為郡中所信故能全其節及丞相亮南征討闓既發在道而凱已為髙定部曲所殺亮至上表曰永昌郡吏吕凱府丞王伉等執忠絶域十有餘年雍闓髙定偪其東北而凱等守義不與交通臣不意永昌風俗敦直乃爾以凱為雲南太守封陽遷亭侯㑹為叛夷所害子祥嗣而王伉亦封亭侯為永昌太守蜀世譜曰吕祥後為晋南夷校尉祥子及孫世為氷昌太守李雄破晉寜州諸吕不肯附舉郡固守姜維為大將軍後主降鄧艾維見鍾㑹㑹曰來何遲也維正色流涕曰今日見此為速矣㑹竒之㑹既搆鄧艾艾檻車徴㑹隂懷異圖維見而知其心謂可搆成擾亂以圖克復也乃詭説㑹曰聞君自淮南已來筭無遺䇿晋道克昌皆君之力今復定蜀威德振世民髙其功主畏其謀欲以此安歸乎夫韓信不背漢於擾攘而見疑於既平大夫種不從范蠡於五湖卒伏劔而妄死彼豈闇主愚臣哉利害使之然也今君大功既立大德已著何不法陶朱公泛舟絶跡全功保身登峨嵋之巔而從赤松子游乎㑹曰君言遠矣我不能行且為今之道或未盡於此也維曰其他則君智力之所能無煩於老夫矣由是情好歡甚維教㑹誅北來諸將徐欲殺㑹盡坑魏兵還復蜀祚宻書與後主曰願陛下暫忍數日之辱臣欲使社稷危而復安日月幽而復明孫盛以永和初從安西將軍平蜀見諸故老言及姜維既降之後宻與劉禪表䟽説欲偽服事鍾㑹事不捷遂至冺㓕蜀人於今傷之郤正為祕書令後主東遷雒陽時擾攘倉卒蜀之大臣無翼從者惟正及殿中督汝南張通捨妻子單身隨侍後主頼正相導宜適舉動俱無闕乃慨然歎息恨知正之晚時論嘉之譙周字允南後主時為中散大夫及晋文王為魏相國下書辟周至漢中因病不進晋室踐祚累下詔所在發遣周周遂輿病詣雒泰始三年至以病不起就拜騎都尉周乃自陳無功而封求還爵土皆不聽許吴桓應為丞相孫峻司馬時太子和無罪見殺衆庶皆懐憤歎應因此招合將吏欲共殺峻事覺見殺晋裴楷子憲東海王越以為豫州刺史北中郎將假節王浚承制以憲為尚書懷帝永嘉末王浚為後趙石勒所破棗嵩等莫不謝罪軍門貢賂交錯惟憲及荀綽恬然私室勒素聞其名召而謂之曰王浚虐暴幽州人鬼同疾孤恭行天憲拯兹黎民故舊咸歡慶謝交路二君齊惡傲威誠信阻絶防風之戮將誰歸乎憲神色侃然泣而對曰臣等世荷晋恩榮遇隆重王浚凶惡醜正尚晉之遺藩雖欣聖化義阻誠心且武王伐紂表商容之閭未聞商容在倒戈之列也明公既不欲以道厲物必欲刑忍為治者防風之戮臣之分也請就辟有司不拜而出勒深嘉之待以賔禮毛孟為寜州治中惠帝末西南夷叛刺史李毅卒城中百餘人奉毅女固守經年孟詣京師求刺史不見省孟固陳曰君亡親䘮幽閉窮城萬里訴哀不埀愍救既慙包胥無哭秦之感又愧梁妻無摧城之驗存不若亡乞賜臣死朝廷憐之乃以呉興太守王遜為南夷校尉寜州刺史髙韜有志節東海王越輔政不朝覲韜知人心有望宻與太𫝊叅軍姜頥京兆杜溉等謀討越事泄伏誅庾珉字子琚少歴㪚騎常侍本國中正侍中封長岑男懐帝之沒劉元海也珉從在平陽元海大㑹因使帝行酒珉不勝悲憤再拜上酒因大號哭賊惡之㑹有告珉及王雋等謀應劉琨者元海因圖弑逆珉等竝遇害辛賔愍帝時為尚書郎及帝蒙塵於平陽前趙劉聰使帝行酒洗爵欲觀晋臣在朝者意賔起而抱帝大哭聰曰前殺庾珉輩故不足為戒邪引出遂加害焉樂道融為王敦叅軍敦將圖逆謀害朝賢以告甘卓以為不可遲留不赴敦遣道融召之道融雖為敦佐忿其逆節因説卓曰主上躬統萬機非專任劉隗今慮七國之禍故割湘州以削諸侯而王氏擅權日乆卒見分政便謂被奪耳王敦背恩肆逆舉兵伐主國家待君至厚今若同之豈不負義生為逆賊死為愚鬼永成宗黨之耻耶君當偽許應命而馳襲武昌敦衆聞之必不戰自敗大勲可就矣卓大然之乃與巴東監軍桞純等露檄陳敦過逆率所統致討又遣齎表詣臺卓性不果决且年老多疑遂待諸方同進出軍稽遲至豬口敦聞卓已下兵卓兄子卬時為敦叅軍使卬求和於卓令其旋軍卓信之將旋主簿鄧騫與道融勸卓曰將軍起義兵而中廢為敗軍之將竊為將軍不取今將軍之下士卒各求其利一旦而還恐不可得也卓不從道融日夜涕泣諫卓憂憤而死周﨑為湘州從事王敦之難譙王承使﨑求救於外與周該俱為魏乂偵人所執乂責﨑辭情臨以白刄﨑曰州將使求援於外本無定指隨時制宜耳乂謂﨑曰汝為我語城中稱大將軍已破劉隗戴若思甘卓住襄陽無復異議三江州郡萬里肅清外援理絶如是者我當活汝﨑偽許之既到城下大呼曰王敦軍敗於湖甘安南已尅武昌即日分遣大衆來赴此急努力堅守賊今敗矣乂於是數而殺之易雄為舂陵令王敦作亂刺史譙王承將謀起兵以赴朝廷雄移符馳檄遠近列敦罪惡宣募縣境數日之中有衆千餘負糧荷戈而從之承既固守而湘中殘荒之後城池不完兵資又闕敦遣魏乂李恒攻之雄勉勵所統扞禦累旬士卒死傷者相枕力屈城䧟為乂所虜意氣慷慨神無懼色送到武昌敦遣人以檄示雄而數之雄曰此實有之惜雄位㣲力弱不能救國之難王室如燬雄安用生為今日即戮得作忠鬼乃所願也敦憚其辭正釋之衆人皆賀雄笑曰昨夜夣乗車挂肉其傍夫肉必有筋筋者斤也車傍有斤吾其戮乎尋而敦遣殺之當時見者莫不傷惋焉周該性果烈以義勇稱雖不好學而率繇名教叔父級為宜都内史亦忠節士也聞譙王承立義湘州甘卓又不同王敦之舉而書檄不至級謂該曰吾嘗疾王敦挟陵上之心今稱兵搆逆有危社稷之勢譙王承宗室之望據方州之重建旗誓衆圖襲武昌甘安南少著勇名士馬噐械當今為盛聞與譙王尅期舉義此乃烈士急病之秋吾致死在今日汝其成吾之志申欵於譙王乎該欣然奉命潛至湘州與承相見口陳至誠承大悦㑹王敦遣其將魏乂圍承甚急該乃與湘州從事周﨑間出反命俱為乂所執考之至死竟不言其故級繇是獲免王敦之難王傴吕蕤竝生江夏舊姓傴為江安令蕤為秀才時張昌叛亂旬日之間衆三萬江夏義陽士庶莫不從之唯傴蕤不從昌以三公位徵之傴蕤宻將宗室北奔汝南投豫州刺史劉喬鄉人期思令李權陽安令呉鳯孝亷呉暢紏合善士得五百餘家追隨傴等不豫妖逆賀循除南中郎長史不就㑹逆賊李辰起兵江夏征鎮不能討皆望塵奔走辰别帥石氷畧有揚州逐㑹稽相張景以前寜遠䕶軍程超代之以其長史宰與領山陰令前南平内史王矩呉興内史顧祕前秀才周玘等倡義傳檄州郡以討之循亦合衆應之氷大將杭寵有衆數千屯郡講堂循移檄於寵為陳逆順寵遂遁走超與皆降一郡悉平循迎景還郡即遣謝兵士杜門不出論功報賞一無豫焉周玘為議郎太安初妖賊張昌丘沈等聚衆於江夏百姓從之如歸惠帝使監軍華宏討之敗於障山昌等寖盛殺平南將軍羊伊鎮南將軍新野王歆等所在覆沒昌别率封雲攻徐州石氷攻掦州刺史陳徽出奔氷遂略有掦土玘宻欲討氷濳結前南平内史王矩共推呉興太守顧祕都督揚州九郡軍事及江夏人士同起義兵斬氷所置呉興太守區山及諸長史氷遣其將羗毒領數萬人距玘玘臨陣斬毒時右將軍陳敏自廣陵率衆助玘斬氷别帥趙驡於蕪湖因與玘俱前攻氷於建康氷北走投封雲雲司馬張統斬雲氷以降徐揚竝平玘不言功賞散衆還家劉遐廣平人值天下大亂遐與塢主壁於河濟之間賊不敢逼遐間道遣使受元帝節度朝廷嘉之璽書慰勉以為龍驤將軍平原内史建武初元帝令曰遐忠勇果毅義誠可嘉以遐為下邳内史將軍如故邵續為茍晞叅軍除沁水令時天下漸亂續去縣還家紏合亡命得數百人王浚假續綏集將軍樂陵太守屯厭次以續子乂為督䕶續綏懷流散多歸附之石勒既破浚遣乂還招續續子孤危無援權附於勒勒亦以乂為督䕶既而段疋磾在薊遣書要續俱歸元帝續從之其下諫曰今棄勒歸匹磾任子危矣續埀泣曰我出身為國豈得顧子而為叛臣哉遂絶於勒勒乃害乂續懼勒攻先求救於匹磾匹磾遣弟文鴦救續文鴦未至勒已率八千騎圍續勒素畏鮮卑及聞文鴦至乃棄攻具東走續與文鴦追勒至安陵不及虜勒所署官并驅三千餘家又遣散騎入勒北邉畧常山亦二千家而還匹磾既殺劉琨夷晋多怨叛遂率其徒依續勒南和令趙領等率廣川渤海千餘家背勒歸續而帝以續為平原樂安太守右將軍冀州刺史進平北將軍假節封祝阿子續遣兄子武邑内史存與文鴦率匹磾衆就食平原為石季龍所破續先與曹嶷亟相侵掠嶷因存等敗乃破續屯田又抄其戸口續首尾相救疲於奔命太興初續遣存及文鴦屯濟南黄巾固因以逼嶷嶷懼求和俄而匹磾率衆攻段末杯石勒知續孤危遣季龍乘虗圍續季龍騎至城下掠其居人續率衆出救季龍伏騎斷其後遂為季龍所得使續降其城續呼其兄子存竺及子得等曰吾志雪國難以報所受不幸至此汝等努力自勉便奉匹磾為主勿有二心時帝既聞續沒下詔曰邵續忠烈在公義誠慷慨綏集荒餘憂國忘身功勲未遂不幸䧟沒朕用悼恨於懷所統任重宜時有代其部曲文武已共推其息緝為營主續之忠義著於公私今立其子足以安衆一以續本位即授緝使總率所統效節國難雪其家讐存及竺緝等與匹磾嬰城距冦而帝又假存揚武將軍武邑太守勒屢遣季龍攻之戰守疲苦不能自立乆之匹磾及其弟文鴦與竺緝等悉見獲惟存得潰圍南奔在道為賊所殺竟亦遇害孔坦為領軍司馬初除未赴召㑹王敦反坦與右衞將軍虞潭俱在㑹稽起義而討沈充事平始就職陶回丹陽人為王導司馬蘇峻之役王師敗績回還本縣収合義軍得千餘人竝為歩軍與陶侃温嶠等并力攻峻又别破韓晃時大賊新平綱維弛廢導以回有噐幹權補北軍中候辛恭靖少有噐幹才量過人隆安中為河南太守㑹後秦姚興來㓂恭靖固守百餘日以無救而䧟被執至長安興謂之曰朕將任卿以東南之事可乎恭靖厲色曰我寜為國家鬼不為羌賊臣興怒幽之别室經三年至元興中誑守者乃踰垣而遁歸於江東安帝嘉之桓𤣥請為諮議叅軍置之朝首尋而病卒丁穆字彥遠孝武太元四年除振武將軍梁州刺史受詔未發㑹苻堅遣衆冦順陽穆戰敗被執長安稱病不仕偽朝堅又傾國南㓂穆與闗中人士唱義謀襲長安事泄遇害臨死作表以付其妻周其後周得至京師詣闕上之孝武下詔曰故順陽太守真定侯丁穆力屈身䧟而誠節彌固直亮壯勁義貫古烈其䘮柩始反言増傷悼可贈龍驤將軍雍州刺史賻賜一依周虓故事為立屋宅并給其妻衣食以終厥身庾仄新野人桓𤣥僭楚王置相國加九錫之命仄聞之乃起義兵襲馮該於襄陽走之仄有衆七千於城南設壇祭祖宗七廟南蠻叅軍庾彬安西叅軍楊道䕶江安令鄧襄子謀為内應仄本仲堪黨桓偉既死石康未至故乘間而發江陵震動桓濟之子亮起兵於羅縣自號平南將軍湘州刺史以討仄為名南蠻校尉羊僧壽與石康共攻襄陽仄衆散奔姚興綝等皆遇害册府元龜卷七百六十
