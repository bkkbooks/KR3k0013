body:
  text: 册府元龜卷一百六十五宋王欽若等撰帝王部招懐第三唐德宗建中初原州别駕劉文嘉閉城拒守帝命朱泚等攻之城中將士當受春服賜予如故二年十月徐州刺史李洧并淄青李納以其州來降加御史大夫食實封二百戸仍充招討使十二月以淄青李納之降將攝宻州刺史馬萬通為宻州刺史兼御史中丞三年正月魏博田恱將任履虚偽以衛州降便授衛州刺史兼御史中丞二月以田悅降將為博州刺史兼御史中丞李再春檢校右常侍兼本官賜實封一百戸魏博招討副使初再春子瑶為田恱禆將悅敗於洹水瑶自魏州出降馬燧再春因以其州降遷瑶銀青光禄大夫試太常卿兼侍御史三月田悅將攝雒州刺史田昂以州降授檢校右常侍兼雒州刺史御史中丞實封一百戸四月李納將攝德州刺史王士真攝棣州刺史李長卿皆以州降因授士真兼御史中丞德州刺史長卿檢校秘書監兼為潁州刺史各實封一百戸是月宣武軍節度使劉洽攻李納之濮陽降其守將高彦昭平恩郡王賜實封五百戸七月以盧龍軍節度掌書記檢校祠部員外郎鄭雲逵為諫議大夫雲逵以朱滔反因出軍乃逃歸京師帝嘉其來超拜之而留於客省興元元年二月鎮州王武俊集三軍削偽號詔國子祭酒兼御史大夫董晉中使王進傑自行在往鎮州宣命授武俊檢校兵部尚書成德軍節度使三月加司空同平章事兼幽州盧龍兩道節度使時朱滔連結回紇奚契丹阻絶王命武俊既首唱歸順帝嘉之故擢拜宰相并授幽州武俊遂悉師攻滔竟殱衂焉五月庚寅詔贈故平盧軍淄青節度使司空平章事饒陽郡王李正己為太尉自正己卒其子納即阻兵搆逆故追贈不及焉至是歸順故有斯命七月庚辰詔曰李懐光往因職任頗著幹能朕嗣位之初首加拔擢託為心膂授以節旄頃歳河朔不寕令往征討任兼將相恩極丘山及朱泚猖狂誘姦作亂擾動京邑逼廹奉天懐光率領全軍奔赴國難兇逆逃遁宗社再寜保安朕躬實有所頼委元帥河中府之權兼太尉中書令之秩廣増其食賞及宗親人臣之盛莫與為比豈朕於懐光不盡豈朕報懐光不崇京邑未收嫌釁已構被朱泚潜使姦人說誘又受張佋音韶等惑亂之辭曽不沉思遂生疑阻交通逆孽殘害忠良朕志在推誠事皆掩覆禮遇轉厚委任轉深都不悛心㐫惡日甚勑書慰問將士懐光竝不令宣三軍咸欲收城懐光竝不令出自云已共朱泚定約不能更事國家兼朱泚所遣來人令見宣慰勑使公言廹脅無復君臣朕以𦕈身獲承鴻業務全大計移幸山南倉皇之間備歴危險頼朔方等軍將士保守忠義耻䧟惡名不謀同辭誓守臣節懐光知將士之意不可改移徑往河中偷安朝夕據其罪狀情實難原然以奉天解圍嘗著勲烈昨又遣男琟音惟等謝罪懇請束身歸朝朕憫其改過之誠念其赴難之効以功贖罪務在優容令給事中兼御史大夫孔巢父齎先授懐光太子太保勑牒往河中宣諭三日内便與懐光同赴上都所在保䕶不得邀截驚動違者按以軍令仍許懐光將百人已下隨身防援如欲使令家口同行亦聽懐光自便朕必能保全終始厚恩寵命待之如初仍賜實封五百戸子孫承襲代代無絶信如皦日朕不食言朔方軍素推忠義國家每有危難未嘗不立大功子儀兩收京城皆是此軍之力昨又逺從河北來赴奉天逆賊畏威望風奔遁眷言殊績朕豈暫忘其事將士各竭忠謀叶心戮力横遭廹脅無路自申毎一念之痛心自咎比者君臣阻隔只為懐光一人今懐光自請入朝猶捨其罪况諸將士竝是功臣各冝坦然更勿憂慮所有官爵實封竝賜名定難功臣一切如故仍准元勑超五資與改轉九月詔曰朱滔受任薊門累著誠績委遇既重禄秩亦崇臣節中虧自貽伊阻洎賊泚構逆僣竊上京弟兄之親在法無赦朕以罪不相及情有可原待以如初之誠廣其自新之路執迷不復固敗是求蹙喪而歸既困方悟累獻欵疏深陳懇誠省之惻然良用憫歎雖將相嫉惡之志固所難容以居上懐柔之情未忍拒絶且喜莫大於改過德莫盛於好生冝委武俊抱眞開示大信深加曉諭若誠心益固名跡先彰朕當掩釁録誠與之昭雪宣告衆庶咸使聞知十月李希烈偽署滑州節度李澄以所部歸順加澄檢校兵部尚書汴滑節度使次月封武威郡王賜實封五百戸是月詔朔方及諸軍在河中絳州朝邑將士等艱危以來嘗濟國難去歳朕在奉天兇黨攻逼解圍赴急亦頼此軍言念勲勞情均骨肉濟朕危厄感之豈忘頃以懐光背恩自生猜阻熒惑將士汚脅忠良朕頻降詔書皆被懐光隐匿朕之誠素竟未敷揚今時属嚴凝例頒衣賜豈以懐光一人拒命遂令衆不霑恩朕於功臣義存終始其朔方將士等今年春冬衣并賞錢冝令所司别收佇待道路通流當時支遣如有歸順者續到續給其大將先有實封竝准元勑配州給牒委馬燧渾瑊逐便分付令其差人請受仍明宣諭令悉朕懐懐光擁逼朔方及諸軍將士據河中同絳等州凡數萬衆度支奏懐光下將士既同叛逆請除其冬衣不給帝謂之曰懐光一人反叛朔方將士累代忠義何罪而不給故有此命閏十月詔曰朕臨御萬方失於君道兵革不息于今五年憫衆庶之勞悔征伐之事而李希烈蔑義棄德反道虐人朕哀彼生靈䧟于塗炭茍存拯物不憚屈身故於首春特布新令赦其殊死待以至誠使臣纔及於郊畿巨猾已聞其僣竊酷烈滋甚吞噬無厭將相大臣咸懐憤激繼陳章疏固請討除朕以所行天誅本去人害兵戈既接玉石難分言念勲臣横遭脅制雖思改革厥路無繇乃受汚終身啣寃沒代淪胥以逞誠足痛傷豈孽自一夫而毒流萬姓為人父母能不愧懐冝令諸節度使將欲進軍先加曉諭王師致討唯在元兇所有脅從一切勿問如能去逆効順因事建功明設科條以示褒勸貞元元年三月己未以光州固始縣令孫液為鄭州刺史兼御史中丞始液因官䧟賊李希烈㓂沒汴州廼廹武牢盡為所制託液心腹授偏師鎮鄭州希烈敗退保蔡州液以州來歸四月詔朔方及諸軍應在河中將士頃赴奉天濟朕危難皆是功臣懐光脅其妻孥脫身無路朕属者下詔招諭官爵實封一切如舊雖獲於陣上亦無所傷皦然此心無負忠義今馬燧渾瑊并諸軍勝捷相繼河中將校歸降頗衆皆奉國捐家足以見軍士之心興言感歎冝加優撫冝以馬燧渾瑊充招撫使棄逆歸順一切不問歸順將士仍别建營屋優給任用各盡其才所在誘諭務稱朕意八月李懐光平詔曰國家多難二紀于兹朕嗣位七年連兵五載追惟往事悔恨盈懐今二孽繼誅諸方甫定哀彼淮右獨為匪人其帥不共其衆何罪諸道應與淮西連接冝各守封境非被侵軼不須進討仍委所在長吏明加招諭宣布朕懐李希烈若能歸降待之以不死其餘將士官吏百姓等一切洗滌與之更新明示庶邦自求多福無有逺邇咸使聞知二年二月詔曰李希烈負恩作亂劫脅平人朕念生靈無辜務欲息兵捨罪累行赦令皆許自新言必再三事出誠素此朕含垢忍耻屈法為人之心天下所明知也希烈又固執兇圖驅脅將士違我詔命犯我軍兵今月三日遣偽署申隨唐鄧四州都知兵馬使杜文朝率馬歩五千人入襄州北界山南東道節度使樊澤勒兵馬與戰大破其徒斬級擒生盪除畧盡又於陣上生擒杜文朝及大將馬坦然等此皆朕德不昭感教未敷行致使平人脅從逆命其帥有罪其人何辜朕所以省表悼心感事増歎猶兾改過尚可息兵明稱屈己之心式洽好生之義其陣上生擒將士馬坦然等七百九十人冝令樊澤給衣服糧食竝放却還并冩前後赦文勑命宣示淮寜將士等有能向化者准赦令一切不問官爵如初其傷痍未盡復者竝委醫療令其得所其陣上所殺人冝差所繇官於側近埋瘞兼立碑記無使暴露欝吾春和其杜文朝身領全軍事得繇已不能歸順力屈就擒待到日當有處分七月以許州鎮遏使李光暉為許州刺史薛翼為唐州刺史光州鎮遏使夏侯沼為光州刺史隨州鎮遏使李惠登為隨州刺史褒歸順也十年七月昭義行軍司馬元誼據洺州以謀亂誼之弟諒時為兵部員外郎素服待罪闕下帝令復職且遣諒以書諭誼焉十一年九月昭義軍節度使掌書記試秘書郎盧頊為洺州别駕知州事賜緋魚袋賞有功也時元誼據洺州頊白於節度王䖍休請入城說下之頊見誼為陳利害誼請隨頊歸朝故頊不次授官誼亦不赴京師憲宗元和元年正月命髙崇文討劉闢三月丙子山南西道節度使嚴礪奏收梓州破賊千餘人丁丑制曰朕聞皇祖𤣥元之誡曰兵者凶噐也不得已而用之㳟惟聖謨常所祗服故雖文告有所不至誠信有所未孚姑務安人必能忍耻朕之此志亦可明徵近者德宗皇帝舉柔服之規授宰衡之任宏我廟勝遂康巴庸故得南詔入貢西夷寢患成績始究元臣喪亡劉闢乗此變故坐邀符節朕以枉成命者雖乖於禮體從權便者所兾於輯寜竟違卿士之謀遂允僥求之志朕之於闢恩亦宏矣曽不知負牛羊之力飽則逾兇畜梟獍之心馴之益悖誑惑士伍圍逼梓州誘䧟戎臣塞絶劔路師徒所至燒掠無遺干紀之辜擢髪難數朕為人司牧育彼黎元如闢之罪非朕敢赦是用叶羣帥之謀除百姓之害永清妖孽底定一方伐罪吊人於是乎在其逆賊劉闢在身官爵宜竝削除今王師鼓行尋濟天險梓潼城守已解攻圍壓卵注熒坐看撲滅其西川將士如有乗此聲勢翻然改圖梟斬兇魁以効臣節者必當特加爵秩髙位重賞朕無愛焉其餘將吏等但能去逆效順以所領歸降者超秩三資授官以一身降者亦與改轉長行官健歸順者竝與叙録仍加賞給其西川管内刺史等當其阻亂孰克靜戈雖章表未通而𠂻誠可見今能歸欵亦仍舊職如或乗機立效因事建功竝特加酬賞務極優厚夫皇王之道吊伐所加義在除殘情非樂戰故脅從罔理必戒於徂征焚溺是哀俾興於徯怨禁暴止亂其在兹乎况有迹䧟兇徒心非黨惡歸我無路遂至淪胥言念斯流尤深軫惻所以明諭將帥罪止渠魁其餘染汚一切不問布告遐邇冝悉朕懐九月以西川降將文悅為戎州刺史仇良輔為簡州刺史二年十月潤州將張子良等既擒逆賊李錡制曰浙西管内官吏及職掌人若被廹脅驅使者但情非同惡一切不問三年六月癸亥以邕管將黄少卿為歸順州刺史弟少髙少温竝授官少卿西原蠻酋也貞元中屢為邉㓂至是相率歸欵四年鎮州王承宗拒命以䕶軍中尉吐突承璀將兵討之詔曰自古哲王之有天下者懲其暴亂則法所冝加察其情狀則罪有不及况故太尉兼中書令武俊忠扶邦國節著艱難覧視册書想見風槩而承宗毁棄門戸違悖君親遽肆姦兇自貽討伐欒盈干紀寜忘武子之勲蕭延紹封無廢鄼侯之嗣矧忠而見節禮以議親冝降深恩庶行中典載明樵採之禁兼茂歸降之制好生之德俾浹人心止殺之源用孚朕志其王士平士則竝宜各守舊官其武俊實封仍特賜士則承襲鎮州大將昔著茂勲言念其勞每念增歎其有食實封者竝宜依舊不須停給如領兵軍將以所領歸降者超二資與官賜實封二百戸仍賞錢一萬貫文其武俊士員松楸墳墓行營諸軍竝不得輙有毁伐除暴勝殘事非獲已布徳施惠仁豈逺乎用彰吊伐之師式示皇王之道宣布内外宜悉衷懐十一月丁未詔鎮兾管内諸州百姓等莫匪王人皆同赤子盖戀生業逐廹兇威暴賦急征既嗟於無告冐鋒觸刅又慮其俱焚言念于兹良深憫惻其應討伐鎮州諸軍所到之處冝先存撫百姓使安其業勿令虜掠傷害以副朕心八年八月丁未鎮州賊帥張伯靖降于荆南九月辛亥以伯靖為右衛翊府中郎同正員兼歸州司馬仍委荆南節度使軍前驅使九年十月甲子制曰朕嗣膺寳位于兹十年每推至誠以御方夏庶以仁化臻於太和宵衣旰食意属於此今淮西一道未達朝經擅自繼襲肆行㓂掠將士等廹於受制非是本心思去三面之羅庶遵兩階之義宜以山南東道節度使嚴綬兼充申光蔡等州招撫使仍與薛道衡將帥等即同糾率共申曉諭其淮西將士官吏等如有歸國者即量其髙下便授職任仍具聞奏即超官爵縱舊有罪犯一切無問吳元濟如束身歸朝亦當棄瑕録用其百姓有歸投者仰便給糧食仍與田宅務加存恤使其安堵事平之後淮西將士冝共賜錢二百萬貫百姓給復三年詔書所不該者嚴綬量其所宜條流奏聞庶盡綏懐之義以申生育之恩若尚執迷不能遷善至於問罪自有常刑宣以誠懐使其知悉乙丑命内常侍知省事崔潭峻都監申光蔡等州招撫使及山南東道節度兵馬使仍與嚴綬及諸道計㑹逐便宣撫十二年二月庚申勑淮西賊中百姓窮困相率歸順其數甚多言念生人載懐哀憫必資綏撫使獲安存於許汝行營側近置行郾城委韓𢎞計議揀稳便處置又於唐州側近置行吳房縣仍令本界節度觀察使擇幹了官知縣事兼量置兵馬防䕶使免憂危時行營諸軍兵招得淮西百姓五千餘戸賊以西南受攻者三年貯藏内竭併食共衣戰卒之外多無粒食水竭其魚鼈菱芡陸盡其走獸畜産以及草木又苦賊令苛虐相帥而出賊亦慮索其食不復禁之三月己巳以太子僕楊元卿為蔡州刺史兼御史中丞本州團練鎮遏使詔曰淮蔡近郊乆隔皇化本殱兇虐在拯生靈况今賊黨㩦離相繼效順思俾阽危之俗盡霑牧飬之恩勞倈招綏今之所切其新除蔡州刺史楊元卿宜令與李愬商量計㑹且於唐州東界選擇要便權置行蔡州如百姓官徤有歸順者便准勑優恤存撫令知國恩必使全活四月乙亥詔曰刑賞大信國令必行義勇深誠旌答斯在西文城栅歸降都將吳季琳堅拒逆之計結勤王之心翻然令圖竟効前欵髙秩厚賜冝醻爾勞可試秘書監兼御史中丞封濮陽郡王賜實封二百戸賞錢萬貫仍令李愬署以重職以奬忠臣五月辛未詔曰見機効節誠固於危途秉義懐忠福生於死地挈其全邑誓彼萬心事且超於等倫賞豈限於班次郾城降將殿中監鄧懐金自王師壓境詔命先施識祝網之深恩感投身之有地縲俘以列介士無譁披於㐫􅇕造我營部聆之者響振慕之者風趨銷遏亂源導迎善氣固可勒功王府播美天衢拜爵當時傳封後裔可檢校太子賔客兼御史大夫封新平郡王并賜實封二百戸賞錢一萬貫又委李光顔署以重職仍加銀青光禄大夫十三年正月一日赦書鎮州王承宗若能束身赴闕捨而不問仍加官爵三月制曰王承宗先祖武俊有勞王家雖再加之師毎從人欲而十代之宥常切朕懐近以三朝稱慶八表流澤廣此鴻霈開其自新而承宗果能翻然改圖披露𠂻懇逺遣二子進陳章表緘圖印以上聞獻德棣之名部發囷奉粟并竈貢鹽諒申效順之心足見納忠之志抑而不撫何以示懐其王承宗所有瑕釁特冝洗雪依前銀青光禄大夫檢校吏部尚書餘如故其管内四州百姓委承宗厚加安慰先是命尚書右丞崔從使鎮州賜之璽書期以自新承宗素服俟罪奉表陳白帝益矜之遂復爵命以華州刺史鄭權檢校工部尚書兼德州刺史充横海軍節度德棣滄景觀察使四月甲寅魏博遣使將押送承宗男知感知信及其將石汎等至臺門請罪中使宣㫖令於客省安置俄有詔移館於禮賔院魏博監軍遣使獻王承宗德棣二州圖印兼請入管内租稅七月詔復承宗實封二百戸十二月戊寅魏博及義成軍送到擒獲逆賊李師道下都知兵馬使夏侯澄兵馬使宋澄等四十七人竝從釋放仍却逓送魏博義成軍營委收管驅使如縁父母猶在賊中或羸老病疾情切歸還者仍加賜優賞放去務於全貸何所疑留及澄等至行營賊覘知之潜相傳告繇是叛徒皆感朝恩繼有降者十四年正月淄青偽署海州沭陽縣令兼鎮遏兵馬使梁洞以縣降於楚州刺史李聰詔授洞檢校殿中少監兼侍御史知沭陽縣事賜實封一百戸賞錢五千貫并令淮南節度使李夷簡授之重職其縣權𨽻楚州加聰兼御史大夫穆宗以元和十五年正月即位十一月癸卯制曰朕聞帝王丕宅四海子育羣生如天無不覆如日無不炤其發號施令也如雨故能上符天道下感人心朕自嗣守寳圖將欲恢宏王略嘗懼化有所未至恩有所不周乃睠兾方初喪戎帥念乎三軍之士洎於四州之人或懐忠積誠而思用莫展或灾荒兵役而望恤何階今則昌運一開誠節咸著王承元首陳章疏願赴闕庭永念父兄之忠克固君臣之義已加殊奬别委重藩又念成德軍將士等叶謀嚮義丹欵載申咸欲効其噐能各冝列於爵秩大將史重歸牛元翼等已竝超授寵榮今復都加厚賜普示深恩兼以四州貧下百姓當敷賑贍之惠俾識含育之恩宜令諫議大夫鄭覃往鎮州宣慰親諭朕意仍共賜賞錢一百萬貫以内軍及戸部見在疋段支送充賞給將士兼貸四州貧下差科州縣之中或有殘破頗甚者委田𢎞正量便冝優䘏務令存濟朕又以王澤所洽天網方恢宥過釋寃與人休泰其管内繫禁囚徒罪無輕重竝冝赦免其大將等雖已頒賜官爵或慮有遺并判官等且委𢎞正具名衘聞奏如或父母在者别具上聞當加優恤當道從前已來官吏將校等或忠義可嘉而刑戮濫及如有此色亦條録奏聞當加追贈如子孫見在者厚加優䘏仍具聞奏四州之内有髙年惸獨或承平遺老咸覩皇風或孤獨廢疾不能自存者差官就問量給粟帛四州之内有奉職清勤惠及百姓者具事跡聞奏當量加進改如有隱居山谷退在丘園行義素髙名節可尚或才兼文武卓然可奬者具名薦聞朕以武俊之勲勞光于彛鼎士貞之恭恪繼被節旄承宗感恩亦克立效永言十代之宥俾賜一門之榮承宗兄弟竝已授官爵如或未盡霑及亦當具名聞奏其承宗塟事亦差官勾當禮物之間務令周厚嗚呼録其遺忠延乎後嗣旌其衆善被于一方國有羡財不吝於䘏隐朝有好爵無愛於功賞庶使八表大同五兵永戢宣示中外冝體朕懐長慶元年八月鎮州監軍使宋惟澄奏七月二十八日夜節度使田𢎞正為亂兵所殺并叅佐及家属元從將吏合三百餘人共推都將王庭湊知兵馬事下詔曰朕嘗讀𤣥元書至於佳兵者是樂殺人因念子孫名之建於霸非不三十年不能為成人豈忍以一朝之忿驅而殺之然而田𢎞正首以六州之衆歸於朝廷開先帝之雄圖變河朔之舊俗除去苛暴昭宣惠和愛人如身飬士如子拊循教訓必忠孝為先是以魏之師徒一年而知恩二年而知禮三年而相與譲於道矣故南征淮蔡東伐青齊北定趙地元勲茂績皆自魏師肆我憲宗付之心膂入則輔弼出則藩垣推誠不疑近實無比顧朕小子獲受丕圖嗣守不遑何暇恢復而承元請覲兾郡擇才苟非勲賢不敢輕授是用咨我元老囂於是邦而又寵諸將以懋官加三軍以厚賜復其租入惠彼蒸黎於此一方之人可謂無有不至而梟音未革狼顧猶存忍害忠良恣為殘賊臨軒震悼撫几驚嗟天胡不仁一至於此朕下為君父上奉祖宗毁舟檝於鯨鯢㗖股肱於蛇豕尚欲因循忍耻苟免偷安非唯傷心於田氏之子孫亦將何顔謁先帝之陵廟人神共憤卿士叶謀咸願誅夷用申􅁈痛便合興師進討以翦姦兇尚念一軍之中豈得無義勇倉卒變動必非衆謀茍得其魁餘復何罪冝令魏博横海昭義河東義武軍等各出全軍以臨界首仍各飛書檄具諭朝㫖如王庭湊能執首謀為亂扇動三軍者送至隣道或就州處置然後束身歸朝必當超奬授三品正員官并與實封五百戸其餘三軍將士一切不問并大將等或有能相勸諭翻然改圖者各隨事跡當加寵擢如王庭湊執迷不寤諸道冝便進軍以時翦滅苟不得已至於用師其有効忠則冝懸賞如有梟斬兇渠者先是六品以下官冝與三品正員官先是五品節級昇進仍與實封三百戸庄宅各一區錢二萬貫以一州歸順者便與當州刺史仍賜實封三百戸如先是本州刺史以一州歸順者超上資與官仍與實封二百戸一縣歸順者超兩資與官實封二百戸如有能率所管兵馬并以城鎮來降者竝超三資與官賜爵實封一百戸賜錢一萬貫以身降者亦凖前例處分其有城鎮將士百姓等守節拒賊身死王事各委長吏優給其家仍具事跡聞奏當加褒贈其有潜謀誅斬渠魁被其屠戮者冝便加追贈并賜錢帛仍與一子官諸軍所至不得妄加殺戮焚燒廬舍掠奪資産并有拘執以為俘馘其管内州縣有自置義營堡柵王師所至能相率來歸各加酬勞時當秋候務切農功邉界之人懼廢耕織應縁軍務所須不得干擾百姓如要車牛夫役工匠之類竝冝和顧情願仍優給賞錢賊平之後應立功將士竝與超資改官節級賜物其長行官徤歸降者亦當優賜褒賞幽陵變擾誠謂亂常以其旁害賔寮毒加台鉉較其輕重示以招攜尚開迷復之門用廣自新之路如聞賊中文牒妄作異端皆指朝廷徵兵欲戍邉塞此皆狂詐扇動人心况今邉上甲兵足以備禦欲令知悉故重宣明仍委所在節將以此告諭昔堯舜之俗比屋可封虞芮之人讓畔可感仁義則水火可蹈忠信則蠻貊可行繇是言之亦在化之而已逮我長理何其逺哉豈朕之滿假荒寧自聖而不可教也將朝之魁梧骨鯁自持而莫我念耶二者之來皆朕不敏内省終夕其心浩然於虖封域之中干戈作矣廊廟罇爼無忘敉寧布告朕懐以須良畫文宗初即位以故横海節度李全略子同㨗為兖海節度同㨗託以三軍乞留拒命太和元年八月庚子詔曰王者之御天下也推其至誠格以大順臣子之奉君父也効以奔走竭其忠貞故能上下交感家邦用寧其有專上周旋干紀悖戾怠棄彛典矯誣當時固人神之所不容古今未能制者也朕以菲德祗荷鴻業將躋俗于至厚之域致人於無過之地永用勞慮惻然疚懐李同㨗幸席舊勲不思纉緒斬焉未幾私行墨縗毒殺忠良擾惑部校稽之國憲難逭常刑朕以頃在先朝已稽中㫖實遵成命來議改圖庶乎舞階以服有苖因壘而降崇國使臣旁午優詔指明而又越留務之權授之戎帥㧞負海之地置之中華推恩含垢斯亦至矣而同㨗益懐迷執閉境搜兵大詬鄰封拒捍中使遐邇憤怒中外驚嗟叛命既彰大義當絶事非獲已良用憮然其李同㨗在身官爵竝削奪朕以滄溟之地兇魁竊據今若怒兹小醜遽至大刑慮金革一揮玉石同碎弔人之義深置未安冝令四面節度使各蓄兵鋒共固疆守絶其窺伺之路撫其離叛之人嚴戈矛之備以待其窮據山川之要以張我武如叛徒驚擾潜有侵軼當隨機禦遏以自保完勿使凌犯為虞隄防或弛其滄景將士如有能􅁬揚忠義執戮渠魁者先是六品已下官者便授三品正員官其先是五品已下官者節級超奬仍賜庄宅各一區錢二萬貫文竝列加寵任如能率所管兵馬以州郡來降者超三資與官便授岳牧賜錢一萬貫以城鎮來降者超兩資與官仍賜錢五千貫以一身降者亦與改轉仍賜錢帛其同㨗如能知義悔過束身歸朝竝與洗雪仍加寵奬若不能悛悟自取誅夷罪止一身其餘脅汚一切不問於戲佳兵者聖祖之所誡文德者前哲之所崇肆予寡昧敢忘丕訓然以齊庶方者號令立人紀者君臣斯制茍渝大倫安設是用絶其奔軼誡以申嚴佇無戰於文告庶有瘳於迷復特此來逺諒非初心布告内外咸使知悉二年三月己夘徐州節度使王智興奏於棣州界破賊五百餘人燒却棣州三面城門庚辰勑曰如聞招討棣州計日降下賊收百姓多在城中時方春農必多餒廹歸降之後宜委智興據戸口人數節級賑賜俾各安生業便以度支供軍斛㪷數内充如失家業者仍以空閒屋居田地逐便安存九月辛丑授棣州降將劉志清為正議大夫檢校太子詹事兼侍御史龎再忠為朝散大夫檢校少府監殿中侍御史滄州塩山縣主簿知州事張叔連為福王友八年二月庚寅詔邕府招討使董昌齡自邕州累平溪洞兵威所向首惡皆擒言念蒼生無非赤子况在荒徼尤當撫循其溪洞如有未歸附者向後非因侵擾更不用進討仍加存撫各使懐安所獲溪洞百姓竝分配附近州縣令自營生不得沒為奴婢將充賞賜開成二年三月壬申詔唐州刼掠縣官㨗桂管聚集妖人或始於討窮或迷於誘導嘯集未散伏藏山林者委本處長吏遣人宣諭恩㫖竝放令歸鄉貫田里俾安家業勿更根尋武宗㑹昌三年八月昭義軍劉積叛命令河朔三鎮討積命徐許滑孟魏鎮幽并八鎮之師四面進攻制曰成德軍節度使王元逹魏博軍節度使何孔敬或姻連王室或任重藩維懇陳一至之誠願揚九伐之命吳漢任職受詔而初無變顔卜式朴忠未戰而義形於色况成德軍嘗以梟騎横陣首破朱滔士氣方酣再廻魯陽之日鼔音未息三周不注之山魏博軍亦以大斾渉河竟殱師道建十二州之旗鼓以列降人削六十年之厲階盡歸皇化士博餘勇軍有雄心必能禀鄼侯之指縱成葛亮之討伐咨爾二帥朕所注懐元逹守本官充北面招討澤潞使孔敬守本官充東面招討澤潞使潞州曩者列祖在藩先天啓聖符瑞昭晰績事煥于後亭鑾輅巡遊金石列于代邸實謂可封之俗乆為仁壽之鄉艱難已來頗著誠節必非同惡咸許自新其昭義軍舊將士及百姓等如保初心竝赦而不問其大將等如能捨逆效順以州郡兵衆降者必加封當如能擒逆賊劉積者别授土地以報勲庸其諸道進軍不得燒毁廬舍發掘丘墓仍委劉沔王茂元同力攻討朕以羣臣執義固爭謀非獲已告布中外明體予懐宣宗大中三年正月涇原節度使康季榮奏吐蕃宰相俞􅅷勲以秦原安樂三州歸闕七月三州七關軍人百姓皆河隴遺黎數千人見於闕下帝御延喜門撫慰令其解辮賜之冠帶共賜絹五十萬疋懿宗咸通四年七月詔徐州銀刀官徤其中先有逃竄者累降勅㫖不令捕逐其今年四月十八日草賊頭首已扺極法其餘徒黨各自奔逃所在更勿捕逐僖宗光啓元年閏三月詔諭秦宗權近鎮制曰我國家天厯自歸君臨無外十七聖滂流𤣥澤積潤山靈三百年保定鴻基方延運祚其間數纒灾運祻起兇狂纔聞竊命之稱已觸震雷之怒或腹心生變或骨肉相圖近事可明靈誅不漏蓋人祇之共憤乃宗社之儲休亦頼中外重臣佐佑薄德大耻既雪小康可期須申誥諭之勤用致綏懐之㫖而宗權藩垣攸属倚仗特深章表繼來至誠可驗而兵戈未戢物論猶疑是生交搆之端益惑親隣之聽况位崇將相爵極侯王圖功則國禍可平快志而家寃已雪勸忠貞於部伍莫若率先鍳成敗於古今當思釋禍猶冐属厭之誡適揺怙亂之機且患難雖繁封疆有制各圖侵軼自掇悔尤髙潯之下澤州將攻偽帥周岌之窺臨汝本利危邦翻為致㓂之資蓋昧啓讐之釁得土為他人所有得貨財亦他人所資勢敵則相傾力均則相忌害莫深於歸怨利莫厚於圖安况井邑皆空耕桑盡廢歎瘡痍而未復軫哀痛而難忘且雒邑通都非列蕃之所併河陽要地亦諸夏之必爭若不制自本朝豈可公然竊據節旄寵授須俟王人賦稅均輸合資國用至于封疆隣接續可商議指揮但當還舊尤藉近鎮繼聞蒲陜已受攻圍河外既事於枝梧關中自防於漕轉廽車或阻奉國逾虧今者先在息兵各令守境爵位幸非愛惜君臣足保初終尚或執迷方知誤計若法制不行於一處即征伐須徇于衆情人亦有言理難為黨雖萬方之罪當責朕躬而九廟之威更慿天力縱以黄巢頃盗宫闕曽㑹師徒既戮元兇須遵後命所以寢興念慮詔示殷勤猶期逺保宿心不欲便乗衆怒山河著誓當明指日之心聖哲好生必用舞干之德佇披深欵勉蹈良圖昭宗以文德元年三月即位十二月蔡州牙將申叢執秦宗權撾折其足乞降詔中使宣諭便以叢權知留後比中使至别將郭璠殺申叢簒宗權縶送汴州大順元年六月太原節度使李克用大將權知邢雒兵馬留後安建上表請以三州歸順遣中使往勞之乾寧三年八月邠州王行瑜將蓋寓李存信閻鐸判官王讓李襲吉等竝降詔加賜賚哀帝天祐三年十二月兩浙奏淮南楊行宻偽署宣州都團練觀察處置等使檢校司徒前守舒州刺史王茂章云今年正月八日部領首下馬歩遥投當道其人是淮南第一都將憤以本道兇邪來慕大朝明盛覩兹忠孝合具奏聞者敕曰王茂章能分逆順捨彼狂迷弃楊渥之亂邦不同姦險投錢鏐之巨鎮思託賢良既明向國之心頗見立身之道元戎所薦義節昭然須行激勸之規用示奬酬之寵冝授金紫光禄大夫檢校太保兼御史大夫册府元龜卷一百六十五
