body:
  text: 冊府元龜卷二百九十八宋王欽若等撰宗室部不悌邪佞奢僭躭溺不悌生民之親莫如兄弟為人之本莫先孝友是以書之五教禮之六行君陳之言有政戴記之述家肥皆著其義以為大訓况乎帝室之系本支之重就公宮之學承師氏之教固冝保於既睦豈或弔乎不咸者哉然而􅁎氏以來載籍所紀乃有致疑於忠節見忌於令名雖遇急難絶天倫之義稍殊官秩忘家人之禮以至媒孽成罪干戈相尋亡國破家身死名辱者葢有之矣固與夫禦侮致美之説異焉周管叔蔡叔周公之兄弟也成王少周公旦專王室管蔡疑周公之為不利於成王乃挾武庚以作亂漢淮南王安衡山王賜皆厲王長子也淮南衡山相責望禮節間不相能兄弟相責故有嫌衡山王賜后乘舒生子三人長男爽為太子次女無采少男孝乘舒死立姬徐來為后徐来善遇無采及孝孝少失母附后后以計愛之與共毁太子常山王勃憲王舜太子也舜有不愛姬生長男梲音奪以母無寵故亦不得幸於王王后脩生勃王多所幸姬王后稀得幸及憲王疾甚諸幸姬侍疾王后以妬媢音冒不常在輒歸舍醫進藥勃不自嘗藥又不宿留侍疾憲王薨王后勃乃至憲王雅不以梲為子數雅素也不分與財物或令勃王后分與梲財者不聽勃代立又不收恤梲梲怨王后及勃漠視憲王䘮梲自言王病時王后勃不侍及薨六日出舍出服舍勃坐徙房陵宣武侯福菑川懿王孫也武帝太初元年坐殺弟棄市騶丘侯毋害城陽共王孫也宣帝本始元年使人殺兄遂棄市魏樂陵王茂武帝子性慠狠兄東平王薨茂稱嗌痛不肯發哀居處出入自若有司奏除國上詔削縣一百五十户吳孫霸字子威和同母弟也和為太子霸為魯王寵愛崇特與和無殊頃之和霸不穆之聲聞於大帝帝禁斷往來假以精學時全寄吳安孫竒楊竺等隂共附霸圖危太子譖毁既行太子以敗䩗亦賜死霸賜死後誅寄等以黨霸搆和故也晉汝南王亮為大宰録尚書事與太保衛瓘對掌朝政楚王瑋有勲而好立威亮憚之欲奪其兵權瑋甚憾之乃承賈后㫖誣亮與瓘有廢立之謀矯詔殺之東萊王蕤齊王攸之子性彊暴使酒數凌侮弟冏冏以兄故容之冏起義兵趙王倫収蕤及弟北海王寔繫廷尉當誅倫太子中庶子祖納上疏諫曰罪不相及惡止其身此先哲之𢎞謨百王之達制也是故鯀既殛死禹乃嗣興二叔誅放而邢衛無責逮乎戰國及至秦漢明恕之道寢猜嫌之情用乃立質任以御衆設從罪以發姦其所繇來葢三代之弊法耳􅅋寔獻王之子明徳之𦙍宜蒙特宥以全睦親之典㑹孫秀死㽔等悉得免冏擁衆入雒㽔於路迎之冏不即見須符付前頓㽔恚曰吾坐爾殆死曽無友于之情及冏輔政詔以㽔為散騎常侍加大將軍領後軍侍中特進增邑滿二萬户又從冏求開府冏曰武帝子吳豫章尚未開府且須後㽔以是益怨宻表冏專擅與左衛將軍王輿謀共廢冏事覺免為庶人尋詔曰大司馬以經識明斷高誼逺略猥率同盟安復社稷自書契所載周召之美未足比勲故授公上宰東萊王㽔潛懷忌妬包藏禍心與王輿宻謀圗欲譖害収輿之日㽔與青衣共載微服奔走經宿乃還姦㓙赫然妖惑外内又前表冏所言深重雖管蔡失道牙慶亂宗不復過也春秋之典大義㓕親其徙㽔上庸後封微陽侯永寧初上庸内史陳鍾承冏㫖害㽔冏死詔誅鍾復蕤改葬以王禮河間王顒齊王冏專權顒與長沙王乂同謀誅冏以乂為内主敗冏斬之顒本以乂弱冏彊冀乂為冏所擒後以乂為辭宣告四方共討之因廢帝立成都王已為宰相專制天下既而乂殺冏其計不果乃濳使中書令卞粋等襲乂乂並誅之武陵王澹無孝友之行弟東安王繇有令名為父母所愛澹惡之如讎遂譖繇於汝南王亮亮素與繇有隙奏廢徙之宋始安王休仁文帝第十二子也明帝殞廢帝於華林園明旦休仁出住東府時南平廬陵敬先兄弟為廢帝所害猶未殯殮休仁與山陽王休祐同載臨之開帷歡笑奏鼔吹徃反時人咸非焉南齊魚復侯子響世祖第四子也世祖即位為輔國将軍見諸王不致敬梁廬陵王續武帝第五子始元帝為湘東王與續少相狎長相謗元帝之臨荆州有宫人李桃兒者以才慧得進及還以李氏行時行營户禁重續為荆州具以狀聞元帝泣對使者訴於簡文和之得止元帝猶懼送李氏還荆州世所謂西歸内人者自是二王書問不通陳長沙王叔堅宣帝第四子也叔堅與兄始興王叔陵並招聚賔客争權寵甚不平每朝㑹鹵簿不肯為先後必分道而趍左右或爭道而鬬後魏襲常山王素孫壽興少聦慧好學宣武初為徐州刺史在官貪虐失於人心其從兄侍中暉深害其能因譖之於帝詔尚書崔亮馳驛撿覆亮發日受暉㫖遂鞭撻三寡婦令其自誣稱壽興壓已為婢壽興終恐不免乃令其外弟中兵參軍薛脩義將車十乘運小麥經其禁之旁壽興因踰墻出脩義以大木函盛壽興其上加麥載之而出遂至河東匿脩義家逄赦乃出見帝自陳為暉所譖帝亦更無所責艾陵伯萇宣武時歴位雍州刺史以官位㣲逹乃自尊倨閨門無禮昆季不穆論者鄙之清河王懌弟悦為性不倫俶儻難測懌為元乂所害悦了無讎恨之意乃以桑落酒候伺之盡其私佞乂大喜以悦為侍中太尉襲咸陽王坦咸陽王禧第七子也禧以罪賜死坦兄樹奔梁後復禧王爵詔坦襲封樹為梁郢州刺史出帝初詔樊子鵠為行臺率徐州刺史杜徳以討之樹不為戰備杜徳襲擊之擒樹送京師坦見樹既長且賢慮其代巳宻勸朝廷以法除之樹知之泣謂坦曰我徃因家難不能死亡寄食江湖受其爵命今者之來非繇義至求活而已豈望榮華汝何肆其猜忌忘在原之義腰背雖偉善無可稱坦作色而去樹死竟不臨哭北齊隴西王紹亷文宣第五子也性麄嘗㧞刀逐兄范陽王紹義走入廐閉門拒之後周衛王直與齊王憲俱高祖弟初直内深忌憲憲亦隱而容之且以帝之母弟每加友敬晉公䕶之誅也直固請及憲高祖曰齊公心跡吾自悉之不得更有疑也及文宣后䘮直又宻啓云憲飲酒食肉與平日不異高祖曰吾與齊王異生俱非正嫡特為吾故同汝汝當愧之何論得失汝親太后之子偏荷慈愛今特須自朂無宜說人直乃止隋蔡景王整文帝次弟也初整娶同郡尉遲綱女生智積開皇中有司奏智積將𦵏尉太妃帝曰幾殺我我有同生二弟並倚婦家勢常憎嫉我我固向之笑云爾既嗔我不可與爾角嗔並云阿兄止倚頭額時有醫師邉隠逐勢言我後百日當病癲二弟私喜以告父母父母泣謂我曰爾二弟大劇不能愛兄我因言一日有天下當改其姓夫不愛其親而愛他人者謂之悖德當改之謂悖父母許我此言父母亡後二弟及婦讒我言於晉公于時每還入門常不喜如見獄門託以患氣常鎖閤静坐唯至食時暫開閣每飛言入耳竊云復來耶當時實不可耐羡人無兄弟世間貧家兄弟多相愛繇相假藉逹官兄弟多相憎爭名利故也滕穆王瓚一名慧文帝同母弟也尚周武帝妹順陽公主為吏部中大夫加上儀同周宣帝䘮文帝入禁中將緫朝政令廢太子勇召之瓚素與帝不協不從曰作隨國公恐不能保何乃更為族滅事耶文帝作相進位上柱國邵國公瓚見帝執政恐為家禍隂有圗帝之計每優容之唐巢王元吉高祖第四子也與隱太子建成及太宗並大穆皇后子也與建成連謀各募壯士多匿罪人復内結宫掖遞加稱譽又厚賂中書令封倫以為黨助繇是高祖頗踈太宗而加愛元吉太宗嘗從高祖幸其第元吉伏其䕶軍宇文寳於寢内將以刺太宗建成恐事不果而止之元吉愠曰為兄計耳於我何害武德九年高祖將避暑太和宫二王當從元吉謂建成曰待至宫所當興精兵襲取之置土窟中唯開一孔以通飲食耳㑹突厥郁射設屯軍河南入圍烏城建成乃薦元吉代太宗督軍北討仍奏秦府驍將秦叔寳尉遲敬德程知節段志𤣥等並與同行又追秦府兵帳簡閲驍勇將奪太宗兵以益其府又譖杜如晦房𤣥齡逐令歸第高祖知其謀而不制元吉因宻請加害太宗高祖曰是有定四海之功罪迹未見一旦欲殺何以為辭元吉曰秦王嘗違詔勅初平東都之日偃蹇顧望不急還京分散錢帛以樹私惠違戾如此豈非反逆但須速殺何患無辭高祖不對元吉遂退建成謂元吉曰既得秦王精兵統數萬之衆吾與秦王至昆明池於彼宴别令壯士拉之於幕下因云暴卒主上諒無不信吾當使人進説令付吾國務正位已後以汝為太弟敬德等既入汝手一昔抗之孰敢不服率更令王晊聞其謀宻告太宗太宗召府僚以告之皆曰大王若不正之社稷非唐所有若建成元吉肆其毒心群小得志元吉狼戾終亦不事其兄徃者䕶軍薛寳上齊王符籙云元吉合成唐字齊王得之喜曰但除秦王取東宫如反掌耳為亂未成預懐相奪以大王之威襲其二人如拾地芥太宗遲疑未決衆又曰大王以舜為何如人也曰濬哲文明温恭允塞為子孝為君聖焉可議之乎府僚曰向使舜浚井不自出自同魚鼈之屬焉得為孝子乎塗廪不下便成煨燼之餘焉得為聖君乎小杖受大杖避良有以也太宗於是定計誅建成及元吉濮王泰太宗第四子初封魏王皇太子承乾有足疾濳有奪宗之意招駙馬都尉柴武房遺愛等二十餘人厚加贈遺寄以腹心黄門侍郎韋挺工部尚書杜楚客相繼攝泰府事二人俱為泰要結朝臣津通賂遺承乾懼其凌奪隂遣人詐稱泰府典籖詣𤣥武門為泰進封事太宗省之其書皆言泰之罪狀太宗知其詐而捕之不獲承乾敗太宗面遣讓承乾曰臣貴為太子更何所求但為泰所圗時與朝臣謀自安之計不逞之人遂教臣為不軌之事今若以泰為太子所謂落其度内太宗乃幽泰於將作監徙居均州之鄖鄉縣梁朱友裕太祖長子唐末為宣武軍衙内馬歩都指揮使景福元年搃大軍伐徐時朱瑾領兖鄆之衆為徐戎外援陣於彭門南石佛山下友裕縱兵擊之斬獲甚衆瑾領殘黨宵遁時都虞侯朱友恭羽書聞於太祖誣友裕按兵不追賊太祖大怒因驛騎傳符令禆將龎師古代友裕為帥仍令按劾其事會使人誤致書於友裕友裕懼遂以數騎遁於山中尋詣廣王於輝州以訴其寃賴元貞皇后聞而召之令束身歸汴力為營救太祖乃捨之邪佞夫便辟以成性脂韋以取容持囘遹之謀期於茍合專戚施之行曽靡厚顔此固人倫之所斥而有國之宜逺者也漢氏而下乃有託於宗屏列于天屬蒙被封爵漸漬寵靈而體質異於貞淳舉措成乎憸巧附㑹姦軌諂事權倖諛辭以自結卑已而求媚因之以固寵位釣名譽而罔有所愧畏焉曾子曰脅肩諂笑病乎夏畦斯不亦為勞乎漢利侯釘丁鼎二音城陽共王子武帝元狩元年坐遺淮南王書稱臣棄市泉陵頃侯慶長沙定王曽孫平帝時上書言周成王㓜少稱孺子周公居攝今帝富於春秋冝令安漢公行天子事如周公羣臣皆曰宜如慶言新鄉侯佟徙冬反清河綱王𤣥孫平帝時上書言王莽冝居攝莽篡位賜姓王師禮侯嘉安衆侯崇之族父也崇以王莽居攝舉兵嘉詣闕自歸莽赦弗罪張竦因為嘉作奏曰建平元壽之間大統幾絶宗室幾棄幾並音巨依反賴蒙陛下聖德扶服振救陛下謂莽也服音蒲北反遮扞䕶衛國命復延宗室明目臨朝統政發號施令動以宗室為始登用九族為先並錄支親建立王侯南面之孤計以百數收復絶屬存亡續廢復音扶目反得比肩首復為人者嬪然成行嬪然多兒也行列也嬪音匹人反行音下郎反所以藩漢國輔漢宗也建辟雍立明堂班天法流聖化朝群后昭文德宗室諸侯咸益土地天下喁喁引領而歎喁喁衆口向上也音顒頌聲洋洋滿耳而入論語載孔子曰師摯之始關雎之亂洋洋乎盈耳哉故竦引之也洋音羊又音祥國家所以服此美膺此名享此福受此榮者豈非太皇太后日昃之思陛下夕惕之念哉何謂先為設問復陳其事也亂則統其理危則致其安禍則引其福絶則繼其統㓜則代其任晨夜屑屑寒暑勤勤屑屑猶切切動作之意也無時休息孳孳不已者孳孳不息也音與孜同凡以為天下厚劉氏也為干偽切臣無愚智民無男女皆諭至意諭曉也而安衆侯崇乃獨懐悖惑之心操畔逆之慮悖乖也興動兵衆欲危宗廟惡不忍聞罪不容誅誠臣子之仇宗室之讐國家之賊天下之害也是故親踈震落而告其罪民人潰畔而棄其兵進不跬歩退伏其殃半歩曰跬謂一舉足也音宗橤反百歲之母孩提之子嬰兒始須人提挈故曰孩提也孩提者小兒也同時斷斬懸頭竿杪杪末也音莫小切珠珥在耳首餙猶存為計若此豈不誖哉誖惑也音布内反臣聞古者畔逆之國既以誅討則豬其宫室以為汙池納垢濁焉掘其宫以為池用貯水也豬謂畜水汙下也汙音烏名曰㓙虚虚讀曰墟故居也言凶人所居雖生菜茹而人不食謂所食之菜曰茹音人庶切四牆其社覆上棧下示不得通棧謂以簀蔽之也下則棧之上則覆之所以隔塞不通隂陽之氣辨社諸侯辨布也布崇社國國各作一見以為戒也辨讀曰班出門見之著以為戒著明也方今天下聞崇之反也咸欲褰衣手劍而叱之其先至者則拂其頸拂戾也音佛衝其匈刃其軀切其肌後至者欲撥其門仆其牆仆倒也夷其屋焚其器夷平也應聲滌地則時成創滌地猶言塗地則時即時也創傷也音初良反而宗室尤甚言必切齒焉何則以其背畔恩義而不知重徳之所在也宗室所居或逺嘉幸得先聞不勝憤憤之願願為宗室倡始倡音先向反父子兄弟負籠荷鍤馳之南陽籠所以盛土也鍤鍫也豬崇宫室令如古制及崇社宜如亳社以賜諸侯用永監戒願下四輔公卿大夫議以明好惡視四方視讀曰示於是莽大説説讀曰悦公卿皆如嘉言莽白太后下詔曰惟嘉父子兄弟雖與崇有屬不敢阿私或見萌牙相率告之及其禍成同共讐之應合古制忠孝著焉其以杜衍户千封嘉為師禮侯嘉子七人皆賜爵闗内侯後又封竦為淑徳侯長安為之語曰欲求封無過張伯松竦字力戰鬬不如巧為奏中山王成都以東平思王孫紹封王莽篡位貶為公明年獻書言莽徳封列侯賜姓王魯王閔以頃王子紹封王莽簒位貶為公明年獻神書言莽徳封列侯賜姓王廣陽王嘉王莽時皆廢漢藩王為家人嘉獨以獻符命封扶美侯賜姓王氏晉東平王楙善諂諛曲事太傅楊駿及駿誅依法當死東安公繇與楙善故得不坐梁豐城侯泰厯位中書舍人傾竭財産以事時要陳新安王伯固後主初在東宫與伯固甚相親狎伯固又善嘲謔高宗每宴集多引之始興王叔陵在江州心害其寵隂求疵瑕將中之以法及叔陵入朝伯固懼罪諂求其意乃共訕毀朝賢厯詆文武雖耆年高位皆面折之無所畏忌伯固性好射雉叔陵又開發冢墓出遊野外必與偕行於是情好大叶後魏東陽王丕諂事要人驕侮輕賤毎見侍中符承祖嘗傾身下之元炤常山王素之孫孝文時為殿中郎坐事停廢宣武時炤從弟暉親寵用事稍遷左丞宣武末于忠執政炤為黄門郎又曲事之忠專權擅威枉陷忠賢多炤指導也後入為尚書諂事劉騰進號征西將軍卒贈尚書左僕射納貨元乂所以贈禮優越北海王詳宣武時為侍中太傅錄尚書事是時冠軍將軍茹皓侍直禁中關豫政事詳以下咸祗憚之皓弟年二十擢補貟外郎皓娶僕射高肇從妹於宣武為從母迎納之日詳親詣之禮以馬物皓又為弟聘安豐王延明妹延明恥非舊流不許詳勸强之云欲覔官職如何不與茹皓婚姻也延明乃從焉河間王琛宣武時為定州刺史在州貪惏靈太后詔廢于家琛以孝明始學獻金字孝經又無方自逹乃與劉騰為養息賂騰金寳巨萬計騰為言乃得兼都官尚書元乂京兆王黎之繼子靈太后臨朝以妹夫累加侍中領軍孝明呼為姨夫帝徙御徽音殿乂亦入居殿右曲盡佞媚元悅清河王懌之弟為性不倫俶儻難測孝明時懌為元乂所害了無讐恨之意乃以桑落酒候伺之盡其私佞乂大喜以為侍中太尉城陽王徽孝莊時為侍中大司馬性佞媚善自取容一狎内外之意宗室親戚莫與比焉臨淮王孝友仕東魏孝静為滄州刺史性無骨鯁承事權勢為正直者所譏北齊高陽康穆王湜文宣時為尚書令以滑稽便辟有寵於帝嘗在左右行杖以撻諸王太后深衘之唐李道古嗣曹王皋之子為司門貟外郎便佞巧宦早升朝籍嘗以酒肴棊博游公卿間角賭之際偽為不勝而厚償之故當時有虛名而嗜利者悉與之狎厯利隋唐睦四州刺史黔中鄂岳觀察使奢僭書稱敦叙九族詩美本枝百世夫王者厚磐石維城之固盛犬牙麟趾之風是以錫土宇分寳玉展親立愛斯焉可知而有禮越常經制踰王憲忽滿盈之戒肆汰侈之意僣擬服御擅修甲兵信用邪謀罔遵軌度大則身坐小或國除可為痛惜也漢梁孝王武文帝子為大國居天下膏腴地北界泰山西至高陽陳􅅏北縣四十餘城多大縣孝王太后少子愛之賞賜不可勝道道謂言也於是孝王築東苑方三百餘里廣睢陽城七十里更廣大之也晉太康地記云城方十三里梁孝王築之鼔倡節杆而後下和之者稱睢陽曲今踵以為故故今之樂家睢陽曲是其遺音大治宫室為復道自宫連屬於平臺三十餘里平臺在大梁東北離宫所在也得賜天子旌旗從千乘萬騎出稱警入言䟆警者戒肅也䟆止行人也言出入者互文耳出亦有䟆漢儀注皇帝輦動左右侍帷幄者稱警出殿則傳蹕止人清道也儗於天子儗比也音擬招延四方豪傑自山東游士莫不至齊人羊勝公孫詭鄒陽之屬言皆游梁公孫詭多竒邪初見日王賜千金官至中尉號曰公孫將軍多作兵弩弓數十萬而府庫金錢且百鉅萬鉅萬百萬也且百萬者言凡百也珠玉寳器多於京師孝王未死時財以鉅萬不可勝數及死藏府餘黄金尚四十餘萬斤他財物稱是魯恭王餘景帝子治宫室苑囿狗馬季年好音季年末年江都易王非景帝子好氣力治宫館招四方豪傑奢甚後漢琅琊王京光武子好脩宫室窮其伎巧殿館壁帶皆飾以金銀壁𢃄壁中之横木也以金銀為缸餙其上濟南安王康光武子多殖財貨大修宫室奴婢至千四百人廄馬千四百匹私田八百頃奢侈恣欲游觀無節陳王均明帝孫敬王羡之子嗣立多不法遂行天子大射禮魏曹爽太祖族子真之子為大將軍飲食車服擬於乘輿尚方􅎇玩充牣其家妻妾盈後庭又私取先帝才人七八人將吏師工鼓吹良家子女三十三人皆以為伎樂詐作詔書發才人五十七人送鄴臺使先帝媫妤教習為伎擅取太廟樂噐武庫禁兵作窟室綺疏四周數與何晏等㑹其中縱酒作樂晉齊武閔王冏獻王攸之子為大司馬築第館掾屬四十人北取五榖市南開諸署毁壊廬舍以百數使大匠營制與西宫等鑿千秋門墻以通西閣後房施鍾懸前庭舞八佾沉於酒色不入朝見竟陵王楙義陽王望子在國殖財貨奢僣踰制既而都督兖州徴求民不堪命宋彭城王義康高祖子文帝時以大將軍領司徒私置僮六千餘人不以言臺時四方獻饋皆以上品薦義康而以次者供御帝嘗冬月噉柑嘆其形味並劣義康在坐曰今年柑殊有佳者遣還東府取柑大供御者三寸江夏王義恭高祖子文帝時以太尉領司徒年給相府錢二千萬他物稱此而義恭性奢用嘗不足帝又别給錢年至千萬南郡王義宣高祖子為荆雍都督多畜嬪媵後房千餘尼媪數百男女三十人崇飾綺麗費用殷廣南齊廬陵王子卿世祖第三子為荆州刺史在鎮營造服飾多違制度帝勅之曰我前後有勅非復一兩道諸王不得作乖體格服飾汝何意都不憶我勅邪忽作瑇瑁乗具已成不須壊可速送都又作銀鐙金簿箭脚便速壊去凡諸服章自今不啟吾知復專輒作者後有所聞當復得痛梁臨川王宏高祖弟為司徒驃騎大將軍縱恣不休奢侈過度修第擬於帝宫後庭數百千人皆極天下之選所幸江無畏服玩侔於齊東昬潘妃寳屧直千萬好食鯖魚頭嘗日進三百其他珍膳盈溢後房食之不盡棄諸道路江本吳氏女也世有國色親從子女遍遊王侯後宫男女兄弟九人因權勢横於都下衡山侯恭南平王偉之子性尚華侈廣營第宅重齋歩櫩模寫宫殿尤好賓友酣宴終辰座客滿筵言談不倦時元帝居藩頗事聲譽勤心著述巵酒未嘗妄進恭毎從容謂曰下官歴觀時人多有不好懽樂乃仰眠床上看屋梁而著書千秋萬歲誰傳此者勞神苦思竟不成名豈如臨清風對朗月登山泛水肆意酣歌也後魏曲陽侯素延桓帝之後道武留心黄老欲以純風化俗雖乘輿服御皆去彫飾素延奢侈過度帝深衘之積其過因徴坐賜死北海王詳孝文弟宣武時以季父崇寵位望兼極而貪冒無厭珍麗充盈聲色侈縱建飾第宇開起山池所費巨萬京兆王愉孝文子與弟廣平王懷頗相夸尚競慕奢麗貪縱不法於是宣武攝愉禁中推案杖愉五十出為冀州刺史北齊清河王岳神武王從父弟性華侈尤恱酒色歌姬舞女陳鼎擊鐘諸王不及也河南王孝瑜文襄之長子初文襄於鄴東起山池遊觀時俗眩之孝瑜遂於第作水堂龍舟植幡矟於舟上數集諸弟宴射為樂武成幸其第見而悦之故盛興後園之翫於是貴賤慕效處處營造隋秦孝王俊高祖子初仁恕慈愛其後漸奢侈違犯度制出錢求息民吏苦之帝遣使案其事與相連坐者百餘人俊猶不悛於是盛治宫室窮極侈麗俊有巧思每親運斤斧工巧之器餙以珠玉為妃作七寳幕籬又為水殿香塗粉壁玉砌金堦梁柱楣棟之間周以明鏡間以寳珠極彫飾之美毎與賔客妓女絃歌於其上蜀王秀高祖子性好奢憚其長史元嵓為人每循法度嵓卒之後竟行其志漸致非法造渾天儀司南車記里鼓凡所被服擬於天子又共妃出獵以彈彈人多捕山獠以充宦者寮佐無能諌止及秀得罪帝曰元嵓若在吾兒豈有是乎唐河間王孝恭高祖從父兄子性奢豪重遊宴歌姬舞女有百餘人隴西郡王博乂高祖兄子有妓妾數百人皆曳羅綺餘梁肉與其弟渤海王奉慈俱以貪縱為時所鄙彭王元則高祖子太宗貞觀中除遂州都督尋坐章服奢免官蔣王惲太宗子高宗永徽中自安州都督移梁州都督惲在安州多造器用服翫及將行有遞車四百兩州縣不堪其勞為有司所劾帝特宥之躭溺自昔崇並建之制恢長世之經三代而下率繇此道所以隆宗屏之寄廣胏附之勢自非進徳而有度好善而無斁亦曷能綏吉禄而輔帝室哉乃有弗率訓典肆其驕侈嗜好無極沉湎乖節以至忠賢䟽斥􅀈䛕昵侍靡遵朝憲罔顧人理蒞事煩而失叙御戎紛而不整亦有流宕忘返縱馳泰甚違道愆義以隕厥軀者盖不乏焉斯可戒也已漢中山王勝為人樂酒好内嘗與趙王彭祖相非曰兄為王專代吏治事王者當日聽音樂御聲色魯恭王餘好治宫室苑囿狗馬季年好音光餘子安王兀初好音樂輿馬晩節遴唯恐不足於財魏陳思王植任性而行飲酒不節建安二十四年曹仁為關羽所圍太祖以植為南中郎將行征虜將軍欲遣救仁呼有所勅戒植醉不能受命於是悔而罷之晉㑹稽王道子為驃騎將軍錄尚書六條事開府領司徒道子大元以後為長夜之宴蓬首昏目政事多闕後王恭舉兵朝廷憂懼内外戒嚴道子子征虜將軍元顯謂道子曰去年不討恭致有今役今若復從其欲則大宰之禍至矣道子日飲醇酒而委事於元顯㑹道子有疾加以昏醉元顯知朝望去之謀奪其權諷天子解道子楊州司徒而道子不之覺既而道子酒醒方知去職於是大怒而無如之何既而孫恩乘釁作亂加道子黄鉞元顯為中軍以討之又加元顯錄尚書事然道子為長夜之飲政無大小一委元顯宋江夏王義恭性嗜酒不節日時移變自始至終累遷第宅與人遊欵意好亦多不終而奢侈無度不愛財寳左右親幸者一日乞與或一二百萬小有忤意輒追奪之大明時資供豐厚而用嘗不足賒市百姓物無錢可還民有通辭求錢者輒題後作原字新渝侯義宗為太子左衛率文帝元嘉八年坐門生杜徳靈放横打人還第内藏義宗隱蔽之免官徳靈極有姿色為義宗所愛寵衡陽王義季素嗜酒自彭城王義康廢後遂為長夜飲略少醒日文帝詰責之曰此非唯傷事業亦自損性皆汝所諳近長沙兄弟皆緣此致故將軍蘇徵耽酒成疾旦夕待盡一門無此酣法汝於何得之義季雖奉旨酣縱不改成疾元嘉二十二年遷徐州刺史明年魏攻邉北州擾動義季慮禍不欲功勤自業無他經略唯飲而已文帝又詔責之梁汝南侯堅性頗庸短侯景圍城堅屯太陽門終日滿飲不撫軍政吏士有功未嘗申理疫癘所加亦不存恤士咸憤怨陳新安王伯固為南徐州刺史性嗜酒而不好積聚所得祿俸用度無節酣醉以後多所乞丐於諸王之中最為貧窶宣帝每矜之特加賞賜後魏新興王俊好酒色多越法度齊郡王簡性好酒不能治公私之事妻常氏燕郡公常喜女也文明太后以賜簡常性幹家事頗節斷簡酒乃至於盗竊求乞侍婢卒不能禁咸陽王禧加侍中太尉禧性驕奢貪婪財色姻妾數十意尚不已衣被繡綺車乘鮮麗猶逺有簡聘以恣其情京兆王愉為中書監宣武為納順皇后妹為妃而不見禮荅愉在徐州納妾李氏本姓楊東郡人夜聞其歌悦之遂被寵嬖罷州還京欲進貴之託右中郎將趙郡李侍顯為之養父就之禮迎産子寳月順皇后召李入宫毁擊之強令為尼於内以子付妃養之歲餘后父子竟以后久無所誕乃上表勸廣嬪御因令后歸李於愉舊愛更甚汝南王悦為性不倫俶儻難測其妃閭氏即東海公之女生一子不見禮荅有崔延夏者以左道與悦遊合服仙藥松术之屬時輕與出採芝宿於城外小人之所遂斷酒肉粟稻唯食麥飯絶房中輕忿妃妾至加捶撻同之婢使悦之出也妃住於别第靈太后勅檢問之引入窮悦事故妃病伏床蓐瘡尚未愈太后因悦之杖妃乃下令禁斷令諸親王及三藩其有正妃疾患百日以上遣奏聞若有猶行捶撻就削封位元乂京兆王黎之子耽酒好色元嘉廣陽王建之子好飲酒或酣醉在宣武前言笑自得無所忌憚元子孝陽平王新成之孫善笑謔好酒元坦咸陽王禧第七子性好畋漁無日不出秋冬獵雉兎春夏捕魚蟹鷹犬常數百頭自言寧三日不食不能一日不獵元仲景魏之宗室孝武帝將入關授仲景中軍大都督留京師齊神武欲至雒陽仲景遂棄妻子追駕至長安仍除尚書右僕射封順陽王仲景既失妻子乃娶故爾朱天光妻列氏本娼女有美色仲景甚重之經數年前妻叔袁紇氏自雒陽間行至列遂徙居異宅久之有姧事露詔仲景殺之仲景寵情愈至謬殺一婢蒙其屍而厚𦵏以代為列徙於密處人莫知其詐仲景三子濟鍾奉叔袁紇氏生也皆以宗室早厯清官仲景以列尚在恐妻子漏之乃謀殺叔袁紇袁紇覺復欲隂害列列謂從奴曰若紇殺我必投我厠中我告丞相冀或不死若不理首愆猶埋我好地爾為我告之奴遂告周文帝周文依奏詔笞仲景一百免右僕射以王歸第列以自告免而逐之仲景猶私不已又有告者詔更笞一百付宗正官爵盡除仲景仍通焉後周文以其歴任有名且杖策追駕乃奏復官爵也列叔袁紇於是同居北齊平秦王歸彦神武族弟少質朴後更改節放縱好聲色朝夕酣歌贈建國侯伏護字臣授神武族弟靈山之子為黄門侍郎歴事數朝常參機要而性嗜酒每多醉失末路逾劇乃至連日不食專事酣酒神識恍惚遂以卒右僕射元海神武從孫初為散騎常侍願處山林修行釋典文宣許之乃入林慮山經二年絶棄人事志不固自唘求歸徴復本任便縱酒肆情廣納姬侍唐河間王孝恭頗好酒徳太宗貞觀中與唐儉等聚宴醉甚夜卧街中樹下及旦而薨巢王元吉性好畋獵守幷州嘗載網罟三十餘兩自言我寧三日不食不能一日不獵河東郡王瑾落拓不脩名檢嗜酒色歴官至太僕卿沉醉暴卒邠王守禮𤣥宗開元初歴虢隴等六州刺史唯弋獵妓樂飲謔而已九年以後諸王並徴還京師守禮貪淫縱欲不脩風教男女有五十餘人高歌擊鼓日以為常或有諌之者守禮曰豈有天子兄死無人𦵏諸王因内讌之際話之以為歡笑梁􅀶王友文為東京留守嗜酒頗怠於為政冊府元龜巻二百九十八
