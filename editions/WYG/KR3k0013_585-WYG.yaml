body:
  text: 冊府元龜卷五百八十五宋王欽若等撰掌禮部奏議第十三唐魏徵為侍中貞觀五年太宗將造明堂太子中允孔頴逹以諸儒立議頗乖故實上表曰伏尋前勅依禮部尚書豆盧寛國子助教劉伯莊等議以為從崑崙道上層祭天又尋後勅為左右閣道登樓設祭臣謹按六藝羣經百家諸史皆基上曰堂樓上曰觀未有重樓之上而有堂名孝經云宗祀文王於明堂不云明樓明觀其義一也又明堂法天聖王示儉或有剪蒿為柱緝茅作蓋雖復古今異制不可常然猶皆依大典貴在樸素是以席惟藁秸噐止陶匏用繭犢以貴誠服大裘以訓儉今若飛樓架迥浮閣凌雲考古言之實堪疑慮按郊祀志漢武明堂之制四靣無壁上覆以茅祀五帝於上坐祀后土於下房臣以上坐正於基上下房惟是基下既云四靣無壁未審伯莊以何知上層祭神下有五室且漢武所為多用方士之說違經背正不可師祖又豆盧寛等議云上層祭天下堂布政欲使人神位别事不相干臣以古者敬重大事與接神相似是以朝覲祭祀竝皆在廟豈亦樓上祭祖樓下侍朝閣道升樓路便穿隘乘輦則接神不敬歩陟則勞勤聖躬侍衛在傍百司供奉求之經誥全無此理臣非敢固執愚見欲求己長伏以國之大典不可不慎伏乞以臣愚表下付羣司詳議焉徵議曰稽諸詁訓叅以舊圖其上圓下方複廟重屋百慮一致異軫齊歸洎當塗膺錄未遑斯禮典午聿興無所取則裴頠以諸儒持論異端鋒起是非舛互靡所適從遂乃以人廢言止為一殿宋齊卽仍其舊梁陳遵而不改雖嚴配有所祭饗不匱求之典則道實未𢎞夫孝因心生禮緣情立心不可極故備物以表其誠情無以盡故餙宫以廣其敬宣尼美歎意在兹乎臣等親奉德音得叅大議思竭塵露増崇山海凡聖人有作義重隨時萬物斯覩事資通變若據蔡邕之說則至理失於文繁若依裴頠所為則大體傷於質畧求之情理未臻厥中今之所議非無用捨請為五室重屋上圓下方旣體有則象又事多故實下室僃布政之居上堂為祭天之所人神不雜禮亦宜之其高下廣袤之規几筵尺丈之度則竝隨時立法因事制宜自我作故不必師古廓千載之疑議為百王之懿軌不使泰山之下惟聞黄帝之法汶水之上獨稱漢武之圖則通乎神明庻㡬可使子來經始成之不日朱子奢為諫議大夫貞觀九年將行高祖遷祔之禮太宗命有司詳議廟制子奢建議曰按漢丞相韋𤣥成奏立五廟諸侯同五劉子駿議開七祖邦君降二鄭司農踵𤣥成之轍王子雍掦國師之波分途竝驅名相師祖咸翫其所習好同惡異遂令厯代祧祀多少叅差優劣去取曽無畫一傳稱名位不同禮亦異數易云卑高以陳貴賤位矣豈非别嫌慎微逺防陵僭尊君卑佐升降無舛所貴禮者義在兹乎若使天子諸侯俱立五廟便是賤可以同貴臣可以濫主名噐無准冠履同歸禮亦異數義將安設戴記又稱禮有以多為貴者天子七廟諸侯五廟若天子五廟纔與子男埒以多為貴何所表乎愚以為諸侯立高祖以下并太祖五廟一國之貴也天子立髙祖以上并太祖七廟四海之尊也降殺以兩禮之正焉前史所謂德厚者流光德薄者流卑此其義也伏惟聖祖在天山陵有日祔享嚴配昭事在斯宜依七廟用崇大禮若親盡之外有王業之所基者如殷之𤣥王周之后稷尊為始祖儻無其例請三昭三穆各置神主太祖一室考而虗位將作待七百之祚逓遷方處庻上依晉宋傍愜人情於是八座奏曰臣聞揖譲受終之后革命創制之君何嘗不崇親親之義篤尊尊之道䖍奉祖宗致敬郊廟自義乖闕里學滅秦庭儒雅旣衰經籍湮殄雖兩漢纂修從及魏晉敦尚斯文而宗廟制度典章散逸習所傳而競偏說是所見而起異端自昔迄兹多厯年代語其大畧兩家而已祖鄭𤣥者則陳四廟之制述王肅者則引七廟之文貴賤混而莫辯是非紛而不定陛下至德自然孝思罔極號慕踰匹夫之志制作窮聖人之道誠宜定一代之宏規為萬世之彛則臣奉述叡㫖討論徃載紀七廟者寔多稱四祖者蓋寡較其得失昭然可見春秋榖梁傳及禮記王制祭法禮噐孔子家語竝云天子七廟諸侯五廟大夫三廟士二廟尚書曰七世之廟可以觀德至於孫卿孔安國劉歆班彪父子孔晁虞喜干寳之徒或學推碩儒或才稱博物商較古今咸以為然故其文曰天子三昭三穆與太祖之廟而七晉宋齊梁皆依斯義立親廟六豈非有國之茂典不刋之休烈乎若使違羣經之明文從累代之疑議背子雍之篤論遵康成之舊學則天子之禮下逼於人臣諸侯之制上僭於王者非所謂尊卑有序名位不同者焉况夫禮繇人情自非天降大孝莫重於尊親厚本莫先於嚴配數盡四廟非貴多之道祀建七世得加隆之心是知德厚者流光乃經世之髙義徳薄者流卑寔不易之令範臣等叅議請依晉宋故事立親廟六其祖宗之制式遵舊典庻承天之道興於理定之辰尊祖之義成於孝治之日制從之於是増脩太廟始崇祔𢎞農府君及髙祖神主并舊四室為六室貞觀中太宗謂禮官曰同㸑尚有緦麻服恩而嫂叔無服又舅之與姨親疎相似而服紀有殊理未得宜集學者詳議餘有親重而服輕者亦附奏聞丁夘尚書八座禮官定議曰臣竊聞之禮所以决嫌疑定猶豫别同異明是非者也非從他出人情而已矣親疎有九服術有六隨恩以薄厚稱情以立文然舅之與姨雖為同氣論情度義先後實殊何則舅為母之本族姨乃外成他姓求之母族姨不預焉考之經文舅誠為重故周王念齊稱舅甥之國秦伯懐晉切渭陽之詩今在舅服止一時為姨居䘮五月徇名䘮實逐末棄本蓋古人之情或有未達所宜損益實在兹乎記曰兄弟之子猶子蓋引而進之也嫂叔之無服蓋推而逺之也禮繼父同居則為之朞未嘗同居則不為服從母之夫舅之妻二夫相為服或曰同㸑緦然則繼父之徒並非骨肉服重繇乎同㸑緦輕在乎異居故知制服雖斷於名亦緣恩之厚薄者也或有長年之嫂遇孩童之叔劬勞鞠養情若所生分饑共寒契闊偕老譬同居之繼父方他人之同㸑情義之深淺寧可同日而言哉在其生也愛之同於骨肉及其死也則曰推而逺之求之本源深所未喻若推而逺之為是則不可生而共居生而共居為是則不可死同行路重其生而輕其死厚其始而薄其終稱情立文其義安在且事嫂見稱載籍非一鄭仲虞則恩禮甚篤顔𢎞都則竭誠致感馬援則見之必冠孔伋則哭之為位此並躬踐教義仁深孝友察其所行之㫖豈非先覺者歟但於時上無哲王禮非下之所議遂使深情鬰乎千載至禮藏於萬古其來乆矣豈不惜哉今屬欽明在辰聖人有作五禮詳洽一物無遺猶且永念慎終凝神遐想以為尊卑之叙雖煥乎大僃䘮紀之制或理有未隆爰命秩宗更詳考正臣等奉遵明命觸類傍求採摭羣經討論傳記或抑或引兼名兼實無文之禮咸秩敦睦之情畢舉厚薄俗於既徃垂篤義於將來信六籍所不能談超百王而獨得者也諸儒所守無有異同詳求厥中申明聖㫖謹按曽祖父母舊服齊衰三月請加為齊衰五月嫡子婦舊服大功請加為朞衆子婦舊服小功今請與兄弟子婦同為大功九月嫂叔舊無服今請小功五月報其弟妻乃夫兄亦小功五月舅舊服緦麻請與從母同服小功制可之顔師古為秘書監貞觀九年十一月詔曰太原之地肇基王業事均豐沛義等宛譙理宜别建寢廟以彰聖徳詳覽漢典抑有成規但先皇遺㫖務存儉約䖍奉訓誡無忘啓處宜令禮官與公卿等詳議以聞師古議曰臣究觀祭典考驗禮經宗廟皆在京師不與下土别置至若周之酆鎬竝為遷都乃是因事更營非云一時俱立其郡國造廟爰起漢初率意而行事不稽古原流漸廣大違典制是以貢禹韋𤣥成等招聚儒學博詢廷議據禮陳奏遂從廢毁自斯已後彌厯年代輟而不為今若増立寢廟别安主祏有乖先㫖靡率舊章垂裕後昆理謂不可固宜勉割深衷俯從大禮韋挺為太常卿貞觀十六年四月有司言將行禘祭依今禮祫享功臣配享於廟廷禘享則不配依今祫祭之日功臣竝得配享請集禮官學士等議挺等一十八人議曰古之王者富有四海而不朝夕上膳於太廟者患其過禮也故曰春秋祭祀以時思之至於臣有大功享祿其後子孫率禮㓗粢豐盛礿祠蒸嘗四時不輟國家大祫又得配焉所以昭明其勲尊顯其徳以勸嗣臣也其禘及時享功臣皆不應預故周禮六功之家皆配大蒸而已先儒皆以大蒸為祫祭高堂隆庾蔚之等多遵鄭學未有將為時享又漢魏祫祀皆在十月晉朝禮官欲用孟秋殷祭左僕射孔安國啓彈坐免官者不一梁初務禘功臣左丞何佟之義武帝乆而依行降曁周齊俱遵此義竊以五年稱殷合禮祭大道一大一小通人雅論小則人臣不預大則兼及有功今禮禘無功臣誠謂禮不可易詔改今從禮焉是年太宗征遼渡遼澤詰朝高祖忌日有司請曰禮云君子有終身之憂而無一朝之樂此所為星廻改嵗親没同辰思其居處不可為樂自大駕南轅晉徒東徙或増名似之節而出典彛之外既乖俯就流宕不歸襄公擊殽陵而墨縗伯禽赴徐戎而變金革之事無所不通伏惟陛下親御六軍已登冦境戎務繁擁伏待剖斷不可以遵先聖之嘗經畧近代之公議請今月六日所有軍機要切百司依式奏聞手詔答曰省所奏悲感何言天地運流弓劍𦕈邈方寸久亂泣血無追憂乃終身豈惟一日哀以内結非假外彰今旣戎旅事大不可失在機速昔周武伐殷載廟在道雖多虧小禮而功成大孝徃賢之道可不遵歟所以抑順古風俯從今請臨紙摧心動焉如割許敬宗為禮部尚書貞觀二十三年太宗神主祔廟敬宗奏言𢎞農府君廟應迭毁謹按舊議漢丞相韋𤣥成以為毁主塵堙但萬國宗享有所從來一旦瘞藏事非允愜晉博士范宣意欲别立廟宇奉征西等三主安置其中方之瘞埋頗叶情理然事無典故亦未足依又議者或言毁主藏於天府祥瑞所藏本非斯意今謹准量去祧之外猶有壇墠祈禱所及竊謂所宜今時廟制與古不同共基别室西方為首若在西夾之中仍處尊位祈禱則祭未絶祗享方諸舊議情實可安𢎞農府君廟遠親殺詳據舊章禮合迭毁臣等叅議遷奉神主藏於夾室本情篤教在理為宜從之至高宗龍朔二年為修禮官奏曰據祠令及新禮並用鄭𤣥六天之義圜丘祀昊天上帝南郊祭太微感帝明堂祭太微五天帝臣等謹按鄭𤣥唯據緯書所說六天皆謂星象而昊天上帝不屬穹蒼故注月令周官皆謂圓丘所祭昊天上帝北辰星耀魄寳又說孝經郊祀后稷以配天及明堂嚴父配天皆為太微五帝考其所說乖謬特深按易云日月麗乎天百糓草木麗乎土又云在天成象在地成形足明神象非天草木非地毛詩傳云元氣昊大則稱昊天遠視蒼蒼則稱蒼天此則天以蒼昊為體不入星辰之例且天地各一是曰兩儀天上無二焉得有六是以王肅羣儒咸駮此義又簡太史圖圓丘天昊天上帝坐外别有北辰坐與鄭義不同得太史令李淳風等狀稱昊天上帝圜丘自在壇上北辰自在第二與北斗並列為星官内坐之首不同鄭𤣥據緯之說此乃羲和所掌觀象制圖推歩有徵相沿不謬又按史記天官書等太微宮有五帝者自是五精之神五星所奉以其是人主之象故况之曰帝亦如房心為天王之象並是天乎周禮兆五帝於四郊又云祭五帝則掌百官之誓戒惟稱五帝皆不言天此自太微之神本非穹昊之天又孝經唯云郊祀后稷無别圜丘之文王肅等皆以為郊卽圜丘圜丘卽郊猶王城京師異名同實符合經典其義甚明而今從鄭說分為兩祭圜丘之外别有南郊違棄正經理深未允且簡禮部式惟有南郊陪位更不别載圜丘式文旣遵王肅祠令仍行鄭義令式相乖理宜改革又孝經云嚴父莫大於配天下文卽云周公宗祀文王於明堂以配上帝明是明堂所祀正在配天而以為但祭星官交違明義又按月令孟春之月祈糓於上帝左傳亦云凡祀啓蟄而郊郊而後耕故祀后稷以祈農事然啓蟄郊生自以祈糓謂為感帝之祭事甚不經今請憲章姬孔去取王鄭四郊迎氣存太微五帝之祀南郊明堂廢緯書六天之義其方丘祭地之外别有神州謂之北郊分地為二文旣無據理又不通請為一祀以符古義仍竝修附入式永垂後則詔可之敬宗等又奏稱檢新禮祭畢收玉帛牲醴置於柴上然後燔柴燎壇又在神壇之左臣敬宗謹按祭祀之禮必先降神周人尚臭則祭燔柴為始然後行正祭祭地以瘞血為先然後行正祭又禮論太常賀循上言積柴舊在壇南燎祭天之牲用犢左胖漢儀用頭今郊用脅適足明燔柴所用與升爼不同是知自在祭爼别燔牲體非於祭末燒神餘饌此則晉氏之前仍遵古禮惟周魏以降妄為損益若告廟之幣事畢瘞埋因改燔柴將為祭末事無典實禮闕降神又燔柴正祭牲玉皆别蒼璧蒼犢之流柴之所用四圭騂犢之屬祀之所須故郊天之有四圭猶祝廟之有圭瓚是以周官典瑞文藝相因並事畢收藏不在燔例而今新禮引用蒼璧不顧圭瓚遂亦俱燔義旣有乖理難因襲又燔柴作樂俱以降神則處置之宜須相依准柴燎在左作樂在南求之禮情實為不類且論說積柴之處在神壇之南新禮以為壇左交無典故今請改燔柴為祭始位在樂懸之南外壝之内其隂祀瘞埋亦請准此詔可之敬宗等又奏曰依古䘮服甥為舅緦麻舅報甥亦同制貞觀中八座議奏舅服同姨小功五月而今律疏舅報甥服猶三月謹按傍尊之服禮無不報以非正尊不敢降之也故舅為從母五月從母報甥小功甥為舅緦麻舅亦報甥三月是其義也今甥為舅服同從母之衰則舅宜進甥以同從母之報修律疏人不知禮意舅報甥服尚損緦麻例旣不通禮須刋正今請修改律疏舅服甥亦小功又曰庻母古禮緦麻新禮無服謹按庻母之子卽是己之昆季為之杖齊而已與之無服同氣之内㐫吉頓殊求之禮文深謂非禮請依故典為服緦麻又皇帝為諸臣及五服親舉哀禮著四服今乃云白帢禮令乖舛須歸一途且白帢出自近代事非稽古夙著令文不可行用請改為素服以㑹禮文詔並從之于志寧為侍中永徽元年衡山公主欲出降長孫氏議者以時旣公除合行吉禮志寧上疏曰臣聞明君馭厯當俟獻替之臣聖主握圖必資鹽梅之佐所以堯詢四岳景化洽於區中舜任五臣懿德被於無外左有記言之史右有記事之官大小咸書善惡俱載著懲勸於簡牘垂褒貶於人倫為萬古之範圍作千齡之規鏡伏見衡山公主出降欲就今秋成禮切按禮記云女年十五而笄二十而嫁有故二十三而嫁鄭𤣥云有故謂遭䘮也固知須終三年春秋云魯莊如齊納幣杜預云母䘮未再朞而圖婚二傳不譏失禮明有故也此卽史䇿具載是非厯然斷在聖情不待問於臣下其有議者云准制公除之後須並從吉漢文創制其儀為天下百姓至於公主服是斬縗縱使服隨例除無宜情隨例改心䘮之内方復成婚非惟違於禮經亦是人情不可伏惟陛下嗣膺寳位臨統萬方理宜繼美羲軒齊芳湯禹𢎞奬仁孝之日敦崇名教之秋此事行之若難猶須抑而守禮况行之甚易何容廢而受譏此禮有識之所共知非假愚臣之說也伏願遵高祖之令軌畧孝文之權制國家於法無虧公主情禮得畢於是詔公主待三年服闋後出降閻立徳為工部尚書永徽三年六月内出明堂九室様更令損益有司奏言内様堂基三重每基十二階上基方九雉八角高一尺中基方三百尺高一筵下基方三百六十尺高一丈二尺上基象黄琮為八角四靣安十二階請依内圖為定其基請准周制高九尺方二百三十八尺中基下基望並不用又内様室各方三筵開四闥八窻屋圓楣徑二百九十一尺按季秋大享五帝各在一室商量不便請依兩漢季秋合享總於太室若四時迎氣之禮則各於其方之正其安置九室之制增損明堂故事三三相重太室在中央方六丈其四隅之室謂之左右房各方二丈四尺當太室四靣青陽明堂總章𤣥堂等室各長六尺以應太室闊二丈四尺以應左右房室間並通巷各廣一丈八尺其九室并巷在堂上總方一百四十四尺法坤之䇿屋圓楣指檐或為未允請據鄭𤣥盧植等說以前梁為楣其徑二百一十六尺法乾之䇿圓柱旁出九室四隅各七尺法天以七紀柱外餘基共作司約准靣别各餘一丈七尺内様室别四闥八窻撿於古今請依為定其户仍在外而不開内様有柱三十六每柱十梁内有七間柱根以至上梁高三尺梁以上至屋峻起計高八十一尺上圓下方飛檐應規請依内様為定其蓋屋形制仍望據考工記改為四阿并依禮加重檐准太廟安鴟尾堂四靣五色請依周禮白盛為便其靣向各隨方色請施四垣及四門辟雍按大戴禮及前代說辟雍多無水廣内徑之數蔡邕云水廣二十四丈四周於外三輔黄圖曰水廣四周與蔡邕不異仍云水外周隄又張衡東京賦稱造舟為梁禮記明堂隂陽綠水左旋以象天商量水廣二十四丈恐復較闊今請减為二十四歩垣水量取周足仍依故事造舟為梁其外周以圓隄并取隂陽水行左旋之制殿垣按三輔黄圖殿垣四周方在水外高不蔽日殿門去殿七十二歩准令行事陳設猶恐窄小其方垣四門去堂歩數請准太廟南門去廟基遠近為制仍立四門外觀依太廟門别各安三門施𤣥門閫四角造三重巍闕此後羣儒分競各執異議尚書左僕射于志寧等請為九室太常博士唐􅀈等請為五室帝令所司於觀徳殿依兩議張設親與公卿觀之帝曰明堂之禮自古有之議者不同未果營建今設兩儀公等以何者為宜立德對曰兩儀不同俱有典故九室似闇五室似明取捨之宜斷在聖慮帝亦以五室為便議又不定繇是且止冊府元龜卷五百八十五
