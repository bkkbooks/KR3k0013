body:
  text: 册府元龜卷九百四十四宋王欽若等撰總錄部佻薄詩曰視民不佻禮曰小人以薄蓋佻薄者前哲之所戒也淳素既隱道化多缺仁厚之俗替而侮慢之風長其有搢紳之士簡傲之民忘謹愿之規恣忿躁之性以嘲玩為辯以陵忤為材譏議人物貶忽僚友或劇言而歴詆或顧影而自嘉執屏面以疾驅著岑牟以疊曲脱散冠帶怠棄司存踰越典常敗亂雅俗以至干白簡之奏陷丹筆之議而不悔焉於戲處其厚而不處其薄者誠君子哉漢張敞為京兆尹無威儀時罷朝會過走馬章臺街在長安中章臺下街也使御史驅自以便面拊馬便面所以障面蓋之類也不欲見人以此自障面則得其便故曰便面亦曰屏面又為婦畫眉長安中傳張京兆尹眉嫵嫵音詡北方人謂媚好為詡畜又音舞嫵好媚也有司以奏敞帝問之對曰臣聞閨房之内夫婦之私有過於畫眉者帝愛其能弗備責也然終不得大位後漢孔融字文舉為少府融與蔡邕素善邕卒後有虎賁士貌似蔡邕者融每酒酣輙引與同坐曰雖無老成人尚有典刑袁紹之敗也融與曹公書曰武王伐紂以妲己賜周公曹公以融學博謂書傳所記後見問之對曰以今度之想其當然爾時曹公平紹以袁熈妻甄氏賜五官中郎將即魏文帝也禰衡平原人少有才辯而尚氣剛傲好矯時慢物興平中避難荆州建安初來遊許下是時許都新建賢士大夫四方來集或問衡曰盍從陳長文司馬伯達乎對曰吾焉能從屠沽兒耶又問荀文若趙稚長云何衡云文若可借面弔䘮稚長可使監厨請客唯善魯國孔融及𢎞農楊修嘗稱曰大兒孔文舉小兒楊徳祖餘子碌碌莫足數也孔融愛衡才數稱衡於曹公曹公欲見之而衡素相輕疾自稱狂病不肯往而數有恣言曹公懐忿而以其才名不欲殺之聞衡善擊皷乃召為皷史因大會賓客閱試音節諸史過者皆令脫其故衣更著岑牟單絞之服曹公欲辱衡乃令人錄用為皷史後至八月朝普天閱試音節作三重閤列坐賓客以帛絹制作衣岑牟一單絞及小褌通史志曰岑牟皷角士胄也絞蒼黄之色也次至衡衡乃為漁陽參撾􅗿蹀而前衡擊皷作漁陽摻搥蹋地來前躡皷足脚容態不常皷聲甚悲易衣畢復擊皷摻搥而去至今有漁陽参搥自禰衡始也撾者擊皷杖也容態有異聲節悲壯聽者莫不慷慨衡進至曹公前而止吏訶之曰皷史何不改裝而敢輕進乎衡曰諾於是先觧衵衣次釋餘服裸身而立徐取岑牟單絞而著之畢復參撾而去顏色不怍曹公笑曰本欲辱衡衡反辱孤孔融退而數之曰正平大雅固當爾邪因宣曹公區區之意衡許往融復見曹公說衡狂疾今求得自謝曹公喜敕門者有客便通待之極晏衡乃著布單衣疎巾手持三尺挩杖挩木杖也音陀活反坐大營門以杖捶地大罵吏曰外有狂生坐於營門言語悖逆請收案罪曹公怒謂融曰禰衡竪子孤殺之猶雀䑕爾顧此人素有虛名逺近將謂孤不能容之今送與劉表視當何如於是遣人騎送之臨發衆人為之祖道先供設於城南乃更相戒曰禰衡悖虐無禮今因其後到咸當以不起折之也及衡至衆人莫肯興衡坐而大號衆問其故衡曰坐者為冢卧者為屍屍冢之間能不悲乎至荆州劉表甚賓禮之後復侮慢於表表恥不能容以江夏太守黄祖性急故送衡與之祖亦善待焉後黄祖在蒙衝船上大會賔客而衡言不遜順祖慙乃訶之衡更熟視曰死公云等道死公罵祖也等道猶今言何勿語也祖大怒令五伯將出欲加箠衡方大罵祖恚遂令殺之祖主簿素疾衡即時殺焉祖子射徒跣來救不及祖亦悔之乃厚加棺斂衡時年二十六魏何晏尚太祖女為駙馬都尉得賜爵為列侯又其母在内晏性自喜動静粉白不去手行歩顧影鄧颺為中郎與李勝等為浮華友及入兼中書郎浮華事發被斥出遂不復用蜀彭羕廣漢人姿性驕傲多所輕忽惟敬同郡秦子敕薦之於太守許靖仕州不過書佐後又為衆人所謗於州牧劉璋璋髠鉗羕為徒𨽻李譔為右中郎將侍太子太子愛其多知甚悅之然體輕脫好戲啁故世不能重也晉阮籍魏末為歩兵校尉能為青白眼見禮俗之士以白眼對之及母終嵇喜來弔籍作白眼喜不懌而退喜弟康聞之乃齎酒挾琴造焉籍大悦乃見青眼繇是禮法之士疾之若讎阮咸為散騎常侍咸初與叔父籍居道南諸阮居道北北阮富而南阮貧七月七日北阮盛曬衣服皆錦綺燦目咸以竿挂大布犢鼻於庭人或怪之答曰未能免俗聊復爾耳潘岳為河陽令負才鬱鬱不得志時尚書僕射山濤領吏部王濟裴楷等竝為武帝所親遇岳内非之乃題閣道為謡曰閣道東有大牛王濟鞅裴楷輶和嶠刺促不得休陸玩初為元帝丞相參軍嘗詣王導食酪因而得疾與導牋曰僕雖吴人幾為傖鬼其輕易權貴如此謝絢會稽王驃騎長史重之子也絢曾於公坐戲調無禮於其舅袁湛湛甚不堪之謂曰汝父昔已輕舅汝今復來加我可謂世無渭陽情也絢父重即王胡之外孫與舅亦有不恊之論湛故有此及云王徽之為大司馬桓温參軍蓬首散帶不綜府事又為車騎桓冲騎兵參軍冲問卿署何曹對曰似是馬曹又問管幾馬曰不問馬何繇知數又問馬比死多少曰未知生焉知死嘗從冲行値暴雨徽之因下馬排入車中謂曰公豈得獨擅一車冲嘗謂徽之曰卿在府日乆比當相料理徽之初不酬答直高視以手版拄頰云西山朝來致有爽氣爾王獻之為中書令時郗愔子超有重名獻之兄弟自超未亡見愔嘗躡履問訊甚脩舅甥之禮及超死見愔慢怠履而候之命席使遷延辭避愔每慨然曰使嘉賔超字嘉賔不死䑕子敢爾邪顧愷之初為荆州刺史殷仲堪參軍愷之矜伐過寔少年因相稱譽以為戲弄又好吟詠自謂得先賢風制或請其作雒生詠答曰何至作老婢聲苻朗以前秦青州刺史來降既至揚州風流邁於一時超然自得志陵萬物所與晤言不過一二人而已驃騎長史王忱江東之雋秀聞而詣之朗稱疾不見沙門釋法汰問朗曰見王吏部兄弟未朗曰吏部為誰非人面而狗心狗面而人心兄弟者乎王忱醜而才慧國寳羙貌而才劣於弟故朗云然汰悵然自失其忤物侮人皆此類也謝安嘗設讌請之朝士盈坐竝杌褥壺席朗每事欲誇之唾則令小兒跪而張口既唾而含出頃復如之宋范泰為光禄大夫時領軍將軍趙倫之性野拙人情世務多所不觧乆居方伯頗覺富盛入為護軍資力不稱以為見貶泰好戲謂曰司徒公􅆙必用汝老奴我不言汝資地所任要是外戚高第所至倫聞之大喜每載酒肴詣泰王惠為征虜長史時會稽内史劉懐敬之郡送者傾京師惠亦造别還過從弟球球問向悉何所見惠曰覺即時逢小人爾荀伯子為御史中丞少好學博覽經傳而通率好為雜語戲傲閭里故以此失清途范􅁮為太子詹事性精微思致觸類多善衣裳器服莫不增損制度世人皆法學之撰和香方其序曰麝本多忌過分必害沈寔易和盈斤無傷零藿虛燥詹唐黏濕甘松蘇合安息鬱金㮈多和羅之屬竝被珍於外國無取於中土又棗膏昏鈍甲煎淺俗非唯無助於馨烈乃當彌憎於尤疾也此序所言悉以比類朝士麝本多忌比庾炳之零藿虛燥比何尚之詹唐黏濕比沈演之棗膏昏鈍比羊元保甲煎淺俗比徐湛之甘松蘇合比慧林道人沈寔易和以自比也謝惠連為彭城王法曹參軍㓜有才悟而輕薄不為父方明所知何長瑜為臨川王義慶平西記室參軍嘗於江陵冩書與宗人何朂以韻語序義慶川府寮佐云陸展染鬢髮欲以媚側室青青不觧人星星行復出如此者五六句而輕薄少年遂演而廣之凡厥人士竝為題目皆加劇言苦句其文流行義慶大怒白文帝除為廣州所綂増城令劉瑀為益州刺史既行甚不得意至江陵與顏峻書曰朱循之三世叛兵一旦居荆州青油幕下作謝宣明面見向使齊師以長刀引吾下席於吾何有正恐匈奴輕漢爾及為吏部尚書意彌憤憤族叔秀之丹陽尹瑀又與親故書曰吾家黑面阿秀遂居劉安衆處朝廷不為多士羊志善醫術孝武殷貴妃薨令志哭殷氏志亦嗚咽他日有問志者卿那得此副急淚志時新䘮姬答曰我爾日自哭亡妾耳志滑稽善為謔帝亦愛狎之南齊王瞻宋徐州都督𤣥謨之子初仕宋為王府參軍嘗詣劉彥節直登榻曰君侯是公孫僕是公子引滿促膝唯余二人彥節外迹雖酬之意甚不悅豫章王嶷少時早與瞻友瞻嘗候嶷高論武帝時在大牀寢瞻謂嶷曰帳中人物亦復隨人寢興嶷言次忽問王景文兄楷賢愚何如殷道矜瞻曰卿遂復言他人兄耶武帝笑稱嶷小名王汝兄愚那得忽来王參軍此句瞻曰直恐如卿來譚武帝銜之未嘗形於色後歴黄門侍郎及齊建元初瞻為永嘉太守詣闕跪拜不如儀武帝知之召入東宫仍送付廷尉殺之命左右啟高帝曰父辱子死王瞻傲廷臣輒已收之高帝曰此何足計及聞瞻已死乃默無言丘靈鞠為驍騎將軍嘗還東詣司徒褚淵别淵不起曰比脚疾更增不復能起靈鞠曰脚疾亦是大事公為一代鼎臣不可復為覆餗其強切如此不持形儀唯取笑適又不樂武位謂人曰我應東還掘顧榮冢江南地方數千里士子風流皆出此中顧榮忽引諸傖度妨我軰塗轍死有餘罪張融為中書郎風止詭越坐嘗危膝行則曵歩翹身仰首意致甚多隨人同行稽遲不進融與吏部尚書何戢善往詣戢誤通尚書劉澄融下車入門乃曰非是至户外望澄又曰非是既造席視澄曰都自非是乃去其為異如此融假還鄉詣王儉别儉立此地舉袂不前融亦舉手謂儉曰歜曰王前儉不得已趨就之融曰使融不為慕勢而令君為趨士豈不善乎嘗歎云不恨我不見古人所恨古人又不見我後為司徒從事中郎永明中摠明觀講敕朝臣集聽融扶入就榻私索酒飲之問難既畢乃長歎曰嗚呼仲尼獨何人哉為御史中丞到撝所奏免官尋復職王敬則見融革帶垂寛殆將至髀謂之曰革帶太急融曰既非歩吏急帶何為豫章王大會賔僚融食炙始畢行炙人便去融欲求鹽蒜口終不言方揺食指半日乃息出入朝廷皆拭目驚觀之融假東出武帝問融住在何處融答曰臣陸處無屋舟居非水後日帝以問融從兄緒緒曰融近東出未有居止權牽小船於岸上住帝大笑謝朓為尚書吏部郎朓嘗輕江祏為人祏嘗詣朓朓因言有一詩呼左右取既而便停祏問其故云定復不急祏以為輕已後祏及弟祀劉渢劉晏俱候朓朓謂祏曰可謂帶二江之䨇流以嘲弄之祏轉不堪於是搆而害之諸葛朂為國子生作雲中賦指祭酒以下皆有形似之目坐繫東冶作東冶徒賦武帝見而赦之沈瓚之為晉陵令性麄疎好犯太守王亮諱臣欽若等曰亮父名攸亮不堪遂啓代之瓚之怏怏乃造坐云下官以犯諱被代未知明府諱若為攸字當作無骹尊傍犬為犬傍無骹尊若是有心悠無心攸乞告示亮不及履下牀跣而走瓚之撫掌大笑而去劉祥為臨川王驃騎從事中郎祥輕言肆行於朝士多所貶忽王奐為僕射祥與奐子融同載行至中途見路人驅驢祥曰驢汝好為之如汝人才皆已令僕檀超高平金鄉人解褐為州西曹嘗與别駕蕭惠開共事不為之下謂惠開曰我與卿俱起一老姥何足相誇蕭太后惠開之祖姑長沙王道憐妃超祖姑也卞彬為綏建太守性輕險嘗品第禽獸之目云羊性滛而狠猪性卑而率鵝性頑而傲狗性險而出皆指斥貴勢其蝦蟇賦云紆青拖紫名為蛤魚比令僕也又云蝌斗唯唯羣浮闇水唯朝繼夕聿役如鬼比令史諮事也梁褚緭齊末為揚州西曹遇亂居閭里而輕薄未能自致唯緭獨不達乃與江州刺史陳伯之俱入于魏魏人欲擢用之因元會緭戲為詩曰㡌上著籠冠袴上著朱衣不知是今是不知非昔非魏人怒出為始平太守日日行獵墮馬而死劉孝綽為祕書監孝綽少有盛名而仗氣負才多所陵忽有不合意極言詆訾領軍臧盾太府卿沈僧畟等竝被時遇孝綽尤輕之每於朝集會同處公卿間無所與語及呼騶卒訪道塗間事繇此多忤於物張纘為湘州刺史初吴興吴規頗有才學邵陵王綸引為賔客深相禮遇及綸作牧郢藩規隨從江夏遇纘出之湘鎮路繇郢服綸餞之南浦纘見規在座意不能平忽舉盃曰吴規此酒慶汝得陪今宴規尋起還其子翁孺見父不悅問而知之翁孺因氣結爾夜便卒規恨纘慟兒憤哭兼至信次之間又致殞規妻深痛夫子翌日又亡時人為張纘一盃酒殺吴氏三人其輕傲皆此類也陳陳暄義興國山人以落魄不為中正所品乆不得調太康中徐陵為吏部尚書精簡人物縉紳之士皆嚮慕焉暄以玉㡌簪挿髻紅絲布裹頭袍拂踝靴至膝不陳爵里直上陵坐陵不之識命吏持之暄徐歩而出舉止自若竟無怍容作書謗陵陵甚病之後主之在東宮引為學士及即位遷通直散騎常侍暄素通脫以俳優自居文章諧謬言語不節後主甚親昵而輕侮之後魏胡叟仕宋為梁秦二州刺史叟少聰慧在魏時京兆韋祖思多蔑時彥知叟至召而見之祖思習常待叟不足聊與温凉叟拂衣而出祖思固留之曰當與君論天人之際何遽而反乎叟對曰論天人者其亡乆矣與君相知何夸言若是也遂不坐而去至主人家賦韋杜二族一宿而成時年十有八矣其述前載無違舊美叙中世有恊時事而末及鄙俗人皆奇其才畏其筆世猶傳誦之以為笑狎慕容契濟南王白曜弟之子契輕薄無檢以名家子擢為中散游雅字伯度小名黄頭為祕書監雅性剛戇好自矜誕陵獵人物高允重雅文學而雅輕薄允才允性柔寛不以為恨允將婚于邢氏雅勸允娶于其族允不從雅曰人貴河間邢不勝廣平游人自棄伯度我自敬黄頭貴已賤人皆此類也楊儉為北雍州刺史與弟寛皆輕薄無行為流人所鄙甄琛為侍中車騎將軍性輕簡好嘲謔故少風望裴伯茂為中書郎與宇文忠之同省嘗侮忽之忠之色黑呼為黑宇李搆為通直散騎常侍父華有八子搆其長也次敬義為光祿大夫次叔向為徐州鎧曹參軍帶郭浦戍主次幼緒早亡次季循博陵恒山二郡太守次世幹次稚明兄弟竝不脩名行嶮暴無禮為時所賤畢哲為祕書郎諸畢朝不乏榮貴但帷簿不脩為時所鄙北齊徐之才初在南齊號為神童陳郡袁昂領丹陽尹辟為主簿人務事宜皆被顧訪郡廨遭火之才起望夜中不著衣披紅服帕出房映光為昻所見功曹白請免職昂重其才術乃特原之後入北為僕射時語人曰我在江東見徐勉作僕射朝士莫不佞之今我亦是僕射無一人佞我何繇可活之才聰辯多智時唐邕白建方貴時人言云并州赫赫唐與白之才蔑之元日對邕為諸令史祝曰卿等位當作唐白又以小史好嚼筆故嘗執管就元文遥口曰借君齒其不遜如此歴事諸帝以戲狎得寵魏收初為神武晉陽中外府主簿其從叔季景有才學歴官著名竝在收前然收常所欺忽收初赴并頓丘李庶者故大司農諧之子也以華辯見稱曾謂收曰霸朝便有二魏收率爾曰以從叔見比便是邪輸之比卿邪輸者故尚書令陳留公繼伯之子愚癡有名好自入市肆高價買物商賈其所嗤翫收忽季景故方之不遜例多如此收昔在雒京輕薄尤甚人號之魏收驚蛺蝶文襄曾遊東山飲宴文襄曰魏收恃才使氣卿須出其短往復數畨收忽大唱曰楊遵彥理屈已倒遵彥愔字也愔從容曰我綽有餘暇山立不動若遇當塗恐翩翩遂逝當塗者魏翩翩者蝶也文襄先知之大笑稱善文襄又曰向語猶微宜更指斥愔應聲曰魏收在并作一篇詩對衆讀訖云打從叔季景出六百斛米亦不辨此遠近所知非敢妄說文襄喜曰我亦先聞衆人皆笑收雖自由雪不復抗拒終身病之文宣即位除中書令俄兼太子詹事收既輕疾好聲樂善胡舞文宣末數於東山與諸優為獮猴與狗鬬帝寵狎之司馬子如為司空性滑稽不治檢裁言戲穢褻識者非之李搆為譙州刺史時人語宋遊道為獮猴面搆嘗因遊道會客因戲之曰賢徒在門外大好人宜自迎接為通名稱族弟遊山遊道出見之乃猴而衣㡌也將與搆絶搆謝之豁然如舊封孝琰為通直散騎常侍時祖珽輔政孝琰謂珽曰公是衣冠宰相異於餘人近習聞之大以為恨盧詢祖為築長城子使既有口辯好臧否人物嘗語人曰我昨東方未明過和氏門外和氏和士開也已見二陸兩源森然與槐桞齊列蓋謂彥師仁惠與文宗那延也邢邵盛譽盧思道以詢祖為不及詢祖曰見未能高飛者借其羽毛知逸勢冲天者翦其翅翮謗毁日至素論皆薄其為人後周張肅為宣納上士轉中外府記室參軍中山公訓侍讀早有才名性頗輕猾時人比之魏諷隋盧思道仕北齊為黄門侍郎思道不持操行好輕侮人天保中魏史未出思道先已誦之繇是大被笞辱前後屢犯因而不調侯白為儒林郎通脱不持威儀好為誹諧雜說人多愛狎之所在之處觀者如市楊素甚狎之素嘗與牛𢎞退朝白謂素曰日之夕矣素大笑曰以我為牛羊下來邪劉炫為太學博士性躁競頗誹諧多自矜伐好輕侮當世為執政所醜繇是官途不遂宇文化及右翊衞大將軍述之子也性兇險不循法度好乘肥挾彈馳騖道中繇是長安謂之輕薄公子唐崔信明太宗貞觀中為秦川令頗蹇傲自伐常賦詩吟嘯自謂過於李百藥時人多不許之又矜其門族輕侮四海士望繇是為世所譏杜審言則天登封初以隰城尉預選時蘇味道為天官侍郎審言試判訖謂人曰蘇味道必死人問其故審言曰見吾判即自當羞死矣又嘗謂人曰吾之文章合得屈宋作衙官吾之書迹合得王羲之北面其矜誕如此駱賔王高宗末為長安尉落拓無行好與博徒遊鄧𤣥挺為中書舍人性俊辯機㨗過人每有嘲謔朝廷稱為口寔喬琳代宗時為監察御史倜儻疎誕好譚諧侮謔僚列頗無禮檢同院御史畢燿初與琳嘲誚往復因成釁隙王縉大厯中與元載同為相載用事縉卑附之不敢與忤然恃才與老多所傲忽載所不悦心希載㫖以言詞凌詬無所忌憚初京兆尹黎幹戎州人也數論事載甚病之而力不能去幹嘗白事於縉縉曰尹南方君子也安知朝禮其嫚而侮人如此顧况德宗貞元初為著作郎况頗習詩詠而不修檢操宰臣李泌薄其為人置之散位泌殁後以宿憾搆嘲誚之聲為憲司所劾故貶秩陸長源貞元中歴汝州刺史宣武軍司馬性輕佻言談無度又恃微才傲物所在人畏惡之孟叔度貞元中為宣武軍節度董晉判官輕佻好慢易軍人軍人皆惡之温庭筠宣宗大中初舉進士苦心硯席尤長於詩賦然士行塵雜不修邉幅能逐絃吹之音為側􅃩之詞公卿家無頼子弟裴誠令狐縞之徒相與酣飲終日繇是累年不第梁羅隱唐末舉進士有詩名於天下尤長於詠史然多譏諷以故不中第兩浙節度使錢鏐辟為從事隱戲為詩言鏐微時騎牛操梃之事鏐亦怡然不怒後唐馬郁唐末為幽州刀筆小吏少負文藝節度使李全忠子威曾問其年郁曰弱冠後兩周星歳傲形于色後威繼父為帥首召郁問曰子今弱冠後幾周星嵗郁但頓顙謝罪威曰如子之事吾平生之所愛也何懼之有因署以府職後為莊宗太原副留守郁初與同幕王緘皆事燕王劉仁恭郁本府名位先逹緘學術雖優然才性梗滯居燕時職官未達故郁在河東稠人廣衆之中頥指緘有所請謁呼王緘而已嘗閱所為文因謂之曰孰知王緘中道有言語得無異乎盧程初為莊宗河東推官性識驕誕浮薄自矜篤厚君子多所惡焉外恭内狠好幸人災同光初為中書侍郎平章事是時梁將王彦章陷我徳勝寨羣情忷忷内外嚻然帝於楊劉城躬厲士卒晝夜苦戰臣下皆憂之豆盧革與同列議上章規諫請不躬御士卒因言及漢高臨廣武事楚人矢及於胷紿云虜中吾足程曰此劉季之失也幾死老兵衆皆縮頸帝與羣官論士族或曰員外孔龜明善和之家宣聖之後公輔累世得非盛族歟程曰止於孔􅉌之後盛則吾不知也劉岳為吏部侍郎時馮道初入中書道形神庸陋一旦為丞相人士多竊笑道自月華門赴班岳與工部侍郎任贊偶語見道行而復顧贊曰新相廻顧何也岳曰定是忘持兎園册來道之鄉人在朝者聞之告道因授岳祕書監任贊散騎常侍晉孔崇弼為散騎常侍無他才但能談笑戲玩人物揚眉抵掌取悅於人周李知損為諫議大夫少輕薄利口無行梁朝多從貢舉人狹斜之遊册府元龜卷九百四十四
