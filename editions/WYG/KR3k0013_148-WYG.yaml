body:
  text: 冊府元龜卷一百四十八宋王欽若等撰帝王部知子知臣知子夫帝王者淵黙而神清明在躬精鑒外融靈機内炤有所燭視合若符契況乃父子之際天性之親故可以察其誠心顯其㣲𨼆則有鑒乃偉量可付大事宜承天位能繼緒業精斷之下無所差焉若乃堯廢丹朱周舍伯邑戒呉濞之必反鑒蜀秀之終惡帝王之識不其明歟所謂知臣莫若君知子莫若父在於斯矣堯曰疇咨若時登庸疇誰庸用也誰能順是事将登用之放齊曰𦙍子朱啟明帝曰吁嚚訟可乎放齊臣名𦙍國子爵朱名啟開也吁疑怪之辭言不忠信為嚚又好爭訟可乎言不可也一説堯知子丹朱之不肖不足授天下於是乃權授舜授舜則天下得其利而丹朱病授丹朱則天下病而丹朱得其利堯曰終不以天下之病而利一人乃卒授舜舜子商均亦不肖舜乃豫薦禹於天遂禪禹周文王為西伯舍伯邑考而立武王漢髙祖十二年封兄仲之子沛侯濞為呉王已拜受印帝召濞相之曰若狀有反相若汝也獨悔業已拜獨悔者心自懷悔不以語人也既以封拜為事臣下知之故不改因拊其背曰漢後五十年東南有亂豈若邪然天下同姓一家慎無反濞頓首曰不敢景帝立濞果反宣帝時元帝為太子嘗侍燕従容言陛下持刑太深宜用儒生帝作色曰漢家自有制度本以覇王道雜之奈何純任徳教用周政乎且俗儒不逹時宜好是古非今使人眩於名實不知所守何足委任乃嘆曰亂我家者太子也後漢章帝時和帝為皇子自岐嶷至於總角孝順聰明寛和篤仁帝曰是深珍之以為宜承天位魏太祖時文帝子明帝生而有岐嶷之姿帝異之曰我基於爾三世矣每朝宴會同與侍中近臣並列帷幄晉宣帝為魏太傅時将誅曺爽其深謀秘策獨與景帝潜畫文帝弗之知也将發夕乃告之既而使人覘之景帝寢如常文帝不能安席晨會司馬門鎮静内外置陣甚整宣帝曰此子竟可也後魏道武時太武以皇孫生於東宫體貌瓌異道武竒而悦之曰成吾業者必此子也太武時北巡文成以皇孫従在後逢虜帥桎一奴欲加其罰文成謂之曰如今遭我汝宜釋之帥奉命解縛太武聞之曰此兒雖小欲以天子自處意竒之後周太祖兄子護魏普泰初始自晉陽至平凉時年十七太祖諸子並幼遂委護以家務内外不嚴而肅太祖嘗嘆曰此兒志度類我及太祖西巡至牽屯山遇疾馳驛召䕶䕶至涇州見太祖太祖疾已綿篤謂護曰吾形容若此必是不濟諸子幼小寇賊未寧天下之事屬之於汝宜勉力以成吾志護涕泣奉命時嗣子冲弱冦賊在近人情不安護綱紀内外撫循文武於是衆心乃定先是太祖嘗云我得胡力當時莫曉其㫖至是人以護字當之武帝太祖第四子也幼而孝敬聰敏有器質太祖異之曰成吾志者必此兒也齊煬王憲太祖第五子太祖嘗賜諸子良馬唯其所擇憲獨取駮者太祖問之對曰此馬色類既殊或多駿逸若従軍征伐牧圉易分太祖喜曰此兒知識不凡當成重器後従獵隴上經官馬牧太祖每見駮馬輒曰此我兒馬也因令左右取以賜之隋高祖第四子秀有膽氣容貌瓌偉美鬚髯多武藝甚為朝臣所憚帝每謂文獻皇后曰秀必以惡終我在當無慮至兄弟必反秀初鎮蜀兵部侍郎元衡使於蜀秀深結於衡以左右為請衡既還京師請益左右帝不許大将軍劉噲之討西爨也髙祖令上開府楊武通将兵繼進秀使嬖人萬智光為武通行軍司馬帝以秀任非其人譴責之因謂羣臣曰壊我法者必在子孫乎譬如猛獸物不能害反為毛間蟲之所損食耳於是遂分秀所統唐髙祖初為唐公太宗既舉義師髙祖知其英畧入神軍機大事皆令所司諮決因従容謂太宗曰汝功業既重成事之後天下繇汝致之吾當以爾為太子太宗拜謝且固辭太宗貞觀十八年四月己酉御兩儀殿高宗時為皇太子侍側太宗謂侍臣曰太子志行性度外人頗亦知否司徒長孫無忌曰古人云桃李不言下自成蹊殿下仁孝自然徳義髙逺四海之内莫不聞知太宗曰朕如某年某高宗名性頗不依節度某自幼嵗便懷寛厚生男如狼猶恐其尫冀其年齡轉壯或自不同今日無忌曰陛下雄武冠時誠撥亂之才殿下仁愛自天乃守文之徳所向雖别而各當其分此上天所授以養蒼生者也是年十一月乙酉日南至皇太子王公以下展賀於貞觀殿太宗曰朕一二年中始見太子拜賀太子宗社之本四海所繫而某天資仁孝内外傾服朕之此舉無愧於神人也後唐太祖以龍紀元年討孟方立於邢州旋師于路因較獵於三垂崗有𤣥宗原廟太祖於祠前置酒樂作伶人奏百年歌至於衰老之際聲調悽苦太祖引滿捋鬚指莊宗曰老子壯心未已二十年後此郎子必戰於此及夾城之役果符是言時莊宗纔五嵗及太祖有疾召監軍使張承業大将呉珙謂曰吾嘗愛此子志氣逺大可付後事周太祖微時世宗事之以孝謹聞太祖嘗謂人曰此吾家之寳也知臣書曰知人則哲惟帝其難之非夫躬徇齊之美蘊聰明之徳英識卓越偉量疏達旌别淑慝而無所凝滯選任賢能而適其位量又曷能屛斥巧佞黜放姧宄使疲軟罷去而羇孤並進者乎自帝堯欽明擅如神之譽漢高善任載良史之説由是之後以叡智而處民上者或疇咨俊乂並居左右或簡拔豪英委之經畧揣摩其志輒申之保任揚摧其器質形於品藻用能幹事功於一代樹風聲於來裔藹然佳話斯可述焉帝堯曰疇咨若時登庸疇誰庸用也誰能咸熙庶績順我事者将登庸也放齊曰𦙍子朱啟明帝曰吁嚚訟可乎放齊臣名𦙍國子爵朱名啟開也吁疑怪之辭言不忠信為嚚人好争訟可乎言不可帝曰疇咨若予采采事也復求誰能順我事者驩兠曰都共工方鳩僝功驩兠臣名都嘆美之辭共工官稱鳩聚僝見也歎共工能方方聚見其功帝曰吁静言庸違象恭滔天静謀滔漫也言共工自為謀言起用行事而背違之貌象恭敬而心傲狠若漫天言不可用帝曰咨四岳四岳即羲和之四子分長四岳之諸侯故稱焉湯湯洪水方割湯湯流貌洪大割害也言大水方且為害蕩蕩懐山襄陵浩浩滔天蕩蕩言水奔突有所滌除懐包㐮上也包山上陵浩浩盛大若漫天下民其咨有能俾乂俾使乂治也言民咨嗟憂愁病水困苦故問四岳有能治者将使之僉曰於鯀哉僉皆也鯀崇伯之名朝臣舉之帝曰吁咈哉方命圮族凡言吁者皆非帝意咈戾圮毁族類也言鯀性狠戾好此方名命而行事輒毁敗善類岳曰异哉試可乃已异己也退也言餘人盡己唯鯀可試無成乃退帝曰往欽哉帝勅鯀往治水命使敬其事堯知其性狠戾圮族未明其所能而據衆言可試故用之九載績用弗成載年也三考九年功用不成則放退之漢髙祖五年置酒雒陽南宫帝曰通侯諸将毋敢隠朕皆言其情吾所以有天下者何項氏之所以失天下者何髙起王陵對曰漢帝年紀高帝時有信平侯陵都武侯起魏相奏髙帝時奏事有臣陵臣起陛下嫚而侮人項羽仁而敬人然陛下使人攻城畧地所降下者因以與之與天下同利也項羽妬賢嫉能有功之賢者疑之戰勝而不與人功得地而不與人利此其所以失天下也帝曰公知其一未知其二夫運籌帷幄之中決勝千里之外吾不如子房填填與鎮同國家撫百姓給餉餽不絶糧道吾不如蕭何連百萬之衆戰必勝攻必取吾不如韓信三者皆人傑吾能用之此吾所以取天下也項羽有一范増而不能用此所以為我禽也羣臣悦服陳平因魏無知求見漢王漢王召入是時萬石君石奮為中㳙受平謁平等十人俱賜進食王曰罷就舍矣平曰臣為事來所言不可以過今日於是漢王與語而説之説讀曰悦問曰子居楚何官平曰為都尉是日拜平為都尉使參乗典護軍諸将盡讙讙囂而議也曰大王一日得楚之亡卒未知高下即與共載使監護長者漢王聞之愈益幸平周勃為人木強敦厚木謂質樸髙帝謂可屬大事屬委也髙帝疾病吕后問曰陛下百嵗後蕭相國既亡誰令代之帝曰曺參可問其次曰王陵可然少戇陳平可以助之陳平智有餘然難獨任周勃重厚少文然安劉氏者必勃也可令為太尉吕后復問其次帝曰此後亦非乃所知也及吕后聴朝諸吕将危劉氏勃平等誅之恵帝時相國蕭何病帝自臨視何疾因問曰君即百嵗後誰可代君對曰知臣莫若主帝曰曺參何如何頓首曰帝得之矣何死不恨矣文帝末周亞夫為中尉帝戒太子曰即有緩急周亞夫真可任将及景帝即位亞夫為車騎将軍三年呉楚反亞夫以中尉為太尉擊吳楚平之景帝時竇嬰以太后宗屬封魏其侯桃侯免相劉舍也竇太后數言魏其侯帝曰太后豈以臣有愛相魏其者愛猶惜也魏其沾沾自喜耳多易沾沾輕薄也難以為相持重遂不用用建陵侯衞綰為丞相武帝時韓安國為御史大夫為人多大畧知足以當世取舍言可取則取可止則止而出於忠厚貪嗜嗜與耆同財利然所推舉皆廉士賢於己者於梁舉壺遂臧固至他皆天下名士於梁舉二人至於他餘所舉亦皆名士也士亦以此稱慕之唯天子以為國器汲黯為九卿多病病且滿三月帝賜告者數終不瘉最後嚴助為請告帝曰汲黯何如人也曰使黯任職居官亡以瘉人瘉勝也瘉與愈同然至其輔少主守成雖自謂賁育弗能奪也孟賁夏育皆古之勇士也帝曰然古有社稷之臣至如汲黯近之矣兒寛為廷尉吏以不習事除為従史之北地視畜數年之往也畜謂廷尉之畜在北地者若今試司公廨牛羊還至府上畜簿會廷尉時有疑奏已再見郤矣郤退也掾史莫知所為寛為言其意掾史因使寛為奏奏成讀之皆服以白廷尉湯湯大驚召寛與語乃竒其材以為掾上寛所作奏即時得可異日湯見帝問曰前奏非俗吏所及誰為之者湯言兒寛帝曰吾固聞之久矣湯繇是鄉學鄉讀曰嚮以寛為奏讞掾以古法義決疑獄甚重之褚大為梁相通五經為博士時兒寛為弟子及御史大夫缺徵禇大夫自以為得御史大夫至雒陽聞兒寛為之褚大笑及至與寛議封禪於上前大不能及退而歎曰上誠知人李廣文帝時為郎騎常侍數従射獵格殺猛獸帝曰惜廣不逢時令當高祖世萬戸侯豈足道哉及孝武時為前将軍與大将軍衞青俱擊匈奴青隂受武帝指以為李廣數竒言廣數為匈奴所敗命隻不耦合也毋令當單于恐不得所欲果以失道自殺霍光為奉車都尉衞太子為江充所敗而燕王旦廣陵王胥皆多過失是時武帝年老寵姬鈎弋趙倢伃有男倢伃居鈎弋宫故稱之心欲以為嗣命大臣輔之察羣臣唯霍光任大重可屬社稷帝迺使黄門畫者畫周公負成王朝諸侯以賜光黄門之署職任親近以供天子百物在焉故亦有畫工後元二年春帝遊五柞宫病篤光涕泣問曰如有不諱誰當嗣者帝曰君未諭前畫意邪立少子君行周公之事光頓首譲曰臣不如金日磾日磾亦曰臣外國人不如光帝以光為大司馬大将軍日磾為車騎将軍及太僕上官桀為左将軍搜粟都尉桑𢎞羊為御史大夫皆拜卧内牀下於天子所卧牀前拜識受遺詔輔少主明日武帝崩太子襲尊號是為孝昭皇帝帝年八歳政事一決於光宣帝時大将軍霍光薨子禹復為大司馬兄子山領尚書霍山去病之孫今云兄子者轉寫誤耳親屬皆宿衞内侍地節三年夏京師雨雹蕭望之因是上疏願賜清間之宴口陳災異之意問讀日閑帝昔在民間聞望之名曰此東海蕭生邪下少府宋畸問狀無有所諱拜為謁者嵗中三遷官守少府宣帝察望之經明持重議論有餘材任宰相欲詳試其政事復以為左馮翊入為御史大夫後漢光武嘗與功臣諸侯讌語従容言曰諸卿不遭際會自度爵禄何所至乎高宻侯鄧禹先對曰臣少嘗學問可郡文學博士帝曰何言之謙乎卿士子志行修整何不為掾功曺餘各以次對至馬武曰臣以武勇可守尉督盜賊帝笑曰且勿為盜賊自致亭長斯可矣馬援為伏波将軍善兵策帝嘗言伏波論兵與我意合每有所謀未嘗不用賈復為漢中王劉嘉校尉更始以光武為大司馬安撫河北復持嘉書及光武於柏人因鄧禹得召見光武竒之署復破虜将軍督盜賊官屬以復後來而好陵折等輩調補鄗尉光武曰賈督有折衝千里之威方任以職勿得擅除東觀記曰時帝置兩府官屬賈復與段孝共坐孝謂復曰卿将軍督我大司馬督不得共坐復曰俱劉公吏有何尊卑官屬以復不遜帝調官屬補長吏共白欲以復為鄗尉上署報不許也光武至信都以復為偏将軍復從征伐未嘗喪敗數與諸將潰圍解急身被十二創帝以復敢深入希令逺征而壯其勇節常自從之故復少方面之勲東觀記曰呉漢擊蜀未破上書請復自助上不遣諸将每論功自伐復未嘗有言帝輒曰賈君之功我自知之寇恂為河内太守更始遣将朱鮪攻之時傳聞鮪破河内帝以為不然有頃恂檄至恂大破鮪等光武大喜曰吾知寇子翼可任也劉嘉字孝孫光武族兄義兵起嘉隨更始征伐封漢中王赤眉破其相李寳等聞鄧禹西征擁兵自守勸嘉且觀成敗光武聞之告禹曰孝孫素謹善少且親愛當是長安輕薄兒誤之耳禹即宣帝㫖嘉乃因來歙詣禹於雲陽三年到雒陽従征伐拜為千乗太守明帝時牟融為大司農是時方勤萬機公卿數朝會每輒延謀政事判折獄訟融經明才高善議論朝廷皆服其能帝數嗟嘆以為才堪宰相明年代伏恭為司空舉動方重甚得大臣節質帝少而聰慧知梁冀驕横嘗朝羣臣目冀曰此跋扈将軍也冀聞深惡之魏太祖知人善詧難眩以偽拔于禁樂進於行陣之間取張遼徐晃於亡虜之内皆佐命立勲列為名将其餘拔出細㣲登為牧守者不可勝數荀攸字公達太祖每稱曰公達外愚内智外怯内勇外弱内強不伐善無施勞智可及愚不可及雖顔子甯武不能過也又下令曰孤與荀公達同遊二十餘年無毫毛可非又曰荀公達真賢人也所謂溫良恭儉譲以得之孔子稱晏平仲善與人交久而敬之公達即其人也文帝在東宫太祖謂曰荀公達人之師表也汝當盡禮敬之荀彧初為漢尚書令所舉者命世人才攸為魏尚書令亦推進賢士太祖曰二荀令之論人久而益信吾没世不忘曺純所督虎豹騎皆天下驍鋭或従百人将補之太祖難其帥純以選為督撫循甚得人心及卒有司白選代太祖曰純之比何可復得吾獨不中督邪遂不選郭嘉字奉孝潁川人先是潁川戯志才籌畫士也太祖甚器之早卒太祖與荀彧書曰自志才亡後莫可與計事者汝潁固多竒士誰可以繼之彧薦郭嘉召見論天下事太祖曰使孤成大業者必此人也嘉出亦喜曰真吾主也表為司空軍祭酒嘉深通有算略達於事情太祖字之曰唯奉孝為能知孤意程昱為衞尉性剛戾與人多迕人有告昱謀反太祖賜待益厚晉宣帝輔政時鄧艾少為典農綱紀上計吏因使見帝帝竒之辟之為太尉掾荀顗字景倩魏尚書令彧之第六子以父勲除中郎宣帝輔政見顗竒之曰荀令君之子也擢拜散騎侍郎石苞字仲容景帝初以為中護軍司馬宣帝聞苞好色薄行以讓景帝景帝答曰苞雖細行不足而有經國才畧夫貞廉之士未必能經濟世務是以齊桓忘管仲之奢僣而錄其紏合之大謀漢髙舍陳平之汙行而取其六竒之妙算苞雖未可以上儔二子亦今日之選也意乃釋後苞武帝時以功至司徒明帝時紀瞻為僕射帝嘗獨引瞻於廣室慨然憂天下曰社稷之臣殆無復十人如何因屈指曰君便其一瞻辭譲帝曰方欲與君善語復云何崇謙譲邪簡文帝為相時謝安寓居會稽累辟不就帝謂人曰安石既與人同樂必不得不與人同憂召之必至後卒為相王述字懷祖簡文帝每言述才既不長直以真率便敵人耳謝安亦嘆美之後魏道武初許謙為右司馬時慕容寳來冦也道武使謙告難於姚興興遣将來援明年慕容垂復來冦帝謂謙曰今事急矣非卿豈能復致姚師卿其行也謙未發而垂退乃止太武能知人收士於卒伍之中唯其才所長不論本末古弼為尚書令弼頭尖帝嘗名之曰筆頭是以時人呼為筆公車駕畋於山北大獲麋鹿數千頭詔尚書發車牛五百乗以運之太武尋謂従者曰筆公必不與我汝輩不如馬運之速遂還行百餘里而弼表至曰今秋榖懸黄麻菽布野猪鹿竊食鳥雁侵費風波所耗朝夕三倍乞賜矜緩使得收載太武謂左右曰筆公果如朕所卜可謂社稷之臣李訢為中書學生太武幸中書學見而異之指謂從者曰此小兒終効用於朕之子孫矣因識記之太武舅陽平王杜超有女将許貴戚太武聞之謂超曰李訢後必宦達益人門户可以女妻之勿許他族遂勸成婚杜超之死也太武親哭三日訢以超壻得在喪位出入帝目而指之謂左右曰觀此人舉動豈不有異於衆必為朕家幹事之臣後為侍中鎮南将軍卒李孝伯美風儀動有法度従兄順言之於太武徴為中散太武見而異謂順曰真卿家千里駒也文成時李伯尚少有重名弱冠除秘書郎文成每云此李氏之千里駒陸馛父俟封東平王聰慧有策畧馛多智有父風文成見馛而悦之謂朝臣曰吾常歎其父智過其軀是復踰於父矣孝文時穆弼有風格涉獵經史孝文欲以弼為國子助教會司州牧咸陽王禧入孝文謂禧曰朕與卿作州都舉一主簿即令弼謁之因為孝文所知輿駕南征特勑隨従于烈為散騎常侍穆泰等謀反舊京伏法烈一宗無所染孝文歎曰元儼治斷威恩深自不惡然為臣盡忠猛決不如烈也爾日烈在代都必即斬其五三元首耳烈之節槩不謝金日磾也詔除領軍将軍崔亮為尚書二千石郎孝文在洛欲剏革舊制選置百官謂羣臣曰與朕舉一吏部郎必使才望兼允者給卿三日假又一日孝文曰朕已得之不煩卿輩也馳驛徴亮兼吏部郎崔光為散騎常侍兼侍中雖處機近曽不留心文案唯従容論議參贊大政而已孝文每對羣臣曰以崔光之髙才大量若無意外咎譴二十年後當作司空其見重如是光後至司徒裴聿字外興以操尚貞立為孝文所知自著作佐郎出為北中府長史孝文以聿與中書侍郎崔亮並清貧欲以幹禄優之乃以亮帶野王縣聿帶溫縣時人榮之張烈孝文時入為太子步兵校尉南齊将陳顯達治兵漢南謀将入寇順陽太守王清石世官江南荆州刺史廣陽王嘉慮其有異表請代之孝文詔侍臣各舉所知互有申薦孝文曰此郡今當必争之地須得堪濟之才何容汎舉也太子步兵張烈每論軍國之事時有㑹人意處朕用之何如彭城王勰稱讃之遂除陵江将軍順陽太守劉道斌舉孝廉入京拜校書郎轉主書頗為孝文所知従征南陽還加積射将軍給事中孝文謂黄門侍郎邢巒曰道斌是段之舉便異儕流矣卒於岐州刺史宣武時李處自太尉従事中郎出為清河太守屬京兆王愉反處棄郡奔闕宣武聞處至謂左右曰李處在冀州日久恩信著物今拔難而來衆情自解矣乃令處别領軍往前慰勞孝武初楊寛改授散騎常侍驃騎将軍給事黄門侍郎監内典書事時夏州戍兵數千人據兖州反詔寛兼侍中節度諸軍討平之中尉綦雋與寛有宿憾誣以他罪刼之孝武謂侍臣等曰楊寛清直朕極知其無罪但不杜法官之奏耳事下廷尉得申釋後周太祖時王述驃騎大将軍羆之孫少聰敏有識度年八嵗太祖見而竒之曰王公有此孫足為不朽即以為鎮逺将軍拜太子舍人蘇綽為行臺郎中太祖與僕射周恵達論事恵達不能對請出外議之乃召綽告以其事綽即與量定恵達入呈太祖稱善謂恵達曰誰與卿為此議者恵達以綽對因稱有王佐之才太祖曰吾亦聞之久矣尋除著作佐郎蘇椿魏孝明正光四年出為武都郡守改授西夏州長吏除都督行𢎞農郡事當官強濟特為太祖所知宇文測為大都督行汾州事或有告測與外境交通懐二心者太祖怒曰測為我安邊吾知其無貳志何為間我骨肉生此貝錦乃命斬之仍許測以便宜従事李旭初謁太祖太祖深竒之厚加資給令入太學太祖每見學生必問才行於旭旭神情清悟應對明辨太祖每稱嘆之韓擒虎少慷慨以膽畧見稱容貌魁岸有雄傑之表性又好書經史百家皆畧知大㫖太祖見而異之令與諸子遊集後以軍功拜都督新安太守薛端為吏部郎中軍東討齊柱國李弼為别道元帥妙簡英僚數日不定太祖謂弼曰為公思得一長吏無過薛端弼對曰真才也乃遣之趙剛為潁州郡守時髙中宻以北豫州來附兼大行臺佐丞持節赴潁州節度議軍帥還剛别破侯景前驅於南陸復獲其郡守二人時有流言傳剛東叛齊神武因設反間聲遣迎接剛乃率騎襲其守塢拔之帝知剛無貳乃加賚焉除營州刺史進爵為公武帝平北齊其大理公孫茂甚有能名帝聞而召見與語器之授濟北太守隋高祖時蘇威為太子少保漸見親重與髙熲參掌國政尋兼大理卿京兆尹御史大夫官悉如故治書侍御史梁毘劾威兼領五職安繁戀劇無舉賢自代之意髙祖曰蘇威朝夕孜孜志存逺大舉賢有闕何遽迫之顧謂威曰用之則行舍之則蔵唯我與爾有是夫因謂朝臣曰蘇威不值我無以措其言我不得蘇威何以行其道楊素才辯無雙至若斟酌古今助我宣化非威之匹也蘇威若逢亂世商山四皓豈易屈哉其見重如此又謂羣臣曰世人言蘇威詐清家累金玊此妄言也然其性狠戾不切世要求名太甚従已則悦違之必怒此其大病耳李景遼東之役為馬軍總管及還配事漢王髙祖竒其壯武使袒而觀之曰卿相表當位極人臣後至柱國楊義臣為陜州刺史性謹厚能馳射有将相之才繇是高祖甚重之煬帝時薛世雄為右監門郎帝嘗従容謂羣臣曰我欲舉好人未知諸君識否羣臣咸曰臣等何能測聖心帝曰我欲舉者薛世雄羣臣皆稱善帝復曰世雄廉正節槩有古人之風於是超拜右翊衞将軍李宻以父䕃為左親侍嘗在伏下煬帝顧見之退謂許公宇文述曰向者左仗下黒色小兒為誰許公對曰故蒲山公李寛子宻也帝曰箇小兒瞻視異常勿令宿衞他日述謂宻曰弟聰令如此當以才學取官三衞叢脞非養賢之所宻大喜因謝病專以讀書為事時人希見其面唐高祖時姜寳誼為右武侯大将軍與尚書右僕射裴寂拒宋金剛于介州戰始合寂棄軍而走兵遂大潰寳誼為賊所擒髙祖初聞其没也泣曰寳誼烈士必不生降賜其家物千段米三百石寳誼後謀背賊事泄遇害臨死西向大言曰臣無狀負陛下被屠潰是所甘心但敗軍喪師九泉所恨太宗謂司徒長孫無忌等曰朕今面談公等得失以為鑒誡言之者可以無過聞之者可以自改侍臣拜謝太宗曰長孫無忌善避嫌疑應物敏速至決㫁事理求之古人而總兵攻戰非其所長也髙士廉涉獵古今心術聰俊臨難既不改節為官亦無朋黨所少者骨鯁規諫耳唐儉言辭俊利善和解人稱材疏行發言啟齒事朕三十載遂無一言論國家得失楊師道性行純善自無愆過而情實怯愞未甚便事急緩不可得力岑文本性道敦厚文章自其所長而持論嘗據經逺自當不負於物劉洎性㝡堅貞有利益然而意尚然諾偏於朋友能自補闕亦何以尚焉馬周見事敏速性甚貞正至於論量人物直道而言朕比任使多所稱意褚遂良學問稍長性亦堅正既寫忠誠甚親附於朕譬如飛鳥依人自加憐愛比日以來每試鞫大獄将有任使亦何以加之薛萬徹為右衞大将軍太宗従容謂近臣曰當今名将唯李勣道宗萬徹三人而已李勣道宗不能大勝亦不大敗萬徹非大勝即大敗契苾何力為蔥山道副大總管討平萬昌時何力母姑臧夫人及母弟賀蘭州都督沙門並在凉府何力歸省其母兼撫巡部落時薛延陁強盛契苾部落皆願従之於是衆兵執何力至延陁致於可汗牙前何力箕踞而坐拔佩刀東向大呼曰豈有大唐烈士受辱蕃庭天地日月願照我心又割左耳以明志不可奪也可汗怒欲殺之為其妻所抑而止或言太宗曰人心各樂其土何力今入延陁猶魚得水也太宗曰不然此人心如鐵石必不背我會有使自延陁至具言其狀太宗謂羣臣曰契苾何力竟如何遽令兵部侍郎崔敦禮持節入延陁許降公主以和何力由是得還代宗時裴遵慶為吏部尚書右僕射復知選事敦守儒行老而彌謹嘗為風狂族姪撾登聞皷告以不順代宗知其大謬不省其見信如此大歴中􅃫翔李抱玊奏馬燧為隴州刺史會抱玊入覲燧與俱來留京師久之代宗知其能召見拜商州刺史兼御史中丞防禦水陸運使徳宗時渾瑊為金吾大将軍兼左街使李希烈遣間諜詐為瑊書與希烈通瑊奏其狀徳宗特保證之仍賜瑊馬一匹并鞍轡綵二百疋崔縦為京兆尹徳宗在奉天數奏李懐光剛愎反復宜隂備之及行幸梁州左右或短之曰縦素善懐光必不來矣帝曰他人不知縦吾可保不數日縦至拜御史大夫竇申為給事中宰相參之族子也與従父舅嗣虢王則之相得歡甚洽以為重嘗同宴遊參特愛申每議除授多詢於申申或泄之招權受賂申所至人謂之喜鵲徳宗頗聞其事數謂參曰卿他日必為中所累不如出之以掩物議參曰臣無强子侄申雖疎屬臣素親之不忍出請保無他犯徳宗曰卿雖自保如衆人何參固如前對申聞之不悛後果敗焉李藩為徐州従事節度使張建封卒濠州刺史杜兼誣奏藩搖動軍情德宗詔杜佑殺之及杜佑救解德宗怒不釋亟追藩赴闕及召見望其儀形曰此豈作惡事人耶乃釋然除秘書郎後為給事中制勅有不可遂於黄勅後批之吏曰宜别連白紙藩曰别以白紙是文狀豈曰批勅裴洎言之憲宗以為有宰相器屬鄭絪罷免遂拜藩門下侍郎同平章事武元衡為御史中丞嘗因延英對罷德宗目送指示左右曰武元衡真宰相器也後果為相憲宗時郗士美為昭義節度使號令甚肅及討王承宗士美以兵馬使王獻領勁卒一萬為前鋒獻兇惡怙亂逗撓不進遽使召至數其罪立斬之且令曰敢後出者斬士美親皷之兵既合而賊軍大敗下三營環柏鄉屢以㨗聞憲宗大悦曰吾固知士美之能辦吾事鄭餘慶居将相出入垂五十年所得皆給親黨家類寒素自至徳已來方鎮除授必遣中使領旌節就地宣賜皆厚遺金帛求媚者唯恐其少故王人一來有獲錢數百萬者餘慶每授方任憲宗必誡其使曰餘慶家貧不得妄有求取後唐莊宗為晉王梁冀王朱友謙為友珪所伐乞師於帝帝親總軍赴援與汴軍遇於平陽大破之因與友謙會於猗氏友謙盛陳感慨願敦盟約帝歡甚友謙乗醉鼾於帳中帝熟視之謂左右曰冀王真貴人也但恨其臂短耳明帝初入雒遽謂近臣安重誨曰先帝時馮道郎中何在重誨曰近除翰林學士明帝曰此人朕素諳委甚好宰相遂大用又嘗謂侍臣曰馮道性純儉頃在徳勝寨所居一茅庵與従人同器食卧則芻藁一束其心晏如及以父憂退歸鄉里自耕耘樵採與農夫雜處畧不以素貴介懷真士大夫也大成元年以康思立為應州刺史思立本出隂山諸部性純厚善撫御帝素喜之故即位之始以應州所生之地授焉其後厯二郡三鎮皆有百姓之譽冊府元龜卷一百四十八
