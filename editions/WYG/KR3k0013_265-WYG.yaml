body:
  text: 册府元龜卷二百六十五宋王欽若等撰宗室部封建第四北齊廣平公盛髙祖從叔祖髙祖起兵於信都以盛為中軍大都督封廣平公永安王浚髙祖第三子東魏元象中封永安郡公天保元年進爵為王平陽王淹髙祖第四子東魏元象中封陽平郡公天保元年進爵為王彭城王浟髙祖第五子東魏元象二年封長樂郡公天保元年封彭城王上黨王渙髙祖第七子東魏元象中封平原郡公天保元年封王襄城王淯髙祖第八子東魏元象中封章武郡公天保元年封王任城王湝髙祖第十子天保元年封髙陽王湜髙祖第十一子天保元年封慱陵王濟髙祖第十二子天保元年封華山王凝髙祖第十三子天保元年封新平郡王九年改封安定十五年封華山馮翊王潤髙祖第十四子天保初封漢陽王洽髙祖第十五子天保元年封清河王岳髙祖從父弟後魏太昌初封清河郡公食邑二千戸天保元年進封平秦王歸彦髙祖族弟天保元年封武興王普歸彦兄子天保元年封襄樂王顯髙祖從祖弟天保元年封廣武王長弼髙祖從祖兄子天保元年以宗室封上雒王思宗髙祖從子天保初封河南王孝瑜文襄長子東魏封河南郡公天保元年進爵為王廣寧王孝珩文襄第二子天保元年封河間王孝琬文襄第三子天保元年封蘭陵王長恭一名孝瓘文襄第四子安徳王延宗文襄第五子為文襄所愛年十二文襄嘗問欲作何王對曰欲作衝天王文襄問楊愔曰天下無此郡名願使安於徳於是封安徳焉漁陽王紹信文襄第六子太原王紹徳文宣第二子范陽王紹義文宣第三子初封廣陽徙封范陽西河王紹仁文宣第四子隴西王紹亷文宣第五子初封長樂後改焉樂陵王百年孝昭第二子大寧中封汝南王彦理孝昭子武平初封始平王彦徳城陽王彦基定陽王彦康汝南王彦忠並孝昭子與汝南同受封南陽王綽武成第二子初名融字君明出後漢陽王河清二年改封南陽别為漢陽置後琅邪王儼武成第三子天統二年封東平王後改封齊安王廓武成第四子天統二年封北平王貞武成第五子天統二年封髙平王仁英武成第六子天統二年封淮南王仁光武成第七子天統二年封西河王仁機樂平王仁邕潁川王仁儉安樂王仁雅丹陽王仁直東海王仁謙並武成子天統三年封後周晉公䕶太祖兄子魏帝初封池水縣伯邑五百戸太統初進爵中山公増邑通前一千戸孝閔踐祚封晉國公邑萬戸䕶子㑹封譚國公至封莒國公静封崇業公澡封昌城公乾嘉封正平公衛王直太祖子西魏封秦郡公武成初進封衛公建徳三年進爵為王齊王憲太祖子西魏封安城郡公明帝即位進爵齊國公邑萬戸建徳三年進爵為王憲子貴封安定郡公質河間郡王寳中坦公乾禧安城公乾河龍溷公趙王昭太祖子西魏封正平郡公武成初進封趙國公建徳三年進爵為王大象元年詔以雒州襄國郡邑萬戸為趙國昭子員封慶徳公貫封永康王乾封甌越公譙王儉太祖子武成初封譙國公建徳三年進爵為王陳王純太祖子也武成初封陳國公建徳三年進爵為王大象元年詔以濟南郡邑萬戸為陳國越王盛太祖子武成初封越國公建徳三年進爵為王大象元年詔以豊州武當安昌二郡邑萬户為越國代王達太祖子武成初封代國公建徳三年進爵為王大象元年詔以潞州上黨郡邑萬戸為代國冀國公通太祖子武成初封滕王逌太祖子武成初封滕國公建徳三年進爵為王大象元年詔以荆州新野郡邑萬戸為滕國安化王深太祖族子西魏累封長樂縣侯武成元年改封汝南郡公慶太祖族子從武帝克并州以功封豳公廣太祖兄子遵之子初封蔡公邑萬户武帝時封豳公紀王康孝閔帝子保定初封紀國公建徳初進爵為王畢王賢明帝子保定四年封畢公建徳三年進爵為王酆王貞明帝子初封酆國公建徳三年進爵為王漢王贊武帝子初封漢國公建徳三年進爵為王秦王贄曹王允道王充蔡王先荆王元俱並武帝子萊王衍郢王術皆宣帝子大象二年封隋滕王瓚一名慧髙祖母弟周世以太祖軍功封竟陵郡公髙祖作相進邵國公及受禪立為滕王子坦封竟陵郡公衛王爽髙祖異母弟也開皇初立為衛王二年賜爽實食梁安縣千戸河間王𢎞髙祖從祖弟髙祖為丞相嘗置左右委心腹賜爵永康縣公開皇初進爵郡公尋贈其父為柱國尚書令河間郡公其年立𢎞為河間王觀徳王雄髙祖族子在周封武陽縣公邑千户大象中進爵邗國公邑五千戸髙祖受禪進封廣平王食邑五千戸以邘公别封一子雄請封弟士貴許之尋改封清漳王仁壽初髙祖曰清漳之名未允聲望命職方進地圖上指安徳郡以示羣臣曰此號足為明徳相稱於是改封安徳王大業中改封觀徳王雄弟遂寧子達在周封遂寧縣男髙祖受禪進爵為子髙陽郡公智明開封縣公智才並髙祖弟慗之子開皇元年封秦王俊髙祖第三子開皇元年十一月封俊子湛大業初封濟北侯蜀王秀髙祖第四子開皇元年立為越王未幾徙封於蜀漢王諒一名傑髙祖第五子開皇元年封齊王􅌔煬帝第二子開皇中立為豫章王食邑千戸煬帝即位進封齊王増邑四千戸趙王杲煬帝小子年七歳以大業九年封長寧王儼廢太子勇長子六歲封儼弟平原王裕安城王筠安平王嶷襄城王恪髙陽王該建安王詔潁川王煚皆勇子也並開皇六年封燕王倓越王侗並元徳太子昭子大業二年封唐平原王白駧國之宗室隋末封黄𤓰公髙祖武徳元年受禪改封永安王孝基髙祖從父弟隋末封蜀郡公武徳元年改封淮南王神通髙祖從父弟武徳元年封永康王尋改封貞觀元年賜實封五百戸神通子膠東王道彦髙祖受禪封義興郡公武徳五年進封膠東王道彦弟髙宻王孝察淄川王孝同廣平王孝慈河間王孝友清河王孝節膠西王孝義貞觀初降爵為公初髙祖受禪以天下未定廣封宗室以威天下皇從弟及姪年始孩童者數十人皆封為郡王太宗即位因舉宗正屬籍問侍臣曰徧封宗子於天下便乎尚書右僕射封徳彛對曰歴觀往古封王者今最為多兩漢已降惟封帝子及親兄弟若宗室既逺者非有大功如周之郇滕漢之賈澤並不得濫封所以别親疎也先朝敦睦九族一切封王爵命既隆多給力役盖以天下為私殊非至公馭物之道太宗曰朕理天下本為百姓非欲勞百姓以養已之親也於是宗室率以屬疏降爵郡公惟有功者數十人封王是時道彦等隨例降爵神通㓜子孝逸初封梁郡公光宅元年平徐敬業改封吴國公襄邑王神符神通弟也義寧初封安吉郡公武徳元年進封襄邑郡公神符次子徳懋武徳初封臨川郡王少子文暉魏郡王後例降為公長平王叔良髙祖從父弟也義寧初封長平郡公武徳元年進爵為王叔良弟新興王徳良武徳初封徳良弟長樂王㓜良武徳初封襄武王琛髙祖從父兄子也義寧初封襄武郡公武徳元年進爵為王琛弟河間王孝恭初封趙郡公武徳二年進爵為王九年賜實封邑千二百戸貞觀初以功臣之例封河間郡王孝恭弟濟北郡王瑊武徳中封瑊弟漢陽郡公環武徳元年封漢陽郡公五年進爵為王太宗即位例降爵為公廬江王瑗髙祖從父兄子武徳元年封淮陽王道𤣥髙祖從父兄子武徳元年封江夏王道宗道𤣥從父弟武徳元年封雒陽郡公武徳五年授靈州總管梁師都據夏州遣弟引突厥兵數萬至其城下道宗閉門拒守伺隙而戰賊徒大破髙祖聞而嘉之謂左僕射裴寂等曰道宗今能守邉以寡制衆若魏任城王彰臨戎却敵道宗勇敢有同於彼遂封為任城王貞觀三年以功賜實封六百戸十二年改江夏王道宗子景常封廬國公隴西王博乂渤海王奉慈皆髙祖兄子武徳元年封巢王元吉髙祖第四子義師起封姑臧郡公尋進封齊國公武徳元年進爵為王元吉子梁郡王承業漁陽王承鑾普安王承奬江夏王承裕義陽王承度荆王元景髙祖第六子武徳三年封趙王貞觀十年徙封漢王元昌髙祖第七子武徳三年封為魯王貞觀十年改封酆王元亨髙祖第八子武徳三年封周王元方髙祖第九子武徳四年封徐王元禮髙祖第十子武徳四年封鄭王貞觀六年賜實封七百戸徙封韓王元嘉髙祖第十一子武徳四年封宋王五年徙封徐王貞觀六年賜實封七百戸十年改封元嘉子潁川王訓武陵王誼黄公譔彭王元則髙祖第十二子武徳四年封荆王貞觀十年改封鄭王元懿髙祖第十三子也武徳四年封滕王貞觀七年賜實封六百戸十年改封霍王元軌髙祖第十四子武徳六年封蜀王八年徙封吴王貞觀七年賜實封六百戸十年改封虢王元鳯髙祖第十五子武徳六年封豳王貞觀七年賜實封六百戸十年徙封虢王元鳯子定襄郡公宏東菀郡公融道王元慶髙祖第十六子武徳六年封漢王八年改封陳王貞觀九年賜實封八百戸十年改封鄧王元裕髙祖第十七子貞觀五年封鄶王十一年改封舒王元名髙祖第十八子貞觀五年封譙王十一年徙封元名子豫章王亶魯王靈䕫髙祖第十九子貞觀五年封魏王十年改封燕王賜實封八百戸十四年改封靈䕫子清河王詵范陽王藹江王元祥髙祖第二十子也貞觀五年封許王十一年徙封宻王元曉髙祖第二十一子也貞觀五年封滕王元嬰髙祖第二十二子也貞觀十二年封太原王承宗安陸王承道河東王承徳武安王承訓汝南王承明鉅鹿王承義並為隠太子子史闕封年月吴王恪太宗第三子武徳三年封長沙郡王貞觀初改為漢王十年徙封恪子成王千里初名仁永徽中恪被誅流于嶺表尋封為鬰林縣侯中興初進封成王千里弟歸政郡王璄中興初封濮王泰太宗第四子武徳三年封宜都郡王四年進封衛王貞觀二年改封越王十年徙封魏王十七年降封東萊郡王尋改封為順陽王二十一年進封濮王齊王祐太宗第五子武徳八年封宜陽王其年改封楚王貞觀二年徙封燕王十年改封齊王蜀王愔太宗第六子貞觀五年封梁王十年改封蔣王惲太宗第七子貞觀五年封郯王十年改封惲子蔡國公煌越王貞太宗第八子貞觀五年封漢王十年改封原王尋徙封越王紀王慎太宗第十子貞觀五年封申王十年改封慎子東平王續義陽王琮楚國公督襄郡公秀廣化郡公獻建平郡公欽江王囂太宗第十一子貞觀五年封代王簡太宗第十二子貞觀五年封趙王福太宗第十三子貞觀十三年封曹王明太宗第十四子貞觀三十一年封原王孝髙宗第二子永徽元年封澤王上金髙宗第三子永徽元年封杞王乾封元年有罪削封邑仍於灃安置文明元年封畢王尋又改封澤王許王素節髙宗第四子永徽二年封雍王年十二改封郇王為則天䜛嫉出為申州刺史則天誣以贓賄降封鄱陽郡王仍於袁州安置文明元年封葛王尋又改封許王安樂郡王光順髙宗太子賢長子天授中封安樂郡王光順弟守義永安郡王文明中封犍為郡王􅂷拱四年徙封守義弟邠王守禮本名光仁初封嗣雍王神龍元年進封邠王守禮子廣武郡王承宏開元初封燉煌郡王承宷至徳二年封譙王重福中宗第二子初封唐昌王聖厯三年徙封平安王長安四年進封譙王襄王重茂中宗第四子聖厯三年封北海王神龍初進封温王為韋庶人所立韋氏敗茂遜位景雲二年改封襄王遷於集州湖陽王宗暉中宗太子重俊子開元初封寧王憲本名成噐睿宗長子初封永平郡王長壽二年改封壽春郡王中宗即位改封蔡王加實封通舊七百户固辭不敢當依舊為夀春郡王唐隆元年進封宋王開元四年封寧王憲子汝陽郡王璡濟隂郡王莊同安郡王珣開元初封蒼梧郡開國公玠晉昌郡開國公珽魏郡開國公琯文安郡開國公瓘並天寳十一載封漢