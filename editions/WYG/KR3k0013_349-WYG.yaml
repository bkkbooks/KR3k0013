body:
  text: 册府元龜卷三百四十九宋王欽若等撰將帥部立功第二後漢耿弇建武初以建威大將軍與驃騎大將軍景丹彊弩將軍陳俊攻厭新賊於敖倉皆破降之三年延岑自武闗出攻南陽下數城穰人杜𢎞率其衆以從岑弇與岑等戰於穰大破之斬首三千餘級生獲其將士五千餘人得印綬三百杜𢎞降岑與數騎遁走東陽四年與建義大將軍朱祐漢忠將軍王常等擊望都故安西山賊十餘營皆破之五年與大司馬呉漢擊富平獲索賊於平原大破之降者四萬餘人因詔弇進討張歩弇悉收集降卒結部曲置將吏率騎都尉劉歆泰山太守陳俊引兵而東從朝陽橋濟河以度朝陽縣名屬濟南郡攻祝阿臨淄皆拔之令軍中毋得妄掠劇下須張歩至乃取之以激怒歩歩聞大笑曰以尤來大槍十餘萬衆吾皆即其營而破之今大耿兵少於彼又皆疲勞何足摧乎乃與三弟藍𢎞壽及故大槍渠帥董異等兵號二十萬至臨淄大城東將攻弇弇先出淄水上與董異遇突騎欲縱弇恐挫其鋒令歩不敢進故示弱以盛其氣乃引歸小城陳兵於内歩氣盛直攻弇營與劉歆等合戰弇升王宫瓌臺望之臨淄本齊國所都即齊王宫中有瓌臺也視歆等鋒交乃自出精兵以横突歩陳城下大破之飛矢中弇股以佩刀截之左右無知者至暮罷弇明旦復勒兵出大戰自旦及昏復大破之殺傷無數城中溝塹皆滿弇知歩困將退豫置左右翼為伏以待之兩旁伏兵如鳥之翼人定時歩果引去伏兵起縱擊追至鉅䏞水上鉅䏞水名一名巨洋水在今青州壽光縣西八九十里僵尸相屬收得輜重二千餘兩歩還劇兄弟各分兵散去後數日車駕至臨淄自勞軍弇因復追歩歩奔平壽乃肉袒負斧鑕於軍門弇傳歩詣行在所而勒兵入據其城樹十二郡旗鼓令歩兵各以郡人詣旗下衆尚十餘萬輜重七千餘兩皆罷遣歸鄉里弇復引兵至城陽降五校餘黨齊地悉平振旅還京師六年西拒隗囂屯兵於漆八年從上隴明年與中郎將來歙分部徇安定北地諸營堡皆下之弇凡所平郡四十六屠城三百未嘗挫折銚期建武元年以魏郡太守行大將軍事擊更始將卓京於鄴城破之斬首六百餘級京亡入山追斬其將校數十人獲京妻子進擊檀鄉五校賊於繁陽内黄復斬數百級祭遵建武二年以征虜將軍與驃騎將軍景丹建義大將軍朱祐漢忠將軍王常騎都尉王梁臧宫等入箕闗南擊𢎞農厭新柏華蠻中賊柏華聚名大破之時新城蠻中山賊張滿新城縣名今伊闕縣屯結險隘為人害詔遵攻抜生獲之遵引兵南擊鄧奉弟終於杜衍破之杜衍縣名屬南陽郡涿郡太守張豐執使者舉兵反自稱無上大將軍與彭寵連兵四年遵與朱祐及建威大將軍耿弇驍騎將軍劉喜俱擊之遵兵先至急攻豐豐功曹孟厷執豐降厷音古𢎞切諸將皆引還遵受詔屯良鄉拒彭寵因遣䕶軍傅𤣥襲擊寵將李豪於潞大破之斬首千餘級相拒歳餘數挫其鋒黨與多降者及寵死遵進定其地六年春光武遣諸將伐公孫述以遵為前行隗囂使其將王元拒隴坻遵進擊破之追至新闗及諸將到與囂戰並敗引退下隴乃詔遵軍汧耿弇軍漆征西大將軍馮異軍栒邑大司馬呉漢等還屯長安自是後遵數挫隗囂耿純建武四年以東郡太守將兵擊更始東平太守范荆荆降進擊泰山濟南及平原賊皆平之朱祐建武三年以建義大將軍擊新野隨皆平之隨縣名屬南陽郡故城在今隨州隨縣延岑自敗於穰遂與秦豐將張成合祐率征虜將軍祭遵與戰於東陽大破之東陽聚名在南陽臨陣斬成延岑敗走歸豐祐收得印綬九十七進擊黄郵降之四年率破姦將軍侯進代征南大將軍岑彭圍秦豐於黎邱破其將張康於蔡陽斬之明年夏城中窮困豐乃將其母妻子九人肉袒降祐祐還與騎都尉臧宫㑹擊延岑餘黨隂鄼筑陽三縣賊悉平之景丹建武二年以驃騎大將軍與建威大將軍耿弇建義大將軍朱祐執金吾賈復偏將軍馮異彊弩將軍陳俊左曹王常騎都尉臧宫等從擊破五校於羛陽聚名降其衆五萬人王梁建武二年以中郎將行執金吾事北守箕闗擊赤眉别校降之三年春轉擊五校追至信都趙國破之悉平諸屯聚四年春擊肥城文陽抜之肥城縣名屬泰山郡文音汶故城在兖州泗水縣西進與驃騎大將軍杜茂擊佼彊蘇茂於楚沛間抜大梁齧桑縣名或曰城名而捕虜將軍馬武偏將軍王霸亦分道並進歳餘悉平之杜茂建武二年以大將軍與中郎將王梁擊五校賊於魏郡清河東郡悉平諸營堡降其持節大將三十餘人三郡清靜明年以驃騎大將軍擊沛郡拔芒芒縣名復名臨睢時西防復反迎佼彊五年春率捕虜將軍馬武進攻西防數月拔之馬成建武四年以揚武將軍督誅虜將軍劉隆振威將軍宋登射聲校尉王常發㑹稽丹陽九江六安四郡兵擊李憲圍憲於舒歳餘城中食盡乃攻之遂屠舒斬李憲追擊其黨與盡平江淮地九年代來歙守中郎將率武威將軍劉尚等破河池遂平武都河池今鳳州縣一名仇池劉隆建武四年以誅虜將軍討李憲平之十七年以中郎將副伏波將軍馬援擊交趾蠻夷徴側等隆别於禁谿口破之交趾郡麊泠縣有金溪宂相傳音訛謂之禁溪側等所敗處也其地今岑州新昌縣也麊音麋泠音零獲其帥徴貳徴側之妹斬首千餘級降者二萬餘人傅俊建武三年以積弩將軍與征南大將軍岑彭擊破秦豐因將兵徇江東楊州悉定堅鐔建武元年以揚化將軍與諸將攻雒陽而朱鮪别將守東城者為反間私約鐔晨開上東門上東門雒陽故城東靣北頭第一門鐔與建義大將軍朱祐乘朝而入與鮪大戰武庫下雒陽建始殿東有大倉倉東有武庫藏兵之所殺傷甚衆至旦食乃罷朱鮪繇是遂降又别擊内黄平之馬武建武四年以騎都尉與虎牙將軍蓋延等討劉永武别擊濟隂下成武楚丘拜捕虜將軍明年龎萌反攻桃城武先與戰破之李通建武六年以前將軍領破姦將軍侯進捕虜將軍王霸等十營擊漢中賊公孫述遣兵救通等與戰於西城破之王常建武二年以漢忠將軍北擊河間漁陽平諸屯聚五年秋攻㧞湖陵又别率騎都尉王霸共平沛郡賊苖虚也七年為横野大將軍别擊破隗囂將髙峻於朝那縣名屬安定郡囂遣將遏烏氏常要擊破之轉降保塞羌諸營壁皆平之九年擊内黄賊破之來歙建武八年以中郎將與征虜將軍祭遵襲隗囂之略陽遵道病還分精兵隨歙合二千餘人伐山開道從畨須回中畨音盤畨須回中並地名徑至略陽徑直也斬隗囂守將金梁因保其城及隗囂平詔歙率征西大將軍馮異建威大將軍耿弇虎牙大將軍蓋延揚武將軍馬成武威將軍劉尚入天水擊破公孫述將田弇趙匡明年攻拔落門聚名隗囂之黨周宗趙恢及天水屬縣皆降歙又率蓋延劉尚及大中大夫馬援等進擊羌於金城大破之斬首虜數千人獲牛羊萬餘頭榖數十萬斛竇融建武六年以河西大將軍率諸郡守將兵入金城初更始時先零羌封何諸種殺金城太守居其郡隗囂使使賂遺封何與共結盟欲發其衆融等因軍出進擊封何大破之斬首千餘級得牛馬羊萬頭榖數萬斛因並河揚威武並音蒲浪切伺候車駕時大兵未進融乃引還王霸建武八年以討虜將軍屯函谷闗擊滎陽中牟盜賊皆平之十年與呉漢等四將軍六萬人出髙柳擊賈覽詔霸與漁陽太守陳訢將兵為諸軍鋒匈奴左南將軍將數千騎救覽霸等連戰於平城下破之追出塞斬首數百級張宗為大中大夫建武八年潁川桑中盜賊羣起宗將郡兵擊定之後青冀盜賊屯聚山澤宗以謁者督諸郡兵討平之十六年琅邪北海盜賊復起宗督二郡兵討之乃設方略明購賞皆悉破散於是沛楚東海臨淮羣賊懼其威武相捕斬者數千人青徐震慄劉尚建武九年以武威將軍從征西大將軍馮異入天水擊公孫述將田弇等明年與中郎將來歙擊羌於金城大破之十八年夷渠帥揀蠶與姑復楪榆梇棟連然滇池建怜昆明諸種反叛殺長吏益州太守繁勝與戰而敗退保朱提十九年遣尚發廣漢犍為蜀郡人及朱提夷合萬三千人擊之尚軍遂度瀘水入益州界羣夷聞大兵至皆棄壘奔尚獲其羸弱榖畜二十年進兵與揀蠶等連戰數月皆破之明年正月追至不韋斬揀蠶帥凡首虜七千餘人得生口五千七百人馬三千匹牛羊三萬餘頭諸夷悉平馬援建武十一年以隴西太守發歩騎三千人擊破先零羌於臨洮斬首數百級獲牛馬羊萬餘頭守塞諸羌八千餘人詣援降諸種有數萬屯聚寇鈔拒浩亹隘援與揚武將軍馬成擊之羌因將其妻子輜重移阻於允吾谷援乃潜行間道掩赴其營羌大驚潰復逺徙唐翼谷口援復追討之羌引精兵聚北山上援陳軍向山而分遣數百騎繞襲其後乘夜放火擊鼔呌譟虜遂大潰凡斬首千餘級援以兵少不得窮追收其榖糧畜産而還十三年武都參狼羌與塞外諸種為寇殺長吏援將四千餘人擊之至氐道縣羌在山援軍據便地奪其水草不與戰羌遂窮困豪帥數十萬户亡出塞諸種萬餘人悉降於是隴右清靜十七年交趾女子徴側及女弟徴貳反攻沒其郡九真日南合浦蠻夷皆應之寇略嶺外六十餘城側自立為王於是璽書拜援伏波將軍以扶樂侯劉隆為副督樓船將軍段志等南擊交趾軍至合浦而志病卒詔援并將其兵遂緣海而進隨山刋道千餘里刋除也十八年春軍至浪泊上與賊戰破之斬首數千級降者萬餘人援追徴側等至禁谿數敗之賊遂散去明年正月斬徴側徴貳傳首洛陽又將樓船大小二千餘艘戰士二萬餘人進擊九真賊徴側餘黨都羊等自無功至居風無功居風二縣並屬九真郡居風今愛州斬獲五千餘人嶠南悉平援至交趾立銅柱為漢之極界也二十五年春擊武陵五溪蠻夷至臨鄉屬武陵遇賊攻縣援迎擊破之斬獲二千餘人皆散走入竹林中竇固明帝永平十五年以奉車都尉與騎都尉耿忠屯凉州明年固與忠率酒泉敦煌張掖甲卒及盧水羌胡萬二千騎出酒泉塞至天山即祁連山也在西州交河縣東擊呼衍王斬首千餘級呼衍王走追至蒲類海今名婆悉海在庭州蒲昌縣東南明年復出玉門擊西域固遂破白山降車師耿秉永平十七年以駙馬都尉與奉車都尉竇固合兵萬四千騎出白山擊車師後王縱兵抄掠斬首數千級收馬牛十餘萬頭後王安得震怖從數百騎出迎秉其前王亦歸命遂定車師而還章和二年以征西將軍副車騎將軍竇憲擊北匈奴大破之封美陽侯馬防為城門校尉章帝建初二年金城隴西保塞羌皆反拜防行車騎將軍事以長水校尉耿恭副將北軍五校兵及諸郡積射士三萬人擊之軍到冀而羌豪布橋等圍南部都尉於臨洮防欲救之臨洮道險車騎不得方駕防乃别使兩司馬將數百騎分為前後軍去臨洮十餘里為大營多樹幡幟揚言大兵旦當進羌候見之馳還言漢兵盛不可當明旦遂鼓譟而前羌虜驚走因追擊破之斬首虜四千餘人遂解臨洮圍防開以恩信燒當種皆降唯布橋等三萬餘人在臨洮西南望曲谷十二月羌又敗耿恭司馬及隴西長史於和羅谷死者數百人明年春防遣司馬夏駿將五千人從大道向其前潜遣司馬馬彭將五千人從間道衝其心腹又令將兵長史李調等將四千人繞其西三道俱擊復破之斬獲千餘人得牛羊十餘萬頭羌退走夏駿追之反為所敗防乃引兵與戰於索西又破之索西縣名在岷州和政縣東亦名臨洮東城布橋迫急將種人萬餘降還拜車騎將軍班超建初八年以將兵長史假鼓吹幢麾鎮西域鼓吹幢麾皆大將所有超非大將故云假後四年超發于窴諸國兵二萬五千人擊莎車追斬五千餘級大獲其馬畜財物莎車遂降威震西域永元三年以超為都䕶六年秋超遂發龜兹鄯善等八國兵合七萬人及吏士賈客千四百人討焉耆焉耆王廣尉黎王汎及北鞬支等三十人詣超降超收廣汎等於陳睦故城斬之傳首京師因縱兵鈔掠斬首五千餘級獲生口萬五千人馬畜牛羊三十餘萬頭更立右侯元孟為焉耆王超留焉耆半歳慰撫之於是西域五十餘國悉皆納貢内屬焉明年封超為定逺侯邑千户張紆章和元年以隴西太守代𫝊育為䕶羌校尉將萬人屯臨羌是時迷吾既殺傅育狃伏邊利復與諸種歩騎七千人入金城塞紆遣從事司馬防將千餘騎及金城兵㑹戰於大乘谷迷吾兵敗走因譯使欲降紆納之遂將衆人詣臨羌縣紆設兵大㑹施毒酒中羌飲醉紆因自擊伏兵起誅殺酋豪八百餘人斬迷吾等五人頭以祭育冡復故兵擊在山谷間者斬首四百餘級得生口二千餘人竇憲和帝永元元年以車騎將軍與執金吾耿秉各將四千騎及南匈奴左谷蠡王師子師子其名萬騎出朔方鷄鹿塞南單于屯屠河屯屠河單于名將萬餘騎出滿夷谷度遼將軍鄧鴻禹少子及緣邊義從羌胡八千騎與左賢王安國萬騎出㧽陽塞㧽音固在五原郡皆㑹涿邪山憲分遣副校尉閻盤司馬耿譚耿䕫將左谷蠡王師子右呼衍王須訾等今呼延姓是其後須訾名也精騎萬餘與北單于戰於稽落山大破之虜衆奔潰單于遯走追擊諸部遂臨私渠北鞮海匈奴中海名也斬名王已下萬三千級獲生口馬牛羊橐駝百餘萬頭於是温犢須日逐温吾夫渠王柳鞮等八十一部率衆降者前後二十餘萬憲與耿秉遂登燕然山刻石勒功而還詔拜憲大將軍耿䕫永元三年以大將軍左校尉將精騎八百出居延塞直奔北單于庭于金微山斬閼氏名王已下五千餘級單于與數騎脱亡盡獲其匈奴珍寶財畜去塞五千餘里而還自漢出師所未嘗至也乃封䕫粟邑侯故城在今同州白水西北永初三年南單于檀反畔䕫以遼東太守率鮮卑及諸郡兵屯鴈門與車騎將軍何熈共擊之熈推䕫為先鋒而遣其司馬耿溥劉祉將二千人與䕫俱進到屬國故城單于遣薁鞬日逐王三千餘人遮漢兵䕫自擊其左令鮮卑攻其右虜遂敗走追斬千餘級殺其名王六人獲穹廬車重千餘兩馬畜生口甚衆梁慬殤帝延平元年以西域副校尉行至河西㑹西域諸國反叛攻都䕶任尚於疏勒尚上書求救詔慬將河西四郡羌胡五千騎馳赴之慬未至而尚已得解㑹徴尚還以騎都尉叚禧為都䕶西域長史趙博為騎都尉禧博守它乾城它乾城小慬以為不可固乃譎説龜茲王白霸欲入共保其城白霸許之吏人固諌白霸不聽慬既入遣將急迎禧博合軍八九千人龜茲吏人並叛其王而與温宿姑墨數萬兵反共圍城慬等出戰大破之連兵數月胡衆敗走乘勝追擊凡斬首萬餘級獲生口數千人駱駝畜產數萬頭龜茲乃定二年春還至燉煌㑹衆羌反叛朝廷大發兵西擊之逆詔慬留為諸軍援慬至張掖日勒羌諸種萬餘人攻亭候殺畧吏人慬進兵擊大破之乘勝追至昭武虜遂散走其能脱者十二三及至姑臧羌大豪三百餘人詣慬降並慰譬遣還故地河西郡復安慬受詔當屯金城聞羌轉寇三輔廹近園陵即引兵赴擊之轉戰武功美陽闗縣名在武功縣北慬臨陣被創不顧連破走之盡還得所掠生口獲馬畜財物甚衆羌遂奔散朝廷嘉之數璽書勞勉委以西方事令為諸軍節度三年詔慬行度遼將軍事與中郎將龎雍共擊匈奴薁鞬日逐王破之鄧遵為度遼將軍安帝元初六年秋鮮卑人馬城塞殺長吏遵發積射士三千人及中郎將馬續率南單于與遼西右北平兵馬㑹出塞追擊鮮卑大破之獲生口及牛羊財物甚衆馬賢為䕶羌校尉永寧元年上郡沈氐種羌五千餘人復寇張掖賢與戰破之斬首千八百級獲生口千餘人牛馬羊以萬數餘虜悉降時當煎種大豪饑五等以賢兵在張掖乃乘虛寇金城賢還軍追之出塞斬首數千級而還燒當燒何種聞賢軍還率二千餘人復寇張掖殺長吏初饑五同種大豪盧忽忍良等千餘户别留允而首施首施猶首䑕也兩端建光元年春賢率兵召盧忽斬之因放兵擊其種人首虜二千餘人掠馬牛羊十萬頭忍良等皆亡出塞璽書封賢安亭侯食邑千户陽嘉三年種羌良封等寇隴西漢陽詔拜賢為謁者鎮撫諸種校尉馬續遣兵擊良封斬首千八百級獲馬牛羊五萬餘頭良封親屬並詣賢降賢復進擊羌且吕且吕等率諸種十餘萬詣凉州刺史降班勇延光二年以西域長史將兵五百人出屯柳中明年正月勇至樓蘭以鄯善歸附特加三綬而龜茲王白英猶自疑未下勇開以恩信白英乃率姑墨温宿自縳詣勇降勇因發其兵歩騎萬餘人到車師王前庭擊走匈奴伊蠡王於伊和谷收得前部五千餘人於是前部始復開通還屯田柳中四年秋勇發敦煌張掖酒泉六千騎及鄯善疏勒車師前部兵擊後部王軍就軍就名也大破之首虜八千餘人馬畜五萬餘頭捕得軍就及匈奴持節使者將至索班沒處斬之以報其恥元初六年敦煌太守曹宗遣長史索班將千餘人屯伊吾數月北單于與車師後部攻没班傳首京師永建元年更立後部故王子加特奴為王勇又使别校誅斬東且彌王亦更立其種人為王且音子佘反於是車師六國悉平其冬勇發諸國兵擊匈奴呼衍王呼衍王亡走其衆二萬餘人皆降捕得單于從兄勇使加特奴手斬之以結車師匈奴之隙北單于自將萬餘騎入後部至金且谷勇使假司馬曹俊馳救之單于引去俊追斬其貴人骨都侯於是呼衍王遂徙居枯梧河上是後車師無復虜跡城郭皆安耿曅為烏桓校尉順帝永建二年遼東鮮卑六千餘騎寇遼東𤣥菟曅發緣邊諸郡兵及烏桓率衆王出塞擊之斬首數百級大獲其生口牛馬什物鮮卑乃率種衆三萬人詣遼東乞降張奐桓帝永夀元年為屬國都尉初到職而南匈奴左薁鞬臺耆且渠伯徳等七千餘人寇美稷東羌復舉種應之奐進屯長城收集兵士遣將王衛招誘東羌據龜茲共擊薁鞬等連戰破之伯德惶恐將其衆降郡界以寧延熹元年鮮卑寇邊奐率南單于擊之斬首數百級後為度遼將軍數載間幽并清靜九年春徴拜大司農鮮卑聞奐去遂招結南匈奴烏桓數道入塞或五六千騎或三四千騎寇掠縁邊九郡殺畧百姓秋鮮卑復率八九千騎入塞誘引東羗與共盟詛於是上郡沈氐安定先零諸種共寇武威張掖緣邊大被其毒朝廷以為憂復拜奐為䕶匈奴中郎將以九卿秩督幽并凉三州及度遼烏桓二營明帝置度遼將軍屯五原曼柏縣漢營官儀烏桓校尉屯上谷甯縣故曰二兼察刺史二千石能否賞賜甚厚匈奴烏桓聞奐至因相率還降凡二十萬口奐但誅其首惡餘皆慰納之唯鮮卑出塞去永康元年春東羌先零五六千騎寇闗中圍祋祤掠雲陽夏復攻沒兩營殺千餘人冬羌岸尾麾蟞等蟞音必薛反脅同種復鈔三輔奐遣司馬尹端董卓並擊大破之斬其酋豪首虜萬餘人三州清定段熲字紀明永壽二年以中郎將擊琅邪賊東郭竇公孫舉等三萬人大破斬之獲首萬餘級餘黨皆降散封紀明為列侯延熹二年遷䕶羌校尉㑹燒當燒何當煎勒姐等八種羌姐紫且反寇隴西金城塞紀明將兵及湟中義從羌萬二千騎出湟谷擊破之追討南渡河使軍吏田晏夏育募先登懸索相引復戰於羅亭大破之斬其酋豪以下二千級獲生口萬餘人虜皆奔走明年春餘羌復與燒何大豪寇張掖攻沒鉅鹿塢殺屬國吏民又招同種千餘落并兵晨奔紀明軍紀明下馬大戰至日中刀折矢盡虜亦引退紀明追之且鬬且行晝夜相攻割肉食雪四十餘日遂至河首積石山出塞二千餘里斬燒何大帥首虜五千餘人又分兵擊石城羌斬首溺死者千六百人燒當種九千餘口詣紀明降又雜種羌屯聚白石紀明復進擊首虜三千餘人冬勒姐零吾種圍允街殺畧吏民紀明排營救之斬獲數百人五年遷并州刺史滇那等諸種羌五六千人寇武威張掖酒泉燒人廬舍六年寇勢轉盛凉州㡬亡冬復以紀明為䕶羌校尉乘驛之職七年春羌封僇良多滇那等僇良遂反又力救反酋豪三百五十五人率三千落詣紀明降當煎勒姐種猶自屯結冬紀明將萬餘人擊破之斬其酋豪首虜四千餘人八年春復擊勒姐種斬首四百餘級降者二千餘人夏進軍擊當煎種於湟中紀明兵敗被圍三日用隱士樊志張䇿潜師夜出鳴鼓還戰大破之首虜數千人紀明遂窮追展轉山谷間自春及秋無日不戰虜遂饑困敗散北畧武威間紀明凡破西羌斬首二萬三千級獲生口數萬人馬牛羊八百萬頭降者萬餘落封紀明都鄉侯邑五百户永康元年當煎諸種復反合四千餘人欲攻武威紀明復追擊於鸞鳥大破之殺其渠帥斬首三千餘級西羌於此弭定建寧元年春紀明將兵萬餘人齎十五日糧從彭陽直指髙平與先零諸種戰於逢義山虜兵盛紀明衆恐乃令軍中張鏃利刃長矛三種挾以彊弩列輕騎為左右翼激怒兵將曰今去家數千里進則事成走必盡死弩力共功名因大呼衆皆應聲騰赴紀明馳騎於傍突而擊之虜衆大潰斬首八千餘級獲馬牛羊二十八萬頭夏紀明復追羌出橋門谷名至走馬水上尋聞虜在奢延澤即上郡奢延縣界乃將輕兵兼行一日一夜二百餘里晨及賊擊破之餘虜走向落川復相屯結紀明乃分遣騎司馬田晏將五千人出其東假司馬夏育將二千人繞其西羌分六七千人攻圍晏等與戰羌潰走紀明急進與晏等共追之於令鮮水上水名在甘州張掖界縣士卒饑渴乃勒衆推方奪其水推方謂方頭競進也虜復走紀明遂與相連綴且鬬且引及於靈武谷靈武縣名有谷紀明乃被甲先登士卒無敢後者羌遂大敗棄兵而走追之三日三夜士皆重繭繭足下傷起形如繭既到涇陽餘寇四千落悉散入漢陽山谷間二年詔遣謁者馮禪説降漢陽散羌紀明以春農百姓布野羌雖暫降而縣官無廪必當復為盜賊不如乘虚放兵勢必殄滅夏紀明自進營去羌所屯凡亭山四十五里遣田晏夏育將五千人據其山上羌悉衆攻之厲聲曰田晏夏育在此不湟中義從羌悉在何靣今日欲決死生軍中恐晏等勸激兵士殊死大戰遂破之羌衆潰東奔復聚射虎谷分兵守諸谷上下門紀明規一舉滅之不欲復令散走乃遣千人於西縣結木為柵廣二十歩長四十里遮之西縣屬天水郡分遣晏育等將七千人銜枚夜上西山結營穿塹去虜一里許又遣司馬張愷等將三千人上東山虜乃覺之遂攻晏等分遮汲水道紀明自率歩騎進擊水上羌却走因與愷等挾東西山縱兵擊破之羌復敗紀明追至谷上下門窮山深谷之中處處破之斬其渠帥以下萬九千級獲牛馬騾驢氊裘廬帳什物不可勝數馮禪等所招降四千人分置安定漢陽隴西三郡於是東羌悉平凡百八十戰斬三萬八千六百餘級獲牛馬羊騾驢駱駝四十二萬七千五百餘頭費用四十四億軍士死者四百餘人更封新豐縣侯邑萬户皇甫規延熹四年以中郎將持節監闗西兵討叛羌零吾等破之斬首八百級先零諸種羌慕規威信相勸降者十餘萬皇甫嵩靈帝中平元年以左中郎將持節與右中郎將朱雋共發五校三河騎士及募精兵四萬人嵩儁各統一軍共討潁川黄巾大破之斬首數萬級封嵩都鄉侯嵩儁乘勝進討汝南陳國黄巾追波才於陽翟擊彭脱於西華並破之餘賊降散三郡悉平又進擊東郡黄巾卜已於倉亭生禽卜已斬首七萬餘級是時北中郎將盧植東中郎將董卓討張角並無功而還乃詔嵩進兵討之嵩與張角弟梁戰於廣宗今具州宇城縣梁衆精勇嵩不能尅明日乃閉營休士以觀其變知賊意稍懈乃濳夜勒兵雞鳴馳赴其陳戰至晡時大破之斬梁獲首三萬級赴河死者五萬許人焚車重三萬餘兩悉虜其婦子擊獲甚衆角先已病死乃剖棺戮屍傳首京師嵩復與鉅鹿太守馮翊郭典攻角弟寶於下曲陽又斬之斬獲十餘萬人築京觀於城南即拜嵩為左車騎將軍領冀州牧封槐里侯百姓歌曰天下亂兮市為墟母不保子兮妻失夫賴得皇甫兮復安居朱雋中平元年以右中郎將持節與左中郎將皇甫嵩討潁川汝南陳國諸賊悉破平之封西鄉侯遷鎮賊中郎擊南陽黄巾趙引于宛斬之賊餘帥韓忠復據宛雋又擊大破之乘勝逐北數十里斬首萬餘級忠等遂降而南陽太守秦頡積忿忠遂殺之餘衆懐不自安復以孫夏為帥還屯宛中雋急攻之夏走追至西鄂精山又破之西鄂故城在鄧州向城縣南精山在其南復斬萬餘級賊遂解散明年使者持節拜雋右車騎將軍公孫瓚中平中以遼東屬國長史督烏桓突騎將軍張温討凉州賊㑹烏桓反畔與賊張純等攻擊薊中瓚率所領追討純等有功累遷騎都尉降虜校尉初平二年青徐黄巾三十萬衆入勃海界欲與黒山合瓚率歩騎二萬人擊於東光南大破之斬首三萬餘級賊棄其車重數萬兩奔走渡河瓚因半濟薄之賊復大破死者數萬流血丹水收得生口七萬餘人車甲財物不可勝筭威名大震拜奮武將軍封薊侯魏龎徳漢建安中以校尉從馬騰征伐太祖討袁譚於黎陽譚遣郭援髙幹等畧取河東太祖使鍾繇率闗中諸將討之徳隨騰子超拒援幹於平陽徳為軍鋒進攻援幹大破之親斬援首拜中郎將封都亭侯後張白騎叛于𢎞農徳復隨騰征之破白騎於兩殽間後為立義將軍封闗門亭侯音衛開等以宛叛徳將所領與曹仁共攻拔宛斬之郭淮漢延康元年行征羌䕶軍左將軍張郃冠軍將軍楊秋討山賊鄭甘盧水叛胡皆破平之闗中乃定民得安業黄初五年為真安定羌大帥辟蹏反討破降之滿寵延康元年以揚武將軍破呉於江陵有功更拜伏波將軍樂進為陷陣都尉從擊吕布於濮陽張超於雍丘橋㽔於苦皆先登有功封廣昌亭侯文聘黄初元年以討逆將軍假節與夏侯尚圍江陵使聘别屯沔口止石梵自當一隊禦賊有功遷後將軍封新野侯孫權以五萬衆自圍聘于石陽甚急聘堅守不動權住二十餘日乃解去聘追擊破之田豫為䕶烏丸校尉山賊髙艾衆數千人寇鈔為幽冀害豫誘使鮮卑素利部斬艾傳首京都封豫長樂亭侯加殄夷將軍太和六年帥衆討呉將周賀於成山遂殺賀夏侯尚黄初三年為征南將軍領荆州刺史時車駕幸宛使尚率諸軍與曹真共圍江夏呉將諸葛瑾與尚軍對江瑾渡入江中渚而分水軍于江中尚夜多持油船將歩騎萬餘人於下流濳渡攻瑾諸軍夾江燒其舟船水陸並攻破之王淩黄初中以兖州刺史與張遼等至廣陵討呉臨江夜大風呉將吕範等船漂至北岸淩與諸將逆擊捕斬首虜獲舟船有功正始初為征東將軍假節鉞都督揚州諸軍事二年呉大將全琮數萬衆寇芍陂淩率諸軍逆討與賊爭牛塘力戰連日賊退走進封南鄉侯張郃明帝即位初以左將軍南屯荆州與司馬宣王擊呉别將劉阿等追至祁口交戰破之諸葛亮出祁山加郃位特進遣督諸軍拒亮將馬謖於街亭謖依阻南山不下據城郃絶其汲道擊大破之南安天水安定郡反應亮郃皆破平之又破隴西名羌唐阨於抱罕加建威將軍徐邈明帝時為䕶羌校尉蜀相諸葛亮出祁山隴右三郡反邈輒遣參軍及金城太守等擊南安賊破之以討叛羌柯吾有功封都亭侯母丘儉青龍中以度遼將軍隨司馬宣王率數萬討公孫淵定遼東以功進封安邑侯正始中儉以髙句驪數侵叛督諸軍歩騎萬人出𤣥菟從諸道討之句驪王宫將歩騎二萬人進軍沸流水上大戰梁口梁音渇宫連破走儉遂束馬懸車以登丸都屠句驪所都斬獲首虜以千數宫將妻子逃竄奔沃沮六年復進師擊之沃沮邑落皆破之斬獲首虜以千餘級宫奔北沃沮王昶齊王嘉平二年以征南將軍詣江陵兩岸引竹絙為橋渡水擊呉賊賊奔南岸鑿七道並來攻於是昶使積弩同時俱發賊大將施績夜遁入江陵城追斬數百級遷征南大將軍王基嘉平二年以揚烈將軍荆州刺史隨征南王昶擊呉基别襲歩協於夷陵協閉閣自守基示以攻形而實分兵取雄父邸閣收米三十餘萬斛虜安北將軍譚正納降數千口賜爵闗内侯鄧艾髙貴鄉公甘露二年以鎮西將軍都督隴右諸軍事拒蜀將姜維於長城維退還遷征西將軍景元三年又破維於侯和維却保畓中四年秋詔諸軍征蜀大將軍司馬文王皆指授節度使艾與維相綴連雍州刺史諸葛緒要維令不得歸艾遣天水太守王頎等直攻維營隴西太守牽𢎞等邀其前金城太守楊欣等詣甘松維聞鍾㑹諸軍已入漢中引退還欣等追躡於强川口大戰維敗走聞雍州已塞道屯橋頭從孔函谷入北道欲出雍州後諸葛緒聞之却還三十里維入北道三十餘里聞緒軍却尋還從橋頭過緒趨截維較一日不及維遂東引還守劒閣冬十月艾自隂平道行無人之地七百餘里鑿山通道造作橋閣山髙谷深至為艱險又糧運將匱頻于危殆艾以氊自裹推轉而下將士皆攀木緣崖魚貫而進先登至江油蜀守將馬邈降蜀衛將軍諸葛瞻自涪還緜竹列陣待艾艾遣子惠唐亭侯忠等出其右司馬師纂等出其左忠纂戰不利並退還曰賊不可擊艾怒曰存亡之分在此一舉何不可之有乃叱忠纂出將斬之忠纂馳還更戰大破之斬瞻及尚書張遵等首進軍到雒劉禪遣使奉皇帝璽綬為箋詣艾請降詔以艾為太尉増邑二萬户鍾㑹陳留王景元四年以鎮西將軍統十萬衆攻蜀兵至劍閣時鄧艾追姜維到隂平簡選精鋭欲從漢徳陽入江油左儋道詣緜竹趣成都與諸葛緒共行緒以奉受節度邀姜維西行非本詔遂進軍前向白水與㑹合㑹遣將軍田章等從劒閣西徑出江油未至百里章先破蜀伏兵三校艾使章先登遂長驅而前劉禪詣艾降蜀皆平蜀諸葛亮後主建興三年春以丞相領益州牧率衆征南中諸郡其秋悉平遂至滇池皆即其渠帥而用之六年冬出散闗圍陳倉魏將曹真拒之亮糧盡而還魏將王雙率騎追亮亮與戰破之斬雙七年亮遣陳式攻武都隂平魏雍州刺史郭淮率衆欲擊式亮自出至建威淮退還遂平二郡李恢為庲降都督建興三年丞相諸葛亮南征恢與亮聲勢相連南土平定恢軍功居多封漢興亭侯加安漢將軍還南夷復叛殺害守將恢身往撲討鉏盡惡類徙其豪帥於成都張嶷建興五年以都尉將兵討廣漢緜竹山賊張慕等嶷身率左右因斬慕等五十餘級渠賊悉殄尋其餘類旬日清泰其後為牙門將受兵三百人隨馬忠討叛羌至他邑里或迎軍出降或奔竄山谷放兵攻擊軍以克捷十一年南夷劉胃反馬忠督庲降討胃嶷復屬馬忠遂斬胃平南事訖牂牁與古獠種復反忠令嶷領諸營往討嶷内招降得二千人悉詣漢中魏延建興八年以丞相司馬領凉州刺史時諸葛亮使延西入羌中魏後將軍費瑶雍州刺史郭淮與延戰于陽谿大破淮等遷為前軍征西大將軍假節進封南鄭侯馬忠建興十一年代張翼為庲降都督討南夷豪帥劉胃斬之平南土遷奮威將軍封博陽亭侯先是建寧郡殺太守王昂縳太守張裔於呉故都督常駐平夷縣至忠乃移治味縣處民夷之間又越嶲郡亦久失土地忠率太守張嶷開復舊郡繇此就加安南將軍封彭鄉亭侯王平建興十二年以討虜將軍領丞相諸葛亮叅軍統五部事亮卒於武功軍退還征西大將軍魏延作亂一戰而敗平之功也姜維延熹十年以衛將軍率衆討㳊山平康夷定之十七年加都督中外諸軍事復出隴西守狄道長李簡舉城降進圍襄武與魏將徐質交鋒斬首破敵魏軍敗退維乘勝多所降下抜河間狄道臨洮三縣民十八年復與車騎將軍夏侯霸等俱出狄道大破魏雍州刺史王經於洮西經衆死者數萬人霍弋景曜六年為安南將軍于時蜀并於魏弋遂降拜南中都督委以本任後遣將兵救援吕興平交趾日南九真三郡功封列侯呉朱然為臨川太守授兵二千人㑹山賊盛起然平討旬月而定漢建安二十四年從大帝討闗羽别與潘璋到臨沮禽羽遷昭武將軍黄武元年劉備攻宜都然别攻破備前鋒斷其後道備遂破走赤烏九年以車騎將軍右䕶軍復征魏柤中柤音租在上黄界去襄陽一百五十里魏將李興等聞然深入率歩騎六千斷然後道然夜出逆之軍以勝返吕據黄龍初以安軍中郎將數討山賊諸深惡劇地所擊皆破隨太常潘濬討五谿復有功朱然攻樊據與朱異破城外圍還拜偏將軍右將軍魏出東興據赴討有功孫峻殺諸葛恪遷為驃騎將軍平西宫事五鳳二年假節與峻等襲壽春還遇魏將曹真破之於髙亭潘濬為輔軍中郎將為荆州治中時武陵部從事樊伸誘導諸夷圖以武陵屬蜀濬將兵五千斬平之黄龍中以太常假節督諸軍討五谿蠻夷斬首獲生蓋以萬數自是羣蠻衰弱一方寧静吕岱嘉禾三年以鎮南將軍屯蒲圻四年廬陵賊李桓路合㑹稽東治賊隨春南海賊羅厲等一時並起詔岱督劉纂唐咨等分部討擊春即時首降桓厲等皆見斬獲傳首詣都後領荆州督蒲圻頃之廖式作亂攻圍城邑零陵蒼梧鬱林諸郡搔擾岱自表輒行星夜兼路遣諸將唐咨等絡繹相繼攻討一年破之斬式及遣諸偽署臨賀太守費揚等并其支黨郡縣悉平呉粲嘉禾五年以中郎將與將軍唐咨討廬陵賊李桓羅厲等平之粲獲李桓咨獲羅厲等陸遜嘉禾五年以上大將軍與諸葛瑾攻魏襄陽斬首獲生凡千餘人陸凱赤烏中為儋耳太守討朱崖斬獲有功遷建武校尉五鳳二年討山賊陳毖於零陵斬毖克捷拜巴丘督偏將軍朱異赤烏四年以騎都尉隨朱然攻魏樊城建計破其外圍還拜偏將軍廬江太守文欽營往六安多設屯砦置諸道要以招誘亡叛為邊寇害異乃身率二千人掩破欽七屯斬首數百遷揚武將軍建興元年遷鎮南將軍是歳魏遣胡遵諸葛誕等出東興異督水軍攻浮梁壞之魏軍大破諸葛恪廢帝建興元年以太𫝊㑹衆於東興更作大隄左右結山峽築兩城魏以呉軍入其疆土恥于受侮命大將胡遵諸葛誕等率衆七萬欲攻圍兩塢圖壊隄遏恪恪興軍四萬晨夜赴救遣將軍劉贊吕據唐咨丁奉為前部鼔譟亂斫魏軍驚擾死者萬數獲車乘牛馬驢騾各數千資器山積振旅而歸加荆揚州牧督中外諸軍事丁奉為􅃣軍將軍建興元年魏遣諸葛誕胡遵等攻東興諸葛恪率軍拒之奉與將軍唐咨吕據劉贊等俱從山西上奉縱兵斫之大破敵前屯㑹據等至魏軍遂潰遷滅寇將軍魏將文欽來降以為虎威將軍從孫峻至壽春迎之與敵追軍戰於髙亭奉跨馬持矛突入其陣中斬首數百獲其軍器進封安豐侯太平二年魏大將軍諸葛誕據壽春來降魏大圍之遣朱異唐咨等往救復使奉與黎斐解圍奉為先登屯於黎漿力戰有功拜左將軍陸抗建興二年拜奮威將軍太平二年魏將諸葛誕舉壽春降拜扤為柴桑督赴壽春破魏牙門將偏將軍遷征北將軍虞汜為散騎中常侍永安初以討扶嚴功拜交州刺史冠軍將軍鍾離牧永安六年以平魏將軍領武陵太守時蜀并于魏武陵五谿夷與蜀接界魏遣漢復縣長郭純試守武陵太守率涪陵民入蜀遷陵界屯于赤沙誘致諸夷邑君或起應純又進攻酉陽縣郡中震懼牧即率所領晨夜進道緣山險行垂二千里從塞上斬惡民懷異心者魁帥百餘人及其支黨凡千餘級純等散五谿平遷公安督揚武將軍封都鄉侯薛珝後主建衡元年以為南將軍與監軍虞汜蒼梧太守陶璜等擊交趾三年汜璜破交趾禽殺晉所置守將九真日南皆還屬册府元龜卷三百四十九
