body:
  text: 册府元龜卷五百八十一宋王欽若等撰掌禮部奏議第九後魏常景宣武正始初為太常博士時髙肇尚平陽公主未幾主薨肇欲使公主家令居廬制服付禮官議正施行尚書又以訪景景以婦人無專國之理家令不得有純臣之義乃執議曰喪紀之本實稱物以立情輕重所因亦緣情以制禮雖理闗盛衰事經今古而制作之本降殺之宜實一焉是故臣之為君所以資敬而崇重為君母妻所以從服而制義然而諸侯大夫之為君者謂其有地土有吏屬無服文者言其非世爵也今王姬降適雖加爵命事非君邑理異列土何者諸王開國僃立臣吏生有趨奉之勤死盡致喪之禮而公主家令惟有一人其丞已下命之屬官既無接事之儀實闕為臣之體原夫公主之貴所以立家令者葢以主之内事脫或須闗外事理無自達必也因人然則家令惟通内外之職及典主家之事耳無闗君臣之理名義之分也繇是推之家令不得為純臣公主不可為正君明矣且女人之為君男子之為臣古禮所不載先朝所未議而四門博士裴道廣孫榮仁等以公主為之君以家令為之臣制服以斬乖繆彌甚又張虗景吾難覊等不推君臣之分不尋制服之情猶同其議准母制齊求之名實理未為允竊謂公主之爵既非食采之君家令之官又無純臣之式若附如母則情義㒺施若凖小君則從服無據按如經禮事無成文即之愚見謂不應服朝廷從之袁翻正始中為尚書殿中郎是時修明堂辟雍翻議曰謹按明堂之義今古諸儒論之僃矣異端競搆莫適所歸故不復逺引經傳傍採紀籍以為之證且論意之所同以詶詔㫖耳葢唐虞已上事難該悉夏殷已降較可知之謂典章之極莫如三代郁郁之盛從周斯美制禮作樂典刑在焉遺風餘烈垂之不朽按周官考工所記其時事具論夏殷名制豈其紕繆是知明堂五室三代同焉配帝像行義則明矣及淮南吕氏與月令同文雖布政班時有堂个之别然推其體則無九室之證既而世衰禮壊法度淆弛正義殘隠妄説斐然明堂九室著自戴禮探緒求源㒺知所出而漢世因之自欲為一代之法故鄭𤣥云周人明堂五室是帝一室也合於五行之數周禮依數以為之室禮行於今雖有不同時說昞然本制著存而言無明文欲復何責本制著存是周五室也於今不同是漢異周也漢為九室略可知矣但就其此制猶竊有懵焉何者張衡東京賦云乃營三宫布教班常複廟重屋八達九房此乃明堂之文也而薛綜注云房室也謂堂後有九室之制非臣異乎裴頠又云漢氏作四維之箇不能令各處其辰就使其像可圖莫能通其居用之禮此為設虗噐也甚矣漢世徒欲削滅周典損棄舊章改物剙制故不復拘於載籍且鄭𤣥之詁訓三禮及釋五經異義並盡思窮神故得之逺矣覽其明堂圖義皆有悟人意察察著明確乎難奪諒足以狀微顯幽不墜周公之舊法也伯喈損益漢制章句繁雜既違古背新又不能易𤣥之妙矣魏晉書紀亦有明堂祀五帝之文而不記其經始之制又無坦然可准觀夫今之基跡猶或髣髴髙卑廣狹頗與戴禮不同何得以意抑必便謂九室可明且三雍異所復乖盧蔡之義進退亡據何用經通晉朝亦以穿鑿難明故有一屋之論並非經典正義皆以意妄作兹為曲學家談不足以範時軌世皇代既乘乾統厯得一馭宸自宜稽古則天憲章文武追蹤周孔述而不作四彼三代使百世可知豈容虛追子氏於篇之浮說徒損經紀雅誥之遺訓而欲以支離横議損畫妄圖儀刑宇宙而貽來葉者也又北京制置未皆允帖繕修草剙以意良多事移體變存者無幾理茍宜革何必仍舊且遷都之始日不遑給先朝規度每事循古是以數年之中悛換非一良以永法為難數改為易宫室府庫多因故迹而明堂辟雍獨遵此制建立之辰復未可知矣既猥班訪逮輙輕率瞽言明堂五室請同周制郊建三雍求依故所庶有㑹經誥無失典刑識偏學疎追慙謬浪孫景邕為國子博士永平四年十二月員外將軍兼尚書都令史陳終徳有祖母之喪欲服齊衰三年以無世爵之重不可陵諸父若下同衆孫恐違後祖之義請求詳正景邕與博士劉懐義封軌髙綽太學博士袁昇四門博士陽寧居等議嫡孫後祖持重三年不為品庻生二終徳宜先諸父太常卿劉芳議按喪服乃士之正禮合有天子諸侯卿大夫之事其中復下同庻人者皆列標顯至如傳重自士以上古者卿士咸多世位又士以上乃有宗廟世儒多云嫡孫傳重下通庻人以為差謬何以明之禮稽命徴曰天子之元士二廟諸侯之上士亦二廟中下士一廟一廟者祖禰共廟祭法又云庻人無廟既如此分明豈得通於庻人也傳重者主宗廟非謂庻人祭於寢也兼累世承嫡方得為嫡子孫耳不爾者不得繼祖也又鄭𤣥别變除云為五世長子服斬也魏晉以來不復行此禮矣按喪服經無嫡孫為祖持重三年正文惟有為長子三年嫡孫朞故傳及注因說嫡孫傳重之義今世既不復為嫡子服斬卑位之嫡孫不陵諸叔而持重則可知也且准終徳資階方之於古未登士人在官復無斯禮考之舊典驗之今世則兹範罕行且諸叔見存喪主有寄宜依諸孫服期為允景邕等又議云喪服雖以士為主而必下苞庶人何以論之自大夫以上每條標列逮於庶人含而不述此同士制不復疑也惟有庶人為國君此則明義服之輕重不渉於孫祖且受國於曾祖廢疾之祖父亦無重可傳而猶三年不必繇此世重也夫霜威露濡異識咸感承重主嗣寧甄寢廟嫡孫之制固不宜殊又古自卿以下皆不殊承襲末代僭踰未可以語通典是以春秋譏於世卿王制稱大夫不世此明訓也喪服經雖無嫡孫為祖三年正文而有祖為嫡孫朞豈祖以嫡服己服己與庶孫同為祖朞於義可乎服祖三年此則近世未嘗變也准古士官不過二百石已上終徳即古之廟士也今假終徳未班朝次苟曰志仁必也斯遂况乃官歴士流當訓章之運而以庶叔之嫌替其嫡重之位未是成人之善也芳又議國子所云喪服雖以士為主而必下苞庶人本亦不謂一篇之内全不下同庶人正言嫡孫傳重專士以上此經傳之正文不及庶人明矣戴徳喪服變除云父為長子斬自天子達於士此皆士以上乃有嫡子之明據也且承重者以其將代己為宗廟主廟主了不云寢又其證也所引大夫不世者此公羊糓梁近儒小道之書至如左氏詩易尚書論語皆有典證或是未寤許叔重五經異義云今春秋公羊糓梁說卿大夫世位則權并一姓議周尹氏齊崔氏也而古春秋左氏說卿大夫皆得世禄傳曰官族易曰食舊徳舊徳謂食父故禄也尚書曰世選爾勞予不絶爾善詩云惟周之士不顯奕世論語曰興滅國繼絶世國謂諸侯世謂卿大夫也斯皆正經及論語士以上世位之明證也士皆世禄也八品者一命斯乃信然但觀此據可謂覩其綱未炤其目也按晉官品令所制九品皆正無從故以第八品准古下士今皇朝官令皆有正從若以其員外之資為第十六品也豈得為正八品之士哉推考古今謹如前議景邕等又議喪服正文大夫以上每事顯列惟有庶人含而不言此通下之義了然無惑且官族者謂世有功食舊徳者謂徳侯者世位興滅國繼絶世主謂諸侯卿大夫無罪誅絶者耳且金貂七眊楊氏四公雖以位相承豈得言世禄乎晉太康中令史殷遂以父祥不及所繼求還為祖母三年時政以禮無代父追服之文亦無不許三年之制此即晉世之成規也尚書邢巒奏依芳議詔曰嫡孫為祖母禮今有處士人通行何勞方致疑請也可如國子所議崔鴻為三公郎中延昌三年春偏將軍乙龍虎喪父給假二十七月而虎并數閠月詣府求上領軍元珎上言案違制律居三年之喪而冐衰求任五嵗刑龍虎未盡二十七月而請宿衞依律結刑五嵗鴻駁曰三年之喪二十五月大祥諸儒或言祥月下旬而禫或言二十七月各有其義未知何者會聖人之㫖龍虎居喪已二十六月若依王杜之義便是過禫即吉之月如其依鄭𤣥二十七月禫中復可以從御職事禮云祥之日皷素琴然則大祥之後喪事終矣既可以從御職事求上何為不可若如府判禫中皷琴復有罪乎求之經律理實未允下更詳辯珎又上言按士虞禮三年之喪朞而小祥又朞而大祥中月而禫鄭𤣥云中猶間也自喪至此凡二十七月又禮言祥之日皷素琴鄭云皷琴者存樂也孔子祥後五日彈琴而不成十日而成笙歌鄭注與鄭志及踰月可以歌皆身自踰月可為此謂存樂也非所謂樂樂者使工為之晉博士許猛解三驗曰按黍離麥秀之歌小雅曰君子作歌惟以告哀魏詩曰心之憂矣我歌且謡若斯之類豈可謂之金石之樂哉是以徒歌謂之謡徒吹謂之和記曰比音而樂之及干戚羽毛謂之樂若夫禮樂之施於金石越於聲音者此乃所謂樂也至於素琴以示終笙歌以省哀者則非樂矣閒傳云大祥除衰杖而素縞麻衣大祥之服也雜記注云𤣥衣黄裳則是禫祭黄者未大吉也檀弓云祥而縞是月禫徙月樂鄭志趙商問鄭𤣥答云祥謂大祥二十五月是禫謂二十七月非謂上祥之月也徙月而樂許猛釋六徵曰樂者自謂八音克諧之樂也謂在二十八月工奏金石之樂耳而駮云大祥之後喪事終矣脱如此駮禫復焉施又駮云禫中皷琴復有罪乎然禫則黄裳未大吉也皷琴存樂在禮所許若使工奏八音融然成韻既未徙月不罪伊何又駁云禫中既得從御職事求上何為不可簡龍虎居喪二十六月始是素縞麻衣大祥之中何謂禫乎三年沒閏理無可疑麻衣在體冒仕求榮實為大尤罪其焉捨又省依王杜禫祥同月全乖鄭義喪㓙尚逺而欲速除何怱怱者哉下府愚量鄭為得之何者禮記云吉事尚近日㐫事尚逺日又論語云喪與其易寧戚而服限三年痛盡終身中月之解雖容二義尚逺寧戚又撿王杜之義起於魏末晉初及越騎校尉程猗贊成王肅駮鄭禫二十七月之失為六徵三驗上言於晉武帝曰禮國之大典兆民所日用豈可二哉今服禫者名各不同非聖世一統之謂鄭𤣥說二十七月禫甚乖大義臣每難鄭失六有徵三有驗初未能破臣難而通𤣥說者如猗之意謂鄭義廢矣太康中許猛上言扶鄭釋六徵解三驗以鄭禮二十七月為得猗及王肅為失而博士宋昌等議猛扶鄭為衷晉武從之王杜之義於是敗矣王杜之義見敗者晉武知其不可行故也而上省同猗而贊王欲虧鄭之成軌竊所未寧更無異義還從前處鴻又駮曰按三年之喪沒閏之義儒生學士猶或病諸龍虎生自戎馬之鄉不蒙稽古之訓數月成年便懼違緩原其本非貪榮求位而欲責以義方未可便爾也且三年之喪再朞而大祥中月而禫鄭𤣥以中為間王杜以為是月之中鄭亦未為必㑹經㫖王杜豈於必乖聖意既諸儒採先聖後賢見有不同晉武後雖從宋昌許猛之駁同鄭禫議然初亦從程猗贊成王杜之言二論得否未可知也聖人大祥之後皷素琴成笙歌者以喪事既終餘哀之中可以存樂故也而樂府必以干戚羽毛施之金石然後為樂樂必使工為之庶民凡品於祥前皷琴可無罪乎律之所防豈止為貴士亦及凡庻府之此義彌不通矣魯人朝祥而暮歌孔子以為踰月則可矣爾則大祥之後喪事已終皷琴笙歌經禮所許龍虎欲宿衛皇宫豈欲合刑五嵗就如鄭義二十七月而禫二十六月十五升布深衣素冠縞紕及黄裳綵纓以居者此則三年之餘哀不在服數之内也衰絰則埋之於地杖則棄之隠處此非喪事終乎府以大祥之後不為喪事之終何得復言素琴以示終也喪事尚逺日誠如鄭義龍虎未盡二十七月而請宿衛實為忩忩於戚之理合在情責便以深衣素縞之時而罪同杖絰苫凷之日於禮憲未允詳之律意冒喪求仕謂在斬焉草土之中不謂除衰杖之後也又龍虎具列居喪日月無所隠冒府應告之以禮遣還終月便幸彼昧識欲加之罪豈是遵禮敦風愛民之致乎正如鄭義龍虎罪亦不合也忩忩之失宜科鞭五十封祖胄為太學博士延昌三年七月司空清河王懌第七叔母北海王妃劉氏薨司徒平原郡開國公髙肇兄子太子洗馬員外亡並上言未知出入猶作皷吹不請下禮官議祖胄議喪大記云朞九月之喪既𦵏飲酒食肉不與人樂之五月三月之喪比𦵏飲酒食肉不與人樂之世叔母故主宗子直云飲酒食肉不言不與人樂之鄭𤣥云義服恩輕以此推之明義服𦵏容有樂理又禮大功言而不議小功議而不及樂言論之間尚自不及其於聲作明不得也雖復功得樂在宜止四門博士蔣雅哲議凡三司之尊開國之重其於五服皆有厭絶若尊同體敵雖疏尚宜徹樂如或不同子姓之喪非嫡者既殯之後義不闕樂國子助教韓神固議夫羽旄可以展耳目之適絲竹可以肆遊宴之娛故於樂貴懸有哀則廢至若徳儉如禮昇降有數文物昭旂旗之明錫鸞為行動之響鳴鐃以警衆聲笳而清路者所以辯等列明貴賤非措哀樂於其間矣謂威儀皷吹依舊為允兼儀曹郎中房景先駮曰按祖胄議以功緦之喪皷吹不作齊衰卒哭簫管必陳准之輕重理用未安聖人推情以制服據服以副心何容拜虞奠於神宫服衰麻而奏樂火燧一移哀情頓盡反心以求豈制禮之意就如所言義服恩輕既虞而樂正服一朞何以為斷或義服尊正服卑如此之比復何品節雅哲所議公子之喪非嫡者既殯之後義不闕樂按古雖有尊降不見作樂之文未詳此據竟在何典然君之於臣本無服體但恩誠相感致存隠惻是以仲遂卒垂笙籥不入智悼在殯杜蕢明言豈天倫之痛既殯而樂乎又神固等所議以為笳皷不在樂限鳴鐃以警衆聲笳而清路者所以辯等列明貴賤耳雖居哀恤施而不廢麤而言之似如可通考諸正典未為符合按詩云鐘皷既設皷鐘伐鼛又云於論皷鐘於樂辟雍言則相連得非樂乎八音之數本無笳名推而類之簫管之比豈可以名稱小殊而不為樂若以王公位重威飾宜崇皷吹公給不可私辭者魏絳和戎受金石之賞鍾公勲茂蒙五熟之賜若審功膺賞君命必行豈可陳嘉牢於齋殯之時擊鐘磬於升祔之後尋究二三未有依據國子職兼文學令問所歸宜明據典謨曲盡斟酌率繇必𠂻以辯深惑何容總議並申無所析剖更詳得失據典正議秘書監國子祭酒孫惠蔚太學博士封祖胄等重議司空體服衰麻心懷􅆭切其於聲樂本無作理但以皷吹公儀致有疑論耳按皷吹之制蓋古之軍聲獻㨗之樂不常用也有重位茂勲乃得僃作方之金石凖之管絃其為音奏雖曰小殊然其大體與樂無異是以禮云皷無當於五聲五聲不得不和竊惟今者加臺司之儀蓋欲兼廣威華若有衰用之無變於吉便是一人之身悲樂並用求之禮情於理未盡二公雖受之於公用之非私出入聲作亦以娛已今既有喪心不在樂笳皷之事明非欲聞宜從寧戚之義廢而勿作但禮崇公卿出入之儀至有趨以采齊行以肆夏和鑾之聲佩玉之飾者所以顯槐鼎之至貴彰宰府之為重今二公地處尊親宜殊百辟皷吹之用無容全去禮有懸而不樂今陳之以僃威儀不作以示哀痛在禮即情愚謂為允詔曰可從國子後議清河王懌所生母羅太妃薨表求申齊衰三年詔禮官博議侍中中書監太子少傅崔光議喪服大功章云公之庶昆弟為母傳曰先君餘尊之所厭不得過大功記公子為其母練冠麻衣縓緣既塟除之傳曰何以不在五服中也君之所不服子亦不敢服也此皆謂公侯枝子藉父兄以為稱其母本妾猶繫之於君不得以子貴為夫人者也至如應韓啟宇厥母故自申内主之尊凡將别封其親亦容盡君妣之重若然便所謂周公制禮而子姪共尊漢世諸王之國稱太后宫室百官周制京邑自當一傍天子之式而不用公庶之軌魏氏以來雖羣臣稱微然常得出臨民士恐亦未必捨近行逺服功衰與練麻也羅太妃居王母之尊二十許載兩裔蕃后並建大邦子孫盈第臣吏滿國堂堂列辟禮樂僃陳吉慶㓙哀宜稱情典則不應傍之公第仍拘先厭愚謂可逺准春秋子貴之文上祔周漢侯王之體成母后之尊蠲帝妾之賤申疏齊之極慕撥功練之輕悲誠如此則三年之喪無乖於自達巨創之痛有遂乎在中寧戚過哀情禮俱允時議者不同詔服大功時又疑清河國官從服之制太學博士李景林等二十一人議按禮文君為母三年臣從服期今司空自為先帝所厭不得申其㒺極依禮大功據喪服厭降之例並無從厭之文今太妃既捨六宫之稱加太妃之號為封君之母尊崇一國臣下固宜服朞不得以王服厭屈而更有降禮有從輕而重義苞於此太學博士封偉伯等十人議按臣從君服降君一等君為母三年臣則朞今司空以仰厭先帝俯就大功臣之從服不容有過但禮文殘缺制無正條竊附情理謂宜小功庶君臣之服不失其序升降之差頗㑹禮意清河國郎中令韓子熈議謹按喪服大功章云公之庶昆弟為其母妻傳曰何以大功先君餘尊之所厭不敢過大功也夫以一國之貴子猶見厭况四海之尊固無申理頃國王遭太妃憂議者援引斯條正王之服尋究義例頗有一途但公之庶昆弟或為士或為大夫士之卑賤不得仰匹親王正以餘厭共同可以奪情相擬然士非列土無臣從服今王有臣服不得一准諸士矣議者仍令國臣從以朞嚚昧所見未暁髙趣按不杖章云為君之父母妻長子祖父母傳曰父母長子君服斬妻則小君父卒然後為祖後者服斬傳所以深釋父卒為祖服斬者葢恐君為祖朞臣亦同朞也明臣之後朞繇君服斬若繇君服斬然後朞則君服大功安得亦朞也若依公之庶昆弟不云有臣從朞若依為君之父母則出應申三年此之二章殊不相干引彼則須去此引此則須去彼終不得兩服功朞渾雜一國也議者見餘尊之厭不得過大功則令王依庶昆弟見不杖章有為君之父母便令臣從服以期此乃據殘文守一隅恐非先聖之情達禮之喪矣且從服之體自有倫貫雖秩微閽寺位卑室老未有君服細絰裁踰三時臣著疏衰獨渉兩嵗按禮天子諸侯之大臣惟服君之父母妻長子祖父母其餘不服也惟近臣閽寺隨君而服耳若大夫之室老君之所服無所不從而降一等此三條是從服之通㫖較然之明例雖近臣之賤不過隨君之服未有君從輕而臣服重者也議云禮有從輕而重臣之從君義苞於此愚謂服問所云有從輕而重公子之妻為其皇姑直是禮記之異獨此一條耳何以知其然按服問經云有從輕而重公子之妻為其皇姑而大傳云從服有六其六曰有從輕而重注曰公子之妻為其皇姑若從輕而重不獨公子之妻者則鄭君冝更見流軰廣論所及不應還用服同之文以釋大傳之義明從輕而重惟公子之妻臣之從君不得苞於此矣若復有君為母大功臣從服朞當云有從輕而重公子之妻為其皇姑君為母大功臣從服朞何為不僃書兩條以杜將來之惑哉而偏著一事彌結今日之疑且臣為君母乃是徒從徒從之體君亡則己妻為皇姑既非徒從雖公子早沒可得不制服乎為君之父母妻子君已除喪而後聞喪則不稅葢以恩輕不能追服假令妻在逺方姑沒遥域過期而後聞喪復可不稅服乎若姑亡必不闗公子在否聞喪則稅不計日月逺近者則與臣之從君聊自不同矣又按臣服君黨不過五人悉是三年其餘不服妻服夫黨可宜五人乎期功以降可得無服乎臣妻事殊邈然胡越茍欲引之恐非通例也愚謂臣有合離三諫待决妻無去就一醮終身親義既有叅差喪服固宜不等故見厭之婦可得申其本服君屈大功不可過從以期所以從麻而齊專屬公子之妻隨輕而重何闗從服之臣尋理求途儻或在此必以臣妻相准未覩其津也子熈誠不能逺探墳籍曲論長智請以情理較其得失君遭母憂巨創之痛臣之為服從君之義如何君至九月便蕭然而即吉臣獨期年仍哀哭於君第創巨而反輕從義而反重緣之人情豈曰是哉侍中崔光學洞今古達禮之宗頃探幽立義繇三年之服雖經典無文前儒未辯然推例求㫖理亦難奪若臣服從期宜依侍中之論脫君仍九月不得如議者之談且嬴氏焚坑禮經殘缺故今追訪靡據臨事多惑愚謂律無正條須准傍以定罪禮闕舊文宜凖類以作憲禮有朞同緦功而服如齊疏者蓋以在心實輕於義乃重故也今欲一依喪服不可從君九月而服周年如欲降一等兄弟之服不可以君服母詳諸二途以取折𠂻謂宜麻布可如齊衰除限則同小功所以然者重其衰麻尊君母减其日月隨君降如此衰麻猶重不奪君母之嚴日月隨降可塞從輕之責尚書李平奏以為禮臣為君黨妻為夫黨俱為從服各降君夫一等故君服三年臣服一朞今司空臣懌因以尊嚴之禮奪其㒺極之心國臣厭所不及當無隨降之理禮記大傳云從輕而重鄭𤣥注云公子之妻為其皇姑既舅不厭婦明不厭者還應服其本服此即是其例也詔曰禮有從無服而有服何但從輕而重乎懌今自以厭故不得申其過隙衆臣古無疑厭之論而有從輕之據曷為不得申其本制也可從尚書及景林等議㝷詔曰比决清河國臣為君母服期以禮事至重故追而審之今更無正據不可背章生條但君服既促而臣服仍近禮緣人情遇厭須變服可還從前判既𦵏除之册府元龜卷五百八十一
