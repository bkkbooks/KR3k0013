  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_098-1a}
body:
  text: 册府元龜巻九十八宋王欽若等撰帝王部徵聘傳曰舉逸民天下之民歸心焉説者以為節行超逸之民隐居未仕則舉用之此二帝三王所以治也是以孑孑干旄歌於國風翹翹車乗形於載籍聘名士禮賢者著於時訓王天下者舉而行之以蒲裹輪取其安也以玉為幣優其數也若乃徵而不至至而不屈屈而不事事雖出䖏語黙軌迹不同然其激清鎮躁矯世勵俗亦可以為教化之助也殷湯初為諸侯伊尹處士湯使人聘迎之五反然後肯往從湯言素王及九主之事九主者法君專君授君等君寄君勞君破君國君三嵗社君凡九品圗畫其形也湯舉任以國政漢髙祖時有東園公綺里季夏黄公甪里先生此四人者當秦世避而入商雒深山以待天下之定也髙祖聞而召之不至武帝自為太子聞枚乗名及即位乗年老廼以安車蒲輪徵乗蒲輪以蒲裹輪道死在道病死復以賢良徵故清河太傅轅固諸儒多嫉毁曰固老罷歸之時固已九十餘矣建元元年遣使者安車蒲輪束帛加璧徵魯申公初王臧趙綰俱受詩申公臧為郎中令綰為御史大夫請立明堂以朝諸侯不能就其事就成也乃言師申公於是帝使使束帛加璧安車以蒲裹輪加駟迎申公弟子二人乗軺傳從公至已八十餘對帝曰為治者不在多言顧力行何如耳是時天子方好文詞見申公對黙然已招致則以為太中大夫舎魯邸議明堂事昭帝時涿郡韓福等五人以徳行徵至京師賜䇿書束帛遣歸詔曰朕閔勞以官職之事其務修孝鄉里行道舍傳舍於𫝊舍止宿若今官人行得過驛也縣次具酒食肉從者及馬道次給與酒肉并飲食其從者及馬長吏以時存問常嵗八月賜羊一頭酒二斛不幸死者賜複衾一祠以中牢元帝初即位遣使者徵貢禹王吉吉年老道病卒禹至授諫議大夫又徵翼奉待詔宦者署奉數言事宴見天子敬焉哀帝時瑯邪邴漢以清行徵用至京兆尹又龔勝為諫議大夫引見勝薦龔舍及亢父寗夀濟隂侯嘉有詔皆徵勝曰切見國家徵醫巫常為駕徴賢者宜駕帝曰大夫乗私車来邪勝曰唯唯唯唯恭應之詞有詔為駕龔舍侯嘉至皆為諫議大夫寗夀稱疾不至後漢光武建武中徵郭憲為博士憲自王莽簒位逃於東海之濵光武即位求天下有道之人故有是拜逢萌隐瑯琊勞山養志修道託以耄耋迷路東西連徵不起嚴光㑹稽餘姚人也少有髙名與光武同逰學及光武即位光乃變名姓隐身不見帝思其賢乃令以物色訪之以其形貌求之後齊國上言有一男子披羊裘釣澤中帝疑其光乃備安車𤣥纁遣使聘之三反而後至舍於北軍給牀褥太官朝夕進膳王霸廣武人也少有清節建武中徵到尚書拜稱名不稱臣有司問其故霸曰天子有所不臣諸侯有所不友索盧放東郡人也索盧姓也建武六年徵為雒陽令政有能名後以疾去建武末復徵不起光武使人輿之見於南宮雲臺賜榖二千斛遣歸除子為太子中庻子周黨廣武人也建武中徵為議郎以病去職遂將妻子居澠池復被徵不得已乃待見尚書及光武引見黨伏而不謁自陳願守所志帝乃許焉博士范升奏毁黨大不敬書奏天子以示公卿詔曰自古明王聖主必有不賔之士伯夷叔齊不食周粟太原周黨不受朕禄亦各有志焉其賜帛四十疋譚賢廣武人也建武中徵不到殷謨鴈門人也建武中徵不到殤帝延平中詔公卿中二千石各舉隐士特徵李充為博士安帝以𤣥纁羔幣聘汝南周燮南陽馮良皆不起詔二郡賜嵗以羊酒養病建光元年復詔徵樊英及同郡孔喬李昺北海郎宗陳留楊倫東平王輔六人唯郎宗楊倫到雒陽英等四人並不至郎宗字仲綏安丘人也善京氏易風角星算推步吉㐫常負笈荷擔賣卜給食瘠服間行人莫得知安帝詔公車徵策文曰郎宗李昺孔喬等前比徵命未嘗降意恐主者玩弄禮意不備使難進易退之人龍潛不屈其身各致加禮遣詣公車將以補察國政輔朕之不逮青州被詔書遣宗詣公車對䇿陳災異而為諸儒之表拜議郎除吳令王輔平陸人學公羊傳援神契舉有道拜郎中陳災異有驗拜議郎以病遜位安帝公車徵不行順帝永建二年徵楊厚初厚為中郎免歸不應徵辟詔告郡縣督促發遣厚不得已行到長安以病自上有詔太醫致藥太官賜羊酒及至累拜侍中後固稱病求退帝許之賜車馬錢帛黄瓊永建中公卿多薦瓊者於是與㑹稽賀純廣漢楊厚俱公車徵瓊至綸氏稱疾不進有司劾不敬詔下縣以禮慰遣遂不得已至即拜議郎法真扶風郿人也恬静寡欲不交人間事順帝西廵虛心欲致前後四徵終不降屈張楷通嚴氏春秋古文尚書初司隷舉茂才除長陵令不至官後順帝下詔告河南尹曰故長陵令張楷行慕原憲操擬夷齊輕貴樂賤竄跡幽藪髙志確然獨拔羣俗前此徵命盤桓未至將主者翫習於常優賢不足使其難進歟郡時以禮發遣楷復告疾不到桓帝建和三年下詔以安車備禮聘楷楷以篤病不行桓帝時韋著以經行知名不應州郡之命大將軍梁冀辟不就帝公車備禮徵至霸陵稱病歸乃入雲陽山採藥有司舉奏加罪帝特原之復詔京兆尹重以禮勸著遂不就徴韓康字伯休桓帝備𤣥纁之禮以安車聘之使者奉詔造康康不得已乃許諾辭安車自乗柴車冐晨先使者發至亭亭長以韓徴君當過方發人牛修道橋及見康柴車幅巾以為田叟也使奪其牛康即釋駕與之有頃使者至奪牛翁乃徵君也使者欲奏殺亭長康曰此自老子與之亭長何罪乃止康因逃遯靈帝中平五年以博士徵申屠蟠荀爽鄭𤣥韓融陳紀襄楷等十四人並不至魏文帝徵管寧為大中大夫固辭不受明帝即位太尉華歆遜位讓寧遂下詔曰太中大夫管寧耽懐道徳服膺六藝清虛足以侔古廉白可以當世曩遭王道衰缺浮海遁居大魏受命則襁負而至斯蓋應龍潛升之道聖賢用舍之義而黄初以来徵命屢下每􅂺辭疾拒違不至豈朝廷之政與生殊􅃐將安樂山林往而不能反乎夫以姬公之聖而耉徳不降則鳴鳥不聞以秦穆之賢猶思詢乎黄髮况朕寡徳曷能不願聞道於子大夫哉今以寧為光禄勲禮有大倫君臣之道不可廢也望必速至稱朕意焉又詔青州刺史曰寧抱道懐真潛翳海隅比下徵書違命不至盤桓利居髙尚其事雖有素履幽人之貞而失考父兹恭之義使朕虛心引領歴年其何謂邪徒欲懐安必肆其志不惟古人亦有翻然改節以隆斯民乎日逝月除時方已過澡身浴德將以曷為仲尼有言吾非斯人之徒與而誰與哉其命别駕從事郡丞掾奉詔以禮發遣寧詣行在所給安車吏從茵褥道上厨食上道先奏寧稱草莽臣上疏曰臣海濵孤微罷農無伍禄運幸厚横䝉陛下纂承洪緒徳侔三皇化溢有唐久荷渥澤積祀一紀不能仰答陛下恩養之福沈委篤疴寢疾彌留違臣隷顛倒之節夙宵戰怖無地自厝自元年十一月被公車司馬令所下州郡八月甲申詔書徵臣更賜安車衣被茵褥以禮發遣光寵並臻優命屢至怔營竦息悼心失圖思自陳聞申展愚情而明詔抑割不令稍修章表是以鬱滯訖于今日誠謂乾覆恩有紀極不意靈潤彌以隆赫奉今年二月被州郡所下三年十二月辛酉詔書重賜安車衣服别駕從事與郡功曹以禮發遣又特被璽書以臣為光禄勲躬秉勞謙引喻周秦損上益下受詔之日精魄飛散靡所投死臣重自省揆徳非園綺而䝉安車之榮功無竇融而蒙璽封之寵楶棁駑下荷棟梁之任垂沒之命獲九棘之位懼有朱博皷妖之眚又年疾日侵有加無損不任扶輿進路以塞元責望慕閶闔徘徊闕庭謹拜章陳情乞䝉哀省抑思聽放無令骸骨填於衢路自黄初至於青龍徵命相仍常以八月賜羊酒詔書問青州刺史程喜寧為守節髙乎審老病尫頓邪喜上言寧有族人管貢為州吏與寧鄰比臣常使經營消息貢説寧常著皂帽布􅃭袴布裙隨時單複出入閨庭能自任杖不須扶持四時祠祭輒自力彊改加衣服著絮巾故在遼東所有白布單衣親薦饌饋跪拜成禮寧少而母䘮不識形象嘗特加觴泫然流涕又居宅離水七八十步夏時詣水中澡灑手足闚於園圃臣揆寧前後辭讓之意獨自以生長潛逸耆艾智衰是以栖遲每執謙退此寧志行所欲必全不為守髙晉武帝咸寧二年詔曰男子皇甫謐沉静履素守學好古與俗流異趣其以謐為太子中庶子謐固辭篤疾又詔徵為議郎尋召補著作郎司隷校尉皆不就四年詔以朱冲為博士冲稱疾不應又詔曰東宮官屬亦宜得履蹈至行敦悦典籍者其以冲為太子右庶子沖聞徵書至趣逃入深山是時劉兆三徵博士徐苗再徵博士皆不就太康初平陳下詔曰偽尚書陸喜等十五人南士歸稱並以貞潔不容偽朝或忠而獲罪或退身修志放在草野主者可皆隨本位就下拜除勅所在以禮發遣須到隨才授用乃以喜為散騎常侍恵帝元康元年以束帛徵處士尋陽翟湯㑹稽虞喜永康初博求清節雋異之士臨海太守仇馥薦郡人任旭清貞潔素學識通博詔下州郡以禮發遣旭辭疾不行懐帝永嘉初以公車徵杜夷虞喜為博士皆不就愍帝建興二年徵張茂為侍中以父母老固辭元帝初鎮江東聞任旭名召為參軍手書與旭欲使必到旭固辭以疾後帝進位鎮東大將軍復召之及為左丞相辟為祭酒中興建公車徵㑹遭母憂于時司空王導啟立學校選天下明經之士旭與㑹稽虞喜俱以隐學被召未行㑹有王敦之難遂寢明帝即位徵任旭拜給事中旭稱疾篤不到太寧三年復下詔備禮徵旭及㑹稽虞喜並為博士成帝咸和八年以束帛徵處士尋陽翟湯㑹稽虞喜不起咸康元年詔書尋陽翟湯㑹稽虞喜並守道清貞不營世務耽學髙尚操擬古人往雖徵命而不降屈豈素絲難染而捜引禮簡乎政道須賢宜納諸廊廟其並以散騎常侍徵之又不起是嵗以束帛徵䖏士郭翻又以侍中徵阮裕以博士徵韓績皆不起劉鮞字長魚髙宻人邴郁字𢎞文城陽人也並有盛名咸康中帝博求異行之士鮞郁並依韓績及翟湯等例以博士徵之郁辭以病鮞隨使者到京師自陳年老不拜康帝建元元年復以散騎常侍徴翟湯湯固辭老病不至又以束帛徵㑹稽虞喜海西公太和中以安車再徵陸阮為通直散騎侍郎散騎常侍皆不行孝武太元十二年束帛聘䖏士戴逵龔𤣥之詔曰夫哲王御世必捜揚幽隐故空谷流縶維之詠丘園旅束帛之觀譙國戴逵武陵龔𤣥之並髙尚其操依仁游藝潔已貞鮮學宏儒業朕虛懐久矣二三君子豈其戢賢於懐抱哉思挹雅言虛誠諷議可並以為散騎常侍領國子博士㫖下所在備禮發遣不得循常以稽側席之望逵辭病不就後又徵逵為國子祭酒加散騎常侍復不至郡縣敦逼不已乃逃於吳吳國内史王珣有别館在虎丘山逵潛詣之與珣游䖏積旬㑹稽内史謝𤣥慮逵逺遯不返乃上疏曰伏見譙國戴逵希心俗表不嬰世務棲遲衡門與琴書為友雖䇿命屢加幽操不囘超然絶跡自求其志且年垂耳順常抱羸病時或失調轉至委篤今王命未囘將罹風霜之患陛下既已愛而器之亦宜使其身名並存請絶其召命奏疏帝許之翟法賜湯之曾孫也孝武以散騎侍郎徵亦不至龔元嘉𤣥之弟子也亦有徳操孝武帝以太學博士散騎侍郎給事累徵不起安帝義熙初以散騎侍郎徵戴勃勃不起勃逵子也後魏太武徵天下才雋趙郡李虛為中書博士又徵河間邢頴范陽盧元渤海髙克等頴以才學知名拜中書侍郎後周髙祖保定中遣宣納上士栁裘至梁國徵都官尚書沈重仍致書曰皇帝聞梁都官尚書沈重觀夫八聖六君七情十義殊方所以㑹軌異代於是率繇莫不趣大順之遥途履中和之盛致及青緗起熖素篆從風文逐世疎義隨俗舛大禮存於玉帛之間至樂形於鐘皷之外雖分蛇聚緯郁郁之辭蓋闕當塗典午抑抑之㫖無聞有周開基爰縱聖哲拯蒼生之已淪補文物之將墜天爵具修人紀咸理朕寅奉神器恭惟寶圖常思復禮殷周之年遷化唐虞之世懼三千尚乖於治俗九變未協於移風欲定畫一之文思杜二家之説知卿學冠儒宗行懔士則卞寶復潤於荆隂隋炤更明於漢浦是用寤寐増勞瞻望軫念爰致束帛之聘命翹車之招所望鳳舉鴻翻俄而萃止明斯隠滯合彼異同上庠弗墜於微言中經罔闕於逸義近取無獨善之譏逺應有兼濟之美可不盛歟昔申培鮐背方辭東國公孫黄髮始造西京遂使道為藝基功參治本今者一徵諒兼其二若居形聲而去影響狥迷邦而􅁯觀國非所謂也又勅襄州總管衛公直敦喻遣之在塗供給務從優厚重至京師詔令討論五經并校定鐘律天和中復於紫極殿講三教義朝士儒生桑門道士至者二千餘人重辭義氣洽樞機明辨凡所解釋咸為諸儒所推六年授驃騎大將軍開府儀同三司露門博士為皇太子講論在館既久且年過時制表請還梁髙祖優詔答之曰開府漢南杞梓每軫虛襟江東竹箭亟疲延首故束帛聘申蒲輪徵伏加以梁朝舊齒結綬三世沐浴榮光祇承寵渥不忘戀本深足嘉歎而椘材晉用豈無先哲方事求賢義乖来請重固請乃許焉遣小司門上士楊注送之梁梁明帝拜重散騎常侍太常卿建徳中詔所司以安車駟馬徴亡齊國子博士熊安令隨駕入朝并勅所在供給至京勅令於大乗佛寺參議五禮宣政元年拜露門學博士下大夫其時年已八十餘隋文帝開皇五年四月詔徵山東馬榮伯等六儒煬帝大業中詔徐儀為學士儀陵之子少聰警仕陳為尚書殿中郎尋兼東宮學士陳亡隐於錢塘之赭山至是召之唐太宗時杜如晦弟楚客隐居嵩山貞觀四年召拜給事中太宗謂曰聞卿山居日久志意甚髙自非宰相之任則不能出何有是理邪夫涉逺者必自邇升髙者必自下但在官為衆所稱無慮官之不大爾兄雖與我體異其心猶一於我國家非無大功為憶爾兄意欲見爾宜識朕意繼爾兄忠義也髙宗顯慶四年徵孫思邈為諫議大夫固辭不受上元元年辭疾請歸特賜良馬及鄱陽公主邑司以居焉當時知名之士宋令文孟詵盧炤等執師資之禮以事焉咸亨中徵虎丘山隐士史德義赴雒陽尋稱疾而歸田逰巖者雍州三原人也初補太學生後罷歸逰於太白山每遇山林㑹意輒留連不能去其母與妻子並有方外志與遊巖同逰山水三十餘年後入箕山就許由廟東築室而居自稱許由東隣髙祖遣中書侍郎薛元超就問其母逰巖山服出拜帝令左右扶之謂曰先生養道山中比得佳否逰巖曰臣泉石膏肓煙霞痼疾既逢聖代幸得逍遙帝曰朕今得卿何異漢獲四皓乎薛元超曰漢髙祖欲廢嫡立庶黄綺方来豈如陛下崇重隐淪親問巖穴帝甚懽因將逰巖就行宮並家口給𫝊乗赴都授崇文館學士令與太子少傅劉仁軌談論及營奉天宮逰巖舊宅先在宮側特令不毁仍親書題額懸其門曰隐士田逰巖宅中宗神龍元年以安車備禮徵嵩山武攸緒又降書曰朕聞大隐忘情不去朝市至人無迹何所滯礙王髙標峻尚雅操孤貞有咸一之用宏體二之徳學究深逺理詣精微草芥貂蟬錙銖纓紱䕃松山而辭竹苑去朱邸而就青溪逍遙林壑傲睨箕潁有年嵗矣朕䖍膺聖鑑重闡皇基保乂家邦輯寧區宇求賢採彦俯谷窺山王之所居接近嵩岳長望髙烈思滿風煙將令駐蹕喬巖追尋大隗鳴鑾峒岫詢訪廣成機務殷繁有懐莫遂今遣國子監司業杜慎盈以禮命徵辟掃䕫龍之第虛稷契之筵神化丹青朕之志也豈以黄屋之貴而傾彼白雲之心通變之宜希從降志延佇閶闔若在汾陽武攸緒武太后之從弟也為揚州都督府長史聖歴中棄官隐於嵩山至是召至都授太子賔客尋請歸嵩山制從之令京官五品已上餞送於定鼎門外及三思延秀等構逆諸武多坐誅戮惟攸緒以隐居不預其禍時論美之王友貞長安中為長水令罷歸田里中宗在春宮乃召為司議郎不就神龍初又作太子中書舍人仍令所司以禮徵赴及至固以疾辭詔曰敦夷齊之行可以激貪賞顔閔之道用能勸俗新除太子中書舍人王友貞徳義淵藪人倫茂異學愛始於事親忠信表於行已富在文史廉於財貨久歴官位累聞課績有古人之風保君子之徳及抗志塵外棲情物表深歸解脱之門􅊎守薰修之誡頃加徵命作䕶儲闈固在辭榮陳情懇至朕方榮奬廉退懲静澆浮雖思廊廟之賢豈違山林之願宜加優禮仍遂雅懐以太子中書舍人員外置給全禄以畢其身任其在家修道仍令所在州縣存問四時送禄至其住所睿宗景雲元年十二月皇太子表請備禮辟隐士前太子中書舍人王友貞以致孝故也𤣥宗先天二年六月詔通事舍人禮徵䖏士范陽盧伯瑗一名浩然瑗善書畫屬文不婚娶寡嗜慾隐於嵩髙有終焉之志及使至稱疾不就徵所賜束帛亦辭不受開元四年八月詔益州山人勾洪禮陳元徳在峨嵋山宜令長史韋抗詔召以禮發遣令内品官李思逺領赴京六年三月徵嵩山逸人盧鴻至詔曰嵩山隐士盧鴻應辟而至訪之政道有㑹淳風爰舉逸人用勸天下特宜與五品官授諫議大夫丙辰鴻以疾辭位優詔放還曰昔在帝堯全許由之節緬惟大禹遂伯成之髙則知天子有所不臣諸侯有所不友遯之時義大矣哉嵩山盧鴻抗節幽逺凝情篆素隐居以求其志行義以達其道髙臥林壑多歴年載傳不云乎舉逸民而天下歸心焉是乃飛書巖穴備禮徵聘方佇獻替式宏政理而矯然不羣確乎難拔退已以鎮其操洗心以激其節固辭榮寵將厚風俗不降其志不辱其身固保厥躬㑹稽嚴陵未可名屈太原王霸終以疾歸其以諫議大夫放還山林嵗給米百石絹五十疋充其藥物仍令州縣送至隐所若知朝廷得失具以狀聞十三年以安車徵徂徕山逸人王希夷赴都希夷徐州膝人孤貧好道父母終為人牧羊以牧庸供葬畢隐於嵩山之隂後又隐于徂徕山車駕東廵勅州縣召以敦禮及至都時年已九十六矣帝令中書令張説訪以道義使中官扶入宮中與語大悦深所禮重以年老道髙不可屈以職事乃下制曰徐州䖏士王希夷絶學棄知抱一居貞久謝囂塵獨往林壑屬封巒展禮側席旌賢賁然来思應兹嘉召雖紆綺季之跡已過伏生之年宜命秩爵以尊年俾髙全於尚齒可朝散大夫守國子博士聽致仕還山每嵗春秋州縣致束帛酒肉仍賜衣一副及帛百疋十四年勅曰前刑部員外郎嵩陽觀道士崔泌門承貴仕志慕𤣥宗頃辭簪紱之榮遂託囂塵之外棲遲隐釣獨往忘歸雖髙尚之風雅正於浮俗而旌賁之道申寵於幽人宜迴紫洞之逰俾在青宮之列可太子洗馬天寶四載五月引諸州髙蹈不仕舉人見詔曰君子之道所以正心志全貞吉也逸人之學所以勵天下激浮躁也朕每崇先訓以道化人思致栖貞之士用光咸在之列是以頻降束帛兾空巖藪虛懐式竚明發不忘卿等来應辟命逺致城闕周文多士既叶於旁求虞舜疇咨亦在於僉議爰命臺省詢於道業或善行無跡名實難窺或大器晚成春秋尚富津涯未測輪桷何施事且隔於行蔵道以分於出䖏其馬曽常廣心賀蘭廸等三人宜待後䖏分崔從一王允貽韓宣胡祭趙𤣥奬等五人年鬢既髙稍宜優異宜各賜緑衣一副物二十段餘並賜十段不奪隐淪之志以成髙尚之美並宜坐食訖如去仍依前給公乗還郡數日増曽為左拾遺廣心廸並為金吾衛兵曹肅宗乾元三年二月徵太白山人祝素琚拜諫議大夫徳宗即位初以孔述睿為諫議大夫加金章朱綬令河南尹趙恵伯齎詔書𤣥纁束帛以禮聘述睿既至召對於别殿特賜第宅給以廐馬為皇太子侍讀旬日累表固辭乞還山詔報之曰卿懐伊摯佐時之道有廣成嘉遁之風養素丘園屢辭命秩朕欲崆山問道渭水求師亦何必堅務勞謙固求退讓無違朕命且唘乃心既懇辭不獲方就職久之改祕書少監右庶子加史館修撰初述睿隐於嵩陽大歴中轉運使劉晏表薦之累授司勲員外郎以疾固辭至是乃就徵拜建中三年閏正月以潞州䖏士田佐時為右拾遺集賢院直學士佐時偉容儀涉獵經史好大言時務黜陟使裴伯言薦之故拜官宰相張鎰以為命徵稍輕請加恩禮復有詔褒美賜絹百疋粟百石仍令州縣長史就家以禮徵聘竟不起觀察使李抱真又數薦之自拾遺拜諫議大夫亦不起貞元二年七月以嵩山韋况為右拾遺况郇文貞公安石之孫中書舍人斌之子大厯中隐居於深山守志樂道不屑於榮利至是徵之不起四年四月以䖏士劉益為左贊善大夫致仕未歸之間且於國子監安置六月以先除著作郎陽城為右諫議大夫仍遣長安尉楊寧齎束帛詣夏縣所居致聘城以褐衣至具上表讓帝遣中官持章服衣之而後召見賜帛五十疋城隐於河東中條山下逺近慕其徳行來學者相繼於道閭里有争者不詣官府詣城以決之李泌為陕虢觀察數禮問城及泌為相乃舉之城拜官不辭未至京師人皆想望風采云城山人能自苦刻不樂名利必諫争死職天下咸畏憚之十六年五月徵茅山山人崔芊召對於延英殿賜緋魚袋是年以䖏士竇羣為左拾遺羣扶風人少有節操蘇州刺史韋夏卿以丘園茂異薦之及夏卿為京兆尹復薦之故有是拜憲宗元和元年九月以山人李渤為左拾遺徵不至渤隐嵩山之下讀書為文以自課鹽鐵使李巽諫議大夫韋况更薦之渤不就徵朝廷有得失時附章疏以聞嘗著禦戎新録二十巻表獻之九年以為著作佐郎詔曰特降新恩用清舊議渤於是起赴官蕭祐少貧苦居山野奉養以孝徵拜左拾遺穆宗長慶二年七月以前河南府參軍李源為諫議大夫詔曰禮著死綏傳稱握節捐生守位取重人倫為義甚明其風咸替言念於此慨然興懐而朝之公卿有上言者稱天寶之季盗起幽陵振盪生靈吞噬河雒贈司徒忠烈公憕䖏難居首正色就屠兩河聞風再固危壁首立殊節至今稱之其子源有曽閔之行可貫於神明有巢由之風可希於太古山林以寄其迹爵禄不入於心泊然無營五十餘載夫褒忠可以勸臣節旌孝可以激人倫尚義可以鎮澆浮敬老可以厚風俗舉兹四者大儆於時是用擢自衡門立於丹陛䖏以諫議冀聞讜言仍加印綬式示寵光可守諫議大夫賜緋魚袋河南尹差官就所居敦諭發遣初憕既為禄山所害源方八嵗為羣賊所虜流浪南北展轉民家方六七年逮雒陽平父之故吏有隐認者以金帛贖之歸於近親代宗聞之授河南參軍源遂絶酒肉不娶婚姻不役童使常依雒陽之城北恵林寺即憕之别墅寓於一室次僧而食人亦未嘗見其所習至於齊榮辱混是非熙熙而無不合蓋自有得也先命穴其野以備終制時時往眠其間是月丁夘命中使齎手詔一封絹二百疋緋衣牙笏赴東都賜之九月源上陳情表一封且言讓所賜絹及緋衣牙笏以衰耄竟不赴詔敬宗長慶四年四月乙未以布衣姜倫為補闕試大理寺評事陸洿布衣李虞並為左拾遺布衣劉堅為右拾遺晉髙祖天福四年四月庚辰徵前左拾遺鄭雲叟為右諫議大夫玉笥山道士羅隐之賜號希夷先生雲叟始隐尚少累年之後西入華岳與之朝夕逰䖏隐之以藥術取利雲叟以山田自給俱好酒能詩及長嘯有大瓠云可辟寒暑置笇所酒經時其味不壊日携酒就花木水石之間一酌一詠嘗酒酣聨句鄭雲叟曰一壺天上有名物兩個世間無事人羅隐之曰醉却隐之雲叟外不知何䖏是天真上聞其名故遣劉珣趙䖏玭等齎鵠書致禮徵召其後雲叟稱疾不起上表曰臣聞君子有應敵之方因時俯仰介士有不移之操與性逍遥康堯佐舜者洽道於君臣洗渭巢箕者寄形於天壤惟聖人之效業左庶物以由庚微臣學圃無成文塲不調頃屬兵交四海怨暴三塲梁室亂離走蘭成於荒谷江都淪覆遁庾衮於天山而又蔡順少孤虞丘三失倉野之女逺國飃零王祥之男一時彫落䘮家室而有鰥在下悲身世而無䖏求生因投迹𤣥元委心虛静長揖當途之客羣居在野之人幽蘭以備於重襟灌木用成於虛室或臨窓嘯傲或植杖耕耘樂在其中老而將至西山採藥已有詠歌北闕彈冠曽無夢想安期綸綍下及煙蘿日月方耀於太清世胄適躋於髙祖任賢勿貳蒞事惟能衡門不羈之才繇来有愧詔局殊常之命未敢以聞夫功大者其任尊職充者其責重任必安於所據責不致於非才方今内服百工外拜五長百爾黎獻一存至公載惟清朝奚急百士誠繇陛下天綱地絡容無所遺夏雨春風恩無不及青陽振其沉頴旭旦起乎幽棲將令匹微罔不率俾固宜勇别環堵言隨輯言勇切車拜丹地之明廷奉竈囊之清職東望心踊其如病何賦分隐淪滅思聞見九徵而往雖有語於莊周三召不行獨無求於殷浩仰祈皇鑒俯宥愚衷上覽表嘉之賜近臣傳觀周世宗顯徳三年十月以華山隐者陳摶有道術徵之赴闕月餘放還舊隐册府元龜巻九十八
