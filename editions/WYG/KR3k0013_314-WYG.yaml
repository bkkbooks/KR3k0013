body:
  text: 册府元龜卷三百十四宋王欽若等撰宰輔部謀猷第四唐李石為相太和末文宗御紫宸殿石奏曰請准今月三日詔命起居郎起居舎人執筆記言記事帝問石曰坊市人得漸安未石對曰亦已漸安然近日苦寒葢縁刑殺致此隂沴又罪人索聯枝黨未已伏乞聖恩特賜寛宥鄭覃曰所坐周親已有處分訖若不寛解即恐連累至多石又奏曰昨聞鄭注到鳳翔招召兵士至多所招募者皆被殺戮竊恐邊上乗此生事伏乞降詔書安諭帝曰政貴寛恕固宜如此覃石等對曰遏惡揚善古聖所重帝曰朱叔夜入言罪人須早令御史鞫問如無過即與洗雪勿令虛受贓汙之名又曰宰相之務在選賢任用石奏曰臣與鄭覃俱為輔弼不立肝膽豈敢不盡但以人各有求茍遂所欲則羙譽至稍不如意則謗議生覃曰事有百司請各委任帝曰各須求才仍委百司宰相豈可一一領慎不得懼百司有權覃曰臣嘗聞李林甫忌嫉好人帝曰林甫姦臣也豈足論石曰比者選才先試以吏事文武兼才者或主邊兵或營錢糓茍有能事然後入用近日皆以資序進用由是乏人帝曰國朝近來取士與向前頗異覃曰臣聞南朝多用文華所以不理今日以才堪即用不必文辭借如中書舎人草制詔每人只要三數句語粗說其人豈必全序官資厯任帝曰凡進士及第有方鎮奏請判官者第一任未經作州縣官莫依但第一任曽作縣官即第二任依奏覃曰此科多輕薄不必盡用帝曰輕薄敦重色色皆有亦未必全在此科况此科已二百年亦不可遽改覃曰亦乞不崇樹石曰人家兄弟十數人或三五人但稍有智慧者即業文學若州縣有一文學人在其中雖地至偏逺必少差事陛下若盡令選授州縣官即不減選帝曰今加至四十人三年即選與州縣官得資即任諸處奏充判官卿便處置奏來帝曰朕十年孜孜求理迄今竟未見太平如何覃曰究其根源葢以黎民困弊臣聞百姓富則國富國富在藏之於野欲天下理莫若恤蒼生石曰明主志恤蒼生恤若得術亦應不難根本在朝廷事在節用革去冗食祗如司農寺木炭價每年約支八萬貫有司無以隄防姦吏夤縁所支不啻一倍以臣親見且去簿書姦盗然後百司理百司理則天下理若網在綱則百事整帝曰我每思貞觀開元之時覩今日之事即徃徃憤氣填膺覃曰陛下頻言及此臣等不勝慶忭臣與石等漸期條理以副聖心石曰求理之道在乎自上而下至於禁中衣服裝飾外皆倣傚以為時尚陛下躬儉節用風俗已移長裙大袂日漸減少若更令戚屬絶其侈㤗不慮下不從教帝曰如左街副使張元昌便用金唾盂何奢侈之甚昨因李訓事已斬矣覃對曰如張元昌事宜付有司誡約此軰則人自惕懼帝曰此事亦難家至戶到誡飭但要以自儉約化之朕嘗聞前時内庫有兩領錦暖子其上飾以金烏一領𤣥宗皇帝幸溫湯時著一領與楊貴妃著當時貴重如此如今奢靡豈復貴之料今富家亦應徃徃而有石曰毛玠為吏部尚書性本清儉時人尚不敢鮮衣羙食况萬乗之留情故可便為一時之法帝曰周孔文武之業後猶陵遲亦可歎也石又言曲江亭比奉詔令百司修造今将興功更候進止帝曰且止石曰開元之時亭臺至盛今將傚之未知可否帝曰在開元之際天下太平過有興役已是當時末事豈為宜哉石又曰請於舊亭子兩邊令京兆府量造小屋餘請停罷廻充舘工并昨所被誅戮數家家資器用并請勅度支送官司充用宰臣退帝命起居郎鄭朗等適所紀録者將來一觀鄭朗對曰臣執筆所紀便自為史臣聞自古帝王不合觀史帝曰故事何在朗曰臣不敢逺徵故實嘗聞太宗皇帝欲親覽國史用知得失諫議大夫朱子奢上表云史官所述義歸盡善若至曾𤣥已後或非上智中主庸君飾非䕶短見極陳善惡史官何地逃刑又聞褚遂良對曰今之起居古之左右史以記人君言行善惡必書庶㡬不為非法不聞帝王躬自觀史帝又謂朗曰適來所紀自是直書未有否臧一見無爽朗乃進所紀帝畧覽曰卿宜門外重寫録進來其日晚内出詔宣示宰臣曰適來鄭朗等奏朝來所紀之事擬不進本人君之言良史善惡必書或有平生之閑話不關理道之體要垂諸將來實為愧耻異日臨朝庶㡬稍改何妨一見得戒醜言開成初帝御紫宸殿石與鄭覃等進曰陛下改元御殿中外寧謐全放京兆府一年租稅又停天下四節度進奉恩澤所該實當要切近年赦令皆不及此帝曰朕務行其實不欲崇長空文覃曰在守之而已石曰赦書須内置一本陛下時看之又十道黜陟使去日更付與公事根本令向外與長吏詳擇施行方盡利害之要帝召監倉御史問太倉粟數御史崔虞對曰見粟有二百五十萬石帝曰無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國今約嵗費不少而所蓄非多深可軫慮石曰京畿頻旱無以添置待至來年徵西稅麥時納麥榖時納榖自然國蓄漸實人亦樂輸帝曰如今用粟處且給假錢來年折納務優農人覃曰若不優之折納為害石又奏涇陽水利方春作時請禁碾磑秋冬水閑任却動用覃曰務農乃厚其本也游手末作自當禁止帝曰百司弛慢要須條舉因指御爐曰此物始亦華好用之既久乃無光采若不修飾何繇復初石曰百司皆有官長在陛下各責其事而已覃曰丕變風俗當考實效晉時嵇阮之流竟何禆益帝曰阮籍居母䘮飲酒食肉隳紊禮教覃曰三十年以來不務實事相尚為顔黄石曰此本因理平人人無事安逸所致今之民俗但逺慕王夷甫耻不能及帝曰卿等輔朕為理必在振舉法度法者三王之鞭策乗馬不執鞭策可望致逺乎鄭覃李石謝石曰陛下撫念萬方形於憂歎臣等雖甚駑庸敢不力奉聖志湖南觀察使盧周仁奏請進羡餘見錢二萬貫雜物八萬貫覃以為不可受恐朝廷生好貨之風有土者率相效尚則侵削之患多矣不如還之使代貧下征徭帝深嘉之二年前秘書監吴士矩以任江西日加給將士糧料貶蔡州别駕己丑帝御紫宸謂宰臣曰吴士矩初至洪州在庫錢二十萬貫今交割所奏止有九萬貫不可不就洪州推按石曰士矩擅有添給誠合推窮以其闗渉衆多恐懐連累之懼臣所以請先事貶官今口語不息事須更盡理按問軍人情狀難保須為之防故前推董昌齡追至梧州後處置蕭洪亦追離本道帝然之因許就東臺推鞫帝又問王晏平冐没官馬百匹及器甲事覃石言方鎮因縁寵任侮易朝章若法在必行亦宜革之有漸楊嗣復為相開成中文宗問宰臣曰人言䜟辭豈實有乎嗣復曰光武好䜟多以䜟決事於是䜟書大行為後代笑班叔皮書著王命論以止庸妄姦亂者之心李班曰䘮亂之時佐命者務稱符命致理之代只合推諸人事帝然之帝又謂宰臣曰南朝唯以寫經造佛為功徳此豈謂功徳邪嗣復曰古稱博濟生人謂之功布澤無私謂之徳彼豈足稱功徳莫大於濟生人徳及後嗣宜哉帝又謂宰臣曰少有如今日四方無事時班曰譬如人四體平和常將息如恃之自忽即病立至亦繇朝廷常於無事時尤須思政求理即必無患嗣復曰苞桑之戒誠不可忘所謂亂者有其理亡者有其存帝曰朕在位十四五年無功無徳幸遇天下無事固不敢望貞觀開元嗣復曰自古帝王但能認得所遇之時即好陛下今日不在更思開疆拓土勿以為不足然亦不可便謂已足更慮須益兢戒帝曰嗣復所言是定朕心帝又謂宰臣曰天后朝用人自布衣便與宰相當時還得力否嗣復曰天后朝與今日事異深行刑辟輕用官爵乃自圖之計才若厯試方見其用當艱難之時則要㧞擢今既無事且循資級古人云三綱失序㧞士為相四夷交侵㧞卒為將此葢不得已之時非理平之事時姚朂初除省郎左丞韋溫不放上帝問宰相韋温不許姚朂上何如嗣復曰韋溫志在銓擇清流姚朂亦不聞有缺落事行自殿中授職鹽鐡元崇之孫復有公才今乃奬之如有公才即不為清流恐無人作官有似衰晉之風嗣復曰使府判官今人數猥多徒有縻費臣欲條流帝曰莫限及才人否嗣復曰有人才自别但澄去滓弊者菁華自出帝曰蕭復為相難言者必言貞正之相也卿其志之李德裕為相㑹昌五年六月奏云臣等按史記仲尼在位聽獄訟文辭有可與人共者不獨有也伏見漢魏已來朝廷大政必令公卿奏議講求理道博盡羣情所以政必有經人皆務學著在史策粲然可觀臣等商量如有事闗禮法羣臣疑滯者望各令本司申尚書都省下禮官學官詳議見意不同者任為别狀如是刑獄亦令法官同議然後丞郎已下詳其可否聞奏如郎吏有能駁難者皆許上聞並須先據經義其次取正史前賢故事不得自為意見言渉浮華如禮官學官才識出人議論精當向後擢授臺省官郎吏即别與遷擢所冀漢魏之風復行今日從之十一月又奏云臣等聞恤貧寛疾著於周典無告常餒存于王制國朝立悲田養病置使専知開元五年宰臣宋璟蘇頲奏所稱悲田乃關釋教此是僧尼職掌不合定使専知請令京尹按此分付其家𤣥宗不許至二十二年十月斷京城乞兒悉令病坊收管官以本錢收利給之今縁諸道僧尼盡已還俗悲田坊無人主領必恐貧病無告大致困窮臣等商量緣悲田出于釋教並望改為養病坊其兩京及諸州各于子録事耆夀中揀一人有名行謹信為郷閭所稱者専令勾當其兩京望給寺田十頃大州鎮望給田七頃其他諸州望委觀察使量貧病多少給田五頃以充粥食如州鎮有羡餘官錢糧與置本收利最為穏便若能如此方圓不在給田之限從之十二月又奏云臣等每蒙延英召對獲聞聖言嘗欲朝廷尊臣下肅此是陛下深究為理之本伏以管仲古之大賢明于理國其言可以為百代之法管仲云凡國之重器莫重于令令重君尊則國安故安國在乎尊君尊君在乎行令明君察于理人之本莫要于令故曰虧令者死益令者死不行令者死不從令者死四者死而無赦又曰令雖在上而論可與不可者是上失其威下繫於人也自太和已來其風大弊令出于上非之者在下此弊不除無以理國事韋𢎞質所論宰相不合兼領錢榖臣等敢以事體聞奏昔漢相衡云所以為大臣者國家之股肱萬姓所瞻仰明王慎擇也傳曰下輕其上賤人圖柄則國家揺動而人不静今韋𢎞質受人教導輙獻封章是則賤人圖國柄矣臣等又以蕭望之是漢朝名儒重徳為御史大夫奏云今首嵗日月少光咎在臣等上以望之意輕丞相乃下侍中御史中丞詰問又貞觀中監察御史陳師合上書云人之思慮有限一人不可兼總數職太宗云此妄有毁謗欲離間我君臣流師合於嶺外又聞諸賈誼云人主之尊譬如堂羣臣如陛衆庶如地故陛有級㢘逺地則堂髙陛無級㢘近地則堂卑亦繇将相重則君尊其勢然也如宰相姦謀隠慝則人人皆得上論至於制置職業固是人主之柄非小人所得干議古者朝廷之士各守其官思不出位韋𢎞質賤人豈得以非所宜言上黷明主此是輕宰相矣後漢大學諸生頗干時政其時謂之處士横議皆是亂風深要懲絶伏望陛下知其姦計從朋黨而來每事明察遏將來之漸則朝廷安静邪黨自消臣等不勝感憤望時賜省覽又奏伏見天寶已前中書舍人六員除機宻遷授之外其他故事皆同商量宰臣姚崇奏云事有是非理均與奪人心既異所見或殊御史雷同情有不盡臣既居官長望於狀後畧言事理優劣奏聽進止自艱難已來務從權便政頗去於臺閣事多繫於軍期決遣萬機事在宰弼伏以陛下神武功成昩旦思理精覈庶政在廣詢謀詩云不愆不忘率由舊章前漢魏相每觀故事以為古今異制方在奉行故事已數條漢興已來國家便宜行事奏請有司支遣錢糓等外臺閣常務闗於沿革州縣奏請繫於典章及刑獄等并令中書舍人依故事商量臣等詳其可否當别聞奏從之鄭畋僖宗朝為相乾符五年黄巢起曹鄆南犯荆襄東渡江淮衆號百萬所經屢䧟郡邑六年五月陷安南府據之致書與浙東觀察使崔璆求鄆州節鉞璆言賊勢難圖宜因受之以絶北顧之患天子下百僚議初黄巢之起也宰相盧㩦以浙西觀察使高駢素有軍功奏為淮南節度使令扼賊衝尋以駢為諸道行營都統及崔璆之奏朝臣之議有請假節以紓患者畋採羣議欲以南海節制縻之攜以始用高駢欲其立功以圖勝攜曰高駢將畧無雙淮土甲兵甚鋭今諸道之師方集蕞爾饑冦不足平殄何事捨之示怯而令諸軍解體邪畋曰巢賊之亂本因饑嵗人以利合乃至實繁江淮已南薦食殆半國家久不用兵士皆忘戰所在節將閉門自守尚不能支不如釋咎包容權降恩澤彼本以饑年利合一遇豐歲孰不懐思郷土其衆一離則巢賊几上肉耳此所謂不戰而屈人兵也若此際不以計攻全恃兵力恐天下之憂未艾也羣議然之左僕射于琮曰南海有舶之利歲貢珠璣如令妖賊所有國藏漸當廢竭帝亦望駢成功乃依攜議及中書商量制勑畋曰妖賊百萬横行天下高公遷延玩冦無意剪除又從而保之彼得計矣國祚安危在我軰三四人畫度公倚淮南用兵吾不知稅駕之所矣攜拂衣而起袂染於硯因投之僖宗聞之怒曰大臣相詬何以表儀四海二人俱罷知政事以太子賔客分司東都廣明元年賊自嶺表北渡江浙虜崔璆陷淮南郡縣高駢止令張隣控制衝要閉壁自固天子始思政畋前言二人俱徵還拜畋禮部尚書後唐莊宗同光二年四月中書奏諸道節度防禦刺史各著功名並全忠孝洎䝉昇奬皆荷渥恩雖萌為治之心未展分憂之效况聞藩府不可以久虚侯伯不可以久闕藩府虛則兵不輯侯伯闕則化不行繇此觀之為務甚急請令歸本任不奉詔㫖不得輙離治所從之是時諸藩府連帥或屯師于邉或在闕下皆遣人權典後事人望既卑法多聚斂時議甚危之宰相故有是奏帝雖依允終却遲留及王室危難釁起鄴都皆由此也趙鳳明宗天成三年為中書侍郎平章事時車駕將幸大名而六師家口纔自雒陽遷於汴水亟聞師動初有難色及至百官上表聖慮未廻頗有狂說定州王都正多疑慮人情相恐軍士惶惑在位咸不敢言鳳手疏於樞宻使安重誨直諭其事重誨自驚具白於帝翌日詔罷行期内外謐然安帖王建立為右僕射中書侍郎同中書門下平章事天成三年五月以時所急務陳六條以奏之其一以南北節氣有殊賦稅起徵無别請不預定月日但考其年終殿最其二請不令省使差人徵督州縣乞明以賞罰委於長吏其三以藩侯郡守頻有替移州縣以迎送為勞牧伯無化治之意請立考限其四請所在倉塲許每斗加納三合為雀䑕之耗其五以凡於内班差使臣請選其夙舊或諳練事體者充免取笑於四方實有辱其君命其六諸道軍職唯守本處轉遷乞罷宣補之命奉勑皇王宣政侯伯分憂薄賦輕徭方為濟物迎新送故必恐擾人徵賦以不虐黎庶為先銜命以不辱朝廷為貴乃至藩方職列無非戮力奉公各有區分不令踰越朕自臨大寳每尚淳風動不疑人静惟恭已中外無間上下相勸建立既列台司兼權邦計所述否臧之事皆窮利病之源情切參禆理當俞允宣准徃例州縣官三十月為限刺史以二十五月為限仍以到任日為數其節度使以山河是託與牧宰有殊繫自朕懷難拘常限若頻有除替何暇葺綏宜仍舊餘依所奏馮道為中書侍郎平章事天成三年七月帝延宰臣於便殿道曰數州霖雨雖秋稼以傷時物皆賤邊鄙河水泛漲契丹未可南顧閏八月延宰臣於𤣥徳殿道又以居安思危有始有卒申於鑒誡四年五月帝問宰臣曰時事如何道對曰時熟人安帝曰此外如何道曰陛下淳徳上合天心臣聞堯舜之君人所慕之桀紂之主人皆惡之葢為有道無道也今陛下恭修儉徳留心治道民無徭役故相與言曰堯年舜日不過人安俗阜爾自貞觀十年已後魏徵等奏太宗曰願當如貞觀之初臣今亦願陛下嘗思登極之初則天下幸甚八月帝御中興殿道奏往年淄州四縣水損田省司額定租稅州使徵督甚急以至戶口流散今嵗特宜優恤從之戊午帝御中興殿對宰臣論時政何者為切道對曰務惜生靈為切臣記近代詞人為古調詩云二月賣新絲五月糶新粟救得眼前瘡剜却心頭肉我願君王心化作光明燭不照綺羅筵偏照逃亡屋此詞義雖淺規諫道深臣諷誦之實覺有理帝深納之九月戊寅帝御中興殿又顧謂宰臣曰時事近日何如道奏曰臣省事已來無嵗不聞戰伐葢政令不一王綱弛紊伏自陛下纂隆五載服之以武威懐之以文徳任賢不二去邪不疑天下歸心人知耻格近歲已來可謂無事趙鳳進曰詩云靡不有初鮮克有終願陛下常保此道始終則運祚無窮矣長興三年三月帝顧謂宰臣曰春雨稍多久未晴霽何也道對曰水旱作沴雖是天之常道然季春行秋令臣之罪也更望陛下廣敷恩澤久雨無妨於聖政也四年二月帝對宰臣於中興殿道奏曰新授尚書令秦王昨向中書領事禀承睿訓其徳日新每日朝謁五鼓待漏左掖門夫親賢國之基本臣聞古人有善為師𫝊教𨗳太子者太子食有邪蒿師傅遽命去之曰其名不正不可以食太子蒿非邪也但惡其名况人事乎臣思莊宗皇帝二十年血戰定天下而不修徳政三載覆亡郭崇韜輔佐先朝又不喜見創業勲舊夫國以人為本今之親人者節度刺史令録而已得其人則治非其人則亂不可不慎選書云若蹈虎尾渉于春氷日慎一日唯陛下安不忘危治不忘亂而已矣十月以上尊號應在朝文武臣僚並宜加恩其有八月四日已後遷官者不在此限時上㫖欲徧與百寮轉官而道等以為轉官須論資考乃奏叙階勲而已盧文紀為中書侍郎平章事末帝清泰元年上疏曰臣聞事君盡忠孔子激揚於直道無功受禄周詩譏諷於曠官敢因災沴之時輙貢傾輸之懇臣伏見比年以來朝廷多故人事則兵喪禍亂天時則水旱蟲霜若非陛下拯溺救焚移災作福則生靈受弊宗社何依今則區宇甫寧人神胥恱但以自憂愆陽及秋霖雨雖勞聖慮過切閔傷葢屬當否數之辰尤費消禳之力雖斯民鮮福亦天道使然為君之難實見于此臣聞沉潜剛克髙明柔克是君宜執柔以御下臣當剛正以報君則冀上下和平君臣訢合臣思徳宗初置學士本不以文翰是供葢獻納論思朝夕延問至於給諫遺補之職是曰諫官月請諌紙時政有失無不極言望陛下聽政之餘招召學士諌官詢謀政道俾獻讜言明書黜陟之科以責語言之效書云乂時𤾉若肅時雨若以洪範言之繫於君徳臣請嚴禋於宗廟社稷精禱於岳瀆神祗進忠良退不肖除冦盗恤惸􅄔慎刑罰明舉選任賢勿貳去邪勿疑王道砥平無偏無黨中外除改請守舊規長興四年已前勑命繁碎者請重選擇如新勑不及舊章更請却依前代如舊章不如新勑便釐革施行倘不阻於奏陳庶漸臻於治體詔曰盧文紀早踐班行迭更顯重動惟稽古言必為時當朕求治之初首居輔弼之位能竭事君之節以申報國之勞引經義而究其本根合時事而先於條貫請宣學士兼召諌臣言隂陽序理之端人事調和之本又嚴修祀典精事神祗宜令有司依奏䖍潔所云進忠良而退不肖除冦盗而恤惸􅄔雖責在朕躬亦資於調爕刑法舒慘宜令大理寺御史臺明慎詳讞勿至寃誣選賢退愚宜令三銓選部精覈慎選所冀得人新舊制勑宜令御史臺與三司官員詳擇以聞二年又上疏曰臣近䝉召對面奉天㫖凡軍國庶事利害可否卿等位居輔弼并合盡言臣等仰承詔諭退自省循時遇休明名叨輔弼才器不能經綸庶務智術不能康濟大猷致陛下宵旰於丕圖憂勤於治道有靦面目待罪巖廊尚沐宸慈猶寛册免莫不克心自勵俛首深惟願竭愚鄙之誠少副昭回之鑒臣聞古先哲王樂聞已過道塗立誹謗之木門庭樹告善之旌從諫如流聞議能服所以卜年長久享祚無窮陛下自纉邦家克敦慈儉守先皇仁政遵列聖彞章人樂和平政皆畫一天無祲沴之象地無變怪之妖日月無爽於虧盈星緯不差於躔次襞諫紙者無詞可措持皂囊者無過可規凡百庶寮奉職不暇臣伏覽貞觀故事見魏徵馬周之章疏王珪劉洎之奏論或講貫古今或鋪陳政術皆萬代之長策非一介之狂言茍異經謀何名獻納臣等伏計宸算圖度者必以嶺嶠未平島夷猶梗巴梁恃險井絡纒妖鮮卑尚撓於邉陲將帥未施於方畧臣等以為非獨人謀未至亦恐天意使然聲教茍孚廓清何晚臣略以前事明之何者即如漢高前代之英主也一劔初奮於彭城五年方誅於項籍洎南平英布北扞匈奴解曰登之圍避栢仁之難凡十餘年親當矢石乃混車書如太宗文皇帝本朝之聖祖也自起義太原佐命髙祖乃定江南之草竊殄隴右之陸梁禦突厥於便橋擒公祏於京口凡十餘年櫛風沐雨命將出師方得華裔向風寰區無撓伏念陛下爰從踐祚纔歴一朞雖乃聖乃神不下於漢髙文祖而且耕且戰更詳於人事天時侔武王一舉蕩平體句踐十年教戰若治兵之至要御衆之大端攻必取而守有餘戰必勝而卒無怠發號出令保大定功俾軍戍咸憚於機權部校皆存於信義驅之可以蹈湯火使之可以為蟲沙此則聖謀懸料於彀中神䇿已包於術内何假芻蕘小軰草野凡生持蠡妄測於滄溟側管强窺於穹昊不量事體虚費莠言故論語載仲尼治衛必也正名言順事行勿容苟且名言之際聖哲攸艱况在凡常豈宜容易思出其位古人所非臣等謬處台衡奉行制勅但縁事理互有區分軍戎不在於職司錢榖非關於局分茍陳異見即類侵官况才不濟時識非經逺因五日起居之例於兩班旅見之時畧獲對􅆒兼承顧問此際衛士周環於階陛庶臣羅列於殿庭四面聚觀十手所指臣等茍欲伸愚短此時安敢敷陳韓非昔懼於説難孟子亦憂於言責臣竊惟本朝故事肅宗初平冦難再復寰瀛頗經涉於艱難尤勤勞於委任每正衙奏事則泛咨訪於羣臣及便殿詢謀則獨對揚於四輔自上元元年後於長安東置延英殿宰臣如有奏議聖㫖或有特宣皆於前一日上聞及對御之時只奉冕旒旁無侍衛獻可替否得曲盡於討論捨短従長故無虞於漏洩君臣之際情理坦然伏望聖慈俯循故事或有事關軍國謀而否臧未果决於聖懐要詢訪於臣軰則請依延英故事前一日𫝊宣或臣等有所聴聞切關利害難形文字須面敷􅆒臣等亦依故事前一日請開延英當君臣奏言之時祇請機要臣寮侍立左右兼乞稍霽嚴顔恕臣荒拙雖乏鷹鸇之効庶盡葵藿之心恭惟陛下睿略縱横天機沉􅃉臣等以愚智而干聖智以凡情而測聖情如螢爝比耀於烏蟾畎澮争流於江海然而天覆地載君義臣行持祿取容即見議於物論有犯無隱慮不惬於聖懐既顯奉徳音俾令奏對合披愚欵先瀆宸聰詔曰朕聞宫鳴商應則律吕和君唱臣隨則邦家理興化之本百代同歸朕顧惟𦕈沖獲奉基搆慮生靈之未泰憂政教之不明旰食宵衣未嘗暫暇副我焦勞之意屬於輔相之臣卿等濟代英才鎮時碩徳或締搆於興王之日或經綸於贊聖之時鹽梅之任俱存藥石之言並切請復延英之制以伸議政之規而況列聖遺芳皇朝盛事載詳徵引良切嘉歎恭惟五日起居先皇垂範俟百寮之俱退召四輔以獨昇接以温顔詢其理道計此時作事之意亦昔日延英之流朕叨獲嗣承切思遵守將成具美不爽兼行其五日起居令仍舊尋常公事亦可便舉奏聞或事屬機宜理當宻秘量事𦂳慢不限隔日及當日便可於閤門祗候具榜子奏聞請面敷􅆒即當盡屏侍臣端居便殿佇聞髙議以慰虚懐朕或要見卿時亦令常侍宣召但能務致理之實何必拘延英之名有事足可以討論有言足可以陳述宜以沃心為務勿以逆耳為虞勉罄謀猷以禆寡昧張延朗為相兼判三司清泰二年上表曰臣濫承雨露擢在均衡兼叨選部之衘仍兼計司之重况中省文章之地洪罏陶鑄之門臣自揣量何以當處是以繼陳章表叠貢情誠乞寖眷恩免貽朝論豈謂御批累降聖㫖不移決以此官委臣非器所以强收涕泗勉遏怔忪重思事上之門細料進忠之路竊以位高則危至寵極則謗生君臣莫保於初終分義難防於毁譽臣若保兹重任忘彼至公狥情而茍免是非固寵而偷安富貴則内欺心府外負聖朝何以報君父之大恩望子孫之延慶臣若但行王道唯守國章任人必取當才決事須依正理確為形勢堅塞倖門則可以振舉宏綱彌縫大化助陛下含容之澤彰國家至理之風然而讒邪者必起憾詞憎嫉者寧無謗議或慮至尊未悉羣謗難明不更拔本尋源便使甘瑕受玷縱臣心可忍臣耻可消只恐山林草澤之人稱量聖制冠履軒裳之士輕慢相廷臣又以國計一司掌其經費利權幹務職在捃收將欲養四海之貧民無過薄賦贍六軍之勁卒又在豐儲利害相隨取與難酌若使罄山採木竭澤求魚則地官之教化不行國本之傷殘益甚取怨黔首是瀆皇風况諸道所徵賦租雖廣數額時逄水旱或遇蟲霜其間則有減無添所在又申逃係欠乃置軍儲官俸常急急於供須夏稅秋租每懸懸於繼續况今内外倉庫多是罄空逺近生民或聞饑歉伏見朝廷尚添軍額更益師徒非時之博糴難為繫日之區分轉大切慮年支有闕國計可憂望陛下節例外之破除於諸額之儉省不添冗食且止新兵務急去繁以寛經費減省從儉漸俟豐盈則屈者知恩叛者從化弭兵有日富俗可期臣又聞治民尚清為政務易易則煩苛並去清則偏黨無施若擇其良牧委任正人則境内蒸黎必獲蘇息官中倉庫亦絶侵欺伏望試見在之處官無乖撫俗擇將來之莅事更審求賢儻一一得人則農無所苦人人致理則國復何憂但奉公善政者不惜重酬昩理無功者勿頒厚俸益彰有道兼絶狥情伏望陛下念臣布露之前言閔臣驚憂於後患察臣愚直杜彼讒邪臣即仰副天心不防人口庶㡬萬一少答聖明帝優詔答之召於便殿謂之曰爾所論奏深中時病朕於恩澤之中不無假借添置軍旅比縁戎事近細思之於事無益形之切言深賴救朕之失國計事重日得商量無勞過慮也晉和凝為中書郎平章事高祖將幸鄴都時㐮州安從進反狀已彰凝乃奏曰車駕離闕安從進或有悖逆何以待之帝曰卿意如何凝曰以臣料之先人有奪人之心臨事即不及也欲預出宣勑十數道宻付開封尹鄭王令有緩急即旋填將校姓名令領兵擊之帝從之及聞唐鄧奏報鄭王如所勑遣騎將李建崇監軍焦繼勲等領兵討焉相遇於湖陽從進出於不意甚訝其神速以至於敗由凝之謀也册府元龜卷三百十四
