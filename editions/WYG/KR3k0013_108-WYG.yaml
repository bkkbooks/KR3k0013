body:
  text: 册府元龜卷一百八宋王欽若等撰帝王部朝㑹第二唐敬宗以長慶四年正月即位二月辛巳縗服受羣臣謁見於紫宸門外之西廊丁亥詔宜令三月三日御丹鳳樓仍令所司准式辛丑御紫宸殿羣臣初展入閣之儀五月詔停諸親王端午叅賀十月癸巳禮儀使奏來月二十三日冬至准故事山陵未祔廟並不合行慶賀之儀其朝賀皇太后請停又十二月乙未勅來年正月一日朝賀宜權停寳歴二年正月己巳朔御含元殿受朝賀文宗太和元年十一月甲申日南至宰臣率百官洎外命婦詣興慶宫及光順門行朝賀之禮其年不朝㑹准詣興慶宫光順門史闕文下同此是月中外進獻賀冬如常嵗二年正月戊午朔權停朝賀文武百寮及命婦並赴興慶宫及光順門起居太皇太后義安皇太后十一月己丑日南至宰臣及百寮詣興慶宫光順門進名起居三年五月乙酉以滄州李同㨗平百寮稱賀于宣政殿十一月辛巳冬至朝賀與郊祀並停四年正月丙子朔權停朝賀之禮中書門下及文武百寮赴興慶宫及光順門奉賀太皇太后皇太后如常儀五年正月庚子朔以隂雨連旬罷元㑹之禮十一月壬辰勅隂雪未晴其明年正月一日朝賀宜權停六年正月乙未朔以前詔廢元㑹七年正月乙丑朔御含元殿受朝賀禮畢百寮赴興慶宫賀太皇太后義安太后光順門賀皇太后比年以大雪未行元㑹之儀至是文武大備中外慶恱十一月癸丑朔乙卯日南至宰臣文武百寮及命婦赴興慶宫賀太皇太后義安太后迴赴光順門賀皇太后八年正月癸丑百寮延英進名起居又詣光順門賀皇太后興慶宫賀太皇太后義安太后十一月庚申日南至宰臣率百寮等奉賀如常儀九年正月丁未朔權停朝賀之禮宰臣率百寮詣興慶宫賀太皇太后義安太后光順門賀皇太后開成元年正月己酉詔以入閣日次對官班退立於東堦松樹下須宰臣奏事畢齊至香案前各言本司事左右起居又待次日對官奏事畢方出二年正月乙丑朔權停朝賀之禮宰臣率百寮赴興慶宫賀太皇太后義安太后復列班於光順門賀皇太后十一月丙子日南至百寮及命婦並赴南内起居太皇太后義安太后迴赴光順門起居皇太后三年正月庚申朔權停朝賀之禮宰臣及文武百寮於南内進名奉賀太皇太后義安太后迴於光順門進名賀皇太后如常儀懿宗咸通七年正月戊寅朔以太皇太后䘮罷元㑹十年正月乙未朔以徐泗用兵罷元㑹昭宗天復二年十一月詔曰漢宣帝中興五日一聴朝歴代通規永為常式近則不循往儀因此别為制度既奸邪之得計致臨視之失常須守舊規以循國制宜每月只計一五九日開延英計九度其入閣日仍於延英一度内指揮如或有大段公事中書門下具牓子奏請開延英不係數日事十二月勅宫嬪女職本備内任近年以來稍失儀制宫人出内宣命寀御叅随視朝乃失舊規須為永制今後每遇延英坐朝日只令小黄門祗候引從宫人不得擅出内門庶循典儀免致紛雜三年五月中書門下文武百寮舊制每月一度入閣于貞觀殿朝叅勅曰貞觀大殿朝廷正衙遇正至之辰受羣臣朝賀俾循規制須有指揮其入閣自今後宜令宰臣文武百寮于崇勲殿候對十一月文武兩班官貟每遇一五九朝日元帥朱全忠請排廊飡詔曰百寮入朝兩廊賜食遷都之後所司闕供元帥梁王欲整大綱復行故事罔思勞費悉自再圗是使端簡在庭咸思感恱峩冠就列益任優隆備覩寵規彌増欽歎宜賜詔奬飭仍付所司哀帝天祐二年四月勅自今年五月一日後常朝出入取東上閤門或遇奉慰即開西上閤門永為定制後唐莊宗同光元年十一月丁未日長至帝不受朝賀百官詣東上閤門拜表稱慶議者以為長至元㑹嵗中之大朝斯為盛禮著於令式是日合陳樂懸排細仗一人當陽昭國容也兵興以來而斯禮或闕帝初一函夏不復唐典無故輟禮議者惜之十二月中書門下奏毎日常朝百官皆拜獨兩省官不拜准本朝故事朝退於廊下賜食謂之廊飡百寮遂有謝食拜唯兩省官本省有厨不赴廊飡故不拜伏自僖宗幸蜀迴以多事之後遂廢廊飡百官拜儀至今未改將五十載禮恐難停唯兩省官獨尚不拜豈可終日趨朝曽不一拜獨於班例有所異同若言官是近臣於禮尤宜肅敬起今後逐日常朝宣不坐除職事官押班不拜外其兩省官與東西兩班並齊拜從之二年正月庚子朔帝衮冕御明堂殿受朝賀太常樂左右金吾仗六軍諸衞如常儀是月庚申四方館奏常朝諸職貟多有叅雜今後除随駕將挍外方進奉專使文武兩班三品以上官可於内殿對見其餘並詣正衙以申常禮從之七月戊戌朔帝御文明殿視朝八月癸巳宣㫖放三日朝叅以霖雨甚故也十一月乙未朔帝御文明殿視朝三年正月甲午朔帝御文明殿受朝賀如常儀是月庚子車駕幸鄴都庚戌車駕至鄴都帝自千秋亭乘輦備法駕晡晩歸宫辛亥帝御武徳殿受朝賀以百官扈從之勞放十九日至二十日朝叅三月癸巳朔車駕在鄴帝御武徳殿視朝是月車駕還雒都六月壬戌朔帝御文明殿視朝癸酉勅泥塗稍甚放文武常叅三日丁亥以霖雨放朝七月乙未勅霖雨未止泥塗頗甚宜放五日六日朝叅戊戌勅泥塗頗甚放八日九日朝叅丁亥以霖雨放朝八月己丑勅比聞天津橋未通往來百官以舟舩濟渡因兹傾覆兼踣泥途自今文武百官三日一趨朝宰臣即每日中書視事閏十二月己丑朔帝御文明殿視朝四年正月乙亥勅風雪稍甚宜放三日朝叅明宗天成元年四月入雒陽甲申始御文明殿改元肆赦五月丁巳内出御劄一封賜宰臣曉示文武百寮每日正衙常朝外五日一度赴内殿起居宰臣百官班於文明殿庭謝其中書非時有急切公事請開延英不在此限乙酉勅每月十五日賜廊下食本朝承平時常叅官每日朝退賜食廊下謂之廊飡自乾符亂離以後庶事草創百司經費不足無每日之賜但遇月旦入閣日賜食帝初即位始因諫官疏奏請文武百寮五日一起居見帝於便殿李琪以為非故事以五日為繁請每月朔望日皆入閣賜廊下食罷五日起居之儀至是宣每月朔望皆入閣依奏五日一度起居不得停廢遂以為常七月乙卯朔帝御文明殿視朝八月壬辰以積雨泥甚放百寮朝叅己亥帝御文明殿百官入閣如月朔之儀従新例也九月丙辰帝御文明殿入閣新制次日例也十月甲申朔帝御文明殿視朝己亥帝御文明殿對南詔蠻兩林鬼主等百寮稱賀是月右拾遺曹珍上疏内一件百寮朔望入閣及五日一度内殿起居請許三署寺監官輪次轉對奏事従之十一月甲寅朔帝御文明殿癸亥日南至帝御文明殿百寮稱賀十二月甲申朔帝御文明殿見百寮二年正月癸丑朔帝被衮冕法服御明堂殿百寮稱賀文物仗衞禮樂如常儀丙申詔曰君使臣以禮臣事君以忠禮不可一日不修忠不可一夕不念二者全則上下順一途廢則出入差須振綱維以嚴規矩凡在䇿名之列皆知辨色之朝儻不夙興是虧匪懈君上思政猶自求衣未明為下服勤固合假寐待旦宜令御史臺徧示文武兩班自此每日早赴朝叅職司既得整齊公事的無壅滯如或尚兹懈怠具錄奏聞三月壬子朔帝御文明殿視朝四月乙未帝御文明殿視朝五月辛亥朔帝御文明殿視朝戊辰帝御文明殿視朝六月庚辰朔帝御文明殿視朝甲午帝御文明殿受朝七月庚戌朔帝御文明殿視朝戊辰帝御文明殿受朝甲戌百官朝於中興殿八月庚辰百官朝於中興殿癸巳帝御文明殿視朝九月庚戌帝御文明殿視朝庚申百官朝於中興殿癸亥帝御文明殿視朝丙子百官朝於中興殿十月己卯朔帝御文明殿視朝乙酉帝幸汴州甲午車駕在汴御崇元殿視朝十一月戊申朔帝御崇元殿視朝壬戌帝御崇元殿視朝戊辰日南至百官詣閤門拜表稱賀十二月戊寅朔帝御崇元殿視朝戊子百官朝於𤣥徳殿壬辰帝御崇元殿視朝三年春正月戊申朔帝御崇元殿受朝賀禮樂仗衞如常儀甲子帝御崇元殿視朝二月戊寅帝御崇元殿視朝丁酉百官朝於𤣥徳殿三月丁未朔帝御崇元殿視朝四月丁丑帝御崇元殿視朝五月乙巳朔帝御崇元殿視朝己未帝御崇元殿視朝六月甲戌朔帝御崇元殿視朝戊子帝御崇元殿視朝七月甲辰帝御崇元殿視朝八月癸酉帝御崇元殿視朝閏八月癸卯朔帝御崇元殿視朝九月甲戌帝御崇元殿受朝十月壬寅朔帝御崇元殿視朝丁未帝御崇元殿視朝壬戌中書奏按貞元四年中書侍郎李泌奏冬至日受朝賀請准元日從之十一月癸酉冬至帝御崇元殿受朝賀仗衞如式是月中書舎人劉贊奏往例應諸道節度使及兩班大寮凡對朝廷例合通喚近日全廢此儀伏乞特詔所司重定向來格品若合通喚准日施行尋准四方館狀稱舊例節度使新除中謝及罷任赴闕朝見合得通喚文班三品以上武官二品以上官新除中謝及使回朝見亦合得通喚従之丙戌帝御崇元殿視朝十二月丙午帝御崇元殿視朝癸丑中書以常朝宣奉勅不坐兩省官與東西班並拜宰臣不拜或聞班行所論承前日有廊飡百官謝食兩省即各有常厨從來不拜或曰以侍臣不拜檢尋故實不見明規百官拜為廊飡即承㫖合宣有勅賜食供奉官不拜亦恐非儀且左右前後之臣日面天顔豈可不拜况庶官見宰臣隔宿並拜實以赴朝不拜非禮也聞勅不拜亦非禮也所宜盡敬以奉君親臣等商量今後常朝宰臣亦拜通事舎人亦拜閣外放仗亦拜從之壬戌帝御崇元殿視朝四年正月壬申朔帝御崇元殿受朝賀仗衞如常儀二月壬寅帝御崇元殿視朝是月庚午車駕還雒三月己酉帝御文明殿視朝四月中書門下奏五月一日入閣起居准貞元七年四月二十八日勅昔者聖賢觀象因天地交㑹之次為父子相見之儀沿習成風古今不易王者制事在於因人酌其情而使中順其俗以為禮咸覿之義既行父子之間資事之情豈隔君臣之際自今後每年五月一日御宣政殿與文武百寮相見京官九品以上外官因朝奏在京者並聴就列宜令所司量定儀注頒示天下仍編禮式永著常規者伏以本朝舊制近代不行方當開泰之期難曠㑹同之禮宜興墜典以耀明庭五月一日應在京九品以上官及諸進奉使並准貞元七年勅就位起居自此每年永為常式者奉勅宜依五月己卯朔帝御文明殿視朝癸未帝御文明殿視朝六月戊戌朔帝御文明殿視朝壬子帝御文明殿視朝七月戊辰朔帝御文明殿視朝八月丁酉朔帝御文明殿視朝辛亥以霖雨甚宣㫖放入閣九月戊辰帝御文明殿視朝辛巳帝御文明殿見百寮十月丙申朔帝御文明殿視朝十一月丙寅朔帝御文明殿視朝己卯日長至帝御文明殿受朝賀樂懸仗衞如常儀十二月丙申朔帝御文明殿視朝長興元年正月丙寅朔帝御明堂殿受朝賀懸樂仗衞如常儀二月乙未朔帝御文明殿視朝是月郊祀畢丙辰勅宜放兩日朝叅以百官行事之勞故也四月丙午朔帝御文明殿視朝五月甲子朔帝御文明殿視朝七月壬戌朔帝御文明殿視朝庚寅詔諸州得替防禦團練使刺史並宜於班行比擬如未有貟闕可随常叅官逐日立班新例也八月壬辰朔帝御文明殿視朝十月辛卯帝御文明殿視朝十一月庚申日長至帝御文明殿受朝賀樂懸仗衞如常儀二年正月庚寅朔帝御文明殿受朝賀如常儀四月庚寅帝御文明殿視朝癸卯帝御文明殿視朝五月戊午朔帝御文明殿視朝閏五月戊子朔帝御文明殿視朝壬寅帝御文明殿視朝六月丁巳朔帝御文明殿視朝七月丙戌朔帝御文明殿視朝八月丙辰朔帝御文明殿視朝庚午帝御文明殿視朝癸酉詔文武百官五日内殿起居仍舊其輪次對宜停若有封事許非時上表朔望入閣待制候對一依舊制九月己亥帝御文明殿視朝十月乙卯朔帝御文明殿視朝十一月甲申朔帝不視朝先是司天奏朔日合日蝕二分伏縁所蝕之分數微少太陽光影相爍不辨虧缺伏請十一月一日不入閣百官不守司故不視朝己丑日長至帝御文明殿百寮稱賀十二月庚申左諫議大夫盧損上言前任節度刺史防禦等使請五日随例起居並從之三年正月癸未朔帝御明堂殿朝賀禮樂仗衞如式庚子帝御文明殿視朝二月甲寅帝御文明殿視朝戊申帝御文明殿視朝三月癸未朔帝御文明殿視朝羣臣入門遇雨而罷乙酉勅文武兩班毎遇入閣従官並賜酒食從前臺官及諸朝官皆在敷政門外兩廊下就食唯北省官於敷政門内既為隔門各不相見致行坐不齊難於整肅起今後毎遇入閣賜食北省官亦宜令於敷政門外東廊下設席以北為首待班齊一時就坐四月甲寅朔帝御文明殿視朝五月壬午朔帝御文明殿視朝六月己未勅以霖雨經旬街衢泥濘文武兩班宜放今月八日朝叅甲子朔勅放三日朝叅大雨故也八月庚戌帝御文明殿視朝九月己丑帝見羣臣於端明殿十一月己卯朔帝御文明殿視朝甲子日長至帝御文明殿百寮稱賀十二月戊申朔帝御文明殿視朝四年正月戊寅朔帝御文明殿百寮稱賀乙未帝見百寮於中興殿五月丙子朔帝法服御文明殿百寮具朝服稱賀庚寅帝見百寮於文明殿六月丙申朔帝御文明殿視朝丙寅帝見百寮於廣夀殿時帝不豫旬日至是稱平帝勤於聴政接臣下無倦九月甲戌朔帝御文明殿視朝十月甲辰朔雨不視朝十一月癸酉帝御文明殿視朝閔帝長興四年十二月癸丑朔即位其月辛未御中興殿羣臣列位時馮道升階進酒帝曰比於此物無愛除賔友之㑹不近樽斚况在沉痛之中安事飲啜命撤之應順元年春正月壬申帝御廣夀殿視朝其月戊寅帝御明堂殿仗衞如常儀宫懸樂作羣臣朝服就坐宣制大赦改元閏正月癸卯朔帝御文明殿入閣末帝清泰元年四月乙酉帝服衮冕御明堂殿文武百官朝服就列改應順為清泰是月庚寅中書門下上言太常以五月朔御明堂受朝三日夏至祀皇地祗前二日奏告獻祖室不坐比正旦冬至是日有祀事則次日受朝今祀在五鼓前質明行禮畢御殿在始旦後請比例行之詔曰日出御殿與祀事無妨宜依常年例五月庚子朔帝御文明殿視朝六月辛卯御史中丞張鵬奏文武常叅官入閣日廊下設食毎宣放仗拜後就食相承以為謝食拜臣以每日常朝宣不坐後拜退豈謝食之謂乎如臣所見自今宣放仗拜後且就次候將設食别降使於敷政門外宣賜酒食羣臣謝恩後食從之十月庚子太常言冬至不視朝百寮表賀是日太府設表案席褥禮部進表至閣門班首一貟跪表受閣門使羣臣俱拜舞蹈訖表入久之閣門使出宣曰履長之慶與卿等同之羣臣復拜舞訖而退十一月己巳御史臺奏前任節度防禦團練使等刺史行軍副使近儀五日一度内殿起居皆綴班叙立元係班簿雖曰便殿起居其遇全班起居時亦合綴班從之二年三月庚戌御文明殿羣臣入閣刑法官劇可久待制官李慎儀次對十二月戊寅太常言来年正月元日合御明堂受朝賀其日上辛祀昊天上帝于南郊以禮大祀不坐詔曰其祀事在質明前儀仗在日出後事不相妨宜依常年受朝三年春正月辛卯始御文明殿陳樂懸仗衞受朝賀班退進名賀皇太后三月庚子詔閣門陳内外官吏對見例應諸州差判官軍將貢奉到闕無例朝見以名御奏放門見賜酒食得回詔進牓子放門辭臣今後欲只令朝見餘依舊規應除諸道兩使判官推巡無例中謝奏過放謝放辭如得替歸京無例見臣欲今後除兩使判官許中謝門辭其書記以下除替請依舊規應文武朝官除受文五品武四品以上并中謝以下無例對謝以天成四年正月勅凡昇朝官新授並中謝欲以此例諸道節度使差判官軍將進奉到闕朝見候得回話下牓子奏過令門辭應諸道都押牙馬歩都虞候鎮將替到京無例見或在京受任無例中謝進牓子放謝放辭應諸道商稅鹽麴諸色務官或在京差補亦放謝放辭得替歸京亦無見例在京商稅鹽麴兩軍巡即許中謝應新除令録並中謝次日放門辭兼有口宣誡勵應文武兩班差弔祭使及告廟祠祭只於正衙辭見不赴内殿諸道差進奏官到闕得見以後請假得替進牓子放門亂已前六件望依舊例行従之晉髙祖天福元年十一月御北京崇元殿改元二年正月甲寅朔帝御文明殿受文武百寮朝賀三月己未御史臺奏唐朝定令式南衙常叅文武百寮每日朝退於廊下賜食謂之堂食自唐末亂離堂食漸廢仍於入閣起居日賜食每入閣禮畢閣門宣放仗羣官俱拜謂之謝食至偽主清泰元年中入閣禮畢更差中使至正衙門口宣賜食百寮立班重謝此則交失有唐堂食之意於禮實為太煩臣恐因循漸失根本起今後入閣賜食望不差中使口宣請准唐明宗朝事例處分從之四月丙午御史臺奏文武百寮每五日一度内殿起居在京城時百官於朝堂幕次自文明殿門入穿文明殿庭入東上閣門至天福殿序班令随駕百官自到行朝每遇起居日於幕次東出升龍門與諸色人排肩雜進自外繚繞方入内門臣竊見昇龍門外庭宇不寛人徒大集或是諸司掌事或是諸道使臣方集貢輸不可止約若令與衣冠雜進朝士並趨則恐有壊天官見輕朝序權時之義事理難安起今後每遇百官赴内殿起居日請依在京事體百官於幕次自正衙門入東出横門既恊京國常儀兼在行朝便穏從之庚戌御史臺奏文武百寮毎月朔望入閣禮畢賜廊下食在京時秪於朝堂幕次兩廊下今在行朝於正衙門外權為幕次房廊湫隘間架絶少伏恐五月一日朝㑹禮畢准例賜食即與幕次難為排比伏見唐明宗時兩省官於文明殿前廊下賜食今未審每遇入閣日權與正衙門内兩廊下排比賜食為復别有處分者勅㫖宜依明宗時舊規五月壬子朔帝御崇元殿備太常樂受文武百官朝賀六月甲午太妃將至行闕放文武朝一日十一月中書奏准唐貞元二年九月五日勅文官充翰林學士及皇太子諸王侍讀武官充禁軍職事並不常朝叅其在三館等諸職事者並朝叅訖各歸所務者自累朝以来文武在内廷充職兼判三司或帶職額及六軍判官等例不赴常朝元無正勅准近勅文武職事官未昇朝者按舊制並赴朔望朝叅其翰林學士侍讀三館諸執事望准元勅處分其在内廷諸司使等每受正官之時來赴正衙謝後不赴常朝大㑹不離禁廷位次三次職官免常朝唯赴大朝㑹其京司未昇朝官貟秪赴朔望朝叅帶諸司職掌者不在此例文官除端明殿翰林學士樞宻院學士中書省知制誥外有兼官兼職者仍各發遣本司供事可之三年正月戊申朔帝御崇元殿受朝仗衞如式五月丁未朔帝御崇元殿奏太常樂受文武百官二王後三恪皇親蕃客等朝賀十一月丙寅冬至帝御崇元殿受朝賀四年正月癸卯朔帝御崇元殿受朝賀仗衞如式五月壬寅朔帝受朝于崇元殿七月壬寅朔帝御崇元殿百官入閣如常禮朔不入閣日蝕故也閏七月庚子朔百官不入閣雨霑服也十二月丁酉朔百官不入閣大雪故也五年正月丁卯朔帝御崇元殿朝賀仗衞如式壬辰馮道奏曰宰臣朝見辭謝在朝堂横街之南逮至餘官則悉於崇元門内夫表著之列豈可踰之故古先明王必正其位服此實事因偶爾習以為常又入閣禮畢之時羣官退於門外定班如初俟宣放仗唯翰林學士前任郡守等不随百辟即時直出二者禮僣序失其使正之帝深然其言于是下詔曰官爵之班即分髙下見謝之位豈有異同宜格通規以為定制今後宰臣使相朝見亂謝並于崇元門内與諸官重行異位一時列拜假開横行即従舊例又入閣之儀序班為重宣喚則齊趨正殿放仗則各出朝門何起居之禮即同而進退之規有異其翰林學士及前任郡守等今後入閣退朝宜依百官班制十一月冬至帝受朝於崇元殿王公上夀六年春正月辛酉朔帝受朝於崇元殿七月己未朔帝御崇元殿視朝七年春正月丙辰朔帝不受朝賀用兵故也五月己亥中書門下奏時屬炎蒸事宜簡省應五日百官起居即令押班宰臣一貟押百官班其轉對官兩貟封事付閣門使引進本官起居後随百寮退不用别出謝恩其文武内外官寮乞假寧親搬家及婚葬病損並門見辭諸道進奉物等不用殿前排列引進使引至殿前奏云某等進奉奏訖其進奉物便出其進奉専使朝見日班首一人致詞都附起居州刺史并行軍副使諸道馬歩軍都指揮使以下差人到闕並門見門辭州縣官謝恩日甲頭一人都致詞不用逐人告官其供奉官殿直等如是當直及於合殿前排立者即入起居如不當直排立者不用每日起居委宣徽院専切㸃檢常須整齊從之少帝開運元年七月辛未朔帝御崇元殿八月癸卯倉部郎中知制誥陶榖奏内外臣寮正衙辭謝内則諸司小吏與宰相差肩外則屬郡末寮共元戎接武欲望宰臣使相依舊押班其郡牧藩侯臺省少監長吏等不得令部内本司卑冗官貟同班辭謝勅從其奏十一月乙亥吏部侍郎張昭逺奏文武常叅官每日於正衙立班閣門使宣不坐後百寮俱拜舊制唯押班宰相押樓御史通事舎人各緣提舉賛揚所以不随庶官俱拜自唐天成末議者不悉朝儀遽違舊典遂令押班之職一例折腰此則深忽禮文殊乖故實且宰相居庶寮之首御史持百職之綱嚴肅禁庭糾繩班列慮於拜揖之際或爽進退之宜於是凝立静觀檢其去就若令旅拜旅揖實恐非宜况事要酌中恭須近禮人臣愛主不在於斯其通事舎人職司賛導比者兩班進退皆相其儀今則在文班武班之前居一品二品之上端笏齊拜禮實未聞其押班宰相押樓御史通事舎人並請依天成三年以前禮例施行無至差忒殿中侍御史賈𤣥珪奏是非既異㳂革不同舉之則雖有舊規考之則全無故實且夫酌人心而致禮依神道而設教此乃經國之大端也况通事舎人居賛導之職押樓御史當糾察之司一則示於紀綱一則防於謬悞所以静觀進退詳視等威實非抗禮于庭所謂各司其局俾令不拜雅合其宜伏以宰相押班率千官而設拜起居内殿統百辟以致詞儀刑文武之班表式鵷鸞之列不得比賛導之職詎可同糾察之司統冠羣寮所宜列拜臣位居憲府迹厠同班言或庶其得中罪難逃於多上帝從之二年春正月戊戌朔帝不受朝賀不豫故也六月乙丑朔帝御崇元殿百官入閣漢髙祖乾祐元年正月辛亥朔帝不受朝賀二年五月中書舎人艾頴上言近制一月兩度入閣五日一度起居近年以来入閣多廢每遇朔望不面天顔臣請今後朔望入閣即従常禮如不入閣即請朔望日起居冀面聖顔以伸誠敬史臣曰天子居再朞服内雖終一月之制而獨宴不舉樂朔不視朝近古禮也艾頴請朔望相見于禮非宜周太祖廣順元年四月壬辰朔帝御廣政殿羣臣起居十月壬寅雪尺餘放朝二年五月丙辰朔帝御崇元殿受朝仗衞如儀十一月癸丑朔入閣己卯日南至帝御崇元殿羣臣服朝服稱賀退班于永福殿庭上夀賜羣臣酒三爵而罷三年正月壬子朔帝御崇元殿羣臣朝賀樂懸仗衞如常儀班退太祖御永福殿羣臣百寮稱觴獻夀舉教坊樂旋幸太平宫起居漢太后五月己卯朔帝服衮冕御崇元殿受羣臣朝服班于位陪位官樂懸仗衞如常儀十一月乙酉日南至帝不受朝賀羣臣閣門拜表班退賜茶酒世宗顯徳元年八月壬寅朔帝御崇元殿文武百寮入閣仗衞如儀十一月辛未朔帝御崇元殿文武百官入閣仗衞如儀庚寅日南至帝不御殿文武百寮詣閣拜表稱賀二年春正月辛未朔帝不御殿宰臣率百官拜表稱賀四月己亥帝御崇元殿文武百官入閣仗衞如儀八月丁酉朔帝御崇元殿百官入閣如儀三年春正月乙未朔帝不御殿文武百官詣閣進名稱賀六月壬戌朔帝御崇元殿文武百官入閣仗衞如儀十一月庚子日南至帝不御殿以宣懿皇后之䘮在近故也宰臣率百官詣閣門拜表稱賀四年正月己丑朔帝御崇元殿受朝賀禮畢御廣政殿羣官上夀並如常儀二月辛酉詔曰文武百寮起今後每遇入閣日宜賜廊飡此有唐之舊制也自晉氏多故寢而不行上以寵待廷臣故復有是命五月丁亥朔帝御崇元殿視朝太常樂懸金吾仗衞如儀八月乙卯朔帝御崇元殿文武百官入閣如儀既罷賜百官廊飡時帝御廣徳殿西樓以觀焉命中黄門閲視酒饌無不腆五年春正月癸未朔帝在楚州西北衣戎服御帳殿受宰臣以下稱賀五月辛巳朔帝御崇元殿金吾仗衞太常樂如儀十一月辛亥日南至帝御崇元殿受朝賀金吾仗衞太常樂懸如儀禮畢宰臣率百寮常服詣永徳殿上夀而退六年春正月丁未朔帝御崇元殿受朝賀金吾仗衞太常樂懸如儀册府元龜卷一百八
