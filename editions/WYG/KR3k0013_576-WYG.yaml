body:
  text: 冊府元龜卷五百七十六宋王欽若等撰掌禮部奏議第四宋臧燾初仕晉孝武太元中為國學助教孝武追崇庻祖母宣太后議者或為宜配食中宗燾議曰陽秋之義母以子貴吕欽若等曰陽秋即春秋也晉杜太后諱春秋因而改焉故仲子成風咸稱夫人經云考仲子之宫若配食惠廟則宫無縁别築前漢孝文孝昭太后並繫子為號祭於寝園不配於髙祖孝武之廟後漢和帝之母曰恭懐皇后安帝祖母曰敬隠皇后順帝之母曰恭愍皇后雖不繫子為號亦祭於陵寝不配章安二帝此則二漢雖有太后皇后之異至於並不配食義同陽秋惟光武追廢吕后故以薄后配髙祖廟又衞后既廢霍光追尊李夫人為皇后配孝武廟此非母以子貴之例直以髙武二廟無配故耳又漢立寝於陵自是晉制所異謂宜逺凖陽秋考宫之義近摹二漢不配之典尊號既正則罔極之情申别建寝廟則嚴稱之義顯繋子為稱兼明母貴之所由一舉而允三義固哲王之髙致也議者從之後叅髙祖中軍事入補尚書度支即時太廟鴟尾災燾謂著作郎徐廣曰昔孔子在齊聞魯廟災曰必桓僖也今征西京兆四府君宜在毁落而猶列廟饗此其徴乎乃上議曰臣聞國之大事在祀與戎将營宫室宗廟為首古先哲王莫不致恭誠心盡崇嚴乎祖考然後能流淳化於四海通幽感於神明固宜詳廢興於古典修情理以求中者也禮天子七廟三昭三穆與太祖而七自考廟以至祖考五廟皆月祭之逺廟為祧有二祧享甞乃止去祧為壇有禱然後祭之此宗廟之次親踈之序也鄭𤣥以為祧者文王武王之廟王肅以為五世之祖尋去祧之言則祧非文武周之祖宗何云去祧為壇乎明逺廟為祧者無服之祖也又逺廟則有享甞之禮去祧則有壇墠之殊明世逺者其義彌踈也若祧文武之廟宜同月祭於太祖雖推后稷以配天由功德之所始非尊崇之義毎有差䧏也又禮有以多為貴者故傳稱德厚者流光德薄者流卑又云自上以下䧏殺以兩禮也此則尊卑等級之典上下殊異之文而云天子諸侯俱祭五廟何哉又王祭嫡殤下及來孫而上祀之禮不過髙祖推恩施於下流替誠敬於尊屬亦非聖人制禮之意也是以㤗始建廟從王氏議以禮父為士子為天子諸侯祭之天子諸侯其尸服以士服故上及征西以備六世之數宣皇雖為太祖常存子孫之位至於敬祭之日未申東向之禮所謂子雖齊聖不先父食者矣今京兆以上既遷太祖始得居正議者以昭穆未足欲屈太祖於卑坐臣以為非禮典之㫖也所與太祖而七自是昭穆既足太祖在六世之外非為湏滿七廟乃得居太祖也議者又以四府君神主宜永同於殷祫臣又以為不然傳所明毁廟之主陳乎太祖謂太祖以下先君之主也故白虎通云禘祫祭祭遷廟者以其繼君之體時其統而不絶也豈如四府君在太祖之前乎非繼統之主無靈命之端非王業之基昔以世近而及今則情禮已逺而當長饗殷祫永虚太祖之位求之禮籍未見其可昔永和之初大議斯禮于時虞喜范宣並以淵儒碩學咸謂四府君神主無縁永存於百世或欲瘞之兩階藏之石室或欲為之改築雖所執小異而大歸是同若宣皇既居羣廟上而四主禘祫不已則大晉殷祭長無太祖之位矣夫理貴有中不必過厚禮與世宜豈可順而不繼故臣子之情雖篤而靈厲之謚彌彰追逺之懐雖切而遷毁之禮為用豈不有心於加厚顧禮制不可踰耳石室則藏於廟北改築則未知所處虞主所以依神神移則有瘞埋之禮四主若饗祀宜廢亦神之所不依也准傍事例宜同虞主之瘞埋然經典難詳羣言紛錯非臣卑淺所能折中時學者多從燾徐廣仕晉安帝隆安中為司部郎李太后薨廣議服曰太皇后名位允正體同皇極理制備盡情禮彌申陽秋之義母以子貴既稱夫人禮服從正故成風顯夫人之號僖公服三年之喪子於父之所生體尊義重且祖不壓孫固宜遂服無屈而縁情立制若嫌明文不存則疑斯從重謂應同於為祖母從齊衰三年服從廣議王淮之為黄門侍郎武帝永初二年奏曰鄭𤣥注禮三年之喪二十七月而吉古今學者多謂得禮之宜晉初用王肅議祥禫共月故二十五月而除遂以為制江左以來惟晉朝施用縉紳之士多遵𤣥義夫先王制禮以大順羣心喪也寧戚著自前訓今大宋開㤗品物遂理愚謂宜同即物情以𤣥義為制朝野一禮則家無殊俗從之裴松之為中書侍郎時彭城王義康驃騎主簿庾炳之未到疑於府公禮敬下禮官愽議松之議曰按春秋桓公八年祭公逆王后于紀公羊傳曰女在國稱女此其稱王后何王者無外其辭成矣推此而言則炳之為吏之道定於受命之日矣其辭已成在官無外名噐既正則禮亦從之且今宰牧之官拜不之職未接之民必有其敬者以既受王命則成君民之義故也吏之被勅猶除者受拜民不以未見闕其被禮吏安可以未到廢其節乎愚懐所見宜執吏禮從之傅隆為太常文帝以新撰禮論付隆使更下意隆上表曰臣以下愚不渉師訓孤陋閭閻靣牆靡識謬蒙詢逮愧懼流汗原夫禮者三千之本人倫之至道故用之家國君臣以之尊父子以之親用之婚冠少長以之仁愛夫妻以之義順用之鄉人友朋以之三益賔主以之敬讓所謂極乎天蟠乎地窮髙逺測深厚莫尚於禮也其樂之五聲易之八象詩之風雅書之典誥春秋之㣲婉懲勸無不本乎禮而後成由乎禮而後立也其源逺其流廣其體大其義精非夫􅌖哲大賢孰能明乎此哉况遭秦焚亡百不存一漢興始徴召故老捜集殘文其躰例紕繆首尾脫落難可詳論幸髙堂生頗識舊義諸儒各為章句之說既明不獨逹所見不同或師資相傳共枝别幹故聞人二戴俱事后蒼俄已分異盧植鄭𤣥偕學馬融人各名家又後之學者未逮曩時而問難星繁充斥兼兩摛文列錦焕炳可觀然而五服之本或差哀敬之制殊雜國典未一於四海家法參駁於縉紳誠宜考詳逺慮以定皇代之盛禮者也伏惟陛下欽明𤣥聖同規唐虞疇咨四岳興言三禮而伯夷未登㣲臣竊位所以大懼負乘形神交惡者無忘夙夜矣而復猥充愽採之數與聞爰發之求實無以仰酬聖㫖萬分之一不敢廢嘿謹率管穴所見五十二事上呈蚩鄙茫浪伏用竦赧徐道娯為駙馬都尉奉朝請元嘉六年上表曰謹案晉博士曹𢎞之議立秋御讀令不應著緗幘遂改用素相承至今臣淺學管見竊有惟疑伏尋禮記月令王者四時之服正云駕蒼龍載赤旗衣白衣服黒玉季夏則黄文極於此無白冠則冠履纂舄也且幘又非古服出自後代上附於冠下不屬衣冠固不革而幘豈容異色愚謂應常與冠同色不宜隨節變綵土令在近謹以上聞如或可採乞付外詳議太學愽士荀萬秋議伏尋幘非古冠冕之服禮無其文案蔡邕獨斷云幘是古卑賤供事不冠人所服又董仲舒止雨書曰其執事皆赤幘知並不冠之服也漢元始用衆臣率從故司馬彪輿服志曰尚書幘名曰納言迎氣五郊各如其色從章服也自兹相承迄于有晉大宋受命禮制因循斯既歴代成准謂宜仍舊有司奏謹案娯啟事以􅁟令在近謂幘不宜變萬秋雖云幘宜仍舊而不明無讀􅁟令之文今書舊事于左魏臺雜訪曰前後但見讀春秋夏冬四時令至於服黄之時獨闕不讀殷景仁為侍中文帝所生章太后早亡奉太后所生蘓氏甚謹元嘉六年蘇氏卒車駕親往臨哭下詔曰朕夙罹偏罰情事兼常毎思有以光隆懿戚少申罔極之懐而禮文遺逸取正無所監之前代用否又殊故惟疑累年在心未遂蘇夫人奄至傾殂情禮莫寄追思逺恨與事而深日月有期将卜窀穸便欲粗依春秋以貴之義式遵二漢推恩之典但動籍史筆傳之後昆稱心而行或容未允可時共詳論以求其中執筆永懐益増感塞景仁議曰至德之感靈啟厥詳文母倪天實熙皇祚主上聿遵先典號極徽崇以貴之義禮盡於此蘇夫人階縁戚屬情以事深寒泉之恩實感聖懐明詔爰發詢求厥中謹尋漢氏推恩加爵于時承秦之弊儒術蔑如自君作故罔或前典懼非盛明所宜軌蹈晉監二代朝政之所因君舉必書哲王之所慎體至公者懸爵賞於無私奉天統者毎屈情以申制所以作孚萬國貽則後昆臣豫蒙愽逮謹露庸矩帝從之何承天為率更令領著作佐郎元嘉十六年丹陽丁況等乆喪不葬承天議曰禮所云還葬當謂荒儉一時故許其稱財而不求備丁况三家數十年中葬輙無棺櫬實由淺情薄恩於禽獸者耳竊以為丁寳等同伍積年未嘗勸之以義繩之以法十六年冬既無新科又未申明舊制有何嚴切歘然相糾或由鄰曲分爭以興此言如聞在東諸處此例既多江西淮北尤為不少若但讁此三人治無整肅開其一端則互相恐動里伍縣司競為姦利財賂既逞獄訟必繁懼虧聖明烹鮮之美臣愚謂况等二家且可勿問因此附定制㫖若民人葬不如法同伍當即糾言三年除服之後不得追相告列於事為宜後為御史中丞元嘉二十三年七月奏尚書刺海塩公主所生母􅃽美人喪海塩公主先離婚今應成服撰儀注叅詳宜下二學禮官愽士議公主所服輕重大學愽士顧雅議今既咸用士禮便宜同齊衰削杖布帶踈履朞禮畢心喪三年愽士周野王議又云今諸公主咸用上禮譙王衡陽王為所生太妃皆居重服則公主情禮亦宜家中朞服為允其愽士庾䆳之顔測殷明王淵之四人同雅議何惔王羅雲二人同野王議如所上臺案今之諸王雖行士禮是施於傍親及自己以至於為帝王所厭猶一依古典又永初三年九月符脩儀亡廣德三公主以餘尊所厭猶服大功海塩公主體自宸極當上厭至尊豈得遂服臺據經傳正文并引事例依源責失而愽士顧雅周野王等捍不肯伏方稱自有宋以來皇子蕃王皆無厭降同之士禮著於故事緦功之服不廢於末戚顧獨貶於所生是申其所輕奪其所重豈縁情之謂臺伏尋聖朝受終于晉凡所施行莫不上稽禮文兼用晉事又太元中晉恭帝時皇子服其所生陳氏練冠縓縁此則前代施行故事謹依禮文者也又廣德三公主為所生母符脩儀服大功此先君餘尊之所廢者也元嘉十三年第七皇子不服曹媫妤止於麻衣此厭乎至尊者也􅀶士既不據古又不依今背違施行見事而多作浮辭自衞乃云五帝之時三王之季又言長子去斬衰除禫杖皆是古禮不少今世􅀶士雖復引此諸條無救於失又詰臺云蕃國遂其私情此義出何經記臣案南譙衡陽太妃並受朝命為國小君是以二王得遂其服豈可為美人比例尋蕃王得遂者聖朝之所許也皇子公主不得申者由有厭而然也臺登重更責失制不得過十日而復不詶荅既被催攝二三日甫輸帖辭雖理屈事窮猶聞義耻服臣聞喪紀有制禮之大經䧏殺攸宜家國舊典古之諸侯衆子猶以尊厭况在王室而欲同之士庻此之僻謬不俟言而顯太常統寺曽不研却所謂同乎失者亦未得之宜加裁正引明國典謹案太學愽士顧雅國子助教周野王愽士王羅雲顔測殷明何掞王淵之前愽士遷員外散騎侍郎庾䆳之等抽飾備位前疑既不謹守舊文又不審據前淮遂上背經典下違故事率意妄作自造禮章太常臣敬叔位居宗伯問禮所司騰述往反了無研却混同兹失亦宜及咎請以見事竝免今所居官觧野王領國子助敎雅野王初立議乖舛中執捍愆失違十日之限雖起一事合成三愆羅雲掌押捍失三人加禁固詔叔敬白衣領職餘如奏徐爰以孝武即大位為尚書右丞奏議曰郊祀之位逺古蔑聞禮記燔柴太壇祭天也兆於南郊就陽位也漢初甘泉河東禋埋易位終亦徙於長安南北光武紹祚定二郊洛陽南北晉氏過江悉在北及郊兆之議紛然不一又南出道狭未議開闡遂於東南已地創立丘壇皇宋受命因而弗改且居民之中非邑外之謂今聖圖重制舊章畢新南驛開塗陽路修逺謂宜郊正午以定天位愽士司馬興之傅郁太常丞陸澄竝同爰議乃移郊兆於秣陵牛頭山西正在午地大明四年九月有司奏陳留國王曹䖍季長兄䖍嗣早卒季襲封之後生子銑以繼䖍嗣今依例應拜世子未詳應以銑為世子為應立次子錯太學愽士王温之江長議並為應以銑為正嗣太常陸澄議立錯爰議謂禮後太宗以其不可乏祀諸侯世及春秋成義䖍嗣承家傳爵身為國王雖薨没無子猶列昭穆立後之日便應即纂國統于時既無承繼䖍季以次襲紹䖍嗣既列廟享故自與出數而遷豈容蒸甞無闕横取佗子為嗣為人裔嗣又應恭祀先父案禮文公子不得禰諸侯䖍嗣無縁䧏廟既寝銑本長息宜還為䖍季世子詔如爰議陸澄為太學愽士武帝孝建元年六月己巳有司奏故十六皇弟休倩薨夭年始及殤追贈謚東平冲王服制未有准輙下禮官詳議澄議案禮有成人之道則不為殤今既追胙土宇逺崇封秩圭黻備典成孰大焉典文逺昭殤名去矣夫典文垂式元服表身猶以免孺子之制全丈夫之義安有名頒爵首而可服以殤禮尋議無名證却使秉正更上證重議竊謂贈之為義所以追加名噐故贈公者便成公贈之以王得不為王乎然則有在生而封或既没而爵俱受命不為吉㓙殊典備文物豈以存亡異數今璽䇿咸秩是成人之禮羣后臨哀非不殤之制若用喪成人親以殤服末學含疑未之或辨敢求詳𠂻如所稱左丞臣羊希叅尋澄議既無畫然前例不合准據案禮子不殤父臣不殤君君父至尊臣子恩重不得以㓜年而䧏又曰尊同則服其親服推此文者旁親自宜服殤所不殤者惟施臣子而已詔可後為通直郎兼左丞明帝太始六年詔皇太子朝賀服衮冕九章澄與儀曹郎邱仲起議服冕以朝實著經文秦除六冕漢明還備魏晉以來不欲令臣下衮冕故位公者加侍官今皇太子禮絶羣后宜遵聖王盛典革近代之制王膺之為太學愽士孝建三年三月有司奏故散騎常侍右光禄大夫開府儀同三司義陽王師王偃喪逝至尊為服緦三月成服仍即公除至三月竟未詳當服與不又皇后依朝制服心喪行喪三十日公除至祖葬日臨葬當著何服又舊事皇后心喪服終除之日更還著未公除時然後就除未詳今皇后除心制當依舊更服為但釋心制中所著布素而已勒禮官處正膺之議尊卑殊制輕重有級五服雖同䧏厭則異禮天子止䧏旁親外舅緦麻本在服例但衰絰不可以臨朝饗故有公除之議雖脫衰襲冕尚有緦月之制愚謂至尊服三月既竟猶宜除釋又議吉㓙異容情禮相稱皇后一月之限雖過二功之服已釋哀喪所極莫深於尸柩親見之重不可以無服案周禮為兄弟既除喪已及其葬也反服其服輕喪雖除猶畜衰以臨葬舉輕明重則其禮可知也謂王右光禄祖葬之日皇后宜反齊衰又議喪禮即逺變除漸輕情與日殺服隨時改權禮既行服制已變豈容終除之日而更重服乎孫豁之為太學博士孝建三年八月戊子有司奏雲杜國觧稱國子檀和之所生親王求除太夫人檢無國子除太夫人先例法又無科下禮官議正豁之議曰春秋母以子貴王雖為妾是和之所生案五等之例鄭伯許男同號夫人國子體例王合如國所生太常丞庾蔚之議以子貴雖春秋明義古今異制因革不同自頃代以來所生蒙榮惟有諸王既是王者之嬪御故宜見尊於蕃國若功髙勲重列為公侯亦有拜太夫人之禮凡此皆朝恩曲䧏非國之所求子男妾母未有前比祠部郎中朱膺之議以為子不得爵父母而春秋有母以子貴當謂傳國嗣君母本先公嬪媵所因籍有由故也始封之身所不得同若殊績重勲恩所特錫時或有之不由司存所議以蔚之為允詔可王爕之為愽士大明元年九月有司奏皇后副車未有定式詔下禮官議正其數爕之議鄭𤣥云后象王立六宫亦正寝一而燕寝五推其所立毎與王同謂十二乘通闗為允帝從之遂為後式今請依乘輿不湏差䧏制曰可二妃乘翟車以赤為質駕二馬九嬪已下竝乘犢車青幰朱網絡朱膺之領儀曹郎大明二年正月有司奏故右光禄大夫王偃喪依格皇后服期心喪三年應再周來二月晦撿元嘉十九年舊事武康公主出適二十五月心制終盡從禮即吉昔國哀再周孝建二年二月其月末諸公主心制終則應從吉于時猶心禫素二十七月乃除二事不同膺之議詳尋禮文心喪不應有禫皇代考騐已為定制元嘉季年禍難深酷聖心天至喪紀過哀是以出適公主還同在室即情變禮非革舊章今皇后二月晦宜依元嘉十九年制釋素即吉孫武為愽士大明二年六月有司奏凡侯伯子男世子喪無嗣求進次息為世子撿無其例下禮官議正武議案晉濟北侯荀朂長子連卒以次子輯拜世子先代成准宜為今例愽士傅郁議禮記微子立衍商禮斯行仲子舎孫姬典攸貶歴代遵循靡替于舊今胙土之君在而世子卒厥嗣未育非孫之謂愚以為次子有子自宜紹為世孫若其未也無容逺捜輕屬承綱繼體傳之有由父在立子允稱情典曹郎諸葛雅議案春秋傳云世子死有母弟則立無則立長年均擇賢義均則卜古之制也今長子早卒無嗣進立次息以為世子取諸左氏理義無違又孫武所據晉濟北侯荀朂長子卒立次子亦近代成例依文採比竊所允安謂開許以為永制叅議為允詔可虞和為太學愽士大明五年七月有司奏故永陽縣開國侯劉叔子夭喪年始四嵗傍親服制有疑和與領軍長史周景逺司馬朱膺之前太常丞庾蔚之等議竝云宜同成人之服東平冲王服殤實由追贈異於已受茅土博士司馬興之議應同東平殤服左丞荀萬秋等三議南靣君國繼體承家雖則佩觹未闗成德君父名正不容服殤故云臣不殤君子不殤父推此則知傍親故依殤制東平冲王已經前議若外仕朝列則為大成故鄱陽哀王追贈太常親戚不䧏愚謂下殤以上身居封爵宜同成人年在無服之殤以澄官為斷今永陽國臣自應全服王於傍親宜從殤禮詔和等議為允至明帝㤗始五年為國子愽士十一月有司奏案晉江左以來太子婚納徴禮用玉一虎皮二未詳何所准况或者虎取其威猛有彬炳玉以象德而有潤栗珪璋既玉之羙豹皮義兼炳蔚熊羆亦婚禮吉徴以類取象亦宜並用未詳何以遷遺又晉氏江左禮物多闕後代因襲未遑研考今法章徽儀方将大備宜憲範經籍稽諸舊典今皇太子婚納徴禮合用珪璋豹皮熊皮與不下禮官詳依經記更正若應用者為各用一為用兩愽士斐昭明議案周禮納徴𤣥纁束帛儷皮鄭𤣥注云束帛十端也儷兩也皮鹿皮也儀注以虎皮二太元中公主納徴以虎豹各皮一具豈謂婚禮不辨王公之序故取虎豹皮以尊革其事乎虎豹雖文而徴禮所不用熊羆吉祥而婚典所不及珪璋雖羙或為用各異今帝道𢎞明徽則光闡儲皇聘納宜准經誥凡諸僻謬並合詳裁雖禮代不同文質或異而鄭為儒宗既有明說守文淺見蓋有惟疑兼太常丞孫詵議以為聘幣之典損益惟義歴代行事取制士婚若珪璋之用實均璧品采豹之章義齊虎文熊羆表祥繁衍攸寄今儲后崇聘禮先訓逺皮玉之羙宜盡暉備禮稱束帛儷皮則珪璋數合同璧熊羆文豹各應用二也兼國子愽士虞龢議禮納徴直云𤣥纁束帛雜皮而已禮記郊特牲云虎豹皮與玉璧非虛作也則虎豹之皮居然用兩珪璋宜仍舊各一也叅詵和二議不異今加珪璋各一豹熊羆皮各二以龢議為允詔可司馬興之為太學博士大明五年閠九月有司奏皇太子妃薨至尊皇后竝服大功九月皇太后小功五月未詳三御何當得作鼓吹及樂興之議案禮齊衰大功之喪三月不從政今臨軒拜授則人君之大典今古既異賖促不同愚謂皇太子妃祔廟之後便可臨軒作樂及鼓吹右丞徐爰議皇太子妃雖未山塋臨軒拜官舊不為礙樟棺在殯應懸而不作祔後三御樂宜更學官擬禮上興之又議案禮大功至則辟琴瑟誠無自奏之理但王者體大禮絶凡庻故漢文既葬悉皆服吉惟縣而不樂以此表哀今准其輕重侔其䧏殺則下流大功不容撤樂終服夫金石賓享之禮簫管警塗之衞實人君之盛典當陽之威飾故亦不可乆廢於朝又禮無天王服嫡婦之文直後學推貴嫡之義耳既以制服成䘮虛縣中窆亦足以甄崇冢正摽明禮媍矣爰叅議皇太子期服内不合作樂鼓吹又興平國觧稱國子袁愍孫母王氏應除太夫人撿無國母除太夫人例下禮官議正興之議案禮下國卿大夫之妻皆命天子以斯而推則子男之母不容獨異愽士程彦議以為五等雖差而承家事等公侯之母崇號得從子男於親尊秩宜顯故春秋之義母以子貴固知從子尊與國均也參議以興之議為允除王氏為興平縣開國子太夫人詔可王慶緒為􅀶士明帝泰始二年九月有司奏皇太子所生陳貴妃主在内相見又應何儀慶緒議百僚内外敬貴妃應與皇太子同其東朝臣𨽻理歸臣節太常丞虞愿等同慶緒尚書令建安王休仁議稱禮云妾既不得體君班秩視子為序母以子貴經著明文内外致敬貴妃誠如慶緒議天子姬嬪不容通音問於外雖義可致䖍不應有牋表叅詳依休仁議為允詔可周山文為太學愽士後廢帝元徽二年七月有司奏第七皇弟訓養母鄭修容喪未詳制下禮官正議案庻母慈母亡者小功五月鄭𤣥云其使養之不命為母子亦服庻母慈已之服愚謂第七皇弟宜從小功之制叅議並同冊府元龜卷五百七十六
