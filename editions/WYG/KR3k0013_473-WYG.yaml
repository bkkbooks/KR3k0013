body:
  text: 册府元龜卷四百七十三宋王欽若等撰臺省部奏議第四北齊髙隆之初仕魏為尚書右僕射自孝明孝昌之後天下多難刺史太守皆為當部都督雖無兵事皆立佐僚所在頗為煩擾隆之表請自非實在邊要見有兵馬者悉皆斷之又朝貴多假常侍以取貂蟬之飾隆之自表觧侍中并陳請假侍中服者請亦罷之詔皆如表自軍國多事冒名竊官者不可勝數隆之奏請檢括旬日獲五萬餘人而羣小讙囂隆之懼止王紘後主時為散騎常侍武平五年陳人㓂淮南詔令羣官共議禦捍封疆輔相請出討擊紘曰官軍頻經失利人情騷動若復興兵黷武出頓江淮恐北敵西㓂乗我之弊傾國而来則大事去矣莫若薄賦省徭息民養士使朝廷恊睦遐邇歸心征之以仁義鼔之以道徳天下皆當肅清豈直偽陳而已録尚書事髙阿那肱謂衆曰從王武衛者南席衆皆同焉後周蘇綽為度支尚書太祖方欲革易時政務𢎞彊國富民之道故綽得盡其智能贊成其事減官員置二長并置屯田以資軍國又為六條詔書奏施行之其一先治心曰凡今之方伯守令皆受命天朝出臨下國論其尊貴竝古之諸侯也是以前世帝王每稱共治天下者惟良守宰耳明知百僚卿尹雖各有所司然其治民之本莫若宰守之􅆟重也凡治民之體先當治己心心者一身之主百行之本心不清浄則思慮妄生思慮妄生則見理不明見理不明則是非謬亂是非謬亂則一身不能自治安能治民也是以治民之本在於清心而已夫所謂清心者非不貪貨財之謂也乃欲使心氣清和志意端静心和志静則邪僻之慮無因而作邪僻不作則凡所思念無不皆得至公之理率至公之理以臨其民則彼下民孰不從化是以稱治民之本先在治心其次又在治身凡人君之身者乃百姓之表一國之的也表不正不可求直影的不明不可責射中今君身不能自治而望治百姓是猶曲表而求直影也君行不能自修而欲百姓修行者是猶無的而責射中也故為人君者必心如清水形如白玉躬行仁義躬行孝悌躬行忠信躬行禮讓躬行亷平躬行儉約然後繼之以無倦加之以明察行此八者以訓其民是以其人畏而愛之則而象之不待家教日見而自興行矣其二敦教化曰天地之性唯人為貴明其有中和之心仁恕之行異於木石不同禽獸故貴之耳然性無常守隨化而遷化於敦朴者則質直化於澆偽者則浮薄浮薄者則衰弊之風質直者則淳和之俗衰弊則祻亂交興淳和則天下自治治亂興亡無不皆繇所化也然世道凋䘮已數百年大亂滋甚且二十歳民不見徳唯兵革是聞上無教化惟刑罰是用而中興始爾大難未平加之以師旅因之以饑饉凡百草創率多權宜致使禮讓弗興風俗未改比年稍登稔徭賦差輕衣食不切則教化可修矣凡諸牧守令長各宜洗心革意上承朝㫖下宣教化矣夫化者貴能扇之以淳風浸之以太和被之以道徳示之以朴素使百姓亹亹日遷於善邪偽之心嗜慾之性潜以消化而不知其所以然此之謂化也然後教之以孝悌使民慈愛教之以仁順使民和睦教之以禮義使民敬讓然慈愛則不遺其親和睦則無怨於人敬讓則不競於物三者既備則王道成矣此之謂教也先王之所以移風易俗還淳反素垂拱而臨天下以至於太平者莫不繇此此之謂要道也其三盡地利曰人生天地之間以衣食為命食不足則饑衣不足則寒饑寒切體而欲使民興行禮讓者此猶逆坂走丸勢不可得也是以古之聖王知其若此故先足其衣食然後教化隨之夫衣食所以足者在於地利盡地利所以盡者繇於勸課有方主此教者在乎牧守令長而已民者冥也智不自周必待勸教然後得盡其力諸州郡縣每至嵗首必戒勑部民無問少長但能操持農噐者皆令就田墾發以時勿失其所及布種既訖嘉苗湏理麥秋在野蠺停於室若此之時皆宜少長悉力男女併功若援溺救火㓂盜之將至然後可使農夫不廢其業蠶婦得就其功若有㳺手怠惰早歸晩出好逸惡勞不勤事業者則正長牒名郡縣守令隨事加罰罪一勸百此則明宰之敎也夫百畆之田必春耕之夏種之秋収之然後冬食之此三時者農之要也若失其一時則榖不可得而食故先王之戒曰一夫不耕天下必有受其飢者一婦不織天下必有受其寒者若此三時不務省事而令民廢農者是則絶民之命驅以就死然單劣之戸及無牛之家勸令有無相通使得兼濟三農之隙及隂雨之暇又當教民種桑植果藝其菜蔬修其園圃畜育雞豚以備生生之資以供養老之具夫為政不欲過碎碎則民煩勸課亦不容太簡簡則民怠善為政者必消息時宜而適煩簡之中故詩曰不剛不柔布政優優則百禄是求如不能爾則必䧟於刑辟矣其四擢賢良曰天生蒸民不能自化故必立君以理之人君不能獨理故必置臣以佐之上自帝王下至列國置臣得賢則治失賢則亂此乃自然之理百王不能易也今刺史縣令悉有僚吏皆佐治之人也刺史府官則命於天朝其州吏以下竝牧守自置自昔以来州郡大吏但取門資多不擇賢良末曹小吏唯試刀筆竝不問志行夫門資者乃先世之爵禄無妨子孫之愚瞽刀筆者乃身外之末材不廢性行之澆偽若門資之中而得賢良是則策騏驥而取千里也若門資之中而得愚瞽是則土牛木馬形似而用非不可以渉道也若刀筆之中而得志行是則金相玉質内外俱美實為人寳也若刀筆之中而得澆偽是則飾畵朽木悦目一時不可以充榱椽之用也今之選舉者當不限資䕃唯在得人茍得其人自可起厮養而為卿相伊尹傅說是也而况州郡之職乎茍非其人則丹朱商均雖帝王之𦙍不能守百里之封况於公卿之胄乎繇此而言官人之道可見矣凡所求材藝者為其可以理民若有材藝而以正直為本者必以其材而為理也若有材藝而以奸偽為本者将因其官而為亂也何致化之可得乎是故将求材藝必先擇志行其志行善者則舉之不善者則去之而今擇人者多云邦國無賢莫知所舉此乃未之思也非適理之論所以然者古人有言明王聿興不降佐於昊天大人基命不擢才於后土常引一世之人理一世之務故殷周不待稷契之臣魏晉無假蕭曹之佐仲尼曰十室之邑必有忠信如丘者焉豈有萬家之都而云無士但求之不勤擇之不審或用之不得其所任之不盡其材故云無耳古人云千人之秀曰英萬人之英曰儁今之智效一官行聞一邦者豈非近英儁之士也但能勤而審之去虛取實各得州郡之最而用之則民無多少皆足化矣孰云無賢夫良玉未剖與瓦石相類名驥未馳與駑馬相雜及其剖而瑩之馳而試之玉石駑驥然後始分彼賢士之未用也混於凡品竟何以異要任之以事業責之以成務方與彼庸流較然不同昔呂望之屠釣百里奚之飯牛寗生之扣角管夷吾之三敗當此之時悠悠之徒豈謂其賢及升王朝登霸國積數十年功成事立始識其奇士也於是後世稱之不容於口彼瓌偉之才不世之傑尚不能以未遇之時自異於凡品况降此者哉若必待太公而後用是千載無太公必待夷吾而後任是百世無夷吾所以然者事必從微而至著功必積小以至大豈有未任而已成不用而先達也若識此理則賢可求士可擇得賢而任之得士而使之則天下之理何向而不可成也然善官人者必先省其官官省則善人易充善人易充則事無不理官煩則必雜不善之人雜不善之人則政必有得失故語曰官省則事省事省則民清官煩則事煩事煩則民濁清濁之繇在於官之煩省案今吏員其數不少昔民殷事廣尚能克濟况今戸口減耗依員而置猶以為少如聞在下州郡尚有兼假擾亂細民甚為無理諸如此輩悉宜罷黜無得習嘗非直州郡之官宜湏善人爰至黨族閭里正長之職皆當審擇各得一鄉之選以相監統夫正長者理民之基基不傾者上必安凡求賢之路自非一途然所以得之審者必繇任而試之考而察之起於居家至於鄉黨訪其所以觀其所繇則人道盡矣賢與不肖别矣率此以求則庶無愆悔矣其五䘏獄訟曰人受陰陽之氣以生有情有性性則有善情則為惡善惡既分而賞罰隨焉賞罰得中則惡止而善勸賞罰不中則民無所措手足民無所措手足則怨叛之心生是以先王重之特加戒慎夫戒慎者欲使察獄之官精心悉意推究事源先之以五聴叅之以證驗妙覩情狀窮䆒隱伏使姧無所容罪人必得然後隨事加刑輕重皆當赦過矜愚得情勿喜又能消息情理斟酌禮律無不曲盡人心而遠明大教使獲罪者如歸此則善之上者也然宰守非一不可人人皆有通識推理求情時或難盡唯當率至公之心去阿枉之志務求曲直念盡平當聽察之理必窮所見然後考訊以法不苛不暴有疑則從輕未審不妄罰隨事斷理獄無停滯此亦其次若乃不以仁恕而肆其殘暴同民木石專用捶楚巧詐者雖事彰而獲免辭弱者乃無罪而被罰有如此者斯則下矣非共理所寄今之宰守當勤於中科而慕其上善如在下條則刑所不赦又當深思遠大念存徳敎先王之制曰與殺無辜寧赦有罪與其害善寧其利淫明必不得中寧濫捨有罪不謬害善人也若今之從政者則不然深文巧劾寧致善人於法不免有罪於刑所以然者非皆好殺人也但云為吏寧酷可免後患此則情存自便不念至公奉法如此皆姦人也夫人者天地之貴物一死不可復生然楚毒之下以痛自誣不被申理遂陷刑戮者将恐徃徃而有是以自古以來設五聽三宥之法著明愼庶獄之典此皆愛民甚也凡伐木殺草田獵不順尚違時令而虧帝道况刑罰不中濫害善人寧不傷天心犯和氣也天心傷和氣損而欲陰陽調適四時順序萬物阜安蒼生恱樂者不可得也故語曰一夫吁嗟王道為之傾覆正謂此也凡百宰守可不愼乎若有深姦巨猾傷化敗俗悖亂人倫不忠不孝故為悖道者殺一儆百以清王化重刑可也識此二途則刑政盡矣其六均賦役曰聖人之大寳曰位何以守位曰仁何以聚人曰財明王必以財聚人以仁守位國而無財位不可守是故三五以來皆有征稅之法雖輕重不同而濟用一也今冦逆未平軍國費廣雖未遑減省以䘏民瘼然宜令平均使下無怨夫平均者不捨豪彊而徵貧弱不縱姦巧而困愚拙此之謂均也故聖人曰蓋均無貧然財貨之生其功不易紡績織絍起於有漸非旬日之間所可造次必須勸課使預營理絹鄉先事織絍麻土早修紡績先時而備至時而輸故王賦獲供下民無困如不預勸戒臨時迫切復恐稽緩以為己過捶扑交至取辦目前冨商大賈縁兹射利有者從之貴買無者與之舉息輸税之民於是弊矣租税之時雖有大式至於斟酌貧富差次先後皆事起於正長而繫之於守令若斟酌得所則政和而民悦若簡理無方則吏姦而民怨又差發徭役多不存意致令貧弱者或重徭而遠戍富彊者或輕使而近防守令用懷如此不存恤民之心皆王政之罪人也太祖甚重之嘗置諸座右又令百司習誦之其牧守令長非通六條及計帳者不得居官隋柳彧為司武中士平齊之後帝大賞從官留京者不預彧上表曰今太平告始信賞宜明酬勲報勞務先有本屠城破邑出自聖規斬将搴旗必繇神略若負戈擐甲征扞劬勞至於鎭撫國家宿衞為重俱禀成算非專已能留從事同功勞須等皇太子以下實有守宗廟之功昔蕭何留守茅土先於平陽穆之居中殁後猶蒙憂策不勝管見奉表以聞於是留守竝加汎級楊尚希髙祖開皇初為河南道行臺兵部尚書見天下州郡過多上表曰自秦并天下罷侯置守漢魏及晉邦邑屢改竊見今郡縣倍多於古或地無百里數縣竝置或戸不滿千二郡分領具寮以衆資費日多吏卒又倍租調歲減清幹才良百分無一動須數萬如何可覔所謂民少官多十羊九牧琴有更張之義瑟無膠柱之理今存要去閒併小為大國家則不虧粟帛選舉則易得賢才敢陳管見伏聽裁處帝覽而嘉之於是遂罷天下諸郡李諤為治書侍御史諤見禮敎彫弊公卿薨亡其愛妾侍婢子孫輙嫁賣之遂成風俗諤上書曰臣聞追遠愼終民徳歸厚三年無改方稱為孝如聞大臣之内有父祖亡没日月未久子孫無頼便分其妓妾嫁賣取財有一於兹實損風化妾雖微賤親承衣履服斬三年古今通式豈容遽褫縗絰强傅鉛華泣辭靈几之前送付他人之室凡在見者猶致傷心况乎人子能堪斯忍復有朝廷重臣位望通貴平生交舊情若弟兄及其亡没杳同行路朝聞其死夕規其妾方便求娉以得為限無廉恥之心棄友朋之義且居家理治可移於官既不正私何能贊務帝覽而嘉之五品已上妻妾不得改醮始於此也諤又以屬文之家體尚輕薄遞相師效流宕忘反於是上書曰臣聞古先哲王之化民也必變其視聽防其嗜欲塞其邪放之心示以淳和之路五教六行為訓民之本詩書禮易為道義之門故能家復孝慈人知禮讓正俗調風莫大於此其有上書獻賦制誄鐫銘皆以褒徳序賢明勲證理苟非懲勸義不徒然降及後代風教漸落魏之三祖更尚文詞忽君人之大道好雕䖝之小藝下之從上有同影響競騁文華遂成風俗江左齊梁其弊彌甚貴賤賢愚唯務吟詠遂復遺理存異尋虛逐微競一韻之奇争一字之巧連篇累牘不出月露之形積案盈箱唯是風雲之狀世俗以此相髙朝廷據兹擢士祿利之塗既開愛尚之情愈篤於是閭里童昏貴遊總丱未窺六甲先製五言至如羲皇舜禹之典伊傅周孔之説不復闗心何嘗入耳以傲誕為清虛以緣情為勲績損儒素為古拙用詞賦為君子故文筆日繁其政日亂良繇棄大聖之軌模構無用以為用也捐本逐末流遍華壤遞相師祖久而愈扇及大隋受命聖道聿興屏黜浮詞遏止華偽自非懷經抱質志道依仁不得引領搢紳叅厠纓冕開皇四年普詔天下公私文翰竝宜實錄其年九月泗州刺史司馬幼之文表華艶付所司治罪自是公卿大臣咸知正道莫不鑽仰墳索棄絶華綺擇先王之令典行大道於兹世如聞外州遠縣仍踵弊風選吏舉人未遵典則至於宗黨稱孝鄉曲歸仁學必典謨交不茍合則擯落私門不加收齒其學不稽古逐俗隨時作輕薄之篇章結朋黨而求譽則選充吏職舉送天朝蓋繇縣令刺史未行風教猶挾私情不存公道臣既忝憲司職當紏察若聞風即劾恐挂網者多請勅有司普加捜訪有如此者具狀送臺諤又以當官者好自矜伐上奏曰臣聞舜戒禹曰汝惟不矜天下莫與汝争能汝惟不伐天下莫與汝争功言偃又云事君數斯辱矣朋友數斯疏矣此皆先哲之格言後王之軌轍然則人臣之道陳力濟時雖勤比大禹功如師望亦不得厚自矜伐上要君父况復功無足紀勤不補過而敢自陳勲績輕干聽覽世之喪道極於周代下無廉恥上使之然用人唯信其口取士不觀其行矜誇自大便以幹濟蒙擢謙恭靜退多以恬黙見遺是以通表陳誠先論已之功状承顏敷奏嘗道臣最用心自衒自媒都無慙恥之色强干横請唯以乾沒為能自隋受命此風頓改耕夫販婦無不革心況乃大臣仍蹈弊俗如聞刺史入京朝覲乃有自陳勾檢之功喧訴堦墀之側言辭不遜髙自稱譽上黷冕旒特為難恕凡如此輩具狀送臺明加罪黜以懲風範帝以諤前後所奏頒示天下四海靡然向風深革其弊盧思道為散騎侍郎兼内史侍郎事于時議置六卿将除大理思道上奏曰省有駕部寺留太僕省有刑部寺除大理斯則重畜產而賤刑名誠為未可又陳殿庭非杖罰之所朝臣犯笞罪請以贖論帝嘉納之王劭為員外散騎侍郎劭以古有鑽燧改火之義近代廢絕於是上表請變火曰臣謹按周官四時變火以救時疾明火不數變時疾必興聖人作法豈徒然也在晉時有以雒陽火度江者代代事之相續不滅火色變青昔師曠食飯云是勞薪所㸑晉平公使視之果然車輞今温酒及炙肉用石炭柴火竹火草火麻荄火氣味各不同以此推之新火舊火理應有異伏望遠遵先聖於五時取五木以變火用功甚少救益方大縱使百姓習乆未能頓同尚食内厨及東宫諸王食厨不可不依古法帝從之李徳林為内史令開皇中蘇威奏置五百家鄉正即令理民間詞訟徳林議以為本廢鄉官判事為其里閭親識剖斷不平今令鄉正専治五百家恐為害更甚且今時吏部總選人物天下不過數百縣於六七百萬戸内銓簡數百縣令猶不稱其才廼欲於一鄉之内選一人能治五百家者必恐難得又即是要荒小縣有不至五百家者復不可令兩縣共管一鄉勅令内外羣官就東宮會議自皇太子以下多從徳林議蘇孝慈為工部尚書時京官及州竝給公廨錢廻易生利以給公用至開皇十四年六月孝慈以為所在官司因循徃昔皆以公廨物出舉興生唯利是求煩擾百姓敗風損俗莫斯之甚於是奏皆給地以營農廻易取利一皆禁止唐許敬宗太宗貞觀十九年為中書侍郎時庶人承乾廢黜宫僚多被除削久未收叙敬宗上表曰臣聞先王愼罰務在於恤刑往哲寛仁義在於宥過聖人之道莫尚於兹切見廢官五品以上除名棄斥頗歴歲時但庶人疇昔之年身處不疑之地包藏悖逆陰結宰臣所預奸謀多連貴戚禍生慮表非可防萌宮内官僚迥無闗預今乃投䑕及器孰謂無寃焚山毁玉稍同遷怒伏尋先典例有可原昔吳國陪臣則爰絲不坐於劉濞昌邑中尉則王吉免縁於海昏譬諸欒布乃策名於彭越比乎田叔亦委質於張敖主以凶逆陷誅夷臣以賢良荷收擢歴觀往代此類尤多近者有隋又遵斯義楊勇之廢罪止加於佞人李綱之徒皆不預於刑網古今裁其折𠂻史籍稱為羙談而今張𤣥素令狐徳棻趙𢎞智裴宣機蕭鈞等竝砥節勵操有雅望於當朝經明行修播令名於天下或以直言而遭箠扑或以忤意而見猜嫌一槩雷同竝罹天憲恐於王道傷在未𢎞繇是𤣥素等得叙用褚遂良髙宗時為吏部尚書時永徽三年詔追録前代忠鯁子孫周相州總管尉遲迥曽孫文禮訴言迥忠於周室為隋所誅帝遣議之太常卿江夏王道宗等議咸以迥死節於周宜有甄録遂良進曰竊觀史籍咸以救君難則為忠不救則為逆春秋趙穿殺晉靈公趙盾為正卿不討賊太史書曰趙盾弑其君繇此言之尉遲迥受周重寄既聞隋文作相稱兵鄴下南通於陳北連突厥頓兵六十餘日不赴國難免其罪惡為幸已多若謂之忠臣所深惑羣議遂寢殿中侍御史張敬一奏曰臣聞堯舜諤諤以昌桀紂黙黙以亡臣竊以尉遲逈忠於周室身死國難遂良不以為忠恐未為允請召史官集議帝竟不許之劉祥道顯慶初為黄門侍郎知吏部選事祥道以銓綜之術猶有所闕乃上疏陳其得失其一曰今之選司取士傷多且濫每年入流數過一千四百是傷多也雜色入流不加銓簡是傷濫也經明行修之士猶或罕有正人多取胥徒之流豈能皆有徳行即知共釐務者善人少而惡人多有國已來已四十載尚未刑措豈不繇此乎但服膺先王之道者奏第然始赴選趨走几案之間者不簡便加禄秩稽古之業雖則難知斗筲之材何期易進其雜色應入流人望令曹司試判訖簡為四等第一等付吏部第二等付兵部次付主爵次付司勲其行署等私犯公坐者雖經赦降以量配三司不經赦降者放還本貫兾入流不濫官無冗雜且令胥徒之輩漸加勸勉其二曰古之選者為官擇人不聞取人多而官員有數入流無限以有數供無限遂令九流繁緫人隨歲積今内外文武官一品已下九品已上一萬三千四百六十五員略舉大數當一萬四千人壯室而仕耳順而退取其中數不過支三十年此則一萬四千人而略盡若年别入流者五百人經三十年更得一萬五千足所須之數况三十年之外在官者猶多此便有餘不慮其少今年常入流者遂便逾一千四百計應數外常餘兩倍又常選放還者仍停六七千人更復年别新加實非處置之法其三曰儒為敎化之本學者之宗儒敎不興風俗将替今庠序遍於四海儒生溢於三學勸誘之方理實為備而奨進之道事或未周但永徽已來于今八載在官者以善政粗聞論事者以一言可採莫不光被綸音超昇不次而儒生未聞恩及豈為奨進之道其四曰國家富有四海已四十年百姓官寮未有秀才之舉豈今之人不如昔人将奨賢之道未至寧可方稱多士豈得遂闕斯人望六品已下爰及山谷特降綸言更審捜訪仍量為條例稍加優奨不然赫赫之辰斯舉遂絶一代盛事為朝廷惜之其五曰唐虞三代考績黜陟幽明兩漢用人亦久居其職所以因官命氏有倉庾之姓魏晉已來事無可紀今之在四考即遷官人知将秩滿必懐去就百姓見有遷代能無茍且以去就之官臨茍且之輩責以移風易俗其可得乎望經四考就任加階至八考滿然後聽選還淳反樸雖未敢必期送故迎新實減勞弊其六曰尚書省二十四司及門下中書都事主事主書等比來選補皆取舊任流外有刀筆之人縱欲叅用士流以儔類為恥前後相承遂為故事但掖省崇峻王言祕密尚書政本人物攸歸而多用胥徒恐未盡銓衡之理望有釐革稍清其選明年中書令杜正倫亦言入流人多為政之弊帝遣祥道與正倫詳議其事時宰相已下憚於改作事竟不行魏𤣥同上元中為吏部侍郎𤣥同以既委選舉恐未盡得人之術上疏曰臣聞制器者必擇匠以簡材為國者必求賢以蒞官匠不良無以成其工官非賢無以致於理君者所以牧人也臣者所以佐君也君不養人失君道矣臣不輔君失臣任矣任人者誠國家之基本百姓之安危也方今人不加富盗賊不衰獄訟未清禮義猶闕者繇官不得其才官不得其才者取人之道未盡也臣又聞傅說曰明王奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以治民昔之都國今之州縣士有常君人有定主自求臣佐各選英賢其大臣乃命於王朝耳秦并天下罷侯置守漢氏因之有㳂有革諸侯得自置吏四百石已下其傅相大官則漢為置之州郡掾吏督郵從事悉任之於牧守爰自魏晉始歸吏部遞相祖襲以迄于今用刀筆以量才按簿書而察行法令之弊其來日久蓋君子重因循而憚改作有不得已者亦當運獨見之明定卓然之議如今選司所行者非上皇之令典近代之權道所宜遷革實為至要何以言之夫丈尺之量所及者蓋短鍾庾之器所積者寧多非其所及焉能度之非其所受何以容之况天下之大士人之衆而可委之數人之手乎假使平如權衡明如水鏡力有所及炤有所窮銓綜既紊所失斯廣又以比居此任時有罪人豈眞媿彼清通昧於甄察亦将竭其庸妄揉彼棼絲情故既行何所不至贓私一啟以及萬端至乃為己謀安為人擇利顧親疎而下筆看勢要而措情悠悠風塵此焉奔競擾擾㳺宦同乎市井加以厚貌深衷險如谿壑擇言觀行猶懼不周今使百行九能折之於一面具寮庶品專斷於一司不亦難矣乎且魏人應運所據者蓋三分晉氏播遷所臨者非一統逮乎齊宋以及周隋戰爭之日多安泰之時少𤓰分瓦裂各在一方隋氏平陳十餘年耳接以災禍繼以饑饉既徳業之不遠或時事所未遑非謂是今而非古也武徳貞觀與今亦異皇運之初庶事草創豈惟日不暇給亦乃人物常稀天祚大聖享國永年比屋可封異人間出咸以為有道恥賤得時無怠諸色入流歲以千計羣司升位無復新加官有常員人無定限選集之始霧集雲屯擢叙於終十不收一淄澠雜混玉石難分用捨去留得失相半撫即事之為弊知及後之滋甚夫夏殷以前制度皆闕周監二代煥乎可覩豈諸侯之臣不皆命於天子王朝庶官亦不專於一職故周穆王以伯冏為太僕正命之曰愼簡乃僚無以巧言令色便僻側媚唯吉士此則令其自擇下吏之文也太僕正中大夫耳以僚屬委之則公卿亦必然矣周禮太宰内史掌爵禄廢置司徒司馬别掌興賢詔事當是分任於羣司而統之以數職各自求其小者而王命其大者焉夫委任責成君之體也所委者當所用者精故能得濟濟多士芃芃棫樸裴子野有言曰官人之難先王言之尚矣居家視其孝友鄉黨服其誠信出入觀其志義憂難取其智謀煩之以事以觀其能臨之以利以察其廉周禮始於學校論之州里告諸六事而後貢之王庭其在漢家尚猶然矣州郡積其功能然後為五府所辟舉其掾屬而昇於朝三公叅得除署尚書奏之天子一人之身所闗者衆一賢之集其課也詳故能官得其人鮮有敗事魏晉反是所失𢎞多子野之論蓋區區之宋朝耳猶為不勝其弊而况於當今乎又從政為官不可以無學故書曰學古入官議事以制傳曰我聞學以從政不聞以政入學今貴戚子弟例早求官或髫齔之年已腰銀艾童丱之歲已襲朱紫𢎞文崇賢之生千牛輦脚之類課試既淺藝能復薄而門閥有素資望自高夫象賢繼父古之道也所謂胄子必裁諸學修六禮以節其性明七敎以興其徳齊八政以防其淫尚賢以崇徳簡不肖以黜惡少則受業長而出仕竝繇徳進必以才昇然後可以利用賓王移家事國少仕則廢學輕試則無才於此一流良足惜也又勲官三衞流外之徒不待州縣之舉直取之於書判恐非先徳而後言才之義也臣又以為國之用人有似人之用財貧者厭糟糠思短褐冨者餘粱肉衣輕裘然則當衰弊乏賢之時則可磨䇿朽鈍而乗馭之在太平多士之日亦宜妙選髦俊而任使之詩云翹翹錯薪方之用才理亦當爾選人幸多尤宜簡擇臣竊見制書每令三品五品薦士下至九品亦令舉人此朝廷側席旁求之意也但以褒貶不甚明得失無大隔故人上不憂黜責下不盡捜揚茍以應命莫愼所舉且唯賢知賢聖人篤論伊臯既舉不仁咸遠復患階秩雖同人才異等身且濫集鑒豈知人今欲務得實才兼宜擇其舉主流清因源潔影端繇表正漢書云張耳陳餘之賓客厮役皆天下俊傑彼之蕞爾猶能若斯况以神皇之聖明國家之徳業而不建長久之策為無窮之基盡得賢取士之術而但顧望魏晉之遺風留意周隋之末事臣竊惑之伏願稍廻聖慮時採芻言略因周漢之規以分吏部之選即望所用精詳鮮於差失疏奏不納册府元龜卷四百七十三
