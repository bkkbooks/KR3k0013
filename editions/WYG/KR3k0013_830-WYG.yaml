body:
  text: 冊府元龜卷八百三十宋王欽若等撰總錄部論議第二宋鄭鮮之為桓偉輔國主簿先是兖州刺史滕恬為丁零翟遼所沒屍喪不返恬子羨仕宦不廢議者嫌之桓𤣥在荆州使羣僚博議鮮之議曰名教大極忠孝而已至乎變通抑引每事輒殊本而尋之皆是求心而遺跡跡之所乘遭遇或異故聖人或就跡以助教或因跡以成罪屈伸與奪難以等齊舉其阡陌皆可畧言矣天可逃乎而伊尹廢君君可脇乎而鬻拳見善忠可愚乎而箕子同仁自此以還殊實而齊聲異譽而等美者不可勝言而欲令百代之下聖典所闕正斯事於一朝豈可易哉然立言明理以古證今當使理厭人情如滕羨情事者或終身隱處不闗人事或陞朝理務無譏前哲通滕者則以無譏為證塞滕者則以隱處為美折其兩中則異同之情可見矣然無譏前哲者厭情之謂也若王陵之母見烹於楚不退身窮居非為榮也鮑勛謇諤魏朝亡身為效觀其心非貪爵也凡此二賢非滕之喻夫聖人立教猶云有禮無時君子不行有禮無時正以事有變通不可守一故耳若滕以此二賢為證則恐人人自賢矣若不人人自賢何可獨許其證譏者兼在於人不但獨證其事漢魏以來記闕其典尋而得者無幾人至乎大晉中朝及中興之後楊臻則七年不除喪三十餘年不闗人事温公則見逼於王命庾左丞則終身不著袷髙世逺則為王右軍何驃騎所勸割無有如滕之易者也若以衰麻非為哀之主無所復言矣文皇帝以東闗之役尸骸不反者制其子弟不廢婚宦明此孝子已不自同於人倫有識已審其可否矣若其不爾居宗輔物者但當即聖人之教何所復明制於其間哉及至永嘉大亂之後王敦復申東闗之制於中興原此是為國之大計非謂訓範人倫盡於此也何以言之父讎明不同戴天日而為國不可許復讎此自以法奪情即是東闗永嘉之喻也何妨綜理王務者布衣以處之今明教者自謂世非横流凡士君子之徒無不可仕之理而雜以情譏謂宜在貶裁耳若多引前事以為通證則孝子可顧法而不復讎矣文皇帝無所立制於東闗王敦無所明之於中興每至斯㑹輒發之於宰物是心可不喻乎且夫求理當先以逺大若滄海横流家國同其淪溺若不仕也則人有餘力人有餘力則國可至乎亡家可至乎滅當斯時也匹婦猶亡其身况大丈夫哉既其不然天下之才將無所理滕但當盡陟岵之哀擬不仕者之心何為證喻前人以自通乎且名為大才之所假而小才之所榮榮與假乘常已有慚德無欣工進何有情事乎若其不然則工進無欣何足貴於千載之上耶茍許小才榮其位則滕不當顧常疑以自居乎所謂栁下惠則可我則不可也且有生之所宗者聖人聖人之為教者禮法即心而言則聖人之法不可改也而秦以郡縣治天下莫之能變漢文除肉刑莫之能復彼聖人之為法猶見改於後王况滕頼前人而當必通乎若人皆仕未知斯事可俟後聖與不况仕與不仕各有其人而不仕之所引每感三年之下見議者𢎞通情紀每傍中庸又云若許譏滕則恐亡身致命之仕以此而不盡何斯言之過與夫忠烈之情初無計而後動若計而後動則懼法不盡命若有不盡則國有常法故古人軍敗於外而家誅於内茍忠發自内或懼法於外復有踟蹰顧望之地耶若有功不賞有罪不誅可致斯喻耳無有名教翼其子弟而子弟不致力於所天則王經忠不能救主孝不顧其親是家國之罪人耳何所而稱乎夫恩宥十世非不隆也功髙賞厚非不報也若國憲無負於滕恬則羨之通塞自是名教之所及豈是勸沮之本乎議者又以唐虞邈矣孰知所歸尋言求意將所負者多乎後漢亂而不亡前史猶謂數公之力魏國將建荀令君正色異議董昭不得枕蘇則之䣛賈充受辱於庾純以此而推天下之正義終自傳而不沒何為發斯歎哉若以時非上皇便不足復言多者則夷齊於奭望子房於四人無所復措其言矣至於陳平黙順避禍以權濟屈皆是衛生免害非為榮也滕今生無所衛鞭塞已㝠義安在乎昔陳夀在喪使婢丸藥見責鄉閭阮咸居哀騎驢偷婢身處王朝豈可以阮獲通於前世便無疑於後乎且賢聖抑引皆是究其始終定其才行故雖事有驚俗而理必獲申郄詵葬母後園而身登宦所以免責以其孝也日磾殺兒無譏以其忠也今豈可以二事是忠孝之所為便可許殺兒葬母後園乎不可明矣既其不可便當究滕之才行無所多辯也滕非下官鄉親又不周旋才能非所能悉若以滕謀能決敵才能周用此自追蹤古人非議所及若是士流故謂宜如子夏受曽參之辭可謂善矣而子夏無不孝之稱也意之所懷都盡於此自非名理何縁多其徃復如其折中裁之何尚之為侍中有人嘗求為吏部郎尚之歎曰此敗風俗也官圖人人安得圖官顔延之大笑曰我聞古者官人以才今官人以勢彼勢之所求子何疑焉所與延之論議往反並傳於世南齊顧歡吳郡鹽官人徵太學博士不就歡以佛道二家立教既異學者互相毁譽著夷夏論曰夫辯是與非宜據聖典尋二教之源故兩標經句道經云老子入闗之天竺維衛國國王夫人名曰淨妙老子因其晝寢乘日精入淨妙口中後年四月八日夜半時剖左腋而生墜地即行七步於是佛道興焉此出𤣥妙内篇佛經云釋迦成佛有塵刼之數出法華無量夀佛或為國師道士儒林之宗出瑞應本起歡論之曰五帝三皇莫不有師有道之士無過老莊儒林之宗孰出周孔若孔老非佛誰則當之然二經所說如合符契道則佛也佛則道也其聖則符其跡則反或和光以明近或曜靈以示逺道濟天下故無方而不入智周萬物故無物而不為其入不同其為必異各成其性不易其事是以端委縉紳諸華之容剪髮曠衣羣夷之服擎跽磬折侯甸之恭狐蹲狗踞荒流之肅棺槨殯葬中夏之風火焚水沈西戎之俗全形守禮繼善之教毁貌易性絶惡之學豈伊同人爰及異物鳥王獸長往往是佛無窮世界聖人代興或昭五典或布三乘在鳥而鳴在獸而吼教華而華言化夷而夷語耳雖舟車均於致逺而有川陸之節佛道齊乎達化而有夷夏之别若謂其致既均其法可換者而車可涉川舟可行陸乎今以中夏之性效西戎之法既不全同又不全異下育妻孥上廢宗祀嗜慾之物皆以禮伸孝敬之典獨以法屈悖禮犯順曽莫之覺弱喪忘歸孰識其舊且理之可貴者道也事之可賤者俗也捨華效夷義將安取若以道耶道固符合矣若以俗耶俗則大乖矣屢見刻舷沙門守株道士交諍小大互相彈射或域道以為兩或混俗以為一是牽異以為同破同以為異則乖爭之繇淆亂之本也尋聖道雖同而法有左右始乎無端終乎無末泥洹仙化各是一術佛號正真道稱正一一歸無死真㑹無生在名則反在實則合但無生之教賖無死之化切切法可以進謙弱賖法可以退誇强佛教文而博道教質而精精非麤人所信博非精人所能佛言華而引道言實而抑抑則明者獨進引則昧者競前佛經繁而顯道經簡而幽幽則妙門難見顯則正路易遵此二法之辯也聖匠無心方圓有體器既殊用教亦異施佛是破惡之方道是興善之術興善則自然為髙破惡則勇猛為貴佛跡光大宜以化物道跡密微利用為己優劣之分大畧在兹夫蹲夷之儀婁羅之辯各出彼俗自相矜解猶蟲喧鳥聒何足述效歡雖同二法而意黨道教宋司徒袁粲託為道人通公駁之其畧曰白日停光常星隱炤誕降之應事在老先似非入闗方炳斯瑞又老莊周孔有可存者依日末光憑釋遺法盜牛竊善反以成蠧檢究源流終異吾黨之為道耳西域之記佛經之說俗以膝行為禮不慕蹲坐為恭道以三繞為䖍不以倨傲為肅豈專戎土爰亦兹方襄童謁帝膝行而進趙王見周三環而止今佛法在華乘者常安戒善行交蹈者常通文王造周太伯創吳革化戎夷不因舊俗豈若舟車理無代用佛法垂化或因或革清信之士容衣不改息心之人服貌必變變本從道不遵彼俗風教自殊無患其亂孔老釋迦其人或同觀方設教其道必異孔老治世為本釋氏出世為宗發軫既殊其歸亦異符合之唱自繇臆説又仙化以變形為上泥洹以陶神為先變形者白首還緇而未能無死陶神者使塵惑日損湛然常存泥洹之道無死之地乖詭若此何謂其同歡答曰按道經之作著自西周佛經之來始乎東漢年踰八百代懸數十若謂黄老雖久而濫在釋前是呂尚盜陳恒之齊劉季竊王莽之漢也經云戎氣强獷乃復畧人頰車耶又夷俗長跽法與華異翹左跂右全是蹲踞故周公禁之於前仲尼戒之於後又舟以濟川車以征陸佛起於戎豈非戎俗素惡耶道出於華豈非華風本善耶今華風既變惡同戎狄佛來破之良有以矣佛道實貴故戒業可遵戎俗實賤故言貌可棄今諸華士女氏族弗革而露首偏踞濫用夷禮云於剪落之徒全是胡人國有舊風法不可變又若觀風流教其道必異佛非東華之道道非西戎之法魚鳥異淵永不相闗安得老釋二教交行八表今佛既東流道亦西邁故知世有精麤教有文質然則道教執本以領末佛教救末以存本請問所異歸在何許若以剪落為異則胥靡翦落矣若以立像為異則俗巫立像矣此非所歸歸在常住常住之象常道孰異神仙有死權便之說神仙是大化之總稱非窮妙之至名至名無名其有名者二十七品仙變成真真變成神或謂之聖各有九品品極則入空寂無為無名若服食茹芝延夀萬億夀盡則死藥極則枯此脩考之士非神仙之流也明僧紹正二教論以為佛明其宗老全其生守生者蔽明宗者通今道家稱長生不死名補天曹大乖老莊立言本理文惠太子竟陵王子良並好釋法吳興孟景翼為道士太子召入𤣥圃園衆僧大㑹子良使景翼禮佛景翼不肯子良送十地經與之景翼造正一論大畧曰寳積云佛以一音廣説法老子云聖人抱一以為天下式一之為妙空𤣥絶於有景神化贍於無窮為萬物而無為處一數而無數莫之能名强號為一在佛曰寶相在道曰𤣥牝道之大象即佛之法身以不守之守守法身以不執之執執大象但物有八萬四千行說有八萬四千法法乃至於無數行亦達於無央等級隨縁須導歸一歸一曰迴向向正即無邪邪觀既遣億善日新三五四六隨用而施獨立不改絶學無憂曠刼諸聖共遵斯一老釋未始於嘗分迷者分之而未合億善遍修修遍成聖雖十號千稱終不能盡終不能盡豈可思議司徒從事中郎張融作門律云道之與佛逗極無二吾見道士與道人戰儒墨道人與道士辯是非昔有鴻飛天首積逺難亮越人以為鳬楚人以為鳦人自楚越鴻常一耳以示太子僕射周顒顒難之曰虛無法性其寂雖同位寂之方其㫖則别論所謂逗極無二者為逗極於虛無當無二於法性耶足下所宗之本一物為鴻乙耳驅馳佛道無免二末未知髙鑒緣何識本輕而宗之其有㫖乎往復文多不載歡口不辯善於著筆著三名論甚工鍾㑹四本之流也梁崔靈恩為國子博士先是儒者論天互執論蓋不合於渾論渾不合於蓋靈恩立義以渾蓋為一焉後魏毛脩之為金紫光禄大夫位次崔浩之下浩以其中國舊門雖學不博洽而猶涉獵書傳每推重之與共論說言次遂及陳夀三國志有古良史之風其所著述文義典正皆揚於王庭之言微而顯婉而成章班史以來無及夀者脩之曰昔在蜀中聞長老言夀曽為諸葛亮門下書佐得罪被撻百下故其論武侯云應變將畧非其所長浩乃與論曰承祚之評亮乃有故義過美之譽案其迹也不為負之非挾恨之矣何以云然夫亮之相劉備當九州鼎沸之㑹英雄奮發之時君臣相得魚水為喻而不能與曹氏爭天下委棄荆州退入巴蜀誘奪劉璋偽連孫氏守窮﨑嶇之地僭號邊夷之間此策之下者可與趙佗為偶而以為管蕭之亞匹不亦過乎謂夀貶亮非為失實且亮既據蜀恃山險之固不達時宜弗量勢力嚴威峻法控勒蜀人矜才負能髙視矯舉欲以邊夷之衆抗衡上國出兵隴右再攻祁山一攻陳倉疎遲失㑹摧衂而反後入秦川不復攻城更求野戰魏人知其意閉壘堅守以不戰屈之智窮勢盡憤結攻中發病而死繇是言之豈合古之善將見可而進知難而退者乎脩之謂浩言為然髙允為中書令兼太常卿時中書博士袁敬與侍郎傅黙梁祚論名字貴賤著議紛紜允遂著名字論以釋其惑甚有典證陳竒字脩竒河北人也愛翫經典博通文籍初與河間邢祐同召赴京時秘書監游雅素聞其名始頗好之引入秘省欲授以史職後與竒論典誥及詩書雅贊扶馬鄭至於易訟卦天與水違行雅曰自葱嶺以西水皆西流推此而言易之所及自葱嶺以東耳竒曰易理緜廣包含宇宙若如公言自葱嶺以西豈東廻望兖哉竒執義非雅毎如此類終不茍從北齊杜弼為衛尉卿嘗與邢邵扈從東山共論名理邢以為人死還生恐為蛇畫足弼答曰葢謂人死歸無非有能生之力然物之未生本亦無也無而能有不以為疑因前生後何獨致怪邢云聖人設教本繇勸奬故懼以將來理望各遂其性弼曰聖人合徳天地齊信四時言則為經行則為法而云以虚示物以詭勸民將同魚腹之書有異鑿楹之誥安能使北辰降光龍宫韞櫝就如所論福果可以鎔鑄性靈𢎞奬風教為益之大莫極於斯此即真教何謂非實邢云死之言澌精神盡也弼曰此所言澌如射箭盡手中盡也小雅曰無草不死月令又云靡草死動植雖殊亦此之類無情之卉尚得還生含靈之物何妨再造若云草死猶有種在則復人死亦有識識種不見謂以為無者神之在形亦非自矚離朱之明不能覩雖孟軻觀眸聖愚可察鍾生聽曲山水呈狀乃神之工豈神之質猶玉帛之非禮鐘鼓之非樂以此而推義斯見矣邢云季札言無不之亦言散盡若復聚而為物不得言無不之也弼曰骨肉下歸於土魂氣則無不之此乃形墜魂逰往而非盡如鳥出巢如蛇出穴繇其尚有故無所不之若令無也之將焉適延陵有察微之識知其不隨於形仲尼發習禮之歎美其斯與形别若許以廓然然則人皆季子不謂髙論執此為無邢云神之在人猶光之在燭燭盡則光窮人死則神滅弼曰舊學前儒每有斯語羣疑衆惑咸繇此起蓋辯之者未精思之者不篤竊有末見可以覈諸燭則因質生光質大光亦大人則神不係於形形小神不小故仲尼之智必不短於長狄孟德之雄乃逺竒於崔琰神之於形亦猶君之有國國實君之所統君非國之所生不與同生孰云俱滅邢云舍此適彼生生常在周孔自應同莊周之鼓缶和桑扈之循歌弼曰共隂而息尚有將别之悲窮轍以遊亦興中途之歎况曰聨體同氣化為異物稱情之服何害於聖邢云鷹化為鳩䑕變為鴽黄母為鼈皆是生之類也類化而相生猶光去此燭復燃彼燭弼曰鷹未為鳩鳩則非有䑕既二有何可兩立光去此燭復燃彼燭神去此形亦託彼形又何惑哉邢云欲使土化為人木生眼鼻造化神明不應如此弼曰腐草為螢老木為蝎造化不能誰其然也其後别與邢書云夫建言明理宜出典證而違孔背釋獨為君子若不師聖物各有心馬首欲東誰其能禦奚取於適衷何貴於得一逸韻雖髙管見未喻前後往復再三邢邵理屈而止文多不載王綋年十五隨父在北豫州行臺侯景與人論掩衣法為當左為當右尚書敬顯儁曰孔子云微管仲吾其被髪左袵矣以此言之右袵為是綋進曰國家龍飛朔野雄步中原五帝異儀三王殊制掩衣左右何足是非景竒其早慧賜以名馬唐呂才為太常博士太宗以隂陽書近代以來漸致訛偽穿鑿既甚拘忌亦多遂命才與學者十餘人共加刋正削其淺俗存其可用者勒成五十三卷並舊書四十七巻十五年書成詔頒行之才多以典故質正其理雖為術者所短然頗合經義今畧載其叙數篇其叙宅經曰易曰上古穴居而野處後世聖人易之以宮室蓋取諸大壯迨於殷周之際乃有卜宅之文故詩稱相其隂陽書云卜惟雒食此則卜宅吉凶其來尚矣至於近代師巫更加五姓之説言五姓者謂宫商角徵羽等天下萬物悉配屬之行事吉凶依此為法至如張王等為商武庾等為羽欲似同韻相求及其以栁姓為宫以趙姓為角又非四聲相管其間亦有同是一姓分屬宮商後有􅃨姓數字徵羽不别驗於經典本無斯說諸隂陽書亦無此語直是野俗口傳竟無所出之處唯堪輿經黄帝對於天老乃有五姓之言且黄帝之時不過姬姜數姓暨於後代賜族者多至如管蔡郕霍魯衛毛􅆅郜雍曹滕畢原酆郇並是姬姓子孫孔殷宋華向蕭亳皇甫並是子姓苗裔自餘諸國准例皆然因邑因官分枝布葉未知此等諸姓是誰配屬又檢春秋以陳衛及秦並同水姓齊鄭及宋皆為火姓或承所出之祖或繫所屬之星或取所居之地亦非宮商角徵共相管攝此則事不稽古義理乖僻者也叙禄命曰謹按史記宋忠賈誼譏司馬季主云夫卜筮者髙人禄命以悅人心矯言禍福以盡人財又按王充論衡云見骨體而知命祿此即祿命之書行之久矣多言或中人乃信之今更研尋本非實錄但以積善餘慶不假建禄之吉積惡餘殃豈由刼殺之災皇天無親常與善人禍福之應其猶影響故有夏多罪天命勦絶宋景脩徳妖孛夜移學也禄在豈待生當建學文王勤憂損夀不闗月值空亡長平坑卒未聞共犯三刑南陽貴士何必俱當六合歴陽成湖非獨河魁之上蜀郡炎燎豈繇災厄之下今時亦有同年同祿而貴賤懸殊共命共胎而夭夀更異按春秋魯桓公六年七月魯莊公生今檢長厯莊公生當乙亥之歲建申之月以此推之莊公乃當禄之空亡依祿命書法合貧賤又犯勾絞六害背驛馬三刑當此三者並無官爵火命七月生當病鄉為人尫弱身合矬陋今按齊詩譏莊公猗嗟昌兮頎而長兮美目揚兮巧趨蹌兮唯有向命一條法當長命依檢春秋莊公薨時計年四十五矣此則祿命不驗一也又按史記秦莊襄王四十八年始皇帝生宋忠注云因正月生乃名政依檢襄王四十八年歲在壬寅此年正月生者命當背禄法無官爵假得祿命奴婢尚少始皇又當破驛馬三刑身尅驛馬法當望官不到金命正月生當絶下為人無始有終老而彌吉今檢史記始皇乃是有始無終老更彌凶唯建命生法合長夀計其終時不過五十祿命不驗二也又漢武故事武帝以乙酉之歲七月七日平旦時生亦當祿空亡下法無官爵雖向驛馬尚隔四辰依禄命法少無官榮老而方盛今檢漢書武帝即位年始十六末年已後户口減半禄命不驗三也又按後魏書云孝文皇帝皇興元年八月生今按長厯其年歲在丁未以此推之孝文皇帝背祿命并驛馬三刑身尅驛馬依祿命書法無官爵命當父死中生法當生不見父今檢魏書孝文皇帝身受其父顯祖之禪禮云嗣子位定於初喪踰年之後方始正號是以天子無父父事三老也孝文受禪異於常禮躬率天下以事其親而禄命云不合識父祿命不驗四也又按沈約宋書云宋髙祖癸亥歲三月生依此而推祿之與命並當空亡依祿命書法無官爵又當子墓中生唯宜嫡子假有次子法當早卒今檢宋書髙祖長子先被簒弑次子義隆享國多年髙祖又當祖禄下生法得嫡孫財禄今檢宋書其孫劉劭劉濬並為簒逆幾失宗祧祿命不驗五也叙葬書曰易云古之葬者衣之以薪不封不樹喪期無數後世聖人易之以棺槨蓋取諸大過禮云葬者藏也欲使人不得見之然孝經云卜其宅兆而安厝之以其復土事畢長為感慕之所窀穸禮終永作魂神之宅朝市遷變不得豫測於將來泉石交侵不可先知於地下是以謀及龜筮庶無後艱斯乃備於慎終之禮曽無吉凶之義暨乎近代以來加之隂陽葬法或選年月便利或量墓田逺近一事失所禍及死生巫者利其貨賄莫不擅加妨害遂使葬書一術乃有百二十家各説吉凶拘而多忌且天覆地載乾坤之理備焉一剛一柔消息之義詳矣或成於晝夜之道感於男女之化三光運於上四氣通於下斯乃隂陽之大經不可失之於斯須也至於喪葬之吉凶乃附此為妖妄傳云王者七日而殯七月而葬諸侯五日而殯五月而葬大夫經時而葬士及庶人逾月而已此則貴賤不同禮亦異數欲使同盟同軌赴弔有期量事制宜遂為常式法既一定不得違之故先期而葬謂之不懷後期而不葬譏之殆禮此則葬有定期不擇年月一也春秋又云丁巳葬定公雨不克葬至於戊午襄事禮經善之禮記云卜葬先逺日者善選月終之日所以避不懷也今檢葬書以巳亥之日用葬最凶謹按春秋之際此日葬者凡有二十餘件此則葬不擇日二也禮記又云周尚赤大事用平旦殷尚白大事用日中夏尚黑大事用昏時鄭𤣥注云大事者何謂喪葬也此則直取當代所尚不擇時之早晩春秋云鄭卿子産及子太叔葬鄭簡公於時司墓大夫室當葬路若壞其室即平旦而窆不壞其室即日中而窆子産不欲壞室欲待日中子太叔云若至日中而窆恐久勞諸侯大夫來㑹葬者然子産既云博物君子太叔乃為諸侯之選國之大事無過喪葬必是義有吉凶斯等豈得不用今乃不問時之得失惟論人事可否曽子問云葬逢日蝕捨於路左待明而行所以備非常也若依葬書多用乾艮二時並是近半夜此即文與禮違今檢禮傳葬不擇時三也葬書云富貴官品皆繇安葬所置年命延促亦繇墳壠所招然今按孝經云立身行道則揚名於後世以顯父母易曰聖人之大寶曰位何以守位曰仁是以日慎一日則澤及於無疆茍德不建則人而無後此則非繇安葬吉凶而論福祚延促臧孫有後於魯不闗葬得吉日若敖絶祀於荆不繇遷厝失所此則安葬吉凶不可信用其義四也今之喪葬吉凶皆依五姓便利古之葬者並在國都之北兆域既有常所何取姓墓之義趙氏之葬並在九原漢之山陵散在諸處上利下利蔑爾不論大墓小墓其義安在及其子孫富貴不絶或與三代同風或分六國而王此則五姓之義大無稽古吉凶之理何從而生其義五也且人臣名位進退何常亦有初賤而後貴亦有始泰而終否是以子文三已令尹展禽三黜士師卜葬一定更不迴改冡墓既成曽不革易則何因名位無時蹔安故知官爵𢎞之在人不繇安葬所致其義六也野俗無識皆信葬書巫者詐其吉凶愚者因而徼倖遂使擗踊之際擇葬地而希官品荼毒之秋選葬時以規財禄或云辰日不宜哭而黙對賔客受弔問或云同屬忌於臨壙乃吉服不送其親聖人設教豈其然也葬書敗俗一至於斯其義七也徐有功任地官員外郎有鹿城主簿潘好禮者深慕其為人乃著論曰客有問於主人曰地官徐員外何如也答曰守道君子也客曰徐公明識誠難為儔也何不稍圓通以協隨時之義而取富貴乎何為固守方正乖相時之道幾致死亡者數矣此豈大雅君子全身之義哉答曰夫隨時相宜而取富貴凡情所曉徐公豈不達之若徐公者仁人也夫仁者濟物也此道大矣非常情所知故孔子曰有殺身以成仁無求生以害仁徐公之不愛死亡固守誠節用此道也豈以貴賤生死而易其操履哉問曰仁則信矣忠則如何答曰豈有仁者不忠乎當今帝德文明憂勞庶政思致刑措以隆中興徐公獻可替否盡忠盡節誠欲戴明主於堯舜之上置蒼生於大道之中事跡顯然有識同悉子何疑而問哉客曰鄙人固鄙不閑大體忠則信矣孝則如何答曰豈有忠臣而非孝子乎孝經曰君子之事親孝故忠可移於君立身行道揚名於後代以顯父母今徐公之名聞於四海有志之士莫不増氣豈直揚名亦永錫爾類矣禮曰大孝揚名徐公之謂也問曰徐公之道既髙矣何為蹔處霜臺即奏天官得失牓諸門以示天下規規然是釣名耳其故何哉主人胡盧而笑久而應之曰子徒見培塿未覩泰山乎夫天官者奔競既久濫進𢎞多選司權輕且未能止此弊之甚也徐公既處霜臺以澄清為己任切於救弊急於為善此徐公之情也以為釣名可謂不知言矣客有慚色問曰此人當今可誰與比答曰宇宙至廣人物至多匿跡韜光者固有之矣僕寧敢厚誣天下之士乎若所聞見一人而已當於古人中求之問曰何如張釋之答曰釋之為廷尉天下無寃人此畧同耳然而釋之所行者甚易徐公所行者甚難難易之間優劣可知矣問曰張公徐公皆是國士至於斷獄俱守正途事跡既同有何難易答曰張公逢漢文之時天下無事至如盜髙廟玉環及渭橋驚馬守法而已豈不易哉徐公逢革命之秋屬維新之運唐朝遺老或有包藏禍心遂使陶公之璧有所疑矣至如周興來俊臣者更是堯舜之四凶也掩義隱賊毁信廢忠崇節惡言以誣盛德遂使忠臣側目恐死亡無日矣徐公守死善道深相明白幾陷囹圄數推網羅此吾子所聞豈不難矣易曰進退存亡而不失其正者徐公得之矣客曰若使此人為司刑卿方得展其才用答曰吾子徒見徐公用法平允即謂可置司刑僕觀其人固竒士也方寸之地何所不容若其用之何事不可豈直司刑而已哉客曰今日聞吾子議知徐公之令德未可盡言乎固知君子之道非小人所測也其為當時所稱述如此宋昱為中書舍人知銓天寶十載文部選才多濫選人劉迺獻議於昱曰虞書稱知人則哲能官人巍巍唐虞舉以為難今夫文部既始之以掄材終之以授位是則知人官人斯為重任者在禹稷臯陶之衆聖猶曰載采采有九德考績以九載近代主司獨委一小冡宰察言於一幅之判觀行於一揖之内古今遲速何不侔之甚哉夫判者以狹辭短韻語有定規為體亦猶以一小冶而鼓衆金雖欲為鼎為鏞不可得也故曰判之在文至局促者夫銓者必以崇衣冠自媒耀為賢斯文士之醜行君子所病若引周公尼父於銓庭則雖圖書易象之大訓以判體挫之曽不及徐庾雖有淵黙罕言之至德以喋喋取之曽不若嗇夫嗚呼彼干霄蔽日誠巨樹也當求尺寸之材必後於㭬杙龍吟虎嘯誠希聲也若聲尚於頰舌之感必下於蛙黽觀察之際能不悲夫執事慮過龜策文合雅誥豈拘以瑣瑣故事曲折因循哉誠能先咨以政事次徵以文學退觀其理家進察其臨節則厖鴻深沈之士亦可以窺其門户矣冊府元龜卷八百三十
