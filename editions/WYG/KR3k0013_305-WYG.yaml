body:
  text: 册府元龜卷三百五宋王欽若等撰外戚部儒學退讓畏愼廉儉儒學研精聖哲之言服膺儒籍之道造次於是夙夜不忘此素履之士强學之所爲也若乃生於肺腑之親㓜有青紫之盛遨遊戚里沐浴天澤而能亹亹於儒墨拳拳於文雅上則知其要道下則成其俊才終則保其髙明免夫顚越此皆外屬之選君子之尚者已漢田蚡孝景王皇后同母弟孝景末為中大夫學盤盂諸書孔甲盤盂二十六篇雜家書兼儒墨名法者也馮野王字君卿孝元昭儀之兄也受業於博士通詩爲太子中庻子逡字子産野王之弟也通易太常察孝亷爲郎立字聖卿逡之弟也通春秋爲郎稍遷諸曹參字叔平昭儀之少弟學通尚書少爲黄門郎給事中班伯成帝媫妤之兄少受詩於師丹大將軍王鳳薦伯宜勸學召見宴昵殿親戚宴飲㑹同之殿講說有法拜為中常侍帝方鄉學鄭寛中張禹朝夕講說尚書論語於金華殿在未央宫詔伯受焉既通其義又講異同於許商遷奉車都尉數年金華之業絶出伯弟斿博學有俊材左將軍史丹舉賢良方正以對䇿爲議郎遷諫大夫右曹中郎將與劉向校秘書傅喜字稚游哀帝祖母定陶傅太后從父弟少好學問有志行成帝選爲太子庻子後漢樊鯈光武舅宏之子就侍中丁恭受公羊嚴氏春秋嚴彭祖也刪定公羊嚴氏春秋章句世號樊侯學教授門徒前後三千餘人初爲復土校尉樊凖字㓜陵宏之族曾孫也少勵志行修儒術和帝幸南陽凖爲郡功曹帝器之拜郎中鄧太后臨朝儒學陵替凖乃上疏曰臣聞賈誼有言人君不可以不學故雖大舜聖徳孳孳為善成王賢主崇明師傅及光武皇帝受命中興羣雄擾擾旌旗亂野東西誅戰不遑啟處然猶投戈講藝息馬論道至孝明皇帝兼天地之資用日月之明庶政萬幾無不簡心而垂精古典游意經藝每饗射禮畢正坐自講諸儒並聼四方欣欣雖闕里之化矍相之事誠不足言又多徵名儒以充禮官如沛國趙孝琅邪承宫等或安車結駟告歸鄉里或豐衣博帶從見宗廟其餘以經術見優者布在廊廟故朝多皤皤之良華首之老每宴㑹則論難衎衎共求政化詳覽羣言響如振玉朝者進而思政罷者退而偹問小大隨化雍雍可嘉期門羽林介胄之士悉通孝經博士議郎一人開門徒衆數百化自聖躬流及蠻荒匈奴遣伊秩訾王大車且渠來入就學八方肅清上下無事是以議者每稱盛時咸言永平今學者葢少逺方尤甚博士倚席不講儒者競論浮麗忘謇謇之忠習諓諓之辭文吏則去法律而學詆欺銳錐刀之鋒斷刑辟之重徳陋俗薄以致苛刻昔孝文竇后性好黄老而清静之化流景武之間臣愚以爲宜下明詔博求幽隱發揚巖穴寵進儒雅有如孝宫者徵詣公車以俟聖上講習之期公卿各舉明經及舊儒子孫進其爵位使纘其業復召郡國書佐使讀律令如此則延頸者日有所見傾耳者月有所聞伏願陛下推述先帝進業之道太后深納其言是後屢舉方正敦樸仁賢之士梁松字伯孫少爲郎尚光武女舞陰長公主再遷虎賁中郎將博通經書明習故事與諸儒修明堂辟雍郊祀封禪禮儀常與論議寵幸莫比松弟竦字叔敬二女爲章帝貴人竦少習孟氏易弱冠能教授和帝即位追封竦爲褒親愍侯竇固字孟孫尚光武湼陽公主爲黄門侍郎好覽書傳喜習兵法馬嚴明徳皇后從兄少孤從平原楊太伯講學専心墳典並研窮春秋左氏從司徒祭酒陳元受之因覧百家羣言遂交結英賢京師大人咸器異之仕郡為督郵鄧𢎞和熹皇后之兄少治歐陽尚書授和帝禁中諸儒多歸附之梁商順烈皇后之父少持韓詩兼讀衆書傳記魏卞蘭武帝后弟秉之子少有詞學獻賦贊述太子德美太子報曰賦者言事類之所附也頌者美盛徳之形容也故作者不虛其詞受者必當其實蘭此賦豈吾實哉昔吾丘壽王一陳寶鼎何武等徒以歌頌猶受金帛之賜蘭事雖不諒義足嘉也今賜牛一頭由是遂見親敬晉羊祜字叔子景獻皇后同産弟博學能屬文舉上計吏州四辟從事秀才五府交命皆不就太原郭奕見之曰此今之顔子也後爲征南大將軍羊琇字稚舒景獻皇后之從父弟也渉學有智算累遷中䕶軍王恂字良夫文明皇后弟文義通博在朝忠直累遷河南尹建立二學崇明五經庾亮明穆皇后之兄中興初為中書郎領著作侍講東宫其所論釋多見稱述宋臧燾髙祖敬皇后兄也與弟熹並好經學燾仕至太常袁豹字士蔚文帝袁皇后之從父好學博文覽典籍為著作郎梁王錫字公嘏駙馬都尉琳之子年十二為國子生十四舉清茂除秘書郎與范陽張伯緒齊名俱授太子舍人後魏馮熈字晉昌文明太后之兄也熈生於長安爲姚氏魏母所飬將還長安始就博士學問從師受孝經論語後爲侍中太師中書監北齊李祖昇文宣李皇后之長兄文學足以自通仕至齊州刺史唐竇威字文蔚髙祖太穆皇后從父兄也諸昆弟並尚武藝而威耽玩文史謂爲書癡髙祖初爲丞相府司録參軍禪代文翰多叅預焉仕至内史令長孫無忌貴戚好學該博文史性通悟有籌略仕至太尉竇維鍌昭成順聖皇太后父孝諶從子也好學以撰著爲業時宗族咸以外戚崇飾輿馬維鍌獨清儉自守官至水部郎中撰吉凶禮要十卷行於代晉韓惲世仕太原昆仲爲軍職唯惲親狎儒士好爲歌詩聚書數千卷乾寜中後唐莊宗納其妹爲妃妃初爲嫡室故莊宗深禮其家而惲以文學署交成文水令入爲太原少尹退讓夫居寵思危受爵能讓斯賢逹之令範也矧夫席國姻之勢處外戚之重崇髙疾顚之可畏驕侈自至而不期葢福者禍之所伏盈者人之所惡既物禁乎泰盛道實在於若冲乃有内懐撝抑外忘滿假安和而不競抑損而自持耽近耆徳推避殊寵懇辭政柄願還封邑稱疾而引退抗疏以致誠徵前訓以極其敷喻披至心以祈於哀惻斯固保𤣥元止足之戒遵栢翳謙益之論貴而能降滿而不溢者乎漢竇長君竇太后之兄與弟少君家長安中絳侯灌將軍等曰吾屬不死命乃且懸此兩人於是選長者之有節行者與居長君少君由此為退讓君子王鳳字孝卿元后之昆弟成帝即位鳳以舅爲大司馬大將軍領尚書事時黄霧四塞終日塞滿也言四方皆滿天子以問諫大夫楊興博士駟勝等對皆以爲陰盛侵陽之氣也髙祖之約也非功臣不侯今太后諸弟皆以無功爲侯非髙祖之約外戚未曾有也故天爲見異見顯示也言事者多以爲然鳳於是懼上書辭謝曰陛下即位思慕諒闇諒信闇黙也言居父喪信黙三年不言也故詔臣鳳典領尚書事上無以明聖徳下無以益政治今有茀星天地赤黄之異茀與孛同咎在臣鳳當伏顯戮以謝天下今諒闇已畢大義皆舉宜躬親萬幾以承天心因乞骸骨辭職帝報曰朕承先帝聖緒渉道未深不明事情是以陰陽錯繆日月無光赤黄之氣充塞天下咎在朕躬今大將軍廼引過自予欲上尚書事歸大將軍印綬罷大司馬官是明朕之不德也朕委將軍以事誠欲庶幾冇成顯先祖之功徳將軍其專心固意輔朕之不逮毋有所疑王商字子夏鳳之弟成帝時爲大司馬衞將軍輔政四歲病乞骸骨天子閔之更以爲大將軍實封二千戸王根字稚卿商之弟成帝時爲大司馬驃騎將軍輔政五歲乞骸骨帝廼益封根五千戸賜安車駟馬黄金五百斤罷就第後漢樊宏字靡卿光武之舅建武元年拜光禄大夫五年封長羅侯十五年定封壽張侯及病困車駕臨視留宿問其所欲言宏頓首自陳無功享食大國誠恐子孫不能保全厚恩令臣魂神慙負黄泉願還壽張食邑小鄉亭帝悲傷其言而竟不許陰識字次伯光烈皇后之前母兄建武元年光武即位以爲騎都尉封陰鄉侯二年以征伐軍功增封識叩頭讓曰天下初定將帥有功者衆臣托屬掖庭仍加爵邑不可以示天下帝甚美之以爲闗都尉鎭函谷陰興字君陵光烈皇后之母弟建武二年為黄門侍郎九年遷侍中賜爵闗内侯帝復詔欲封之置印綬於前興固讓曰臣未有先登陷陣之功而一家數人並蒙爵土令天下觖望誠爲盈溢臣蒙陛下貴人恩澤至厚富貴已極不可復加至誠不願帝嘉興之讓不奪其志貴人問其故興曰貴人不讀書記邪亢龍有悔夫外戚家若不知謙退嫁女欲配王侯取婦眄睨公主愚心實不安也富貴有極人當知足夸奢益爲觀聽所譏貴人感其言深自降抑卒不爲宗親求位十九年拜衞尉亦輔導皇太子明年夏帝風眩疾甚後以興領侍中受顧命于雲臺廣室㑹疾瘳召見興欲以代吳漢爲大司馬興叩頭流涕固讓曰臣不敢惜身誠恐損聖徳不可茍冐至誠發中感動左右帝遂聼之馬廖字敬平明徳皇后之兄爲虎賁中郎將性質誠畏愼不愛權勢聲名有司連據舊典奏封廖等累讓不得已建初四年受封爲順陽侯以特進就第每有賞賜輙辭讓不敢當京師以是稱之馬防字江平廖之弟永平末與弟光俱爲黄門侍郎章帝即位拜防車騎將軍光執金吾後又封防潁陽侯光為許陽侯兄弟二人各六千戸屢以明帝寢疾入參醫藥又平定西𦍑增邑千三百五十户屢上表讓位俱以特進就第竇憲章德皇后之兄永元元年為車騎將軍既破北單于詔使中郎將持節即五原拜憲大將軍封武陽侯食邑二萬户憲固辭封賜䇿許焉二年詔曰大將軍憲前歲出征克滅北狄朝加封賞固讓不受舅氏舊典並蒙爵土西漢故事帝舅皆封侯其封憲冠軍侯邑二萬户篤郾侯景汝陽侯瓌夏陽侯各六千户憲獨不受封鄧騭和熹皇后之兄安帝永初元年封上蔡侯隲弟悝葉侯𢎞西平侯閶西華侯食邑各萬户騭以定䇿功增邑三千户騭等辭讓不獲遂逃避使者間闗詣闕間闗猶﨑嶇也上疏自陳曰臣兄弟汚穢無分可採言無分寸可收採也過以外戚遭値明時託日月之末光被雲雨之渥澤並充列位光昭當世不能宣贊風美補助清化誠慙誠懼無以處心陛下躬天然之姿體至聖之德遭國不造仍罹大憂開日月之明運獨斷之慮援立皇統奉承大宗聖䇿定於神心休烈垂於不朽本非臣等所能萬一而猥推嘉美並享大封伏聞詔書驚惶慙怖追觀前世傾覆之誡退自惟念不寒而慄臣等雖無逮及逺見之慮猶有庶幾戒懼之情嘗母子兄弟内相勅勵冀以端慤畏愼一心奉戴上全天恩下完性命刻骨定分有死無二終不敢横受爵土以增罪累惶窘怔營昧死陳乞太后不聼隲頻上疏至於五六乃許之四年母新野君寢病騭兄弟並上書求還侍飬太后以閶最少孝行尤著特聼之賜安車駟馬及新野君薨騭等復乞身行服章連上太后許之騭等既還里第並居冡次閶至孝骨立有聞當時及服闋詔諭隲還輔朝政更授前封隲等叩頭固讓乃止於是並奉朝請位次在三公下特進侯上特進在列侯之上其有大議乃詣朝堂與公卿參謀梁商字伯夏順聖皇后之父爲執金吾陽嘉二年封子冀爲襄邑侯商讓不受三年以商爲大將軍商固稱疾不起梁不疑冀之弟也爲河南尹時冀以不疑好經書喜待士陰疾之因中常侍白帝轉爲光禄勲不疑恥兄弟有隙遂讓位歸第與弟蒙閉門自守伏完爲執金吾獻帝建安元年以后父拜輔國將軍儀同三司完以政在曹操自嫌尊戚乃上印綬拜中散大夫將軍尋遷屯騎校尉晉楊珧武帝悼皇后之叔父珧兄駿以后父爲車騎將軍珧歷位尚書令衞將軍素有名稱得幸於帝時望在駿前以兄貴盛知權寵不可居自乞遜位前後懇至終不獲許及右軍督趙休上書陳王莽五公兄弟相代今楊氏三公並在大位而天變屢見臣竊爲陛下憂之由此珧益懼固求遜位聼之賜錢百萬絹五千疋裴頠字逸民惠帝賈后之從母昆弟歴尚書侍中光禄大夫每授一職未嘗不殷勤固讓及遷尚書左僕射專任門下事頠上言賈模適亡復以臣代崇外戚之望彰偏私之舉后族何嘗有能自保皆知重親無脱者也然漢二十四主惟孝文光武明帝不重外戚皆保其宗豈將獨賢寔以安理故也昔穆叔不拜越禮之饗臣亦不敢聞殊常之詔又表云咎繇謨虞伊尹相商吕望翊周蕭張佐漢咸播功化光格四極暨于繼體咎單傅説祖己樊仲亦隆中興或明揚側陋或起身庶族豈非尚德之舉以臻斯美哉厯觀近世不能慕逺溺於近情多任后親以致不靖昔疏廣戒太子以舅氏爲官屬前世以爲知禮况朝廷何取於外戚正復才均尚當先其疎者以明至公漢世不用馮野王即其事也表上皆優詔敦奬庾亮字元規明穆皇后之兄爲中領軍明帝即位以爲中書監亮上疏讓曰臣凡庸固陋少無殊操昔以中州多故舊邦喪亂隨侍先臣逺庇有道爰容逃難求食而已不悟徼時之福遭遇嘉運先帝龍興垂異常之顧既眷同國士又申以婚姻遂階親寵累忝非服弱冠濯纓沐浴芳風頻塵省闥出總六軍十餘年間位超先達無勞受遇無與臣比小人禄薄福過災生止足之分臣所宜守而偷榮昧進日爾一日謗讟既集上塵聖朝始欲自聞而先帝登遐區區微誠竟未上達陛下踐祚聖政惟新宰輔賢明庶僚咸允康哉之歌實存於至公而國恩不已復以臣領中書則示天下以私矣何者臣於陛下后之兄也姻婭之嫌與骨肉中表不同雖太上至公聖德無私然世之䘮道有自來矣悠悠六合皆私其姻人皆有私則天下無公矣是以前後二漢咸以抑后黨安進婚族危向使西京七族東京六姓皆非姻族各以平進縱不能悉全决不盡敗今之盡敗更由姻昵臣厯觀庶姓在世無黨於朝無援於時植根之本輕也薄也茍無大瑕猶或見容至於外戚憑託天地連勢四時根援扶踈重矣大矣而或居權寵四海側目事有不允罪不容誅身既招殃國爲之弊其故何邪由姻媾之私羣情之所不免是以疏附則信姻進則疑疑積於百姓之心則禍成於重閨之内矣此皆徃代成鑒可爲寒心者也夫萬物之所不通聖賢因而不奪冐親以求一寸之用未若防嫌以明至公今以臣之不才兼如此之嫌而使内處心膂外總兵權以此求治未之聞也以此招禍可立待也雖陛下二相明其愚欵朝士百僚頗識其情天下之人安可門到户説使皆坦然耶夫富貴榮寵臣所不能㤀也刑罰貧賤臣所不能甘也今恭命則愈違命則苦臣雖不達何事背時違上自貽禍責耶實仰覽殷鑒量己知弊身不足惜爲國取悔是以悾悾屢陳丹欵而微誠淺薄未垂察諒憂惶屏營不知所措願陛下􅂷天地之鑒察臣之愚則臣雖死之日猶生之年矣疏奏帝納其言而已亮父琛爲丞相軍諮祭酒卒官以后父追贈左將軍妻母丘氏追封鄉君亮陳先志不受咸和中成帝又下詔追贈琛驃騎將軍儀同三司亮又辭焉庾氷亮之弟也康帝時為車騎將軍領江州刺史鎭武昌及獻皇后臨朝徵氷輔政辭以疾篤尋卒禇裒康獻皇后之父爲衛將軍領中書令裒以中書銓管詔命不宜以姻戚居之固辭詔以爲左將軍兗州刺史太后臨朝拜裒侍中録尚書事裒上書固請居藩曰臣以虚鄙才不周用過蒙國恩累忝非據無勞受寵負愧實深豈可復加殊特之命顯號重疊臣有何勲可以克堪何顔可以冐進委身聖世豈復遺力實懼顛墜所誤者大今王略未振萬幾至殷陛下宜委誠宰輔一遵先帝任賢之道虚己受成坦平心於天下無宜内示私親之舉朝野失望所損豈少於是改授都督青陽徐兖州之晉陵吳國諸軍事衞將軍徐兖二州刺史假節鎭京口永和初復徵裒將以爲揚州録尚書事吏部尚書事劉遐説裒曰㑹稽王令徳國之周公也足下宜以大政付之裒長史王胡之亦勸焉於是固辭歸藩朝野咸歎服之進號征北大將軍開府儀同三司固辭開府何惔穆章皇后之兄也父凖髙尚寡欲徵拜散騎郎不起穆帝升平元年追贈凖金紫光禄大夫封晉興縣侯惔以父素行髙潔表讓不受何澄凖之子也爲尚書領瑯琊王師安帝即位遷尚書左僕射典選王師如故澄以脚疾固讓特聼不朝坐家視事王藴孝武帝定皇后之父遷光禄大夫領五兵尚書本州大中正封建昌縣侯藴以恩澤賜爵非三代令典固辭不受朝廷敦勸終不肯拜乃授都督京口諸軍事左將軍徐州刺史假節藴復固讓謝安謂曰卿居后父之重不應妄自菲薄以虧時遇宜依禇公故事但令在貴權於事不事耳可暫臨此任以紓國姻之重於是乃受命鎭於京口宋何戢尚山陰公主爲吏部郎元徽初禇淵參朝政引戢爲侍中時年二十九戢以年未三十苦辭内侍表疏屢上時議許之改授司徒左長史梁王錫駙馬都尉份之子爲吏部郎中時年二十四謂親友曰吾以外戚謬被時知多叨人爵本非志望兼此羸病庻務難擁安能舍其所好而狥所不能乃稱疾不拜便謝遣胥徒拒絶賔客掩扉覃思室宇蕭然後魏髙植文昭皇太后之兄子自中書侍郎為濟州刺史率州軍討破元愉别將有功當蒙封賞不受云家荷重恩爲國致效是其常節何足以應進陟之報懇惻發於至誠竇瑗字雅珍尚孝文女淮陽公主除駙馬都尉封汝南王瑗固辭不拜李延宴字子熹爲左將軍光州刺史莊帝即位以元舅之尊超受侍中太保封濮陽郡王延宴以保字犯祖諱又以王爵非庶姓所宜抗表固辭徙封濮陽郡公改授太傅北齊段榮除嬴州刺史榮妻婁皇后姊也恐髙祖招私親之議固推諸將竟不之州隋竇榮定尚髙祖姊安成長公主開皇初拜左武衛大將軍髙祖欲以爲公榮定上書曰每觀西朝衞霍東都梁鄧幸托葭莩位極台鉉寵積驕盈必致傾覆向使前賢少自貶損逺避權勢推而不居則天命可保何覆宗之有臣每覽前修實爲畏懼髙祖乃止桞述尚髙祖女蘭陵公主仁壽中任寄逾重爲兵部尚書參掌機宻述自以無功可紀過叨匪報抗表陳讓髙祖許之令攝兵部尚書事唐長孫無忌文德皇后之兄貞觀二年爲尚書右僕射深以滿盈爲戒懇辭機宻文徳皇后又爲之辭讓太宗不獲已下詔曰昔東漢功臣莫任機宻西京戚里或存退讓故能長守富貴不懼危殆尚書右僕射齊國公無忌神識清舉風彩凝映賢戚之望朝野所推比軒禁不虞釁生慮表倉卒之間厥功以茂自居樞要聲寔俄逺然以椒掖之親處權衡之地深知止足有戒滿盈之言情辭懇切宜遂其心以勵貪競可解尚書右僕射仍進散位開府儀同三司吳湊章敬皇后之弟寶應二年封拜外戚授湊太子詹事封濮陽郡公湊固讓改檢校太子賔客兼太子家令十王宅使畏愼詩曰戰戰兢兢如臨深淵如履薄氷易曰君子思患而豫防之斯畏愼之謂也乃有連帝族之懿席外親之寵位勢貴盛光華舉集而能軫髙危之慮保謙益之訓側身以怵惕斂跡而韜晦簡御門族謹守法度周旋富盛深懲侈縱惟止足而是念專静黙以自守由漢之後不乏其人莫不亢宗保身厯屯夷而無咎令聞長世俾子孫之逄吉者焉漢班伯成帝媫妤之兄以定襄太守徵道病中風中傷也爲風所傷既至以侍中光禄大夫飬病受其秩俸而在家自養也賞賜甚厚數年未能起㑹許皇后廢媫妤供飬東宫元后成帝母進侍者李平為媫妤而趙飛燕爲皇后伯遂稱篤久之帝出過臨候伯伯惶恐起視事伯弟穉少爲黄門郎中常侍方直自守成帝季年立定陶王爲太子數遣中盾請問近臣盾讀曰允詹事之屬官也穉獨不敢答言其愼傅晏哀帝傅皇后父也初封孔鄉侯晏深善於桓譚是時髙安侯董賢寵幸女弟為昭儀皇后日已疎晏嘿嘿不得意譚進説曰昔武帝欲立衞子夫陰求陳皇后之過而陳后終廢子夫竟立今董賢上至愛而女弟尤幸殆將有子夫之變可不憂哉晏驚動曰然爲之奈何譚曰刑罰不能加無罪邪枉不能勝正人夫士以才智要君女以媚道求主皇后年少希更艱難或驅使醫巫外求方技此不可不偹又君侯以后父尊重而多通賔客必借以重勢貽致譏議不如謝遣門徒務執謙慤此修己正家避禍之道也晏曰善遂罷遣賓客入白皇后如譚所戒後賢果風太醫令真欽使求傅氏罪過遂逮后弟侍中喜詔獄無所得乃解故傅氏終全於哀帝之時後漢樊宏光武之舅建武中封壽張侯位特進宏爲人謙柔畏懼不求茍進嘗戒其子曰富貴盈溢未有能終者吾非不喜榮勢也天道惡滿而好謙前世貴戚皆明戒也保身全已豈不樂哉每當朝㑹輒迎期先到俯伏待事時至乃起帝聞之常敕騶騎臨朝乃告勿令豫到宏所上便宜及言得失輒手自書冩毁削草本公朝訪逮不敢衆對宗族染其化未嘗犯法帝甚重之宏子鯈字長魚謹約有父風建武中禁網尚濶諸王既長各招引賔客以鯈外戚争遣致之而鯈清静自保無所交結及沛王輔事發貴戚子弟多見收捕鯈以不豫得免永平中鯈弟鮪爲子賞求楚王英女敬鄉公主鯈聞而止之曰建武時吾家並受榮寵一宗五侯時特進一言宏為特進女可以配王男可以尚主但以貴寵過盛即爲禍患故不爲也且爾一子奈何棄之於楚乎鮪不從其後楚事發覺帝追思鯈謹恪又聞其止婚事故其諸子得不坐隂識字次伯光烈皇后前母兄明帝為太子以識守執金吾入雖極言正議及與賓客語未嘗及國事帝敬重之常指識以敕戒貴戚激勵左右焉馬廖字敬平明徳皇后之兄以父任爲郎永平末受遺詔代趙熹爲衞尉時朝廷大議輙以詢訪廖性質誠畏愼不愛權勢聲名盡心納忠不屑毁譽馬光廖之弟爲黄門侍郎為人小心周宻章帝以是特親愛之馬嚴明德皇后從父兄初任郡督郵嚴聞明德立乃閉門自守猶復慮致譏嫌遂更徙北地斷絶賔客馮柱尚明帝女獲嘉長公主少爲侍中以恭肅謙約稱位鄧隲和熹皇后之兄三遷虎賁中郎將自太后臨朝兄弟皆居禁中隲謙遜不欲久在内連求還第歳餘太后乃許之隲深戒竇氏章帝竇皇后勲女祖穆及叔父俱尚主交輕薄屬託於郡縣干亂政化後並坐怨望謀不軌故鄧氏深引爲誡者檢勑宗族闔門静居闔閉也鄧康和熹皇后從父子襲父珍封夷安侯康以太后久臨朝政宗門盛滿數上書長樂宫諫諍宜崇公室自損私權言甚切至太后不從康心懐畏懼遂謝病不朝梁商順烈皇后之父爲大將軍簡御門族未曾以權盛干法竇武字子游桓思皇后之父延熹中爲城門校尉封槐里侯武兄子虎賁中郎將紹性疎簡奢侈每數切慮相戒猶不覺悟乃上書求退紹位又自責不能訓導當先受罪由是紹更遵節大小莫敢違法魏郭徳明帝郭元后之從弟封平原侯司馬景王輔政以女妻徳妻早亡文王復以女繼室即京兆長公主德雖無才學而恭謹謙順吳全琮尚大帝女公主爲大司馬軍師琮既親重宗族子弟並蒙寵貴賜累千金然謙虛接物貌無驕色晉楊珧字文琚駿之弟也厯位尚書令衛將軍素有名稱以兄貴盛知權寵不可居自乞遜位前後懇至終不獲許初聘悼后珧表曰厯觀古今一族二后未嘗以全而受覆宗之禍乞以表事藏之宗廟若如臣之言得以免禍從之右軍都督趙休上書王莽五公兄弟相代今楊氏三公並在大位而天變屢見臣竊爲陛下憂之由此珧益懼固求遜位聽之楊濟字文通珧之弟也累遷太子太傅與兄珧深懼盛滿乃與諸甥李斌等共切諫兄駿斥出王祐爲河東太守建立皇儲皆濟謀也王藴孝武定皇后父爲丹陽尹加散騎常侍藴以姻戚不欲在内苦求外出復以爲都督浙江東五郡鎭軍將軍㑹稽内使常侍如故禇裒爲尚書以后父苦求外出除江州刺史宋王偃孝武皇后父爲右光禄大夫而偃謙虚恭謹不以世事闗懐梁王騫拜度支尚書加給事中領射聲校尉初騫見諸女子姪皆嬪王尚主朔望來歸輜軿塡溢非所欲也勑歲中不過一再見嘗從容謂諸子曰吾家本素族自可依流平進不須茍求也何裔齊永昌中爲國子祭酒鬱林嗣位裔為后族甚見親待累遷左民尚書領驍騎中書令領臨海巴陵王師裔雖貴顯常懐止足蔡撙字景節為吏部尚書女爲昭明太子妃自詹事已下咸來造謁徃徃稱疾相聞遣之及其引進但暄寒而已此外無復餘言後魏馮誕字思正文明太后兄元熈之子也與弟修年纔十餘文明太后俱引入禁中申以教誡整餙容儀寛雅恭謹而已北齊斛律金爲太師左丞相一門一皇后二太子妃三公主金嘗謂長子光曰我雖不讀書聞古來外戚梁冀等無不傾滅女若有寵諸貴妬人女若無寵天子嫌人我家直以立勲抱忠致富貴豈可藉女也辭不獲免常以爲憂元韶襲封彭城王爲太傅録尚書事文宣天保元年降爵為公性行溫裕以髙氏壻頗膺時寵能自謙退韓軌封安徳郡王軌妹爲神武所納生上黨王渙復以勲庸厯登台鉉常以謙恭自處不以富貴驕人後周閻慶爲寜州刺史位柱國晉公䕶母慶之姑也䕶雖擅朝而慶未嘗阿附及䕶誅武帝以此重之乃詔慶子毗尚帝女清都公主慶雖位望隆重婚連帝室常以謹愼自守時人以此稱之竇毅爲大司馬性温和每以謙愼自守又尚太祖第五女襄陽公主時爲朝廷所委信雖任兼出入未嘗有矜惰之容時人以此稱焉唐吳漵章敬皇后之弟寶應中以元舅拜鴻臚少卿久之改左金吾將軍建中初遷大將軍漵以恭愼謙約聞於時吳湊章敬皇后之弟小心謹愼智識周敏代宗朝獨承顧問自貞元已後徳宗任遇信重徧厯中外親要之職雖云聖奬隆深亦湊小心敬愼所致也王用莊憲皇后之弟憲宗時以元舅爲金吾衞大將軍謙和善守寡所與事公卿大夫以此多之郭釗憲宗懿安皇后之兄也母代宗長女昇平公主釗元和中檢校工部尚書充邠寧節度使數歲徵入爲檢校户部尚書兼司農卿釗大勲之後積代姻聨帝戚而能恭愼自持居官處家無驕怠之色奢侈之失釗弟鏦又尚順宗長女徳陽公主爲駙馬都尉殿中監穆宗即位鏦以叔舅改金吾大將軍太子詹事充閑廏宫苑使從容上列三十餘載椒房之貴舅氏之尊國朝外戚罕有其比而恭遜恪愼爲時論所稱晉安彦威與少帝母太妃安氏近屬也帝以渭陽待之而未嘗挂於齒牙及卒太妃親至彦威汴京舊第預其䘮事人方知之聞者服其愼重亷儉夫居戚屬之地有肺腑之親富貴既盈驕侈必至乃有操行自著志尚不羣持若驚之心知守約之道外無輿馬之飾内無峙積之帑辭賞賜之命塞賂遺之門以至第宅纔蔽於風雨妻子略充於衣食矯滛靡之失顯端愼之名使國家無私恩之譏世禄垂由禮之訓傳於方䇿亦可謂之賢矣漢𫝊喜字稚游定陶太后從父弟時丁傅驕奢皆嫉喜之恭儉位至大司馬後漢陰興光烈皇后母弟建武中爲期門僕射每出入嘗操持小葢鄣翳風雨躬履塗泥第宅茍完纔蔽風雨鄧隲女弟爲和熹皇后隲弟𢎞卒后賜錢十萬布萬疋隲等辭不受時元元之災人士荒饑死者相望盗賊羣起隲兄弟崇節儉罷力役故天下復安隲位至大將軍竇武長女爲桓帝皇后武爲城門校尉清身疾惡禮賂不通妻子衣食纔充足而已是時𦍑蠻冦難歲儉民饑武得兩宫賞賜悉散與太學諸生及載肴糧於路匄施貧民魏茍暉尚書令彧長子太祖以女妻暉後稱安陽公主彧及弟攸並貴重皆謙冲節儉禄賜散之宗族知舊家無餘財暉官至虎賁中郎將晉王恂以文明皇后弟為河南尹鬲令袁毅嘗餽以駿馬恂不受及毅敗受貨者被廢黜庾氷字季堅明穆皇后亮之弟也氷天性清愼常以儉約自居中子襲嘗貸官絹十疋氷怒捶之市絹還官及卒無絹爲衾又室無妾媵家無私積世以此稱之禇裒康帝時以后父爲江州刺史鎭半洲在官清約雖居方伯常使私僮樵採王濛字仲祖哀帝靖皇后父俸禄資産嘗推厚居薄以清約見稱王恭字孝伯孝武定皇后兄以外戚爲將帥及死之日無財帛唯書籍而已爲識者所傷宋趙倫之武穆皇后弟爲左光禄大夫領軍倫之雖外戚貴盛而以儉素自處臧燾武敬皇后兄自髙祖受命徵拜太常雖外戚貴顯而彌自冲約茅屋蔬餐不改其舊所得俸禄與親戚共之後魏胡國珍靈太后之父少好學雅尚清儉位至侍中唐長孫敞字休明文德皇后之季父少儉約不事華侈而好節義位至宗正卿平原郡公蕭復字履初新昌公主子父衡爲太僕卿駙馬都尉復生於戚里少秉清操其羣從兄弟競飾輿馬以侈靡相髙復衣澣濯之衣獨居一室習學不倦非詞人儒士不與之游伯父華每歎異之曰興吾門者必此子也竇維鍌𤣥宗舅希􅞓從父弟也好學以著撰為業時宗族咸以外戚崇飾輿馬惟鍌獨清儉自守官至兵部郎中郭皎憲宗皇后從父即尚父子儀之猶子也勲閥之家獨守儉素以是獲用於時位至邠寧節度使册府元龜卷三百五
