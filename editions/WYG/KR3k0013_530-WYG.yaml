body:
  text: 册府元龜卷五百三十宋王欽若等撰諫諍部規諌第七後魏郭祚為黄門侍郎時孝文以李彪為散騎常侍祚因入見帝謂祚曰朕昨誤授一人宫祚對曰陛下聖鏡照臨掄才授職進退可否黜陟幽明品物既彰人倫有序豈容聖詔一行而有差異帝沈吟曰此自應有讓因讓朕欲别授一官頃之彪有啓云伯石辭卿子産所惡臣欲之己久不敢辭讓帝歎謂祚曰卿之忠諫李彪正辭使朕遲廻不能復决不換彪官也李冲為侍中時車騎南伐以冲兼左僕射留守洛陽車駕渡淮别詔安南大将軍元英平三州将軍劉藻討漢中召雍涇岐兵六千人擬戍南鄭克城則追冲表諫曰秦州險阨地接羌夷自西師出後餉援連續加氐羗叛逆所在奔命運糧擐甲迄兹未己今復預差戍卒懸擬山外雖加優復恐猶驚駭脱終攻不尅徒動民情連結勢援事或難測輒依旨密下刺史待軍尅鄭城然後差遣如臣愚見猶為未足何者西道險阨單徑千里今欲深戍絶界之外孤據郡賊之中敵攻不可卒援食盡不可運糧古人有言雖鞭之長不及馬腹南鄭於國實為馬腹也且昔人攻伐或城降而不取仁君用師或撫民而遺地且王者之舉情在拯民夷寇所守志在吾地校之二義徳有淺深患聲已遠何遽於一城哉且魏境所掩九州過八民人所臣十分而九所有未民者惟漢北之與江外耳覆之在近豈急急于今日宜待大開疆宇廣拔城聚多積資糧食足支敵然後置邦樹将為吞并之舉今鍾離壽春密邇未拔堵城新野跬步弗降所尅者舍之而不取所降者撫之而旋越東道既未可以近力守西蕃寧可以遠兵固若果欲置者臣恐終以資敵也又今建都中土地接冦壤方須大收死士平蕩江會輕遣單寡棄令䧟没恐後舉之日衆以留守致懼求其死效未易可獲推此而論不戍為上帝從之高閭為中書令時出師討淮北閭表曰伏見廟筭有事淮海雖成事不説猶可思量臣以愚劣本非武用至於軍旅先所不學直以無諱之朝敢肆狂瞽區區短見竊有所疑臣聞兵者凶器不得已而用之今天下開泰四方無虞豈宜盛世干戈妄動疑一也淮北之城凡有五處難易相兼皆須攻擊然攻守難圖力懸百倍反覆思量未見其利疑二也縱使歸心于國無用發兵遠入費損轉多若不置城是謂空爭疑三也脱不如意當延日月屯軍聚費于何不用疑四也伏願思此四疑時速返斾文明太后令曰六軍電掃有若摧朽何慮四難也後閭為相州刺史時孝文選都洛陽閭表諫言遷有十損必不得已請遷于鄴孝文頗嫌之南齊雍州刺史曹虎據襄陽請降詔劉昶薛真度等四道南伐車駕親幸懸瓠閭表諌曰洛陽草剏虎既不遣質任必非誠心無宜輕舉帝不納虎果虛詐諸将皆無功而還後又上表曰臣聞為國之道其要有五一曰文徳二曰武功三曰法度四曰防固五曰刑賞故遠人不服則修文徳以來之荒服干命則審武功以威之民未知戰則制法度以齊之暴敵輕侵則設防固以禦之臨事制勝則明刑賞以勸之用能闢國寧方征伐四尅敵人之力有所長短所長者野戰所短者攻城若以彼之所短奪其所長則雖衆不能成患雖來不能内逼又彼散居野澤隨逐水草戰則與家產並至奔則與畜牧俱逃不齎資糧而飲食足是以古人伐北方攘其侵掠而已歴代為邊患者良以倐忽無常故也六鎮勢分倍衆不闘互相圍逼難以制之昔周命南仲城彼朔方趙靈秦始長城是築漢之孝武踵其前事此四代之君皆帝王之雄傑所以同此役者非智術之不長兵衆之不足乃防邊之要事其理宜然故也易稱天險不可升地險山川邱陵王公設險以守其國長城之謂歟今宜依故六鎮之北築長城以禦北邊雖有暫勞之勤有永逸之益如其一城惠及百世即於要害往往開門造小城於其側因施却敵多置弓弩狄來有城可守有兵可捍既不攻城野掠無獲草盡則走終始必懲又宜發近州武勇四萬人及京師二萬人合六萬人為武士於苑内立征北大将軍府選忠勇有志幹者以充其選下置官属分為三軍二萬人專習弓射二萬人專習戈楯二萬人專習騎弰修立戰塲十日一習採諸葛亮八陣之法為平地禦冦之方使其解兵革之宜識旌旗之節兵氣精堅必堪禦寇使将有定兵兵有常主上下相信晝夜如一七月發六軍兵萬人各僃戎作之具勅臺北諸屯倉庫隨近米俱送北鎮至八月征北部率所領與六鎮之兵直至磧南揚威漢北北狄若來拒之與决戰若其不來然後散分其地以築長城計六鎮東西不過千里若一夫一日之功當三步之地三百人三里三千人三十里三萬人三百里則千里之地强弱相兼計十萬人一月必就運糧一月不足為多人懐永逸勞而無怨計築長城其利有五罷逰防之苦其利一也北部放牧無抄掠之患其利二也登城觀敵以逸待勞其利三也省境防之虞息無時之備其利四也歲嘗㳺運永得不遣其利五也又任将之道特須委任送之以禮恕之以情閫外之事有利輒决赦其小過安其大功足以兵力資其給用君臣相體若身之使臂然後忠勇可立制度可果是以忠臣盡其心征将竭其力雖三敗而踰榮雖三背而彌寵詔曰覧表具卿安邊之策此當與卿靣論後又上表曰奉癸未詔書以春秋少雨饑饉之方臻愍黎元之傷瘁同禹湯罪己之誠齊堯舜引咎之徳慮災致懼詢及卿士令各上書極陳損益深恩被于蒼生厚惠流于后土伏惟陛下天啓聖姿利見纂極欽若昊天光格宇宙太皇太后以睿哲賛世稽合三才高明柔克道被無外七政昭宣于上九功咸序于下君人之量逾高謙光之㫖彌篤修復祭儀宗廟所以致敬飭正器服禮樂所以宣和増儒官以重文徳簡勇士以昭武功慮獄訟之未息定刑書以理之懼蒸民之姦軌置隣黨以穆之究庶官之勤劇班俸禄以優之知勞逸之難均分民土以齊之甄忠明孝矜貧恤獨開納讜言抑絶讒佞明訓以體率土移風雖未勝殘去殺成無為之化足以仰答三靈者矣臣聞皇天無私降鍳在下休咎之徵咸由人召故帝道昌則九疇叙君徳衰而彛倫斁休瑞並應享以五福則康於其邦咎徵屢臻罰以六極則害於其國斯乃洪範之實徵神祗之明驗及其厄運所纒世鍾陽九數乖於天理事違於人謀時則有之矣故堯湯逢歴年之災周漢遭水旱之患然立功修行終能弭息今孝治則有如此之風計運未有如彼之害而陛下慇懃引過事邁前王徙星澍雨之徵指辰可必消災滅禍之符灼然自見雖王畿之内頗為少雨闗外諸方禾稼仍茂茍動之以理綏之以和一歲不收未為大損但豫備不虞古之善政安不忘危有國常典竊以北鎮新徙家業未就思親念本人有愁心一朝有事難以禦敵可寛其往來頗使欣慰開雲中平城之倉以賑恤之足以感德致力邊境矣明察畿甸之民饑甚者出靈邱下舘之粟以救其乏以安慰孤寡樂業保土使幽定安并四州之租隨運以益其處開闗弛禁薄賦賤糴以消其費道路資其東西隨豐迎食貧富相贍可以免度凶年不為患苦又聞常士困則濫竊生匹婦餒則慈心薄凶儉之年民輕違犯可緩其使役急其禁令宜於未然之前申勅外牧又一夫幽枉王道為虧京師之獄或恐未然可集見囚於都曹使明折庶獄者加究察輕者即可决遣重者定状以聞罷非急之務放無用之獸此乃救凶之常法且以見憂於百姓論曰不患貧而患不安茍安而樂生雖遭凶年何傷於民庶也愚臣所見如此而已詔曰省表聞之當勅有司依此施行出為鎮南将軍相州刺史孝文攻鍾離未尅将於淮南修故城而置鎮戍以撫新附之民賜閭璽書具論其状閭表曰南土亂亡僣主屢易陛下命将親征威陵江左望風慕化尅拔數城施恩布徳擕民襁負可謂澤流邊方威惠普著矣然無非大舉興發後時本為迎䧏戎卒實少兵稱十則圍之倍則攻之所率既寡東西懸濶難以並稱伏承欲留戍淮南招撫新附昔世祖以廻山倒海之威歩騎數十萬南臨𤓰步諸郡盡降而盱眙小人攻而弗尅班師之日兵不戍一郡士不闢一㕓夫豈無人以大鎮未平不可守小故也堰水先塞其源伐木必拔其根源不塞根不拔雖翦枝竭流終不可絶矣壽陽盱眙淮陰淮南之本源也三鎮不尅其一而留兵守郡不可自令明矣既逼敵之大鎮隔深淮之險少置兵不足自固多留衆運糧難可克又欲修渠通漕路必繇于泗口泝淮而上須經角城淮陰大業舟船素蓄敵因先積之資以拒始行之路若元戎旋斾兵士挫怯夏雨水長救援實難忠勇雖奮事不可濟淮陰東接山陽南通江表兼近江都海西之資西有盱眙壽陽之鎮且安土樂本人之常情若必留戍軍還之後恐為敵擒何者鎮戍新立懸在異境以勞禦逸以新擊舊而能自固者未之有也昔彭城之役既尅其城戍鎮已定而思叛外向者猶過數萬角城蕞爾處在淮北去淮陽十八里五固之役攻圍歴時卒不能克以今比昔事兼數倍今以向熱水流方降兵刃既交雖以恩恤降附之民及諸守令亦可徙置淮北如其不然進兵臨淮速渡士卒班師還京踵太武之成規營皇居于伊洛蓄力以待敵釁布徳以懷遠人使中國清穆化被遐裔淮南之鎮自效可期天安之㨗指辰不遠車駕還幸石濟閭朝於行宫孝文謂閭曰朕往年之意不欲决征但兵士已集恐為幽王之災不容中止發洛之日正欲至于懸瓠以觀形勢然機不可失遂至淮南而彼諸将並列州鎮至元所獲定繇晩一月日故也閭對曰人皆是其所事而非其所不事猶犬之吠非其主且古者攻戰之法倍則攻之十則圍之聖駕親戎誠應大㨗所以無大獲者良繇兵少故也且徙都天下之大事今京邑甫爾庶事造創臣聞詩云惠此中國以綏四方臣願陛下當從容伊􅈆優游京洛使徳被四海中國輯寧然後向化之徒自然樂附高祖曰願從容伊􅈆實亦不少但未獲耳閭曰司馬相如臨終恨不見封禪今雖江介不賔小賊未殄然中州之地畧亦盡平豈可於聖明之辰而闕盛禮齊桓公覇諸侯猶欲封禪而況萬乘高祖曰此桓公屈於管仲荆揚未一豈得如卿言也閭曰漢之名臣皆不以江南為中國且三代之境亦不能遠高祖曰淮海惟揚州荆及衡陽惟荆州此非近中國乎朱延雋為中書侍郎宣武專心釋典不事墳籍延雋上䟽諫曰臣聞有堯文思欽明稽古媯舜體道墳典作聖漢光神叡軍中讀書魏武英規馬上翫籍先帝天縱多能克文克武營遷講代手不釋卷良以經史義深補益處廣雖則劬勞不可暫輟斯乃前王之美實後王之冰鏡善足以遵惡足以誡也陛下道悟自深淵鍳獨得昇法坐於宸闈釋覺善於日宇凡在聽矚塵蔽俱開然五經治世之範六籍軌俗之本盖以訓物有漸應時匪妙必須先粗後精乘近即逺伏願經書𤣥覧孔釋兼存則内外俱固真俗斯暢韓麒麟為齊州刺史麒麟以新附之人未階臺官士人沉抑乃表曰齊士自屬偽方歴載久逺舊州府寮動有數百里自皇威開被并職從省守寄闕任不聽士人監督竊惟新人未階朝官州郡局任甚少沉塞者多願言冠冕輕為去就愚謂守宰有闕宜推用豪望増置官員廣延賢喆則華族蒙榮良才獲叙懷徳安上庶或在兹朝議從之太和十一年京南大饑麒麟表陳時務曰古先哲王經國立治積儲大稔謂之太平故躬籍千畝以勵百姓用能衣食滋茂禮教興行逮于中代亦崇斯業刈粟者與斬敵同爵力田者與孝弟均賞寔百王之常軌為治之所先今京師民庶不田者多游食之口三分居二盖一夫不耕或受其饑况於今者動以萬計故頃年山東遭水而民有餒終今秋京都遇害榖價踴貴實由農人不勸素無儲積故也惟陛下天縱欽明道高三五昩旦憂勤思恤民弊雖帝虞一日萬幾周文昃不暇食蔑以為喻上垂覆載之澤下有凍餒之人皆由有司不為明制長吏不恤其本自承平日乆豐穰積年競相矜夸遂成侈俗車服第宅奢僣無限䘮葬婚娶為費實多富貴之家童妾袨服工商之族玉食錦衣而農夫餔糟糠蠶婦乏短褐故令耕者日少田有荒蕪榖帛罄於府庫寳貨盈於市里衣食匱於室麗服溢於路饑寒之本實在於斯愚謂凡珍異之物皆宜禁斷吉凶之禮備為格式令貴賤有别民歸樸素制天下男女計口受田宰司四時廵行臺史歲一案檢勤相勸課嚴加賞罰數年之中必有盈贍雖遇災凶免于流亡矣往年校比戸貫租賦輕少臣所統齊州租粟僅可給俸畧無入倉雖與民為利而不可久長脫有戎役或遭天災恐供給之方無所取濟可減絹布増益榖租年豐多積歲儉出賑所謂私民之榖宿積則民無荒年矣甄琛為河南尹琛表曰詩稱京邑翼翼四方是則者京邑是四方之本安危所在不可不清是以國家居代患多盗竊世祖太武皇帝親自憤發廣置主司里宰皆以下代令長及五等散男有經畧者乃得為之又多置吏士為其羽翼崇而重之始得禁止今遷都以來天下轉廣四方赴㑹事過代都五方雜沓難可備簡寇盗公行却害不絶此由諸方混雜釐比不精主司闇弱不堪檢察故也凡使人攻堅木者必為之擇良器今河南郡是陛下天山之堅木盤根錯節亂植其中六部禮尉即攻堅之利器非真剛精銳無以治之今擇尹既非南金里尉鈆刀而割欲望清肅都邑不可得也理正乃流外四品職輕任碎多是不才人懷茍且不能督察故使盗得容姦百賦失理鄉邊外小縣所領不過百戸而令長皆以将軍居之京邑諸坊大者或千戸或五百戸其中皆王公卿尹貴勢姻戚豪猾僕隸蔭養姦徒高明䆳宇不可干問又有州郡俠客蔭結貴㳺附黨連群陰為布刼比之邊縣難易不同今難彼易此實為未愜王者立法隨時從宜改弦易調明主所急先朝立品不必即是施而觀之不便則改今閑官靜任猶聽長兼况煩劇要務不得簡能下領請取武官中人品将軍已下幹用貞濟者以本官俸恤領里尉之任各食其禄高者領六部尉中者領經途尉下者領里正不爾請少高里尉之品遷下品中應選之者進而為之督責有所輦轂可清詔曰里正可進至勲品經途從九品六部尉正九品請職中簡取何必須武人也琛又奏以羽林為游軍於諸坊巷司察盗賊於是京邑清靜至今踵焉游肇為侍中将軍高肇伐蜀肇諫曰臣聞逺人不服則修文徳以來之兵者凶器不得已而用之當今治雖太平論征未可何者山東闗右殘傷未復頻年水旱百姓空虛宜在安靜不宜勞役然往古開拓皆因城主歸欵故有征無戰今之向化者惟假官號真偽難分或有怨於彼不可全信且蜀地險隘稱之自古鎮戍晏然更無異趨豈得虛承浮説而動大軍舉不慎始悔将何及討蜀之畧願俟後圖宣武不納又肇為黄門侍郎時盧昶在胊山肇諫曰胊山蕞爾遐在海濱山湖下墊民無居者於我非急於賊為利故必致死而爭之非急故不得已而戰以不得已之衆擊必死之師恐稽延歲月所費甚多假令必得胊山徒致交爭終難全守所謂無益之田也如賊将屢以宿豫求易胊山愚臣謂此言可許胊山久悍危弊宜速審之若必如此宿豫不征而自伏捐此無用之地復彼舊有之疆兵役時解其利為大宣武将從之尋而昶敗陽固為治書侍御史時宣武廣詢得失固上讜言表曰臣聞為理不在多方在力行而已當今之務宜早正東儲立師傅以保䕶立官司以防衞以係蒼生之心攬權衡親宗室强榦弱枝以立萬世之計舉賢良黜不肖使野無遺才朝無素飱孜孜萬機躬親庶務使民無謗讟之響省徭役薄稅歛修學官遵舊章貴農桑賤工商絶談虛窮微之論簡桑門無用之費以存元元之民以救饑寒之苦上合昊天之心下悦億兆之望然後備器械修甲兵習水戰㓕吳㑹撰封禪之禮襲軒唐之軌同彼七十二君之徽號恊問鼎嵩河之心副高祖殷勤之志上與三皇比隆下與武帝齊美豈不茂哉臣位卑識昧言不及義屬聖明庻訪敢獻瞽言伏願陛下留神少垂究察封囘為都官尚書靈太后臨朝詔百官問得失群臣不敢言回對曰昔孔丘為司冦七日而誅少正卯魯國肅然欺巧自息􅁎旦行戮不避兄弟周道用隆徐偃專行仁義其國乃滅自古及今未有不勵威刑而能治者頃來頗由長吏寛大侵剝百姓盗賊群起請肅刑書以懲未犯太后意納之而不能用路思令為尚書右侍郎時天下多事思令乃上疏曰臣聞國之大事惟祀與戎戎之有功在於将帥三代不必别民取治不等五覇不必異兵各能克定至于湯武之賢猶須伊望之佐堯舜之聖尚有禹稷之輔得其人也六合唾掌可清失其人也三河方為戰地何者動之甚易靖之甚難竊以比年以來将帥多是寵貴子孫軍愷統領亦皆效義託附貴戚子弟未經戎役至于御杯躍馬志逸氣浮軒眉攘腕便以攻戰自許及臨大敵怖懼交懷雄圖銳氣一朝頓盡及令羸弱在前以當銳强壮居後以安身兼復器械不精進止不集任羊質之将驅不練之兵當負險之衆敵數戰之虜欲令不敗豈有得哉是以兵知必敗始集而先逃将又怖敵遷延而不進國家便謂官號未滿重爵屢加復疑賞賫之輕金帛日賜帑藏空虛民財殫盡致使賊徒更増膽氣益盛生民損耗荼毒無聊主歎臣哀何心寢食臣雖位微竊不遑舍臣聞孝行出于忠貞節義率多果决徳可感義夫恩可勸死士今若捨上所輕求下所重黜陟幽明刑賞善惡蒐徒簡卒練兵習武甲密弩強弓調矢勁謀夫既設辯士先陳曉以安危示其禍福如其不悛以我義順之師討彼叛逆之豎豈異礪蕭斧而伐朝􅌲鼓洪爐而燎毛髪雖愚者知其不旋踵矣敢以愚短昧死陳誠王椿為瀛州刺史時有風雹之變詔書廣訪讜言椿乃上䟽曰伏奉詔書以風雹厲威上動天睠訪讜辭於百辟詢輿誦於四海宸𠂻懇切備在絲綸祗承兢感心焉靡厝伏惟陛下啓籙應期馭育萬物承綴旒之難運纂纎絲之危緒忘飱日昃求衣未明俾上帝下臨􅉖兹荼蓼永擠溝壑而滄浪䧏戾作害中秋上帝照臨義不虛變竊惟風者為號令皇天所以示威雹者氣激陰陽有所交爭殆行令殊節殊急失中之所致也昔澍雨千里寔縁敬祀之誠災星三舍寧非善言之力譴不空發徵豈謬應誰謂盖高實符人事伏願陛下留心曲覧垂神遠察禮賢登士慎舉審官擢滯申寃振窮省役使夫邱樊林藪之彦畢居朝右儀表丹青之位未或虛加圜土絶五毒之民揆日息千門之費巖巖廊署無不遇之士忪忪惸獨荷酒帛之恩則物見昭蘇人知休泰徐奏薫風之曲無論鴻雁之歌豈不天人幸甚鬼神咸忭李瑒字琚羅為高陽王主簿于時民多絶户為沙門瑒上言禮以教世法導将來迹用既殊區流以别故三千之罪莫大于不孝不孝之大無過於絶祀然則絶祀之罪重莫甚焉豈能輕縱背禮之情而肆其向法之意也正使佛道亦不應然假令聽然猶須裁之以禮一身親老棄家絶養既非人理尤乖禮情滅大倫且闗王貫交缺當世之禮而求将來之益孔子云未知生焉知死斯言之至亦為備矣安有棄堂堂之政而從鬼敎乎夫君子無故不游天地屬心百神佇望故宜敦崇将禮咸秩無文而告朔朝廟不親于明堂嘗禘郊社多委於有司觀射游苑躍馬騁車危而非典豈清蹕之意殖不思之業損巨費於生民滅禄削力近供無事之僧崇飾雲殿遠邀未然之報昧爽之臣稽首於外𤣥寂之衆遨逰於内愆禮忤時人靈未穆愚謂從朝夕之因永祗劫之果未若先萬國之忻心以事其親使天下和平災害不生者也伏願淑慎威儀萬邦作式躬致郊廟之禮親紆朔望之䖍釋典成均竭力千畝明發不昧㓗誠禋祼孝悌可以通神明徳教可以光四海則一人有喜兆民頼之然後精進三寳信心如來道繇化深故諸漏可盡法隨禮積故彼岸可登量徹僧寺不急之華還復百官久折之秩已興之構務從簡約将來之造權令停息仍舊亦可何必改作況今南服未靜衆役乃煩百姓之情多方避役若復聽之恐捐棄慈孝比屋而是沙門矣臣學不經逺言多孟浪忝職其憂不敢黙爾都統僧暹等忿瑒鬼教之言以瑒為謗毁佛法泣訴靈太后責之瑒自理曰竊欲清明佛法使道俗兼通非敢排棄真學妄為訾毁且鬼神之名皆通靈達稱自百代正典叙三王五帝皆為鬼天地曰神祗人死曰鬼易曰知鬼神之情状周公自美亦曰能事鬼神禮曰明則有禮樂幽則有鬼神是以明者為堂堂幽者為鬼敎佛非天非地本出于人應世導俗其道幽隠名之為鬼愚謂非謗且心無不善以佛道為敎者正可達衆妙之門耳靈太后雖知瑒言為允然不免暹等之意猶罰瑒金一兩張普惠為諫議大夫以復徴綿麻上奏曰伏聞尚書計奏復徵綿麻之調遵先皇之軌夙宵惟度忻戰交集何者聞復高祖舊典所以忻惟新但可復而不復所以戰違法仰惟高祖廢大㪷去長尺改重秤所以愛萬姓從薄賦知軍國須綿麻之用故云幅度之間億兆應有綿麻之利故絹上稅綿八兩布上税麻十五斤萬姓得廢大㪷去長尺改重秤荷薄賦之饒不適於綿麻而已故歌舞以供其賦奔走以役其勤天子信于上億兆樂于下故易曰恱而使民民忘其勞此之謂也自兹以降漸漸長濶百姓嗟怨聞于朝野伏惟皇太后臨朝之前陛下居諒闇之日宰輔不尋其本知天下之怨綿麻不察其幅廣度長秤重㪷大革其所弊存其所存而特放綿麻之調以悦天下之心尚書既知國少綿麻不惟法度之幅易言民之可畏便欲去天下之大信棄已行之成誥追前之非逐後之失奏求還復綿麻以充國用不思庫中大布綿麻而群臣共竊之愚臣以為於理未盡何者今宫人請調度造衣服必度忖秤量絹布匹有尺丈之盈猶不計其廣絲綿斤兼百銖之剩夫無益之貨勿重于時虧徳之器勿陳于側則民知徳矣臣又聞之為治之要在于選舉若差之毫釐則有千里之失後來居上則致積薪之譏是以古之善為治者貫魚以次任必以能爵人於朝不以私愛簡才以授其官量能以任其用官得其才用當其器六轡既調坐致千里虞舜選衆不仁者遠則庶事康哉民知其化矣帝覧而嘉之時史官尅日蝕預罷朝普惠以逆廢非禮上䟽陳之又表論時政得失一曰審法度平㪷尺租調務輕賦役務省二曰聽輿言察怨訟三曰進忠謇退不肖任賢勿貳去邪勿疑四曰興滅國繼絶世勲親之胄所宜收叙正光中詔遣楊鈞送蠕蠕王阿那環還國普惠謂遣之将貽後患上䟽曰臣聞乾元以利貞為大非義則不動皇王以博施為功非類則不從故能遂萬物而化天下者也伏惟陛下聰哲欽明道光虞舜八表宅心九服清晏蠕蠕搆害於朔垂妖師扇亂於江外此乃封豕長蛇不識王度天将悔其罪以奉皇魏故荼毒之辛苦之令知至道之可樂也宜安民以恱其志恭己以懷其心而先自勞擾艱難下民興師郊甸之内遠投荒塞之外敉累世之勍敵可謂無名之師諺曰惟亂門之無過愚情未見其可當是邊将窺竊一時之功不思兵為凶噐不得已而用之者也夫白登之役漢祖親困之樊噲欲以十萬衆横行匃奴中季布以為不可請斬之千古以為美況今旱酷異常聖慈䧏膳乃以萬五千人使楊鈞為将而欲定蠕蠕忤時而動其可濟乎阿那環投命皇朝撫之可也豈容困疲我兆民以資天䘮之虜昔莊公納子紏以致乾時之敗魯僖小邾國而有懸胄之舉今蠕蠕䘮亂後主既立雖云䘮亡姦虞難抑脱有井陘之慮楊鈞之肉其可食乎高車蠕蠕連兵積年饑饉相仍須其自斃小亡大傷然後一舉而并之此卞莊之高畧所以獲兩虎不可不圖之今土山告難簡書相續盖亦無能為也正與今舉相㑹天其或者欲以告戒人不欲使南北兩疆並興大衆脫狂狡搆問于其間而復事連中國何以寧之今宰輔專欲好小名不圖安危大計此微臣所以寒心者也環之不還負何信義此機之際北師宜停臣言不及義文書所經過不敢不盡兵猶火也不戢将自焚二虜自滅之形可以為殷鍳伏願輯和萬國以靜四境混一之期坐而致矣臣愚昧多違必無可採匹夫之智願以呈獻表奏詔荅曰夫窮鳥歸人尚或興惻况那環嬰禍流離遠來依庇在情在國何容弗矜且納亡興喪有國大義皇魏堂堂寧廢斯徳後主亂亡似當非謬此送彼迎想無拒戰國宜表朝䇿已深决卿深誠厚慮朕用嘉哉但此叚機畧不獲相從脫後不逮勿憚正言樂運為萬年縣丞高祖嘗幸同州召運赴行在既至高祖謂運曰卿來日見太子否運曰臣來日奉辭高祖曰卿言太子何如人運曰中人也時齊王憲以下並在帝側高祖顧謂憲等曰百官佞我皆云太子聰明睿智惟運獨云中人方騐運之忠直耳於是因問運中人之狀運對曰班固以齊桓公為中人管仲相之則覇豎貂輔之則亂謂可與為善亦可與為惡也高祖曰我知之矣遂妙選宫官以輔弼之仍超拜運京兆郡丞宣帝時數行赦宥運又上䟽曰臣謹按周官曰國君之過市刑人赦此謂市者交利之所君子無故不游觀焉若游觀則當惠以恱之也尚書曰𤯝灾肆赦此謂過誤為害罪雖大當緩赦之吕刑云五刑之疑有赦此謂赦疑從罰罰疑從免論語曰赦小過舉賢才謹尋經典未有罪無輕重傳天大赦之文逮兹末業不師古訓無益於治未可則之故管仲曰有赦者奔馬之委轡不赦者痤疸之礪石又曰恵者民之仇讎法者民之父母吳漢遺言有云惟願無赦王符著論亦云赦者非盛世之所宜一大之尊豈可敷施非常之惠以肆姦宄之惡乎帝不納北齊唐邕為侍中從武成帝幸晉陽帝至武軍驛因醉責虞候都督范洪将殺之邕諫以為若非酒行戮族誅人無所怨假使有大罪因酒殺人恐招横議洪因得免死王紘後主時為散騎常侍武平初上言突厥與宇文男來女往必當相與影響南北宼邊宜選九州中男强弩多據要險之地伏願陛下哀忠念舊愛孤恤寡矜愚嘉善舍過記功敦骨肉之情廣寛仁之路思堯舜之風慕禹湯之徳克己復禮以成美化天下幸甚後周樂遜為左光禄大夫武成元年六月以霖雨經時詔百官上封事遜陳時宜一十四條其五條切于政要其一崇治方曰竊惟今之在官者多求清身克濟不至惠民愛物何者比來守令年期既促歳責有成益謂猛濟為賢未甚優養此政既成後者復然夫政之正民過急則刻薄緩則㢮慢是以周失舒緩秦敗急酷民非赤子遇之宜在舒疾得𠂻不使勞擾頃承魏之衰政人習逋違先王朝憲備行民咸識法但可宣風改俗納民軌訓而已自非軍旅之中何用過為迫切至于興邦致治事由德教漸以成之非在倉卒竊謂姬周盛德治興文武政穆成康自斯厥後不能無事昔申侯将本楚子誨之曰無適小國言以政狹法峻将不汝容敬仲入齊稱曰幸若獲宥及於寛政然闗東諸州淪䧟日久塗炭之後當慕息肩若不布政優優聞諸境外将何以使彼勞民就歸樂土其二省造作曰頃者魏都洛陽一時教盛貴勢之家各營第宅居服器玩皆尚奢靡世逐浮競人尚澆薄使禍亂交興天下喪敗比來朝廷器服稍華百工造作盡務奇巧臣誠恐物逐好移有捐政俗如此等事頗宜禁省記言無作淫巧以蕩上心傳稱宫室崇侈民力凋弊漢景有云黄金珠玉饑不可食寒不可衣雕文刻鏤傷農事者也錦繡纂組害女工者也以二者為饑寒之本源矣然國家非為軍戎器用時事要須而造者皆徒費功力損用害民未如廣勸農桑以衣食為務使國儲豐盈大功易立其三明選舉曰選曹賞録勲貴補擬官爵必宜與衆共之有明揚之授使人得盡心如覩白日其材有升降其功有厚薄禄秩所加無容不審即如州郡選置猶集鄉閭况天下選曹不取物望若方州列郡自可内除外付曹銓叙者既非機事何足可密人生處世以榮禄為重檢身履行以纂修為名然逢時既難失時為易其選置之日宜令衆心明白然後呈奏使功勤見知品物稱恱其四重戰伐曰魏祚告終天眷在徳而高洋稱僣先迷未改擁逼山東事切肘腋譬猶碁劫相持爭行先後若一行非當或成彼利誠應舍小營大先保封域不宜貪利在邊輕為興動㨗則勞兵分守敗則所損己多詩云得則不競何憚于病惟德可以庇民非恃強也夫力均勢敵則徳者盛君子道長則小人道消故昔之善戰者先為不可勝以待敵之可勝彼行暴戾我則寛仁彼為刻薄我必惠化使德澤傍流人思有道然後觀釁而作可以集事其五禁奢侈曰按禮人有貴賤物有差等使用者節品類有度焉后為天下母而身服大練所以率下也季孫相三君矣家無衣帛之妾所以厲俗也比來富貴之家為意稍廣無不資裝僕隸作車後容儀服飾華美炫曜街衢乃使行者輟足路人傾盖論其輸力公家未若介胄之士然其坐受嘉賞有逾攻戰之人縱令不惜功費豈不有虧清德必其儲蓄之餘孰與矜恤軍士魯莊公有云衣食所安不敢愛也詩言豈曰無衣與子同袍皆所以取人力也又陳事上議之徒亦應不少當有上徹天聽者未聞是非陛下雖念存物議欲盡天下之情而天下之情猶為未盡何者取人愛言貴在顯用若納而不顯是而不用則言之者或寡矣黎季明武帝時為外史大夫保定三年盛營宫室春夏大旱詔公卿百僚極言得失季明上書曰臣聞成湯遭旱以六事自陳宣王大甚而珪璧斯竭豈非遠慮元元俯哀兆庶方今農要之月時雨猶愆率土之心有懷渴仰陛下垂情萬類子愛群生覲禮百神未敢豐洽者豈誠作事不節有違時令舉錯失中倘邀斯旱春秋君舉必書動為典禮水旱陰陽莫不應行而至孔子曰言行君子之所以動天地可不慎乎春秋荘公三十一年冬不雨五行傳以為是歲一年而三築臺奢侈不恤民也僖公二十一年夏大旱五行傳以為時作南門勞民興役漢惠帝二年夏大旱五年夏大旱江河少水谿澗水絶五行傳以為先是發民十四萬六千人城長安漢武帝元狩三年夏大旱五行傳以為是歲發天下故吏穿昆明池然則土木之功動民興役天輒應之以異典籍作誡倘或可思上天譴告改之則善今若息民省役以荅天譴庶靈澤時降嘉榖有成則年昇可覬子來非晩詩云民亦勞止迄可小康惠此中國以綏四方或恐極陽生陰秋多雨水年復不昇民将無覬如又荐饑為慮更甚是時豪富之家競為奢侈季明上書曰臣聞寛大所以兼覆慈愛所以懷衆故天地稱其高厚者萬物得其容養焉四時著其寒暑者庶類資其忠信焉是以帝王者寛大象天地忠信則四時揺招東指天下識其春人君而德率土懷其惠伏惟陛下資乾御宇品物咸亨時乘六龍自强不息好問受規天下幸甚自古至治之君亦皆廣延博訪詢採芻微置皷樹木以求其過頃者亢旱逾時人懷望歲陛下爰發明詔廣求人瘼同禹湯之罪己髙宋景之守正澍雨應時年榖斯稔克己節用慕質惡華此則尚矣然而朱紫仍耀于衢路綺縠猶侈于豪家短褐未充于細民糟糠未厭于編戸此則勸道之理有所未周故也今雖導之以德齊之以刑風俗固難於一矣昔文帝集尚書之囊以作帷惜十家之產不造露臺後宫所幸衣不曳地方之今日宫室之飾不如婢隸之服然而以身率下國富刑清廟稱太宗良有以也臣聞聖人久于其道而天下化成今夫魏氏衰亂之後貞信未興先尊五美屏四惡革浮華之俗抑流競之風察洪都之小藝焚雉頭之異服無益之貨勿重于時虧德之器勿陳于側則民知德矣盧愷為内史下大夫武帝在雲陽宫勑諸屯簡老牛欲以享士愷進諫曰田子方贖老馬君子以為美談向奉明勑欲以老牛享士有虧仁政帝美其言而止册府元龜卷五百三十
