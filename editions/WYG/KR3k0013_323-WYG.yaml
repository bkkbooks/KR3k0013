body:
  text: 册府元龜卷三百二十三宋王欽若等撰宰輔部總兵機畧總兵天文以下台主兵周官以司馬詰禁是知秉國鈞熈帝載不獨以論道為任職靖時難康天歩亦將以分閫而樹勲故鷹揚大烈始於佐命敦詩說禮是謂義府宜乎天子任帷幄之臣如左右之手仗順扶義以肅乎戎政伐謀制勝以申其廟算焉至於潔齋壇以厚其禮假節鉞以尊其權建行臺嚴師律蓋所以異其名數而委以專征者矣其有夙負智勇誓清疆埸顧肉食之貽誚以郊壘而為耻抗詞自請専秉武節斯乃同國體休戚而萬邦為憲者歟周周公相成王管蔡武庚等率淮夷而叛周公乃奉成王命興師東伐作大誥遂誅管叔殺武庚放蔡叔召公虎為宣王卿士王命虎平淮夷尹吉甫作江漢之詩美之曰王命召虎來旬來宣文武受命召公為翰旬營也宣徧也言勤勞以經營四方徧疆理衆國也漢韓信為左丞相擊魏虜魏王豹定河東使人請漢王曰願益兵三萬人臣請以北舉燕趙東擊齊南絶楚之糧道西與大王㑹於滎陽漢王與兵三萬遣張耳與俱進擊趙代破趙用廣武君策發使燕燕從風而靡又拜相國發趙兵未發者擊齊曹參為左丞相屬相國韓信東擊齊酈商以右丞相將兵擊黥布攻其前垣攻其壁壘之前垣陷兩陣得以破布盧綰為太尉項籍死綰别將與劉賈共擊臨江王共尉共敷子共音龔還從擊燕王臧荼皆破之樊噲封舞陽侯盧綰反噲以相國擊綰破其丞相抵薊南抵至也一云扺其丞相之名定燕縣十八鄉邑五十一周勃為太尉擊陳豨屠馬邑將卒斬豨將軍乗馬降姓乗馬名降乃轉擊韓信陳豨趙利軍於樓煩破之灌嬰為丞相匈奴大入北地文帝令嬰將騎八萬五千擊匈奴匈奴去濟北王反詔罷嬰兵周亞夫為太尉東擊吳楚平之劉屈氂武帝時為左丞相戾太子殺江充發兵宣言帝在甘泉病困疑有變奸臣欲作亂帝於是來幸城西建章宫詔發三輔近縣兵部中二千石以下兼將後漢鄧禹為前將軍赤睂西入關光武以禹深沉有大度授以西討之畧遣入關光武即位使者拜禹為大司徒遂渡汾隂河入夏陽更始中郎將左輔都尉公乗歙引其衆十萬拒禹於衙禹破走之而赤睂遂入長安是時三輔連覆敗赤睂所過殘賊百姓不知所歸聞禹乗勝獨剋而師行有紀皆望風相攜負以迎軍降者日以千數於是名震關西吳漢為大司馬建武二年率諸將兵擊檀鄉賊於鄴東漳水上大破之復率諸將擊鄴西山賊黎伯卿等及河内修武悉破諸屯聚帝遣漢進兵南陽擊宛湼陽酈穰新野諸城皆下之引兵南與秦豐戰黄郵水上破之與馮異擊昌城五樓賊張文等又攻銅馬五幡於新安皆破之眀年春率耿弇蓋延擊青犢於軹西降之又率杜茂陳俊等圍蘇茂於廣樂留俊等守廣樂自將兵助蓋延圍劉永於睢陽永既死二城皆降又率陳俊王梁擊破五校賊破之北擊清河長直及平原五里賊皆平之冬漢率耿弇王常等擊富平獲索二賊於平原眀年春大破其衆遂擊勃海皆平之又從征董憲圍胊城眀年春拔胊斬憲東方悉定㑹隗囂叛復遣漢西屯長安十一年春率岑彭等伐公孫述十二年春漢與述戰於廣都成都之間八戰八剋遂軍於其郭中述自將出城大戰述兵敗走髙午奔陳刺述殺之旦日城降斬述首傳送雒陽十五年復率馬成馬武北擊匈奴十八年蜀郡守將史歆反於成都移檄郡縣遣漢率劉尚臧宫討之漢圍成都城破誅歆等而還王梁為大司空與大司馬吳漢等俱擊檀鄉賊有詔軍事一屬大司馬張温靈帝時中平元年繇司空為車騎將軍地節三年春遣使者持節就長安拜温為太尉三公在外始之於温魏髙柔為司徒時太傅司馬懿奏免曹爽皇太后詔召柔假節行大將軍事據爽營太傅謂柔曰君為周勃矣爽誅進封萬歲鄉侯蜀諸葛亮為丞相録尚書事後主立南中諸郡並皆叛亂景耀三年春亮率衆南征五年率諸軍北駐漢中六年春揚聲繇斜谷道取郿使趙雲鄧芝為疑軍據箕谷魏大將軍曹真舉衆拒之亮身率諸軍攻祁山戎陣整齊賞罰肅而號令眀南安天水安定叛魏應亮關中響震冬亮復出散關圍陳倉九年出師以木牛運十二年亮悉大衆繇斜谷出以流馬運據武功五丈原與魏將司馬宣王對於渭南吳諸葛恪廢帝即位為太傅輔政初大帝黄龍元年遷都建業二年築東興隄遏湖水後征淮南敗以内船繇是廢不復修恪以建興元年十月㑹衆於東興更作大隄左右結山俠築兩城各留千人使全端留略守之引軍而還魏大將胡遵諸葛誕等率衆七萬欲攻圍兩塢圖壞隄遏恪興軍四萬晨夜赴救遵等遂敗加恪荆揚州牧督中外諸軍事孫峻為丞相時魏將毌丘儉文欽以衆叛與魏人戰于樂嘉峻帥驃騎將軍呂據左將軍留贊襲夀春㑹欽敗降軍還晉安平王孚初仕魏為太尉及蜀將姜維冦隴右雍州刺史王經戰敗遣孚西鎮關中統諸軍事征西將軍陳泰與安西將軍鄧艾進擊維退孚還京師賈充為司空武帝伐吳之役詔充為使持節假黄鉞大都督總統六師給羽葆皷吹緹幢兵萬人騎二千置左右長史司馬從事中郎増參軍騎司馬各十人帳下司馬二十人大車官騎各三十人充受節鉞將中軍為諸軍節度屯襄陽王衍為司徒王彌冦青徐兖豫四州又入許昌諸郡守將皆奔走遂冦雒陽衍帥衆禦之彌退走王導眀帝末進位太保司徒如故及成帝初即位石勒侵阜陵詔加導大司馬假黄鉞出討之軍次江寧帝親餞于郊俄而賊退咸康元年四月石季龍掠騎至歴陽導請出討之又加大司馬假黄鉞中外諸軍事置左右長史司馬給布萬疋俄而賊退四年為太傅都督中外諸軍事陶侃為侍中太尉都督交廣寧七州諸軍事又詔侃都督江州移鎮武昌郗鑒為車騎大將軍散騎常侍領徐州刺史蘇峻反進鑒為司空鑒去賊宻邇奉詔流涕設壇場刑白馬大誓三軍鑒登壇慷慨三軍争為用命及陶侃為盟主進鑒都督揚州八郡軍事時賊帥劉徵聚衆數千浮海抄東南諸縣鑒遂城京口加都督揚州之晉陵吳郡諸軍事率衆討平之進位太尉庾亮為中書令與司徒王導輔政蘇峻作逆乗勝至京都詔亮假節都督征討諸軍事桓温為侍中大司馬都督中外諸軍事假黄鉞率舟軍進合肥太和四年上疏悉衆北伐又以温領平北將軍徐兖二州刺史率弟南中郎冲西中郎袁真歩騎五萬北伐百官皆於南州祖道謝安武帝時為衛將軍輔政苻堅初破以總統功進拜太保安方欲混一文軌上疏求自北征乃進都督揚江荆司豫徐兖青冀幽并寧益雍梁十五州軍事加黄鉞其本官悉如故置從事中郎二人宋沈慶之孝武時為司空討縁江蠻南齊陳顯逹為太尉侍中建武三年虜攻徐司詔顯逹出屯徃來新亭白下以為聲勢陳侯瑱為司空王琳立梁永嘉王蕭莊于郢州詔瑱與領軍將軍徐慶率舟師為前軍以討王琳瑱敗琳于梁山敗齊兵于愽望生擒齊將劉伯琳盡收其資儲舟艦俘馘以萬計琳奉其主蕭莊奔於齊後魏長孫嵩為司徒晉末宋武帝伐姚泓眀元假嵩節督山東諸軍事傳詣平原縁河北岸列軍次于畔城又勑簡精兵為戰備若裕西過者便率精銳南出彭沛如不時過但引軍隨之彼至崤陜間必與姚泓相持一死一傷衆力疲弊比及秋月徐乃乗之則裕可不戰而擒於是叔孫建等踰河趣雒遂入關嵩與建等自成臯南濟晉諸屯戍皆望塵奔潰晉尅長安嵩乃班師奚斤為左丞相眀元車駕西巡詔斤為先驅討越勤部於鹿那山大破之蠕蠕犯塞令斤等追之太武為皇太子臨朝聽政以斤為左輔宋少帝立其大臣不附國内離阻遣斤收宋武前侵河南地假斤節都督前鋒諸軍事司空公太武即位仍為司空太武征赫連昌遣斤率義兵將軍封禮等督四萬五千人襲蒲坂昌守將赫連乙升棄蒲西走斤追敗之昌敗亡保上邽長孫翰為司徒太武征赫連昌翰與廷尉卿長孫道生宗正娥青為前驅遂平其國和其奴為司空侍中皇興元年長安鎮將東平王道符反乃詔其奴領征西大將軍率殿中精兵萬騎以討之未至而道符敗軍還王肅為尚書輔政時南齊裴叔業以夀春内附拜肅使持節都督江西諸軍事車騎將軍與驃騎大將軍彭城王勰率歩騎十萬以赴之穆紹為尚書令司空公爾朱榮之討葛榮詔上黨王天穆為前鋒次於懐縣司徒公楊椿為右軍紹為後繼未發㑹擒葛榮乃止楊津為司空爾朱榮死以津為都督并泗等九州諸軍事驃騎大將軍北道大行臺委津以討胡經畧北齊斛律金文宣時為太師以茹茹為突厥所破種落分散慮其犯塞驚擾民乃詔金率騎二萬屯白道以備之斛律光為太保河清二年四月光率歩騎二萬築勲掌城仍築長城置十三戍三年正月周遣將達奚成興等來冦詔光率步騎三萬禦之興聞而退走三月遷司徒四月率騎北討突厥獲馬千餘匹是冬周又遣尉遲逈等冦雒陽光率騎五萬馳徃赴擊戰于邙山逈等大敗遷太尉三年遷太傅周遣將圍雒陽武平元年詔率歩騎三萬大破之加右丞相二年率衆築平隴等鎮戍周柱國韋孝寛等來逼平隴光與戰大破之軍還詔復令率歩騎五萬出平陽道攻姚襄白亭城戍皆尅之周又遣將圍宜陽光率歩騎赴之大破於城下取周建安等四戍捕虜千餘人而還叚韶為左丞相武平二年二月周師來冦遣韶與右丞相斛律光太尉蘭陵王長恭同徃捍禦獲周儀同薛敬禮大斬獲首虜仍城華谷置戍而還是月又遣將冦邊斛律光師先出討韶亦請行大破之七月韶疾甚先軍還隋髙熲開皇初為尚書左僕射兼納言時突厥屢為冦患詔熲鎮遏㳂邊九年晉王大舉伐陳以熲為元帥長史三軍諮禀皆取斷于熲虞慶則為尚書右僕射兼右武衞大將軍開皇七年嶺南人李賢據州反髙祖議欲討諸將二三請行皆不許髙祖顧謂慶則曰位居宰相爵乃上公國家有賊遂無行意何也慶則拜謝恐懼帝乃遣為桂州道行軍総管楊素為尚書右僕射與髙熲專管朝政及煬帝初漢王諒反以素為荆州道行軍総管率衆數萬討諒唐裴寂為尚書右僕射宋金剛之冦并州也姜寶誼李仲文相次陷没寂自請行因授晉州道行軍總管得以便宜從事李靖為兵部尚書檢校中書令貞觀三年突厥諸部離叛朝廷將圖進取以靖為代州道行軍総管率驍騎三千自馬邑出其不意直趨惡陽嶺以逼之四年靖進擊定襄破之張亮貞觀中為刑部尚書參預朝政及興髙麗之役亮頻諫不納因自請行太宗乃以亮為滄海道行軍大總管李勣貞觀十七年為特進同中書門下三品十八年為遼東道行軍總管髙宗總章元年以開府儀同三司知政事為遼東行軍總管劉仁軌儀鳯中為尚書左僕射詔徃洮河軍鎮守以禦吐蕃韋待價為文昌右相永昌元年五月為安息道行軍大總管以擊吐蕃狄仁傑檢校納言兼右肅政臺御史大夫聖歴初突厥侵掠趙定等州命仁傑為河北道元帥許以便宜從事突厥從五廻道而去仁傑總兵十萬追之不及婁師徳萬歲登封元年為御史大夫知政事吐蕃入冦令師徳與夏官尚書王孝傑討之後為納言聖歴二年又為大總管專總邊任前後三十餘年魏元忠為鳯閣侍郎同鳯閣鸞臺平章事聖歴二年檢校并州長史充天平軍大總管以備突厥中宗朝為肅政臺御史大夫同鳯閣鸞臺平章事比嵗突厥與吐蕃數犯塞元忠皆為大捴管討之唐休璟景龍末為太子少師同中書門下三品景雲初拜特進充朔方道行軍總管以備突厥郭元振為御史大夫同中書門下三品先天中持節為朔方道大總管以備突厥張說開元八年為兵部尚書同中書門下三品眀年勑說為朔方節度大使徃巡五城處置兵馬房琯至徳初為吏部尚書同中書門下平章事抗疏自請將兵以誅冦孽收復京師肅宗望其成功許之詔加持節招討西京兼防禦蒲潼兩闗兵馬節度等使仍與子儀光弼等計㑹進兵張鎬肅宗至徳二年為中書侍郎平章事時朔方興戎帝注意將帥以鎬有文武才業命兼河南節度使持節都統淮南等道諸軍杜鴻漸代宗永泰中為兵部侍郎平章事時劍南節度兵馬使栢貞節楊子琳皆興師討崔旰蜀方震擾詔鴻漸為中書侍郎平章事充山劍副元帥兼劍南道節度使討之裴度憲宗元和中為中書侍郎平章事吳元濟以淮蔡叛李愬李光顔用師既乆國家聚兵淮右四年度支供餉不勝其弊諸將玩冦相視未有成功憲宗亦病之宰相李逢吉王涯等三人以勞師弊財意欲罷兵競陳利害度獨無言帝問之對曰臣請身自督戰眀日延英重議逢吉等出獨留度謂之曰卿必能為朕行乎度俯伏流涕曰臣誓不與賊偕生帝亦為之改容度復奏曰臣昨見吳元濟乞降表料此逆賊勢實窘䠞但諸將不一未能迫之故未降耳若臣自赴行營則諸將各欲立功以固恩寵破賊必矣帝然之異日詔曰輔弼之臣軍國是賴興化致理則秉均以居取威定功則分閫而出所以同君臣之體一中外之任焉屬者問罪汝南致誅淮右蓋欲刷其汚俗弔彼頑民雖挈地求生者實繁有徒而嬰城執迷者未剪其類何獸困而猶鬭豈鳥窮之無歸歟繇是遥聽皷鼙更張琴瑟煩我台席董兹戎旃朝議大夫守中書侍郎同平章事飛騎尉賜紫金魚袋裴度為時降生恊朕夣卜精辨宣力堅眀納忠當軸而才謀老成運籌而智畧前定司其樞務備知四方之事付以兵要必得萬人之心是用禱于上𤣥揀此吉日帶丞相之印綬所以尊其名賜諸侯之斧鉞所以重其命爾宜布清問恢壯猷感勵連營蕩平多壘招懐孤疾字撫夷傷况淮西一軍素效忠節過海赴難史册書勲建中初攻破襄陽擒滅崇義比者脅於凶逆歸命無繇每念前勞嘗思安撫所以内輟輔臣俾為師率實欲保全慰諭各使得宜徃欽哉無越我丕訓可門下侍郎同中書門下平章事蔡州刺史充彰義軍節度申光蔡觀察等使仍充淮西宣慰招討處置使詔出度以韓𢎞為淮西行營都統不欲更為招討請只稱宣慰處置使又以此行既兼招撫請改剪其類為革其志又以𢎞已為都統請改更張琴瑟為近輟樞軸請改煩我台席為授以成筭皆從之自討淮西王師屢北論者以殺傷滋甚轉輸不迨疑議宻疏紛紜交進度以腹心之疾不時去之終為大患不然兩河之盗亦將視此為髙下遂堅請討伐帝深委信故聽之不疑度既受命召對於延英奏曰主憂臣辱義在必死賊滅朝天有日賊在歸闕無期帝為之惻然流涕十二年八月三日度赴淮西詔以神策軍三百騎衛從帝御通化門慰勉之度樓下啣涕而辭賜之犀帶度名雖宣慰其實行元帥事仍以郾城為治所以李逢吉與度不叶乃罷知政事出為劍南東川節度使王鐸為右僕射門下侍郎平章事時賊陷江陵楊知温失守宋威破賊失策朝議統率宰相盧携稱髙駢累立戰功宜付兵柄物議未允鐸廷奏曰臣忝宰執之長在朝不足分陛下之憂臣願自率諸軍盪滌羣冦朝議然之乃以鐸為守司徒門下侍郎同平章事兼江陵尹荆南節度充諸道都統孫偓為兵部侍郎平章事乾寧二年十月壬子詔充鳯翔行營招討使甲寅偓於驛舍㑹諸將以議進軍戊午鳯翔李茂貞上章請罪師遂不行崔𦙍為司徒知政事時昭宗初自鳯翔還都乃兼判六軍十二衛事張濬為宰相判度支昭宗嘗問濬致理何事最急對曰莫若彊兵兵彊而天下服繇是專務蒐補兵甲欲以武功勝天下後于延英論前代為治得失濬曰不必逺論漢晉之弊臣竊見陛下春秋鼎盛英睿如此内外偪於彊臣臣每思之寔痛心而泣血也㑹朱全忠誅秦宗權安居受殺李克恭以潞州降全忠幽州李匡威雲州赫連鐸等奏請出軍討太原詔四品以上官議皆言國祚未安不宜生事假如得太原亦非國家所有濬議曰先帝頻至播越王室不寧原其亂階繇克用全忠矛盾也請因其奏乗全忠立功斷兩雄之勢帝曰收復之功克用第一今乗其危困而加兵諸侯其謂我何濬懇論用兵之利蓋欲示外勢而擠楊復恭也上猶未决宰臣孔緯曰張濬所陳萬代之利也陛下所惜一時之利也以臣所料師渡河而賊自破昨計度軍中轉餉犒勞一二年間必無闕事陛下斷意行之既二相俱論乃以濬為河東行營兵馬都招討宣慰使以京兆尹孫揆副之仍授揆昭義節度使華州韓建為供軍使朱全忠為太原西南面招討使李匡威赫連鐸為太原東北面招討使全忠以汴軍三千為濬牙隊大順元年六月濬率軍五十二都兼邠寧鄜夏雜虜共五萬人騎發自京師昭宗御安喜樓臨送濬後唐郭崇韜為侍郎監脩國史兼樞宻使同光三年客省使李嚴使西川廻言王衍可圖之狀莊宗以魏繼岌為都統崇韜為招討使率魏軍六萬進討蜀川莊宗以御駕喜慶殿酒宴西征諸將舉酒屬崇韜曰繼岌未習政事卿乆從吾戰伐西面之事屬之于卿周王峻為右僕射門下侍郎平章事廣順元年冬河東劉崇與契丹圍晉州峻請行應援太祖用峻為行營都部署以徐州節度使王彦超為副詔諸軍並取峻節度許峻以便宜從事軍行資用仰給於官隨行將吏得自選擇李榖為司空兼門下侍郎同平章事顯徳二年十一月為淮南道前軍行營都部署兼知廬夀等州行府事以許州節度使王彦超副焉又令侍衛馬歩軍都指揮使韓令坤以下一十二將各帶征行之號以從焉機畧夫藴經綸之才登宰輔之任當朝廷多事之際屬黔首艱難之日儻不能轉彼禍機運夫良畫則先聖所謂危而不持顛而不扶者也故有詭轉逆黨之擒以清内難詐謂渠魁之喪以壯人心或遣騶虞之幡或飾練布之服擇后黨之師傅俾脩節行通藩侯之問遺以豐國用或奪姦雄之心或易驕兵之帥垂之簡編誠有可取者矣漢蕭何為丞相時韓信欲反其舍人上書告變吕后欲詔恐其黨不就乃與何謀詐令人從髙帝所來稱陳豨已破羣臣皆賀何紿信曰雖病强入賀信入吕后使武士縛信斬之長樂鐘室鐘室謂懸鐘之室信方斬曰吾不用蒯通計反為女子所詐豈非天哉遂夷信三族周勃為丞相時竇后兄長君弟少君既自陳見后厚賜之家於長安勃與灌嬰等曰吾属不死命乃且懸此兩人恐其後擅權則將相大臣當被害此兩人所出微不可不為擇師傅又復放吕氏之事也於是乃選長者之有節行者與居長君少君繇此為退讓君子不敢以富貴驕人蜀諸葛亮為丞相時關侯聞馬超來降舊非故人致書於亮問超人才可誰比類亮知其䕶前乃答之曰孟起兼資文武雄烈過人一世之傑黥彭之徒當與翼徳並驅争先猶未及髯之絶倫超羣也關美鬚髯故亮謂之髯關省書大恱以示賔客晉張華為司空時楚王瑋受宻詔殺太宰汝南王亮太保衛瓘等内外兵擾朝廷大恐計無所出華白惠帝以瑋矯詔擅害三公將士倉卒謂是國家意故從之耳今可遣騶虞幡使外軍解嚴理必風靡帝從之瑋兵果敗王導眀帝時拜司徒一依陳羣輔魏故事王敦又舉兵内向時敦始寢疾導便率子弟發哀衆聞謂敦死咸有奮志後為太保成帝時經蘇峻之亂帑藏空竭庫中惟有練布數千端鬻之不售而國用不給導患之乃與朝賢俱制練布單衣於是士人翕然競服之練遂踴貴乃令主者出賣端至一金唐崔祐甫代宗大暦中為中書侍郎平章事時神策軍使王駕鶴掌禁兵十餘年權傾中外徳宗初登極將令白琇珪代之懼其生變祐甫召駕鶴與語留連乆之琇珪已赴軍視事矣又青州李正巳畏懼徳宗威徳乃表獻錢三十萬貫帝欲納其奏慮正己未可誠信以計逗留止之未有其詞延問宰相祐甫對曰正己奸詐誠如聖慮臣請因使徃淄青便令宣慰將士因以正己所獻錢賜賚軍人且使深荷聖徳又令外藩知朝廷不重財貨帝恱從之正己大慙而心畏服焉裴度為門下侍郎平章事度以計諷鎮冀節度使王承宗使獻徳埭二州以謝罪尋諭滄景節度程權使之入覲始以滄景徳埭為一鎮朝廷命帥以分其力元和十三年鄆州節度使李師道領州十二握兵十萬恃强拒命兩鎮騷然度遂宻計奏請討除憲宗大喜遂徵師問罪數月滅之分其地為兖海淄青鄆曹三鎮數十年之叛地一旦悉平成憲皇中興之基實名臣計謀之力度以宰相鎮太原召還時朱克融王廷湊雖受朝廷節鉞未解深州之圍度初發太原與二鎮書諭以大義克融解圍而去廷湊亦退舍有中使自深州來言之穆宗甚喜即日又遣中使徃深州取牛元翼更命度致書與廷湊度㳂路奉詔中使得度書云朝謝後即歸留務恐廷湊知度無兵權即背前約請度易之中使乃進度書草具奏其事及度至京進對眀辨帝方憂深州之圍遂授度淮南節度先是昭義監軍使劉承偕恃寵凌節度使劉悟三軍憤發大譟擒承偕欲殺之已殺其二傔悟救之獲免而囚承偕詔遣歸京悟託以軍情不時奉詔至是宰臣延英奏事度亦在列帝顧問度曰劉悟拘承偕而不遣如何處置度辭以藩臣不合議軍國事帝固問之且曰劉悟負我我以僕射寵之近又賜絹五百萬疋不思報效翻縱軍衆凌辱監軍我實難奈此事度對曰承偕在昭義不法臣盡知之昨劉悟在行營與臣書數論其事是時有中使趙𢎞亮在臣軍仍持悟書將去云欲自奏不知奏否帝曰我都不知悟何不宻奏其事我豈不能處置度曰劉悟武臣不知大臣體例雖然臣竊以悟縱有宻奏陛下必不能處置今日事狀如此臣等面論陛下猶未能决况悟單詞豈能動聖聽哉帝曰前事勿論直言此時如何處置度曰陛下必欲收忠義之心使天下戎臣為陛下死節唯有下半紙詔書言任使不眀致承偕亂法令悟集三軍斬之如此則萬方畢命羣盗破膽天下無事矣茍不能如此雖與劉悟改官賜絹臣亦恐於事無益帝俛首良乆曰朕不惜承偕縁是太后養子今被囚縶太后未知如卿處置未得可更議其宜度與王播等復奏曰但配流逺惡處承偕必得出帝以為然承偕果能得歸韋處厚為中書侍郎平章事時滄景李同捷既稽天誅魏愽史憲誠中懐向背裴度以宿舊自任待憲誠於不疑憲誠嘗遣親吏請事至中書處置謂曰晉公以百口於上前保使主某則不然但仰俟所為自有朝典耳憲誠聞之懼從此輸竭竟有功於滄州後唐郭崇韜為宰相初收汴雒稍通賂遺親友或規之崇韜曰余備位將相禄賜巨萬但為梁之日賂遺成風今方面藩侯多梁之舊將皆吾君射鈎斬袪之人也一旦革面化為吾人堅拒其情得無懼乎藏余私室無異公帑及郊禋崇韜悉獻家財以助賞給晉桑維翰為相及楊光逺平鄴以兵驕難制維翰請速散其衆朝廷從之而移光逺為雒尹光逺繇是怏怏又以馮暉鎮靈武蕃部歸心朝議患之維翰欲圖大舉以制北戎命將佐十五人皆列藩之帥也唯暉不預其間乃上章自陳未老可用而制書見遺維翰招禁直學士答詔一一條對其云非制書忽忘實以朔方重地雜虜窺邊非卿雄名何以彈壓比欲移卿内地受代亦湏竒才暉得詔甚喜册府元龜卷三百二十三
