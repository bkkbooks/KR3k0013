body:
  text: 册府元龜卷七百五十五宋王欽若等撰總錄部孝第五北齊楊愔字遵彥魏太傅津之子幼喪母曾詣舅源子恭與之飲問讀何書曰誦詩子恭曰誦至渭陽未邪愔號泣感噎子恭亦對之歔欷遂為之罷酒後為神武行臺右丞遭罹家難嘗以喪禮自居所食惟鹽菜而已哀毁骨立神武愍之嘗相開慰頃之表請解職歸葬喪柩發吉凶儀仗亘二十餘里會葬者將萬人是日隆冬盛寒風雪嚴厚愔跣歩號哭見者無不哀之及為聘梁使至碻磝戍州内有愔家舊佛寺精廬禮拜見太傅容像悲感慟哭嘔血數升遂發病不成行輿疾還鄴劉禕仕東魏為睢州刺史秩滿遙歸鄉里侍父疾竟不入朝父喪沉頓累年非杖不起文襄輔政致辟禕稱疾不動陸卬仕東魏為中書侍郎修國史以父憂去軄居喪盡禮哀毁骨立詔以夲官起文襄時鎮鄴嘉其至行親詣門以慰勉之兄弟相率廬於墓側負土成墳朝廷深所嗟尚發詔褒揚改其所居里為孝終里服竟當襲不忍嗣侯後遭母喪哀慕毁悴殆不勝喪至沉篤頓昧伏枕又感風疾因弟博卒卬一慟便絶卬弟彥師字剩雲仕東魏為襄城王元旭叅軍以父艱去軄哀毁殆不勝喪與兄卬廬於墓次負土成墳公卿重之多就墓側存問晦朔之際車馬不絶竇泰善騎射有勇略魏末泰父戰没於鎮泰身負骸骨歸爾朱榮位侍中京畿大都督王昕自素甚肥遭喪後遂終身羸瘠楊愔重其徳業以為人之師表位祠部尚書裴讓之年十六喪父殆不勝喪哀其母辛氏泣撫之曰棄我滅性得為孝子乎繇是自勉位清河太守樊衡性至孝喪父負土成墳植栢方數十畝朝夕號慕鄭述祖為兖州刺史初其父道昭為兖州於城南小山起齋亭刻石為記述祖時年九歳及為刺史徃尋舊跡得一破石有銘云中丘先生鄭道昭之白雲堂述祖對之嗚咽悲動郡寮邢劭字子才為衛將軍國子祭酒還鄉丁母憂哀毁過禮皮叔逹有才藻撿行為通事舎人丁母憂起復將赴京辭靈慟哭而絶久而復蘇不飲不食三日致死盧臣客其姊為任城王妃任城王致之於朝廷繇是擢拜太子舍人遷司徒記室請歸侍祖母李李强之令仕不得已而順命除太子中書李元忠為清河王懌主簿遭母憂去任未幾相州刺史安樂王鑒請為府司馬元忠艱憂固辭不就初元忠以母老多患乃専心醫藥研習積年遂善於方技元忠族弟密性方直有行撿因母患積年得名醫治療不愈及精習經方洞曉針藥母疾得除當世皆服其明解繇是亦以醫術知名李正藻明敏有才幹武平末為開府儀同行叅軍判集書省事以父騊駼没陣正藻便謝病解軄憂思毁瘠居處飲食若在喪之禮人士稱之宋遊道事世母以孝聞與叔父别居叔父為奴誣以逆遊道誘令退伏竟雪叔而殺奴位太府􅀸魏蘭根為定州長流叅軍丁母憂居喪有孝稱及遭父喪廬於墓側負土成墳憂毁殆於滅性蘭根為儀同三司卒次子敬仲孝昭時佐命功臣配享而不及蘭根敬仲表訴帝以詔命既行難於追改擢敬仲為祠部郎中後周樊深河東猗氏人事繼母甚謹仕魏為中散大夫嘗讀書見吾丘子遂歸侍養孝武西遷樊王二姓舉義為東魏所誅深父保周叔父歡周竝被害深因避難墜崖傷足絶食再宿於後遇得一簞餅欲食之然念繼母老年患痺或免虜掠乃弗食夜中匍匐尋覔母遇得相見因以饋母復易姓名逃隠河東太祖平河東贈保周南郢州刺史歡周儀同三司深歸葬其父負土成墳柳虬仕魏為獨孤信行臺郎中大統四年入朝太祖欲官之虬辭母老乞侍醫藥太祖許焉王懋魏太尉長樂公盟之子為右衛將軍于時疆塲交兵未申喪紀服齊斬者竝絰衰從事及盟薨懋上表辭位乞終喪制文帝不許王述魏驃騎大將軍羆之孫幼喪父為羆所愛及居羆喪深合禮度于時東西交争金革方始羣官遭喪者卒哭之後皆起令視事述請終禮制辭理懇切太祖命中使就視知其哀毁乃特許之斛斯徴太傅精之子有至性居父喪朝夕共一溢米位太宗伯于翼為司會中大夫遭父喪過禮為時軰所稱尋有詔起令視事李旭頓丘人父避爾朱榮之亂奔江南旭累遷納言以父在江南身寓關右自少及終不飲酒聽樂時論以此稱焉位昌州刺史尉遲逈父俟兠尚太祖姊昌樂太長公主生逈逈既平蜀為益州刺史逈性至孝色養不怠身雖在外所得四時甘脆必先薦奉然後敢嘗太長公主年高多病迥徃在京師每退朝叅候起居憂悴形於容色太長公主每為和顏進食以寧迥心太祖知至性徴迥入朝以慰其母意遣大鴻臚郊勞仍賜迥衮冕之服桞檜字季華年十八起家奉朝請居父喪毁瘠骨立檜子雄亮字信誠父為黄衆寳所害雄亮年十二遭父難幾至滅性終喪之後志在復讐事具復讐門若干惠為右衛將軍於諸將最少早喪父事母以孝聞太祖嘗造射堂新成與諸將宴射惠竊歎曰親老矣何暇辦此乎太祖聞之即日徙堂於惠宅其見重如此盧叔仁舉秀才為員外郎以親老乃辭歸就養父母既殁哀毁六年躬營墳壠遂有終焉之志柳敏字曰澤河東解人九歳而孤事母以孝聞後為禮部郎中遭母憂居喪旬日之間鬢髪半白尋起為吏部郎中毁瘠過禮杖而後起太祖見而歎異之特加榮賜荆可河東猗氏人性質朴容止有異於人能苦身勤力供養其母隨時甘㫖終無匱乏及母喪水漿不入口三日悲號踴絶而後蘇者數四葬母之後遂廬於墓側晝夜悲哭負土成墳蓬髪不櫛沐菜食飲水而已然可家舊塋域極大榛蕪至家十餘里而可獨宿其中與禽獸雜處哀感遠近邑里稱之大統中可鄉人以可孝行之至足以勸勵風俗乃上言焉太祖令州縣表異之及服終之後猶若居喪大冡宰晉公䕶聞可孝行特引見焉與可言論時有會於䕶䕶亦至孝其母閻氏没於敵境不測存亡每見可自傷久乖膝下而重可至性及卒之後䕶猶思其純孝收可妻子於京師嘗給其衣食盧柔字子剛少孤為叔母所養撫視如子柔盡心温凊亦同巳親宗族歎重之位開府儀同三司趙和為陵江將軍南討渡淮聞父喪即還所司將致之於法和曰罔極之恩終天莫報若許安厝禮畢而即罪戮死且無恨言訖號慟悲感傍人主司以聞遂宥之張元字孝始河北芮城人也祖成卧疾再周元嘗候祖所食多少衣冠不解旦夕扶侍及祖没號踴絶而復蘇後喪其父水漿不入口三日裴漢性不飲酒而雅好賓逰其父寛没後遂斷絶逰從不聽琴瑟歳時伏臘哀慟而不已撫養兄弟子情甚篤位車騎大將軍柳慶起家奉朝請慶出後第四叔及遭父憂議者不許為重服慶泣而言曰禮者蓋緣人情若出後之家更有斬衰之服可奪此從彼今四叔薨背已久情事不追豈容奪禮乖違天性時論不能抑逐以苫凷終喪既葬乃與諸兄負土成墳服闋除中堅將軍冦雋與兄祖訓祖禮竝有志行家門雍睦父亡雖久而猶於平生所處堂宇備設幃帳几杖以時節列拜垂涕陳薦若宗廟焉吉凶之事必先啟告遠行徃反亦如之位驃騎將軍杜叔毗襄陽人早孤事母以孝聞自梁歸附為中散大夫遭母憂哀毁骨立殆不勝喪後為義歸郡守自兄君錫及宗室等為曹策所害猶殯梁州至是表請迎喪歸葬高祖許之葬事所須詔令官給在梁舊田宅經外配者竝追還之仍賜田二百頃韋師字公頴少沉謹有至性初就學始讀孝經捨書而歎曰名教之極其在茲乎少丁父母憂居喪盡禮州里稱其有孝行位汴州刺史令狐熈為夏官府都上士有能名以母憂去職殆不勝喪其父誡之曰大孝在於安親義不絶嗣吾今見存汝又隻立何得過爾毁頓貽吾憂也熈自是稍加饘粥服闋除小駕部復丁父憂非杖不起人有聞其哭聲莫不為之下泣薛寘為驃騎大將軍性至孝雖年齒已衰職務繁廣至於温凊之禮朝夕無違當時以此稱之秦族性至孝事親竭力為鄉里所稱及居父喪哀毁過禮每一慟哭酸感行路既以母在嘗抑割哀情以慰其母意四時􅈿羞未嘗匱乏與弟榮復相友愛閨門之中怡怡如也尋而其母又没哭泣無時惟飲水食菜而已終喪之後猶蔬食不入房室二十許年郷里咸歎異之其邑人王元逹等七十餘人上狀有詔表其門閭榮性亦至孝遭父母喪哀慕不已遂以毁卒邑里化其孝行明帝嘉之乃下詔曰孝為政本徳乃化先既表天經又明地義居喪致疚至感過人窮號不反迄乎滅性行標當世理鏡幽明此而不顯道將何述可贈滄州刺史以旌厥異王徳初喪父貧無以葬乃賣子公奴并一女以營葬事因兵亂不復相知及徳在平凉始得之遂名曰慶裴文舉叔父季和為曲沃令終於聞喜川而叔母韋氏卒於正平縣屬東西分隔韋氏墳壠遂在齊境及文舉在夲州每加賞募齊人感其孝義濳相要結以韋氏柩西歸竟得合葬隋趙賢通少孤養母至孝年十四有人盗伐其父墓中樹者賢通對之號慟因執送官見魏右僕射周惠逹長揖不拜自述孤苦涕泗交集惠逹為之隕涕歎息者久之王士良仕北齊文宣時為吏部尚書士良少孤事繼母梁氏以孝聞及卒居喪合禮文宣尋起令視事士良屢表陳誠再三不許方應命文宣見其毁瘠乃許之因此卧疾歴年文宣每自親臨視疾疾愈除滄州刺史蕭撝梁安成王秀之子歸周爵黄臺郡公文帝令文儒於麟趾殿校定經史仍撰世譜撝亦預焉尋以母老兼有疾疹五日番上便隔晨昏請在外署事詔許焉高祖以為文學博士撝以母老表請歸養私門上表曰臣聞出忠入孝理深人紀昏定晨省事切天經伏惟陛下握鏡臨朝垂衣御宇孝治天下仁覃草木是以㣲臣冐陳至願臣母妾褚年過養禮乞解今軄侍奉私庭伏願天慈特賜矜許臣披欵歸朝十有六載恩深海岳報淺涓塵肆師掌禮竟無稱職浙隈督察空妨能官方辭違闕庭屏迹閭里低徊繫慕戀悚兼深高祖未許詔曰開府梁之宗英今則位等三事所謂楚雖有材周實用之方藉謀猷匡朕不逮然進思盡忠退安侍養義在公私兼濟豈容全欲狥已乎虧此至公乖所望也尋以母憂去職劉璠初在梁隨上黄侯蕭曄在淮南璠母於建康遘疾璠弗之知嘗忽一日舉身楚痛尋而家信至云其母病璠即號泣戒道絶而又蘇當身痛之辰即其母死之日也居喪毁瘠遂感風氣服闋後一年猶杖而後起位隴右總管府司鎮王誼字冝君遷御史大夫丁父艱毁瘁過禮廬於墓側負土成墳歳餘詔拜雍州别駕固讓不許王頒字景彥梁太尉僧辯之子少倜儻有文武幹局其父平侯景留頒質於荆州遇元帝為周師所陷頒因入關聞父為陳武帝所殺號慟而絶食頃乃蘇哭泣不絶聲毁瘠骨立至服闋嘗布衣蔬食藉蒿而卧周明帝嘉之召授左侍上士趙綽初仕周為内史中士以父艱去職哀毁骨立世稱其孝蘇威字無畏京兆武功人父綽仕魏為度支尚書威少有至性數歳喪父哀毁有若成人後威拜尚書右僕射其年以母憂去職柴毁骨立帝勅威曰公徳行高人情寄殊重大孝之道蓋同俯就必須抑割為國惜身朕之於公為君父宜依朕㫖以禮自存未幾起令視事固辭優詔不許威子䕫為鴻臚少卿坐父事除名為民復丁母憂不勝哀而卒李徳林年十六遭父艱自駕靈輿反葬故里時正嚴冬單衰跣足州里人物繇是敬慕之徳林居貧轗軻母氏多疾方留心典籍無復宦情其後母病稍愈逼令仕進徳林仕北齊為通直散騎侍郎與中書侍郎宋士素副侍郎趙彥深别典機密尋丁母艱去職勺飲不入口五日因發熱病遍體生瘡而哀泣不絶諸士友陸騫宋士素名醫張子彦等為合湯藥徳林不肯進遍體洪腫數日間一時頓差身力平復諸人皆云孝感所致太常博士巴叔仁表上其事朝廷嘉之纔滿百餘日奪情起復徳林以羸病癘疾請急罷歸梁彥光仕周為少馭下大夫母憂去職毁瘁過禮未幾起令視事武帝見其毁甚嗟嘆良久頻蒙慰喻楊素父敷仕周為汾州刺史没於齊武帝親總萬機素以其父守節陷齊未蒙朝命上表申理帝不許至於再三帝大怒命左右斬之素乃大言曰臣事無道天子死其分也帝壯其言繇是贈敷為大將軍謚曰忠壯拜素為車騎大將軍儀同三司漸見禮遇劉士雋彭城人性至孝丁母喪絶而復蘇者數次勺飲不入於口者七日廬於墓側負土成墳列植松栢狐狼馴擾為之取食楊慶字伯恱年二十五郡察孝廉以侍養不行其母有疾不解襟帶者七旬及居憂哀毁骨立負土成墳齊文宣表其門閭賜帛三十疋綿十屯粟五十石位儀同三司田徳懋魏國公仁恭之子少以孝友知名開皇初以父軍功賜爵平原郡公授太子千牛備身丁父艱哀毁骨立廬於墓側薛濬開皇初為考功侍郎高祖聞其事母孝賜輿服几杖四時􅈿味當時榮之後其母疾濬貌甚憂瘁親故弗之識也暨丁母艱詔鴻臚監䕶喪事歸葬夏陽于時隆冬寒極濬衰絰徒跣冐犯霜雪自京及鄉五百餘里足凍墮指瘡血流離朝野為之傷痛州里贈助一無所受尋起令視事濬屢陳誠欵請終喪制優詔不許靈帝見其毁瘠過甚為之改容顧謂羣臣曰吾見薛濬哀毁不覺悲感傷懐嗟異久之濬竟不勝喪病卒張炤開皇初為太府少卿領營新都監丞丁父憂去職柴毁骨立未朞起令視事固辭不許蕭圓肅為貝州刺史以母老請歸就養高祖許之姚最為太子門大夫以父憂去官哀毁骨立崔頥開皇中為恊律郎太常卿蘇威雅重之母憂去職性至孝水漿不入口者五日元壽字長壽少孤性仁孝九歳喪父哀毁骨立宗族鄉黨咸異之事母以孝聞位羽衛將軍李徳饒性至孝父純寢疾輒終日不食十旬不解衣及丁憂水漿不入口者五日哀慟嘔血數升及送葬之日會仲冬積雪行四十餘里單衰徒跣號踴幾絶會葬千餘人莫不為之流涕位司𨽻從事徐孝肅汲郡人早孤不識父長問其母父狀因求畵工圖其形像搆廟置之而定省焉朔望享祭養母至孝數十年家人不見其有忿恚之色及母老疾孝肅親易燥濕憂瘁數年見者無不悲悼母亡孝肅茹蔬飲水盛冬單衰毁瘠骨立葬祖父母父母墓皆負土成墳廬於墓所四十餘載披髪徒跣遂以身終華秋汲郡臨河人幼喪父事母以孝聞家貧傭賃為養其母遇患秋容貌毁瘁鬚鬢頓改州里咸嗟異之及母終之後遂絶櫛沭髪盡禿落廬於墓側負土成墳有人欲助之者秋輙拜而止之韋鼎遭父憂水漿不入口者五日哀毁過禮殆將滅性位至光州刺史韋秀才幼頴悟八歳誦尚書十一通周易居喪以孝聞位通直散騎常侍房彥謙字孝冲父然為廣州刺史彥謙早孤年十五出後叔父子貞事所繼母有踰本生子貞哀之撫養甚厚丁所繼母憂勺飲不入口者五日事伯父樂陵太守豹竭盡心力每四時􅈿果口未先嘗遇朞功之戚必蔬食終禮宗族取則焉豆盧勣為渭州刺史丁父艱毁瘁過禮于宣道為内史舍人丁父憂水漿不入口者累日獻皇每令中使敦諭起令視事免喪拜車騎將軍逹奚長孺為鄜州刺史母憂去職性至孝水漿不入口者五日毁悴過禮殆將滅性天子嘉歎起為夏州總􅃹杜整字育少有風㮣九歳丁父憂哀毁骨立事母以孝聞位左衛將軍長孫晟性至孝居憂毁瘠為朝士所稱位左驍衞將軍蕭世亷開府摩訶之子父與漢王諒同逆伏誅世亷性至孝及摩訶凶終服闋後追慕彌切其父時賓故脱有所言及世亷對之哀慟不自勝言者為之歔欷終身不執刀刃時人嘉焉陳孝意為侍御史以父憂去職未朞起授鴈門郡丞在郡莱食齋居朝夕哀臨每發聲未嘗不絶倒柴毁骨立見者哀之楊异九歳丁父憂哀毁過禮殆將滅性位冀州總􅃹田翼不知何許人也性至孝養母以孝聞其後母卧疾歳餘翼親易燥濕母食則食母不食則不食母患暴痢翼謂中毒遂親嘗惡及母終翼一慟而絶其妻亦不勝哀而死鄉人共厚𦵏之李士謙字子約趙郡平棘人髫齓喪父事母以孝聞母曾嘔吐疑為中毒因跪而嘗之自以少孤未嘗飲酒食肉口無殺害之言至於親賓來萃輒陳樽爼對之危坐終日不倦初仕魏廣平王贊開府叅軍事後不仕郎茂年十九丁父憂居喪過禮位饒州刺史虞世基為内史侍郎以母憂去職哀毁骨立有詔起令視事拜見之日殆不能起帝令左右扶之哀其羸瘠詔令進肉世基食輙悲哽不能下煬帝使謂之曰方相委仕職為國惜身前後敦勸者數矣楊𤣥感為禮部尚書其叔父約拜浙陽太守𤣥感與約恩義甚篤既愴分離形於顏色煬帝謂之曰公比憂悴得非為叔耶𤣥感再拜流涕曰誠如聖㫖帝思約廢立之功繇是徴入朝册府元龜卷七百五十五
