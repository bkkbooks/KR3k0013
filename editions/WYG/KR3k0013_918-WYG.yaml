body:
  text: 册府元龜卷九百十八宋王欽若等撰總録部忿爭詆訐忿爭凡人禀血氣而生藴水火之性出處市朝之内馳逐名利之間情欲誘於外憎愛應於内强弱相形毁譽相傾卒嵗醜夷寧無忿爭乎譸張是非多生於酣醟紛紜辨訴或發於譏嫌非夫禮義為防謙恭有素鮮不敗於兹矣漢灌夫字仲孺武帝世為太僕坐法去家居長安夫為人剛直使酒使酒因酒而使氣也不好面諛貴戚諸勢在已之右必欲陵之士在已左愈貧賤尤益禮敬與鈞右尊也左卑也鈞等也及竇嬰失勢亦欲倚灌夫引繩披根生平慕之後棄之者言嬰與夫共相提挈有人生平慕嬰夫後見其失職而頗漫弛如此者共排退之不復與交譬如相對挽繩而根格之也今吳楚俗猶謂牽引前卻為根格也夫亦倚嬰通列侯宗室為名髙兩人相為引重相牽引而致於尊重也為音于偽切其游如父子然相得驩甚無厭恨相知之晩夫有服謂喪服也過丞相蚡蚡從容曰從音千容切吾欲與仲孺過魏其侯㑹仲孺有服夫曰將軍廼肯幸臨况魏其侯况賜也夫安敢以服為解解謂辭之也若今言分疏矣請語魏其具具辦具酒食將軍旦日蚤臨旦日明旦也蚤古早字蚡許諾以語嬰嬰與夫人益市牛酒益多也夜洒掃張具洒音灑又音所寄切至旦平明令門下伺候至日中蚡不来嬰謂夫曰丞相豈忘之哉夫不懌懌悦也曰夫以服請不宜不當忘也乃駕自往迎蚡蚡特前戲許夫特但也殊無意往夫至門蚡尚卧也於是夫見曰將軍昨日幸許過魏其魏其夫妻治具至今未敢嘗食蚡悟謝曰吾醉忘與仲孺言乃駕往往又徐行夫愈益怒及飲酒酣夫起舞屬蚡屬付也猶今之舞訖相勸也屬音之欲切蚡不起夫徙坐語侵之徙坐謂移就其坐也嬰廼扶夫去謝蚡蚡卒飲至夜極驩而去後蚡使籍福請嬰城南田嬰大望曰望怨也老僕雖棄將軍雖貴寧可以勢相奪乎不許夫聞怒罵福福惡兩人有隙廼謾好謝蚡謾猶詭也詐為好言也謾讀與慢同又音莫連切曰魏其老且死易忍且待之已而蚡聞嬰夫實怒不與亦怒曰魏其子嘗殺人蚡活之蚡事魏其無所不可何愛數頃田且灌夫何與也與讀曰預預干也吾不敢復求田繇此大怒元光四年春蚡言灌夫家在潁川横甚民苦之請按之帝曰此丞相事何請夫亦持蚡隂事為姦利受淮南王金與語言賔客居間遂已俱解兩家賔客處於中間和解之夏蚡取燕王女為夫人燕王澤之子康王嘉女太后詔召列侯宗室皆徃賀嬰過夫欲與俱夫謝曰夫數以酒失過丞相言因酒有失得罪過於丞相丞相今者又與夫有隙嬰曰事已解彊與俱酒酣蚡起為壽坐皆避席伏已嬰為夀獨故人避席餘半膝席以膝跪席上也夫行酒至蚡蚡膝席曰不能滿觴夫怒因嘻笑曰將軍貴人也畢之言將軍雖貴人也請盡此觴嘻强笑也音許其切時蚡不肯不為盡也行酒次至臨汝侯灌賢賢方與程不識耳語附耳小語也又不避席夫無所發怒廼罵賢曰平生毁程不識不直一錢今日長者為壽乃效女曹兒呫囁耳語女曹兒猶言兒女輩也呫音曷涉切囁音人涉切蚡謂夫曰程李俱東西宮衛尉李廣為東宮程不識為西宮今衆辱程將軍仲孺獨不為李將軍地乎二人同號比尊今辱一人不當為毁廣邪旣毁程令廣何地自安處夫曰今日斬頭陷胷何知程李斬頭見刺猶不止也坐乃起更衣坐謂坐上之人也更改也凡久坐者皆起更衣以其寒暖或變也稍稍去嬰去戲夫戲古麾字也招麾之令出也漢書多以戲為麾字夫出蚡遂怒曰此吾驕灌夫罪也乃令騎留夫騎謂常從之騎也夫不得出籍福起為謝案夫項今謝使其拜也夫愈怒不肯順蚡廼戲騎縳夫戲亦讀曰麾謂指麾命之而令收縳夫也置傳舍召長史曰今日召宗室有詔長史室謂相長史也召宗召之為客也劾灌夫罵坐不敬於大坐中罵詈為不敬繫居室居室署名也屬少府其後改名曰保宫遂具前事遂竟也遣吏分曹逐捕諸灌氏支屬皆棄市罪嬰愧為資使賔客請莫能解為資為其資地非財物也為讀如本字蚡吏皆為耳目諸灌氏皆亡匿夫繫遂不得告言蚡隂事嬰鋭為救夫嬰夫人諫曰灌將軍得罪丞相與太后家迕相逆迕也迕音悟寧可救邪嬰曰侯自我得之自我捐之無所恨言不過失爵爾且終不令灌仲孺獨死嬰獨生廼匿其家竊出上書匿避也不令家人知之恐其又止諫也立召入具告言灌夫醉飽事不足誅帝然之賜嬰食曰東朝廷辨之東朝大后朝也㑹公卿大夫東朝共理而分别也嬰之東朝盛推夫善言其醉飽得過廼丞相以他事誣罪之蚡盛毁夫所為横恣罪逆不道嬰度無可奈何度音徒各切因言蚡短蚡曰天下幸而安樂無事蚡得為肺腑所好音樂狗馬田宅所愛倡優巧匠之屬倡樂人也優諧戲者也不如魏其灌夫日夜招聚天下豪傑壯士與論議腹誹而心謗仰視天俛畫地視天占三光也畫地知分野所在也意欲作反事也辟睨兩宮間辟睨傍視也辟音普計切字本作睥睨音吾計切幸天下有變而欲有大功天下有變謂因國家變難之際得立大功也臣乃不如魏其等所為帝問朝臣兩人孰是御史大夫韓安國曰魏其言灌夫父死事身荷㦸馳不測之吳軍荷負也不測言其强也荷音何可切身被數十創名冠三軍此天下之壯士非有大惡争杯酒不足引他過以誅也魏其言是丞相亦言灌夫通奸猾侵細民家累巨萬横恣潁川輘轢宗室侵犯骨肉輘轢謂踏踐也輘音凌轢音郎擊切此所謂支大於幹脛大於股不折必披披音丕靡切丞相言亦是唯明主裁之主爵都尉汲黯是魏其内史鄭當時是魏其後不堅餘皆莫敢對帝怒内史曰公平生數言魏其武安長短今日廷論局趣效轅下駒駒馬駕着轅下局趣䠞小之貎也吾并斬若屬矣若汝也即罷起入上食太后太后亦已使人候伺具以語太后太后怒不食曰我在也而人皆藉吾弟藉蹈也令我百嵗後皆魚肉之乎以比魚肉而食噉也且帝寧能為石人邪言徒有人形爾不知好惡也一曰石人者謂常存不死此特帝在即録録録録言循衆也設百嵗後是屬寧有可信者乎設猶脱也帝謝曰俱外家故廷辨之嬰景帝從舅子故蚡太后同母弟曰俱外家不然此一獄吏所决爾是時郎中令石建為帝分别言兩人蚡已罷朝出止車門召御史大夫安國載韓安國也載謂共乗車怒曰與長孺共一秃翁何為首鼠兩端秃翁言嬰無官位版綬也首鼠一前一卻也安國良久謂蚡曰君何不自喜何不自謙遜為可喜之事也喜音許吏反夫魏其毁君君當免冠解印綬歸歸印綬於天子也曰臣以肺腑幸得待罪固非其任魏其言皆是如此上必多君有讓多猶重也不廢君魏其必媿杜門齰舌自殺杜塞也齰齧也音仕客切今人毁君君亦毁之譬如賈豎女子爭言何其無大體也蚡謝曰爭時急不知出此於是帝使御史簿責嬰簿責以文簿一一責之也簿音步户切所言灌夫頗不讎讎當也劾繫都司空都司空宗正屬官也孝景時嬰嘗受遺詔曰事有不便以便宜論上論説其事而上於天子及繫灌夫罪至族事曰急諸公莫敢復明言於帝嬰乃使昆弟子上書言之幸得召見幸冀也書奏案尚書大行無遺詔大行景帝大行也尚書之中無此大行遺詔也詔書獨藏嬰家家丞封以家丞印封遺詔也廼劾嬰矯先帝詔害罪當棄市矯詔有害不害也五年十月悉論灌夫支屬嬰良久乃聞有劾即陽病痱不食欲死痱風病也音肥或聞帝無意殺嬰復食治病議定不死矣廼有飛語為惡言聞帝蚡為作飛揚誹謗之語也無根而至也故以十二月晦論棄市渭城著日月者見春垂至恐遇赦贖之後漢游徼史不書名劉聖公嘗聚客家有酒請游徼飲賓客醉歌言朝亨兩都尉游徼後来用調羮味游徼大怒縛棰數百魏桓範為大司農嘗抄撮漢書中諸雜事自以意斟酌之名曰世要論時蔣濟為太尉嘗與範㑹社下羣卿列坐有數人範懐其所撰欲以示濟謂濟當虛心觀之範出其書以示左右左右傳之示濟濟不肯視範心恨之因論他事乃發怒謂濟曰我祖薄德公輩何似耶濟性雖强毅亦知範剛毅睨而不應各罷吳質拜北中郎將督幽并諸軍事文帝黄初五年朝京師詔上將軍及特進以下皆㑹質所大官給供具酒酣質欲盡歡時上將軍曹真性肥中領軍朱鑠性瘦質召俳優使説肥瘦真負貴恥見戲怒謂質曰卿欲以部曲將遇我邪驃騎將軍曹洪輕車將軍王忠言將軍必欲使上將軍服肥即自宜為瘦真愈恚拔刀瞋目言俳優敢輕脱吾斬爾遂罵坐質按劔曰曹子丹汝非屠机上肉吳質吞爾不揺喉咀爾不揺牙何敢恃勢驕邪鑠因起曰陛下使吾等来樂卿爾乃至此邪質顧叱之曰朱鑠敢壊坐諸將軍皆還坐鑠性急愈恚還拔劍斬地遂便罷也晉庾純字謀甫為河南尹初純以賈充姦佞與任敳共舉充西鎮關中充繇是不平充嘗宴朝士而純後至充謂曰君行常居人前今何以在後純曰且有小市井事不了是以来後世言純之先嘗有伍伯者充之先有市魁者充純以此相譏焉充自以位隆望重意殊不平及純行酒充不時飲純曰長者為壽何敢爾乎充曰父老不歸供養将何言也純因發怒曰賈充天下兇兇由爾一人充曰充輔佐二世蕩平巴蜀有何罪而天下為之兇兇曰髙貴鄉公何在衆坐因罷充左右欲執純中護軍羊琇侍中王濟佑之因得出充慙怒上表解職純懼上河南尹關内侯印綬上表自劾詔免純官李陽上黨武鄉人石勒㣲時與陽鄰居嵗嘗爭麻地迭相毆擊後勒僭王位召為參軍都尉南齊沈文季字仲達為侍中領太子右率司徒褚淵當世貴望頗以門户裁之文季不為之屈世祖在東宮於𤣥圃宴朝臣文季數舉酒勸淵淵甚不平啓世祖曰沈文季謂淵經為其郡數加淵酒文季曰維桑與梓必恭敬止豈如明府亡國失土不識枌榆遂言及虜動淵曰陳顯達沈文季當今將畧足委以邊事文季諱稱將門因是發怒啓世祖曰禇淵自謂是忠臣未知身死之日何面目見宋明帝世祖笑曰沈率醉也中丞劉休舉其事見原後豫章王北宅後堂集㑹文季與淵並善琵琶酒闌淵取樂器為明君曲文季便下席大唱曰沈文季不能作伎兒豫章王又解之曰此故當不損仲容之德淵顔色無異終曲而止後魏李神雋為侍中初神雋喪二妻又欲娶鄭嚴祖妹神雋之從甥也盧元明亦將為婚遂至紛競二家問於嚴祖之門鄭卒歸元明神雋惆悵不已時人謂神雋鳳德之衰崔康為衛軍府録事參軍帶母極令時甄琛為長史因公事言競之間康以拳擊琛墜於牀下琛以本縣長笑而不論北齊羊烈為大中大夫兼光禄少卿與尚書畢義雲爭兖州大中正義雲盛稱門閥云我累世本州刺史卿世為我家故吏烈答云卿自畢軌被誅以還寂無人物近日刺史皆是疆場之上彼此而得何足為言豈若我之漢家河南尹晉朝太傳名德學行百代傳美且男清女貞足以相冠自外多可稱也盖譏義雲之帷薄焉隋何妥為國子博士加通直散騎常侍時納言蘇威兼領五職髙祖甚親重之妥因奏威不可信任威大銜之開皇十二年威定考文學又與妥更相訶詆威勃然曰無何妥不慮無博士妥應聲曰無蘇威亦何􅁨無執事由是與威有隙虞慶則為尚書右僕射使突厥還髙祖幸晉王第置酒㑹羣臣髙熲等奉觴帝因曰髙熲平江南虞慶則降突厥可謂茂功矣楊素曰皆由至尊威德所被慶則曰楊素前出兵武牢峽石若非至尊威德亦無克理遂與並相長短御史欲彈之帝曰今日計功為樂宜不須劾唐李錡為宗正少卿嘗以公事與太卿李幹忿爭錡辭稍直朝廷兩秘之潘孟陽為户部侍郎判度支與太府少卿王遂私忿相持屢請論列上前羣議不可因改為左散騎常侍漢王繼宏初仕後唐為六宅副使負氣不遜禁中與同列忿爭配流義州嵗餘召復禁職史𢎞肇為侍衛親軍都指揮使太師兼侍中時周太祖出鎮魏州𢎞肇議帶樞宻以行蘇逢吉楊邠以為不可𢎞肇恨之明日㑹飲竇貞固第𢎞肇舉爵屬周太祖曰昨辰廷論一何同異今日與公飲此楊邠蘇逢吉亦舉大爵曰此國家之事也何足介意遂俱引爵𢎞肇又厲聲言曰安朝廷定禍亂直須長鎗大劍至如毛錐子焉足用哉三司使王章曰雖有長鎗大劍若無毛錐子贍軍財賦自何而来𢎞肇黙然少頃而罷未幾章於其第張酒樂時𢎞肇與宰相樞宻使及内客省使閻晉卿等俱㑹酒酣為手勢令𢎞肇不熟其事閻晉卿坐次于𢎞肇屢教之蘇逢吉戲𢎞肇曰近坐有姓閻人何憂罰爵𢎞肇妻閻氏本酒妓也𢎞肇謂逢吉譏之大怒以醜語詬逢吉逢吉不校𢎞肇欲毆逢吉逢吉䇿馬而去𢎞肇遽起索劒意欲追逢吉楊邠曰蘇公是宰相公若害之致天子何地公細思之邠泣止之𢎞肇索馬急馳而去邠慮有非常連鑣而進送至第而還自時將相不協如水火矣詆訐昔子貢之言曰惡不遜以為勇者惡訐以為直者誠哉小人之用心實為明哲之所棄若乃疎直清廉不事於左右危言深論不隱乎豪强雖居訐訕之流頗涉强直之途至若言多厯詆志在厚誣此則冒嫉忌前為害滋甚如其脅肩諂笑互相譏誚不顧名教坐延祖禰俯及帷薄此皆斗筲淺局足貽誚於千古爾漢息夫躬為光禄大夫左曹給事中躬旣親近數進見言事論議亡所避衆畏其口見之仄目仄古側字也躬上疏厯詆公卿大臣詆謂毁譽也丁禮切曰方今丞相王嘉健而蓄縮不可用蓄縮謂怯於事也御史大夫賈延墮弱不任職左將軍公孫禄司𨽻鮑宣皆外有直項之名内實騃不曉政事騃愚也五駭切諸曹以下僕遫不足數僕遫凡短之貌也僕音步木切遫古速字卒有强弩圍城長㦸指闕卒讀曰猝陛下誰與備之如使狂夫嘄謼於東崖東崖謂東海之邊也嘄古呌字謼音火故切匈奴飲馬於渭水邊竟雷動四野風起竟曰境京師雖有武蠭精兵未有能窺左足而先應者也窺音跬跬半步也言一舉足也軍書交馳而輻輳羽檄重迹而押至押音狎押至盖言相因而至也羽檄言檄之挿羽者也解在髙紀小夫愞臣之徒憒眊不知所為憒心亂也眊目闇也憒音工内反眊音莫報反其有犬馬之决者仰藥而伏刃仰藥仰首而飲藥雖加夷滅之誅何益禍敗之至哉盖寛饒為司𨽻校尉深刻喜陷害人喜音許吏切在位及貴戚人與為怨人人皆怨之又好言事刺譏奸犯帝意奸音干帝以其儒者優容之後漢魏齊卿扶風人公族進階渤海人姓公族名進階並危言深論不隱豪强自公卿以下莫不畏其貶議屣履到門范滂汝南人為司徒掾非訐朝政自公卿以下皆折節下之吳虞飜為騎都尉大帝與張昭論及神仙飜指昭曰彼皆死人而語神仙世豈有仙人也大帝積怒非一遂徙飜交州宋王淮之為宋臺御史中丞嘗作五言范泰謿之曰卿惟解彈事爾淮之正色答曰猶勝卿世載雄狐王𢎞為太保領中書監少時嘗摴蒱公城子墅舍及後當權有就𢎞求縣辭訴頗切此人常以蒲戲得罪𢎞詰之曰君得錢㑹戲何用禄為答曰不審公城子墅何在𢎞黙然南齊檀珪字伯玉罷沅南令吏部尚書王僧䖍以為征北板行參軍訢僧䖍求禄不得與僧䖍書曰五常之始文武為先文則經緯天地武則撥亂定國僕一門雖謝文通乃忝武達羣從姑叔三媾帝室祖兄二世糜軀奉國而令子姪餓死草壤去冬今春頻荷二勅旣無中人屢見蹉奪經涉五朔踰厯四晦書牘十二接覲六七遂不荷潤反更曝鰓九流繩平自不宜獨苦一物蟬腹龜腸為日已久饑彪能嚇人遽與肉餓麟不噬誰為落毛去冬乞豫章丞為馬超所爭今春蒙勅南昌縣為史偃所奪二子勲䕃人才有何見勝若以貧富相奪則分受不如身雖孤微百世國士姻媾位宦亦不後物尚書同堂姊為江夏王妃檀桂同堂姑為南譙王妃尚書婦是江夏王女檀珪祖姑為長沙景王嬪尚書伯為江州檀珪祖亦為江州尚書從兄出身為後軍參軍檀珪父釋褐為中軍參軍僕於尚書人地本懸至於婚宦不肯殊絶今通塞雖異猶參氣類尚書何事乃爾見苦泰始之初八表同逆一門二世粉骨衛主殊勲異績已不能甄常階舊塗復見侵抑僧䖍報書曰征北板比嵗處遇小優殷主簿從此府入崇禮何儀曹即代殷亦不見訴為苦足下積屈一朝超升正自不難泰始初勤苦十年自未見其賞而頓就求禄亦何遽急吾與足下素無怨憾何以相侵苦直是意有左右爾珪又書曰昔荀公達漢之功臣晉武帝方爵其𤣥孫夏侯惇魏氏勲佐金德初融亦始就甄顯方賞其孫封樹近族羊叔子以晉泰始中建䇿伐吳至咸寜末方知褒寵封其兄子卞望之以咸和初殞身國難至興寧末方崇禮秩官其子孫蜀郡主簿田混黄初末死故君之難咸康中方擢其子孫似不以世代逺而被棄年世疎而見遺檀珪百罹六極造化罕比五喪停露百口轉命存亡披迫本希小祿無意階榮自古以来有沐食侯近代有王官府佐非沐食之職參軍非王官之謂質非匏𤓰實羞空懸殷何二生或是府主情味或是朝廷意㫖豈與悠悠之人同口而語使僕就此職尚書能以郎見轉不若使日得五升祿為不恥執鞭僧䖍乃用為安城郡丞珪宋安南将軍韶孫也沈瓚之為丹徒令性疎直在縣自以清廉不事左右浸潤日至遂鎖繫尚方歎曰一見天子足矣帝召問曰復欲何陳答曰臣坐清修以獲罪帝曰清修何以獲罪曰無以承奉要人帝曰要人為誰瓚之以手板四面指曰此赤衣諸賢皆是若臣得更鳴必令清譽日至瓚之雖危言帝亦不責後知其無罪重除丹徒令入縣界吏人候之謂曰我今重来當以人肝代米不然清名不立劉祥少好文學性韻剛疎輕言肆行不避髙下為正員郎司徒褚淵入朝以腰扇鄣日祥從側過曰作如此舉止羞面見人扇鄣何益淵曰寒士不遜祥曰不能殺袁劉安得免寒士袁謂袁粲劉謂劉彦節後魏辛琛為揚州征南府長史李崇多事産業琛每諍折崇不從遂相糾舉詔並不問崇因置酒謂琛曰長史後必為刺史但不知得上佐何如人爾琛對曰若萬一叨恩得一方正長史朝夕聞過是所願也崇有慙色陳竒為秘書監游雅所惡竒冗散數年髙允毎與竒讎温古籍嘉其逺致稱竒通識非凡學所窺允㣲勸雅曰君朝望具曕何為與野儒辯簡牘章句雅謂允有私於竒曰君寧黨小人也乃取竒所注論語孝經燔於庭内允曰公貴人不乏樵薪何乃然竒論語雅愈怒因告京師後生不聽傳授而竒無降志亦評雅之失雅製昭皇太后碑文論后名字之美比諭前魏之甄后竒刺發其非遂聞於帝詔下司徒檢對碑史事乃郭后雅有屈焉竒史不載官名後唐史在德蜀人褊急務在進取游説豪門以國士自負末帝清泰二年上封事大㫖言朝廷間人率多濫進稱武士者不閑計䇿雖披堅執鋭戰則棄甲窮則背軍稱文士者鮮有藝能多無士行問䇿謀則杜口作文字則倩人所謂虚設具員枉耗國力逢陛下惟新之運是文明革弊之秋臣請應内外所管軍人凡勝衣甲者請宣下本都本將一考試武藝短長權謀深淺居下佐有将相才者便拔為大將居上位無將畧者移之下軍其東班臣僚請内出䇿題下中書並令宰臣面試如下位有大才者便拔居大位處大位無大才者即移之下僚其疏大約如此在德敢言不畏罪罰盧文紀等省其奏不悦班行亦多憤悱故諫官劉濤等上疏請出在德疏辯可否宣行中書覆奏亦駁其錯誤帝詔學士馬𦙍孫謂曰史在德語太凶其實難容朕初臨天下須開言路若朝士以言獲罪誰敢言者爾代朕作詔勿加在德之罪晉關徹為滑州節度使史匡翰幕客狂率酣醟一日使酒怒目謂匡翰曰明公昔刺覃懷與徹主客道至事無不可今領節鉞數不相容且書記趙礪險詖之人也脅肩諂笑黷貨無厭而公待之甚厚澈今請死近聞張彦澤臠張式未聞史匡翰斬關徹恐天下談者未有此類匡翰不怒引滿自罰而慰勉之册府元龜卷九百十八
