body:
  text: 册府元龜卷九百九十三宋王欽若等撰外臣部備禦第六唐德宗貞元三年四月庚申詔曰蕃冦雖退疆理猶虞安邊之䇿必有良算各委常叅官具所見封進每坐日三四人陳奏利害七年二月戊戌詔曰平凉當四㑹之衝居北地之要涇原節度使劉昌請城于兹分兵保戍實以遏其要衝保寜邊鄙平凉故原州屬縣在州西一百五十里今董率諸兵城之度支饋餉旋辰而畢仍分兵戍之地當走集得守固之要兵器糧穀頗豐而人安焉八年中書侍郎陸贄知政事以河隴䧟蕃已來西北邊常以重兵守備謂之防秋皆河南江淮諸鎮之軍也更畨往來疲於戎役贄以中原之兵不習邊事及捍虜戰賊動多敗衂又苦邊將名目太多諸軍統制不一緩急無以應敵乃上疏論其事曰臣歴觀前代書史皆謂鎮撫四夷宰相之任不揆闇劣屢敢上言誠以備邊禦戎國家之重事理兵足食備禦之大經兵不治則無可用之師食不足則無可固之地理兵在制置得所足食在歛導有方陛下幸聽愚言先務積榖人無加賦官不費財坐致邊儲數逾百萬諸鎮收糴今已向終分貯軍城用防艱急縱有冦戎之患必無乏絶之憂守此成規以為永制常收冗費益贍邉農則更經二年可積十萬人三歳之粮矣足食之原粗至理兵之術未精敢試籌量庶備採擇伏以戎狄為患自古有之其於制禦之方得失之論備存史籍可得而言大抵尊即序者則曰非德無以化要荒曾莫知威不立則德不能馴也樂武威者則曰非兵無以服凶獷曾莫知德不修則兵不可恃也務和親者則曰要結可以睦隣好曾莫知我結之而彼復解之也美長城者則曰設險可以固邦國而扞冦讐曾莫知力不足人不堪則險不能有也尚薄伐者則曰驅遏可以禁侵暴而省征徭曾莫知兵不鋭壘不完則遏之不能勝驅之不能去也議邊之要略盡於斯雖互相譏評然各有偏駁聽一家之説則理例可徴考歴代所行則成敗異效是繇執常理以御其不常之勢狥所見而昧所遇之時夫中夏有盛衰夷狄有彊弱事機有利害措置有安危故無必定之親亦無長勝之法夏后以序戎而聖化茂古公以避狄而王業興周城朔方而獫狁攘秦築臨洮而宗社覆漢武討匈奴而貽悔太宗征突厥而致安文景約和親而不能弭患於當年宣元𢎞撫納而足以保寜於累葉以中夏之盛衰異勢夷狄之彊弱異時事機之利害異情措置之安危異决知其事而不度其時則敗附其時而不失其稱則成形變不同胡可專一夫以中國彊盛夷狄衰㣲而能屈膝稱臣歸心受制拒之則阻其嚮化威之則類於殺降安得不存而撫之即而序之也又如中國彊盛夷狄衰㣲而尚棄信奸盟蔑㤙肆毒諭之不變責之不懲安得不取亂推亡息人固境也其有遇中國喪亂之弊當夷狄彊盛之時圖之則彼釁未萌禦之則我力不足安得不卑詞降禮約好通和㗖之以親紓其交禍縱不必信且無大侵雖非御戎之善經亦時事有不能已也儻或夷夏之勢彊弱適同撫之不寜威之不靖力足以自保不足以出攻得不設險以固軍訓師以待冦來則薄伐以遏其深入去則攘斥而戒於逺追雖為安邊之令圖亦勢力有不能不然也故夏之即序周之于攘太宗之翦亂皆乗其時而用其勢者也古公之避狄文景之和親神堯之降禮皆順其時而不失其稱也秦皇之長城漢武之窮討皆知其事而不度其時者向若遇孔熾之勢行即序之方則見侮而不從矣乗可取之資懐畏避之志則失機而飬冦矣有攘却之力用和親之謀則示弱而勞費矣當降屈之時務翦伐之畧則召禍而危殆矣故曰知其事而不度其時則敗附其時而不失其稱則成是無必定之規亦無長勝之法得失著效不其然歟至於察安危之大情計成敗之大數百代之變易者蓋有之矣其要在於失人肆恣則必蹷任人從衆則必全此乃古今所同情理之所一也國家自祿山搆亂肅宗中興撤邊備以靖中邦借外威以寜内難於是吐蕃乗釁吞噬無厭廻紇矜功馮陵亦甚中國不遑振旅四十餘年使傷耗遺甿力竭蠶織西輸賄幣北賂馬資尚不足塞其煩言滿其驕志復乃逺徴士馬列戍疆陲猶不能遏其奔衝止其侵侮小入則驅略黎庶深入則震驚邦畿時有議安邉之䇿者多務於所難而忽於所易勉於所短而畧於所長遂使所易所長者行之而其要不精所難所短者圖之而其功靡就憂患未弭職斯之繇夫制敵行師必量事勢勢有難易事有後先力大而敵脆則先其所難是謂奪人之心暫勞而永逸者也力寡而敵堅則先其所易是乃固國之本觀釁而後動者也頃屬多故人勞未瘳而欲廣發師徒深踐冦境復其侵地攻其堅城前有勝負未必之虞後有饋運不繼之患儻或撓敗適所以啓戎心而挫國威以此求保國安邉之謀可謂不量事務於所難矣天之授者有分事無全功地之産者有宜物無兼利是以五方之俗長短各殊長者不可踰短者不可企勉所短而敵其所長必殆用所長而乘其所短必安強者乃以水草為邑居以射獵供飲茹多馬而尤便馳突輕生而不恥敗亡此戎狄之所長也戎狄之所長乃中國之所短而欲益兵蒐乘角力爭馳交鋒原野之間决命㝷常之内以為禦冦之術可謂勉所短而較其所長矣務所難勉所短勞費百倍終於無成雖果成之不乆自廢豈不以越天授而違地産􅃜時勢以反物宜者哉將欲去危就安息費從省在其愼守所易精用所長而已若乃擇將吏以撫寜衆庶修紀律以訓齊師徒耀徳以佐威能邇以柔逺禁侵抄之暴以彰吾信抑攻取之議以安戎心彼求和則善待而勿與結盟彼為冦則嚴備而不務報復此當今之所易也賤力而貴智惡殺而好生輕利而重人忍小以全大安其居而後動俟其時而後行是以修封疆守要害塹蹊隧壘軍營謹禁防明斥候務農以足食練卒以蓄威非萬全不謀非百克不鬪冦小至則張聲勢以遏其入冦大至則謀其大以邀其歸據險以乗之多方以悞之使其勇無所加衆無所用掠則靡獲攻則不能進有腹背受敵之虞退有首尾難救之患所謂乗其弊不戰而屈人之兵此中國之所長也我之所長乃戎狄之所短我之所易乃戎狄之所難以長制短則用力寡而見功多以易敵難則財不匱而事速就捨此不務而反為所乘斯謂倒持戈矛以鐏授冦者也今則皆務之矣然猶守封未固冦戎未懲者其病在於謀無定用衆無適從所任不必才才者不必任所聞不必實實者不必聞所信不必誠誠者不必信所行不必當當者未必行故令措置乖方課責虧度財匱於兵衆力分於將多怨生於不均機失於遙制臣請為陛下粗陳六者之失惟明主慎聴而熟察之臣聞工欲善其事必先利其器武欲勝其敵必先練其兵練兵之中所用復異用之於救急則權以紓難用之於暫敵則權以應機故事有便冝而不拘常制謀有竒詭而不狥衆情進退死生惟將所命此所謂攻討之兵也用之於屯戍則事圖可乆勢異從權非物理所惬不寜非人情所欲不固夫人情者利焉則勸習焉則安保親戚則樂生顧家業則忘死故可以理術馭不可以法制驅此所謂鎮守之兵也夫欲備封疆禦戎狄非一朝一夕之事固當選鎮守之兵以置焉古之善選署者必量其情習辨其土宜察其伎能知其欲惡用其力而不違其性齊其俗而不易其宜引其善而不責其所不能禁其非而不處其所不欲而又類其部伍安其室家然後能使之樂其居定其志奪其氣勢結其㤙情拊之以惠則感而不驕臨之以威則肅而不怨靡督課而人自為用施禁防而衆自不擕故出則足兵居則足食守則固戰則彊其術無它便於人情而已矣今者㪚徴士卒分戍邉陲更代徃來以為守備是則不量性習不辨土宜邀其所不能彊其所不欲求廣其數而不考其用將致其力而不察其情斯可以為羽衛之儀而無益於備禦之寔也何者窮邊之地千里蕭條寒風裂膚驚沙􅆭目與􅉘狼為鄰伍以戰鬪為嬉逰晝則荷戈而耕夜則倚􅇏而覘日有剽割之慮永無休暇之娯地惡人勤於斯為甚自非生於其域習於其風㓜而覩焉長而安焉不見樂土而不遷焉則罕能寜其居而狎其敵也關東之地百物阜殷從軍之徒尤被優飬慣於温飽狃於歡康比諸邊隅若異天地聞絶塞荒陬之苦則辛酸動容聆彊蕃勁虜之名則懾駭奪氣而乃使之去親族捨園廬甘其所辛酸抗其所懾駭將冀為用不亦疎乎矧又有休代之期無統馭之帥資奉若驕子姑息如倩人進不邀之以成功退不處之以嚴憲其來也咸負徳色其止也莫有固心屈指計歸張頥待飼徼幸者猶患還期之賖緩常念戎醜充斥王師挫傷則將乗其離亂布路東潰情志且爾得之奚為平居則殫耗資儲以奉浮冗之衆臨難則㧞棄城鎮以搖逺近之心其弊豈為無益哉固亦將有所撓也復有抵犯刑禁謫徙軍城意欲增戸寔邊兼令展効自贖既是無良之類且加懐土之情思亂幸災又甚戍卒適足煩於防衛諒無望於功庸雖前代時或行之固非良算之可遵者也復有擁旄之帥身不臨邊但分偏師俾守疆塲大抵軍中壯鋭元戎例選自隨委其疲羸乃配諸鎮節將既居内地精兵祗備紀綱遂令守要禦衝嘗在寡弱之軰冦戎每至力勢不支入壘者纔足閉闗在野者悉遭刼執恣其芟蹂盡其捜毆比及都府聞知虜已克獲旋返耳安邊之本所切在兵若斯可謂措置乖方矣賞以存勸罰以示懲勸以懋有庸懲以威不恪故賞罰之於馭衆也猶繩墨之於曲直權衡之揣重輕輗軏之所以行車衘勒之所以服馬也馭衆而不用賞罰則善惡相混而能否莫殊用之而不當功過則姦妄寵榮而忠寔擯抑夫如是若聰明可衒律度無章則用與不用其弊一也自頃權移於下柄失於朝將之號令既不克行之於軍國之典章又不能施之於將務相遵飬茍度歲月欲賞一有功飜慮無功者反側欲罰一有罪復慮同惡者憂虞罪以隠忍而不彰功以嫌疑而不賞姑息之道乃至於斯故使忘身効節者獲誚於華夷率衆先登者取怨於士卒僨軍蹙國者不懷於愧畏緩救失期者自以為智能褒貶既闕而不行稱毁復紛於相亂人雖欲善誰為為之况又公忠者直已而不求於人反罹困厄敗撓者行􅀻而茍媚於衆例獲優崇此義士所以動心勇夫所以觧體也又有遇敵而所守不固陳謀而其效靡成將帥則以資糧不足為憂有司復以供給無闕為觧既相執証理合辨明朝廷每為含糊未甞窮䆒曲直措理者吞聲而靡訴誣善者罔上而不慙馭衆若斯可謂課責􅉻度矣課責􅃜度措置乖方將不得竭其材卒不得盡其力屯集雖衆戰陣莫前虜每越境横行若渉無人之地逓相推倚無敢誰何虗張賊勢上聞則曰兵少不敵朝廷莫之省察唯務徴發益師無禆備禦之功重增供億之弊閭井日耗徴求日繁以編戸傾家破産之資兼有司𣙜鹽税酒之利摠其所入半以事邉制用若斯可謂財匱於兵衆矣今四夷之最盛彊為中國甚大者莫大於吐蕃以吐蕃舉國勝兵之徒纔當中國十數大郡而已其於内虞外備亦與中國不殊所能冦邉數則蓋寡且又器非犀利甲不堅完識迷韜鈐藝乏趫敏動則中國畏其衆而不敢抗静則中國憚其彊而不敢侵厥理何哉良以中國之節制多門蕃醜之統帥専一故也夫統帥專則人心不分人心不分則號令不二號令不二則進退可齊進退可齊則疾徐如意疾徐如意則機㑹靡愆機㑹靡愆則氣勢自壯斯乃以少為衆以弱為彊變化翕闢在於股掌之内如臂之使指心之制形若所任得人則何敵之有失節制多門則人心不一人心不一則號令不行號令不行則進退必難進退必難則疾徐失宜疾徐失宜則機㑹不及機㑹不及則氣勢自衰斯乃勇廢為尫衆㪚為弱逸撓離析兆乎戰陣之前是猶一國三公十羊九牧欲令齊肅其可得乎開元天寶之間控禦西北兩蕃唯朔方河西隴右三節度而已猶慮權分勢㪚或使兼而領之中興以來未遑外討僑𨽻四鎮於安定權附隴右於扶風所當西北兩畨亦朔方涇原隴右河東四節度而已闗東戍卒至則屬焉雖委任未盡得人而措置尚存典制自頃逆泚誘涇隴之衆叛懷光汙朔方之軍割裂誅鋤所餘無㡬而又分朔方之地建牙擁節者凡三使焉其餘鎮軍數且四十皆承特詔委寄各䧏中貴監臨人得抗衡莫相禀屬每俟邉書告急方令計㑹用兵既無兵法下臨惟以客禮相待是乃從容拯溺揖讓救焚兾無阽危固亦難矣夫兵以氣勢為用者也氣聚則盛散則消勢合則威析則弱今之邊兵勢弱氣消建軍若斯可謂力分於將多矣理戎之要取在均濟故軍法無貴賤之差軍寔無多少之異是將所以同其志而盡其力也如或誘其志意勉其藝能則當閲其材程其勇較其勞逸度其安危明申練覈優劣之科以為衣食等級之制使能者企及否者息心雖有薄厚之殊而無觖望之釁蓋所謂日省月試餼禀稱事如權量之無情於物萬人莫不安其分而服平也今者窮邊之地長鎮之兵皆百戰傷夷之餘終年勤苦之劇角其所能則練習度其所處則孤危考其服役則勞察其臨敵則勇然衣糧所給唯止當身例為妻子所分常有凍餒之色而闗東戍卒嵗月踐更不安危城不習戎備怯於應敵懈於服勞然衣糧所頒優厚踰等繼以茶藥之饋益以蔬醬之資豐約相形懸絶斯甚又有素非禁旅本是邊兵將校詭為媚詞因請遙𨽻神䇿不離舊所唯改虗名其於廪賜之饒遂有百倍之益此儔類所以忿恨忠良所以憂嗟疲人所以流亡經費所以偏匱夫事業未異而給養有殊人情之所不能甘也况乎矯妄行而廪賜厚績藝劣而衣食優人未􅁯懷孰能無愠不為戎首則已可嘉而欲使其叶力同心以攘冦難雖有韓白孫吳之將臣知必不能焉飬士若斯可謂怨生於不均矣凡欲選任將帥必先考察行能然後指以所授之方語以所委之事令其自揣可否自陳規模湏某色甲兵藉某人參佐要若干士馬用若干資糧某處置軍某時成績始終要領悉俾經綸於是觀其計謀較其聲實若謂材無足取言不可行則當退之於初不宜貽慮於其後也若謂志氣足任方略可施則當要之於終不宜掣肘於其間也夫如是則疑者不使使者不疑勞神於選才端拱於委任既委其事既足其求必然可以覈其不臧行其賞罰受賞者不以為濫當罰者無得而辭付授之柄既專茍且之心自息是以古之遣將帥者君親推轂而命之曰自閫已外將軍裁之又賜鈇鉞亦令專斷故軍容不入國國容不入軍將在軍君命有所不受誠謂機宜不可以逺決號令不可以兩從未有委任不專而望其克敵成功者也自頃邊軍去就裁斷多出宸𠂻選置戎臣先求易制多其部以分其力輕其任以弱其心雖有所懲亦有所失遂令分閫責成之義廢死綏任咎之志衰一則聽命二亦聽命爽於軍情亦聽命乖於事宜亦聽命若所置將帥心取於承順無違則如斯可矣若有意平􅇯靖難則不可夫兩境相接兩軍相持事機之來間不容息蓄謀而俟猶恐失之臨時始謀固已疎矣况乎千里之逺九重之深陳述之難明聽覽之不一欲其事無遺䇿雖聖者亦有所不能焉設使謀慮能周其如權變無及戎虜馳突迅如風飈驛書上聞旬月方報守土者以兵寡不敢抗敵分鎮者以無詔不肯出師逗遛之間冦已奔逼託於救援未至各且閉壘自全牧馬屯牛鞠為椎剽嗇夫譙婦罄作俘囚雖詔諸鎮發兵唯以虗聲應援互相瞻顧莫敢遮邀賊既縱掠退歸此乃陳功告㨗其敗䘮則减百而為一其擒獲則張百而成千將帥既幸於摠制在朝不憂於罪累陛下又以為大權繇已不䆒事情用師若斯可謂機失於遙制矣理兵而措置乖方馭將而賞罰􅃜度制用而財匱建兵而力分飬士而怨生用師而機失此六者疆塲之蟊賊軍旅之膏盲也蟊賊不除而但滋之以糞溉膏盲不療而茍㗖之以滑甘適足以養其害速其災欲求稼穡豐登膚革充羙固不可得也臣愚請宜罷諸道將士畨替防秋之制率因舊數而三分之其一分委本道節度使募少壯願住邊城者以徙焉其一分則本道但供衣糧委闗内河東諸軍州募蕃漢子弟願傳邊軍者以給焉又一分亦令本道但出衣糧如給應募之人以資新徙之業又令度支㪚於諸道和市耕牛兼顧召工人就諸軍城繕造器具募人至者每家給耕牛一頭又給田農水火之器皆令充備初到之歳與家口二人糧并賜種子勸人播植待經一稔俾自給家若有餘糧官為收糴各酬倍價務奬營田既息踐更徴發之煩且無幸災茍免之弊㓂至則人自為戰時至則家自力農是乃兵不得不彊食不得不足與夫倐來忽徃豈可同等而論哉臣又謂宜擇文武能臣一人為隴右元帥應涇隴鳳翔長武城山南西道等節度管内兵馬悉以屬焉又擇一人為朔方元帥應鄜坊邠寜靈夏等節度管内兵馬悉以屬焉又擇一人為河東元帥河東振武等節度管内兵馬悉以屬焉三帥各選臨邊要㑹之州以為理所見置節度有非要者隨所便近而併之唯元帥得置統軍餘竝停罷其三帥部内太原鳯翔等府及諸郡戸口稍多者慎㨂良吏以為尹守外奉師律内課農乗俾為軍糧以壯戎府理兵之宜既得選帥之授既明然後减姦濫虚浮之費以豐財定衣糧等級之制以和衆引委任之道以宣其用懸賞罰之典以考其成而又慎守中國之所長謹行當今之所易則八利可致六失可除如是夷狄不威懐疆塲不寜謐者未之有也諸侯軌道庶類服從如是而教令不行天下不理者亦未之有也以陛下之英鑒人心之思安四方之小休两冦之方静加以頻年豐稔所在積糧此皆天賛國家可以立制垂統之時也時不乆居事不常兼已過而追雖悔無及明主者不以言為罪不以人廢言罄陳狂愚惟所省擇帝極深嘉納優詔褒美之九年三月辛酉將城監州詔曰設險守國易象垂文有備無患先王令典况修復舊制安國封疆按甲息兵必於在此監州地當衝要逺介朔陲東達銀夏西援靈武宻邇延慶保捍王畿乃者城池失守制備無據千里亭障烽燧不接三隅要害役戍其勤若非興集師徒繕修璧壘設攻守之具務耕戰之方則封内多虞諸華屢警由中及外皆靡寜居深惟永圗豈忘終食顧以薄徳至化未孚既不能復前古之封致四夷之守與其臨事而重擾豈若先備而即安是用𢎞乆逺之謀修五原之壘使邊城有守中夏克寜不有暫勞孰能永逸宜令左右神䇿軍及朔方河中綘邠寜慶兵馬副元帥渾瑊朔方􅂕監豐夏綏銀節度都統杜希全邠寜節度使張獻甫左神䇿行營節度使邢君牙夏綏銀節度使韓潭鄜坊丹延節度使王栖曜振武麟勝節度使范希朝各於所部簡擇馬歩將士合三萬五千人同赴監州左神䇿將軍兼御史中丞張昌宜充右神䇿軍監州行營節度使權知監州刺史兼御史大夫杜彦光可監州刺史兼御史大夫應所板築及緣修城雜役等宜共取六千人充其餘將士皆列布營陣戒嚴設備明加斥候以警不虞其修城板築功役將士各賜絹布有差其監州防秋將士三年滿與代更加給賜仍委杜彦光具名聞奏悉與改轉其防遏將士等畢事便令旋歸仍賜布帛有差其諸軍吏士都賜帛七千匹朕情非為已志在靖人咨爾將相之臣忠良之士輸誠奉國陳力􅁯勞克茂功勲永安疆埸必集兵事實惟衆心各相率勵以副朕意貞元三年監州為吐蕃所䧟毁其城而去自是塞外無保障靈武勢隔西逼鄜坊甚為邊患故命城之二旬而畢又詔兼御史大夫屯子遂統兵五千兼御史中丞史履澄杜彦光之衆戍之是役也帝念將士之勞厚令度支供給又詔涇原劔南山南諸軍深討吐蕃以分其力繇是板築之際虜無犯塞者及畢中外咸稱賀焉十三年正月辛夘鳳翔邢君牙奏請於隴州西七千里平戎川築城以備西戎名永信城壬寅吐蕃賛普遣使農索昔賫表請修和好邊將以聞帝以其􅉘狼之心數負㤙背約不受表狀任其使却歸十七年七月戊寅吐蕃㓂監州己丑䧟麟州詔西川節度韋臯分遣偏將勒歩騎二萬出成都西山南北九道竝進逼棲雞老翁故維州保州松州諸城以紓北邊故也憲宗元和元年秋七月壬辰朔宰臣杜佑上疏曰伏見近者黨項與西戎潜通屢有降人指陳事跡而公􅀸廷議以為誠當謹兵謂戎侵軼益發甲卒邀其㓂暴此盖未達事機匹夫之常論耳夫蠻夷狷夏唐虞已然周宣中興獫狁為害但命南仲徃城朔方驅之太原及境而止誠不欲弊中國怒逺夷也秦平六國恃其兵力北築長城以拒匈奴西逐諸𦍑出于塞外勞力擾人結怨階亂中國未静白徒競起海内雲擾實生謫戍漢武因文景之富命將興師遂至户口减半竟下哀痛之詔罷田輪臺前史書之尚嘉其迷而後復蓋聖王之理天下也唯務綏静蒸人西至流沙東漸于海惟南與北亦存聲教不以逺物為珍匪求遐方入貢豈疲内而事外終得少而失多故前代納忠之臣竝有佐君之議淮南王請息師於閩越賈捐之願棄地于朱崖安危利害高懸前史昔馮奉世矯漢帝之詔擊莎車傳其王首於京師威振西域宣帝大悦議加爵土之賞蕭望之獨以為矯制違命雖有功效不可為法恐後之奉使者争遂發兵馬為國家生事述理明白其言遂行國家自天后已來突厥黙啜兵彊氣勇屢㓂邉城為害頗甚開元初邊將郝靈佺親捕斬之傳首闕下自以為功代莫有二坐望寵爵宋璟為相慮武臣邀功為國生事止授以郎將繇是訖開元之盛無人復議開邊中國遂寕外夷亦静此皆成敗可徴鑒戒非逺且黨項小蕃雜處中國本懐我德當示撫綏間者邉將非亷亟有侵刻或利其善馬或取其子女使賄方物徴為役徒怨苦既多叛亡遂起或與北狄通使或與西戎㓂邊有為使然固當懲革傳曰逺人不服則修文徳以來之管子有曰國家無使勇猛為邉境此誠聖哲識㣲知著之逺略也今戎醜方強邊備未實誠宜慎擇良將誡之完葺使保誠信絶其求取用示懐柔來則懲禦去則謹備自然彼懐我徳革其姦謀何必遽圖興師坐致勞費陛下上聖至仁覆育群類動必師古謀無不臧伏望堅保永圖置兵袵席天下幸甚臣識昧經綸學非博䆒竊鼎鉉之寵任為朝廷之老臣㤙深莫倫志懇思報臧否備閲芻蕘上陳有黷旒扆伏深惶悚帝深嘉納之三年正月庚子以將城臨涇詔麟遊靈臺良原崇信歸化等五鎮並修整士馬犄角相應從涇原節度使段祐之請也臨涇城直涇州西北九十里寔險要之鎮從前因循不修嘗為犬戎所保其界有青石嶺嶺多羙士每每軍人耕穫屢為蕃㓂掠奪祐請修築議者是非相半祐决城之功畢時方以為大利八年七月以中受降城及所管騎士一千一百四十人領于天徳軍十月辛丑以普潤鎮兵四千人割屬涇原節度使寅分靈武道塩州𨽻夏州自夏州至豐州初置八驛先是廻鶻自部落南過磧取西城防禦使周懷義表至朝廷大恐以為回鶻聲言討吐蕃意是入㓂宰臣李吉甫以為回鶻入㓂且當漸絶和事不應便來犯邊但須設備不足為慮因請自夏州至天徳軍置發館一十一所以通緩急又請發夏州騎士五百人營於經略故城應援驛使兼䕶黨項帝悉從之九年五月庚申勅天寶中宥州寄理於經略軍寶應已後因循遂廢繇是昆夷屢擾黨項靡依蕃部之人撫懐莫及朕方𢎞逺略思復舊規宜於經略軍置宥州仍為上州在郭下置延思縣為上縣属夏綏銀觀察使時宰臣李吉甫又上言國家舊置六胡州在􅂕鹽界内開元中廢六州置宥以寛有為名領諸降戸天寶末宥州寄理於經略軍蓋以地形居中可以總統蕃部北以應接天徳南援夏州今經略頴􅂕又不置軍鎮非舊制也於是復置宥州理經略軍十五年正月乙未以邠寜節度使李光顔充都勾當修築鹽州城及防遏等使鹽州刺史李文悦為副九月癸丑麟坊奏發兵百人赴寨門防擬十月吐蕃入冦東川節度使王涯上言臣當道出軍經入賊腹背有兩路一路從龍州清川鎮入吐蕃界直抵故松州城是吐蕃舊置節度之所一路從綿州威蕃柵入蕃界直抵栖雞城是吐蕃險要之地涯又陳備禦吐蕃事宜曰臣伏見今天下無犬吠之警海内同覆盂之安每蕃戎一警則中外咸震至陛下有旰食軫懐之憂斯乃臣等居大官受重寄者之深責也雖承詔發卒心馳冦庭其於為國討除使戎人創艾晝夜思忖何補涓毫所以慺慺愚心願一陳竭臣觀自古長䇿昭然可徴在於實邊兵選良將明斥候廣資儲杜其姦謀除其走集此朝之士大夫皆知不獨㣲臣知之只在舉行之耳然臣愚見所及猶欲布靈著誠願陛下不愛金帛之費以釣北虜之心臨遣信臣與之定約曰犬戎悖亂負恩為邊鄙患者數矣能南制而伏之者唯在北蕃如能發而深入殺若干人取若干地則受若干之賞開懷以示之厚利以喻之所以勸聳要約者異於他日殊甚則匈奴之鋭可得屈也一戰之後西戎力衰然後選練驍雄乗便剪㓕此誠制戎之一竒也册府元龜卷九百九十三
