body:
  text: 册府元龜卷七百三宋王欽若等撰令長部教化感化勸課教化傳著格恥之論雅有胥傚之訓盖邑宰之任風化之所出焉有社稷之守有人民之衆施于為政足以成俗乃有示之禮讓陳之徳義推之以誠信朂之以仁厚躬行儉約以戒奢侈興隆學校以尚經術責己以息其訟隨方以勸其善繇是俗化斯革政事惟醇貪暴用悛親黨咸睦下以無爭人不忍欺至于道不拾遺耕者讓畔斑白不挈弦誦相聞者盖有之矣頌曰懷我好音班固亦云廩廪庶㡬徳讓君子之遺風者皆斯之謂也魯孔子為中都宰一年四方皆則仲繇字子路為蒲大夫三年孔子過之入其境而善之曰繇乎恭敬以信矣入其邑曰善哉繇乎忠信以寛矣至其庭曰善哉繇乎明察以斷矣子貢執轡而問曰夫子未見繇而三稱善可得聞乎孔子曰我入境田疇草萊甚辟此恭敬以信故民盡力入其邑墉屋甚尊樹木甚茂此忠信以寛其民不偷入其庭甚閒此明察以斷故民不擾也言􅅯字子游為武城宰孔子之武城聞弦歌之聲莞爾而咲曰割鷄焉用牛刀言治小國何須用大道子游曰昔者􅅯也聞諸夫子曰君子學道則愛人小人學道則易使道謂禮樂也樂以和人人和則易使孔子曰二三子謂從行者偃之言是也前言戲之耳戲治小而用大道宓子賤治單父恐魯君聽䜛令己不得行術將行請迎史二人俱至單父使其書將書宓子掣其肘書不善則怒史患之請歸報魯君太息曰宓子以此諌寡人也乃令告宓子曰自今以來單父非寡人之有也子有之也有便于人者决之五歳而言其要宓子敬諾得行其術三年巫馬期往而觀化于單父見夜漁者得則舍之期歸告孔子曰宓子之徳化至矣使民闇行若有嚴刑于旁敢問何以至于此孔子曰丘嘗與言曰誠乎此者形乎彼宓子必行此術也髙柴字子臯一作子羔為成宰初成人有其兄死而不為衰者聞子臯將為成宰遂為衰成人曰蠶則績而蟹有筐范則冠而蟬有緌兄則死而子臯為之衰􅅓兄死者言其衰之不為兄死如蟹有筐蟬有緌不為蠶之績范之冠也范蜂也蟬蜩也緌謂蜩啄長在腹下也魏西門豹為鄴令倉無積粟府無儲錢兵甲官無計㑹人數言其過于文侯文侯身往行其縣果若人言文侯曰翟黄任子治鄴大亂子能變道則可不能將加誅于子西門豹曰王主富民覇主富武亡國富府庫今君欲為覇者也臣敢為績于民君以臣請先登皷之甲兵粟米可立具也乃登城而皷之致甲笴甲鎧笴箭矢也操兵弩而出再皷服㨗載粟米而出服駕出而㨗檐文侯曰罷之西門豹曰信非一日積也一舉而欺之其後不可復用也燕嘗侵魏八城臣請北擊之以復侵地遂舉兵擊燕復地而後反後漢卓茂為密令勞心諄諄視人如子舉善而教口無惡言吏人親愛而不忍欺之人嘗有言部亭長受其米肉遺者茂辟左右問之曰亭長為從汝求乎為汝有事囑之而受乎將平居自以恩意遺之乎人曰往遺之耳茂曰遺之而受何故言耶人曰竊聞賢明之君使人不畏吏吏不欺人今我畏吏是以遺之吏既卒受故來言耳茂曰汝為敝人矣凡人所以貴于禽獸者以有仁愛知相敬事也今鄰里長老尚致餽遺此乃人道所以相親况吏于民乎吏顧不當乘威力彊請求耳凡人之生羣居雜處故有經紀禮義以相交接汝獨不欲修之寧能髙飛逺走不在人間邪亭長素善吏歳時遺之禮也人曰茍如此律何故禁之茂笑曰律設大法禮順人情今我以禮教汝汝必無怨惡以律治汝何所措其手足乎一門之内小者可論大者可殺也且歸念之于是人納其訓吏懷其恩初茂到縣有所廢置吏人笑之鄰城聞者皆􅅓其不能河南郡為置守令茂不為嫌理事自若數年教化大行道不拾遺魯恭為中牟令專以徳化為治不任刑罰訟人許伯等爭田累守令不能决恭為平理曲直皆退而自責輟耕相讓亭長從人借牛而不肯還之牛主訟于恭恭召亭長勑令歸牛者再三猶不從恭嘆曰是教化不行也欲觧印綬去掾史泣涕共留之亭長乃慚悔還牛詣獄受罪恭貰不問貰寛貸也于是吏人信服劉寵為東平陵令是時民俗奢泰寵到官躬儉訓民以禮上下有序都鄙有章宋均為辰陽長其俗少學者而信巫鬼均為立學校禁絶淫祀人皆安之後為上蔡令時府下記禁人䘮塟不得侈長禁之不得奢侈有餘均曰夫送終踰制失之輕者今有不義之民尚未循化而遽罰過禮非政之先竟不肯施行賈彪為新息長小民困貧多不養子彪嚴為其制與殺人同罪城南有盗刼害人者北有婦人殺子者彪出按法而掾吏欲引南彪怒曰賊冦害人此則常理母子相殘逆天違道遂驅車北行按騐其罪城南賊聞之亦靣縳自首數年間人養子者千數僉曰賈父所長生男名為賈子生女名為賈女呉祐為膠東侯相政惟仁簡以身率物民有爭訴者輙閉閣自責然后斷其訟以道譬之或身到閭里重相和觧自是之後爭隙省息吏人懷而不欺嗇夫孫性私賦民錢市衣以進其父父得而怒曰有君如是何忍欺之促歸伏罪性慚懼詣閣持衣自首祐屏左右問其故性具談父言祐曰掾以親故受汚穢之名所謂觀過斯知仁矣使歸謝其父還以衣遺之劉矩為雍丘令以禮讓化之其無孝義者皆感悟自革民有爭訟矩嘗引之於前提耳訓告以為忿恚可忍縣官不可入使歸更尋思訟者感之輙各罷去又有路得遺者皆推尋其主楊仁為什邡令寛惠為政勸課掾史弟子悉令就學其有通明經術者顯之右署右署上司或貢之朝由是義學大興陳寔為太丘長修徳清靜百姓以安鄰縣人歸附者寔輙訓導譬觧發遣各令還本縣司官行部吏慮有訟者白欲禁之寔曰訟以求直禁之理將何申其勿有所拘司官聞而歎息曰陳君所言若是豈有怨於人乎亦竟無訟者劉梁為北新城長告縣人曰昔文翁在蜀道著巴漢庚桑瓚𨽻風移碨磥吾雖小宰猶有社稷苟赴期㑹理文墨豈本志乎乃更大作講舍延聚生徒數百人朝夕自往勸戒躬執經卷試策殿最儒化大行此邑至後猶稱其教焉仇覽為蒲亭長勸人生業農事既畢乃令子弟羣居還就黌學其剽輕游恣者皆役以田桑嚴設科罰躬助䘮事賑䘏窮寡朞年稱其大化覽初到亭人有陳元者獨與母居而母詣覽告元不孝覽驚曰吾近日過舍廬落整頓耕耘以時此非惡人當是教化未極至耳母守寡養孤苦身投老奈何肆忿於一朝欲致子以不孝乎母聞感悔涕泣而去覽乃親到元家與其子母飲因為陳人倫孝行譬以禍福之言元卒成孝子一曰覽為縣陽遂亭掾好行教化部人羊元凶惡不孝其母詣覽言元覽呼元誚責元以子道與一卷孝經使誦讀之元深改悔到床下謝罪曰元少孤為母所驕諺曰孤犢觸乳驕子罵母乞自改母子更相向泣於是元遂修孝道後成佳士鄉邑為之諺曰父母何在在我庭化我鴟梟哺所生鍾離意為瑕丘令吏有檀建者盗竊縣内意屏人問狀建叩頭服罪不忍加刑遣令長休建父聞之為建設酒謂曰吾聞無道之君以刅殘人有道之君以義行誅子罪命也遂令建進藥而死童恢為不其令吏人有犯違禁法輙隨方曉示若吏稱其職人行善事者皆賜以酒餚之禮以勸勵之耕織種收皆有條章一境清靜牢獄連年無囚比縣流人歸化徙居二萬餘户劉平為全椒令掾吏五日一朝罷門䦨卒署各遣就農人懷感至或増貲就賦或减年從役刺史行部獄無囚徒民各自以為職不知所問惟頒詔書而已魏鄭渾歴下蔡長邵陵令天下未定民皆剽輕不念産殖其生子無以相活率皆不舉渾所在奪漁獵之具課使耕桑又兼開稻田重去子之法民初畏罪後稍豐給無不舉贍所育男女多以鄭為字趙儼為朗陵令縣多豪猾無所畏忌儼取其尤㝡者收縛案騐皆得死罪儼既囚之乃表府觧放自是威恩並著司馬朗為堂陽長其治務寛惠不行鞭杖而民不犯禁先時民有徙充都内者後縣調當作船徙民恐其不辦乃相率私還助之其見愛如此髙柔為管長縣中素聞其名姦吏數人皆自引去柔教曰昔邴吉臨政吏嘗有非猶尚容之况此諸吏於吾未有失乎其召復之咸還皆自勵咸為佳吏蜀董和字幼宰劉璋以為成都令蜀土富實時俗奢侈貨殖之家侯服王食婚姻葬送傾家竭産和躬率以儉惡衣蔬食防遏踰僣為之軌制所在皆移風變善畏而不犯晉杜軫為建寧令導以徳政風化大行夷夏悦服唐彬為鄴令道徳齊禮朞月化成范甯為餘杭令在縣興學校養生徒㓗己修禮志行之士莫不往宗之朞年之後風化大行自中興以來崇學敦教未有如甯者也江道為太末令縣界深山中有亡命數百家恃險為阻前後守宰莫能平道到官召其魁帥厚加撫接諭以禍福旬月之間襁負而至朝廷嘉之宋孔欣之為武康令時呉興人沈道䖍居石山下鄉里年少相率受學道䖍嘗無食以給學徒欣之厚相資給受業者咸得有成梁裴子野為諸暨令在縣不行鞭罰民有爭者示之以理百姓稱悦合境無訟後周辛昻為成都令到縣便與諸生祭文翁學堂因共歡宴謂諸生曰子孝臣忠師嚴友信立身之要如斯而已若不事斯語何以成名宜自勉克成令譽昻言切理至諸生等深感悟歸而告其父老曰辛君教誡如此不可違之於是井邑肅然咸從其化隋劉曠開皇初為平鄉令單騎之官人有爭訟者輙丁寧口曉以義理不加繩劾自各引咎而去所得俸祿賑施窮乏百姓感其徳化更相篤勵曰有君如此何得為非在職七年風教大治獄中無繫囚爭訟絶息囹圄盡皆生草庭可張羅郎茂為衛國令有民張元預與從父弟思蘭不睦承尉請加嚴法茂曰元預兄弟本相憎疾又坐得罪彌益其忿非化民之意也於是遣縣中耆舊更往敦諭道路不絶元預等各生感悔詣縣頓首請罪茂曉之以義遂相親睦稱為友悌唐髙智周常州晉陵人髙宗朝舉進士補費縣令與丞尉均分俸錢政化大行人刋石以頌之韋景駿開元中為肥鄉令縣人有母子相訟者景駿謂之曰吾少孤每見人養親自痛終天無分汝幸在温凊之地何得如此錫類不行令之罪也因垂泣嗚咽乃取孝經與之令習讀於是母子感悟自請改悔遂稱慈孝馮伉貞元中為醴泉令患百姓多昏猾為著諭家十四篇大指明忠孝仁義勸學務農每鄉給一卷俾其傳習感化夫寄百里之命布一同之政既惠愛以臨民必誠心而待物則有民懷感而附徳物反妖而為瑞是以獸出其境鳳集于庭雉馴蝗散㓕火反風感化所至其道可見書曰徳惟善政政在養民斯之謂也後漢卓茂初為密令時天下大蝗河南二十餘縣皆被其災獨不入密縣界督郵言之太守不信自出案行見乃服焉劉昆以光武建武五年為江陵令時縣連年火災昆輙向火叩頭多能降雨止風謝夷吾為壽張令明帝永平十五年蝗發泰山流徙郡國荐食五榖過壽張界飛逝不集鄭引為騶令勤行徳化部人王逢等得路遺寶物縣於道衢求主還之魯國當春大旱五榖不登騶獨致雨偏熟永平十五年蝗起泰山流被郡國過騶界不集郡因以狀聞詔不以為然遣使案行如言也戴封為西華令時汝潁有蝗災獨不入西華界時督郵行縣蝗忽大至督郵其日即去蝗亦頓除一境竒之其年大旱封禱請無獲乃積薪坐其上以自焚火起而大雨暴至於是逺近歎服楊統章帝建初中為彭城令一州大旱統推隂陽消伏縣界蒙澤在縣休徴時序風雨得節嘉禾生於寺舍人庶稱神也魯恭為中牟令建初七年郡國螟傷稼犬牙縁界不入中牟河南尹袁安聞之疑其不實使仁恕掾肥親往㢘仁恕掾主獄屬河南尹㢘察也恭隨行阡陌俱坐桑下有雉過止其傍傍有童兒親曰兒何不捕之兒言雉方將雛親瞿然而起與恭訣曰所以來者欲察君之政迹耳今蟲不犯境此一異也化及禽獸此二異也竪子有仁心此三異也以留徒擾賢者耳還府具以狀白安是歳嘉禾生恭便坐廷中便坐於便側之處非正室也恭㢘不矜功封以言府府即奏上尹以檄勞曰君以名徳久屈中牟樂産之化流行天降休瑞應行而生尹甚嘉之安因上書言狀章帝異之公沙穆為𢎞農令縣界有螟蟲食稼百姓惶懼乃設壇謝曰百姓有過罪穆之由請以身禱於是暴雨不經日既霽而螟蟲自消百姓稱曰神明童恢為不其令民嘗為虎所害乃設檻捕之獲二虎恢聞而出呪虎曰天生萬物惟人為貴虎狼當食六畜而殘暴於人王法殺人者死傷人則論法汝若是殺人者當垂頭服罪自知非者當號呼稱寃一虎低頭閉目狀如震懼即時殺之其一視恢鳴吼踴躍自奮遂令放釋吏人為之歌頌韓稜字伯師為下邳令視事未朞吏民愛慕時鄰縣皆雹傷稼惟下邳界獨無王阜字世公為重泉令吏民向化鸞鳥集止學宫阜使校官掾長沙疊為張雅樂擊磬鳥舉足垂翼應聲而舞翺翔復上縣庭屋十餘日乃去劉平為全椒令先是縣多虎為害平到修政選進儒良退黜貪殘視事三月虎皆渡江而去陳曄字文鍾為卒令有惠政桑旅生二萬餘株民以自給劉虞為博平令治政推平髙尚純樸境内無盗賊災害不生時鄰縣接壤蝗蟲為害至博平界飛過不入南齊夏侯恭叔為竟陵令惠化大行木連理上有光如燭咸以善政所致梁庾黔婁仕齊為編令治有績先是縣境多虎暴黔婁至皆渡往臨沮界當時以為仁化所感陳司馬申宣帝太建九年除秣陵令在職以清能見紀有白雀巢于縣庭唐元徳秀為魯山令部人為盗吏捕之繫獄㑹縣界有猛獸為暴盗自陳曰願格殺猛獸以自贖徳秀許之猾吏曰盗詭計茍免擅放官囚無乃累乎徳秀曰吾不欲負約累則吾坐必請不及諸君即破械出之翼日格猛獸而還誠信化人大率此類晉趙􅆳為壽張令髙祖天福四年閏七月詔􅆳考滿之外量留年以飛蝗避境故也勸課夫百里之長教乃居先四民之業農為之首俾盡力乎樹藝在以時而敦朂若乃嚴制科令篤勸生業雖果菜之細鷄豕之㣲咸有名數以為程課所以風化振舉户口繁多靡不由此者也所謂勸穡以固本原生以利人斯之謂矣後漢仇覽為蒲亭長勸人生業為制科令至於果菜為限鷄豕有數魏楊沛字孔渠為新鄭長興平禾人饑窮沛課民益蓄乾椹收䔇豆閲其有餘以補不足如此積得千餘斛藏在小倉㑹太祖為兖州刺史西迎天子所將千餘人皆無糧過新鄭沛謁見乃皆進乾椹楊仁為什邡令墾田千餘頃邢顒為行唐令勸民農桑風化大行呉陸遜為海昌屯田都尉并領縣事縣連年荒旱遜開倉榖以賑貧民勸督農桑百姓䝉頼晉竇允字文雅始平人為浩亹長勤於為政勸課田蠶平均調役百姓頼之梁姚察為原鄉令時邑境蕭條流亡不及察輕其賦役勸以耕種於是户口殷盛民至今稱焉沈瑀為建徳令教民一丁種十五株桑四株柿及梨栗女丁半之人咸勸悦頃之成林唐李大亮武徳初為土門令屬百姓饑荒大亮勸以墾闢歳因大稔冊府元龜卷七百三
