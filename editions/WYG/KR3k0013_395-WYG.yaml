body:
  text: 册府元龜卷三百九十五上宋王欽若等撰將帥部勇敢第二南齊張敬兒仕宋為寧蠻府行恭軍隨同郡人劉胡領軍伐襄陽諸山蠻深入險阻所向皆破又擊胡陽蠻官軍引退蠻賊追者數千人敬兒单馬在後衝突賊軍數十合殺數十人箭中左腋賊不能抗王廣之仕宋為寧朔軍主𨽻寧朔將軍劉懷珍征殷琰於壽春琰將劉從築壘拒守䑓軍相守移日琰遣長史杜叔寳領五千人運車五百乘援從懷珍遣廣之及軍主辛慶祖黄囘于道連等要擊於横塘寳結營拒戰廣之等鹵薄攻營自晡至日没大破之殺傷千餘人遂退燒其運車從聞之棄壘奔走王宜為屯騎校尉與黄囘同石顯之謀宜拳㨗善舞刀楯囘嘗使十餘人以水交灑不能著周山圖為振武將軍時鎮軍將軍張永征薛安都於彭城山圖領二千人迎軍至武原為虜騎所追合戰多所傷殺虜圍轉急山圖據城自固然後更結陣死戰突圍出虜披靡不能禁衆稱其勇呼為武原將周盤龍北蘭陵人也膽氣過人尤便弓馬隨軍討赭圻賊躬自鬪戰陷陣先登後為右將軍時魏寇淮陽圍南城盤龍子奉叔单馬率二百餘人結陣魏萬餘人張左右翼圍繞之一騎走還報奉叔已没盤龍方食棄筯馳馬奮矟直奔虜陣自稱曰周公來魏素畏盤龍驍名即披靡時奉叔已大殺敵得出在外盤龍不知乃衝東擊西奔南突北賊衆莫敢當奉叔見其父乆不出復躍馬入陣父子兩騎縈擾數萬人魏衆大敗盤龍父子繇是名播北國梁曹景宗為屯騎校尉督峴南諸軍事魏太武攻赭陽景宗為偏將衝堅陷陣輙有斬獲柳慶遠自高祖義兵起雍州以慶遠為征東長史從軍東下身先士卒韋放為尋陽太守高祖遣兼領軍曹仲宗等攻渦渦音戈陽以放為明威將軍帥軍㑹之魏大將費穆帥衆􅍕至放軍營未立麾下止有二百餘人放從弟洵驍果有勇力一軍所仗放令洵单騎擊刺屢折魏軍洵馬亦被傷不能進胄又三貫流矢衆皆失色請放突去放勵聲叱之曰今日唯有死耳乃免胄下馬據胡牀處分於是士皆殊戰莫不一當百魏軍遂退王珍國為左衛將軍魏任城王元澄寇鍾離高祖遣珍國為援問討賊方畧珍國對曰臣嘗患魏衆少不苦其多高祖壯其言乃假節與衆軍同討焉魏軍退班師馬仙琕為寧朔將軍天監四年王師北討仙琕每戰勇冠三軍當其衝者莫不摧破陳昕為文德主帥右衛仗主勑遣助防義陽魏豫州刺史堯雄北間驍將兄子寳樂特為勇敢昕父慶之圍懸瓠雄來赴寳樂求單騎校戰昕躍馬直趣寳樂雄即㪚潰仍陷溱城陳慶之為文徳主帥率軍二千送豫章王綜入鎮徐州後豫章王棄軍奔魏衆皆潰散諸將莫能制止慶之乃斬闗夜追軍士得全柳仲禮為司州刺史太清中侯景反陷東府城仲禮與衡州刺史韋粲皆赴援粲營壘未合為景所敗仲禮不遑胄甲與數十騎馳赴之遇賊交戰斬首數百投水死者千餘人仲禮深入人馬陷泥亦被重創自是賊不敢濟岸隂子春為信成將軍梁㤗二州刺史與右衛將軍徐文盛東討侯景至貝磯與景遇子春力戰嘗冠諸軍蕭嗣鄱陽王範之子也性驍果有膽畧倜儻不䕶細行而復傾身養士皆得死力範之薨也嗣猶㨿晉熙城中食盡士皆乏絶侯景遣任約攻嗣時賊方盛咸勸且行嗣按劍叱之曰今日之戰蕭嗣効命死節之秋及戰遇流矢中頸不許㧞帶箭手殺數人賊退方命㧞之應時氣絶妻子為任約所擒陳周文育字景德高祖之討侯景文育與杜僧明為前軍克蘭裕援歐陽頠皆有功高祖破蔡路養於南野文育為路養所圍四靣數重矢石雨下所乘馬死文育右手摶戰左手解鞍潰圍而出因與杜僧明等相得并力復進遂大敗之累遷智武將軍散騎常侍又高祖以侯瑱擁據温州命文育討之仍除都督南豫州諸軍事武威將軍南豫州刺史率兵襲湓城未克徐嗣徽引齊寇渡江據蕪湖詔徴文育還京嗣徽等列艦於青墩至於七磯以斷文育歸路及夕文育鼔噪而發嗣徽等不能制至旦反攻嗣徽嗣徽驍將鮑砰獨以小艦殿軍文育乗舴艋與戰跳入砰艦斬砰仍牽其艦而還賊衆大駭因留船蕪湖自丹陽歩上時高祖拒嗣徽於白城適與文育相㑹將戰風急高祖曰兵不逆風文育曰事急矣當決之何用古法抽槊上馬馳而進衆軍從之風亦尋轉殺傷數百人嗣徽等移營莫府山文育徙頓對之頻戰功最加平西將軍進爵壽昌縣公并給鼓吹一部蕭摩訶為巴山太守大建五年衆軍北伐摩訶隨都督吳明徹濟江攻秦郡時齊遣大將軍尉破胡等率衆十萬來援其隊有蒼頭犀角大力之號皆身長八尺膂力絶倫其鋒甚鋭又有西域胡妙於弓矢弦無虚發衆軍尤惮之及將戰明徹謂摩訶曰若殪此胡則彼軍奪氣君有闗張之名可斬顔良矣摩訶曰願示其形狀當為公取之徹乃召降人有識者云胡著絳衣樺皮裝弓兩端骨弭明徹遣人覘視知胡在陣乃自酌以飲摩訶摩訶飲訖馳馬衝齊軍胡挺身出陣前十餘歩彀弓未發摩訶遥擲銑鋧小鑿也立中其額應手而仆齊軍大力十餘人出戰摩訶又斬之於是齊軍退走九年明徹進圍宿豫軍吕梁與齊人遇摩訶率七騎先入手奪齊軍大旗齊衆大潰摩訶於語言恂恂長者至於臨戎對寇志氣奮發所向無前摩訶子世亷少警俊勇敢亦有父風魯廣逹都督南豫州諸軍事南豫州刺史華皎稱兵上流詔司空淳于量率衆軍進討軍至夏口皎舟師强盛莫敢進者廣逹首率驍勇直衝賊軍戰艦既交廣逹憤怒大呼登艦樓奬厲士卒足跌墮水沉溺久之因救得免樊毅為梁興太守領三州逰軍隨宜豐侯蕭循討陸納於湘州軍次巴陵營頓未立納濳軍夜至薄營大譟營中將士皆驚擾毅獨與左右數十人當營門力戰斬十餘級擊鼔申令衆乃定焉樊猛字智武㓜倜儻有幹畧既壯便弓馬膽氣過人在梁以戰功為威武將軍梁安南侯蕭方矩為湘州刺史以猛為司馬㑹武陵王蕭紀舉兵自漢江東下方矩遣猛率湘郢之卒隨都督陸法和進軍以拒之紀已下樓舩戰艦據巴江争峽口相持久之不能決法和揣紀師老卒墮因令猛率驍勇三千輕舸百餘乘衝流直上出其不意鼔譟薄之紀衆倉卒警駭不及整列棄艦登岸赴水死者以千數時紀心膂數百人猶在左右猛將部曲三千餘人蒙盾戈直登舟瞋目大呼紀侍衛皆披靡相枕籍不敢動手擒紀父子三人斬於艦中後魏長孫肥道武時為鎮遠將軍善策謀勇冠諸軍每戰嘗為士卒先前後征討未嘗失敗故毎有大難令肥當之于栗磾為冠軍將軍道武畋于白登山見熊領數子道武顧謂栗磾曰能縳之乎栗磾曰若縳之不勝豈不虚斃一壯士自可驅致御前坐而制之尋皆擒獲道武顧而謝之尉眷諾之長子也明元時為司衛監後征河南督高車騎臨陣衝突所向無前賊惮之來大千為内幢將嘗從明元校獵見虎在高巖上大千持矟直前刺之應手而死明元嘉其勇壯後從討赫連昌共長孫道生與賊交戰道生馬倒為賊所擊大千馳救衆散走大千扶道生上馬遂得免穆顗忠謹有材力明元時為中散轉侍御郎從太武征赫連昌勇冠一時太武嘉之後為龍驤將軍曽從太武畋於崞山有虎突出顗摶而獲之大武嘆曰詩所謂有力如虎顗乃過之乙瓌太武時為鎮南將軍瓌便弓馬善射手格猛獸膂力過人從駕南征除使持節都督前鋒諸軍事每戰身先士卒勇冠三軍呂温有文武材畧太武伐赫連昌以温為幢將先登陷陣每戰必捷以功拜宣武將軍奉車都尉源賀為征西將軍從太武臨江為前鋒大將賀為人雄果每遇强寇輙自奮擊帝戒之曰兵凶戰危不宜輕犯卿可運籌處分勿恃身力也又擊叛胡白龍及討吐京胡皆先登陷陣加平西將軍陸真代人也太武以真膂力過人拜内三郎數從征伐所在摧鋒陷陣宋將王𤣥謨衆數萬人寇滑臺真從太武討之夜與數人乘小舩突𤣥謨軍入城撫慰登城廵行賊營中乃還渡河至明𤣥謨敗走豆代田為内三郎從討赫連昌乘勝追賊人入其營門門閉代田踰營而出太武壯之拜為勇武將軍茍頺為中散太武南討以頺為前鋒都將每臨敵對戰常先登陷陣毛猛虎為散騎常侍獻文皇興中蠕蠕犯塞從獻文討之有武決之稱畢衆敬為寧南將軍年已七十鬢髮皓白而氣力未衰跨鞍馳騁有若少壯宇文福孝文時為武衛將軍從征南陽齊遣其尚書崔惠景黄門郎蕭衍率衆十萬來救孝文指麾將士勅福領髙車羽林五百騎出賊南面奪其橋道遏絶歸路賊衆大恐六道來戰福㨿鞍警衆身先士卒賊不得志遂大奔潰楊播為左將軍假前將軍隨孝文南討至鍾離師廻詔播領歩卒三千騎五百為衆軍殿時春水初長賊衆大至舟艦塞川播以諸軍渡淮未訖嚴陣南岸身自居後諸軍渡盡賊衆遂集於是圍播數重播乃為陳以禦之身自搏擊斬殺甚多相距再宿軍人食盡賊圍更急孝文在北而望之既無舟舩不得救援水勢稍减播領精騎三百歴其舩大呼曰今我欲渡能戰者出賊莫敢動遂擁衆而濟孝文甚壯之奚康生為柔𤣥鎮都將李兠前驅軍主頻陷陣壯氣有聞由是為宗子隊主後從駕鍾離駕旋濟淮五將未渡梁衆據渚邀斷津路孝文勅曰能破中渚賊者以爲直閣將軍康生時為軍主謂友人曰如其尅也得暢名績脱若不㨗命也在天丈夫今日何為不決遂便應募縳筏積柴因風放火燒其舩艦依烟直進飛刀亂砍投河溺死者甚多乃假康生直閣將軍傅永宣武初為揚武將軍中山王英之征義陽永為寜朔將軍綂軍當長圍遏其南門梁將馬仙琕連營稍進規解城圍永謂英曰㓙豎豕突意在決戰雅山形要宜早據之英沉呤未決永曰機者如神難過易失今日不往明朝必為賊有雖悔無及英乃分兵通夜築城於山上遣綂軍張懷等列陣於山下以防之至曉仙琕果至懷等戰敗築城者悉皆奔走仙琕乘勝直趨長圍義陽城人復出挑戰永乃分兵付長史賈思祖令守營壘自將歩軍千人南逆仙琕擐甲揮戈单騎先入唯有軍主蔡三虎副之餘人無有及者矣突陣横過賊射永洞其左股永拔箭復入遂大破之斬仙琕子仙琕燒營席卷而遁英於陣謂永曰公傷矣且還營永曰昔漢祖捫足不欲人知下官雖微國家一帥奈何使虜有傷將之名遂與諸軍追之極夜而返時年七十餘矣三軍莫不壯之趙遐為滎陽太守時齊將馬仙琕率衆攻圍胊城戍主傳文驥嬰城固守以遐為别將與劉思祖等救之次於鮑口去胊城五十里夏雨頻䧏厲渉長驅將至胊城仙琕見遐營壘未就徑來逆戰思祖率彭沛之衆望陣奔退遐孤軍奮擊獨破仙琕斬其直閣將軍軍主李魯生仙琕先分軍於胊城之西阻水别柵以圍固城遐身自潜行觀水深淺結草為筏銜枚夜進破其六柵遂釋固城之圍蕭寳夤為鎮東將軍南伐梁宣武正始元年三月寳寅行逹汝隂東城已陷遂停壽春之棲賢寺值賊將姜慶真内侵士民響附圍逼壽春遂據外郭寳夤躬貫甲胄率下擊之自四更交戰至明日申時賊旅彌盛時寳夤以衆寡無援退入金城又出相國東門率衆力戰始破走之當寳夤壽春之戰勇冠諸軍聞見者莫不壯之源懷為車騎大將軍時蠕蠕南寇宣武詔懷禦之又詔懷子直寢徽隨懷北行詔賜馬一匹細鎧一具禦矟一枚懷拜受訖乃於其庭跨鞍執矟躍馬大呼顧謂賓客曰氣力雖衰尚得如此蠕蠕雖畏壯輕老我亦未便可欺今奉廟勝之規總驍悍之衆足以擒其首帥獻俘闕下其時年六十一楊大眼為平東將軍大眼自為將帥常身先兵士衝突堅陣出入不疑當其鋒者莫不摧挫楊津孝明時為大都督時賊帥鮮于脩禮攻定州賊東面已入羅城刺史閉小城東門城中搔擾不敢出戰津欲禦賊長史許被守門不聽津手劍擊被不中被乃走津開門出戰斬賊帥一人殺賊數百賊退人心少安李崇為尚書令蠕蠕主阿那瓌率衆犯塞孝明詔崇以本官都督北討諸軍事以討之崇辭於顯陽殿戎服武飾志氣奮揚時年六十九幹力如少遂出塞三千餘里不及賊而還裴慶孫為員外散騎侍郎時汾州吐京羣胡薛悉公馬牒騰並自立為王聚黨作逆衆至數萬詔慶孫為募人别將招率鄉豪得戰士數千人以討之胡賊屢來逆戰慶孫身先士卒每摧其鋒遂深入至雲臺郊諸賊更相連結大戰郊西自旦及夕慶孫身自突陣斬賊主郭康兒賊衆大潰勅徵赴都除直後自是賊復鳩集北連蠡升南通綘蜀兇徒轉盛復以慶孫為别將從軹關入討至齊子嶺東賊帥范多范安族等率衆來拒慶孫與賊戰斬多首乃深入二百餘里至陽胡城賀拔岳孝莊時為衛將軍討万俟醜奴于闗中醜奴自率大衆圍岐州遣行臺尉遲菩薩等向武功南渡渭水爾朱天光遣岳率騎赴之岳身先士卒擊之退走賈智為都督𨽻大宰上黨王天穆征邢杲臨陣流矢屮胸仍戰不已源延伯為綂軍隨叔父子㳟西討戰必先鋒子㳟見其年㓜嘗訶制之而不能禁源子雍在夏州表乞兵援孝莊詔延伯率羽林一千人赴之城鬪野戰武勇冠三軍後遷龍驤將軍率領義衆還赴子雍共平黒城在􅀈棠橋戰先鋒陷陣身擒維摩及至白水首摧阿非隨子雍至都進爵浮陽伯增封百户爾朱兆孝閔時為柱國大將軍兆果於戰鬪每有征伐常居鋒首當時諸將伏其材力長孫子彥西魏出帝時為中軍大都督子彥少常墜馬折臂肘上骨起寸餘乃命開肉鋸骨流血數升言戯自若時以為踰於闗侯北齊彭樂為汨陽郡公肆州刺史從高祖西討與周文相拒神武欲緩持之樂氣奮請决戰曰我衆賊少百人取一不可失之也神武從之樂因醉入深被刺腸出内之不盡截去復戰身被數創軍勢遂挫不利而還神武每追論以戒之叚韶為親信都督韓陵之戰韶督率所部先鋒陷陣後從高祖禦周文帝於邙山高祖身在行間為西魏將賀拔勝所識率鋭來逼韶從傍馳馬引弓反射一箭斃其前驅追騎懾惮莫敢前者西軍退賜馬并金斛律光字明月金之子也少工騎射以武藝知名魏末從金征周文帝長史莫暉者時在行間光馳馬射中之因擒於陣光時年十七高祖嘉之即擢為都督薛孤延為車騎將軍從高祖西伐至蒲津竇泰於河南失利高祖班師延殿後且戰且行一日斫折刀十五口還轉梁州刺史高祖嘗閱馬於北牧道逢暴雨大雷震地前有浮圖一所高祖令延視之延乃馳馬按矟直前未至四十歩震火燒面延喝殺繞浮圖走火遂滅延還鬚眉及馬鬃尾皆燋高祖歎曰薛孤延乃能與霹靂鬪其勇決如此堯雄為二豫楊郢四州都督梁司州刺史陳慶之率衆逼州城雄出與戰所向披靡身被二創壯氣益厲慕容紹宗為徐州刺史侯景叛紹宗與大都督高岳討之諸將持疑無肯先者紹宗麾兵徑進諸將從之因而大捷景遂奔遁高昻魏孝莊時在郷里隂養壯士爾朱榮執送於晉陽禁於駞牛署後榮死孝莊即引見勞勉之時爾朱世隆還逼宫闕孝莊親臨大夏門指麾處分昻既免縲絏被甲横戈志凌勍敵乃與其從子長命等推鋒徑進所向披靡帝及觀者莫不壯之即除直閣將軍尋值京師不守乃㨿信都起義殷州刺史爾朱羽生濳軍來襲􅍕至城下昻不暇擐甲將十餘騎馳之羽生退走人情遂定至東魏孝靜初轉司徒時高祖方有事闗隴以昻為西南道大都督徑趨商雒山道峻隘為寇守險昻轉鬪而進莫有當其鋒者遂尅上洛獲西魏雒州刺史泉企并將帥數十人綦連猛為開府時突厥侵逼晉陽敕猛將三百騎覘賊逺近行至城北十五里遇賊前鋒以敵衆多遂漸退避時賊中有一驍將超出來闘猛遥見之即亦挺身獨出與其相對俯仰之間刺賊落馬因即斬之皮景和為親信副都督魏武定三年征歩落稽世宗疑賊有伏兵令景和將五六騎深入一谷中值賊百餘人便共格戰景和射數十人莫不應弦而倒後從襲厙莫奚加左右大都督又從度黄龍征契丹定稽胡尋從討茹茹主菴羅辰於陘北又從平茹茹餘燼景和趫捷有武用每有戰功楊愔為高祖行臺右丞韓陵之戰愔每陷陣先登朋僚咸共怪歎曰楊氏儒生今遂為武士仁者必勇定非虚論後周賀拔勝魏孝莊時為太師從太祖戰於邙山時太祖見齊神武旗鼔識之乃募敢勇三千配勝以犯其軍勝與齊神武相遇因字呼之曰賀六渾賀㧞破胡必殺汝也時募士皆用短兵接戰勝持矟追齊神武數里刅垂及之㑹勝馬為流矢中死比副騎至齊神武已逸去勝歎曰今日之事吾不執弓矢者天也太祖每云諸將對敵神色皆動唯賀拔公臨陣如平常真大勇也李弼初為魏爾朱天光别將從天光西討破万俟醜奴弼常先鋒陷陣所向披靡賊咸畏之皆曰莫當李將軍後為秦州刺史從太祖平𢎞農與齊神武戰於沙苑而左軍將為敵所乘弼將歩騎身先士卒横截之分賊為二遂大破之拜特進又從太祖與齊戰於河橋弼深入陷陣身被七創遂為所獲弼陽殞絶於地守者稍懈弼睨其傍有馬躍上西馳得免李標為太祖帳内都督標長不盈五尺性果决有膽氣從復𢎞農破沙苑標跨馬運矛衝堅陷陣隱身鞍甲之中敵人見之皆曰避此小兒太祖初亦聞標驍悍未見其能至是方嗟歎之謂標曰但使膽决如卿何必要湏八尺之軀也賀若敦為都督嘗從太祖校獵於甘泉宫時圍人不齊獸多逃逸太祖大怒人皆股戰圍内唯有一鹿俄亦突圍而走敦躍馬馳之鹿上東山敦棄馬歩逐至山半便掣之而下太祖大悦諸將因得免責劉亮以都督從賀拔岳西征嘗先鋒陷陣若干惠為右衛將軍從太祖擒竇泰復𢎞農戰沙苑惠每先登陷陣蔡祐為平東將軍從太祖戰於河橋祐下馬歩鬪手殺數人左右勸乘馬以備急卒祐怒之曰丞相養我如子今日豈以性命為念遂率左右十餘人齊聲大呼殺傷甚多敵以其無繼遂圍之十餘重謂祐曰觀君似是勇士但拖甲來降豈慮無富貴邪祐罵之曰死卒吾今取汝頭自當封公何假賊之官號也乃彎弓持滿四面拒之東魏人弗敢逼乃募厚甲長刀者直進取祐去祐可三十步左右勸射之祐曰吾曹性命在一矢耳豈虚發哉敵人漸進可十步祐乃射之正中其面應弦而倒便以矟刺殺之因此戰數合唯失一人敵乃稍却祐徐引退又為京兆郡守東魏豫州刺史髙仲宻舉州來附太祖率軍援之與齊神武遇戰於邙山祐時着明光鐵鎧所向無前敵人咸曰是鐵猛獸也皆遽避之辛威為寧逺將軍從太祖擒竇泰復𢎞農戰沙苑並先鋒陷陣勇冠一時厙狄昌為衞將軍從太祖破竇泰復𢎞農戰沙苑昌皆先登陷陣裴果魏初為陽平郡丞孝莊永安末盗賊蜂起果從軍征討乗黄驄馬衣青袍每先登陷陣時人號為黄驄年少至西魏文帝時從戰河橋解玉壁圍摧鋒奮擊所向披靡大綂九年又從戰邙山於文帝前挺身陷陣生擒東魏都督賀婁烏蘭勇冠當時衆人莫不歎服以此文帝愈親待之補帳内都督又從大將軍尉遲迴伐蜀果率所部為前軍開劒閣破李慶保降楊乾運皆有功陸通初為西魏文帝大都督大綂九年高仲密以地來附通從若干惠戰於邙山衆軍皆退唯惠與通率所部力戰至夜中乃隂引還敵亦不敢逼韋祐字法保為河南尹時李延孫被害祐乃率所部據延孫舊栅頻與敵人交戰毎身先士卒单馬陷陣是以戰必被傷嘗至闗南與東魏人戰流矢中頸從口中出當時氣絶輿至營乆之乃蘇獨孤信為别將從征韓婁信匹馬挑戰擒賊漁陽王袁肆周田𢎞為驃騎大將軍每臨陣摧鋒直前身被一百餘箭破骨者九馬被十矟朝廷壯之權景宣為祠部郎中曉兵權有智畧從太祖㧞𢎞農破沙苑皆先登陷陣王羆為驃騎大將軍鎮華州嘗脩月城未畢梯在外齊神武遣韓軌司馬子如從河東宵濟襲羆羆不之覺比曉軌衆已乘梯入城羆尚卧未起聞閣外洶􅍅有聲便􅃝身露髻徒跣持一白梃大呼而出敵見之驚逐至東門左右稍集合戰破之軌衆遂投城遁走王思政為驃騎大將軍募精兵從獨孤信取雒陽仍共信鎮之及河橋之戰思政下馬用長矟左右横擊一擊踣數人時陷陣既深從者死盡思政被重創悶絶㑹日暮敵亦收軍思政乆經軍旅毎戰唯着破弊甲敵人疑非將帥故免侯莫陳崇為建威將軍隨賀㧞岳入闗破万俟醜奴崇與輕騎逐北至涇州長坑及之賊未成列崇单騎入賊中於馬上生擒醜奴於是大呼衆悉披靡莫敢當之後騎集遂大破之岳以醜奴所乘馬及寳劒賞之册府元龜卷三百九十五欽定四庫全書册府元龜卷三百九十五下宋王欽若等撰將帥部勇敢第二後周李遷哲為驃騎大將軍與田𢎞同討信州遷哲每率驍勇為前鋒所有攻戰無不身先士卒後為信州都督時蠻酋蒲微為鄰州刺史舉兵反遷哲將討之諸將以途路阻遠並不欲行遷哲怒曰蒲㣲蕞爾之賊勢何能為擒獲之畧已在吾度中矣諸君見此小賊便有惮心後遇大敵將何以戰遂率兵七千進擊拔其五城虜獲三千餘口柳檜字季華為防城都督從太祖戰於河橋先登有功王雅有膽勇善騎射太祖召入軍除都督東魏將竇泰入寇雅從太祖擒之於潼闗沙苑之戰雅謂所部曰彼軍殆有百萬今我不滿萬人以常理論之實難與敵但相公神武命世股肱王室以順討逆豈計衆寡丈夫若不以此時破賊何用生為乃擐甲歩戰所向披靡太祖壯之又從戰邙山時大軍不利為敵所乘諸將皆引退雅獨㢠廻騎拒之敵人見其無繼歩騎競進左右奮擊頻斬九級敵衆稍却雅乃還軍太祖歎曰王雅舉身悉是膽也王雄為柱國大將軍從晉公䕶東征至邙山與齊將斛律明月接戰雄馳殺三人明月退走雄追之明月左右皆散矢又盡唯餘一奴一矢存焉雄按矟不及明月者丈餘韓雄為中州刺史都督中徐虞洛四州諸軍事雄乆在邊具知敵人虛實每率衆深入不避艱難前後經四十五戰雖時有勝負而雄志氣益壯東魏深惮之王勇為寧朔將軍初從擒竇泰復𢎞農戰沙苑氣蓋衆軍所當必破太祖數其勇敢拜鎮南將軍後加通直散騎常侍兼太子武衛率邙山之戰勇率敢死之士三百人並執短兵大呼直進出入衝擊殺傷甚多敵人無敢當者是役也大軍不利唯勇及王文逹耿令貴三人力戰皆有殊功王傑本名文逹初魏孝武賜爵都昌縣子太祖竒其才擢授揚烈將軍羽林監尋加都督帝謂諸將曰王文逹萬人敵也但恐勇決太過耳復潼闗破沙苑爭河橋戰邙山皆以勇敢聞親待日隆賞賜加於倫等高琳為衛將軍從擒莫多婁貸文仍戰河橋琳先驅奮擊勇冠諸將太祖嘉之謂之曰公即我之韓白也齊將東方老來寇琳率衆禦之老恃其勇徤直前趣琳短兵接琳擊之老中數創乃退謂其左右曰吾經陣多矣未見如此健兒耿豪本名令貴為征虜將軍從太祖擒竇泰復𢎞農豪先鋒陷陣加前將軍沙苑之戰豪殺傷甚多血染甲裳盡赤太祖見之歎曰令貴武猛所向無前觀其甲裳足以為驗不湏更論級數也後從太祖戰於邙山豪謂所部曰大丈夫見賊湏右手㧞刀左手把矟直刺直砍慎莫皺眉畏死遂大呼獨入敵人鋒刅亂下當時咸謂豪殁俄然奮刅而還戰數合當豪前者死傷相繼楊忠為安西將軍東魏荆州刺史辛纂據穰城忠從獨孤信討之信令忠為前驅馳至其城門叱門者曰今大軍已至城中有應爾等求活何不避走門者散退忠與都督康雒即乘城而入彎弓大呼纂兵莫敢禦遂斬纂以狥城中懾伏太祖召居帳下嘗從太祖於龍州忠獨當一猛獸左挾其腰右拔其舌太祖壯之北臺謂猛獸為揜干因以字之又從太祖擒竇泰破沙苑遷征西將軍河橋之役忠與壯士五人力戰守橋敵人遂不進邙山之戰又先登陷陣除侍中驃騎大將軍魏恭帝初行同州事于謹之伐江陵忠為前軍梁人束刅於象鼻以戰忠射之二象反走及江陵平孝閔踐祚入為宗伯及司馬消難降忠與柱國逹奚武援之於是共率騎士五千各兼馬一匹從間道馳入齊境前後遣三使報消難而皆不反命去豫州三十里武疑有變欲還忠獨以千騎夜趨城下四面峭絶徒聞擊柝忠候門開而入乃馳召武時齊鎮城伏敬遠勒甲士三千據東陴舉烽嚴警武惮之不欲保城乃多取財寳以消難先歸忠以二千騎為殿到洛南皆解鞍而卧齊衆來追不敢逼武歎曰逹奚武自言是天下徤兒今日服矣楊纂為征南將軍大都督從文帝解雒陽圍經河橋邙山之戰纂每先登軍中咸推其勇敢楊紹為驍衛將軍鄜城太守時稽胡恃衆與險屢為抄竊紹率羣兵從侯莫陳崇討之疋馬先登破之於黙泉之上後為輔國將軍從柱國燕國公于謹圍江陵紹為流矢中面而力戰不衰元定魏孝武時為前將軍從擒竇泰復𢎞農破沙苑戰河橋定皆先鋒當其前者無不披靡以邙山之役敵人如堵定奮矟衝之殺傷甚衆宇文貴字永貴賀㧞陵作亂圍夏州刺史源子雍嬰城固守以貴為綂軍前後數十戰軍中咸服其勇敢貴每縋而出戰梁臺為大將軍圍雒陽乆而不拔齊騎奄至齊公憲率兵禦之乃有數人為敵所執已去陣三百餘歩臺望見之憤怒单馬突入射殺兩人敵皆披靡執者遂得還齊公憲每歎曰梁臺果毅膽決不可及也後為鄜州刺史年過六十猶能披甲跨馬足不躡鐙馳射弋獵矢不虛發鄭偉為北徐州刺史從戰河橋及解王壁圍偉常先登陷陣宇文慶為驃騎大將軍從高祖攻河陰先登攀堞與賊短兵接戰良乆中石乃墜絶而復蘇帝勞之曰卿之餘勇可以賈人也樊叔畧為驃騎大將軍從高祖伐齊叔畧部卒精鋭每戰身先士卒隋段文振少有膂力膽氣過人初為周宇文䕶親信知其幹用擢為中外府兵曹後從武帝攻齊海昌王尉相貴於晉州其亞將侯子欽崔景嵩為内應文振扞槊登城與崔仲方等數十人先登文振隨景嵩至相貴所㧞佩刀刼之相貴不敢動城遂下宇文弼初為周内史都上士時武帝方計大舉伐齊弼於是募三輔俠少年數百人以為别隊從帝攻拔晉州身被三創苦戰不息帝竒而壯之後遷南司州刺史後司馬消難之奔陳也弼追之不及遇陳將樊毅戰於漳口自旦至午三戰三捷虜獲三千除黄州刺史宇文慶深沉有器局在周以應募從征有功授都督衛王直之鎮山南也引為左右慶善射有膽氣好格猛獸直甚壯之史萬歳仕周為開府儀同三司從梁士彦擊尉遲迥於相州及與迥軍相遇每戰先登鄴城之陣官軍稍却萬嵗謂左右曰事急矣吾當破之於是馳馬奮擊殺數十人衆亦齊力官軍乃振後復坐事除名竇榮定之擊突厥也萬歳詣轅門請自効榮定數聞其名見而大悦因遣人謂突厥曰士卒何罪過令殺之但當各遣一將士決勝負耳突厥許諾因遣一騎挑戰榮定遣萬嵗去應之萬歳馳斬其首而還突厥大驚不敢復戰遂引軍而去張定和為驃騎將軍從上柱國李充擊突厥先登陷陣虜刺之中頸定和以草塞瘡而戰神氣自若虜遂敗走高祖聞而壯之遣使者齎藥馳詣定和所勞問之周羅㬋為開遠將軍從大都督吳明徹與齊師戰於江陽為流矢中其左目齊圍明徹於宿預也諸將相顧莫有鬪心羅㬋躍馬突進莫不披靡太僕卿蕭摩訶因而副之斬獲不可勝訃進師徐州與周將梁士彦戰於彭城摩訶臨陣堕馬羅㬋進救拔摩訶於重圍之内勇冠三軍魚俱羅叠州總管以母憂去職還至扶風楊素率兵將出靈州道擊突厥路逢俱羅大悦遂奏與同行及遇賊俱羅與數騎奔擊瞋目大呼所當皆靡出左入右往返若飛以功進位柱國拜豐州總管逹奚長儒為使持節撫軍將軍通直散騎常侍平蜀之役嘗為先鋒攻城野戰所當必破之累遷大將軍開皇二年突厥沙鉢畧可汗并弟葉䕶及潘那可汗衆十餘萬寇掠而南詔以長儒為行軍總管率衆二千擊之遇於周槃衆寡不敵軍中大懼長儒慷慨神色愈烈為虜所衝突散而復聚且戰且行轉鬪三日五兵咸盡士卒以拳毆之手皆見骨殺傷萬計虜氣稍奪於是解去長儒身被五創通中者二其戰士死傷者十有八九突厥本欲大掠秦隴既逢長儒兵皆力戰虜意大沮明日於戰處焚屍慟哭而去裴仁基少驍勇便弓馬開皇初為親衛平陳之役先登陷陣陳永貴隴右胡人本姓白氏以勇烈知名高祖甚親愛之數以行軍總管鎮邊每戰必单騎陷陣斛斯萬善為武賁郎將突厥始畢之圍鴈門也萬善奮擊之所向皆破每賊至必出當其鋒賀若誼開皇中為涇州刺史時突厥累為邊患朝廷以誼素有威名拜靈州刺史進位柱國誼時年老而筋骨不衰猶能重鎧上馬為北狄所惮楊素仕周為車騎大將軍從齊王憲拔晉州憲屯兵雞棲原齊主以大軍至憲懼而宵遁為齊兵所躡衆多敗散素與驍將十餘人盡力死戰憲僅而獲免至髙祖開皇十八年為靈州道行軍總管出討突厥先是諸將與虜戰每慮胡騎奔突皆戎車歩騎相參舁鹿角為方陣騎在其内素謂之曰此乃自固之道非取勝之方也於是悉除舊法令諸軍為騎陣突厥逹頭可汗聞之大喜率精騎十餘萬而至素奮擊大破之逹頭被重創而遁殺傷不可勝計羣虜號哭而去韓洪字叔明擒虎季弟平陳之役授行軍總管及陳平晉王大獵於蔣山有猛虎在圍中衆皆懼洪馳馬射之應弦而倒陳氏諸將列觀於側莫不歎伏焉元壽為行軍元帥長史壽每遇賊為士卒先登錢拔為車騎將軍從楊素北征突厥加上開府煬帝即位漢王諒反於并州又從楊素擊之每戰先登楊義臣為太僕卿時征遼東以將軍詣肅慎道至鴨淥水與乙友文德戰每為先鋒一日七㨗楊屯大業中應募擊髙麗力戰於遼東見稱勇敢宇文述之敗也煬帝夜焚攻具詰朝遁還恐為高麗所躡選壯士殿後以捍禦之及將度遼而高麗追至屯先登力戰其功居最閻毗領武賁郎將典宿衛煬帝軍圍遼東城令毗詣城下宣諭賊弓弩亂發矢中所乘馬毗顔色不變辭氣抑揚事卒而去册府元龜卷三百九十五下
