body:
  text: 册府元龜卷三百五十九宋王欽若等撰將帥部立功第十二唐崔光逺為鳯翔節度使上元元年於普閏縣界破党項四千餘衆斬首二千餘級生擒一百餘人收獲駝馬牛羊器械等不可勝數能元皓為青宻等州節度使上元二年六月破史朝義之将偽驃騎大将軍李元遇等馬歩一萬人擒賊将馬登封等十人斬首五千餘級張伯義初𨽻河東莭度使李光弼以戰功累遷試太常卿上元中賊帥袁晁亂海浙光弼俾伯義與諸軍討之招綏叛亡平蕩山洞功為第一繇是擢授睦州杭州刺史李晟為鳯州莭度使髙昇列将上元中擊疊州叛羌於高當川又擊宕州連狂羌於罕山皆破之累遷左羽林大将軍同正廣德初節度使孫志直署晟總遊兵擊破党羌髙玉等賊以功授特進光禄卿轉試太常卿大厯初李抱玉鎮鳯翔署晟為右軍都将四年吐蕃圍靈州抱玉遣晟将兵五千以擊吐蕃晟辭曰以衆則不足以謀則太多乃請将兵千人疾出大震關至臨洮屠定秦堡焚其積聚虜堡帥慕容鍾而還吐蕃因解靈州圍而去拜開府儀同三司涇原四鎮北庭都知兵馬使累封合川郡王為右神策都将徳宗即位吐蕃冦劔南時節度使崔寧在京師三川皆恐晟将神策兵萬五千救援晟乃踰漏天攻㧞飛越廓清肅寧三城絶大渡河獲首虜千餘級虜引去因留成都數月而還建中二年魏博田悦反将兵圍臨洺邢州詔以晟為神策先鋒都知兵馬使與河東節度馬燧昭義莭度李抱真合兵救臨洺諸軍皆却晟引兵渡洺水乗氷而濟横擊悦軍王師復振擊悦大破之三年正月復以諸道軍擊敗悦軍於洹水遂進攻魏州以功賜實封百戸四年冬徳宗幸奉天詔晟赴難授神策行營莭度使實封二百戸自河中繇蒲津而軍渭北璧東渭橋以逼朱泚累加同平章事興元元年五月二十五日夜移軍於光泰門米倉村以薄京城晟臨髙指麾令設壕栅以候賊軍俄而賊衆大至晟遣吳詵康英俊史萬頃孟渉等縱兵擊之時華州營在北兵少賊併力攻之晟遣李演孟日華以精卒救之中軍鼓譟演力戰大破之乗勝入光泰門再戰又敗之僵屍蔽地餘衆走白華夜聞慟哭之聲二十八日晟大集諸将陳兵於光泰門外乃使王佖李演率騎軍史萬頃領步卒直扺苑墻神䴥村萬頃先登拔栅而入佖騎軍繼進賊即奔潰大軍分道並入鼓譟雷動賊将姚令言張庭芝李希倩猶力捍官軍晟令唐良臣趙光銑楊萬榮孟日華等步騎齊進賊軍陣成而屢北戰十餘合乗勝驅蹙至於白華忽有賊騎千餘出於官軍之背晟以麾下百餘騎擊之左右呼曰相公来賊聞之驚潰官軍追斬不可勝計朱泚姚令言張庭芝尚有衆萬人相率遁走晟遣田子奇追之其餘兇黨相率来降京城平以功拜司徒兼中書令實封一千戸充鳯翔隴州節度使兼隴右涇原莭度管内諸軍及四鎮北庭行營兵馬副元帥封西平郡王貞元二年十月出師襲吐蕃摧沙堡拔之斬其堡使扈屈律悉蒙等王佖李晟之甥自河西河北出師佖無役不從朱泚之亂以河中兵馬使隨晟討賊晟攻賊於光泰門賊鋒尚勁佖與兵馬使李演踰苑墻血戰敗賊前鋒諸軍方振論功為神策将吕日将為興鳯等州招討使代宗寶應元年日将于興州三嗟谷大破羌賊三千餘衆嚴武為劔南莭度使廣徳二年破吐蕃七萬餘衆拔當徇城又拔鹽川城崔寧夲名旰為漢州刺史廣徳中吐蕃與諸雜羌戎㓂陷西山拓静諸州詔劔南莭度使嚴武收復武急召寧統兵出西山寧尅躬撫士皆願致死命始次賊城周圍皆石礫攻具無所設唯東南隅環丈之地壤土可穴諜知之以告寧寧晝夜穿地道攻之再宿而拔其城因西拓地數百里下城砦數四蕃衆相語曰崔旰皆神兵也将更前進以糧盡還師武大悦装七寶輿迎寧入成都以誇士衆賞賚過厚王棲曜為浙東馬軍兵馬使廣德中草賊袁晁亂台州連結郡縣積衆二十萬餘盡有淛江之東御史中丞袁傪東討奏棲曜與李長榮為将聫日十餘戰生擒袁晁收復郡邑十六授常州别駕浙西都知兵馬使大厯中李靈曜叛於沛州觀察使李涵俾棲曜将兵四千為河南掎角以功加銀青光禄大夫建中中李希烈既陷汴州乗勝東侵連陷陳留雍丘頓軍寧陵期下宋州莭度使韓滉命棲曜将强弩數千夜入寧陵希烈不之知晨朝弩矢及希烈坐帳希烈驚曰此江淮弩士今入矣遂不敢東希烈夜遁後棲曜隨劉𤣥佐收汴州遷御史大夫白元光為朔方騎将大厯三年九月壬午吐蕃冦靈州元光擊破之壬辰元光又破吐蕃二萬衆於靈武獲羊馬數千計伊慎為江西衛将大厯八年節度使路嗣恭討嶺南哥舒晃之亂以慎為先鋒直逼賊壘疾戰破之斬首三千級繇是復始興之地未㡬與諸将追斬滉於泔溪函首獻於闕下嗣恭表慎功授連州長史知當州團練副使三轉江州别駕討梁崇義之歳慎以江西牙将從李希烈摧鋒陷敵功又居多尋歸本道眀年希烈反嗣曹王臯拔慎為大将賊兵沂江来冦慎戰大破其三千餘衆累拔蔡山栅取蘄州降其将李良又收黄梅縣殺賊将韓霜露斬首千餘級封南充郡王蘄州刺史充莭度都知兵馬使建中末賊已屠汴州慎以兵擊退賊将杜少誠江路遂通又破苟莾栅進兵圍安州賊阻溳水攻之不能下李希烈遣其甥劉戒虚将騎兵八千来援慎分迎擊戰於應山擒戒虛縳示城下遂開門請罪以功拜安州刺史兼御史大夫仍賜實封一百戸貞元十五年以慎為安黄等州莭度管内支度營田觀察使十六年吳少誠阻命詔以夲道歩騎五千兼綂荆南湖南江西三道兵當其一面於申州城南前後破賊數千以例加檢校刑部尚書李承昭為昭義莭度大厯十年田承嗣攻磁州承昭援磁州與田承嗣大将盧子期戰於萬泉縣大破之生擒子期以獻馬燧為河陽三城使大厯十一年五月汴州大将李靈曜反因絶運路以邀節制代宗務恩大因授靈曜汴宋八州節度留後靈曜不受命乃與魏博莭度田承嗣通謀承嗣遣其子悦将兵與靈曜共破永平軍将劉洽詔燧與淮西莭度李忠臣合軍討靈曜忠臣懼賊燒廬舍西走燧勸其還兵請為前鋒擊破田悦進逼汴州李忠臣行汴南燧引軍行汴北又敗靈曜将張清於西梁圍靈曜又選鋭兵八千號為餓狼軍燧獨引軍擊破之進至浚儀是時河陽兵㓂諸軍承嗣又遣悦将兵二萬救靈曜破永平軍将杜如江畧曹州又敗李正巳遊軍擊走劉洽長孫全緒等軍乗勝去汴州一舍方陣而進忠臣㑹宋州淮南浙西兵與戰不利請救於燧燧引軍四千人為奇兵擊破之田悦匹馬遁去靈曜知悦敗明日以百騎夜走汴州悉降後為河東莭度建中二年田悦反自将兵三萬圍邢州攻臨洺築重城絶其内外以拒救兵邢州李洪臨洺将張伾皆堅守不拔昭義軍數告急乃詔燧将救臨洺燧軍出􅛒口兵未過險乃遣人持書喻悦且示之好悦謂燧畏之十一月師次邯鄆悦遣使至斬之以徇遣兵急擊破其支軍射殺其将成炫之悦自攻臨洺遣大将楊朝光将兵萬餘於臨洺南䨇崗下東西列二栅以禦燧燧乃率李抱真李晟進軍營於二栅之中其夜東栅走歸悦進軍營明山取其棄栅以置輜重謂将吏曰朝光守堅栅不下萬人假令燧等盡鋭攻之比數日計不能下殺傷必甚吾此必拔臨洺賞勞軍士而與之戰必勝之術也悅乃分常山李惟岳救兵五千以助朝光燧率軍攻朝光田悦将萬餘人救之燧令大将李自良李奉國将兵合神䇿軍據雙崗禦之燧乃令推火車以焚其栅自晨至暮急擊大破之拔其栅斬朝光及大将盧子昌斬首五千餘級生虜八百餘人居五日進軍徑戰燧自将鋭兵扼其衝口凡百餘合士皆決死悦兵大敗斬首萬餘生虜九百人得榖三十萬斛器甲稱是悦收兵夜走邢州圍亦解尋加魏慱招討使三年正月田悦求救於淄青常山李納遣大将衛俊将兵僅萬人以救悦李惟岳亦遣三千餘人救悦收合散兵二萬餘壁於洹水淄青軍其東常山軍其西首尾相應燧帥諸軍合擊悦軍亂赴水斬首二萬殺賊大将孫晉卿安墨啜生獲三千餘人溺死者不可勝數淄青軍殆盡死者相枕籍三十里悦收兵得千餘人夜走至魏州城将李長春閉門不納久之追兵不至比明乃納既入殺長春嬰城自守數日李再春以慱州䧏悦兄昻以洺州降王光進以長橋降悦遣大将符璘李瑶将五百騎送淄青兵還鎮因降燧魏城先引御河入城南流燧令塞其領口流絶城中益急恐悦乃遣許士則侯臧徒歩間説朱滔王武俊借兵求救時王武俊已殺李惟岳傳首獻於闕下授武俊恒冀觀察都防禦使時武俊同列張孝忠已為莭度使武俊獨為防禦使甚怨望且素輕孝忠恥居其下因與悦通謀遂與朱滔約謀救悦悦恃兵且至又出兵二萬背城而陣燧與諸軍擊破之五月加燧同平章事四年十月德宗幸奉天燧引軍還太原遣行軍司馬王權将兵五千赴行在興元元年七月加燧奉誠軍及晉絳慈隰莭度諸軍行營副元帥與渾瑊駱元光同討河中李懐光九月十五日燧帥歩騎三萬次於絳分兵收夏縣畧稷山攻龍門降其将馮萬興任象玊燧以兵攻絳州十月拔其外城其夜偽刺史王克同與大将達奚小進棄城走降其衆四千人又遣大將李自良谷秀分兵畧定聞喜夏縣萬泉虞鄉永樂猗氏六縣降其将辛兟及兵五千人貞元元年軍次寳鼎敗賊騎兵於陶城前鋒将李黯追擊之射殺賊将徐伯文斬首萬餘級獲馬五百匹七月與渾瑊駱元光韓遊環軍次於長春宫懐光将徐庭光以兵六千守宫城燧挺身城下招喻之先一日賊焦籬堡守尉珪以兵二千因堡降庭光東道既絶乃率衆出降八月移軍於焦籬堡其夜賊太原堡守将吳冏棄堡而遁其下皆降燧率諸軍濟河凡八萬陣於城下是日賊将牛名俊斬懐光首以城降河中平遷光禄大夫兼侍中劉𤣥佐初名洽為永平軍節度衙将大厯中李靈曜據汴州反洽将兵乗其無備徑入宋州遂城守詔因以州𨽻永平軍節度使李勉署奏宋州刺史建中二年加御史中丞充宋亳潁節度使時李正巳死子納匿喪叛居無何李洧以徐州從順納怒洧甚遂遣兵圍彭城詔洽以諸軍救之洽至與納軍戰大敗之斬首萬餘級繇是轉輸之道復通以功加御史大夫洽進收濮州降其将楊令暉又分兵挾令暉以狥濮陽降其将髙彦昭以通濮陽津遷兵部尚書復兼曹濮觀察使尋加左僕射淄青兖鄆招討使又加汴滑都統副使李希烈攻陷汴州德宗居奉天洽與希烈連戰賊勢稍却興元初以功加平章事希烈兵圍寧陵洽大将劉昌堅守不下希烈復悉兵攻圍陳州洽遣劉昌與諸軍救之大破賊兵獲賊将翟崇暉希烈棄大梁走洽率諸軍進攻汴州又以功加汴宋節度遷司空無㡬加本管及陳州諸軍行營都統仍賜名𤣥佐楊恵元為神策軍京西兵馬使鎮奉天大厯中累有戰功及田悦朱滔反叛召恵元領禁兵三千與諸将討伐戰御河奪三橋皆恵元之功也尋加檢校工部尚書以兵屬李懐光建中末自河朔與懐光同赴國難解奉天之圍張獻恭為山南西道節度使大厯十二年獻恭上言破吐蕃萬餘衆於岷州張光晟為代州都督大厯十三年與回紇戰于羊武谷破之回紇引退先是辛雲京守太原回紇懼雲京不敢窺并代知鮑防無武畧乃敢凌逼賴光晟邀戰勝之北人乃安時鮑防為太原郡守張獻甫初為偏禆以軍功累授試光禄卿殿中監德宗建中初從節度使賈耽征梁崇義於襄漢以功加試太子詹事及幸奉天興元獻甫首末從渾瑊征討有功及復京邑累加兼御史大夫楊朝晟為甘泉府果毅建中初從李懐光討劉文喜于涇州斬獲生擒居多授驃騎大将軍稍為右先鋒兵馬使後李納㓂徐州從唐朝臣征討常冠軍鋒以功授開府儀同三司檢校太子賔客德宗在奉天李懐光自山東赴難以朝晟為左廂兵馬使将千餘人下咸陽以擊朱泚加御史中丞實封一百五十戸王武俊為成德軍莭度建中初朱滔圍貝州武俊與澤潞節度李抱真合軍於貝丘抱真為方陣武俊用奇兵朱滔空營合戰武俊不擐甲而馳之滔望風奔潰自蹂踐死者十四五收其輜重器甲馬牛不可勝筭滔夜奔幽州尚可孤為神策軍大将建中二年為荆襄應援淮西使以所統之衆赴山南累有戰功及涇原兵叛詔徵可孤軍至藍田賊衆稍盛遂營於七盤山城栅而居之賊将仇敬忠等来冦可孤頻擊破之因收藍田縣元興元年三月遷檢校工部尚書兼御史大夫神策京畿渭南商州節度使四月仇敬忠復来冦可孤率兵大破焉擒敬忠斬之遂進軍與副元帥李晟決策攻討可孤之師為先鋒京師平以功加檢校右僕射封馮翊郡王李希烈為淮西節度建中二年山南東道節度使梁崇義拒捍朝命迫脇使臣詔諸節度率兵討之加希烈南平郡王兼漢北都知諸道兵馬招撫處置使希烈破崇義衆討平之録功加檢校右僕射同平章事賜實封五百戸李抱真為昭義軍節度建中二年田悦以魏博反乃悉兵圍邢州及臨洺臨洺益急詔河東節度使馬燧及神策兵救之抱真與燧敗悦兵於雙崗斬悦将楊朝光又擊破悦於臨洺遂解臨洺及邢州之圍以功加檢校兵部尚書復與燧大破悦于洹水悦以數百騎走歸魏州復與燧圍魏州又敗悦于城下以功加檢校右僕射建中末李希烈陷大梁李納反鄆州李懐光又竊據河中抱真獨於擾攘傾潰之中以山東三州外抗羣賊内輯軍士羣賊深憚之興元初加平章事時朱滔悉幽薊軍借兵回紇擁衆五萬南向以應朱泚攻圍貝州抱真與鎮州王武俊擊破之于經城以功加檢校司空王䖍休為澤潞兵馬使建中二年節度使李抱真統兵馬與諸将征討河北其雙崗水寨營等陣䖍休戰功居多擢為歩軍都虞候劉昌為宣武節度劉𤣥佐左廂兵馬使建中中李希烈既陷汴州𤣥佐遣将髙翼以精卒五千保援襄邑城陷翼赴水死自宋及江淮人心震恐時昌以三千人守寧陵希烈率五萬衆陣於城下昌深塹以遏地道凡四十五日不解甲胄躬厲士卒大破希烈希烈退圍陳州刺史李公亷計窮昌從𤣥佐以浙西兵合三萬人救之至陳州西五十里與賊遇昌晨壓其陣及其未成列大破之生擒其将翟曜希烈退保蔡州自此不復侵軼詔加昌檢校左常侍隨𤣥佐救汴州又加檢校工部尚書後為四鎮北庭行軍兼涇原節度貞元十四年六月歸化堡健兒作亂逐出大将張國誠副将張抗詔昌經畧處置昌率兵至堡下告語云但選首惡送之餘悉釋而不問賊竟不從命乃與昌戰城中大敗誅斬六七百人復令國誠入堡李芃為河陽三城德州節度使以東畿汜水等五縣𨽻焉建中三年河南北聮大兵詔益以神策汝陜之師芄進救新鄉共城遂圍衛州明年詔與河東節度馬燧等諸軍破田悦於洹水以功加檢校兵部尚書累封郡王張孝忠為盧龍莭度使建中三年正月大破李惟岳于束鹿初朱滔收束鹿據之進圍深州惟岳乃與田悦及其衆一萬圍束鹿滔與孝忠合軍擊之滔命勇敢者數百人蒙猛獸之衣騰奮而前金鼔亂發賊騎奔軼不能制乗亂縱擊大破之惟岳燒營而遁髙固為朔方莭度渾瑊麾下建中末德宗幸奉天是時賊兵已突入東壅門固引甲士亂揮長刀連斫數賊拽車塞闔一以當百賊乃退以功封渤海郡王李元諒為鎮國軍副使領軍潼關建中末德宗居奉天賊泚遣偽将何望之輕騎襲華州刺史董晉棄州走望之遂據城将聚兵以絶東道元諒自潼關将所部仍令義兵因其未設備徑攻望之遂拔華州望之走歸泚元諒乃修城隍器械召募不數日得兵萬餘人軍益振以功加御史中丞賊泚數遣兵来冦輒擊却之是時尚可孤守藍田與元諒為掎角賊東不能逾渭南元諒功居多無㡬遷華州刺史兼御史大夫潼關防禦鎮國軍節度使興元初詔元諒與副元帥李晟進收京邑兵次于滻西賊悉衆来攻元諒身先士卒奮擊大敗破之進軍至苑東與晟力戰隳苑垣而入賊聫戰皆敗遂復京師加檢校尚書右僕射嚴震為山南西道莭度建平末徳宗車駕發奉天及入駱谷李懐光遣數百騎来襲賴山南兵擊之而退輿駕無警急之患尋加震檢校戸部尚書樊澤為山南東道莭度觀察等使建中末頻與李希烈兇黨接戰前後擒降其梟将張嘉􅀈杜文朝梁俊之李克誠薛翼等收唐隨二州貞元二年於襄州東北界泌河口破李希烈賊衆馬歩五千人戴休顔為奉天行營節度使興元初李晟收京師乃與渾瑊韓遊環進軍咸陽破泚斬首三千休顔追賊至中渭橋李晟既清宫闕休顔與瑊等率兵赴岐陽擊泚餘衆及策勲加檢校右僕射封至六百戸韓遊環為邠寧節度使興元初李晟移軍東渭橋與駱元光尚可孤分扼京東要路遊環與渾瑊戴休顔分典京西要路掎角進攻晟收京師遊環二将亦破賊于咸陽論功行封與瑊等李復為嶺南莭度使貞元五年復奏收復瓊州表曰瓊州本𨽻廣府管内乾封中山洞草賊翻叛都督李孝逸撫馭失所遂致淪陷已經一百餘年臣羌叛官監察御史姜孟京崖州刺史張少遷等悉力攻討累經苦戰方克舊城便令降人開薙荆榛建立城栅屯集官軍臣竊觀瓊州控壓賊洞若移鎮軍在此必永絶姦謀伏望昇為下都督府乃加瓊振儋厓萬安五州招討遊奕使額請停從之韋臯為劔南西川節度使貞元九年臯獻獲吐蕃首虜器械旗幟牛馬於闕下初将城鹽州德宗命臯出師以分吐蕃之兵臯遣大将董勔張芬出西山及南道破峨和城通鶴軍吐蕃南道元帥論莾熱率衆来援又破之殺傷數千人焚定廉故城凡平栅堡五十餘所十年臯奏西川峨和城擊破吐蕃三萬餘衆及出兵黎雅等州以援雲南攻破吐蕃栅城斬首三千八百級生虜及降吐蕃二百四十人得其器械牛馬十三年收復嶲州孟元陽為陳許大将貞元中討吳少誠韓全義五樓之敗諸軍多私歸元陽及神策都将蘇光榮宣州都将王幹各率所部留軍激水破賊二千餘人郗士羙為黔中經畧招討使貞元中谿州賊帥向子琪連結夷獠控據山洞衆號七八千士羙設奇畧討平之詔書慰勞封髙平郡公元和六年為昭義軍節度使㑹朝廷討王承宗士美兵既合而賊軍大敗下三營環相鄉屢以捷聞髙崇文為長武城使憲宗元和元年春以檢校工部尚書充左神策行營節度使統左右神䇿奉天麟遊諸鎮兵討劉闢于西川從漢中入遂却劔門之師解梓潼之圍賊将邢泚遁歸屯軍梓州因拜崇文東川莭度使成都北一百五十里有鹿頭山扼两川之要闢築城以守之連八栅張掎角之勢以拒王師崇文破賊二萬於鹿頭城下明日又破於萬勝堆堆在鹿頭之東凡八大戰皆大捷李光顔軍於鹿頭西大河之口以斷賊糧道賊大駭賊緜江栅将李文悦以三千人歸順而鹿頭将仇良輔舉城降者衆二萬闢之男方叔子壻蘇强先監良輔軍是日械繫送京師降卒投戈面縳者彌十數里遂長驅而南直指成都徳陽等縣城皆鎮以重兵莫不望旗率服師無㽞行闢大懼以親兵及逆黨盧文若齎重寳西走吐蕃吐蕃素受其賂且将啟之崇文将髙霞寓酈定進倍道追之至羊灌田及焉闢自投岷江擒於湧流之中西蜀平制授崇文成都尹充劔南西川節度使封南平郡王食實封三百戸髙霞寓以長武城軍職元和初授兼御史大夫從髙崇文将兵擊劉闢連戰皆克下鹿頭城降李文悦仇良輔蜀平以功拜彭州刺史尋繼崇文為長武城使封感義郡王嚴秦為山南西道莭度使元和元年破劉闢賊二千於神泉縣生擒遊奕將牛文悦劉濟為幽州節度元和初烏桓鮮卑數冦邉濟帥師擊走之深入千餘里虜獲不可勝紀東北晏然五年討鎮州王承宗以大将軍次于瀛州累破樂夀博陸安平等縣前後大殺獲賞功頗厚李光顔為忠成軍節度元和九年討蔡州下詔光顔以夲軍獨當一面光顔於是引兵臨溵水抗洄曲十年五月破賊於洄曲又與懐汝莭度烏重裔同破賊於小溵河平其栅十一年連破賊衆拔凌雲栅進檢校左僕射十二年四月敗賊衆三萬于郾城其将張伯良奔於蔡州殺其賊十二三獲馬千匹器甲三萬尋而郾城守将鄧懐金以城降及裴度至行營率賔從于方城沲口觀板築五溝賊遽至注弩挺刅勢将及度光顔決戰於前以却之賊平加檢校司空十三年東討李師道授光顔義成軍節度使數旬之内再敗賊軍濮陽殺賊數千人十四年西蕃入冦移邠寧節度光顔忻然即路擊賊退之累加平章事鳯翔節度敬宗即位正拜司徒汴州李岕逐其帥詔光顔率陳許之師討之營於尉氏俄而誅岕遷太原尹河東節度使王沛為陳許行營兵馬使節度使李光顔討蔡州使沛統兵屯於近郊及進軍連破賊徒頻詔促進諸軍觀釁莫敢先過大溵河者沛領卒五千人夜渡合流口扼其㗋而成城於是河陽宣武軍太原魏博等諸軍因得濟合謀掎角而攻圍郾城沛率先部旅築其壘而對焉賊衆危怖其将鄧懐金乃面縳率衆歸降後元濟既擒沛從光顔入覲光顔具陳沛之功勞加兼御史大夫其後救鹽州以功聞拜寧州刺史尋除陳州刺史宣武軍部将李岕亂又詔沛兼莭度副使而討焉有功加檢校右散騎常侍遷兖海沂宻等州莭度觀察處置等使田𢎞正為魏博莭度元和十年朝廷用兵討吳元濟𢎞正遣子布率兵三千進討屢戰有功十三年王師加兵於鄆詔𢎞正與宣武義成武寧横海等五鎮之師㑹軍齊進十一月𢎞正自帥全師自楊劉渡河築壘距鄆四十里師道遣大将劉悟率重兵以抗𢎞正結壘相望前後合戰魏軍大捷而李愬李光顔三面進攻賊皆挫敗其勢将危十四年二月劉悟以河上之衆倒戈入鄆斬師道首詣𢎞正請降淄青十二州平論功加檢校司徒同中書門下平章事𢎞正子布元和十年統魏之偏師三千㑹諸軍於唐州授檢校秘書監兼殿中侍御史前後十八戰破凌雲栅下郾城縣布皆有功繇是擢兼御史中丞時裴度為招討使嘗觀諸軍城沱口賊有董重質領驍騎突至度甚危蹙布領騎二百馳救之俄而諸軍繼至獲免淮西平拜左金吾衛将軍李愬為隨唐鄧莭度元和十年用兵討蔡愬嘗獲賊将丁士良李祐皆釋縳用為親将又降賊将吳秀琳愬遂以秀琳之衆收吳房縣攻其外城十二年十月将襲蔡州其月七日留遣從事鄭斌使郾城以取元惡之首告師期於招撫使裴度且請援焉至期令諸将列大軍東行六十里至張柴使李祐盡殺賊衆以義成五百人代鎮之愬又分遣諸将斷諸橋道行七十里至蔡城下祐與将李忠義先登叱守門者起盡殺之遂帥師而入乃令擊柝者曰罷柝者死賊以柝聲如舊不虞我師之来至中城如之領軍鞫場號令約束賊方覺悟元濟帥家僮以固子城時賊将董重質縂數萬人北據洄曲愬曰彼之有拒我者有望於重質耳乃厚恤其家命其子馳書諭之重質單騎至愬遣都将李進誠率降卒開子城既而焚之門壊而元濟擒焉蔡州平愬以功加檢校尚書左僕射充山東道莭度使封梁國公食實封五百戸十三年淄青李師道再叛以愬為武寧軍節度使討之愬破賊金鄉凡十一戰擒賊将五十俘斬萬計淄青平十五年加平章事充昭義軍節度使烏重裔為河陽三城莭度使元和十年王師討淮西三年重裔與陳許李光顔掎角相應大小百餘戰以至吳元濟誅就加檢校右僕射韓公武宣武軍節度𢎞之幼子累授軍職元和十年将宣武兵萬三千人從李光顔討賊淮西平以功擢為鄜坊節度兼御史大夫史憲誠為魏博軍中右職元和十四年節度使田𢎞正以全師討李師道令憲誠以先鋒四千人濟河累下其城栅復以大軍齊進乗勝逐北魏博之全師迫于鄆州城下師道窮蹙劉悟斬其首以投魏軍録功憲誠超兼御史中丞王智興為武寧軍莭度李愬衙将元和十四年王師誅李師道智興率徐軍八千㑹諸道之師進擊與陳許之軍大破賊于金鄉拔魚䑓俘斬萬計以功遷御史中丞賊平授沂州刺史史奉敬為朔方衙将元和十四年大破吐蕃於鹽州城下賜奉敬實封五千戸薛平為淄青齊登莱五州節度使穆宗長慶元年幽鎮叛杜叔良統横海全軍討伐不勝埭州為賊所窘朝廷乃委平以偏師援埭州平即遣将李叔佐以兵五百救之居數月刺史王稷餘給稍薄兵士怨怒叔佐不能戰宵潰而歸仍推突将馬狼兒為帥行及青城鎮刼鎮将李自勸并其衆次于博昌鎮復刼其鎮兵共得七千餘人徑取青州城城中兵少力所不敵平悉府庫并家財厚賞三千精卒逆擊之仍先以騎兵掩其家屬輜重賊衆惶惑反顧因大敗狼兒與其同惡十數輩脱身竄匿餘黨降稍後者猶斬於鞫塲其明日狼兒亦就擒戮劉沔為鹽州刺史天德軍防禦使唐寶厯間在西北邉累立奇效太和末河西党項羌叛沔以天德之師屢誅其酋渠授振武莭度使單于大都䕶開成中党項雜虜大擾河西沔率吐渾契苾沙陀三部落等諸族萬人馬三千騎徑至銀夏討襲大破俘獲萬計以功加檢校户部尚書㑹昌三年廻鶻部饑烏介可汗奉太和公主至漢南求食過把頭峯犯雲朔北川朝廷移沔為河東莭度使加檢校左僕射與幽州張仲武恊力招撫竟破虜冦迎公主還宫以功進檢校司空李載義為幽州節度使文宗太和元年李同捷㩀滄景要襲父爵載義討之累破賊軍以功加檢校司空三年滄景平策勲加平章事四年四月奚冦邉載義上言今月三日發兵入奚界殺奚賊五千餘人生擒刺史縣令大将首領等二百七十三人五月己夘載義上言先發兵深入奚部至四月十七日就其帳擒奚帥茹羯以功加檢校太保石雄為振武軍禆将太和中河西党項擾邉雄累立破羌之功㑹昌三年廻鶻烏介可汗奉太和公主牙于雲朔北川雄自率勁騎得沙陀李國昌三部落兼契苾拓拔雜虜三千騎月暗夜發馬邑徑趨烏介之牙炬火燭天鼓譟動地可汗惶駭莫測率騎而奔雄率勁騎追之至殺胡山急擊之斬首萬級生擒五千羊馬車帳皆委之而去遂迎公主還太原以功授豐州刺史充天德防禦等使累遷河中晉絳莭度使俄而昭義劉從諫卒其子稹擅主軍務朝議問罪以雄為潞府西面招撫使以晉州刺史李丕為副使王宰在萬善栅劉沔在石㑹相顧未進雄越烏嶺破賊石砦斬獲千計雄既率先破賊不旬日王宰收天井闗何敬𢎞王元達亦收磁洺等郡稹危蹙大将郭誼宻欵請斬稹歸朝武宗詔雄以七千兵受降雄即徑馳潞州降誼盡擒其黨與賊平加檢校司空張仲武為幽州節度使武宗㑹昌中廻鶻赤心宰相一族七千帳東逼漁陽仲武乃與弟仲至從弟公素禆将游奉寰王如清率其部下勁兵三萬人大破之收其侯王貴族千餘人降三萬餘人獲牛馬槖駝旃墻罽幕不可勝計尋遣從事李周曈牙門将國從玘相次獻捷先是奚契丹皆有㢠廻鶻監䕶使督以歳貢且為漢諜事至是仲武遣禆将石公緒等諭意凡戮八百餘人又㢠廻鶻初遣宣門将軍等四十七人来偵驅掠雜虜遂逗留其使緩彼師期人馬病死竟不遣之㢠廻鶻烏介可汗既敗不敢近邉乃依康居求活盡徙餘種寄託于黑車子髙駢為神策都虞侯咸通初党項羌叛詔駢率禁兵萬人戍長武城時諸将禦羌無功唯駢伺隙用兵出無不捷懿宗深嘉之先是李琢為安南都䕶貪於貨賄虐賊夷獠人多怨叛遂結蠻軍合勢攻安南陷之自是累年亟命将帥未能收復五年移駢為安南都䕶至則糾合五管之兵朞年之内招懐谿洞誅其首惡一戰而蠻卒遁去收復交州郡邑遷檢校工部尚書天平軍節度使鄭畋為鳯翔莭度廣明初黄巣陷京闕僖宗西幸畋受詔許承制便宜行事巢遣尚讓将賊衆十餘萬西追車駕畋率本軍逆戰于龍尾陂敗之因傳檄天下繇是諸侯皆舉義兵以赴京師實畋之功也王處存為義武軍節度使廣明初黄巢犯闕僖宗幸蜀處存以勤王舉義之功加檢校司空又遣大将張公慶率勁兵三千合諸軍㓕賊巣於泰山以功加檢校司徒王重榮為河中節度留後中和元年黄巢将朱温舟師自同州至黄鄴兵自華隂至數萬攻之重榮戒勵士衆大敗之獲其兵仗軍聲益振朝廷遂授節旄檢校司􅆰俄而忠武監軍楊復光率陳蔡之師萬人與重榮合賊将李祥守華州重榮合勢攻之擒祥以徇二年京師平以功加檢校太尉同平章事封瑯邪郡王時溥為武寧軍節度光啓中黄巣攻陳州秦宗權據蔡州與賊連結徐蔡相近溥出師討之軍鋒甚盛每戰屢捷巣之敗也其将尚譲以數千人降溥溥将林言又斬巢首歸徐州溥功居第一累授檢校太尉中書令封鉅鹿郡王安文祐為潞州牙門将光啓中潞州軍校劉廣逐節度使髙潯據其城僖宗詔文祐平之既殺劉廣召赴行在授卭州刺史册府元龜卷三百五十九
