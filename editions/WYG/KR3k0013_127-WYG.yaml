body:
  text: 册府元龜巻一百二十七宋王欽若等撰帝王部明賞夫賞國之典也所以褒有功勸能者為國之大柄藏在盟府而不可廢焉歴代而下致治之后曷嘗不旌勞顯庸録勤聳善報之以封爵寵之以名秩賚之以金帛賜之以車服頒之於公朝而不僭載之於史䇿而弗忘是故懋功之義明而邦典有叙為善之效速而人倫知勸盖周官之以庸制禄先王之加膳飫賜率是道也其百世所不易者哉周惠王二年五大夫奉子頺以伐王王奔温冬立子頽明年鄭伯殺子頽王與之武公之畧自虎牢以東畧界也鄭武公傳平王賜之自虎牢以東後失其地故惠王令復與之虎牢河南成皋縣漢髙祖四年令侯公説項羽羽與漢約中分天下歸太公吕后軍皆稱萬嵗乃封侯公為平國君五年項羽兵敗自剄王翳取其頭亂相蹂蹈爭羽相殺者數十人最後楊喜吕馬童郎中吕勝楊武各得其一體故分其地以封五人皆為列侯是年漢王即皇帝位論功行封羣臣爭功嵗餘不决帝以蕭何功最盛先封為酇侯食邑八千戸羣臣皆曰臣等身被堅執鋭多者百餘戰少者數十合攻城略地大小各有差今蕭何未有汗馬之勞徒持文墨議論不戰顧居臣等上何也顧猶反也帝曰諸君知獵乎曰知之知獵狗乎曰知之帝曰夫獵追殺獸者狗也而發縱指示獸處者人也發縱謂解紲而放之也指示者以手指示之今俗言放狗縱音子用反而讀者乃為蹤蹟之蹤非也書本皆不為蹤字自有逐蹤之狗不待人發也今諸君徒能走得獸耳功狗也至如蕭何發縱指示功人也且諸君獨以身從我多者三兩人蕭何舉宗數十人皆隨我功不可忘也羣臣皆莫敢言列侯畢已受封奏位次皆曰平陽侯曹參身被七十創攻城略地功最多宜第一帝已撓功臣言多封何至位次未有以復難之然心欲何第一闗内侯鄂千秋時為謁者進曰羣臣議皆誤夫曹參雖有野戰略地之功此特一時之事夫帝與楚相距五嵗失軍亡衆跳身遁者數矣跳身謂輕身走出也然蕭何常從闗中遣軍補其處非帝所詔令召而數萬衆㑹帝乏糧者數矣夫漢與楚相守滎陽數年軍無見糧蕭何轉漕闗中給食不乏陛下雖數亡山東蕭何常全闗中以待陛下此萬世功也今雖無曹參等百數何缺於漢數音所具反漢得之不必待以全奈何欲以一旦之功加萬世之功哉蕭何當第一曹參次之帝曰善於是乃令何賜帶劍履上殿入朝不趨帝曰吾聞進賢受上賞蕭何功雖髙待鄂君迺益明於是因鄂千秋故所食闗内侯邑二千戸封為安平侯是日悉封何父母兄弟十餘人皆食邑公孫戎髙祖東圍項羽聞樊噲反旄頭公孫戎明之卒不反封戎二千戸孝文元年十月詔曰前吕産自置為相國吕祿為上將軍擅遣將軍灌嬰將兵擊齊欲代劉氏嬰留滎陽與諸侯合謀以誅吕氏吕産欲為不善丞相平與太尉勃等謀奪産等軍朱虛侯章首先捕斬産太尉勃身率襄平侯通通紀通也持節承詔入北軍典客揭揭劉揭也奪吕祿印其益封太尉勃邑萬戸賜金五千斤丞相平將軍嬰邑各三千户金二千斤朱虛侯章襄平侯通邑各二千户金千斤封典客揭為楊信侯賜金千斤六月修代來功自代時來有功者詔曰方大臣誅諸吕迎朕朕狐疑皆止朕狐之為獸其性多疑每渡氷河且聴且渡故言疑者而稱狐疑唯中尉宋昌勸朕朕已得保宗廟以尊昌為衛將軍其封昌為壯武侯諸從朕六人皆至九卿又曰列侯從髙祖入蜀者六十八人益邑各三百戸吏二千石以上從髙祖潁川守尊等十人食邑六百戸淮陽守申屠嘉等十人五百戸衛尉定等十人四百戸申屠嘉從髙祖擊項籍遷為隊率從擊黥布為都尉孝惠時為淮陽守至是舉故以二千石從髙祖者悉以為闗内侯食邑二十四人而加食邑五百户武帝元朔元年車騎將軍衛青出雲中取河南地為朔方郡以三千八百戸封青為長平侯校尉蘇建為平陵侯張次公為岸頭侯帝曰匈奴逆天理亂人倫暴長虐老以盜竊為務行詐諸蠻夷造謀籍兵數為邊害從蠻夷借兵鈔邊故興師遣將以征厥罪詩不云乎薄伐玁狁至于太原出車彭彭城彼朔方今車騎將軍青度西河至髙闕獲首二千三百級車輜畜産畢收為鹵己封為列侯遂西定河南地案榆谿舊塞上郡之北有諸次山諸次水出焉東經榆林塞為榆谿言軍尋此塞而行也絶梓嶺梁北河討蒲泥破符離絶度也為北河作橋梁也蒲泥符離二王號也符離塞名斬輕鋭之卒捕伏聴者伏於隐者聴軍虛實三千一十七級執訊獲醜敺馬牛羊百有餘萬全甲兵而還益封青三千八百戸五年春車騎將軍衛青將三萬騎出髙闕衛尉蘇建為㳺擊將軍左内史李沮為彊弩將軍沮音爼太僕公孫賀為車騎將軍代相李蔡為輕車將軍皆領屬車騎將軍俱出朔方大行李息岸頭侯張次公為將軍俱出右北平匈奴右賢王當青等兵以為漢兵不能至此飲醉漢兵夜至圍右賢王右賢王驚夜逃獨與其愛妾一人騎數百馳潰圍北去漢輕騎校尉郭成等追數百里弗得得右賢禆王十餘人禆王小王也若言禆將也禆音頻移反衆男女萬五千人畜數十百萬數十萬以至百萬於是引兵而還至塞天子使使者持大將軍印即軍中拜青為大將軍即就也諸將皆以兵屬立號而歸帝曰大將軍躬率戎士師大㨗獲匈奴王十有餘人益封青八千七百戸而封青子伉為宜春侯伉音抗又音工師反子不疑為隂安侯子登為發干侯青固謝曰固謂再三也臣幸得待罪行間頼陛下神靈軍大㨗皆諸校力戰之功也陛下幸已益封臣青臣子在襁褓中未有勤勞上幸裂地封為三侯非臣待罪行間所以勸士力戰之意也伉等三人何敢受封帝曰我非忘諸校功也今固且圗之乃詔御史曰䕶軍都尉公孫敖三從大將軍擊匈奴常䕶軍傅校獲王傅讀曰附言敖總䕶諸軍每附部校以至克㨗而獲王也校者營壘之稱故謂軍之一部為一校或曰幡旗之名非也每軍一校或别為幡耳不名校也封敖為合騎侯猶冠軍從票之名也都尉韓説從大軍出竇渾塞名也竇音田渾音魂至匈奴右賢王庭為戲下戲讀曰麾又音許宜反言在大將軍渾旗之下也摶戰獲王封説為龍頟侯頟字或作額騎將軍賀從大將軍獲王封賀為南窌侯茂陵中書云南窌侯此本字也窌音普教反奅亦同字輕車將軍李蔡再從大將軍獲王封蔡為樂安侯校尉李朔趙不虞公孫戎奴各三從大將軍獲王封朔為陟軹侯不虞為隨成侯戎奴為從平侯將軍李沮李息及校尉豆如意中郎將綰皆有功賜爵闗内侯沮息如意食邑各三百戸校尉張騫以知水草處得不乏封博望侯元狩三年霍去病為驃騎將軍將萬騎出隴西有功帝曰驃騎將軍率戎士隃烏盭隃與踰同盭古戾字也烏盭山名也討遫濮遫古速字也遫濮匈奴部落名也涉狐奴水名也歴五王國輜重人衆懾讋者弗取懾讋謂振動失志氣言距戰者誅服者則赦也讋音之涉反幾獲單于子幾音巨衣反轉戰六日過焉支山千有餘里合短兵鏖皋蘭下鏖字本從金麀聲轉寫訛耳鏖謂苦擊而多殺也皋蘭山名也言苦戰於皋蘭山下而多殺虜也鏖音意曹反今俗猶謂打擊之甚者曰鏖殺折蘭王斬盧侯王折蘭匈奴中姓也今鮮卑有是蘭姓者即其種也折音上列反鋭捍者誅全甲獲醜執渾邪王子及相國都尉㨗首虜八千九百六十級收休屠祭天金人今之佛像是也休音許虬反屠音儲師率减什七漢兵失亡之數下皆類此也益封去病二千二百戸其夏去病出北地遂深入合騎侯失道不相得去病至祁連山祁連山即天山也匈奴呼天為祁連祁音上夷反捕首虜甚多帝曰票騎將軍涉鈞耆濟居延鈞耆居延皆水名也淺曰涉深曰濟涉謂人馬涉渡也濟謂以舟船也遂臻小月氐攻祁連山楊武乎鱳得鱳得匈奴中地名張掖縣轉取其名耳得單于單栢酋涂王單栢酋涂皆胡王也酋音才由反涂音塗及相國都尉以衆降下者二千五百人可謂能舍服知成而止矣㨗首虜三萬二百獲五王王母單于閼氏王子五十九人相國將軍當戸都尉六十三人師大率减什三益封去病五千四百戸賜校尉從討小月氐者爵左庶長鷹擊司馬破奴趙破奴再從票騎將軍斬遫濮王捕稽且王且音子閭反右千騎將王王母各一人王子以下四十一人捕虜三千三百三十人前行捕虜千四百人前行謂在軍之前而行封破奴為從票侯從票騎將軍有功因以為號校尉髙不識從票騎將軍捕呼干耆王王子以下十一人捕虜千七百六十八人封不識為宜冠侯校尉僕多有功封為煇渠侯其秋渾邪降去病將兵往迎之於是帝嘉去病之功曰票騎將軍去病率師征匈奴西域王渾邪王及厥衆萌咸犇於率萌字與甿同犇古奔字也以軍糧接食并將控弦萬有餘人言能引弓皆堪戰陳誅獟悍獟􅀈行輕貌也字或作超悍勇也獟音丘昭反又音丘召反㨗首虜八千餘級降異國之王三十二戰士不離傷離遭也十萬之衆畢懐集服仍興之勞爰及河塞庶幾亡患重興軍旅之勞及北河沙塞之表可得寧息無憂患也以千七百戸益封票騎將軍减隴西北地上郡戍卒之半以寛天下繇役迺分處降者於邊五郡故塞外而皆在河南因其故俗為屬國四年霍去病出征匈奴騎兵車重與大將軍軍等重直用反而亡禆將悉以李敢等為大校當禆將出代右北平二千餘里直左方兵直當也所斬捕功以多於青既皆還帝曰票騎將軍去病率師躬將所獲葷狁之士堯曰獯鬻周曰玁狁秦曰匈奴葷字與熏同約輕齎絶大幕涉獲單于章渠章渠單于之近臣也涉水而破獲之以誅北車耆王號也轉擊左大將雙獲旗鼓歴度難侯山名也濟弓盧水名也獲屯頭王韓王等三人皆匈奴王號將軍相國當戸都尉八十三人封狼居胥山禪於姑衍登臨翰海積土增山曰封為墠祭地曰禪執訊獲醜七萬有四百四十三級師率减什二取食於敵卓行殊逺而糧不絶以五千八百戸益封票騎將軍右北平太守路博徳屬票騎將軍㑹興城不失期從至檮余山檮音籌其字從木斬首捕虜二千八百級封博徳為邳離侯北地都尉衛山從票騎將軍獲王封山為義陽侯故歸義侯因淳王復陸支樓剸王伊即靬剸音之兖反靬音居言反皆從票騎將軍有功封陸支為壯侯伊即靬為衆利侯從票侯破奴昌武侯安稽從票騎有功益封各三百戸漁陽太守解校尉敢皆獲鼓旗賜爵闗内侯解食邑三百戸敢二百戸校尉自為爵左庶長軍吏卒為官賞賜甚多而青不得益封吏卒無封者唯西河太守常惠雲中太守遂成受賞遂成秩諸侯相賜食邑二百戸黄金百斤惠爵闗内侯元封元年東粤王餘善反遣横海將軍韓説出句章樓船將軍楊僕出武林討東粤發兵距險使狥北將軍守武林敗樓船軍數校尉殺長史樓船軍卒錢塘榬終古斬狥北將軍等㑹稽縣也榬姓終古名也榬音袁封為語兒侯越中地也今吳南亭是語字或作禦其音同也自兵未往故粤衍侯吳陽前在漢漢使歸諭餘善不聴及横海軍至陽以其邑七百人反攻粤軍於漢陽及故粤建成侯敖與繇王居股謀俱殺餘善以其衆降横海軍封居股為東成侯萬戸封敖為開陵侯封陽為夘石侯横海將軍説為按道侯横海校尉福為繚嫈侯繚音遼嫈音於耕反福者城陽王子故為海常侯坐法從軍爵亡故以宗室故侯及東粤將多軍多軍名漢兵至棄軍降封為無錫侯故甌落將左黄同斬西于王封為下鄜侯鄜音郛二年左將軍荀彘等擊朝鮮王右渠朝鮮相陶唊路人皆亡降漢路人道死三年夏尼谿相參迺使人殺朝鮮王右渠來降王守險城未下故右渠之大臣成已又反覆改變左將軍使右渠子長右渠之子名長降相路人子最相路人前已降漢而死於道故謂之降相最者其子名告諭其民誅成已故遂定朝鮮為貞番臨屯樂浪𤣥莬四郡封參為澅清侯澅音獲陶為秋苴侯功臣表秋苴屬渤海苴音千餘反唊為平州侯長為幾侯最以父死頗有功為􅄺陽侯太初四年貳師將軍李廣利斬大宛王首獲汗血馬來乃下詔曰匈奴為害乆矣今雖徙幕北與旁國謀共絶大月氐使遮殺中郎將江故鴈門守攘危須以西及太宛皆合約殺期門車令危須國名也漢使期門郎也車令姓名也中郎將朝及身毒國使隔東西道貳師將軍廣利征討厥罪伐勝大宛頼天之靈從泝河北涉流沙通西海山雪不積士大夫徑度獲王首虜珍怪之物畢陳於闕其封廣利為海西侯食邑八千戸又封斬郁成王者趙弟為新畤侯軍正趙始成功最多為光祿大夫上官桀敢深入為少府李哆有計謀為上黨太守哆音昌野反軍官吏為九卿者三人諸侯相郡守二千石百餘人千石以下千餘人奮行者官過其望以適過行者皆黜其勞適讀曰讁士卒賜直四萬錢或以他財物充之故曰直征和二年戾太子反軍敗武帝曰侍郎莽通獲反將如侯長安男子景建從獲少傅石徳可謂元功矣大鴻臚商丘成力戰獲反將張光其封通為重今侯建為徳侯成為􅀈侯􅀈音妬在濟隂城武今有亭戾太子兵敗亡至湖湖縣名今虢州閿鄉湖城二縣皆其地也臧匿泉鳩里泉鳩水今在閿鄉縣東南十五里見有戾太子冡在澗東也主人家貧常賣屨以給太子太子有故人在湖聞其富贍使人呼之贍足也而發覺吏圍捕太子太子自度不得脱度音大各反即入室距户自經山陽男子張富昌為卒足蹋開戸新安令史李夀趨抱解太子主人公遂格鬭死皇孫二人皆并遇害上既傷太子乃下詔曰盖行疑賞所以申信也其封李夀為䢴侯䢴在河内為其解救太子也䢴音于張富昌為題侯三年城父令公孫勇與客胡倩等謀反倩詐稱光祿大夫從軍騎數十言使督盗賊止陳留傳舍太守謁見欲収取之淮陽太守田廣明覺知發兵皆捕斬焉而公孫勇衣繡衣乗駟馬車至圉圉使小吏侍之亦知其非是守尉魏不害與廐嗇夫江徳尉史蘇昌共收捕之帝封不害為當塗侯徳轑陽侯昌蒲侯初四人俱拜於前小吏竊言武帝問言何對曰為侯者得東歸不帝曰汝欲不貴矣言汝意欲歸不吾今貴汝謂賜之爵也女鄉名為何對曰名遺鄉帝曰用遺汝也遺弋季反於是賜小爵闗内侯食遺鄉六百戸後元元年侍中僕射馬何羅與弟重合侯通謀為逆莽音莫户反霍光與金日磾上官桀等共誅之功未錄武帝遺詔封金日磾為􅀈侯上官桀為安陽侯光為博陸侯博大陸平取其嘉名無此縣也食邑北海河東城皆以前捕反者功封昭帝始元六年使匈奴移中廐監移中廐名蘇武至京師詔武奉一太牢謁武帝園廟拜為典屬國秩中二千石賜錢二百萬公田二頃宅一區常惠徐聖趙中根皆拜為中郎賜帛各二百匹其餘六人老歸家賜錢人十萬復終身復音方目反武自孝武時使匈奴留單于庭十九年帝即位匈奴與漢和親遣使求武等單于召㑹武官屬㑹謂集聚也前以降及物故凡隨武還者九人物故謂死也言其同於鬼物而故也一説不欲斥言但云其所服用之物皆已故耳而説者妄欲改物為勿非也故有是命元鳳元年十月誅上官桀等詔曰左將軍安陽侯桀票騎將軍桑落侯安御史大夫桑𢎞羊皆數以邪枉干輔政大將軍不聴而懐怨望與燕王通謀置驛往来相約結燕王遣夀西長孫縱之等賂遺長公主丁外人謁者杜延年大將軍長史公孫遺等交通私書共謀令長公主置酒伏兵殺大將軍光徴立燕王為天子大逆毋道故稻田使者燕倉先發覺以告大司農敞敞告諫大夫延年延年以聞丞相徴事任宫手捕斬桀丞相少史王夀誘將安入府門皆已伏誅吏民得以安封延年倉宫夀皆為列侯三年匈奴遣右賢王犁汗王入寇張掖都尉大擊破之屬國千長義渠王騎士射殺犁汗王千長者干人之長賜黄金二百斤馬二百匹因封為犁汗王屬國都尉郭忠封成安侯四年詔曰度遼將軍范明友前以羗騎校尉將羗王侯君長以下擊益州反虜後復率擊武都反氐今破烏桓斬虜獲生有功其封明友為平陵侯平樂廐監傅介子使西域刺殺樓蘭王持首還詣闕公卿將軍議者咸嘉其功帝迺下詔曰樓蘭王安歸嘗為匈奴間候遮殺漢使者言為匈奴之間使而候伺發兵殺略衛司馬安樂光禄大夫忠期門郎遂成等三輩及安息大宛使盗取節印獻物此安息大宛逺遣使獻漢而樓蘭王使人盗取所獻之物大宛等使所獻也樓蘭既殺漢使又殺諸國使者甚逆天理平樂監傅介子持節使誅斬樓蘭王安歸首縣之北闕以直報怨論語以直報怨以徳報徳言怨於我者則直道而報之故詔引之也不煩師衆其封介子為義陽侯食邑七百戸士刺王者皆補侍郎宣帝本始元年論定䇿功益封大將軍光萬七千戸車騎將軍光禄勲富平侯安世封益萬戸丞相陽平侯義度遼將軍平陵侯明友前將軍龍額侯增太僕建平侯延年太常蒲侯昌諫大夫宜春侯譚當塗侯平杜侯屠耆堂長信少府闗内侯勝邑戸各有差封御史大夫廣明為昌永侯後將軍充國為營平侯大司農延年為陽城侯少府樂成為爰氏侯光祿大夫遷為平丘侯賜右扶風徳典屬國武廷尉光宗正徳大鴻臚賢詹事畸光祿大夫吉京輔都尉廣漢爵皆闗内侯徳武食邑舊闗内侯無邑也以蘇武守節外國劉徳宗室俊彦故特令食邑又傳云帝即褒賞大臣田延年以定䇿安宗廟益戸三千三百與始封所食邑凡四千三百戸詔有司論定䇿功大司馬大將軍光功徳過太尉絳侯周勃車騎將軍安世丞相楊敞功比丞相陳平前將軍韓增御史大夫蔡誼功比頴隂侯灌嬰太僕杜延年功比朱虛侯劉章後將軍趙充國大司農田延年少府史樂成功比典客劉揭遂封侯地節四年霍氏誅下詔曰大司馬禹與母顯及從昆弟諸壻謀為大逆男子張章先覺發以語期門董忠忠告左曹楊惲惲告侍中金安上惲召見對狀後章上書以聞侍中史髙與金安上建發其事言其立意發之言無入霍氏禁闥卒不得遂其謀遂成也皆讎有功讎等也言其功相等類也封章為博成侯忠髙昌侯惲平通侯安上都成侯髙樂陵侯安上為侍中頗與發舉楚王延夀反謀賜爵闗内侯食邑三百戸後霍氏反安上傳禁門闥無内霍氏親屬封為都成侯元帝永光二年秋隴西羗彡姐旁種反以光祿勲馮奉世為右將軍擊之任千秋為奮武將軍以助焉羗虜大破斬首數千級餘皆出走塞明年二月奉世還京師更為上將軍光祿勲如故錄功拜爵下詔曰羗虜桀黠賊吏民攻隴西府寺燔燒置亭置謂直驛之所絶道橋甚逆天道左將軍光禄勲奉世前將兵征討斬捕首虜八千餘級鹵馬牛羊以萬數賜奉世爵闗内侯食邑五百戸黄金六十斤將校三千餘人皆拜成帝永始二年十二月詔曰前將作大匠萬年知昌陵卑下不可為萬嵗居奏請營作建置郭邑妄為巧詐積土增髙多賦斂繇役興卒暴之作卒讀曰猝謂急也卒徒蒙辜死者連屬屬音之欲反百姓罷極天下匱竭罷讀曰疲匱空也竭盡也常侍閎前為大司農中丞數奏昌陵不可成侍中衛尉長數白宜早止徙家反故處長淳于長也朕以長言下閎章以衛尉長數白罷故因下閎請奏罷作之章公卿議者皆合長計首建至䇿閎典主省大費司農中丞主錢穀顧庸故謂典主民以康寧閎前賜爵闗内侯黄金百斤其賜長爵闗内侯食邑千户閎五百戸三年十一月尉氏男子樊並等十三人謀反尉氏陳留之縣殺陳留太守刼略吏民自稱將軍徒李譚等五人共格殺並等皆封為列侯哀帝以綏和二年四月即位六月詔曲陽侯根前以大司馬建社稷䇿益封二千户王根也建議立哀帝為太子太僕安陽侯舜輔道有舊恩益封五百戸王舜及丞相孔光大司空汜鄉侯何武益封各千户後漢光武建武二年正月甲子吳漢率大司空王梁建義大將軍朱祐大將軍杜茂執金吾賈復揚化將軍堅鐔偏將軍王霸騎都尉劉隆馬武隂識共擊檀鄉賊於鄴東鄣水上大破之降者十餘萬人帝使使者璽書定封漢為廣平侯食廣平斥漳曲周廣年凡四縣庚辰詔曰人情得足苦於放縱快須㬰之欲忘慎罰之義惟諸將業逺功大誠欲傳於無窮宜如臨深淵如履薄氷戰戰慄慄日慎一日其顯効未酬名籍未立者大鴻臚趣上朕將差而錄之六年二月大司馬吳漢拔朐獲董憲龎萌山東悉平諸將還京師置酒賞賜是年竇融為凉州牧與弟奉車都尉友從弟太中大夫士共擊隗囂衆大潰城邑皆降帝髙融功下詔以安豐陽泉蓼安安風四縣封融為安豐侯弟友為顯親侯遂以次封諸將帥武鋒將軍竺曽為助義侯武威太守梁統為成義侯張掖太守史苞為褒義侯金城太守庫鈞為輔義侯酒泉太守辛彤為扶義侯封爵既畢乗輿東歸悉遣融等西還所鎮十三年夏四月大司馬吳漢自蜀還京師於是大饗將士班勞䇿勲班布也謂徧布勞來之其有功者以䇿書紀其勲也勞音力到反功臣增邑更封凡三百六十五人其外戚恩澤封者四十五人明帝永平十三年男子燕廣告楚王英有逆謀英自殺於是封燕廣為折姦侯周澤為太常後北地太守廖信廖音力弔反坐貧穢下獄没入財産明帝以信藏物班諸亷吏唯澤及光祿􅈴孫堪大司農常冲特䝉賜焉是時京師翕然在位者咸自勉勵章帝建初元年耿恭為戊巳校尉北匈奴圍之恭固守漢遣兵迎之及恭至雒陽鮑昱奏恭節過蘇武宜䝉爵賞於是拜為騎都尉以恭司馬石修為雒陽市丞張封為雍營司馬軍吏范羗為共丞共今衛州共城縣餘九人皆補羽林恭母先卒及還追行喪制有詔使五官中郎將齎牛酒釋服和帝永元二年七月車騎將軍竇憲既破北單于乃振旅還京師于是大開倉府勞賜士吏其所將諸郡二千石子弟從征者悉除太子舍人安帝永初二年西羗零昌種衆寇益州遣中郎將尹就將南陽兵因發益部郡諸屯兵擊零昌黨吕叔都等至秋蜀人陳省羅横應募刺殺叔都皆封侯賜錢五年鄧遵募上郡全無種羗雕何等刺殺狼莫賜雕何為羗侯封遵武陽侯三千户其年漢陽人杜琦及弟季貢同郡王信等與羗通謀聚入上邽城琦自稱安漢將軍於是詔購募得琦首者封列侯賜錢百萬羗胡斬琦者賜金百斤銀二百斤漢陽太守趙博遣刺客杜習刺殺琦封習討姦侯賜錢百萬順帝初為太子安帝延光三年車騎將軍閻顯中常侍江京等構陷帝廢為濟隂王明年北鄉侯薨中常侍孫程等迎帝於徳陽殿西鍾下即位近臣尚書以下從輦幸南宫者皆增秩賜布各有差郭鎮為尚書及中黄門孫程誅江京等立帝鎮率羽林士擊殺閻景以成大功再遷尚書令太傅三公奏尚書鎮冐犯白劍手刄賊臣姦黨於滅宗廟以寧功比劉章章齊王肥子也髙帝孫誅諸吕有功封朱虛侯宜顯爵土以勵忠貞乃封鎮為定頴侯食邑二千戸桓帝延熹二年八月詔曰梁冀姦暴濁亂王室孝質皇帝聰敏早茂冀心懐忌畏私行殺毒永樂太后親尊莫二和平元年有司奏太后所居皆以永樂為稱置官屬太僕少府焉冀又遏絶禁還京師使朕離母子之愛隔顧復之恩禍害深大罪釁日滋頼宗廟之靈及中常侍單超徐璜具瑗左悺唐衡尚書令尹勲等激憤建䇿内外恊同漏刻之間桀逆梟夷斯誠社稷之祐臣下之力宜班慶賞以酬忠勲其封超等五人為縣侯􅈴等七人為亭侯獻帝建安元年車駕歸洛陽封衛將軍董承輔國將軍伏完侍中丁冲种輯尚書僕射鍾繇尚書郭溥御史中丞董分彭城相劉艾馮翊韓斌東郡太守楊衆議郎羅郡伏徳趙㽔等十三人為列侯賞有功也魏太祖以建安十二年春二月下令曰吾起義兵誅暴亂於今十九年所征必克豈吾功哉乃賢士大夫之力也天下雖未悉定吾當要與賢士大夫共定之而專饗其勞吾何以安焉其促定功行封於是大封功臣二十餘人皆為列侯其餘各以次受封及復死事之孤輕重各有差太祖曰忠正宻謀撫寧内外文若是也公達其次也文若增邑千戸合二千戸公達增邑四百并前七百戸太祖自栁城還過攸舍稱述攸前後謨謀勞勲曰今天下事畧已定矣孤願與賢士大夫共享其勞昔髙祖使張子房自擇邑三萬戸今孤亦欲君自擇所封焉轉為中軍師文若荀彧公達荀攸文帝黃初四年八月論征孫權功諸將已下進爵增戸各有差明帝太和二年四月己巳論討諸葛亮功封爵增邑各有差亮初出祁山盪寇將軍張郃位特進遣督將軍拒亮將馬謖於街亭謖依阻南山不下據城郃絶其汲道擊大破之南安天水安定郡反應亮郃皆破平之詔曰賊將以巴蜀之衆當虓虎之帥將軍被堅執鋭所向克定朕甚嘉之益邑千戸并前四千三百戸景初二年司馬宣王征公孫淵遼東郡縣悉平錄討淵功宣王以下增邑封爵各有差乂以遼東平定以參謀之功各進爵中書監劉放方成侯中書令孫資中都侯髙貴鄉公甘露二年五月己夘詔曰諸葛誕造攝逆亂廹脅忠義平寇將軍臨渭亭侯龎㑹騎督偏將軍路蕃各將左右斬門突出忠莊勇烈所宜加異其進㑹爵鄉侯蕃封亭侯六月大論淮南之功封爵行賞各有差陳留王景元四年西蜀譙周説劉禪降魏劉氏無虞一邦䝉頼周之謀也時晉文王為相國以周有全國之功封陽城亭侯咸熙元年七月癸巳詔曰前逆臣鍾㑹構造反亂聚集征行將士刼以兵威始吐姦謀發言桀逆逼脅衆人皆使下議倉卒之際莫不驚懾相國左司馬夏侯和騎士曹屬朱撫時使在成都中領軍司馬賈輔郎中羊琇各參㑹軍事和琇撫皆抗節不撓拒㑹凶言臨危不顧詞㫖正烈輔語散將王起說㑹姦逆凶暴欲殺將士又云相國已率三十萬衆西行討㑹欲以稱張形勢感激衆心起出以輔言宣語諸軍遂使將士益懐奮勵宜加顯寵以彰忠義其進和輔爵為鄉侯琇撫爵闗内侯起宣傳輔言告令將士所宜賞異其以起為部曲將晉武帝泰始六年凉州為虜所没帝臨朝歎曰誰能為我討此虜乎司馬督馬隆曰臣能平之公卿僉曰不可從也帝弗納以隆為武威太守隆西渡温水轉戰千里殺傷以千數自隆之西音問斷絶朝廷憂之或謂已没後隆使夜到帝撫掌歡笑詰朝召羣臣謂曰若從諸卿言是無秦涼也乃詔曰隆以偏師寡衆奮不顧難冐險能濟其假節宣威將軍加赤幢曲盖鼓吹凉州既平朝議將加隆將士􅈴賞有司奏隆將士皆先加顯爵不應更授衛將軍楊珧駁曰前精募將士少加爵命者此適所以為誘引今隆前軍獨尅西土獲安不得便以前授塞此後功宜皆聴許以明要信乃從珧議賜爵加秩各有差太康元年平吳下詔曰使持節都督揚州諸軍事安東將軍京陵侯王渾督率所統逐逼秣陵令賊孫皓救死自衛不得分兵上赴以西軍之功又摧大敵獲張悌使皓塗窮勢盡面縳乞降遂平定秣陵功勲茂著其封八千戸進爵為公封子澄為亭侯弟湛為闗内侯賜絹八千匹轉征東大將軍王濬為東平將軍縳吳孫皓送京師以濬為安東將軍為王渾所嫉及濬至京都有司奏濬表既不列前後所被七詔月日又赦後違詔不受渾節度大不敬付廷尉科罪詔曰濬前受詔徑造秣陵後乃下受渾節度詔書稽留所下不至便令與不受詔同責未為經通濬不即表上被渾宣詔此可責也濬有征伐之勞不足以一𤯝掩之有司又奏濬赦後燒賊船百三十五艘輒勑付廷尉禁推詔曰勿推拜濬輔國大將軍領步兵校尉舊校唯五置此營自濬始也有司又奏輔國依此未為違官不置司馬不給官騎詔依征鎮給五百大車增兵五百人為輔國營給親騎百人官騎十人置司馬為襄陽縣侯邑萬戸封子彛陽鄉亭侯邑千五百戸賜絹萬匹又賜衣一襲錢三十萬及食物又詔曰廣武將軍唐彬受任方隅東禦吳寇南臨蠻越撫寧疆塲有禦綏之績又毎慷慨志在立功頃者征討扶疾奉命首啟戎行獻俘授馘勲效顯著其以彬為右將軍都督巴東諸軍事徴拜翊軍校尉改封上庸縣侯食邑六千户賜絹六千匹又詔曰尚書闗内侯張華前與故太傅羊祜共創大計遂典掌軍事部分諸方筭定權畧運籌决勝有謀謨之􅈴其進封為廣武縣侯增邑萬户封子一人為亭侯千五百户賜絹萬匹於是論功行封賜公卿以下帛各有差明帝太寧二年王敦平以王導為始興郡公邑三千户賜絹九千匹丹陽尹溫嶠建寧縣公尚書卞壺建興縣公中書監庾亮永興縣公北中郎將劉遐泉陵縣公奮武將軍蘇峻邵陵縣公邑各一千八百户絹各五千四百匹尚書令郄鑒髙平縣侯䕶軍將軍應詹觀陽縣侯邑各千六百户絹各千八百匹建威將軍趙裔湘南縣侯右將軍卞敦益陽縣侯邑各千六百户絹各三千二百匹其餘封賞各有差成帝咸和四年蘇峻平三月壬子以征西大將軍陶侃為太尉封長沙郡公車騎將軍郄鑒為司空封南昌縣公平南將軍温嶠票騎將軍開府儀同三司封始安郡公其餘封拜各有差右光禄大夫陸􅁮不以凶威變節加衛將軍給千兵百騎又以􅈴進爵為公封次子嘏新康子孝武太元十年論淮淝之功追封謝安廬陵郡公封謝石南康公謝𤣥康樂公謝琰望蔡公桓伊永修公自餘封拜各有差安帝義熈十年十月桓𤣥敗車駕反正論興復之功封車騎將軍劉裕為豫章郡公撫軍將軍劉毅南平郡公右將軍何忌安成郡公自餘封賞各有差十一年論平蜀功封劉義隆彭城公朱齡石豐城公後魏道武登國二年正月班賜功臣長孫嵩等七十三人各有差三年六月北征康莫奚大破之獲其四部雜畜十餘萬渡弱落水班賞將士各有差六年十月北征蠕蠕追之及於大磧南林山下大破之班賜從臣有差十年十月大破慕容寳衆於參合陂班賞大臣將校各有差孝文大和六年二月癸丑賜王公以下清勤著稱者榖帛有差宣武景明初傅永為汝陽鎮將時裴叔業將以夀春歸國宻通於永永具表聞及將迎納詔永為統軍與楊大眼奚康生等諸軍俱入夀春同日而永在後故康生大眼二人並賞列土永唯加清河男前廢帝普泰元年八月庚子詔隴西王爾朱光天下文武討宿勤明達者泛三級後廢帝中興元年十月齊獻武王大破爾朱兆於廣阿虜其卒五千餘人詔將士泛五級留守者一級二年齊獻武王抜鄴擒刺史劉誕詔諸將士泛四級封侯增邑九十七人各有差後周武帝建徳五年十二月以平齊諸有功者封授各有差六年二月論定齊諸軍􅈴置酒於齊太極殿會軍士以班賜有差王勇本名胡仁為衛大將軍殷州刺史邙山之戰勇率敢死之士三百人並執短兵大呼直進出入衝擊殺傷者甚多敵人無敢當者是役也大軍不利唯勇及王文達耿令貴三人力戰皆有殊功帝於是賞帛二千匹令自分之軍還皆拜上州刺史以雍州岐州北雍州擬授勇等然州頗有優劣又令探籌取之勇遂得雍州文達得岐州令貴得北雍州仍賜勇名為勇令貴名豪達名傑以彰其功隋文帝時叚達為車騎將軍髙智恵李勣之亂達率衆一萬擊方滁二州賜縑千段遷儀同又破汪文進於宣州加開府賜奴婢五十口綵絹四千叚煬帝時突厥圍鴈門鴻臚少卿蘇憂於鎮城東南為弩樓東箱獸圏一夕而就帝見善之以功進位通議大夫冊府元龜巻一百二十七
