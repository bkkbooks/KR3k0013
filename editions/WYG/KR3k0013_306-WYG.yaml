body:
  text: 册府元龜卷三百六宋王欽若等撰外戚部奢縱專恣驕慢奢縱夫位不期驕而傲逸之自至欲不可縱而禮度之遂愆故先儒以爲損之招而惡之大也漢室而下乃有藉帝闈之勢處外姻之貴罔思􅂶己靡圖進德不以盛滿而爲戒姑務紛華而自恣乃至輿服奉養之物極其珍麗室宇晏樂之具過於豪縱踰矩而弗禁怙奢而彌放其或盈而蕩佚而邪天實禍滛咎不旋踵惟其所召孰將見哀至乃獲免於身克終牖下彼其之誚亦足醜焉漢田蚡孝景王皇后同母弟也爲丞相嘗請考工地益宅帝怒曰遂取武庫是後廼退考工少府之屬官也主作器械帝責其此請謂之曰何不遂取武庫蚡乃退也召客飲坐其兄蓋侯北鄉自坐東鄉自處尊位也鄉讀皆曰嚮以爲漢相尊不可以兄故私撓撓曲也音女教切由此滋驕滋益也治宅甲諸第言爲諸第之上也以甲乙之次甲則爲上矣田園極膏腴膏腴謂肥厚之處市買郡縣器物相屬於道屬連及也音之欲切前堂羅鐘皷立曲旃旃旗之名也通帛曰旃曲旃僭也禮大夫建旃曲柄上曲也許愼云旃旗曲柄也所以旌表士衆也後房婦女以百數諸奏珍物狗馬玩好不可勝數奏進也霍禹孝宣皇后之兄也禹嗣父光爲愽陸侯與弟山並繕治第宅走馬馳逐平樂館光兄孫雲當朝請數稱病私出多從賔客張圍獵黄山苑中使蒼頭奴上朝謁莫敢譴者史丹祖父恭女弟為衞太子良娣産悼皇考宣帝微時依倚史氏恭子髙爲大司馬車騎將軍領尚書事封樂陵侯成帝初丹爲左將軍光禄大夫封武陽侯尤得信於帝丹兄嗣父爵爲侯讓不受分丹盡得父財身又食大國邑重以舊恩數見褒賞賞賜累千金僮僕以百數後房妻妾數十人丹奢滛好飲酒極滋味聲色之樂王譚成帝舅也封平阿侯譚弟商成都侯立紅陽侯根曲陽侯逄時髙平侯世謂之五侯羣弟争為奢侈賂遺珍寶四面而至後庭姬妾各數十人僮奴以千百數羅鐘磬舞鄭女作倡優狗馬馳逐大治第室起土山漸臺洞門髙廊閣道連屬彌望彌竟也言望之極目也屬音之欲切百姓歌之曰五侯初起曲陽最怒壊決髙都連竟外杜壊決髙都水入長安髙都水在長安西也杜鄠二縣之間田畆一金言其境自長安至杜陵也一云長安冇髙都外杜里既壊決髙都作殿復衍及外杜里成都侯商自擅穿帝城引水耳曲陽無此事又雖作大第宅不得從長安至杜陵也土山漸臺西白虎皆放效天子之制也其僭奢如此王商成帝舅成都侯嘗病欲避暑從帝借明光宫明光宫在城内近桂宫也後又穿長安城引内灃水注第中大陂以行舩立羽葢張周帷輯濯越歌輯與楫同濯與櫂同皆所以行舩也令執櫂楫人爲越歌也楫謂櫂之短者也今吳越之人呼爲橈音鐃越歌爲越之歌帝幸商第見穿城引水意恨内銜之曲陽侯根驕奢僭上赤墀青瑣以青畫戸邊鏤中天子制也謂刻爲連瑣文而青塗之也後漢馬防明徳皇后之兄也拜光禄勲後以病乞骸骨詔賜故山中王田廬以特進就第防兄弟貴盛奴婢各千人以上資産巨億皆買京師膏腴美田又大起第觀連閣臨道彌亘街路多聚聲樂曲度比諸郊廟賔客奔湊四方畢至竇憲章徳皇后之兄也爲大將軍弟篤爲衛尉景瓌皆侍中奉車駙馬都尉四家競修第宅窮極工匠梁冀順烈皇后之兄也爲大將軍乃大起第舍堂寢皆有陰陽奥室連房洞戸柱壁雕鏤加以銅漆牎牖皆有綺疏青𤨏圖以雲氣仙靈臺閣周通更相臨望飛梁石磴陵跨水道金玉珠璣異方珍怪充積藏室逺致汗血名馬又廣開園囿採土築山十里九坂以象二崤深林絶澗有若自然竒禽馴獸飛走其間冀與妻孫壽共乘輦車張羽葢飾以金銀游觀第内多從倡妓鳴鐘吹管酣謳竟路或連繼日夜以騁娛恣客到門不得通皆請謝門者門者累千金又多拓林苑禁同王家西至𢎞農東界滎陽南極魯陽北逹河淇包含山藪逺帶丘荒周旋封域殆將千里又起兔苑於河南城西經亘數十里發屬縣卒徒繕修樓觀數年乃成移檄所在調發生兔刻其毛以爲識人有犯者罪至刑死冀又改易輿服之制作平上軿車鄭𤣥注周禮云軿猶屏也所用自蔽隱也蒼頡篇云衣車也形制上平異於常也埤幘狹冠埤下也音頻爾切一音皮彼切折上巾盖折其巾之上角也擁身扇大扇也狐尾單衣後裾曳地若狐尾也冀又以火浣布爲單衣晉大㑹賔客冀陽争酒失杯而汙之僞怒解衣燒之布得火煒􅋫赫然如燒凡布垢盡火滅燦然潔白若用灰水焉晉羊琇景獻皇后之從父弟性豪侈費用無齊限而屑炭和作獸形以溫酒雒下豪貴咸競效之又喜遊讌以夜續晝放恣犯法每為有司所貸其後司𨽻校尉劉毅劾之應至重刑武帝以舊恩直免官而已王愷文明皇后之弟爲後將軍愷既世族國戚性復豪侈及石崇羊琇之徒以奢侈相尚愷作紫絲歩障四十里又用赤石脂塗壁王濟尚常山公主年二十起家爲中書郎遷侍中出爲河南尹未拜坐鞭王官吏免官於是移第北邙山下性豪侈麗服玉食時雒京地甚貴濟買地爲馬埒編錢滿之時人謂之金溝帝嘗幸其宅供饌甚豐悉貯琉璃器中蒸豚甚美帝問其故答曰以人乳蒸之帝色甚不平食未畢而去賈謐惠皇后妹之子本姓韓以賈后之勢資其驕寵奢侈踰度室宇崇僭器服珍麗歌僮舞女選極一時宋徐湛之母髙祖女㑹稽公主爲尚書僕射湛之貴戚豪家産業甚厚室宇園池貴遊莫及音樂之妙冠絶一時門生千餘皆三吳富人之子姿質端妍衣服鮮麗每出入行遊塗巷盈滿泥雨日悉以後車載之太祖嫌其侈縱每以爲言時安成公何朂無忌之子也臨汝公孟靈休昶之子也並各奢豪與湛之共以肴饍器服車馬相尚京邑爲之語曰安成食臨汝飾湛之二事之美兼於何孟何邁尚太祖第十女新蔡公主邁少以貴戚居顯官好犬馬馳逐多聚才力之士有墅在江乘縣界去京師三十里邁每遊履輙結駟連騎武士成羣南齊何戢尚宋孝武長女山陰公主爲吏部尚書家業富盛性又華侈衣服被飾極爲奢麗後魏馮熈文明太后之兄也爲雒州都督因事取人子女爲奴婢有容色者幸之爲妾有子女數十人號爲貪縱北齊爾朱文暢魏孝莊皇后弟也爲肆州刺史家富於財招致賔客既藉門地極窮豪侈婁叡武明皇后兄子也叡無器幹唯以外戚貴幸而縱情財色為時論所鄙唐楊愼交尚中宗女長寧公主爲駙馬都尉與武崇訓等各將油灑地以築毬塲用功數百萬妨害農務斂怨於人武延秀拜右衞將軍駙馬都尉於金城坊造宅窮極奢麗延秀既恃恩放縱無所忌憚楊國忠𤣥宗貴妃從父之子爲右相兼劒南節度與貴妃姊虢國夫人於宣揚里連搆甲第土木被綈繡棟宇之盛兩都莫比晝㑹夜集無復禮度有時與虢國夫人聨轡入朝揮鞭走馬以爲諧謔衢路觀者無不駭歎每扈蹕驪山國忠以劒南幢節引於前出有餞路還有軟脚逺近餉遺珍玩狗馬閹侍歌兒相望于道國忠子暄爲太常卿兼戸部侍郎尚延和郡主暄弟昢爲鴻臚卿尚萬春公主兄弟各於親仁里立第窮極奢侈杜悰爲駙馬都尉位極將相以服御飲饌自奉務極華侈梁趙巖尚太祖女長樂公主爲戸部尚書充租庸使巖聞唐朝駙馬都尉杜悰服御飲饌華侈巖耻其不及繇是豐其飲膳嘉羞法饌動費萬錢僦歛網羅其徒如市權勢燻灼人皆阿附及唐莊宗至巖踰垣而逸素與許州温韜相善巖徃依之既至韜斬巖首送京師專恣甥舅之戚暱莫加焉而宗周之禮以異姓爲後帶礪之盟厚莫重焉而隆漢之制非劉氏不王皆所以强幹而弱枝防微而杜漸也人亡政息世變風移牝雞司晨尚書之訓無補彼重而角詩人之刺足聞於是親黨並興寵倖滋熾貲富埒人主權勢踰本枝小則避燻之狐託神丘而逞志大則時術之蟻漏山阿而搆災博觀前聞用埀明誡魏冉秦昭王母宣太后之弟也昭王即位以冉爲將軍昭王諸兄弟不善者皆滅之威振秦國昭王少宣太后自治任冉爲政昭王三十六年魏人范雎言宣太后專制穰侯擅權於諸侯昭王悟免冉相國出闗就封邑穰侯出闗輜車千乘有餘漢田蚡武帝母王太后異母弟爲太尉雖不任職以王太后故親幸數言事多效效謂見聼用士吏趨執利者皆去丞相竇嬰而歸蚡蚡日益横六年竇太后薨丞相昌御史大夫翟青坐䘮事不辦免帝以蚡爲丞相天下士郡諸侯愈益附蚡郡及諸侯也猶言郡國耳蚡爲人貌侵生貴甚侵短小也生貴謂自尊髙示貴寵也又以爲諸侯王多長多長年武帝初即位富於春秋謂年㓜也蚡以肺附爲相舊解云肺附如肝肺之相附著一説肺斫木札也其輕薄附著大材也非痛折節以禮屈之天下不肅痛猶甚也言以尊貴臨之皆令其屈節而下已也當是時丞相入奏事語移日所言皆聼薦人或起家至二千石權移主上帝迺曰君除吏盡未吾亦欲除吏上官桀爲左將軍與大將軍霍光結婚相親光長女爲桀子安妻有女年與帝相配桀因帝姉鄂邑蓋主内安女後宫爲倢伃鄂邑所食邑爲葢侯所尚故云蓋主數月立爲皇后父安爲驃騎將軍封桑樂侯光時休沐出桀輙入代光决事霍禹光子光薨禹嗣爲博陸侯魏相爲御史大夫後兩家奴争道謂霍氏及御史家霍氏奴入御史府欲躢大夫門御史爲叩頭謝廼去王鳳成帝長舅封平陽侯爲大司馬大將軍領尚書事王氏子弟皆卿大夫侍中諸曹分據勢官滿朝廷鳳用事帝遂謙讓無所顓顓與專同凡事皆不自專也左右嘗薦光禄大夫劉向少子歆通達有異材帝召見歆誦讀詩賦甚悦之欲以爲中常侍召取衣冠臨當拜左右皆曰未曉大將軍曉猶白也曰此小事何須闗大將軍左右叩頭爭之帝於是語鳳鳳以爲不可廼止其見憚如此帝即位數年無繼嗣體常不平定陶共王來朝天子留不遣歸國曰爾長留侍我矣其後天子疾益有瘳定陶共王因留國邸旦夕侍帝甚親重鳳心不便共王在京師㑹日蝕鳳因言日蝕隂盛之象為非常異定陶王雖親於禮當奉藩在國今留侍京師詭正非常詭違也故天見戒見顯示宜遣王之國帝不得已於鳳而許之共王辭去帝與相對涕泣而决京兆尹王章以為鳳建遣共王之國非是廼奏封事言日蝕之咎矣天子召見章延問章對曰日蝕陰侵陽臣顓君之咎今政事大小皆自鳳出天子曾不一舉手鳳不内省責反歸咎善人推逺定陶王鳳不可令久典事宜退使就第天子感悟納之因薦瑯琊太守馮野王以代鳳鳳聞之上疏乞骸骨辭㫖甚哀帝少而親倚鳳弗忍廢使尚書劾章章死獄中妻子徙合浦自是公卿見鳳側目而視郡國守相刺史皆出其門王莽孝元皇后弟子莽為大司馬與議立嗣共徵立中山王奉哀帝後是爲平帝帝年九歳太后臨朝委政於莽莽顓威福紅陽侯立莽諸父平阿侯仁素剛直莽内憚之令大臣以罪過奏遣立仁就國莽日誑燿太后言輔政致太平羣臣奏請尊莽為安漢公後遂遣使者逼守立仁令自殺後漢竇融在宿衞十餘年年老子孫縱誕多不法長子穆等遂交通輕薄屬託郡縣干亂政事以封在安豐欲令姻戚悉據故六安國遂矯稱陰太后詔令六安侯劉盱去婦因以女妻之五年盱婦家上書言狀帝大怒乃盡免穆等官諸竇為郎吏者皆將家屬歸故郡獨留融京師竇憲章徳皇后兄也恃宫掖聲勢遂以賤直請奪沁水公主園田沁水公主明帝女主逼畏不敢計後肅宗駕出過園指以問憲憲陰喝不得對陰喝猶噎塞也陰音於禁切喝音一介切或作嗚音烏故切後發覺帝切責之及憲平匈奴威名大盛以耿䕫任尚等為爪牙鄧疊郭璜為心腹班固傅毅之徒皆置幕府以典文章刺史守令多出其門尚書僕射郅壽樂恢並以忤意相繼自殺郅壽惲子由是朝臣震懾望風承㫖竇景憲之弟爲執金吾子孫放縱張酺爲河南尹景家人復擊傷市卒吏捕得之景怒遣緹騎侯海等五百人毆傷市丞酺部吏楊章等窮究正海罪徙朔方景忿怨乃移書辟章等六人爲執金吾吏欲因報之章等惶恐入白酺願自引臧罪以辭景命酺即上言其狀竇太后詔報自今執金吾辟吏皆勿遣閻顯安思皇后兄也建光初顯及弟景耀晏並爲卿校典禁兵后寵既盛而兄弟頗與朝權后臨朝以顯爲車騎將軍儀同三司顯忌大將軍耿寶位尊權重威重行朝乃諷有司奏寶及其黨與皆下獄死於是景爲衞尉耀城門校尉晏執金吾兄弟權要威福自繇梁冀順烈皇后兄也永和元年拜河南尹冀居職暴恣多非法父商所親客雒陽令吕放頗與商言及冀之短商以讓冀冀即遣人於道刺殺放而恐商知之乃推疑於放之怨仇請以放弟禹爲雒陽令安慰放家欲以滅口使捕之盡滅其宗親賔客百餘人商薨未及葬順帝乃拜冀爲大將軍弟侍中不疑爲河南尹及冲帝立始在襁褓太后臨朝詔冀與太傅趙峻太尉李固叅録尚書冀雖辭不肯當而侈暴滋甚冀愛監奴秦宫官至太倉令得出入冀妻孫夀所壽見宫輙屏御者託以言事因與私焉宫内外兼寵威權大震刺史二千石皆謁辭之冀用夀言多斥奪諸梁在位者外以謙讓而寔崇孫氏宗親冐名而爲侍中卿校尉郡守長吏者十餘人皆貪叨凶滛各遣私客籍屬縣富人被以它罪籍謂疏録之也閉獄掠拷使出錢自贖貲物少者至於死徙四方調發歳時貢獻先輸上第於冀上第第一也乘輿乃其次焉吏人以貨求官請罪者道路相望冀又遣客出塞交通外國廣求異物因行道路發取妓女御者而使人復乘勢横暴妻略婦人毆撃吏卒所在怨毒冀又起别第於城西以納姦亡或取良人悉爲奴婢至數千人名曰自賣人冀專擅威柄凶恣日積幾事大小莫不諮决之宿衞近侍並所親樹樹置也禁省起居纎微必知百官遷召皆先到冀門牋檄謝恩然後詣尚書下邳人吳樹爲宛令之官辭冀冀賔客布在縣界以情托樹樹曰小人姦蠧比屋可誅明將軍以椒房之重處上將之位宜崇賢路以補朝闕宛爲大都士之淵藪自侍坐以來未聞稱一長者而多托罪人誠非敢聞冀黙然不悦樹到縣遂誅殺冀客爲人害者數十人繇是深怨之樹後爲荆州刺史臨去辭冀冀爲設酒因鴆之樹出死車上又遼東太守侯猛初拜不謁冀托以他事乃腰斬之時汝南袁著年十九見冀凶縱不勝其憤乃詣闕上書曰臣聞仲尼歎鳳鳥不至河不出圖自傷卑賤不能致也今陛下居得致之位又有能致之資此董仲舒對䇿之詞著引而畧之也而和氣未應賢愚失序者勢分權臣上下壅隔之故也夫四時之運功成則退易繫辭曰寒徃則暑來暑徃則寒來寒暑相推而歳成焉老子曰功成名遂身退天之道也髙爵厚寵鮮不致災今大將軍位極功成可爲至戒宜遵懸車之禮髙枕頥神薛廣徳爲御史大夫乞骸骨賜安車駟馬懸其安車傳子孫欲令冀遵致仕之禮也傳曰木實繁者披枝害心若不抑損權盛將無以全其身矣左右聞臣言將側目切齒臣特以童蒙見㧞故敢㤀忌諱昔舜禹相戒無若丹朱尚書禹謂帝舜曰亡若丹朱傲惟慢遊是好周公戒成王無如殷王紂尚書周公戒成王曰無若殷王受之迷亂酗于酒德哉願除誹謗之罪以開天下之口書得奏御冀聞而宻遣掩捕著著乃變易姓名後托疾僞死結蒲爲人市棺殯送冀亷問知其詐亷察也陰求得笞殺之隱蔽其事學生桂陽劉常當世名儒素善於著冀召補令史以辱之時太原郝絜胡武皆危言髙論危亦髙謂峻也與著交善先是絜等連名奏記三府薦海内髙士而不詣冀冀追怒之又疑爲著黨勅中都官移檄捕前奏記者並殺之遂誅武家死者六十餘人絜初逃亡知不得免因輿櫬奏書冀門書入仰藥而死家乃得全及冀誅有詔以禮祀著等冀諸忍忌皆此類也不疑好經書善待士冀陰疾之因中常侍白帝轉為光禄勲又諷衆人共薦其子𦙍為河南尹時年十六容貌甚陋不勝冠帶道路見者莫不蚩笑焉不疑自恥兄弟有隙遂讓位歸第與弟蒙閉門自守冀不欲令與賔客交通陰使人變服至門記徃來者南郡太守馬融江夏太守田明初除過謁不疑冀諷州郡以他事䧟之皆髠笞徙朔方融自刺不殊明死於路永興二年封不疑子馬爲潁陰侯𦙍子桃爲城父侯冀一門前後七封侯三皇后六貴人二大將軍夫人女食邑稱君者七人尚公主者三人其餘卿將尹校五十七人在位二十餘年窮極滿盛威行内外百僚側目莫敢違命天子恭已而不得有所親豫吳何洪後主母何姬弟也後主立封洪與弟蔣植並爲侯植至大司徒吳主昏亂何氏驕僭子弟横放百姓患之晉王愷文明皇后弟也爲後將軍石崇與愷將爲鴆毒之事司𨽻校尉傅祗劾之有司皆論正重罪詔特原之由是衆人僉畏愷故敢肆其意所欲之事無所顧憚焉羊琇景獻皇后從父弟爲中䕶軍典禁兵放恣犯法每為有司所貸其後司𨽻校尉劉毅劾之應至重刑武帝以舊恩直免官而已尋以侯白衣領䕶軍頃之復職楊駿武悼皇后弟也爲車騎將軍封臨晉侯武帝自太康以後始寵后黨請謁公行而駿及弟珧濟勢傾天下武帝末年恐楊氏之偪復以王佑爲北軍中侯以典禁兵既而寢疾彌留至於大漸佐命元勲皆已先没羣臣惶惑計無所從㑹帝小差有詔以汝南王亮輔政又欲令朝士之有名望年少者數人佐之駿秘而不宣帝復尋至迷亂楊后輙爲詔以駿輔政惠帝即位進駿爲太傅大都督假黄鉞録朝政百官總已駿自知素無美望懼不能輯和逺近乃依魏明帝即位故事遂大開封賞欲以悦衆爲政嚴碎愎諫自用不允衆心賈謐賈后妹子也爲賈充後謐好學有才思既爲充嗣繼佐命之後又賈后專恣謐權過人主至乃鏁繫黄門侍郎其爲威福如此庾亮明帝時爲中書監轉䕶軍將軍及帝疾篤不欲見人羣臣無得進者撫軍將軍南頓王宗右衛將軍虞𦙍等素被親愛與西陽王羕將有異謀亮直入卧内見帝流涕不自勝既而正色陳羕與宗等謀廢大臣規共輔政社稷安否將在今日辭㫖切至帝深感悟引亮昇御座遂與司徙王導受遺詔輔㓜主加亮給事中徙中書令太后臨朝政事一决於亮後魏髙肇文昭皇太后之兄也爲尚書令輔政專權與奪惟已又嘗與清河王懌於雲龍門外廡下忽忿争大至紛紜太尉髙陽王雍和止之髙后既立肇當衡軸每事任已動違禮度好改先朝舊典出情妄作減削封秩抑黜勲人繇是怨聲盈路北齊段孝言武明皇后姊子爲清河郡尹孝言本以勲戚緒餘致位通顯至此便驕奢放逸無所畏憚曾夜行過其賔客宗孝王家宿喚坊民防援不時應赴遂拷殺之又與諸滛婦密遊爲其夫覺復恃官勢拷掠而殞時苑内須果木科民間及僧寺備輸悉分向其私宅種植又殿内及園中須石差車牛從漳河運載復分車廽取事悉聞輙出爲海州刺史後周鄭譯尚梁安固公主宣帝時爲内史下大夫譯頗專權時帝幸東京譯擅取官材以自營第坐是復除名爲民小御正劉昉數言於帝復召之顧待如初唐竇軌太穆皇后從父兄子也武徳三年爲益州道行臺左僕射行臺郎中趙𢎞安知名士也軌動輙榜箠歳至數百次與行臺尚書韋雲起郭行方素不協及隱太子誅有詔下益州軌藏諸懐中雲起問曰詔書安在軌不之示但曰卿欲反矣執而殺之行方大懼奔於京師軌追斬不及武延秀尚中宗女安樂公主爲太常卿兼右衞將軍延秀既恃恩放縱無所忌憚薛諗爲尚衣奉御開元二十八年殺人事泄長流襄州死於路其黨十人並杖諗帝之甥也性貪猥恃託國戚恣行兇忍嘗於私第使羣奴以重賈於坊市誘販繒帛者悉於後園椎殺之竊其財移歲乃爲所告帝深惡之以其親遂不明殺李翛憲宗莊憲太后妹婿爲司農卿遷京兆尹元和十年莊憲太后薨翛爲山陵橋道置頓使恃能惜費每事減損靈駕㶚橋從官多不得食及至渭城北門門壊於是橋道司請改造渭城北門計錢三萬翛以費勞不從令深鑿軌道以通靈駕掘土既深旁注皆懸因而頽壞所不及輼輬車數歩而已初欲壊城之東北墉以出靈駕中人皆不可乃停駕輙去壊門土木而後行翛懼誣奏輼輬車軸折山陵使李逄吉令御史封其車軸自陵還奏請免翛官帝以用兵務集財賦以翛前後進奉不之責但罰俸而已逄吉極言其罪乃削銀青階翌日復賜金紫自此朝廷端士多遭譖毁人士爲之側目梁張漢傑末帝德妃之兄歸覇之子也末帝嗣位漢鼎漢傑並爲近職漢鼎早亡漢傑貞明中為控鶴指揮使領兵討惠王於陳州擒之當貞明龍徳之際漢傑昆仲分掌權要藩鎭除拜多出其門叚凝因之遂竊兵柄及莊宗入汴漢傑與兄漢倫弟漢融同日族誅於汴橋下漢李業太后季弟隱帝即位尤深倚愛兼掌内帑四方進貢二宫費用委之出納業喜趨權利無所顧避執政大臣不敢禁語㑹宣徽使闕業意欲之太后亦令人微露風㫖執政時楊邠史𢎞肇等難之業繇是積怨蕭牆之變自此而作驕慢謙以受益卑以自牧葢先典之格言君子之攸處造次於是則無所不至而有姻連帝族位由后寵爵賞已極權勢已隆忘至訓於益恭遵棄徳而不讓傲慢成性驕狠爲心預時政而昧於大猷蔑搢紳而違於明哲敗不旋踵痛可言哉漢田蚡以孝景王后同母弟為丞相時燕相灌夫坐法去官家居長安夫嘗有服謂䘮服也過丞相蚡蚡從容曰從音千容切吾欲與仲孺仲孺字也過魏其侯竇嬰所封㑹仲孺有服夫曰將軍乃肯幸臨況魏其侯況賜也夫安敢以服爲解解猶辭之也若今言分疏矣請語魏其具具辦具酒食將軍旦日蚤臨旦日明日也蚤古早字蚡許諾夫以語嬰嬰與夫人益市牛酒益多也夜洒掃張具洒音灑又音所寄切至旦平明令門下候伺至日中蚡不來嬰謂夫曰丞相豈忘之哉夫不懌懌悦也曰夫以服請不宜不當㤀也廼駕自徃迎蚡蚡特前戲許夫殊無意徃夫至門蚡尚卧也於是夫見曰將軍昨日幸許過魏其夫妻治具至今未敢嘗食蚡悟謝曰吾醉忘與仲孺言廼徃又徐行夫愈益怒及飲酒酣夫起舞屬蚡屬付也猶今之舞訖相勸也屬音之欲切蚡不起夫徙坐語侵之徙坐謂移就其坐也嬰乃扶夫去謝蚡蚡卒飲至夜極歡而去上官安以昭帝后父封桑樂侯食邑千五百戸遷車騎將軍日以驕滛受賜殿中出對賔客言與我婿飲大樂見其服飾使人歸欲自燒物安子病死仰而罵天霍雲以昭帝后族爲中郎將封冠陽侯雲當朝請數稱病移出請音才性切多從賔客張圍獵黄山苑中使蒼頭奴上朝謁朝當用謁不自行而令奴上謁者也上謁若今叅見尊貴而通名也莫敢譴者後漢陰就以光烈皇后弟封新陽侯就善談論朝臣莫及然性剛傲不得衆譽梁冀以順烈皇后族爲大將軍質帝少而聰慧知冀驕横嘗朝羣臣目冀曰此䟦扈將軍也晉楊駿以武帝后父自鎭將軍遷車騎將軍封臨晉侯漸驕傲胡奮語之曰卿恃女更豪耶與天家婚未有不滅門者駿曰卿女復不在天家邪奮曰我女與卿女作婢何所增損羊琇以景獻皇后從父弟爲中䕶軍寵遇甚厚杜預拜鎭南將軍朝士畢賀皆連榻而坐琇與裴楷後至曰杜元凱乃復以連榻而坐客邪遂不坐而去賈謐本姓韓賈后父充之外孫嗣充爲臨潁侯惠帝世謐既親貴數入二宫共愍懐太子遊處無屈降心嘗與太子奕棊争道成都王頴在坐正色曰皇太子國之儲君賈謐何得無禮謐懼言之於后遂出頴爲平北將軍鎭鄴王敦字處仲尚武帝女襄城公主拜駙馬都尉嘗與從父弟導造王愷愷使美人行酒以客飲不盡輙殺之酒至敦導所敦故不肯持美人恐懼失色而敦傲然不視陳桞盼以髙宗皇后弟又尚文帝女富陽公主拜駙馬都尉後主即位以帝舅加散騎常侍盼性愚戅使酒嘗因醉乘馬入殿門爲有司所劾坐免官卒於家後魏賀盧賜爵遼西公道武遣衛王儀伐鄴而盧自以帝之季舅不肯受儀節度帝遣使切責之盧遂忿恨與儀司馬丁建搆成其嫌彌加猜忌㑹帝勅儀去鄴盧亦引歸北齊尉景仕東魏爲太傅景妻常山君神武之姊也坐匿亡人見禁止使崔暹謂文襄曰語阿惠兒富貴欲殺我邪神武聞之泫然詣闕曰臣非尉景無以至今日三請魏静帝乃許之於是黜爲驃騎大將軍開府儀同三司神武造之景恚卧不動呌曰殺我時趣耶常山君謂神武曰老人去死近何忍煎廹至此又曰我爲爾汲水胝生因出其掌神武撫景為之屈膝先是景有果下馬文襄求之景不與曰土相扶爲墻人相扶爲王一馬亦不得畜而索也神武對景及常山君責文襄而杖之常山君泣救之景曰小兒慣去放使作心腹何須乾啼濕哭不聼打邪爾朱文略姊爲魏孝莊皇后神武納之初神武遣令恕文畧十死恃此益横多所凌忽胡長仁以武成后兄爲尚書令長仁倚親驕豪無所畏憚隋吕道貴髙祖從舅也性尤頑騃言詞鄙陋初自鄉里徵入長安見之悲泣道貴畧無戚容但連呼髙祖名云種未定不可偷大似苦桃姊苦桃道貴從姊名也是後數犯忌諱動致違忤帝甚恥之乃命髙熲厚加供給不許接對朝士拜上儀同三司出爲濟南太守令即之任斷其入朝道貴還至本郡髙自崇重每與人言自稱皇舅數將儀注出入閭里從故人遊宴官民咸苦之後廢郡終於家子孫無嗣焉栁述尚髙祖女蘭陵公主仁夀中判吏部尚書事述雖職務脩理爲當時所稱然不達大體暴於馭下又怙寵驕豪無所降屈楊素時稱貴幸朝臣莫不讋憚述每陵侮之數於帝前面折素短判事有不合素意或令述改之述輙謂將命者曰語僕射道尚書不肯素繇是衘之崔𢎞度開皇中納其妹爲秦孝王妃復以其弟𢎞昇女爲河南王妃仁夀中檢校大府卿自以一門二妃無所降下宇文化及煬帝爲太子時領千牛其弟士及尚南陽公主化及繇此益驕處公卿間言辭不遜多所凌轢唐楊國忠𤣥宗太眞妃從祖兄也代李林甫爲右相國忠既以便佞得宰相剖决機務居之不疑立朝之際或攘袂扼腕自公卿以下皆頥指氣使無不讋憚國忠既以宰相典選嘗於私第大集選人令諸女弟垂簾觀之國忠注官時呼左相陳希烈於坐隅給事中在列曰既對注擬過門下了矣吏部侍郎韋見素張倚皆衣紫是日與本曹郎官同咨事趨走於屏樹之間既退國忠謂諸妹曰兩員紫袍主事何如人相對大噱冊府元龜卷三百六
