body:
  text: 册府元龜卷九百六十三宋王欽若等撰外臣部封册中國之於夷狄羈縻而已若乃殊鄰絶黨之國欽風慕化而至琛賮維旅鞮譯以通觧辮而習賔儀保塞而請内屬由是推懐柔之道開撫納之意優其禮遇厚其賜予以篤其好而厭其心焉漢氏之後乃復加以侯王之號申之封拜之寵備物典册以極其名數持節封建以震乎威靈至於告終稱嗣撫封世及必俟文告之命乃定君臣之位自非人君之慎徳大邦之敦信皇明遐燭而無間仁風溥暢而胥泊又曷䏻革彼獷悍被之聲教使其奉王畧而為外臣者㦲漢高祖十一年五月詔曰粤人之俗好相攻撃前時秦徙中縣之民南方三郡中縣之民中國縣民也秦始皇畧取彊梁地以為桂林象郡南海郡故曰三郡使與百粤雜處欲以介其間使不相攻撃也㑹天下誅秦南海尉它居南方長治之它音徒河切南海尉之名也姓趙長治謂為之長帥而治理之也甚有文理中縣人以故不耗减粤人相攻撃之俗益止俱賴其力今立它為南粤王使陸賈即授璽綬即就也就其所居而立之武帝元鼎六年平西南夷夜郎侯入朝帝以為夜郎王元封二年滇王離西夷滇音顛舉國降以為益州郡賜滇王王印復長其民為之長帥西南夷君長以百數獨夜郎滇王受王印昭帝始元六年大破益州夷詔曰鉤町侯亡波鉤音劬町音挺亡與無同西南夷也亡波其名也率有君長人民撃反者斬捕首虜有功其立亡波為鉤町王元鳯四年平樂監傅介子既殺樓蘭王漢乃立樓蘭王先降漢者弟尉屠耆為王更名其國為鄯善為刻印章餘具外臣褒異門後漢光武建武五年莎車國王康率傍國拒匈奴擁衛都護檄書河西問中國動静自陳思慕漢家河西大將軍竇融乃承制立康為漢莎車建功懐徳王西域大都尉八年高句驪侯遣使朝貢先是王莽更名高句驪侯於是貊人寇邊愈甚至是遣使朝貢帝復其王號十一年武都氐人背公孫述降漢隴西太守馬援上復其王侯君長賜以印綬十二年九真徼外蠻里張㳺里蠻之别號今呼為俚人率種人慕化内屬封為歸漢里君十三年廣漢塞外白馬羌豪樓登等率種人五千餘户内屬帝封樓登為歸義君長十四年卭糓王長貴一云任貴遣使上三年計即授越嶲太守印綬初王莽時卭人長貴自立為卭糓王領越嶲太守又降於公孫述述敗帝封為卭榖王十七年莎車王賢遣使奉獻請都䕶天子以問大司空竇融以為賢父子兄弟相約事漢欵誠又至臣欽若等曰莎車王延嘗勑諸子當世事漢家不可負也延死子康代立康死弟賢代立故云父子兄弟相約事漢也宜加號位以鎮安之帝乃因其使賜賢西域都䕶印綬及車旗黄金錦繡燉煌太守裴遵上言夷狄不可假以大權又令諸國失望詔書収還都䕶印綬更賜賢以漢大将軍印綬其使不肯易随追奪之賢由是始恨而猶詐稱大都䕶二十年東韓國人亷斯人蘇馬諟等詣樂浪貢獻帝封蘇馬諟為漢㢘斯邑君使屬樂浪郡四時朝謁二十五年遼西烏桓大人郝旦等率衆内屬封其渠帥為侯王君長者八十一人二十七年哀牢王賢栗等率種人詣越嶲太守鄭鴻降求内屬帝封賢栗等為君長三十年鮮卑大人於仇賁滿頭等率種人詣闕朝貢封於仇賁為王滿頭為侯章帝建初二年昆明夷鹵承率種人與諸郡兵撃哀牢王類牢於博南斬之傳首雒陽封鹵承為破虜傍邑侯和帝永元三年大将軍竇憲上書立北匈奴右谷蠡王於除鞬為單于明年遣耿䕫即授璽綬賜玉劔四具羽葢一駟使中郎将任尚持節衛䕶屯伊吾如南單于故事六年蜀郡徼外大牂夷種羌豪造頭等率種人五十餘萬口内屬拜造頭為邑君長賜印綬安帝永初元年鮮卑大人燕荔陽入朝帝賜鮮卑王印綬赤車参駕令止烏桓校尉所居寗城下二年青衣道夷邑長令田令姓田名舉土内屬帝增令田爵號為奉通邑君元初二年先零羌號多等率衆七千餘人詣漢陽太守寵参降詣闕賜號多侯印綬遣之三年度遼将軍鄧遵率南匈奴左鹿蠡王湏沈撃湏王零昌於靈州縣名属北地郡斬首八百餘級封湏沈為破虜侯金印紫綬四年春中郎将任尚遣當闐種羌槐鬼等五人刺殺叛羌杜季貢封槐鬼為羌侯秋任尚復募效功種號封刺殺零昌封號封為羌王五年度遼将軍鄧遵募上郡全無種羌雕何等刺殺叛羌狼莫賜雕何為羌侯永寜元年遼鮮卑大人烏倫其至鞬衆詣度遼將軍鄧遵䧏奉貢獻詔封烏倫為率衆王其至鞬為率衆侯是年撣國工撣音擅雍繇調遣使獻樂明年元㑹安帝作樂於庭封雍繇調為漢大都尉賜印綬順帝永建二年烏桓都尉戎朱􅂒率將王侯咄歸去延等從烏桓校尉耿曄擊鮮卑有功還皆拜為率衆王漢安二年立南匈奴守義王兠樓為南單于獻帝建安四年烏丸三王助大將軍袁紹擊破遼東公孫瓉紹遣使即拜為單于皆安居華盖羽覆黄屋左纛版文曰使持節大將軍督幽青并領冀州牧部卿侯紹承制詔遼東屬國率衆王頒下烏丸遼西率衆王蹋頓右北平率衆王汗廬維乃祖慕義遷善欵塞内附北捍玁狁東拒濊貊世守北陲為百姓保障雖時侵犯王畧命將徂征厥罪率不旋時悔愆變改方之外夷最又聰慧者也始有千夫長百夫長以相統領用䏻慮乃心力克有勲於國家稍受王侯之命自我王室多故公孫瓉作難殘夷厥土之君以侮天慢主是以四海之内並執干戈以衛社稷三王奮氣裔土忿姦憂國控弦與漢兵馬表裏誠甚忠孝朝所嘉焉然而虎兕長蛇相随塞路王官爵命否而無聞夫有勲不賞俾勤者怠今遣行謁者楊休齎單于璽綬車服以封爾勞其各綏静部落教以謹慎無使作凶作慝世復爾祀位長為百蠻長厥有咎有不臧者泯於爾禄而䘮於乃庸可不勉乎烏丸單于都護部衆左右單于受其節度他如故事魏文帝漢延康元年鮮卑素利彌加遣使獻馬封加為歸義王先是漢獻帝建安中鮮卑素利彌加厥機因校尉閭柔上貢獻通市太祖皆表寵以為王厥機死又封其子沙未汗為親漢王至是表利彌加各遣使獻馬故有是命黄初元年更授匈奴南單于呼厨泉魏璽綬賜青葢乗輿寳劔玉玦是年鮮卑歩度根遣使獻馬帝拜為王明帝太初三年大月氏王波調遣使奉獻以調為親魏大月氏景初元年幽州刺史毌丘儉討遼東是時右北平烏丸單于冦婁敦遼西烏丸都督率衆王䕶留葉聞儉軍至率衆五千餘人降寇婁敦遣弟阿羅奨等詣闕朝貢封其渠帥三十餘人為王二年六月倭王遣大夫難升米等詣帯方郡求詣天子朝獻時太守劉夏遣吏將送詣京都其年十二月詔書報倭女王曰制詔親魏倭王卑彌呼帯方太守劉夏遣使送汝大夫難升米次使都示牛利奉汝所獻男生口四人女生口六人班布二疋二丈以到汝所在踰逺乃遣使貢獻是汝之忠孝我甚哀汝今以汝為親魏倭王假金印紫綬装封付帯方太守假授汝其綏撫種人勉為孝順汝来使難升米牛利涉逺道路勤勞今以難升米為率善中郎将牛利為率善校尉假銀印青綬引見勞賜遣還今以絳地交龍錦五疋絳地縐栗􅄢十張蒨絳五十疋紺青五十疋答汝所獻貢直又特賜汝紺地句文錦三疋細斑華􅄢五張白絹五十疋金八兩五尺刀二口銅鏡百枚真珠鉛丹各五十斤皆装封付難升米牛利還到録受悉可示汝國中人使知國家哀汝故鄭重賜汝好物也是年遣帯方太守劉昕樂浪太守鮮于嗣越海定二郡諸韓國臣智加賜邑君印綬其次與邑長齊王正始元年帯方太守弓遵遣建中校尉梯儁等奉詔書印綬詣倭國拜假倭王並齎詔賜金帛錦􅄢刀鏡綵物倭王因使上表答謝詔恩八年濊貊不耐侯詣闕朝貢詔更封不耐濊王晉武帝大康六年大宛獻汗血馬帝遣使楊顥拜其王藍庾為大宛王懐帝即位初以鮮卑務勿塵為大單于司空領烏丸校尉王凌又表封務勿塵遼西郡公其别部大飄滑及其弟渇末别部大屠瓮等皆為親晉王簡文帝成安二年正月百濟王遣使貢方物六月遣使拜百濟王餘句為鎮東将軍領樂浪太守孝武帝太元十一年以百濟王世子餘暉為使持節都督鎮平将軍百濟王安帝隆安三年仇池氐楊盛遣使稱藩奉獻方物帝以盛為仇池公楊氏世居隴右漢末徙居仇池地方百頃因以百頃為號有名千萬者魏拜為百頃王其孫難敵稱藩於晉以為仇池公後孫纂立便詣簡文自陳後以纂為平羌校尉秦州刺史仇池公纂支庶定稱藩於孝武帝盛即定之兄也至是稱藩奉獻故復命之桓𤣥輔政進盛西戎校尉義熙九年高麗國王高璉一作髙連遣長史高翼奉表獻赭白馬以璉為高麗王樂浪郡公十二年以百濟王映為使持莭都督百濟諸軍事鎮東将軍百濟王宋高祖永初元年百濟王餘映進號鎮東大将軍二年林邑王范陽邁遣使貢獻即加除授以陽邁為林邑王三年封仇池公楊威為武都王文帝元嘉二年十一月以武都王世子楊𤣥為秦州刺史襲封武都王是年倭國王倭讃遣使奉表獻方物表曰封國偏逺作藩于外自昔祖父躬擐甲胄䟦渉山川不遑寕處東征毛人五十五國西服衆夷六十六國渡平海北九十五國王道融泰廓土遐畿累葉朝宗不諐於嵗臣雖下愚忝紹先緒驅率所統歸崇天極詔除都督倭新羅任那加羅秦韓慕韓六國諸軍事安東大將軍倭王七年正月以吐谷渾慕璝為征西将軍沙州刺史慕璝遼東鮮卑也兄阿豺晉末譙縦之亂遣使上表獻方物詔為安西将軍沙州刺史澆河公阿豺死慕璝立奉表故有是命六月以仇池氐冠軍将軍楊難當為北秦州刺史封武都王是年百濟王餘毗復修職貢以餘映爵號授之九年六月以征西将軍沙州刺史吐谷渾慕璝為征西大将軍西秦河二州刺史隴西王北秦州刺史楊難當加征西大将軍十二年正月封黄龍國主馮𢎞為燕王十五年二月以平東将軍吐谷渾慕延為鎮西將軍西秦河二州刺史四月以倭國王􅈿為安東将軍十六年六月改封隴西王吐谷渾慕延為河南王二十年倭國王濟遣使奉獻復以為安東将軍倭國王二十六年六月媻皇國王舎利媻羅䟦摩遣使獻方物四十一種策命為媻皇國王是月媻逹國王舎利不陵伽䟦摩遣使獻方物䇿媻達國王詔曰阿羅單媻皇媻達三國頻越遐海欵化納貢逺誠宜甄可並加除授乃遣使䇿命之二十八年七月安東將軍倭王濟進號安東大将軍二十九年九月以平西将軍吐谷渾拾寅為安西将軍西秦河二州刺史孝武即位初安西將軍西秦河二州刺史吐谷渾拾寅進號鎮西大将軍開府儀同三司大明元年十月以百濟王餘慶為鎮東大將軍五年正月以宕昌國王梁唐子為河州刺史六年三月以倭國王世子興為安東将軍倭國王七年六月高麗王高璉進號車騎大将軍開府儀同三司明帝泰始三年十月鎮西大将軍西秦河二州刺史河南王吐谷渾拾寅進號征西大將軍後廢帝元徽三年九月征西大将河南王吐谷渾拾寅進號車騎大將軍四年五月以仇池氐寕朔將軍武都王楊文度為北秦州刺史十月以宕昌王梁彌機為安西将軍河凉二州刺史順帝昇明元年十二月寕朔将軍北秦州刺史武都王楊文度進號征西将軍二年五月倭國王武遣使獻方物以武為安東大将軍又封西陽蠻梅生為高山侯田治生為威生侯梅加羊為杆山侯六月以輔國将軍楊文𢎞為北秦州刺史封武都王南齊太祖建元元年五月詔使持莭散騎常侍都督秦河沙三州諸軍開府儀同三司領䕶羌校尉西秦河二州刺史河南王吐谷渾拾寅進號驃騎大将軍使持莭都􅇂河凉二州安西将軍東羌校尉河凉二州刺史隴西公宕昌王梁彌機進號鎮西將軍征虜將軍西凉州刺史羌王像舒彭進號持節平西将軍又詔曰昔絶國入贄羙稱前冊殊俗内欵聲流往紀虜茄盧鎮主隂平公楊廣香怨結同族釁起親黨在宋之世遂舉地降敵茄盧失守華陽暫驚近單使先馳宣揚皇威廣香等追其逺世之誠仰我維新之化肉袒請附復地千里氐羌雜種咸同歸欵宜特領納厚加優䘏廣香翻迷反正可特量所授部曲酋豪随名酬賞以廣香為都􅇂沙州諸軍事平羌校尉沙州刺史又詔新除使持節都督倭新羅任那加羅秦韓六國諸軍事安東大將軍倭王武進號為鎮東大将軍是時加羅國王荷知使来獻詔曰量廣始登逺夷洽化加羅王荷知欵闕海外奉贄東遐可授輔國将軍本國王二年三月百濟王牟都遣使貢獻詔曰寳命惟新澤波絶域牟都世藩東表守職遐外可即授使持莭都督百濟諸軍事鎮東大将軍又以氐楊後起為秦州刺史四月使持節散騎常侍都􅇂營平二州諸軍事車騎大将軍開府儀同三司樂浪公高麗王高璉進號驃騎大将軍武帝永明元年二月以征虜将軍楊炤為沙州刺史封隂平王又詔前使持節都督河凉二州軍事鎮西将軍東羌校尉河凉二州刺史隴西公宕昌王梁彌機前使持節平北將軍西凉州刺史羌王像舒彭並著勤西陲安寜邊境可復先官爵是年以隴右都帥羌王劉雒羊為輔國将軍又進秦州刺史楊後起號冠軍将軍二年八月秦州刺史楊後起勤彰欵塞忠著邊城進號征虜将軍三年六月以河南王拾寅世子吐谷渾易度侯為使持節都督西秦河沙三州諸軍事鎮西将軍領䕶羌校尉西秦河二州刺史河南王又詔曰易度侯守職西蕃綏懐允緝忠績兼舉朕有嘉焉可進號車騎大將軍八月詔曰行宕昌王梁彌頡一作類忠欵内附著績西服宜加爵命式隆潘屏可使持節都督河凉二州諸軍事安西將軍東元校尉河凉二州刺史隴西公宕昌王四年閏正月秦州刺史楊後起卒詔曰後起奄至殞逝愴惻于懐綏禦邊服宜詳其選行輔國將軍北秦州刺史武都王楊集始幹局沉亮乃心忠欵必䏻輯境寕民宣揚聲教可持節輔國将軍北秦州刺史平羌校尉武都王六年五月以行宕昌王梁彌承為使持節都􅇂河凉二州諸軍事安西将軍東羌校尉河凉二州刺史是年除都督䕶北遂安左郡太守田駟路為試守郡太守皆郢州蠻也八年正月百濟王牟太遣使上表遣謁者僕射孫副䇿命太襲亡祖父牟都為百濟王曰於戯惟爾世襲忠勤誠著遐表海路肅澄要貢無替式循彛典用纂顯命往欽哉其敬膺休業可不慎歟詔行都督百濟諸軍事鎮東大将軍百濟王今以世襲祖父牟都為百濟王即位章綬等五銅虎符四王其拜受不亦休乎是年以河南王吐谷渾休留代為使持節都督西秦河沙三州鎮西將軍䕶羌校尉西秦河二州刺史九年五月林邑夷人范當根純攻奪其國自立遣使貢獻金簟等物詔曰林邑雖在遐外世服正化當根純乃誠懇欵到率其僚職逺績克宣良有可嘉宜沾爵號以𢎞休澤可持節都督縁海諸軍事安南將軍是年八座奏隂平王楊炅嗣勤西牧馳欵内昭宜増戎章用輝遐外進號前将軍十年以林邑王子孫范諸農率種人攻范當根純復得本國以諸農為持莭都督縁海諸軍事安南将軍林邑王欝林王隆昌元年以髙麗王樂浪公高雲為使持節散騎常侍都督營平二州諸軍事征東大将軍明帝建武二年七月以氐楊馥之為北秦州刺史仇池公是年林邑王諸農進號鎮國将軍梁高祖天監二年五月扶南國王遣使送珊瑚佛像并獻方物詔曰扶南王憍陳如闍邪䟦摩介居海表世纂南服厥誠逺著重譯獻琛宜蒙酬納班以榮號可安南将軍九月以河南王世子伏連籌為鎮西將軍西秦河二州太守河南王四年四月以宕昌國王梁彌博為使持節都督河凉二州諸軍事安西將軍東羌校尉河凉二州刺史隴西公宕昌王佩以金印七年二月􅇉曰高麗樂浪郡公高雲乃誠欵著貢驛相尋宜隆秩命式𢎞朝典可撫東大將軍開府儀同三司持節常侍都督王並如故九年四月林邑國奉獻白猴􅇉曰林邑國王范天凱介在海表乃心欵至逺修職貢良有可嘉宜班爵號被以榮澤可持節都督縁海諸軍威南将軍林邑王普通元年二月以高麗王世子安為寕東將軍都督營平二州諸軍事襲爵高麗王二年十二月􅇉曰行都督百濟諸軍事鎮東大将軍百濟王餘隆守藩海外逺修貢職乃誠欵到朕有嘉焉宜率舊章服兹榮命可持節都􅇂百濟諸軍事寕東大将軍百濟王五年􅇉以百濟王餘隆子明為持節百濟諸軍事綏東将軍百濟王七年三月髙麗王安庶子延立遣使貢獻􅇉以延襲爵六月林邑王高式勝鎧遣使獻方物􅇉以為持莭都督縁海諸軍事綏南将軍林邑王中大通元年三月以河南王休運籌子呵羅真為寕西将軍䕶羌校尉西秦河二州刺史一云西秦河沙三州刺史二年四月以河南王佛輔為寕西将軍西秦河二州刺史六月行林邑王髙式律陁羅䟦摩貢獻􅇉以為持節都督縁海諸軍事綏南將軍林邑王大同十年二月行宕昌王梁彌泰為西平將軍河凉二州刺史宕昌王太清二年三月高麗王延卒詔以其子為寧東將軍襲延爵陳文帝天嘉三年閏二月以百濟王餘明為撫東大將軍髙句麗王高湯為寜東將軍後魏道武登國初以爾朱羽健為領民酋長率契胡武士千七百人従駕平晉陽定中山論功拜散騎常侍以居秀容川􅇉割方三百里封之長世為業天興初仇池氐楊盛遣使朝貢􅇉以盛為征南大将軍仇池王太武始光四年十一月以氐王楊𤣥為都督荆梁益寕四州諸軍事假征南大将軍梁州刺史南秦王延和二年九月􅇉兼大鴻臚卿崔頤持節拜征虜将軍楊難當為征南大将軍儀同三司封南秦王太和三年九月遣使者拜西秦王慕璝弟慕利延為鎮西大将軍儀同三司改封西平王是時使貟外散騎侍郎李教拜高麗王高璉為都督遼海諸軍事征東将軍領東夷中郎将遼東郡公高句麗正史闕年月五年三月以故南秦王世子楊保宗為征南大将軍秦州牧武都王太平真君二年三月封蠕蠕都乆閭乞歸為朔方王五年六月西平王吐谷渾慕利延殺其兄子緯代立弟叱力延等来奔乞師以叱力延為歸義王正平元年伊吾王唐和闗帝優寵之文成即位以和歸誠先朝拜鎮南将軍酒泉公孝文延興二年正月太陽蠻首桓誕率户内屬拜征南将軍㐮陽王太和二年三月遣鴻臚卿劉歸謁者張察拜河南公梁彌機為征南大将軍西戎校尉梁益二州牧河南公宕昌王六年九月以氐楊後起為武都王九年七月遣使拜宕昌王梁彌機兄子彌承為國王十六年三月以高麗王高璉孫雲為其國王賜衣冠服物車旗之飾十七年正月以吐谷渾伏連籌為其國王宣武景明四年十一月以武興國世子楊紹先為其國王正治二年正月宕昌王世子梁彌博為其國王永平二年八月以鄧至國世子像覽蹄爲其國王孝明神龜元年正月􅇉以氐楊定為隂平王二年高麗王高雲死以世子安為其國王拜鎮東将軍領䕶東夷校尉遼東郡公正光元年九月蠕蠕主阿那瓌来奔十一月􅇉曰蠕蠕世雄朔方擅制漢表隣通上國百有餘載自神鼎南底累紀於兹䖍貢雖違邊燧静息慿心象魏潜欵彌純今其主阿那瓌屬離時難邦分親析萬里逺馳庇命有道同悲申伍忠孝足務方存興滅之師以隆繼絶之舉宜且􅄖以賔禮期之立功䟽爵胙土大啟河岳可封朔方郡開國公蠕蠕王食邑一千户錫以衣冕加以軺車祿恤儀衛同乎戚藩十二月送歸北三年四月以高車王覆羅伊匐為鎮西将軍西海郡開國公高車王孝荘建義元年六月以髙昌王世子光為平西将軍𤓰州刺史襲爵秦臨縣開國伯高昌王前廢帝普泰元年高昌王趙堅遣使朝貢除平西将軍𤓰州刺史秦臨縣伯王如故尋加衛将軍東魏孝静天平中加高句麗王高延侍中車騎大将軍興和二年四月阿至羅國主副伏羅越居子去賔来降封為高車王西魏孝武永熈元年高句麗王延為使持節散騎常侍車騎将軍領䕶東夷校尉遼東郡公高句麗王二年以衛将軍𤓰州刺史秦臨縣伯高昌王趙堅為儀同三司進爵郡公文帝大統五年蔡陽蠻王曾超明内屬授南雍州刺史仍世襲焉十四年以高昌王世子元嘉為王廢帝元年蠻酋焚舎舉落内附以為淮北三州諸軍事淮州刺史淮安郡公恭帝二年蠻酋宜人王母田興彥欵附以為開府儀同三司北齊文宣天保元年九月以散騎常侍車騎将軍領東夷校尉遼東郡開國公高麗王威為使持節侍中驃騎大将軍領䕶東夷校尉王公如故廢帝乾明元年二月以高麗王世子高湯為使持節領東夷校尉遼東郡公髙麗王武成河清四年二月詔以新羅國王金真興為使持節領東夷校尉樂浪郡公新羅王後主武平元年二月以百濟王餘昌為使持節侍中驃騎大将軍帯方郡公王如故二年正月以百濟王餘昌為使持節都督東青州刺史後周武帝建徳六年高麗王高湯遣使来貢一作高陽拜湯為上開府儀同大将軍遼東郡開國公遼東王隋高祖開皇元年十月百濟王扶餘昌遣使来賀授昌上開府儀同三司帯方郡公十二月高麗王高湯遣使朝貢授湯大将軍遼東郡公四年五月契丹王莫賀弗遣使請降拜大将軍五年党項拓㧞寕叢等各率所部詣旭川内附授大将軍其部下各有差十年七月高麗遼東郡公高湯卒拜其子元為上開府儀同三司襲爵遼東郡公賜衣一襲元奉表謝恩并賀祥瑞因請封王高祖􅄖􅇉䇿元為王十四年新羅國王真平遣使貢方物拜真平為上開府樂浪郡公新羅王十九年四月突厥利可汗内附以為啓可汗煬帝大業五年髙昌王麴伯雅来朝拜左光禄大夫車師太守封弁國公册府元龜卷九百六十三
