body:
  text: 册府元龜卷一百八十八宋王欽若等撰閏位部紹位年號紹位夫易著繼明之義傳有世及之文皆所以紹祖考而保成基也其或叔世艱虞庶邦離析或專制㝢内或奄據一隅端委纂戎傳世承祀或正位儲副用禮而陞或入繼大宗以恩而立或克平多難嗣守家邦或始因顧託潜圖簒奪何嘗不蹈道者逢吉長惡者終凶斯以見天無常親民無常心鬼神饗於有德億兆歸於至仁者矣秦二世皇帝胡亥始皇帝之少子王欽若等曰始皇事迹悉具閏位勲業門蜀呉以下皆倣此始皇三十七年十月行出遊會稽并海上北抵瑯琊丞相李斯中軍府令趙高兼行符璽令事皆從始皇有二十餘子長子扶蘇以數直諫始皇始皇使監兵上郡蒙恬為將唯胡亥愛請從始皇許之餘子莫從辯上隠姓名遺秦將章邯書曰李斯為秦王死廢十七兄而立今王然則二世是始皇第十八子也其年七月始皇帝至沙丘病甚令趙高為書賜公子扶蘇曰以兵屬䝉恬輿䘮會咸陽而葬書已封未授使者書及璽皆在趙高所獨子胡亥丞相李斯趙高及幸宦者五六人知餘羣臣皆莫知也李斯以為始皇在外晏駕無眞太子故秘之置始皇居輼輬車中一作輜車百官奏事上食如故宦者輙從輼輬車中可諸奏事趙高因留所賜扶蘇璽書與丞相李斯謀詐為受始皇詔丞相立子胡亥為太子更為書賜扶蘇死至咸陽發䘮太子立為二世皇帝子嬰二世之兄子趙高殺二世而立子嬰為秦王蜀後主禪先主子章武元年立為太子三年四月先主殂於永安宮五月後主襲位於成都時年十七呉廢帝會稽王亮大帝之子赤烏十三年立為太子太元元年大帝寢疾大將軍諸葛恪為太子太傅會稽太守滕𦙍為太常竝受詔輔太子明年四月帝薨太子即尊號景帝休大帝第六子太元二年封琅琊王居虎林後徙會稽太平三年九月戊午休從弟大將軍綝以兵召大臣會宮門黜亮為會稽王使宗正孫楷與中書郎董朝迎休十月戊寅及布寨亭武衛將軍孫恩行丞相率百僚以乗輿法駕迎於永昌亭築宮以武帳為便殿止住使孫楷先見恩楷還休乗輦進羣臣再拜稱臣休升殿謙不即御坐止東廂户曹尚書前即階下讃丞相奉璽符休三讓羣臣三請休曰將相諸侯咸推寡人寡人敢不承受璽符羣臣以次奉引休就乘輿百官陪位綝以兵千人迎於半野拜於道側休下車答拜即日御正殿後主皓大帝孫廢太子和之子初封烏程侯就國永安七年七月景帝休殂是時蜀初亡而交阯攜叛國内震懼貪得長君左典軍萬彧昔為烏程令與皓相善稱皓才識明斷是長沙桓王之疇也又加之好學奉遵法度屢言之于丞相濮陽興左將軍張布説休妃太后朱氏欲以皓為嗣朱曰我寡婦人安知社稷之慮茍呉國無隕宗廟有頼可矣於是遂迎立皓時年二十三宋少帝義符武帝長子永初元年武帝受禪立為皇太子三年五月癸亥武帝晏駕是日太子即皇帝位文帝義隆武帝第三子永初元年封宜都王景平二年五月江州刺史檀道濟揚州刺史王𢎞入朝乙酉宣太后令廢少帝為滎陽王立義隆令曰宜都王仁明孝弟著自幼辰德業沖粹識心明允宜纂洪統光臨億兆主者詳依典故以時奉迎未亡人嬰此百罹雖存若殞永悼情事撫心摧塞是日檀道濟入守朝堂六月傅亮率行臺迎義隆於江陵八月丁酉於中堂即皇帝位以徐羡之為司徒傅亮為尚書令時有司奏車駕依舊臨華林園聽訟詔曰政刑多所未悉可先二公推訊元嘉二年羡之與亮上表歸政曰臣聞元首司契運樞成務臣道代終事盡宣翼冕旒之道理絶於上皇拱已之事不行於中古故高宗不言以三齡為斷冡宰聽政以再期為節百王以降罔或不然陛下聖德紹興負荷洪業億兆顒顒思陶盛化而聖㫖謙挹委成羣司自大禮告終鑚燧三改大明佇照逺邇傾属臣等雖率誠屢聞未能仰感敢藉品物之情謹因蒼生之志伏願陛下逺存周文日昃之道近思皇室締搆之艱時覧萬機躬親朝政廣闢四聰博詢庶業則雍熈可臻有生幸甚帝未許羡之等重曰近陳冩下情言為心罄奉被還詔覧許未迴豈惟愚臣秉心有在詢之朝野人無異議何者形風四方實繫主德一國之事本之一人雖世代不同時殊風異至於主運臣贊古今一揆未有渾心委任而休明可期此之非宜布自遐邇臣等荷遇二世休戚以均情為國至豈容順黙重披丹心冐昧以請帝猶辭羡之等又固諫曰此表披陳辭誠俱盡詔㫖沖逺未垂聽納三復屏營伏増憂歎臣聞克隆先搆幹蠱之盛業昧旦丕顯帝王之高義自皇宋創運英聖有造殷憂未闋艱患仍纒頼天命有底聖明承業時屯國故猶在民心泰山之安未易可保昏明隆替繫在聖躬斯誠周詩夙興之辰殷王待旦之日豈得無為拱已復𤣥古之風逡巡虗挹詢匹夫之事伏願以宗廟為重百姓為心𢎞大業以嗣先軌隆聖道以増前烈愚瞽所獻情盡於此乃許之孝武皇帝駿文帝第三子元嘉十二年封武陵王累遷都督江州荆州之江夏豫州之西陽晉熈新蔡四郡諸軍事三十年元凶劭弑逆帝率衆入討荆州刺史南譙王義宣雍州刺史臧質並舉義兵四月丙寅次江寧丁卯大將軍江夏王義恭來奔奉表上尊號戊辰至于新亭己巳即皇帝位改新亭為中興亭五月甲戌輔國將軍申坦克京城乙亥輔國將軍朱脩之克東府丙申克定京邑劭及始興王濬諸同逆竝伏誅前廢帝子業武帝長子孝建元年立為皇太子八年閏五月庚午即皇帝位年十三以太宰江夏王義恭錄尚書事明帝彧文帝第十一子元嘉二十五年封淮陽王二十九年改封湘東王永光元年出為豫州刺史都督南豫豫司江四州揚州之宣城諸軍事景和末入朝被留時廢帝疑畏諸父將加禍害帝與腹心阮佃夫李道兒等密謀弑廢帝於後堂升西堂登御座召見諸大臣雖未即位凡衆事悉稱令書施行十二月丙寅即皇帝位後廢帝昱明帝長子㤗始二年立為皇太子泰豫元年四月庚子即皇帝位順帝凖明帝第三子㤗始七年封安成王為撫軍將軍前廢帝即位初為揚州刺史元徽二年加車騎將軍都督揚南豫二州諸軍事四年進號驃騎大將軍開府儀同三司班劒三十五人是年七月戊子夜後廢帝殂奉迎入居朝堂壬辰即皇帝位南齊武帝賾太祖長子建元元年立為皇太子四年三月壬戌即皇帝位鬰林王昭業武帝子文惠太子長懋之長子也永明十一年正月長懋薨四月立為皇太孫居東宮七月戊寅即皇帝位海陵王昭文鬱林王弟也永明四年封臨汝公十一年封新安王隆昌元年七月丁酉明帝為大將軍廢鬱林王立昭文為帝宣皇太后令曰新安王體自文皇叡哲天秀宜入嗣鴻業永寧四海即以禮奉迎是日即皇帝位以明帝為大將軍錄尚書事明帝鸞太祖兄始安王道生之子永明十一年七月武帝遺詔為侍中尚書令隆昌元年加鎭軍大將軍太傅宣城王是年七月廢鬱林王立海陵王十月又廢之宣皇太后令曰太傅宣城王遺體宣皇鍾慈太祖識冠生民功高造物符表夙著謳頌有在宜入承寶命式寧宗祏癸亥即皇帝位東昏侯寶卷明帝第二子建武元年立為皇太子永㤗元年七月乙酉即位和帝寶融明帝第八子建武元年封隋郡王永元元年改封南康王持節督荆雍益寧梁南北秦七州軍事西中郎將荆州刺史二年十一月甲寅長史蕭頴胄殺輔國將軍巴西梓潼二郡太守劉山陽奉雍州刺史蕭衍舉義兵以衍為持節都督前鋒諸軍事左將軍頴胄為右將軍都督行臺諸軍事十二月壬辰驍騎將軍夏侯亶自京師至江陵稱宣德太后令曰西中郎將南康王宜纂承皇祚光臨億兆方俟清宮未即大號可且封宣城南瑯琊南東海東陽臨安新安尋陽南郡竟陵宜都十郡為宣城王相國荆州牧加黄鉞置僚屬選百官西中郎將南康國並如故須軍次近路主者詳依舊典法駕奉迎三年正月建牙于城南二月羣僚上尊號立宗廟及南北郊三月乙巳即皇帝位十二月丙寅雍州刺史王國珍侍中張楞廢東昏侯建康城平封東昏侯為涪陵王梁簡文帝綱高祖第三子昭明太子統母弟天監五年封晉安王大通三年立為皇太子太清三年五月辛巳即皇帝位元帝繹高祖第七子天監十三年封湘東王太清元年為荆州刺史都督荆雍九州諸軍事三年三月侯景㓂建業高祖密詔帝為侍中假黄鉞都督中外諸軍事司徒承制徴兵討景是年簡文帝為景立明年改元太寶又明年逼禪於豫章王棟改元天正而帝在江陵只稱太清五年又明年三月王僧辨等平侯景傳其首至江陵十一月丙子即帝位敬帝方智元帝第九子承聖二年以晉安王出為江州刺史三年十一月江陵為西魏所陷太尉揚州刺史王僧辨司空南徐州刺史陳覇先等定議以帝為太宰承制奉迎還京師四年二月入居朝堂三月北齊遣其上黨王高渙送貞陽侯蕭淵明來主梁嗣至東關呉興太守裴之横與戰敗績僧辨率衆出屯姑熟七月辛丑僧辨納淵明自采石濟江甲辰入於京師以帝為皇太子九月甲辰霸先舉義襲殺僧辨黜淵明丙午即皇帝位陳高祖紀云初北齊之請納貞陽也高祖以為不可遣使詣僧辨苦爭之反復數四僧辨竟不從高祖居嘗憤歎密謂所親曰武皇雖盤石之宗逺布四海至於克雪讎恥寧濟艱難惟孝元而己功業之盛前代未聞我與王公俱受重寄語未絶音聲猶在耳豈期一旦乃有異圖嗣主高祖之孫元皇之子海内屬目天下宅心竟有何辜坐致廢黜逺求夷狄假立非次􅀚其此情亦可知矣乃密賜其袍數千領及錦綵金銀以為賞賜之具九月壬寅高祖詔徐度侯安都周文育等謀之仍部署將士分賞金銀綵帛水陸俱進是夜發南徐州討王僧辨甲辰高祖歩軍至石頭前遣勇士自城北踰入時僧辨方視事外白有兵俄而兵自内出僧辨遽走與其第三子鎭相遇俱出閣右尚數千人苦戰高祖大兵尋至僧辨衆寡不敵走登城南門樓高祖因風縱火僧辨窮迫乃就擒是夜縊僧辨及鎮丙午貞陽遜位百寮奉晉安王上表勸進十月己酉晉安即位後梁宣帝詧昭明太子統第三子中大通三年封岳陽郡王大同元年出為雍州刺史太清三年高祖以詧兄江東王譽為湘州刺史徙湘州刺史張讃為雍州以代詧屬侯景㓂建業詧不受代西魏恭帝元年後周太祖輔政令柱國于謹平江陵立詧為梁主居江陵東城資以江陵一州之地其襄陽所統東歸于魏詧稱皇帝於其國孝明帝巋宣帝太子詧殂太子嗣位後王琮明帝巋之子初封東陽王尋立為太子巋殂太子嗣位後歸於隋陳世祖文帝蒨高祖兄始興昭烈王之長子永定初封臨川郡王三年率兵城南皖是年六月丙午高祖遺詔徵入纂位甲寅至自南皖入居中書省皇后令曰昊天不弔上𤣥降禍大行皇帝奄捐萬國率土哀號普天如䘮窮酷煩寃無所迨及諸孤藐爾反國無期須立長主以寧㝢縣侍中安東將軍臨川王蒨體自景皇屬惟猶子建殊功於牧野敷盛業於戡黎納麓時敘之辰負扆乗機之日竝佐時雍是同草創祧祏所繫遐邇宅心宜奉天宗嗣膺寶籙使七廟有奉兆民寧晏未亡人假延餘息嬰此百罹尋經纒綿興言感絶帝固譲至于再三羣公卿士固請其日即皇帝位於太極前殿廢帝伯宗文帝嫡長子永定二年立為臨川王世子文帝嗣位立為皇太子天康元年四月癸酉即皇帝位於太極前殿詔曰上天降禍大行皇帝奄捐萬國攀號靡及五内摧殞朕以凉德嗣膺寶命㷀㷀在疚懼其綴旒方頼宰輔救其不逮其令内外文武各復其職逺方悉停奔赴高宗皇帝頊始興昭烈王第二子文帝嗣位封安城王廢帝光大二年累加太傅領司徒十一月甲寅慈訓太后令降廢帝為臨海郡王以帝入纂令曰太傅安成王固天生德齊聖廣淵二后鍾心三靈佇眷自前朝不悆任總邦家威惠相宣刑禮兼設指揮嘯叱湘郢廓清闢地開疆荆益風靡若太戊之承殷厯中宗之奉漢嗣較以功名曾何髣髴且地彰玉璽天表長彗王欽若等曰是歲五月帝為太傅獻玉璽六月彗星見布新除舊禎祥咸顯文皇知子之監事甚帝堯傳弟之懷又符大伯今可還申曩志崇立賢君方固宗祧載貞辰象中外宜依舊典奉迎輿駕未亡人不幸屬此殷憂不有崇替容危社稷何以拜祠高寢歸附武園攬筆澘然兼懷悲慶三年正月甲午即皇帝位於太極前殿後主叔寶宣帝嫡長子天嘉三年封成安王大建元年立為皇太子十四年正月丁巳即皇帝位于太極前殿東魏孝静帝清河王亶世子永熈三年八月孝武帝既入關十月大將軍高歡乃與百寮㑹議推帝以奉明帝之後即皇帝位于雒城是月東北遷于鄴北齊廢帝殷文宣帝長子天保元年立為皇太子十年十月癸卯即帝位於晉陽宣德殿孝昭帝演字延安文宣母弟也天保元年封常山王十年十一月廢帝嗣位乃即朝班除太傅錄尚書事朝政皆決於帝月餘乃居藩邸自是詔勑多不關帝客或言於帝曰鷙鳥捨巢必有探卵之患今日之地何宜屢出乾明元年從廢帝赴鄴居于領軍府時楊愔燕子獻爾朱渾天和宋欽道鄭子黙等以帝望既重内懼權逼請以帝為太師司州牧録尚書事長廣王湛為大司馬錄并省尚書事觧京畿大都督帝以尊親而見猜斥乃與長廣王期獵謀之于野三月甲戌帝初上省旦發領軍府大風暴起壞所御車幔帝甚惡之及至省朝士咸集坐定酒數行于坐執尚書令楊愔右僕射燕子獻領軍爾朱渾天和侍中宋欽道等於座帝戎服與平原王段韶平秦王高歸彦領軍劉洪徽入自雲龍門於中書省前遇㪚騎常侍鄭子黙又執之同斬于御府之内帝至東閤門都督成休寧抽刃呵帝帝令高歸彦喻之休寧厲聲大呼不從歸彦既為領軍素為兵士所服悉皆弛仗休寧方歎息而罷帝入至昭陽殿幼主太皇太后皇太后並出臨御坐帝奏愔等罪求伏專擅之罪時庭中及兩廊下衛内二千餘人皆披甲待詔武衛娥永樂武力絶倫被文宣重遇撫刃思効廢帝性吃訥兼倉卒不知所言太皇太后又為皇太后誓言帝無異志唯去逼而已高歸彦宣勑勞衛士觧嚴永樂乃内刃而泣帝乃令歸彦引侍衛之士向華林園以京畿軍入守門閤斬娥永樂于園詔以帝為大丞相都督中外諸軍錄尚書事帝尋入晉陽有詔軍國大政咸諮決焉帝既當大位知無不為乾明元年八月壬午宣太后令降廢帝為濟南王是日即位於晉陽宣德殿武成帝湛孝昭帝母弟天保元年封長廣王皇建元年為右丞相孝昭幸晉陽留帝守鄴二年十一月甲辰孝昭詔曰朕嬰此暴疾奄忽無逮今嗣子沖𦕈未聞政術社稷業重理歸上德右丞相長廣王研幾測化體道居宗人雄之望海内瞻仰同胞共氣家國所馮可遣尚書左僕射趙郡王叡喻㫖徵王統玆大寳手書云宜將吾妻子置一好處勿學前人也帝乃自鄴至晉陽宮發䘮於崇德殿皇太后令所司宣遺詔左丞相斛律金率百僚敦勸三奏乃許之癸丑即皇帝位於南宫後主緯武成帝長子大寧二年立為皇太子河清四年四月太史奏天文有變其占當有易主丙子乃使太宰段韶兼太尉持節奉皇帝璽綬傳位於皇太子於是羣公上尊號為太上皇帝軍國大事咸以奏聞初將傳政使内參乘子尚乘驛送詔書于鄴子尚出晉陽城見孑騎隨後忽失之子尚未至鄴而其言已布矣梁末帝瑱太祖第三子開平元年封均王四年出為東京馬歩軍都指揮使乾化二年六月三日庶人友珪為逆遂即偽位明年改元鳳厯是年二月侍衛親軍使袁象先引禁兵誅友珪遣趙巖賫傳國寶至東京請帝即位於雒陽帝報之曰夷門太祖創業之地公等如堅推戴册禮宜在東京賊平之日即謁雒陽陵廟是月帝即位於東京乃去鳳歴之號復稱乾化三年年號自漢武紀元立號而後代因之逮於鼎國以至江左亦皆建正朔備制度或摽瑞應之日或取休美之稱或宣紀德化或章明功烈紀年頒歴於是乎在今考於舊史洎東魏北齊以及朱梁條次比敘咸可見矣蜀先主以後漢建安二十六年四月即皇帝位於成都是歲魏黄初三年先主猶稱建安大赦改元章武盡三年四月後主以章武三年四月即位改元建興盡十五年延熈元年正月大赦改元盡二十年景耀元年史官言景星見於是大赦改元盡六年夏炎興元年夏大赦改元其年降於晉王欽若等曰自此以下不書月者皆史闕文呉大帝初為呉王以魏黄初三年九月改元黄武盡七年三月黄龍元年四月夏口武昌並言黄龍鳳凰見丙申南郊即皇帝位大赦改元盡三年嘉禾元年黄龍三年十月㑹稽南始平言嘉禾生十二月丁卯大赦改元盡七年七月赤烏元年八月武昌言麒麟見有司奏言麒麟者太平之應宜改年號詔曰間者赤烏集於前殿朕親見若神靈以為嘉祥者改年宜以赤烏為元羣臣奏曰昔武王伐紂有赤烏之祥君臣觀之遂有天下聖人書䇿載述最祥者以為近事既嘉親見文明也於是改元盡十四年四月太元元年五月立皇后潘氏大赦改元盡明年正月神鳳元年二月大赦改元盡其年三月廢帝亮以神鳳元年四月即位大赦改元建興盡二年五鳳元年建興二年十一月有大鳥五見于春申明年改元盡三年十月太平元年十一月己酉大赦改元盡三年九月景帝以太平三年九月即位大赦改元永安盡七年七月後主以永安七年七月即位大赦改元元興盡其年甘露元年四月蔣陵言丼露降於是大赦改元盡二年七月寶鼎元年八月所在言得大鼎於是大赦改元盡四年九月建衡元年八月大赦改元盡三年鳳凰元年建衡三年西苑言鳳凰集改元盡三年天册元年呉郡言掘地得銀長一尺廣三分刻上有年月字於是大赦改元盡其年天璽元年呉郡言臨平湖自漢末草穢壅塞今更開通長老相傳此湖塞天下亂此湖開天下平又於湖邉得石函中有小石青白色長四寸廣二寸餘刻上作皇帝字於是大赦改元盡其年天紀元年鄱陽言歴陽山石文理成字又呉興陽羡山有空石長十餘丈名曰石室所在表為大瑞乃遣兼司徒董朝兼太常周處至陽羡縣封禪國山改元大赦以協石文盡四年三月降于晉宋高祖以晉元熙二年六月受禪改元永初盡三年少帝以永初三年五月即位明年正月己亥朔大赦改元景平盡二年七月文帝以景平二年七月自宜都王即位大赦改元元嘉盡三十年孝武帝以元嘉三十年四月即位明年正月親祠南郊大赦改元孝建盡三年大明元年正月辛亥朔大赦改元盡八年前廢帝以大明八年閏五月即位明年正月乙未朔大赦天下改元永光盡其年八月景和元年八月誅太宰江夏王義恭等改元盡其年明帝以景和元年十二月丙寅自湘東王即位大赦改元㤗始盡七年㤗豫元年正月甲寅朔帝有疾不朝㑹以疾患未痊故改元㤗豫盡其年後廢帝以㤗豫元年四月即位明年正月戊寅朔大赦改元元徽盡五年七月順帝以元徽五年七月即位大赦改元昇明盡三年三月南齊太祖以宋昇明三年四月受禪大赦改元建元盡四年二月世祖武皇帝以建元四年三月即位改元永明盡十一年鬱林王以永明十一年七月即位明年正月丁未大赦改元隆昌盡其年七月海陵王以隆昌元年七月即位改元延興盡其年十月明帝以延興元年十月即位大赦改元建武盡四年永泰元年四月甲寅赦三署囚改元盡其年東昏侯以永泰元年七月即位明年正月大赦改元永元盡二年三月和帝以永元三年三月即位于江陵大赦改元中興盡二年四月梁高祖天監元年以齊中興二年四月受禪改元天監盡十八年普通元年正月乙亥大赦改元盡七年大通元年三月大赦改元盡二年中大通元年十月己酉大赦改元盡六年大同元年正月戊申朔大赦改元盡十一年中大同元年四月大赦改元盡其年太清元年四月丁亥大赦改元盡三年簡文帝以太清三年五月即位明年正月辛亥朔大赦改元大寶盡二年七月侯景逼禪于豫章王改元天正元帝以太清六年十一月即位改元詔曰昔虞夏商周年無嘉號漢魏晉宋因循以乆朕雖云撥亂自非創業思得上繫宗祧下惠億兆可改太清六年為承聖元年盡三年敬宗紹㤗元年以承聖三年十一月元帝都江陵陷于長安陳霸先等定議以帝為皇太子明年九月霸先襲殺王僧辨黜蕭淵明十月帝即皇帝位大赦改元盡二年八月太平元年九月壬寅改元盡二年十月禪于陳後梁宣帝以後魏恭帝元后為后周太祖所立居江陵東城稱皇帝於其國年號大定盡八年明帝以大定八年嗣位改元天保盡二十三年後主以太子嗣位改元廣運盡二年歸于隋陳高祖以梁太平二年十月受禪大赦改元永定盡三年文帝以永定三年六月即位明年正月癸丑大赦改元天嘉盡六年天康元年三月大赦改元盡其年廢帝以天康元年四月癸酉自太子即位明年正月大赦改元光大盡二年宣帝以光大二年十一月自太傅入纂位明年正月甲午即位改元大建盡十四年後主以大建十四年正月即位明年正月壬寅大赦改元至德盡四年禎明元年正月戊寅大赦改元盡三年正月為隋所滅東魏孝靜帝以後魏永熙三年十月為高歡所立即皇帝位於鄴城東北大赦改元天平盡四年元象元年正月有巨象自至碭郡陂中南兖州獲送于鄴大赦改元盡其年興和元年十月癸亥以鄴都新宫成大赦改元盡四年武定元年正月壬戌朔大赦改元盡八年五月禪于北齊北齊文宣以東魏武定八年五月受禪南郊禪畢大赦改元天保盡十年初帝改年識者曰天保之字一大人共十帝其不過十年乎廢帝以天保十年十月即位明年正月癸丑朔大赦改元乾明盡其年八月孝昭帝以乾明元年八月即位於晉陽宣德殿大赦改元皇建盡二年十月武成帝以皇建二年十一月癸丑即位于南宮大赦改元大寧盡二年三月河清元年四月以河濟清改元盡四年三月後主以河清四年四月即位大赦改元天統盡五年武平元年正月乙酉朔大赦改元盡七年十月隆化元年十二月丁巳大赦改元盡其年少帝以隆化二年正月乙亥即位大赦改元承光元年在位十八日以後俱奏青州為後周所滅梁太祖以唐天祐四年四月受禪改元開平盡五年四月乾化元年五月甲申朔御朝元殿大赦改元盡六年六月末帝以乾化三年二月即位於大梁五年十一月改元貞明盡七年四月先是乾化二年六月庶人友珪弑逆明年正月改元鳳歴是年二月誅友珪帝復稱乾化至是改焉龍德元年五月丙戌朔改元盡三年十月為後唐所滅册府元龜卷一百八十八
