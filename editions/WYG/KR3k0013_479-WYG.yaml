body:
  text: 册府元龜卷四百七十九宋王欽若等撰臺省部姧邪仲尼有言曰巧言令色鮮矣仁又曰鄉原徳之賊也斯姧邪之謂歟漢氏而下庻官增益臺職竝建省署交屬乃有因縁㑹遇濫竊名器而便僻其性險詖其行外剛内荏譸張詭隨狥其媚竈之説希其枉尋之利繇是戕害時彦阿順君㫖畫隂狡之策圗取乎權位崇矯飾之迹張大其名稱忌前而固寵結黨以附炎佞言似忠同惡相濟極其傾巧之態副其浮動之志眩惑左右靡可防遏敗類蠧政莫斯為甚古人所以比於蟊賊喻於穿窬之盜者蓋有以也後漢陳忠安帝時為尚書令忠既不得志于鄧氏及鄧隲等敗衆庻多怨之而忠數上疏陷成其惡遂詆劾大司農朱寵順帝之為太子廢也諸名臣來歴祝諷等守闕固爭時忠與諸尚書復共劾奏之及帝立司隸校尉虞詡追奏忠等罪當世以此譏之賈朗順帝時為尚書㑹司𨽻校尉虞詡自繫廷尉奏言中常侍張防罪惡坐論輸左校二日之中傳考四獄宦者孫程張賢相率言詡盡忠而防贜罪明正帝問諸尚書朗素與防善證詡之罪帝疑焉謂程曰且出吾方思之於是詡子顗與門生百餘人舉幡候中常侍高梵車叩頭流血訴言枉狀梵乃入言之防坐徙邉賈朗等六人或死或黜任芝靈帝時為侍中帝欲造畢圭靈琨苑司徒楊賜上疏諫帝以問任芝及中常侍樂松松等曰昔文王之囿百里人以為小齊宣五十里人以為大今與百姓共之無害於政也帝悅遂令築苑魏丁廙太祖時為黄門侍郎廙常從容謂太祖曰臨菑侯天性仁孝發於自然而聰明智達其殆庻幾至於博學淵識文章絶倫當今天下之賢才君子不問少長皆願從其游而為之死實天下所以鍾福於大魏而永授無窮之祚也欲以勸動太祖太祖答曰植吾愛之安能若卿言吾欲立之為嗣何如廙曰此國家之所以興衰天下之所以存亡非愚劣𤨏賤者所敢與及廙聞知臣莫若於君知子莫若於父至於君不論明闇父不問賢愚而能常知其臣子者何蓋由相知非一事一物相盡非一旦一夕况明公加之以聖哲習之以人子今發明達之命吐永安之言可謂上應天命下合人心得之於須臾垂之於萬世者也廙不避斧鉞之誅敢不盡言太祖深納之及文帝即王位誅廙劉􅁮明帝時為侍中大見親重帝将伐蜀朝臣内外皆曰不可伐入與帝議因曰可伐出與朝臣言因曰不可伐􅁮有膽智言之皆有形中領軍楊暨帝之親臣又重􅁮持不可伐蜀之議最堅每從内出輙過􅁮􅁮講不可之意後暨從駕行天淵池帝論伐蜀事暨切諌帝曰卿書生焉知兵事暨謙謝曰臣出自儒生之末陛下過聽拔臣羣萃之中立之六軍之上臣有微心不敢不盡言臣言誠不足采侍中劉曄先帝謀臣嘗曰蜀不可伐帝曰􅁮與吾言蜀可伐暨曰曄可召質也詔召􅁮至帝問􅁮終不言後獨見􅁮責帝曰伐國大謀也臣得與聞大謀嘗恐夢寐漏洩以益臣罪焉敢向人言之夫兵詭道也軍事未發不厭其宻也陛下顯然露之臣恐敵國已聞之矣於是帝謝之曄出見暨責曰夫釣者中大魚則縱而隨之須可制而後牽則無不得也人主之威豈徒大魚而已子誠直臣然計不足采不可不精思也暨亦謝之􅁮能應變持兩端如此或惡曄於帝曰曄不盡忠善伺上意所趨而合之陛下試與􅁮言皆反意而問之若皆與所問反者是曄嘗與聖意合也復每問皆同者曄之情必無所復逃矣帝如言以驗之果得其情從此疏焉􅁮遂發狂出為大鴻臚以憂死孫資明帝時為中書令與中書監劉放乆專權寵景初二年帝疾篤以燕王宇為大將軍使與領軍將軍夏侯獻武衞将軍曹爽屯騎校尉曹肇驍騎将軍秦朗等對輔政資放素與朗等不善懼有後害隂圗間之而宇嘗在帝側故未得有言及帝氣微宇下殿呼曹肇有所議未還而帝少間惟曹爽獨在放知之呼資與謀資曰不可動也放曰俱入鼎鑊何不可之有乃突前見帝垂泣曰陛下氣微若有不諱将以天下付誰帝曰卿不聞用燕王邪放曰陛下􅁯先帝詔勅藩王不得輔政且陛下方病而曹肇秦朗等便與才人侍疾者言戲燕王擁兵南面不聽臣等入此即䜿刁趙高也今皇太子幼弱未能統政外有強暴之寇内有勞怨之民陛下不逺慮存亡而近係恩舊委祖考之業付二三凡士寢疾數日外内擁隔社稷危殆而已不知此臣等所以痛心也帝得放言大怒曰誰可任者放資乃舉爽代宇又曰宜詔司馬宣王使相參帝從之放資出曹肇入泣涕固諫帝使肇勑停肇出户放資趨而往復説止帝帝又從其言放曰宜為手詔帝曰我困篤不能放即上牀執帝手強作之遂齊出大言曰有詔免燕王宇等官不得停省中於是宇肇獻朗相與泣而歸第晉賈充武帝時為中書令侍中從容任職褒貶在己頗好進士每有所薦達必終始經緯之是以士多歸焉帝舅王恂嘗毁充而充更進恂或有背充以要權貴者充皆陽以素意待之荀朂為侍中中書監乆管機宻有才思探得人主微意不犯顔廷爭故得始終全其寵禄初與賈充朋黨及充将鎮闗右也朂謂馮紞曰賈公逺放吾等失勢太子婚尚未定若使充女得為妃則不留而自停矣朂與紞伺帝間竝稱充女才色絶世若納東宫必能輔佐君子有闗雎后妃之徳遂成婚武帝以太子闇弱恐後亂國遣朂及和嶠往觀之朂還盛稱太子之徳而嶠云太子如初於是天下貴嶠而賤朂帝将廢賈妃朂與馮紞等諫請故得不廢時議以朂傾國害時孫資劉放之匹也馮紞為侍中武帝病篤得愈紞與荀朂見朝野之望屬在齊王攸攸素薄朂朂以太子愚劣恐攸得立有害於己乃使紞言於帝曰陛下前者疾若不差太子其廢矣齊王為百姓所歸公卿所仰雖欲高讓其得免乎宜遣還藩以安社稷帝納之及攸薨朝野悲恨初帝友于之情甚篤既納紞朂邪説遂為身後之慮以固儲位既聞攸殞哀慟特深紞侍立因言曰齊王名過於實今得自終此乃大晉之福陛下何乃過哀帝乃收淚而止一説武帝晩年諸子竝弱而太子不令朝臣内外皆屬意於攸中書監荀朂侍中馮紞皆諂諛自進攸素疾之朂等以朝望在攸恐其為嗣害必及己乃從容言於帝曰陛下萬嵗之後太子不得立也帝曰何故朂曰百僚内外皆歸心於齊王太子焉得立乎陛下試詔齊王之國必舉朝以為不可則臣言有徵矣紞又言曰陛下遣諸侯之國成五等之制者宜先從親始親莫如齊王帝信納之王國寳從妹為㑹稽王道子妃孝武帝時道子輔政國寶入補侍中遷中書令中領軍與道子持威權扇動内外中書郎范甯國寶舅也儒雅方直疾其阿諛勸帝黜之國寶乃使陳郡袁悦之因尼支妙音致書與太子母陳淑媛説國寶忠謹宜見親信帝知之託以他罪殺悦之國寶大懼遂因道子譛毁甯甯繇是出為豫章太守及弟忱卒國寳自表求觧職迎母并奔忱䘮詔特賜假而盤桓不時進發為御史中丞褚粲所奏國寳懼罪衣女子衣託為王家婢詣道子告其事道子言之於帝故得原繇是愈驕蹇不遵法度起齋侔清暑殿帝惡其僣侈國寳遂諂媚於帝而頗踈道子道子大怒嘗於内省面責國寳以劍擲之舊好盡矣是時王雅亦有寵薦王恂於帝帝夜與國寳及雅宴帝微有酒令召恂将至國寳自知才出恂下恐至傾其寵因曰王恂當今名流不可以酒色見帝遂止也宋王僧綽文帝末為侍中元凶劭弑立使蕭斌作詔改元太初斌辭以不文乃使僧綽為之太初之號劭素所定斌曰舊踰年改元劭以問僧綽僧綽曰晉恵帝即位便改劭喜從之後劭檢文帝巾箱中得僧綽所啓劭過惡遂遇害何偃文帝末為侍中掌詔誥時元凶弑立偃父尚之為司空尚書令偃居門下父子竝處權要時為寒心而尚之及偃善攝機宜曲得時譽㑹世祖即位任遇無改張完後廢帝時為正貟郎以險行見寵因坐廢錮南齊江謐初仕宋明帝為右丞兼比部郎及太祖領南兖州謐為鎮軍長史廣陵太守入為㳺擊将軍性洽流俗善趨時利後廢帝元徽末朝野咸屬意建平王景素謐深自委結景素事敗僅得免禍蒼梧王廢後物情尚懐疑惑謐獨竭誠歸事太祖以本官領尚書左丞順帝昇明元年遷黄門侍郎左丞如故沈攸之事起議加太祖黄鉞謐所建也齊建元元年為侍中及太祖不豫謐稱疾不入帝頗疑其怨不豫顧命也武帝即位謐又不遷官以此怨望及帝不豫謐詣豫章王嶷請問曰至尊非起疾東宫又非才公今欲作何計武帝知之出謐為鎮北長史東海太守未發帝使御史中丞沈冲奏謐前後罪曰謐少懐輕躁長習諂薄交無義合行必利動特以奕世更局見擢宋朝而阿䛕内外貨賂公行咎盈憲簡戾彰朝聽輿金輦寳取容近習以沈攸之地勝兵強終當得志委心託身嵗暮相結以劉景素親屬望重物應樂推獻誠薦子窺􅎿非望時艱網漏得全首領太祖翊正天地方宏逺圗薄其難洗之瑕許其革音之効加以非分之寵推以不次之榮列迹勲良比肩朝徳以徃者微勤刀筆小用掌厠河山任忝出入輕險之性在貴彌彰貪昧之情雖富無滿重蒞湘部顯行斷盜及居銓衡肆意受納連席同乗皆詖邪舊侣宻延閒讌必貨賄常客理合升進者以為已恵事宜貶退者並稱中㫖謂販鬻威權姦狀不露欺主罔上姦議可掩先帝寢疾彌留人神憂震謐託病私舎曾無變容國諱經旬甫蹔入殿參訪遺詔覘忖時㫖以身列朝流宜蒙兼帶先顧不逮舊位無加遂崇飾惡言肆醜縱悖謗誹朝政訕毁皇猷遍嗤忠賢歴詆台相至於蕃嶽入授列代常規勲戚出撫前王彛則而謐妄發樞機坐搆囂論復貶謗儲后不顧辭端毁折宗主每窮舌抄皆云誥誓乖禮崇樹失宜仰指天俯畫地希幸災故以申積憤犯上之迹既彰反噬之情已著請免官削爵土收送廷尉獄治罪死陳沈客卿後主時為中書舎人性便佞忍酷每立異端唯以刻削百姓為事繇是自進有施文慶者起自微賤有吏用後主拔為主書遷中書侍郎俄擢為湘州刺史未及之官㑹隋軍來伐四方鎮相繼以聞文慶客卿俱掌機宻外有表啓皆申其奏呈文慶心悦湘州重鎮兾欲早行遂與客卿共為表裏抑而不言後主弗之知也遂以無備至乎敗國實二人之罪隋軍既入並戮之於前闕孔範後主時為都官尚書隋師臨江後主從容而言曰齊兵三來周師再至無復摧敗彼何為者範曰長江天塹古以為限隔南北今日北軍豈能飛渡耶臣每恨官卑彼若渡來臣為太尉矣後主大悦因奏妓縱樂賦詩不輟後魏崔亮為御史中尉時邢巒為度支尚書侍中盧昶與巒不平昶與元暉俱宣武所寵亮昶之黨也昶暉令亮糾巒事成許言於帝以亮為侍中亮於是奏劾巒在漢中掠良人為奴婢巒懼為昶等所陷乃以漢中所得巴西太守龎景民女化生等二十餘口與暉化生等數人竒色也暉大悦乃背昶為巒言於帝云巒新有大功已經赦宥不宜方為此獄帝納之高肇以巒有克敵之效而為昶所排􅂇巒申釋故得不坐李神軌孝明時為貟外常侍光禄大夫為靈太后寵遇勢傾朝野時云見幸帷幄與鄭儼為䨇時人莫能明也徐紞為黄門侍郎性浮動慕權利外似謇正内實諂諛時豪勝己必相陵駕書生貧士矯意禮之其詭態若此有識者鄙薄焉魏蘭根孝莊時為中書令帝之将誅爾朱榮也蘭根聞其計遂宻告爾朱世隆榮死蘭根恐帝知之憂懼不知所出時應詔王道習見信於帝蘭根乃託附之求得在外立功道習為啓聞乃以蘭根為河北行臺綦儁出帝時為左光禄大夫儀同三司儁佞巧能候當途斛斯椿賀㧞勝皆與友善斛斯椿之搆間也出帝令儁奉詔晉陽齊獻武王集文武與儁申釋辭屈而退北齊薛琡累遷尚書僕射乆在省闥閑明簿領當官割斷敏速如流然天性險忌情義不篤外似方格内實浮動受納貨賄曲法舞文深情刻薄多所傷害士民畏惡之祖珽字孝徵武成時為中書侍郎初孝徵善為胡桃油以塗畫進之長廣王因言殿下有非常骨法孝徵夢殿下乗龍上天王謂曰若然當使兄大富貴及帝即位擢孝徵中書侍郎帝嘗於後園使珽彈琵琶和士開胡舞各賞物百叚士開忌之出為安徳太守轉齊郡太守以其母老乞還侍養詔許之㑹江南使人來聘為中勞使尋為散騎常侍假儀同三司掌詔誥初珽於乾明皇建之時知武成隂有大志遂深自結納曲相祗奉武成於天保世頻被責心嘗銜之珽至是希㫖上書謂追尊太祖獻武皇帝為神武高祖文宣皇帝改為威宗景烈皇帝以悦武成從之時皇后爱少子東平王儼願以為嗣武成以後主體正居長難於移易珽私於士開曰君之寵幸振古無二宫車一日晩駕欲何以克終士開因求策焉珽曰宜說主上云襄宣昭帝子俱不得立今宜命皇太子早踐大位以定君臣若事成中宫少主皆徳君此萬全計也君且微説令主上粗解珽當自外上表論之士開許諾因有彗星出太史奏云除舊布新之徵珽於是上書言陛下雖為天子未是極貴案春秋元命苞云乙酉之嵗除舊革政今年太嵗乙酉宜傳位東宫令君臣之分早定且以上應天道并上魏獻文禪子故事帝從之繇是拜祕書監加儀同三司大被親寵既見重二宫遂志於宰相先與黄門侍郎劉逖友善及疏侍中尚書令趙彦深侍中左僕射元文遥侍中和士開罪狀令逖奏之逖懼不敢通其事頗泄彦深等先詣帝自陳帝大怒執珽詰曰何故毁我士開珽因厲聲曰臣繇士開得進本無毁之之意陛下今既問臣臣不敢不以實對士開文遥彦深等專弄權威控制朝廷與吏部尚書尉瑾内外交通共為表裏賣官鬻獄政以賄成天下謌謡若為有識所知安可聞於四裔陛下不以為意臣恐大齊之業隳矣帝曰爾乃誹謗我珽曰不敢誹謗陛下取人女帝曰我以其儉餓故收養之珽曰何不開倉賑給乃買取将入後宫乎帝益怒鞭杖亂下將撲殺之大呼曰不殺臣陛下得名若欲得名莫殺臣為陛下合金丹遂少獲寛放珽又曰陛下有一范增不用之如何帝又曰爾自作范增以我為項羽邪珽曰項羽人身亦何繇可及但天命不至爾項羽布衣率烏合衆五年而成霸王業陛下藉父兄之資纔得至此臣以項羽未易可輕臣何止方於范增縱張良亦不能及張良身傅天子猶因四皓方定漢嗣臣位非輔弼䟽外之人竭力盡忠勸陛下禪位使陛下尊為太上子居宸扆於己及子俱保休祚蕞爾張良何足可數帝愈怒令以土塞其口珽且吐且言無所屈撓乃鞭二百配甲坊尋徙光州武成厭世後主憶之就除海州刺史是時陸令萱外干朝政其子穆提婆爱幸珽乃遺陸媪弟悉達書曰趙彦深心腹隂沈欲行伊霍事儀同姊弟豈得平安何不早用智士耶和士開亦以珽能決大事欲以為謀主故棄舊怨虛心待之與陸媪言於帝曰襄宣昭三帝其子皆不得立今至尊猶在帝位者實由祖孝徵此人有大功宜報重恩孝徵心行雖薄竒畧出人緩急真可慿仗且其䨇盲必無反意請喚取問其謀計從之入為銀青光禄大夫秘書監加開府儀同三司和士開死後仍説陸媪出彦深以珽為侍中在晉陽通宻啓請誅瑯琊王其計既行漸被任遇又太后之被幽也珽欲以陸媪為太后撰魏帝皇太后故事為太姬言之謂人曰太姬雖云婦人實是雄傑女媧以來無有也太姬亦稱珽為國師國寳繇是拜尚書左僕射監國史加特進入文林舘總監撰書封燕郡公食太原郡給幹兵七十人所住宅在義井坊旁拓鄰居大事修築陸媪自往案行勢傾朝野珽又附陸媪求為領軍後主許之詔須覆述取侍中斛律孝卿署名孝卿宻告高元海語侯吕芬穆提婆云孝徵漢兒兩眼又不見物豈合作領軍也明旦面奏具陳珽不合之狀幷書珽與廣寜王孝珩交結無大臣體珽亦面見帝令引入珽自分䟽幷云與元海素相嫌必是元海譛臣帝弱顔不能諱曰然珽列元海共司農卿尹子華太府少卿李叔元平淮令張叔略等結朋樹黨遂除子華仁州刺史叔元襄城郡太守叔畧南營州録事參軍陸媪又唱和之復除元海鄭州刺史珽自是專主機衡總知騎兵事内外親戚皆得顯位後主亦令中要數人扶持出入著紗㡌直至永巷出萬春門向聖夀堂每同御榻決論政事委任之重羣臣莫比自和士開執政以來政體隳壊珽推崇高望官人稱職内外稱美復欲增損政務沙汰人物始奏罷京畿府併於領軍百姓皆歸郡縣宿衛都督等號位從舊官名文武服章並依故事又欲黜諸閹䜿及羣小軰推誠延士為致安之方陸媪穆提婆議頗同異珽乃諷御史中丞麗伯律令劾主書王子冲納賄知其事連穆提婆欲使贜罪相及望因此坐并及陸媪猶恐後主溺於近習欲因后黨為援請以皇后兄胡君瑜為侍中中領軍又徵君瑜兄梁州刺史君璧欲以為御史中丞陸媪聞而懐怒百方排毁即出君瑜為金紫光禄大夫觧中領軍君璧還鎮梁州皇后之廢頗亦繇此王子冲釋而不問珽日以益踈又諸宦者更共譛毁之無所不至後主問諸太姬憫嘿不對三問乃下牀拜曰老婢合死本見和士開道孝徵多才博學言為善人故舉之比來看之極是罪過人實難知老婢合死後主令韓長鸞檢案得出敕受賜十餘事以前與其重誓不殺遂觧珽侍中僕射出為北徐州刺史珽求見後主韓長鸞積嫌於珽遣人推出栢閤珽故求面見坐不肯行長鸞乃令軍士牽曳而出立珽於朝堂大加誚責上道後令追還觧其開府儀同郡公直為刺史卒於州和士開武成時為右僕射深見親狎言辭容止極諸鄙䙝以夜繼晝無復君臣之禮至説武成云自古帝王盡為灰爐堯舜桀紂竟復何異陛下宜及少壯恣意作樂縱横行之一日快活敵千年國事分付大臣何慮不辦無為自勤苦也武成大悦其年十二月武成寝疾於乾壽殿士開入侍醫藥武成謂士開有伊霍之才殷勤屬以後事握士開之手曰勿負我也仍絶於士開之手後主以武成顧託深委仗之又先得幸於胡太后是以彌見親宻徐之才武成時為侍中帝生齻牙問諸醫尚藥典御鄧宣文以實對帝怒而撻之後以問之才拜賀曰此是智牙生智牙者聰明長壽帝悦而賞之元文遥後主時為左僕射為侍中常探測上㫖時有委巷之言故不為知音所重韓鳯後主時為侍中領軍總知内省機宻武平中陳人冦彭城後主發言憂懼鳯進曰縱失河南猶得為龜兹國子淮南今沒何足多慮人生幾時但為樂不須愁也帝甚悦遂躭荒酒色不以天下為虞未幾為周所滅後周鄭譯宣帝初拜内史中大夫甚委任之譯乃獻新樂十二各一笙用十六管帝令與大宗伯斛斯徵議之徵駁其奏帝頗納焉及高祖山陵還帝欲作樂復令議其可不徵曰孝經云聞樂不樂聞尚不樂況其作乎譯曰既云聞樂明即非無後徵上疏極諫帝不納譯因譛之遂下徵獄遇赦得免册府元龜卷四百七十九
