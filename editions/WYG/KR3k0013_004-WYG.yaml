body:
  text: 册府元龜巻四宋王欽若等撰帝王部運厯昔郯子述五代之官紀蓋有倫矣稽之於易本其世數乃知庖犧之王正得天統共工繼起位非其序少昊之衰九黎亂徳顓頊始復建重黎之官以司天地其後三苗干紀二官咸廢堯命羲和以纂其業授時定歲衆功允治既而授舜曰天之厯數在爾躬舜亦以命禹三代之際牲服殊典漢紹周世議論累葉訖於中興始定厥制魏晉而下南北迭起而天祿永終實在中夏至或徴諸儒之説集盈庭之言敷引異轍㳂襲相戾及夫循五徳終始之傳叶三統因革之義頒正朔立制度咸推歴而更王居正而惟叙者矣太昊帝庖犧氏繼天而王為百王先首徳始於木故為太昊帝炎帝神農氏繼庖犧氏以火承木故為炎帝黄帝軒轅氏繼神農氏火生土故為土徳少昊氏黄帝之子青陽也繼軒轅氏土生金故為金徳天下號曰金天氏顓頊髙陽氏繼少昊氏金生水故為水徳天下號曰髙陽氏帝嚳髙辛氏青陽𤣥囂之孫也繼髙陽氏水生木故為木徳帝堯陶唐氏封於唐蓋髙辛氏衰天下歸之木生火故為火徳帝舜有虞氏堯䄠以天下䄠曰禪譲字也火生土故為土徳伯禹夏后氏虞舜嬗以天下土生金故為金徳故夏后氏尚黒以建寅之月為正物生黒色戎事乗驪戎兵也馬黒色曰驪爾雅曰騋牝驪牡𤣥牲用𤣥𤣥黑類也湯伐桀踐天子位乃改正朔服色尚白朝㑹以晝金生水故為水徳天下號曰商後曰殷初契封商湯居殷而受命故二號故殷人尚白以建丑之月為正物萌白色戎事乘翰翰白馬也牲用白周武王伐紂踐天子位水生木故為木徳號曰周室故周人尚赤以建子之月為正物萌色赤戎事乘騵騵驪馬白腹牲用騂騂赤類烈王二年周太史儋見秦獻公曰始周與秦國合合而别别五百載復合周始與秦俱黄帝後是合也至周孝王封非子為附庸是别也别後五百載謂自秦仲至孝公彊大周顯王致文武胙于孝公復與之親是復合也合十七歲而霸王者出焉從此後十七年而秦昭王立武王昭王皆覇至始皇而王天下漢髙祖起沛旗幟皆赤繇所殺蛇白帝子所殺者赤帝子故也既代秦繼周木生火故為火徳文帝時魯人公孫臣上書曰始秦得水及漢受之推終始傳則漢當土徳土徳之應黄龍見宜改正朔服色上黄時丞相張蒼好律厯以為漢乃水徳是時河决金隄其符也年始冬十月色外黒内赤十月隂氣在外故外黒陽氣尚伏在地故内赤也或曰十月百草外黒内赤也與徳相應公孫臣言非是罷之明年黄龍見成紀天水之縣也文帝召公孫臣拜為博士與諸生申明土徳草改歴服色事自漢興之初庶事草創唯一叔孫通略定朝廷之儀若乃正朔服色郊望之事數世猶未章焉至於孝文始以夏郊而張蒼據水徳公孫臣賈誼更以為土徳卒不能明武帝太初元年五月正厯以正月為嵗首色尚黄數用五兒寛司馬遷等猶從臣誼之言公孫臣賈誼服色數度遂順黄徳彼以五徳之傳從所不勝五帝相承代嘗以金木水火相勝之法若火滅金便以火代金秦在水徳故謂漢據土而克之劉向父子以為帝出于震故庖犧氏始受木徳其後以母傳子終則復始自神農黄帝下歴唐虞三代而漢得火焉故髙祖始起神母夜號著赤帝之符旗章遂赤自得天統矣向父子雖有此議時不施行至光武乃用火徳耳後漢光武建武二年正月始正火徳色尚赤漢初土徳色尚黄至此始明火徳旗幟尚赤服色於是乃正魏文帝以漢延康元年十一月受禪給事中博士蘇林董巴上表曰魏之氏族出自顓頊與舜同祖舜以土徳承堯之火今魏亦以土徳承漢之火於行運合於堯舜授受之次遂改延康元年為黄初元年議改正朔易服色殊徽號承土行十二月幸雒陽以夏數得天故即用夏正而服色尚黄又詔以漢火行也火忌水故雒去水而加佳魏於行次為土土水之壯也水得土而乃流土得水而柔故除佳加水變雒為洛明帝景初元年春正月壬辰山荏縣言黄龍見於是有司奏以為魏得地統宜以建丑之月為正三月定厯改年為孟夏四月初文皇帝即位以受禪於漢因循漢正朔弗改帝在東宮著論以為五帝三王禮不相襲正朔自宜改變以明受命之運及即位優游者乆之史官復著言宜改乃詔三公特進九卿中郎將大夫博士議郎千䂖六百䂖博議議者或不同帝據古典甲子詔曰夫太極運三辰五星於上元氣轉三統五行於下登䧏周旋終則又始故仲尼作春秋三微之月每月稱王以明三正迭相為首今推三統之次魏得地統當以建丑之月為正月考之羣議厥義章矣其改青龍五年三月為景初元年四月服色尚黄犧牲用白戎事乘黑首白馬建太赤之旂朝㑹建大白之旂改太和厯曰景初厯其春夏秋冬孟仲季月雖與正嵗不同至於郊祀迎氣礿祠烝嘗廵狩蒐田分至啓閉班宣時令中氣早晩敬授民事皆以正嵗斗建為歴數之序初髙堂隆以為改正朔易服色殊徽號異噐械自古帝王所以神明其政變民耳目故三春稱王明三統也於是敷演舊章奏而改焉帝從其議改青龍五年春三月為景初元年孟夏四月服色尚黄犧牲用白從地正也齊王芳以景初三年即位十二月詔曰烈祖皇帝以正月棄背天下臣子永惟忌日之哀其復用夏正雖違先帝通三統之義斯亦禮制所繇變改也又夏正於數為得天正其以建寅之月為正始元年正月以建丑月為後十二月晉武帝以太始元年即位二年九月羣公奏唐堯舜禹不以易祚改制至於湯武各推行數宣尼答為邦之問則曰行夏之時輅冕之制通為百代之言蓋期於從政濟治不繋於行運也今大晉繼三皇之蹤踵舜禹之迹應天從民受禪有魏宐一用前代正朔服色皆如有虞遵唐故事於義為𢎞奏可史臣曰晉為金行服色尚赤考之天道其違甚矣元帝以丁丑嵗稱晉王置宗廟使郭璞筮之云享二百年自丁丑至禪代之嵗年在庚申為一百四嵗然丁丑始係西晉庚申終入宋年所餘惟一百有二嵗耳璞蓋以百二之期促故婉而倒之為二百也習鑿齒臨終上疏曰臣每謂皇晉宜越魏繼漢不應以魏後為三恪而身微官卑無繇上達懐抱愚情三十餘年今沉淪重疾性命難保遂長懐此當與之朽爛區區之情切所悼惜謹力疾著論一篇寫上如左願陛下考尋古義求經常之表超然逺覽不以臣微賤廢言其所論曰或問魏武帝功蓋中夏文帝受禪於漢而吾子謂漢終有晉豈實理乎且魏之見廢晉道亦病晉之臣子寜可以同此言哉答曰此乃所以尊晉也但絶節赴曲非嘗所悲見殊心異雖竒莫察請為子言焉昔漢氏失御九州殘隔三國乘間鼎峙數世干戈日尋流血百載雖各有偏平而其實亂也宣皇帝勢逼當年力制魏氏蠖屈從時遂覊戎役晦明掩耀龍潛下位俛首重足鞠躬屛息道有不容之難躬蹈履霜之險可謂危矣魏武既亡大難獲免始南擒孟逹東蕩海隅西抑勁蜀旋撫諸夏摧呉人入侵之鋒掃曹爽見忌之黨植靈根以跨中嶽樹羣才以翼子弟命世之志既恢非常之業亦固景文繼之靈武冠世剋伐貳違以定厥庸席卷梁益奄征西極功格皇天勲侔古烈豊規顯祚故以灼如也至於武皇遂并彊吴混一宇宙乂清四海同軌二漢除三國之大害静漢末之交争開九域之䝉晦定千載之盛功者皆司馬氏也而推魏繼漢以晉承魏比義唐虞自託純臣豈不惜哉今若以魏有代王之徳則其道不足有静亂之功則孫劉鼎立道不足則不可謂制當年當年不制於魏則魏未曾為天下之主王道不足於曹則曹未始為一日之王矣昔共工霸九州秦政奄平區夏鞭撻華戎專總六合猶不見序於帝王淪沒於戰國何况暫制數州之人威行境内而已便可推為一代者乎苟以晉嘗事魏懼傷皇徳拘惜禪名謂不可割則惑之甚者也何者隗囂據隴公孫帝蜀蜀隴之人雖服其役取之大義於彼何有且呉楚爭號周室未亡子文延陵不見貶絶宣皇帝官魏逼於性命舉非擇木何􅉻徳羙禪代之義不同堯舜較實定名必彰於後人各有心事胡可掩定空虗之魏以屈於己孰若仗義而以貶魏哉夫命世之人正情遇物假之際會必兼義勇宣皇祖考立功于漢世篤爾勞思報亦深魏武超越志在傾主徳不素積義險冰薄宣帝與之情將何重雖形屈當年意申百世降心全已憤慨於下非道服北面有純臣之節畢命曹氏忘濟世之功者也夫成業者係於所為不係所藉立功者言其所濟不言所起是故漢髙禀命於懐王劉氏乘斃於亡秦超二偽以逺嗣不論近而計功考五徳於帝典不疑道於力政季無承楚之號漢有繼周之業取之既羙而已徳亦重故也凡天下事有可借喻於古以曉於今定之往昔而足為來證者當陽秋之時呉楚二國皆僭號之王也若使楚莊推鄢郢以尊有徳闔閭舉三江以奉命世命世之君有徳之主或藉之以應天或撫之而光宅彼必自係於周室不推呉楚以為代明矣况積勲累功静亂寜衆數之所錄衆之所與不資於燕噲之授不頼於因藉之力長轡廟堂吳蜀兩斃運竒二紀而平定天下服魏武之所不能臣蕩累葉之所不能除者哉自漢末鼎沸五六十年吳魏犯順而强蜀人仗正而弱三家不能相一萬姓曠而無主夫有定天下之大功為天下之所推孰如見推於闇人受尊於微弱配天而為帝方駕於三代豈比俛首於曹氏側足於不正即情而論實取之而無慙何與詭事而託偽開亂於將來者乎是故故舊之恩可封魏後三恪之數不宐見列以晉承漢功實顯然正名當事情體亦厭又何為虗尊不正之魏而􅉻我道于大通哉昔周人詠祖宗之徳追述剪商之功仲尼明大孝之道髙稱配天之義然后稷勤於所職聿來未以翦商異於司馬氏仕乎曹族三宗之寓於魏世矣且夫魏自君之道不正則三祖臣魏之義未盡義未盡故假塗以運髙略道不正故君臣之節有殊然則𢎞道不以輔魏而無逆取之嫌髙拱不勞汗馬而有静亂之功者蓋勲足以王四海義可以登天位雖我徳慙於有周而彼道異於殷商故也今子不疑共工之不得列於帝王不嫌漢之係周而不係秦何至於一魏猶疑滯而不化哉夫欲尊其君而不知推之於堯舜之道欲重其國而反厝之於不勝之地豈君子之髙義若猶未悟請於是止矣後魏天興元年十二月詔百司議定行次尚書崔𤣥伯等奏從土徳服色尚黄數用五未祖辰臘犧牲用白五郊立氣宣賛時令敬授民時行夏之正時有司奏國家繼黄帝之後宜為土徳故神獸如牛牛上畜又黄色顯曜其符也於是始從土徳天興中李先之子密問於先曰子今為魏臣將復事他主也先告曰未也國家政化長逺不可卒窮自皇始至齊受禪實五百餘載矣孝文太和十四年八月詔曰丘澤初制配尚宐定五徳相襲分叙有常然異同之論著於往漢未詳之說疑在今史羣官百辟可議其所應必令合衷以成萬代之式中書監髙閭議以為帝王之祚百代可知運代相承書傳可稽雖祚命有長短徳政有優劣至於受終嚴祖殷薦上帝其致一也故敢述其前載舉其大略臣聞居尊據極允應明命者莫不以中原為正統神州為帝宅苟位當名全化迹流洽則不専以世數為予奪善惡為是非故堯舜禪揖一身異尚魏晉相代紀運少殊桀紂至虐不廢承厯之叙厲恵至昏不闕周晉之禄計五徳之論始自劉向一時之議三家致别故張蒼以漢為水徳賈誼公孫臣以為土徳劉向以為火徳以為水徳者正以當有水溢之應則不推運代相承之數也以為土徳者則以亡秦繼厯相即為次不推逆順之異也以為火徳者懸證赤帝斬蛇之符弃秦之暴越惡承善不以世次為正也故以周為火徳自兹厥後乃以為常魏承漢火生土故魏為土徳晉承魏土生金故晉為金徳趙承晉金生水故趙為水徳燕承趙水生木故燕為木徳秦承燕木生火故秦為火徳秦之未滅皇魏未尅神州秦氏既亡大魏稱制𤣥朔故平文之廟始稱太祖以明受命之證如周在岐之陽若繼晉則晉亡已乆若弃秦則中原有寄推此而言承秦之理事為明騐故以魏承秦魏為土徳又五緯表騐黄星曜彩考氏定實合徳軒轅承土祖未事為著矣又秦趙及燕雖非明聖各正號赤縣統有中土郊天祀地肆類咸秩明刑制禮不失舊章奄岱踰河境被淮漢非若齷齪邊方僭擬之屬逺如孫權劉備近若劉裕道成事繋蠻夷非關中夏伏惟聖朝徳配天地道被四海承乾統厯功侔百王光格同於唐虞享祚流於周漢正位中境奄有萬方今若并棄三家逺承晉氏則蔑中原正次之實存之無損於此而有成於彼廢之無益於今而有傷於事臣愚以為宜色尚黄定為土徳又前代之君明賢之史皆因其可褒褒之可貶貶之今議者偏據可絶之義而不錄可全之理所論事大垂之萬葉宜并集中袐羣儒人人别議擇其所長於理為悉袐書丞臣李彪著作郎崔光等議以為尚書閭議繼近秦氏臣職掌國籍頗覽前書惜此正次慨彼非緒輙仰推帝始逺尋百王魏雖建國君民兆朕振古祖黄制朔綿迹有因成此帝業神元為首案神元晉武往来和好至於桓穆雒京破亡二帝志摧聰勒思存晉氏每助劉琨申威并冀是以晉室啣扶救之仁越石深代王之請平文太祖抗衡苻石終平燕氏大造中區是則司馬祚終於郟鄏而元氏受命于雲代蓋自周之滅及漢正號幾六十年著符尚赤後雖張賈殊議暫疑而卒從火徳以繼周氏排虐嬴以比共工蔑暴項而同呉廣近蠲謬偽逺即神正若此之明也寜使白蛇徒斬雕雲空結哉自有晉傾淪暨登國肇號亦幾六十餘載物色旗幟率多取黑是又自然合應𤣥同漢始且秦并天下革剏法度漢仍其制少所變易猶仰推五運竟踵隆姬而况劉䂖苻燕世業促褊綱紀弗立魏接其弊自有彝典豈可易漢之承木捨晉而為土耶夫皇統崇極承運至重必當推協天緒考審正次不雜以僭竊參之强狡神元既晉武同世桓穆與懐愍接時晉室之淪平文治太廟號太祖抑亦有繇紹晋金徳孰曰不可而欲次兹偽僭豈非惑乎臣所以慺慺惜之惟􅂷察納詔令羣官議之十五年正月侍中司空長樂王穆亮侍中尚書左僕射平原王陸叡侍中吏部尚書中山王王元孫侍中尚書駙馬都尉南平王馮誕散騎常侍都曹尚書新秦侯游明根散騎常侍南部令鄧侍祖祕書中散李愷尚書左丞郭祚右丞霸城子衞慶中書侍郎封琳中書郎泰昌子崔挺中書侍郎賈元壽等言臣等受勑共議中書監髙閭祕書丞李彪等二人所議皇魏行次尚書髙閭以䂖承晋為水徳燕承䂖為木徳以秦承燕為火徳大魏次秦為土徳皆以地據中夏以為得統之徵皇魏建號事接秦末晋既滅亡天命在我故因中原有寄即而承之彪等據神元皇帝與晋武竝時桓穆二帝仍修舊好始自平文逮于太祖抗衡秦趙終平慕容晋祚終於秦方大魏興于雲朔據漢并秦承周之義以皇魏承晋為水徳二家之論大畧如此臣等謹共參論伏惟皇魏世王𤣥朔下迄魏晋趙秦二燕雖地據中華徳祚微淺竝獲推敘于理未愜又國家積徳修長道光萬載彪等職主東觀詳究圖史所據之理其志難奪今欲從彪等所議宜承晋為水徳詔曰越近承逺情所未安然考次推時頗亦難繼朝賢所議豈朕能有違奪便可依為水徳祖申辰臘後周閔帝元年春正月辛丑即天王位是日魏槐里獻赤雀百官奏議云帝王之興必更正朔明受之於天革民視聽也逮乎尼父稽諸隂陽云行夏之時後王所不易今魏歴告終周室受命以木乘水實當行録正用夏時式遵聖道惟文王誕𤣥氣之祥有黒水之䜟服色烏制曰可隋髙祖受禪召崔仲方與髙熲議正朔服色事仲方曰晋為金行後魏為水周為木皇家以火承木得天之統又聖躬載誕之初有赤光之瑞車服旗牲竝宜用赤又勸帝除六官請依漢魏之舊帝皆從之開府盧賁奏改周代旗幟更為嘉名其青龍騶虞朱雀𤣥武千秋萬歳之旗皆賁所創也開皇元年六月癸未詔以初受天命赤雀降祥五徳相生赤為火色其郊及社廟依服色之議而朝㑹之服旗幟犧牲各令尚赤戎服以黄七月乙卯帝始服黄百僚畢賀唐𤣥宗開元中有上書請以皇家為金徳者中書令蕭嵩奏請集百僚詳議侍中裴光庭以國家符命乆著史䇿若有改易恐貽後學之誚宻奏請依舊為定乃下詔停百僚集議之事臣欽若等言唐初事闕天寳九載七月詔曰三王繼統質文既不相襲五徳承時服色遵於所尚至於旗常改制騂翰異宜所以表軍國之容合聲名之度事之大者安可因循而已焉國家膺推紐之期纂黄中之厯憲章􅂷範運既屬於維新旗幟同色義必在於革故頃者俯納羣議式明統緒故得天人致和風雨時若豈朕躬菲徳克廣睿圖實累聖鴻休允膺景運稽古之大既有昭明文物所資理宜詳正其諸衞應隊仗所用緋色幡等竝改為赤黄色庶克遵於通變諒有叶於從宜其諸節度使并管内軍使等亦宜准此九月處士崔昌上封事以國家合承周漢其周隋不合為二王後請廢詔下尚書省集公卿議昌負獨見之明羣議不屈㑹集賢院學士衞包抗表陳論上心遂定乃求殷周漢後為三恪廢韓介酅等公以昌為左贊善大夫包為虞部員外十載五月諸衞幡旗色始改為赤黄十二載五月己酉復以魏周隋依舊為恪及二王後其本封韓介酅等公如故初崔昌上封事推五行之運以皇家土徳合承漢行自魏晋至隋皆非正統是閏位書奏詔公卿議是非相半時上方希古慕道得昌疏甚與意愜宰相林甫亦以昌言為是㑹集賢院學士衞包抗疏奏曰昨夜雲開四星聚於尾宿又都堂㑹議之際隂霧四塞集議之後晴空萬里此盖天意明國家承漢之象也上以為然遂行之及是楊國忠根本林甫之短乃奏云周漢逺不當為二王後衞包助邪獨與林甫計議大紊彜倫上疑之下包獄案鞠遂貶為夜郎郡尉崔昌為玉山郡烏雷尉竝員外置代宗永泰中歸崇敬為膳部郎中時有術士巨彭祖上疏云大唐土徳千年合符請每四季郊祀天地詔禮官儒者議之崇敬議曰案舊禮立春之日迎春於東郊祭青帝立夏之日迎夏於南郊祭赤帝先立秋十八日迎黄靈於中地祀黄帝秋冬各如其方黄帝於五行為土王在四季生於火故火用事之末而祭之三季則否漢魏周隋共行此禮國家土徳乘時亦以每嵗六月土王之日祀黄帝於南郊以后土配合於典禮今彭祖請用四季祠祀多憑緯候之文且據隂陽之説事渉不經恐難行用周太祖廣順元年司天上言歴代帝王以五運相承前朝紹承水徳今國家建號周朝合以木徳代水准經法國以嵗暮為臘今厯日所行合以今年十二月二十二日丁未為臘從之臣欽若等曰晋承後唐漢承晋本文不載承土之徳據周稱木徳即是漢為水晋為金以繼唐土徳也册府元龜卷四
