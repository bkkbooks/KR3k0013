body:
  text: 册府元龜卷三百八十五宋王欽若等撰將帥部褒異第十一唐李嗣業為中郎將𤣥宗天寶七載安西都知兵馬使高仙芝奉詔總軍專征勃律選嗣業與郎將田􅈿為左右陌刀將遂長驅至勃律城擒勃律王吐蕃公主斬藤橋以兵三千人戍於是拂林大食諸胡七十二國皆歸國家欵塞朝獻嗣業之功也繇此拜右威衛將軍十載又從平石國及破九國胡并背叛突騎施以跳盪加特進肅宗在鳳翔至德二年九月嗣業從廣平王收復京城賊衆大敗走河北郭子儀遂收東都嗣業以功加開府儀同三司衛尉卿封虢國公食實封二百户乾元二年正月與諸將同圍相州為流矢所中瘡欲愈臥於帳中忽聞金鼓之聲因大呌瘡中血出數升注地而卒帝聞之震悼嗟惜乆之詔贈武威郡王其賻贈及緣𦵏事所司倍於常式仍令官給靈轝逓還所在王思禮為雲麾將軍金城太守祿山反哥舒翰為元帥奏思禮加開府儀同三司兼太常卿充元帥府馬軍都將肅宗至德二年九月思禮從元帥廣平王收西京既破賊思禮領兵先入宫又從郭子儀戰陜城曲沃新店賊軍既敗遷户部尚書封霍國公食實封三百户乾元初與李光弼來朝勑朝官四品已上出郊迎上元初加司空自武德以來三公不居宰輔唯思禮而已二年四月薨贈太尉官給靈轝差鴻臚卿一人充使監䕶䘮事衛伯玉為神策軍兵馬使出鎭安西肅宗乾元二年十月擊逆賊史思明偽將李歸仁破走之以功遷右羽林軍大將軍知軍事轉四鎭北庭行營節度使獻俘百餘人至闕下遷神䇿軍節度上元二年二月史思明領衆西下圖長安史朝義率其黨夜襲陜州伯玉以兵逆擊大破賊於永寧賊退進位特進封河東郡公郭子儀為朔方節度使時安祿山反𤣥宗天寶十四載十一月詔子儀東討祿山遣大同軍使高秀嵓冦河曲子儀擊敗之進收雲中馬邑開東陘以功加御史大夫及肅宗即位祿山死詔子儀還鳳翔進位司空充關内河東副元帥既平河東河西河南賊以功加司徒封代國公食邑千户尋入朝肅宗遣兵仗戎容迎于㶚上肅宗勞之曰雖吾之家國實繇卿再造及還東都命子儀經營北討乾元元年七月破賊河上擒偽將安守忠以獻遂朝京師勑百僚班迎於長樂驛進位中書令上元三年二月用子儀為朔方河中北庭潞儀澤沁等州節度行營兼興平定國副元帥充本管觀察處置等使進封汾陽郡王出鎭絳州三月子儀辭赴鎭賜御馬銀器雜綵别賜絹四萬疋布五萬端以賞軍代宗即位以子儀守太尉充北道汾寧涇原河西已東通和蕃及朔方招撫觀察使後自涇陽入朝帝御安福門待之命子儀樓上行朝見禮宴賜隆厚僕固懷恩世襲都督𤣥宗時為左領軍大將軍天寶十五載與李光弼合勢及史思明戰于常山趙郡沙河嘉山皆大破之功居多肅宗即位於靈武懐思累從郭子儀及廣平王破賊皆立殊功以前後功加開府儀同三司鴻臚卿同正員同節度副使封豐國公食實封二百户乾元元年九月遣九節度擊安慶緒於相州從郭子儀領朔方行營又副李光弼二年進封大寧郡王遷御史大夫朔方行營節度使上元二年冬加工部尚書勑李輔國及常叅官等送上太官造食代宗即位以懐恩副天下兵馬元帥雍王領河東節度行營及鎭西迴紇兵馬赴陜州仍許懐恩母及妻隨懐恩之陜州行營迴紇可敦即懐恩之女也時迴紇通㑹于陜州帝特崇姻好以寵之李光弼為河北節度使時𤣥宗幸蜀肅宗理兵於靈武追光弼及郭子儀赴行在授光弼戸部尚書兼太原尹北京留守同中書門下平章事及賊將史思明蔡希德高秀嵓牛廷玠等四偽帥率衆十餘萬來攻太原光弼率敢死之士出擊大破之收清夷横野等軍擒賊將李宏義以歸詔守司空兼兵部尚書中書門下平章事進封魏國公食實封八百户乾元元年與關内節度使王思禮入朝勑朝官四品已上出城迎謁遷侍中改封鄭國公二年七月為天下兵馬元帥趙王係之副知節度行營事八月兼幽州大都督府長史出統河南諸軍於河内及收復懐州以功進爵臨淮郡王累加實封一千五百戸俄拜太尉内殿宴送御製詩以寵之朝臣畢和寶應元年五月光弼進封臨淮王賜鐵券以代宗廣德二年薨及𦵏詔宰臣已下祖送於延平門李抱玉為鄭陳潁亳四州節度肅宗乾元中史思明陷雒陽抱玉守河陽南城擊退賊帥周摯固河陽復懐州皆功居第一遷澤州刺史代宗即位為澤潞節度使加領陳鄭二州遷兵部尚書廣德元年吐蕃冦京師羣盜充斥詔抱玉兼鳳翔節度使討之以功遷司空辛雲京為太原節度虜畏雲京不敢愓息太原大理無烽火之虞累加檢校左僕射同中書門下平章事以代宗大歴三年八月薨代宗追悼發哀册贈太尉輟朝三日十一月𦵏遣中使弔祭時宰相及諸道節度使祭者凡七十餘幄饌葉彫餙器溉豐盈窮極奢靡士庶觀者如堵嚴武為劒南節度使成都尹代宗廣德二年破吐蕃七萬餘衆抜當胊城十月取鹽川城改檢校吏部尚書封鄭國公田神功為平盧軍節度都知兵馬使擒逆賊劉展以功遷檢校工部尚書汴宋等八州節度使代宗大歴三年入覲尋加檢校右僕射赴尚書省視事特詔宰臣百官送上仍加知省事以寵之入覲闕廷遘疾信宿而終代宗悼惜為之撤樂廢朝三日贈司徒賜絹一千疋布五百端特許百官弔䘮賜屛風茵褥於靈座並賜千僧齋以追福至德已來將帥無兼三事者惟神功恩禮最篤李納為平盧軍節度使時李希烈圍陳州納遣兵與諸軍奮擊大破之因解圍加檢校司空封五百户李忠臣代宗時為淮西節度觀察使同華節度周智光舉兵反詔忠臣與神䇿將李太清等討平之大歴二年加檢校工部尚書實封通前三百户五年加蔡州刺史檢校右僕射知省事李靈曜之叛田承嗣使姪悦援之忠臣與諸軍大破之汴州平十一年十二月加檢校司空平章事伊愼為果毅代宗大歴八年江西節度使路嗣恭討領南哥舒晃之亂以愼為先鋒直逼賊壘疾戰破之斬晃於泔溪函首獻于闕下嗣恭表愼功授連州長史知當州團練使德宗時為蘄州刺史充節度都知兵馬使建中未車駕在梁洋愼進兵迎擊李希烈之甥劉戒虚擒之以功拜安州刺史兼御史大夫仍賜實封一百户馬璘為太常卿時蕃戎冦邊詔璘赴援河西廣德初僕固懐恩不順誘吐蕃入冦代宗避狄陜州璘即日自河右轉鬭戎虜追擊俘斬數千繇是䧺名益振代宗還宫召見慰勞之授兼御史大夫永泰中為涇原節度城堡獲全虜不敢犯加檢校左僕射帝甚重之遷檢校左僕射知省事詔宰臣百僚於尚書省送上進封扶風郡王大歴十一年卒徳宗悼惜之廢朝贈司徒郝廷玉初為李光弼帳中愛將肅宗乾元中史思明再陷雒陽廷玉擒賊將徐璜玉解中潬之圍前後以戰功累授開府儀同三司試太常卿封安邊郡王累遷秦州刺史代宗大歴八年廷玉卒追錄舊勲贈工部尚書王栖曜肅宗時為浙東節度王璵馬軍兵焉使代宗廣德中草賊袁晁起亂台州御史中丞袁傪東討奏栖曜為偏將生擒袁晁收復郡邑十六授常州别駕浙西都知兵馬使時江左兵荒栖曜擊賊大潰遷試金吾大將軍李靈曜反于汴州浙西觀察使李涵俾栖曜將兵為河南掎角以功加銀青光祿大夫累加至御史中丞張萬福代宗時為和州刺史行營防禦使時賊將康自觀擁兵掠循淮而東萬福追而殺之代宗發詔以勞之賜衣一襲宫錦十雙後自泗州刺史徵拜右金吾將軍詔圖形凌煙閣數賜酒饌衣服並勑度支籍口畜給其費薛嵩為相衛節度使卒代宗命工部尚書李冕使于相州弔祭曲環自𤣥宗天寶中為果毅别將安祿山反守鄧州拒賊功居多超授左清道率又從李抱玉守河陽南城尋别將兵守澤州破賊驍將安曉勑特拜羽林將軍又將别部兵合諸軍同討史朝義平河北累轉金吾大將軍因隨李抱玉移軍京西代宗大歴中領兵隴州頻破吐蕃加特進太常卿又詔以邠隴兵五千大破戎虜於劒南加太子賓客賜以名馬與諸將討涇州叛將劉文喜平之加開府儀同三司兼御史中丞充邠隴兩軍都知兵馬使累破李納逆黨以功最加御史大夫德宗建中三年十月加檢校左常侍充邠隴行營節度使又大破李希烈逆黨於陳州城下加檢校工部尚書兼陳州刺史希烈平加環兼許州刺史加實封三百戸後加檢校左僕射卒廢朝一日贈司空賻布帛米粟有差楊朝晟德宗建中初為甘泉府果毅從李懐光討劉文喜於涇州斬獲生擒居多授驃騎大將軍稍為右先鋒兵馬使後李納冦徐州從唐朝臣征討常冠軍鋒以功授開府儀同三司檢校太子賓客德宗在奉天以朝晟為左廂兵馬使下咸陽以挫朱泚加御史中丞實封一百五十户李抱眞為昭義軍節度使德宗建中三年田悦以魏博反抱眞與馬燧敗悦兵遂解臨洺及邢州之圍以功加檢校兵部尚書復與燧圍魏州又敗悦於城下以功加檢校右僕射興元初遷檢校左僕射平章事破朱滔於經城以功加檢校司空食實封五百户李芃為河陽三城懐州節度觀察使與河東節度馬燧等諸軍破田悦於洹水以功授檢校兵部尚書累封開封郡王食實封一百户馬燧代宗時為河東節度使前政軍敗之後兵甲寡弱燧乃塞險以遏奔衝及朝於京師加檢校兵部尚書令還太原與諸軍擊敗田恱兵加燧同中書門下平章事德宗初詔加燧魏州大都督府長史兼魏博貝等州節度觀察招討等使及帝幸奉天引軍還太原及帝還京加燧奉誠軍及晉絳慈隰節度使並管内諸軍行營副元帥與渾瑊同討李懐光赴河中軍帝詔常參官送至通化門懷光平乃下詔褒美遷光祿大夫並令還太原是役也帝賜燧宸扆台衡二銘并序三年二月入朝册拜司徒侍中北平王仍賜妓樂及薨詔贈太傅祔廟宣令所司供少牢仍給鹵簿從宅至廟并量供人夫兼令太常博士檢校渾瑊為折衝果毅節度使安思順遣瑊提偏師大破阿布思部遷中郎將安祿山搆逆瑊從李光弼出師河北定諸郡邑遷右驍衛將軍及肅宗即位於靈武瑊統兵赴行在至天德遇蕃軍入冦瑊擊敗之從郭子儀收兩京討安慶緒破賊於新鄕改檢校太僕卿充武絳衛軍使又從僕固懐恩討史朝義前後數十戰朝義平加開府儀同三司太常卿賜實封二百户又為朔方行營左廂兵馬使從郭子儀討吐蕃於邠州以功加御史中丞㑹吐蕃大入冦至奉天瑊拒戰於莫谷大破蕃軍以功加太子賓客復屯於奉天華州周智光反郭子儀討之令瑊領馬步萬人攻下同州智光平詔以邠寧慶三州𨽻朔方軍郭子儀領之子儀令瑊先率兵至邠州便於宜祿縣防秋嵗餘加兼御史大夫代宗大歴十一年子儀入朝令瑊知邠寧慶三州兵馬留後十三年回紇侵太原以瑊為石嶺關以南諸軍知兵馬使率兵逐之虜騎引退其年八月加檢校工部尚書兼單于副都䕶振武軍使十四年入為左金吾衛大將軍建中四年李希烈遣間諜詐為瑊書與希烈交通瑊奏其狀德宗特保證之仍賜瑊馬一匹並鞍轡錦綵二百疋興元元年正月以瑊為行在都知兵馬使二月賜實封五百户是日徳宗移幸山南瑊分布諸軍擊敗逆賊李懐光追射之三月加檢校左僕射同中書門下平章事兼靈州都督靈鹽豐夏等州定逺西城天德軍節度等使仍充朔方邠寧振武等道兼永平軍奉天行營兵馬副元帥上臨軒授銊用漢拜韓信故事是月瑊將軍赴京畿破賊朱泚六月加瑊侍中論收京城之功加實封八百户七月德宗還營以瑊守本官兼河中尹河中綘慈隰節度使仍充河中同陜虢節度及管内諸軍行營兵馬副元帥改封咸寧王九月賜瑊大寧里第女樂五人入第之日宰臣節將送之又以李懐光未平加朔方行營兵馬副元帥與河東節度使馬燧㑹兵進討貞元元年八月河中平加檢校司空四年七月加邠寧慶副元帥十二年二月加檢校司徒兼中書令諸使副元帥如故十五年二月二日薨于鎭廢朝五日羣臣於延英奉慰詔贈太師賻贈絹布四千疋米粟三千䂖及䘮車將至又為廢朝應緣䘮事所司准式支給命京兆尹監䕶𦵏日賜絹五百疋田緒為魏博節度使時朱滔率兵兼引回紇之衆南侵緒遣兵助王武俊李抱眞大破朱滔于經城以功遷檢校工部尚書李晟為左羽林將軍代宗廣德初鳳翔節度使孫志直署晟總遊兵擊破党項羌高玉等以功授特進試光祿卿大歴初李抱玉鎭鳳翔署為右軍都將四年吐蕃圍靈州抱玉遣晟擊之吐蕃因解靈州之圍而去拜開府儀同三司無㡬兼左金吾衛大將軍涇原四鎭北庭都知兵馬使并總遊兵無何節度使馬璘與吐蕃戰於鹽倉兵敗晟率所部横擊之拔璘出亂兵之中以功封合川郡王德宗即位吐蕃冦劒南乃詔晟將神策兵救之授太子賓客建中二年魏博田悦反將兵圍臨洺邢州詔以晟為神䇿先鋒都知兵馬使救臨洺尋加兼御史中丞三年正月復以諸道軍擊敗悦軍於洹水遂進攻魏州以功加檢校左散騎常侍實封百户無㡬兼魏府左司馬及王武俊攻趙州晟乃獻狀請解趙州之圍欲引兵趨定州與張孝忠合勢欲圖范陽德宗壯之加晟御史大夫德宗在奉天詔晟赴難晟引軍踰飛狐師次代州詔加晟檢校工部尚書神䇿行營節度使實封二百戸及李懐光反車駕幸梁州帝歎曰早從李晟之言三蜀可坐致也詔授尚書左僕射同中書門下平章事以安衆心後拜晟司徒兼中書令實封一千戸德宗至自興元晟戎服謁見于三橋帝駐馬勞之賜永崇里第及涇陽上田延平門之林園女樂八人入第之日京兆府供帳酒饌賜教坊樂具皷吹迎導宰臣節將送之帝思晟勲力製紀功碑俾皇太子書之刋石立於東渭橋又令太子書碑詞以賜晟後為中書令奉朝請貞元四年三月詔為晟立五廟五年九月晟與侍中馬燧見於延英殿上嘉其勲力詔圖其像於舊臣之次仍令皇太子書其文以賜晟晟刻石於門左九年八月薨帝震悼出涕廢朝五日令百官就第臨弔命京兆尹李充監䕶䘮事官給𦵏具􅈖賻加等比大歛帝手書致意送柩前謝元佐為宋州刺史德宗建中二年加兼御史中丞宋亳節度等使李正已死子納匿䘮謀叛而李洧以徐州歸順納遣兵圍之詔元佐與諸軍援洧與賊接戰大破之斬首萬餘級繇是轉輸路通加御史大夫收濮州降將楊令暉分兵挾以徇濮陽遂降其將高彦超以通濮陽津遷尚書累封四千户兼曹濮觀察使李元諒為鎭國軍節度副使德宗居奉天賊朱泚遣偽將何望之襲華州遂據城元諒自潼關將所部遂抜華州軍益振以功加御史中丞是時尚可孤守藍田與元諒為犄角賊東不能逾渭南元諒功居多遷華州刺史兼御史大夫潼關防禦鎭國軍節度使尋加檢校工部尚書興元元年五月詔元諒與副元帥李晟進收京邑帝還宫加檢校尚書左僕射實封七百戸賜甲第女樂貞元三年詔元諒將本軍從渾瑊與吐蕃㑹盟于平凉與瑊俱申號令嚴其部伍而還時謂元諒有將帥之風德宗嘉之賜馬十匹金銀器錦綵等甚厚四年春加隴右節度支度營田觀察臨洮軍使移鎭良原九年十一月卒帝甚悼惜廢朝三日贈司空賻布帛米粟有差杜希全為朔方軍節度使德宗居奉天希全首將所部以赴難加檢校户部尚書行在都知兵馬使邢君牙初為平盧軍兵馬使累從田神功戰伐歴將軍試光祿勲神功既為兖鄆州節度令君牙領防秋兵入鎭好畤屬吐蕃凌犯代宗幸陜君牙𨽻屬禁軍扈從又以戰功加鴻臚卿封河間郡公德宗貞元三年遷右神䇿軍行營節度鳳翔隴州觀察使加檢校工部尚書吐蕃犯邊且耕且戰西戎不能為患尋加檢校右僕射十四年卒廢朝一日贈司空賻布帛米粟有差尚可孤德宗建中四年為兼御史中丞荆襄應援淮西使以所統之衆赴山南累有戰功及涇原兵叛詔徵可孤軍至藍田擊破之興元元年三月遷檢校工部尚書兼御史大夫神䇿京畿渭南商州節度使五月李晟率可孤收京城可孤為先鋒京師平以功陞檢校右僕射封馮翊郡王増邑通前八百戸實封二百戸及李懐光以河中叛詔可孤帥師與諸軍征討次於沙苑遇疾卒于師贈司空賻布帛米粟甚厚䘮𦵏所須並令官給劉澭幽州節度使怦之次子怦卒子濟代任表澭為瀛州刺史無何怒兄濟乃請以所部西捍隴塞拔瀛州兵一千五百及男女萬餘口直趣京師部伍齊整無一人犯令者徳宗召澭賜讌於凌煙閣甚被恩寵拜金紫光祿大夫檢校太子賓客兼秦州刺史御史大夫隴右經畧軍使其麾下兵士賜名隴右軍以普潤縣為理所賜本錢五萬貫以自給程懐直為横海軍節度使徳宗貞元十三年來朝加檢校尚書右僕射仍賜安業坊甲第一區妓一人他賜有差令歸滄州戴休顔為鹽州刺史奉天之難倍道以所部蕃漢三千人號泣赴難德宗嘉之賜實封二百戸及李晟收京師既清宫闕休顔與渾瑊等率兵赴岐陽邀擊朱泚餘衆及䇿勲加檢校右僕射實封至六百戸扈駕至京特賜女樂甲第楊惠元為神䇿京西兵馬使及田悦反叛詔恵元領禁兵三千與諸將討伐戰御河奪三橋皆恵元之功也加檢校工部尚書李臯為江西道節度使洪州刺史李希烈反臯分兵大破蔡山賊抜蘄州降其將李良又取黄州舒王為元帥加臯前軍兵馬使德宗居奉天臯遣伊愼敗杜少誠以功加銀青光祿大夫進封五百户王武俊為成德軍節度使德宗貞元十三年祔祖禰私廟令所司供少牢量借儀衛人夫仍令太常愽士檢校十七年薨廢朝五日羣臣詣延英門奉慰如渾瑊故事詔左庶子李上公持節贈太師絹三千疋布千端粟三千石劉昌德宗時攝濮州刺史李希烈既陷汴州昌以三千人守寧陵躬勵士卒大破希烈擒其將翟曜希烈退保蔡州自此不復侵軼詔加檢校工部尚書增實封通前二百户貞元中為涇原節度等使詔城平凉又於平凉西别築胡谷堡遂以保寧邉鄙加檢校右僕射張建封為徐泗節度使徳宗貞元十三年入覲特以雙日開延英召對又令建封朝參入大夫班皆示寵厚之十四年上已賜中書門下及兩省供奉官宴於曲江特令建封與諸相同榻而食貞元已後元帥節制累有入朝及却還鎭如馬燧渾瑊劉元佐李抱眞曲環之崇秩洪勲未有獲御製詩以送之建封將還鎭特賜詩及出城又令高品中使齎常所執鞭以賜之曰以卿忠貞節義嵗寒不移此鞭以朕乆執用故以賜卿表卿忠節也建封又獻詩一首以自警勵曹華仕宣武軍為牙校吴少誠叛本軍以華驍果有智略用為襄城戍將蔡賊攻襄城華屢敗之德宗特賜旗甲韓全義為蔡州行營招討處置使德宗貞元十七年正月甲寅至京帝命中使就第宣慰焉壬戌宴全義於麟德殿張茂昭為義武軍節度使德宗貞元二十年十月來朝累陳奏河北及西北邉事語甚忠切德宗屢嘆曰恨見卿之晚錫宴于麟德殿賜良馬甲第及器用錦綵極厚憲宗元和五年冬來朝十二月十二日至京師故事雙日不㘴是日特開延英殿對之五刻因請遷祖考之墓來歸京兆在朝兩月未之鎭頭發痬卒廢朝五日册贈太師賻絹三千疋布一千端米粟三千石䘮事並令官給命京兆尹李充監䕶劉濟憲宗元和初為幽州節度使招討王承宗諸軍未進濟獨率先前軍擊破之獻逆將於闕優詔褒之明年春將大軍次瀛州前後大獻俘獲賞功頗厚仍錄功拜兼中書令程執恭為横海軍節度使憲宗元和四年來朝還鎭賜廐馬一匹及槍甲兩河節制乆無脩覲禮者故嘉而寵之田𢎞正為魏博等州節度使憲宗元和十三年王師加兵於鄆詔𢎞正與五鎭之師㑹軍齊進時李師道遣大將劉悟率重兵以抗𢎞正前後合戰魏軍大捷十四年劉悟以河上之衆倒戈入鄆斬師道首詣𢎞正請降淄青十二州平論功加檢校司徒同中書門下平章事是年八月𢎞正入覲憲宗待之隆異對於麟德殿進加檢校司徒兼侍中實封三百户田布𢎞正第三子也𢎞正節制魏博布掌親兵國家討淮蔡布率偏師𨽻嚴綬軍於唐州授檢校袐書監兼殿中侍御史前後十八載破凌雲栅下郾城布皆有功擢授御史中丞及淮西平拜左金吾衛將軍兼御史大夫李愬憲宗時為檢校右散騎常侍兼鄧州刺史充隋唐鄧節度使討蔡賊吴元濟擒之詔以愬檢校尚書左僕射兼襄州刺史山南東道節度襄鄧隋唐復郢均房等州觀察等使上柱國封凉國公食邑三千戸食實封五百戸憲宗有意復隴右故地授愬鳳翔隴州節度使未發屬李師道再叛移愬為徐州刺史武寧軍節度及淄青平將有事燕趙以愬檢校左僕射同中書門下平章事潞州大都督府長史昭義節度使仍賜興寧里第又遷魏州大都督府長史魏博節度使後為太子少保歸東都長慶元年十月卒於雒陽穆宗聞之震悼賵賻加等贈太尉李聽憲宗元和中為楚州刺史統淮南之師討李師道山東平以功授檢校左散騎常侍穆宗長慶四年為義成軍節度使初討李同捷時魏博行營將丌志紹潛結滄鎭擅迴戈攻其帥史憲誠詔聽帥師援之大破其叛卒志紹奔鎮州為王庭凑所殺遂凱旋以功封凉國公王智興憲宗元和中為侍御史徐州都押衙王師誅李師道智興率徐軍八千㑹諸道之師進擊大破賊於金鄉拔魚臺俘斬萬計以功遷御史中丞賊平授沂州刺史長慶初河朔復亂徴兵進討穆宗素知智興善將遷檢校左散騎常侍兼御史大夫充武寧軍節度副使河北行營都知兵馬使李光顔為忠武軍節度使元和十一年連敗蔡賊吴元濟之衆拔賊凌雲栅憲宗大悦賜其告捷者奴婢銀錦進位檢校尚書右僕射十二年賊平加檢校司空十三年春命中官宴光顔於居第賜芻米二十餘車憲宗又御麟德殿召對賜金帶錦綵十四年西蕃入冦授邠寧節度使光顔擊賊退之穆宗即位就加特進尋詔赴闕賜開化里第進加同中書門下平章事穆宗以光顔功冠諸將故召赴闕讌賜優給已而帶平章事復鎭所以報勲臣也長慶初遷鳳翔節度使依前檢校司空同中書門下平章事嵗末復授許州節度使赴鎭日宰相百僚以故事送别於章敬寺穆宗御通化門臨送之賜錦綵銀器良馬玉帶等物烏重𦙍憲宗時為河陽三城節度使㑹討淮蔡與李光顔犄角相應大小百餘戰以至誅吴元濟就加檢校尚書右僕射韓公武為鄜州節度使來朝憲宗元和十三年正月帝御麟徳殿召對賜以銀器繒錦及馬王沛為李光顔行營兵馬使别統勁兵攻討吴元濟蔡賊平隨光顔入朝光顔具陳沛功加御史大夫統兵還鎭光顔受詔討鄆冦及李師道誅詔分許州兵戍于邠以沛為都將救鹽州擊退吐蕃以功加寧州刺史遷陳州又汴州李岕反詔沛兼忠武軍節度副使率師討岕平之加檢校右散騎常侍劉悟為鄆州李師道牙門都將及王師致討師道遣悟將兵援田𢎞正悟因迴軍趨鄆圍其内城兼以火攻其門不數刻梟師道以獻元和末悟自淄青都知兵馬使兼監察御史擢拜檢校工部尚書兼御史大夫義成軍節度使封彭城郡王仍賜實封五百户錢二萬貫莊宅各一區朱克融為盧龍軍節度副大使知節度事兼幽州長史敬宗寶歴二年五月卒詔贈司徒仍令所司擇日備禮册命仍賻布帛三百段米粟二百䂖差光祿大夫崔芸充弔祭使通事舎人韋翹充副使將作監王堪充册贈使金部郎中蕭澣充副使劉沔為振武軍節度使單于大都䕶文宗開成中党項雜虜大擾河西沔率吐渾契苾沙陁三部落諸族討襲大破之告捷而還以功進檢校戸部尚書㑹迴紇部饑烏介可汗奉太和公主至漠南求食移沔河東節度使詔與幽州張仲武恊力招撫迴紇竟破虜冦迎公主還宫以功進位檢校司空李載義為幽州盧龍軍節度副大使文宗太和三年命中使以白玉帶就幽州賜之示殊恩也五年載義入覲帝以載義有平滄景之功册拜太保同中書門下平章事仍詔中使以米麫粟豆油鹽共一千䂖錢二千貫綾絹二千疋柴四十車草一萬束就永寧里第宣賜又令尚食日給十人生料翌日又命以良馬并鞍就第以錫下及賔佐將吏無不廣霑恩錫楊元卿為河陽節度使時魏博軍亂元卿領涇軍赴援詔賜元卿綾絹三萬疋茶五千斤葛五千疋石䧺為河中晉綘節度使俄而昭義劉從諫卒其子禎擅主軍務朝議問罪令徐帥李義佐為招撫使越烏嶺破賊五砦斬獲千計武宗聞捷大悦謂侍臣曰今之義而有勇罕有雄比者及賊平進加檢校司空張仲武武宗㑹昌中為幽州都督府長史兼御史大夫蘭陵郡王俄而回鶻擾邊仲武遣其弟仲至與禆將㳺奉寰王如清等率鋭兵大破之武宗詔加檢校兵部尚書兼東面招撫回鶻使張允伸為幽州節度懿宗咸通十年徐人作亂允伸請以弟允臯領兵伐叛懿宗不允進助軍米五十萬䂖鹽二萬石詔嘉之賜以錦綵玉帶金銀器等王重榮僖宗時為河中節度中和元年重榮傳詔徵兵明年李克用領軍至大敗巢賊收復京城其倡義啓導之功實重榮居首京師平以功進檢校太尉同平章事王處存為義武軍節度使時黄巢犯闕僖宗出幸處存不俟詔命即率本軍入援洎收京師王鐸第其功云勤王舉義處存為之最以功加檢校司空又遣大將張公慶率勁兵三千合諸軍滅巢賊於泰山以功進檢校司空平章事錢鏐以昭宗天祐二年正月十二日丙寅行册命勑定亂安國功臣鎭海鎭東軍節度使浙江東西兩道觀察處置淮南東西行營招討營田安撫兩浙鹽鐵制置發運等使開府儀同三司守侍中兼中書令杭越兩州刺史吴王錢鏐總臨兩鎭早立殊功撫制三吴乆聞異政一榮封爵再換星霜蓋緣道路阻艱遂致册書留滯近者潭洪水陸並已通流元勲舉議請行典禮冀免稽於制命俾速達於册恩須議施行實為允當明甄酬之寵諧僉屬之情其所封吴王䇿禮宜令所司擇日備禮册命册府元龜卷三百八十五
