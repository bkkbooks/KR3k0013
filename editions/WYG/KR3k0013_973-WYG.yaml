body:
  text: 册府元龜卷九百七十三宋王欽若等撰外臣部助國討伐忿鷙㳫貪以攻戰爲業者夷狄之謂也故古先哲王懷之以恩信驚之以威武長轡逺馭羈縻不絶而已至乃皇靈所及惠澤遐暢革心面内嚮風慕義或出師於經綸之始或致騎於討伐之際或隣壤之亂資之驅除狂冦之法亟往戡定或奏牘以明誠欵或應募而效忠順或饟餽之師旅或鄉道乎國邑至有席和親之勢赴中原之難奮發義勇廊廟氛祲者焉詩曰食我桑椹懐我好音茍非愼徳之至敷教之廣亦疇能感動殊類致其死力哉鼂錯有言曰以蠻夷攻蠻夷中國之形也斯王者撫御之畧可不務乎周武王伐商羗髳率師㑹于牧野書所謂微盧彭濮是也漢髙祖初為漢王元年五月發夷還伐三秦秦地既定乃遣還巴中復其渠帥羅朴督鄂度夕龔七姓不輸租賦餘户乃嵗入寶錢口四十世號為版楯蠻夷遂世世服至于中興郡守常率以征伐四年八月漢王擊楚軍廣武北貉莫客切燕人來致梟騎助漢貉在東北方三韓之屬皆貉類也武帝元鼎五年四月南越王相呂嘉反使馳義侯遺遺越人降為馳義侯别將巴蜀罪人發夜郎兵下牂牁江咸㑹畨禺遺兵未及下南越已下帝便令征西南夷平之天漢二年以匈奴降者界和王為開陵侯將樓蘭國兵始擊車師征和四年遣重合侯馬通將四萬騎擊匈奴道過車師北復遣開陵侯將樓蘭尉犁危湏凡六國兵别擊車師勿令得遮重合侯諸國兵共圍車師王降服臣屬昭帝始元五年秋大鴻臚田廣明擊平益州夷帝曰鉤町侯亡波率其邑君長人民擊反者鉤音鉅于切町音大鼎切斬首捕虜有功其立亡波為鉤町王宣帝本始二年六月大發擊匈奴初昭帝末匈奴連發大兵侵擊烏孫取車延惡師帝使使謂烏孫趣持公主來武帝以宗室女妻烏孫也烏孫公主上書下公卿議救未决㑹帝即位烏孫昆彌復上書言連為匈奴所侵削昆彌願發國半精兵人馬五萬匹盡力擊匃奴唯天子出兵哀救公主於是大發關東輕鋭士選郡國吏三百名抗健習騎射者皆從軍遣御史大夫田廣明五將軍出塞及校尉常惠使䕶發兵烏孫西域昆彌自將翕侯以下五萬餘騎從西方入與五將軍兵凡二十餘萬衆匈奴聞漢兵大出老弱犇走敺畜産逺遁逃犇古奔字敺與驅同是以五將軍少所得常惠與烏孫兵至右谷蠡庭獲單于父行行音胡浪切及嫂居次名王犁汗都尉千長將以下三萬九千餘級虜馬牛羊驢驘槖駞七十餘萬漢封惠為長羅侯然匈奴民衆死傷而去者及畜産逺移死亡不可勝數於是匃奴遂衰耗耗减也音呼到切地節二年漢遣侍郎鄭吉校尉司馬憙將免刑罪人田渠犂積榖欲以攻車師至秋収榖吉憙發城郭諸國兵萬餘人自與所將屯田士千五百人共擊車師交河城破之謂西域諸國為城郭者言不隨畜牧遷徙以别於匃奴元康元年衛侯馮奉世使送大宛客即以節諭告諸國王因發其兵南北合萬五千人擊殺莎車王元帝建昭二年西域副校尉陳湯矯制發城郭諸國兵車師戊己校尉屯田吏士漢兵胡兵合四萬餘人擊郅支單于斬之生虜百四十人降虜千餘人賦予城郭諸國所發十五王賦予謂班予之也所發十五王謂所發諸王之兵共圗郅支王也後漢建武初氐人悉附後隗囂族人隗茂反殺武都太守氐人大豪齊鍾留為種類所敬信威服諸豪與郡丞孔奮擊茂破斬之十八年夷渠帥棟蠶與諸種反十九年武威將軍劉尚發廣漢犍為蜀郡人及朱提夷合萬三千擊平之二十五年南匈奴單于遣弟左賢王莫將兵萬餘人擊北單于弟薁鞬左賢王生獲之又破北單于帳下並得其衆合萬餘人馬七千疋牛羊萬頭北單于震怖却地千里初帝造戰車可駕數牛上作樓櫓置于塞上以拒匈奴時人見者或相謂曰䜟言漢九世當却北狄地千里豈謂此耶及是果拓地焉北部薁鞬骨都侯與右骨都侯率衆三萬餘人來歸南單于二十五年鮮卑都䕶偏何等詣遼東太守祭彤求自効功因令擊北匃奴左伊育訾部斬首二千餘級明帝永平元年鮮卑都䕶偏何擊破赤山斬其魁帥持首級詣遼東受賞賜五年北匈奴六七千騎入于五原塞遂冦雲中至原陽南單于擊却之西河長史馬襄赴救虜乃引去十六年大發緣邊兵遣諸將四道出塞征北匃奴南單于遣左賢王信隨大僕祭彤及吳棠出朔方髙闕攻臯林温禺犢王於涿邪山虜聞漢兵來悉渡漠去彤棠坐不至涿邪山免章帝建初元年臯林温禺犢王復將衆還居涿邪山南單于聞知遣輕騎與緣邊郡及烏桓兵出塞擊之斬首數百級降者三四千人是年哀牢王類牢反叛帝募發越嶲益州永昌夷漢九千人討之明年春邪龍縣昆明夷鹵承等應募率種人與諸郡兵擊類牢於博南大破斬之傳首雒陽賜鹵承帛萬匹封為破虜傍邑侯和帝永元元年以征西將軍耿秉與車騎將軍竇憲率騎八千與度遼兵及南單于衆三萬騎出朔方擊北虜大破之北單于奔走首虜二十餘萬人二年南單于復上求㓕北庭遣行中郎將班固報命南單于於是遣左谷蠡王獅子等將左右部八千騎出雞鹿塞中郎將耿譚遣從事將䕶之至涿邪山乃留輜重分為二部各引輕兵兩道襲之左部北過西海至河雲北右部從匈奴河水西繞天山南度甘微河二軍俱㑹夜圍北單于大驚率精兵千餘人合戰單于被創墜馬復上將輕騎數十遁走僅而免脱得其玉璽獲閼氏及男女五人斬首八千級生虜數千口而還鮮卑大都䕶校尉廆帥部衆從烏丸校尉任嘗擊叛者封校尉為率衆王安帝元初元年秋西羗號多與諸種鈔掠武都漢中巴郡板楯蠻將兵救之漢中五官椽程信率壯士與蠻共擊破之號多退走還斷隴道與零昌通謀䕶𦍑校尉侯覇騎都尉馬賢將湟中吏人及降羗胡抱罕擊之三年夏度遼將軍鄧遵率南單于及左鹿蠡王須沈萬騎擊零昌於靈州斬首八百餘級封湏沈為破虜侯六年秋鮮卑入馬城塞殺長吏度遼將軍法積射士三千人及中郎將馬續率南單于與遼西右北平兵馬㑹出塞追擊大破之建元元年十二月高句驪馬韓濊貊圍𤣥菟城扶餘王遣子與州郡并力討之是年鮮卑冦邉度遼將軍耿􅇪與温禺犢王呼尤徴將新降者出塞討擊延光元年二月扶餘王遣子將兵救𤣥菟擊高句驪馬韓濊貊破之遂遣使貢獻順帝永建元年西域長史班勇率車師後王農竒子加特奴及八滑等發精兵擊北虜呼衍王破之勇於是上立加特奴為後王八滑為後部親漢侯是年秋鮮卑其至鞬冦代郡明年春中郎將張國遣從事將南單于兵歩騎萬餘人出塞擊破之時遼東鮮卑六千餘騎亦冦遼東𤣥菟烏桓校尉耿曄發緣邉諸郡兵及烏桓率衆玉出塞擊破之六年烏桓校尉耿曄遣司馬將胡兵數千人出塞擊鮮卑破之冬漁陽太守又遣烏桓兵擊之烏桓豪人扶潄官勇健每與鮮卑戰輙䧟敵詔賜號率衆君陽嘉元年燉煌太守徐繇遣疏勒王臣槃發三萬人擊于闐破之是年冬烏桓校尉耿曄遣烏桓親漢都尉戎末廆率衆王侯咄歸等出塞抄擊鮮卑大斬獲而還賜咄歸等已下爲率衆王侯長賜綵繒各有差鮮卑後㓂遼東屬國於是耿􅁮乃移屯遼東無慮城拒之二年春匈奴中郎將趙稠遣從事將南匈奴骨都侯夫沈等出塞擊鮮卑破之斬獲甚衆詔賜夫沈金印紫綬及縑綵各有差三年夏車師後部司馬率加特奴等千五百人掩擊北匃奴於閶吾陸谷壊其廬落斬數百級獲單于母季母及婦女數百人牛羊十餘萬頭車千餘兩兵器什物甚衆四年春北匈奴呼衍王率兵侵車師後部詔令燉煌太守發諸國兵及玉門關侯伊吾司馬合六千三百騎救之永和三年冬燒當種那離等叛䕶𦍑校尉馬賢將湟中義從兵及𦍑胡萬餘騎掩擊斬之五年夏南單于左部句龍王吾斯車紐等背叛度遼將軍馬續與中郎將梁並烏桓校尉王元發緣邊兵及烏桓鮮卑𦍑胡合二萬餘人掩擊破之桓帝建和二年白馬𦍑冦廣漢屬國益州刺史率板楯蠻討破之斬首招降二十萬人延熹元年鮮卑冦邉冬使匃奴中郎將張奐率南單于出塞擊之靈帝建寜二年凉州刺史孟佗遣從事任渉將燉煌兵五百人與戊己司馬曹寛西域長史張晏將焉耆龜兹車師前後部合三萬餘人討疏勒攻楨中城四十餘日不能下乃引去是年高句麗伯固遣大加優居主簿然人等助𤣥菟太守公孫度擊富山賊討平之熹平五年諸夷反叛以太尉椽巴郡李顒為益州刺史龎芝發板楯蠻擊破平之六年南匈奴與中郎將臧旻出雁門擊鮮卑檀石槐大敗而還獻帝建安十六年七月曹公西征關中田銀反河間鮮卑軻比能將三千餘騎隨烏丸校尉閻柔擊破銀魏明帝景初三年太尉司馬宣王與髙句麗位宫率衆討公孫淵宫遣主簿大加將數千人助軍齊王正始七年幽州刺史毌丘儉討句麗遣𤣥菟太守王頎詣扶餘位居遣大加郊迎供軍糧晉惠帝時鮮卑大人務勿塵遣軍助東海王越征討有功王俊表為親晉王封遼西公嫁女與務勿塵以結隣援懐帝即位以鮮卑大人務勿塵為大單于率衆助國征討宋明帝初即位四方反叛西陽蠻田益之田義之成邪助田光興等起義攻郢州克之以益之為輔國將軍都統四山軍事後魏大武太平眞君九年六月悅般國遣使求與王師俱討蠕蠕帝許之九月遣成周公萬度歸討鄢耆詔伊吾王唐契弟和與伊落率所領起起度歸和奉詔㑹度歸喻下柳驢以東六城因共擊破居羅城㧞之後同征龜兹度歸令和鎮鄢耆時柳驢戍主乙真伽率諸胡將據城而叛和領輕騎一百匹入其城擒乙真伽斬之繇是諸胡欵附西域尅平和有力也隋煬帝即位初鐵勒犯邊將軍馮孝慈戰不利鐵勒遣使謝罪請降帝遣黄門侍郎裴矩慰撫之諷令擊吐谷渾鐵勒許諾即勒兵襲吐谷渾大敗之大業八年征遼誅靺鞨國渠帥突地稽率其徒以從每有戰功賞賜厚唐髙祖初舉義兵遣晉陽令劉文靜使於突厥始畢可汗令率兵相應帝至龍門始畢可汗遣特勒康稍利等率兵五百馬二千匹㑹于麾下又遣二千騎助軍從平凉城武德三年太宗在藩受詔討劉武周次太原突厥可汗處羅遣其弟歩利設率千騎與官軍㑹四年巴東蠻帥冉安昌率兵與大軍平蕭銑安昌者盤瓠之苗裔代為蠻帥太宗貞觀十三年薛延陁遣使上言髙昌雖貌事至尊而翻覆不實擅發兵與欲谷設擊天子所立之國奴受國厚恩嘗思報効乞發所部為官軍前驅以討之帝嘉其誠節遣户部尚書唐儉右領軍大将軍執失思力齎繒帛以賜之二十一年遣左驍衛大將軍阿史那社爾為崑山道行軍大總管與安西都䕶郭孝恪司農卿楊𢎞禮率五将又發鐵勒十三部兵十餘萬騎以伐龜兹二十二年四月西突厥賀魯以王師問罪龜兹固請前驅願為鄉導仍以數十騎馳來謁帝詔授以崑丘道行軍總管宴之于嘉壽殿及文武三品畢景甚歡錫賀魯綾綵仍觧所服之衣以賜之五月右衛率府長史王元策擊帝那伏國大破之初元策使天竺國㑹中天竺國王死國大亂那伏帝王阿羅那順自立發胡兵以拒元䇿元策宵遁扺于吐蕃之西界以書徴鄰國之兵吐蕃發精鋭一千二百人泥婆羅國發七千餘騎與元策擊阿羅那順大破之吐蕃尋遣使來獻捷又王元策往西域為中天竺所刼章求拔國王發兵赴之破賊有功六月薛延陁餘衆二萬人侵瀚海金徽幽陵三郡發燕然副都䕶元禮臣率九姓鐵勒捕之薛延陁西遁之衆共推故真珠毗伽可汗夷男兄子咄摩支為伊特勿失可汗請居鬱督軍山之北鐵勒素服薛延陁之衆及咄摩支之至也九姓渠帥莫不危懼朝議恐為磧北之患令英國公李勣進加討擊率九姓鐵勒二萬騎至天山咄摩支見官軍至惶駭詣詔使蕭嗣業請降七月西突厥國相屈利啜請率所部從討龜兹是年廻紇菩薩遣使入貢以破薛延陁功賜宴内殿先是擒降突厥頡利等可汗之後北虜唯囘紇薛延陁為盛帝册西突厥莫賀咄為可汗遣統囘紇僕骨同羅思結阿跌等部至是廻紇酋帥吐迷度與諸部大破薛延陁多彌可汗髙宗永徽二年瑶池都督阿史那賀魯叛西據咄陸可汗之地進冦庭州廻紇婆閏等諸部屬請討之帝前後遣梁建方契苾何力程知節等率兵進討皆不克而還帝乃擢蘇定方為大總管領廻紇等兵與阿史那彌射歩眞等分出西州金山兩道以經畧之定方至金山之北其俟斤嬾獨祿率萬餘帳來降定方發其千騎進至曵咥河之西賀魯率十姓兵馬且十萬來拒戰定方領廻紇及漢兵萬餘人迎擊賊輕定方兵少四面圍之定方令歩卒據其原攢矟外向自領漢騎陳於北原賊先擊歩軍三衝不動定方乗勝擊之賊遂大潰追奔三十里斬獲數萬人明日總兵復追賀魯之衆五弩矢畢部落相次來降五咄六部落聞賀魯敗各向南道降于歩真所至蕃人皆相率歸降曰我舊主也定方至雙河與彌射歩眞相㑹兩軍合勢去賀魯所居三百里布陣長驅徑至金牙山賀魯牙所時賀魯集諸衆欲獵定方與彌射縱兵擊之盡破其牙帳生擒數萬人并獲其鼔纛器械賀魯遂與咥運及其女夫閻啜等脱走投石國顯慶元年西突厥賀魯犯邉詔程知節蘇定方等領兵并􅂞紇大破賀魯于隂山再破于牙山則天萬歲通天元年契丹首領李盡忠孫萬榮反叛攻䧟榮府突厥黙啜遣使上言請還河西降户即率部落兵馬為國家討賊擊契丹制許之黙啜遂攻討契丹部衆大潰盡獲其家口𤣥宗開元四年七月突厥可汗黙啜背恩為九姓拔曵固所殺斬其首送至京師六年契丹婆固為其臣可突于所攻奔營州都督許欽澹令薛㤗帥驍健五百人徴奚王李大酺及婆固合衆以討可突于官軍不利婆固大酺臨陣被殺八年南天竺國王尸利那羅僧伽請以戰象及兵馬討大食及吐蕃等仍求有以名其軍帝甚嘉之名軍為懐徳軍是年冬朔方大總管王晙奏請西徴㧞悉􅁡東𤼵契丹兩蕃期以明年秋初數道俱入掩突厥牙帳於稽落河上九年秋抜悉密抜果臨突厥牙帳而王晙及兩蕃不至悉密懼而引去二十二年二月新羅王興光從弟左領軍衛員外將軍忠信上表曰臣所奉進止令臣執節本國發兵馬討除靺鞨有事續奏者臣自奉聖㫖誓將致命當此之時為替人金孝方身亡便留臣宿衛臣本國王以臣久待天庭遣從姪至廉代臣今已到訖臣即合還每思前所奉進㫖無忘夙夜陛下先有制加本國王興光寜海軍大使錫之旌節以討凶殘皇威載臨雖逺猶近君則有命臣敢不祗蠢爾夷俘計以悔禍然除惡務本布憲維新故出師義貴乎三申縱敵患貽于數代伏望陛下因臣還國以副使假臣盡將天㫖再宣殊裔豈惟斯怒益振固亦武夫作氣必傾其巢六靜此荒隅遂夷臣之小誠為國家之大利臣等復乗桴滄海獻捷丹圍效毛髪之功答雨露之施臣所望也伏望陛下圖之帝許焉天寳三載抜悉密國伐突厥烏蘇米施可汗斬之傳首闕下十三載閏十一月東曹國王設阿及安國副王野觧及諸胡九國王並遣上表請同心撃黒衣辭甚切至帝方務以懐柔皆勞賜慰喻遣之以安西域肅宗至德元年八月帝在靈武廻紇首領吐蕃酋長相繼而至並請和親兼之討賊時安祿山䧟西京也十一月廻紇自北投朔方節度郭子儀與廻紇破同羅賊三千人於河上盡收其噐械駞馬輜重旗幡等是年于闐國王尉遲勝聞祿山反勝乃令弟攝行國事自率兵五千赴難國人遮留勝以少女為質而後行帝待之甚厚授特進兼殿中監二年二月帝在鳳翔吐蕃遣使來朝請助討賊引見之賜以束帛器物有差九月回紇葉䕶太子領兵四千餘衆助討􅊇賊回紇葉䕶太子入見帝親宴慰賜以金帛器物恣其所欲待之甚厚元帥廣平王領朔安安西囘紇大食之兵十五萬將收西京王既見回紇王子葉䕶約為兄弟接之頗有恩信葉䕶大喜是月戊子回紇大首領逹干等一十三人從葉䕶至扶風見郭子儀留之設宴三日葉䕶太子曰國家有難逺來相助何暇食為子儀因留之宴畢便發庚子蕃漢大軍齊進壬寅元帥廣平王分回紇鋭卒剪其埋軍賊知伏師敗氣索回紇又取大營之背與北庭行營節度李嗣業合勢表裏夾戰自午及酉斬首六萬級填溝澗而死者十二三賊軍大潰餘軍入城中囂聲夜不止癸卯元帥廣平王整軍容入長安中軍兵馬使僕固懐恩領回紇及南蠻大食等軍從城南過滻水東下營十月壬戍遂收復東京十一月回紇葉䕶自東京至勅百官於長樂驛迎之帝御宣政殿宴設葉䕶升殿其餘酋長列於階下賜錦綉繒綵金器銀物甚衆葉䕶辭歸帝謂曰為國家成大事何遽去耶葉䕶奏曰回紇士卒為陛下更收范陽為馬少不足以討除餘孽請歸取馬帝許之乾元元年六月回紇遣宰相帝德領驍將三千人助國討逆賊七月吐火羅葉䕶烏那多并九國首領來朝請助國討賊帝令赴朔方行營二年二月回紇骨啜特勒等率衆從郭子儀與九節度於相州城下戰不利三月壬子回紇王子骨啜特勒及宰相等十五人自相州奔于西京帝宴之于紫宸殿庚寅辭還行營代宗寶應元年九月回紇可汗舉國兵馬至太原遣使奉表請助王師討平殘冦十月壬戍詔元帥雍王為諸軍先鋒㑹諸道節度使于陜州率回紇軍齊進壬申次于雒陽之北郊􅊇賊史朝義潜使反間回紇左殺執其使以獻甲戍雍王整隊伍為先鋒僕固懐恩等率回紇等繼進大敗賊于横水朝義東奔汴州東都平時回紇至東京肆行殘忍傷死者萬計代宗以外蕃功髙特容之以回紇逹啜嬌子骨祿俟斤襲父特進崇義王留宿衛孫闕逹于為員外羽林將軍放還蕃永泰元年九月叛臣僕固懐恩誘吐蕃數十萬入冦大掠京畿而去十月至邠州與回紇相遇復合從入冦河中節度郭子儀因説回紇曰吐蕃夲吾舅甥國無負而至是無親也若倒戈乘之如拾芥耳且其羊馬蔽地數百里是謂天賜不可失也今能逐戎以利舉與我繼好而凱旋不亦善乎㑹懐恩報死于靈州羣虜無所統遂許諾吐蕃知之其夕奔退回紇逐之子儀分衆軍以接其後吐蕃大敗而回紇逐之至靈臺再破之告㨗於子儀使歸諸朝獲牛羊馬數十萬收其所掠士女四千人大歴二年九月吐蕃寇靈州十月党項首領來朝請助國供靈州軍糧十二年吐蕃冦黎雅兩州劔南西川節度使大破之㑹南蠻閤羅鳳來援于望漢城生擒吐蕃大寵宫論器然獻于闕下德宗興元元年二月帝在山南時朱泚盗據宫殿詔以右散騎常侍兼御史大夫于頎往涇州已來宣慰吐蕃仍與州府計㑹頓逓時吐蕃欵塞請以兵助平國難故遣使焉四月渾瑊與吐蕃論莽羅之衆大破朱泚將韓旻張庭芝宋歸朝等於武功之武亭川斬首萬餘級貞元五年十月劍南節度使韋臯遣將王有道等與東蠻兩林苴那時勿鄧夢衝等率兵於故嶲州䑓登北谷大破吐蕃青城臘城二節度八年正月吐蕃與回鶻戰敗徴兵於南詔蠻王異牟尋時牟尋為西川節度使韋臯所招撫已定計歸順欲因徴兵以襲之遣兵五千人往戍又自將數萬踵其後晝夜兼行乘其無備大破吐蕃於神川鐵橋遣使告㨗且使臯使閲其所虜獲及城堡以取信焉臯上言牟尋收鐵橋已來城壘一十六擒其王五人降其衆一萬餘穆宗長慶二年豐州上言前助太原討鎮州回紇李義節等三千人去三月二十三日歸蕃訖先是裴度招討幽鎮之亂回鶻請以兵從度討伐朝議大以為不可遂命中人止回鶻令歸㑹其已至豐州北界發繒帛七萬匹賜之方還懿宗咸通七年十月沙州張義潮奏差迴鶻首領僕固俊與吐蕃大將尚恐熱交戰大敗蕃冦斬尚恐熱傳首京師晉高祖天福二年十一月詔賜北朝曷魯相公聶相公幽州趙思温繒帛器皿以前屯瀛州援王師討魏故也册府元龜卷九百七十三
