body:
  text: 冊府元龜卷七百二十八宋王欽若等撰幕府部辟署第三後魏莫含鴈門繁畤人家世殖貨貲累巨萬劉琨為并州辟含從事含居近塞下嘗往來國中穆帝愛其才器善待之及為代王備置官屬求含於琨琨遣含入國含心不願琨喻之曰當今胡冦滔天泯滅諸夏百姓流離死亡塗地主上幽執沉溺醜虜唯此一州介在羣胡之間以吾薄徳能自存立者頼代王之力是以傾身竭寳長子遠質覬滅殘賊報雪大恥卿為忠節亦是􅁬義之時何得苟惜共事之小誠以忘出身之大益入為代王腹心非但吾願亦一州所頼含乃入代叅國官郎博字㓜和范陽涿鹿人好學有文才尤長吏幹刺史裴延雋用為主簿崔孝暐字敬業博陵安平人少寛雅早著長者之風彭城王勰之臨定州辟為主簿釋褐冀州安東府外兵叅軍崔孝芬字㳟梓博學好文司徒彭城王勰㧞為行叅軍後除著作郎尚書令髙肇親寵權盛子植除青州刺史啓孝芬為司馬後除司徒記室叅軍司空屬崔士和為西道行臺元脩義左丞行涇州事蕭寳寅之在闗中髙選寮佐以為督府長史崔長謙清河人好學脩立少有令名刺史尉景取為開府諮議叅軍事崔勉字宣祖永安初除建節將軍尚書䂖中兵郎中後太尉豫章王蕭賛啓為諮議叅軍辛纂為越騎校尉尚書令李崇北伐蠕蠕引為録事叅軍臨淮王彧北征以纂隨崇有稱啓為長史及廣陽王淵北伐又引為長史李瑾美容貌有才學清河王懌知賞之辟司徒叅軍宋輔字處仁少慷慨有大操博覧羣書州辟别駕李東字休賢郡辟功曹以父憂去職終身不食酒肉孝明初司空任城王澄嘉其操尚以為叅軍事張普惠以學業為任城王澄所重澄為安西將軍雍州刺史啓普惠為府録事叅軍房士逹起家濟州左將軍府倉曹叅軍時京兆王繼為大將軍出鎭聞其名徴補騎兵叅軍領帳内綂軍房景遠事二兄至謹撫養兄孤恩訓甚篤益州刺史傳堅烺慕其名義啓為昭武府功曹叅軍盧道將秘書監淵之子渉獵經史頗有文才諸父竝敬憚之彭城王勰任城王澄皆虗襟相待勰為中軍大將軍辟行叅軍遷司徒東閣祭酒裴仲規少好經史頗有志節咸陽王禧為司州牧辟為主簿裴瑗字珍寳河北郡人少孤貧而清苦自立太守司馬恱召為中正悦為將軍征義陽引為中兵叅軍瑗夙夜恭勤為悦所知郭祚字季祐孫小為并州刺史以祚為主簿重祚文才兼任之以書記時人多之李元忠少勵志操居喪以孝聞清河王懌為司空辟為士曹叅軍崔道固字季堅父輯南徙青州為泰山太守道固賤出適母兄等輕侮之時宋孝武為徐兖二州刺史得辟他州民為從事輯乃資給道固令其南征既至彭城駿以為從事道固美形容善舉止便弓馬好武事駿稍嘉之㑹青州刺史新除過彭城駿謂之曰崔道固人身如此豈可為寒士至老乎而世人以其偏庶便相陵侮可為歎息青州刺史至州辟為主簿轉治中後為義隆諸子叅軍薛謹字法順辯之子也宋武帝擒姚泓辟相府行叅軍隨武帝渡江轉記室叅軍冦讃字奉國少以清素知名苻堅僕射韋華州里髙逹雖年時有異嘗以風味相待華為馮翊太守召為功曹髙允字伯恭渤海人郡召功曹神龜三年太武舅陽平王杜超行征南大將軍鎭鄴以允為從事中郎年四十餘矣髙爕字季和渤海人亦有文才嘗從容於家州辟主簿隂道方性和雅頗渉書傳為李神雋所知賞神雋為前將軍荆州刺史請道方為其府長流叅軍姜儉字文簡起家徐州車騎府田曹叅軍轉太尉外兵叅軍蕭寳寅討關西引為開府屬寳寅為雍州仍請開府從事帶長安令甄楷字徳方粗有文學頗習吏事除祕書郎免官任城王澄為司徒引為法曹叅軍稍遷尚書郎孝明末定州刺史廣陽王淵被徵還朝時楷丁憂在鄉臨發召楷兼長史委以州任楊固字敬安太和中從大將軍劉昶征義陽板府法曹行叅軍還言之髙祖年三十餘始辟大將軍府叅軍事署城局仍從昶鎭彭城神龜末清河王懌領太尉辟固從事中郎懌被害汝南王恱為太尉辟固從事中郎不就正光二年京兆王繼為司徒髙選官寮辟固從事中郎李琰之曾遊河内北山便欲有隱遁意㑹彭城王勰辟為行臺叅軍苦相敦引胡叟少聰慧好屬文孤標坎􅇄未有仕路遂入漢中宋梁秦三州刺史馮翊吉翰以叟才士頗相禮接授叟末佐不稱其懐未幾翰遷益州叟隨入蜀多為豪雋所尚穆子琳出帝時為鎭東將軍以占奪民田免官爵乆之阿至羅國主副越居為蠕蠕所敗其子去賔來奔齊獻武王奏去賔為安北將軍肆州刺史封髙車王招慰夷虜表子琳為去賔長史復其前封羊侃字士業年三十一襲父爵華隂伯釋褐太尉汝南王恱騎兵叅軍楊州刺史長孫稚請為錄事叅軍後奏為統軍又請為其府錄事叅軍帶長安令府州之務多所委決王士良字君明少脩謹不妄交逰孝莊末爾朱仲遠啓為府叅軍事叱羅恊少寒微嘗為小吏以㳟謹見知嘗州刺史楊均擢為從事北齊司馬子如雲中人孝昌中北州淪䧟子如擕家口南奔肆州為爾朱榮所禮遇假以中軍榮之向雒也以子如為司馬龐蒼鷹太原人知髙祖有霸王之量每私加敬割其宅半以奉髙祖繇此遂蒙親識髙祖之牧晉州引為兼治中從事李繪字敬文儀貌端偉神情朗俊齊王蕭寳寅引為主簿記室専管表檄待以賔友之禮王絃字師羅大安人初從葛榮反爾朱榮遣使喻之然後始降以為府從事中郎封子繪字仲藻渤海人爾朱兆之亂與父隆之舉義信都奉使詣髙祖髙祖至信都召署開府主簿仍典書記中興元年轉大丞相主簿張華原字蒲國代郡人少明敏有器度髙祖開驃騎府引為法曹叅軍遷大丞相府屬仍侍左右從於信都深為髙祖所親待崔陵字長儒河東人釋褐太學博士坐事免歸鄉里髙祖於信都起義陵歸焉髙祖見之甚悦以為諮議叅軍崔瞻字彦通陵之子也年十五刺史髙昻召署主簿清河公岳辟為開府西閣祭酒後除御史髙祖入朝還晉陽被勅與北海王晞陪從俱為諸子賔友仍為相府中兵叅軍轉主簿祖鴻勲涿郡人魏永安初元羅為東道大使署封隆之邢邵李渾李象及鴻勲竝為子使髙徳政字士貞北海蓨人父顯魏滄州刺史徳政㓜而敏慧有風神儀表文宣引為開府叅軍知管記事甚相親狎神武入擢為相府掾委以腹心徐逺字彦遐廣寜人少習吏事郡辟功曹髙祖以逺閑習書計命為丞相騎兵恭軍深為髙祖所知崔昂性端直少華沉深志略堅實難傾動少好章句頗綜文詞文襄廣開幕府引為記室叅軍張亮字伯徳西河人初事爾朱兆拜平逺將軍兆敗自縊於樹亮伏屍而哭髙祖嘉歎之授丞相府叅軍事漸見親待委以書記之任元景安魏昭成五世孫也沉敏有幹局少工騎射善於事人釋􅄄爾朱榮大將軍府長流叅軍張纂字徽纂代郡人初為爾朱兆都督長史為兆使於髙祖遂被顧識髙祖起義山東劉誕據相州拒守纂亦在其中髙祖攻而㧞之引叅丞相軍事獨孤永業字世基中山人也有才幹便弓馬被簡擢補定州六州都督宿衛晉陽或稱其有識用文襄與語悅之超授中外府外兵叅軍王峻字巒嵩零丘人明悟有幹略髙祖以為相府墨曹叅軍坐事去官乆之文宣為儀同開府引為城局叅軍崔廓之陳郡陽夏人沉隱有識量以學業見稱自臨水令為瑯邪王儼大司馬西閤祭酒遷領軍功曹叅軍李元忠趙郡人魏清河王懌為司空辟為士曹叅軍遷太尉啓復為長流叅軍懌後為太傅被詔為營搆明堂大都督又引為主簿羊烈字信卿太山人魏孝昌中方弱冠州辟主簿又兼治中從事史以吏事為意幹濟見知擇中太師咸陽王行叅軍盧文偉字休族范陽人北州冠族少為鄉閭所敬州辟主簿年三十八始舉秀才盧㳟道性温良有文學州辟主簿李崇北征以為開府墨曹叅軍李㓜亷趙郡人初為濟州長史文襄嗣事召詣晉陽除覇府掾謂杜弼曰并州王者之基須好長史各舉所知時𤣥有所稱皆不允衆人未荅文襄乃謂陳元康曰我教君好長史處李㓜亷即其人也遂命為并州長史嘗在文襄第内與隴西辛術等六人號為舘客待以上賔之禮平鑒燕郡人鑒歸爾朱榮於晉陽因陳靖亂安民之䇿榮大竒之即署叅軍前鋒從平鞏宻每陳先登除撫軍襄州刺史孫搴字彦舉樂安人髙祖西討令作檄其文甚美髙祖大恱即署相府主簿専典文筆崔伯謙字士遜少孤貧善養母髙祖召赴晉陽補相府功曹稱之曰清直奉公眞良佐也遷􅘵州别駕蘇瓊字珍之㓜時随父在邉嘗謁東荆州刺史曹芝芝戲問之曰卿欲官否對曰設官求人非人求官芝異其對署為府長流叅軍髙隆之字延興身長八尺美鬚髯沉深有志氣魏汝南王悅為司州牧以為戸曹從事遷員外散騎侍郎髙祖與行臺于暉出討羊侃於太山暉引隆之為行臺郎中孫騰少質直明解吏事屬爾朱榮建義騰隨榮入雒髙祖之為晉州引騰為長史加後將軍斛律羡字豐雒少有機警尤善射藝髙祖見而稱之世宗擢為開府叅軍薛元頴太常卿光熾之子亷謹有信義起家永安王叅軍陸卬為吏部郎中上雒王思宗為清郡尹辟為邑中正食具邱縣幹盧潜范陽涿人容貌瓌偉善言談少有成人志上儀同賀㧞勝辟開府行叅軍劉逖字子長彭城人少而聰敏弋獵騎射以行樂為事愛交逰善戲謔郡辟功曹崔暹字季倫世為北州著姓父穆州主簿暹書生避地渤海依髙乾以妹妻乾弟愼後臨光州啓暹為長史宋遊道廣平人魏廣陽王深北伐請為鎧曹及為定州刺史又以為府佐盧斐字子章性殘忍以強斷知名世宗引為刑獄叅軍李愍孝昌之末天下兵起愍潜居林慮山觀候時變賊帥鮮于脩禮毛普賢作亂詔遣大都督長孫稚討之稚素聞愍名召兼帳内統軍裴諏之為沛王大司馬府記室遷鄴後諏之留在河南西魏領軍獨孤信入據金墉以諏之為開府屬號曰雒陽遺彦又周書云柳蚪退耕陽城大統三年馮翊王元季海領軍獨孤信鎮雒陽時舊京荒廢人物罕存唯有蚪在陽城諏在潁川信等乃俱徴之以蚪為行臺郎中諏為督府屬竝掌文翰時人為之語曰北府裴諏南省柳蚪裴藻少機辯有不覊志太𫝊司馬子如以為主簿子如之子消難鎭北豫又以為中兵叅軍後周宇文深初仕後魏祕書郎時群盗􅉕起深屢言時事爾朱榮雅知重之拜厲武將軍尋除車騎府主簿後為子都督太祖以深有謀略欲引致左右圖議政事乃啓為丞相府主簿周惠達字懐文章武人魏齊王蕭寳寅為瀛州刺史召惠達及河間馮景同在閣下甚禮之孝昌初魏臨淮王彧以惠達為府長流叅軍又云寳寅為大督景同為功曹叅軍皇甫璠安定人少忠謹有幹略州辟為掾太祖為牧補主簿以勤事被知每䝉褒賞引為丞相府行叅軍冀雋魏太昌初為賀㧞岳墨曹叅軍及岳被害太祖引為記室薛端字仁直河東人年十七司空髙乾邕辟為叅軍賜平隂男柳帶韋字孝孫深沉有度量少好學身長八尺三寸美風儀善占對韓賢素為雒州刺史召為主簿蘓亮字景順魏齊王蕭寳寅引為叅軍後寳寅開府為其府主簿寳寅西征轉記室叅軍寳寅遷大將軍仍為之掾寳寅雅知重之柳敏河東解縣人為河東郡丞及文帝尅復河東見而器異之乃謂之曰今日甚喜得卿也即拜丞相府叅軍事轉户曹叅軍兼記室盧柔字子剛賀㧞勝出牧荆州以柔為大行臺郎中掌書記及勝為大保以柔為掾趙善字僧慶爾朱天光為肆州刺史辟為主簿深器重之又以為長史軍中謀議每叅預之天光為闗右行臺表善為行臺右丞後賀㧞岳總關中兵復以為長史韓裒為大中大夫魏室亂裒避地於夏州太祖為丞相引裒為録事叅軍尋為丞相府屬趙肅河南人早有操行魏正光中酈元為河南尹辟為主簿薛寘為中書令車騎大將軍儀同蕪公于謹征江陵以寘為司録軍中謀略寘竝叅之李旭頓邱人初謁太祖深竒之綏徳公陸通盛選僚宷請以旭為司馬太祖許之後太祖嘗欲以書記委之於是以旭為丞相府記室叅軍檀翥髙平人司州牧城陽王元徽以翥為從事尋謝病客遊三輔時毛遯為行臺鎭北雍州表翥為行臺郎中元偉河南人為幽州都督府長史尉遲廽伐蜀以偉為司録書檄文記皆偉所為梁昕安定人為關中著姓後居京兆之盩厔魏正光中秦隴亂蕭寳寅為大都督統兵出討以昕為行叅軍以功累進征西將軍爾朱天光入關復引為外兵叅軍太祖迎魏孝武軍次雍州昕以三輔望族上謁太祖見昕容貌瓌偉深賞異之即授右府長流叅軍辛慶之隴西狄道人為祕書郎司空楊津為北道行臺討爾朱氏啓慶之為行臺左丞與叅謀議後賀㧞岳為行臺復啓慶之為行臺吏部郎中開府掾樊深字文深河東猗氏人于謹引為府叅軍事累轉從事中郎謹拜司空以深為諮議杜叔毗字子弼性慷慨有志節晉公䕶辟為中外府樂曹叅軍令狐整字延保燉煌人世為西土冠族魏東陽王元榮辟為主簿顔之儀父協在梁不仕元帝為湘東王引恊為其府記室叅軍恊不得已乃應命隋柳雄亮字信誠㓜有志節好學不倦柱國蔡國公廣欽其名行引為記室叅軍年始弱冠府中文筆頗亦委之趙芬字士茂少有辯智頗渉經史太祖引為相府鎧曹叅軍歴記室辛彦之不交非􅁼博渉經史太祖見而器之引為中外府禮曹賜以衣馬珠玉衛𤣥字文昇少有器識周武帝在藩引為記室柳彧少好學頗渉經史大冡宰宇文䕶引為中外府記室李文博為縣丞數載不調薛道衡為司𨽻大夫遇之於東都尚書省甚嗟愍之遂奏為從事因謂齊王司馬李網曰今日遂遇文博得奏用之以為懽笑其見賞知音如此劉行本自梁歸周以諷讀為事性剛烈大冡宰宇文䕶引為中外府記室元巖少以名節自許與髙頴友善周大冡宰宇文䕶見而器之以為中外府記室郭榮太原人周大冡宰宇文䕶引為親信䕶察榮謹厚擢中外府水曹叅軍李徳林字公輔在齊為殿中將軍天保之季謝病還鄉闔門自守乾明初尚書令楊遵彦奏追徳林入議曹長廣王作相居守在鄴引授丞相府行叅軍趙賢通沉深有器局周太祖引為相府叅軍事王邵字君懋少沉嘿好讀書弱冠齊尚書僕射魏收辟開府軍事庾季才㓜頴悟好占𤣥象梁廬陵王續辟荆州主簿湘東王繹重其術藝引授外兵叅軍蕭寳美風儀善談笑年未弱冠名重一時髙祖輔政引為丞相府典籖深被識遇諸葛頴清辯有俊才晉王廣素聞其名引為叅軍事韋師字公頴京兆人周大冡宰宇文䕶引為中外府記室轉賔曹叅軍齊王憲為雍州牧引為主簿韋世康京兆人㓜而沉敏有器度年十嵗州辟主簿叚文振性剛直明逹時務為後周宇文䕶親信知其有幹用擢授中外府兵曹韋夀字世齡孝寛之子在周以貴公子罕有令譽趙王為雍州牧引為主簿韋肅在周為宣納上士髙祖為相引為賔曹叅軍長孫熾字仲光在州為御正上士髙祖作相擢為丞相府功曹叅軍盧愷字長仁神情爽悟沿渉書記頗解屬文周齊王憲引為記室盧昌衡字子均年十七魏濟隂王元暉召補太尉叅軍事兼外兵叅軍魏澹字彦深世以文學自業齊博陵王濟聞其名引為記室及琅邪王儼為京畿大都督以澹為鎧曹叅軍陸爽字開明少而聰敏年十七齊司州牧清河王岳引為主簿趙綽周初為夏官下士以明幹見知後為掌教中士髙祖為丞相知其清正引為録事叅軍鮑宏字潤身嘗和梁湘東王繹詩嗟賞不已引為中記室裴政字徳表年十五辟梁邵陵王府法曹叅軍事累轉枝江令湘東王之臨荆州召為宣惠府記室柳莊字思敬少有逺量博覧墳籍兼善辭令梁岳陽王蕭詧辟為叅軍轉法曹郎茂字蔚之為陳州戸曹屬髙祖亳州總􅃹見而恱之命掌書記髙搆字孝基北海人好讀書工史事弱冠州補主簿仕齊河南王叅軍事張處威字元敬年十二州補主簿十八為太尉中兵叅軍齊亡仕周為宣納中士髙祖得政引為相府典籖裴矩字𢎞大河東人齊北平王貞為司州牧辟為典曹從事轉髙平王文學及齊王不得調髙祖為定州總􅃹召補記室甚親敬之以毋憂去職髙祖作相遣使者馳召叅相府記室事何稠字桂林仕周御飭下士及髙祖為丞相召補叅軍兼掌細作署皇甫誕字𤣥憲安定人少剛毅有器局周畢王賢通引為倉曹叅軍游元字楚客廣平人少聰敏年十六齊司徒徐顯秀引為叅軍事開皇中為殿内侍御史晉王廣為揚州總管以元為法曹叅軍張祥京兆人少為髙祖所知其後引為丞相叅軍事陸彦師字雲房好學解屬文魏襄城王元旭引為叅軍事齊彭城王浟為司州牧召補主簿後歴中外府東閣祭酒趙軌河南人少有行簡周蔡王引為記室以清苦聞劉綽字士元都昌人以儒學知名為州博士刺史趙賢通引為從事劉炫字光伯河間人周武帝平齊瀛州刺史宇文亢引為戸曹從事後刺史李繪署禮曹從事以吏幹知名劉臻字宣摯沛國人仕梁為召陵王東閣祭酒後仕蕭詧為中書侍郎周冡宰宇文䕶辟中外府記室叅軍事羽檄多成其手孫萬夀字仙期信都人滕穆王引為文學坐衣冠不整配防江南行軍總􅃹宇文述召典軍書唐儉字茂約并州人髙祖在太原留守儉與太宗周宻髙祖開大將軍府授簡記室叅軍劉政㑹滑州人隋大業中為太原鷹揚府司馬髙祖大將軍府建引為戸曹叅軍從平長安除丞相府掾武士彠并州人髙祖初行軍於汾晉休止其家因蒙顧接及為太原留守引為行軍司鎧以士彠為大將軍府鎧曹姜謩秦州人大業末為晉陽長髙祖留守太原見謩深器之大將軍府建引為功曹叅軍平京城除相國賔曹叅軍温大雅字彦𢎞髙祖在太原甚禮之義兵起引為大將軍府記室叅軍専掌文翰竇威字文蔚隋蜀王秀辟為記室以秀行事多不法稱疾還田里累轉考功郎中坐事免髙祖入關召補大丞相府司録叅軍李綱字文紀少慷慨有志節每以忠義自命周齊王憲引為叅軍封倫字徳彛隋開皇末江南作亂内史楊素徃征之署為行軍記室房喬字𤣥齡齊人太宗狥渭北一見便如舊識署為北道行軍記室叅軍杜如晦字克明仕隋補淦陽尉尋棄官而歸太宗平京城引為秦王府兵曹叅軍張公謹字𢎞懐倜儻好竒略檢校郢州别駕初未知名太宗為秦王李勣驟薦之於是引入幕府岑文本字景仁南陽人蕭銑僣號召署中書侍郎及河間王孝恭定荆州署荆州别駕孝㳟進擊輔公祐召典軍書復署行臺考功郎中令狐徳棻宜州人義旗建淮安王神通據太平宫自稱總管以徳棻為記室叅軍髙祖入關引直大丞相府記室于志寜為銀青光祿大夫太宗為秦王天䇿上將志寜累授天䇿府從事郎中李守素有實學髙才為山東名族容儀魁偉性識通辯工談論言詞簡要文洞名理太宗平王世充徴為學士署天䇿府倉曹李桐客仕隋為門下録事從討竇建徳建徳平太宗授秦府法曹叅軍蔡允㳟初仕隋為起居舍人太宗平山東召入幕府署叅軍事補學士蘇味道為咸陽尉吏部侍郎裴行儉甚加禮遇及征突厥阿史那都之引為管記徐堅為太子文學聖歴中車駕在三陽宫御史大夫楊再思太子左庶子王方慶為東都留守引堅為判官牛仙客涇州鶉觚人初為縣吏縣令傅文靜甚重之文靜後為隴右營田使引仙客叅預其事遂以軍功累轉洮州司馬開元初王君􅎢為河西節度使以仙客為判官甚委信之封常清為四鎭都知兵馬使髙仙芝傔人以破逹奚功授疊州戍主便以為判官仙芝代夫蒙靈詧為安西節度使便奏為慶王府録事叅軍充節度判官每出征討常令知留後事崔圓累官司勲員外郎宰臣楊國忠遥制劒南節度使引圓佐理乃奏授尚書郎兼蜀郡大都督府左司馬知節度留後叚秀實隴州人沉厚多斷天寳初安西節度馬靈詧署為别駕奏從討䕶宻有功授安西府别將七載髙仙芝代靈詧舉兵圍怛羅斯黒衣救至靈詧大衂軍士相失夜中聞都將李嗣業之聲因大呼責曰軍大而求免非夫也嗣業甚慙遂與秀實紏合散卒復成其軍師還嗣業請于仙芝以秀實為判官授大侯府果毅後又為節度荔非元禮白孝徳判官孝徳改鎮邠寜奏秀實試大常卿支度營田二副使苗晉卿深沉有精識為中書舍人時宰臣李林甫兼河南節度使以晉卿為判官處事精審林甫重之裴冕為渭南縣尉以吏道聞御史中丞王鉷􅂶京畿採訪使表為判官遷監察御史鉷有罪誅河西節度使哥舒翰表冕為行軍司馬呂諲為寜陵尉本道採訪使韋陟以為支使及哥舒翰為隴右河西節度使奏授左龍武軍倉曹􅂶支度判官厯太子通事舍人性謹宻勤於職務在使幕縱無事塊然獨坐不離案牘翰益親之徐浩字季海累遷右拾遺麗正殿校理幽州節度使張守珪奏在幕府改監察御史令狐濞彰父也天寳中仕鄧州録事叅軍以清白聞本道採訪使宋鼎引為判官髙適好學以詩知名為汴州封邱尉時邊將用事務收俊乂河西節度使哥舒翰表適為左驍衞兵曹充掌書記趙驊為河東縣丞採訪使韋陟以驊履操清直頗推敬之表為賔僚使罷陳留採訪使郭納復奏驊為支使韋倫為藍田尉以吏事勤恪楊國忠署為鑄錢内作使判官馬炫以儒學著名隱蘇門山李光弼鎭太原辟為掌書記累遷侍御史嘗叅軍府謀議光弼益器之韓滉字太冲少貞介好學至徳初青齊節度鄧景山辟為判官授監察御史兼北海郡司馬以道路阻絶不獲赴因辟地山南採訪使李承昭奏充判官授通州長史彭王府諮議叅軍杜亞京兆人善言物理及歴代成敗之事至徳初獻封章授校書郎杜鴻漸為河南節度辟為從事永㤗末劒南叛亂鴻漸以宰相出領山南副元帥以亞及楊炎竝為判官陸長源少渉獵書記乾元中䧟河北諸賊因為昭義軍節度薛嵩從事累授檢校郎中張鎰蘇州人朔方節度齊邱之子以門䕃授左衛兵曹叅軍郭子儀為關内副元帥以嘗伏事齊邱辟鎰為判官後為殿中侍御史坐事貶撫州司戸量移晉陸令未之官洪吉觀察張鎬辟為判官奏授殿中侍御史元載為監察御史韋鎰充使監選黔中引載為判官崔元翰年已五十餘李勉鎭滑臺辟為從事後馬燧在太原聞其名致禮之又為燧府掌書記裴胄為秘書郎陳少遊為陳鄭節度使留後奏授大理司直少遊罷隴右節度李抱玉奏授監察御史不得意歸免陳少遊為宣歙觀察復辟在幕府抱玉發怒奏貶桐盧尉江西觀察使李栖筠有重望虗心下士幕府盛選才彦觀察判官許鳴謙有學識栖筠嘗異席咨事之崔造軰皆所薦引一見胄深重之薦於栖筠奏授大理評事觀察支使馬燧字洵美寳應中澤潞李抱玉署奏趙城尉令説相衛薛嵩拒絶僕固懐恩署奏左武衛兵曹歴太子通事舍人遷著作郎營田判官齊抗少遊㑹稽剡溪中好讀書為文長於牋奏夀州刺史張鎰辟為判官閑史事而敏於機鎰甚重之鎰為江南西道都團練觀察使抗隨在幕府建中三年鎰自中書侍郎平章事出為鳯翔隴西節度使奏抗為監察御史前後籌量幕中事多出抗張建封兖州人大歴初道州刺史裴蚪薦建封於觀察使韋之晉辟為叅謀奏授左清道兵曹不樂吏役而去素與馬燧有故燧為河陽三城鎭過使辟為判官及燧為河東節度復奏建封為判官特拜侍御史裴延齡乾元末為汜水縣尉遇東都陷賊因寓居鄂州後華州刺史董晉辟為防禦判官姚南仲自右補闕貶海鹽令浙江東西觀察使韓滉辟為推官無何表殿中侍御史内供奉充支使齊暎少舉進士以博學宏詞授河南府叅軍滑亳節度令狐彰辟為掌書記及彰卒後兵亂暎脫身歸東都河陽三城使馬燧辟為判官奏殿中侍御史張鎰出為鳯翔節度使署奏為判官杜佑字君卿京兆萬年人父希望西河郡太守佑以䕃入仕補濟南郡叅軍剡縣丞時潤州刺史韋元甫嘗受恩於希望佑謁見元甫元甫未之知以故人子待之他日元甫視事有疑獄不能决佑時在旁元甫試訊於佑佑口對響應皆得其要元甫竒之乃奏為司法叅軍及為浙西觀察淮南節度皆辟為從事深信委之盧羣字載初少好讀書初學於垂山淮南節度陳少遊聞其名辟為從事建中末薦於朝廷㑹李希烈反叛詔諸將討之以群為監察御史江西行營糧料使興元元年江西節度嗣曹王臯奏為判官曹王移鎭江陵襄陽皆佐使幕府中事多以咨委以正直聞嚴礪為梓州𤣥武尉從祖兄震節制南梁委以廪餉之職事甚修辨署為從事加兼監察御史路泌為城門郎從幸梁州以策説渾瑊署為從事瑊討李懐光累奏為副元帥判官李景略幽州人為幽府功曹寓居河中李懐光為朔方節度招在幕府懐光反狀始萌景略退歸私家尋為靈武節度杜希全辟在幕府轉殿中侍御史髙郢字公楚授咸陽尉郭子儀辟為掌書記後忤子儀㫖奏貶猗氏丞李懐光節制邠寜奏為從事轉副元帥判官及懐光叛馬燧平河中又辟郢為掌書記權徳輿字載之韓洄黜陟河南辟為從事試祕書省校書郎貞元初復為江西觀察使李兼判官府罷杜佑裴胄皆奏請表同日至徳宗雅聞其名徴為太常博士李若初為陳州太康令刺史李克厚遇之克遷河陽三城使奏若初為從事軍中事多委之李融少孤自修立性嚴正善吏事累官至美原尉京兆尹賈至舉授長安主簿朔方節度郭子儀署奏監察御史為賔佐居無何子儀聽䜛署奏大理司直兼襄陵令官罷鮑防署奏監察御史福建都團練判官馬彛扶風人嗣曹王臯為襄陽節度善用人彛未知名臯始辟之卒以正直強幹稱册府元龜卷七百二十八
