body:
  text: 册府元龜卷八百四十七宋王欽若等撰總錄部勇夫孔武有力臨難㤀死厲氣决鬪摧堅隕敵桓桓焉﨣﨣焉冠三軍而敵萬夫者可謂勇矣春秋之際以兵戰為務故以強有力聞於時者為多焉漢魏而下壯夫迭作至如英威盖世雄名震俗乘危而靡顧遭患而能奮見義必赴所向無前戮勍冦而致果格鷙獸而服猛至乃樹勲烈齒榮爵氣激於當時聲聾於殊俗者盖有之矣傳曰君子有勇而無義為亂若恃匹夫之力昧經典之訓違乃達徳嗇於致禍斯固暴虎馮河死而無悔之徒歟郤叔虎晉人也晉獻公伐翟柤郤叔虎將乗城乗升也其徒曰棄政而役非其任也政職也侵服戍役郤叔虎曰既無老謀而又無壯事何以事君壯事力役也言事君無謀又恥無功被羽先升遂尅之羽鳥羽被於背若今軍將負毦秦堇父魯人也晉㑹諸侯伐偪陽主人縣布堇父登之及堞而絶之偪陽人縣布以試外勇者隊則又縣之蘇而復上者三主人辭焉乃退主人喜其勇故辭謝不復縣布帶其斷以狥於軍三日太叔段鄭莊公弟也叔多才而好勇故詩曰太叔於田襢裼暴虎獻於公所禮裼肉袒也暴虎空手摶之獻於公所進於君也熊宜僚楚人也初楚平王太子建之子白公勝將作難謂石乞曰王與二卿士皆以五百人當之則可矣乞曰不可得也市南有熊宜僚者若得之可當五百人也乃從白公而見之與之言悦告之故辭承之以劔不動㧞劔指其喉勝曰不為利諂不為威惕不洩人言以求媚者去之曹沫者魯人也以勇力事魯莊公州綽邢蒯晉大夫皆勇士也奔齊齊莊公朝指殖綽郭最曰是寡人之雄也州綽曰君以為雄誰敢不雄然臣不敏平隂之役先二子鳴前晉伐齊及平隂州綽獲殖綽郭最故自比與雞鬪勝而先鳴莊公為勇爵設爵位以命勇士殖綽郭最欲與焉自以為勇州綽曰東門之役臣左驂廹還於門中識其枚數識門版數其可以與於此乎公曰子為晉君也對曰臣為𨽻新言但為僕𨽻尚新耳然二子者譬於禽獸臣食其肉而寢其皮矣言嘗射得之斐豹晉人也欒盈率曲沃之甲因魏獻子以晝入絳初斐豹𨽻也著於丹書蓋犯罪沒為官奴以丹書其罪欒氏之力臣曰督戎國人懼之斐豹謂宣子曰茍焚丹書我殺督戎宣子喜曰而殺之所不請於君焚丹書者有如日言不負要盟如日乃出豹而閉之閉着門外督戎從之踰隠而待之隠短墻也督戎踰入豹自後擊而殺之敝無存齊人也齊侯伐晉夷儀為衛討也敝無存之父將室之辭以與其弟室之謂娶婦曰此役入也不死反必娶於高國高氏國氏齊貴族也無存欲必有功還娶卿相之女先登求自門出死於霤下既入城夷儀人不服故鬪死於門屋霤下也渉佗晉人也晉趙鞅圍衛報夷儀也初魏侯伐邯鄲戰午於寒氏邯鄲廣平縣也午晉邯鄲大夫寒氏即五氏也前年衛人助齊伐五氏城其西北而守之宵􅑒午聚宵㪚及晉圍衛午以徒七十人門於衛西門殺人於門中曰請報寒氏之役衛開門與午鬪渉佗曰夫子則勇矣然我徃必不敢啓門亦以徒七十人旦門焉歩左右皆至而立如植至其門下歩行門左右然後立待如立木不動以示整日中不啓門乃退仲由字子路衛人也性鄙好勇力志伉直冠雄鷄佩猳豚冠以雄鷄佩猳豚二物皆勇子路好勇故冠帶之陵暴孔子子路問君子尚勇乎孔子曰義以為上君子好勇而無義則亂既稱君子不職為亂階也若君親失道國家昏亂其於赴忠致命而不知正顧義者則亦䧟乎為亂而受不義之責也小人好勇而無義則盗子又曰由也好勇過我無所取材若由也不得其死然公良孺子者孔子弟子孔子去陳過蒲㑹公叔氏以蒲畔蒲人止孔子公良孺以私車五乗從其為人長賢有勇力謂曰吾昔從夫子遇難於長垣今又遇難於此命也已吾與夫子再罹難寜鬪而死鬪甚疾蒲人懼出孔子菑丘訢東海勇之上士也以勇聞於天下過神淵曰飲馬其僕曰飲馬此者馬必死曰以訢之言飲之其馬果沉菑丘訢去朝服㧞劔而入三日三夜殺三蛟一龍而出雷神隨而擊之十日十夜眇其左目要離聞之徃見之曰訢在乎曰送有䘮者徃見訢於墓曰聞雷神擊子十日十夜眇子左目夫天怒不旋目人怨不旋踵至今弗報何也叱而去墓上振憤者不可勝數要離歸謂其人曰菑丘訢天下之勇士也今日我辱之人中是其必來攻我暮無閉門寢無閉戸菑丘訢果夜來㧞劔住要離頸曰子有死罪三辱我以人中死罪一也暮不閉門死罪二也寢不閉戸死罪三也要離曰子待我一言子來不謁不肖一也㧞劍不刺不肖二也刄先辭後不肖三也子能殺我者是毒藥之死耳菑丘訢引劔而去曰嘻所不若天下惟此子耳公孫接田開彊古冶子事齊景公以勇力搏虎聞晏子過而趨三子者不起晏子入見曰臣聞明君之畜勇力之士也上有君臣之義下有長率之倫内可以禁暴外可以威敵上利其功下限其勇故尊其位重其祿今君之畜勇力之士也上無君臣之義下無長率之倫内不可以禁暴外不可以威敵危國之噐也不若去之公曰三子者搏之恐不得刺之恐不中也晏子曰此皆力政勍彊之人也無長㓜禮公使人少餽之二桃三子何不計功而食桃公孫接仰天而歎曰晏子也夫使公計吾功者不受桃是無勇也士衆而桃寡何計而食桃矣接一搏特猏而再搏乳虎若接之功可以食桃而毋與人同矣援桃而起田開彊曰吾杖兵而郤三軍者再若開彊之功亦可食桃而毋與人同矣援桃而起古冶子曰吾嘗從君濟於河黿銜左驂以入砥柱之中流當是時也冶少不能遊濳行逆流百歩順流九里得黿而執之左操馬尾右擊黿頭騰躍而出津人皆曰河伯也若冶之視之則大黿之首也若冶之功者亦可以食桃而母與人同矣二子者何不反桃抽劔而起公孫接田開彊曰吾勇不子若功不子逮取桃不讓是貪也然而不死無勇也皆反桃擊領而死古冶子曰二子死之冶獨生之不仁矣夫耻人以言而夸其聲不義恨於所行而不死無勇雖然二子同桃而節冶專桃而宜亦反其桃挈領而死待者復已死矣斂之以服塟以士禮焉成覸謂齊景公曰彼丈夫也我丈夫也吾何畏彼哉成覸勇果者也與景公言曰尊貴者與我同丈夫耳我亦能為之我何為畏之者也北宫黝之飬勇也不膚撓不目逃思以一毫挫於人若撻之於市朝黝有人刺其肌膚不為撓郤刺其目目不轉睛避也卞莊子欲刺虎館豎子止之曰兩虎方且食牛食甘必爭爭則必鬪鬪則大者傷小者死從傷而刺之一舉必有䨇虎之名卞莊子以為然立須之有頃兩虎果鬪大者傷小者死莊子從傷者而刺之一舉果有䨇虎之功卞莊子好勇母在時三戰而三北交逰非之國君辱之卞莊子受命顔色不變及母死三年魯興師卞莊子請從至見於將軍曰前猶與母處是以戰而北也辱吾身今母歿矣請雪責遂走敵而鬪獲甲首而獻之請以此雪再北將軍止之曰不足上又獲甲首而獻之請以此雪三北將軍止之曰足矣請為兄弟卞莊子曰夫北以飬母也今母歿矣吾責雪矣吾聞之亷人不以辱生遂奔敵殺七十人而死齊之好勇者其一人居東郭其一人居西郭卒然相遇於途曰姑相飲乎觴數行觴爵也曰姑求肉乎一人曰子肉也我肉也尚胡革求肉而為革為也於是具染而已染謂醬也因抽刀而相㗖至死而止勇若此不若無酒以成禮弗繼以淫義也勇而相㗖無禮之甚故曰不若無藺相如趙人也趙惠文王十九年秦王使使者告趙王欲與王為好㑹於河西外渑池趙王畏秦欲毋行亷頗藺相如計曰王不行示趙弱且怯也趙王遂行相如從亷頗送至境與王訣曰王行度道里㑹遇之禮畢還不過三十日三十日不還則請立太子為王以絶秦望王許之遂與秦王㑹渑池秦王飲酒酣曰寡人竊聞趙王好音請奏瑟趙王皷瑟秦御史前書曰某年月日秦王與趙王㑹飲令趙王皷瑟藺相如前曰趙王竊聞秦王善為秦聲請奏盆缻秦王以相娱樂缻者瓦器所以盛酒漿秦人皷之以節歌也秦王怒不許於是相如前進缻因跪請秦王秦王不肯擊缻相如曰五歩之内相如請得以頸血濺大王矣左右欲刄相如相如張目叱之左右皆靡於是秦王不懌為一擊缻相如目顧召趙御史書曰某年月日秦王為趙王擊缻秦之羣臣曰請以趙十五城為秦王壽藺相如亦曰請以秦之咸陽為趙王壽秦王竟酒終不能加勝於趙趙亦盛設兵以待秦秦不敢動既罷歸國以相如功大拜為上卿毛遂者趙之平原君客也平原君喜賔客至者數千人秦之圍邯郸趙使平原君求救合從於楚約與食客門下有勇力文武備具者二十人偕平原君曰使文能取勝則善矣文不能取勝則㰱血於華屋之下必得定從而還士不外索取於食客門下足矣得十九人餘無可取者無以滿二十人門下有毛遂者前自贊於平原君曰遂聞君將合從於楚約與食客門下二十人偕不外索今少一人願君即以遂備員而行矣平原君曰先生處勝之門下幾年於此矣毛遂曰三年於此矣平原君曰夫賢士之處世也譬若錐之處嚢中其末立見今先生處勝之門下三年於此矣左右未有所稱誦勝未有所聞是先生無所有能也毛遂曰臣乃今處囊中耳使遂蚤得頴脱而出非惟其末見而已平原君竟與毛遂偕十九人相與目笑之而未發也毛遂比至楚與十九人論議十九人皆服平原君與楚合從言其利害日出而言之日中不决十九人謂毛遂曰先生上毛遂按劔歴階而上謂平原君曰從之利害兩言而决耳今日出而言日中不决何也楚王謂平原君曰客何為者也平原君曰是勝之舍人也楚王叱之胡不下吾乃與而君言汝何為者也毛遂按劔而前曰王之所以叱遂者以楚國之衆也今十歩之内王不得恃楚國之衆也王之命懸於遂手吾君在前叱者何也且遂聞湯以七十里之地王天下文王以百里之壤而臣諸侯豈其士卒衆多哉誠能據其勢而奮其威今楚地方五千里持戈百萬此霸王之資也以楚之彊天下弗能當白起小豎子耳率數萬之衆興師以與楚戰一戰而舉鄢郢再戰而燒夷陵三戰而辱王之先人此百世之怨而趙之所羞而王弗知惡焉合從者為楚非為趙也吾君在前叱者何也楚王曰唯唯誠若先生之言謹奉社稷以從毛遂曰從定乎楚王曰定矣毛遂謂楚王之左右曰取鷄狗馬之血來毛遂奉銅盤而跪進之楚王曰王當㰱血而定從次者吾君次者遂遂定從於殿上毛遂左手持盤血而右手招十九人曰公相與㰱血於堂下公等碌碌音禄所謂因人成事者也次非荆人也一作次飛得寳劔於干遂干遂邑名還返渉江至於中流有兩蛟夾繞其船次非謂舟人曰汝嘗見兩蛟夾舟而舟中之人有全活者乎舟人曰未之見也次非曰若如是吾固江中之腐朽骨耳棄劔而已余何愛焉遂攘臂袪衣㧞劔赴江刺蛟殺之而復上舟中之人皆獲全荆王聞之仕以執圭周禮侯執信圭楚以次非為勇武侯秦舞陽燕國勇士也年十三殺人人不敢忤視漢項籍字羽長八尺二寸力能扛鼎扛舉也音江才氣過人吴中子弟皆憚籍漢軍與羽軍相守廣武羽令壯士出挑戰漢有善騎射曰樓煩樓煩胡人也後為縣屬鴈門北縣人善騎射謂士為樓煩取其稱耳未得樓煩人也楚挑戰三合樓煩輙射殺之羽大怒自被甲持㦸挑戰樓煩欲射羽瞋目叱之樓煩目不能視手不能發走還入壁不敢復出漢王使間問之乃羽也後至垓下為漢兵所圍夜直潰圍南出漢軍追之至東城乃有二十八騎追者數千羽自度不得脱謂其騎曰吾起兵至今八歳矣身七十餘戰所當者破所擊者服未嘗敗北遂霸有天下然今卒困於此此天亾我非戰之罪也今日固决死願為諸君决戰必三勝之為諸君潰圍斬將艾旗乃後死艾音刈使諸君知吾非用兵罪天亾我也於是引其騎因四隤山四下陂陁也隤音徒囘反而為圜陳外嚮漢騎圍之數重羽謂其騎曰吾為公取彼一將令四面騎馳下期山東為三處於是羽大呼馳下漢軍皆披靡遂殺漢一將是時楊喜為郎騎追羽羽還叱之喜人馬俱驚辟易數里與其騎㑹三處漢軍不知羽所居分軍為三復圍之羽乃馳復斬漢一都尉殺數十百人復聚其騎亾兩騎乃謂騎曰何如騎皆服曰如大王言季心布弟也以勇聞闗中後為中司馬朱雲字子游魯人嘗借客報讐以勇力聞官至槐里令李禹敢之子也亦有勇嘗與侍中貴人飲侵陵之莫敢應後愬之武帝帝召禹使刺虎縣下圏中未至地有詔引出之禹從落中以劔斫絶纍欲刺虎落與絡同謂當繈時絡之而下也纍索也帝壯之遂救止焉後漢銚期潁川郟人也光武畧地潁川聞期志義召署功曹掾從光武徇薊時王郎檄書到薊薊中起兵應郎光武趨駕出百姓聚觀諠呼滿道遮路不得行期騎馬奮㦸瞋目大呼左右曰䟆衆皆披靡及至城門門已閉攻之得出位至衛尉卒蓋延身長八尺彎弓三百斤邉俗尚勇力而延以氣聞後為虎牙將軍封安平侯復拜左馮翊薨於位朱暉有氣决年十三王莽敗天下亂與外氏家屬從田間奔入宛城道遇羣賊白刄刼諸婦女畧奪衣物昆弟賔客皆惶廹伏地莫敢動暉㧞劔前曰財物皆可取耳諸母衣不可得今日朱暉死日也賊見其小壯其志笑曰童子内刀遂捨之而去後位為尚書令以老病乞身拜騎都尉卒彭脩年十五時父為郡吏得休與脩俱歸道為盗所刼脩困廹乃㧞佩刀前指盗帥曰父辱子死卿不顧死耶盗相謂曰此童子義士也不宜逼之遂辭謝而去鄉黨稱其名楊政字文行京兆人嘗過揚虚侯馬武武稱疾見政去對杌邉牀卧欲令政拜牀下政入戸前排武徑上牀坐武恨語言不懌政把武手責之曰卿䝉國恩備位藩臣不思求賢助國而驕天下英俊今日動者刀入脅左右大驚以為見刼操兵滿側顔色自若㑹信陽侯至責數武令為朋友其剛果勇敢皆此類也官至左中郎將五孚字德瑜汝南吳房人質性剛毅勇壯好義力能兼人孫堪以節介氣勇自許王莽末兵革竝起宗族老弱在營保間堪嘗力戰䧟敵無所囘避數被創刄宗族賴之郡中咸服其義勇位至侍中騎都尉牛邯字孺卿狄道人有勇力才氣雄於邉陲魏臧霸字宣高㤗山人父戒為縣獄掾據法不聼太守所欲殺太守怒收戒詣府送者百餘人霸年十八將客數人於南山中奪之送者莫敢動因與父俱亾命東海繇是以勇壯聞後為執金吾位特進吕布字奉先五原人也董卓為都尉卓每以布自衛布嘗小失於卓㧞㦸擲之布趫㨗得免布繇是隂怨於卓布後應王允於門刺殺卓卓將李催等阻兵布自南陽從袁術自術又投袁紹紹與布擊張燕布嘗御良馬號赤兎能馳城飛壍遂突張燕軍陣一日或至三四皆斬首而出遂破燕軍許禇字仲康長八尺大十圍勇力絶人太祖初見曰此樊噲也即日拜都尉鮑出字文才京兆新豐人也少游俠興平中三輔亂出與老母兄弟五人家居本縣以饑餓留其母守舍相將行採􅅾實合得數升使其二兄初雅及其弟成持歸為母作食獨與小弟在後採􅅾初等到家而噉人賊數十人已畧其母以繩貫其手掌驅去初等怖恐不敢追逐須叟出從後到知母為賊所畧欲追賊兄弟皆云賊衆當如何出怒曰有母而使賊貫其手將去煮噉之用活何為乃攘臂結袖獨追之行數里及賊賊望見出乃共布列待之出到囘從一頭斫賊殺四五人賊走復相合聚圍出出跳越圍斫之又殺十餘人時賊分布驅出母前去賊連擊出不勝乃走與前輩合出復追擊之還見其母與比舍嫗同貫相連出遂復奮擊賊賊問出曰卿欲何得出責數賊指其母以示之賊乃觧還出母比舍嫗獨不解遥望出求哀出復斫賊賊謂出曰已還卿母何為不止出又指求哀嫗此我嫂也賊復解還之出得母還遂相扶持客南陽劉曄淮南成德人也漢末揚土多輕俠狡桀有鄭寳張多許乾之屬各擁部曲寳最驍果才力過人一方所惮欲驅畧百姓越赴江表以曄髙族名人欲彊逼曄使倡導此謀曄時年二十餘心内憂之而未有緣㑹太祖遣使詣州有所案問曄徃見為論事勢要將與歸駐止數日寳果從數百人賫牛酒來候使者曄令家僮將其衆坐中門外為設酒飯與寳内晏飲宻勒徤兒令因行觴而斫寳性不甘酒視候甚明觴者不敢發曄因自引取佩刀斫殺寳斬其首以令其軍曰曹公有令敢有動者與寳同罪衆皆驚怖走還營營有督將精兵數千懼其為亂曄即乗寳馬將家僮數人詣寳營門呼其渠帥喻以禍福皆叩頭開門内曄曄撫慰安懐咸􅊖悦服推曄為主終於大中大夫夏侯稱淵之子也年十六淵與之田見奔虎稱驅馬逐之禁之不可一箭而倒名聞太祖太祖把其手喜曰我得汝矣丁原字建陽本出自寒家為人麄畧有武勇善騎射為南縣吏受使不辭難有警急追冦虜輙在其前文俶小名鴦揚州刺史欽之子也欽之舉兵大將軍司馬景王致兵討之將戰欽引退鴦年尚㓜勇力絶人謂欽曰及其未定擊之可破也於是分為二隊夜夾攻軍俶率壯士先至大呼大將軍軍中震擾欽後期不應㑹明俶退欽亦引還一云鴦年十八勇冠三軍吳劉繇年十九從父韙為賊所刼質繇奪取以歸繇是顯名太史慈字子義與揚州刺史劉繇同郡慈自遼東還未與相見暫渡江到曲阿見繇未去㑹孫䇿至或勸繇可以慈為大將軍繇曰我若用子義許子將不當笑我邪因使慈偵視輕重時獨與一騎卒過䇿䇿從騎十三皆韓當宋謙黄蓋輩也慈便前鬪正與䇿對䇿刺慈馬而掣得慈頂上手㦸慈亦得䇿兠鍪㑹兩家兵騎竝各來赴於是解㪚徐盛字文嚮瑯琊營人遭亂客居吳以勇氣聞孫權統事以為别部司馬後為安東將軍封蕪湖侯晉吾彦初為小將給吳大司馬陸抗抗竒其勇畧將㧞用之患衆情不允乃㑹諸將宻使人陽狂㧞刀跳躍而來坐上諸將皆懼而走唯彦不動舉几禦之衆服其勇乃擢用焉終於大長秋庾東以勇力聞武帝時有西域徤胡趫㨗無敵晉人莫敢與較帝募勇士唯東應選遂撲殺之名震殊俗司馬勲字偉長年十餘嵗愍帝末長安䧟劉曜將令狐泥飬為子及壯便弓馬能左右射咸和六年自闗右還自列云是大長秋恂之𤣥孫冠軍將軍濟南惠王遂之曾孫畧陽太守瓘之子遂拜謁者僕射以勇聞周訪參元帝鎮東軍謀事時有與訪同姓名者罪當死吏誤收訪訪奮擊收者數十人皆散走而自歸於帝帝不之罪段文鴦匹磾弟也在厭次㑹石虎縱騎抄城左右文鴦登城臨見不勝其勇欲出擊胡匹磾疑有伏不聽出民大為胡所殺掠文鴦單將壯士數十騎出擊胡所殺甚多胡騎退文鴦追躡匹磾率歩卒繼文鴦胡伏騎起匹磾文鴦力戰殺胡數十丈鴦還蔡裔有勇氣聲若雷震嘗有二盗入室裔拊牀一呼而二盗俱隕故殷浩委以軍鋒焉杜曾少驍勇絶人能被甲游於水中始為新野王歆鎮南參軍厯華容令至南蠻司馬凡有戰陣勇冠三軍桓石䖍小字鎮惡有才幹趫㨗絶倫從父在荆州於獵圍中見猛獸被數箭而伏諸督將素知其勇戯令㧞箭石䖍因急徃㧞得一箭猛獸跳石䖍亦跳高於猛獸復㧞一箭以歸劉牢之字道堅曾祖羲以善射事武帝歴北地鴈門太守父建有武幹為征虜將軍牢之世以壯勇稱後為冠軍將軍豫州刺史卒趙伯舒誘之弟也誘為王敦叅軍距杜曾弟五猗與子龔俱戰死伯舒龔之弟也王敦使周訪擊杜曾伯舒請從行訪憚曽之強欲先以伯舒餌曽使其既疲而後擊之伯舒多梟首級王機長沙人羙姿儀俶儻有度量陳恢之亂機年十七率衆擊破之楊孜敬為人剽鋭果於行事昔與從兄佺期勸殷仲堪殺殷顗仲堪不從孜敬㧞刄而起欲自出取之仲堪苦禁乃止後蜀李流字互通特第四弟少好學便弓馬東羗校尉何攀稱流有賁育之勇舉為東羗督胡盛之為長沙王儀欣鎮軍叅軍督䕶討刼譙郡縣西刼有馬歩七十逃隐深椿盛之挺身獨進手斬五十八級蒯恩蘭陵人髙祖征孫恩縣使伐馬蒭恩嘗負大束兼倍餘人每捨蒭於地歎曰大丈夫彎弓三石柰何充馬士高祖聞之即給噐仗恩大喜自征妖賊嘗為先登多斬首級既習戰陣膽力過人終於司馬將軍臨淮太守丁旿驍勇有氣力高祖之殺諸葛長民使旿拉殺之時人為之語曰勿䟦扈付丁旿沈慶之少有志力孫恩之亂遣人㓂武康慶之未冠隨鄉族擊之繇是以勇聞後為侍中太尉桞元景少便弓馬數隨父伐蠻以勇稱後位至侍中尚書令驃騎大將軍宗慤兄泌娶妻始入門夜被刼慤年十四挺身拒賊十餘人皆披㪚不得入室位至寜蠻校尉雍州刺史薛安都少以勇聞身長七尺八寸便弓馬後官至東徐州刺史沈攸之為郢州刺史聞虎輒自圍捕徃無不得一日或得兩三若逼暮不獲禽則宿昔圍守湏曉自出焦度為青州刺史顔師伯輔國叅軍師伯啟孝武稱度氣力弓馬竝絶人帝召還充左右見度身形黑壯謂師伯曰真徤物也為晉安王子勛夾轂隊主隨江州子勛起兵以度為龍驤將軍領三千人為前鋒屯赭圻每與臺軍戰嘗自跳突所向無不勝事敗逃宫亭湖中為冦朝廷聞其勇甚憂之使州刺史王景文誘降焉王宜興吳興人形狀短小而果勁有膽力少年時為刼不湏伴郡縣討逐圍繞數十重終莫能擒南齊崔恭祖惠景宗人也驍果便馬矟氣力絶人頻經軍陣戴僧静㑹稽永興人屬魏軍至僧静應募出戰單刀直前魏軍奔退又追斬三級時天寒甚乃脱衣口銜三頭拍浮而還位至征虜將軍廬陵王中軍司馬高平太守卒周奉叔持節軍士盤龍子也建元三年魏人圍角城奉叔單馬率二百餘人結陣虜萬餘騎張左右翼繞之一騎走還報奉叔已沒盤龍方食棄筯馳馬奮矟直奔虜陣自稱曰周公來虜素畏盤龍驍名即時披靡時奉叔已大殺虜得出在外盤龍不知乃衝東擊西奔南突北賊衆莫敢當奉叔見其父乆不出復躍馬入陣父子兩騎縈攪數萬人虜衆大敗盤龍父子繇是名播北國形甚羸訥而臨軍勇果諸將莫逮桓康北蘭陵承人也勇果驍悍初隨武帝起義為郡兵追急皆㪚康裝擔一頭貯穆后一頭貯文恵太子及竟陵王子良自負置山中與門客蕭欣祖四十餘人相結破獄出武帝郡兵追急康死戰破之隨武帝起兵摧堅䧟陣所經村邑恣行暴害江南人畏之以其名怖小兒􅀞其形狀於寺中病瘧者寫其形帖着床壁無不立愈後為驍騎將軍卒梁羊鴉仁字孝穆大山鉅平人少驍果有膽力率兄弟自魏歸國位至北司州刺史曹景宗字子震新野人父欣之為徐州刺史遣景宗出州以疋馬將數人於道路卒逢蠻賊數百圍之景宗帶百餘箭仍馳騎四射每箭殺一蠻蠻遂敗走因是以膽勇知名馮道根年十六鄉人蔡道班為湖陽戍主攻蠻錫城反為蠻困道根救之疋馬轉戰提雙劔左右奮擊殺傷甚多道班以免繇是知名陳伯之㓜有膂力嘗援靣覘人船船人斫之獲其左耳後隨鄉人車騎將軍王廣之廣之愛其勇每夜卧下榻征討嘗將自隨終於大中大夫桞敬禮與兄仲禮皆少以勇烈知名官至扶風太守杜崱㓜有志氣居鄉里以膽勇稱後為散騎常侍江州刺史杜㓜安性至孝寛厚雄勇過人位至西荆州刺史胡僧祜字願果南陽人少勇决有武幹羊鵾字子鵬都官尚書侃之子侯景敗鵾密圖之乃隨其東走景於松江下海欲向䝉山景寢鵾語海師向京口至湖豆州景覺鵾㧞刀叱海師景透水鵾斫之景入船中以小刀抉船鵾刺殺之世祖以鵾為青州刺史封昌國侯錢五百萬米五千石陳周鐵虎事梁河東王蕭譽以勇敢聞譽為臨蒸令及王僧辨討譽於陣獲鐵虎僧辨命烹之鐵虎呼曰侯景未滅何以殺壯士僧辨竒其言乃宥之後為散騎常侍嚴威將軍太子左衛卒程靈洗新安海寜人少以勇力聞歩行日三百餘里便騎善射梁末又海寜黝歙等縣及鄱陽宣城郡累多盗賊郡縣苦之靈洗素為鄉里所畏服前守長常使召募少年逐捕刼盗位至安西將軍程文季靈洗子也㓜習騎射多幹畧果决有父風弱冠從靈洗征討必前登䧟陣後為安逺將軍譙州刺史杜僧明字宏炤形貌𦕈小而膽氣過人有勇力善騎射位至通直㪚騎常侍平北將軍蕭摩訶父諒梁始興郡丞摩訶隨父之郡年數嵗而父卒其姊夫蔡路飬在南康乃收飬之稍長果毅有勇力侯景之亂高祖赴援京師路飬起兵拒高祖摩訶時年十三單騎出戰軍中莫有當者及路飬敗摩訶歸於侯安都安都遇之甚厚自此常𨽻安都征討及任約徐嗣徽引齊兵為冦高祖遣安都北拒齊軍於鍾山龍尾及北郊壇安都謂摩訶曰卿驍勇有名千聞不如一見摩訶對曰今日令公見矣及戰安都墜馬被圍摩訶獨騎大呼直衝齊軍披靡因稍解去安都乃免後入隋授開府儀同三司周迪少居山谷有膂力能挽強弩以弋獵為事侯景之亂迪宗人周續起兵於臨川梁始興王蕭毅以郡讓續迪召募鄉人從之每戰必勇冠衆軍官至安南將軍後魏長孫觀少以壯勇知名魯秀小字天念爽弟也頗有意畧才力過爽太武以充宿衛甚知待之高梁王阿叔泥為芮芮所圍甚急使秀徃救太武自率大衆繼其後未及至秀已擊破之㧞阿叔泥而反吕羅漢弱冠以武幹知名父温之佐秦州羅漢隨侍隴右楊難當率衆數萬㓂上邽秦人多應之賊衆轉盛羅漢進計於鎮將元意頭曰今不出戰示敵以弱衆情㩦貳大事去矣意頭善之即簡千餘騎令羅漢出戰與諸騎䇿厓大呼直衝難當軍衆皆披靡殺難當左右隊騎八人難當大驚乃引還仇池後拜内都大官卒來大千驍果善騎射遷中㪚至於朝賀之日大千嘗着御鎧盤馬殿庭莫不歎異嘗從太宗獵見虎在高巖上大千持矟直前刺之應手而死崔延伯博陵人也祖壽於彭城䧟入江南延伯有氣力少以勇壯聞後為左衛將軍卒乙瓌代人也便弓馬善騎射手格猛獸膂力過人數從征伐後為侍中征東將軍定州刺史卒爾朱兆字萬仁少驍猛善騎射手格猛獸後為都督十州諸軍事襲并州刺史李洪之志性慷慨多所堪忍疢疾灸療艾炷將二寸首足十餘處一時俱下而言笑自若接賔不輟後為安南將軍秦益二州刺史尉眷太宗時執事左右為太官令時侍臣受斤亡入蠕蠕詔眷追之遂至虜庭大擅問其故眷曰受斤負罪天子逃刑在此不時執送是以來取眷遂擒受斤於大擅前左右救之乃免繇是以驍烈聞遷司衛監江文遥少有大度輕財好士士多歸之夏侯道遷之圖陽虚珍也文遥奮劍請行遂手斬虚珍後周夏莫陳崇武川人少驍勇善馳射隨賀㧞嶽征討以功除建威將軍位至大司徒耿豪少麄獷有武藝好以氣凌人賀㧞嶽西征引為帳内嶽被害歸太祖以武勇見知後為驃騎大將軍開府儀同三司賀若敦東魏潁川長史統之子從其父歸太祖時羣盗蜂起各據山谷太龜山賊張世顯潜來襲統敦挺身赴戰手斬七八人賊乃退走終於忠州刺史泉仲遵雒州都督企之次子少謹實有武藝遭世離亂每從父兄征討以勇决聞高敖曹攻雒州企令仲遵率五百人出戰時以衆寡不敵乃退入城復與企力戰拒守矢盡以棒杖捍之遂為流矢中目不堪復戰及城䧟士卒歎曰若二郎不傷豈至於此隋虞慶則靈武太守祥之子㓜雄毅性俶儻身長八尺有膽氣善鮮卑語身被重鎧帶兩鞬左右馳射本州豪俠皆敬憚之後以右武侯大將軍出為桂州道行軍縂管張奫字文懿自云清河人家於淮隂好讀兵書尤便刀楯周世鄉人郭子異密引陳㓂奫父䨇欲率子弟擊之猶豫未决奫贊成其謀竟以破賊繇是以勇决知名起家州主簿史萬嵗以坐事除名配燉煌為戍卒戍主甚驍武每單騎深入突厥中掠取羊馬輙大尅獲突厥無衆寡莫之敢當其人深自矜負數罵辱萬嵗萬嵗患之自言亦有武用戍主試令馳射甚工戍主笑曰小人安可萬嵗請弓馬復掠突厥中大得六畜而歸戍主始善之每與同行輙入突厥數百里名讋北夷後為河州刺史行軍縂管麥鐵杖陳亾後徙居清流縣遇江東反楊素遣鐵杖頭戴草束夜浮渡江覘賊中消息具知還報後復更徃為賊所擒逆帥李陵遣兵仗三十人衛之縳送髙智惠行至庱亭衛者憇息哀其餒解手以給其餐鐵杖取賊刀亂斬衛者殺之皆盡悉割其鼻懐之以歸素大竒之後位至右屯衛大將軍梁黙者梁士彦之蒼頭驍武絶人士彦每從征伐常與䧟陣唐杜伏威隋末僣稱將軍煬帝遣右禦衛將軍陳稜以精兵八千討之稜不敢戰伏威遣遺稜婦人以激怒之并致書號為陳姥稜大怒悉兵而至伏威逆拒自出陣前挑戰稜部將射中其額伏威怒指之曰不殺汝我終不㧞箭遂馳之稜部將走奔其陣伏威因入稜陣大呼衝擊所向披靡獲所射者使其㧞箭然後斬之㩦其首復入稜軍奮擊殺數十人稜陣大潰僅以身免丘行恭善騎射勇敢絶倫隋大業末與兄師利聚兵於岐雍間有衆一萬保故郿城百姓多附之羣盗不敢入境李藝性桀黠剛愎不仁勇於攻戰薛仁杲舉之長子多力善騎射勇烈過人舉軍中號為萬人敵後為太宗所誅盧祖尚隋大業末召募壯士逐捕郡盗時年甚少而武力過人又御衆嚴整所向有功羣盗畏憚不敢入境錢九隴有膂力趫㨗善騎射隋大業中嘗從高祖以驍勇見稱官至監門大將軍高開道渤海人少而驍㨗隋大業末賊帥格謙擁衆於豆子䴚開道歸之禮遇甚薄㑹謙為隋師所圍左右分㪚無救之者開道獨身决戰殺十餘人隋師披靡謙乃獲免於是始重開道為幽州總管公孫武達少有膂力嘗遇賊盡刼其衣物仍逼武達索靴武達授足與之賊俯就引靴武逹毆之死於手下以其兵仗禦餘冦獲免繇是以壯勇知名官至武衛大將軍蘇定方冀州武邑人父邕大業末率鄉閭數千人為本郡討賊㝎方驍悍多力膽氣絶倫年十五餘隨父討捕先登䧟陣父卒郡守又令定方破賊帥張金秤於郡南手斬金秤又破陽公卿於郡西追奔二十餘里殺獲甚衆公卿僅以身免繇是外盗不敢入界鄉黨頼之官至武衛大将軍李勣隋大業中説韋城人翟讓刼公私船物兵衆大振隋遣齊郡通守張須陁率師二萬討之勣與戰斬張須陁於陣後位至司空薛萬均河東汾隂人善射有武畧拳勇絶人後官至屯衛大將軍薛仁貴絳州龍門人貞觀末太宗親征遼東仁貴謁將軍張士貴應募請從行至安地有郎將劉君昂為賊所圍甚急仁貴往救之躍馬徑前手斬賊將懸其頭於馬鞍賊皆懾伏仁貴遂知名官至右領軍衛大將軍撿校代州都督李敬業者司空英國公勣之孫少嘗從祖征討以驍勇聞後左授栁州司馬以叛逆誅程務挺雒州人右驍衛將軍振之子少嘗隨父征討以勇力聞位至左衛武大將軍單于道安撫大使高子貢和州歴陽人屬徐敬業搆逆侵逼和州子貢率其鄉曲子弟以禦之繇是賊不敢侵姚令言河中人少勇應募起於卒伍𨽻涇原節度馬璘以戰功累授金吾大將軍李祐本蔡將也驍勇過人每行營當陣敵官軍皆深憚之後唐傅彦饒少驍勇能騎射天祐十五年冬莊宗與梁軍大戰於胡桞陂時彦饒與弟彦圖俱從其父血戰有功莊宗壯之因用為騎將高行珪燕人將家子家世勇悍後為安州節度使晉翟璋好勇多力時目為大蟲即癡虎之稱也位至左羽林統軍張郎唐昭宗末徐方亂盗賊蜂起剽劫鄉郡郎聚少年數百人固䕶親族隣里頼其保全者甚衆終於光祿大夫檢校太傅慶州刺史張恊臨黄縣書生也天福九年恊自募召勇敢之士五十餘人詣行宫請為逰兵捉生偵邏帝嘉之賜以戎服遣殿直王巒俱徃時擒索虜致於行在房知温字伯玉兖州瑕丘人也少有勇力籍本軍為赤甲都官徤梁將葛從周鎮其地為爪牙後為檢校太師兼中書令漢馮萬少從軍善水游唐莊宗與梁軍對壘胡栁之役莊宗自濮州至潘張立河南北寨㑹莊宗入至太原梁軍水陸齊進攻南寨於寨北河流聨戰艦以絶援路晝夜攻城者三日寨將失延賞告急莊宗自太宗廻便趨寨隔河望敵無如之何乃召人能水游破賊者馮萬兄弟應募言可通南寨遂潜行入南寨徃來者三又助燒船汴軍斫船走解圍自是收為水軍小校位至上將軍周安懐盛沙陁三部落之種也事太祖以驍勇聞于釗元城人也以強勇稱於河朔間趙暉代家天水近世徙居於魏故今為郡人焉暉生於貧賤弱冠習武以挽強稱唐莊宗之戰河朔也廣募驍雄以備征伐始𨽻於莊宗帳前與大梁兵凡經百餘戰摧堅䧟陣名出行伍間後為太子太師致仕李懐忠初事後唐莊宗赴援夾城之役懐忠率先登城轉鬪其衆大敗後以太子太傅致仕卒史彦超雲州人也性驍獷有膽氣官至華州節度使白延遇太原人也㓜畜於晉高祖之公宫年十三從晉祖伐蜀以趫悍見稱終於同州節度使仇超顯徳中以廂軍從太祖巡按賊壘張彦超設虎落以䕶城宣諭諸州廂軍内果敢之士能㧞去鹿角者超仗一大斧伐鹿角而徑登為賊守陴者傷三指而下太祖奬其勇健解其甲鎧唯衣一犢鼻賜以錦袍超謝之㩦斧又登賊壘芟夷懸幢之類而旋太祖擢之在控鶴官之列間日思其驍果宣問願陳力之所超曰父嘗任倉州捉生都頭茍得之平生之願畢矣於是補是職焉册府元龜卷八百四十七
