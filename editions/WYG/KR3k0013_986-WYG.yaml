body:
  text: 册府元龜卷九百八十六宋王欽若等撰外臣部征討第五唐髙宗永徽元年六月左翊衛郎将髙侃率兵討突厥車鼻可汗於阿息出車鼻聞王師至携其愛妾從數百騎而遁髙侃追至金山擒之以歸京師九月獻于社廟又獻於昭陵帝使謂之曰昔頡利亂亡爾不佐輔則無骨月之情矣延陀稱兵自立破敗之後爾又潜于土窟斯即為臣不忠矣國家遣使招撫因爾擅行刼殺爾之所犯不忠不義罪不容誅朕好生惡殺不忍即從典刑且先皇平殄諸國所獲酋渠咸恕性命仰遵先㫖宥汝不死乃遣釋之拜左武衛将軍賜宅于長安處其餘衆於鬰督軍山置狼山都督府以統之二年八月朗州白水蠻反叛寇麻州之界江鎮遣左領軍趙孝祖為朗州道總管與朗州都督任懐玉率兵討之十一月趙孝祖討白水蠻至羅仵候山蠻帥秃磨蒲大鬼主都于等率諸部萬餘人守菁口以拒官軍孝祖與戰大破之追至同進水賊帥儉彌于及鬼主董朴等精兵六千據水為寨依山結陣遣輕騎數百来迎官軍孝祖率兵撃之儉彌于苦戰自辰至酉賊衆大敗臨陣斬彌于秃磨蒲及大鬼之首領十餘人賊又阻大雪飢凍死者畧盡孝祖又奏言貞觀中討昆州烏蠻始開青蛤弄棟為州縣㺯棟之西有小勃弄二州嘗扇動㺯棟欲令反叛其勃㺯以西與黄𤓰葉榆西洱河相接人衆殷實多於蜀州無大酋長好結讎怨今因破白水之兵請隨便西討撫而安之詔許之三年正月弓月道行軍總管梁建方契苾何力等大破處月朱耶孤注於牢山初咄陸及阿史船賀魯之叛也招誘處月處宻等部相率皆叛及建方軍至咄陸大懼遠迹西遁朱邪孤注既殺果􅐧單道恵乃據守中牢山其山險絶建方分兵數道並進鼓而登四靣攻之賊衆大潰孤注擕所親夜遁建方使副總管髙徳逸輕騎追之行五百餘里孤注據險拒戰於陣生擒斬之斬首九千級虜渠帥六十餘人四月朗州道行軍總管趙孝祖大破白水蠻大勃律西南夷遂定之六年正月嶲州道行軍總管曹繼叔破胡叢顯飬東魯等蠻於斜山克一十餘城斬首七百餘級獲馬四百餘匹氂牛一萬五千頭二月遣營州都督程名振左衛中郎将蘇定方等發兵一萬討髙麗以侵掠新羅故也時新羅王金春秋表言髙麗與百濟靺鞨相連侵其北境已奪三十三城乞兵救援故遣名振等經畧之五月程名振率兵渡遼水至髙麗以名振兵少乃開六城門出兵渡貴端水與名振合戰賊徒大敗奔走過水欲入城不得殺獲千餘人名振縱兵焚其羅郭及村落而還五月遣左屯衛大将軍程知節為䓤山道行軍總管率左武衛将軍舎利叱右武衛将軍王文度伊州都督蘇海政等討西突厥阿史那賀魯顯定元年八月程知節與賀魯所部歌邏禄及處月戰於榆莫谷大破之斬首千餘級獲駝馬牛羊萬計副将冏智度攻其突騎處木昆等於咽城㧞之斬首三千級虜獲甚衆九月程知節與賀魯男咥運戰斬首數千級進至嘗篤城俘其部落户口及貨物鉅積二年閏正月賀魯入寇詔右屯衛将軍蘇定方為伊麗道行軍總管率燕然都䕶任邪相副都䕶蕭嗣業等發廻紇兵以追討賀魯仍詔右衛大将軍阿史那彌射左屯衛大将軍阿史那歩真為流歩安撫大使以招輯其舊衆十二月蘇定方大破賀魯金牙山盡收其所據之地西域悉平初賀魯侵併西域諸國進寇延州廻紇婆閏等諸部屬請討之帝前後遣梁建方契苾何力程知節等率兵追討皆不克而還及蘇定方為大總管領廻紇等兵與阿史那彌射歩真等分出西州金城兩道以經畧之定方至金山之地其侯斤嬾獨禄等率萬餘帳来降定方發其千騎進至曵咥河之西賀魯率十姓兵馬且十萬来拒戰定方領廻紇及漢兵萬餘人迎撃賊輕定方兵少四靣圍之定方令歩卒據其原攅矟外向自領漢騎陳于北原賊先撃歩軍三衝不動定方乗勢撃之賊遂大潰追奔三十里斬獲數萬人明日總兵復進賀魯之衆五努失畢部落相次来降五努失部落聞賀魯敗各向南道降于歩真所至蕃人皆相率歸降曰我舊主也定方乃令副将蕭嗣業回紇婆閏率蕃兵趨邪羅斯川以追賀魯定方與任雅相領新附之衆以繼其後會大雪平地二尺軍中咸請停兵候晴定方曰虜恃雪深謂我不能前進必當憇息追之可及緩以縱之則漸遠難追省日兼功在此舉也於是勒兵衝雪晝夜兼進所經收其人衆遂至雙河與彌射歩真相會兩軍合勢去賀魯所居二里布陣長驅徑至金牙山所時賀魯集諸衆欲獵定方與彌射縱兵撃之盡破其牙帳生擒數萬人并獲其鼓纛器械賀魯遂與咄運及其女夫閻啜等脱走投石國定方于是悉兵命諸部歸其所居開通道路列置館驛埋瘞骸骨所在問疾苦分其疆界復其産業賀魯所虜掠者悉括還之于是西域諸國安堵如故三年六月營州都督兼東夷都䕶程名振右領軍郎将薛仁貴率兵攻髙麗之衆􅇏鎮即㧞之斬首四百餘級生擒首領以下百餘人俄而髙麗遣其大将立方婁率衆三萬人来拒官軍名振率契丹兵逆撃大破之逐北二十餘里斬首二千五百級五年三月以左武衛大将軍蘇定方為神丘道行軍大總管率左驍衛将軍劉伯英右武衛将軍馮士翽左驍衛将軍龎孝泰等并發新羅之衆以討百濟百濟恃髙麗之援屢侵新羅故也五月以定襄都督阿史徳樞賔左武侯将軍延陀梯真居延州都督李合浦並為冷硎道行軍總管各領本蕃兵以討叛奚仍令尚書左丞崔餘慶充使總䕶三蕃尋而奚遣使降附改樞賔等為沙磚道行軍總管以討契丹松漠都督阿卜固送之東都并擒叛奚謀主匹帝秃帝斬之而還八月蘇定方㧞百濟之真都城初定方率衆自成山濟海賊徒據熊津江口以拒官軍定方既濟乗山而陣與之大戰揚㠶盖海相續而至賊師敗績死者數千人自餘大潰遇潮直上官軍連舳入江水陸齊進飛檝鼓譟直趣真都去城二十餘里賊傾國来拒大戰破之殺虜萬餘人追奔入郭其王義慈及太子隆奔于北境定方進圍其城義慈次子泰自立為王率衆還固守義慈嫡孫文思曰王與太子雖並出城而身見在叔總兵焉專擅為王假令漢退我父子當不全矣遂率其左右投城而下百姓從之泰不能止定方令兵士登城立幟於是泰開門頓顙請命其大将禰植又将義慈来降太子隆并與諸城主皆同送欵百濟悉平是月左衛大将軍鄭仁泰率兵討思結援也固僕骨同羅四部落三戰皆㨗追奔百里斬其首領而還十二月以左驍衛大将軍契苾何力為浿江道行軍大總管左武衛大将軍蘇定方為遼東道行軍大總管左驍衛将軍劉伯英為平壤道行軍大總管分道發兵以討髙麗龍朔元年正月以鴻臚卿蕭嗣業為扶餘道行軍總管率廻紇等蕃兵赴平壤以討髙麗三月𢃄方州刺史劉仁軌大破百濟餘衆於熊津之北四月詔兼兵部尚書任雅相為浿江道行軍總管左衛大将軍契苾何力為遼東道行軍總管左武衛大将軍蘇定方為平壤道行軍總管并率諸蕃軍将總三十五軍川陸分途先觀髙麗之釁帝将親率六軍以繼之八月蘇定方破髙麗之衆於浿江頻戰皆㨗奪其馬邑山因山為營遂為平壤城明年三月勒兵而還十月以鐵勒殺勑使反叛詔左武衛大将軍鄭仁泰為鐵勒道行軍大總管燕然都䕶劉審禮左武衛将軍薛仁貴為副鴻臚卿蕭嗣業為山蕚道行軍總管左屯衛将軍孫仁師為副率兵以討之二年三月鄭仁㤗薛仁貴等破鐵勒之衆於天山時鐵勒有思結多臘葛等部落先保天山及仁泰等将至亦送降欵仁泰等結兵撃之虜其家口以賞軍士賊乃相率遠遁七月熊津都督劉仁願𢃄方州刺史劉仁軌等率留鎮之兵及新羅之兵大破百濟餘賊於熊津之東㧞其真峴城斬首八百級三年正月鄭仁泰等討鐵勒餘種悉平之乾封元年六月詔左驍衛大将軍契苾何力為遼東道安撫使以應接髙麗王初髙麗莫離支蓋蘇文死其長子男生代父為莫離支之位既初知國政出廵諸城使其二弟男建男産留後知國事男生既出或謂男建等曰男生惡二弟逼已意欲除之不如先以為計也男建等初不言之又有人謂男生曰二弟恐兄思奪已權欲拒兄不納男生使所親潜往平壤以伺焉男建等知而掩得之繇是逓相猜貳男建等乃以其王命召男生男生懼不敢歸男建等遂發兵討之男生走據國内城以自守其子獻誠詣闕求救於是詔何力率兵赴援乃授獻誠右武衛大将軍使為鄉導又遣左金吾衛将軍龎同善營州都督髙侃等為行軍總管以經畧髙麗九月龎同善大破髙麗男生率所親會同善之軍十二月命司空英國公李勣為遼東道行軍大總管兼為遼東安撫大使左金吾衛将軍龎同善左驍衛大将軍契苾何力並依舊為遼東道安撫大使其水陸諸軍總管并粮運使竇義積獨孤卿雲郭待封及募兵以上並受勣處分以討髙麗河北道諸州租税總起遼東以給軍用於是水陸分道以赴平壤二年九月李勣㧞髙麗之新城遣副将契苾何力守之勣遂引兵進破一十六城三年二月李勣及薛仁貴進㧞髙麗之扶餘城時偏将龎同善髙侃等為後殿尚在新羅髙麗男建遣救新城夜襲同善仁貴率援軍以破之侃等移軍進至金山為賊所敗髙麗乗勝而進仁貴等橫撃之賊大敗斬首五萬餘級遂㧞其南蘇木底蒼嵓等三城與男生之軍相會仁貴乗勝領二千人将攻餘城諸将以兵少止之仁貴日在善用耳不在多也遂先鋒而行敗衆来拒逆撃大破之殺獲萬餘人餘城既降扶餘州内四十餘城一時送欵總章元年九月李勣進軍㧞髙麗之平壤城遼東悉平初勣既破大行城諸軍盡會契苾何力㧞南蘇等八城㑹勣於鴨渌栅合軍以攻辱夷城又㧞之何力引蕃漢兵五十萬人逼平壤勣軍繼至髙蔵遣男産帥首領九十八人持白幡詣勣乞降請便入朝謝罪勣以禮接之男建猶閉門固守勣乃移兵於平壤之側以逼之男建頻遣兵出戰皆大敗男建下主兵總管僧信誠宻遣人詣軍許開城門為内應經五日信誠果開城門勣縱兵入登城鼓譟燒城門樓四靣火起男建窘急自刺不死遂虜髙蔵男建男産等以歸京師咸亨元年四月吐蕃䧟白州等一十八州詔右威衛大将軍薛仁貴為邏婆道行軍大總管右衛員外大将軍阿史那道真左衛将軍郭待封為副以討吐蕃将援吐谷渾還其故地三年正月發梁益等一十八州兵募五千三百人遣大子右衛副率梁積夀為姚州道行軍總管率兵以討叛蠻四年閏五月燕山道總管李謹行破髙麗叛黨於瓠盧河之西髙麗平壤餘衆遁入新羅五年二月遣太子左庻子同中書門下三品劉仁軌為雞林道大總管衛尉卿李弼右領軍大将軍李謹行為副發兵以討新羅時新羅王金法敏既納髙麗叛亡之衆又封百濟故地漸使人守之帝大怒下詔削奪法敏官爵仍以其弟右驍衛員外大将軍臨海郡公金仁問為新羅王時仁問在京師詔令歸國以代其兄仁問行至中路聞新羅降仁問乃還上元二年二月劉仁軌大破新羅之衆於七重城又以靺鞨兵浮海而南畧新羅之南境斬獲甚衆仁軌勒兵而還詔以李謹行為安東鎮撫大使屯兵於新羅之買肖城以經畧之前後三戰新羅皆敗新羅於是遣使入朝伏罪并獻方物前後相屬帝竟許之復其王金法敏官爵三年閏三月吐蕃入冦鄯廓河芳等州詔雒州牧周王顯為洮州道行軍元帥領工部尚書劉審禮等十二總管并州大都督相王輪為凉州道行軍元帥領左衛大将軍契苾何力鴻臚卿蕭嗣業等以討吐蕃二王竟不行調露元年十月單于大都䕶府突厥阿史徳溫傳及奉職二部相率反叛立阿史那泥熟匐為可汗二十四州首領並叛遣單于大都䕶府長史蕭嗣業将軍花大智李景嘉等討之嗣業等為賊所敗令右金吾将軍曹懐舜率兵往恒州守井陘右武衛将軍崔獻往絳州龍門以防禦突厥十一月詔禮部尚書檢校右衛大将軍裴行簡為定襄道行軍大總管率太僕少卿李思文營州都督周道務等部兵十八萬并西軍程務挺東軍李文暕等總三十餘萬以討突厥二年三月裴行儉大破突厥於黒山擒其首領奉職偽可汗泥熟匐為部下所殺傳首来降永隆二年正月突厥冦源慶等州令右衛將軍李知十左威衛将軍王杲分往涇慶二州統兵以防禦又遣禮部尚書裴行儉為定襄道大總管右威衛将軍曹懐舜幽州都督李文暕等為副率兵以討突厥溫傳部落閏七月裴行儉大破突厥史伏念之衆伏念為程務挺急追遂執溫傳来降行儉於是盡平突厥餘黨執伏念溫傳振旅凱旋永淳元年四月以裴行儉為金牙道行軍大總管與将軍閻懐且等三總管兵分道討十姓突厥阿史那車薄行儉未行而卒安西副都䕶王方翼破車薄咽麫西域平二年十一月命右武衛将軍程務挺為單于道安撫大使以招討總管材山賊元珍骨篤禄賀各軍等則天垂拱元年二月阿史徳元珍等冦朔代等州命左玉鈐衛中郎将淳于處平討撃之十一月命天官尚書韋待價為燕然行軍大總管以討吐蕃三年二月突厥骨咄禄及元珍冦昌平殺掠人吏命左鷹揚衛大将軍黒齒嘗之率諸軍討撃之永昌元年五月命文昌左相韋待價為安息道行軍大總管以撃吐蕃天授二年五月命文昌右相岑長倩為武威道行軍大總管討撃吐蕃延載元年十月命容州都督張𤣥遇為桂永等州經畧大使討嶺南反獠證聖元年七月命夏州尚書王孝傑為蕭邊道行軍大總管以討吐蕃萬嵗通天元年五月營州城傍契丹首領松漠都督李盡忠與誠州刺史孫萬榮殺都督趙文翽舉兵反攻䧟營州命左鷹揚衛将軍曹仁師右金吾衛大将軍張𤣥遇左武衛大将軍李多祚司農少卿麻仁節等二十八将討之七月命春官尚書梁王三思為榆關道安撫大使納言姚璹為副以備契丹制契丹首領李盡忠名盡㓕孫萬榮名為萬斬八月張𤣥遇曹仁師麻仁節等與契丹萬斬戰于四硖谷口官軍敗績𤣥遇仁節並為賊所虜又令夏官尚書王孝傑右羽林将軍蘇宏暉領兵七萬以繼之孝傑在陣䧟沒宏暉棄甲宵遁萬斬乗勝率其衆入幽州屠城剽邑殺掠人吏清邉道大總管建安郡王武攸宜遣禆将討之不能尅萬斬俄又引兵南與官軍戰東兵遁總管揚𤣥基率輕騎角其前奚人出兵以掎其後表裏合撃之萬斬大敗獲其别帥何阿小及軍資器械不可勝數萬斬僅以身免又收合餘兵與奚戰奚兵四靣攻之大潰萬斬棄其衆以輕騎數千人東走張九節率數百騎分為三隊設伏邀之萬斬窮蹙乃将家奴輕騎宵遁至潞河東困甚憇於林下解鞍其奴因斬之張九節傳其首于東都懸之四方舘門三年五月命左金吾大将軍河内王懿宗為神兵道總管右肅政御史大夫婁師徳為清邊道副大總管右武威衛将軍沙吒忠義為清邊中道前軍總管率兵二十萬討契丹俄而李盡㓕死聖歴元年八月突厥黙啜率衆襲静難及平狄清夷等軍静難軍使将軍慕容𤣥崱以兵五千人降之賊軍繇是大振俄又進冦媯檀等州命司屬卿髙平王重規為天兵中道大總管右武威衛将軍沙吒忠義為天兵西道前軍總管幽州都督張仁亶為天兵東道總管率兵三十萬以討默啜又令左羽林衛大将軍閻敬容為天兵西道後軍總管統兵一十五萬以為後久視元年閏七月冬令左肅政御史大夫魏元忠充隴右令諸軍州大使以討突厥九月左金吾将軍田揚名左臺殿中侍御史封思業斬吐蕃阿悉吉薄露傳首神都礿薄露将叛也令揚名率兵討之軍至碎葉城薄露夜伏兵於城傍掠官駞馬而去思業率輕騎追撃之翻為所敗俄而揚名與阿史郍斛瑟羅忠節率衆大至薄露據城拒守揚名㧞之積十餘日薄露詐請降思業誘而斬焉遂虜其部落中宗神龍二年十二月突厥默啜冦靈州鳴沙縣進冦原會等州購募能斬獲默啜者封國王授諸衛大将軍賞物二萬叚三年五月以左屯衛大将軍兼檢校雒州長史張仁亶為朔方道大總管以備突厥六月姚嶲道討撃使侍御史唐九徵撃姚州叛蠻破之俘虜三千計遂紀功焉𤣥宗開元二年二月突厥默啜遣其子同俄特勒率衆冦北庭都䕶府右驍衛将軍郭䖍瓘撃敗之斬同俄於城下七月吐蕃冦臨洮軍又進冦蘭州渭州掠羣牧遣左羽林将軍隴右防禦使薛訥率副将杜賔客郭知運王駿安思順禦之十月薛訥破吐蕃於渭州西界武階驛斬首一萬七千級獲馬七萬七千匹羊牛四萬頭三年十月詔曰越嶲之地髳羌犯邊孤我大恩敢為小冦雖螳蜋舉斧自開屠㓕之辰而蜂蠆有毒仍藉討除之勢右騎衛将軍員外置同正員李𤣥通負衛霍之才蘊孫吳之法决勝千里成誦在心通知四夷若指諸掌故能聞敵思勇好謀而成宜於戎瀘䕫巴梁鳯等州羗兵三萬人馬二千匹并舊屯兵士赴州討撃賊縱退散亦須窮其巢穴杜絶飛走使無遺類在此舉焉六年二月大舉蕃漢兵北伐突厥下制曰書稱四征不庭綏厥兆民可以覆昏亂執有罪保大定功利物懲慝故髙陽有九黎之伐大舜有三苖之征欽若聖謀是為殷鑒突厥殺殺名也窮漠餘裔大邦逋誅恃其悍俗未遵朝化比為潜遁幽茫隔閡華壤固聲朔之不被将覊縻以畜之而擾我諸蕃窺我邉境今羣方輯睦重譯會同奉琛執贄者萬數請吏来王者億計咸以為衆之所加各自統領師徒取其仇怨㧞悉蜜右驍衛大将軍金山道總管處木昆執米啜堅昆都督右武衛大将軍骨䔍禄毗伽可汗等弧矢之利所向無前契丹都督左金吾衛大将軍静折軍經畧大使松漠郡王李失活奚都督右金吾衛大将軍保塞軍經畧大使饒樂郡王李大酺等士馬之精何往不尅竝總我雲萃賈勇風馳西從沙磧至子徳建山下東發海浦期乎獨活何上九姓拔曳固都督稽雒郡王左武徳大将軍頡質畧同羅都督右監門衛大将軍毗伽末啜霎都督右驍衛将軍比言僕固都督左驍衛将軍曵勒哥等種分業異效節輸忠梟彼兇魁掃除遺孽竝左犄右角連營合圍故路絶飛走計窮躍噬然我國家以止戈存義釁鼓傷仁方欲先徳後刑有征無戰庻番之請抑而莫從皇天有命将不獲巳突厥殺若迷而知復困即能通革靣虜庭委身魏􅇅解其縛焚其櫬有逄伯之前聞大者王小者侯即田横之故事况黙啜之子右金吾衛大将軍右賢王墨特勒逾輪自㧞于亂頃投于國今不計其先人之僣復加以右賢之寵右威衛将軍左賢王阿史那毗伽特勒左武衛大将軍燕山郡王大㧞石失畢左領軍衛大将軍阿婆啜阿史那褐多右驍衛大将軍賀魯窒合真阿婆囑等或彼貴種應繋人思或彼信臣已歸邦化咸從衆望竝錫尊官隨師以籌謀採狄之情状便立衙帳令居塞垣其首領百姓等有能轉禍為福去逆效順爵賞之科國朝有典且發單于之使諭其觸網之徒優而柔之五申三令儻覆巢未悟沸鼎猶安習苦為甘聞言不信則戈矛所接玉石同焚勉思良圗罔替成命朔方道行軍大總管銀青光禄大夫右散騎常侍攝御史大夫王晙長才多竒大勇不鬪寄用扞城隠若敵國當出閫之寄有辭第之公故可總是中軍以𢎞上畧凡蕃漢三十萬衆並取晙節度大戴禮云王者之征猶時雨也至則人悦之矣俾夫武威外炤仁徳内洽用恢天聲以静邉徼布告遐邇咸使聞知八年九月遣左驍衛郎将攝郎中張越使于靺鞨以奚及契丹背恩義討之也九年四月蘭池州叛胡顯首偽穪葉䕶康待賔安慕容為多覽殺大将軍何黒奴偽将軍石神奴康鐵頭等據長泉縣攻䧟六胡州命兵部尚書王晙發隴右諸軍及河東九姓掩討之殺三萬五千騎擒康待賔送至京師腰斬之五月既誅康待賔下詔曰蘭池胡久從編附皆是淳柔百姓乃同華夏四人康待賔等敢亂天常俱為禍首驅率羣衆嘯聚沙泉使良善失業而兇渠逞志人祗發怒魁首者並自誅夷鋒刄揮芒陣敵者亦聞梟戮元惡既盡餘黨無多本是脅從初非爾罪今乃潜竄湏示其誠朕亭育蒼生皆同赤子每一物之失所寜寸心之得安莫不念切在予情深責已故先之以徳亦寛之以恩乃遣常侍趙元通又命御史大夫韋杭拊以招慰俱不禀承儻滋蔓繁多恐邉甿塗炭非願勒於兵馬蓋湏申於弔伐朔方軍大總管王晙隴右節度使郭知運等䖍奉廟謨恭行天討所有殺戮爰及俘囚或因戰敵相交灼然好惡無辨驚波繇是共溺烈火所以俱焚自孽誰尤欲逃何去已㓕亡者其如咎譴未歸附者是可哀憐或反側懐憂或嫌疑多懼宜開自新之命以矜莫大之罪其胡賊及勾引諸蕃同叛逃在山谷沙藪間疑懼不出者並原其罪宜令夏州都督陽欽明依前處分安慰仍以左監門将軍安慶為副依理宣慰量加招輯各令復業務使安存訖奏聞若不順從猶持向背湏别處分亦具奏来壬申蘭池州叛胡顯首偽稱葉䕶康待賔偽稱葉䕶安慕容以叛勑曰朕臨御寰極思飬黎元一物不安則推溝軫慮萬方未乂則分閫興憂近者蘭池叛胡無端搆孽蠢爾兇醜敢忘恩化再令招諭仍未歸正理絶矜容事資撲㓕既從斯而背徳不獲已而用兵朕今發隴右諸軍馬騎掩其南徵河東九姓馬騎襲其北三城士卒截其後六郡驍雄撃其前四面齊驅萬全直進飛走無路糜爛待斃其蕃漢軍将以下戰士以上若生擒及斬獲康待賔等一人白身授五品先是五品以上授三品如臨陣先鋒能破北胡部落所獲資財口馬牛羊並便入立功人等一切不湏官收仍别加官賞其叛人内有能自殺獲送者應酬官賞亂常之罪一切並原正是忠臣憤激之時北士立功之日恭行天罰允叶人謀摧祜拉朽匪朝伊夕布告軍州咸知朕意十四年二月邕府獠首領梁大海周光等據賔横等州反遣驃騎大将軍兼内侍楊思朂討之十五年正月凉州都督王君㚟大破吐蕃於青海之西虜其輜重及羊馬而還十六年正月秦隴等州獠首領瀧澄州刺史陳行範廣州首領馮仁智何遊反魯叛遣驃騎大将軍楊思朂討之七月制曰昏迷反道天地所以致罰戎狄亂華帝王所以耀武吐蕃小醜頻年犯塞壊我城鎮虜我邉人言念征夫良深憤惋今北軍羽騎萬弩齊發山西飛将百道争先掃蕩之期在於晷刻然賞罰必信懲勸在焉號令不明忠勇何望若廻避縱敵則寘國刑如克儁擒兇湏懸軍格其河西隴右安西劍南等州節度将士以下有能斬獲吐蕃賛普者封異姓王斬獲大将軍者授大将軍獲次以下者節級授将軍中郎将不限白身官資一例酬賞速令布告咸使聞知是月檢校兵部尚書蕭嵩鄯州都督張志亮攻㧞吐蕃城斬獲數千級收其貲畜而還八月蕭嵩遣右金吾将軍杜賔客擊吐蕃戰于祁連城大破之獲其大将一人斬首五千餘級十七年二月嶲州都督張審素攻破蠻㧞昆明城及鹽城殺獲萬人三月𤓰州刺史墨離軍使張守珪沙州刺史賈思順領伊沙等州兵入吐蕃大同軍大破吐蕃駈翦不可勝紀是月禮部尚書信安郡王禕帥衆攻㧞吐蕃石堡城十八年五月契丹衙官突可汗殺其主李召固率部落降于突厥奚部落亦隨而叛奚王李魯蘇来奔召固妻東華公主陳氏及魯蘇妻東光公主韋氏並奔投平盧軍制幽州長史趙含章率兵討之二十年正月以朔方節度等副大使禮部尚書信安郡王禕為河東河北兩道行軍副大總管知節度事率兵討契丹率户部侍郎裴耀卿等諸副将分道綂兵出於范陽之北大破兩蕃之衆擒其酋長餘黨竄入山谷九月渤海靺鞨冦登州殺刺史韋俊命左領軍将軍蓋福順發兵討之二十二年十二月幽州長史張守珪發兵討奚契丹斬其王屈烈及其大臣可突於陣傳首東都餘叛奚皆散走立其酋長李遇折為契丹王二十四年正月北庭都䕶蓋嘉運率兵撃突厥施大破之以其二十三年十月冦北庭及安西撥換城也二十五年二月張守珪破契丹餘衆於㮏禄山殺獲甚衆三月河北節度使崔希逸自凉州南率衆入吐蕃界二千餘里至青海西郎佐素文子觜與賊相遇大破之斬首二千餘級三十六年三月吐蕃冦河西崔希逸撃破之鄯州都督杜希望攻㧞吐蕃新羅城戎軍二十八年三月權判益州長史章仇兼瓊大破吐蕃安戎城分兵鎮守之天寳三載八月㧞悉宻國伐突厥烏蘇米施可汗傳首闕下四載五月朔方節度使王忠嗣上言曰臣聞北方雜虜之中突厥為大其風俗彊悍弧矢利習而諸蠻夷皆出其下所以憑陵河塞歴代患之太原涇陽豈惟前事山東渭上曽是近憂自陛下君臨萬邦無遠不至惟此種落尚懐二心陛下執九有安危之樞制四夷長短之運如垂霈澤則斯與草芥同風若震天威則彼惟魚肉而已故從開元二十九載部落日以擕離可敦西殺并諸侯王貴人以下前後欵塞者殆至萬計其餘復相保聚更立烏蘇米施為可汗陛下又使内史尹招倩等曉以安危俾其内附鬼神所殛米施伏誅去秋又詔臣率驍騎直至薩河内山以問其罪而左廂阿波逹于等一十一部並應時誅擒獨右廂之衆未平今又為九姓所破白眉特勒之首既傳於藁街骨咄禄娑匐可敦又獻於闕下霜刄未交而羣兇盡殪王師未老而大漠将空自先帝擒頡利静北荒以来復見於今日矣伏請頒示天下宣付史舘從之八載六月隴右節度使哥舒翰攻吐蕃石堡城㧞之十載四月劍南節度使鮮于仲通将兵六萬討雲南與其王閣羅鳳戰於瀘州十一載三月朔方節度副使奉信王阿布思與安禄山同討契丹十三載三月北庭都䕶程千里生擒叛虜阿布思獻于勤政樓下斬之于朱雀街阿布思九姓首領也開元初為黙啜所破請降附及開元末北蕃大亂遂與西殺妻子及黙啜之孫勃得支特勒毗伽可汗女伊然可汗小妻登利可汗女及阿布思頓利發等並率其部歸我天寳九載秋朝于京師帝厚禮之美儀貌有材畧代為蕃酋天寳十載范陽節度安禄山承恩阿布思不為之下禄山因請為将共討奚契丹阿布思懼禄山之害己乃率其部以叛帝詔北夷追之布思惶恐因西投葛邏禄葉護葛邏禄懼乃擒以送北庭焉册府元龜卷九百八十六
