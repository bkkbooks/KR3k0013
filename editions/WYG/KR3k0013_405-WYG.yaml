body:
  text: 冊府元龜卷四百五宋王欽若等撰將帥部識略第四後周陸通為太祖夏州帳内督頃之賀拔岳為侯莫陳恱所害時有傳岳軍府已亡散者太祖憂之通以為不然居數日問至果如所䇿自是愈見親禮王羆為驃騎大將軍鎮華州時茹茹渡河南㓂候騎已至幽州朝廷慮其深入乃徵兵發士馬屯守京城塹諸街巷以備侵軼右僕射周專逹召羆議之羆不應命謂其使曰若茹茹至渭北者王羆率鄉里自破之不煩國家兵馬何為天子城中遂作如此驚動繇周家小兒怯懦至此韓果從太祖征討有功累遷都督果有權略兼善伺敵虚實揣知情狀有潜匿溪谷欲為間偵者果登髙望之所疑處往必有獲裴寛為征虜將軍從防主韋法保向潁川觧侯景圍景宻圖南叛軍中頗有知者以其事計未成外示無二往來諸軍間侍從寡少軍中名將必躬自造之至於法保尤被親附寛謂法保曰侯景狡猾不肯入關雖託欵於公恐未必可信若伏兵以斬之亦一時之功也如曰不然湏深加嚴警不得信其誑誘自貽後悔法保納之然不能圖景但自固而已赫連達為雲中刺史大都督儀同三司從大將軍達奚武攻漢中梁宜豐侯蕭循拒守積時後乃送欵武問諸將進止之宜開府賀蘭願徳等以其食盡欲急攻取之達曰不戰而獲誠䇿之上者無容利其子女貪其財帛窮兵極武仁者不為且觀其士馬猶强城池尚固攻之縱克必將彼此俱損如其困獸猶鬬則成敗未可知况行師之道以全軍為上武曰公言是也乃命將帥各申所見於是開府楊寛等並同達議武遂受循䧏師還遷驃騎大將軍保定初遷夏州總官三州五防諸軍事邊境胡民或饋達以羊者達欲招納異類報以繒帛主司請用官物達曰羊入我厨物出官庫是欺上也命取私帛與之郭彦為工部中大夫從尉遲迥攻雒陽逈復令彦與權景宣南出汝頴及軍次豫州彦請攻之景宣以城守既嚴卒難攻取將欲南轅更圖經略彦以奉命出師湏與大軍相接若向江畔立功更非朝廷本意固執不從兼畫攻取之計㑹其刺史王士良妻弟董逺秀宻遣送欵景宣乃從於是引軍圍之士良遂出降李穆為并州都督沙苑之㨗穆言於太祖曰髙歡今日已䘮膽矣請速追之歡可擒也太祖不聽泉仲遵為車騎大將軍荆州刺史時梁司州刺史桞仲禮每為邊㓂太祖令仲遵率鄉兵從開府楊忠討之梁隨郡守桓和拒守不䧏忠謂諸將曰本圖仲禮不在隨郡如即攻守恐引日勞師今若先取仲禮則桓和可不攻自服諸君以為何如仲遵對曰蜂蠆有毒何可輕也若棄和深入遂擒仲禮和之䧏否尚未可知如仲禮未獲和為之援則首尾受敵此危道也若先攻和指麾可克克和而進便無反顧之憂忠從之仲遵以計繇已出乃率先登城遂擒和仍從忠擊仲禮又獲之進驃騎大將軍長孫儉為行臺僕射荆州刺史時梁元帝嗣位於江陵外敦隣睦内懐異計儉宻啟太祖陳攻取之謀於是徵儉入朝問其經略儉對曰今江陵既在江北去我不逺湘東即位已渉三年觀其形勢不欲東下骨肉相殘民厭其毒荆州軍資器械儲積已久若大軍南討必無匱乏之慮且兼弱攻昧武之善經國家既有蜀土若更平江漢撫而安之收其貢賦以供軍國天下不足定也太祖深然之乃謂儉曰如公之言吾取之晚矣令儉還州宻為之備尋令柱國燕公于謹總戎征伐江陵平以儉元謀賞奴婢三百口于翼為大將軍總中外宿衛兵事及晉公䕶誅武帝召翼遣往河東取䕶子中山公訓仍代鎮蒲州翼曰冡宰無君凌上自取誅夷元惡既除餘孽宜殄皆陛下骨肉猶謂踈不間親陛下不使諸王而使臣異姓非直物有横議愚臣亦所未安帝然之乃遣越王盛代翼韋孝寛為驃騎大將軍徐州總管孝寛在邊多載屢抗強敵所有經略布置之初人莫之解見其成事方乃驚服隋侯莫陳頴初仕周為開府儀同三司武帝時與豆盧勣擊龍泉文城叛胡先是稽胡叛亂輙略邊人為奴婢至是詔胡敢有壓匿良人者誅籍没其妻子有人言為胡村所隱匿者勣將誅之頴謂勣曰將在外君命有所不受諸胡固非悉反但相廹脅為亂耳大兵臨之首亂者知懼脇從者思䧏今漸加撫慰自可不戰而定如即誅之轉相驚恐為難不細未若召其渠帥以隱匿者付之令自歸首則羣胡感恩可得矣勣從之諸胡感悅爭來䧏附北土以安王韶初仕周為車騎大將軍轉軍正武帝既拔晉州意欲班師韶諌曰齊失紀綱於兹累世天奬王室一戰而扼其喉加以主昏於上民懼於下取亂侮亡正在今日方欲釋之而去以臣愚固深所未解願陛下圖之帝大恱賜縑一百匹伊婁謙初仕周為車騎大將軍武帝將伐齊引入内殿從容謂曰朕將有事戎馬何者為先謙對曰愚臣不足知大事偽齊僣擅跋扈不恭沉溺倡優躭昏麴蘖其折衝之將斛律眀月已斃讒人之口上下離心道路側目若命六師臣之願也帝大笑因使謙與少司㓂拓拔偉賻齊觀釁宇文忻仕周為驃騎大將軍武帝伐齊攻拔晉州齊後主親馭六軍兵勢甚盛帝憚之欲旋師忻諌曰以陛下之聖武乗敵之荒縱何往不克若使齊人更得令主君臣協力雖湯武之勢未易平也今主暗臣愚兵無鬬志雖百萬之衆實為陛下奉耳帝從之戰遂大克及帝攻陷并州先勝後敗帝為賊所窘左右皆殱帝挺身而遁諸將多勸帝還忻勃然而進曰自陛下克晉州破髙緯乗勝逐北以至於此致令偽主奔波關東響振自古行兵用師未有若斯之盛也昨日破城將士輕敵㣲有不利何足為懐丈夫當死中求生敗中取勝今者破竹其勢已成奈何棄之而去帝納其言遂拔晉陽長孫晟開皇中為左勲衛大將軍持節䕶突厥染干於朔州奏染干部落歸者既衆雖在長城之内猶被雍閭抄掠往來辛苦不得寕居請徙五原以河為固於夏勝兩州之間東西至河南北四百里掘為橫塹令處其内任情放牧免於抄掠人心自安帝並從之復遣還大利安撫新附晟表奏曰夜登城樓望見磧北有赤氣長百餘里皆如雨足下垂被地謹驗兵書此名灑血其下之國必且破亡欲滅匈奴宜在今日詔楊素為行軍元帥晟為受䧏使者送染干北伐二年軍次北河值賊帥思力俟斤等領兵拒戰晟與大將軍梁黙擊走之轉戰六十餘里賊衆多䧏晟又教染干分遣使者往北方鐵勒等部招擕取之三年有鐵勒思結伏利具渾斜薩阿拔僕骨等十餘部盡背達頭請來䧏附達頭衆大潰西奔吐谷渾晟送染干安置於磧右事畢入朝賀婁子幹為上大將軍開皇中吐谷渾㓂邊詔子幹討之髙祖以隴西頻被㓂掠甚患之彼俗不設村塢勅子幹勒民為堡營田積榖以備不虞子幹上書曰比者凶㓂侵􅅰蕩滅之期匪朝伊夕伏願聖慮勿以為懐今臣在此觀機而作不得准詔行事且隴西河右土曠民稀邊境未寕不可廣為田種比見屯田之所獲少費多虚役人功卒逢殘暴屯田疎逺者請皆廢省但隴右之民以畜牧為事若更屯聚民不獲安秪可嚴謹斥堠豈容集人聚畜請要路之所加其防守但使鎮戍連接烽堠相望民雖散居必謂無慮髙祖從之于仲文字次武髙祖為丞相遣仲文為河南道行軍總管馳傳詣雒陽發兵以討檀讓時韋孝寛拒尉遲逈於永橋仲文詣孝寛有所計議時總管宇文忻頗有自疑之心因謂仲文曰公新從京師來觀執政意何如也尉遲迥誠不足平正恐事寧之後更有藏弓之慮仲文懼忻生變因謂之曰丞相寛仁大度眀識有餘茍能竭誠心必無二仲文在京三日頻見三善以此為觀非尋常人也曰三善何為仲文曰有陳萬敵者新從賊中來即令其弟難敵召募鄉曲從軍討賊此其有大度一也上士宋謙奉使勾檢謙縁此别求他罪丞相責之曰入網者自可推何湏别訪以虧大體此其不求人私二也言及仲文妻子未嘗不澘絃此其有仁心三也忻自此遂安來䕶兒為左翊衛大將軍遼東之役率師渡河至卑奢城髙麗舉國來戰䕶兒大破之斬首千餘級將趨平壤髙麗震恐遣使執叛臣斛斯政詣遼東城下上表請䧏煬帝許之遣人持節詔䕶兒旋師䕶兒集衆曰三度出兵未能平賊此還也不可重來今髙麗困弊野無青草以我衆戰不日克之吾欲進兵逕圍平壤取其偽主獻㨗而歸答表請行不肯奉詔長史崔君肅固爭不許䕶兒曰賊勢破矣專以相任自足辯之吾在閫外事合專決豈容千里稟聽成規俄頃之間動失機㑹勞而無功故其宜也吾寕征得髙麗還而獲譴捨此成功所不能矣君肅告衆曰若從元帥違拒詔書必當聞奏皆獲罪也諸將懼盡勸還方始奉詔勑蘇威從征遼東領右禦衛大將軍楊𤣥感之反煬帝引威於帳中懼見於色謂曰此小兒聰眀得不為患邪威曰粗疎非聰眀者必無慮但恐浸成亂階耳勞役不止百姓思亂以㣲辭諷帝帝意竟不悟唐李靖為行軍總管從趙郡王孝恭攻峽州蕭銑銑既䧏諸將咸請孝恭云銑之將帥與官軍拒戰死者罪狀既重請籍沒其家以賞將士靖曰王者之師義存弔伐百姓既受驅逼拒戰豈其所願且犬吠非其主無容同叛逆之科此蒯通所以免大戮於漢祖也今新定荆郢宜宏寛大以慰逺近之心䧏而籍之恐非救焚拯溺之義但恐自此以南城鎮各堅守不下非計之善於是遂止尉遲敬徳武徳末為秦府副䕶軍從平隱太子巢刺王拜右武候大將軍時議者二凶左右百餘人並令籍没唯敬徳固執以為不可繇此獲免契必何力貞觀中為左領軍將軍與薛萬均征吐谷渾萬均先行為賊所攻兄弟皆中搶墮馬徒歩何力將數百騎突圍奮擊繇是獲免何力乃自選驍騎兵三千餘人襲破其牙帳渾主脫身以免俘其妻子還有詔勞軍於大斗拔谷萬均乃誹謗何力何力不勝憤怒挺刅而起欲殺萬均諸將勸止之太宗聞而責問其故何力言萬均敗衂之罪時太宗怒將解其官廻授何力何力固讓曰以臣之故而解萬均恐諸蕃聞之以為陛下厚蕃輕漢轉相誣告馳競必多又夷狄無知或謂漢臣皆如此輩固非安寕之道也太宗乃止後為葱山道總管因至凉州省其母為薛延陀所執太宗許降公主以和何力繇是得還拜右驍衛大将軍太宗既許公主於延陀行有日矣何力抗表固言不可太宗曰吾聞天子無戱言既已許之安可中廢何力曰臣請延緩其事不謂總停臣聞六禮之内婿合親迎宜告延陀親来迎婦縦不敢至京邑即當使詣靈州彼畏漢必不敢來論親未有成日主既憂悶臣又擕離不盈一年自相猜忌延陀志性狠戾若死必兩子相爭坐而制之必然之理太宗従之延陀恐有詐㐲竟不至靈州自後常悒悒不樂志一年而死兩子果爭各立為王劉仁軌為帶方州刺史與熊津道行軍總管孫仁師都督劉仁願大破百濟唯賊帥遲受信據任存城不降先是百濟首領沙吒相如黑齒常之自蘇定方軍廻後鳩集亡散各據險以應福信至是率其衆降仁軌諭以恩信令自領子弟以取任存城又欲分兵助之仁師曰相如等獸心難信若授以甲仗是資㓂兵也仁軌曰吾觀相如常之皆忠勇有謀感激之士従我則成背我則滅因機立效在於此日不須疑也於是給其糧仗分兵隨之遂拔任存城遲受信棄其子走投髙麗於是百濟之餘燼悉平仁軌與仁願振旅而還詔仁軌代仁願率兵鎮守唐休璟為豐州司馬永淳中突厥圍豐州都督崔智辨戰死朝議欲罷豐州徙百姓於靈夏休璟以為不可上書曰豐州控河遏賊實為襟帶自秦漢以来列為郡縣田疇良羙尤宜耕牧隋季䘮亂不能堅守乃遷徙百姓就寧慶二州致使戎羯交侵乃以靈夏為邊界貞觀之末始募人以實之西北一隅方得寧謐今若廢棄則河傍之地復為賊有靈夏等州人不安業非國家之利也朝廷従其言豐州復存垂拱中遷安西副都䕶㑹吐蕃攻破焉耆安息道大總管文昌右相韋待價及副使閻温古失利休璟收其餘衆以安西土遷西州都督上表請復取四鎮則天遣王孝傑破吐蕃抜四鎮以休璟之謀也任雅相為兵部尚書同中書門下三品沮江道大總管雅相前後為將帥未嘗奏親戚故吏為傔従皆移所司補授之謂人曰職無大小皆是公器豈以於身有便而撓王法㢤繇是其下無濫受功賞者時人甚以此稱之崔知温為蘭州刺史為黨項所圍将軍權善才率兵来欲盡坑之以絶後患知温曰殺降不祥但溪谷深邃草木幽蔚萬一變生悔將何及善才然其計分生口五百人以與知温知温曰所論安危之道乃公道也豈圖私利㢤固辭不受黨項繇是悉来歸附張嘉貞為天兵軍使開元六年春入朝俄有吿其在軍奢僣及贓賕者御史大夫王晙因而劾奏之按騐無狀𤣥宗將加吿者反坐之罪嘉貞奏曰昔者天子聴政於上瞍賦矇誦百工諫庶人謗而後天子斟酌焉今反坐此輩是塞言者之路則天下之事無由上達特望免此罪以廣謗誦之道従之遂令减死自是帝以嘉貞為忠李抱真為汾州别駕僕固懐恩反於汾州抱真陷焉乃脫身歸京師代宗以懐恩倚迴紇所将朔方兵又勁憂甚召見抱真問狀因奏曰郭子儀領朔方之衆人多思之懐恩欺其衆曰子儀為朝恩所殺詐而用之今復子儀之位可不戰而克其後懐恩奔遁多如抱真策於是遷殿中少監叚秀實大歴中為涇原節度馬璘行軍司馬璘疾甚不能視事請秀實為節度副使兼左廂兵馬使秀實乃以十將張羽飛為招召將分兵按甲以備非常璘卒而軍中行哭赴䘮事於内李漢恵接賔客於外非其親不居䘮側族談離立者捕而囚之都虞候史廷幹禆將崔珍張景華謀作亂秀實乃送廷幹於京師徙珍及景華外鎮軍中遂定不戮一人薛兼訓大歴中為浙東節度越州刺史兼訓奏曰臣所管義勝軍靜海軍共九千人請留一千人餘八千人並罷遣許之初濵海羣盗乗難而起㑹稽遂加置二軍兼訓以㓂難已平將修撫循之政繇是有斯請也時議美之渾瑊在奉天為行在都虞候時靈武留後杜希全鹽州刺史戴休顔夏州刺史常春合率兵六千赴難將至徳宗召宰相盧杞關播與瑊及白志貞同議來路利害瑊與志貞曰漠谷險隘必為賊所邀若取乾陵北過附栢城而行便取城東北雞子堆下營與城中犄角相應且分賊勢朱泚必不敢更於陵寢往來杞曰漠谷路近若慮逆賊邀擊即此出兵應接取乾陵路過恐驚陵寢瑊曰今朱泚圍城斬伐松栢以夜繼日驚動多矣况又城中事危諸道救兵不至唯希全等率先赴難所繫不輕若此軍得於雞子堆下營固守善地則朱泚可以計破杞曰陛下以順討逆豈同逆賊乎若令希全等此來即是自驚陵寢白志貞後贊其言帝重違之遂命取漠谷路丙子希全等軍至漠谷路果為逆賊邀擊奪據水口乘高以大弩巨石左右夾擊殺傷甚衆馬燧為河南三城使李忠臣為淮西節度使各率所管兵次於鄭州討宣武李靈耀忠臣惶懼退衂鄭州士庶惶駭狼狽竄避皆趍東都城鄭州村落殆空忠臣將迴營之淮西燧固執不可曰仗順討逆自當制勝何憚之有棄此功名也因激勵將士堅壁不動忠臣聞之因整營伍收合散卒信宿之間潰兵悉還軍聲復振燧後為河東節度初田恱新代魏博節度田承嗣統兵恐人不附已詐示誠欵燧上疏眀其必反宜先備之恱果與淄青鎮州通謀初王武俊自魏州還兵雖去偽號而攻逼趙州觀察使康日知窘蹙欲棄趙州徳宗用燧計欲令與昭義軍同擊朱滔以深趙𨽻武俊而改授日知為晉陽節度使日知未受命而二州已䧏又加燧晉磁隰節度燧又復讓二州於日知且言因降而授之恐後有功者踵以為常帝嘉而許之燧乃遣迎日知既至籍府庫而歸之日知喜且過望李晟為神䇿軍行營節度與李懐光同討朱泚懐光與泚通謀晟奏曰懐光反狀已眀緩急宜有備蜀漢之路不可壅也請以禆將趙光銑為洋州刺史唐良臣為利州刺史晟子婿張彧為劍州刺史各將兵五百以防未然徳宗初納之未果行無何吐蕃請以兵佐誅朱泚帝又將幸咸陽總兵以復京師懐光驚駭且疑帝奪其軍謀為亂益急及駕幸梁州變起倉卒百官從駕者什二三駱谷道險阻無供具帝因曰早從李晟言三蜀可坐致也興元元年晟之將復京師也時熒惑守嵗久之方退賔介或勸晟曰今熒惑已退皇家之利也可速出兵晟曰天子外次人臣當死節垂象𤣥逺吾安知天道至是謂叅佐曰前者公勸晟出兵非敢拒也且軍士可用之不可使知之嘗聞五緯盈縮無准懼復來守嵗則我軍不戰而自潰矣叅佐嘆曰非所及也賈耽為滑州節度使貞元八年汴宋節度劉𤣥佐卒其子士寕為衆所署遣使通於王武俊田緒劉濟道出滑州耽以士寕未受詔皆留之不得渡河郝忠節為尉氏領將貞元中宣武軍節度李萬榮疾病署其子迺為兵馬使迺令送大將李湛往尉氏伊婁說往封邱張伾往雍邱尋又令殺湛等其两人皆死使至尉氏忠節曰李湛是大將比日未聞愆過今兵馬使忽使人殺之未敢即奉命待更取尚書處分然後敢殺之是夜將校等逐李迺故湛得免死李夷簡元和中自山南東道節度使移鎮西川先是韋皋作奉聖樂于頔効之作順聖樂相次進獻列於太常及夷簡居二鎮每見其尚奏公庭以為制禮作樂非諸侯事遂皆罷之謂賔從曰所以蓋前人之非為來者之誡時人稱其逹識李愬為閑廐使元和十二年冬討蔡州以愬為隋唐鄧節度唐鄧兵士摧敗之餘氣勢傷沮不敢言戰愬揣知其情乃不肅軍陣不齊部伍偽告軍中曰朝廷以愬柔懦且使撫養爾輩至於戰伐非愬所知士衆皆恱繇是完緝器械隂計戎事烏重𦙍元和末為横海軍節度使上言臣以河朔能抗拒朝命者其大略可見盖由刺史失其權位職分反使鎮將領事若刺史各得其職分又有鎮兵則節度使雖有安禄山史思眀之姦惡豈能據一州而反㢤所以河朔六十年能不奉朝命者祇以奪刺史與縣令之守而自作威福臣所管徳棣景三州已舉公牒各還刺史職事應在州兵並令刺史收管從之孔戣元和末為嶺南節度使以清静撫俗属容帥楊旻桂仲武裴行立但欲生事夷獠以邀爵賞戣恬然鎮定不從其言旻等皆慙而止裴玢貞元中為鄜坊都虞侯節度使王栖曜卒中軍將何朝宗謀作亂中夜縱火玢不救火遲眀而擒朝宗發三司使按問竟斬朝宗裴度為淮南節度使與宰臣王播等閣中奏對穆宗謂度曰劉悟拘囚監軍劉承偕如何處置度辭以藩臣不合議軍事帝固問之且曰劉悟負我我授以僕射近又賜絹五萬疋不念恩寵致使三軍欲索承偕殺之朕難處此事卿等以為何如度奏曰劉承偕在昭義恃寵驕縱臣盡知之劉悟在行營亦嘗有書訴於臣當時中使趙𢎞亮在臣行營具見仍把劉悟書將去云欲自奏不知奏否帝云我不曽見且劉悟當時何不宻將表來我與處置度曰悟武臣不知大體然臣竊以為劉悟縱有宻狀陛下必不然處置且今日事跡如此臣等面論陛下猶未能决豈有當時事未發眀陛下肯為處置帝曰此事且休直言今日如何處置度曰陛下必欲收忠義之心使天下戎臣為陛下死節唯有下半紙詔書以任使不眀致令承偕悖亂至此是我之過三軍何辜令劉悟集三軍斬承偕則萬方畢命羣盗破膽天下更無事矣不如此雖與劉悟改官及賜物百萬亦無益帝俛首良久乃曰承偕朕不惜祗縁是太后養子今被囚拘猶未敢令太后知如此處置不得卿等更商量遂與王播同奏請配流逺處則必可出帝許之與劉悟詔責承偕令示三軍悟得詔月餘始放承偕歸帝始嗣位承偕頗恃勲寵度抗請加罪時以為難李質長慶初為汴州都將時李㝏逐節度使李愿自為留後質與監軍姚文壽同斬㝏傳首京師而節度使韓充未至質權領軍汴州先有牙兵二千人皆日給饔餼物力為之損耗充將至質曰若韓公始至頓除二千人食物情必大去若不除之必無以繼其食不可留難處之事以遺吾帥遂悉停日膳而後迎充韓充長慶初為宣武節度使初李愿為其下所逐立都將李㝏為留後充入汴州既安堵宻籍部伍間得嘗搆惡者千餘人一日下令并父母妻子立出之敢逡廵境内者斬自是軍政大理汴人無不愛戴充雖内外皆將家素不事豪侈常以簡約自持臨事又頗能决進取亦可謂有識略矣李光顔為忠武軍節度使長慶二年討王庭凑命光顔兼深州行營諸軍節度使光顔既受命而懸軍討賊艱於饋運朝廷又以滄景徳棣等俾之兼管以其隣賊之郡可便飛輓光顔以朝廷制置乖方賊帥連結未可朝夕平定事若差跌即前功悉棄乃懇辭兼鎮尋以疾作表祈歸鎮朝廷果討賊無功而赦廷凑王智興初為徐州禆將青州李師道拒命智興領偏師破賊姚海等三萬衆獲美妾一人殺以徇曰軍中有女子安得不敗遂連破賊軍李載義為河南節度使時回鶻每遣使入朝所至強暴邊城長吏多務茍安不敢制之以法但嚴兵防守虜益驕悍或突入市肆暴橫無所憚至是有回紇將軍李暢者曉習中國事知不能以法制馭益加驕恣鞭撻驛吏貪求無已載義因召李暢與語曰可汗使將軍朝貢以固舅甥之好不當使將軍暴殘中華今朝廷饔餼至厚所以禮蕃客也茍有不至吏當坐死若將軍之部伍不戢凌侮上國剽掠廬舍載義必殺為盗者將軍勿以法令可輕而不戒勵之遂罷防守之兵而使两卒司其門虜知其心為下無敢犯令李聽為滑州節度使王庭凑復違朝㫖再命聽以全師屯貝州路繇魏城史憲誠懼其襲已裹甲郊迎候吏宻以告聽乃命兵士匣刅櫜弓休於野次魏人遂安後唐蓋寓武皇禆將封成陽郡公寓性多智數武皇性嚴急左右難事無委遇者小有違忤即寘於法唯寓承顔希㫖窺其趣向婉辭順意以盡叅禆武皇或暴怒將吏事將不測寓欲救止必佯佐其怒以責之武皇怡然釋之有所諌諍必徵近事以為喻自武皇鎮撫太原最推親信中外將吏無不景附李存進為振武軍節度使天祐十六年梁軍據上流夾河而軍建浮梁以濟兵王師日以船渡緩急難進存進率意欲為浮梁將吏曰浮梁須竹笮大編河朔無之難以卒成存進曰吾成筭在心必有所立乃織葦為笮維大艦數十艘岸立巨木築土為山以笮縈之初軍人以為戯不踰月橋成制度條直風波凌澌不能壊衆皆服其勤智霍彦威為平盧節度使天成末上言中山作叛故是小瑕不足有煩聖慮請北靣不在急攻破之非久眀宗然之康義誠為侍衛親軍都指揮使河陽節度使時契丹直初自夏州軍旋詔令與虜使相見義誠奏曰戎虜狡惡不可以信待之邊人陷虜者數萬朝廷差使虜廷不曽得見一人奈何令此輩交語無益於事乃止王晏球為宋州節度使天成二年授北靣行營副招討以兵戎滿城是嵗王都據定州叛命晏球攻之晏球圍城既久帝遣使督攻城晏球曰賊壘堅峻但食三州租稅撫恤黎民愛養軍士彼自當魚潰帝然其言晏球能與將士同其甘苦所得賜禄私財盡以饗士日具飲饌與將校筵宴待軍士有禮軍中無不敬服其年冬平賊自初至於城拔不戮一士上下歡心物議以為有將帥之略以功授天平軍節度使晉張希崇先陷虜授元帥府判官後遷盧龍軍行軍司馬繼改蕃漢部提舉使天成初為平州節度使盧文進南歸契丹以希崇繼其任遣腹心總虜騎三百以監之希崇莅事數嵗虜主漸加寵信一日登樓私自計曰昔班仲叔西戍不敢擅以承詔故也我今入關斷在胸臆何恬恬於不測之虜而自滯耶乃召漢人部曲之翹楚者謂曰我陷身此地飲酪被毛生不見其所親死為窮荒之鬼南望山川度日如嵗爾輩得無思鄉者乎部曲皆泣下沾襟且曰眀公欲全部曲南去善則善矣如虜衆何希崇曰候眀日首領至牙帳則先擒之虜無統攝其黨必散且平州去虜帳千餘里待報至徵兵踰旬方及此則我等已入清界深矣何用以小衆為病衆大喜是日希崇於郡齋之側坎隟地貯以石灰眀旦首領與羣從至希崇飲以醇酧數鍾既醉悉投於灰穽中斃焉其徒營於北郭遣人攻之皆潰圍奔去希崇遂以管内生口二萬餘南歸唐眀宗嘉之授汝州防禦使髙行周仕晉為侍衛親軍都指揮使鄆州節度使李彦韜為侍衛都虞候可否在已晉王莫不聼從行周雖典禁兵心逰事外退朝歸第門宇蕭然賔友過從但引滿而已屢求還鎮初未允從後彦韜馮玉委用轉深欲擅權勢故許行周歸籓冊府元龜卷四百五
