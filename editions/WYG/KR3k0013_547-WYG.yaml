body:
  text: 册府元龜卷五百四十七宋王欽若等撰諫諍部直諫第十四唐張仲方為右諫議大夫敬宗即位詔淮南節度使王播造上已競渡船三十隻播輦船材於京師造作計用半年轉運之費方成仲方詣延英面論言甚懇激帝只令造十隻以進帝又欲幸華清宫仲方諌曰萬乗所幸出須備儀無宜輕行以失威重帝雖不從慰勞之崔元亮為左散騎常侍文宗太和五年二月晦神策中尉王守澄奏得本軍衞前虞侯豆盧著狀告宋申錫與十六宅漳王謀反又差人於申錫宅十六宅及市肆追捕胥吏以成其獄三月辛丑勑旨令詔師保僕射尚書丞郎常侍給事諫議舍人御史中丞京兆尹大理卿同於中書及集賢院雜驗北軍豆盧著所告宋申錫反狀翌日壬寅國忌宰相復入中書便赴延英召對應昨日議事官上並召入親自詢訪兩省諫官自常侍以下至午時復於延英請對帝即時召入元亮與給事中李固言諫議大夫王質補闕盧鈞之舒元褒羅泰蔣係裴休竇宗直韋温拾遺李羣韋端符丁居誨袁都等一十四人皆伏於堦下請北軍所告下於中鞫文宗曰吾已謀於公卿大僚訖卿等且出元亮固言援引古今辭理懇切𤣥亮涕泣久之上意稍解乃曰今即與宰相商議元亮等既退於是復召宰相入議申錫遂免死貶開州元亮為右散騎常侍太和中宰相宋申錫為鄭注所搆獄自内起京師震懼元亮首率諫官詣延英請對於帝往復數百言帝初不省其諫欲寘申錫於法亮泣奏曰孟軻有言衆人曰殺之未可也卿大夫皆曰殺之未可也天下皆曰殺之然後殺之方寘於法今至聖之人殺一凡庶尚須合於典法况無辜殺一宰相乎臣為陛下惜天下法寔不為宋申錫言俯伏嗚咽帝為感寤元亮繇此名重朝廷以疾求為外任宰相以宏農遂其所請及卒中外嘆息王質為諫議大夫太和中王守澄搆陷宰相宋申錫文宗怒欲加極法質與常侍崔元亮雨泣切諫請付外推申錫方從輕典質為中人側目執政出為虢州刺史蔣係為補闕太和五年七月富平縣有賊李材以名𨽻右神策軍家冨強横因事強搆鄉人斫及墓松柏射殺之法寺斷以殺人論文宗以中人所庇特原其死付京兆府决脊杖二十流靈州於是係等上疏切諫以李材所坐合處死疏寢不報監决御史栁仲郢奏伏以聖王作憲殺人有必死之令聖帝在上當官無壞法之臣今李材犯殺人之科愚臣備監法之任此賊不死是亂典章臣雖甚微豈敢曠職其李材未敢行决奉勑並准今年五月二十日勑處分監决御史蕭傑又上表論李材合死尋有勑下京兆府行决杖流不必御史監决其李材竟以不死論魏謩為右拾遺太和中前邕管經畧使董昌齡枉殺錄事叅軍衡方厚坐貶叙州司戸至是量移硤州刺史謩上疏論之曰王者施渙汗之恩以赦有罪唯故意殺人無赦昌齡比者録以微效授之方隅不能祗慎寵光恣其枉暴無事専殺事跡顯彰妻孥衘寃萬里披訪及按鞫伏罪貸以微生中外議論以為屈法今若授之牧守以理疲人則殺人拔擢而寃苦者何伸交紊憲章有乖至理疏奏乃改為洪州别駕教坊副使雲朝霞善吹笛新聲變律深愜上旨自左驍衞將軍宣受兼楊府司馬宰臣奏楊府司馬品髙郎官刺史迭處不可授伶官帝意欲授之因宰相對亟稱朝霞之善謩聞之累疏陳論乃改授潤州司馬開成初文宗命於右軍宣取李孝本女子二人入内孝本皇族為御史中丞以罪受誅帝知之取置左右謩上疏諫曰臣聞治國成家者必資於徳義徳義不脩則國家必壊故王者以徳服人以義使人服使之術其在脩身脩身之道在於孜孜夫一失百虧之戒存乎乆要之源故前王遺言曰勿以小惡而為之勿以小善而不為斯則懼於漸也臣又聞君如日焉顯晦之微人皆所仰照臨之大何以掩藏是以前哲設敢諫之皷立誹謗之木貴日新其徳日聞其過也陛下自即位以來誕敷文徳不悦聲色出後宫之怨婦匹在外之鰥夫洎今十年絶其採納大雅既作淫風不行則上超三皇次出五帝凡百相賀前王比隆斯實天下之幸甚也臣竊觀近自一兩月已來天睠稍迴留神妓樂至於教坊百人二百人選試未已莊宅司收市亹亹有聞昨又宣取李孝本次女一人遽將入内宗姓不異寵幸何名如此之事皆不益慎修有虧一簣臣竊惟陛下九重之内不得聞之凡此之流大生物論實將乖道理之本徒取塵穢之嫌夫欲人不知不若不為諺曰止寒莫若重裘止謗莫如自脩者也伏惟陛下照鑒不惑稍抑將來絶其漸門使無怨欲崇千載之盛徳去一旦之翫好教坊停息宗女遣還則大正人倫之風深𢎞王者之體昔漢光武坐側設列女屏風時宋宏正色諫曰未有好徳如好色者光武因為徹之謂宏曰聞義有改可乎𢎞曰陛下進徳臣不勝其喜前史以為美言今陛下奈何不思宋𢎞之諫而欲居光武之下乎臣竊不願也職當規諫敢盡血誠伏地叩頭昧死陳達疏奏上遂出孝本之女髙元裕為御史中丞時開成四年左神策軍䕶軍中尉仇士良奏得百姓趙倫狀告造妖賊賀蘭進興并徒黨五十九人妄説禍福附㑹䜟書欲謀大逆軍司追捕推勘各得狀欵文宗慮寃濫召於宣和殿親自鞫問然付軍司令於東市狗脊嶺集衆斬决元裕上疏其畧曰伏以左神策軍所推妖囚訪聞其徒結黨聚衆恣為兇狡合就嚴刑臣亦料軍中推窮必得情實然獄宜公共刑貴正名今刑部大理皆是陛下掌獄之官都不闗知便成其獄三尺之法無所憑依伏乞以元惡三人付大理寺重加覆問若無同異便正刑書則凡在中外皆知事歸有司不廢彛典彰陛下慎刑之意快兆人共棄之心臣忝風憲得議刑政事闗國體不敢不論疏入未報起居舍人魏謩上疏曰臣伏聞傳説官中捕捉造妖徒黨在外人情洶洶深所不安恐涉詿誤之嫌或緣愛憎而起况事出軍鎮未經臺府咸懐斯懼逓不保生滋蔓儻深為患不小今切在早去枝葉不遺蔓延嗚呼如事繫軍人即委軍中推勘如名該百姓宜從府縣鞫尋冀各盡情免稱寃死臣伏以當今聖代不宜有陷平人如罪狀昭然始可從法其間輕重須有等差臣竊知陛下近對法官必將訪獄臣伏想此際官吏豈能直言如能直即皆戴胄之守職也且獄不在有司推劾法官亦焉得細知伏以陛下愛育生靈不欲一物失所此則事闗刑戮不可輕易處置臣深慮旦夕詔下忽有寃人既當發生之時切要審令詳覆成陛下好生之徳契前哲恤刑之心伏請重勅法司再令疏理豈惟全其大體兾不紊於刑章疏奏上遽降中使宣令且停斬决詔軍司所推鞫妖賊賀蘭進興等五十九人昨令宰司詳覆推狀欵驗節目並無參差緣是妖逆之徒不同尋常刑獄便令裁斷兾免停留今髙元裕及魏謩等論奏請付法司覆問重慎刑辟與衆棄之斯亦舊章雅當依允其妖賊徒黨除白身及官健四人依前軍中及狀内推勘餘竝宜付御史臺重覆限三日内聞奏翌日臺司奏差侍御史王初重覆與軍中所申無差遂依前勑處置先是藍田縣百姓賀蘭進興聚集鄉村百姓為念佛㑹因之妄有妖語軍鎮捕捉横及無辜以要財賄貧者多至自誣及付臺之後皆望有所申明然而推官怯懾迎風聽從不敢異同其事人皆惜之韋力仁為諫議大夫開成三年閣内奏曰臣伏見軍家捉錢事侵府縣軍司與府縣各有區别今富商大賈名𨽻軍司着一紫衫府縣莫制當陛下至聖至明之時固不宜有此禁軍司陛下衞士警夜巡晝以備不虞不合攪擾百姓以干法理伏乞陛下戒勑統帥令各歸其分則人情獲安天下幸甚帝問宰臣等奏曰凡論事須當力仁所言乃欲生事帝曰葢論名分耳李珏曰軍家所出牓是自捉軍人百姓即府縣自捉此無乖名分止當廷論此亦似近名然諫官論事不合恠之劉蜕咸通四年為左拾遺時有詔以長安縣尉集賢校理令狐滈為左拾遺蜕進疏曰臣伏見新除左拾遺令狐滈大中之時其父執政傳家乏子弟之法布衣干公相之權瘡痏者莫匪浮憎進拔者悉皆有謂凡四方節鎮價同交闗三署官司精専與奪潛行遊宴頗雜倡優鼓扇輕浮以為朋黨籌謀日夜聚蚊如雷變化施張赤地成海天下側足有識寒心竊以官列諫垣號為供奉縱遣人同刻鵠然則職貴存羊夫陷父之義居家不為孝子事君之後見利豈為忠臣伏惟陛下敦崇教化懲艾澆漓凡曰名器不當猥濫事之可惜體難盡言臣於滈家本無嫌釁於陛下則是職司謀其身則身輕舉其職則職重不然臣何故結寃權豪之族輕踐危亡之機白日所臨赤誠可見况物如脂膩近則汚人官若薫蕕固難同器誓以愚見義不比肩干冐聖聰乞迴成命起居郎張雲奏疏曰臣伏見今月十五日勑除長安縣尉集賢校理令狐滈充左拾遺者滈頃藉父威不脩子道干權黷貨有口皆知據其輿論之所咨嗟宜為霜憲之所破碎豈可令捧近日月飛翔雲天此則有罪而反榮是乃無辜而可警也伏惟陛下以獻文繼代孝徳承祧臨天下以至明示天下以至信有善必勸有惡必懲分别昭彰使人不惑也今滈為諫官是惡人得位善人必疑矣陛下何以執信行令使萬方從化乎滈麻衣如雪干弄朱先穿緣穴䑕之墉以欺其父出入吞舟之網不畏於人至於朝廷命官公然記託不封殿最無取賢愚但擁富貲即為髙第遂使堯官三載黜陟有繫於金錢孔教四科取舍或繇於聲色且令狐綯進用李琢首亂南方贓罪流聞逺近昭著使天下兵戈徵歛未有巳時而安南舉城化為凝血矣陛下每臨朝聽政語及安南事或至掩泣未嘗離心上欲收復土疆次欲誡勵臣下琢頃以典郡贓穢廷臣曽有論封令狐綯比竟用之由滈有納賄故也李琢之罪既正刑書則舉以致戎是誰之過此乃目前可驗天下皆知臣豈苟緣愛憎妄有論列滈為人子陷父為惡豈堪鳴玉曵組為陛下諫臣乎陛下必有欲推寧僣之恩以寵於滈豈不念南方赤子流離死亡豈不念州郡徵歛生人受弊豈不念蔡襲酷没豈不念國計空虚凡此數條盡滈之繇也臣頃事先朝任太常博士以滈専恣威福勢傾朝廷大中十三年五月二十三日已進宻疏直啓九重先帝且務苞含微臣亦蒙全宥幸得腰領獲事聖朝臣今若顧惜微軀寢而不奏是臣不以事先帝之心事陛下也生則罪重死有餘辜但獲上聞聖聰一悟睿旨雖當鼎鑊亦所甘心伏望改授滈一官以息羣議疏奏不報雲又上疏曰臣日昨以令狐滈負議聖明脱身疎網因緣僭祿抗奏上論伏自疏奏以來二十餘日未奉明詔異議喧然臣孤立自持當此大位忽異恐事生不測先及臣身則一去帝城千里吞恨將求拜疏何畧聞知臣今再上聞者但以勢不可黙也滈之取錢豈令臣見臣只以貪僭之譽布在人間唯受傳聞即有論列先朝獻疏已具指陳還緣此子竊父威權為過不少而外人言論上聞於天所以先帝不加責於微臣以言之無罪不然令狐滈外倚家門之權内連鄭顥之寵臣尋粉碎於先朝矣今日豈得全生更為陛下明言乎令狐綯為先帝權柄大臣獨擅恩澤職當調䕶國本訏謨皇家陛下序屬天宗躬為長子先帝親觀齒讓目覩温文大中十年十月八日勑右諫議大夫豆盧籍刑部郎中李鄴並以本官充䕫王已下侍讀此令狐綯交連帝戚位冠鼎臣端坐中書作何行李陛下受天昭命羣臣定策宫禁之事則臣不知但欲册䕫王便可知綯臣節况濫舉李琢致其毒流生人使先帝貽厥之謀不及陛下好生之徳未免憂勤綯只合辭榮乞骸席藁請罰何顔更令不孝之子濫求官榮事體既乖人情實憤李琢本無吏道唯有貪名滈既身挫人言琢官實繇賄得綯拔自羣小分符交州琢果大肆兇殘處置杜存誠父子取怨溪洞闔境亂離其坐罪貶官綯猶専為掩覆依前要用更與壽州蕭倣駮議既行李琢罪狀轉驗琢不自澄省指斥王廷按獄司窮重重貶削分務未乆又除宋州直至綯罷相權琢始廢居東格無私宰物當如是乎若令狐綯以琢一時敏辨似有公才用琢如或不知在綯未為有過豈李琢前僭未塞後惡乃彰知是罪人横身庇䕶則綯之舉吏自與心違滈之取錢何須眼見衆口紛紜號為白衣宰相朝廷設進士之科本求才彦鎮其浮濫屬自宰臣陛下御極之初大臣儀刑百辟豈為綯言出鎮滈便策名放牓宣麻相去二十三日綯既公然進狀請試春官滈則元在京都不經舉進明言拔解傍若無人滈為宰臣之子不患無位且合簡身慎行以成父業有何急切如此攫挐使天下孤寒人人怨嘆謂之無解及第實則有耳未聞不懼人言一至於此臣若悉書滈過方罄南山之竹恐未盡也臣家唯有童稚更無兄弟自傷側足單居但思引領獲罪令狐綯身榮上相位冠通侯十年桃李之陰兩葉公台之貴煦能生物怒可移山臣子豈無常人之情有何苦切頻將單脆微蔑之身與強家立怨立敵自取傾危也直以曾將滈事上聞先朝滈出網羅偶逋清憲更欲玷黷皇化參侍玉墀人懐怒心而敢指斥是欲以大中威福復行之於舜日也獨臣將經是事豈得逡巡止可碎身權豪之門不可負陛下設官分職况綯有粃政亦何阻直言以其前章猶未明切聞滈黨欲謀害臣恐不及繼言便至貶降臣又思令狐綯負先帝之事陛下不知誤我聖明繇臣恇怯今再得指陳滈事啟達聰明臣於妻子官業已無愛惜矣用捨之宜一俟聖裁後唐趙都為左拾遺同光二年二月上疏云無以有威以自大無以足兵以自安無以竒技悦情無以淫聲惑志非社稷之功乞不加於厚賞非股肱之力乞不近於凝旒審内帑之豐虗削無名之經費左右處卑者乞見之有節伶倫濫吹者乞减於盈庭至於畋遊馳騁之娯蹴踘飛馳之樂伏乞寶於大位戒以奔車疏奏不報薛昭文為右諫議大夫同光二年五月上疏陳十事曰臣聞夏徳未衰未顯中興之運漢儀重覩果成反正之功稽其上代帝王前朝基業未有不中罹屯否間有凶災是資明聖之謀更廓靈長之祚伏惟昭文睿武王徳光孝皇帝陛下繼漢大寶繕禹鴻名興牧野之師功如破竹拔朝歌之壘疾若建瓴俄平國家之讐大刷人祇之憤皇威逺振睿徳遐敷自陛下應天順人奄有諸夏九州欣戴萬國樂推既混一於車書方大定於區宇藩服靡不入貢戎夷靡不來庭鋭旅雄師無敵於當代謀臣勇將有備於中原然則尚有兇悖之徒竊據於屏翰愚迷之軰憑恃於江山雖聞向化歸朝猶敢改元僭號在陛下武功天縱百越不得不臣在陛下文徳日新三苗不慮不格夫人乃邦之本兵者國之器要在安其人而固其本訓其兵而利其器國富兵強家給人足臣有管窺十條謹録奏聞伏乞俯迴聖覽其一曰陛下復聖唐之運祚雪先帝之讐仇戎狄尚解懐柔藩服豈敢拒命而今數處僭偽之地尚未悛心料此兇狂必自覆滅臣請陛下明宣睿筭大振天威秣馬耀兵亦不指名去處且為討逆伐叛之計則狡妄之軰饕餮之徒聞我大國萬旅雲屯六軍雷動如此昬迷之黨不俟赫斯之怒經畧之謀彼必歛袵而朝望風而潰自願納欵歸國矣斯必有征無戰之道也其二曰臣伏見隨駕兵士乆經戰伐咸著勤勞皆忠勇以難儔尚貧乏而未濟雖陛下告成郊丘之後大行賞給之恩然而或未優豐尚多覬望非不知國力尚闕天府未充臣又聞自古皇王建基業撫軍戎未有不損玉帛輕財寶以餌於戰陣之士是故先代撥亂之君以此皆留意也今以諸道上供錢物進納不時遂致朝廷薄於犒散稍為經度以濟急須近者藩臣貢奉慶賀財帛及南郊或有經費羡有物色等伏請且據帑藏更加頒賚先隨駕兵師宴犒代潞州將健也其三曰臣竊見河南兵不少亦是先在偽廷備經訓練頗聞精鋭皆堪征伐自陛下平定汴州以來尋曽選揀或聞諸道分臂之時未堪精細或有勇悍者放歸田里或有懦弱者留在軍都當差發征行則逃避諸處以此散失其數實繁請宣示租庸司先管兵帳所司子細磨勘向來所係數額多少兼取近年諸道所申逃背名帳較量比舊額少剰即知元數减耗臣聞夫軍伍者以豐財為務以重賞為先其河南道先管兵士伏慮三數處僣號不臣之地以厚利誘之嵗月滋深耗蠧必甚請陛下詔勑令在京及諸道常加㸃齪安撫兼勤給其衣糧務令得所仍乞嚴勑邊界要害津鎮寅夜鈐轄無令透漏兼先有放歸農畆者亦諸指揮州縣鎮浦㸃簡姓名常知所在或緩急追呼稍有前却者請罪本處軍吏節級等庶耕耨不隳征伐有備儻陛下納臣所奏則不臣之人知國家訓戎講武繕甲治兵彼之兇徒必懐懾懼則旦夕相率有臣事本朝之計脱使賞給不充撫養不至非唯士卒生刧掠之心抑以部伍有遁逃之者必慮夫多投逆臣之境更資悖慢之性也其四曰臣竊見諸道百姓皆陛下赤子爰自比年以偽廷徭役頻仍租賦繁重饋輓不已疲弊益深既不聊生率多逋竄雖有徳音軫恤未聞時降招擕亦請宣取租庸司應河南先在偽廷戸口文帳磨勘從前多少數目兼勘諸道所申近年見管及流亡戸口即知人物増减此則慮僭偽之處多方招誘伏乞特降優詔委所在觀察使刺史官吏已下設法撫綏事件無損於官有益於人者仰二縣條貫申奏仍請下中書量其利便竝許施行本分税租稍令假借諸雜科徭特與减等以表撫俗安民興邦固本之道也其五曰本朝至徳年平禄山之後復京雒之初兵革之餘生聚凋瘵屢降恩詔撫恤生靈仍遣使臣訪問閭里今陛下嗣守鴻業光啓雄圗故事前規可得敬而行之伏請每年准舊事出郎官御史忠良廉潔明幹堪充使者令散徃諸道採訪賢良撫問疾苦務安兆庶以拯疲民也其六曰竊以偽廷僭號俄逾一紀連年徵剥繁日科徭士不聊生人不堪命生聚塗炭户口流亡河南之民皆企踵側身日望陛下復我唐之鴻基慰兆民之疾痛今陛下弔民伐罪新有中原所宜减省斧斤未欲増脩宫室昔漢文帝將起露臺計百金之費且曰百金中人十家之産吾有先人宫室何事臺為遂罷天下聞之萬古稱漢文之儉徳也臣竊以陛下以慈愛為心以孝理為念聖徳日新又何譲於漢文矣伏惟陛下慕唐堯土階之事善夏禹卑宫之規停土木之工止營搆之役斯則區下欣悦億兆歌謡自然平揖唐堯漢文之至化也其七曰臣聞漢祖初入咸陽令蕭何收秦之圗籍及髙祖神堯皇帝平定闗中亦允收隋室羣書仍聞嵗降使天下捜訪其後盈溢於石渠東觀充滿於秘閣蘭臺以是兩漢之詩書之盛與三代同風也自貞觀開元之後文物煥然何止同風可謂超冠於三代也今陛下嗣周景祚紹禹靈圗睿藻日新盛文天授崇文允武咸五登三將浹偃戢之規在廣訪捜之道伏請降使采訪天下圗書以示武王偃武虞舜舞干致太平之永逺也其八曰臣聞惟王建國辨方正位况河雒之名都帝王之二宅為萬國輻凑之地乃四方表則之邦若不廣闢康莊何以壯觀輦轂自喪亂已來兵火之後九衢荒廢但長荆榛廣陌蕭條唯滋蔓草今陛下富有四海作宅神都當六龍遊豫之時是萬方朝聘之日雒陽大道所宜法於前規鼎邑長衢豈可隳於舊制其都城六街請下河南府及左右金吾仗仍舊依古制分擘廣狹步數不得縱任居人侵占俾朝㑹之地免有湫隘之弊也其九曰臣伏見諸司行事官或歴任分明選限尚逺或出身欠少入任無門聞陛下應千年之運建一統之功謂聖日照臨幽顯不陋皆辭親裹足迢逓而來兾郊禋之時希求恩澤今所司磨勘駮放十分去其九分訪問駐京日多客舍窮悴其見在未出京者伏乞降宣旨稍賜慰安或有粗堪任使者即乞委銓司量才注擬不堪收擢者亦聊錫資財以濟歸路所以閔職勞而示君徳也其十曰諸戎牧馬務履踐京畿百姓苗稼請於隙地置牧塲伏惟陛下察臣愚衷納臣短見俾令遐邇知大君撥亂之功是使黔黎荷聖王無私之徳也疏奏不報蕭頃為右補闕時國步艱難連帥倨強年多奏請欲立家廟於本鎮頃上章論奏乃止張憲為東京副留守同光三年春莊宗幸鄴時易定王都來朝宴於行宫將擊踘初莊宗行即位之禮卜踘埸吉因築壇於其間至是詔毁之憲奏曰即位壇是陛下際接天神受命之所自風燥雨濡之外不可輒毁亦不可脩魏繁陽之壇漢汜水之墠到今猶有兆象存而不毁古之道也即命治之於宫西數日未成㑹憲以公事獲謫竟毁即位壇駱鵬舉為度支員外郎同光四年上疏請節聲樂薄滋味崇儉約斷形勢影庇富戸納倉儲去加耗每嵗青苗鹽鐵雜税等錢不紐配條錢陌無闕召人耕曠土免三年地租使觀風察俗勑旨以斷形勢影庇納倉租物加耗等從之李詳為左補闕長興二年十月上疏曰臣聞天地之道以簡易示人鬼神之情以禍福為務王者祥瑞至而不喜災異見而輒驚罔不寅畏上𤣥思荅譴告臣聞北京地震日數稍多臣曽覽國書伏見髙宗時晉州地震上謂羣臣曰朕政教不明使晉州屢有震動耶侍中張行成對曰天陽也地陰也陽君象陰臣象君宜動轉臣宜安靜今晉州地震彌旬不休將恐女謁使事臣下陰謀且晉州陛下本封今地震焉尤彰其應伏願深思逺慮以杜未萌又開元中泰州地震尋差官宣慰又降使致祭山川所損之家委隨事制宜奏聞伏惟陛下中興唐祚起自晉陽地數震於帝鄉理合思於天誡臣伏思陛下統臨萬國於今六年猛將如雲鋭師如虎出無不㨗叛無不擒嵗稔時豐人安物阜實應天意恐陛下忘創業艱難之時有功成矜滿之意欲陛下有始有卒於兢兢業業也今伏望聖慈特委親信兼選勲賢且往北京慰安宻令巡察問疾苦於黎庶俾議蠲除備祭祀於山川各加䖍禱然後乞陛下鑒前朝得喪之本採歴代聖哲之規近君子而逺小人任賢無貳杜邇言而求讜議擇善而從崇不諱之風罷不急之務則景公脩徳熒惑退舍以為祥太戊小心桑穀生朝而不害自然妖不勝徳所謂𢎞之在人寰瀛永之於無疆遐邇長歸於有道帝甚嘉之康澄為大理少卿長興三年上疏曰臣聞安危得失治亂興亡誠不繫於天時固匪繇於地利童謠非禍福之本妖祥豈隆替之源故雊雉昇鼎而桑穀生朝不能止殷宗之盛神馬長嘶而玉龜告兆不能延晉祚之長是知國家有不足懼者五有深可畏者六陰陽不調不足懼三辰失行不足懼小人訛言不足懼山摧川涸不足懼蟊賊傷稼不足懼此不足懼者五也賢人藏匿深可畏四民遷業深可畏上下相狥深可畏㢘恥道消深可畏毁譽亂真深可畏直言蔑聞深可畏此深可畏者六也伏惟陛下尊臨南國奄有八紘蕩三季之澆風振百王之舊典設四科而羅俊彦提五柄以御英雄所以不軌不物之徒咸思革面無禮無義之軰相率悛心然而不足懼者願陛下存而無論深可畏者願陛下脩而靡忒加以崇三綱五常之教敷六府三事之歌則鴻基與五嶽爭髙盛徳共磐石永固優詔奬之澄言可畏六事實中當時之弊識者許之晉何澤初仕後唐同光中為雒陽令澤以莊宗出獵屢踐民田澤屏其從者伏於藂中截馬諫曰陛下急徵暴歛下不堪命今稼穡將登而從騎耗暴如是使官吏何以集其征賦臣請賜死於此以悟陛下莊宗慰而遣之尋遷倉部郎中李知損為刑部員外郎天福二年十一月上言臣近自作補闕擢為員外守刑法之司非諫諍之任雖越職干議典制固所不容而為臣事君聞見宜其無隱臣昨晩於相國寺内忽覩聚衆殺病痩馬或説奉旨宣賜臣愚昧所見竊有感傷大凡天下耕牛不可宰殺有所犯者罪在無赦國家切於禁防葢以力耕為用今之痩馬抑有前勞是皆乆歴戰征備經辛苦以致筋齒疎尨飲齓細微振奮莫能廢損及此當於佛寺衆被軍人以布巾蒙其頭大钁鎚其胸及刳剥之際為觀者所傷方今時未銷兵軍非厭馬木曜方臨於鄭分鑾輿暫幸於梁園誠於迴賜與之恩亦憫傷之旨矧復京師之内不同營寨之中况軍人米糧無所乏闕病馬肌肉不濟烹炮伏望明勑所司應有病馬散令宣賜要者任便餵養顯示不殺之恩念羸牛之力耕猶存令式恤老馬之苦戰願立新規臣謬列清朝無禆聖運茍有所見合具上聞帝嘉而納之錫以束帛薛融為左諫議大夫天福三年六月上疏曰臣近覩河南留守髙行周狀奏脩大内事以大厦既成鷰雀尚猶相賀皇居是葺臣子豈不同歡然則時方属於多虞事宜停於不急臣聞帝堯古之聖君也其所居宫室則茅茨不翦土階三尺漢文帝古之聖主也欲造露臺以費百金之直尋罷其役莫不道光圗籍徳冠古今為千載之美談作百王之懿範况漢文承三代之基業御一統之寰區百姓富饒四方寧謐金帛盈於帑藏粟麥溢於囷倉尚惜其財不從其欲今雒陽宫殿雖有先遭焚毁其所存者猶且彌滿於帝堯之茅茨而又重有脩營其所貴者豈不倍多於漢文之臺榭伏自陛下一臨華夏再歴寒暄聖猷雖契於上𤣥皇化未覃於遐徼復又鄴城殘宼歴嵗逋誅黎民猶困於轉輸將士頗勞於攻討庫藏虛竭文費殷繁此則是陛下宵衣旰食之時非陛下營造宫室之日且百姓是陛下之赤子也陛下是百姓之慈父也子既有疾父寜不憂今則天下黎民莫非疲弊天下州縣靡不凋殘加以率歛頻仍徭役重疊尤宜撫恤俾遂蘇舒勿謂愚而可輕勿謂賤而可棄古人有言民猶水也君猶舟也水所以載舟亦所以覆舟可不畏乎兼自去年正月已來陰陽繼虧星曜失度此則上天垂象使陛下脩徳節儉之戒也固合脩徳以應之向使百姓安寧則陛下雖當櫛風沐雨未以為苦也若或兆民愁苦則陛下雖處瑶臺瓊室豈得為安乎伏願陛下襲帝堯之舊風繼漢文之餘烈且停工役免費資財使寰海之普寧或脩營之未晩則天下幸甚百姓幸甚勑曰薛融官居諫署志奉皇圗特貢忠言備彰直道載觀臣節深契朕懐其雒京大内先令葺脩今宜停罷鄭受益為右諫議大夫天福七年夏以涇原張彦澤殺害書記張式恣為不道受益上章請行國典旬日不報又上疏曰臣自貢封事已及九日未聞施行實深激憤且臣家在晉昌備知蹤跡彦澤在涇州殺式之後至故雍復害軍將楊洪一如式之屠割此乃是陛下去嵗送張式令彦澤屠戮致今春楊洪又遭此苦中外觀者痛入骨髓陛下聞之情無愍傷伏自陛下臨御已來萬方咸歌仁聖一何乖爽大㸃皇猷又彦澤在涇州日擅將甲兵討伐蕃部尋皆陷殁靡有孑遺乃行酷虐之令括為充墳舊數奪取婦女率掠金帛從順者包羞免禍違阻者飲恨被誅近逺聞王周交代條件上聞凡有濫訛應在其内今陛下畧無所問臣實不平沮王周守法奉公黨彦澤殺人害物臣竊慮此後諸侯傚作好事者少繼為惡事者多葢陛下喜怒不分賞罰有濫既無黜陟之法是退賢良之心今外議沸騰皆言陛下廣受彦澤進獻許行非法之事况在郡括馬將及萬蹄到闕獻誠止滿百疋臣痛恨此賊者致陛下招此惡名故也是敢繼犯宸嚴再具論列必乞速行法令免致天下咨嗟臣又觀陛下前月十八日時降勑命過五日一度内殿起居許臣僚具所見事實封文奏其間勑語曰恐一物失所以百姓為心可謂憂民疾痛者矣今臣所論奏彦澤葢為涇州一方陛下詔墨未乾自違其旨如水投石不動聖心臣切慮姦邪潜謀罔惑致其明聖有此二三奈何陛下不與執政之臣商量而聽庸愚之軰掩蔽伏以宰臣馮道以下皆忠貞直性輔弼當仁乆居調鼎之權上贊垂裳之理而况晨趨玉陛日面龍顔每於造膝之時必竭沃心之奏伏乞宣示前後所貢二狀令對御座子細詳讀若臣所論彦澤奴事謬妄不愜聖旨即乞便降朝典令天下知彦澤無罪諫官妄有陳論兼明陛下無朝令夕改之謗臣職忝諫諍理合抗論不避嚴誅希迴英斷漢李欽明為司勲員外郎乾祐二年冬上言伏見天下戸民大半家貧産薄征賦之外差配尤繁豈宜寒耕熱耨之人供游手惰農之軰臣近以簡苗外縣遍歴鄉村緇侣居精舍輝赫每縣不下二十餘處求化齋粮不勝飽飫寺家耕種又免征税臣竊知淮南不度僧尼不滋醫卜已六十年矣兼不許外求者入境此貴留蠧耗幸我國困民窮古語云一夫不耕一婦不織必有受饑寒者即自聖化之内且約十萬僧尼每人日米一升十萬日費一千石以日繫月其數可知每人春冬服裝除綾羅紗縠外一僧嵗中須絹五疋綿五十兩十萬僧計絹疋五十萬綿兩五百萬此軰不耕不農皆出於蠶織無禆至化實斁大猷臣以為聚僧不如聚兵僧富不如民富昔秦皇帝并吞六國虎視天下以兵多民富故也僧何預焉經曰聖人在上國無幸民民之多幸國之不幸臣嘗三復此言為之扼腕周劉皥初仕後唐為駕部員外郎知雜事上言曰藩侯郡牧仗鉞分符繫千里之慘舒行一方之威福自古選任須擢賢明近代統臨為酧勲績將邦域之生聚展將領之人情識分者附正營私黷貨者嚴刑廣取諸頭剥削多贍牙爪自黄巢已來偽梁之後公署例皆隳壊編戸悉是凋殘若或不近邊陲不屯師旅無城郭郡邑非控扼藩垣試任㢘能且權葺理逐年屬州錢物每里甲省區分支遣有餘罄竭供追府軍漸足黎庶稍蘇縱有過愆亦可懲責言雖鄙近望賜施行疏留中不出李元懿前為北海令廣順二年投匭獻六事其一臣為北海令時夏秋苗上每畆麻農具等錢省司元定錢十六及劉銖到任每畆上加四十五每頃配柴五圍炭三秤省條之外嚴刑立使限徵臣竊聞諸道亦有如劉銖配處望令禁止其二臣在任時奉劉銖文字放絲三萬兩配織絹五千匹管内七縣大抵如是及徵收在賦税之前督責抑凌借役戸民多造店宅碾磑典庫請朝廷指揮許人論告差軍人百姓五工已上出放物至匹斤以坐贓論自然止絶其三臣在任時見劉銖擅棄國章便行决配凡罪人或刺面填都或决配沙門島大凡配流加役是朝廷格律今後更請以不道論其四臣見諸處商税有越常規乃至草木虫魚無不取税更有嵗定税率即令兒姪傔從主張便行枷棒作事非法有紊國章今後請三司差人諸持止絶斯弊其五臣伏見晉朝曾配百姓食鹽錢每頃配鹽二十斤納錢五十五數足然後許百姓私買煎造自後鹽鐡使指以贍軍為名禁斷鹽法苖畆所配不放納錢税物重徵生靈不易今逢理代宜有改更使人口淡食者多其主糶職員又入沙石消鹵大半今後如國家立法糶鹽乞放却苗上率配稍撫蒸民以安國本其六臣見麴法一條最未中理多與州縣民嵗定課利至於酤酢賣糟為弊尤甚臣請州府𣙜酒戸鄉村不禁許令私造依明宗朝所行税戸每畆納麴錢三則酒酢之流民得便用使雖不行人以為切要麴厲顯徳元年十月為侍御史知雜事上言曰竊見潁州為天清節放見禁罪人伏以祝萬夀之延洪但要齋心潔懇臨一州之生聚當思共理分憂且見禁罪人或干格法或因劫盜或是爭論各有科條須分曲直若負罪者獲免即銜寃者莫伸此時不有發明諸處便成流例直恐每逢慶節擅放縲徒豈止惠姦深為長惡望行止絶免紊章程從之册府元龜卷五百四十七
