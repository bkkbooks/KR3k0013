body:
  text: 册府元龜卷七百三十五宋王欽若等撰陪臣部智識第四鬬伯比楚大夫也楚武王侵隨魯桓公六年使薳章求成焉薳章楚大夫軍於瑕以待之瑕隨地隨人使少師董成少師隨大夫董正也鬬伯比言於楚子曰吾不得志於漢東也我則使然我張吾三軍而被吾甲兵以武臨之彼則懼而恊以謀我故難間也漢東之國隨為大隨張必棄小國張自侈大也小國離楚之利也少師侈請羸師以張之羸弱也熊率且比曰季梁在何益熊率且比楚大夫季梁隨賢臣鬬伯比曰以為後圖少師得其君言季梁之諫不過一見從隨侯卒當以少師為計故云以為後圖二年蔡侯鄭伯㑹于鄧始懼楚楚子自此遂盛終於抗衡中國故傳備言其事以終始之王毁軍而納少師從伯比之謀少師歸請追楚師隨侯將許之季梁止之隨侯懼而修政楚不敢伐叔伯楚大夫也僖公二十三年成得臣帥師伐陳成得臣子玉也討其貳於宋也取焦夷城頓而還子文以為之功使為令尹叔伯曰子若國何叔伯楚大夫薳吕臣也以為子玉不任令尹對曰吾以靖國也夫有大功而無貴仕貴仕貴位其人能靖者與有幾蒍賈楚大夫僖公二十七年楚子將圍宋使子文治兵於暌子文時不為令尹故云使治兵習號令也暌楚邑終朝而畢不戮一人終朝自旦及食時也子玉復治兵於蒍子玉為令尹故蒍楚邑終日而畢鞭七人貫三人耳國老皆賀子文子文飲之酒賀子玉堪其事蒍賈尚幼後至不賀子文問之對曰不知所賀子之傳政於子玉曰以靖國也靖諸内而敗諸外所獲幾何子玉之敗子之舉也舉以敗國將何賀焉子玉剛而無禮不可以治民過三百乗其不能以入矣茍入而賀何後之有潘尫楚大夫也文公十六年楚伐庸自廬以往振廩同食往往伐庸也振發也廩倉也同食上下無異饌也次于句澨楚西界也使廬戢黎侵庸戢黎廬大夫及庸方城方城庸地上庸縣東有方城亭也庸人逐之囚子揚窻窻戢黎官屬三宿而逸曰庸師衆羣蠻聚焉不如復大師還復句澨師且起王卒合而後進師叔曰不可師叔尫字姑又與之遇以驕之彼驕我怒而後可克先君蚡冒所以服陘隰也蚡冒楚武王諸父陘隰地名又與之遇七遇皆北軍走曰北唯禆鯈魚人實逐之禆鯈魚庸三邑魚魚復縣今巴東永安縣輕楚故但使三邑人逐之庸人曰楚不足與戰矣遂不設備楚子乘驛㑹師于臨品驛傳車也臨品也名也分為二隊隊部也分為兩道攻之子越自石溪子貝自仭以伐庸子越鬭椒也石溪仭入庸道秦人巴人從楚師羣蠻從楚子盟蠻見楚强故遂滅庸申叔時楚大夫也成公十六年晉侯伐鄭鄭人聞有晉師使告于楚姚句耳與往句耳鄭大夫與往非使也楚子救鄭司馬將中軍子反令尹將左子重右尹子辛將右公子壬夫過申子反入見申叔時曰叔時老在申師其何如對曰徳刑詳義禮信戰之器也器猶用也德以施惠刑以正邪詳以事神義以建利禮以順時信以守物民生厚而德正財足則思無邪用利而事節動不失利則事得其節時順而物成羣生得所上下和睦周旋不逆動順理求無不具下應上各知其極無二心故詩曰立我蒸民莫匪爾極蒸衆也極中也詩頌言先王立其衆民無不得中正是以神降之福時無災害民生敦厖和同以聽敦厚厖龎也莫不盡力以從上命致死以補其闕闕戰死也此戰之所繇克也今楚内棄其民不施惠而外絶其好義不建利瀆齊盟不詳事神而食話言信不守物奸時以動禮不順時周四月今二月妨農業而疲民以逞刑不正邪而苟快意民不知信進退罪也人恤所底其誰致死底至也子其勉之吾不復見子矣言其必敗不反姚句耳先歸子駟問焉對曰其行速過險而不整速則失志不思慮也不整則䘮列志失列䘮將何以戰楚懼不可用也戰於鄢陵楚師敗績薳子馮楚大夫也襄公二十四年楚子伐鄭以救齊門于東門次于棘澤諸侯還救鄭楚子自棘澤還使薳啟疆帥師送陳無宇傳言齊楚固相結也吳人為楚舟師之役故在此年夏召舒鳩人舒鳩人叛楚舒鳩楚屬國名欲興兵以伐楚也楚子師於荒浦荒浦舒鳩地使沈尹夀與師祁犁讓之二子皆楚大夫也舒鳩子敬逆二子而告無之且請受盟二子復命王欲伐之薳子曰不可彼告不叛且請受盟而又伐之伐無罪也姑歸息民以待其卒卒終也卒而不貳吾又何求若猶叛我無辭有庸乃還彼無辭我有功明年楚滅舒鳩薳啓疆楚大夫也齊侯既伐晉而懼將欲見楚子楚子使薳啓疆如齊聘且請期請其㑹齊社蒐軍實使客觀之祭社因閱數軍噐以示薳啓疆陳文子曰齊將有寇吾聞之兵不戢必取其族戢藏也族類也取族還自害沈尹戌楚大夫也昭公二十三年楚囊瓦為令尹囊瓦子囊之孫子常也代陽匄城郢楚用子囊遺言已築郢城矣今畏吳復増修以自固沈尹戌曰子常必亡郢茍不能衛城無益也古者天子守在四夷德及逺天子卑守在諸侯政卑損諸侯守在四鄰鄰國為之守諸侯卑守在四境裁省愼其四境結其四援結四鄰之國以為援助民狎其野狎安習也三務成功春夏秋三時之務民無内憂而又無外懼國焉用城今吳是懼而城於郢守已小矣卑之不獲能無亡乎不獲守四境昔梁伯溝其公宫而民潰在僖公十八年也民棄其上不亡何待夫正其疆埸修其土田險其走集走集邉境之壘壁親其民人明其伍候使民有部伍相為候望信其鄰國愼其官守守其交禮交接之禮不􅆫不貪不懦不耆懦弱也耆强也完其守傋以待不虞又何畏矣詩曰無念爾祖聿修厥德詩大雅無念念也聿述也義取念祖考則述其治德以顯之無亦監乎若敖蚡冒至於武文四君皆楚先君之賢者土不過同方百里為一同言未滿一圻愼其四境猶未城郢今土數圻方千里為圻而郢是城不亦難乎言守若是難以為安也定四年吳入楚寜國楚大夫也楚莊王欲伐陳使人視之使者曰陳不可伐也莊王曰何故對曰城郭高溝洫深畜積多也寜國曰陳可伐也夫陳小國而積畜多賦歛重也則民怨上矣城郭高溝洫深則民力罷矣興兵伐之陳可取也莊王聼之遂取陳孫叔敖楚大夫也狐丘大人謂孫叔敖丈人老人而居狐丘者曰人有三怨子知之乎孫叔敖曰何謂也對曰爵高者士妬之官大者主惡之祿厚者怨處之孫叔敖曰吾爵益高吾志益下吾官益大吾心益小吾祿益厚吾施益博是以免三怨可乎故老子曰必貴而以賤為本必高而以下為基又孫叔敖疾將死戒其子曰王數封我矣吾不受也孫叔敖薳賈之子莊王之令尹也我死王必封汝汝必無受利地人所貪利之地楚越之間寢之邱者此其地不利人不利之而名甚惡謂邱也荆人鬼而越人機言荆人畏鬼神越人信吉凶之機詳此地名邱惡畏之終不利可長有者唯此也唯獨也孫叔敖死王果以美地封其子辭而請寢之丘至今不失孫叔敖之知知以不利之為利矣知以人之所惡為巳之所善矣此有道者之所異乎俗也衆人利利孫叔敖病利申無宇楚大夫也昭公四年楚子欲遷許於頼使鬬韋龜與公子棄疾城之而還為許城也韋龜子文之元孫申無宇曰楚禍之首將在此矣召諸候而來伐國而克城境莫校謂築城於外境諸侯無與争王心不違民其居乎言將有事不能安也民之不處其誰堪之不堪王命乃禍亂也椒舉楚大夫也昭公四年申之㑹楚子示諸侯侈自奢侈椒舉曰夫六王二公之事六王湯武成康穆啓也二公齊桓公晉文公皆所以示諸侯禮也諸侯所繇用命也夏桀為仍之㑹有緡叛之仍緡皆國名商紂為黎之蒐東夷叛之黎東夷國名周幽為大室之盟戎狄叛之大室中岳皆所以示諸侯汰也諸侯所繇棄命也今君以汰無乃不濟乎王弗聼子産見左師曰吾不患楚矣汰而愎諫愎恨也不過十年左師曰然不十年侈其惡不逺遠惡而後棄惡及逺方而人棄之善亦如之德逺而後興范無宇楚大夫也楚靈王城陳蔡不羮使僕夫子晳問於范無宇曰吾不服諸夏而獨事晉何也唯晉近我逺也今我城三國賦皆千乘亦當晉矣又加之以楚諸侯其來乎對曰其在志也國為大城未有利者昔鄭有京櫟衛有蒲戚宋有蕭䝉魯有卞費齊有渠丘晉有曲沃秦有徴衙叔叚以京患莊公鄭幾不封櫟人實使鄭子不得其位衛蒲戚實出獻公宋蕭蒙實弑昭公魯卞費實弱襄公齊渠丘實弑無知晉曲沃實納齊師秦徴衙實難桓景皆志於諸侯此其不利者也且夫制城邑若體性焉有首領股肱至於指拇毛脉大能掉小故變而不動地有高下天有晦明民有君臣國有都鄙古之制也先王懼其不帥故制之以義旌之以服行之以禮辯之以名書之以文道之以言既其失也易物之繇夫邉境者國之尾也譬之如牛馬處暑之既至䖟䗽之既多而不能掉其尾臣亦懼之不然是三城也豈不使諸侯之心惕惕焉子晳復命王曰是知天咫安知民則是言誕也右尹子革侍曰民天之生也知天必知民矣是其言可以懼哉三年陳蔡及不羮人納棄疾而弑􅂕王王子勝楚大夫也昭十八年言于楚子曰許於鄭仇敵也而居楚地以不禮於鄭十五年平王復遷邑許自夷還居葉恃楚而不事鄭晉鄭方睦鄭若伐許而晉助之楚䘮地矣君盍遷許許不專於楚自以舊國不專心事楚鄭方有令政許曰余舊國也許先鄭封鄭曰余俘邑也隠十一年鄭滅許而復存之故曰我俘邑葉在楚國方城之外蔽也為方城外之蔽障士不可易易輕也國不可小謂鄭許不可俘讎不可啓君其圖之楚子説冬楚子使王子勝遷許於析實白羽於傳時白羽改為析士尹池楚大夫也使於宋司城子罕止而觴之南家之牆犨於前而不直犨猶出也出於子罕堂前西家之潦經其宮而不止西家地高潦流注子罕之宮而不禁之也尹池問其故子罕曰南家工人也為鞔者也鞔作履之工也吾將徙之其父曰吾恃為鞔以食三世矣今徙是宋國之求鞔者不知吾處也吾將不食願相之憂吾不食也為是故吾不徙之也西家高吾宮卑潦之徑吾宮也利故不禁也士尹池歸楚適興兵而將攻宋士尹池諫曰宋不可攻也其主賢其相仁賢者得民仁者能用人若攻之必無功徒為天下笑耳遂釋宋而攻鄭孔子聞之曰夫修之於廟堂之上而折衝乎千里之外者其司城子罕之謂乎藍尹亹楚大夫也子西歎於朝藍尹亹曰吾聞君子惟獨居思念前世之崇替與哀殯䘮於是有歎其餘則否君子臨政思義飲食思禮同宴思樂在樂思善無有歎焉今吾子臨政而歎何也子西曰闔廬能敗吾師闔廬即世吾聞其嗣又甚焉吾是以歎對曰子患政德之不修無患吳矣夫闔廬口不貪嘉味耳不樂逸聲目不滛於色身不懐於安朝夕勤志恤民之羸聞一善若驚得一士若賞有過必悛有不善必懼是故得民以濟其志今吾聞夫差好罷民力以成私好縱過而翳諌一夕之宿臺榭陂池必成六畜玩好必從夫先自敗也已焉能敗人子修德以待吳吳將斃矣子西楚大夫也哀公元年吳師在陳楚大夫皆懼曰闔廬惟能用其民以敗我於栢舉今聞其嗣又甚焉將若之何子西曰二三子恤不相睦無患吳矣昔闔廬食不二味居不重席室不崇壇平地作室不起壇也器不彤鏤彤丹也鏤刻也宫室不觀觀臺榭舟車不飾衣服財用擇不取費選取堅厚不尚細靡在國天有菑癘癘疾疫也親廵孤寡而共其乏困在軍熟食者分而後敢食必湏軍士皆分熟食不敢先食分猶徧也其所嘗者卒乘與焉所嘗甘珍非常食勤恤其民而與之勞逸是以民不罷勞死知不曠知身死不見曠棄吾先大夫子常易之所以敗我也易猶反也今聞夫差次有臺榭陂池焉積土為高曰臺有木曰榭過再宿曰次宿有妃嬙嬪御焉妃嬙貴者嬪御賤者皆内官一日之行所欲必成玩好必從珍異是聚觀樂是務視民如讐而用之日新夫先自敗也已安能敗我范蜎楚臣也齊使甘茂於楚楚懐王新與秦合㛰而驩昭王二年時迎婦於楚而秦聞甘茂在楚使人謂楚王曰願送甘茂於秦楚王問於范蜎曰蜎一作蠉寡人欲置相於秦孰可對曰臣不足以識之楚王曰寡人欲相甘茂可乎對曰不可夫史舉下蔡之監門也大不為事君小不為家室以茍賤不亷聞於世甘茂事之順焉故惠王之明武王之察張儀之辯而甘茂事之取十官而無罪茂誠賢者也然不可相於秦夫秦之有賢相非楚國之利也且王前嘗用召滑于越滑一作涓而内行章義之難一云内自章昧之難越國亂故楚南塞厲門一作瀬胡而郡江東計王之功所以能如此者越國亂而楚治也今王知用諸越而忘用諸秦臣以王為鉅過矣然則王若欲置相於秦則莫若向壽者可夫向壽之於秦王親也少與之同衣長與之同車以聼事王必相向壽於秦則楚國之利也於是使使請秦相向壽於秦秦卒相向夀而甘茂竟不得復入秦卒於魏季札吳大夫也襄公二十九年聘魯見叔孫穆子説之謂穆子曰子其不得死乎不得以壽死好善而不能擇人吾聞君子務在擇人吾子為魯宗卿而任其大政不愼所舉何以堪之禍必及子昭四年豎牛作亂殺穆子遂聘於齊説晏平仲謂之曰子速納邑與政納歸之于公無邑無政乃免於難齊國之政將有所歸未獲所歸難未歇也歇盡也故晏子因陳桓子以納政與邑是以免於欒高之難聘於鄭見子産如舊相識與之縞帶子産獻紵衣焉大帶也吴地貴縞鄭地貴紵故各獻已所貴示損己而不為彼貨利謂子產曰鄭之執政侈難將至矣政必及子子為政愼之以禮不然鄭國將敗侈謂伯有適衛説蘧瑗蘧伯玉史狗史朝之子文子史鰌史魚公子荆公叔發公叔文子公子朝曰衛多君子未有患也自衛如晉將宿于戚戚孫文子之邑聞鐘聲焉曰異哉吾聞之也辯而不德必加於戮辯猶争也夫子獲罪於君以在此孫文子以戚叛懼猶不足而又何樂夫子之在此也猶燕之巢于幕上言至危君又在殯而可以樂乎獻公卒未𦵏遂去之不止宿文子聞之終身不聼琴瑟聞義能徙適晉説趙文子韓宣子魏獻子曰晉國其萃於三家乎言晉國之政將集於三家説叔向將行謂叔向曰吾子勉之君侈而多良大夫皆富政將在家富而厚施故政在家吾子好直必思自免於難李克魏大夫魏武侯之居中山也問於李克曰吳之所以亡者何也李克曰驟戰而驟勝武侯曰驟戰而驟勝國家之福也其亡也何故對曰驟戰則民罷驟勝則主驕以驕主使罷民然而不亡者鮮矣驕則恣恣則極物罷則極慮上下俱極吳之亡也猶晚趙奢趙之田部吏也收租税而平原君家不肯出趙奢以法治之殺平原君用事者九人平原君怒將殺奢奢因説曰君於趙為貴公子今縱君家而不奉公則法削法削則國弱國弱則諸侯加兵諸侯加兵是無趙也君安得有此富乎以君之貴奉公如法則上下平上下平則國强國强則趙固而君為貴戚豈輕於天下邪平原君以為賢言之於王王用之治國賦國賦太平民富而府庫實藺相如趙大夫也為上卿位在亷頗之右亷頗曰我為趙將有攻城野戰之大功而藺相如徒以口舌之勞而位居我上且相如素賤人吾羞不忍為之下宣言曰我見相如必辱之相如聞不肯與㑹相如毎朝時常稱病不欲與亷頗争列已而相如出望見亷頗相如引車避匿於是舍人相與諫曰臣所以去親戚而事君徒慕君之高義也今君與亷頗同列亷君宣惡言而君畏匿之恐懼殊甚且庸人尚羞之況於將相乎臣等不肖請辭去藺相如固止之曰公之視亷將軍孰與秦王曰不若也相如曰夫以秦王之威而相如廷叱之辱其羣臣相如雖駑獨畏廉將軍哉顧吾念之强秦之所以不敢加兵於趙者徒以吾兩人在也今兩虎共鬬其勢不俱生吾所以為此以先國家之急而後私讐也亷頗聞之肉袒負荆因賔客至藺相如門謝罪曰鄙賤之人不知將軍寛之至此也卒相與驩為刎頸之交宋公者趙仇液之客也秦昭王七年樗里子死而使涇陽君質於齊趙人樓緩來相秦趙不利乃使仇液之秦請以魏冉為秦相仇液將行其客宋公謂液曰秦不聼公樓緩必怨公公不若謂樓緩曰請為公毋急秦秦王見趙請相魏冉之不急且不聼公公言而事不成以德樓子事成魏冉故德公矣於是仇液從之而秦免樓緩而魏冉相秦寗越趙大夫也齊攻廪邱趙使孔青將兵救之與齊人戰大敗齊將死得車二千得屍二萬以為二京京觀也寗越謂之曰惜矣不如歸屍以内攻之越聞之古之善戰莎隨賁服賁置也服則置之郤舍延屍郤舍以緩其民使得收之車甲盡於戰府庫竭於葬此之謂内攻之孔青曰敵齊不屍則如何寗越曰不然彼戰而不勝其罪一與人出而不與之入其罪二與之屍而不取其罪三民以此三者怨其上則上無以使下下無以事上是之謂重攻之寗越可謂知用文武矣商文事魏呉起謂商文曰事君果有命矣夫商文曰何謂也起曰治四境之内成馴敎變習俗使君臣有義父子有親子與我孰賢商文曰吾不若子曰今日置質為臣其主安重今日釋璽辭官其主安輕子與我孰賢商文曰吾不若子起曰士馬成列馬與人敵人在馬前援桴一鼓使三軍之士樂死若生子與我孰賢商文曰吾不若子起曰三者子皆不吾若也位則在吾上命也未事君商文曰善哉亦問子世變主少羣臣相疑黔首不定屬之子乎屬之我乎起黙然不對少頃乃曰吾不若子商文曰是吾所以加於子之上矣魏敬魏臣也初秦王立帝宜陽令計綰誕魏王將入秦魏敬謂魏王曰以河内孰與梁重王曰梁重又曰梁孰與身重王曰身重若使秦求河内則王將與之乎王曰不與魏敬曰河内三論之下也秦索其下而王不聼之臣竊不取也王曰善乃輟行公子無忌魏信陵君也無忌與魏王博而北境傳舉烽言趙宼至且入界作高木櫓櫓上作桔橰頭兠零以薪置其中謂之烽常眂之有寇即火燃舉之以相告魏王釋博欲召大臣謀公子止王曰趙王田獵耳非為寇也復博如故王恐心不在博居頃復從北方來傳言曰趙王獵矣非為寇也魏王大驚曰公子何以知之公子曰臣之客有能探得趙王隂事者趙王所為客輙以報臣臣以此知之是後魏王畏公子之賢能不敢任公子以國政又齊楚相約而攻魏秦昭王救之故欲親秦而伐韓以求故地無忌謂魏王曰秦與戎翟同俗有虎狼之心貪戾好利無信不識禮義德行茍有利焉不顧親戚兄弟若禽獸耳此天下之所識也非有所施厚積德也故太后母也而以憂死穰侯舅也功莫大焉而竟逐之兩弟無罪而再奪之國此以親戚若此而况於仇讐之國乎今王與秦共伐韓而益近秦患臣甚惑之而王不識則不明羣臣莫以聞則不忠今韓氏以一女子奉一弱主内有大亂外交强秦魏之兵王以為不亡乎韓亡秦有鄭地與大梁隣王以為安乎王欲得故地今負强秦之親王以為利乎秦非無事之國也韓亡之後必將更事更事必就易與利就易與利必不伐楚與趙矣是何也夫越山踰河絶韓上黨而攻强趙是復閼與之事秦必不為也若道河内倍鄴朝歌絶漳釜水與趙兵決於邯鄲之郊是知伯之禍也秦又不敢伐楚道渉山谷行三千里而攻鄳阨之塞楚之險塞也或以為今江夏鄳縣所行甚逺所攻甚難秦又不為也若道河外倍大梁右蔡左召陵與楚兵決陳郊秦又不敢故曰秦必不伐楚與趙矣又不攻衛與齊矣夫韓亡之後兵出之日非魏無攻已秦固有懷茅在修武軹縣有茅亭邢邱在平臯城垝津以臨河内河内共汲必危汲縣属河内有鄭地成臯滎陽亦属鄭得垣雍垣雍城在巻縣巻縣属魏地巻縣又有長城經陽武到宻者也決滎澤水大梁大梁必亡王之使者出過而惡安陵氏於秦召陵有安陵郡征羌有安陵亭也秦之欲誅之久矣秦葉陽昆陽與舞陽鄰聼使者之惡之隨安陵氏而亡之繞舞陽之北以東臨許南國必危國無害己夫憎韓不愛安陵氏可也夫不患秦之不愛南國非也異日者秦在河西晉國去梁千里魏國之界千里又云河南梁縣有注城有河山以闌之有周韓以間之從林鄉軍林鄉在宛縣以至于今秦七攻魏五入囿中一作城中邉城盡㧞文臺墮垂都焚一云魏山都焚句陽有垂亭林木伐麋鹿盡而國繼以圍又長驅梁北東至陶衞之郊北至平監平縣属河南平或作乎字史記齊闞止作監字闞在東平須昌縣所亡於秦者山南山北河外河内大縣數十一作百名都數百一作十秦乃在河西晉去梁千里而禍若是矣又况於使秦無韓有鄭地無河山而䦨之無周韓而間之去大梁百里禍必繇此矣異日者從之不成也楚魏疑而韓不可得也今韓受兵三年秦橈之以講識亡不聼投質于趙請為天下鴈行頓刄楚趙必集兵皆識秦之欲無窮也非盡亡天下之國而臣海内必不休矣是故臣願以從事王王速受楚趙之約趙挾韓之質以存韓而求故地韓必效之此士民不勞而故地得其功多於與秦共伐韓而又免與彊秦鄰之禍也夫存韓安魏而利天下此亦王之天時已通韓上黨於共甯朝歌有甯鄉使道安成出入賦之是魏重質韓以其上黨也今有其賦足以富國韓必德魏愛魏重魏畏魏韓必不敢反魏是韓則魏之縣也魏得韓以為縣衞大梁河外必安矣今不存韓二周安陵必危楚趙大破衞齊甚畏天下西鄉而馳秦入朝而為臣不久矣惠施魏人也齊魏戰於馬陵齊大勝魏殺太子申覆十萬之軍魏王召惠施而告之曰夫齊寡人之讐也怨之至死不忘國雖小吾嘗欲悉起兵而攻之何如對曰不可臣聞之王者得度而霸者知計今王所以告臣者疏於度與計王固先属怨於趙而後與齊戰今戰不勝國無守戰之備王又欲悉起兵而攻齊此非臣之所諭也王若欲報齊乎則不如因變服折節而朝齊楚王必怒矣王游人而令其鬬則楚必伐齊以休楚而伐罷齊則必為楚擒矣是王以楚致齊也王曰善乃使人報於齊願臣畜而朝田嬰許諾張尹曰不可戰不勝魏而得朝禮與魏和而下楚此可以大勝也今戰勝魏覆十萬之軍而擒太子申臣萬乘之魏而卑秦楚此其於暴戻矣且楚王之為人也好用兵而甚務名終為齊患者必楚也田嬰不聼遂内魏王而與之竝朝齊使再至趙氏醜之楚王怒自將而伐齊趙應之大敗齊於徐州虞卿趙上卿也秦趙戰於長平趙不勝亡一都尉趙王召樓昌與虞卿曰軍戰不勝尉復死復一作係寡人使束甲而趨之何如樓昌曰無益也不如發重使為媾右后切求和曰媾虞卿曰昌言媾者以為不媾軍必破也而制媾者在秦且王之論秦也欲破趙之軍乎不邪王曰秦之不遺餘力矣必且欲破趙軍虞卿曰王聼臣發使出重寳以附楚魏楚魏欲得王之重寳必内吾使趙使入楚魏秦必疑天下之合從且必恐如此則媾乃可為也趙王不聼與平陽君為媾發鄭朱入秦秦内之趙王召虞卿曰寡人使平陽君為媾於秦秦已内鄭朱矣卿以為奚如虞卿對曰王不得媾軍必破矣天下賀戰勝者皆在秦矣鄭朱貴人也入秦秦王與應侯必顯重以示天下楚魏以趙為媾必不救王秦知天下不救王則媾不可得成也應侯果顯鄭朱以示天下賀戰勝者終不肯媾長平大敗遂圍邯鄲為天下笑秦既解邯鄲圍而趙王入朝王入朝使趙郝音釋一作攻約事於秦割六縣而媾虞卿謂趙王曰秦之攻王也倦而歸乎王以其力尚能進愛王而弗攻乎王曰秦之攻我也不遺餘力矣必以倦而歸也虞卿曰秦以其力攻其所不能取倦而歸王又以其力之所不能取以送之是助秦自攻也來年秦復攻王王無救矣王以虞卿之言告趙郝趙郝曰虞卿誠能盡秦力之所至乎誠知秦力之所不能進此彈丸之地弗與令秦來年復攻王王得無割其内而媾乎王曰請聼子割矣子能必使來年秦之不復攻我乎趙郝對曰此非臣之所敢任也他日三晉之交於秦相善也今秦善韓魏而攻王王之所以事秦必不如韓魏也今臣為足下解負親之攻開闗通幣齊交韓魏至來年而王獨取攻於秦此王之所以事秦必在韓魏之後也此非臣之所敢任也王以告虞卿虞卿對曰郝言不媾来年秦復攻王王得無割其内而媾乎今媾郝又以不能必秦之不復攻也今雖割六城何益來年復攻又割其力之所不能取而媾此自盡之術也不如無媾秦雖善攻不能取六縣趙雖不能守終不失六城秦倦而歸兵必罷我以六城收天下以攻罷秦是我失之於天下而取償於秦也吾國尚利孰與坐而割地自弱以强秦哉今郝曰秦善韓魏而攻趙者必以為韓魏不救趙也而王之軍必孤有以王之事秦不如韓魏也是使王嵗以六城事秦也即坐而城盡來年秦復求割地王將與之乎弗與是棄前功而挑秦禍也與之則無地而給之語曰强者善攻弱者不能守今坐而聼秦秦兵不弊而多得地是强秦而弱趙也以益强之秦而割愈弱之趙其計故不止矣且王之地有盡而秦之求無己以有盡之地而給無己之求其勢必無趙矣趙王計未定樓緩從秦來趙王與樓緩計之曰予秦地何如毋予孰高緩辭讓曰此非臣之所能知也王曰雖然試言公之私樓緩對曰王亦聞夫公甫文伯母乎公甫文伯仕於魯病死女子為自殺於房者二人其母聞之弗哭也其相室曰焉有子死而弗哭者乎其母曰孔子賢人也逐於魯而是人不隨也今死而婦人為之自殺者二人若是者必其於長者薄而於婦人厚也故從母言之是為賢母從妻言之是必不免為妬妻故其言一也言者異則人心變矣今臣新從秦來而言勿予則非計也言予之恐王以臣為秦也故不敢對使臣得為大王計不如與之王曰諾虞卿聞之入見王曰此飾説也王眘徐廣曰音慎勿予樓緩聞之徃見王王又以虞卿之言告樓緩對曰不然虞卿得其一不得其二夫秦趙搆難而天下皆説何也曰吾且因强而乘弱矣今趙兵困於秦天下之賀戰勝者則必盡在於秦矣故不如亟割地為和以疑天下而慰秦之心不然天下將因秦之强怒乘趙之弊瓜分之趙且亡何秦之圖乎故曰虞卿得其一不得其二願王以此决之勿復計也虞卿聞之徃見王曰危哉樓子之所以為秦者是愈疑天下而何慰秦之心哉獨不言其示天下弱乎且臣言勿予者非固勿予而已也秦索六城於王而王以六城賂齊齊秦之深讎也得王之六城并力西擊秦齊之聼王不待辭之畢也則是王失之於齊而取償於秦也而齊趙之深讐可以報矣而示天下有能為也王以此發聲兵未窺於境臣見秦之重賂至趙而反媾於王也從秦為媾韓魏聞之必盡重王重王必出重寳以先於王則是王一舉而結三國之親而與秦易道也趙王曰善則使虞卿東見齊王與之謀秦虞卿未反秦使者已在趙矣樓緩聞之亡去趙於是封虞卿以一城居頃之而魏請趙王為從趙孝成王召虞卿謀過平原君平原君曰願卿之論從也虞卿入見王王曰魏請為從對曰魏過古卧切王曰寡人固未之許對曰王過王曰魏請從卿曰魏過寡人未之許又曰寡人過然則從終不可乎對曰臣聞小國之與大國從事也有利則大國受其福有敗則小國受其禍今魏以小國請其禍而王以大國辭其福臣故曰王過魏亦過竊以為從便王曰善乃合魏為從叚規韓康子臣也趙葭魏宣子臣也張孟談趙襄子臣也知伯帥趙魏而伐范中行氏滅之休數年使人請地於韓韓康子欲勿與叚規諌曰不可夫知伯之為人也好利而鷙愎來請地不與必加兵於韓矣君其與之與之彼狃又將請地於他國他國不聼必鄉之以兵然則韓可以免於患難而待事之變康子曰善使使者致萬家之邑一於知伯如伯説又使人請地於魏魏宣子欲弗與趙葭諌曰彼請地於韓韓與之請地於魏魏弗與則是魏内自强而外怨知伯也然則其錯兵於魏必矣不如與之宣子曰諾因使人致萬家之邑一於知伯知伯説又使人之趙請蔡臯狼之地趙襄子弗與知伯因隂結韓魏將以伐趙趙襄子召張孟談而告之曰夫知伯之為人陽親而隂疏三使韓魏而寡人弗與焉其移兵寡人必矣今吾安居而可張孟談曰夫董閼安於簡主之才臣也世治晉陽而尹鐸循之其餘政敎猶存君其定晉陽君曰諾乃使延陵王將車騎先之晉陽君因從之至行城郭案府庫視倉廪召張孟談曰吾城郭之完府庫足用倉廪實矣無矢奈何張孟談曰臣聞董子之治晉陽公宮之垣皆以狄蒿苫楚牆之其高至丈餘君發而用之於是發而試之其堅則箘簵之勁不能過也君曰矢足矣吾銅少張孟談曰臣聞董子之治晉陽也公宫之室皆以鍊銅為柱質請發而用之則有餘銅矣君曰善號令以定備守以具三國之兵乘晉陽城遂戰三月不能㧞因舒軍而圍之决晉水而灌之圍晉陽三年城中巢居而處懸釡而炊財食將盡士卒羸病襄子謂張孟談曰糧食匱城力盡士大夫病吾不能守矣欲以城下何如張孟談曰臣聞之亡不能存危不能安則無為貴知士也君釋此計勿復言也臣請見韓魏之君襄子曰諾張孟談於是隂見韓魏之君曰臣聞唇亡則齒寒今知伯帥二國之君伐趙趙亡矣亡則君為之次矣二君曰我知其然夫知伯之為人也麤中而少親我謀未遂而知則其禍必至為之奈何張孟談曰謀出二君之口入臣之耳人莫之知也二君即與張孟談隂約三軍與之期日夜遣入晉陽張孟談以報襄子襄子再拜之張孟談因朝知伯而出遇知過一云知果轅門之外知過入見知伯曰二主殆將有變君曰何如對曰臣遇張孟談於轅門之外其志矜其行高知伯曰不然吾與二主約謹矣破趙三分其地寡人所親之必不欺也子釋之勿出於口知過出見二主入説知伯曰二主色動而意變必背君不如令殺之知伯曰兵著晉陽三年矣旦暮當㧞之而嚮其利乃有他心不可子愼勿復言知過曰不殺則遂親之知伯曰親之奈何知過曰魏宣子之謀臣曰趙葭韓康子之謀臣曰叚規是皆能移其君之計君其與二君約破趙則封二子者各萬家之縣一如是則二主之心可不變而君得其所欲矣知伯曰破趙而分其地又封二子者萬家之縣一則吾所得者少不可知過見君之不用也言之不聽出更其姓為輔氏遂去不見張孟談聞之入見襄子曰臣遇知過於轅門之外其視有疑臣之心入見知伯出更其姓今暮不擊必後之矣襄子曰諾使張孟談見韓魏之君曰夜期敎守堤之吏而决水灌知伯軍知伯軍救水而亂韓魏翼而擊之襄子將卒犯其前大敗知伯軍而擒知伯知伯身死國亡地分為三而天下笑此貪欲無厭也夫不聼知過亦所以亡也知氏盡滅惟輔氏存焉三晉已破知氏將分其地叚規謂韓王曰分地必取成臯韓王曰成臯石溜之地也寡人無所用之叚規曰不然臣聞一里之厚而動千里之權者地利也萬人之衆而破三軍者不意也王用臣言則韓必取鄭矣王曰善東取成臯至韓之取鄭也果從成臯册府元龜卷七百三十五
