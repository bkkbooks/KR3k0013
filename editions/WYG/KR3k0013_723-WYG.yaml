body:
  text: 册府元龜卷七百二十三宋王欽若等撰幕府部規諷兩漢而下自将相府寺以至州郡率有掾屬從事多自辟召以為佐助其所禮命良在正人是以有知己之義焉有賔主之道焉若乃政或未臧事有􅂈舉或失仁而趨利或慿勢以縱欲則必激切忠告奏記盡規諭以正道革其非心故從之者不失其令名拒之者或䧟於不義布在方册可以明徴孔子曰成人之美不成人之惡盖有是夫漢崔朝為幽州從事諫刺史無與燕刺王通及刺王敗昭帝擢朝為侍御史燕刺王旦武帝子坐與上官桀等謀亂自殺杜欽辟大将軍王鳯幕府時瑯邪太守馮野王病滿三月賜告與妻子歸杜陵就醫藥鳯風御史中丞劾奏野王風讀曰諷賜告飬病而私自便便安也持虎符出界歸家奉詔不敬欽素髙野王父子行能奏記於鳯為野王言曰竊見令曰吏二千石告􅂈長安謁謁者自白得告也律二千石以上告歸歸寕道不􅂈行在所者便道之官無辭不分别予賜予予告也賜賜告也今有司以為予告得歸賜告不得是一律兩科失省刑之意省减也夫三最予告令也在官連有三最則得予告也病滿三月賜告詔恩也今告則得詔恩則不得失輕重之差又二千石病賜告得歸有故事不得去郡亡著令律施行無不得去郡之文也傳曰賞疑從予所以廣恩勸功也疑當賞不當賞則予之疑厚薄則從厚罰疑從去所以慎刑闕難知也疑當罰不當罰則赦之疑輕重則從輕今釋令與故事而假不敬之法釋廢棄也假謂假託法律而致其罪甚違闕疑從去之意即以二千石守千里之地任兵馬之重不冝去郡将以制刑為後法者則野王之罪在未制令前也刑賞大信不可不慎鳯不聼竟坐免野王後漢范升王莽時為大司空王邑議曹史王莽頻發兵役徴賦繁興升乃奏記邑曰升聞子以人不間於其父母為孝臣以下不非其君上為忠今衆人咸稱朝聖皆曰公明盖明者無不見聖者無不聞今天下之事昭昭於日月震震於雷霆而朝云不見公云不聞則元元焉所呼天公以為是而不言則􅂈小矣知而從令則􅂈大矣二者於公無可以免宜乎天下歸怨於公矣朝以逺者不服為至念升以近者不悦為重􅁨今動與時戾事與道反馳騖覆車之轍探湯敗事之後後出益可怪晚發愈可懼耳方春嵗首而動發逺役藜藿不充田荒不耕糓價騰躍斛至數千吏人䧟於湯火之中非國家之人也如此則胡貊守關青徐之㓂在於帷帳矣升有一言可以觧天下倒懸免元元之急不可書傳願蒙引見極陳所懷邑雖然其言而竟不用後漢虞延陳留人太守富宗聞延名召署功曹宗性奢靡車服器物多不中節延諌曰昔晏嬰輔齊鹿裘不完季文相魯妾不衣帛以約失之者鮮矣宗不悦延即辭退居有頃宗果以侈縱被誅臨當伏刑􅒆涕而歎曰恨不用功曹虞延之諫光武聞而竒之彭修會稽人仕郡為功曹時西部都尉宰鼂行太守事以微過收吴縣獄吏将殺之主簿鍾離意争諫甚切鼂怒使收縳意欲案之掾吏莫敢諫修排閣直入拜於庭曰眀府發雷霆於主簿請聞其過鼂曰受教三日初不奉行廢命不忠豈非過邪修因拜曰昔任座面折文侯朱雲攀毁欄檻自非賢君焉得忠臣今慶明府為賢君主簿為忠臣鼂遂原意併赦獄吏罪崔駰為大将軍竇憲掾憲擅權驕恣駰數諫之及出征匃奴道路愈多不法駰為主簿前後奏記數十指切長短憲不能容稍疏之因察駰髙第出為長岑長駰自以逺去不得意遂不之官而歸何敞辟太尉宋繇府時竇氏專政外戚奢侈賞賜過制倉帑為虚敞奏記繇曰敞聞事君之義進思盡忠退思補過歴觀世主時臣無不各欲為化垂之無窮然而平和之政萬無一者盖以聖主賢臣不能相遭故也今國家秉聰明之宏道明公履晏晏之純徳君臣相合天下翕然治平之化有望於今孔子曰如有用我者三年有成今明公視事出入再朞冝當克己以醻四海之心禮一糓不升則損服徹膳天下不足若已使然而比年水旱人不收穫凉州縁邉家被凶害男子疲於戰陳妻女勞於轉運老㓜孤寡歎息相依又中州内郡公私屈竭此實損膳節用之時國恩覆載賞賚過度但聞臘賜自郎官以上公卿王侯以下至於空竭帑藏損耗國資尋公家之用皆百姓之力明君賜賚冝有品制忠臣受賞亦應有度是以夏禹元圭周公束帛今明公位尊任重責深負大上當規正綱紀下當濟安元元豈但空空無違而已哉冝先正己以率羣下還所得賜因陳得失奏王侯就國除苑囿之禁節省浮費賑卹窮孤則恩澤下暢黎庶悦豫上天聰明必有立應使百姓歌誦史官紀徳豈但子文逃禄公儀退食之比哉繇不能用周章字次叔南陽随人仕郡為功曹時大将軍竇憲免封冠軍侯就國章從太守行春到冠軍太守猶欲謁之章進諌曰今日公行春豈可越儀私交且憲椒房之親勢傾王室而退就藩國禍福難量明府剖符大臣千里重任舉止進退其可輕乎太守不聼遂便升車章前㧞佩刀絶馬鞅於是乃止及憲被誅公卿以下多以交關得罪太守幸免以此重章張敞南陽人為郡功曹太守王暢下車奮厲威猛豪右大震敞奏記諫曰五教在寛著之經典湯去三面八方歸仁武王入殷先去炮烙之刑髙祖鍳秦唯定三章之法孝文皇帝感一緹縈蠲除肉刑卓茂文翁召父之徒皆疾惡嚴刻務崇温厚仁心賢政流聞後世夫明哲之君網漏吞舟之魚然後三光明於上人物悅於下言之若迂其效甚近發屋伐樹將為嚴烈雖欲懲惡難以聞逺以明府上智之才日月之曜敷仁惠之政則海内改觀實有折枝之易而無挾山之難郡為舊都侯甸之國園廟出於章陵三后生自新野士女沾教化黔首仰風流自中興以来功臣将相継世而隆愚以為懇懇用刑不如行恩孳孳求姦未若禮賢舜舉臯陶不仁者逺随㑹為政晉盗奔秦虞芮入境譲心自生化人在德不在用刑暢深納敞諫更崇寛政慎刑簡罰教化遂行周舉辟司徒李郃府後長樂少府朱倀代郃為司徒舉猶為吏時宦者孫程等坐懷表上殿争功順帝怒悉徙封逺縣於是乃勅雒陽令促期發遣舉説倀曰朝廷在西鍾下時非孫程等豈立雖韓彭吴賈之功何以加諸今忘其大徳録其小􅂈如道路夭折帝有殺功臣之譏及今未去宜急表之倀曰今詔怒二尚書已奏其事吾獨表此必致罪譴舉曰明公年􅂈八十位為台輔不於今時竭忠報國惜身安寵欲以何求禄位雖全必䧟佞邪之譏諫而䕶罪猶有忠貞之名若舉言不足採請從此辭倀乃表諫順帝從之李固為大将軍梁商從事中郎商以后父輔政而柔和自守不能有所整裁災異數見下權日重固欲令商先正風化退辭髙滿乃奏記曰春秋褒儀父以開義路貶無駭以閉利門夫義路閉則利門開利門開則義路閉也前孝安皇帝内任伯榮樊豐之屬外委周廣謝惲之徒開門受賂署用非次天下紛然怨聲滿道朝廷初立頗存清静未能數年稍復堕損左右黨進者日有遷拜守死善道者滯涸窮路而未有改敝立徳之方又即位以来十有餘年聖嗣未立羣下絶望可令中宫博簡嬪媵兼採微賤宜子之人進御至尊順助天意若有皇子母自乳養無委保妾醫巫以致飛燕之禍明将軍望尊位顯當以天下為憂崇尚謙省垂則萬方而新營祠堂費功億計非以昭明令徳崇示清儉自數年以来災怪屢見比無雨潤而沈隂欎􅀈雲起貌宫省之内容有隂謀孔子曰智者見變思刑愚者觀怪諱名天道無親可為祗畏加近者月食既於端門之側月者大臣之體也夫窮髙則危太滿則溢月盈則缺日中則移凡此數者自然之數也天地之心福謙忌盛是以賢達功遂身退全名養夀無有怵廹之憂誠令王綱一整道行忠立明公踵伯成之髙全不朽之譽豈與此外戚凡軰耽榮好位者同日而論哉固狂夫下愚不逹大體竊感古人一飯之報况受顧遇而容不盡乎商不能用朱穆字公叔大將軍梁冀使典兵事桓帝即位順烈太后臨朝穆以冀勢地親重望有以扶持王室因推災異奏記以勸戒冀曰穆伏念明年丁亥之歲刑徳合于乾位易經龍戰之會其文曰龍戰于野其道窮也謂陽道將勝而隂道負也今年九月天氣欝冐五位四候連失正氣此互相眀也夫善道屬陽惡道屬隂若脩正守陽摧折惡類則福從之矣穆每事不逮所好唯學傳受扵師時有可試願將軍少察愚言申納諸儒而親其忠正絶其姑息専心公朝割除私欲廣求賢能斥逺佞惡夫人君不可不學當以天地順道漸清其心宜為皇帝選置師傅及侍講者得小心忠篤敦禮之士將軍與之俱入叅勸講授師賢法古此猶倚南山坐平原也誰能傾之今年夏月暈房星明年當有小戹宜急誅姦臣為天下所怨毒者以塞災咎議郎大夫之位本以式序儒術髙行之士今多非其人九卿之中亦有乖其任者惟將軍察焉又薦种暠欒巴等而明年嚴鮪謀立清河王蒜又黄龍二見沛國冀無術學遂以穆龍戰之言為應扵是請暠為從事中郎薦巴為議郎舉穆髙第為侍御史冀驕暴不悛朝野嗟毒穆以故吏懼其釁積招禍復奏記諫曰古之明君必有輔徳之臣規諫之官下至器物銘書成敗以防遺失故君有正道臣有正路從之如升堂違之如赴壑今明將軍地有申伯之尊位為羣公之首一日行善天下歸仁終朝為惡四海傾覆頃者官人俱匱加以水蟲為害京師諸官費用増多詔書發調或至十倍各言官無見財皆當出民搒掠割剝強令充足公賦既重私歛又深牧守長吏多非徳選貪聚無厭遇人如虜或絶命於箠楚之下或自賊扵廹切之求又掠奪百姓皆托之尊府遂令將軍結怨天下吏人酸毒道路歎嗟昔秦政煩苛百姓土崩陳勝奮臂一呼天下鼎沸而面䛕之臣猶言安耳諱惡不悛卒至亡滅昔永和之末綱紀少弛頗失人望四五嵗耳而財空户散下有離心馬兎之徒乘敝而起荆揚之間幾成大患質帝時九江賊馬兎稱黃帝歴陽賊華孟稱黒帝竝九州都尉滕撫討斬之幸頼順烈皇后初政清靜内外同力僅乃討定今百姓戚戚困扵永和内非仁愛之心可得容忍外非守國之計所宜久安也夫將相大臣均體元首共輿而馳同舟而濟輿傾舟覆患實共之豈可以去明即昧履危自安主孤時困而莫之䘏乎宜時易宰守非其人者減省第宅園池之費拒絶郡國諸所奉送内以自明外解人惑使挾姦之吏無所依託司察之臣得盡耳目憲度既張逺邇清一則將軍身尊事顯徳燿無窮天道明察無言不信惟垂省覽冀不納而縱放日滋遂復賂遺左右交通宦者任其子弟賔客以為州郡要職穆又奏記極諫冀終不悟報書云如此僕亦無一可邪穆言雖切然亦不甚罪也蓋勲為漢陽長史時梁州刺史宋梟一作宋泉患多冦謂勲曰凉州寡扵學術故屢致反暴今欲多冩孝經令家家習之庶或使人知義勲諫曰昔太公封齊崔杼殺君伯禽侯魯慶父簒位此二國豈乏知學者今不急静難之術遽為非常之事既足結怨一州又當取笑朝廷勲不知其可也梟不從遂奏行之果被詔書詰責坐以虚慢懲陳琳為大將軍何進主簿進欲誅諸宦官太后不聽進乃召四方猛将並使引兵向京城欲以刼恐太后琳諫進曰易稱即鹿無虞諺有掩目捕雀夫㣲物尚不可欺以得志况國之大事其可以詐立乎今將軍總皇威握兵要龍驤虎歩髙下在心以此行事無異扵皷洪爐以燎毛髮但當速發雷霆行權立斷遵經合道天人順之而反委釋利器更徴外助大兵合聚彊者為雄所謂倒持干戈授人以柄必不成功祗為亂階進不納其言竟以取禍梁衍為皇甫嵩左將軍長史嵩與董卓有怨卓後秉政初平元年乃徴嵩為城門校尉因欲殺之嵩將行衍説曰漢室㣲弱閹竪亂朝董卓雖誅之而不能盡忠扵國遂復㓂掠京邑廢立從意今徴將軍大則危禍小則困辱今卓在洛陽天子來西以將軍之衆精兵三萬迎接至尊奉命討逆發命海内徴兵羣帥袁氏逼其東將軍廹其西此成禽也嵩不從遂就徴鮑信為兖州刺史劉岱從事初平三年青州黃巾衆百萬入兖州殺任城相鄭遂轉入東平岱欲擊之信諫曰今賊衆百萬百姓皆震恐士卒無鬬志不可敵也觀賊衆群軰相隨軍無輜重唯以鈔略為資今不若畜士衆之力先為固守彼欲戰不得攻又不能其勢必離散後選精鋭據其要害擊之可破也岱不從遂與戰果為所殺閻圃巴西人張魯領漢寧太守圃為功曹民有地中得玉印者群下欲尊魯為漢寜王圃諫魯曰漢川之民户出十萬財富土沃四面險固上佐天子則為桓文次及竇融不失富貴仐承制署置勢足斬斷不煩於王願且不稱勿為禍先魯從之閻象為袁術大將軍主簿興平中獻帝播越敗於曹陽術大會羣下因謂曰今海内鼎沸劉氏微弱吾家四世公輔袁安及二子敞京京子湯湯子逄竝為司空百姓所歸欲應天順民扵諸君何如衆莫敢對象進曰昔周自后稷至扵文王積徳累功三分天下猶服事殷明公雖奕世克昌孰若有周之盛漢室雖㣲未至殷紂之敝也術黙然使召張範範辭疾遣弟承往應之術問曰昔周室陵遲則有桓文之覇秦失其政漢接而用之今孤以土地之廣士人之衆欲徼福扵齊桓接迹扵髙祖可乎承對曰在徳不在衆茍能用徳以同天下之欲雖云匹夫覇王可也若陵僣無度干時而動衆之所棄誰能興之術不説沮授為袁紹冀州别駕紹有三子譚熙尚譚長而慧尚少而美紹後妻劉氏偏寵愛尚數稱扵紹紹亦竒其姿容欲使得嗣乃以譚繼兄後出為青州刺史授諫曰世稱一兎走衢萬人逐之一人獲之貪者悉止分定故也且年均以賢徳均則卜古之制也願上惟先代成敗之戒下思逐兎分定之義紹曰孤欲令兒各據一州以觀其能授出曰禍其始此乎崔琰為袁紹從事時士卒横暴掘發丘壠琰諫曰昔孫卿有言不素教甲兵不利雖湯武不能以戰勝今道路暴骨民未見徳宜勅郡縣掩骼埋胔示憯怛之愛追文王之仁紹以為騎都尉後紹治兵黎陽次扵延津琰復諫曰天子在許民望助順不如守境述職以寧區宇紹不聽遂敗扵官渡王修為袁譚治中從事譚欲攻弟尚修諫曰兄弟還相攻擊是敗亡之道也譚不恱然知其忠節後又問修計安出修曰夫兄弟者左右手也譬人將鬬而斷其右手而曰我必勝若是者可乎夫棄兄弟而不親天下其誰親之屬有䜛人固將交鬬其間以求一朝之利願明使君塞耳勿聽也若斬佞臣數人復相親睦以禦四方可以横行天下譚不聽遂與尚相攻擊魏傅幹為太祖丞相叅軍太祖征呉幹諫曰治天下之大具有二文與武也用武則先威用文則先徳威徳足以相濟而後王道備矣往者天下大亂上下失序明公用武攘之十平其九今未承王命者呉與蜀也呉有長江之險蜀有崇山之阻難以威服易以徳懐愚以為可直按甲寢兵息軍養士分土定封論功行賞若此則内外之心固有功者勸而天下知制矣然後漸興學校以導其善性而長其義節公神武震四海若修文以濟之則普天之下無思不服矣今舉十萬之衆屯之長江之濵若賊負固深藏則士馬不得逞其能竒變無所用其權則大威有屈而敵心未能服矣唯明公思虞舜舞干戚之義全威養徳以道制勝太祖不從軍遂無功杜襲為太祖留府長史駐關中時將軍許攸擁部曲不附太祖而有慢言太祖大怒先欲伐之羣臣多諫可招懷攸共討彊敵太祖橫刀扵膝作色不聽襲入欲諫太祖逆謂之曰吾計已定卿勿復言襲曰若殿下計是邪臣方助殿下成之若殿下計非邪雖成宜改之殿下逆臣令勿言之何待下之不閎乎太祖曰許攸慢吾如何可置乎襲曰殿下謂許攸何如人邪太祖曰凡人也襲曰夫惟賢知賢惟聖知聖凡人安能知非凡人邪方今豺狼當路而狐狸是先人將謂殿下避彊攻弱進不為勇退不為仁臣聞千鈞之弩不為鼷䑕發機萬石之鐘不以莛撞起音今區區之許攸何足以勞神武哉太祖曰善遂厚撫攸攸即歸服又文帝為太子夏侯尚暱扵太子情好至宻襲謂非益友不足殊待以聞太祖文帝初甚不恱後乃追思其柔而不犯皆此類也邢顒為太祖丞相東曹掾初太子未定而臨淄侯植有寵丁儀等竝賛翼其美太祖問顒顒對曰以庶代宗先世之戒也願殿下深重察之太祖識其意後遂以為太子少傅遷太傳蜀王商為益州牧劉璋治中從事時王塗隔絶州之牧伯猶七國之諸侯也而璋懦弱多疑不能黨信大臣商奏記諫璋璋頗感悟黄權為劉璋主簿璋用别駕從事張松計遣法正將兵迎先主權諫曰劉備有梟名梟即驍也今以部曲遇之則不滿其心以賔客待之則一國不容二王此非自安之道從事王累自倒懸扵州門以諫璋一無所納李邈為丞相諸葛亮叅軍亮西征馬謖在前敗績亮將殺之邈諫以秦赦孟明用覇西戎楚誅子玉二世不競失亮意還蜀楊顒為諸葛亮主簿亮嘗自校簿書顒直入諫曰為治有體上下不可相侵請為明公以作家譬之今有人使奴執耕稼婢典炊㸑雞主司晨犬主吠盗牛負重載馬渉逺路私業無曠所求皆足雍容髙枕飲食而已忽一旦盡欲以身親其役不復付任勞其體力為此碎務形疲神困終無一成豈其智之不如奴婢雞狗哉失為家主之法也是故古人稱坐而論道謂之三公作而行之謂之士大夫故丙吉不問横道死人而憂牛喘陳平不肯知錢榖之數云自有主者彼誠逹扵位分之體也今明公為治乃躬自校簿書流汗竟日不亦勞乎亮謝之王連為屯騎校尉領丞相長史時南方諸郡不賔諸葛亮將自征之連諫以為此不毛之地疫癘之鄉不宜以一國之望冐險而行亮慮諸將才不及己意欲必往而連言輙懇至故停㽞者久之晉荀朂叅文帝大將軍事時魏髙貴鄉公欲為變大將軍掾孫佑守閶闔門帝弟安陽侯幹聞難欲入佑謂幹曰未有入者可從東掖門及幹至帝遲之幹以狀白帝欲族誅佑朂諫曰孫佑不納安陽誠宜深責然事有逆順用刑不可以喜怒為輕重今戍倅刑止其身佑乃族誅恐義士私議乃免佑爲庶人李憙為并州别駕時驍騎將軍秦朗過并州州將畢軌敬焉令乘車至閤憙固諫以為不可軌不得已從之江統蔡克棗嵩等為成都王頴官屬陸雲為孟玖所譛頴將害之統等上䟽曰統等聞人主聖眀臣下盡規茍有所懷不敢不獻昨聞敎以陸機後失軍期師徒敗績以法加刑莫不謂當誠足以肅齊三軍威示逺近所謂一人受戮天下知誡也且聞重教以機圖為反逆應加族誅未知本末者莫不疑惑夫爵人扵朝與衆共之刑人扵市與衆棄之惟刑之恤古人所慎今明公興舉義兵以除國難四海同心雲合嚮應罪人之命縣扵漏刻太平之期不旦則夕矣機兄弟竝蒙㧞擢俱受重任不當背罔極之恩而向垂亡之㓂去太山之安而赴累卵之危也直以機計慮淺近不能董攝羣帥致果殺敵進退之間事有疑似故令聖鑒未察其實耳刑誅事大言機有反逆之徴宜令王粹牽秀檢校其事令事驗顯然暴之萬姓然後加雲等之誅未足為晩今此舉錯實為太重得之則足令天下情服失之則必使四方心離不可不令審諦不可不令詳慎統等區區非為陸雲請一身之命實慮此舉有得失之機敢竭愚戅以備誹謗頴不納統等重請頴遲廽者三日盧志又曰昔趙王殺中䕶軍趙浚赦其子驤驤詣明公而擊趙即前事也蔡克入至頴前叩頭流血曰雲為孟玖所怨逺近莫不聞今果見殺罪無彰驗將令羣心疑惑竊為明公惜之僚屬隨克入者數十人流涕固請頴惻然有宥雲色孟玖扶頴入催令殺雲時年四十二有二女無男門生故吏迎喪𦵏清河孫惠為齊王冏賊曹屬齊王輔政驕恣日甚終無悛志惠諫王曰惠聞天下五難四不可而明公皆以居之矣捐宗廟之主忽千乘之重躬貫甲胄犯冐鋒刃此一難也奮三百之卒决全勝之策集四方之衆致英豪之士此二難也舎殿堂之尊居單幕之陋安囂塵之慘同將士之勞此三難也驅烏合之衆當凶強之敵任神武之畧無疑阻之懼此四難也檄六合之内著盟信之誓升幽宫之帝復皇祚之業此五難也大名不可久荷大功不可久任大權不可久執大威不可久居未有行其五難而不以為難遺其不可而謂之為可惠竊所不安也自永熙以來十有一載人不見徳惟戮是聞公族搆簒奪之禍骨肉遭梟夷之刑群王被囚檻之困妃主有離絶之哀歴觀前代國家之禍至親之亂未有今日之甚者也良史書過後嗣何觀天下所以不去扵晉符命長存扵世者主無嚴虐之暴朝無酷烈之政武帝餘恩獻王遺愛聖慈惠和尚結人心四海所係實在於兹今眀公建不世之義而未為不世之讓天下惑之思求所悟長沙成都魯衛之宻國之親親與明公計功受賞尚不自先今之宜倣桓文之勲邁臧札之風芻狗萬物不仁其化崇親推近功遂身退委萬機扵二王命方嶽扵群后燿義讓之旗鳴思歸之鑾宅大齊之墟振泱泱之風垂拱青徐之域髙枕營丘之藩金石不足以銘髙八音不足以賛美姬文不得專聖扵前太伯不得獨賢扵後今明公忘亢極之悔忽窮髙之凶棄五嶽之安居累卵之危外以權勢受疑内以百揆損神雖處髙臺之上逍遥重仞之墉反其危亡之憂過於頴翟之慮羣下竦戰莫之敢言惠以衰亡之餘遭陽九之運甘矢石之禍赴大王之義脱褐冠胄從戎于許契濶戰陣功無可記當隨風塵待罪初服屈原放斥心存南郢樂毅適趙志戀北燕况惠受恩偏䝉識養雖復蹔違情隆二臣是以披露血誠冐昧干迕言入身戮義讓功舉退就鈇鑕此恵之死賢於生也冏不納熊逺字孝文元帝作相引爲主簿時傳北陵被發帝將舉哀逺上疏曰園陵既不親行承傳言之者未可為定且園陵非一而直言侵犯逺近弔問答之宜當有主謂應更遣使攝河南尹按行得審問然後可發哀即宜命將至雒修復園陵討除逆類昔宋殺無畏莊王奮袂而起衣冠相追於道軍成宋城之下况此酷辱之大耻臣子奔馳之日夫修園陵至孝也討逆叛至順也救社稷至義也䘏遺黎至仁也若修此四道則天下響應無思不服矣昔項羽殺義帝以為罪漢祖哭之以為義劉項存亡在此一舉羣賊豺狼弱於往日惡逆之甚重扵邱山大晉受命未改於上兆庶謳吟思徳扵下今順天下之心命貔貅之士鳴檄前駈大軍後至威風赫然聲振朔野則上副西土義士之情下允海内延頸之望矣屬有杜弢之難不能從建興初正旦將作樂逺諫曰謹按尚書四海遏宻八音禮云㐫年天子徹樂减膳孝懐皇帝梓宫未反豺狼當塗人神同忿公明徳茂親社稷是頼今杜弢蟻聚湘川比嵗征行百姓疲弊故使蟻衆奉迎未舉履端元日正始之初貢士鱗萃南北雲集有識之士扵是觀禮公與國同體憂容未歇昔齊桓貫澤之會有憂中國之心不召而至者數國及葵丘自矜叛者九國人心所歸惟道與義將詔皇綱扵既往叛覇業於來今表道徳之軌闡忠孝之儀眀仁義之統宏禮樂之本使四方之士退懷嘉則今榮耳目之觀崇戯㺯之好懼違雲韶雅頌之美非納軌物有塵大教謂宜設饌以賜羣下而已元帝納之是時瑯琊國侍郎王鑒勸帝親征杜弢逺又上疏曰皇綱失統中夏多故聖主肇祚逺奉西都梓宫外次未反園陵逆冦逰魂國賊未夷眀公憂勞乃心王室伏讀聖教人懐慷慨杜弢小竪冦抄湘州比年征討經載不夷昔髙宗伐鬼方三年乃剋用兵之難非獨在今伏以古今之覇王遭時艱難亦有親征以隆大勲亦有遣將以平小冦今公親征文武將吏度支籌量舟輿器械所出若足用者然後可征愚謂宜如前遣五千人徑與水軍進征既可得速必不後時昔齊用穰苴燕晉退軍秦用王翦剋平南荆必使督䕶得才即賊不足慮也會弢已平轉從事中郎羊亮為太傅楊駿叅軍時京兆多盗竊駿欲更重其法盗百錢加大辟請官屬會議亮曰昔楚江乙母失布以為盗繇令尹公若無欲盗宜自止何重法為駿慙而止羊琇叅鎮西鍾會軍事從平蜀及會謀反琇正言苦諫還賜爵關内侯熊甫為大將軍王敦府叅軍見敦委任錢鳳將有異圖因酒酣謂敦曰開國承家小人勿用佞倖在位鮮不敗業敦乃作色曰小人阿誰甫無懼容因此告歸臨與敦别因酒歌曰隂風飈起蓋山陵氛霧蔽日玉石焚往事既去可長歎念别惆悵會復難敦知其諷已而不納謝鯤為王敦長史初敦謂鯤曰吾當以周伯仁為尚書令戴若思為僕射及至都復曰近來人情何如鯤對曰明公之舉雖欲大存社稷然悠悠之言實未逹髙義周顗戴若思南北人士之望明公舉而用之羣情帖然矣是日敦遣兵收周戴而鯤弗知敦怒曰君麤踈邪二子不相當吾已收之矣鯤與顗素相親重聞之愕然若喪諸已叅軍王􅱻以敦誅顗諫之甚切敦大怒命斬􅱻時人士畏懼莫敢言者鯤曰明公舉大事不戮一人􅱻以獻替忤㫖便以釁皷不亦過乎敦乃止敦既誅害忠賢而稱疾不朝將還武昌鯤喻敦曰公大存社稷建不世之勲然天下之心實有未逹若能朝天子使君臣釋然萬方之心扵是乃服伏衆望以順群情盡冲退以奉主上如斯則勲侔九合名垂千載矣敦曰君能保無變乎對曰鯤近日入覲主上側席遲得見公宫省穆然必無虞矣公若入朝鯤請侍從敦勃然曰正復殺君等數百人亦復何損扵時竟不朝而去王濛為司徒王導府掾導復引康術弟孝濛致牋扵導曰開國承家小人勿用杖徳義以尹天下方將澄清彛倫崇重名器軍國殊用文武異容豈可令涇渭混流虧清穆之風何以允答具瞻儀形海内導不答王述為庾氷征虜長史氷弟安西將軍翼鎮武昌以累有妖人猛虎入府欲移鎮避之述與氷牋曰竊聞安西欲移鎮樂鄉不審此為筭邪將是情邪若謂爲筭則彼去武昌千有餘里數萬之衆造創移徙方當興立城壁公私勞擾若信要害之地所宜進據猶當計移徙之煩權二者輕重况此非今日之要邪方今彊胡陸梁當蓄力養鋭而無故遷動自取非筭又江州當泝流數千供繼軍府力役増倍疲曳道路且武昌實是江東鎮戍之中非但扞禦上流而已急緩赴告駿奔不難若移樂鄉逺在西陲一朝江渚有虞不相接救方嶽馭重將故當居要害之地倚為内外形勢使闚􅎿之心不知所向若是情邪則天道𤣥逺鬼神難言妖祥吉凶誰知其故是以逹人君子直道而行不以情失昔秦忌亡胡之䜟卒為劉項之資周惡檿弧之謡而成褒姒之亂此既然矣歴觀古今鑒其遺事妖異速禍敗者蓋不少矣禳避之道茍非所審且當擇人事之勝理思社稷之長計斯則天下幸甚令名可保矣若安西盛意已耳不能安扵武昌但得近移夏口則其次也樂鄉之舉咸謂不可願將軍體國為家固審此舉時朝議亦不允翼遂不移鎮郭瑀符氏之末為雒陽王穆左長史穆惑扵䜛間西伐索嘏瑀諫曰昔漢定天下然後誅功臣今事業未建而誅之立見麋􅎷㳺於此庭矣穆不從劉牢之為王恭司馬泰起兵將以誅王愉為名牢之諫曰將軍今動以伯舅之重執忠貞之節相王以姬旦之尊時望所係昔年已戮寳緒送王廞書是深伏將軍也頃所授用雖非皆允未為大失割庾楷四郡以配王愉於將軍何損晉陽之師其可再乎恭不從前燕封裕為記室將軍慕容皝以牧牛給貧家田於苑中公収其八二分入私有牛而無地者亦田苑中公收其七三分入私封裕諫曰臣聞聖王之宰國也薄賦而藏扵百姓分之以三等之田十一而税之寒者衣之饑者食之使家給人足雖水旱而不為災者何也髙選農官務盡勸課人給周田百畒亦不假牛力力田者受旌顯之賞惰農者有不齒之罰又量事置官量官置人使官必稱職人不虚位度嵗入多少裁而禄之供百僚之外藏之太倉三年之耕餘一年之粟以斯而積公用於何不足水旱其如百姓何雖務農之令屢發二千石令長莫有志勤在公鋭盡地利者故漢祖知其如此以墾田不實徴殺二千石以十數是以明章之際號稱升平自永嘉喪亂百姓流亡中原蕭條千里無煙饑寒流隕相繼溝壑先王以神武聖略保全一方威以殄姦徳以懐逺故九州之人塞表殊類襁負萬里若赤子之歸慈父流人之多舊土十倍有餘人殷地狹故無田者十有四焉殿下以英聖之資克廣先業南摧彊趙東滅句麗開境三千户増十萬繼武闡廣之功有髙西伯宜省罷諸苑以業流人人至而無資産者賜之以牧牛人既殿下之人牛豈失乎善藏者藏扵百姓若斯而已爾者深副樂土之望中國之人皆將壺飱奉迎石季龍誰與居乎且魏晉雖道消之世猶削百姓不至扵七八特官牛而官田者官得六分百姓得四分私牛而官田者與官中分百姓安之人皆悦樂臣猶曰非明王之道而况増乎且水旱之厄堯湯所不免王者宜濬治溝澮循鄭白西門史起溉灌之法旱則决溝為雨水則入扵溝瀆上無雲漢之憂下無昏墊之患句麗百濟及宇文叚部之人皆兵勢所徙非如中國慕義而至咸有思歸之心今户垂十萬狹湊都城恐方將為國家深害宜分其兄弟宗屬徙扵西境諸城撫之以恩簡之以法使不得散在居人知國之虚實今中原未平資畜宜廣官司猥多㳺食不少一夫不耕歳受其饑必取扵耕者而食之一人食一人之力㳺食數萬損亦如之安可以家給人足治致升平殿下降覽古今之事多矣政之巨患莫甚於斯其有經略出世才稱時求者自可隨須置之列位非此已往其耕而食蠶而衣亦天之道也殿下聖性寛明思言若渴故人盡芻蕘有犯無隐前者叅軍王憲大夫劉明竝竭忠獻欵以貢至言雖頗有逆鱗意在無責主者奏以妖言犯上致之扵法殿下慈宏包納恕其大辟猶削黜禁錮不齒扵朝其言是也殿下固宜納之如其非也宜亮其狂狷罪諫臣而求直言亦猶北行詣越豈有得邪右長史宋該等阿媚茍容輕劾諫士已無骨鯁嫉人有之掩蔽耳目不忠之甚四業者國之所資教學者有國盛事習戰務農尤其本也百工商賈猶其末耳宜量軍國所湏置其員數已外歸之扵農教之戰法學者三年無成亦宜還之扵農不可徒充大員以塞聰雋之路臣之所言當也願時速施行非也登加罪戮使天下知朝廷從善如流罰惡不淹王憲劉明忠臣也願宥忤鱗之愆收其藥石之效宋孔寗子為髙祖太尉主簿上書陳損益曰隆化之道莫先扵官得其才枚卜之方莫若扵人慎其舉雖復因革不同損益有異求賢審官未之或改師錫僉曰煥乎欽明之誥㧞茅征吉著扵幽賛之爻晉師有成𤓰衍作賞楚乘無入蒍賈不賀今舊命惟新幽人引領韶之盡美已備扵振綱武之未盡善或存扵理目雖九官之職未可備舉親民之選尤宜在先愚欲使天朝四品官外及守牧各舉一人堪為二千石長吏者以付選官隨缺叙用得賢受賞失舉任罰夫惟帝之難豈庸識所易然舉爾所知非求多之用百官之眀孰與一識之見執咎在已豈容殉物之私今非以選曹所銓其扵乖謬衆職所舉必也惟良宜申求賢權其廣塗考績取其少殿若才實㧞群進宜尚徳治阿之宰不必計年免徙之守豈限資秩自此以還故當才均以資資均以地宰莅之官誠曰吏職然監觀民瘼翼化宣風則隱厚之求急扵刀筆能事之功接扵徳心以此論才行之年歳豈惟政無粃蠧民庇手足而已將使公路日清私請漸塞仕無心競人必由已處士砥自求之節士子藏交馳之情寗子庸㣲不識治體冐昧陳愚退懼違謬何尚之為盧陵王義真車騎諮議叅軍義真與司徒徐聿之尚書令傅亮等不恊每有不平之言諫戒不納義真被廢入為中書侍郎南齊周顒為蕭惠開府主簿嘗諫惠開性太險峻惠開不悦答顒曰天險地險王公設險但問用險何如耳後魏韓麒麟叅征南慕容白曜軍事進攻升城師人多傷及城潰白曜將坑之麒麟諫曰今始踐偽境方圖進趣宜寛威厚惠以示賊人此韓信降范陽之計勍敵在前而便坑其衆恐自此以東將人各為守攻之難剋日久師老外民乘之以生變故則三齊未易圖也白曜從之皆令復業齊人大悦辛琛為榮陽郡丞太守元麗性頗使酒每諌之麗後醉輙令閉閤曰勿使丞入也張普惠為任城王澄所知澄為雍州刺史啟普惠為府録事叅軍澄功衰在身欲扵七月七日集會文武北園馬射普恵奏記扵澄曰竊聞三殺九親别疎昵之叙五服六術等衰麻之心皆因事餙情不易之道者也然則莫大之痛深扵終身之外書䇿之哀除於喪紀之内外者不可無節故斷之以三年内者不可遂除故敦之以日月禮大練之日皷素琴蓋推以即吉也若小功以上非虞附練除不沐浴此拘之以制也曾子問曰相識有喪服可以與扵祭乎孔子曰緦不祭又何助於人祭既不與疑無宴食之道又曰廢喪服可以與於饋奠之事乎子曰脱衰與奠非禮也注云爲其忘哀疾愚謂除喪之始不與饋奠小功之内其可觀射乎雜記云大功以下既𦵏適人人食之其黨也食之非其黨弗食也食猶擇人於射為惑伏見明教立射會之限將以二七令辰集城中文武肄武藝扵北園行揖讓扵中否時非大閲之秋景渉妨農之節國家縞禫甫除殿下功衰仍襲釋而為樂以訓百姓便是易先王之典教忘哀慼之至情恐非所以昭令徳示子孫者也按射義射者以禮樂為本怠而從事不可謂禮鐘皷弗設不可謂樂捨此二者何用射為又七日之戯令制無之班勞所施慮違事體庫府之虚宜待新調二三之趣停之為便乞至九月備飾盡行然後奏貍首之章宣矍相之令聲軒懸建雲鉦神民訢暢扵斯時也伏惟慈明逺被萬民是望舉動以書發言唯則願更廣訪賜垂曲採昭其管見之心恕其讜言之責則芻蕘無遺歌輿人有獻誦矣澄意納其言托辭自罷乃答曰文武之道自昔成規明耻教戰振古常軌今雖非公制而此州承前已有斯式既不勞民損公任其私射復何失也且纂文習武人之常藝豈可扵常藝之間要湏令制乎比適欲依前州府相率王務之暇肄藝良辰亦未言費用庫物也禮兄弟内除明哀已殺小功客至主不絶樂聽樂則可觀武豈傷直自事縁湏罷先以令停方獲此請深具來意北齊陳元康為髙祖相府功曹叅軍髙祖嘗怒世宗扵内親加毆蹋極口罵之出以告元康元康諫曰王教訓世子自有禮法儀形式瞻豈宜至是言辭懇懇至扵流涕髙祖從此為之懲忿時或恚撻輙曰勿使元康知之其敬憚如此杜弼為髙祖大行臺郎中相府法曹辛子炎諮事云湏取署子炎讀署為樹髙祖大怒曰小人都不知避人家諱杖之於前弼進曰禮二名不偏諱孔子言徴不言在言在不言徴子炎之罪理或可恕髙祖罵之曰眼㸔人瞋乃復牽經引禮叱令出去弼行十歩許呼還子炎亦䝉釋宥隋王韶為晉王廣行臺右僕射韶嘗奉使簡行長城其後王穿池起三山韶既還自鎻而諫王謝而罷之髙祖聞而嘉歎賜金百兩并後宮四人源師為蜀王秀益州總管司馬秀被徴恐京師有變將謝病不行師數勸之不可違命秀作色曰此自我家事何預卿師垂涕對曰師荷國厚恩忝叅府幕僚吏之節敢不盡心但比年已來國家多故秦孝王寢疾奄致薨殂二十年庶人太子相次淪廢聖上之情何以堪處而有勅追王已淹時月今乃遷延未去百姓不識王心儻生異議内外疑駭發雷霆之詔降一介之使王何以自明願王熟計之秀乃從徴秀廢之後益州官屬多相連坐師以此獲免皇甫誕為漢王諒并州總管司馬煬帝即位徴諒入朝諒用諮議王頗之謀發兵作亂數諫止諒不納誕因流涕曰竊料大王兵資無敵京師者加以君臣位定逆順勢殊士馬雖精難以取勝願王奉詔入朝守臣子之節必有松喬之壽累代之榮如更遷延䧟身叛逆一挂刑書為布衣黔首不可得也願察區區之心思萬全之計敢以死請諒怒而囚之陶模為嵐州司馬漢王諒據并州作亂刺史喬鍾葵發兵將赴逆模拒之曰漢王所圖不軌公荷國厚恩致位方伯謂宜竭誠效命以答慈造豈有大行皇帝梓宫未掩飜為厲階鍾葵失色曰司馬反耶臨之以兵辭氣不撓鍾葵義而釋之軍吏進曰若不斬模何以壓衆心扵是囚之扵獄悉掠取資財分賜黨與及諒平煬帝嘉之拜開府授大興冊府元龜卷七百二十三
