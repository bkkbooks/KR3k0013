body:
  text: 冊府元龜卷一百二十九宋王欽若等撰帝王部封建漢氏之興以同姓寡少復鑒嬴秦孤立之敗繇是立二等之爵以封功臣盖異姓王肇於此矣東京以降施姑息之政遵權宜之制良有之也其於褒崇􅈴望申之異數咸無聞焉元魏之世多被殊號垂及唐室著之班秩胙土典册寵名斯紀同光之後􅈴臣競爽或稱藩請命撫封傳世恭順傾嚮外禦宣力則必加之異數尊其爵禮稽若前訓咸可述焉至若貞觀之詔追用古道事雖中寢亦并叙云乃百執所封五等之制盖為常典此不備書漢髙祖初為漢王二年十二月立韓太尉信為韓王初信從漢王入漢中説漢王東鄉爭天下漢王還定三秦乃許王信先拜為太尉將兵畧韓地項羽殺韓王成聞漢遣信畧韓地乃令故籍㳺吳時令鄭昌為韓王項籍在吳時昌為吳縣令距漢信略地定韓地十餘城漢王至河南信急擊韓王昌昌降漢乃令立信為韓王常將韓兵三年十月韓信定趙遣使報漢因請立張耳王趙以撫其國漢王許之四年二月立韓信為齊王初信已破齊使人言曰齊邊楚權輕不為假王恐不能安齊漢王怒欲攻之張良曰不如因而立之使自為守乃遣張良操印立之七月立黥布為淮南王初項籍立布為九江王齊王田榮叛項王徵兵布稱病不往項王由此怨布布愈恐漢使隋何使九江項王使龍且攻破布軍布間行與隋何俱歸漢故立為王布與漢擊楚垓下項籍死布遂剖符都六九江廬江衡山豫章皆屬焉五年正月下令曰楚地已定義帝亡後欲存䘏楚衆以定其主齊王信習楚風俗更立為楚王王淮北都下邳魏相國建成侯彭越勤勞魏民卑下士卒嘗以少擊衆數破楚軍其以魏故地王之號曰梁王都定陶二月詔曰衡山王吳芮與子二人兄子一人從百粤之兵以佐諸侯誅暴秦有大功諸侯立以為王項王侵奪之地謂之畨君其以長沙豫章象郡桂林南海立畨君芮為長沙王又詔曰故粤王亡諸世奉粤祀秦侵奪其地使其社稷不得血食諸侯伐秦亡諸身帥閩中兵以佐滅秦項羽廢而弗立今以為閩粤王王閩中地勿使失職七月燕王臧荼反帝自將征之九月虜荼詔諸侯王視有功者立以為燕王荆王臣信等十人皆曰太尉長安侯盧綰功最多請立以為燕王十一年五月詔曰粤人之俗好相攻擊前時秦徙中縣之民南方三郡中縣之民中國縣民也秦始皇略取强梁地以為桂林象郡南海郡故曰三郡使與百粤雜處欲介其間使不攻擊會天下誅秦南海尉它居南方長治之它亦佗南海尉之名姓趙長治謂為之長帥而治理之也甚有文理中縣人以故不耗減耗損也粤人相攻擊之俗益止俱頼其力今立它為南粤王使陸賈即授璽綬即就也就其所居而立之十二年二月詔曰南武侯織亦粤之世也立以為南海王髙祖五年以象郡桂林南海長沙立吳芮為長沙王象郡桂林南海屬尉佗佗未降遥虛奪以封芮耳後佗降漢十一年更立佗為南越王自佗王三郡芮唯得長沙桂林零陵耳今復封織為南海王復遥奪佗一郡織未得王之惠帝三年舉髙帝時粤功追論其功曰閩君揺功多其民便附迺立揺為東海王都東甌世號曰東甌王武帝建元六年閩粤擊南粤漢遣大行王恢擊閩粤閩粤王弟餘善殺王郢以降帝曰郢等首惡獨無諸孫繇丑不與謀繇邑號也乃使中郎將立丑為粤繇王奉閩粤祭祀餘善以殺郢威行國中民多屬心竊自立為王繇王不能制帝聞之為餘善不足復興師曰餘善首誅郢師得不勞因立餘善為東粤王與繇王並處後魏太武即位初進司徒長孫嵩爵為北平王司空奚斤為宜城王藍田公長孫翰為平陽王其餘普增爵位各有差神䴥三年十一月封夀光侯叔孫建為丹陽王太延元年五月進宜都公穆夀為宜都王汝隂公長孫道生為上黨王宜成公奚斤為常農王廣陵公樓伏連為廣陵王文成興安元年十一月進平南將軍宋子使周忸爵為樂陵王南部尚書安子侯麗為平原王十二月建業公陵侯進爵東平王廣平公杜遺濮陽公閭若文並進爵為王二年正月司空杜元寶進爵京兆王尚書左僕射東安公劉尼尚書西平公源賀並進爵為王三月安豐公閭虎皮進爵為河間王太安元年十月以遼西公常英為太宰進爵為王二年九月河東公閭毗零陵公閭紇並進爵為王十一月尚書西平王源賀改封隴西王三年正月以漁陽公尉眷為太尉進爵為王和平三年正月以車騎大將軍東郡公乙渾為大康王獻文天安元年二月以侍中陸定國為東郡王皇興二年四月以南郡公李惠為都督闗右諸軍事雍州刺史進爵為王三年二月以上黨公慕容白曜為都督青齊東徐三州諸軍事青州刺史進爵濟南王十一月襄城公韓頽進爵為王孝文太和二年正月封昌黎王馮熈第二子始興為北平王二年四月淮陽公尉元進爵為王九月封司徒趙公陳建為魏郡王司空河南公苟頽為河東王侍中尚書太原公王獻為中山王侍中尚書隴東公張祐為新平王五年九月封昌黎王馮熙世子誕為南平王誕與帝同嵗㓜侍書學仍蒙親待尚帝妹樂安長公主拜駙馬都尉侍中征西大將軍南平王唐髙祖武徳二年七月和州賊帥杜伏威遣使來降授和州總管東南道行臺尚書令封楚王三年六月徙封吳王十月詔徐世勣父上柱國舒國公盖宜封濟隂郡王四年正月竇建徳行臺尚書令胡大恩以大安鎮降封定襄王太宗貞觀十一年六月戊辰以司空長孫無忌為越州刺史改封趙國公左僕射房𤣥齡為宇州刺史改封梁國公故司空杜如晦贈宻州刺史改封萊國公特進李靖為濮州刺史改封衛國公特進吏部尚書髙士亷為申州刺史改封申國公趙郡王孝恭為觀州刺史改封河間郡王同州刺史尉遲敬徳為宣州刺史改封鄂國公光祿大夫李世勣為蘄州刺史改封英國公左驍衛大將軍叚志𤣥為金州刺史改封褒國公左領軍大將軍程知節為普州刺史改封盧國公兵部尚書侯君集為陳州刺史改封陳國公任城王道宗為鄂州刺史改封江夏郡王太僕卿劉𢎞基為朗州刺史改封䕫國公金紫光祿大夫張亮為隰州刺史改封鄖國公因下詔曰周武定業胙茅土於子弟漢髙受命誓帶礪於功臣豈止重親賢之地崇其禮秩抑亦固磐石之基寄以藩翰魏晉已降事不師古建侯之制有乖名實非所謂藩屏王室永固無窮者也隋氏之季四海沸騰朕運屬殷憂戡剪多難上憑明靈之祐下頼英賢之輔廓清㝢縣嗣守寶厯豈予一人獨能致此時迍既共資其力世安而專饗其利乃睠於斯甚所不取但今之刺史即古之諸侯雖立名不同而監統一也故申命有斟酌前代宣條委共治之寄象賢存世及之典司空齊國公無忌等或材稱人傑望表國章論道廟堂寄深舟楫用資文武誠著艱難折衝閫外隐如敵國或志力忠烈寔為心膂或氣幹強果是曰爪牙䇿名運始功參締搆義貫休戚效彰夷險嘉庸懿績簡于朕心宜委以藩鎮改賜土宇餘官食邑並如故即令子孫世世承襲其後無忌等將之國情皆係戀不願行辭不獲免無忌子尚長樂公主乃因主陳請又繆出怨言以激帝曰臣披荆棘以事陛下今海内寧一不願違離而棄牧外州復與遷徙何異因上表固讓曰臣等夙奉明詔授臣刺史子孫繼襲事等建侯承恩以來進退唯谷公私迫切益深危懼竊以無勞而貴自開逐禍之原仰累明時虚行變古之道形影相弔若履春氷宗戚憂危如寘湯火臣無忌等誠惶誠恐頓首頓首死罪死罪臣聞質文迭變皇王之迹有殊今古相沿致理之方乃革仰維三代習俗靡常爰制五等隨時作教盖由力不能制因而利之禮樂節文多非已出逮夫兩漢用矯前違置守頒條蠲除曩弊無益之文覃及四方不易之理有逾千載今為臣等復此奄荒欲其優隆錫之茅社施于子孫永貽宗嗣斯乃大鈞播物秋毫益施其生小人踰分後葉必嬰其禍何者違時易務曲樹私恩謀及庶僚義非僉允方招史冊之誚有紊聖代之綱此其不可一也又臣智效罕施器識庸陋或情縁后戚遂陟台階或願想披荆便蒙夜拜直當今日猶愧非才重裂山河逾彰濫賞此其不可二也又且孩童嗣職義乖師儉之方任以褰帷寧無傷錦之弊上干天憲彛典既有常科下擾庶民必致餘殃扵後一掛刑網自取誅夷陛下深仁務延其嗣翻令勦絶誠有可哀此其不可三也當今聖歴休明求賢分政古稱良守寄在共理此道之行為日滋久緣臣等忽有之改張封植兒曹失於求瘼百姓不幸將焉用之此其不可四也在兹一舉為損實多曉夕深思憂貫心髓所以披丹上訴指事明心不敢浮辭同扵矯餙伏願天澤諒其愚欵特停渙汗之㫖賜其性命之恩太宗謂之曰割地以封功臣古今之通義也意欲公之枝葉翼朕子孫長為藩翰傳之永久情在此耳而公等薄山河之誓發言怨望朕亦安可强公以土宇耶扵是遂止中宗神龍元年正月封右羽林大將軍李多祚為遼陽郡王食實封八百戸以誅張易之兄弟功也五月封侍中齊國公敬暉為平陽郡王桓彦範為扶陽郡王袁恕己為南陽郡王中書令漢陽公張柬之為漢陽郡王中書令博陵郡公崔𤣥暉為博陵郡王並加特進仍令罷知政事仍聴朝朔望𤣥宗天寶九載十月封安禄山為東平郡王制曰寄重者位崇勲髙者禮厚欽若古訓抑惟舊章開府儀同三司兼右羽林軍大將軍員外置同正員御史大夫范陽大都督府長史柳城郡太守持節充范陽節度經略度支營田陸運押兩蕃渤海墨水等四府節度處置及平盧軍河北海運并管内採訪等事上柱國柳城郡開國公安禄山性合韜鈐氣禀雄武聲威振於絶漠捍禦比於長城戰必尅平智能料敵所以擢升臺憲仍㐲旌麾既表勤王之誠屢申殄冦之畧頃者契丹負徳濳有禍心乃能運彼深謀累梟渠帥風塵肅静斥候無虞不有殊恩孰彰茂績疆塲式遏且薄衛霍之功土宇斯開宜踐韓彭之秩可封東平郡王仍更賜實封二百戸通前五百户餘如故十二載八月封隴右節度使哥舒翰為西平郡王肅宗乾元二年七月封朔方都知兵馬使節度副使僕固懐恩為大寧郡王寶應元年建辰月辛未詔曰命將之選當仁實難非夫文可經邦不能安人和衆武可禁暴罔以尅敵成功允藉宏才爰申錫命司徒中書令靈州大都督府長史單于鎮北副大都䕶持節充朔方節度闗内度支營田鹽池押諸蕃部落副大使知節度事六城水運使兼邠寧鄜坊等道節度副大使上柱國代國公郭子儀河嶽間氣巖廊重寶器量深識寛而有謀術應通方用而無滯自經難阻實擁旌旄遂能尅復二京折衝千里厥戎將殄時乃之功久勤啟沃載竭忠讜人之望也天實賚予今殄寇未寧興師頗廣鎮守經制已有區分而籌畫指麾必資專制將軍辭第無以家為丞相憂邊思平國難固以訏謀之用宜申總統之威其將戡定外虞澄清列郡光膺藩屏之寄式崇社稷之勲對揚休命以永終譽可封汾陽郡王知朔方河中北庭潞儀澤沁等州節度行營兼興平定國等兵馬副元帥仍充本管内觀察處置使餘如故代宗寶應元年五月丙戌太尉兼中書令鄭國公李光弼進封臨淮郡王八月劍南狂賊徐知道為麾下將李忠勇所殺劍南州縣盡平封忠勇為臨晉郡王又封平盧淄青節度使侯希逸為淮陽郡王二年閏正月戊申封成徳軍節度使李寶臣為清河郡王是年又封幽州節度使李懐仙為武威郡王魏博節度使田承嗣為鴈門郡王六月封陳鄭澤潞節度使李抱玉為武威郡王廣徳元年封尚書右僕射郭英乂為定襄郡王永泰元年二月封神䇿軍都虞候劉希暹為交河郡王大將李守泰為同谷郡王孫獻心為宣城郡王楊通逹為髙平郡王叚子英為遂寧郡王八月涇原節度使兼御史大夫馬璘封扶風郡王十月封朔方大將孫守亮九人為異姓王又封李國臣等十三人為異姓王是月進封渭北節度使李光進為武威郡王大厯二年二月封華州牙將姚懐為感義郡王李延俊為永化郡王以斬周智光之功也六月封荆南節度江陵尹衛伯玉為城陽郡王五年四月封幽州節度使朱希寀為髙宻郡王九年三月封幽州節度使朱泚為淮寧郡王十二年徙封遂寧郡王九月封平盧節度都知兵馬使試殿中監王廷俊為陽城郡王都虞候試殿中監李令徳為狄道郡王步軍使試太常卿劉神藻為順正郡王都押衙試太常卿許皎為隣山郡王並賜實封五千戸十年二月封平盧淄青節度使李正已為饒陽郡王徳宗嗣位初封四鎮北庭行軍涇原鄭潁節度使叚秀實為張掖郡王建中元年六月封涇州禆將試殿中監劉海賔為樂平郡王賞殺劉文喜也二年五月封淮寧節度使李希烈為南平郡王三年四月封幽州節度使朱滔為通義郡王九月封河陽節度使李芃為開封郡王四年冬封朱忠亮為東陽郡王忠亮事薛嵩為將鎮普潤朱泚之亂以麾下奔奉天徳宗嘉之故封白孝徳累有功為安西北庭節度鄜延邠寧節度封昌化郡王興元元年二月封成徳節度兼幽州盧龍兩道節度王武俊為琅琊郡王是嵗又封武俊子徳棣觀察使士貞為清河郡王貞元初封士貞弟冀州刺史士清為北海郡王八月癸卯加神䇿軍京畿渭南渭北鄜坊節度及兵馬副元帥司徒兼中書令合川郡王臣欽若等曰本傳及實錄不載封合川郡王年日食實封一千五百户李晟兼鳳翔尹充鳳翔隴右節度度支營田觀察使仍充管内諸軍及涇原四鎮北庭行營兵馬副元帥改封西平郡王加河東保寧軍節度觀察使太原尹北都留守檢校司徒平章事北平郡王馬燧奉誠軍及晉慈隰節度并管内諸軍行營兵馬副元帥以靈鹽豐夏節度使邠寧振武奉天永平等軍兵馬副元帥侍中兼靈州大都督樓煩郡王食實封一千八百戸渾瑊為河中尹河中絳州節度觀察等使仍充河中同絳陜虢節度及管内諸軍行營兵馬副元帥改封咸寧郡王十月李希烈將李澄以滑州降以為汴滑節度封武威郡王是年又封禁軍將軍李惟簡為武安郡王是年又封神䇿京畿渭南商州節度尚可孤為馮翊郡王是嵗又封靈鹽豐夏節度杜希全為餘姚郡王貞元元年封魏博節度田緒為常山郡王六年四月宣武軍節度使檢校司空平章事懐徳郡王劉𤣥佐徙封彭城郡王賜實封八百戸十一年八月改封魏博田緒為鴈門郡王十七年封劍南西川節度使韋皋為南康郡王賞破吐蕃功也憲宗元和二年正月封振武軍節度使閻巨源為定襄郡王六年封招義節度使盧從史為范陽郡王八月封劍南西川節度髙崇文為南平郡王十三年封涇原行營節度郝毗為保定郡王十四年二月封義成軍節度劉悟為彭城郡王敬宗寶厯二年封幽州節度朱克融為吳興郡王是年封幽州李載義為武威郡王文宗太和三年十一月封武寧節度王智興為鴈門郡王武宗會昌中封幽州節度張仲武為蘭陵郡王僖宗中和元年封西川節度陳敬瑄為潁川郡王是年封河中節度王重榮為琅琊郡王光啟元年封徐州節度時溥為鉅鹿郡王昭宗乾寧四年三月制封鎮國軍節度韓建為昌黎郡王光化元年改封潁川郡王建累辭王爵改封許國公是年九月封鎮海東節度使錢鏐為吳王光化元年九月制封魏博節度使羅𢎞信為臨清王二年七月封武貞節度使雷滿為馮翊郡王荆南節度忠萬等州觀察成汭封上谷郡王忠義軍節度趙凝封南平王後封楚王天祐元年封鎮州王處直為太原王後唐莊宗同光元年十一月制忠義太保等軍節度延鄜管内觀察處置等使檢校太師兼中書令北平王髙萬興復封北平王萬興在梁朝已封北平至是復以舊爵授之是年湖南節度馬殷首脩職貢復封楚王梁貞明中已封楚王此故云復封二年二月辛巳以檢校太師守尚書令兼河南尹判六軍諸衛事魏王張全義為守太尉兼中書令孟州刺史充河陽三城節度孟懐等州觀察處置等使河南尹封齊王是年封荆南節度髙季興為南平王三年八月正衙命史冊兩浙吳越王錢鏐為吳越國王癸亥太常禮院奏吳越王錢鏐行冊禮宜取八月二十七日丁亥吉奉勅其印宜以吳越國王之印為文仍令所司以金鑄造明宗天成二年四月癸丑制曰朕聞襲弓裘之美惟孝承家秉旄鉞之權惟忠報國其有顯居世祿傑出時材疾風端勁草之心積雪驗貞松之節恐毁我室非閲於墻宜遵紹續之文俾授統臨之寄爰於剛日特舉彛章威武軍節度觀察留後起復雲麾將軍檢校太傅使持節舒州諸軍事守舒州刺史兼御史大夫柱國琅琊縣開國伯食邑七百戸王延鈞拱北華星圗南巨翼垂金精於𤣥象刷玉宇於雄風而自皂盖分憂清源共理五馬之聲光首出八龍之價譽相髙既綰珪符俄從金革在原無惠咸推晉后之賢當璧有徵大叶楚人之望而又上欽天眷傍沮物情守祖考之貽謀却藩宣之承制心傾皎日義惡浮雲建溪之誓帶如河閩嶺之礪山齊嶽父風宛在臣節彌堅是命髙建牙璋洞開玉帳錫以油幢瑞節廣其淥水紅蓮寵冠阿衡貴同緹騎尊以帥而表敬實其户而增封併示貞榮仍加懿號於戲象賢務徳克揚嗣子之名進律推恩當顯使臣之禮勉膺殊渥永保令圗可依前授起復雲麾將軍右金吾衛大將軍外置司正員檢校太師守中書令福州大都督府長史充武威軍節度福建管内觀察處置兼三司發運節度封琅琊王三年命左散騎常侍陸崇持節冊為閩王六月以天䇿上將軍湖南節度使楚王馬殷封楚國王七月中書奏馬殷封楚國王禮文不載國王之制請約三公之儀使行冊奉制宜依閔帝應順元年正月壬辰制以荆南節度使檢校太尉兼中書令江陵尹渤海郡侯髙從誨可封南平王武安武平等軍節度觀察等使檢校太尉兼中書令行潭州大都督府長史扶風郡侯馬希範可封楚王末帝清泰元年制以幽州盧龍軍節度押奚契丹經略盧龍軍等使兼北面行營招討使檢校太師中書令行幽州大都督府長史天水郡公趙徳鈞封北平王平盧軍節度押新羅渤海兩蕃等使檢校太師中書令樂安郡公房知温封東平王晉髙祖天福二年五月制天雄節度秦國公范延光可封臨清王又制鳳翔節度使西平王李從曮封岐王是月封平盧節度王建為臨淄王二年封東平王五年入覲進封韓王周太祖顯徳元年正月以山南東道節度襄鈞房復觀察等使檢校太師守太傅中書令南陽王安審琦封陳王以天平軍節度鄆齊埭觀察等使檢校太師守太保中書令淮陽王符彦卿充大名府天雄軍節度使進封魏王以荆南節度荆歸峽觀察等使檢校太師兼中書令江陵尹渤海郡王髙保融封南平王以定南難節度夏綏銀宥觀察等使檢校太師中書令隴西郡王季彛殷封西平王册府元龜巻一百二十九
