body:
  text: 册府元龜卷一百七十七宋王欽若等撰帝王部姑息第二唐順宗貞元二十二年正月即位二月壬子淄青節度使李師古以師次滑州西界初告哀使未至鄭滑軍禆將吏自京師得遺詔本歸以示節度李元素元素以師古隣接欲為不自外使宻以其本示之師古不受曰京師無訃告何故妄言杖其使幾死舉兵以脅元素元素懼上表請自貶朝廷兩慰解之初師古聞消息遂以師自至濮州伺候為變借元素為名以動衆及聞帝即位即罷界上兵憲宗永貞元年十二月己酉以新授給事中前劒南西川攝節度行軍司馬知留後兼御史中丞劉闢為檢校工部尚書兼成都尹御史大夫充劒南西川節度副大使知節度事管内度支營田觀察處置統押近界諸蠻及西山八國兼雲南安撫等使於時韋臯卒闢阻兵以求節度詔除給事中冀其入朝闢不受缺貞元舊風也元和元年六月淄青李師古死弟師道擅命遣判官崔承寵孔目官林英相繼奏事時杜黄裳作相欲乗其未定也以計分削之帝以蜀川方擾不能加兵於師道遂命建王審遥領節度以師道為留後嵗餘竟授以旌節二年八月命給事中房式充幽州成德義武等軍宣慰使時三節度劉濟王士真張茂昭各持宿嫌交惡聞於朝故有是命四年三月以淮南節度判官孔戡為衛尉寺丞分司東都戡嘗佐昭義軍節度使盧從史數以事爭論不從因謝病去從史彊以禮遣而陰銜之居東都久之為淮南節度使李吉甫所辟而從史忿嫉累請貶降故有是命十一月彰義軍節度吳少誠卒五年三月授遂王宥節度以彰義軍兵馬使兼申州刺史吳少陽為銀青光禄大夫檢校左散騎常侍權知蔡州刺史兼御史大夫充彰義軍節度申光蔡等州觀察等使留後仍賜上柱國初少誠疾亟家僮單于熊兒者偽以少誠意取少陽至時少誠已不知人乃偽署少陽攝副使知軍州事少誠子元慶年二十餘先為軍職少陽宻害之及少誠死少陽自為留後時王承宗求繼士貞位不受詔帝業以討承宗不欲兵連兩河乃以宥王遥領少陽為留後焉五年七月庚子鎮州王承宗遣節度巡官崔遂上表二封乞自陳首兼請吏員輸其常賦是月制曰夫蓋之如天容之如地王者之盛德叛而伐之服而捨之魯史之明義所患敎化之未𢎞不患威令之不振所患忿懥之不當不患臣妾之不恭逐稔惡以彰典刑納忠誠以滌瑕釁糾慝宥罪其在斯乎朕嗣守丕圖䖍奉先訓明有所未燭信有所未孚德罔洽人而懲法度之未一道靡化物而慮風俗之未齊頃者誤於知人因以動衆雖亂是用長俾投於荒而靖以自思敢恡其過故太尉中書令武俊嘗㧞艱危有大勲力重以親戚連其子孫壯容圖於綵繢武烈書於鍾鼎十代之後尚延其寵渥四海之内豈利其土田我之初心葢不如此盧從史首獻章表深陳便宜是以頗類于向公如流遂昧於進熟乃割二郡别為一鎮付其宻親以示無外而承宗不諭朝廷遂干國章以至于斯事豈得已既而将帥同德干戈四臨幽薊以節制之衆収城池易定以雄猛之師獻俘馘火則方燎天其可逃然而大兵所罹庶物皆顇農桑遂廢於壠畝老幼咸膏於鋒鏑為之父母深用憫然王承宗困而能通迷而斯復冐於白刃貢以赤誠仰日月以激於中腸罄封蔀而誓於後効賦奉其常數官奉其闕員以闔境之性命祈肆赦之恩澤我亦思省至於再三違命而用刑葢有常憲順命而赦罪是亦前經寰海之饒寜私於數縣之地雨露之溥豈遺於一境之人加恩俾復其土疆改過是還其官秩其王承宗特宜洗雪依前起復雲麾將軍守左金吾衛大將軍員外置同正員外檢校工部尚書兼鎮州大都督府長史御史大夫上柱國充成德軍節度管内度支營田等使鎮冀深趙德棣等州觀察處置使成德軍将士官爵實封等一切如舊待之如初諸道行營將士等皆賈雄心争輸忠力以戰則勝以攻則摧加以䟦渉道途暴露原野各宜賞級仍并歸還宜共賜物二十八萬四百二十端疋竝令度支隨便近即時支遣仍令糧料使與本軍計㑹豐厚宴設於戲帝王作兵以輔文德雷雨施澤亦酌人情况乎忠烈之遺勲親之後每稱破敵嘗用愧懐聞覆衆而増傷覽㨗書而興歎一夫不獲尚泣於前王百姓何辜罹禍於兹日雖為彼制孰非吾人事茍便時朕寧屈已庶當修政思理推誠致和奉天地之心大祖宗之業姑以濟物豈務申威虞帝之征載示兩階之舞殷王之網式𢎞三面之仁惠此方隅置於安静凡百多士宜諒予懐初王士貞卒三軍推承宗為留後朝廷伺其變累月不問承宗懼上表請割德棣二州繇是起復授成德軍節度使又授德州刺史薛昌朝為德棣觀察使承宗遣數百騎往德州虜昌朝以歸乃詔削承宗官爵命左神䇿䕶軍中尉吐突承璀以討之是役也招討之任非中外所期又諸軍多觀望飬冦逗留不進轉餉糜費日以鉅萬淄青幽州累有章表請赦承宗帝乃因從史之罪歸其惡而宥承宗不得已而為之己酉加義武軍節度使張茂昭檢校太尉兼太子太傅幽州節度使劉濟檢校司徒兼中書令魏博節度使田季安檢校司空兼太子太保辛亥加河東節度使范希朝檢校司徒淄青節度使李師道檢校尚書右僕射横海軍節度使程執恭檢校尚書右僕射竝以兵罷加賞也乙夘幽州節度劉濟為其子總所殺朝廷不知其事以總為起復檢校工部尚書兼幽州大都督府長史充幽州盧龍軍節度管内度支營田觀察處置押奚契丹兩蕃經畧盧龍軍等使七年十月魏博監軍奏當道三軍舉其將田興知軍州事甲辰制曰經邦制理先務於安人秉義納忠諒存乎體國其有堅持正性動合衆心才當與能善足垂勸則宜荷推轂之寄為分閫之臣建侯貞師宣我利澤魏博軍步射都知兵馬使同節度副使檢校祕書監兼御史中丞浙國公田興深明有融忠孝是力介若金石通乎弛張效用思齊於昔賢潔誠期報於君父生此王國跡淪戎藩逢時乃彰㑹節有立曰元臣即代裔子幼年小人任事以作威諸將屏息而増懼政理滋紊刑章亟乖羣臣危疑幾致顛越朕用憂閔方圖輯寧而興任在轅門深惟大體義勇斯奮奸雄伏辜士心所歸不令而肅征鎮安固厥庸茂焉既而保貴胄之家將致上國全故帥之績求復中軍表章屡疏情懇備至以勲則特異以義則可觀周旋令圗葢有餘裕朕髙懸爵命以待能賢嘉爾殊勞允宜懋賞晉軍謀帥郤縠嘗學於詩書漢將議功竇融實冠於名節魏郊巨鎮河上奥區杖鉞可以宣國威觀風可以率彞典習俗至於丕變疲畦徯而汔康佇光册書用寄心膂榮級繼登於七命顯秩超踐於六卿仍兼副相之雄以重元戎之委服兹休命其懋戒哉可銀青光禄大夫檢校工部尚書兼魏州大都督府長史御史大夫充魏博等州節度管内支度營田觀察處置等使勲封如故初貞元中昭義軍節度使李抱真卒雒州刺史元誼以州兵五千叛歸田緒後田季安納誼女為妻及季安以風疾廢亂頗虐殺人子懐諫年十一為府司馬兼御史中丞節度副使元氏乃召督兵將指明禍福約立懐諫為帥皆唯唯莫敢違乃遷季安於别寢月餘季安卒有家僮蔣士則主親兵持權數易大將懐諫出令盡士則之為也軍中以朝廷久無命衆情不固田興者其先與季安别族後稱為從祖兄少在魏軍以武藝信厚為衆所服興因寓直而廵更卒迭來觀興興懼深拒之質明入衙兵衆數千環附興興驚遽頓仆於地其衆連呼不散興揚言曰欲聽吾命且勿犯副大使衆皆曰諾亂兵殺蔣士則等十數人而止即日移懐諫於外興既立為留後葬季安畢送懐諫於京師十月辛酉制曰奉君親竭忠孝人倫之大端也賢智所以盡心賞功勞懋明節國家之急務也皇王所以致理朕嗣服丕業恭臨萬邦每念政之未孚化有不暨怵惕惟勵載勤于懐嘗以為宵質禀靈皆思嚮善亦甄明撫導推示至誠樹績必使其光揚罹患必圖其安緝永言及此終食豈㤀魏博大藩東夏雄屏軍戎勇於見義黎庶懐於有仁自中原始兵革之虞河朔為用武之地抱才器者或感恩而盡力申節効者果因事而彰明時將太寧斯獲予志近田季安薨謝兵於幼童奸邪憑依妄肆威福一境危慄懼致覆亾比屋凋傷疲於杼軸田興仗義奮發剪去憸人大安方隅屢獻忠懇達三軍奉上之志激千里望闕之誠誓遵典彞不變舊俗忠諫指切感於朕心是用特授旌旄俾靖封畧言念將士同德叶謀守正如金石之堅凌寒挺松栢之操垂令名於不朽示臣節於將來清風載揚丹欵可鑒嘉尚歎息勞於寢興賞不踰時式示旌勸其管内百姓等身勞耕稼力竭征徭每念於懐用當憂憫宜令司封郎中知制誥裴度往魏博宣慰親諭朕意仍賜錢一百五十萬貫以河陽院諸道合進内庫綾絹綿等支送充賞給將士及州縣百姓差科宜給復一年使之蘇息州縣之中或有殘破偏甚者委田興逐便宜處分朕以布澤之時務從人欲好生之德期洽衆心魏博管内宜赦見禁囚徒其與田興叶心立功大將及判官等委興具名銜聞奏當有甄升如有父母在别加優恤當道從前已來官吏將校等或忠義可嘉而刑戮濫及如有此色委田興條録奏聞當加追贈如有家口見存宜厚加優恤管内髙年惸獨或天寳遺人夙霑皇化或孤獨廢疾不能自存委田興差官存問仍量給粟帛管内有清勤奉職為衆所知者委田興具事疏奏聞當加進改如身在丘園行義素著或才兼文武名節可稱亦委田興具名聞薦贈太尉季安姻戚舊臣嘗任將相飾終之典宜示優崇其葬事委田興差官勾當禮物之間務從周厚田懐諫在疚之初政出羣小因致軍府騷然不寧以其年幼有足矜憫待其到京之日一門量加存恤嗚呼聳善念功惟恐不及䘏人厚下惟恐不豐庶乎大治雍熈遂櫜弓矢為仁繇已其道信然樹德務滋在乎終始凡百多士宜悉朕懐田興頗觀書知君臣父子之道嘗力行之朝廷知其嚮順宰臣李絳上請命使招諭及厚加賞賜及裴度至興極懼又請度至封内州縣宣揚恩澤辛巳以前魏博節度副使兼馬步都知兵馬使田懐諫起復為遊擊將軍守右監門衛將軍仍賜宅及芻米等十年正月乙酉進授宣武軍節度使檢校司空韓𢎞守司徒依前同中書門下平章事貞元初德宗方以公相寵勲臣宰相虚列官代於制勑者多至八九及數年老者不世繼守者無功遂不加其名元和初平章事在藩鎮不過一二而已至三年始加𢎞檢校司空同平章事後王鍔以檢校司徒凡歴三大鎮及在太原有功李吉甫請授鍔同平章事𢎞自領汴州以敢殺致安勢重於中而位在鍔下每咎吉甫及吉甫卒乃致書於宰相武元衡以露其忿自處將帥二十年未嘗再覲朝廷亦未能以誠信待𢎞方欲用其形勢以臨淮西故命守司徒同平章事以加鍔上焉其秋出師遂命𢎞為淮西諸軍行營都統遣其子公武以兵萬三千人㑹於行營十二年賊平就加兼侍中累拜封許國公又以公武為鄜坊節度使十一年十一月丙寅幽州節度使檢校司空劉總就加同中書門下平章事鄆州節度使李師道進位檢校司空初師道幸吳元濟之亂因冦徐州李光顔㧞凌雲栅師道懼乃偽貢誠欵帝以力未可并討乃遣給事中栁公綽往宣慰且觀其所為師道茍以遜順為辭故尚加命寵十四年二月己巳勑王承宗與三軍將士輸忠效力叶志同心恭守典章誓除冦虜俗化丕變風猷特高如聞水旱之餘供費未贍務令優濟保洽恩和宜賜綾絹布共萬端疋初王師討吳元濟承宗與師道繼獻章表請宥元濟其牙將尹少卿奏事至中書見宰相語意不遜武元衡怒叱出之承宗益不順遣盜殺元衡帝赫怒命六節度之衆討之時淮西用兵國用虚竭詔權罷焉至十二年誅元濟承宗始懼求救於田𢎞正遣人送其子及牙將至闕下帝以𢎞正表疏相繼重違其意而有斯命八月己酉制曰納大忠樹嘉績為臣所以明極節錫殊寵進髙秩有國所以待元臣况乎邦敎誕敷王言總㑹百辟攸憲四方式瞻永念於懐久虗其位載揚成命僉曰休哉宣武軍節度副大使知節度事汴宋亳潁等州觀察處置等使開府儀同三司守司徒兼侍中持節汴州諸軍事汴州刺史上柱國許國公食邑三千户韓𢎞降神挺材積厚成器中藴深閎之量外標嚴重之姿有輔國濟時之心推誠不耀有夷凶禁暴之畧杖義益彰自鎮浚郊二十餘載師徒禀訓而咸肅吏士奉法而愈明俗臻和平人用庶冨威聲之重隠若山崇屬者淮濆肆征命統羣帥克殄殘孽惟乃有指蹤之功及齊境興妖分師進討遂梟元惡惟乃有畧地之効既聞旋斾俄請執珪深陳魏闕之誠逺繼韓侯之志朝天有慶就日方申又抗表章固辭戎旅三加敦諭所守彌堅于藩于宣諒功於注意我弼我輔難違其衷懇式遂良願載兼上司論道之崇因之以齊八政中樞之長昇之以贊萬務𤣥衮赤舄備於寵光不有其人孰膺斯任於戲出總兵柄入叅廟謨家國之慶盈門君臣之道交泰為我柱石古今曷儔服而滋恭以佑乃辟可守司徒兼中書令此官汾陽王子儀西平王晟以冠代功業而居之𢎞二十年不入朝其累遷轉至於斯拜蓋朝廷始以姑息終用大體其勢然也𢎞鎮大梁一十餘嵗所管四州征賦皆以自贍未嘗有上供者專務聚財積穀峻法樹威而荘毅寡言沈靖多斷鄰封如李師古吳少誠軰皆憚之詔使宣諭𢎞多倨待朝廷每為葢覆其後勢屈入覲寵待逾等人臣之幸如𢎞者葢寡焉穆宗長慶元年三月乙夘以權知京兆尹盧士玖為檢校右散騎常侍兼瀛州刺史御史大夫充瀛莫等州都團練觀察等使時幽州節度使劉總娶涿州刺史張臯女臯與士玖有内外之屬故請其瀛莫二州為兼察以士玖上請因而用之非選衆任能也七月幽州監軍使奏軍亂囚節度使張𢎞靖於别舘推朱洄知兵馬事洄推其子克融統軍務詔諸軍討之十二月乙酉制赦幽州軍拘留張𢎞靖盧士玖暨專害府寮之罪以幽州都知兵馬使檢校殿中監兼監察御史朱克融為檢校左散騎常侍幽州節度使自憲宗皇帝削平羣叛之後帑藏空虚帝踐阼之初錫賚過制及幽鎮事起徵發賞賜財力殫竭又行營諸節度及領偏師者皆有勑使監鎮悉選取驍騎􅃅衙隊自防衛列于陣者皆羸懦之衆故戰則奔北鮮有成功議者以是役命將非不良徵師非不多而無尺寸之効者制置不一朝廷以克融能全𢎞靖為名因而赦之以廷湊殺𢎞正之罪故併兵誅之顧物力事勢然爾八月鎮州兵亂殺節度使田𢎞正推都將王廷湊知兵馬事𢎞正子布鎮涇原朝廷急徵布為魏博節度布既頒賚軍士乃選其將史憲誠為先鋒兵馬使以憲誠前出已麾下必能輸竭故盡以精銳付焉是時屢有中使賫急詔促其進兵布遂以全軍三萬七千出抵賊之冀州南宫縣進軍下賊二栅而魏人怯於格戰且以寒雪餽餉不給寢無鬭志憲誠故嘗懐貳因從而間之俄有詔分布軍與光顔合勢東救深州其衆因大潰多為憲誠所有布提兵八千以十二月十日還魏州十一日㑹諸將復議興師而將卒益驕惰皆曰尚書能行河朔舊事則死生行之若使戰皆不能也布自度其下終不為用歎曰功無成矣布即日宻表陳軍情入啟父靈抽刃刺心而絶乃以魏博中書先鋒兵馬使史憲誠為檢校工部尚書兼魏州大都督府長史充魏博等州節度觀察等使先是田布為禆将時遇憲誠於行伍間累進戎職皆繇布薦寵及布統魏師待之益厚兼命其子為親将竟謀背叛布死遂據其城府朝廷不得已因命焉二年二月甲子制曰朕以菲德纂承鴻緒屬先皇帝掃刷中㝢康濟兆民八荒晏然五兵咸息嘗兢懐于繼述思致理於和平豈以樂戰為心佳兵在念而鎮州以承宗云亡自歸誠欵幽州以劉總懇志願釋兵符相繼來同無思不服非朕勤於逺畧力以致之亦既綏柔咸加濡澤不愛金帛以惠於戎士不吝爵賞以寵其偏禆復加台臣咸推謹厚庶將朕志以靖方隅而佚於既安莫能思患曽未累月旋聞叛離朕亦欲因其人心以命長帥顧念𢎞正盡忠先朝身嬰戕害家受屠戮為之元首能不痛心是用下制先申告諭求其兇惡兾釋幽寃仍令四面節制各守封􅆠不欲遽加明罰所望自効忠誠而將士等懼罪以相保王庭湊為衆之所迫固其州壤捍以兵鋒每聞戰爭永念黎庶為之君父又可忍乎是用輟食忘寢晝夜萬慮恭惟烈祖之訓必用兼愛之心務以安人為國本不以窮武為威力顧予寡昧敢忘遵承為追念而興師已極君臣之分為軫憂而捨罪豈非帝王之道况王庭湊倉卒之際固非始謀接之以恩榮自當展其志意委之以戎鎮必兾効於勲庸祻福無門行之即是弛張在我用亦何常茍推信誠便保忠順茍得其衆孰非吾人推而任之式示榮寵宜特捨雪仍授檢校右散騎常侍兼鎮州大都督府長史御史大夫充成德軍節度鎮冀深趙等州觀察處置等使應承成德軍將士官爵一切依舊待之如初仍令兵部侍郎韓愈充宣慰使於戲捨彼三軍惠非不至於彼闔境恩非不周今𢎞寛大之恩以應陽和之令使離散者見親愛之樂暴露者歸室家之安各宜感悦以就寧泰布告中外體朕意焉是時河朔復亂庭湊寔首其惡殘害長帥及其友屬僚佐從而殲焉其逆如此而竟後舍雪授以節制盖兵不得息八年矣愛人含垢制時以宜丙寅制以前成德軍節度鎮冀深趙等州觀察處置等使金紫光禄大夫檢校工部尚書兼鎮州大都督府長史御史大夫上柱國隴西縣開國男食邑三百户牛元翼為檢校工部尚書兼襄州刺史御史大夫充山南東道節度觀察處置臨漢監牧等使初元翼以守深州功有成德鎮兾王庭湊以已罪未赦圍元翼益急凡官軍救元翼者三面而至皆屈於芻食不能前進雖李光顔亦堅壁而已日與軍士分採芻薪度支給以紅腐之粟人不及救庭湊以故得設數重之圍至是不得已授庭湊節而寵元翼以漢南焉三月盧龍軍節度使朱克融成德軍節度使庭湊竝進檢校工部尚書時庭湊雖得節制怒元翼之堅守故深州之圍不解克融以兵同濟其惡至是有宣慰中使至幽州克融上言前月得裴度書令解深州之圍以今月一日抽兵還本道訖庭湊兵亦稍解故竝以尚書寵之是月徐州監軍使奏當道節度副使王智興自河北行營領兵廻以今月十四日入城逐其節度使崔羣智興自領軍務已未以武寜軍節度副使兼御史大夫王智興為檢校工部尚書兼敘州刺史御史大夫充武寜軍節度徐泗濠等州觀察處置等使智興出自武寜行伍累至大將元和末將徐兵北扞李師道嘗以少擊衆聲振海岱間累拜沂州刺史及奉詔㑹討王庭湊智興領兵三千仍加節度副使以寵之本軍有勇敢者多在其所統既居戎倅以功位自疑崔羣亦慮其歸還非己能制累表請追智興授以他官事未行詔班師智興以幽鎮二方怙亂受節繇是幸心益熾先期入境羣聞之驚使從事勞問且言先輸其器甲仍留其衆於城外以十騎自隨智興不從率衆斬關而入見羣及監軍使拜而伏曰此軍情也乃為羣具行夫騎乗無不周悉及判官從吏皆如素焉又殺不同己者十餘人然後以兵送羣至埇橋遂掠鹽鐵院錢帛及汴路進物商旅資貨率取其三分之二又以兵刧濠州刺史侯𢎞度棄城走朝廷以新罷兵力未能討遂以節授之四月王庭湊表請追贈三代乃贈庭湊曽祖五哥之越州都督又贈其祖未怛活左散騎常侍又贈其父升朝禮部尚書徇其特請也文宗太和元年五月丙子以天平軍節度使守司徒同中書門下平章事烏重𦙍為横海軍節度使兼滄州刺史充滄景德棣等州觀察處置等使以前攝横海軍節度副使檢校國子祭酒滄州長史侍御史李同㨗起復為雲麾將軍守右衛大將軍員外置同正員檢校右散騎常侍兼兖州刺史御史大夫充兖海沂等州節度觀察處置等使就加魏博節度使檢校司空史憲誠檢校司空同中書門下平章事丁丑就加幽州節度使檢校户部尚書李載義檢校尚書右僕射平盧軍節度使檢校工部尚書康志睦為檢校户部尚書鎮州節度使檢校司空王庭湊為檢校司徒是時既以李同㨗節度兖海尚虞羣帥生事故咸有就加之命以寵安之二年九月滄州節度使李寰為夏州刺史充夏綏銀宥等州節度觀察押藩等使依前檢校左僕射寰前在滄州擁兵不進知中外議論自懐不安遂請入覲詔㫖優許因有是命十一月賜定幽州綾絹各五萬疋昭義綾絹三萬疋有中使自易定來奏諸道行營節度賞薄為詞故累加給賚是時滄鎮未平王師業已問罪則置供軍糧料使日費甚厚而兩河諸帥重邀功賞每與賊戰輙増首級以聞其後對見賜與者衆矣至於發帑藏徵散収贈帛征馬去亦無筭繇是天下守土者以助軍進獻率不下數萬疋三年三月乙巳太原奏中使杜英奇到易定行營宣舉當道兵馬使傅毅充易定節度三軍不受共舉易定都知兵馬使張璠其傅毅領軍三百二十人走投本道戊申以張璠為檢校左散騎常侍易定節度使己酉以張璠新上賜帛五萬疋七月己未先送魏博史憲誠旌節中使劉𢎞逸奏云六月二十五日到魏州二十六日夜三軍殺史憲誠舉大將何進㴞其新節度使李聽入城不得壬子召宰臣裴度王播路隨對于延英詔以魏博節度衙内都知兵馬使檢校祕書監兼侍御史何進㴞為檢校左散騎常侍充魏博節度使壬申詔雪王庭湊依前金紫光禄大夫檢校司空太原公成德軍節度使先是滄州李同㨗求代父任詔授以兖海同㨗不奉詔投欵於庭湊廷湊出兵撓魏北境以接之詔絶廷湊進奉時河朔連兵日久朝廷益苦饋餉之費及同㨗授首廷湊亦㣲露誠欵於隣封帝揣知中外之心所宐故有恩蕩之詔九月以王廷湊洗雪命有司先籍入其留邸及店舖等并令却付官吏所繇德棣諸州者并放還五年正月庚申幽州監軍使上言節度李載義於毬塲送宣賜德政碑中使後院副兵馬使楊志誠同打毬志誠等遂於毬塲叫呼謀亂載義當日走投易州又奏志誠殺莫州刺史張慶初以載義姻黨故也帝聞之驚促召宰臣入對時兵部尚書平章事牛僧孺早入先召見帝惕然曰幽州之事可奈何僧孺曰此不足煩聖慮臣被召疾趨容臣稍緩息具條以對帝良久曰卿以為不足憂何也僧孺曰陛下以范陽得失繫國家憂戚耶且自安史亂後范陽非國家所有前時劉總向化兼以土地歸闕朝廷約用錢八十萬貫而未嘗得范陽尺布斗粟上供天府則今日志誠之得猶前日載義之得也陛下但因而撫之亦事之宜也且范陽國家所倚頼者以其北捍突厥不令南冦今若假志誠節鉞借其土地必自為力爪牙之用固不計於逆順臣固曰不足煩聖慮帝大喜曰如卿之言吾洗然矣壬戌李載義遣從事上言自破滄州後累表請赴闕廷頻奉詔㫖不許今月十三日於毬塲為管衙兵馬将楊志誠飜動其日辰時將男正元并隨從軍將奔赴闕廷帝令中使至太原以采宣迎并賜以書詔紫衣牙笏玉帶并藥一合銀器一箇所在宣賜甲子賜載義永寧里第一所壬申載義為太保同中書門下平章事仍令所司擇日册命以嘉王運為幽州盧龍節度觀察處置等使以志誠為幽州節度觀察等使留後是日詔中使以米麪粟豆油鹽共一千石錢二千貫綾絹三千疋柴四十車草一萬束就永寜里第宣賜載義又令尚食日給十人生料翌日又命以良馬一匹并鞍就第以賜之及賓佐將吏無不廣霑恩錫四月以楊志誠為工部檢校尚書并幽州大都督府長史充幽州盧龍軍節度副大使知節度事管内觀察押奚契丹兩蕃經畧等使七年八月楊志誠就加檢校左僕射用含𢎞之典也初志誠轉吏部尚書詔下進奏官徐廸詣中書白宰相曰軍中不識朝廷事體只知自尚書改僕射為遷不知以工部轉吏部為美且軍士盛飾以待新恩一旦復為尚書軍中必怒今中使往其勢恐不得出及使至其僕奔還奏曰志誠怒不得僕射三軍亦有怨言中使竝為志誠繫留矣志誠遣使讓官復賜官告其使不受而歸朝廷納裴度之言務以含𢎞故再加僕射載義為河東節度使時楊志誠復為部下所逐過太原載義躬自敺擊遂欲殺之頼從事救解以免然而擅殺志誠之妻孥將卒朝廷録其功曲法不問開成三年六月壬寅以康州流人王晏平為永州司户參軍員外置同正員晏平為靈武節度使去任日取征馬四百餘匹及借兵器千餘事遂隠沒妄為申破台司推勘獄狀悉具計贓七千餘貫以晏平之父智興嘗有戰功故特免死從流未至流所魏博鎮州幽州三節使有表請雪遂除撫州司馬給事韋温薛廷老盧𢎞宣等封敕改為永州司户韋温等又封還帝命中人宣慰温等制命始行時晏平在縗麻之中未至流所廣以金帛交結中外既得免死旋又除官復假三鎮之勢以迫朝廷而執事者但務姑息河北不守法理時論惜之册府元龜卷一百七十七
