body:
  text: 冊府元龜卷六百四十五宋王欽若等撰貢舉部科目自三五以來貢舉之目未之聞也考諸周制乃有徳行道義之舉謂之賢能又有四士曰選曰俊曰造曰進自鄉大夫司徒樂正皆論其秀司馬論其賢然後官之此周公所以垂大法也漢魏而下以迄於五代或召郡國限其口率或令公卿舉其所知或廣示於詳延或兼許而自至正乃科級之沿革名品之差異申千有餘里蓋數十百數今之論選歴代而下亦書於斯而已矣漢惠帝四年正月詔舉民孝悌力田者文帝二年十一月詔舉賢良方正能直言極諫者十五年九月詔諸侯王公卿郡守舉賢良方正直言極諫者武帝建元元年冬十月召丞相御史列侯中二千石二千石諸侯相舉賢良方正直言極諫之士元光元年十一月初令郡國舉孝亷各一人孝謂善事父母亷謂清潔有亷隅也元封五年四月詔令州郡察民吏有茂才異等可為將相及使絶域者昭帝始元五年六月詔令三輔太常舉賢良各二人郡國文學高第各一人宣帝本始元年四月詔内郡國舉文學高第各一人四年四月詔令三輔太常内郡國舉賢良方正各一人地節三年十一月詔曰其令郡國舉孝悌有行義聞於鄉里者各一人元康元年八月詔舉吏民厥身修正通文學明於先王之術宣究其意者各二人中二千石各一人四年正月制舉茂才異倫之士神爵四年四月詔令内郡國舉賢良可親民者各一人元帝初元二年三月詔丞相御史二千石舉茂才異等直言極諫之士永光元年二月召丞相御史舉質樸敦厚遜上有行者光禄嵗以此科第郎從官始令丞相御史舉此四科人以擢用之而見在郎及從官又令光禄毎嵗依此科考校定其第高下用知其人賢否二年三月詔内郡國舉茂才異等賢良直言之士一人成帝建始二年二月詔令内郡舉賢良方正各一人三年十二月詔丞相御史與將軍列侯中二千石及内郡舉賢良方正能直言極諫之士河平四年三月詔舉敦厚有行能直言之士鴻嘉二年三月詔舉敦厚有行義能直言者元延元年七月詔内郡國舉方正能直言極諫者各一人北邊二十二郡舉勇猛知兵法者各一人哀帝建平元年二月詔大司馬列侯將軍中二千石州牧守相舉孝悌惇厚能直言通政事延於側陋可親民者各一人四年冬詔將軍中二千石舉明兵法有大慮者元壽元年春正月詔將軍列侯中二千石舉賢良方正能直言者各一人平帝元始元年五月詔公卿將軍中二千石舉惇厚能直言者各一人二年秋舉勇武有節明兵法郡一人詣公車後漢光武建武七年四月詔公卿司𨽻州牧舉賢良方正各一人遣詣公車章帝建初元年二月詔太傅三公中二千石二千石郡國守相舉賢良方正能直言極諫之士各一人五月初舉孝亷郎中寛博有謀任典城者以補長相任堪使也典主也長謂縣長相謂侯相八年十二月詔書辟士四科一曰徳行高妙志節清白二曰經明行修能任博士三曰明曉法律足以决疑能案章覆問文任御史四曰明毅多畧遭事不惑明足照姦勇足决斷才任三輔令皆存孝悌公清之行自今已後審四科辟召及刺史二千石察舉茂才尤異孝亷吏務實校試以職有非其人不習曹事正舉者故不以實法之也和帝永元六年三月詔令三公中二千石二千石内郡守相舉賢良方正能直言極諫之士各一人七年四月詔有司詳選郎官寛博有謀才任典城者三十人安帝永初元年三月詔公卿内外官郡國守相舉賢良方正有道術之士明政術逹古今能直言極諫者各一人五年閠三月詔令三公特進侯中二千石二千石郡守諸侯相舉賢良方正有道術逹於政化能直言極諫之士各一人及至孝與衆卓異者并遣詣公車七月詔三公特進九卿校尉舉列將子孫明曉戰陣任將帥者元初元年四月詔三公特進列侯中二千石二千石郡守舉敦厚質直者各一人建光元年十一月詔三公特進侯卿校尉舉武猛堪將帥者各五人順帝初即位詔公卿郡守國相舉賢良方正能直言極諫之士各一人永和三年九月令大將軍三公各舉故刺史二千石及見令長郎謁者四府掾屬剛毅武猛有謀謨任將帥者各二人特進卿校尉各一人漢安元年二月詔大將軍公卿舉賢良方正能探賾索隠者各一人冲帝永嘉元年九月詔三公特進侯卿校尉舉賢良方正幽逸修道之士各一人桓帝建和元年四月詔大將軍公卿校尉舉賢良方正能直言極諫者各一人又詔大將軍公卿郡國舉至孝篤行之士各一人三年六月詔大將軍三公特進侯其舉卿校尉舉賢良方正能直言極諫之士各一人永興二年二月詔公卿校尉舉賢良方正能直言極諫者各一人延熹八年正月詔公卿校尉舉賢良方正九年正月詔公卿校尉郡國舉至孝七月詔舉武猛三公各二人卿校尉各一人靈帝中平元年三月詔公卿舉列將子孫及吏民有明戰陣之畧者詣公車魏文帝黄初四年五月詔舉天下雋徳茂才獨行君子明帝泰和二年十月詔公卿近臣舉良將各一人四年十二月詔公卿舉賢良青龍元年三月詔公卿舉賢良篤行之士各一人晉武帝泰始四年十一月詔王公卿及郡國守相舉賢良方正直言之士五年十二月詔州郡舉勇猛秀異之才七年六月詔公卿以下舉將帥各一人八年二月詔内外羣官舉任邊郡者各三人太康九年五月詔内外羣臣舉守令之才成帝咸和六年三月詔舉賢良直言之士七年十一月詔舉賢良宋孝武大明六年正月詔其有懐真抱素志行清白或識通古今才經軍國具以名聞前廢帝景和元年八月詔曰其有孝性忠節幽居遯棲信誠行義亷正表俗文敏博識幹事治民者精加詳括明帝泰始二年十二月詔曰林澤貞栖丘園耿潔博洽古今敦崇孝讓者具即以聞随就褒立五年九月詔其有身栖隐約息事衡樊志恬江海行高塵俗者所在精加捜括時以名聞後廢帝初即位詔其有孝友聞族義讓光閭或匿名屠釣隐身耕牧足以整厲澆風扶益淳俗者俟聞嘉薦梁高祖天監元年四月詔若懐寳迷邦藴竒待價蓄響藏真不求聞逹並依名騰奏十四年正月南郊詔若有確然鄉黨獨行州閭肥遯丘園不求聞逹藏噐待時未加收採或賢良方正孝悌力田並即騰奏具以名上普通三年五月詔連率郡國舉賢良方正直言之士太清元年正月詔或徳茂州閭道行鄉邑或獨行丘壑聞逹不求咸使上言陳文帝天嘉元年七月詔王公以下其各進舉賢良宣帝大建四年九月赦詔耆艾絶倫或妙年異等凡厥在位各舉所知後魏明元永興五年二月詔有徳行清美學優義博可為人師者令詣京師太武延和元年十二月詔州郡進舉賢俊各令鄉閭推舉既至當待以不次之舉随才文武任之政事孝文延興二年秋七月壬寅詔州郡縣各遣二人才堪專對者赴行在所三年冬十一月詔其力田孝悌才噐有益於時信義著於鄉閭者具以名聞太和十七年九月詔孝悌亷義文武應求者皆以名聞十八年春正月詔孝悌廉義文武應求者皆以名聞十一月辛未詔冀定二州孝義廉貞文武應求者具以名聞十二月詔郢豫二州孝悌亷義文武應求具以名聞十九年四月詔兗州刺史舉部内士人才堪軍國具以名聞六月詔孝悌廉義文武有堪者具以名聞二十一年正月詔雍州其孝友徳義文學才幹悉仰貢舉前廢帝普泰元年三月詔有徳孝仁賢忠義志信者可以禮召赴闕北齊孝昭皇建二年詔其高才良噐允文允武理識深長幹具通濟操履凝峻學業宏贍諸如此軰随取一長無待兼資方充舉限後周閔帝元年正月詔二十四軍宜舉賢良堪治民者軍别九人武帝建徳三年二月詔六府各舉賢良清正之人四年十月詔諸畿郡各舉賢良六年三月詔山東諸州各舉明經幹治者二人若竒才異術卓爾不羣者不拘多少隋文帝開皇三年正月詔舉賢良十八年七月詔京官五品以上總管刺史以志行修謹清平幹濟二科舉人仁夀三年七月詔令州縣捜揚賢哲皆取明知古今通識治亂究政敎之本逹禮樂之源者不限多少不得不舉煬帝大業三年四月詔夫孝悌有聞人倫之本徳行敦厚立身之基或節義可稱或操履清潔所以激貪厲俗有益風化强毅正直執憲不撓學業優敏文才美秀並為廊廟之用實乃瑚璉之資才堪將略則㧞之以禦侮膂力驍壯則任之以爪牙爰及一藝可取亦宜採録文武有職者五品以上宜依今十科舉人有一於此不必求備朕當待以不次随才升擢五年六月詔諸郡學業該通才藝優洽膂力驍壯超絶等倫在官勤慎堪理政事立性正直不避强禦四科舉人十年五月詔郡舉孝悌亷潔各十人唐太宗貞觀十一年四月詔其有孝悌淳篤兼閑時務儒術該通可為師範文詞秀美才堪著述明識治體可委字民并志行修立為鄉閭所推者舉送雒陽宫十五年六月詔令天下士庶人之内或識逹公方學綜今古亷潔正直可以經國佐時或孝悌淳篤節義昭顯始終不移可以敦風厲俗或儒術通明學堪師範或文章秀異才足著述並宜薦舉具以名聞十七年五月乙丑詔令州縣舉孝亷茂才好學異能卓犖之士高宗以貞觀二十三年六月即位九月詔其有經明行修談講精熟具此師嚴才堪敎冑者志節高妙適用清通博聞强記終堪卿輔者遊情文藻下筆成章援心處事端平可紀者疾惡揚善依忠履義執持典憲終始不移者京司長官上都督府及上州各舉二人中下州刺史各舉一人顯慶元年十月詔宜令河南河北江淮已南州縣或緯俗之英聲馳管樂或濟時之噐價逸蕭張徳宰帝師材堪棟輔者必當任之不次二年二月詔宜令京官五品以上及諸州牧守各舉所知或勇冠三軍翹闗㧞山之力智兼百勝緯地經天之才藴竒䇿於良平馳功績於衛霍蹤二起於吳白軌雙李於牧廣賞纎善而萬衆悦罰片惡而一軍懼如有此色可精加採訪各以奏聞三年二月志烈秋霜科韓思彦及第五年六月詔内外官四科舉人或孝悌可稱徳行夙著通渉經史堪居繁劇或游泳儒術沉研冊府下帷不倦博物馳聲或藻思清華詞鋒秀逸譽標文雅材堪逺大或亷平處事强直為心洞曉刑書兼包文藝者精加捜訪各以名薦龍朔三年八月詔内外官五品以上各舉巖藪幽素之士乾封元年幽素科蘇壊解琬苖神客格輔元徐昭劉訥言崔谷神及第二年十月令天下諸州舉鴻儒碩學博聞强記之士上元三年正月詞殫文律科崔融及第儀鳯元年十二月詔或孝悌通神遐邇推敬或徳行光俗邦邑崇仰或學綜九流垂帷覩奥或文高六義下筆成章或備曉八音洞該七曜或射能穿扎力可翹闗或丘園秀異志存栖隠或將帥子孫素稱勇烈亦有婆娑鄉曲負材傲俗為譏議所斥䧟於跅􅕟之流者各以名聞二年十二月詔或才藴廊廟噐均瑚璉體王佐之嘉猷資公輔之宏量或竒謀異筭决勝千里或投石㧞距勇冠三軍或謇諤忠量志存規弼或繩違紏惡不避權豪或威惠仁明堪居牧守之重或公正亷直足膺令長之任咸宜捜訪具録封進調露元年七月詔或孝悌純至感於神明或文武兼資材堪將相或學藝該博業標儒首或藻思宏贍辭擅文宗或洞曉音律識均牙曠或深明歴數妙同京管者咸令薦舉永隆元年岳牧舉武陟縣尉員半千及第則天垂拱四年十二月詞標文苑科房晉皇甫瓊王旦及第永昌元年正月蓄文藻之思科彭景直及第抱儒素之業科李文尉及第長夀三年四月臨難不顧狥節寧邦科薛稷㓂玭及第證聖元年長才廣度沈迹下僚科張河及第萬嵗通天元年文藝優長科韓琬及第神功元年九月絶倫科蘇頲崔𤣥童袁仁敬何鳳孟兼禮洪子輿盧從愿趙不欺及第大足元年理選使孟詵試㧞萃科崔翹鄭少㣲及第疾惡科馮石及第長安二年龔黄科馮克麾及第中宗神龍元年二月詔九品以上及朝集使舉賢良方正直言之士二年二月令舉天下鴻儒碩學之士是年有才膺管樂科張大求魏啟心魏愔盧絢張文成禇璆成廙業郭隆趙不為及第才高位下科馮萬石晁良身張敬及第三年材堪經邦科張九齡康元環及第賢良方正科蘇晉宋務光冦批盧怡吕恂及第景龍三年抱噐懐能科侯銘及第茂才異等科王敬從盧重𤣥及第睿宗景雲元年十二月制舉有能明三經通其大義者能宗一史知其本末者通三敎宗㫖究其精微者善六書文字辯其聲象者博雅造曲度知六律五音者明韜略學孫吳識天時人事者暢於詞氣聰於受顧善敷奏吐納者咸令所司博采明試以聞二年文以經國科袁暉韓朝宗及第藏名負俗科李俊文及第太極元年二月命文武官五品以上各舉才堪將軍及邊州都督刺史一人𤣥宗先天元年十二月制令京文武官及朝集使五品以上各舉堪充將帥者一人又有文經邦國科韓林及第藻思清華科趙冬曦及第寄以宣風則能興化變俗科郭璘之及第道侔伊吕科張九齡及第手筆俊㧞超越流軰科杜昱張子斷張秀明常無名趙居正賈登邢巨及第二年六月詔其諸州有抱噐懐才不求聞逹者訪名聞奏開元二年六月甲子制其有茂才異等㧞萃超羣咸令自舉其年有直言極諫科梁昇卿袁楚客及第哲人竒士逸倫屠釣科孫逖及第良才異等科張閏之崔翹及第五年二月詔有嘉遁幽栖養高不仕者州牧各以名薦是年有文史兼優科李昪期康允元逹奚珣及第文儒異等科崔偘褚廷誨及第六年博學通議科鄭少微蕭識及第七年文詞雅麗科邢巨苖晉卿褚思光趙良噐及第九年正月詔曰諸州官人百姓有智合孫吳可以運籌决勝有勇齊賁育可以斬將搴旗或臨戎却冦堪為一保之雄各聽自舉務通其實十一年正月丁卯制其有沉淪草澤抱徳棲遲並委府縣搜揚十二年將帥科裴敦復房自謙及第十五年二月制曰草澤中有文武高才者聽詣闕自舉是年應武足安邊科鄭昉樊衡及第高才沉淪草澤自舉科鄧景山及第十七年才高未逹沉迹下僚科吳鞏及第十九年博學宏詞科鄭昉陶韓及第二十一年多才科李史魚及第二十三年正月詔其或才有王霸之略學究天人之際智勇堪將帥之選政能當牧宰之舉者五品以下清官及軍將都督刺史各舉一人孝悌力田鄉閭推挽者本州刺史長官各以名聞是年舉王霸科劉璀杜綰及第智謀將帥科張重光崔圗李廣琛及第二十七年正月制令諸州刺史舉徳行尤異不求聞逹者二月制草野間有殊才異行文堪經國者所由長官以禮徴送天寳元年正月一日詔有儒學博通及文詞秀逸或有軍謀越衆或武藝絶倫者具以名薦是年有舉文詞秀逸科崔明允顔眞卿及第六載風雅古調科薛據及第十三載二月詔其博通墳典洞曉𤣥經清白著聞詞藻宏麗軍謀出衆武藝絶倫者任自舉是年舉詞藻宏麗科楊綰及第肅宗至徳元載七月詔有直言極諫才能宰牧文詞博逹武藝絶倫孝悌力田沉淪草澤聽詣闕自陳二載十二月詔其有文經邦國學究天人博於經史工於詞賦善於著述精於法理軍謀制勝武藝絶倫並任於所在自舉委郡守銓擇奏聞不限人數上元元年閏四月詔宜令中外五品以上文武正員官各舉賢良方正直言極諫一人武藝文才俱堪濟理者亦任狀舉其或文之詞䇿武非騎射但權謀可以集事材力可以臨戎方圓可収亦任通䇿代宗廣徳元年七月詔有懐才抱噐安貧守節養素丘園為衆所知者具以名聞諸色人中有孝悌力田經術通博文詞雅麗政理優長各以名薦永泰元年正月制孝悌力田懐才抱噐遺逸未經薦逹者各委州府聞奏親當䇿試大厯元年十一月制天下有安貧樂道孝悌力田者具以名聞朕當親自䇿試二年應樂道安貧科楊膺及第五年六月詔内外文武官及前資官六品以下并草澤中有碩學專門茂才異等智謀經武諷諫主文者仰所在表薦六年諷諫主文科鄭珣瑜李益及第徳宗以大厯十四年五月即位六月詔天下有才業尤著高蹈丘園及直言極諫之士具以名聞諸色人中有孝悌力田及以經學優深文詞清麗軍謀宏逺武藝殊倫者亦具以名聞能詣闕自陳者亦聽建中元年應賢良方正能直言極諫科姜公輔元直樊澤呂元膺及第文詞清麗科奚陟梁輔劉公亮鄭封吳通𤣥及第經學優深科孫玭黎逄季随及第高蹈丘園科張紳衡良儒蘇哲及第軍謀越衆科夏后審平知和鄭儋凌正周渭丁悦及第孝悌力田聞於鄉閭科郭黄中崔浩李牧及第貞元元年九月詔賢良方正能直言極諫第三等人委中書門下即超資與處分第四等人即優與處分第五等人即與處分是年舉賢良方正能直言極諫科韋執誼鄭利用穆質楊邵裴復柳公綽歸登李直方崔邠鄭敬魏𢎞簡沈廻元祿徐兖及第博通墳典逹於敎化科熊執易劉簡及第識洞韜畧堪任將帥科許贄及第四年正月詔賢良方正直言極諫者高蹈不仕隠居巖穴孝悌力田聞於鄉里所在長官具以名聞親當䇿試是年四月應賢良方正能直言極諫科崔元輪裴次元李彛崔農史牟陸震栁公綽趙修徐𢎞毅韋彭壽鄒儒立王乃杜倫元易正真及第清亷守節政術可稱堪任縣令科李英孝悌力田聞於鄉閭科張皓及第九年十一月制諸色人中有賢良方正能直言極諫或博通墳典逹於敎化或詳明政術可以理人者委常叅官及州府長史各舉所知當親䇿試十一年十一月賢良方正能直言極諫科裴珣王璠朱諫裴度熊執易許堯佐徐𢎞毅崔羣皇甫鑄王仲舒許季同仲子陵鄭士林丘頴及第博通墳典逹於敎化科朱頴及第詳明政術可以理人科張平叔李景亮及第十一年三月諸州准制薦隐居丘園不求聞逹蔡茂等九人並授試官令給公乘赴京到日量才叙用憲宗元和元年四月才識兼茂明於體用科元稹韋惇獨孤郁白居易曹景伯韋慶復崔琯羅讓崔䕶薛存慶韋珩李瑀元修蕭俛傅歸柴宿及第逹於吏理可使從政科蕭睦及第二年正月制天下諸色人中有賢良方正能直言極諫博通墳典逹於敎化軍謀宏逺堪任將帥詳明政術可以理人委内外官各舉所知當親自䇿試二年四月賢良方正能直言極諫科牛僧孺皇甫湜李宗閔李正封吉𢎞宗徐晦賈餗王起郭球姚衮庾威及第博通墳典逹於敎化科馮苞陸亘軍謀宏逺材任將帥科樊宗師及第逹於吏理可使從政科蕭睦及第十四年七月詔諸色人有賢良方正能直言極諫博通墳典逹於敎化軍謀宏逺堪任將帥詳明政術可以理人者委内外官各舉所知當親自䇿試穆宗長慶元年正月詔諸色人中有賢良方正能直言極諫博通墳典逹於敎化軍謀宏逺堪任將帥政術詳明可以理人者委有司各舉所知是年十二月應賢良方正能直言極諫科嚴寵任畹吕述姚中立韋曙李回崔瑕崔龜從韋正貫崔知白陳𤣥錫及第詳明政術可以理人科崔郢及第軍謀宏逺材任將帥科吳思李商卿博通墳典逹於敎化科李思𤣥及第敬宗以長慶四年正月即位三月詔諸色人中有賢良方正能直言極諫經學優深可為人師詳閑吏理逹於敎化軍謀宏逺材任邊將者委常叅官并諸道節度使觀察諸州刺史各舉所知寳厯元年四月賢良方正能直言極諫科唐伸楊儉韋端符舒元褒蕭敞楊魯士來擇趙柷裴暉韋繇李昌實嚴封李涯蕭夷中馮球元晦及第詳明吏理逹於敎化科韋正貫及第軍謀宏逺材任邊將科裴儔侯平章及第文宗太和元年正月制諸色人中有賢良方正能直言極諫者及經學優深可為師法詳閑吏理逹於敎化軍謀宏逺堪任將帥者常叅官及方牧郡守各舉所知無人舉者亦聽自舉二年閏三月賢良方正能直言極諫科裴休裴素李郤南卓李甘杜牧馬維鄭亞崔博崔興王式羅邵京崔渠韓賓崔慎由苖隋韋昶崔瓊崔謙及第詳明吏理逹於敎化科宋昆及第軍謀宏逺堪任將帥科鄭冦李式及第開成元年正月制其有藏噐俟時隠身巖穴竒節獨行可激風俗者各以名聞梁太祖開平三年制其有卓犖不覊沉潛用晦負王覇之業藴經濟之謀究古今刑政之源逹禮樂質文之奥機籌可以制度經術可以辯疑旋具奏聞然後試其所長待以不次四年九月詔如有卓犖不覊沉潜自負通王覇之上畧逹文武之大經究古今刑政之源逹禮樂質文之變朕則待以不次委以非常後唐明宗天成二年四月中書奏尚書禮部貢院申當司奉今月六日勑吏部流内銓狀據白院狀當司先准禮部貢院牒據成徳軍解送到前進士王蟾狀請罷攝梁州司功叅軍應宏詞舉前件人准格例應重科合在吏部其王蟾并牒解送吏部請准例指揮者當司具狀申堂奉判送吏部分拆近年事例如何者伏縁近年别無事例今撿登科録内為偽梁開平三年應宏詞科二人前進士余渥承㫖舎人李忌考官二人司勲郎中崔景兵部員外郎張貽憲者再具狀申堂奉判送吏部准例指揮者其前進士王蟾應宏詞考官試官合在流内銓申請者前進士王蟾請應宏詞伏自近年以來無人請應今詳格例合差考官二人又縁只有王蟾一人獨應銓司未敢懸便奏請差官者奉勑宜令禮部貢院就五科舉人考試者伏以舉選公事皆有格條准新定格節文宏詞㧞萃准長慶二年格吏部差考試官二人與知銓尚書侍郎同考試聞奏又准格節文内准太和元年十月二十三日勑應禮部諸色貢舉人及吏部諸色科目選人凡無出身及未有官只合於禮部應舉有出身有官方合於吏部赴科目選其請應宏詞舉前進士王蟾當年放及第後尋已闗送吏部訖若應宏㧞例得南曹判成即是科選選人事理合歸吏部况縁五科考試官只考學業難於同考宏詞者奉勑王蟾宜令吏部准徃例差官考試長興元年八月三日尚書吏部奏據禮部貢院牒送到府試請應書判㧞萃前虢州盧氏縣主簿張岫親書紙内對六節判四通二粗准例及第五上等其所試判今録奏聞奉勑宜令所司今後吏部所應宏詞㧞萃宜並權停周世宗顯徳四年十月制曰制䇿懸科前朝盛世莫不訪賢良於仄陋求讜正於箴規殿庭之間帝王親試其或大裨於國政有益於時機則必待以優恩縻之好爵㧞竒取異無尚於兹得人者昌於是乎在爰從近代乆廢此科懐才抱噐欎而不伸隠耀韜光者晦而莫出遂使翹翹之楚多致於弃捐皎皎之駒莫就於縻縶遺才滯用闕孰甚焉應天下諸色人中有賢良方正能直言極諫經學優深可為師法詳閑吏理逹於敎化者不限前資見任職官黄衣草澤並許應詔其逐處州府依毎嵗貢舉人試例差官别考試解送尚書吏部仍量試䇿論三道共三千字以上當日内成取文理俱優人物爽秀者方得解送取來年十月集上都其登朝官亦許上表自舉時兵部尚書張昭上言請興制舉故有是命冊府元龜卷六百四十五
