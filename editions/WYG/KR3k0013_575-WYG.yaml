body:
  text: 冊府元龜卷五百七十五宋王欽若等撰掌禮部奏議第三晉袁瓌元帝中興為治書御史時東海王越尸既為䂖勒所焚妃裴氏求招䰟葬越朝廷疑之環與博士傅純議以為招䰟葬是謂埋神不可從也帝然之雖許裴氏招䰟葬越遂下詔禁之丁潭為琅邪王裒郎中令元帝建武元年裒薨潭上疏求行終喪曰在三之義禮有逹制近代以來或隨時䧏殺宜一匡革以敦於後轍案令文王侯之喪官僚服斬既葬而除今國無繼統喪廷無主臣實陋賤不足當重謬荷首任禮宜終喪詔下博議國子祭酒杜夷議古者諒闇三年不言下及周世稅衰効命春秋之時天子諸侯既葬而除此所謂三代損益禮有不同故三年之喪繇此而廢然則漢文之詔合於隨時凡有國者皆宜同也非施於帝皇而已按禮殤與無後䧏於成人有後既葬而除今不得以無後之故而獨不除也愚以丁郎中應除衰麻自宜主祭以終三年太常賀循議禮天子諸侯俱以至尊臨人上下之義君臣之禮自古以來其例一也故禮盛則全其重禮殺則從其䧏春秋之事天子諸侯不行三年主於臣為君服亦宜以君為節未有君除而臣服君服而臣除者今法令諸侯卿相官屬為君斬衰既葬而除以令文言之明諸侯不以三年之喪與天子同可知也君若遂服則臣子輕重無應除者也若當皆除無一人獨重之文禮有攝主而無攝重故大功之親主人喪者必為之再祭練祥以大功之服主人三年喪者也茍為諸侯與天子同制國有嗣王自不全服而人主居喪素服主祭三年不攝吉事以尊令制若當逺迹三代令復舊典不依法令者則諸侯之服貴賤一例亦不得唯一人於是詔使除服心喪三年鍾雅為尚書右丞時元帝有事於太廟雅奏曰陛下繼承世數於京兆府君為𤣥孫而今祝文稱曽孫恐此因循之失宜見改正又禮祖之昆弟從祖父也景皇帝自以功德為世宗不以伯祖而登廟亦宜除伯祖之文詔曰禮事宗廟自曽孫已下皆稱曽孫此非因循之失也義取於重孫可歴世共其名無所改也稱伯祖不安如所奏孔愉為中書侍郎元帝太興元年四月合朔愉奏曰春秋日有蝕之天子伐皷於社攻諸隂也諸侯伐皷於朝臣自攻也按尚書符云若日有變便擊皷於諸門有違舊典詔曰所陳有正義輙勑外改之賀循為太常太興初宗廟始建舊儀多闕或以惠懐二帝應各為世則潁川世數過七宜在迭毁事下太常循議以為禮兄弟不相為後不得以承代為世殷之盤庚不序陽甲漢之光武不繼成帝别立廟寝使臣下祭之此前代之明典承繼之著義也惠帝無後懐帝承統弟不後兄則懐帝自上繼世祖不繼惠帝當同殷之陽甲漢之武帝議者以聖德冲逺未便改舊諸如此禮通所未諭是以惠帝尚在太廟而懐帝復入數則盈八盈八之理繇惠帝不出非上祖宜遷也下世既升上世乃遷遷毁對代不得相通未有下升一世而上毁二世者惠懐二帝俱繼世祖兄弟旁親同為一世而上毁二世為一世今以惠帝之崩已毁豫章懐帝之入復毁潁川如此則一世再遷祖位横折求之古義未見此例惠帝宜出尚未輕論况可毁一祖而無義例乎頴川既無可毁之理則見神之數居然自八此葢有繇而然非為數之常也既有八神則不得不於七室之外權安一位也至尊於惠懐俱是兄弟自上後世祖不繼二帝則二帝之神行應别出不為廟中恒有八室也又武帝初成太廟時正神止七而楊元后之神亦權立一室永熙元年告世祖謚於太廟八室此是茍有八神不拘於七之舊例也又議者以景帝俱已在廟則惠懐一例景帝盛德元功王基之本義著祖宗百世不毁故以特在本廟且亦世代尚近數得相容安神而已無逼上祖如王氏昭穆既滿終應别廟也以今方之既輕重義異又七世之親昭穆父子位也若當兄弟旁滿輙毁上祖則祖位空懸世數不足何取於三昭三穆與太祖之廟然後成七哉今七廟之義出於王氏從禰以上至於髙祖親廟四世髙祖以上復有五世六世無服之祖故為三昭三穆并太祖而為七也故世祖郊定廟禮京兆潁川曽髙之親豫章五世征西六世以應此義今至尊繼統亦宜有五世六世之祖豫章六世潁川五世俱不應毁今既云豫章先毁又當重毁潁川此為廟中之親惟從高祖已下無復高祖以上二世之祖於王氏之義三昭三穆廢闕其二甚非宗廟之本所據承又違世祖祭征西豫章之意於一王定禮所闕不少時尚書僕射刁恊與循異議循答義深備竟從循議焉循又奏元帝父琅琊恭王宜稱皇考循議曰按禮子不敢以己爵加父元帝納之温嶠為驃騎長史太興三年正月乙卯詔曰吾雖上繼世祖然於懐愍皇帝皆北靣稱臣今祠太廟不親執觴酌而令有司行事於情禮不安可依禮更處太常言今聖上繼武皇帝宜凖漢世祖故事不親執觴爵又曰今上承繼武帝而廟之昭穆四世而已前太常賀循愽士傅純竝以為惠懐及愍宜别立廟然臣愚謂室當以客主為限無拘常數殷世有二祖三宗若拘七室則當祭禰而已推此論之宜還復豫章潁川全成七廟之禮嶠議凡言兄弟不相入廟既非禮文且光武奮劒振起不䇿名於孝平務神其事以應九世之䜟又古不共廟故别立焉今上以䇿名而言殊於光武之事躬奉烝甞於繼既正於情又安矣太常欲還二府君以全七世嶠謂是宜驃騎将軍王𨗳從嶠議嶠又曰其非子者可直言皇帝敢告某皇帝又若以一帝為一世則不祭禰反不及庻人帝從嶠議悉施用之於是乃更定制還復豫章潁川於昭穆之位以同惠帝嗣武故事而惠懐愍三帝自從春秋尊卑之義在廟不替也卞壼為尚書令明帝太寕三年三月立皇子衍為皇太子詔曰禮無生而貴者故帝元子方之於士而漢魏以來尊崇儲貳使官屬稱臣朝臣咸拜此甚無謂吾昔在東宫未及啓革今衍㓜冲之年使臣先逹将令日習所見謂之自然此豈可以教之邪主者其下公卿内外通議使必允禮中壼議以為周禮王后太子不會明禮同於君皆所以重儲貳異正嫡茍奉之如君不得不拜矣太子若存謙冲故宜答拜臣以為皇太子之立郊告天地正位儲宫豈得同之皇子揖譲而已謂宜稽則漢魏闔朝同拜從之荀奕為侍中成帝咸和中時通議元會日帝應敬司徒王𨗳及􅀶士郭熈杜援等以為禮無拜臣之文謂宜除敬侍中馮懐議曰天子修禮莫盛於辟雍當爾之日猶拜三老况今先帝師傅謂宜盡敬事下奕議曰三朝之首宜明君臣之體則不應敬若他日小會自可盡禮又至尊與公書手詔則曰頓首言中書為詔則云敬問散騎優册則曰制命今詔文尚異况大會之與小會理豈同得詔從之王𨗳成帝時為司徒先是會稽内史周札兄子筵為呉興内史王敦使人告札及諸兄謀不軌殺之敦死札筵故吏訟寃宜加贈謚事下八座尚書卞壼議以札石頭之役開門延㓂遂使賊敦恣亂札之責也追贈意所未安懋筵兄弟宜復本位𨗳議以札在石頭忠存社稷義在亡身至於往年之事自臣等有識以上與札情豈有異此言實貫於聖鍳論者見奸逆既彰便欲徴往年已有不臣之漸即復使爾要當時衆所未悟既悟其姦萌札與臣等便以身許國死而後己札亦尋取梟夷朝廷檄命既下大事既定便正以為逆黨邪正失所進退無據誠國體所宜深惜臣謂宜與周顗戴若思等同例尚書令郗鑒議曰夫褒貶臧否宜令體明例通今周戴以死節復位周札以開門同例事異賞均意所疑惑如司徒議謂往年之事自有識以上皆與札不異此為邪正坦然有在昔宋文失禮華樂荷不臣之罰齊靈嬖孽髙厚有從昏之戮以古况今譙王周戴宜受若此之責何加贈復位之有乎今據已顯復則札宜貶責明矣𨗳重議曰省令君議必札之開門與譙王周戴異今札開門直出風言竟實事邪便以風言定褒貶意莫若原情考㣲也論者謂札知隗恊亂政信敦匡救茍匡救信姦佞除即所謂流四㓙族以隆人主巍巍之功耳如此札所以忠於社稷也後敦悖謬出所不圗札亦闔門不圖以此滅族是其死於為義也夫信敦當時之營救不圗将來之大逆惡隗恊之亂政不失為臣之真節者于時朝士豈惟周札耶若盡謂不忠懼有誣乎譙王周戴各以死衞國斯亦人臣之節也但所見有同異然期之於忠故宜申明耳即如令君議宋華齊髙其在隗恊矣昔子糾之難召忽死之管仲不死若以死為贒則管仲當貶若以不死為贒則召忽之死為失先典何以兩通之明為忠之情同也死雖是忠之一目亦不必為忠皆當死也漢祖遺約非劉氏不王非功臣不侯違命天下共誅之後吕后王諸吕周勃從之王陵廷争可不謂忠乎周勃誅吕尊文安漢社稷忠莫尚焉則王陵又何足言而前史兩為美談固知死與不死争與不争苟原情盡意不可定於一槩也且札闔棺定謚違逆黨順受戮㓙邪不負忠義明矣鑒又駁不同而朝廷竟從𨗳議追贈札衞尉遣使者祠以少牢蔡謨為太常咸康四年成帝臨軒使拜太傅太尉司空儀注大樂宿懸於殿庭門下奏非祭祀宴享則無設樂之制謨議曰凡敬其事則備其禮禮備則制有樂樂者所以敬事而明義為耳目之娯故冠亦用之不惟宴享宴享之有樂亦所以敬賓也故郤至使楚楚子享之郤至辭曰不忘先君之好貺之以大禮重之以備樂尋斯辭也則宴樂之意可知也公使大臣人君所重故御坐為起在輿為下言稱伯舅傳曰國卿君之貳也是以命使之日御親臨軒百僚陪列此即敬事之意也古者天王享下國之使及命将帥遣使臣皆有樂故詩序曰皇皇者華君遣使臣也又曰採􅅔以遣之出車以勞還杖杜以勤歸皆作樂而歌之今命大臣拜輔相比於下國之臣輕重殊矣輕誠有之重亦宜然故謂臨軒遣使宜有金石之樂議奏從焉虞潭為衞将軍咸康七年詔使内外詳議武悼楊后配廟之儀譚議曰世祖武皇帝光有四海元皇后應乾作配元后既往悼后繼作至楊駿肆逆禍延天母孝懐皇帝追復號謚豈不以鯀殛禹興義在不替者乎又太寕二年臣忝宗正帝譜冺棄罔所循按時􅀶諮舊齒以定昭穆與故驃騎将軍華恒尚書荀崧侍中荀䆳因舊譜叅諭撰次尊號之重一無改替今聖上孝思祗肅禋祀詢及羣司将以恢定大禮臣輙思詳伏見惠皇帝起居注羣臣議奏列駿作逆謀危社稷引魯之文姜漢之吕后臣竊以文姜雖荘公之母實為父讐吕后寵樹私戚幾危劉氏按此二事異於今日昔漢章帝竇后殺和帝之母和帝即位盡誅諸竇當時議者欲貶竇后及后之亡欲不以禮葬和帝以奉事十年義不可違臣子之道務從豐厚仁明之稱表於往代又見故尚書僕射裴顗議悼后故事稱繼母雖出追服無改是以孝懐皇帝尊崇號謚還葬峻陵此則母子道全而廢事蕩革也於時祭於𢎞訓之宫未入太廟盖是事之未盡非義典也若以悼后復位為宜則應配食世祖若復之為非則譜謚宜闕未有位號居正而偏祠别室者也若以孝懐皇帝私隆母子之道特為立廟者此茍崇私情有虧國典則國譜帝諱皆宜除棄匪徒不得同祀於世祖之廟也會稽王昱中書監庾氷中書令何充尚書令諸葛恢尚書謝廣光禄勲留擢丹陽尹殷融䕶軍将軍馮懐散騎常侍鄧逸等咸從潭議繇是太后配食武帝顧臻為散騎常侍咸康七年上表曰臣聞聖王制樂讃掦治道養以仁義防其滛泆上享宗廟下訓黎民體五行之正音恊八風以陶物宫聲正方而好義角聲堅齊而率禮絃歌鐘皷金石之作備矣故通神至化有率舞之感移風改俗致和樂之極末世之伎設禮外之觀逆行連倒頭足入筥之屬皮膚外剥肝心内摧敦彼行葦猶謂勿踐矧伊生民而不惻愴加四海朝覲言觀帝庭耳聆雅頌之聲目覩威儀之序足以蹋天頭以履地反兩儀之至順傷彞倫之大方今敵人對岸外禦為急兵食七升忘身赴難過泰之費日廪五升方掃神州經畧中甸若此之事不可示逺宜下太常纂修備樂簫韶九成惟新於盛運功德頌聲永著於來葉此乃所以燕及皇天克昌厥後者也雜伎而傷人者皆宜除之流簡儉之德邁康哉之詠清風既行民應如草此之謂也愚管之誠惟垂採察於是除髙絙紫鹿跂行鼈食及齊王捲衣笮兒等樂又减其廪其後復髙絙紫鹿焉顧和為太常康帝建元元年正月将北郊有疑議和表㤗始中合二至之禮於二郊北郊之月古無明文或以夏至或用同陽月漢光武正月辛未始建北郊此則與南郊同月及中興草創百度從簡合七郊於一丘憲章未備權用斯禮盖時宜也至咸和中議别立北郊同用正月魏承後漢正月祭天以地配時髙堂隆等以為禮祭天不以地配而稱周禮三王之郊一用夏正於是從和議後為尚書令時汝南王統江夏公衞崇竝為庻母制服三年和乃奏曰禮所以軌物成教故有國家者莫不崇正明本以一其統斯人倫之紀不二之道也為人後者䧏其所出奪天屬之性顯至公之義䧏殺節文著於周典按汝南王統為庻母居廬服重江夏公衞崇本繇踈屬開國之緒近喪所生復行重制違冐禮度肆其私情閭閻許其過厚談者莫與為非則政道陵遲繇乎禮廢憲章頺替始於容違若弗糾正無以齊物皆可下太常奪服若不祗王命應加貶黜詔從之謝尚康帝時為司徒西曹掾時有遭亂與父母乖離議者或以進仕理王事婚姻繼百世於禮非嫌尚議曰典禮之興皆因循情理開通𢎞勝如運有屯夷要當斷之以大義夫無後之罪三千所不過今婚姻将以繼百世崇宗緒此固不可塞也然至於天屬生離之間父子乖絶之痛痛之深者莫深於兹夫以一體之小患猶或忘思慮損聴察况於抱傷心之巨痛懐忉怛之至戚方寸既亂豈能綜理時務哉有心之人决不冐榮茍進冐榮茍進之儔必非所求之㫖徒開偷薄之門而長流弊之路或有執志丘園守心不革者猶當崇其操業以𢎞風尚而况含艱履戚之人勉之以榮貴耶殷融為太常穆帝即位㓜冲禇太后臨朝時議后父禇裒進見之典蔡謨王彪之竝以虞舜漢髙祖猶執子道况后乎王者父無拜禮尚書八座議以為純子則王道缺純臣則孝道虧謂公庭如臣私覿則嚴父為允融議依鄭𤣥議衞将軍裒在公庭則盡臣敬太后歸寕之日自如家人之禮太后詔曰典禮誠所未詳如所奏事情所不能安也更詳之征西将軍翼南中郎尚議為父尊盡於一家君敬重於天下鄭𤣥議合情禮之中太后從之孫綽為尚書郎永和二年七月有司奏十月殷祭京兆府尹當遷祧室昔征西豫章潁川三府君毁主中興之初權居天府在廟門之西咸康中太常馮懐表續太廟奉還於西儲夾室謂之為祧疑亦非禮今京兆還入是為四世逺祖長在太祖之上昔周室太祖世逺故遷有所歸今晉廟宣皇為主而四世居之是屈祖就孫也殷祫在上是代太祖也領司徒蔡謨議四府君宜改築别室若未展者當入就太廟之室人莫敢卑其祖文武不先不屈以祭之日征西東靣處宣皇之上其後遷廟之主藏於征西之祧祭薦不絶䕶軍将軍馮懐議禮無廟者為壇以祭可立别室藏之至殷禘則祭於壇也輔國将軍譙王司馬無忌等議禘諸儒謂大王王季遷主藏於文武之祧如此府君遷主宜在宣帝廟中然今無寝室宜變通而改築又殷祫太廟征西東靣綽與無忌議同曰太祖雖位始九五而道以從暢替人爵之尊篤天倫之道所以成教本而光百代也尚書郎徐禪議禮去祧為壇去壇為墠嵗祫則祭之今四祖遷主可藏之石室有禱則祭於壇又遣禪至㑹稽訪處士虞喜喜答曰漢世韋𤣥成等以毁主瘞於園魏朝議者云應埋兩階之間且神主本在太廟若今側室而祭則不如永藏又四君無追號之禮益明應毁而無祭是時簡文為撫軍将軍與尚書郎劉邵等奏四祖同居西祧藏主石室禘祫乃祭如先朝舊儀時陳留范宣兄子問此禮宣答曰舜廟所以祭皆是庻人其後世逺而毁不居舜廟上不序昭穆今四君號猶依本非以功德致祭也若依虞主之瘞則猶藏子孫之所若依夏主之埋則又非本廟之階宜思其變别築一室親未盡則禘祫處宣帝之上親盡則無縁下就子孫之列其後太常劉遐等同蔡謨議􅀶士或疑陳於太祖者皆其後之毁主慿按古義無别前後之文也禹不先鯀則遷主居太祖之上亦何疑也於是京兆入西儲同謂之祧如前三祖遷主之禮故正室猶十一也王彪之為太常升平元年将納皇后何氏彪之大引經傳及諸故事以定其禮深非公羊婚禮不稱主人之義遂建議曰王者之於四海無非臣妾雖父兄之親師友之賢皆純臣也夫崇三綱之始以定乾坤之儀安有天父之尊而稱臣下之命以納伉儷安有臣下之卑而稱天父之名以行大禮逺尋古禮無王者此制近來史籍無王者此比於情不安於義不通按咸寕二年納悼皇后時𢎞訓太后母臨天下而無命戚屬之臣為武皇后兄主婚之文又考大晉已行之事咸寕故事不稱父兄師友則咸寕華恒所上禮合於舊臣愚謂今納后儀制宜一依咸寕故事於是從之何琦為涇縣令升平中論備五嶽祠曰唐虞之制天子五載一廵狩順時之方柴燎五嶽望於山川徧於羣神故曰因名山升中於天所以昭告神祗享報功德是以災厲不作而風雨寒暑以時䧏及三代年數雖殊而其禮不易五嶽視三公四凟視諸侯著在經紀所謂有其舉之莫敢廢也及秦漢都西京涇渭長水雖不在祀典以近咸陽故盡得比大川之祀而正立之祀可以闕哉自永嘉之亂神州傾覆兹事替矣惟􅏦之天柱在王畧之内也舊臺選百戸吏卒以奉其職中興之際未有官守廬江郡常遣太史兼假四時禱賽春釋寒而冬請水咸和迄今又復隳替計今非典之祀可謂非一考其正名則淫昏之鬼推其縻費則百姓之蠧而山川大神更為簡闕禮俗頺紊人神雜擾公私奔惑漸以繁滋良繇頃國家多難日不暇給草建廢滯事有未遑今元憝已殱宜修舊典嶽瀆之域風教所被來蘓之衆咸蒙德澤而神明禋祀未之或甄廵狩柴燎其廢尚矣崇明前典将俟皇輿北旋稽古憲章大釐制度爼豆牲牢祝嘏辭說舊章靡記可令禮官作式歸諸誠簡以逹明德馨香如斯而已其諸妖孽可粗依法先去其甚俾邪正不黷時不見省江霦為尚書僕射哀帝即位欲尊崇章皇太妃大司馬桓温議宜稱太夫人霦議曰虞舜體仁孝之性盡事親之禮貴為天王富有四海而瞽叟無立錐之地一級之爵蒸蒸之心昊天罔極寕當忍父卑賤不以徽號顯之豈不以子無爵父之道理窮義屈靡所厝情者哉春秋經曰紀季姜歸于京師傳曰父母之於子雖為天王后猶曰吾季姜言子尊不加父母也或以為子尊不加父母則武王何以追王太王王季文王乎周之三王德配天地王跡之興自此始也是以武王仰尋前緒遂奉天命追崇祖考明不以子尊加父母也按禮㓜不誄長賤不誄貴㓜賤猶不得表彰長貴况敢錫之以榮命邪漢祖感家令之言而尊太公荀恱以為孝莫大於嚴父而以子貴加之父母家令之言過矣爰逮孝章不上賈貴人以尊號而厚其金寳幣帛非子道之不致也蓋聖典不可踰也當春秋時庻子承國其母得為夫人不審直子命母耶故當告於宗祧以先君之命命之耶竊見詔書當臨軒拜授貴人為皇帝太妃今稱皇帝䇿命命貴人斯則爵母也貴人北靣拜授斯則母臣子也天尊地卑名位定矣母貴子賤人倫序矣雖欲加崇貴人而實卑之雖顯明國典而實廢之且人主舉動史必書之如當載之方策以示後世無乃不順乎竊謂應告顯宗之廟稱貴人仁淑之至宜加殊禮以酬鞠育之惠奉先靈之命事不在己妃后雖是配君之名然自后以下有夫人九嬪無稱妃焉桓温謂宜進號太夫人非不允也如以夫人為少可言皇太夫人皇君也君太夫人於名禮順矣帝特以下詔拜皇太妃又詔曰朝臣不為太妃敬為合禮下太常江逌議位號不極不應盡敬孔嚴為尚書左丞隆和元年詔天文失度太史雖有禳祈之事猶釁𤯝屢彰今欲依洪祀之制於太極殿前廷親執䖍肅嚴奏曰洪祀雖出尚書大傳先儒所不究歴代莫之興承天接神豈可疑殆行事天道無親惟德是輔陛下祗順恭敬留心兆庻可以消災復異皆已蹈而行之德合神明丘禱乆矣豈湏屈萬乘之尊修雜祀之事君舉必書可不慎與帝嘉之而止江逌為太常哀帝以天文失度欲依尚書洪祀之制於太極前殿親執䖍肅兾以免咎使太常集􅀶士草其制逌上疏諌曰臣尋史漢舊事藝文志劉向五行傳洪祀出於其中然自前代以來莫有用者又其文惟說為祀而不載儀注此蓋乆逺不行之事非常人所叅校按漢儀天子所親之祀惟宗廟而已祭天於雲陽祭地於汾隂在於别宫遥拜不詣壇所其餘羣祀之所必在幽静是以圓丘方澤列於郊野今若於承明之庭正殿之前設羣神之座行躬親之禮凖之舊典有乖常式臣聞妖𤯝之發所以鑒悟時主故寅畏上通則宋災退度德禮増修則殷道以隆此往代之成騐不易之定理頃者星辰頗有變異陛下祗戒之誠逹於天人在予之懼忘寝與食仰䖍𤣥象俯凝庻政嘉祥之應實在今日而猶乾乾夕惕思廣兹道誠實聖懐殷勤之至然洪祀有書無儀不行於世詢訪時學莫識其禮且其文曰洪祀大祀也陽曰神隂曰靈舉國相率而行祀順四時之序無令過差今按文而言皆漫而無適不可得詳若不詳而修其失不小帝不納逌又上疏曰臣謹更思尋叅之時事今彊戎據於闗雍桀狄縱於河朔封豕四逸䖍劉神州長旌不捲鉦皷日戒兵疲人困嵗無休已人事弊於下則七曜錯於上災沴之作固其宜然又頃者以來無乃大異彼月之蝕義見詩人星辰莫同載於五行故洪範不以為沴陛下今以晷度之失同之六沴引其輕變方之重𤯝求己篤於禹湯憂勤踰乎日昃将修大祀以禮神祗傳曰外順天地時氣而祭其鬼神然則神必有號祀必有義按洪祀之文惟神靈大畧而無所祭之名稱舉國行祀必無貴賤之阻有赤黍之盛而無牲醴之奠儀法所用缺畧非一若率文而行則舉義皆閡有所施補則不統其源漢侍中盧植時之逹學受法不究則不敢厝心誠以五行深逺神道幽昩探賾之求難以常思錯綜之禮不可一數誠非至精孰能與此帝猶勅撰定逌又陳古義帝乃止徐藻為太學愽士孝武太元九年崇德太后禇氏喪后於帝為從嫂或疑其服藻議資父事君而敬同又禮傳其夫屬乎父道者妻皆母道也則夫屬君道妻亦后道矣服后宜以資母之義魯譏逆祀以明尊尊今上躬奉康穆哀皇及靖后之禮致敬同於所天豈可敬之以君道而服廢於本親謂應服齊衰朞於是帝制朞服范寗為中書侍郎太元十一年九月皇女亡及應烝祠寗奏按喪服傳有死宫中者三月不舉祭不别長㓜之與貴賤也皇女雖在嬰孩臣竊以為疑於是尚書奏使三公行事庾𢎞之為􅀶士太元十二年議二王坐與太子先後𢎞之及尚書叅議竝以為陳留國之上賔皇太子雖國之儲貳猶在臣位陳留王坐應在太子上徐邈為祠部郎中孝武太元十二年五月壬戌詔曰昔建太廟毎事從儉太祖虛位明堂未建郊祀國之大事而稽古之制闕然便可詳議邈議圓丘郊祀繼典無二宣皇帝甞辨斯義而檢以聖典爰及中興備加研極以定南北二郊誠非異學所可輕改也謂仍舊為安武皇帝建廟六世祖三昭三穆宣皇帝創基之主實惟太祖而親則王考四廟在上未及遷也權虚東向之位也兄弟相及義非二世故當今廟祀世數未足而欲太祖正位則違事亡之義矣又禮曰庻子王亦禘祖立廟蓋謂支裔援立則親近必復京兆府君於今六世宜復立此室則宣皇未在六世之上須前世既遷乃太祖位定耳京兆遷毁宜藏主於石室雖禘祫猶弗及何者𫝊稱毁主升合乎太祖升者自下之名不謂可䧏尊就卑也太子太孫隂室四主儲嗣之重升祔皇祖所托之廟世逺應遷然後從食之孫與之俱毁明堂方圓之制綱領已舉不闕配帝之祀且王者以天下為家未必一邦故周平光武無廢於二京也明堂所祀之神積疑莫辯按易殷薦上帝以配祖考祖考同配上帝亦為天而嚴父之義顯周禮旅上帝者有故告天與郊祀常祀同周禮四主故竝言之若上帝是五帝經文何不言祀天旅五帝祀地旅四望乎侍中車𦙍議同又曰明堂之制既其難詳且樂主於和禮主於敬故質文不同音噐亦殊既茅茨廣厦不一其度何必守其形範而不𢎞本從俗乎九服咸寕河朔無塵然後明堂辟雍可崇而修之時朝議多同於是奏行所改又元帝鄭夫人生簡文帝孝武太元十九年尊號簡文太后時羣臣希㫖多謂鄭太后應配食於元帝者帝以問邈邈曰臣按陽秋之義母以子貴魯隠尊桓母别考仲子之宫而不配食於惠廟又平素之時不伉儷於先帝至於子孫豈可為祖考立配其崇尊盡禮繇於臣子故稱太后陵廟備典若乃祔葬配食則義所不可從之車𦙍為侍中領國子博士太元中尚書符問王公已下見皇太子儀及所衣衣服𦙍議朝臣宜朱衣褠幘拜敬太子答拜按經傳不見其文故太傅羊祜牋慶太子稱叩頭死罪此則拜之證也又太寕三年詔議其典尚書卞壺謂宜稽則漢魏闔朝同拜其朱衣冠冕惟施之天朝宜褠幘而已朝議多同又臺符問皇太子既拜廟朝臣奉賀應上禮與不云百辟卿士咸預盛禮展敬拜伏不湏復上禮惟方伯牧守不覩大禮自非酒牢貢羞無以表其誠故宜有上禮猶如元正大慶方伯莫不上禮朝臣奉璧而已太學博士庾𢎞之議按咸寕三年始平濮陽諸王新拜有司奏依故事聽京城近臣諸王公主應朝賀者復上禮今皇太子國之儲副既已崇建普天同慶謂上禮奉賀同徐邈又引一有元良慶在於此封諸侯及新宫上禮既有前事亦皆已瞻仰致敬而又奉觴上夀應亦無疑也劉憙為祭酒時中山王睦表乞依六蓼祀臯陶鄫杞祀相立廟事下太常依禮典平議憙與博士議禮記王制諸侯五廟二昭二穆與太祖之廟而五是則立始祖之廟謂嫡統承重一人得立耳假令支弟竝為諸侯始封之君不得立廟也今睦非為正統若立祖廟中山不得竝也後世中山乃得為睦立廟為後世子孫之始祖耳詔曰禮文不明此制度大事宜令詳審可下禮官博議乃處當之冊府元龜卷五百七十五
