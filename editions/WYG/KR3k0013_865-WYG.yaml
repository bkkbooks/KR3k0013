body:
  text: 册府元龜卷八百六十五宋王欽若等撰總錄部報恩仲尼有言曰以德報德蓋人之生也禀五行之秀首萬物之靈居不違仁動必率道至若受施而不背求舊而不遺金石其心風雨無變乃行之常也安可造次而忘之哉乃有感寛宥之惠則爭其死所蒙推薦之私則讓彼封爵或施之甚薄而報之甚厚或㧞於困辱而事於榮逹以至尊其親恤其子制之服紀營乎墳墓以答平生之遇以伸感慨之節詩不云乎無德不報其斯之謂歟提彌明晉人也大夫趙盾嘗田首山蒲坂縣有雷首山見桑下有餓人卽提彌明也盾與之食食其半問其故曰宦三年宦學也未知母之存不願遺母盾義之益與之飵肉已而為晉宰夫趙盾弗復知也晉靈公飲趙盾酒伏甲將攻盾公宰提彌明知之恐盾醉不能起而進曰君賜臣觴三行可以罷欲以去趙盾令先毋及難盾旣去靈公伏士未㑹先縱齧狗名獒犬四尺曰獒明為盾搏殺狗盾曰棄人用狗雖猛何為然不知明之為陰德也已而靈公縦伏士出逐趙盾提彌明反擊靈公之伏士伏士不能進而竟脱盾盾問其故曰我桑下餓人問其名弗告明亦因亡去宣子田於首山舍于翳桑見靈輒餓問其病曰不食三日矣食之舎其半問之曰宦三年矣未知母之存否今近焉請以遺之使盡之而為之簞食與肉寘諸槖以與之旣而與為公介倒㦸以禦公徒而免之問何故對曰翳桑之餓人也問其名居不告而退遂自亡也秦繆公與晉惠公夷吾合戰於韓地晉君棄其軍與秦爭利還而馬縶繆公與麾下馳追之不能得晉君及為晉軍所圍晉擊繆公繆公傷於是岐下食善馬者三百人馳冒晉軍晉軍解圍遂脱繆公而反生得晉君初繆公亡善馬岐下野人共得而食之者三百餘人吏逐得欲法之繆公曰君子不以畜產害人吾聞食善馬肉不飲酒傷人乃皆賜酒而赦之三百人者聞秦擊晉皆求從從而見繆公窘亦皆推力爭死以報食馬之德於是繆公虜晉君以歸魏顆晉大夫初武子有嬖妾無子武子疾命顆曰必嫁是武子魏犨顆之父疾病則曰必以為殉及卒顆嫁之曰疾病則亂吾從其治也及輔氏之役顆見老人結草以亢杜回亢禦也杜回躓而顚故獲之夜夢之曰余而所嫁婦人之父也而汝也爾用先人之治命余是以報楚莊王賜其羣臣酒日暮酒酣左右皆醉殿上燭㓕有牽王后衣者王后拖冠纓而絶之言於王曰今燭㓕有牽妾衣者妾揵拖其纓而絶之願􅃐上火視絶纓者則其人也王曰止立出令曰與寡人飲不絶纓者不為樂也於是冠纓無完者不知王后所絶冠纓者誰於是王遂與羣臣歡飲乃罷居數年呉興師攻楚楚有一士常為鴈行五合戰五䧟陣却敵遂取大軍之首而獻之王怪問之曰寡人未嘗有異於子子何為於寡人厚也對曰臣先殿上絶纓者也時當以肝膽塗地矣恨未有所効今幸得用於是臣之義尚或可遂莊王破吳而楚國益彊恩厚之應也荀罃晉大夫邲之戰楚人獲之罃之在楚也鄭賈人有將寘諸褚中以出旣謀之未行而楚人歸之賈人如晉荀罃善視之如實出已賈人曰吾無其功敢有其實乎吾小人不可以厚誣君子遂適齊傳言知罃之賢趙武晉大夫也初司㓂屠岸賈作難攻趙氏於下宫殺趙朔㓕其族朔妻成公姊有遺腹走在公宫匿朔客曰公孫杵臼與朔友人程嬰謀立趙氏孤曰武武卽遺腹也武冠成人程嬰乃辭諸大夫謂趙武曰昔下宫之難皆能死我非不能死我思立趙氏之後今趙氏旣立為成人復故位我將下報趙宣孟與公孫杵臼趙武啼泣頓首固請曰武願苦筋骨以報子至死而子忍去我死乎程嬰曰不可彼以我為能成事故先我死今我不報是以我事為不成遂自殺趙武服齊衰三年為之祭邑春秋之祠世世勿絶公孫龍晉范氏臣也晉趙鞅與鄭師戰初周人與范氏田公孫龍税焉為范氏収周人所與田之税趙氏得而獻之得龍以獻簡子吏請殺之趙孟曰為其主也何罪止而與之田還其所税及鐵之戰以徒五百人宵攻鄭師取蠭旗於子姚之幕下獻曰請報主德北郭騷者齊人也結罘網捆蒲葦織䈈履以養其母養猶不足猶尚也踵門見晏子願乞所以養母晏子之僕謂晏子曰此齊國之賢者也其義不臣乎天子不友乎諸侯於利不茍取於害不茍免於不義之利不茍且而取當義而死故不茍免今乞所以養母是説夫子之義也必予之晏子使人分倉粟分府金而遺之辭金受粟有間晏子見疑於齊君有間無幾也北奔過北郭騷之門而辭辭告别也北郭騷沐浴而出見晏子曰夫子將焉適適之也晏子曰見疑於齊君將出奔奔楚也北郭子曰夫子勉之矣晏子上車太息而歎曰嬰之亡豈不宜哉亦不知士甚矣晏子行行去也北郭子召其友而告之曰説晏子之義而嘗乞所養母焉吾聞之曰養其親者身伉其難伉當也今晏子見疑吾將以身死白之白明也着衣冠令其友操劔奉笥而從造君廷求復曰晏子天下賢者也去復白也齊國必侵矣侵削也必見國之侵也不若先死請以頭託以白晏子謂其友曰盛吾頭於笥中奉以託退而自刎也刎截其友因奉以託其友謂觀者曰北郭子為國故死吾將為北郭子死也又退而自刎齊君聞之大駭乘驛而自追晏子及之國郊驛傳車也郊境也請而反之晏子不得已而反聞北郭騷之以死白已也曰嬰之亡豈不宜哉亦愈不知士之甚矣晏子自謂施北郭騷不得其人為不知士也又不知北郭騷能為其殺身之明已故曰嬰之亡豈不宜哉亦愈不知士甚矣自責深矣蘇秦旣相六國復歸周於是散千金以賜宗族朋友初蘇秦之燕貸百錢為資及得富貴以百金償之徧報諸所嘗見德者其從者有一人獨未得報乃自見於秦秦曰我非忘子子之與我至燕再三欲去我易水之上方是時我困故望子深是以後子今亦得矣范睢旣相秦王稽謂范睢曰事有不可知者三有不可奈何者亦三宫車一日晏駕是事之不可知者一也君卒然捐館舎是事之不可知者二也使臣卒然塡溝壑是事之不可知者三也宫車一日晏駕君雖恨於臣無可奈何君卒然捐館舍君雖恨於臣無可奈何使臣卒然捐溝壑君雖恨於臣亦無可奈何范睢不懌乃入言於王曰非王稽之忠莫能内臣於函谷闗非大王之賢聖莫能貴臣今臣至於相爵在列侯王稽之官尚止於謁者非其内臣之意也昭王召王稽拜為河東守三歲不上計凡郡掌治民進賢勸功决訟簡姦常以春行所至縣勸民農桑振救之絶秋冬遣無害吏案訊問諸囚平其罪法論課殿最歲盡遣吏上計又任鄭安平昭王以為將軍范睢於是散家財物盡以報所嘗困厄者一飯之德必償孟嘗君相齊其舍人魏子為孟嘗君收邑入三反而不致一入孟嘗君問之對曰有賢者竊假與之以故不致入孟嘗君怒而退魏子居數年人或毁孟嘗君於齊湣王曰孟嘗君將為亂及甲申劫湣王湣王意疑孟嘗君孟嘗君乃奔湣王三十四年甲申刼王薛文適秦魏子所與粟賢者聞之乃上書言孟嘗君不作亂請以身為盟遂自刎宫門以明孟嘗君湣王乃驚而蹤跡驗問孟嘗君果無反謀乃復召孟嘗君漢陳平陽武户牖人也初事項羽為都尉後降漢因魏無知求見漢王漢王使叅乘典䕶諸將及高帝會諸侯於陳還至雒陽與功臣剖符定封封平為户牖侯世世勿絶平辭曰此非臣之功也帝曰吾用先生計謀戰勝克敵非功而何平曰非魏無知臣安得進帝曰若子可謂不倍本矣乃復賞魏無知韓信淮陰人也家貧無行又不能治生嘗從人寄食從下鄉南昌亭長食亭長妻苦之乃晨炊蓐食未起而牀蓐中食食時信往不為具食信亦知其意自絶去至城下釣有一漂母哀之飯信竟漂數十日信謂漂母曰吾必重報母母怒曰大丈夫不能自食吾哀王孫而進食豈望報乎信後為楚王都下邳信至國召所從食漂母賜千金及下鄉亭長錢百以耻辱之曰公小人為德不竟言晨炊蓐食張蒼以客從沛公攻南陽蒼當斬解衣伏鑕鑕鍖也身長大肥白如瓠時王陵見而怪其美乃言沛公赦勿斬蒼德王陵及貴父事陵陵死後蒼為丞相洗沐常先朝陵夫人上食然後敢歸家袁盎以泰常使吳吳王欲使將不肯欲殺之使一都尉以五百人圍守盎軍中初盎為吳相時從史盗私盎侍兒盎知之弗泄遇之如故人有告從史君知女與侍者通乃亡去盎驅自追之驅馳而追言疾速遂以侍者賜之復為從史及盎使吳見守從史適在守盎校為司馬為校中之司馬所部之士卒正當守盎乃悉以其裝齎買二石醇醪謂所齎衣物自隨者也醇者不雜言其醲也醪汁滓合之酒也會天寒士卒饑渇飲醉西南陬卒卒皆臥陬隅也司馬夜引盎起曰君可以去矣吳王期旦日斬君盎弗信曰何為者司馬曰臣故為君從史盗侍兒者也盎乃驚謝曰公幸有親言汝有親也吾不足絫公絫古累字也司馬曰君第去第且也臣亦且亡辟吾親亦匿吾親不遇害也君何患乃以刀决帳道從醉卒直出於醉卒之處决帳而開令通道得亡也司馬與分背一時各去也盎觧節旄懐之不欲令人見履歩行七十里著履歩行而逃亡明見梁騎馳去遂歸報過梁軍之騎遂因得脱歸報天子朱買臣為會稽太守悉召見故人與飲食諸常有恩者皆報復焉耳丙吉為丞相馭吏嗜酒數逋蕩逋亡蕩放謂亡其所供之職而放蕩常從吉出醉嘔丞相車上嘔吐也西曹主吏白欲斥之斥棄逐也吉曰以醉飽之失去士使此人將復何所容言無所容身西曹地忍之地猶第也此不過汙丞相車茵耳遂不去也此馭吏邊郡人習知邊塞發犇命警僃事有命則奔赴之言應速也常出適見驛騎持赤白囊邊郡發奔命書馳來至馭吏因隨驛騎至公車刺取刺謂探信之也知虜入雲中代郡遽歸府見吉白狀因曰恐虜所入邊郡二千石長吏有老病不任兵馬者宜可豫視吉善其言召東曹案邊長吏𤨏科條其人𤨏録也欲科條其人老少及所經歴知其本以文武進也未巳詔召丞相御史問以虜所入郡吉具對御史大夫卒遽不能詳知以得譴讓讓責也而吉見謂憂邊思職馭吏力也吉乃歎曰士亡不可容能各有所長嚮使丞相不先聞馭吏言何見勞勉之有掾史繇是益賢吉薛宣字贑君常為趙貢所知戒曰贑君至丞相我兩子亦中丞相史後宣為丞相除趙貢兩子為史貢者趙廣漢之兄子也為吏亦有能名翟方進任丞相司直為丞相薛宣所知後代為丞相思宣舊恩宣免後二歲薦宣明習文法練國制度練猶熟也其言詳熟前所坐過薄可復進用帝徴宣復爵高陽矦加寵特進位次師安昌矦給事中視尚書事宣復尊重後漢趙岐亡命孫嵩以為死友藏複壁中岐奉使荆州時嵩寓於劉表表不為禮岐乃稱嵩素行篤烈因共上為青州刺史魏賈逵初為郡吏守絳邑長郭援攻絳絳潰援捕得逵閉著土窖中以車輪葢上使人固守方將殺之逵從窖中謂守者曰此間無健兒邪而當使義士死此中乎時有祝公道者與逵非故人而適聞其言憐其守正危戹乃夜盗徃引出折械遣去不語其姓名援破後逵乃知前出已者為祝公道公道河南人也後坐他事當伏法逵救之力不能觧為之改服焉鄧艾少為稻田守叢草吏同郡吏父憐其家貧資給甚厚艾初不稍謝後為汝南太守至則尋求昔所厚已吏父已久死遣吏祭之重遺其母舉其子與計吏孫禮為太祖司空軍謀掾初荒亂時禮與母相失同郡馬台求得禮母禮乃推家財盡以與台台後坐法當死禮私導令踰獄自首既而曰臣無逃亡之義徑詣刺姦主簿温恢恢喜之具白太祖各减罪一等荀彧字文若年少時南陽何顒嘗稱彧王佐之器及彧為尚書令時顒卒遣人西迎叔父爽䘮并致顒屍而葬之冡傍吳太史慈東萊人也仕郡奏曹吏會郡與州有隙曲直未分以先聞者為善時州章已去郡守恐後之求可使者慈年二十一選行晨夜兼道至雒陽詣公車門以刀敗州章通郡章州家聞者更遣吏上章有司以格章之故不復見理州受其短繇是知名而為州家所嫉恐受其禍乃避之遼東北海相孔融聞而竒之數遣人問訊其母并致餉遺時融以黄巾㓂暴出屯都昌為賊所圍慈從遼東還母謂慈汝與孔北海未嘗相見至汝行後贍恤殷勤過於故舊今為賊所圍汝宜赴之慈留三日單歩徑至都昌時圍尚未宻夜伺隙得入見融因求兵出斫賊融不聽外救未至都昌而圍日偪融欲告急於平原相劉僃城中人無繇得出慈自請行融曰今賊圍甚急卿意雖壯無乃實難乎慈曰昔府君傾意於老母老母感遇遣慈赴府君之急固以慈有可取而來必有益也今衆言不可慈亦言不可豈府君愛頋之義老母遣慈之意耶事已急矣願府君無疑融乃然之慈遂到平原説僃卽遣精兵三千人隨慈賊聞兵至觧圍走散融旣得濟益竒貴慈事畢還啓母曰我喜汝有以報孔北海也丼寜依黄祖祖不禮之祖都督蘇飛薦寜祖不用寜歸吳勸大帝取祖帝破祖先作兩函欲以盛祖及蘇飛飛令人告急於寜寜曰飛若不言吾豈㤀之帝為諸將置酒寜下席叩頭血涕交流為帝言飛酬昔舊恩寜不值飛固已捐骸於溝壑不得致命於麾下今飛罪當夷戮特從將軍乞其首領帝感其言謂曰今為致之若走云何寜曰飛免分裂之禍受更生之恩逐之尚必不走豈當圖亡哉若爾寜頭當代入函權乃赦飛晉潘岳為河陽令有譙人公孫宏少孤貧客逰於河陽善鼓琴頗能屬文岳愛其才藝待之甚厚岳為楊駿太傅主簿駿誅宏為楚王瑋長史專殺生之政駿綱紀皆當從坐同署主簿朱振已就戮岳旦夕取急在外宏言之瑋謂之假吏故得免唐彬初受學於東海閻德門徒甚多獨目彬有廊廟才及彬官成而德已卒乃為之立碑顧榮有時名為廷尉正及趙王倫篡位倫子䖍為大將軍以榮為長史初榮與同僚宴飲見執炙者貌狀不凢有欲炙之色榮割炙啗之坐者問其故榮曰豈有終日執之而不欲知其味及倫敗榮被執將誅而執炙者為督率救之得免華譚字令思為廬江内史在郡政嚴而與上司多忤揚州刺史劉陶素與譚不善因法收譚下壽陽獄鎭東將軍周馥與譚素相親善理而出之及丼卓討馥百姓奔散馥謂譚已去遣人視之而更移近馥馥歎曰吾嘗謂華令思是臧子源之疇今果效矣丼卓嘗為東海王越所捕下令敢有匿者誅之卓投譚而免及此役也卓遣人求之曰華侯安在吾丼揚威使也譚答不知遺絹二疋以遣之使反告卓卓曰此華侯也覆求之令思已亡矣王談吳興烏程人父為隣人竇度所殺談殺度歸罪有司太守孔巖義其孝勇列上宥之巖諸子為孫恩所害無嗣談乃移居會稽修理巖父子墳墓盡其心力韋𢎞䘮亂之際親屬遇饑疫並盡客逰雒陽素聞應詹名遂依託之詹與分丼共苦情若弟兄遂隨從積年為營伉儷置居宅并薦之於元帝𢎞後位至少府卿旣受詹生成之惠詹卒遂制朋友之服哭止宿草追趙氏祀程嬰杵臼之義祭詹終身陶侃為荆州刺史都督十州軍事命張䕫子隠為參軍范達之子珧為湘東太守辟劉𢎞魯孫安為掾屬表論梅陶凡微時所荷一飱咸報祖逖有胡奴曰王安待之甚厚及在雍丘告之曰石勒是汝種類吾亦不在爾一人乃厚資遣之遂為勒將祖氏之誅也安多將從人於市觀省濳取逖庶子道重藏之為沙門時年十歲石氏㓕後來歸桓冲彛之子初彛亡後冲兄弟並少家貧母患須羊以觧無繇得之兄温乃以冲為質羊主甚富言不欲為質幸為養買德郎買德郎冲小字也及冲為江州出射羊主於堂邊看冲識之謂曰我買德也遂厚報後趙石勒遣石季龍䧟廪邱劉演奔文鴦軍獲演弟啓送于襄國卽劉琨之兄子也勒以琨撫存其母念之賜啓田宅令儒官授其經前秦王猛為相性剛明清肅於善惡尤分㣲時一飱之惠靡不報焉南燕慕容超字祖明德之兄北海王納子也時慕容埀起兵山東苻昌收納及德諸子皆誅之納母公孫氏以之獲免納妻叚氏方娠未决囚之于郡獄獄掾呼延平德之故吏也嘗有死罪德免之至是將公孫及叚氏逃于羌中而生超焉年十歲而公孫氏卒臨終授超以金刀曰若天下太平汝得東歸可以此刀還汝叔也平又將超母子奔于吕光及吕隆降于姚興超又隨凉州人徙于長安宋王鎭惡年十三而苻氏敗亡關中擾亂流寓殽澠之間常寄食澠池人李方家方善遇之鎭惡謂方曰遭遇英雄主要取萬户侯當厚相報方答曰丞相孫人才如此何患不富貴至時願見用為本縣令足矣後鎭惡為龍驤將軍領前鋒將隨高祖北伐進次澠池造方家升堂見母厚加酬賚卽授方為澠池令黄回竟陵郡軍人也後與人相打詐稱江夏王義恭馬客被鞭二百付右尚方㑹中書舎人戴明寶被繫差回為戸伯奉事明寶竭心盡力明寶尋得原委任如初啓免回以領隨身隊統回後為都督南兖州刺史旣貴袛事明寶甚謹言必自名未嘗敢坐躬至帳下及入内料簡有無隨乏供送以此為常南齊王智深為竟陵王司徒參軍坐事免初為司徒袁粲所接及撰宋紀意常依依粲㓜孤祖母名為愍孫後慕荀粲自改名㑹稽賀喬譏之智深於是著論王晏父普曜為沈攸之長吏常慮攸之舉事不得還時王奐為吏部轉普曜為内職深德之及奐為丹陽尹而晏仕世祖府奐從弟藴反世祖謂晏曰王奐宋家外戚王藴親同逆黨旣其羣從豈能無異意我欲具以啓聞晏叩頭曰王奐修謹保無異志晏父母在都請以為質世祖乃止張融遷竟陵王子良司徒右長史竟陵張欣時為諸曁令坐罪當死先是欣時父興世討南譙王義宣官軍欲殺融父暢興世以袍覆暢而坐之以此免興世卒融着高履負土成墳至是融啓竟陵王子良乞代欣時死子良答曰此乃是長史美事恐朝廷有常典不得如長史所懐初宋丞相起事融父暢以不同將見殺司馬竺超民諌免之暢臨終謂諸子曰昔丞相事難吾縁竺司馬得活爾等必報其子弟後超民孫㣲冬月遭母䘮居貧融徃弔之悉脫衣以為賻被牛衣而反常以兄事微梁陳伯之為江州刺史伯之與豫章人鄧善永興人載承忠並有舊善經藏伯之息免禍伯之尤德之及在州用善為别駕永忠記室參軍陳隂鏗仕梁釋褐湘東王法曹參軍天寒鏗嘗與賓友宴飲見行觴者廻酒炙以授之衆坐皆笑鏗曰吾儕終日酣飮而執爵者不知其味非人情也及侯景之亂鏗嘗為賊所擒或救之獲免鏗問其故乃前所行觴者後魏長孫承業孝武初為太𫝊録尚書事以定䇿功更封開國子承業表請廻授其姨兄廷尉卿元洪超次子惲初承業生而母亡為洪超母所撫養是以求讓之又承業少游俠鬬鷄走馬力爭殺人因亡抵龍門將陳興德家㑹赦乃免因以後妻羅氏前夫女吕氏妻興德兄興恩以報之房景逺好施與頻歲㐫儉分贍宗族景遠又於通衢食餓者後平原劉郁行經兖州之境忽遇刼賊已殺十餘人次至郁郁呼曰與君鄕近何忽見殺賊曰若言鄕里親親是誰郁曰齊州主簿房陽我姨兄陽是景遠小字賊曰我食其粥得活何得殺其親遂還衣服䝉活者二十餘人盧度世為中書學生應選東宫後以崔浩事逃於高陽鄭羆家使者囚羆長子遂被拷掠至乃火焚其體因以物故卒無所言度世後令弟娶羆妹以報其恩賀㧞勝都督荆州為侯景所敗南奔于梁在江表三年梁武遇之甚厚求還梁武親餞於南苑勝自是之後毎行執弓矢見鳥獸南向者皆不射之以申懐德之意後周宇文測為駙馬都督在雒陽之日曽被竊盗亡物卽其妻陽平主之衣服也州縣擒盗并物俱獲測恐此盗坐之以死乃不認焉遂遇赦得免盗旣感恩因請為測左右及測從孝武西遷事極狼狽此人亦從測入關竟無異志隋爾朱敞榮之族子高歡之誅爾朱氏敞隨母在宫中及年十二乃自竇中出奔時追之急遂投一村見長孫媪拜以求哀長孫氏愍而藏於複壁三年乃得歸於周太祖及為膠州刺史於是迎長孫氏及弟置於家厚資給之唐李大亮為左衛大將軍大亮隋末為賊所獲賊將張弼見而異之獨釋與語後每懐弼之恩而訪之不能得弼時為將作丞自匿不言大亮嘗遇諸塗而識之持弼而泣恨相得之晚多推家産以遺弼弼讓而不受大亮言於太宗曰臣有今日之榮張弼力也所有官爵請廻授弼太宗遂擢弼為中郎將俄遷代州都督時人皆賢大亮不背恩而多弼不自伐也王珪貞觀中歴侍中禮部尚書撫孤姪同於己子少時貧寒人或遺之初不辭謝及貴秩奉皆分給之雖其已亡必厚賑其妻子羅士信為雒水行軍總管士信初為裴仁基所禮嘗感其知己之恩及東都平遂以家財收歛葬於北邙又云我死後當葬此墓側及卒果就仁基左為託葬焉竇希瑊孝諶之子也初諶妻龎氏奴誣告當斬徐有功獨明其無罪减死有功卒中宗踐祚希瑊等請以身之官爵讓有功子倫以報􅃇恩倫繇是自太子司議郎遷恭陵令韓朝宗為萬年縣主簿張嘉貞薦朝宗擢為監察御史及嘉貞卒後十數歲朝宗為京兆尹因奏曰自陛下臨御以來所用宰相皆進退以禮善始令終身雖巳没子孫咸在朝惟張嘉貞晚年一子今獨未登官序帝亦惘然遽令召之賜名延賞特拜左内率府參軍王思禮為河東節度使先是京兆人張光晟起於行間天寳末哥舒翰兵敗潼關思禮為大將所乗馬中流矢而斃光晟時在騎卒之中因下以馬授思禮問其姓名不告而退思禮陰記其形貌嘗使人密求之至是思禮使其偏將辛雲京為代州刺史屢為將校譛毁思禮怒焉雲京惶懼不知所出光晟時𨽻雲京麾下因間進曰光晟素有德於王司空比不言者耻以舊恩受賞耳今使君憂迫光晟請奉命一見司空則使君之難可解雲京然其計卽令之太原及謁思禮未及言舊思禮識之乃曰爾豈非吾故人乎何相見之晚光晟遂陳潼關之事思禮大喜因執其手感泣曰吾有今日子之力也求子頗乆竟此相遇何慰如之卽令同牀而坐結為兄弟光晟遂述雲京之屈思禮曰雲京比渉謗言過亦不細今為故人特舎之矣卽日擢光晟為兵馬使賚以田宅縑帛甚厚累奏特進試太常少卿委以腹心及雲京為河東節度又表光晟代州刺史李晟封西平王嘗有恩者厚報之初譚元澄為嵐州刺史嘗有德於晟後坐貶官死於岳州比晟後貴上疏理之詔贈元澄寧州刺史元澄三子晟撫待勤至皆成就宦學人皆義之田敦為衢州刺史大厯中令孤峘自禮部侍郎貶衡州别駕貞元中改吉州刺史復貶衢州别駕敦卽大厯中進士吉也峘以放及第牓日貶與敦不相識敦聞峘來喜曰吾今日乃見座中至則迎謁分其俸之半以奉之後唐郭崇韜為樞密使初莊宗為晉王以孟知祥為中門使甚有輔佐功後數年舉崇韜自代崇韜嘗德之及莊宗有天下崇韜為樞密使知祥為京兆副留守知留守事同光三年莊宗命崇韜從魏王繼岌伐蜀崇韜將行因奏云陛下委臣以戎事仗將士之忠孝慿陛下之神武皷行而西庻幾集事如蜀川平定陛下擇帥以臣料之信厚善謀事君以禮則北京副留守孟知祥有焉願陛下志之及蜀平莊宗遽命知祥為劍南節度使自太原馳騎入蜀晉吕琦天福中為禮部尚書初琦父兖為滄州節度判官及劉守光攻䧟滄州琦時年十五將就戮有趙玉者幽薊之義士也乆游於兖之門下見琦臨危乃負琦逃禍琦以玉免已於難欲厚報之玉遇疾琦親為扶侍供其醫藥玉卒代其家營葬事玉之子曰文度旣孤而㓜琦誨之甚篤及其成人登進士第尋升官路琦之力也劉煦開運初為相先是避難河朔匿於北山蘭若有賈少瑜者為僧輟衾袍以温燠之及煦宦逹致少瑜進士及第監察御史聞者義之周陳觀為樞密直學士廣順二年十二月詔故青州節度使霍彥威嫡孫緒為𢎞文舘校書郎姪承慶為祕書省正字彦威子承訓累典郡符先是觀在承訓門下觀以霍氏門户孤弱言之於相王峻峻為之聞奏故有是授王峻為樞密使時有趙崇勲者梁故租庸使嵓之姪見在陳州詔本州量給先代官趙嵓店宅以賜之從峻請之也峻㓜事嵓頗得親愛至是嘗於中書言欲與嵓求贈官及立碑以報宿恩同列謂之曰趙張二族貪權擅利同傾梁室至今言者無不切齒若為立碑贈官恐生物議峻乃止但奏請與趙崇勲店宅而已冊府元龜卷八百六十五
