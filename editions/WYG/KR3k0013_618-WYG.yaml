body:
  text: 册府元龜卷六百十八宋王欽若等撰刑法部平允平反平允易曰君子以明慎用刑而不留獄傳曰刑者侀也侀者成也一成而不可變故君子盡心焉是故惟明克允虞帝之申戒簡孚審克吕刑之有云三代而下治獄之吏乃其達欽恤之㫖稽伏念之訓深懐仁恕務遵寛大原人心以定法傳經義而立論悉其聰明致其忠愛情得而勿喜罪疑而從輕無有適莫歸乎至當故能使羣議厭服刑章式叙上無枉撓之失民知恥格之漸其於守官宿業不亦多乎故臯陶之淑問流於雅頌張釋之為名臣稱於史氏何莫由斯也已公甫為魯大夫如衞衞人請曰公甫不能聴獄乎子曰不知公甫之不能聴獄也公甫之聴獄也有罪者懼無罪者恥民近禮矣漢趙禹為廷尉始條侯以禹賊深及禹為少府九卿酷急至晩節事益多吏務為嚴峻而禹治加緩名為平杜延年為大將軍霍光軍司馬光持刑罰嚴延年輔之以寛治燕王獄時御史大夫桑𢎞羊子遷亡過父故吏侯史吳姓侯名史吳後遷捕得伏法㑹赦侯史吳自出繫獄廷尉王平與少府徐仁雜治反事交雜同共治之也皆以為桑遷坐父謀反而侯史吳藏之非匿反者廼匿為隨者也言桑遷但隨坐耳非自反也即以赦令除吳罪後侍御史治實重覈其事也以桑遷通經術知父謀反而不諌諍與反者身無殊侯史吳故三百石吏首匿遷首匿者言身為謀首而藏匿人也他皆類此不與庶人匿隨從者等吳不得赦奏請覆治劾廷尉少府縱反者少府徐仁即丞相車千秋女壻也故千秋數為侯史吳言恐光不聼千秋即召中二千石博士㑹公車門議問吳法於法律之中吳當得何罪議者知大將軍指皆執吳為不道明日千秋封上衆議光於是以千秋擅召中二千石以下外内異言外内謂外朝及内朝也遂下廷尉平少府仁獄朝廷皆恐丞相坐之延年乃奏記光爭以為吏縱罪人有常法今更詆吳為不道恐於法深詆誣也又丞相素無所守持而為好言於下盡其素行也非故有所執持但其素行好與在下人言議耳至擅召中二千石甚無狀無善状也延年愚以為丞相久故及先帝用事言在位已久是為故舊又常及仕先帝而任事也非有大故不可弃也間者民頗言獄深吏為峻詆峻謂峭刻也今丞相所議又獄事也如是以及丞相恐不合衆心羣下讙譁庶人私議流言四布延年切重將軍失此名於天下也重猶難也以此為重事也光以廷尉少府㺯法輕重皆論弃市而不以及丞相終與相竟謂終丞相之身無貶黜也延年論議持平合和朝廷皆此類也黄覇為河南丞為人明察内敏内敏言心思㨗疾也又習文法然溫良有譲足知善御衆為丞處議當於法合人心太守甚重之吏民愛敬焉自武帝末用法深切昭帝立大將軍霍光秉政大臣爭權上官桀等與燕王謀作亂既誅之遂遵武帝法度以刑罰痛繩羣下由是俗吏尚嚴酷以為能而覇獨用寛和為名㑹宣帝即位在民間時知百姓苦吏急也聞覇持法平召以為廷尉正數决疑獄廷中稱平于公為縣獄史郡決曹決獄平羅文法者于公所决皆不恨羅罹也于定國為廷尉其决疑平法務在哀鰥寡罪疑從輕加審慎之心朝廷稱之曰張釋之為廷尉天下無寃民言决罪皆當于定國為廷尉民自以不寃孔光為廷尉光久典尚書練法令號稱詳平後漢何敞六世祖比干武帝時為廷尉正與張湯同時湯持法深而比干務仁恕數與湯争雖不能盡得然所濟活者以千數郭躬父𢎞習小杜律杜周武帝時為廷尉御史大夫斷獄深刻少子亦明法律宣帝時又為御史大夫對父故言延年小太守㓂恂以𢎞為决曹掾斷獄至三十年用法平諸為𢎞所决者退無怨情郡内比之東海于公及躬為廷尉務在寛平及典理官决獄斷刑多依矜恕又條諸重文可從輕者四十一事奏之事皆施行著于令寒朗永平中以謁者守侍御史與三府掾屬六考案禁獄顔忠王平等辭連及遂鄉侯耿建朗陵侯臧信䕶澤侯鄧鯉曲成侯劉建建等辭未嘗與忠平相見是時明帝怒甚吏皆惶恐諸所連及率一切䧟入無敢以情恕者朗心傷其寃試以建等物色獨問忠平而二人錯愕不能對朗知其詐及上言建等無姦專為忠平所誣疑天下無辜類多如此帝乃召朗入問曰建等即如是忠平何故引之朗對曰忠平自知所犯不道故多有虛引兾以自明帝曰即如是四侯無事何不早奏獄竟而久繫至今耶朗對曰臣雖考之無事然恐海内别有發其姦者故未敢時上帝怒罵曰吏持两端促提下左右方引去朗曰願一言而死小臣不敢欺欲助國耳帝問曰誰與共為章對曰臣自知當必族㓕不敢多汚染人誠兾陛下一覺悟而已臣見考囚在事者咸共言妖惡大故臣子所宜同疾今出之不如入之可無後責是以考一連十考十連百又公卿朝㑹陛下問以得失皆長跪言舊制大罪禍及九族陛下大恩裁止於身天下幸甚及其歸舍口雖不言而仰屋竊歎莫不知其多寃無敢牾陛下者臣今所陳誠死無悔帝意觧詔遣朗出後二日車駕自幸雒陽獄錄囚徒理出千餘人後平忠死獄中朗乃自繫㑹赦免官舉孝亷建中初章帝大㑹羣臣朗前謝恩詔以朗納忠先帝拜為易長黄香和帝時為尚書令東平清河奏妖言卿仲遼等所連及且千人香科别㨿奏全活甚衆每郡國疑罪輙務求輕科愛惜人命每存憂濟陳寵為司徒辭曹掌天下獄訟其所平决無不厭服衆心及代郭躬為廷尉性仁矜及為理官數議疑獄嘗親自為奏毎附經典務從寛恕帝輙從之濟活者甚衆其深文刻敝於此少衰陳忠者寵之子也安帝時為尚書居三公曹三公曹尚書主知斷獄自以世典刑法用心務在寛詳初父寵在廷尉上除漢法溢於甫刑者未施行及寵免後遂寢而苛法稍繁人不堪之忠略依寵意奏上二十三條為决事比以省請讞之弊又上除蠶室刑觧贓吏三世禁錮狂易殺人得减重論母子弟兄相代死聼赦所代者事皆施行虞輕為郡縣獄吏案法平允務在寛恕每冬月上其狀嘗流涕隨之盛告字君逹為廷尉性多哀憐視事十二年天下稱有恩張皓為廷尉雖非法家而留心刑斷數與尚書辨正疑獄多以詳當見從詳審而平當也傅賢為廷尉嘗垂念刑法務從輕比至斷獄遲迴流泣在位四年治獄稱平是雄字季高順帝時以明法律為廷尉斷獄平允魏高柔為刺姦令史處法允當獄無留滯辟為丞相倉曹屬司馬芝為大理正有盗官練置都厠上者吏疑女工收以付獄芝曰夫刑罪之失失在苛暴令贓物先得而後訊其辭若不勝掠或至誣服誣服之情不可以折獄且簡而易從大人之化也不失有罪庸世之治耳今宥所疑以隆易從之義不亦可乎太祖從其議王朗為大理務在寛恕罪疑從輕鍾繇明察當法俱以治獄見稱蜀楊戲年二十餘從州書佐為督軍從事職典刑獄論法决疑號為平當晋杜友初仕魏為侍御史毌丘儉之誅黨與七百餘人友治獄惟舉首事十人餘皆奏散何曾魏末為司𨽻校尉時毌丘儉誅子甸妻荀應坐死其族兄顗族父虞並景帝姻通共表魏帝以匄其命詔聼離婚荀所生女芝為潁川太守劉子元妻亦坐死以懐妊繫獄荀辭詣曾乞恩曰芝繫在廷尉顧影知命計日被法乞沒為官婢以贖芝命曾哀之騰辭上議朝廷僉以為當遂改法衛瓘轉廷尉卿瓘明法理每至聼訟小大以情趙至幽州三辟部從事斷乆獄見稱精審顧榮為廷尉正㑹趙王倫誅淮南王允收允寮屬付廷尉皆欲誅之榮平心處當多所全宥庾峻為秘書丞時長安有大獄乆不决拜峻侍御史徃斷之朝野稱允江統為廷尉正每州郡疑獄斷處從輕續咸脩陳杜律明逹刑書懐帝永嘉中歴廷尉平東安太守劉琨承制于并州以為從事中郎後遂沒石勒勒以為理曹叅軍持法平詳當時稱其清裕比之于公梁孔休源為建康獄正及辯折時罕寃人後有選人為獄司者高祖嘗引休源以勵之陳殷不害年十七仕梁為廷尉評不害長於故事兼飾以儒術名法有輕重不便者輙上書言之多見納用袁憲為御史中丞詳練朝章尤明聼斷至有獄情未盡而有司具法者即伺閑暇常為上言之其所申理者甚衆後魏于栗磾太武時為外都大官平刑折獄甚有聲稱唐和為内都大官評决獄訟不加捶楚欵獲實者甚多世以是稱之司馬文思為廷尉卿善於其職聼訟斷獄百姓不復匿其情高允文成時為中書侍郎遷中書令又遷監初眞君中以獄訟留滯始令中書以經義斷諸疑事允㨿律評刑三十餘載内外稱平允以為獄者民之命也嘗歎曰臯陶至德也其後英蓼先亾劉項之際英布黥而王世經雖乆猶有刑之餘釁况凡人能無咎乎任城王澄孝文時恒州刺史穆㤗謀反推朔州刺史陽平王頥為主詔澄討之澄先遣治書李煥擒㤗後治窮其黨與罪人皆得鉅鹿公陸叡安樂侯元降等百餘人皆獄禁具狀表聞孝文覧表大悦召集公卿已下以表示之曰我任城可謂社稷臣也尋其罪案正復臯陶斷獄豈能過之顧謂咸陽王等曰汝等脱當其處不能辦此車駕尋幸平城勞澄曰任城此行深副逺寄對曰陛下威靈逺被罪人無所逃刑臣何勞之有引見逆徒無一人稱枉時人莫不歎之孝文顧謂左右曰昔仲尼云聼訟吾猶人也必也使無訟然聖人之聼訟殆非常人所匹必也無訟今日見之矣廣川王畧延興中為中都大官性明敏鞫獄稱平吕羅漢太和中為内都大官聼訟折獄多得其情游肇宣武時為廷尉卿兼御史中丞肇儒者動存名教直繩所舉莫非傷風敗俗持法仁平斷獄務於矜恕甄宻東魏孝静初為廷尉卿在官有平直之譽趙肅西魏文帝大統中為廷尉卿乆在理官執心平允凡所處斷咸得其情亷慎自居不營産業時人以此稱之楊敷恭帝時為廷尉少卿所斷之獄號稱平允北齊李稚為大理卿世稱平直封述乆為法官明觧律令議斷平允深為時人所稱蘇瓊字珍之為司直廷尉正時畢義雲為御史中丞以猛暴任職理官忌憚莫敢有違瓊推察務在寛平得雪者甚衆寺署臺案始自於瓊遷三公郎中趙州及河南有人頻吿謀反前後皆付瓊推撿事多申雪尚書崔昻謂瓊曰若欲立功名當更思餘理乃數雪反逆身命何輕瓊正色曰所雪者寃枉不放反逆昂大慚京師為之語曰斷决無疑蘇珍之宋世軌幼自嚴整好法律稍遷廷尉卿雒州民聚結欲刼河橋吏捕案之連諸兇徒黨千七百人崔暹為廷尉以之為反數年不斷及世軌為少卿判其事為刼於是殺魁首餘從坐悉捨焉時大理正蘇珍之亦以平幹知名寺中為之語曰决定嫌疑蘇珍之視表見裏宋世􅁤時人以為寺中二絶及卒廷尉御史諸繫囚聞世􅁤死皆哭曰宋廷尉死我等豈有生路皮景和後主武平中詔獄多令黄門等監治常令景和案覆㨿理執正由是過無枉濫後周裴政為少司憲用法寛平無有寃濫囚徒犯極刑者乃許其妻子入獄就之至冬將行决皆泣曰裴大夫致我於死死無所恨其處法詳平如此令狐整為司憲中大夫處法允平為當時所稱隋趙綽為大理丞處法允平考績連最轉大理正後為刑部侍郎高祖以盗賊不禁將重其法綽進諌曰陛下行堯舜之道多存寛宥况律者天下之大信其可失乎帝欣然納之因謂綽曰若更有聞見宜數陳之也遷大理少卿梁毗為大理卿處法平允時人稱之滑儀京兆長安人性剛鯁有不可奪之志開皇初為侍御史處法平當不為利所囘薛胄為大理卿持法寛平名為稱職唐韋仁壽隋末為蜀郡司法書佐斷獄平恕其有得罪者皆曰韋君所斷死而無恨劉德威為大理卿太宗嘗問之曰近來刑􅃠稍宻其過安在德威奏言誠在主上不由臣下人主好寛則寛好急則急律文失入减三等失出减五等今則反是失入則無辜失出便獲大罪所以吏各自愛競執深文非有教使之然畏罪之所至耳陛下但捨所急則寧失不經復行於今日矣帝深然之戴胄為大理少卿性既彊正處斷明速議者以為法官稱職事無寃濫武德以來一人而已唐臨為大理卿高宗初嗣位嘗親錄囚徒前卿所斷者皆號呌稱寃臨所入者獨無言帝怪而問状囚曰罪實自犯唐卿所斷皆非寃濫所以絶意耳帝嘉歎乆之曰為獄者不當如此耶張文瓘為大理卿旬日决遣疑獄四百餘條其得罪者皆無怨言文瓘嘗有疾繫囚相與設齋以禱焉尋拜侍中兼太子賔客大理囚一時慟哭其得人心如此狄仁傑儀鳯中為大理丞周歲斷滯獄一萬七千人無寃訴者杜景佺為司刑丞天授中與徐有功來俊臣侯思止專制治獄時人稱云遇徐杜者必生遇來侯者必死劉延祐為右司郎中李敬業之亂掦州初平所有刑名人莫能定延祐奉使至軍所决之時議者斷受贓五品官者斬六品官者流延祐以為諸非元謀廹脅從逆即寘極刑事傷枉濫乃斷受贓五品者流六品已下但除名而已于時得全濟者甚衆袁仁敬為大理卿卒繫囚聞之皆慟哭悲歌宋璟𤣥宗開元中為開府儀同三司時京兆人權梁山搆逆伏誅制河南尹王怡馳傳徃長安窮其枝黨怡禁繫極衆乆之未能决斷乃詔璟赴京留守并按覆其獄璟至惟罪元謀殺人其餘緣梁山詐稱婚禮因假借得罪乆脇從者盡原之李栖筠為殿中侍御史時御史大夫李峴按覆受逆命者請為詳理判官推情用恕多所全宥時吕諲崔器議而失入惟峴大獲羙聲皆栖筠之力劉晏為吏部尚書代宗大歴中宰相元載王縉得罪詔晏與御史大夫李涵等鞫之初晏等承㫖載縉亦處極法晏謂涵等曰重刑再覆國之常典况誅大臣豈得不奏覆又法有首從二人同亦宜重取進止涵等咸聼命及晏等覆奏帝乃减縉罪從輕後唐韋寂唐末為鹽鐡廵官韓建留守西都擢為司法參軍推鞫平允建頗重之王延末帝清㤗末為御史中丞臺中經年處决平允轉尚書右丞平反夫議獄緩刑則五辭惟允舉直錯枉則庶戮無寃葢折獄之惟難在蔽訟而多濫况一成難變君子所以哀矜兩造相違良臣所以慎測故有吏訊既偹亟辨其厚誣具獄已封特眀其非罪斥深文之弊破偏聼之姦脱栫棘於良民正毆刀於元惠宜乎獲仁人之譽享高門之封者焉後漢郭躬為廷尉奏讞法科多所全生傅賢為廷尉嘗垂念刑法務從輕比至斷獄遲廻流涕在位四年獄稱治平魏高柔為廷尉時䕶軍營士竇禮近出不還營以為亡表言逐捕没其妻盈及男女為官奴婢盈連至州府稱寃自訟莫有省者乃辭詣廷尉柔問曰汝何以知夫不亡盈垂泣對曰夫少單特養一老嫗為母事甚恭謹又哀兒女撫視不離非是輕狡不顧室家者也柔重問曰汝夫不與人有怨讐乎對曰夫良善與人無讐又曰汝夫不與人交錢財乎對曰常出錢與同營士焦子文求不得時子文適坐小事繫獄柔乃見子文問所坐言次曰汝頗曽舉人錢否子文曰自以單貧初不敢舉人錢物也柔察子文色動遂曰汝昔舉竇禮錢何言不耶子文恠知事露應對不次柔曰汝已殺禮便宜早服子文於是叩頭具首殺禮本末及埋藏所柔便遣吏卒承子文辭徃掘禮即得其屍詔書復盈母子為平民班下天下以禮為戒晋賈充遷廷尉雅長法理有平反之稱劉頌遷議郎守廷尉時尚書令史扈寅非罪下獄詔使考竟頌執㨿無罪寅遂得免時人以頌比張釋之在職六年號為詳平顧榮字彦先為廷尉平趙王倫誅淮南王允允官屬下廷尉議罪榮具明刑理王坦之為侍中時卒士韓悵逃亡歸首云失牛故叛有司劾悵偷牛考掠服罪坦之以為悵束身自歸而法外加罪懈怠失牛事或可恕加之木石理有自誣宜附罪疑從輕之例遂以見原殷仲堪為荆州刺史桂陽人黄欽生父沒已久詐服衰麻言迎父䘮府曹先依律詐取父母卒棄市仲堪乃曰律詐取父母寧依毆詈法棄市原此之㫖當以二親生存而横言死沒情事悖逆忍所不當故同之毆詈之科正以大辟之刑今欽生父實終沒墓在舊邦積年乆逺方詐服迎䘮以此為大妄耳比之於父存言亡相殊遠矣遂活之後魏王基為御史先是驍騎將軍刁整丁父憂時相州刺史山陽王熈在鄴起兵將誅元義等事敗傳首京師熙之親故莫敢視者整弟婦即熙姊遂收其屍藏之後乃還熙所親義聞而致憾因以熈弟畧南走梁誣整將與弟宣及子恭等幽繫之頼基與前將軍檢事使魏子建理雪獲免北齊蘇瓊為文襄并州刑獄叅軍并州嘗有强盗長流叅軍推其事所疑賊並已考伏失物家並識認惟不獲盗贓文襄付瓊更令窮審乃别推得元景融等十餘人並獲賊驗文襄大笑語前妄引賊者曰爾等若不遇我好叅軍㡬致枉死唐狄仁傑垂拱中歴遷冬官侍郎文昌右丞豫州刺史並有能名是時坐越王貞軍詿誤因緣合誅者七百餘人仁傑以其並是脅從抗表申理則天咸宥之徐有功天授初累補司刑丞秋官員外郎稍遷郎中有功前後居法官數議大獄務存平恕凡所濟活者數千百家周興丘勣來俊臣等深文酷法由是少衰後以公事免後為左臺侍御史時潤州刺史竇孝諶妻龎氏為奴誣告云夜觧髪祈福則天令給事中薛季昶鞫之季昶斷錬成其罪龎氏當坐斬有功獨明其無罪而季昶等反䧟有功黨援惡逆奏付法司結刑當弃市有功方視事令史垂泣以吿有功曰豈吾獨死而諸人長不死耶乃徐起而歸則天覧奏召有功詰之曰卿比斷獄失出何多對曰失出臣下之小過好生聖人之大德願陛下洪大德則天下幸甚則天黙然於是龎氏减死流於嶺表蘇頲為左臺監察御史長安中詔頲案覆來俊臣等舊獄頲皆申明其枉雪寃者甚衆韋虗心為侍御史中宗景龍中西域羗胡叛背時並擒獲有勅盡欲誅之虗心論奏但罪元惡其所全者千餘人韓思復睿宗景雲中為給事中時右散騎常侍嚴善思坐譙王重福事下獄有司言善思昔常任汝州刺史素與重福交㳺方被召至京竟不言其謀逆惟奏云東都有兵氣㨿状正當匿反請從絞刑思復奏曰議獄緩死列聖明規刑疑從輕有國常典嚴善思徃在先朝屬韋氏擅内恃寵宫掖謀危宗社善思此時遂能先覺因詣相府有所發明進論聖躬必登宸極雖交㳺重福盖謀䧟韋氏勅追善思書至便發向懐逆節寧即奔命一靣踈􅃠誠合順生三驅取禽來而可宥惟刑是恤事合昭詳請刑部集羣官議定奏裁以符慎獄是時議者多云善思合從原宥有司仍執前議請誅之思復又駁曰臣聞刑人於市爵人於朝必僉謀攸同始行之無憾謹按諸司所議嚴善思十纔一入抵罪惟輕夫帝閽九重塗遠千里故借天下耳以聼聼無不聰借天下目以視視無不接今羣言上奏採擇宜審若棄多就少臣實懼焉輿論一乖下情不逹雖欲從衆其可及乎凡百京司逄時之㤗列官分職有賢有親親則列藩諸王陛下愛子賢則祚茅開國陛下名臣見無禮於君寧肯雷同不異今措辭多出法合從輕帝納其奏詔免善思死配流静州顔真卿𤣥宗天寳中為監察御史充河西隴右軍試復屯交兵使王原有寃獄久不决真卿至辯之天方旱獄决乃雨郡人呼之為御史雨竇參代宗時為監察御史奉使按湖南判官馬彛獄時彛舉屬令贓罪至千貫為得罪者之子因權倖誣奏彛參意白彛無罪彛實能吏也參德宗初為御史中丞時神策將軍孟華有戰功為大將軍所誣奏稱華謀反有右龍武將軍李廷玉前䧟吐蕃久之自校為部曲誣告潜通吐蕃皆當死無以自白參悉理出之由是人皆屬望袁滋德宗貞元初為鄂岳節度使何士幹從事部有邑長下吏誣以盗金滋察其寃竟出之李元素貞元中為侍御史時杜亞為東都留守惡大將令狐運㑹盗發雒城之北運適與其部下畋于北郊亞意其為盗遂執訊之逮繫者四十餘人監察御史楊寧按其事亞以為不宻表陳之寧遂得罪亞將逞其宿怒且以得賊為功上表指明運盗之状帝信而不疑宰臣以獄大宜審奏請覆之命元素就决亞迎路以獄成告元素騐之五日盡釋其囚以還亞大驚且怒親追送馬上責之元素不答亞遂上䟽又誣奏元素還奏言未畢帝怒曰出俟命元素曰臣未盡詞帝又曰且去元素復奏臣一出不得復見陛下乞容盡詞帝意稍緩元素盡言運寃状明白帝乃悟曰非卿孰能辯之後數月因得真賊元素由是為時器重栁渾為江西觀察使魏少㳺判官時與崔祐甫同在使府並推公正州有開元寺僧徒夜飲因醉失火延燒講堂翌日歸罪於守門瘖奴虞候亦受財而同其状械奴送府少㳺將斷獄人知瘖奴之寃莫敢言者渾與祐甫遽入具言醉僧之過内外蒙蔽致有寃濫少㳺大驚趣令訊鞫醉僧首伏瘖奴見原少㳺謝曰㣲二君之言㡬成老夫闇劣矣册府元龜卷六百十八
