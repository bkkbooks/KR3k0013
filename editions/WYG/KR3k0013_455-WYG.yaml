body:
  text: 册府元龜卷四百五十五宋王欽若等撰將帥部貪黷兵法曰將貪財則姦不禁又曰貪而好利者可貨而賂也則有膺閫外之權專軍中之政性本貪猥志求茍得乗彼危亂破其國邑無勤䘏之意肆仇歛之心復有邀君以求利受賄以狥私侵擾下民發掘丘墓以至交通於異域接引於非類致人心之大失俾師律之不臧蓋本非賢材盗竊名噐簡書屢告終亦不悟斧鉞一至其何以逃咸列於兹期以垂訓羊舌鮒晉大夫晉侯治兵於邾南甲車四千乗三十萬人羊舌鮒攝司馬鮒叔向弟攝兼官也遂合諸侯於平丘次于衛地叔鮒求貨於衛淫芻蕘者欲使衛患之而致貨衛人使屠伯饋叔向羮與一箧錦屠伯衛大夫曰諸侯事晉未敢携貳况衛在君之宇下屋宇之下喻近也而敢有異志芻蕘者異於他日敢請之請止之叔向受羮反錦受羮示不逆其意且非貨曰晉有羊舌鮒者瀆貨無厭瀆數也亦將及矣將及禍為此役也役事也子若以君命賜之其已客從之未退而禁之禁芻蕘者漢張武文帝時為將軍受賂金錢覺帝更加賞賜以愧其心魏丁斐字文侯初隨太祖太祖以斐鄉里特饒愛之斐性好貨數犯罪輙得原宥為典軍校尉太祖征吳斐隨行以家牛羸私易官牛太祖謂左右曰我非不知譬如人家有盗猫而善捕䑕盗雖有小損而䑕不竊完我囊貯遂復斐官晉張燕為巴西太守時秦州人鄧定等二千餘家饑餓流入漢中保于城固漸為抄盗梁州刺史張殷遣燕討之定窘急偽乞降於燕并餽燕金銀燕喜為之緩師定宻結李雄雄遣衆救定燕退定遂進逼漢中太守杜正冲東奔魏與殷亦棄官而遁羅尚為平西將軍益州刺史西戎校尉性貪少斷蜀人言曰尚之所愛非邪則佞尚之所憎非忠則正富擬魯衛家成市里貪如豺狼無復極已又曰蜀賊猶可羅尚殺我平西將軍反更為禍劉𦙍代温嶠為平南將軍都督江州諸軍事位任轉髙矜豪日甚縱酒耽樂不恤政事大殖貨財商販百萬是時朝廷空罄百官無䘵惟資江州運漕而𦙍商旅繼路以私廢公有司奏免𦙍宫書始下而𦙍為郭黙所害劉牢之為鎮北將軍討孫恩于㑹稽牢之既濟江恩乃虜男女二十餘萬口一時逃入海懼官軍之躡乃縁道多棄寳物子女時東土殷實莫不粲麗盈目牢之等遽争收歛故恩復得逃海諸葛長民為豫州刺史領淮南太守時宋武討劉毅以長民監太尉留府事詔以甲仗五十人入殿長民驕縱貪侈不恤政事多聚珍寳美色營建第宅不知紀極所在殘虐為百姓所苦前燕慕容評為太傅前秦苻堅使王猛伐慕容暐暐使評率衆拒之評性貪鄙鄣固山泉賣樵鬻水積錢絹如丘陵三軍莫有鬬志暐遣其侍中蘭伊譲評曰王髙祖之子也宜以宗廟社稷為憂奈何不務撫養勲勞專以聚歛為心乎府藏之珍貨朕豈與王愛之若㓂軍冒進王持錢帛安所置也皮之不存毛將安附錢帛可散之三軍以平㓂凱還為先也宋劉道璘為都督荆湘益秦寧梁雍七州諸軍事䕶南蠻校尉而貪縱過甚畜聚財貨常若不足去鎮之日府庫為之空虚王鎮惡為安逺䕶軍武陵内史以討劉毅功封漢夀縣子蠻毅師向博抵根據阮頭屬為兇暴鎮惡討平之鎮惡性貪既破劉毅將朱襄因停車抄掠諸蠻不時反及平姚泓時關中豐全倉庫殷積鎮惡極意收歛子女玉帛不可勝訃高祖以其功大不問也毛脩之為右衛將軍不信鬼神所至必焚除房廟蔣山廟中有佳牛好馬脩之並奪取之梁道真為梁南秦二州刺史裴方明為龍􅋮將軍並坐破仇池斷割金銀諸雜寳物又藏楊難當善馬下獄死劉徳願為㳺撃將軍領石頭戍事坐受賈客韓佛智貨下獄奪爵土垣䕶之為輔國將軍𨽻沈慶之伐西陽蠻䕶之所蒞多聚歛賄貨充積坐下獄免官吳喜都督豫州諸軍事假冠軍將軍平荆州恣意剽虜贓私萬計王𤣥謨為寧朔將軍北征將士多離怨言𤣥謨又營貨利一疋布責人八百梨以此倍失人心及魏太武軍至乃奔退麾下散亡畧盡張邵為撫軍長史持節南蠻校尉坐在雍州營私蓄取贜貨二百四十五萬下廷尉免官鄧琬為左將軍性鄙闇貪吝過甚財貨酒食皆身自量較及晉安王子勛僣位琬使婢僕出市道販賣酣歌愽奕日夜不休南齊張敬兒為征西將軍於襄陽城西起宅聚財貨薛淵為右將軍大司馬領軍討巴東王子響王子響軍主劉超之被捕急以眠褥襍物十餘種賂淵自逃匿之軍中為有司所奏詔原之梁吕僧珍為領軍將軍時宋季雅罷南康郡市宅居僧珍宅側僧珍問宅價曰一千一百萬怪其貴季雅曰一百萬買宅千萬買隣及僧珍生子季雅往賀署函曰錢一千閽人少之弗為通彊之乃進僧珍疑其故親自發乃金錢也遂言於武帝陳其才能以為壯武將軍衡州刺史將行謂所親曰不可以負吕公在州大有政績徐文盛為秦州刺史加都督東討與侯景戰大潰奔還荆州元帝仍以為城北面大都督又聚歛贜汚甚多世祖大怒下令責之數其十罪除其官爵後魏元大興為長安鎮大将以黷貨削除官爵長孫敦字孝友襲爵北平王為北鎮都將坐黷貨降為公于祚為假節振威將軍沃野鎮將貪殘多所受納坐免官以公還第于景為寧朔將軍髙平鎮將坐貪殘受納為御史中尉王顯所彈㑹赦免王建從道武破慕容寳衆於柏肆塢遂進圍中山慕容寳棄城走和龍城内無主百姓惶惑東門不閉道武將夜入乘勝據守其門建貪而無謀意在虜獲恐士卒肆掠盗亂府庫請候天明道武乃止是夜徙河人共立慕容普驎為主遂閉門固守劉潔為尚書令太武時累從征討嘗為前鋒深見委任㧞城破國者聚歛財貨與潔分之籍其家産財盈巨萬太武追忿言則切齒公孫軌為平南將軍屯壺關後為虎牢鎮將太武將北征發民驢以運糧使軌部調雍州軌令驢主皆加絹二疋乃與受之百姓為之語曰驢無彊弱輔絹自壯衆共嗤之坐徵還真君二年卒軌既死太武謂崔浩曰吾行過上黨父老皆曰公孫軌為將受貨縱賊使至今餘奸不除軌之咎也其初來單馬執鞭返去從車百兩載物而南軌幸而早死至今在者吾必族誅之皮豹子為安西將軍鎮長安坐盗官財徙於統萬周觀為髙平鎮將有威名真君初詔觀統五軍西討秃髪保周於張掖徙其民數百家將置於京師至武威輙與諸將私分之太武大怒黜觀為金城侯改授内都大官田益宗為安南將軍稍哀老聚歛無厭兵民患其侵擾諸子及孫競規賄貨部内苦之咸言欲叛宣武深亦慮焉乃遣中書舍人劉桃符宣㫖慰喻庶以安之桃符還啟益宗侵掠之狀宣武詔之曰風聞卿息魯生在淮南貪暴擾亂細民又横殺梅伏生為爾不已損卿誠効可令魯生與使赴闕當加任使如欲外䘵便授中畿一郡邢巒為安西將軍梁秦二州刺史商販聚歛清論鄙之爾朱仲逺為大將軍兖州刺史督東道諸軍仲逺天性貪暴大宗富族誣之以反沒其家口簿籍財物皆以入己自滎陽以東輸税悉入其軍不送京師爾朱度律為大將軍在軍戎聚歛無厭所至之處為百姓患毒隋劉昉為上大將軍性麤疎溺於財利富商大賈朝夕盈門韋藝為營州總管大治産業與北夷貿易家資鉅萬頗為清議所譏史萬嵗為左領軍將軍時南寧夷㸑翫遣使請降萬嵗遣使馳奏請將翫入朝詔許之㸑翫隂有二心不欲詣闕因賂萬嵗以金寳萬嵗於是捨翫而還蜀王秀時在益州知其受賂遣使將索之萬嵗聞而悉以所得金寳沉之於江索無所獲權武為潭州總管多造金𢃄遺嶺南首領其人復答以寳物武皆納之由是致富宇文述為左衛大將軍性貪鄙知人有珍異物必求取富商大賈及隴右諸胡子弟述皆接以恩意呼之為兒由是競加餽遺金寳累積後庭曵羅綺者甚衆家僮千餘人皆控良馬被服金玉述之寵遇當時莫與為比凡所薦逹皆至大官趙行樞以太常樂戸家財億計述謂為兒受其賂遺稱為驍勇起家為折衝郎將唐獨孤懐恩髙祖武徳三年為工部尚書率兵討堯君素於蒲州懐恩素無籌畧貪冒財貨頻為賊所敗髙祖屢下詔責讓之侯君集為交河道行軍大􅄣管破吐谷渾滅髙昌之後威名漸著然性貪鄙當破吐谷髙昌之際多没無罪之家子女珍玩恣情入已將士知之亦多盗竊君集恐發其事不敢制及京師有司請推其罪詔下獄中書侍郎岑文本以君集陳諫事乃得釋黨仁𢎞為廣州都督坐枉法聚財百萬當死太宗哀之免為庶人徙欽州初有上書告仁𢎞没䧏獠為奴婢擅賦歛夷獠甚多去職北還有七十船帝聞之驚嘆曰知人實難誠不虚也仁𢎞狀貌魁偉在職譬諸畵餅不可療饑矣王昂為河東節度使貪縱不知法令務聚歛以貨藩身路嗣恭為江南西道觀察使代宗大厯中嶺南將哥舒晃反詔嗣恭兼嶺南節度使遂斬晃平五嶺拜撿校兵部尚書知省事嗣恭起於郡縣吏以至大官皆以恪理著稱及平廣州商舶之徒多因晃事誅之嗣恭前後沒其財寳數百萬貫盡入私室不以貢獻代宗心甚衘之故嗣恭雖有平方面功止轉檢校尚書無所酬勞李叔明為東川節度近二十年叔明素豪侈總戎年深積聚財貨崇餙第宅田園極膏腴子孫驕淫動踰法度歿纔數年遺業蕩盡故代之言多藏者咸以叔明為鍳誡李復為容州招討使歴嶺南鄭滑節度使久典方面積聚財貨頗甚為時所譏王佖為靈鹽節度使先是吐蕃欲成烏蘭橋於河壖口先貯材木朔方節度遣人潜藏之委於河流終莫能成蕃人知佖貪而無謀先厚遺之然後併役成橋遂築月城而圍守之由佖黷貨邉上至今患焉王鍔為嶺南節度使鍔以兩税錢上供時進及供奉餘皆自入西南大海中諸國舶至則盡沒其利由是鍔家財富於公藏日發十餘艇重以犀象珠貝稱商貨而出諸境周以嵗時循環不絶凡八年京師權門多富鍔之財拜刑部尚書後為淮南節度使毎有饗宴輙録其餘以備後用或云賣之收利皆自歸故鍔錢流衍天下鄭權自工部尚書由他徑求嶺南節度既到鎮則掊聚財貨用償恩力俾小吏部送京國以分權倖輦運纔至而殂謝已聞當時議者無不恥鄙髙崇文自劍南西川節度移鎮邠寧初發成都盡載其軍資金帛噐幕及伎人樂工以行又云崇文恃其功而侈心大作帑藏之富百工之巧舉而自隨蜀郡一罄李道古為鄂岳沔蘄安黄都團練觀察使代栁公綽總兵平淮西道古佻黠無噐畧及赴鎮倍道而行以數騎徑入安州城時公綽未意道古遽至惶駭而出家財多為所奪李象古為安南都䕶為土賊所殺象古藉䕃緒入官無他志能性貪鄙居官黷貨尚苛刻故及於難田縉為夏州節度性貪虐多隠沒軍賜羌渾種落苦其漁擾遂引西蕃為㓂御史中丞崔植奏攝詣䑓按劾得縉前在夏州遣將於度支請將士軍糧及脚價共計三萬四千三百餘貫文不支給將士留於上都私第及雜事餽送本道贜狀明白坐貶房州司馬并本判官邢翥盧仲通皆坐貶部將趙榮流涪州胡証為嶺南節度使証在外鎮好掊歛財貨厚自奉養修行坊起甲第連亘閭巷車服器用窮極豪侈議者罪之渾鐬為豐州刺史充天徳軍使坐贓七千餘貫貶袁州司户憲宗以其父咸寧王勲烈特異故特命有司俯從輕文鄭注為鳳翔節度使誅後度支奏注家得絹一百餘萬疋他物稱是李泳為河陽節度使泳本以市人發跡禁軍以賄賂交通遂至方鎮初任鎮武節度轉為河陽所至以貪殘為務恃所交結不禀憲章犒宴所陳果實以木刻綵繢之聚歛無已人不堪命遂至於亂文宗開成二年六月河陽軍亂數日方止泳貶澧州長史梁王珙為陜州節度使奢縱聚歛民不堪命後唐毛璋為華州節度使莊宗同光末討蜀以璋為行營右廂馬軍都指揮使魏王繼岌自西川至渭南部下散亡其財貨妓樂為璋所掠温韜仕梁為耀州節度使在州七年唐帝諸陵發掘殆遍盡取其金寳惟乾陵以風雨屢作終不能發陶玘明宗天成初鄧州留後聚歛無節贜汚頗甚為所部縣令盛歸仁所訟貶嵐州司戸後賜死晉房知温為平盧軍節度使厚歛不已積貨百萬治第於南城出入以妓樂相随任意所之曽不以政事為務趙在禮歴滑魏滄兖同襄鄆徐晉昌十餘鎮節度在禮善治生殖積財巨萬兩京及所至藩鎮皆邸店羅列凡聚歛所得惟以奉權豪崇釋氏而已張籛在後唐為右千牛衛將軍同正領饒州刺史同光末權知西京留守魏王繼岌平蜀王衍入朝至秦州驛莊宗遣中使向延嗣盡戮王衍之族所有竒貨盡歸於延嗣繼岌至渭南死衍金寳妓樂籛悉獲之俄而明宗使人誅延嗣延嗣暗遁衍之行装復為籛有後為西衛將軍時湖南馬希範與籛有舊朝廷請命籛為使允之籛宻賫蜀之竒貨徃焉又獲十餘萬緡以歸潘環為宿州團練使後為金州澶州節度使環所至以聚歛為務在州時有牙將因㣲過見怒環紿言笞之牙校因託一尼嘗熟于環者獻白金兩鋌尼詣環日牙校餉􅌯脚兩枚求免其責環曰􅌯有㡬脚尼曰三脚環復曰今兩能成乎尼以三數致之時人號環為潘􅌯脚祕瓊為鎮州節度使董温其衙内指揮使温其在位貪暴積鏹巨萬温其陷蕃瓊害其家悉輦之以藏其家遂自稱留後李金全為涇州節度使在鎮以掊歛為務長興中受代歸闕始進馬數十匹不數日又進之明宗召而謂之曰卿患馬多耶何進貢之多也又謂曰卿在涇州日為理如何無乃以馬為事乎金全慙謝而退帝雖僶勉受之而心不懌金全累更名郡藩鎮所在掊聚歛財賂結權要而掩其弊政之迹帝頗聞其不亷故以言譏之後天福初自滄州節度使罷鎮歸闕㑹安州屯將王暉殺節度使周環髙祖遣金全以騎兵千人鎮撫其地未及境暉為部下所殺金全至亂軍數百人皆不自安金全説遣赴闕宻伏兵於野盡殺之又擒其軍校武克和等數十人斬之初金全之將行也髙祖戒之曰王暉之亂罪莫大焉但慮封守不寧則民受其弊因折矢飛詔約以不戮一人仍許以暉為唐州刺史又謂金全曰卿之此行無失吾信及金全至聞克和等當為亂之日刼掠郡城所獲財貨悉在其弟遂殺而奪之楊光逺為河陽節度使時范延光致仕輦􅌩装妓妾居於河陽光逺利其竒貨且慮為子孫之讎因奏延光不家汴雒出舍外藩非南走淮夷則北走邊塞宜早除之髙祖以許之不死鐵劵存焉持疑未允光逺乃遣子承勲以甲士圍其第逼令自裁延光曰天子在上安得如此乃遣使者乞移居洛下得及浮橋推於流而溺殺之矯奏云延光自投於河朝廷以適㑹其意弗之理踰嵗入覲髙祖為致曲宴教坊伶人以光逺暴歛重賦因陳戲譏之光逺殊無慙色尋以光逺為平盧軍節度使光逺表奏請與長子同行尋授承勲萊州防禦使及赴任僕從妓妾至千餘騎滿盈僣侈為方嶽之最下車之後惟以刻剥為事漢白再榮為䕶聖左廂都指揮使晋末契丹犯闕明年敵王北去再榮從敵帳至真定其年閏七月晦李筠何福進相率殺敵帥麻答諸軍乃請權知留後事再榮以李崧和凝携家在彼令軍士數百人環廹崧家以求賞給崧凝各出家財與之再榮欲害崧以利其財前磁州刺史李穀謂再榮曰公與諸將為契丹所虜凌辱萬端日夕憂死今日纔得生路便擬殺一宰相他日到闕儻有所問何以為辭再榮黙然又括率在城居民家財以給軍事李穀又譬觧之乃止其漢人曽事麻答者盡拘之以取其財髙祖以再榮為鎮州留後為政貪虐難狀鎮人呼為白麻答未㡬移授滑州節度使箕歛誅求民不聊生乃徵還京師劉銖為青州節度使銖受代之日有私鹽數屋雜以糞穢填塞諸井以土平之節度使符彦卿發其事以聞銖奉朝請久之李守貞為兖州節度討青州楊光逺光逺子承勲等乞降守貞入城害光逺等光逺孔目吏宋顔盡以光逺財寳名姬善馬吿於守貞守貞徳之置於帳下周宋彦筠仕梁為開封府牙校莊宗有天下擢領禁軍伐蜀之役率所部康延孝為前鋒入成都據一甲第中資貨鉅萬妓女數十輩盡為其所有常思為宋州節度使廣順三年詔赴闕改授平盧軍節度使思將赴鎮奏太祖云臣在宋州出放得􅁝十餘萬兩謹以劵上進且行徵督太祖頷之王守恩歴諸衛將軍晉開運末守恩因假告歸於潞時潞州節度使張從恩懼契丹之盛將朝於戎王以守恩婚家甚倚信之乃移牒守恩請權為廵撿使從恩既去守恩㝷以潞城歸於漢祖仍盡取從恩之家財漢祖即以守恩為招義軍節度使漢乾祐初授西京留守守恩性貪鄙委任羣小以掊歛為務雖病殘癃者亦不免其科率人甚苦之洛都嘗有豪士為二姓之㑹守恩乃與伶人數輩夜造其家自為賀客因獲白金數笏而退太祖以白文珂代之守恩甚懼而雒人有曽為守恩非理割剥者皆就其第徵其舊物守恩一一償之及赴闕止奉朝請而已鄭仁誨為澶州節度使廣順末王殷受詔赴闕太祖遣仁誨赴鄴都廵檢及殷得罪仁誨不奉詔即殺其子蓋利其家財妓樂也及仁誨卒而無後人以為隂責焉李彦頵顯徳中為延州兵馬留後到鎮頗以殖貨為意窺圖䞉利侵漁蕃漢部人羣情大擾齊藏珍為諸衛世宗淮上用兵復委監䕶與軍校何起領兵降下光州藏珍欺隠官物甚多册府元龜卷四百五十五
