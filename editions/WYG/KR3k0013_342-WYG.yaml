body:
  text: 册府元龜卷三百四十二宋王欽若等撰將帥部佐命第三後漢銚期字次况潁川郟人光武畧地潁川聞期志義召署賊曹掾賊曹主盜賊之事比三百石從狥薊時薊中起兵應王郎光武趨駕出百姓聚觀諠呼滿路遮道不得行期奮㦸瞋目大呼左右曰䟆止行清道若今警蹕也衆皆披靡及至城城門已閉攻之得出行至信都以期為禆將與𫝊寛呂晏俱屬鄧禹徇傍縣又發房子兵禹以期為能獨拜偏將軍授兵二千人寛晏各數百人光武使期别徇真定宋子攻拔樂陽稾肥纍樂陽稾今稾城縣肥纍故肥子國竝屬真定從擊王郎將兒宏劉奉於鉅鹿下期先登陷陣手殺五十餘人遂大破之王郎平拜期虎牙大將軍乃因間說光武曰河北之地界接邊塞人習兵戰號為精勇今更始失政大統危殆海内無所歸往明公據河山之固擁精銳之衆以順萬人思漢之心則天下誰敢不從光武笑曰卿欲遂前䟆耶惟天子得稱警蹕時銅馬數十萬衆入清陽博平博平今博州縣期與諸將迎擊之連戰不利㑹光武救至遂大破之從擊青犢赤睂於射犬賊襲期輜重期還擊之手殺傷數十人身被三創而戰方力力苦戰遂破走之光武即位封安成侯屬汝南郡故城在今汝陽縣東南食邑五千户王霸字元伯潁川潁陽人漢兵起光武過潁陽霸率賔客上謁曰將軍興義兵竊不自量貪慕威德願充行伍光武曰夢想賢士共成功業豈有二哉遂從擊破王尋王邑於昆陽還休鄉里及光武為司𨽻校尉道過潁陽霸請其父願從父曰吾老矣不任軍旅汝往勉之霸從至雒陽及光武為大司馬以霸為功曹令史從渡河北賔客從霸者數十人稍稍引去光武謂霸曰潁川從我者皆逝而子獨留努力疾風知勁草及王郎起光武即南馳下曲陽以霸為軍正爵闗内侯既至信都發兵攻拔邯鄲霸追斬王郎得其璽綬封王鄉侯從平河北常與臧宫傅俊共營光武即位以霸曉兵愛士可獨任拜為偏將軍并將宫俊兵而以宫俊為騎都尉建武二年夏封富波侯富波縣名屬汝南祭遵字弟孫潁川潁陽人光武破王尋等還過潁陽遵以縣吏數進見光武愛其容儀署為門下史從征河北為軍市令尋拜為偏將軍平河北以功封列侯建武二年拜征虜將軍封潁陽侯臧宫字君翁潁川郟人少為縣亭長游徼漢制十里一亭有長每鄉有游徼皆禁姦盜後率賓客入下江兵中為校尉因從光武征戰諸將多稱其勇光武察宫勤力少言甚親納之及至河北以為偏將軍從破羣賊數陷陣却敵光武即位以為侍中騎都尉建武二年封成安侯屬潁川明年將突騎與征虜將軍祭遵擊更始將左防韋顔韋一作韓於沮陽酈悉降之後封期思侯屬汝南故城在今光州固始縣西北任光字伯卿南陽宛人為郡縣吏漢兵至宛軍人見光冠服鮮明令解衣將殺而奪之㑹光禄勳劉賜適至視光容貌長者乃救全之光因率黨與從賜為安集掾拜偏將軍與光武破王尋王邑更始至雒陽以光為信都太守及王郎起郡國皆降之光獨固守㑹光武自薊還狼狽不知所向𫝊聞信都獨為漢拒邯鄲即馳赴之光等孤城獨守恐不能全聞光武至大喜吏民皆稱萬嵗即時開門迎謁光武拜光為左大將軍封武成侯使光將兵從入堂陽界堂陽今冀州縣使騎各持炬火彌滿澤中光炎燭天地舉城莫不震驚惶怖其夜即降旬日之間兵衆大盛因攻城邑遂屠邯鄲廼遣光歸郡光武即位封光阿陵侯阿陵縣名屬涿郡食邑萬户李忠字仲都東萊黄人黄今萊州縣故城在縣東南王莽末為新博屬長莽改信都國曰新博都尉曰屬長也更始立使使者行郡國即拜忠都尉官忠遂與太守任光同奉光武以為右大將軍封武固侯從攻下屬縣至苦陘苦陘縣名屬中山進圍鉅鹿未下王郎遣將攻信都信都大姓馬寵等開城内之㑹更始遣將攻信都因使忠還行太守事及任光歸郡忠乃還復為都尉建武二年夏封中水侯中水屬涿郡故城在今瀛洲樂夀縣西北食邑三千户萬修字君游扶風茂陵人更始時為信都令與太守任光都尉李忠共城守迎光武拜為偏將軍封造義侯及破邯鄲拜右將軍從平河北建武二年夏封槐里侯邳彤字偉君信都人初為王莽和成卒正王莽分鉅鹿為和成郡居下曲陽以彤為卒正光武狥河北至下曲陽彤舉城降復以為太守留止數日光武北至薊㑹王郎兵起使其將狥地所到縣莫不奉迎唯和成信都堅守不下彤聞光武從薊還大軍欲至信都乃先使五官掾張萬督郵尹綏選精騎二千餘匹沿路迎光武軍彤尋與光武㑹信都拜彤為後大將軍使將兵居前北至堂陽堂陽已反屬王郎彤使張萬尹綏先曉諭吏民光武夜至即開門出迎引兵擊破白奢賊於中山自此常從戰攻及拔邯鄲封武義侯建武元年更封靈壽侯靈壽縣名故城在今恒州劉植字伯先鉅鹿昌城人王郎起植與弟喜從兄歆喜一作嘉字共仲歆字細君也率宗族賓客聚兵數千人據昌城聞光武從薊還迺開門迎光武以植為驍騎將軍喜歆偏將軍皆為列侯時眞定王劉揚起兵以附王郎衆十餘萬光武遣植說揚揚廼降因得進兵拔邯鄲從平河北建武二年更封植為昌城侯耿純字伯山鉅鹿宋子人初從李軼為騎都尉安集趙魏會光武渡河至邯鄲純即謁見光武深接之純退見官屬將兵法度不與它將同遂求自結納獻馬及縑帛數百疋光武北至中山留純邯鄲㑹王郎反光武自薊東南馳純與從昆弟訢宿植共率宗族賔客二千餘人奉迎於育育縣名在冀州拜純為前將軍封耿鄉侯郎水北有耿鄉俗謂之宜安城在恒州稾城縣西南訢宿植皆偏將軍使純居前降宋子從攻下曲陽及中山及至鄗光武止𫝊舍鄗大姓薊公反城開門内王郎將李惲純先覺之將兵逆與惲戰大破之從平邯鄲又破銅馬時赤睂青犢上江大彤鐵脛五幡十餘萬衆竝在射犬光武引兵將擊之純軍在前去衆營數里賊忽夜攻純雨射營中雨射謂矢下如雨也純勒部曲堅守不動選敢死二千人俱持強弩各傅三矢使銜枚間行傅著也繞出賊後齊聲呼譟強弩竝發賊衆驚走追擊破之光武即位封高陽侯擊劉永於濟陰下定陶後封為東光侯東光今滄州縣也朱祐字仲先南陽宛人往來舂陵光武與伯升皆親愛之伯升拜大司徒以祐為䕶軍及伯升死光武為大司馬討河北復以祐為䕶軍常力戰陷陣以為偏將軍封安陽侯光武即位拜為建義大將軍建武二年更封堵陽侯堵陽縣名故城在今唐州方城縣景丹字孫卿馮翊櫟陽人以言語為固徳侯相遷朔調連率副貳朔調上谷也更始立遣使者徇上谷丹與連率耿况䧏復為上谷長史王郎起丹與况共謀拒之况使丹與子弇及㓂恂等將兵南歸光武光武引見丹等笑曰邯鄲將帥數言我發漁陽上谷兵吾聊應言然王郎將帥數云欲發二郡兵以拒光武時光武聊應然之猶今兩軍遥相戲弄也何意二郡良為吾來東觀記曰帝在廣阿閒外有大兵自來登城勒兵在西門樓上問何等兵丹等對曰上谷漁陽兵帝曰為誰來乎對曰為劉公即請丹入人人勞勉恩意甚備方與士大夫共此功名耳拜丹為偏将軍號奉義侯從擊王郎將倪宏等於南䜌郎兵迎戰漢軍退卻丹等縱突騎擊大破之追奔十餘里死傷者縱横遂從征河北光武即位拜丹為驃騎大將軍建武二年定封櫟陽侯與吳漢耿弇朱祐賈復馮異陳俊王常臧宫等從擊破五校於羛陽聚名降其衆五萬人王梁字君嚴漁陽安陽人為郡吏太守彭寵以梁守狐奴令與蓋延吳漢俱將兵南及光武於廣阿拜偏將軍野王令與河内太守冦恂南拒雒陽北守天井闗朱鮪等不敢出兵光武以為梁功及即位拜為大司空封武強侯杜茂字諸公南陽冠軍人初歸光武於河北爲中堅將軍嘗從征伐及即位拜大將軍封樂鄉侯樂鄉屬信都北擊五校於眞定進降廣平建武二年更封苦陘侯與王梁擊五校賊於魏郡清河東郡悉平諸營保降其持節大將三十餘人謂大將軍杜猛持節光祿大夫董敦等三郡清靜道路流通拜驃騎大將軍馬成字君遷南陽棘陽人少爲縣吏光武徇潁川以成爲安集掾調守郟令郟縣名今汝州縣也光武討河北成即棄官歩負追及於滿陽以成爲期門從征伐及即位再遷䕶軍都尉封平舒侯二十七年定封全椒侯劉隆字元伯南陽安衆侯之宗室更始拜爲騎都尉謁歸謁請也謂請假歸也迎妻子置雒陽聞光武在河内即追及於射犬以爲騎都尉與馮異共拒朱鮪李軼等軼遂殺隆妻子建武二年封亢父侯亢父屬東平故城在今兖州任城縣南傅俊字子衞潁川襄城人光武徇襄城俊以縣亭長迎軍拜爲校尉襄城收其母弟宗族皆滅之從破王尋等以爲偏將軍别擊京密破之及光武討河北俊與賓客十餘人北追及於邯鄲光武使將潁川兵常從征伐及即位以俊爲侍中建武二年封昆陽侯堅鐔字子伋伋一作皮潁川襄城人為郡縣吏光武討河北以其吏能署主簿又拜偏將軍從平河北别擊破大槍於盧奴及即位拜鐔揚化將軍封㶏強侯岑彭字君然南陽棘陽人王莽時守本縣長漢兵起彭降更始封爲歸徳侯令屬伯升及伯升遇害彭遷潁川太守㑹舂陵劉茂起兵略下潁川彭不得之官乃與麾下數百人從河内太守韓歆㑹光武徇河内彭勸歆迎降因進說曰今赤睂入闗更始危殆權臣放縱矯稱制詔道路阻塞四方蜂起群雄競逐百姓無所歸命竊聞大王平河北開王業此誠皇天祐漢士人之福也彭䝉司徒公所見全濟未有報德謂彭初降諸將欲誅之伯升言不如封之以勸後旋被禍難永恨於心謂伯升為更始所害今復遭遇願出身自効光武深接納之更始大將軍呂植將兵屯淇園彭説降之於是拜彭為刺姦大将軍使督察衆營授以常所持節從平河北光武即位拜為廷尉行大將軍事與吳漢王梁朱祐萬修賈復劉植堅鐔侯進馮異祭遵王霸等圍雒陽數月朱鮪等堅守不下光武令彭説降之建武二年使彭擊荆州下犨葉等十餘城犨縣名在今汝州魯山縣東南葉今汝州縣也後更封爲舞陰侯馬武字子張南陽湖陽人更始初為侍郎與光武破王尋等拜為振威將軍與尚書令謝躬共攻王郎及光武㧞邯鄲因從擊尤來五幡等敗於愼水武獨殿還陷陣故賊不得追及殿鎭後也進至安定次小廣陽即廣平亭也在今幽州范陽縣以有廣陽國故謂此亭為小廣陽武嘗為軍鋒力戰無前諸將皆引而隨之故遂破賊窮追至平谷浚靡而還平谷縣名屬漁陽郡浚靡亦縣名屬右北平郡光武即位以武為侍中騎都尉封山都侯朱浮沛國蕭人初從光武為大司馬主簿遷偏將軍從破邯鄲光武遣吳漢誅更始幽州牧苖曽乃拜浮爲大將軍幽州牧守薊城遂討定北邊建武二年封舞陽侯食三縣魏夏侯惇字元讓沛國譙人太祖初起惇嘗為禆將從征伐太祖行奮威將軍以惇為司馬别屯白馬遷折衝校尉領東郡太守太祖自徐州還惇從征呂布為流矢所中傷左目復領陳留濟陰太守封高安侯領河南尹太祖平河北為大將軍後拒鄴破遷伏波將軍累封至二千五百户又從征孫權還使都督二十六軍魏國建諸將皆受魏官號惇獨漢官乃上疏自陳不當不臣之禮太祖曰吾聞太上師臣其次友臣夫臣者貴德之人也區區之魏而臣足以屈君乎惇固請乃拜為前將軍文帝即王位封惇大將軍夏侯淵字妙才惇之族弟太祖起兵以别部司馬騎都尉從遷陳留潁川太守及與袁紹戰於官渡行督軍校尉昌狶反遣于禁擊之未㧞復遣淵與禁并力擊狶遂降其十餘屯狶詣禁降淵還拜典軍校尉濟南樂安黃巾徐和司馬俱等攻城殺長吏淵將太山齊平原郡兵擊大破之斬和平諸縣太祖征孫權還使淵督諸將擊廬江叛者雷緒緒破又行征西䕶軍督徐晃擊太原賊攻下二十餘屯斬賊帥商曜屠其城從征韓遂等戰於渭南又督朱靈平隃糜汧氏與太祖㑹安定降楊秋大祖還鄴以淵行䕶軍將軍督朱靈路招等屯長安擊破南山賊劉雄降其衆還圍韓遂馬超餘黨梁興於鄠拔之斬興封博昌亭侯初枹罕宋建因凉州亂自號河首平漢王太祖使淵帥諸軍討建月餘拔之斬建及所置丞相已下淵别遣張郃等平河闗渡河入小湟中河西諸羌盡降隴右平淵累封至八百户從征張魯㑹魯降以淵行都䕶將軍督張郃徐晃等平巴郡太祖還鄴留淵守漢中拜征西將軍建安二十四年蜀先主軍陽平闗淵拒之戰死李通江夏平春人以俠聞於江汝之間與郡人陳恭共起兵於朗陵衆多歸之後舉衆詣太祖於許拜通振威中郎將屯汝南西界太祖討張繡劉表遣兵以助繡太祖軍不利通將兵夜詣太祖太祖得以復戰通為先登大破繡軍拜禆將軍封建功侯又擊羣賊瞿恭江宮沈成等皆破殱其衆送其首遂定淮汝之地改封都亭侯拜汝南太守時賊張赤等五千餘家聚桃山通攻破之于禁泰山鉅平人黃巾起鮑信招合徒衆禁附從焉及太祖領兖州禁與其黨俱詣為都伯屬將軍王朗朗異之薦禁才任大將軍太祖召見與語拜軍司馬使將兵詣徐州攻廣威拔之拜陷陣都尉從討呂布於濮陽别破布二營於城南又别將破高雅於須昌從攻壽張定陶狐離圍張超於雍丘皆拔之從征黃巾劉辟黃邵等屯版梁邵等夜襲曹公營禁帥麾下擊破之斬辟邵等盡降其衆遷平虜校尉鮑信少有大節寛厚愛人沈毅有謀漢末大將軍何進辟拜騎都尉遣歸募兵得千餘人還到成臯而進已遇害信至京師董卓亦始到信知卓必為亂勸袁紹襲卓紹畏卓不敢發信引軍還鄉里收徒衆二萬騎七百輜重五千餘乗是嵗太祖始起兵於巴吾信與弟韜以兵應太祖太祖與袁紹表信行破虜將軍韜禆將軍時紹衆最盛豪傑多向之信獨謂太祖曰大畧不世出能摠英雄以撥亂反正者君也茍非其人雖強必斃君殆天之所啓遂深自結納太祖亦親異焉龎晃字元顯少以良家子刺史杜逹召補州都督太祖既有闗中署晃大都督領親信兵常置左右晃因徙居闗中曹仁字子孝太祖從弟少好弓馬弋獵從太祖為别部可馬行厲鋒校尉太祖之破袁術仁所斬獲頗多從征徐州仁嘗督騎為軍前鋒别攻陶謙將呂繇破之還與大軍合彭城大破謙軍從攻費華即墨開陽謙遣别將救諸縣仁以騎擊破之太祖征呂布仁别攻勾陽拔之生獲布將劉何太祖平黃巾迎天子都許仁數有功以議郎督騎太祖征張繡仁别徇旁縣虜其男女三千餘人太祖與袁紹久相持於官渡紹遣劉備徇㶏彊諸縣多舉衆應之太祖使將騎擊備破走之盡復收諸叛縣而還紹遣别將韓荀鈔斷西道仁擊荀於雞雒山大破之封都亭侯從平荆州以仁行征南將軍留屯江陵拒吳將周瑜瑜將數萬人来攻前鋒數千人始至仁登城望之乃募得三百人遣部曲將牛金逆與桃戰遂為所圍仁將其麾下壯士數十騎直前衝入賊圍金等乃得解賊衆乃退轉封安平亭侯太祖討馬超以仁行安西將軍拒潼闗破超渭南蘇伯田銀反討破之復以仁行征南將軍假節屯樊鎮荆州侯音以宛叛畧傍縣衆數千人仁率諸軍攻破音斬其首還屯樊即拜征南將軍闗公攻樊時漢水暴溢城不没者數板會徐晃救至水亦稍减仁得潰圍而出文帝初即王位拜仁為車騎將軍都督荆揚益州諸軍事進封陳侯増邑至三千五百户曹洪字子亷太祖從弟太祖起義兵討董卓至滎陽為卓將徐榮所敗太祖失馬賊追甚急洪授太祖馬得以俱濟文帝即王位以洪為前將軍曹眞字子丹魏太祖族子從操征伐屢建大勲文帝踐祚以眞為鎭西將軍假節都督雍凉州諸軍事進封東鄉侯張遼字文遠李傕敗呂布遼從呂布東奔徐州領魯相太祖破呂布於下邳遼將其衆降拜中郎將賜爵闗内侯數有戰功遷禆將軍袁紹破别定魯國諸縣與夏侯淵圍昌狶於東海降之從討袁譚袁尚於黎陽有功行中堅將軍從攻尚於鄴尚堅守不下太祖還許使遼與樂進拔陰安復從攻鄴鄴破别狥趙國常山招降緣山諸賊及黒山孫輕等從攻袁譚譚破别徇海濵破遼東賊柳毅等還為盪宼將軍復别擊荆州定江夏諸縣還屯臨潁封都亭侯從征袁尚於栁城擊斬單于蹋頓又陳蘭梅成以氐六縣叛遼督張郃朱蓋等討蘭成蘭轉入􅈞山􅈞山中有天柱山高峻二十餘里遼攻敗斬之太祖征孫權還使遼與樂進李典屯合肥權攻合肥十餘日城不可拔乃退遼率諸軍追擊幾復獲權太祖大壯之拜征東將軍還屯陳郡文帝即王位轉前將軍孫權復叛遣遼還屯合肥進爵都鄉侯文帝踐祚封晉陽侯樂進字文謙以膽烈從太祖為帳下吏遣募兵得千餘人還為軍假司馬陷陣都尉從擊呂布於濮陽張超於雍丘橋蕤於苦皆先登有功封廣昌亭侯從征張繡於安衆圍呂布於下邳别將擊眭固於射犬攻劉備於沛皆破之拜討㓂校尉渡河攻獲嘉還從擊袁紹於官渡力戰斬紹將淳于瓊從擊譚尚於黎陽斬其大將嚴敬行游擊將軍别擊黃巾破之定樂安郡從圍鄴鄴定從擊袁譚於南皮先登入譚東門譚敗别攻雍奴破之太祖表漢帝為折衝將軍别征高幹從平荆州留屯襄陽擊蜀將蘇非等皆走之又攻蜀主臨沮長杜普旌陽長梁太皆大破之後從征孫權假節屯合肥遷右將軍張郃字儁乂初為袁紹寧國中郎將後歸太祖拜偏將軍從攻鄴拔之又從擊袁譚於渤海别將軍圍雍奴大破之後討桞城與張遼俱為軍鋒以功遷平狄將軍别征東萊討管承又與張遼討陳蘭梅成等破之從破馬超韓遂於渭南圍安定降楊秋與夏侯淵討鄜賊梁興及武都氐又破馬超平宋建太祖征張魯先遣郃督諸軍討興和氐王竇茂太祖從散闗入漢中又先使郃督歩卒通路至陽平魯降太祖還留郃與夏侯淵等守漢中拒劉備郃别督諸軍降巴東巴西二郡淵戰没諸軍推郃為軍主太祖在長安遣使假郃節還屯陳倉文帝即王位以郃為左將軍進爵都鄉侯及踐祚進封鄚侯徐晃字公明初從車騎將軍楊奉討賊有功拜騎都尉後歸太祖太祖授晃兵使擊卷原武賊破之拜禆將軍從征呂布别降布將趙庶李鄒等與史渙斬睦固於河内從破劉備又從破顔良拔白馬進至延津破文醜拜偏將軍與曹洪擊㶏彊賊祝臂破之又與史渙擊袁紹運車於故市功最多封都亭侯太祖既圍鄴又别討毛城設伏兵掩擊破三屯從破袁譚於南皮討平原叛賊克之從征蹋頓拜横野將軍從征荆州别屯樊討中廬臨沮宜城賊又與滿寵擊蜀將於漢津與曹仁擊周瑜於江陵又討太原反者圍太陵拔之斬賊帥商曜韓遂馬超等反闗右遣晃屯汾陰以撫河東太祖破超等又使晃與夏侯淵平隃糜汧諸氐太祖還鄴使晃與夏侯淵拒劉備於陽平備遣陳式等十餘營絶馬鳴閣道晃别征破之復遣晃助曹仁討闗羽屯宛會漢水暴溢于禁等没羽圍仁於樊又圍將軍呂常於襄陽晃擊破之文帝即王位以晃為右將軍進封逯鄉侯及踐祚進封陽平侯許禇字仲康譙國人漢末聚少年及宗族數千家共堅壁以禦冦太祖徇淮汝禇以衆歸太祖太祖見而壯之曰此吾樊噲也即日拜都尉引入宿衞諸從禇俠客皆以為虎士從征張繡先登斬首萬計遷校尉從討袁紹於官渡時常從士徐他等謀為逆以禇長侍左右憚之不敢發伺禇休下日他等懐刀入禇至下舍心動即還侍他等不知入帳見禇大驚愕他色變禇覺之即擊殺他等太祖益親信之出入同行不離左右從圍鄴力戰有功賜爵闗内侯從討韓遂馬超於潼闗太祖將北渡臨濟河先渡兵獨與禇及虎士百餘人留南岸斷後超將歩騎萬餘人来奔太祖軍矢下如雨禇白太祖賊来多今兵渡已盡宜去乃扶太祖上船賊戰急軍爭濟船重欲没禇斬攀船者左手舉馬鞍蔽太祖船工為流矢所中死禇右手竝泝船僅乃得渡是日微禇幾危其後太祖與馬超等單馬㑹語左右皆不得從唯將禇超負其力陰欲前突太祖素聞禇勇疑從騎是禇乃問太祖曰公有虎侯者安在太祖顧指禇禇瞋目眄之超不敢動乃各罷後數日㑹戰大破超等禇身斬首級遷武衛中郎將武衞之號自此始也軍中以禇力如虎而癡故號曰虎癡是以超問虎侯至今天下稱焉皆謂其姓名後遷中堅將軍文帝踐祚進封萬亭侯蜀闗公字雲長本字長生河東解人亡命奔涿郡先主於鄉里合徒衆而公與張飛為之禦侮先主為平原相以二人為别部司馬分統部曲先主與二人寢則同牀恩若兄弟而稠人廣坐侍立終日隨先主周旋不避艱險先主之襲殺徐州刺史車胄使公守下邳城行太守事建安五年曹公東征擒羽以歸拜偏將軍曹公知公無久留之意使張遼問之公歎曰吾極感曹公待我厚然吾受劉將軍厚恩誓以同死不可背之及公殺顔良乃奔先主㑹曹公定荆州先主自樊將南渡江别遣公乗船數百艘㑹江陵曹公追至當陽長阪先主斜趣漢津適與公船相値共至夏口孫權遣兵佐先主拒曹公曹公引軍退歸先主收江南諸郡乃封拜元勲以公為襄陽太守盪冦將軍駐江北先主西定益州拜公董督荆州事二十四年先主為漢中王拜公為前將軍假節鉞公攻曹仁還至江陵為吳逆擊斬之張飛字翼德涿郡人少與闗公俱事先主又曹公入荆州先主奔江南曹公追之一日一夜及于當陽之長阪先主使飛將二十騎拒後飛據水斷橋瞋目横矛曰身是張翼德也可来共決死敵皆無敢近者故遂得免先主已定江南以飛為宜都太守征虜將軍封新亭侯後轉在南郡先主入益州還攻劉璋飛與諸葛亮等泝流而上分定郡縣至江州今渝奴破璋將巴郡太守嚴顔所過戰克與先主㑹于成都領巴西太守曹公以夏侯淵張郃守漢川郃别督軍下巴西欲徙其民於漢中進軍宕渠蒙頭盪石與飛相拒五十餘日飛率精卒萬餘人從他道邀郃軍交戰郃棄馬緣山從間道退引軍還南鄭巴土獲安先主為漢中王拜飛為右將軍假節章武元年遷車騎將軍進封西鄉侯馬超字孟起扶風茂陵人漢前將軍騰之子累遷徐州刺史諌議大夫及騰入宿衛以超為偏將軍使領騰營率諸戍以擊隴上郡縣殺凉州刺史韋康據冀城有其衆超自稱征西將軍領并州牧督凉州諸軍事康故吏楊阜姜叙梁寛趙衢等合謀擊超超出攻之不能下乃奔漢中聞先主圍劉璋於成都密書請降先主遣人迎超超將兵徑到城下城中震怖璋即稽首先主聞超至喜曰我得益州矣乃使人止超而濳以兵資之超到令引軍屯城北未一旬而成都潰以超為平西將軍督臨沮因為前都亭侯先主為漢中王拜超為左將軍假節既即位遷驃騎將軍領凉州牧封斄鄉侯黄忠字漢升南陽人荆州牧劉表以為中郎將與表從子磐共守長沙攸縣及曹公克荆州假行禆將軍仍就故任統屬長沙太守韓𤣥先主南定諸郡忠遂委質隨從入蜀自葭萌受任還攻劉璋忠常先登陷陣勇毅冠三軍益州既定拜為討虜將軍建安末於漢中定軍山擊夏侯淵淵軍大敗遷征西將軍先主為漢中王以忠為後將軍賜爵闗内侯趙雲字子龍常山真定人本屬公孫瓚瓚遣先主為田楷拒袁紹雲遂隨從為先主主騎時先主亦依瓚每接納雲雲得深自結託雲以兄喪辭瓚暫歸先主知其不反捉手而别雲辭曰終不背徳也先主就袁紹雲見於鄴先主與雲同牀眠臥密遣雲合募得數百人皆稱劉左將軍部曲紹不能知遂隨先主至荆州及先主為曹公所追於當陽長阪棄妻子南走雲身抱弱子即後主也保䕶丼夫人即後主母也皆得免難遷為牙門將軍雲領留營司馬時孫夫人權之妹聞先主西征大遣舟船迎妹而夫人内欲將後主還呉雲與張飛勒兵截江乃得後主先主自葭萌還攻劉璋召諸葛亮亮率雲與張飛等泝江西上平定郡縣至江州分遣雲從外水上江陽與亮㑹于成都成都既定以雲為翊軍將軍建興元年為中䕶軍封永昌亭侯冊府元龜卷三百四十二
