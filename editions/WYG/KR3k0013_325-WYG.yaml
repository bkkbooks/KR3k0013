body:
  text: 冊府元龜卷三百二十五宋王欽若等撰宰輔部諫爭舜之命禹曰予違汝弼髙宗之命説曰朝夕納誨盖夫居疑丞之位荷棟幹之重義均同體民具爾瞻休戚之所同安危之所繫至扵冠羣臣而總衆職撫四夷而親百姓公家之事知無不為固其任也若乃上之失徳事或過舉誠心内激嘉言罔伏引經義而酌古訓述天戒而箴時病談過更僕之頃怒有逆鱗之犯且復覼縷鄭重形扵奏疏竭其精忠以冀感悟古之宰相如伊尹之阿衡甘棠之保乂周公之告徽言山甫之補闕職皆如斯而已商伊尹申誥于太甲曰有言逆扵汝心必求諸道人以言咈違汝心必以道義求其意勿拒逆之有言遜扵汝志必求諸非道遜順也言順汝心必以非道察之勿以自蔵伊尹曰先王肇脩人紀從諫弗咈先民時若言湯始脩為人紀已有過則改從諫如流必先民之言是順周祭公謀父為穆王卿士穆王将征犬戎而謀父諫祭畿内之國周公之後謀父字也曰不可先王耀徳不觀兵夫兵戢而時動動則威觀則玩玩則無震震懼也是故周文公之頌文公周公旦之謚曰載戢干戈載櫜弓矢櫜韜也我求懿徳肆于時夏允王保之言武王常求美徳故陳其功扵時夏而歌之信哉武王能保此時夏之美樂章大者曰夏先王之扵民也茂正其徳而厚其性阜其財求而利其器用明利害之鄉鄉方也以文修之使務利而辟害懐徳而畏威故能保世以滋大昔我先世后稷謂棄與不窋也父子相繼曰世以服事虞夏及夏之衰也棄稷不務我先王不窋用失其官而自竄扵戎狄之間不敢怠業時序其徳遵修其緒遵亦作選脩其訓典朝夕恪勤守以敦篤奉以忠信奕世載徳不忝前人至扵文王武王昭前之光明而加之以慈和事神保民無不欣喜商王帝辛大惡扵民庶民不忍欣戴武王以致戎于商牧是故先王非務武也勤恤民隠而除其害也夫先王之制邦内甸服邦外侯服侯衛賔服此總言之也侯侯圻衛衛圻也蠻夷要服戎翟荒服甸服者祭供日祭侯服者祀供月祀賔服者享供時祭要服者貢供嵗貢荒服者王王王事天子也詩云莫敢不來王日祭月祀時享嵗貢終王先王之順祀也外傳云先王之訓有不祭則脩意先脩志意以自責也畿内近知王意也有不祀則脩言言號令也有不享則脩文文典法也有不貢則脩名名謂尊卑職貢之名號也有不王則修徳逺人不服則脩文徳以来之序成而有不至則脩刑序成謂上五者次序有成有不至則有刑罰也扵是有刑不祭伐不祀征不享讓不貢告不王扵是有刑罰之辟有攻伐之兵有征討之備有威讓之命有文告之辭布令陳辭而有不至則増脩扵徳毋勤民扵逺是以近無不聽逺無不服今自大畢伯仕之終也犬戎之君犬戎氏以其職来王天子曰予必以不享征之且觀之兵無乃廢先王之訓而王幾頓乎吾聞犬戎樹惇樹立也言犬戎立性敦篤也能率舊徳而守終純固其有以禦我矣王遂征之得四白狼四白鹿以歸自是荒服者不至又穆王欲肆其志肆極也周行天下将皆必有車轍馬跡焉祭公謀父作祈招之詩以止王心祈父周司馬世掌田兵之職招其名祭公方諫遊行故指司馬官而言其詩曰祈招之愔愔式昭徳音愔愔安和貌式用也昭明也思我王度式如玉式如金金玉取其堅重形民之力而無醉飽之心言國之用民當隨其力任如治金玉之器隨器而制形故言形民之力去其醉飽過盈之心召穆公虎為王卿士厲王行暴虐侈敖國人謗王召公諫曰民不堪命矣王怒得衛巫衛國之巫也使監謗者以告則殺之其謗鮮矣諸侯不朝三十四年王益嚴國人莫敢言道路以目以目相視而已厲王喜告召公曰吾能弭謗矣乃不敢言召公曰是鄣之也防民之口甚扵防川川壅而潰傷人必多民亦如之是故為川者决之使導為民者宣之使言故天子聽政使公卿至扵列士獻詩瞽獻典典樂典也史獻書師箴瞍賦無眸子曰瞍賦公卿列士所獻詩也矇誦有眸子而無見曰矇周禮矇主弦歌諷誦箴諫之語也百工諫庶人傳語庶人卑賤見時得失不得言傳以語王近臣盡規近臣驂僕之屬親戚補察瞽史教誨瞽樂大師史太史也耆艾脩之耆艾師𫝊也脩理瞽史之教以聞於王而后王斟酌焉是以事行而不悖民之有口也猶土之有山川也財用扵是乎出猶其有原隰衍沃也下平曰衍有溉曰沃衣食扵是乎生口之宣言也善敗扵是乎興行善而備敗所以阜財用衣食者也夫民慮之于心而宣之扵口成而行之何可壅也若壅其口其與能幾何王不聽扵是國人莫敢出言三年乃流于彘虢文公為王卿士宣王即位不藉千畆藉借也借民力以為之天子耤田千畆諸侯百畆白厲王之流藉田禮廢宣王即位不復古也虢文公諫曰不可夫民之大事在農糓民之命故農為大事上帝之粢盛扵是乎出出扵農也器實曰粢在器曰盛民之蕃庶扵是乎生蕃息庶衆事之供給扵是乎在供具給足和恊輯音集睦扵是乎興恊合也輯聚也睦親也財用蕃殖扵是乎始殖長敦龎純固扵是乎成敦厚龎大是故稷為大官民之大事在農故稷之職為大官古者太史順時􅓊土順視陽癉憤盈土氣震發癉厚也憤積也盈滿也震動也發起也農祥晨正農祥房星也晨正立春之日晨中扵午也農事之候故曰農祥日月底于天廟底至也天廟營室孟春之月日月皆至營室土乃脈發脈理也農書曰春土冐撅陳根可拔耕者急發先時九日先先立春日也大史告稷曰自今至扵初吉初吉二月朔日也陽氣俱烝土膏其動烝升也膏土潤也其動潤澤欲行貌弗震弗渝脈其滿眚榖乃不殖震動也渝變也眚灾也言陽氣俱升土膏欲動雷即發動變瀉其氣不然則脈滿氣結更為灾病糓乃不殖稷以告以大史之言告王也王曰史帥陽官以命我司事史大史陽官春官司事主農事者也曰距今九日土其俱動距去王其祗袚音弗監農不易祗敬袚齊戒祓除也不易不易物土之宜也王乃使司徒咸戒公卿百吏庶民百吏百官也庶民甸師氏所掌之民也主耕耨王之藉田者也司空除壇于藉司空掌地命農大夫咸戒農用農大夫田畯農用田器也先時五日先耕時也瞽告有協風至瞽樂大師知風聲者也恊和也風氣和時候至也立春日風也王即齋宮所齋之宫百官御事各即其齋三日御治王親淳濯饗醴淳沃濯溉饗飲也謂王沐浴飲醴酒也及期其耕日也鬱人薦鬯鬱金香草宜以和鬯酒也周禮鬱人掌祼器凡祭祀賔客和鬱鬯以實彛而陳之共王之齊鬯也犠人薦醴犠人司尊掌共酒醴者也王祼音灌鬯饗醴乃行祼灌也灌鬯飲酒皆所以自香絜也百吏庶民畢從及藉后稷監之監祭膳夫農正陳藉禮膳夫上士也掌飲飡膳羞農正田大夫也主敷陳藉禮而祭其神為祈也大史賛王賛導王敬從之王耕一墢音鉢一墢耜之發也王耕以耜耕也班三之班次也三之各三其上也王一公三卿九大夫二十七也庶人終于千畆終盡耕也其后稷省功太史監之司徒省民大師監之宰夫陳饗膳宰監之宰夫下大夫也膳宰膳夫膳夫賛王王歆大牢歆饗班嘗之公卿大夫庶人終食終是日也瞽帥音官以省風土音官樂官也風土以音律省土風風氣和則土氣養廪于藉東南鍾而藏之廩御廩也一名神倉東南生長之處鍾聚也云為廩以藏王所籍田以奉粢盛也而時布之于農布賦稷則徧戒百姓紀農恊功紀猶綜理也恊同也曰隂陽分布震雷出滯隂陽分日夜同也滯蟄虫也明堂月令曰日夜分雷乃發聲始電蟄虫咸動啟而出之土不備墾辟在司冦墾發也辟罪也在司冦司冦行其罪也乃命其旅曰徇旅衆徇行農師一之一之先徃也農師上士也農正再之農正后稷佐田畯也故次農師也后稷三之農官之長也故次農正也司空四之司空主道路溝洫故次后稷也司徒五之司徒省民故次司空太保六之太師七之太保太師天子三公佐王論道紀監衆官不特長事故次司空太史八之太史掌逆官府之治故次太師宗伯九之宗伯卿官掌相王之大禮若王不與祭則攝位故次太史王則大徇大徇帥公卿大夫親行農耨穫亦如之如之如耕時也民用莫不震動恪恭于農用謂田器循其疆畔日服其鎛不觧于時疆疆界也鎛鋤屬也財用不乏民用和同是時也王事惟農是務無求利扵其官以干農功求利謂變易使干亂農功三時務農而一時講武三時春夏秋一時冬也講習也故征則有威守則有財若是乃能媚扵神媚説而和於民矣則饗祀時至而布施優裕也今天子欲循先王之緒而棄其大功匱神之祀而困民之財匱神之祀不耕藉也因民之財取扵民也将何以求福用民王弗聽樊仲山甫為王卿士食采扵樊魯武公以括與戯以見王武公伯禽之𤣥孫獻公之子武公敖也括武公長子伯御也戯括弟懿公也王立戯為太子也樊仲山甫諫曰不可立不順必犯不順立少也犯猶魯必逆王命而不從也犯王命必誅故出令不可不順也令之不行政之不立令不行即政不立也行而不順民将棄上使長事少故民棄上夫下事上少事長所以為順也今天子立諸侯而建其少是教逆也若魯從之而諸侯傚之王命将有壅言先王立長之命将壅塞不行若不從而誅之是自誅王命也誅王命者先王之命立長今魯亦立長若誅之是自誅王命也是事也誅亦失不誅亦失命不誅則命廢天子其圗之王卒立之魯侯歸而卒故魯人殺懿公而立伯御伯御括也三十二年諸侯伐魯立孝公孝公懿公之弟稱也宣王三十九年王師敗於姜氏之戎宣王既䘮南國之師乃料民於太原料數也仲山甫諫曰民不可料夫古者料民而知其少多司民恊孤終司民掌登萬民之數自生齒以上書王府無父曰孤終死也合其名籍以登扵王府司商恊名姓司商掌賜族受姓之官商金聲清謂人始生吹律合定其姓名司徒恊旅司徒掌合師旅之衆司冦恊奸司冦刑官掌合奸民以知死刑之數牧恊職周禮牧人掌牧養犧牲合其物色之數也工恊革百工之官革更也革制度者合其數場恊入場人掌埸圃委積珍異之物歛而藏之也廪恊出廩人掌九榖出用之數也是則少多死生出入徃来者皆可知也扵是又審之以事事謂因藉田與蒐狩以簡知其數也不謂其少而大料之是示少而惡事也言王不謂其衆少而大料數之是示以寡少又厭惡政事臨政示少諸侯避之示天下以寡弱諸侯将避逺王室不親附治民惡事無以賦令言厭惡政事則無以賦令且無故而料民天之所惡也故事也天道清浄也害於政而妨於後嗣害政敗為政之道妨後嗣謂将有禍亂也王卒料之及幽王乃滅幽王宣王之子滅謂滅西周單穆公為王卿士景王二十一年将鑄大錢錢者金幣之名所以質物貨通財用也又曰泉單穆公曰不可古者天災降戾降下戾至也災謂水旱螽螟之屬也於是乎量資幣權輕重以振救民量猶度也資財也權稱也振極也民患輕則為之作重幣以行之民患幣輕而物貴則作重幣以行其輕也於是乎有母權子而行民皆得焉重曰母輕曰子以貨物物輕則子獨行物重則以母權而行之子母相通人皆得其欲也若不堪重則多作輕而行之亦不廢重於是乎有子權母而行小大利之堪任也不任之者幣重物輕妨其用也故作輕幣雜而用之以重者貿其貴以輕者貿其賤也子權母者母不足則以子平而行之故貴賤小大皆以為利也今王廢輕而作重民失其資能無匱乎廢輕而作重本竭而末寡故民失其資也若匱王用将有所乏民財匱無以供上故王用将乏也乏則将厚取扵民厚取聚歛民不給将有逺志是離民也給足也逺志逋逃也且夫備有未至而設之備國備也未至而設之謂備豫不虞安不忘危也有至而後救之至而後救謂若救災療疾量資幣平輕重之屬也是不相入也二者先後各有宜不相入不相為用也可先而不備謂之怠怠緩可後而先之謂之召災謂民未患輕而重之遺民遺財是謂召災周固羸國也天未厭禍焉而又離民以佐災無乃不可乎言周固已為羸病之國天降禍災未厭已也将民之與處而離之将災是備御而召之則何以經國君以善政為經臣奉而成之為緯國無經何以出令令之不從上之患也故聖王樹徳扵民以除之樹立也除除令不從之患也夏書有之曰闗石龢均王府則有夏書逸書也闗門之征也石今之斛也言征賦調均則王之府藏常有也一曰闗衡也詩亦有之曰瞻彼旱麓榛楛音户濟濟旱山名麓山足也榛似栗楛木名濟濟衆盛貌盛者言王者之徳被及之也愷悌君子千禄愷悌愷樂悌易干求也君子謂長君言隂陽調草木盛故君子以求禄其心易樂也夫旱麓之榛楛殖殖長故君子得以樂易干禄焉若夫山林匱竭林麓散亡藪澤肆既肆極既盡也散亡謂無山林衡虞之政也民力彫盡田疇荒蕪資用匱乏彫傷也糓地為田麻地為疇荒空也蕪穢也君子将險哀之不暇而何樂易之有焉險危且絶民用以實王府絶民用謂廢小錢而鑄大猶塞川原而為潢汙其竭也無日矣大者潢小者汙竭盡也無日無日數也若民離而財匱災至而備亡王其若之何備亡無救災之備也吾周官之扵災備也其所怠棄者多矣周官周六官災備備災之法令也而又奪之資以益其災是去其藏而翳其人也王其圗之善政藏扵民翳猶屛也人民也奪其資民離叛是逺屏其民也一曰翳滅也王弗聽卒鑄大錢二十三年王将鑄無射而為之大林無射鍾名律中無射也大林無射之覆也作無射而為大林以覆之其律中林鍾也單穆公曰不可作重幣以絶民資又鑄大鐘以鮮其繼鮮寡寡其繼者謂用物過度妨於財若積聚既䘮又鮮其繼生何以殖積聚既䘮謂廢小錢生財殖長且夫鐘不過以動聲動聲謂合樂以金奏而八音從之也若無射有林耳弗及也無射後有大林以覆之無射陽聲之細者林鐘隂聲之大者細抑大凌故耳不能聽及也夫鐘聲以為耳也耳所不及非鐘聲也非法鐘之聲猶目所不見不可以為目也耳目所不及而彊之則有眩惑之失以生夫目之察度也不過歩武尺寸之間六尺為歩半歩為武其察色也不過墨文尋常之間三尺為墨倍墨為尋倍尋為常耳之察龢也在清濁之間清濁律吕之變也黄鍾為宫則濁大吕為角則清其察清濁也不過一人之所勝勝舉是故先王之制鍾也大不出鈞重不過石鈞所以鈞音之法也以木長七尺有絃繫之以為鈞法百二十斤為石也律度量衡扵是乎生律有五聲隂陽之法也度大尺量斗斛衡稱上衡衡有斤兩之數也小大器用於是乎出出扵鍾也易曰制器者尚其象小謂錙銖分寸大謂斤兩丈尺故聖人慎之今王作鍾也聽之弗及耳不及知其清濁此之不度不中鈞石之數鍾聲不可以知龢耳不能聽故不可以知龢制度不可以出節節謂法度量衡之節無益扵樂而鮮民財将焉用之夫樂不過以聽耳而美不過以觀目若聽樂而震觀美而眩患莫甚焉夫耳目心之樞機也樞機發動也心有所欲耳目為之發動也故必聽龢而視正聽龢則聦視正則明習扵和正則不眩惑聰則言聽明則徳昭聽言昭徳則能思慮純固以言徳扵民民歆而徳之則歸心焉歆猶欣欣喜服也言徳以言發徳教上得民心以殖義方殖立方道是以作無不濟求無不獲然後能樂夫耳内龢聲而口出美言耳聞和聲則口有美言此感於物也以為憲令憲法而布諸民正之以度量民以心力從之不倦成事不貳樂之至也貳變口内味而耳内聲聲味生氣口内五味則耳樂五聲耳樂五聲則志氣生也氣在口為言在目為明言以信名信審也名號令明以時動視明則動得其時也名以成政號令所以成政動以殖生殖長也動得其時所以財長生政成生殖樂之至也若視聽不龢而有震昡則味入不精不精則氣佚氣佚則不和不和無射大林也若聽樂而震視色而昡則味入不精美味入不精美則氣放佚不行扵身體其何以能樂三年之中而有離民之器二焉二謂作大國錢鑄大鍾其危哉王弗聽漢公孫𢎞初為博士待詔金馬門時方通西南夷巴蜀苦之詔使𢎞視焉還奏盛毁西南夷無所用武帝不聽後為御史大夫時又東置滄海北築朔方之郡𢎞數諫以為罷弊中國以奉無用之地罷讀曰疲願罷之扵是帝乃使朱買臣難𢎞置朔方之便發十䇿𢎞不得一𢎞乃謝曰山東鄙人不知其便若是願罷西南夷滄海専就朔方帝乃許之貢禹為御史大夫列扵三公自禹在位數言得失書數十上師丹為大司空哀帝即位封拜丁傅奪王氏權丹自以師傅居三公位得信扵帝上書言古者諒闇不言聽扵冢宰論語云子張曰書云髙宗諒開三年不言孔子曰何必髙宗古之人皆然君薨百官總已以聽扵冢宰三年諒信也闇黙也三年無改於父之道論語稱孔子曰父在觀其志父没觀其行三年無改扵父之道可謂孝矣前大行尸柩在堂而官爵臣等以及親屬赫然皆貴寵封舅為陽安侯皇后尊號未定豫封父為孔鄉侯出侍中王邑射聲校尉王邯等詔書比下變動政事比頻也卒暴無漸卒讀曰猝臣縱不能明陳大義復曽不能牢讓爵位相隨空受封侯増益陛下之過間者郡國多地動水出流殺人民日月不明五星失行此皆舉錯失中號令不定法度失理隂陽溷濁之應臣伏惟人情無子年雖六七十猶博取而廣求取讀曰娶孝成皇帝深見天命燭知至徳以壮年克己立陛下為嗣先帝暴棄天下而陛下繼體四海安寜百姓不懼此先帝聖徳當合天人之功也臣聞天威不違顔咫尺願陛下深思先帝所以建立陛下之意且克己躬行以觀羣下之從化天下者陛下之家也肺腑何患不富貴不宜倉卒先帝不量臣愚以為太傅陛下以臣託師傅故亡功徳而備鼎足封大國加賜黄金位為三公職在左右不能盡忠補過而令庶人竊議災異數見此臣之大罪也臣不敢言乞骸骨歸於海濵恐嫌扵僞誠慙負重責義不得不盡死書數十上多切直之言王嘉哀帝初為丞相欲規成帝之政多所變動規正其乖失者嘉上疏曰臣聞聖王之功在於得人孔子曰才難不其然與才難謂有賢才者難得也故繼世立諸侯象賢也象其先父祖之賢耳非必其人皆有徳也雖不能盡賢天子為擇臣立命卿以輔之命卿命扵天子者也居是國也累世尊重然後士民之衆附焉是以教化行而治功立今之郡守重於古諸侯徃者致選賢材賢材難得㧞擢可用者或起於囚徒昔魏尚坐事繫文帝感馮唐之言遣使持節赦其罪拜為雲中太守匈奴忌之武帝擢韓安國扵徒中拜為梁内史骨肉以安言梁孝王得免罪也張敞為京兆尹有罪當免黠吏知而犯敞敞收殺之其家曰寃使者覆獄劾敞賊殺人上逮捕不下言使者上奏請逮捕敞而天子不下其事也㑹免亡命數十日宣帝徴拜為冀州刺史卒獲其用前世非私此三人貪其材器有益於公家也孝文時吏居官者或長子孫以官為氏倉氏庫氏則倉庫吏之後也其二千石長吏亦安官樂職然後上下相望莫有茍且之意其後稍稍變易公卿以下傳相促急又數改更政事更亦變司𨽻部刺史察過悉劾發揚隂私悉盡也言事無大小皆劾過扵所察之條也吏或居官數月而退送故迎新交錯道路中材茍容求全不敢操持羣下也下材懐危内顧嘗恐獲罪每為私計也一切營私者多二千石益輕賤吏民慢易之易亦輕也或持其㣲過増加成辠言扵刺史司𨽻或至上書章下依其所上之章而下令治之衆庶知其易危言易於傾危也小失意則有離畔之心前山陽亡徒蘇令等從横吏士臨難莫肯仗節死義以守相威權素奪也守郡守也相諸侯相也素奪謂先不假之威權也孝成皇帝悔之下詔書二千石不為縱遣使者賜金慰厚其意誠以為國家有急取辦於二千石二千石尊重難危乃能使下孝宣皇帝愛其良民吏良善也良民吏善治百姓者有章劾事留中㑹赦壹觧不即下治其事恐為擾動故每留中或經赦令一切皆觧散也故事尚書希下章為煩擾百姓證驗繫治或死獄中章文必有敢告之字廼下惟陛下留神於擇賢記善忘過容忍臣子勿責以備二千石部刺史三輔縣令有材任職者人情不能不有過失宜可闊畧嘗寛恕其小罪也令盡力者有所勸此方今急務國家之利也前蘇令發欲遣大夫使遂問状時見大夫無可使者召盩厔令尹逢拜為諫議大夫遣之今諸侯大夫有材能者甚少宜豫畜飬可成就者則士赴難不愛其死臨事倉卒乃求非所以明朝廷也嘉因薦儒者公孫光滿昌及能吏蕭咸薛脩等皆故二千石有名稱天子納而用之㑹息夫躬孫寵等因中常侍宋𢎞上書告東平王雲呪詛又與后舅伍宏謀弑上為逆雲等伏誅躬寵擢為吏二千石是時侍中董賢愛幸扵上上欲侯之而未有所縁傅嘉勸上因東平事以封賢上扵是定躬寵告東平本章掇去宋𢎞更言因董賢以聞欲以其功侯之皆先賜爵闗内侯頃之欲封賢等上心憚嘉乃先使皇后父孔鄉侯傅晏持詔書視丞相御史扵是嘉與御史大夫賈延上封事言竊見董賢等三人始賜爵衆庶匈匈咸曰賢貴其餘并蒙恩言董賢必貴寵故妄得封而躬寵等遂䝉恩至今流言未觧陛下仁恩扵賢等不已宜暴賢等本奏語言暴謂章露也延問公卿大夫博士議郎考合古今明正其義然後乃加爵土不然恐大失衆心海内引領而議暴下其事必有言當封者在陛下所從天下雖不説咎有所分不獨在陛下前定陵侯淳于長初封其事亦議大司農谷永以長當封衆人歸咎扵永先帝不獨䝉其議臣嘉臣延材駑不稱死有餘責知順指不迕可得容身須臾所以不敢者思報厚恩也帝感其言止數月遂封賢等後數月日食舉直言嘉復奏封事曰臣聞咎繇戒帝舜曰亡敖佚欲有國兢兢業業一日二日萬幾言冇臣之人不可敖慢逸欲但常戒慎危懼以理萬事之機也箕子戒武王曰臣無有作威作福亡有玉食臣之有作威作福玉食害扵而家㓙于而國人用側頗辟民用僭慝玉食精好如玉也而汝也頗偏也僭不信也慝惡也言如此則逆尊卑之序亂隂陽之統而害及王者其國極危國人傾仄不正民用僭差不壹此君不繇法度上下失序之敗也武王躬履此道隆至成康言武王能履法度故至成康之時徳化隆盛也自是以後縱心恣欲法度陵遲陵遲即陵夷也言其頽替也至扵臣弑君子弑父父子至親失禮患生何况異姓之臣孔子曰道千乗之國敬事而信節用而愛人使民以時道治也孝文皇帝備行此道海内蒙恩為漢太宗孝宣皇帝賞罰信明施與有節記人之功忽於小過忽忘也以致治平孝元皇帝奉承大業温恭少欲都内錢四十萬萬水衡錢二十五萬萬少府錢十八萬萬言不費用故畜積也嘗幸上林後宫馮貴人從臨獸圏猛獸驚出貴人前當之元帝嘉美其義賜錢五萬此言雖嘉其義而賞亦不多掖庭見親有加賞賜屬其人勿衆謝掖庭宫人有親戚来見而帝賜之者屬其家勿使扵衆人中謝也示平惡偏重失人心賞賜節約是時外戚貲千萬者少耳故少府水衡見錢多也見在之錢也雖遭初元永光㓙年饑饉加有西羌之變外奉師旅内振貧民終無傾危之憂以府藏内充實也孝成皇帝時諫臣多言燕出之害燕出謂㣲行也及女寵専愛耽於酒色損徳傷年其言甚切然終不怨怒也寵臣淳于長張放史育育數貶退家貲不滿千萬放斥逐就國長榜死於獄榜笞擊也不以私愛害公義故雖多内譏朝廷安平雖有好内之譏而不害政也傳業陛下陛下在國之時好詩書尚儉節徴来所過道上稱誦徳美此天下所以向心也望為治也初即位易帷帳去錦繡乗輿席縁綈繒而已綈厚繒也共皇寢廟比比當作恭皇帝哀之父即定陶恭王也比比猶頻頻憂閔元元惟用度不足惟思也以義割恩輒且止息今始作治而駙馬都尉董賢亦起官寺上林中又為賢治大第開門鄉北闕引玉渠灌園池玉渠官渠名在城東覆盎門外使者䕶作䕶監視也賞賜吏卒甚扵治宗廟賢母病長安厨給祠具長安有厨官主為官食道中過者皆飲食禱扵道中故行人皆得飲食為賢治器器成奏御乃行或物好特賜其工自貢獻宗廟三宮猶不至此三宫天子太后皇后也賢家有賔婚及見親諸官並共見親親戚相見也並共言百官各以所掌事及財物就供之賜及蒼頭奴婢人十萬錢使者䕶視發取市物百賈震動賈謂販賣人也言百賈者非一人稱也道路讙譁羣臣惶惑詔書罷苑而以賜賢二千餘頃均田之制從此墮壊自公卿以下至于吏民名曰均田皆有頃數扵品制中令均等今賜賢二千餘頃墮壊其等制也奢僭放縱變亂隂陽災異衆多百姓訛言持籌相驚被髪徒跣而走乗馬者馳夭惑其意不能自止或以為籌者䇿失之戒也陛下素仁智慎事今而有此大譏孔子曰危而不持顛而不扶則将安用彼相矣季氏将伐顓臾冉有季路見扵孔子孔子以此言責之以其不規諫也臣嘉幸得備位竊内悲傷不能通愚忠之信身死有益於國不敢自惜惟陛下慎已之所獨鄉察衆人之所共疑徃者寵臣鄧通韓嫣驕貴失度逸豫無厭小人不勝情欲卒陷罪辜卒終也亂國忘軀不終其禄所謂愛之適足以害之者也宜深覽前世以節賢寵全安其命於是帝漸不説漸進也而愈愛賢不能自勝㑹祖母傅太后薨上因託傅太后遺詔令成帝母王太后下丞相御史益封賢二千户及賜孔鄉侯汝昌侯陽新侯國𫝊晏傅商鄭業也嘉封還詔書還謂郤上之扵天子也因奏封事諫帝及太后曰臣聞爵禄土地天子之有也書云天命有徳五服五章哉言皇天命于有徳者以居列位天子諸侯卿大夫士尊卑之服采章各異也王者代天爵人尤宜慎之裂地而封不得其宜則庶衆不服感動隂陽其害疾自深言此氣損害故令天子身自有疾也今聖體乆不平此臣嘉所内懼也髙安侯賢佞幸之臣陛下傾爵位以貴之單貨財以富之單盡也損至尊以寵之言帝意傾惑為下所窺也主威已黜府藏已竭唯恐不足財皆民力所為孝文皇帝欲起露臺重百金之費克己不作今賢散公賦以施私惠一家至受千金徃古以来貴臣未嘗有此流聞四方皆同怨之里諺曰千人所指無病而死臣嘗為之寒心今太皇太后以永信太后遺詔詔丞相御史益賢户賜三侯國臣嘉竊惑山崩地動日食於三朝嵗月日之朝也皆隂侵陽之戒也前賢已再封晏商再易邑業縁私横求恩已過厚求索自恣不知厭足甚傷尊尊之義不可以示天下為害痛矣臣驕侵罔隂陽失節罔謂誣蔽也氣感相動害及身體陛下寢疾乆不平繼嗣未立宜思正萬事順天人之心以求福祐奈何輕身肆意不念髙祖之勤苦垂立制度欲傳之于無窮哉孝經曰天子有爭臣七人雖無道不失其天下言帝能納諫則免扵過惡也臣謹封上詔書不敢露見非愛死而不自法恐天下聞之故不敢自効愚戅數犯忌諱唯陛下省察哀帝發怒下獄自殺後漢伏湛光武建武初為大司徒時幽州牧彭寵反於漁陽帝欲自征之湛上疏諫曰臣聞文王受命而征伐五國必先詢之同姓然後謀于羣臣加占蓍龜以定行事故謀則成卜則吉戰則勝其詩曰帝謂文王詢爾仇方同爾兄弟以爾鉤援與爾臨衝以伐崇墉崇國城守先退後伐所以重人命俟時而動故三分天下而有其二陛下承大亂之極受命而帝興明祖宗出入四年而滅檀鄉制五校降銅馬破赤眉誅鄧奉之屬不為無功今京師空匱資用不足未能服近而先事邉外且漁陽之地逼接北狄黠虜困迫必求其助又今所過縣邑尤為困乏種麥之家多在城郭聞官兵将至當已收之矣大軍逺渉二千餘里士馬罷勞轉糧艱阻今兖豫青冀中國之都而寇賊縱横未及從化漁陽以東本備邉塞地接外虜貢税㣲薄安平之時尚資内郡况今荒耗豈足先圗而陛下捨近務逺棄易求難四方疑怪百姓恐懼誠臣之所惑也伏願逺覽文王重兵博謀近思征伐前後之宜顧問有司使極愚誠采其所長擇之聖慮以中土為憂念帝覽其奏遂不親征第五倫章帝永元初為司空帝以明徳太后故尊崇舅氏馬廖兄弟並居職任廖等傾身交結冠蓋之士爭赴趨之倫以后族過盛欲令朝廷抑損其權上疏曰臣聞忠不隱諱直不避害不勝愚狷昧死自表書曰臣無作威作福其害于而家㓙于而國傳曰大夫無境外之交束脩之饋近代光烈皇后雖友愛天至而卒使隂就歸國徙廢隂興賔客其後梁竇之家互有非法明帝即位竟多誅之自是雒中無復權戚書記請託一皆斷絶又譬諸外戚曰苦身待士不如為國戴盆望天事不兩施臣常刻著五藏書諸紳帯而今之議者復以馬氏為言竊聞衛尉廖以布三千疋城門校尉防以錢三百萬私瞻三輔衣冠知與不知莫不畢給又聞臘日亦遺其在雒中者錢各五千越騎校尉光臘用羊三百頭米四百斛肉五千斤臣愚以為不應經義惶恐不敢不以聞陛下情欲厚之亦宜所以安之臣今言此誠欲上忠陛下下全后家裁蒙省察及馬防為車騎将軍當出征西羌倫又上疏曰臣愚以為貴戚可封侯以富之不當職事以任之何者繩以法則傷恩私以親則違憲伏聞馬防今當西征臣以太后恩仁陛下至孝恐卒有纎介難以意愛聞防請杜篤為從事中郎多賜財帛篤為鄉里所廢客居美陽女弟為馬氏妻恃此交通在所縣令苦其不法收繫論之今来防所議者咸致疑怪況乃以為從事将恐議及朝廷今宜為選賢能以輔助之不可復令防自請人有損事望茍有所懐敢不自聞並不見省用及諸馬得罪歸國而竇氏始貴倫復上疏曰臣得以空虗之質當輔弼之任素性駑怯位尊爵重拘迫大義思自䇿厲雖遭百死不敢擇地又況親遇危言之世哉今承百王之敞人尚文巧咸趨邪路莫能守正伏見虎賁中郎将竇憲椒房之親典司禁兵出入省闈年盛志美卑謙樂善此誠其好士交結之方然諸出入貴戚者類多瑕釁禁錮之人尤少守約安貧之節士大夫無志之徒更相販賣雲集其門衆喣飄山聚蚊成雷蓋驕佚所從生也三輔論議者至云以貴戚廢錮當復以貴戚浣濯之猶觧酲當以酒也詖險趨勢之徒誠不可親近臣愚願陛下中宫嚴勅憲等閉門自守無妄交通士大夫防其未萌慮於無形令憲永保福禄君臣交歡無纎介之隙此臣之所至願也袁安和帝初為司徒時竇太后臨朝后兄車騎将軍憲北擊匈奴安與太尉宋繇司空任隗及九卿詣朝堂上書諫以為匈奴不犯邉塞而無故勞師逺渉損費國用徼功萬里非社稷之計書連上輒寢宋繇懼遂不敢復署議而諸卿稍自引止唯安獨與任隗守正不移至免冠朝堂固爭者十上太后不聽衆皆為之危懼安正色自若丁鴻永元四年為司徒竇太后臨政憲兄弟各擅威權鴻因日食上封事曰臣聞日者陽精守實不虧君之象也月者隂精盈毁有常臣之表也故日食者臣乗君隂陵陽月滿不虧下驕盈也昔周室衰季皇甫之屬専權於外黨類強盛侵奪主勢則日月薄食故詩曰十月之交朔日辛卯日有食之亦孔之醜春秋日食三十六弑君三十二變不空生各以類應夫威柄不以放下利器不可假人覧觀徃古近察漢興傾危之禍靡不繇之是以三桓專魯田氏擅齊六卿分晉諸呂握權統嗣幾移平之末廟不血食故雖有周公之親而無其徳不得行其勢也今大将軍雖欲勑身自約不敢僭差然而天下逺近皆惶怖承㫖刺史二千石初除謁辭求通待報雖奉符璽受臺勑不敢便去乆者至數十日背王室向私門此乃上威損下權盛也人道悖於下效騐見於天雖有隠謀神炤其情垂象見戒以告人君間者月滿先節過望不虧此臣驕溢背君専功獨行也陛下未深覺悟故天重見戒誠宜畏懼以防其禍詩云敬天之怒不敢戲豫若勑政責躬杜漸防萌則凶妖銷滅害除福凑矣夫壊岸破巖之水源自涓涓干雲蔽日之木起於䓤青禁微則易救末則難人莫不忽扵細微以致其大恩不忍誨義不忍割去事之後未然之明鏡也臣愚以為左官外附之臣依託權門傾覆謟䛕以求容媚者宜行一切之誅間者大将軍再出威振州郡莫不賦斂吏人遣使貢獻大将軍雖云不受而物不還主部署之吏無所畏憚縱行非法不伏罪辜故海内貪猾競為奸吏小民吁嗟怨氣滿腹臣聞天不可以不剛不剛則三光不明王不可以不彊不彊則宰牧縱横宜因大變改政救失以塞天意書奏十餘日帝以鴻行太尉兼衛尉屯南北宮扵是收竇憲大将軍印綬憲及諸弟皆自殺魯恭為司徒和帝末下令麥秋得案騐薄刑而州郡好以苛察為政因此遂盛夏斷獄恭上疏諫曰臣伏見詔書敬若天時憂念萬民為崇和氣罪非殊死且勿案騐進柔良退貪殘奉時令所以助仁徳順昊天致和氣利黎民者也舊制至立秋乃行薄刑自永元十五年以来改用孟夏而刺史太守不深惟憂民息事之原進良退殘之化因以盛夏徴召農人拘對考騐連滯無已司𨽻典司京師四方是則而近於春月分行諸部託言勞來貧人而無惻隠之實煩擾郡縣廉考非急逮捕一人罪延十數上逆時氣下傷農業案易五月姤用事經曰后以施令誥四方言君以夏至之日施命令止四方行者所以助微隂也行者尚止之況扵逮召考掠奪其時哉比年水旱傷稼人饑流冗今始夏百榖權輿陽氣胎養之時自三月以来隂寒不暖物當化變而不被和氣月令孟夏斷薄刑出輕繫行秋令則苦兩數来五榖不熟又曰仲夏挺重囚益其食行秋令則草木零落人傷于疫夫斷薄刑者謂其輕罪已正不欲令乆繫故時斷之也臣愚以為孟夏之制可從此令其決獄案考皆以立秋為斷以順時節育成萬物則天地以和刑罰以清矣張禹為太尉録尚書事時和帝遏密禹上言方諒闇密靜之時不宜依常有事扵苑囿其廣成上林空地宜且以假貧民鄧太后從之禹為太尉永初四年新野君病鄧太后母隂氏皇太后車駕幸其第禹與司徒夏勤司空張敏俱上表言新野君不安車駕連日宿止臣等誠竊惶懼臣聞王者動設先置止則交㦸清道而後行清室而後御離宮不宿所以重宿衛也陛下體蒸蒸之至孝親省方藥恩情發中乆處單外百官露止議者所不安宜且還宫上為宗廟社稷下為萬國子民比三上固爭乃還宫楊震永寜初為司徒安帝乳母王聖子女伯榮驕淫尤甚與故朝陽侯劉䕶從兄瓌交通遂以為妻得襲護爵位至侍中震深疾之詣闕上疏曰臣聞髙祖與羣臣約非功臣不得封故經制父死子繼兄亡弟繼以防簒也伏見詔書封故朝陽侯劉護再從兄瓌襲護爵為侯䕶同産弟威今猶見在臣聞天子專封封有功諸侯專爵爵有徳今瓌無他功行但以配阿母女一時之間既位侍中又至封侯不稽舊制不合經義行人諠譁百姓不安陛下宜覽鏡既徃順帝之則書奏不省延光中代劉愷為太尉詔遣使者大為阿母脩第中常侍樊豐及侍中周廣謝憚等更相扇動傾揺朝廷震復上疏曰臣聞古者九年耕必有三年之儲故堯遭洪水人無菜色臣伏念方今災害發起彌益滋甚百姓空虗不能自贍重以螟蝗羌虜鈔掠三邉震擾戰鬭之役至今未息兵甲軍糧不能復給大司農帑藏匱乏殆非社稷安寜之時伏見詔書為阿母興起津城門内第舍合兩為一連里竟街雕脩繕飾窮極巧伎今盛夏土王而攻山採石其大匠左校别部将作合數十處轉相迫促為費巨億周廣謝惲兄弟與國無肺腑枝葉之屬依倚近倖姦佞之人與樊豐王永等分威共權屬託州郡傾動大臣宰司辟召承望㫖意招来海内貪汚之人受其貨賂至有臧錮棄世之徒復得顯用白黒溷淆清濁同源天下讙譁咸曰財貨上流為朝結譏臣聞師言上之所取財盡則怨力盡則叛怨叛之人不可復使故曰百姓不足君誰與足惟陛下度之豐惲等見震連切諫不從無所顧忌遂詐作詔書調發司農錢榖大匠見徒材木各起家舍園池廬觀役費無數震因地震復上疏曰臣蒙恩備台輔不能奉宣政化調和隂陽去年十一月四日京師地動臣聞師言地者隂精當安靜承陽而今動揺者隂道盛也其日戊辰三者皆土位在中官此中臣近官盛扵持權用事之象也臣伏惟陛下以邉境未寜躬自菲薄宫殿垣屋傾倚枝柱而已無所興造欲令逺近咸知政化之清流商邑之翼翼也而親近倖臣未崇斷金驕溢踰法多請徒士盛脩第舍賣弄威福道路讙譁衆所聞見地動之變近在城郭殆為此發又冬無宿雪春節未雨百僚燋心而繕脩不止誠致旱之徴也書曰僭恒𤾉若臣無作威作福玉食惟陛下奮乾剛之徳棄驕奢之臣以掩訞言之口奉承皇天之戒無令威福乆移於下震前後所上轉有切至張皓順帝時為司空清河趙騰上言災變譏刺朝政章下有司收騰繫考所引黨軰八十餘人皆以誹謗當伏重法皓上疏諫曰臣聞堯舜立敢諫之鼓三王樹誹謗之木春秋採善書惡聖主不罪芻蕘騰等雖干上犯法所言本欲盡忠正諫如當誅戮天下杜口塞諫爭之源大非所以昭徳示後也帝悟减騰死罪一等餘皆司冦司冦二嵗刑也輸作司冦因以為名楊秉為太尉桓帝南廵園陵特詔秉從行至南陽左右竝通奸利詔書多所除拜秉上疏諫曰臣聞先王建國順天制官太微積星名為郎位入奉宿衛出牧百姓臯陶誡虞在於官人頃者道路拜除恩加豎𨽻爵以貨成化繇此敗所以俗夫巷議白駒逺逝穆穆清朝逺近莫觀宜割不忍之恩以斷求欲之路扵是詔除乃止陳蕃延熹八年為太尉中常侍蘇康管霸等復被任用遂排陷忠良共相阿媚大司農劉祐廷尉馮緄河南尹李膺皆以忤㫖為之抵罪蕃因朝㑹固理膺等請加原宥升之爵任言及反復誠辭懇切帝不聽因流涕而起時小黄門趙津南陽大猾張汜等奉事中官乗勢犯法二郡太守劉瓆成瑨考按其罪雖經赦令而竝竟考殺之宦官怨恚有司承㫖遂奏瓆瑨罪當棄市又山陽太守翟超没入中常侍侯覽財産東海相黄浮誅殺下邳令徐宣超浮竝坐髠鉗輸作左校蕃與司徒劉矩司空劉茂共諫請瓆瑨超浮等帝不悦有司劾奏之矩茂不敢復言蕃乃獨上疏曰臣聞齊桓脩霸務為内政春秋扵魯小惡必書宜先自整飭從以及人今冦賊在外四支之疾内政不理心腹之患臣寢不能寐食不能飽實憂左右日親忠言以疏内患漸積外難方深陛下超從列侯繼承天位小家畜産百萬之資子孫尚恥愧失其先業況乃産兼天下受之先帝而欲懈怠以自輕忽乎誠不愛已不當念先帝得之勤苦耶前梁氏五侯毒徧海内天啟聖意收而戮之天下之議冀當小平明鑒未逺覆車如昨而近習之權復相扇結小黄門趙津大猾張汜等肆行貪虐奸媚左右前太原太守劉瓆南陽太守成瑨紏而戮之雖言赦後不當誅殺原其誠心在乎去惡至扵陛下有何悁悁而小人道長熒惑聖聽遂使天威為之發怒如加刑譴已為過甚況乃重罰令伏歐刄乎又前山陽太守翟超東海相黄浮奉公不撓疾惡如讎超没侯覽財物浮誅徐宣之罪竝蒙刑坐不逢赦恕覽之從横没財已幸宣犯釁過死有餘辜昔丞相申屠嘉召責鄧通雒陽令董宣折辱公主而文帝從而請之光武加以重賞未聞二臣有專命之誅而今左右羣豎惡傷黨類妄相交搆致此刑譴聞臣是言當復嗁訴陛下深宜割塞近習豫政之言引納尚書朝省之事公卿大官五日一朝簡練清髙斥出佞邪如是天和扵上地洽於下休禎符瑞豈逺乎哉陛下雖厭毒臣言凡人主有自勉強敢以死陳帝得奏愈怒竟無所納朝廷衆庶莫不怨之九年李膺等以黨事下獄考實蕃因上疏極諫曰臣聞賢明之君委心輔佐亡國之主諱聞直辭故湯武雖聖而興於伊呂桀紂迷惑亡在失人繇此言之君為元首臣為股肱同體相須共成美惡者也伏見前司𨽻校尉李膺太僕杜密太尉掾范滂等正身無玷死心社稷以忠忤㫖横加考按或禁錮閉隔或死徙非所杜塞天下之口聾盲一世之人與秦焚書坑儒何以為異昔武王克殷表閭封墓今陛下臨政先誅忠賢遇善何薄待惡何優夫讒人似實巧言如簧使聽之者惑視之者昏夫吉凶之效存乎識善成敗之機在於察言人君者攝天地之政秉四海之維舉動不可以違聖法進退不可以離道規謬言出口則亂及八方何況髠無罪於獄殺無辜扵市乎昔禹廵狩蒼梧見市殺人下車而哭之曰萬方有罪在予一人故其興也勃焉又青徐炎旱五榖損傷民物流遷茹菽不足而宫女積於房掖國用盡扵羅紈外戚私門貪財受賂所謂禄去公室政在大夫昔春秋之末周徳衰微數十年間無復灾𤯝者天所棄也天之於漢悢悢無已故殷勤示變以悟陛下除妖去孽實在脩徳臣位列台司憂責深重不敢尸禄惜生坐觀成敗如䝉採録使身首分裂異門而出所不恨也帝諱其言切託以蕃辟召非其人遂䇿免之楊賜熹平五年為司徒時朝廷爵授多不以次而靈帝微行逰幸外苑賜上疏曰臣聞天生蒸民不能自理故立君長使司牧之是以唐虞競競業業周文日昃不暇明慎庶官俊乂在職三載考績以觀厥成而今所序用無他徳有形執者旬日累遷守貞之徒歴載不轉勞逸無别善惡同流北山之詩所為訓作又聞數微行出幸苑囿觀鷹犬之勢極盤遊之荒政事日墮大化陵遲陛下不顧二祖之勤止追慕五宗之美踪而欲以望太平是繇曲表而欲直景郤行而求及前人也宜絶傲慢之戲念官人之重割用板之恩慎貫魚之次無令醜女有四殆之歎遐邇有憤怨之聲臣受恩偏特忝任師傅不敢自同凡臣括囊避咎謹自手書密上後坐辟黨人免復拜光禄大夫光和年間以忤曹節等蔡邕坐直對抵罪徙朔方賜以師傅之恩故得免咎其冬行辟雍禮引賜為三老復拜少府光禄勲代劉郃為司徒帝欲造畢圭靈琨苑賜復上疏曰竊聞使者竝出規度城南人田欲以為苑昔先王造囿裁足以備三驅之禮薪莱芻牧皆悉徃焉先帝之制左開鴻池右作上林不奢不約以合禮中今猥規郊城之地以為苑囿壊沃衍廢田園驅居人畜禽獸殆非所謂若保赤子之義今城外之苑已有五六可以逞情意順四節也宜惟夏禹卑宫太宗露臺之意以慰下民之勞書奏帝欲止以問侍中任芝等以為無害遂令築苑冊府元龜卷三百二十五
