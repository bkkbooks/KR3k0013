body:
  text: 冊府元龜卷八百五十宋王欽若等撰總錄部器量才敏器量夫虚明之境葢動作之微機夷曠之懐實性情之懿範誠標準而無暇因陶冶之所成發於天資難以學致觀其夷險無變寵辱不驚酌之無倪隤然處順或蒙乎大難遂濟於成功或扇其髙風用敦於雅俗處澄撓而如一匪鑽仰之攸及則如大雅之度不亦逺哉嗟夫硜硜之徒何不相逮之甚也楚大夫令尹子文三仕為令尹無喜色三已之無慍色漢張安世為光禄勲郎有醉小便殿上主事白行法安世曰何以知其不反水漿邪反讀曰翻如何以小過成罪郎淫官婢婢兄自言安世曰奴以恚怒誣汚衣冠告署適奴適讀曰讁其隠人過失皆此類也後漢王丹為太子少傅客初有薦士於丹者因選舉之而後所舉者陷罪丹坐以免客慚懼自訟而丹終無所言尋復徴為太子太傅乃呼客曰君之自絶何量丹之薄也不如設食以罰之相待如舊宋則字元矩為鄢陵令有能名則子年十嵗與蒼頭共弩射蒼頭弦斷矢􅈭誤中之即死奴叩頭就誅則察而恕之潁川荀爽深以為美時人亦服焉劉寛字文饒𢎞農華隂人也歴典三郡温仁多恕後為太尉夫人欲試寛令恚伺當朝㑹装嚴已訖使侍婢奉肉羮翻汚朝衣婢遂伏之寛神色不異乃徐言曰羮爛汝手其性度如此海内稱為長者魏華歆漢末為豫章太守孫䇿略有揚州盛兵徇豫章一郡大恐官屬請出郊迎歆曰無然策稍進復白發兵又不聽及䇿至一府皆造閣請出避之乃笑曰今將自来何遽避之有頃門下白曰孫將軍至請見乃前與歆共坐談議良乆夜乃别去義士聞之皆歎息而自服也䇿遂親執子弟之禮禮為上賓許攸漢末為黄門侍郎董卓之亂攸與何顒圗謀殺董卓事垂就而覺為卓所收繫獄顒憂懼自殺攸言談飲食自若會卓死得免張既初為郡小吏功曹徐英嘗自鞭既三十英字伯濟馮翊著姓建安初為蒲阪令英性剛爽自見族氏勝既於鄉里名行在前加以前辱既貴顯不肯求於既既雖得志亦不顧計本原猶欲與英和嘗因醉欲親狎英英故意不納英繇此遂不復進用故時人善既不挾舊怨而壮英之不撓杜畿京兆人漢末為漢中府丞㑹天下大亂棄官客荆州畿少有大志在荆州數嵗繼母亡後以三輔開通負其母喪北歸道為賊所刼略衆人奔走畿獨不去賊射之畿請賊曰卿欲得財耳今我無物用射我何為邪賊乃止蜀費禕字文偉與汝南許叔龍南郡董允齊名時許靖喪子允與禕欲共㑹其𦵏所允白父和請車和遣開後鹿車給之允有難載之色禕便從前先上及至喪所諸葛亮及諸貴人悉集車乘甚鮮允猶神色未泰而禕晏然自若持車人還和問之知其如此乃謂允曰吾嘗疑汝於文偉優劣未别也而今而後吾意了矣先主立太子禕與允俱為舎人後至益州刺史開府吳顧雍自奉常領尚書令封陽遂鄉侯拜侯還寺而家人不知後聞乃驚晉嵇康恬静寡欲含垢匿瑕寛簡有大量王戎自言與康居山陽二十年未嘗見喜愠之色後為中散大夫王戎年六七嵗於宣武塲觀戲猛獸在檻中號吼震地衆皆奔走戎獨立不動神色自若魏明帝於閣上見而竒之後至司徒陳騫少日為夏侯𤣥所侮意色自若𤣥以此異之起家尚書郎後至太尉騫少有度量含垢匿瑕所在有績裴楷性寛厚與物無忤不持儉素每遊榮貴輒取其珍玩雖車馬器服宿昔之間便以施諸窮乏嘗營别宅其從兄衍見而悦之即以宅與衍梁趙二王國之近屬貴重當時楷嵗請二國租錢百萬以散親族人或譏之楷曰損有餘補不足天之道也安於毁譽其行已任率皆此類也後為侍中楷子瓚娶楊駿女然楷素輕駿與之不平駿既執政乃轉為衛尉遷太子少師優游無事黙如也及駿誅楷以婚親收付廷尉將加法是日事起倉卒誅戮縱横衆人為之震恐楷容色不變舉動自若索紙筆與親故書賴侍中傅祗救䕶得免猶坐去官劉昶字公榮為兖州刺史王戎與阮籍飲時公榮在坐籍以酒少酌不及昶昶無恨色戎異之他日問籍曰彼何如人也答曰有公榮不可不與飲若減公榮則不敢不共飲惟公榮可不與飲傅暢字世道年五嵗父友見而戲之解暢衣取其金環與侍者暢不之惜以此賞之年未弱冠甚有重名後為秘書丞庾敳為東海王越軍諮祭酒時劉輿見任於越人士多為所搆惟敳縱心事外無迹可間後以其性儉家富説越令就換錢千萬冀其有吝因此可乘越於衆坐中問敳頺然已醉幘墮機上以頭就穿取徐啟云下官家故有兩千萬隨公所取矣輿於是乃服越甚恱因曰不可以小人之慮度君子之心敳聚斂積實談者譏之都官從事温嶠奏之敳更器目嶠森森如千丈松雖礧砢多節施之大厦有棟梁之用郭奕為雍州刺史鷹揚將軍尋假奕幢曲蓋鼓吹奕有寡姉隨其之官姉下僮僕多有姦犯而為人所糾奕省按畢曰大丈夫豈當以老姉求名遂遣而不問焉劉伶嘗醉與俗人相忤其人攘臂奮拳而徃伶徐曰雞肋不足以安尊拳其人笑而止後為建威將軍王湛沖素簡淡器量隤然有公輔之望兄子濟輕之所食方丈盈前不以及湛湛命取菜蔬對而食之仕至汝南内史王承字安期湛子也為東海太守尋去官東渡江是時道路梗澁人懐危懼承毎遇艱險處之夷然雖家人近習不見其憂喜之色裴遐嘗在平東將軍周馥坐與人圍碁馥司馬行酒遐未即飲司馬醉怒因曵遐墮地遐徐起還坐顔色不變復碁如故其性虚和如此東海王越引為主簿劉疇字王喬少有美譽善談名理曾避亂塢壁賈胡百數欲害之疇無懼色援笳而吹之為出塞入塞之聲以動其游客之思於是羣胡皆垂泣而去之楊軻學業精微居長安中石季龍嗣偽位備𤣥纁束帛安車徵之軻以疾辭迫之乃發既見季龍不拜與語不言命舎之於永昌乙第其有司以軻倨傲請從大不敬論季龍不從下書任軻所尚軻在永昌季龍每有饋餼輒口授弟子使為表謝其文甚美覽者歎有深致季龍欲觀其真趣乃密令美女夜以動之軻肅然不顧又使人將其弟子盡行遣魁壮羯士衣甲持刀臨之以兵并竊其所賜衣服而去軻視而不言了無懼色嘗卧土床覆以布被裸寝其中下無茵褥潁川荀鋪好竒之士也造而談經軻暝目不答鋪發軻被露其形大笑之軻神體頺然無驚恐之状於時咸以為焦先之徒未有能量其深淺也後上疏陳鄉思求還季龍送以安車蒲輪蠲千户供之自歸秦州仍教授不絶郭文曠達不仕王導遣人迎之置於西園嘗賓共集絲竹並奏試使呼之文瞪眸不轉跨躡華堂如行林野於時坐者咸有鈎深味逺之言文嘗稱不達来語天機鏗宏莫有窺其門者庾彬者亮之子年數嵗雅量過人温嶠嘗隠暗怛之彬神色恬如也乃徐跪謂嶠曰君侯何至於此論者謂不減於亮彬史不載官王羲之為右軍將軍初太尉郗鑒使門生求女壻導令就東廂徧觀弟子門生歸謂鑒曰王氏諸少並佳然聞信至咸自矜持惟一人在東牀坦腹食獨若不聞鑒曰正此佳壻邪訪之乃羲之也遂以女妻之劉超為中書通事郎出為義興太守未幾徵拜中書侍郎拜受徃還朝廷莫有知者謝安嘗與孫綽等汎海風起浪湧諸人並懼安吟嘯自若舟人以安為悦猶去不止風轉急安徐曰如此將何歸耶舟人承言即迴衆人咸服其雅量及為吏部尚書中䕶軍簡文帝疾篤桓温上疏薦安宜受顧命帝晏駕温入赴山陵止新亭大陳兵衛將移晉室呼安及王坦之欲於坐害之坦之甚懼問計於安安神色不變曰晉祚存亡在此一行既見溫坦之流汗沾衣倒執手板安從容就席坐定謂温曰安聞諸侯有道守在四鄰明公何須壁後置人耶温笑曰正自不能不爾耳遂笑語移日坦之與安初齊名至是方知坦之之劣謝萬嘗與蔡系送客於征虜亭與系争言系推萬落牀冠帽傾脱萬徐拂衣就席神意自若坐定謂系曰卿幾壊我面系曰本不為卿面計然俱不以介意時亦以此稱之弱冠辟司徒椽後至豫州刺史王獻之嘗與兄徽之共在一室忽然火發徽之遽走不遑取履獻之神色恬然徐呼左右扶出夜卧齋中而有偷人入其室盜物都盡獻之徐曰偷兒青氊我家舊物可特置之羣盜驚走起家州主簿阮孚字遙集初祖約性好財孚性好屐同是累而未判其得失有詣約正見料財物客至屏當不盡餘兩小簏以着背後傾身障之意未能平或有詣阮正見自蠟屐因自歎曰未知一生當著幾量屐神色甚閒暢於是勝負始分孚後為侍中謝鯤字㓜輿惠帝永興中長沙王乂入輔政時有疾鯤者言將出奔乂欲鞭之鯤解衣就罸曾無忤容既捨之又無喜色太傅東海王越聞其名辟為掾任達不拘尋坐家僮取官槖除名於時名士王𤣥阮脩之徒並以鯤初登相府便至黜辱為之歎恨鯤聞之方清歌鼔琴不以屑意莫不服其逺暢而恬於榮辱桓石秀為江州刺史嘗從叔文冲獵登九井山徒旅甚盛觀之者傾坐石秀未嘗屬目止嘯詠而已前秦王猛懐姿雋偉博學好兵書謹重嚴毅器度雄逺細事不干其慮自不參其神契略不與交通是以浮華之士咸輕而笑之猛攸然自得不以屑懐後至丞相司徒宋羊欣起家輔國參軍府解還家晉隆安中朝廷漸亂欣優游私門不復進仕㑹嵇王世子元顯每使欣書扇辭不奉命元顯怒乃以為其後軍府舎人此職本用寒人欣意貌恬然不以髙卑見色論者稱焉王惠為征虜長史㓜而夷簡嘗臨曲水風雨暴至坐者皆馳散惠徐起姿致不異常日謝𢎞微從叔峻無後以𢎞微為嗣安帝義熙初襲峻爵建昌縣侯𢎞微家素貧儉而所係豐泰惟受書數千卷國史數人而已遺財祿秩一不闗預叔父混聞而驚歎謂國郎中令漆凱之曰建昌國祿本應與北舎共之國侯既不屑意今可依常分送𢎞微重違混言乃少有所受後至侍中劉秀之年十歲許與諸兒戯於前渚忽有大蛇来勢甚猛莫不顛沛驚呼秀之獨不動衆並異焉後為安北將軍雍州刺史南齊褚淵父湛之尚宋文帝女南郡公主湛之卒淵悉推與弟澄兩厨寳物在淵所生郭氏間嫡母吳郡王求之郭欲不與淵曰但令淵在何患無物猶不許淵流涕固請乃從之淵和雅有器度不妄舉動宅嘗失火煙焰甚逼左右驚擾淵神色怡然索轝徐去後至司徒蕭惠基為黄門郎善隸書及變棊太祖與之情好相得早相器遇桂陽之役惠基姊為休範妃太祖謂之曰卿家桂陽遂復作賊太祖頓新亭壘以惠基為軍副惠基弟惠郎親為休範攻戰惠基在城内了不自疑出為豫章太守還為吏部郎中袁粲劉秉起兵夕太祖以秉惠基妹夫時直在侍中省遣王敬則觀言指趣見惠基安靜不與秉相知繇是益加恩信張緒清簡寡欲及為尚書倉部郎都令史詳郡縣米事緒蕭然直視都不以經意王敬則為吳興太守出行從市過見屠肉枅歎曰吳興昔無此枅是我少時在此作也張融為封溪令廣越嶂嶮獠賊執融將殺食之融神色不動方作雒生詠賊異之而不害也謝瀹為吏部尚書高宗廢鬱林領兵入殿左右驚走報瀹瀹與客圍碁每下子輒云其當有意竟局乃還齋卧竟不問外事也王騫太尉儉之子為黄門郎司徒右長史性凝簡不狎當世嘗從容謂諸子曰吾家門户所謂素族自可隨流平進不須茍求也宋吕僧珎南兖州人為本州刺史姊適于氏住在市西小屋臨路與列肆雜僧珎嘗導從鹵簿到其宅不以為恥羊侃為都官尚書嘗南還至􅀈口有客張孺才醉於船林中失火燒七十餘艘金帛不可勝數侃不恚意孺才慚懼逃匿侃慰諭如舊張率仕至新安太守博奕嗜酒事寛度於家務尤忘懷在新安遣家僮載米三千石還吳宅旣至遂耗大半率問其故答曰雀䑕耗也率笑而言曰壯哉雀鼠竟不研問王泰㓜敏悟既長通和温雅淡人罕見其喜愠之色官至吏部尚書劉孺幼聰敏既長美風彩性通和雖家人罕見其喜愠官至吏部尚書後梁宋如周南陽人有才學容止詳雅以府僚隨宣帝厯黄門散騎嘗有訴事於如周謂為經如作州官也乃曰某有屈滯故来訴如州官如周曰爾何小人敢呼我名其人慙謝曰祇言如州官作如周不知如州官名如周早知如州官名如周不敢喚如州官作如周如周乃笑曰令卿自責見侮反深衆咸服其寛雅梁蕭引方正有器局為西昌侯儀同主簿引以侯景之亂奔嶺表時始興人歐陽頠為衡州刺史引徃依焉頠後官為廣州病死子紇領其衆引毎疑紇有異因事規正繇是情禮漸疎及紇舉兵反時京都士人岑之敬公孫挺等並皆惶駭惟引恬然謂之敬等曰管幼安袁曜卿亦但安耳君子正身以明道直己以行義亦復何憂懼乎後至建康令後魏甄琛為陽平王衛軍府長史時母極令崔康為衛軍府錄事參軍因公事言競之間康以拳擊琛墜於牀下琛以本縣長笑而不論髙允為尚書散騎常侍中黄門蘇興夀嘗云共允按事三年未嘗見其怒色崔挺為光州刺史北海王祥為司徒錄尚書事以挺為司馬挺固辭不免世人皆歎其屈而挺處之夷然崔光為侍中少有大度喜怒不見於色有毁惡之者必善言以報之雖見誣謗終不自申曲直溫子昇為正員外郎兼中書舎人荘帝殺爾朱榮也子昇預謀當時赦詔子昇詞也榮入内遇子昇把詔書問是何文書子昇顔色不變曰勅榮不視之北齊王晞為太子太傅時百官嘗賜射晞中的當得絹為不書箭有司不與晞陶陶然曰我今可謂武有餘文不足矣後周趙善性後魏文帝大統三年轉左僕射兼侍中監著作領太子詹事善性溫恭有器局雖位居端右而愈自謙退其職務克舉則曰某官之力若有罪責則曰善性之咎也時人稱其有公輔之量隋栁機初仕周與族人文成公昻俱歴顯要開皇中並為外職楊素時為納言方用事因文帝賜宴素戲曰二栁俱摧孤楊獨聳坐者歡笑機竟無言官至冀州刺史李士謙初為魏廣平開府參軍後厯周隋不復仕官其奴嘗與鄉人董震因醉角力震扼其喉斃於手下震惶懼請罪士謙謂之曰卿本無殺心何為相謝然可逺去無為吏之所拘性寛厚皆此類也又毎以賑施為務至春出糧種分給貧乏趙郡農民徳之撫其子孫曰此乃李參軍遺惠也或謂士謙曰子多隂徳士謙曰所謂隂徳者何猶耳鳴已獨聞之人無知者今吾所作吾子皆知何隂徳之有唐王珪貞觀中厯侍中禮部尚書性寛裕不尚苛察其於官事務舉綱維禁姦枉去甚泰而已於僕妾亦不見喜怒之容戴至徳髙宗朝為僕射與劉仁軌更日受訟詞嘗有老母經省陳詞至徳以收牒省視老母前曰本謂是解事僕射請卻付牒来至徳笑而還議之者尤稱其長者焉蘇良嗣為雒州長史以妻妹犯贓左遷冀州刺史妻妹事釋詣良嗣初無恨色謂之曰牧守遷轉是常不聞所累也裴行儉為尚書聞喜縣公嘗令醫人合藥請犀角麝香送者誤遺失已而惶懼潛竄又有勅賜馬及新安令史輒馳馬驟倒鞍破令史亦逃行儉並委所親招到謂曰爾曹豈相輕耶皆錯誤耳待之如故初平都支遮匐大獲瓌寳番酋將士願觀之行儉因宴設徧出厯示有瑪瑙盤廣二尺餘文彩殊絶軍吏王休烈捧盤厯階趨進誤躡衣足跌便倒盤亦隨碎休烈驚惶叩頭流血行儉笑而謂曰爾非故也何至於是不形顔色魏元忠為雒陽令陷周興獄詣市將刑則天以元忠有討平敬業功特免死配流貴州時承勅者將至市先令傳呼監刑者遽釋元忠令起元忠曰未知勅虚實豈可造次徐待宣勅然後起謝觀者咸歎其臨刑而神色不撓李勉為江西觀察使部人有父病以蠱道為木偶人署勉名位瘞於其壠或發以告曰為父禳災亦可矜也捨之王播為殿中歴侍御史貞元末幸臣李實為京兆尹恃㤙頗横嘗遇播於途不避故事尹避臺官播移文詆之實怒後奏播為三原令欲挫之播受命趣府詣謝盡府縣之儀歸登寛博容物嘗使僮飼馬馬蹄之僮怒擊折馬足登知而不責晚年頗好服食有饋金石之藥者且云嘗之矣登服之不疑藥發毒幾死方訊之云未之嘗也他人為之怒登視之無愠色嘗慕陸象先為人議者亦以為近之後卒於工部尚書劉濟為范陽節度使少異常童居室焚人皆驚救而濟從容出户衆甚異之晉姚顗少惷敦厚靡事容貌任其自然流輩未之重惟中條山司空圖唐季之名士也深器之以女妻焉顗性仁恕多為僕妾所欺心亦察之而不能面折終身無喜怒不知錢百之為陌音伯黍百之為銖凡家人市貨百物入増其倍出減其半不詢其繇無擔石之儲心不隕穫顗終户部尚書桑維翰少時所居嘗有魑魅家人常畏之維翰徃往被竊其衣撮其巾櫛而未嘗改容官至中書令翟光鄴有器度愼密敦厚出於天然喜慍不形於色仕至樞密副使鄭仁誨髙祖時為樞密使仁誨幼事唐驍將陳紹光恃勇使酒嘗乘醉抽佩劍將剸刃於仁誨左右無不奔避惟仁誨端立以俟畧無懼色紹光因擲劒於地謂仁誨曰汝有此器度必當享人間富貴及紹光典郡仁誨累為右職周薛仁謙初仕後唐為通事舍人隨荘宗入汴仁謙有舊第為梁朝六宅使李賓所據時賓逺適而仁謙復得其第人且告賓之家屬厚藏金帛在其第内仁謙立命賓親族盡出所藏而後入焉論者美之才敏昔人有言曰人所以尚干將鏌邪者貴於立斷也所以尚騏驥者為其立志也若夫五材鍾秀大雅旁達神幾内照符采外發在心為志出言有章故能為時輩之所推應公家之所用或凴几口占舉筆便就文無加㸃有同宿構固可謂敏則有功者矣其於抒情藻思競竒角勝刻燭為限如流不竭以自衒鬻者亦何代無其人哉漢陳遵為河南太守既至官嘗遣從吏西召善書吏十人於前治私書謝京師故人遵馮几口占書吏且省官事占隠度也占吏隠其辭以授也書數百封親屬各有意河南大驚又云遵略渉傳記贍於文辭􅒏善書與人尺牘主皆藏去後漢禰衡少有才辯至荆州劉表及荆州士大夫甚賓禮之文章言議非衡不定表嘗與諸文人共草章奏竝極其才思時衡出還見文開省未周因毁以抵地抵擲也表憮然為駭憮然怪之也衡乃求筆札須臾立成辭義可觀表大恱益重之黄祖子射大㑹賓客人有獻鸚鵡者射舉巵於衡曰願先生賦之以娛嘉賓衡攬筆而作文無加㸃辭采甚麗魏王粲善屬文舉筆便成無所改定以為宿構然正復精意覃思亦無加也著書賦議論垂六十篇官至侍中徐幹總識洽聞操翰成章為五官將文學蜀費禕使吳大帝嘗饗禕禕停食餅索筆作麥賦諸葛恪亦請筆作磨賦咸稱善焉官至大將軍晉阮籍為步兵校尉初文帝譲九錫公卿將勸進使籍為辭籍沈醉忘作臨詣府使取之見籍方據案醉眠使者以告籍便書案使寫之無所改竄辭甚清壮為時所重孫惠為東海王越記室專掌文疏復補司空從事中郎越誅周穆等夜召參軍王廙造表戰懼壞數紙不成時惠不在越歎曰孫中郎在表久就矣越遷太傅以惠為軍諮祭酒數諮訪得失每造書檄越或驛馬催之應命立成皆有文彩嵇含為郎中𢎞農王粹以貴公子尚主館宇甚盛圗荘周於室廣集朝士使含為之讚含援筆為弔文文不加㸃陶侃為荆州刺史逺近書疏莫不手答筆翰如流袁宏為大司馬桓温府記室温重其文筆専總書記後為東征賦賦末列稱過江諸名徳而獨不載桓􅂜時伏滔先在溫府又與宏善苦諫之宏笑而不荅溫知之甚忿而憚宏一時文宗不欲令人顯問後游青山飲歸命宏同載衆為之懼行數里問宏云聞君作東征賦多稱先賢何故不及家君宏荅曰尊公稱謂非下官敢專既未遑啟不敢顯之耳温慮不實乃曰君欲為何辭宏即荅云風鑒散朗或援或引身雖可亡道不可殞宜城之節信義為允温泫然而止宏賦又不及陶侃侃子胡奴嘗於曲室抽刄問宏曰家公勲跡如此君賦云何相忽宏窘急荅曰我已盛述尊公何乃言無因曰精金百汰在割能斷功以濟時職思静亂長沙之勲為史所贊胡奴乃止宋劉穆之初為髙祖太尉主簿穆之與朱齡石並便尺牘嘗於髙祖坐與齡石答書自旦至日中穆之得百函齡石得八十函而穆之應對無廢也王曇首為晉瑯琊王大司馬屬從髙祖北征行至彰城髙祖大㑹戲馬臺預坐者皆賦詩曇首文先成髙祖覽讀因問曇首兄𢎞曰卿弟何如卿𢎞答曰若但如下官門户何寄髙祖大竒之南齊張融為封溪令浮海至交州於海中作海賦融文辭詭激獨與衆異後還京師以示鎮軍將軍顧凱之凱之曰卿此賦實超𤣥虚但恨不道鹽耳融即求筆註之曰漉沙搆白熬波出素積雪中春飛霜暑露此四句後所足也謝朓為隋王子隆文學子隆在荆州朓因事求還除新安王中軍記室朓牋辭子隆曰朓聞潢汙之水思朝宗而毎竭駑蹇之乘希沃若而中疲何則臯壤搖落對之惆悵岐路東西或以嗚唈况乃服義徒擁歸志莫從邈若墜雨飄以秋蒂朓實庸流行能無算屬天地休明山川受納褒採一介搜揚小善故得捨耒埸圃奉筆兔園東汎三江西浮七澤契濶戎旃從容燕語長裾日曳後乘載脂榮立府廷恩加顔色沐髪晞陽未測涯涘撫臆論報早誓肌骨不悟滄溟未運波臣自蕩渤澥方春旅翮先謝清切藩房寂寥舊篳輕舟反沂弔影獨留白雲在天龍門不見去徳滋永思徳滋深惟待清江可望候歸艎於春渚朱邸方開效蓬心於秋實如其簪屨或存衽席無改雖復身填溝壑猶望妻子知歸攬涕告辭悲来横集時荆州信去倚待朓執筆成文無㸃易蕭文琰蘭陵人丘令楷吳興人江洪濟陽人竟陵王子良嘗夜集學士刻燭為詩四韻者則刻一寸以此為率文琰曰頓燒一寸燭而成四韻詩何難之有乃與令楷江洪等共打銅鉢立韻響滅則詩成皆可觀梁范雲字彦龍少機警有識具善屬文便尺牘下筆輒成未嘗定藁時人毎疑其宿構後至右僕射劉之遴南陽湼陽人舉茂才為太學博士任昉見而異之張稷新除尚書僕射托昉為讓表昉令之遴代作操筆立成昉曰荆南秀氣果有異才後仕必當過僕庾肩吾善屬文及宋子仙破㑹稽購得肩吾欲殺之先謂曰吾聞汝能作詩今可即作若將貸汝命肩吾操筆便成辭采甚美後至散騎常侍中書令陳顧野王吳郡人為梁臨賀王府記室參軍丁憂歸本郡侯景之亂郡將袁君正舉兵赴援文檄皆以委之口占便就未嘗立草趙知禮天水人髙祖之討元景仲也引為記室知禮為文贍速毎占授下筆便就沈不害為通直散騎兼尚書左丞不害治經術善屬文雖博綜墳典而家無卷軸毎製文操筆立成曾無尋撿僕射周𢎞正嘗稱之曰沈生可謂意合聖人乎蕭景厯初仕隋為海陽令侯景之亂客逰京口侯景平髙祖鎮朱方素聞其名以書要之景厯對使人答書筆不停綴文不重改曰蒙降札書曲垂引逮伏覩循逾載深欣暢竊以世求名駿行地能致千里時愛竒寳炤車遂有徑寸但雲咸斯奏自輟巴渝杞梓方彫豈盻樗櫟仰惟明將軍使君侯節下英才挺茂雄姿秀抜運屬時艱志排多難旅衡嶽而綏五嶺滌湘源而派九流帶甲十萬强弩數千誓勤王之師總義夫之力鯨鯢式翦役不踰時氛霧廓清士無血刄雖漢誅祿産舉朝定賴絳侯晉討約峻中外一資陶牧比事論功彼奚足算加以抗威兖服冠蓋通於北門整斾徐方詠歌溢於東道能使邊亭卧鼓行旅露宿巷不拾遺市無異價洋洋乎功徳政化曠古未儔諒非膚淺所能殫述是以天下之人向風慕義接踵披衿雜遝而至矣或帝室英賢貴游令望齊楚秀異荆吳岐嶷武夫則猛氣紛紜雄心四據陸㧞山嶽水斷虬龍六鈞之弓左右馳射萬人之劍短兵交接攻壘若文鴦焚艦如黄葢百戰百勝貔貅為羣文人則通儒偉器雕麗暉煥摛掞絢藻子雲不能抗其筆元瑜無以髙其記尺翰馳而聊城下清談奮而羸軍却復有三河辯客改哀樂於須臾六竒謀士斷變反於倐忽治民如子賤踐境有成折獄如仲由片辭從理直言如毛遂能挫主威御史若相如不辱君命懐仁抱義感恩徇已誠斷黄金精貫白日海内雄賢牢籠斯備明將軍徹鞍下馬推案上食申爵以榮之築館以安之輕財重器卑躬厚士盛矣哉抑又聞之戰國將相咸推引賓游中代嶽牧不盛延僚友濟濟多士所以成將軍之貴俱量能㧞實稱才任使圎行方止各盡其宜受委責成誰不畢力至如走賤意庸人耳秋冬讀書終慙專學刀筆為吏竟闕異籌衡門衰素無所聞達薄官輕資焉能逺大自陽九遘屯天步難阻同彼貴仕溺於巨冦亟鄰危殆備踐薄冰今王道中興殷憂啟運獲存微命足為幸甚方欣飲啄是謂来蘇然皇鑾未及宛雒蕪曠四壁固三軍之餘長憂無半菽之産遨遊故人聊為借貸屬此樂土洵美忘歸切服髙義慙謁門下明將軍隆以顔色二三士友假其餘論菅蒯不棄折簡賜留欲以鷄鶩厠鴛鴻於池沼将移瓦礫參金碧之聲價昔折脇遊秦忽逢盻採擔登入趙便致留連今雖羈旅方之非逺丘林之賁何用克堪但眇眇纎蘿慿喬松以自聳蠢蠢輕蚋託驂尾而逺鶩切不自涯願備下走且為腹背之毛脱充鳴吠之數増勞改觀為幸已多海不厭深山不讓高敢布心腹惟將軍覽焉高祖得書甚加欽賞即日授記室参軍及武帝將討王僧辯獨與侯安都等數人謀之景歴弗之知部分既畢召令草檄景歴援筆立成辭義感激事皆稱旨後魏高閭字閻士漁陽雍奴人早孤少好學博綜經史文才雋偉下筆成章後至散騎常侍吏部尚書李苗解鼓琴好文詠史牘之敏當世罕及後至通直散騎常侍祖瑩為尚書三公郎尚書令王肅曽於省中詠悲平城詩云悲平城驅馬入雲中隂山嘗晦雪荒松無罷風彭城王勰甚歎其美欲使肅更詠乃失語云王公吟詠情性聲律俱佳可更為誦悲彭城詩肅因戲勰云何意悲平城而悲彭城也勰有慙色瑩在座即云亦有悲彭城王公自未見爾肅云可為誦之瑩應聲云悲彭城四面楚歌起屍積石梁亭血流雎水裏肅甚嗟賞之勰亦大悦退謂瑩曰卿定是神口今日若不得卿幾為吳子所屈邢邵文章典麗既贍且速為著作佐郎深為領軍元乂所禮乂新遷尚書令李神雋與袁翻在席乂令邵作謝表須臾便就以示諸賓神雋曰邢邵此表足使袁公變色北齊孫搴為行臺郎以文才著稱時孫騰以宗情薦之未被知也㑹武帝西討登風陵令中外府司馬李義深相府城局李士畧共作檄文二人皆辭請以搴自代帝引搴入帳自為搴吹火催促之搴援筆立成其文甚美帝大悦即署相府主簿專典文筆陸卭為中書侍郎兼太子洗馬自梁魏通和嵗有交聘卭每兼官讌按在席賦詩援筆先成雖未能盡工以敏速見美後周盧柔初為文帝從事中郎蘇綽掌機密時沙苑之後大軍屢㨗汝穎之間多舉兵来附書翰徃反日百餘牒柔随機報答皆合事宜宗懍初仕梁為元帝荆州記室嘗夕被召宿乃使製襲川廟碑一夜便就詰朝呈上帝歎美之隋李徳林初在北齊任城王湝薦徳林於尚書令楊遵彦遵彦即命徳林製讓尚書令表援筆立成不加治㸃因大相賞異後為髙祖丞相府屬未幾而三方亂軍書羽檄朝夕填委一日之中動逾百數或機速競發口授數人文意百端不加治㸃杜正𤣥開皇末舉秀才尚書試方畧正𤣥應對如響下筆成章僕射楊素負才傲物正𤣥抗詞酧對無所屈撓素甚不悦久之㑹林邑獻白鸚鵡素促召𤣥使者相望及至即令作賦正𤣥倉卒之際援筆成章素見文不加㸃始異之因令更擬諸雜文筆十有餘條又皆立成而辭理華贍素乃歎曰此真秀才吾不及之也唐岑文本性沈敏善屬文其父之象隋邯鄲令坐事不得申文本詣司𨽻稱寃時年十四辭情甚切占對閒雅人皆異之令作蓮花賦下筆便就合臺嗟賞其父竟雪由是知名後為中書令賀知章以秘書監歸晚年尤縦無復規檢自號四明狂客又稱秘書外監遨遊里巷醉後屬詞動成卷軸文不加㸃咸有可觀孫逖幼而英俊文思敏速始年十五謁雍州長史崔日用日用小之令為土火爐賦握翰即成辭理典贍日用覽之駭然遂為㤀年之交後為中書舎人韓臯字仲聞父滉檢校左僕射平章事臯為考功員外郎丁父艱徳宗遣中人就第慰問仍宣令論譔滉之事業臯號泣承命立草數千言徳宗嘉之張涉河中人早以經學為儒官嘗日試萬言故人呼為張萬言後至散騎常侍冊府元龜卷八百五十
