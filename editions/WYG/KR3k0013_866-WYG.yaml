body:
  text: 册府元龜卷八百六十六宋王欽若等撰總錄部貴盛夫貴者人心之所欲爵者天下之逹尊茍富貴之來固必有甚盛者矣乃有勲績隆茂忠規篤厚遭遇時運因緣戚里繇至行而積慶用儒術而起家以至父子同封昆弟並寵棨㦸駢列珪組交映持衡擁旄者數人鐘鳴鼎食者累世非夫守泰盛之戒懐招損之懼寵而思降蒲而不溢者孰克保世而善終乎哉秦蒙恬大父驁事昭王至上卿父武為秦裨將軍恬為内史將三十萬衆北逐戎狄威振匈奴始皇甚尊寵蒙氏信任賢之而親近恬弟毅至上卿出則叅乘入則御前恬任外事而毅嘗為内謀名為忠信故雖諸將相莫敢與之爭焉李斯楚上蔡人也為秦丞相斯長男繇為三川守諸男皆尚秦公主女悉嫁秦諸公子三川守告歸咸陽李斯置酒於家百官長皆前為壽門庭車騎以千數李斯喟然而嘆曰嗟乎吾聞之荀卿曰物禁太盛夫斯乃上蔡布衣閭巷之黔首上不知其駑下遂擢至此當今人臣之位無居臣上者可謂富貴極矣物極則衰吾未知所税駕也漢石奮為諸侯相四子官至二千石於是景帝曰石君及四子皆二千石人臣尊寵乃舉集其門凡號奮為萬石君鄭當時為大司農昆弟以當時故至二千石者六七人公孫賀為丞相賀子敬聲代賀為太僕父子並居公卿位楊惲丞相敞子為諸吏光祿勲惲家方全盛時乘朱輪者十人司馬安四至九卿昆弟以安故同時至二千石十人霍光驃騎將軍去病弟也為大將軍封博陸侯自昭帝時光子禹及兄弟雲皆中郎將雲弟山奉車都尉侍中領胡越兵光兩家壻為東西宮衛尉兄弟諸壻外孫皆奉朝請為諸曹大夫騎都尉給事中宣帝時光薨拜禹為左將軍嗣博陸侯封山為樂平侯以奉車都尉領尚書事封雲為冠陽侯張安世父湯為御史大夫安世後為大司馬車騎將軍領尚書事封富平侯子延壽為左曹太僕安世兄賀無子安世小子彭祖宣帝封彭祖為陽都侯又封賀孤孫覇為闗内侯安世以父封侯在位太盛乃辭祿詔都内别藏張安世無名錢以百萬數都内内藏官也安世以還官官不簿也安世孫臨尚敬武公主安世子孫相繼自宣元以來為侍中中常侍諸曹散騎列校尉者凡十餘人功臣之世子有金氏張氏親近寵貴比於外戚金日磾為光祿大夫封秺侯日磾兩子賞建俱侍中與昭帝畧同年共卧起賞為奉車建駙馬都尉日磾弟倫為黄門侍郎早卒倫後嗣盛子安上為建章衛尉封為都成侯安上四子常敞岑明岑明皆為諸曹中郎將常光祿大夫敞衛尉敞死成帝拜敞子左曹渉為侍中使待幸綠車載送衛尉舍幸綠車當直右以待召載皇孫令遣渉歸以皇孫車載之以示寵之漢注緑車名皇孫車渉弟叅哀帝時為東海太守叅弟饒越騎校尉渉兩子湯融皆侍中諸曹將大夫將亦謂中郎將也渉之從父弟欽為大中大夫給事中欽從父弟遷為尚書令兄弟用事欽後封都成侯欽弟遵封侯歴九卿位日磾傳國後嗣七世内侍何其盛也嚴延年東海人為河南尹延年兄弟五人皆有吏材至大官東海號延年母曰萬石嚴嫗一門五二千石故總為萬石辛慶忌為左將軍長子通為䕶羌校尉中子遵函谷闗都尉少子茂水衡都尉出為郡守皆有將帥之風宗族支屬至二千石一十餘人馮楊宣帝時為𢎞農太守有八子皆為二千石趙魏間榮之號曰萬石君杜延年御史大夫周子也延年後為御史大夫封建平侯延年薨子紱嗣紱六弟五人至大官少弟熊歴五郡二千石三州牧刺史有能名惟中弟欽官不至而最知名欽子及昆弟支屬至二千石者且十人韋賢子𤣥成並丞相宗族至二千石者十餘人史丹有子男女二十人九男皆以丹任並為侍中諸曹親近在左右史氏凡四人侯至卿大夫二千石者十餘人皆訖王莽乃絶王禁元后父也封陽平侯禁子鳳嗣侯崇安成侯譚平阿侯商成都侯立紅陽侯逄時高平侯根曲陽侯音安陽侯莽新都侯譚商立逄時根五人同日封謂之五侯榮貴絶代王家凡十侯五大司馬外戚莫盛焉後漢竇融扶風人更始初為張掖屬國都尉光武建武八年封融為安豐侯弟友為顯親侯及隴蜀平詔融與五郡太守奏事京師官屬賓客相隨駕乘千餘兩馬牛羊被野融到詣雒陽城門上凉州牧張掖屬國都尉安豐侯印綬詔遣使者還侯印綬引見就諸侯位賞賜恩寵傾動京師又加特進代陰興行衛尉事特進如故又兼領將作大匠弟友為城門校尉兄弟並典禁兵融長子穆尚内王公主代友為城門校尉穆子勲尚東海恭王彊女泚陽公主友子固亦尚光武女湼陽公主顯宗卽位以融從兄子林為䕶羌校尉竇氏一公兩侯三公主四二千石皆相與並時自祖及孫官府邸第相望京邑奴婢以千數於親戚功臣中莫與為比鄧禹封高密侯為太傅永平元年薨明帝分禹封三國長子震為高密侯襲為昌安侯珍為夷安侯禹少子鴻爲度遼將軍行車騎將軍震子乾尚明帝女沁水公主乾孫褒尚安帝妹舞隂公主襲子藩亦尚明帝女平臯長公主禹第六子訓為張掖太守䕶羌校尉訓子騭車騎將軍儀同三司悝虎賁中郎將𢎞閶皆侍中騭封上蔡侯悝葉侯𢎞西平侯閶西華侯食邑各萬户鄧氏自中興後累世寵貴凡侯者二十九人公二人大將軍以下十三人中二千石十四人列校二十二人州牧郡守四十八人其餘侍中將大夫郎謁者不可勝數東京莫與為比耿况封牟平侯子弇封好畤侯為建威大將軍况病弇兄弟六人皆垂青紫省侍醫藥當代以為榮耿氏自中興已後迄建安之末大將軍二人將軍九人卿十三人尚公主三人列侯十九人中郎將䕶羌校尉及刺史二千石數十百人馬援三兄况余員並有才能王莽時皆為二千石况河南太守余中壘校尉貟増山連率後援為伏波將軍援子廖章帝初為衛尉封順陽侯子豫為歩兵校尉廖弟防為車騎將軍城門校尉防貴寵最盛於九卿絶席防弟光為執金吾防兄弟貴盛賓客奔凑後光為太僕子康為侍中援兄子嚴章帝初為御史中丞子鱄為郎魯恭為司徒建武十五年從廵狩南陽除子撫為郎中賜駙馬從駕時弟丕亦為侍中兄弟父子並列朝廷恭世吏二千石鄧晨字偉卿南陽新野人也世吏二千石東觀漢記曰晨曽祖父隆揚州刺史祖父勲交阯刺史何敞扶風人其先修生成為漢膠東相成生果為大中大夫果生比干為丹陽侯比干生壽蜀郡太守壽生顯京輔都尉顯生鄢光祿大夫鄢生寵濟南都尉寵生敞為汝南太守徵為五官中郎將趙典為長樂少府衛尉父戒為太尉兄子謙謙弟温相繼為三公宗資為南陽太守家代為漢將相名臣羊續字興祖為南陽太守其先七世二千石卿校祖父侵安帝時司𨽻校尉耿純為東郡太守純宗族封列侯者四人闗内侯者三人為二千石者九人法雄齊襄王法章之後為南郡太守宣帝時徙三輔世為二千石秦彭自漢興之後世位相承六世祖襲為潁川太守與羣從同時為二千石者五人故三輔號曰萬石秦氏彭亦終潁川太守蓋勲為潁川太守勲家世二千石曾祖父進漢陽太守祖父彪大司農父字思齊官至安定屬國都尉郭禧靈帝建寧二年為太尉禧子鴻至司𨽻校尉封城安鄕侯郭氏自𢎞後數世皆傳法律子孫至公者一人廷尉七人侯者三人刺史二千石侍中郎將者二十餘人侍御史正監平者甚衆應順為將作大匠子疊江夏太守疊生彬武陵太守彬生奉從事中郎奉生邵車騎將軍掾邵弟珣司空掾珣子瑒曹操辟為丞相掾順至瑒七世通顯瑒弟璩侍中自漢至魏軒冕相襲為郡盛族璩子貞音散騎常侍貞弟子詹鎭南大將軍江州刺史李章字第公河内懐人也五世二千石尹勲家世衣冠伯父睦為司徒兄頌為太尉宗族多居貴位者而勲獨持清操不以地勢尚人孔昱七世祖覇成帝時歴九卿封褒成侯自覇至昱爵位相係其卿相牧守五十三人列侯七人周燕汝南人為郡吏曹太守杜殺人燕代受罪不食而死有五子皆至刺史太守魏夏侯惇為大將軍封高安鄉侯惇卒子充嗣又帝追思惇功欲使子孫畢侯分惇邑千户賜惇七子二孫爵皆闗内侯惇弟亷及惇中子楙素自封列侯惇從弟淵為征西將軍封博昌亭侯弟淵妻太祖内妹長子衡尚太祖弟女封安寧亭侯黄初中賜淵中子覇太和中賜覇四弟爵皆闗内侯覇弟威官至兖州刺史威弟惠樂安太守惠弟和河南尹威子駿并州刺史次莊淮南太守莊子湛以才博文章至南陽相散騎常侍莊晉景陽皇后姊夫也繇此一門侈盛於時陳紀為鴻臚紀子羣為司空羣子泰為尚書左僕射紀弟諶孫佐官至青州刺史佐弟坦為廷尉佐子凖為太尉封廣陵郡公凖弟戴徵及從弟堪並至大位凖孫逵字林道有譽江左為西中郎將追贈衞將軍王凌為征東將軍假節都督揚州諸軍事是時凌外甥令狐愚以才能為兖州刺史屯平阿舅甥並典兵專淮南之重劉邠本名炎犯晉太祖諱改為邠位至太僕子粹字純嘏侍中次宏字終嘏太常次潢字冲嘏光䘵大夫清冲有貴識名亞樂廣宏子咸徐州刺史次耽晉陵太守耽子惔字真長尹丹陽為中興名士也吳士爕為交阯太守兄弟並為列郡雄長一州偏在萬里威尊無上出入鳴鐘磬備具威儀笳簫皷吹車騎滿道胡人夾轂焚燒香者常有數十妻妾乘輜軿子弟從兵騎當時貴重震服百蠻尉佗不足踰也周瑜為偏將軍兩男一女女配太子登男循尚公主拜騎都尉有瑜風早卒循弟允初拜興業都尉妻以宗女授兵千人屯公安黄龍元年封都鄉侯諸葛瑾為大將軍而弟亮為蜀丞相二子恪融皆典戎馬督領將帥族弟誕又顯名於魏一門三方為冠葢天下榮之晉庾嶷為太僕潁川人子䨹字𤣥黙尚書陽翟子嶷弟遁字德先太中大夫遁裔嗣克昌為世盛門侍中駿河南尹純皆遁之子豫州牧長史獃遁之孫太尉文康公亮司空氷皆遁之曾孫貴達至今楊文宗武元皇后父也其先仕漢四世為三公文宗為魏通事郎襲封蓩亭侯阮籍兄子咸咸子瞻瞻弟孚咸從子修孚族弟放放弟裕裕子傭寧普傭早卒寧鄱陽太守普驃騎諮議叅軍傭子歆之中領軍寧子腆祕書監腆弟萬齡及歆之子彌之元熈中並列顯位周札為右將軍㑹稽内史時札兄靖子懋晉陵太守靖流亭侯懋弟筵征虜將軍吳興内史筵弟賛大將軍從事中郎武康縣侯賛弟縉太子文學都鄉侯次兄子勰臨淮太守烏程公札一門五侯並居列位吳士貴盛莫與此比范平吳郡人仕吳為臨海太守三子奭咸泉並以儒學至大官泉子蔚闗内侯毛寶為征虜將軍豫州刺史至孫璩三葉擁旄開國者四人將帥之家與尋陽周氏為軰而人物不及也王坦之湛之曽孫也為中書令徐兖二州刺史子愷字茂仁愉字茂和並少踐清階愷襲父爵愉稍遷驃騎司馬加輔國將軍愷太元末為侍中領右衛將軍多所獻替兄弟貴盛當時莫比愉子綏先是湛之父昶為魏司空昶之父澤為漢鴈門太守已有名稱忱亦坦之子又秀出綏亦著稱八葉繼軌軒冕莫與為比焉宋朱齡石字伯倪沛郡沛人也家世將帥祖騰建威將軍吳國内史伯父憲及斌並為西中郎元真將佐憲為梁國内史斌為汝南内史何尚之為左光祿開府侍中領中書令子邵尚太祖第十六女南郡公主女適彭城王義康巴陵哀王休若周嶠尚高祖第四女宣成德公主二女適建平王宏廬江王禕以貴戚顯官南齊禇淵尚宋巴西公主弟澄父湛之尚始安公主薨納側室郭氏生淵後尚吳郡公主生澄淵事主孝謹主愛之湛之亾主表淵為嫡澄尚宋文帝女廬江公主拜駙馬都尉歴官清顯淵位侍中司空錄尚書事劉悛為五兵尚書歴朝皆見恩遇太祖為鄱陽王鏘納悛妹為妃高宗又為晉安王寳義納悛女為妃自是連姻帝室王慈為冠軍將軍司徒左長史慈妻劉秉女子觀尚世子長女吳縣公主主修婦禮姑未常交答江夏王鋒為南徐州妃慈女也王繢為太常女適安陸王子敬世祖寵子永明三年納妃修外舅姑之禮世祖遣文惠太子相隨徃繢家置酒設樂公卿皆冠冕而至當世榮之王𤣥載為平北將軍兖州刺史弟𤣥邈為持節都督南秦二州軍事征虜將軍西戎校尉梁南秦二州刺史兄弟同時為方伯王融字元長為中書郎祖僧逹中書令曽高並台輔梁明僧紹位至貴州刺史僧紹子山賓北兖州刺史山賓弟少遐又拜青州刺史明氏南渡雖晩並有名位自宋至梁為刺史者六人陳歐陽頠長沙臨湘人也為廣州刺史征南將軍時頠弟盛為交州刺史弟遂為衡州刺史合州顯貴名振南土魯廣逹吳州刺史悉逹弟也時江表將帥各領部曲動以千數而魯氏猶多廣逹後至中領軍王冲為左僕射加特進左光祿大夫領丹陽尹有子三十人並致通官後魏長孫道生太武時為司空侍中與從父嵩俱為三公當世以為榮尉諾世祖時為幽州刺史兄太真為湘州刺史古真為定州刺史諾兄弟並為方伯當世榮之于栗磾為豫州刺史封新安公卒贈太尉子雒㧞為侍中尚書令卒官雒㧞六子長子烈為領軍卒贈太尉烈子忠為侍中薨贈司空烈弟果歴朔華并恒四州刺史果弟勁位沃野鎮將爵富昌子宣武納其女為皇后封勁太原郡公後為征北將軍定州刺史卒贈司空自栗磾至勁累世貴盛一皇后四贈公三領軍二尚書令三開國公封懿初為慕容寶中書令兄孚為太尉懿儁偉有才氣能屬文與孚雖噐行有長短然名位畧齊盧道裕尚獻文女樂浪長公主弟道䖍尚孝文女濟南長公主外甥李彧尚莊帝女豐亭公主一門三主當世以為榮李冲顯貴門族榮盛六姻兄弟子姪皆有爵官一家歲祿萬疋有餘王肅父奐南齊雍州刺史奐及兄弟並為齊武帝所殺肅自建鄴來奔尚陳留長公主肅前妻謝生子紹及二女肅臨薨謝始㩗二女及紹至壽春宣武納其女為夫人孝明又納紹女為嬪紹位中書侍郎羅延居阤侯結𤣥孫獻文帝天安中為驃騎將軍左光祿大夫結從子渥渥子㮛並歴通顯北齊斛律金為太師左丞相長子光大將軍次子羡及孫武都並開府儀同三司出鎮方嶽其餘子孫皆封侯貴逹一門一皇后二太子妃三公主尊寵之盛當時莫比白建歴特進侍中中書令諸子㓜稚俱為州郡主簿新君選補必先召辟男婚女嫁皆得勝流當時以為榮寵之極楊愔為神武行臺右丞表解職還葬一門之内贈太師太傳丞相大將軍者二人太尉錄尚書及中書令者三人僕射尚書者五人刺史太守者二十餘人追榮之盛古今未之有也及䘮柩進發吉㐫儀衛直二十餘里會葬者將萬人後周獨孤信為太保大宗伯信長女周明敬后第四女唐元貞皇后第七女隋文獻皇后三代皆為外戚自古以來未之有也隋鄭譯字正義榮陽開封人也祖瓊魏太常父道邕魏司空譯周武帝時起家給事中拜銀青光祿大夫轉左侍中與儀同劉納常侍帝側竇熾開皇初拜太傅賛拜不名熾事親孝奉諸兄以悌順聞及其位望隆重而子孫皆處列位遂為當時盛族李穆仕周以軍功為武衛將軍領侍中開府太祖封穆姊妹皆為郡縣君開皇初拜太師眞食成安縣三千户於是穆子孫雖在襁褓悉拜儀同其一門執象笏者百餘人穆之貴盛當時無比于義字慈恭在周時破王謙超拜上柱國時義兄翼為太尉弟智兄子仲文並上柱國大將軍已上十餘人稱為貴盛楊素為左僕射貴寵日隆其弟約從父文思弟紀及族父异並尚書列卿諸子無汗馬之勞位至柱國刺史親戚故吏布列清顯素之貴盛近古未聞素子𤣥感以軍功位至柱國與其父俱為第二品朝㑹則㑹列其後高祖命𤣥感降一等𤣥感拜謝曰不意陛下寵臣之甚許以公庭獲展私敬乞伏慧為太僕卿封宜民郡王其兄貴和又以軍功為王一門二王稱為貴顯賀若弼為右武侯大將軍弼時貴盛位望隆重其兄隆為武都郡公弟東為萬榮郡公並刺史列將弼家珍玩不可勝計婢妾曵綺羅者數百人時人榮之唐房𤣥齡為尚書左僕射封魏國公監修國史居端揆十五年女為韓王妃男遺愛尚高陽公主頻表辭位優詔不許高士亷祖岳齊清河王尚書令太保父勵齊樂安王尚書右僕射隋洮州刺史士亷文德皇后之舅官至尚書左僕射封申國公竇威隋太傅熾子也太穆皇后從父兄武德初為内史令高祖嘗謂曰昔周朝有八柱國之貴吾與公家咸登此職威曰家昔在漢朝再為外戚於後魏三處外家陛下龍興復出皇后臣又階緣戚里位忝鳳池自惟叨濫曉夕兢懼高祖笑曰比見闗東人與崔盧為婚猶自矜伐公代為貴戚不以貴乎威子惲為岐州刺史兄子軌官至雒州都督軌子奉節尚高祖永嘉公主軌弟宗為右領軍大將軍竇抗太穆后從父兄隋雒州總管陳國公榮子也母隋文帝萬安公主隋為幽州總管武德初為左武侯大將軍從平王世充册勲太廟者九人抗與從弟軌俱預朝廷榮之子術為左武衛將軍次子静為民部尚書静子逵尚太宗女遂安公主静弟誕尚高祖女襄陽公主為宗正卿誕子孝慈衛將軍孝慈子希玠為禮部尚書太子少傅誕少子孝諶女昭成皇后也子希瑊太子少傅􅃎國公希球太子賓客冀國公希瓘後名􅞓畢國公開府儀同三司𤣥宗早失太后尤重外家􅞓兄弟三人皆國公食實封􅞓子又尚𤣥宗女昌樂公主竇氏自武德再為外戚一品三人三品已上三十餘人尚主者八人女為王妃六人唐世貴盛莫與為比楊恭仁為雒州都督弟師道尚桂陽公主從姪女為巢刺王妃弟子思尚安平公主連姻帝室益見崇重自武德之後恭仁名位猶盛則天時又以外戚崇寵一家之内駙馬三人王妃五人贈皇后一人三品已上官二十餘人遂為盛族郝處俊高宗儀鳳中為侍中時侍中許圉師卽處俊之舅早同州里俱宦達於時又其鄉人田氏彭氏以殖貨見稱故江淮間為之語曰貴如許郝富如田彭來恒高宗朝為黄門侍郎同中書門下三品侍中濟之異母兄也兄弟相次知政事時以為榮張延師為左衛大將軍延與兄太僕卿大師及次兄儉同時三品宅中棨㦸齊列時人榮之號為三㦸張家張文瓘高宗朝為侍中四子濳沛洽渉後皆至三品時人謂之萬石張家傅遊藝為鸞臺侍郎同平章事兄神童為冬官尚書兄弟並承榮寵張嘉貞𤣥宗時為中書令帝以嘉貞弟嘉祐為金吾將軍兄弟並居將相之位韋安石神龍中為中書令高祖孝寛周太傅曽祖津隋民部尚書武德初歸於皇朝授黄門侍郎封武陽郡公至安石歴仕三朝台輔安石子斌天寶中為三品斌兄陟為河東太守兄由為右金吾將軍縚為少師四人同時列㦸天下榮之安石從祖兄子巨源及文昌右相待價並是五服之親自餘近屬至大官者數十人韋嗣立長壽中代兄承慶為鳳閣舍人長安三年承慶代嗣立為天官侍郎頃之又代嗣立知政事及承慶卒嗣立又代為黄門侍郎前後四職相代又父子三人皆至宰相有唐已來莫與為比崔義𤣥為御史大夫蒲州刺史子神基司賓卿同鳳閣鸞臺平章事神基弟神慶歴司刑司禮二卿神慶子琳等皆至大官羣從數十人趨奏省闕每歲時家宴組佩輝映以一榻置笏重疊於其上開元天寶間中外族屬無緦麻之䘮其福履昌盛如此東都司第門琳與弟太子詹事珪光祿卿瑶俱列棨㦸時號三㦸崔家琳位終太子少保李嶠為鸞臺侍郎平章事兼修國史乆視元年嶠舅天官侍郎張錫入知政事嶠轉成均祭酒罷知政事及修史甥舅相繼在相位時人榮之韋堅為縉雲郡太守姊為薛王妃堅又娶姜皎女為妻堅妹又為太子妃姻戚榮盛當時無比李峴至徳中為京兆尹兼御史大夫李峴兄峘為户部尚書兼成都尹乾元初𤣥宗還京峘自蜀至又兼御史大夫兄弟俱判䑓事自國初以來兄弟並拜大夫未有其比時長安士庻皆賦詩美之郭子儀為尚父兼太尉中書令汾陽郡王有子八人壻七人皆重官子曖尚昇平公主諸孫數十人每羣孫問安不盡識頷之而已子儀麾下將若李懐光輩數十人皆王侯貴重子儀頥指進退如僕𨽻幕府之盛近代無比子儀歲入官俸二十四萬貫私利不在焉其宅在親仁里居其地四分之一中通永巷家人三千指出入者不知其居前後賜良田美噐名園甲舘聲色珍好堆積羡溢不可勝紀代宗不名呼為大臣天下以其身存亾為安危者殆二十年校中書令考二十有四權傾天下而朝不忌功葢一代而主不疑侈窮人欲而君子不罪富貴壽考繁衍安泰哀榮終始人道之盛無缺焉李愿中書令晟之子晟立大勲諸子猶無官宰相奏陳德宗卽日召愿拜銀青光祿大夫太子賓客上柱國􅃇制勲臣上柱國賜㦸卽令賜愿乃與父並列於門劉從一德宗朝為相中書侍郎林甫之𤣥孫禮部侍郎令植之孫也初林甫生祥道麟德初為右相祥道卽從一曽伯祖也令植從父兄齊賢𢎞道初為侍中自祥道至從一劉氏凡三相張獻甫為邠寜節度使獻甫守珪之姪也父守琦左武衛將軍贈户部尚書守珪子獻誠守珪之弟守瑜二子獻恭並為山南西道節度使杜佑為司徒諸子咸居朝列當時貴盛無比韓𢎞為司徒中書令元和十五年為河中節度時𢎞弟充為鄭滑節度𢎞子公武為鄜坊節度父子兄弟皆秉節鉞人臣之寵冠絶一時李愬父晟平朱泚克復宮闈市不改肆洎愬平淮㓂復踵其美父子仍建大勲其兄弟數人雖有功業不侔而皆領旄鉞近古罕比焉田𢎞正為魏博節度使𢎞正每懼有一旦之憂嗣襲之風不革兄弟子姪悉仕於朝憲宗皆擢居班列朱紫盈庭當時榮之𢎞正移綂鎭冀又詔子布為河陽三城懐州節度父子皆領節制時韓𢎞亦與子公武俱為節度使然人以忠勤多田氏薛平以司徒致仕卒曽祖仁貴高宗朝名將封平陽郡公祖楚玉為范陽平盧節度使父嵩為昭義節度使代宗優寵方鎭平年十二已為磁州刺史崔鄯為左金吾大將軍開成初卒贈禮部尚書鄯昆弟六人仕宦皆至三品邠郾鄲三人知貢舉掌銓衡孔緯自元和後昆仲貴盛至正卿方鎮者六七人未有為宰輔者至緯始在鼎司子崇弼亦登進士第後唐天成中自吏部郎中授給事中時族兄弟昭序由給事中改左散騎常侍兄弟同居東省時論榮之後唐劉岳八代祖民部尚書渝國公政㑹武德時功臣祖符蔡州刺史父珪洪洞縣令符有子八人皆登進士第珪之母弟瓌瑋異母弟崇夷崇望崇魯崇謩崇龜乾寧中廣南節度使崇望乾寧中宰相崇魯崇謩崇夷並歴朝省岳貞明初召入翰林為學士朱友謙為守太師尚書令鎭河中賜姓李名繼麟同光中以其子令德為遂州節度令錫為訢州節度一門三鎭諸子為刺史者六七人將校部符者又五六人恩寵之盛時無與比纔勝衣者咸錫之王爵一門之盛近古莫之儔也歸藹字文彦吳郡人也曽祖登祖融父仁澤位皆至列曹尚書觀察使藹同光初為尚書右丞遷刑户二侍郎以太子賓客致仕晉鄭韜光字龍符西京河清人也曽祖絪為唐相祖祗德國子祭酒贈太傅父顥河南尹贈太師其先世居滎陽自隋唐三百餘年公卿輔相蟬聮一門韜光唐宣宗之外孫萬壽公主之子也生三日賜一子出身銀章朱紱及長美容止神爽清徹不妄喜怒秉執名節為宗族所稱周蕭愿為太子賓客愿梁昭明太子後宋公瑀太師嵩其祖也父項梁貞明年為相唐明宗朝終太子少保項之父廪事僖宗歴給事中京兆尹廪之先曰倣懿宗之輔相也世有令名一門七相盧文紀以司空致仕文紀曾祖綸生四子曰簡能簡辭簡求𢎞正皆至逹官簡求歴邠寕太原節度以才畧知名四授藩鎭皆為邊任安審暉以太子太師致仕卒贈侍中今襄帥陳王審琦邠州副使審韜鄆州副使審玉前太原西宮使審寓延州行軍司馬審卿􅉆奉官審覇皆審暉之弟也將門之盛近代罕儔孫方諌為定國軍節度使方諌漢乾祐中累官至使相太祖受命加侍中未幾入朝改華州節度朝廷以其弟行友為定州留後又以弟議為德州刺史兄弟子姪職内廷者凡數人冊府元龜卷八百六十六
