body:
  text: 册府元龜卷四百十四宋王欽若等撰將帥部赴援兵者所以拯衰弱遏强暴本於仁義濟以威武者也至若同盟相恤善鄰為寶救災而赴其急哀敗而圖其存盖春秋之善志也若夫締搆之始艱虞之㑹豪傑競起雄雌未分干戈日尋急難必赴其或勤王之舉戮力而同濟至乃專征之重整旅而相應咸能釋其倒懸之望援其累卵之危摧猛敵以遏寇虐驅黠虜以寧疆場戎昭克振戰功以成斯古人所謂輔車之形犄角之勢腹背為助表裏胥協畏簡書而一志力可以決勝者哉郤克晉大夫也魯成公二年春齊侯伐魯北鄙夏四月丙戌衛孫良夫帥師及齊師戰於新築衛師敗績新築衛地郤克將中軍士燮佐上軍欒書將下軍韓厥為司馬以救魯衛臧宣叔逆晉軍且道之季文子帥師㑹之及衛地孟獻子魯大夫也成公十八年十一月楚子重伐宋宋華元如晉告急晉士魴來乞師十二月孟獻子㑹于虚朾謀救宋也陳成子齊大夫也魯哀公二十七年晉伐鄭次于桐丘鄭駟𢎞請救於齊成子乃救鄭及留舒齊地魏公子無忌封信陵君安釐王二十年秦昭王已破趙長平軍又進兵圍邯鄲公子姊為趙惠文王弟平原君夫人數遺魏王及公子書請救於魏魏王使晉鄙將十萬衆救趙秦王使使者告魏王曰敢救者已拔趙必移兵先擊之魏王恐使人止晉鄙留軍壁鄴名為救趙實持兩端無忌用侯嬴計竊晉鄙兵符及朱亥椎殺晉鄙公子遂將晉鄙兵下令軍中選兵八萬人進兵擊秦軍秦軍解去遂救邯鄲存趙采義楚懷王時為上將秦將王離圍趙趙數請救懷王以義及次將項羽末將范増北救趙田都齊將也秦二世三年十月秦將章邯圍趙於鉅鹿都從項羽共救趙田安齊王建之孫也秦二世三年十二月從項羽救趙漢韓信為大將軍既定趙因請立張耳王趙以撫其國楚數使竒兵渡河擊趙王耳信往來救趙後漢鄭衆明帝時為軍司馬使與虎賁中郎將馬廖擊車師至燉煌拜為中郎將使䕶西域會匈奴脅車師圍戊己校尉衆發兵救之遷武威太守牽招明帝時為鴈門太守䕶烏丸校尉田豫出塞為軻比能所圍於故馬邑城移招求救招即整勒兵馬欲赴救豫并州以常憲禁招招以為節將見圍不可拘於吏議自表輒行又並馳布羽檄稱陳形勢云當西北掩取虜家然後東行會誅虜檄到豫軍踴躍又遺一通於虜蹊要虜即恐怖種類離散軍到故平城便皆潰耿恭為戊己校尉北匈奴圍恭於疏勒城闗寵於栁中城章帝遣征西將軍耿秉屯酒泉行太守事遣秦彭與謁者王蒙皇甫援發張掖酒泉燉煌三郡及鄯善兵合七千餘人建初元年正月會栁中擊車師攻交河城斬首三千八百級獲生口三千餘人駞驢馬牛羊三萬七千頭北虜驚走車師復降會闗寵已歿蒙等聞之便欲引兵還先是恭遣軍吏范羌至燉煌迎兵士寒服羌因隨王蒙軍俱出塞羌固請迎恭諸將不敢前乃分兵二千人與羌從山北迎恭遇大雪丈餘軍僅能至城中夜聞兵馬聲以為虜來大驚羌乃遙呼曰我范羌也漢遣軍迎校尉耳城中皆稱萬嵗開門共相持涕泣明日遂相隨俱歸耿䕫安帝建光中為度遼將軍時鮮卑攻殺雲中太守成嚴圍烏桓校尉徐常於馬城䕫與幽州刺史龎參救之追虜出塞而還葢勲為漢長史靈帝中平元年北地羌胡與邊章等寇亂隴右攻金城殺郡守陳懿勲勸涼州刺史左昌救之不從邊章等進圍昌於冀昌懼而召勲勲初與從事辛曽孔常俱屯河陽及昌檄到曽等疑不肯赴勲怒曰昔莊賈後期穰苴奮劍今之從事豈重於古之監軍哉曽等懼而從之勲即率兵救昌到乃誚讓章等責以背叛之罪皆曰左使君若早從君言以兵臨我庶可自改今罪已重不得降也乃解圍而去吕布為徐州刺史遣先主屯小沛時袁術遣將紀霛等步騎二萬攻先主求救於布布諸將謂布曰將軍常欲殺𤣥徳今可假手於術布曰不然術若破彼則北連太山諸將吾為在術圍中不得不救也便嚴步兵千騎二百馳往赴之霛等聞布至皆斂兵不敢復攻布於沛西南一里安屯遣鈴下請霛等霛等亦請布共飲食布請霛等曰𤣥德布弟也弟為諸君所困故來救之布性不喜合鬭但喜解鬭耳布令門候於營門中舉一隻㦸布言諸君觀布射㦸小支一發中者諸軍當解去不中可留決鬬布舉弓射㦸正中小支諸將皆驚言將軍天威也明日復飲會然後各罷劉表漢末為荆州牧時曹公征張繡荀攸言於曹公曰繡與劉表相恃為強然繡以逺軍仰食於表表不能供勢必離不如緩軍以待之可誘而致也若急之其勢必相救曹公不從遂進軍至穰繡戰急表果救之軍不利曹公謂攸曰不用君言至是矣袁術初為左將軍術求婚於吕布布不從術怒之及曹公圍布於下邳布遣許汜王楷告急於術術曰布不與我女理當自敗何為復來相聞耶汜楷曰明上今不救布為自敗耳布破明上亦破也術時僭號故為明上術乃嚴兵為布作聲援布恐術為女不至故不遣兵救也以緜纒女身縛著馬上夜自送女出與術與曹公守兵相觸格射不得過復還城李通為振威將軍曹公討張繡劉表遣兵助繡曹公軍不利通將兵夜詣曹公曹公得以復戰通為先登大破繡軍吳周瑜大帝時為前部大督敗曹公於赤壁曹公留曹仁守江陵城瑜與程普又進南郡與仁相對各隔大江兵未交鋒瑜即遣甘寧前據夷陵仁分兵騎别攻圍寧寧告急於瑜瑜用吕蒙計留凌統以守其後身與蒙上救寧寧圍既解乃渡屯北㟁克期大戰瑜親跨馬櫟陣會流矢中右脇瘡甚便還後仁聞瑜卧未起勒兵就陣瑜乃自興按行軍營激揚吏士仁繇是遂退諸葛瑾為左將軍督公安時魏曹真夏侯尚等圍朱然於江陵又分據中州瑾以大兵為之救援瑾性𢎞緩推道理任計畫無應卒倚伏之術兵久不解大帝以此望之及春水生潘璋等作水城於上流瑾進攻浮橋真等退走雖無大勲亦以全師保境為功魏胡質太祖時為荆州刺史振威將軍吳將朱然圍樊城質輕軍赴之議者皆以為賊盛不可追質曰樊城卑下兵少故當進軍為之外援不然危矣遂勒兵臨圍城中乃安夏侯儒為征南將軍吳將朱然圍樊城城中守將乙修等求救甚急儒進屯鄧塞以兵少不敢進但作鼔吹設導從去然六七里翺翔而還使修等遙見之數數如是月餘司馬宣王到乃俱進然等走時謂儒為怯或以為曉以少疑衆得聲救之宜儒猶以此召還為太僕張既為雍州刺史是時不置涼州自三輔拒西域皆屬雍州司馬文帝初置涼州以安定太守鄒岐為刺史張掖張進執郡守舉兵拒岐酒泉黄華西平麴演各逐故太守舉兵以應之既進兵為䕶羌校尉蘇則聲勢故則得以有功既進爵都鄉侯賈逵為建威將軍太和二年吳將張嬰王崇率衆降詔逵督前將軍滿寵東莞太守胡質等四軍從西陽直向東闗大司馬曹休從皖司馬宣王從江陵逵至五將山休更表賊有請降者求深入應之詔逵與休合進逵度賊並軍皖城休深入必敗乃部署諸將水陸並進行二百里知休戰敗吳大帝遣兵㫁夾石諸將不知所出或欲待後軍逵曰休兵敗於外路絶於内進不能戰退不得還安危之機不及終日賊以軍無後繼故至此今疾進出其不意此所謂先人以奪其心也賊見吾兵必走若待後軍賊已㫁險雖兵多何益乃兼道進軍多設旗鼔為疑兵賊見逵軍遂退逵據夾石以兵糧給休休軍乃振陳泰齊王嘉平中為征西將軍都督雍梁諸軍事雍州刺史王經與蜀將姜維戰大敗還保狄道城維乘勝圍狄道泰進軍度髙城嶺潛行夜至狄道與維交戰維退城中將士得出初泰聞經見圍以州軍將士素皆一心加得保城非維所能卒傾表上進軍晨夜速到還衆議以經奔北城不足自固維若㫁涼州之道兼四郡民夷據闗隴之險敢能沒經軍而屠隴右宜須大兵四集乃致攻討大將軍司馬文王曰昔諸葛亮嘗有此志卒亦不能事大謀逺非維所任也且城非倉卒所拔而糧少為急征西速救得上䇿矣朱異為前部督廢帝太平二年魏將諸葛誕歸命六月使文欽唐咨全端等歩騎二萬救誕朱異自虎林率衆襲夏口夏口督孫壹奔魏秋七月孫綝率衆救夀春次于鑊里異至自夏口綝與丁奉等將介士五萬解圍晉安平獻王孚初仕魏為太尉吳將諸葛恪圍合肥新城鎮東都督毌丘儉與文欽禦之孚督中軍東解圍恪退還丁紹為廣平太守南陽王模為中郎將鎮鄴惠帝永興初成都王穎故帳下督公師藩樓權郝昌等攻鄴模左右謀應之紹率衆救模范陽王虓又遣兖州刺史茍晞援之藩等散走又云紹初為廣平太守及臨漳被圍南陽王模窘急紹率郡兵赴之模賴以獲全模感紹恩生為立碑王浚懷帝永嘉中為大司馬石勒陷襄城遂至宛浚遣鮮卑文鴦帥騎救宛勒退陳川為蓬陂塢主元帝時祖逖以奮威將軍北討屯兵太丘樊雅遣衆夜襲逖遂入壘抜㦸大呼直趣逖幕軍士大亂逖命左右距之督䕶董昭與賊戰走之逖率衆追討而張平餘衆助雅攻逖川自號寧朔將軍陳留太守逖遣使求救於川川遣將李頭率衆援之逖遂克譙城初樊雅之據譙也逖以力弱求助於南中郎將王含含遣桓宣領兵助逖逖既克譙宣等乃去石季龍聞而引衆圍譙含又遣宣救逖季龍聞宣至而退宣遂留逖討諸屯塢未附者李矩為冠軍將軍令趙固守雒後數月劉聰遣其太子粲率劉雅生等步騎十萬屯孟津北㟁分遣雅生攻趙固於雒固奔陽城山遣弟告急矩遣郭誦屯雒口以救之誦使將張皮簡精卒千人夜渡河粲候者告有兵至粲恃其衆不以為虞既而誦等奄至十道俱攻粲衆驚擾一時奔敗殺傷大半因據其營獲其器械軍資不可勝數及旦粲見皮等人少更與雅生悉餘衆攻之苦戰二十餘日不能下矩進救之使壯士三千泛船迎皮賊臨河列陣作長鉤以鉤船連戰數日不得渡矩夜遣步將格増潛濟入皮壘與皮選精騎千餘而殺所獲牛馬焚燒器械夜突圍而出奔武牢聰追之不及而退聰因憤恚發病而死毛寳明帝時為廬江太守祖約遣祖煥桓撫襲湓口陶侃使寳拒之先是桓宣背約南屯馬頭山為煥撫所攻求救於寳寳衆以宣本是約黨疑之宣遣子戎重請寳即隨戎赴之未至而賊已與宣戰寳軍懸兵少器械濫惡大為煥撫所破寳中箭貫髀徹鞍使人蹋鞍拔箭血流滿鞾夜奔船所百餘里望星而行到先哭戰亡將士洗瘡訖夜還救宣寳至宣營而煥撫亦退朱序孝武時為征虜將軍督司雍梁秦四州軍事鎮襄陽東羌校尉竇衝欲入漢川安定人皇甫釗京兆人周勲等謀納之梁州刺史周瓊失巴西三郡衆寡力弱告急於序遣將軍皇甫貞率衆赴之衝據長安東釗勲散走桓豁為荆州刺史符堅將王猛楊安攻南鄉豁救之師次新野而猛安退郄恢為雍州刺史鎮襄陽以隨郡太守夏侯宗之為河南太守戍雒陽姚萇遣其子畧攻湖城及上雒又使其將楊佛嵩圍雒陽恢遣建武將軍辛恭静救雒陽梁州刺史王正𦙍率衆出子午谷以為聲援畧懼而退恢以功進征虜將軍石元良為西安太守時吕纂討郭糜纂大敗元良率步騎五千赴難與纂撃糜軍破之遂入于姑臧宋申怙文帝元嘉中為通直散騎時魏軍南冦青州遣怙援東陽因與輔國司馬齊郡太守龎秀之保城固守蕭斌遣青州别駕解榮之率垣䕶之還援怙等仍傍南山得入賊朝來脅城日晩輒退城内乃出車北門外環塹為營欲挑戰賊不敢逼停五日東過抄畧清河郡從東安東莞出下邳下邳太守垣閬閉城拒守保全二千餘家虜退以怙為寧朔將軍山陽太守垣䕶之為宣威將軍鍾離大守隨王𤣥謨入河𤣥謨攻滑臺䕶之以百舸為前鋒進據石濟石濟在滑臺西南百二十里及魏軍救至𤣥謨敗退不暇報䕶之䕶之聞知而魏軍悉牽𤣥謨水軍大艚連以鐵鏁三重斷河欲以絶䕶之還路河水迅急䕶之中流而下每至鐵鏁以長柯斧斷之魏軍不能禁止失一舸餘舸並全南齊崔慧景為輔國將軍南郡内史太祖建元元年元魏南侵豫章王遣慧景三千人頓方城為司州聲援蕭宏為太子舎人時蕭懿鎮梁州為魏所圍明帝給宏精兵千人遣為援未至魏軍退梁曹景宗為右衛將軍天監五年魏中山王英冦鍾離圍徐州刺史昌義之髙祖詔景宗率衆赴援豫州刺史韋叡亦援焉而受景宗節度六年春大破魏軍安成康王秀天監七年為荆州刺史號安西將軍是嵗魏懸瓠城民反殺豫州刺史司馬恱引司州刺史馬僊琕時琕往荆州求應赴衆咸謂宜待臺報秀曰彼待我而為援援貴急速待勅雖舊非應急也即遣兵赴之始興忠武王憺天監九年為鎮西將軍益州刺史時魏襲巴南西圍南安太守垣季珪堅壁固守憺遣軍救之魏人退軍所收器械甚衆蘭欽為南梁南北秦沙四州都督移衡州刺史未及赴職魏遣都督董紹張獻攻圍南鄭梁州刺史杜懷瑤請救欽率所領援之大破紹獻於髙城斬首三千餘紹獻奔追入斜谷斬獲畧盡西魏相宇文黑泰致馬二千匹請結鄰好詔加散騎常侍進號仁威將軍増封五百戸仍令赴職裴之髙為雄信將軍侯景之亂南豫州刺史鄱陽嗣王範命之髙總督江右援軍諸軍事頓于張公洲栁仲禮至横江之髙遣船舸二百餘艘迎致仲禮與韋粲等俱㑹青塘立營據建興苑及城陷之髙還合肥與鄱陽王範西上稍至新蔡衆將一萬未有所屬元帝遣蕭惠正召之以為侍中䕶軍將軍陳黄法􅉤為信武將軍髙州刺史髙祖永定二年王琳遣李孝欽樊猛余孝頊攻周迪且謀取法􅉤法􅉤率兵援迪擒孝頊等三將熊曇朗為宜新豫章太守時王琳遣李孝欽余孝頊於臨川攻周迪曇朗率所領赴援陸子隆為明威將軍廬陵太守周迪引陳寳應復出臨川子隆隨都督章昭達討迪迪退走子隆隨昭達踰東興嶺討寳應軍至建安以子隆監郡寳應據建安之潮際以拒官軍子隆與昭達各據一營昭達先與賊戰不利亡其鼔角子隆聞之率兵來救大破賊徒盡獲昭達所亡羽儀甲仗後魏許謙初為右司馬與張衮等參贊初基慕容寳來寇也道武使謙告難於姚興興遣將楊佛嵩率衆來援審進稽遲道武命謙為書以遺佛嵩曰夫仗順以剪逆乘義而攻昧有非其運而顯功無其時而著業慕容無道侵我疆埸師老兵疲誅亡期至是以遣使命軍必望尅赴將軍據方召之任總羆虎之師事與機會今其時也今此一舉役不載駕千載之勲一朝可立然後髙㑹雲中進師三魏舉觴稱夀不亦綽乎佛嵩乃倍道兼行道武大恱賜謙爵闗内侯來大千為常侍從太武討赫連昌共長孫道生與賊交戰道生馬倒為賊所擊大千馳救賊衆散走大千扶道生上馬遂得免尋遷征北大將軍尉元為冠軍將軍薛安都以徐州内附請師救援獻文以元為都督東道諸軍事鎮南大將軍博陵公與城陽公孔伯恭赴之宋遣將張永沈攸之等率衆討安都屯于下磕永乃分遣羽林監王穆之領率五千守輜重於武原龍驤將軍謝善居領卒三千據吕梁散騎郎張𢎞領卒二千守茱萸督上租糧供其軍實安都出城見元元依朝㫖授其徐州刺史遣中書侍郎髙閭李璨等與安都俱還入城别令孔伯恭精甲二千撫安内外然後元入彭城孔伯恭為散騎常侍宋徐州刺史薛安都以彭城内附宋遣將張永沈攸之等擊安都上表請援髙祖進伯恭號鎮東將軍副尚書尉元救之軍次下邳賊將周覬聞伯恭等攻而克之永計無所出引師而退慕容白曜為征南大將軍宋遣其將吳憘公率衆數萬欲寇彭城尉元表請濟師獻文詔白曜赴之白曜到瑕丘遇患時泗水暴竭船不得進憘公退白曜因停瑕丘奚康生為中堅將軍時南齊將裴叔業率衆圍渦陽詔遣髙聰等四軍往援之後遣都督廣陵侯元術並皆敗退時刺史孟表頻啟告孝文勅遣康生馳往赴援一戰大破之傅永為揚武將軍汝陰鎮將宣武景明初齊將陳伯之侵逼夀春沿淮為寇司徒彭城王勰廣陵侯元術同鎮夀春以九江初附人情未洽兼臺援不至深以為憂詔遣永為統軍領汝陰之兵三千人先援永總勒士卒水陸俱下而淮水口伯之防之甚固永去二千餘里牽船上汝南㟁以水牛挽之直南趣陰下船便渡適上南㟁賊軍亦及㑹時已夜永乃潛進曉達夀春城下勰術聞外有軍共上門樓觀望然不意永至永免胄乃信之遂引永上勰謂永曰比望已久恐雒陽難復可見不意卿能至也勰令永引軍入城永曰執兵被甲固敵是求若如教㫖便共殿下同被圍守豈是救援之意遂孤軍城外與勰並勢以擊伯之頻有尅捷宇文福景明中為太僕少卿梁將寇邊假節征虜將軍領兵出三闗討之又詔福行豫州事與東豫州刺史田益宗共相影援綏遏蠻楚張普惠孝明時為尚書左丞時梁義州刺史文僧明舉城歸順揚州刺史長孫雉遣别駕封夀入城固守梁人率衆攻逼詔普惠為持節東道行臺攝軍同赴援之軍始渡淮而封夀已棄城單馬而退軍罷還朝辛纂為諫議大夫兼尚書左丞南道行臺時梁遣將曹義宗攻新野詔纂率衆赴援至便破之義宗等以其勁速不敢復進於是海内多虞京師更無繼援唯以二千餘兵捍禦疆埸淳于誕為羽林監梁將張齊攻圍益州詔誕為統軍與刺史傅豎眼赴援事寧還朝崔孝芬為安南將軍光禄大夫兼尚書為徐兖行臺莊帝建義初太山太守羊侃據郡反逺引梁兵圍逼兖州除孝芬散騎常侍鎮東將軍金紫光禄大夫仍兼尚書東道行臺大都督刁宣馳往救援與行臺于暉接至便圍之侃突圍奔梁餘悉平定北齊司馬子如為髙祖大行臺郎中葛榮之亂相州孤危爾朱榮遣子如間行入鄴助加防守叱列平為開府陳人攻圍廣陵詔平統河南諸軍赴援陳人退乃還後周韋祐字法保初仕魏孝武為右將軍及廣寧刺史李長夀被侯景所害其子延孫收長夀餘衆守禦東境朝廷恐延孫兵少不能自固乃除法保東雒州刺史配兵數百人以援延孫法保至潼闗𢎞農郡守韋孝寛謂法保曰恐子此役難以吉還也法保曰古人稱不入虎穴不得虎子安危之事未可預量縱為國殞身亦無所恨也遂倍道兼行東魏陜州刺史劉貴以步騎千餘邀法保法保命所部為圓陣且戰且前數日得與延孫合兵乃并勢置柵於伏流未㡬太祖遣法保與延孫率衆入朝賞勞甚厚崔猷閔帝時為梁州都督時利州刺史崔士謙被寇請援猷遣兵六千赴之信州糧盡猷為送米四千斛於是二鎮獲全趙昶為武州刺史明帝初鳯州人仇周貢魏興等反自號周公破廣化郡攻沒諸縣分兵西入圍廣業修城二郡廣業郡守薛爽修城郡守杜杲等請昶為援遣使報杲為周貢黨樊復興等知昶將至解修城圍據泥功嶺設六伏以待昶昶至遂遇其伏合戰破之廣業之圍亦解昶追之泥陽川而還扶猛為羅州刺史武成時陳將侯瑱等逼湘州猛從賀若敦赴救除武州刺史後隨敦自拔還復為羅州刺史王軌髙祖時為上大將軍陳將吳明徹入寇吕梁徐州總管梁士彦頻與戰不利乃退保州城不敢復出明徹遂堰清水以灌之列船艦於城下以圖攻取詔以軌為行軍總管率諸軍赴救軌潛於清水入淮口多豎大木以鐵鎖貫車輪横截水流以㫁其船路方欲宻決其堰以斃之明徹知之大懼乃破堰而退冀乘決水之勢以得入淮比至清口川流已濶水勢亦衰船艦並礙於車輪不復得過軌因率兵圍而蹙之唯有騎將蕭摩訶以二千騎先走得免明徹及將士三萬餘人并器械輜重並被俘獲陳之鋭卒於是殲焉李遷哲天和三年為大將軍率兵鎮襄陽陳將章昭達攻逼江陵梁王蕭巋告急於襄州衛公直令遷哲往救焉遷哲率其所部守江陵外城與陳將程文季交戰兵稍相及遷哲新自陷陣手殺數人會江陵總管陸騰出兵助之陳人又因水汎長壞龍州寧朔堤引水灌城城中驚擾遷哲乃先塞止北水又募驍勇出擊之頻有斬獲衆心稍定俄而敵入郭内焚民家遷哲自率騎出南門又令步兵自北門出兩軍合勢首尾邀之陳人復敗多投水而死是夜陳人又竊于城西堞以梯登城者已數百人遷哲又率驍勇扞之陳人復潰俄而大風暴起遷哲乘闇出兵擊其營陳人大亂殺傷甚衆陸騰復破之於西堤陳人乃遁隋季徹髙祖時為衛王長史與李元討突厥沙本畧畧遂降以功加上大將軍未㡬沙本畧又為阿拔所侵上疏請援以徹為行軍總管率精騎一萬赴之阿拔聞而遁去及軍還復領行軍總管屯平涼以備外寇封安道郡公衛𤣥為刑部尚書煬帝幸遼東𤣥與代王留守京師㑹楊𤣥感圍逼東都𤣥率步騎七萬援之至華陰掘楊素冡焚其骸骨夷其塋域示士卒以必死既出潼闗議者恐崤函有伏兵請於陜縣㳂流東下直趨河陽以攻其背𤣥曰以吾度此計豎子所及於是鼓行而進既度函谷卒如所量時衆寡不敵與賊頻戰不利死傷大半𤣥感盡鋭來攻𤣥苦戰賊稍却進屯北邙會宇文述來䕶兒等援兵至𤣥感懼而西遁𤣥遣通議大夫斛斯萬善監門直閤龎玉先鋒追之及于閿鄉與宇文述等合撃破之張須陁大業中為齊郡丞時賊帥秦𢎞郭方預等合軍圍北海兵鋒甚鋭須陁謂官屬曰賊自恃強謂我不能救吾今速去破之必矣於是簡精兵倍道而進賊果無備擊之大破斬數萬級獲輜重三千兩唐劉𢎞基為右驍衛大將軍髙祖武德二年五月王世充侵西濟州遣𢎞基援之契苾何力為左領軍將軍太宗貞觀中與涼州都督李大亮將軍薛萬鈞同征吐谷渾軍次赤水川萬鈞率騎先行為賊所攻兄弟皆中鎗墜馬徒步而鬭兵士死者十六七何力將數百騎馳往突圍而前縱横奮擊賊兵披靡萬鈞兄弟繇是獲免髙賢為安西都䕶行軍總管髙宗龍朔中率軍救援于闐李勣為司空乾封中伐髙麗裨將郭待封以水軍别道赴平壤城又遣别帥馮師本齎軍糧舟行以為之援師本中路船破失期待封欲作書與勣恐髙麗知其救兵不至乘危迫之乃作離合詩以遺勣勣不達其意怒曰軍機急切何用詩為必斬以徇行軍管記通事舍人元萬頃白勣曰此離合文也勣始悟即日遣偏軍持糧仗以援之待封遂濟海王方翼為安西都䕶永隆中突厥車鼻反叛圍弓月城方翼引兵救之至伊麗河而賊衆來拒縱擊大破之斬首千餘級崔光逺為河南節度使肅宗乾元元年冬司徒郭子儀與賊戰於汲郡光逺以千人渡河援之李晟為都知兵馬使代宗大厯五年涇原節度使馬璘與吐蕃戰於鹽倉兵敗晟率所部横擊之拔璘出於亂兵後德宗即位吐蕃寇劍南時節度使崔寧在京師三川皆恐詔晟將神䇿軍五百救援晟乃踰漏天攻拔飛越廓清肅寧三城絶大渡河獲虜首千餘級虜乃引去張孝忠為易定節度時朱淊侵逼詔神策行營兵馬使李晟中官竇文㻛以衆援之孝忠與晟戮力同心竟全易定二州李納為淄青節度使建中四年李希烈攻圍陳州納遣大將軍李克信李欽遥將兵救之與諸軍奮擊大破之因解陳州之圍加檢校司空實封五百戸李觀為四鎮北庭行營節度使貞元初平涼之會渾瑊既無戎備觀伺知狡謀潛擇精兵五千要伏險道及瑊遁歸賴觀游軍及李元諒之師表裏以免王鍔為河東節度使憲宗元和九年振武軍衆逐節度使李進賢以張煦代之鍔遣兵五千會煦於善羊柵謀入煦也李光顔為忠武軍節度使元和十二年討淮西時裴度計築赫連城於沱口未畢役度帥賓從往觀之導騎將及城門左右曰板築五溝言未訖賊已突來哮虓争進城震壞者十餘板注弩挺刃勢將及度賴光顔決戰於前以却之時光顔先慮其來使田布以騎二百伏於溝中出賊不意交擊之方得入城布又先扼其溝歸路賊多棄騎越溝相牽墜壓而死者千餘人是日非光顔之救度㡬陷李聴為滑州節度使文宗太和三年討滄州李同捷魏博行營都將丌志紹潛結滄鎮回軍攻魏博節度使史憲誠以急上聞詔聴以兵援之遂大破志紹志紹奔鎮州聴遂凱還田布𢎞正之子統魏之偏師會諸軍討淮西裴度嘗觀諸軍城沱口賊將董重質領驍騎突至度甚危蹙布領騎三百馳救之俄而諸軍繼至獲免李繼宻知興元軍府事昭宗景福二年正月鳯翔李茂貞奏以繼宻率本軍赴援梓州梁張存敬為右騎都將唐光啟中李罕之會晉軍圍張宗奭於盟津太祖遣丁會葛從周存敬同往馳救存敬引騎軍先犯虜騎諸軍翼之虜騎大敗乃解河橋之圍牛存節為宣義軍小將唐文德元年夏李罕之以并軍圍張宗奭於河陽太祖遣存節率軍赴之屬嵗歉饟餽不至村民有儲乾椹者存節以器用錢帛易之以給軍食大破賊於沮河罕之引衆北走存節後為宿州刺史淮賊大至彭城存節乃以部下兵夜發直趣彭門淮人訝其神速震恐而退諸將服其智識開平二年王師敗於上黨晉人乘勝迫澤州城將陷河南留守張全義召存節謀遂以本軍及右龍武羽林等軍往應接上黨師至天井闗存節謂諸將曰是行也雖不奉詔㫖然要害之地不可致失時晉人新勝其鋒甚盛存節引衆而前啣枚夜至澤州晉軍焚營而退葛從周為兖州留後唐光化元年正月淮南楊行宻舉奉天之師寇徐州幽州劉仁恭又舉十萬衆攻陷其郡從周自山東馳救魏壁入上萬嵗亭下遲明燕人突上水闗攻館陶門從周與賀德倫李暉馬言騎五六百人出壁外謂門者曰前有大敵不可返顧命下柵闔焉與德倫等殊死戰燕人大衂擒其將薛突厥王鄶郎等翌日乘勢統諸將張存敬齊奉國程暉等連破八寨襲至臨清擁其師于御河溺死甚衆恭走滄州范居實為左神勇軍使開平元年命居實統軍以解澤州之圍楊師厚為潞州營都招討使時晉王與周德威丁會符存審等以大衆攻晉州甚急太祖遣師厚帥兵援之軍至綘州晉軍扼蒙坑之險師厚整衆而前晉人乃徹圍而通康懷英開平三年為陜州節度使西路行營副招討使逆將劉知俊叛入鳯翔宋文通地褊不能容遂藉兵知俊以窺靈武且圖牧擾之利韓遜馳驛告急乃命懷英率諸軍逼邠寧以緩朔方之寇知俊不果入懷英使奏十二月二十八日逆賊劉知俊自靈武抽回取涇州路入鳯翔王檀為潞州東北面行營招討使乾化元年正月王景仁與晉人戰於栢鄉王師敗績河朔大震景仁餘衆為虜騎所追檀戒嚴設備應接敗軍助以資裝獲濟者甚衆李振為天雄軍節度副使乾化元年二月戊午晉軍圍魏州軍於南門庚申振與杜廷隠等自楊劉口偷路夜入鄴城晉軍乃解圍而退寇彦卿末帝貞明初授鄧州節度使㑹淮人圍安陸彦卿奉詔領兵解圍大破淮賊而回後唐李嗣昭少從武皇征伐精練軍機唐乾寧初王珂王珙争帥河中珙引陜州之軍攻珂珂求救於武皇乃令嗣昭將兵援之敗珙軍於猗氏獲賊將李璠等四年改衙内都將復援河中敗汴軍於胡辟堡擒汴將滑禮史儼為武皇帳中親將乾寧中與李承嗣率騎渡河援兖鄆時汴軍雄盛自青徐兖鄆柵壘相望儼與騎將安福順等每以數十騎直犯營壘左俘右斬汴軍為之披靡周德威為晉陽衙將天祐三年幽州求援德威與李嗣昭合燕軍五萬攻潞州降丁㑹明年正月授德威檢校太保代州刺史督内外衙蕃漢馬步諸軍六月梁將李思安寇潞州下夾城以絶援軍武皇以德威為行營都指揮使應援潞州二年之間大小百戰五年四月二十四日從莊宗再援潞州二十九日德威前軍營横碾距潞州四十五里五月朔晨霧晦暝王師伏於三垂岡翌日直趨夾城斬闗破壘梁人大敗解潞州之圍莊宗南伐德威聞劉鄩西寇晉陽自幽州帥騎千人赴援至土門闗聞賊東下信宿至南營知劉鄩在京城其夜選十餘騎逼賊營擒賊斥候者詰其軍所向因斷其腕令還賊見之大駭遲明德威畧賊營而過至於臨清劉鄩起軍駐貝州德威帥前鋒設伏於河上詰且獲十餘騎而還時帝出師屯于博州劉鄩營堂邑德威自臨清率騎五百人赴堂邑賊聞德威之來乃伏兵桑下德威不之察摩壘挑戰俘斬百餘級而還賊自桑間歘起衆軍大駭德威控弦接戰數十合既而賊軍大至德威稍却且戰且行與賊轉鬭五十餘里會日暮兵解李嗣本唐光化中累歴右職天祐四年李思安寇潞州築夾城從周德威將兵赴援擒生斬將嵗中數千計五年破夾城張承業為莊宗監軍天祐五年六月鳯翔李茂貞邠州楊崇本會西川王建之師五萬攻長安汴將同州刺史劉知俊偽西京尹王重師以兵逆戰於漢谷邠岐不利而退時岐州㑹兵於我莊宗及承業會之李嗣肱為三城巡檢知衙門内事天祐七年周德威援靈夏党項阻道音驛不通嗣肱奉命自麟州渡河應援德威與党項轉戰千里合德威軍李存審為蕃漢總管副使天祐八年存審以三千騎屯趙州九年梁人攻蓨縣又與史建瑭赴援下博梁人驚亂燒營而去李紹衡為周德威騎將天祐十年正月乙巳梁將楊師厚劉守竒率邢洺魏博徐兖汴滑之衆十萬大掠鎮冀師厚自邢州栢鄉攻王門逼趙州庚戌至鎮州營於南門外燔其闗城士子史建瑭自趙州領騎五百入鎮州是日王德明亦自西山入師厚知其有備自九門軍於下博劉守竒以一軍自貝州入掠冀州衡水阜城與師厚㑹所在焚蕩廬舍驅虜人物陷下博城我趙州戍將李存審史建瑭兵寡不敵周德威令紹衡㑹存審徴鎮州大將王德明兵同襲賊乙丑王鎔遣使告急於德威分兵赴援師厚守竒自弓髙渡御河而東寇滄州張方進懼請歸河南師厚表為青州節度使以劉守竒代之而旋石嘉才為李嗣昭騎將天祐十三年梁將劉鄩既敗據滑州梁主召之不至是月梁遣别將王檀率衆五萬自河中入陰地寇我晉陽昭義李嗣昭遣嘉才率騎二百赴援賊方至營壘未成城中有故將安金全率驍騎夜出薄之賊衆大潰俘斬而還賊人自是膽破李建及為魏博内外衙都將天祐十六年汴將賀瓌攻德勝南城以戰船十餘艘竹笮維之扼㫁津路師不得渡城中矢石將盡守城將氏延賞危急莊宗置金帛軍門召能破賊船者津人有馬破龍者能水游乃令往見延賞延賞言危窘極矣所争晷刻時棹船滿河流矢雨集建及披重鎧執稍呼曰豈有限一衣帶水縱賊如此乃以二船實甲士皆短兵持斧徑抵梁之戰艦斧其笮又令上流具甕積薪其上順流縱火以攻其艦須臾煙焰騰熾梁軍㫁纜而遁建及入南城賀瓌解圍而去李存賢為慈州刺史天祐十八年河中朱友謙來求援命存賢率師赴之十九年汴將段凝軍五萬營臨晉蒲人大恐咸欲歸汴或間於存賢曰河中將士欲拘公降於汴存賢曰吾奉命援河中死王事固其所也汴軍退以功加檢校司空李嗣恩年十五能騎射事武皇帳下以戰功為馬軍都尉救應河府賊出不備彎弧盪寇應弦斃者甚衆矟中其口酣戰未解及退莊宗親撫其傷深加慰勉石君立為李嗣昭前鋒敵人畏之王檀之逼晉陽也城中無備安金全驅市人以登陴保守不完時莊宗在魏博救應不暇人心危懼嗣昭遣君立率五百騎自上黨朝發暮至王檀游軍扼汾橋君立一戰敗之徑至城下馳突斬擊出入如神大呼曰昭義侍中大軍至矣是夜入城與安金全等分出諸門擊殺於外遲明梁軍敗走晉張彦珂為副都指揮使髙祖天福七年二月同州奉鄜延州書報勾抽兵士同共殺戮逆黨已差彦珂部領兵士八百人赴之周廣友為鄜州衙内都指揮使天福七年二月鄜州周宻奏差男廣友部領馬步兵士二百人往延州救應殺戮逆黨却回到州漢史𢎞肇為許州節度使充侍衛步軍都指揮使㑹王守恩以上黨求附契丹命大將耿崇美率衆登太行欲取上黨髙祖命𢎞肇以軍應援軍至潞州契丹退去李彦從為左飛龍使鎮州逐冦之際請兵于朝廷髙祖令彦從率軍赴之郭瓊為沂州刺史隠帝乾祐三年宻州刺史王萬敢奏奉詔領兵入海州界至秋水鎮俘掠焚蕩更請益兵詔瓊率禁軍赴之陳思讓為淄州刺史乾祐末湖南上言朗州馬希蕚引五谿蠻及淮南洪州軍來攻當道望量差兵士於淮境牽引帝遣思讓令領軍入淮南界以便益進用册府元龜卷四百十四
