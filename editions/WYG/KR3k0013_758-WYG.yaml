body:
  text: 册府元龜卷七百五十八宋王欽若等撰總錄部忠書曰為下克忠傳曰忠為令德蓋士之䇿名從官委質事君無貳爾心不為義疚時危而節見累至而行明周旋夷險秉操彌厲遭值事變守死無改是皆忠之屬也中代而下曷嘗無其人哉至乃勤身翼衛盡規縫闕誠心内著謹力兼茂義形於顛沛志烈於屯難去就之際確然不渝兇醜之㑹毅然有守垂讜言於將沒全大節而隕命其或卑處綱佐退居士伍亦乃拳拳朂勉存心王室雖在􅅵畆猶不忘君斯可以為純臣矣漢周緤沛人也以舍人從髙祖起沛嘗為參乘髙祖戰有利不利終亾離上心帝以緤為信武侯以其忠信故加此號帝欲自撃陳豨緤泣曰始秦攻破天下未曽自行今上嘗自行是亾人可使者乎帝以為愛我賜入便門不趨封緤為䣙城侯梅福為南昌尉豫章之縣後去官歸壽春數因縣道上言變事附縣道之使而封奏也變謂非常之事求假軺傳小車之傳也詣行在所條對急政條對者一一條録而對之龔勝字君實楚人徴光禄大夫稱疾乞骸骨哀帝賜䇿歸老於鄉里王莽既簒國遣五威將帥行天下風俗將帥親奉羊酒存問勝明年莽復遣使者即拜勝為講學祭酒勝稱疾不應徴後二年莽復遣使者奉璽書太子師友祭酒印綬安車駟馬迎勝即拜秩上卿先賜六月禄直以辦裝使者與郡太守縣長吏三老官屬行義諸生千人以上入勝里致詔使者欲令勝起迎乆立門外勝稱病篤為牀室中戸西南牖下東首加朝服拖紳使者入戸西行南面立致詔付璽書遷延再拜奉印綬内安車駟馬進謂勝曰聖朝未嘗㤀君制作未定待君為政思聞所欲施行以安海内勝對曰素愚加以年老被病命在朝夕隨使君上道必死道路無益萬分使者要說至以印綬就加勝身輙推不受使者即上言方盛夏暑熱勝病少氣可須秋凉乃發有詔使者五日一與太守俱問起居為勝兩子及門人高暉等言朝廷虛心待君以茅土之封雖疾病宜動移至傳舍示有行意必為子孫遺大業暉等白使者語勝自知不見聽即謂暉等吾受漢家厚恩亡以報今年老矣旦暮入地誼豈以一身事二姓下見故主哉語畢遂不復開口飲食積十四日死後漢王豐為光武突騎光武追尤來等賊乘勝輕進反為所敗賊追及短兵接帝自投高岸豐急下馬援帝帝撫其肩而上顧笑謂耿弇曰㡬為虜嗤弇頻射却賊得免趙憙素與鄧奉善後奉反於南陽憙數遺書切責之而讒者因言憙與奉合謀光武以為疑及奉反帝得憙書乃驚曰趙憙真長者也即徴憙引見賜鞍馬待詔公車憙位至太傅錄尚書事劉翊潁川人獻帝遷都西京翊舉上計椽是時冦賊興起道路隔絶使驛稀有達者翊夜行晝伏及到長安詔書嘉其忠勤特拜議郎遷陳留太守何顒字伯求辟司空府及董卓秉政逼顒以為長史託病不就乃與司空荀爽司徒王允等共謀卓㑹爽薨顒以他事為卓所繋憂憤而卒張温字伯慎少有名譽累登公卿亦陰與司徒王允共謀誅卓事未及發而見害田豐為侍御史棄官歸家時袁紹起義兵卑辭厚幣以招致豐豐以王室多艱志存拯救乃應紹命以為别駕勸紹迎天子紹不納陳珪為沛相時吕布在下邳袁術欲結布為援乃為子索布女布許之時布在徐州許以女嫁之術遣使韓𦙍以􅆫號議告布并求迎婦珪恐術布成婚則徐揚合從將為國難於是徃說布曰曹公奉迎天子輔贊國政威靈命世將征四海將軍宜與恊同䇿謀圖泰山之安今與術結婚受天下不義之名必有累卵之危布以怨術初不已受也女已在途追還絶婚械送韓𦙍梟首於市珪欲使子登詣曹公布不肯遣㑹使者至拜布左將軍布大喜即聽登徃并令奉章謝恩后布為曹公所圍乃遣許汜王楷告急於袁術術曰布不與我女理自當敗何為復來相聞耶汜楷曰明上今不救布為自敗耳布破明上亦破也術時僭號故呼為明上術乃嚴兵為布作聲援布恐術為女不至故不遣兵救也緜纒女身縛馬上夜自送女出與術曹公守兵相觸格射不得過復還城鄧羲為荆州劉表治中獻帝都許昌表雖遣使貢獻然北與袁紹相結羲諫表表不聽漢晉春秋曰表答羲曰内不失貢職外不背盟主此天下之達義也治中獨何怪乎羲辭疾而退終表之世不出元尚獻帝初為兖州刺史東之郡而魏太祖已臨兖州尚南依袁術術僭號欲以尚為太尉不敢顯言私使人諷之尚無屈意術亦不敢強也建安初尚逃還為術所害徐璆為東海相獻帝遷許以廷尉徴當詣京師道為袁紹所刼授璆以上公之位璆乃歎曰龔勝鮑宣獨何人哉守之必死術不敢逼術死軍破璆得其傳國璽及還許并送前所假汝南東海二郡印綬司徒趙退謂璆曰君遭大難尤存此邪璆曰昔蘇武困於匈奴不隊七尺之節况此方寸印乎臧洪為即邱長靈帝中平末棄官還家太守張超請為功曹時董卓殺帝圖危社稷洪說超曰明府歴世受思兄弟竝據大郡今王室將危賊臣虎視此誠義士效命之秋也今郡境尚全吏人殷富若動桴皷可得二萬人以此誅除國賊為天下倡義不亦宜乎超然其言與洪西至陳留見兄邈計事邈先謂超曰聞弟為郡委政臧洪洪者何如人超曰臧洪海内竒士才畧智數不比於超矣邈即引洪與語大異之乃使詣兖州刺史劉岱豫州刺史孔伷遂皆相善邈計先有謀約㑹超至定議與諸牧守大㑹酸棗設壇塲將盟既而更相辭譲莫敢先登咸共推洪洪乃攝衣升壇㰱血而盟曰漢世不幸皇綱失統賊臣董卓乘釁縱害毒流百姓大懼淪䘮社稷翦覆四海兖州刺史岱豫州刺史伷陳留太守邈東郡太守瑁廣陵太守超等糾合義兵竝赴國難凡我同盟齊心一力以致臣節隕首䘮元必無二志有渝此盟俾墜其命無克遺育皇天后土祖宗明靈皆鑒之洪辭氣慷慨聞其言者無不激揚魏李乾初平中以衆隨太祖破黄巾於壽張又從擊袁術征徐州吕布之亂太祖遣乾還乘氏慰勞諸縣布别駕薛蘭治中李封招乾欲俱叛乾不聽遂殺乾蜀法正字孝直先主與曹公争勢有不便宜退而先主不肯退無敢諫者矢下如雨正乃徃當先主前先主云孝直避箭正曰明公親當矢石况小人乎先主乃曰孝直吾與汝俱去遂退位至尚書令䕶軍將軍趙雲為先主車騎曹公追先主於當陽長阪棄妻子南走雲身抱弱子即後主也保䕶甘夫人即後主母也皆得免難遷為牙門將軍吴谷利為孫權左右給使以謹直為親近監權征合淝乘駿馬上津橋橋南已見撤丈餘無板谷利在馬後使權持鞍緩控利於後着鞭以助馬勢遂得超渡權既得免即拜利都亭侯於武昌新裝大船名為長安試泛之釣臺沂時風大盛谷利令舵工取樊口權曰當張頭取羅州利拔刀向舵工曰不取樊口者斬工即轉舵入樊口風遂猛不可行乃還權曰阿利畏水何怯也利跪曰大王萬乘之主輕於不測之淵戲於猛浪之中樓船裝高邂逅顛危柰社稷何是以利輙敢以死争權於是貴重之自此后不復名之嘗呼曰谷陳表父武為偏將軍從孫權擊合淝戰死孫權復其客二百家在㑹稽表簡視其人皆堪好兵乃上疏陳讓乞以還官充足精銳詔曰先將軍有功於國國家以此報之卿何得辭焉表乃稱曰今除國賊報父之仇以人為本空枉此勁鋭以為僮僕非表忠也皆輙科取以充部伍所在以聞權甚嘉之下郡縣科正户羸民以補其處石偉有節操高行及吴亾晉武帝詔曰吴故光禄大夫石偉秉志清白皓首不踰雖處危亂亷節可紀年已過邁不堪逺涉其以偉為議郎加二千石秩以終厥世偉遂陽狂及盲不受晉爵晉郭琦為右著作郎趙王倫簒位又欲用琦琦曰我已為武帝吏不欲復為今世吏終身處於家王允之年在總角從伯敦謂為似已嘗以自隨出則同輿入則共寢敦嘗夜飲允之辭醉先卧敦與錢鳯謀為逆允之已醒悉聞其言慮敦或疑已便於卧處大吐衣面竝汚鳯既出敦果然視見允之卧吐中以為大醉不復疑之時父舒始拜廷尉允之求還定省敦許之至都以敦鳯謀議事白舒舒即與導俱啟明帝成帝初隨舒之㑹稽及蘇峻反允之討賊有功封番禺縣侯邑千六百户劉敬宣為㑹稽王世子元顯征虜叅軍事隆安二年王恭起兵於京口以誅司馬尚之兄弟為名敬宣父牢之為恭前軍司馬輔國將軍晉陵太守置左領兵而恭以豪戚自居甚相陵忽牢之心不能平及恭北舉牢之為前鋒太傅㑹稽王道子與牢之書備言禍福使以兵反恭牢之呼敬宣曰吾與王恭皆蒙先帝殊恩今居元舅之重義心未彰唯兵是從吾不能審恭事捷之日必能奉戴天子緝穆宰相與否今欲奉國威靈以明逆順汝以為何如敬宣曰朝廷雖無成康之隆未有桓靈之亂而恭怙亂阻兵志陵京邑大人與恭親無骨肉分非君臣雖共事少時意好不協今日討之於情何有牢之至竹里斬恭大將顔延遣敬宣率髙雅之等還京襲恭恭方出城躍軍馳騎横擊之一時散潰元顯進號後將軍以敬宣為諮議叅軍又加寧朔將軍後為輔國將軍謀襲桓𤣥不克與司馬休之髙雅之等奔長安求救於姚興得兵數千人又為𤣥所破乃奔慕容徳敬宣素曉天文知必有興復晉室者又夢丸土而服之既覺喜曰丸者桓也桓既吞矣吾復本土乎乃結青州大姓諸崔并要鮮卑大帥免達謀滅德推休之為主克日垂時劉軌為德司空大被委任雅之又欲要軌敬宣曰此公年老吾觀其有安齊志必不動不可告也雅之以為不然遂告軌軌果不從謀頗泄相與殺軌而去韓遥之安帝時為荆州治中轉平西府錄事叅軍以劉裕父名翹字顯宗遥之遂字顯宗名兒為翹以示不臣劉氏與司馬休之俱奔姚興劉裕入關又奔於魏劉邁仕桓𤣥後為竟陵太守及劉毅與劉裕等同謀起義邁將應之事泄為𤣥所害宋張暢為南譙王長史義宣既有異圖蔡趍等以暢民望勸義宣留之及解南蠻校尉以授暢加冠軍領丞相長史遣門生茍僧保下都因顔竣陳義宣釁狀僧寶有私貨停巴陵不時下舍義宣起兵津徑斷絶僧寶遂不得去義宣將為逆遣嬖人翟靈寶謂暢朝廷簡練舟甲意在西討今欲發兵自衛暢曰必無此理請以死保之靈寶知暢不廻勸義宣殺以狥衆即遣召暢止於東齊彌日不與相見賴司馬竺超民保持故獲全免既而進號撫軍别立軍部以收民望暢雖署文撫檄飲酒嘗醉不省文書隨義宣東下梁山戰敗義宣奔走暢於亂兵自歸為軍人所掠衣服都盡值右將軍王𤣥謨乘輿出營暢已得敗衣遂排𤣥謨上轝𤣥謨意甚不悦諸將欲殺之隊主張世營救免送京師下廷尉削爵土配左右尚方尋見原復起為都官尚書庾炳之為始興王鎮軍長史於時領軍將軍劉湛協附大將軍彭成王義康而與僕射殷景仁有隙凡朝士遊殷氏者不得入劉氏之門獨炳之遊二人之間密盡忠於朝廷景仁稱疾不朝見者歴年太祖嘗令炳之銜命去來湛不疑也義康出藩湛伏誅以炳之為尚書吏部郎與右衛將軍沈演之俱叅機密王僧䖍遷司徒左西屬兄僧綽為元凶所害親賓咸勸避難僧䖍涕泣曰吾兄奉國以忠貞撫我以慈愛今日之事苦不見及耳若得同歸九泉猶羽化也袁淑為太子左衛率元凶劭將為逆其夜淑在直二更許呼淑及蕭贇等流涕謂曰主上信讒將見罪廢省内無過不能受枉明旦便當行大事幸相與戮力淑及贇曰自古無此願加善思劭怒變色左右皆動贇懼乃曰臣昔忝伏事嘗思效節况憂廹如此輙當竭身奉令淑叱之曰卿便謂殿下真有是也殿下㓜時嘗患風或是疾動耳劭愈怒因曰事當克不淑曰居不疑之地何患不克但既克之後為天地之所不容大禍亦旋至耳願急息之劭左右引淑等衿褶又就主衣取錦截三尺為一段又中破分贇淑及左右使以縛袴淑出還省繞床行至四更乃寢劭將出已與蕭贇同載呼淑甚急淑眠終不起劭停車風化門催之相續徐起至車後劭使登車又辭不上劭因命左右與手刄見殺於風化門外時年四十六程天福隨孝武鎮彭城後魏太武親率大衆至彭城遣人云魏主致意安北程天祚一介常人誠知非宋朝之美近於汝陽身被九創落在殿外我手牽而出之凡人骨肉分張竝思集聚輙已語之但其弟苦辭今令與來使相見天福謂使人曰兄受命汝陽不能死節各在一國何煩相見巢遂為綏安令時㑹稽太守孔顗反義興諸縣唯遂守節不移不受偽爵王孚大明末為海鹽令泰始初天下反叛唯孚獨不同逆劉彌之青州人明帝即位薛安都反青州刺史沈文秀遣彌之及張靈慶崔僧璇三軍應安都彌之等尋歸順彌之青州強姓門族甚多諸宗從相合率奔北海據城以拒文秀何承天東海郯人謝晦鎮江陵請為南蠻長史及晦進號衛將軍轉為諮議叅軍時朝廷既誅徐羡之將討晦晦率兵既下承天留府不從及到彦之至馬頭承天自詣請罪彦之以其有誠宥之使行蠻府事後為廷尉卒邵領宗彭城人竟陵王誕舉兵反孝武遣沈慶之討伐彭城領宗在城内陰結死士欲襲誕先欲布誠於慶之乃說求為間諜見許領宗既出致誠畢復還城内事泄誕鞭二百考問不服遂支解之尹𤣥慶為海陵王休茂叅軍休茂殺司馬庾深之等徴兵為亂𤣥慶起義兵攻襲休茂生擒之將出中司馬斬首休茂平以𤣥慶為射聲校尉南齊桓康勇果驍悍宋大明中隨太祖為軍容使從世祖在贑縣㤗始初世祖起義為郡所縶衆皆散康裝擔一頭貯穆后一頭貯文惠太子及竟陵王子良自負置山中與門客蕭欣祖楊瑑之臯分喜潛三奴向思奴四十餘人相結破郡獄出世祖郡追急康等死戰破之曹道剛字景昭彭城人性質直蕭諶之廢立也道剛死之初廢帝雖與道剛狎而未嘗敢詶帝悦市里雜事以為歡樂道剛輙避之益州韓䕶善騎馬帝嘗呼入華林園中令騎嘗狎之道剛出謂明帝主上猶是小兒左右皆須正人使日見禮則近聞韓䕶與天子齊馬竝馳此導人君於危地道剛欲殺之既而遣人刺䕶及道剛死張融謂劉繪曰道剛似不為謟亦復不免也答曰夫徑寸之珠非不寳也而蜯之所病云何不療之哉此道剛所以死也杜文謙者呉郡錢塘人明帝為南郡王文謙侍五經文局歴太學博士出為溧陽令未之職㑹帝知權蕭諶用事文謙乃謂舍人綦母􅎇之曰天下事可知灰盡粉滅匪朝伊夕不早為計吾徒無類矣珎之曰計將安出答曰先帝故人多見擯斥今召而使之誰不慷慨近聞王洪軌與趙越嘗徐僧亮萬靈㑹共語皆攘袂搥床君其密報周奉叔使萬靈㑹魏僧勔殺蕭諶則宫中之兵皆我用也即勒兵入尚書斬蕭令兩郡伯力耳其次則遣荆軻豫讓之徒因諮事左手頓其胸則方寸之刄足以立事亦萬世一時也今舉大事亦死不舉事亦死二死等耳死社稷可乎若遲疑不斷復少日録君稱勑賜死父母為殉在眼中矣􅎇之不能用時徐龍駒亦當得封􅎇之恥龍駒共詔因求别立事未及行而事敗􅎇之在西州時有一手板相者云當貴每以此言動帝又圖黄門郎帝嘗問之曰西州時手板何在􅎇之曰此是黄門手板官何須問帝大笑􅎇之時為左將軍南彭城太守領中書通事舍人正直宿宣㫖使即徃蔣王廟祈福因收送廷尉周奉叔文謙同死文謙有學行善言吐其父聞其死曰吾所以憂者恐其不得死地耳今以忠義死復何恨哉王經母所以欣王經之義也時人美其言梁江革為豫章王長史時魏徐州刺史元僧降附革被勑隨府主鎮彭城城既失守革素不便馬乃泛舟而還途經下邳遂為魏人執之魏徐州刺史安豐王延明聞革才名厚加接待革稱患脚不拜延明將加害焉見革辭色嚴正更相敬重時祖暅同被拘縶延明使暅作欹器漏刻銘革唾罵暅曰卿荷國厚恩已無報答今乃為虜立銘孤負朝廷延明聞之乃令革作丈八寺碑并祭彭祖文革辭以囚執既久無復心思延明逼之愈苦將加以箠撲革厲色而言曰江革行年六十不能殺身報主今日得死為幸誓不為人執筆延明知不可屈乃止日給脫粟三升僅餘性命值魏帝討中山王元畧反乃放革及祖暅還朝詔曰前貞威將軍鎮北長史廣陵太守江革才思通瞻出内有聞在朝正身臨危不撓首佐台鉉實允僉請可太尉臨川王長史張譏為士林館學士侯景陷臺城譏﨑嶇踄難卒不事景樂子雲位江陵丞魏克江陵衆奔散呼子雲子雲曰終為虜矣不如守以死節遂仆地卒於馬蹄之下陳沈文阿仕梁為五經博士簡文在東宫引為學士及侯景冦逆簡文别遣文阿招募士卒入援京師城陷與張嵊共保呉興嵊敗文阿竄於山野景素聞其名求之甚急文阿窮廹不知所出登樹自縊遇有所親救之便自投而下折其左臂及景平髙祖以文阿州里表為原鄉令監江陰郡蕭摩訶為侍中驃騎大將軍隋總管賀若弼襲京口摩訶衆潰被執及京城陷賀若弼置後主於德教殿令兵衛守摩訶請弼曰今為囚虜命在斯須願得一見舊主死無所恨弼哀而許之摩訶入見後主俯伏號泣仍於舊厨取食而進之辭訣而出守衛者皆不能仰視後魏穆崇代人也道武之居獨孤部崇嘗徃來奉給窟咄之難崇外甥于植等謀執道武以應之告崇曰今窟咄已立衆咸歸附富貴不可失願舅圖之崇乃夜告道武道武誅植等北踰隂山復幸賀蘭部崇甚見寵待位至太尉徙宜都公卒張兖為幽州刺史道武天興初徴還後與崔逞答晉將書失㫖黜為尚書令史及疾篤上疏曰臣既庸人志無殊操值太祖誕應期運天地始開叅戎氛霧之初馳驅革命之㑹托翼鄧林寄鱗溟海遂荷恩寵榮兼出内陛下龍飛九五仍叅顧問曽無微誠塵山露海今舊疾彌留氣力虚損天羅有罪將填溝壑然犬馬戀主敢不盡言方今中夏雖平九域未一西有不賔之𦍑南有逆命之虜岷蜀殊風遼海異教雖挺生明聖撥亂乘時而因㡬撫㑹實須經畧介焉易失切在人謀伏願恢崇叡道尅廣德心使揖讓與干戈竝陳文德與武功俱運則太平之化康哉之美復隆於今不獨前世昔子囊將終寄言城郢荀偃辭含遺恨在齊臣雖闇劣敢􅁯前志魂而有靈結草泉壤後數日卒婁提獻文時為内三郎獻文厭世提謂人曰聖主升遐安用活為遂引佩刀自刺㡬至於死明文太后詔賜帛貳百疋甄􅎇為侍郎領御史中尉坐朋黨免官時以鷹犬馳逐自娱朝廷有大事尤上表陳情徐遵明華隂人講學於外二十餘人莊帝永安二年元顥入雒任城太守李湛將舉義兵遵明同其事夜至民間為亂兵所害泉元禮雒州都督企之子東魏高敖曹圍逼雒州杜窋為其鄉道城既陷敖曹報企而企密誡元禮及其弟仲遵致力本朝仲遵以被傷不行元禮亦於路逃歸時杜窋雖為刺史然巴人素輕杜而重泉及元禮至與弟仲遵相見感父臨别之言潛與豪右結托信宿之間遂率鄉人襲州城斬窋傳首長安朝廷嘉之拜衛將軍驃騎大將軍世襲雒州刺史後元禮於沙苑戰沒復以仲遵為雒州刺史遵宿稱幹畧為鄉里所歸及為本州頗得時譽梁韋嵩遵為蕭寶夤中兵叅軍深見信任寶夤反令嵩遵率衆出征嵩遵偽受其署既行之後遂與侯德等還來襲城以功封烏氏縣開國伯邑伍百户蘇湛為蕭寶夤行臺郎中深見委任孝昌中寶夤大敗東還朝廷以為雍州刺史後自猜懼害中尉酈道元乃稱兵反時湛卧疾於家寶夤令姜儉報湛云元畧受蕭衍意㫖乃欲見除酈道元之來事不可測居不能坐受死亾今便為身計不復作魏臣也與卿契濶故以相報死生榮辱與君共之湛聞舉聲大哭儉遽止之曰何得便爾湛曰百口居家即時屠滅如何不哭哭數十聲徐謂儉曰為我白齊王王本以窮鳥投人賴朝廷假王羽翼榮寵至此國步多虞不能竭忠報德乃欲乘人間隙有不臧之心信惑行路無識之語欲以羸敗之兵守關問鼎今魏德雖衰天命未改且王之恩義未洽於民但見其敗未見有成蘇湛不能以百口居家為王族滅寶夤復報曰此自救命之計不得不爾所以不先相白者恐沮吾計故耳湛復曰凡為大事嘗得天下竒士今但共長安博徒小兒輩計較辨有成理不湛恐荆棘必生庭閣願乞骸骨歸鄉里脫得因此病死以下見先人寶夤素重之以其病篤且知不為已用聽還武功寶夤敗莊帝即位徴補尚書郎既至莊帝曰前聞卿答蕭寳夤甚有美辭為我説也湛頓首謝曰臣雖言語不如伍被始終不易自謂過之然臣與周遊契濶言得盡心而不能令其不反臣之罪也莊帝悅拜散騎都尉仍領侍郎賈景雋以學識知名奉朝請遷京兆王愉府外兵叅軍愉起逆於冀州將授其官景雋不受愉殺之永平中贈東清河太守謚曰貞王士良孝莊末為爾朱仲逺府叅軍事與紇豆陵叔藩交戰軍敗為藩擒遂居河右偽行臺紇豆陵伊利欽其才擢授右丞妻以孫女士良既為姻好便得盡言遂曉以禍福伊利即歸附朝廷嘉之北齊崔仲文東魏興和中為丞相掾沙苑之敗仲文持馬尾以渡河及中流乍沒乍出高祖望見之曰崔掾也遽遣船赴接既濟勞之曰卿為親為君不顧萬死可謂家之孝子國之忠臣加中軍將軍王紘為奉朝請蘭京之亂紘冐刄捍禦以其忠節賜爵平春縣男賚帛七百段綾錦五十疋錢三萬竝金帶駿馬仍除晉陽令後周蔡襲高平人名著西州魏孝明正光中万侯奴冦亂關中襲乃背賊乘妻子歸雒陽拜齊安郡守李逺其先隴西人也魏正光中天下鼎沸勑勒賊胡琮侵逼原州其徒甚盛逺昆季率勵鄉人欲圖拒守而衆情猜懼頗有異同逺乃按劔而言曰頃年以來國家多難凶黨乘機肆其毒螫王畧未振緩其梟夷正是忠臣立節之秋義士建功之日丈夫豈可臨難茍免當在死中求生耳諸人竝世載忠貞沐浴教義今若棄同即異去順就逆雖三尺童子猶或非之將復何顔以見天下之士有異議者請以劍斬之於是衆皆股慄莫不聽命乃相與盟㰱遂深壁自守而外無救援城遂陷其徒多被殺傷唯逺兄弟竝為人所匿得免逺乃言於兄賢曰今逆賊孔熾屠戮忠良逺欲間行入朝請兵救援兄晦跡和光可以免禍内同釁隙因變立功若王師西指得表裏相應既殉國家之急復全私室之危豈若窮廹凶威坐見夷滅賢曰是吾心也遂定東行之䇿遠乃﨑嶇冦境得達京師魏朝嘉之授武騎常侍俄轉别將賜帛千疋并弓矢衣馬等皇甫續武帝建德初為宫尹中侍武帝避暑雲陽宫時宣帝為太子監國衛刺王作亂城門已閉百僚多有遁者續聞難赴之於𤣥武門遇皇太子下樓執續手悲喜交集帝聞而嘉之遷小宫尹薛端汾隂人初為司空髙乾雍叅軍以天下擾亂遂棄官歸鄉里魏孝武西遷文帝令大都督薛宗禮據龍門引端同行崇禮尋失守降東魏東魏遣行臺薛循義都督一千兵西度據楊氏壁端與宗親及家僮等先在壁中循義乃令其兵逼端等東渡方欲濟河㑹日暮端密與宗室及家僮等叛之循義遣騎追端且戰且馳遂入石城栅得免栅中先有百家端與并力固守貴等數來慰諭知端無降意遂收還河東東魏又遣其將賀蘭懿南汾州刺史薛琰達守楊氏壁端率其屬并招喻村民等多設竒兵以臨之懿等疑有大軍便東進船溺死者數千人端收其器械復還楊氏壁文帝遣南汾刺史蘇景恕鎮之降書勞問徴端赴闕以為大丞相府户曹叅軍盧辨范陽涿人也初魏孝武入關事起倉卒辨不及至家單馬而從或問辨曰得辭家不辨曰門外之治以義斷恩復何辭也孝武至長安授給事黄門侍郎領著作太祖以辨有儒術甚禮之朝廷大議嘗日顧問趙青雀之亂魏太子出居渭北辨時隨從亦不告家人其執志敢決皆此類也册府元龜卷七百五十八
