body:
  text: 册府元龜卷八百六十四宋王欽若等撰總錄部仁信儉謹慎好謙仁孔子曰仁者其言也訒訒繇難也謂仁之難言之又曰唯聖與仁則吾豈敢大哉仁者五常之首百行之宗妙入聖域冲乎天道得其禀者無夷夏無貴賤堯舜其心周孔其化人受其賜物被其澤矣孔子釣而不綱弋不射宿釣者一竿鈎以繳繫鈎綱羅屬為大網以横絶流著綱弋繳射也宿宿鳥秦西巴魯人孟孫獵得麑使西巴持歸烹之西巴不忍而與其母孟孫怒逐西巴居一年取為子傅曰夫一麑猶不忍况人乎田子方魏人出見老馬於道喟然有志焉以問於御者曰此何馬也曰故公家畜也罷而不為用故出放也田子方曰少盡其力而老去其身仁者不為也束帛而贖之窮士聞之知所歸心漢張歐為吏未嘗言案人剸以誠長者處官剸與專同具獄事有可卻卻之不可者不得巳為涕泣面而封之面謂偕之也其愛人如此杜緩為太常治諸陵縣每冬月封具獄日常去酒省食獄案已具當論决之故封上官屬稱其有恩後漢鍾離意為郡督郵會稽大疫死者萬數意獨身自隱親經給醫藥隱謂親自隱恤之經給謂經營濟給之所部多蒙全濟舉孝亷再遷辟大司徒矦霸府詔部送徒詣河内時冬寒徒病不能行路過𢎞農意輙移屬縣使作徒衣縣不得已與之而上書言狀意亦具以聞光武得奏以見霸曰君所使掾何乃仁於用心誠良吏也曹褒為射聲校尉射聲營見有停棺不葬者百餘所褒親自履行問其意故吏對曰此等多是建武以來絶無後者不得埋掩褒乃愴然為買空地悉葬其無主者設祭以祀之遷城門校尉將作大匠時有疾疫褒廵行病徒為給醫藥經理饘粥多蒙濟活鄧訓司徒禹之第六子明帝卽位初以為郎中訓謙恕下士無貴賤見之如舊朋友子徃來門内視之如子有過加鞭朴之教太醫皮廵從獵上林還暮宿殿門下寒疝病發時訓直事聞廵聲起徃問之廵曰兾得火以熨背訓身至太官門為求火不得乃以口噓其背復呼同廬郎共更噓至朝遂愈也盛吉字君逹為廷尉性多仁恩務在哀矜每至冬月罪當斷夜看刑狀其妻執燭吉手持丹筆夫妻相向垂泣廖扶汝南平輿人絶志世外專精經典歲荒歛葬遭疫死亡不能自收者甚衆折像廣漢雒人不仕㓜有仁心不殺昆蟲不折萌芽韓卓家奴臘日竊食祭其先卓義其心即日免之舒仲應為袁術沛相時江淮間相食殆盡術僭號天旱歲荒士民凍餒術以米十萬斛與為軍糧仲應悉散以給饑民術聞怒陳兵將斬之仲應曰知當必死故為之耳寧可以一人之命救百姓於塗炭術下馬牽之曰仲應足下獨欲享天下重名而不與吾共之耶晋劉驎之南陽人車騎將軍桓冲請為長史固辭不受去家百餘里有一獨媪疾將死歎息謂人曰誰當埋我唯有劉長史耳何繇令知驎之先聞其有患故徃候之值其命終乃身為治棺殯送之其仁愛惻隱如此郭翻武昌人不交世事嘗以車獵去家百餘里道中逄病人以車送之徒歩而歸宋嚴世期㑹稽山隂人好施慕善出自天然同里張邁三人妻各産子時歲饑儉慮不相存欲棄而不舉世期聞之馳徃拯救分食觧衣以贍其乏三子並得成長同縣兪陽妻莊年九十莊女蘭七十並各老病單孤無所依世期衣飴之二十餘年死並殯葬之宗親嚴𢎞鄉人潘伯等十五人荒年並餓死露骸不收世期買棺器殯埋存育孩㓜南齊江泌字士清性行仁義衣弊虱饑乃復取置衣中數日間終身無復虱有志行食菜不食心以其有生意也厯任南中郎行叅軍所給募吏去役得時病莫有舎之者吏扶杖投泌泌親自隠䘏吏死泌為買棺無僮役兄弟共埋之領國子􅂇教乘牽車見老翁歩行下車載之躬自歩去孔祐山隂人至行通神曽有鹿中箭來投祐祐為之養瘡愈然後去太守王僧䖍與張緒書曰孔祐敬康曽孫也行動幽祗德標松桂引為主簿遂不可屈此古之遺德也張融為儀曹郎攝祠倉二曹尋兼掌正厨融見宰殺廻車逕去自表觧職梁嚴植之字孝源為中撫軍叅軍率性仁慈好行隂德雖在闇室未嘗怠也少嘗山行見一患者植之問其姓名不能答載與俱歸為營醫藥六日而死植之為棺殯殮之卒不知何許人也嘗縁栅塘行見患人卧塘側植之下車問其故云姓黄氏家本荆州為人傭賃疾旣篤舩主將發棄之于岸植之心惻然載還治之經年而黄氏差請終身充奴僕以報厚恩植之不受遺以資糧遣之其義行多如此後魏凌子彰崇好道術曽嬰重疾藥中湏桑螵蛸子彰不忍害物遂不服焉其仁恕如此高謙之為國子博士好施贍恤言諾無虧居家僮𨽻對其兒不撻其父母生三子便免其一世無髠黥奴婢嘗稱俱禀人體如何殘害李亮妙於醫術亮大為㕔事以舎病人停車輿於下時有死者則就而棺殯親徃弔視其仁厚若此終前將軍領太醫令崔光為侍中皇興初有同郡二人並被掠為奴婢後詣光求哀光乃以二口贖免高祖聞而嘉之北齊房謨為丞相右長史以直甚被賞遇謨悉心盡力知無不為前後賜其奴婢率多免放神武後賜其生口多黥面為房字付之後周張元字孝始河北首城人六歲村陌有狗子為人所棄者元見卽收而養之其叔父怒曰何用此為將欲更棄之元對曰有生之類莫不重其性命若天生天殺自然之理今為人所棄而死非其道也若見而不収養無仁心也是以収而養之叔父感其言遂許焉未幾乃有狗母􅋦一死兎置元前而去隋乞伏惠為潭桂二州總管曽見人以簺捕魚者出絹買而放之其仁心如此百姓美之號其處曰西河公簺唐李大亮為安州刺史擒輔公祏將軍張善安以功賜奴婢百人大亮謂之曰汝軰多衣冠子女吾何忍以汝為賤𨽻乎一皆放遣高祖聞而嗟異復賜俚婢三十人任簡迪為天德軍使李景畧判官性重厚嘗有軍宴行酒者誤以醯進簡迪知誤以景畧法嚴慮坐主酒者乃勉飲盡之而偽容其過以酒薄白景畧請換之於是軍中皆感恱劉祥道為刑部尚書每覆大獄必歔欷而歎奏决之日為之再不食周馮道晋末為太尉封魏國公北虜犯闕隨虜北行在恒山見有中國士女為虜所俘者出槖裝以贖之皆寄於高尼精舎後相次訪其家以歸之信仲尼曰自古皆有死人無信不立則知君子勵不欺之節哲人懐可復之言自其誠而至於明發其中而形於外所以不言示於挂劒殺雞應乎千里郡兒赴於竹馬一諾重於黄金著行立誠可謂至矣延陵季子吳之公子將西聘晉帶寶劒以過徐君徐君觀劒不言而色欲之延陵季子為有上國之使未獻也然其心許之矣致使於晉顧反則徐君死於是脫劒致之嗣君從者止之曰此吳國之寶非所以贈也延陵季子曰吾非贈之也先日吾來徐君觀吾劒不言而其色欲之吾為有上國之使未獻也雖然吾心已許之矣今死而不進是欺心也愛劒違心廉者不為也遂脫劒與嗣君嗣君曰先君無命孤不敢受劒於是季子以劒帶徐君墓樹而去徐人嘉而歌之曰延陵季子􅀆不忘故脱千金之劒􅀆帶丘墓仲繇字子路衛人無宿諾宿猶豫也子路篤信恐臨時多故故不豫諾小邾射以句繹奔魯曰使季路要我吾無盟矣子路誠信故欲得與相要誓而不湏盟子路辭季康子使冉有謂之曰千乘之國不信其盟而信子之言子何辱焉吳起魏人示其妻以組曰子為我織組令如是組妻織組異善起曰非詔也使衣之而歸妻徃請之起曰家無虛言尾生與女子期於梁下女子不来水至不去抱梁柱而死漢季布楚人以然諾聞楚人為之諺曰得黄金百斤不如季布一諾後漢賈復王莽末爲縣掾迎鹽河東㑹遇盗賊等比十餘人皆放散其鹽復獨完以還縣縣中稱其信郭伋爲并州牧始至行部到西河美稷有童兒數百各騎竹馬於道路次迎拜伋問兒曹何自遠來對曰聞使君到喜故來奉迎伋辭謝之事訖諸兒復送至郭外問使君何日當還伋謂别駕從事計日當告之行部旣還先期一日伋為違信於諸兒遂止于野亭湏期乃入范式字巨卿一名汜少遊太學為諸生與汝南張劭為友劭字元伯二人並告歸鄉里式謂元伯曰後二年當還將過拜尊親見孺子焉乃共尅期日後期方至元伯具以白母請設酒饌以候之母曰二年之别千里結言爾何相信之審耶對曰巨卿信士必不乖違母曰若然當為爾醖酒至其日巨卿果到升堂拜飲盡歡而别吳太史慈字子義東萊黄人也漢末隨揚州刺史劉繇與長沙桓王䇿戰神亭戰敗為䇿所執䇿素聞其名卽觧縳請見咨問進取之術慈答曰破軍之將不足與論事䇿曰昔韓信定計於廣武今䇿决疑於仁者君何辭焉慈曰州軍新破士卒離心若儻分散難復合聚欲出宣恩安集恐不合尊意䇿長跪答曰誠本心所望也明日中望君來還諸將皆疑䇿曰太史子義青州名士以信義為先終不欺䇿明日大請諸將豫設酒食立竿視影日中而慈至䇿大恱嘗與參論諸軍事陳蕭允為光祿大夫性敦重未嘗以榮利干懐及晉安王出鎮湘州又苦擕允允少與蔡景歴善歴子徴修父黨之敬聞允將行乃詣允曰公年德並高國之元老從容坐鎮旦夕自為列曹何為方復辛苦在外答曰已許晉安豈可㤀信其恬於榮勢如此唐蕭至忠年少時與友人期於路隅會風雪凍洌諸人皆奔避就宇下至忠曰寜有與人期而求安失信乎獨不去衆咸歎服後為黄門侍郎同中書門下平章事王友貞懐州河内人出言未嘗負諾時論以為真君子中宗時以太子舎人徴固以疾辭儉先賢有言曰禮與其奢也寧儉又曰在約則乆是故節儉之行君子攸先若乃歴輔邦君繼登相事妾不衣帛家無私積以至受伐氷之祿列彯纓之位居室不餙田園以蕪處之有常克敦素履如此則豈獨遺清白於子孫亦可以免乎禍患矣鬬子文楚人三登令尹無一日之積成王聞子文朝不及夕也於是乎每朝設脯七束糗一箱以羞子文成王每出子文之祿子文必逃王止而後復人謂子文曰人生求富子逃之何也對曰從政者以庇人也人多曠者而我取富焉是勤人以自封也死無日矣我逃死非逃冨也趙盾晉大夫也晉靈公使勇士徃殺之勇士入俯而闚其户方食魚飱勇士曰嘻子誠仁人也子為晉國重卿而食魚飱見子之儉也君使我殺子吾不忍殺子也吾亦不可復見遂刎頸而死季文子魯大夫名行父相宣成無衣帛之妾無食粟之馬仲孫它諌曰子為魯上卿相二君矣妾不衣帛馬不食粟人其以子為愛其不華國乎文子曰吾亦願然吾觀國人其父兄之食麁而衣惡者猶多矣吾是以不敢人之父兄食麁衣惡而我美妾與馬無乃非相人者乎且吾聞以德榮為國華不聞以妾與馬文子以告孟獻子獻子它之父仲孫蔑也獻子囚之七日自是子服之妾衣不過七升之布子服卽它也八十􅈁為升馬餼不過稂莠文子聞之曰過而能改者民之上也使為上大夫又云文子卒大夫入歛宰尤家器為葬備無衣帛之妾無食粟之馬無藏金玉無重器備晏平仲名嬰者事齊靈公莊公景公節儉力行重於齊旣相齊食不重肉妾不衣帛祀其先人豚肩不掩豆澣衣濯冠以朝齊侯欲更晏子之宅晏子辭之及晏子之如晉公更其宅反則成矣旣拜拜謝新宅乃毁之而里室皆如其舊夲壊里室以大晏子之宅故復之則使宅人反之還其故室且諺曰非宅是卜唯隣是卜卜良隣二三子先卜隣矣二三子謂隣人違卜不祥君子不犯非禮去儉即奢為非禮小人不犯不祥古之制也吾敢違諸乎卒復其舊宅曽子曰晏子可謂知禮也已㳟敬之有焉有若曰晏子一狐裘三十年遣車一乘及墓而反國君七介遣車七乘大夫五介遣車五乘晏子焉知禮公孫舎之字子展鄭大夫儉而一居身儉而用心一公儀休為魯相奉法循理無所變更百官自正使食祿者不得與下民争利受大者不得取小食茹而美㧞其園葵而棄之見其家織布好而疾出其家婦燔其機云欲令農士工女安所讎其貨乎後漢祭遵潁陽人家富給而遵㳟儉惡衣服後至征虜將軍桓鸞少立操行緼袍糟食不求盈餘後為議郎張禹性篤厚節儉父歆為汲令卒汲吏人賻送前後數百萬悉無所受後至太尉王良為大司徒司直在位㳟儉妻子不入官舎布被瓦器崔瑗居常蔬食菜􅅅而已家無擔石儲當世清之仕至濟北相魏常林歴宰守刺史所在儉身節用其家嘗饑乏糟糠緼弊晉李𦙍歴軄内外而至貧儉兒病無以市藥帝賜錢十萬位至司徒宋王曇首手不執金玉婦女不得為餙玩初為彭城府功曹後至揚州刺史孔顗為潯陽安陸二府長史性真素不尚矯餙過得寶玩服用不取而他物麁敗終不改易吳郡顧覬之亦尚儉素衣裘器服皆擇其陋者宋世言清約稱此二人王儉為衛將軍開府儀同三司不好聲色衣裘服用取給而已樂頥為湘州主簿棄官吏部郎庾杲之嘗徃候頥為設食枯魚菜菹而已杲之曰我不能食此母聞之自出常膳魚􅅅數種杲之曰卿過於茅季偉我非郭林宗仕至郢州治中卒梁范岫每所居官常以亷潔著稱為長城令時有梓材巾箱至數十年經貴遂不改易在晉陵唯作牙管筆一雙猶以為費後魏裴佗河東人為中軍以老還鄉佗不事家産宅不過三十歩又無田園暑不張葢寒不衣裘其貞儉若此唐郭曜子儀之長子諸弟争餙池館盛車服獨以朴儉自處後為太子少保韓滉性持節儉志在務公衣裘茵袵十年一易居處陋薄才蔽風雨自居重位愈清儉入仕之初以至卿相凢四十年乘五馬皆及弊帷于休烈自釋褐祕書省正字至工部尚書在朝三十餘年歴清要家無擔石之蓄謹愼克謹於事是謂周防能愼其言終亦寡悔茍在家而必逹於從政乎何有若乃多知而守約居安而慮危素履是敦庸行斯執引古為鑑非禮勿動㳟事上之節戒不宻之失修身絜矩閑邪杜漸罔欺暗室靡雜塵游跬歩之間顛沛於是在少有立雖老彌篤兹乃終君子之道焉魯孔子入太廟太廟周公廟孔子仕魯魯祭周公而􅂇祭也每事問或曰孰謂鄒人之子知禮乎入太廟每事問鄒孔子父叔梁紇所治邑時人多言孔子知禮或人以為知禮者不當復問子聞之曰是禮也雖知之當復問慎之至也季文子三思而後行孔子聞之曰再斯可矣季文子魯大夫季孫行父文謚也文子思而有賢行其舉事寡過不必有三思子家懿伯子家覊也昭公將伐季氏告懿伯覊莊公之𤣥孫懿伯曰讒人以君徼幸事若不克君受其名受惡名不可為也舎民數世以求克事不可必也且政在焉其難圖也公退之退使去辭曰臣與聞命矣言若洩臣不獲死乃館於公恐受洩命之罪故留公宫以自明曽参有疾召門弟子曰啓予足啓予手啓開也曽子以為受身體於父母不敢毁傷使弟子開衾而視之詩云戰戰兢兢如臨深淵如􅂂薄氷言此詩者喻已常戒慎恐有所毁傷而今而後吾知免夫小子乃今日後我自知免於患難矣小子弟子也呼之者欲使之識其言南宮括字子容孔子弟子三復白圭詩云白圭之玷尚可磨也斯言之玷不可為也南容讀詩至此三反覆之是其心謹慎漢爰頴以慎將從高帝起留入漢以謹慎為將也以都尉守廣武金日磾輸黄門養馬武帝游宴見馬後宫滿側日磾等數十人牽馬過殿下莫不竊視至日磾不敢及在帝左右目不忤視者數十年忤逆也賜出宫女不敢近帝欲納其女後宫不肯其篤慎如此帝尤竒異之後為侍中張臨嗣父延壽爵為平原侯性謙儉每登閣殿常嘆曰桑霍為我戒豈不厚哉桑桑𢎞羊也霍霍光也言以驕奢致禍也後漢杜安字伯夷貴戚慕其名或遺其書安不發悉壁藏之後捕貴戚賓客安開壁出書封印如故竟不罹其患後至巴郡太守皇甫嵩為太常為人憂慎盡勤前後上表陳諌有補益者五百餘事皆手書毁草不宣於外魏華歆平原高唐人高唐為齊名都衣冠無不游行市里歆為吏休沐出府則歸家闔門議論持平終不毁傷人位終太尉吳闞澤字德潤山隂人也性謙㳟篤慎人有非短口未嘗及容貌似不足者仕至尚書僕射晉劉超少有志尚為縣小吏稍遷瑯邪國記室掾以忠謹清慎為元帝所㧞常親侍左右遂從渡江于時天下擾亂伐叛討貳超自以職在近宻而書跡與帝手筆相類乃絶不與人交書時出休沐閉門不通賓客繇是漸得親宻以左右勤勞賜爵原鄉亭侯蔡謨字道明性尤篤慎每事必為過防故時人云蔡公過浮航脫帶腰舟仕至左光祿大夫南齊王琨為光祿大夫謙㳟謹慎老而不渝朝會必早起簡閱衣裳抖擻冠幘如此數四或為輕薄所笑臧榮緒隱居京口南徐州辟西曹舉秀才不就惇愛五經又以飲酒亂德言常為戒劉璡字子敬方軌正直文惠太子召入侍東宫每上事輙削草仕至射聲校尉後魏辛祥為太傳元丕并州府屬咸陽王禧妃卽祥妻妹及禧搆逆親知多罹塵謗祥獨蕭然不預司馬惠安丹陽侯叔璠之孫為洺州龍驤府司馬未曽自伐性閑淡少所交逰識者云其淳至王雒兒少善騎射明元在東宫給事帳下天賜末明元出居于外雒兒晨夜侍衛無湏臾違離㳟勤發於至誠侍從逰獵夙夜無怠性謹厚未嘗有過陸麗少以忠謹入侍左右太武特親昵之舉動審慎而無愆失賜爵章安子崔振字延根自中書學生為祕書中散在内謹飭為孝文所知叔孫俊字醜歸少聰敏年十五内侍左右性謹宻初無過行入為獵郎趙邕南陽人司空李冲之貴寵也邕以少年謹端出入其家頗給按摩奔走之役冲亦深加接念令與諸子逰處人有束帶謁於冲者時記之以通仕平北將軍幽州刺史楊津少端謹以器度見稱年十一除侍御中散于時孝文冲㓜文明太后臨朝津曽乆侍左右忽而咳逆失聲吐血數升藏衣袖太后聞聲閱而不見問其故具以實言遂以敬慎見知常景字永昌累遷右光祿大夫袐書監性和厚恭慎每讀書見韋弦之事深薄之危乃圖古昔可以監戒指事為象讃而述之庾岳拜相州刺史鄴舊有園池時果初熟丞吏送之岳不受曰果未進御吾何得先食其謹慎如此封隆之性寛和有度量義旗始建首參經畧竒謀妙䇿宻以所聞上書削藁罕聞於外高祖嘉其忠謹每多從之轉齊州刺史卒權會字正理志尚沉雅動遵禮則知太史局事明風角觧𤣥象至於私室聊不及言學徒有請問者終無所說每云此學可知不可言諸君並貴遊子弟不繇此進何煩問也會唯有一子亦不以此術教之其謹宻如此北齊楊愔字遵彦性周宻畏慎常若不足每聞後命愀然變色仕至尚書右僕射後周申徽少與母居盡力孝養及長好經史性審慎不㤀交逰元䆳為東徐州刺史引徽為主簿隋于宣道字元明性謹宻不交非類仕周釋褐左侍上士唐皇甫無逸太宗貞觀中為益州刺史過於審慎所上表奏懼有誤失必讀之數十遍仍令官屬再三披省使者就路又追而更審每遣一使輙連日不得上道楊㳟仁為雒州都督性虚澹必以禮度自居謙㳟下士未嘗忤物時人方之石慶高郢性恭慎亷潔罕與人逰守官奉法勤恪遷刑部郎中改中書舎人掌誥累年家無制草或謂曰前軰皆留制集公焚之何也曰王言不可存私家時人重其慎密也好謙易曰人道惡盈而好謙葢君子謙尊而光卑以自牧持之則為德柄行之可以利渉故有處實若虛難進易退先人後已辭大取小貴而能降泰而不驕撝挹發於誠信恭遜見於形色播厥令譽獲乃終吉書稱受益不其然乎孔子謂弟子曰文莫吾猶人也躬行君子則吾未之有得若聖與仁則吾豈敢抑為之不厭誨人不倦則可謂云爾已矣公西華曰正唯弟子不能學也又魯太宰問於子貢曰夫子聖者與何其多能也太宰大夫官名或吳或宋未可分也疑孔子多能於小藝子貢曰固天縱之將聖又多能也言固天縱大聖之德又使多能子聞之曰太宰知我乎吾少也賤故多能鄙事君子多乎哉不多也我少小貧則嘗自執事故多能為鄙人之事也君子固不多能又逹巷黨人曰大哉孔子博學而無所成名逹巷者黨名也五百家為黨此黨之人美孔子博學道藝不成一名而已子聞之謂門弟子曰吾何執執御乎執射乎吾執御矣聞人美之承之以謙吾執御者從名六藝之卑公子荆衛侯之子孔子曰衞公子荆善居室荆與蘧瑗史鰌並為君子始有曰苟合矣少有曰茍完矣富有曰茍美矣漢公孫𢎞菑川薛人武帝時以賢良徵為博士使匃奴還報不合意帝怒以為不能乃移病免歸元光五年復徴賢良文學菑川國復推上𢎞𢎞謝曰前已常西用不能罷願更選國人于定國為廷尉為人謙㳟尤重經術士雖卑賤徒歩定國皆與鈞禮鈞禮猶言亢禮韋𤣥成丞相賢之子少好學修父業尤謙遜下士其接人貧賤者益加敬繇是名譽日廣後亦至丞相蜀劉巴零陵人也少知名年十八郡署户曹史主記主簿劉先主欲遣周不疑就巴學巴答曰昔游荆比時渉師門記問之學不足紀名内無楊朱守靜之術外無墨翟務時之風猶天之南箕虛而不用賜書乃欲令賢甥摧鸞鳳之豔遊燕雀之宇將何以啟明之哉愧於有若無實若虛何以堪之晉羊祜為車騎將軍開府累年謙讓不辟士夏方初仕吳為五官中郎將朝㑹未嘗乘車行必讓路周處除楚内史未之官徴拜散騎常侍處曰古人辭大不辭小乃先之楚劉殷在前趙劉聰朝為太保録尚書事與公􅀸恂恂然常有後巳之色陸玩為司空雖登公輔謙讓不辟掾屬成帝聞而勸之玩不得已而從命性通雅不以名位格物誘納後進謙若布衣繇是搢紳之徒莫不䕃其德宇宋劉懐慎為中領軍雖名位優重而㳟恪愈至每所造位任不踰已者皆束帶門外下車其謹退如此沈曇慶謹實清正所蒞有政績嘗謂子弟曰吾處世無才能正圖作大老子耳世以長者稱之仕至徐州刺史蒯恩以戰功封新寧縣男益自謙損與人語常呼官位自稱鄙人南齊陸慧曉歴補司徒征虜輔國左軍冠軍五府為長史治身清肅僚佐以下造詣必起送之或謂慧曉曰長史貴重不冝㤀自謙屈答曰我性惡人無禮不容不以禮處人未嘗輕士大夫或問其故慧曉曰貴人不可輕而賤者乃可輕人生何容立輕重於懐抱終身嘗呼人位張岱為吏部尚書兄子懐弟恕以誅郡太守劉遐功太祖欲以恕為晉陵郡岱曰恕未嫻從政美錦不宜濫裁太祖曰恕為人我所悉且又與懐同勲自應有賞岱曰若以家貧賜祿此所不論語功推事臣門之耻王綸之字元昌為安成王記室叅軍偃仰召會退居僚末司徒袁粲聞而歎曰格外之官便今日為重貴游居此位者遂不以掌文記為高自綸之始也陳顯逹為侍中䕶軍將軍謙厚有智計自以人微位重每遷官常有愧懼之色梁王曇生好文義以謙和見稱歴吏部尚書太常􅀸王筠性𢎞厚不以藝能高人仕至太子詹事後魏㳺肇謙亷不競曽撰儒碁以表其志焉位至尚書右僕射崔挺為北海王詳司馬挺子孝芬早有才識孝文召見甚嘆賞李彪謂挺曰比見賢子謁帝旨喻殊優今當為絶群耳挺曰卿自欲善處人父子之間然斯言吾所不敢聞也裴景融卑退廉謹無競於時位至諌議大夫唐李藩為徐州張建封從事居幕中謙讓未常論細微晉崔梲為翰林學士平生所著文章碑誄制詔極多人有借本傳冩者則曰有前賢有來者奚用此為册府元龜卷八百六十四
