body:
  text: 册府元龜卷八百五十二宋王欽若等撰總錄部友悌第二後魏李祐字長禧篤穆友于稱於世李産之字孫僑容貌短陋而撫訓諸弟愛友篤至冦治為征虜將軍兄弟並孝友篤穆白首同居陸凱景明初咸陽王禧謀逆凱兄琇陷罪凱亦被收遇赦乃免凱痛兄之死哭無時節目幾失明訴寃不已備盡人事至正始初宣武復琇官爵凱大喜置酒集諸親曰吾所以數年之抱疾忍死者顧門户計耳逝者不追今中願畢矣遂以其年卒房景伯性淳和涉獵經史諸弟宗之如事嚴親及弟妹亡蔬食終喪朞不内御憂毁之容有如居重其次弟景先先亡其幼弟景逺朞年哭臨亦不内御鄉里為之語曰有義有禮房家兄弟景先沈敏方正事兄恭謹出告反面晨昏㕘省側立移時兄亦危坐相敬如對賓客兄曾寝疾景先侍湯藥衣冠不解形容毁瘁親友見者莫不哀之崔光韶好標牓人物無所推尚毎云景伯居喪不食鹽菜因此遂為永病積年不愈裴修字元寄早孤二弟三妹並在幼弱撫養訓誨甚有道方次弟矜早喪修哀傷之感於行路愛育孤姪同於己子及將異居奴婢田宅悉推與之時人以此稱之李冲兄弟六人四母所出頗相忿䦧及冲貴封祿恩賜皆以共之内外輯睦父亡後同居二十餘年至雒乃别弟宅更相友愛久無間然皆冲之徳也始冲見私寵也兄子韶嘗有憂色慮致傾敗後榮名日顯稍乃自安終左僕射李瑒與弟謚特相友愛謚在鄉物故瑒慟哭絶氣久而方蘇不食數日朞年之中形骸毁悴人俱哀歎之仕至鎮逺將軍岐州刺史楊播家世純厚並敦義讓昆季相事有如父子播剛毅弟椿津恭謙與人言自稱名字兄弟旦則聚於㕔堂終日相對未曽入内有一美味不集不食㕔堂間徃徃幃幔隔障為寝息之所時就休偃還共談笑椿年老曽他處醉歸扶持還室仍假寐閣前承候安不椿津年過六十並登台鼎而津常旦暮㕘問子姪羅列階下椿不命坐津不敢坐椿每近出或日斜不至津不先飯椿還然後共食食則津親授匙筯味皆先嘗椿命食然後食津為司空於時府主皆引寮佐人就津求官津曰此事須家兄裁之何為見問初津為肆州椿在京宅每有四時嘉味輒因使次附之若或未寄不先入口椿每得所寄輒對之下泣甄琛為侍中領御史尉坐朋黨免官與弟僧林誓同居以沒齒張烈為瀛州刺史更滿還朝因辭老還鄉里兄弟同居怡怡然為親類所慕韓子熙少孤為叔顯宗所撫養及顯宗卒子伯華又幼子熙友愛等於同生長猶共居車馬資財隨其費用未嘗見於顔色又上書求析階與伯華於是除伯華東太原太守及伯華在郡為刺史元弼所辱子熙乃泣訴朝廷孝明詔案驗弼遂大見詰讓李郁字永穆為通直散騎常侍建義中以兄瑒卒遂撫育孤姪歸於鄉里邢晏篤於義讓初為南兖州刺史例得一子解褐乃啓其孤弟子子慎為奉朝請子慎年甫十二而其子已弱冠矣後為滄州復啓孤兄子昕為府主簿而其子並未從官世人以此多之房亮為荆州刺史時邊州刺史例得一子出身亮不言其子而啓弟子超為奉朝請議者稱之髙恭之字道穆幼孤事兄如父母孫紹兄世元早卒世元善彈筝紹後聞筝聲便涕泗嗚咽捨之而去世以此尚之卒於左衛將軍右光祿大夫裴敬憲學博才清諸府辟命先進其弟世人歎美之吳悉達兄弟同居四十餘載閨門和睦讓逸競勞史不載仕宦閻元明昆弟雍和尊卑諧穆安貧樂道白首同歸史不載仕宦宋世景為滎陽太守友于之性過絶於人兄道輿死哭之哀切酸感行路形容毁悴見者莫不歎慜北齊魏蘭根以西魏武帝太昌初除儀同三司封鉅鹿縣侯邑七百户啓授兄子同達髙隆之以西魏文帝時為荆州刺史封平原郡公邑一千七百户隆之請減户七百並求降已四階讓兄騰並優詔許之崔陵以文宣天保初降侍中監起居以禪代之際㕘掌儀禮别封新豐縣男邑二百户迴授第九弟隆之封隆之為侍中封安徳郡公邑二千户隆之表以先爵富城子及武城子轉授弟子孝琬等朝廷嘉而從之李庶訴魏收為史不直為楊愔所譖死於臨漳獄中庶兄岳痛之終身不歴臨漳縣門司馬子如為司空事姊有禮撫諸兄子慈篤當時名士並加欽愛以此稱之子如别封須昌縣公迴授兄子膺之髙昻天平初除侍中司空公昻以兄乾薨於此位固辭不拜轉司徒公楊愔為神武行臺右丞愔從兄幼卿為岐州刺史以直言忤㫖見誅愔聞之悲懼因哀感發疾陸卭為中書侍郎遭母喪哀慕毁悴殆不勝喪至沈篤頓昧伏枕又盛風疾第五弟博遇疾臨終謂其兄弟曰大兄尫病如此其性至慈博之死日必不得使大兄知之哭泣聲必不可聞徹致有感慟家人至於祖載方始告之卭聞而悲痛一慟便絶陸彦師為彭城王浟東閣祭酒兄卭當襲父始平侯以彦師兄弟中最幼表讓封焉彦師固辭而止時稱友悌孝義總萃一門後周李穆為小冢宰别封一子為縣伯穆迴請封兄賢子孝軌許之及兄子植謀害宇文䕶事泄當誅植弟基當從戮穆求以子惇怡等代死辭理酸切聞者莫不動容䕶矜之遂特免基死隋薛濬開皇初為考功侍郎丁母艱不勝喪病且卒其弟謨時為晉王兵曹㕘軍事在揚州濬遺書與謨曰吾以不造幼丁艱酷窮遊約處屢絶簞瓢晚生早孤不聞詩禮賴奉先人貽厥之訓獲稟母氏聖善之規負笈裹糧不憚艱逺從師就業欲罷不能砥行礪心困而彌篤服膺教義爰至長成自釋耒登朝于兹二十三年矣雖官非聞達而祿喜逮親庶保期頥得終色養何圗精誠無感禍酷荐臻兄弟俱被奪情苫廬靡申哀訴是用扣心洫血霣氣摧魂者也既而創巨釁深不勝荼毒啓手啓足幸及全歸使夫死而有知得從先人於地下矣豈非至願哉但念爾伶俜孤宦逺在邊服顧此恨恨如何可言適已有書冀得與汝面訣忍死待汝已歴一旬汝既未来便成今古緬然永别為恨何言勉之哉勉之哉書成已絶郎方貴淮南人少有志尚與従父弟雙貴同居開皇中方貴嘗因出行遇雨淮水汎漲於津所寄渡船人怒之撾方貴臂折至其家弟雙貴驚問所繇方貴具言雙貴恚恨遂向津􅇌擊船人致死守津者執送之縣官案問其状以方貴為首當死雙貴從坐當流兄弟二人争為坐首縣司不能㫁送詣州兄弟各引咎州不能定二人争欲赴水而州狀以聞帝聞而異之特原其罪表其門閭賜物百段後為州主簿裴子通開皇中為大中大夫兄弟八人以友愛著名牛𢎞為右光祿大夫有弟曰弼好酒而酗嘗因醉射殺𢎞駕車牛𢎞来還宅其妻迎謂之曰叔射殺牛矣𢎞聞之無所怪又問直云作脯坐定其妻又曰叔忽射殺牛大是異事𢎞曰已知之矣顔色自若讀書不輟其和寛如此韋世康性孝友初以諸弟位並隆貴獨季弟世約官塗不達共推父時田宅盡以與之世多其義官至吏部尚書荆州總管元褒便弓馬少有成人之量年十嵗而孤為諸兄所鞠飬性友悌善事諸兄諸兄欲别居褒泣諫不得家素富多金寳褒無所受脱身而出為州里所稱煬帝即位拜濟州刺史楊素字處道其異母弟約性沈静内多譎詐好學彊記素友愛之凡有所為必先籌於約而後行之素為司徒封楚公唐髙士廉妹先適隋右驍騎將軍河南長孫晟生子無忌及一女即文徳皇后也既而晟卒士廉迎妹及諸甥於家情禮甚至後仕隋為通事舎人坐事讁為交趾朱鳶縣主簿時行資不給又念妹無所庇賣其大宅買小宅以處之分其餘價輕装而去其友愛如此李知本趙州元氏人與弟知隠甚稱雍穆子孫百餘口財物僮僕纎毫無間隋末盜賊過其閭而不入自相誡曰無犯義門知本貞觀中官至夏津令知隠至伊闕丞魏徵以修定五禮當一子為縣男請讓孤兄子叔慈太宗愴然曰卿之此心可以勵俗遂許之徵官至左光祿大夫封鄭國公趙𢎞智貞觀中累遷黄門侍郎兼𢎞文館學士以疾出為莱州刺史𢎞智事兄𢎞安同於事父所得祿俸未嘗入於私室及兄卒哀毁過禮事寡嫂甚謹撫孤姪以慈愛稱虞世南為起居舎人兄世基為内史侍郎将被誅世南抱持號泣請以身代宇文化及不納因哀毁骨立時人稱焉李勣為司空與弟弼特相友愛岑文本為中書令既久樞揆當塗任事賞錫稠叠凡有財物出入皆季弟文昭一無所問文昭待任校書郎多與時人遊欵太宗聞而不恱嘗従容謂文本曰卿弟過爾多交結恐累卿朕將出之為外如何文本泣曰臣弟少孤老母特所鍾念不欲信宿離於左右令出外母必憂悴儻無此弟亦無老母也因歔欷嗚咽太宗慜其意而止雖召見文昭嚴加誡約亦卒無愆過又弟子長倩少孤為文本所鞠養同於己子顔相時為禮部侍郎性仁友兄師古卒不勝哀慕而卒裴守真絳州稷山人早孤事母至孝母終事寡姊及兄甚謹閨門禮則士友所推永淳初為乾封尉屬關中大饑守眞盡以祿俸供姊及諸甥身及妻子麄糲不充而無倦色程務挺為左驍衛大將軍則天臨朝累受賞賜特拜其子齊之為尚乘奉御務挺泣請迴授其弟則天嘉之下制褒美乃拜其弟原州司務挺終為太子洗馬蘇味道則天時再為鳳閣侍郎同鳳閣鸞臺三品與其弟太子洗馬味𤣥甚友愛味𤣥若請托不諧輒面加凌折味道怡然對之不以為忤論者稱焉崔𤣥暐與弟昇交相友愛至於親族子弟孤貧者亦多躬自撫養教授頗為當時所稱終中書令博陵郡王豆盧欽望作相兩朝不能有所規正然於諸弟姪當代稱友愛李暠與兄昇弟暈甚相篤睦昇等每月自東都省暠徃来微行州人未嘗覺之其清愼如此卒太子太傅蘇頲為相所得俸祿盡推與諸弟或散之親族家無餘資終禮部尚書張嘉貞為并州長史開元初因奏事至京師𤣥宗聞其善政數嘗慰嘉貞因奏曰臣少孤兄弟相依以至今日臣弟嘉祐今授鄯州别駕與臣各在一方同心離居魂絶萬里乞移就臣側近臣兄弟盡力報國死無所恨帝嘉其友愛特改嘉祐為忻州刺史陸南金開元初為奉禮郎太常少卿盧崇道犯罪流嶺表逃歸来都南金哀而納之崇道俄為讐人所發侍御史王旭按其事遂捕獲崇道連引南金旭遂繩以重法南金弟趙璧詣旭自言藏崇道請代兄死南金固稱弟實自誣身請當罪兄弟讓死旭怪而問其故趙璧曰兄是長嫡又能幹家事亡母未葬小妹未嫁自惟幼劣生無所益身自請死旭遂列上状𤣥宗嘉其友義並特宥之南金繇是大知名王維與弟縉閨門友悌多士推之維為給事中祿山陷西京維偽授給事中及至徳二年冬復西京維付吏議維弟縉時為刑部侍郎太原少尹抗表請以已官爵贖兄之罪特為減等李瀾為徐州蘄縣令時東都未平梁宋間羣盜連聚或至二千餘衆攻陷城邑瀾守蘄縣力屈為盜所執將害之瀾弟渤詣盜請代兄死瀾又請殺身留弟兄弟争死俱為盜害瀾女原武尉盧甫妻也見父被執號泣請代死亦為盜所害至代宗永泰元年追贈瀾并渤等官第五琦京兆長安人也少孤事兄華敬順過人再入為太子賔客卒王遇常州民也弟遐廣徳中並為海賊所擒賊將捨一人兄弟相讓以死賊感義俱釋之孫成為長安令兄宿典華州以火災驚致瘖疾成素孝悌蒼黄請不待命陳之執政奔省於兄代宗聞之歎曰急難之切觀過知仁矣郭曜尚父子儀長子天性孝友為太子少保子儀薨曜遵命以四朝所賜名馬重寳悉皆上獻徳宗復賜之曜乃散諸昆季李承幼孤鞠於兄華之手既長事兄以孝聞後終湖南觀察使盧邁少以孝友謹愿稱為中書侍郎平章事從父弟起為劍南西川判官卒於成都及歸葬雒陽路出於長安城東邁素友愛遂奏請至城東哭於其柩許之近代宰臣多自以為崇重五服之親或不過從弔臨邁獨請臨弟喪士君子是之韋倫為太子少師居家孝友撫弟姪以敬愛稱之陽城孝友不忍其弟異處皆不娶妾侍終身有寡妹依城以居有甥年十三餘癡不能如人嘗與其弟負之以游初城之妹夫客死他處家貧不能葬城親與其二弟舁屍以歸葬於其居之側徃返千餘里後為諫議大夫穆寧以秘書監致仕事寡姊以弟聞名崔衍為宣歙池等州觀察使衍繼母李氏不慈於衍李氏所生子郃每多取子母錢使其子以契書徵負子衍嵗為償之故衍官至江州刺史而妻子衣食無所餘李元素為户部尚書判度支元素少孤弱長事姊友敬加於人及其姊没沈悲遘疾上疏懇辭職從之田興為魏博節度其兄融為博州刺史興幼孤睦友而教道之及興之節制六州請融為支郡守朝廷察其切誠不忍離其兄也故特授焉李遜幼孤寓居江陵與其弟建能安貧苦易衣併食講習不倦遜兄造知二弟賢為營丐以成其志業弟兄同致休顯士以此多之嚴綬為檢校司徒兼太子少傅卒於家綬材器不逾常品事兄嫂過謹為人所稱韋顗字周仁太子太師見素之孫也生一嵗而孤事姊稱恭孝終吏部侍郎杜式方司徒佑之子性孝友兄弟尤睦季弟從郁少多疾病式方每躬自煎調藥膳水飲非經式方之手不入於口及從郁夭喪終經年號泣殆不勝情士頗多之官終桂管觀察使韋夏卿喜愠不形於色撫孤姪恩踰己子卒太子少保白居易友愛過人兄弟相待如賓客弟行簡子龜兒多自教習以至成名當時友悌無以比焉官終刑部尚書王起為尚書左丞居兄播之喪號毁過禮友悌尤至薛膺散騎常侍致仕革之子弟齊中飛矢墜於城下膺時為左補闕聞難不及請告馳馬以赴齊殁膺與弟褒庠處喪如禮朝之卿大夫暨縉紳者徃弔繼路聞其哀號弔者悲不能自持膺去左補闕庠去河南縣尉直𢎞文館與褒皆屏居外野布巾終喪蹈名教者推之梁張文慰為中書侍郎平章事居家孝悌其弟濟美早得心恙文慰撫視殆三十年士君子稱之杜曉以宰相判鹽鐡兄光人有心疹厥候毎作或溢喙縦詬或揮挺追撲曉事之愈恭未嘗一日少殆李珽性孝友與弟琪有敦睦之愛為縉紳所稱仕至右散騎常侍晉張仁愿為大理卿兄仁穎梁朝仕至諸衛将軍中風恙十餘年仁愿事之出告反面如嚴父焉士大夫推為孝友兄卒人弔之淚流滿目而辭氣頓絶見者傷之漢李濤仕晉為中書舎人弟澣為翰林學士對掌綸誥咸以為榮澣後陷虜濤毎見人自虜中来者必對之慟哭有友于之義也劉鼎善交遊能譚笑居家仁孝異母昆仲凡七人撫之如一乾祐初拜諫議大夫周王珽字世美鄭州人多仁義重然諾撫家雍睦初與弟廷規同過河南累從藩職所置田宅物産皆弟主之一無所伺歴工禮刑三部尚書冊府元龜卷八百五十二
