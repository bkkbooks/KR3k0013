body:
  text: 册府元龜卷七百七十一宋王欽若等撰總録部世官傳曰世不失職又曰世濟其美不隕其名蓋古之守官者修其方而垂裕宿其業以延嗣義訓攸篤軌迹彌劭故能介象賢之祉成善繼之名復治先職以載名譽至有官守無改故吏多在規度斯覿流風相接出處更踐德聲宣聞系緖積累慶靈綿久自非恪居之績可述惟肖之質無忝茂昭前烈以塞羣望者又曷能免世禄之議哉至有代諸父之任踵伯仲之武皆可類舉亦并而叙焉重黎帝嚳時居火正甚有功能光融天下帝嚳命曰祝融祝火也始也融明也共工氏作亂帝嚳使重黎誅之而不盡帝乃以庚寅日誅重黎而以其弟呉回為重黎後復居火正為祝融周造父為繆王御西廵狩見西王母樂之忘歸而徐偃王反繆王日馳千里馬攻徐偃王大破之乃賜造父以趙城自造父下六世至奄父曰公仲宣王時伐戎為御鄭桓公武公父子並為周司徒善於其職國人宜之故美其德賦緇衣之詩以明有國善善之功焉觀從楚大夫也平王立平王名棄疾召觀從曰惟爾所欲觀從初教王比殺棄疾棄疾今召用之明在君為君之義對曰臣之先佐開卜乃使為卜尹佐卜人開龜兆漢周勃以將軍從高帝遷為太尉後以列侯事惠帝惠帝六年置太尉官以勃為太尉文帝即位以勃為右丞相居十餘月請歸相印許之十餘歳丞相陳平卒復用勃為相子亞夫為中尉景帝三年呉楚反亞夫為太尉東擊呉楚破平歸復置太尉官五歲遷為丞相金日磾字翁叔封秺侯有忠勤之節七葉為侍中石奮官至大中大夫東陽侯張相如為太子太傅免選可為傅者皆推奮為太子太傅武帝元狩元年立太子選羣臣可為傅者奮子慶自沛守為太子太傅汲黯字長孺其先有寵於古之衛君六國時衞弱但稱君也至黯十世世為卿大夫杜周武帝時為御史大夫子延年宣帝五鳳中徵為御史大夫居父官府不敢當舊位坐卧皆易其處韋賢為丞相子𤣥成復以明經歴位至丞相故鄒魯諺曰遺子黄金滿籯不如一經平當為丞相當子晏以明經歴位大司徒漢興惟韋平父子至宰相漢安帝更名丞相為大司徒劉德長樂衛尉辟疆之子也德昭帝初為宗正丞雜治劉澤詔獄雜謂以他官共治之也劉澤孝齊王之孫謀欲叛殺青州刺史者也父為宗正徙大鴻臚丞遷大中大夫後復為宗正雜案上官氏蓋主事德子向本名更生元帝即位前將軍蕭望之諸吏光禄大夫周堪薦更生宗室忠直明經有行擢為㪚騎宗正給事中又德傳爵至孫慶忌復為宗正太常薨子岑嗣為法曹中郎將列校尉至太常史高為侍中貴幸子丹以父位為中庶子元帝即位為駙馬都尉侍中九男皆以丹任為侍中馮野王與弟立相代為上郡太守吏民嘉美歌之曰大馮君小馮君兄弟繼踵相因循聰明賢智惠吏民政如魯衞德化均周公康叔猶二君後漢鮑永建武中為司𨽻校尉其子昱中元初拜司𨽻校尉詔昱詣尚書使封胡降檄光武遣小黄門問昱有所怪不對曰臣聞故事通官文書不著姓今司徒露布怪使司𨽻下書而著姓也帝報曰吾固欲令天下知忠臣之子復為司𨽻也昱在職奉法守正有父風馮魴字孝孫父子兄弟並帶青紫三代侍中郭躬為廷尉家世掌法弟子鎭又為廷尉鎭子賀復至廷尉賀弟禎亦以能法律至廷尉鎭弟子禧少明習家業兼好儒學有名譽亦為廷尉廉范趙將廉頗之後也漢興以廉氏豪宗自苦陘徙焉世為邊郡守陳寵為尚書子忠辟司徒府三遷廷尉正司徒劉愷舉忠明習法律宜僃機密於是擢尚書使居三公曹趙興為司𨽻校尉子峻為太傅以才器稱孫安世魯相三葉皆為司𨽻時稱其盛袁安章帝元和三年代第五倫為司空章和元年代桓虞為司徒安子京京子湯桓帝初為司空累遷司徒太尉湯子逢靈帝立為司空又安子敞安帝元初三年代劉愷為司徒王龔字伯宗安帝建光初為司𨽻校尉累遷太常順帝永建四年為司空子暢字叔茂少以清實見稱為齊相徵拜司𨽻校尉靈帝建寧初為司空楊震安帝永初四年徵入為太僕遷太常永寧元年代劉愷為司徒延光二年又代愷為太尉中子秉桓帝時為光禄大夫梁冀専權秉稱病六年冀誅後乃拜太僕遷太常後代劉矩為太尉秉子賜靈帝熹平二年代唐􅎇為司空五年代袁隗為司徒免光和元年為太常五年冬為太尉免中平二年復代張溫為司空子彪中平六年代董卓為司空其冬代黄琬為司徒免從入關為太常免又代淳于嘉為司空免復拜太常獻帝興平元年代朱雋為太尉録尚書事魏劉馥為揚州刺史馥子靖文帝黄初中從黄門侍郎遷廬江太守詔卿父昔任彼州今卿復據此郡可謂克負荷者也韋端從涼州牧徵為太僕子康代為涼州刺史時人榮之杜畿為河東太守子恕復為太守恕所在務存大體而已其樹惠愛益得百姓歡心不及於畿辛毗為衛尉子敞官至衞尉盧毓為僕射典選舉子欽為尚書僕射領選蜀吕祥子及孫世為永昌太守吳孫隣字公達雅性精敏幼有令譽九歲代父賁領豫章朱才為校尉領兵後弟亦以校尉領兵周瑜字公瑾從祖父景景子忠皆為漢太尉顧潭祖父雍為丞相平尚書事卒數月拜潭太常代雍平尚書晉山濤武帝咸寧中除尚書僕射領吏部子簡懷帝永嘉初為尚書左僕射領吏部何曾子劭為侍中尚書劭庶兄遵為侍中遵子綏為侍中尚書虞悝與弟望並有士操孝悌廉信為鄉黨所稱而俱好臧否以人倫為己任少仕州郡兄弟更為治中别駕杜軫成都人為犍為太守甚有聲譽當遷㑹病卒弟烈明政事察孝亷歴平康安陽令所居有異績遷衡陽太守聞軫亡因自表兄子幼弱求去官詔轉犍為太守蜀士榮之謝奕從兄尚為豫州刺史尚有德政既卒為西藩所思朝議以奕立行有素必能嗣尚事乃遷都督豫司冀并四州軍事安西將軍豫州刺史滕修為安南將軍廣州牧後修孫含為平南將軍廣州刺史在任積年甚有威惠袁猷少與兄瓌齊名代瓌為吕令復相繼為江都令繇是俱渡江陶璜父基為呉交州刺史璜復為交州牧在州三十年威恩著於殊俗後璜子威領刺史在職甚得百姓心三年卒威弟淑子綏後並為交州自基至綏四世為交州者五人薛兼字令長清素有器宇資望故如上國不似呉人歴位二宫丞相長史元帝踐祚累遷太子少傅自綜至兼三世傅東宫周訪為南中郎將督梁州諸軍梁州刺史卒子撫後為益州刺史穆帝永和初進督梁州之漢中巴西梓橦陰平四郡軍事升平中進鎭西將軍在州三十餘年哀帝興寧三年卒子楚起家叅征西將軍事從父入蜀拜鷹揚將軍犍為太守父卒以楚監梁益二州假節襲爵建城公世世在梁甚得物情撫弟光少有父風光子仲孫興寧初為寧州刺史桓溫以梁益多寇周氏世有威稱復除仲孫監益州梁州之三郡自訪以下三世為益州棗據善文辭為太子中庶子子嵩字臺産才藝尤美為太子中庶子祖約逖之弟也逖有功於譙沛約漸見任遇逖卒自侍中代逖為平西將軍豫州刺史領逖之衆庾闡能屬文為給事中領著作其子肅之亦有文藻著稱歴給事中徐苗字叔胄累世相承皆以博士為郡守鄧嶽字伯山督交廣二州軍事建武將軍平越中郎將廣州刺史假節加平南將軍卒嶽弟逸字茂山亦有武幹嶽卒後以逸監交廣二州建威將軍平越中郎將廣州刺史假節孔愉為㑹稽内史卒於山陰之私第後其子孔國孫静並再為㑹稽内史王珉父洽嘗為中書令至珉復居之時人以為奕世令望孔嚴為呉興太守善於宰牧甚得人和後從姪廞廞子琳之並為呉興太守丁潭為㪚騎常侍子話後亦至㪚騎侍郎桓石秀代叔父冲為寧遠將軍江州刺史領鎭蠻䕶軍西陽太守在州五年以疾去職其弟石民為梁郡太守時叔父冲鎭荆州及冲薨詔以石民監荆州軍事西中郎將荆州刺史桓氏世莅荆土石民兼以才望甚為人情所仰宋陸仲元者晉太尉玩曾孫以事用見知歴吏部郎右衞將軍侍中呉郡太守自玩洎仲元四世為侍中時人方之金張二族殷淳曾祖融祖元並為晉太常淳歴中書黄門侍郎淳弟冲亦歴中書黄門吏部郎冲弟淡亦歴黄門吏部郎張暢為侍中子淹代領太子右衛率毛虎生及子璩並為益州刺史王淮之任宋臺御史中丞為僚友所憚淮之父納之祖臨之曾祖彪之自彪之至淮之四世並居此職何偃為吏部尚書父尚之去選未五載偃復襲其職世以為榮杜驥為冀州刺史徵拜左軍將軍兄坦代為刺史北土以為榮杜𢎞文交州刺史慧度子也𢎞文初為九眞太守及繼父為刺史亦以寛和得衆襲爵龍編侯朱修之為司徒從事中郎文帝謂之曰卿曾祖昔為王導丞相中郎卿今又為王宏中郎可謂不忝爾祖矣南齊桺世隆元景弟之子也出為虎威將軍上庸太守帝謂元景曰卿昔以虎威之號為隋郡今復以授世隆使卿門世不絶公也沈淡與弟淵沖並歴御史中丞又云中丞案裁之職被憲者多結怨母孔氏在東隣家失火疑為人所焚􅅡大呼曰我三兒皆作御史中丞與人豈有善者顧憲之為給事中黄門侍郎兼尚書吏部郎中宋世其祖覬之嘗為吏部庭植嘉樹謂人曰吾為憲之種耳至是憲之果為此職傅琰字季珪山陰令僧祐子也宋明帝泰始六年琰又為山陰東土大縣難為官長僧祐在縣有稱琰尤以明察著名琰父子並著竒績江左鮮有匹云諸傅有治縣譜子孫相傳不以示人梁謝覽為吏部尚書覽自祖至孫三世居選部當世以為榮劉季連為輔國將軍益州刺史季連父宋世為益州貪鄙無政績州人猶以義故故善待季連季連下車存問故老撫納新舊見父時故吏故吏皆對之流涕蕭昂字子明景之第三弟也武帝天監初為輕車將軍監南兖州初景再為兖州德惠在人及昂來代時人方之馮氏夏侯􅇪為豫州刺史䕫兄亶先經此任至是䕫居焉兄弟並有恩惠於鄉里百姓歌之曰我之有州頻仍夏侯前兄後弟布政優優􅇪在州七年甚有聲績逺近多附之謝舉為五兵尚書遷掌吏部舉祖莊宋世再典選至舉又三為此職前代未有也又遷侍中中書監未拜遷太子詹事翊左將軍舉父􅊪齊世終此官累表乞改授勅不許久之受職到沆為洗馬管東宫書記㪚騎省天監三年詔尚書郎在職清能或人才高妙者為侍郎以沆為殿中曹侍郎沆從父兄漑洽並有才名時皆相代為殿中當世榮之王承除國子祭酒承祖儉及父暕嘗為此職三世為國師前代未之有也當世以為榮孔僉歴官國子助教三為五經博士子元素頗涉文學官至太學博士沈峻為五經博士卒子文阿傳父業尤明左氏傳太清中繇國子助教為五經博士陳袁憲為左僕射叅掌選事先是憲長兄樞為左僕射至是為右僕射臺省目樞為大僕射憲為小僕射朝廷榮之賀德基字承業世傳禮學祖文發父淹仕梁俱為祠部並有名當世德基於禮記稱為精明累遷尚書祠部德基雖不至大官而三世儒學俱為祠部時論美其不墜焉樊毅南陽人也𨽻王僧辯討河東王蕭譽以功除假節威戎將軍右中郎將代兄俊為梁興太守後魏庾業延父及兄和辰世典畜牧司馬楚之為侍中鎭西大將軍開府雲中鎭大將朔州刺史琅琊王楚之尚魏諸女河内公主生子金龍後襲爵拜侍中鎭西大將軍開府雲中大將朔州刺史金龍弟躍字寳龍尚趙郡公主拜駙馬都尉代兄為雲中鎭將朔州刺史楚之父子相繼鎭雲中朔土服其威德辛穆與其子馥並為平原相吏民懷安之韋朏為荆郢和糴大使南郢州刺史丑夷啓稱朏父珍往任荆州恩洽夷夏乞朏充南道將别領荆州驍勇共為腹背詔從之皮豹子為都督秦雍荆梁益五州諸軍事開府仇池鎭將豹子子喜高祖初拜侍中都督秦雍荆梁益五州諸軍事開府仇池鎭將以其父豹子昔鎭仇池有威信故也楊津華陰人為右將軍華州刺史與兄播前後皆牧本州當世榮之畢衆敬為兖州刺史子元賓後亦為兖州刺史父子相代為本州當世榮之邢祐假員外㪚騎常侍使于宋祐子産復假員外㪚騎常侍使于南齊仍世將命時人美之傅敬和竪眼長子也竪眼前為益州刺史敬和孝莊時復為益州刺史朝廷以其父有遺惠故也江文遥為汝州刺史卒于州長史許思祖等以文遥遺愛在民復推其子果行州事既攝州任乃遣使奉表莊帝嘉之除果通直㪚騎侍郎假節龍驤將軍行汝州事北齊鄭述祖為兖州刺吏初其父道昭為兖州於彭城南小山起齋亭刻石為記述祖時年九歲及為刺史往尋舊迹得一破石有銘云中嶽先生鄭道昭之白雲堂述祖對之嗚咽悲動羣寮後周泉企上雒豐陽人曾祖景言任魏假宜陽郡守世襲本縣令父安志復為宜陽郡守領本縣令企年十二鄉人皇平陳合等三百人詣州請企為縣令州為申上時吏部尚書郭祚以企年少未堪宰民請别選遣終此一限令企代之宣武詔曰企向成立且為本鄉所樂何為捨此世襲更求一限遂依所請李旭為黄門侍郎太祖嘗謂旭曰卿祖昔在中朝為御史中尉卿操尚貞固理應不墜家風但孤以中尉彈劾之官愛憎所在故未即授耳然此職久曠無以易卿乃奏旭為御史中尉裴文舉􅃉之子也武帝保定三年遷絳州刺史䆳之莅正平也以廉約自守毎行春省俗單車而已及文舉臨州一遵其法百姓美而化之奚達武為大宗伯父震嘗為此職時論榮之于翼為渭州刺史翼兄實嘗莅此州頗有惠政翼又推誠布信事存寛簡夷夏感悦比之大小馮君焉隋田式字顯標馮翼下邽人也祖安興父長樂仕魏俱為本郡太守式仕周又為本郡太守親故屏迹請託不行武帝聞而善之庾季才為大中大夫藝術精通子質復為太史令質子儉亦傳父業兼有學識仕歴襄武令元德太子學士義寧初為太子令唐漢陽王瓌高祖武德中代兄孝恭為荆州都督溫彦博歴中書侍郎時弟彦將亦為中書侍郎趙道興貞觀中為左武侯中郎將隋武侯大將軍才之子也明閑宿衞號為稱職太宗嘗謂曰卿父為隋武侯將軍甚有當官之譽卿今克傳弓冶可謂不墜家聲因擢授右武侯將軍其父時廨宇仍舊不改時人以為榮盧承慶博學有才幹貞觀中歴雍州别駕尚書左丞弟承業亦有才幹與承慶相次為尚書左丞雍州刺史時人榮之李百藥德林子也百藥貞觀元年為中書舍人子安期高祖永徽中為中書舍人自德林至安期三世皆掌制誥安期孫萬冲又為中書舍人戴胄貞觀中為民部尚書以本官叅預朝政胄兄子至德乾封中累遷西臺侍郎同東西臺三品轉户部尚書依舊知政事父子十數年間相繼為尚書皆預知國政時以為榮崔仁師貞觀中為中書舍人累遷中書侍郎平章事子湜中宗景龍中為中書舍人再為中書侍郎平章事蕭均貞觀中為中書舍人有名於時均曾姪孫嵩開元初為中書舍人嵩子華肅宗上元初拜中書侍郎平章事華孫復建中末吏部尚書平章事華子恆恆子俛穆宗初為中書侍郎平章事尋轉門下侍郎嘗弟悟子倣懿宗咸通末為兵部侍郎平章事閻立本工部尚書立德之弟也高宗顯慶中立本自將作大匠遷拜工部尚書兄弟相代時人榮之薛元超隋内史侍郎道衡孫也元超高宗朝為中書舍人中書省有一盤石初道衡為内史侍郎嘗踞而草制元超毎見此石未嘗不泫然流涕肅宗上元三年復為中書侍郎元超從子稷睿宗景雲中又為中書侍郎韓休伯父大敏則天初為鳳閣舍人休歴遷中書舍人禮部工部侍郎知制誥休子法亦歴知制誥休孫臯德宗朝為考功郎中知制誥遷中書舍人臯父滉代宗大厯中為尚書左丞臯德宗貞元末為尚書右丞滉弟洄興元初為京兆尹臯貞元十四年為京兆尹張説則天初為鳳閣舍人子均𤣥宗朝為中書舍人姚璹與弟班數年間俱為定州刺史户部尚書時人榮之房頴叔則天聖厯中為天官侍郎自其高祖景伯至頴叔四代咸居選部時論榮之韋承慶弟嗣立長壽中代承慶為鳳閣舍人長安三年承慶又代嗣立為天官侍郎頃之又代嗣立知政事當時以為榮劉知幾長安中累遷左史修國史開元初遷左㪚騎常侍子貺餗祑貺終於起居郎修國史餗累為給事中尚書左丞左㪚騎常侍祑給事中尚書右丞李景伯中宗景龍中為給事中子彭年𤣥宗開元中又遷給事中王維與弟縉以詞學齊名𤣥宗開元初縉為監察御史天寳初維亦為監察御史賈曾初為中書舍人以父名忠固辭乃拜諫議大夫知制誥開元初復拜中書舍人子至天寳末為中書舍人𤣥宗幸蜀肅宗即位于靈武𤣥宗遣至為傳位册文𤣥宗歎曰昔先帝遜位於朕册文則卿之先父所為今朕以神器付儲君卿又當演誥可謂繼美矣韋斌天寳中拜中書舍人其兄陟先為中書舍人而斌又繼遷時人美之韋見素天寳五年為諫議大夫充江西山南黔中嶺南黜陟使還拜給事中改尚書左丞吏部侍郎子倜諤皆至給事中孫顗以廕補千牛累遷給事中尚書左丞吏部侍郎于休烈嗣子益次子肅相繼為翰林學士孫成父逖兄宿繼掌綸言三十年間更番西掖時論榮之盧奕懷愼之少子也天寳十一年為御史中丞始懷愼及奐並為此官父子三人為中丞清節不易時人美之郭英乂隴右節度使知運之季子也少以父業習知武藝䇿名河隴間以軍功累遷諸衞員外將軍至德初肅宗興師朔野英乂以將門子特見任用遷隴右節度使崔渙乾元中累遷御史大夫子縱德宗建中中為大理少卿魏州都糧料使與李懷光同赴奉天拜京兆尹懷光反德宗行幸梁州或曰縱素善懷光今不來矣帝曰縱吾能保其心不數日縱至拜御史大夫張守珪字獻誠守珪弟守瑜守瑜子獻恭並為山南西道節度使李峴肅宗幸靈武應召至行在拜扶風太守兼御史大夫既収京師拜禮部尚書守京兆尹復兼御史大夫時峴兄峘為户部尚書兼成都尹乾元初𤣥宗還京自蜀至又兼御史大夫兄弟俱判臺事國初已來兄弟並拜大夫未有其比李希言為禮部侍郎子紓代宗大厯中亦歴禮部侍郎崔祐甫德宗初為門下侍郎平章事轉中書侍郎平章事修國史祐甫子植穆宗長慶初拜中書侍郎平章事鄭絪貞元中為起居郎絪孫顥懿宗咸通中為起居郎李晟貞元中為鳳翔節度子愬憲宗元和中為隨唐鄧節度既平蔡州憲宗有意収復河湟故地授愬鳳翔節度使路繇闕下㑹李師道再叛詔徵兵討之遂改愬為徐泗節度與兄愿交換其城旬日間再踐父兄之任弟聽文宗開成中授鳳翔節度使父晟兄愬兄愿皆鎭鳳翔時人榮之鄭餘慶貞元十三年為工部侍郎子澣穆宗長慶中遷中書舍人文宗太和二年遷禮部侍郎餘慶憲宗元和中為山南西道節度觀察使興元尹太和中瀚自左丞出為山南西道節度觀察使興元尹餘慶之鎭興元創儒宫設學館至瀚來復繼前美瀚子處誨累遷工部刑部侍郎又遷宣武軍節度使處誨弟從讜宣宗大中中遷中書舍人懿宗咸通三年拜禮部侍郎轉刑部又為宣武軍節度使以兄殁於宣武訖致政不於公署舉樂王緯字文卿父之咸初為長安尉緯舉明經又書判入等歴長安縣尉杜佑再為淮南節度貞元十九年入朝拜檢校司空同平章事順宗即位初進檢校司徒憲宗時再拜司徒平章事佑孫悰武宗㑹昌中拜中書侍郎同平章事尋出鎭西川俄復入相加司空繼加司徒復歴淮南節度竇常憲宗元和中為國子祭酒弟牟穆宗長慶初亦為國子祭酒孔戣元和中自華州刺史入為大理卿穆宗長慶中自吏部侍郎為右㪚騎常侍弟戢自汝州刺史為大理卿湖南觀察為右㪚騎常侍令狐楚為職方員外郎知制誥元和九年入翰林遷中書舍人十二年罷内職守中書舍人十四年自河陽節度入拜中書侍郎同平章事楚子綯宣宗大中二年考功郎中知制誥其年入翰林拜中書舍人四年拜兵部侍郎平章事綯子渙位至中書舍人翰林學士薛存誠自兵部郎中為給事中子廷老自刑部郎中遷給事中廷老子保遜位至給事中韓充中書令𢎞之弟為河陽昭義衙門將及𢎞節制宣武召歸主親兵軍中奏官累至御史大夫元和十五年代姪公武為鄜坊節度使加檢校工部尚書穆宗長慶元年又自鄭滑節度充宣武軍節度使張𢎞靖祖加貞為中書舍人相𤣥宗為中書令諡恭肅父延賞為中書舍人相德宗為左僕射平章事諡成肅𢎞靖亦為中書舍人復相憲宗韋貫之穆宗長慶初為河南尹子澳咸通中為河南尹鄭覃長慶四年遷御史中丞文宗太和九年為右僕射平章事加門下侍郎監修國史弟朗武宗㑹昌中為御史中丞宣宗大中中為禮部尚書平章事加中書侍郎監修國史高鉞長慶四年正拜中書舍人充翰林學士如故文宗太和三年授刑部侍郎遷吏部侍郎弟銖開成三年自江西觀察入為刑部侍郎弟鍇太和七年為中書舍人開成中轉吏部侍郎鉞子湜懿宗咸通中再為中書舍人崔郾為給事中敬宗即位選為翰林侍講學士轉中書舍人轉禮部侍郎子瑶累至中書舍人宣宗大中六年知貢舉旋拜禮部侍郎瑶弟瑾懿宗咸通中拜禮部侍郎郾弟鄲太和三年以考功郎中充翰林學士轉中書舍人路羣文宗太和四年為翰林學士五年正拜中書舍人子巖宣宗大中中累遷中書舍人高元裕開成三年為諫議大夫充翰林侍講學士兄少逸開成四年遷諌議大夫代元裕為翰林侍講學士兄弟迭處禁密儒林榮之李德裕自淮南節度使授門下侍郎同平章事初德裕父吉甫年五十一出鎭淮南五十四自淮南復相德裕鎭淮南復入相一如父之年亦為異事崔珙武宗㑹昌初累遷户部侍郎充諸道鹽鐵轉運等使弟璪宣宗大中初為兵部侍郎充諸道鹽鐵轉運使璪弟興大中七年權知户部侍郎轉兵部侍郎張禓以宣宗大中中宰相于琮判度支召為司勲員外郎判度支尋用為翰林學士轉郎中知制誥拜中書舍人户部侍郎學士承旨子文蔚昭宗乾寧中以祠部郎中知制誥正拜中書舍人崔𦙍與文蔚同年進士尤相善用為翰林學士户部侍郎王龜懿宗咸通中為浙東觀察使兄式宣宗大中時廉問于此曾破草賊裘甫亦著善政至是越人咸喜焉後唐趙犨唐僖宗光啓中為陳州刺史其後犨弟昶珝皆相繼為陳帥封舜卿莊宗同光已來累歴清顯封氏自太和以來世居兩制以文筆稱於時舜卿從子渭昭宗遷雒時為翰林學士舜卿為中書舍人叔姪對掌内外制從子翹於梁貞明中亦為翰林學士劉遂清末帝清太元年以前興州刺史為西京副留守代其兄遂雍為淄州刺史册府元龜卷七百七十一
