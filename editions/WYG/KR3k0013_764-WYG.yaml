body:
  text: 册府元龜卷七百六十四宋王欽若等撰總録部義烈孔子曰儒有刼之以衆沮之以兵見死不更其守曽子亦云託孤寄命臨大節而不可奪孟軻所謂舍生而取義皆義烈之謂也若夫君子之行已烈士之挺操蓋將抗名城以全所守激孤風以勵浮俗義之所在奮不顧死乃有愛賢者而慮廢命感知己而思報德忠所事而赴難存弱緒而踐言毒之以楚掠而無貳刼之以鋒刃而靡屈蹈危以紓患冐險以申寃嫉惡罔顧發憤不已莫不捐軀忘死齎志畢命慷慨以引决感激以横分固已英槩薄於雲天雄名揭於日月千載之下凛乎其有生氣矣鉏麑晉力士也靈公虐趙宣子驟諫公患之使鉏麑賊之賊殺也晨徃則寢門辟矣盛服將朝尚早坐而假寐麑退嘆而言曰趙孟敬哉夫不忘恭敬社稷之鎮也賊國之鎮不忠受命而廢之不信也享一名於此不若死觸庭之槐而死庭外朝之庭公孫杵臼晉大夫趙朔之客也景公之三年屠岸賈欲誅趙朔韓厥告趙朔趣亡朔不肯曰子不絶趙祀朔死不恨厥許諾賈滅朔族朔妻成公姊有遺腹走公宮匿公孫杵臼謂友人程嬰曰胡不死程嬰曰朔之婦有遺腹若幸而男吾奉之即女也吾徐死耳居無何而朔婦免身生男屠岸賈聞之索於宫中夫人置兒袴中祝曰趙宗滅乎若號即不滅若無聲及索兒竟無聲已脫程嬰謂公孫杵臼曰今一索不得後必且復索之柰何公孫杵臼曰立孤與死孰難程嬰曰死易立孤難耳公孫杵臼曰趙氏先君遇子厚子彊為其難者吾為其易者請先死乃二人謀取他人嬰兒而負之衣以文褓小兒被曰褓匿山中程嬰出謬謂諸將軍曰嬰不肖不能立趙孤誰能與我千金吾告趙氏孤處諸將皆喜許之發師隨程嬰攻公孫杵臼杵臼謬曰小人哉程嬰昔下宫之難不能死與我謀匿趙氏孤兒今又賣我縱不能死而忍賣之乎抱兒呼曰天乎天乎趙氏孤兒何罪請活之獨殺杵臼可也諸將不許遂殺杵臼與孤兒諸將以為趙氏孤兒良已死皆喜然趙氏真孤乃反在程嬰卒與俱匿山中居十五年晉景公疾卜之大業之後不遂者為祟景公問韓厥厥知趙孤在乃曰大業之後在晉絶祀者其趙氏乎夫自中衍者皆嬴姓也中衍人面鳥噣降佐殷帝大戊及周天子皆有明徳下及幽厲無道而叔帶奔周適晉事先君文侯至於成公世有立功未嘗絶祀今吾君獨滅趙宗國人哀之故見龜䇿惟君圖之景公問趙尚有後子孫乎韓厥具以實告於是景公乃與韓厥謀立趙孤兒召而匿之宫中諸將入問疾景公因韓厥之衆以脅諸將而見趙孤趙孤名曰武諸將不得已乃曰昔下宫之難屠岸賈為之矯以君命并命羣臣非然孰敢作難㣲君之疾羣臣固且請立趙後今君有命羣臣之願也於是召趙武程嬰徧拜諸將遂反與程嬰趙武攻屠岸賈滅其族復與趙武田邑如故及趙武冠為成人程嬰乃辭諸大夫謂趙武曰昔下宫之難皆能死我非不能死我思立趙氏之後今趙武既立為成人復故位我將下報趙宣孟與公孫杵臼趙武啼泣頓首固請曰武願苦筋骨以報子至死而子忍去我死乎程嬰曰不可彼以我為能成事故先死今我不報是以我事為不成遂自殺趙武服齊衰三年為之祭邑春秋祠之世世勿絶王子閭楚平王子啟也白公勝作亂欲以子閭為王子閭不可遂刼以兵子閭曰王孫若靖楚國輔正王室而後庇焉啟之願也敢不聽從若専利以傾王室不顧楚國有死不能不能從遂殺之石乞楚白公勝之徒也白公作亂國人攻之奔山而縊其徒㣲之匿也生拘石乞而問白公之死焉對曰余知其死所而長者使余勿言長者白公曰不言將烹乞曰此事克則為卿不克則烹固其所也何害乃烹石乞侯嬴大梁人魏公子無忌姊為趙平原君夫人秦圍趙趙急請救於魏魏安釐王畏秦使將軍晉鄙將十萬衆名為救趙實持兩端公子數請終不聽公子計不獨生而令趙亡欲赴秦軍俱死用侯嬴言請如姬盜晉鄙兵符與朱亥俱救趙過謝侯嬴嬴曰臣宜從老不能請數公子行日以至晉鄙軍之日北向自剄以送公子公子與侯生决至軍侯生果北鄉自剄要離呉人呉王欲殺王子慶忌而莫之能殺呉王闔閭光也簒庻父僚而即其位慶忌者僚之子也故欲殺之慶忌有力㨗疾而勇人皆畏之無能殺者也呉王患之呉王之友曰要離謂呉王曰臣請殺之呉王曰汝惡能惡安也吾嘗以六馬逐之江上矣而不能及射之矢左右滿把而不能中今汝㧞劔則不能舉臂上車則不能登汝惡能要離曰士患不勇耳奚患於不能王誠助臣請必能呉王曰諾明旦加罪焉執其妻子焚而揚其灰呉王偽加要離罪燒其妻子揚其灰也要離走徃見王子慶忌於衛王子慶忌喜曰呉王之無道也子之所見也諸侯之所知也今子得免而去之亦善也要離與王子慶忌居有間謂王子慶忌曰呉王無道也愈甚請王子徃奪之國王子慶忌曰善乃與要離俱渉於江中離抜劒以刺王子慶忌捽而投之江浮又取而投之如此者三卒曰汝天下之國士也幸汝以成其而名幸活也而汝也要離不死歸呉王大恱請與分國要離曰不可臣請必死呉王止之要離曰夫殺妻子焚而揚其灰以便事也臣已為不仁便猶成也夫為故主殺新主臣已為不義夫捽而浮乎江三入三出持王子慶忌之為賜而不殺耳矣持猶循也臣已為辱夫不仁不義又且已辱不可以生呉王不能止果伏劒而死果終也田文封孟嘗君相齊有舍人魏子為孟嘗君收邑入三反而不致一入孟嘗君問之對曰有賢者竊假與之以故不致入孟嘗君怒而退魏子居數年人或毁孟嘗君於齊湣王曰孟嘗君將為亂及田申刼湣王湣王意疑孟嘗君孟嘗君乃奔魏子所與粟賢者聞之乃上書言孟嘗君不作亂請以身為盟遂自剄宫門以明孟嘗君湣王乃驚而蹤跡驗問孟嘗君果無反謀乃復召孟嘗君王蠋畫邑人燕師入齊聞蠋賢齊西南近邑畫音獲令軍中曰環畫邑三十里無入以王蠋之故已而使人謂蠋曰齊人多高子之義吾以子為將封子萬家蠋固謝燕人曰子不聽吾引三軍而屠畫邑王蠋曰忠臣不事二君貞女不更二夫齊王不聽吾諫故退而耕於野國既破亡吾不能存今又刼之以兵為君將是助桀為暴也與其生而無義固不如烹遂經其頸於樹枝自奮絶脰而死齊亡大夫聞之曰王蠋布衣也義不北面於燕况在位食禄者乎乃相聚如莒求湣王子發章立為襄王豫讓晉人故嘗事范中行氏而無所知名去而事智伯智伯甚尊寵之及智伯伐趙襄子趙襄子與韓魏合謀滅智伯之後而三分其地趙襄子最怨智伯漆其頭以為飲器豫讓遁逃山中曰嗟乎士為知己者死女為恱己者容今智伯知我我必為報讐而死以報智伯則吾魂魄不愧矣乃變名姓為刑人入宫塗厠中挾匕首欲以刺襄子襄子如厠心動執問塗厠之刑人則豫讓内持刀兵曰欲為智伯報讐左右欲誅之襄子曰彼義人也吾謹避之耳且智伯亡無後而其臣欲為報讐此天下之賢人也卒釋去之居頃之豫讓又漆身為厲音頼吞炭為啞使形狀不可知行乞於市其妻不識也行見其友其友識之曰汝非豫讓邪曰我是也其友為泣曰以子之才委質而臣事襄子襄子必近幸子近幸子乃為所欲顧不易邪何乃殘身苦形欲以求報襄子不亦難乎豫讓曰既已委質臣事人而求殺之是懐二心以事其君也且吾所為者極難耳然所以為此者將以愧天下後世之為人臣懐二心以事其君者也既去頃之襄子當出豫讓伏於當過之橋下襄子至橋馬驚襄子曰此必是豫讓也使人問之果豫讓也於是襄子乃數豫讓曰子不嘗事范中行氏乎智伯盡滅之而子不為報讐而反委質臣於智伯智伯亦已死矣而子獨以為之報何讐之深也豫讓曰臣事范中行氏范中行氏以衆人遇我我故衆人報之至於智伯國士遇我我固國士報之襄子喟然嘆息而泣曰嗟呼豫子子之為智伯名既成矣而寡人赦子亦已足矣子其自為計寡人不復釋子使兵圍之豫讓曰臣聞明主不掩人之義而忠臣有死名之義前君已寛赦臣天下莫不稱君之賢今日之事臣固伏誅然願請君之衣而擊焉以致報讎之意則雖死不恨非所敢望也敢布腹心於是襄子大義之乃使持衣與豫讓豫讓㧞劔三躍而擊之曰吾可以下報智伯矣遂伏劔自殺死之日趙國志士聞之皆為涕泣漢田横為齊王高祖既立為皇帝横懼誅而與其徒屬五百餘人入海居島中高帝使使召横横乃與其客二人乗傳詣雒陽至尸鄉自殺高帝發卒以王者禮葬之既葬二客穿其冢旁皆自剄從之高帝聞而大驚以横之客皆賢吾聞其餘尚五百人在海中使使召之使至聞横死亦皆自殺於是乃知田横兄弟能得士也周燕宣帝時為郡决曹掾太守欲枉殺人燕諫不聽遂殺因而黜燕囚家守闕稱寃詔遣覆考燕見太守曰願謹定文書皆署燕名府君但言時病而已出謂掾史曰諸君被問悉當以罪推燕如有一言及於府君燕手劔相刃使乃收燕繫獄屢被掠楚辭無屈撓當下蠶室乃嘆曰我平王之後正公𤣥孫豈可以刀鋸之餘下見先君遂不食而死趙都祋祤人趙姓都名祋丁活丁外二切祤許羽功為左馮翊馮野王部督郵掾而池陽令並並謂池陽縣令史失其姓素行貪汙輕野王外戚年少治行不改都案驗得其主守盗十金罪收捕並不首吏不首吏謂不伏從收捕也都格殺並並家上書陳寃事下廷尉都詣吏自殺以明野王京師稱其威信李聖為王莽揚州牧司命孔仁兵敗於山東聖格死仁將其衆降已而嘆曰吾聞食人食者死其事㧞劔自刺死曹竟字子期去官不仕於王莽莽死漢更始徴竟以為丞相封侯欲親致賢人銷冦賊竟不受侯爵會赤眉入長安欲降竟竟手劔格鬬死後漢王㨗為隗囂大將囂為漢軍所圍窮困㨗别在戎邱登城呼漢軍曰為隗王城守者皆必死無二心願諸軍亟罷請自殺以明之遂自刎頸死劉雄為平原令永初二年劇賊畢豪等入平原界雄將士乗船追之至厭次河與賊合戰雄敗執雄以矛刺之時小吏所輔前叩頭求哀願以身代雄豪等縱雄而刺輔貫心洞背即死東郡太守捕得豪等具以狀上詔書追傷之賜錢二十萬除父奉為郎中徐福為漁陽太守張顯主簿元初中鮮卑入冦顯㧞刃追散兵虜射中顯福及功曹徐咸遽赴之顯遂墮馬福以身擁蔽虜并殺之耿武為冀州韓馥長史閔純為别駕會袁紹至馥從事十人棄馥去唯恐在後獨武純仗刀拒戰紹兵不能禁紹後令田豐殺此二人鄭益恩𤣥子也孔融在北海舉為孝亷及融為黄巾所圍益恩赴難殞身關靖為公孫瓉遼東長史瓉為袁紹所敗靖曰吾聞君子陷人於危必同其難豈可獨生乎乃䇿馬赴紹軍而死紹悉送其首於許孫瑾為常山相時遼東公孫瓉與幽州牧劉虞搆隙及虞見殺瑾與掾張逸張瓉等忠義憤發相與就虞罵瓉極口然後同死臧洪字子源為廣陵太守張超功曹超遣洪詣幽州牧劉虞行至河間袁紹以為青州刺史遷東郡太守時魏太祖圍張超於雍丘甚危急超謂軍吏曰今日之事唯有臧洪必來救我或曰袁曹方睦而洪為紹所用恐不能敗好逺來違福取禍超曰子源天下義士終非背本者也或見制强力不相及耳洪始聞被圍乃徒跣號泣並勒所領將赴其難自以衆弱從紹請兵而紹竟不之聽超城遂陷張氏族滅洪由是怨紹絶不與通紹以兵圍之厯年不下使洪邑人陳琳以書譬洪示其禍福責以恩義洪答曰隔闊相思發於寤寐相去歩武而趨舍異規其為愴恨胡可勝言前日不遺比比及也辱雅况述叙禍福公私切至以子之才窮該典籍豈將闇於大道不達余趣哉是以捐棄翰墨一無所酬亦冀遥忖褊心粗識鄙性重獲來命援引紛紜雖欲無對而義篤其言僕小人也本乏志用中因行役特蒙傾蓋恩深分厚遂竊大州寜樂今日自逺接刃乎每登城臨兵觀主人之旗鼔瞻望帳幄感故友之周旋撫弦搦矢不覺流涕之覆靣也何者自以輔佐主人無以為悔主人相接過絶等倫當受任之初志同大事掃清冦逆共尊王室豈悟本州被侵郡將遘厄請師見拒辭行被拘使洪故君遂至淪滅區區㣲節無所獲申豈得復全交友之道重虧忠孝之名乎所以忍悲揮戈收淚告絶若使主人少垂古人忠恕之情來者側席去者克己則僕抗季札之志不為今日之戰矣昔張景明登壇㰱血奉辭奔走卒使韓馥讓印主人得地然後但以拜章朝主賜爵獲傳之故不蒙觀過之貸而受夷滅之禍吕奉先討卓來奔請兵不獲告去何罪復見斫刺劉子璜奉使踰時辭不獲命畏君懐親以詐求歸可謂有志忠孝無損覇道亦復僵尸麾下不蒙虧除慕進者蒙榮違意者被戮此乃主人之利非遊士之願也是以鑒戒前人守死窮城亦以君子之違不適敵國故也足下當見乆圍不解救兵未至感婚姻之義推平生之好以為屈節而茍生勝守義而傾覆也昔晏嬰不降志於白刃南史不曲筆以求存故身傳圖象名垂後世况僕據金城之固驅士人之力散三年之蓄以為一年之資蘇困補乏以脱天下何圖築室反耕哉但懼秋風揚塵伯珪馬首南向伯珪公孫瓚字張揚飛燕旅力作難北鄙將告倒懸之急股肱奏乞歸之計耳主人當鑒戒曹軰反旌退師何宜久辱盛怒暴威於吾城之下哉足下譏吾恃黒山以為救獨不念黄巾之合從邪昔高祖取彭越於鉅野光武創基兆於綠林卒能龍飛受命中興帝業茍可輔主興化夫何嫌哉况僕親奉璽書與之從事行矣孔璋足下徼利於境外臧洪投命於君親吾子託身於盟主盟主謂袁紹也臧洪䇿名於長安子謂余身死而名滅僕亦笑子生死而無聞焉本同末離努力努力夫復何言紹見洪書知無降意增兵急攻城中糧盡外無援救洪自度不免呼吏士謂曰袁紹無道所圖不軌且不救洪郡將洪於大義不得不死念諸君無事空與此禍可先城未破將妻子出將吏皆垂泣曰明府之於袁氏本無怨隙今為郡將之故自致危困吏人何忍當捨明府去也初尚掘䑕煑筋角久無所復食主簿啟内厨米三升請稍為饘粥洪曰何能獨甘此邪使為薄糜徧班士衆又殺其愛妾以為食兵將咸流涕無能仰視男女七八千人相枕而死莫有離叛城陷生執洪紹盛帷幔大會諸將見洪謂曰臧洪何相負若是今日服未洪據地瞋目曰諸袁事漢四世五公可謂受恩今王室衰弱無扶翼之意而欲因際會觖望非冀觖猶冀也多殺忠良以立姦威洪親見將軍呼張陳留為兄則洪府君亦宜為弟而不能同心戮力為國除害坐擁兵衆觀人屠滅惜洪力劣不能推刃為天下報讎何謂服乎紹本愛洪意欲屈服赦之見其辭切知終不為用乃命殺焉洪邑人陳容少為諸生親慕於洪隨為東郡丞先城未敗洪使歸紹時容在坐見洪當死起謂紹曰將軍興大事欲為天下除害而專先誅忠義豈合天意臧洪發舉為郡將柰何殺之紹慙使人牽出謂曰汝非臧洪儔空復爾為容顧曰夫仁義豈有常所蹈之則為君子背之則為小人今日寜與臧洪同日死不與將軍同日生也遂復見殺在紹坐者無不嘆息竊相謂曰如何一日戮二烈士先是洪遣司馬二人出求救於呂布比還城已陷皆赴敵死審配字正南魏郡人少忠烈慷慨有不可犯之節袁紹領冀州委以心腹之任以為治中别駕并總幕府紹長子譚少子尚紹愛尚欲以為後而未顯審配逢紀與辛評郭圖争權配紀與尚比評圖與譚比紹死衆以譚長欲立之配等恐譚立而評為己害乃奉尚代紹位由是譚尚有隙舉兵相攻譚敗走平原尚使審配蘇由守鄴復攻平原魏太祖攻鄴配兄子榮守東門夜開門内太祖生擒配聲氣壯烈終無撓辭見者莫不嘆息遂斬之初譚之去皆呼辛毗郭圖家得出而辛評家獨被收及配兄子開城門内兵時配在城東南角樓上望見太祖兵入忿辛郭壊敗冀州乃遣人馳詣鄴獄指殺仲治家是時辛毗在軍聞門開馳走詣獄欲解其兄家兄家已死是日生縛配將詣帳下辛毗等逆以馬鞭擊其頭罵之曰奴汝今日真死矣配顧曰狗軰正由汝曹破我冀州恨不得殺汝也且汝今日能殺生我邪有頃太祖引見謂配知誰開卿城門配曰不知也曰自卿子榮耳配曰小兒不足用乃至此太祖復謂曰曩日孤之行圍何弩之多也配曰恨其少耳太祖曰卿忠於袁氏父子亦自不得不爾也有意欲活之配既無撓辭而辛毗等號哭不已乃殺之初冀州人張子謙先降素與配不善笑謂配曰正南卿竟何如我配厲聲曰汝為降虜配為忠臣雖死豈若汝生邪臨行刑叱持兵者令北向曰我君在北馮忠金城人漢末郡人陽成逺殺太守以叛忠赴尸號哭嘔血而死呉詠張掖人為䕶羌校尉馬賢所辟後為太尉龎參掾參賢相誣罪應死各引為證詠計理無兩直遂自刎而死參賢慙悔和釋至晉張軌為凉州刺史皆祭其墓而旌其子孫魏沮俊為射聲校尉漢末李傕之亂俊被創墮馬李傕謂左右曰尚可活不俊罵之曰汝等凶逆逼廹天子亂臣賊子未有如此者傕使殺之應余字正夫丰恣方毅志尚仁義漢建安末為郡功曹時呉蜀不賔疆塲多虞宛將侯音扇動山民保城以叛余與太守東里衮當擾攘之際迸竄得出音即遣騎追逐去城十里相及賊便射衮飛矢交流余前以身當箭被七創因謂追賊曰侯音狂狡造為凶逆大軍尋至誅夷在近謂卿曹本是善人素無惡心當思反善何為受其指揮我以身代君已被重創若身死君全殞沒無恨因仰天號泣涕血俱下賊見其義烈釋衮不害賊去之後余亦命絶曹真本姓秦養曹氏或云其父伯南夙與太祖善興平末袁術部黨與太祖攻刦太祖出為冦所追走入秦氏伯南開門受之冦問太祖所在答云我是也遂害之繇此太祖思其功故變其姓一說真父邵以忠篤有才智為太祖所信初平中太祖興義兵邵募徒衆從太祖周旋時豫州刺史黄琬欲害太祖太祖避之而邵獨遇害伍孚字徳瑜少有大節為郡門下書佐其本邑長有罪太守使孚出教勅曹下督郵收之孚不肯受教伏地仰諫曰君雖不君臣不可不臣明府柰何令孚受教勅外收本邑長乎乞更授他吏太守竒而聽之後大將軍何進辟為東曹屬稍遷侍中河南尹越騎校尉董卓作亂百僚震慄孚著小鎧於朝服裏挾佩刀見卓欲伺便刺殺之語闋辭去卓送至閤中孚因出刀刺之卓多力退郤不中即收孚卓曰卿欲反邪孚大言曰汝非吾君吾非汝臣何反之有汝亂國簒主罪盈惡大今是吾死日故來誅姦賊耳恨不車裂汝於市朝以謝天下遂殺孚王象漢末為人僕𨽻牧羊楊俊識之乃贖象為娉娶立屋後象為常侍俊為南陽太守黄初三年文帝南巡未到宛有詔百官不得干豫郡縣及車駕到而宛令不解詔㫖閉市門帝聞之忿然曰吾是冦耶乃收宛令及太守楊俊詔問尚書漢明帝殺幾二千石時象見詔文知俊必不免乃當帝前叩頭流血竟靣請俊減死一等帝不答欲釋入禁中象引帝衣帝顧謂象曰我知楊俊與卿本末耳今聽卿是無我也卿寜無俊邪無我邪象以帝言切乃縮手帝遂入决俊法然後乃出象自恨不能濟俊遂發病死單固字恭夏為兖州刺史令狐愚别駕愚與王凌通謀治中從事楊康與固皆知其計會愚病康應司徒召詣雒陽固亦疾解禄康在京師露其事太傅臣欽若等曰太傅即晉宣帝也乃東取王凌到壽春固見太傅太傅問曰卿知其事為邪固對不知太傅曰且置近事問卿令狐反乎固又曰無以楊康白事事與固連遂收捕固及家屬皆繫廷尉考實數十固故曰無有太傅錄楊康與固同對相結固辭窮乃罵康曰老庸既負使君又滅我族顧汝當活邪辭定事上湏報廷尉以舊皆聽得與其母妻子相見固見其母不仰視其母知其慙也字謂之曰恭夏汝本自不欲應州郡也我强故耳臣欽若等曰固初不應令狐愚令其母强之故云汝為人吏自當爾耳此自門户衰我無恨也汝本意與我語固復不仰又不語以至於死隱蕃有口才明帝使詐叛于呉令求作廷尉職重案大臣以離間之既為廷尉監衆人以據普與蕃親善嘗車馬雲集賔客盈堂及至事覺蕃亡走捕得考問黨與蕃無所言呉主使將入謂曰何乃以肌肉為人受毒乎蕃曰孫君丈夫圖事豈有無伴烈士死不足相牽耳遂閉口而死郭修字孝先素有業行著名西州姜維刦之修不為屈蜀後主以為左將軍修欲刺後主而不得親近每因慶賀且拜且前為後主左右所遏事輒不克故因費禕出漢壽大會賔客座中手刃擊禕為其所害呉邵疇為會稽太守郭誕功曹誕以不白妖言被收惶遽無以自明疇進曰疇今自在疇之事明府何憂遂詣吏自列云不白妖言事由於己非府君罪吏上疇辭孫皓怒猶盛慮誕卒不免遂自殺以證之臨亡置辭曰疇生長邊陲不閑教道得以門資致身本郡踰越儕類位極朝右不能贊揚威化養之以福令妖訛横興干國亂紀疇以噂􅊱之語本非事實雖家誦人詠不足有慮天下重器而匹夫横議疾其醜聲不忍聞見欲含垢藏疾不彰之翰筆鎮躁歸静使之自息愚心勤勤每執斯㫖故誕屈其所是黙以見從此之為愆實由於疇謹不敢逃死歸罪有司唯乞天覽特垂清察吏收疇䘮得辭以聞皓乃免誕大刑送付建安作船疇亡時年四十皓嘉疇節義詔郡縣圖形廟堂晉孫拯能屬文初仕呉為黄門郎呉平為涿令時陸機為孟玖所誣收拯考掠两踝骨見終不變辭門生費慈宰意二人詣獄明拯拯譬遣之曰吾義不可誣枉知故卿何宜復爾二人曰僕亦安得負君拯遂死獄中而慈意亦死宋矩字處規敦煌人慷慨有志節張重華據凉州以矩為宛戍都尉石季龍遣將麻秋攻大夏䕶軍梁彧執太守宋晏以城應秋秋遣晏以書致矩矩既至謂秋曰辭父事君當立功與義茍功義不立當守名節矩終不背主覆宗偷生於世先殺妻子自刎而死秋曰義士也命葬之重華嘉其誠節贈振威將軍車濟字萬度燉煌人果毅有大量張重華以為金城令為石季龍將麻秋所陷濟不為秋屈秋必欲降之乃臨之以兵濟辭色不撓曰吾雖才非龎徳而受任同之身可殺志不可移乃伏劒而死秋嘆其忠節以禮葬之後重華迎致其䘮親臨慟哭贈宜禾都尉虞悝長沙人與弟望並有士操譙王承臨州舉兵討王敦以悝為長史望為司馬督䕶諸軍湘東太守鄭澹敦之姊夫也不順承㫖遣望討之望率衆一旅直入郡斬澹以狥四境及魏乂來攻望每先登力戰而死城破悝復為乂所執將害之子弟對之號泣悝謂曰人生有死闔門為忠義鬼亦何恨哉及王敦平贈悝襄陽太守望滎陽太守遣謁者至墓祭以少牢杜莠字彦頴為羅尚主簿州沒為戍賊李驤所得欲用之驤以莠不受見害羅企生字宗伯豫章人多才藝殷仲堪鎮江陵引為功曹累遷武陵太守未之郡而桓𤣥攻仲堪仲堪更以企生為諮議叅軍仲堪多疑少决企生深憂之謂弟遵生曰殷侯仁而無斷事必無成成敗天也吾當死生以之仲堪果走文武無送者唯企生從焉路經家門遵生曰作如此分離何可不執手企生廻馬授手遵生有勇力便牽下之謂曰家有老母將欲何之企生揮淚曰今日之事我必死之汝等奉養不失子道一門之中有忠與孝亦復何恨遵生抱之愈急仲堪於路待之企生遥呼曰生死是同願少見待仲堪見企生無脫理䇿馬而去𤣥至荆州人士無不至者企生獨不徃而營理仲堪家或謂之曰𤣥猜忍之性未能取卿誠節若遂不詣禍必至矣企生正色曰我是殷侯吏見遇以國士為弟以力見制遂不我從不能共殄醜逆致此奔敗亦何面目復就桓求生乎𤣥聞之大怒然素待企生厚先遣人謂曰若謝我當釋汝企生曰為殷荆州吏荆州奔亡存亡未判何顔復謝𤣥即收企生遣人問欲何言答曰文帝殺嵇康嵇紹為晉忠臣從公乞一弟以養老母𤣥許之又引企生於前謂曰吾相遇甚厚何以見負今者死矣企生對曰使君既興晉陽之甲軍次潯陽並奉王命各還所鎮升壇盟誓口血未乾而生姦計自傷力劣不能剪滅凶逆恨死晩也𤣥遂害之時年三十七衆咸悼焉先是𤣥以羔裘遺企生母胡氏及企生遇害即日焚裘王延仕前趙劉燦燦為靳準所殺準自號漢大王置百官將以延為左光禄延罵曰屠沽逆奴何不速殺我以吾左目置西陽門觀相國之入也右目置建春門觀大將軍之入也準怒殺之前秦索泮字徳林燉煌人為張天錫所用苻堅見而嘆曰凉州信多君子既而以泮河西徳望拜别駕呂光既克姑臧泮固郡不降光攻而獲之光曰孤既平西域將赴難京師梁熈無状絶孤歸路此朝廷之罪人卿何意阻郡固迷自同元惡泮厲色責光曰將軍受詔討叛胡可受詔亂凉州邪寡君何罪而將軍害之泮但苦力寡不能固守以報君父之讐豈如逆氏彭濟望風反叛主滅臣死禮之常也乃就刑于市神色不變弟菱有雋才仕張天錫為執法中郎又從右監苻堅仕至伏波將軍典農都尉與泮俱被害後秦姚洸部將趙𤣥與晉將毛徳祖戰於柏谷以衆寡而敗被創十餘據地大呼司馬騫鍳冐刃抱𤣥而泣𤣥曰吾瘡已重君宜速去鍳曰若將軍不濟當與俱死去将安之皆死於陣宋張禕少有操行晉末官州府為瑯琊王國郎中令從王至雒還京都宋高祖封藥酒一甖付禕使宻加酖毒禕受既還於道自飲而卒傅靈越清河人明帝初薛安都舉兵反靈越率衆應之安都從子索肥兵敗死時武衛將王廣之領軍𨽻劉勔攻殷琰於壽陽靈越奔逃為廣之軍所生擒厲聲曰我傅靈越也汝得賊何不即殺生送詣勔勔躬自慰勞詰其叛逆對曰九州唱義豈獨在我勔又問四方阻逆無戰不禽主上皆加以曠蕩即其才用卿何不早歸天闕乃逃命草間乎靈越答曰薛公舉兵淮北威震天下不能專任智勇委付子姪致敗之由實在於此然事之始末僕皆叅豫人生歸於一死實無靣求活勔北其意送還京師帝欲加原宥靈越辭對如一終不廻改乃殺之邊榮為沈攸之郢州倉曹叅軍事為府錄事所辱攸之自為榮鞭殺錄事攸之自江陵下以榮為留府司馬守城張敬兒將至人或説之使詣敬兒降榮曰受沈公厚恩共如此大事一朝緩急便改易本心不能行也城敗見敬兒敬兒問曰邊公何不早來榮曰沈公見留守城而委城求活所不忍也本不蘄生何湏見問敬兒曰死何難得命斬之懽笑而去容無悸色程邕之素依隨邊榮榮被誅邕之抱持榮曰與邊公周旋不忍見邊公前死乞見殺兵不得行戮以告敬兒敬兒曰求死甚易何為不斬先殺邕之然後及榮三軍莫不垂泣曰柰何一日殺二義士比之臧洪及陳容梁王顗僧辨之長子為侍中西魏冦江陵世祖遣顗督城内諸軍事荆城陷顗隨王琳入北齊為竟陵郡守齊遣琳鎮壽春將圖江左陳既平淮南執琳殺之顗聞琳死乃出郡城南登高冢上號哭一慟而絶後魏孫道登彭城呂縣人永安初為梁將韋休等所虜靣縳臨刃巡遠村塢令其招降鄉曲道登厲聲唱呼但當努力賊無所能遂屠戮之解奉君宋人降於魏孝文太和五年九月大享羣臣齊高帝時為王遣使車僧朗入魏僧朗以班在宋使殷靈誕之後辭不就席奉君刃僧朗於會中帝乃詔誅奉君册府元龜卷七百六十四
