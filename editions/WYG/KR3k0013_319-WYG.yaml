body:
  text: 册府元龜卷三百十九宋王欽若等撰宰輔部褒寵第二北齊斛律金遷左丞相孝昭踐祚詔金朝見聽乗步挽車至階武成即位禮遇彌重金曾遣人獻食中書舍人李若誤奏云金自來武成出在昭陽殿勑侍中髙文遥將羊車引之若知事誤更不敢出伏廊下文遥還覆奏帝罵若云空頭漢合殺亦不加罪趙彦深為司空轉司徒自昭帝以還禮遇稍重每有引見或升御榻嘗呼官號而不名後周李弼為太師趙國公薨于位明帝舉哀比𦵏三臨其䘮發卒穿冡給大輅龍旂陣軍至于墓所配食太祖廟庭晉公護武帝時為大冡宰令五府總於天官三年詔曰大冡宰晉國公智周萬物道濟天下所以克成帝業安飬我蒼生况親則懿昆任當元輔而可同班庶品齊位衆臣乎自今詔誥及百司文書並不得稱公名以彰殊禮護抗表固讓及護母薨尋有詔起令視事四年護廵邊至靈州還五年詔曰光宅曲阜魯用郊天之樂地處參墟晉有大蒐之禮所以言時計功昭徳紀行使持節太師都督中外諸軍事柱國大將軍大冡宰晉國公體道居貞含和誕徳地居戚右才表棟隆國步艱難寄深險夷朝綱締構事均休戚固已迹冥殆庶理契如仁今文軌尚隔方隅猶阻典策未備聲名多闕宜賜軒懸之樂六佾之舞于謹為太傅大宗伯天和二年薨武帝親臨賜繒粟麥共分甚豐贍本官加二十州諸軍事雍州刺史配享於太祖廟寳熾為太傅嘗有疾武帝幸其第而問之因賜金石之藥其見禮如此齊平之後帝乃召熾歴觀相州宫殿熾拜賀曰陛下真不負先帝矣帝大恱賜奴婢三十人及雜繒帛千疋進位上柱國隋李穆初仕後周為太保左輔總管開皇初來朝髙祖降坐禮之拜太師贊拜不名真食成安縣三千户蘇威開皇中兼民部尚書參掌朝政髙祖嘗怒一人將殺之威入閤進諫不納帝怒甚將自出斬之威當帝前不去帝避之而出威又遮止帝拂衣而入良久乃召威謝曰公能如是吾無憂矣於是賜馬二匹錢十餘萬大業中為納言煬帝詔曰玉以潔潤丹紫莫能渝其質松表歳寒雪霜莫能凋其采可謂温仁勁直性之然乎房公威器懷温裕識量𢎞雅早居端揆備悉國章先皇舊臣朝之宿齒棟樑社稷弼諧朕躬守文奉法卑身率禮昔漢之三傑輔惠帝者蕭何周之十亂佐成王者召奭國之寳器其在得賢參爕台階具瞻斯允雖復事藉論道終期獻替銓衡時務朝寄為重可開府儀同三司餘並如故威當時見重朝臣莫與為比楊素仁夀初代髙熲為尚書左僕射賜良馬十匹草馬二百匹奴婢百口嘗賜王公已下射素箭為第一帝手以外國所獻金精盤價直鉅萬以賜之獻皇后山陵制度多出于素帝喜之下詔曰君為元首臣則股肱共治萬姓義同一體上柱國尚書左僕射仁夀宫大監越國公素志度恢𢎞機鍳明逺懷佐時之畧抱經國之才王業初基覇圖肇建策名委質受脤出師擒翦凶魁克平虢鄭頻承廟筭揚旌江表每禀戎律長驅塞隂南指而呉越肅清北臨而獯獫摧服自居端揆參贊機衡當朝正色直言無隠論文則詞藻縱横語武則權竒間出既文且武惟朕所命任使之處宿夜無怠獻皇后奄離六宫逺日云届塋兆安厝委素經營然𦵏事依禮唯卜泉石至如吉凶不繇於此素義存奉上情深體國欲使幽明俱泰寳祚無窮以為隂陽之書聖人所作禍福之理特湏審慎乃徧歴川原親自占擇纎介不善即更尋求志圖元吉孜孜不已心力備盡人靈協贊遂得神臯福壤營建山陵論素此心事極誠孝豈與夫平戎定冦比其功業非唯廟廊之器實是社稷之臣若不加褒賞何以申兹勸勵可别封一子義康郡公邑萬户子子孫孫承襲不絶餘如故并賜田三十頃絹萬叚米萬石金鉢一實以金銀鉢一實以珠并綾錦五百叚大業元年遷尚書令賜東京甲第一區物二千段尋拜太子太師餘官如故前後賞錫不可勝計明年拜司徒改封楚公真食二千五百户其年卒官諡曰景武贈光禄大夫太尉公𢎞農河東絳郡臨汾文城河内汲郡長平上黨西河十郡太守給輼輬車班劍四十人前後部羽葆鼓吹粟麥五千石物五千段鴻臚監護䘮事帝又下詔曰夫銘功彞器紀徳豐碑所以垂名迹於不朽樹風聲於沒世故楚景武公素茂績元勲劬勞王室竭盡誠節協贊朕躬故以道邁三傑功參十亂未臻遐夀遽戢清徽春秋遞代方緜歳祀式播彫篆用圖勲徳可立碑宰隧以彰盛美髙熲為尚書左僕射兼納言初熲父賔為周大司馬獨孤信僚佐賜姓獨孤氏髙祖每呼熲為獨孤而不名也後加上柱國熲每坐朝堂北槐樹下以聽事其樹不依列有司將伐之帝特命勿去以示後人其見重如此唐裴寂為尚書右僕射初從髙祖起義於晉陽又勸受禪及髙祖即位謂寂曰使我至此者公之力也遂拜右僕射賜以服玩不可勝紀詔尚食奉御每日賜寂御膳帝視朝每引與同坐入閣則延之卧内言無不從呼為裴監寂先為晉陽宫副監而不名其見親禮如此當朝貴戚莫與之比帝有所廵幸必令居守麟州刺史韋雲起吿寂謀反鞫之無端而釋之帝謂寂曰朕之有天下者本公所推豈有二心哉皂白須分所以推究耳因令貴妃三人齎珍饌寳器詣寂第宴樂極歡經宿而去俄遷左僕射又聘其女為趙王妃賜宴於含章殿帝極歡寂頓首而言曰臣初發太原已有慈㫖清平之後許以退耕今四海乂安伏願賜臣骸骨帝泣下霑襟曰今猶未也要相偕老耳公為台司我為太上逍遥一代豈不快哉俄拜司空増邑通前一千五百户遣尚書員外郎更置寂第其見崇貴如此貞觀二年十一月太宗有事於圓丘及還御大輦特引寂及開府儀同三司長孫無忌陪乗焉蕭瑀武徳初為内史令髙祖每臨軒聽政必賜升御榻瑀既獨孤氏之壻與語呼之為蕭郎瑀奏便宜數十條多見納用髙祖手勑曰得公之言社稷所頼行智者之策以能成人之美納諫者之言以金寳酬其徳今賚公黄金一函以報智者勿為推退也後拜特進參預朝政事嘗因賜宴太宗從容謂房𤣥齡曰蕭瑀大業之日以進諫隋主出為河池太守應遭剖心之禍翻見太平之日北叟失馬事亦難常瑀頓首拜謝又曰武徳六年已後太上皇有廢立之心我當此日不為兄弟所容實有功髙不賞之懼此人不可以厚利誘之不可以刑戮懼之真社稷臣也乃降宸筆賜詩曰疾風知勁草板蕩識忠臣太宗以瑀好佛道嘗賜繡佛像一軀并繡瑀形狀於像側以為供飬之容又賜王褒所書大品般若經一部並賜袈裟以充講論之服焉貞觀二十二年六月薨詔曰悼往飾終實惟茂典髙班縟禮允屬名臣故特進宋國公瑀禀粹挺生含章秀出慶傳積徳道映搢紳登朝膺務多歴年所出綜機揆雅道光於廊廟入司綸綍讜言聞於帷扆行歸恭儉志存静退輔徳無聞逝川奄及緬惟既往震悼良深冝錫寵章式光幽穸可贈司空使持節都督荆峽岳朗澧五州諸軍事荆州刺史官封如故陪塟獻陵冝令使人持節册命贈絹布五百段并賜東園秘器後改陪塟于昭陵封倫為右僕射貞觀元年遘疾於尚書省太宗親視即命上輦送還第尋薨太宗深悼之廢朝三日再贈司空馬周為中書令太宗嘗體目羣臣各有其詞體周曰材惟獻替秀出珪璋去山東而躡承明輦河南而踐金馬因時耀彩似菊露之結重巖逥袖騰芳如蘭風之出幽逕又神筆賜飛白書鸞鳳凌雲必資羽翼股肱之寄誠在忠良周既職兼兩宫庶政兼總處事甄宻甚得當時之譽病消渇彌年不瘳時駕幸翠㣲宫勅求勝地為周起宅名醫中使相望不絶每令尚食以御膳供之及輿疾還京太宗躬為調藥遣使送皇太子親臨問疾及卒為之舉哀於宜秋門贈中書令幽州都督陪塟昭陵使鴻臚少卿監護䘮事戴胄為吏部尚書參預朝政太宗嘗謂羣臣曰戴胄於我無骨肉之親但其忠直勵行情深體國事有機要無不以聞所進官爵以酬厥勞耳及卒太宗為舉哀于朝堂哭之甚慟遣衛尉卿劉𢎞基監護䘮事詔虞世南為之碑文賜物千段悼惜久之贈尚書右僕射追封道國公後乃聘其女為道王妃温彦博為尚書右僕射掌機務性儉素不營第宅及卒日殯於陋室太宗甚憫之特命有司為立堂焉髙士亷初為侍中尚書左僕射前後賞賜不可勝紀貞觀十六年加開府儀同三司餘如故太宗征遼太子於定州監國士亷以開府儀同三司平章政事攝太子太傅駕還從至定州遇疾暴發太宗親幸其第以問之及駕幸靈州固請從行遂輿疾而從在塗中使名醫上藥相繼於道還京漸篤及薨詔曰昔平仲云亡齊后深股肱之慟太真既沒晉君悲社稷之臣故悼往飾終義存追逺褒忠録舊事本因心故開府儀同三司上柱國忠國公士亷徳範𢎞深風獻逺著道髙廊廟望重勲賢職在銓衡穆九流而馳譽位居端右總百揆而騰芳班職台儀具瞻允集忠謀令範遇物必彰造膝危詞類多𢎞益瞻風力以齊軌軼伊吕而長騖朕爰在弱齡早敦􅊚戚綢繆眷遇多歴年所方期翊兹景化永贊隆平曾不愸遺忠良奄及感惟永往震動厥心儀形莫追徽音日逺冝崇禮命式表哀榮可贈司徒使持節都督并汾箕嵐四州諸軍事并州刺史給班劍四十人及羽葆鼓吹賻絹布二千段米粟二千石陪塟昭陵令攝鴻臚卿護監喪事臨當祖載時屬寒食勅遣尚官以食四轝致祭仍降宸筆為文寘於靈座云朕與卿義重君臣道符冥契鱗波順乎風勢早啟沃乎朕心如何一朝奄成異代眷言疇昔用切深衷自幽明一謝將歴數旬尚同城闕之間想㳺魂其如近今既丹旐戒路歸骨窮泉望隔邱野之中思令徳而方逺凝哀笳於晨路引嘶驂於夜臺嗟爾世之長辭結余心之永恨追懷前賞極宴終娯豈謂樂情逥成悲緒酒有千日之號人無再飲之期昔臨膳以增歡今撫杯而益慟故遣陳兹饗禮以寄曩懷魂如有靈歆我哀饌及柩出横橋太宗登長安故城西北樓望䘮而慟杜淹為御史大夫判吏部尚書參議朝政歳餘疽發左足太宗令醫者視之言不救大宗憫然傷之於是親自臨問賜帛三百疋杜如晦為右僕射未㡬以疾免帝令皇太子就第臨問知其不起又親幸其宅撫之流涕賜物千段及終太宗廢朝三日為之舉哀哭甚慟遣國子祭酒楊師道監護䘮事贈開府儀同三司太宗手勑著作郎虞世南曰吾與如晦君臣義重不幸物化追念勲舊痛悼于懷卿體吾此意為之製碑文也及將𦵏重贈司空明年晦亡日太宗復遣尚宫至第慰問妻子其國官府佐皆不之罷終始恩遇未之有焉房𤣥齡為尚書左僕射貞觀九年十一月加開府儀同三司十六年拜司空俄兼太子太傅二十二年車駕幸玉華宫𤣥齡時疾盛發詔令卧總留臺至夏漸篤追赴宫所乗幨轝入殿將至御座乃下太宗對之流涕𤣥齡亦感咽不能自勝勑專遣名醫攻療尚食每日供御膳若微减損太宗即喜見顔色如聞增劇為改容悽愴病劇車駕臨問握手叙别悲不自勝皇太子亦就與之訣其年七月𤣥齡薨太宗廢朝三日詔曰輟膳流哀悲深棟幹徹懸興感悼切股肱是知縟禮飾終道先彞册贈章追逺事本因心故司空梁國公𤣥齡蹈義挺生資忠秀出功宣翼贊誠著艱難推轂代藩參六飛之馭沃心皇極均十亂之重恪居端揆亟積暄寒九功繇其日用百辟於焉仰止若乃恭儉周慎之心奉國忘私之志足以抗衡上列獨暎終古方申倚寄永贊隆平曾不愸遺摧梁奄及永惟良輔是用震慟于厥心宜加寵靈式旌泉路可贈太尉使持節都督并箕嵐勝四州諸軍事守并州刺史所司備禮册命給班劍四十人及羽葆鼓吹賻絹布二千段米粟二千石陪𦵏昭陵賜東園秘器仍令工部尚書閻立徳攝鴻臚卿監護魏徵為太子太傅知門下省事卒詔陪𦵏昭陵因山為墳以布車載柩無文彩之飾申其宿志也塟日太宗登􅁐西樓臨路哭祭太宗復為製碑文并御筆書石刻畢停於將作北門李靖為尚書右僕射貞觀八年以足疾上表乞骸骨言甚懇至大宗遣中書侍郎岑文本謂曰朕觀自古以來身居富貴能知止足者甚少不問愚智莫能自知才雖不堪強欲居職縱有病疾猶自勉強公能識達大體深足可嘉朕今非真成公雅志亦欲以公為一代楷模乃下優詔加授特進聽在第攝飬賜物千段尚乗馬兩匹禄賜國官府佐並依舊給患若小瘳每三兩日至門下中書平章事九年正月賜靖靈夀杖助足疾也及靖妻亡有詔墳塋制度依衛霍故事築闕象鐵山及積石山以旌殊績十一年夏有疾太宗親幸其第流涕謂靖曰公是朕平生舊交又於國有大功比聞疾病深以為憂賜絹千疋十八年帝幸其第問疾仍賜五百疋太宗將伐遼召靖入賜坐御前二十三年五月薨詔曰昔晉羊公云逝名都為之罷市鄭子産斯亡在機於焉投杼故開府儀同三司上柱國衛國公李靖蘭畹騰芳釣川揚佐氣凌闗外志溢戎場興言締構十角將三呉咸偃披勲王府閩禺與渾塞同揮澄妖氛於下瀬闡皇風於髙門舟檝遐宣台儀近曜官稱載静休有餘芳藴兹髙志歸乎樂善逰赤松於艾服之年訪黄綺於杖鄉之歳語黙之趣疇今罕匹進退之道對古為朋逝川東馳髙奉西靡眷言永往情深哀悼昔惟堂始事荀公有追贈之文郊平既穸祭遵致容車之禮式旌泉壤以備哀榮可贈司徒使持節都督并汾箕嵐四州諸軍事所司備禮册命給班劍四十人及羽葆鼓吹陪𦵏昭陵賜東園秘器仍令攝鴻臚寺卿享監護羽儀送至墓所髙宗即位重贈太尉與尚書左僕射屈突通並配享太宗廟庭又疇其封邑依舊不减長孫無忌髙宗時進位大尉以旱上疏辭職髙宗頻降手詔敦喻不許幸無忌第見其三子並擢授朝散大夫又令圖無忌形像親為畫贊以賜之岑文本為中書令從太宗征遼至幽州暴疾太宗親自臨視撫之流涕及卒太宗聞嚴鼓之聲曰文本殞逝情深惻怛今宵夜警所不忍聞命停之賜東園秘器陪葬昭陵薛元超髙宗時為中書侍郎同中書門下三品特承恩遇嘗召入與諸王同預私宴又重其文學政理之才嘗謂元超曰長得卿在中書固不藉多人也髙季輔為中書令撿校吏部尚書監修國史累封蓨縣公永徽初辭職優詔不許又加光禄大夫行侍中兼太子少保以風疾不視事髙宗令追其兄虢州刺史季通除宗正少卿以視疾又命中使觀其進食増損既卒帝舉哀於雲龍門廢朝三日贈開府儀同三司邢州都督官造靈輿送還鄉崔敦禮為太子少師同中書門下三品敦禮患病弟餘慶時任定襄都督府司馬特召赴京侍疾既卒髙宗舉哀於東雲龍門皇太子遣家令薛仁軌撿校凶事詔贈開府儀同三司并州都督陪塟昭陵李義府為中書侍郎同中書門下三品自是益承任遇遷中書令兼撿校御史大夫監修國史又加太子賔客累封河間郡公髙宗為造甲第榮寵莫比李勣為司空寢疾詔以勣弟晉州刺史弼為司衛正卿諸子外任者悉召還京師使得視疾及薨髙宗舉哀於光順門輟朝七日仍令司平太常伯楊昉監護䘮事司禮太常伯楊思敬持節齎璽書弔祭贈太尉揚州都督賜東園秘器陪𦵏昭陵𦵏日帝幸未央宫登樓望䘮車慟哭并為設祭詔百官送至故城西北許敬宗為太子少師同東西臺三品乾封初以年老不能行步髙宗令與司空勣每朝日乗小馬入禁門至内省及薨為之舉哀廢朝三日詔文武百官就第赴哭册贈開府儀同楊州大都督陪𦵏昭陵戴至徳為户部尚書郝處俊崔知悌為中書侍郎李敬𤣥為吏部侍郎並同中書門下三品咸亨五年八月戊寅朔御札飛白書贊以賜至徳詞曰汎洪源俟舟檝處俊曰飛九霄假六翮敬𤣥曰咨啟沃罄丹誠中書侍郎崔知悌曰竭忠節贊皇猷議者以戴郝寛厚而李崔忠勤故帝以此言褒美之劉仁軌則天光宅中為文昌右相同鳳閣鸞臺三品薨年八十四皇太后廢朝三日令在京百官以次赴哭贈開府儀同三司并州大都督陪𦵏乾陵賜其家實封三百户周允元為鳳閣侍郎平章事卒贈貝州刺史則天悼之不已為七言詩以傷之又自繕寫時以為榮狄仁傑為内史則天幸三陽宫日王公百僚咸從唯仁傑特賜宅一區當時恩寵無比及卒則天舉哀廢朝三日贈文昌右相顧琮為天官侍郎鳳閣鸞臺平章事卒則天曰顧琮久經任使不幸殞沒准於前例雖不舉哀然朕以股肱之情深有悲悼今日特為不視事姚元之長安中為鳳閣侍郎以母老表請解職歸侍言甚哀切則天難違之下制曰忠為令徳孝乃天經義著君親道存愛敬其或兼者可不美歟銀青光禄大夫行鳳閣侍郎兼撿校相王府長史同鳳閣鸞臺三品姚元之自掖垣趨侍廊廟謀猷竭節盡誠讜言正議始終無替𢎞益已多近以母氏衰老情兼喜懼在休沭之期闕晨昏之禮乞解所職以就閒養外奏内請志到詞勤冝遂懇情用敦孝道睠彼藩邸髙選綱佐俾從梁苑之游以致潘園之樂可行相王府長史又令兼尚書事同三品𤣥宗初為兵部尚書同中書門下三品先天二年封梁國公食邑三千户追舊勲特優異也又為紫㣲令後改名崇病痁居于罔極寺黄門侍郎源乾曜奏曰姚崇氣力虚弱不能行步伏以軍馬事切欲得與臣商量望令移居四方館特許家人視疾從之李懐逺中宗時為左散騎常侍同中書門下三品及卒帝特賜錦被以為小歛仍為文以祭之贈侍中葬事務從優厚魏元忠為尚書右僕射神龍二年八月表請歸鄉拜墓許之賜錦袍一領銀千兩因降手勑曰臨岐感愴深惻朕懐勉慎行鑣佇促還轡仍令宰相及諸司長官送於上東門外又給元忠千騎四人充其左右仍勑之曰但正直之士為邪佞所憎慮有不逞之徒知卿在路無備因兹射險忽肆兇狂萬一損卿追悔無及縱加鼎鑊何補於卿朕心日為憂明發不寐今故遣千騎四人緩急任卿駈使元忠及將還東都帝又幸白馬寺以迎之當時莫不榮羡岑羲睿宗時為户部尚書同中書門下三品延和初遷侍中賜物三百段細馬一匹帝讀中宗實録以羲有功故有此命魏知古𤣥宗時為侍中先天元年十月獵于驪山之下知古上詩諫之手詔曰卿所進獵渭濵十韻三復研精良増嘆美夫詩者冩其心懷諷諭君主揚雄羽獵相如上林率繇兹道予向於温湯觀省風俗時因暇景掩渭而畋開一面之羅展三驅之禮無情較獵但慕前禽卿有箴規儆予不逮令賜物五十段以申勸奨源乾曜為侍中張說為中書令開元十二年賜上考親製其詞曰源乾曜謇謇匪躬謙謙自牧正身率下直道事人無聞伐已之功每立致君之節顧問則出納斯允左右則啟沃居多徳行可稱自宜升擢張説以道佐時以忠處事顔雖不犯嘗聞獻替之誠言則不諛自得謀猷之體政令必俟其增損圖書又籍其刋削才望兼著理合褒升並考中上十三年十一月封東嶽禮畢以乾曜為尚書左丞相兼侍中中書令張說為尚書右丞相兼中書令盖以宰相之任佐于王化勒成岱宗時有寵也杜暹為黄門侍郎同中書門下平章事開元十四年賜甲第一區廐馬一匹雜彩一百段賞功也李元紘為户部侍郎平章事開元十五年端午宴羣臣于武成殿特賜元紘及兵部尚書蕭嵩金章紫綬以寵之裴光庭為侍中卒贈太師光庭與蕭嵩不協太常博士孫琬將議光庭諡以其用循資格非奬勸之道建議諡為克平時人以為希嵩意帝聞之特下詔賜諡曰忠憲仍令中書令張九齡為其碑文李林甫為右相天寳中任遇大重詔於太清宫刻石為林甫及陳希烈像侍於聖容之側城東有薛王舊别業林沼幽䆳當時第一特以賜之及女樂二部金銀珍翫甚衆宰相用事之盛開元以來未有其比九載林甫扶疾從幸華清宫數日增劇巫言一見聖人差减帝欲視之左右諫止乃勑林甫出於庭中帝登降聖閣遥視舉紅巾昭慰之林甫不能興使人代拜於席卒贈太尉兼并州大都督給班劒東園秘器諸子以吉儀護柩還京師發䘮于平康坊之第楊國忠為右相天寳十三載二月制加光禄大夫守司空兼右相仍賜音聲十人銀器十事物一千匹一以加社稷之衛廼心弼諧一以資籌畫之勞推誠奬馭俾厲為臣之節以彰任賢之美苗晉卿為侍中代宗初即位攝冡宰以衰疾表乞三日一入中書省許之十月庚申許間日入朝引見于延英殿矜老也時晉卿年已衰暮又患足疾帝特許肩輿至中書入閣不趍後薨命有司配享宗廟裴冕為左僕射平章事冀國公杜鴻漸為中書侍郎平章事衛國公大厯五年卒𦵏日並許百僚祖送于國門楊綰為中書侍郎平章事大厯十二年綰宿有痼疾居職旬日中風優詔令就中書省攝養每引見延英殿特扶入時釐革舊弊唯綰是瞻恩遇無二綰累抗疏辭位頻詔敦勉不許及綰疾亟帝每日發中使就私第存問又内出醫人一日之中數輩相望於路既終中使在門以凶問走馬入奏帝驚悼久之輟朝三日即日下詔贈司徒發使柩前册授令及未斂詔曰王者之於大臣也存則寄其腹心均於支體參於軍國之重叙以隂陽之和亡則誄其事功加之命數告於宗廟之祭襚以紱冕之章則九原可歸百辟知勸故朝議大夫守中書侍郎同中書門下平章事集賢殿崇文館大學士修國史上柱國賜紫金魚袋楊綰性含元和身齊律度道光雅俗器重宗彛寛柔敬恭協於九徳文行忠信𢎞於四教内無耳目之役以孝悌傳於家外無車服之容以真實形於代西掖專宥宻之地南宫領選舉之源以儒術首於國庠以禮度掌於郊廟簡㢘其質奉職同休頃以任非其才毒流于政爰登清静之輔庶諧至理之期道風既穆於朝右儉徳已行於海内雖賢人之業著於可久而夫子之命末如之何方有憑依遽此淪謝屏予之嘆震悼良深所懷莫從長想何及况歴官有素絲之節在家無尺帛之餘故飾以華衮増其法賻備膺典策載賁朝經可贈司徒又詔宰相已下文武百官悉就私第弔䘮又遣内常侍呉承倩會弔贈絹一千匹布三百匹仍宣㫖謂百官曰天不使朕致太平何奪我楊綰之速也俯及大斂與卿等悲悼同之宰甫車賻贈恩遇哀榮之盛近年以來未有其比常衮為門下侍郎平章事大歴十三年正月特加九階自朝議郎至銀青光禄大夫仍封河南郡公寵近臣也崔祐甫為中書侍郎平章事謀猷啟沃多所禆益祐甫被疾肩輿入中書卧而承㫖或休假在第大事必令中使咨決及薨帝甚悼之廢朝三日册贈太傅故事黄門侍郎未嘗有贈三師者以祐甫謇謇有大臣節故特寵異郭子儀為司徒中書令徳宗初即位子儀攝冡宰進位太尉加號尚父増實封通為二千户月給一千五百人糧二百匹馬芻榖諸子弟女壻拜官者十餘人既疾病令舒王誼備禮省之及門郭氏子弟迎拜於外子儀卧不能興以手叩頭謝恩而已薨時年八十五帝聞之傷痛者久之為廢朝五日詔曰天地以四時成物元首以股肱作輔公台之任鼎足相承上以調三光下以象五嶽允釐庶績鎮撫四夷體元和之氣根貞一之徳功至大而不伐身處髙而更安尚父比吕望之名為師増周公之位盛業可乆歿而彌光故大尉兼中書令汾陽郡王尚父子儀天降人傑生知王佐訓師如子料敵如神昔天寳多難羯胡作禍咸秦失險河雒為戎公能翼扶肅宗再造區夏國有患難勞其戡定邊有冦盗藉其驅除安社稷必在於絳侯定𦍑戎無逾於充國絳臺綏四散之衆涇陽降十萬之虜勲髙今古名讋夷狄而勞乎征鎮二紀于兹頃以春秋既髙疆場多事罷彼旌鉞寵在台衡以公柱石四朝藩翰萬里忠貞懸於日月寵遇冠於人臣尊其元老加以崇號期夀考之永飬勲賢之徳膏肓生病藥石靡功人之云亡梁木斯壞雖賻禮加等輟朝增日悼心流涕曷可弭忘更議追崇名位斯極而尊為尚父官協太師雖爵秩則同而禮望尤重斂以衮冕旌我元臣聖祖園陵所宜陪𦵏式墓重文終之徳象山追去病之勲千載如存九原可作册命之禮有司備焉可贈太師陪𦵏建陵仍令所司備禮册命賻絹三千匹布三千端米麥三千石舊令一品墳髙一丈八尺而詔特加十尺羣臣以次赴宅弔哭凶䘮所湏並令官給及𦵏帝御安福門臨哭送之百僚陪位皆隕哭特賜諡為忠武配享代宗廟庭四年六月以子儀大祥賜絹五百疋命百僚赴哭貞元元年正月以子儀祔廟命太常給鹵簿博士贊儀李晟為大尉中書令徳宗嘗呼為大臣而不名貞元四年詔為晟立五廟官給牲牢祭器幃帳禮官相儀以祔焉九年八月薨徳宗震悼出涕輟朝五日令百官就第臨弔賻布米粟有差命太常卿裴郁就第册贈太師又命京兆尹李充監護䘮事官給𦵏具比大歛帝遣致書於柩前曰皇帝遣宫闈令第五守進致誠㫖于故大尉兼中書令西平郡王贈太師之靈曰天祚我邦是生才傑禀隂陽之粹氣實山岳之降靈𢎞濟艱難保佑王室掃蕩氛祲廓清上京忠誠感於人神功業施於社稷平時定亂實頼元勲洎領上台克諧中外訏謨帝道協贊皇猷嘗竭嘉言以輔不逮情所親重義無間然方將與國同休永為邦翰比嬰疾患雖歴旬時日兾痊除重期相見弼予在位終致和平豈圖藥餌無徵奄至薨逝䘮我賢哲虧我股肱天不憗遺痛惜何極嗚呼大厦方構旋失棟梁巨川未濟遂亡舟楫君臣之義追慟益深循省遺章倍增感切卿一門裔緒朕必終始保持况愿等弟兄承卿教訓朕之志義豈忘平生卿縱不言朕亦存信比者卿在之日却未見朕深心今卿與朕長乖方兾知朕誠志無以為念發言涕零是用躬述數行貴申所懷得盡臨紙遣使不能飾詞魂而有知當體朕意及𦵏徳宗御南望春門臨送之又令中人宣詔於柩車文武常參官哭拜於路及晟祔廟令所司供少牢給鹵簿兼令禮官贊儀馬燧為司徒侍中北平郡王貞元五年九月燧與太尉晟召見於延英殿帝嘉其有大勲勞皆圖形於凌煙閣列於元臣之次九年十月召見延英殿因拜手仆於地帝親掖起之十一年八月薨廢朝四日詔京兆尹韓臯監護䘮事司農卿嗣呉王獻為弔祭使賻布帛米粟有差贈太尉仍令太常卿裴郁持節册命及𦵏又廢朝遣百寮於延興門臨送十三年十一月燧祔廟詔令所司供少牢仍給鹵簿從宅至廟并量給人夫太常博士撿校趙憬為門下侍郎平章事貞元十二年八月薨詔曰翼宣王猷徳禮終始曹參贊清静之化栁莊為社稷之臣永念忠勞厚其贈襚舉兹命數以寄衰懐故中書侍郎同中書門下平章趙憬體仁𢎞義循法守正有絮矩之操有致君之誠素履彰其貞固黄中發於事業文含大雅望重周行暢絶域之恩信整天臺之網轄啟廸理本勤勞國鈞奉上見宣孟之忠居室聞晏嬰之儉訏謨左掖盡瘁五年嘗納誨以沃心每匪躬以經逺感疾未逾於信宿殱良俄即於杳冥震悼之深當宁流嘆禮有旌飾峻其寵章追崇保傅永慰窀穸可贈太子太傅所司備禮册命賜布絹五百端匹米粟四百石令鴻臚卿王權充册弔使盧邁為門下侍郎平章事貞元十二年九月邁中風疾令宰相詣邁宅問疾崔損貞元十二年諫議大夫平章事十四年轉門下侍郎平章事損以久疾在家賜絹三百匹以為醫藥十九年薨贈太子太傅賻布絹五百端匹米粟四百石杜佑撿校司徒平章事充度支鹽鐵轉運等使元和元年四月詔授司徒依前中書門下平章事仍令所司依舊典册拜罷其事務從所讓也二年正月吿老表再上詔荅曰卿量包久大器茂中和事君推一得之誠與物全四時之信登于臺閣則萬事問於胡公守在方隅則四國宗於申伯舉其實行是可專徽頃者殷憂在辰總録攸重金甌作鎮羣情穆然玉鉉是司庶官咸事朕涉理猶淺惟賢是圖遽陳請老之章將輟弼予之道二三省覽良為憮然用捨之間慎重斯在謂雅志之難奪豈余衷之可移是用徵尚徳之前經酌優賢之故實去煩就簡免以職業之勤置几乗車優其筋力之禮卿冝起今已後每月之内嘗三兩度入朝便至中書商量軍國事務亦冀延於内殿沃朕虚心如此則居多暇辰退可以吐納頥志入參大政進可以偃息藩寮靈夀將置於上庠桑梓豈違於下杜卿仍以朕此意宣示百寮庶乎君臣作合之期乾坤交泰之義無媿前烈永貽後昆致政之詞即宜斷表佑每入奏事憲宗優禮之不名嘗呼為司徒七年詔以太保致仕宜朝朔望帝遣中人就佑第賜絹五百匹錢五百貫其年薨廢朝三日册贈大傅于頔為司空平章事元和五年三月詔依杜佑例一月三朝裴垍為中書侍郎同平章事元和五年秋垍中風病上甚嗟惜旁午致問至於藥餌進退皆令疏陳疾益痼罷為兵部尚書仍進階銀青侍郎平章事李吉甫為中書侍郎平章事元和九年冬暴卒憲宗傷悼久之遣中使臨弔常贈之外内出五百匹絹以恤其家韓𢎞為司徒兼中書令長慶二年七月勑𢎞疾未痊平尚宜在家將息其俸料宜從勑下日付所司支給其年十二月薨贈太尉賻絹二千匹布七百端米粟千石裴度為司徒平章事太和三年十一月加開府及實封度三表陳讓優詔荅曰其開府聊且依請實封勿讓翌日文宗命中人王士元赴度宅問疾病諭勉再三度勉而受命四年六月詔曰昔漢以孔光降置几之詔晉以鄭冲申奉策之命雖優隆耆徳顯重元臣而議政不及於咨詢用禮獨在於安勉朕勤求至理所寳惟賢顧諟舊勞敢不加敬繇是委宰制於大政釋參決於煩務時因聽斷誠望弼諧遷秩上公式是殊寵特進守司徒兼門下侍郎同中書門下平章事充集賢殿大學士上柱國晉國公食邑三千户實封三百户裴度禀河嶽之英靈受乾坤之間氣珪璋特達城府洞開外茂九功内苞一徳器為社稷之鎮才實邦家之楨故能祗事累朝宣融景化在憲宗掃滌區宇爾則有出師殄冦之勲在穆宗混同文軌爾則有參戎入輔之績在敬宗時阜康兆庶爾則有佑國庇民之勤逮弼朕躬總齊方夏爾則有弔伐底寧之力皆不遺廟筭布在簡編功利及人不可悉數而朝論益重我心實知方用咎繇之謀適值留侯之疾瀝懇牢讓備列於奏章塞詔上言動形於顔色果聞勿藥之喜更俟調鼎之功而體力未和音容尚阻不有優崇之命孰彰寵待之恩宜其首贊機衡𢎞敷教典論道而儀刑卿士宣徳而鎮撫華夷嗇氣養神保綏福履為國元老毗予一人可贈司徒平章軍國重事待疾損日每三日五日一入中書仍令所司擇日備禮册命太和四年為中書令以疾未任朝謝詔曰司徒中書令度綽有大勲累居台鼎今以疾恙未任謝上其本官俸料冝自今日支給又遣國醫就第診視屬上已曲江賜宴羣臣賦詩度以疾不能赴文宗遣中使賜度詩曰注想待元老識君恨不早我家柱石衰憂來學丘禱仍賜御札曰朕詩集中欲得見卿唱和詩故令示此卿疾恙未痊故無心力但異日進來春時俗說難於將攝勉加調護速就和平千百胷懐不具一二藥物所湏無憚奏請煩也御札及門而度薨上聞震悼乆之令繕冩置於靈座孔緯為中書侍郎平章事從僖宗自蜀還定京城遷門下侍郎監修國史又兼吏部尚書領諸道鹽鐵轉運使車駕還宫進位左僕射賜持危啟運保大功臣食邑四千户食實封二百户賜鐵劵恕十死罪賜天興縣庄善和里宅各一區兼領京畿營田使昭宗乾寧二年五月三鎮入京師殺宰相韋昭度李谿帝以大臣朋黨外交方鎮思用骨鯁正人遣中使趍華州召緯入朝以疾未任上路六月授太子賔客其日之夕改吏部尚書翌日拜司空兼門下侍郎同平章事太清宫使修奉太廟𢎞文館大學士延資庫使階爵功臣各食邑並如故旬日之内馹騎敦促相望于道扶疾至京師延英殿謝奏曰臣前待罪宰相智術短淺有負弼諧陛下特貸刑書曲全腰領臣期於死報不望生叩玉階復拜龍顔實臣榮幸然臣比攖衰疾伏枕累年形體雖存生意都盡平居勉強御事猶踈况此尫羸寧勝重委國祚方泰英彦盈庭豈以朽腐之人再塵機務臣力疾一拜殿庭乞陛下許臣自便因嗚咽流涕緯久疾拜蹈艱難帝令中使止之改容軫念令閣門使送緯中書視事不旬日沙陁次河中同州王行約入京師謀亂天子出幸石門緯從駕至莎城疾漸危篤先還京城九月卒於光徳里第贈太尉梁韓建為太保門下侍郎平章事開平三年六月太祖以建及薛貽矩每於案前有所敷奏頗協事機深加奬諭各以繒帛錫之三年宣㫖太保韓建每月旦十五日入閣稱賀即令赴朝餘時不用入示優禮也薛貽矩為門下侍郎平章事乾化元年五月丁亥太祖召貽矩及諸相對于崇勲殿帝曰軍旅之間朕自制斷朝廷庶務實頼卿等協心翊佐待兵罷後事無大小一委中書當無暇食也各賜内廄馬銀具鞍轡衣一襲白金共千兩司空貽矩賜差厚二年帝發自東京宰臣薛貽矩抱恙在假不克扈從宣問旁午仍命且駐東京以俟良愈及薨帝震悼頗久命雒苑使曹守璫往弔祭之又命輟六日七日八日朝參丞相文武並詣西上閣門進名奉慰晉趙瑩為中書令户部奏改瑩本貫華州華隂縣永化鄉為霖雨鄉臨髙里為致君里桑維翰為相户部奏改維翰本貫河南府河南縣來逺鄉為調鼎鄉樂善里為代天里給門㦸十二枝開運初為樞宻使中書令詔改維翰本貫河南府章善坊為賢相坊馮道開運初以户部尚書平章事詔改本貫定州安喜縣懷逺鄉為積善鄉萬善里為公台里李崧為侍中詔改崧本貫深州饒陽縣富平鄉為秉鈞鄉通義里為調鼎里給門㦸十二枝七年丁憂制詔賜崧白藤擔子一以授起復官不欲令墨縗乗馬也周王峻為僕射平章事廣順元年七月太祖幸峻第賜賚甚厚周李榖為中書侍郎平章事廣順二年八月丙辰榖墜階跌傷右臂不任朝謁癸巳賜榖詔曰卿方秉國鈞實藉維持之效復兼邦計最為繁劇之司稍失區分便成壅滯雖近有傷損未復痊平宜彊扶持且就臨蒞無妨卧理仍放朝參勉卿忍苦之誠副我仰成之意太祖以國計事殷累宣諭令扶持視事榖辭以所傷未任趍拜故有是詔其後又詔入朝放朝參赴本司署事仍賜白藤肩輿二年六月勑榖本貫河南府雒陽縣清風鄉髙陽里改為賢相鄉勲徳里馮道初仕後唐明宗朝為相長興初詔改本貫瀛州景城縣來蘇鄉為元輔鄉朝漢里為孝行里晉天福中為司空平章事詔給門㦸十六枝道嘗上表求退髙祖不之覽先遣鄭王就省謂曰卿來日不出朕當親行請卿道不得已出焉當時寵遇無與為比五年改道所居雒陽縣三川里為上相鄉靈夀里為中台里八年改為太尉鄉侍中里時道本貫瀛州陷契丹新加太尉侍中故以雒陽所居鄉里復旌改之周顯徳元年為太師中書令薨世宗聞之震悼册贈尚書令追封瀛王范質為侍中顯徳六年四月世宗征闗南質以疾留京師詔賜質錢百萬俾之市藥鄭仁誨為樞宻使同平章事世宗北征仁誨為東京留守調發軍湏供億無闕車駕廻兼侍中册府元龜卷三百十九
