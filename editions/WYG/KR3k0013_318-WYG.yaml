body:
  text: 册府元龜卷三百十八宋王欽若等撰宰輔部褒寵夫設官分職以為民極而輔相之位可謂重矣春秋傳曰名既不同禮亦異數故歴代而下推尊奨之命舉褒賞之典其于丞宰固殊於庶尹焉乃有經綸草昧參締構之業奮庸熈載佐洽平之治策勲則先于將帥著位則冠乎王公至于爵品以顯之輿服以貴之金帛以富之几杖以尊之以至視病臨弔生榮死哀斯皆重鼎足承君之任厚股肱同體之義百世之達道為臣之嘉遇也殷伊陟太戊時為相亳有祥桑榖共生于朝伊陟曰帝其修徳太戊從之祥桑枯死太戊贊伊陟于廟言弗臣伊陟讓周周公相成王唐叔得禾異畆同穎唐叔虞成王母弟食邑内得異畆禾也禾各生一壟而合為一穗獻諸天子収而貢之王命唐叔歸周公于東異畆同穎為天下和同之象周公之徳所致周公東征未遑故命唐叔以禾歸周作歸禾公攝政七年致太平復成王之位孫遁辟成功之大美欲老成王又留之為太師履赤舄故狼跋之詩曰公孫碩膚赤舄几几碩大膚美也赤舄人君之盛履也几几行貌漢蕭何為丞相漢王五年已殺項羽即皇帝位論功行封帝以何功最盛先封為酇侯食邑八千户列侯受封已畢奏位次皆曰曹參功多宜第一帝心欲何第一謁者鄂秋曰蕭何常全闗中以待陛下此萬世之功也蕭何當第一曹參次之帝曰善於是令蕭何帶劍上殿入朝不趨陳豨反帝自將至邯鄲而韓信謀反帝已聞誅信使使拜何為相國益封五千户令卒五百人一都尉為丞相衛陳崇曰髙皇帝褒賞元功相國蕭何邑户既倍又䝉殊禮奏事不名入殿不趨封其親屬十有餘人陳平吕后時為左丞相後與太尉周勃合謀誅諸吕立文帝平本謀也帝以平為左丞相賜金千斤益封三千户周勃吕后時為大尉與丞相陳平朱虚侯章共誅諸吕立文帝以勃為丞相賜金五千斤邑萬户衛綰為丞相景帝以為敦厚可相少主尊寵之賞賜甚多公孫𢎞武帝時為丞相上書乞骸骨報曰古者賞有功褒有徳守成上文遭禍右武右亦上也禍亂時則上武也未有易此者也易改也朕夙夜庶幾獲承至尊懼不能寧惟所與共為治者君宜知之惟思也知謂知治道盖君子善善及後世若兹行嘗在朕躬朕嘗思此不息于心也君不幸罹霜露之疾何恙不已罹遭也恙憂也已止也言何憂疾不止也禮記曰疾止復初也乃上書歸疾乞骸骨是章朕之不徳也章明也今事少間間言有空隙也君其存精神止念慮輔助醫藥以自持因賜吿牛酒雜帛居數月有瘳視事張湯為御史大夫嘗病武帝自至舍視其隆貴如此田千秋為丞相年老武帝優之朝見得乗小車入宫殿中故因號曰車丞相昭帝時每有吉祥嘉應數褒賞丞相訖昭帝世國家少事百姓稍益充實霍光為大司馬大將軍宣帝即位之明年下詔曰夫褒有徳賞元功古今通誼也大司馬大將軍光宿衛忠正宣徳明恩守節秉誼以安宗廟其以河北東武陽益封光萬七千户與故所食凡二萬户賞賜前後黄金七千斤錢六千萬雜繒三萬疋奴婢百七十人馬二千匹甲第一區地節二年春疾篤車駕自臨問為之涕泣光薨帝及皇太后親臨光喪大中大夫任宣與侍御史五人持節䕶䘮事中二千石治幕府塜上典為塜者賜金錢繒絮綉被百領衣五十篋璧珠璣玉衣漢儀注以玉為􅃭如鎧狀連綴以黄金為縷腰已下玉為札長尺廣二寸半為甲下至足亦綴以黄金縷梓宫以梓木為之親身之棺也為天子制故亦稱梓宫便房黄腸題凑各一具便房藏中便坐也以柏木黄心致累棺外故曰黄腸木題皆内向故曰題凑漢儀注天子陵中明中髙丈二尺四寸周二尺内梓宫次楩椁柏黄腸題凑又云便房小曲室也樅木外藏椁十五具在正藏外婢妾藏也或曰厨廏之屬也樅松業柏身東園温明東園處此器形如方漆桶開一面漆盡之以鏡置其中以懸尸上大斂並盖之東園署名也屬少府其主作此器也皆如乗輿制度載光尸柩以輼輬車按杜延年奏載霍光柩以輬車駕大廐白虎駟以輼車駕大廐白鹿駟為倅輼本安車也可以卧息後因載䘮飾以柳翣故遂為䘮車耳輼者密閉輬者旁開忩牖各别一合乗隨事為名後人既專以載喪又去其一總為藩飾而二名呼之耳倅副也黄屋左纛發材官輕車北軍五校士軍陳至茂陵以送其𦵏諡曰宣成侯發三河卒穿復土起塜祠堂置園邑三百家長丞奉守如舊法既𦵏天子思光功徳下詔曰大將軍宿衛孝武皇帝三十餘年輔孝昭皇帝十有餘年遭大難躬秉義率三公諸侯九卿大夫建萬世策以安宗廟天下蒸庶咸以康寧功徳茂盛朕甚嘉之復其後世疇其爵邑世世無有所與如蕭相國張安世為大司馬衛將軍領尚書事元康四年秋薨天子贈印綬送以輕車介士輕車古之戰車續漢書云雕朱輪不巾不盖菑矛㦸幢麾􅕈弩介士謂甲士也菑插也􅕈皮篋盛弩也諡曰敬侯賜塋杜東塋塜地將作穿復土起冡祠堂匡衡為丞相成帝即位上書乞骸骨帝報曰君其專精神近醫藥強食自愛因賜上尊酒食牛衡起視事帝以新即位褒優大臣也翟方進為相九年卒成帝遣九卿册贈以丞相髙陵侯印綬賜乘輿秘器少府供張柱檻皆素衣柱屋柱也檻軒前䦨板也皆以白采衣之天子親臨弔者數至禮賜異于他相故事漢舊儀云丞相有疾皇帝法駕親至問疾從西門入即薨移居第中車駕往弔賜棺斂具贈錢𦵏地𦵏日公卿已下㑹𦵏焉何武為大司空封汜鄉侯食邑千七百户汜鄉在瑯琊不其為後改食博望鄉故此指言在瑯琊不其也哀帝初即位褒賞大臣更以南陽犨之博望鄉為汜鄉侯增邑千户孔光平帝時為太師太后稱制王莾專權光恐固稱疾辭位太后詔曰太師光聖人之後先師之子徳行純淑道術通明居四輔職輔導于帝今年耆有疾俊艾大臣惟國之重其猶不可以闕焉書曰無遺耉老言不遺老成之人也國之將興尊師而重傅其令太師母朝十日一賜餐賜太師靈夀杖靈夀木有枝節長不過八九尺并圍三四寸自然有合杖制不似竹須削治也黄門令為太師省中坐置几太師入省中用杖賜餐十七物食具有十七種物然後歸老于第官屬按職如故光薨王莾白大后使九卿䇿贈以太師博山侯印綬賜乗輿秘器金錢雜帛少府供張諫大夫持節與謁者二人使護䘮事博士護行禮太后亦遣中謁者持節視䘮公卿百官㑹弔送𦵏載以乗輿輼輬及副各一乘羽林孤兒諸生合四百人輓送車萬餘兩道路皆舉音以過䘮䘮到之處行道之人皆舉音哭而過乃止將作穿復土令甲卒五百人起墳如大將軍王鳳制度後漢卓茂光武初即位徵為太師薨賜棺椁塜地車駕素服親臨送𦵏伏湛為大司徒策免建武六年徙封不其侯就國後南陽太守杜詩上疏薦湛宜居輔弼十三年夏徵勅尚書擇拜吏日未及就位因宴見中暑病卒賜秘器帝親弔祠遣使者送䘮修冡侯覇建武五年為大司徒十三年薨帝傷惜之親自臨弔下詔曰惟覇積善清潔視事九年漢家舊制丞相拜日封為列侯朕以軍師暴露功臣未封縁忠臣之義不欲相踰未及爵命奄然而終嗚呼哀哉於是追封諡覇則鄉哀侯食邑三千六百户蔡茂建武二十年為大司徒在職清儉匪懈二十年薨于位賜東園梓椁賻贈甚厚杜林建武二十二年為大司空明年薨帝親臨喪送葬馮勤為大司徒中元元年薨東觀記曰中元元年車駕西幸長安祠陵寝還勤宴見前殿盡日歸府因病喘逆上使太醫療視賞賜錢帛遂薨光武悼惜之使者弔祠賜東園秘器賵贈有加鄧禹為大司徒明帝即位以屬先帝元功拜為太傅進見東向甚見尊寵臣當北面尊如賔故令東向歳餘寢疾帝數自臨問鮑昱永平十五年為司徒賜錢物什器帷帳趙熹為衛尉行太尉事居府如真後遭母憂上疏乞身行喪禮明帝不許遣使者為釋服賞賜恩寵甚渥章帝即位進為太傅録尚書事建初五年熹疾病帝親幸視及薨車駕往臨弔牟融章帝即位為大尉與趙熹參録尚書事建初四年薨帝親臨其䘮時融長子麟歸鄉里帝以其餘子幼弱勑太尉掾史教其威儀進止贈賵恩寵篤宻焉又賜冡塋地於顯節陵下鄭𢎞章帝元和初為太尉時舉將第五倫為司空班次在下每正朔朝見𢎞曲躬而自卑帝問知其故遂聽置雲母屏風分隔其間繇此以為故事丁鴻和帝時為太尉薨賜贈有加常禮張禹為太傅録尚書事鄧太后以殤帝初育欲令重臣居禁内乃詔禹舍宫中給帷帳袱褥太后朝夕進食五日一歸府每朝見特贊與三公絶席安帝即位數上疾乞身詔遣小黄門問疾賜牛一頭酒十斛勸令就第徐防為太尉與太傅張禹參録尚書事數受賞賜甚見褒寵安帝即位以定策封龍鄉侯食邑千一百户張酺為司徒薨安帝縞素臨弔賜冡塋賵贈恩寵異於他相陳蕃為太傅靈帝即位竇太后優詔蕃曰盖褒功以勸善表義以厲俗無徳不報大雅所嘆太傅陳蕃輔弼先帝出内累年忠孝之義徳冠本朝謇諤之操華首彌固今封蕃髙陽侯食邑三百户楊賜為司空薨靈帝素服三日不臨朝贈東園梓器襚服賜錢三百萬布五百疋策曰故司空臨晉侯楊賜華岳所挺九徳純備三葉宰相輔國以忠朕昔初載授道帷幄遂階成勲以陟大猷師範之功昭于内外庶官之務勞亦勤止七在卿校殊位特進五登衮職弭難乂寧雖受茅土未答厥勲哲人其萎將誰諮度朕甚懼焉禮設殊等物有服章今使左中郎將郭儀持節追位特進贈司空驃騎將軍印綬及𦵏又使侍御史持節送喪蘭臺令史十人發羽林騎輕車介士前後部鼓吹又勑驃騎將軍官屬司空法駕送至舊塋公卿以下㑹塟諡文烈侯及小祥又㑹焉胡廣為太傅録尚書事薨靈帝熹平元年使五官中郎將持節奉策贈太傅安樂鄉侯印綬給東園梓器謁者護喪事賜冢塋于原陵拜家一人為郎中靈帝思感舊徳乃圖畫廣及太尉黄瓊于省内詔議郎蔡邕為其頌魏華歆為司徒文帝詔曰司徒國之儁老所與和隂陽順庶事也今大官重膳而司徒蔬食甚無謂也特賜御衣為其妻子男女皆作衣服又賜婢奴五十人鍾繇為太尉明帝即位遷大傅繇有膝疾拜起不便時華歆亦以髙年疾病朝見皆使載輿車虎賁舁上殿就坐是後三公有疾遂以為故事太和四年薨賜服臨弔曹真為大將軍大司馬朝雒陽賜劍履上殿入朝不趍當發西討帝親臨送病還雒陽明帝自幸其第省疾曹爽為大將軍假節鉞都督中外諸軍事録尚書事齊王即位加爽侍中改封武安侯邑萬二千戸賜劍履上殿入朝不趍贊拜不名蜀諸葛亮為丞相卒詔策曰惟君體資文武明濬篤誠受遺託孤佐輔朕躬繼絶興微志存靖亂爰整六師無歳不征神武赫然威鎮八荒將建殊功于季漢參伊周之巨勲如何不弔事臨垂克遘疾隕䘮朕用傷悼肝心若裂夫崇徳序功紀行命諡所以光昭將來刋載不朽今使使持節左中郎將杜瓊贈君丞相武鄉侯印綬諡君為忠武侯魂而有靈嘉兹寵榮嗚呼哀哉又詔為亮立廟於沔陽呉頋雍為丞相及卒大帝素服臨弔晉王祥為太保祥以年老累乞遜位武帝不許御史中丞侯史光以祥久病闕朝㑹禮拜免祥官詔曰太保元老髙行朕所毗倚以隆政道者也前後遜讓不從所執此非有司所得議也遂寢光奏祥固乞骸骨聽以睢陵公就第賜几杖不朝大事皆咨訪之賜安車駟馬第一區錢百萬絹五百疋床帳簟褥以舍人六人為睢陵公舍人置官騎二十人以公子騎都尉肇為給事中常侍優㳺定省又以太保髙潔清素家無宅宇其權居本府湏所賜第成乃出及薨賜東園秘器朝服一具衣一襲錢三十萬布帛百疋裴秀為司空薨武帝詔曰司空經徳履哲體蹈儒雅佐命翼世勲業𢎞茂方將宣獻敷制為世宗範不幸薨殂朕甚痛之其賜秘器朝服一具衣一襲錢三十萬布百疋石苞為大司馬薨武帝發哀于朝堂賜秘器朝服一具衣一襲錢三十萬布百疋及𦵏給節幢麾曲盖追鋒車鼓吹介士大車如魏司空陳泰故事車駕臨送於東掖門外策諡曰武咸寧初詔與裴秀等並為王功列於銘饗陳騫為大司馬既位極人臣年踰致仕思欲退身咸寧三年求入朝因乞骸骨賜衮冕之服詔曰騫元勲舊徳統馭東夏方𢎞逺績以一呉㑹而所苦未除每表懇切重勞以方事今聴留京城以前大理府為大司馬府増置祭酒二人帳下司馬官騎大軍鼔吹皆如前親兵百人厨田十頃厨園五十畆厨士十人器物經用皆留給焉又給乗輿輦出入殿中加鼓吹如漢蕭何故事騫屢稱疾辭位詔曰騫履徳論道朕所咨詢方頼謀猷以𢎞庶績宜時視事可遣散騎常侍諭意騫輙歸第詔又遣侍中敦諭還府遂固請許之位同保傅在三司之上賜以几杖不朝安車駟馬以髙平公還第帝以其勲舊耆老禮之甚重又以騫有病聽乗輿上殿及薨加以衮歛贈太傅諡曰武及𦵏帝於大司馬門臨喪望柩流涕禮依大司馬石苞故事賈充為太尉太康三年疾篤上印綬遜位帝遣侍臣諭旨問疾殿中太醫致湯藥賜床帳錢帛自皇太子宗室躬省起居及薨帝為之慟使使持節太常奉䇿追贈太宰加衮冕之服緑綟綬御劍賜東園秘器朝服一具衣一襲大鴻臚護喪事假節鉞前後部羽葆鼓吹緹麾大輅鑾輅輼輬車帳下司馬大車椎斧文衣武賁輕車介士𦵏禮依霍光及安平獻王故事給塋田十頃與石苞等為王公配享廟庭荀顗為太尉薨武帝為舉哀皇太子臨喪二宫賻贈禮秩有加詔曰侍中太尉太子太傅臨淮公顗清純體道忠允立朝歴司外内茂績既崇訓傅東宫徽猷𢎞著可謂行歸于周有始有卒者已不幸薨殂朕甚痛之其賜温明秘器朝服一具衣一襲又詔曰太尉不恤私門居無館宇素絲之志沒而彌顯其賜家錢二百萬使立宅舍衛瓘為司空領太子少傅武帝詔加千兵百騎鼓吹之府何曾進位太傅老年屢乞遜位武帝詔曰太傅明朗髙亮執心𢎞毅可謂舊徳老成國之宗臣者也而髙尚其事屢辭禄位朕以寡徳憑頼保佑省覽章表實用憮然雖欲成人之美豈得遂其雅志而忘翼佐之益哉又司徒所掌務煩不可久勞耆艾其進太宰侍中公如故朝㑹劍履乗輿上殿如漢相國蕭何田千秋魏太傅鍾繇故事賜錢百萬絹五百疋八尺牀帳簟褥百副置長史掾屬祭酒及員吏一依舊制所給親兵官騎如前主者依次按禮典務使優備後每召見勑以嘗所飲食服物自隨令二子侍從咸寧四年薨帝於朝堂素服舉哀賜東園秘器朝服一具衣一襲錢三十萬布百疋李裔為司徒薨武帝詔遣御史持節監喪致祠皇太子命舍人王贊誄之文義甚美石鑒遷右光禄大夫開府領司徒前代三公册拜皆設小㑹所以崇宰輔之制也自魏末已後廢不復行至鑒武帝有詔令㑹遂以為常山濤為司徒薨武帝詔賜東園秘器朝服一具衣一襲錢五十萬布百疋以供喪事䇿贈司徒蜜印紫綬侍中貂蟬新沓伯蜜印青朱綬祭以太牢諡曰康將𦵏賜錢四十萬布百疋傅祗懷帝時為司徒以足疾詔版輿上殿不舞蹈王導明帝時為司徒王敦舉兵内向帝伐敦假導節都督諸軍領楊州刺史敦平進封始興郡公邑三千户賜絹九千疋進位太保司徒如故劍履上殿入朝不趍贊拜不名導固讓復與庾亮等同受遺詔共輔幼主是為成帝及薨帝舉哀于朝堂三日遣大鴻臚持節三事贈襚之禮一依漢博陸侯及安平獻王故事及𦵏給九㳺輼輬車黄屋左纛前後羽葆鼓吹虎賁班劍百人中興名臣莫與為比册曰盖髙位以酬明徳厚爵以荅懋勲至乎闔棺摽跡莫尚號諡風流百代于是乎在惟公邁達冲虚𤣥鑒劭邈夷淡以約其心體仁以流其惠棲遲務外則名儁中夏應期濯纓則潛筭獨運昔我中宗肅祖之基中興也下帷委誠而策定江左恭已宅心而庶績咸熈故能威之所振㓂虐改心化之所鼓檮杌易質調隂陽之和通彞倫之紀遼隴承風丹穴景附隆髙世之功復宣武之績舊物不失公協其猷若乃負荷頋命保朕冲人遭遇艱圯夷險委順拯其淪墜而濟之以道扶其顛傾而𢎞之以仁經緯三朝而藴道彌曠方頼髙謨以穆四海昊天不弔奄忽薨殂朕用震慟于心雖有殷之殞保衡有周之喪二南曷踰兹懷今遣使持節謁者僕射任贍賜諡曰文獻祠以太牢魂而有靈嘉兹榮寵陸玩為司空薨給兵千人守冡七千家孝武帝太元中功臣普被减削司空何充等止得六家以玩有佐命之勲先陪陵而𦵏繇是特置興平伯官屬以為衛王彪之為尚書令掌朝政以年老上疏乞骸骨孝武詔不許加光禄大夫儀同三司未拜疾篤帝遣黄門侍郎問所苦賜錢三十萬以營醫藥及卒即以光禄為贈桓温為大司馬薨皇太后與孝武臨于朝堂三日詔賜九命兖冕之服及朝服一具衣一襲東園秘器錢二百萬布二千疋蠟五百斤以供䘮事及𦵏一依太宰安平獻王漢大将軍霍光故事賜九旒鑾輅黄屋左纛輼輬車挽歌二部羽葆鼔吹虎賁班劍百人優册即前南郡公増七千五百户進地方三百里賜錢五千萬絹二萬疋布十萬疋追贈丞相謝安輔政領楊州刺史詔以甲仗百人入殿時孝武始親萬幾進安中書監驃騎將軍録尚書事固讓軍號後出鎮新城帝出祖于西池獻觴賦詩焉及薨帝三日哭臨于朝堂賜東園秘器朝服一具衣一襲錢百萬布千疋蠟五百斤贈太傅諡曰文靖以無下舍詔府中備凶儀及𦵏加殊禮依大司馬桓温故事又以平符堅勲封廬陵郡公宋徐羡之為尚書僕射鎮軍將軍丹陽尹髙祖即位以佐命之功詔遷尚書令楊州刺史進位司空録尚書事帝不豫加班劍三十人與中書令傅亮等同受顧命傅亮為僕射與徐羡之等並受顧命給班劍二十人王𢎞永初中為衛將軍開府儀同三司徐羡之等謀廢立召之入朝文帝即位以定策安社稷進號車騎大將軍開府江州刺史如故徐羡之等徵為侍中徙録尚書加班劍三十人帝西征謝晦與彭城王義康居守入住中書省下引隊仗出入司徒府權置參軍元嘉九年薨贈太保中書監給節加羽葆鼓吹增班劍為六十人侍中録尚書楊州刺史如故諡曰文昭公配食廟庭其年詔曰乃者三逆煽禍實繁有徒爰初遵養暨于明罰外虞内慮實惟艱難故太保華容縣公𢎞故衛將軍華故左光禄大夫曇首抱義懷忠乃情同至籌謀廟堂竭盡智力經綸夷險簡自朕心國耻既雪允膺茅土而並執謙挹志不可踰故用佇朝典將有後命盛業不究相繼殞落永懷傷嘆痛恨無已𢎞可増封千户華曇首封開國縣侯食邑各千户護軍将軍建昌公彦之深誠宻謨比蹤齊望其復先食邑以酬忠勲又詔聞王太保家便已匱乏清約之美同規古人言念始終情深悽歎可賜錢百萬米千斛南齊王儉為侍中尚書令武帝永明初進號衛將軍六年即本號開府儀同三司先是詔儉三日一還朝尚書令史出外咨事帝以往來頻數詔儉還尚書下省疾甚世祖親臨視及薨吏部尚書王晏啟及儉喪帝答曰王儉年徳富盛志用方隆豈意暴疾不展救護便為異世奄忽如此痛酷彌深其契闊艱運義重常懷言尋悲切不能自勝痛矣奈何往矣奈何詔衛将軍文武及臺所兵仗可悉停待𦵏又詔曰慎終追逺列代通規褒徳紀勲峻膺常策故侍中中書令太子少傅領國子祭酒衛軍将軍開府儀同三司南昌公儉體道秉哲風宇淵深肇自弱齡清猷自逺登朝應務民望斯屬草昧皇基協隆鼎祚宏謨盛烈載銘彛篆及贊朕躬徽績光茂忠圖令範造次必彰四門允穆百揆時序宗臣之重情寄兼嘗方正位論道允釐衮職弼兹景化以贊隆平天不愸遺奄焉薨逝朕用震慟于厥心可追贈太尉侍中中書監公如故給節加羽葆鼔吹增班劍為六十人褚淵初為尚書令侍中給班劍二十人後改中書監給鼓吹一部後為司徒録尚書事増班劍為三十人五日一朝淵疾帝遣侍中王晏黄門郎王秀之問疾及薨家無餘財負債至數十萬詔曰司徒奄至薨逝痛怛慟懷比雖尫瘵便力出臨哭給東園秘器朝服一具衣一襲錢二十萬布二百疋蠟二百斤又詔曰夫褒徳所以紀民慎終所以歸厚前王盛典咸必由之故侍中司徒録尚書事新除司空領驃騎将軍南康公淵履道秉哲鍳識𢎞曠爰初弱齡清風夙舉登庸應務具瞻允集孝友著于家邦忠貞彰于亮采佐命先朝經綸王化契濶屯夷綢繆始終摠録機衡四門惟穆諒以同規往古式範來今謙光彌逺屢陳降挹權從髙㫖用虧大猷将登上列永翼聲教天不憗遺奄焉薨逝朕用震慟于厥心其贈公太宰侍中録尚書公如故給節加羽葆鼓吹增班劍為六十人𦵏送之禮依宋太保王𢎞故事諡曰文簡徐孝嗣為左僕射散騎常侍明帝即位加侍中中軍大將軍以定策勲進爵為公贈封二千户給班劍三十人加兵百人舊拜三公乃臨軒至是帝特詔與陳顯達王晏並臨軒拜授梁謝朏為中書監司徒衛將軍薨於府時年六十六髙祖出臨哭詔給東園秘器朝服一具衣一襲錢十萬布百疋蠟百斤贈侍中司徒王亮為中書監卒髙祖詔贈錢三萬布五十疋王瑩為中書令給鼓吹一部瑩性清慎居官恭恪髙祖深重之王僧辨自元帝初為侍中尚書令及帝即位以功進授鎮軍將軍司徒加班劍二十人改封永寧郡公食邑五千户陳徐度為司空薨贈太尉給班劍二十人宣帝大建四年配享髙祖廟庭後魏奚斤明元時為左丞相蠕蠕犯塞斤等追之拜天部大人進爵為公命斤出入乗軺軒備威儀導從穆觀明元時統攝朝政泰常八年暴疾薨於苑帝親臨其䘮悲動左右賜以通身隱起金飾棺䘮禮一依安城王叔孫俊故事贈宜都王盧魯元為太保録尚書事每有平殄輙以功賞賜僮𨽻前後數百人布帛以萬計太武臨幸其第不出旬日欲其居近易於往來乃賜甲第於宫門南衣食車馬皆乗輿之副真君三年冬車駕幸隂山魯元以病不從侍臣問疾送醫藥傳驛相屬於路及薨帝甚悼惜之還臨其喪哭之哀慟東宫西宫命太官日送奠晨昏哭臨訖則備奏鍾鼓伎樂輿駕比𦵏三臨之喪禮依安城王故事而賻送有加贈襄城王𦵏於崞山為建碑闕自魏興貴臣恩寵尉眷文成時與太宰常英等評尚書事帝以眷元老賜杖履上殿劉尼為振威將軍與源賀等共立文成封東安王髙宗末遷司徒獻文即位以尼有大功於先朝彌加尊重賜别户三千茍頽孝文時為司空公封河東王以舊老聽乗步挽杖於朝又詔曰頽為台鼎論道是寄歴奉四朝庸績彌逺宜加崇異以彰厥功自兹已後可永受復除尉元為司徒以年老致仕元疾篤孝文親幸省疾太和十七年八月元薨詔曰元至行寛純仁風美富内秉越羣之武外挺温懿之容自少暨長勲勤備至歴奉五朝美隆四葉南耀河淮之功北光燕然之効魯宋懷仁中鉉載徳所謂忘身備於本末行道著於終始勲書玉牒惠結民志者也爰及五福攸集懸車歸老謙損既彰逺邇流詠陟兹父事儀我萬方謂極睂夀彌贊大業天不遺老奄爾薨逝念功惟善惻怛于懷但戎事致奪恨不盡禮耳可賜布帛綵物二千疋温明秘器朝服一襲並為營造墳域塟以殊禮馮熈為太尉太和十九年三月戊子薨四月辛丑孝文為熈舉哀於行在所陳建為司徒征西大將軍進爵魏郡王孝文與文明太后頻幸建第賜建妻物於後庭穆亮自宣武即位為尚書令俄轉司空公景明三年薨給東園温明秘器朝服一具衣一襲錢四十萬布二百疋蠟二百斤世宗親臨小歛贈太尉公領司州牧崔光孝明時為車騎大將軍儀同三司正光元年冬賜光几杖衣服三年詔步挽至東西上閣光年耄多務病疾稍增而自強不已嘗在著作疾篤不歸四年十月孝明親臨省疾詔斷賔客中使相望為止聲樂罷諸逰眺拜長子勵為齊州刺史及薨孝明聞而悲泣中使相尋詔給東園温明秘器朝服一具衣一襲錢六十萬布一千疋蠟四百斤大鴻臚監護䘮事贈太傅領尚書令驃騎大將軍開府冀州刺史侍中如故又勑加後部鼓吹班劍依太保廣陽王故事孝明祖䘮建春門外望輀哀感儒者榮之册府元龜卷三百十八
