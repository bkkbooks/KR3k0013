body:
  text: 册府元龜卷二百五宋王欽若等撰閏位部廵幸畋遊廵幸夫廵狩之儀載乎虞典遊豫之度存諸夏諺葢所以覲羣后省風俗鳴鑾案節清道而行卜日惟吉歸格藝祖慶賜浹洽衆庶歡康斯先王展義之道也若夫秦政之幸回中登之罘駐彭城臨碣石致禱以出周鼎命使而求羡門侈心未窮海内稱亂固足為後王之戒也洎吳蜀宋齊而下亦或舉時廵之制稽設敎之義或脩謁陵寢或歴覧故宫或宴衎以示慈或肆赦而施惠以至耆艾加粟帛之賜孝悌有旌賞之命布在方册可舉而言矣秦始皇二十七年廵隴西北地出雞頭山過回中回中在北地臣欽若等曰自此以下不書月者皆史書闕文又云始皇廵河内自以武徳定天下置武徳縣二十八年東行郡縣上㤗山封禪既畢於是乃竝渤海以東過黄腄東萊有黄縣腄縣窮成山登之罘罘山在腄縣立石頌秦徳焉而去南登琅琊大樂之留三月徙黔首三萬户琅琊臺下越王勾踐嘗治琅琊縣起臺館復十二嵗作琅琊臺立石刻頌秦徳明得意曰維二十六年皇帝作始端平法度萬物之紀以明人事合同父子聖智仁義顯白道理東撫東土以省卒士事已大畢乃臨于海皇帝之功勤勞本事上農除末黔首是富普天之下摶心揖志器械一量同書文字日月所照舟輿所載皆終其命莫不得意應時動事是維皇帝正飭異俗陵水經地憂恤黔首朝夕不懈除疑定法咸知所辟方伯分職諸治經易舉錯必當莫不如畫皇帝之明臨察四方尊卑貴賤不踰次行姦邪不容皆務貞良細大盡力莫敢怠荒逺邇辟隠專務肅莊端直敦忠事業有常皇帝之徳存定四極誅亂除害興利致福節事以時諸産繁殖黔首安寧不用兵革六親相保終無冦賊驩欣奉敎盡知法式六合之内皇帝之土西渉流沙南盡北户東有東海北過大夏人迹所至無不臣者功葢五帝澤及牛馬莫不受徳各安其宇惟秦王兼有天下立名為皇帝乃撫東土至于琅琊列侯武城侯王離列侯通武侯王賁倫侯建城侯趙亥倫侯昌武侯成臣欽若等曰史失姓倫侯武信侯馮母擇丞相隗林丞相王綰卿李斯卿王戊五大夫趙嬰五大夫楊樛從與議於海上曰古之帝者地不過千里諸侯各守其封域或朝或否相侵暴亂殘伐不止猶刻金石以自為祀古之五帝三王知敎不同法度不明假威鬼神以欺逺方實不稱名故不久長其身未殁諸侯背叛法令不行今皇帝并一海内以為郡縣天下和平昭明宗廟體道行徳尊號大成羣臣相與誦皇帝功徳刻于金石以為表經還過彭城齋戒禱祠欲出周鼎泗水使千人没水求之弗得乃西南渡淮水之衡山南郡浮江至湘山祠逢大風幾不得渡帝問博士曰湘君何神博士對曰聞之堯女舜妻而𦵏此於是始皇大怒使刑徒三千人皆伐湘山樹赭其山帝自南郡繇武闗歸武闗秦南闗通南陽在析西北七十里𢎞農界二十九年東游至陽武博浪沙中河南陽武縣有博浪沙為盗所驚求弗得乃令天下大索十日登之罘刻石其辭曰臣欽若等曰此辭三句為韻碣石㑹稽同維二十九年時在中春陽和方起皇帝東游廵登之罘臨炤于海從臣嘉觀原念休烈追誦本始大聖作治建定法度顯著綱紀外教諸侯光施文惠明以義理六國回辟貪戾無厭虐殺不已皇帝哀衆遂發討師奮揚武徳義誅信行威燀旁逹莫不賓服烹滅彊暴振㧞黔首周定四極普施明法經緯天下永為儀則大矣哉宇縣之中宇宇宙縣赤縣承順聖意羣臣誦功請刻于石表垂于常式其東觀曰維二十九年皇帝春遊覧省逺方逮于海隅遂登之罘照臨朝陽觀望廣麗從臣咸念原道至明聖法初興清理疆内外誅暴彊武威旁暢振動四極㑹滅六王闡并天下菑害絶息永偃武兵皇帝明徳經理宇内視聽不怠作立大義昭設備器威有章旗職臣遵分各知所行事無嫌疑黔首改化逺邇同度臨古絶尤常職既定後嗣循業長承聖治羣臣嘉徳祗誦聖烈請刻之罘旋遂之琅琊道上黨入道從也三十二年之碣石使燕人盧生求羡門古仙人也髙誓刻碣石一作盟壊城郭决通隄防其辭曰遂興師旅誅戮無道為逆滅息武殄暴逆文復無罪復一作憂庶心咸服惠論功勞賞及牛馬㤙肥土域皇帝奮威徳并諸侯初一㤗平墮壊城郭决通川防夷去險阻地勢既定黎庶無繇天下咸撫男樂其疇女修其業事各有序惠被諸産久竝來田久一作分莫不安所羣臣誦烈請刻此石垂著儀矩因使韓終侯公石生求仙人不死之藥始皇廵北邉從上郡入三十五年始皇欲游天下道九原直抵甘泉乃使蒙恬通道自九原抵甘泉塹山堙谷千八百里三十七年十月癸丑出游左丞相李斯從少子胡亥愛慕請從帝許之十一月行至雲夣望祀虞舜於九嶷山浮江下觀藉柯渡海渚過丹陽至錢塘臨浙江江水至會稽山隂為浙江水波惡乃西二百十里從狹中渡上㑹稽祭大禹望于南海而立石刻頌秦徳其文曰皇帝休烈平一宇内徳惠修長三十有七年親廵天下周覧逺方遂登會稽宣省習俗黔首齋莊羣臣誦功本原事迹追首髙明首一作道秦聖臨國始定刑名顯陳舊章初平法式審别職任以立恒常六王專倍貪戾傲猛率衆自彊暴虐恣行負力而驕數動甲兵隂通間使以事合從行為辟方内飾詐謀外來侵邊遂起禍殃義威誅之殄熄暴悖亂賊滅亡至徳廣宻六合之中被澤無疆皇帝并宇兼聽萬事逺近畢清運理羣物考驗事實各載其名貴賤竝通善否在前靡有隠情飾省宣義省一作非有子而嫁倍死不貞防隔内外禁止淫泆男女㓗誠夫為寄豭殺之無罪男秉義程妻為逃嫁子不得母咸化廉清大治濯俗天下承風蒙被休經皆遵度軌和安敦勉莫不順令黔首修㓗人樂同則嘉保太平後敬奉法常治無極輿舟不傾從臣誦烈請刻此石光垂休銘還過吳從江乘渡丹陽有江乗縣竝海上北至琅邪二世元年與趙髙謀曰朕年少初即位黔首未集附先帝廵行郡縣以示彊威服海内今晏然不廵行即見弱無以臣畜天下其年春二世東行郡縣李斯從到碣石竝海南至會稽而盡刻始皇所立刻石傍著大臣從者名以彰先帝成功盛徳焉皇帝曰金石刻盡始皇帝所為也今襲號而金石刻辭不稱始皇帝其於久逺也如後嗣為之者不稱成功盛徳丞相臣斯臣去疾姓馮御史大夫臣徳失姓昧死言臣請具刻詔書刻石因明白矣臣昧死請制曰可遂至遼東而還蜀後主建興十四年四月後主至湔登觀阪看汶水之流日還成都吳後主孫皓寶鼎三年九月出東闗宋文帝元嘉十四年二月乙卯行幸丹徒謁京陵三月丁亥還宫二十六年二月己亥陸道幸丹徒謁京陵五月丙寅水路發丹徒壬午至京師孝武帝大明五年九月丁卯行幸琅琊郡囚繫悉原遣臣欽若等曰本紀不書還宫七年二月甲寅廵南豫南兖二州丁巳較獵于歴陽之烏江縣己未登烏江縣六合山壬申還宫九月戊子詔曰昔周王驥跡實窮四溟漢帝鸞軫夙遍五嶽皆以上對幽靈下理民土自天昌替馭臨宫創圖禮代天欝世貿興毁皇家造宋日月重光璇璣得序五星順命而戎車歳動陳詩義闕朕聿奉三無奄一天下思盡寶戒之規以塞謀危之路當順時省方觀察風俗外詳考舊典以副側席之懐十月戊申廵南豫州乃下詔曰朕廵幸所經先見百年者及孤寡老疾竝賜粟帛獄繫刑罪竝親聽訟其士庶或怨欝危滯受抑吏司或隠約潔立負擯州里皆聽進朕前靣自陳訴若忠信孝義力田殖榖一介之能一藝之美悉加旌賞雖秋澤頻降而夏旱嬰弊可即開倉并加賑賜癸丑行幸江寧縣丙寅詔曰賞慶刑威奄國彜軌黜幽升明闢㝢常憲故採言聆風式觀侈質貶爵加地於是乎在今類帝宜社親廵江甸因覲嶽守躬求民瘼思𢎞明試之典以申考績之義行幸所經蒞民之職功宣於德即加甄賞若廢務亂民隨諐議罰二者詳察以聞十二月丙午行幸歴陽癸亥至自歴陽前廢帝景和元年九月癸巳幸湖熟奏皷吹戊戌還宫南齊武帝永明七年六月丁亥幸琅琊梁髙祖大同十年三月甲午幸蘭陵謁建寧陵至修陵己酉幸京口城北固樓改名北顧庚戌幸廻賓亭宴帝鄉故老及所經近縣奉迎候者數千人各賚錢二千陳高祖永定二年五月辛酉幸大莊嚴寺宣帝太建四年十二月甲辰幸樂遊苑後主至徳三年十一月辛巳幸長干寺北齊文宣帝天保元年二月庚午如晉陽拜辭山陵是日皇太子入居凉風臺監摠國事十月己卯備法駕御金輅入晉陽宫朝皇太后於内殿十二月辛丑至自晉陽二年正月甲戌帝汎舟於東城九月癸巳帝如趙定二州因如晉陽三年六月丁未至自晉陽乙卯如晉陽九月辛卯自并州幸離石十二月壬子還宫戊午如晉陽四年四月戊戌帝還宫五年八月丁丑帝幸晉陽十二月庚申北廵至逹速嶺覧山川險要將起長城六年三月丙申至自晉陽四月庚申帝如晉陽五月庚寅至自晉陽六月丁卯如晉陽壬申親討茹茹七月壬辰還晉陽九月乙卯至自晉陽十月辛亥如晉陽七年正月甲辰至自晉陽於鄴城西馬射大集衆庻而觀之八月庚申如晉陽九年三月丁酉至自晋陽六月乙丑自晋陽北廵己巳至祁連池戊寅還晋陽八月乙丑至自晋陽甲戌如晋陽十一月甲午至自晋陽十年正月甲寅如遼陽甘露寺三月丙辰至自遼陽九月己巳如晋陽十月晏駕于晋陽臺武成帝河清元年十月癸亥行幸晋陽十二月丙辰至自晉陽四年正月行幸晋陽四月傳位於皇太子改元天統稱太上皇十一月至自晋陽後主天統元年十二月壬戌太上皇帝幸晋陽丁卯帝至自晋陽二年正月庚子行幸晋陽二月庚戌太上皇帝至自晋陽八月太上皇帝幸晋陽三年正月壬辰太上皇帝至自晋陽九月丁巳太上皇帝幸晋陽十一月癸未至自晉陽四年四月辛巳太上皇帝幸晋陽五月壬戌至自晋陽五年三月行幸晋陽四月乙丑至自晋陽武平元年八月辛卯行幸晋陽十二月丁亥至自晋陽二年八月己亥行幸晋陽十月己亥至自晋陽三年八月癸巳行幸晋陽臣欽若等曰本紀不書至自四年二月丁巳行幸晋陽三月庚辰至自晋陽十月癸卯行幸晋陽五年二月乙未至自晋陽辛丑行幸晋陽丁未至自晋陽八月癸卯行幸晋陽六年正月乙亥至自晋陽七月甲戌行幸晋陽十年正月癸卯至自晋陽梁太祖開平元年十月帝以用軍未暇西幸文武百官等久居東京漸及疑訝令就便各許歸長安只留宰臣韓建薛貽矩翰林學士張策韋郊杜曉中書舎人封舜卿張衮并左右御史司天監宗正寺兼要當諸司節級外其宰臣張文蔚已下文武百官竝先於西京祇候二年二月帝以上黨未收因議撫廵便住西都赴郊禋之禮乃下令曉告中外取三月一日離東京以宰臣韓建權判建昌宫事兵部侍郎姚洎為鹵簿使開封尹博王友文為東都留守三月壬申帝親統六軍廵幸澤潞是日寅時車駕西幸宰臣并要切司局皆扈從晩次中牟丙申招討使劉知俊上章請車駕還東京葢小郡湫隘非久駐蹕之所逹覧帝俞其請四月丙午車駕離澤州丁未駐蹕於懐州宴宰臣文武百官辛亥至鄭州壬子幸東京丙寅車駕幸繁臺觀稼七月甲戌大霖雨陂澤泛溢頗傷稼穡帝幸右天武軍河亭觀水九月丙子太原軍臣欽若等曰即後唐太宗也出隂地闗南牧冦掠郡縣晋綘有備帝慮諸將翫冦乃下詔親議廵幸命有司備行丁丑翠華西狩宰臣翰林學士崇政院使金吾仗及諸司要切官皆扈從餘文武百官竝在東京壬午逹雒陽帝御文思殿受朝㕘許汝孟懐牧守來朝澤州刺史劉重覇靣陳破敵之策癸未西幸宿新安丙戌至陜州駐蹕蒲雍同華牧守皆進鎧甲騎馬戈矟食味方物丁亥錫宴扈從官戊子延州賊軍臣欽若等曰即祖䟦思恭也冦上平闗又太原軍攻平陽烽火羽書晝夜繼至乙丑六軍統軍牛存節黄文靖各領所部將士赴行在甲午太原歩騎數萬攻逼晋絳踰旬不克知天軍至乃自焚其寨至夜而遁十月庚戌至西都丁巳至東都三年正月甲戌發東都百官扈從次中牟縣乙亥次鄭州丙子次汜水縣河南尹張宗奭河陽節度使張歸覇竝來朝戊寅次偃師縣己卯備法駕六軍儀仗入西都是日御文明殿受朝賀三月辛未詔曰同州邉隅繼有士衆歸化暫思廵撫兼要指揮今幸蒲陜取九日進發甲戌車駕發西都百官奉辭于師子門外丁丑次陜州己卯次觧縣河中節度使冀王友謙來奉迎庚辰至河中府四月丙申朔駐蹕河中壬寅辰時駕廵于朝邑縣界焦黎店冀王友謙及崇政内諸司使扈從至申時廻五月癸酉駕三更一㸃發河中己卯至西京庚戌同州節度使劉知俊據本郡反辛亥駕幸蒲陜夜半發大内七月癸酉駕幸陜乙亥至自陜文武百官於新安縣奉迎閏八月己卯幸西苑觀稼十一月辛丑幸榖水四年二月乙丑幸甘水亭己丑出光政門至榖水觀麥四月丙戌幸建春門閲新樓至七里屯觀麥召從官食于樓河南張昌孫及蒲同主事吏賜物各有差十一月丁亥朔幸廣王第作樂五年二月壬戌詔曰東京舊邦久不廵幸宜以今月九日幸東都扈從文武官委中書門下量閑劇處分宰臣上言曰龍興天府久望法駕但陛下始康愈未宜渉寒願少留清蹕從之甲子幸曜村民舎閲農事庚午幸白馬坡四月丁卯幸龍門召宰臣學士金吾上將軍侍宴于廣化寺乾化五年五月癸巳觀稼于伊水登建春門幸會節坊張宗奭私第臨亭臯視物色賞賜甚厚七月帝不豫稍厭秋暑自辛丑幸㑹節坊張宗奭私第宰臣視事於歸仁亭子崇政使内諸司及翰林院竝止於河南令廨署至甲辰復歸大内八月戊辰幸故上陽宫至于榆林觀稼九月庚子親御六師次于河陽臣欽若等曰事具閏位親征門甲辰至于衛州乙巳至于宜溝幸民劉逹墅丙午至湘州十月辛亥朔駐蹕于湘州宰臣洎文武從官竝詣行宫起居户部郎中孔昌序齎留都百官冬朔起居表至自西京諸道節度使刺史諸藩府留後各以冬朔起居表來上制以郢王友珪充控鶴指揮使諸軍都虞候閻寶為御營使甲寅將以其夕幸魏縣命閣門使李郁報宰臣兼勑内外丙寅夜車駕發軔于都署乙卯次洹水丙辰至魏縣戊辰幸邑西之白龍潭潭水亘千尺許渉南北五之一焉風瀾岸卉遼然有江湖之狀潭之北立神祠前亭𢎞敞下值波際帝登臨凝覧宸㫖舒悦即命丞相與翰林六學士侍膳于左右又命漁艋數十以釣網進觀其漁焉俄頃間洪纎尾鬛所得無筭復有得大白魚長六七尺者來獻珠眸雪鱗厥狀甚異帝諦視已乃命近貴復之中流名其潭曰萬歳漁人等咸優錫遣之十一月辛巳朔上駐蹕魏縣從官自丞相而下竝詣行宫起居留都文武百官及諸道節度使防禦使刺史諸藩府留後各奉表起居壬午帝以邉事稍息宣命還京師車駕發自行闕夕次洹水縣癸未次内黄縣甲申至黎陽縣乙酉命從官丞相而下宴于行次丁亥次衛州戊子晨次新卿夕止獲嘉己丑次武陟庚寅次温縣辛卯次孟州留都文武官左僕射楊渉洎孟州守李周彜等皆匍匐東郊迎拜其文武官竝令先還壬辰詰旦離孟州晩至都六軍以天兵御仗分列前導煌煌焉濟濟焉昔所未覩也都人士女洎耆老等歡噪阡陌太祖御五鳳樓受百辟稱賀畢還宫二年二月壬戌帝將廵按北境中外戒嚴詔以河南尹守中書令判六軍事張宗奭為大内留守中書門下奏差定文武官領務尤切宜扈駕者三十八人詔工部尚書李皎左散騎常侍孫隲左諌議大夫張衍兵部侍郎劉邈兵部郎中張雋光禄少卿盧秉彜竝令扈蹕甲子發自雒師夕次河陽乙丑次温縣丙寅次武陟懐州刺史叚明逺迎拜于境上其内外所備咸豊霈焉丁卯次獲嘉戊辰次衛州之新鄉己巳晨發衞州夕止淇門内衙十將使以十指揮兵士至于行在辛未駐蹕黎陽癸酉發自黎陽夕次内黄縣甲戌次昌樂縣丁丑次于永濟縣青州節度使賀徳倫奏統領兵士赴歴亭軍前戊寅至貝州命四丞相及學士李琪盧文度知制誥竇賞等十五人扈從其左常侍韋戩等二十三人止焉己卯發自貝州夕駐于野落三月庚辰朔次于棗彊縣之西縣丙戌鎮定諸軍招討使楊師厚奏下棗彊縣車駕即日疾馳南還丁亥復至貝州庚寅楊師厚與副招討李周彜等准詔來朝乙巳發貝州夕次臨清縣丙午次永濟縣丁未至魏州四月己酉幸魏州金波亭賜宴宰臣文武官及六學士丁巳發魏州夕次昌樂戊午次内黄縣己未次黎陽駐馬乙丑發自黎陽夕次滑州將吏耆老竝於州之南津歡噪迎拜本州節度使進馬十匹銀器一千两備宴錢二千貫丙寅離滑州夕次常樂頓丁卯次長垣縣戊辰次封丘縣己巳至東京開封尹博王友文摠留都文武奉迎于北郊帝入自含耀門綵繡連延照耀阡陌都人士女闐咽歡呼是月戊寅車駕發自東京夕次中牟縣五月己卯朔從官文武自丞相而下竝詣行殿起居親王及諸道藩帥咸奉表來上庚辰發自鄭州至榮陽縣河南尹魏王宗奭望塵迎拜河陽留後邵賛懐州刺史叚明逺等邐迤來迎夕次汜水縣帝召魏王宗奭入對便於御前賜食數刻乃退壬午駐蹕于汜水宰臣河南尹六學士竝於内殿起居勑以建昌宫事委宰臣于兢領之癸未帝發自汜水宣令邵賛叚明逺各歸所理午憇任村頓夕次孝義宫留都文武禮部尚書孔續而下道左迎拜次偃師甲申至都文武官奉迎於東郊畋遊王者蒐狩以時所以除田害講武事也故易著三驅之㫖禮有五戎之習焉雖復餘閏亦存憲度其或順肅殺之令修弋獵之事不失乎禮故可尚也乃有射猛虎以為樂眷胡雉而縱心暴殄是期盤游靡戒以至乎荒志驕氣移其龜玉者不為不幸也吳大帝初為吳侯親乗馬射虎於庱亭馬為虎所傷帝投以雙㦸虎却廢嘗從張世擊以戈獲之帝每畋獵常乗馬射虎虎常突前攀持馬鞌張昭為軍師變色而言曰將軍何有當爾夫為人君者謂能駕御英雄驅使群賢豈謂馳逐於原野較勇於猛獸者乎如有一旦之患奈天下笑何帝謝昭曰年少慮事不逺以此慙君然猶不能已乃作射虎車為方目間不置葢一人為御自於中射之時有逸羣之獸輙復犯車而帝每手擊以為樂又帝數射雉少府潘濬諌由是遂絶景帝好射雉春夏之間常晨出夜還宋文帝元嘉二十五年閏二月大蒐于宣武塲三月較獵孝武帝大明七年二月南廵丁巳較獵于歴陽之烏江十月廵南豫己巳較獵於姑熟明帝㤗始七年二月於巖山射雉帝嘗射雉至日中無所得甚羞召問侍臣吾旦來如臯遂空行可笑座者莫答禇炫獨曰今節候雖適而雲霧尚凝故斯翬之禽驕心未警但待宸駕㳺豫羣情便可載驩帝意觧乃於雉塲置酒又云有雉不肯入塲日暮將反令晉平王休祐射之語曰不得雉勿歸休祐從在黄麾内便馳帝遣左右數人隨之因遣夀寂之等追及逼拉休祐南齊武帝永明末將射雉竟陵王子良諌之見宗室忠諌門東昏侯在位置射雉塲二百九十六處陳後主禎明二年十月幸莫府山大較獵東魏孝静興和三年十月癸亥狩于西山十一月戊寅還宫武定元年正月己巳蒐于西山癸酉還宫十一月甲午狩于西山乙巳還宫北齊文宣帝天保四年正月丙子山畨圍離石戊寅帝討之未至畨已逃竄因循三雉大狩而歸五月庚午較獵于林慮山戊子還宫後主天統元年十二月庚戌太上皇狩于北郊壬子狩于南郊乙卯狩于西郊武平四年九月較獵于鄴東七年十月大狩于祁連池梁太祖開平二年十二月癸丑獵畋于含耀門外三年十一月丙申畋于上東門外十二月乙丑臘較獵于甘泉驛四年十一月己亥畋于伊水乾化元年十二月癸酉臘假詔諸王與河南尹左右金吾六統軍等較獵于近苑册府元龜卷二百五
