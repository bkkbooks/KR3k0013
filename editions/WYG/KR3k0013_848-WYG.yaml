body:
  text: 册府元龜卷八百四十八宋王欽若等撰總録部任俠荀恱有言曰立氣作威結私交以立彊於世者謂之游俠自成周之衰諸侯力攻至於七國專任權譎所戰非義所恃惟險固凌弱暴寡餙詐尚變四民之業不專三游之術交䳱由是徇名之士豪舉之徒發憤以刷國恥結盟以復私怨感慨歸死終然不奪當此之際豈徒嚴憚士衆固亦震變景緯非夫勇厲剛果精神貫徹孰能若是乎秦滅漢興餘風未殄乃有聲流淮楚氣盖闗中折節締交輕財重諾觀其趨急濟厄損已不伐而恩不望報名髙於世兹所謂以怨報怨捨生取義者與魏晉以下訖於五代時或有之莫不挺絶異之姿懐君子之行又豈特搤腕瞑目悲歌慷慨使酒睚眦雜處屠博不護細行者哉魯曹沬以勇力事莊公莊公好力曹沬為魯將與齊戰三敗北魯莊公懼乃獻遂邑之地以和猶復以為將齊桓公許與魯㑹于柯而盟桓公與莊公既盟於壇上曹沬執匕首刼桓公桓公左右莫敢動而問曰子將何欲曹沬曰齊强魯弱而大國侵魯亦甚矣今魯城壊即壓齊境君其圖之桓公乃許盡歸魯之侵地既已言曹沬投其七首下壇北面就羣臣之位顔色不變辭令如故聶政者軹深井里人殺仇與母姊如齊以屠為事久之濮陽嚴仲子事韓哀侯與韓相俠累有隙嚴仲子恐誅亡去游求人可以報俠累者至齊人或言聶政勇敢士也避讐隐於屠者之間嚴仲子至門請數反然後具酒自觴一作賜聶政母前酒酣嚴仲子奉黄金百鎰前為聶政母壽聶政驚怪其厚固謝嚴仲子嚴仲子固進而聶政謝曰臣幸有老母家貧客游以為狗屠可以旦夕得甘脆以飬親親供飬備不敢當仲子之賜嚴仲子屏人因為聶政言曰臣有讐而游行諸侯衆矣然至齊竊聞足下義甚髙故進百金者將用為夫人粗糲之費得以交足下之驩豈敢以有求望耶聶政曰臣所以降志辱身居市井屠者徒幸以飬老母老母在政身未敢以許人也嚴仲子固讓聶政竟不肯受也然嚴仲子卒備賔主之禮而去久之聶政母死既已𦵏除服聶政曰嗟乎政乃市井之人鼓刀以屠而嚴仲子乃諸侯之卿相也不逺千里枉車騎而交臣臣之所以待之至淺鮮矣未有大功可以稱者而嚴仲子奉百金為親壽我雖不受然是者徒深知政也夫賢者以感忿睚眦之意而親信窮僻之人而政獨安得黙然而已乎且前日要政徒以老母老母今以天年終政將為知己者用乃遂西至濮陽見嚴仲子曰前日所以不許仲子者徒以親在今不幸而母以天年終仲子所欲報讐者為誰請得從事焉嚴仲子具告曰臣之讐韓相俠累俠累又韓君之季父也宗族甚多居處兵衛甚設臣欲使人刺之衆終莫能就今足下幸而不棄請益其車騎壯士為足下輔翼者聶政曰韓之與衛相去中間不甚遠今殺人之相相又國君之親此其勢不可以多人多人則不能無生得失生得失則語泄語泄是韓舉國而與仲子為讐一作難豈不殆哉遂謝車騎人徒聶政乃辭獨行杖劔至韓韓相俠累方坐府上持兵㦸而衛侍者甚衆聶政直入上階刺殺俠累韓烈侯三年三月盗殺韓相俠累俠累名傀戰國䇿曰有東孟之㑹又云聶政刺韓傀兼中哀侯左右大亂聶政大呼擊殺者數十人因自破面决眼自屠出腸遂以死唐且楚人也初秦王使人謂安陵君曰寡人欲以五百里之地易安陵君田其許寡人安陵君曰大王加惠以大易小甚善雖然受地於先王願終守之弗敢易秦王不悦安陵君因使唐且使於秦秦王謂唐且曰寡人以五百里之地易安陵安陵君不聴寡人何也且秦滅韓亡魏而君以五十里之地存者以君為長者故不錯意也今吾以十倍之地易於君而君逆寡人者輕寡人歟唐且對曰否不若是也安陵君受地於先王而守之雖千里不敢易也豈直五百里哉秦王拂然怒謂唐且曰公亦嘗聞天子之怒乎唐且對曰臣未嘗聞也秦王曰天子之怒伏屍百萬流血千里唐且曰大王嘗聞布衣之怒乎秦王曰布衣之怒亦免冠徒跣以頭搶地耳唐且曰此庸夫之怒也非士之怒也夫專諸之刺王僚也彗星襲月聶政之刺韓傀也白虹貫日要離之刺慶忌也倉鷹擊於殿上此三子者皆布衣之士也懐怒未發休烈隆於古與臣而將四矣若士必怒伏尸二人流血五歩天下縞素今日是也挺劍而起秦王色撓長跪而謝之曰先生坐何至於此寡人喻矣夫韓魏滅亡而安陵以五十里之地存者徒以有先生也侯嬴為夷門監魏公子無忌以為上客侯生謂公子曰屠者朱亥此子賢者世莫能知故隐屠間耳公子往數請之朱亥故不復謝公子怪之時秦昭王已破趙長平軍又進圍邯鄲公子姊為趙平原君夫人數請救於魏魏安釐王使將軍晋鄙將十萬衆救趙秦王使使者告魏王曰吾攻趙旦暮且下而諸侯敢救者必移兵擊之魏王恐使人止晉鄙留軍璧鄴魏公子乃盗晉鄙兵符將奪其軍以救趙侯生曰將在外主令有所不受以便國家公子即合符而晉鄙不授公子兵而復請之事必危矣臣客屠者朱亥可與俱此人力士晉鄙聴大善不聴可使擊之於是公子泣侯生曰公子畏死耶何泣也公子曰晉鄙嚄唶宿將往恐不聴必當殺之是臣泣耳豈畏死哉於是公子請朱亥朱亥笑曰臣乃市井鼓刃屠者而公子親數存之所以不報謝者以為小禮無所用今公子有急此乃臣効命之秋也遂與公子俱公子過謝侯生侯生曰臣宜從老不能請數公子行日以至晉鄙軍之日北向自頸以送公子公子遂行至鄴矯魏王令代晉鄙晉鄙合符疑之舉手視公子曰今吾擁十萬之衆屯於境上國之重任今單騎来代之何如哉欲無聴朱亥袖四十斤鐡椎椎殺晉鄙公子遂將晉鄙軍勒兵下令軍中曰父子俱在軍中父歸兄弟俱在軍中兄歸獨子無兄弟歸飬得選兵八萬人進兵擊秦軍解去遂救邯鄲存趙荆軻衛人也其先乃齊人徙於衛衛人謂之慶卿亦謂之荆卿好讀書撃劍以術説衛元君元君不用嘗游過榆次與盖聶論劍盖聶怒而目之荆軻出人或言復召荆卿盖聶曰曩者吾與論劍有不稱者吾目之試往是宜去不敢留使使往之主人荆卿則已駕而去榆次矣使者還報盖聶曰固去也吾曩者目攝之荆軻游於邯鄲魯勾踐與荆軻博争道魯勾踐怒而叱之荆軻黙而逃去遂不復㑹荆軻既至燕愛燕之狗屠及善撃筑者髙漸離荆軻嗜酒日與狗屠及髙漸離飲於燕市酒酣以往髙漸離擊筑荆軻和而歌於市中相樂也已而相泣旁若無人者荆軻雖游於酒人乎飲酒之人然其為人沉深好書其所游諸侯盡與其賢豪長者相結納之燕燕之處士田光先生亦善待之知其非庸人也居頃之㑹燕太子丹質秦亡歸燕燕太子丹者故嘗質於趙而秦王政生於趙其少時與丹驩及政立為秦王而丹質於秦秦王之遇燕太子丹不善故丹怨而亡歸歸而求為報秦王者國小力不能其後秦日出兵山東以伐齊楚三晉稍蠶食諸侯且至於燕燕君臣皆恐禍之至太子丹患之問其傳鞠武武對曰秦地徧天下威脅韓魏趙氏北有甘泉谷口之固南有涇渭之沃擅巴漢之饒右隴蜀之山左闗殽之險民衆而士厲兵革有餘意有所出則長城之南易水以北未有所定也奈何以見陵之怨欲批白結切其逆鱗哉丹曰然則何由請入圖之居有間秦將樊於期得罪於秦王亡之燕太子受而舍之鞠武諫曰不可夫以秦王之暴而積怒於燕足為寒心又况聞樊將軍之所在乎是為委肉當餓虎之蹊也禍必不遠矣雖有管晏不能為之謀也願太子疾遣樊將軍入匈奴以滅口請西約三晉南連齊楚北購單于其後乃可圖也太子曰太傅之計曠日彌久心惛然恐不能須臾且非獨於此也夫樊將軍窮困于天下歸身於丹丹終不以廹於强秦而棄所哀憐之交置之匈奴是固丹命卒之時也願太傅更慮之鞠武曰夫行危而求安造禍而求福計淺而怨深連結一人之後交不顧國家之大害此謂資怨而助禍矣夫以鴻毛燎於爐炭之上必無事矣且以雕鷙之秦行怨暴之怒豈足道哉燕有田光先生其為人智深而勇沉可與謀太子曰願因太傅而得交於田光先生可乎鞠武曰敬諾出見田先生道太子願圖國事於先生也田光曰敬奉教乃造焉太子逢迎却行為導跪而蔽席蔽一作撥一作㧞田光坐定左右無人太子避席而請曰燕秦不兩立願先生留意也田光曰臣聞騏驥盛壯之時一日而馳千里至其衰老駑馬先之今太子聞光盛壯之時不知臣精已消亡矣雖然光不敢以圖國事所善荆卿可使也太子曰願因先生得結交於荆卿可乎田光曰敬諾即起趨出太子送至門戒曰丹所報先生所言者國之大事也願先生勿泄也田光俛而笑曰諾僂行見荆卿曰光與子相善燕國莫不知今太子聞光壯盛之時不知吾形已不逮也幸而教之曰燕秦不兩立願先生留意也光竊不自外言足下於太子也願足下過太子於宫荆軻曰謹奉教田光曰吾聞之長者為行不使人疑之今太子告光曰所言者國之大事也願先生勿泄是太子疑光也夫為行而使人疑之非節俠也欲自殺以􅈭荆卿曰願足下急過太子言光已死明不言也因遂自刎而死荆軻遂見太子言田光已死致光之言太子再拜而跪膝行流涕有頃而後言曰丹所以誡田先生毋言者欲以成大事之謀也今先生以死明不言豈丹之心哉荆軻坐定太子避席頓首曰田先生不知丹之不肖使得至前敢有所道此天之所以哀燕而不棄其孤也今秦有貪利之心而欲不可足也非盡天下之地臣海内之王者其意不厭今秦已虜韓王盡納其地又舉兵南伐楚北臨趙王翦將十萬之衆距漳鄴而李信出太原雲中趙不能支秦必入臣入臣則禍至燕燕小弱數困於兵今計舉國不足以當秦其諸侯服秦莫敢合從丹之私計愚以為誠得天下之勇士使於秦規以重利秦王貪其勢必得所願矣誠得刼秦王使悉反諸侯侵地若曹沬之與齊桓公則大善矣則不可因而刺殺之彼秦大將擅兵於外而内有亂則君臣相疑以間諸侯得合從其破秦必矣此丹之上願而不知所委命惟荆卿留意焉久之荆軻曰此國之大事也臣駑下恐不足任使太子前頓首固請毋讓然後許諾於是尊荆卿為上卿舍上舍太子日造門下供大牢具異物間進車騎美女恣荆軻所欲以順適其意久之荆軻未有行意秦將王翦破趙虜趙王盡收入其地進兵北畧地至燕南界太子丹恐懼乃請荆軻曰秦兵旦暮渡易水則雖欲長侍足下豈可得哉荆軻曰微太子言臣願謁之今行而毋信則秦未可親也夫樊將軍秦王購之金千斤邑萬家誠得樊將軍首與燕督亢之地圖方城縣有督亢亭膏腴之地奉獻秦王秦王必説見臣臣乃得有以報太子曰夫樊將軍窮困来歸丹丹不忍以己之私而傷長者之意願足下更慮之荆軻知太子不忍乃遂私見樊於期曰秦之遇將軍可謂深矣父母宗族皆為戮没今聞購將軍首金千斤邑萬家將奈何於期仰天太息流涕曰於期每念之嘗痛於骨髄顧計不知所出耳荆軻曰今有一言可以解燕國之患報將軍之讐者何如於期乃前曰為之奈何荆軻曰願得將軍之首以獻秦王秦王必喜而見臣臣左手把其袖右手揕其胸揕張鴧切一作抗然則將軍之讐報而燕見陵之愧除矣將軍豈有意哉樊於期偏袒搤腕一作捥而進曰此臣之日夜切齒拊心也乃今得聞教遂自刎太子聞之馳往伏屍而哭極哀既已不可奈何乃遂盛樊於期首函封之於是太子預求天下之利匕首得趙人徐夫人匕首徐一作陳取之百金使工以藥淬之以試人血濡縷人無不立死者言以匕首試人人血出足以沾濡絲縷便立死也乃為裝遣荆卿燕國有勇士秦舞陽年十三殺人人不敢忤視乃令秦舞陽為副荆軻有所待欲與俱其人居遠未来而為治行頃之未發太子遲之疑其改悔乃復請曰日已盡矣荆卿豈有意哉丹請得先遣秦舞陽荆軻怒叱太子曰何太子之遣往而不反者䜿子也今提一匕首入不測之强秦僕所以留者待吾客與俱今太子遲之請辭决矣遂發太子及賔客知其事者皆白衣冠以送之至易水上既祖取道髙漸離撃筑荆軻和而歌為變徵之聲士皆垂淚涕泣又前為歌曰風蕭蕭兮易水寒壯士一去兮不復還復為羽聲慷慨士皆瞋目髪盡上衝冠於是荆軻遂就車而去終已不顧既至秦持千金之幣物厚遺秦王寵臣中庻子蒙嘉嘉為先言於秦王曰燕王誠振怖大王之威不敢舉兵以逆軍吏願舉國為内臣比諸侯之列給貢職於郡縣而得奉守先王之宗廟恐懼不敢自陳謹斬樊於期頭及燕督亢之地圖函封燕王拜送於庭使使以聞大王惟大王命之秦王聞之大喜乃朝服設九賔見燕使者咸陽宫荆軻奉樊於期頭函而秦舞陽奉地圖匣以次進至陛秦舞陽色變振恐羣臣怪之荆軻顧笑舞陽前謝曰北畨蠻夷之鄙人未嘗見天子故振慴願大王少假借之使得畢使於前秦王謂軻曰取舞陽所持地圖軻既取圖奏之秦王發圖圖窮而匕首見因左手把秦王之袖而右手持匕首揕之未至身秦王驚自引而起䄂絶㧞劍劍長操其室時惶急劍堅故不可立㧞荆軻逐秦王秦王環柱而走羣臣皆愕卒起不意盡失其度而秦法羣臣侍殿上者不得持尺寸之兵諸郎中執兵皆陳殿下非有詔召不得上方急時不及召下兵以故荆軻乃逐秦王而卒惶急無以擊軻而以手共摶之是時侍醫夏無且以其所奉藥囊提荆軻也秦王方環柱走卒惶急不知所為左右乃曰王負劍王遂㧞劍以擊軻斷其左股荆軻廢乃引其匕首以摘秦王不中中銅柱秦王復擊荆軻軻被八創軻自知事不就倚柱而笑箕踞以罵曰事所以不成者欲以生刼之必得約契以報太子也於是左右前殺軻髙漸離與荆軻為友軻死燕滅漸離變名姓為人庸保匿作宋子縣名也今屬鉅鹿久之作苦聞其家堂上客擊筑徬徨不能去每出言曰彼有善有不善從者以告其主曰彼庸乃知音竊言是非其家丈人召使前擊筑一坐稱善賜酒而髙漸離念久隐畏約無窮時乃退出其裝匣中筑與其善衣更容貌而前舉坐客皆驚下與抗禮以為上客使擊筑而歌客無不流涕而去者宋子傳客之互以為客聞於秦始皇始皇召見人有識者乃曰髙漸離也秦皇帝惜其善擊筑重赦之乃􅀈海各切其目使擊筑未嘗不稱善稍益近之髙漸離乃以鉛置筑中復進得近舉筑扑秦皇帝不中於是遂誅髙漸離終身不復近諸侯之人項梁嘗殺人與籍避讐吴中吴中賢士大夫皆出梁下言皆不及也每有大徭役及䘮梁嘗主辦漢臺孺壹之子也壹始皇末墜樓煩為任俠州郡歌之朱家魯人魯人皆以儒教而朱家用俠聞所藏活豪士以百數其餘庸人不可勝言然終不伐其能飲其德有德於人而不自美也飲没也謂不稱顯諸所嘗施惟恐見之賑人不贍先從貧賤始家無餘財衣不兼采食不重味乗不過軥車軥挽也專趨人之急甚於己私既隂脫季布之厄及布尊貴終身不見自闗以東莫不延頸願交田仲楚人以俠聞父事朱家自以為行弗及張良字子房韓人大父開地父平皆為韓相良少未嘗事韓破良求刺客為韓報讐秦皇帝東游至博浪沙中地名在陽武南狼音浪良與客狙擊狙與覷同音謂宻伺之誤中副車謂後乗也求賊急甚良乃更姓名亡匿下邳項伯嘗殺人從良匿後封留侯季布楚人為任俠有名後至東河守季心布弟也氣聞闗中遇人恭謹為任俠方數千里士争為死嘗殺人亡吴從爰絲匿長事爰絲爰絲盎字言以兄長之禮事也弟畜灌夫籍福之属嘗為中司馬中尉之司馬中尉郅都不敢加禮少年多時時竊借其名以行詐自稱為心之賔客徒黨也欒布為燕相至將軍稱曰窮困不能辱身非人也富貴不能快意非賢也於是嘗有德願報之有怨必以法滅之田叔為人㢘喜任俠喜好也游諸公後至魯相劇孟雒陽人周人以商賈為資劇孟以俠顯吴楚反時條侯為太尉乗傳東將乗傳車而東出為大將也至河南得劇孟喜曰吴楚舉大事而不求劇孟吾知其無能為己已語終辭天下騷動大將軍得之若一敵國云劇孟行大類朱家而好博多少年之戯然孟母死自逺方送䘮千乗及孟死家無十金之財袁盎為楚相免官家居與閭里闘雞走犬劇孟嘗過盎盎善待之安陵富人有謂盎曰吾聞劇孟博徒將軍何自通之盎曰孟雖博徒然母死客送車千餘此亦有過人者王孟符離人以俠稱江淮之間符離沛郡之縣也是時濟南􅗎氏陳周膚亦以豪聞景帝聞之使使盡誅比屬其後代諸白梁韓母辟陽翟薛况陜寒孺紛紛復出焉代郡白姓非一家也故稱諸焉梁國人姓韓名母辟陽翟属川陜即今陜也陜縣也薛况寒孺皆人姓名也灌夫累官至太僕徙燕相坐法去官為人剛直使酒使酒因酒而使氣也不好面諛貴戚諸勢在已之右欲必陵之士在已左愈貧賤尤益禮敬與鈞右尊也左卑也鈞等也稠人廣衆薦寵下軰稠多也下軰下等之人也每於人衆之中故寵薦也士亦以此多之夫不好文學喜任俠已然諾已必也謂一言許人必信之也諸所與交通無非豪傑大猾家累數千萬食客日數千百人陂池田園宗族賔客為權利横頴川汲黯為九卿後卒於淮陽相好游俠任氣節行修潔衛人仕者皆嚴憚黯出其下鄭當時孝文時以任俠自喜脱張羽於阨梁孝王將楚相之弟也聲聞梁楚間後累遷為大司農朱安世陽陵大俠詔捕不能得丞相公孫賀子敬聲罪發繫獄賀請捕安世贖罪帝許之安世曰丞相禍及宗矣獄中上書告敬聲呪詛等罪賀遂父子死獄中郭解父任俠孝武時誅死解為人静悍性清静而勇悍不飲酒少時隂賊感慨不快意所殺甚衆以軀藉友報讎藉謂借助也藏命作姦剽攻休乃鑄錢掘塜不可勝數適有天幸窘急嘗得脱若遇赦及解年長更折節為儉以德報怨厚施而薄望然其自喜為俠益甚既以振人之命不矜其功其隂賊著於心本發於睚眦如故云心本猶言本心也如故盖言如舊不改耳而少年慕其行亦輙為報讐不使知也解姊子負解之勢負恃也與人飲使之釂非其任强灌之盡爵日釂其人不飲而使盡爵乃强灌之故怨怒也人怒刺殺解姊子亡去解姊怒曰以翁伯待人殺吾子賊不得翁伯解字也棄其尸道旁弗𦵏欲以辱解解使人微知賊窘自歸具以實告解解曰公殺之當吾兒不直遂去其賊辠其姊子收而𦵏之諸公聞之皆多解之義益附焉解出人皆避有一人獨箕踞視之解問其姓名客欲殺之解曰居邑屋不見敬是吾徳不修也彼何辠乃隂請尉史曰是人吾所重至踐更時脫之踐更為踐更之卒也脫免也每至直更數過吏弗求直當也次當為更也怪之問其故解使脱之箕踞者廼肉袒謝辠少年聞之愈益慕解之行雒陽有人讐者邑中賢豪居間以終數不聼居中間為道地和解之而不見許也客廼見解解夜見讐家讐家曲聴曲屈從其言解謂讐家曰吾聞雒陽諸公在間多不聼今子幸而聴之奈何從他縣奪人邑賢大夫權乎廼夜去不使人知曰且毋庸待我去令雒陽豪居間廼聴庸用也且無用休待雒陽豪更言之方從其言也解為人短小恭儉出未嘗有騎不敢乗車入其縣庭之旁郡國為人請求事事可出出之不可者各令厭其意然後乃敢嘗酒食諸公以此嚴重之争為用邑中少年及旁近縣豪夜半過門嘗十餘車請得解客舍飬之舍止也言解多藏亡命喜事少年與解同志者知亡命者多歸解故夜將軍来迎取其人居上而飬之及徙豪茂陵也解貧不中訾中充也言訾財不充合徙之數也吏恐不敢不徙衛將軍為言郭解家貧不中徙帝曰解布衣權至使將軍為言此其家不貧解徙諸公送者出千餘萬軹人揚季王子為縣掾舉徙解解兄子斷揚掾頭解入闗闗中賢豪知與不知聞其聲争交驩邑人又殺揚季王季王家上書人又殺之闕下帝聞乃下吏捕解解亡置其母家室夏陽身至臨晉籍少翁素不知解因出闗籍少翁已出解解轉入太原所過輙告主人家吏逐之迹至籍少翁少翁自殺口絶久之乃得解窮治所犯為而解所殺皆在赦前軹有儒生侍使者坐客譽郭解生曰解專以姦犯公法何謂賢解客聞之殺此生斷其舌吏以責解解實不知殺者殺者亦竟絶莫知為誰吏奏解無辠御史大夫公孫𢎞議曰解布衣為任俠行權以睚眦殺人解不知此辠甚於解殺之當大逆無道當謂處斷其罪遂族解自是之後俠者極衆而無足數者然闗中長安樊中子槐里趙王孫長陵髙公子西河郭公仲太原鹵公孺臨淮倪長卿東陽陳君孺雖為俠而恂恂有退讓君子之風至若北道姚氏西道諸杜南道仇景東道趙他羽公子據京師而言指其東西南北謂也姓他名羽字公子南陽趙調之徒盗跖而居民間者耳烏足道哉此乃鄉者朱家所羞也王林卿卭成太后外家為侍中通輕俠傾京師坐法免賔客愈盛甯成為内史抵罪歸家稱曰仕不至二千石賈不至千萬安可比人乎乃貰貸買陂田千餘頃假貧民役使數千家數年産至千金為任俠其使民威重於郡守王温舒陽陵人少時椎埋為姦椎殺人而埋之後至中尉朱雲字子游少時通輕俠借客報讐後至槐里令朱博字子元杜陵人家貧少時給事縣為亭長好客少年捕搏敢行好賔客及少年而追捕擊搏無所避也稍遷為功曹伉俠好交伉健也隨從士大夫不避風雨是時前將軍望之子蕭育御史大夫萬年子陳感以公卿子著才知名博皆友之為郡守九卿賔客滿門欲仕官者薦舉之欲報讐怨者解劍以帶之其趨事待士如是博以此自立然終用是敗後至丞相自殺睢孟魯國畨人少時游俠鬪雞走狗長乃變節後至符節令萬章字子夏長安人長安熾盛街閭各有豪俠章在城西柳市號曰城西萬子夏為京兆尹門下督從至殿中侍中諸侯貴人争欲揖章莫與京兆尹言者章逡廵甚懼其後京兆不復從也與中書令石顯相善得顯權力門車嘗接轂至成帝初石顯坐專權擅勢免官徙歸故郡顯貲巨萬當去留床席器物數百萬直欲以與章章不受賔客問其故章歎曰吾以布衣見哀於石君石君家破不能有以安而受其財物此為石氏之禍耶諸公以是服而稱之河平中王尊為京兆尹捕擊豪俠殺章及箭張囬作箭者姓張名囬酒市趙君都賈子光酒市中人皆長安名豪報讐怨飬刺客者也樓護為京兆吏數年甚得名譽是時王氏方盛賔客滿門五侯争名其客各有所厚不得左右不相經過也惟護盡入其門咸得其驩心結士大夫無所不傾其交長者尤見親而敬衆以是服為人短小精辨議論嘗依名節聴之者皆竦與谷永俱為五侯上客長安號曰谷子雲筆札樓君卿唇舌言其見信用也母死送塟者致車二三千兩閭里歌之曰五侯治喪樓君卿後至天水太守原渉字巨先為谷口令時年二十餘自劾去官少顯名京師郡國諸豪及長安五陵諸為氣節者皆歸慕之渉傾身與相待人無賢不肖闐門在所閭里盡滿以奴斫傷屠者亡為茂陵令尹公所辱初渉與新豐富人祁太伯為友太伯同母弟王游公素嫉渉時為縣門下掾説尹公曰君以守令辱原渉如是一旦真令至君復單車歸為府吏渉刺客如雲殺人皆不知主名可為寒心渉治冡舍奢僭踰制辠惡暴著主上知之今為君計莫若墮壊渉冡舍條奏其􅃇惡君必得眞令如此亦不敢怨矣尹公如其計莽果以為真令渉由此怨王游公選賔客遣長子初從車二十乗刼王游公家母即祁太伯母也諸客見之皆拜傳曰無驚祁夫人遂殺游公父及子斷兩頭去殺游公及其父渉性畧似郭解外温仁謙遜而内隐隐匿其情也好殺睚眦於塵中獨死者甚多陳遵杜陵人也為郁夷令以封嘉威侯居長安中列侯近臣貴戚皆貴重之請求不敢逆所到衣冠懐之惟恐在後懐来也謂招来而禮之時列侯有與遵同姓字者每至入門曰陳孟公坐中莫不震動既至而非因號其人曰陳驚坐辛次兄與平帝從舅衛子伯相善次兄其名也兩人俱游俠賔客甚多孫建為王莽強弩將軍王莽居攝誅鉏豪俠名捕漕中叔不能得漕中叔素善建莽疑建匿藏之以問建建曰臣素善之誅臣足以塞責莽性果賊無所容忍然重建不竟問遂不得也中叔子少游復以俠聞於世戴良曽祖父遵平帝時為侍御史王莽簒位稱病歸鄉里家富好給施尚俠氣食客嘗三四百人時人語曰闗東大豪戴子髙後漢馬援嘗亾命北地遇赦因留牧畜賔客多歸附者遂役屬數百家續漢書援過北地任氏畜牧自援祖賔本客天水父仲又嘗為牧師令是時兄員為護苑使者故人賔客皆依援後至伏波將軍寇恂上谷人初為郡功曹太守耿况甚重之王莽敗更始立使使者狥郡國曰先降者復爵位恂從耿况迎使者於界上况上印綬使者納之一宿無還意恂勒兵入見使者就請之使者不與曰天王使者功曹欲脅之耶恂曰非敢脅使君竊傷計之不詳也今天下初定國信未宣使君建節御命以臨四方郡國莫不延頸傾耳望風歸命今始至上谷而先堕誠信沮向化之心生離畔之隙將復何以號令他郡乎且耿府君在上谷久為吏人所親今易之得賢則造次未安不賢則祗更生亂為使君計莫若復之以安百姓使者不應恂叱左右以使者命召况况至恂進取印綬𢃄况使者不得已乃承制詔之况受而歸竇融王莽居攝中為强弩將軍司馬强弩將軍即莽明義侯王俊東擊翟義還攻槐里槐里趙明霍鴻等兵起以應翟義王邑等破義還合軍撃明鴻等滅之融時随其軍也以軍功封建武男東觀記續漢書並云寧武男女弟為大司空王邑小妻家長安中出入貴戚連結閭里豪傑以任俠為名然事母兄飬弱弟内修行義盖延漁陽人身長八尺彎弓三百斤邉俗尚勇力而延以氣聞後至虎牙將軍左馮翊蔡遵嘗為吏部所侵結客殺之初縣中以其柔也既而皆憚焉後至征虜將軍郅惲汝南西平人也其友董子張父及叔父為鄊里盛氏一時所殘害子張病因將終惲往候張張視惲歔欷惲曰吾知子不悲天命長短而痛二父讐不復也惲即將客遮仇人取其頭以示張張喜氣因絶惲見令以狀自首令應之遲趨出詣獄令跣追之不及即自入獄謝惲㧞刀自嚮以要惲曰子不從我出敢不以死明心乎惲遂出後至長沙太守楊政京兆人也嘗詣揚虚侯馬武武難見政稱疾不為起政入戸徑升牀排武把臂責之曰卿蒙國恩備位藩輔不思求賢以報殊寵而驕天下英俊此非飬身之道也今日動者刀入脅武諸子及左右皆大驚以為見刼操兵滿室政顔色自若會信陽侯至責數武令為交友其剛果任情皆如此也後至左中郎將王渙少好俠尚氣力數通輕剽少年晚而改節官至兖州刺史叚紀明少便習弓馬尚游俠輕財賄長乃折節好古學後至太尉鄭太少有才畧靈帝末知天下將亂隂結交豪俠家富於財有田四百頃而食嘗不足名聞山東時董卓遷都長安天下饑亂士大夫多不得其命而太豪有餘資日引賔客髙㑹倡樂所贍救者甚衆後至侍御史袁術少以俠氣聞數與諸公子飛鷹走狗後改行折節仕至監軍袁紹壯健好結交梁冀以下莫不善之後至大將軍冀州刺史劉梁以俠氣聞董卓性麄猛有謀少嘗遊羌中盡與豪帥相結後歸耕於野諸豪帥有來從之者卓為殺耕牛與共宴樂豪帥感其意歸相刼得雜畜千餘頭以遺之由是以健俠知名陳宫字公臺剛直烈壯少與海内知名之士皆相連結後叛曹公從呂布布敗誅死王康字公節泰山人輕財好施少以任俠聞後為河内太守周暉大司農忠之子也前為雒陽人去官歸兄弟好賔客雄江淮間出入從車嘗百餘乗及獻帝初暉聞京師不安來效忠董卓聞而惡之使兵刼殺其兄弟何顒與袁紹為奔走之友是時天下士大夫多遇黨難顒嘗嵗再三私入雒陽從紹計議為諸窮窘之士解釋患禍而袁術亦豪俠與紹争名顒未嘗造術術深恨之後辟司空府魏夏侯稱與文帝為布衣之交每讌㑹氣陵一坐辯士不能屈世之髙名者多從之游年十八卒張邈字孟卓少以俠聞賑窮救急傾家無愛士多歸之後至陳留太守夏侯惇字元讓年十四就師學人有辱其師者惇殺之由是以烈氣聞後至大將軍典韋形貌魁梧膂力過人有志節任俠襄邑劉氏與睢陽李永為讐韋為報之永為富春長備衛甚謹韋乗車載雞酒偽為候者門開懐匕首入殺永并殺其妻徐出取車上刀㦸歩出永居近市一市盡駭追者數百莫敢近行四五里遇其伴轉戰得脱由是為豪傑所識後為校尉臧霸字宣髙父戒為縣獄掾據法不聼太守欲所私殺太守大怒令收戒詣府時送者百餘人霸年十八將客數十人徑於費西山中要奪之送者莫敢動因與父俱亡命東海由是以勇壯聞後至執金吾特進楊阿若後名豐字伯陽酒泉人少游俠嘗以報讎解怨為事故時人為之號曰東市相斫楊阿若西市相斫楊阿若至建安年中太尉徐揖誅郡中强族黄氏時黄其人名得脫在外乃以黄昻家粟金數斛募衆得千餘人以攻揖揖城守豐時在外以昻為不義乃告揖捐妻子走詣張掖求救㑹張掖又反殺太守而昻亦䧟城殺揖二郡合勢昻怨豐不與已同乃重募取豐欲令張掖以麻繫其頭生致之豐遂逃走武威太守張猛假豐為都尉使齎檄告酒泉聴豐為揖報讐遂單騎入南羗中合衆得千騎從樂浪南山中出詣趨郡城未到三十里皆令騎下馬曵柴揚塵酒泉郡人望見塵起以為東大兵到遂破散昻獨走出羗捕得昻豐謂昻曰卿前欲生繫我頸今反為我所繫云何昻慚謝豐遂殺之時黄華在東又還領郡豐畏華復走依燉煌至黄初中河西興復黄華降豐乃還郡郡舉孝亷州表其義勇詔即拜駙馬都尉後二十餘年病亡嚴幹字公仲李義字孝懿皆馮翊東縣人舊無冠族故二人並單家其器性皆厚重當中平末同年二十餘幹好撃劍義好辦護䘮事馮翊甲族桓田吉郭及故侍中鄭文信等頗以其各有器實共紀識之蜀徐庶先名福本單家子少好任俠擊劍中平末嘗為人報讐白堊􅊳面被髪而走為吏所得問其姓字閉口不言吏乃於車上立柱維磔之擊皷以令於市廛莫敢識者而黨伍共簒解之得脫後仕魏至右中郎將御史中丞吴孫堅為下邳丞鄉里知舊好事少年往来者嘗數百人堅接撫待飬有若子弟焉魯肅體貌魁竒少有壯節好為竒計天下將亂乃學撃劍騎射聚少年給其衣食往来南山中射獵隂相部勒講武習兵父老咸曰魯氏世衰乃生此狂兒後至横江將軍甘寧字興霸少有氣力好游俠招合輕薄少年為之渠帥羣聚相随挾持弓弩負􅞷帶鈴民聞鈴聲即知是寧吴書曰寧俠殺人藏舍亡命聞於郡中其出入歩則陳車騎水則連輕舟侍從被文繡所如先道路住止嘗以繒錦維舟去或割棄以示奢也人與相逢及屬城長吏接待隆厚者乃與交歡不爾即放所將奪其資貨後至折衝將軍呂蒙年十五六竊随姊夫鄧當撃賊當顧見大驚呵叱不能止時當職吏以蒙年小輕之曰彼䜿子何能為此欲以肉餧虎耳他日與蒙㑹又􅅓辱之䝉大怒引刀殺吏出走逃匿于鄭長家出因校尉袁雄自首承間為言孫䇿召見竒之引置左右後至南郡太守晉王濟性豪侈和嶠性至貪家有好李帝求之不過數十濟候其上直率少年詣園共啖畢伐樹而去時王愷以帝舅奢豪有牛名八百里駁嘗瑩其蹄角濟請以錢千萬與牛對射而賭之愷亦自恃其能令濟先射一發破的因據胡牀叱左右速探牛心来須臾而至一割便去後至侍中裴秀有雋才性豪俠有氣節弱冠得美名後至司空李乾有雄氣合賔客數千家在乗氏裴憲二子挹㲄竝以文才知名㲄仕季龍為太子中庶子散騎常侍挹㲄俱豪俠躭酒好臧否人物王敦字處仲每酒後輙詠魏武帝樂府歌曰老驥伏櫪志在千里烈士暮年壯心不已以如意打唾壺為節壺邉盡缺敦又嘗荒恣於色體為之弊左右諌之敦曰此甚易耳乃開後閣驅諸婢妾數十人並放之時人歎異焉後至大將軍祖逖字士稚范陽人世吏二千石為北州舊姓扶風晉王掾上谷太守逖少孤兄弟六人兄該納等並開爽有才幹逖性豁蕩不修義檢年十四五猶未知書諸兄每憂之然輕財好俠慷慨有節尚每至田舍輙稱兄意散榖帛以周貧乏鄉黨親族以是重之後至豫州刺史戴若思有風儀性閒爽少好游俠不拘操行遇陸機赴雒船裝甚盛遂與其徒掠之若思登岸據胡床指麾同旅皆得其宜機察見之知非常人在舫屋上遥謂之曰卿才器如此乃復作刼耶若思感悟因流涕投劍就之機與言深加賞異遂與定交後至驃騎將軍周嵩字仲智狷直果俠每以才氣凌物後至御史中丞袁躭字彦道少有才氣俶儻不羈為士類所稱桓温少時游於博徒資産俱盡尚有負進思自振之方莫知所出欲求濟於躭而躭在艱試以告焉躭畧無難色遂變服懐布㡌随温與債主戲躭素有藝名債者聞之而不相識謂之曰卿當不辨作袁彦道也遂就局十萬一擲直上百萬躭投馬絶呌探布㡌擲地曰竟識袁彦道不其通脱若此後至歴陽太守李庠性任俠好濟人之難州黨争附之與六郡流人避難梁益道路有飢病者庠嘗營護隐恤賑施窮乏大收衆心馮素弗䟦之長弟也慷慨有大志姿貌魁偉雄傑不羣任俠放蕩不修小節故時人未之竒惟王濟異焉曰撥亂才也惟交結時豪為務不以産業經懐當時俠士莫不歸之宋孟龍符驍果有膽氣幹力絶人少好游俠結客於閭里何邁素豪俠好聚劍客出入行遊從者塞路薛廣安都父也河東汾隂人世為强族同姓有三千家廣為宗豪宗慤字元幹炳兄之子也炳素髙節諸子羣從㓜好學而慤獨任氣好武故不為鄉曲所稱南齊劉懐珍為直閣將軍懐珍北州舊姓門户殷積啟上門生千人充宿衛孝武大驚召取青冀豪家私附得數千人梁鄧元起當陽人性任俠好賑施鄉里年少多附之陳周照少豪任俠氣有將帥才周敷字仲逺臨川人為郡豪族形貌眇小如不勝衣而膽勁果超出時軰性豪俠輕財重士鄉黨少年有任氣者咸歸之髙樹生性通達重節義交結英雄不事生産有識者並宗竒之後從平陽王顒討蠕蠕有功樹生尚氣俠意存浮沉自適不願職位辭不受賞識者髙之後為北州大都督李瑞字琚羅渉歴史傳頗有文才氣尚豪爽名强當世劉僧利輕財通俠甚得鄉情髙祖幸徐州引見善之拜徐州别駕薛安都字體逹少驍勇善騎射頗結輕俠諸兄患之安都乃求以一身分出不取片資兄許之居於别廐逺近交游者争有送遺馬牛衣服什物充牣其庭裴慶孫任俠有氣鄉曲壯士及好事者多相附撫飬咸有恩紀陽固字敬安性俶儻不拘小節少任俠好劔客弗事生産李業興性豪俠重意氣人有急難委之歸命便能容匿與其好合傾身無恡若有相乖忤便即疵毁乃至聲色加以謗罵慕容儼少任俠交通輕薄遨遊京雒間薛循義字公讓性姦俠輕財重氣招結豪猾時有急難相奔􅄬者多能容匿之堯雄上黨長子人驍果善騎射輕財尚氣為時軰所重徐度字孝節安陸人也世居京師少倜儻不拘小節及長姿貌瓌偉嗜酒好博嘗使僮僕屠酤為事熊曇朗豫章南昌人也世為郡姓曇朗跅􅕟不羈有膂力容貌甚偉侯景之亂時少年據豐城縣為柵桀黠刼盗多附之留異東陽長山人也世為郡異姓善自居處言語醖籍為鄊里雄豪多聚惡少後魏李元忠以葛榮起率宗黨作壘以自保坐於大槲樹下前後斬違命者凡三百人賊至元忠輙却之李顯甫豪俠知名集諸李數千家於殷州西山開鑿魚川方五六十里居之顯甫為家宗主北齊張保雒代人也自云本出南陽西鄂家世好賔客尚氣俠頗為北土所知宋游道重交游存然諾之分歴官嚴整而時大納賄分及親故之艱匱者其男女孤弱為嫁娶之臨䘮必哀躬親為司州綱紀髙昻與兄乾數為刼掠州縣莫能窮治招聚劍客家資傾盡鄊里畏之無敢違忤父翼嘗謂人曰此兒不滅我族當大吾門不直為州豪也昻初以豪家立名為之羽翼者呼延族劉貴珍劉長狄東方老劉士榮成五韓願生劉桃棒随其建義者李希光劉叔宗劉孟和並仕官顯達孟和名恊浮陽饒安人也孟和少好弓馬率性豪俠幽州刺史劉靈助之起兵也孟和亦聚衆附昻兄弟遥應之及靈助敗昻乃據冀州孟和為其致力封子繡外貌儒雅而俠氣難忤司空婁定逺子繡兄之壻也為瀛州刺史子繡在渤海定遠過之對妻及諸女子讌集言戯微有䙝慢子繡大怒鳴鼓集衆將攻俄頃兵至數千馬將千匹定逺乞免拜謝久乃釋之髙乾性眀悟俊偉有智畧美音容進止都雅少時游俠數犯公私長而修改輕財重義當世以意氣相得李景遺少雄武有膽力好結聚亡命共為刼盗鄊里每患之永安末其兄南鉅鹿太守無為以贓罪為御史所劾禁於州獄景遺率左右十餘騎詐稱臺使徑入州城刼無為而出之州軍追討竟不能制由是以俠聞盧宗道性麄率任俠行南營州刺史嘗於晉陽置酒賔游滿坐中書舍人馬士達因愛其彈箜篌女妓云手甚纎素宗道即以此婢遺士達士達固辭宗道便命家人將解其腕士達不得已而受之李愍字魔憐形貌魁傑見異於時少有大志年四十猶不仕州郡惟招致姦俠以為徒侶尉景性温厚頗有俠氣敬顯雋字孝英少英俠有節操交結豪傑為羽林監平鑒燕郡薊人雖崇儒業而有豪俠氣孝昌末盗賊蜂起見天下將亂乃之雒陽與慕容儼以客騎馬為業鑒性巧夜則糊畵以供衣食謂其宗親曰運有汙隆亂極則治并州戎馬之城爾朱王命世之雄俠烈建旗奉辭問罪勞忠竭力今也其時遂相率奔爾朱榮於晉陽因陳靖亂安民之䇿榮大竒之即署叅軍前鋒從平鞏宻金祚字神敬性驍雄尚氣俠魏正光中隴右賊起詔雍州刺史元猛討之召募良家以為軍導祚應選有功後周韋祐字法保少好遊俠而質直少言所與交遊皆輕猾亡命人有急難投之者多保存之雖屢被追終不改其操隋梁士彦字相如少任俠不仕州郡性剛果喜正人之是非好讀兵書頗渉經史沈光少驍㨗善戲馬為天下之最畧綜書記微有詞藻嘗慕立功名不拘小節家甚貧窶父兄並以庸書為事光獨􅘆弛交通輕俠為京師患少年之所朋附人多贍遺助以飬親每致甘㫖美衣未嘗困匱周羅睺九江人也年十五善騎射好鷹狗任俠放蕩收聚亡命隂習兵書從祖景彦誡之曰吾世恭謹汝獨放縱難以保家若不䘮身必將滅吾族羅睺不改陳宣帝時以軍功授開逺將軍句容令李宻開皇中襲父爵蒲山公乃散家産賙贍親故飬客禮賢無所愛恡與楊元感為刎頸之交劉權少有俠氣重然諾藏亡匿死吏不敢過門陳政倜儻有文武大畧時京師大俠劉居士重政才氣數從之遊乞伏惠少慷慨有大節便弓馬好鷹犬麥鐵杖性踈誕使酒好交遊重信義每以漁獵為事不治産業唐劉𢎞基少落拓交通輕俠不事家産以父䕃為右勲衛大業末嘗從煬帝征遼東家貧不能自致行至汾隂度以後期當斬計無所出遂與同旅屠牛濳跡吏捕之繋於縣獄歲餘竟以贖論事解亡命盗馬以供衣食丘和少便弓馬重氣俠及長始折節與物無忤貴賤皆愛之盛彦師者頗有學識少任俠交結英豪盧祖尚少以俠氣聞家富於財周濟窮乏無所愛恡由是為州里所歸張瑾善弓馬有膂力少以豪俠聞唐憲祖初仕隋為東宫左勲衛及太子廢罷歸鄉里不拘操行好畋獵從博徒遊藏亡匿死交通輕俠牛進達濮州雷澤人少甞穿窬為盗而藏亡匿死號為輕俠隋末代翟讓為驃騎與秦叔寳程知節吴黒闥相友善郭元振舉進士授通泉尉任俠使氣不以細務介意前後掠賣所倍十餘人以遺賔客百姓苦之則天聞其名召見與語甚竒令先平壽州然後赴江都連封令其將賀蘭元均邵怡等守霍丘稱少成竟不能侵軼乃南掠蘄黄等州崔造建中末為建州刺史涇原兵叛造聞難作馳檄鄰州請齊舉兵遂調撥所部得二千人抗表上聞朝廷嘉之及京師收復詔徵造至藍田自以源休之甥上疏請罪不敢即赴闕德宗以為有禮優詔慰勉拜吏部侍郎李紓建中末為同州刺史德宗幸梁州紓亦棄州詣行在拜兵部侍郎髙承簡貞元中為宋州刺史時汴州反逐其帥因以部將李㝏行帥事㝏遣其將持記責宋州官私財物承簡執而囚之自是汴吏来輙繋之一日并出斬於衙門之外威震郡中及㝏兵大至宋州凡三城賊已䧟南城承簡保北兩城以拒凡十餘戰㑹徐州救兵至㝏為汴將李質執之傳至京師兵圍宋者即遁去承簡拜簡校左散騎常侍兖海沂密等州節度觀察處置等使崔從憲元和初為興元推官知卭州事劉闢竊據西川以兵逼從歸府從憲卒設備以一郡抗禦之杜慆懿宗咸通末為泗州刺史時桂林戍卒龎勛等為亂擁衆還徐至泗州急攻之遣牙將李員入城見慆曰留後知中丞名族不敢令軍士失禮但開城門令百姓存活無相疑也慆執而殺之後唐張憲莊宗同光末為太原尹時趙在禮入魏州憲家屬在魏闗東俶擾在禮善待其家遣人賫書至太原誘憲憲斬其使書不發函而奏王思同明宗長興末為京兆尹兼西京留守潞王鎮鳳翔與之隣境及潞王禀朝㫖致書於秦涇雍梁邠諸帥言賊臣亂政陳已所興兵討亂之狀因遣伶奴安十十以五絃謁思同思同執十十送京師楊炎少好讀書有文詞豪俠尚氣李景儉踈財尚義雖不厲名節死之日知名之士咸惜之後唐錢鏐杭州臨安縣人杭之著姓門無任官鏐少權勇有謀性任俠以解讐報怨為事晉李周任俠自負屬河朔羣盗充斥南北交兵行旅無援者不敢出郡邑有士人盧岳家於太原携妻子囊槖寓於逆旅進退無所保惟與所親相對流涕周憫之請援送以歸行經西山中有賊夜於林麓間俟之射盧岳中其馬周大呼曰爾為誰耶賊聞其聲相謂曰李君至此矣即時散走岳全其行裝至於家周髙思繼幽州人昆仲三人俱英豪有武幹聲馳朔塞册府元龜卷八百四十八
