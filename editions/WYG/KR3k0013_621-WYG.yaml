body:
  text: 册府元龜卷六百二十一宋王欽若等撰卿監部司宗司賔監牧司宗周禮小宗伯之職掌三族之别以辨親䟽漢懲秦失大封子弟受命宗臣以主屬籍所以厚親親而重國本也典午之後頗有沿革而職司帝緒未嘗廢闕葢將以董正昭穆糾綏宗族達孝悌之道固盤維之本俾夫嫡庶區分尊卑定位齒序斯著内朝有光韡韡棣華得和樂之譽振振公姓彰仁厚之風傳曰周之宗盟異姓為後詩云文王孫子本支百世非邑司有典名簿克舉則何以惇叙九族臨照百官者乎漢劉郢客楚元王之子髙后以為宗正封下邳侯平陸侯禮楚元王子也景帝元年為宗正德侯劉通景帝三年為宗正沈猷侯受為宗正坐聽請不具宗室耐為司寇受為宗正人有私請求者受聽許之故於宗室之中事有不具而受獲罪劉辟疆楚元王之孫休侯富之子清静少欲嘗以書自娛不肯仕昭帝即位霍光擇宗室子可用者辟疆子徳待詔丞相府年二十餘欲用之或言父見在亦先帝之所寵也遂拜光禄大夫守長樂衛尉時年已八十徙為宗正數月卒劉徳昭帝初為宗正丞雜治劉澤詔獄父為宗正徙為大鴻臚丞遷大中大夫後復為宗正雜案上官氏葢主事妻死大將軍光欲以女妻之徳不敢取葢長公主孫譚遮徳自言徳數責以公主起居無状侍御史以為光望不受女望怨望也承指劾徳誹謗詔獄免為庶人光聞而恨之以侍御史不知己意復白召徳守青州刺史嵗餘復為宗正與立宣帝賜爵關内侯孫慶忌復為宗正劉向本名更生宣帝時累遷散騎諫大夫給事中元帝初即位太傅蕭望之為前將軍少傅周堪為諸史光祿大夫皆領尚書事甚見尊任更生年少於望之堪然二人重之薦更生宗室忠直明經有行擢為散騎宗正給事中後漢劉般遷宗正在朝廷竭忠盡節勤勤憂國夙夜不怠數納嘉謀劉平以仁孝著為宗正劉軫建初中稍遷宗正卒官遂世掌宗正焉劉虞為尚書令光祿勲以宗族有禮更為宗正晉扶風王亮為衛將軍武帝咸寧三年詔曰宗室戚屬國之枝葉欲令奉率徳義為天下式然處富貴而能慎行者寡召穆公糾合兄弟而賦棠棣之詩此姬氏所以本枝百世也亮為宗師所當施行皆咨之於師時宗室殷盛無相統攝乃以亮為宗師使訓遵觀察有不遵禮法小者正以義方大者隨事聞奏山濤為吏部啓云羊祜忠篤厚寛然不長理劇宗正卿缺不審可轉作否朱整泰始二年以侍中中書監為宗正卿王覽咸寧元年以大中大夫為宗正卿陳南康愍王曇朗子方慶少清警涉獵書傳及長有幹略天嘉中封臨汝縣侯尋為給事中太子洗馬權兼宗正卿秦明王翰孫纂太武封為中山王纂於宗屬景長宗室有事咸就諮焉封琳為司宗下大夫有長者之稱彭城王勰獻文之子孝文為家人書於勰曰風教密微禮政嚴嚴若不深心日勸何以敬諸每欲立一宗師肅我元族汝親則宸極位乃中監風標才器實足師範屢有口勅仍執冲遜難違清挹荏苒至今宗制之重舎汝誰寄便委以宗儀責成汝躬有不遵教典隨事以聞吾肅治之若宗室有􅄽隠而不舉鍾罰汝躬綱維相厲庶有觀政吾朝聞夕逝不為恨也勰翼日面陳曰奉詔令專主宗制糾舉非違臣聞其身正不令而行其身不正雖令不從臣處宗乏長㓜之順接物無國士之禮每因啓請已蒙哀惜不謂令詔終不矜免猶願聖慈垂賜蠲遂孝文曰汝諧徃欽哉饒陽男遥大功昆弟皆是景穆之孫至孝明而本服絶故除遙等屬籍遥表曰竊聞聖人所以南面而聽天下其不可得變革者則親也尊也四世而緦服窮五世而袒免六世而親屬竭矣去兹以徃猶繫之以姓而弗别綴之以食而弗殊又律云議親者非唯當世之屬親歴謂先帝之五世謂尋斯㫖將以廣帝宗重盤石先皇所以變兹事條陳此别制者太和之季方有意於吳蜀經始之費慮深在初割減之起暫出當時也且臨淮地分屬籍之始髙祖賜帛三千疋所以重分離樂良王長命亦賜縑三千疋所以存慈􅔔此皆先朝慇懃尅念不得已而然者也古人有言百足之蟲雖死不僵亦以其輔己者衆臣誠不欲妄親大階茍求潤屋但傷大宗一分則天子屬籍不過十數人而已在漢諸王之子不限多少皆列土而封謂之曰侯至於魏晉莫不廣祚河山稱之曰公者葢惡其大宗之不固骨肉之恩疎矣臣去皇上雖五世之逺於先帝便是天子之孫髙祖所以國頒祿賦復給衣食后族唯給其賦不與衣食者欲以别外内限異同也今諸廟之感在心未忘行道之悲倐然已及其諸封者身亡之日三年服終然後改奪今朝廷猶在遏密之中便議此事實用未安詔付尚書博議以聞尚書令任城王澄尚書僕射元暉奏同遙表靈太后不從後周宇文測為太祖丞相府右長史太祖令測詳定宗室昭穆逺近附於屬籍除通直散騎常侍黄門侍郎鮑宏武帝勅宏脩皇室譜一部分為帝緒疎屬賜姓三篇唐髙祖武徳元年十月二十四日詔太僕少卿安康郡公襲譽我之同姓派别枝分惟厥祖考世敦恭睦特聽合譜宗正恩禮之差同諸服屬十二月六日又詔義安郡王李孝常屬籍宗正寺二年二月詔曰朕受終揖讓君臨四海普天之下同加惠澤宗緒之情義越常品宜有旌異以明等級諸宗姓官宜在同列之上未有職任者不在徭役之限每州置宗師一人以相管攝别為團伍所司明立條式髙宗永徽二年九月二十一日召宗正卿李博文問曰比聞諸親何以得有除屬者對曰以屬疎降盡故除摠三百餘人帝曰朕追逺之感實切於懐諸親服屬雖疎理不可降並宜依舊編入屬籍睿宗景雲二年四月以秘書監薛王隆業為宗正卿𤣥宗開元十三年四月詔嗣王有傍繼者並宜摠停二十年七月七日詔宗正寺官員以宗子為之二十二年七月勅曰諸贈太子須年官為主廟並致享祀雖禮欲歸厚而情實未安蒸嘗之時子孫不預若專令官祭是以疎間親遂此為常豈云教孝其諸贈太子有後者但官置廟各令子孫自主祭其署及官悉停若無後者宜依舊二十五年秋七月乙夘勅諸陵廟並𨽻宗正寺其官員悉以宗子為之濮陽郡王徽為宗正卿頗承恩奏請宗正奉陵廟李揆開元末拜右拾遺改右補闕起居郎並知宗子表疏天寳元年七月詔曰古之宗盟異姓為後王者設教莫貴其親殿中侍御史李彦允等奏稱與朕同承梁武昭王後請甄叙者源流寔同譜牒猶著雖子孫千億各散於四方而本枝百代何殊於近屬况有陳請所宜敦敘自今以後梁武昭王孫寳已下絳郡姑臧燉煌武陽等四房子孫並宜𨽻入宗正編諸屬籍以明尊本之道用廣親親之化五載二月十二日勅九廟子孫並宜叙入五等親永為常式張垍為駙馬都太常卿又以承恩太常復奉陵廟自後宗正太常奉者數四代宗永泰二年十月宗正卿吳王祗奏上皇室永嘉新譜二十卷太常博士栁房撰也房精於譜學按宗正譜牒自武徳以来宗支昭穆相承撰皇室譜二十卷大厯二年八月勅宗正寺復奉陵廟穆宗長慶元年三月宗正寺奏准貞元二十一年勅宗子陪位放五百七十人出身今年勅放三百人伏緣人數至多不霑恩澤白身之軰将老村閭乞降特恩更放二百人出身許之文宗太和元年四月宗正寺奏今年二月十三日應赴御樓陪位宗子前資見任及嘗選未出身宗子據状共三千二百八十九人前件陪位宗子等准赦書節文仍據始封每王後與一人出身委宗正卿詳圖譜取一房最沈翳者充數具名聞奏者伏以所赴陪位宗子緣遇參選時逺方臻集并京畿之内人數至多若據赦書節文所放全少始封王後止有四十八房今請條疏從長慶元年四年寳厯元年三度遇恩並未霑及者伏請准寳厯元年正月七日赦書節文每户下放一人出身其從寳厯元年已前三度受恩已曾放出身撿勘三代名同者並不在此限伏兾沈翳適霑恩澤逺房孤弱盡獲出身制可開成元年閏六月乙未召宗正卿李𢎞澤問圖譜𢎞澤對以自肅宗已来並未修續臣已請追林贊鄭覃與李固言林贊實有氏族學時論以為不公癸夘勅追沔王府長史分司東都林贊同修七聖玉牒從宗正寺之請也二年六月癸巳朔宗正寺奏諸府州如有宗子寄寓貧病不能自濟者有羈旅道途棲遲丐食者並請所在州縣切加存䘏兼隨事接借不得令有侵欺致使抑屈如有違犯禮禁自冐刑名即任所在州縣子細勘問仍先具罪状申報宗正寺待寺司聞奏不得懸便科斷所兾逺方宗子平時無困辱之虞守土諸侯聖朝識敦睦之意伏以事闗國體臣沗職司詔今宗正寺散牒所在捜訪宗室無官官貧無交不支濟者指實具名聞奏四年閏正月翰林學士栁璟奏今月十二日面奉進止以臣先祖所撰皇宗永泰新譜事頗精詳令臣自徳宗皇帝陛下御極已来依舊式修續伏請宣付宰臣詔宜令宗正寺差圗譜官與栁璟計㑹修撰仍令户部量供紙筆璟續成十卷以附前譜梁太祖開平五年三月宗正卿朱遜圖譜官朱損之進所撰述天潢源派二軸各賜帛後唐明宗天成元年十月宗正卿李紓奏三京畿縣有陵園處每縣請都置陵臺令一員兾專局分免有曠遺二年七月宗正少卿李蕘請修恭陵和陵長興三年七月宗正寺奏今年經大雨太廟正殿疎漏門樓墊陷宫墻及神門伏舎並皆缺漏請下所司修補司天以墓年不宜興造請隨缺壞處量事增脩從之末帝清泰二年正月宗正寺奏北京應州曹州諸陵望差本州府長官朝拜雍坤和徽四帝差太常宗正卿朝拜從之晉髙祖天福二年六月壬午朔宗正卿石光贊奏昔周武王奄有天下過商容之閭必式見比干之墓即封葢褒賞賢良尊崇忠義伏惟皇帝陛下顯膺天命開創洪圖解􅃠行仁救時順動樂業不知於帝力悦隨但聽於山呼盛徳難名太平可待臣伏見滎陽道左石君廟本前大中大夫石奮之廟奮有子四人各二千石祿漢髙祖曰人臣尊寵畢集其門故號萬石君徳行懿純備列前書唐大中十三年鄭州司馬石貫稱裔孫刋石廟庭備紀其事伏遇皇帝行幸浚郊經過滎水展義已聞於岐路覃恩宜布於幽明其萬石君廟伏乞俯𢎞霈澤特賜崇封俾光逺祖之徽猷益茂我朝之盛典有旨待續施行石光贊為太子賔客光贊少為儒飽於遊宦後唐時歴諸藩從事晉髙祖即位自滑州節度判官擢為宗正卿少時嘗有占者云子晩嵗當因姓氏為美官果如其言晉氏本出廻鶻来自金山府明矣如後魏後周奄有天下非以生於中土則為貴焉始見太常禮官定石慶為始祖又光贊嘗以史傳苗裔纂成玉牒編次以獻髙祖其間有晉魏已前官至拾遺補闕者聞者知其寡學司賔孔子云束帶立於朝可使與賔客言也其司賔之謂乎故三代之禮周制彌文官居其方政乃用乂大則有行人之職次則有掌客之名咸領於秋卿動繫於國體朝聘會同之事莫不由之餼獻飲食之數於是乎在至若優禮二王之後懐来四夷之長其儀式序著之於籍漢氏以降益重其選屬於委任靡限他官用能勞徠殊鄰交好與國升降揖讓而有度導迎接對以咸宜固有才識兼明辭令嘉淑風鑒標舉器用博達能稱厥職有聲於時焉者漢韓昌為車騎都尉甘露二年呼韓單于欵五原塞欵囘也願朝三年正月㑹正旦之朝賀也遣昌迎之單于就邸留月餘遣歸國又遣昌與長樂衛尉髙昌侯董忠送出朔方雞鹿塞在朔方寙渾縣北南齊宗史為臨川王常侍武帝與魏和親勅史與尚書殿中郎任昉同接魏使皆時選也王融為中書郎武帝以其才辨使兼主客接魏使房景髙宋弁并見融年少問主客年幾融曰五十之年乆逾其半張融為從事中郎将魏聞融名武帝使融接北使李道固就席道固顧而言之曰張融是宋彭城長史張暢子不融嚬蹙乆之曰先君不幸名達六夷劉繪為中書永明末魏使来繪以辭辨勅接魏使事畢當撰辭繪謂人曰無論潤色未易但得我語亦難矣臣欽若等曰繪與魏使李彪問答甚多事具奉事敏辨門梁范岫仕齊為國子博士永明中魏使至有詔玅選朝士有辭辯者接使於界首以岫兼淮隂長史迎焉蕭撝為太子中舎人東魏遣李諧盧元明使於梁武帝以撝辭令可觀令兼中書侍郎受幣於東賔館危胥為太學博士有口辯大同中嘗兼主客郎對接北使魏使李諧問胥曰主客在郎官幾時答曰我本訓胄虎門適後今任諧言國子博士不應左轉為郎胥曰特為應接逺賔故權兼耳諧言屈己濟務誠得事宜繇我一介行人令卿左轉胥荅曰自顧菲薄不足對揚盛美豈敢言屈傅岐為鎭南諮議參軍兼中書通事舎人美容止博涉能占對大同中與魏和親其使嵗中再至常遣岐接對焉後魏裴駿為中書侍郎宋武帝遣使明僧暠朝貢以駿有才學乃假給事中散騎常侍於境上勞接李安世獻文時為主客令齊使劉纘朝貢安世奉詔勞之安世美容貌善舉止纘等自相謂曰不有君子其能國乎纘等呼安世曰三代不共禮五帝各異樂安足以亡秦之官稱於上國纘曰世異之號凡有幾也安世曰周謂掌客秦改典客漢名鴻臚今曰主客君等不欲影響文武而殷勤亡秦纘又指方山曰此山去燕然逺近安世曰亦繇石頭之於畨禺耳國家有江南使至多出藏内珍物令都下富室好容服者貨之今使任情交易使至金玉肆問價纘曰北方金玉大賤當是山川所出安世曰聖朝不貴金玉以同瓦磔又皇上徳通神明山不愛寳故無川無金無山無玉纘初将大市得世言慚而罷劉芳窮窘篤學有志行㑹齊使劉纘至芳之始族兄也擢芳兼主客郎與纘相接尋拜中書博士甄琛孝文時兼主客郎迎送齊使彭城劉纘深欽其器貌嘗歎咏之成淹為著作郎齊遣其散騎常侍裴昭明散騎侍郎謝竣等来弔文明太后喪欲以朝服行事主客報之云弔有常式何得以朱衣入凶庭昭明等言本奉朝命不容改易如此者數四執志不移孝文勅尚書李冲令選一學識者更與論執冲奏遣淹時昭明言未解魏朝不聽朝服行禮義出何典淹言吉凶不同禮有成數𤣥冠不弔童孺共聞昔季孫将行請遭喪之禮千載之下猶共稱之卿逺自江南奉慰不能式遵成事方謂義出何典行人得失何其異哉昭明言二國交和旣乆南北皆頒准望齊䘮髙帝魏遣李彪通弔於時初不素服齊朝亦不以為疑那得苦見要逼淹言彪通弔之日朝命以弔服自隨而彼不遵髙宗追逺之慕乃踰月即吉彪行弔之時齊之君臣皆以鳴玉盈庭貂璫曜目百僚内外朱服煥然彪行人不被主人之命復何容獨以素服間衣冠之中来責雖髙未敢聞命我皇帝仁厚之性侔於有虞處諒闇以来百官聽於冢宰卿豈得以此方彼也昭明乃揺膝而言三皇不同禮亦安知得失所歸淹言若如来談卿以虞舜髙宗為非也昭明遂相顧而笑曰非孝者宣尼有成責行人亦弗敢言希主人裁以弔服使人惟齎袴褶此既戎服不可以弔遂緇衣幍以申命今為魏朝所逼違負指授還南之日必得罪本朝淹言彼有君子也卿将命折中還南之日應有髙賞若無君子也但以有光國之譽雖復非禮見罪亦復何嫌南史董狐自當直筆既而帝遣李冲問淹昭明所言淹以状對帝詔沖曰我所用得人勅仍送衣幍給昭明等賜淹果食明旦引昭明等入皆令文武盡哀淹後為侍郎南齊遣其散騎常侍庾蓽散騎侍郎何憲主書邢宗慶朝貢值朝廷有事明堂因登靈臺以觀雲物帝勅淹引蓽等館南矚望行禮事畢還外次館賜酒食宗慶語淹言南北連和既乆而比棄信絶好為利而動豈是大國善鄰之義淹言夫為王者不拘小節中原有菽工採者獲多豈得眷眷守尾生之信且齊先王歴事宋朝荷恩積世當應便爾欺奪宗慶庾蓽及何皆相顧失色何憲知淹昔從南入以手掩目曰卿何為不作于禁而作魯肅淹言我捨危效順欲追蹤陳韓何于禁之有憲亦不對崔景俊歴侍御史主文中散受勅接齊使蕭琛范雲李憲字仲軌清粹善風儀好學有器度為孝文所賞稍遷散騎侍郎接對齊使蕭琛范雲薛驎駒好讀書舉秀才除中書博士太和九年齊使至乃詔驎駒兼主客郎以接之李系少聰慧有才學為中散大夫梁武遣使朝貢侍中李神儁舉系為尚書南主客郎系前後接對凡十八人頗為稱職劉隲為中書舎人時與梁和通隲前後受勅接對其使十六人孟威孝明時為直閣将軍沃野鎮将正光初蠕蠕主阿那瓌歸國詔遣前郢州刺史陸希道兼侍郎為使主以威兼散騎常侍為副逺畿迎接阿那瓌之還國也復以威為北将軍光祿大夫假員外常侍為使主䕶送之東魏李諧為中書侍郎天下平時南北通好務以俊乂相矜銜命接客必盡一時之選無才地者不得與焉梁使陸晏來聘諧郊勞過朝歌晏曰殷之頑民正在此諧曰永嘉南遷盡歸江東北齊魏收初仕後魏為散騎常侍兼著作郎勅兼主客接梁使謝珽徐陵祖孝徵弟孝隠有文學早知名詞章雖不逮兄亦機警有口辯兼解音律魏末為散騎常侍迎梁使時徐君房庾信来聘名譽甚髙魏朝聞而重之接對者多取一時之秀盧元景之徒並降階攝職更逓司賔孝隠少處其中物議稱美薛琡字曇珍形貌魁偉少以幹用稱為典客令每引客見儀望甚美魏帝召而謂之曰卿風度峻整姿貌秀異後當升進以處何官琡曰宗廟之禮不敢不敬朝廷之事不敢不忠自此以外非庸臣所及裴讓之為太原公記室梁使至嘗令讓之攝主客郎元景安東魏天平末世宗入廟景安隨從在鄴于時江南欵附朝貢相尋景安妙閑馳騁有容則每梁使至嘗令與斛律光皮景和等對客騎射見者稱善崔瑜之為揚州平東長史帶南梁太守梁義州刺史文僧明来降瑜之接迎有勲賜爵髙邑男皮景和天統中為侍史後周通好之後冠葢徃来常令景和接對每與使人同射百發百中甚見推重李諤字士恢好學解屬文為中書舎人有口辯每接對陳使郎茂為司空府參軍㑹陳使傅綜来聘令茂接對之陸彦師為通直散騎常侍每陳使至必髙選主客彦師所接對者前後六輩後周栁𢎞為御正上士陳遣王偃民来聘髙祖令𢎞勞之偃民謂𢎞曰来日至於藍田正逢滋水暴長所齎國信溺而從流今所進者假之從史請勒下流為追尋此物也𢎞曰昔淳于之獻空籠前史稱以為美足下假物而進詎是陳君之命乎偃民慚不能對髙祖聞而嘉之盡以偃民所進之物賜𢎞仍令報聘占對詳敏見稱於時隋栁肅開皇初為太子洗馬閑於占對陳使謝泉来聘以才學見稱詔肅宴接時論稱其華辯辛公義為主客郎中每陳使来朝嘗奉宴接陸爽為太子洗馬博學有口辯陳人至境帝令迎勞之栁謇之歴兵部司勲二侍郎朝廷以雅望善談謔又飲酒至一石不亂繇是每陳使至輒令接對遷光祿少卿史祥大業初為鴻臚卿時突厥啓民可汗請朝煬帝遣祥迎接之閻毘為殿内丞從幸張掖郡髙昌王朝於行所詔毘持節迎遂將䕶入東都蘇䕫為尚書職方郎燕王司馬時煬帝方勤逺略蠻夷来朝帝問宇文述虞世基曰西夷率服觀禮華夏鴻臚之職須歸令望寧有多才藝美容儀可接賔客者為之乎咸以䕫對即日拜鴻臚少卿其年大業五年髙昌王麴伯雅来朝朝廷妻以公主䕫有雅望令主婚裴矩大業末為虎賁郎将從煬帝至東都屬射匱可汗遣其猶子率西番諸胡朝貢詔矩對接之唐陳大徳為職方郎中貞觀十四年髙麗長子桓權来朝遣大徳迎勞於栁城監牧周官校人掌王馬之政其屬有牧師圉師趣馬巫馬及庾人之職所以授地教養簡節攻疾然後十有二閑之政成矣施及列國亦脩馬政秦氏之霸并吞六國六萬騎之馬盡歸之焉漢承秦制亦重太僕之任乃有三令五監邊郡六牧諸苑三十六所馬牛雜畜充牣其間應乾之策何啻百倍凡大祀戎事軍國所須皆取足焉歴代已来數之耗登署之廢置或申侵蹂之禁或下辜𣙜之令隨時立制可以悉數然則牧于坰野葢避於民居齊其飲食不違於物性詩禮所載可不務乎周孝王時非子居大丘今槐里也好馬及畜善養息之大丘人言之周孝王孝王召使主馬于汧渭之間馬大蕃息孝王欲以為大駱適嗣申侯之女為大駱妻生子成為適申侯乃言孝王曰昔我生酈山之女為戎胥軒妻生中潏以親故歸周保西􅂷西􅂷以其故和睦今我復與大駱妻生適子成申駱重婚西戎皆服所以為王王其圖之於是孝王曰昔伯翳為舜生畜畜多息故有土賜姓嬴今其後世亦為朕息馬朕其分土為附庸邑之秦今天水隴西縣秦亭也使復續嬴氏祀號曰秦嬴亦不廢申侯之女子為駱適者以和西戎宣王以厲王之時牧人之職廢宣王始興而復之故有考牧之詩魯荘公二十九年春新延廐延廐者法廐也周禮天子十有二閑馬六種邦國六閑馬四種每廐一閑言法廐者六閑之舊制也僖公牧于坰野魯人尊之於是季孫行父請命于周而史克作頌曰駉駉牡馬在坰之野駉駉良馬腹幹肥張也坰晉野也牧於坰野避民居與良田也薄言坰者有驈有皇有驪有黄以車彭彭牧之坰野則駉駉然驪馬白跨曰驈黄白曰皇純黒曰驪黄騂曰黄諸侯六閑馬四種有貌馬有戎馬有田馬有駕馬彭彭有力有容也秦始皇八年馬東就食漢景帝時始造苑馬以廣用苑馬謂為苑以牧馬武帝元狩四年大将軍衛青驃騎將軍霍去病兩軍之出塞塞閱官及私馬凡十四萬匹而後入塞者不滿三萬匹自青圍單于後十四嵗而卒並不復擊匃奴者以漢馬少也五年天下馬少平壯馬二十萬匹貴平壯馬賈欲使人競畜馬御史大夫衛綰奏馬髙五尺九寸已上齒未平馬十嵗齒下平不得出闗初武帝為伐胡故盛養馬馬之徃来食長安者數萬匹卒掌者闗中不足廼調旁近郡又以車騎馬乏縣官錢少買馬難得廼著令令封君已下至三百石吏以上差出壮馬天下亭亭有畜字馬嵗課息太初元年更名家馬為挏徒孔切馬初置路軨音零先是太僕掌輿馬官有大廐未央家馬三令家馬者主供天子私用非供大祀戎事君國所須故謂之家馬也又有車府路軨騎馬駿馬四令又有寵馬閑駒槖泉騊駼承華五監長槖泉廐在槖泉宫下閑闌養馬之所故曰閑駒騊駼出北海中其状如馬騊音徒髙切駼音塗又有邊郡六牧師苑令漢書北海郡靈州縣有河竒苑號非苑歸縣有堵苑白馬苑都郅縣有牧師苑西河郡鴻門有天封苑東郡襄平有牧師官漢官儀云牧師諸苑三十六所分置北邊西邊分養馬二十萬頭又有牧槖昆號令牧槖言牧養槖佗也昆獸名也􅀈􅕭者謂其􅀈下平也􅕭音蹄昭帝始元五年罷天下亭母馬及馬弩闗武帝數伐匃奴再擊大宛馬死畧盡乃令天下諸亭養母馬欲令其繁孳又作馬上弩機官令悉罷之舊馬髙五尺六寸齒未平弩十石已上皆不得出闗今不禁也後漢和帝永元五年二月戊戌詔有司省減内外廐及凉州諸苑馬安帝永初二年正月庚申詔越嶲置長利髙望始昌三苑又令益州郡置萬嵗苑犍為置漢平苑犍為郡名故夜郎國也故城在今睂州隆山縣西北也順帝漢安元年七月初置承華廏時以逺近獻馬衆多園廏充滿始置承華令六百户靈帝光和四年正月初置騄廏丞領受郡國調馬豪右辜擁馬一匹至二百萬辜障也擁專也謂障餘人賣買而自取其利中平元年十一月詔廏馬非郊祭之用悉出給軍後魏太武平統萬定秦隴以河西水草善乃以為牧地畜産滋息馬至二百餘萬匹槖駞半之牛羊無數孝文即位之後復以河陽為牧塲常置戎馬十萬匹以擬京師軍警之備每嵗自河西從牧於并州以漸南轉欲其習水土而無死傷也而河西之牧彌滋矣太延二年十一月行幸稠陽驅野馬於雲中置野馬苑獻文帝時吕文祖以勲臣子補龍牧曹奏事中散以牧産不滋坐徙於武川鎮孝文帝時李堅為太僕卿撿課牧産多有滋息其後宇文福為都牧給事時遷雒勅福撿行牧馬之所福規石濟以西河内以東拒黄河南北千里牧地事尋施行今之馬場是也及徙代移雜畜於牧所福善於将養並無損耗孝文嘉之尋補司衛監宣武帝正始四年十一月禁河南牧馬自碣石至于劒閣東西七千里置二十二都延昌元年六月通河南牧馬之禁隋髙祖開皇中以駕部侍郎辛公義句檢諸馬牧所獲十餘萬匹髙祖喜曰惟我公義奉國罄心煬帝大業五年七月置馬牧於清海渚中以求龍種無效而止唐太宗貞觀十五年以尚乘奉御張萬嵗為太僕少卿勾當群牧二十三年以廏馬糜費留三千匹餘並送隴右髙宗麟徳三年以太僕少卿鮮于正俗簡較隴右羣牧監張說為隴右羣牧使頌序云大唐承周隋離亂之後貞觀初僅得牝牡三千從赤葦澤徙隴右始命太僕卿張萬嵗葺其政焉至麟徳中四十年至七十萬六千匹置八使以董之設四十八監以葺之跨隴右金城平凉天水四郡之地幅員千里猶為狹隘更析八監布於河曲豐曠之地乃能容之於斯之時天下以下縑易一馬及張氏中廢二十年間所殘益寡唐㑹要云張萬嵗三代典羣牧恩信行於隴右故隴右之人以馬嵗為齒為張氏家諱之也上元元年以右衛中郎將丘義檢校隴右羣牧監儀鳳三年十月以太僕少卿李思文檢校隴右諸牧監使自此始有使號其後蘇幹夏侯亮楊道昕張仁徳張思兼宗元爽周履氷魏元忠李道廣賀蘭爽姚元之宗楚客宋王成器相次為之永􅂭二年七月夏州羣牧使安元壽等奏從調露元年九月已後至二年五月已前死失馬一十八萬四千九百匹牛一萬一千六百頭𤣥宗先天中以鴻臚少卿朔方軍副大總管兼安北都䕶王脧為太僕少卿隴右羣牧使其後王毛仲席楚珍薄承祧韋衢章仇兼瓊王鉷安祿山王鳯唐欽吕崇貴李輔國彭禮盈樂子昻皆為之開元二年九月太常少卿姜晦上封請以空名告身於六胡州市馬率三十匹馬酬一游擊將軍時廏馬尚少深以為然遂命齎告身三百道徃市馬三年四月勅諸牧監官有闕交要者委本使簡擇明閑牧養者奏付選司勘責補擬如非其材所繇科貶經負犯者不在奏補之限牧使有闕亦委使司差補申牒所繇如不足並申省司速訪補擬七年三月詔曰調歛惡繁差科在簡每思重人賤畜之政輕徭薄賦之宜廏馬略配於諸軍課駒摠留於畜牧則應稅之草不假循前今年所支已減舊數可於此數内更三分減一九年正月詔如聞天下有馬之家州縣或因郵逓軍旅即先差遣帖助兼定户之次緣被此百姓嫌疑多不養畜遂令騎射之士頓減曩時益國富人何繇可致自今已後諸州百姓不問有䕃無䕃若能毎家畜馬十匹已上緣帖驛郵逓及征行並不得偏差遣帖助若要須供擬任臨時率户出錢市買定户及差重色役亦不須以馬充財數十一年勅諸州府馬闕數稍多既合官填復須私備貧兵力致實以為難宜令所司即勘㑹闕數與閑廏使計㑹取監牧馬充天寳十一載十一月勅兩京去城五百里内不得置私牧如有一切官牧十三載六月隴右羣牧都使奏差判官殿中侍御史張通儒副使平原太守鄭遵意等就群牧交㸃摠六十萬五千六百三頭匹口馬三十二萬五千七百九十二匹内二十萬八千匹草牛七萬五千一百一十五頭内一百四十三頭氂駒五百六十三頭羊二十萬四千一百三十四口騾一頭肅宗至徳二年十二月詔園苑内有閑廏使摠監各據所管地界耕種收草粟以備國馬代宗大厯十四年七月復置廏馬隨仗於月華門徳宗建中元年五月詔市關輔之馬牝牡二萬匹以實内廏貞元八年裴延齡為户部侍郎判度支京西有汚地卑濕處時有盧葦生不過數畆延齡忽奏云廏馬冬月合在槽􅇫秣飼夏中即須有牧放處臣近尋訪得長安咸陽兩縣界有陂池數百頃請以為内廏牧馬之地且去京城數十里亦與廏苑中無别帝初信之言於宰臣宰臣堅執云恐必無此及差官閲視事皆虚妄延齡旣慚且怒二十年福州都團練觀察使栁冕奏置萬安監牧泉州界置羣牧五悉索部内馬五千七百匹驢騾牛八百頭羊三千餘口人心擾焉順宗以貞元二十一年即位四月罷閩中萬安監先是福建觀察使栁冕乆不遷欲立事跡以求恩寵乃奏云閩中南朝放牧之地畜牛馬可使滋息請置監許之遂收境内畜産令吏牧其中羊之大者不過十斤馬之良者錢數千不經時輒病死又歛以充之百姓告乏逺近以為笑至是觀察使閻濟美奏罷之憲宗元和四年正月右神策軍奏絳州龍門臨河鄉河曲無居人田業請為牧地從之仍禁侵蹂居人田業十一年正月命中官以絹二萬疋市馬於河曲十三年十一月賜蔡州羣牧號龍陂以刺史丁俛充使十四年五月置臨海監牧使命淮南節度使李夷簡兼之八月襄州穀城縣置羣牧賜名臨漢監以山南東道節度使孟簡兼充監牧使穆宗長慶二年四月詔如聞館驛逓馬死損轉多欲令提舉所繇悉又推注中使郵驛稱不見劵則隨所索盡供旣無憑繇豈有定數方将革弊貴在息詞自今已後中使乘逓如不見劵及券外索馬所繇輒不得供其常參官出使及諸道幕府軍將等所合乘逓並須依格式如有違越或分外科人夫並宜具名聞奏當時中人出使所在多徴驛馬大其行李驛馬繇此死傷多假如軍期急奏行人所乘馬多為格奪逺近苦之因有是命文宗太和二年十月勅海陵是揚州大縣土田饒沃人户衆多自置監牧以来或聞有所妨廢又計每年馬數甚少若以所用錢收市則必有餘其臨海監牧宜停令度支每年供送飛龍使見錢八千貫文仍春秋兩季各送四千貫充市進馬及養馬飼見在馬等用其監牧見在馬仍令飛龍使割付諸羣牧收管訖分析奏聞是月甲戍命中使徃龍陂監取馬五百匹賜徐州行營三年三月以沙苑樓煩馬共五百匹賜幽州行營将士七年正月山南東道節度使裴度奏請停臨漢監牧從之臨漢牧元和十四年置有馬三千二百餘匹廢百姓田四百餘頃前後節將不能别白條陳奏至度始奏罷十一月壬午度支鹽鐡使王涯奏請於銀州置銀川監牧使以刺史劉源充使從之開成元年二月以飛龍馬二百匹賜京兆府充給諸驛四月戊寅邕管經略使裴恭上言洞賊雖深居山谷當其刼掠多在平地防禦之道切在馬軍請賜草馬二百匹置監牧以為備詔以度支錢三百萬逐便賜之二年七月夏州節度使劉源奏自太和七年十一月一日於銀川置監城收管群牧今計孳生馬七千餘匹今饒州南界有空閒地周廻二百餘里四面懸絶賊路不通只置三五十人守其要害即牧放無虞是臣當管界内並非百姓佃食請割𨽻監司乆逺之計詔委本道節度使差人與判使勘驗如實無主使任收管仍不得侵奪居人田産四年十月飛龍進諸監牧二嵗馬二千七百匹哀帝天祐三年十一月勅牛羊司牧管御厨羊并乳牛等御厨物料先是河南府供進其肉便在物料數内續以諸處送到羊且令牛羊司逐日送納今知舊數已盡官吏所繇多總逃去其諸處續進到羊并舊管乳牛並送河南府牧管其牛羊司官吏並宜停廢梁太祖開平元年九月詔先以討伐北虜因索公私馬以濟戎事至是慮有搔擾復罷前令如有力者任畜馬四年十月頒奪馬令先是王師擊賊所得馬雖一二必具獻或被瘡殞於道中而戰者無所利帝曰獲則有之所以要其奮擊也今主將亡馬皆不言取士卒獲以為己功甚無謂宜下諸軍勿来獻擅冐禁者以違勅罪罪之後唐荘宗同光三年六月將事西蜀下河南河北諸州府和市戰馬所在搜括官吏除一匹外官收匿者致之以法繇是搜索殆盡三年閏十二月魏王奏東西兩川㸃到見在馬得九千五百三十匹明宗即位以康福為飛龍使福便弓馬少事武皇累補軍職荘宗嗣位嘗謂左右曰我本番人以羊馬為活業彼康福者體貌豐厚宜領財貨可令總轄馬牧繇是署為馬坊使大有蕃息及後明宗為亂兵所逼將離魏縣㑹福牧小馬數千匹於相州乃驅而歸命及即位乃有此授天成二年三月丙辰宰臣任圜奏臣伏見番牧臣僚每正至慶賀例皆進馬臣以捧日之心貴申其忠孝追風之步必擇於馴良備乘奉於帝車資駔駿於天廏伏見本朝舊事雖以進馬為名例多貢奉馬價葢道途之役䕶養稍難因此羣方乆為定制自今後伏請只許四夷畨國進駞馬其諸道藩府州鎮請依天復三年已前許貢綾絹金銀隨土産折進馬之直所貴稍便貢輸不虧誠敬兼請約舊制選孳生馬分置監牧俾飲齕而自遂即騋牝之逾繁者勅旨任圜方秉國權乃專邦計公家之利知無不為當景運之中興舉皇朝之政事不獨資其經費亦兾便於貢輸載閲敷陳允叶事體宜依所奏乃置監牧委為三司使别其制置奏聞三年三月吏部郎中何澤請率天下牝馬置羣牧取其蕃息四年四月詔沿邊置場買馬不許蕃部直至闕下帝自臨馭欲来逺人黨項之衆競赴都下嘗賜酒食於禁庭醉則連袂歌土風以出凡將到馬無駑良並云上進國家雖約其價以給之及計其館穀錫賚所費不可勝紀計司以為蠧中華無出於此遂止之是年八月詔以右軍馬牧軍使田令方芻牧不謹馬瘠而多死劾致於法安重誨奏曰令方損耗官馬死未塞責然因馬罪死一軍使非撫士之道杖減死一等長興元年七月分飛龍院為左右以小馬坊為右飛龍院三年正月三司奏從去年正月至年終收到諸番所賣馬計六千餘匹所支價錢及給賜供費約數四十萬貫四年十月帝問見管馬數范延光奏曰天下嘗支草粟者近五萬匹見今西北諸番部賣馬者徃来如市其郵傳之費中估之價日四五千貫以臣計之國力十耗其七馬無所使財賦坐銷朝廷將不濟馮贇奏曰金商州每年上供絹不過六百疋臣給馬價每日約支五千餘疋臣等思惟無益之甚乞陛下深悟其理帝曰卿等商略可否以聞延光等議戒緣邊鎮戍番部賣馬即擇其良壮給券具數以聞從之十一月朱𢎞昭馮贇奏曰臣等自蒙重委計度國力盈虚而支給嘗苦不足者直以賞軍無算買馬太多之弊也若不早為節限後將難濟宜嚴勅西北邊鎮守此後請禁止其来晉少帝天福九年正月發使天下率公私之馬漢髙祖天福十二年九月河南諸道並奏使臣到和買戰馬始帝去冬以北虜犯闕陷戰馬二萬匹而騎卒在焉時方欲攻鄴壘而制塞下遂降和買河南諸道不經虜掠處土人私馬時制旨略曰朕方以勤儉一身輯和庶政未嘗枉費所在安人今則重威未賔契丹尚擾必多添於戰騎期大振於軍威言念煩勞事非獲巳時天下人心厭虜燔炙之患乆矣皆願以身為捍聞帝詔諭皆感悟樂而隨之周世宗顯徳二年八月帝謂侍臣曰諸軍與飛龍院馬向来有病患老弱者多為其主者無故擊殺分食其肉豈可壮則乘騎貴其負重之力老則見棄不免刲宰之患忘其勞而枉其死寔有所傷今後應有病患老弱馬並可送同州沙苑監衛州牧馬監就彼水草以盡其飲齕之性冊府元龜卷六百二十一
