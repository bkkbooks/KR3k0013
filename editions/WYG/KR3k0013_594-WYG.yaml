body:
  text: 册府元龜卷五百九十四宋王欽若等撰掌禮部奏議第二十二後唐閔帝應順元年正月中書門下奏太廟見饗七室髙祖太宗懿宗昭宗獻祖太祖莊宗今明宗升祔禮合祧遷獻祖請下尚書省集議太子少傅盧質等議曰臣等以親盡從祧垂於舊典疑事無質素有明文頃莊宗皇帝再造寰區復隆宗廟追三宗於先逺復四室於本朝式遇祧遷旋成㳂革及莊宗升祔以懿祖從祧蓋非嗣立之君所以先遷其室光武滅新之後始有追尊之儀只此在於南陽元不歸於太廟引事且疎於故實此時須禀於新規將來升祔先廟次合祧遷獻祖既叶隨時之義又符變禮之文從之時議者以懿祖賜姓於懿宗以支庶繫太宗例宜以懿祖為始祖次昭宗可也不必祖神堯而宗太宗若依漢光武則宜於代州立獻祖而下親廟其唐廟依舊禮行之可也而議諡者㤀咸通之懿宗又稱懿祖父子俱懿於禮可乎將來未耶三世與唐室四廟連叙昭穆非禮也議祧者不知受氏於唐懿宗而祧之今又及獻以禮論之始祧昭宗次祧獻祖可也而懿祖如景皇帝豈可祧乎末帝清泰元年四月中書門下上言太常以五月朔御明堂受朝三日夏至祀皇地祗前二日奏告獻祖室不坐此至是日有祀事則次日受朝今祀在五鼓前質明行禮畢御殿在始旦後請此例行之詔曰日出御殿與祀事無妨宜依常年例五月戊申中書門下奏太常以明宗二十日祔廟太尉宰臣攝縁馮道在假李愚十八日私忌在致齋内今劉昫又奏臣判三司事繁免祀事詔禮官叅酌有司上言曰愚私忌在致齋内諸私忌日遇大朝㑹入閣宣召皆赴朝叅今祔饗事大忌日屬私致齋日請比大朝㑹宣召例從之六月中書門下奏㩀太常禮院申册拜王公如在京城所司備鹵簿車輅法物皇帝臨軒行册如在外鎮正衙命使押册赴本道行禮其車輅法物故事不出都城禮無明文今奉制命幽州趙德均封北平王青州房知温封東平王皆備禮册命其合用車輅法物在兵部太常太僕寺請載徃本州行禮後送納本司從之十一月中書門下奏二十六日明宗聖德和武欽孝皇帝忌辰羣臣奉慰行香固有常禮伏以皇帝陛下初遇忌辰不同常歳臣等商議請於忌辰前後各一日不坐朝從之三年二月太常禮院奏據兵部侍郎馬縞上䟽言古者嫂叔無服蓋推而逺之按五禮精義貞觀十四年魏徵等議親兄弟之妻請服小功五月令所司給假差錯為大功九月太常博士叚顒稱自來給假無依令式若云違古不獨嫂叔一條舊為親姨服小功今令式服大功為親舅服小功今服大功為妻父母緦麻今服小功為女婿為外甥緦麻今並服小功此五條在令式與精義不同未審依馬縞所奏為復且依令式右贊善大夫趙咸又議曰臣聞三代制禮無降减之名五服容䘮有寧戚之義此蓋聖人隨時設教稱情立文㳂革不同吉㓙相變或服繇恩制䘮以禮加太宗文皇帝引彼至仁推其大義因覽同㸑有緦之義遂制嫂叔小功之服列聖遵行已為故事傳于令式加至大功今馬縞奏論以為錯謬况縞昔事本朝暨至梁室曾為博士累歴歳年今始奏陳未為允當謹按儀禮凡制五服或以名加或以尊制或推恩而有服或引義而當䘮故嫂叔大功良有以也其如叔以嫂之子為猶子為猶子之妻叔服大功今嫂是猶子之母安可却服小功若以名加嫂豈踈於猶子之婦若以尊制嫂豈卑於猶子之妻論恩則有生同骨肉之情引義則有死同宅兆之理若以推而逺之為是即令式兼無小功既有稱情制宜之文何止大功九月請依令式永作􅃔倫勅下尚書省集百官議尚書左僕射劉昫等議曰伏以嫂叔服小功五月開元禮㑹要皆同其令式正文内元無䘮服制度只有一本内編在假寕令後不言奉勅編附年月除此一條又檢七條令式與開元禮相連者所司行已多年固難輕改既當議事須按舊章今若鄙宣父之前經紊周公之徃制隳太宗之故事廢開元之禮文而欲取差誤近規行編附新意稱制度且違大典言令式又非正文若便改更恐難經久臣等集議嫂叔服并諸服紀竝請依開元禮為定如要給假却請下太常依開元禮内五服制度録出一本編祔令文從之晋髙祖天福二年三月左僕射劉昫等奏参議册四廟狀曰臣等據太常博士叚顒議云夫宗廟之制歴代為難須廣按禮經旁求故實通古今之理為規式合天道人情為楷模伏縁禮有隨時捐益各異遂至議論多别禮出衆途今總歴代之宏規議新朝之定制謹按尚書舜典曰正月上日受終於文祖此是堯之廟也猶未載其數又按郊祀録云夏立五廟殷立六廟周立七廟漢初立祖宗廟郡國共計一百六十七所後漢光武中興後别立六廟魏明帝初立親廟四後重議上依周法立七廟晋武帝受禪初立六廟後却立七廟宋武帝初立六廟齊朝亦立六廟隋文帝受命初立親廟四至大業元年煬帝欲尊周法議立七廟次便禪命於唐武德元年六月四日始立四廟於長安貞觀九年命有司詳議廟制遂立七廟後至開元十一年後創立九廟又按禮記䘮服小記曰王者禘其祖之所自出以其祖配之而立四廟鄭𤣥注云髙祖以下至禰四世即親盡也更立始祖為不遷之廟共為五廟也又按禮記祭法及王制孔子家語春秋榖梁傳並云天子七廟諸侯五廟大夫三廟士二廟此是降殺以兩之義也又按尚書咸有一德曰七世之廟可以觀德又按疑義云天子立七廟或四廟蓋有其義也如四廟者從禰至髙祖已上親盡故有四廟之禮又立七廟者縁自古聖王祖有功宗有德更立始祖即於四親廟之外或祖功宗德不拘定數所以有五廟六廟或七廟九廟要後代子孫觀其功德故尚書云七世之廟可以觀德矣又按周捨論云自江左以來晋宋齊梁相承多立七廟矣今顒等叅詳唯立七廟四廟即並通其理伏縁宗廟事大不敢執以一理定之故撿錄七廟四廟二件之文俱得其宜他所論者並皆勿取請下三省集百官詳議勅㫖宜依者臣等今月八日於尚書省集百官詳議伏以將敷至化以達萬方克致和平必先宗廟是以孝為教本所以𢎞愛敬而厚人倫禮乃民防蓋欲辨尊卑而明法制故禮記王制云天子七廟諸侯五廟大夫三廟䟽云周制之七廟者太祖及文王武王之祧與親廟四太祖后稷也殷六廟契及湯與二昭二穆夏則五廟無太祖禹與二昭二穆而已自夏及周少不减五多不過七又云天子七廟皆據周也有其人則七無其人則五若諸侯廟制雖有其人則不過五此則天子諸侯七五之異名矣至於三代已後魏晋宋齊隋及唐初多立六廟或四廟葢以定國之始不盈七廟之數也伏惟皇帝陛下大定寰區方興教理既先自家刑國固當率土咸賔今欲請立自髙祖已下四親廟其始祖一廟未敢輕議伏惟聖裁恐於講德論功有失靈源茂緒禀自中㫖共謂得宜臣等幸列明庭獲逢景運􅂋奉如綸之命共詳立廟之儀雖竭討尋慙非該博有愧上塵聖鑒實慮未恊宸衷不免迂踈仍虞漏略又據御史中丞張昭逺奏臣前月中預都省集議宗廟事伏見議狀於親廟外請别立始祖一廟近奉中書門下牒再令百官於都省議定聞奏者臣讀十四代史書見二千年故事觀諸家家宗廟都無始祖之稱惟殷周二代以稷契為太祖禮記曰天子七廟三昭三穆與太祖之廟而七鄭𤣥注云此周制也七者太祖后稷及文王武王與四親廟也又曰殷人六廟契及湯與二昭二穆也夏后氏立五廟不立太廟唯禹與二昭二穆而已據王制鄭𤣥所釋即殷周以稷契為太祖夏后氏無太祖亦無追謚之廟自殷周以來時更十代皆於親廟之中以有功者為太祖無追崇始祖之例具引今古即恐詞繁事要證明須陳梗槩漢以髙祖父太上皇執嘉無社稷功不立廟號髙帝自為髙祖魏以曹公相漢垂三十年始封於魏故為太祖晋以宣王輔魏室有功立為髙祖以景帝始封於晋故為太祖宋氏先世官閥卑㣲雖追崇帝號劉裕自為髙祖南齊髙帝之父位至右將軍生無封爵不得為太祖髙帝自為太祖梁武帝父順之佐祐齊室封侯位至領軍丹陽尹雖不受封於梁亦為太祖陳武帝父文讚生無名位以武帝功梁室贈侍中封義興公及武帝即位亦追為太祖周閔帝以父泰相西魏經營王業始封於周故為太祖隋文帝父忠輔周室有大功始封於隋故有太祖唐祖神堯祖父虎為周上柱國隋代追封唐公故為太祖唐末梁室朱氏有帝位變四廟朱公先世無名位雖追册四廟不立太祖朱公自為太祖此則前代追册太祖不出親廟之成例也王者祖有功而宗有德漢魏之制非有功徳不得立為祖宗殷周受命以稷契有大功於唐虞之際故追尊為太祖自秦漢之後其禮不然雖祖有功乃須親廟今亦粗言徃例以取證明秦稱造父之後不以造父為始祖漢稱唐堯劉累之後不以堯累為始祖魏稱曹参之後不以参為始祖晋稱趙將司馬卬之後不以卬為始祖宋稱漢楚元王之後不以元王為始祖齊梁皆稱蕭何之後不以何為始祖陳稱太丘長陳寔之後不以實為始祖元魏稱李陵之後不以陵為始祖後周稱神農之後不以神農為始祖隋稱楊震之後不以震為始祖唐稱臯陶老子之後不以臯陶老子為始祖唯唐髙宗皇帝則天武后臨朝革唐稱周更立七廟仍追册周文王姬昌為始祖此當時附䴡之徒不諳故實武立姬廟乖越以來曲臺之人到今􅅓誚臣逺觀秦漢下洎周隋禮樂衣冠聲名文物未有如唐室之盛也武徳議廟之初英才間出温魏顔虞通今古封蕭薛杜達禮儀制度憲章必有師法夫追先祖之儀起於周代據史記及禮經云武王纘太王王季文王之緒一戎衣而有天下尊為天子宗廟享之周公成文武之徳追王太王王季祀先公以天子之禮又曰郊祀后稷以配天據此言之周武雖祀七世追為王號者但四世而已故自東漢已來有國之初多從四廟從周制也况殷因夏禮漢習秦儀無勞博訪之文宜約已成之制請依隋唐有國之初創立四廟推四世之中名位髙者為太祖謹議以聞勑宜令尚書省集百官將前議狀與張昭逺所陳速再與奪聞奏者又奏曰臣等今月十三日再於尚書省集百官詳議夫王者祖武宗文郊天祀地故有追崇之典以申配饗之儀切詳太常禮院議狀准立七廟四廟即竝通其理其他所論竝皆勿取七廟者按禮記王制云天子七廟三昭三穆與太祖之廟而七鄭𤣥注云此周制也詳其禮經即是周家七廟之定數四廟者謂髙曽祖禰四世也按周本紀及禮記大傳皆云武王即位追王太王王季文王以后稷為堯稷官故追尊為太祖此即周武王初有天下追尊四廟之明文也故自漢魏已降迄於周隋創業之君追諡不過四世約周制也此禮行之已乆事在不疑今参詳都省前議狀請立四廟外别引始祖取裁未為定議續准勑據御史中丞張昭逺奏請創立四廟之外無别封始祖之文備引古今細詳沿革合前王之茂典是厯代之通規况國家禮樂刑名皆約唐典宗廟之制須據舊章請依唐朝追尊獻祖宣皇帝懿祖先皇帝太祖景皇帝代祖元皇帝故事追尊四廟為定臣等考詳典禮上奉聖明雖共竭於懇誠實倍慙於淺近從之三年二月中書門下奏按禮不諱嫌名二名不偏諱注云嫌名謂音聲相近若禹與雨丘與蓲也二名不偏諱孔子之母名徵在言在不言徵言徴不稱在此古禮也唐太宗𤣥宗二名皆諱人姓與國諱音聲相近是嫌名者亦改姓氏與古禮有異廟諱平聲字則不諱側聲若諱側聲字即不諱平聲所諱字正文及偏旁皆闕㸃畫望令依令式施行勑朝廷之制今古相沿道在人𢎞禮非天降况以方開厯數䖍奉祖宗雖踰孔子之文未爽周公之訓兾崇孝行永載簡編所為二名及嫌名事宜依唐朝行四月詳定院奏太常博士叚顒進封事云臣竊見雒京四面所有祠祭諸壇等自近年以来相次官員祭告不住芟薙掃除漸似低平乆虧増飾今乞下太常寺牒河南雒陽兩縣應有管係壇所方以農務未興之時各勒逐近量差三十人功添補修泥須及元格尺丈髙濶其齋宫慮有經費據難修營稍候秋登亦望條理自然百靈允集萬福攸歸臣等叅詳大凡祀祭事在敬恭惟於齋壇最宜崇飾從之四年六月司天臺奏七月一日太陽有虧缺於北極於東復於南未盈而沒太常禮官詳舊制日有變天子素服避殿太史以所司救日於社陳五兵五皷麾東㦸南矛西弩北盾中央置皷服從其位百職廢務素服守司重列於庭每等異位向日而立明復而罷今所司灋物咸不能具去歳正旦日有蝕之唯謹藏兵仗皇帝避正殿尚素食百官守司而已中書奏欲行禮從之八月乙巳中書奏太常禮院定來歳長安公主出降儀太僕寺供厭翟二馬車殿中省備圓方偏扇各十六行障三坐障二繖一大扇一團大扇二今車障傘扇是同光年皇后灋物欲雅餙牙使厭翟之車后以四馬權去二馬用之詔從其議十一月禮官奉詔約開元禮重定正冬朝㑹其畧曰開元禮三品以上升殿羣臣在庭竊以九品分官隨時有異或以卑髙定分或以清濁為資積習是常造次難議請沿近禮依内宴列坐開元禮稱賀之後皇帝戴通天冠服絳紗袍百官朝服以侍坐解劒履於樂縣之西北竊以開元舊制長安廣庭故可以究皇儀而展帝容陳百辟而贊羣后今京邑新造殿廡未更若用前規慮為隘狹議請皇帝冠烏紗巾服赭黃袍百寮具公服候朝堂宏敞即舉舊儀二舞皷吹熊羆之案工師樂器等事繇乆廢無次頗甚歳月之間未可補備請且設九部之樂權用教坊伶人詔曰三品之官尚書方得升殿其餘所議宜悉從之是月太常禮院奏唐朝制度請以至徳宫正殿隔為五室室三分之南去地四尺以石為塪中容二主廟之南一屋三門門㦸二十四東西一屋一門門無棨㦸四仲之祭一羊一豕如其中祠幣帛牲牢之類光禄主之祠祝之文不進不署神厨之具鴻臚督之五帝五后凡十主未遷者六未立者四未諡者三髙祖太宗與其后暨莊宗凡六主在清化里之寢宫祭前一日以殿中繖扇二十迎置新廟以行饗禮閔帝莊宗明宗二后及魯國孔夫人神主四座請修製祔廟及三后請定諡灋從之五年五月宰臣馮道奏宰臣朝見辭謝在朝堂橫街之南及至餘官即悉於崇元門内此蓋事因偶爾習以為常又入閣禮畢之時羣官退於門外定班如初俟宣放伏唯翰林學士前任郡守等不隨百辟即時直出惟此二者禮􅄽序失乞改正勑官爵之班即分髙下見謝之位豈有異同宜立通規以為定制今後宰臣使相朝見辭謝竝於崇元門外與諸官同行異位一時列拜假滿橫行即從舊例又入閣之儀其翰林學士前任郡守等今後入閣宜依百官班例不得先出是月御史中丞竇貞固奏每遇國忌行香宰臣跪爐僧人表讚文武百官儼然列坐今後復請宰臣跪爐百官依常位立班從之仍令行香之後齋僧一百人永為定制二月太常禮院奏長安公主以三月出降按唐徳宗朝禮儀使顔真卿議婚用駙馬在禮無文周禮諸侯以璋聘女禮云玉以比徳今請駙馬加以璋郡主之聓加𤣥纁以代用馬凾書之禮出自近代事無正經請廢之勿用詔曰納采之時主人再拜使者不答雖開元禮具載其儀宜令答拜仍令鄭王重貴主其婚姻其婚禮中外不賀餘依太常禮院所奏少帝以天福七年即位是年太常禮院奏國朝見饗四廟靜祖肅祖睿祖憲祖今髙祖將行升祔按㑹要唐武徳元年立四廟於長安至貞觀九年有司詳議廟制以髙祖神堯皇帝神主升舊四室祔廟今髙祖神主請同唐髙祖神主升祔從之開運二年二月右輔闕盧夐奏曰臣聞國之大事在祀與戎祀則必盡其誠戎則不加無罪伏見以時祭嶽瀆皆是本道觀察使親賫御降祝文詞所行禮唯中嶽頃自故河南尹張全義年徳俱髙遂請少尹或上㕔賓席攝祭近歳多差文叅府掾習以為常不唯有凟於靈祗兼慮漸隳於祀典臣欲請河南尹却於華州兖州定州孟州觀察使例親行獻禮仍令本縣令讀祝文者勑曰盧夐請河南尹親及廟貌冀表精䖍在禱山川誠為重事且浩穰都邑豈可闕人今後祭中嶽宜令河南尹徃彼行禮三年六月西京留司監察使奏以祠祭所定行事官臨日多遇疾病或奉詔赴闕留司禀勑已遲乞以留司吏部郎中一人主判有闕便依次第定名庶無闕事從之漢高祖即位稱天福十二年是年太常博士叚顒奏曰伏以宗廟之制歴代為難須按禮經旁求故實又縁禮貴隨時捐益不定今叅詳歴代故事立髙曽祖禰四廟更上追逺祖光武皇帝為始祖百代不遷之廟居東向之位共為五廟庶符徃例又合禮經詔尚書省集百官詳議吏部尚書竇貞固等議曰按禮記王制云天子七廟諸侯五廟大夫三廟䟽云周制七廟者太祖及文王武王之廟與親廟四太祖后稷也又云天子七廟皆據周也有其人則七無其人則五至於光武中興及歴代多立六廟或四廟蓋建國之始未盈七廟之數又按郊祀録王肅云徳厚者流澤廣天子可以事六代之義也今欲請立髙祖以下四親廟又自古聖王祖有功宗有徳即於四親廟之外祖功宗徳不拘定數今除四親廟外更請上追髙皇帝光武皇帝共六廟從之隐帝乾祐元年六月太常禮院准奏天福十二年六月中勑追尊六廟當司尋各牒所司請排比法物修製冊寶并衮龍服通天冠絳紗袍鎮圭等所司修製竝無次第者伏縁當司勘造逐年四季嗣祭晝日内正月上辛祈榖四月孟夏雩祭及夏至九月季秋大享明堂十一月冬至皆祀昊天上帝夏至祀皇地祗十月孟冬神州地祗皆以祀前二日准禮例奏告太廟一室配座并四孟月及臘饗於太廟伏以國之大事在祀與戎晝日無配座之儀宗廟闕薦饗之禮今詳典墳有虧禮敬伏乞再下所司申請修制從之九月高祖神主將升祔太廟有司奏議文祖明元皇帝室神主祧之置於夾室祫享即出之二年司封郎中裴㢲上言國家郊廟社稷百神祀祭皆在雒陽臣每見差官行事諸神壇墠多無齋宿之所以三公之職衣冠於旅舎田家狼籍凶穢無所不有恐非精誠蠲潔展敬之道也臣請下河南府於京城四郊聊葺屋宇充齋宿神厨之所從之三年河南府京兆尹言差官檢校髙祖長陵世祖原陵髙下步數言竝無祠廟初國家議立宗廟議官不詳舊事乃以前漢髙祖後漢光武繫六廟乃修縁廟寶册太常卿謂臣曰髙祖世祖寶册已在陵内不勞復製但告之而已為輿言所惑竟為之宗正卿上言諸帝陵園所祠時享須有寢殿祠官今髙祖世祖二陵竝無祠祭之所請各下本處令於陵側粗修齋宫以當寢廟下所司計度所司引唐朝奉陵故事所費鉅萬遂寢其事以至國亡二祖之陵不霑一奠周太祖廣順元年正月中書門下奏太常禮院議合立太廟室數若守文繼體則魏晉有七廟之文若創業開基則隋唐有四廟之議聖朝請依近禮追諡四廟伏恐所議未同請下百官集議從之二月太子太傅和凝等奏以肇啓洪圖惟新皇室左宗廟而右社稷率繇舊章崇祖禰而辨尊卑載於前史雖文質互變義趣各殊式觀捐益之規咸繫興隆之始伏惟皇帝陛下體元立極本義祖仁開變家成國之基尊奉先思孝之道言為軌範動合典墳超百代之哲王總一時之盛業據禮議立四親廟允叶前文從之四月中書門下奏太常禮院申七月一日皇帝御崇元殿命使奉册四廟以舊儀服衮冕即座太尉引册案入皇帝降座引立於御座前南向中書令奉册案進皇帝搢珪捧授册使使跪受轉授舁册官其進寶授寶儀如册案恭以興王之始稽古為先四方見尊祖之心萬代傳敬親之道臣等叅詳至時請皇帝降階從之十月禮儀使言奉迎太廟社稷神主到東宮日未審皇帝親出郊外迎奉當否縁此無禮例故實簡詳請三省官集議勑宣令尚書省四品以上中書門下兩省五品以上同叅議聞奏時議者以人君謁廟有時又祭服行事若迎郊謁見難行饗獻之禮常服又恐非宜是以集議及兩省集議司徒竇貞固司空蘇禹珪主議或言吴主孫休即位迎其祖父於吴郡入祔太廟休前一日出城野次明日常服奉迎此其例也禮酌人情假令齋車載主以從行未必皆須祭服行事迎之宜也司徒竇貞固等獻議曰陛下方祗見於祖宗展孝思於迎奉酌人情而制禮迎廟主以為宜臣等未見舊章止依情理以車駕出城為是其迎奉之儀請下禮儀使酌量草定從之禮儀使言来年正月一日皇帝有事於南郊合祭天地於圓丘准禮以祖廟配祭依祠令以髙祖睿和皇帝配勑敬依典禮三年二月内司製國寶兩坐詔太常具制度以聞有司言唐六典符寶郎掌天子八寶其一曰神寶其二曰受命寶其神寶方六寸髙四寸六分厚一寸七分蟠龍紐文與傳國璽同傳國寶秦皇以藍田玉刻之李斯篆方四寸靣文曰受命於天既壽永昌紐盤五龍二寶歴代相傳以為神器别有六寶一曰皇帝行璽二曰皇帝之璽三曰皇帝信璽四曰天子行璽五曰天子之璽六曰天子信璽此六寶因文為名竝白玉螭虎紐歴代相傳或亡失則補之北朝鑄之以金至則天太后以璽字涉嫌改之為寶八寶唐代符寶郎典之貞觀十六年别置元璽一坐其文曰皇天景命有徳者昌白玉螭虎紐同光中製寶一坐文曰皇天受命之寶天福四年製寶一坐文曰皇帝神寶其同光天福二寶内司製造不見紐象分寸製度勑令製國寶兩坐宜用白玉方四寸螭虎紐其一宜以皇帝承天受命之寶文其一宜以皇帝神寶為文命中書令馮道書寶史臣曰國以玉璽為傳授神器䆳古無文運斗樞曰舜為天子黃龍負璽世本曰魯昭公始作璽秦兼七國稱皇帝李斯取藍田之玉玉工孫壽刻之方四寸斯為大篆書文之形制為魚龍鳯鳥之狀希世之至寶也秦亾子嬰以璽降於軹道漢髙祖得之與斬白蛇劒世世傳寶之王莾之簒使王舜求璽於元后后怒投之於階一角㣲缺莽誅公孫賓以璽送更始劉𤣥敗以授盆子及熊耳之敗盆子以璽降光武漢末黃門亂張讓投璽於井孫堅討董卓入雒見井有五色氣乃杼得之持歸以授袁術術敗荆州刺史徐璆得之詣許授獻帝漢禪魏文帝得之魏禪晉武帝得之劉聰䧟雒陽得之聰死歸劉曜為石勒所擒璽歸於鄴石季龍傳冉閔閔敗東濮陽太守戴施入鄴得之送江東授穆帝晉禪宋劉裕得之宋禪齊蕭道成得之齊禪梁蕭衍得之臺城之䧟侯景得之景敗其將侯子鑒欲以璽走江北為追兵所廹乃投於栖霞寺井中寺僧永杼得匿之陳永定三年永弟子普智以璽上陳文帝隋平陳隨叔寶入長安隋之始得秦真傳國寶煬帝在江都宇文化及簒逆以璽北度至韋縣為竇建徳所敗寶入建徳建徳擒於武牢其妻曹氏以寶獻唐髙祖禄山之亂肅宗即位於靈武上皇遣崔圓送璽於鳯翔代宗之避狄分陜徳宗之移幸山南皆以八寶從黃巢之亂僖宗再幸山南昭宗播越石門神器俱在天祐四年輝王禪位於梁命宰臣楊渉送寶於大梁梁亾莊宗入汴得之同光末内難作亂兵犯蹕寶為火所灼文字訛缺明宗清泰復傳之清泰敗以傳國寶隨身自焚而死其寶遂亡失其神寶者方六寸厚一寸七分髙四寸六分蟠龍隐起文與秦璽同但玉色不及形制髙大耳不知何代造東晉孝武十九年南雍州刺史郗恢於慕容永部得之送於金陵東晉末傳於宋髙祖宋亡入齊蕭道成得之齊亡入梁蕭衍得之臺城之䧟侯景得之景敗侍中趙思齊擕走江北獻齊文宣帝宇文氏滅齊武帝得之歸長安宇文亡入隋文帝改號傳國璽又改為受命璽開皇九年平陳始得秦氏真傳國璽仍以秦璽後出得於亡陳以北朝所傳神璽為第一秦璽次之隋亡竇建徳妻與秦璽俱獻長安唐髙祖得之唐末不知所在秦初制受命寶時别製六璽一曰皇帝行璽封册諸王公用之二曰皇帝之璽與王公書用之三曰皇帝信璽諸夏發兵用之四曰天子行璽封册蕃國用之五曰天子之璽賜蕃國書用之六曰天子信璽徴蕃國兵用之六璽皆白玉刻螭虎紐方一寸五分髙二寸傳之歴代或有亡失北朝鑄之以金所謂乘輿八寶也太宗貞觀中别刻元璽莊宗時或引元璽又别刻受命寶天福初晉髙祖以傳國寶為清泰所焚特置寶一坐開運末契丹䧟中原張彦澤入京城晉主奉表歸命於遼主遣皇子延煦等奉國寶并命印三靣送與遼主其國寶即天福初所造者也延煦等廻遼主與晉帝詔曰所進國寶騐來非真傳國寶其真寶速進來晉主奏曰真傳國寶因清泰末偽主從珂以寶自焚自此亡失先帝登極之初特製此寶左右臣寮備知固不敢别有藏匿也漢朝二帝未暇修製故太祖命有司特製此二寶焉八月太常上言祭禮宗廟之祀三年一祫以孟冬五年一禘以孟夏所以别尊卑審昭穆也四時之祭薦其常事故禘祫之月則不行時饗恭惟追尊四廟經今三年准禮合改十月孟冬薦饗為祫并徧祭七祀從之史臣曰禮官謬舉也禘祫之祭比以祧廟之主無常饗故有三年五年合食於太祖之禮今太廟四室聫棟而承五饗何合之有言審昭穆者禮天子七廟三昭三穆與太祖之廟七今但三昭三穆而已無勞審也九月將有事於南郊議於東京别建太廟時太常禮院言准雒京廟室一十五間分為四室兩頭有夾室四神門每門屋三間毎間一門㦸二十四别有齋宮神厨屋宇准禮左宗廟右社稷在國城内請下所司修奉從之是月南郊禮儀使奏郊祀所用珪璧制度准禮祀上帝以蒼璧祀地祗以黄琮祀五帝以珪璋琥璜其玉各依本方正色祀日月以珪璋祀神州以兩珪有邸其用幣天以蒼色地以黃色配帝以白色日月五帝各從本方之色皆長一丈八尺其珪璧之狀璧圓而琮八方珪上銳而下方半珪曰璋琥為虎形半璧曰璜其珪璧琮璜皆長一尺二寸四珪有邸邸本也珪著於璧而四出也日月星辰以珪璧五寸前件珪璧雖有圖様而長短之說或殊按唐開元中𤣥宗詔曰禮神以玉取其精潔比來用珉不可行也如或以玉難辨寕小其制度以取其真今郊廟所修珪璧量玉大小不必皆從古制伏請下所司修製從之是月禮儀使奏郊廟祝文例云古者文字皆書於册而有長短之差魏晉郊廟祝文書於册唐初悉用祝板惟陵廟用玉為册𤣥宗親祭郊廟用玉為册徳宗朝博士陸淳議准禮用祝板祭已燔之可其議貞元六年親祭又用竹册當司准開元禮并用祝板梁朝依禮行之至明宗郊天又用竹册今詳酌禮例祝板為宜從之世宗顯徳二年八月癸卯兵部尚書張昭上言今月十二日伏䝉宸慈召對面奉聖㫖以每年祀祭多用太牢念其耕稼之勤更備犧牲之用比諸豢養特可愍傷令臣尋討故事可以他牲代否臣仰禀綸言退尋禮籍三牲八簋之制五典六樂之文著在典彛迭相沿襲累經朝代無所改更臣聞古者燔黍捭豚尚多質畧近則梁武麵牲笋脯不可宗師雖好生之德則然於奉先之議太劣蓋禮主於信孝本因心黍稷非馨鬼神饗徳不必牲牢之巨細籩豆之方圓茍血祀長保於宗祧而牲俎何須於蠒栗但以國之大事儒者乆行易以他牢恐未為便以臣愚管其南北郊宗廟社稷朝日夕月等大祠如皇帝親行事備用三牲如有司攝行事則用少牢以下雖非舊典貴减犧牛是時太常卿田敏又奏云臣奉聖㫖為祠祭用犢事今太僕寺供犢一年四季都用犢二十二頭唐㑹要武徳九年十月九日詔祭祀之意本以為民窮民事神有乖正直殺牛不如禴祭明德即是馨香望古推今民神一揆其祭圓丘方澤宗廟已外竝可止用少牢者特待時和年豐然後克修常禮又按㑹要天寶六載正月十六日赦文祭祀之典犧牲所備將有達於䖍誠蓋不資於廣殺自今後每大祭祀應用騂犢宜令所司量减其數仍永為常式其年起請以舊科毎年用犢二百一十二頭今請减一百六十三頭止用二十九頭餘祠饗宜竝停用犢至上元二年九月二十一日赦文國之大事郊祀為先貴其至誠不羙多品黍稷雖設猶或非馨牲牢空多未為能饗圓丘方澤仍依常式宗廟諸祠臨時獻熟用懷明徳之馨庶合西隣之祭其年起請昊天上帝太廟各太牢一餘祭竝隨事市供若據天寶六載自二百一十二頭減用三十九頭武德九年每年用犢十頭圓丘方澤一宗廟五據上元二年起請只昊天上帝太廟又無方澤則九頭矣今國家用牛比開元天寶則不多比武德上元則過其大半按㑹要太僕寺有牧監掌孳課之事乞今後太僕寺養孳課半其犢遇祭昊天太廟前三月養之滌宮取其蕩滌清潔餘祭則不養滌宫若臨時買牛恐非典故謹具奏聞奉勑祭祀尚誠祝史貴信非誠與信何以事神禴祭重於殺牛黍稷輕於明徳犧牲之數具載典經前代以來或有増損宜採酌中之禮且從貴少之文起今後祭圓丘方澤社稷竝依舊用犢太廟及諸祠宜准上元二年九月二十一日制竝不用犢如皇帝親行事則依常式四年四月乙酉禮官博士等准詔議祭器祭玉制度以聞時國子祭酒尹拙引崔靈恩三禮義宗云蒼璧所以禮天其長十有二寸蓋法天之十二時又引江都集白虎通等諸書所說云璧皆内方外圓又云璜琮所以禮地其長十寸以法地之數其琮外方内圓八􅊁而有好國子博士聶崇義以為璧内外皆圓其徑九寸又按阮氏鄭𤣥圖皆云九寸周禮玉人職又有九寸之璧及引爾雅云肉倍好謂之璧好倍肉謂之瑗肉好若一謂之環郭璞注云好裡也肉邉也而不載尺寸之數崇義又引冬官玉人云璧好三寸爾雅云肉倍好謂之璧蓋兩邉肉各三寸通好共九寸則其璧九寸明矣聶崇義又云璜琮八方以象地毎􅊁各剡出一寸六分共長八寸厚一寸按周禮疏及阮氏圖竝無好又引冬官玉人云琮八􅊁而無好崇義又云琮璜珪璧俱是禮天地之器而爾雅惟言璧瑗環三者有好其餘琮璜之器竝不言之則璜琮八􅊁而無好明矣時太常卿田敏已下議以為尹拙所說雖有所據而崇義援引周禮正文其理稍優請從之其諸祭品制度亦多以崇義所議為定五年六月癸酉禘於太祖先是言事者以皇家宗廟無祧廟之主不當行禘祫之禮國子司業兼太常博士聶崇義以為前代備廟累遷及追尊未毁皆有禘祫及引故事凡九條以為其証其畧曰魏明帝以景初三年神主入廟至五年二月禘祭明年又禘自兹已後五年為常且魏以武帝為太祖至明帝始三帝而已未有毁主而行禘祫其證一也宋文帝元嘉六年祠部定十月三日大祠其太學博士議云按禘祫之禮三年一五年再宋自髙祖至文帝才亦三帝未有毁主而行禘祫其證二也梁武帝用謝廣議三年一祫五年一禘謂之大祭禘祭以夏祫祭以冬且梁武乃受命之君才追尊四廟而行禘祫則知祭者是追養之道以時移節變孝子感而思親故薦以首時祭以仲月間以禘祫序以昭穆乃禮之經也非闗宗廟備與不備其證三也文多不載至是終從崇義之議册府元龜卷五百九十四
