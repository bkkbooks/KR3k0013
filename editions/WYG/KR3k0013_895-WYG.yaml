body:
  text: 册府元龜巻八百九十五宋王欽若等撰總錄部達命運命知亡日達命孔子罕言命者以其㡬微奥妙寡能及之非可容易而譚也又曰不知命無以為君子盖非君子人者不得與於斯矣中古以還英偉間出乃有遭死生之變而泊然無撓遘艱虞之㑹而毅然有守不溺於私愛不狥於拘忌蒙謗毁而不自明嬰禍患而不茍免咎徵集而不戚㓙怪至而自屏斯皆宅純粹於心府宴得喪於道樞安時處順以全其真窮理盡性而達於命者也孔子去衛將適陳過匡顔刻為僕以其策指之曰昔吾入此繇彼缺也匡人聞之以為魯之陽虎陽虎嘗暴匡人於是遂止孔子孔子狀類陽虎拘焉五日顔淵後言與孔子相失故在後也子曰吾以汝為死矣顔淵曰子在回何敢死言夫子在已無所敢死也匡人拘孔子益急弟子懼孔子曰文王既沒文不在兹乎言文王雖已沒其文見在此此自謂身也天之將喪斯文也後死者不得與于斯文也文王既沒故孔子自謂後死也言天將喪此文者本不當使我知之今使我知之未欲喪之也天之未喪斯文也匡人其如予何如予何猶言奈我何也天未喪此文則我當傳之匡人欲奈我何言不能違天害己孔子使從者為寗武子臣於衛然得去又魯定公卒孔子去曹適宋史記年表定公十三年孔子至衛十四年至陳哀公二年過宋與弟子習禮大樹下宋司馬桓魋欲殺孔子拔其樹孔子去弟子曰可以速矣孔子曰天生徳於予桓魋其如予何天生徳者謂授以聖性徳合天地吉無不利故曰如予何孔子疾病子路請禱禱禱請於鬼神子曰有諸言有此禱請於鬼神之事子路對曰有之誄曰禱爾于上下神祗子路失指誄禱萹名子曰丘之禱乆矣孔子素行合於神明故曰丘之禱乆矣孔子嘗喟然嘆曰莫我知也夫子貢曰何為莫知子子貢怪夫子言何為莫知已故問之子曰不怨天不尤人孔子不用於世而不怨天人不知已亦不尤人下學而上達下學人事上達天理知我者其天乎聖人與天地合其徳故曰惟天知已又公伯寮愬子路於季孫愬譖也伯寮魯人孔子弟子也子服景伯以告魯大夫子服何忌也告孔子曰夫子固有惑志季孫信讒恚子路於公伯寮吾力猶能肆諸市朝吾勢力猶能辨子路之無異於季孫使之誅寮而肆之有罪既刑陳其尸曰肆子曰道之將行也與命也道之將廢也與命也公伯寮其如命何孔子窮於陳蔡七日不嘗食藜羮不糝宰予備矣備當作憊極也語曰衛靈公問陳於孔子孔子對曰俎豆之事則嘗聞之矣軍旅之事未之學也明日遂行在陳絶糧從者病莫能興此之謂憊矣孔子絃歌於室顔回擇菜於外子路與子貢相言曰夫子逐於魯削迹於衛伐樹於宋窮於陳蔡殺夫子者無罪籍夫子絃歌鼔舞未嘗絶音盖君子之所無醜也若此乎顏回無以對入告夫子孔子愀然推瑟喟然嘆曰繇與賜也小人也召吾語之路與貢曰如此者可謂窮矣孔子曰是何言也君子達於道之謂達窮於道之謂窮論語曰君子亦有窮乎子曰君子固窮小人窮斯濫矣今丘也抱仁義之道以遭亂世之患其窮之為言不窮也故内省而不疚於道臨難而不失其徳大寒既至霜雪既降吾是知松栢之茂也衆木遇霜雪皆落比人遭亂世松栢比君子歳寒知松栢之後凋昔桓公得之莒文公得之晉越王得之㑹稽齊桓遭無知之難奔莒晉文公遭驪姬之䜛出過曹越句踐與吴戰敗棲於㑹稽之山卒皆享國克復其恥為覇君焉陳蔡之阨於丘其達乎孔子列然返琴絃復取絃歌子路扢然執干而舞干揚也子貢曰吾不知天之髙也不知地之下也髙下喻大不知孔子聖如天地古之得道者窮亦道孟子在魯樂正子見孟子曰克告於君君為来見也嬖人有臧倉者沮君君是以不果来也克樂正子名也曰克告君以孟子之賢君将来臧倉者沮君故使君不能来也曰行或使之止或泥之行止非人所能也吾之不遇魯侯天也臧氏之子焉能使予不遇哉漢賈誼為長沙王傅三年有鵩飛入誼舎止於坐隅鵩似鶚異物志曰有鳥似小鷄體有文色土俗因形名之曰鵩不能逺飛行不出城也不祥鳥也誼既以謫居長沙卑濕誼自傷悼以為夀不得長廼為賦以自廣其末句曰徳人無累知命不憂細故蔕芥何足以疑朱雲為槐里令去官年七十餘終於家病不呼醫飲藥揚雄怪屈原文過相如至不容作離騷自投江而死雄以為君子得時則大行不得則龍蛇易曰龍蛇蟄之以存神也大行安歩徐行遇不遇命也何必湛身哉湛謂投水而死廼作書徃徃摭離騷文而反之摭拾取也自岷山投諸江流以弔屈原名曰反離騷後為侍郎後漢孔僖拜臨晉令崔駰以家林筮之崔篆所作易林也謂為不吉止僖曰子盍辭乎僖曰學不為人仕不擇官凶吉繇已而繇卜乎在縣三年卒官張禹為揚州刺史當過江行部中土民皆以江有子胥之神難於利渉禹渡吏固請不聴禹厲言曰子胥如有靈知吾志在理察枉訟豈危我哉遂鼔檝而過李膺為長樂少府既廢後張儉事起收捕鈎黨鄉人謂膺曰可去矣對曰事不辭難罪不辭刑臣之莭也吾年已六十死生有命去將安之乃詣詔獄拷死吴雄少時家貧䘮母營人所不封土者擇𦵏其中䘮事趣辦不問時日醫巫皆言當族滅而雄不顧及子訓孫恭三世廷尉為法名家名為明法之家晉魏舒為司徒時陳留周震累為諸府所辟書既下公輙喪亡僉號震為殺公椽莫有辟者舒乃辟之而竟無患識者以此稱其逹命舒子混字延廣清恵有才行為太子舎人年二十七先舒卒朝野或為舒悲惜舒母哀慟退而歎曰吾不及莊生逺矣豈以無益自損乎於是終不復哭顔含為左光祿大夫卒嘗遇郭璞璞欲為之筮含曰年任天位在人修已而天不與者命也守道而人不知者性也自有性命無勞筮龜劉惔為丹陽尹疾篤百姓欲為之祈禱家人又請祭神惔曰丘之禱乆矣年三十六卒官郭文曠達不仕元年永昌中大疫文病亦殆王導遺藥文曰命在天不在藥也夭夀長短時也後秦梁國児於平梁作夀冡每将妻妾入冡飲讌酒酣卧靈床而歌時人或譏之國児不以為意前後征伐屢有大功姚興以為鎮北将軍封平輿男年八十餘乃死宋王彧字景文為中書監領太子太傅揚州刺史明帝疾篤以景文外戚强盛嵗晚不為純臣使謂曰朕不謂卿有罪然吾不能獨死請子先之因手詔曰與卿周旋欲全卿門戸故有此處分勅至之夜景文正與客棋扣函看復還封置局下神色怡然不變方與客棋思行爭刼竟歛于内奩畢徐謂客曰奉勅見賜以死方以勅示客酒至未飲門客焦度在側怒發酒覆地曰大丈夫安能坐受死州中文武可數百人足以一奮景文曰知卿至心若見念者為我百口計乃黙初答勅并謝贈詔酌謂客曰此酒不可相勸自仰而飲之時年六十追贈開府儀同三司劉勔為尚書右僕射中領軍後廢帝元徽初月犯右執法太白犯上將或勸勔解職勔曰吾執心行已無媿幽明若才輕望重災𤯝必及天道密微避豈得免南齊沈鱗士有高節累徴不起嘗以楊王孫皇甫謐深逹生死而終制矯俗乃自作終制年八十五卒梁吕僧珍為散騎常侍既病語親舊曰吾昔在蒙縣熱病發黄當時必謂不濟主人見語卿有富貴相必當不死應尋自差俄而果愈今已富貴而復發黄所苦與昔正同必不復起矣竟如其言卒領軍府舎人時年五十八夏侯詳為湘州刺史州城南臨水有峻峰舊老相傳云刺史登此山輙被代因是歷政莫敢至詳於其地起臺榭延僚屬以表損挹之志陳蕭允梁末為太子洗馬臺城䧟出居京口時㓂賊縦横百姓波駭衣冠士族四出奔蕭允獨不行人問其故允答曰夫性命之道自有常主豈可逃而獲免乎但患難之事皆生於利茍不求利過何從生方今百姓爭欲奮臂而論大功一言而取卿相亦何事於一書生哉莊周所謂畏影避迹吾弗為也乃閉門靜處并日而食卒免於患後魏胡國珍靈太后之兄也為中書監儀同三司以宣武景明三年薨先是巫覡言將有凶勸令為厭勝之法國􅈿拒而不従云吉凶有定分唯修徳以禳之楊椿為太保侍中元顥入雒椿子征東將軍昱鎮滎陽為顥所擒又椿弟順為冀州刺史順子仲宣正平太守兄子侃弟子遁竝􅀙駕河北為顥嫌疑以椿家世顯重恐失人望未及加罪時人助其憂怖或有勸携家避禍椿曰吾内外百口何處逃竄正當坐任運爾髙樹生假平陽王鎮逺將軍時樹生居宅數有赤光紫氣之異鄰伍驚恐僉謂怪變宅不可居樹生曰何知非善安之自若未幾為北州大都督眭夸髙尚不仕或人謂夸曰吾聞有大才者必居貴仕子何獨在桑榆乎遂著知命論以釋之年七十五卒𦵏日赴㑹者如市北齊慕容紹宗為開府西魏遣其大將王思政入據頴州以紹宗為南道行臺與太尉髙岳儀同劉豐圍撃之堰洧水以灌之時紹宗頻有凶夢意每惡之乃私謂左右曰吾自年二十已還嘗有蒜髪昨来蒜髪忽然自盡以理推之蒜者筭也吾年筭将盡乎未㡬與豐臨堰見北有塵氣乃入艦同坐暴風􅀙東北来逺近晦㝠舟䌫徑向敵城紹宗自度不免遂投水而死時年四十三九軍将士莫不悲惋盧叔武為太子詹事右光祿大夫在朝通貴自以年老児子又多遂營一大屋曰歌於斯哭於斯權㑹為中散大夫有一子聰敏精勤㓜有成人之量不幸先亡臨送者為其傷㑹唯一哭而罷時人尚其逹命隋楊素為尚書令寝疾素自知名位已極不肯服藥亦不将慎每語弟約曰我豈須㬰活耶郎茂字蔚之煬帝親征遼東以茂為晉陽留守其年常山贊治王文同與茂有隙奏茂朋黨附下罔上詔遣納言蘇威御史大夫裴藴推治之茂素與二人不平因深文巧詆成其罪狀帝大怒及其弟司𨽻别駕楚之皆除名為民徙且末郡茂怡然任命不以為憂在途作登隴賦以自慰詞義可觀復附表自陳帝頗悟十年追還京兆唐傅奕為太史令貞觀十年遇患未嘗請醫服藥雖究隂陽術數之書不之信嘗醉酒而卧蹶然興曰吾其死矣因命筆自作墓誌曰傅奕者青山白雲人也因醉死嗚呼哀哉其所為多類此李勣為司空遇疾髙宗及皇太子送藥即取服之家中迎召毉巫皆不許入子弟固以藥進勣曰我山東一田夫爾攀附明主濫居富貴位及三台年將八十豈非命乎修短必是有期寧浪就毉人求活竟拒而不進賈敦實永淳初為懐州刺史以年老致仕及病篤子孫迎醫視之敦實曰未聞良醫而治老也不肯服藥以則天垂拱四年卒時年九十餘魏𤣥同為納言賜死於家監刑御史房濟謂𤣥同曰何不告事兾得召見當自陳訴𤣥同歎曰人殺鬼殺有何殊也豈能為告事人乎乃就刑穆寧徳宗時以秘書監致仕寧通達時命未嘗服藥吴湊章敬皇后弟貞元中為京兆尹及疾病便不迎召巫醫親故或勸之對曰吾以孱愚濫承外戚之寵起家便授三品官向四十年更欲何求宜委天任運而已唯御醫送藥至即服君子以其知命也卒時年七十一李吉甫為饒州刺史先是州城以頻喪四牧廢而不居物怪變異郡人信驗吉甫至發城門管籥翦荆榛而居之後人乃安令狐楚為山南西道莭度未終之前三日猶賦詩自若雖有疾諸子進藥未嘗入口曰吾之修短吾知之矣李聽為邠寧莭度邠州大㕔相傳不可葺脩以至隳壊聽到鎮輙新之卒無他後唐趙鳳以末帝清泰初自邢州莭度召還授太子太保既而病足不能朝謁疾篤自為著筮卦成投蓍而歎曰吾家世無五十者而復窮賤吾年五十為将相豈有遐夀哉數日而卒李敬義徳裕之孫幼随父貶連州後遇赦得還雒陽居平泉別墅自言未冠時為浙東從事遇術人卓道士謂之曰子自此四十三年方大遇繇是無心仕進後至河東留守判官工部尚書晉崔税父涿為刑部郎中有疾謂親黨曰死生有命無以醫為也税侍之衣不觧𢃄有賓至必拜泣告於門外請方便勸其進藥涿終不從王建立鎮潞州逾月疾作有大星墜于府署神氣不撓召賓介竹岳草遺章陳諫諷之意鄭雲叟隠居嵩山一旦卧病俾弟子召友人羅隠之與李道殷曰吾将訣矣弟子曰先生嘗無疾何若此也雲叟曰屈伸形兆四時之常道也風蒸燥濕四時之常徳也隂陽流轉四時之常氣也井營經合四時之常主也木之為疾也瘁火之為疾也温癘土之為疾也痁疥金之為疾也滑水之為疾也急大化無私弱者罹之居身無身之事庶㡬乎免矣非神仙而處也得斯而繇謂之考終命箕子以為福復何恨也言終而卒年七十四運命老子曰命不可變仲尼曰其如命何故聖人之罕言君子所以安之者也若夫窮達之數脩短之運豈有真宰持之者焉至乃徳叶人望才堪世用將遭竒遇而不克享功宣定䇿忠存官次宜膺顯報而不能及形朝廷之歎息増後來之慨慕斯因命與時戾事與願乖非可以究其所繇者已漢李廣與從弟蔡俱為郎事文帝景帝時蔡積功至二千石武帝元朔中為輕車將軍從大將軍撃右賢王有功中率封為樂安侯元狩二年代公孫𢎞為丞相蔡為人在下中在下之中名聲出廣下逺甚然廣不得爵邑官不過九卿廣之軍吏及士卒或取封侯韓安國為御史大夫五年丞相田蚡夢安國行丞相事引墮車蹇為天子導引而墮車跛蹇也帝欲用安國為丞相使使視蹇甚乃更以平棘侯薛澤為丞相安國病免壼遂其人深中篤行君子官至詹事武帝方欲倚以為相㑹其病卒王駿為御史大夫六嵗病卒翟方進代駿為大夫數月薛宣免遂代為丞相衆人為駿恨不得封侯韋安世累歷郡守大鴻臚長樂衛尉朝廷稱有宰相之器㑹其病終霍去病子嬗字子侯武帝愛之幸其壯而將之為奉車都尉從封泰山而薨無子國除後漢張堪為漁陽太守光武嘗召見諸郡計吏問前後守令能否蜀郡計椽樊顯進曰漁陽太守張堪昔在蜀漢仁以惠下威能討姦帝聞良乆歎息方徵堪㑹病卒張充司徒酺從祖父也少嘗與光武同學光武即位求充充已死牟紆以隠居教授門生千人章帝聞而徵之欲以為博士於道物故崔駰字亭伯安平人少游太學與班固傅毅齊名嘗以典籍為業未遑仕進之事嘗作四廵頌以稱羙漢徳辭甚典羙章帝雅好文章自見駰頌後嘗嗟嘆之謂侍中竇憲曰卿寧知崔駰乎對曰班固數為臣説之然未見也帝曰公愛班固而忽崔駰此葉公之好龍也試請見之駰因此候憲憲屣履迎門大笑謂駰曰亭伯吾受詔交公公何得薄哉遂揖入為上客居無㡬何帝幸憲第時駰適在憲所帝聞而欲召見之憲諫以為不宜與白衣㑹帝悟曰吾能令駰朝夕在傍何必於此適欲官之㑹帝厭世鄭安世為未央廐令安帝延光中廢太子為濟隂王即順帝也安世與太常桓馬太僕来歴等共正議諫諍及順帝立安世已卒追賜錢帛以子亮為郎虞詡為尚書令以公事去官朝廷思其忠復徵之㑹卒應奉為司𨽻校尉黨事起以疾自退諸公多薦舉㑹病卒魏張承以丞相㕘軍祭酒領趙郡太守太祖將西征徵承叅軍事至長安病卒賈洪以儒術知名為白馬王相楚王彪初封白馬王病亡亡時年五十餘時人為之恨仕不至二千石楊阜為武都太守文帝問侍中劉曄等武都太守何如人也皆稱阜有公輔之莭未及用㑹帝厭世吳丁賢字孝連守始平長為人精微潔淨門無雜賓大帝深貴待之未及擢用㑹病卒甚見痛惜顧徽為輔義都尉使曹公還奏稱㫖拜巴東太守欲大用之㑹病卒太史慈字子義漢末以孫策有江東乃奔豫章後神亭戰敗為策所得即署門下督及大帝嗣立遂委南方之事及卒年四十一臨亡歎息曰丈夫生世當𢃄七尺之劒以升天子之階今所志未從奈何而死乎權甚悼惜之晉盧浮字子雲欽子也起家太子舎人病疽截手遂廢朝廷器重之就家以為國子博士遷祭酒秘書監皆不就晉諸公贊曰張華慱識多聞無物不知浮髙朗經慱自羙於華庾衮字叔襃頴史太守辟為功曹不就聞恵帝遷長安乃與鄉人登于大頭山而田於其下年榖未熟食木實餌石蘂同保安之有終焉之志及將收穫命子怞音籌與之下山中塗目眩瞀墜崖而卒同保赴哭曰天乎獨不可舎我賢乎時人傷之曰庾賢絶塵避地超然逺迹固窮安陋木食山棲不與世同榮不與人爭利不免遭命悲夫丁紹為冀州刺史自以為才足為物雄當官蒞政每事克舉視天下之事若運於掌握遂慨然有董正四海之志矣是時王浚盛於幽州荀晞盛於青州然紹視二人蔑如也懐帝永嘉三年暴疾而卒臨終歎曰此乃天亡冀州豈吾命哉陸納為尚書令恪勤貞固終始不渝尋除左光祿大夫開府儀同三司未拜而卒即以為贈習鑿齒襄陽人為榮陽太守以脚疾遂廢于里巷及襄陽䧟於符堅輿而致焉與語大悦之俄以疾歸襄陽尋而襄陽反正朝廷欲徵鑿齒使典國史㑹卒不果桓豁字朗子彛之子也孝武太元初為征西大將軍鎮襄陽豁時譽雖不及弟冲而甚有器度但遇强㓂故功業不就焉宋羊𤣥保為吴郡太守不營財利家世儉薄太祖嘗曰人仕宦非唯須才然亦須運命每有好官缺我未嘗不先憶羊𤣥保何長瑜為臨川王義慶記室叅軍斥為廣州曽城令義慶薨廬陵王紹鎮潯陽以長瑜為南中郎行叅軍掌書記之任行至板橋暴風溺死梁諸葛璩處身清正妻子不見喜温之色旦夕孜孜講誦不輟髙祖勑問太守王份份即具以實對未及徴用卒於家北齊王懐初仕魏為第一領民酋長神武義旗建為大都督從討爾朱兆等累戰有功尋遇疾卒懐以武藝勲誠為神武所知志力未伸論者惜其不遂孝昭皇建初配饗武廟庭高整信宣城公叡之子也歴散騎常侍儀同三司好學有行簡少年時因獵墜馬傷腰脚卒不能行起終於長安隋劉炫字光伯河間景城人瀛州刺史李繪置禮曹從事武帝時與著作郎王劭同修國史俄直門下省兼於内史省考定羣言炫遍直三省竟不得官至煬帝時除太學博士歲餘以品卑去任於時盗賊蜂起榖食踴貴經籍道息教授不行炫與妻子相去百里聲聞斷絶欝欝不得志時在郡城糧餉斷絶其門人多随賊哀炫窮乏詣郡城下索炫郡中乃出炫與之炫官為賊所將未幾賊為官軍所破炫飢餓無依復投縣城長吏意炫與賊相知恐為後變閉門不納之時夜氷寒因此凍餒而死侯白為儒林郎通脱不持威儀好為俳諧雜説人多愛狎之髙祖聞其名召與語甚悦之令於秘書修國史每将擢之髙祖輒曰侯白不勝官而止後給五品食月終而死時人傷其薄命薛濬開皇初為考功侍郎初為童子時與宗中諸児游戯于澗濱見一黄蛇有角及足召羣児共視了無見者濬以為不祥歸而憂悴母逼而問之濬以實對時有胡僧詣宅乞食濬母怖而告之僧曰此乃児之吉應且是児也早有名位然夀不過六七爾言終而出忽然不見時咸異之既而終於四十二六七之言足驗矣周法尚為㑹寧太守煬帝遼東之役以舟師頻戰有功明年復臨滄海在軍疾甚謂長史崔君肅曰吾再臨滄海未能利渉時不我與將辭人世立志不果命也如何言畢而終唐劉允濟為青州刺史中宗景龍四年徵為修文學士錄才行至道病卒深為時人惜之崔敬嗣好樗蒱飲酒則天初為房州刺史中宗為廬江王安置在州官吏多無禮敬嗣獨申禮敬又供給豐瞻中宗嘗徳之及登位有益州長史崔敬嗣既同姓名每進擬官皆御筆超拜之者數四後引與語知誤訪敬嗣已卒乃遣中書令韋安石授其子官第五琦自宰相左遷後歴饒湖二州入為太子賓客東都留守代宗以其材將復任用召還京師信宿而卒姚况為涇原判官知州事建中四年徳宗幸奉天况發甲仗器械車百餘輛送至行在及京師平拜太子中舎人况性簡退未嘗言其功旱蝗之歲俸寡不自給竟以餒終崔邠貞元中為吏部侍郎温裕沈密尤敦清儉帝亦器重之裴垍将引為相邠病耳難於承答事竟寢陸贄為相為裴延齡所搆貶忠州别駕順宗初即位與鄭餘慶陽城同徴詔始下而城贄皆卒武元衡為相憲宗元和十年六月為盗所害年五十八始元衡與李吉甫齊年又同日為宰相及出鎮分領楊益及吉甫既再入元衡亦還吉甫前一年以元衡生日卒元衡後一年以吉甫生日卒吉凶之數若符㑹然衛次公元和中為尚書左丞恩顧頗厚帝方用為相已命翰林學士王涯草詔時淮夷宿兵歲乆次公累䟽請罷㑹有㨗書至命相詔方出帝遂令追之遂出鎮淮南明年受代歸朝道疾卒武儒衡為中書舎人丁母憂免喪除兵部侍郎穆宗將用為相復丁所生母憂病卒温造自興元節度使詔還拜御史大夫文宗素欲大用俄而嬰疾不能朝改禮部尚書郭承嘏為刑部侍郎時朔望對刑法官文宗每從容顧問恩禮甚厚未及大用而卒後唐盧汝弼簡求之子唐昭宗遷雒衣冠道喪遂渡河繇上黨歸汝弼富文才美禮翰人士傾慕太祖以為節度副使入制奏署多成其手洎帝平定趙魏汝弼每請謁迎勞必陳説天命顒俟中興帝亦以宰輔期之建國前卒於晉晉梁文矩初仕後唐明宗霸府每懐公輔之望時髙祖自外鎮入覲嘗薦於明宗曰梁文矩早事陛下甚有勤勞未升相府外論慊之明宗曰久忘此人吾之過也尋有旨降命㑹外憂而止張希崇仕後唐為靈武節度使希崇厭其雜俗頻表請覲末帝詔許之至闕未乆朝廷以安邉有聞議内地處之改邠州莭度使及髙祖入雒與契丹方有要盟慮其必為所取乃復除靈武希崇歎曰我應合老於邉城職分無所逃也因欝欝不得志久而成疾卒於任時年五十二孔英舉進士行醜而才薄宰相桑維翰素知其為人深惡之及崔税知貢舉將鎖院禮辭於維翰維翰性語簡止謂税曰孔英来也盖慮税誤放英及第故言其姓名以阨之也税性純直不復禀覆因黙記之時英又自稱是宣尼之後每凌鑠於文塲税不得已遂放英登第榜出人皆諠誚維翰聞之舉手自抑其口者數四盖悔言也周李建崇在漢朝為右衛大將軍年七十神氣不衰猶能飲饌建崇始自代北事唐太祖至是僅四十餘年前後所掌兵麾下部曲多至莭鉞零落殆盡唯建崇位不及藩屏而温飽少疾以至髙年為上將軍知亡日先儒有言曰死生有命易曰樂天知命故不憂盖原始要終必歸於㝠數窮神知變則繇乎先覺中古而下方策攸紀乃有自天生徳間世挺秀人倫仰其師表搢紳服其名譽見於未兆言必有信或形於夢寐之際或見於變怪之始或剋期於星歴或取信於易象或象其形而知其分或摛乎辭而忘其終以至罹兵革之禍安然而不懼成蟬蜕之説邈爾而莫究者亦徃徃而有焉里析為鄭大夫鄭之未災也里析告子産曰將有大祥祥變異之氣民震動國幾亡吾身冺焉弗良及也言將先死災國遷其可乎子産曰雖可吾不足以定遷矣子産知天災不可逃非遷所免故託以知不足及火魯昭公十八年五月里析死矣孔子蚤作作起也負手曵杖逍遥於門欲人怪也歌曰泰山其頺乎泰山衆山所仰梁木其壊乎梁木衆木所放哲人其萎乎哲人亦衆人所仰放也以上二句喻之萎病也詩云無木不萎既歌而入當户而坐蚤坐亟見人也子貢聞之曰泰山其頺則吾將安仰梁木其壊哲人其萎則吾將安放夫子殆將病也覺孔子歌意殆幾也遂趨而入夫子曰賜爾来何遲也坐則望之夏后氏殯於東階之上則猶在阼也殷人殯於兩楹之間則與賓主夹之也周人殯於西階之上則猶賓之也以三王之禮占已夢而丘也殷人也予疇昔之夜夢坐奠於兩楹之間是夢坐兩楹之間而見饋食也言奠者以為凶象疇發聲也昔猶前也夫明王不興而天下其孰能宗予予殆將死也孰誰也宗尊也兩楹之間南面鄉明人君聽治正坐之處今無明王誰能尊我以為人君乎是我殷家奠殯之象以此自知將死也盖寢疾七日而沒明聖人知命後漢任文公巴郡䦘中人公孫述時武擔石折武擔山在益州其石今名為石笋文公曰噫西州智士死我乃當之自是嘗㑹聚子孫設酒食後三日果卒折像廣漢雒人能通京氏易自知亡日召賓客九族飲食辭訣忽然而終計子勲不知何郡縣人皆謂數百歲行来於人間一旦忽言日中當死主人與之葛衣子勲服而正寢至日中果死郭鳳勃海人好圖䜟善説災異吉凶占應先自知死期豫令子市棺殮具至其日而終謝夷吾㑹稽山隂人學風角占候為冀州刺史左轉下邳令豫尅死日如期果卒矯慎扶風茂陵人少好黄老隠遯山谷年七十餘竟不肯娶後忽歸家自言死日及期果卒鄭𤣥字康成徴大司農不起嘗夢孔子告之曰起起今年歲在辰来年歲在已北齊劉畫高才不遇傳論𤣥曰辰為龍已為蛇歲在龍蛇賢人嗟𤣥以䜟合之盖謂此也既寤以䜟合之知命當終有頃寢疾時袁紹與曹公相拒於官渡令其子譚遣使逼𤣥随軍不得已載病到元城疾篤不進其年六月卒魏管輅字公明官至少府丞明周易弟辰謂輅曰大將軍待君意厚兾當冨貴乎輅長歎曰天與我才名不與我年夀恐四十七八間不見女嫁児娶婦也辰問其故輅曰吾額上無生骨眼中無守精鼻無梁柱脚無天根背無三甲腹無三壬此皆不夀之驗及卒果年四十八蜀譙周嘗語陳夀曰昔孔子七十二劉向揚雄七十一沒今吾年過七十庶慕孔子遺風可與劉揚同軌恐不出後歲必使長逝不復相見矣泰始六年秋為散騎常侍疾篤不拜至冬卒吴陸績字公紀為欝林太守豫知亡日乃為辭曰有漢志士吳郡陸績㓜敦詩書長玩禮易受命南征遘疾遇厄遭命不幸嗚呼悲隔吳範以術數事大帝大帝甚禮之為騎都尉領太史令範先知其死日謂曰陛下某日當䘮軍師帝曰吾無軍師焉得喪之範曰陛下出軍臨敵須臣言而後行臣乃陛下之軍師也至其日果卒趙達治九宫一筭之術閒居無為引筭自較乃歎曰吾筭訖盡某年月日其終矣達妻數見達效聞而哭之達欲弭妻意乃更歩筭言向者謬誤矣尚未也後如期死孫權聞達有書求之不得乃錄問其女及發達棺無所得法術絶焉晉淳于智濟北盧人能易筮自言短命曰辛亥歲天下有事當有巫醫挟道術者死吾守易義以行之猶當應此乎武帝大康末為司馬督坐楊駿誅郭璞字景純為王敦大將軍記室每言殺我者山宗後果有姓崇者構璞於敦將舉兵又使璞筮璞曰無成敦因疑璞之勸温嶠庾亮又聞卦凶乃問璞曰卿更筮吾夀㡬何答曰思向卦明公起事必禍不乆若住武昌夀不可測敦大怒曰卿夀幾何曰命盡今日日中敦怒收璞詣南崗斬之郭文字文舉曠達不仕臨安令萬寵迎置縣中病甚寵問曰先生復可得幾日文三舉手果以十五日終卜珝字子玉少好讀易謂郭璞曰吾大厄在四十一位為卿相當受禍耳不爾者亦為猛獸所害後為劉聦平北將軍將行謂其妹曰此行也死自吾分及攻晉陽為劉琨所敗珝卒先奔為其元帥所殺前秦張忠隠于泰山苻堅徴任尚父不就堅以安車送之行達南山歎曰我東嶽道士沒於西嶽命也奈何行五十里及關死南齊盧度有道術逆知死年月與親友别永明末以夀終顧歡吳郡人有高尚之志好黄老明術數元嘉三十年自知將終賦詩言志云精氣因天行遊䰟随物化剋死日卒於剡山邵碩始康人為道士元徽二年忽告人云吾命終因卧而死後人見碩在荆州上明以一隻故履縳左腿而行甚疾遂不知所之趙僧巖北海人寥廓無常人不能測與劉善明友善明為青州欲舉為秀才大驚拂衣而去後忽為沙門棲遲山谷嘗以一壺自随一旦謂弟子曰吾今夕當死壺中大錢一千以通九泉之路蠟燭一挺以炤七尺之尸至夜而亡時人以為知命梁阮孝緒字士宗髙尚不仕髙祖大同三年正月孝緒自筮卦吾夀與劉著作同年及劉香卒孝緒曰劉侯逝矣吾其㡬何其年十月卒裴子野為鴻臚卿以大通二年卒官年六十二先是子野自尅死期不過戊戌歲是年自省移病謂同官劉之亨曰吾其逝矣果卒劉歊字士光不娶不仕未死之春有人為其庭中栽柿敲謂兄子曰吾不見此實爾其勿言至秋而亡人以為知命後魏裴宣為益州刺史宣素明隂陽之書自始患便知不起因自剋亡日果如其言唐王績字無功絳州龍門人太宗貞觀中卒臨終自剋死日兼自為墓誌袁天罡益州人尤工相人貞觀中申國公髙士㢘嘗謂曰君之祿夀可至何所對曰今年四月死矣果如其言衛大經篤學善易嘗豫筮死日先鑿墓自為誌文如筮而終周賈緯自給事中出為青州行軍司馬妻以緯左遷駭惋傷離病留京師緯書候之曰勉醫藥来春與子同歸獲鹿太祖廣順二年春緯死訃至妻亦一慟而卒果雙柩北歸聞者歎之册府元龜卷八百九十五
