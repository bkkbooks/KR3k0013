body:
  text: 册府元龜卷六百五十九宋王欽若等撰奉使部敏辯古者誦詩三百可以專對奉命出境未嘗受辭盖以其周知物情可利社稷之意也若夫勢均跨據飾智相髙義有睦鄰交修盟好徃來行李靡間於干戈申答情禮備述於樽爼務全國體爰騁口才應機而言罔俟終日或徴古義而求勝或引時事以為優緩頰抵掌殆乎燥吻雖論難之鋒起必逆折而響從至于譚戱之間猶存去就之分又乃宣威殊俗漸以身教昭示忠信指陳禍福革其倔强之心誘以嚮慕之道茍非大雅端方博逹慷慨之士或取辱焉盖使乎之任斯為難矣漢隋何為謁者時漢王與楚大戰彭城不利出梁地至虞今宋州虞城縣是也謂左右曰如彼等者無足與計天下事者謁者隋何進曰不審陛下所謂漢王曰孰能為我使淮南使之發兵背楚留項王於齊數月我之取天下可以萬全何曰臣請使之乃與二十人俱使淮南至太宰主之淮南太宰作内主三日不得見何因說太宰曰王之不見何必以楚為强以漢為弱此臣之所為使此事正是臣所為來欲言之使何得見言之而是邪是大王所欲聞也言之而非邪使何等二十人伏斧質淮南市質鍖也言伏於鍖上而斧斬之以明背漢而與楚也太宰迺言之王王見之隋何曰漢王使使臣敬進書大王御者竊怪大王與楚何親也淮南王曰寡人北鄉而臣事之何曰大王與項王俱列為諸侯北向而臣事之必以楚為强可以託國也項王伐齊身負版築牌墦版也築杵也以為士卒先大王宜悉盡也淮南之衆身自将為楚軍前鋒今乃發四千人以助楚夫北面而臣事人者固若是乎夫漢王戰於彭城項王未出齊也大王宜掃淮南之衆日夜㑹戰彭城下掃者為盡舉之如掃地然也今撫萬人之衆無一人渡淮者隂拱而觀其孰勝歛手曰拱言不動揺坐觀成敗夫託國於人者固若是乎大王提空名以鄉楚提舉也而欲厚自託臣竊為大王不取也然大王不背楚者以漢為弱也夫楚兵雖强天下負之以不義之名負加也加于身上若主被也以其背盟約而殺義帝也然而楚王特以戰勝自强漢王收諸侯還守成臯滎陽下蜀漢之粟深溝壁壘分卒守徼乗塞楚人還兵間以梁地梁在楚漢之中深入敵國八九百里羽從齊還當經梁地八九百里乃得羽地也欲戰則不得攻城則力不能老弱轉糧千里之外楚兵至滎陽成臯漢堅守而不動進則不得攻退則不能解故楚兵不足罷也不足者言易也使楚兵勝漢則諸侯自危懼而相救夫楚之强適足以致天下之兵耳故楚不如漢其勢易見也今大王不與萬全之漢而自託於危亡之楚臣竊為大王惑之臣非以淮南之兵足以亡楚也夫大王發兵而背楚項王必留留數月漢之取天下可以萬全臣請與大王仗劔而歸漢王漢王必裂地而分大王又况淮南必大王有也故漢王敬使使臣進愚計願大王之留意也淮南王曰請奉命陰許叛楚與漢未敢泄楚使者在在淮南王所也方急責布發兵隋何直入曰九江王已歸漢楚何以得發兵布愕然楚使者起何因說布曰事已構構結也言背楚之事已結成也獨可遂殺楚使毋使歸而疾走漢并力布曰如使者教因起兵而攻楚陸賈以客從髙祖定天下名有口辯時人皆謂其口辯居左右嘗使諸侯時中國初定尉佗平南越因王之髙祖使賈賜佗印為南越王賈至尉佗魋結箕踞見賈魋音椎結讀曰髻椎䯻者一椎之䯻其形如椎箕踞謂伸其兩脚而坐亦曰箕踞其形似箕賈因說佗曰足下中國人親戚昆弟墳墓在真定今足下反天性棄冠帯背父母之歸無骨肉之恩是反天性也欲以區區之越與天子抗衡為敵國區區小貎禍且及身矣夫秦失其正正亦政也諸侯豪傑並起唯漢王先入闗據咸陽項籍背約自立為西楚覇王諸侯皆屬可謂至强矣然漢王起巴蜀鞭笞天下刼諸侯遂誅項羽五年之間海内平定此非人力天之所建也天子聞君王王南越而不助天下誅暴逆将相欲移兵而誅王天子憐百姓新勞苦且休之遣臣授君王印剖符通使君王宜郊迎北面稱臣郊迎謂出郊而迎乃欲以新造未集之越集猶成也屈彊於此屈强謂不柔服也漢誠聞之掘燒君王先人塜墓夷種宗族夷平也謂平除其種族使一偏將將十萬衆臨越即越殺王降漢如反覆手耳言其易于是佗乃蹶然起生蹶坐驚起之貎也謝賈曰居蠻夷中久殊失禮儀後漢陳遵初為更始大司馬䕶軍與歸徳侯劉颯俱使匈奴單于欲脅詘遵遵陳利害為言曲直單于大竒之遣還蜀費褘先主時為昭信挍尉使吴孫權性既滑稽嘲啁無方諸葛恪羊衜等才博果辯論難鋒至褘辭順義篤據理以答終不能屈權每别酌好酒以飲褘視其已醉然後問以國事并論當世之務辭難累至褘辭以醉退而撰次所問事事條答無所遺失權甚器之乃以手中嘗所執寶刀贈之禕答曰臣以不才何以堪明命然刀以討不庭禁暴亂者也但願大王勉建功業同奨漢室臣雖闇弱終不負東顧董恢字休緒為宣信中郎將副費褘使吴孫權常大醉問褘曰楊儀魏延牧竪小人也雖常有鳴吠之益於時務然既已任之勢不得輕若一朝無諸葛亮必為禍亂矣諸君憒憒曾不防慮于此豈所謂貽厥孫謀乎褘愕然四顧不能即答恢目褘曰可速言儀延之不恊起于私忿耳而無黥韓難御之心也今方掃除彊賊混一函夏功以才成業繇才廣若捨此不任防其後患是猶備有風波而逆廢舟楫非長計也權大笑樂諸葛亮聞之以為知言還未滿三日辟為丞相府屬伊籍字機伯東使于吴孫權聞其才辯欲逆折以辭籍適人拜權曰事無道之君勞乎籍即對曰一拜一起未足為勞籍之機㨗類皆如此權甚異之鄧芝為尚書使吴孫權謂芝曰若天下太平二主分治不亦樂乎芝對曰夫天無二日土無二王如并魏之後大王未深識天命者也君各茂其徳臣各盡其忠將提枹皷則戰爭方始耳權大笑曰君之誠欵乃當爾邪宗預字徳豔為諸葛亮丞相叅軍亮卒吴慮魏或乗衰取蜀增巴丘守兵萬人蜀聞之亦益永安之守以防非常預使吴孫權問預曰東之與西譬猶一家而聞西更増白帝之守何也預對曰臣以為東益巴丘之戍西増白帝之守皆事勢宜然俱不足以相問也權大笑嘉其抗直甚愛待之見敬亞於鄧芝費褘後為屯騎挍尉復東聘吴權捉預手涕泣而别曰君每衘命結二國之好今君年長孤亦衰老恐不復相見遺預大珠一斛預臨别謂孫權曰蜀土僻小雖云鄰國東西相頼吴不可無蜀蜀不可無吴君臣慿恃唯陛下重垂神慮又自說年老多病恐不復得奉聖顔李宻字令伯奉使聘吴吴主問蜀馬多少對曰官用有餘人間自足吴主與羣臣汎論道義謂願為人弟宻曰願為人兄吴主曰何以為兄宻曰為兄供飬之日長吴主及羣臣皆稱善吴鄭泉使蜀先主問曰吴王何以不答吾書得無以吾正名不宜乎泉曰曹操父子陵轢漢室終奪其位殿下託為宗室有維城之責不荷戈執殳為海内率先而於是自名未合天下之議是以寡君未復書耳劉甚慙恧陳化為郎中令使魏魏文帝因酒酣嘲問曰吴魏峙立誰將平一海内者乎化對曰易稱帝出乎震加聞先哲知命舊說紫葢黄旗運在東南帝曰昔文王以西伯王天下豈復在東乎化曰周之初基太伯在東是以文王能興于西帝笑無以難心竒其辭使畢當還禮送甚厚大帝以化奉命光國拜犍為太守置官屬沈珩為西曺掾文帝以珩有智謀能専對使至魏魏文帝問曰吴嫌魏東向乎珩曰不嫌曰何以曰信恃舊盟言歸于好是以不嫌若魏渝盟自有豫備又問聞太子當來寧然乎珩曰臣在東朝朝不坐宴不與若此之議無所聞也文帝善之乃引珩自近譚語終日珩隨事嚮應無所屈服趙咨為中大夫使魏文帝問曰吴王何等主也咨對曰聰明仁智䧺畧之主也帝問其状咨曰納魯肅於凢品是其聰也㧞呂蒙於行陣是其明也獲于禁而不害是其仁也取荆州而兵不血刄是其智也據三州虎視於天下是其䧺也屈身於陛下是其畧也文帝善之又嘲咨曰吴王頗知學乎咨曰吴王浮江萬艘帯甲百萬任賢使能志存經畧雖有餘閑博覽書傳厯史籍採竒異不效書生尋章摘句而已帝曰吴可征不咨對曰大國有征伐之兵小國有備豫之固又曰吴難魏不咨曰帶甲百萬江漢為池何難之有又曰吴如大夫者㡬人咨曰聰明特逹者八九十人如臣之軰車載斗量不可勝數咨頻載使魏北人敬異大帝聞而嘉之拜騎都尉紀陟為光禄大夫後主遣陟與中郎將宏璆如魏陟璆入境而問諱入國而問俗夀春將王布示之馬射既而問之曰吴之君子亦能斯乎陟曰此軍人騎士肄業所及士大夫君子未有為之者矣布大慙既至魏帝見之使儐問曰來時吴王何如陟對曰來時皇帝臨軒百僚陪位御膳無恙晋文帝饗之百僚畢㑹使儐者告曰某者安樂公也某者匈奴單于也陟曰西主失土為君王所禮位同三代莫不感義匈奴邉塞難覊之國君王懷之親在坐席此誠威恩逺著又問吴之戍備㡬何對曰自江都五千七百里又問曰道里甚逺難為堅固對曰彊界雖逺而其險要必爭之地不過數四猶人雖有八尺之軀靡不受患其䕶風寒亦數處耳文帝善之厚為之禮張儼使晉車騎將軍賈充尚書令裴秀侍中荀朂等欲傲以所不知而不能屈晉張淳愍帝時為凉州牧張駿治中從事初駿遣傅頴假道于蜀通表京師李䧺弗許駿又遣淳稱藩于蜀託以假道焉䧺大恱䧺又有憾於南氐楊初淳因說曰南氐無状屢為邉害宜先討百頃次平上邽二國并勢席卷三秦東清許雒掃氛燕趙拯二帝梓宫於平陽反皇輿於雒邑此英覇之舉千載一時寡君所以遣下臣冐險通誠不逺萬里者以陛下義聲逺播必能愍寡君勤王之志天下之善一也惟陛下圖之䧺謂淳曰貴主英名盖世土險兵盛何不稱帝自娱一方淳曰寡君以乃祖乃父世濟忠良未能雪先人之大耻解衆庶之倒懸日昃忘食枕戈待旦以瑯琊中興江東故萬里翼戴將成桓文之事何言自娱邪䧺有慙色曰我乃祖乃父亦是晉臣往與六郡避難此都為同盟所推遂有今日瑯琊若能中興大晉於中州者亦當率衆輔之淳還至龍鶴募兵通表後皆逹京師朝廷嘉之俞歸為侍御史使凉州拜張重華為䕶𦍑挍尉凉州刺史假節歸至凉州重華方謀為凉王不肯受詔使親信人沈猛謂歸曰我家主公奕世忠於晉室而不如鮮卑矣臺加慕容皝燕王今甫授州主大將軍何以嘉勸有功忠義之臣乎明臺今宜移河右共勸州主為凉王大夫出使茍利社稷専之可也歸對曰王者之制異姓不得稱王九州之内重爵不得過公漢髙一時王異姓尋皆誅㓕盖權時之宜非舊體也故王陵曰非劉氏而王天下共伐之至于戎狄不從此例春秋時吴楚稱王而諸侯不以為非者盖蠻狄畜之也假令齊魯稱王諸侯豈不伐之故聖上以貴公忠賢是以爵以上公位以方伯鮮卑北狄豈足為比哉子失問也曰吾又聞之有殊勲絶世者亦有不世之賞若今便以貴公為王者設貴公以河右之衆南平巴蜀東掃趙魏修復舊都以迎天子復以何爵何位可以加賞幸三思之猛具宣歸言重華遂止凉州牧張駿遣叅軍王隲聘于前趙劉曜曜謂之曰貴州必欲追蹤竇融欵誠和好卿能保之乎隲曰不能曜侍中徐邈曰君來和同而云不能何也隲曰齊桓貫澤之盟憂心兢兢諸侯不召而自至葵丘之㑹驕而矜誕叛者九國趙國之化常如今日可也若政教陵遲尚未能察邇者之變况鄙州乎曜顧謂左右曰此凉州髙士使乎得人禮而遣之前凉韓博為張天錫從事中郎與奮節将軍康妙奉表并送盟文于晉大司馬桓温博有口才温甚稱之嘗大㑹温使司馬刁彛嘲之彛謂博曰君是韓盧後邪博曰卿是韓盧後温笑曰刁以君姓韓故相問焉他自姓刁那得韓盧後邪博曰明公脫未之思短尾者則為刁也一坐推歎焉前秦閻負梁殊俱為符生征東符栁叅軍生聞凉州張祚見殺元靚㓜冲命負殊使凉州以書喻之負殊至姑臧元靚年㓜冲不見殊等其凉州牧張瓘謂負殊曰孤之本朝世執忠莭逺宗大晉臣無境外之交君等何為而至負殊曰晉王以鄰藩義好有自來矣雖擁阻山河然風通道㑹不欲使羊陸二公獨美於前主上以欽明紹統八表宅心光被四海格于天地晉王思與張王齊曜大明交玉帛之好兼與君公同金蘭之契是以不逺而來有何怪乎瓘曰羊陸一時之事亦非純臣之義也本朝六世重光固忠不二若與符征東交玊帛之好者便是上違先公純誠雅志下乖河右遵奉之情負殊曰昔㣲子去殷項伯歸漢雖背君違親前史美其先覺亡晉之餘逺逃江㑹天命去之淪絶已久故尊先王翻然改圖北面二趙盖神筭無方鑒機而作君公若欲稱制河西衆旅非秦之敵如欲宗歸遺晉深乖先君雅㫖孰若逺蹤竇融附漢之規近述先王歸趙之事垂祚無窮永享遐祉乎瓘曰中州無信好食誓言往與石氏通好旋見冦襲中國之風誡在昔日不足復論通和之事也負殊曰三王異政五帝殊風趙多姦詐秦以義信豈可同年而語哉張先楊初皆擅兵一方不供王貢先帝命将擒之宥其難恕之罪加以爵封之榮今上道合二儀慈𢎞山海信符隂陽御物無際不可以二趙相况也瓘曰秦若兵彊化盛自可先取江南天下自然盡為秦有何辱征東之命負殊曰先帝以大聖神武開構鴻基彊燕納欵八州順軌主上欽明道必隆世慨徽號擁于西河正朔未加吴㑹以吴必湏兵凉可以義故遣行人先申大好如君公不能蹈機而發者正可緩江南數年之命迴師西斾恐凉州弗可保也瓘曰我跨據三州帶甲十萬西包崑域東阻大河伐人有餘而况自固秦何能為患負殊曰貴州險塞孰若崤函五郡之衆何如秦雍張琚杜洪因趙之成資據天阻之固䇿三秦之銳藉陸海之饒勁士風集驍騎如雲自謂天下可平闗中可固先帝神矛一指望旗氷解人詠來蘇不覺易主燕雖虎視闗東猶以地勢之義逆順之理北靣稱藩貢不踰月致肅慎楛矢通九夷之珍單于屈膝名王内附控弦之士百有餘萬皷行而濟西河者君公何以抗之盍追遵先王臣趙故事世享大美為秦之西藩瓘曰然秦之徳義加於天下江南何以不賔負殊曰文身之俗負阻江山道汚先叛化盛後賓自古而然豈但今也故詩云蠢爾蠻荆大邦為仇言其不可以徳義懷也瓘曰古秦據漢舊都地兼将相文武輔臣領袖一時者誰也負殊曰皇室懿藩忠若公旦者則大司馬武都王安征東大将軍晉王栁文武兼才神器秀㧞入可允釐百工出能折衝萬里者衛大将軍廣平王黄眉後将軍清河王法龍驤将軍東海王堅之兄弟其耆年碩徳徳侔尚父者則太師録尚書事廣寗公魚遵其清素剛嚴骨鯁貞亮則左光祿大夫彊平金紫光祿程肱牛夷博聞强識探賾索幽則中書監胡文中書令王魚黄門侍郎李柔䧺毅厚重權智無方則左衛将軍李威右衛将軍符雅才識明逹令行禁止則特進領御史中丞梁平老特進光禄大夫强注侍中尚書吕婆樓文史富贍欝為文宗則尚書右僕射董榮秘書監王颺著作郎梁讜驍勇多權畧攻必取戰必勝闗張之流萬人之敵者則前将軍新興王飛建莭将軍鄧𦍑立忠将軍彭越安逺将軍范俱難建武将軍徐盛常伯納言卿挍牧守則人皆文武莫非才賢其餘懷經世之才藴佐時之畧守南山之操遂而不奪者王猛朱彤之倫相望于嵓谷濟濟多士焉可罄言姚襄張平一時之傑各擁衆數萬狼顧偏方皆委忠獻欵請為臣妾小不事大春秋所誅惟君公圖之瓘歎曰此事决之主上非身所了負殊曰凉王雖天縱英睿然尚㓜冲君公居伊霍之任安危所係見機之義實在君公瓘新輔政河西所在兵起懼秦師之至乃言於元靚遣使稱藩生因其所稱而授之後秦張構與梁裴為姚興使燉煌拜沮渠蒙遜鎮西大将軍沙州刺史西海侯時興亦拜秃髪傉檀為車騎将軍封廣武公蒙遜聞之不恱謂裴等曰傉檀上公之位而身為後者何也構對曰傉檀輕狡不仁欵誠未著聖朝所以加其重爵者褒其歸善即叙之義耳将軍忠貫白日勲髙一時當入諧鼎味翊贊帝室安可以不信待也聖朝爵必稱功官不越徳如尹緯姚晃佐命初基齊難徐雒元勲驍将並位纔二品爵止侯伯将軍何以先之乎竇融慇勤固讓不欲居故臣之右未解将軍忽有此問蒙遜曰朝廷何不即以張掖見封乃更逺封西海構曰盖欲廣大将軍之國耳蒙遜大恱乃受拜南凉麴梁明為秃髮利鹿孤記室監利鹿孤既紹兄位使梁明聘于叚業曰貴主先王創業啟運功髙先世宜為國之太祖有子何以不立梁明曰有子𦍑奴先王之命也業曰昔成王弱齡周召作宰漢昭八歳金霍夾輔雖嗣子㓜冲而二叔休明左提右挈不亦可乎梁明曰宋宣能以國讓春秋美之孫伯符委事仲謀終開有吴之業且兄終弟及殷湯之制也亦聖人之格言萬代之通式何必系已為是紹兄為非業曰美哉使乎之義也闗尚為傉檀叅軍姚興遣使拜傉檀為車騎将軍廣武公傉檀以興之盛又宻圖姑臧乃去其年號罷尚書丞郎官遣尚聘于興興謂尚曰車騎投誠獻欵為國藩屏擅興兵衆輒造大城為臣之道固若是乎尚曰王侯設險以自固先王之制也所以安人衛衆預備不虞車騎僻在遐藩宻邇勍冦南則逆𦍑未賓西則蒙遜䟦扈盖為國家重門之防不圖陛下忽以為嫌興笑曰卿言是也史暠為傉檀西曹從事時姚興署傉檀車騎将軍凉州刺史傉檀遣暠聘于興興謂暠曰車騎坐定凉州衣錦本國其徳我乎暠曰車騎積徳河西少播英問王威未接投誠萬里陛下官方任才量功授職彛倫之常何徳之有興曰朕不以州授車騎何從得之暠曰使河西雲擾呂氏顛狽者實繇車騎兄弟傾其根本陛下雖鴻羅遐被凉州猶在天網之外故征西以周召之重力屈姑臧齊難以王旅之盛勢挫張掖王尚孤城獨守外逼戎狄陛下不連兵十年殫竭中國凉州未易取也今以虚名假人自收大利乃知妙筭自天聖與道合雖云遷授盖亦時宜興恱其言拜騎都尉南燕韓範仕慕容超超母妻先在長安為後秦姚興所拘責超稱藩求太樂諸伎超因降尊號遣範使於興及至長安興謂範曰封愷前來燕王與朕抗禮及卿至也欵然而附為依春秋以小事大之義為當専以孝敬為母屈人也曰昔周爵五等公侯異品小大之禮因而生焉今陛下命世龍興光宅西秦本朝主上承祖宗遺烈定鼎東齊中分天曜南西並帝通聘結好義尚謙冲便至矜誕茍折行人殊似吴晉爭盟滕薛競長恐傷大秦堂堂之盛有損皇燕巍巍之美彼我俱失竊未安之興怒曰若如卿言便是非為大小而來範曰雖繇大小之義亦縁寡君純孝過于重華願陛下體敬親之道沛然垂愍興曰吾乆不見賈生自謂過之今不及矣于是為範設舊交之禮申叙平生謂範曰燕王在此朕亦見之風表乃可於機辨未也範曰大辯若訥聖人美之况爾日龍濳鳳戢和光同塵若使負日月而行則無繼天之業矣興笑曰可謂使乎延譽者也韓範承間逞說姚興大恱賜範千金許以超母妻還之時慕容凝自梁父奔于姚興言於興曰燕王稱藩本非推徳權為母屈耳古之帝王嘗興師徴質豈可虚還其母乎母若一還必不復臣也宜先制其送伎然後歸之興意乃變張華為慕容超僕射超以母在姚興所遣華與給事中宗王元入長安送太樂伎一百二十人於姚興興大恱延華入燕酒酣樂作興黄門侍郎尹雅謂華曰昔殷之将亡樂師歸周今皇秦道盛燕樂來庭興廢之兆見于此矣華曰自古帝王為道不同權譎之理㑹於成功故老子曰将欲取之必先與之今總章西入必由余東歸禍福之兆此其驗乎興怒曰昔齊楚競辯二國連師卿小國之臣何敢抗衡朝士華遜辭曰奉使之始實願交歡上國上國既遺小國之臣辱及寡君社稷臣亦何心而不仰酬興善之於是還超母妻宋張褘仕晉為瑯琊王郎中嘗使苻堅在陛下以手障額看堅堅問曰視天子不過衱衱交領也卿何慢朕答曰臣在南中聞長安氐為人主謂陛下頭上有角堅大笑南齊明僧暠初仕宋孝武大明中再使後魏于時新誅司空竟陵王誕孝武謂曰若問廣陵之事何以答之對曰周之管蔡漢之淮南帝大恱及至魏魏問曰卿䘖此命當縁上國無相踰者耶答曰聰明特逹舉袂成帷比屋之甿又無下僕晏子所謂㸔國善惡故再辱此庭司馬憲為殿中郎口辯有才地使魏見稱于北崔慶逺朱選之俱為豐城縣公遥昌征虜叅車海陵王建武二年後魏孝文攻夀春遣使呼城内人遥昌遣慶逺選之詣孝文慶逺曰旌盖飄颻逺渉淮泗風塵􅆭烈無乃勞止孝文曰六龍騰躍儵忽千里經途未逺不足為勞慶逺曰川境既殊逺勞軒駕屈完有言不虞君之渉吾地也何故孝文曰故當有故卿欲使我含瑕依違為欲指斥其事慶逺曰包荒之徳本施北政未承來議無所含瑕孝文曰朕本欲有言㑹卿來問齊主廢立有例不慶逺曰廢昏立明古今同揆中興克昌豈惟一代主上與先武帝非唯昆季有同魚水武皇臨終託以後事嗣孫荒迷廢為欝林功臣固請爰立明聖上逼太后之嚴令下迫羣臣之稽顙俯從億兆踐登皇極未審聖㫖獨何疑怪孝文曰聞卿此言殊解我心但哲婦傾城何足可用果如所言武帝子弟今皆何在慶逺曰七王同惡皆伏管蔡之誅其餘列藩二十餘國内列清階外典方牧哲婦之戒古人所惑然十亂盈朝實惟文母孝文曰如我聞靡有孑遺卿言美而乖寔未足全信孝文又曰雲羅所掩六合宜一故徃年與齊武書言有今日之事書似未逹齊主命也南使既反情有愴然朕亦休兵此段猶是本意不必専為問罪若如卿言便可釋然慶逺曰見可而進知難而退聖人竒兵今㫖欲憲章聖人不失其美豈不善哉孝文曰卿欲為朕和親為欲不和慶逺曰和親則二國交歡蒼生再頼不和則二國交惡蒼生塗炭和與不和裁繇聖衷孝文曰朕來為復逰行鹽境北去洛都率爾便至亦不攻城亦不伐䲧卿勿以為慮孝文設酒及羊炙雜果又謂慶逺曰卿主既黜㐫嗣不違忠孝何以不立近親如周公輔成王而茍欲自取慶逺答曰成王有亞聖之賢故周公得輔而相之今近藩雖無悖徳未有成王之賢霍光亦捨漢藩親而逺立宣帝孝文曰若爾霍光自為君當復得為忠臣不慶逺曰此非其類乃可宣帝立與不立義帝云何皇上豈得與霍光為匹若爾何以不言武王伐紂何意不立㣲子而輔之茍貪天下孝文大笑明日列軍向城東遣道登道人進城内施衆僧絹五百疋慶逺選之各袴䌌絡𢃄冊府元龜卷六百五十九
