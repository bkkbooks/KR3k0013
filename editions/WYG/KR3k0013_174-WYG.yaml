body:
  text: 册府元龜卷一百七十四宋王欽若等撰帝王部修廢葢夫興滅修廢者仁政之攸先也古之哲后未有不先於兹道而天下歸心焉若乃躬膺天祿陟於元后享厯彌久傳祚悠逺雖宗祀已絶而德施未已其或遺風餘烈藹於舊邦鴻猷大集流於載籍屬巡豫之所出瞻軌迹而匪遐因慶賀之云始著條式而咸備繇是増飾園寢申嚴廟貌謹樵蘇之禁給掃除之户秩以紀典垂於令甲雖餘分閏位亦俯及之葢德之盛者蔑以加此矣漢高祖十二年詔其與秦始皇守冢二十家令視其冢復亡與他事臣欽若等曰復除也言除其庸役不預他事武帝元封元年十月帝行自朔方還祠黄帝在上郡周陽縣有黄帝冡五年冬南巡狩至於盛唐望祀虞舜于九嶷後漢章帝元和二年二月詔使使者祠唐堯於成陽靈臺成陽縣濟陰郡咸陽縣東南有堯母慶都墓上有祠廟堯母陵俗亦名靈臺太母安帝延光三年二月庚寅遣使者祠唐堯於成陽魏文帝黄初二年正月校獵至原陵遣使者以太牢祠漢世祖明帝景初二年五月詔曰昔漢髙創業光武中興謀除殘暴功昭四海而墳陵隳頽童兒牧豎踐踏其上非大魏尊崇所承代之意也其表髙祖光武陵四面百步不得使民耕牧樵採後魏道武天興三年五月東巡幸涿鹿遣使者以太牢祠帝堯帝舜廟明元泰常七年九月幸橋山遣有司祠黄帝唐堯廟大武神䴥元年八月東幸廣寗臨觀温泉以太牢祭黄帝堯舜廟文成和平元年正月帝東巡歴橋山祀黄帝孝文太和十六年二月詔祀唐堯於平陽虞舜於廣寗夏禹於安邑周文於雒陽十九年四月幸小沛遣使以太牢祭漢髙祖廟二十年五月初營方澤於河陰遣使者以太牢祭漢光武及明章三帝陵又詔漢魏晉諸帝陵各禁方百步不得樵蘓踐藉二十一年三月南廵至平陽遣使者以太牢祭唐堯四月庚申幸龍門遣使者以太牢祭夏禹廟癸亥行幸蒲坂遣使者以太牢祭虞舜戊辰詔修堯舜夏禹廟丙戌遣使者以太牢祀漢帝諸陵五月遣使者以太牢祭周文王於酆祭武王於鎬孝明熈平元年七月詔曰先賢列聖道冠生民仁風盛德煥乎圗史暨厯數永終迹隨物變陵隧杳藹鞠為茂草古帝諸陵多見踐藉可明勑所在諸有帝王墳陵四面各五十步勿聽樵牧隋文帝開皇十四年十月詔曰齊梁陳往皆創業一方綿歴年代既宗祀廢絶祭奠無主興言矜念良以愴然莒國公蕭琮及髙仁英陳叔寳等宜令以時修其祭祀所湏器物有司給之煬帝大業二年十二月詔曰前代帝王因時創業君民建國禮尊南面而厯運推移年世永久丘壟殘毁樵牧相趨塋兆堙蕪封樹莫辨興言淪滅有愴于懐自古以來帝王陵墓可給隨近十户蠲其雜役以供守視五年二月次於閿鄉詔祭古帝王陵唐髙祖武德七年幸樓觀以太牢祭隋文帝陵太宗貞觀四年九月詔曰朕丕承先緒積慶累仁上纂鴻基克隆寳祚欽若稽古緬想往册英聲茂實志深褒尚始兹廵省眺矚中塗漢氏諸陵北阜斯託寂寥千載邈而無祀攬轡興懐慨然遐念開闢以降肇有司牧歴選列辟遺跡可觀良宰名卿清徽不滅宜令所司普加研訪爰自上古洎于隋室諸有名王聖帝盛德寵功定亂弭災安民濟物及賢臣烈士立言顯行緯武經文致君利俗丘壟可識塋兆見在者各隨所在條録申奏每加廵簡禁芻牧春秋二時為其致祭若有隳壊即宜修補務令周盡以稱朕意六年三月以少牢祭隋文帝陵閏六月遣使以少牢祭漢惠帝陵十一年二月幸雒陽勑有司祭漢文帝於覇上十五年二月行幸經古帝王陵並遣使致祭十月行經隋文帝陵祭以太牢髙宗顯慶二年二月帝在雒陽宫遣使以少牢祭漢光武帝後魏孝文帝等陵帝自為文十月幸許州次自善頓遣使祭魏明帝髙平陵帝自制祭文又遣使祭後漢光武原陵明帝節陵晉武帝峻陽陵麟德二年十月命有司祭殷湯晉文帝武帝陵墓及祠廟中宗神龍二年四月制自古帝王及聖賢墓並禁樵採三年冬幸温湯境内有自古帝王陵致祭𤣥宗開元十二年十一月幸東都古帝王陵並精意致祭十七年四月謁諸陵赦制自古帝王陵宜令所在州縣致祭十八年正月親迎氣於東郊赦制自古帝王先有祠廟者各於郡縣逐處設祭二十年二月赦制自古帝王各令致祭務盡誠潔二十二年十二月勅靈州置後魏孝文帝祠堂二所有司以時享祭是州有魏故明堂遺迹乃置廟焉二十三年正月親耕藉田赦制自古聖帝明王並令所在長官以禮致祭天寳元年正月丁未朔受朝賀赦制自古帝王並令所繇州縣致祭三載五月置周文王廟乃以同德十人四時配享十二月祀九成宫禮畢詔自古聖帝明王陵墓有頺毁者宜令管内量事修葺仍明立標記禁其樵採六載正月詔曰三皇五帝道冠開闢創物􅂷範功濟生靈繼天之德在墳典而昭著勤人之祀於禮文而尚闕永言龜鑑宜示欽崇其三皇置一廟五帝亦置一廟即令所司卜擇吉地營建仍以時致祭其廟共置令太常寺檢校自古聖帝明王忠臣烈士陵墓有頺毁者先令修葺並禁其採樵嵗月深久摧壊或多宜令所繇郡縣明申前勅處分七載五月詔曰古之人君存諸號氏雖事先書契而道著皇王緬懐厥初寧忘咸秩其三皇已前帝王宜於京城共置一廟仍與三皇五帝廟相近以時致祭自古受命之主創業之君皆經濟艱難勘定禍亂雖道謝於往古乃功施於生人用率典章亦崇禋祀其歴代帝王肇迹之處未有祠宇者宜令所繇郡量置一廟以時享祭取當時將相德業可稱者二人配祭仍並圗畫立像如先有祠宇未霑享祭者亦宜准此九載十一月周武王漢髙祖於京城同置一廟并置官吏十載九月初置三皇已前帝王廟肅宗以至德元載七月即位詔自古聖帝明王並令所在致祭上元元年閏四月改元赦制自古明王聖帝並委州縣長吏擇日致祭二年九月赦制明王聖帝所在廟祀各委州縣長官䖍潔致祭代宗廣德二年二月南郊赦制自古聖帝明王宜令所管致祭永泰二年五月詔道州舜廟宜蠲近廟兩户掃除從刺史元結請也大厯四年四月鄜坊等州節度使臧希讓上言坊州有軒轅皇帝陵闕請置廟四時享祭列於祀典從之德宗貞元元年正月受朝賀赦制自古聖帝明王祠宇委長官祭祀憲宗元和二年正月南郊赦詔自古聖帝明王各以禮祭十四年正月詔以周文王武王祠宇在咸陽縣俾有司精加修飾穆宗長慶元年七月册尊號禮畢赦制自古聖帝明王各令所在致祭後唐荘宗同光三年六月廵簡諸陵使工部郎中李途奏昨計三十三陵及合重修下宫殿宇法物等敕關内諸陵頃因䘮亂例遭穿穴多未掩修其下宫殿宇法物等各令奉陵州府㨿所管陵園修製仍四時各依例薦饗及逐陵仰差近陵百姓二十户放雜差遣充陵户備洒掃其夀陵等十二陵亦一例修掩可量置陵户是月敕刑部尚書李琪可充昭宗少帝改卜園陵禮儀使又勑工部郎中李途授京兆府少尹充修奉諸陵使明宗天成二年三月丙寅宗正丞李郁奏兩京畿甸園陵之制其地四十里曰封山爰自唐室已來収在公田之籍今方紹襲冝正規儀四月勑三京諸縣有園陵處每縣宜置一園陵令都勒檢校勾當三年八月勅諸處凡有列聖真容處並令修飾長興元年十月辛丑宗正丞李疇奏京畿内列聖園陵自兵亂已來人户多於陵封内開掘燒磚窰竈掘斷岡阜驚動神靈此後請嚴切禁止奉陵州縣凡有封内窰竈並宜修塞從之末帝清泰元年十一月己未宗正寺言御史䑓轉報百司各抄六典令式内本司事舉行職典宗廟陵園列聖陵寢多在關西梁季為賊臣盜發同光初曽差供奉官李說工部郎中李途往關西廵陵祭告屬朝廷有故不行明宗天成初差丞李郁檢校又長興四年詔掩閉無主墳墓況列聖陵寢伏遇中興雖有修奉之言而無掩閉之實乞差官檢討修奉置陵令一員應屬陵之四封各乞寺司管係詔曰所請修奉列聖陵寢及差官宜依其陵令候事畢日以聞十二月丁卯詔曰列聖陵寢多在關西中興已來未暇修奉宜令京兆河南鳳翔等府耀州乾州奉陵諸縣其陵園有所闕漏本處量差人工修奉仍人給日食祭告下太常宗正寺叅詳奏聞三年五月丁酉詔京兆河南府鳳翔耀州乾州等奉陵州縣縁本廟陵寢中為盜發修奉未備宜令本管州府量事差人修奉其人工給食祭料並從官給晉髙祖天福三年三月詔廵幸汴州中書奏車駕經過河南府河陽鄭州汴州管界所有帝王陵廟車駕經過日以酒酺祭告從之十一月河陽侯益奏伏自収復氾水關日以逆賊張從賔於荘宗舊葢亭子上與官軍鬪敵臣以為荘皇厯數雖謝精爽猶存願靜妖氛特立祠廟果應䖍禱尋獲關防臣欲排此瓦木往就修營從之四年十一月乙亥太常禮官議立唐廟按武德故事祀隋之三帝請立近朝荘宗明宗閔帝三代庶合前規詔曰德莫盛於繼絶禮莫大於敬先荘宗立興復之功明宗垂光大之業逮乎閔帝實纂本枝然則丕緒洪源皆尊唐氏繼周者湏崇后稷嗣漢者必奉髙皇將啓嚴祠當從茂典宜立髙祖太宗及荘宗明宗閔帝五廟漢髙祖乾祐元年正月詔曰天下名山大川聖帝明王忠臣烈士祠廟墳墓委所在量加修葺又詔曰恭惟列祖園陵諸聖祠廟桑田變海當時之弓劔猶存精爽在天終古之威靈不泯載惟追感誠切永懐其雍州西京及諸州府應有諸帝陵廟仰所在修奉務令完葺隠帝乾祐元年勑我國家肇迹豐沛膺籙并汾盖承積德之靈再享配天之業四百年之洪緒一千載之遺風乃祖陵園先時廟貌屬累朝之隔越諒如在之因循將明追孝之心當盡奉先之敬天下州府應有兩漢諸帝王陵園廟宇宜令所屬長吏檢討量加修飾其陵園側近禁止芻牧樵採時劉皥為宗正卿謂宰相曰國家稱漢廟有髙祖世祖室而兩都陵園諸國王子墳墓並合畧加檢飾以光聖運也雖下此勑並無檢行周太祖廣順元年正月制曰近代帝王所在陵寝合禁樵採俾奉神靈唐荘宗明宗晉髙祖各置守陵十户以近陵人户充漢髙祖皇帝陵置職員及守宫人時月薦享并守陵人户等一切如故仍以晉漢之裔為二王後委中書門下處分是月宗正寺上言唐晉兩廟四仲行享禮今准赦書以晉漢之裔為二王後其唐五廟合廢從之是月宗正寺言漢朝諸陵二仲差官朝拜今鼎命歸周不合管係伏准赦書睿陵宫人職員時日薦享如舊二仲合差官朝拜勑睿陵如舊餘准令式處分二月中書門下以太常禮院言准勑遷漢廟入昇平宫其唐晉兩廟皆五廟遷移今漢七廟未審總移只移五廟勑宜依前勑並移於昇平宫其法物神廚齋院祭器祭物饌料皆依中祠例用少牢光禄等寺給其讀文太祝及奉禮郎太常寺差仲享以漢宗子為三獻從之十一月勑唐明宗五廟在至德宫安置其徽陵上下宫所管土田舍宇宜令新除右監門衛將軍李重玉為主其徽陵下宫及至德宫緣廟合留物外宜令内飬劉延韜於金銀器物數内量事給李重玉遷葬故淑妃王氏及許王外餘並付李重玉并尼惠能惠燈惠嚴等令重玉以時祀陵廟務在豐潔重玉即故皇城使李從璨之子明宗之孫也三年八月辛亥敕漢睿陵頴陵今後宜係鴻臚寺顯德元年正月赦文前代帝王陵廟及名臣墳墓無後者所在官吏檢校勿令樵採耕犂册府元龜卷一百七十四
