body:
  text: 册府元龜卷一百六十七宋王欽若等撰帝王部招懐第五周太祖以漢乾祐中奉命討河中李守貞太祖令水軍㳂河具戰棹長連城用歩軍分守各以使臣監之賊小校劉重進髙思來降補招収十将付以錦袍銀帶積於城下令誘賊軍廣順元年正月徐州押牙鞏廷美教練使楊温據城拒守勅曰朕昨廹于軍情遂臨帝位已曾示諭想備聞知汝等初得耗音争無疑懼一則顧身擐甲閉闗須至如是今覽汝等報姚武文字備悉心誠况汝等始則為使主竭忠終則向朝廷順命秉持甚善節義可嘉佇俟旌褒何煩憂懼近者已有勅㫖汝等竝授郡符只候新節度使入州即便施行恩命朕當示信于天下汝宜諭㫖於城中凡在軍民各宜安堵其諸元從職員並宜安撫三月丙寅與荆南髙保融詔曰安審琦奏湖南船網缺行監押節級官徤四百九人在襄州朕以武陵長沙尋戈結釁既道塗而梗澁致官徤以淹留卿義在卹鄰志惟體國俾歸途而無滯副軫念以在兹已降宣命下襄州取逐人便穏如願歸本道者即差人管押至荆南候到卿可差人部送至湖南五月丁丑勅京兆鳯翔府朕臨御以來憂勤無怠慮庶政之尚闕恐蒸民之未安寢食不遑夙宵若厲早嵗雍岐連叛兵革薦興迨至討平可知傷弊誠念負罪之黨尋以誅夷亡命之徒近皆滌蕩則被釋放者皆為赤子經釐革者悉是平人雖性命之永全在生涯之何着興言軫閔未甞去懷其京兆鳯翔府先因攻討之時及收復之後應有諸色犯罪人第宅荘園店舍水磑曽經籍沒及本主未歸者已宣下本道却給付罪人骨肉為主仍仰逐處嚴切指揮勿令所繇裏私䦨􅈔邀求資金庶令存濟用副朕懷八月滄州王景言幽州饑繼有流民入界勅朕以㳂邊百姓適因災沴遂至流亡抛棄鄉園扶攜老幼未有安泊之地深懷愍念之心宜切撫綏庶令存濟其邊界流移人户差使臣與所在官吏撫恤安泊其滄景徳管内甚有河淤退灘之土蒿萊無主之田頗是膏腴少人耕種可令新來百姓量力佃蒔只不得虛占土田有妨别户居止如是願在别管界内居住者亦聽取便所在闗津口岸不得阻滯如邊界有親識可依亦聽從便仍人給斗粟委三司支給候安泊定取便耕種放差税是月晉州送擒獲太原軍士二十六人各與巾履衫袴竝釋之二年正月賜兖州慕容彦超詔曰朕與卿久叙兄弟比無嫌隙自前嵗奔逃之後尋時慰納如初察憂疑則推以赤心邀信誓則指之白日留男不歸大職欲已只在舊藩動必依從㫁無疑阻何故執心不定率意而行聚草㓂于城中修戰具于衙内發言不遜舉事無常差遣元隨主持鎮務恣令殘害任便誅求率配之名三四十件搶拾事力贍飬姦兇一境生靈不勝其苦南則結連淮㓂北則勾喚劉崇早者差都押牙鄭麟口奏敷陳乞移藩閫朕推心嘉納回詔允俞昨上表請赴闕廷朕亦一從卿意復成欺侮飜有指名兼更偽詐鄆州書題㸃染齊王勲徳且非竒計何必如斯近者東面諸侯相繼奏報稱卿差㸃管内人户團併義營欲議發軍攻取隣道衆情不服闔境波逃其百姓皆併力同心殺却元隨鎮将例各将家廻避散投外界潛藏或則保聚山林就便構置寨柵懼卿挾讐屠害不保朝昏懸望官軍救䕶為主朕為人父母能不痛心弔伐之行盖不獲已今差侍衛歩軍都指揮使曹英等部領馬歩大軍問卿情状卿若能改心知過束身歸朝當許全生待之如舊朕或違信是謂自欺卿若拒張便令攻取今更飛此詔始末指陳兾卿靜慮深思庶㡬轉禍為福言盡於此卿其圖之二月癸夘以先擒獲太原鄉軍頭周暉而下百三十三人各賜錢鞋遣供奉官盖繼明部送昭義界放還鄉里甲辰以先獲淮南指揮使燕敬權都頭趙筠官徤吳進羅義等四人放歸本土仍賜衣服金帛以遣召見謂之曰爾歸言逹吾意於爾君凡人惡兇邪奨忠順天下一也我之賊臣撓亂國法嬰城作逆殃及生靈不意吳人助此兇慝驅徒領衆渉我封陲南土君臣非良筭也是月戊申以兖州兵士數百人先在金州屯戌其家口仍在本城中勑就金州撫諭之曰一昨慕容彦超結連草宼毒宼蒸民側近縣鎮鄉村無名脅從徒害人神憤怒須議討除朝廷已發大軍往彼攻取汝等屯戌邊境勞苦經時言念忠勤不忘窹􅄰所有汝等家口並在兖州城内屬此背違想皆憂念在朕誠意暫不弭忘已降宣命指揮曹英候収復城池日畫時選得力負寨部領兵士率先入城占據本營安撫逐人骨肉家口不得輙有驚恐五月親征兖州乙丑旦次金鄉曹英送賊黨文懷美三人至行在賜袍帶釋之癸酉賊散員都將周延嗣歸順自是賊黨相繼來奔皆有所賜是月兖州行軍孫暉副使劉演及本城將校等為軍士所獲帝以其脅從皆賜衣装以釋之諸村鎮要路捕獲得賊黨者相繼而至帝多宥之彦超元隨都押衙鄭麟李玘及伶官十數人王峻請而免之是月兖州平制曰應曽與慕容彦超同惡之人逃避濳藏者竝與釋放仰於所在自出陳首百日不首者復罪如初應已伏誅逆黨人等於諸處有骨肉者先已指揮放罪招安尚慮本身抵法之後却有驚疑宜令所在州縣明行告諭竝釋放不問兖州城内幕職及縣官吏軍府将校竝令放罪及衙前州使兩院職役人本城軍都竝勒仍舊自慕容彦超違背已來鄉村山寨豪強人等接便為非刼掠虜殺今因収復之後竝與洗滌一切不問八月淮南界俘獲耕牛雜畜詔送還本處三年正月夏州李彛殷府州折徳扆上言河東界偽麟州刺史楊仲訓以蕃部攻圍繼來求便乞歸明賜勅書曰麟州刺史楊仲訓及軍州将吏職員等拒夏州節度使李彛殷奏得汝等状稱劉崇拒命聖朝堅其逆壘今被部族侵廹乞垂救解兼已稱大朝正朔竝聞逆命邊郡無歸值妖孽之脅從致朝貢之阻絶今則蕃部兵民助我討違汝等哀告蕃鄰欲謀歸向備覩變通之意特用𢎞納之仁宜示撫安用奨忠順已指揮州府及諸蕃部不令進攻汝等便宜明宣朝㫖告諭軍民應是通河東道路口岸畫時遣人守禦不得通人來往凡有公事一一奏取朝廷指揮其官員将校職掌一切依舊仍分析名銜申奏當議等第加恩兼之酬賞邠州折從阮言奉詔示諭慶州諸蕃部尋遣人告報首領其野鷄第七門族首領李萬全及樹夥等族受勅書領袍帶等設誓其諸族猶負倔彊見與寜州諸軍襲擊其次月戊申邠州折從阮言奉詔討逐慶州野鷄族兼招攜諸部族臣自前月興兵後招到樹夥等二十一族與勅書袍帶綵緞設酒食令發誓詞盟約兼排列軍士圍繞今已和斷兼補郝爽為慶州牢城使又發龍㨗一指揮赴寜州深州言蕃界内來歸老小漸多任便諸處安置二月已前解州刺史鄭元昭為慶州刺史充青白兩池㩁鹽制置使廣順初以郭彦欽再刺慶州性凟貨及擅加㩁錢民夷流怨州北十五里寡婦山有蕃部曰野鷄族多羊馬彦欽作法擾之利其賂遺蕃情獷悍易為不法彦欽乃奏野鷄族暴盜掠奪綱商帝難於興師遣使賫詔書撫慰望其率化蕃人既苦彦欽惡政不時報命或曰野鷄部族蕃落之最狡者宜以兵詰而誅之乃移陜帥折從阮鎮邠州又令寜州張建武㑹合環州皇甫進兵攻之建武勇於立功徑趨野鷄族帳追擊殺數百人其喜萬玉族折思族殺牛族者皆熟户蕃人此無猜忌又殺牛素與野鷄族有憾且聞官軍討伐相聚餉饋欣然欽奉官軍利其財貨孶畜刼奪之翻為諸族所誘至包山負險之地官軍不利被蕃人廹逐投崖墜澗而死者數百餘折從儉等以兵自保無相救應建武陷長男餘衆僅免帝怒彦欽及建武俱罷任彦欽至京師勒歸私第竟不得見建武左遷率府卒是月元昭兩地㩁鹽之任故特行制置以寜邊人其月契丹降人偽授儒州晉山簿李著鄭縣簿王裔泰州司法劉裴等著賜比明經出身裔裴比學究出身五月沁州和州縣民百四户來奔遣於河中安置命節度使彦超分配居止撫安六月勅大原來降嵐州録事叅軍丁守加朝散大夫試大理評事兼監察御史為蔡州真陽令世宗顯徳元年正月詔自廣順元年後來幽州淮南西川河東等界軍人百姓投降者累令安撫所在有無荒閒田土一任請射住佃為永業西川接界久不通商今後一任來往只須所屬官吏防閑恐夾帶奸細三月辛巳詔應㳂邊州府接近西州淮南契丹河東界處仰所在府州及廵檢使臣鈐轄兵士及邊上人户不得侵擾外界及虜人畜務要静守疆塲勿令搔動其投來人户仍仰倍加安撫是月親征河東甲午次髙平縣兵士解嚴詔河東降卒二千餘人各賜絹二疋竝給衣装義軍各絹一疋令還本部受賜者無不歡呼感泣四月戊午偽遼州刺史張漢超待罪於行闕命釋之仍賜衣服鞍馬器備等甲子偽州防禦使董希顔偽嵐州刺史郭言等詣行闕見帝命釋罪賜賚有差丙寅偽沁州刺史李廷誨見丁邜偽憲州刺史韓光愿見皆賜賚有差癸酉忻州偽監軍李就殺偽刺史趙臯及契丹大将楊耨姑來降尋以李就為檢校司空忻州刺史仍遣使慰諭是月討太原回詔河東及契丹敗散軍士其中有潛竄山谷間者竝令招喚不得輙有傷害如是義軍百姓便可放還本家若是軍人及諸色人竝監送至駕前各與稳便安排遼沁二州新屬路府久陷賊境深可憫傷委本道節度使倍加安撫所有劉崇煩苛事件竝與除放二年九月甲午昭義節度使李筠遣牙将押送先擒到河東偽兵馬監押程友已下二百餘人到闕帝皆赦之仍加賜賚是月西南面招討使王景獲西川軍校姜暉已下三百餘人來獻帝曰姜暉等悉是中朝将士昨拒王師盡力於偽主亦其忠也宜竝赦之仍以錢帛賜之閏九月潁州主言有淮南百姓邢盛等二人度淮而來言因失耕牛故來此尋覓本部以來自賊境奏禀朝㫖帝曰率土之内皆吾民也豈以不庭之境便為限隔宜速放還仍給官錢市牛與之十一月以秦鳯平詔秦城階等州歸明将士自長行已上等第支賜優給其官吏将校職員等竝與加恩其中有西川人員除恩澤賞賜外如願駐留者厚與請受如願歸去者竝給盤纒用慰衆情免違物性應捉到賊軍将校一切放罪竝令押送赴闕各與恩澤自何里建等歸投西川已來訪聞管内州縣連嵗飢荒百姓軍人倍多勞役科斂頻併法令滋章既為吾民宜革前弊今後除秋夏兩稅征科外應偽屬所立諸般科率名目及非理徭役一切停罷徳音未該者宜令所司相次指揮十二月辛邜右領衛将軍王繼清押偽鳯州節度使王環已下四十三人到闕帝赦其罪頒賜有差先是自興師西伐至收復秦鳯前後擒獲川軍凡數千人帝皆赦之仍給以袍袴糗糧署為懐恩指揮繇是降卒無不感悦尋以環為左驍衛大将軍仍以服玩鞍馬賜之三年正月親征淮南壬子次永寧鎮帝謂侍臣曰夀州圍閉數月大軍暫退淮上如聞四面百姓往日入城廻避者多來歸業今王師再舉慮其復入城中枉為餓殍宜先告諭㑭安其家乙邜次趙村軍士於戌邏間擒到敗卒數人帝問曰爾敗來數日何不走入夀州而乃日夜奔走周旋不離此地盖心迷耳命釋其縛仍以袍袴賜之二月丁亥偽左神衛軍使徐象等一十八人來降賜錦袍銀帶鞍馬繒帛有差三月偽命光州都監張承翰以城歸順授承翰集州刺史是月賜揚光二州先歸順員流張洪等三十五人錦袍銀帶戊戌夀州城内天成軍使蔡暉來降賜錦袍銀帶錢絹等壬戌夀州城内軍校陳元貞等一十三人及水砦副将李温等來降賜物有差是月命供奉官安洪道押江南進奉副使王崇質李徳明等二人發赴金陵初呉人聞正陽之敗其氣已消矣又聞今上敗何延錫於渦口擒皇甫暉於滁州始懼覆亡之不暇乃遣鍾謨等奉表來上謨等因面奏云臣大國主願割夀濠泗楚光海六州之地𨽻於大朝仍嵗貢百萬之數以助軍用請罷攻討及孫晟至所奏亦然上以淮南諸郡半為我有復又諸将㨗奏日聞於行在料其事勢可以盡取江北之地乃不許之徳明等上見急攻夀陽慮頃刻不保乃奏云臣之保本國向來不知大朝兵力如是願陛下寛臣等五日之誅容臣自往江南取本國章表割江北諸郡盡獻于大朝上乃許其行因令賫璽書以賜李景書曰頃自有唐失御天歩方艱巢蔡䘮亂之餘朱李戰争之後中夏多故六紀于兹海縣𤓰分英豪鼎峙自為聲教各擅蒸黎連衡而交結四夷乘釁而憑陵上國華風不競否運所鍾凡百有心孰不興憤朕猥承先訓恭荷永圖徳不迨於前王道未方於往古然而擅一百州之富庻握三十萬之甲兵農戰交修士卒樂甲思欲報累朝之宿怨刷萬姓之包羞是以踐位以來懐安不暇破幽并之巨㓂收秦鳯之全封兵不告疲民有餘力一昨廻軍隴上問罪江干我實有辭咎将安執朕親提金鼓尋渡淮淝上順天心下符人欲前鋒所向彼㓂無遺棄甲僵屍動盈川谷収城徇地已過滁陽豈有落其𤓰牙折其羽翼潰其心腹扼其吭喉而能不亡者哉早者泗州主将逓送到書一函尋又使人鍾謨李徳明至賫所上表及貢奉衣服腰帶金銀器帛茶藥牛酒等近差徤歩進到第二表今月十六日使人孫晟等至齎到第三表及進奉金銀等到行朝深誠厚意觀其降身聽命引咎告窮所謂君子見幾不俟終日茍非逹識孰能若斯但以奮武興戎所以討不服惇信明義所以來逺人五帝三王盛徳大業嘗用此道以正萬邦朕今躬綂戎師龔行討伐吿于郊廟社稷詢于将相公卿天誘其𠂻國無異論茍不能恢復外地自畫邊疆便議班師真同戲劇則何以光祖宗之烈厭士庶之心匪徒違天兼且咈衆但以淮南部内已定六州廬夀濠黄大軍悉集指期尅日拉朽焚枯其餘數城非足介意必若盡淮甸之土地為大國之提封猶是逺圖豈同迷復如此則江南吏卒悉遣放還江北軍民竝當留住免違物類之性㑭安鄉土之情至於削去尊稱願輸臣禮非為故事實有前規蕭詧奉周不失附庸之道孫權事魏自同藩國之儀古也雖然今則不取但存帝號何爽嵗寒倘堅事大之心終不迫人于險事實真慤詞匪枝游俟諸郡之悉來即大軍之立罷質于天地信若丹青我無彼欺爾無我詐言盡于此皆不須云茍曰未然請從兹絶竊以陽春在候庶務縈思願無廢於節宣更自期於愛重音塵匪逺風壤猶殊翹想所深勞於夢寐又賜其将佐書曰朕自類禡興師麾旄問罪絶長淮而電擊指建業以鷹揚旦夕之間克㨗相繼至若兵興之所自釁起之所來勝負之端倪戎甲之次第不勞盡諭必想具知近者金陵使人繼來行闕追悔前事委質大朝非無謝咎之辭亦有罪軍之請但以南邦之土地本中夏之封疆茍失克復之期大孤朝野之望已興是役固不徒還必若自淮以南畫江為界盡歸中國猶是逺圖所云願為外臣乞比湖浙彼既服義朕豈忍人必當别議封崇待以殊禮凡爾将佐各盡乃心善為國家之謀勉擇常久之利四月駐蹕于夀春城下以江南偽命常州刺史姚鳯為左屯衛将軍是月前湖南節度使馬希崇昆仲凡十有七人自揚州來見賜衣物鞍馬錢帛各有差賜以希崇為左羽林綂軍又以淮南偽命揚州通句尚書虞部員外郎何幼冲為工部郎中仍賜金紫五月以偽命東都副留守工部侍郎馮延魯為太府卿六月詔以江北諸州縣有未収復處宜令行營大将明申招諭儻能知機歸順朝廷其向來名位當一切如故仍宣名藩大郡厚加旌賞其軍都自長行已上竝與優給其中願歸江南者亦聽自便四年正月詔曰應淮南界南百姓宜令行營将校告報諸軍不得俘虜傷害三月親征淮南壬寅賜收降到淮南将卒許文縝已下一萬五百二十四人分物有差甲辰偽夀州節度使劉仁贍上表乞降丁未再差人上表是日賜仁贍詔曰朕昨者再幸淮淝盡平諸砦念一城之生靈久困重圍豁三面之疎網少寛疲瘵果聞感義累貢來章卿受任江南鎮兹淮甸踰年固守誠節不虧近代封疆之臣卿且無愧忠烈廻翔之際不失事機萬民獲保於安全一境便期於舒泰卿便可宣逹恩信慰撫軍城将覿儀刑良増欣沃覽奏嘉奨再三在懷差東上閣門使張保績入城宣諭是日仁贍遣其子崇讓上表請罪又賜詔曰朕臨御萬邦推誠克已當五兵未戢雷霆宣震耀之功暨萬旅投戈覆戴示生成之徳况卿等受任本國保兹列藩戮力邦家将帥常道救援不及廻翔得宜事主盡心何罪之有已令宣諭當體優恩勉自保調無更疑慮稱奨在念寤思不忘戊申帝率六師於夀州城北受仁贍以下降将仁贍已抱疾帝令不拜慰勞久之仍賜蟒衣玉帶御馬鞍轡金銀器皿錦綺綾羅等甚厚又賜其子崇讓等四人及監軍使周廷構節度判官鄭牧營田副使孫羽等分物又賜其軍士錢絹米麥各有差尋除仁贍天平軍節度使特進檢校太尉兼中書令壬子以江南偽命西北面行營監軍使舒州團練使朱元為蔡州防禦使文徳殿使監軍使周廷構為衛尉卿夀州營田副使孫羽為太僕卿節度判官鄭牧為鴻臚卿賞歸順也四月辛未以江南偽命西北面行營應援使前永安軍節度使檢校太尉許文縝為檢校太尉左監門行上将軍以偽命㑹西北面行營應援都軍使前武安軍節度使檢校太傅邊鎬為檢校太傅左千牛衛上将軍仍各僉一子為供奉官五月賜許文縝邊鎬王環周廷構馮延魯鄭牧孫羽等宅地各數畝又以材植緡錢等賜之㑭構居第八月又賜許文縝等各絹三百疋綿五百兩㑭備時服十一月癸亥賜濠州降卒錢帛各有差乙丑漣水縣偽䧺武軍使知縣事崔萬廸以其縣來降尋授萬廸瓊州刺史充開封府馬歩軍都指揮使仍以鞍馬金銀錢帛等物賜之丙寅制以偽濠州團練使郭廷謂為亳州防禦使以偽濠州兵馬都監泰州團練使陳遷為忻州團練使以偽保義軍節度使陳承昭為右監門衛上将軍仍以錦袍金帶賜之是日賜漣水縣歸降兵士衣物錢帛各有差庚午偽濠州團練使郭廷謂已下詣行宫見帝優以待之咸厚加賜賚焉十二月泗州守将范再遇以其城降尋授再遇檢校太保宿州團練使賜推誠化功臣仍厚賜加賚五年五月甲寅韓令坤自揚州差人執江南偽閣門承㫖李延祚來獻延祚稱奉李景命起遣江北人户過江帝命釋之乃以錦袍賜焉是月又賜海州㨗到軍校卒伍錢帛有差二月征淮南􅄑揚州辛酉偽天長軍使兼䧺州刺史易贇及監軍使周暉已下詣行宫見尋以贇為天䧺軍節度行軍司馬以暉為萊州團練副使咸加賜賚焉三月己亥賜江南書云皇帝恭問江南國主劉承遇至齎到草表分割廬舒蘄黄等州畫江為界兼重叠見謝者頃逢多事莫通玉帛之歡適自近年遂搆干戈之役兩地之交兵未息蒸民之受弊斯多一昨再辱使人重尋前意将敷久要須盡縷陳今者承遇爰來封函復至請割州郡仍定封疆猥形信誓之詞備認始終之意既能如是又復何求邊陲頓静於烟塵師旅便還於京闕永言欣慰深切誠懐其常潤一路及㳂江兵棹今已指揮抽退兼兩浙荆南水路将士各降詔示竝令罷兵其廬黄蘄三路将士亦遣抽㧞近外若彼中起掲逐處将員兵士及軍都家口了畢只請差人勾喚在彼将校交割州城所有江内舟船或慮上下須有往來已指揮只令就北岸牽駕盡合披陳􅄑惟體認是月命鹽城監使申屠諤齎璽書押御馬一十疋金銀鞍轡一十副散馬四十匹羊千口賜江南國主李景諤先為王師所擒帝釋而歸之因令齎是以往又命釋先擒到偽舒州刺史施仁望令歸江南仍加賜賚焉四月江南進奉使馮延己巳下辭歸賜延已金器百兩銀器五千兩絹五十疋錢五百萬緡馬四十蹄羊二百口及偽副給事中田霖已下所賜各有差五月降璽書賜李景云皇帝恭問江南國主竊以道契昌隆撫有疆宇控朱方而定霸總澤國以稱䧺五嶺三江風聲自逺重光奕世基搆無窮不有竒傑之才孰副民庶之望朕猥以凉徳奄宅中區接風壤以非遥􅄑馬牛之相及引領南望久渇徽猷果契素誠獲親髙義一昨繼勞使介頻奉好音方在行朝未遑報命近還宫闕合遣軺車㑭伸玉帛之歡少答嵗寒之意今遣太府卿馮延魯衛尉卿鍾謨管押持送仍賜景御衣四對金玉帶各一錦衣綺羅縠綾帛共十萬疋金器千兩銀器萬兩御馬五匹并金玉鞍馬散馬四百蹄羊五百口又賜其世子冀國信物稱是又賜絹十萬匹㑭犒其師焉六月辛未降璽書賜李景云朕居大寳之尊為萬邦之主體穹昊從人之意法禹湯罪已之心豁開襟懐昭示寰海方務協和之徳豈忘曠蕩之恩載想融明諒應鑒認相次収到江南諸軍員寮兵士四千六百八十七人今竝放歸自是命使臣七人分畨押送赴迎鑾渡過江仍以資糧賜之南軍無不感恱七月庚寅放江南天輝㧞山長劍兵士七百餘人歸江南十月甲午放刑部侍郎馮延魯左監門衛上将軍許文績右千牛衛上将軍邊鎬衛尉卿周廷構等竝放歸江南又勅淮南諸州舊𨽻江南者元置義軍宜竝放歸農十二月庚辰江南生辰國信使曹翰辭上令齎璽書以賜李景云皇帝致書恭問江南國主星聚湖闗挺生英哲命世既崇於基構承家撫有於江山顧寡昧之膺圖與君王之契協屬兹誕日遂舉舊章仍輟近臣往修國命導所懐於樂土期福履之無疆今差樞宻承㫖曹翰押生辰國信往彼到希見領仍賜景金銀器千兩錦綺繒帛二千疋御衣三襲玉帶二條名馬二十匹金銀鞍勒各一副六年􅄑滄州四月壬辰至乾寜軍偽寜州刺史王洪率其部衆以城來降賜物有差尋授洪隨州刺史五月􅄑瓦橋闗以契丹偽州刺史髙彦暉為華州刺史以偽鄭州刺史劉楚信為寜州刺史以偽闗南廵檢使姚中斌為汝州刺史皆賞歸順之智也六月戊寅賜偽泉州節度使劉從効詔曰黄禹錫至省所上表歸附大朝兼於京都置邸務事具悉卿自保全土宇專養黎元立功早逹於機權臨事固無於凝滯乃能望中原而内附陳方略以輸誠永言恭勤良多嘉奨爰自江南通和之後朝廷禮遇方深用恩信以綏懐㑭寰區而是則兼以卿本道地隣江表嘗奉金陵遽有改圖理宜盡善如上都置邸與彼抗衡雖百谷朝宗無以異也是時從効遣牙将蔡仲興為商人間道至京師求置邸内屬册府元龜卷一百六十七
