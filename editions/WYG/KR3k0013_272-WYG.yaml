body:
  text: 册府元龜卷二百七十二宋王欽若等撰宗室部令德夫體自帝室齒於宗戚處有惇叙之美出有藩翰之重自非挺信厚之質流愷悌之譽則何以焜燿民望表儀公族哉麟趾以來封建尤盛乃有粹和中積淑美兼著事神撫人而咸悦守法奉上而匪懈樹善以濟物推誠而待下勞謙不伐純儉無驕體仁好施居簡多恕行已以周愼處事以方正寛厚以容衆賢明而通理是皆宗室之英本枝之秀足以隆王國之垣屏藹䇿書之徽譽者已蓋夫立愛維親雖古之義又曷嘗不建賢尚德以成固本之義歟周公旦者多才多藝能事鬼神衛康叔封冉季載周公母弟也皆有馴行於是周公舉康叔為周司寇冉季為周司空以佐成王治皆有令名於天下蔡侯胡叔度之子也度既遷而死胡乃改行率德馴善周公聞之而舉胡以為魯卿士魯國治漢陽城侯德楚元王曽孫地節中以親親行謹厚封為陽城侯子安民為郎中右曹宗家以德得官宿衛者二十餘人德寛厚好施生言好施恩惠於人而生全之每行京兆尹事多所平反罪人反幡也幡罪人辭使從輕也家産過百萬則以振昆弟賔客飲食曰富民之怨也宗正向初以行修飭擢為諫大夫淮南王安厲王之子為人好書鼔琴不喜弋獵狗馬馳騁亦欲行隂德拊循百姓流名譽河間獻王德修學好古及薨中尉常麗以聞曰王身端行治温仁恭儉篤敬愛下明知深察惠於鰥寡大行令奏謚法曰聰明睿知曰獻宜謚曰獻楚孝王囂成帝河平中入朝時被疾天子閔之下詔曰蓋聞天地之性人為貴人之行莫大於孝楚王囂素行孝順仁慈之國以來二十餘年纎介之過未嘗聞朕甚嘉之後漢城陽恭王祉行淳厚宗室皆敬之宜春侯正為人謙遜東海頃王肅恭王彊之子性謙儉循恭王法度肅子孝王臻性敦厚有恩和睦兄弟恤養孤弱至孝純備仁義兼著楚思王孫般宣帝之𤣥孫也初宣帝封子囂於楚是為孝王孝王生思王衍衍生王紆紆生般自囂至般積累仁義世有名節而紆尤慈篤般子愷愷子茂皆以禮讓至三公也沛王輔光武之子矜嚴有法度在國謹節終始如一稱為賢王明帝愛重數加賞賜琅邪孝王京光武之子京性恭孝好經學明帝尤愛幸賞賜恩寵殊厚莫與為比東平王蒼光武之子永平十一年蒼朝京師月餘還國明帝遣使手詔國中傅曰日者問東平王處家何等最樂王言為善最樂其言甚大副是腰腹矣蒼腰帶十圍故明帝言之彭城王恭敦厚威重舉動有節度吏人愛敬之恭子孝王和敬賢樂施國中愛之魏鄧哀王冲㓜才敏太祖尤愛之冲每見當刑者輙探覩其寃枉之情而㣲理之及勤勞之吏以過誤觸罪嘗為太祖陳說宜寛宥之辯察仁愛與性俱生吳丹徒侯桓字叔武堅族子河之子器懷聰朗大帝嘗稱為宗室顔淵都鄉侯松丹陽太守翊之子善與人交輕財好施鎭巴丘數咨陸遜以得失嘗有小過遜面責松松意色不平遜觀其少釋謂曰君過聽不以某鄙數見訪及是以承來意進盡言便變色何也松笑曰屬亦自忿行事有此豈有望也假節開府慮大帝子也性聰體達所向日新以皇子之尊富於春秋逺近嫌其不能畱意及至臨事遵奉法度延納師友過於衆望晉安平王孚宣帝次弟也孚温厚謙遜性通恕以貞白自立未嘗有怨於人武帝元會詔孚乗輿車上殿帝於阼階迎拜既坐帝親奉觴上壽如家人禮帝每拜孚跪而止之又給以雲車輦青蓋車孚雖見尊寵不以為榮常有憂色高密王泰性亷靜不近聲色事親恭謹居喪哀戚謙虛下物為宗室儀表當時諸王惟泰及下邳王晃以節制見稱雖並不能振施其餘莫能比焉孝王畧泰之子也孝敬慈順小心下士少有父風東海獻王越泰之子也少有令名謙虛持布衣之操為中外所宗琅邪王伷宣帝拜大將軍開府儀同三司既戚屬尊重加有平吳之功克已恭儉無矜滿之色僚吏盡力百姓懷化扶風王駿清貞守道宗室之中最為俊望齊獻王攸字大猷少而岐嶷及長清和平允親賢好施才望出武帝之右宣帝每器之武帝時攸雖未之國文武官屬下至士卒分租賦以給之疾病死喪賜與之而時有水旱國内百姓則加振貸須豐年乃責十减其二國内賴之及為驃騎將軍時驃騎當罷營兵兵士數千人戀攸恩德不肯去遮京兆主言之帝乃還攸兵攸以禮自拘鮮有過事就人借書必手刋其謬然後反之雖武帝亦憚之每引之同處必擇言而後發長沙王又開朗果斷虛心下士甚有名譽河間王顒少有清名輕財愛士與諸王俱来朝武帝嘆顒可為諸國儀表㑹稽文孝王道子少以清淡為謝安所稱下邳王晃孝友亷貞謙虛下士甚得宗室之稱譙王承為東海太守有犯夜者為吏所拘承問其故答曰從師受書不覺日暮承曰鞭撻寗越以立威名非政化之本使吏送令歸家其從容寛恕如此又小吏有盜池中魚者綱紀推之承曰文王之囿與衆共之池魚復何足惜耶宋長沙王道憐子義宗愛士樂施兼好文籍世以此稱之義宗子秉泰始中累遷吏部尚書時宗室雖多才能甚寡秉少自砥束甚得朝野之譽為太宗所委臨川王義慶性謙虛簡素寡嗜欲受任歴藩無浮淫之過建平王寵少而閒素篤學文籍為人謙儉周愼明曉政事南齊豫章王嶷性汎愛不樂聞人過失左右有投書相告置鞾中竟不視取火焚之齊庫失燒荆州還資評直三千餘萬主局各杖數十武帝遣嶷拜陵還過延陵季子廟觀沸井有水牛突部伍直兵執牛推問不許取絹一匹横繫牛角放歸其家為治存寛厚故得朝野歡心及薨羣吏中南陽樂藹彭城劉繪吳郡張稷最被親禮藹與竟陵王子良牋曰道德以可乆傳聲風流以浸逺標稱雖復青簡締芳未若玉石之不朽飛翰圖藻豈伊雕篆之無沬丞相冲粹表於天眞淵照殆乎機象經邦緯民之範體國成務之規故以業茂惟賢功髙則哲神輝𦕈邈睿算不遺感纒奉車恨百留滯下官夙禀名節懷恩軫慕望隧結哀輙欲率荆江湘三州僚吏建碑壟首庶徽猷有述茂則方存昔子香淳德畱銘江介鉅平遺烈堕淚漢南況道尊前徃惠積聯緜者哉下官今便反假無繇躬事刋斵須至西州鳩集所資託中書侍郎劉繪營辦藹又與右率沈約書曰夫道宣餘烈竹帛有時先朽德孚遺事金石更非後亡丞相獨秀生民旁照日月標勝丘園素履穆於忠義譽應華衮功迹著於弼諧無得而稱理絶昭載若夫日用閴寂雖無取於錙銖歲功宏逺諒有寄於衡石竊承貴州士民或建碑表俾我荆南閱感無地且作紀江漢道基分陜衣冠禮樂咸被後昆若其望碑盡禮我州之舊俗傾壥罷肆鄙土之遺風庶幾𢎞烈或不冺墜荆江湘三州䇿名不少並欲各率毫釐少申景慕斯文之託歴選惟疑必待文蔚辭宗徳僉茂履非高明而誰豈能騁無愧之辭詶式瞻之望吾西州窮士一介寂寥恩周榮譽澤遍衣食永惟道廕日月就逺緬㝷遺烈觸目摧心嘗謂福齊南山慶鍾仁壽吾儕小人貽塵帷蓋豈圖一旦遂投此請約答曰丞相風道𢎞曠獨秀生民凝猷盛烈方範伊旦憖遺之感朝野同悲承當刋石紀功傳華千載宜須盛述實允來談郭有道漢末之匹夫非蔡伯喈不足以偶三絶謝安石素族之台輔時無麗藻迄乃有碑無文文獻王冠冕彛倫儀刑㝢内自非一世辭宗難或與此約乃閭閈鄙人名不入第歘酬令㫖便是以禮許人聞命慙顔已不覺汗之沾背也建武中第二子子恪託約及太子詹事孔穉珪為文臨川王映為揚州刺史國家初創映以少年臨神州吏治聰敏府州曹局皆重足以奉禁令自宋彭城王義康以後未之有也武帝嘗問映居家何事映曰正使劉獻講禮顧越講易朱廣之講莊老臣與一二諸彦兄弟友生時復擊贊以此為樂帝大賞之他日謂豫章王嶷曰臨川為善遂至於斯嶷曰此大司馬公之次弟安得不爾帝仍以玉如意指嶷曰未若皇帝之次弟為善最多也嶷常戒諸子曰凡富貴少不驕奢以約失之者鮮矣漢世以來侯王子弟以驕恣之故大者滅身喪族小者削奪邑地可不戒哉映應接賔客風韻韶美及薨朝野莫不惋惜焉鄱陽王鏘和悌美令有寵於武帝在官理事無壅當時稱之始興王鑑為益州刺史不重華飾器服清素有高士風與記室參軍蔡仲熊登張儀樓商畧先言徃行及蜀土人物鑑言辭和辨仲熊應對無滯當時以為盛事南平王銳為左民尚書朝直勤謹未嘗屬疾上嘉之十年出為持節都督湘州諸軍事以賞銳宜都王鏗清恬有學行為南豫州刺史都督二州軍事雖未經庶政而雅得人心及鎭姑孰於時人發桓温女冡得金巾箱織金篾為之嚴器又有金蠶銀繭等物甚多條以啓聞鬱林勅以物賜之鑑曰今取徃物後取今物如此循環豈可熟念使長史蔡約自往修復纎毫不犯永明中制諸王年未三十不得畜妾及武帝晏駕後有勸取左右者鑑曰在内不無使役既先遺㫖何忍而違竟陵王子良少有清尚京邑大水吳興偏劇子良開倉賑救貧病不能立者第北立廨收養給衣及藥子良每勸人善未嘗厭倦以此終致盛名子良薨故吏范雲上表為子良立碑事不行南豐縣伯赤斧大祖從祖弟也歴官為奉朝請以和謹爲太祖所知南康王子通理性慷慨慕立功名每讀書見忠臣烈士未嘗不廢卷曰一生之内當無愧古人梁文宣侯尚之敦厚有徳器仕齊為司徒建安王中兵叅軍一府稱為長者琅邪王僧䖍尤善之每事多與議决至天監初追謚文宣侯吳平侯景才辨識斷益政佐時蓋宗室令望景子勵弱不好㺯喜愠不行於色性率儉而器度寛裕左右嘗將羮正胷前翻之顔色不異徐呼更衣長沙元王弟藻性謙退不求聞達善屬文詞尤好古體自非公讌未嘗妄有所為縱有小文成輒棄本頻蒞數鎭民吏稱之推善下人嘗如弗及性恬靜獨處一室床有膝㾗宗室衣冠莫不楷則嘗以爵禄太過每思屏退門庭閒寂賔客罕通太宗尤敬愛之桂陽王象容止閒雅簡於交遊位丹陽尹始親庶政舉無失徳朝廷稱之臨川靖惠王宏性寛和篤厚在州二十餘年未嘗以吏事接郡縣世稱其長者安成王秀性方靜雖左右近侍非正衣冠弗之見繇是親友及家人咸敬焉秀為平南將軍江州刺史將發主者取堅船以為齋舫秀曰吾豈愛財而不愛士教所繇以牢者給叅佐下者載齋物既而遭風齋舫遂破秀有容觀每在朝百寮目為仁恕喜愠不形於色左右嘗以石擲殺所養鵠齋師請案其罪秀曰吾豈以鳥傷人在京師旦臨公事厨人進食誤而覆之去而登車竟朝不飯亦弗之誚也秀與高祖布衣昆弟及為君臣小心畏敬過於疎賤者高祖益以此賢之及薨故佐吏夏侯亶等表立墓碑詔許焉當時高才遊王門者東海王僧孺吳郡陸倕彭城劉孝標河東裴子野各製其文古未之有也南平元襄王偉性多恩惠尤愍窮乏常遣腹心左右歴訪里閭人士貧困吉凶不舉者即遣贍䘏平原王曼頴亡家貧無以殯友人江革徃哭之其妻兒對革號訴革曰建安王當知必為營理言未訖偉使至給其喪事得周濟焉每祁寒積雪則遣人載樵米隨乏絶者即賦給之鄱陽忠烈王恢通恕輕財好施凡歴四州所得俸禄隨而散之恢子範温和有氣識為衛尉卿每夜自廵警武帝喜其勞苦邵陵王綸武帝第六子輕財愛士不競人利府無儲積間有輒求既得即散士亦以此歸之武陵王紀少而寛和喜怒不形於色後梁安平王巖性仁厚善於撫接歴侍中荆州刺史尚書令東平王岌性敦和而好學義興王巘幼有令德能屬文時為明帝所愛陳始興郡王伯茂性聰敏好學謙恭鄱陽王伯山舉止閒雅喜愠不形於色永陽王伯智少敦厚有器局㝷陽王叔儼性凝重舉止方正後魏華山王鷙有武藝木訥少言性方厚每息直省闥雖暑月不解衣冠松滋侯子華為齊州刺史在官不為矯㓗之行陽平王熈聰達有雅操為宗屬所欽重樂平王丕少有才幹為世所稱明元愛其器度特優異之樂安王範為長安鎭都大將謙恭惠下雅性撫納百姓稱之東平王翰大武之子初封秦王拜侍中中軍大將叅軍典都曹事忠貞雅正百寮憚之淮陵侯大頭性謹密文成甚重之常山王素宗屬之懿而年老文成每引入訪以政事固辭疾歸第雅性方正居官五十載終始若一時論賢之武昌悼王鑒沈重少言寛和好士京兆王繼寛和容裕號為長者繼子羅字仲綱為散騎常侍雖父兄貴盛而虛已謙退恂恂接物彭城王勰姿性不羣小心謹愼初無過失雖閒居宴處亦無慢色惰容愛敬儒彦傾心禮待清正儉素門無私謁性仁孝咸陽王禧謀反被害後諸子每乏衣食唯勰歲中再三賑給之清河王懌寛仁容裕喜怒不形於色河間公子蘭以忠謹見寵孝文初賜爵建陽子京兆王子推孫悰寛和有度量美容貌風望儼然得喪之間不見於色性清儉不營産業身死之日家無餘財趙郡王謐弟譚性頗強立少為宗室所推敬高陽王雍子叡輕忽榮利愛翫琴書起家拜通直散騎侍郎廣陽簡王建子嘉少沈敏喜愠不形於色任城王澄子順宣武帝時四方無事國富民康豪貴子弟率以朋遊為樂而順篤志愛古性謇諤淡於利北齊平陽靖翼王淹性沈謹以寛厚稱齊安王廓字仁𢎞性長者無過行趙郡王琛除使持節都督定州刺史推誠撫納拔用士人甚有聲譽北平王貞沈審寛恕武成曰此兒得我鳯毛清河王岳長而敦直沈深有器量蘭陵王長恭嘗入朝而僕從盡散唯有一人長恭獨還無所譴罰後周邵公導顥第二子也導為大將軍性寛明善撫御凡所引接人皆盡誠臨事敬愼常若不及太祖每出征討導常居守深為吏人所附朝廷亦以此重之豳公廣文帝曽姪孫時晉公諸子及杞公亮等服翫侈靡踰越制度廣獨率繇禮則朝野稱焉虞國公仲子興性𢎞厚有志度雖流離世故而風範可觀廣川公測性仁恕好施在雒陽之日曾被竊盜所失物即其妻陽平公主之衣服州縣擒盜并物俱獲測恐此盜坐之以死不認焉遂遇赦免盜既感恩請為測左右及測從孝武西遷事極狼狽此人亦從測入關竟無異志測弟深少喪父事兄甚謹從弟神譽神慶幼孤深撫訓之義均同氣世亦以此稱之東平公神舉蒞職當官每著聲績兼好施愛士以雄豪自居故得任兼文武聲彰内外百寮無不仰其風則先輩舊齒至於今稱之隋穆王瓚世有令名於當世時人號曰楊三郎衛昭王爽有器局所治甚有聲右衛將軍處綱髙祖族父為性質直在官宏濟亦為當時所稱秦孝王俊伐陳之役以為山南道行軍元帥督三十總管水陸十餘萬屯漢口為上流節度陳將周羅㬋荀法尚等以勁兵數萬屯鸚鵡洲總管崔宏度請擊之俊慮殺傷不許羅㬋亦相率而降於是遣使奉章詣闕垂泣謂使者曰謬當推轂竟無尺寸之功比多慙耳上聞而喜之上開府達為人𢎞厚有局度楊素每言曰有君子之貎兼君子之心者惟楊達耳唐江夏王道宗敬慕賢士不以地勢凌人宗室中唯道宗及河間王孝恭昆季最為當代所重淮陽王道𤣥性謹厚好學多武藝進止閒雅廬江王瑗敦尚儒雅為公子而勵布衣之操河間王孝恭少沈敏有識量性寛厚以仁孝見稱太宗甚親顧之諸宗室中莫與為比然崇退讓無矜伐驕貴之色韓王元嘉閨門修整有類寒素士大夫其修身潔已内外如一諸王莫能及者唯霍王元軌抑其次焉元嘉子譔少以才行見知諸王子之中與琅邪王冲為一時之秀凡所交結皆當代名流霍王元軌謙愼自守與物無忤為人不妄接士在徐州唯與處士劉元平為布衣之交或問元平王之所長元平曰無長問者恠而復之元平曰夫人有短所以見其長至於霍王無所不備吾何以稱之哉嘗使國令徴封令曰請依諸國賦物貨易取利元軌曰汝為國令當正吾失乃説吾以利邪拒而不納元軌初封吳王太宗嘗問羣臣曰朕子弟孰賢侍中魏徴對曰臣愚闇不盡知其能唯吳王數與臣言未嘗不自失太宗曰朕亦器之卿以為前代誰比徴曰經學大雅亦漢之間平也繇是寵遇彌厚因令娶徴女焉同安郡王珣修身淳謹性自矜貴閨門之内黙如也信安郡王禕居家嚴整善訓諸子皆有令名禕子恒以門䕃早仕質性簡淡好古慕善在宗室中推為循良榮王琬素有雅稱風格秀整祿山反以琬為元帥數日薨於時士庶冀琬有所成功既殂謝逺近咸失望焉嗣吳王巘為宗正卿恤孤遺甥姪友愛過人深為士大夫之有禮教者稱慕髙平王道立曾孫涵簡素恭慎有名宗室官至右僕射鄭王曾孫勉為太子太師眞率素淡好古尚竒清亷簡易為宗臣之表勉二子纘納皆亷介有節後唐武皇季弟克寧凡征行無不衛從於昆仲之間最推仁孝小心恭謹武皇尤友愛之晉楚王重信歴事後唐明宗及閔帝末帝不恃貴戚能克己復禮嘗恂恂如也甚為時論所稱韓王敬暉為曹州防禦使亷愛䘏下不營財利不好妓樂部人安之漢魏王承訓少𢎞厚美姿儀從帝在藩邸輯睦宗親接下僚友有士君子之風髙祖器之每遣從帝主帳下親軍軍中有便宜事則馳以入奏奏必稱㫖屢有恩錫嘗嘆曰此諸侯賢子弟也少帝時累官至檢校司空及義旗南向贊開創之業人皆服其規畧車駕入汴命為赤尹尹正之務委親决之每因問安事有利於國者必具以聞帝帝喜而納之及杜重威叛援帝幸鄴以為東都留守俾之監撫内外咸畏而愛之及薨帝左右公卿大夫聞之者無不流涕册府元龜卷二百七十二
