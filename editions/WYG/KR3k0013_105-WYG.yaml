body:
  text: 冊府元龜巻一百五宋王欽若等撰帝王部惠民第二禮曰行慶施惠下及兆民又曰命有司發倉廪賜貧窮賑乏絶易稱振民育徳仲尼云博施於民必也聖乎皆惠愛之謂也王者誕膺大命司牧黎庶如天之葢如地之載則必澤及四海惠洽無垠天災流行動必軫慮人殃於疫時予之辜所以廢苑囿假池籞貸種食以賜鰥寡給公田而止流亡以至減服御損郎吏罷魚龍狗馬之戲開山澤陂湖之利均輸課役以勤勞來底慎節減財賦以濟困憫貧離逷爾卿士矜䘏是加則太上所謂聖人無常心以百姓心為心者斯可見矣漢高祖二年十一月詔故秦苑囿園池令民得田之文帝元年三月詔曰方春時和草木羣生之物皆有以自樂而吾百姓鰥寡孤獨窮困之人或阽於死亡阽音屋檐之檐近邊欲墮之意而莫之省憂為民父母将何如其議所以賑貸之後六年四月令諸侯無入貢弛山澤減諸御服損郎吏員發倉庾以賑民武帝建元元年七月罷苑馬㠯賜貧民養馬之苑舊禁百姓不得芻牧采樵今罷之元狩三年秋舉吏民能假貸貧民者以名聞減隴西北地上郡戍卒半是年山東被水災民多饑乏於是天子遣使虛郡國倉廪以賑貧猶不足又募豪富人相假貸尚不能相救乃徙貧民於關西及充朔方以南新秦中秦始皇遣蒙恬攘郤匈奴得其河南造陽之北千里地甚好於是為築城郭徙民居之名曰新秦四方雜錯奢儉不同今俗名新富貴者為新秦繇是名也七十餘萬口衣食皆仰給於縣官數歲貸與産業使者分部䕶之冠葢相望費以億計縣官大空元鼎二年四月山東被河災及歲不登數年人或相食方二三千里天子憐之令饑民得流就食江淮間欲留留處流謂恣其行移若水之流至所在有欲住者亦留而處也使者冠葢相屬於道䕶之下巴蜀粟以賑焉昭帝始元二年二月遣使者賑貸貧民無種食者元鳯三年罷中牟苑賦貧民宣帝本始四年正月詔曰葢聞農者興徳之本也今歲不登已遣使者振貸貧乏其令太官省膳損宰樂府減樂人使歸就農業丞相已下至都官令丞上書入榖輸長安倉助貸貧民民以車船載榖入關者得毋用𫝊地節元年三月假郡國貧民田三年詔池籞未御幸者假與貧民郡國宮館勿復修治流民還歸者假公田貸種食且勿筭事不出筭賦及給徭役元帝初元元年三月詔三輔太常郡國公田及苑可省者振業貧民振起之令有作業貲不滿千錢者賦貸種食四月詔江海陂湖園池屬少府者以假貧民勿租賦九月關東郡國十一大水饑或人相食轉傍郡錢榖以相救二年三月詔罷黄門乗輿犬馬黄門近署也故親幸之物屬焉水衡禁囿宜春下苑宜春下苑即今京城東南隅曲江池是少府佽飛外池漢儀注佽飛具矰繳以射鳬鴈給祭祀是故有池也嚴籞池田嚴籞射苑也池田苑中田也假與貧民五年四月罷角牴上林宮館希御幸者齊三服官齊國舊有三服之官春獻冠幘縰為首服紈素為冬服輕綃為夏服凡三縰即今之方目􅀢也紈素今之絹也輕綃今之輕紗也北假田官匈奴傳秦始皇渡河據陽山北假中王莽傳五原北假膏壤殖榖北假地名也鹽鐵官常平倉食貨志元帝即位天下大水關東都郡十一尤甚二年齊地饑榖石二百餘民多餓死瑯琊郡人相食在位諸儒多言鹽鐵官及北假官田常平倉可罷毋與民爭利帝從其議皆罷之成帝河平四年三月遣光禄大夫博士嘉等十一人行舉瀕河之郡瀕水厓也瀕河言傍河也水所毁傷困乏不能自存者財賑貸財與裁同謂量其等差而賑貸之鴻嘉三年秋渤海清河信都河水湓溢灌縣邑三十二敗官亭民舍四萬餘所滿昌師丹等數言百姓可哀帝數遣使者處業賑贍之平帝元始二年四月郡國大旱蝗青州尤甚民流亡安漢公四輔三公卿大夫吏民為百姓困乏獻其田宅者二百三十人王莽為太傅孔光為太師王舜為太保甄豐為少傅是為四輔莽復兼大司馬馬宮為司徒王崇為司空是為三公以口賦貧民計口而給其田宅後漢明帝永平五年發遣邊人在内郡者賜装錢人二萬九年四月詔郡國以公田賜貧人各有差章帝以永平十八年八月即位是年牛疫京師及三州大旱詔勿收兖豫徐州田租芻藁其以見榖賑給貧人建初元年七月辛亥詔以上林池籞田賦與貧人和帝永元五年二月戊戌詔有司省減内外廐及涼州諸苑馬自京師離宮果園上林廣城囿悉以假貧民恣得采捕不收其稅三月庚寅遣使者分行貧民舉實流冗冗者散也流散者舉按其實而給之也開倉賑廪三十餘郡九月詔其官有陂池令得采取勿收假稅二歲假猶租賃六年二月乙未遣謁者分行廪貸三河兖冀諸州貧民三月庚寅詔流民所過郡國皆實廪之八年四月詔賑貸并州四郡貧民九年六月蝗旱戊辰詔山林饒利陂池漁採以贍元元勿收假稅十一年二月遣使循行郡國廪貸被災害不能自存者令得漁採山林池澤不收假稅十二年二月詔貸被災諸郡民種糧賜下貧鰥寡孤獨不能自存者及郡國流民聽入陂池漁採以助蔬食閏四月賑貸燉煌張掖五原民下貧者榖六月舞陽大水賜被水災尤貧者榖人三斛十三年二月丙午賑貸張掖居延朔方日南貧民及孤寡羸弱不能自存者八月詔象林民失農桑業者賑貸種糧廪賜下貧榖食十四年四月庚辰賑貸張掖居延燉煌五原漢陽㑹稽流民十五年二月詔廪貸潁川汝南陳留江夏梁國燉煌貧民六月詔令百姓鰥寡漁採陂池勿收假稅二歲十六年正月己卯詔貧民有田業而以匱乏不能自農者貸種糧四月遣三府掾分行兖豫徐冀四州貧無以耕者為雇犂牛直安帝延平元年九月六州大水遣謁者分行虛實舉災害賑乏絶十月四州大水雨雹詔以宿麥不下賑賜貧人永初元年正月廪司𨽻兖豫徐冀并州貧民司𨽻領河南河内河東𢎞農都於雒陽魏末因為司州二月丙午以廣成游獵地廣成苑名在汝州西及被災郡國公田假與貧民九月癸酉調揚州五郡租米五郡謂九江丹陽廬江吳郡豫章也揚州領六郡㑹稽最逺葢不調也贍給東郡濟隂陳留梁國下邳山陽二年正月廪河南下邳東萊河内貧民二月乙丑遣光禄大夫樊凖呂倉分行冀兖二州廪貸流民十月庚寅廪濟隂山陽𤣥莵貧民十二月辛卯廪東郡鉅鹿廣陽安定定襄沛國貧民三年三月癸巳詔以鴻池假與貧民鴻池在雒陽東二十里假借也令得漁採其中四月己巳詔上林廣成苑可墾闢者賦與貧民四年正月辛卯廪上郡貧民各有差二月丁巳廪九江貧民七年九月調零陵桂陽丹陽豫章㑹稽租米賑給南陽廣陵下邳彭城山陽廬江九江饑民元初二年正月詔廪三輔及并涼六郡流冗貧民五年三月京師郡國五旱詔廪遭旱貧人順帝永建二年二月詔廪貸荆豫兖冀四州流冗貧人所在安業之三年四月癸卯遣光禄大夫案行漢陽及河内魏郡陳留東郡廪貸貧民陽嘉元年二月丁巳詔廪甘陵貧人大小口各有差戊辰以冀部比年水潦民食不贍詔案行廪貸勸農功賑乏絶三月庚寅大赦廪冀州尤貧民二年二月甲申詔以吳郡㑹稽饑荒貸人種糧桓帝建和元年二月荆揚二州人多餓死遣四府掾分行賑給永興元年七月郡國三十二蝗河水溢百姓饑餓流冗道路至有數十萬户冀州尤甚詔在所賑給乏絶安慰居業永夀元年二月司𨽻冀州司𨽻州雒陽也饑人相食勅州郡賑給貧弱若王侯吏民有積榖者一切貸得十分之三以助廪貸其百姓吏民者以見錢雇直雇猶酬也王侯須新租乃償須待也延熹九年三月司𨽻豫州饑死者十四五至有減户者遣三府掾賑貸之永康元年八月六州大水渤海海溢詔州郡其亡失榖食廪人三斛獻帝興平元年榖一斛五十萬豆麥一斛二十萬人相食啖白骨委積帝使侍御史侯汶出太倉米豆為饑人作糜粥經日而死者無數帝疑賑䘏有虛乃親於御坐前量試作糜乃知非實袁宏紀曰時勑侍中劉艾取米豆五升御前作得糜三滿盂於是手詔尚書曰米豆五升得糜三盂而人委頓何也使侍中劉艾出讓有司於是尚書令以下皆詣省閤謝奏收侯汶考實詔曰未忍致汶於理可杖五十自是之後多得全濟魏文帝初嗣位以漢延康元年二月下令曰池苑所以禦災荒也設禁非所以便民其除池籞之禁黄初三年七月冀州大蝗民饑使尚書杜畿持節開倉廪以賑之五年以冀州饑遣使者開倉廪賑之明帝景初元年九月冀兖徐豫四州民遇水遣侍御史循行沒溺死亡及失財産者令諸在所開倉賑救之晉武帝泰始四年九月青徐兖豫四州大水伊雒溢合於河開倉以賑之六年七月以隴右五郡遇㓂害不能自存者廪貸之咸寧三年九月兖豫徐青荆益梁七州水傷秋稼詔賑給之惠帝元康五年荆揚兖豫徐青等州大水詔遣御史廵行賑貸八年正月詔發倉廪賑雍州饑人元帝太興元年十二月江東三郡饑遣使賑給之二年三吳大饑帝遣黄門侍郎虞􅔎桓􅉓開倉廪賑給成帝咸康元年二月揚州諸郡饑遣使賑給二年七月揚州㑹稽饑開倉賑給孝武帝以咸安二年七月即位是歲三呉大旱人多餓死詔所在賑給太元十九年七月荆徐二州大水傷秋稼遣使賑䘏之安帝義熈九年四月罷臨沂湖熟皇后脂澤田四十頃以賑貧人弛湖池之禁後魏明元神瑞二年十月詔曰古人有言百姓足則君有餘未有民富而國貧者也頃者已來頻遇霜旱年榖不登百姓饑寒不能自存者甚衆其出布帛倉榖以賑貧窮泰常八年十月以歲饑詔所在開倉賑給太武以泰常八年十一月即位開倉庫賑窮乏河南流民相率内屬者甚衆神䴥四年二月定州民饑詔開倉以賑之太平真君元年州鎮十五民饑詔開倉賑䘏九年二月山東人饑詔開倉賑之文成興安元年十二月癸亥詔以營州蝗開倉賑䘏太安三年十二月以州鎮五蝗民饑使使者開倉以賑之五年十二月詔曰朕承洪業統御郡㝢思恢政化以濟兆民故薄賦歛以實其財輕徭役以紓其力欲令百姓修業人不乏匱而六鎮雲中高平二雍秦州徧遇災旱年榖不收其遣開倉廪以賑之有流徙者諭還桑梓欲市糴他界為開傍郡通其交易之路若典司之官分賦不均使上恩不達於下下民不贍於時加以重罪無有攸縱和平五年二月詔以州鎮十四去歳蟲水開倉賑䘏獻文天安元年州鎮十一旱民饑開倉賑䘏之皇興元年九月詔賜六鎮貧人布三疋二年十一月以州鎮二十七水旱開倉賑䘏四年正月詔州鎮十一民饑開倉賑䘏十一月詔弛山澤之禁孝文延興二年六月安州民遇水雹丐租賑䘏九月己酉詔以州鎮十一水丐民田租開倉賑䘏三年三月壬午詔諸倉屯榖麥充積者出賜貧民十二月庚戌詔開外苑囿聽民樵採是歲州鎮十一水旱丐民田租開倉賑䘏四年州鎮十三大饑丐民田租開倉賑之太和元年正月雲中饑開倉賑䘏十二月州郡八水旱蝗民饑開倉賑䘏二年十二月州鎮二十餘水旱民饑開倉賑䘏三年六月辛未以雍州民饑開倉賑䘏四年四月甲申賜天下貧人一户之内無雜財榖帛者廪一年是歲詔以州鎮十八水旱民饑開倉賑䘏五年十二月癸巳詔以州鎮十二民饑開倉賑䘏六年八月癸未朔分遣大使廵行天下遭水之處丐其租賦貧儉不能自存者賜以粟帛庚子罷山澤禁七年三月甲戌以冀定二州民饑詔郡縣為粥於路以食之又弛關津之禁任其往來六月定州上言為粥所活九十四萬七千餘口九月冀州上言為粥給饑民所活七十三萬一千七百餘口十二月庚午開林慮山禁與民共之詔以州鎮十三民饑開倉賑䘏八年十二月詔以州鎮十五水旱民饑遣使者循行問所疾苦開倉賑䘏十年十二月乙酉詔以汝南潁川大饑丐民田租開倉賑䘏十一年二月甲子詔以肆州之鴈門及代郡民饑開倉賑䘏七月己丑詔曰今年榖不登聽民出關就食遣使者造籍分遣去留在所開倉賑䘏八月辛巳罷山北苑以其地賜貧民是年大旱京都民饑加以牛疫公私闕乏時有以馬騾及槖駞供駕輓耕載詔聽民就豐行者十五六道給糧廪所在三長贍養之臣欽若等曰若今里正村正也遣使者時省察焉留業者皆令主司審覈開倉賑貸其有特省不自存者悉簡集為粥於街衢以救其困十二年十一月詔以雍豫二州民饑開倉賑䘏十三年四月州鎮十五大饑詔所在開倉賑䘏二十年十二月甲子以西北州郡旱儉遣侍臣廵察開倉賑䘏乙丑開鹽池之禁與民共之二十一年四月帝幸長安遣侍臣分省縣邑賑賜榖帛宣武以太和二十三年四月即位是年州鎮十八水民饑分遣使者開倉賑恤景明元年五月北鎮大饑遣兼侍中楊播廵撫賑恤是歲十七州大饑分遣使者開倉賑恤正始三年四月詔罷鹽池禁四年八月燉煌民饑開倉賑恤九月司州民饑開倉賑恤永平元年三月丙午以去年旱儉遣使者所在賑恤二年四月詔以武川鎮饑開倉賑恤三年五月詔以冀定二州旱儉開倉賑恤四年二月詔青齊徐兖四州民饑其遣使賑恤延昌元年正月以頻年水旱百姓饑敝分遣使者開倉賑恤三月州郡十一大水詔開倉賑恤又以京師榖貴出倉粟八十萬石以賑恤貧者四月詔河北民就榖燕鎮二州又詔饑民就榖六鎮五月詔天下有粟之家供年之外悉貸饑民六月詔出太倉粟五十萬以賑京師及州郡饑民二年二月賑恤京師貧民又以六鎮大饑開倉賑贍閏二月以苑牧之地賜貸遷民無田者四月以絹十五萬疋賑恤河南饑民六月青州民饑詔使者開倉賑䘏三年四月青州民饑開倉賑之孝明熈平元年四月瀛州民饑開倉賑䘏二年十月庚寅以幽瀛冀滄四州大饑遣尚書長孫權兼尚書鄧羡元纂等廵撫百姓開倉賑給是月戊戌以光州饑敝遣使賑䘏神龜元年正月幽州大饑民死者三千七百九十九人詔刺史趙邕開倉賑恤閏七月開鎮州恒山之禁與民共之三年八月詔曰狂蠢肆暴陵竊北垂雖軍威時接賊徒懾遁然獯虐所過多罹其禍言念斯弊有軫深懐可勑北道行臺遣使廵檢遭㓂之處饑餒不立者厚加賑恤務令存濟後周閔帝元年三月壬子詔曰浙州去歲不登厥民饑饉朕用愍焉其遣使廵檢有窮餒者竝加賑恤武帝建徳四年岐寧二州民饑開倉賑䘏靜帝以大象二年五月即位六月罷諸魚池及山澤公禁者與百姓共之隋髙祖開皇元年以官牛五千頭分賜貧人五年八月河南諸州水遣民部尚書邳國公蘇威賑給之六年二月山南荆浙七州饑遣前工部尚書長孫毗賑䘏之八年八月河北諸州饑遣吏部尚書蘇威賑䘏之十八年以山東頻年霖雨杞宋陳亳曹載譙等諸州逺於滄海皆困水災所在沉溺帝遣使将水工廵行川源相視高下發隨近丁以疏導之困乏者開倉賑給前後用榖五千餘萬石遭水之處租調皆免自是頻有年矣仁夀二年河南北諸州大旱遣工部尚書楊逹賑䘏之唐高祖武徳元年十二月開倉以賑貧乏二年閏二月出庫物三萬叚以賑窮乏七年關中河東諸州旱遣使賑給之太宗貞觀元年夏山東諸州大旱詔所在賑給之二年正月遣使賑窮乏三月己未遣中書侍郎温彦博往山東賑恤窮乏三年四月詔逃户初遷交無糧貯州縣長官量加賑䘏是年秋貝譙鄆泗沂徐濠蘇隴等九州水徳戴廓三州蝗六輔之地及綿始利三州旱北邉諸州霜竝遣使賑恤之四年十二月甲辰臘帝狩於鹿苑見野人多藍縷遣侍中王珪賑賜貧人焉七年六月甲子滹沲決於洋州壊人廬舍遣諫議大夫孫伏伽賑䘏之是年山東河南之地三十餘州水遣使賑䘏之九年秋關東劒南之地二十四州旱分遣使賑恤之十年關東及淮海之地二十八州水遣使賑恤之十一年七月詔以水災其雒州諸縣百姓漂失資産乏絶糧食者宜令使人與之相知量以義倉賑給布告天下使明知朕意庚子賜遭水旱之家帛十五疋半毁者八疋是月廢明徳宫之𤣥圃苑院分給河南雒陽遭水者九月丁亥黄河泛溢毁河陽中潭帝幸白司馬坂以觀河溢河陽縣㳂河居人被流漂者賜粟帛有差十二年吳楚巴蜀之地二十六州旱遣使賑恤之十五年二月建州言去秋鼠災損稼發義倉賑之三月罷襄城宫分賜百姓十七年七月汝南諸州旱開倉賑給十八年二月己酉幸靈口村落偪側問其受田丁三十畝遂夜分而寝憂其不給詔雍州録尤少田者竝給復移之於寛鄉九月榖襄豫荆徐梓忠綿宋亳十州言大水竝以義倉賑給之十九年正月易州言去秋水害稼開義倉賑給之二十年正月沁州言去歲水傷稼詔令賑給二十一年七月易州水詔令賑給八月冀易幽瀛常豫邢趙八州大水遣屯田員外韓贍等分行所損各家賑䘏是月萊州螟發倉以賑貧乏十月絳陜二州旱詔令賑貸湖州給貸種食十一月䕫州旱渝州言鼠害秋稼竝詔賑恤十二月蒲州旱渠州蝗及鼠害秋稼竝加賑恤二十二年正月詔建州去秋蝗以義倉賑貸二月詔泉州去秋蝗及海水泛溢開義倉賑貸是歲瀘州交州越州渝州徐州水戎州鼠傷稼開州萬州旱通州秋蝗損稼竝賑貸種食高宗永徽二年正月詔曰朕寅畏三靈憂勤萬類分宵軫慮昃晷忘飡跡在嵓廊心遍天下懼八政之或舛憂一物之未安欲使菽粟積於京坻禮讓興於萌俗而徳不被逺誠未動天政道有虧咎徵斯應去歲三輔之地頗被蝗螟天下諸州或遭水旱百姓之間致有罄乏此繇朕之不徳兆庶何辜今獻歲肇春東作方始糧廪或窘事資賑給其遭蟲水處量以義倉賑貸貧乏雍同二州各遣郎中一人充使廵問務盡哀矜之㫖副朕繾綣之心九月廢玉華宫以為佛寺苑内及諸曹司舊是百姓田宅竝還本主又以同州吉泉牧地分給貧民四年光婺滁潁等州旱兖䕫果忠等州水竝貸賑之五年六月詔工部侍郎王儼往河北較行遭水諸州乏絶者賑貸之六年秋雒水泛溢壊天津橋冀沂宻兖滑汴鄭婺等州雨水害稼詔令賑貸之總章二年七月劒南益瀘嶲茂陵卭雅綿翼維始簡資榮隆果梓普遂等一十九州大旱百姓乏絶總三十六萬七千六百九十户遣司珎大夫路勵行存問賑貸許其往荆襄等州就榖九月括州暴雨大風海水泛漲溢壊永嘉安固二縣城郭及廬舍六千餘家漂溺人畜遣使賑給咸亨元年九月辛未詔賛善大夫崔承福通事舍人韋太真司衛承鉗耳知正等使往江西南運糧以濟貧乏十月壬辰詔雍同華等州百姓有單貧孤苦不能得食及於京城内流冗街衢乞丐㕓肆者宜令所司撿括具録名姓本貫属於故城内屯監安置量賜皮裘衣装及糧食縣官與屯監官相知檢校十一月乙卯令運劒南義倉米萬石浮江西下以救饑人四年七月辛巳婺州暴雨山水泛漲溺死者五千人漂損居宅六百家詔令賑給之儀鳯四年二月命東都出粟及逺年糙米就市糶以救饑人二年八月丁卯朔河南北大水詔百姓乏絶者任往江淮南就食仍遣使分道給之中宗神龍元年四月雍州同官縣大雨雹鳥獸死又大水漂流居人四五百家遣員外郎一人廵行賑給六月河南河北十七州大水漂流居人害苗稼遣中郎一人廵行賑給二年六月遣使賑貸河北遭水之家十二月以河北諸州遭水人多阻饑令侍中蘇瓌存撫賑給三年夏山東河南二十餘州大旱饑饉疾疫死者二千餘人命户部侍郎樊悅廵撫賑給景龍二年二月以河朔諸州多饑乏命魏州刺史張知泰攝右御史臺大夫廵問賑恤七月荆州水制令賑䘏三年三月制發倉廪賑饑人十月以關中旱及水命大理少卿侯令徳等分道撫問賑給睿宗景雲二年八月河南淮南諸州上言水旱為災出十道使廵撫仍令所在賑恤𤣥宗開元二年正月戊寅勑曰如聞三輔近地幽隴之間頃縁水旱素不儲蓄嗷嗷百姓已有饑者方春陽和物皆遂性豈可為之君上而令有窮愁靜言思之遂忘寢食宜令兵部員外郎李懐讓主爵員外郎慕容珣分道即馳驛往岐華同幽隴等州指宣朕意灼然乏絶者速以當處義倉量事賑給如不足兼以正倉及永豐倉米充仍令節減務救懸絶者還日奏聞三年十一月乙丑詔曰君以人為本人以食為天雖水旱蟲螟代則常有有一於此胡寧不恤間者河南河北災蝗水澇之處其困斃未獲安存念之憮然不忘寤寐宜令禮部尚書鄭惟忠持節河南宣撫百姓工部尚書劉知柔持節河北道安撫百姓其被蝗水之州量事賑貸務安其俗稱朕意焉五年五月詔曰河南河北去年不熟今春亢旱全無麥苗雖令賑給未能周贍所在饑斃特異尋常如聞至今猶未得雨事須存問以慰其心從此發使又恐勞擾宜降恩制令本道按察使安撫其有不收麥處更量賑䘏使及秋收仍令勸課種黍稌及早榖等使得接糧應有事急要者宜委使人量停事有不便於人須有釐革者准此六年三月詔曰徳惟善政政在養人必将厚生阜俗利物𢎞義朕奉若天命嗣膺王業思一物失所以百姓為心間者河北河南頗非善熟人間糧食固應乏少頃雖分遣使臣已令廵問猶慮鰥獨不能自存凡立義倉用為歲備今舊榖向沒新榖未登蠶月務殷田家作苦不有惠恤其何以安宜開彼用儲時令貸給况京坻轉積歲月滋壊因而變造為利𢎞多将以散滯收贏理財均施所司合作條件俾便公私八年二月以河南淮南江南頻遭水旱遣吏部郎中張旭等分道賑恤四月華州刺史竇思仁奏乏絶户請以永豐倉賑給從之十年正月命有司收内外官職田以給逃還貧下户其職田以正倉粟畝二斗給之四月詔曰朕聞懐州去年偏併不熟宜令刺史崔子源察審問貧下不支濟者量加賑貸八月以東都大雨伊汝等水泛漲漂壊河南府及許汝仙陳等州廬舍數千家遣户部尚書陸象先存撫賑給十一年正月詔河南府遭水百姓前令量事賑濟如聞未能存活春作将興恐乏糧用宜令王怡簡問不支濟者更賑給務使安存又以懐州去歲旱損命有司量加賑給十二年八月詔曰蒲同兩州自春偏旱慮至來歲貧下少糧宜令太原倉出十五萬石米付蒲州永豐倉出十五萬石米付同州減時價十錢糶與百姓十四年九月八十五州言水河南河北尤甚同福蘇常四州漂壊廬舍遣户部侍郎宇文融簡覆賑給之十五年二月遣右監門将軍黎敬仁往河北賑給貧乏時河北牛畜大疫也七月戊寅冀州幽州莫州大水河水泛溢漂損居人室宇及稼穡竝以倉糧賑給之丙辰詔曰同州鄜州近屬霖雨稍多水潦為害念彼黎人載懐憂惕宜令侍御史劉彦回乗𫝊宣慰其有百姓屋宇田苗被漂損者量加賑給八月制曰河北州縣水災尤甚言念蒸人何以自給朕當宁興想有勞旰昃在予之責用軫于懐宜令所司量支東都租米二十萬石賑給十二月以河北饑甚轉江淮租米百萬餘石賑給之十六年十月詔曰河南道宋亳許仙徐鄆濮兖州奏旱損宜令右監門衛大将軍黎敬仁往彼廵問如有不支濟户朕須賑給與州縣長官相知量事處置訖回日具狀奏聞十一月詔曰所在陂澤元合官收至於編甿不合自占然以為政之道貴在利人庶𢎞益下俾無失業前令檢括入官者除昆明池外餘竝任百姓佃食二十年二月辛卯制曰用天之道分地之利此庶人之事也非濟育無以致其功務在三時遵其五教此邦家之典也非悅勸無以成其業朕當夜分思理明發聽朝惠綏羣元若保赤子議獄以緩死薄征以息人年榖頗登時政庶緝而家給之長仍或未均藴利之徒猶聞贅聚靜言其事應有厥繇如聞貧下之人農桑之際多闕糧種咸求倍息致令貧者日削富者歲滋非所謂益寡裒多務穡敦本之方也思𢎞惠恤以拯貧窶且義倉元置與衆共之将以克濟斯人豈徒蓄我王府自今已後天下諸州每置農桑令諸縣審責貧户應糧及種子據其口糧貸義倉至秋熟後照數徵納庶耕者成業嗇人知勸生厚而徳正時順而物成國富家肥於是乎在凡厥主守稱朕意焉三月詔曰天生蒸民樹之司牧将興化濟俗育物阜時朕對越明靈作人父母因地利以觀穡樂歲成而報功期於富庶俾之寧緝故常納隍夕惕負扆晨興受一服則思紵績之勤務三時則憂􅅵畝之害每因水潦方降則使隄防必葺去歲已來頻有處分所繇簡慢或未躬勤河南數州致滋水損州縣牧宰何以自安被損之家何以存濟宜令户部侍郎張敬輿宣慰簡覆如實有損貧下不支濟百姓量事賑給務令優恤稱朕意焉是歲河北榖貴遣太子賔客盧從愿為宣撫處置使開倉以救饑餒二十一年四月以久旱命太子少保陸象先户部尚書杜暹等七人往諸道賑給是年關中久雨害稼京師饑詔出太倉粟二百萬石賑給之二十二年正月懐衛邢相等州乏糧遣中書舍人裴敦復廵問量給種子二月秦州地震廨宇及居人廬舎摧壊畧盡遣使存問賑恤之二十三年八月制江淮以南有遭水處委本道使賑給之二十五年四月戊申詔有司以咸宜公主秦州牧地分給逃還貧下户二十六年正月丁丑制頃以櫟陽等縣地多鹹鹵人力不及便至荒廢近者開決皆生稻苗亦既成功豈専其利京兆府界内應雜開稻田竝宜散給貧者及逃還百姓以為永業二十八年十月河北十三州水勑本道採訪使量事賑給二十九年秋河北二十四州雨水害傷稼命御史中丞張倚往東都及河北賑䘏天寳十二載正月丁卯詔曰河東及河淮間諸郡去載㣲有澇損至於乏絶已令給糧如聞郡縣尚未賙恤方春在候農事将興或慮百姓艱難未能存濟宜毎道各令御史一人即往宣撫應有不支持者與所繇計㑹隨事賑給如當郡無食及不充聽取比郡者分付務令勝致以副朕懐十三載秋大霖雨自八月至十月凡六十餘日始霽京城坊市垣墉隤毁殆盡米價踴貴詔出太倉米百萬石於城中分十場賤糶與貧人十四載正月以歲饑乏故下詔曰嘉榖不登古今薦有勸分之義皇王善經且豐熟已來歲時頗久豈有餘糧棲畝誠恐極賤傷農所以積之京坻用防水旱爰自二載稍異有年粟麥之間或聞未贍比開倉賤糶以濟時須雖且得支持而價未全減餱糧種子尚慮不充是用賙恤俾之寛泰在於處置須均有無今更出倉務令家給俾其樂業式副朕心宜於太倉出糶一百萬石分付京兆府與諸縣糶每升減於時價十文河南府畿縣出三十萬石太原府出三十萬石滎陽臨汝等郡各出粟二十萬石河内郡出米十萬石陜郡出米二萬石并每斗減時價十文糶與當處百姓應縁開場差官分配多少一時各委府郡縣長官處置仍令採訪使各自勾當其太倉含嘉出粟兼令監倉使與府縣計㑹處分其奉先同官華原等縣與中部郡地近宜准諸縣例數便於中部請受其餘縣有司者仰准此其天下府縣百姓去載有灾損不支濟者仰所繇審勘責除有倉糧之外仍便據籍地頃畝量與種子京兆府及華陽馮翊扶風等郡既是近輔須别優矜雖非損户或有乏少種子者亦仰每鄉量宜准給并委採訪使與府郡長官計㑹即與處置使及營農使其種子既須好粟仍取新地稅分付京畿府郡京草雖已加價尚聞難辦宜委度支各與所繇計㑹支料得至今載終已來用足之外應未送者量事停減賑給糶倉矜貧濟乏務從撫實無使隱欺如官人及富有之家典正并㩆攬諸色輙私侵糶兼有乞取或虛著人名詐來請受者其自五品已上官䕃人等録奏當别有處分六品已下并白身者便決一頓仍准法科繩所繇等官不能覺察及自抵犯者亦與同罪肅宗乾元三年二月以米貴斗至五百文多餓死令中使於西市煮粥以飼餓者冊府元龜巻一百五
