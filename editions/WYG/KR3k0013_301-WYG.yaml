body:
  text: 册府元龜卷三百一宋王欽若等撰外戚部封拜夫正位居體周官貴内治之敎綏族展親良史稱外助之義三代已降后妃之家或藉長樂之親或因椒房之寵重侯累爵席寵連封或一門三主或同族五侯分食名城預聞邦政車服之制名器之重寖或踰焉西京吕王之勢東都梁竇之權不反三隅同歸一貫俾上徵不當之譏下免無功之誚惟明聖能焉申伯周宣王元舅也為邑於謝因是故謝邑之人而為國也紀侯者周桓王納后於紀紀季子爵故先襄為侯漢吕公高帝元年以后父賜號臨泗侯吕澤以后兄封周吕侯吕釋之以后兄封建成侯吕則以孝惠二年嗣建成侯吕台嗣周吕侯澤以高祖九年更封為鄜侯高后元年為吕王吕嘉以高后三年嗣台為王吕通嘉弟高后六年封腄侯八年為燕王吕庀匹履切通弟以高后八年封東平侯吕産台弟以高后元年封汶侯六年為吕王七年為梁王吕種建成侯則弟以高后元年封奉吕宣國王七年更封不其侯吕禄種弟高后元年封漢陽侯八年為趙王吕平以惠帝皇太后姊長姁子元年四月丙寅封扶柳侯吕勝以皇太后昆弟子七年封贅其侯吕忿以皇太后昆弟子八年封吕成侯吕營以皇太后昆弟子八年封祝兹侯薄昭薄太后弟文帝舅也元年封軹侯駟鈞以齊王舅封鄔侯趙兼以淮南王舅封周陽侯竇廣國以景帝皇太后弟封章武侯竇彭祖以皇太后兄子封南皮侯竇嬰以皇太后昆弟子以破吳楚封魏其侯王信以景帝皇后兄封蓋侯田蚡以武帝皇太后同母弟封武安侯田勝以皇太后同母弟封周陽侯衞青以武帝衞皇后弟封長平侯青三子在襁褓中皆為列侯伉為宜春侯不疑為隂安侯登為發干侯霍去病以衞皇后姊子亦以軍功為冠軍侯李廣利武帝李夫人之兄夫人蚤卒帝以廣利為貳師將軍延年為協律都尉上官安以昭帝皇后父為驃騎將軍封桑樂侯許廣漢以宣帝皇太子外祖父封昌成君霍氏誅許后子立為皇太子乃封平恩侯王無故以宣帝舅為闗内侯封平昌侯王武以帝舅為闗内侯封昌樂侯王奉光以皇后父為闗内侯封印成侯王舜以皇太后兄為侍中中郎將封安平侯史高以悼皇考舅子侍中闗内侯封樂陵侯史曾以悼皇考舅為侍中中郎將闗内侯封將陵侯史𤣥以悼皇考舅子侍中中郎將闗内侯封平臺侯許舜以皇太子外祖父同産弟長樂衞尉封博望侯許延夀以皇太子外祖父同産弟侍中闗内侯封樂成侯王禁以元帝皇后父封陽平侯王崇以成帝皇太后母弟散騎光禄大夫闗内侯封安成侯王譚以皇太后弟闗内侯封平阿侯王商以皇太后弟闗内侯封成都侯王立以皇太后弟闗内侯封紅陽侯王根以皇太后弟闗内侯封曲陽侯王逢時以皇太后弟闗内侯封高平侯王莽以帝舅曼子封新都侯王莽為射聲校尉久之叔父成都侯商上書願分邑以封莽及長樂少府戴崇侍中金涉胡騎校尉箕閱上谷都尉陽並中郎陳湯皆當世名臣咸為莽言帝由是賢莽永始元年封莽為新都侯國南陽新野之都鄉千五百戸王音以皇太后從弟為大司馬車騎將軍録尚書事音既以從舅越親用事小心親職詔曰車騎將軍音宿衞忠正勤勞國家前為御史大夫以外親宜典兵馬入為將軍不獲宰相之封朕甚慊焉其封音為安陽侯食邑與五侯等俱三千戸趙臨以婕妤趙氏父封為陽城侯王欽以皇太后弟封新城侯淳于長以侍中衞尉封定陵侯馮參以中山王舅封宜鄉侯丁明以哀帝舅封陽安侯傅晏以皇后父封孔鄉侯丁滿以帝舅封平周侯傅喜以帝祖母皇太后從父弟大司馬封高武侯傅商以皇太后從父弟封汝昌侯鄭業以皇太后同母弟子封陽新侯衞寳平帝之舅平帝為成帝後賜寳之弟𤣥爵闗内侯後漢樊宏光武之舅建武五年封長羅侯十三年封弟丹為射陽侯兄子尋互鄉侯族兄忠更父侯十五年定封宏夀張侯宏卒子鯈嗣又封宏少子茂為平望侯樊氏侯者凡五國鄧晨娶光武姊元光武即位封晨房子侯帝又感悼元沒於亂兵追封晨長子汎為吳房侯以奉公主之祀郭况光武郭后之弟小心謹慎年始十六拜黄門侍郎封綿蠻侯后廢為中山太后進封况大國為陽安侯陽安縣屬汝南郡故城今豫州朗山縣故道國城是也后從兄竟以騎都尉從征伐有功封為新郪侯官至東海相新郪縣屬汝南郡故城今在潁州汝隂縣西北郪丘城是也郪音七私切竟弟正為發干侯發干縣屬東郡故城在今博州堂邑縣西南官至太中大夫后叔父梁早終無子其壻南陽陳茂以恩澤封南蠻侯蠻音力全切竟子嵩孫駿並坐楚王英事失國章帝建初中詔封嵩子勤伊亭侯駿觀都侯陰識光烈皇后之兄更始二年始封識隂徳侯建武二年光武以后為貴人遣使迎貴人於新野并徴識識隨貴人至以為騎都尉更封陰鄉侯十五年定封原鹿侯許昌楚王英舅子英明帝之弟帝為太子時英常獨歸附太子太子特親愛之及即位數受賞賜特封昌龍舒侯秦彭同産女弟永平中入宫掖庭為貴人有寵彭以貴人兄隨四姓小侯擢為開陽城門侯馬廖明徳皇后兄也章帝即位欲封諸舅明徳馬太后不聽建初四年天下豐稔方陲無事帝遂封三舅廖防光為列侯並辭讓願就闗内侯太后聞之曰聖人設敎各有其方知人情性莫能齊也吾少壯時但慕竹帛志不顧命今雖已老而復戒之在得故日夜惕厲思自降損居不求安食不念飽冀乗此道不負先帝所以化導兄弟共同斯志欲令瞑目之日無所復恨何意老志復不從哉萬年之日長恨矣廖等不得已受封爵而退位歸第又云有司連據舊典奏封廖等累讓不得已建初四年廖封順陽侯防封頴陽侯光封許侯俱以特進就事永光四年廖卒子遵嗣徙封程鄉侯無子國除元初三年鄧太后詔封廖孫度頴陽侯防後徙封翟鄉侯永初七年詔封光子明邰鄉侯陰棠梁王暢舅陰貴人之族章帝建初二年封西陵侯竇憲章帝建初二年女弟立為皇后拜憲為郎稍遷侍中虎賁中郎將弟篤黄門侍郎兄弟親幸並侍宫省和帝即位太后臨朝㑹南單于請兵北伐拜憲車騎將軍金印紫綬督兵出塞大破北單于詔使中郎將即五原拜憲大將軍封武陽侯邑二萬戸憲因辭封許之明年詔曰大將軍憲前歳出征克滅北狄朝加封賞固讓不受舅氏舊典並蒙爵土西漢故事帝舅皆封侯其封憲冠軍侯邑二萬戸篤郾侯景汝陽侯瓌夏陽侯各六千戸憲獨不受封鄧騭女弟為和帝貴人兄弟皆除郎中貴人立為皇后騭三遷虎賁中郎將京悝𢎞閶皆黄門侍郎京卒於官延平元年拜騭車騎將軍儀同三司悝虎賁中郎將𢎞閶皆侍中安常永初元年封騭上蔡侯悝葉侯𢎞西平侯閶西華侯食邑各萬户獨騭以定䇿功增邑三千戸騭等辭遂逃避使者間闗詣闕陳乞太后不聽騭頻上疏至六乃許之𢎞以治歐陽尚書授帝禁中病卒詔鴻臚持節即𢎞殯封子廣徳為西平侯後以帝師之重分西平之都鄉封廣徳弟甫徳為都鄉侯四年又封京子黄門侍郎珍為安陽侯五年悝閶相繼並卒遺言薄葬不受爵贈太后並從之乃封悝子廣宗為葉侯閶子忠西為華侯建光元年太后崩未及大斂帝復申前命封騭為上蔡侯位特進後禹曾孫香子女為桓帝后帝又紹封騭從弟故度遼將軍遵子萬世南鄉侯拜河南尹閻暢為侍中安帝元初元年帝選其女入掖庭二年立為皇后三年暢以父后為長水校尉封北春侯食邑四千尸暢卒子顯嗣及安帝親政事顯及弟景耀晏並為卿校典禁兵延光元年更封顯長社縣侯食邑三千五百户顯景諸子年皆童齔並為黄門侍郎梁竦有三男三女章帝納其二女皆為貴人生和帝竇皇后養以為子竇氏譖殺二貴人而竦死獄中家徙九真竇憲敗還竦妻子封子棠樂平侯雍乘氏侯翟單父侯邑各五千戸諸梁内外以親疎補郎謁者棠官至大鴻臚雍少府宋楊女為章帝貴人安帝之祖母安帝即位封楊四子皆為列侯食邑各五千戸宋氏為卿校侍中大夫謁者郎吏十餘人孝徳后異母弟次及達生人諸子九人皆為清河國郎中梁商少以外戚拜郎中順帝永建元年襲父雍封乗氏侯三年順帝選商女及妹入掖庭遷侍中屯騎校尉陽嘉元年女立為皇后妹為貴人加商位特進更增國土二年封子冀為襄邑侯商讓不受三年以商為大將軍固稱疾不起使太常桓焉奉䇿就第即拜乃起詣闕受命商薨子冀嗣及商葬拜冀大將軍弟侍中不疑河南尹桓帝立建和元年益封冀一萬三千戸又封不疑弟蒙西平侯冀子裔襄邑侯各萬户和平元年重增封冀萬户并前所襲合三萬戸永興二年又封不疑子馬頴陰侯裔子桃城父侯鄧香女桓帝永興中入掖庭為采女明年封兄鄧演為南頓侯位特進演薨子康嗣及后為皇后乃追封贈香車騎將軍安陽侯更封康泚陽侯弟統襲母昆陽君宣封昆陽侯統從兄㑹襲安陽侯統弟秉淯陽侯宗族皆列郎將竇武長女桓帝時選入掖庭桓帝以為貴人拜武郎中其冬貴人立為皇后遷越騎校尉封槐里侯後從武興太后定䇿立靈帝拜武大將軍靈帝立論定䇿功更封武為聞喜侯子機渭陽侯拜侍中兄子紹侯遷步兵校尉紹弟靖西鄉侯為侍中監羽林左騎宋酆女靈帝建寧三年選入掖庭為貴人明年立為皇后父酆執金吾封不其鄉侯何進異母女弟靈帝時選入掖庭為貴人有寵於帝拜進郎中再遷頴川太守光和二年貴人立為皇后徴進入拜侍中將作大匠河南尹中平元年進以發張角别黨馬元義謀封慎侯弟河南尹苗以破滎陽羣賊功封濟陽侯魏卞秉武宣后弟初以功封都鄉侯黄初七年進封開陽侯邑千二百戸為昭烈將軍秉卒蘭嗣蘭卒分秉爵封蘭弟琳列侯蘭子隆女為高貴鄉公后隆以后父為光禄大夫位特進封睢陽鄉侯甄逸女文帝納之於鄴明帝太和元年二月以中山魏昌之安城鄉戶千追封逸諡曰敬侯適孫像襲爵為射聲校尉青龍中薨改封魏昌縣諡曰貞侯子暢嗣又封暢弟温韡豔為列侯又封后從兄子毅及像弟三人皆為列侯嘉平中復封暢子二人為列侯郭表文徳皇后蚤喪兄弟以從兄表繼父永後后立表為奉車都尉明帝太和四年詔封表安陽亭侯又進爵鄉侯増邑并前五百户以表子詳為騎都尉後明帝進表爵為觀津侯增戸五百并前千户遷詳為駙馬都尉表卒詳嗣又分表爵封詳弟述為列侯毛嘉女黄初中選入東宫明帝太和中立為后父嘉拜騎都尉后弟曾郎中又進嘉奉車都尉曾騎都尉頃之封嘉博平鄉侯後又加嘉位特進曾散騎侍郎郭立兄女明元郭后明帝即位拜為夫人以立為騎都尉從父芝為虎賁中郎將齊王即位尊為皇太后追封父滿西都定侯以立子建紹其爵封芝遷散騎常侍長水校尉立宣徳將軍皆封列侯建兄徳出養甄氏徳及建俱為鎮䕶將軍皆封列侯並掌宿衞魏略又云諸郭之中芝最壯直先時自以功封侯張緝為東莞太守齊王芳嘉平中女為皇后徴拜光禄大夫位特進蜀吳壹先主定益州聘壹妹章武元年立為皇后壹官至車騎將軍封縣侯吳吳景孫堅吳夫人兄常隨堅征伐有功拜騎都尉孫䇿以為丹陽太守揚武將軍景卒官子奮授兵為將封新亭侯謝承大帝謝夫人弟夫人卒後十餘年拜五官郎中稍遷至武陵太守王盧九女為孫權夫人生孫和和子皓立封其三弟皆列侯王文雍大帝王夫人同母弟夫人生景帝景帝即位王氏無後封文雍亭侯譚紹大帝潘夫人姊婿孫亮即位以為騎都尉全尚女為孫亮夫人亮為嗣以尚為城門校尉都亭侯代滕𦙍為太常衞將軍進封永平侯録尚書事時全氏侯者五人並典兵馬何遂女為孫和姬和子皓立尊為皇太后封其弟洪永平侯蔣溧陽侯植宣城侯洪子邈為武陵監軍滕牧女為孫皓夫人皓即位封牧商密侯拜衞將軍録尚書事晉羊琇景獻羊后之從父弟少與武帝甚深親狎帝即位擢琇左衞將軍封甘露亭侯王愷文明后弟少有才力厯位清顯雖無細行有在公之稱以討楊駿勲封山都縣公邑千八百戸遷龍驤將軍加散騎常侍王虔字恭祖文明后弟以功幹見稱累遷衞尉封安夀亭侯拜平東將軍假節監青州諸軍事徴為光禄勲轉尚書卒楊駿武悼楊后之父厯驍騎鎮軍二府司馬後以后父超居重位自鎮軍將軍遷車騎將軍封臨晉侯識者議之曰夫封建諸侯所以藩屏王室后妃所以供粢盛𢎞内敎后父始封而以臨晉為侯兆以亂矣駿後惠帝永寧初詔曰舅氏失道宗族隕墜渭陽之思孔懐感傷其以蓩亭侯楊超為奉朝請騎都尉以慰蓼莪之思焉賈謐韓夀之子賈充養以為嗣謐繼佐命之後又賈后專恣厯位散騎常侍後軍將軍充妻廣成君卒去職喪未終起為秘書監掌國史尋轉侍中領秘書監如故謐侍從惠帝幸宣武觀較獵諷尚書於㑹中召謐受拜誡左右勿使人知於是衆疑其有異志賈模充之從子預誅楊駿封平陽鄉侯賈后既預朝政欲委信親黨拜模散騎常侍二日擢為侍中郭彰賈后之從兄賈充妻待彰若同生厯散騎常侍尚書衞將軍封冠軍侯羊𤣥之以惠皇后父初為尚書郎以后父拜光禄大夫特進爵為公虞豫子𦙍元敬后弟初拜散騎常侍遷步兵校尉建寧末追贈豫官以𦙍襲爵平山侯庾亮明穆皇后之兄也明帝即位以為中書監及王敦舉兵加亮左衞將軍與諸將距錢鳳及沈充之走吳興也又假亮節都督東征諸軍事追充事平以功封永昌縣開國公褚裒康獻皇后父豫章太守康帝立徴拜侍中遷尚書以后父求出累為左將軍都督兖州徐州之琅琊軍事假節鎮金城康獻皇后臨朝有司以裒皇太后父議加不臣之禮拜侍中衞將軍録尚書事持節都督如故王藴孝武定后之父為晉陵太守定后立以后父遷光禄大夫領五兵尚書本州大中正封建昌縣侯藴固辭乃授都督京口諸軍事左將軍徐州刺史假節宋路興之文帝路淑媛之父孝武即位尊淑媛為皇太后大明四年太后弟子瓊之及弟休之茂之並居顯職廢帝景和中以休之為黄門侍郎茂之左軍將軍並封開國侯邑千戸明帝廢幼主欲恱太后之心乃下令以休之為黄門侍郎領歩兵校尉茂之為中書侍郎是時明帝未即位故稱令王偃孝武文穆皇后之父文帝元嘉末為散騎常侍右衞將軍孝武即位以后父授光禄大夫領茂陽王師常侍如故梁王錫份之孫以親屬封永安侯後魏賀訥道武帝之舅從道武平中原拜安逺將軍以元舅甚見尊重賀盧者訥之弟也亦從道武平中原以功賜爵遼西侯劉羅臣宣穆皇后之兄也從道武平中原以前後勲賜爵永安公姚黄眉明元昭哀皇后之弟也黄眉本後秦姚興之子及姚泓滅黄眉間來歸國明元厚禮待之賜爵隴西公杜超密皇后之兄太武始光中思念舅氏以超為陽平公神䴥三年以超行征南大將軍太宰進爵為王杜道生者超之長子也賜爵城陽侯後為秦州刺史進爵河東公杜鳳凰者道生之弟也襲父超爵加侍中特進杜遺者超之從弟也超薨復授遺侍中安南將軍相州刺史入為内都官進爵廣平王杜元寳者遺之長子也位為司空進爵京兆王賀迷太武敬哀皇后之從父也皇后生景穆初后少孤父兄近親唯迷故蒙賜爵長鄉子閭毘恭皇后之兄皇后生文成太安二年以毘為平北將軍賜爵河東公弟紇為寧北將軍零陵公其年並加侍中進爵為王毘征東將軍評録尚書事紇征西將軍中都大官自餘子弟賜爵為王者二人公五人侯六人子三人同時受拜所以崇隆舅氏閭英者恭皇后前兄興安二年為散騎常侍鎮軍大將軍遼西公弟喜鎮軍大將軍帶方公太安初英為侍中征東大將軍太宰進爵為王喜左光禄大夫改封燕郡從兄泰為安東將軍朝鮮侯馮熙文明太后之兄熙祖北燕主熙生於長安姑先入掖庭為太武左昭儀妹為文成皇帝后即文明太后也使人訪知熙所在徴赴京師拜冠軍將軍賜爵肥如侯尋進爵昌黎王獻文即位為太傅累拜内都大官孝文即位文明太后臨朝帝承旨以熙為侍中太師中書監領秘書事後以例降封京兆郡公熙子誕與孝文同歳幼侍書學仍蒙親待拜征西大將軍南平王侍中誕弟修侍中鎮北大將軍尚書東平公後罷庶姓王誕為侍中都督中外諸軍中軍將軍特進改封長樂郡公誕拜官孝文立於庭遥受其拜既訖還室修降為侯十六年以誕為司徒帝既愛誕拜除官日親為制三讓表并啟將拜又為其謝章尋加車騎大將軍太子太師誕長子穆初襲熙爵避皇子愉封改封扶風郡公修弟津與孝文廢后同産兄位黄門侍郎信都伯津同産弟風幼養於宫文明太后特加愛念勅歳賜爵至北平王拜太子中庶子出入禁闥孝文親政後恩寵稍衰降爵為侯李峻字玪之梁國蒙縣人元皇后兄也父方叔宋文帝時為濟陰太守文成遣間使喻之峻與五弟誕嶷雅白水等前後歸京師拜峻鎮西將軍涇州刺史雅嶷誕等皆封公後進峻爵為王李惠獻文思后之父也厯位散騎常侍征西大將軍秦益州刺史進爵為王李道念惠從弟鳳之弟孝文太和十二年將爵舅氏詔訪存者而惠諸從以再罹孥戮難於應命唯道念敢先詣闕乃申后妹及鳳兄弟子女之存者於是賜鳳子安祖浮陽侯興祖安喜侯道念真定侯從弟寄生高邑子皆加將軍後例降爵安祖等改侯為伯並去軍號興祖累遷燕州刺史卒以兄安祖子侃晞為後襲先封南郡王後以庶姓罷封改封博陵郡公高肇文昭皇太后之兄也文昭皇后生宣武詔封父颺嫡孫猛渤海公肇平原郡公肇弟顯澄城郡公三人同日受封始宣武未與舅氏相接特拜爵及賜衣幘引見肇顯于華林都亭皆甚惶懼舉動失儀數日之間富貴赫奕未幾肇為尚書左僕射冀州大中正尚宣武姑高平公主遷尚書令于勁字鍾葵宣武納其女為后封太原郡公于勁武畧以功臣子又以功績位沃野鎮將賜爵宣昌子拜征虜將軍帝納其女為后封太原郡公胡國珍字世玉其女以選入掖庭生孝明即靈太后也孝明帝踐祚以國珍為光禄大夫靈太后臨朝加侍中封安定郡公尚書任城王澄奏安定公宜出入禁中叅諮大務詔令入決萬機尋進位中書監儀同三司侍中復加使持節都督雍州刺史驃騎大將軍開府靈太后以國珍年老不欲令其在外且欲示以方面之榮竟不得遷司徒公侍中如故就家拜焉李延晏僕射冲之長子孝莊即位以元舅之尊超授侍中太保封濮陽郡王北齊婁昭武明皇后之母弟也昭之次子定逺少厯顯職外戚中偏為武成愛狎封臨淮郡王婁叡昭之兄子無他器幹以外戚貴幸為瀛州刺史孝昭皇建初封東海郡王武成太寧初進位司空胡長仁武成皇后長兄以内戚厯位尚書封臨淮郡王左僕射尚書令及武成即位預叅朝政封隴東郡王胡君璧者長仁子也後主納長仁女為后君璧襲爵隴東王君璧弟君璋及長仁弟長雍等前後七人並賜爵楊騰文帝之舅也文帝即位為開府儀同三司乙弗繪文帝皇后之兄帝即位為開府儀同三司侍中監魏昌縣公又為吏部尚書斛律光為左衞將軍先是武成納光第二女為太子妃後主天統元年拜為皇后其年光轉大將軍後周陳山提宣帝皇后之父也山提自大將軍為上柱國封鄅國公元晟元皇后之父也晟自開府為上柱國封齊國公隋吕宋文帝之舅子襲爵齊郡公獨孤陁字黎耶獻皇后之弟也高祖受禪拜上開府右領軍衞將軍蕭璟煬帝蕭后之兄也以外戚擢為尚衣奉御蕭琮賜爵莒國公煬帝以皇后之故甚見親厚拜内史令改封梁公唐獨孤懐恩元貞皇后弟之子也懐恩幼時以獻皇后之姪養於宫中後仕為縣令高祖平京城授長安令及受禪擢拜工部侍郎竇徳明太穆順聖皇后兄之孫也武徳初拜考功郎中從太宗擊王世充頻有戰功封顯武男長孫敞太宗文徳皇后之叔父也從平京城以功除將作少監出為杞州刺史貞觀初坐􅂍免尋拜宗正卿及致仕加金紫光禄大夫封平原郡公長孫操敞之從父弟也貞觀中厯洺州刺史益揚二州都督府長史高宗永徽初加金紫光禄大夫賜爵樂夀男武承嗣則天皇后兄子也初后父士彠娶相里氏生元慶元爽則天立為皇后以元慶為宗正少卿元爽為殿中少監中宗嗣聖元年以承嗣為禮部尚書尋除太常卿同中書門下三品則天垂拱中轉春官尚書依舊知政事載初元年代蘇良嗣為文昌左相同鳳閣鸞臺三品兼知内史事天授元年於東都創置武氏七廟於是封承嗣為魏王元慶子夏官尚書三思為梁王后從父兄子納言攸寧為建昌王太子通事舍人攸歸為九江王司禮卿重規為高平王左衞親府史郎將戴徳為潁州王右衞將軍攸暨為千乗王司農卿懿宗為河内王左千牛中郎將嗣宗為臨川王左衞勲二府中郎將攸宜為建安王尚乗直長攸望為㑹稽王太子通事舍人攸緒為安平王攸止為常安王又封承嗣男延基為南陽王延秀為淮陽王三思男崇烈為新安王后兄子承業男延暉為嗣陳王延祚為咸安王韋温中宗皇后之從父兄也神龍中累遷禮部尚書封魯國公弟湑左羽林大將軍封衞國公竇希瑊者睿宗竇后之族也𤣥宗先天二年九月戊寅以光禄豳國公希瑊將作少府希球衞尉少卿希瓘各食實封二百戸以舅氏特寵之也吳湊章敬皇后之弟也肅宗上元中授湊襄城尉寳應二年始封拜外戚授皇后叔前宣城令吳令瑶為開府儀同三司太子家令封濮陽郡公郎將令瑜為開府儀同三司太子左諭徳濟陽郡公皇后弟盛王府録事叅軍淑為開府儀同三司鴻臚少卿左清道率同正澄為開府儀同三司太子賔客襄城尉湊為開府儀同三司太子詹事並封濮陽郡公沈房者代宗沈后之族子也后無近屬唯房為近徳宗命為金吾將軍主沈氏之祀獨孤卓者貞懿皇后之叔也大厯初后寵遇無雙以恩澤官其宗屬卓自太常少卿為少府監及后兄良佐為太子中允王果者徳宗昭徳皇后父楊州大都督遇之子也果為眉州司馬甥姪拜官者二十餘人郭釗憲宗懿安皇后兄元和十五年三月釗以檢校户部尚書兼司農卿遷為刑部尚書兼司農卿及右金吾大將軍鏦加檢校工部尚書郭銛者穆宗之季舅也長慶二年十月以殿中監遷為太子詹事充閑廐宫苑使蕭洪以帝舅檢校太子賔客長慶二年十月遷太子洗馬梁張歸霸者末帝徳妃之父也歸霸子漢傑漢倫漢融皆以外戚之故咸居大任掌大權後唐王萬榮者明宗淑妃之父也長興四年九月自銀青光禄大夫檢校司空領韶州刺史又加檢校司徒使持節華州諸軍事華州刺史充鎮國軍節度使華商等州觀察處置等使漢李洪建太后母弟也事高祖為牙將高祖即位累厯軍校遥領防禦使史𢎞肇等被誅以洪建為權侍衞馬步軍都虞候張彦成潞州潞城人初隱帝娶其女特見親愛從平汴雒累加特進檢校太尉同州節度使隱帝即位就加同平章事册府元龜卷三百一
