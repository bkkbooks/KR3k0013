body:
  text: 册府元龜卷八百七十九宋王欽若等撰總録部計筞第二魏程昱東郡東阿人漢末黄巾起縣丞王度反應之燒倉庫縣令踰城走吏民負老幼東奔渠丘山昱使人偵視度度等得空城不能守出城西五六里止屯昱謂縣中大姓薛房等曰今度等得城郭不能居其勢可知此不過欲虜掠財物非有堅甲利兵攻守之志也今何不相率還城而守之且城髙厚多榖米今若還求令共堅守度必不能久攻可破也房等以為然吏民不肯從曰賊在西但有東耳昱謂房等愚民不可計事乃密遣數騎舉幡於東山上令房等望見大呼言賊已至便下山趨城吏民奔走隨之求得縣令遂共城守度等来攻城不能下欲去昱率吏民開城門急撃之度等破走東阿由此得全其後兖州刺史劉岱辟昱昱不應是時岱與袁紹公孫瓚和親紹令妻子居岱所瓉亦遣從事范方將騎助岱後紹與瓉有隙瓉撃破紹軍乃遣使語岱令遣紹妻子使與紹絶别勅范方若岱不遣紹家將騎還吾定紹將加兵於岱岱議連日不决别駕王彧白岱程昱有謀能斷大事岱乃召見昱問計昱曰若棄紹近援而求瓉遠助此假人於越以救溺子之説也夫公孫瓉非袁紹之敵也今雖壊紹軍然終為紹所擒夫趨一朝之權而不慮遠計將軍終敗岱從之范方將其騎歸未至瓉大為紹所破田豐字元皓鉅鹿人漢末袁紹起義豐説紹曰曹公破劉備則許下非復空虛且操善用兵變化無方衆雖少未可輕也不如以久持之將軍據山河之固擁四州之衆外結英雄内修農戰然後簡其精鋭分為奇兵乗虚迭出以擾河南救右則撃其左救左則撃其右使敵疲於奔命民不得安業我未勞而彼已困不及二年可坐克也今釋廟勝之策而决成敗於一戰若不如志悔無及也紹不從賈詡漢末以故尚書依張繡時太祖拒袁紹於官渡紹遣人招繡并與詡書結援繡欲許之詡顯於繡坐上謂紹使曰歸謝袁本初兄弟不能相容而能容天下國士乎繡驚懼曰何至於此竊謂詡曰若此當何歸詡曰不如從曹公繡曰袁彊曹弱又與曹為讐從之如何詡曰此乃所以宜從也夫曹公奉天子以令諸侯其宜從一也紹彊盛我以少衆從之必不以我為重曹公衆弱其得我必喜其宜從二也夫有覇王之志者固將釋私怨以眀徳於四海其宜從三也願將軍無疑繡從之率衆歸太祖太祖見之喜執詡手曰使我信重于天子者子也表詡為執金吾封都亭侯遷冀州牧成公英漢末隨輔遂為腹心遂在湟中其壻閻行欲殺遂以降夜攻遂不下遂歎息曰丈夫困厄禍起婚姻乎謂英曰今親戚離叛人衆轉少當從羌中西南詣蜀爾英曰興軍數十年今雖罷敗何棄其門而依於人乎遂曰吾年老矣子欲何施英曰曹公不能遠来獨夏侯淵之衆不足以追我又不能久留且息肩扵羌中以須其去招呼故人綏㑹羌胡猶可以有為也遂從其計時随從者男女尚數千人遂宿有恩於羌羌衛䕶之及夏侯淵還使閻行留後乃合羌胡數萬將攻行行欲走㑹遂死英降太祖吳質為朝歌長時臨淄侯植太子母弟楊脩與丁儀兄弟皆欲以植為嗣太子患之以車載質廢簏内謀脩以白太祖未及推驗太子懼告質質曰何患眀日復以簏受絹車内以惑之脩必復重白重白必推而無驗則彼受罪矣世子從之脩果復白而推騐無人太祖由是疑焉袁淮史不載其官齊王正始中吳將朱然入柤中淮言扵大將軍曹爽曰吳楚之民疲弱寡能英才大賢不出其土比技量力不足與中國相抗然自上世以来常為中國患者蓋以江漢為池舟楫為用利則陸鈔不利則入水攻之道逺中國之長技無所用之也孫權自數十年以来大略江北繕治甲兵精其守禦數出盜竊敢遠其水陸次於平土此中國所願聞也夫用兵者貴以飽待饑以逸撃勞師不欲久行不欲遠守少則固力專則彊當今宜捐淮漢以南退却避之若賊能入居中央来侵邊境則随其所短中國之長技得用矣若不敢来則邊境得安無鈔盜之憂矣使我國富兵彊政脩民一陵其國不足為逺矣今㐮陽孤在漢南賊循漢而上則斷而不通一戰而勝則不攻而自服故置之無益于國亾之不足為辱自江夏以東淮南諸郡三后已来其所亾幾何以近賊疆界易鈔掠之故哉若從之淮北遠絶其間則民人安樂何鳴吠之驚乎遂不從蜀諸葛亮初在荆州劉表長子琦亦深器亮表受後妻之言愛少子琮不悦于琦每欲與亮謀自安之術亮輙拒塞未與處畫琦乃將亮游觀後園共上髙樓飲燕之間令人去梯因謂亮曰今日上不至天下不至地言出子口入於吾耳可以言未亮答曰君不見申生在内而危重耳在外而安乎琦意感悟隂規出計㑹黄祖死得出遂為江夏太守亮位至丞相吳太史慈東莱黄人仕郡奏曹吏因為州家所疾恐受其禍乃避之遼東北海相孔融聞而奇之時融以黄巾㓂暴出屯都昌為賊管亥所圍慈將出求救扵劉備時重圍嚴密慈乃嚴行蓐食須眀便帶鞬攝弓上馬將兩騎自隨各作一的持之開門直出外圍下左右人並驚駭兵馬互出慈引馬至城下塹内植所持的各一出射之畢徑入門眀晨復如此圍下人或起或卧慈復植的射之畢復入門眀晨復出如此無􅂧起者於是下鞭馬直突圍中馳去比賊覺知慈行已過又射殺數人皆應弦而倒故無敢追者遂到平原晉庾衮不應州郡辟命齊王冏之唱義也張泓等肆掠扵陽翟衮乃率其同族及庶姓保於禹山是時百姓安寜未知戰守之事衮曰孔子云不教而戰是謂棄之乃集諸郡士而謀曰二三君子相與處於險將以安保親尊全妻子也古人有言千人聚而不以一人為主不散則亂矣將若之何衆曰善今日之主非君而誰衮黙然有間乃言曰古人急病譲夷不敢逃難然人之立主貴從其命也乃誓之曰無恃險無怙亂無暴鄰無抽屋無樵採人所植無謀非徳無犯非義戮力一心同恤危難衆咸從之於是峻險阨杜蹊徑脩壁塢樹藩障考功庸計丈尺均勞逸通有無繕完器備量力任能物應其宜使邑推其長里推其賢而身率之分數既眀號令不二上下有禮少長有儀將順其美拯救其惡及賊至衮乃勒部曲整行伍皆持滿而勿發賊挑戰畟音測然不動且辭焉賊服其慎而畏其整是以皆退如是者三時人語曰所謂臨事而懼好謀而成者其庾異行乎劉裔東莱掖人㑹天下大亂攜母欲避地遼東路經幽州刺史王浚留裔表為渤海太守浚敗轉依冀州刺史邵續續徒衆寡弱謀降於石勒裔言於續曰夫田單包胥齊楚之小吏耳猶能存已滅之邦全䘮敗之國今將軍仗精鋭之衆居全勝之城如何墜將登之功於一簣委忠信之人於豺狼乎且項羽袁紹非不彊也髙祖縞冠而人應如響曹公奉帝而諸侯綏穆何者蓋逆順之理殊自然之數懸也况夷戎醜類屯結無頼雖有犬羊之盛終有庖宰之患而欲託根結援無乃殆哉續曰若如君言計將安出裔曰琅邪王以聖徳欽明創基江左中興之隆可企踵而待今為將軍計者莫若抗大順以激義勇之心奉忠正以厲軍人之志夫機事在密時至難違存亡興廢在此舉矣續從之乃殺異議者數人遣使江南朝廷嘉之裔仍求自行續遣之既至元帝命為丞相參軍楊翰為前秦苻堅髙昌太守堅既死苻丕新立安西吕光自西域還師至于宜禾堅凉州刺史梁熙謀閉境拒之翰言於熙曰吕光新定西國兵彊氣鋭其鋒不可當也度其事意必有異圗且今關中擾亂京師存亡未知自河已西迄於流沙地方萬里帶甲十萬鼎峙之勢實在今日若光出流沙其勢難測髙梧谷口水陸之要宜先守之而奪其水彼既窮渴自然投戈如其以遠不守伊吾之關亦可拒也若度此二要雖有子房之筞難為計矣地有所必爭真此機也熙弗從美水令犍為張統説熙曰主上傾國南討覆敗而還慕容垂擅兵河北泓冲冦逼京師丁零雜虜跋扈關雒州郡姦豪所在風扇王綱弛絶人懐利己今吕光回師將軍何以抗也熙曰誠深憂之未知計之所出統曰光雄果勇毅眀略絶人今以蕩西域之威擁歸師之鋭若猛火之盛於原弗可敵也將軍世受殊恩忠誠夙著立勲王室宜在於今行唐公雒上之從弟勇冠一時為將軍計者莫若奉為盟主以攝衆望推忠義以摠率羣豪則元無異心也資其精鋭東兼毛興連王統楊壁集四州之衆掃兇逆於諸夏寧帝室於關中此桓文之舉也熙又不從殺雒于西海以子裔為鷹揚將軍率衆五萬拒光于酒泉燉煌太守姚靜晉昌太守李純以郡降光裔及光戰于安彌為光所敗武威太守彭濟執熙迎光光殺之建威西郡太守索泮奮威督洪池已南諸軍事酒泉太守宋皓等俱為光所殺尹昭為後秦姚興吏部尚書與使中軍姚弼後軍斂成鎮遠乞伏乾歸等率歩騎三萬伐傉檀左僕射齊難等率騎二萬討赫連勃勃昭諫曰傉檀恃遠輕敢違逆宜詔蒙遜及李𤣥盛使自攻撃待其斃也然後取之此卞莊之舉也興不從弼果敗齊難為勃勃所擒後魏宇文福宣武時為平遠將軍南征統運進計於都督彭城王勰曰建安是淮南重鎮彼此要衝得之則宜陽易圗不獲則夀春難保勰然之及勰為州遂令福攻建安建安降以勲封㐮樂縣開國男食邑三百户賀拔岳孝莊帝時為爾朱榮前將軍万俟醜奴僣稱大號關中騷動朝廷深以為憂將遣岳討之岳私謂其兄勝曰醜奴擁秦隴之兵足為勍敵若岳往而無功罪責立至假令克定恐讒愬生焉勝曰汝欲何計自安曰請爾朱氏一人為元帥岳副貳之則可矣勝以為然乃請於榮榮大悦乃以天光為雍州刺史以岳為衛將軍左都督又以侯莫陳悦為右都督並為天光之副後周李賢隴西髙平人魏永安中万俟醜奴據岐涇等諸州反叛魏孝莊遣爾朱天光率兵撃破之其黨万俟道雒費連少渾據原州未知醜奴已敗天光遣使造賢令密圗道雒天光率兵續進㑹賊黨万俟阿寳戰敗逃還私告賢曰醜奴已敗王師行至此阿寳以性命相投願能存濟賢因令阿寳偽為醜奴使紿道雒等曰今已破臺軍須與公計事令阿寳權守原州公宜速往道雒等信之是日便發既出而天光至遂克原州道雒乃將麾下六千人奔于牽屯山天光見賢曰道雒之出子之力也賢又率鄉人出馬千匹以助軍天光大悦時原州亢旱天光以乏水草乃退舎城東五十里牧馬息兵令都督長孫耶利行原州事以賢為主簿道雒􅂧乗虛忽至時賊黨千餘人在城中密應引道雒入城遂殺耶利賢復率鄉人昧死拒戰道雒乃退走又有賊師逹符顯圍逼州城晝夜攻戰屢被摧衂賢間道赴雍州詣天光請援天光許之賢乃返而賊營壘四合無因入城候日向夕乃偽負薪與賊樵採者俱得至城下城中垂布引之賊衆方覺乃弓弩亂發射之不中遂得入城告以大軍將至賊聞之便即散走權景宣為外兵郎中率徒採運時東魏兵至道路擁塞因投民家自匿景宣以久藏非計乃偽作太祖書招募得五百餘人保據宜陽聲言大軍續至東魏將段琛等率衆至九曲憚景宣不敢進景宣恐琛審其虛實乃將腹心自隨詐云迎軍因得西遁與儀同李延孫相㑹攻孔城雒陽以南尋亦来附太祖即留景宣守張白塢節度東南義軍唐李勣曹州離狐人隋末韋城人翟讓聚衆為盜勣往從之李密亡命在雍丘浚儀人王百當匿之百當共勣説翟讓奉密為主隋令王世充討密勣以奇計敗於雒水之上密封勣為東海郡公時河南山東大水死者將半隋帝令饑人就食黎陽開倉賑給倉司不時給付死者日數萬人勣言於宻曰天下大亂本是為饑今若得黎陽一倉大事濟矣宻乃遣勣領麾下五千人自原武濟河掩襲即日克之開倉賑給一旬之間得勝兵二十餘萬人徐文遠初仕隋越王侗以為國子祭酒時雒陽饑饉文遠出城樵採因為李宻所得宻即其門人也文遠南向坐率其屬北面拜之文遠謂宻曰老夫疇昔之日幸以先聖之道仰授將軍時經隆替倐焉已久今將軍屬風雲之㑹為義衆所居擁兵百萬威加四海猶能屈體引尊師之義此將軍之徳也老夫之幸也荷兹厚禮得不盡言乎但未審將軍意爾欲為伊霍繼絶扶傾鄙雖遲暮猶願盡力若為莾卓迫險乗危老夫耄矣無能為也宻頓首曰昨奉朝命之拜上公庶竭庸愚以拯國難不測城内人情所以未敢朝謁方欲先征化及立功贖罪然後凱旋入拜宸極此宻之本志惟先生教之文遠曰將軍名臣之子代顯忠績前受悞於𤣥感遂乃蹔墜家聲迷而知反回車復路終於忠孝以康國家天下之人是所望於將軍也宻又頓首曰敬聞命矣請奉以周旋及宻撃化及而旋㑹世充殺元文都宻又詢計於文遠答曰世充亦門人素所知識淺促之士也今乗此事機必懐異望將軍前計為不諧矣非破世充不可朝覲宻又喜曰常謂先生儒者不習軍旅之事今籌大計殊有眀略魏徵初以筞干李宻及王世充攻宻於雒口徵説宻長史鄭頲曰魏公李宻也雖驟勝而驍將鋭卒死傷者多又軍無府庫有功不賞戰士心墮此二者難以應敵未若深溝髙壘曠日持久不過旬月敵人糧盡可不戰而退追而撃之取勝之道且東都食盡世充計窮意欲死戰可謂窮㓂難與争鋒請慎無戰頲曰此老生之常譚爾徵曰此乃奇謀深筞何謂常談因拂衣而去李蕚天寳末客於清河平原太守顔真卿從父兄常山太守杲卿破禄山土門開十七郡推真卿為帥得兵二十萬蕚年二十餘與郡人来乞師謂真卿曰聞公義烈首唱大順河朔諸郡恃公為長城今清河實公之西隣也僕幸寓家得其虚實知可為長者用今計其蓄積足以三平原之富士卒可以二平原之彊公因而撫之為腹心輔車之郡其他小城運之如臂指爾惟公所意誰敢不從真卿借兵千人蕚將去真卿曰兵出也吾子何以教我乎蕚曰今聞朝廷使程千里統衆十萬自太行東下將出崞口為賊扼兵不得出今若先伐魏郡斬袁知㤗太守司馬垂使為西南王分兵開崞口出千里之兵使討鄴幽陵平原清河合同志十萬之衆狥雒陽分兵而制其衝計王師亦不下十萬公當堅壁無與掉戰不數十日賊必潰而相圗矣真卿然之乃移牒清河等郡遣其大將李擇交副將平原縣令范冬馥裨將和琳徐皓等進兵與清河四千人合勢而博平以千人来三郡之師屯於博平堂邑縣西南十里袁知泰遣其將白嗣深乙舒蒙等以二萬人来拒戰賊兵大敗斬萬餘首崔寜代宗時嚴武薦為利州刾史及武為劍南節度過利州心欲輟寧使寧自籌寧曰節度張獻誠見忌惡且又好利誠能重賄之寧可以從大夫矣武至劍南遺獻誠奇錦珍貝價兼百金獻誠大悦武又有書欲召寧獻誠然之寧即日稱疾棄官之劍南武奏為漢州刺史梁馮行襲武當人唐末為本郡都校中和中僖宗在蜀有賊首孫喜者聚徒數千人欲入武當刺史吕􅂱惶駭無筞畧行襲伏勇士於江南乗小舟逆喜謂喜曰郡人得良牧衆心歸矣但縁兵多民懼虜掠若駐軍江北領肘腋以赴之使某前導以慰安士民可立定也喜然之既渡江軍吏迎謁伏甲奮起行襲撃喜仆地拔劍斬之其黨盡殪賊衆在江北者悉奔潰山南節度使劉巨容以功上言尋授均州刺史州西有長山當㐮漢入蜀路羣賊屯據以邀刼貢奉行襲又破之洋州節度使葛佐奏辟為行軍司馬請將兵鎮谷口通秦蜀道由是益知名晉張希崇唐末以幽州裨將守平州為虜所陷授盧龍軍行軍司馬天道中平州節度使盧文進歸朝委希崇旄鉞繼其任遣腹心摠虜騎三百以監之希崇蒞事數歳虜中漸至寵信坦然無復疑矣忽一日登郡樓私自計曰昔班仲升西伐不敢擅還以承詔故也我今入關斷在胷臆何恬扵不測之虜而自滯耶乃召漢人部曲翹楚者謂曰吾陷身此地飲酪披毛生不見其所親死為窮荒之鬼南望山川度日如歳爾軰得無思鄉者乎部曲皆泣下沾衣且曰眀公欲全部曲南去善則善矣如虜卒何希崇曰俟眀日首領至牙帳則先擒之虜無統攝必散平州去虜帳千餘里待報至徵兵踰旬方及此則我等入漢界深矣何以小衆為病衆大喜是日希崇於郡齋之側坎隟地貯以石灰眀旦首領與羣從至希崇飲以醇酎數鍾既醉悉置於灰穽中斃焉其徒營於北郭遣人攻之皆潰圍奔去亦捨而不追希崇遂以管内生口二萬餘南歸眀宗嘉之授汝州防禦使漢王保義本姓劉名去非幽州人唐末平州刾史劉守奇引為帳中親信守奇以兄守光奪父政亡入虜中又自虜奔太原去非皆從之莊宗之伐燕也令守奇從周徳威引軍前進師次涿州刾史姜行敢登陴固守去非呼行敢曰河東小劉郎領軍来為父除兇爾何拒守守奇免胄勞之行敢遥拜即開門迎降徳威害其功宻告莊宗言守奇心不可保翻然作變則無如之何莊宗以書召守奇還計事行次上門去非宻説守奇曰公不施寸兵下涿郡周公以得非已力必有如簧之間太原不宜往也公家於梁朝素有君臣之分今往依之介福萬全矣乃馬首而南梁以守奇為滄州留後以去非為河陽行軍册府元龜卷八百七十九
