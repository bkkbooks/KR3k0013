  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_097-1a}
body:
  text: 册府元龜卷九十七宋王欽若等撰帝王部奬善禮賢奬善書曰用德彰厥善禮云隱惡揚善用中於民其斯以爲舜乎是知王者稱善所以懲惡奬一所以勵百將使在下者聳思齊之心臻恥格之化若風草之偃置郵之速也繇漢已來士有立節守正博聞稽古持廉崇讓明經執法英文煥發至性内篤治行尤異忠欵昭著精思絶妙膽氣剛毅彰穎悟於童幼形著撰於緗素拔乎其萃良非一途而當時之君或形於奬激加之爵號申以賜予齒於榮官使才美遞進貪懦知勸斯固大禹稱善之旨詩人烝髦之訓者也漢髙帝時朱建故嘗爲淮南王英布相布欲反問建建諫止之布不聽漢既誅布聞建諫之賜建號平原君文帝時賈誼爲長沙王傅後嵗餘帝思誼徵之至入見帝方受釐坐宣室宣室未央前正室也釐祭肉也漢儀注祭天地五畤皇帝不自行祠還致福釐福也言受神之福也帝因感鬼神事而問鬼神之事誼具道所以然之故至夜半文帝前席漸促近誼聽説其言既罷曰吾久不見賈生自以為過之今不及也廼拜誼爲梁懐王太傅懐王帝少子愛而好書故令誼傅之數問以得失誼朝問以國家之事後漢光武東廵路過小黄髙帝母昭靈后園陵在焉時虞延爲部督郵詔呼引見問園陵之事延進止從容占拜可觀其陵樹株蘖皆諳其數爼豆犧牲頗曉其禮帝善之勅延從駕到魯還經封丘城門門下小不容羽蓋帝怒使撻侍御史延因下見引咎以爲罪在督郵言辭激揚有感帝意乃制詔曰以陳留督郵虞延故貰御史罪延從送車駕西盡郡界賜錢及劒帶佩刀還郡於是聲名遂振周防年十六仕郡小吏光武廵幸汝南召掾史試經防尤能誦讀拜爲守丞何湯爲開陽門候建武十八年夏旱公卿皆暴露請雨雒陽令著車蓋出門湯將衛士鈎令車收案有詔免令官拜湯虎賁中郎將帝嘗歎曰赳赳武夫公侯干城何湯之謂章帝時黄香爲郎中帝詔香詣東觀讀所未嘗見書香後告休及歸京師時千乗王冠帝㑹中山邸乃詔香殿下顧謂諸王曰此天下無雙江夏黄童者也左右莫不改觀後魏道武自鄴還京師次於恒嶺帝親登山頂撫慰新民適黄門侍郎崔𤣥伯扶老母登嶺帝嘉之賜以牛米因詔諸徙人不能自進者給以車牛後𤣥伯爲周兵將軍道武末明元未立清河王紹聞人心不安大出財帛班賜朝士𤣥伯獨不受明元即位命𤣥伯居門下虛己訪問以不受詔賜財帛特賜帛三百疋長孫嵩已下咸愧焉古弼爲門下奏事以敏正著稱明元嘉之賜名曰筆取其直而有用後改爲弼言其輔佐才也太武時公孫軌爲諸軍司馬太武平赫連昌引諸將帥入其府藏各令任意取金玉諸將取之盈懐軌獨不探把太武乃親探金賜之謂軌曰卿可謂臨財不苟得朕所以増賜者欲顯亷於衆人孝文時于烈爲光禄勲卿其子登引例求進烈上表乞黜落孝文曰此乃有識之言不謂烈能辨此乃引見登詔曰朕今創禮新邑明揚天下卿父乃行謙讓之表而有直士之風故進卿為太子翊軍校尉崔挺爲昭武將軍光州刺史太和中車駕幸兖州召挺赴行在所及見引喻優厚又問挺治邊之略因及文章孝文甚悦謂挺曰今日擁旄者悉皆如此吾何憂哉崔孝芬挺之長子爲北海王詳司馬早有才識博學好文章孝文召見甚嗟賞之賈元壽爲中書侍郎作雒陽北邙寺碑文孝文頻登其寺觀讀文稱爲佳作傅永字修期爲安逺將軍孝文每嘆曰上馬能擊賊下馬作露板唯傅修期耳後周文帝時栁敏爲大都督遭母憂居䘮旬日之間鬚鬢半白尋起爲吏部郎中毁瘠過禮杖而後起帝見而嘆異之特加廪賜武帝建徳四年盧柔子愷爲禮部大夫其秋李穆攻拔軹關栢崖二鎮命愷作露布帝讀之大悦曰盧愷文章大進荀景倩故是令君之子臣欽若等曰令君謂後漢尚書令苟彧也彧子顗字景倩隋髙祖初髙構為民部侍郎時内史侍郎晉平東與兄子長茂争嫡尚書省不能斷朝臣㕘議不決構斷而合理帝以為能召入内殿勞之曰我聞尚書郎上應列宿觀卿才識方知古人之言信矣嫡庶者禮教之所重我讀卿判數遍詞理愜當意所不能及也賜米百石繇是知名辛彦之爲隨州刺史于時州牧多貢珍翫唯彥之所貢並供祭之物髙祖善之顧謂朝臣曰人安得不學彦之所貢稽古之力也鄭譯爲柱國奉詔定樂於太常帝勞譯曰律令則公定之音樂則公正之禮樂律令公居其三良足美也楊恭仁司空觀王雄之長子仁夀中累除甘州刺史恭仁務舉大綱不爲苛察戎夏安之髙祖謂雄曰恭仁在州甚有善政非惟朕舉得人亦是卿義方所致也煬帝大業五年𢎞化太守栁儉入朝郡國畢集帝謂納言蘇威吏部尚書牛𢎞曰其中清名天下第一者爲誰威等以儉對帝又問其次威以郡丞郭絢潁川郡丞敬肅等二人對帝賜儉帛二百疋絢肅各一百疋令天下朝集使送至郡邸以旌異焉論者美之王伽開皇末爲齊州㕘軍送流囚李參等七十餘人詣京師伽哀其辛苦悉脱枷停援卒與期曰某日當至京師如致前却吾當為汝受死舍之而去流人感悦依期而至一無離叛帝聞而驚異之召見與語稱善久之於是悉召流人并令㩦負妻子俱入賜宴於殿庭而赦之乃下詔曰凡在有生􅅤靈稟性咸知好惡並識是非若臨以至誠明加勸導則俗必從化人皆遷善往以海内亂離徳教廢絶官人無慈愛之心兆庶懐奸詐之意所以獄訟不息澆薄難治朕受命上天安養萬姓思遵聖法以徳化人朝夕孜孜意在於此而伽深識朕意誠心宣道參等感悟自赴憲司明是率土之人非為難教良是官人不加示曉致令陥罪無繇自新若使官盡王伽之儔人皆李參之輩刑厝不用其何逺哉於是擢伽爲雍令唐髙祖武徳二年正月始平人宗士朓負米一石委於太倉而去云願少益軍國髙祖嘉之賚物百段七年七月詔曰自隋以来離亂永久雅道淪缺儒風莫扇朕膺期御宇静難齊民欽若典謨以資政術思𢎞徳教光振遐軌是以廣設庠序益召學徒旁求俊異務從奬擢寧州羅川縣前兵曹史孝謙守約丘園伏膺道素爰有二子年並幼童講習孝經咸暢厥旨義方之訓實堪勵俗故從優秩賞以不次宜普頒示咸使知聞如此之徒並即申上朕加親覽特將褒異太宗貞觀十三年十一月揚州總管長史李襲舉撰忠孝圖二十卷奏之太宗覽而稱善因下書曰卿情深奉國志在忠孝爰録前烈圖之丹青事兼勸奬足勵風俗再三循覽朕甚嘉之十六年四月甲辰太宗閲陸徳明經典音義美其宏益學者嘆曰徳明雖亡此書足可𫝊習因賜其家布帛百疋十九年太宗征遼紀王府參軍喬寶明以乗輿暴露堅城之下賊久未平不勝其憤因至長安爲司空房𤣥齡陳取髙麗之算𤣥齡表送詣行在所謁太宗太宗與語甚竒之謂曰安市不降平壤尚遠我慮三軍寒凍已命班師卿既逺來今者欲陳何䇿寶明曰昔魯連飛箭而燕將死陸賈使越而趙佗順臣願將命平壤申喻髙麗髙麗承駐蹕之後心膽破裂臣得進説其必面縛而自致耳若懐不遜臣請爲傅介子斷蘇文之首以降其國太宗壯其言曰我之求人甚於人之求禄如卿之輩終不投之死地也於是引寶明參侍從之列尋守通事舍人呂才爲太常博士太宗又令才造方域圖及教飛騎戰陣圗皆稱㫖擢授太常丞程名振爲雒州刺史太宗將征遼東召名振問以經畧之事名振初對失㫖太宗動色詰之名振讐對逾辨太宗意觧謂左右曰房𤣥齡嘗在我前每見我嗔餘人猶顏色無主名振生平不見我向来責讓而詞理縱横亦竒士也即日拜右驍衞將軍張昌齡貞觀末獻翠微宮頌太宗召見令作息兵詔草甚加賞歎曰禰衡潘岳之儔也令於通事舍人裏供奉李百藥除宗正卿後致仕歸家太宗嘗製帝京篇令百藥和之手詔答曰省所和事極爲佳作何身之老而才之壯何齒之宿而意之新乎李義府舉進士劉洎馬周薦之太宗令詠烏援筆爲詩曰何惜鄧林樹不借一枝棲太宗喜曰當盡借卿全樹何止一枝也尋除監察御史髙宗咸亨元年六月帝御冷泉宮亭子召許敬宗泉男生及東西臺三品舉酒作樂帝謂男生曰聞卿悔不讀書信乎男生奏稱臣生在海隅莫知善惡自沐皇化方欲自新既恥面牆始學讀書是實敬宗奏曰男生夷人豈知好學雖欲自强亦無及也帝曰夫學植也不殖將落玉不琢不成器人不學不知道如欲化人成俗其必繇於學乎故曰困而不學斯爲下矣乃賜男生興寧坊之田第及美女寶貨𤣥宗開元初吏部尚書崔日用嘗採毛詩大雅小雅二十篇及司馬相如封禪書因帝生日表上之以申規諷幷述善成之事手詔答曰夫詩者動天地感鬼神厚於人美於教矣朕志之所尚思與之齊庶乎採詩之官補朕之闕且古者封禪升中告成朕以菲徳未明於志道悚然以聽頗壯相如之詞惕然載懐復慙夷吾之語卿洽聞殫見溫故知新建此發揮益彰忠懇豈非封蓬山之籍心不忘於起予因蘭殿之祥言固深於沃朕循環覽諷用慰于懐今賜卿衣裳一副物五十段以示無言不醻之信也五年勅蒲州童子吳豸之薄綴小篇兼記古事不稍優異無申奬勸宜賜其父絹十疋令更習學便有成就肅宗時杜亞字次公京兆人少頗涉學善言物理及厯代成敗之事至徳初於靈武獻封章言政事授校書郎董晉字混成舉明經及第至徳初帝自靈武幸彭原晉上書謁見授校書郎翰林待制憲宗元和五年三月獻䇿人張權與㳺君愛各賜衣任所適武宗嘗曽私撰數字以示侍講王起起曰臣書中所不識者唯八駿圗中三五字而已今此字臣未知出於何書武宗笑而竒之故待如師友因曰當代仲尼晉髙祖天福二年六月勅進䇿官前攝鄭州防禦廵官前鄉貢明經張休以廉科擢第藝府逰心既堅拾芥之勤果契然薪之志而能救斯時病来貢封章覽其所陳甚爲濟要旌諸憂國示以寵章王畿式解於褐衣縣簿仍超於常品可將仕郎守河南府伊陽縣主簿三年二月庚辰左散騎常侍張允進駁赦論帝覽而嘉之降詔奬飾仍付史館六年正月辛酉朔上受朝於崇元殿刑部員外郎李象進二舞賦一首帝覽而嘉賞令編諸史册周世宗顯徳二年草澤趙守微投匭上書指陳治道帝覽之宣召顧問初令樞宻直學士邊歸讜試䇿論詩賦復令中書程試以其文義小有可觀翌日乃授右拾遺賜衣服銀帶繒帛鞍馬等兼降詔奬飾仍以所試䇿論詩賦宣示百官四月太子少保王仁裕進囘文金鏡銘上善之賜帛百疋九月仁裕又以自製詩賦寫圖上進賜銀器五十兩衣著五十疋三年十二月兩浙進奉掌書記歙州刺史周叔獻進上國觀光歌一首帝以繒綵鞍馬賜之六年二月辛夘以新及第進士髙冕爲右補闕仍賜衣一襲烏金帶一銀器一百兩衣著二百疋銀鞍勒馬一匹是時帝鋭意於平燕及冕登第因其謝恩入對命宰臣以平燕論試之既而冕著論盛言燕可擊甚惬帝旨故有是超拜復厚加賜賚焉禮賢夫賢者國之紀人之望也是故有方之士絜矩以行之萬乗之主虛心以待之上以成王者之美下以通天下之志所以人用勸而邦用乂也其或才識明備行實敦篤或動黙繇已用舍在時或以舊齒名徳或以抗節直道莫不延見之際勞問湛渥進退雖殊恩遇胥洎賜予以將其厚意詔命以達乎至誠或想見夫人親至其第或各從爾志愈厚其風存歿攸同始終一貫斯蓋有國者之典也周文王至於磻谿之水呂尚釣於涯王下趨拜曰望公七年乃今見光景於斯武王克商一戎衣天下大定乃反商政政繇舊釋箕子囚式商容閭漢武帝時汲黯爲九卿帝不冠不見也嘗坐武帳武帳置兵闌五兵於帳中也黯前奏事帝不冠望見黯避帷中使人可其奏其敬禮如此昭帝元鳳元年三月賜郡國所選有行義者涿郡韓福等五人帛人五十疋遣歸詔曰朕閔勞以官職之事其務修孝悌以教鄉里令郡縣常以正月賜羊酒有不幸者賜衣被一襲祠以中牢後漢光武建武中詔徵太原周黨黨伏而不謁博士范升奏毁黨曰臣聞堯不須許繇巢父而建號天下周不待伯夷叔齊而王道以成伏見太原周黨東海王良山陽王成等䝉受厚恩使者三聘乃肯就車及陛見帝廷黨不以禮屈伏而不謁偃蹇驕悍同時俱遁黨等文不能演義武不能死君釣采華名庶㡬三公之位臣願與坐雲臺之下考試圗國之道不如臣言伏虛妄之罪而敢私竊虛名誇上求髙皆大不敬書奏天子以示公卿詔曰自古明王聖主必有不賓之士伯夷叔齊不食周粟太原周黨不受朕禄亦各有志焉其賜帛四十疋杜林扶風人少好學時稱通儒王莽敗避亂客河西建武六年光武聞林已還三輔乃徵拜侍御史引見問以經書故舊及西州事甚悦之賜車馬衣被羣僚知林以名徳用甚尊憚之士大夫咸推其博洽索盧放建武六年徵爲雒陽令有能名因病乞身徙諫議大夫數納忠言後以疾去建武末復徵不起光武使人輿之見於南宮雲臺賜榖二千斛遣歸除子爲太子中庶子王良爲司徒司直以病歸後連徵輒稱病詔以𤣥纁聘之遂不應後光武幸蘭陵遣使者問良所疾苦不能言對詔復其子孫邑中徭役明帝時韋彪好學洽聞雅稱儒宗帝聞彪名永平六年詔拜謁者賜以車馬衣服趙咨少有孝行舉至孝有道遷博士謝病去徴拜議郎辭疾不到詔書切讓州郡以禮發遣前後再三不得已應召復拜東海相建武中淳于恭不應辟召客隠瑯琊黔陬山數十年建初元年章帝下詔美恭素行告郡賜帛二十疋遣詣公車除為議郎引見極日訪以政事江革齊國臨淄人事母孝鄉里稱之曰江巨孝建初中太尉牟融舉賢良方正再遷司空長史章帝甚崇禮之遷五官中郎將每朝㑹帝常使虎賁扶持及進拜恒目禮焉時有疾不㑹朝太官送醪膳恩寵有殊後上書乞骸骨轉拜諫議大夫賜告歸因謝病稱篤元和中天子思革至行制詔齊相曰諫議大夫江革前已病歸今起居何如夫孝百行之冠衆善之始也國家每惟志士未嘗不及革縣以見穀千斛賜巨孝常以八月長吏存問致羊酒以終厥身如有不幸祠以中牢繇是巨孝之稱行於天下及卒詔復賜穀千斛鄭均建初六年公車特徵再遷尚書數納忠言章帝敬重之後以病乞骸骨拜議郎吿歸因稱病篤帝賜以衣冠東觀記曰均遣子英奉章詣闕詔召見英問均所苦賜以冠幘錢帛鄭均東平人毛義廬江人並有至行元和元年詔吿廬江太守東平相曰議郎鄭均束脩安貧恭儉節整前在機宻以病致仕守善貞固黄髮不怠又前安邑令毛義躬履遜讓比徵辭病淳潔之風東州稱仁書不云乎彰厥有常吉哉其賜均義穀各千斛常以八月長吏存問賜羊酒顯兹異行東觀記曰賜羊一頭酒二斗終其身問遺賢良必以八月諸物老成故順其時氣助養育之也故月令仲秋之月養衰老授几杖行糜粥飲食鄭𤣥注云助老氣也明年帝東廵過任城乃幸均舍勅賜尚書禄以終其身故時人號爲白衣尚書和帝永元九年徵魯恭拜議郎八月飲酎大㑹章臺詔使小黄門特引恭前其夜拜侍中勅使陪乗勞問甚渥順帝永建二年策書備禮𤣥纁徵樊英等四人復固辭疾篤乃詔切責郡縣駕載上道英不得已到京稱病不肯起乃强輿入殿猶不以禮屈帝怒謂英曰朕能生君能殺君能貴君能賤君能富君能貧君君何以慢朕英曰臣受命於天生盡其命天也死不得其命亦天也陛下焉能生臣焉能殺臣臣見暴君如見仇讐立其朝猶不肯可得而貴乎雖在布衣之列環堵之中晏然自得不易萬乗之尊又可得而賤乎陛下焉能貴臣焉能賤臣臣非禮之禄雖萬鍾不受也若申其志雖簞食不厭也陛下焉能富臣焉能貧臣帝不能屈而敬其名使出就太醫養疾月給羊酒至四年三月天子乃爲英設壇席令公車令道尚書奉引賜几杖待以師傅之禮延問得失英不敢辭拜五官中郎將數月英稱疾篤詔以爲光禄大夫賜吿歸令所在送穀千斛常以八月致牛一頭酒三斛如有不幸祠以中牢英辭位不受有詔譬㫖勿聽桓帝初徵爰延拜大鴻臚帝以延儒生常特宴見靈帝即位再以𤣥纁聘彭城姜肱肱不至帝手筆下詔曰姜肱抗凌雲之志養浩然之氣以朕徳薄未肯降志昔許繇不屈王道爲化夷齊不撓周徳不虧州郡以禮優順勿失其意魏太祖初平荆州乃釋韓嵩之囚以其名重甚加禮待使條品州人優劣皆擢而用之以嵩爲大鴻臚以交友禮待之趙戩長安之亂客於荆州及太祖平荆州乃辟之執戩手曰恨相見晚遂辟爲掾後爲五官郎將司馬相國鍾繇長史邴原自遼東歸於太祖太祖為司空辟原署東閣祭酒帝北伐三郡單于還住昌國燕士大夫及酒酣帝曰孤反鄴守諸君必將来迎今日明旦度皆至矣其不来者獨有邴祭酒耳言訖未久而原先至門下通謁帝大驚喜擥履而起逺出迎原曰賢者誠難測度孤謂君將不能来而逺自屈誠副饑虛之心謁訖而出軍中士大夫詣原者數百人帝怪而問之時荀文若在坐對曰獨可省問邴原耳帝曰此君名重乃亦傾士大夫心文若曰此一世異人士之精藻公宜盡禮以待之帝曰固孤之宿心也自是之後見敬益重原雖在軍厯署常以病疾髙枕里巷終不當事又希㑹見河内張範名公之子也其志行有與原符甚相親敬令曰邴原名髙徳大清規邈世魁然而峙不爲孤用聞張子頗欲學之吾恐造之者富隨之者貧也張範後因帝自荆州還得見於陳以範爲議郎參丞相軍事甚見敬重文帝黄初二年公卿朝朔旦乃引故漢太尉楊彪待以客禮詔曰先王制几杖之賜所以賔禮黄耉褒崇元老也昔孔光卓茂皆以淑徳髙年受兹嘉賜公故漢宰臣乃祖已来世著名節年過七十行不踰矩可謂老成人矣所宜寵異以彰舊徳其賜公延年杖及憑几謁請之日便使杖入又可使著鹿皮冠彪辭讓不聽竟著布單衣皮弁以見四年詔拜光禄大夫秩中二千石朝見位次三公如孔光故事彪上章固辭帝不聽又爲門施行馬致吏卒以優崇之初彪見漢祚將終自以累世爲三公恥為魏臣遂稱足攣不復行積十餘年帝即王位欲以爲太尉令近臣宣㫖彪辭曰嘗以漢朝爲三公值世衰亂不能立尺寸之益若復爲魏臣於國之選亦不為榮也帝不奪其意虞翻在吳爲騎都尉有盛名帝常為翻設虛座薛夏博學有才為祕書丞文帝嘉之每與夏推論書𫝊未嘗不終日也每呼之不名而謂之薛君夏居甚貧帝又顧其衣薄解所御服袍賜之其後征東將軍曹休来朝時帝方與夏有所咨論而外啟休到帝引入坐定帝顧夏言之於休曰此君祕書丞天水薛宣聲也宜共談其見遇如此晉宣帝爲魏相時南陽州泰好立功業善用兵荆州刺史裴潛以泰爲從事帝鎮宛潛數遣詣帝繇此爲帝所知及征孟達泰又導軍遂辟泰泰頻䘮考妣及祖九年居䘮帝留缺待之至三十六日擢為新城太守景帝為魏相時山濤年四十餘隐身不交世務與宣穆后有中表親是以見帝帝曰呂望欲仕邪命司隸舉秀才除郎中轉驃騎將軍王昶從事中郎久之拜趙國相遷尚書吏部郎文帝為晉太子與濤書曰足下在事清明雅操邁時念多所乏今致錢二十萬榖二百斛魏帝常賜景帝春服帝以賜濤又以母老并贈藜杖一枚遷大將軍從事中郎帝以濤鄉閭宿望命太子拜之元帝為鎮東大將軍引賀循為軍司循稱疾篤牋疏十餘上帝遺之書曰夫百行不同故出處道殊因性而用各任其真耳當宇宙肅清彛倫攸敘隨運所遇動黙在巳或有遐棲髙蹈輕舉絶俗逍遥養和恬神自足斯蓋道隆人逸勢使其然若乃特運屯弊主危國急義士救時驅馳拯世燭之武乗縋以入秦園綺彈冠而輔漢豈非大雅君子卷舒合道乎虛薄寡徳忝備近親謬荷寵位受任方鎮飱服𤣥風慕羡髙矩嘗願棄結駟之軒軌䇿柴蓽而造門徒有其懐而無從賢之實者何良以寇逆殷擾諸夏分離皇居失御黎元荼毒是以日夜憂懐慷慨發憤志在竭節耳前者顧公臨朝深賴髙筭元凱既登巢許獲逸至於今日所謂道之云亡邦國殄瘁羣望顒顒實在君侯苟義之所在豈得讓勞居逸想達者亦一以貫之也庶禀徽猷以宏逺規今上尚書屈徳為軍司謹遣參軍沈楨銜命奉授望必屈臨以副傾遲循猶不起及帝承制復以爲軍諮祭酒循稱疾敦逼不得已乃轝疾至帝親幸其第因諮以正道循羸疾不堪拜謁乃就加朝服賜第一區車馬牀帳衣褥等物循辭讓一無所受紀瞻以世亂還吳時元帝為瑯琊王遷安東將軍引瞻爲軍諮祭酒轉正東長史帝親幸瞻宅與同乗而歸王嶠北軍中候佑之子也少有風尚幷司二州交辟而不就永嘉末㩦其二弟避亂渡江時元帝鎮建業教曰王佑三息始至名徳之胄並有操行宜蒙飾敘且可給錢三十萬帛三百疋米五十斛親兵二十人尋以嶠參世子東中郎軍士不就杜夷初拜國子祭酒教曰今大義頽替禮典無宗朝廷滯義莫能攸正宜特立儒林祭酒官以宏其事處士杜夷棲情遺逺確然絶俗才學精通道行優僃其以夷為祭酒夷辭疾未嘗㑹朝帝欲詣夷夷陳萬乗之主不宜往庶人之家帝乃與夷書曰吾與足下雖情在忘言然虛心歴載正以足下羸疾故欲相省寧論常儀也建武中令曰國子祭酒杜夷安貧樂道静志衡門日不暇給雖原憲無以加矣其賜穀二百斛皇太子三至夷第執經問義夷雖逼時命亦未嘗朝謁國有大政常就諮訪焉明帝即位夷又表請退詔曰先王之道將墜於地君下帷研思今之劉揚縉紳之徒景仰軌訓豈得髙退而朕靡所取則焉後魏道武時奚莫忠厚有智謀帝寵遇之稱之曰仲尼後以軍功拜并州刺史賜爵任城公賈彛弱冠為慕容垂驃騎大將軍遼西王農記室參軍道武先聞其名常遣使者求彛於垂彌増器敬更加寵秩太武時崔浩爲左光禄大夫帝每幸浩第多問以異事或倉卒不及束帶奉進蔬食不暇精美帝為舉匕箸或立嘗而旋其見寵愛如此於是引浩出入卧内孝文時李平涉獵羣書好禮易頗有文才太和初拜通直散騎侍郎帝禮之甚重王肅為豫州刺史尋徵入朝孝文手詔曰不見君子中心如醉一日三嵗我勞如何飾館華林拂席相待卿欲以何日發汝濆也故復此勅劉芳為太常卿沈雅方正槩尚甚髙經傳多通孝文尤器敬之勤相顧訪孝明時甄琛為侍中明觧朝義在官清白自孝文宣武咸相知待至帝以師傅之義而加禮焉後周太祖時江陵平王襃與王充劉㲄宗懔殷不害等數十人俱至長安帝喜曰昔平呉之利二陸而已今定楚之功羣賢畢至可謂過之矣又謂襃及王充曰吾即王氏甥也卿等並吾之舅氏當以親戚為情勿以去鄉介意於是授襃及充殷不害等車騎大將軍儀同三司常從容上席資餼甚厚襃等亦並荷恩眄忘其􅀢旅焉韋夐前後十見徴辟皆不應命屬太祖經綸王業側席求賢聞夐養髙不仕虛心敬悦遣使辟之備加禮命雖情諭甚至而竟不能屈彌以重之亦弗之奪也所居之宅枕席林泉夐對翫琴書蕭然自逸時人號為居士焉至有慕其閑素者或載酒從之夐亦為之盡歡接對忘倦明帝即位禮敬愈厚乃為詩以貽之曰六爻身遯世三辰光少微潁陽讓愈逺滄州去不歸香動秋蘭珮風飄蓮葉衣坐石窺仙島乗舟下釣磯嶺松千仭直嵓泉百丈飛聊登平樂觀遥望首陽薇詎能同四隠來參余萬幾夐答帝詩願時朝謁帝大悦勅有司日給河東酒一升號之曰逍遥公元暉頗好渉獵書記少得美名於京下太祖見而禮之命與諸子遊處每同席共硯情契甚厚弱冠召補相府中兵參軍劉璠為梁雍州刺史蕭循府司馬時武陵王紀稱制於蜀徵璠為中書侍郎璠堅求還蕭循及至白馬西屬達奚武軍已至南鄭璠不得入城遂降於武太祖素聞其名先誡武曰勿使劉璠死也故武先令璠赴闕璠至帝見之如舊謂僕射申徽曰劉璠佳士古人何以過之徽曰昔晉人滅吳利在二陸明公今平梁漢得一劉璠也明帝時冦㩦為驃騎將軍㩦年齒雖邁而志識未衰教授子孫必先典禮帝尚儒重德特欽賞之數加恩錫欲與相見㩦不得已乃入朝帝與同席而坐因顧訪雒陽故事㩦身長八尺鬚鬢皓然容止端詳音韻清朗帝與之談論不覺屢為前膝及㩦辭還帝親執其手曰公年徳俱尊朕所欽尚乞言之禮所望於公宜數相見以慰虛心遂以御輿令於帝前乗出顧謂左右曰如此之事唯積善者可以致之何止見重於今亦將𫝊之萬古時人咸以為榮武帝時韓襃為少保厯事三帝以忠厚見知帝深敬重常以師道䖏之每入朝見必有詔令坐然始與論政事熊安生初仕北齊為國子博士武帝入鄴安生遽令掃門家人怪而問之安生曰周帝重道尊儒必將見我矣俄帝幸其第詔不聽拜親執其手引與同坐謂之曰朕未能去兵以此為愧安生曰黄帝尚有阪泉之戰况陛下恭行天罰乎帝又曰齊民賦役繁興竭民財力朕救焚拯溺思革其弊欲以府庫及三臺雜物散之百姓公以為何如安生曰昔武王克商散鹿臺之財發鉅橋之粟陛下此詔異代同美帝又曰朕何如武王安生曰武王伐紂懸首白旗陛下平齊兵不血刃愚謂聖略為優帝大悦賜帛三百疋米三百石宅一區幷賜象笏及九環金帶自餘什物稱是李徳林初仕北齊為儀同三司及武帝克齊入鄴之日勅小司馬唐道和就宅宣㫖慰諭云平齊之利唯在於爾朕本畏爾逐齊主東走今聞猶在大有慰懐宜即入相見道和引之入内遣内使宇文昂訪問齊朝風俗政教人物善惡即留内省三宿乃歸仍遣從駕至長安授内史上士隋文帝受禪以後周司中大夫儀同三司張美年老致仕欽其徳望以書徵之曰朕初臨四海思存政術舊齒明賢實懐勤佇儀同昔在周室徳業有聞雖云致仕猶克壯年宜即入朝用副虛想乃謁見勅令勿拜扶升殿上降榻執手與之同坐宴語久之賜以几杖姚察為祕書丞開皇中别勅成梁陳二代史又勅於朱華閣長參帝知察蔬菲别日乃獨召入内殿賜果菜乃指察謂朝臣曰聞姚察學行當今無比我平陳唯得此一人唐太宗初爲秦王徵求草莽置驛招聘皆自逺而至於時海内初平帝乃銳意經籍怡神於藝文因開學館以待四方之士又降㫖曰昔楚國尊賢崇道光於申穆梁邦接士茂徳重於鄒枚咸以著範前修垂芳後烈顧惟菲薄多謝古人髙山仰止能無景慕是以芳蘭始被深思冠蓋之逰丹桂初叢庶延髦俊之士既而塲苗蓋寡空留皎皎之姿喬木從遷終媿嚶嚶之友所冀通規正訓輔其闕如故側席無倦於齊庭開延有待於燕館屬以大行臺司勲郎中杜如晦記室考功郎中房𤣥齡于志寧軍諮祭酒蘇世長天䇿府記室薛收文學褚亮姚思廉太學博士陸徳明孔頴達主簿李𤣥道天䇿倉曹李守素王府記室參軍虞世南參軍事蔡允恭薛元敬顔相時宋州總管府户曹許敬宗太學助教蓋文達諮議典籤蘇朂等或背淮而至千里或適趙以欣三見咸能垂裾邸第委質藩維引禮度而成典則暢文詞而詠風雅優游幕府是用嘉焉宜令幷以本官兼文館學士及薛收卒復徵東虞州録參軍劉孝孫入館尋遣庫直閻立本圖其狀貌具題名字并顯爵里仍勅文學褚亮為之像贊勒成一巻號十八學士寫真圖蔵之書府用彰禮賢之重也諸學士並給珍膳分為三畨更直宿于閣下每軍國務静參謁歸休即便引見討論典籍商略前載考其得失或夜分而寢又降以溫顔禮數甚厚繇是天下歸心竒傑之士咸思自効於時預入館者時所傾慕謂之登瀛洲又嘗謂侍臣曰朕每覩臣下有文學優長讜言補益為政可觀者未嘗不拭目以師友待之褚亮隋末為太常博士薛舉僭偽隴隂畧有郡縣得亮以為黄門侍郎委之機務及太宗擊破舉素聞亮名乃於衆中訪之深加禮接因從容勞苦之曰久事無道之主寡人受委專征喜於尅敵得俊亮拜手對曰弱年流轉寓跡隋朝雖異龍逢逆鱗同為暴君所棄備嘗艱苦淪沒寇庭所恨王濬浮江名桂三吳之籍武王伐紂不預八百諸侯薛主於擾攘之間據有秦隴不知天命數抗王師非大王寬仁則盡從坑戮矣今十萬俘囚並皆釋赦手舞足蹈無不歌詠恩徳仁聖天資大度睿畧英逺故能尅平干紀成此霸圗豈獨亮荷再生之恩誠四海仰来蘇之澤帝大悦賜物二百段馬四匹李百藥初為杜伏威行臺郎中勸伏威入朝尋輔公祐反又以百藥為吏部侍郎有譖百藥於髙祖云百藥初説杜伏威入朝又與輔公祐同反武徳中配涇州司户太宗為秦王常至涇州召百藥因賜詩云項棄范増善紂妬比干才嗟此二賢沒余喜得卿来髙宗顯慶四年召孫思邈拜諫議大夫固辭不受上元元年辭疾請歸特賜良馬及鄱陽公主邑司以居焉思邈弱冠善談莊老及百家之説兼好釋典周宣帝時隐居太白山隋文帝徵為國子博士稱疾不起及太宗即位召詣京師嗟其容色甚少謂曰故知有道誠可尊重羡門廣成豈虛言哉將授以爵位固辭至是又召見焉肅宗為太子時李泌自嵩山詣闕獻書論當代時務𤣥宗召見令待詔翰林為東宮供奉肅宗甚禮遇之代宗初為元帥廣平王以泌為行軍司馬肅宗嘗謂曰卿當上侍上皇天帝中為朕師友次判廣平王行軍朕父子三人資卿道義册府元龜卷九十七
