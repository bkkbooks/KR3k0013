body:
  text: 冊府元龜卷七十七宋王欽若等撰帝王部委任王者臨制海内壹齊天下内外之任衆職竝建授受之際必得其人然後委而用之斯古今不易之道也是以任賢勿貳載厥禹謨埀拱仰成著於周誥爰自兩漢迄於近世曷嘗不登用髦俊疇咨毗頼或機務藂委訪以大計或輿駕順動付以居留抱兼才者因之省官辭衰恥者俾之彊起裁處闗决既許以便益登擢署置悉係其論擬故有心比金石材稱楨幹居以稱股肱之寄出以增方面之重自非禀克忠之操契同德之美者其孰能與於此乎周康王命畢公曰惟公懋德克勤小物弼亮四世正色率下罔不祗師言公勉行徳能勤小物輔佐文武成康四世為公卿正色率下下人無不敬仰師法嘉績多于先王予小子埀拱仰成公之善功多大先人之美我小子為王垂拱仰公成理言其上顯父兄下施子孫宣王以申伯甫侯賢知入為周楨幹之臣四國有難則往扞禦之為之蕃屏四方恩澤不至則往宣暢之故崧高之詩曰維申及甫維周之翰四國于蕃四方于宣漢高祖初為漢王引兵東定三秦留蕭何收巴蜀鎮撫諭告使給軍食二年與諸侯擊楚何守闗中侍太子治櫟陽為令約束立宗廟社稷宫室縣邑輙奏上可許以從事即不及奏輙以便宜行事上來以聞上來還乃以所為聞也計戸轉漕給軍漢王數失軍遯去何常興闗中卒輙補缺漢王以此剸屬任何闗中事剸與專同音章阮切景帝時郅都為中尉免歸家帝使即拜都為鴈門太守就家拜便道之官不令至闕陳謝也得以便宜從事也武帝時吾丘壽王為郎稍遷會東郡盗賊起拜為東郡都尉上以壽王為都尉不復置太守霍光為奉車都尉武帝屬光以輔少主光讓侍中金日磾日磾曰臣外國人且使匈奴輕漢於是遂為光副宣帝本始元年大將軍霍光稽首歸政帝謙讓委任焉蕭望之為謁者帝初即位思進賢良多上書言便宜輙下望之問狀高者請丞相御史望之以其所言之狀請於丞相御史或以奏聞即見超擢次者中二千石試事滿歲以狀聞試令行其所言之事或以諸他執事試之下者報聞或罷歸田里所白處奏皆可張安世為衞將軍元康四年病上疏歸侯乞骸骨天子報曰將軍年老被病朕甚閔之雖不能視事折衝萬里君先帝大臣明於治亂朕所不及得數問焉言意所不及者即以問君也何感而上書歸衞將軍富平侯印感恨也音胡闇切薄朕忘故薄猶嫌也君意嫌朕遺忘故舊而求去也非所望也願將軍彊餐食近醫藥專精神以輔天年安世復彊起視事龔遂坐昌邑王事髠為城旦宣帝即位久之渤海左右郡歲饑盗賊竝起左右謂側近相次者二千石不能禽制上選能治者丞相御史舉龔遂可用上以為渤海太守時遂年七十餘召見形貌短小宣帝望見不副所聞心内輕焉謂遂曰渤海廢亂朕甚憂之君欲何以息其盗賊以稱朕意遂對曰海瀕遐逺不霑聖化瀕澤也音頻又音賓其民困於饑寒而吏不恤故使陛下赤子盗弄陛下之兵於潢池中耳赤子猶言初生㓜小之意也積水曰潢音黄今欲使臣勝之邪將安之也勝謂以威力克而殺之也安謂以德化撫而安之帝聞遂對甚説説讀作悦答曰選用賢良固欲安之也遂曰臣聞治亂民猶治亂繩不可急也惟緩之然後可治臣願丞相御史且無拘臣以文法得一切便宜從事上許焉加賜黄金贈遣乗傳至渤海界杜延年初仕昭帝為太僕右曹給事中吏民上事言便宜有異輙下延年平處復奏言先平處其可否然後奏言可官試者至為縣令或丞相御史除用滿歲以狀聞或抵其罪法抵至也言事之人有奸妄者則致之於罪法嘗與兩府及廷尉分章延年為人安和備於諸事言皆明習也久典朝政宣帝立信任之出即奉駕入給事中居九卿位十餘年賞賜賂遺貲數千萬武帝時翟方進為丞相定陵侯淳于長雖外戚然以能謀議為九卿新用事方進獨與長交稱薦之及長坐大逆誅諸所厚善皆坐長免帝以方進大臣又素重之為隱諱方進内慙愧上疏謝罪乞骸骨帝報曰定陵侯長已伏其辜君雖交通傳不云乎朝過夕改君子與之與許也君何疑焉其專心一意母怠近醫藥以自持方進乃起視事條奏長所厚善京兆尹孫寶右扶風蕭育刺史二千石以上免二十餘人其見任如此後漢光武時李通為大司農帝毎征討四方常令通居守京師鎮撫百姓修宫室起學宫㓂恂為河内太守行大將軍事帝謂恂曰河内完富吾將因是而起昔高祖留蕭何鎮闗中吾今委公以河内堅守轉運給足軍糧率厲士馬防遏它兵勿令北渡而已光武於是復北征燕代恂移書屬縣講兵肄射伐淇園之竹為矢百餘萬養馬二千疋收租四百萬斛轉以給軍王常初為左曹封山桑侯帝嘗於大㑹中指常謂羣臣曰此家率下江諸將輔翼漢室心如金石眞忠臣也是日遷常為漢中將軍遣南擊鄧奉董訢令諸將皆屬焉景丹為驃騎大將軍建武三年陜賊蘇况攻破𢎞農生獲郡守丹時病丹從上至懐病瘧見上在前瘧發寒慄帝笑曰聞壯士不病瘧今漢大將軍反病瘧邪使小黄門扶起賜醫藥還歸雒陽病遂加帝以其舊將欲令強起領郡事乃夜召入謂曰賊迫近京師但得將軍威重臥以鎮之足矣丹不敢辭乃力疾拜命耿弇為建威大將軍時漁陽太守彭寵反詔弇攻之弇以父據上谷本與彭寵同功又兄弟無在京師者自疑不敢獨進上書求詣雒陽詔報曰將軍出身舉宗為國所向陥敵功效尤著何嫌何疑而欲求徵且與王常共屯涿郡勉思方略陳俊為瑯琊太守行大將軍事將兵擊董憲於贛榆縣名屬東海郡進破朐賊孫陽平之後張歩畔還琅琊俊追討斬之帝美其功詔俊得專征青徐賜俊璽書曰將軍元勲大著威震青徐兩州有警得專征之俊得撫貧弱表有義撿制軍吏不得與郡縣相干百姓歌之數上書自請願奮擊隴蜀詔報曰東州新平大將軍之功也負海猾夏盗賊之處國家以為重憂且勉鎮撫之竇融為凉州牧建武八年光武西征隗囂融率五郡太守及羗虜小月支等歩騎數萬輜重五千餘兩與大車會髙平第一髙平今原州縣郡國志云髙平有第一城光武待以殊禮及帝悉遣西還所鎮以兄弟竝受爵位久專方面懼不自安數上書求代詔報曰吾與將軍如左右手耳數執謙退何不曉人意勉循士民無擅離部曲後入朝代隂興行衛尉事特進如故又兼領將作大匠弟友為城門校尉兄弟竝典禁兵又後為大司空數辭讓爵位因復請間求見帝不許後朝罷逡廵席後帝知欲有讓遂使左右傳出他日㑹見迎詔融曰日者知公欲讓職還土故命公暑熱且自便今相見宜論他事勿得復言融不敢重陳請郭伋為潁川太守召見辭謁帝勞之曰賢能太守去帝城不逺河潤九里冀京師并䝉福也君雖精於追捕而山道險阨自鬪當一士耳深宜慎之後為凉州牧時朝廷多舉伋可為大司空帝以并部尚有盧芳之警且匈奴未安欲使久於其事故不召岑彭為征南大將軍與大司馬呉漢及誅虜將軍劉隆輔威將軍臧宫驍騎將軍劉㰴發南陽武陵南郡兵乂發桂陽零陵長沙委輸棹卒棹卒持棹行船也凡六萬餘人騎五千匹皆㑹荆門呉漢以三郡棹卒多費糧榖欲罷之彭以為蜀兵盛不可遣上書言狀帝報彭曰大司馬習用歩騎不曉水戰荆門之事一繇征南公為重而巳明帝初馮魴為執金吾帝東廵郡國留魴宿衛南宫勅魴車駕發後將緹騎宿𤣥武門複道上領南宫吏士保給牀席子孫得到魴所竇固為奉車都尉復出玉門擊西域詔耿秉及騎都尉劉張皆去符傳以屬固專將兵者竝有符傳擬合之取信今去符皆受固之節度固遂破白山降車師和帝時張酺代尹睦為太尉數上書以疾乞身薦魏郡太守徐防自代帝不許使中黄門問病加以珍羞賜錢三十萬酺遂稱篤時子蕃以郎侍講帝因令小黄門勅蕃曰隂陽不和萬人失所朝廷望公思惟得失與國同心而托病自潔求去重任誰當與吾同憂責者非有望於斷金也司徒固疾司空年老司徒劉芳司空張奮也公其傴僂勿露所勅酺惶恐詣闕謝復視事安帝時張禹為太傅録尚書事與太尉徐防司空尹勤同日俱封其秋以冦賊雨水䇿免防勤而禹不自安上書乞骸骨更拜太尉魏太祖時溫恢為丞相主簿出為揚州刺史太祖曰甚欲使卿在親近顧以為不如此州事大故書云股肱良哉庶事康哉得無當得蔣濟為治中邪時濟見為丹陽太守乃遣濟還州又語張遼樂進等曰揚州刺史曉達軍事動静與共咨議趙儼初為太祖主簿時太祖征荆州以儼領章陵太守徙都督䕶軍䕶于禁張遼張郃朱靈李典路招馮楷七軍復為丞相主簿夏侯惇為河南尹遷伏波將軍領尹如故使得以便宜從事不拘科制及從征孫權還使惇都督二十六軍留居巢徐宣初為太祖門下督從到壽春㑹馬超作亂大軍西征太祖見官屬曰今當逺征而此方未定以為後憂宜得清公大德以鎮統之乃以宣為左䕶軍留統諸軍後為左僕射加侍中光禄大夫車駕幸許昌總統留事帝還主者奏呈文書詔曰吾省與僕射何異竟不視文帝踐祚以蔣濟為東中郎將濟請留詔曰漢高祖歌曰安得猛士守四方天下未寧要須良臣以鎮邊境如其無事乃還鳴玉未為後也明帝初華歆為太尉嘗薦管寧後歆稱病乞退讓位於寧帝不許臨當大㑹乃遣散騎常侍繆襲奉詔喻指曰朕新莅庶事一日萬幾懼聽斷之不明頼有德之臣左右朕躬而君屢以疾辭位夫量主擇君不居其朝委榮棄禄不究其位古人固有之矣顧以為周公伊尹則不然潔身狥節常人為之不望之於君其力疾就㑹以惠予一人將立席机筵命百官總已以聽君到朕然後御坐又詔襲須歆必起乃還歆不得已乃起辛毗為衛尉時蜀將諸葛亮率衆出渭南先是大將軍司馬宣王數請與亮戰帝終不聽是歲恐不能禁乃以毗為大將軍軍師使持節六軍皆肅凖毗節度莫敢犯違宣王數欲進攻毗禁不聽宣王雖能行意每屈於毗滿寵為征東將軍與揚州刺史王凌共事不平凌友黨毁寵疲老悖謬故帝詔之既至體氣康強見而遣還寵屢表求留詔報曰昔亷頗強食馬援據鞍今君未老而自謂已老何與亷馬之相背邪其思安邊境惠此中國王基為征東將軍都督揚州諸軍事時淮南初定是歲基母卒詔秘其凶問迎基父豹喪合塟雒陽追贈豹北海太守晉武帝時賈充為散騎常侍時鍾㑹謀反於蜀帝假充節以本官都督闗中隴右諸軍事西據漢中未至而㑹死時軍國多事朝廷機密皆與籌之帝甚信重充與裴秀王沈羊祜荀朂同受腹心之任羊祜鎮南夏詔罷江北都督置南中郎將以所統諸軍在漢東江夏者皆以益祜李𦙍為太子少傅以忠允髙亮有匪躬之節使領司𨽻校尉𦙍屢自表讓忝𫝊儲宫不宜兼監司之官帝以二職竝須忠賢故每不許索綝既立秦王為皇太子秦王即愍帝也及即尊位以綝為前將軍又授衛將軍領太尉位特進軍國之事悉以委之元帝為瑯琊王永嘉初用王導計始鎮建業以顧榮為軍司馬賀循為參佐王敦王導周顗刁恊等為腹心股肱賔禮名賢存問風俗江東歸心焉明帝初即位郗鑒為尚書王敦專制内外危逼謀杖鑒為外援繇是拜安西將軍兖州刺史都督揚州江西諸軍假節鎮合肥溫嶠為侍中機密大謀皆所參綜詔命文翰亦悉豫焉俄轉中書令嶠有棟梁之任帝親而倚之紀瞻為領軍將軍兼散騎常侍及王敦之逆帝使謂瞻曰卿雖病但為朕臥䕶六軍所益多矣乃賜布千疋桓彛為散騎常侍時帝將伐王敦引參密謀及敦平以功封萬寧縣男丹陽尹溫嶠上言宣城阻帶山川頻經變亂宜得望實居之竊謂桓彛可充其選帝手詔曰適得太眞表如此太眞嶠字今大事新定朝廷須才不有君子其能國乎方今外務差輕欲停此事彛上疏深自偽挹内外之任竝非所堪但以墳栢在此郡欲暫結名義遂補彛宣城内史在郡有惠政為百姓所懐康帝初即位諒隂不言委政於庾氷何充孝武時王珣為侍中帝深仗之琅琊王道子為司徒太元中詔録尚書六條事庾懌為輔國將軍梁州刺史假節鎮魏興時兄亮總統六州以懌寛厚容衆故授以是任為東西勢援徐邈為前衛率領本郡大中正授經太子雖在東宫猶朝夕入見參綜朝政脩餙文詔拾遺補闕勤勞左右帝嘉其謹密方之於金霍有託重之意泉企為東雍州刺史齊神武專政有西顧之心帝欲委企以山南之事乃除雒州刺史當州都督未幾帝西遷齊神武率衆至潼闗企遣其子元禮督鄉里五千人北出大谷以禦之齊師不敢進後魏道武天興元年正月車駕幸鄴將北還發卒萬人治直道自望都鐵闗鑿恒嶺至代五百餘里帝慮還山東有變乃置行臺於中山詔左丞相守尚書令衛王儀鎮中山撫軍大將軍略陽公元遵鎮渤海之合口崔𤣥伯為吏部尚書命有司制官爵撰朝儀恊音樂定律令申科禁𤣥伯總而裁之以為永式及置八部大夫以擬八座𤣥伯通署三十六曹如令僕統事為道武所任勢傾朝廷崔逞初為慕容寳留臺吏部尚書及慕容驎立逞挈其家亡歸道武張衮先稱美逞及見禮遇甚重拜為尚書任以政事録三十六曹别給吏屬居門下省奚牧重厚有知謀道武寵遇之稱之曰仲兄初劉顯謀害道武梁眷知其謀濳使牧與穆崇至七介山以告帝帝以牧告顯之功拜為治民長敷奏政事叅與計謀庾岳父和辰世典畜牧稍轉中部大夫昭成時氐冦内侮多事之間牧歛畜産富擬國君劉顯謀逆道武外幸和辰奉獻明太后歸道武又徳其資用以和辰為内侍長和辰分别公私舊畜頗不㑹㫖道武繇是恨之岳獨恭慎脩謹善處危難之間道武善之與王健等俱為外朝大夫參與軍國宋隱為尚書吏部郎道武平中山還北詔隱以本官輔衛王儀鎮中山尋轉行臺右丞領選如故和䟦代人世領部落為國附臣䟦以才辨知名道武擢為外朝大夫叅軍國大謀雅有智筭頻使稱㫖拜龍驤將軍明元初即位以相州刺史封南平公長孫嵩山陽侯奚斤北新侯安同白馬侯崔寵等八人坐止車門右聽理萬幾故世號八公叔孫俊建之子也年十五内侍明元左右以為爪牙及帝即位命俊與元磨渾等拾遺左右明元以俊前後功重軍國大計一以委之羣官上事先繇俊銓校然後奏聞古弼典西部與劉潔等分綰機要敷奏百揆燕鳳為黄門侍郎行臺尚書甚見禮重明元世與崔𤣥伯封懿梁越等入講經傳出議朝政太武即位命尉眷與散騎侍郎劉庫仁等八人分典四部綰奏機要賜爵山桑侯眷明元時為司衛幽州詔眷輔太武居守劉潔典東部明元寢疾太武監國潔與古弼等選侍東宫對綜機要敷奏百揆太武即位以告反者又獻直言所在合㫖甚竒其有柱石之用委以大任及議軍國大政朝臣咸推其能崔浩為左光禄大夫太武從容謂浩曰卿才智淵博事朕祖考忠著三世朕以故延卿自近其思盡規諌匡予弼予勿有隱懐朕雖當時遷怒若或不用久之可不深思卿言也又勅諸尚書曰凡軍國大計卿等所不能决皆先諮浩然後施行長孫嵩為太尉柱國大將軍太武每車駕征伐嵩以元老多留鎮京師坐朝堂平斷刑獄穆壽封宜都王征東大將軍及太武輿駕征凉州命壽輔恭宗總録機要内外聽焉崔徽字𤣥猷初為秘書監時樂安王範鎮長安太武以範年少而三秦民夷恃險多變乃選忠清舊徳之士與範俱鎮以徽為散騎常侍督雍涇梁秦四州諸軍事平西將軍副將行樂安王傅張黎善書計初道武知待之明元器其忠亮賜爵廣平公管綜機要太武以其功舊任以輔弼大司農卿軍國大議黎常與焉屈恒厯官公正内外稱其平當太武信任之委以大政車駕出征常居中留鎮文成時張白澤有孝行長而好學􅀶通敏於當世除中散遷殿中曹給事中甚見寵任參與機密李敷字景文為中散與李訢盧遐及度世等竝以聰敏内參機密出入詔命敷性謙恭加有文學文成寵遇之遷秘書下大夫典掌要切獻文時陸馛音䟦為建安王蠕蠕犯塞車駕親討詔馛為選部尚書録留臺事増兵運粮一委處分李訢為太倉尚書寵於獻文參决軍國大議兼典選舉孝文時沔北既平廣陽王嘉為荆州刺史以李佐為嘉鎮南府長史加輔國將軍别鎮新野及大軍凱旋帝執佐手曰沔北雒陽南門卿既為朕平之亦當為朕善守李冲為左僕射時孝文南伐以冲留守雒陽帝得留臺啓知冲患狀謂右衛宋弁曰僕射執我樞衡總釐朝務清儉居躬知寵已久朕以仁明忠雅委以台司之寄使我出境無後顧之憂一朝忽有此患朕甚愴慨其相痛惜如此韋珍為建威將軍試守魯陽郡孝文復南伐路經珍郡加中壘將軍正太守珍從至濟水孝文曰朕頃戎車再駕卿嘗翼務中軍今日之舉亦欲與卿同行但三鵶險要非卿無以守也因勅珍辭還劉長猷自孝文車駕南伐既尅宛城拜為南陽太守及鑾輿將反詔長猷曰昔曹公尅荆州留滿寵於後朕今委卿此郡兼統戎馬非直綏安初附乃以干城相托特賜縑二百匹劉芳為輔國將軍太尉長史從孝文南征宛鄧時太尉咸陽王禧攻南陽齊明帝將裴叔業入㓂徐州疆場之民頗懐去就孝文憂之以芳為散騎常侍國子祭酒徐州大中正行徐州事徙兼侍中皮喜為南部尚書宋葭蘆戍主楊文度遣弟䑕竊據仇池命喜討之喜斬文度孝文詔曰夫忠臣生於徳義之門智勇出於將相之族往年氐羗方命侵竊邊戍都將皮喜梁醜奴等或資父舊勲或身建殊效威名著於庸漢公義列於天府故授以節鉞委閫外之任竝罄力盡鋭克荷所司霜戈始動蟻賊奔潰仇池旋復民夷晏安及討葭蘆又梟兇醜元惡具殱闚􅎿永息朕甚嘉之所陳計畧商校利害料其應否寧邊益國專之可也今軍威既振羣愚懾伏革弊崇新有易因之勢寛猛之宜任其量處應立郡縣者亦聽銓置其楊文度楊䑕親屬家累部送赴臺仇池南秦之根本守禦資儲特須豊積險阻之要尤宜守防令姦覘之徒絶其僥倖勤勉戎務綏静新俗懐民安土稱朕意焉王肅初自齊歸為輔國將軍長史詔肅討蕭鸞義陽聽招募壯勇以為爪牙其募士功賞加常募一等其從肅行者六品已下俱聽先擬用然後表聞若投化之人聽五品已下先即優授於是假肅節行平南將軍游明根為散騎常侍帝南討詔假明根安南將軍儀曹尚書廣平公與梁郡王嘉參謀軍計後兖州民叛詔明根慰諭勅南征沔西仇城連口三道諸軍禀明根節度郭祚遷散騎常侍仍領黄門是時孝文鋭意典禮兼親九流又遷都草剙征討不息内外規畧號為多事祚與黄門宋弁參謀幃幄隨其才用各有委寄祚承禀註疏特成勤劇孝文賞之宋弁為黄門侍郎時孝文征馬圏留弁以本官兼祠部尚書攝七兵事及行執其手曰國之大事在祀與戎故令卿綰攝二曹可不自勉弁頓首辭謝勤勞王事夙夜在公恩遇之甚北流莫及名重朝野亞於李冲又云弁為散騎常侍尋遷右衛將軍領黄門弁屢自陳讓孝文曰吾為相知者卿亦不可有辭豈得專守一官不助朕為治且常侍者黄門之麤領軍者二衛之假攝不足空存推讓以弃大委其被知遇如此于烈為衛尉卿時初遷都雒陽勅留臺庶政一相參委孝文幸代執烈手曰宗廟至重翼衛不輕當祗奉靈駕時遷雒邑朕以此事相託顧非不重也烈與髙陽王雍奉遷神主於雒陽帝嘉其勲誠遷光禄卿尋為領軍將軍從孝文征荆沔帝謂彭城王勰曰烈先朝舊徳智勇兼有軍之大計宜共參决及車駕還雒論功加散騎常侍南齊遣其太尉陳顯逹冦馬圏帝輿疾赴之執烈手曰都邑空虗維捍宜重可鎮衛二宫以輯逺近之望宣武即位以烈為恒州刺史烈不願蕃牧頻表乞停輙優詔答弗許帝以咸陽王禧等專權濳謀廢之會二年正月初祭三公竝致齊於廟帝夜召烈子忠謂曰卿父忠允貞固社稷之臣明可早入當有處分忠奉詔而出質明烈至詔曰諸父慢怠漸不可任今欲使卿以兵召之卿其行乎烈對曰老臣厯奉累朝頗以幹勇賜識今日之事所不敢辭乃將直閣已下六十餘人宣㫖召咸陽王禧彭城王勰北海王詳衛送至於帝前諸公各稽首歸政以烈為散騎常侍車騎大將軍領軍進爵為侯增邑三百尸并前五百戸自是長直禁中機宻大事皆所參焉崔休為尚書左丞孝文南伐以北海王詳分守休輔之詔休曰北海年少未閑政績百揆之務便以相委轉長史兼給事黄門侍郎邢巒為度支尚書時豫州民白早生殺刺史司馬悦以城入梁詔巒討之宣武謂巒曰知卿親老頻勞於外然忠孝不俱才宜救世不能辭也先是梁武帝梁秦二州行臺夏侯道遷以漢中内附詔加巒使持節都督征梁漢諸軍事假鎮西將軍進退徵攝得以便宜從事又詔曰巒至彼須有板官以懐初附高下品第可依征義陽都督之格也謂征義陽將所立格也于忠為侍中領軍將軍忠面陳讓云臣無學識不堪兼文武之任宣武曰當今學識有文者不少但心直不如卿欲使卿勤勞於下我當無憂於上源懐為車騎大將軍正始元年九月有告蠕蠕率二十萬騎六道竝進欲直趣沃野懐朔南㓂恒代宣武詔懐以本官加使持節侍中出據北蕃指授規畧隨須徵發諸所處分皆以便宜從事王仲興為武衛將軍咸陽王禧之出奔也當時上下惟有駭震宣帝於乾脯山遣仲興馳入金墉城安慰後與領軍于勁拜征虜將軍號參機要孝明時李崇為車騎將軍揚州刺史在州十年號曰臥虎敵人憚之梁武帝惡其久在河南屢設反間無所不至帝雅相委重梁武帝乃授崇車騎大將軍開府儀同三司萬户郡公諸子皆為縣侯欲以搆崇崇表言其狀帝屢賜璽書慰勉之賞賜珍異歲至三五親待無與為比梁武每嘆服孝明之能任崇也楊椿為雍州刺史時蕭寳寅之敗闗西陥没孝明詔以椿為尚書左僕射行臺節度闗西諸將其統内五品已下郡縣須有補用者任即擬授羊深為尚書左丞蕭寳寅反攻圍華州王平薛鳯賢等作逆孝明勅深兼給事中黄門侍郎與大行臺僕射長孫稚共㑹潼闗規模進止事平以功賜爵新泰男孝莊時樊子鵠為車騎將軍左光禄大夫假驃騎大將軍率所部為都督時爾朱榮在晉陽京師之事子鵠頗預委寄故在臺閣征官不解孝武與齊神武搆隙以直閣將軍竇熾有威重堪處牙爪之任拜閣内大都督後為太傳熾既朝之元老名望素隆至於軍國大謀常與參議王思政為散騎侍郎初孝武在蕃素聞其名乃引為賓客遇之甚厚及登大位委以心膂遷安東將軍楊寛為黄門侍郎兼武衛將軍孝武與齊神武有隙遂召募騎勇廣増宿衛以寛為閣内大都督專總禁旅後周文帝時宇文貴初從魏孝武帝西遷為右衛貴善騎射有將帥才文帝又以宗室甚親委之李弼為柱國大將軍文帝西討留居守後事皆諮禀焉及晉公䕶執政朝之大事與于謹及弼等參議蘇綽累遷大行臺度支尚書領著作兼司農卿綽性儉素不治産業家無餘財以海内未平常以天下為己任博求賢俊共𢎞治道凢所薦逹皆至大官文帝亦推心委任而無間言帝或出游嘗預署空紙以授綽若須有處分則隨事施行及還啓之而已綽嘗謂治國之道當愛民如慈父訓民如嚴師每與公卿議論自晝逹夜事無巨細若指諸掌長孫儉少方正有操行狀貌魁梧神彩嚴肅文帝平侯莫陳悦以儉為西夏州刺史時荆襄初附太祖表儉功績尤美宜委東南之任授荆州刺史東南道行臺僕射既平江陵帝與儉書曰本圖江陵繇公畫計今果如所言智者見未萌何其妙也但呉民離散事藉招懐南服重鎮非公莫可遂令儉鎮江陵進爵昌寧公遷大將軍移鎮荆州管五十二州柳檜性剛簡任氣善騎射果於斷决魏大統四年從太祖戰於河橋先登有功授都督鎮鄯州八年拜河湟郡守加平東將軍時吐谷渾強盛數侵疆塲自檜鎮鄯州屢戰破之十四年拜撫軍將軍太祖謂檜曰卿昔在鄯州忠勇顯著今西境肅清無勞經略九曲國之東鄙當勞君守之遂令檜鎮九曲叱羅恊初從竇泰戍潼闗協為監軍泰死協亦見獲文帝以在闗中歲久授大丞相府東閣祭酒武軍將軍銀青光禄大夫輔録事參軍遷主簿加通直散騎常侍攝大行臺郎中累遷相府屬從事中郎協厯仕京鎮詳練故事又深自克厲帝頗委任之然猶以其家屬在東疑其有戀本之望及河橋戰不利協隨軍而還帝知協不二封冠軍縣男邑二百戸陳忻為顯州刺史文帝以忻威著敵境仍留静邊弗令之任陸騰拜龍州刺史文帝謂騰曰今欲通江油路直出南秦卿宜善思經略騰曰必望臨機制變未敢預陳太祖曰此是卿取柱國之日卿其勉之即解所服金帯賜之武成初詔徵入朝明帝面勅之曰益州險逺非親勿居故令齊公作鎮卿之武畧巳著遐邇兵馬鎮防皆當委卿統攝於是徙隆州刺史隨憲入蜀及趙公昭代憲復請留之保定元年遷隆州總管領刺史尉遲逈為尚書左僕射兼領軍將軍逈通敏有幹略雖任兼文武頗允時望文帝以此深委伏焉崔彦穆清河武城人西魏末為散騎常侍司農卿時軍國草剙衆務殷繁文帝乃引彦穆入幕府兼掌文翰武帝時于翼為豫州總管給兵五千人馬千匹以之鎮并配開府及儀同等二十人仍勅河陽襄州安州荆州四州總管内有武幹者任翼徵牒不限多少儀同以下官爵承制先授後聞帝又以翼有人倫之監皇太子及諸王等相𫝊以下竝委翼選置其所擢用皆民譽也時論僉謂得人栁敏為大都督及尉遲逈伐蜀以敏為行軍司馬軍中籌略竝以委之益州平進驃騎大將軍開府儀同三司宇文孝伯為開府儀同三司右宫伯武帝東討拜内史下大夫令掌留臺事軍還帝曰居守之重無忝戰功於是加授大將軍進爵廣陵郡公邑三千户并賜金帛及女奴等六年復為宗師每車駕廵幸常令居守王軌為左侍上士頗被識顧累遷内史下大夫加授儀同三司自此親遇彌重遂處腹心之任時晉公䕶專政武帝密欲圖之以軌沈毅有識度堪屬以天下大事遂問以可否軌贊成之建徳初轉内史中大夫加授開府儀同三司又拜上開府儀同三司大將軍封上黄縣公邑一千戸軍國之政皆參預焉宣帝之征吐谷渾令軌與宇文孝伯並從軍中進取皆委軌等帝仰成而巳尉遲運為右宫正時武帝幸雲陽宫令運以本官兼司武與長孫覽皇太子居守韋壽為少御伯武帝親征高氏拜京兆尹委以後事桞昻為大内史賜爵文城郡公致位開府當􅂗用事百寮皆出其下楊瓚為納言武帝甚親愛之平齊之役留瓚居守帝謂之曰六府事殷一以相付朕將遂事東方無西顧之憂矣其見親信如此册府元龜卷七十七
