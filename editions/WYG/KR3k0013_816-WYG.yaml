body:
  text: 册府元龜卷八百十六宋王欽若等撰總録部訓子𫝊曰父慈而教蓋父子之道篤乎天性愛之所鍾咸欲其善誘掖朂導必以義方兼資以恭奬勵其志故士之克荷世德有立於世者未始不先乎嚴君之誨也是以子之能仕則曰父教之忠不就師傅則曰父之罪也然則於其幼也嘗視無誑及其長也弗納於邪至於女子之有行亦結䄜以申戒故能宜於夫族正其家道至於天倫致美義篤於昆弟猶子均愛情厚於諸父率有嘉話申乎勸率并而述之咸可尚矣周公相成王而使其子伯禽代就封於魯周公戒伯禽曰我文王之子武王之弟成王之叔父我於天下亦不賤矣然我一沐三握髪一飯三吐哺起以待士猶恐失天下之賢今子之魯慎無以國驕人又曰君子不施其親施易也不以他人之親易已之親不使大臣怨乎不以以用也怨不見聴用故舊無大故則不棄也無求備於一人大故謂惡逆之事又曰善則得之不善則失之故君子於其身也且猶善則得之不善則失之況教其子孫乎范武子晉大夫也將老老致仕初受隨故曰隨武子后更受范復為范武子召文子曰燮乎吾聞之喜怒以類者鮮文子士㑹之子燮其名易者實多易遷怒也詩曰君子如怒亂庶遄沮君子如祉亂庶遄已詩小雅篇遄速也沮止也祉福也君子之喜怒以已亂也弗已者必益之郤子其或者欲已亂於齊乎不然余懼其益之也余將老使郤子逞其志庶有豸乎豸解也欲使郤子從政快志以止亂爾從二三子唯敬二三子晉諸大夫乃請老後文子暮退於朝武子曰何暮也對曰有秦客廋辭於朝廋隠也謂以隠伏詭譎之言問於朝也大夫莫之能對也吾知三焉武子怒曰大夫非不能也讓父兄也爾童子何知而三掩人於朝吾不在晉國亡無日矣擊之以杖折委笄委冠也笄簮也孔子謂其子鯉曰女為周南召南矣乎人而不為周南召南其猶正牆面而立也與周南召南國風之始樂得淑女以配君子三綱之首五教之端故人而不為如向牆而立陳亢問於伯魚曰子亦有異聞乎亢以伯魚孔子之子所聞當有異對曰未也嘗獨立獨立謂孔子鯉趨而過庭曰學詩乎對曰未也不學詩無以言鯉退而學詩他日又獨立鯉趨而過庭曰學禮乎對曰未也不學禮無以立鯉退而學禮聞斯二者陳亢退而喜曰問一得三聞詩聞禮又聞君子之逺其子也孟釐子魯大夫病且死誡其嗣懿子曰孔丘聖人之後聖人謂商湯滅於宋孔子六世祖孔父嘉為宋華督所殺其子奔魯也其祖弗父何始有宋而嗣讓厲公弗父何孔父嘉之髙祖宋愍公之長子厲公之兄也何嫡嗣當立以讓厲公也及正考父佐戴武宣公正考父弗父何之曽孫三命兹益恭故鼎銘云三命上卿也考父廟之鼎一命而僂再命而傴三命而俯循牆而走亦莫敢余侮饘於是粥於是以餬余口其恭如是吾聞聖人之後雖不當世必有達者今孔丘年少好禮其達者歟吾即沒若必師之及釐子卒懿子與魯人南宫敬叔往學禮焉曽參仲尼弟子也參有疾其子曽元抑首曽華奉足曽子曰㣲乎吾無顔氏之言吾何以告汝哉雖然君子之務亦大有之矣夫鹿以山為卑而増巢乎其上魚鼈黿鼉以淵為淺而滔穴乎其中卒其所以得者餌也故君子能無以利害義則辱奚繇至哉漢張負以女孫嫁陳平戒其孫曰毋以貧故事人不謹事兄伯如事迺父嫂如事迺母迺汝也石奮號萬石君以上大夫禄歸老于家徙居陵里茂陵邑中之里中子内史慶醉歸入外門不下車奮聞之不食慶恐肉袒謝請罪不許舉宗及兄建肉袒萬石君讓曰内史貴人入閭里里中長老皆走匿而内史坐車中自如固當此深責之也言内史貴人正固當爾迺謝罷慶告令去慶及諸子入里門趨至家王吉為昌邑中尉坐昌邑王淫亂不能輔道被刑後戒子孫毋為王國吏子駿遷趙内史道病免官歸韓延夀為左馮翊棄市三子皆為郎吏且死屬其子勿為吏以己為戒子皆以父言去官不仕至孫威乃復為吏尹賞為執金吾病疾且死戒其諸子曰丈夫為吏正坐殘賊免追思其功效則復進用矣一坐軟弱不勝任免終身廢棄無有赦時其羞辱甚於貪汚坐贓慎毋然賞四子皆至郡守長子立為京兆尹皆尚威嚴有治辨名後漢陳寵曾祖父咸成哀間以律令為尚書性仁恕嘗戒子孫曰為人議法當依於輕雖有百金之利慎無與人重比王丹子有同門生喪親家在中山白丹欲往奔慰結侣將行丹怒而撻之丹怒撻之五十令寄縑以祠焉寄帛二疋以祠焉或問其故丹曰交道之難未易言也世稱管鮑次則王貢丹官至太子太傅遜位卒於家譙𤣥隠藏田野終公孫述之世時兵戈累年莫能修尚學業𤣥獨訓諸子勤習經書鄧禹為太傅有子十三人各使守一藝修整閨門教養子孫皆可以為後世法馬援為伏波將軍兄子嚴敦並喜譏議而通輕俠客援前在交趾遺書戒之曰吾欲汝曹聞人過失如聞父母之名耳可得聞口不可得言也好論議人長短妄是非正法此吾所大惡也寧死不願聞子孫有此行也汝曹知吾惡之甚矣所以復言者施衿結褵申父母之戒欲使汝曹不忘之耳龍伯髙敦厚周慎口無擇言謙約節儉廉公有威吾愛之重之願汝曹效之杜季良豪俠好義憂人之憂樂人之樂清濁無所失父喪致客數郡畢至吾愛之重之不願汝曹效也效伯髙不得猶為謹勅之士所謂刻鵠不成尚類鶩者也效季良不得陷為天下輕薄子所謂畫虎不成反類狗者也訖今季良尚未可知郡將下車輒切齒州郡以為言吾嘗為寒心是以不願子孫效也季良名保後果為仇人訟免官竇武為城門校尉兄子紹為虎賁中郎將紹性疎簡奢侈武毎數切厲相戒猶不覺悟乃上書求退紹位又自責不能訓導當先受罪繇是紹更遵節大小莫敢違犯鄭𤣥北海髙密人嘗疾篤自慮以書戒子益恩曰吾家舊貧為父母羣弟所不容去厮役之吏游學周秦之都往來幽并兖豫之域獲覲乎在位通人處逸大儒得意咸從捧手有所受焉遂博稽六藝粗覽傳記時覩秘書緯術之奥年過四十乃歸供養假田播殖以娛朝夕遇閹尹擅勢坐黨禁錮十有四年蒙赦令舉賢良方正有道辟大將軍三司府公車再召比牒併名早為宰相唯彼數公懿德大雅克堪王臣故宜式序吾自忖度無任於此但念述先聖之元意思整百家之不齊亦庶幾以竭吾才故聞命罔從而黄巾為害萍浮南北復歸邦鄉入此嵗來已七十矣宿業衰落仍有失誤案之禮典便合𫝊家今吾告爾以老將閒居安性覃思終業自非拜國君之命問族親之憂展敬墳墓觀省野物胡嘗扶杖出門乎家事大小汝一承之咨爾㷀㷀一夫曽無同生相依其朂求君子之道研鑽勿替敬慎威儀以近有德顯譽成於僚友德行立於已志若致聲稱亦有榮於所生可不深念邪吾雖無紱冕之緒頗有讓爵之髙自樂以論賛之功庶不遺後人之羞末所憤憤者徒以亡親墳壟未成所好羣書率皆腐敝不得於禮堂寫定傳與其人日西方暮其可圖乎家今差多於昔勤力務時無恤饑寒菲飲食薄衣服節夫二者尚令吾寡恨若忽忘不識亦已焉哉後公車徴為大司農𤣥以病自乞還家魏李豐年十七八在鄴下名為清白識别人物莫不注意後隨軍在許昌聲稱日隆其父不願其然遂令閉門勅使斷客劉廙弟偉與魏諷善廙戒之曰夫交友之美在於得賢不可不詳而世之交者不審擇人務合黨衆違先聖人交友之義此非厚已輔仁之謂也吾觀魏諷不修德行而専以鳩合為務華而不實此直攪世沽名者也卿其慎之勿復與通偉不從後為諷所引故及於難廙官至侍中卒王昶嘗為其兄子族子作名字皆依謙實以見其意故兄子黙字處静沈字處道其子渾字𤣥沖深字道沖遂書戒之曰夫人為子之道莫大於保身全行以顯父母此三者人知其善而或危身破家陷於滅亡之禍者何也繇所祖習非其道也夫孝敬仁義百行之首行之乃立身之本也孝敬則宗族安之仁義則鄉黨重之此行成於内名著於外者也人若不篤至行而背本逐末以陷浮華焉以成朋黨焉浮華則有虚偽之累朋黨則有彼此之患此二者之戒昭然著明而循覆車滋衆逐末彌甚皆繇惑當時之譽昩目前之利故也夫富貴聲名人情所樂而君子或得而不處何也惡不繇其道耳患人知進而不知退知欲而不知足故有困辱之累悔吝之咎語曰如不知足則失所欲故知足之足常足矣覽往事之成敗察將來之吉凶未有干名要利欲而不厭而能保身持家永全福禄者也欲使汝曹立身行道遵儒者之教履道家之言故以𤣥黙沖虚為名欲使汝曹顧名思義不敢違越也古者盤盂有銘几杖有誡俯仰察焉用無過行況在已名可不戒之哉夫物速成則疾亡晚就則善終朝華之草夕而零落松栢之茂隆寒不衰是以大雅君子惡速成戒闕黨也若范匄對秦客而武子擊之折其委笄惡其掩人也夫人有善者鮮不自伐有能者寡不自矜伐則掩人矜則陵人掩人者人亦掩之陵人者人亦陵之故三郤為戮於晉王叔負罪於周不惟矜善自伐好争之咎乎故君子不自稱非以讓人惡其盖人也夫能屈以為伸讓以為得弱以為彊鮮不遂矣夫毁譽愛惡之原而禍福之機也是以聖人慎之孔子曰吾之於人誰毁誰譽如有所譽必有所試又曰子貢方人賜也賢乎哉我則不暇以聖人之德尚猶如此況庸庸之徒而輕毁譽哉昔伏波將軍馬援戒其兄子言聞人之惡當如聞父母之名耳可得而聞口不可得而言也斯戒至矣人或毁已當退而求之於身若已有可毁之行則彼言當矣若已無可毁之行則彼言妄矣當則無怨於彼妄則無害於身又何反報焉且聞人毁已而忿者惡醜聲之加人也人報者滋甚不如黙而自已也諺曰救寒莫如重裘止謗莫如自修斯言信矣若與是非之士凶險之人近猶不可況於對校乎其害深矣虚偽之人言不根道行不顧言其為浮淺較可識别而世人惑焉由不檢之以言行也近濟隂魏諷山陽曹偉皆以傾邪敗沒熒惑當世挾持姦慝驅動後生雖刑於鈇鉞大為烱戒然所汚染固以衆矣可不慎與若夫山林之士夷叔之倫甘長饑於首陽安赴火於綿山雖可以激貪勵俗然聖人不可為吾亦不願也今汝先人世有冠冕惟仁義為名守慎為稱孝悌於閨門務學於師友吾與時人從事雖出處不同然各有所取潁川郭伯益好尚通達敏而有知其為人𢎞曠不足輕貴有餘得其人重之如山不得其人忽之如草吾以所知親之昵之而不願兒子為之北海徐偉長不治名髙不求茍得澹然自守惟道是務其有所是非則託古人以見其意當時無所褒貶吾敬之重之願兒子師之東平劉公幹博學有髙才誠節有大意然性行不均少所拘忌得失足以相補吾愛之重之不願兒子慕之樂安任昭先淳粹履道内敏外恕推遜恭讓處不避汚怯而義勇在朝忘身吾友之善之願兒子遵之若引而伸之觸類而長之汝其庶幾舉一隅耳及其用財先九族其施舍務周急其出入存故老其論議貴無貶其進仕尚忠節其取人務道實其處勢戒驕淫其貧賤慎無戚其進退念合宜其行事加九思如此而已吾復何憂哉昶位至司空蜀向朗字巨達遺言戒子曰𫝊稱師克在和不在衆此言天地和則萬物生君臣和則國家平九族和則動得所求静得所安是以聖人守和以存以亡也吾楚國之小子耳而早喪所天為二兄所誘養使其性行不隨禄利以墮今但貧耳貧非人患惟和為貴汝其勉之朗終於左將軍吳潘濬武陵人為太常歸義隠蕃以口辨為豪傑所善濬子翥亦與周旋饋餉之濬聞大怒疏責翥曰吾受國厚恩志報以命爾輩在都當念恭順親賢慕善何故與降虜交以糧餉之在逺聞此心震面熱惆悵累旬疏到急就往使受杖一百促責所餉當時人咸怪濬而蕃果圗叛誅夷衆乃歸服顧雍為丞相時大帝嫁從女女顧氏甥故召雍父子及孫譚譚為選曹尚書見任貴重是日帝極歡譚醉酒三起舞舞不知止雍内怒之明日召譚訶責之曰君王以含垢為德臣下以恭謹為節昔蕭何吳漢並有大功何毎見髙帝似不能言漢奉光武亦信恪勤汝之於國寧有汗馬之勞可書之事邪但階門户之資遂見寵任耳何有舞不復知止雖為酒後亦繇恃恩忘敬謙虚不足損吾家者必爾也因背向壁卧譚立過一時乃見遣晉王祥為太保臨薨訓其子曰夫言行可覆信之至也推美引過德之至也揚名顯親孝之至也兄弟怡怡宗族欣欣悌之至也臨財莫過乎讓此五者立身之本顔子所以為命未之思也夫何逺之有子皆奉而行之夏侯湛作昆弟誥其辭曰惟正月哉生魄湛若曰咨爾昆弟淳琬瑫謨緫瞻古人有言孝乎惟孝友于兄弟死喪之戚兄弟孔懐又曰周之有至德也莫如兄弟於戯古之載于訓籍𫝊于詩書者厥乃不思不可不行爾其専乃心一乃聴砥礪乃性以聴我之格言淳等拜手稽首湛若曰嗚呼惟我皇乃祖滕公肇釐厥德厥功以左右漢祖𢎞濟于嗣君用垂祚于後世世増敷前軌濟其好行美德明允相繼冠冕胥及以逮于皇曽祖愍侯寅亮魏祖用康乂厥世遂啓土宇以大綜厥勲于家我皇祖穆侯崇厥基以允釐顯志用恢闡我令業維我后府君侯祗服哲命欽明文思以熈柔我家道丕隆我先緒欽若稽古訓用敷訓典籍乃綜其微言嗚呼自三墳五典八索九丘圗緯六藝百家衆流罔不探􅄨索隠鉤深致逺洪範九疇􅂜倫攸叙乃命世立言越用繼尼父之大業斯文在兹且九齡而我王母薛妃登遐我后孝思罔極惟以奉于穆侯之繼室蔡姬以致其子道蔡姬登遐隘于穆侯之命厥禮乃不得成用不祔于祖姑惟乃用騁其永慕厥乃以疾辭位用遜于厥家布衣席槀以終于三載厥乃古訓無文我后丕孝其心用假于厥制以穆于世父使君侯惟伯后聰明叡智奕世載德用慈友于我后我惟烝烝是䖍罔不克承厥誨用増茂我敦篤以播休美于一世厥乃可不遵惟我用夙夜匪懈日纉其道而仰之彌髙鑚之彌堅我用欲罷不敢豈惟予躬是懼實令跡是奉厥乃晝分而食夜分而寢豈惟令跡是畏實爾猶是儀嗚乎予其敬哉俞予聞之周之有至德有婦人焉我母氏羊姬宣慈愷悌明粹篤誠以撫訓羣子厥乃我齓齒則受厥教于書學不遑惟寧敦詩書禮樂孶孶弗倦我有識惟與汝服厥誨惟仁義惟孝友是尚憂深思逺祗以防于微翳義形於色厚愛平恕以濟其寛裕用緝和我七子訓諧我五妺惟我兄弟姊妹束修慎行用不辱於冠帯實母氏是慿予其為政蕞爾惟母氏仁之不行是戚予其望色思寛獄之不情教之不泰是訓予其納戒思詳嗚呼惟母氏信著于不言行感于神明若乃恭事于蔡姬敦穆于九族乃髙于古之人古之人厥乃千里承師矧我惟父惟母世德之餘烈服膺之弗可及景仰之弗可階汝其念哉俾羣弟天祚於我家俾爾咸休明是履淳英哉文明柔順琬乃沈毅篤固惟瑫厥清粹平理謨茂哉雋哲寅亮緫其𢎞肅簡雅聸乃純鑠惠和惟我蒙蔽極否于義訓嗟爾六弟汝其滋義洗心以補予之尤予乃亦不敢忘汝之闕嗚呼小子瞻汝其見予之長於仁未見予之長於義也瞻曰俞以如何湛若曰我之肇于總角以逮于弱冠暨于今之二毛受學於先載納誨於嚴父慈母予其敬忌于厥身而匡予之纎介翼予之小疵使予有過未曽不知予知之逌改惟沖子是賴予親于心愛于中敬于貌厥乃口無擇言柔而直廉而不劌肅而不厲厥其成予哉用集我父母之訓庶明勵翼邇可逺在兹瞻拜手稽首曰俞湛曰都在修身在愛人瞻曰吁惟聖其難之湛曰都厥不行惟難厥行惟易淳曰俞明而昧崇而卑沖而恒顯而賢同而疑厲而柔和而矜湛曰俞乃言厥有道淳曰俞祗服訓湛曰來琬汝亦昌言琬曰俞身不及於人不敢墮於勤厥故惟新湛曰俞瑫亦昌言瑫曰俞滋敬于已不滋敬于已惟敬乃恃無忘有恥湛曰俞謨亦昌言謨曰俞無忘於不可不虞形貌以心訪心於虞湛曰俞總亦昌言總曰俞若憂厥憂以休湛曰俞瞻亦昌言瞻曰俞復外惟内取諸内不忘諸外湛曰俞休哉淳等拜手稽首湛亦拜手稽首乃歌曰明德復哉家道休哉世祚悠哉百禄周哉又作歌曰訊德恭哉訓翼從哉内外康哉皆拜曰欽哉湛官至散騎常侍阮籍為歩兵校尉子渾有父風少慕通達不飾小節籍謂曰仲容已豫吾此流咸字仲容籍兄子汝不得復爾荀朂語諸子曰人臣不密則失身樹私則背公是大戒也汝等亦宦達人宜識吾此意朂後為尚書令卒庾衮有兄孤女曰芳將嫁美服既具衮乃割荆苕為箕箒召諸子集之于堂男女以班命芳曰芳乎汝少孤汝逸汝豫不汝疵瑕今汝適人將事舅姑灑掃庭内婦道也故賜汝此匪器之為美欲温恭朝夕雖休勿休也衮雖州郡交命察孝廉舉清白異行皆不就劉殷為侍中太保録尚書事有七子五子各授一經一子授太史公一子授漢書一門之内七業俱興北州之學殷門為盛嘗戒其子孫曰事君之法當務幾諫凡人尚不可面斥其過而況萬乗乎夫犯顔之禍將彰君過宜上思召公咨商之義下念鮑勲觸鱗之誅東海王越鎮許時王承為記室叅軍越雅相知重勅其子毗曰夫學之所益者淺體之所安者深閑習禮度不如式瞻儀形諷味遺言不若親承音㫖王叅軍人倫之表汝其師之承與阮瞻謝鯤鄧攸俱在越府越又與瞻等書曰小兒毘既無令淑之質不聞道德之風望諸君時以閑豫周旋誨接殷仲堪為荆州刺史自在荆州連年水旱百姓饑饉仲堪食常五椀盤無餘肴飯粒落席間輒食以噉之雖欲率物亦縁其性真素也每語子弟云人物見我受任方州謂我豁平昔時意今吾處之不易貧者士之常焉得登枝而捐其本爾其存之謝混與族子靈運瞻曜晦𢎞㣲以文義賞㑹常因酣宴之餘為韻語以奬勸靈運瞻等曰康樂誕通度康樂靈運侯國實有名家韻若加繩染功剖瑩乃瓊瑾宣明體逺識宣明晦字穎達且沈雋若能去方執穆穆三才順阿多標獨解阿多曜小字弱冠纂華裔質勝戒無文其尚又能峻通逺懐清悟通逺瞻字采采標蘭訊直轡鮮不躓抑用解偏吝㣲子基㣲尚㣲子即𢎞㣲也無勌繇慕藺勿輕一簣少進往將千仭數子勉之哉風流繇爾振如不犯所知此外無所慎靈運等並有誡厲之言唯宏微獨盡褒美初靈運父瑍無才能為秘書郎早年而亡靈運好臧否人物混患之欲加裁抑未有方也謂瞻曰非汝莫能乃與晦曜宏微等共遊戯使瞻與靈運登車便商較人物瞻謂之曰秘書早亡談者亦互有同異靈運黙然言論自此衰止混歴位中書令中領軍尚書左僕射宋陶潜為彭澤令有髙節嘗與子書以言其志並為訓戒曰天地賦命有生必終自古賢聖誰能獨免子夏言曰死生有命富貴在天四友之人親受音㫖發斯談者豈非窮達不可妄求夀夭永無外請故邪吾年過五十而窮苦荼毒以家貧東西遊走性剛才拙與物多忤自量為已必貽俗患僶俛辭世使汝幼而饑寒耳常感孺仲賢妻之言敗絮自擁何慙兒子此既一事矣但恨隣靡二仲室無萊婦抱兹苦心良獨罔罔少年好書偶愛閒静開巻有得便欣然忘食見樹木交䕃時鳥變聲亦復歡爾有喜嘗言五六月北牕下卧遇涼風暫至自謂是羲皇上人意淺識陋日月遂往緬求在昔眇然如何疾患以來漸就衰損故舊不遺毎以藥石見救自恐大分將有限也恨汝輩稚小家貧無役柴水之勞何時可免念之在心若何可言然雖不同生當思四海皆兄弟之義鮑叔敬仲分財無猜歸生伍舉班荆道舊遂能以敗為成因喪立功他人尚爾況共父之人哉潁川韓元長漢末名士身處卿佐八十而終兄弟同居至於沒齒濟北汜稚春晉時操行人也七世同財家人無怨色詩云髙山仰止景行行止汝其慎哉吾復何言為命子詩以貽之曰悠悠我祖爰自陶唐邈其虞賓歴世垂光御龍勤夏豕韋翼商穆穆司徒厥族以昌紛紜戰國漠漠衰周鳳隠于林幽人在邱逸虬撓雲奔鯨駭流天集有漢眷予愍侯於赫愍侯運當攀龍撫劍夙邁顯兹武功參誓山河啓土開封亹亹丞相允廸前蹤渾渾長源蔚蔚洪柯羣川載導衆條載羅時有黙語運固隆汙在我中晉業融長沙陶侃封長沙侯潜曽祖也桓桓長沙伊勲伊德天子疇我専征南國功遂辭歸臨寵不惑孰謂斯心而可近得肅矣我祖慎終如始直方二臺惠和千里潜祖茂為武昌太守於皇烈考淡焉虚止寄跡夙運㝠兹愠喜嗟余寡陋瞻望靡及顧慚華鬢負景隻立三千之罪無後其急我誠念哉呱聞爾泣卜云嘉日占爾良時名爾曰儼字爾求思温恭朝夕念兹在兹尚想孔伋庶其企而厲夜生子遽而求火凡百有心奚待于我既見其生實欲其可人亦有言斯情無假日居月諸漸免于孩福不虚至禍亦易來夙興夜寐願爾斯才爾之不才亦已焉哉何叔度為豫章太守子尚之以吏部郎告休定省傾朝送别於冶渚及至郡叔度謂曰聞汝來此朝中相送可有幾客答曰殆數百人叔度笑曰此是送吏部郎耳非關何彦德也昔殷浩亦嘗作豫章定省送别者甚衆及廢徙東陽船泊征虜亭積日乃至親舊無復相窺者王敬𢎞瑯琊臨沂人為侍中左光禄大夫子恢之被召為秘書郎敬𢎞為求奉朝請與恢之書曰秘書有限故有競朝請無限故無競吾欲使汝處於不競之地太祖嘉而許之顔延之為金紫光禄大夫領湘東王師子竣既貴重權傾一朝凡所資供延之一無所受器服不改宅宇如舊嘗語竣曰平生不喜見要人今不幸見汝竣起宅謂曰善為之無令後人笑汝拙也延之閒居無事為庭誥之文曰庭誥者施於閨庭之内謂不逺也吾年居秋方慮先草木故遽以未聞誥爾在庭若立履之方規鑒之明已列通人之規不復續論今所載咸其素蓄本乎性靈而致之心用夫選言務一不尚煩密而至於備議者蓋以網諸情非古語曰得鳥者羅之一目而一目之羅無時得鳥矣此其積意之方道者識之公情者德之私公通可以使神明加嚮私塞不能令妻子移心是以昔之善為士者必捐情反道合公屏私尋尺之身而以天地為心數紀之夀常以金石為量觀夫古先垂戒長老餘論雜用細制毎以不朽見銘繕築末跡咸以可久承志況樹德立義收族長家而不思經逺乎曰身行不足遺之後人欲求子孝必先慈將責弟悌務為友雖孝不待慈而慈固植孝悌非期友而友亦立悌夫和之不備或應以不和猶信不足焉必有不信儻知恩意相生情理相出可使家有參柴人皆由損夫内居德本外夷民譽言髙一世處之逾嘿器重一時體之滋沖不以所能干衆不以所長議物淵泰入道與天為人者士之上也若不能遺聲欲人出已知柄在虚求不可校得敬慕謙通畏避矜踞思廣監擇從其逺猷文理精出而言稱未達論問宣茂而不以居身此其亞也若乃聞實之為貴以辨畫所克見聲之取榮謂争奪可獲言不出於户牖自以為道義久立才未信於僕妾而曰我有以過人於是感茍銳之志馳傾觖之望豈悞已悟有識之裁入修家之誡乎記所云千人所指無病自死者也行近於此者吾不願聞之矣凡有智能預有文論若不練之多士較之羣言通才所歸前流所與焉得以成名乎若呻吟於牆屋之内喧囂於黨輩之間竊議以迷寡聞妲語以敵要說是短筭所出而非長見所取適值尊朋臨座稠覽博論而言不入於髙聴人見棄於衆視則慌若迷塗失偶黶如深夜撒燭衘聲茹氣腆嘿而歸豈識向之夸慢秪足以成今之沮喪耶此固少壯之廢爾其戒之夫以怨誹為心者未有達無心救得喪多見誚耳此蓋臧獲之為豈識量之事哉是以德聲令氣愈上毎髙忿言懟議毎下愈發有尚於君子者寧可不務勉邪雖曰常人情不能素盡故當以逺理勝之公笇除之豈可不務自異而取陷庸品乎富厚貧薄事之懸也以富厚之身親貧薄之人非可一時同處然昔有守之無怨安之不悶者盖有理存焉夫既有富厚必有貧薄豈其證然時乃天道若人富厚是理無貧薄然乎必不然也若謂富厚在我則宜貧薄在人可乎又不可矣道在不然義在不可而横意去就謬生希幸以為未達至分蠶温農飽民生之本躬稼難就止以僕役為資當施其情願庀其衣食定其當治遞其優劇出之休饗後之捶責雖有勸恤之勤而無霑曝之苦務前公稅以逺吏讓無急傍費以息流議量時發斂視嵗穰儉省贍以奉已損散以及人此用天之善御生之得也率下多方見情為上立長多術晦明為懿雖及僕妾情見則事通雖在畎畝明晦則功博若奪其常然役其煩務使威烈雷霆猶不禁其欲雖棄其大用窮其細瑕或明灼日月將不勝其邪故曰孱焉則差的焉則闇是以禮道尚優法意從刻優則人自為厚刻則物相為薄耕收誠鄙此用不忒所謂野陋而不以居心也含生之氓同祖一氣等級相傾迭成差品遂使業習移其天識世服沒其性靈至夫願欲情嗜宜無間殊或役人而養給然是非大意不可侮也隅奥有竈齊侯蔑寒犬馬有秩管燕輕饑若能服温厚而知穿弊之苦明周之德厭滋㫖而識寡嗛之急仁恕之功豈與夫比髪膚於草石方手足於飛走者同其意用哉罰慎其濫惠戒其偏罰濫則無以為罰惠偏則不如無惠雖爾眇末猶局庸保之上事思反已動類念物則其情得而人心塞矣抃博蒱塞㑹衆之事諧調哂謔適坐之方然失敬致侮皆此之繇方其剋瞻彌喪端儼況遭非鄙慮將醜折豈若正其容而簡其事静其氣而逺其意使言必詳懕賔犮清耳笑不傾撫左右恱目非鄙無因而生侵侮何從而入此亦持德之管籥爾其謹哉嫌惑疑心誠亦難分豈惟厚貌蔽知之明深情怯剛之斷而已哉必使猜怨愚賢則嚬笑入戾耽愛犬馬則步顧成妖況動容竊斧束裝盜金又何足論也是以前王作典明慎議獄而僣濫易意朱公論璧光澤相如而倍薄異價此言雖大可以戒小游道雖廣交義為長得在可久失在輕絶久繇相敬絶繇相狎愛之勿勞當扶其正性忠而勿誨必藏其枉情輔以藝業㑹以文辭使親不可䙝疎不可間毎存大德無挾小怨率此往也足以相終酒酌之設可樂而不可嗜嗜而非病者希病而遂𤯝者幾既𤯝既病將蔑其正若存其正性紓其妄發其惟善戒乎聲樂之㑹可簡而不可違違而不背者鮮矣背而非弊者反矣既弊既背將受其毁必能通其礙而節其流意可為中和矣善施者唯發自人心乃出天則與不待積取無謀實並散千金誠不可能贍人之急雖乏必先使施如王丹受如杜林亦可與言交矣浮華怪飾滅質之具竒服麗食棄素之方動人勸慕傾人顧眄可以逺識奪難用近欲從若覩其淫怪知生於無心為見竒麗能致諸非務則不抑自貴不禁自止夫數相者必有之徵既聞之術人又驗之吾身理可得而論也人者兆氣二德稟體五常二德有竒偶五常有勝殺其及為人寧無叶沴亦猶生有好醜死有夭夀人皆知其懸天至於丁年乖遇中身迕合者豈可易地哉是以君子遘命愈難識道愈堅古人恥以身為溪壑者屏欲之謂也欲者性之煩濁氣之蒿蒸故其為害則燻心智耗真精傷人和犯天性雖生必有之而生之德猶火含烟而烟妨火桂懐蠧而蠧殘桂然則火勝則煙滅蠧壯則桂折故性明者欲簡嗜繁者氣惽去明即惽難以生矣是以中外羣聖建言所黜儒道衆智發論是除然有之者不患誤深故藥之者嘗苦術淺所以毁道多而於義寡焉頓盡誠難毎指可易能易毎指亦明之矣夫㢘嗜之性不同故畏慕之情或異從事於人者無執人我之心不以已之所善謀人為有明矣不以人之所務失我能有守矣已所謂然而彼定不然奕棊之蔽恱彼之可而忘我不可學嚬之蔽將求去弊者念通怍介而已流言謗議有道所不免況在闕薄難用筭防應物之方必出於已或信不素積嫌間所襲或性不和物尤怨所聚有一于此何處逃毁茍能反悔在我而無責於人必有達鑒昭其情逺識迹其事日省吾躬月料吾志寛嘿以居潔静以期神道必在何恤人言唁曰富則盛貧則病矣貧之病也不唯形色麄黶或亦神心沮廢豈但交友疎棄必有家人誚讓非廉深識逺者何能不移其操故欲蠲憂患莫若懐古懐古之志當自同古人見通則憂淺意逺則怨浮昔人琴歌編蓬之中者用此道也夫信不逆彰義必幽隠交賴相盡明有相照一面見㫖則情固丘岳一言中志則意入淵泉以此事上水火可蹈以此託友金石可弊豈待充其榮實乃將議報厚之篚筐然後圗終如或與立茂思無忽禄利者受之易易則人之所榮蠶穡者就之艱難則物之所鄙艱易既有勤倦之情榮鄙又間向背之意此二塗所為反也以勞定國以功施人則役徒屬而擅豐麗自理於民自事其生則督妻子而趨耕織必使陵侮不作懸企不萌所謂賢鄙處宜華野同泰人以有惜為質非假嚴刑有恒為德不慕厚貴有惜者以理㑹有恒者與物終世有位去則情盡斯無惜矣又有務謝則心移斯不恒矣又非徒若此而已或見休事則懃蘄結納及聞否論則處彰離貳附㑹以從風隠竊以成釁朝吐面譽暮行背毁昔同稽欵今猶叛戾斯為甚矣又非唯若此而已或憑人惠訓藉人成立與人餘論依人揚聲曲存稟仰甘赴塵軌衰沒畏逺忌聞影跡又蒙蔽其善毁之無度心短彼能私樹已拙自崇常輩罔顧髙識有人至此實蠧大倫毎思防避無通閭伍覩驚異之事或涉流𫝊遭卒迫之變反思安順若異從已發將尸謗人迫而又迕愈使失度能夷異如裴楷處逼如裴遐可稱深士乎喜怒者有性所不能無常起於褊量而止於𢎞識然喜過則不重怒過則不威能以恬漠為體寛愉為器者大喜蕩心微抑則定甚怒煩性小忍即歇動無愆容舉無失度則物將自懸人將自止習之所變亦大矣豈唯蒸性染身乃將移智易慮故曰與善人居如入芝蘭之室久而不知其芬與之化矣與不善人居如入鮑魚之肆久而不知其臭與之變矣是以古人慎所與處唯夫金貞玉粹者乃能盡而不汙耳故曰丹可滅而不能使無赤石可毁而不可使無堅茍無丹石之性必慎浸染之繇能以懐道為念必存從理之心道可懐而理可從則不議貧議所樂耳或云貧何由樂此未求道意道者贍富貴同貧賤理固得而齊自我喪之未為通議茍議不喪夫何不樂或曰温飽之貴所以榮生饑寒在躬空曰從道取諸其身將非篤論此又不通理用者凡養生之具豈間定實或以膏腴夭性有以菽藿登年中散云所足在内不繇於外是以稱體而食貧嵗愈嗛量腸而炊豐家餘食非粒實息耗意有盈虚耳況心得優劣身獲仁富明白入素氣志如神雖十旬九飯不能令饑藿席三屬不能為寒豈不信然且以已為度者無以自通彼量渾四極而輪五緯天道𢎞也振河海而載山川地道厚也一情紀而合流貫人靈茂也昔之通乎此數者不為剖判之行必廣其風度無挾私殊博其交道靡懐曲異故望塵請友則義士輕身一遇拜親則仁人投分此倫序通允禮俗平一上獲其用下得其和世務雖移前休未逺人之適主吾將反本夫人之生暫有心識幼壯驟過衰耗騖及其間夭欎既難勝言假獲存遂又云無幾柔麗之身亟委土木剛清之才遽為丘壤逥遑顧慕唯數紀之中耳以此持榮曽不可留以此服道亦何能久進退我生遊觀所達得貴為人將在含理含理之貴惟神與交幸有心靈義無自惡偶信天德逝不上慙欲使人沈來化志符往哲勿謂是賖日鑿斯密若通此意吾將忘老如曰不然其誰與歸偶懐所撰述略布衆條若備舉情見顧未書一贍身之經别在田家節政奉終之紀自著燕居畢義宋孔顗為安陸王子綏冠軍長史顗弟道存從弟徽頗營産業二弟請假東還顗出渚迎之輜重十餘船皆是緜絹紙席之屬顗見之偽喜謂曰我比困乏得此甚要因命上置岸側既而正色謂道存等曰汝輩忝預士流何至東還作賈客耶命左右取火燒之燒盡乃去蕭思話為開府征西將軍其子惠開為太子舍人時與汝南周朗同官友善以偏竒相尚後轉黄門侍郎與侍中何偃争權表乞解職繇此忤㫖免官思話素恭謹操行與惠開不同嘗以其峻異毎加嫌責及見惠開自解表歎曰兒子不幸與周朗周旋理應如此杖之二百冊府元龜卷八百十六
