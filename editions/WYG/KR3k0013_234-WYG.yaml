body:
  text: 册府元龜卷二百三十四宋王欽若等撰僭偽部兵敗兵法云賢智不用上下不親賞罰不當勞逸無别覘候不審竒正不分此敗之道也若乃乘亂投隙僭竊名器日恃於武力争勝於危事於是徇佳兵之志犯黷武之戒封執獨見斥去忠言以至昏醉而御戎誅殺以徇衆繇此䘮衆至於失邦者盖本無徳義輕肆倔强自速其咎非不幸也易所謂投戈散地六親不能相保者良謂此哉前凉張駿自稱凉州牧遣武威太守竇濤金城太守張閬武興太守辛巖揚烈將軍宋輯等率衆東㑹將軍韓璞攻討秦州諸郡時劉曜遣其將劉裔来拒屯於狄道城韓璞進度沃千嶺辛巖曰我握衆數萬藉氐𦍑之銳宜速戰以滅之不可以久乆則變生璞曰自夏末以来太白犯月辰星逆行白虹貫日皆變之大者不可以輕動輕動而不㨗為禍更深吾將乆而斃之且曜與石勒相攻裔亦不能乆也積七十餘日軍糧竭遣辛巖督運於金城裔聞之大恱謂其諸士曰韓璞之衆十倍於吾𦍑胡皆叛不為之用吾糧廪將懸難以持乆今虜分兵運糧可謂天授吾也若敗辛巖璞等自潰彼衆我寡宜以死戰戰而不捷當無匹馬得還宜厲爾戈矛竭汝智力衆咸奮於是率騎三萬襲巖於沃千嶺敗之璞軍遂潰死者二萬人面縛歸罪駿曰孤之罪也將軍何辱皆赦之張祚自稱涼州牧遣其將和昊率衆伐驪靬戎於南山大敗而還祚宗人張瓘時鎮抱罕祚惡其彊遣其將易揣張琀率歩騎萬三千以襲之時張掖人王鸞頗知神道言於祚曰軍出不復還涼國將有不利矣祚大怒以鸞妖言阻衆斬之以徇三軍及發鸞臨刑曰我死不二十日軍必敗後果為瓘所敗張天錫為凉州牧時𦍑㢘岐自稱益州刺史率畧得四千家背苻堅就李儼天錫自徃討之儼大敗入城固守遣子純求救於苻堅堅使其將王猛救之天錫敗績死者十二三晉太元元年苻堅遣其將茍萇毛當梁熙姚萇来㓂天錫率萬人頓金昌城龍驤將軍馬逹率萬人逆萇等因請降兵人散走征東常據中録事席仂皆戰死司兵趙充哲與萇苦戰又死中衛將軍史景亦沒於陣天錫大懼出城自戰城内又反天錫窘逼降於萇等前趙劉聰僭即帝位以劉曜為雍州牧據長安安定太守賈疋及諸氐𦍑皆送質任雍州刺史麴特新平太守竺恢固守不降䕶軍麴允頻陽令梁肅自京兆南山將奔安定遇疋任子於隂宻擁還臨涇推疋為平南將軍率衆五萬攻曜於長安扶風太守梁綜及麴時竺恢等亦率衆十萬㑹之曜遣劉雅趙染来拒敗績而還曜又盡長安銳卒與諸軍戰於黄丘曜衆大敗聰又使劉粲劉曜攻劉琨於晉陽晉陽降粲琨與左右數十騎擕其妻子奔於趙郡之亭頭遂如常山告敗於猗盧且乞師猗盧遣子日利孫賔六須及將軍衛雄姬澹等率衆數萬攻晉陽琨收散卒千餘為之鄉導猗盧率衆六萬至於狼猛曜及賔六須戰於汾東曜墜馬中流矢身被七創乃入晉陽夜與劉粲等掠百姓踰蒙山遁歸猗盧率騎追之戰於藍谷粲敗績斬其征虜邢延獲其鎮北劉豐猗盧戍之而還劉曜僭即帝位遣其將劉岳攻石勒將石生於金墉石季龍率歩騎四萬入自成臯闗岳陳兵以待之戰於雒西岳師敗績岳中流矢退保石梁季龍遂塹柵列圍遏絶内外曜親率軍援岳季龍率騎三萬来拒曜次於金谷無故大驚軍中潰散乃退如澠池夜中又驚士卒奔潰遂歸長安季龍執劉岳及其將王騰等八十餘人并氐羌三千餘人送於襄國坑士卒一萬六千曜自至澠池素服郊哭七日乃入城其後曜攻石生於金墉聞季龍進據石門續知石勒自率大衆已濟始議増滎陽戍杜黄馬闗俄而雒水候者與勒前鋒交戰擒羯送之曜問曰大胡自来耶其衆大小復何如羯曰大胡自来軍盛不可當也曜色變使攝金墉之圍陳於洛西南北十餘里曜少而滛酒末年尤甚勒至曜將戰飲酒數㪷嘗乘赤馬無故跼頓乃乘小馬比出復飲酒㪷餘至於西陽門撝陣就平勒將石堪因而乘之師遂大潰曜昏醉奔退馬陷石渠墜於水上被槍十餘通中者三為堪所執送於勒所後趙石勒初僭稱趙王遣將孔萇攻陷文鴦十餘營萇不設備鴦夜擊之大敗而歸其後劉曜敗石季龍子髙候遂圍雒陽勒滎陽太守尹矩野王太守張進等皆降之襄國大震乃僭即帝位秦州休屠王𦍑叛於勒刺史臨深遣司馬管光帥州軍討之為𦍑所敗隴右大擾氐𦍑悉叛石季龍僭稱天王以西平張伏都為都督征討諸軍事帥歩騎三萬擊凉州既渡河與張駿將謝艾大戰於河西伏都敗績及僭即帝位凉州戍卒髙力梁犢等起兵東還犢自稱晉征東大將軍率衆攻陷下辦逼張茂為大都督大司馬載以軺車安西劉寜自安定擊之大敗而還秦雍間城戍無不摧陷斬二千石長史長驅而東髙力等皆多力善射一當十餘人雖無兵甲所在掠百姓大斧施一丈柯攻戰若神所向皆潰戍卒皆随之比至長安衆已十萬其樂平王石苞時鎮長安盡銳拒之一戰而敗犢遂東出潼闗進如雒川季龍以李農為大都督行大將軍事統衛軍張賀度征西張良征虜石閔等率歩騎十萬討之戰於新安農師不利又戰於雒陽農師大敗乃退壁成臯冉閔僭即帝位攻石祗於襄國祗遣使詣慕容儁姚弋仲以乞師㑹石琨自冀州援祗弋仲復遣其子襄率騎三萬八千至自滆頭儁遣將軍恱綰率甲卒三萬自龍城三方勁卒合十餘萬閔遣車騎胡睦拒襄於長蘆將軍孫威候琨於黄丘皆為敵所敗士卒畧盡睦威單騎而還琨等軍且至閔盡衆出戰姚襄恱綰石琨等三面攻之祗衝其後閔師大敗閔潛於襄國行宫與十餘騎奔鄴降胡栗特康等執冉裔及左僕射劉琦等送於祗盡殺之司空石璞尚書令徐機車騎胡睦侍中李綝中書監盧諶少府王鬱尚書劉欽劉休等及諸將士死者十餘萬人前燕慕容暐僭即帝位晉南陽督䕶趙𢎞以宛降於暐暐遣其南中郎將趙盤自魯陽戍宛比至晉右將軍桓豁攻宛㧞之趙盤退奔魯陽豁遣輕騎追盤及於雉城大戰大敗之執盤戍宛而歸其後晉大司馬桓温江州刺史桓冲豫州刺史袁真率衆五萬伐暐前兖州刺史孫元起兵應之温部將檀𤣥攻胡睦執暐寜東慕容忠暐遣其將慕容厲與温戰於黄墟厲師大敗單馬奔還髙平太守徐翻以郡歸順温前鋒朱序又破暐將傅顔於林渚苻堅又使其將王猛楊安率衆伐暐猛攻壺闗安攻晉陽暐使慕容評率中外精卒四十餘萬拒之與猛戰於潞州評師大敗死者五萬餘人評等單騎遁還猛遂長驅至鄴堅復率衆十萬㑹猛攻暐散騎侍郎徐蔚等率扶餘髙句麗及上黨質子五百餘人夜開城門以納堅軍暐與評等數十騎奔於昌黎堅遣郭慶追及暐於髙陽縛送於堅前秦苻堅僭稱天王時苻雙據上邽苻栁據蒲坂叛於堅苻庾據陕城苻武據安定並應之將共伐長安堅遣後禁將軍楊成世左將軍毛嵩等討雙武為其所敗末年遣征南苻融驃騎張蚝撫軍苻方衛軍梁成平南慕容暐冠軍慕容垂率歩騎二十五萬為前鋒堅發長安戍卒六十餘萬騎二十七萬前後千里旗鼓相望晉遣都督謝石徐州刺史謝𤣥豫州刺史桓伊輔國謝琰等水陸七萬相繼拒融去雒澗二十五里憚梁成不敢進龍驤將軍劉牢之率勁卒五千夜襲城壘尅之斬成及王顯王詠等十將士卒死者萬五千謝石等以既敗梁成水陸繼進堅與苻融登城而望王師見部陣齊整將士精銳又北望八公山上草木皆類人形時張蚝敗謝石於淝南謝𤣥謝琰勒卒數萬陣以待之蚝乃退列陣逼淝水王師不得渡遣使謂融曰君懸軍深入置陣逼水此持乆之計豈欲戰者乎若小退師令將士周旋僕與君公緩轡而觀之不亦美乎融於是麾軍却陣欲因其濟水覆而取之軍遂奔退制之不可止融馳騎畧陣馬倒被殺軍遂大敗王師乘勝追擊至於青岡死者相枕堅為流矢所中單騎遁還於淮北飢甚人有進壺飱豚髀者堅食之恱曰昔公孫豆粥何以加也命賜帛十疋緜十斤辭曰臣聞白龍厭天池之樂而見困豫且陛下目所覩也耳所聞也今蒙塵之難豈在天乎且妄施不為恵妄受不為忠陛下臣之父母也安有子養而求報哉弗顧而退堅大慙顧謂其夫人張氏曰朕若用朝臣之言豈見今日之事耶當何面目復臨天下乎澘然流涕而去聞風聲鶴唳皆謂晉師之至堅還長安後為慕容冲所逼冲率衆登城堅身貫甲胄率戰拒之飛矢滿身流血被體三輔人為冲所畧者咸遣使告堅請放火以為内應堅遣騎七百應之而冲營放火者為風焰所燒其能免者十一二城中有書曰古符𫝊賈録載帝出五將乆長得先是人謡曰堅入五將山長得堅大信之告其太子宏曰脫如此言天或導余今留汝兼總戎政勿與賊争利吾當出隴收兵運糧以給汝天其或者正訓予也於是遣衛將軍定楊擊冲於城西為冲所擒堅彌懼付宏以後事將中山公說張夫人率騎數百出如五將宣告州郡期以孟冬救長安宏等母妻宗室男女數千騎出奔百僚逃散慕容冲入據長安縱兵大掠死者不可勝計堅至五將山為姚萇將吳忠所執苻丕僭即帝位於晉陽及進據平陽遣將王永及苻纂攻慕容永於襄陵王永大敗及前鋒都督俱石子皆死之初苻纂之奔丕也部下壯士三千餘丕猜而忌之及永之敗懼為纂所殺率騎數千南奔東垣晉揚威將軍馮該自陕要擊敗之斬丕首執其太子寜長樂王夀送於京師苻登僭即帝位遣騎大將軍竇衝攻姚萇與萇戰於汧東為萇所敗登征虜馮翊太守蘭犢率衆二萬自潁陽入於和寜與苻纂首尾將圗長安纂弟師奴殺纂自立為秦公蘭犢絶之皆為萇所敗其後登以尚書苻碩原為前禁將軍滅𦍑校尉戍平凉登進據茍頭原以逼安定萇率騎三萬夜襲大界營䧟之殺登妻毛氏及其子弁尚擒名將數十人驅掠男女五萬餘口而去登收合餘兵退據胡空堡其後進攻新平萇率衆救之登引退復攻安定為萇所敗據路承堡及姚萇死登聞之喜曰姚興小兒吾將折杖以笞之於是大赦盡衆而東攻屠各姚奴帛蒲二堡尅之自甘泉向闗中興追登不及數十里登從六陌趣廢橋興將尹緯據橋以待之登争水不得衆渴死者十二三與緯大戰為緯所敗其夜衆潰登單馬奔雍乞伏乾歸遣騎二萬救登登引軍出迎與興戰於山南為興所敗被殺後秦姚興僭即帝位仇池公楊盛叛擾祁山遣建威趙琨率騎五千為前鋒立莭楊伯夀統歩卒繼之前將軍姚恢左將軍姚文宗入自鷲峡鎮西秦州刺史姚嵩入羊頭陕右衛胡翼度從隂宻出自汧城討盛興將輕騎五千自雍赴之盛率衆與琨相持伯夀畏懦弗進琨衆寡不敵為盛所敗興斬伯夀而還姚泓僭襲父位仇池公楊盛攻䧟祁山執建節王摠遂逼秦州泓遣後將軍姚平救之盛引退姚嵩與平追盛及於竹嶺姚讃率隴西太守姚秦都雒陽太守王煥以禁兵赴之讃至清水嵩為盛所敗嵩及秦都王煥皆戰死其後晉太尉劉裕摠大軍伐泓王師至成臯征南姚洸時鎮雒陽馳使請救泓遣越騎校尉閻生率騎三千以赴之武衛姚益男將歩卒一萬助守雒陽又遣征東并州牧姚懿南屯陕津為之聲援洸遣部將趙𤣥率精兵千餘南守柏谷隖廣武石無諱東戍鞏城以拒王師㑹陽城及成臯滎陽武牢諸城悉降晉將檀道濟等長驅而至無諱至石闗奔還𤣥與晉將毛徳祖戰於柏谷以衆寡而敗姚禹踰城奔於王師道濟進至雒陽洸懼遂降其後泓遣輔國胡翼度據東原武衛姚鸞營於大路與晉軍相接晉將沈林子簡精銳銜枚夜襲之鸞衆潰戰死士卒死者九千餘人姚讃屯於河上讃為林子所敗單馬奔定城姚紹遣左長史姚洽及姚黒蠡等率騎三千屯於河北之九原林子率衆八千要洽於河上洽戰死衆皆沒紹聞洽等敗嘔血而死林子率精兵萬餘越山開道㑹沈田子於青泥將攻姚栁泓使姚裕率歩騎八千拒之泓躬將大衆繼發裕為田子所敗鎮北姚疆率郡人數千與姚難陣於涇上以拒晉將王鎮惡遣毛徳祖擊疆大敗疆戰死難遁還長安劉裕進據鄭城泓使姚裕及尚書龎純屯兵營中姚洸屯於澧西尚書姚白𤓰徙四軍雜户入長安姚丕守渭橋胡翼度屯石積姚讃屯覇東泓軍於逍遥園夹渭進兵破苻丕於渭橋泓自逍遥園赴之逼水地狭因丕之敗遂相踐而退姚諶及前軍姚烈左衛姚寳安散騎王帛建武姚進揚威姚蚝尚書左丞孫𤣥等皆死於陣泓單馬還宫鎮亞心入自平朔門泓與姚裕等數百騎出奔於石橋因將妻子詣壘門而降後蜀李特僭稱益州牧攻成都益州刺史羅尚據城自守晉遣荆州刺史宋岱建平太守孫阜救尚阜已次徳陽特遣蕩督李璜助任臧拒阜尚遣大衆掩襲特營連戰二日衆少不敵特軍大敗收合餘卒引趣新繁尚軍引退特復追之轉戰三十餘里尚出大軍逆戰特軍敗績斬特𫝊首雒陽李雄僭即帝位遣太傅李驤征越雋既降之驤進軍繇小㑹攻寜州刺史王遜遜使其將姚岳悉衆拒戰驤軍不利又遇霖雨驤引軍還争濟瀘水士衆多死又遣中領軍李琀及將軍樂次費他李乾李稚等討楊難敵繇白水橋攻下辨征東李夀督琀弟玝攻隂平難敵遣軍拒之夀不得進而琀稚長驅至武街難敵遣兵斷其歸道四面攻之獲琀稚死者數千人後凉吕隆僭即天王位魏安人焦朗遣使說姚興將姚碩徳伐之碩徳遂率衆至姑臧隆遣弟輔國吕超出戰大敗遁還隆收集離散嬰城固守於是羣臣表求與姚興通好隆從之乃請降於碩徳後燕慕容垂僭即帝位遣其太子寳及慕容農慕容麟等率衆八萬伐魏慕容徳慕容紹以歩騎一萬八千為寳後繼魏聞寳將至徙徃河西寳進師臨河懼不敢濟還次參合忽有大風黒氣狀若隄防或髙或下臨覆軍上沙門支曇猛言於寳曰風氣暴迅魏軍將至之候宜遣兵禦之寳笑而不納曇猛固以為言乃遣麟率騎逰獵俄而黄霧四塞日月晦㝠是夜魏師大至三軍奔潰寳與徳等數千騎奔免士衆還者十一二紹死之慕容寳襲偽位魏伐并州驃騎李農逆戰敗績還於晉陽司馬慕容嵩閉門拒之農率騎數千奔中山行及潞州為魏追軍所及餘騎盡沒單馬遁還其後寳聞魏有内難乃盡衆出拒歩卒十二萬騎三萬七千次於曲陽柏津魏軍進至新梁寳憚魏師之銳乃遣征北隆夜襲魏軍敗績而還軍方軌而至對營相持上下兇懼三軍奪氣農麟勸寳還中山乃引歸魏軍追擊之寳農等棄大軍率騎二萬奔還時大風雪凍死者相枕於道寳恐為魏軍所及命去袍仗戎器寸刃無返西秦乞伏乾歸僭稱河南王姚興將姚碩德率衆五萬伐之入自南安峡乾歸次於隴西以拒碩徳興潜師繼發乾歸聞興將至遣其衛軍慕容允率中軍二萬遷於柏陽鎮軍羅敦將外軍四萬遷於候辰谷乾歸自率輕騎數千候興軍勢俄而大風昏霧遂與中軍相失為興追騎所逼入於外軍旦而交戰為興所敗乾歸遁還苑川遂走金城率騎數百馳至允吾秃髪利鹿孤處之於晉興乾歸後懼為利鹿孤所害遂奔長安南凉秃髪傉檀僭稱河西王徵集戎夏之兵五萬餘人大閱於方亭遂伐沮渠蒙遜入西陕蒙遜率衆来拒戰於均石為蒙遜所敗傉檀率騎二萬運榖四萬石以給西郡蒙遜攻西郡䧟之其後傉檀又與赫連勃勃戰於陽武為勃勃所敗將佐死者十餘人傉檀與數騎奔南山㡬為追騎所得蒙遜進圍姑臧百姓懲東苑之戮悉皆驚散疊掘麥田車盖諸部盡降於蒙遜傉檀遣使請和蒙遜許之乃遣司𨽻校尉敬歸及子他為質歸至胡坑逃還他為追兵所執蒙遜徙其衆八千餘户而歸吐谷渾樹雒干率衆来伐傉檀遣其太子武臺距之為雒干所敗傉檀又將伐蒙遜邯川䕶軍孟愷諌曰蒙遜初并姑臧凶勢甚盛宜固守伺隙不可妄動不從五道俱進至畨禾苕藋掠五千餘户其將屈右進曰陛下轉鬭千里前無完陣徙户資財盈溢衢路宜倍道旋師早度峻險蒙遜善於用兵士衆習戰若輕車卒至出吾慮表大敵外逼徙户内攻危之道也衛尉伊力延曰我軍勢方盛將士勇氣固倍彼徒我騎勢不相及若倍道旋師必捐棄資財示人以弱非計也屈右出而告其諸弟曰吾言不用天命也此吾兄弟死地俄而昏霧風雨蒙遜軍大至傉檀敗績而還赫連勃勃求婚於傉檀傉檀弗許勃勃怒率騎二萬来伐殺傷萬餘人傉檀率衆追之其將焦朗謂傉檀曰勃勃天姿雄鷔御軍齊肅未可輕也今因抄掠之資率恩歸之士人自為戰難與争鋒不如從温圍北渡趣萬斛堆阻水結營制其咽喉百戰百勝之術也傉檀將賀連怒曰勃勃以死亡之餘率烏合之衆犯順結禍幸有大功今牛羊塞路財寳若山窘弊之餘人懐貪競不能督厲士衆以抗我也我以大軍臨之必土傾魚潰今引軍避之示敵以弱我衆氣銳宜在速追傉檀曰吾追計决矣敢諌者斬勃勃聞而大喜乃於陽武下陕鑿陵埋車以塞路傉檀遣善射者射之中勃勃左臂勃勃乃勒衆逆擊大破之追奔八十餘里殺傷萬計斬其大將十餘人以為京觀號髑髏臺南燕慕容超僭即帝位晉將劉裕率師將討之師次東莞超遣其左軍段暉輔國賀刺盧等六將歩騎五萬進據臨朐俄而晉師度峴超懼率卒四萬就暉等於臨朐謂公孫五樓曰宜進據川源晉軍至而失水亦不能戰矣五樓馳騎據之晉前驅將軍孟龍符已至川源五樓戰敗而返晉將檀韶率銳卒攻破臨胊超大懼單騎奔叚暉於城南暉衆又戰敗超又奔還廣固使郭内人入保小城未㡬晉師圍四面皆合江南繼兵相尋而至超尚書恱夀開門以納王師超與左右數十騎出亡為晉軍所執前蜀王建僭帝位於成都梁將劉知俊奔鳯翔李茂貞以為大將稍侵建之東川建出兵拒戰為知俊所敗興鳯皆沒焉江南李景僭襲父位周世宗顯徳三年春親征淮甸大敗淮宼於正陽遂進攻夀州四年春世宗再駕南征三月大敗江南援軍於紫金山尋降下夀州是年十月世宗復臨淮甸連下濠泗二郡進攻楚州五年春㧞之景乃上表以廬舒蘄黄等四州来上乞畫江為界河東劉崇僭稱帝位遣兵三千餘衆㓂府州為節度使折徳扆所破其所部岢嵐軍為徳扆所取周世宗嗣位崇乞師於虜與虜將楊衮合勢大舉来迫潞州顯徳元年三月世宗親征與崇戰於髙平大敗之崇與親騎十數人踰山而遁中夜迷懵不知所適刼村民使為鄉導誤趨晉州路行百餘里方覺崇怒殺鄉導者得他路而去距太原一舎其子承鈞夜以兵百人迎之而入及周師至城下崇氣懾自固閉壘不出月餘世宗乃旋軍册府元龜卷二百三十四
