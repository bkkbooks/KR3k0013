body:
  text: 册府元龜卷二百六十一宋王欽若等撰儲宫部忠諫褒寵追謚忠諫傳曰父有諍子又曰從命不忿微諫不倦可謂孝乎若乃奉冡祀之重居儲副之位義均休戚情兼隠犯其或政令之非便舉動之過差而能内發至誠逺徵古義周旋規切納君於善上以成愷悌之化下以慰人神之望茂毓明德誕彰令聞此盖守噐之盛羙信史之耿光也周靈王之時穀雒鬬将毁王宫穀雒二水名鬭者兩水格有似於鬬雒在王城南穀在城北毁王之城西南将及王宫王欲壅之欲壅防穀水使北出也太子晉諫曰不可聞古之長民者長猶君也不隳山不崇藪崇髙也澤無水曰藪也不防川防鄣也不竇澤澤居水也竇決也不為此四者為反天性夫山土之聚也藪物之歸也物所為歸川氣之道也道逹也澤水之鍾也鍾聚也夫天地成而聚於髙歸物於下髙山陵也下藪澤也疏為川谷以道其氣疏通也陂塘汙庳以鍾其美畜水曰陂塘隄也美謂滋潤也是故聚不阤壊而物有所歸大曰壞小曰阤氣不沉滯而亦不散越沉伏滯積越逺也是以民生有財用而死有所葬物有所歸故生有財用山陵不壊故死有所葬無昬夭札瘥之憂而無饑寒乏匱之患短折曰夭狂惑曰昏疫死曰札瘥病也故上下能相固以待不虞古之聖王唯此之愼昔共工棄此道也顓頊氏衰共工氏侵凌諸侯與髙辛氏爭為王也虞于湛樂虞安也湛淫也淫失其身欲壅防百川隳髙堙庳以害天下堙塞也髙謂山陵庳謂池澤皇天弗福庻民弗助禍亂並興共工用㓕其在有虞有崇伯鯀鯀禹父崇鯀國伯爵堯時在位而言有虞者鯀之誅舜之為也播其滛心穪遂共工之過播放稱舉遂共工之過者謂障洪水者也堯用殛之於羽山殛誅也舜臣堯殛鯀於羽山其後伯禹念前之非度度法釐改制量釐理也量度也象物天地取法天地之物象也在天成象在地成形共之從孫四岳佐之共共工也從孫昆弟之孫四岳官名主四岳之祭為諸侯伯佐禹助禹治水也高髙下下疏川道滯髙高謂封崇九山下下謂陂障九澤疏川决江疏河道滯鑿龍門闢伊闕鍾水豐物鍾聚畜水潦所以豐殖百物也封崇九山封大崇高除其壅塞通其水泉使不隳壞是謂封崇凡此諸言九者皆九河之中山川澤藪障防也豐殖九藪豐茂也殖長也汨越九原越揚也宅居九隩隩内也九州之内皆可宅居合通四海使之同􅁤故天無伏隂伏隂夏有霜雹地無散陽散陽李梅冬實水無沉氣無伏積之氣也火無灾燀燀焱起貎神無間行間行奸神淫厲之類民無淫心隂陽調財用足故無淫佚之心也時無逆數四時寒暑反逆物無害生螟蝗之屬有害嘉穀皇天嘉之祚以天下祚禄也賜姓曰姒氏曰有夏堯賜禹姓曰姒封之有夏謂其能以嘉祉殷富生物也以其能以善福殷富天下生育萬物也姒猶祉也夏大也祚四岳國命為侯伯堯以四岳佐禹有功封於吕命為侯伯使長諸侯賜姓曰姜姜四岳之先炎帝之姓黄帝世衰其後變易至四岳有後帝復賜之祖姓使紹帝之後云氏曰有吕以國為氏也謂其能為禹股肱心膂以養物豐民人也以四岳能輔成禹功比於股肱心膂吕之為言者膂也此一王四伯豈繄多寵皆亡王之後也一王謂禹四伯四岳也言禹鯀之子禹郊鯀追王之四岳共工從孫共工侵凌諸侯以自王言皆無道而亡禹岳之興非因之及其失之也必有慆淫之心間之慆慢間代也以慢淫之心代其嘉功謂若桀也故亡其氏姓踣弊不振踣僵也振救也絶後無主無祭主也堙替𨽻圉堙没替廢𨽻𨽻役也圉養馬者夫亡者豈繄無寵皆黄炎之後鯀黄帝之後共工炎帝之後及其得之也必有忠信之心間之以忠信代慆淫也度於天地而順於時動順四時之令而動和於民神而儀於物則故髙朗令終顯融昭明朗明也終成也融長也命姓受氏而附之以令名附隨也其興者必有夏吕之功焉其廢者必有共鯀之敗焉今吾執政無乃實有所避避違也而滑夫二川之神滑音骨亂也使至於爭明以妨王宫明精氣也王而飾之無乃不可乎人有言曰無過亂人之門亂人狂悖怨亂之人也過其門干其怒也又曰佐饔者嘗焉佐鬭者傷焉又曰禍不好不能為禍猶財色之禍生於好也詩曰四牡騤騤旟旐有翩亂生不夷靡國不泯騤騤行貎鳥隼曰旟龜􅉬曰旐翩翩揺動不休之意夷平靡無泯滅也厲王好行征伐用兵不得其所禍亂不平無國而不滅又曰民之貪亂寧為荼毒寧安荼苦也言民疾主之虐貪樂禍亂安為苦毒之行王將防鬭川以飾宫是飾亂而佐鬬也其無乃章禍且遇傷乎自我先王厲宣幽平而貪天禍至於今未弭此四王父子相繼厲暴虐而修怨宣不務農而料民幽昏亂以滅西周平不能修政至於微弱皆已所致弭止也我又章之懼長及子孫王室其愈卑乎其若之何詩云殷鍳不逺在夏后之世謂湯伐桀將焉用餙宫其以徼亂也度之天神則非祥也比之地物則非義也類之民則則非仁也方之時動則非順也咨之前訓則非正也時動非順謂逆四時之令觀之詩書與民之憲言詩書亂生不夷之屬民之憲言無過亂人之門則皆亡王之為也夫事大不從象小不從文象天象也文詩書也上非天刑下非地德刑法也德利也中非民則方非時動而作之必不節矣作又不節害之道也王卒壅之漢元帝初為太子柔仁好儒見宣帝所用多文法吏以刑名䋲下申子學號刑名者以名責實尊君卑臣崇上抑下宣帝好觀其君臣篇䋲謂彈治之耳大臣楊惲盖寛饒等坐刺譏辭語為罪而誅太子嘗侍燕從容言陛下持刑太深宜用儒生宣帝作色曰漢家自有制度本以覇王道雜之奈何純任德教用周政乎姬周之政且俗儒不逹時宜好是古非今使人眩於名實眩亂視也不知所守何足委任乃嘆曰亂我家者太子也後漢明帝初為皇太子光武每旦視朝日昃乃罷數引公卿郎將講論道理夜分乃寐太子見帝勤勞不怠承間諫曰陛下有禹湯之明而失黄老養性之福願頥愛精神優㳺自寜帝曰我自樂此不為疲也吳孫登為太子時留鎮武昌後弟慮卒大帝為之降損登晝夜兼行到頼鄉自聞即時召見見帝悲泣因諫曰慮寢疾不起此乃命也方今朔土未一四海喁喁天戴陛下而以下流之念减損大官殽饌過於禮制臣竊憂惶帝納其言為之加膳時帝信任校事吕壹壹性苛慘用法深刻登數諫帝不納大臣繇是莫敢言後姦罪發露伏誅帝引咎責躬赤烏四年太子卒臨終上疏曰臣以無狀嬰抱篤疾自省微劣懼卒隕斃臣不自惜念當委離供養埋胔后土長不復奉望宫省朝覲日月生無益於國死貽陛下重戚以此為哽結耳臣聞死生有命長短自天周晋顔回有上智之才而尚夭折况臣愚陋年過其壽生為國嗣没享榮祚於臣已多亦何愁恨哉方今大事未定逋寇未討萬國喁喁係命陛下危者望安亂者望治願陛下棄忘臣身割下流之恩修黄老之術篤飬神光加羞珍膳廣開神明之慮以定無窮之業則率土幸頼臣死無恨也皇子和仁孝聰哲德行清茂宜早建置以繫民望諸葛恪才略博逹器任佐時張休顧譚謝景皆通敏有識㫁入宜委腹心出可為爪牙范鎮華融矯矯壯節有國士之風羊衜辯㨗有專對之材刁𤣥優𢎞志履道真裴欽博記翰采足用蔣脩虞翻志節分明凡此諸臣或宜廊廟或任將帥皆練時事明習法令守信固義有不可奪之志此皆陛下日月所炤選置臣宫得與從事備知情素敢以陳聞臣重惟當今方外多虞師旅未休當厲六軍以圖進取軍以人為重衆以財為寳竊聞郡縣頗有荒殘民物彫弊姦亂萌生是以法令繁滋刑辟重切臣聞為政聽民律令與時推移誠宜與將相大臣詳擇時宜博采衆議寛刑輕賦均息力役以順民望陸遜忠勤於時出身憂國謇謇在公有匪躬之節諸葛瑾歩隲朱然全琮朱據吕岱吳粲闞澤嚴畯張承孫怡忠於為國通逹治體可令陳上便宜蠲除苛煩愛飬士馬撫循百姓五年之外十年之内逺者歸復近者盡力兵不血刃而大事可定也臣聞鳥之將死其鳴也哀人之将死其言也善故子􅌩臨終遺言戒時君子以為忠豈况臣登其能已乎願陛下留意聽采臣雖死之日猶生之年也既絶而後書聞大帝益以摧感言則隕涕孫和為太子時有司頗有條書問事和以為姦妄之人将因事錯意以生禍心不可長也表宜絶之時諸葛豐偽叛以誘魏将諸葛誕大帝濳軍待之和以帝暴露外次又戰者㓙事常憂勞􅉃怛不復㑹同飲食數上諫戒令持重務在全勝帝還然後敢安梁昭明太子統武帝大通二年春詔遣前交州刺史王弁假節發吳及吳興信義三郡民丁就役太子上疏曰伏聞當發王弁等上都三郡民丁開漕溝渠導泄震澤使吳興一境無復水災誠矜恤之至仁經畧之逺㫖暫勞永逸必獲後利未萌難覩竊有愚懐所聞吳興累年失収民頗流移吳郡十城亦不全熟唯義興去秋有稔復非常役之民即東境穀價猶貴竊盜屢起所在有司皆不聞奏今征戍未歸彊丁疎少此雖小舉竊恐難令吏一呼聞動為民蠧出丁之䖏逺近不等皆得齊集已妨蠶農去年稱為豐嵗公私未至足食如復今兹失業慮為弊更深且草竊多伺候民間虚實若善人從役則抄盜彌増吳興未受其益内地已罹其弊不審可得權停此功否伏望聖心垂矜黎庻神量乆已有在臣意見庸淺不識事宜茍有愚心願得上啟帝優詔諭焉簡文帝為太子時髙祖銳意儒雅疎簡刑法自公卿大臣咸不以鞫獄留意姦吏招權巧文弄法貨賄成市多致枉濫大率二歳刑已上歳至五千人是時從居作者俱五任無任者著斗械若疾病權觧之是後囚徒或有優􅇵太子在春宫視事見而愍之乃上疏曰臣以此時奏勅權視京師事竊見南北郊壇材官軍府大官下省佐裝等䖏並啟請四五歳已上輕囚助充使役自有刑均罪等􅄽目不異而甲侍錢署乙配郊壇錢署三所於事為劇郊壇六處在役則優令聽獄官詳其可否舞文之路自此而生公平難遇其人流舞易啟其齒將恐玉科重輕全關墨綬金書去取更繇丹筆愚謂宜詳五條制以為永准髙祖手勅報曰頃年以来䖏䖏之役唯資徒讁遂急充配若科制繁細義同棼絲切要之處終不可得引例興訟紛紜方始防杜姦巧自是為難當更别思取其便也隋房陵王勇初為皇太子時髙祖以民流冗遣使案檢又欲徙民北實邉塞勇上書諫曰竊以導俗當漸非可頓革戀土懷舊人之本情波迸流離盖不獲已有齊之末主闇時昏周平東夏繼以威虐民不堪命致有逃亡非厭家鄉願為覊旅加以去年三方逆亂頼陛下仁聖區域肅清鋒刃雖屏瘡痍未復若假以數歳沐浴皇風逃竄之徒自然歸本雖北夷猖獗嘗犯邉烽今城鎭峻峙所在嚴固何待遷配以致勞擾臣以庸虛謬當儲貳寸誠管見輙以塵聞帝覧而嘉之遂寢其事是後政不便多所損益帝每納之唐髙宗初為太子時太宗嘗怒苑西面監穆裕農囿不修命於朝堂斬之侍臣戰悚莫敢進言太子諫之曰人者有生最靈一死不可復活命即殺之理恐未盡請付法推鞫太宗意解乃笞而釋之司徒長孫無忌進曰自古太子諫其君父者周王子晉漢明帝吳孫登等承間而言事非倉卒今日陛下發天威之怒太子申犯顔之諫斯誠四海之福古今未有太宗曰堯師務成舜師尹壽殷宗周文皆有請益自朕御天下虚心正人即有魏徴朝夕納諫自徴云亡劉洎繼之太子㓜在膝前每見規諫者朕嘗心嘉其言染以成性故有今日之規耳太子𢎞髙宗第五子也總章中勅征遼軍人逃亡限内不首及更有逃亡者身並處斬家口没官太子上表諫曰竊聞背軍之人身乆不出家口皆擬没官亦有限外出首未經㫁罪諸州囚禁人數致多或臨時遇病不及軍伍縁兹怖懼遂有逃亡或因採樵被賊抄掠或度船來去漂没滄波或深入賊庭有被傷殺軍法嚴重皆須給傔若不給傔及因戰亡即同隊之人兼合有罪遂有無故死失多注為逃軍旅之中不暇詳勘當直據隊司通狀將作真逃家口令摠没官論情寔可哀愍書曰與其殺不辜寧失不經伏願逃亡之家免其配没詔從之上元三年左威衞大将軍權善才右監門衞中郎将范懐義並為斫昭陵栢木髙宗将殺之太子抗疏善才等嘗預蕃寮先經驅䇿期於矜貸帝從之善才僅免死除名懐義配流桂州昭陵令孔禎以不能簡察免官順宗初為太子於父子間慈孝交結無嫌毎以天下為憂德宗在位稍乆不假宰相權而左右得縁用事外則裴延齡李奇運韋渠牟等以姦佞相次進用延齡尤狡險判度支務刻剥聚歛自以為功天下皆怨怒太子每進見候顔色輙言其不可及陸贄張滂李充等以毁譴朝臣􅋏懼諫議大夫陽城等伏閣極論德宗怒甚将加城等罪外無敢救者太子獨開解之城等頼以免德宗卒不相延齡渠牟者太子之力也德宗嘗泛舟魚藻宫觀水嬉命太子昇舟器具皆餙以金碧丹青使婦人盛飾操篙檝行舟光彩暎燭絲竹歌謳俱發德宗顧謂太子曰今日如何對曰極盛退因以奢為諫德宗不恱貞元中中官多詐稱宫市肆奪人物百姓怨苦太子嘗以為言德宗雖不能悉聽用而心益賢重太子太子未嘗假借内官顔色居東宫二十餘年天下隂受其福褒寵傳曰太子奉冡祀社稷之粢盛以朝夕視君膳者聖人所以重宗廟社稷不忘天下也其有膺監撫之重茂温文之德佩服前訓率繇善道日新之羙既洽天性之愛益隆乃至冠服加其異數朝㑹申其殊制優錫無筭用財不會璽書褒其才智天章譽其仁孝斯皆尊元良而貞邦本流簡素而揚懿烈者也漢成帝為太子元帝嘗急召太子出龍樓門樓上有銅龍若白鶴飛亷之為名不敢絶馳道道天子所行道也若今之中道絶横度也西至直城門黄圗西出南頭第二門得絶乃度入作室門帝遲之問其故以狀對帝大恱乃著令令太子得絶馳道南齊鬱林王昭業武帝時為皇太孫進封音吐甚有羙譽王侯五日一問訊武帝嘗獨呼昭業至幄座别加撫問呼為法身鍾愛甚重梁昭明太子統髙祖長子天監十四年正月朔旦髙祖臨軒冠太子於太極殿舊制太子着逺遊冠金蟬翠綟纓至是詔加金博山唐廢太子承乾太宗長子貞觀十六年詔曰儲貳不㑹自古常式近代以來多為節限求之故實殊非事宜自皇太子出用庫物所司勿為限制皇太子承乾抗表謝詔答曰汝家之冡嫡國之儲兩故有斯命以彰有殊入學齒胄則君臣之義也同之府庫實父子一體也是以君子富而不驕謙而受益奢則不孫以約失之者鮮矣勉思守道無煩致謝髙宗為皇太子貞觀十八年十一月乙酉日南至皇太子王公已下展賀於貞觀殿太宗曰朕一二年中始見太子拜賀太子宗社之本四海所繫而治天資仁孝内外傾服朕之此舉無愧於人神也十九年太宗征遼班師十一月丙戌幸定州庚寅詔曰皇太子愛敬所覃格於四海仁孝所感周於百姓自春監國既處定州首創德風在乎兹境所以事敬養之道有隐無犯之情爰自中山流于率土地居宣化之本人禀純孝之深有足可嘉特須優異其定州􅃹内孝行著聞者宜與宗姓老人同賜宴㑹二十年三月詔皇太子㫁决機務每間日聽政於東宫罷朝復侍寢間嘗藥視膳不離左右乃於太宗寢殿側别置一院令太子居焉章懐太子賢髙宗第六子也上元二年立為皇太子尋命監國賢處事明審為時論所稱手勅褒之曰皇太子賢自頃監國留心政要撫字之道既盡於哀矜刑網所施務存乎審察加以聽覧餘暇專精墳典往聖遺編咸窺壷奥先王册府備討菁華好善載彰作貞斯在家國之寄深副所懐可賜物五萬叚中宗為皇太子長安二年七月丙戌則天以時熱詔皇太子外朝令用扇障日太子抗表固譲優制不許肅宗為皇太子天寳八年𤣥宗製仁孝詩六章札於步障以賜太子令中官髙力士以示朝臣宰相李林甫陳希烈等奏曰伏見太子生日撰仁孝詩障子并書臣等伏以宸章煥發睿札凝暉懸日月而齊光自雲霄而下濟驚心靡據動色相歡太子稟自生知備承聖訓中姿有裕令望夙彰陛下示以義方形於翰墨爰於誕育之日授以仁孝之經上揚宗祖之美旁考天人之際錫賚所宏教養斯逺足可發揮前古􅂷範将來凡在衣冠之流咸知父子之道豈比周稱教喻還齒胄於上庠漢寵元良但招賢於上苑王化之本實此知歸人倫所資罔不申勸臣等愚陋謬典樞衡特奉鴻私幸覩殊貺捧天書而竊抃仰聖澤以無寧無任悦豫之至仍望具寫六章頒示中外兼編諸簡䇿傳之不朽上手詔報曰詩者志之所之也將以道逹性情宣揚教義耳朕承五聖之業萬方之寄主鬯叶於神心元良貞於國本羙其克踐仁孝恭修友睦深慰於懐不覺形之諷詠今請具寫六章頒示中外兼編諸簡䇿以傳不朽亦欲自家刑國以訓人倫宜依來請追謚古者諸侯薨則請行以賜謚矧夫明兩之位主噐攸重不幸奄忽震悼於宸極易名之典繇是行焉若乃岐嶷天資温文秉哲将正萬邦而降年不永適固宗本而誣搆及禍亦有嫉惡發憤矯命不勝遭世中圯或罹兵難莫不申哀節惠追加寵數其或違背師訓稔惡弗革干紀敗度罹於廢黜司籍所紀書法不隱懲勸之義於斯見矣至於崇置園邑升列廟饗亦并叙之漢戾太子據武帝長子元狩元年立為皇太子征和二年以擅發長樂宫衞斬江充兵敗自經於湖今虢州湖城縣及太子孫即位詔曰故皇太子在湖未有號謚歳時祀其議置園邑有司奏謚請曰謚者行之迹也皇太子謚曰戾置奉邑二百家吳太子登大帝長子赤烏四年薨謚曰宣太子初葬句容置園邑奉守如法後三年改葬蔣陵晉愍懐太子遹惠帝長子即位立為皇太子元康元年為賈后中遘廢為庻人幽於金墉城殺之及賈后廢遹子尚為皇太孫乃册復太子曰嗚呼維爾少資岐嶷之質荷先帝殊異之寵大啟土宇奄有淮陵朕奉遵遺㫖越建爾儲副以光顯我宗祇爾德行以從保傅事親孝敬禮無違者而朕昧於㓙搆致爾於非命之禍俾申生孝己復見於今頼宰相賢明人神憤怨用啟朕心討厥有罪咸伏其辜何補于荼毒寃魂酷痛我是用忉怛悼震動於五内今追復皇太子謚曰愍懐哀太孫臧愍懐太子子永康元年四月立為皇太孫永寧元年廢被害大安初追謚曰哀冲太孫尚愍懐太子子永寧元年立為皇太孫大安元年薨謚曰冲南齊文惠太子長懋武帝長子即位立為皇太子永明十一年薨帝幸東宫臨哭盡哀詔歛以衮冕之服謚曰文惠梁昭明太子統武帝長子即位立為皇太子大通三年薨帝幸東宫臨哭詔歛以衮冕謚曰昭明哀太子大噐簡文帝嫡長子即位立為皇太子大寶二年為侯景所害承聖元年追謚曰哀愍懐太子方矩元帝第四子帝承制拜為王太子改名元良承聖元年即位為皇太子及江陵䧟為魏師所害敬帝承製追謚曰愍懐太子後梁孝惠太子寮宣帝長子帝初為梁王立為世子病卒及帝稱大號追謚孝惠太子陳孝懐太子克髙祖之子帝初封陳王立為世子及受禪追謚孝惠唐隱太子建成髙祖長子武德九年以謀害太宗伏誅貞觀元年追封息王謚曰隱十六年詔曰昔戾園敗德西都表其號謚楚英干紀東漢錫其湯沐斯皆屈邦國之禁申骨肉之恩也息隱王地乃居長守噐運初自貽伊戚䧟於禍難日月逾邁松檟成行朕嗣守鴻基頒尋遺烈何嘗不渉彼崗而靡觀瞻同株而疚懐恩備哀榮式加禮命可追復皇太子謚仍依前陵曰隱陵置令以下官并加戸守衞太子𢎞髙宗第五子初封代王顯慶元年立為皇太子上元二年薨於合璧宫之綺雲殿詔曰朕肅承鴻緒無忘馭朽之懐䖍奉聖謨每切臨深之懼幸以穹昊垂祐宗社降靈公卿盡叶贊之謀黎庻遂懐生之望故得乾坤交㤗日月休徵􅂷衣而晏九瀛端拱而家六合方将廽鑾峒岫體高尚於軒皇脫屣汾川追逸軌於伊后成功弗處思遵象帝之規守噐斯傳用申知子之授皇太子𢎞生知誕質惟幾毓性肅敬著于三朝仁孝聞於四海若使負荷宗廟寧濟邦家必能永保昌圖克延景厯豈謂遽嬰露霧遂至彌留顧惟耀掌之珍特切鍾心之念庶其痊復以禪鴻名及腠理微和將遜於位而𢎞天資仁厚孝心純確既承朕命掩欷不言因兹感結舊疾増甚億兆攸係方崇下武之基五福無徴俄速上賔之駕天性之重追懐哽咽宜申往命加以尊名夫謚者行之迹也號者事之表也慈惠愛親曰孝死不忘君曰敬可謚為孝敬皇帝仍遵典故式備徽章布告遐邇使知朕意神龍元年六月祔神主于太廟號義宗有司奏言義宗孝敬皇帝昇太廟聨祖宗其名准禮合諱從之遂改𢎞文舘為修文舘𢎞福殿為崇福殿虢州𢎞農縣為常農縣章懐太子賢髙宗第六子上元二年立為皇太子調露二年則天令人發其隂事庶為庶人遷於巴州卒中興初追贈司徒使迎其喪柩陪葬乾陵睿宗踐祚追贈皇太子曰章懐廟號陟崗懿徳太子重潤中宗長子初生於東宮立為皇太孫聖厯初改封邵王大足元年為人所搆則天殺之神龍元年追贈皇太子諡曰懿徳節愍太子重俊中宗第三子神龍二年立為皇太子三年矯制發左右羽林兵殺武三思及其子崇訓入求韋庻人不克而死景雲元年制曰朕聞曽氏之孝也慈親惑於疑聴趙虜之族也明主哀而望思厯考前聞率繇舊典重俊大行之子元良守器往罹搆間困於讒嫉莫顧鈇鉞輕盜甲兵有此誅夷無不悲惋今四㓙咸服十起何追方申赤暈之寃以舒黄泉之痛可贈皇太子諡曰節愍陪葬定陵時大府少卿韋湊上疏駁之不納事具禮官奏議門廢太子瑛𤣥宗第二子開元三年立為皇太子二十五年為中書令李林甫所搆廢為庶人賜死於城東驛寳應元年詔贈為皇太子惠昭太子寧憲宗長子元和四年立為皇太子六年薨謚曰惠昭七年立廟在懷貞坊置官吏四時置享莊恪大子永文宗長子太和六年立為皇太子開成三年十一月薨謚曰莊恪十一月太常禮院奏莊恪太子准惠昭太子例合立廟請下有司從之册府元龜卷二百六十一
