body:
  text: 册府元龜卷四百三十三宋王欽若等撰將帥部輕財示弱輕財夫戰之所尚其惟得衆師所以和繇乎布惠是以古之良將受命忘家視卒如子饑寒先恤甘苦皆分饗必盡於食租身不專其君賜豈有他哉葢所以奉腹心之寄宣爪牙之用極士之歡心致人之死力而已故能奉辭將罰治兵鞠旅撫士御衆多多而益辦料敵制勝堂堂之必擊然後式遏冦虐掃清疆埸揚威邊野令行百萬圖芳鼎彛功齊四七語有之曰天時不如地利地利不如人和非徳施何以能之哉趙趙奢為將王及宗室所賞賜盡以予軍吏士大夫漢竇嬰為大將軍嬰言袁盎欒布諸名將賢士在家者進之所賜金陳廊廡下廊堂下周屋也廡門屋也音侮軍吏過輒令財取為用財與裁同謂裁量而用之也金無入家者李廣累遷輕車將軍歴七郡太守前後四十餘年得賞賜輒分其戲下戲讀日麾飲食與士卒共之家無餘財終不言生産事後漢吳漢為大司馬甞出征妻子在後買田業漢還讓之曰軍帥在外吏士不足何多買田宅乎遂盡以分與昆弟外家冦恂為執金吾所得秩奉厚施朋友故人及從吏士嘗曰吾因士大夫以致此其可獨享之乎馬援字文淵拜隴西太守監揚武將軍馬成破先零羗光武以璽書勞之賜牛羊數頭援盡頒諸賔客祭遵字弟孫為人㢘約小心克己奉公光武以為刺姦將軍賞賜輒盡與士卒家無私財滕撫為九江都尉討平妖賊所得賞賜盡分與麾下董卓桓帝末以六郡良家子為羽林郎從中郎將張奐為軍司馬共擊漢陽叛羗破之拜郎中賜縑九千匹卓曰為者則已有者則士為功者雖已共有者乃士乃悉分與吏兵無所留魏曹眞累遷大司馬每征行與將士同勞苦軍賞不足輒以家財頒賜士卒皆願為用夏侯惇為大將軍性清儉有餘財輒以分施不足資之於官不治産業于禁為虎威將軍持軍嚴整得賊財物無所私入徐邈為凉州刺史建威將軍破叛羗有功賞賜皆散與將士無入家者妻子衣食不充眀帝聞而嘉之隨時供給其家胡質為東莞太守每軍功賞賜皆散之於衆無入家者在郡九年吏民便安將士用命遷荆州刺史加振威將軍田豫為䕶烏丸鮮卑校尉後為䕶匈奴中郎將并州刺史豫清約儉素賞賜皆散之將士每胡狄私遺悉簿藏官不入家家常貧匱雖殊類咸髙豫節吳孫皎字叔朗遷都䕶征虜將軍代程普督夏口輕財能施程普為盪冦將軍於諸將最年長時人皆呼程公性好施與喜士大夫朱據為左將軍輕財好施禄賜雖豐而不足用朱桓累遷前將軍輕財貴義愛飬吏士贍䕶六親俸禄産業皆與共分晉羅憲初仕蜀為宣信校尉輕財好施不營産業羊祜為征南大將軍立身清儉被服率素禄俸所資皆以贍給九族賞賜軍士家無餘財祖逖為奮威將軍豫州刺史逖獲駿馬蓬陂塢主陳川將李頭甚欲之而不敢言逖知其意遂與之逖克己務施不畜資産紀瞻為領軍將軍兼散騎常侍及王敦之逆明帝使謂瞻曰卿雖病但為朕卧䕶六軍所益多矣乃賜布千疋瞻不以歸家分賞將士王敦為廣武將軍初尚武帝女襄城公主後天下大亂敦悉以公主時侍婢百餘人配給將士金銀寳物散之於衆單車還雒宋朱脩之為寧蠻校尉雍州刺史脩之治身清約凡所贈貺一無所受有餉或受之而旋賞驍雄陳宣帝深嘆美之唐尉遲敬徳太宗貞觀中歴靈鄜夏三州都督敬徳輕於貨財所得遺賜多散之於士卒及故舊親族李勣累為行軍總管前後戰勝所得金帛皆散之將士裴行儉為洮州道左二軍總管詔賜都友等資産金銀噐皿三千餘事駝馬稱是并分給親故副使已下數日便盡李叔明為太子太傅閬州人本姓鮮于代宗大歴中賜姓李氏叔明總戎年深家代為豪族兄仲通天寳末為京兆尹劔南節度使兄弟並渉學輕財好施馬燧為河東節度討田悦悦兵大敗先戰燧誓於軍中戰勝請以家財行賞既戰勝盡其私積以頒將士徳宗聞而嘉之乃詔度支出錢伍萬貫行賞還其家財石雄為豐州刺史天徳防禦使雄臨財甚㢘每破賊立功朝廷時有賜與皆不入私室置於軍門首取一分餘並分給以此軍士感義皆思奮發後唐王晏球為宋州節度使充招討使攻圍定州晏球能與將士同甘苦所得禄賜私財盡以饗士趙鳳為邢州節度使在鎮所請俸禄之餘分給將校賔佐故雖危難之中軍民帖然王思同明宗在軍時素知之即位後用為同州節度使未㡬移鎮隴右思同好文士無賢不肖必館接賄遺嵗費數十萬示弱夫兵唯㓙噐戰實詭道譎而不正雖或見譏道而後權葢有明訓矧殺敵致果唯利是圖後實先聲以竒制勝是知晉侯退舍得臣遂驕楚子羸師季良乃黜信翕張之良術成敗之要樞也然仁者之師無敵於天下聖人之守逺在於四夷好謀而成雖兵家之常道不爭而勝乃用武之茂功較而論之固有間矣趙將李牧嘗居代鴈門備匈奴約曰匈奴即入盗急入收保有敢捕虜者斬匈奴謂牧為怯趙王讓牧牧如舊王怒使他人代將嵗餘匈奴每來出戰數不利復遣牧牧至如故約匈奴終嵗無所得終以為怯邊士皆願一戰於是乃具選兵車得千三百乗騎萬三千匹百金之士五萬人彀弓弩者十萬人悉勒習戰大縱畜牧人民滿野匈奴小入佯北不勝以數千人委之單于聞之大喜率衆來冦牧多為竒陣張左右翼擊之大破殺匈奴十餘萬騎單于奔走十餘嵗不敢近邊田忌為齊將韓魏相攻忌率兵伐魏魏將龎涓聞之去韓而歸孫臏謂田忌曰彼三晉之兵素皆悍勇而輕齊齊號為怯善戰者因其勢而利導之兵法百里而趨利者蹶上將軍蹶猶挫也蹶紀劣切五十里走者半至使齊軍入魏地為十萬竈明日為伍萬竈又明日為二萬竈涓行三日大喜曰我固知齊軍怯入吾地三日士卒亡者過半矣乃棄其歩兵與其輕銳倍日併行逐之併畢正切孫子度其期當至馬陵道狹而旁多阻隘可伏兵乃大斫樹白而書之曰龎涓死此下於是令萬弩夾道而伏期日暮見火舉而俱發龎涓夜至斫木下見白書乃鑚火燭之讀書未畢齊軍萬弩俱發軍大亂龎涓乃自剄田单齊將也燕軍大破齊國田单守即墨知士卒可用乃身操版挿與士卒分功妻妾編於行伍之間盡散飲食饗士令甲卒皆伏使老弱女子乗城遣使約降於燕燕軍皆呼萬嵗田单又収城中金得千鎰令即墨富豪遺燕將書曰即墨即降願無掠擄吾族家妻妾令安堵燕將大喜許之燕軍繇此益懈田单出軍擊大敗之漢韓信為相國擊齊楚使龍且將號稱二十萬救齊且與信夾濰水陳信乃夜令人為萬餘囊盛沙以壅水上流引兵半渡擊龍且佯不勝還走龍且果喜曰固知信怯遂追渡水信使人決壅囊水大至龍且軍大半不得渡急擊破之後漢吳漢為大司馬伐公孫述時漢軍餘七日粮隂具舩欲遁去蜀郡太守張堪聞之馳往見漢説述必敗不宜退師之策漢從之乃示弱挑敵述果自出戰死城下耿弇為建威大將軍討張歩弇攻歩臨淄㧞之入據其城歩與其三弟藍𢎞夀及故大槍渠師重異等兵重姓異名也號二十萬至臨淄大城東將攻弇弇先出淄水上與重異遇突騎欲縱弇恐挫其鋒令歩不敢進欲示弱以盛其氣乃引歸小城陳兵於内歩氣盛直攻弇營與弇裨將劉歆等合戰弇升王宫環臺望之臨淄本齊國所都即齊王宫中環臺也視歆等鋒交乃自引精兵以横突步陣於東城下大破之魏陳登字元龍為伏波將軍孫策遣軍攻登於匡琦城登閉門自守示弱不與戰將士銜聲寂若無人登乗城望形勢知其可擊乃申令將士宿整兵噐昧爽開南門擊破之晉李矩字世廻太尉荀藩承制建行臺假矩滎陽太守元帝加矩冠軍將軍後劉聰遣從弟暢歩騎三萬討矩屯于韓王故壘相去七里遣使招矩時暢卒至矩未暇為備遣使奉牛酒詐降于暢潜匿精勇見其老弱暢不以為虞大饗渠帥人皆醉飽矩謀夜襲之暢僅以身免梁韋濬為左將軍南郡太守時㑹司州刺史馬仙琕北伐還軍為魏人所躡三闗擾動詔濬督衆軍援焉濬至安陸増築城二丈餘更開大塹起髙樓衆頗譏其示弱濬曰不然為將當有怯時不可專勇是時元英復追仙琕將復邵陽之耻聞濬至乃退髙祖亦詔罷軍王僧辯為征東大將軍時侯景䧟京師僧辯赴援次于南洲賊帥侯子鑒自率歩騎萬餘人於岸挑戰又以鵃䑠千艘竝載戰士兩邊悉八十棹棹手皆越人去來趣襲㨗過風電僧辯乃麾細船皆令退縮悉使大艦夾泊兩岸賊謂水軍欲退爭出趍之衆軍乃棹大艦截其歸路皷譟大呼合戰中江賊悉赴水陳侯安都為南徐州刺史髙祖東討杜龕安都留臺居守徐嗣徽任約等引齊冦入據石頭游騎至于闕下安都閉門偃旗幟示之以弱令城中曰登陴㸔賊者斬及夕賊收軍還石頭安都夜令士卒宻營禦敵之具將旦賊騎又至安都率甲士千三百人開東西門與戰大敗之賊乃還石頭不敢進逼臺城陸子隆為明威將軍廬陵太守時周廸據臨川及東昌縣人修行師應之率兵以攻子隆其鋒甚盛子隆設伏於外仍閉門偃甲示之以弱及行師至腹背擊之行師大敗因乞降許之送京師後魏費穆孝明時蠕蠕入冦涼州以穆為輔國將軍假征虜將軍兼尚書左丞西北道行臺仍為别將徃討之穆至涼州蠕蠕遁走穆與所部曰夷狄獸心惟利是視見敵便走乗虛復出今王師來討雖畏威遁跡然軍還之後必來侵暴今欲羸師誘致兾獲一戰若不令其破膽終恐疲於奔命衆咸然之穆乃簡練精騎伏於山谷使羸歩之衆為外營以誘之賊騎覘見謂為信弱俄而競至穆伏兵奔擊大敗之斬其帥郁厥烏爾俟斥十代等獲生口雜畜甚衆南齊周山圖為龍驤將軍時豫章賊張鳳聚衆康樂山斷江刼抄臺軍主李䨇蔡保數遣軍攻之連年不擒至是軍主毛寄生與鳳戰於豫章江大敗明帝復遣山圖討之山圖至先羸兵偃衆遣軍主龎嗣厚遺鳳要出㑹聚聽以兵自衛鳳信之行至望蔡山圖設伏兵於水側擊斬鳳首衆百餘人來降隋于仲文髙祖時為大將軍尉遲迥之亂遣仲文詣雒陽發兵討之仲文軍至汴州之東次蓼隄去梁郡七里迥將檀讓擁衆數萬仲文以羸師挑戰讓悉衆來拒仲文偽北讓軍頗驕於是遣精兵左右翼擊之大敗讓軍生獲五千餘人斬首七百級進攻梁郡迥守將劉子寛棄城遁走仲文追擊擒斬數千人子寛僅以身免及煬帝大業中為光禄大夫遼東之役仲文率軍指樂浪道軍次烏骨城仲文簡羸馬驢數千置於軍後既而率衆東過髙麗出兵掩襲輜重仲文廻擊大破之董純為右衛將軍彭城留守大業中彭城賊張大彪宗世模等衆至數萬保懸薄山冦掠徐兖純將兵討之純初閉營不與戰賊屢挑之不出賊以純為怯不設備縱兵大掠純選精鋭擊賊合戰於昌慮大破之斬首萬餘級築為京觀王世充為江都郡丞領江都宫監齊郡賊帥孟讓自長白山冦掠諸郡至盱眙有衆十餘萬世充以兵拒之而羸師示弱保都梁山為五柵相持不戰後因其懈弛出兵奮擊大破之唐薛萬均為上柱國永安郡公與燕王羅藝守幽州竇建徳率衆十萬來至范陽萬均謂藝曰衆寡不敵今若出鬭百戰百敗當以計取可令羸兵弱馬阻之精騎百人伏於城側待其半渡而擊之破之必矣從之建徳果引兵渡萬均邀擊大破之執失思力有戰功封安國公及討遼東留思力統領突厥於夏州之北捍禦延陁其冬延陁率兵十餘萬來冦河南思力示羸弱縱賊深入漸引南行至夏州之境思力整陣擊敗之迢奔六百餘里擒延陁耀威磧北而還册府元龜卷四百三十三
