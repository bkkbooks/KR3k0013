body:
  text: 册府元龜卷七百六十八宋王欽若等撰總錄部儒學第二宋周續之字道祖晉時豫章太守范寗於郡立學招集生徒續之年十二受業居學數年通五經徵為太子博士不就髙祖踐阼復召之為開館東郭外續之素患風痺不復堪講乃移病鍾山卒通毛詩六義及禮雷次宗字仲倫少入廬山事沙門釋慧遠篤志好學尤明三禮毛詩時會稽朱膺之潁川庾蔚之竝以儒學總監諸生次宗初不受徵辟元嘉中徵至都開館於雞籠山車駕數至後卒於鍾山劉湛字𢎞仁博涉史傳諳前世舊典後以詹事為丹陽尹南齊關康之世居京口篤學以文義稱尤善左氏春秋髙帝為領軍時素好此學送本與康之康之手自㸃定徵之不就張緒爲國子祭酒長於周易言精理奥見宗一時嘗云何平叔所不解易中七事諸卦中所有時義是其一也梁鍾嶸仕齊永明中爲國子生明周易衞將軍王儉領祭酒頗賞接之何佟之字士威少好三禮讀禮論三百餘篇略皆上口仕齊爲國子助教嚴植之字孝源少精解喪服孝經論語及長遍治鄭氏禮周易毛詩左氏春秋仕齊爲廣漢王國右常侍天監四年兼五經博士司馬筠字真素少孤貧好學師沛國劉瓛强力專精深為瓛所器及長博通經術尤明三禮卒於始興内史子夀傳父業明三禮位尚書祠部郎卞華字昭岳㓜孤貧好學年十四召補國子生通周易既長徧治五經與平原明山賔㑹稽賀瑒同業友善天監中爲安城王功曹叅軍兼五經博士韋稜字威直性恬素以書史爲業博物强記當世士咸就質疑沈峻字士嵩博通五經尤長三禮爲國子助教崔靈恩清河武城人也少篤學從師徧通五經尤精三禮三傳仕魏爲太常博士天監中歸梁累遷歩兵校尉兼國子博士劉瓛講月令畢謂學生嚴植之曰江左已來陰陽律數之學廢矣吾今講此曽不得其彷彿學者美其退譲庾於陵清警博學有才思隨齊王子隆爲荆州召爲主簿使與謝眺宗夬抄撰羣書賀琛伯父瑒爲世碩儒授經於琛瑒卒後琛家貧嘗徃還諸暨販粟以自給閑則習業尤精三禮卒光祿大夫徐勉爲尚書博通經史多識前載朝儀國典婚冠吉㓙勉皆預圗議蔡大寳少孤而篤學不倦善屬文初以明經對策第一解褐武陵王國左常侍嘗以書干僕射徐勉大爲勉所賞異令與子游處所有墳籍盡以給之遂博覧羣書學無不綜范遹順陽人散騎常侍廸之弟遹文采劣於廸而經術過之位至中衛東平王長史宗希顔度支尚書如周之子有文學仕至中書舍人希華亦如周之子博通經術爲荆楚儒宗陳龔孟舒治毛詩善談名理梁武世仕至潯陽郡丞元帝在江州遇之甚重躬師事焉沈洙少方雅好學不妄交逰治三禮春秋左氏傳精識强記五經章句諸子史書問無不答初仕梁爲祠部郎中時年二十餘大同中學者多渉獵文史不為章句而洙獨積思經術吳郡朱异㑹稽賀琛甚嘉之及异琛於士林館講制㫖義嘗使洙爲都講鄭灼㓜而聰敏勵志儒學少受業於皇侃梁大通五年釋褐奉朝請禇仲都善周易爲當時之冠篤志研翫得其精㣲梁太清初厯王國侍郎奉朝請俄轉國子助教兼司議郎專講詩易陸詡少習崔靈恩三禮義梁時百濟國表求講禮博士詔令詡行位至尚書祠部郎岑之敬始以經業進而博渉文史雅有詞筆不愧醇儒官至征南府諮議叅軍徐伯陽敏而好學善色養進止有節年十五以文學稱學春秋左氏家有史書所讀者近三千餘卷終於新安王府諮議叅軍沈文阿字國衛父峻以儒學聞於梁世授桂州刺史不行文阿性剛强有膂力少習父業研精章句祖舅太史叔明舅王慧興並通經術而文阿頗傳之又博採先儒異同自成義疏治三禮三傳戚衮少聰慧逰學京都受三禮於國子助教劉文紹一二年中大義略備張譏爲國子助教是時周𢎞正在國學發周易題𢎞正第四弟𢎞直亦在講習譏與𢎞正論議𢎞正乃屈𢎞直危坐厲聲助其申理譏乃正色謂𢎞直曰今日義集辨正名理雖知兄弟急難四公不得有助𢎞直曰僕助君師何爲不可舉座以爲笑樂後魏梁越字𤣥覧新興人少而好學博綜經傳無所不通道武時爲禮經博士梁祚北地人篤志好學厯治諸經尤善公羊春秋鄭氏易嘗以教授有儒者風而無當世之才與幽州别駕平恒有舊又姊先適范陽李氏遂携家人僑居於薊積十餘年雖覊旅貧窘而著述不倦恒時相請屈與論經史平恒字繼叔燕國薊人耽勤讀誦研綜經籍鉤深致逺多所博通厯中書博士祕書丞劉獻之博陵饒陽人少而孤貧雅好詩傳曽受業於渤海程𤣥後遂博觀衆籍時中山張吾貴與獻之齊名海内皆曰儒宗太祖徵典内校書固以疾辭劉蘭武邑人受春秋詩禮於中山王保安蘭讀左氏五日一遍兼通五經後爲國子助教卒封軌爲考功郎中䑓中稱爲儒雅奏請遣四門博士明經學者檢試諸州學生詔從之賈思伯位都官尚書爲侍講思伯少雖明經從官廢業至是更延儒生夜講書山偉爲侍中中書令愛尚文史老而彌篤李都字永穆好學沉静博通經史游肇外寛内剛直耽好經傳手不釋書治周易毛詩尤精於三禮王肅自謂禮易爲長亦未能通其大義也位至散騎常侍都督淮南軍事揚州刺史邢虬字神虎少爲三禮鄭氏學明經有文思舉秀才上第爲中書議郎崔鴻字彦鸞少好讀書博綜經史崔辯字神通博陵安平人學渉經史風儀整峻顯祖徵拜中書博士㪚騎侍郎陽尼字景文北平無終人少好學博通經籍官至幽州平北府長史帶漁陽太守索敞字巨振燉煌人爲劉昞助教專心經籍盡能傳昞之業凉州平入國以儒學見拔爲中書博士宋欽少而好學有儒者之風博綜羣言聲著河右後拜著作郎宋雅師事安邑李紹伯受諸經傳李業興上黨人漁陽鮮于靈馥聚徒教授説左氏傳業興問其大義數條靈馥不能對張湛燉煌人好學能屬文仕沮渠蒙遜爲黄門侍郎凉州平入國崔浩識禮之浩注易叙曰國家西平河右燉煌張湛金城宋欽武威段根三人皆儒者竝有雋才見稱於西州每與余論易余以左氏傳卦解之遂相勸爲注故因退朝之餘暇而爲之解焉其見稱如此劉芳才思深敏特精經義長子懌字祖欣雅有父風頗好文翰位至太常卿徐遵明字子判華隂人師屯留王聰受毛詩尚書禮記後廣平王懷聞而徵焉至而尋退北齊刁柔字子温少好學綜習經史尤留心禮儀天保初除國子博士馮偉字偉節中山安喜人少從李鉉遊學鉉重其聰敏嘗試問之多所通解尤明禮傳後趙郡王將舉充秀才固辭不就邢峙字士峻河間鄚人少好學耽翫墳典逰學燕趙之間通三禮左氏春秋天保初郡舉孝亷授四門博士馬敬德河間人少好儒術負笈隨大儒徐遵明學詩禮略通大義而不能精遂留意於春秋沉思研求晝夜不倦教授於燕趙生徒隨者甚衆州將送至都請試經業授國子助教遷博士孫靈暉明敏有器度得孫惠蔚手錄章疏研精尋問更求師友三禮三傳皆通宗㫖舉兾州秀才射策髙第累至國子博士授南陽王經府諮議叅軍子萬夀聰識機警博渉羣書禮傳俱通大義李鉉字寳鼎教授鄉里生徒嘗至數百燕趙間能言經者多出其門劉軌思渤海人説詩甚精少事同郡劉敬和敬和事同郡程歸則故其鄉曲多爲詩者軌思天統中任國子博士平鍳字明逹燕趙薊人父勝安州刺史鍳少聰敏頗有志力受學於徐遵明不爲章句鮑季祥渤海人甚明禮其離文析句自然大略可解兼通左氏春秋天統中卒於太學博士劉偉好學善三禮吉㓙儀制尤所留心位至睢州刺史後周樂遜字遵賢魏正光中聞碩儒徐遵明領徒趙魏乃就受孝經喪服論語詩書禮易左氏春秋大義厯太學助教博士杜叔毗字子弼㐮陽人勵精好學尤善左氏春秋仕梁為宜豐侯蕭循府中直兵參軍韓裒字𢎞業少有志好學而不守章句其師怪而問之對曰文字之間嘗奉訓誘引至於商校異同請從所好師因此大竒之及長渉獵經史深沉有逺略沈重字德厚吳興武康人專心儒學從師不逺千里遂博覧羣書尤明詩禮及左氏春秋梁大通三年起家王國常侍厯國子助教五經博士竇熾少從范陽祁忻受毛詩左氏春秋略通大義位至太傅樊深字文深弱冠好學負書從師於三河講習五經晝夜不倦太祖置學東館教誨諸將子弟以深爲博士六官建拜太學助教遷博士庾信尤善春秋左氏傳栁虬字仲蟠年十三便專精好學時貴逰子弟就學者竝車服華盛惟虬不事容飾遍受五經略通大義後爲車騎大將軍儀同三司姚僧坦初仕梁爲湘東王府中記室叅軍僧坦好文史不留意於章句時商略今古甚爲學者所稱隋栁䛒字顧言少聰敏解屬文好讀書所覧將萬卷仕梁釋褐著作佐郎杜䑓卿字少山博陵曲陽人性儒素每以雅道自居及周武帝平齊歸于鄉里以禮記春秋教授子弟後仕至著作郎房暉逺字崇儒常山真定人世傳儒學暉逺㓜有志行治三禮春秋三傳詩書周易北齊南陽王綽爲定州刺史召爲博士周武帝平齊搜訪儒俊暉逺首膺辟命授少學下士及髙祖受禪太常卿牛𢎞每稱爲五經庫吏部尚書韋世康薦之遷太學博士辛彦之隴西狄道人九歲而孤不交非類博渉經史與天水牛𢎞同志好學周太祖見而器之引爲中外府禮曹開皇初爲國子祭酒元善河南雒陽人少隨父至江南性好學遂通渉五經尤明左氏傳官至國子祭酒蕭該梁鄱陽王恢之孫性篤學詩書春秋禮記竝通大義尤精漢書甚爲貴游所禮開皇初拜國子博士馬光字榮伯武安人少好學從師數十年晝夜不息尤明三禮爲儒者所宗開皇初髙祖徵山東義學之士光與張仲譲孔籠竇士榮張黒奴劉祖仁等俱至竝授太學博士時人號爲六儒然皆鄙野無儀範朝廷不之貴也山東三禮學者自熊安生後唯宗光一人楊伯丑好讀易隠於華山開皇初被徵入朝國子祭酒何妥嘗詣之論易聞妥之言悠爾而笑曰何用鄭𤣥王弼之言乎乆之㣲有辯答其所説辭義皆異先儒之㫖而思理𤣥妙論者以爲天然獨得非常人所及也劉臻爲儀同三司左僕射精於兩漢書時人稱爲漢聖魏澹世以文學自業年十五而孤專精好學博渉經史善屬文詞采贍逸齊博陵王濟聞其名引爲記室張文詡河東人父琚開皇中爲洹水令以清正聞名有書數千卷教訓子姪皆以明經自逹文詡博覧文籍特精三禮其周易詩書及春秋三傳竝皆通習毎好鄭𤣥注解以爲通博其諸儒異説亦皆詳究焉髙祖引致天下名儒碩學之士其房暉逺張仲譲孔籠之徒竝延之於博士之位文詡時游於太學暉逺等莫不推伏之學内翕然咸共宗仰劉焯字士元信都昌亭人武强交津橋劉智海家素多墳籍焯就之讀書向經十載遂以儒學知名爲州博士時河間人劉炫聰明博學名亞於焯故時人稱二劉焉論者以爲數百年已來博學通儒無能出其右者位至太學博士張羨初仕後周爲司成中大夫典國史周代公卿類多武將唯羨以素業自通甚爲當時所重禇輝字髙明吳郡人以三禮學稱於江南煬帝時徵天下儒術之士悉集内史省相次講論輝博辯時無能屈者繇是擢爲太學博士包愷字和樂東海人其兄愉明五經愷悉傳其業又從王仲通受史記漢書尤稱精究大業中爲國子助教杜正𤣥字慎徽其先本京兆人八世祖曼爲石趙從事中郎因家於鄴自曼至正𤣥世以文學相授王孝籍平原人少好學博覧羣言遍治五經頗有文翰與河間劉炫同志友善顧彪字仲文明尚書春秋大業中爲秘書學士唐徐文逺雒州偃師人博覧五經尤精春秋左氏傳後周時有大儒沈重講于太學聽者嘗千餘人文逺就質問數日便去或問曰何辭去之速答曰觀其所説悉是紙上語耳僕皆先已誦之至於奥賾之境此君飜似未見有以其言告重者重與論義十餘反重甚歎服之馬嘉運隋末逰於劒南以講授爲務蜀士多賴其成益者貞觀初徵爲越王東閣祭酒頃之自免居於白鹿山四方受業者嘗數百十人陸朗字德明吳郡人初受學於周𢎞正善言𤣥理仕陳爲國子助教時年尚少而與博士張機齊名武德中爲秦府學士補太學博士蓋文達信都人㓜聰敏好讀書受業於同郡劉焯博渉經史尤明三傳性方雅美鬚貌見之者稱有君子之風時冀州刺史竇抗頗好文義乃廣集儒生令相難擊其大儒劉炫劉軌思等咸在講座文達與同郡孔頴達劉彦衡皆預焉既論難文達抗音而請皆出其意表抗大竒之因問曰蓋生就誰受學焯從坐起曰此生岐嶷出自天然以多問寡焯爲師首抗曰可謂氷生于水也蓋文懿爲秘書博士嘗開講發毛詩題公卿咸萃更相問難文懿發揚風雅甚得詩人之致亦以儒業被知章句頗優而儀範不逮文達官至國子博士時稱二蓋孔頴逹信都人初受業於同郡劉焯然焯號爲通儒門人甚衆初不之禮頴逹察焯不能出己之右於是請質凝滯皆出其意表焯改容敬之頴逹因辭歸焯固留不可還家以教授爲務朱子奢蘇州吳人少從鄉人顧彪習春秋左氏傳後更觀子史善屬文隋末爲秘書學士武德四年隨杜伏威入朝授國子助教張士衡瀛州樂壽人長從劉軌思受毛詩周禮又從熊安生及劉焯受禮記皆精究大義後遍講五經尤工三禮貞觀中爲崇賢館學士蕭德言博渉經史尤精春秋左氏傳好屬文毎欲開五經必盥濯束帶危坐終日如是貞觀中爲𢎞文館學士歐陽詢潭州臨湘人讀書數行俱下博覧經史尤精三雅谷那律魏州昌樂人貞觀中累補國子博士黄門侍郎禇遂良毎稱爲九經庫許叔牙潤州句容人尤明詩禮及史記漢書貞觀中累授晉王太學太常博士𢎞文館學士子儒亦傳父業秦景通常州晉陵人與弟暐尤精漢書當時習漢書者皆宗師之嘗稱景通爲大秦君暐爲小秦君若不預其兄弟指授則謂之不經師匠無足採也岑文本字景仁南陽棘陽人性沈敏有姿儀博考經史多所貫綜髙子貢和州厯陽人弱冠逰太學遍渉六經尤精史記厯秘書正字𢎞文館直學士王紹宗少勤學遍覧經史尤工草𨽻家貧甞傭力冩佛經以自給則天拜太子文學轉秘書少監紹宗性澹雅以儒素見稱當時朝廷之士咸敬慕之祝欽明雍州始平人少通五經兼渉衆史舉明經長安元年累遷太子率更令兼𢎞文館學士尹知章絳州翼城人少勤學嘗夢神人以大鑿開其心以藥内之自是日益開朗盡通諸經精義未幾而諸師友北面受業焉長安中駙馬都尉武攸曁重其經學奏授其府文學郭山惲蒲州河東人少通三禮景龍中累遷國子司業裴炎少補𢎞文生在館垂十年尤曉春秋左氏傳及漢書後以明經擢第張柬之字孟將襄陽人少補太學生渉獵經史尤好三禮國子祭酒令狐德棻重之禇無量㓜孤貧勵志好學及長精三禮及史記舉明經厯國子博士司業祭酒馬懷素潤州丹徒人博覧經書善屬文舉進士文學優贍科厯秘書監昭文館學士劉子𤣥夲名知機與兄知柔俱以詞學知名代傳儒學之業子𤣥子貺博通經史徐堅少好學遍覧經史爲東都留守王方慶判官方慶善三禮之學吳兢汴州浚儀人勵志强學博通經史官至常山王傅李泌字長源周八柱國弼之裔也聰敏好學博渉經史精究易象及論語大義馬位京兆人少有經學大厯初登五經秀才科建中末又登博學三史科累遷皇太子及諸王侍讀鄭餘慶貞元中同平章事餘慶通究六經深㫖奏對之際多以古義傅之張薦字孝舉祖文成博學工文詞性好談諧七登文學科薦聰明强記厯代史傳無不貫通爲太師顔真卿所稱賞遂知名路泌少好學通五經尤嗜詩易左氏春秋能諷其章句皆究深㫖子隨以通經累遷司勲郎中穆宗時與韋處厚同入翰林爲侍講學士陸質吳郡人有經學尤深於春秋少師趙匡匡師啖助助匡皆為奥儒質頗傳其學由是知名許孟容京兆長安人父鳴謙究通易象官至撫州刺史孟容少以文詞知名舉進士後究王氏易登科韋處厚通五經博覧史籍而文思贍速舉進士應賢良方正擢居異等鄭裀字文明少有竒志好學善屬文大厯中有儒學髙明如張叅蔣防楊綰常衮皆知重之宇文籍字夏龜少好學尤通春秋性簡澹寡合躭玩經史精於著作崔植潜心經史尤精易象後爲中書侍郎平章事劉賁字去華博學善屬文尤精史左氏春秋殷侑爲兒童力學不念家産長能通經以講習自娛五經登科第厯代㳂革擢爲太常博士李德裕字文饒㓜有壯志苦心力學尤精西漢書左氏春秋梁敬翔好讀書善禮學尤長刀筆應用敏㨗後唐藥縱之太原人少學爲儒依河東馬歩軍都虞侯楊守業有書數千卷太原俗尚武儒者少故縱之以儒爲業攝代州衙推明宗刺代以依之官至曹州刺史馬縞少嗜儒書頗通經義五禮五樂嘗所經心而著述文章亦粗諧流輩位終國子博士張憲字允中晉陽人世以軍功爲衙校憲始童丱喜儒學而勵志横經不捨晝夜太原地雄邊服人多尚武恥於肄業唯憲與里人藥縱之精力逰學弱冠盡通諸經尤精左傳後爲太原尹北京副留守周司徒翊少好讀書通五經大義官至太常卿致仕册府元龜卷七百六十八
