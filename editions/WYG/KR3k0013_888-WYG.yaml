body:
  text: 冊府元龜卷八百八十八宋王欽若等撰總録部㳺說第三蘓代秦之弟秦死代乃求見燕王欲襲故事曰臣東周之鄙人也竊聞大王義甚髙鄙人不敏釋鉏耨而干大王至於邯郸所見者絀於所聞於東周臣竊負其志及至燕廷觀王之羣臣下吏王天下之明主也燕王曰子所謂明主者何如也對曰臣聞明主務聞其過不欲聞其善臣請謁王之過夫齊趙者燕之仇讐也楚魏者燕之援國也今王奉仇讐以伐援國非所以利燕也王自慮之此則計過無以聞者非忠臣也王曰夫齊者固寡人之讐所欲伐也直患國敝力不足也子能以燕伐齊則寡人舉國委子對曰凡天下戰國七燕處弱焉獨戰則不能有所附則無不重南附楚楚重西附秦秦重中附韓魏韓魏重且茍所附之國重此必使王重矣今夫齊長主而自用也南攻楚五年畜聚竭西困秦三年士卒罷敝北與燕人戰覆三軍得二將齊覆三軍而燕失二将然而以其餘兵南靣舉五千乗之大宋而包十二諸侯此其君欲得其民力竭惡足取乎且臣聞之數戰則民勞乆師則兵敝矣燕王曰吾聞齊有清濟濁河可以為固長城鉅防濟北盧縣有防門又有長城東至海足以為塞誠有之乎對曰天時不與雖有清濟濁河惡足以為固民力罷敝雖有長城鉅防惡足以為塞且異日濟西不師所以備趙也河北不師所以備燕也今濟西河北盡已役矣封内敝矣夫驕君必好利而亡國之臣必貪於財王誠能無羞寵子母弟以為質寳珠玉帛以事左右彼将有德燕而輕亡宋則齊可亡已燕王曰吾終以子受命於天矣燕乃使一子質於齊代為侍齊湣王十二年攻魏魏楚圍雍氏在陽翟屬韓秦敗屈丐蘓代謂田軫曰臣願有謁於公其為事甚完使楚利公成為福不成以為禍今者臣立於門客有言曰魏王謂韓馮張儀曰韓馮公仲侈也煑棗将拔在濟陰寃亭齊兵又進子来救寡人則可矣不救寡人寡人弗能拔此特轉辭也秦韓之兵毋東旬餘則魏氏轉韓從秦秦逐張儀交臂而事齊楚此公之事成也田軫曰奈何使無東對曰韓馮之救魏之辭必不謂韓王曰馮以為魏必曰馮将以秦韓之兵東却齊宋馮因摶摶猶兵合制領之謂也三國之兵乘屈丐之弊南割於楚故地必盡得之矣張儀救魏之辭必不謂秦王曰儀以為魏必曰儀且以秦韓之兵東距齊宋儀将摶三國之兵乘屈丐之弊南割於楚名存亡國實得三川而歸此王業也公令楚王與韓氏地使秦制和謂秦王曰請與韓地而王施以三川韓氏之兵不用而得地於楚韓馮之東兵之辭且謂之何曰秦兵不用而得三川伐楚韓以窘魏魏氏不敢東是孤齊也張儀之東兵之辭且謂何曰秦韓欲地而兵有案聲威發於魏氏之欲不失齊楚者有資矣魏氏轉秦韓爭事齊楚楚王欲而無與地楚王欲得魏来事而不欲與韓地也公令秦韓之兵不用而得地有一大德也秦韓之王刼於韓馮張儀而東兵以狥服魏公甞執左劵以責於秦韓此其善於公而惡張子多資矣湣王二十六年以孟嘗君為相任政孟嘗君怨秦将以齊為韓魏攻楚因與韓魏攻秦韓魏齊共擊秦軍於凾谷而借兵食於西周蘓代為西周謂曰君以齊為韓魏攻楚九年取宛葉以北彊韓魏今復攻秦以益之韓魏南無楚憂西無秦患則齊危矣韓魏必輕齊畏秦臣為君危之君不如令弊邑陰合於秦而君無攻又無借兵食君臨函谷而無攻令弊邑以君之情謂秦昭王曰薛公必不破秦以彊韓魏所以進兵者欲王令楚割東國以與齊而秦出楚懐王以為和君令弊邑以此惠秦秦得無破而以楚之東國自免也秦必欲之楚王得出必徳齊齊得東國益彊而薛世世無患矣秦不大弱而處三晉之西三晉必重齊薛公曰善因令韓魏賀秦使三國無攻而不借兵食於西周矣孟嘗君既謝病歸老於薛其後秦亡将吕禮相齊欲困蘓代代乃謂孟嘗君曰周最於齊至厚也而齊王逐之而聽親弗姓親名弗相吕禮者欲取秦也齊秦合則親弗與吕禮重矣有用齊秦必輕君君不如急北兵趨趙以和秦魏收周最以厚行且反齊王之信又禁天下之變齊無秦則天下集齊親弗必走則齊王孰與為其國也於是孟嘗君從其計而吕禮嫉害於孟嘗君孟嘗君懼乃遺秦相穣侯魏冉書曰吾聞秦欲以吕禮收齊齊天下之彊國也子必輕矣齊秦相取以臨三晉吕禮必并相矣是子通齊以重吕禮也若齊免於天下之兵其讐子必深矣子不如勸秦王伐齊齊破吾請以所得封子齊破秦畏晉之彊秦必重子以取晋晉國弊於齊而畏秦晉必重子以取秦是子破齊以為功挟晉以為重是子破齊定封秦晋交重子若齊不破吕禮復用子必大窮於是穰侯言於秦昭王伐齊而吕禮亡湣王三十八年伐宋秦昭王怒曰吾愛宋與愛新城陽晋同韓聶與吾友也而攻吾所愛何也蘇代為齊謂秦王曰韓聶之攻宋所以為王也齊彊輔之以宋楚魏必恐恐必西事秦是王不煩一兵不傷一士無事而割安邑也此韓聶之所禱於王也秦王曰吾患齊之難知一從一横其說何也對曰天下國令齊可知乎齊以攻宋其知事秦以萬乘之國自輔不西事秦則宋治不安中國白頭㳺敖之士皆積智欲離齊秦之交伏式結軼西馳者未有一人言善齊者也伏式東馳者未有一人言善秦者也何則皆不欲齊秦之合也何晉楚之智而齊秦之愚也晋楚合必議齊秦齊秦合必圖晋楚請以此決事秦王曰諾於是齊遂伐宋先是燕相子之與蘓代婚而欲得燕權乃使蘓代侍質子於齊齊使代報燕燕王噲問曰齊王其霸乎曰不能曰何也曰不信其臣於是燕王専任子之已而譲位燕大亂齊伐燕殺王噲子之燕立昭王而蘓代歸齊齊善待之蘓代過魏魏為燕執代齊使人謂魏王曰齊請以宋地封涇陽君秦必不受秦非不利有齊而得宋地也不信齊王與蘓子也今齊魏不和如此其甚則齊不欺秦秦信齊齊秦合涇陽君有宋地非魏之利也故王不如舍蘓子秦必疑齊而不信蘓子矣齊秦不合天下無變伐齊之形成矣於是出蘓代代之宋宋善待之齊伐宋宋急蘓代乃遺燕昭王書曰夫列在萬乘而寄質於齊名卑而權輕奉萬乘助齊伐宋民勞而實費夫破宋殘楚淮北肥大齊讐彊而國害此三者皆國之大敗也然且王行之者将已取信於齊也齊加不信於王而忌燕愈甚是王之計過矣夫以宋加之淮北彊萬乗之國也而齊并之是益一齊也北夷方七百里加之以魯衛彊萬乗之國也而齊并之是益二齊也夫一齊之彊燕猶狼顧而不能支今以三齊臨燕其禍必大矣雖然智者舉事因禍為福轉敗為功齊紫敗素也取敗素染以為紫而賈十倍越王勾踐棲於會嵇復滅彊呉而霸天下此皆因禍為福轉敗為功者也今王若欲因禍為福轉敗為功則莫若挑霸齊而尊之使使盟於周室焚秦符曰其大上計破秦其次必長賓之秦挟賔以待破秦王必患之秦五世伐諸侯今為齊下秦王之志茍得窮齊不憚以國為功然則王何不使辯士以此言説秦王曰燕趙破宋肥齊尊之為之下者燕趙非利之也燕趙不利而勢為之者以不信秦王也然則何不使可信者接収燕趙令涇陽君髙陵君先於燕趙秦有變因以為質則燕趙信秦秦為西帝燕為北帝趙為中帝立三帝以令於天下韓魏不聴則秦伐之齊不聴則燕趙伐之天下孰敢不聴天下服聴因驅韓魏以伐齊曰必反宋地歸楚淮北反宋地歸楚淮北趙燕之所利也並立三帝燕趙之所願也夫實得所利尊得所願燕趙棄齊如脱躧矣今不收燕趙齊而霸必成諸侯賛齊而王不從是國伐也諸侯賛齊而王從之是名卑也今收燕趙國安而名尊不收燕趙國危而名卑夫去尊安而取危卑智者不為也秦王聞若說必若刺心然則王何不使辯士以此苦言說秦秦必取齊必伐矣夫取秦厚交也伐齊正利也尊厚交務正利聖主之事也燕昭王善其書曰先人嘗有德蘓氏子之亂而蘓氏去燕燕欲報仇於齊非蘓氏莫可乃召蘓代復善待之與謀伐齊竟破齊湣王出走乆之秦召燕王燕王欲往蘓代約燕王曰楚得枳巴郡有枳縣而國亡燕昭王三十三年秦㧞楚鄢齊得宋而國亡齊楚不得以有枳宋而事秦者何也則有功者秦之深讐也秦取天下非行義也暴也秦之行暴正告天下告楚曰蜀地之甲乗船浮於汶乘夏水而下江五日而至郢漢中之甲乘船出於巴乘夏水而下漢四日而至五渚戰國䇿曰秦與荆人戰大破荆襲郢取洞庭五渚然則五渚在洞庭寡人積甲宛東下隨智者不及謀勇士不及怒寡人如射隼矣王乃欲待天下之攻函谷不亦逺乎楚王為是故十七年事秦秦正告韓曰我起乎少曲一日而斷大行我起乎宜陽而觸平陽二日而莫不盡繇我離兩周而觸鄭五日而國舉韓氏以為然故事秦秦正告魏曰我舉安邑塞女㦸韓氏大原卷我下軹道南陽封冀覇陵有軹道亭河東皮氏有冀亭也包兩周下河東成臯也乘夏水浮輕舟彊弩在前錟戈在後决滎口魏無大梁决白馬之口魏無外黄濟陽决宿胥之口紀年曰魏救山塞集胥口魏無虚頓丘秦始皇五年取魏酸棗燕虚長平陸攻則撃河内水攻則滅大梁魏氏以為然故事秦秦欲攻安邑恐齊救之則以宋委於齊曰宋王無道為木人以寫寡人射其靣寡人地絶兵逺不能攻也王茍能破宋有之寡人如自得之已得安邑塞女㦸因以破宋為齊罪秦欲攻韓恐天下救之則以齊委於天下曰齊王四與寡人約四欺寡人必率天下以欺寡人者三有齊無秦有秦無齊必伐之必亡之已得宜陽少曲致藺石因以破齊為天下罪秦欲攻魏重楚則以南陽委于楚曰寡人固與韓且絶矣殘均陵塞鄳阨鄳江夏鄳縣均一作灼茍利於楚寡人如自有之魏棄與國而合於秦因以塞鄳阨為楚罪兵困於林中河南苑陵有林鄉重燕趙以膠東委於燕以濟西委於趙趙得講於魏至公子延因犀首屬行而攻趙兵傷于譙石遇敗于陽馬而重魏則以葉蔡委於魏已得講於趙則劫魏不為割困則使太后弟穣侯為和嬴則兼欺舅與母適燕者曰以膠東適趙者曰以濟西適魏者曰以葉蔡適楚者曰以塞鄳阨適齊者曰以宋此必令言如循環用兵如刺蜚母不能制舅不能約龍賈之戰魏㐮王五年秦敗我龍賈軍岸門之戰韓宣恵王十九年秦大破我岸門封陵之戰魏哀王十六年秦敗我封陵髙商之戰此戰事不見趙荘之戰趙肅侯二十二年趙荘與秦戰敗秦殺趙荘河西秦之所殺三晋之民數百萬今其生者皆死秦之孤也西河之外上雒之地三川晉國之禍三晉之半秦禍如此其大也而燕趙之秦者皆以爭事秦說其主此臣之所大患也燕昭王不行蘓代復重於燕燕使約諸侯從秦如蘓秦時或從或不而天下繇此宗蘓代之從約韓襄王十二年韓太子嬰死公子咎公子蟣虱爭為太子時蟣虱質於楚蘓代謂韓咎曰蟣虱亡在楚楚王欲内之甚今楚兵十餘萬在方城之外公何不令楚王築萬室之都雍氏之旁在陽翟韓必起兵以救之公必将矣公因以韓楚之兵奉蟣虱而内之其聼公必矣必以楚韓封公也韓咎從其計楚圍雍氏韓求救於秦秦未為發使公孫昧入韓公仲曰子以秦為且救韓乎對曰秦王之言曰請道南鄭藍田出兵于楚以待公殆不合矣公仲曰子以為果乎對曰秦王必祖張儀之故智祖者宗之習之之謂也故智猶前時計謀也楚威王攻梁也張儀謂秦王曰與楚攻魏魏折而入于楚韓固其與國也是孤秦也不如出兵以勁之魏楚大戰秦取西河之外以歸今其拔宜陽言與韓其實陰善楚公恃秦而勁必輕與楚戰楚陰得秦之不用也必易與公相支也公戰而勝楚遂與公乘楚易三川而歸公戰不勝楚楚塞三川守之公不能救也竊為公患之司馬庚一作康三反於郢甘茂與昭魚楚相國遇於商於其言收璽實類有約也公仲恐曰然則奈何曰公必先韓而後秦先身而後張儀公不如亟以國合於齊楚齊楚必委國于公公之所惡者張儀也其實猶不無秦也於是楚觧雍氏圍甘茂傳曰楚懐王以兵圍韓雍氏韓使公仲告急於秦秦昭王新立不肯救甘茂為韓言之乃下師於殽以救韓也又云周赧王十五年韓㐮王十二年秦撃楚斬首二萬敗楚㐮城殺景缺周本紀赧王八年之後云楚圍雍氏此當韓㐮王十二年魏哀王十九年紀年于此亦說椘入雍氏楚人敗然其時張儀已死十年矣蘓代又謂秦太后弟􅇗戎號新城君曰公叔伯嬰恐秦楚之内蟣虱也公何不為韓求質于楚楚王聽入質子於韓則公叔伯嬰知秦楚之不以蟣虱為事必以韓合于秦楚挟韓以窘魏魏氏不敢合於齊是齊孤也公又為秦求質子於楚楚不聽怨結於韓韓挟齊魏以盻楚楚必重公公挟秦楚之重以積德於韓公叔伯嬰必以國待公於是蟣虱竟不得歸韓韓立咎為太子魏田需死楚昭魚謂蘓代曰田需死吾恐張儀薛公犀首有一人相魏者也代曰然相者欲誰而君便之也昭魚曰吾欲太子之自相也代曰請為君北必相之昭魚曰奈何代曰君其為梁王代請説君昭魚曰奈何對曰代也從楚来昭魚甚憂代曰君何憂曰田需死吾恐張儀薛公犀首有一人相魏者也代曰勿憂也梁王長主也必不相張儀張儀相魏必右秦而左魏薛公相魏必右齊而左魏犀首相魏必右韓而左魏梁王長主也必不使相也代曰莫如太子之自相太子之自相是三人皆以太子為非常相也皆将務以其國事魏而欲丞相之璽以魏之强而三萬乘之國輔之魏必安矣故曰不如太子之自相也遂北見梁王以此語告之太子果自相秦召魏相信安君信安君不欲徃蘓代為說秦王曰臣聞之忠不必黨黨不必忠今臣願大王陳臣之愚意恐其不忠于下吏自使有要領之罪願大王察之今大王令人執事於魏以見其交臣恐魏交之益疑也将以塞趙也臣又恐趙之益勁也夫魏王之愛習魏信也甚矣其智能而任用之也厚矣其畏惡嚴尊秦也明矣今王之使人入魏而不用王之使人入魏無益也若用魏必舍所愛習而用所惡此魏王之所不安也夫舍萬乘之事而退此魏信之所難行也夫令人君處所不安令人之相行所不能以此為親則難乆臣故恐魏交之益疑也且魏信舍事則趙之謀者必曰舍於秦秦必令其所爱信者用趙是趙存而我亡也趙安而我危也則上有野戰之氣下有堅守之心臣故恐趙之益勁也大王欲完魏之交而使趙小心乎不如用魏信而尊之以名魏信事王國安而名尊離王國危而權輕然則魏信之事王也上所以為其主者忠矣下所以自為者厚矣彼其事主必完矣趙之用事者必曰魏氏之名族不高於我土地之實不厚於我魏信以韓魏事秦秦甚善之國得安而身取尊今我搆難於秦兵為招質國處危削之形非得計也結怨於外主患于中身處死亡之地非完事也彼将傷其前事而悔其過行冀其利必多割地以降下王則是大王下垂拱多割地以為利重堯舜之所求而不能得也臣願大王察之周赧王八年秦攻宜陽楚救之而楚以周為秦故将伐之蘓代為周說楚王曰何以周為秦之禍也言周之為秦甚於楚者欲令周入秦也故謂周為秦也周知其不可觧必入于秦此為秦取周之精者也為王計者周於秦因善之不於秦亦言善之以疏之於秦周絶於秦必入於郢矣赧王謂成君楚圍雍氏陽翟雍氏城也秦兵入西周西周令成君辯説秦求救當是說此事而脫誤也韓徴甲與粟於東周東周君恐召蘓代而告之代曰君何患於是臣能使韓毋徴甲與粟於周又能為君得高都今河南新城縣高都城也代見韓相國曰相國秦官韓亦有相國然則諸國其倣秦者也楚圍雍氏期三月也今五月不能拔是楚病也今相國乃徴甲與粟於周是告楚病也韓相國曰善使者已行矣代曰何不與周高都韓相國大怒曰吾毋徴甲與粟於周亦已多矣何故與周高都也代曰與周高都是周折而入于韓也秦聞之必大怒焚周節不通周使是以弊高都得完周也曷為不與相國曰善果與周高都明年秦使樗里子甘茂伐魏皮氏向夀者宣太后外族也而與昭王少相長故任用向夀如楚如一作和楚聞秦之貴向夀而厚事向夀向壽為秦守宜陽將以伐韓韓公仲使蘓代謂向壽曰困禽覆車譬禽獸得困急猶能抵觸傾覆人車公破韓辱公仲公仲收國復事秦自以為必可以封今公與楚解口地封小令尹以杜陽秦楚合復攻韓韓必亡韓亡公仲且躬率其私徒以閼於秦願公熟慮之也向夀曰吾合秦楚非以當韓也子為夀謁之公仲曰秦韓之交可合也蘓代對曰願有謁於公人曰貴其所以貴者貴王之愛習公也不如公孫奭其智能公也不如甘茂今二人者皆不得親於秦事而公獨與王主㫁於國者何彼有以失之也公孫奭黨於韓而甘茂黨於魏故王不信也今秦楚爭彊而公黨於楚是與公孫奭甘茂同道也公何以異之人皆言楚之善變也而公必亡之是自為責也公不如與王謀其變也善韓以備楚如此則無患矣韓氏必先以國從公孫奭而後委國於甘茂韓公之讐也今公言善韓以備楚是外舉不辟讐也向夀曰然吾甚欲與韓合對曰甘茂許公仲以武遂秦昭王元年予韓武遂反宜陽之民今公徒収之甚難向夀曰然則奈何武遂終不可得也對曰公奚不以秦為韓求潁川于楚此韓之寄地也公求而得之是令行于楚而以其地徳韓也公求而不得是韓楚之怨不解而交走秦也秦楚爭强而公徐過楚過一作適以收韓此利于秦向夀曰奈何對曰此善事也甘茂欲以魏耴齊公孫奭欲以韓耴齊今公耴宜陽以為功収楚韓以安之而誅齊魏之罪是以公孫奭甘茂無事也甘茂竟言秦昭王以武遂復歸之韓向夀公孫奭爭之不能得向夀公孫奭繇此怨䜛甘茂茂懼輟伐魏蒲阪亡去昭王元年擊皮氏未拔去秦樗里子與魏講罷兵甘茂之亡秦奔齊逢蘓代代為齊使于秦甘茂曰臣得罪秦懼而遯逃無所容跡臣聞貧人女與富人女會績貧人女曰我無以買燭而子之燭光幸有餘子可分我餘光無損子明而得一斯便焉今臣困而君方使秦而當路矣茂之妻子在焉願君以餘光振之蘓代許諾遂致使于秦已因説秦王曰甘茂非常士也其居于秦累世重矣自殽塞及至鬼谷在陽城其地形險易皆明知之彼以齊約韓魏反以圖秦非秦之利也秦王曰然則奈何蘓代曰王不若重其贄厚其祿以迎之使彼来則置之鬼谷終身勿出秦王曰善即賜之上卿以相印迎之於齊甘茂不往蘓代謂齊湣王曰夫甘茂賢人也今秦賜之上卿以相印迎之甘茂得王之賜好為王臣故辭而不往今王何以禮之齊王曰善即位之上卿而處之秦因復甘茂之家以市于齊秦穣侯益趙以兵伐齊臣欽若等案史記世家㐮王十四年秦撃我剛夀齊㐮王懼使蘓代為齊陰遺穣侯書曰臣聞往来者言曰秦将益趙甲四萬以伐齊臣竊必之弊邑之王曰秦王明而熟於計穣侯智而習於事必不益趙甲四萬以伐齊是何也夫三晉之相與也秦之深讐也百相背也百相欺也不為不信不為無行今破齊以肥趙趙秦之深讐不利於秦此一也秦之謀者必曰破齊弊晋楚而後制晉楚之勝夫齊罷國也以天下攻齊如以千鈞之弩决潰癰也必死安能弊晋楚此二也秦少出兵則晋楚不信也多出兵則晋楚為制於秦齊恐不走秦必走晉楚此三也秦割齊以啖晉楚晉楚案之以兵秦反受敵此四也是晉楚以秦謀齊以齊謀秦也何晋楚之智而秦齊之愚此五也故得安邑以善事之亦必無患矣秦有安邑韓氏必無上黨矣取天下之腸胃與出兵而懼其不反也孰利臣故曰秦王明而熟於計穣侯智而習於事必不益趙甲四萬以伐齊矣於是穣侯不行引兵而歸秦昭王四十八年十月秦復定上黨郡秦分軍為二王齕攻皮牢拔之司馬梗定太原韓趙恐使蘓代厚幣説秦相應侯曰武安君擒馬服子乎曰然又曰即圍邯郸乎曰然曰趙亡則秦王王矣武安君為三公武安君所為秦戰勝攻耴者七十餘城南定鄢郢漢中北擒趙括之軍雖周召吕望之功不能益於此矣今趙亡秦王則武安君必為三公君能為之下乎雖欲無為之下固不得已矣秦嘗攻韓圍邢丘困上黨上黨之民皆反為趙天下不樂為秦民乆矣今亡趙北地入燕東地入齊南地入韓魏則君之所得民亡㡬何人故不如因而割之無以為武安君功也於是應侯言於秦王曰秦兵勞請許韓趙之割地以和且休士􅌰王聽之割韓垣雍趙六城以和正月皆罷兵武安君聞之與應侯有隙十六年秦與趙數撃齊齊人患之厲為齊遺趙王書曰臣聞古之賢君其德行非布於海内也敎順非洽於民人也祭祀時享非數嘗於鬼神也甘露降時雨至年糓豐熟民不疾疫衆人善之然則賢主圗之今足下之賢行功力非數加於秦也怨毒積怒非素深於齊也秦趙與國以彊徴兵於韓秦誠愛趙乎其實憎齊乎物之甚者賢主察之秦非愛趙而憎齊也欲亡韓而吞二周故以齊餤天下恐事之不合故出兵以劫魏趙恐天下畏己也故出質以為信恐天下亟反也故徴兵於韓以威之聲以德與國而實伐空韓臣以秦計為必出於此夫物固有勢異而患同者楚乆伐而中山亡今齊乆伐而韓必亡破齊王與六國分其利也亡韓秦獨擅之收二周西耴祭器秦獨私之賦田計功王之獲利孰與秦多説士之計曰韓亡三川魏亡晉國市朝未變而禍已及矣燕盡齊之北地去沙丘鉅鹿歛三百里韓之上黨去邯郸百里燕秦謀王之河山間三百里而通矣秦之上郡近挺闗至於榆中者千五百里秦以三郡攻王之上黨羊腸之西句注之南非王有矣踰句注斬常山而守之三百里而通於燕代馬胡犬不東下崑山之玉不出此三寳者亦非王有已王乆伐齊從彊秦攻韓其禍必至於此願王熟慮之且齊之所伐者以事王也天下屬行以謀王也燕秦之約成而兵出有日矣五國三分王之地齊倍五國之約而殉王之患西兵以禁彊秦秦廢帝請服反高平根柔於魏紀年云魏㐮王四年改陽曰河雍向曰高平根柔一作欃柔一作平柔反巠分一作王公先俞於趙爾雅曰西俞雁門是也齊之事王宜為上佼而今乃抵辠臣天下後事王者之不敢自必也願大王熟計之也今王毋與天下攻齊天下必以王為義齊抱社稷而厚事王天下必盡重王義王以天下善秦秦暴王以天下禁之以一世之名寵制於王也於是趙乃輟謝秦不撃齊册府元龜卷八百八十八
