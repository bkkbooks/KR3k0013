body:
  text: 册府元龜卷八十四宋王欽若等撰帝王部赦宥第三唐太宗以武德九年八月甲子即位詔曰惟天為大七政所以授時惟辟奉天三才於是育物故能彌綸宇宙經緯乾坤大庇生靈闡掦洪烈我大唐誕膺嘉運載恊昌期丕受龍圗肇開鳯紀太上皇狥齊作聖睿哲欽眀奄有八荒光澤四表牢籠軒昊跨躡殷周金鏡俯臨玊燭遐被然而至德無宰成功不居髙謝萬邦委兹重噐郊禋曠禮士民翹屬欽惟宗社義存享獻朕以寡昩實膺統緒辭不獲免式纂洪業靈命既臻用升寳位君臨兆庻繼軌百王若渉大川罔知攸濟方資命哲共康治道今紹祚伊始奉答天休思敷惠澤被于黎獻可大赦天下自武德九年八月九日昩爽以前罪無輕重已發覺未發覺繫囚見徒悉從原免武德元年以來責情流配者亦并放還凡厥庻僚進爵一級其五品已上先無爵邑封開國男六品已下各加一轉關内蒲芮虞泰陜鼎六州免二年租調自餘率土普給復一年八十已上各賜米二石綿帛五叚百嵗已上各賜米四石綿帛十段仍加版授以旌尚齒鰥寡孤獨不能自存者量事優恤其有至孝純著逹於郷黨徴詣闕庭厚加褒擢節義之夫貞順之婦州府列上旌表門閭髙年碩學直言正諫所在長官隨狀薦舉亡命山澤挾藏軍噐百日不首復罪如初敢以赦前事告言者以其罪罪之貞觀二年三月庚午詔曰宥過肆眚列聖所以垂風一面三驅至人所以被物故知畫冠化俗義在無刑擊磬求情志存踈網然去聖滋遠淳風漸薄上陵下替獄訟繁興罪名日積於簡書深文亟陳於嘉石自非帝堯臨政臯陶作士觀色聴聲哀矜靡失雖復三章兩造能無寃濫自新改過其道何由朕以虗薄恭膺大寳寅對三靈君臨九服昧旦求衣夜分忘寝履薄乘奔未足為喻兢兢業業懼弗負荷是以詳詢卿宰下及芻蕘務求切直救其不逮推赤心於萬物罄誠言於多士惟以蒼生在念豈矜黄屋之尊嗟四海之未寧慮一物之失所飭躬厲已無忘晷刻率斯道也庻感幽眀思與羣辟俱興至治而世教未康𤣥風尚欝去嵗霖雨既損秋塲今兹旱蝗又傷宿麥萬姓嗷然懸磬已甚此皆朕之不德兆庻何辜将繇視聴弗眀刑罰失度遂使隂陽舛謬氣序乖違矜物罪已載懐憂惕若使年糓豊稔天下乂寧移灾朕身以存萬國是所願也甘心無吝此言之信有同皦日故披露胸臆義在無隠八方率土想見朕心今東作方興而膏澤不䧏仰彼雲漢翹心何已宜布寛大之恩以順雷雨之德可大赦天下四年二月甲寅詔曰天生蒸民樹之司牧莫不仰膺靈命克嗣寳圖用能永享鴻名常為稱首朕君臨八方于今四載夙興夜寐無忘晷刻履薄馭朽思濟黔黎推心至誠庻㡬王道上荷蒼昊之睠下藉股肱之力宇内休平遐邇寧泰率此區域致之仁夀憬彼葷戎為患自昔軒昊以來甞罹㓂暴是以隆周致涇水之師強漢受白登之辱武夫盡力於關塞謀士極慮于廟堂征伐和親無聞上䇿有隋灾亂慿凌轉甚疆場之萌曽無寧嵗朕韜干鑄㦸務在存飬自去嵗迄今䧏欵相繼不勞衞霍之将無待賈晁之畧單于稽首交臂藁街名王面縳歸身夷邸襁負而至前後不絶被髪左袵之鄉狼望龍堆之境蕭條萬里無復王庭唯頡利挺身逃竄林穴天網雲布走伏何所大同之世諒在兹日斯皆上𤣥䧏祐清廟威靈豈朕虗薄所能致此方欲致仁化物宜存寛惠思與萬邦同享斯福可大赦天下自貞觀四年二月十八日昩爽已前罪無輕重自大辟以下繫囚見徒皆赦除之逋負官物三分免一分其謀反大逆妖言惑衆及殺期親以上尊長奴婢部曲反主官人枉法受財不在赦例鰥寡孤獨不能自存者州縣量加賑濟賜天下大酺五日敢以赦前事相告言者以其罪罪之十月壬辰詔曰朕恭膺寳命握圖馭歴屬䘮亂之後承凋弊之餘𢎞宣德化勵精治道遐邇肅清要荒來服聊因暇務觀省民風遵彼岐梁言臻汧渭百年之老俱稱鼓腹五尺之童咸欣擊壤睠言曩昔亟隳此地嵗月踰邁以迄于兹周覧原隰悵然懐舊延問郷黨僚吏猶存事異宛譙情均豊沛民和俗阜上下歡洽宜宣愷澤俾同慶幸可特赦岐隴二州管内自貞觀四年十月一日昩爽已前大辟罪以下悉從原免二州户民無出一年租賦八十以上鰥寡獨疾及舊任二州雜職佐史以上賜物各有差百嵗以上就加優恤行經咸陽始平武功三縣見禁之囚徒罪以上各䧏一等杖罪以下并宜釋放年八十以上及鰥寡篤疾并武功縣舊軍主帥亦加賜物凡此界内名山大川望秩之禮備加牲幣孝子順孫義夫節婦隨事褒顯旌表門閭其賜物之差宜依别勅務從周厚以稱朕意乙卯又詔曰武功舊居與岐隴不異前令减罪未稱朕心其武功一縣曲赦其罪及賜帛免租賦等特宜同岐隴二州五年五月壬午皇太子承乾疾篤請䧏囚徒許之十二月癸丑䧏關内諸州死罪以下八年二月乙巳皇太子承乾加元服丙午䧏死罪以下九年三月壬午詔曰天地播氣垂生育之德皇王御極𢎞覆幬之仁故能財成萬類光宅八表朕祗奉慈訓嗣守鴻業承百王之季末屬四海之凋殘夜興夕惕無忘兆庻克已勤躬思隆政道欲使隂陽順序干戈載戢庻㡬前烈致兹刑措而東山之地頻年不稔水雨為災飢饉相屬蠢爾西戎屢擾邉境事不獲已遂勞兵車良繇誠未動天德不被物興言念此撫已多慙加以澆偽尚繁刑典仍用雖復留心聴㫁眀慎庻獄甞恐縲絏之中含寃靡訴憲網所及弗辜致罪一物有怨責深在余今嵗惟暮春時屬生長宜順天布澤與物更新可大赦天下自貞觀九年三月十六日昩爽以前大辟罪已下皆赦除之其常赦不免者不在赦例鰥寡惸獨不能自存者所在官司量加賑恤十一年三月幸雒陽宫癸卯䧏雒州管内繫囚見徒仍免一年租調十二年二月甲戌幸長春宫以舊經鎮復朝邑縣無出今年租賦䧏囚免徒十三年正月乙巳帝朝于獻陵是日赦三原縣及從官衞士等大辟已下已發覺未發覺皆原其罪免其縣人一年租賦年八十已上及孝子順孫義夫節婦鰥寡惸獨有篤疾者賜物各有差宿衞陵邑中郎将衞士及三原令已下各賜爵一級十四年正月甲寅幸魏王泰宅曲赦雍州及長安獄大辟罪已下並原之延康里百姓無出今年租賦二月丁丑幸國學觀釋奠曲赦大理萬年繫囚大辟罪已下九月癸卯以交河道行軍縂管侯君集擊髙昌麴文泰破之曲赦其部内大辟罪已下其佞邪之徒勸文泰為惡并凶逆不變抗拒官軍者不在赦例可汗浮圖城及從軍兵士非犯十惡并從赦免其士卒有父子犯罪以下罪期親犯流大功犯徒小功緦麻犯杖罪悉皆放若妖言惑衆殺人官人枉法受財刼賊監治之主守自盗所監治不在赦限十七年四月丙戌立晉王為皇太子是日帝御承天門樓大陳仗衞文武百辟列於外京邑士女重疊而觀者皇城街悉滿當道中樹金雞大赦天下罪非十惡皆赦之文武執事九品以上及五品已下子為父後者各加一級八十已上賜以粟帛孝子順孫義夫節婦咸表門閭鰥寡孤獨篤疾之徒量加賑給賜天下酺十一月壬午詔曰朕嗣守宗祧夙夜寅懼憂勤在於政道撫育遍於含生十七載于兹矣上𤣥儲祉貞石表瑞朕式備禋燎躬謝蒼旻逮于儲兩亦申䖍奉朔風既切飛雪載零及登泰壇六合開朗神祗介福豈獨在予和樂之慶宜被率土可賜酺三日自漢魏已來或賜牛酒牛之為用耕稼所資多有宰殺深乖惻隠其男子年七十已上量給酒米麵梁州管内大辟罪已下見禁囚皇太子慮過諸州並遣使人分往唯十惡不在慮限餘皆量情䧏宥焉二十年正月征遼還幸并州庚辰引從官及太原父老宴賜物有差因下詔曰太原之地興運所階全晉之人義深惟舊自朕恭膺寳歴二紀于兹何甞不御扆長懐想崤陵之風雨臨軒逺感念大麓之雲雷當於此時乃忘身而拯溺實頼同德並嬴糧而樂推役不踰年遂清區域諒繇成都之衆謳訟闡虞帝之功戰牧之徒歌舞興周王之業仗兹恊力竟至升平懐彼勤勞可忘晷刻既因垂拱之暇再省創業之方周歴郊原宛如疇昔訪其父老已多長謝不見所識魏后遂以興嗟䘏彼故人漢皇因而式宴前王是日哀樂交懐在朕深𠂻義符於此是用具陳廣樂共申髙宴取譬還譙之賞同彼幸代之情仍曲赦并州管内大辟已下繫囚見徒皆赦除之常赦所不免者不在赦例二十一年正月詔無識之徒自蹈刑憲者宜順陽和特申思慮諸司見禁囚並宜将過詳其輕重自此已後毎視朝録禁囚二百人太宗親自案問䧏死至流流䧏入徒徒䧏入杖杖者並放二十二年三月丁亥詔曰昔周武應天尅瑶䑓而靡處漢髙作極獲負陽而不居散服桃林革命先於卜雒既遷枌社創制肇于䟽龍朕御九成有乖斯義以兹撫事尤須改作向者文營仁夀槩日臨雲煬起乾陽銜珠帶璧比阿房而競爽猶且有加擬傾宫而騁麗全於具體隋德云謝其徴在兹朕悼於懐為日既乆故為不侈義顯今辰加以心懐濟育事切於肌膚亟犯風霜疾纒於腠理毎至隆曦届序大火摛芒雖對寒泉如升頭痛之坂式居珍簟若渉炎火之林繇是岳牧憂惶公卿駭懼累陳丹懇請建山宫歴載既深竊愛百金之費詳其至理宜順萬姓之心朕往冒兵㓙為黔首而忘已今兹清暑豈勞人而取安但以上奉宗祧下寕兆庻身非已有不可自輕敬思休攝之方兼理古先之道發眀二指創此一宫即潤䟽隍慿巖搆宇土無文繢木不雕鎪鋪橋板以荆扉變綺窓於甕牖負扆恊幽貞之賞垂纊嘉遁世之情振此冲規方垂帝範今既成之不日頼洽普天宜順發生𢎞兹霈澤可曲赦宜君縣官及百姓并督令官人丁匠等大辟罪已下常赦所不免者不在赦例其營建當官人量加品秩及衞士以上並節級賜物先在宫苑内住移出外者給復三年十二月辛酉詔曰皇太子治業隆三善道兼四學惟忠孝是資寛仁在慮興言獄犴毎切于懐以春陽方動請行寛宥惻隠之辭屢聞旒扆宜順其所請曲流恩䧏雍州長安萬年兩縣及諸司見禁囚徒三年以下差䧏杖罪並放免徒罪已上徴銅未輸者亦從䧏例二十三年三月丙辰甘露䧏時太宗雖積疢日乆喜見於色謂司徒長孫無忌曰今此膏澤豈朕獨喜朕欲共天下蒼生同兹歡慶宜即為赦文旦日頒示也辛酉百官及京邑士庻并列於顯道門外見繫囚千餘人咸北面太宗力疾乘輿諸司庻僚百姓等車馬塡噎顧謂長孫無忌曰百姓滋盛如此誠可哀憐朕方欲盡心布化令其安樂而疴瘵彌積事不遂心因慷慨長息泣數行下然後遣宣詔曰昔興殷觧網動加惠於生靈惟堯肆赦播深仁於四海撫名嶽登甘泉䟽長河揖儀鳯惟皇祚惠此為常範朕夐越前古祗膺寳位雖復十角之㓂乆變衣冠而乃三韓之野尚興車甲言念艱勤無忘鍳寐兼以去冬無積獻嵗愆陽陳尊爼於四衢免租田於百郡昔成湯七載始聞兢惕朕今三月實懼於懐是以政令除殘商羊繼舞昭回停詠纎阿䘖畢宻雨髙飛傾河驟㵼至誠無爽天意非遥宜布寰瀛同滋愷澤可大赦天下大辟罪已下無輕重咸赦常赦所不免者不在赦限其有亡官失爵宜量收叙八十已上各賜粟帛鰥寡惸獨及篤疾者量加賑貸髙宗以貞觀二十三年六月甲戌即皇帝位詔曰粤以孤藐屬當元嗣荷搆乾儀若臨氷谷思勵虗薄康濟元元敬順惟新仰昭先德宜布愷澤被於億兆可大赦天下内外文武賜勲官一級諸年八十以上賚以粟帛雍州及諸州比年供軍勞役尤甚之處並給復一年永徽元年八月庚午親慮囚徒死罪䧏充流流降入徒餘决杖而免之慮未盡者令太尉無忌左僕射李勣等同慮之三年正月甲子詔曰去秋少雨冬來無雪今陽和在辰春作方始膏澤未䧏良疇廢業或恐獄訟之間尚有淫濫含寃未逹弗辜致罪百姓有過責深在予宜順彼發生申兹恩宥在京及天下囚徒死罪宜䧏從流流已下放免鰥寡惸獨及篤疾之徒量加賑恤務令得所七月丁巳立陳王忠為皇太子大赦天下五品已上子為父後者賜勲一轉大酺五日四年十月庚子幸温湯甲辰免新豐見禁囚五年二月辛未帝在萬年宫詔曰恭膺寳命嗣奉遥圖居萬乘之尊當四海之責遐觀往烈詳求前古毎希蹤於哲后常勞心於庻務兢懼弗寧憂勤若厲屬天下無事區宇有截仰髙風於汾射暫清暑於林泉朕昔在震宫侍逰兹壤山川如舊嵗月不追今既俗阜年和華夷胥恱緬懐徽範情兼感慰宜遵省方之義且順陽和之序曲申惠澤式彰寛宥行幸所經諸縣及岐州囚徒行人犯罪者流䧏徒徒已下並免之六年正月壬申親謁昭陵還行宫詔曰朕躬膺大寳嗣隆景業䖍奉成則光闡洪猷昩旦兢懐分宵動慮蒼昊垂祐宗社䧏靈順黎元之心藉忠賢之力俗登仁夀道暨升平逺肅邇安時康俗阜履端受節陽和肇氣親率庻寮奉詣陵寝遺弓永慕切終身之憂撫鏡纒悲興寒泉之思敬深如在哀隆罔極荐享既畢精禮獲申式表因心宜𢎞愷澤可曲赦醴泉縣并行從人大辟罪已下皆赦除之百姓宜免今年租調右監門員外将軍甞基在此宿衞進爵一等陵令陵丞各加一階并節級賜物二月乙巳皇太子忠加元服詔大辟已下罪并䧏一等杖者悉原之十月乙邜詔立武氏為皇后令來月一日備禮册拜丁巳大赦天下流人逹前所放還縁王桞蕭等家臣欽若等曰王皇后等并舅家桞氏及蕭淑妃家也配流者不在此限八十已上老人各賜粟二石綵三段百嵗已上各賜粟五石綵十段孝子順孫義夫節婦咸表門閭鰥寡惸獨篤疾之徒不能自存者量加賑恤顯慶元年正月辛未立代王𢎞為皇太子壬申大赦天下改永徽七年為顯慶元年文武職事九品以上及五品以上子為父後者各加勲一轉亡官失爵並宜量叙諸年八十以上各賜粟帛其有孝子順孫義夫節婦咸表門閭鰥寡惸獨篤疾之徒不能自存者量加賑恤賜天下大酺三日二年二月幸雒陽宫辛酉詔雒州管内并行從者大辟已下並䧏一等死罪徒流已下悉原之雒州百姓免一年租調十月幸鄭州壬子次汜水頓曲赦鄭州管内三年二月甲戌自東都還戊寅録京城囚徒悉原宥之四年十月皇太子𢎞加元服大赦天下文武官職五品以上子孫為父祖後者各加勲官一級大酺三日五年二月丙戌帝在并州曲赦并州管内及所經州縣義旗初職事五品已上身亡歿墳墓在州者令所司致祭佐命功臣子孫及大将軍府佐以下見今在者賜階級有差八月癸未以蘇定方等討平百濟曲赦神丘道行軍大總管以下兵士及其父母妻子大辟罪已下賜天下大酺三日龍朔元年二月乙未晦以益綿等五州皆言龍見改顯慶六年為龍朔元年曲赦雒州境内二年七月戊子朔以皇子旭輪滿月大赦天下大辟罪已下無輕重悉原之賜酺三日三年十二月庚子詔以綘州麟見於介山含元殿前銀䑓閣内並覩麟迹改來年正月為麟德元年在京雍州諸縣見繫囚徒各䧏一等杖罪以下並免之麟德元年八月己卯䧏萬年縣囚徒流罪從徒徒從杖杖已下并宥之二年四月丙午以蠻獠平曲赦桂廣黔三府管内乾封元年正月戊辰朔有事於泰山壬申御朝覲壇受朝賀大赦天下改麟德三年為乾封元年諸行從文武官及見朝覲岳牧二京留守并邉要州都督刺史三品以下並賜爵一等四品已上加授一階諸老人年八十已上者版授刺史司馬縣令婦人版授郡縣君並節級量賜粟帛天下百姓年二十一已上八十以下賜爵一級車駕所經州給復一年齊州停日稍乆給復一年半兖州管嶽給復二年逋租懸調欠貸官物並宜免徴孝子順孫義夫節婦表其門閭終身勿事率土之内賜酺七日總章元年三月庚寅詔曰朕以寡薄忝承丕緒奉二聖之遺訓跨億兆以初臨馭朽兢懐推溝在念而上𤣥垂祐宗社䧏休嵗稔時和人殷俗阜車書混一文軌大同簡玉泥金升中告禪百蠻執贄萬國來庭朝野歡娯華夷胥恱但為郊禋嚴配未安太室布政敷化猶闕合宫朕所以日昃忘疲中宵輟寝討論墳籍錯綜羣言採三代之精㣲探九皇之至賾斟酌前載製造眀堂棟宇方圓之規雖兼古實肆筵陳爼之法獨運財成宣諸内外博考詳求度其長短兾廣聞見而鴻生碩儒俱稱盡善宜命有司及時赴作務從折中稱朕意焉今陽和在辰景風扇物昆蟲草木有以自康朕之百姓尚多勞止思覃惠澤與其更新可大赦天下改乾封二年為總章元年大辟罪以下皆赦除之二年九月己亥帝自九成宫還京師乙巳至岐州以髙祖初仕隋為扶風太守故曲赦岐州管内咸亨元年三月甲戌朔以京師旱大赦天下改總章三年為咸亨元年四年十月乙未帝在九成宫以皇太子納妃裴氏禮畢曲赦岐州上元元年八月壬辰追尊祖宗諡號改咸亨五年為上元元年大赦天下長流人并放還五品以上各舉所知大酺三日二年六月立雍王賢為皇太子大赦天下三年二月丁亥帝幸汝州之温湯令御史中丞杜文範慮汝州囚徒罪輕者皆免之儀鳯元年十一月壬申以陳州上言鳯凰見於宛丘縣改上元三年為儀鳯元年大赦天下三年四月丁亥朔以旱親慮市城繫囚悉原宥之戊申大赦天下調露元年六月辛亥大赦天下改儀鳯四年為調露元年永隆元年八月乙丑立左衞大将軍雍州牧英王哲為皇太子改調露二年為永隆元年大赦天下大酺三日二年七月以太平公主出䧏曲赦京城囚徒大辟罪已下開耀元年九月壬戌裴行儉等獻定襄所獲俘囚乙丑改永隆二年為開耀元年曲赦定襄軍及諸道縁征單于突厥官吏兵募等永淳元年二月癸未以皇太子誕皇孫滿月大赦天下改開耀二年為永淳元年大酺三日二年九月己丑以皇女太平公主誕育曲赦東郡都城内𢎞道元年十二月丁巳詔曰朕以寡昩謬膺丕緒未甞不孜孜訪道戰戰臨人馭朽懐秋駕之危負重積春氷之懼日愼一日三十四載於今矣何則足寒傷心人勞傷國下安即上逸時弊即君憂所以身處九重而情周萬姓建本之懐遽切抑末之念逾深今雖庻績已寕淳源未洽履素歸厚者遂寂寥而靡聞狥華趨利者尚馳騖而不息顧以薄德有謝移風永念羣方在予多愧况朕之緜系兆自𤣥元固當逺恊先規光宣道化變率土於夀域濟含生於福林屬想華胥載勞寤寐所兾内外寮宷各竭乃誠敦惟黎民俱崇簡質舊染薄俗咸與惟新慿大道而開元共普天而更始宜更申霈澤廣被紘埏可改永淳二年為𢎞道元年大赦前後責情流人並放還老人年百嵗以上者版授下州刺史婦人版授郡君九十已上者版授上州司馬婦人版授縣君八十已上者版授縣令并婦人并節級量賜粟帛孝子順孫義夫節婦表其門閭終身勿事鰥寡惸獨篤疾不能自存者量加賑恤仍天下諸州置道士觀上州三所中州二所下州一所毎觀各度七人又比來天后事條深有益於政言近而意逺事小而功多務令崇用式遵無怠見任内外官五品以上經四考及守五考經三考六品以下計滿三考政有清勤状無私犯者各加一階中宗神龍元年正月丙午即位大赦天下唯張易之黨不在原限其周興等所枉破家人子女已進宫及配沒者賜爵一級東宫官寮見任六品加官計階應入五品者特令不拘年限諸州百姓免今年租稅天下宗姓普準舊式房州百姓三年給復於是天下大恱是月甲子立妃韋氏為皇后大赦天下内外官預陪位者賜勲一轉大酺三日三月甲申朔文眀以來被破家人特從放免所有子孫並還其資䕃其揚州搆逆黨唯徐敬業一房及裴炎不在免限餘并原宥九月壬午親祀昊天上帝土皇地祗于明堂禮畢制曰朕聞唯天為大所以上序三宗唯帝為尊于是宏開七廟故知肇興衢室爰申宗祀之規為建明堂或廣嚴禋之禮莫不八窓四逹分氣候於炎凉複廟重簷定尊卑於昭穆實為國之洪訓乃經邦之茂典我國家睿祖神宗重光累葉道軼羲農之上功侔造化之初冠今昔而居尊掩寰區而作大朕承撫天運纉聖開元披鳯歴而乘時握龍圖而建極春秋變易毎増霜露之心日月推移倍切烝甞之思然而城臨丹鳯清廟乆安水控𤣥龜神基未立金輿往幸空展望於瑶祠玉輦來廵實幸親於碣石三川帝里八水皇州豈都邑之相誇而郊畿之有謝所以交風奥壤還開候雁之庭暌日明區更置馴龍之室巍巍紫座無虧薦鮪之途奕奕彤宫遂得獻羔之所加以緫章霧闢重屋煙披懸晦日于梅梁掛晴虹于桂棟是以用斯珪璧奠彼牲牢唱孤竹之簫管奏空桑之琴瑟爰於祔享之日乃至禋宗之辰景色殊常烟雲冠古或凱風南至縈喜氣而分輝或驟雨東來引祥雲而合嚮固可以作樂崇德殷薦上帝而璧海遥澄覺三邉之霧捲丹霄上廓㸔九野之塵清祖宗之靈貺昭然宇宙之神心可見䖍誠既展盛禮斯𢎞宜覃作觧之恩以廣奉先之德但赦者小利而大害始泰而終否著小人之幸非君子之幸今嵗已來頻敷渥命徒長僥倖逾犯憲章非所以𢎞奨風猷發揮明教深慮無知者因兹獲罪有識者縁此致譏遐思管仲之篇緬想吳漢之說恐負丕搆慨然長想昔孔明相蜀王猛佐秦咸以數赦為言俱稱肆𤯝非便朕惟新闡政方事澄源期望古而裁規具脩今而布澤伏以禮申崇祔情展泰禋式流曠蕩之恩兼明懲勸之道可大赦雒州境内天下諸州見禁囚徒罪應至死者特宜免死配流者入徒餘并原宥京文武三品以上賜爵一級四品以上各加一階外文武官九品以上賜爵一轉皇親嗣王仍特許珮金魚袋内外職事官三品以上及四品清官并中書門下五品官父已亡者並量加追贈如聞天下諸宫皆􅀞化胡之變諸寺亦􅀞老君之形一種尊容兩俱不可限制到後十日並除却若有故留者即科違勅罪其化胡經先有明勅禁㫁如聞在外仍頗流行自今諸部化胡經事及餘凡說化胡事處並宜除削在外百姓婚娶之家百兩未行二親俄殯停哀之際便即成婚遂輟苴絰之容敢申花卺之禮寧戚之心安寄罔極之志闕如敗俗傷風莫􅂈於此自今以後宜即懲革自𢎞道以前經任相三年以上及秦府晉府寮佐四品以上并食實封功臣雖經罪責不至破家子孫無任京官者特宜優與一官英府周府舊寮五品已上子孫亦宜准此天下百姓為父後者各賜古爵一級大酺三日十一月壬午親謁太廟告謝受尊號之意禮畢大赦天下前後流人非反逆縁坐者並放還縁張易之徒黨本犯配流者量輕重與逺官京官文武官及朝集士九品已上加一等三品以上賜爵一等外官九品已上賜勲一轉安國相王諱鎮太平公主並加實封通前萬户天下賜酺二日二年十月戊戌自東都還十一月乙巳大赦天下從行文武官九品已下賜勲一轉三年四月庚寅幸薦福寺曲赦雍州其故吏周府官從至寺者各賜勲一轉七月辛丑太子重俊與成王千里舉兵誅武三思癸卯以重俊等既就誅夷大赦天下成王千里等親黨不在原限景龍元年九月庚子御太極殿受神龍皇帝尊號禮畢大赦天下改元景龍文武官三品已上賜勲一轉二年二月庚寅順天皇后言衣箱中裙上有五色雲起乆而方歇帝令􅀞工圖其状以示百寮乃大赦天下内外五品已上官母妻各加邑號一等十一月己邜安樂公主䧏武延秀禮畢大赦天下賜酺三日三年十一月己丑親祀南郊禮畢大赦天下繫囚見徒及十惡咸赦除之雜犯流人並放還京文武官及應集考使别敕陪位官邉州都督刺史諸軍大使副三品已上賜爵一等四品已下加一階應入三品者三品減四考五品減三考聽入外文武官賜勲一轉舉堪刺闗内諸州無出今年地稅令内五品已上各舉堪使縣令者天下大酺三日十二月甲午幸新豐温湯甲辰曲赦新豐縣大辟已下四年正月己卯以金城公主出䧏吐蕃帝幸始平縣送之二月壬午曲赦始平縣大辟罪以下百姓復給一年少帝温王唐隆元年六月庚子臨淄郡王平韋庻人辛丑詔曰大盗移國朝有賊臣見危授命家多義士朕以㐫閔觸諸糜潰姦豎搆扇傾䧟宗社潜圗竊發機兆未萌相王第三子臨淄郡王隆基糾合同盟忠勇奮怒志除兇黨保䕶邦家逆賊韋温馬秦客葉静能宗楚客紀處訥武延秀趙履温楊均等宻行鴆毒先聖暴終朕志不圖全枕戈泣血風雲𤣥感情計隂通太平公主男衞尉卿薛崇暕與前同州朝邑縣尉劉幽求總監鍾紹京日夜共謀誓誅逆黨兇徒驚恧投竄無所今天衢交泰氛祲廓清宜申作觧之恩以洽升平之化自唐隆元年六月二十一日昩爽已前大辟罪以下常赦所不免者咸赦除之其逆賊頭首咸已斬决自餘支黨一無所問内外官三品以上賜爵一等四品已下加一階隆基可封平王食實封一千户賜物五千段薛崇暕封立節郡王食實封五百户賜物三千段鍾紹京可銀青光禄大夫守中書侍郎潁州郡開國公食實封二百户賜物一千段前同州朝邑縣尉劉幽求可朝議大夫守中書舍人仍參知機務中山郡開國男食實封二百戸利仁府折衝麻嗣宗可雲麾将軍行左金吾衞中郎将賜物一千段追貶皇后韋氏為庻人安樂公主為悖逆庻人睿宗以唐隆元年六月甲辰即位大赦天下自唐隆元年六月二十四日辰時已前大辟罪已下咸赦除之内外官三品已上各加爵一等四品已下各加一階内外職事官五品已上各舉所知一人諸道征鎮人家令州縣檢校景雲元年七月七日平王為皇太子大赦天下制曰天下公噐非上聖無以運其機域中大業非元良無以固其本朕欽若靈命寅奉神宗屈己順人用安四海承祧主鬯實貞萬國頃者家臻大憫在疚惟憂梟獍滿朝豺狼塞路武職戎政必任凶徒國要時權咸升逆黨社稷之守望絶苞桑忠義之懐惟其艾棘階禍稔惡伺隙乘間煩言碎辭所不勝述皇太子正氣凝姿端命敏德自家刑國英徽日湛移孝為忠雄謀電發北宫馳入掃欃槍於紫衢南宫反正開日月於黄道平亂寕夏翼戴朕躬一旅不勞功逾復禹百神咸舉事邈興周聲應吹銅望惟當璧今遣司空讀册命侍中授璽實由立義豈曰尚親承華肇開元嗣以建宜申洊雷之澤仍紀景雲之瑞可大赦天下改唐隆元年為景雲元年自七月二十日昧爽以前大辟罪已下咸赦除之其犯十惡常赦所不免者不在赦限内外文武官九品已上子為父後者賜勲一轉公卿各舉孝友忠正堪任東宫官一人自神龍以來直諫枉遭非命咸令封植其墓十一月塟中宗于定陵曲赦萬年髙陵三原華原富平等縣自景雲元年十一月二十一日昩爽已前大辟罪已下咸赦除之常赦不免不在赦例二年四月壬寅大赦天下繫囚見徒流移未逹前所及已到流所者皆赦之京官四品以下加一階外官賜勲一轉三品以上各賜一爵天下濫度僧尼道士女冠等先經度者並令依舊諸州廢寺觀并依舊名置立八月乙邜以髙祖舊宅有柿樹天授中已經枯死至是重生因而大赦天下謀殺人造偽頭首者并免死配流嶺南官典取受者特免放延和元年五月戊寅有事於北郊辛巳大赦天下改太極元年為延和元年五月十二日昩爽以前大辟罪已下咸赦除之其十惡及劉誠之胡大宰徒侣并不在赦限文武官預大禮各賜勲一轉天下大酺五日先天元年八月甲辰傳位於皇太子帝稱太上皇大赦天下改元先天自先天元年八月七日大辟罪已下咸赦除之其常赦不免者不在赦限二年三月太上皇詔曰恤刑緩獄古之通義務本勸農國之常典今陽和布氣膏澤順時凡厥黎民咸事東作而疲人嬰法自滯圜扉言念於此有軫于懐宜從寛宥使營稼穡其京城内見禁囚除死罪以外並特放免營農天下諸州亦宜準此七月甲子左僕射竇懐貞等與太平公主謀逆事覺伏誅是日太上皇御承天門樓下詔曰天歩時艱王業多難亂常干紀何代無之我國家累聖膺期重光繼統戎蠻慕義遐邇無虞朕以寡昩嗣守丕祚嚮明而理昃景忘劬兾㝢内之小康庻羣生之遂性又使家知禮讓人盡忠良不謂姦宄潜謀蕭墻作釁逆賊竇懐貞蕭至忠岑羲薛稷李慈李猷常元楷唐晙唐昕李晋李欽賈應福傅孝忠僧惠範等咸以庸㣲謬承恩幸未申毫髮之效遂興梟獍之心共舉北軍突入中禁将欲廢朕及皇帝以行簒逆朕令皇帝率衆討除應時殄盡元惡既戮姦黨畢殱宗社乂安人神胥恱務申寛大之典宜覃肆宥之恩可大赦天下自大辟罪已下無輕重咸赦除之其逆人魁首未捉獲及應縁坐者並不在赦限自餘黨類往還一無所問布告遐邇咸使知聞册府元龜卷八十四
