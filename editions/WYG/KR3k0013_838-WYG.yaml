body:
  text: 册府元龜卷八百三十八宋王欽若等撰總錄部文章第二晉阮籍字嗣宗陳留尉氏人在魏為步兵校尉㑹文帝讓九錫公卿將勸進使籍為其辭籍沉醉忘作臨詣府使取之見籍方據按醉眠使者告籍便書按使寫之無所改竄辭甚清壮為時所重籍嘗登廣武觀楚漢戰處嘆曰時無英雄使䜿子成名登武牢山望京邑而嘆於是賦豪傑詩陳留王景元四年卒嗣宗能屬文初不留思作詠懐詩八十餘篇為世所重著逹荘論叙無為之貴文多不録籍嘗於蘇門山遇孫登遂著大人先生傳嵇康字叔夜譙人為中散大夫著飬生論君子無私論康能屬文撰上古以來髙士為之傳賛欲友其人於千載也又作太師箴亦足以明帝王之道焉復作聲無哀樂論甚有條理康所著諸文論六七萬言皆為世所玩何劭字敬祖為僕射遷司徒劭博學善屬文撰荀粲王弼傳及諸奏議文章並行於世張華字茂先范陽人學業優博辭藻温麗初未知名著鷦鷯賦以自寄陳留阮籍見之歎曰王佐之才也後為尚書當時詔誥皆所草定惠帝時為侍中中書監華懼后族之盛作女史箴以為諷華所著文章並行於世傅𤣥字休奕北地人善屬文為司𨽻校尉卒文集百餘卷行於世傅咸字長虞𤣥子為司𨽻校尉好屬文論雖綺麗不足而言成規鍳潁川庾純嘗歎曰長虞之文近乎詩人之作矣傅祗字子荘咸從父弟也後為司徒著文章駮論十餘萬言傅暢祗子也為秘書丞作晉諸公叙讃二十二卷又為公卿故事九卷樂廣字彦輔南陽人為太子中庶子遷侍中河南尹廣善清言而不長於筆將讓尹請潘岳為表岳曰當得君意廣乃作二百句語述己之志岳因取次比便成名筆時人咸云若廣不假岳之筆岳不取廣之㫖無以成斯羙也索靖字幼安燉煌人為游撃将軍領雍秦凉義兵與賊戰被傷卒撰晉詩二十卷華譚字令思廣陵人為鄄城令過濮水作荘子賛以示功曹而廷掾張延為答教其文甚羙向秀字子期與嵇康為竹林之游又共呂安灌園於山陽康被誅秀應本郡計入雒秀自此行作思舊賦後為散騎常侍卒阮修字子宣性簡狂不修人事所著述甚寡嘗作大鵬賛後為太子洗馬應貞字吉甫少以才聞魏正始中夏侯𤣥盛有名勢貞在𤣥坐作五言詩𤣥嘉玩之武帝踐祚為給事中帝於華林園宴射貞賦詩最美後遷散騎常侍卒文集行於世庾敳字子髙為陳留相敳見王室多難終知嬰禍乃著意賦以豁情猶賈誼之鵩鳥也劉實字子貞為吏部郎參文帝相國軍事以多進趨亷遜道缺乃著崇讓論以矯之潘岳字安仁榮陽中牟人夙以才穎見稱辟太尉府舉秀才泰始中武帝躬耕藉田岳作賦以羙其事後為長安令作西征賦述所經人物山水文清意諧累遷黄門侍郎既仕宦不逹乃作閑居賦以歌事遂情焉岳辭藻絶麗尤善為哀誄之文皇甫謐字士安安定人沉静寡欲以著述為務自號𤣥晏先生著禮樂聖真之論其後鄉人勸令應辟命謐為釋勸論以通志焉武帝咸寜初詔以為太子中庶子又徴為議郎召補著作郎並不應太康三年卒所著詩賦誄頌論難甚多並重於世摯虞字仲治京兆長安人少事皇甫謐才學通博著述不倦郡檄主簿虞嘗以死生有命富貴在天天之所祐者義也人之所助者信也履信思順所以延福違此而行所以速禍然道長世短禍福舛錯怵迫之徒不知所守蕩而積忿或迷或放故借之以身假之以事先陳處世不遇之難遂棄彛倫輕舉逺遊以極常人㒺惑之情而後引之以正反之以義推神明之應於視聽之表重否泰之運於智力之外以明夫仕命之不可違故作思遊賦舉賢良為太子舍人除聞喜令時天子留心政道又呉㓂新平天下乂安虞上太康頌以羙晉徳後為太常卿性愛士人有表薦者常為其辭王蔚河東猗氏人世修儒史之學魏中領軍曹羲作至公論蔚善之而著至機論辭義甚羙官至夏陽侯相王接字祖游蔚子也為臨汾公相國尚書令王堪統行臺上請接補尚書殿中郎未至卒所著雜論議詩賦碑頌駁難十餘萬言䘮亂盡失束晳字廣㣲陽平人性沉退不慕榮利作𤣥居賦以擬客難後為尚書郎卒所著補亡詩文集數十篇行於世云盧欽字子若范陽人為尚書僕射領吏部卒所著詩賦論難數十篇名曰小道子華嶠字叔駿才學深博為秘書監加散騎常侍所著論議難駁詩賦之屬數十萬言華暢嶠少子也有才思所著文章數萬言遭㓂亂避難荆州為賊所􅊣孫盛字安國太原人為秘書監給事中造詩賦論難數十篇孫楚字子荆太原中都人才藻卓絶爽邁不羣少所推服惟雅敬同郡王濟初楚除婦服作詩以示濟濟曰未知文生於情情生於文覧之悽然増伉儷之重位至馮翊太守孫綽字興公楚之子博學善屬文少居於㑹稽遊於山水十有餘年乃作遂初賦以致其意綽絶重張衡左思之賦毎云三都二京五經之鼓吹也常作天台山賦辭致甚工初成以示友人范榮期云卿試擲地當作金石聲也榮期曰恐此金石非中宫商然毎至佳句輙云應是我輩語後為廷尉卿領著作綽少以文才推稱於時文士綽為其冠温王郄庾諸公之薨必湏為碑文然後刋石焉陸機字士衡呉郡人大司馬抗之少子士衡有異才文章冠世服膺儒術非禮不動抗卒領父兵為牙門将年二十而呉滅退居舊里閉門勤學積有十年以孫氏在呉而祖父世為將相有大勲於江表深慨後王舉而棄之乃論大帝所以得後主所以亡又欲述其祖父功業遂作辨亡二篇入雒累遷中書郎齊王冏既矜功自伐受爵不讓機惡之作豪士賦以刺又以聖王經國義有封建因採其逺指著五等論後成都王頴表為平原内史機天才秀逸辭藻宏麗張華常謂之曰人之為文常恨才少而子更患其多弟雲常與書曰君苖見兄文輙欲燒其筆硯後葛洪著書稱機雲猶𤣥圃之積玉無非夜光焉五河之吐流泉源如一焉其宏麗妍贍英鋭飄逸亦一代之絶手其為人所推服如此所著文章凡三百餘篇並行於世陸雲字士龍士衡弟也清正有才理入雒累遷中書侍郎成都王穎表為清河内史與士衡同遇害所著文章三百四十九篇又撰新書十篇並行於世陸喜字恭仲士衡從父兄在呉為吏部尚書博學有才思常為自叙曰余讀幽通思𤣥四愁而作娯賔九思又作西州清論傳於世文立字廣休巴郡人為衛尉卒所著章奏詩賦數十篇行於世成公綏字子安少有俊才詞賦甚麗閒黙自守不求聞逹時有孝烏毎集其廬舍綏為有反哺之徳以為祥禽乃作賦羙之又以賦者貴能分賦物理敷演無方天地之盛可以致思矣歴觀古人未之有賦豈獨以至麗無文難以辭賛不然何其闕哉遂為天地賦又雅好音律常當暑承風而嘯冷然成曲因為嘯賦張華推重綏毎見其文歎服以為絶倫薦之太常徴為博士歴遷中書郎毎與華受詔並為詩賦年四十三卒所著賦雜筆十餘卷行於世左思字太冲齊國人辭藻壮麗造齊都賦一年乃成復欲賦三都㑹妹芬入宮移家京師乃詣著作郎張載訪岷卭之事遂搆思十年門庭籓溷皆著紙筆遇得一句即便疏之自以所見不博求為秘書郎及賦成時人未之重思自以其作不讓班張恐以人廢言安定皇甫謐有髙譽思造而示之謐稱善為其賦序張載為注魏都劉逹注呉蜀而序之陳留衛瓘又為思賦作畧觧自是之後盛重於時司空張華見而歎曰班張之流也使讀之者盡而有餘乆而更新於是豪貴之家競相傳寫雒陽為之紙貴初陸機入雒欲為此賦聞思作之撫掌而笑與弟雲書曰此間有傖父欲作三都賦湏其成當以覆酒瓮耳思賦出機絶嘆伏以為不能加也遂輟筆焉鄒湛字潤甫南陽人為少府卒所著論事議二十五首為時所重棗據字道彦潁川人善文辭為太子中庶子卒所著詩賦論四十五首遇亂多亡失子腆字𤣥方為襄城太守亦以文章顯腆弟嵩字臺産才藝尤羙為散騎常侍張載字孟陽安平人父収蜀郡太守載性閒雅博學有文章太康初至蜀省父道經劒閣載以蜀人恃險好亂因著銘以作誡益州刺史張敏見而竒之乃表上其文武帝遣使鐫之於劒閣山又為𣙜論及濛汜賦司𨽻校尉傅𤣥見而嗟嘆以車迎之言談盡日為之延譽遂知名起家著作位郎張恊字景陽載弟也少有雋才為河間内史棄絶人事屏居草澤守道不競擬諸文士作七命世以為工永嘉初徴為黄門侍郎不就終於家王沉字彦伯少有俊才出於寒素不能隨俗浮沉為時豪所抑仕郡文學掾鬱鬱不得志及作釋時論是時王政陵遲官才失實君子多退而窮處遂終於里閭惠帝元康初為松滋令呉郡蔡洪字叔開有才名作孤奮論與釋時意同讀之者莫不嘆息焉潘尼字正叔岳之從子少有清才與岳俱以文章見知性静退不競惟以勤學著述為事著安身論以明所守元康初為太子舍人上釋奠頌後為著作郎為乗輿箴夏侯湛字孝若譙國人幼有盛才文章宏富善搆新詞為郎中累年不調乃作抵疑以自廣又作昆弟論後為散騎常侍卒著論三十餘篇别為一家之言初湛作周詩成以示潘岳岳曰此文非徒温雅乃别見孝悌之性岳因此遂作家風詩劉琨字越石中山人年二十六為司𨽻從事時征虜将軍石崇河南金谷澗中有别廬冠絶時輩引致賔客日以賦詩琨預其間文詠頗為當時所許後為司空都督并幽冀三州諸軍事歐陽建字堅石為馮翊太守為孫秀所􅊣時人莫不悼惜之臨命作詩甚哀楚江統字應元陳留人為山隂令時闗隴屢為氐羌所擾孟觀西討自擒氐帥齊萬年統深惟四夷亂華宜杜其萌乃作徙戎論後為愍懐太子洗馬及太子之薨改葬統作誄叙哀為世所重後為散騎常侍領國子博士卒凡所造賦頌表奏皆傳於世江逌字道載陳留人為太常病卒著阮籍序賛逸士箴及詩賦奏議數十篇行於世李賜字宗石犍為人少能屬文嘗為𤣥鳥賦詞甚羙州辟别駕舉秀才未行而終李興字雋石賜弟也亦有文才為鎮南将軍劉宏參軍宏立諸葛孔明羊叔子碑使興為之文甚有辭理范堅字子嘗博學善屬文懐帝永嘉中避亂江東拜著作郎堅子啓終於黄門侍郎父子並有文筆傳於世郭象字子𤣥少有才理常閒居以文論自娯後為太傅主簿永嘉末病卒著碑論十二篇張翰字季鷹呉郡人有清才善屬文為齊王大司馬東曹掾翰因見秋風起乃思呉中菰菜蓴羮鱸魚膾遂命駕而歸著首丘賦後卒其文筆數十篇行於世郭璞字景純河東人好經術博學有髙才而訥於言論詞賦為中興之冠著江賦其詞甚偉為世所稱後復作南郊賦元帝見而嘉之以為著作佐郎璞既好卜筮搢紳多笑之又自以才髙位卑乃著客傲後為王敦記室參軍為敦所􅊣所作詩誄頌賦亦有數萬餘言王鍳字茂宣髙堂邑人也少以文筆著稱中興為永興令大将軍王敦請為記室參軍未就而卒時年四十一文集傳於世鍳弟濤及弟子戭並有才筆葛洪字稚川丹陽人少好學凡所著撰皆精覈是非而才章富贍初為王導諮議參軍選為散騎常侍領大著作不就求為句漏令至廣州止羅浮山在山積年優游閒養著述不輟所著碑誄詩賦百卷移檄章表三十巻洪博聞深洽江左絶倫著述篇章富於班馬又晉陵内史張闓立曲阿新豐塘溉田毎嵗豐稔洪為其頌庾闡字仲初潁川人為散騎常侍領大著作出補零陵太守入湘川以弔賈誼徴為給事中呉國内史虞潭為太伯立碑闡製其文又作揚都賦為世所重著詩賦銘頌十巻行於世曹毗字輔佐譙國人少好文籍善屬辭賦郡察孝亷除郎中蔡謨舉為著作佐郎後為太學博士時桂陽張碩為神女杜蘭香所降毗因以二篇詩嘲之并續蘭香歌詩十篇甚有文彩又著揚都賦亞於庾闡累遷尚書郎鎮東大将軍從事中郎下邳太守以名位不至著對儒以自釋累遷至光禄勲卒凡所著文章十五巻傳於世李克字宏度江夏人為丞相王導記室參軍充幼好刑名之學深抑虗浮之士嘗著學箴為中書侍郎為釋荘論上下二篇詩賦表頌等雜文二百四十首行於世顧愷之字長康晉陵人博學有才氣嘗為筝賦成謂人曰吾賦之比嵇康琴不賞者必以後出相遺深識者亦當以髙竒為貴為散騎常侍卒於官所著文集及啓蒙記行於世虞預字叔寜徴士喜之弟也少好學有文章為散騎常侍領著作卒於家所著詩賦碑誄論數十篇虞溥字允源髙平人為鄱陽内史著文章詩賦數十篇卒於雒謝沈字行思山隂人為著作郎卒所著述及詩賦文論皆行於世其才學在虞預之右紀瞻字思逺丹陽人元帝時為驃騎将軍散騎常侍瞻才兼文武好讀書凡所著述詩賦牋表數十篇嵇含字君道紹從子也好學能屬文為郎中時宏農王粹以貴公子尚主館宇甚盛圖荘周於室廣集朝士使含為之讃含援筆為弔文文不加㸃袁喬字彦叔陳郡人為江夏相龍驤将軍喬博學有文才諸文筆皆行於世楊方字公囘少好學有異才初為郡令少威儀鄉邑未之知内史諸葛恢見而器之恢嘗遣方為文薦郡功曹主簿虞預稱羙之送以示賀循報書曰此子開拔有志意只言異於凡猥耳不圖偉才如此其文甚有竒芬若出其胸臆乃是一國所推豈但牧䜿中逸羣邪後為司徒參軍事出為髙梁太守著文筆皆行於世王廙字世将丞相導從弟廙少能屬文元帝鎮江左為寜逺将軍荆州刺史及帝即位奏中興頌張伉字季陽協弟也中興初散騎常侍領著作佐郎述歴賛一篇謝萬字萬石安弟也工言論善屬文叙漁父屈原季主賈誼楚老龔勝孫登嵇康四隠四顯為八賢論蔡謨字道明陳留人為司徒卒所著文筆論議有集行於世王坦之字文度湛曽孫也為侍中領左衛将軍坦之有風格尤非時俗放蕩不敦儒教頗尚刑名學著廢荘論坦之又嘗與殷康子書論公謙之義康子及袁宏並有疑難坦之標章摘句一一申而釋之莫不厭服孔嚴著通葛論王坦之與書賛羙之位至呉興太守韓伯字康伯潁川人為侍中王坦之嘗著公謙論袁宏作論以難之伯覽而羙其詞㫖以為是非既辨誰與正之遂作辨謙論以行於世何琦字萬倫司空充之從兄也常以述作為事著三國評論凡所撰録百許篇皆行於世歴宣城涇縣令王羲之字逸少司徒導之從子為右軍㑹稽内史嘗與同志宴集於㑹稽山隂之蘭亭羲之自為之序以伸其志或以潘岳金谷詩序方其文羲之比於石崇羲之聞而甚喜王珣字元琳導孫也為左僕射領太子詹事珣夣人以大筆如椽與之既語人曰此當有大手筆事俄而孝武帝哀册諡議皆珣所草桓祕字子穆温弟也為中領軍免官後起為散騎常侍不應朝命與謝安書及詩十篇辭理可觀其文多引簡文帝之眄遇謝安字安石為吏部尚書中䕶軍作簡文帝諡議桓温嘗以示坐賔曰此謝安石碎金也袁宏字彦伯侍中猷之孫也父朂臨汝令宏有逸才文章絶羙曽為詠史詩是其風情所寄少孤貧以運租自業謝尚時鎮牛渚秋夜乗月率爾與左右㣲服泛江㑹宏在舫中諷詠聲既清澈辭又藻拔遂駐聽乆之遣問焉答云是袁臨汝郎誦詩即其詠史之作也累遷大司馬桓温府記室温重其文華專綜書記後為東征賦賦末列稱過江諸名徳而獨不載桓彛時伏滔先在温府又與宏善苦諫之宏笑而不答温知之甚忿而憚宏一時文宗不欲令人顯問後游青山飲歸命宏同載衆為之懼行數里問宏云聞君作東征賦多稱先賢何故不及家君宏曰尊公稱謂非下官敢專既未遑啓不敢顯之耳温疑不實乃曰君顯欲為何辭宏答云風鑒散朗或捜或引身雖可亡道不可隕宣城之節信義為允温泫然而止宏賦又不及陶侃侃子湖奴嘗於曲室抽刃問宏曰家公勲跡如此君賦云何相忽宏窘廹答曰我已盛述尊公何乃言無因曰精金百汰在割能斷功以濟時職思静亂長沙之勲為史所賛湖奴乃止後為三國名臣頌又從桓温北征作北征賦皆其文之髙者嘗與王珣伏滔同在桓温坐温令滔讀之至聞所傳於相傳云獲麟於此野誕靈物以瑞徳奚授體於虞者疾尼父之洞泣似實慟而非假豈一性之足傷乃至傷於天下其本至此便改韻珣云此賦方傳千載無容率爾今於天下之後移韻徙事然寫送之致似為未盡滔云得益寫韻一句或為小勝温曰卿思益之宏應聲答曰感不絶於余心愬流風而獨寫珣誦味乆之謂滔曰當今文章之羙故當共推此生後自吏部郎出為東陽郡宏見漢時傅毅作顯宗頌辭甚典雅乃作頌九章頌簡文之徳上之於孝武卒於東陽有詩賦誄表等雜文凡三百首傳於世伏滔字𤣥度平昌人為大司馬桓温參軍從桓伐袁真至夀陽以淮南屢叛著論二篇名曰正淮殷仲文少有文藻為東陽太守仲文善屬文為世所重謝靈運嘗云若殷仲文讀書半袁豹則文才不減班固言其文多而見書少也晉陶潜字淵明或云淵明字元亮潯陽人少有髙趣嘗著五栁先生傳後為彭澤令解印綬賦歸去來辭與子書以言其志并為訓誡又為命子詩王誕字茂世瑯琊人也少有才藻從叔尚書令珣為晉孝武哀策文乆而未就謂誕曰猶少序節物一句因出夲示誕攬筆便益之接其秋冬代變後云霜繁廣除風廻髙殿珣嗟嘆清拔因而用之後終呉國内史王曇首瑯琊人太保宏少弟也為瑯琊王大司馬屬從髙祖至彭城大㑹戲馬臺與坐者皆賦詩曇首文先成髙祖覽讀因問宏曰卿弟何如卿宏答曰若但如下官門戸何寄髙祖大笑沈林子字敬士為髙祖西中郎中兵參軍輔國将軍卒林子所作賦讃三言箴祭文樂府表牋書記論老子一百二十一首太祖後讀林子書集歎息曰此人作公應繼王太保太保王宏也謝瞻字通逺陳郡人善於文章辭采之美與族叔混弟靈運相抗位至司空長史黄門郎范泰字伯倫順陽人為侍中左光禄大夫國子祭酒博覽篇籍好為文章有文集傳於世謝靈運陳郡人少好學博覽羣書文章之美江左莫逮從叔混特加愛之為世子中軍諮議黄門侍郎奉使慰勞髙祖於彭城作撰征賦後為永嘉太守所至輙為詩詠以致其意焉在郡一周稱疾去職營别業於㑹稽毎有一首詩至都邑貴賤莫不競寫宿昔之間士庶皆遍逺近欽慕名動京師作山居賦并自注以言其事又為臨川内史以叛逆徙廣州棄市所著文章傳於世靈運詩書皆兼獨絶毎文竟手自寫之文帝稱為二寳既自以名輩應參時政至是雖以文義見接毎侍帝宴談賞而已顔延之字延年瑯琊人也少孤貧居負郭室巷甚陋好讀書無所不覽文章之美冠絶當時為豫章公世子中軍行參軍晉安帝義熈中宋祖北伐遂有宋公之授府遣一使慶殊命參起居延之與同府王參軍俱奉使至雒陽道中作詩二首文辭藻麗為謝晦傅亮所賞後為始安太守延之之郡道經湘潭為湘州刺史張紀祭屈原文以致其意後入為太子中庶子領步兵校尉後出為永嘉太守乃作五君詠劉湛以其辭㫖不遜大怒以光禄勲車仲逺代之延之屏居里巷不豫人間者七年閒居無事作庭誥之文後為光禄大夫延之與陳郡謝靈運俱以詞采齊名而遲速懸絶文帝嘗各勅擬樂府北上篇延之受詔便成靈運乆之乃就延之嘗問鮑昭已與靈運優劣昭曰謝五言如初發芙蓉自然可愛君詩若鋪錦列繡亦雕繢滿眼延之毎薄湯慧休詩謂人曰慧休制作委巷中歌謠耳方當娯後生事是時議者以延之靈運自潘岳陸機之後文士莫及江左稱潘陸江右稱顔謝焉何承天東海剡人儒史百家莫不該覽為御史中丞時元魏侵邊文帝訪羣臣威戎御逺之畧承天撰安邊論遂遷廷尉未拜坐事免官卒所著文並行於世何尚之字彦徳廬江人為尚書令領太子詹事元嘉二十九年致仕於方山著退居賦以明所守王韶之字休泰瑯琊人好史籍博渉多聞為黄門侍郎領著作郎領西省事凡諸詔奏皆其辭也後為祠部尚書領給事中守七廟歌辭詔之制也有文集行於世江邃字𤣥逺濟陽人頗有文義官至司徒記室參軍撰文釋傳於世袁淑字陽源陳郡人博渉多通好屬文辭彩遒艶為太子左衛率為元凶所害有文集傳於世顧愿字子恭覬之弟子也好學有文辭覬之嘗以秉命有定分非智力所移惟應恭已守道信天任運而闇者不逹妄求僥倖徒虧雅道無闗得喪乃以其意命愿著定命論愿終於太子舍人謝惠連陳郡人為彭城王義康法曹參軍是時義康治東府城城塹中得古冡為之改葬使惠連為祭文留信待成其文甚美又為雪賦亦以髙麗見竒文章並傳於世蚤卒鮑昭字明逺東海人文辭贍逸嘗為古樂府文甚遒麗元嘉中河濟俱清當時以為美瑞昭為河清頌其序甚工昭嘗謁臨川王義慶未見知上詩言志義慶竒之後為中書舍人又為臨海王子頊前軍參軍掌書記之任王素字休業瑯琊人愛好文義不以人俗累懐累被徴辟不就聲譽甚髙因山中蚿蟲聲清長聽之使人不厭而其形甚醜素乃為蚿賦以自况齊劉繪魏使來繪以辭辨勅接魏使事畢當撰語辭繪謂人曰無論潤色未易但得我語亦難矣繪能書善飛白王融字元長瑯琊人少而神明警慧博渉有文才為中書郎永明九年武帝幸芳林園禊宴使融為曲水詩序文藻富麗當世稱之豫章王薨帝哀痛特至蔬食積旬大官朝送祭奠勅融為銘云半岳摧峰中河墜月帝流涕曰此正吾所欲言也融文辭辨㨗尤善綴屬有所造作援筆可待為東昏所誅文集行於世册府元龜卷八百三十八
