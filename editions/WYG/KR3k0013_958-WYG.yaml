body:
  text: 册府元龜卷九百五十八宋王欽若等撰外臣部國邑第二康居國王冬治樂越慝地樂音來谷切到卑闐城闐音徒千切去長安萬二千三百里不屬都䕶至樂越慝地馬行七日至王夏所居蕃内九千一百四里王毎冬寒夏暑則徙别居不一處戸十一萬口六十萬勝兵十二萬人東至都䕶治所五千五百五十里西北可二千里有奄蔡國控弦者十餘萬大與康居同俗臨大澤無崖盖北海云康居有小王五蘇䪥王治蘇䪥城䪥音下戒切去都䕶五千七百七十六里去陽闗八千二十五里附墨王治附墨城去都䕶五千七百六十七里去陽闗八千二十五里窳匿王窳音庾治窳匿城去都䕶五千二百六十六里去陽闗七千五百二十五里罽王治罽城去都䕶六千二百九十六里去陽闗八千五百五十五里奥鞬王奥音預於去切鞬音鈐居言切治奥鞬城去都䕶六千九百六里去陽闗八千三百五十五里九五王屬康居後名康國云其國先居張掖祁連山為突厥所破南依葱嶺遂有其地奄蔡在康居西北可二千里控弦者十餘萬臨大澤無崖盖乃北海云後名粟特國在葱嶺西居於大澤去代一萬六千里嚴國在奄蔡北屬康居栗弋國屬康居大宛國在匃奴西南在漢正西去漢可萬里王治貴山城去長安萬二千五百五十里戸六萬口三十萬勝兵六萬人副王輔國主各一人東至都䕶治所四千三十一里北至康居卑闐城千五百一十里西南至大月氐六百九十里北與康居南與大月氐接去雒陽萬三千三百五十里大夏在大宛西南二千餘里媯水南民多可百餘萬桃槐音囘國去長安萬一千八百里戸七百口五千勝兵千人休循國王治烏飛谷在葱嶺西去長安萬二百一十里戸三百五十八口千三十勝兵四百八十人東至都䕶治所三千一百二十一里至捐毒衍敦谷二百六十里西北至大宛國九百二十里西至大月氐千六百一十里捐毒國王治衍敦谷去長安九千八百六十里戸三百八十口千一百勝兵五百人東至都䕶治所一千八百六十一里至䟽勒南與葱嶺屬屬聯也音之欲切無人民西上葱嶺則休循也西北至大宛千三十里北與烏孫接後漢時名天竺一名身毒在月氐之東南數千里從月氐高附國以西南至西海東至盤起國皆身毒之地身毒有列城數百城置長列國數十國置王雖各小異俱以身毒為名一說在葱嶺之南地方三萬里其中分為五天竺其一曰中天竺二曰東天竺三曰南天竺四曰西天竺五曰北天竺各數千里城邑數百南天竺南際大海北天竺北拒雪山周囘有山為壁南面一谷通為國門東天竺東際大海與扶南林邑隣接但隔小海而已西天竺與罽賓波斯相接中天竺據四天竺之間國並有王又有列國百餘置王雖各有異而俱以天竺為名北臨禪連河一說去代三萬一千五百里一說中天竺以上都城周廻七十餘里莎車國王治莎車城去長安九千九百五十里戸二千三百三十九口萬六千三百七十三勝兵三千四十九人輔國侯左右將左右騎君備西夜君各一人都尉二人譯長四人東北至都䕶治所四千七百四十六里西至䟽勒五百六里西南至蒲犂七百四十里西經蒲犂無雷至大月氐東去雒陽萬九百五十里東北至䟽勒䟽勒國王治䟽勒城去長安九千三百五十里戸千五百一十口萬八千六百四十七勝兵二千人䟽勒侯擊胡輔國侯都尉左右將左右騎君左右譯長各一人東至都䕶治所二千二百一十里南至莎車五百六十里有市列西當大月氐大宛康居道也其國都城方五里國内有大城十二小城數十勝兵二千人尉頭國王治尉頭谷去長安八千六百五十里戸三百口二千三百勝兵八百人左右都尉各一人左右騎君各一人東至都䕶治所千四百一十一里南與䟽勒接山道不通西至捐毒千三百二十四里逕道馬行二日烏孫國在大宛東北可二千里行國言土著大昆彌治赤谷城烏孫於西域諸戎其形最異人云胡人青眼赤鬚狀類彌猴者本其種去長安八千九百里戸十二萬口六十三萬勝兵十八萬八千八百人相大禄大將二人侯三人大將都尉各一人大監二人大吏一人舍中大吏二人騎君一人東至都䕶治所千七百二十一里至康居蕃内地五千里姑墨國王治南城去長安八千一百五十里戸三千五百口二萬四千五百勝兵四千五百人姑墨侯輔國侯都尉左右將左右騎君各一人譯長二人東至都䕶治所二千二十一里南至于闐馬行十五日北與烏孫接温宿國王治温宿城今雍州豐泉縣北有温宿嶺者本前漢時温宿國人今居北地田牧因以為名去長安八千三百五十里戸二千二百口八千四百勝兵千有五百人輔國侯左右將左右都尉左右騎君譯長各二人東至都䕶治所二千三百八十里西至尉頭國三百里北至烏孫赤谷六百三十里龜茲國王治居延城去長安七千四百八十里戸六千九百七十口八萬一千三百一十七勝兵二萬一千七十六人大都尉丞輔國侯安國侯擊胡侯郤胡侯都尉擊車師都尉左右將左右都尉左右騎君左右力輔君各一人東西南北部千長二人郤胡君三人譯長四人南與精絶東南與且末西南與杆彌北與烏孫西與姑墨接一說俗有城郭其城三重中有佛塔廟千所王宫壯麗煥若神居後秦吕光伐西域龜茲其王出奔光入其城城有三重外城與長安城等室屋壯麗飾以琅玕金玉光立帛純弟震為王而歸自此中國絶不通一說在尉犂西北白山之南一百七十里烏壘國戸百一十口千二百勝兵三百人城都尉譯長各一人與都䕶同治其南三百三十里至渠犂渠犂城都尉一人戸百三十口千四百八十勝兵百五十人東北與尉犂東南與且末南與精絶接西有河至龜茲五百八十里尉犂國王治尉犂城去長安六千七百五十里戸千二百口九千六百勝兵二千人尉犂侯安世侯左右將左右都尉擊胡君各一人譯長二人西至都䕶治所三百里南與鄯善且末接危須國王治危須城去長安七千二百九十里戸七百口四千九百勝兵二千人擊胡侯擊胡都尉左右將左右都尉左右騎君擊胡君譯長各一人西至都䕶治所五百里至焉耆百里焉耆國王治員渠城去長安七千三百里戸四千口三萬二千一百勝兵六千人擊胡侯郤胡侯輔國侯左右將左右都尉擊胡左右君擊車師君歸義車師君各一人擊胡都尉擊胡君各二人譯長三人西南至都䕶治所四百里南至尉犂百里北與烏孫接一說其國王居南河城北去長史所居八百里四面有大山與龜兹相連道險阸易守有海水曲入四山之内周匝其城三十餘里白山之南七十里漢時舊國也都城方二里國内有九城勝兵千餘人南有黄河西帶葱嶺東去龜兹千五百里西去鏺汗國千里南去朱俱波八九百里東北去突厥方千餘里東南去𤓰州四千六百里烏貪訾離國王治于婁谷去長安萬三百三十里戸四十一口二百三十一勝兵五十七人輔國左右都尉各一人東與單桓南與且彌西與烏孫接且音子余切卑陸國王治天山東乾當國乾音干去長安八千六百八十里戸二百二十七口千三百八十七勝兵四百二十二人輔國侯左右將左右都尉左右譯長各一人西南至都䕶治所千二百八十七里卑陸後國王治畨渠類谷畨音盤去長安八千七百一十里戸百六十二口千一百三十七勝兵三百五十人輔國侯都尉譯長各一人將二人東與郁立師北與匃奴西與劫國南與車師接郁立師國王治内咄谷出音丁忽切去長安八千八百三十里戸百九十口千四百四十五勝兵三百三十一人輔國侯左右都尉譯長各一人東與車師城長西與卑陸北與匃奴接單桓國王治單桓城去長安八千八百七十里戸二十七口百九十四勝兵四十五人輔國侯將左右都尉譯長各一人蒲類國王治天山西䟽榆谷去長安八千三百六十里戸三百二十五口二千三十二勝兵七百九十九人輔國侯左右將左右都尉各一人西南至都䕶治所千三百八十七里蒲類後國王去長安八千六百三十里戸百口千七十勝兵三百三十四人輔國侯將左右都尉譯長各一人一說居天山西䟽榆谷東南去長史所居千二百九十里移支國居蒲類地戸千餘口三千餘勝兵千餘人劫國王治天山東丹渠谷去長安八千五百七十里戸九十五口五百勝兵百一十五人輔國侯都尉譯長各一人西南至都䕶治所千四百八十七里西且彌國王治天山東于大谷且音子余切去長安八千六百七十里戸三百三十二口千九百二十六勝兵七百三十八人西且彌侯左右將左右騎君各一人西南至都䕶治所千四百八十七里東且彌國王治天山東兊虚谷去長安八千二百五十里戸百九十一口千九百四十八勝兵五百七十二人東且彌侯左右都尉各一人西南至都䕶治所千五百八十七里東去長史所居八百里孤胡國王治車師栁谷去長安八千二百里戸五十五口二百六十四勝兵四十五人輔國侯左右都尉各一人西至都䕶治所千一百四十七里至焉耆七百七十里山國去長安七千一百七十里常在山下居不為城治也戸四百五十口五千勝兵千人輔國侯左右將左右都尉譯長各一人西至尉犂一百四十里西北至焉耆百六十里西至危須二百六十里東南與鄯善且末接車師前王國治交河城河水分流繞城下故號交河去長安八千一百五十里戸七百口六千五十勝兵千八百六十五人輔國侯安國侯左右將都尉歸漢都尉車師君通善君鄉善君各一人譯長二人西南至都䕶治所千八百七里至焉耆八百三十五里交河城去長史所居栁中八十里車師後王國治務塗谷去長安八千九百五十里戸五百九十五口四千七百七十四勝兵千八百九十人擊胡侯左右將左右都尉道民君譯長各一人道讀曰導西南至都䕶治所千二百三十七里去長史所居五百里車師都尉國戸四十口三百三十三勝兵八十四人車師後長城國戸百五十五口九百六十勝兵二百六十人大秦國一名犂鞬以在海西亦云海西國地方數千里有四百餘城小國役屬者數十以石為城郭列置郵亭皆堊塈之塈飾也音火既切堊白土也音惡所居城邑周圜百餘里城中有五宫相去各十里宫室皆以水精為柱食噐亦然或云其國西有弱水流沙近西王母所居處幾於日所入也從條支西行二百餘里近日所入則與今書異矣前世漢使皆自烏弋以還莫有至條支者也又云從安息陸道繞海北行出海西至大秦人庶連屬十里一亭三十里一置置驛也其城周廻百餘里居宇皆以珊瑚為梲栭琉璃為牆壁水晶為柱礎其王有五宫其宫相去各十里毎旦於一宫聽事終而復始小人國在大秦之南澤散國屬大秦其地在海中央北至驢分水行半歲風疾時一月到最與安息安谷城相近西南至大秦都不知里數驢分王屬大秦其治去大秦都二千里從驢分城西之大秦渡海飛橋長二百三十里渡海道西南行繞海直西行且蘭王屬大秦從思陶國直南渡河乃直西行之且蘭三千里道出河南乃西行賢督王屬大秦其治東北西北去汜復六百里汜復王屬大秦其治東北去於羅三百四十里渡海也於羅屬大秦其治在汜復東北渡河從於羅東北又渡河斯羅東北又渡河斯羅國屬安息與大秦接也北烏伊别國在康居北呼得國在葱嶺北烏孫西北康居東北勝兵萬餘人堅昆國在康居西北勝兵三萬人滑國車師别種也後漢初居代都滑為小國屬蠕蠕後稍强大征其旁國開地千餘里白題國在滑國東去滑六日行西極波斯師子國天竺旁國也舊無人民止有鬼神及龍蛇居之諸國商賈來共市易鬼神不見其形但出珍寳諸國聞其土樂因此競至遂成大國東離國居沙竒城在天竺東南三千餘里大國也列城數十皆稱王安國漢安息之地都在那密水南城有五重環以流水國西百餘里有異國波斯國都逹曷水西蘇藺城即條支故地也有城周廻三十二里城高四丈皆有樓觀城内屋宇數百千間城外佛寺二三百所東與滑國西及南俱與婆羅門北與汎慄國接西去海數百里東去穆國四千餘里西北去拂林四千五百里東去𤓰州一萬六千七百里一說都宿利城在忸密南古條支國也去代地二萬四千二百二十八里城方十里戸十餘萬伏盧尼國都城在波斯國北去代二萬七千三百二十里累石為城大食國本在波斯國之西後衆漸盛遂割據波斯西境自立為王西隣於大海有勝兵四十餘萬穆國都烏滸河之西安息故地都城方三里勝兵二千人東北去安國五百里東去烏那遏二百餘里西波斯國四千餘里東去𤓰州七千七百里烏那遏國都烏滸水西舊安息之地都城方二里勝兵數百人王坐金羊座東北去安國四百里西北去穆國二百餘里東去𤓰州七千五百里米國都那密水西舊康居之地都城方二里勝兵數百人西北去康國百里東去蘇對沙那國五百里西南去史國二百里東去𤓰州六千四百里曹國都那密水南數里舊是康居之地都城方三里勝兵千餘人何國都那密水南數里舊是康居之地東去曹國百五十里西去小安國三百里東去𤓰州六千七百五十里史國都獨莫水南十里舊康居之地也都城方二里勝兵千餘人北去康國二百四十里南去吐火羅五百里西去那色波國二百里東北去米國二百里東去𤓰州六千五百里石國居於藥殺水都城方十餘里國城之東南立屋置座於中其國南去鏺汗六百里東南去𤓰州六千里鏺汗國在葱嶺之西五百里古渠搜國也都城方四里勝兵千人東去䟽勒千里西去蘇對沙那國五百里西北去石國五百里東去突厥可汗二千餘里東去𤓰州五千五百里挹怛國都烏滸水南二百餘里勝兵者五六千人都城方十餘里多寺塔吐火羅國都葱嶺西五百里與悒怛雜居都城方二里勝兵者十萬人一說其北界即漢西域大宛之地今屬西蕃突厥在𤓰州西六千七百里俱蘭國與吐火羅接南抵雪山唐貞觀中朝貢女國在葱嶺之南山上為城方五六里人有萬家其國以女為王侍女數百人五日一聽朝復有小女王共知國政東女國西羗之别種以西海中復有女國故稱東女焉俗以女為王東與茂州党項接東南與雅州接隔羅女蠻及白狼夷其境東西九日行南北二十日行有大小八十餘城王所居康延川中有弱水南流用牛皮為船以渡戸四萬餘衆勝兵萬餘人散在山谷間吐谷渾晉時據有西零巴西甘松之界極乎白蘭數千里然有城郭而不居隨居水草廬帳為屋當魏周之時始稱可汗都伏侯城在青海西十五里其地兼鄯善且末西北有流沙數百里河南國在益州西北亘數千里其南界龍涸城去成都千餘里大戌有四一在清水川一在赤水一在澆河一在吐屈直川皆子弟所治一說其地則張掖之南隴西之西在河之南故以為號其界東至疊川西隣于闐北接高昌東北通秦嶺方千餘里盖古之流沙地焉高昌國南接河東連燉煌西次龜茲北隣勑勒置四十六鎭交河田地高寧臨川横截栁婆洿林新興繇寧始昌篤進白刀等皆其鎭名其地東西三百里南北五百里國内總有城一十六一云有八城其國去燉煌十三日行其四面夕夕大山其都城週廻一千八百四十步於坐室畵魯哀公問政於孔子之像四面多大山以其地勢高敞人庶昌盛故名高昌一說即漢車師前王之庭西域長史戊巳校尉之故地也其國東西二百延袤數百里漢興師西討軍中羸憊者留居焉地形高敞因名高昌壘有八城本皆中國人也葱茈羌茈音紫北與諸國接不知其道理廣狹南與白馬羗隣白馬氐秦漢以來世居岐隴以南漢川以西自立豪帥自汧渭抵於巴蜀或謂之白氐或謂之故氐漢末徙居仇池地方百頃魏封百頃王晉封仇池公白蘭國羌之别種也其地東北接吐谷渾西叱利模徙南界那鄂党項羗其種有宕昌白銀狼東接臨洮西拒葉䕶南北數千里處山谷間毎姓别為部落大者五千餘騎小者千餘騎武興國本仇池地其國東連秦嶺西接宕昌去宕昌八百里南去漢中四百里北去岐州三百里去長安九百里宕昌國其界自仇池以西東西千里帶水以南南北八百里地多山阜部衆二萬餘落鄧至國居涼州界羗别種也湟中月氐國舊在張掖酒泉地大月氐為匃奴冐頓所殺餘種分散踰葱嶺其羸弱者入山依諸羗居止者舌國故康居國也在破落那西北去代一萬五千四百五十里丁令在康居北勝兵六萬人隨畜牧依處西南去康居五千里短人國在康居西北人衆甚多去奄蔡諸國甚遠去康居萬餘里悅般國在烏孫西北去代一萬九百三十里其先匃奴北單于部落也為漢車騎將軍竇憲所逐北單于度金微山西走康居其羸弱不能去者住龜兹北地方數千里衆可二十餘萬涼州人猶謂之單于王陁羅伊羅國在烏蔡國北天雪山坡上縁梯登山接七百梯方到其國阿鉤羗在莎車西南國西有縣度山其間四百里中往往有棧道下臨不測之深人行者以繩索相持而度波路國在阿鉤羗西北去代一萬三千九百里三童國在軒渠國西南千里蒲山國故皮山國也居皮城在于闐南去代一萬二千里其國西南三里有凍凌山後役屬于闐悉居半國故西夜國也一名于合在于闐西去代萬一千九百七十里權於摩國故烏秅國也其王治烏秅城西接悉居半國西南去代一萬二千九百七十里洛那國故大宛國也都貴山城在踈勒西北去代四千四百五十里朱居國在于闐西役屬嚈噠嚈噠國其原出於塞北自金山而南在于闐之西都烏滸水南二百餘里去長安一萬一百里其王都㧞底延城盖王舍城也其城方十里餘多寺塔衆可十萬無城邑西域康居于闐安息及諸小國三十許皆役屬之號為大國烏萇國在賒彌南北有葱嶺南至天竺婆羅門胡乾陀國在烏萇西本名葉波為嚈噠所破因改焉所都城東南七里有佛塔高七十丈周三百步即所謂雀離佛國也渴盤陁國在葱嶺東于闐西小國也西隣滑國南接罽賓國北連䟽勒國所治在山谷中城周廻十餘里國有十二城波知國在鉢和西南土狹人貧依託山谷賖彌國在波知之南山居亦附嚈噠東有鉢勒盧國路險縁鐵鏁而度下不見底越延底國治辛頭河北西北去賖彌國千餘里東北至𤓰州五千四百里耆至㧞國在䟽勒西去代一萬一千六百二十里其國東有藩賀那山悉宻國在者至拔西去代萬二千一百里其國東有山名郁悉滿山悉萬斤國在悉密西去代一萬二千二百二十里其國有山名伽色那山伽不單國在悉萬斤西北去代一萬二千七百八十里色知顯國在悉萬斤西北去代一萬二千九百四十里吐呼羅國去代一萬二千里東至范陽國西至悉萬斤國中間相去二千里南至連山不知名北至波斯國中間相去一萬里中薄提城周廻六十里城南有西流大水名漢樓河伽色尼國在悉萬斤南去代一萬二千五百里薄知國在伽色尼南去代一萬三千三百三十里忸密國在悉萬斤西去代二萬二千八百二十八里牟知國在忸密西南去代二萬二千九百二十里阿弗大汗國在忸密西去代二萬三千七百二十里諾色波羅國在忸密南去代二萬三千四百二十八里畢伽至國東接忸密國去代二萬三千七百二十八里呼似密國在阿弗大汗西去代二萬二百里副貨國去代一萬七千里東至阿富使且國西至役誰國中間相去一千里南有連山不知名北至竒沙國相去一千五百里國中有副貨城周匝七十里疊伏羅國去代三萬一千里國中有勿悉城城北有彊竒水西流焉鉢和國在渴槃陁西其土尤寒有大雪山望若銀峯拔豆國去代五萬一千里東至多向勿當國西至旃那國中間相去七百里南至罽陵伽北至弗那伏且國中間相去九百里吐蕃在長安之西八千里本漢西羗地也後魏神瑞初南涼秃髮樊尼率衆西奔濟黄河逾積石於羗中建國開地千里以秃髪為國號語訛謂之吐蕃其後子孫繁昌又侵伐不息土宇漸廣唐高宗時吐蕃盡收羊同党項及諸羗之地東與涼松茂嶲等州相接南至婆羅門西又攻陷龜兹踈勒四鎭北抵突厥地方萬餘里自漢魏以來西戎之盛未之有也大羊同國東接吐蕃西接小羊同北直于闐東西千餘里勝兵八九萬悉立國在吐蕃西南戸五萬餘有城邑村落依谿澗章求㧞國在悉立西南居四山之内後移出山西地接東天竺遂改衣服變西羗之俗因而附焉其地延袤八九百里勝兵二千餘人居無城郭回紇之先匃奴之裔也後魏時號為鐵勒部落其衆微小依託高車臣屬突厥隋時謂之特勒在薛延陁北境居婆陵水側去長安六千九百里隨逐水草勝兵五萬人口十萬唐貞觀中以回紇部為瀚海府開元中漸盛保烏德徤山南去西城千七百里西城即漢之高闕塞也西城北去磧石三百里有十一都督元和中可汗遣使改為回鶻義取回旋輕㨗如鶻也骨利幹居回紇瀚海之北俟斤同居勝兵四千五百口萬餘人都蕃鐵勒之别種南去廻紇十三日行前代未通也結骨部其地在回紇西北三千里勝兵八萬口數十萬其國南阻貪湯澷山山多林木夏浸如冬積雪往來險阻有水從回紇北流踰山經其國多濫葛在薛延陁東界居近同羅水兵一萬口三萬人僕骨在多濫葛東境勝兵一萬口三萬人㧞野古在僕骨東勝兵一萬口六萬人北狄匃奴漢高帝時冐頓單于最强大盡服從北夷而南與諸夏為敵國置左右賢王左右谷蠡音鹿黎左右大將左右大都尉左右大當戸左右骨都侯自左右賢王以下至當戸大者萬餘騎小者數千人諸左王將居東方直上谷以東直當也接濊貊朝鮮右王將居西方直上郡以西接氐羌而單于庭直代雲中各有分地逐水草移徙至後漢光武時始有南北二庭焉烏桓者本東胡也漢初匃奴冐頓滅其國餘類保烏桓山因以為號武帝遣驃騎大將軍霍去病擊破匃奴左地因徙烏桓于上谷漁陽右北平遼東五郡塞外為漢偵察匃奴動静後漢靈帝初烏桓大人上谷有難樓者衆九千餘落遼西有丘力居者衆五千餘落皆自稱王又遼東蘇僕延衆千餘落自稱峭王右北平烏延衆八百餘落自稱汗魯王鮮卑東胡之支也别依鮮卑山故因為號後漢和帝時右校尉耿䕫擊破匃奴北單于逃走鮮卑因此轉徙據其地匃奴餘種留者尚有十餘萬落皆自號鮮卑其地東接遼水西當西域突厥者盖匃奴之别種居金山之陽金山形似兠鍪其俗謂兠鍪為突厥因以為號一說突厥之先平凉雜胡也西魏廢帝時木可汗俟升西破嚈噠東走契丹北并契骨威服塞外諸國其地東自遼海以西西至西海萬里南自沙漠以北北至北海五六千里皆屬焉西突厥本與北突厥同祖初木杆與沙鉢畧可汗有隙因分為二其國即烏孫故地東至突厥國西至雷翥海南至䟽勒北至瀚海在長安北七千里自焉耆國西北七日行至其南庭又正北八日行至其北庭鐵勒龜兹及西域諸胡皆歸附之一說沙鉢羅葉䕶可汗既立建庭於睢合水北謂之水南庭東以伊列河為界契丹國居黄水之南黄龍之北數百里後魏時為髙麗所侵部落萬餘口求内附止於白􅆛河其後為突厥所逼又以萬家寄於高麗隋開皇中背高麗率衆内附高祖安置於渴奚那頡之北部落漸衆遂北徙逐水草當遼西正北二百里依託訖臣水而居東西亘五百里南北三百里分為十部兵多者三千少者千餘其南者為契丹在北者號室韋一說其國在鮮卑之東故地距高麗西至奚北隣靺鞨南接營州延袤二千里勝兵萬餘人分為八部又云古匃奴之種代居遼澤之中潢水南崖南距渝與榆同闗千一百里渝闗南距幽州七百里本鮮卑之舊地也後唐天祐末其酋阿保機乃僣稱皇帝署中國官號為城郭宫室之制於漠北距幽州三千里名其邑曰西樓邑屋門皆東向如車帳之法城南别作一城以實漢人名曰漢城南室韋在契丹北三千里分為二十五部毎部有餘莫弗瞞咄猶酋長也北室韋在南室韋北行十一日其國分為九部落繞吐紇山而居其部落渠帥號乞引莫賀咄毎部有莫何弗三人以貳之鉢室韋在北室韋北千里依胡布山而住人衆多北室韋不知為幾部落穴室韋在鉢室韋西北數千里册府元龜卷九百五十八
