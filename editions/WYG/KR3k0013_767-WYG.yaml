body:
  text: 册府元龜卷七百六十七宋王欽若等撰總録部儒學周官著師儒之訓太史公論儒者之要始於博習經藝之文祖述堯舜之道其後分而為六家蔓而成九種至於憲章仁義順隂陽明天道宣教化正人倫以致乎至治固異端之不能奪也春秋之世施及戰國聖師云没微言誕布學者間出素風益邵雖復遭坑焚之變而鄒魯之俗弦誦無改大漢龍興罷出百家表章經術建立學官予以禄利修復􅓺校風以德化傳受彌廣藝文不墜盖西京之士彬彬矣中興崇學於兹為盛魏晉以降未之或替豈不以六君子之訓四術之教乃百王之所取法千古所不易者也今悉其志學成業顯名於世者著於篇倚相楚人為左史能讀三墳五典八索九丘即上世帝王遺書也孔子魯人為兒嬉戲嘗陳俎豆設禮容其後適周問禮盖見老子時周室㣲而禮樂廢詩書缺追迹三代之禮序書傳上紀唐虞之際下至秦繆編次其事故書傳紀自孔子古者詩三千餘篇及至孔子去其重取可施於禮義上采契后稷中述殷周之盛至幽厲之缺始於袵席故曰闗睢之亂以為風始鹿鳴為小雅始文王為大雅始清廟為頌始三百五篇孔子皆弦歌之以求合韶武雅頌之音禮樂自此可得而述以備王道成六藝孔子晚喜易序彖繫象説卦文言讀易韋編三絶曰假我數年若是我於易則彬彬矣孔子以詩書禮樂教弟子盖三千焉身通六藝者七十有二人孔子嘗為魯司寇孔子卒後七十子之徒散遊諸侯大者為師傅卿相小者友教士大夫或隐而不見故子路居衞按仲尼弟子列傳子路死於衞時孔子尚存子張居陳澹臺子羽居楚子夏居西河子貢終於齊如田子方段干木吳起禽滑釐之屬皆受業於子夏之倫為王者師是時獨魏文侯好學後凌遲以至於始皇天下於戰國儒術既絀焉然齊魯之間學者獨不廢也孟軻鄒人生有淑質夙䘮其父㓜被慈母三遷之教長師孔子之孫子思知儒術之道通五經尤長於詩書荀卿趙人與孟子咸遵夫子之業而潤色之以學顯於當世嫉濁世之政亡國亂君相屬不遂大道而營於巫祝信機祥鄙儒小拘如莊周等又滑稽亂俗於是推儒墨道德之行事興懷序列著數萬言荀卿在齊三為祭酒後適楚為蘭陵令而卒於蘭陵漢叔孫通一云名何薛人秦時以文學徵待詔博士髙祖初為漢王復拜為博士漢五年已并天下諸侯共尊漢王為皇帝叔孫通使徵魯諸生三十餘人與其弟子百餘人共起朝儀事具掌禮制禮門乃拜為太常賜金五百斤叔孫通因進曰諸弟子儒生隨臣乆矣與共為儀願陛下官之髙帝悉以為郎申公培魯人以詩經為訓髙祖過魯申公以弟子從師入見髙祖於魯南宫後官至大中大夫伏勝濟南人故為秦博士文帝時欲求能治尚書者天下無有乃聞伏生能治欲召之是時伏生年九十餘老不能行於是乃詔太常使掌故朝錯往受之賈誼雒陽人年十八以能誦詩書屬文稱於郡中河南太守吳公徵為廷尉言誼少通諸家之書文帝召為博士修春秋左氏傳為傳訓終於梁王傅董仲舒廣川人少治春秋景帝時為博士通五經能持論善屬文漢興至於五世之間唯仲舒為明於春秋其傳公羊氏也胡母生字子都齊人治公羊春秋景帝時為博士齊之言春秋者多受胡母生轅固生齊人以治詩景帝時為博士毛公趙人治詩為河間獻王博士戴德字延君號大戴為信都太傅公孫𢎞菑州薛人學春秋雜説武帝初即位招賢良文學士是時宏年六十以賢良徵為博士兒寛千乗人治尚書有俊材初見武帝語經學帝曰吾始以尚書為樸學弗好及聞寛説可觀乃從寛問一篇位至御史大夫吾丘壽王武帝時為待詔詔使從中大夫董仲舒受春秋髙材通明遷為侍中馮野王通詩以父任為太子中庶子龔遂以明經為昌邑郎中令夏侯始昌魯人通五經以齊詩尚書教授自董仲舒韓嬰死後武帝得始昌甚重之時昌邑王以少子愛上為選師始昌為太傅張禹至長安學從沛郡施讐受易琅邪王陽膠東庸生問論語既皆明習有徒衆舉為郡文學韓嬰燕人為常山王太傅推詩人之意作外傳數萬言武帝時與董仲舒論於帝前其人精悍處事分明悍勇悍仲舒不能難也榮廣受榖梁先是公羊大興穀梁寖㣲廣髙材㨗敏與公羊大師眭孟等論數困之故好學者頗復受榖梁蔡千秋字少君宣帝即位聞衞太子好穀梁春秋以問丞相韋賢長信少府夏侯勝及侍中樂陵侯史髙皆魯人也言穀梁子本魯學公羊氏乃齊學也宜興穀梁時千秋為郎召見與公羊家並説帝善穀梁説擢千秋為諫大夫給事中韋𤣥成宣帝時為淮陽王中尉王未就國𤣥成受詔與太子太傅蕭望之及五經諸儒雜論同異於石渠閣條奏具對劉向時為諫大夫以偽鑄黄金减死論㑹初立穀梁春秋徵更生受穀梁講論五經於石渠施讐為博士甘露中與五經諸儒雜論同異於石渠閣石渠閣在未央殿北以藏秘書梁丘臨為黄門郎甘露中奉使問諸儒於石渠臨學精熟專行京房法瑯邪王吉通五經聞臨説善之聞人通漢子方聞人姓也名通漢字子方以太子舍人論石渠戴聖以博士論石渠夏侯勝亦以儒顯名為學精熟善説禮服徵為博士后蒼字近君東海剡人事夏侯始昌始昌通五經蒼亦通詩禮為博士周堪字少卿齊人與孔覇俱事大夏侯勝覇為博士堪譯官令論於石渠經為最髙張山拊字長賔平陵人事小夏侯建為博士論石渠張無故字子儒山陽人事山拊受尚書善修章句為廣陵太傅孔安國字子國孔子之後孔氏有古文尚書安國以今文字讀之因以起其家逸書得十餘篇盖尚書兹多於是矣以安國為諫大夫韋賢為人質樸欲篤志於學兼通禮尚書以詩教授號稱鄒魯大儒為丞相薨子𤣥成復以明經厯位至丞相故鄒魯諺曰遺子黄金滿籯不如一經匡衡字稚圭父世農夫至衡好學家貧庸作以供資用尤精力過絶人諸儒為之語曰無説詩匡鼎來鼎猶言嘗也言匡且來也賈誼云天子春秋鼎盛其義亦同匡語詩解人頥衡後位至丞相嚴彭祖與顔安樂俱事眭孟孟弟子百餘人惟彭祖安樂為明由是公羊春秋有顔嚴學彭祖為宣帝博士翼奉字少君東海下邳人治齊詩與蕭望之匡衡同師三人經術皆明元帝初即位諸儒薦之徵待詔宦者署後以中郎為博士諫大夫卒師丹字仲公治詩舉孝亷為郎元帝末為博士免建始中州舉茂材復補博士翟方進為小吏心厭之聞蔡父言當以經術封侯心喜因病歸家辭其後母欲西至京師受經母憐其㓜隨之長安織屨以給方進讀經博士受春秋積十餘年經學明習徒衆日廣諸儒稱之以射䇿甲科為郎位至丞相徐敖治詩授於九江陳俠為王莽講學大夫由是言毛詩者本之徐敖谷永於經書汎為疏達與杜欽杜鄴略等不能洽浹如劉向父子及揚雄也其於天官京氏易最密位至大司農梅福字子真九江夀春人少學長安明尚書穀梁春秋為郡文學後為南昌尉揚雄字子雲少而好學不為章句訓詁通而博覧無所不見位至大夫後漢卓茂字子康南陽宛人元帝時於長安事博士江生習詩禮及厯算究極師法稱為通儒賈逵父徽從劉歆受左氏春秋兼習國語周官又受古文尚書於塗惲學毛詩於謝曼卿作左氏條列二十一篇桓譚博學多通徧習五經皆訓詁大義不為章句能文章尤好古學數從劉歆揚雄辨析疑異譚後官至六安郡丞張𤣥字君夏少習顔氏春秋兼通數家法建武初舉明經補𢎞農文學丁恭字子然習公羊顔氏春秋學義精明建武初為諫議大夫博士牟長字君髙樂安臨濟人少習歐陽尚書不仕王莽時建武初大司空宋𢎞特辟拜博士魏應字君伯少好學建武初詣博士受業習魯詩閉門誦習不交僚黨京師稱之應終騎都尉洼丹字子玉世傳孟氏易建武初為博士丹學義研深易家宗之稱為大儒杜林少好學沈深父鄴為梁州刺史家既多書又外氏張竦父子喜文采鄴少孤其母張敞女也鄴從敞子吉學得其家書竦即吉之子博學文雅過於敞林從竦受學博洽多聞時稱通儒王莽敗避難客河西建武六年光武聞林已還三輔乃徵拜侍御史引見問以經書故舊及西州事甚悦之賜車馬衣被羣僚知林以名德用甚尊憚之京師士大夫咸推其博洽河南鄭興東海衛宏等皆長於古學興嘗師事劉歆林既遇之欣然言曰林得興等固諧矣使宏得林且有以益之宏見林闇然而服濟南徐巡始師事宏後皆更受林學林前於西州得漆書古文尚書一卷嘗寳愛之雖遭艱困屈時不離身出以示宏等曰林流離兵亂嘗恐斯經將絶何意東海衞子濟南徐生復能傳之世道竟不墜於地也古文雖不合時務然願諸生無悔所學巡益重之於是古文遂行位至大司空任安字定祖少遊大學受孟氏易兼通數經除博士公車徵皆稱疾不就甄宇字長文北海安丘人習顔氏春秋建武中為州從事徵拜博士包咸子良少為諸生受業長安師事博士右師細君姓右師習魯詩論語舉孝亷為郎建武中入授皇太子論語又為其章句劉寛少學歐陽尚書京氏易尤明韓詩外傳稱為通儒人為光禄勲卒楊政字子行京兆人少好學從代郡范升受梁丘易善説經書京師為之語曰説經鏗鏗楊子行終於左中郎將戴慿字次仲習京氏易年十六舉明經徵試博士鍾興少從少府丁恭受嚴氏春秋恭薦興學行髙明光武召見問以經義應對甚明帝善之位至左中郎將卒張𤣥少習顔氏春秋後舉孝亷為郎㑹顔氏博士缺元試䇿第一拜為博士居數日諸生上言𤣥兼説嚴氏宣氏不宜專為顔氏博士光武且令還署未及遷而卒董鈞字文伯犍為資中人習慶氏禮事大鴻臚王臨永平初為博士當世稱為通儒衞宏字敬仲東海人少與河南鄭興俱好古學初九江謝曼卿精毛詩宏從曼卿受學後從大司空杜林更受古文尚書時濟南徐巡師事宏後從林受學亦以儒顯由是古學大興光武以為議郎周防字偉公師事徐州刺史盖豫受古文尚書經明舉孝亷拜郎中太尉張禹薦補博士楊倫字仲理少為諸生師事司徒丁鴻習古文尚書為郡文學掾後特徵博士李育字元春扶風漆人少習公羊春秋沈思專精博覧書傳知名太學後為侍中卒於官何休字邵公任城樊人精研六經世儒無及者位至諫議大夫謝該字文儀南陽章陵人善明春秋左氏為世明儒後拜議郎以夀終周爕十歲通詩論及長專精禮易徵之不就陳元父欽習左氏春秋事黎陽賈䕶與劉歆同時而别自名家元父欽字子佚以左氏授王莽自名陳氏春秋後辟司徒歐陽歙府以病去卒鄭衆字仲師年十二從父興受左氏春秋精力於學明三綂厯兼通易詩知名於世位至大司農卒承官少勤學不倦經典既明歸家教授三府更辟皆不應永平中徵詣公車車駕臨辟雍召宫拜博士侯覇篤志好學師事九江太守房元治穀梁春秋為元都講又從鍾寧君受律位至大司徒鄭興少學公羊春秋晚善左氏傳遂積精深思通達其㫖同學者皆師之興從博士金子嚴為左氏春秋後為蓮勺令以事免卒魯㳟始為郡吏太傅趙熹聞而辟之章帝集諸儒於白虎觀恭特以經明得召與其議後位至司空王渙敦儒學習尚書讀律令略舉大義官至雒陽令卒周舉字宣光姿貌短陋而博學洽聞為儒者所宗故京師為之語曰五經從横周宣光終於光禄大夫井丹字大春少受業太學通五經善談論故京師為之語曰五經紛綸井大春性清髙沛王輔等五王更請皆不能致尹敏少為諸生初習歐陽尚書後受古文兼善毛詩穀梁左氏春秋後為諫議大夫卒許慎字叔重性淳篤少博學經籍馬融嘗推敬之時人為之語曰五經無雙許叔重除洨長卒於家洨音侯交切蔡𤣥字叔陵學通五經徵辟並不就順帝時詔徵拜議郎講論五經異同甚合帝意遷侍中出為𢎞農太守卒于官宗資少在京師學孟氏易歐陽尚書楊震字伯起少好學受歐陽尚書於太常桓郁明經博覧無不窮究諸儒為之語曰闗西孔子楊伯起位至太尉趙曄詣杜撫受韓詩究竟其術作詩細厯神淵蔡邕至㑹稽讀詩細而歎息以為長於論衡邕還京師傳之學者咸誦習焉張馴字子雋濟隂定陶人少游太學能誦春秋左氏傳以大夏侯尚書教授辟公府舉髙第拜議郎與蔡邕共奏定六經文學擢拜侍中典領秘書近署魏樂詳字文載少好學善左氏傳杜畿為太守亦甚好學署詳文學祭酒使教後進於是河東學業大興至黄初中徵拜博士于時太學初立有博士十餘人學多褊狹又不熟悉略不親教備員而已惟詳五業並授其或難教質而不觧詳無慍色以杖畫地牽譬引領至忘寢食以是獨擅名於逺近孫資字彦博講業太學博覧傳記同郡王允一見而竒之董遇及賈洪邯鄲淳薛夏隗禧蘇林樂詳等七人為儒宗王基為中書侍郎時散騎常侍王肅著諸經傳解及論定朝儀改易鄭𤣥舊説而基據持𤣥義嘗與抗衡蜀許慈字仁篤師事劉禧善鄭氏學治易尚書三禮毛詩論語慈終於大長秋譙周字允南為光禄大夫周雖不與政事以儒行見禮時訪大議輙據經以對而後生好事者亦咨問所疑焉來敏字敬達渉獵書籍善左氏春秋先主定益州署敏典教校尉廖扶習韓詩歐陽尚書教授嘗數百人不應辟召時號北郭先生二子孟舉並知名張裔字君嗣治公羊春秋渉經史位至輔漢將軍文立字廣林少治毛詩三禮兼通羣書伍梁字德山以儒學節操稱從議郎遷諫議大夫五官中郎將向朗字巨達領丞相長史初朗少時雖渉獵文學然不治素簡以吏能見稱自去長史優游無事垂三十年乃更濳心典籍孜孜不倦開門接賔誘納後進但講論古義不干時事以是見稱上自執政下及童冠皆敬重焉後以功封顯名亭侯位特進卒吳張昭字子布彭城人少好學從白侯子安受左氏春秋博覧衆書位至輔吳將軍諸葛瑾字子瑜少游京師治毛詩尚書左氏春秋後拜大將軍左都䕶領豫州牧闞澤字德潤為太子太傳領中書每朝廷大議經典所疑輙諮訪之以儒學勤勞封都鄉侯張紘字子綱廣陵人少游學京都紘入太學事博士韓宗治京氏易歐陽尚書又於外黄從濮陽闓受韓詩及禮記左氏春秋後曹公以紘為㑹稽東部都尉孫權以為長史卒劉游舉孝亷為郎中祖父本師受經傳學羣書號為通儒舉賢良方正為般長卒官伯父寵字祖榮受文業以經明行修舉孝亷光禄大夫察四行除東平陵令程秉字德樞事鄭𤣥後避亂交州與劉熙考論大義遂博通五經士爕命為長史孫權聞其名儒以禮徵秉既到拜太子太傅嚴略字曼才少耽學善詩書三禮又好學文終於尚書令沈珩字仲山吳郡人少綜經藝尤善春秋内外傳晉何嵩字泰基寛𢎞愛士博觀墳籍尤善史漢少厯清官領著作郎閻纉字續伯僑居河南新安少游英豪多所交結博覧墳典該通物理纉位至漢中太守杜預為春秋左氏傳集解時王濟解相馬又甚愛之而和嶠頻聚斂預嘗稱濟有馬癖嶠有錢癖武帝聞之謂預曰卿有何癖曰臣有左傳癖侯使光儒博學古厯官著續文華奏議皆有條理後終於少府范寗為中書侍郎時更營新廟博求辟雍明堂之制寗據經傳奏上皆有典證孝武帝雅好文學甚被親愛朝廷疑議輙諮訪之摯虞字仲治京兆長安人少事皇甫謐才學通博著述不倦厯官至太常卿戴若思弟邈字望之少好學尤精史漢才不逮若思儒學過之弱冠舉秀才位至尚書僕射范平字子安吳郡錢塘人研覧墳索初仕吳為臨海太守謝病還家敦悦儒學三子奭咸泉並以儒學至大官杜夷字行齊盧江灊人世以儒學稱永嘉初公車徵拜博士不就徐苗字仲胄髙密淳于人累世相承皆以博士為郡守范𢎞之字長文雅正好學以儒術皆明為太學博士王歡字君厚樂陵人安貧樂道專精耽學遂為通儒嗣後慕容暐襲號署官至祭酒王隐以儒素自守不交勢援博學多聞受父遺業西都舊事多所諳究隱後為著作郎賜爵平陵鄉侯袁亮字貞固有學行亮子粲文學博識累為儒官凉茂字伯方少好學論議嘗據經典以處是非茂終於太子太傅康峻厯郡功曹舉計掾州辟從事太常鄭袤見峻大竒之舉為博士時重莊老而輕經史峻懼雅道陵遲乃濳心儒典郗鑑字道徽少孤貧博覧經籍躬耕隴畆吟詠不倦以儒雅著名不應州命陳邵字節良東海襄賁人郡察孝亷不就以儒學徵為陳留内史累遷燕王師董景道字文博明春秋三傳京氏易馬氏尚書韓詩皆精究大義三禮之義專遵鄭氏著禮通論非駁諸儒演廣鄭㫖至劉曜時徵為散騎常侍固辭遂以夀終庾乗遊學宫為諸生傭後能講論自以卑等每處下坐諸生博士皆就讐問由是學中以下坐為貴范宣雖閒居屢空嘗以講論為業譙國戴逵等皆聞風宗仰自遠而至諷讀之聲有若齊魯後詔徵為太學博士散騎郎並不就華􅛫都督河北諸軍事坐事免官削爵土棲遲家巷垂十載教誨子孫講誦經典集經書要事名曰善文行於世姜龕天水人姚興時與東平淳于岐馮翊郭髙等皆耆儒碩德經明行修各門徒數百教授長安諸生自遠而至者數千人興每於聽政之暇引龕等于東堂講論道藝錯綜明理凉州胡辨符堅之末東徙雒陽教授弟子百餘人闗中後進多赴之講業興􅎁闗尉曰諸生諮訪道義修已厲行往來出入勿拘常限於是學者咸勸儒風盛焉册府元龜卷七百六十七
