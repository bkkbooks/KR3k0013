body:
  text: 册府元龜卷四百六十四宋王欽若等撰臺省部謙退第二南齊王儉建元二年為左僕射領選儉固請解選表曰逺尋終古近察身事邀恩幸藉未見其倫何者子房之遇漢后公逹之逢魏君史籍以為美談君子稱其高義二􅒳才堪王佐理非曲私兩主專仗威武有傷寛裕豈與庸流之人憑含𢎞之澤者同年而語哉預在有心胡寧無感如使傾宗殞元有益塵露猶當畢志驅馳仰酬萬一豈容稍存形飾以狥常事九流任要風猷所先玉石朱素繇斯而定臣亦不謂文案之間都無微解至于品裁臧否特所未閑雖存自朂識不副意兼且兩任彼此俱壅專情本官庶幾髣髴且前代掌選未必具在代來何為於今非臣不可傾心奉國匪復退讓之典預同休戚寧俟位任為親陛下若不以此理賜期豈仰望于殊眷頻冐嚴威分甘尤戾見許加侍中固讓復兼散騎常侍武帝永明六年儉啓解選不許七年乃上表曰臣比年辭選具簡天明欵言彰於侍接丹誠布于朝野物議不以為非聖心未垂矜納臣聞知慧不如明時求之微躬實允斯義妄庸之人沉浮無取命偶休泰遂踐康衢秋葉辭條不假風飈之力太陽躋景無俟螢爝之暉晦徃明來五德逓運聖不獨治八元亮采臣逢其時而叨其位常總右端亟管銓衡事渉兩朝嵗綿一紀盛年已老孫孺巾冠人物徂遷逝者將半三考無聞九流寂寞能官之詠輟響于當時大車之刺方興于來日若夫珥貂衣衮之貴四輔六教之華誠知非服職務差簡端揆雖重猶可勉勵至于品藻之任尤懼其阻夙宵罄竭屢試無庸歲月之乆近世罕比非惟悔愧在身故乃惟塵及國方今多士盈朝羣才競爽選衆而授古亦何人冐陳微翰必希天炤至敬無文不敢煩黷見許改領中書監參掌選事李安民遷尚書左僕射尋上表以年疾求退改授散騎常侍金紫光禄大夫庾杲之為通直常侍臨終上表曰臣昨夜及旦更增氣疾自省綿痼頃刻危殆無容復卧任居隆顯貽塵明世乞解所忝待終私庭臣以凢庸謬徼昌運奬擢之厚千載艱逢且年踰知命志事榮顯修天有分無所厝言若天鑒微誠蹔借餘厯傾宗殞元陳力無逺仰違庭闕伏枕鯁戀送貂蟬及章詔不許謝朓為吏部郎上表三讓中書疑朓官未及譲以問國子祭酒沈約約曰宋元嘉中范曄譲吏部朱修之譲黃門蔡興宗譲中書並三表詔答其事宛然近世小官不譲遂成常俗恐此有乖譲意王藍田劉安西並貴重初不自譲今豈可慕此不譲邪孫興公孔顗並譲記室今豈可三署皆譲耶謝吏部今授超階譲别有意豈闗官之大小撝謙之美本出人情若大官必譲便與詣闕章表不異例既如此謂都自非疑朓又啓譲帝優答不許王晏為吏部尚書永明八年改領右衞將軍陳疾自解明年遷侍中領太子詹事本州中正又以疾辭柳世隆為尚書令世隆少立功名晩專以談議自業在朝不干世務垂簾鼔琴風韻清逺甚獲世譽以疾遜位改授侍中衞將軍不拜轉左光禄大夫侍中如故王思逺為吏部郎思逺以從兄晏為尚書令不欲並居内臺權要之職上表固譲曰近頻煩歸啓實有微槩陛下矜遇之厚古今罕疇臣若孤恩誰當戮力既自誓輕命不復以塵黷為疑正以臣與晏地惟密親必不宜俱居顯要慺慺丹赤守之以死臣實庸鄙無足奬進陛下甄拔之肯要是許其一節臣果不能以理自固有乖則哲之明犯冒之尤誅責在已謬賞之私惟塵聖鑒權其輕重寧守褊心且亦縁陛下以德御下故臣可得以禮進退伏願恩垂拯宥不使零墜今若祗膺所忝三錫不足為泰犯忤之後九泉未足為劇而臣茍求刑戮自棄富榮愚夫不為臣亦庶免此心此志可憐可矜如其上命必行請罪非理留恩方置之通塗而臣固求擯壓自愍自悼不覺涕流謹冒鈇鉞悉心以請窮則呼天仰期一炤明帝知其意乃改授司徒左長史王志為吏部尚書崔惠景平以例加右將軍封臨汝侯固讓不受改領右衞將軍後為中書令及居京尹便懷止足嘗謂諸子姪曰謝莊在宋孝武世位止中書令吾自視豈可以過之因多謝病簡通賓客梁王茂自江州刺史遷尚書右僕射固辭改授侍中中衞將軍領太子詹事後梁王操為尚書令参掌選事領荆州刺史操既位居朝右每自挹損深得當時之譽陳杜之偉梁末為中書侍郎領大著作髙祖受禪除鴻臚卿餘並如故之偉啓求解著作曰以紹泰元年忝中書侍郎掌國史于今四載臣本庸賤謬蒙盻識思報恩奬不敢廢官皇歴惟新驅馭軒昊記言記事未易其人著作之才更宜選衆御史中丞沈烱尚書左丞徐陵梁前兼大著作虞荔梁前黃門侍郎孔瓊或清文贍筆彊記稽古遷董之任允屬羣才臣無容遽戀市朝再妨賢路堯朝皆譲誠不可追陳力就列庶幾知免優勑不許徐陵大建元年除尚書右僕射三年遷左僕射陵抗表推周𢎞正王勵等高宗召陵入殿曰卿何為固辭此職而舉人乎陵曰周𢎞正從陛下西還舊藩長史王勵太平中相府長史張種帝鄉賢戚若選賢與舊臣宜居後固辭累日高宗苦戒勵之陵乃奉詔姚察為吏部尚書雅允朝望初吏部尚書蔡徵移中書令後主方擇其人尚書令江總等咸薦察勅答曰姚察非唯學藝優博亦是操行清修典選難才今得之矣察垂涕拜請曰臣頃來忝竊乆知逾分特以東朝攀奉恩紀謬加今日濫叨非繇才舉縱陛下特眷庸薄其如朝序何臣九世祖信名高徃代當時纔居選部自後罕有繼蹤臣遭逢盛擢沐浴恩造累至非據每切妨賢臣雖無識頗知審已言行所踐無期榮貴豈意銓衡之重妄委非才且皇朝御歴事高昔代羽儀世胄帷幄名臣若授受得宜方為稱職臣夙陶教義必知不可後主曰選事之舉僉議所歸昔毛玠雅量清恪盧毓心平體正王藴銓量得地山濤舉不失才就卿而求必兼此矣且我與卿雖君臣禮隔情分殊常藻鑒人倫良所期寄亦以無慙則哲也後魏穆壽太武時為侍中中書監領南部尚書進爵宜都王加東征大將軍辭曰臣祖崇先皇之世屬値艱危幸天贊梁眷誠心密告故得効功前朝流福於後昔陳平受賞歸功無知今眷元勲未録而臣獨奕世受榮豈惟仰愧古賢抑亦有虧國典太武嘉之乃求眷後得其孫賜爵郡公陸麗太武時為南部尚書太武末麗與長孫渴侯等迎立文成興安初封平原王加撫軍將軍麗辭曰陛下以正統之重承基繼業至於奉迎守順臣職之常豈敢冒昧以干大常頻譲再三詔不聴麗乃答曰臣父歴奉先朝忠勤著稱今年垂西夕未登王爵臣㓜荷寵榮於分已過愚欵之情未申犬馬之効未展願載廻恩聽遂其所請文成曰朕為天下主豈不能得二王封卿父子也乃以其父俟為東平王麗尋遷侍中撫軍大將軍司徒公復其子孫賜妻妃號麗以優寵既頻固辭不受文成益重之伊馛為振威將軍眞君初太武欲拜馛為尚書郡公馛辭曰尚書務殷公爵至重非臣年少愚近所宜荷任請收過恩太武問其欲馛曰中秘二省多諸文士若恩矜不已請參其次太武賢之遂拜中䕶軍秘書監高允為中書侍郎授經於恭宗甚見禮待及高宗即位允有謀焉司徒陸麗等皆受賞允既不蒙異又終身不言其忠而不伐皆此類也獻文時為中書監加㪚騎常侍太和二年以老乞還鄉里章十餘上卒不聽許遂以疾告歸其年詔以安車徵允勅州郡發遣至都拜鎭軍大將軍領中書監固辭不許是時貴臣之門皆擁列顯官而允子弟皆無顯官列爵其亷退若此賈秀為中書侍郎時中書令渤海高允俱以舊儒見重于時皆選擬方岳以詢訪被留各聽長子出為郡守秀辭曰爰自愚微承乏累紀少而受恩老無成効恐先草露無報殊私豈直無功之人超齊先逹雖仰感聖慈而俯深驚懼乞收成命以免微臣遂固譲不受封囘孝明帝時為殿中尚書頻表捐職以為右光禄大夫游肇為尚書右僕射孝明初近侍羣官預在奉迎者自侍中崔光已下並加封邑時封肇文安縣開國侯食邑八百户肇獨曰子襲父位今古之常因此獲封何以自處固辭不應論者高之子祥字宗良頗有學歴秘書郎襲爵新泰伯遷通直郎國子博士領尚書郎中孝明以肇昔辭文安之封復欲封祥祥守其父意卒亦不受又追論肇前議清河守正不屈乃封祥高邑縣開國侯邑七百户辛雄為尚書右丞會爾朱榮入雒及河陰之難濳竄不出莊帝以為度支尚書元顥之入雒也北中郎將楊侃從駕北出莊帝以侃為度支尚書及乘輿反雒復召雄面辭曰臣不能死事俛眉從賊乃是朝廷罪人縱陛下不賜誅罰而北來尚書勲高義重臣宜避賢路莊帝曰卿直還本司朕當别有處分遂解侃尚書北齊李元忠為侍中嘗布言於執事曰年漸遲暮志力以衰乆忝名官以妨賢路若朝廷厚恩未便放棄者乞在閑冗以養餘年武平元年除東徐州刺史固辭不拜後周李逺除尚書左僕射逺白太祖曰逺秦隴匹夫才藝俱闕平生念望不過一郡守爾遭逢際㑹得奉聖明主貴臣遷以至於此今位居列上爵邁通侯受委方面生殺在手非直榮寵一時亦足光華身世但尚書僕射任居端揆今以賜授適所以重其罪責明公若欲全之乞寢此授太祖曰公勲徳兼美朝廷欽屬選衆而舉何足為辭且孤之於公義等骨肉豈容於官位之間便致退譲深乖所望也逺不得已方拜職趙善初仕西魏文帝大統三年轉左僕射兼侍中監著作領太子詹事善性温恭有器局雖位居端右而愈自謙退其職務克舉則曰某官之力若有罪責則曰善之咎也時人稱其公輔之量太祖亦雅重焉陸逞為納言以疾不堪劇任除宜州刺史奉辭例備鹵簿逞以時屬農要奏請停之武帝深嘉焉詔遂其所請以彰雅操隋盧愷開皇初為吏部侍郎攝尚書左丞八年帝親考百僚以愷為上愷固謝不敢受高祖曰吏部勤幹舊所聞悉今者上考僉議攸同當仁不譲何媿之有皆在朕心無勞飾譲歲餘拜禮部尚書攝吏部尚書事韋世康為吏部尚書嘗因休暇而謂子弟曰吾聞功遂身退古人常道今年將耳順志在懸車汝輩以為云何子福嗣答曰大人澡身浴德名立官成盈滿之誡先哲所重欲追蹤二疏伏奉尊命後因侍宴世康再拜陳譲曰臣無尺寸之功位亞台鉉今犬馬齒臷不益明時恐先朝露無以塞責願乞骸骨退避賢能帝曰朕夙夜庶幾求賢若渴冀與公共治天下以致太平今之所請深乖本望縱令筋力衰謝猶屈公卧治一隅於是出拜荆州總管時天下唯置四大總管并揚益三州並親王臨統唯荆州委於世康時論以為美唐武士彠武德中為工部尚書判六尚書賜實封八百户士彠為性亷儉期於止足殊恩雖被固辭不受前後三譲方遂所陳岑文本為中書侍郎進位銀青光禄大夫及庶人承乾廢儲宮初建名士多兼領宮官太宗亦欲令文本兼攝文本固辭曰臣以庸材乆踰涯分守此一職嘗懼滿盈豈宜更參春坊以速時謗太宗乃止李日榮開元二年轉刑部尚書日榮上表固辭老疾乞罷職許之元載為户部尚書肅宗元年建辰月以載兼京兆尹上表固譲從之劉晏為户部侍郎兼御史大夫京兆尹充度支等使寶應元年代宗以晏為國子祭酒依前兼御史大夫京兆尹度支使徵利州刺史顔眞卿為户部侍郎時議稱晏以户部侍郎譲眞卿及永泰初晏為東都河南江淮轉運使加檢校吏部尚書上表懇譲曰伏以天官之職帥在冡卿任當選士之權班冠諸曹之首至密者可以啓事至明者可以論才内省無能何堪就列且轉輸之物國家之常千倉萬庾陛下之粟也篙工檝師陛下之人也縱萬億及秭逹於京師邦賦獲殷軍儲克贍此亦常理於臣何功况受任已來淹引歲月減耗頗有委積非多經費所支尚貽聖慮在臣之責實亦難逃夙夜惕厲不遑啓處豈敢取衆人之力已以為勞守臣下之分因而受遺速其官謗紊爾朝經願廻宸光乞寢前命手詔曰卿藴經國之文懐濟時之略軍儲是切轉運攸難勵以公勤適於通變逺疏溝洫績顯京坻爰奬勤勞是明賞勸俾遷六職兼綜九流益用撝謙切陳懇譲宜從雅㫖所請者依暢璀為檢校户部尚書知省事以疾篤遜位許之顔眞卿為刑部尚書魯郡公眞卿抗疏請致仕三表入不許張獻誠大歴三年以檢校戶部尚書知省事獻誠以疾抗疏辭官曰臣聞在滿防溢則無其咎知進􅁯退是必凶終聞之徃賢深以為誡㣲臣獲宥寛政于兹六年猥蒙驅䇿委以心膂總戎持憲按俗宣風皆匪因人率繇睿奬每用刻骨内頌於心何德於天何功至此誓期死節上報生成不謂去嵗以來風痺成疾而聖恩益厚光寵愈深俾堂弟獻功代臣節制授臣右職復檢校戶部尚書渥恩蟬聮晝日三接臣以寢瘵之故竟不得趨拜軒墀授官累日又不得入曹視事多所曠廢職臣之繇今形貌支離精䰟蕩越竊自診視慮不終朝大懼禄位逾涯以速顛沛伏願察臣丹懇罷臣此官消臣滿盈之禍延臣晷刻之命儻光天下照曲遂愚衷粉骨糜軀死將不朽手詔答曰獻誠早分戎閫屢建茂勲出静漢川入司版籍傷和致疹寢疾經時深執謙冲屢陳章表願辭右職冀及痊平嘉茲懇誠曲遂勤請佇聞痊復當有褒昇所請者依闗播自吏部尚書遷兵部播辭疾請罷官改太子少師致仕播致政之後減去僮僕車騎閉闗守静不縈外事士君子重之盧邁為右諫議大夫累上表言時事轉給事中屬校定考課邁固譲以授官日近未有政績不敢當上考時人重之遷尚書右丞韋臯元和九年自忠武節度使為吏部尚書臯自許州拜官以數騎離鎭自北城濳出將吏將餞之不辭訣又移疾譲官遂授太子賔客歸登為右補闕起居舍人凢三任十五年同列當出其下者多以馳騖至顯官而登與右拾遺蔣武退然自守不以淹速介意丁公著自穆宗為太子時為駕部員外郎太子侍讀及穆宗即位未及聽政召居禁中詢訪朝典以宰相許之公著陳懇詞意極切超授給事中賜紫金魚袋未幾遷工部侍郎仍兼集賢殿學士知吏部選事公著知將欲大用以疾辭退因求外官遂授浙西道都團練觀察使蕭俛長慶元年罷相除右僕射俛上表固譲詔曰古者君使臣以禮臣事君以忠季代以還鮮繇兹道先皇帝在位十五載凡解相印者二十人多為大僚或授兵柄矧余小子宜有加焉朝議大夫守右僕射襲徐國公蕭俛以勤事國以疾退身本末初終不失其道既罷樞務俾居端揆茲朕所以加恩超等復吾前言而俛繼有譲章至于三四敦諭頗切陳乞彌堅是用改選部尚書足以表予寵重所以成爾謙光宜欽厥心以保厥位無忝我明命可守吏部尚書俛自居相位孜孜正道重慎名器每下詔命常懼乖當故鮮有簡拔而渉乎刻深然而志嫉姦邪脱屣相位時論翕然稱之白居易太和二年為刑部侍郎三年移疾東歸求為分司除太子賓客令狐楚太和七年為檢校尚書右僕射兼吏部尚書楚奏請居本品之班上以楚退讓之中且合典故特降詔褒之後以左僕射兼吏部尚書固譲僕射優詔許之轉太常卿胡証為户部尚書判度支瀝懇求免期自効藩服拜檢校兵部尚書充嶺南節度使王直方為右補闕太和八年三月為鎭州冊贈副使因令中使宣詔對於浴堂門使令充翰林學士辭譲不受賜以錦綵却令進發盧術為刑部侍郎開成四年三月術瀝懇陳譲乃以術為太子賓客分司東都後唐薛廷珪唐乾寧中為中書舍人駕在華州改散騎常侍㝷請致仕客遊蜀川昭宗遷雒陽徵為禮部侍郎時柳璨屠害朝士衣冠畢罹其毒廷珪以居常退譲獲全入梁為禮部尚書晉顔衍為御史中丞以母老思鄉上章乞解其秩執政議移户部侍郎衍又堅乞罷免扶母東歸汶上尋降詔褒而允之冊府元龜卷四百六十四
