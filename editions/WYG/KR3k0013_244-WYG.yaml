body:
  text: 册府元龜卷二百四十四宋王欽若等撰列國君部休徴戒懼悔過休徴東周之際列國之君其有服強敵而恢霸功紏諸侯而奨王室者皆宗社之所佑神祗之所扶故休徴兆於前功業著於後影響之報毫釐靡差至於天與己蘭文在其手紀諸油素焕若丹青所以先聖修春秋使亂臣賊子懼者葢俾其知運歴之定分非僥倖之所及小既尚爾况其大者乎唐叔虞者周武王子而成王弟初武王與叔虞母會時左傳曰邑姜方娠大叔邑姜武王后齊太公女夢天謂武王曰余命汝生子名虞余與之唐及生子文在其手曰虞故遂因而命之曰虞成王立遂封叔虞於唐齊桓公北征孤竹未至卑耳之谿十里闟然止瞠然視闟住立貎瞠驚視貎援弓将射引而未敢發也謂左右曰見是前人乎左右對曰不見也公曰事其不濟乎寡人大惑今者寡人見人長尺而人物具焉冠右祛衣走馬前疾事其不濟乎寡人大惑豈有人若此者乎管仲對曰臣聞登山之神有俞兒者長尺而人物具焉霸王之君興而登山之神見且走馬前道也祛衣示前有水也右祛衣示從右方涉也至卑耳之谿有贊水者謂贊引渡水者曰從左方涉其深也及冠從右方涉其深也至膝已涉事大濟桓公坐拜管仲之馬前曰仲父之聖至若此寡人之抵罪也乆矣抵當也不知仲父之聖是寡人當有罪乆矣管仲對曰夷吾聞之聖人先知無形今已有形而後知之臣非聖也善承教也善承古人之教也秦文公出獵獲黑龍又夢黄蛇自天下屬地屬著也音之欲反其口止於鄜衍三輔謂山陵間為衍左馮翊鄜縣之衍也文公問史敦秦之太史也敦名敦曰此上帝之徴君其祠之後九年文公獲寶若石云于陳倉北阪城祠之質如石似肝云語辭其神或嵗數來也常以夜光輝若流星從東方來集于祠城若雄雉其聲殷殷野雞夜鳴以一牢祠之名陳寶陳倉縣有寳夫人祠或一嵗二嵗與葉君合葉君神來時天為之殷殷雷聲雉為之雊也穆公病卧五日不寤寤覺也覺音公孝反寤乃言夢見上帝上帝謂天也上帝命穆公平晉亂史書而藏之府府藏書之處也而後世皆曰上天獻公十八年櫟陽雨金自以為得金瑞晉文公初為公子避驪姬之難在翟十二年而去過衛衛文公不禮公出於五鹿五鹿衛地今衛縣西北有地名五鹿陽平元城縣東亦有五鹿乞食於野人野人與之塊公子怒欲鞭之子犯曰天賜也得土有國之祥故以為天賜民以土服又何求焉天事必象十有二年必獲此土復十二年必得五鹿二三子志之歲在夀星及鶉尾其有此土乎天以命矣復於夀星必獲諸侯天之道也繇是始之有此其以戊申乎所以申土也再拜稽首受而載之拜受天賜受塊而載之也及即位後與楚子戰于城濮夢與楚子摶搏手摶也楚子伏已而盬其腦盬啑也子犯曰我得天楚伏其罪吾且柔之矣晉侯上向故得天楚子下向地故伏其罪腦所以柔物楚師果敗楚平王棄疾恭王子也恭王有寵子五人無適立乃望祭羣神請神决之使主社稷而隂與巴姬恭王妾埋璧於室内召五子齊而入康王跨之兩足各跨壁一邉過其上靈王肘加之子比子晢皆逺之平王幼抱其上而拜壓組故康王以長立其子失之靈王及身而弑子比為王十餘日子晢不得立又俱誅四子皆絶無後唯獨棄疾後立為平王竟續楚祀如其神符鄭穆公母曰燕姞文公之賤妾也夢天使與己蘭曰余為伯鯈余而祖也以是為而子以蘭有國香人服媚之如是既而文公見之與之蘭而御之生穆公名之曰蘭宋昭公得公孫周之子也景公無子取得與啓啓得弟也畜諸公宫未有立焉公卒得夢啓北首而寝於盧門之外盧門宋東門也北首死象在門外失國也已為烏而集於其上咮加於南門尾加於桐門桐門北門曰余夢羙必立乃立得大尹奉啓以奔趙簡子疾五日不知人大夫皆懼醫扁鵲視之出董安于問安于簡子家臣扁鵲曰血脉治也而何怪在昔秦繆公嘗如此七日而寤寤之日告公孫支與子輿曰我之帝所甚樂吾所以乆者適有學也帝告我晉國将大亂五世不安其後将霸未老而死霸者之子且令而國男女無别公孫支書而藏之秦䜟於是出矣獻公之亂文公之霸而襄公敗秦師於殽而歸縱滛此子之所聞今主君之疾與之同不出三日疾必間間必有言也居二日半簡子寤語大夫曰我之帝所甚樂與百神遊于鈞天廣樂九奏萬舞不類三代之樂其聲動人心有一熊欲來援我帝命我射之中熊熊死又有一羆來我又射之中羆羆死帝甚喜賜我二笥皆有副吾見兒在帝側帝屬我一翟犬曰及而子之壮也以賜之帝告我晉國且世衰七世而亡嬴姓将大敗周人於范魁之西而亦不能有也今余思虞舜之勲適余将以其胄女孟姚配而七世之孫董安于受言而書藏之以扁鵲言告簡子簡子賜扁鵲田四萬畆他日簡子出有人當道辟之不去從者怒将刃之當道者曰吾欲有謁于主君從者以聞簡子召之曰譆吾有所見子晣也當道者曰屏左右願有謁簡子屏人當道者曰主君之疾臣在帝側簡子曰然有之子之見我我何為當道者曰帝令主君射熊與羆皆死簡子曰是且何也當道者曰晉國且有大難主君首之帝令主君滅二卿夫熊與羆皆其祖也簡子曰帝賜我二笥皆有副何也當道者曰主君之子将克二國於翟皆子姓也簡子曰吾見兒在帝側帝屬我一翟犬曰及而子之長以賜之夫兒何謂以賜翟犬當道者曰兒主君之子也翟犬者代之先也主君之子且必有代及主君之後嗣且有革政而胡服并二國於翟簡子問其姓而延之以官當道者曰臣野人致帝命耳遂不見簡子書藏之府襄子為智伯所攻奔保晉陽原過從後原過趙臣至于王澤見三人自帶以上可見自帶以下不可見與原過竹二節莫通曰為我以是遺趙毋䘏襄子名原過既至以告襄子襄子齋三日親自剖竹有朱書曰趙毋䘏余霍泰山在河東永安縣山陽侯天使也三月丙戌余将使汝反滅智氏汝亦立我百邑余将賜汝林胡之地至于後世且有伉王亦黑龍面而烏噣鬢麋髭􅏋大膺大胷修下而馮左袵界乘修或作随界一作介奄有河宗至于林溷諸貉南伐晉别北滅黑姑襄子再拜受三神之令智伯率韓魏攻晉陽歲餘襄子懼乃夜使相張孟同私于韓魏韓魏與合謀以三月丙戌三國反滅智氏共分其地戒懼夫安不忘危治不忘亂葢先聖之格言有國之攸先也無灾而懼所以為賢有凶稱孤於焉中禮至於彗星既出則薄賦歛而緩刑罰時雨屢愆則絀女謁而放讒佞因戰勝而増惕頋高臺而慮危則知懼天灾重民命而召亂者未之有也宋湣公九年大水魯荘公使臧文仲弔焉曰天作滛雨害於粢盛若之何不弔不為天所愍弔對曰孤實不敬天降之災又以為君憂拜命之辱謝辱厚命臧文仲曰宋其興乎臧文仲魯大夫禹湯罪己其興也浡然浡盛貎桀紂罪人其亡也忽然忽速貎且列國有凶稱孤禮也列國諸侯無凶則常稱寡人言懼而名禮其庶乎言懼罪己名禮稱孤其庶㡬於興既而聞之曰公子御説之辭也宋荘公子臧孫逹曰是宜為君有恤民之心齊桓公夜半不嗛易牙乃煎熬燔炙和調五味而進之桓公食飽至旦不覺曰後世必有以味亡其國者景公時彗星出公謂晏子曰寡人聞之彗星出其所向之國君當之今彗星出而向吾國我是以悲晏子曰君之行義固邪無徳於國穿閣池則欲其深以廣也為臺榭則欲其高且大也賦斂撝奪糾繆仇讐自是觀之弗乆将出天之變彗星之出庸何傷乎於是公懼乃歸填閣池减臺榭薄賦斂緩刑罰三十七日而彗星亡也魯僖公時雨澤不澍至于九月人大驚懼率羣臣禱山川以有事謝過自讓絀女謁放讒佞郭都之等十三人誅領人之吏受貨賂趙祝等九人曰辜在寡人方天旱野無生稼寡人當死百姓何謗請以身塞無状也秦穆公時楚人滅江公為之降服出次不舉過數降服素服也出次辟正寝不舉去盛饌鄰國之禮有數今秦伯過之大夫諫公曰同盟滅雖不能救敢不矜乎吾自懼也晉文公得南之威三日不聼朝遂推南之威而逺之曰後世必有以色亡其國者又嘗與楚得臣戰于城濮焚楚軍火數日不息文公歎左右曰勝楚而君猶憂何文公曰吾聞能戰勝安者唯聖人是以懼且子玉猶在庸可喜乎子玉之敗而歸楚成王怒其不用己言貪與晉戰讓責子玉子玉自殺文公曰我撃其外楚誅其内於是乃喜楚王史失其謚登強臺而望山川左江右湖以臨彷徨其樂忘死遂盟強臺而弗登曰後世必有以高臺陂池亡其國者荘王見天不見妖地不出孽則禱于山川曰天其忘余歟越王勾踐與吳戰大敗之兼有南夷當是之時也南面而立近臣三逺臣五令諸侯大夫曰聞過而不以告我者為上戮此處尊位而恐不聞其過也悔過過而能改春秋之所韙不逺而復大易之所載葢君子省躬責己彰往察來唯道是從聞義則服斯可尚也已昔者宗周監二代之制列五等之爵叶利建之象崇夾輔之義東遷之後庶邦力政刑威慶賞繇已而出乃有席千乗之勢居三揖之上咈讜正之議失防閑之道或知其謀而不用或察其賢而見戮或肆一時之忿或舉無名之役而能知非引咎負愧懐恥飜然内省務修厥徳大則成定霸之業小則得為君之體遷善之益斯可見焉魯隱公五年春公将如棠觀魚者臧僖伯諫公曰吾将畧地焉孫辭以畧地遂往陳魚而觀之大設捕魚之備而觀之僖伯稱疾不從冬僖伯卒公曰叔父有憾於寡人諸侯稱同姓大夫長曰伯父次曰叔父有憾諫觀魚不聼寡人弗敢忘塟之加一等加命服之等鄭荘公母曰武姜生荘公及共叔段荘公寤生驚姜氏遂惡之愛共叔段及荘公即位為之請京使居之大叔命西鄙北鄙貳於己鄙鄭邊邑貳兩属大叔完聚繕甲兵具卒乘将襲鄭夫人将啓之啓開也公聞其期命子封帥車二百乘以伐京京叛大叔段段入于鄢公伐諸鄢大叔出奔共共國今汲郡共縣遂寘姜氏於城潁城潁鄭邑而誓之曰不及黄泉無相見也地中之泉故曰黄泉既而悔之潁考叔為潁谷封人封人典封疆者聞之有獻於公公賜之食食舍肉公問之對曰小人有母皆嘗小人之食矣未嘗君之羮請以遺之食而不啜羮欲以發問也宋華元殺羊為羮享士葢古賜賤官之常公曰爾有母遺繄我獨無繄語助潁考叔曰敢問何謂也據武姜在設疑也公語之故且告之悔對曰君何患焉若闕地及泉隧而相見其誰曰不然隧今延道公從之公入而賦大隧之中其樂也融融賦賦詩也融融和樂也姜出而賦大隧之外其樂也洩洩洩洩舒散也遂為母子如初君子曰潁考叔純孝也純猶篤也愛其母施及荘公詩曰孝子不匱永錫爾類其是之謂乎不匱純孝也荘公雖失之於初孝心不忘考叔感而通之所謂永錫爾類詩人之作各以情言君子論之不以文害意故春秋傳引詩不皆與今説詩者同餘皆倣此文公十二年晉文公秦穆公圍鄭佚之狐言於鄭伯曰國危矣若使燭之武見秦君師必退佚之狐燭之武皆鄭大夫公從之辭曰臣之壮也猶不如人今老矣無能為也已公曰吾不能早用子今急而求子是寡人之過也然鄭亡子亦有不利焉許之夜縋而出見秦伯秦伯乃還晉惠公既殺里克而悔之曰芮也使寡人過殺我社稷之鎮芮冀芮鎮重也文公之豎頭須守藏者也頭須一曰里鳬須豎左右小吏其出也竊藏以逃文公出時盡用以求納之求納文公及入求見公辭焉以沐謂僕人曰沐則心覆心覆則圖反宜吾不得見也居者為社稷之守行者為覊絏之僕其亦可也何必罪居者國君而讐匹夫懼者甚衆矣僕人以告公遽見之言棄小怨所以能安衆文公反國賞從亡者介之推不言禄禄亦弗及與母偕隱而死晉侯求之弗獲以綿上為之田曰以志吾過且旌善人悼公二年會單頃公及諸侯同盟于鷄澤單頃公王卿士公之弟揚干亂行于曲梁行陳次魏綘戮其僕僕御也公怒謂羊舌赤曰合諸侯以為榮也揚干為戮何辱如之必殺魏綘無失也對曰綘無二志事君不辟難有罪不逃刑其将來辭何辱命焉言終魏綘至授僕人書僕人晉侯御僕将伏劒士魴張老止之公讀其書曰日君乏使使臣斯司馬斯此也臣聞師衆以順為武順莫敢違軍事有死無犯為敬守官行法雖死不敢有違君命合諸侯臣敢不敬君師不武執事不敬罪莫大焉臣懼其死以及掦干無所逃罪懼自犯不武不敬之罪不能致訓至於用鉞用鉞斬揚干之僕臣之罪重敢有不從以怒君心言不敢不從戮請歸死於司冦致命於司冦使戮之公跣而出曰寡人之言親愛也吾子之討軍禮也寡人有弟弗能教誨使干大命寡人之過也子無重寡人之過聼綘死為重過敢以為請請使無死晉侯以魏綘為能以刑佐民矣反役與之禮食使佐新軍羣臣旅㑹今欲顯綘故特為設禮食張老為中軍司馬代魏綘士富為候奄代張老士富士㑹别族衛成公三年晉文公将伐曹假道於衛衛人弗許晉侯齊侯盟于斂㿻衛地衛侯請盟晉人弗許衛侯欲與楚國人不欲故出其君以説於晉衛侯出居襄牛聞楚師敗懼出奔楚遂適陳使元咺奉叔武以受盟奉使攝君事也或訴元咺於衛侯曰立叔武矣其子角從公公使殺之咺不廢命奉夷叔以入守夷諡晉侯復衛侯衛侯先期入不信叔武寗子先長牂守門以為使也與之乘而入長牂衛大夫寗子患公之欲速故先入欲安喻國人公子歂犬華仲前驅衛使遂驅奄寗子未備二子衛大夫叔武将沐聞君至喜捉髪走出前驅射而殺之公知其無罪也枕其股而哭之公以叔武尸枕其服歂犬走出手射叔武故公使殺之秦穆公三十二年将襲鄭訪諸蹇叔蹇叔曰勞師以襲逺非所聞也公辭焉辭不受其言召孟明西乞白乙使出師蹇叔哭之曰孟子吾見師之出而不見其入也公使謂之曰爾何知中壽爾墓之木拱矣秦師遂東晉襄公敗秦師于殽獲百里孟明視西乞術白乙丙以歸文嬴請三帥文嬴晉文公始適秦秦穆公所妻夫人襄公嫡母公許之秦伯素服郊次待之於郊鄉師而哭曰孤違蹇叔以辱二三子孤之罪也不替孟明孤之過也大夫何罪且吾不以一眚掩大徳秦大夫及左右皆言於秦伯曰是敗也孟明之罪也必殺之秦伯曰是孤之罪也周芮良夫之詩曰大風有隧貪人敗類詩大雅隧蹊徑也周大夫芮伯刺厲王言貪人之敗善類如大風之行毁壞衆物所在成蹊徑聼言則對誦言如醉言昏亂之君不好典誦之言聞之若醉得道聼塗説之言則喜而對答匪用其良覆俾我悖覆反也俾使也不用良臣之言反使為悖亂是貪故也孤之謂矣孤實貪以禍夫子夫子何罪復使為政乃作秦誓晉舍三帥還歸穆公悔過作誓公曰嗟我士聼無譁誓其羣臣通稱士也予誓告汝群言之首衆言之本要古人有言曰民訖自若是多盤言民之行已盡用順道是多樂稱古人言悔前不順忠臣責人斯無難惟受責俾如流是惟艱哉人之有罪以義責之此無難也若己有非惟受人責即改之如水流下是惟艱哉我心之憂日月逾邁若弗云來言我心之憂欲改過自新如日月竝行過如不復云來雖欲改悔恐死及之無所益惟古之謀人則曰未就予忌惟為我執古義之謀人謂忠賢蹇叔等也則曰未成我所欲反忌之耳惟今之謀人姑将以為親惟指今事為我所謀之人我且将以為親而用之悔前違古從今以取破敗也雖則云然尚猷詢兹黄髪則罔所愆言前雖則有云然之過今我庶幾以道謀此黄髪賢老則行事無所過矣畨畨良士旅力既愆我尚有之勇武畨畨之良士雖衆力已過者我今庶幾欲有此人而用之仡仡勇夫射御不違我尚不欲仡仡壮勇之夫雖射御不違我庶幾不欲用自悔之至惟截截善諞言俾君子易辭我皇多有之昧昧我思之惟察察便巧善為辯佞之言使君子囘心易辭我前多有之以我昧昧思之不明故也如有一个臣斷斷猗無他技其心休休焉其如有容焉如有一个斷斷猗然專一之臣雖無他技藝其心休休焉樂善其如是則能有所容言将任之人之有技若己有之人之彦聖其心好之不啻若自其口出寔能容之人之有技若己有之樂善之至也人之彦聖其心好之不啻若自其口出心好之至也是人必能容之以保我子孫黎民尚亦有利哉用此好技聖之人安我子孫衆人亦主有利哉言能興國人之有技􅎱疾以惡之人之彦聖而違之俾不通見人之有技藝蔽􅎱疾害以惡之人之彦聖而違背壅塞之使不得上通寔不能容以不能保我子孫黎民亦曰殆哉􅎱疾之人寔不能容人豈能安我子孫衆人亦曰危殆哉邦之杌隉曰由一人杌隉不安言危也一人所任用國之傾危曰由所任不容賢邦之榮懷亦尚一人之慶國之光榮為民所歸亦庶幾其所任用賢之善也穆公陳戒背賢則危用賢則榮自誓改前過之意一説穆公復使孟明視等将兵伐晉戰于彭衙馮翊鄧陽縣西北有衙城秦不利引兵歸三十六年穆公復益厚孟明等使将兵伐晉渡河焚舟大敗晉人取王官及鄗以報殽之役晉人皆城守不敢出於是繆公乃自茅津在大陽渡河封殽中尸封識之為發䘮哭之三日乃誓於軍曰嗟士卒聼無譁余誓告汝古之謀人黄髪畨畨則無所過以申思不用蹇叔百里奚之謀故作此誓令後世以記吾過君子聞之皆為垂涕曰嗟乎秦穆公之與人周也周備也卒得孟明之慶齊頃公魯成公八年晉侯使韓穿來言汶陽之田歸之於齊來言者何内辭也脅我使我歸之也曷為使我歸之據本魯邑鞌之戰齊師大敗齊侯歸弔死視疾七年不飲酒不食肉晉侯聞之曰嘻奈何使人之君七年不飲酒不食肉請皆反其所侵地晉侯聞齊侯悔過自責高其義畏其徳使諸侯還鞌之所䘮邑魯見使卑有恥故諱不言使者因兩為其義諸侯不得相奪土地晉適可來議語之魯宜聞義自歸之爾不得使也主書者善晉之義齊楚武王使莫敖伐羅大敗縊於荒谷群帥囚于冶父縊自經也荒谷冶父皆楚地以聼刑楚子曰孤之罪也皆免之荘王即位三年不出號令日夜為樂令國中曰有敢諫者死無赦伍舉入諫荘王左抱鄭姬右抱越女坐鍾皷之間伍舉曰願有進隱隱謂隱藏其言曰有鳥在於阜三年不蜚不鳴是何鳥也荘王曰三年不蜚蜚将冲天三年不鳴鳴将驚人舉退吾知之矣居数月滛益甚大夫蘇從乃入諫王曰若不聞令乎對曰殺身以明君臣之願也於是乃罷滛樂聼政所誅者數百人所進者數百人任伍舉蘇從以政國人大説恭王有疾召令尹曰常侍􅀢蘇與我處常忠我以道正我以義吾與處不安也不見不思也雖然吾有得也其功不細必厚爵之申侯伯與我處常縱恣吾所樂者勸吾為之吾所好者先吾服之吾與處歡樂之不得則慼雖然吾終無得也其過不細必亟遣之令尹曰諾明日王薨令尹即拜􅀢蘇為上卿而逐申侯伯出之境曾子曰鳥之将死其鳴也哀人之将死其言也善言反其本性恭王之謂也故孔子曰朝聞道夕死可矣於以開後嗣覺來世猶愈沒身不寤者也昭王十年吳蔡伐楚昭王亡十一年復入于郢初王之奔隨也将渉于成臼江夏竟陵縣西有臼水出聊屈山西南入漢藍尹亹涉其帑亹楚大夫不與王舟及寧王欲殺之寧安定也子西曰子常唯思舊怨以敗君何效焉王曰善使復其所吾以志前惡惡過也宋昭公出亡至於鄙喟然歎曰吾知所以亡矣吾朝臣千人發政舉事無不曰吾君聖者侍御者數百人被服以立無不曰吾君麗者内外不聞吾過是以至此齊景公與魯定公為夾谷之會知義不若歸而大恐告其群臣曰魯以君子之道輔其君而子獨以夷狄之道教寡人使得罪於魯君為之奈何有司進對曰君子有過則謝以質小人有過則謝以文君若悼之則謝以實于是齊侯乃歸所侵魯之鄆汶陽龜隂之田以謝過晏子化東阿三年景公召而數之晏子請改道易行明年上計景公迎而賀之晏子對曰臣前之化東阿也屬託不行貨賂不至君反以罪臣今則反是而更蒙賀景公下席而謝魏惠王時魏相公叔痤薦公孫鞅於王不能用遂西入秦事秦孝公孝公使将兵擊魏軍盡破之以歸秦魏繇是徙都大梁惠王曰寡人恨不用公叔痤之言也燕惠王昭王子也初樂毅為昭王謀必待諸侯兵齊乃可伐也於是乃使樂毅使諸侯遂合連四國之兵以伐齊大破之閔王亡逃僅以身脱匿莒樂毅追之遂屠七十餘城臨淄盡降唯莒即墨未下盡復收燕寶器而歸復易王之辱樂毅請罷諸侯之兵獨圍莒即墨時田單為即墨令患樂毅善為兵田單不能詐也欲去之昭王又賢不肯聼讒會昭王死惠王立田單使人讒之惠王惠王聼讒使騎刼代樂毅将而召毅毅畏誅西降趙田單與騎刼戰遂破刼逐燕北至河上盡復得齊城惠王後悔使騎刼代樂毅以故破軍亡将失齊又恐樂毅之降趙恐趙用樂毅而乘燕之弊以伐燕惠王乃使讓樂毅且謝之曰先王舉國而委将軍為燕破齊報先王之讐天下莫不震動寡人豈敢一日而忘将軍之功哉會先王棄羣臣寡人新即位左右誤寡人寡人之使騎刼代将軍為将軍乆暴露於外故召将軍且休計事将軍過聼以與寡人有隙遂捐燕歸趙将軍自為計則可矣而亦何以報先王所以遇将軍之意乎樂毅報遺惠王書曰臣不佞不能奉承王命以順左右之心恐傷先王之明有害足下之義故遁逃走趙今足下使人數之以罪臣恐侍御者不察先王之所以畜幸臣之理又不白臣之所以事先王之心故敢以書對臣聞聖賢之君不以禄私親其功多者賞之其能當者處之故察能而授官者成功之君也論行而結交者立名之士也臣竊觀先王之舉也見有高世主之心故假節於魏而以身得察於燕先王過舉厠之賓客之中立之群臣之上不謀父兄以為亞卿臣竊不自知自以為奉令承教可幸無罪故受令而不辭先王命之曰我有積怨深怒於齊不量輕弱而欲以齊為事臣曰夫齊霸國之餘業而最勝之遺事也練於兵甲習於戰攻王若欲伐之必與天下圖之與天下圖之莫若於結趙且又淮北宋地楚魏之所欲也趙若許而約四國攻之齊可大破也先王以為然具符節南使臣于趙頋反命起兵擊齊以天之道先王之靈河北之地隨先王而舉之濟上濟上之軍受命擊齊大敗齊人輕卒鋭兵長驅至國齊王遁而走莒僅以身免珠玉財寶車甲珍器盡收入于燕齊器設于靈臺大呂陳于元英故鼎反乎磨室磨歴也薊丘之植植於汶篁竹田曰篁謂燕人疆界移于齊之汶水自五伯已來功未有及先王者也先王以為慊於志故裂地而封之使得比小國諸侯臣竊不自知自以為奉命承教可幸無罪是以受命不辭臣聞聖賢之君功立而不廢故著於春秋蚤知之士名成而不毁故稱於後世若先王之報怨雪恥夷萬乘之彊國收八百嵗之畜積及至棄群臣之日餘教未衰執政任事之臣修法令慎庶孽施及乎萌𨽻皆可以教後世臣聞之善作者不必善成善始者不必善終昔伍子胥説聼於闔閭而吳王逺迹至郢夫差弗是也賜之鴟夷而浮之江湖吳王不悟先論之可以立功故沈子胥而不悔子胥不蚤見主之不同量是以至於入江而不化夫勉身立功以明先王之迹者臣之上計也離毁辱之誹謗墮先王之名臣之所大恐也臨不測之罪以幸為利義之所不敢出也臣聞古之君子交絶不出惡聲忠臣去國不潔其名臣雖不佞數奉教於君子矣恐侍御者之親左右之説不察疏逺之行故敢獻書以聞唯君王之留意焉於是燕王復以樂毅子樂間為昌國君而樂毅往來復通燕趙以為客卿樂毅卒於趙燕王喜用其相栗腹之計欲攻趙而問昌國君樂間樂間曰趙四戰之國也其民習兵伐之不可燕王不聼遂伐趙趙使廉頗大破栗腹之軍於鄗禽栗腹樂乘者樂間之宗也于是樂間奔趙趙遂圍燕燕重割地以與和趙乃解而去燕王恨不用樂間樂間既在趙乃遺樂間書曰紂之時箕子不用犯諫不怠以兾其聼商容不逹身祗辱焉以兾其變及民志不入獄囚自出然後二子退隱故紂負桀暴之累二子不失忠聖之名何者其憂患之盡矣今寡人雖愚不若紂之暴也燕民之亂不若殷民之甚也室有語不相盡以告鄰里二者寡人不為君取也樂間樂乘怨燕不聼其計二人卒留趙册府元龜卷二百四十四
