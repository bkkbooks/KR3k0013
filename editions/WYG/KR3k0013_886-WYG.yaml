body:
  text: 册府元龜卷八百八十六宋王欽若等撰總錄部游說虞書曰惟口出好興戎春秋傳曰辭之不可以已也三代而下游說興焉盖夫博辯之士智畧輻凑因機乘便反權應變所以釋紛而紓患濟世而成務者也周室既衰羣雄競逐繇是堅白同異矯尾厲角飛鉗捭闔長短縱横之術起焉至乃負笈擔簦以游萬乘之國約車憑軾以行諸侯之間或立談而取封或一見而受賜馳譽於當世樹功於無窮去就繫乎安危用捨成乎治亂者固不乏焉其源出於公孫龍惠施鬼谷蘇張之徒遂流宕而不止漢魏而下雖時有之亦弗能偕戰國之盛也惟韓非著書稱說之難明是非之趣極情偽之辯信乎其知言矣端木賜字子貢衛人衞侯㑹呉于鄖魯哀公及衞侯宋皇瑗盟盟不書畏呉而竊盟而卒辭呉盟呉人藩衞侯之舍藩籬子服景伯謂子貢曰夫諸侯之㑹事既畢矣侯伯至禮地主歸餼侯伯至禮以禮賓也地主所㑹主人也餼生物以相辭也各以禮相辭讓今呉不行禮於衞而藩其君舍以難之難若圍也子盍見太宰乃請束帛以行以賂呉語及衛故若本不為衛請者太宰嚭曰寡君願事衛君衛君之來也緩寡君懼故將止之止執也子貢曰衛君之來必謀於其衆其衆或欲或否是以緩來其欲來者子之黨也其不欲來者子之讐也若執衞君是墮黨而崇讐也墮毁也夫墮子者得其志矣且合諸侯而執衛君誰敢不懼墮黨崇讐而懼諸侯或者難以覇乎太宰嚭說乃舍衛侯又田常欲作亂於齊憚髙國鮑晏故移其兵欲以伐魯孔子聞之謂門弟子曰夫魯墳墓所處父母之國國危如此二三子何為莫出子路請出孔子止之子張子石請行孔子弗許子貢請行孔子許之遂行至齊說田常曰君之伐魯過矣夫魯難伐之國其城薄以卑其地狹以泄其君愚而不仁大臣偽而無用其士民又惡甲兵之事此不可與戰君不如伐呉夫呉城髙以厚地廣以深甲堅以新士選以飽重器精兵盡在其中又使明大夫守之此易伐也田常忿然作色曰子之所難人之所易子之所易人之所難而以教常何也子貢曰臣聞之憂在内者攻强憂在外者攻弱今君憂在内吾聞君三封而三不成者大臣有不聼者也今君破魯以廣齊戰勝以驕主破國以尊臣鮑晏等帥師若破國則臣尊矣而君之功不與焉則交日踈於主是君上驕主心下恣羣臣求以成大事難矣夫上驕則恣臣驕則争是君上與主有郤下與大臣交争也如此則君之立於齊危矣故曰不如伐呉伐呉不勝民人外死大臣内空是君上無彊臣之敵下無民人之過孤主制齊者惟君也田常曰善雖然吾兵業已加魯矣去而之呉大臣疑我奈何子貢曰君按兵無伐臣請徃見呉王令之救魯而代齊君因以兵迎之田常許之使子貢南見呉王說曰臣聞之王者不絶世覇者無彊敵千鈞之重加銖兩而移今以萬乘之齊而私千乘之魯孰與呉强竊為王危之且夫救魯顯名也伐齊大利也以撫泗上諸侯誅暴齊以服强晉利莫大焉名存亾魯實困强齊智者不疑也呉王曰善雖然吾嘗與越戰棲之㑹稽越王苦身養士有報我心子待我伐越而聼子子貢曰越之勁不過魯呉之强不過齊王置齊而伐越則齊已平魯矣且王方以存亾繼絶為名夫伐小越而畏强齊非勇也夫勇者不避難仁者不窮約智者不失時王者不絶世以立其義今存越示諸侯以仁救魯伐齊威加晉國諸侯必相率而朝呉覇業成矣且王必惡越臣請東見越王令出兵以從此寔空越名從諸侯以伐也呉王大說乃使子貢之越越王除道郊迎身御至舍而問曰此蠻夷之國大夫何以儼然辱而臨之子貢曰今者吾說呉王以救魯伐齊其志欲之而畏越曰待我伐越乃可如此破越必矣且夫無報人之志而令人疑之拙也有報人之意使人知之殆也事未發而先聞危也三者舉事之大患句踐頓首再拜曰孤嘗不料力乃與呉戰困於㑹稽痛入於骨髓日夜焦唇乾舌徒欲與呉王接踵而死孤之願也子貢曰呉王為人猛暴羣臣不堪國家敝於數戰士卒弗忍百姓怨上大臣内變子胥以諫死太宰嚭用事順君之過以安其私是殘國之治也今王誠發士卒佐之以徼其志㣲射其志重寳以說其心卑辭以尊其禮其伐齊必也彼戰不勝王之福也戰勝必以兵臨晉臣請北見晉君令共攻之弱呉必矣其銳兵盡於齊重甲困於晉而王制其敝此滅呉必矣越王大說許諾送子貢金百鎰劍一良矛二子貢不受遂行報呉王曰臣敬以大王之言告越王越王大恐曰孤不幸少失先人内不自量抵罪於呉軍敗身辱棲于㑹稽國為虚莽頼大王之賜使得奉爼豆而修祭祀死不敢㤀何謀之敢慮後五日越使大夫種頓首言於呉王曰東海役臣孤句踐使者臣種敢修下吏問於左右今竊聞大王將興大義誅强救弱困暴齊而撫周室請悉起境内士卒三千人孤請自被堅執銳以先受矢石因越賤臣種奉先人藏器甲二十領鈌屈盧之矛歩光之劍以賀軍吏呉王大說以告子貢曰越王欲身從寡人伐齊可乎子貢曰不可夫空人之國悉人之衆又從其君不義君受其幣許其師而辭其君呉王許諾乃謝越王於是呉王乃遂發九郡兵伐齊子貢因去之晉謂晉君曰臣聞之慮不先定不可以應卒兵不先辦不可以勝敵今夫齊與呉將戰彼戰而不勝越亂之必矣與齊戰而勝必以其兵臨晉晉君大恐曰為之奈何子貢曰修兵休卒以待之晉君許諾子貢去而之魯呉王果與齊人戰於艾陵大破齊師獲七將軍之兵而不歸果以兵臨晉與晉人相遇黄池之上呉晉争强晉人擊之大敗呉師越王聞之渉江襲呉去城七里而軍呉王聞之去晉而歸與越戰于五湖三戰不勝城門不守越遂圍王宫殺夫差而戮其相破呉三年東向而覇故子貢一出存魯亂齊破呉强晉而覇越子貢一使使勢相破十年之中五國各有變公孫鞅衞諸公子聞秦孝公下令國中求賢者將修繆公之業東復侵地乃遂西入秦因孝公寵臣景監以求見孝公孝公既見鞅語事良乆孝公時時睡弗聼罷而孝公怒景監曰子之客妄人耳安足用耶景監以讓鞅鞅曰吾說公以帝道其志不開悟矣後五日復求見鞅鞅復見孝公益愈怒而未中㫖罷而孝公復讓景監景監亦讓鞅鞅曰吾説公以王道而未入也請復見鞅鞅復見孝公孝公善之而未用也罷而去孝公謂景監曰汝客善可與語矣鞅曰吾說公以覇道其意欲用之矣試復見我我知之矣鞅復見孝公公與語不自知膝之前於席也語數日不厭景監曰子何以中吾君吾君之驩甚也鞅曰吾說君以帝王之道比三代而君曰乆逺吾不能待且賢君者各及其身顯名天下安能邑邑待數十百年以成帝王乎故吾以彊國之術說君君大說之爾然亦難以比徳於殷周矣孝公乃以鞅為左庶長蘇秦東周雒陽人西至秦說惠王曰秦四塞之國被山𢃄渭東有關河西有漢中南有巴蜀北有代馬此天府也以秦士民之衆兵法之教可以吞天下稱帝而治秦王曰毛羽未成不可以髙飛文理未明不可以并兼方誅商鞅疾辯士弗用乃之趙趙肅侯令弟成為相號奉陽君奉陽君弗說之去游燕歳餘而後得見說燕文侯曰燕東有朝鮮遼東北有林胡樓煩西有雲中九原南有滹沱易水正北曰并州其川曰滹沱又曰嘑沱出鹵城地方二千餘里帶甲數十萬車六百乘騎六千匹粟支數年南有碣石雁門之饒北有棗栗之利民雖不佃作而足於棗栗矣此所謂天府者也夫安樂無事不見覆軍殺將無過燕者大王知其所以然乎夫燕之不犯冦被甲兵者以趙之為蔽其南也秦趙五戰秦再勝而趙三勝秦趙相斃而王以全燕制其後此燕之所以不犯冦也且夫秦之攻燕也踰雲中九原過代及上谷彌地數千里雖得燕城秦計固不能守也秦之不能害燕亦明矣今趙之攻燕也發號出令不至十日而數十萬之軍軍于東垣矣渡嘑沱渉易水不至四五日而距國都矣故曰秦之攻燕也戰於千里之外趙之攻燕也戰於百里之内夫不憂百里之患而重千里之外計無過於此者是故願大王與趙從親天下為一則燕國必無患矣文侯曰子言則可然吾國小西逼强趙南近齊齊趙彊國也子必欲合從以安燕寡人請以國從於是資蘇秦車馬金帛以至趙而奉陽君已死即因說趙肅侯曰天下卿相人臣及布衣之士皆髙賢君之行義皆願奉教陳忠於前之日乆矣雖然奉陽君妬君而不任事是以賓客游士莫敢自盡於前者今奉陽君捐舘舍君乃復與士民相親也臣故敢進其愚慮竊為君計者莫若安民撫士且無庸有事於民也安民之本在於擇交擇交而得則民安擇交而不得則民終身不安請言外患齊秦為兩敵而民不得安倚秦攻齊而民不得安倚齊攻秦而民不得安故夫謀人之主伐人之國常苦出辭㫁絶人之交也願君慎勿出於口請別白黒所以異隂陽而已矣君誠能聼臣燕必致旃裘狗馬之地齊必致魚鹽之海楚必致橘柚之園韓魏中山皆可使致湯沐之奉而貴戚父兄皆可以受封侯夫割地包利五覇之所以覆軍禽將而求也封侯貴戚湯武之所以放弑而争也今君髙拱而兩有之此臣之所以為君願也今大王與秦則秦必弱韓魏與齊則齊必弱楚魏魏弱則割河外韓弱則效宜陽宜陽效則上郡絶河外割則道不通楚弱則無援此三䇿者不可不熟計也夫秦下軹道則南陽危刼韓包周則趙氏自操兵據衛取淇卷則齊必入朝秦秦欲已得乎山東則必舉兵而嚮趙矣秦甲渡河踰漳據蒲吾常山有蒲吾縣則兵必戰於邯鄲之下矣此臣之所以為君患也當今之時山東之建國莫强於趙趙地方二千餘里帶甲數十萬車千乗騎萬匹粟支十年西有常山南有河漳東有清河北有燕國弱固不足畏也秦之所以害於天下者莫如趙然而秦不敢舉兵伐趙者何也畏韓魏之議其後也然則韓魏趙之南蔽也秦之攻韓魏也無有名山大川之限稍蠶食之傳國都而止韓魏不能支秦必入臣於秦秦無韓魏之規則禍必中於趙矣此臣之所以為君患也臣聞尭無三夫之分舜無咫尺之地以有天下禹無百人之聚以王諸侯湯武之士不過三千車不過三百乗卒不過三萬立為天子者誠得其道也是故明主外料其敵之彊弱内度其士卒賢不肖不待兩軍相當而勝敗存亡之機固已形於胷中矣豈掩於衆人之言而以㝠㝠决事哉臣竊以天下之地圖案之諸侯之地五倍於秦料度諸侯之卒十倍於秦六國為一并力西嚮而攻秦秦必破矣今西面而事之見臣於秦夫破人之與見破於人也臣人之與見臣於人也豈可同日而論哉夫衡人者皆欲割諸侯之地以予秦秦成則髙臺榭美宫室聼竽瑟之音前有樓闕軒轅後有長姣美人國被秦患而不與其憂是故夫衡人日夜務以秦權恐喝諸侯以求割地故願大王熟計之也臣聞眀主絶疑去讒屛流言之迹塞朋黨之門故尊主廣地强兵之計臣得陳忠於前矣故竊為大王計莫如一韓魏齊楚燕趙以從親以畔秦令天下之將相㑹於洹水之上洹水出汲郡林慮縣通質刳白馬而盟要約曰秦攻楚齊魏各出銳師以佐之韓絶其糧道趙渉河漳燕守常山之北秦攻韓魏則楚絶其後齊出銳師以佐之趙渉河漳燕守雲中秦攻齊則楚絶其後韓守成臯魏塞其道趙渉河博關齊威王六年晉伐齊到博陵東郡有博平縣燕出銳師以佐之秦攻燕則趙守常山楚軍武關齊渉渤海韓魏皆出銳師以佐之秦攻趙則韓軍宜陽楚軍武關魏軍河外齊渉清河燕出銳師以佐之諸侯有不如約者以五國之兵共伐之六國從親以賓秦則秦甲必不敢出於凾谷以害山東矣如此則覇王之業成矣趙王曰寡人年少立國日淺未嘗得聞社稷之長計也今上客有意存天下安諸侯寡人敬以國從乃飭車百乗黄金千鎰白璧百䨇錦繡千純純疋端名以約諸侯是時周天子致文武之胙於秦惠王使犀首攻魏禽將龍賈取魏之雕隂且欲東兵蘇秦恐秦兵之至趙也乃激怒張儀入之于秦於是說韓宣惠王曰韓北有鞏洛成臯之固西有冝陽商阪之塞商一作常東有宛穰洧水南有陘山召陵有陘亭密縣有陘山地方九百餘里帶甲數十萬天下之彊弓勁弩皆從韓出谿子許慎云南方谿子蠻夷柘弩皆善射少府時力距來者韓有谿子弩又有少府所造二種之弩案時力者謂作之得時力倍於常故名時力也距來者謂弩勢勁利足以距來敵也皆射六百歩之外韓卒超足而射百發不暇止逺者括蔽洞胸近者鏑弇心韓卒之劍㦸皆出於㝠山莊子曰南行至郢北面而不見㝠山案司馬彪曰㝠山在朔州之北棠谿汝南呉房有棠谿亭墨陽淮南子曰墨陽之莫邪也合賻一作伯鄧師宛馮滎陽有馮池龍淵太阿呉越春秋曰楚王召風胡子而告之曰寡人聞呉有干將越有歐冶寡人欲因子請此二人作劍可乎風胡子曰可乃徃鑄劍二子作劍一名龍淵一名太阿皆陸斷牛馬水截鵠雁當敵則斬堅甲鐵幕陽成出鐡革抉一作決㕹芮無不畢具以韓卒之勇被堅甲蹠勁弩帶利劍一人當百不足言也夫以韓之勁與大王之賢乃西靣事秦交臂而服羞社稷而為天下笑無大於此者矣是故願大王熟計之大王事秦秦必求宜陽成臯今兹效之明年又復求割地與則無地以給之不與則棄前功而受後禍且大王之地有盡而秦之求無已以有盡之地而給無已之求此所謂市怨結禍者不戰而地已削矣臣聞鄙語曰寧為雞口無為牛後今西面交臂而臣事秦何異於牛後乎夫以大王之賢挾彊韓之兵而有牛後之名臣竊為大王羞之於是韓王勃然作色攘臂瞋目按劍仰天太息曰寡人雖不肖必不能事秦今主君詔以趙王之教敬奉社稷以從又說魏襄王曰大王之地南有鴻溝在滎陽陳汝南許郾在潁川昆陽召陵舞陽新都新郪地理志潁川有昆陽舞陽縣汝南有新郪縣南有新都縣東有淮潁煑棗在宛句無胥西有長城之界北有河外卷衍酸棗滎陽卷縣有長城經陽武到密衍地名地方千里地名雖小然而田舍廬廡之數曾無所芻牧人民之衆車馬之多日夜行不絶輷輷殷殷若有三軍之衆臣竊量大王之國不下楚然衡人怵王交彊虎狼之秦以侵天下卒有秦患不顧其禍夫挾彊秦之勢以内劫其主罪無過此者魏天下之彊國也王天下之賢主也今乃有意西靣而事秦稱東藩築帝宫受冠帶祠春秋臣竊為大王耻之臣聞越王句踐戰敝卒三千人禽夫差於干隧武王卒三千人革車三百乗制紂於牧野豈其士卒衆哉誠能奮其勇也今竊聞大王之卒武士二十萬漢書刑法志曰魏氏武卒衣三屬之甲操十二石之弩負矢五十置戈其上冠胄帶劍贏一日之糧日趨百里中試則復其戸利其田宅蒼頭二十萬奮擊二十萬厮徒十萬車六百乘騎五千匹此其過越王句踐武王逺矣今乃聼於羣臣之說而欲臣事秦夫事秦必割地以效實故兵未用而國虧矣凡羣臣之言事秦者皆姦人非忠臣也夫為人臣割其主之地以求外交偷取一時之功而不顧其後破公家而成私門外挾彊秦之勢以内劫其主以割地願大王熟察之周書曰緜緜不絶蔓蔓柰何毫釐不伐將用斧柯前慮不定後有大患將奈之何大王誠能聼臣六國從親專心并力一意則必無彊秦之患故敝邑趙王使臣效愚計奉明約在大王詔之魏王曰寡人不肖未嘗得聞明教今主君以趙王之詔詔之敬以國從因東說齊宣王曰齊南有泰山東有琅琊西有清河北有渤海此所謂四塞之國也齊地方二千餘里帶甲數十萬粟如丘山三軍之良五家之兵進如鋒矢戰如雷霆解如風雨即有軍役未嘗倍泰山絶清河渉渤海也臨淄之中七萬戸臣竊度之户不下三男子三七二十一萬不待發於逺縣而臨淄之卒固已二十一萬矣臨淄甚富而實其民無不吹竽皷瑟彈琴擊筑鬬雞走狗六博蹋跼者劉向別錄曰蹵鞠者傳言黄帝所作或曰起戰國之時蹋革兵勢也所以練武士知有材也皆因嬉􅃧而講練之臨淄之塗車轂擊人肩摩連衽成帷舉袂成幕揮汗成雨家殷人足志髙氣揚夫以大王之賢與齊之彊天下莫能當今乃西面而事秦臣竊為大王羞之且夫韓魏之所以重畏秦者為與秦接境壤界也兵出而相當不出十日而戰勝存亾之機决矣韓魏戰而勝秦則兵半折四境不守戰而不勝則國已危亡隨其後是故韓魏之所以重與秦戰而輕為之臣也今秦之攻齊則不然倍韓魏之地過衞陽晉之道魏㐮王十六年秦拔魏蒲阪陽晉封陵經亢父之險車不得方軌騎不得比行百人守險千人不敢過也秦雖欲深入則狼顧恐韓魏之議其後也是故恫疑虚喝驕矜而不敢進則秦之不能害齊亦明矣夫不深料秦之無奈齊何而欲西面而事之是羣臣之計過也今無臣事秦之名而有彊國之實是故臣願大王少留意計之齊王曰寡人不敏僻逺守海窮道東境之國也未嘗得聞餘教今足下以趙王詔詔之敬以國從乃西南說楚威王曰楚天下之彊國也王天下之賢主也西有黔中今之武陵也巫郡巫郡者南郡之西界東有夏州海陽楚考烈王元年秦取夏州駰案左傳楚莊王伐齊鄉取齊一人焉以歸謂之夏州而注者不說夏州所在車𦙍撰桓温集云夏口城上數里有州名夏州東有夏州謂此也南有洞庭蒼梧北有陘塞郇陽春秋曰遂伐楚次于陘楚威王十一年魏敗楚陘山柝縣有釣木或者郇陽今之順平一本北有汾陘之塞也地方五千餘里帶甲百萬車千乗騎萬匹粟支十年此覇王之資也夫以楚之彊與王之賢天下莫能當也今乃欲西面而事秦則諸侯莫不西面而朝於章臺之下矣秦之所害莫如楚楚彊則秦弱秦彊則楚弱其勢不兩立故為大王計莫如從親以孤秦大王不從秦必起兩軍一軍出武關一軍下黔中則鄢郢動矣今南郡宜城臣聞治之其未亂也為之其未有也患至而後憂之則無及矣故願大王早熟計之大王誠能聼臣臣請令山東之國奉四時之獻以承大王之明詔委社稷奉宗廟練士厲兵在大王之所用之大王誠能用臣之愚計則韓魏燕齊趙衞之妙音美人必充後宫燕代槖駞良馬必實外廐故從合則楚王衡成則秦帝今釋覇王之業而有事人之名臣竊為大王不取也夫秦虎狼之國也有吞天下之心秦天下之仇讐也衡人皆欲割諸侯之地以事秦此所謂養仇而奉讐者也夫為人臣割其主之地以外交彊虎狼之秦以侵天下卒有秦患不顧其禍夫外挾彊秦之威以内刼其主以求割地大逆不忠無過此者故從親則諸侯割地以事楚衡合則楚割地以事秦此兩䇿者相去逺矣二者大王何居焉故敝邑趙王使臣效愚計奉明約在大王詔之楚王曰寡人之國西與秦接境秦有舉巴蜀并漢中之心秦虎狼之國不可親也而韓魏廹於秦患不可與深謀與深謀恐反人以入於秦故謀未發而國已危矣寡人自料以楚當秦不見勝也内與羣臣謀不足恃也寡人卧不安席食不甘味心揺揺然如縣旌而無所終薄今主君欲一天下收諸侯存危國寡人謹奉社稷以從於是六國從合而并力焉乃投從約書於秦秦兵不敢闚凾谷關十五年其後蘇秦去趙而從約皆解燕易王初立齊宣王因燕䘮伐燕取十城易王謂蘇秦曰徃日先生至燕而先王資先生見趙遂約六國今齊先伐趙次至燕以先生之故為天下笑先生能為燕得侵地乎蘇秦大慙曰請為王取之蘇秦見齊王再拜俯而慶仰而弔齊王曰是何慶弔相隨之速也蘇秦曰臣聞饑人所以饑而不食烏喙者本草經曰烏頭一名烏喙為其愈充腹而與饑死同患也今燕雖弱小即秦王之少婿也燕易王后即秦惠王女大王利其十城而長與彊秦為仇今使弱燕為雁行而彊秦蔽其後以招天下之精兵是烏喙之類也齊王愀然變色曰然則奈何蘇秦曰臣聞古之善制事者轉禍為福因敗為功大王誠能聼臣計即歸燕之十城燕無故而得十城必喜秦王知其以已之故而歸燕之十城亦必喜此所謂棄仇讐而得石交者也夫燕秦俱事齊則大王號令天下莫敢不聼是王以虛辭附秦以十城取天下此覇王之業也王曰善於是乃歸燕之十城又趙收天下且以伐齊蘇秦為齊上書說趙王曰臣聞古之賢君徳行非施於海内也教順慈愛非布於萬民也祭祀時享非當於鬼神也甘露降風雨時至農夫登年糓豐盈衆人喜之而賢主惡之今足下功力非數痛加於秦國而怨毒積惡非曾深陵於韓也臣竊外聞大臣及下吏之議皆言王前專據以秦為愛趙而憎韓臣竊以事觀之秦豈得愛趙而憎韓哉欲以亡韓吞兩周之地故以韓為餌先出聲於天下欲鄰國聞而觀之也恐其事不成故出兵以佯示趙魏恐天下之驚覺故㣲伐韓以貳之恐天下疑已故出質以為信聲徳於與國而實伐空韓臣竊觀其圖之也議秦以謀計必出於是且夫說士之計皆曰韓亡三川魏滅晉國是韓未窮而禍及於趙且物固有勢異而患同者又有勢同而患異者昔者楚人乆伐而中山亡今燕盡韓之河南距沙丘而至鉅鹿之界三百里距於扞關至於榆中千五百里秦盡韓魏之上黨則地與國都邦屬而壤挈者七百里秦以三軍彊弩坐羊腸之上即城去邯鄲百二十里且秦以三軍攻王之上黨而危其地則勾注之西非王之有也今踰勾注禁常山而守三百里通於燕之唐曲遇此代馬胡騎不東而崑山之玉不出也此三寳者又非王之所有也今從於彊秦之國而伐齊臣恐其禍出於是矣昔者五國之王嘗合從連衡而謀伐趙三分趙國壤地著之盤盂屬之讐祚五國之兵出有日矣韓乃西師以禁秦國使秦發令素服而聼反溫軹髙平於魏反三公什清於趙此王之明知也夫韓事趙宜為上交今乃以邸罪取伐臣恐其後事王者不敢自必也今王收韓天下必以王為得韓危社稷以事王天下必重王然則韓義王以天下就之下至韓慕王以天下收之是一世之命制於王已臣願大王深與左右羣臣卒計而重謀先事成慮而熟圗之也册府元龜卷八百八十六
