body:
  text: 册府元龜卷四百五十四宋王欽若等撰將帥部豪横奢侈專恣豪横夫作福作威凶于而國敗禮敗度戻於厥躬皆聖訓之格言寔人臣之明戒况乃總握兵要肅將天威愼固封陲詰誅暴慢誠當義以先衆惠以感人用宣戒詔克貞師律若其不䘏危難廢亂典常戕害生民圖報仇怨負固滋横崇侈無厭貪黷之心踰於谿壑凶忍之性甚於豺狼以至誣害良臣輕侮王室雖膏斧鉞汙鼎鑊蓋有餘戮矣漢陳豨者宛句人也宛句縣名也地志屬齊宛音於元切句音劬不知始所以得從及韓王信反入匈奴上至平城還豨以郎中封為列侯以趙相國將監趙代邉兵皆屬焉豨少時常稱慕魏公子謂信陵君無忌及將守邉招致賔客嘗告過趙因休告之假而過趙賔客隨之者千餘乘邯鄲官舍皆滿豨所以待客如布衣交皆出客下言屈己禮之不以富貴自尊大趙相周昌乃求入見上具言豨賔客盛擅兵於外恐有變上令人覆案豨賔客居代者諸為不法事多連引豨豨恐隂令客通使王黄曼丘臣所孫都封臨蔡侯太初元年子襄坐擊畨禺奪人虜掠死後漢曹破䂖中常侍節之弟為越騎校尉越騎營五百妻有美色韋昭辨釋名曰五百字本為伍伯伍當也伯道也使之導引當道陌中以驅除也案今俗呼行杖人為五百破䂖從求之五百不敢違妻執意不肯行遂自殺其淫暴無道多此類也公孫瓉為破虜將軍旣破劉虞盡有幽州之地猛志益盛前此有童謡曰燕南垂趙北際中央不合大如礪惟有此中可避世瓉自以為易地當之遂徙鎭焉乃盛修營壘樓觀數十臨易河通遼海蜀法正為蜀郡太守揚武將軍外統都畿内為謀主一飡之徳睚眦之怨無不報復擅殺毁傷己者數人或謂諸葛亮曰法正於蜀郡大縱横將軍宜啟主公抑其威福亮答曰主公之在公安也北畏曹公之强東憚孫權之逼近則懼孫夫人生變於肘腋之下當斯之時進退狼䟦法孝直為之輔翼令翻然翺翔不可復制如何禁止法正使不得行其意邪初孫權以妹妻先主妹才㨗剛猛有諸兄之風侍婢百餘人皆親執刀侍立先主每入𠂻心常凛凛亮又知先主雅愛信正故言如此吳潘璋性奢泰末年彌甚服物僭擬吏兵富者或殺取其財物數不奉法監司舉奏大帝惜其功而輙原不問晉桓𤣥嗣南郡公在江陵甚豪横士庶畏之過於殷仲堪𤣥曽於仲堪聽事前戲馬仲堪中兵叅軍劉邁曰馬矟有餘精理不足𤣥自以才雄冠世而心知外物不許之仲堪為之失色𤣥出仲堪謂邁曰卿乃狂人也𤣥夜遣殺卿我豈能相救邁以正辭折仲堪而不以為悔仲堪使邁下都以避之𤣥果令追之邁僅而免禍宋髙道慶初以平桂陽王休範功封樂安男及建平王景素反道慶領軍北討而與景素通謀及事平自啟求増邑五百戸詔加二百并前五百户道慶凶險暴横所求無已有失其意者輙加捶拉或有死者朝廷畏之如虎狼蕭道成與袁粲等議收付廷尉賜死劉瑀為益州張悦代之瑀去任凡所屬將佐有不樂反者必逼制將還語人曰隨我上豈可為張悦作西門客耶陳侯安都遷司空加侍中征北大將軍自王琳平後安都勲庸轉大又自以功安社稷漸用驕矜數招聚文武之士或射馭馳騁或命以詩賦第其髙下以差次賞賜之文士則禇玠馬樞隂鏗張正見徐伯陽劉删祖孫登武士則蕭摩訶裴子烈等並為之賔客齋内動至千人部下將帥多不遵法度簡問收攝則奔歸安都世祖性嚴察深銜之安都弗之改日益驕横每有表啟封記有事未盡乃開封自書之云又啟某事及侍醼酒酣或箕踞傾倚嘗陪樂遊禊飲乃白帝曰何如作臨川王時帝不應安都再三言之帝曰此雖天命抑亦明公之力宴訖又啟便借供張水餙將載妻妾於御堂歡會世祖雖許其請甚不懌明日安都坐於御坐賔各居羣臣位稱觴上壽後魏王斤鎮長安假節鎭西將軍斤遂驕矜不順法度信用左右調役百姓民不堪之南奔漢川者數千家而委罪於雍州刺史陽文祖泰州刺史任延明世祖召問二人各以狀對世祖知為斤所誣遣宜陽公伏樹覆案虗實得數十事遂斬斤以狥爾朱榮為天柱將軍性好獵不捨寒暑至於列圍而進必須齊一雖遇阻險不得廻避虎豹逸圍者坐死其下甚苦之太宰元天穆從容謂榮曰大王勲濟天下四方無事唯宜調政養民順時蒐狩何必盛夏馳逐傷犯和氣榮便攘肘謂天穆曰太后女主不能自正推奉天子者此是人臣常節葛榮之徒本是奴才乘時作亂妄自署假譬如奴走擒獲便休頃來受國大寵未能開拓境土混一海内何宜今日便言勲也如聞朝士猶自寛縱今秋欲共兄戒勒士馬較獵嵩原令貪汚朝貴入圍搏虎任出魯陽歴三荆悉擁生蠻北塡六鎭廻軍之際因平汾胡明年簡練精騎分出江淮蕭衍若降乞萬户侯如其不降徑度數千騎便往縳取待六合寧一八表無塵然後共兄奉天子廵四方觀風俗布政敎如此乃可稱勲耳今若止獵兵士懈怠安可復用也爾朱兆為都督十州諸軍事其從兄弟世隆請閔帝納兆女為后兆乃大喜世隆厚禮喻兆赴雒深示卑下隨其所為無敢違者爾朱仲逺為大將軍督東道諸軍事兖州刺史自滎陽以東輸税悉入其軍不送京師時天光控關右仲逺在大梁兆據并州世隆居京邑隆自專恣權强莫比所在並以貪虐為事於是四方解體侯景為將所向多㨗時北齊神武帝為魏相景總攬兵權與神武相亞隋于顗為東廣州刺史尉遲逈之反也時總管趙文表與顗素不協顗將圖之因卧閤内詐得心疾謂左右曰我見兩三人至我前者􅂺大驚即欲斫之不能自制也其有賔客候問者皆令去左右顗漸稱危篤文表往候之令從者至大門而止文表獨至顗所顗歘然而起抽刀斫殺之因唱言曰文表與尉遲迥通謀所以斬之其麾下無敢動者時高祖以尉遲迥未平慮顗復生邉患因而勞勉之魚俱羅弟瓉以左右從累遷大都督及帝嗣位拜車騎將軍瓉性凶暴虐其部下令左右炙肉遇不中意以籖刺瞎其眼有温酒不適口者立斷其舌帝以瓉藩邸之舊不忍加誅謂近臣曰弟旣如此兄亦可知因召俱羅譴責之出瓉於獄令自為計瓉至家飲藥而死唐尉遲敬徳遷同州刺史嘗侍宴慶善宫時有班在其上者敬徳怒曰汝有何功合坐我上任城王道宗次其下因解喻之敬徳勃然拳毆道宗目㡬至眇太宗不懌而罷謂敬徳曰朕覽漢史見高祖功臣獲全者少意嘗尤之及居大位以來嘗欲保全功臣令子孫無絶然卿居官􅂺犯憲法方知韓彭夷戮非漢祖之􅗅國家大事唯賞與罰非分之恩不可數行勉自修飾無貽後悔也劉𤣥佐為宣武軍節度豪侈輕財嘗厚賞軍事故百姓益困是以汴州將卒始於李忠臣訖於𤣥佐日益恣益横遂殺其將帥以利刼于頔鎭襄陽地與蔡州隣吳少誠之叛頔率兵赴唐州收吳房郎山二縣又破賊於濯神溝於是廣軍籍募戰士器甲犀利專以凌上威下為務又令孽男逼娶判官薛正倫嫡女人益怒之盧從史為昭義軍節度狂恣不道至奪部將妻妾辯給矯妄從事孔戡等以言直不從引去王士則為邢州刺史元和中鎭冀王承宗拒命裴度計士則王武俊之子其軍中必有懐之者故以士則臨邢州冀携承宗之黨且許以節制士則恃此頗不受節度使郗士美法制行止必兵衛自嚴雖謁士美而衛兵如常吏呵止之士則不能平見于辭氣士美惡之因宻以狀奏而代之盧彦威本浮陽牙將中和初節度使楊全政遣以本軍二千人入援京師巢㓂平以功兼御史中丞全政委以大藩戎柄光啟中㑹魏博韓允中糾合滄海同攻鄲州曹全政乃遣彦威率軍攻齊州人情不樂其行將濟河彦威已登舟喻士卒曰此舉無名為應魏人故也且勝則他人獲利敗則我軍受弊此乃師臣失䇿進不如退况楊相公寵任吳昌嗣擅作威福尅削三軍與公等可逐之以圖富貴方今天子播越處處擇帥安能捨其生而趣其死也軍旅欣然乃擁彦威而還以為留後全政歸行在殺吳昌嗣以徇衆昌嗣全政之嬖吏也奏為徳州刺史不之任專掌軍政故致其害焉李茂貞鎭鳯翔恃勲恣横擅兵窺伺頗干朝政始萌問鼎之志矣旣而逐涇原節度使張球洋州節度使楊守忠鳯州刺史浦存皆奪據其地奏諸子弟為牧伯朝廷不能制大臣奏議言其過者茂貞即上章論列辭㫖不遜姦邪於兹附麗遂成朋黨朝政於是隳焉梁楊師厚為魏愽節度使初師厚以計謀敏幹深為太祖知遇委以重兵劇鎭他莫能及然而末年矜功恃衆驟萌不軌之意於是專割財賦置銀鎗効節軍凡數千人皆選摘騎鋭縱恣豢養復故時牙軍之態時人病之承前河朔之俗上元夜比無夜逰及師厚作鎭乃課魏人户立燈竿千釭萬炬洞照一城縱士女嬉游復彩畫舟舫令女妓櫂歌於御河縱酒彌日又於黎陽采巨䂖將紀徳政以鐵車負載驅牛數百以拽之所至之處丘墓廬舍悉皆毁壞百姓望之皆曰碑來石纔至而師厚卒時魏人以為悲來之應末帝聞其死也於私庭受賀乃議裂魏州為兩鎭旣而所樹親軍果為亂以招外㓂致使河朔淪䧟宗社覆滅繇師厚兆之也成汭鎭荆門久之累官至檢校太尉守中書令封上谷郡王然性本豪暴事皆臆斷又好自矜伐騁辯凌人深為識者所鄙後唐楊漢賔前任為黔南節度使毆故開州刺史陵約男彦徽致損兼加拘縛令人㸃檢彦徽家業錢榖法司勘鞫漢賔欵招情罪大理少卿康澄詳斷曰楊漢賔早列偏裨曾分茅土事若先於恕己理不在於尤人豈可忘姻婭之舊情慿官資之威力遽因毆擊顯致訟論自歸有過之門須舉無偏之道合該議减亦舉律文其漢賔前任黔南節度使是三品使關八議准律減一等杖九十准名例律官少不盡其罪餘罪收贖罪少不盡其官留官收贖其楊漢賔所犯罪杖九十准律贖銅九斤准格每斤納錢一百二十文從之晉景延廣為侍衛親軍使天福八年十二月契丹南攻九年正月䧟甘陵河北儲蓄悉在其郡少帝大駭率六師親駐澶淵延廣為上將凡六師進退皆出胸臆少帝亦不能制衆咸憚而忌之張從賔初鎭靈武加檢校太傅受代入覲會車駕東幸留雒下警廵曾逢留司御史於天津橋從兵百人不分路而過排御史於水中從賔奏其醉而入水其兇傲多如此皇甫遇初仕唐應順清泰中累歴團練防禦使尋遷鄧州節度使所至苛暴以誅歛為務其幕客多私去以避其累高祖入雒移領中山俄聞與鎭州安重榮為婚家乃移鎭上黨又改平陽咸以憸人執事政皆隳紊鎭河陽部内創别業開畆水泉以通灌漑所經墳毁之部民以朝廷方姑息羣帥莫之敢訴張萬進高祖有天下命為彰義軍節度使所至不治政由羣下洎至涇原兇恣彌甚每日於公庭列大鼎烹肥羜割胾方寸以噉賔佐皆流淚不能大嚼俟其他顧則致於袪中又命巨觶行酒訴則辱之乃有持杯偽飲褰領裱而納之旣沈湎無節惟婦言是用其妻與幕吏張光載干預公政納錢數萬補一豪民為捕賊將後領兵數百入新平郡境邠帥以其事上奏有詔詰之光載坐流罪配于登州天福四年三月萬進疾篤月餘州兵將亂乃召副使萬廷珪委其符印記室李昇素憾凌虐知其將亡謂廷珪曰氣息奄奄不保晨暮促移就第豈不宜乎廷珪從之萬進尋卒遂以籃舉祕屍而出即馳驅而奏之詔命旣至而後發喪其妻素狠戾謂長子球曰萬廷珪逼迫危病驚擾而死不手戮之奚為生也廷珪聞之不敢往弔萬進假殯於精舍之下至轊車東轅凡數月之間郡民數萬無一饋奠者漢李守貞晉開運元年五月為青州行營都部署率兵二萬東討楊光逺命符彦卿為副十一月光逺子承勲等乞降守貞入城害光逺於别第光逺有孔目吏宋顔者盡以光逺財寳名姬善馬獻於守貞守貞徳之置顔帳下近例官軍克復城隍必降徳音洗滌瑕穢時樞宻使桑維翰以光逺同惡十數軰濳竄未出搜索甚急故制書久不下或有告宋顔匿於守貞處者朝廷詔取顔殺之守貞由是怨維翰時行營將士所給賞賜守貞盡以黦茶染采薑藥之類分給之軍中大怨乃以帛包所得物如人首級目之為守貞頭懸于樹以詛之守貞班師加同平章事以楊光逺東京第賜之守貞因取連宅庫營以廣其第大興土木治之歳餘為京師之甲奢侈夫泰而無驕富而無侈者鮮矣矧乃握兵之要為王之爪牙分閫之重實人之司命其位尊而志意旣滿功成而寵利自居以富貴而驕人謂勲庸之在己不能懼而思降得之若驚侈心遂萌厚祿自奉忘敗度之欲窮有生之樂靡克戒盈鮮復繇禮放而無簡居之晏然難與語夫保功名愼終始之道矣其有負磊落之竒節猶或懷侈靡之驕志至於豪縱不已傾奪相尋亦無悔焉斯可戒也已蜀劉琰為車騎將軍封都鄉侯不豫國政但領兵千餘隨丞相亮諷議而已車服飲食號為侈靡侍婢數十皆能為聲樂又悉教誦讀魯靈光殿賦吳吕範為前將軍揚州牧範居處服餙於時奢靡然勤事奉法故權悦其忠不怪其侈賀齊為安東將軍鎮江上督陜州以上至皖齊性奢綺所乗船雕刻丹鏤青蓋絳襜諸葛融大將軍左都䕶領豫州牧督公安宛陵侯瑾子也瑾卒融襲父爵攝兵業駐公安融父兄質素雖在軍旅身無采餙而融錦罽文繡獨為奢綺晉王濬為鎭軍大將軍濬平吳之後以勲髙位重不復素業自居乃玉食錦服縱奢侈以自逸紀瞻為領軍將軍厚自奉養立宅於烏衣巷館宇崇麗園池竹木有足賞翫焉陶侃為荆州刺史都督八州軍事媵妾數十家僮千餘珍竒寳貨富於天府宋沈慶之為鎭北大將軍開府儀同三司封始興郡公慶之年滿七十居清明門外有宅四所室宇甚麗又有園舍在婁湖慶之一夜携子孫徙居之以宅還官悉移親戚中表於婁湖列門同閈焉廣開田園之業每指地語人曰錢盡在此中興身享大國家素富厚産業累萬金奴僮千計再獻錢十萬穀萬斛以始興優近求改封南海郡不許妓妾數十人並美容工藝慶之優逰無事盡意歡愉非朝賀不出門南齊劉悛為冠軍將軍持節監益寧二州諸軍事益州刺史在蜀作金浴盆餘金物稱是梁羊侃為軍師將軍性豪侈善音律自造採蓮棹歌兩曲甚有新致姬妾列侍窮極奢靡有彈箏人陸大喜著鹿角爪長七寸儛人張淨琬腰圍一尺六寸時人咸推能掌上儛又有孫荆玉能反腰帖地衘得席上玉簮勑賚歌人王娥兒東宫亦賚歌者屈偶之並妙盡竒曲一時無對初赴衡州於兩艖䒀起三間通梁水齋餙以珠玉加之錦繢盛設帷屏列女樂乗潮解䌫臨波置酒緣塘傍水觀者填咽大同中魏使楊斐與侃在北嘗同學有詔命侃延斐同宴賔客三百餘人食器皆金玉雜寳奏三部女樂至夕侍婢百餘人俱執金花燭侃不飲酒而好賔逰終日獻酬同其醉醒性寛厚有器局嘗南還至漣口置酒有客張孺才者醉於船中失火延燒七十餘艘所燔金帛不可勝數侃聞聊不挂意命酒不輟孺才慙懼自逃侃慰喻使還待之如舊夏侯夔為持節督南豫州諸軍事性奢豪後房之妓妾曳羅縠餙金翠者亦有百數愛好人士不以貴勢自高文武賔客常滿坐時亦以此稱之曹景宗為領軍將軍好内妓妾數百窮極錦繡後周李遷哲安康人世為山南豪族為大將軍率金上等諸州兵鎮㐮陽遷哲累世雄豪為鄉里所率服性復華侈能厚自奉養妾媵至有百數男女六十九人緣漢千餘里間第宅相次姬人之有子者分處其中各有僮僕侍婢閹閽守護遷哲每鳴笳道從往來其間縱酒歡宴盡生平之樂子孫恭見或忘其年名者披簿以審之隋宇文述為左衛大將軍性貪鄙知人有珍異之物必求取之金寳累積後庭曵羅綺者數百家僮千餘人皆控良馬被服金玉述之寵遇當時莫與比李渾太師穆之子為右驍衛大將軍襲封郕國公旣紹父業日增豪侈後房曳羅綺者以百數唐郭孝恪為安西都䕶及征龜兹以孝恪為崑丘道副大總管孝恪性奢侈踰度在軍中床帳什物皆餙以金玉嘗以遺大總管阿史那社爾社爾不受太宗聞之乃曰二將優劣固不待言也孝恪為㓂虜所屠可謂自貽伊咎馬璘為四鎮北庭行營節度使璘乆將邉軍属西番㓂擾國家倚為屏翰前後賜與無筭積聚家財不知紀極在京師治第舍尤為宏侈初天寳中貴戚勲家已務奢靡而垣屋猶存制度然衛公李靖家廟已為嬖臣楊氏馬廐矣及祿山大亂之後法度隳弛内臣戎帥競務奢豪亭舘第舍力窮乃止時謂木妖璘之第經始中堂費錢二十萬貫他室降等無㡬及璘卒於軍子弟䕶喪歸京師士庶觀其中堂或假稱故吏爭往赴弔者數十百人徳宗在東宫宿聞其事及踐阼條舉格令第舍不得踰制仍詔毁璘中堂及内官劉忠翼之第璘之家園進屬官司自後公卿賜宴多於璘之山池一説大厯十三年作乾元觀其地在皇城南長興里本璘之宅璘初創建是宅重價募天下巧工營繕屋宇宏麗冠絶當時璘臨終抗表獻帝帝方心懷㒺極欽崇道福以其當太祖城形勝之地墻宇新潔遂命為觀郭英乂為劔南節度頗恣狂蕩聚女人騎驢擊毬製鈿驢鞍及諸服皆用侈靡裴餙日費數萬以為笑樂未嘗問百姓間事人頗怨之兵馬使崔旰因人心為亂殺英乂李抱真為昭義軍節度時天下無事乃大起臺榭穿池沼以自娛杜亞為淮南節度使盛為奢侈江南風俗春中有競渡之戲方舟並進以急趨疾進前者為勝亞乃命以漆塗船底貴其速進又為羅綺之服塗之以油令舟子衣之入水不濡亞本書生奢縱如此王鍔為荆南節度使鍔起兵間因緣際㑹累居大鎮厚殖財貨營第宅頗逾侈又請京兆府籍坊以廣亭榭陳敬瑄為神䇿軍統軍使乾符中出鎮西川輿馬之侈人皆惡之後唐王鎔為鎮州節度專制四州高屏塵務不親軍政多以閹人秉權出納决斷聽其所為皆雕靡第舍崇餙園池種竒花異木逓相夸尚人士襃衣博帶高車大盖以事嬉逰藩府之中當時為盛朱守殷天成中為河南尹判六軍諸衛事與諸貴要近臣宰執交歡宴會時集於府第復妓侍盈室毛璋為華州節度使以平蜀功授邠州節度璋旣家富於財又有蜀之妓妾驕僣自大事多不法錢鏐為兩浙節度在杭州垂四十年窮奢極貴錢塘江舊日海潮逼州城鏐庀工鑿石塡江平江中羅刹石悉起臺榭廣郡郭周三十里邑屋之繁㑹江山之雕麗實江東之勝槩也康義誠為侍衛親軍都指揮使馭軍無方畧又鄙於財賄雒中天門街東起第夾道房廊數里歌妓之作罕召賔佐自娛而已晉王建立為青州節度性好華旣至治所息於正寢翼日而出寢達於厊音雅百有餘歩以錦繡二段易而蹈之其不率制限皆此類也景延廣為侍衛親軍馬歩軍都指揮使旣罷兵權出為雒都留守兼侍中由是鬱鬱不得志亦意契丹强盛國家不濟身將危矣前汴水葺一第占其全坊在雒又起邸舍園池為水南之甲所積巨萬車馬妓樂無不稱是但縱長夜之飲無復以憂國為心張筠為永興軍節度奉詔殺偽蜀主王衍衍之妓樂寳貨悉私藏於家及罷歸之後第宅宏敞花竹深䆳聲樂飲膳恣其所欲十年之内人謂為地仙馬希範為湖南節度封楚王擅二十州之征税車輿服玩池館第舍頗事華靡壁璫軒檻率以金銀為餙所造九龍殿垂珠簾繡幕帷㡩懸金香囊流蘇盤中花果金枝玉葉妓房歌室朝夕蘭薫其子城門構五鳯之狀女墻之上起行樓專恣夫授律而行鑿門而出軍旅之事雖可以從宜朝廷之法所宜乎愼守茍異於此罪必隨之其有疆場未寧攻戰是屬始則期於靖亂終則肆其不軌曁萌震主之威乃成滅身之漸或雄武自伐窺覦於非望或彊愎不悛拒絶於規正乃有擅移營壘專置參佐議事明庭之下面比官聨挺劔飲會之間坐凌宰輔蓋以小人之量被君子之器豈獨王綱之斯壞必將家世而云絶良可哀矣可不戒乎漢董卓字仲穎拜前將軍封漦鄉侯兵威漸盛以乆不雨乃諷朝廷䇿免司空劉𢎞而自代之魏曹爽為大將軍毁中壘堅營以兵屬其弟中領軍羲司馬宣王以先帝舊制禁之不可諸葛誕為鎭東大將軍請十萬衆守壽春又求臨淮築城以備吳寇内欲保有淮南朝廷徴之誕有自疑心時司馬文王新秉朝政長史賈充以為宜遣參佐慰勞四征於是遣充至壽春充還啟文王誕再在揚州有威名民望所歸今徴必不來禍小事淺不徴事遲禍大乃以為司空書至誕曰我作公當在王文舒後今便為司空不遣使者健歩齎書使以兵付樂綝此必綝所為乃將左右數百人至揚州攻刺史樂綝殺之吳諸葛恪輔政加荆揚州牧督内外諸軍事遣衆出軍大發州郡二十萬衆百姓騷動始失人心恪意欲耀威淮南驅畧人民而諸將或難之曰今引軍深入疆場之民必相率逺遁恐兵勞而功少不如止圍新城新城困救必至至而圖之乃可大獲恪從其計廻軍還圍新城攻守連月城不拔士卒疲勞因暑飲水泄下流腫病者大半死傷塗地諸營吏日白病者多恪以為詐欲斬之自是莫敢言恪内惟失計而耻城不下忿形於色將軍朱異有所是非恪怒立奪其兵都尉蔡林數陳軍計恪不能用䇿馬奔魏魏知戰士罷病乃進救兵恪引軍而去士卒傷病流曵道路或頓仆坑壑或見畧獲存亡忿痛大小呼嗟而恪晏然自若出住江渚一月圖起田於潯陽詔召相衘徐乃旋師由此衆庶失望而怨讟興矣晉茍晞為青州刺史征東大將軍多置參佐轉易守令王浚惠帝時為寧北將軍青州刺史尋徙寧朔將軍持節都督幽州諸軍事于時朝廷昏亂盗賊蠭起浚為自安之計結好夷狄以女妻鮮卑務勿塵又以一女妻蘇恕延及趙王倫簒位三王起義兵浚擁衆挾兩端遏絶檄書使其境内士庶不得赴義成都王穎欲討之而未暇也倫誅進號安北將軍及河間王顒成都王穎興兵内向害長沙王乂而浚有不平之心穎表請幽州刺史石堪為右司馬以右司馬和演代堪宻使演殺浚并其衆演與烏丸單于審登謀之於是與浚期游薊城南清泉水上薊城内西行有二道演浚各從一道演與浚欲合鹵簿因而圖之值天暴雨兵器霑濕不果而還單于繇是與其種人謀曰演圖殺浚事垂克而天卒雨使不得果是天助浚也違天不祥我不可乆與演同乃以謀告浚浚宻嚴兵與單于圍演演持白旛詣浚降遂斬之自領幽州大營器械召務勿塵率胡晉合二萬人進軍討穎以主簿祁𢎞為前鋒遇頴將石超於平棘擊敗之浚乗勝遂尅鄴城士衆暴掠死者甚多鮮卑大畧婦女浚命敢有挾藏者斬之於是沉於易水者八千人黔庶荼毒自此始也張輔為馮翊太守是時長沙王乂以河間王顒專制關中有不臣之跡言於惠帝宻詔雍州刺史劉沉秦州刺史皇甫重使討顒於是沉等與顒戰于長安輔遂將兵救顒沉等敗績顒德之乃以輔代重為秦州刺史當赴顒之難金城太守游楷亦皆有功轉梁州刺史不之官楷聞輔之還不時迎輔陰圖之又殺天水太守封尚欲揚威西土召隴西太守韓稚會議未决稚子朴有武幹斬異議者即收兵伐輔與稚戰於遮多谷口輔軍敗績為天水故帳下督富整所殺桓温哀帝時為侍中大司馬都督中外諸軍事温以旣􅄣督内外不宜在逺又上疏陳便宜七事後移鎭姑孰乃自以雄武專朝窺覦非望或卧對親僚曰為爾寂寂將為文景所笑衆莫敢對旣而撫枕起曰旣不能流芳後世不足復遺臭萬載耶及悉衆北伐慕容埀戰于襄邑温軍敗績死者三萬人温甚耻之築廣陵城移鎭之後破慕容暐苻堅之軍温旣負其才力乆懐異志欲先立功河朔還受九錫於是用叅軍郄超之計乃行廢立孝武即位温入朝勑尚書謝安等於新亭奉迎百僚皆拜于道側温旣至以盧悚入宫乃收尚書陸始付廷尉責替慢罪也温鎭姑孰威勢震主四方脩敬皆遣上佐綱紀王彪之時為㑹稽内史獨不遣温以山隂縣折布米不時畢郡不彈糾上免彪之王恭孝武時為輔國將軍兖青二州刺史安帝初會稽王道子執政寵昵王國寳委以機權恭毎正色直言道子深憚而忿之時國寳從弟緒説國寳因恭入覲相王伏兵殺之道子將行其説尋以恭為安北將軍不拜乃謀誅國寳遣使與殷仲堪桓𤣥相結仲堪偽許之恭得書大喜乃抗表京師曰後將軍國寳得以姻戚頻登顯列不能感恩効力以報時施而專寵肆威將危社稷先帝登遐夜乃犯閣叩扉欲矯遺詔頼皇太后聰明相王神武故逆謀不果又割東營見兵以為己府讒疾二昆甚於讎敵與其從弟緒同黨凶狡共相扇動此不忠不義之明白也以臣忠誠必忘身殉國是以譛臣非一賴先帝明鍳浸潤不行昔趙鞅興甲誅君側之惡臣雖駑劣敢忘斯義表至内外戒嚴國寳及緒惶懼不知所為用王珣計請解軄道子收國寳賜死斬緒于市深謝愆失恭乃還京口恭之初抗表也慮事不㨗乃版前司徒左長史王廞為吳國内史令起兵於東會國寳死令廞解軍去職廞怒以兵伐恭恭遣劉牢之擊滅之上疏自貶詔不許南齊徐世檦為輔國將軍時陳顯達反朝廷加崔慧景平南將軍都督衆軍事屯中堂而世檦專勢號令慧景備員而已隋宇文述煬帝大業中為左衛大將軍貴幸言無不從勢傾朝廷左衛將軍張瑾與述連官嘗有評議偶不中意述張目嗔之瑾惶懼而走文武百僚莫敢違忤唐田季安德宗時為魏博節度使緒之嫡嗣也季安年少守父業無他材能恣擊踘從禽聲色之娛其公事大抵徇於意非賔佐謀猷所及也李茂貞鎮鳳翔昭宗乾寧二年茂貞與邠州王行瑜華州韓建同州王行約秦州李茂莊等上表疏興元楊守亮納叛臣楊復恭請同出本軍討伐兼自備供軍糧料不取給于度支秪請加茂貞山南招討使名内臣皆不可其奏昭宗亦以茂貞得山南之後有問鼎之勢持之不下茂貞怒與王行瑜不候進止發兵攻興元累論招討之命兼與宰相杜讓能中尉西門重遂書詞語詬詈凌蔑王室晉景延廣高祖時為侍衛親軍馬歩軍都指揮使檢校太尉鎮河陽高祖晏駕與宰臣馮道等承顧命以齊王為嗣旣發喪都人不得偶語百官赴臨未及内門皆令下馬頗有驕暴之失少帝旣嗣位延廣獨以為己功尋加同平章事彌有矜伐之色帝幸其第進獻錫賚有如酬酢權寵恩渥為一朝之冠俄與宰臣桑維翰不協帝亦憚其難制遂罷兵權出為雒都留守漢史𢎞肇隠帝時為侍衛親軍都指揮使兼中書令帝自關西賊平之後昵近小人太后親族頗行干託𢎞肇與楊邠甚不平之太后有故人子求補軍職𢎞肇忿而斬之帝始聽樂賜教坊使等玉帶諸伶官緋袍往謝𢎞肇𢎞肇讓之曰健兒為國伐邊患寒冒暑未能偏有霑賜爾軰何功敢當此賜盡取袍帶還之官册府元龜卷四百五十四
