body:
  text: 册府元龜巻三百七十九宋王欽若等撰將帥部褒異第五宋檀道濟為揚武將軍從劉道規討桓謙荀林等率厲文武身先士卒所向摧破及徐道覆來逼道規親出拒戰道濟戰功居多遷安逺䕶軍武陵内史復為太尉叅軍拜中書侍郎轉寜朔將軍叅太尉軍事以前後功封作唐縣男食邑四百户補太尉主簿諮議叅軍豫章公遷征虜將軍宋國侍中髙祖受命轉䕶軍加散騎常侍領石頭戍事聽直入殿省以佐命功改封永修縣公食邑二千户及討平謝晦遷都督江州江夏豫州之西陽新蔡晉熈四郡諸軍事征南大將軍開府儀同三司江州刺史持節常侍如故贈封千户謝晦自宋臺初建為右衞將軍尋加侍中髙祖受命於石頭登壇備法駕入宫晦領遊軍為警備遷中領軍侍中如故以佐命功封武昌縣公食邑二千户王鎭惡為髙祖前部破賊曹拒盧循於查浦累戰有功封博陸縣五等子髙祖謀討劉毅加鎭惡振武將軍以討毅功封漢夀縣子食邑五百户後為征虜將軍領安西司馬馮翊太守遇害髙祖受命追封龍陽縣侯食邑千五百户配食髙祖廟庭檀韶字令孫行参髙祖建武將軍事都邑既平為鎮軍將軍加寜逺將軍東海太守進號建武將軍遷龍驤將軍秦郡太守北陳留内史以平桓𤣥功封巴江縣侯食邑五百户又加寜朔將軍從征廣固攻臨胊城克之又領北琅邪太守進號寜朔將軍琅邪内史從討盧循於左里又有戰功并論廣固功更封宜陽侯食邑七百户髙祖受命以佐命功増八百户并前千五百户及卒追贈安南將軍加散騎常侍向彌為寜逺將軍征破桓石等及攻壽陽克之遷建武將軍秦郡太守北陳留内史戍堂邑以平京城功封山陽縣五等侯又遷龍驤將軍梁國内史戍壽陽以平廣固盧循功封安南縣男食邑五百户遷冠軍將軍髙祖受命以佐命功封曲江縣侯食邑千户劉懐愼為振威將軍彭城内史從髙祖拒盧循於石頭屢戰克㨗加輔國將軍晉安帝義熈八年以本號監北徐州諸軍事鎭彭城尋加徐州刺史九年亡命王靈秀為㓂討平之十一年進北中郎將以平廣固盧循功封南城縣男食邑五百户十三年髙祖北伐以為中領軍征虜將軍髙祖遷都夀春留懐愼督北徐兖青淮北諸軍事前將軍征虜將軍徐州刺史永初元年以佐命功進爵為侯増邑千户進號平虜將軍劉榮祖者懐愼之庶長子也榮祖領偏師追躡盧循累有戰功叅太尉軍從討司馬休之㑹賊破走加振威將軍尋叅世子征虜軍事髙祖北伐轉鎭西中兵參軍寜逺將軍與朱超石大破魏軍於半城又攻劉度壘克之髙祖大享戰士謂榮祖曰卿以寡克衆攻無堅城雖古名將何以過此轉為太尉中兵叅軍加建威將軍後轉右軍將軍時居父艱起為輔國將軍追論半城之功賜爵都鄉侯劉孫登為巴陵王鎭兵參軍北伐南征功冠諸將封順陽縣侯食邑六百户劉粹為車騎中軍參軍從髙祖征廣固戰功居多以建義功封西安縣五等侯後遷左衛將軍以佐命功臣封建安縣侯食邑千户孟懐玉為建武司馬髙祖東伐豫義旗從平京城進定京邑以功封鄱陽縣侯食邑千户又轉輔國將軍鎭丹陽府兵戍石頭盧循逼京邑懐玉於石頭南岸連戰有功為中軍諮議參軍及循平封陽豐縣男食邑三百五十户孟龍符為髙祖建武參軍於江乘羅落覆舟三戰並有功參鎭軍事封平昌縣五等子加寜逺將軍劉敬宣為寜朔將軍大敗吳賊進平會稽加臨淮太守遷後軍從事中郎檀祗為振武將軍追討桓𤣥每戰克㨗又征亡命桓道兒張靖苻嗣等皆悉平之除龍驤將軍朱齡石為輔國將軍巴西梓潼宕渠南漢中秦州之安固懐寜六郡諸軍事以平蜀功封豐城縣侯食邑千户毛修之為右司馬南河河内二郡太守行西州事戍雒陽修治城壘髙祖既至案行善之賜衣服玩好當時評直二千萬孫處字季髙為振武將軍髙祖廣固之役先登有功又破盧循所殺萬人及卒追贈龍驤將軍南海太守封侯官縣侯食邑千户蒯恩為寜逺將軍擊破應城賊張堅封都亭侯又為太尉長史兼行叅軍隨朱齡石伐蜀破賊進平成都擢為參軍改封北至縣五等男恩自從征討毎有危急輙率先諸將常䧟堅破陣髙祖録其前後功勞封新寜縣男食邑五百户劉鍾為鎭軍參軍時桓歆㓂歴陽髙祖遣鍾助豫州刺史魏詠之討之歆即奔迸除南齊國内史封安縣五等侯自陳情事改塟父祖及親屬十喪髙祖厚加資給轉騎長史又從征廣固時孟龍符䧟沒鍾率左右直入取其尸而反除振武將軍中兵參軍代龍符領廣川太守又隨劉藩追徐道覆於始興斬之補太尉行叅軍寜朔將軍下邳太守代孟懐玉領石頭戍事後隨朱齡石伐蜀為前鋒平成都又以征廣固功封永新縣男食邑五百户遷給事中太尉參軍事龍驤將軍髙陽伯髙祖北伐留鍾居守増其兵力又命府置佐吏荆州刺史劉道憐獻名馬三匹并精麗乘具髙祖悉以賜鍾三子虞丘進初隨謝𤣥討苻堅有功封闗内侯從髙祖征孫恩頻戰有功又從平京城定京邑除燕國内史又從征劉毅事平補太尉行參軍尋加龍驤將軍髙祖以其前後功封望蔡縣男食邑五百户加振威將軍討司馬休之又有戰功軍還除輔國將軍及卒追論討休之功進爵為子増邑三百户胡藩初參髙祖軍事討盧循於左里頻戰有功封吳平縣五等子除正員郎後為寜朔將軍以平司馬休之及廣固功封陽山縣男食邑五百户庾登之為髙祖鎭軍參軍以預討桓𤣥功封曲江縣五等男王淮之參髙祖車騎中軍事預討盧循功封都亭侯沈叔任初為髙祖太尉參軍朱齡石之伐蜀為齡石建威府司馬加建威將軍平蜀之功亞於元帥蜀平即本號為西夷校尉巴西梓潼郡太守髙祖討司馬休之齡石遣叔任率軍來㑹時高祖領鎭西將軍命為司馬及軍還以為揚州别駕從事史以平蜀全涪之功封寜新縣男食邑四百四十户柳叔仁為梁州刺史黄門郎以破臧質功封宜陽侯食邑八百户沈璞為宣威將軍守旴眙後魏攻之璞堅守拒退太祖嘉璞功效遣中使褒美詔曰近者險急老弱殊當憂廹念卿爾時難為心想百姓轉已還退此部運尋至委卿贍濟也劉道錫為廣威將軍巴西梓潼二郡太守為氐羌所攻道錫保城固守太祖下詔曰前者兵冦攻逼邊情波駭道錫奬率文武盡心固守保全之績厥效可書可冠軍諮議參軍蕭思話為寜朔將軍太祖元嘉十四年遷使持節臨川王義慶平西長史南蠻校尉太祖賜以弓琴手勑曰前得此琴云是舊物亦有名京邑今以相借因是戴顒意於彈撫響韻殊勝直爾嘉也并往桑弓一張材理乃快先所常用既久廢射又多病畧不能制之便成老公令人嘆息良材美器宜在盡用之地丈人真無所與讓也及元凶弑立以為徐兖二州刺史思話即率部曲還彭城起義以應世祖及即位徵為散騎常侍尚書左僕射固辭不受改為中書令丹陽尹常侍如故趙倫之為雍州刺史世祖北伐倫之遣順陽太守傅𢎞之等破姚泓於藍田及帝受命以佐命功封霄城縣侯王謙之世祖初歴驍騎將軍御史中丞吳興太守以南下之功封石陽縣子食邑五百户柳元景河東人為冠軍司馬世祖討元凶加冠軍將軍為前鋒世祖至新亭即位以元景為侍中領左衛將軍轉使持節監雍梁南北秦四州荆州之竟陵隨二郡諸軍事前將軍寜蠻校尉雍州刺史帝在巴口問元景事平何所欲對曰若有過恩願還鄉里故有此授張興世為南中郎參軍督䕶入討元凶為前鋒事定轉員外將軍領從隊南郡王義宣反又隨王𤣥謨出梁山有戰功除建平王中軍行叅軍領長刀顔師伯為寜逺將軍東陽太守臧質反領兵以備東道事寜領歩兵校尉領前軍將軍從御史中丞遷侍中世祖以其伐逆寜亂復下詔封平都縣子遷右衛將軍又為持節督青冀二州徐州之東安東莞兖州之濟北三郡諸軍事輔國將軍擊魏師大破之進號征虜將軍劉延孫為鎭軍將軍南徐州刺史延孫遣中兵參軍杜㓜文率軍渡江受沈慶之節度討竟陵王誕進號車騎將軍加散騎常侍給皷吹一部卜天生為西陽王子尚撫軍參軍加龍驤將軍𨽻沈慶之攻廣陵城天生推車塞塹率數百人先登西北角徑至城上賊為重栅斷攻道苦戰移日不㧞乃還世祖詔曰天生始受戎任甫造冦壘而投輪越塹率果先騰驍壯之氣嘉嘆無已可且賜布千疋以厲衆校劉秀之為寜逺將軍西戎校尉元凶弑逆秀之聞問即日起兵事寜遷寜朔將軍益州刺史及南譙王義宣據荆州為逆秀之遣中兵參軍韋山松襲江陵進號征虜將軍以起義功封康樂縣侯食邑六百户頋彬之為寜朔將軍世祖入討元凶劭彬之受竟陵王誕節度誕遣叅軍劉季之與彬之并勢自頓西陵以爲後繼劭遣將軍華欽庾導東討與彬之弟相逢於曲阿之奔牛塘路甚狹左右皆悉入菰葑彬之軍人多齎藍屐於葑中夾射之欽等大敗事平彬之封陽新縣侯食邑千户季之零陽縣侯食邑五百户沈慶之為歩兵校尉自太祖北伐時亡命司馬黒石廬江叛吏夏侯方進在西陽五水誑動羣蠻自淮汝至于江沔咸罹其患帝遣慶之督諸將討之及世祖踐阼以慶之為領軍將軍加散騎常侍尋出為南兖州刺史鎭旴􅇇帝伐逆定亂思將帥之功下詔封慶之南陽縣公食邑三千户又魯爽反慶之討平之進號鎭北大將軍督青冀幽三州給皷吹一部及竟陵王誕據廣陵反以慶之為車騎大將軍既平誕進司空固讓於是與柳元景並依晉密陵侯鄭褒故事朝㑹慶之位次司空元景在從公之上給衛吏五十人門施行馬慶之以郡公就第每從遊幸及校獵據鞍陵厲不異少壯太子妃上世祖金鏤七箸及杆杓帝以賜慶之曰卿辛勤匪殊歡宴宜等且觴酌之賜宜以大夫為先也前廢帝即位賜慶之几杖給三望車一乘劉勔為寜逺將軍自太祖元嘉末蕭簡據廣州為亂勔討之以功封大亭侯世祖大明初劉道隆請為寜朔司馬竟陵王誕據廣陵為逆勔隨道隆受沈慶之節度事平封金城縣五等侯除西陽王子尚撫軍先是遣費沈伐陳檀不克乃除勔為龍驤將軍既至進討隨宜翦定還除新安王子鸞撫軍中兵叅軍太宗即位加寜朔將軍及江州刺史晉安王子勛為逆四方響應豫州刺史殷琰反叛徴勔還都假輔國將軍率衆討破琰除輔國將軍廣州刺史柳光世為左將軍直閣太宗定亂以參謀功為右衛將軍封開國縣侯食邑千户殷孝祖為積射將軍世祖初累與魏軍戰頻大破之還授太子旅賁中郎將加龍驤將軍又竟陵王誕據廣陵為逆孝祖攻誕有戰功遷西陽王子尚撫軍寜朔將軍廢帝景和初以本將軍督兖州諸軍事兖州刺史太宗即位四方反叛徴之孝祖棄妻子率文武還都進號冠軍假節督前鋒諸軍事因遣向虎檻拒對南賊御仗先有諸葛亮筩袖鎧㡌二十五石弩射之不能入帝悉以賜孝祖吳喜假建武將軍時太宗初即位四方反叛喜所至克㨗遷歩兵校尉封竟陵縣侯食邑千户又遷輔國將軍平定荆州遷前軍將軍増邑三百户沈攸之為寜朔將軍尋陽太守破南賊於赭圻太宗尋假攸之節進號輔國將軍代殷孝祖督前鋒諸軍事尋克赭圻遷使持節督雍梁南北秦四州郢州之竟陵諸軍事冠軍將軍領寜蠻校尉雍州刺史又進平尋陽徙監郢州諸軍事前將軍郢州刺史持節如故不拜遷中領軍封貞陽縣公食邑二千户王𤣥謨為領軍將軍太宗即位四方反叛以𤣥謨為大綂領水軍南討以脚疾聽乘輿出入平尋陽除大將軍江州刺史副司徒建安王於赭圻賜以諸葛亮筩袖鎧黄回為龍驤將軍攻合肥破之太宗以其功封葛陽縣男食邑二百户後廢帝時以屯騎校尉討桂陽王休範事平轉驍騎將軍加輔師將軍進爵為侯封聞喜縣後遷冠軍將軍率軍前討建平王景素平之増邑五百户進號征虜將軍加散騎常侍彭文之為龍驤將軍以討建平王景素功封葛陽縣男食邑三百户任農夫為彊弩將軍太宗初以東討功封廣普縣子食邑五百户東土平定又南討増邑二百户為左將軍討桂陽王休範以戰功改封孱陵縣侯増邑千户并前千七百户髙道慶以軍校平桂陽王休範功封樂安縣男食邑三百户南齊蕭赤斧宋孝武時為軍主竟陵王誕反廣陵𨽻沈慶之圍廣陵城攻戰有勲事寜封永安亭侯食邑三百七十户至世祖時為左衛將軍親遇與寜朔將軍蕭景先相比封南豐縣伯邑四百户王廣之宋明帝㤗始初為寜朔將軍北征沈文秀其長廣太守劉桃根棄城走軍還封安蠻縣子邑三百户後為冠軍將軍討宋建平先登京口改封寜都縣子邑五百户太祖即位進爵為侯食邑千户張瓌為驍騎將軍沈攸之事起劉秉弟遐聚衆治攻具瓌部曲斬遐獻㨗太祖即授輔國將軍吳郡太守封瓌義成縣侯邑千户建元元年増邑二百户尋改封平都遷侍中加領歩兵校尉垣崇祖為遊擊將軍使持節監豫司二州諸軍事魏軍冦壽春崇祖召文武議當用謀以制之堰淝水為險魏衆攻城人馬溺死數千大衆皆退走初崇祖在淮隂見太祖自比韓信白起咸不信唯太祖獨許之崇祖再拜奉㫖及破虜啟至太祖謂朝臣曰崇祖許為我制虜果如其言且嘗自擬韓白今眞其人也進為都督號平西將軍増封千五百户崇祖聞陳顯逹李安民皆増給軍儀啟上求皷吹横吹太祖勑曰韓白何可不與衆異乃給皷吹一部張敬兒為輔國將軍持節都督雍梁二州郢司二郡軍事沈攸之事起敬兒遣使吿變太祖大喜進號鎭軍將軍加散騎常侍改為都督給皷吹一部王敬則為冠軍將軍沈攸之事起太祖入守朝堂袁粲起兵夕領軍劉韞直閣將軍卜伯興等於宫内相應戒嚴將發敬則開闗掩襲皆殺之殿内竊發盡平敬則之力也遷右衛將軍増封為二千五百户尋又加五百户齊䑓建為中領軍建元元年出為使持節散騎常侍都督南充兖徐青冀五州軍事平北將軍南兖州刺史封尋陽郡公邑三千户加敬則妻懐氏爵為尋陽國夫人遷䕶軍常侍如故以家為府以改塟去職詔贈敬則母尋陽國公太夫人改授侍中撫軍將軍太祖遣詔敬則以本官領丹陽郡尹尋遷為使持節散騎常侍都督會稽東陽新安臨海永嘉五郡軍事㑹稽太守世祖永明二年給皷吹一部陳顯逹為冠軍將軍沈攸之事起顯達遣軍援臺攸之平除左衛將軍轉前將軍太祖太尉左司馬齊䑓建為散騎常侍左衛將軍領衛尉太祖即位遷中䕶軍増邑千六百户轉䕶軍將軍顯達啟讓帝曰朝廷爵人以序卿忠調發萬里信誓如期雖屠城殄國之勲無以相加此而不賞典章何在若未必宜爾吾終不忘授於卿數士意同家人豈止於君臣耶世祖永明八年遷侍中鎭軍將軍尋加中領軍出為使持節散騎常侍都督江州諸軍事征南大將軍江州刺史給皷吹一部後遷車騎將軍開府預廢欝林之勲為司空進爵為公甲仗五十人入殿明帝即位進太尉侍中如故改封鄱陽郡公加兵二百人給油絡車劉懐珍為左將軍沈攸之圍郢城懐珍遣建寜太守張謨等破賊前鋒進平南將軍増督南豫北徐二州増邑為千户李安民為冠軍將軍南兖州刺史沈攸之反太祖召安民以本官鎭白下治城隍加征虜將軍進軍西討又進前將軍行至湓城沈攸之平仍授督郢州司州之義陽諸軍事郢州刺史又遷左衛將軍領衛尉太祖即位為中領軍封康樂侯邑千户尋為領軍將軍魏兵冦壽春至馬頭詔安民出征加皷吹一部垣榮祖為驍騎將軍太祖以預佐命勲封將樂縣子邑三百户周山圖宋明帝時為殿中將軍時四方反叛僕射王彧舉山圖將領明帝呼與語甚悦使領百舸為前驅舉軍主佼長生等攻破賊湖白赭圻二城除員外郎加振武將軍預平濃湖追賊至西陽還明帝賞之賜苑西宅一區沈攸之事起世祖為西討都督啟山圖為軍副山圖斷取行旅船板以造樓櫓立水栅旬日皆辦世祖甚嘉之授前將軍加寜朔將軍進號輔國將軍攸之攻城世祖令山圖量其形勢攸之既敗太祖遣山圖領部曲鎭京城鎭戍悉受節度遷遊撃將軍太祖建元元年封晉興縣男邑三百户後轉黄門郎領羽林四廂直衛及疾帝手勑參問遣醫給藥以世祖永明元年卒召賜朝服一具衣一襲吕安國為建威將軍宋明帝㤗始中征殷琰於壽春安國與輔國將軍桓閎屯據城南於是衆軍繼至安國勲第一封彭澤縣男未拜改封鍾武縣加邑為四百户後為征虜將軍沈攸之事起太祖以安國為湘州刺史時任候伯行湘州事候伯與黄回袁粲謀石頭事太祖令安國至鎭收候伯誅之尋進號前將軍建元元年進爵増邑六百户薛淵為輔國將軍沈攸之之難太祖入朝堂淵率軍赴難及太祖即位増邑為二千五百户加寜朔將軍戴僧靜為㳺擊將軍預平沈攸之太祖論封諸將以僧靜為興平縣侯邑千户及即位増邑千二百户桓康為冠軍將軍太祖時康於淮陽大破魏軍以康持節督青冀二州東徐之東莞琅邪二郡胊山戍北徐之東海漣口戍諸軍事世祖即位轉驍騎將軍卒詔曰康昔預南勲倍深惻愴凶事所須厚加料理曹虎為屯騎校尉預平石頭功封羅江縣男除前軍將軍太祖受禪増邑為四百户蕭景先為世祖征虜府司馬領新蔡太守隨鎭湓城沈攸之事平還都除寜朔將軍太祖即位遷太子左衛率封新吳縣伯邑五百户出為持節督司州軍事寜朔將軍時魏軍出淮泗景先斷塞闗隘魏軍退進號輔國將軍後為征虜將軍丹陽尹卒詔賻錢十萬布二百疋贈侍中征北將軍南徐州刺史給皷吹一部崔慧景為西戎校尉梁南秦二州刺史攻擊烏奴大敗之世祖以慧景進號冠軍將軍裴叔業為寜朔將軍時魏軍圍徐州叔業攻魏栅外二城克之明帝以叔業有勲勞封武昌縣伯五百户蕭坦之為右衛將軍督徐州征討軍事魏軍圍鍾離坦之擊破之還遷領軍將軍後加右將軍督衆軍討始安王遥光屯湘宫寺事平遷尚書右僕射丹陽尹進爵為公増邑千户沈文季為冠軍將軍督吳錢塘軍事沈攸之反文季收殺攸之宗族太祖加文季持節進號征虜將軍封畧陽縣侯邑千户至明帝時加散騎常侍建武二年魏軍冦壽春詔文季領兵鎭壽春魏軍尋退増封為千九百户尋加䕶軍將軍張冲為冠軍將軍都督青冀二州北討諸軍事東昏時魏軍攻司州冲遣軍主杜僧䕶力戰大破之遷廬陵王北中郎將司馬加冠軍將軍册府元龜卷三百七十九
