body:
  text: 册府元龜卷七百十六宋王欽若等撰幕府部縂序周禮六官六軍並有吏屬大則命於朝廷次則皆自辟除春秋諸國有軍司馬尉侯之職而未有幕府之名戰國之際始謂將帥所治為幕府秦分天下為郡屬官有丞邉郡有長史主兵漢丞相三公開府置掾史司𨽻刺史有從事史佐京尹守相有掾史曹屬皆幕府之職也文帝二年丞相府置兩長史秩千石武帝時有三長史又分丞相長史為兩府三長史盖有守者非正員故也至劉屈氂為相始分丞相長史為兩府元狩五年初置丞相司直比二千石掌佐丞相舉不法其餘寮屬之職逮於中興名次大備太傅太尉司空府皆有長史一人掾屬令史御屬各有差太傅掾屬二十四人令御史屬三十二人太尉掾屬同太傅加置令史御屬一人司徒皆置掾屬八人令史御屬十三人司空減司徒掾屬二人加置令史御屬八人正曰掾副曰屬長史掌署諸曹事掾史屬則西曹主府史署用東曹主二千石長史遷除及軍吏户曹主民户祠祀農桑奏曹主奏議辭曹主辭訟法曹主郵驛科程尉曹主卒徒轉運賊曹主盗賊决曹主罪法兵曹主兵金曹主貨幣鹽鐡倉曹主倉糓令史則有閣下令史主閣下威儀記室令史主上章表報書記門下令史主府門其餘令史各典曹文書御屬主為公御職如録事太尉府别有黄閣主簿録省衆事司空别有橋道掾主橋道大將軍驃騎將軍府有司馬一人從事中郎二人長史掾屬同司空府令史御屬减司空府五人騎衛將軍無長史司馬又減大將軍掾屬九人御屬六人别有部集一人縂知營事兵曹掾史主兵事噐械禀假掾史主稟假禁司外刺刺姦主罪法皆無員其領兵外討則營有五部部置校尉軍司馬各一人部有曲曲置軍候一人曲有屯屯置長一人若不置校尉則部但有軍司馬假軍候其别部則有别部司馬其餘將軍置以征伐者則府無員職惟有部曲司馬軍候以領兵其城門屯騎越騎歩兵胡騎射聲等校尉各有司馬一人主兵使匈奴郎將䕶羗䕶烏桓等校尉皆置從事二人有事隨事置掾因而為員司𨽻校尉有從事史二十人假佐二十五人都官功曹别駕簿曹兵曹等從事主簿門亭長功曹書佐經師月令師律令師簿曹都官等書佐皆無員所部郡國各有從事書佐一人刺史省都官從事改功曹從事為治中從事餘官同司𨽻河南京兆等尹有掾史五人四部督郵吏部掾二十六人案獄仁恕掾三人監津渠漕水掾二十五人卒吏二百五十人文學守助掾六十人書佐五十人循行二百三十人幹小史二百三十一人郡守官屬有掾史督卸倉功等曹史不備載其職光武建武中置司徒司直尋省又罷邉郡丞以長史領職明帝増驃騎將軍長史掾史員為四十人四府長史掾史皆無四十人東平王蒼為驃騎明帝特置四十人以優之和帝時竇憲為車騎將軍置官屬如司空府又置中䕶軍一人與叅謀議安帝置右扶風都尉京兆虎牙都尉皆置諸曹掾史畧如公府無東西曹有功曹史主選署功勞五官椽署功曹及諸曹事五部督郵曹掾主監屬縣亭長主正門記室史主錄記書催期㑹無令史閣下及諸曹各有佐幹主文書桓帝元嘉二年置禮儀大將軍増掾屬令史置舍人各十人時以梁冀為禮儀大將軍靈帝時以九卿出為州牧太常劉焉為益州宗正劉州虞為幽州太僕黄琬為豫其任漸重官屬有别駕從事史主財糓簿書兵曹從事史主兵事主簿錄閣下衆事省署文書門亭長主州正門功曹書佐主選用孝經師主監試經月令師主時節祭祀律令師平律簿曹佐主簿書各一人部郡從事史主察非法典郡書佐主一郡文書毎郡各一人獻帝建安十二年置中䕶中軍領軍各有長史司馬員魏武帝為丞相置左右長史各一人徵事二人省西曹掾是時三國鼎峙官府吏屬各因漢制加有正行叅軍行叅軍員後晋景帝為魏大將軍置東西户倉賊金水兵騎兵等曹掾各一人不置屬文帝為相國府官置中衛驍衛二將軍左右長史司馬從事中郎主簿各四人舍人十九人叅軍二十二人叅戰十一人後復置左右户賊金水兵等曹屬各一人倉曹屬二人増置鎧集法奏等曹掾屬各一人士馬媒等曹屬各一人㪚屬九人晋初諸公開府位從公驃騎車騎衛將軍伏波撫軍都軍䕶鎮中軍四征四鎮龍驤典軍上軍輔國等大將軍左右光禄光禄三大夫開府者皆為位從公長史一人西東閣祭酒西東曹掾户倉賊曹令史屬各一人御屬閣下令史西東倉户賊等曹令史門令史記室省事令史閣下記室書令史西東曹學事各一人司徒加置左右長史各一人主簿左西曹掾屬各一人改西曹為右西曹司空加置橋道掾一人其加兵者增置司馬一人從事中郎二人主簿記室督掾各一人舍人四人兵鎧士曹營軍刺姦帳下都督外都督令史各一人為持節都督者増叅軍六人驃騎以下及大將軍不開府非持節都督及三品將軍者置長史司馬各一人主簿功曹史門下督録事兵鎧士賊曹營軍刺姦帳下都督功曹書佐門下書史各一人州刺史置别駕治中從事主簿門亭長録事記室書佐諸曹佐守從事武猛從事都水從事等吏四十一人所領郡各置部從事一人邉州又置弓馬從事五十餘人徐州别置淮海從事凉州别置河津從事荆州别置監佃督各一人凉益州又加置吏員八十五人郡置主簿主記室門下賊曹議生門下史記室史録事史書佐門下書佐循行幹小史五官掾功曹書佐循行小史五官掾文學掾等員河南郡京師所在則置尹王國以内史掌太守事其吏屬並同凡郡國户減五千者職五十人㪚吏十三人五千以上加職吏十三人㪚吏八人萬户以上又加職吏六人㪚吏十八人武帝初置左右衛將軍亦有長史司馬功曹主簿員後安平獻王孚為太宰而分府兵鎧士營軍刺姦五曹增置屬楊駿為太𫝊又増祭酒為四人分兵曹為左右法金田集水戎車馬等曹皆置屬趙王倫為相國置左右長史司馬從事中郎四人叅軍二十人主簿記室督祭酒各四人東西曹又置屬餘十八曹加置掾諸曹又皆置御屬令史學幹等員東海王越為丞相府又置行叅軍兼行叅軍元帝初為鎮東將軍置録事叅軍為丞相置從事中郎分掌諸曹有録事度支三兵等中郎以諮議叅軍主諷議事有録事記室東西度支户法金倉理中兵外兵騎兵典兵兵賊運禁防典賔鎧田士騎士車直兵長流刑獄城局水右户墨等曹其后公府止置長史倉曹掾户曹屬東西閣祭酒各一人主簿舍人二人御屬二人令史無定員領兵者置司馬一人從事中郎二人叅軍無定員加崇者置左右長史司馬從事中郎四人掾屬四人增置倉曹屬户曹掾領兵者又置軍諮祭酒叅軍督䕶以領兵中䕶中軍領軍府增置功曹主簿出征則置叅軍時又有長兼叅軍除拜則為叅軍事府版則為行叅軍又為版行叅軍五校亦置司馬功曹主簿員後省五校屯騎歩兵越騎長水射聲校尉也又罷左右衛將軍長史員成帝咸康中置江州别駕祭酒省諸郡丞宋髙祖為相止置諮議録事記室户倉外兵騎兵長流賊刑獄城局法田水鎧士集右户墨等曹叅軍皆無員合中兵直兵置一叅軍曹仍舊為二自後公府皆循其制而小府省長流叅軍置禁防叅軍諸府叅軍督䕶罷領軍兵騎將軍以下為刺史都督儀同三司者置官屬並如公府都督不帶儀同者不置從事中郎置公曹一人主吏在主簿上刺史則有别駕從事史治中從事從王簿西曹書佐祭酒從事史議曹從事史部郡從事史揚州無祭酒以主簿治事荆州别有從事史廣州徐州别有月令從事豫州别有長史叅軍别駕西曹主吏及選事西曹郎漢之功曹也治中主衆曹文書祭酒分掌諸曹事郡屬卒因前制文帝元嘉四年定置郡官略如公府無東西曹有功曹史主選舉五官掾主諸曹部縣有都御門亭長主記史催督期㑹齊州郡之職亦循前制三公府置左右長史左西曹掾屬主簿祭酒令史從事中郎倉曹掾户曹屬東西閣祭酒主簿舍人御屬等員加崇者長史以下並増員數大將軍位從公開府儀同等府置左長史司馬各一人諮議以下叅軍並同宋公府而城局以上曹署正叅軍法以下曹署行叅軍無曹職為専兼員梁諸公大將軍大司馬等府置長史司馬諮議叅軍掾屬從事中郎記室主簿列曹叅軍行叅軍舍人等員司徒府則有左右長史左西曹掾州别有文學從事郡官仍舊陳庶姓公府置諮議叅軍長史司馬從事中郎掾屬府中録事記室直兵參軍板中録事記室直兵參軍主簿祭酒參軍等員庶姓持節府省從事中郎叅軍别置功曹史餘同公府庶姓非公不持節將軍止置長史主簿安蠻戎越校尉中郎將止置長史司馬正員之外皆有版授官自餘州郡之吏皆循梁制後魏起於代北庶職草創道武皇始元年初令州郡定置刺史太守而寮屬未著至大和定令官制始詳三公大將軍府有司馬長史元士諮議叅軍主簿從事中郎叅軍行記室督掾屬舍人御屬令史閣下令史又有録事叅軍事功曹記室户倉中兵叅軍事叅軍事列曹行叅軍行叅軍長兼行叅軍叅軍都督開府置長史從事中郎諮議叅軍正叅軍主簿行叅軍記室督令史一品二品三品正從將軍開府别有功曹史無元士記室督掾屬舍人御屬令史其長史諮議録事及諸叅軍督䕶員並如公府四品五品正從將軍止置長史司馬主簿列曹叅軍列曹行叅軍中軍鎮軍撫軍有長史司馬中㪚行叅軍校督州有别駕功曹都官司事從事録事從事史治中從事史主簿議曹從事史郡有功曹主簿通事等員宣武永平二年併省諸州諮議記室户刑獄田水集士等曹叅軍孝莊初増大丞相太宰佐史時以爾朱榮為大丞相元天穆為太宰孝静天平中置京畿大都督立府置佐而史闕其職後齊立大三公府無元士分户曹為左右加置外兵騎兵長流城局刑獄等曹叅軍事東西閣祭酒法墨田水鎧集士等曹行叅軍餘並如後魏制司徒府加左右長史三公以下儀同三司開府者減記室倉城局田水鎧士等曹各一人領軍中領軍䕶軍中䕶軍府皆有長史司馬功曹主簿録事等員其領軍府所領左右衛左右䕶軍府所領東西南北四中郎將府各減功曹録事員而郎將府加置録事叅軍統府録事直兵功倉中兵外兵騎兵長流城局等叅軍法田鎧曹行叅軍司府牧置别駕從事史治中從事史州都主簿西曹書佐記室户功金租兵騎等曹都官法部郡等從事主簿置史西曹以下各置掾史清都郡置丞中正功曹主簿都御五官門下督録事主記議生功曹記室户田金租兵騎賊法等曹掾中部掾州刺史屬官有長史司馬録事功倉中兵等曹叅軍事及掾史主簿及掾記室掾史外兵騎兵長流城局刑獄等叅軍叅軍事及掾史叅軍事法墨田鎧集士等曹行叅軍及掾史左户掾史行叅軍長兼叅軍叅軍督䕶統府直兵箱録事等員州屬官有别駕從事史治中從事史州都先迎主簿主簿西曹佐月令史祭酒從事史都郡從事早服從事典籖及史門下督省事都録事及史箱録事史朝直刺姦記室户田金租兵左户等掾史上上州刺史府及州屬官佐吏共三百九十三人上中上下州各差减十人中上州又减五十一人中中中下州又差減十人下上州又減五十人下中下下州又差減十人郡太守屬官有丞中正先迎功曹先迎主簿功曹主簿五官省事及西户金租兵集等曹掾佐太學博士助教太學生市長倉督等員上上郡太守官屬佐吏共二百十二人上中上下郡各差減五人中上又減四十五人中中中下郡又減五人下上郡又減四十人下中下下郡又差減二人後周六官之制公府有上大夫元士統軍驃騎車騎柱國大將軍四征中鎮撫諸將軍府有長史司馬司録中郎掾屬列曹叅軍戍副等員别將開