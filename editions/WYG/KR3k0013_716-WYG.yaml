王舒為溧陽令明帝之為東中郎將妙選上佐以舒為司馬轉後將軍宣城公禇裒諮議叅軍頻領望府咸稱明練宋張邵為髙祖揚州主簿世子始開征虜府以邵為録事叅軍遷諮議叅軍領記室張敷少整貴文韻端雅武帝聞其美召見竒之曰真千里駒也以為世子中軍叅軍袁洵元嘉中累歴顯官盧陵王紹為南中郎將江州刺史少年未親政以洵為長史尋陽太守行府州事張暢為尚書主客郎未拜除江夏王義恭征北記室叅軍孝武鎮彭城暢為安北長史沛郡太守元嘉末暢履行盱眙城欲立大鎮時魏軍聲云當出襄陽故以暢為南譙王義宣司空長史張永為右衛將軍免官時孝武寵子新安王子鸞為南徐州刺史割呉郡屬徐州起永為别駕從事史南齊張融字思光呉人宋孝武間融有早譽觧褐為新安王北中郎㕘軍張岱初仕宋為撫軍諮議㕘軍領山隂令時巴陵王休若為北徐州未親政事以岱為冠軍諮議㕘軍領彭城太守行府州國事後臨海王為征虜廣州豫章王為車騎揚州晋安王為征虜南兖州岱歴三府諮議遷驃騎長史領廣陵太守新安王子鸞以盛寵為南徐州髙選佐史孝武召岱謂之曰卿美效夙著兼資宦已多今欲用卿為子鸞總刺史之任無謂小屈終當大伸也王琨初仕宋為歴陽内史孝武以琨忠實徙為寵子新安王東中郎長史歴右衛将軍度支尚書出為永嘉王左軍始安王征虜二府長史皆孝武諸子也王僧䖍初仕宋自太子庶子出為豫章王子尚撫軍長史遷㪚騎常侍復出為新安王子鸞北中郎長史二藩皆孝武之愛子也陸慧曉為太子洗馬建元初武陵王􅁮守㑹稽太祖為精選僚吏以慧曉為征虜功曹王繢為東陽太守武帝為撫軍時吏部尚書張岱選繢為長史呈選牒太祖笑謂岱曰此素望也張沖建武中為廬陵王北中郎司馬未拜豐城公遥昌為豫州帝慮冦未已徙仲為征虜長史南梁郡太守胡諧之為武帝江州别駕文惠太子初鎮襄陽帝以諧之心腹出為北中郎征虜司馬扶風守爵闗内侯在鎮毗賛甚有心力崔慧景為南郡内史南蠻長史加輔國将軍内史如故先是蠻府置佐資用甚輕至是始重其選孔琇之為呉興太守時明帝輔政防制諸藩致宻㫖于上佐隆昌元年遷琇之為寧朔将軍晋熈王冠軍長史江夏内史行郢州事梁張率字士簡為秘書丞直夀光省晋安王戍石頭以率為雲麾中記室王遷南兖州轉宣毅諮議㕘軍兼記室王還都率除中書侍郎王為荆州復以率為宣惠諮議領江陵令府遷江州以諮議領記室出監豫章臨川郡率在府十年㤙禮甚篤到溉為湘東王繹輕車長史行府郡事武帝敕繹曰到溉非直為汝行事足為汝師江革為少府卿時武陵王在東州頗自驕縱髙祖召革面敕曰武陵王年少臧盾性弱盾王之官屬也不能規正欲以卿代為行事非卿不可不得有辭乃除折衝將軍東中郎武陵王長史㑹稽郡丞行府州事後魏鄧述為齊州刺史初改置百官始重公府元佐時太傅元丞出為并州刺史以述為太傅長史帶太原太守刁整字景智少有大度頗渉書史為郡功曹太和十五年奉朝請孝文都雒親自臨選除司空法曹㕘軍從帝南討命廣陽王嘉鎮荆州以整為嘉外兵㕘軍事崔珽為典屬國下大夫太和十八年大将軍宋王劉昶南鎮彭城詔假立義将軍為昶府長史珽以疾辭免乃以王肅為長史李慿唐茂盧尚之孝文時趙郡王幹為都督冀定瀛三州諸軍事詔以慿為長史茂為司馬尚之為諮議㕘軍以輔弼之傳永字修期為任城王長史王肅之為豫州以永為平南長史咸陽王禧慮肅難信言於孝文孝文曰已選傳修期為其長史雖威儀不足而文武有餘矣肅以永宿士禮之甚厚永亦以肅為孝文眷遇盡心事之情義至穆崔鴻為尚書都兵郎中永平初豫州城人白早生殺刺史司馬悦據懸瓠叛詔鎮南将軍邢巒討之以鴻為行臺鎮南長史李系為主客郎齊文襄王攝選以系為司徒諮議㕘軍因謂之曰自郎署至此所謂不次以卿人才故有此舉耳後周薛寘西魏末為中書令時車騎大将軍儀同三司燕公于謹征江陵以寘為司録軍中謀畧寘並㕘之薛端字仁直太祖時大軍東討以柱國李弼為别道元帥妙簡首僚數日不定帝謂弼曰為公思得一長史無過薛端對曰眞其才也乃遣之樂遜為小師氏下大夫以經術教授譙王儉以下束脩行弟子之禮及衛公直鎮蒲州以遜為直府主簿加車騎將軍左光禄大夫隋元巖為兵部尚書髙祖初即位遣晉王廣鎮并州蜀王秀鎮益州盛選寮佐於時巖與王韶俱以骨鯁知名物議稱二人才俱侔於髙頻由是拜巖為益州總管長史韶為河北道行臺右僕射髙祖謂之曰公宰相大器今屈輔我兒亦如曹㕘相齊之意也及巖到官法令明肅吏民稱焉令狐熈為上開府㑹蜀王秀出鎮於蜀綱紀之選盛屬正人以熈為益州總管長史楊异為宗正少卿蜀王秀之鎮益州也朝廷盛選綱紀以异方直拜益州總管長史賜錢二十萬縑三百疋馬五十匹而遣之宇文㢸領太子虞侯時朝廷以晉陽為重鎮并州總管必屬親王長史司馬亦一時髙選前長史王韶卒以㢸有文武幹用出為并州長史皇甫誕開皇中為尚書左丞時漢王諒為并州縂管朝廷盛選寮佐前後長史司馬一時名士髙祖以誕公方著稱拜并州搃管司馬總府政事一以諮之諒甚敬焉趙軌開皇中自齊州别駕徵至京師時衛王爽為原州縂管髙祖見爽年少以軌所在有聲授原州縂管司馬源師為尚書右丞時蜀王秀頗違法度乃以師為益州縂管司馬劉臻開皇中為儀同三司左僕射髙頻之伐陳也以臻隨軍典文翰進爵為伯唐宇文歆為右衛將軍武徳初齊王元吉為并州縂管時劉武周南侵汾晉遣歆助元吉守并州封倫為内史侍郎武徳初太宗之討王世充髙祖召倫㕘謀軍事以功封平原縣公兼天䇿府司馬温彦博為中書侍郎武徳中突厥入冦髙祖命右衛大将軍張理為并州道行軍縂管出拒之以彦博為行軍長史竇昭為少卿監天寳末𤣥宗幸蜀以永王璘為山南東路及黔中江南西路節度度支採訪以昭為之副鄧景山為隴西太守天寳末𤣥宗以豐王珙為威武都督領河西隴右安西北庭等路節度採訪使以景山為之副裴冕為御史中丞肅宗即位於靈武以元子廣平王領朔方河東河北三道節度使以冕為之副蘇震為吏部侍郎暢璀為諫議大夫至徳初肅宗以廣平王為天下兵馬元帥以震璀為副使判官李進為御史中丞寳應初代宗以元帥雍王統河東朔方及諸道行營兵馬時囘紇兵馬十餘萬東討逆賊史朝義以進為行軍司馬又以中書舍人韋少華為掌書記李復大厯中厯江陵府司録江陵少尹建中初李希烈背判荆南節度張伯儀數出兵為希烈所敗時朝廷憂之以復乆在江陵得軍州人心時復在母䘮乃起復為江陵少尹兼中丞充節度行軍司馬蕭復為兵部侍郎建中末晉王誼為揚州大都督持節荆襄江西沔鄂等道節度使兼諸将軍行營兵馬都元帥討李希烈以復為户部尚書兼御史大夫充帥統軍長史舊令有行軍長史以復父名衡更之又以新除潭州刺史孔巢父為右庶子兼御史中丞行軍左司馬山南東道節度行軍司馬檢校兵部郎樊澤為諌議大夫兼御史中丞行軍右司馬刑部員外郎劉從一為吏部郎中侍御史韋賛為工部郎中并兼御史中丞充判官兵部員外郎髙叅為兵部郎中掌書記右金吾衛大将軍渾瑊為檢校工部尚書兼御史大夫為中軍虞侯又以左㪚騎常侍歸崇敬㕘謀㑹朱泚亂不行陸長源為汝州刺史貞元中董晋為宣武軍節度朝廷恐晉柔懦尋以長源為晉行軍司馬李景畧為左羽林将軍貞元中對於延英殿奏論衎衎有大臣風采時河東李説有疾詔以景畧為太原少尹節度行軍司馬時方鎮節度使少徵入換代者皆死亡乃命為行軍司馬盡簡自上意受命之日人心屬之郗士美未冠為陽翟丞李抱真鎮潞州邀為從事雅有㕘賛之績其後易二帥皆詔士美佐之裴向為户部員外郎徳宗季年天下方鎮副倅多選自於朝防一日有變遂就授之節制向以選為太原少尹徳宗召見喻㫖尋用為行軍司馬兼御史中丞辛秘為湖州刺史僉以材任将帥元和初太原節度范希朝領師出討王承宗詔徵秘為河東行軍司馬崔𢎞禮為棣州刺史元和中魏博田𢎞正請入覲思得副其事者𢎞禮以選授衛州刺史充魏博節度副使乆之除鄭州刺史長慶元年劉搃入覲張𢎞靖移鎮范陽復以𢎞禮檢校左㪚騎常侍充幽州盧龍軍節度副使胡証為長安縣令元和中田𢎞正以魏博内屬詔証以左庶子為之副馬縂為刑部侍郎元和十二年門下侍郎平章事裴度出為彰義軍節度淮西宣尉處置等使憲宗以縂兼御史大夫充副使右庶子韓愈兼御史中丞充行軍司馬司勲員外郎李正封都官員外郎馮宿禮部員外郎李宗閔並兼侍御史充判官書記錢可復為禮部郎中太和末翰林侍講學士工部尚書鄭注出鎮鳯翔文宗以可復為檢校兵部郎中兼御史中丞充鳯翔行軍司馬兼賜紫以駕部員外郎盧簡能為檢校司封郎中兼侍御史充鳯翔節度判官以主客員外郎蕭傑為檢校工部郎中兼侍御史充鳯翔觀察判官並賜緋以左拾遺盧茂𢎞為鳯翔節度掌書記後唐任圜為工部尚書同光二年魏王繼岌為伐蜀行營都統莊宗以圜及翰林學士李愚從王出征㕘預軍機任賛為刑部侍郎長興四年秦王從榮為兵馬元帥以賛為兵部侍郎充元帥府判官馬義為比部郎中天福中以為檢校尚書吏部郎中兼御史中丞充河陽節度判官朝廷選佐皇子故也漢張允初仕後唐為兵部員外郎知制誥清㤗初皇子重美為河南尹典六軍諸衛事時朝廷選叅佐以允剛介改給事中充六軍判官周張可復為左諫議大夫漢乾祐初湘隂公鎮徐方朝行中選可倅戎者因授武寧軍節度副使檢校禮部尚書王敏為侍御史世宗鎮澶淵太祖以敏謹厚有稱遂命為澶州節判及世宗尹正王畿改開封少尹倚任夫居牧伯之任當將帥之重雖復奉法遵職盡節効命亦何嘗不推擇僚佐咨諏委頼然後政成而功立者哉由漢以来選辟甚盛乃有待遇隆篤周旋倚任至於條教憲令俾之裁處機謀戎務咸用闗决假其風望以挾彈豪縱倚其忠厚以縂督居留極其辭藻之能施之文檄之用知人而善使推誠而不疑繇是懷才者得盡其長立義者得宣其教叶賛斯至勲業用彰古人謂申於知己者此之謂也漢黄覇為河南太守丞覇為人明察内敏又習文法為丞處職當於法令太守甚任之陳湯為大将軍王鳯從事中郎幕府事壹决於湯後漢劉平為濟陽郡丞太守劉育甚重之任以郡職韓稜潁川舞陽人初為郡功曹太守葛興中風病不能聼政稜隂代興視事出入二年令無違者朱穆舉孝亷屬江淮盗賊羣起大将軍梁冀素聞穆名乃辟之使典兵事甚見親任趙勤南陽人太守桓虞召為功曹委以郡事嘗有重客過虞欲託一事為曹吏虞曰我有賢功曹趙勤當與議之客潜於内中聼虞乃問勤勤對曰恐未合衆客曰止止勿復道也范滂字孟博汝南人太守宗資請署功曹委任政事時人謡曰汝南太守范孟博南陽宗資主畫諾岑晊字公孝南陽太守成瑨下車欲振威嚴聞晊名請為功曹時人謡曰南陽太守岑公孝𢎞農成瑨但坐嘯王渙為廣漢功曹太守陳寵徵為大司農和帝問何以為治寵曰臣任功曹王渙由是知名一云寵顯用良吏王渙鐔顯以為腹心訟者日減郡中清肅陳蕃為汝南郡主簿太守王堂搜才禮士不苟自專乃教掾史曰古人勞於求賢逸於任使故能化清於上事緝于下其憲章朝右簡覈朝職委功曹陳蕃禆政理務拾遺補闕任主簿應嗣庶循名責實察言觀效焉自是委誠求當不復妄有辭教郡内稱治魏審配漢末為袁紹冀州别駕紹委以腹心并摠幕府臧洪廣陵人漢末為郡功曹太守張超兄邈謂超曰聞弟為郡守政教威恩不由己出動任臧洪洪果何人超曰洪才略智術優超超甚愛之海内竒士也邈即引見洪與語大竒之蔣濟為太祖丞相主簿西曹屬令曰舜舉臯陶不仁者逺臧否得中望於賢屬楊修字徳祖為太祖丞相倉曹屬主簿是時軍國多事修摠知内外事皆稱意自魏太子已上並爭與交好徐奕字季才為太祖司空掾屬從西征馬超超破軍還時闗中新服未甚安留奕為丞相長史鎮撫西京稱其威信轉為雍州刺史復還為東曹屬太祖征吳徙為留府長史謂奕曰君之忠亮古人不過也然微太嚴昔西門豹佩韋以自緩夫能以柔弱制剛彊者望之于君也今使君統留事孤無復還顧之憂也滿寵字伯寧山陽昌邑人也年十八為郡督郵時郡内李朔等各擁部曲害於平民太守使寵糾焉朔等請罪不復鈔略蜀蔣琬字公琰為丞相諸葛亮叅軍亮住漢中琬與長史張裔統留府事後代裔為長史亮素外出琬嘗足食足兵以相供給亮每言公琰託志忠雅當與吾共贊王業者也楊儀為諸葛亮長史加綏軍將軍亮數出軍儀嘗規畫分部籌度粮穀不稽思慮斯須便了軍戎莭度取辦於儀吳劉靖盧江人孫皓為征虜將軍督夏口委靖以得失委江夏李允以衆事廣陵吳碩河南張梁以軍旅而傾心親待莫不自盡晉裴秀歴文帝安東及衞將軍司馬軍國之政多見信納遷散騎常侍帝討諸葛誕秀與尚書僕射陳泰黄門侍郎鍾會以行臺從豫叅謀略山濤為文帝大將軍從事中郎鍾會作亂於蜀帝將西征時魏氏諸王公並在鄴帝謂濤曰西偏吾自了之後事深以委卿以本官行軍司馬給親兵五百人鎮鄴王祥為呂䖍徐州别駕䖍委以州事州界清靜政化大行時人歌之曰海沂之康每賴王祥邦國不空别駕之功一云民事一以委之世多其任能郭舒順陽人王澄為荆州刺史既至鎮日夜縱酒不親庶事雖冦戎急務亦不以在懷擢舒于寒悴之中以為别駕委以州府羅尚字敬之善屬文荆州刺史王戎以尚及劉喬為叅軍並委任之劉毅字仲雄僑居陽平太守杜恕舉為功曹月餘日沙汰郡吏百餘人為之語曰但聞劉功曹不聞杜府君應詹為鎮南大將軍劉𢎞長史𢎞詹之祖舅請之曰君器識𢎞深後當代老子于荆南矣乃委以軍政𢎞著績漢南詹之力也溫嶠為劉琨平北大將軍叅軍琨遷司空以嶠為右司馬時并土荒殘冦盗羣起石勒劉聰跨帶疆場嶠為之謀主琨所憑恃焉諸葛恢為元帝瑯琊王從事中郎愍帝即位徵用四方賢雋召恢為尚書郎王以經緯碩才疏留之卞壼字望之元帝為瑯琊王鎮建業召為從事中郎委以選舉甚見親仗趙裔為王導從事中郎南頓王宗反裔殺宗於是導及庾亮並倚仗之轉鎮軍將軍毛穆之寳之子果毅有父風為安西將軍庾翼叅軍翼等專制陜西以子方之為建武將軍守襄陽方之年少翼選武將可信仗者為輔弼乃以穆之為建武司馬王珣為桓温大司馬主簿時温經略中夏竟無寧嵗軍中機務並委珣焉江逌為吳令中軍將軍殷浩將謀北伐請為諮議叅軍浩甚重之遷長史浩方修復雒陽經營荒梗逌為上佐甚有輔弼之益軍中書檄皆以委逌劉鍾為劉牢之鎮北叅軍督護髙祖每有戎事鍾不辭艱劇專心盡力甚見愛信宋劉穆之髙祖初定京城辟為車騎主簿諸大處分皆倉卒立定並穆之所建也遂委以腹心之任動止諮焉穆之亦竭莭盡誠無所遺隠從征廣固還拒盧循常居幕中畫策決㫁衆事劉毅等疾穆之見親每從容言其權重髙祖愈信仗之後遷太尉中軍司馬髙祖西伐司馬休之中軍將軍長沙王道璘知留任而事無大小一決穆之乃加丹陽尹髙祖西討劉毅以諸葛長民監留府摠攝後事髙祖疑長民難獨任留穆之以輔之加建威將軍置佐吏配給實力長民果有異謀而猶豫不能發乃屏人謂穆之曰悠悠之言皆云太尉與我不平何以至此穆之曰公泝流逺伐而以老母稚子委莭下若一毫不盡豈容如此邪意乃小安髙祖還長民伏誅臧燾為通直郎髙祖鎮軍車騎中軍太尉諮議叅軍髙祖北伐闗雒大司馬瑯琊王同行除大司馬從事中郎摠留府事謝景仁為髙祖車騎司馬及髙祖北伐時大司馬瑯邪王天子母弟屬當儲副髙祖深以根本為憂轉景仁為大司馬專摠府任徐羡之為髙祖太尉左司馬髙祖北伐掌留任以副貳劉穆之謝晦為髙祖太尉主簿從征闗雒内外要任悉委之王誕為髙祖太尉諮議叅軍轉長史盡心歸奉日夜不懈髙祖甚委使之張茂度為髙祖太尉主簿揚州治中從事史髙祖西伐劉毅茂度居守留州事悉委之軍還遷中書侍郎髙祖北伐闗雒復任留州事王華為文帝司馬太祖入奉大統留華摠後任顔竣為孝武安北鎮軍北中郎府主簿孝武鎮潯陽遷南中郎記室叅軍元嘉三十年春以父延之致仕固求觧職不許賜假未發而孝武舉兵入討元凶轉諮議叅軍領録事任總外内并造檄書孝武發潯陽便有疾領録事自沈慶之以下並不得相見唯竣皆專㫁施行張邵初為世子中軍叅軍武帝北伐邵請見曰人生危脆必當逺慮劉穆之若邂逅不幸誰可代之事業如此苟有不諱事將如何帝曰此自委穆之及卿耳又為文帝荆州司馬領南郡相事悉決於邵劉湛為彭城王義康豫州長史梁郡太守義康弱年未得親政府州事悉委湛後為江夏王義恭撫軍長史湛子琰于江陵病卒湛求自送喪還都義恭亦為之陳請文帝答義恭曰吾亦得湛啓事為之酸懷乃不欲苟違所請但汝弱年新涉庶務八州殷曠專㫁事重疇咨委仗不可不得其人量算二三未獲便相順許今答湛啓權停彼塟頃朝臣零落相繼寄懐轉寡湛實國器吾乃欲令其引還直以西夏任重要且停此事耳汝慶賞黜罰豫闗失得者必宜悉相委寄庾登之為衡陽王義季征虜長史義季少年未親政衆事一以委之范曄為始興王濬後軍長史領南下邳太守及濬為揚州未親政事悉以委曄謝方明為左將軍道璘長史髙祖命府内衆事皆諮決之隨府轉中軍長史尋更加晉陵太守復為驃騎長史南郡相委任如初江湛為吏部郎隨王誕為北中郎將南徐州刺史以湛為長史南東海太守政事悉委之南齊胡諧之南昌人武帝頓盆城使諧之守潯陽城及為江州復以諧之為别駕委以事任沈沖字景綽為武帝征虜長史潯陽太守甚見委遇帝還都使沖行府州事江祏為明帝驃騎諮議叅軍帝時輔政委以腹心沈瑀為竟陵王子良府叅軍領揚州部傳從事子良甚相知賞家事皆委瑀子良薨瑀復事刺史始安王遥光嘗被使送民丁速而無怨遥光謂同使吏曰爾何不學沈瑀所為乃令瑀專知州獄事李珪之字孔璋為蔡興宗安西府佐委以職事清治見知宗史為南康王荆州别駕時西土位望唯史與同郡樂謁劉坦為州人所推信故領軍將軍蕭頴胄深相委仗每事諮焉徐摛為晉安王諮議叅軍王總戎北伐以摛兼寧蠻府長史叅贊戎政教命軍書多自摛出孔休源為晉安王府長史南蘭陵太守别敕專行南徐州事休源累佐名藩甚得民譽王深相倚仗軍民機務動止詢謀嘗于中齋别施一榻云此是孔長史坐人莫得預焉其見敬如此梁蔡道恭齊末為和帝西中郎中兵叅軍帝起兵蕭頴胄以道恭素著威略専相委任王茂為髙祖雍州長史帝以王佐許之事無大小皆詢焉何逺為後漢軍鄱陽王恢録事叅軍在府盡其智力知無不為恢亦推心仗之恩寄甚密蕭允為晉王長史王為南豫州允從為長史時王尚少未親民務故委允行府州事劉穀為湘東王中記室太清中侯景亂世祖稱制上疏書檄多委焉穀亦竭力盡忠甚蒙賞遇許亨為太尉王僧辨從事中郎與吳興沈景對掌書記府朝政務一以委焉庾黔婁鄉人鄧元起為益州刺史以黔婁為録事叅軍又得荆州刺史蕭遥欣故客蔣光濟並厚待之任以州事黔婁甚清潔光濟多計謀並勸為善政劉盈為岳陽王察中郎府録事叅軍隨察之鎮有器度勤于公軍國經謀頗得察預陳謝岐仕梁為山隂令侯景亂岐流寓東陽景平依於張彪彪在吳郡及會稽庶事一以委之彪每征討嘗留岐監郡知後事趙知禮字齊旦髙祖討元景仲引為記室常侍左右深被委任當時計畫莫不預焉知禮亦多所獻替陸山才字孔章為周文育南豫州都督長史文育不知書疏政事悉以委之文育南討歐陽頠計畫多出山才及文育西征王琳留山才監江州事仍鎮豫章盧淵為京兆王愉兼長史賜絹百疋愉既年少巨細多決于淵淵以誠信御物甚得東南民和陸見賢侍中繕之兄子宣帝為揚州牧乃以為治中從事史深被知遇歴給事黄門侍郎程文季為始興王府門内中直兵叅軍是時王為揚州刺史鎮治城府中事悉以委之後魏辛琛為滎陽郡丞孝文南征太守元麗從輿駕詔琛曰委郡事如太守也髙顥自符璽郎中出為冀州别駕未之任屬刺史元愉據州反宣武遣尚書李平為都督率衆討之平以顥彼州領袖乃引為録事叅軍仍領統軍軍機取舍多與參決楊機字顯略為河南尹元暉功曹暉尤委以郡或謂暉曰弗躬弗親庶人弗信何得委事于機髙卧而已暉曰吾聞君子勞於求士逸於任賢吾既委得其才何為不可由是聲名更著陽固為尚書考功郎大軍征硤石敕為僕射李平行臺匕兵郎平竒固勇敢軍中大事悉與謀之崔光韶為濟州輔國府司馬刺史髙祖甚知之政事多委訪焉甄楷字徳㫖定州人刺史廣陽王淵被徵還朝時楷丁憂在鄉淵臨發召楷兼長史委以州任髙緒為冀州儀同府中司兵叅軍為府主封隆之所賞隆之行梁州引自隨常令摠攝數郡房天樂為青州别駕大將軍文秀拔為長史督齊郡州府之事一以委之髙道穆初為蕭寳寅行臺郎中軍機之事多以委之大都督崔延伯敗後賊勢轉彊屢請益兵朝廷不許寳寅謂道穆曰非卿一行兵無益理遂令乗傳赴雒靈太后親問賊勢道穆具以狀對太后怒曰比來使人皆言賊弱何獨云其强也道穆曰前使不實者當是冀陛下恩顔望霑爵賞臣既忝使人不敢虚妄願令近臣親簡足知虛實楊侃為叔椿雍州録事叅軍帶長安令府州之務多所委決崔康為彭城王勰衛軍府録事叅軍勰從征行招致壯俠以為部下勰目之謂左右曰吾當寄胆氣於此人姜儉為太尉外兵叅軍蕭寳寅討闗西引為開府屬軍機謀略多所叅預儉亦自謂遭逢知己遂竭誠委託盧陽烏為彭城王府長史京兆王愉拜都督徐州刺史以陽烏兼長史州事巨細委之朱瑞為將軍爾朱榮府戶曹叅軍瑞長厚質直敬愛人士又為大行臺郎中甚為榮所親任劉貴為爾朱榮府騎兵叅軍榮性猛急貴尤嚴峻每見任使多愜榮心遂被信遇位望日重加撫軍將軍北齊薛琡東魏天平初神武引為丞相長史琡宿有能名深被禮遇軍國之事多所闗知琡亦推誠盡莭屢進忠讜張華原字滿國少明敏有器度神武開驃騎府引為法曹叅軍遷大丞相府屬仍侍左右從于信都深為髙祖所親待髙祖每號令三軍府嘗令宣諭意㫖孫搴為神武相府主簿掌文筆能通鮮卑語兼宣傳號令當煩劇之任大見賞重趙彦深為神武丞相功曹叅軍専掌機密及文襄嗣位丞相慮河南有變乃自廵撫委彦深後事轉大行臺都官郎中臨發握手泣曰以母弟相託幸得此心既而内外寧靜彦深之力也裴昭字元景為文襄府墨曹叅軍甚見親委與陳元康崔暹等叅謀機密裴雋為幽州刺史盧文偉平北府長流叅軍雋案舊迹修督亢陂溉田萬餘頃民賴其修立之功多以委焉崔昂文襄在藩嘗委以腹心之任及入輔朝政召為開府長史時􅈴將親族賔客在都下放縱多行不軌孫騰司馬子如之門尤劇昂受帝密㫖以法䋲之未㡬之間内外齊肅李義深為并州長史時刺史可朱渾道元不親細務民事多委義深甚濟機速後周令狐整初為後魏東陽王元榮主簿委以庶務畫諾而已趙善初為後魏爾朱天光主簿天光討邢杲及万俟醜奴以善為長史軍中謀議每叅預之蘇亮初為後魏齊王蕭寳寅叅軍歴開府主簿記室叅軍寳寅稱大將軍仍為之掾寳寅雅知重亮凡有文檄謀議皆以委之尋行武功郡事甚著聲績長孫稚爾朱天光等西討並以亮為郎中專典文翰及賀拔岳為闗西行臺引亮為左丞典機密呂思禮初為後魏闗西大行臺賀拔岳郎中與姚幼愉入闗俱為岳所重專掌機密甚有時譽栁虬初為後魏馮翊王季海行臺郎中時軍旅務殷虬勵精從事或通夜不寢季海嘗云栁郎中判事我不復重看李昶初為後魏綏徳公陸通司馬太祖許之旭雖年少通特加接待公私之事咸取決焉王思政初為後魏員外散騎侍郎屬万俟醜奴宿勒明達等擾亂闗右北海王顥率兵討之啓思政隨軍軍中所有謀議並與叅詳申徽為太祖夏州記室叅軍兼府主簿太祖察徽沉密有度量每事信委之長孫儉為太祖夏州録事深敬器之賀拔岳被害太祖赴平涼凡有經綸謀策儉皆叅預趙肅字慶雍雒陽人大統三年獨孤信東討肅為司州别駕兼督粮儲軍用不匱太祖聞之謂人曰趙肅可謂雒陽主人也栁敏字白澤為太祖丞相府戶曹叅軍兼記室每有四方賔客常令主之爰及吉凶禮儀亦令監綜馮遷為晉公護府掾性質直小心畏慎雖居樞要不以勢位加人兼明練時事善于㫁決每校閱文簿孜孜不倦從晨逮夕未嘗休止以此甚為護所委任隋隂夀為髙祖丞相掾尉迥之亂韋孝寛以元帥撃之令夀監軍時孝寛有病不能親摠戎事每卧帳中遣婦人傳教命三軍綱紀皆取決于夀以功進位上柱國盧昌衡為夀州摠管宇文述長史述甚敬之委以州務李圎通為秦王并州摠管長史王仁柔自弱少㫁決府中事多决於圓通唐任瓌陳末為衡州司馬都督王勇甚敬異之委以州府之務裴矩初仕隋伐陳之役領元帥記室及陳平晉王令矩與髙熲収陳圖籍歸之秘府李靖為趙郡王孝恭行軍長史討蕭銑髙祖以孝恭未更戎旅三軍之任一以委靖牛仙客開元中為河西莭度蕭嵩判官嵩以軍政委仙客清勤不倦接待上下必以誠信裴冕天寳中為京畿採訪使王鉷判官冕雖無學術守職通明果於臨事鉷甚委之韋元甫初任滑州白馬尉以吏術知名本道採訪使韋陟深器之奏充支使與同幕判官員錫齊名元甫精於簡牘錫詳于訊覆陟推誠任之時謂員推韋狀呂諲為隴右河西莭度哥舒翰度支判官性謹守勤於吏職雖同寮追賞而塊然視事不離案簿翰益親之段秀實至徳初為安西判官父殁喪毁過禮都將李嗣業授莭制思秀實如失左右手表請起復為義王友充莭度判官張羣為京兆府司録肅宗以府尹劉晏判度支晏委府事於羣及杜亞綜大體議論號為稱職李復大歴中為江陵府司録精曉吏道尹衞伯玉厚遇之府中之事多以諮委性刻削為伯玉所信奏為江陵令遷少尹李融大歴中為福建都團練鮑防判官防移江西融復為團練判官政事多決于融張建封大歴中為河陽莭度馬燧判官李靈曜反於梁宋間與魏博田悅犄角同為叛燧與李忠臣同討平之軍務多以委建封人稱其能鄭雲逵建中末奉天之難以諫議大夫奔赴行在居數日神策行營莭度李晟表為行軍司馬戎略多咨之王鍔貞元中為江西莭度嗣曹王臯都虞侯鍔小心習業事善探府軍情狀至于語言動静巨細畢以白臯臯亦推心委之雖家醼妻女之會鍔或在焉鍔亦感臯之知事無所避盧羣貞元中為江西莭度嗣曹王臯判官曹王移鎮江陵襄陽羣皆佐使府幕中之事多以諮委以正直聞嚴震貞元中為東川莭度判官韋收薦為押衙改鎮王府司馬嚴武以宗姓之故軍府之事多以委之元義方精於吏理貞元中為京兆府司録時韋夏卿李實繼居尹正府之公務一以諮之梁敬翔為太祖宣武從事太祖與蔡賊相拒累嵗城門之外戰聲相聞機略之間翔頗預之太祖大悅恨得翔之晚故軍謀政術一以諮之蔡賊平奏授太子中允賜緋從平兖鄆檢校水部郎中裴廸太祖至汴延在賔席恩禮甚優厥後每統帥出征咸命主留事廸亦勤瘁夙夜不失所委累遷職至莭度判官官至檢校僕射光化初太祖牓于院曰謬膺重委摠校三藩軍機雖罄于拙謀民政全繄于右席莭度裴判官詳明吏理首冠賔筵冰蘖不渝始終如一自此應諸州錢穀刑獄等事並請指揮乃徧報管内咸遣知委後唐司空頲為魏州莭度使羅紹威掌書記紹威聚書萬卷尤工篇什每公私宴集無不屬和幕中皆知名士而頲益蒙睠遇軍機政術必先圖議誅牙軍之謀頲亦預焉淳于晏在霍彦威幕相得甚歡及歴數鎮皆為從事軍府之事至于私門事無巨細俱取決于晏雖為幕賔有若家宰爾後公侯門客往往效之時謂之效淳故彦威所至稱治由晏之力也晉張彭仕後唐為真定留守任圜推官事無巨細悉訪於彭册府元龜卷七百十六
