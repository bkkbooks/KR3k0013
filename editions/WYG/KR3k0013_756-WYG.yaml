body:
  text: 册府元龜卷七百五十六宋王欽若等撰總錄部孝第六唐虞世南父荔陳天嘉中卒世南尚㓜哀毁殆不勝喪陳文帝知其博學每遣中使至其家將䕶之及服闋召為建安王曹叅軍世南叔父寄䧟於陳寳應在閩越中世南雖除喪猶布衣蔬食至太建末寳應破寄還方令世南釋布食肉位秘書監隋竇抗字道生父榮定尚隋文帝姊萬安長公主官至雒州總管封陳國公抗在隋以帝甥之故甚見崇寵釋褐千牛備身屬其父寢疾抗躬親侍扶衣不解帶者五十餘日及居喪哀毁過禮後為梁州刺史丁母憂號慟絶而復蘇者數焉文帝令宮人至第節其哭泣李百藥定州安平人隋内史令徳林之子至性過人初侍父母喪還鄉徒跣單衣行數千里服闋數年容貌毁悴為當時所稱大業初授百藥為桂州司馬行至太湖遇刼賊將加白刄其子安期跪泣請代父命賊哀而釋之張志寛蒲州安邑人隋末喪父哀毁骨立為鄉里所稱賊帥王君廓屢為寇掠聞其名獨不犯其閭隣里頼之而免者百餘家後為里正詣縣稱母疾㥯來歸縣令問其狀對曰母嘗有所苦志寛亦有所苦向患心痛知母有疾令怒曰妖妄之辭也繋之於獄馳騐其母竟如所言令異之慰諭遣去及丁母憂負土成墳廬於墓側手植松栢千餘株王少𤣥博州􅂓城人父隋末於郡西爲亂兵所害少𤣥遺腹生年十餘歳問父所在其母告之因哀泣便欲求屍以塟時白骨蔽野無繇可辨或曰子以血霑父骨即滲入焉少𤣥乃刺其體以試之凡經旬日竟獲父骸以塟盡禮病創厯年方愈趙慈景高祖濳龍時尚桂陽公主及義兵起隋人將捕之或有勸慈景避吏出入備兵無為坐受拘縶慈景曰公之所言誠為良計但吾有老母以吾為命委之而去非吾心也俄而吏捕繋獄及隋平封開化郡公陳叔逹武徳中為侍中羣臣食於御前菜有蒲菊叔逹懷而不食高祖問其故對曰臣母患口乾求之不能致欲歸以遺母高祖曰卿有母可遺乎遂涕泣嗚咽久之乃止因賜物百段房𤣥齡父病綿厯十旬𤣥齡盡心藥膳未嘗解衣交􅊿及父終勺飲不入口者五日位司空劉子翼臨淮人貞觀元年勅召入京辭以繼母年老不赴及母卒摧毁傷感行路田伯明涇陽人少孤其伯母劉年十九而孀居操行貞固撫育伯明恩義甚篤及劉以夀終伯明廬於墓側負土成墳齋居菜食姚思亷丁繼母憂結廬墓次毁瘠殆不勝䘮位散騎常侍皇甫無逸貞觀中為冀州刺史其母疾篤太宗令驛召之無逸性至孝承問惶懼不能飲食因道疾而卒薛萬備為通事舍人初丁母艱截髪為髢以充歛及塟廬於墓次負土成墳太宗聞而嘉之降璽弔慰焉王瞿曇華州鄭人事親以孝養聞鄉里稱其敬譲塟祖父母及伯父皆負土成墳三年乃畢母終亦如之晝夜悲號哀感行路頭髪盡落形體枯悴墓門三年不掩夜嘗寢於棺側服終之後仍不離墓焉温振中書令彦博之子少有雅望官至太子舎人居䘮以毁卒李乾祐為侍御史母卒廬於墓側負土成墳呂方毅為右衛鎧曹叅軍母終哀慟過禮竟以毁卒而車載喪隨母輲車而塟友人郎餘令以白粥𤣥酒生蒭一束於路隅奠祭甚為時人之所哀惜云劉審禮刑部尚書徳威之子少喪母為祖母元氏所養隋末徳威從裴仁基討賊道路不通審禮年未弱冠時自鄉里負載元氏渡江避亂及天下定始西入長安元氏有疾審禮必親嘗湯藥元氏謂諸孫曰我兒孝順貫徹幽顯吾一顧念宿疾頓輕貞觀中歴左驍衛郎將丁父憂去職及塟跣足隨車流血灑地行路稱之永徽中累遷將作大匠檢校燕然都督襲封彭城郡公審禮父没雖乆猶悲慕不已每見父時寮舊必嗚咽流涕母鄭氏早亾事繼母平壽縣主又以孝聞縣主稍有疾輙憂懼形於容色朝夕不寐撫繼母男延景友愛甚篤所得祿俸皆送母處以資延景之費而審禮妻子自處饑寒晏然未嘗介意儀鳯中為洮河道行軍司馬討吐蕃没於陣其子尚乘直長逮庻弟太常丞延景詣闕自拘請入賊以贖其父兄高宗令中書侍郎薛元超慰之曰汝父兄䧟身虜庭狥忠竭節自緣赴救失所非其過也即宜各守職位我自遣人贖之必其不來任汝子弟選一武藝者往也逮庻弟岐州司馬易從俄受詔往吐蕃中省父比至而審禮病卒易從號泣晝夜不止毁瘠過禮吐蕃哀其至行還其父屍易從徒跣萬里從靈櫬歸塟彭城陳集原隴州開陽人代為嶺表酋長父纔有疾即終日不食永徽中䘮父嘔血數升枕服苫廬悲感行路位豹韜衛將軍裴敬彜為陳王府典籖父智周暴卒敬彜時在長安忽泣涕不食謂所親曰大人每有疾處吾即踧然不安今日心痛手足皆廢事在不測得無戚乎遂請急倍道言歸果聞父䘮羸毁逾禮事母復以孝聞乾封中累轉監察御史時母病有醫人許仁則足疾不能乗馬敬彜每自輿之以候母焉裴守真絳州稷山人早孤事母至孝及母終哀毁骨立殆不勝䘮位寧州刺史歐陽通率更令詢之子也儀鳯中為中書舍人襲封渤海縣男丁母憂去職尋起復本官每入朝必徒跣至皇城門外及直在省則席地藉蒿非公事不言亦未嘗啟齒歸家必衣衰絰號慟無常自武徳已來起復而能哀戚合禮者無如通比以年凶未塟四年居廬不釋服家人宻以氊絮置所眠席下通覺而徹之元讓雍州人弱冠明經擢第以母疾遂不求仕躬親藥膳蒸蒸致養不出閭里十餘年及母終廬於墓側蓬髪不􅌨沐菜食飲水而已薛元超内使侍郎道衡之孫為中書舍人中書省有盤石道衡嘗踞而草制元超每見此石未嘗不泫然流涕王鳯仕唐居官與其子逸及操遇賊賊脅逐鳯逸以身䕶蔽之父乃得全二子皆死狄仁傑授并州都督府曹其親在河陽里第仁傑赴并州立太行山北望見白雲孤飛謂左右曰吾親所居在此雲下瞻望佇立久之雲移乃行解琬為監察御史丁憂去職則天以解素習邉事起復􅃇官令往西城安撫夷虜抗表懇辭太后嘉之下勅曰解琬孝性淳厚言詞哀切固辭強奪之榮乞就終憂之典足以激揚風俗敦奬名教宜遂雅懷仍其所請仍俟服闋後赴上朱寳積瀛州人自䘮親後廬於墓側遂至踰年竟以毁卒姚元之為鳯閣侍郎同三品長安四年以母老表請解政歸養待詔則天下詔特從之以充相王府長史一事已上竝同三品王友貞瑯琊人弱冠母病篤醫云唯噉人肉乃差友貞獨念無求理乃割股肉以貽親病尋愈貞亦無毒痛則天聞而竒之就其家驗問特䝉旌表潘元祚江夏人居親䘮結廬墓次負土成墳李逈秀睿宗時為鴻臚卿性至孝事母甚謹母氏庻賤而色養過人其妻崔氏嘗叱其媵婢母聞之不悦逈秀即時出之或止之贒室雖不避嫌疑然過非出狀何遽如此逈秀曰娶妻本以承順顔色茍違何敢留也崔沔為祠部員外睿宗時徴拜中書舍人沔以母老疾在東都不忍捨之固請閑官以申侍養繇是改為虞部郎中李日知為給事中事母孝母年老嘗疾病日知取急調侍數日而鬢髪變白尋加朝散大夫其母未受命婦邑號而卒將塟發引吏人齎誥命而至日知在路既見即時殞絶乆之乃蘇廵察使衛州司馬路敬濳入知境時聞其孝弟之跡使求其狀日知辭讓不報服闋累遷黄門侍郎王希夷徐州滕人孤貧好道父母終為人牧羊以牧傭􅉆塟畢隱於嵩山蘇頲居父瓌䘮詔起復為工部侍郎加銀青光祿大夫頲抗表固辭詞理懇切詔許其終制服闋就職韋虚心有孝行丁父憂哀毁過禮鬢髪盡白朝廷深所嗟尚王維事母崔氏以孝聞閨門雍睦為衆所推天寳中為庫部郎中母終茹荼柴立殆不勝䘮楊嵩珪陳留封丘人母亾負土成墳於所居别立靈儿畵父母形貎享祀十有餘歳韓難陁􅂠原人父亾廬於墓側凡十六載楊綰早孤家貧養母以孝聞甘㫖或闕憂見於色親友訪令干祿舉進士調補太學正字李畬為考功郎中事母孝謹母卒不勝䘮而死高郢父伯祥先為好畤尉天寳末盗據京邑抵賊禁將加極刑郢時年十五被髪解衣請代其父賊黨義之乃俱釋郢位至僕射陳屺鎮州皷城人居父䘮哀毁髪落廬於墓側不掩墓門楊炎為起居舍人以親老去官父没廬於墓側賈直言父道冲以伎術得罪貶之賜酖於路直言偽令其父拜四方辭上下神祗伺使者視稍怠即取其酖以飲遂迷仆而死明日酖洩於足而後復蘇代宗聞之减其父死直言亦自此病躄崔縱為金部員外以父渙貶道州刺史縱棄官從養父卒累遷太常卿渙有寵妾鄭氏縱以母事之鄭性剛戾待縱不以理雖為大僚每加笞詬縱率妻子候顔敬順不怠時以為難奚陟為左拾遺丁父憂哀毁過禮親朋敬愍之徳宗幸興元召陟拜起居郎翰林學士陟辭以疾病久不赴職郭曜汾陽王子儀之長子子儀薨曜居䘮甚得禮節若儒家子居無何寢疾病或勸其子茹葱若薤竟不屬口而卒位太子少保第五琦為太子賓客琦子􅄘婦鄭氏女皆以孝聞旌表其門段秀實性至孝六歳母疾秀實水漿不入口七日母病間然後飲食及父没哀毁過禮位司農卿張浦父子産為柳州臨武令杖殺員外尉周少逹有司斷當絞之浦表請代父死不許張進昭廬州巢人母先患狐刺左手落經十三年乃亾進昭自截其腕廬於墓側李愬西平王晟之子秀出昆季間愬早䘮所保養於晋國夫人王氏及卒晟以本非正室令服緦愬號哭不忍晟感之因許服哀服既練丁父艱愬與仲弟憲廬於墓側徳宗不許詔令歸第宿徒跣復徃徳宗知不可奪遂許終制位太子少保歸崇敬蘇州呉人少勤學以經業擢第遭䘮父母哀毁以孝聞位兵部尚書致仕孔述睿越州人少與兄克符弟克讓皆事親以孝聞既孤俱隱於嵩陽山崔衍尚書左丞倫之子繼母李氏不慈於衍衍為富平縣尉倫使於吐蕃久方歸李氏衣弊衣以見倫倫問其故李氏稱自倫使於蕃中衍不給衣食倫大怒召行責詬命僕𨽻捽於地袒其背將鞭之衍涕泣終不自陳倫弟殷聞之趨往以身蔽衍杖不得下因大言曰衍每月俸錢皆送嫂處殷所具知何忍乃言衍不給衣食倫怒乃解繇是倫遂不聽李氏之􅉲及倫卒衍事李氏益謹李氏所生子郃每多取母子錢使其子以契書徴負於衍衍歳為償之故衍官至江州刺史而妻子衣食無所餘鄭珣瑜初為大理評事以養母資祿求授陽翟縣丞路隋泌之少子泌為渾瑊從事與吐蕃㑹盟而䧟隋方孩提後稍有知乃日夜啼號坐必西嚮食不加肉母氏言其貌肖泌遂終身不炤鏡其後吐蕃遺邉將書求和隋哀泣䟽陳願允其請表三上徳宗命中使諭㫖以朝廷懲其㝛詐俟更要於後信訖數歲不報及憲宗即位前年蕃使復欵塞隋五獻章上陳又投書哀訴於宰相裴垍藩皆協力為奏言帝允之命徐復等聘之後乃令答詔疏䧟蕃者名氏令歸中國吐蕃因復等還遣使來朝遂以泌及鄭叔矩之䘮與銘及遺錄至朝野傷歎隋居䘮益以孝聞後位至相輔令狐楚貞元七年登進士第桂管觀察使王拱愛其才欲以禮召懼楚不從乃先聞奏而後致聘楚以父掾太原有廷闈之戀又感拱厚意登第後徑往桂林謝拱不預宴逰乞歸奉養即還太原人皆義之及丁父憂以孝行聞位山西南道節度使柳公綽天資仁孝初丁母崔夫人之喪三年不沐浴繼親薛氏三十年姻親不知公綽非薛氏所生元和中為湖南觀察使地氣卑濕公綽以母在京師不可迎視致書宰相乞分司雒陽以便奉養移為鄂岳觀察使乃迎母至江夏竇扶風人兄弟登進士科者三人唯獨為處士以節操聞及母卒囓一指置棺中因廬墓次位容􅃹經畧觀察使蔣冽兄弟丁父艱廬於墓側植松栢千餘株位尚書左丞劉敦儒子𤣥之曽孫母有心病日鞭箠人乃安子弟僕使不堪其苦皆逃遁他處唯敦儒侍養不懈體常流血及母終居䘮致毁雒中人謂之劉孝子元和九年權徳輿留守東都表其志行制授左龍武軍兵曹分司東都歸登字冲之雅實宏厚事繼母以孝稱位工部尚書李建字杓直隴西人父震雅州别駕建少孤家代貧無餘業與伯造仲兄遜於荆南躬耕致養位刑部侍郎周僧逹繼母即獨孤鉉之女弟也鉉長慶初為田𢎞正鎮州從事及王庭凑作亂從事皆遇害鉉時奉使隣境故得免死其母及血屬皆為庭凑所囚初僧逹母因隨親至鎮州亦為庭凑所囚鉉聞軍亂懼不敢入留於境上僧逹時在京聞亂奔赴鎮州謁庭凑論以逆順之理庭凑雖不能納感其忠孝之心遂許僧逹迎其親以歸當時朝議奬僧逹之行授渭南縣尉貶鉉為硤州司戸自此鉉為士所鄙烏漢𢎞父重裔卒起復受左領軍衛將軍漢𢎞上表乞終父服文宗嘉詔從之服闋方受官薛革父嵩為昭義節度苹年十二為磁州刺史嵩卒軍吏欲用河北故事脅苹知留後務苹偽許之讓於伯父㠋一夕以喪歸及免䘮累授右衛將軍路敬淳孝友篤敬遭䘮三年不出廬寢服竟方號慟入見其妻形容羸毁妻不識也潘師正者趙州贊皇人也少䘮母廬於墓側以至孝聞韋處厚字徳載㓜有志性事繼母以孝聞居父母憂結廬於墓次位中書侍郎平章事崔從舉進士山南西道節度使嚴震奏充推官以父憂去職與兄熊廬於塋次手植松栢免䘮閑居數歳史摶郢州長夀人年齒尚㓜母亾廬墓被髪泣血誓志終身丁公著字平子生三歳䘮所親七歳見隣母抱其子哀感不食因請於父絶粒奉道兾其幽贊父緒憫而從之年十七父勉令就學年二十一五經及第明年通開元禮授集贒校書郎校未終歸侍鄉里不應請辟居父䘮躬負土成墳哀毁之容人為憂之里閭聞風皆敦孝悌羅讓為咸陽尉丁父憂䘮服既除尚麻衣茹荼不從四方之者十年許康佐登進士第以家貧母老求為知院官人或輕怪笑而不答及母亾服終不就侯府之君子知其不擇祿養親之志也故名益重位禮部尚書劉三復潤州句容人少孤貧母有廢疾三復丐食供養不離左右久之不隨鄉賦王龜興元節度使起之子徴授左拾遺久之方至以父年將九十作鎮遠藩喜懼之年闕於供侍乞罷今職以奉晨昏優詔許之崔瑑為左拾遺充史館脩撰天祐末進狀以堂叔母在孟州濟源私庄累月抱疾加甚無兄弟可以奉養強近可以告投兼以年將七旬地絶百里闕親藥膳命迫曉夕今欲暫乞假躬往侍疾粗展劬勞免違教義稍獲痊損奔赴闕廷勑㫖宜依梁杜曉父譲能唐末為相賜死於臨臯驛曉居䘮柴立幾至㓕性憂滿服幅巾七年升䘮沉跡自廢者將十餘載光化中宰相崔裔判塩鐡奏為廵官試校書郎尋除畿尉直𢎞文舘皆不起及哀帝東遷雒陽宰臣崔遠判戸部又奏為巡官兼殿中或語之曰􅄞康誅死子紹埋没不自顯山濤以切理勉之乃仕孝子之志其忍令杜氏以時鋪席祭其先人而嗣者同匹庻乎曉乃就官張䇿少為僧居雍之慈恩精廬頗有高致廣明末大盗犯闕䇿遂反初服奉父母逃難君子多之及丁父艱以孝聞服滿自屏郊藪一無干進意若是者十餘載後王行瑜帥邠州為觀察支使行瑜敗死䇿與婢肩輿其親南出邠境屬邉塞積雪為行者所哀太宗聞而嘉之奏為鄭滑攴使張文蔚為中書舍人丁母憂退居東畿哀毁過人李珽為監察御史丁内艱又其父旅殯在遠家貧無以備喪珽與弟琪當臘雪以單縗扶杖衘哀告人由是兩喪還祔而珽日不過食一溢常羸卧䘮廬中不能興大為時賢所歎憂闋再徴為御史以疾不起成汭之鎮荆州為掌書記踰時乃就後唐張郎叔父憲為莊宗魏博推官王師與梁軍戰不利憲奔馬北渡梁軍急追殆將不濟至晩渡河人多䧟水而没憲與郎履氷而行將及岸水䧟郎號泣以馬箠引之憲曰吾兒去矣勿使俱䧟郎曰忍覩季父如此俱死無恨郎偃伏引箠憲躍身而出是夜莊宗令於軍中求憲或曰與王緘俱没矣莊宗垂涕求尸數日聞其免也遣使慰勞韓徳潞州屯留人同光中母死割乳以祭廬於墓側楚彥安宋州人同光中遷塟父母廬於墓隧張建立滄州乾符人割股以治母病母卒割心􅅹血祭辮髪跣足廬於墓所三十年晉尹玉羽唐天復中隨計京師甚有文稱㑹有苴杖之䘮累歳羸疾冬不釋菅履朞不變倚廬制闋隱居杜門無召官之意位少府監致仕張希崇初仕後唐為汝州防禦使既之任遣人迎母赴郡母及境希崇親肩版輿行三十里觀者無不稱歎為靈武節度使事母至謹每食則侍立而後進待盥潄畢方退時議高之朱殻許州人天福初父死廬於墓次王㑹濮州人居父母䘮相次廬墓李澤濮州人刻木為父割股乳奠祭廬墓持服張福曹州寃句人居親䘮廬於墓次王殷少為華州小校謙謹好禮事父母尤謹積勞至華州軍指揮使殷每與人結交過從皆先禀於母母命不從殷必不敢往雖在軍旅交遊不雜及為刺史政事小有不佳母察之立殷於庭詰責而杖之及母亾未幾有詔起復殷上章乞終䘮紀高祖嘉而從之崔梲為開封尹王瓚從事梲父湪有疾謂親友曰死生有命無以醫為也梲侍之衣不解帶有賓至必拜泣告於門外請方便勸其進藥湪終莫之從及丁憂哀毁過制明宗朝授監察御史不應命踰年詔再下乃就列焉史仁詡陳州項城人為母守墳三年父贇終復結廬持服馬全節事母王氏至孝全節位厯方鎮温清靣告畢盡其敬陳思讓為衛州刺史父審確任金州防禦使父母併亾思讓奔䘮近代武臣罕有執䘮禮者思讓不候詔去郡聞者嘉之顔衍為河陽節度副使知州事在孟津半歳得家問以父在營丘有風痺其候稍加衍不奏棄官而去及星行至郡父疾如常衍則侍疾不復有食祿之心居歳餘父以疾不能起衍親自掬矢嘗膳未嘗輙倦聞者高之開運中為御史中丞以母老衰羸拜章請告除戸部侍郎衍求扶持還鄉少帝從之劉遂清性至孝居父之喪殆至㓕性鄉里稱之魚崇諒為工部侍郎翰林院學士以母年高多疾思歸陜州再上章乞扶侍西行太祖不許解官以夲官給假歸賜母衣服錢絹茶藥以遣之常貞陳州項城人塟父母後廬於墓側披髪跣足一十三年宗脩已濟州金鄉人父母亾塟送後辮髪跣足一夕截指祭奠廬於墓所立碣書佛經劉表微顯徳中為浚儀縣令上章以母氏衰老乞解官歸養從之册府元龜卷七百五十六
