body:
  text: 册府元龜卷七百九十八宋王欽若等撰總録部勤學書曰業廣惟勤傳曰民生在勤勤則不匱矧乃服膺素業講求善道時習而悅日知所亡稽古之能進以之干禄多聞之益居以之待問自非研精覃思探賾索隠勵拳拳之志罄孜孜之力又曷以覩聖人之奥垂沒世之名者哉故尼丘立訓詁殆忘寢食由兹以來學者間出乃有閉關刻意閲市周覽刺膚以忘其痛攻苦而安於貧求師以涉逺遭難而不懈在戎旅而無廢雖老耄而彌篤莫不練達古今該悉元本磅礴經義蔚為儒宗以之涖事而無煩以之誨人而不倦上之則宣化而成俗内之則懐寳而獨善是故大禹之聖惜乎寸隂閔子之戒慮其将落者此之謂乎孔子晚而學易序彖繫象說卦文言讀易韋編三絶曰假我數年若是我於易則彬彬矣又曰吾嘗終日不食終夜不寢以思無益不如學也又曰十室之邑必有忠信如丘者焉不如丘之好學也後為魯司冦顔囬孔子弟子為人擇乎中庸得一善則拳拳服膺而弗失之哀公問孔子弟子孰為好學孔子對曰有顔回者好學不遷怒不貳過不幸短命死矣今也則亡未聞好學者也凡人任情顔回任道怒喜怒遷移也不遷怒者怒當其理不移易也不貳過者有不善未嘗復行孔文子為衞大夫敏而好學不耻下問名圉諡文寗越中牟之鄙人苦耕稼之勞謂其友曰何為而可以免此苦也其友曰莫如學學三十年則可以達矣越曰請以十五歲人将休吾不休人将卧吾不卧學十五歲而周威公師之蘇秦東周人發書陳篋數十得太公隂符之謀伏而誦之讀書欲睡引錐自刺其股血流至踵曰安有説人主不能出其金玉錦繡取卿相之尊者乎後用此結從約佩六國相印漢孔安國貧無資用嘗為弟子都養都凡衆也養主給烹炊者也貧無資用故供諸弟子烹炊也時行賃作帶經而鉏休息輒讀其精如此後為臨淮太守賈嘉賈誼之孫最好學官至郡守董仲舒少治春秋葢三年不窺園其精如此為江都相後復相膠西去位歸居終不問家産以脩學著書為事黄覇守丞相長史坐公卿大議庭中知長信少府夏侯勝非議詔書大不敬阿從不舉劾皆下廷尉繫獄當死覇因從勝受尚書獄中再踰冬積三年迺出覇欲從勝受尚書勝辭以罪死覇曰朝聞道夕死可矣勝賢其言遂授之繋再冬講論不怠後赦得出後至丞相王尊字子贛少孤歸諸父使牧羊澤中尊竊學問能史書年十三求為獄小吏數嵗給事太守府問詔書行事尊無不對太守竒之除補書佐署守屬監獄署為守屬令監獄主囚也乆之尊稱病去事師郡文學官郡有文學官而尊事之以為師治尚書論語略通大義後官至東郡太守路温舒字長君父為里監門使温舒牧羊舒取澤中蒲截以為牒編用冩書小簡曰牒編聨次之稍習善求為獄小吏因學律令轉為獄吏縣中疑事皆問焉太守行縣見而異之署决曹吏又受春秋通大義舉孝亷為山邑丞後至臨淮太守劉向專積思於經術晝誦書傳夜觀星宿或不寐達旦後至中壘校尉龔舍字君倩與龔勝相友少皆好學明經楚王入朝聞舍髙名聘舍為常侍固辭願卒學復至長安終其經業後徵為諫議大夫後漢魏應少好學光武建武初詣博士受業習魯詩閉門誦習不交僚黨京師稱之後為騎都尉魯恭年十五與母弟俱居太學習魯詩閉戸講誦絶人間事兄弟俱為諸儒所稱學士爭歸之太尉趙熹慕其志每嵗時遣子問以酒糧皆辭不受後至司徒魯丕性沉深好學孜孜不倦遂杜絶交游不答候問之禮士友嘗以此短之而丕欣然自得遂兼通五經以魯詩尚書教授為當世名儒後歸郡為督郵功曹郡將無不師友待之後為侍中左中郎将承宫少孤年八嵗為人牧豕鄉里徐子盛者以春秋經授諸生數百人宫過盛廬下棄其業因就聽經遂請留門下宫過徐子盛好之因棄其豕而留聽經牧主恠其不還求索得官欲笞之門下生共禁止因留之為諸生拾薪執苦數年勤學不倦後至侍中祭酒桓榮少好學游長安習歐陽尚書事博士九江朱普朱普字公文受業於平當為博士徒衆尤盛貧寠無資嘗客傭以自給精力不倦十五年不窺家園榮初遭倉卒與族人桓元卿同飢戹而榮講誦不息元卿􅅓榮曰但自苦氣力何時復施用乎榮笑不應及為太常元卿歎曰我農家子豈意學之為利乃若是哉後為五更封闗内侯崔瑗年四十餘始為郡吏以事繫東郡發干獄發干縣獄也獄掾善為禮瑗間考訊時輒問以禮説其專心好學雖顛沛必於是後為濟北相竇章遭羌冦避難東國家於外黄居貧蓬户蔬食講讀不輟後為大鴻臚髙鳯少為書生家以農為業而專精誦讀晝夜不息妻嘗之田曝麥於庭令鳯䕶鷄㑹天暴雨而鳯持竿誦經不覺潦水流麥妻還怪問鳯方悟之其後遂為名儒乃教授業於西唐山中自言農家子不應為吏侯瑾少孤貧依宗人居性篤學嘗傭作為資暮還輒爇薪以讀書公車徵不至宋均以父任為郎時年十五好經書每伏日輒詣博士受業通詩禮善論難後至河内太守王充受業太學師事扶風班彪好博覽而不守章句家貧無書嘗游雒陽市肆閲所賣書一見輒能誦憶遂博通衆流百家之言後歸鄉里屏居教授朱穆耽學鋭意講誦或時思至不自知亡失衣􅃣顛墜阬岸其父暉嘗以為專愚幾不知數馬足穆愈更精篤後至尚書樂恢長好經學事博士焦永永為河東太守恢隨之官閉廬精誦不交人物後永以事被拷諸家弟子皆以通關被繫恢獨皎然不汚於法遂篤志為名儒後至尚書僕射曹褒少篤志有大度結髮傳父充業博雅疏通尤好禮士嘗憾朝廷制度未備慕叔孫通為漢禮儀晝夜研精沉吟專思寢則懐抱筆札行則誦習文書當其念至忘所之適後至侍中郎顗明經典隠居海畔延致學徒嘗數百人晝研經義夜占象度勤心鋭意朝夕無倦公車再徵不行衞颯家貧好學問隨師無糧嘗傭以自給後至桂陽太守甄承尤篤學未嘗視家事卒於梁相李固司徒郃之子少好學嘗步行尋師不逺千里又司馬彪續漢書載固少有俊才雅志學為三公子嘗躬步驅驢負書隨師後至太尉杜喬累世吏二千石少好學治韓詩京氏易歐陽尚書以孝稱雖二千石子嘗步擔求師後至太尉陳寔少作縣吏嘗給事厮役後為都亭刺史佐而有志好學坐立誦讀縣令鄧邵試與語竒之聽受業太學後令復召為吏乃避隠陽城山中後至太丘長崔琦嘗耕於陌上懷書一卷息輒偃而詠之後至臨濟長荀爽幼好學耽思經籍慶弔不行徵命不應後至司空魏隗禧字子牙世單貧少好學漢初平中三輔亂禧南客荆州不以荒擾擔負經書每以樵採餘日則誦習之後至郎中董遇字季直性質訥而好學漢興平中關中擾亂與兄季中依將軍段煨遇採梠負販而常挾持經書投閑習讀其兄笑之而遇不改後為侍中大司農吉茂世為著姓好書不耻惡衣惡食而耻一物之不知漢建安初關中始平茂與扶風蘇則共入武功南山隠處精思數歲州舉茂才除臨汾守袁遺字伯業曹公稱長大而能勤學者惟吾與袁伯業耳後為揚州刺史趙昱少時就處士東莞綦毋君受公羊傳兼該羣業至厯年潛志不窺園圃親疏希見其面時入定省父母須臾即還後為漢陵太守賈逵為諸生畧覽大義取其可用最好春秋左傳及為牧守常課績之月常一遍後至豫州刺史司馬孚温厚亷讓博涉經史漢末䘮亂與兄弟處危亡之中簞食瓢飲而披閲不倦後至太尉鍾㑹有才能技藝而博學精練名理以夜繼晝由是獲聲譽後至鎮西将軍常林少單貧性好學為諸生帶經耕鉏後至光禄大夫王象少孤為人僕𨽻年十七見使牧羊而私讀書後領秘書監蜀向朗少時涉獵文學更乃潛心典籍孜孜不倦年踰八十猶手自校書後至左将軍位特進譙周幼孤與母兄同居既長耽古篤學家貧未嘗問産業誦讀典籍忻然獨笑以忘寢食後至光禄大夫入晉至散騎常侍郄正本名纂少而父死母嫁單煢隻立而安貧好學博覽墳典弱冠能屬文後至秘書令入晉為巴西太守吳步隲字子山世亂避難江東以種𤓰自給晝勤四體夜誦經傳後至丞相魯肅為人方嚴寡於玩餙雖在軍中手不釋卷後至偏将軍闞澤字德潤家世農夫至澤好學居貧無資為人傭書以供紙筆寫書既畢誦讀亦遍追師諭講究覽羣籍兼通厯數由是顯名後為太子太傅張紘居貧躬耕帶經而鋤孜孜汲汲以夜繼日至于弱冠無不窮覽後為孫權長史晉劉寔自幼及老篤學不倦雖居職務卷弗離手弟智貞素有兄風少貧窶每負薪自給讀誦不輟竟以儒行稱晉中興書載寔精學不倦雖居官職至于皓首手不釋卷後至太尉華譚好學不倦爽慧有口辨為鄰里所重後至散騎常侍束晳字廣微少逰國學或問博士曹志曰當今好學者誰乎志曰陽平束廣微好學不倦人莫及也後為尚書郎皇甫謐耽翫典籍忘寢與食時人謂之書淫或有箴其過篤将損耗精神謐曰朝聞道夕死可矣況命之修短分定懸天乎徵議郎又召補著作郎並不應石崇為陽城太守在郡雖有職務好學不倦魯芝字世英父為郭汜所害芝襁褓流離年十七乃移居雍耽思墳典後至光禄大夫虞溥字允源父秘為偏將軍鎮隴西溥從父之官專心墳典疆塲閲武人爭視之溥未嘗寓目後至鄱陽内史董景道字文博少而好學千里追師所在惟晝夜誦讀略不與人交通景道按史無官徐苗少家貧晝執鉏耒夜則吟誦弱冠與弟賈就博士濟南宋均受業遂為儒宗徵辟並不就褚陶嘗謂所親曰聖賢備在黄卷中捨此何求州郡辟不就孫盛厯秘書監給事中篤學不倦自少至老手不釋卷荀崧厯右光禄大夫雖衰老而孜孜典籍世以此嘉之范汪字𤣥平少孤貧六嵗過江依外家庾氏及長好學庾氏家貧無以資給汪乃廬于園中布衣蔬食燃薪冩書寫畢讀誦亦遍遂博學多通善談𤣥理後至安北将軍范寗為豫章太守既免官家于丹陽猶勤學終年不輟葛洪字稚川少好學家貧躬自伐薪以買紙墨夜輒冩書誦習遂以儒學知名徵散騎常侍不就范宣少尚隠遁加以好學手不釋卷以夜繼日遂博綜衆書尤善三禮詔徵不就徐邈姿性端雅勤行勵學博涉名聞後至驍騎将軍干寶字令升少勤學博覧書記以才器召為著作郎徐廣為秘書監性好讀書老猶不倦謝沉少孤事母至孝博學多識明練經史耕耨之暇研精墳典後至著作郎紀瞻性静黙少交逰讀書或手自抄寫後至驃騎将軍王延少孤貧晝則傭賃夜則誦書遂究覧經史皆通大義後為劉聰金紫光禄大夫王歡字君厚樂陵人也安貧樂道專精耽學不營産業嘗丐食誦詩雖家無斗儲意怡如也其妻患之或焚毁其書而求改嫁歡笑而謂之曰卿不聞朱買臣妻耶時聞者多哂之歡守志彌固遂為通儒歡史不載官魏詠之家世貧素而躬耕為事好學不倦後至荆州刺史車𦙍恭勤不倦博覧多通家貧不常得油夏日則練囊盛數十螢火以炤書夜以繼日後至吏部尚書劉敏元字道光勵己修學不以險難改以好星厯隂陽術數潛心易太𤣥不好讀史嘗謂同志曰誦書當味義根何為費功於浮辭之文易者義之源太𤣥理之門能明此者即吾師也王育字伯春少孤貧為人傭牧羊每過學必歔欷時有暇即折蒲學書遂亡失羊為羊主所責育将粥已以償之同郡許子章敏達之士也聞而嘉之為育償羊給其衣食使與子同學遂博通經史後至破虜将軍劉宣字士則元海之從祖朴鈍少言好學修潔師事樂安孫炎沉精積思不捨晝夜好毛詩左氏傳劉昺仕李暠遷撫夷䕶軍雖有政務手不釋卷暠曰卿嗜篇籍以燭繼晝白日且然夜可休息昺曰朝聞道夕死可矣不知老之将至孔聖稱焉昺何人斯敢不如此雖在兵難之中講誦不廢每儒士在門嘗倒屣出迎停寢政事引談經籍尤明斷决時事亦無滯也張悕少孤貧隨母長於舅氏令其牧羊悕幼而好學事母以孝聞每日必於牧暇採樵二束菜二本一以供母一以顧人書晝則折木葉學書夜則誦所書前秦苻朗初為鎮東將軍青州刺史封樂安男不得已起而就官及為方伯有若素士耽翫經籍手不釋卷每談虛語𤣥不覺日之将夕宋劉懐肅家世貧窶而躬耕篤學後至淮南厯陽二郡太守鄭鮮之祖襲為江乗令因居縣境鮮之下帷讀書絶交游之務後至尚書左僕射王㣲字景𤣥瑯琊臨沂人少好學無不通覧嘗住門屋一間尋書玩古如此者十餘年後追贈秘書監王韶之家貧好學嘗三日絶糧執書不輟父母家人或謂之曰困窮如此何不耕農為求活乎韶之答曰我嘗以典籍自耕耳後至祠部尚書殷淳髙簡寡欲早有清髙愛好文義未嘗違捨後至光禄大夫沈攸之晚好讀書手不釋卷史漢事多所諳憶嘗歎曰早知窮達有命恨不十年讀書後至郢州刺史傅隆為光禄大夫歸老在家手不釋卷博學多通特精三禮謹於奉公嘗手自寫書南齊王逡之為大中光禄大夫加侍中逡之性率素衣裳不澣几案塵黒年老手不釋卷王儉幼有神彩專心篤志手不釋書後為尚書令沈鱗士少好學家貧織簾誦書手口不息及長隠居篤學不倦遭火燒書數千卷鱗士年過八十耳目猶聰明手自抄冩燈下細書復成二三千卷滿數十篋人以為養身静黙之所致也江泌字士清少貧晝日斫屧夜讀書隨月光握卷升屋後為南中郎行叅軍陸澄字彦淵少好學博覽無不知行坐眠食手不釋卷後至散騎常侍顧歡幼聰慧家貧父使驅田中雀歡作黄雀賦雀食稻過半父怒欲撻之見賦乃止鄉中有學舍歡貧無以受業於舍壁後倚聽無遺亡者八嵗誦孝經詩論及長篤志好學夕則然松節讀書或然糠自照同郡顧顗之臨縣見而異之遣諸子與㳺及孫憲之並受經句歡年二十餘更從豫章雷次宗諮𤣥儒諸義從徵太學博士不就徐伯􅈿少孤貧無紙以竹葉甘蕉及地上學書山水暴出漂溺宅舍村鄰皆奔走伯􅈿累床而止讀書不輟叔父璠之與顔延之友善還詣蒙山立精舍講授伯􅈿往從學積十年究尋經史逰學者多依之瑯琊王辟議曹從事不就虞龢少好學居貧屋漏恐濕墳典乃舒被覆書書獲全而被大濕時人以比髙鳯梁主泰少好學手所抄寫二千餘卷傅昭幼孤為外祖所養十嵗於朱雀航賣厯日雍州刺史袁顗嘗來昭所昭讀書自若神色不動顗歎曰此兒神情不凡必成佳器司徒建安王休仁聞而悦之因欲致昭昭以宋氏多故遂不往後至散騎常侍張纘為秘書郎好學兄緬有書萬餘卷晝夜披讀殆不輟手秘書郎有四員宋齊以來為甲族起家之選待次入補其居職例百數十日便遷任纘固求不徙欲遍觀閣内圖籍帝執四部書目曰君讀此畢乃可言優仕矣陶𢎞景未弱冠齊髙帝作相引為諸王侍讀除奉朝請雖在朱門閉影不交外物唯以披閲為務朝儀故事多取决焉沈約篤志好學晝夜不輟卷母恐其勞生疾常遣減油火而晝之所讀夜輒誦之遂博通羣籍能屬文後至侍中丹陽尹特進范雲嘗就親人袁炤學晝夜不怠炤撫其背曰卿精神秀朗而勤於學卿相才也後至右僕射江革字休映謝朓雅相欽重朓嘗候革時大雪見革弊絮單席而耽學不倦嗟嘆久之乃脱所著襦并手割半氊與革充卧具而去後至光禄大夫領步兵校尉韋愛性清介不妄交㳺而篤志好學每虛室獨坐游心墳索而埃塵滿席寂若無人年二十嘗游京師値天子出游南苑邑里諠譁老幼爭觀愛獨端坐讀書手不釋卷宗族見者莫不異焉後至寧蜀太守王瞻字思範年數歳嘗從師受業時有伎經其門同學皆出觀瞻獨不視習誦如初從父尚書僕射僧達聞而異之謂瞻父曰大宗不衰寄之此子後至侍中領騎将軍蕭琛嘗言少壯有三好音律書酒年長以來二事都廢唯書籍不衰後至侍中特進張緬少勤學自課讀書手不輟卷後至御史中丞陸倕字佐公少勤學善屬文於家庭内起兩間茅屋杜絶往來晝夜讀書如此者數載後至國子博士中庶子褚􅈿少孤貧篤志好學有才思殷芸勵精勤學博洽羣書幼而廬江何憲見之深相嘆賞後至通直散騎常侍秘書監孔子祛少孤貧好學耕耘樵採嘗懐書自隨閑則讀誦勤苦自勵遂通經術尤明古文尚書後至步兵校尉沈峻家世農夫至峻好學與舅太史叔明師事宗人沈鱗士門下積年晝夜自課時或睡寐輒以杖自擊其篤志如此後至中書通事舍人司馬筠孤貧好學師事沛國劉􅬐彊力專精深為􅬐所器異後至始興内史范縝年未弱冠聞沛國劉瓛聚徒講説縝往從之卓越不羣而勤學瓛甚竒之親為之冠後至中書郎國子博士何佟之少好三禮師心獨學彊力專精手不釋卷讀禮論三百篇略皆上口齊太尉王儉雅相推重後至尚書左丞王錫幼而警悟與兄弟受業至應休散嘗獨留不起年七八歳猶隨母儀興公主入宫髙祖嘉其聰敏嘗為朝士説之精力不倦致損右目公主每節其業為飾居室雖童稚之中一無所好後至吏部郎中劉霽家貧與弟杳歊相勵篤學既長博涉多通累官建康令不拜任孝恭精力勤學家貧無書﨑嶇從人假借每誦讀一遍略無所遺後至兼中書通事舍人臧嚴孤貧勤學行止書卷不離於手後至鎮南諮議叅軍鍾嶸與兄岏弟嶼並好學有思理後至晉安王記室袁峻字孝髙早孤篤志好學家貧無書每從人假借必皆抄寫自課日皆五十紙紙數不登則不休息後至員外散騎侍中劉峻八歳為魏人所掠徙桑乾峻好學家貧寄人廡下自課讀書嘗燎麻炬從夕達旦時或昏睡爇其髪既覺復讀終於不寐其精力如此齊永明中從桑乾得還自謂所見不博更求異書聞京師有者必往祈借後至荆州户曹叅軍庾仲容幼孤為叔父泳所養既長杜絶人事專精篤學晝夜手不輟卷後至黟縣令張率與陸少𤣥善少𤣥家有父澄書萬卷餘率遂得盡讀其書建武三年舉秀才除太子舍人司馬褧善三禮少傳家業彊力專精手不釋卷後至晉安王長史陳元敬字子恭純孝有風格幼便篤學老而不倦後至金紫光禄大夫特進鄭灼家貧抄義疏以日繼夜筆毫盡每削用之灼嘗蔬食講授多苦心熱若𤓰時輒偃卧以𤓰鎮心起便誦讀其篤志如此後至中散大夫陸瓊初以侯景作逆携母避地于吳縣之北鄉勤苦讀書晝夜不怠遂博學善属文永定中州舉秀才沈徳威字懷逺少有操行梁太清末遁於天目山築室以居雖處亂而篤學無倦遂治經業後至祠部入隋官至秦王府主簿江總篤學有辭采家有賜書數千卷總晝夜尋讀未嘗輟手後至尚書令章華家世農夫至華獨好學與士君子逰處頗覧經史善屬文侯景之亂乃逰嶺南居羅浮山寺專精習學後除大市令歐陽頠長沙臨湘人也父䘮家産累積悉讓諸兄州郡辟頠不應乃廬于麓山寺傍專精習業博通經史年三十其兄逼令從官起家信武府中兵叅軍袁樞字踐言美容儀性沉静好讀書手不釋卷至尚書右僕射姚察樂於墳籍無所不覩每有製述多用新竒人所未見咸重富博且專志著書白首不倦手自抄撰無時蹔輟好研覈古今諟正文字精采流贍後至吏部尚書後魏崔祖虬少而好學下帷讀書不驅競當世舉秀才不就張衮年七十闔門守静手執經書刋定得失愛好人物善誘無倦士類以此髙之後至給事黄門侍郎崔𤣥伯立身雅正與世不羣雖在亂猶屬志篤學不以資産為意妻子不免飢寒後至吏部尚書古弼遷尚書令弼雖事務殷凑而讀書不輟崔逞少好學有文才遭亂孤貧躬耕于野而誦讀不廢後至御史中丞宋隠性至孝年十三便有成人之志專精好學不以兵難易操㳺明根雅之從祖弟也幼年遭亂為櫟陽王氏奴主使牧羊明根以漿壺倩人書字路邊畫地學之長安鎮将竇瑾見之呼問知其姓名乃告㳺雅使人贖之教書年十六辭雅歸鄉里於白渠坎為窟讀書積嵗雅推薦之太武擢為中書學生寡欲綜習經典文成踐祚為都曹主書帝以其敬慎每嗟美之常景耽好經史愛玩文辭若遇新異之書殷勤求訪或復貨買不問價之貴賤必以得為期後至儀同三司房景先字光胄幼孤貧無資從師其母自授毛詩曲禮年十二請其母曰豈可使兄傭賃以供景先也請自求衣然後就學母哀其小不許苦請從之遂得一羊裘忻然自足晝則樵蘇夜誦經史自是精勤遂大通贍後至步兵校尉領尚書郎髙允少孤夙成有竒度性好文學擔笈負書千里就業為尚書散騎常侍加光禄大夫年九十餘恂恂善誘誨人不倦晝夜手常執書吟咏㝷覽李瑾為車騎将軍大司農卿殷州大中正瑾淳謹好學老而不倦宋繇少有志尚追師就學閑坐誦書晝夜不倦博通經史諸子羣言靡不覽綜後仕沮渠牧犍官至左丞世祖拜河西王右相劉芳聰敏過人篤志墳典晝則傭書以自資給夜則讀史終夕不寢後至太常卿趙逸為中書侍郎性好墳典白首彌勤年踰七十手不釋卷㳺肇外寛柔内剛直耽好經傳手不釋書官至尚書右僕射李彪字道固家世寒微少孤貧有大志篤學不倦髙悦兄閭博學髙才家富典籍彪遂於悦家手抄口誦不暇寢食後至御史中尉崔光家貧好學晝耕夜誦傭書以養父母後至司徒侍中崔休好學涉厯書史公事軍旅之隟手不釋卷後至殿中尚書李琰之厯侍中中書侍郎每休閑之際常閉門讀書不交人事嘗謂人曰吾所以好讀書不求身後之名但得異見異聞心之所願是以孜孜搜討欲罷不能豈為異日聲名勞七尺軀也此乃天性非爲力强崔挺少敦學業多所覽究手不釋卷後至北海王詳司馬張普惠父曄為齊州中水令隨父之縣受業齊土專心墳典克厲不息乃還鄉里就程𤣥講習精於三禮兼善春秋百家之説多所窺覽諸儒稱之後至尚書右丞祖瑩八嵗能誦詩書十二為中書學生好學耽書以夜繼晷父母恐其成疾禁之不能止嘗宻於灰中藏火驅逐童僕父母寢睡之後燃火讀書以衣被蔽塞窓户恐漏光明為家人所覺由是聲譽甚盛後至車騎大将軍温子昇初受學於崔靈恩劉蘭精勤以夜繼晝晝夜不倦後至中書郎宋世景與弟道輿下帷誦讀博覽羣言尤精經義族兄弁甚重之後至伏波将軍行滎陽太守北齊李鉉字耳鼎渤海南皮人也九歳入學書急就篇月餘便通家素貧苦常春夏務農冬乃入學年十六從李周仁受毛詩尚書張武劉子猛受禮記常山房虯受周官儀禮漁陽鮮于靈馥受左氏春秋鉉以鄉里無可師者遂與州里楊元懿河間宗惠振等結侶詣大儒徐遵明受業居徐門下五年常稱髙等年二十三便自潜居討論是非用心精苦曽三秋冬不畜枕每至睡時假寐而已年三十六丁父䘮服闋以鄉里寡文籍來逰京師讀所未見書後至國子博士辛術為東南道行臺尚書少愛文史晩更勤學雖在戎兵手不釋卷張耀為秘書監奉職恪勤未嘗有過好讀書春秋月一遍時人慕之賈良道趙彦深嘗謂耀曰君研尋左氏豈求服䖍杜預之紕繆耶耀曰何為然乎左氏之書備叙言事惡者可以自戒善者可以庶幾故厲已温習非欲詆訶古人之得失也劉晝字孔昭渤海阜城人也少孤貧好學負笈從師服膺無倦與儒者李寳鼎同鄉里甚相親愛授其三禮又就馬敬徳習服氏春秋俱通大義恨下里少墳典便杖䇿入都知大府少卿宋世良家多書乃造焉世良納之恣意披覽晝夜不息舉秀才不第終于家劉逖彭城人也魏末世宗以為開府行叅軍逺離鄉家倦於覊旅發憤自勵專精讀書晉陽都㑹之所覇朝人士攸集咸務於宴集逖在逰宴之中卷不離手值有文籍所未見者則終日諷誦或通夜不歸其好學如此亦留心文藻頗工詩詠後至散騎常侍奏門下事馮偉節少從李寳鼎逰學李重其聰敏嘗試問之多所通解尤明禮傳後還鄉里閉門不出将三十年不問産業不交賔客專精覃思無所不通舉秀才不就魏收年十五隨父赴邊好習騎射因滎陽鄭伯調之曰魏郎弄㦸多少收慙遂折節讀書夏月坐板床隨樹隂諷誦積年床板為之鋭減而精力不輟以文華顯後至尚書右僕射後周樂遜字尊賢河東猗氏人弱冠為郡主簿魏正光中聞碩儒徐遵明領徒趙魏乃就授孝經䘮服論語詩書禮易左氏春秋大義尋而山東冦亂學者散逸遜於擾攘之中猶志道不倦樊深字文淵河東猗氏人弱冠好學負書從師於河西講習五經晝夜不倦後為國子博士性好學老而不怠朝暮還往嘗據鞍讀書至馬驚墜地損折支體終亦不改裴漢嘗借人異書必躬自録本至於疾疢彌年亦未嘗釋卷後至車騎大将軍儀同三司薛端字仁直河東汾隂人本名沙陁有志操與弟裕勵精篤學不交人事後至基州刺史宇文測字澄鏡性沉宻少篤學每旬月不窺户牖後至少保宗懔少聰敏好讀書日夜不倦語輒引古事鄉里呼為小兒學士後至車騎大将軍沈重字德厚專心儒學從師不逺千里遂博覽羣書仕後梁蕭巋至太常卿呂思禮好學有文才雖務兼軍國而手不釋卷晝理政事夜則讀書令蒼頭執燭燭燼夜有數升後至都官尚書薛憕初自孝昌中杖䇿還雒陽先是憕從祖真度與族祖安都擁徐兖歸魏其子懐雋見憕甚相親善屬爾朱榮廢立遂還河東至懷雋家不交人物終日讀書手自抄畧将二百卷唯郡守元􅀢時相要屈與之抗禮仕西魏至安東将軍隋諸葛頴為太子舍人周武平齊不得調杜門不出者十餘年習周易圖緯蒼雅莊老頗得其要楊尚希髫齡而孤年十嵗辭母請業長安涿郡盧辨見而異之令入太學專精不倦同軰者皆共推伏後至蒲州刺史劉行本起家梁武陵王國常侍遇蕭脩以梁州北附遂與叔父璠歸周寓居新豐每以諷誦為事精力忘疲雖衣食乏絶晏如也後至太子右庶子楊异字文殊㓜丁父憂及免䘮之後絶慶弔閉戸讀書數年之間博覽書記後至吳州總管李文博性介鯁直好學不倦至於敎義名理特所留心每讀書至治亂得失忠臣烈士未嘗不反覆吟翫後至司𨽻從事馬光少好學從事數十年晝夜不息後徵為太學博士王邵字志學暨乎暮齒篤好經史遺落世事用心既專性頗怳忽每至對食閉目凝思盤中之肉輒為僕從所噉邵弗之覺唯責肉少數罰厨人厨人以情白依前閉目伺而獲之厨人方免笞辱其專固如此後至秘書少監庾自直潁川人少好學沉靜寡欲至著作佐郎知起居舍人房彦謙受學於博士尹琳手不釋卷遂通涉五經解屬文工草𨽻雅有辭辯風槩髙人後至司𨽻刺史劉炫字光伯河間景城人也少以聰敏見稱與信都劉焯閉户讀書十年不出交津橋人劉智海家素多墳籍炫就之讀書經涉十載雖衣食不繼晏如也遂以儒學知名後為瀛州户曹從事徧直三省而不得官盧思道字子行范陽人也思道聰爽俊辨通脫不覊年十六遇中山劉松為人作碑銘以示思道思道讀之多所不解於是感激閉户讀書師事河間邢子才後思道復為文以示劉松松又不能甚解思道乃喟然嘆曰學之有益豈徒然哉因就魏收借異書數年之間才學兼著後至散騎侍郎奏内史侍郎事劉臻為皇太子學士無吏幹性恍惚耽恱經史終日覃思至於世事多所遺忘郎茂少敏慧七歲誦騷雅日千餘言十五師事國子博士河間權㑹受詩書易三禮及𤣥象刑名之學又就國子助教長樂張率禮受三傳羣言至忘寢食家人恐茂成病常節其燭燈後至尚書左丞内史令李徳林舉秀異射䇿甲科拜秘書郎秩滿當遷而固守不調在秘書十餘嵗其學業益廣唐竇威字文蔚扶風平陵人威家世勲貴諸昆弟並尚武藝而威耽翫文史介然自守諸兄哂之謂為書癡李宻多籌筭養客禮賢無所愛恡後更折節下帷耽學尤好兵書誦皆在口師事國子助教包愷愛史記漢書勵精忘倦愷門徒皆出其下虞世南性沈静寡欲篤志勤學少與兄世基俱受學於吳郡顧野王經十餘年精思不倦或累旬不盥櫛後至秘書監徐曠字文逺家貧無以自給其兄林鬻書為事文逺每閱書於肆不避祁寒暑雨遂覽五經尤精春秋左氏傳姚思亷吳興武康人性恬静寡欲終日閉門披閱經史未嘗言及家事非公事不出門無所造請學有家風博通前載後至散騎常侍張行成少師事河間劉炫勤學不倦後至右僕射太子少傅蕭德言博涉經史尤精春秋左氏傳貞觀中累除著作郎兼𢎞文館學士德言晚年尤篤志於學自晝達夜畧無厭倦每欲開五經必盥濯束帶危坐對之妻子候問請曰終日如是無乃窮乎德言曰敬先聖之言豈憚如此路敬淳尤勤學不窺門庭徧覽墳籍後至太子司儀郎李襲譽好學手不釋卷博涉經史後至同州刺史裴行儉初以門廕補𢎞文生累年在館惟閉户讀書館司将加薦舉固辭不就左僕射房元齡問其故曰遭隋季亂私門書籍蕩盡冀在館披閱有所成耳後至吏部侍郎裴炎河東人也少補𢎞文生每休暇諸生多出逰炎獨觀書不輟後至内史劉仁軌字正則汴州尉氏人也少恭謹好學遇隋末䘮亂不遑專習每行坐所在輒書空畫地由是博涉經史後至文昌左相馬懐素少師事李善貧無燈燭晝採薪蘇夜燃讀書遂博覽經史解屬文開元中為秘書監兼昭文館學士懷素雖居吏職而篤學手不釋卷王友貞素好學讀九經皆百遍誨訓子弟如嚴君焉後拜太子中舍許令在家脩道韋涉中書令安石之子開元初丁父憂居䘮過禮自此杜門不出八年于兹與弟斌相勸勵探討墳索不捨晝夜文華當代俱有盛名後至禮部尚書東郡留守楊綰生而聰慧及長好學不倦博通經史官至中書侍郎平章軍國事于休烈為工部尚書篤好墳籍手不釋卷以至于終崔元幹善屬文年近七十好學不倦官厯駕部員外郎知制誥陽城字亢宗北平人也代為宦族家貧不能得書乃求入集賢院為寫書吏竊官書讀之晝夜不出房經六年遂無所不通李巽字令叔趙郡人少勤學孜孜自課以明經調補華州㕘軍應㧞萃科授鄠縣尉蔣仁自少好學雖甚寒暑未嘗釋卷後至秘書監王起官至山南西道節度使自幼及耋手不釋卷張建章尤好經史聚書至萬卷所居有書樓但以披閱清淨為事經涉之地無不理焉建章曽齎元載命往渤海遇風濤乃泊其船回及西岸經太宗征遼碑半在水中建章則以帛苞麥屑置于水中摸而讀之不失一字其篤學也如此後至幽州行軍司馬李谿在省臺日聚書至多手不釋卷時人號曰李書樓仕昭宗時位至宰相梁孫隲雅好聚書有六經史漢洎百家之言凡數千卷皆簡翰精至披勘詳審得暇即朝夕耽翫曽無少怠官至左散騎常侍後漢劉岳初少孤以先人官卑羣從之間最不調兩都䘮亂流寓青齊丐食業文厲心苦節至太常卿晉裴皥容止端秀性急剛直無隐少而好學苦心文翰雖亂離斯瘼手不釋卷後至右僕射致仕周馮道少純厚好學善屬文不耻惡衣食負米奉親之外唯以披誦咏吟為事雖大雪擁户凝塵滿席湛如也後至中書令張昭自厯清顯手不釋卷每得生書以舊有足病必卧而禮之舉朝服其好學册府元龜卷七百九十八
