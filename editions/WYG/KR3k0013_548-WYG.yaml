body:
  text: 册府元龜卷五百四十八宋王欽若等撰諫諍部強諫遺諫強諫左氏之述強諫謂其有愛君之心葢以其忠悃内發事機外廹竭誠盡規將以紓患而安國之可保也漢氏而下乃有秉節剛毅立志敦篤均邦國之休戚㕘帷幄之議論或政治有失舉措非順事等綴旒之危禍同發矢之速則乃批鱗貢説犯顔進諫以至憤發而色變感激而涕流排宫門之闥攬路馬之轡以頭軔車拔刀斷靷伏閣不起引裾以隨露髮輿襯而叩馬免冠徒跣以自劾觸暴怒而罔憚濵九死而無悔至或疎賤之列非當言責之任亦有能奮一朝之命而規人主之失者焉雖復仲尼之述五諫非尚乎詆訐范寗之著五論以兵諫為非然而原其誠心出於忠厚上思以成君之徳下冀以救時之失嫉惡將以利國愛賢懼乎濫罪區區之意豈有他哉在人主容之而已漢周昌髙帝時為御史大夫嘗燕入奏事燕謂安閑之居也髙帝方擁戚姬擁抱也昌還走髙帝逐得騎昌項上問曰我何如主也昌仰曰陛下即桀紂之主也於是帝笑之然尤憚昌及帝欲廢太子而立戚姬子如意為太子大臣固諫莫能得帝以留侯策止而昌庭爭之強帝問其説昌為人吃又盛怒曰臣口不能言然臣期期知其不可陛下欲廢太子臣期期不奉詔帝欣然而笑即罷之樊噲為舞陽侯髙帝嘗疾惡見人卧禁中詔戸者無得入羣臣羣臣絳灌等莫敢入十餘日噲乃排闥直入闥宫中小門也大臣隨之帝獨枕一宦者卧噲等見帝流涕曰始陛下與臣等起豐沛定天下何其壯也今天下已定又何憊也且陛下病甚大臣震恐不見臣等計事顧獨與一宦者絶乎且陛下獨不見趙髙之事乎髙祖笑而起袁盎為中郎將從文帝幸覇陵帝欲西馳下峻阪盎㩜轡㩜與攬同帝曰將軍怯邪盎言臣聞千金之子不垂堂言富人之子則自愛也垂堂謂坐堂外邊恐墜墮也百金之子不騎衡騎謂跨之也衡樓殿邊欄楯也聖主不乗危不徼幸今陛下騁六飛六馬之疾者如飛馳不測山有如馬驚車敗陛下縱自輕奈髙廟太后何帝乃止薛廣徳為御史大夫成帝酎祭宗廟出便門欲御樓船廣徳當乗輿前免冠頓首曰宜從橋詔曰大夫冠廣徳曰陛下不聽臣臣自刎以血汚車輪陛下不得入廟矣言見死傷不得入廟祠也帝不説説讀曰悦光禄大夫張猛曰臣聞主聖臣直從橋安從船危聖主不乗危御史大夫言可聽帝曰曉人不當如是耶乃從橋朱雲為槐里令坐法為城旦成帝時丞相故安昌侯張禹以帝師位特進甚尊重雲上書求見公卿在前雲曰今朝廷大臣上不能輔主下亡以益民皆尸位素飱尸主也素空也尸位者不舉其事但主其位而已素飱者徳不稱官空當食禄亡讀曰無孔子所謂鄙夫不可以事君夫茍患失之亡所不至者也臣願賜上方斬馬劍斷佞臣一人以勵其餘尚方少府之屬官也作供御器物故有斬馬劒劒利可斬馬也帝問誰也對曰安昌侯張禹帝大怒曰小臣居下訕上廷辱師傅罪死不赦御史將雲下雲呼攀殿檻檻折呼叫也皆火故反曰臣得下從龍逢比干遊於地下足矣未知聖朝何如也御史將雲去於是左將軍辛慶忌免冠解印綬叩頭殿下曰此臣素著狂直於世使其言是是不可誅使其言非固當容之臣敢以死爭慶忌叩頭流血帝意解然後得已及後當治檻帝曰勿易因而輯之以旌直臣後漢申屠剛光武時為尚書令帝嘗欲出遊剛以隴蜀未平不宜晏安逸豫諫不見聽遂以頭軔乗輿輪帝遂為止軔謂以頭投車輪也郭憲字子横為光禄勲車駕西征隗囂憲諫曰天下初定車駕未可以動憲乃當車拔刀斷車靷帝不從遂上隴其後頴川兵起乃回駕而還帝歎曰恨不用子横之言時匈奴數犯塞帝患之乃召百寮廷議憲以為天下疲弊不宜動衆諫諍不合乃伏地稱眩瞀不復言帝令兩郎扶下殿憲亦不拜帝曰常聞關東觥觥郭子横竟不虚也憲遂以病辭退卒於家魏辛毗為侍中文帝欲徙冀州士家十萬戸實河南時連蝗民饑羣司以為不可而帝意甚盛毗以朝臣俱求見帝知其欲諫作色以見之皆莫敢言毗曰陛下欲徙士家其計安出帝曰卿謂我徙之非邪毗曰誠以為非也帝曰吾不與卿共議也毗曰陛下不以臣不肖置之左右厠之謀議之官安得不與臣議邪臣所言非私也乃社稷之慮也安得怒臣帝不答起入毗隨而引其裾帝遂奮衣不還良乆乃出曰佐治卿持我何太急邪毗曰今徙既失民心又無以食也帝遂徙其半吳張昭為綏逺將軍孫權於武昌臨釣䑓飲酒醉使人以水灑羣臣曰今日酣飲惟醉墮臺中乃當止耳昭正色不言出外軍中坐權遣人呼昭還謂曰為共作樂耳公何為怒乎昭對曰昔紂為糟丘酒池長夜之飲當時亦以為樂不以為惡也權黙然有慙色罷酒後魏古弼為尚書令時上谷民上書言苑囿過度民無田業減大半以賜貧人弼覽見之入欲陳奏遇大武與給事中劉樹奕碁忘不聽事弼侍坐良乆不獲申聞乃起於大武前捽樹頭掣下床以手搏其耳以拳毆其背曰朝廷不治實爾之罪大武失容放碁曰不聽奏事實在朕躬樹何罪置之弼具狀以聞大武竒弼公直皆可所奏弼曰為臣而逞其忠於君前者非無罪也乃詣公車免冠徒跣自劾請罪大武遣使者召之及至大武曰卿其冠履吾聞築社之役蹇蹷而築之端冕而事之神與之福然則卿有罪自今以後茍利社稷益國便民者雖復顛沛造次卿則為之無所顧也北齊李集為典御丞文宣帝肆行淫暴凡所殺害多令支解集面諫帝比於桀紂帝令縛置障流中沉没乆之復令引出謂曰吾何如桀紂集曰向來彌不及矣帝又令沈之引出更問如此數四集對如初帝大笑曰天下有如此癡漢方知龍逢比干非是俊物遂解放又被引入見似有所陳帝令搏出腰斬後周張衡為太學士武帝居太后憂與左右出獵衡露髮輿櫬叩馬切諫帝嘉焉擢拜漢王侍讀隋劉行本為黄門侍郎髙祖嘗怒一郎於殿前笞之行本進曰此人素清其過又小願陛下少寛假之帝不顧行本於是正當帝前曰陛下不以臣不肖置臣左右臣言若是陛下安得不聽臣言若非當致之於理以明國法豈得輕臣而不顧也臣所言非私因置笏於地而退帝歛容謝遂原所笞者蘇威為納言髙祖嘗怒一人將殺之威入問進諫不納帝怒甚將自出斬之威當帝前不去辟之而出威又遮之帝拂衣而入良乆乃召威謝曰公能若是吾無憂矣趙綽為大理少卿時大理掌固來曠告綽濫免徒囚帝使信臣推驗初無阿曲帝又怒曠命斬之綽因爭以為曠不合死帝乃拂衣入閤綽又矯言臣更不理曠自有他事未及奏聞帝又引入閤綽再拜請曰臣有死罪三臣為大理少卿不能制馭掌固使曠獨挂天刑死罪一也囚不合死而臣不能死爭死罪二也臣本無他事而妄言求入死罪三也帝解顔㑹文獻皇后在坐命賜綽二金盃酒飲訖并以盃賜之曠因免死配廣州唐袁髙為給事中盧杞為相以姦邪貶吉州長史貞元元年徳宗詔移杞為饒州刺史髙宿直不肯草制宰相劉從一等改命舍人為之及詔出髙執之不下自丁巳至戊午諫臣上疏皆不之改丁卯髙又於正殿奏云陛下用盧杞獨秉鈞軸前後三年棄斥忠良附下罔上使陛下越在草莽皆杞之過且漢時三光失序雨旱不時宰相請罪小者免官大者刑戮盧杞罪合至死陛下好生惡殺赦杞萬死惟貶新州司馬旋復遷移今除刺史是失天下之望伏惟聖意裁擇帝謂曰盧杞有不逮是朕之過髙復奏曰盧杞姦臣常懐詭詐非是不逮帝曰朕已有再赦髙曰恩赦乃釋其罪不宜授刺史耳赦文正憂黎民今饒州大郡若命姦臣司牧是一州蒼生獨受其罪望引常叅官顧問并擇謹厚中官令就街衢衆訊億兆一人異臣言臣當死於是補闕拾遺又前諫與髙不異帝良久謂曰若與盧杞刺史太優與上佐可否皆云可遂追饒州制翌日帝遣中使宣慰髙云朕徐思卿言深覺愜當依卿所奏陽城為諫議大夫裴延齡讒譖陸贄等坐貶黜徳宗怒不解在朝無敢救者城聞而起曰吾諫官也不可令天子殺無罪人而信用奸臣即率拾遺王仲舒等數人守延英閤上疏論延齡姦佞贄等無罪狀徳宗大怒召宰相入語將加城等罪良乆乃解令宰相諭遣之劉栖楚為右拾遺敬宗即位後百寮入閤日絶髙未坐羣臣候立紫宸門外有不任其乆欲傾踣者諫議大夫李渤出次白宰相曰昨日已有疏論坐晩今日又益晩今不能迴上意是渤之罪請出閤赴金吾仗待罪有頃既坐百官班退栖楚獨留帝前進諫曰臣歴觀前王嗣位之初莫不躬勤庶政坐以待旦陛下即位以來放情嗜寢樂色忘憂安卧宫闥日晏方起西宫宻邇未過山陵鼔吹之聲日喧於外以憲宗皇帝大行皇帝皆是恪勤庶政四方猶有叛亂陛下運當少主即位未幾惡徳布聞臣恐福祚之不長也臣忝諫官致陛下有此請碎首以謝遂以額叩龍墀乆之不已宰臣李逢吉出位宣曰劉栖楚休叩額候進止栖楚捧首而起因更陳論榼額見血帝為之動容以袖連揮栖楚又云不可臣奏臣即碎首而死中書侍郎牛僧孺宣示栖楚曰所進知門外待進止栖楚即拜舞而出待罪於金吾仗然後宰臣更贊其事於帝前命中使就仗宣慰并李渤竝令各宜歸第遺諫夫慎終於始君子之道圗國忘死忠臣之節中代而下乃有秉貞純之操敦亢直之志不幸遘疾殆於彌留属纊忍死口舌為奏陳逆耳之深戒述經邦之丕訓兾其感悟以申規益以至乗輿臨省親乞其言使者存問因受其對莫不罄肺腑之丹實陳時政之得失周旋悃愊無所回隱復有直躬守道循名顧義思納誨以救惡遂捐軀而甘死將致君於善以舍生為輕惓惓之誠布於遺體斯固烈氣貫於穹壌英聲垂於無窮歴千祀而如生可以掩卷而太息者矣史魚為衛大夫病且死謂其子曰我數言蘧伯玉之賢而不能進彌子瑕不肖而不能退為人臣生不能進賢而退不肖死不當治喪正堂殯我於室足矣衞君問其故子以父言聞君遽然召蘧伯玉而貴之召彌子瑕而退之徙殯於正堂成禮而後去生以身諫死以尸諫可謂直矣詩曰靖共爾位好是正直漢東方朔武帝時為大中大夫將死諫曰詩云營營青蠅止於樊愷悌君子無信讒言讒言罔極交亂四國願陛下遠巧佞退讒言帝曰今顧東方朔多善言恠之居無幾何果病死後漢吳漢光武時為大將軍病篤帝親臨問所欲言對曰臣愚無所知識唯願陛下慎無赦而已鍾離意明帝時為魯相卒官遺言上書陳昇平之世難以急化宜少寛假帝感傷其意下詔嗟歎賜錢二十萬樊儵明帝時為長水校尉卒遣小黄門張音問所遺言先是河南縣亡失官錢典負者坐死其罪徙者甚衆遂委責於人以償其耗卿部吏司因此為奸儵嘗疾之又野王嵗獻甘醪膏􅄳母輒擾人吏以為利儵並欲奏罷之疾病未及得上音歸具以聞帝覽之而悲怛勑二郡竝令從之黄瓊桓帝時為司空以地震免疾篤上疏曰臣聞天者務剛其氣君者務強其政是以王者處髙自持不可不安履危任力不可不據夫自持不安則顛任力不據則危故聖王升髙據上則以徳義為首涉危蹈傾則以賢者為力唐堯以徳化為冠冕以稷契為筋力髙而益崇動而愈據此先聖所以長守萬國保其社稷者也昔髙皇帝應天順民奮劒而王掃除秦項革命創制降徳流祚至於哀平而帝道不綱秕政日亂遂使奸佞擅朝外戚専恣所冠不以仁義為冕所蹈不以賢佐為力終至顛蹶滅絶漢祚天維陵弛民鬼慘愴賴皇乾眷命炎徳復輝光武以聖武天挺繼綂興業創基氷泮之上立足枳棘之林擢賢於衆愚之中畫功於無刑之地崇禮義於交爭循道化於亂離自是歴髙而不傾任危而不跌興復洪祚開建中興光被八極垂名無窮至於中葉盛業漸衰陛下祚從藩國爰升帝位天下拭目謂見太平而即位以來未有聖政諸梁秉權竪官充朝重封累職傾動朝廷鄉較牧守之選皆出其門羽毛齒革明珠南金之寶殿滿其室富擬王府勢回天地言之者必族附之者必榮忠臣懼死而杜口萬夫怖禍而木舌塞陛下耳目之明更為聾瞽之主故太尉李固杜喬忠以直言徳以輔政念國忘身殞殁為報而坐陳國議遂見殘滅賢愚切痛海内傷懼又前白馬令李雲指言宦官罪穢宜誅皆因衆人之心以救積薪之弊𢎞農杜衆知雲所言宜行懼雲以忠獲罪故上書陳理之乞同日而死所以感悟國家庶雲獲免而雲既不辜衆又并坐天下尤痛益以怨結故朝野之人以忠為諱昔趙殺鳴犢孔子臨河而反夫覆巢破卵則鳳凰不翔刳牲夭胎則麒麟不臻誠物類相感理使其然尚書周永昔為沛令素事梁冀幸其威勢坐事當罪越拜令職見冀將衰乃陽毁示忠遂因姦計亦取封侯又黄門協邪羣軰相黨自冀興盛腹背相親朝夕圗謀共搆姦軌臨冀當誅無可設巧復暴其惡以要爵賞陛下不加清徵審别真偽復與忠臣竝時顯封使朱紫共色粉墨雜揉所謂抵金玉於沙礫碎珪璧於泥塗四方聞之莫不憤歎昔曽子大孝慈母投杼伯竒至賢終於流放夫讒諛所舉無髙而不可升相抑無深而不可淪可不察歟臣至頑駑世荷國恩身輕位重勤不補過然懼於永殁負釁益深敢以垂絶之日陳不諱之言庶有萬分無恨三泉其年卒司馬直靈帝時除鉅鹿太守是時刺史二千石皆責助軍修宫錢直以有清名减責三百萬直被詔悵然曰為民父母而反割剥百姓以稱時求吾不忍也辭疾不聽行至孟津上書極陳當時之失古今禍敗之戒即吞藥自殺書奏帝為暫絶脩宫錢魏髙堂隆明帝時為光禄勲疾篤口占上疏曰曽子有疾孟敬子問之曽子曰鳥之將死其鳴也哀人之將死其言也善臣寢疾病有増無損常懼奄忽忠欵不昭臣之丹誠豈惟曽子願陛下少垂省覽渙然改往事之過謬勃然興來事之淵塞使神人嚮應殊方慕義四靈效珍玉衡曜精則三王可邁五帝可越非徒繼體守文而已也臣嘗謂世主莫不思紹堯舜湯武之治而蹈踵桀紂幽厲之跡莫不蚩笑季世惑亂亡國之主而不登踐虞夏殷周之軌悲夫以若所為求若所欲猶緣木而求魚煎水作氷其不可得明矣尋觀三代之有天下也聖賢相承歴載數百尺地莫非其有一民莫非其臣萬國咸寧九有有截鹿臺之金巨橋之粟無所用之仍舊南面夫何為哉然癸辛之徒恃其有力知足以拒諫才足以餙非諂諛是尚臺觀是崇淫樂是好倡優是説作靡靡之樂安濮上之音上天不蠲眷然回顧宗國為墟不夷於𨽻紂縣白旗桀放鳴條天子之尊湯武有之豈伊異人皆明主之胄也且當六國之時天下殷熾秦既兼之不脩聖道乃搆阿房之宫築長城之守矜誇中國威服百蠻天下震竦道路以目自謂本枝百葉永垂洪暉豈寤二世而滅社稷隳圯近漢孝武承文景之福外攘夷狄内興宫殿十餘年間天下囂然乃信越巫懟天遷怒起建章之宫千門萬戸卒致江充妖蠱之變至於宫室乖離父子相殘殃咎之毒禍流數世臣觀黄初之際天兆其戒異類之鳥育長燕巢口爪胷赤此魏室之大異也宜防鷹揚之臣於蕭牆之内可選諸王使君國典兵往往棊跱鎮撫皇畿翼亮帝室昔周之東遷晉鄭是依漢吕之亂實賴朱虗斯葢前代之明鑒夫皇天無親惟徳是輔民詠徳政則延期過歴下有怨歎掇録授能繇此觀之天下之天下非獨陛下之天下也臣百疾所鍾氣力稍微輒自輿出歸還里舍若遂沉淪䰟而有知結草以報詔曰生廉侔伯夷直過史魚執心堅白謇謇匪躬如何微疾未除退身里舍昔邴吉以陰徳疾除而延夀貢禹以守節疾篤而濟愈生其強飲専精以自持習鑿齒曰髙堂隆可謂忠臣矣君侈每思諌其惡將死不忘憂社稷正辭動於人主明戒驗於後身吳張紘為太常長史還吳迎家道病卒臨困授子靖留牋曰自古有國有家者咸欲脩徳政以比隆盛世至於其治多不馨香非無忠臣賢佐闇於治體也繇主不勝其情弗能用耳夫人情憚難而趨易好同而惡異與治道相反傳曰從善如登從惡如崩言善之難也人君承奕世之基據自然之勢操八柄之威甘易同之懽無假取於人而忠臣挾難進之術吐逆耳之言其不合也不亦宜乎雖則有釁巧辯緣間眩於小忠戀於恩愛賢愚雜錯長㓜失序其所由來情之亂也故明君寤之求賢如飢渴受諫而不厭抑情損欲以義割恩上無偏謬之授下無希冀之望宜加三思含垢藏疾以成仁覆之大紘卒帝省書流涕陸凱為左丞相凱疾病孫皓遣中書令董朝問所欲言凱陳何定不可任用宜授外任不宜委以國事奚熙小吏建起浦里田欲復嚴宻故迹亦不可聽姚信樓元賀邵張悌郭逴薛瑩滕脩及族弟喜抗或清白忠勤或姿才卓茂皆社稷之楨幹國家之良輔願陛下重留神思訪以時務各盡其忠拾遺萬一遂卒晉裴秀為司空薨友人料其書記得表章言平吳之事其詞曰孫皓酷虐不及聖明御世兼弱攻昧使遺子孫將遂不能臣時有否泰非萬安之勢也臣昔雖已屢言未有成旨今既疾篤不起謹重尸啓願陛下特與施行乃封以上聞詔報曰司空薨痛悼不能去心又得表草雖在危困不忘王室盡忠憂國省益傷切輒當與諸賢共論也劉波為散騎常侍出督淮北諸軍冀州刺史以疾未行上疏曰臣聞天地以𢎞濟為仁君道以恵下為德是以禹湯有身勤之績唐虞有在予之誥用能惠被蒼生勲流後業宣帝開拓洪圗始基成命爰及文武歴數在躬而猶虚心側席卑己崇物然後知積累之功重勤王之業艱先君之徳𢎞貽厥之賜厚恵王不懐委政内任遂使神噐幽淪三光翳曜園林懐九泉之感宫廟集胡馬之跡所謂肉食失之於朝黎庶暴骸於外也賴元皇帝神武應期祚隆淮海振乾綱於己墜紐絶維而更張陛下承宣帝開始之宏基受元帝克終之成烈保大定功戢兵靖亂故使負鱗横海之鯨僭位滔天之宼望雲旗而宵潰覩太陽而霧散巍巍蕩蕩人無名焉而頃年以來天文違錯妖恠屢生㑹稽先帝本封而地動經年昔周之文武有魚鳥之瑞君臣猶懐震悚况今災變衆集曾莫之疑公旦有勿休之誡賈誼有積薪之喻臣鑒先徵竊惟今事是以敢肆狂瞽直言無諱往者先帝以𤣥風御世責成羣后坐運天綱隨造化委順故忘日計之功收嵗成之用今禮樂征伐自天子出相王賢雋協和百揆六合承風天下響振而鈞臺之詠弗聞景亳之命未布將羣臣之不稱陛下用之不盡乎凡聖王之化莫不敦崇忠信存正棄邪傷化毁俗者雖親雖貴必疎而逺之清公貞修者雖微雖賤必親而近之今則不然此風既替利竟滋甚朋黨比周毁譽交興鑽求茍進人希分外見賢而居其上受禄每過其量希旨承意者以為奉公共相讚白者以為忠節舉世見之誰敢正言陛下不明必行之法以絶穿鑿之源者恐脱因疲倦以誤視聽且苻堅滅亡於今五年舊京殘毁山陵無衞百姓塗炭未蒙拯捄伏願逺觀漢魏衰滅之繇近覽兩朝傾覆之際超然易慮為於未有則靈根永固社稷無虞臣豈誣一朝之人皆無忠節但任非才求之不至耳今政煩役殷所在凋弊倉廪空虚國用傾竭侵削流亡相屬略計戸口但咸安已來十分去三百姓懐浮游之歎下泉興周京之思昔漢宣有云與我共治天下者其惟良二千石乎是以臨下有方者就加璽贈法苛政亂者恤刑不赦事簡於上人悦於下今則不然告時乞職者以家弊為辭振窮恤滯者以公爵為施古者為百姓立君使之司牧今者以百姓恤君使之蠶食至乃貪汚者謂之清勤慎法者謂之怯劣何反古道一至於此陛下雖躬自節儉哀矜於上而羣寮肆欲縱心於下六司垂翼三事拱黙故有識者覩人事以歎息觀天𤯝而大懼昔宋景退熒惑之災殷宗消鼎雉之異伏願陛下仰觀大禹過門之志俯察商辛沉湎之失逺思國風恭公之刺深惟定姜小臣之喻暫回聖恩大詢羣侯延納衆賢訪以得失今百寮率職人言損益察其所繇觀其所以審識羣才助鼎和味克念作聖以答天休則四海宅心天下幸甚臣亡祖先臣隗昔荷殊寵匪躬之操猶存舊史有志無時懐恨黄泉及臣凡劣伏蒙罔極之眷恩隆累世實非糜身傾宗所能上報前作此表未及得通暴嬰篤疾恐命在奄忽貪及視息望達愚情氣力惙然不能自宣疏奏而卒追贈前將軍後魏王叡孝文時為尚書令疾篤上疏曰臣聞忠於事君者節義著於臨終孝於奉親者淳誠表於垂没故孔明卒軍不忘全蜀之計曽參疾甚情存善言之益雖則庸昧敢忘景行臣荷天地覆載之恩蒙父母生成之徳漸風訓於華年服道教於弱冠濯纓清朝垂周三紀受先帝非分之眷叨陛下殊常之寵遂乃齊跡功舊内侍帷幄爵列諸王位班上等從容聞道與知國政誠思竭盡力命以報所受不謂事與心違忽嬰重疾每屈輿駕親臨問之榮洽生年恵流身後犬馬之誠銜佩罔極今所病遂篤慮必不起延首闕庭更戀終日仰恃皇朝宿眷之隆敢陳愚昧管窺之見臣聞為治之要其畧有五一者慎刑罰二者任賢能三者親忠信四者逺讒佞五者行黜陟夫刑罰明則姦宄息賢能用則功績著親忠信則視聽審逺讒佞則疑間絶黜陟行則貪汚改是以欽恤惟刑載在唐典知人則哲惟帝所難周書垂好徳之文漢史列防姦之論考省幽明先王大典又八表既廣遠近事殊撫荒裔宜待之以寛信綏華甸宜恵之以明簡哀恤孤獨賑施困窮録功舊赦小罪輕徭役薄賦歛修福業禁滛祀願聽政餘暇賜垂覽察使子㐮之誠重申於當世將墜之志獲用於明時尋薨隋叚文振大業中為左侯衞大將軍遼東之役出南蘇道在道疾篤上表曰臣以庸微幸逢聖世濫蒙奬擢榮冠儕伍而知能無取叨竊已多言念國恩用忘寢食嘗思效其鳴吠以報萬分而攝養乖方疾患遂篤抱此深愧永歸泉壌不勝餘恨輕陳管穴竊見遼東小醜未服嚴刑逺降六師親勞萬乗但夷狄多詐深須防簡口陳降欵心懐背叛詭伏多端勿得便受水潦方降不可淹遲唯願嚴勒諸軍星馳速發水陸俱前出其不意則平壌孤城勢可拔也若傾其根本餘宼自尅如不時定脱過秋霖雨深為艱阻兵糧又竭強敵在前靺鞨出後遲疑不决非上策也後數日卒於師帝省表悲歎乆之唐魏徵為太師貞觀十七年薨太宗謂侍臣曰徵亡後朕遣人至宅就其書函得表一紙始立表草字皆難識唯前有數行稍可分辨云天下之事有善有惡任善人則國安用惡人則國亂公卿之内情有愛憎憎者唯見其惡愛者唯見其善愛憎之間所宜詳審若愛而知其惡憎而知其善去邪勿疑任賢勿貳可以興矣其遺表如此然在朕思之恐不免斯事公卿侍臣可書之於笏知必諫也李大亮為右衞大將軍貞觀十八年太宗幸雒陽令大亮副房𤣥齡居守後遇疾臨終上表請停遼東之役又言京師宗廟所在願深以闗中為意表成而卒房𤣥齡為司空貞觀二十二年太宗幸玉華宫𤣥齡以疾卧緫留臺後漸篤𤣥齡乃謂諸子曰吾自度危篤而恩澤轉降若辜負聖君則死有餘責當今天下寧謐咸得其宜唯東討不停方為國患主上含怒意决臣下莫敢犯顔吾知而不言可謂銜恨入地遂抗表切諫曰臣聞兵惡不戢武貴止戈當今聖化所覃無逺不屇自上古所不臣者陛下皆能臣之所不制者皆能制之詳觀古今為中國患害無過突厥遂能坐運神策不下殿堂大小可汗相次束手分典禁圍執㦸行間其後延陁鳩張尋既夷㓕䥫勒慕化請置州縣沙漠以北萬里無塵至於髙昌叛渙於流沙吐谷渾首䑕於積石偏師薄伐俱從平蕩髙麗歴代逋誅莫能討繫陛下責其逆亂殺主害人親揔六軍問罪遼碣未經旬日即拔遼東前後虜獲數十萬計分配諸州無處不滿雪往代之宿恥掩崤陵之枯骨比功較徳萬倍前王此聖人之所以自知微臣安敢備説且陛下仁風被於率土孝徳彰於配天覩夷狄之將亡則指其數嵗授將帥之節度則决機萬里屈指而候驛視景而望書符應若神筭無遺策擢將於行伍之間取士於凡庸之末逺夷單使一見不忘小臣之名未嘗再問箭穿七札弓貫六鈞加以留情墳典屬意篇什筆邁鍾張詞窮曹馬文鋒既振則宫徵自諧輕翰暫飛則華葩競發撫萬姓以慈遇羣臣有禮褒秋毫之善解吞舟之網逆耳之諫必聽膚受之愬斯絶好生之德禁障塞於江湖惡殺之仁息鼔刀於屠肆鳬鸕荷稻粱之恵犬馬蒙帷蓋之恩降乗吮思摩之瘡登堂臨魏徵之柩哭戰亡之卒則哀動六軍負填道之薪則情感天地重黔黎之大命特留心於庶獄臣心識昬憒豈足論聖功之深遠談天徳之髙大哉陛下兼衆美而有靡不備具微臣深為陛下惜之重之愛之周易曰知進而不知退知存而不知亡知得而不知喪又曰知進退存亡不失其正者其惟聖人乎繇此言之進有退之義存有亡之徵得有喪之理老臣所以為陛下惜之者葢謂此也老子曰知足不辱知止不殆臣謂陛下威名功徳亦可足矣拓地開疆亦可止矣彼髙麗者邊夷賤類不足待以仁義不可責以常禮古來以魚鼈畜之宜從闊畧若必欲絶其種類深恐獸窮則摶且陛下每决死囚必令三覆五奏進素食停音樂者葢以人命所重感動聖慈况今兵士之徒無一罪戾無故驅之於行陣之間委之於鋒刃之下使肝腦塗地魂魄無歸其老父孤兒寡妻慈母望槥車而淹泣抱枯骨而摧心足以變動陰陽傷害和氣實天下之寃痛也且兵者凶器戰者危事不得已而用之向使髙麗違失臣節而陛下誅之可也侵擾百姓而陛下滅之可也乆長能為中國患而陛下除之可也有一於此雖日殺萬夫不足為媿今無此三條坐煩中國内為舊王雪怨外為新羅報讐豈非所存者小所損者大願陛下遵皇祖老子止足之戒以保萬代巍巍之名發霈然之恩降寛大之詔順陽春而布澤許髙麗以自新焚陵波之船罷應募之衆自然華夷慶賴遠肅邇安臣老病三公旦夕入地所恨竟無塵露微増海嶽謹以殘魂餘息預代結草之誠儻蒙察以哀鳴臣即死且不朽太宗見表謂𤣥齡子婦髙陽公主曰此人危篤如此尚能憂我國家令狐楚為興元節度使開成二年將薨前一日自草遺表其畧曰臣永惟際㑹受國深恩以祖以父皆蒙褒贈有弟有子竝列班行全腰領以從先人委體魄而事先帝此不自達誠為甚愚但以水去泉扄長辭雲陛更陳尸諫猶進瞽言雖叫呼之不能豈誠明之敢忘今陛下春秋鼎盛寰海鏡清是修教化之初是復理平之始然自前年秋夏已來貶謫者至多誅戮者不少伏望普加洪造稍霽皇威殁者昭洗以雲雷存者霑濡以雨露使五穀嘉熟兆人安康納臣將盡之苦言慰臣永蟄之幽魄册府元龜卷五百四十八
