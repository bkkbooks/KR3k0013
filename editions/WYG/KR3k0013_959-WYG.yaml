body:
  text: 册府元龜卷九百五十九宋王欽若等撰外臣部土風夫五方之民言語不通衣服殊制至於居處飲食固亦異宜寒燠氣候諒非一貫是故先王設象胥之官以掌其鞮譯命輶軒之使分采於方言聲教之所暨覊縻而弗絶若乃藁街之攸舍秘閣之所記叅考乎殊俗增廣乎異聞稽之載籍灼然惟叙詮次其說以著於篇將使彊戎索者軌制可徵納職貢者名物斯辨庶以叅司籍之記備有司之傳云東夷夫餘國其民土著有宫室倉庫牢獄多山陵廣澤於東夷之域最平敞土地宜五穀不生五果其人麤大性强勇謹厚不寇鈔食飲皆用俎豆㑹同拜爵洗爵揖讓升降以殷正月祭天國中大㑹連日飲食歌舞名曰迎皷於是時斷刑獄解囚徒在國衣尚白白布大袂袍袴履革鞜出國則尚繒繡錦罽大人加狐狸􅎜白黒貂之裘以金銀飾帽譯人傳辭皆跪手據地竊語用刑嚴急殺人者死没其家人為奴婢竊盜一責十二男女淫婦人妬皆殺之尤憎妬已殺尸之國南山上至腐爛女家欲得輸牛馬乃與之兄死妻嫂與匃奴同俗其國善養牲出名馬赤玉貂􅎜美珠珠大者如酸棗以弓矢刀矛為兵家家自有鎧仗國之耆老自說古之亡人作城栅皆員有似牢獄行道晝夜無老幼皆歌通日聲不絶有軍事亦祭天殺牛觀蹄以占吉凶蹄解者為凶合者為吉有敵諸加加官號也自戰下戸俱擔糧飲食之其死夏月皆用氷殺人狥葬多者百餘厚葬有棺無槨其俗停喪五月以久為榮其祭亡者有生有熟喪主不欲速而他人强之嘗諍引以此為節其居喪男女皆純白婦人著布面衣去環佩大體與中國皆倣彿也水旱不調五穀不熟輒歸咎於王或言其王葬用玉匣漢朝常豫以玉匣付𤣥莵郡王死則迎取以葬公孫淵伏誅𤣥莵庫猶有玉匣一具今夫餘庫今魏時也有玉璧珪瓉數代之物傳世以為寶耆老言先代之所賜也其國殷富自先世以來未嘗破壞也其印文言濊王之印國有故城名濊城盖本濊貊之地而夫餘王其中自謂亡人抑有似也肅慎國夏則巢居冬則穴處父子世為君長無文墨以言語為約有馬不乘但以為財産而已無牛羊多畜猪食其肉衣其皮績毛以為布有樹名雒常若中國有聖帝代立則其木生皮可衣無井竈作瓦鬲受四五升以食坐則箕踞以足挾肉而啖之得凍肉坐其上令煖土無鹽鐵燒木作灰灌取汁而食之俗皆編髪以布作襜徑尺餘以蔽前後將嫁娶男以毛羽挿女頭女和則持歸然後致禮聘之婦貞而女淫貴壯而賤老死者其日即葬之於野交木作小槨殺猪積其上以為死者之糧性凶悍以無憂哀相尚父母死男子不哭泣哭者謂之不壯相盜竊無多少皆殺之故雖野處而不相犯挹婁古肅慎之國在夫餘東北千餘里土地多山險人形似夫餘而言語各異有五穀麻布出赤玉好貂無君長其邑落各有大人處於山林之間土氣極寒常為穴居以深為貴大家至接九梯好養豬食其肉衣其皮冬以豕膏塗身厚數分以禦風寒夏則裸袒以尺布蔽其前後其人臭穢不潔作厠於中圜之而居自漢興以後臣屬夫餘種衆雖少而多勇力處山險又善射發能入人目弓長四尺力如弩矢用楛長一尺八寸青石為鏃鏃能施毒中人即死便乘船好寇盜鄰國畏患而卒不能服東夷夫餘飲食類此皆用俎豆惟挹婁獨無法俗最無綱紀高句驪漢𤣥莵郡也在遼東之東地方二千里多大山深谷人隨而為居少田業力作不足以自資故其俗節於飲食而好修宫室東夷相傳以為夫餘别種故言語法則多同其俗淫皆潔浄自喜暮夜輒男女羣聚為倡樂好祠鬼神社稷零星以十月祭天大㑹名曰東明其國東有大穴號襚神穴亦以十月迎而祭之其公㑹衣服皆錦綉金銀以自飾大加主簿皆著幘如冠幘而無後其小加著折風形如弁無牢獄有罪諸加評議便殺之没入妻子為奴婢其婚姻皆就女家生子長大然後將婦歸家其俗男女已嫁娶便稍營送終之具金銀財幣盡於厚葬積石為封列種松栢其人性凶急有氣力習戰鬬好寇鈔沃沮東濊皆屬焉毎春秋較獵王親臨之人稅布五疋穀五石逰人則三年一稅十人共細布一疋租戸一石次七斗下五斗反逆者縳之於柱􅅡而斬之籍没其家盜則償十倍用刑既峻罕有犯者樂有五絃琴筝蓽篥横吹簫皷之屬吹蘆以和曲每年初聚戲於浿水之上王乘腰轝列羽儀以觀之事畢王以衣服入水分左右為二部以水石相濺擲諠呼馳逐再三而止俗以趨走為敬拜則曵一脚立多反拱行必揺手性多詭伏父子同川而浴共室而寢婦人淫奔俗多逰女有婚嫁者取男女相悅然後為之男家送猪酒而已無財聘之禮或有受財者人共恥之死者殯於屋内經三年擇吉日而葬居父母及夫之喪服皆三年兄弟三月初終哭泣葬則皷舞作樂以送之埋訖悉取死者生時服翫車馬置於墓側㑹葬者争取而去敬鬼神多􅁋祠盜者倍徵贓若貧下不能僃及負公私債者皆聽評其子女為奴婢以償之丈夫衣同袖衫大口袴白韋帶黄革履其冠曰骨蘇多以紫羅為之雜以金銀為飾其有官品者又挿二鳥羽於其頭上以顯異之婦人服裙襦袖皆為襈書籍有五經三史三國志晉春秋兵器有甲弩弓箭鞍稍矛鋋句驪一名絔耳一名小水貊在遼東郡西安平縣北出好弓所謂貊弓也東沃沮國在高句驪盖馬大山之東土肥美背山向海宜五穀善田種有邑落長帥人性質直彊勇少牛馬便持矛步戰言語飲食居處衣服禮節有似句驪其嫁娶之法女年十歳已相設許婿家迎之長養以為婦至成人便還女家女家責錢錢畢乃復還婿家其葬作大木槨長十餘丈開一頭作戸新死者皆假埋之方使覆形皮肉盡乃取骨置槨中舉家皆共一槨刻木如生形隨死者為數又有瓦䥶置米其中編縣之於槨戸邊北沃沮其俗皆與南同北沃沮一名置溝婁濊國本朝鮮地箕子教以禮義田蠶又制八條之國其人終不相盜無門戸之閉婦人貞信飲食以籩豆自謂與句驪同種言語法俗大抵相類其人性愿慤少嗜欲不請匄男女皆衣曲領其俗重山川山川各有部分界不得妄相干涉同姓不婚多所忌諱疾病死亡輒捐棄舊宅更造新居知種麻養蠶作絲緜布曉候星宿豫知年歲豐約常用十月祭天晝夜飲酒歌舞名之為舞天又祠虎以為神邑落有相侵犯者輒相罰責生口牛馬名之為責禍殺人者償死少寇盜能步戰作矛長二丈或數人共持之樂浪擅弓出其地又多文豹有果下馬高三尺乘之可於果樹下行海出班魚使來皆獻之馬韓國韓種有三一曰馬韓二曰辰韓三曰弁韓馬韓北與樂浪南與倭接東西以海為限人知田蠶作綿布出大栗如梨有長尾雞尾長五尺邑落雜居亦無城郭作土室形如冢開戸在上不知拜跪無長幼男女之别不貴金寳錦罽不知騎乘牛馬雅重瓔珠以綴衣為飾及縣頸垂耳大率皆魁頭露紒魁頭猶科頭也謂以髪縈繞成科結也紒音計布袍草履其人壯勇少年有築室作力者輒以繩貫脊皮縋以大木嚾呼為健常以五月田竟祭鬼神晝夜酒㑹羣聚歌舞舞輒數十人相隨蹋地為節十月農功畢亦復如之諸國邑各以一人主祭天神號為天君又立蘇塗諸國各有别邑為蘇塗諸亡逃至其中皆不還之蘇塗之義有似浮屠建大木以縣鈴皷事鬼神其南界近倭亦有文身者又其俗好衣幘下戸詣郡朝謁皆假衣幘自服印綬衣幘千有餘人辰韓在馬韓之東言語有類秦人繇是或謂之秦韓其土地肥美宜種五穀及稻曉蠶桑作縑布乘駕牛馬嫁娶禮俗男女有别以大鳥羽送死其意欲使死者飛揚其國作屋横累之木為之有似牢獄也國出鐵韓濊倭皆從取之諸市買皆用鐵如中國用錢又以供給二郡俗喜歌舞飲酒有瑟其形似筑彈之亦有音曲生兒便以石壓其頭欲令其􅄶今辰韓人皆􅄶頭男女近倭亦文身便步戰兵仗與馬韓同其俗行者相逢皆住讓路弁辰國與辰韓雜居亦有城郭衣服居處與辰韓同言語法俗亦相似祠祭鬼神有異施竈皆在戸西其瀆盧國與倭國接界十二國亦有王其人形皆長大美髪亦作廣幅細布衣服㓗清而刑法嚴峻其國近倭故頗有文身者州胡國在馬韓之西海島上其人短小髠頭衣韋衣有上無下好養牛豕乘船往來貨市韓中倭國在韓東南大海中依山島為居男子無大小皆黥面文身自古以來其使詣中國皆自稱大夫夏后少康之子封於會稽斷髪文身以避蛟龍之害今倭水人好沈没捕魚蛤文身亦以厭大魚水禽後稍以為飾諸國文身各異或左或右或大或小尊卑有差計其道里當在㑹稽東冶之東其風俗不淫男女皆露紒以木緜招頭其衣横幅但結束相連略而無縫婦女被髪屈紒作衣如單被穿其中央貫頭衣之種禾稻紵麻蠶桑紡績出細紵縑緜其地無牛羊馬虎豹鵲兵用矛楯木弓弓形短下長上竹箭或鐵鏃或骨鏃所有無與儋耳朱崖同地温煖冬夏食生菜皆徒跣有屋室父母兄弟卧息異處以朱丹塗其身體如中國用粉也食飲用籩豆手取以食不用匙筯其死有棺無槨封土作冡始死停喪十餘日當時不食肉喪主哭泣他人就歌舞飲酒已葬舉家詣水中澡浴以如練沐其行來渡海詣中國常使一人不梳頭不去蟣􅺃衣服垢汙不食肉不近婦人如喪人民名之為持衰若行者吉善共顧其生口財物若有疾病遭暴害便欲殺之謂之持衰不謹出眞珠青玉其山有丹其木有柟梓豫章櫟樗投㩖烏號楓香其竹篠簳桃支有薑橘椒蘘荷不知以為滋味有獮猴黑雉其俗舉事行來有所云為輒灼骨而卜以占吉凶先告所卜其辭如今龜法視火圻占兆其㑹同坐起父子男女無别人性嗜酒其俗不知正歲四節但計春耕秋收為年紀見大人所敬但搏手以當跪拜其人壽考或百年或八九十年國多女大人皆四五婦下戸或二三婦婦人不淫不妬忌不盜竊少争訟其犯法輕者没其妻子重者滅其門戸及宗族尊卑各有差序足相臣服收租賦有邸閣國國有市交易有無使大倭監之夷洲在臨海南南去郡二千里地無霜雪草木不死四面是山谿人皆髠髪穿耳女人不穿耳土地饒沃既生五穀又多魚肉有大尾短如麕尾狀舅姑子婦卧息共一大牀畧不相避地有銅鐵惟用鹿格為矛以戰鬬摩礪青石以作弓矢取生魚肉雜貯大瓦器中以鹽鹵之歴月餘日乃啖食之以為上餚文身國在倭國東北七千餘里人體有文如獸其額上有三文文大直者貴文小曲者賤土俗歡樂物豐而賤行客不賷糧有屋宇無城郭其王所居飾以金銀珍麗繞屋為壍廣一丈實以水銀雨則流於水銀之上市用珍寶犯輕罪者則鞭杖犯死罪則置猛獸食之有枉則猛獸避而不食經宿則赦之大漢國在文身國東五千餘里無兵戈不攻戰風俗並與文身國同而言語異扶桑國在大漢國東二萬餘里地在中國之東其土多扶桑木故以為名扶桑葉似桐而初生如笋國人食之實如梨而赤績其皮為布以為衣亦以為緜作板屋無城郭有文字以扶桑皮為紙無兵甲不攻戰其國法有南北獄若犯輕者入南獄重罪者入北獄有赦則赦南獄不赦北獄在北獄者男女相配生男八歲為奴生女九歲為婢犯罪之身至死不出貴人有罪國乃大㑹坐罪人於坑對之宴飲分訣若死别焉以灰繞之其一重則一身屏退二重則及子孫三重者則及七世名國王為乙祁貴人第一者為大對盧第二者為小對盧第三者為納咄沙國王行有鼓角導從其衣色隨年改易甲乙年青丙丁年赤戊巳年黄庚辛年白壬癸年黒有牛角甚長以角載物至勝二十斛有牛車馬車鹿車國人養鹿如中國畜牛以乳為酪有桑梨經年不壞多蒲桃其地無鐵有銅不貴金銀市無租估其婚姻婿往女家門外作屋晨夕灑掃經年而女不悅即驅之相悅乃成婚姻禮大抵與中國同親喪七日不食祖父母喪五日不食兄弟伯叔姑姊三日不食設靈為神像朝夕拜奠不制縗絰嗣王立三年不視國事百濟國在帶方故地南與倭接其衣服與高麗畧同婦人不加粉黛加辮髪垂後出嫁則分為兩道盤於頭上俗尚騎射讀書史能吏事亦知醫藥蓍龜占相之術以兩手據地為敬有僧尼多寺塔而無道士有鼓角箜篌筝竽箎笛之樂投壺圍棊樗蒲握槊弄珠之戲行宋元嘉歴以建寅月為歲首賦稅以布絹麻絲及米等量歲豐儉差等輸之其刑法反叛退軍及殺人者斬盜者流其贓兩倍徵之婦人犯姦者没入夫家為婢婚娶之禮畧同於華父母及夫死者三年治服餘親則葬訖除之有五穀牛猪雞多不火食厥田下濕人皆山居有巨栗每以四仲之月王祭天及五帝之神立其始祖仇台廟於國城歲四祠之仇台為遼東太守公孫度之婿新羅國在高麗東南漢樂浪郡之地其人雜有華夏其文字甲兵同於中國選人壯徤者悉入軍烽戍邏俱有屯營部伍風俗政刑衣服畧與高麗百濟同毎正月旦相賀王設宴㑹班賚羣官其日拜日月神至八月十五日設樂令官吏射賞以馬布其有大事則聚羣官詳議而定之服色尚素婦人辮髪繞頭以雜綵及珠為飾髪甚長美婚嫁之禮惟酒食而已輕重隨貧富新婚之夕女先拜舅姑次即拜夫死有棺歛葬起墳陵王及父母妻子喪持服一年田甚良沃水陸兼種其五穀果菜鳥獸物産畧與華同靺鞨國在高麗之北肅慎之苖裔也所居多依山水其俗相與耦耕土多粟麥穄水氣鹹生鹽於木皮之上其畜多猪嚼米為酒飲之亦醉婦人服布男子衣猪狗皮俗以溺洗手面於諸夷最為不潔其俗淫而妬其妻外淫人有告其夫者夫輒殺妻殺而後悔必殺告者繇是姦淫之事終不發揚人皆射獵為業角弓長三尺箭長尺有二寸常以八九月造毒藥傅矢以射禽獸中者立死黑水靺鞨俗皆編髪性凶悍無憂戚貴壯而賤老無屋宇並依山水掘地為穴架木於上以土覆之狀如中國之冢墓相聚而居夏則出隨水草冬則入處穴中父子相承世為君長俗無文字兵噐有角弓及楛矢其畜宜猪富人至數百口食其肉而衣其皮死者穿地埋之以身櫬土無棺歛之具殺所乘馬於屍前設祭振國本高麗其地在營州之東二千里南接新羅西接越喜靺鞨東北至黑水靺鞨地方二千里編戸十餘萬兵數萬人風俗與高麗及契丹同頗有文字及書記流求國居大海之西當建安之東男女皆以白苧繩纒髪從項後盤繞至額其男子用鳥羽為冠裝以珠貝飾以赤毛形製不同婦人以羅紋白布為㡌其形正方織鬬縷皮并雜色紵及雜毛以為衣製裁不一綴毛垂螺為飾雜色相間下垂小貝其聲如珮綴璫施釧懸珠於頸織藤為笠飾以毛羽有刀矟弓箭劍鈹之屬其處少鐵刃皆薄小多以骨角輔助之編紵為甲或用熊豹之皮王乘木獸令左右轝之而行導從不過數十人小王乘機鏤為獸形國人好相攻擊人皆驍徤善走難死而耐創諸洞各為部隊不相救助兩陣相當勇者三五人出前跳躁交言相罵因相擊射如其不勝一軍皆走遣人致謝即共和解收取鬬死者共聚而食之仍以其髑髏將向王所王則賜之以冠使為隊帥無賦歛有事則均稅用刑亦無常惟皆臨事科决犯罪皆斷於烏了帥日本官名不伏則上請於王王令臣下共議定之獄無枷鏁惟用繩縛决死刑以鐵錐大如筯長尺餘鑚頂而殺之輕罪用杖俗無文字望月虧盈以紀時節候草榮枯以為年歳人深目長鼻頗類於胡亦有小惠無君臣上下之節拜伏之禮父子同牀而寢男子拔去髭鬢身上有毛之處皆亦除去婦人以墨黥手為䖝蛇之文嫁娶以酒餚珠貝為聘或男女相悅便相匹偶婦人産乳必食子衣産後以火自炙令汗出五日便平復以木槽中暴海水為鹽木汁為酢釀米麵為酒其味甚薄食皆用手偶得異味先進尊者凡有宴㑹執酒者必待呼名而後飲上王酒者亦呼王名銜盃共飲頗同突厥歌呼蹋蹄一人唱衆皆和音頗哀怨扶女子上膞揺手而舞其死者氣將絶輿至庭親賓哭泣相弔浴其屍以布帛纒之裹之以葦草襯土而殯上不起墳子為父者數月不食肉南境風俗少異人有死者邑里共食之有熊羆豺狼尤多猪雞無牛羊驢馬厥田良沃先以火燒而引水灌之持一挿以石為刃長尺餘濶數寸而墾之土宜稻梁禾黍麻豆赤豆胡豆黑豆等木有楓栝樟竹松梗楠杉梓藤果藥同於江表風土氣候與嶺南相類俗事山海之神祭以酒餚鬬戰殺人便將所殺人祭其神或依茂樹或起小屋或懸髑髏於樹上以箭射之或累石繫幡以為神主王之所居壁下多聚髑髏以為佳人間門戸上必安獸頭骨角倭奴國在新羅東南水陸三千里居大海之中東西五月行南北三月行常與中國通其俗有文字敬佛法初跣足以幅巾蔽其節後椎髻無冠帶隋煬帝時始賜衣冠今以錦綵為冠飾裳皆施襈綴以金玉其衣服之製頗𩔖新羅然以文布為之腰佩銀花長八寸左右各數枚以明貴賤等級日本國言國近於日古倭國之别種也國在新羅東南大海中出紙𦂳滑如蠒紙其王阿每氏文字與中國同唐高宗永徽五年獻琥珀大如斗瑪瑙大如五升器與新羅相接其琥珀在海中涌出又與蝦夷國相隣交阯國人如禽獸男女同川而浴長幼無别項髻徒跣以布貫頭而著之後頗徙中國罪人使雜居其間乃稍知言語漸見禮化後漢光武中興錫光為交阯任延守九眞於是教其耕稼制為冠履初設媒娉始知婚娶建立學校導之禮義噉人國在交阯西所生首子輒解而食之謂之宜弟味旨則以貢其君君喜而賞其父取妻美則讓其兄今烏滸人是南州異物志曰烏滸北名也今漢川之南交阯之北常出道問有悮行旅輒出擊之利得人食之不貪其財貨並以其肉為餚死髑髏破之以飲酒以人掌趾為珍異以食長者林邑國古越裳之地土多香水金寶物産大抵與交阯同以塼城蜃􅁅塗之東向戸其國有金山石皆赤色其中生金金夜則出飛狀如螢火又出蝳貝齒吉貝沉木香吉貝者樹名也其革成時如鵝毳抽其緒紡之以作布潔白與紵布不殊亦染成五色織為班布也沉木香者土人斫斷之積以歲年朽爛而心節獨在置水中則沉故名曰沉香次不沉不浮者名曰香也其俗皆開北戸以向日至於居止或東西無定人性凶悍果於戰鬬便山習水不開平地四時暄暖無霜雪人皆倮露徒跣以黑色為美貴女賤男同姓為婚婦先聘婿女嫁之時著迦藍衣橫幅合縫如井闌首戴寳花居䘮翦髪謂之孝燔尸中野以為葬其王服天冠被纓絡毎聽政子弟侍臣皆不得近之又云其王戴金花冠形如章甫衣朝霞布珠璣瓔珞足躡革履時服錦袍良家子侍衞者二百許人皆執金裝刀有弓箭刀槊以竹為弩傅毒於矢樂有琴笛琵琶五弦頗與中國同毎擊皷以警衆吹蠡以即戎其人深目高鼻髪拳色黑俗皆徒跣以幅布纒身冬月衣袍婦人椎髻施捓葉席嫁娶必用八月女先求男由賤男而貴女同姓還相婚姻毎有婚媾令媒者齎金銀釧酒二壺魚數頭至女家於是擇日夫家㑹親賓歌舞相對女家請一大姓號婆羅門送女至男家婿盥手因牽女授之呪曰吉利吉利為成禮寡婦孤居散髪至老王死七日而葬有官者三日庶人一日皆以函盛屍鼓舞導從輿至水次積薪焚之收其骨王則納金甖中沉之於海有官者以銅沉之海口庶人以瓦送之於江男女皆截髪隨喪至水次盡哀而止歸則不哭每七日燃香散花復哭盡哀而止盡七七日而罷至百日三年亦如之人皆奉佛文字同於天竺又云其王者著法服加纓絡如佛像之飾出則乘象吹螺擊皷罩吉貝繖以吉貝為幡旗國不設刑法有罪者使象蹋殺之國王事尼乾道鑄金銀人像大十圍扶南國西南去林邑三千餘里出金銀銅錫沉木香象犀孔翠五色鸚鵡俗本躶文身被髪不製衣裳以女人為王人皆醜黑拳髪性質直不為冦盜以耕種為務一歲種三歲穫又好雕文刻鏤食噐多以銀為之貢賦以金銀珠香亦有書記府庫文字有類於胡喪葬婚姻畧同林邑又云百姓以蕉蔗龜烏為禮國法無牢獄有訟者先齋三日乃燒斧極赤令訟者捧行七步又以金環若雞卵投沸湯中令探取之若無實者手即爛有理者則不又於城溝中養鰐魚門外圏猛獸有罪者輒以餧猛獸及鰐魚獸不食為無罪三日赦之鰐大者長二丈餘狀如鼉有四足喙長六七尺兩邊有齒利如刀劍嘗食魚遇得獐鹿及人亦噉之蒼梧以南及外國皆有之吳時遣中郎康泰宣化從事朱應使於其國國人猶裸惟婦人著貫頭泰應謂曰國中實佳但人䙝露可怪耳尋使令國内男子着横幅今干澷也大家乃截錦為之貧者乃用布毗騫國去扶南八千里俗有室屋衣服噉粳米其人言語小異扶南有山出金金露生石上國法刑人並於王前噉其肉國内不受估客有往者亦殺而噉之是以商旅不敢至王常樓居不血食不事鬼神其子孫生死如常人惟王不死扶南王數使與書相報荅嘗遺扶南王純金五十人食器形如圓盤又如瓦塸名為多羅受五升又如椀者受一升王亦能作天竺書書可三千言語其宿命所由與佛經相似並論善事又傳扶南東界即大漲海海中有火洲洲上有諸薄國國中有馬洲復東行漲海千餘里至自然火洲其上有草生火中洲左近人剥取其皮紡績作布以為手巾與蕉麻無異而色微青黑若小垢洿則投火中復更精潔或作燈炷用之不知盡頓遜國在林邑西南海﨑上地方千里城去海十里有五王並覊屬扶南土地洿下而平博氣候風俗大較與林邑同東界通交州諸賈人其西界接天竺安息徼外諸國往還交易其市東西交㑹日有萬餘人珍物寶貨無所不有又有酒樹以安石榴采其花汁貯瓮中數日成酒可飲眞臘國在林邑西南本扶南之屬國習俗文字與婆羅門同居處噐物頗類赤土以右手為浄左手為穢毎旦澡洗以楊枝淨齒讀誦經呪又噪灑乃食食罷還用楊枝淨齒又讀經呪食多蘇酪砂糖粇粟米餅欲食之時先取雜肉羮與餅相和手擩而食娶妻者惟送衣一具擇日遣媒人迎婦男女二家各八日不出晝夜燃燈不息男婚禮畢即與父母分財别居父母死小兒未婚者以餘財與之若婚畢財物入官其葬男女皆七日不食剔髪而哭僧尼道士親故皆來聚㑹音樂送之以五香木燒屍收灰以金銀瓶盛送於大水之中貧者或用瓦而以彩色畫之亦有不焚送屍山中任野獸食者其北多山阜南有水澤地氣尤熱無霜雪饒瘴癘毒䖝土宜梁稻少黍粟果菜與日南九眞相類異者有婆郍娑樹無花葉似柿實似冬𤓰菴羅樹花葉似棗實似李毗野樹花似木𤓰葉似杏實似楮婆田羅樹花葉實並似棗而小異歌畢佗樹花似林檎葉似榆而厚大實似李其大如升自餘多同九眞海中有魚名建同四足無鱗其鼻如象吸水上噴高五六十尺有浮胡魚其形似䱇觜如鸚鵡有八足多大魚半身出水望之如山毎五六月中毒氣流行即以白猪白牛白羊於城西門外祠之不然者五穀不登六畜多死人衆疾疫近都有陵伽鉢婆山上有神祠毎以兵二千人守衛之城東有神名婆多利祭用人肉其王年别殺人以夜祀禱亦以守衛者十人其敬鬼如此多奉佛法尤信道士佛及道士並立像於舘非王正妻子不得為嗣王初立之日所有兄弟並刑殘之或去一指或劓其鼻别處供給不得仕進王三日一聽朝坐五香七寶牀上施寶帳其帳以文木為竿象牙金鈿為壁狀如小屋懸金光焰有同於赤土前有金香爐二人侍側王着朝霞古貝瞞絡腰腹下垂至脛頭戴金寶花冠被其珠纓絡足履革屣耳懸金璫身服白疊以象牙為屩若露髪則不加纓絡臣人服製大抵相類其俗東向開戸以東為上有戰象五十頭尤好者許以飯肉與隣國戰則象隊在前於背上以木作樓上有四人皆持弓箭訶陵國在眞臘之南其王所居竪木為城造大屋重閣覆以㯶櫚皮王所坐之牀悉以象牙為之亦以象牙為席食不用匙箸以手撮之以椰樹花為酒飲之亦得醉有山穴毎涌而出鹽國人取之以食其國别有毒女人與常人同止宿即令人身上生瘡與之交㑹即致死若涎液霑着草木即枯其人身死不臭亦不爛册府元龜卷九百五十九
