body:
  text: 册府元龜卷八百五十六宋王欽若等撰總録部知音傳曰惟君子為能知音樂是故審聲以知音審音以知樂審樂以知政至哉知音之為難矣非夫天機朗悟識理𤣥契窮本知末探􅄨索隱叅扵象數之表宜乎神化之運又曷能經物造端制器垂範明治亂於未兆表吉凶於先見洞達其節奏深究扵義趣紬繹以極其妙演暢以攄其變俾夫成文而恊律和聲而盡善播於樂府紀於人聽者焉蓋仲尼有言曰樂云樂云鐘鼓云乎哉乃知夫審音者非特鏗鏘擊拊之謂矣黄帝使伶倫自大夏之西大夏西戎之國也崑崙之隂取竹於解谷崑崙上北谷名也生其竅厚均者竹孔與肉薄取谷中之竹生而肉孔外肉厚薄自然均者截以為筩不復加削刮也㫁兩節間而吹之以為黄鐘之宫黄鐘之宫律之最長也制十二筩以聽鳯之鳴其雄鳴六雌鳴亦六比黄鐘之宫而皆可以生之是為律本比合也可以生之謂上下相生也故謂之律本至治之世天地之氣合而生風天地之風氣正十二律定律得風氣以成聲風和乃律調也風氣正則十二月之氣各應其律不失其序一曰黄帝使伶倫伐竹扵昆谿斬而作笛吹之作鳯鳴泠州鳩周景王時樂官王將鑄無射無射鐘名律中無射泠州鳩曰王其以心疾死乎夫樂天子之職也職所主也夫音樂之輿也樂因音而行而鐘音之器也音繇器以發天子省風以作樂省風俗作樂以移之器以鍾之鍾聚也以器聚音輿以行之樂須音而行小者不窕窕細而不滿大者不槬槬横大不入則和扵物物和則嘉成嘉樂成也故和聲入於耳而藏扵心心億則樂億安也窕則不成不充滿人心槬則不容心不堪容心是以感感實生疾今鐘槬矣王心弗堪其能乆乎明年王病心師曠晉太師也初衞靈公將之晉至於濮水之上舍夜半聞鼓琴聲問左右皆對曰不聞召師涓曰吾聞鼓琴音問左右皆不聞其狀一似鬼神為我聽而寫之師涓曰諾因端坐援琴聽而寫之明日曰臣得之矣然未習也請宿習之靈公曰可因復宿明日報曰習矣即去之晉見晉平公置酒扵施惠之臺酒酣靈公曰今者來聞新聲請奏之平公曰可即令師涓坐師曠旁援琴鼓之未終師曠撫而止之曰此亡國之聲也不可聽平公曰何道出師曠曰師延所作也延與紂為靡靡之樂武王伐紂師延東走自投濮水之中故聞此聲必扵濮水之上先聞此聲者國削平公曰寡人所好者音也願遂聞之師涓鼓而終之平公曰音無此最悲乎曠曰有平公曰可得聞乎師曠曰君徳義薄不可以聽之平公曰寡人所好者音也願聞之師曠不得已援琴而鼓之一奏之有𤣥鶴二八集乎廊門再奏之延頸而鳴舒翼而舞平公大喜起而為師曠壽反坐問曰音無此最悲乎曠曰有音者黄帝以大合鬼神今君徳義薄不足以聽之聴之將敗平公曰寡人老矣所好者音也願遂聞之師曠不得已援琴而鼓之一奏之有白雲從西北起再奏之大風至而雨隨之飛廊瓦左右皆奔走平公恐懼伏於廊屋之間晉國大旱赤地三年聴者或吉或凶夫樂不可妄興也又楚師伐鄭晉人聞有楚師師曠曰不害吾驟歌北風又歌南風南風不競歌者吹律以詠八風南風一曰微故曰不競也師曠惟歌南北風者聴晉楚之强弱多死聲楚必無功董叔曰天道多在西北歲在豕韋月又建亥歌故曰多在西北南師不時必無功不時謂觸歲月叔向曰在其君徳也言天時地利不如人和後平公鑄為鐘使工聽之皆以為調矣師曠曰不調請更鑄之公曰吾皆為調矣師曠曰後世有知音者知鐘不調也臣竊恥之至於師涓而果知其鐘之不調也季札呉公子聘於魯請觀周樂為歌周南召南曰美哉始基之矣猶未也然勤而不怨歌􅆁􅅠衞曰美哉淵乎憂而不困者也吾聞衞康叔武公之徳如是是其衞風乎歌王曰美哉思而不懼其周之東乎歌鄭曰美哉其細已甚民弗堪也是其先亡乎歌齊曰美哉泱泱乎大風也哉表東海者其太公乎國未可量也歌豳曰美哉蕩蕩乎樂而不淫其周公之東乎歌秦曰此之謂夏聲夫能夏則大大之至也其周之舊乎歌魏曰美哉渢渢乎大而婉險而易行以徳輔此則明主也歌唐曰思深哉其有陶唐氏之遺民乎不然何憂之逺也非令徳之後誰能若是歌陳曰國無主其能乆乎自鄶以下無譏焉歌小雅曰美哉思而不貳怨而不言其周徳之衰乎猶有先王之遺民也歌大雅曰廣哉熈熈乎曲而有直體其文王之徳乎歌頌曰至矣哉直而不倨曲而不詘邇而不偪遠而不㩦遷而不淫復而不厭哀而不愁樂而不荒用而不匱廣而不宣施而不費取而不貪處而不底行而不流五聲和八風平節有度守有序盛徳之所同也見舞象箾南籥者曰美哉猶有憾見舞大武者曰美哉周之盛也其若此乎見舞韶濩者曰聖人之𢎞也猶有慙徳聖人之難也見舞大夏者曰美哉勤而不徳非禹其誰能修之見舞韶箾者曰徳至矣哉大矣如天之無不幬也如地之無不載也雖甚盛徳其蔑以加於此矣若有他樂吾不敢請也周用六代之樂堯曰咸池黄帝曰雲門魯受四代下周二等故不舞其二季札知之故曰有他樂吾不敢請鍾子期夜聞擊磬聲者而悲且召問之曰何哉子之擊磬若此之悲也對曰臣之父殺人而不得臣之母得而為公家𨽻臣得而為公家擊磬臣不睹臣之母三年扵此矣昨日為舍市而睹之意欲贖之無財身又公家之有也是以悲也鍾子期曰悲在心非手也非木非石也悲於心而木石應之以至誠故也孔子語魯太師樂曰樂其可知也始作翕如也從之純如也繳如也繹如也以成子謂韶盡美矣又盡善也謂武盡美矣未盡善也子在齊聞韶三月不知肉味曰不圖為樂之至於斯也孔子擊磬有荷蕢而過門者曰有心哉撃磬乎硜硜乎莫已知也斯已而已矣孔子學鼓琴師襄子十日不進師襄子曰可以益矣孔子曰丘已習其曲矣未得其數也有間曰已習其數可以益矣孔子曰丘未得其志也有間曰已習其志可以益矣孔子曰丘未得其為人也有間曰有所穆然而深思焉有所怡然高望而逺志焉曰丘得其為人黯然而黑黯黒貌頎然而長詩云頎而長兮眼如望羊望視也如王四國非文王其誰能為此也師襄子避席再拜曰師蓋云文王操賓牟賈侍坐於孔子孔子與之言及樂曰夫武之備戒之已乆何也對曰病不得其衆也武謂周舞也備戒擊鼓驚衆病猶憂也以不得衆心為憂憂其難也詠歎之淫液之何也對曰恐不逮事也詠歎淫液歌遲之也逮及也事伐事也發揚蹈厲之已蚤何也對曰及時事也時至武事當施也武坐致右憲左何也對曰非武坐也言武之事無坐也致謂􅀈至地也憲讀曰軒聲淫及商何也對曰非武音也言武歌在正其軍不貪商也時人或說其義為貪商也子曰若非武音則何音也對曰有司失其傳也如非有司失其傳則武王之志荒矣有司典樂者也傳猶說也荒老耄也言典樂者失其說也而時人安說也書曰王耄荒子曰唯丘之聞諸萇𢎞亦若吾子之言是也萇𢎞周大夫賔牟賈起免席而請曰夫武之備戒之已乆則既聞命矣敢問遲之遲而又乆何也遲之遲謂乆立於綴子曰居吾語女夫樂者象成者也揔干而山立武王之事也發揚蹈厲太公之志也武亂皆坐周召之治也居猶安坐也㧾干持盾也山立猶正立也象武王持盾正立待諸侯也且夫武始而北出再成而滅商三成而南四成而南國是疆五成而分陜周公左召公右六成復綴以崇天子成猶奏也毎奏武曲一終為一成始奏象觀兵盟津時也再奏象克殷時也三奏象克殷有餘力而反也四奏象南方荆蠻之國侵畔者服也五奏象周公召公分職而治也六奏象兵還振旅也復綴反位止也崇充也凡六奏以充武樂也夾振之而駟伐盛振威於中國也夾振之者王與大將夾舞者振鐸以為節也毎奏四伐一擊一刺為一伐牧誓曰今日之事不過四伐五伐分夾而進事蚤濟也分猶部曲也事猶為也濟成也舞者各有部曲之列又夾振之者象用兵務扵是成也乆立於綴以待諸侯之至也象武王伐紂待諸侯也且女獨未聞牧野之語乎欲以語作武樂之意武王克殷反商未及下車而封黄帝之後於薊封帝堯之後扵祝封帝舜之後於陳下車而封夏后氏之後於杞殷之後於宋封王子比干之墓釋箕子之囚使之行商容而復其位庻民弛政庻士倍禄濟河而西馬㪚之華山之陽而弗復乗牛㪚之桃林之野而弗復服車甲衅而藏之府庫而弗復用倒載干戈包之以虎皮將帥之士使為諸侯名之曰建櫜然後天下知武王之不復用兵也㪚軍而郊射左射貍首右射騶虞而貫革之射息也裨冕搢笏而虎賁之士脫劍也祀乎明堂而民知孝朝覲然後諸侯知所以臣耕藉然後諸侯知所以敬五者天下之大教也郊射謂射宫於郊也左東學也右西學也貍首騶虞以所歌為節也貫革射穿甲革也裨冕衣裨衣而冠冕也裨衣衮之屬搢猶挿也賁憤怒也文王之廟為明堂制耕藉藉田者也食三老五更扵太學天子袒而割牲執醬而饋執爵而酳冕而縂干所以教諸侯之悌也三老五更互言之爾皆老人更知三徳五事者也冕而揔干親在舞位也周之太學曰東膠若此則周道四達禮樂交通則夫武之遲乆不亦宜乎言武遲乆為重禮樂子路鼓瑟有北鄙之聲孔子聞之曰信矣由之不才也冉有侍孔子曰求來爾不謂由夫先王之制音也奏中聲為中節彼小人則不然執末而論本務剛以為基故其音湫厲而㣲末以象殺伐之氣夫殺者乃亂亡之風也冉有以告子路子路曰由之罪也後果不得其死焉師摯之始闗雎之亂洋洋乎盈耳哉魯太師摯識闗雎之聲而首理其亂者洋洋乎盈耳聴而美之也師乙魯樂官也子貢見師乙而問焉曰賜聞聲歌各有宜也如賜者宜何歌也師乙曰乙賤工也何足以問所宜請誦其所聞而吾子自執焉寛而静柔而正者宜歌頌廣大而靜疏達而信者宜歌大雅㳟儉而好禮者宜歌小雅正直而清廉而謙者宜歌風肆直而慈愛者宜歌商温良而能㫁者宜歌齊夫歌者直已而陳徳也動已而天地應焉四時和焉星辰理焉萬物育焉故商者五帝之遺聲也商人識之故謂之商齊者三代之遺聲也齊人識之故謂之齊明乎商之音者臨事而屢㫁明乎齊之音者見利而讓屢數也數㫁事以其肆能直也見利而讓以其温良能㫁也㫁猶决也臨事而屢㫁勇也見利而讓義也有勇有義非歌孰能保此保猶安也執也故歌者上如抗下如墜曲如折止如藁本倨中矩句中鈎纍纍乎端如貫珠言歌聲之著動人心之審宜有此事故歌之為言也長言之也說之故言之言之不足故長言之長言之不足故嗟歎之嗟歎之不足故不知手之舞之足之蹈之也長言之引其聲也嗟歎和續之也不知手之舞之足之蹈之歎之至也鄒忌以鼓琴見齊威王威王悅而舍之右室須臾王自鼓琴鄒忌推戸入曰善哉鼓琴也王勃然不悅去琴按劍曰夫子見容未察何以知其善也忌曰大絃濁以温小絃廉折以清攫之深而釋之舒均諧以鳴大小相益回邪而不相害是以知其善忌曰不獨語音夫治國家弭人民皆在其中又何為絲桐之間忌曰大絃急以温者君也小絃廉折以清者相也攫之深釋之舒者刑罰審也均諧以鳴者政令一也大小相益回邪而不相害者上下和鳴吏民相親也夫復而不亂者所以治昌也連而徑者所以存亡也故曰琴音調而天下治夫治國家弭人民無若乎五音者矣王曰善忌見三月而受相印雍門周以琴見孟嘗君孟嘗君曰先生鼓琴亦能令我悲乎周曰臣烏能令足下悲哉所能令悲者先貴而後賤先富而後貧不若身才高妙適遭暴亂不若處之隠絶不及四鄰屈折擯壓無所告訴臣一為之徵操援琴則涕零矣今足下千乗之君廣厦􅃉房下羅帷來清風揚激楚舞鄭妾麗色淫目流聲娯耳水逰則連方舟載羽旗野逰則獵平原馳廣囿入則撞鐘撃鼓乎深宫之中雖有善琴者固未能使足下悲也然臣所謂足下悲者一也千秋萬歲之後宗廟必不血食高臺既已壊曲池既已壍墳墓既已平嬰兒豎子採樵者躑躅其足而歌其上曰未知孟嘗君尊貴乃若是乎扵是孟嘗君泣焉垂臉周引琴而鼓之徐動宫徵叩羽角孟嘗君泣涕増哀下而就之曰聞先生鼓琴文乃破國亡邑之人也高漸離燕之善擊筑者荆軻刺秦王不中死秦逐太子丹荆軻之客皆亡漸離變名姓為人傭保匿作扵宋子縣名也今屬鉅鹿乆之作苦聞其家堂上客擊筑徬徨不能去每出言曰彼有善有不善從者以告其主曰彼傭乃知音竊言是非家丈人召使前撃筑一坐稱善賜酒而高漸離念久隐畏約無窮時乃退出其裝匣中筑與其善衣更容貌而前舉坐客皆驚下與抗禮以為上客使撃筑而歌客無不流涕而去者宋子𫝊客之互以為客聞扵秦始皇始皇召見人有識者乃曰高漸離也秦始皇惜其善撃筑重赦之乃矐其目使撃筑未嘗不稱善稍益近之高漸離乃以鉛置筑中復進得近舉筑扑秦始皇不中於是遂誅高漸離終身不復近諸侯之人漢制氏以雅樂聲律世世在大樂官能紀其鏗鏘鼓舞李延年善歌為新樂聲是時武帝方興天地祠欲造樂令司馬相如等作詩頌延年輙承意絃歌所造詩為之新聲曲延年繇是命為恊律都尉候調武帝時樂人帝使調作箜篌以祠太乙或云侯暉所作其聲坎坎應節謂之坎侯聲訛為箜篌者因工人姓爾趙定勃海人宣帝神爵五鳯之間數有嘉應帝頗作歌詩欲興恊律之事丞相魏相奏言知音善鼓雅琴者定與梁國龍徳皆召見待詔京房好鐘律知聲音房本姓李推律自定為京氏官至魏郡太守後漢桓譚父成帝時為太樂令譚以父任為郎因好音律善鼓琴劉昆能彈雅琴知清角之操嘗為騎都尉馬融善鼓琴好吹笛位至議郎蔡邕為左中郎將好操音律坐事亡命在呉謂呉人曰吾昔嘗經㑹稽高遷亭見屋椽竹東間第十六可以為笛取用果有異聲又呉人有燒桐以爨者邕聞火烈之聲知其良木因請而製為琴果有美音而其尾猶焦故時人因名曰焦尾琴焉初邕在陳留也其鄰人有以酒食召邕者比往而主以酣焉客有彈琴於屏邕至門試潛聴之曰憘以樂召我而有殺心何也遂反將命者告主人曰蔡君向来至門而去邕素為郷邦所宗主人遽自追而問其故邕具以告莫不撫然彈琴者曰我向鼓琴見螳蜋方向鳴蟬蟬將去而未飛螳蜋為之一前一卻吾心聳然惟恐螳蜋之失也此豈為殺心而形扵聲者乎邕筦然而笑曰此足以當之矣邕志沈審志好琴道以嘉平元年入清溪訪鬼谷先生所居山五曲曲有幽居靈跡每一曲制一弄三年曲成遂出呈於馬融王允董卓等見而異之魏阮瑀字元瑜太祖雖雅聞其名辟之不應連見偪促乃逃入山中太祖使人焚山得瑀送至召入太祖時征長安大延賓客怒瑀不與語使就技人列瑀善觧音能鼓琴遂撫絃而歌因作歌曲曰奕奕天門開大魏應期運青蓋巡九州在東西人怨士為知巳死女為悅已玩恩義茍敷暢他人焉能亂為曲既捷音聲殊妙當時冠坐太祖大悅杜䕫河南人以知音為雅樂郎漢末以世亂奔荆州荆州牧劉表令與孟曜為漢主合雅樂樂備表欲庭觀之䕫諫曰今將軍號不為天子合樂而庭作之無乃不可乎表納其言而止後表子琮降太祖太祖以䕫為軍謀祭酒參大樂事因令創制雅樂䕫善鐘律聰慧過人絲竹八音靡所不能惟歌舞非所長時㪚郎鄧靜尹齋善詠雅樂歌師尹胡能歌宗廟郊祀之曲舞師馮肅服養曉知先代諸舞䕫總綂研精逺考諸經近采故事教習講肄備作樂器詔復先代古樂皆自䕫始也黄初中為太樂令協律都尉鑄鐘工柴玉巧有意思形器之中多所造作亦為當時貴人見知䕫令玉鑄銅其聲均清濁多不如法數毁改作玉甚厭之反謂䕫清濁任意頗拒捍䕫䕫玉更相白扵太祖太祖取所鑄鐘雜作更試然其知䕫為精而玉之妄也扵是罪玉及諸子皆為養馬士文帝愛待玉又嘗令䕫與左願等於賓客之中吹笙鼓琴䕫有難色繇是帝意不悅後以他事擊䕫使願等就學䕫自謂所習者非雅仕宦有本意猶不滿遂黜免以卒弟子河南邵登張泰馥各至大樂丞下邳陳禎司律中郎將自左延年等雖妙於音咸善鄭聲其好古從正莫及䕫荀惲為虎賁中郎將與賈充共定音律呉周瑜精音樂三爵之後其有闕誤瑜必知之而顧呉人謠曰曲有誤周郎顧位至偏將軍晉孫氏善歌舊曲宋識善撃節唱和陳左善清歌列和善吹笛赤素善彈箏宋生善琵琶尤發新聲竝魏晉之世人也傅𤣥曰人若欽所聞而忽所見不亦惑乎設此六人生於上世越古今而無儷何但䕫牙同契哉自兹以後皆孫朱等之遺則也荀朂為光禄大夫既掌樂事又脩律呂竝行扵世初朂於路逢趙賈人牛鐸識其聲及掌樂音韻未調乃曰得牛之牛鐸則諧矣遂下郡國悉送牛鐸果得諧者又作新律笛十二枚以調律呂正雅樂正㑹殿庭作之自謂宫商克諧然論者猶謂朂暗觧時阮咸妙達八音論者謂神觧咸嘗心譏朂新律聲高以為高近哀思不合中和每公㑹樂作朂意咸謂之不調以為異已乃出咸為始平相後有田父耕於野得周時玉尺朂以較已所治鐘鼓金石絲竹皆短較一米扵此伏咸之妙復徵咸歸朂既以新律造二舞次更脩正鐘聲㑹朂薨未竟其業元康三年詔其子藩脩定金石以施郊廟尋值喪亂莫有記之者朂子藩字大堅元康中為黄門侍郎受詔成父所治鐘聲藩子䆳字道𤣥亦觧音樂位至尚書阮咸字仲容為始平太守妙觧音律善彈琵琶雖處世不交人事惟共親知絃歌酣宴而已荀朂每與咸論音律自以為逺不及也咸善奏琵琶而項長過於今制列十有三柱武太后時蜀人蒯郎於古墓中得中晉竹林七賢圖阮咸所彈與此類同謂之阮咸郎初得銅者時有識之太常少卿元行冲曰阮咸所造乃令匠人改以木為之其音甚清雅也稽康為中㪚大夫彈琴詠詩自足扵懐將刑東市顧視日影索琴彈之曰昔袁孝尼嘗從吾學廣陵㪚吾每靳固之廣陵㪚於今絶矣時年四十海内人士莫不痛惜帝尋悟而思之石崇字季倫善彈琵琶位至衞尉成公綏字子安好音律嘗當暑承風而嘯冷然成曲因為嘯賦位至中書郎阮瞻字千里善彈琴人聞其能多往求聽不問貴賤長㓜皆為彈之神氣冲和而不知向人所在内兄潘岳每令鼓琴終日逹夜無忤色由是識者歎其恬淡不可榮辱矣位至太子舍人謝鯤字㓜輿能歌善鼓琴王衍稽紹並竒之為王敦大將軍長吏紀瞻觧音律殆盡其妙位至㪚騎常侍驃騎將軍桓伊為西中郎將豫州刺使以與謝𤣥俱破苻堅功封永新縣侯進號江將軍伊善音樂盡一時之妙為江右第一得蔡邕柯亭笛嘗自吹之王徽之赴召京師泊舟清溪側素不與徽之相識伊於岸上過舡中客稱伊小字曰此桓野王也徽之便令人謂伊曰聞君善吹笛試為我一奏伊是時已貴顯素聞徽之名便下車踞胡床為作三調弄畢便上車去客主不交一言時謝安女壻王國寳専利無簡安惡其為人每抑制之孝武末年嗜酒好内於是國寳讒諛之計稍行而好利險詖之徒以安功名盛極而搆㑹之嫌隙遂成帝召伊飲宴安侍坐帝命伊吹笛伊神色無忤即吹為一弄乃放笛云臣扵箏分乃不及笛然自足以韻合歌管請以箏歌并請一吹笛人帝善其調達乃勅御妓奏笛伊又云御府人於臣必自不合臣有一奴善相使串帝稱賞其放率乃許召之奴既吹笛伊撫箏而歌怨詩曰為君既不易為臣良獨難忠信事不顯乃有見疑患周旦佐文武金縢功不刋推心輔王政二叔反流言聲節慷慨俯仰可觀安泣下沾襟乃越席而就之捋其鬚曰使君扵此不凡帝甚有愧色位至䕶軍將軍戴逵字安道譙國人少有文藝善鼓琴太宰武陵王晞聞其能琴使人召焉逵對使者前破琴曰戴安道不為王門伶人晞怒乃更引其兄述述樂聞命欣然操琴而往逵不樂當世以琴書為娯義熈初以㪚騎侍郎徵不起尋卒袁山松善音樂舊歌有行路難曲辭頗踈質山松乃文其辭句婉其節制因錯歌之聞者流淚位至呉郡太守姚邕字子和姚興之弟封濟南公尤善音樂皆能度其盈虚為改曲調世咸傳之號濟南新詞册府元龜卷八百五十六
