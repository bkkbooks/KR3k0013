body:
  text: 册府元龜卷二百四十七宋王欽若等撰列國君部盟㑹第二襄公二十年春及莒平孟荘子㑹莒人盟于向督揚之盟故也莒數伐魯前年諸侯盟督揚以和解之故二國自復共盟結其好六月公㑹晋侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子盟于澶淵澶淵在頓丘縣南今名繁汙此衛地又近戚田齊成故也齊與晉平二十一年十月公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子于商任商任地名錮欒氏也禁錮欒盈使諸侯不得受二十二年冬公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于沙隨復錮欒氏也晋知欒盈在齊故復錮也二十四年八月公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀将以伐齊水不克晋合諸侯以報前年見伐二十五年五月公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀伐齊以報朝歌之役朝歌役在二十三年秦晉為成晋韓起如秦涖盟秦伯車如晉涖盟伯車秦伯之弟鍼也成而不結不結固也八月諸侯同盟于重丘夷儀之諸侯也重丘齊地齊成故也伐齊而稱同盟以明齊亦同盟二十六年夏公㑹晉人鄭良霄宋人曹人于澶淵卿㑹公侯皆應貶方責宋向戌後期故書良霄以駁之若皆稱人則嫌向戌直以㑹公貶之以討衛疆戚田正戚之封疆取衛西鄙懿氏六十以與孫氏戚城西北五十里有懿城因姓以名城取田六十井趙氏不書尊公也罪武㑹公侯向戌不書後也後㑹期鄭先宋不失所也如期至於是衛侯㑹之晋将執之不得與㑹故不書二十七年夏叔孫豹㑹晉趙武楚屈建蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人于宋按傳㑹者十四國齊秦不交相見邾滕為私屬皆不與盟宋為主人地于宋則與盟可知經唯序九國大夫楚先晋歃而書先晋貴信也陳與晋㑹常在衛上孔奐非上卿故在石惡下宋向戌善於趙文子又善於令尹子木欲弭諸侯之兵以為名欲獲息民之名如晉告趙孟趙孟謀於諸大夫韓宣子曰兵民之殘也財用之蠧蠧害物之蟲小國之大菑也将或弭之雖曰不可必將許之言雖知兵不得久弭今不可不許弗許楚將許之以召諸侯則我失為盟主矣晉人許之如楚楚亦許之如齊齊人難之陳文子曰晉楚許之我焉得已且人曰弭兵而我弗許則固擕吾民矣将焉用之齊人許之告於秦秦亦許之皆告於小國為㑹於宋五月甲辰晉趙武至於宋丙午鄭良霄至六月丁未朔宋人享趙文子叔向為介司馬置折爼禮也折爼體解節折升之於爼合卿享宴之禮故曰禮也周禮司馬掌㑹同之事仲尼使舉是禮也以為多文辭宋向戌自美弭兵之意敬逆趙武趙武叔向因享宴之㑹展賓主之辭故仲尼以為多文辭戊申叔孫豹齊慶封陳湏無衛石惡至湏無陳文子甲寅晉荀盈從趙武至趙武命盈追已故言從趙武後武遣盈如楚丙辰邾悼公至小國故君自來壬戌楚公子黑肱先至成言於晋時令尹子木止陳遣黑肱就晋大夫成盟載之言兩相然可丁卯宋向戌如陳從子木成言於楚就於陳成楚之要言戊戌滕成公至亦小國君自來子木謂向戌請晉楚之從交相見也使諸侯從晉楚者更相朝見庚午向戌復於趙孟趙孟曰晉楚齊秦匹也晉之不能於齊猶楚之不能於秦也不能服而使之楚君若能使秦君辱於敝邑寡君敢不固請於齊請齊使朝楚壬申左師復言於子木子木使驛謁諸王驛傳也謁告也王曰釋齊秦他國請相見也經所以不書齊秦秋七月戊寅左師至從使還是夜也趙孟及子晳盟以齊言子晳公子黒肱素要齊其辭至盟時不得復訟爭庚辰子木至自陳陳孔奐蔡公孫歸生至二國大夫與子木俱至曹許之大夫皆至以藩為軍示不相忌晉楚各處其偏晋處北楚處南伯夙謂趙孟伯夙荀盈曰楚氛甚惡懼難氛氣也言楚有襲晋之氣趙孟曰吾左還入於宋若我何營在宋北東頭為上故晋營在東有急可左囘入宋東門辛巳將盟於宋西門之外楚人𠂻甲甲在衣中欲因㑹擊晋伯州犂曰合諸侯之師以為不信無乃不可乎夫諸侯望信於楚是以來服若不信是棄其所以服諸侯也固請釋甲子木曰晉楚無信久矣事利而已茍得志焉焉用有信太宰退太宰伯州犂告人曰令尹將死矣不及三年求逞志而棄信志将逞乎志以發言言以出信信以立志參以定之志言信三者具而後身安信亡何以及三為明年子木死起本趙孟患楚衷甲以告叔向叔向曰何害也匹夫一為不信猶不可單斃其死單盡也斃踣也若合諸侯之卿以為不信必不㨗矣食言者不病不病者單斃於死非子之患也楚食言當死晋不食言故無患夫以信召人而以僭濟之濟成也必莫之與也安能害我且吾因宋以守病為楚所病則欲入宋城則夫能致死與宋致死雖倍楚可也宋為地主致死助我則力可倍楚子何懼焉又不及是曰弭兵以召諸侯而稱兵以害我稱舉也吾庸多矣非所患也晉獨取信故其功多季武子使謂叔孫以公命曰視邾滕兩事晉楚則貢賦重故欲比小國武子恐叔孫不從其言故假公命以敦之既而齊人請邾宋人請滕皆不與盟私屬二國故叔孫曰邾滕人私也我列國也何故視之宋衛吾匹也乃盟故不書其族言違命也季孫專政於國魯君非得有命今君惟以此命告豹豹宜崇大順以顯弱命之君而遂其小是故貶之晉楚爭先争先歃血晉人曰晋固為諸侯盟主未有先晉者也楚人曰子言晉楚匹也若晉常先是楚弱也且晉楚狎主諸侯之盟也久矣狎更也豈專在晉叔向謂趙孟曰諸侯歸晉之徳只只辭非歸其尸盟也尸主子務徳無爭先且諸侯盟小國固必有尸盟者小國主辨具楚為晉細不亦可乎欲推使楚主盟乃先楚人書先晉晉有信也蓋孔子追正之乙酉宋公及諸侯之大夫盟于蒙門之外前盟諸大夫不敢敵公禮也今宋公以近在其國故謙而重盟故不書蒙門宋城門也子木問於趙孟曰范武子之徳何如士㑹賢聞於諸侯故問之對曰夫子之家事治言於晉國無隱情其祝史陳信於鬼神無愧辭祝陳馨香徳足副之故不愧子木歸以語王王曰尚矣哉尚上也能歆神人歆享也使神享其祭人懐其徳宜其光輔五君以為盟主也五君謂文襄靈成景子木又語王曰宜晉之伯也有叔向以佐其卿楚無以當之不可與争晋荀盈遂如楚蒞盟七月辛巳叔孫豹及諸侯之大夫盟于宋夏㑹之大夫也豹不倚順以顯弱命之君而辨小是以自從故以違命而貶之釋例論之甚備矣九月楚薳罷如晉蒞盟罷令尹子蕩報荀盈二十八年夏齊侯陳侯蔡侯北燕伯杞伯胡子沈子白狄朝于晉宋之盟故也陳侯蔡侯胡子沈子楚属也宋盟曰晋楚之從交相見故朝晉燕國今薊縣齊侯将行慶封曰我不與盟何為於晉以宋盟釋齊秦陳文子曰先事後賄禮也事大國當先從其政事而後薦賄以副己心小事大未獲事焉從之如志禮也言當從大國請事以順其志雖不與盟敢叛晉乎重丘之盟未可忘也子其勸行重丘盟在二十五年九月鄭㳺吉如晉告將朝于楚以從宋之盟二十九年五月仲孫羯㑹晉荀盈齊髙止宋華定衛世叔儀鄭公孫段曹人莒人滕人薛人小邾人城杞公孫段伯石也三十年伯有死乃命為卿今蓋欇行卿事杞子來盟文公也杞復稱子用夷禮也魯歸其田故來盟三十年十月晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人杞人小邾人㑹于澶淵宋災故也㑹未有言其事者此言宋災故以惡宋人不克己自責而出㑹求財諸侯之大夫㑹以謀歸宋財昭公元年正月叔孫豹㑹晉趙武楚公子圍齊國弱宋向戌衛齊惡陳公子招蔡公孫歸生鄭罕虎許人曹人于虢招實陳侯母弟不稱弟者義與荘二十五年公子友同今讀舊書則楚當先晉而先書趙武者亦取宋盟貴武之信故尚之也衛在陳蔡上先至於㑹尋宋之盟也宋盟在襄二十七年祁午謂趙文子曰宋之盟楚人得志於晉得志謂先歃午祁奚子今令尹之不信諸侯之所聞也子弗戒懼又如宋恐楚復得志子木之信稱於諸侯猶詐晉而駕焉駕猶陵也詐謂𠂻甲况不信之尤者乎尤甚也楚重得志於晉晉之耻也子相晉國以為盟主於今七年矣襄二十五年始為政以春言故云七年再合諸侯襄二十五年㑹夷儀二十六年㑹澶淵三合大夫襄二十七年㑹于宋三十年㑹澶淵及今㑹虢也服齊狄寜東夏襄二十八年齊侯白狄朝晋平秦亂襄二十六年秦晉為成城淳于襄二十九年城杞之淳于杞遷都師徒不頓國家不罷民無謗讟讟誹也諸侯無怨天無大災子之力也有令名矣而終之以耻午也是懼吾子其不可以不戒文子曰武受賜矣受午言然宋之盟子木有禍人之心武有仁人之心是楚所以駕於晉也今武猶是心也楚又行僭僭不信非所害也武将信以為本循而行之譬如農夫是穮是蓘穮耘也壅苖為􅀈雖有饑饉必有豐年言耕鋤不以水旱息必獲豐年之收且吾聞之能信不為人下吾未能也自恐未能信也詩曰不僭不賊鮮不為則信也詩大雅僭不信賊害人也能為人則者不為人下矣吾不能是難楚不為患楚令尹圍請用牲讀舊書加于牲上而已舊書宋之盟楚恐晋先歃故欲從舊書加于牲上不㰱血經所以不書盟晉人許之三月甲辰盟四年六月楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷㑹于申楚靈王始合諸侯椒舉言於楚子曰臣聞諸侯無歸禮以為歸今君始得諸侯其慎禮矣覇之濟否在此㑹也夏啓有鈞臺之享啓禹子也河南陽翟縣南有鈞臺陂蓋啓享諸侯於此商湯有景亳之命河南鞏縣西南有湯亭或言亳即偃師周武有孟津之誓将伐紂也成有岐陽之蒐周成王歸自奄大蒐於岐山之陽岐山在扶風美陽縣西北康有鄷宫之朝鄷在始平鄠縣東有靈臺康王於是朝諸侯穆有塗山之㑹周穆王㑹諸侯于塗山塗山在壽春東北齊桓有召陵之師在僖四年晉文有踐土之盟在僖二十八年君其何用宋向戌鄭公孫僑在諸侯之良也君其選焉選擇所用王曰吾用齊桓用㑹召陵之禮王使問禮於左師與子産左師曰小國習之大國用之敢不薦聞言聽聞謙示所未行獻公合諸侯之禮六其禮六儀也宋國爵公故獻公禮子産曰小國共職敢不薦守獻伯子男㑹公之禮六鄭爵伯故獻伯子男㑹公之禮其禮同所從言之異君子謂合左師善守先代子産善相小國王使椒舉侍於後以規過規正二子之過卒事不規王問其故對曰禮吾所未見者有六焉又何以規左師子産所獻六禮楚皆未嘗行宋太子佐後至王田於武城乆而弗見椒舉請辭焉請王辭謝之王使徃曰屬有宗祧之事於武城言為宗廟田獵寡君将墮幣焉敢謝後見恨其後至故曰将因諸侯㑹布幣乃相見經并書宋太子佐知此言在㑹前徐子呉出也以為貳焉故執諸申言楚子以疑罪執諸侯楚子示諸侯侈自奢侈椒舉曰夫六王二公之事六王啓湯武成康穆也二公齊桓晋文皆所以示諸侯禮也諸侯所繇用命也夏桀為仍之㑹有緡叛之仍緍皆國名商紂為黎之蒐東夷叛之黎東夷國名周幽為大室之盟戎狄叛之大室中嶽皆所以示諸侯汰也諸侯所繇棄命也今君以汰無乃不濟乎王弗聽子産見左師曰吾不患楚矣汰而愎諫愎狠也不過十年左師曰然不十年侈其惡不逺逺惡而後棄惡及逺則人棄善亦如之徳逺而後興為十三年楚弑其君傳六年十二月齊侯伐北燕七年正月癸巳燕人行成曰敝邑知罪敢不聽命先君之敝器請以謝罪敝噐瑶罋玉櫝之屬公孫晢曰受服而退俟釁而動可也晳齊大夫二月戊午盟于濡上濡水出高陽縣東北至河間鄭縣入易水燕人歸燕姬嫁女與齊侯賂以瑶罋玉櫝斚耳不克而還瑶玉也櫝匱也斝耳玉爵也三月公如楚叔孫婼如齊涖盟公將逺適楚故叔孫如齊尋舊好九年春叔弓宋華亥鄭㳺吉衛趙黶㑹楚子于陳楚子在陳故四國大夫徃非盟主所召不行會禮故不摠書十一年五月仲孫貜㑹邾子盟于祲祥祲祥地名修好禮也秋季孫意如㑹晋韓起齊國弱宋華亥衛北宫佗鄭罕虎曹人杞人于厥憖厥憖地名謀救蔡也十有三年秋公㑹劉子晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于平丘平丘在陳留長垣縣西南晉治兵於邾南甲車四千乗三十萬人羊舌鮒攝司馬鮒叔向弟也攝兼官遂合諸侯于平丘晉人将尋盟齊人不可有二心故晋侯使叔向告劉獻公獻公王卿士劉子曰抑齊人不盟若之何對曰盟以底信底致也君茍有信諸侯不貳何患焉告之以文辭董之以武師雖齊不許君庸多矣董督也庸功也討之有辭故功多也天子之老請帥王賦元戎十乗以先啓行天子大夫稱老元戎車在前者啓開也行道也遲速唯君欲佐晋討齊叔向告于齊曰諸侯求盟已在此矣今君弗利寡君以為請對曰諸侯討貳則有尋盟若皆用命何盟之尋託用命以拒晋叔向曰國家之敗有事而無業事則不經業貢賦之業有業而無禮經則不序湏禮而有次序有禮而無威序則不共禮湏威嚴而後共有威而不昭共則不明威湏昭告神明而後信義著不明棄共百事不終所繇傾覆也信義不明則棄威不威棄禮無禮無經無經無業故百事不成是故明王之制使諸侯歲聘以志業志識也歲聘以脩其職業間朝以講禮三年而一朝正班爵之義率長幼之序再朝而㑹以示威六年而一㑹以訓上下之則制財用之節再㑹而盟以顯昭明十二年而一盟所以昭信義也凡八聘四朝再㑹王一廵狩盟于方嶽之下志業於好聘也講禮於等朝也示威於衆㑹也昭明于神盟也自古以來未之或失也存亡之道恒繇是興晋禮主盟依先王先公舊禮主諸侯盟懼有不治奉承齊犧齊盟之犧牲而布諸君求終事也終竟也君曰余必廢之何齊之有唯君圗之寡君聞命矣齊人懼對曰小國言之大國制之敢不聼從既聞命矣敬共以徃遲速唯君叔向曰諸侯有間矣間隙也不可以不示衆八月辛未治兵習戰建而不斾建立旌旗不曳其斾斾斿也壬申復斾之諸侯畏之軍将戰則斾故曵斾以恐之邾人莒人愬于晉曰魯朝夕伐我㡬亡矣自昭公即位邾魯同好又不朝夕伐莒無故怨愬晉人信之所謂讒慝𢎞多也我之不共魯故之以不共晉貢以魯故也晉侯不見公使叔向來辭曰諸侯将以甲戌盟寡君知不得事君矣請君無勤託謙辭以絕魯子服惠伯對曰君信蠻夷之訴蠻夷謂邾莒以絶兄弟之國棄周公之後亦唯君寡君聞命矣叔向曰寡君有甲車四千乗在雖以無道行之必可畏也况其率道其何敵之有牛雖瘠僨於豚上其畏不死僨仆也南蒯子仲之憂其庸可棄乎棄猶忘也若奉晋之衆用諸侯之師因莒邾杞鄫之怒四國近魯數以小事相忿鄫已滅其民猶存故并以恐魯以討魯罪間其二憂因南蒯子仲之憂為間隙何求而弗克魯人懼聼命不敢與盟甲戌同盟于平丘齊服也令諸侯日中造于除除地為壇盟㑹處癸酉退朝先盟朝晋子産命外僕速張於除張幄幕子大叔止之使待明日及夕子産聞其未張也使速徃乃無所張矣地已滿也言子産每事敏於太叔及盟子産争承承貢賦之次曰昔天子班貢輕重以列列位也列尊貢重周之制也公侯地廣故所貢者多卑而貢重者甸服也甸服謂天子畿内共職貢者鄭伯男也而使從公侯之貢言鄭國在甸服外爵列伯子男不應出公侯之貢懼弗給也敢以為請諸侯靖兵以好為事靖息也行理之命行理使人通聘問者無月不至貢之無藝藝法制小國有闕所以得罪也諸侯脩盟存小國也貢獻無極亡可待也存亡之制将在今矣自日中以爭至于昏晉人許之既盟子大叔咎之曰諸侯若討其可瀆乎瀆易也子産曰晉政多門政不出一家貳偷之不暇何暇討貳不一偷茍且國不競亦陵何國之為不競争則為人所侵陵不成為國公不與盟信邾莒之訴欲討魯故十六年正月齊侯伐徐二月丙申齊師至于蒲隧蒲隧徐地下邳取慮縣東有蒲如陂徐人行成徐子及郯人莒人㑹齊侯盟于蒲隧十九年五月邾人郳人徐人㑹宋公乙亥同盟于蟲終宋公伐邾事二十二年齊侯伐莒莒子行成司馬竈如莒蒞盟竈齊大夫莒子如齊涖盟盟于稷門之外稷門齊城門也莒於是乎大惡其君二十五年春叔孫婼如宋夏叔詣㑹晋趙鞅宋樂大心衛北宫喜鄭㳺吉曹人邾人滕人薛人小邾人于黄父謀王室也王室有子朝亂謀定之二十六年三月公至自齊處于鄆秋公㑹齊侯莒子邾子杞伯盟于鄟陵鄟陵地名謀納公也齊侯謀二十七年春公如齊自鄆行公至自齊居于鄆秋晉士鞅宋樂祁犂衛北宫喜曹人邾人滕人㑹于扈令戍周且謀納公也宋衛皆利納公固請之范獻子取貨於季孫謂司城子梁與北宫貞子子梁宋樂祁也貞子衛北宫喜曰季孫未知其罪而君伐之請囚請亡於是乎不獲君又弗克而自出也夫豈無備而能出君乎季氏之復天救之也復猶安也休公徒之怒休息也而啓叔孫氏之心不然豈其伐人而説甲執氷以㳺叔孫氏懼禍之濫而自同於季氏天之道也魯君守齊三年而無成季氏甚得其民淮夷與之淮夷魯東夷有十年之備有齊楚之援公雖在齊言齊不致力有天之贊有民之助有堅守之心有列國之權而弗敢宣也宣用也事君如在國書公行告公至是也故鞅以為難二子皆圗國者也而欲納魯君鞅之願也請從二子以圍魯無成死之二子懼皆辭乃辭小國而以難復以難納白晋君三十二年冬仲孫何忌㑹晉韓不信齊高張宋仲㡬衛世叔申鄭國參曹人莒人薛人杞人小邾人世叔申世叔儀孫也國參子産之子尋盟尋平丘盟城成周也定公三年冬仲孫何忌及邾子盟于㧞㧞地名脩邾好也公即位故修好四年三月公㑹劉子晉侯宋公蔡侯衛侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯杞伯小邾子齊國夏于召陵侵楚於召陵先行㑹禮入楚境故書侵五月公及諸侯盟于臯鼬召陵㑹劉子諸侯摠言之也繁昌縣東南有城臯亭復稱公者㑹盟異處故也七年四月秋齊侯鄭伯盟于鹹衛地徵㑹于衛徵召也衛侯欲叛晉屬齊鄭也諸大夫不可使北宫結如齊而私於齊侯曰執結以侵我欲以齊師懼諸大夫齊侯從之乃盟于沙叛晋也陽平元城縣東南有沙亭八年夏齊國夏帥師伐我西鄙公㑹晉師于瓦瓦衛地将来救魯公逆㑹之東郡燕縣東北有瓦亭范獻子執羔趙簡子中行文子皆執鴈魯於是始尚羔獻子士鞅也簡子趙鞅也中行文子荀寅也禮卿執羔大夫執鴈魯則同之今始知執羔之尊也卿不書禮不敵公史畧之晉師将盟衛侯于鄟澤自瓦還就衛地盟趙簡子曰群臣誰敢盟衛君者前年衛叛晋屬齊簡子意欲摧辱之渉佗成何曰我能盟之二子晋大夫衛人請執牛耳盟禮尊者涖牛耳主次盟者衛侯與晋大夫盟自以當涖牛耳故請之成何曰衛吾温原也焉得視諸侯言衛小可比晋縣不得從諸侯禮将㰱渉佗捘衛侯之手及捥捘擠也血至捥衛侯怒王孫賈趨進賈衛大夫曰盟以信禮也信猶明也有如衛君其敢不唯禮是事而受此盟也言晋無禮不欲受其盟冬衛侯鄭伯盟于曲濮結叛晋曲濮衛地九年春宋公使樂大心盟于晋且逆樂祁之尸辭偽有疾乃使向巢如晋盟且逆子梁之尸巢向戌曾孫十年春及齊平夏公㑹齊侯于祝其實夾谷夾谷即祝其也孔丘相相㑹儀也犂彌言於齊侯曰孔丘知禮而無勇若使萊人以兵刼魯侯必得志焉萊人齊所㓕莱夷也齊侯從之孔丘以公退曰士兵之以兵擊萊人兩君合好而裔夷之俘以兵亂之裔逺也非齊君所以命諸侯也裔不謀夏夷不亂華俘不千盟兵不偪好於神為不祥盟将告神犯之為不善於徳為愆義於人為失禮君必不然齊侯聞之遽辟之辟去萊兵将盟齊人加於載書曰齊師出境而不以甲車三百乗從我者有如此盟如此盟詛之禍孔丘使兹無還揖對無還魯大夫曰而不反我汶陽之田吾以共命者亦如之湏齊歸汶陽田乃當共齊命於是孔子以公退賤者終其事要盟不潔故略不書齊侯将享公孔丘謂梁丘據曰齊魯之故吾子何不聞焉故舊典事既成矣㑹事成而又享之是勤執事也且犧象不出門嘉樂不野合犧象酒噐犧尊象尊也嘉樂鐘磬也饗而既具是棄禮也若其不具用秕稗也秕穀不成者稗草之似糓者言享不具禮穢薄若秕稗用秕稗君辱棄禮名惡子盍圗之夫享所以昭徳也不昭不如其已也乃不果享孔子知齊侯懐詐故以禮治之冬齊侯衛侯鄭㳺速㑹于安甫安甫地名十一年冬及鄭平六年侵鄭之怨始叛晉也魯自僖公以來世服於晋至今而叛故曰始叔還如鄭涖盟還叔詣曾孫十二年冬十月癸亥公㑹齊侯盟于黄結叛晋十四年五月公㑹齊侯衛侯于牽魏郡黎陽縣東北有牽城謀救范中行氏齊魯叛晋故助范中行也秋齊侯宋公㑹于洮洮曹地范氏故也謀救范氏哀公元年八月齊侯衛侯㑹于乾侯救范氏二年春伐邾将伐絞絞邾邑邾人愛其土故賂以漷沂之田而受盟癸巳叔孫州仇仲孫何忌及邾子盟于句繹句繹邾地取邑盟以要之六年春叔還㑹呉于柤七年夏公㑹呉于鄫鄫今瑯琊鄫縣八年秋及齊平九月臧賓如如齊涖盟賓如臧㑹子齊閭丘明來涖盟明閭丘嬰之子十二年夏公㑹呉于橐臯呉子使太宰嚭請尋盟尋鄫盟公不欲使子貢對曰盟所以周信也周固也故心以制之制其義玉帛以奉之奉質神明言以結之結其信明神以要之要以禍福寡君以為茍有盟焉弗可改也已若猶可改日盟何益今吾子曰必尋盟若可尋也亦可寒也尋重也寒歇也乃不尋盟呉徵㑹于衛初衛人殺呉行人且姚而懼謀於行人子羽子羽衛大夫子羽曰呉方無道無乃辱吾君不如止也子木曰呉方無道子木衛大夫國無道必棄疾於人呉雖無道猶足以患衛為衛患也徃也長木之斃無不摽也摽擊國狗之瘈無不噬也瘈狂也噬齧也而况大國乎秋衛侯㑹呉于鄖公及衛侯宋皇瑗盟盟不書畏吴竊盟而卒辭吴盟呉人籓衛侯之舍籓籬子服景伯謂子貢曰夫諸侯之㑹事既畢矣侯伯致禮地主歸餼侯伯致禮以禮賓地主所㑹主人也餼生物以相辭也各以禮相辭讓今呉不行禮於衛而籓其君舍以難之難苦困也子盍見大宰乃請束錦以行以賂呉語及衛故若本不為衛請者大宰嚭曰寡君願事衛君衛君之來也緩寡君懼故將止之止執子貢曰衛君之來必謀於其衆其衆或欲或否是以緩來其欲來者子之黨也其欲不來者子之讐也若執衛君是墮黨而崇讐也墮毁也夫墮子者得其志矣且合諸侯而執衛君誰敢不懼墮黨崇讐而懼諸侯或者難以覇乎大宰嚭説乃舎衛侯十三年夏公㑹單平公晉定公呉夫差于黄池七月辛丑盟呉晉爭先争㰱血先後呉人曰於周室我為長吴為大伯後故為長晉人曰於姬姓我為伯為侯伯趙鞅呼司馬寅寅晋大夫曰日旰矣旰晩也大事未成二臣之罪也大事盟也二臣鞅與寅建皷整列二臣死之長㓜必可知也對曰請姑視之反曰肉食者無墨墨氣色下今呉王有墨國勝乎國為敵所勝太子死乎且夷徳輕不忍久請少待之少待無與争乃先晋人盟不書諸侯恥之故不録十七年十二月公㑹齊侯盟于蒙齊侯簡公弟平公敖也䝉在東莞䝉隂縣西故䝉隂城也孟武伯相齊侯稽首公拜齊人怒武伯曰非天子寡君無所稽首孟武伯問於高柴曰諸侯盟誰執牛耳執牛耳尸盟者季羔曰鄫衍之役呉公子姑曹季羔髙柴也鄫衍在七年發陽之役衛石魋發陽鄖也在十二年石魋石蔓姑之子武伯曰然則彘也彘武伯名鄫衍則大國執發陽則小國執時執者無常故武伯自以為可執二十一年八月公及齊侯邾子盟于顧二十七年春越子使后庸來聘且言邾田封于駘上欲使魯還邾田封境至駘二月盟于平陽西平陽三子皆從季康子叔孫文子孟武伯皆從后庸盟之康子病之耻從蠻夷盟言及子贛思子贛曰若在此吾不及此夫不及與越盟武伯曰然何不召曰固将召之文子曰他日請念言季孫不能用子贛臨難而思之齊宣公四十九年與鄭㑹于西城康公十六年與晋衛㑹濁澤趙成侯十三年與韓昭侯遇上黨十七年與魏惠王遇葛孽司馬遷年表曰十八年趙孟如齊十九年與齊宋㑹平陸與燕㑹阿秦孝公七年與魏王㑹社平二十年㑹諸侯逢澤朝天子齊威王二十四年與魏王㑹田于郊魏惠王五年與韓㑹宅陽城武都十四年與趙㑹鄗二十年歸趙邯鄲與盟漳水上二十一年與秦㑹彤二十七年丹封名㑹丹魏大臣齊宣王七年與魏王㑹平阿南八年與魏王㑹於甄魏襄王元年與諸侯㑹徐州以相王秦惠文王九年與魏㑹應十二年㑹龍門初更二年與齊楚㑹齧桑趙武靈王四年與韓㑹于區䑕秦武王三年與韓襄王㑹臨晋魏哀王六年秦求立公子政為太子與秦㑹臨晋十一年與秦武王㑹應十七年與秦㑹臨晋二十年與齊王㑹於韓楚懐王二十五年懐王入與秦昭王盟約於黄棘韓襄王十年太子嬰與秦王㑹臨晉因至咸陽而歸楚頃襄王十四年與秦昭王好㑹于宛結和親魏昭王十二年與秦擊齊濟西與秦王㑹西周韓釐王十四年與秦㑹兩周間趙惠文王十四年與秦㑹中陽十六年與秦王㑹穰二十年王與秦昭王遇西河外年表云與秦㑹澠池先是秦王使使者告趙王欲與王為好㑹遇於西河外澠池趙王畏秦欲毋行亷頗藺相如計曰王不行示趙弱且怯趙王遂行與秦王㑹澠池秦王飲酒酣曰寡人竊聞趙王好音請奏瑟趙王鼓瑟秦御史前書曰某年月日秦王與趙王㑹飲令趙王鼓瑟藺相如前曰趙王竊聞秦王善為秦聲請奉盆缻秦王以相娯樂風俗通義曰缶者瓦噐所以盛酒漿秦王皷之以節歌也秦王怒不許於是相如前進缻因跪請秦王秦王不肯擊缻相如曰五歩之内相如請得以頸血濺大王矣左右欲刄相如相如張目叱之左右皆靡於是秦王不懌為一擊缻相如顧召趙御史書曰某年月日秦王為趙王擊缻秦之羣臣曰請以趙十五城為秦王夀藺相如亦曰請以秦之咸陽為趙王夀秦王竟酒終不能加勝於趙趙亦盛設兵以待秦秦不敢動趙悼襄王三年趙相魏相㑹魯柯盟八年入秦置酒齊王建二十八年入秦置酒册府元龜卷二百四十七
