body:
  text: 册府元龜卷六百四十七宋王欽若等撰貢舉部對䇿第二漢谷永字子雲為太常丞成帝建始三年冬日食地震同日俱發詔舉方正直言極諫之士太常陽城侯劉慶忌舉永待詔公車對曰陛下秉至聖之純德懼天地之戒異飭身修政納問公卿飭與勅同敕整也又下明詔帥舉直言帥謂公卿守相皆令舉也帥字或作師師衆也燕見紬繹以求咎愆紬讀曰抽紬繹者引其端緒也使臣等得造明朝承聖問臣材朽學淺不通政事竊聞明王即位正五事建大中以承天心則庶徴序於下日月理於上如人君淫溺後宫般樂游田般讀與盤同五事失於躬大中之道不立則咎徴降而六極至凡灾異之發各象過失以類吿人十二月朔戊申日食婺女之分地震蕭墻之内二者同日俱發以丁寧陛下厥咎不遠宜厚求諸身意豈陛下志在閨門未䘏政事不愼舉錯婁失中與婁古屢字也内寵大盛女不尊道嫉妬專上妨繼嗣與古之王者廢五事之中失夫婦之紀妻妾得意謁行於内勢行於外至覆傾國家惑亂隂陽昔褒姒用國宗周以䘮閻妻驕扇日以不臧此其效也經曰皇極皇建其有極傳曰皇之不極是謂不逹時則有日月亂行陛下踐至尊之祚為天下主奉帝王之職以統羣生方内之治亂在陛下所執誠留意於正身勉强於力行損燕私之間以勞天下放去淫佚之樂罷歸倡優之咲咲古笑切絶郤不享之義愼節游田之虞起居有常循禮而動躬親政事政行無倦安服若性經曰繼自今嗣王其毋淫于酒毋逸于游田惟正之共未有身治正而臣下邪者也夫妻之際王事綱紀安危之機聖王所致愼也昔舜飭正二女以崇至德楚莊忍絶丹􅁎以成伯功楚荘王得丹􅁎三月不聽朝保申諫忍絶不復見乃勤政事遂為盟主也又曰丹􅁎楚文王之􅁎也莊王用申公巫臣之諫不納夏􅁎谷永集丹字作夏是也今此傳作丹傳寫悞耳伯讀曰覇幽王惑於褒姒周德降亡魯桓脅於齊女社稷以傾誠修後宫之政明尊卑之序貴者不得嫉妬專寵以絶驕嫚之端抑褒閻之亂賤者咸得秩進各得厥職以廣繼嗣之統息白華之怨後宫親屬饒之以財勿與政事與讀曰預以遠皇父之類損妻黨之權未有閨門治而天下亂者也治逺自近始習善在左右昔龍筦納言而帝命惟允四輔既備成王靡有過事誠敕正左右齊栗之臣戴金貂之飾執常伯之職者皆使學先王之道知君臣之義濟濟謹孚無敖戲驕恣之過則左右肅艾羣僚仰法化流四方經曰亦惟先正克左右未有左右正而百官枉者也治天下者尊賢考功則治簡賢違功則亂誠審思治人之術歡樂得賢之福論材選士必試於職明度量以程能考功實以定德無用比周之虚譽無聽浸潤之譛愬則抱功修職之吏無蔽傷之憂比周邪偽之徒不得即工小人日銷俊艾日隆艾讀曰乂經曰三載攷績三攷黜陟幽明又曰九德咸事俊乂在官未有功賞得於前衆賢布於官而不治者也堯遭洪水之災天下分絶為十二州制逺之道微而無乖畔之難者德厚恩深無怨於下也秦居平土一夫大呼而海内崩析者刑罰深酷吏行殘賊也夫違天害德為上取怨於下莫甚乎殘賊之吏誠放退殘賊酷暴之吏錮廢勿用益選温良上德之士以親萬姓平刑釋寃以理民命務省徭役毋奪民時薄收賦税毋殫民財使天下黎元咸安居樂業不苦踰時之役不患苛暴之政不疾酷烈之吏雖有唐堯之大災民無離上之心經曰懐保小人惠於鰥寡未有德厚吏良而民畔者也臣聞災異乃皇天所以譴吿人君過失猶嚴父之明誡畏懼敬改則禍消福降忽然簡易則咎罰不除經曰嚮用五福威用六極傳曰六沴作見若不共御六罰既侵六極其下今三年之間災異蜂起小大畢具所行不享上帝上帝不豫炳然甚著不求之身無所改正疏舉廣謀又不用其言是循不享之迹無謝過之實也天責愈深此五者王事之綱紀南面之急務唯陛下畱神對奏天子異焉永對畢因曰臣前幸得條對災異之效禍亂所極言關聖聰書陳於前陛下委棄不納而更使方正對策背可懼之大異問不急之常論廢承天之至言角無用之虚文欲末殺災害未殺掃滅也殺先曷切滿讕誣天滿讕欺網也讕來亶切上是故皇天勃然發怒於甲巳之間暴風三溱拔樹折木此天至明不可欺之效也杜欽字子夏成帝時為大將軍王鳳武庫令乞骸骨去後有日食地震之變詔舉賢良方正能直言士合陽侯梁放舉欽欽上對曰陛下畏天命悼變異延見公卿舉直言之士將以求天心迹得失也觀得失之蹤迹也臣欽愚戇經術淺薄不足以奉大對臣聞日蝕地震陽微隂盛也臣者君之隂也子者父之隂也妻者夫之隂也夷狄者中國之隂也春秋日蝕三十六地震五或夷狄侵中國或政權在臣下或婦乗夫或臣子背君父事雖不同其類一也臣竊觀人事以攷變異則本朝大臣無不自安之人外戚親屬無乖剌之心關東諸侯無彊大之國三埀蠻夷無逆理之節殆為後宫何以言之日以戊申蝕時加未戊未土也土者中宫之部也其夜地震未央宫殿中此必適妾將有争寵相害而為患者惟陛下深戒之變感以類相應人事失於下變象見於上能應之以德則異咎消亡不能應之以善則禍敗至髙宗遭雊雉之戒飭已正事享百年之夀殷道復興要在所以應之應之非誠不立非信不行宋景公小國之諸侯耳有不忍移禍之誠出人君之言三熒惑為之退舍以陛下聖明内推至誠深思天變何應而不感何揺而不動孔子曰仁逺乎哉惟陛下正后妾抑女寵防奢泰去佚遊躬節儉親萬事數御安車繇輦道親二宫之饔膳致昬晨之定省如此即堯舜不足與比隆咎異何足消滅如不留聽於庶事不論材而授位殫天下之財以奉淫侈匱萬姓之力以從耳目近謟䛕之人而逺公方信讒賊之臣以誅忠良賢俊失在巖穴大臣怨於不已雖無變異社稷之憂也天下至大萬事至衆祖業至重誠不可以佚豫為不可以奢泰持也惟陛下忍無益之欲以全衆庶之命臣欽愚戇言不足采其夏上盡召直言之士詣白虎殿對策此殿在未央宫策曰天地之道何貴王者之法何如六經之義何上人之行何先取人之術何以當世之治何務各以經對欽對曰臣聞天道貴信地道貴貞不信不貞萬物不生生者天地之所貴也王者承天地之所生理而成之昆蟲草木靡不得其所王者法天地非仁無以廣施非義無以正身克己就義恕以及人六經之所上也不孝則事君不忠涖官不敬戰陣無勇朋友不信孔子曰孝無終始而患不及者未之有也孝人行之所先也觀本行於鄉黨考功能於官職達觀其所舉富觀其所予窮觀其所不為乏觀其所不取近觀其所為主逺觀其所主孔子曰視其所以觀其所由察其所安人焉廋哉取人之術也殷因於夏尚質周因於殷尚文今漢家承周秦之敝宜抑文尚質廢奢長儉表實去偽孔子曰惡紫之奪朱也當世治之所務也臣竊有所憂言之則拂心逆指不言則漸日長為禍不細然小臣不敢廢道而求從違忠而耦意臣聞玩色無厭必生好憎之心好憎之心生則愛寵偏於一人愛寵偏於一人則繼嗣之路不廣而疾妬之心興矣如此則匹夫匹婦之説不可勝也唯陛下純德普施無欲是從此則衆庶咸説繼嗣日廣而海内長安萬事之是非何足備言杜鄴為凉州刺史以病免哀帝元壽元年正月朔帝以皇后父孔鄉侯傳晏為大司馬衛將軍而帝舅陽安侯丁朋為大司馬驃騎將軍臨拜日食詔舉方正直言扶陽侯韋育舉鄴方正鄴對曰臣聞禽息憂國碎首不恨禽息秦大夫薦百里奚而不見納穆公出當車以頭繫闑腦乃播出曰臣生無補於國而不如死也穆公感寤而用百里奚秦以大治卞和獻寶刖足願之臣幸得奉直言之詔無二者之危敢不極陳臣聞陽尊隂卑卑者隨尊尊者兼卑天之道也是以男雖賤各為其家陽女雖貴猶為其國隂故禮明三從之義雖有文母之德必繫於子春秋不書紀侯之母隂義殺也隱三年紀侯使履繻來逆女公羊傳曰婚禮不稱主人主人謂壻也稱母母不通也殺謂减䧏也音所例切昔鄭伯隨姜氏之欲終有叔叚簒國之禍周㐮王内迫惠后之難而遭居鄭之危漢興呂太后權私親屬又以外孫為孝惠后是時繼嗣不明凡事多晻晻與暗同晝昬冬雷之變不可勝載竊見陛下行不偏之政每事約儉非禮不動誠欲正身與天下更始也然嘉瑞未應而日食地震民訛言行籌傳相驚恐案春秋災異以指象為言語故在於得一類而達之也日食明陽為隂所臨坤卦乘離明夷之象明夷之卦上六不明晦初登於天後入於地明夷明傷也初登於天者初為天子言以善聞於天也後入於地者言傷賢害仁佞惡在朝必以惡終入於地也坤以法地為主為母以安静為德震不隂之效也言地當安静而今乃震是為不遵隂道占象甚明臣敢不直言其事昔曽子問從令之義孔子曰是何言歟善閔子騫守禮不茍從親所行無非禮者故無可間也前大司馬新都侯莽退伏第家以詔策决復遣就國髙昌侯宏去蕃自絶猶受封土董宏也制書侍中駙馬都尉遷不忠巧佞免歸故郡傳遷也間未旬月則有詔還大臣奏正其罰卒不得遣而反兼官奉使有寵過故及陽信侯業皆縁私君國非功義所止謂縁私恩而得封爵為一國之君耳非有功而侯也諸外家昆弟無賢不肖竝侍帷幄布在列位不問賢與不肖皆布在列位或典兵衛或將軍屯寵意幷於一家積貴之勢世所希聞也至乃竝置大司馬將軍之官皇甫雖盛三桓雖隆魯為作三軍無以甚此當拜之日晻然日食不在前後臨事而發者明陛下謙遜無專承指非一所言輙聽所欲輙隨有罪惡者不坐辜罰無功能者畢受官爵流漸積猥正尤在是尤過也欲令昭昭以覺聖朝昔詩人所刺春秋所譏指象如此殆不在它繇後視前忿邑非之逮身所行不自鏡見則以為可計之過者疏賤獨偏見疑内亦有此類言天子不自見其過疏賤獨偏見鄴自謂傍觀而見之也疑内亦有此類謂後宫嬖幸非理寵遇亦有如傅遷鄭業等妄受恩賞者天變不空保佑世主如此之至奈何不應佑讀曰祐應謂天戒而修徳政臣聞野雉著怪髙宗深動大風暴過成王怛然願陛下加致精誠思承始初事稽諸古以厭下心厭滿也一瞻反音則黎庶羣生無不説喜上帝百神收還威怒禎祥福禄何嫌不報後漢申屠剛扶風茂陵人任郡功曹平帝時王莾專政朝多猜忌隔絶帝外家馮衛二族不得交官剛常疾之及舉賢良方正因對策曰臣聞王事失則神祗怨怒姦邪亂正故隂陽謬錯此天所以譴吿王者欲令失道之君曠然覺悟懷邪之臣懼然自刻者也今朝廷不考功校德而虚納毁譽數下詔書張設重法抑斷誹謗禁割論議罪之重者乃至腰斬傷忠臣之情挫直士之鋭殆乖建進善之旌縣敢諌之皷闢四門之路明四目之義也臣聞成王幼少周公攝政聽言下賢均權布寵無舊無新惟仁是親動順天地舉措不失然近則召公不説逺則四國流言夫子母之性天道至親今聖主幼少始免襁褓即位以來至親分離外戚杜隔恩不得通且漢家之制雖任英賢猶援姻戚親疏相錯杜塞間隙誠所以安宗廟重社稷也今馮衛無罪乆廢不録或處窮僻不若民庶誠非慈愛忠孝承上之意夫為人後者自有正義至尊至卑其執不嫌是以人無賢愚莫不為怨姦臣賊子以之為便不諱之變誠難其慮今之保傅非古之周公周公至聖猶尚有累何况事失其𠂻不合天心者哉昔周公先遣伯禽守封於魯以義割恩寵不加後故配天郊祀三十餘世霍光秉政輔翼少主修善進士名為忠直而尊崇其宗黨摧抑外戚結貴據權至堅至固終没之後受禍滅門方今師傅皆以伊周之位據賢保之任以此思化則何功不至不思其危則何禍不到損益之際孔父攸歎持滿之戒老氏所愼蓋功冠天下者不安威震人主者不全今承衰亂之後繼重弊之世公家屈竭賦歛重數苛吏奪其時貪夫侵其財百姓困乏疾疫夭命盜賊羣軰且以萬數軍行衆止竊號自立攻犯京師燔燒縣邑至乃訛言積弩入宫宿衛驚懼自漢興以來誠未有也國家微弱姦謀不禁六極之效危於纍卵王者承天順地頒爵主刑不敢以天官私其宗不敢以天罰輕其親陛下宜遂聖明之德昭然覺悟逺述帝王之迹近尊孝文之業羞五品之屬納至親之序亟遣使者徵中山太后置之别宫令時朝見又召馮衛二族裁與冗職使得執㦸親奉宿衛以防未然之符以抑患禍之端上安社稷下全保傅内和親戚外絶邪謀書奏莽令元后下詔曰剛所言僻經妄説違背大義遣其罷歸田里李固漢中人辟司空掾不就陽嘉二年四月己亥京師地震五月庚子詔曰朕以不德統奉洪業無以承順乾坤恊和隂陽災𤯝屢見咎徵仍彰羣公卿士將何以輔正朕之不逮奉答災異災異不空故必有所應其各舉敦朴士一人直言厥咎靡有所諱衛尉賈建舉固固對曰臣愚以為天不言以災異為譴吿政之治亂主之得失皆上帝所司而應以災祥者也王者父天母地體其山川今日蝕地動山摧晝晦主將安立物將安寄昔江京之姦禍及骨肉至令陛下幽廢親履艱難天誘其𠂻陛下龍興海内莫不忻悦實有沛然改圖抑退權臣詢求善政以順天意夜而得之坐而待旦今則不然政令紛紜已復蹈前軌矣臣伏在草澤痛心疾首誠以陛下聖德應期實當嘉㑹反衰弊之政𢎞中興之美其功甚易譬猶指掌臣聞善罰不如善政善賞不如善教善教之道宜從内起昔周宣孝文中興之主也皆改華服沛然易規乃能移風易俗反之於古今封阿母恩賞太過常侍近臣威權太重臣案圖書災異之發亦以為然今宜斥退邪佞投之四裔引納方直令在左右陛下親發德音以招羣俊臨御座見公卿言有稱意即時施行顯㧞其人以旌忠善則陛下日有所聞忠臣日有所獻君臣相體上下交㤗阿保雖有大功勤勞之恩可賜以貨賄傳之子孫列土分爵實非天意漢興已來賢君相繼豈無阿乳之飬非不寵貴之然上畏天威俯察經典知義不可故不封也梁氏子弟羣從徴為列侯永平建初故事殆不如此妃后之家所以少有全存者非天性皆然但坐權寵太過天道惡盈也天有北斗所以斟酌元氣帝有尚書所以出納王命若賦役平均則百姓以安萬幾不治則天下以亂今陛下共治天下者外則公卿尚書内則常侍黄門譬猶一門之内一家之事安則共其福危則同其禍繇是觀之權柄不可不愼號令不可不詳夫人君之有政猶水之有隄防隄防完雖遭雨水霖澇不能為變政教一立蹔遭凶年不足為憂誠令隄防穿漏萬夫同力不能復救政教一壞賢知馳騖不能復還今隄防雖堅漸有孔穴譬之一人之身本朝者心腹也州郡者四肢也心腹痛則四支不舉故臣之所憂在腹心之疾非四支之患臣以為堅隄防務政教先安心腹整理本朝雖有冦賊水旱之變不足介意也誠令隄防壞漏心腹有疾雖無水旱之災天下固可以憂矣臣父故司徒臣邰受先帝厚恩子孫不敢自比於餘𨽻故敢依圖書悉心以對不敢虚造詔又特問當世之敝為政所宜固對曰臣聞王者父天母地人主日月同明四時合信故父天母地兄日姊月寳有山川王道得則隂陽和穆政化乖則摧震為災斯皆關之天心效於成事者也夫化以職成官繇能理古之進者有德有命命爵命也言有德者乃可加爵命也今之進者惟財與力伏聞詔書務求寛愽疾惡嚴暴而今長吏多殺伐致聲名者必加遷賞其存寛和無黨援者輙見斥逐是以淳厚之風不宣凋薄之俗未革雖繁刑重禁何能有益前孝安皇帝變亂舊典封爵阿母阿母王聖因造妖孽使樊豐之徒乘權放恣侵奪主威改亂嫡嗣謂順帝為平太子時廢為濟隂王至令聖躬狼狽親遇其艱既㧞自困殆殆危也龍興即位天下喁喁屬望風政積弊之後易致中興誠當沛然思惟善道而論者猶云方今之事復同於前臣伏從山草痛心傷臆實以漢興以來三百餘年賢聖相繼十有八主豈無阿乳之恩豈忘貴爵之寵然上畏天威俯察經典知義不可故不封也今宋阿母謂宋娥也雖有大功勤謹之德但加賞賜足以酧其勞苦至於裂土開國實乖舊典聞阿母體性謙虛必有遜譲陛下宜許其辭國之髙使成萬安之福夫妃后之家所以少完全者豈天性當然但以爵位尊顯專總權柄天道惡盈不自知損故至顚仆先帝寵遇閻氏位號太疾故其受禍曽不旋時老子曰其進鋭其退速也謂老子有此文謝承書亦云孟子而續漢書復云老子今梁氏戚為椒房禮所不臣公羊傳曰宋殺其大夫何以不名宋三世無大夫三世内娶也何休注云内娶娶大夫女也言無大夫者三世禮不臣妻之父母國内皆無娶道故紀云大夫名正其義也椒房者皇后所居以椒泥壁也尊以髙爵尚可然也而子弟羣從榮顯兼加永平建初故事殆不如此宜令歩兵校尉冀及諸侍中還居黄門之官使權去外戚政歸國家豈不休乎又詔書所以禁侍中尚書中臣子弟不得為吏察孝亷者以其秉威權容請託故也而中常侍在日月之側聲勢振天下子弟禄仕曽無限極雖外託謙黙不干州郡而謟偽之徒望風進舉今可為設常禁同之中臣昔舘陶公主為子求郎舘陶公主光武第三女也明帝不許賜錢十萬所以輕厚賜重薄位者為官人失才害及百姓也竊聞長水司馬武宣開陽城門侯羊廸等無它功德初拜便眞此雖小失而漸壞舊章先聖法度所宜堅守政教一跌百年不復詩云上帝板板下民卒癉刺周王變祖法度故使下民將盡病也今陛下之有尚書猶天之有北斗也斗為天之喉舌尚書亦為陛下喉舌天理在斗中司三公如人喉在咽以理舌語斗為天之舌口主出政教三公主導宣君命喻於人則宜如人喉在咽以理舌口使言有條理斗斟酌元氣運乎四時天皇於是斟元陳樞以王易威威則也法也天皇斟元氣陳列樞機受行次之當得也尚書出納王命賦政四海權尊勢重責之所歸若不平心災𤯝必至誠宜審擇其人以毗聖政今與陛下共理天下者外則公卿尚書内則常侍黄門譬猶一門之内一家之事安則共其福慶危則通其禍敗刺史二千石外統職事内受法則夫表曲者景必邪源清者流必潔猶叩樹本百枝皆動也周頌曰薄言振之莫不震疊韓詩薛君傳曰薄辭也振奮也莫無也震動也疊應也美成王能奮舒文武之道而行之則天下無不動而應其政教此言動之於内而應之於外者也繇此言之本朝號令豈可蹉跌間隙一開則邪人動心利競暫開則仁義道塞刑罰不能復禁化導以之寖壊此天下之紀綱當今之急務陛下宜開石室陳圖書招㑹羣儒引問失得指擿變象以求天意其言有中理即時施行顯拔其人以表能者則聖聽日有所聞忠臣盡其所知又宜罷退宦官去其權重裁置常侍二人方直有德者省事左右小黄門五人才智閑雅者給事殿中如此則論者厭塞升平可致也臣所以敢陳愚瞽冐昧自聞者儻或皇天欲令微臣覺悟陛下陛下宜熟察臣言憐赦臣死順帝覧衆對以固對為第一多所納用即時出阿母還舍諸常侍悉叩頭謝罪朝廷肅然馬融扶風人陽嘉二年與李固同對策融對曰臣聞立天之道曰隂曰陽立地之道曰柔曰剛夫隂陽剛柔天地所以立也取仁於陽資義於隂柔以施德剛以行刑各順時日以厚羣生帝王之法天地設位四時代序王者奉順則風雨調澍嘉生繁殖天失其度則咎徴竝至飢饉薦臻合科條品制四時禁令所以承天順民者備矣悉矣不可加矣然而不平之效猶有咨嗟之怨者百姓屢聞恩澤之聲而未見惠和之實也今從政者變忽法度以殺戮威刑為能夫問其國守相及令長何如其稱之也曰太急其毁之也曰太緩太急致寒太緩致燠二者罪同而論者許急此隂陽所以不和也復之之道審察緩急之謗舉鈞同寒燠之罪罰以崇王政則隂陽和矣好惡既明則宰官之吏知所避就又身以先之不嚴以蒞之不變則刑罰之夫知為善之必利為惡之必害孰能不化則官良矣臣聞洪範八政以食為首周禮九職以農為本民失耕桑飢寒竝至賊盜之原所繇起也古之仰足以飬父母俯足以畜妻子然後敦五教宣三德則嘉隆之化可致也夫足者非能家贍而人足量其財用以為制度故嫁娶之禮儉則㛰姻以時矣䘮制之禮約則終者掩藏矣不奪其時則農不失矣妻子以累其心産業以重其志舍此而為非者雖有必不多矣今則不然此賊盜所以不息誠使制度必行禁令必止則士者不濫法式之外百工不作無用之器商賈不通難得之貨農夫不失三時之務各安生樂業盜賊消害不起矣張衡為太史令陽嘉二年與李固同對策衡對曰臣聞政善則休祥降政惡則咎徴見茍非聖人或有失誤昔成王疑周公而大風拔木開金縢而反風至天人之應速於影響故稱詩曰無曰髙髙在上日監在兹間者京都地震雷赫怒夫動静無常變改正道則有奔雷土裂之異自初舉孝亷迄今二百嵗矣皆先孝行行有餘力則學文法辛卯詔以能宣章句奏案為限雖有至孝猶不應科此棄本而取末曽子長於孝然實魯鈍文學不若游夏政事不若冉季今欲使一人兼之茍外可觀内則必有闕則違選舉孝廉之制矣且郡國守相剖符寕境為一大臣一旦免黜十有餘人吏民罷於送迎之役新故交際公私放濫或臨政事民為百姓取便而以少過免之是為奪人父母使嗟號也又察選舉一任三府堂閣秘密振暴於外貨賂多行人事流通於眞偽渾淆昏亂清朝此為下陵上替分威共德灾異之興不亦宜乎易不遠復論不憚改朋友交接且不宿過况於帝王承天理物以天下為公者乎中間以來妖星見於上震裂著於下天誡詳矣可為寒心明者消禍於未萌今既見矣修政恐懼則禍轉為福矣周舉為尚書陽嘉三年河南三輔大旱詔書以舉才學優深特下策問曰朕以不德仰承三統夙興夜􅄰思協大中頃年以來旱災屢應稼穡焦枯民食困乏五品不訓王澤未流羣司素餐據非其位審所貶黜變復之徴厥效何繇分别具對勿有所諱舉對曰臣聞易稱天尊地卑乾坤以定二儀交搆乃生萬物萬物之中以人為貴故聖人養之以君成之以化順四時之宜適隂陽之和使男女婚娶不過其時包之以仁恩導之以德教示之以災異訓之以嘉祥此先聖承乾飬物之始也夫隂陽閉隔則二氣否塞二氣否塞則人物不昌人物不昌則風雨不時風雨不時則水旱成災陛下處唐虞之位未行堯舜之政近廢文帝光武之法而循亡秦奢侈之欲内積怨女外有曠夫今皇嗣不興東宫未立傷和逆理斷絶人倫之所致也非但陛下行此而已䜿宦之人亦復虚以形勢威侮良家取女閉之至有白首殁無配偶逆於天心昔武王入殷出傾城之女成湯遭災以六事克己魯僖遇旱而自責祈雨皆以精誠轉禍為福自枯旱以來彌歴年嵗未聞陛下改過之效徒勞至尊暴露風塵誠無益也又下州郡祈神致請昔齊有大旱景公欲祀河伯晏子諌曰不可夫河伯以水為城國魚龞為民庶水盡魚枯豈不欲雨自是不能致也陛下所行但務其華不尋其實猶縁木求魚却行求前誠宜推信革政崇道變惑出後宫不御之女理天下寃枉之獄除太官重膳之費夫五品不訓責在司徒有非其位者宜急出斥之臣舉自外籓擢典納言學薄智淺不足以對易傳曰陽感天不旋日惟陛下留神裁察之皇甫規安定人為郡功曹舉上計掾冲質之閒梁太后臨朝舉䂓賢良方正對策曰伏惟孝順皇帝初勤王政紀綱四方幾以獲安後遭姦偽威分近習畜貨聚馬戲謔是聞又因縁嬖倖受賂賣爵輕使賓客交錯其間天下擾擾從亂如歸故毎有征戰鮮不挫傷官民竝竭上下窮虚臣在關西竊聽風聲未聞國家有所先後而威福之來咸歸權倖陛下體兼乾坤聰哲純茂攝政之初㧞用忠貞其餘綱維多所改正逺近翕然望見太平而地震之後霧氣白濁日月不光旱魃為虐大賊從横流血川野庶品不安譴誡累至殆以姦臣權重之所致也其常侍尤無狀者亟便黜遣披掃凶黨收入財賄以塞痛怨以答天誡今大將軍梁冀河南尹不疑處周召之位為社稷之鎭加與王室世為姻族今日位號雖尊可也實宜増修謙節輔以儒術省去遊娛不急之務割減廬茅無益之飾夫君者舟也人者水也羣臣乘舟者也將軍兄弟操檝者也若能平志畢力以度元元所謂福也如其怠弛將淪波濤可不愼乎夫德不稱禄猶鑿墉之址以益其髙豈量力審功安固之道哉凡諸宿猾酒徒戲客皆耳納邪聲口出謟言丼心逸遊唱造不義亦宜貶斥以懲不軌今冀等深思得賢之福失人之累又在位素餐尚書怠職有司依違莫肯紏察故使陛下專受謟諛之言不聞户牖之外臣誠知阿諛有福深言近禍豈敢隱心以避誅責乎臣生長邊逺希涉紫庭怖慴失守言不盡心梁冀忿其刺己以䂓為下第拜郎中託疾免歸後為度遼將軍元康元年徴為尚書其夏日蝕詔公卿舉賢良方正下問得失歸後對曰天之於王者猶君之於臣父之於子也誡以灾妖使從福祥陛下八年之中三斷大獄一除内嬖再誅外臣而灾異猶見人情未安者殆賢愚進退威刑所加有非其理也前太尉陳蕃劉矩忠謀髙世廢在里巷劉祜馮緄古本切翊趙典尹勲正直多怨流放家門李膺王暢孔翊潔身守禮終無宰相之階至於鈎黨之釁事起無端虐賢傷善哀及無辜今興改善政易於覆手而羣臣杜口鍳畏前害互相瞻頋莫肯正言伏願陛下暫留聖明容受謇直則前責可弭後福可降對奏之不省荀爽字慈明一名諝潁隂人延熹九年大常趙典舉爽至孝拜郎中對策陳便冝曰臣聞之於師曰漢爲火德火生於木木盛於火故其德爲孝其象在周易之離夫在地爲火在天爲日在天者用其精在地者用其形夏則火王其精在天温煖之氣養生百木是其孝也冬時則廢其形在地酷烈之氣焚燒山林是其不孝也故漢制使天下誦孝經選吏舉孝亷夫䘮親自盡孝之終也今之公卿及二千石三年之䘮不得即去殆非所以增崇孝道而克稱火德者也往者孝文勞謙行過乎儉故有遺詔以日易月此當時之宜不可貫之萬世古今之制雖有損益而諒闇之禮未嘗改移以示天下莫遺其親今公卿羣僚皆政教所瞻而父母之䘮不得奔赴夫仁義之行自上而始敦厚之俗以應乎下傳曰䘮祭之禮闕則人臣之恩薄背死忘生者衆矣曽子曰人未有自致者也必也親䘮乎春秋傳曰上之所爲民之歸也夫上所不爲而民或爲之故加刑罰若上之所爲民亦爲之又何誅焉昔丞相翟方進以自備宰相而不敢踰制至遭母䘮三十六日而除夫失禮之源自上而始古者大䘮三年不呼其門所以崇國厚俗篤化之道也事失宜正過勿憚改天下通䘮可如舊禮臣聞有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後有禮義禮義備則人知所厝矣夫婦人倫之始王化之端故文王作易上經首乾坤下經首咸恒孔子曰天尊地卑乾坤定矣夫婦之道所謂順也堯典曰釐降二女於嬀汭嬪于虞降者下也嬪者婦也言雖帝堯之女下嫁於虞猶屈體降下勤修婦道易曰帝乙歸妹以祉元吉婦人謂嫁曰歸言湯以娶禮歸其妹於諸侯也春秋之義王姬嫁齊使魯主之不以天子之尊加于諸侯也今漢承秦法設尚主之儀以妻制夫以卑臨尊違乾坤之道失陽唱之義也孔子曰昔聖人之作易也仰則觀象於天俯則察法於地覩鳥獸之文與天地之宜近取諸身遠取諸物以通神明之德以類萬物之情今觀法於天則北極至尊四星妃后察法於地則崐山象夫卑澤象妻覩鳥獸之文鳥則雄者鳴鴝雌能順服獸則牡爲唱導牝乃相從近取諸身則乾爲人首坤爲人腹遠取諸物則木實屬天根荄屬地陽尊隂卑蓋乃天性且詩初篇實首闗雎禮始冠婚先正夫婦天地六經其旨一揆宜改尚主之制以稱乾坤之性遵法堯舜式是周孔合之天地而不謬質之鬼神而不疑人事如此則嘉瑞降天吉祥出地五韙咸備各以其序者矣昔者聖人建天地之中而謂之禮禮者所以興福祥之本而止禍亂之源也人能枉欲從禮者則福歸之順情廢禮者則禍殃之推禍福之所應知興廢之所由來也衆禮之中婚禮爲首故天子娶十二天之數也諸侯以下各有等差事之降也陽性純而能施隂體順而能化以禮濟樂節宣其氣故能豐子孫之祥致老夀之福及三代之季滛而無節瑶䑓瓊宫陳妾數百陽竭於上隂隔於下故周公之戒曰不知稼穡之艱難不聞小人之勞惟躭樂之從時亦㒺或克壽是其明戒後世之人好福不務其本惡禍不易其軌傳曰截趾適履孰云其愚何與斯人追欲䘮軀誠可痛也臣竊聞後宫采女五六千人從官侍使復在其外冬夏衣服朝夕廪糧耗費縑帛空竭府藏徴調増倍十而税一空賦不辜之民以供無用之女百姓窮困於外隂陽隔塞於内故感動和氣災異屢臻臣愚以爲諸非禮聘未曽幸御者一一皆遣岀使成好合一曰通怨曠和隂陽二曰省財用實府庫三曰修禮制綏眉壽四曰配陽施祈螽斯五曰寛役賦安黎民此誠國家之𢎞利天人之大福也夫寒熱晦明所以爲嵗尊卑奢儉所以爲禮故以晦明寒暑之氣尊卑侈約之禮爲其節也易曰天地節而四時成春秋傳曰惟器與名不可以假人孝經曰安上治民莫善於禮禮者尊卑之差上下之制也昔季氏八佾舞於庭非有傷害困於人物而孔子曰是可忍也孰不可忍洪範曰惟辟作威惟辟作福惟辟玉食凡此三者君所獨行而臣不得同也今臣僣君服下食上珍所謂害于而家凶于而國者也宜畧依古禮尊卑之差及董仲舒制度之别嚴督有司必行其命此則禁亂善俗足用之要奏聞即棄官去册府元龜卷六百四十七
