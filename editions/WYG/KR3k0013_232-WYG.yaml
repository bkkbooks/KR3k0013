body:
  text: 册府元龜卷二百三十二宋王欽若等撰僭偽部稱藩粤自晉氏中微生靈板蕩致滔天之乘間咸割地以争雄莫不竊號假王開祊建社據都㑹之要擁嘯聚之衆人自為國沛焉肆志然而永嘉南遷天命未改晉之恩徳尚結人心號令所行威懐不逺則有請命述職乃心本朝假寵乞靈以備外禦雖負固専制﨑嶇遐阻而通使奉貢恭達欵誠斯所以示義於天下抗衡於隣國者也若乃宋氏嗣興元魏方盛為敵境所附者咸亦取焉前凉張軌初為凉州刺史及河間成都二王之難遣兵三千東赴京師又遣主簿令狐亞聘南陽王模模甚恱遺軌以帝所賜劒謂軌曰自隴以西征伐斷割悉以相委如此劒矣㑹王彌㓂雒陽軌遣北宫純張纂馬魴隂濬等率州軍擊破之又敗劉聰於河東京師歌之曰凉州大馬横行天下凉州鴟苕㓂賊消鴟苕翩翩怖殺人帝嘉其忠進封西平郡公不受於時天下既亂所在使命莫有至者軌遣使貢獻嵗時不替朝廷嘉之屢降璽書慰勞光禄傅祇太常摯虞遺軌書告京師饑匱軌即遣叅軍杜勲獻馬五百匹毯布三萬疋遣使者進拜鎮西將軍都督隴右諸軍事封覇城侯進車騎大將軍開府辟召儀同三司䇿未至而王彌遂逼雒陽軌遣將軍張斐北宫純郭敷等率精騎五千来衛京師陷斐等皆沒於賊太府主簿馬魴言於軌曰四海傾覆乘輿未反眀公以全州之力徑造平陽必當萬里風披有征無戰未審何憚不為此舉軌曰是孤心也又聞秦王入闗乃馳檄闗中曰主上遘危遷幸非所普天分離率土䘮氣秦王天挺聖徳神武應期世祖之孫王今為長凡我晉人食土之類龜筮克從幽眀同欵宜簡令辰奉登皇位今遣前鋒督䕶宋配歩騎二萬徑至長安翼衛乘輿折衝左右西中郎實中軍三萬武威太守張琠胡騎二萬絡繹繼發仲秋中旬㑹於臨晉俄而秦王為皇太子遣使拜軌為驃騎大將軍儀同三司固辭是嵗皇太子遣使重申前授固辭愍帝即位進位司空固辭是時劉曜㓂北地又遣參軍麴陶領三千人衛長安帝遣大鴻臚辛攀拜軌侍中太尉凉州牧西平公軌又固辭張實嗣父軌為凉州牧晉愍帝下䇿書曰維乃父武公著勲西夏頃劉石狡猾侵逼近甸義兵銳卒萬里相尋方貢逺珍府無虚嵗方委専征蕩清九域昊天不弔凋余藩后朕用悼厥心維爾俊劭英毅宜世表西海今授持節都督凉州諸軍事西中郎將凉州刺史領䕶羌校尉西平公徃欽哉其闡𢎞先緒俾屏王室又蘭池長趙奭上軍士張氷得璽文曰皇帝璽羣僚上慶稱徳實曰孤嘗忿袁本初擬肘諸君何忽有此言因送於京師又遣督䕶王該送諸郡貢計獻名馬方珍經史圖籍於京師㑹劉曜逼長安實遣將軍王該率衆以援京城帝嘉之拜都督陕西諸軍事後寔知劉曜逼遷天子大臨三日遣太府司馬韓璞滅㓂將軍田齊撫戎將軍張閬前鋒都督隂預歩騎一萬東赴國難命討虜將軍陳安故太守賈騫隴西太守吳紹各統郡兵為璞等前驅戒璞曰前遣諸將多違機信所執不同致有乖阻且内不和親焉能服物今遣卿督五將兵事當如一體不得令乖異之聞達孤耳也復遺南陽王保書曰王室有事不忘投身孤州逺域首尾多難是以前遣賈騫瞻望公舉中被符命勅騫還軍忽聞北地陷沒㓂逼長安胡崧不進麴允持金五百請救於崧是以决遣騫等進軍度嶺㑹聞朝廷傾覆為忠不達於主遣兵不及於難痛慨之深死有餘責今更遣韓璞等惟公命是從時焦崧陳安逼上邽南陽王保遣使告急以金城太守竇濤為輕車將軍率威逺將軍宋􅐧及和苞張閬宋輯辛韜張選董廣歩騎二萬赴之軍次新陽㑹愍帝凶問至素服舉哀大臨三日時南陽王保謀稱尊號破羌都尉張詵言於寔曰南陽王忘莫大之耻而欲自尊天不授其圖籙徳不足以應運終非濟時救難者也晉王眀徳昭藩先帝憑屬宜表稱聖徳勸即尊號𫝊檄諸藩副言相府則欲競之心息未合之徒散矣從之於是馳檄天下推崇晉王為天子遣牙門蔡忠奉表江南勸即尊位張駿嗣其季父茂為凉州牧猶稱建興十二年承元帝凶問駿大臨三日羣寮勸駿稱凉王領秦凉二州牧置公卿百官如魏武晉文故事駿曰此非人臣所宜言也敢有言此者罪在不赦然境内皆稱之為王後晉成帝遣治書御史耿訪拜駿鎮西大將軍咸和八年始達凉州駿受詔遣部曲督王豐等報謝上䟽稱臣而不奉正朔猶稱建興二十一年九月復使訪随豐等齎印板進駿大將軍自是每嵗使命不絶後駿遣叅軍麴䕶上䟽曰東西隔塞踰歴年載夙承聖徳心繋本朝而江吳寂蔑餘波莫及雖肆力脩塗同盟靡恤奉詔之日悲喜交并天恩光被褒崇輝渥即以臣為大將軍都督陜西雍秦凉州諸軍事休寵振赫萬里懐戴嘉命顯至銜感屏營伏惟陛下天挺岐嶷堂構晉室遭家不造播幸吳楚宗廟有黍離之哀園陵有殄廢之痛普天咨嗟含氣悲傷臣専命一方職在斧鉞遐域僻陋勢極秦隴勒雄既死人懐反正謂季龍李期之命曾不崇朝而皆纂繼凶逆鴟張有年東西遼曠聲援不接遂使桃蟲鼓翼四夷諠譁向義之徒更思背誕鈆刀有干將之志螢燭希日月之光是以臣前章懇切欲齊力時討而陛下雍容江表坐觀禍敗懐目前之安替四祖之業馳檄布告徒設空文臣所以霄吟荒漠痛心長路者也且兆庶離主漸周經世先老消落後生靡識忠良受梟懸之罰羣凶貪縱横之利懐忠戀故日月告流雖時有尚義之士畏逼首領哀歎窮廬臣聞少康中興由於一旅光武嗣漢衆不盈百祀夏配天不失舊物况以荆揚慓悍神州突騎吞噬遺羯在於掌握哉願陛下敷𢎞臣慮永念先績勅司空鑒征西亮等汎舟江沔使首尾俱至也自後駿遣使多為季龍所獲不達張重華嗣父駿為凉州牧凉王晉遣侍御史俞歸拜重華凉州刺史假節重華遣使上䟽曰季龍自斃遺燼逰魂取亂侮亡覩機則發臣今遣前鋒都督裴恒歩騎七萬遥出隴上以俟聖朝赫然之威山東騷擾不足厝懐長安膏腴宜速平蕩臣守任西荒山川悠逺大誓六軍不及聴受之末猛將鷹揚不豫告成之次瞻雲望日孤憤義傷彈劍慷慨中情藴結於是康獻皇后詔報遣使進重華為凉州牧張天錫自號大將軍校尉凉州牧西平公遣司馬綸騫奉章請命并送御史俞歸還京都海西公太和初詔以天錫為大將軍大都督隴右闗中諸軍事䕶羌校尉凉州刺史西平公時苻堅强盛每攻之兵無寜嵗天錫甚懼乃立壇刑牲率典軍將軍張寜中堅將軍馬芮等遥與晉三公盟誓獻書大司馬桓温尅六年夏誓同大舉遣從事中郎韓博奮節將軍康妙奉表并送盟文孝武寜康元年天錫貢方物西凉李暠字𤣥盛衆推凉公秦凉二州牧改元為建初遣舎人黄始梁興間行奉表詣闕曰昔漢運將終三國鼎峙鈞天之歴數鍾皇晉髙祖闡鴻基景文𢎞帝業嗣武受終要荒率服六合同風宇宙齊貫而恵皇失馭權臣亂紀懐愍屯邅蒙塵於外懸象上分九服下裂眷言顧之普天同憾伏惟中宗元皇帝基天紹命遷幸江表荆揚蒙𢎞覆之矜五都為荒榛之藪故太尉西平武公軌當元康之初屬擾攘之際受命典方出撫北州威畧所振聲盖海内眀盛繼統不隕前志長旌所指仍闢三秦義立兵强拓境萬里文桓嗣位奕葉載徳囊括闗西化被崐裔遐邇欵藩世脩職貢晉徳之逺揚繄此州是頼大都督大將軍天錫以英挺之姿承七世之業志匡時難克隆前勲而中年降災兵㓂侵境皇威遐邈同奬弗及以一方之師抗七州之衆兵孤力屈社稷以䘮臣聞歴數相推歸餘於終帝王之興必有閏位是以共工亂象於黄農之間秦項簒竊於周漢之際皆機不轉踵覆餗成凶自戎狄陵華已渉百齡五胡僭襲期運將杪四海顒顒懸心象魏故師次東闗趙魏莫不企踵淮南大㨗三方欣然引領伏惟陛下道恊少康徳侔光武繼天統位志清函夏至如此州世篤忠義臣之羣僚以臣髙祖東莞太守雍曾祖北地太守柔荷寵前朝忝叅時務伯祖龍驤將軍廣晉太守長寜侯卓亡祖武衛將軍天水太守安世亭侯弇毗佐凉州著功秦隴殊寵之隆勒於天府妄臣無庸輙依竇融故事廹臣以義而上臣大都督大將軍凉公領秦凉二州牧䕶羌校尉臣以為荆楚替貢齊桓興召陵之師諸侯不恭晉文起城濮之役用能勲光踐土業隆一匡九域頼其𢎞猷春秋恕其専命功冠當時美垂千祀况今帝居未復諸夏昏墊大禹所經奄為戎墟五嶽神山狄汙其三九州名都夷穢其七辛有所言於兹而騐微臣所以叩心絶氣忘寢與食彫肝焦慮不遑寜息者也江凉雖遥義誠宻邇風雲茍通實如唇齒臣雖名未結於天臺量未著於海内然憑頼累祖寵光餘烈義不細辭以稽大務輙順羣議亡身即事轅弱任重懼忝威命昔在春秋諸侯宗周國皆稱元以布時令今天臺邈逺正朔未加發號施令無以紀數輙年冠建初以崇國憲冀仗寵靈全制一方使義誠著於所天𤣥風扇於九壤殉命灰身隕越慷慨又以前表未報復遣沙門法泉間行奉表曰江山悠隔朝宗無階延首雲極翹企遐方伏惟陛下應期踐位景福自天臣去乙巳嵗順從羣議假統方城時遣舎人黄始奉表通誠遥途嶮曠未知達否吳凉懸邈蜂蠆充衢方珍貢使無繇展御謹副寫来章或希簡達臣以其嵗進師酒泉戒戎廣平庶攘茨穢而黠虜恣睢未率威教憑守巢穴阻臣前路竊以諸事草創倉帑未盈故息兵按甲務農養士時移莭邁荏苒三年撫劒歎憤以日成嵗今資儲已足器械已充西招城郭之兵北引丁零之衆冀憑國威席卷河隴揚旌秦川承望詔旨盡節竭誠隕越為效又臣州界逈逺勍㓂未除當須鎮副為行留部分輙假臣世子士業監前鋒諸軍事撫軍將軍䕶羌校尉督攝前軍為臣先驅又燉煌郡大衆殷制御西域管轄萬里為軍國之本輙以次子讓為寜朔將軍西夷校尉燉煌太守統攝崐裔輯寜殊方自餘諸子皆在戎間率先士伍臣總督大綱畢在輸力臨機制命動靜續聞晉義熙元年又遣使奉表稱藩李歆字士業暠之子暠卒府寮奉為凉公凉州牧朝廷以士業為持莭都督七郡諸軍事鎮西大將軍䕶羌校尉酒泉公前燕慕容廆父渉歸以全栁城之功進拜鮮卑單于遷邑於遼東北於是漸慕諸夏之風廆初立數宼遼西及伐滅扶餘東夷校尉何龕遣督䕶賈沉戰敗之廆謀於衆曰吾先公以来世奉中國且華裔理殊强弱固别豈能與晉競乎何為不和以害吾百姓耶乃遣使来降晉武帝嘉之拜鮮卑都督建武初元帝為瑯邪王承制拜廆假節散騎常侍都督遼左雜夷流人諸軍事龍驤將軍大單于昌黎公廆讓而不受征虜將軍魯昌說廆曰今兩京傾沒天子蒙塵瑯邪承制江東實人命所系眀公雄據海朔跨總一方而諸部酋衆稱兵未遵化者盖以官非王命又自以為强今宜通使瑯邪勸承大統然後敷宣帝命以伐有罪誰敢不從廆善之乃遣其長史王濟浮海勸進及元帝即尊位遣謁者陶遼重申前命廆固讓公封及平宇文悉獨官俘其衆獲皇帝玉璽三紐遣長史裴嶷送建業晉遣使者拜廆監平州諸軍事安北將軍平州刺史增邑三千户尋加使持莭都督幽州東夷諸軍事車騎將軍平州牧進封遼東郡公邑一萬户常侍單于並如故丹書鐵劵承制海東命備官司置平州守宰成帝即位加廆侍中位特進咸和五年又加開府儀同三司固辭不受又遣使與太尉陶侃箋曰眀公使君轂下振徳曜威撫寜方夏勞心文武士馬無恙欽髙仰止注情彌久王途嶮逺隔以燕越每瞻江湄延首遐外天降艱難禍害屢臻舊都不守奄為虜廷使皇輿遷韋假勢吳楚大晉啟基祚流萬世天命未改元象著眀是以義烈之士深懐憤勇猥以功薄受國殊寵上不能掃除羣羯下不能身赴國難仍縱賊臣屢逼京輦王敦倡禍於前蘇峻肆毒於後凶暴過於董卓惡逆甚於傕汜普天率土誰不同忿深怪文武之士過荷朝榮不能滅中原之㓂刷天下之耻君侯植根江陽發曜荆衡仗葉公之權有包胥之志而令白公伍員各得極其暴竊為丘眀耻之區區楚國子重之徒猶耻君弱羣臣不及先大夫厲已戒衆以服陳鄭越之種蠡尚能弼佐勾踐取威黄池况今吳士英賢比肩而不輔翼聖主陵江北伐以義聲之直討逆暴之羯檄命舊邦之士招懐存本之人豈不若因風振落頓坂走輪哉且孫氏之初以長沙之衆摧破董卓志扶漢室雖中遇㓂害雅志不遂原其誠心乃忽身命及權據揚越外仗周張内馮顧陸距魏赤壁尅取襄陽自兹以降世主相襲咸能侵逼徐豫令魏朝旰食不知今之江表為賢雋匿智蔵其勇畧耶將吕蒙凌統髙蹤曠世哉况今㓙羯虐暴中州人士逼促其顛沛之危甚於累卵假號之强衆心所去敵有釁矣易可震蕩王郎袁術雖自詐偽皆基淺根微禍不旋踵此皆君侯之所聞見者矣王司徒清虚寡欲善於全已昔曹參亦崇此道著畫一之稱也庾公居元舅之尊處申伯之任超然髙蹈眀智之權廆於㓂難之際受大晉累世之恩自恨絶域無益聖朝徒繫心萬里望風懐憤今海内之望足為楚漢輕重者惟在君侯若戮力盡心悉五州之衆據兖豫之郊使向義之士倒戈釋甲則羯㓂必滅國耻必除廆在一方敢不竭命孤軍輕進不足使勒畏首畏尾則懐舊之士欲為内應無繇自發故也故逺陳寫言不宣盡廆使者遭風没海其後廆更寫前箋并齎其東夷校尉封抽行遼東相韓矯等三十餘人䟽上侃府曰自古有國有家鮮不極盛而衰自大晉龍興尅平崏㑹神武之畧邁蹤前史恵皇之末后黨搆難禍結京畿釁成公族遂使羯㓂乘虚傾覆諸夏舊都淪滅山陵毁掘人神悲悼幽眀發憤昔獫狁之强匈奴之盛未有如今日羯㓂之暴跨躡華裔盗稱尊號者也天祚有晉挺授英傑車騎將軍慕容廆自弱冠蒞國忠於王室眀允恭肅志在立勲屬海内分離皇輿遷幸元皇中興初倡大業肅祖繼統蕩平江外廆雖限以山海隔以羯㓂翹首引領係心京師嘗假寤寐欲憂國忘身貢篚相尋連舟載路戎不稅駕動成義舉今羯㓂滔天怙其醜類樹基趙魏跨畧燕齊廆雖率義衆誅討大逆然管仲相齊猶曰寵不足以御下况廆輔翼王室有定覇之功而位卑爵輕九命未加非所以寵異藩翰崇奬殊勲也方今詔命隔絶王路嶮逺貢使徃来動彌年載今燕之舊壤北周沙漠東盡樂浪西暨代山南極冀方而悉為虜廷非復國家之域將佐等以為宜逺遵周室近凖漢初進封廆為燕王行大將軍事上以總統諸部下以割損賦境使冀州之人望風向化廆得祗承詔命率合諸國奉辭夷逆以成桓文之功茍利社稷専之可也而廆固執謙光守莭彌髙每詔所加讓動積年非將佐等所能敦逼今區區所陳不欲茍相崇重而愚情至心實為國計侃報抽等書其畧曰車騎將軍憂國忘身貢篚載路羯賊求和執使送之西討段國北征塞外逺綏索頭荒服以獻惟北部未賔屢遣征伐又知東方官號髙下齊班進無統攝之權退無等差之降欲進車騎為燕王一二具之夫功成進爵古之成制也車騎雖未能為官摧勒然忠義竭誠今騰牋上聽可否遲速當任天臺也朝議未定八年廆卒乃止慕容皝嗣父位晉成帝遣謁者徐孟閭丘幸等持莭拜皝鎮軍大將軍平州刺史大單于遼東公持節都督承制封拜一如廆故事皝遣長史劉斌郎中令楊景送徐孟等歸於京師成帝又遣使進皝為征北大將軍幽州牧領平州刺史加散騎常侍增邑萬户持節都督單于公如故皝雖稱燕王未有朝命乃遣其長史劉祥獻㨗京師兼言權假之意并請大舉討平中原晉庾冰以其絶逺非所能制遂與何充等奏聴皝稱燕王於是成帝使兼大鴻臚郭希持節拜慕容皝侍中大都督河北諸軍事大將軍燕王其餘官皆如故封諸功臣百餘人慕容雋僭即燕王位穆帝使謁者陳沈拜雋為使持節侍中大都督都督河北諸軍事幽冀并平四州牧大將軍大單于燕王承制封拜一如廆皝故事前秦苻健嗣父洪位去秦王之號稱晉爵遣使告䘮於京師且聴王命時京兆杜洪竊據長安健自稱晉征西大將軍都督闗中諸軍事雍州刺史盡衆西行兵至長安洪奔司竹健入而都之遣使獻㨗京師並修好於桓温後秦姚興僭即帝位宋髙祖誅桓𤣥遣參軍衡凱之詣姚顯請通和顯遣吉黙報之自是聘使不絶晉求南鄉諸郡興許之羣臣咸諫以為不可興曰天下之善一也劉裕㧞萃起微夹輔晉室吾何惜數郡而不成其美乎遂割南鄉順陽新野舞隂等十二郡歸於晉後興遣晉將軍劉嵩等二百三十七人歸於建業時魏遣使聘於興且請婚興大恱遣其吏部郎嚴康報聘并致方物後蜀李雄僭即帝位凉州張駿遣使遺雄書勸去尊號稱藩於晉雄復書曰吾過為士大夫所推然本無心於帝王也進思為晉室元功之臣退思共為守藩之將掃除氛埃以康帝宇而晉室凌遲徳聲不振引領東望積有年月矣㑹獲来貺情在闇室有何己巳如欲逺遵楚漢尊崇義帝春秋之義於斯莫大駿重其言使聘相繼雄以中原䘮亂乃頻遣使朝貢與晉穆帝分天下張駿先遣傅頴假道於蜀通表京師雄弗許駿又遣治中從事張淳稱藩於雄託以假道雄大恱謂淳曰貴主英名盖世土險兵强何不自稱帝王乎淳曰寡君以乃祖世濟忠良未能雪天下之耻解衆人之倒懸日昃忘食枕戈待旦以瑯琊中興江東故萬里翼戴將成桓文之事何言自取耶雄有慙色曰我乃祖乃父亦是晉臣徃與六郡避難此地為同盟所推遂有今日瑯琊若能中興大晉於中夏亦當率衆輔之淳還通表京師天子嘉之北凉沮渠蒙遜僭稱河西王晉益州刺史朱齡石遣使来聘蒙遜遣舎人黄迅報聘益州因表曰上天降禍四海分離靈耀擁於南裔蒼生沒於醜虜陛下累聖重光道邁周漢純風所被八表宅心臣雖被髪邉徼才非時雋謬為河右遺黎推為盟主臣之先人世荷恩寵雖歴夷嶮執義不回首傾朝陽乃心王室去冬益州刺史朱齡石遣使詣臣始具朝廷休問承車騎將軍劉裕秣馬揮戈以中原為事可謂天賛大晉篤生英輔臣聞少康之興大夏光武之復漢業皆奮劒而起衆無一旅猶能成配天之功著車攻之詠陛下據全楚之地擁荆揚之鋭而可垂拱晏然棄二京以資戎虜若六軍北軫尅復有期臣請率河西戎為晉右翼前驅宋髙祖即位蒙遜為凉州牧河西王遣使奉表求周易及子集諸書太祖並賜之合四百七十五卷又就司徒王𢎞求捜神記𢎞寫與之沮渠茂䖍蒙遜第三子衆議推之為主宋太祖時上表奉獻方物並獻周生子十三卷時務論十二卷三國總畧二十卷俗問十一卷十三州志十卷文檢六卷四科傳四卷燉煌實録十卷凉書十卷漢皇徳傳二十五卷王典七卷魏駮九卷謝艾集八卷古今字二卷乘丘先生三卷周髀一卷皇帝王歴三合紀一卷趙􅜫傳并甲寅元歴一卷孔子讃一卷合一百五十四卷茂䖍又求晉趙起居注諸雜書數十件閩王延鈞審知子也審知唐末為威武軍節度福建觀察使累遷檢校太保封瑯琊郡王梁朝開國累加中書令封閩王是時楊氏據江淮故閩中與中國隔越審知每嵗遣使朝貢汎海至登莱抵岸徃復頗有風水之患漂溺者十四五後唐莊宗即位遣使奉貢制加功臣進爵邑審知卒延鈞襲父位未㡬自稱帝國號大閩改元龍啓然猶稱藩於朝廷王昶嗣偽位朝廷因授昶福建節度使晉天福三年遣使貢奉至闕止稱閩王其子繼恭稱節度使晉祖乃下制封昶為閩國王吳楊溥襲其兄渥僭號後唐同光元年莊宗平梁遷都洛陽十一月溥遣司農卿盧蘋入貢金器二百兩銀器三千兩羅錦一千二百疋龍腦香五斤龍鳯絲鞋一百事細茶白檀丁香藥物等又遣使章景来朝稱大吳國主致書上大唐皇帝其辭旨卑遜有同牋表二年八月甲申復遣司農卿盧蘋獻方物上皇太后金花銀器衣段等二年三月壬子又遣使来朝四月丙寅又遣使貢方物丁丑獻鴉山茶含膏茶己丑上皇太后賀書為帝巡幸還宫八月遣使雷峴獻新茶九月壬寅以皇太妃䘮獻慰禮銀絹二千九月癸丑淮南使張彦鑄對於中興殿賜分物十月以皇太后䘮遣使張瑑奉慰致禮三年閏十二月甲辰遣使貢長至賀禮乙夘遣使雷峴獻賀正禮幣金銀二千兩羅錦千疋四年二月辛亥遣右驍衛將軍蘇䖍獻金花銀器錦綺綾羅千段丁酉淮南使進奉縑銀御服賀平蜀四月庚子眀宗初即位遣使楊殷進新茶天成二年四月差右威衛將軍雷峴進銀千兩綾羅錦綺千疋脩重午之禮賜雷峴酒食於客省賜絹五十疋鈔羅盂子各一隻五月進新茶九月差人獻應聖莭金器百兩金花銀器千兩雜色綾錦千疋三年二月庚辰差通事舎人劉𫝊忠進賀收復汴州禮物眀宗以荆南旅拒通連淮夷不納其使命放還之前蜀王衍襲其父建偽號後唐莊宗平梁遣使告㨗於蜀蜀人恼懼致禮復命稱大蜀國王致書上大唐皇帝劉陟僣號於廣州及聞莊宗平梁遣偽宫苑使何詞来聘稱大漢國王致書上大唐皇帝李景襲其父昪偽號周顯徳三年世宗親征淮南二月壬午景遣其臣鍾謨李徳眀等奉表来上表云臣聞捨短從長乃推通理以小事大著在格言實徵自古之来即有為臣之禮既逢昭代幸履良途伏惟皇帝陛下體上聖之姿膺下武之運恊一千而命世繼八百以卜年化被區中恩加海外虎歩則時欽英主龍飛則圖應真人臣僻在一方謬承餘業比狥軍民之欲乃居后辟之崇雖仰慕華風而莫通上國伏自初勞將帥逺渉封疆叙寸誠則去使甚艱於間路則單凾兩獻載惟素願方俟睿慈遽審大駕天臨六師雷動猥以遐陬之俗親為䟦履之行循省伏深兢畏無所豈因薄質有累蒸人伏惟皇帝陛下義在寜民心惟庇物臣儻或不思信順何以上恊寛仁今則仰望髙眀俯存億兆䖍將下國永附天朝已命邉城各令固守見於諸路皆俾戢軍仰期宸旨纔頒當發専人布告伏冀詔虎賁而歸國於雉堞以廻兵萬乘千官免馳驅於原隰地征土貢常奔走於嵗時質在神眀誓於天地庶使闔境荷咸寜之徳大君有光被之功凡在炤臨孰不歸慕謹令翰林學士户部侍郎臣鍾謨工部侍郎文理院學士臣李徳眀奉表以聞仍進金器一千兩銀器五千兩錦綺綾羅二千疋及御衣犀帯茶茗藥物等又進犒軍牛五百頭酒二千石丙午景遣其臣孫晟王崇質等奉表来上表云伏自上將逺臨六師尋至始貢書於間道旋奉表於行宫䖍仰天光實祈睿旨伏聞朝陽委炤爝火収光春雷發音蟄户知令惟變通之有在則去就以斯存所以徘徊下風瞻望時雨載傾捧日輙叙攀鱗㐲惟皇帝陛下受命上𤣥門階中立仗武功而戡亂畧敷文徳以化逺人故得九鼎慶基復昌於寳位十年嘉運允正於璿衡實帝道之昭融知真人之有立臣幸因順動敢慕文眀特遣翰林學士尚書户部侍郎臣鍾謨尚書工部侍郎文理院學士臣李徳眀同奉表章且申獻贄請從臣事仍備嵗輸冀闔境之咸寜識人君之廣覆不遥日下恭達御前既推向化之誠更露繇衷之願臣伏念天祐之後率土分摧或跨據江山或革遷朝代皆為司牧各拯黎元臣繇是以嗣先基獲安江表誠以瞻烏未定附鳯何從今則青雲之候眀懸白水之符斯應仰祈聲教俯被遐方豈可逺動和鑾上勞薄伐有拒懐来之徳非誠信順之心臣自遣鍾謨李徳眀入覲天朝具陳懇􅅃便於水陸皆戢兵師方冀寛仁下安億兆旋進歴陽之旌斾又屯隋苑之車徒縁臣既寫傾依悉曾止約令罷警嚴之備不為悍禦之謀其或皇帝陛下未息雷霆靡矜葵藿人當積懼衆必貪生若接前鋒偶成小競在其非敵固亦可知但以無所為圗出於不獲必於軍庶重見傷殘豈惟凟大君亭育之慈抑乃増下臣咎釁之責進退惟谷夙夜靡遑臣復思東則㑹稽南惟湘楚盡承正􅃋俾主封疆自皇帝陛下允屬天飛方知海納雖無外之化徒仰祝於皇風而事大之儀闕卑通於疆吏惟憑𤣥造猥念後期方今八表未同一戎兹始儻或首於下國許作外臣則柔逺之風其誰不服無戰之勝自古獨髙臣幸與黎人共依聖政蚩蚩之俗期息於江淮蕩蕩之風廣流於華裔永將菲薄長奉欽眀白日誓心皇天可質䖍輸肺腑上祈冕旒顒俟聖言以聴朝命今遣守司空臣孫晟守禮部尚書臣王崇質部署宣給軍士物上進金一千兩銀十萬兩羅綺二千疋三月己未景以王崇質等歸國復遣使奉表来上表云臣叨居舊邦獲嗣先業聖人有作曽無先見之眀王祭弗供果致後時之責六龍電邁萬騎雲屯舉國震驚羣臣惴悚遂馳下使徑詣行宫乞停薄伐之師請預外臣之籍天聴懸邈聖問未回通宵九驚一食三歎繇是繼飛宻表再遣行人叙江河羡海之心指葵藿向陽之意皇帝陛下自天生徳命世應期含容每法於方輿亭育不遺於下國先令副介宻導宸慈綸旨優隆乾文炳煥仰認懐来之道喜則可知深惟事大之言服之無斁五年三月丙午景遣其臣偽宰相馮延巳偽給事中田霖奉表進銀一十萬兩絹一十萬疋錢一十萬貫茶五十萬斤米三十萬石表云臣聞盟津初㑹仗黄鉞以臨戎銅馬既歸推赤心而服衆一則顯周君之雄武一則表漢后之仁慈用能定大業於一戎紹洪基於四百兼資具美允屬聖君伏惟皇帝陛下量包終古徳合上𤣥子育黎民風行號令以其執迷未復則薄賜徂征以其向化知歸則俯垂信納仰荷含容之施彌堅傾附之念然以淮海遐陬東南下國親勞翠盖乆駐王師以是憂慙不遑啓處今既六師返斾萬乘還京合申解甲之儀粗表充庭之實但以自經保境今已累年供給既繁困虚頗甚曽無厚幣可達深誠然又思内附已来聖慈益厚雖在照臨之下有如骨肉之恩縱悉力以貢輸終厚顔於微鮮今有少物色以備宣給軍士謹遣左僕射平章事臣馮延巳給事中臣田霖部署上進延巳因稱李景命進納漢陽汶川二縣是二縣在大江之北元𨽻鄂州景以既畫疆為界故歸於我辛亥景遣其臣偽臨汝郡公徐遼偽客省使尚全恭奉表来上買宴錢二百萬表云臣聞聖人制禮重尊奬之心王者㑹朝宗燕享之事是以此日輙薦微誠竊以臣幸能迷復方認懐来决心既嚮於皇風注目每瞻於清蹕伏自陪臣入奉帝誥薦臨頓安下國之生靈俱荷大君之化育雖復尋令宰輔専拜冕旒少傾貢奉之儀仰答含容之徳然臣静思内附欣奉至尊既推示其赤心又逈隆於乃睠豈將常禮可表深衷是以别命使臣更伸誠懇俾展犒師之禮仍陳買宴之儀躬詣行朝聊資髙㑹庶盡傾於臣節如得面於天顔伏惟皇帝陛下承天子民溥恩廣施四海識真人之應萬方知王澤之深固以包括古今絲綸典則盛矣美矣無得而稱凡仰照臨孰不懽恱今遣客省使臣尚全恭専詣行闕進獻犒軍買宴物色又表云臣幸將下國仰奉聖朝特沐睿慈俯垂開納已陳尠禮請展御筵因思盡竭於深衷是敢别陳於至懇伏以柏梁髙㑹宸極居尊朝臣咸侍於冕旒天樂盛張於金石莫不競輸庭實齊獻夀盃而臣僻處遐陬逈承乃睠雖心存於魏闕奈日逺於長安無繇親咫尺之顔何以罄勤拳之意遂令戚屬躬拜殿庭庶代外臣獲叅執事納忠則厚致禮甚微誠慙野老之芹願獻華封之祝謹差臨汝郡公臣徐遼部署宴上進獻物色詣闕時景又選伶官五十人各齎樂器與遼偕至且言来獻夀觴四月癸丑帝以江南遣使買宴是日乃宣召從官及江南進奉使馮延巳已下宴於行宫奏江南樂江南偽命臨汝郡公徐遼代李景捧夀觴以獻仍進上金酒器一副御衣一襲戲衣魚犀帯一條金器五百兩銀器五千兩銀龍一座銀鳯二隻錦綺千段細馬二匹金銀鞍轡各一副玉鞭玳瑁鞭各一五月己亥侍御使李重進自淮南差人上言李景令人齎牛酒来犒師五月戊子景遣偽供奉官傅滌奉表起居仍進細茶五百斤清酒百缾八月甲申遣其臣陸昭符始置邸於京師辛丑太府卿馮延巳魯衛尉少卿鍾謨自江南使廽奉李景手表来上手表者盖景親書以表其䖍懇也表云臣謬承先業僻在一隅不識天命得罪上國困而後伏何足可多許以不亡臣之幸也豈意皇帝陛下辱異常之顧垂不世之私外雖君臣内若骨肉殊恩異禮無得而言退日揣循何階及此且古人有一飯之恩必報臣竊慕之故自結髪已来未嘗敢輕受人恵雖徃事君父亦嘗以退讓自居不圗今辰頓受殊遇此臣所以朝夕慙恨恐上報之無從也然天地之功厚矣父母之恩深矣而子不謝恩於父人且何報於天以此思之則惟有赤心可酬大造况臣嘗嗟世網别貯素懐方以子孫託於陛下區區之意可勝言哉兼臣比乞鍾謨過江蓋有情事上告鍾謨又已奉聖旨許其放廽伏乞纔到京師即令單騎歸國庶於所奏早奉勅裁瞻望冕旒不勝懇禱又表云臣聞天秩有禮位已定於髙卑王者無私事必循於軌轍儻臣下稍踰名分則朝廷實紊等夷情所難安理須上訴竊以臣比承舊制有昧先㡬勞萬乘之時巡方傾改事慶千年之嘉㑹固已知歸伏惟皇帝陛下禀上聖之姿有髙世之行囊括四海澤潤先民眀目達聰道均有戴東征西怨化被無垠已觀混一之期即仰登封之盛而臣爰從欵附屢奉徳音陛下煦嫗情深優容義切全却藩方之禮惟頒咫尺之書粤在事初便知恩遇向者未遑堅讓今兹敢瀝至誠且臣頃以徳薄道乖時危事蹙獻誠以奉陛下請命以庇國人獲保先基賜之南服莫大之恵曠古未聞微臣退思所享已極豈於殊禮可以乆當伏乞皇帝陛下深鑒卑衷終全舊制凡廽誥命乞降詔書庶無屈於至尊且稍安於逺服乃心懇禱無所寄言又貢謝賜欽天歴及嵗候歴日表各一函又表乞賜史館書目九月遣其臣吏部尚書商崇義進賀天清莭御衣金帶及金器千兩銀器五千兩錦綺綾羅共千疋辛未又遣其臣禮部尚書朱鞏来進銀一萬兩綾絹共二萬疋稱謝恩賜國信壬子天清莭廣夀殿上夀崇義捧景表於殿前進旃檀佛象一軀細衣段千疋乳香三百斤崇義又代李景捧夀觴以獻甲戌景之世子冀進謝恩賜國信銀器五千兩錦綺綾絹五千疋十月乙巳遣其臣偽屯田郎中龔慎儀進賀冬銀器二千兩錦綺綾絹共五百疋十二月癸夘遣其臣偽工部郎中楊元鼎進賀正銀三千兩錦綺綾絹一千疋辛巳江南進奉使朱鞏商崇義等辭各賜器幣鞍馬甚厚五年閏七月景所署泉州莭度使留從效遣部將蔡仲贇繇間道奉絹表起居從效本閩中王氏之偏將也王氏失國從效據漳泉二州附庸於金陵金陵偽署為清源軍莭度使兼中書令封晉江王已十餘年矣至是聞帝平定江淮欲歸附於我故先遣使奉表来上帝優詔以答之六年五月壬子從效遣别駕黄禹錫奉表来上表云臣聞日月貞眀萬方咸照帝王英睿無所不通竊以閩嶺五州古来一鎮僻陋雖居於遐服梯航長奉於上京尋因王氏末年建城失守干戈擾攘民庶蒼黄臣此際收聚餘兵保全兩郡北連甌越南接畨禺况屬貢路未通所以親隣是附今則伏遇皇帝陛下道侔諸聖運應千年布文徳於中原紹武王之丕業憶昨上遵天意聊議南征矧以金陵已歸王化莫不華夷賔服文軌混同然臣嘗覽此書畧知徃昔竊見孫權鼎分列國地有三吳及於季年臣於大晉諸道各仍於舊貫随方率貢於中朝惟彼前規無殊此日臣生居海嶠實慕華風輙傾葵藿之心恭向照臨之徳仍進獬豸通犀帶一條白龍腦香十斤册府元龜卷二百三十二
