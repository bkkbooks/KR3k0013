body:
  text: 册府元龜卷九百五十一宋王欽若等撰總録部咎徵第二南齊安陸王子敬為楊州刺史先是有麞入廣陵城投井而死又有象至廣陵其後子敬於鎮被害始安王遥光行還入城風飄儀繖出城外遙光尋以叛誅成買為角城戍主與魏軍拒戰手所傷殺無數晨朝早起手中忽有數升血其日遂戰死黄文濟爲御史其家齋前種菖蒲忽生花光影炤壁成五采其兒見之餘人不見也少時文濟被殺王晏爲驃騎大將軍其父普耀齋前栢樹忽變成梧桐論者以爲梧桐雖有棲鳳之美而失後凋之節及晏敗果如之又未敗前見屋桷子悉是大蛇就視之猶未也晏惡之乃以紙裹桷子猶紙内搖動䔩䔩有聲晏子徳元所居帷屏無故有血灑之晏扵北山廟答賽夜還晏既醉部伍人亦飲酒羽儀錯亂前後十餘里中不復相禁制識者云此勢不復久也後數日被誅崔慧景為平西将軍假節侍中奉江夏王寶元圍臺城有一五色幡飛翔在雲中半日不見衆皆驚怪相謂曰幡者事尋當翻覆也數日慧景敗梁王茂為荆州刺史茂初以元勲髙祖賜鐘磬之樂及在江州夢鍾磬在格無故自墮心惡之及覺命奏樂既成列鐘磬在格果無故編皆絶墮地茂謂長史江詮曰此樂天子所以恵勞臣也樂既極矣䏻無憂乎俄而病少日卒王瑩除左光禄大夫開府儀同三司丹陽尹侍中瑩将拜印工鑄其印六鑄而龜六毁既成頸空不實補而用之居職六日暴疾卒河東王譽為湘州刺史以悖逆誅死初譽之将敗引鏡炤面不見其頭又見長人葢屋兩手據地瞰其齋又見白狗大如驢従城而出不知所在譽甚惡之俄而城䧟武陵王紀将僣號妖怪非一其最異者内寝栢殿柱繞節生花其莖四十有六靃靡可愛狀似蓮花識者曰王敦祅花非佳事也紀年號天正與蕭棟暗合僉曰天字二人也正字一止也棟紀僣號各一年而滅侯景自為大都督督中外諸軍事将篡奪乃矯詔自加九錫之禮置丞相以下百官陳備物於庭忽有野鳥翔于景庭上赤足丹嘴形似山鵲賊徒悉駭競射之不䏻中景既簒位所居殿嘗有鵂鶹鳥鳴景惡之每使人窮山野討捕焉又景左足上有肉瘤狀似龜戰應尅㨗瘤則隠起分眀如不勝瘤則低至景敗日瘤隠䧟肉中又景與領軍将軍王僧辯戰有流星墮其營中賊徒大駭相顧失色賊帥任約又爲陸法和所禽景乃燒營夜遁旋軍夏首元帝以僧辯為鎮東将軍開府儀同三司江州刺史封長寜縣公命即率巴陵諸軍㳂流討景攻㧞魯山仍攻郢入羅城又有大星如車輪墜賊營去地十丈變成火一時碎􅄆有龍自城出五色光曜入城前鸚鵡洲水中景聞之倍道歸建業陳周文育爲鎮南将軍討余孝勵為豫章太守熊曇朗所害初文育之據三陂有流星墜聲如雷地陷方一丈中有碎炭數斗又軍市中忽聞小兒啼一市並驚聽之在土下軍人掘得棺木長三尺文育惡之俄而見殺侯安都為鎮北将軍率衆與周文育西討王琳将發王公已下餞扵新林安都躍馬渡橋人馬俱墜水中又坐䑽内墜扵櫓井時以為不祥軍至郢州與琳合戰安都敗績與周文育徐敬成並為琳所囚後魏南安王禎為湘州刺史五月至鄴入治日暴風大雨凍死者十數人禎以旱祈雨于羣神鄴城有石虎廟人奉祀之禎告虎神像云三日不雨當加鞭罰請雨不騐遂鞭像一百是月疽發背薨禎孫中山王熈後為湘州刺史以七月入治其日大風寒雨凍死者二十餘人驢馬數十疋熙聞其祖父前事心惡之又有蛆生其庭後果兵敗而死焉北海王祥除太傅領司徒侍中録尚書事拜命之夜暴風震雷㧞其庭中桐樹大十圍倒立本處初宣武之覽政也祥聞彭城王勰有震主之慮而欲奪其司徒大懼物議故為大将軍至是乃居之天威如此識者知其不終後為人告謀反免為庶人㑹其家奴數人隂結黨軰欲以刼出祥密抄名字潜托侍婢通扵祥祥始得執省而門防主司遙見突入就祥手中攬得呈奏至夜守者以聞祥哭數聲而暴死李元䕶為齊州刺史卒病前月餘京師無故得其凶問又城外送客亭柱有人書曰李齊州死綱佐餞别者見而拭之後復如此爾朱世隆為尚書令與吏部尚書元世儁握槊忽聞局上歘然有聲一局之子盡皆倒立世隆甚惡之又曽晝寢其妻奚氏忽見一人持世隆首去奚氏驚怖就視而寝如故既覺謂妻曰向夢人斷我頭去意殊不適又此年正月晦日令僕並不上省西門不開忽有河内太守田怗家奴告省門亭長云今旦爲令王借車牛一乗終日於洛濱遊觀至晩王還省将車出東掖門始覺車上無褥請爲記識時世隆封雒平郡王故呼為令王亭長以令僕不上西門不開無車入省兼無車跡此奴固陳不已公文列訴尚書都令史謝逺疑謂妄有假借白世隆付曹推驗時都官郎穆子容窮究之奴言初来時至司空府西欲向省令王嫌遲遣二防閤捉儀力催車車入到省西門王嫌牛小繫扵闗下槐樹更将一青牛駕令王著白紗髙頂㡌短小黒色儐從軍皆羣襦袴褶握板不似常時服章遂遣一吏將奴送入省中㕔事東閣内東廂第一屋中其屋先常閉鑰子容以西門不開忽言從入此屋常閉言奴在中詰其虚罔奴云此屋若閉求得開看屋中有一板床上無席大有塵土兼有一甕米奴拂床而坐兼畫地弄甕中之米亦握㸔之定其閉者應無事驗子容與謝逺自入看之戸閉極久全無開跡及入拂床畫地蹤緒厯然米亦符同方知不謬具以此對世隆悵然意以為惡未㡬見誅髙肇為司徒及大舉伐蜀以肇為将軍都督諸軍是日肇所乗駿馬停扵神虎門外無故驚倒轉臥渠中鞍具瓦解衆咸恠異肇出惡言焉及西征行至函谷車軸中折從者皆以為不獲吉還也其後果被誅北齊琅邪王儼為大將軍録尚書事鄴北城有白馬佛塔是石季龍為澄公所作儼将脩之巫曰若動此浮圗北城失主不従破至第二級得白蛇長數丈廻旋失之數旬而敗竇㤗為中尉従神武西討為周太祖所襲自殺未行之前夜三更忽有朱衣冠幘數千人入臺云収竇中尉宿直兵吏皆驚其人入數屋俄頃而去旦視闗鍵不異方知非人皆知其必敗王琳自梁来奔為特進侍中所居屋脊無故剥破出赤蛆數升落地化為血蠕蠕而動又有龍出于門外之地雲霧起晝晦後為陳将吳眀徹所殺權㑹為著作監知太史局事加中㪚大夫自府還第在路無故馬倒遂不得語因爾暴亡㑹生平畏馬位望所至不得不乗果以此終斛律光為丞相封清河郡公爲祖珽所搆光将誅其家三鼠常晝見光寢室常投食與之一朝三䑕俱死又牀下有三物如黒猪従地出走其穴膩滑大蛇屢見屋脊其聲如彈丸落又大門横木自焚𢷬衣石自移隋燕榮為幽州總管坐毒虐贓穢徵還京師賜死先是榮家寝室無故有蛆數斛従地僨出未㡬榮死扵蛆出之處齊王􅌔大業中扵東都營第大門無故而壊㕔事栿中折識者以為不祥及従幸江都因㑹暕具法服将朝無故有血從囊中而下又坐齋中見羣䑕數十至前而死視皆無頭暕意甚惡之尋為宇文化及所害堯君素大業中為河東通守唐公義師攻之嵗餘不尅時白蛇䧏於府門兵器之端夜皆光見月餘君素為左右所害唐劉文静髙祖武徳初為戸部尚書其家中妖恠數見文静弟文起憂之遂召巫者扵星月之下披髪衘刀爲厭勝之法其愛妾失寵以状告其兄上變誅死齊王祐太宗貞觀中爲齊州都督以謀逆詔還京師賜死祐未反前數月扵齋中晝坐忽見一人云災厄甚逼可脩福以禳之言訖而滅祐但令多設佛齋餘無悛悔祐又好養鴨忽有野狸入籠中齚四十餘鴨皆斷其頭及敗同惡而誅者四十四人曹懐舜髙宗永隆中爲定襄道副總管初軍至碧綠泊軍始為營營内忽有泉水大如車輪又遇大風飄拆懐舜寝帳衆皆惡之俄為突厥所敗越王貞為豫州刺史則天垂拱中貞子博州刺史琅邪王冲據博州舉兵貞應之貞嘗逰扵城西水門橋臨水自鑑不見其首心甚惡之未㡬而及禍寜王憲𤣥宗天寶初寝疾是冬京城寒甚凝霜封樹時學者以爲春秋雨木氷即此是亦名樹介言其象介胄也憲見而嘆曰此俗謂樹稼也諺云樹稼逹官怕必有大臣當之吾其死矣數日薨楊慎矜天寳五載為御史中丞為侍御史王鉷所搆縊殺之初慎矜至温湯正食忽見一鬼物長丈餘朱衣冠幘立扵門扇後慎矜叱之良久不滅以熱羮投之乃滅無何下獄死元載爲中書侍郎平章事居長夀坊代宗大厯四年九月己夘有猛虎入城止扵載私廟命金吾将軍薛岌射生将周皓發弩手射殺之以獻十二年載被誅毁其私廟木主李希烈為淮西節度使徳宗建中初希烈于唐州得象一頭以為瑞應又上蔡襄城獲其珍寶乃是爛車缸及滑石偽印也尋而希烈死朱泚為盧龍節度使留京師建中四年七月涇原兵反迎泚為主泚自號其宅曰潜龍宫悉移内庫珍貨瓌寳以實之識者曰易稱潜龍勿用此敗徴也未㡬百姓剽奪其珍寶泚不䏻禁尋而泚敗韋執誼順宗即位初為尚書左丞平章事執誼自卑官嘗忌諱不言嶺南州縣名爲郎官時嘗與同舍詣職方觀圖每至嶺南州執誼遽命去之閉目不視及拜相還所坐堂見北壁有圖不就看七八日試就看之乃崖州圖也以為不祥甚惡之憚不䏻出口及貶貟外司戸果得崖州劉闢爲劍南西川節度使韋臯府行軍司馬闢嘗病見問疾者皆以手據地倒行入闢口闢因磔裂食之唯盧文若至則如平常故尤與文若相睦卒以同惡族其家髙駢為淮南節度使僖宗光唘元年冬府衙應門之内有隋朝大屋數間盖舊行臺也古老謂之中書門雖制度朴拙梁棟甚堅忽一日自壊識者曰故事中武徳初始畢可汗牙帳破髙祖問侍臣曰此兆何也蕭瑀曰昔魏文帝時許昌門無故自壊文帝惡之即其騐也蕭瑀上言之後眀年四月始畢可汗果死而駢之府門此時􅂺壊則知非其祥也又眀年七月有蝗行而不飛自郭西浮濠水縁城而入飛至駢道院之中驅撲不止凡松竹之屬一夕如翦所懸畫像皆齧去其頭數日之後又相食㗖至九月暴雨初霽溝竇中忽有小魚其大如指盖雨魚也占者曰有兵喪十月有大星隕于延和閣前聲若奔雷洞炤一庭自十一月雨雪至三年二月昏霧不解或曰下謀其上是時粮食騰貴殆逾十倍寒僵餒仆者日有數千棄之郊外及霽而逺坊静巷爲之一空至三月駢有寄諸従事詩末句云人間無限傷心事不得罇前折一枝盖亡滅之兆也駢果爲畢師鐸所殺梁成汭唐末爲荆南節度使時鄂州杜洪爲淮南楊行密所襲汭出師援之造一巨艦三年而成號曰和載艦上列㕔所司局有若府署之制又有齊山截海之名其宏廓可知矣及沿流東下未及鄂渚而澧朗之軍突入江陵俘掠殆盡汭之兵士咸顧其家皆無鬭志而淮冦乗之縱火以燔其艦汭投江而死又澧朗之軍既襲江陵一城士女僧道工巧皆俘載而去則和州載之名亦前定也安王友寜太祖兄子唐末爲嶺南西道節度使與青州王師範戰于石樓王師小却友寜旁自峻阜馳騎以赴敵所乗馬蹶而仆遂沒扵陣友寜将戰之前一日有大白蛇蟠扵帳中友寜心惡之既而果遇禍焉楊師厚為魏博節度使封鄴王於黎陽採巨石將紀徳政以鐵車負載驅牛數百以拽之所至之處丘墓廬舍悉皆毁壊百姓望之皆曰碑来碑来及碑石纔至而師厚卒魏人以為悲来之應後唐張文禮為鎮州牙将害其帥王鎔而自爲留後未㡬舉家咸見鬼物昏瞑之後或歌或哭又野河色變如血遊魚多死浮扵水上識者知其必敗尋而疽發背死王處直爲定州節度使嘗自頌功業為徳政碑建樓扵衙城内言有龍見其中人或覩之其状黄么蜥蜴也而不畏人處直以爲神異造龍床以安之又城東麥田有鵲數十頭平地共巢䖏直以爲巳徳令人守之識者竊論曰蟲蛇隂物比蔵山澤今據屋室人不得而有也鵲巢扵樹固其所也今止平地失其所也南方爲火火主禮禮壊則羽蟲失性以文推之上失其道不安之位果廢䖏直朱繼麟為河中節度使先是河中衙城閽者夜見婦人數十袨服靚粧僕馬炫燿自外馳騁笑語趨衙城閽者不知其故不敢詰至門排騎而入既而扄鐍如故復無人跡乃知妖鬼也又繼麟夜登逍遙樓哭聲四合詰旦訊之巷無喪者隔嵗乃族誅張遵誨為客省使自以厯位尹正與樞密使安重誨素亦相欵衷心有望扵節鉞及郊禋畢止為絳州刺史鬱鬱不樂離京之日白衣乗馬扵隼旟之下至郡無㡬而卒晉鄭阮初仕後唐為趙州刺史嘗以郡符取部内凶肆中人𨽻其籍者遣扵靑州舁喪至治郡人憚其逺願輸直百緡以免其行阮本無喪即受直放還識者曰此非吉兆也未㡬改曹州刺史爲政愈弊髙祖建義入雒為本州指揮使石重立所殺舉族無孑遺劉頎為鴻臚卿留司洛下嘗扵水南治第有古墓在其下因發之其棺柩遺骸棄扵雒水俄而疾作舉家相繼卒焉程遜為太常卿奉使吳越仲秋之夕隂瞑如晦遜嘗爲詩曰幽室有時聞鴈呌空庭無路見蟾光同僚見之訝其詩語稍異及使廻遭風水而溺焉史翰為滑州節度使白馬河決翰自祭之見一犬有角浮扵水心甚惡之後數月遘疾而卒安重榮爲鎮州節度使初後唐清泰中華温琪爲鎮帥扵城之諸門各鑄二鐵人虬髯拱立以抱其關衆謂之鐵胡重榮未舉兵前東門忽隕一鐵人頭不知其故也閽者懼乃託以爲暴風吹巨扉所落重榮小字鐵胡心惡之不復窮問又饒陽令劉巖送一水鳥文有五色重榮畜扵後潭以爲鳳雛遂有異志漸恣奢僣用玉爲魚袋将謀逆也復爲鐵鞭重數斤密令人自外獻之葢惑衆冀成非望也又鎮之牙署堂前有揭幡長竿約數十尺重榮将叛之前一日張弓弩仰望竿杪銅龍之首謂左右曰我若必有天命則當一發而中果中之左右即時拜賀盖禍之来也隂必惑之以至扵敗焉李金全爲安州節度使有親吏胡漢筠者金全愛之甚篤己亥嵗府署之竹一夕而花城壖之麥方蔪而秀大露晦㝠之中則化爲宿草郡樓有介蟲如龜而巨鱗鋭首能陷堅出扵金全足下漢筠取而焚之所乗馬人立而言庚子年正月赤雲如煙蒙冐其境中有素光如矛㦸之状南北交錯及城有夜妖金全心惡之及馬全節除安州節度金全送欵于淮夷至是而竄妓樂車馬珍奇帑蔵皆為偽将李承裕所奪與其黨數百人束身夜出曉至汶川引領北望泣下而去景延廣為侍衛都指揮使開運三年冬契丹渡淲水詔遣屯孟津将戒途由府署正門而出所乗馬騰立不進㡬墜扵地乃易乗而行時以為不祥之甚也延廣後為敵所殺桑維翰爲開封尹㑹秋霖經月不歇一日維翰出府門由西街入内至國子監門馬忽驚逸御者不䏻制維翰落水久而方蘇􅂉言私邸亦多怪異親黨咸憂之果爲張彦澤所害李濤為平章事乾祐元年三月中書厨釜鳴者三不數日又鳴者三俄又鳴者三俄又鳴者一其聲甚異至是濤罷免揚雄謂之鼓妖近類此乎史宏肇為侍衛親軍都督指揮使其第數有怪異嘗一日扵堦砌隟中有煙氣蓬勃而出禍前二日昧爽有星落于宏肇前三數歩如迸火而􅄆俄而被誅湘隂公贇為徐州節度使乾祐元年八月中有雲見五色又冬杪有鳥翔集扵鮮碧堂庭樹黄質朱喙金目青翼紺趾𤣥尾鸜鵒許大衆莫䏻識竟不見飲啄有賓佐間嘆曰野鳥入室主人将去浃旬而不知所止及郊迎馮道常所乗馬比甚馴服至是忽蹄齧奔逸人不可制乃以他馬代之時以為不祥又傳太后誥之際馮道笏墮扵地左右皆惡之将離彭城嘗一日天有白光一道自西来炤城中如晝有聲如雷時人謂之天裂又有巨星墜扵徐野殷然有聲或謂之天狗後贇果廢死周王峻為樞密使初降制除青州有司撰製旄節以備迎授前之夕其旄節有聲甚異聞者駭之主者曰安重誨授河中節亦有此異焉又所居堂陛忽然隐起如堆又夢被官府追攝入司簿院既寤心惡之以是尤加狂躁尋被誅死馬𦙍孫為太子賔客分司在雒未疾前白虺縁于庭槐驅之失所在裔孫感賦鵩之文作槐蟲賦以見志未㡬暴卒王殷為鄴都留守以太祖郊禮入覲令爲内外廵警有震主之勢人頗憂之太祖力疾坐滋徳殿降制流竄入都城乃命殺之衆情乃安是嵗鄴城寺鐘懸絶而落又火光出幡竿之上殷之入覲都人餞之離亭上馬失鐙翻墮扵地人訝其不祥太祖尋令澶帥鄭仁誨之鄴􅇻次子爲衙内指揮使不出候謁誅之遷其家屬於登州册府元龜卷九百五十一
