body:
  text: 冊府元龜卷四百二十九宋王欽若等撰將帥部守邊拓土守邊夫經武之效重乎干城守方之寄本於固圉其有董率師兵乘禦徼塞為斯民之保障控一面之走集而能内懐明畧外彰幹用分扼要害以為之備豫謹嚴斥候以戒其侵軼揚威稜以外攝宣惠和而交暢以至繕完攻戰之具開設購賞之科勵厥兵鋒以遏其内侮伺乃釁隙以窒其非心因擕離以撫懐乘衰弱而攝伏繇是邊候清謐民夷億寧不疲中國之力以成柔服之美無事薄伐之舉而弭交侵之患斯守邊之最而殿邦之効歟李牧趙將也常居代鴈門備匃奴厚遇戰士爲約曰匃奴即入盗急入收保有敢捕虜者斬匃奴毎入烽火謹輙入收保不敢戰如是數嵗亦不亡失秦蒙恬為禆將軍北逐戎狄闢地數千里以河為境累石為城樹榆為塞匈奴不敢飲馬於河置烽燧然後敢牧馬恬威振匈奴漢魏尚為雲中守匈奴逺避不近雲中之塞鄭吉㑹稽人以卒伍從軍數出西域繇是為郎吉為人强執習外國事强力而有執志者自張騫通西域李廣利征伐之後初置校尉屯田渠黎至宣帝時吉以侍郎田渠黎積榖因發諸國兵攻破車師遷衛司馬使䕶鄯善以西南道鄯音善神爵中匈奴乖亂日逐王先賢撣欲降漢使人與吉相聞吉發渠黎龜兹諸國五萬人迎日逐王口萬二千人小王將十二人隨吉至河曲頗有亡者吉追斬之遂將詣京師漢封日逐王為歸徳侯吉既破車師降日逐威振西域遂并䕶車師以西北道故號都護吉於是中西域而立幕府中西域者言最處諸國之中近逺均也中竹仲切治烏壘城鎮撫諸國誅伐懐集之漢之號令班西域矣班布也始自張騫而成於鄭吉段㑹宗為西域都護騎都尉光禄大夫西域敬其威信三年更盡還邉吏三嵗一更又為鴈門太守數年坐法免西域諸國上書願得㑹宗復為都護㑹宗既出諸國遣子弟郊迎城郭甚親附城郭諸國文齊為益州郡太守率勵兵馬脩障塞降集羣夷甚得其和後漢竇融行河西五郡大將軍事脩兵馬習戰射明烽燧之警羌胡犯塞融輙自將與諸郡相救皆如符要赴敵不失期契也毎輒自破之其後匈奴懲乂懲創也説文云乂亦懲也稀復侵冦而保塞羌胡皆震服親附蘇竟王莽末為代郡中尉時匈奴擾亂北邉多罹其禍竟終完輯一郡光武即位就拜代郡太守使固塞以拒匈奴王覇為上谷太守領屯兵是時盧芳與匈奴烏桓連兵冦盗尤數縁邉愁苦詔覇將弛刑徒六千與杜茂治飛狐道堆石布土築起亭障自代至平城三百餘里頗識邉事後南單于烏桓降服北邉無事馬成以建武四年為陽武將軍屯常山中山以備北邉領建義大將軍朱祐營又代驃騎大將軍杜茂繕治障塞自西河至渭橋西河今勝州冨昌縣也渭橋本名横橋在今咸陽縣東南河上至安邑前漢書曰河上地名故秦内史髙帝二年改為河上郡武帝分為左馮翊太原至井陘太原今并州也井陘今屬常山郡中山至鄴皆築堡壁起烽燧十里一候在事五六年帝以成勤勞徴還京師邉人多上書求請者復遣成還屯及南單于保塞北方無事馬援建武十一年為隴西太守援乃發步騎三千擊破先零羌於臨洮是時朝臣以金城破羌之西破羌縣名塗逺多冦議欲棄之援上言破羌以西城多完牢易可依固其田土肥壤灌溉流通如令羌在湟中湟水名則為害不休不可棄也光武然之於是詔武威太守梁統也令悉還金城客民在武威者歸者三千餘口使各反舊邑援奏為置長吏繕城郭起塢候開導水田勸以耕牧郡中樂業范遷建武中為漁陽太守以智謀安邉匈奴不敢入界祭彤以明帝永平元年為遼東太守賂鮮卑大都䕶偏河擊赤山烏桓破斬之於是鮮卑大人皆來歸附並詣遼東受賞賜青徐二州給錢嵗二億七十萬為常明章二世保塞無事西自武威東盡𤣥莬及樂浪胡夷皆來内附野無風塵乃悉罷縁邉屯兵鄭衆永平中為武威太守謹脩邉備虜不敢犯鄭純為永昌郡西部都尉為政清潔化行夷貊君長感慕皆獻土珍頌徳美天子嘉之即以為永昌太守純與哀牢夷人約邑豪嵗輸布貫頭衣一領鹽一斛以為常賦夷俗安之為都尉太守十年卒官耿恭章帝初為征西將軍遣案行凉州邉境勞賜保塞羌胡進屯酒泉授戊巳校尉建初元年拜度遼將軍視事七年匈奴懐其恩信鄧訓建初三年為謁者時上谷太守任興謀反詔訓將黎陽營兵屯狐奴以防其變訓撫接邉民為幽部所歸遷烏桓校尉鮮卑開其威信皆不敢南近塞下後代張紆為護羌校尉撫接歸附威信大行遂罷屯兵各令歸郡惟置弛刑徒二千餘人分以屯田為貧人耕種脩城郭塢壁而已李恂韋帝時為西域副校尉北匈奴數斷西域車師伊吾龍沙以西使命不得通恂設購賞遂斬虜帥獻首軍門自是道路夷清威恩並行梁慬以殤帝延平元年為西域副校尉安帝永初元年罷都護還至燉煌㑹衆羌反叛詔留慬為諸軍援慬進兵擊大破之虜遂散走羌大豪三百餘人詣慬降并慰遣還故地河西郡復安慬受詔當屯金城聞羌轉冦三輔即引兵赴擊之朝廷嘉之委以西方事令為諸軍節度鄧遵為度遼將軍安帝元初六年鮮卑入馬城塞遵擊破之又發積射士三千人馬三千匹詣度遼營屯守种暠為尚書㑹匈奴冦并凉二州桓帝擢暠為度遼將軍暠到營所先宣恩信誘降諸胡其有不服然後加討羌虜先時有生見獲執於郡縣者悉遣還之誠心懐撫信賞分明繇是羌胡龜兹莎車烏孫等皆求順服暠乃去􅇏燧除候望邉方晏然無警張奐以桓帝永夀初為安定屬國都尉初到職而南匈奴左薁鞬臺耆且渠伯徳等入冦美稷奐進屯長城東羌諸豪遂相率與奐和親共擊薁鞬等破之伯徳惶恐將其衆降郡界以寧後遷度遼將軍數載間幽并清靜第五訪永夀初為護羌校尉甚有威惠西垂無事皇甫規延熹四年為中郎將持節監闗西兵討羌零吾等先零諸種羌慕䂓威信相勸降者十餘萬後又為度遼將軍在事數嵗北邉威服橋𤣥桓帝末為度遼將軍至鎮休兵養士然後督諸將守討擊北塞及高麗嗣子伯固等皆破散退走在職三年邉境安靜劉虞為幽州刺史民夷感其徳化自鮮卑烏桓夫餘濊貊之軰皆隨時朝貢無敢擾邉者百姓歌悦之魏梁習以别部司馬為并州刺史單于恭順名王稽顙部曲服事供職同於編户邉境肅清田豫字國讓漁陽雍奴人也文帝初北狄彊盛侵擾邉塞乃使持節護烏桓校尉為校尉九年其御夷狄常摧抑兼并乖散彊猾凡逋亡姦宄為胡作計不利官者豫皆搆刺攪離使㐫邪之謀不遂張既為凉州刺史以便宜從事遂上疏請治左城築障塞置烽候邸閣以備胡毌丘興黄初中為武威太守伐叛柔服開通河右郝昭為雜號將軍鎮守河西十餘年民吏畏服陳泰字𤣥伯為并州刺史振威將軍使持節護匈奴中郎將懐柔夷民甚有威惠牽招為鴈門太守招既教民戰陣又表復烏桓五百餘家租庸調使備鞍馬逺遣偵候虜每犯塞勒兵逆擊來輙摧破於是吏民膽氣日鋭荒野無虞繕治陘北故上舘城置屯戍以鎮内外夷虜大小莫不歸心諸亡叛雖親戚不敢藏匿咸悉收送於是野居晏閑冦賊靜息在郡十二年威風逺振其治邉之稱次於田豫百姓追思之倉慈為燉煌太守當日西域雜胡欲來貢獻而諸豪族多逆斷絶既與貿遷欺詐侮易多不得分明胡常怨望慈皆勞之欲詣洛者為封過所欲從郡還者官為平取輙以府見物與共交市使吏民護送道路繇是民夷翕然稱其徳意劉靖為鎮北將軍假節都督河北諸軍事靖以為經常之大法莫善於守防使民夷有别遂開拓邉宇屯據險要晉張華為都督幽州諸軍事領護烏桓校尉安北將軍撫納新舊戎夏懐之東夷馬韓新彌諸國依山帶海去州四千餘里歴世未附者二十餘國并遣使朝獻於是逺夷賓服四境無虞頻嵗豐稔士馬强盛劉琨以懐帝永嘉初為并州刺史振威將軍領匈奴中郎將琨在路上表曰臣以頑蔽志望有限因縁際㑹遂忝過任九月末得發道險山峻胡冦塞路輙以少擊衆冐險而進頓伏艱危辛苦備嘗即日逹壺口闗臣自渉州疆目覩困乏流移四散十不存二擕老扶弱不絶於路及其在者鬻賣妻子生相捐棄死亡委厄白骨横野哀呼之聲感傷和氣羣胡數萬周匝四山動足遇掠開目覩冦惟有壺闗可得告糴而此二道九州之險數人當路則百夫不敢進公私徃返没䘮者多嬰守窮城不得薪采耕牛既盡又乏田器以臣愚短當此至難憂如循環不遑寢食臣伏思此州雖云邉朔實邇皇畿南通河内東連司冀北捍殊俗西禦彊虜是勁弓良馬勇士精騎之所出也當須委輸乃全其命今上尚書請此州榖五百萬斛絹五百萬疋綿五百萬斤願陛下時出臣表速見聽處朝廷許之後魏長孫翰為都督北部諸軍平北將軍蠕蠕每犯塞翰拒擊有功進爵為侯薛謹為河東太守所治與屈何連接結士抗敵甚有威惠始光中太武詔奚斤討赫連昌勅謹領偏師前鋒鄉導既尅蒲坂太武以新舊之民并為一郡謹仍為太守裴脩為張掖子都大將張掖境接胡前後數致冦掠脩明設烽候以方畧禦之在邉六年闗塞清靜裴詢為平南將軍郢州刺史詢以凢司戍主蠻酋田樸特地居要險衆踰數萬足為邉捍遂表樸特為西郢州刺史朝議許之其後梁將李國興冦邊樸特與詢犄角為表裏聲援郢州獲全樸特頗有力焉陸希道為前將軍郢州刺史善於馭邉甚有威畧北齊趙郡王之子叡為北朔州刺史都督北燕北蔚北恒三州及廣堆以西黄河以東長城諸鎮諸軍事叡慰撫新遷量置􅇏戍内防外禦備有條法大為兵民所安斛律羡為幽州道行臺僕射以北虜屢犯邉塞須備不虞自庫堆戍東拒於海隨山屈曲二千餘里其間二百里中凢有險要或斬山築城或斷谷起障并置立戍邏五十餘所堯雄為驃騎大將軍豫州刺史撫養兵民得其力用在邊十年屢有功績豫人於今懐之後周柳檜為平東將軍鎮鄯州時吐谷渾强盛數侵疆瑒自檜鎮鄯州屢戰必破之數年之後不敢為冦常善為涇州刺史屬茹茹入冦抄掠北邊善率所部破之盡獲所掠拜車騎大將軍李賢為使持節河州總管三州七防諸軍事河州刺史河州舊非總管至是創置焉賢乃大營屯田以省運漕多設斥候以備冦戎於是羌渾歛迹不敢向東五年宕昌冦邊百姓失業乃於洮州置總管府以鎮遏之遂廢河州總管改授賢洮州總管七防諸軍事洮州刺史屬羌冦石門戍撤破橋道以絶援軍賢率千騎禦之前後斬獲數百人賊乃退走羌復引吐谷渾數千騎將入西疆賢密知之又遣兵伏守其隘路復大敗之虜遂震懾不敢犯塞梁昕為河南郡守鎮大塢尋又移鎮閻韓戍遏邉鄙甚著威信隋于仲文髙祖開皇初為大將軍詔仲文率兵屯白狼塞以備胡郭衍開皇初突厥犯塞為行軍總管領兵屯於平凉數嵗虜不敢入李崇為幽州總管突厥犯塞崇輙破之奚霫契丹等懾其威畧爭來内附馮昱開皇中以行軍總管屯乙弗泊以備胡初為虜所敗其後備邉數年每戰常大克捷韋冲開皇中為營州總管容貌都雅寛厚得衆懐撫靺鞨契丹皆能致其死奚霫畏懼朝貢相續高麗嘗入冦冲率兵擊之董純煬帝時為汶山太守嵗餘突厥冦邉朝廷以純宿將轉為榆林太守虜有至境輙擊殺之劉權大業中為銀青光禄大夫從征吐谷渾煬帝令權過曼頭赤水置河源郡積石鎮大開屯田留鎮西境在邉五載諸羌懐附貢賦嵗入吐谷渾餘燼逺遁道路無壅薛世雄為東北道大使行燕郡太守鎮懐逺於時突厥頗有冦盗縁邉諸郡多苦之詔世雄發十二郡士馬廵塞而還唐襄武王琛髙祖武徳初為晉州道行軍副總管宋金剛䧟澮州時稽胡多叛轉琛為隰州總管以鎮之馭衆寛剛大為民夷所附楊恭仁為凉州總管恭仁素習邉事深悉羌胡情偽推心馭下人吏悦服自葱嶺以東皆入朝貢竇靜武徳中為檢校并州大總管初請太原置屯田又以突厥頻來入冦請斷石嶺以為障塞從之張儉貞觀初為朔州刺史時頡利可汗自恃强盛每有所求輒遣書稱勅縁邉諸州逓相承禀儉拒不受太宗聞而嘉之劉仁軌為帶方州刺史代劉仁願為熊津都督率兵鎮守漸營屯田積糧撫士以經畧髙麗張仁愿為幽州檢校都督㑹突厥黙啜入冦攻䧟趙定擁衆廻至幽州仁愿勒兵出城邉擊之流矢中手賊亦引退則天遣使勞問賜以醫藥累遷并州大都督府長史薛訥為并州大都督府長史和戎軍大使訥鎮幽州二十餘載邊人懐之未嘗深入虜亦不敢犯郭元振為凉州都督隴右諸軍州大使元振善於撫御鎮凉州五年夷夏畏慕令行禁止牛羊被野路不拾遺王忠嗣為河東節度使忠嗣少以勇敢自負及居節將以持重安邊為務嘗謂人云國家升平之時為將者在撫其衆而已吾不欲疲中國之力以儌功名耳但訓練士馬缺即補之自朔方至雲中縁邊數千里當要害地開拓舊城自是創制斥地各數百里自張仁亶之後四十餘年忠嗣繼之北塞之人復罷戰矣趙國珍𤣥宗天寶中為黔府都督本管經畧等使國珍有武畧習知南方地形在五溪凢十餘年中原興師惟黔中封境無虞馬璘為四鎮北庭行營節度使以犬戎犯邊移鎮涇州璘辭氣慷慨以破虜為己任既至涇州分建營伍繕完戰守之具令寛而肅人皆樂為之用在鎮凢八年雖無拓境之功而城堡獲全虜亦不敢犯境馬燧為隴州刺史兼御史中丞州西有通道二百餘步上連峻山與吐蕃相直虜每入冦皆出於此燧乃按行險易立石種樹以塞之下置二門上設譙櫓八日而功畢渾瑊初為郭子儀朔方行營兵馬使子儀令瑊先率兵至邠州便於宜禄縣防秋代宗大厯七年吐蕃大侵邊城瑊與涇原節度使馬璘㑹兵大破蕃賊於黄菩原自是每年嘗領兵於長武城臨盛秋十一年吐蕃大冦慶州方渠懐安等鎮瑊擊却之十二年子儀入朝令瑊知邠寧慶等三州兵馬留後十三年回紇侵太原破鮑防軍北歸頗為邉患以瑊為石嶺闗已南諸軍都知兵馬使率兵犄角逐之虜騎引退叚秀實為涇州刺史兼御史大夫四鎮北庭行軍涇原鄭潁節度使三四年間吐蕃不敢犯塞李元諒為隴右節度使鎮良原距城築臺上彀連弩為城守備益固無幾又進築新城以據便地虜每冦掠輒擊却之涇隴繇是得安虜深憚之張獻甫為邠寧節度使乃於彭原置義倉方渠馬嶺等縣選險要之地以為烽堡又上䟽請復鹽州及洪門雒原等鎮各置兵防以備蕃冦朝廷皆從之縁邊軍州安悦李復為嶺南節度使瓊州乆䧟於蠻獠中復累遣使降之因奏置瓊州都督府以綏撫之邢君牙為鳳翔節度使吐蕃連嵗犯邊君牙且耕且戰以為守備西戎竟不能為大患楊朝晟為邠寜節度使張獻甫都虞候九年城鹽州徴兵以䕶外境朝晟分統士馬鎮木波堡劉昌為涇原等州節度使昌奏舊於百里城距涇原州南九十里分靈臺良原二縣户合置行原州百姓少而在内地今平凉臨邊且故原州屬縣人户頗衆兼諸軍防秋兵馬在焉請徙行原州置於平凉城池嚴固且偪蕃戎可以威重縁邊其百里城舊分置鄉甿歸於靈臺良原詔可之李景畧為豐州刺史西受降城使廩儲備器械具政令肅智畧明二嵗後軍聲雄冠北邊廻紇畏之劉濟為幽州節度使烏桓鮮卑數冦邊濟帥師擊走之深入千餘里虜獲不可勝紀東北晏然郝玭以憲宗元和初為臨洮縣鎮將就為刺史始玭以臨涇地宜蓄息蕃戎每為冦即屯臨為休養便地嘗白其帥願以折之前帥不從其後段佐為節度玭復白佐佐多其䇿乃表請之遂詔玭鎮其地自是西戎無敢犯涇者范希朝為振武節度使振武有党項室韋交居川阜凌犯為盜日入慝作謂之刮城門居人震駭鮮有寧日希朝周知要害置堡栅斥候嚴密人遂獲安異蕃雖䑕竊狗盗必殺無赦戎虜甚畏憚之曰昔有張光晟苦我乆矣今聞是乃更姓名而來其見畏如此蕃落之俗有長帥至必効竒駝名馬雖亷者猶曰當從俗以致其歡希朝一無所受積十四年皆保塞而不為横武元衡為劍南西川節度使撫蠻夷約束明具輒不生事柳公綽為邠寧慶等州節度使時神䇿諸鎮列屯要地未嘗肯受節制虜毎窺間為患公綽疏上其弊即詔神䇿諸鎮在其部者邉上有警盡得聽節度使指揮後為河東節度使涇北有沙陀部落自九姓六州皆畏避之公綽召補其酋朱邪執宜直雲朔塞下治廢柵十一募兵三千人留邊馬總為安南都䕶本管經畧使總敦儒學長於政術在南海累年清亷不撓夷獠便之董重質為夏州節度使訓兵立法為蕃羌畏服李徳裕為成都尹知節度事西川承蠻冦剽虜之後郭釗撫理無術人不聊生徳裕乃復葺闗防繕完兵守又遣人入南詔求其所俘工匠得僧道工匠四千餘人復歸成都張允伸為范陽節度使凢二十三年克勤克儉比嵗豐登邊鄙無虞軍民用乂談者美之後唐李存審為幽州節度使同光初存審患契丹深秋之後傾塞而來與邊將謀欲於幽涿之間置幽州行府以禦賊衝冀轉輸為便張温為武州刺史同光初北戎䧟媯儒檀順平蘇六州武州獨全王思同明宗時鎮隴右思同在秦州累年邊民懐惠華戎寧息長興元年入朝見於中興殿明宗問秦階邊事對曰秦州與吐蕃接境蕃部多違法度臣設法招懐㳂邊置砦四十餘所控其要害每蕃人互市飲之食之界上令納器械因手指畫秦州山川要害控扼處明宗曰人言思同不管事豈及此耶張敬逹為雲州節度使時契丹率族帳自黑榆林襟制泊移至没越泊云借漢界水草敬逹每聚兵塞下以遏其衝虜竟不敢南牧邊人頼之周安叔千後唐清泰初為振武節度使時契丹屢攻振武叔千固守追襲數載甫寧孫方諫為義武節度使弟行友刺秦州行議刺易州弟兄犄角抗虜北面頼之折從阮為邠州節度使從阮自晉漢已來獨據府州控扼西北朝廷頼之拓土𫝊曰天子經畧詩曰辟國百里其拓土之謂與自三代之際曷嘗邇封諸侯之卑及云守境故有居司武之任當折衝之寄者或奮揚威怒剪平叛戾兼其弱而攻其昧取其地而恤其人以至攘除外冦掃盪邊氛申畫其壤保據其險列亭障以嚴戍同於内地浚溝池以固䕶遂為我疆斯以震耀王靈而大啓土宇稱代之盛疇以加諸周召公虎當宣王時有叛戾之國則往正其境界脩其分理周行四方至於南海故其詩曰王命召虎式辟四方徹我疆土于疆于理至於南海秦白起為左更秦昭王十四年攻韓魏於伊闕斬首二十四萬又虜其將公孫喜拔五城起遷為國尉涉河取韓安邑以東到乾河今河東聞喜縣東北有乾河口因名乾河里但有故溝處無復水也明年起為大良造攻魏拔之取城小大六十一明年起與客卿錯攻垣城拔之錯史失其姓垣城河東垣縣也後五年起攻趙拔光狼城後七年起攻楚拔鄢鄧五城昭王二十八年其明年攻楚拔郢燒夷陵遂東至竟陵楚王亡去郢東徙陳秦以郢為南郡起遷為武安君因取楚定巫黔中郡昭王二十四年起攻魏㧞華陽走芒卯而虜三晉將斬首十三萬與趙將賈偃戰沉其卒二萬人於河中昭王四十年起攻韓陘城㧞五城斬首五萬四十四年起攻南陽太行道絶之王翦少而好兵事始皇始皇十一年將攻趙閼與破之九城十八年翦將攻趙嵗餘遂㧞趙趙王降盡定趙地為郡明年燕使荆軻為賊於秦秦王使王翦攻燕燕王喜走遼東翦遂定燕薊而還秦使翦子賁擊荆秦諱楚故云荆也荆兵敗還擊魏魏王降遂定魏地其後將兵六十萬代李信擊荆至蘄南殺其將軍項燕荆兵遂敗走因乘勝畧定荆地城邑嵗餘虜荆王負芻竟平荆地為郡縣賁又與李信破定燕齊地蒙恬始皇時為將將三十萬衆北逐戎狄收河南築長城因地形用險制塞起臨洮屬隴州至遼東延袤萬餘里於是渡河據陽山五原西安陽縣北有隂山隂山在河南陽山在河北逶蛇而北暴師於外十餘年居上郡是時蒙恬威振匈奴始皇甚尊寵蒙氏漢唐蒙為中即將將千人食重萬餘人食糧及衣重從巴莋闗入遂見夜郎侯名同名同其侯名也厚賜諭以威徳約為置吏其子為令比之於漢縣也夜郎旁小邑皆貪漢繒帛以為漢道險終不能有也乃且聽蒙約還報乃以為犍為郡發巴蜀卒治道自僰道指䍧牱江為置一郡尉十餘縣屬蜀衞青武帝時爲車騎將軍元朔二年與將軍李息出雲中西至高闕山名一曰塞名在朔方之北遂至於隴西捕首虜數千畜百餘萬走白羊樓煩王遂取河南地為朔方五原郡使校尉蘇建築朔方城霍去病為驃騎將軍元狩中擊破匈奴右地降渾邪休屠王遂空其地始築令居以西令音鈴初置酒泉郡後稍發徒民充實之令置武威張掖燉煌趙破奴封從票侯將屬國騎屬國謂諸外國屬漢也及郡兵數萬擊姑師時浩侯王恢數為樓蘭所苦武帝令恢佐破奴將兵破奴與輕騎七百人先至虜樓蘭王遂破姑師因暴兵威以動烏孫大宛之屬暴謂顯揚也於是漢列亭障至玉門矣李廣利為貳師大将軍伐大宛之後西域震懼多遣使來貢獻漢使西域者益得職於是自燉煌西至鹽澤往往起亭而輪臺渠犂皆有田卒數百人置使者校尉領䕶荀彘為左將軍定朝鮮為真番臨屯樂浪𤣥莬四郡路博徳為伏波將軍元鼎五年與樓船將軍楊僕討南粤明年遂定越地為南海蒼梧鬱林合浦交阯九真日南珠厓儋耳九郡郭昌為中郎將元鼎六年與衛廣引兵誅南夷且蘭君斬首數萬遂平南夷為䍧牱郡於是邛君莋侯冉駹震恐請臣置吏以邛都為粤巂郡莋都為沈黎郡冉駹為文山郡廣漢西白馬為武都郡蜀張嶷為越巂太守漢嘉郡界旄牛夷種類四千餘户其率狼路欲為姑壻冬逢報怨遣叔父離將逢衆相度形勢嶷逆遣親近賫牛酒勞賜宣暢意㫖離歡悦繇是輙不為患郡有舊道經旄牛中至成都既平且近自旄牛絶道已百餘年更繇安上既險且逺嶷遣左右賫貨幣賜路重令路姑喻意路乃率兄弟妻子悉詣嶷嶷與盟誓開通舊道千里肅清復古亭驛奏封路為旄牛㽛毗王遣使將路朝貢後主於是加嶷撫戎將軍領軍如故晉陶璜仕吳為前將軍都督交州諸軍事武平九徳新昌土地險阻夷獠勁悍歴世不賓璜征討開置三郡及九真屬國三十餘縣唐彬為翊軍校尉時北虜侵掠北平以彬為使持節監幽州諸軍事領護烏丸校尉右將軍彬既至鎮訓卒利兵廣農重稼震威耀武宣喻國命示以恩信於是鮮卑二郡大莫廆摘何等并遣侍子入貢兼脩學校誨誘無倦仁恩廣被遂開拓舊境却地千里復秦長城塞自温城洎於碣石緜亘山谷且三千里分軍屯守烽堠相望繇是邉境獲安無犬吠之警自漢魏征鎮莫之比焉後魏邢巒為平西將軍梁秦二州刺史乘勝至於巴西開開地定民東西七百南北千里獲郡十四二部護軍及諸縣戍北齊潘樂文宣一天保中為南道大都督討侯景樂發石鼈南度百餘里至涇州涇州舊在石梁侯景改為淮州樂獲其地乃立涇州又克安州除瀛州刺史仍畧淮漢後周李遷哲初為西魏驃騎大將軍與田𢎞同討信州今䕫州凢下十八州拓地二千餘里鄭恪武帝時為大將軍天和中率師平越巂置西寧州隋源雄文帝開皇初為徐州總管陳人見中原多故遣其將陳紀蕭摩訶任蠻奴周羅㬋樊毅等侵江北西自江陵東距夀陽民多應之攻䧟城鎮雄與吳州總管于顗揚州總管賀若弼黄州總管元景山等擊走之悉復故地唐江夏王道宗武徳五年授靈州總管時梁師都據夏州遣弟雒兒引突厥兵數萬至於城下道宗閉門拒守伺隙出戰賊徒大敗初突厥連於師都入居五原舊地道宗因逐出之振耀威武拓地千餘里高祖聞而嘉之謂裴寂蕭瑀曰道宗今能守邊以寡制衆昔魏任城王彰臨戎却敵道宗勇敢有同於彼遂封為任城王李靖以太宗貞觀初為定襄道大總管討突厥其將張寳相擒頡利可汗以獻俄而突利可汗來奔遂復定襄常安之地斥土界自隂山北至於大漠鄭元璹為南㑹州都督貞觀三年遣使招諭党項列其地為軌州五年太僕寺丞李世南開党項之地十六州四十七縣侯君集以貞觀十四年為交河道行軍總管擊高昌破之君集分兵畧地下其三郡五縣二十二城户八千四十六口一萬七千七百三十一馬四千三百匹其界東西八百里南北五百里墾田九百頃以其地為西州以交河城為交河縣始昌城為天山縣田地為柳中縣東鎮城為蒲縣高城為高昌縣初西突厥遣其葉護屯兵於可汗浮圖城與高昌相影響至是懼而來降以其地為庭州并置蒲類縣國威既振西域大懼焉耆王詣請先有三城為高昌所奪悉歸之留兵鎮守於是刻石紀功而旋蘇定方為行軍大總管擒突厥賀魯以獻列其地為州縣極於西海又為大總管討百濟平之分其地為六州俘其王義慈及子隆泰來獻楊防為司平太常伯徃安東安撫高麗餘衆時有高麗酋長鈕牟岑率衆反叛立高藏外孫安舜為主詔左監門大將軍高侃為東州道行軍總管發兵以討之安舜遽殺鈕牟岑走投新羅防侃始㧞安東都護府自平壤城移於遼東州郭元振以則天大足元年為凉州都督隴右諸軍大使先是凉州封界南北不過四百餘里既逼突厥吐蕃二冦頻嵗奄至城下百姓苦之元振始於南境硤口置和戎城北界磧中置白亭軍控其要路遂拓州境一千五百里自是冦虜不復敢至城下信安郡王禕開元中為朔方軍節度時石堡城為吐蕃所據禕督率諸將倍道兼進并力攻之遂㧞石堡城斬獲首級并獲糧儲器械其數甚衆仍分兵據守以遏賊路𤣥宗聞之大悅始改石堡城為振武軍自是河隴諸軍逰奕拓地千餘里哥舒翰天寳十二載為隴右節度使翰以前年之役收黄河九曲之地請分置郡縣及軍於是新置洮陽郡及神䇿軍於臨洮郡之西二百里澆河郡於磧石軍之西百里及宛秀軍以實河曲之地命臨洮郡太守漢門軍使成如璆兼臨洮郡太守仍充神䇿軍使前磧石軍使臧奉忠為澆河郡太守充本郡鎮守使康季榮以宣宗大中三年鎮涇原收復吐蕃原州及石門驛藏木峽制勝六磐石峽等六關張君緒以大中三年鎮邠寜収復吐蕃蕭闗李玭以大中三年鎮鳳翔収復吐蕃秦州杜悰以大中三年鎮西川收復吐蕃維州高駢以懿宗咸通七年為安南都護収復交州盡平蠻賊積嵗所侵故地梁高萬興以太祖乾化元年為延州節度使上言行軍都指揮使高萬金統領兵士収鹽州其偽刺史高行存泥首來降先是鹽州與吐蕃党項諸羌牙接為二境咽喉之地又有烏池鹽鹺之利戎征延禍境未寧息唐建中初為吐蕃所䧟墟其地而去繇是銀夏寕延洎於靈武嵗以河南東山南淮南青徐江浙等道軍士不啻四五萬分護其地謂之防秋貞元九年報政稍暇乃命副元帥渾瑊總兵三萬復取其地建百雉焉自是虜塵乃清邉患遂止唐代革命又復失之今纔動偏師遽収襟要國之右臂瘡疣其􅒚哉册府元龜卷四百二十九
