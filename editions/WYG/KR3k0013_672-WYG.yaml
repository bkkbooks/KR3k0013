body:
  text: 册府元龜卷六百七十二宋王欽若等撰牧守部褒寵夫懋功賞善有國之令典也蓋夫長人之寄共治為重實勸能之所先非庻尹之可擬中葉而下循吏繼踵乃有勤脩厥職克揚善政彈擊豪横完補凋瘵捍患屏冦務穯敦本式遏夷貊詳明獄犴清白以自守傾竭而奉上苛慝不作繕治以時遺愛在民藹然垂裕而君人者莫不優異其爵秩便蕃其賜予或明詔申奬或延見勞問乃至崇進禮命嚴設圖像周旋宴喜臨視歎息抑情從事起家延賞恩流闔境昭示溥率逮乎既沒尚增追悼賵贈之禮名數有加躬臨以發哀節惠以著美方牘所載咸可徵焉漢王訢守右扶風武帝數出幸安定北地過扶風宮館馳道脩治供張辦帝嘉之駐車拜訢為真視事十餘年王成為膠東相治甚有聲宣帝最先褒之地節三年下詔曰蓋聞有功不賞有罪不誅雖唐虞不能以化天下今膠東相成勞來不怠謂勸勉招懷百姓也治有異等之効異於常等其賜成爵關内侯秩中二千石黄霸為揚州刺史三歲宣帝下詔曰制詔御史其以賢良高第揚州刺史霸為潁川太守秩比二千石居官霸在潁川前後八年郡中愈治是時鳳凰神雀數集郡國潁川尤多天子以霸治行終長者下詔稱揚曰潁川太守霸宣布詔令百姓鄉化孝子悌弟貞婦順孫日以衆多田者讓畔道不拾遺養視鰥寡贍助貧窮獄或八年亡重罪囚吏民鄉於教化興於行誼可謂賢人君子矣書不云乎股肱良哉其賜爵關内侯黄金百斤秩中二千石杜延年為北地太守治郡不進宣帝以璽書讓延年延年乃選用良吏捕擊豪强郡中清静居歲餘帝使謁者賜延年璽書黄金二十斤徙為西河太守治甚有名王尊任東郡太守河水盛溢尊請以身填金堤水稍却吏民嘉壯尊之勇節白馬三老朱英等奏其狀下有司考皆如言於是制詔御史東郡河水盛長毁壞金堤未決三尺百姓惶恐奔走太守身當水衝履咫尺之難不避危殆以安衆心吏民復還就作水不為災朕甚嘉之秩尊中二千石加賜黄金二十斤蕭育為右扶風太守會南郡江中多盜賊拜育為南郡太守哀帝以育耆舊名臣乃以三公使車載育入殿中受策使車三公奉使之車若安車也曰南郡盜賊羣輩為害朕甚憂之以太守威信素著故委南郡太守之官期於為民除害安元元而已亡拘於小文加賜黄金二十斤雋不疑為青州刺史齊孝王孫劉澤交結郡國豪傑謀反欲先殺青州刺史不疑發覺收捕皆伏其辜擢為京兆尹賜錢百萬陳立為牂牁太守平定西夷徵詣京師會巴郡有盜賊復以立為巴郡太守秩中二千石居賜爵左庻長第十爵也徙為天水太守勸民農桑為天下最賜金四十斤後漢任延為會稽郡尉建武初延上書願乞骸骨歸拜王庭詔徵為九貞太守光武引見賜馬雜繒令妻子留雒陽郭伋為并州牧過京師謝恩光武引見并召皇太子諸王宴語終日賞賜車馬衣服什物鄧晨為汝南太守光武行幸章陵徵晨行廷尉事從至新野置酒酣讌賞賜數百千萬復遣歸郡衛颯為桂陽太守視事十年郡内清理建武二十五年徵還光武欲以為少府會颯被疾不能拜起勑以桂陽太守歸家須後詔書居二歲載病詣闕自陳困篤乃收印綬賜錢十萬後卒于家杜詩為南陽太守視事七年政化大行會病卒司隸校尉鮑永上書言詩貧困無田宅䘮無所歸詔使治䘮郡邸賻絹千疋宣秉字巨公為司隸校尉秉性節約嘗服布被蔬食瓦器光武嘗幸其府舎見而歎曰楚國二龔不如云陽宣巨公即賜布帛帳幃什物羊續為南陽太守徵為太常未及行會病卒時年四十八遺言薄殮不受賵遺舊典二千石卒官賻百萬府丞焦儉遵續先意一無所受詔書褒美勑太守以府賻錢賜續家樊曄為天水太守卒官永平中明帝追思曄在天水時政能以為後人莫之及詔賜家錢百萬祭肜為遼東太守徵為太僕肜在遼東㡬三十年衣無兼副明帝既嘉其功又美肜清約拜日賜錢百萬馬三匹衣被刀劒下至居室什物大小無不悉備郭賀字喬卿拜荆州刺史引見賞賜恩寵隆異及到官有殊政明帝廵狩到南陽特見嗟嘆賜以三公之服黼黻冕旒勑行部去襜帷使百姓見其容服以章有德每所經過吏人指以相示莫不榮之遷河南尹在官三年卒詔慜惜賜車一乘錢四十萬秦彭為潁川太守章帝廵行再幸潁川輙賞賜錢榖恩寵甚異宋均為河内太守以疾上書乞免詔除子條為太子舎人均自扶輿詣闕謝恩章帝使中黄門慰問因留養疾司徒缺帝以均才任宰相召入視其疾令兩騶扶之均拜謝曰天罰有罪所苦浸篤不復奉望帷幄因流涕而辭帝甚傷之召條扶持均出賜錢三十萬張酺以尚書授皇太子及章帝即位擢酺為侍中虎賁中郎將數月出為東郡太守酺自以嘗經親近未悟見出意不自得上疏辭曰臣愚以經術給事左右少不更職不曉文法猥當剖符典郡班政千里必有負恩辱位之咎臣竊私自分殊不慮出城闕冀蒙留恩託備冗官郡僚所不安耳目所聞見不敢避好醜詔報曰經云身雖在外乃心不離王室典城臨民益所以報効也好醜必上不在逺近今賜裝錢三十萬其亟之官陳球為零陵太守會州兵朱蓋等反與桂陽賊胡蘭數萬人轉攻零陵球率衆城守遂斬朱蓋等賜錢五十萬拜子一人為郎遷魏郡太守李進為武陵太守漊中澧中蠻舉種反叛進討破之進乃簡選良吏得其情和在郡九年梁太后臨朝下詔增進秩二千石賜錢二十萬鄭純為永昌郡西部都尉為政清潔化行夷貊君長感慕皆獻上珍頌德美功天子嘉之即以為永昌太守陸康為廬江太守獻帝即位天下大亂康蒙險遣孝廉計吏奉貢朝廷詔書䇿勞加忠義將軍秩中二千石魏呂䖍漢末領泰山太守時濟南黄巾徐和尊所在刼長吏攻城邑䖍引兵與夏侯淵會擊之前後數十戰斬首獲生數千人太祖使督青州諸郡兵以討東萊羣賊李條等有功太祖令曰夫有志必成其事蓋烈士之所狥也卿在郡以來擒姦討暴百姓獲安躬􅌃矢石所征輙克昔冦恂立名於汝潁耿弇建策於青兗古今一也舉茂才加騎都尉典郡如故杜畿為河東太守平虜將軍劉􅈴為太祖所親貴震朝廷嘗從畿求大棗畿拒以他故後􅈴伏法太祖得其書歎曰杜畿可謂不媚於竈者也稱畿功美以下州郡曰仲尼之於顔子每言不能不歎既情愛發中又宜率馬以驥今吾亦冀衆人仰高山慕景行也太祖西征至蒲陂與賊夾渭為軍軍食一仰河東及賊破餘畜二十餘萬斛太祖下令曰河東太守杜畿孔子所謂禹吾無間然矣增秩中二千石又令曰昔蕭何定關中冦恂平河内卿有其功間將授卿以納言之職顧念河東吾股肱郡充實之所足以制天下故且煩卿卧鎮之畿在河東十六年常為天下最文帝即王位賜爵關内侯徵為尚書及踐阼進封豐樂亭侯邑百户賈逵為議郎叅司隸軍事太祖征馬超至𢎞農曰此西道之要以逵領𢎞農太守召見計事大悦之謂左右曰使天下二千石悉如賈逵吾何憂逵後為豫州刺史兵曹從事受前刺史賈逵到官數月乃還考竟其二千石以下阿從不如法者皆舉免之帝曰逵真刺史矣布告天下當以豫州為法賜爵關内侯梁習以别部司馬為并州刺史單于恭順名王稽顙部曲服事供職同於編户邊境肅清百姓布野勤勸農桑令行禁止貢達名士咸顯於世太祖嘉之賜爵關内侯文帝踐阼復為并州刺史進封申門亭侯邑百户蘇則試守金城太守文帝令問雍州刺史張既曰試守金城太守蘇則既有綏民平夷之功聞又出軍西定湟中為河西作聲勢吾嘉之則之功效為可加爵邑未邪封爵重事故以問卿密白意且勿宣露也既答曰金城郡昔為韓遂所見屠剝死䘮流亡或竄戎狄或陷冦亂户不滿五百則到官内撫凋殘外鳩離散今見户千餘又梁燒雜種𦍑昔與遂同惡遂斃之後越出障塞則前後招懷歸就郡者三千餘落皆䘏以威恩為官效用西平麴演等唱造邪謀則尋出軍臨其項領演則歸命送質破絶賊糧則既有䘏民之效又能和戎狄盡忠效節遭遇聖明有功必錄若則加爵邑誠足以勸忠臣勵風俗也帝以其功加則䕶𦍑校尉賜爵關内侯王思領豫州刺史思與薛悌郤嘉俱從微起官位畧等三人中悌差挾儒術所在名為閑省嘉與思事行相似文帝詔曰薛悌駁吏王思郤嘉純吏也各賜關内侯以報其勤游楚為隴西太守太和中諸葛亮出隴右楚堅守亮退以功封列侯明帝嘉其治詔特聽朝引上殿楚為人短小而大聲自為吏初不朝覲被詔登階不知儀式帝令侍中贊引呼隴西太守前楚當言唯而大應稱諾帝顧之而笑遂勞勉之罷㑹自表乞留宿衛拜駙馬都尉鄭渾為魏郡太守以郡下百姓苦乏材木乃課樹榆為籬并益樹五果榆皆成籓五果豐實入魏郡界村落齊整如一民得財足用饒明帝聞之下詔稱述布告天下遷將作大匠晉魯芝初仕魏為天水太守郡鄰于蜀數被侵掠户口減削冦盜充斥芝傾心鎮衛更造城市數年間舊境悉復遷廣平太守天水夷夏慕德老幼赴闕獻書乞留芝明帝許焉仍策書嘉歎勉以黄霸之美加討冦將軍羅憲初仕蜀為巴東太守劉禪歸順加陵江將軍領武陵太守泰始初入朝詔曰憲忠烈果毅有才策器幹可給鼓吹又賜山𤣥玉佩劒向雄泰始中為秦州刺史假赤幢曲蓋鼔吹賜錢二十萬王宏為汲郡太守泰始五年十月詔以司隸校尉石鑒所上宏勤恤百姓導化有方督勸開荒五千餘頃遇年普饑而郡界獨無匱乏可謂能以勸教時同功異者矣其賜穀千斛布告天下傅詢為平州刺史咸寧二年與前廣平太守孟桓以清白有聞詢賜帛二百疋桓百疋劉霄為京兆太守梁柳為陽平太守大康十年以有政績各賜穀千斛鄭黙為東郡太守值歲荒人饑黙輙開倉賑給乃舎都亭自表待罪朝廷嘉黙憂國詔書褒歎比之汲黯班告天下若郡縣有此比者皆聽出給諸葛恢為會稽内史太興初以政績第一詔曰自頃多難官長數易益有諸弊雖聖人猶久於其道然後化成况其餘乎漢宣帝稱與我共安天下者其惟良二千石斯言信矣是以黄霸等或十年或二十年而不徙所以能濟其中興之􅈴也賞罰黜陟所以明政道也㑹稽内史諸葛恢蒞官三年政清人和為諸郡首宜進其位班以勸風教令增恢秩中二千石吳隐之為廣州刺史清操逾厲元興初詔曰夫家行篤於閨門清節厲乎風霜實立人之所難而君子之美致也龍驤將軍廣州刺史吳隐之孝友過人祿均九族菲已潔素儉愈魚飱處可欲之地而常能不改其操饗惟錯之需而家人不易其服革奢務嗇南域改觀朕有嘉焉可進號前將軍賜錢五十萬穀千斛宋毛脩之為河南河内二郡太守行四州事戍雒陽脩治城壘高祖既至案行善之賜衣服玩好當時評直二十萬徐豁為始興太守元嘉三年遣大使廵行四方并使郡縣各言損益豁因表陳三事文帝嘉之下詔曰始興太守豁潔已退食恪居在官政事脩理惠澤沾被近嶺南荒弊郡境尤甚拯䘏有方濟厥饑饉雖古之良守蔑以尚焉宜蒙褒賞以旌清績可賜絹三百疋穀千斛後以為廣州刺史未拜卒帝又下詔豁廉清勤恪著稱所司故擢授南服申其才志不幸䘮殞朕甚悼之可賜錢十萬布百疋以營葬事王歆之為晉史序王珣貨殖珣子𢎞貴顯歆之懼為所陷出為吳興太守王𢎞入為相領揚州刺史𢎞雖與歆之不絶諸弟未相識者皆不復往來歆之在郡嘗慮為𢎞所繩夙夜勤勵政績甚美𢎞亦抑其私憾文帝兩嘉之在任積年稱為良守加秩中二千石沈懷文父宣為新安太守及丁父憂新安郡送故豐厚奉終禮畢餘悉頒之親戚一無所留文帝聞而嘉之賜奴婢六人陸徽為益州刺史亡之日家無餘財文帝甚痛惜之詔曰徽勵志廉潔歷任恪勤奉公盡誠克己無倦褒榮未申不幸夙殞言念在懷以為傷恨可贈輔國將軍本官如故賜錢十萬米二百斛諡曰簡子劉秀為雍州刺史卒孝武以其蒞官清潔家無餘財賜錢三十萬布三百疋南齊張岱吳郡人建元元年出為左將軍吳郡太守太祖知岱歷任清直至郡未㡬手勑岱曰大邦任重乃未欲廻換但總戎務殷宜須望實今用卿為䕶軍加給事中岱拜竟詔以家為府劉懷慰為齊郡太守不受請謁民有餉其新米一斛者懷慰出所食麥飯示之曰旦食有餘幸不煩此著廉吏論以達其意太祖聞之手勑褒賞進督泰沛二部妻子在郡賜米三百斛兖州刺史柳世隆與懷慰書曰膠東潤化潁川致美以今方古曾何足云傅琰再為山隂令縣内稱為神明武帝永明三年徙廬陵王安西長史南郡内史行荆州軍事五年卒琰䘮西還有詔出臨蕭子顯為呉興太守至郡未㡬卒詔曰仁威將軍吳興太守子顯神韻峻舉宗中佳器分竹未久奄至䘮殞惻愴于懷可贈侍中中書令今便舉安丘仲孚為豫章内史頃之卒詔曰豫章内史丘仲孚重試大邦責以後効非直悔吝云亡實亦政績克舉不幸殞䘮良以傷惻可贈給事黄門侍郎何逺為武康令高祖聞其能擢為宣城太守遷新興内史天監十六年詔曰何逺前在武康已著廉平復蒞二邦彌盡清白政先治道惠留民愛雖古之良二千石無以過也宜升内榮以顯外績可給事黄門侍郎逺即還仍為仁威長史陳劉師知祖奚之仕齊為淮南太守有能政武帝手詔頻褒賞之袁樞為丹陽尹以葬父拜表自解詔賜絹布五十疋錢十萬令葬訖停宅視郡事葬服闋復本職蕭濟為揚州長史嘗勑取揚州曹事躬自覽見濟條理詳悉文無滯害乃顧謂左右曰我本期蕭長史於經傳不言精練繁劇乃至於此遷祠部尚書加給事中後魏司馬凖晉汝南王亮之後也明元時歸魏為廣寧太守悦近來逺清儉有稱太武嘉之賜布六百疋陸馛為相州刺史徵為散騎常侍民乞留馛者千餘人獻文不許謂羣臣曰馛之善政雖復古人何以加之賜絹五百疋奴婢十口源賀為冀州刺史賀鞫獄以情徭役簡省時考殿最賀治為第一賜衣馬器物班宣天下鹿生為濟南太守有治稱獻文嘉其能特徵赴季秋馬射賜以驄馬加以青服彰其廉潔薛㧞為冠軍將軍豫州刺史延興三年㧞與南兖州刺史游明根南平陽太守許含等以治民著稱徵詣京師獻文親自勞勉復令還州任城王雲為徐州刺史性善撫綏得徐方人心以蓋太妃憂去官為百姓所追戀餘錢貨一無所受獻文聞而嘉之復拜侍中中都大官賜帛千疋羊千口出為冀州刺史乃心政事甚得下情於是合州請户輸絹五尺粟五升以報雲恩孝文嘉之遷使持節都督陜西諸軍事征南大將軍良安鎮都大將軍雍州刺史雲廉謹自脩留心庻獄挫豪强盜息止州民頌之者千有餘人文明太后嘉之賜帛千疋武昌王鑒為齊州刺史時革變之始百度惟新鑒上書遵孝文之旨不采齊之舊風軌制粲然皆合規矩孝文覽其所上嗟美者久之顧謂侍臣曰諸州刺史皆能如此變風易俗更有何難下詔褒美頒之天下一如鑒所上齊人愛詠咸曰耳目更新韋珍孝文時為顯武將軍郢州刺史在州有聲績朝廷嘉之遷龍驤將軍賜驊騮二匹帛五十疋穀三百石珍乃召集州内孤貧者謂曰天子以我能撫綏卿等故賜以穀帛吾何敢獨當遂以所賜悉分與之裴仲規為咸陽王禧司州主簿行建興郡事車駕自代還雒次於郡境仲規備供帳朝於路側孝文詔仲規曰朕開置神畿畿郡望重卿既首應司隸美舉復督我名邦何能自致也仲規對曰陛下窮神盡聖應天順民棄彼𤣥壤來宅紫縣臣方罄心力躍馬吳㑹冀功銘帝籍􅈴書王府豈一郡而已孝文笑曰裴卿必副此言韋崇為南潁川太守郡中大治孝文聞而嘉賞賜帛二百疋呂羅漢為秦益二州刺史孝文詔羅漢曰赤水𦍑民逺居邊土非卿善政何以招輯卿所得口馬表求奉貢朕嘉乃誠便勑領納其馬付都牧口以賜卿楊椿出為安逺將軍豫州刺史孝文自雒向豫幸其州舘信宿賜馬十匹縑千疋遷冠軍將軍濟州刺史孝文自鍾離趣鄴至磝碻幸其州舘又賜馬二匹縑千五百疋楊懿為廣平太守有稱績孝文南廵吏人頌之加寧逺將軍賜帛三百疋李祥為淮陽太守勸課農桑百姓安業宣武嘉之賜以衣馬李平為司徒左長史行相州事宣武至鄴親幸平第見其諸子尋正刺史加征虜將軍路邕陽平清淵人宣武時積功勞除齊州東魏郡太守有惠政靈太后詔曰邕蒞政清勤善綏民俗比經年儉郡内饑饉羣庶嗷嗷將就溝壑而邕自出家粟賑賜貧窘民以獲濟雖古之良守何以尚兹宜見霑錫以垂奬勸可賜飛龍廐馬一匹衣一襲被褥一具頒宣州鎮咸使知聞邕以善治民稍遷至南青州刺史于雒㧞為營州刺史以治有能名進號安東將軍公孫䆳為青州刺史以􅃉在公遺跡可紀下詔褒述加鎮東將軍領東夷校尉崔振字延根為高陽内史兼領尚書左丞後改定職令振本資准擬五品詔曰振在郡著績宜有褒昇除太子庻子李恩穆為京兆内史在郡八年頗有政績徵拜光祿大夫孝明初除平北將軍中山太守未拜遷安北將軍營州刺史卒於位贈安西將軍華州刺史李韶為冀州刺史清簡愛民甚收名譽政績之美聲冠當時孝明嘉之就加散騎常侍遷車騎大將軍賜劒珮貂蟬各一具驊騮馬一匹并衣服寢具後為定州刺史正光末卒於官賻帛七百疋贈侍中持節散騎常侍車騎大將軍司空公雍州刺史諡曰文恭崔光伯除北海太守有司以其更滿依例奏代孝明詔曰光伯自蒞海沂清風逺著兼其兄光韶復能辭榮侍養兄弟忠孝宜用甄錄可更申一年以勵風化崔亮為雍州刺史亮性公清敏于斷决所在並號稱職三輔服其德政孝明嘉之詔賜衣馬被褥楊藻為建德太守以清貧賜帛六十疋裴他為荆州刺史有異政加撫軍將軍又遷中軍將軍羊敦為廣平太守雅性清儉朝廷以其清白賜穀一千斛絹一百疋北齊李密為襄州刺史在州十餘年甚得安邊之術威信聞於境神武頻降手書勞問并賜口馬李㑹為高陽内史神武東廵郡國瀛州城西駐馬久立使使慰之曰孤在晉陽知山東守唯卿一人用意及入境觀風信如所聞但善始令終將位至不已李稚廉為濟州長史神武行經冀州令總河北六州文籍商較户口增損神武親自部分多在馬上徵責文簿指引取備事緒非一稚廉每應立成常先期㑹莫不雅合深旨為諸州凖的神武顧謂司馬子如曰觀稚廉處分快人意也因集文武數萬人令郎中杜弼宣旨慰勞仍詰諸州長史守令等諸人並謝罪稚廉獨前拜恩觀者咸歎美之其日賜以牛酒高祖還并以其事告文襄喜而語人曰吾足知人矣唐邕出為趙州刺史武成謂邕曰朝臣未有帶侍中䕶軍中正作州者以卿故有此舉放卿百餘日休息至秋間當即追卿許惇為陽平太守治為天下第一特加賞異圖形於闕詔頒天下册府元龜卷六百七十二
