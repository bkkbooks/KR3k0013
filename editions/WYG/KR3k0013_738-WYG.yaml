body:
  text: 册府元龜卷七百三十八宋王欽若等撰陪臣部為政知禮為政自周室東遷諸侯為政咸保世以傳祚必得士而乃昌焉故其覇者之佐乗時間出為國以盡慮居位而不懈斟酌政典講求治道制禮俗之法定兵賦之度修職秩之序搜遺滯之雋明刑賞之訓申儆備之畧謹賔聘之儀翦寇盗之戾恤鰥窮之戚振威讓之令由是綱目咸舉而軌物以甄國以富强民斯嘉靖觀其總庶績之要治千乗之邦裁成物宜導揚官業彞倫克叙而不紊成憲遵行而可久非夫包兼濟之術極惟幾之慮者疇克以奮庸而垂裕哉孔子為魯大司寇攝行相事與聞國政三月鬻羔豚者弗飾價男女行者别於塗塗不拾遺四方之客至於邑者不求有司有司常共其職客求而有在也皆予之以歸初魯有沈猶氏旦飲羊飽之以欺市人公愼氏有妻而滛慎憒氏奢侈驕佚魯市之鬻牛馬者善豫賈孔子将為魯司寇沈猶氏不敢朝飲其羊公慎氏出其妻慎憒氏踰境而徙魯之鬻牛馬不豫賈布正以待之也旣為司寇季孟墮郈費之城齊人歸所侵魯之地由積正之所致也子服景伯魯大夫子服何也哀公三年五月辛卯司鐸火司鐸官名火踰公宫桓僖災桓公僖公廟救火者皆曰顧府言常人愛財南宫敬叔至命周人出御書俟于宫敬叔孔子弟子南宫閲周人司周書典籍之官御書進于君者也使其待命于宫曰庀女而不在死庀具也子服景伯至命宰人出禮書宰人家宰之屬以待命命不共有常刑待求之命校人乗馬巾車脂轄校人掌馬巾車掌車乗馬使四四相從為四馬百官官備府庫慎守官人肅給國有大災恐有變難故慎為備濟濡帷幕鬱攸從之鬱攸火氣也濡物于水出用為濟蒙葺公屋以濡物冒覆公屋自太廟始外内以悛悛次也先尊後卑以次救之助所不給有不用命則有常刑無赦公父文伯至命校人駕乗車乗車公車季桓子至御公立於象魏之外象魏門闕命救火者傷人則止財可為也命藏象魏周禮正月縣教令之法于象魏使萬民觀之故謂其書為象魏曰舊章不可亡也富父槐至曰無備而官辦者猶拾瀋也槐富父終生之後瀋汁也言不備而責辦不可得於是乎去表之槀表表火道風所向者去其槀積道還公宫開除道周匝公宫使火無相逼趙盾晉大夫宣子也初晉使狐射姑将中軍代先且居趙盾佐之代趙衰也盾趙衰子陽處父至自溫往年聘衛過温今始至改蒐于董易中軍易以趙盾為帥射姑佐之河東汾隂縣有董亭陽子成季之屬也處父常為趙衰屬大夫故黨於趙氏且謂趙盾能曰使能國之利也是以上之宣子於是乎始為國政宣趙盾謚制其典典常也正法罪輕重當辟獄刑辟猶理也董逋逃董督也由質要由用也質要契券也治舊洿治理洿穢本秩禮貴賤不失其本續常職修廢官出淹滯拔賢能也旣成以授太傅陽子與太師賈佗使行諸晉國以為常法隨㑹晉大夫范武子也㑹聘于周王饗之餚蒸㑹私於原公曰吾聞王室之禮無毁折今此何禮也王曰子弗聞乎親戚宴饗則有餚蒸武子遂不敢對而退歸乃講聚三代之典禮於是乎修執秩以為晉法㑹将中軍且為太傅於是晉國之盜逃奔於秦羊舌職曰吾聞之禹稱善人稱舉也不善人遠此之謂也夫詩曰戰戰兢兢如臨深淵如履薄氷善人在位也言善人居位則無不戒懼善人在上則國無幸民諺曰民之多幸國之不幸也是無善人之謂也魏絳晉大夫也初晉㑹諸侯伐鄭諸侯皆不欲戰乃許成楚子伐鄭楚荘王夫人卒共王母王未能定鄭而歸晉侯歸謀所以息民魏絳請施舍施恩惠舍勞役輸積聚以貸輸盡也自公以下茍有積者盡出之國無滯積散在民亦無困人不匱乏公無禁利與民共亦無貪民禮讓行祈以幣更不用牲賔以特牲務崇省器用不作因仍舊車服從給足給事也行之期年國乃有節三駕而楚不能與争三駕三興師謂十年師于牛首十二年師于向其秋觀兵于鄭東門自是鄭遂服趙武晉大夫也代范匄為政令薄諸侯之幣而重其禮以重禮待諸侯穆叔見之謂穆叔曰自今以徃兵其少弭矣弭止也齊崔慶新得政将求善于諸侯武也知楚令尹令尹屈建若敬行其禮道之以文辭以靖諸侯兵可以弭初齊人成郟之歲其夏齊烏餘以廪丘奔晉烏餘齊大夫廪丘今東郡廪丘縣故城是襲衛羊角取之今廪丘縣所治羊角城是遂襲魯髙魚髙魚城在廪丘縣東北有大雨自其竇入雨故水竇開介于其庫入髙魚庫而介其甲以登其城克而取之又取邑于宋於是范宣子卒宣子范匄諸侯弗能治也及武為政乃卒治之武言于晉侯曰晉為盟主諸侯或相侵也則討而使歸其地今烏餘之邑皆討類也言如此宜見討類而貪之是無以為盟主也請歸之公曰諾叔向為晉太傅秦后子來仕其車千乗楚公子干來仕其車五乗叔向實賦祿韓宣子問二公子之祿焉對曰大國之卿一旅之田公之孤四命五百人為旅為田五百頃上大夫一卒之田上大夫一命百人為卒為田一百頃也夫二公子者上大夫也皆一卒可也宣子曰秦公子富若之何其均之也對曰夫爵以建事祿以食爵徳以賦之功庸以稱之若何其以富賦祿也夫絳之富商韋藩木楗以過於朝韋藩專蔽前後木楗木擔惟其庸功少也而能金玉其車文錯其服能行諸侯之賄而無尋尺之祿無大績于民故也且秦楚匹也若之何其回於富也乃均其祿樂喜宋大夫也初宋災樂喜為司城以為典政樂喜子罕也為正卿知将有火災素戒為備火之政使伯氏司里伯氏宋大夫司里里宰也火所未至徹小屋塗大屋大屋難徹就屋塗之陳畚挶具綆缶畚簣籠挶土轝綆汲索缶汲器備水器盆罌之屬量輕重計人力所任蓄水潦積土塗廵丈城繕守備廵行也丈度也繕治也行度守備之處恐因災有亂表火道火起則從其所趣摽表之使華臣具正徒華臣華元子為司徒正徒役徒也司徒之所主令隧正納郊保奔火所隧正官也五縣為隧納聚郊野保守之民使隨火所起往救之使華閲討右官官庀其司亦華元子代元為右師討治也庀具也使具其官屬向戍討左亦如之向戍左師使樂遄庀刑器亦如之樂遄司寇也刑器刑書也使皇鄖命校正出馬工正出車備甲兵庀武守皇鄖皇父充石之後校正主馬工正主車使各備其官使西鉏吾庀府守鉏吾太宰也府六官之典令司宫巷伯儆宫司宫奄臣巷伯寺人皆掌宫内之事二師令四卿正敬享二師左右師也四卿大夫享祝也祝宗用馬于四墉祀盤庚于西門之外祝大祝宗宗人墉城也用馬祭于四城以禳火盤庚殷王宋之遠祖城積隂之氣故祀之凡天災有幣無牲用馬祀盤庚皆非禮子皮鄭大夫也子展卒子皮即位子皮代父為上卿於是鄭饑而未及麥民病子皮以子展之命餼國人粟戸一鍾在䘮故以父命也六斛四斗曰鍾是以得鄭國之民故罕氏常掌國政以為上卿宋司城子罕聞之曰鄰於善民之望也民亦望君為善宋亦饑請於平公出公粟以貸使大夫皆貸司城氏貸而不書施而不徳為大夫之無者貸宋無饑人叔向聞之曰鄭之罕宋之樂其後亡者也二者其皆得國乎得掌國政民之歸也施而不徳樂氏加焉其以宋升降乎升降隨宋盛衰國僑字子産為鄭大夫子産為政使都鄙有章國都及邊鄙章服尊卑各有分部上下有服公卿大夫服不相踰田有封洫封疆也洫溝也廬井有伍廬舍也九夫為井使五家相保大夫之忠儉者謂卿大夫從而與之泰侈者因而斃之因其有罪而斃踣之從政一年輿人誦之曰取我衣冠而禇之禇蓄也奢侈者畏法故蓄藏取我田疇而伍之孰殺子産吾其與之並畔為疇及三年又誦之曰我有子弟子産誨之我有田疇子産殖之殖生也子産而死誰其嗣之一曰子産者鄭之列大夫也鄭昭公之時以所愛徐摯為相國亂上下不親父子不和大宫子期言之君以子産為相為相一年竪子不戲狎斑白不提挈僮子不犁畔二年市不豫賈三年門不夜關道不拾遺四年田噐不歸五年士無尺籍䘮期不令而治鄭二十六年而死丁壮號哭老人兒啼曰子産去我死乎民将安歸又曰子産相鄭内無國中之亂外無諸侯之患也子産之從政也擇能而使之馮簡子能斷大事子太叔美秀而文其貌美其才秀公孫揮能知四國之為知諸侯所欲為而辨于其大夫之族姓班位貴賤能否而又善為辭令禆諶能謀謀於野則獲得所謀也謀於邑則否此才性之弊鄭國将有諸侯之事子産乃問四國之為於子羽且使多為辭令與禆諶乗以適野使謀可否而告馮簡子使斷之事成乃授子太叔使行之以應對賔客是以鮮有敗事北宫文子所謂有禮也傳跡子産行事以明北宫文子之言子産作丘賦丘十六井當出馬一匹牛三頭今子産别賦其田如魯之田賦田賦在哀公十一年國人謗之謗毁也曰其父䘮于路謂子國為尉氏所殺已為蠆尾謂子産重賦毒害百姓以令於國國将若之何子寛以告子寛鄭大夫也子産曰何害茍利社稷死生以之以用也且吾聞為善者不改其度故能有濟也民不可逞度不可改度法也詩曰禮義不愆何恤于人言逸詩也子産自以為權制濟國於禮義無愆吾不遷矣遷移也鄭定公六年五月鄭火作子産辭晉公子公孫于東門晉人新來未入故辭不使前也使司寇出新客新來聘者禁舊客勿出于宫為其知國情不欲令去使子寛子上廵羣屏攝至於大宫二子鄭大夫屏攝祭祀之位大宫鄭祖廟廵行宗廟不得使火及之也使公孫登徙大龜登開卜大夫使祝史徙主祏于周廟告于先君祏廟主石凾周廟厲王廟也有火災故合羣主于祖廟易救䕶使府人庫人各儆其事儆備火也商成公儆司宫商成公鄭大夫司宫巷伯寺人之官出舊宫人寘諸火所不及舊宫人先公宫女司馬司寇列居火道備非常也行火所焮焮戻也城下之人伍列登城為部伍登城備姦也明日使野司寇各保其徵野司寇縣士也火之明日四方乃聞災故戒保所徵役之人郊人助祝史除于國北為祭處于國北者就大隂禳火禳火于𤣥㝠回禄𤣥㝠水神回禄火神祈于四鄘鄘城也城積土隂氣所聚故祈祭之以禳火之餘災也書焚室而寛其征與之財征賦税也三日哭國不市示憂戚不㑹市使行人告于諸侯七月子産為火故大為社為治也祓禳于四方振除火災禮也振棄也乃簡兵大蒐将為蒐除治兵于廟城内地廹故除廣之子太叔之廟在道南其寢在道北其庭小庭蒐塲也過期三日處小不得一時畢使除徒陳於道南廟北曰子産過女而命速除乃毁於而鄉而女也毁女所向子産朝朝君過而怒之怒不毁除者南毁子産及衝使從者止之曰毁于北方言子産仁不忍毁人廟火之作也子産授兵登陴子太叔曰晉無乃討乎辭晉公子公孫而授兵似若叛晋子産曰吾聞之小國忘守則危况有災乎國之不可小有備故也子産有疾謂子太叔曰我死子必為政惟有徳者能以寛服民其次莫如猛夫火烈民望而畏之故鮮死焉水懦弱民狎而翫之狎輕也則多死焉故寛難難治也疾數月而卒太叔為政不忍猛而寛鄭國多盗取人于萑苻之澤萑苻澤名於澤内劫人太叔悔之曰吾蚤從夫子不及此興徒兵以攻萑苻之盜盡殺之盜少止仲尼曰善哉政寛則民慢慢則糾之以猛糾猶攝也猛則民殘殘則施之以寛寛以濟猛猛以濟寛政是以和詩曰民亦勞止汔可小康惠此中國以綏四方施之以寛也詩大雅汔其也康綏皆安也周厲王暴虐民勞于苛政故詩人刺之欲其施之以寛也毋從詭隨詭人隨人無正心不可從以謹無良謹勑慎也式遏寇虐慘不畏明糾之以猛也式用也遏止也慘曽也言為寇虐曽不畏明法者亦當用猛政糾治之也柔遠能邇以定我王予之以和也柔安也邇近也遠者懷附近者各以能進則王室定又曰不競不絿不剛不柔詩殷頌言湯政得中和競强也絿急也布政優優百祿是遒優優和也遒聚也和之至也管仲旣任政相齊以區區之齊在海濵通貨積財富國强兵與俗同好惡故其稱曰倉廪實而知禮節衣食足而知榮辱上服度則六親固四維不張國乃滅亡管子曰四維一曰禮二曰義三曰亷四曰恥下令如流水之原令順民心故論卑而易行俗之所欲因而予之俗之所否因而去之其為政也善因禍而為福轉敗而為功貴輕重順權衡管子卒齊國遵其政常彊于諸侯蔿掩為楚司馬蔿子馮之子子木使庀賦庀治數甲兵閱數之蔿掩書土田書土地之所宜度山林度量山林之材以共國用鳩藪澤鳩聚也聚成藪澤使民不得焚燎壞之欲以備田獵之處辨京陵辨别也絶髙曰京大阜曰陵别之以為冡墓之地表淳鹵淳鹵埇薄之地表異輕其賦税數疆潦疆界有流潦者計數減其租入規偃豬偃豬下濕之地規度其受水多少也町原防廣平曰原防隄也隄防間地不得方正如井田别為小頃町牧隰臯隰臯𤓰岸下隰為芻牧之地井衍沃衍沃平美之地則如周禮制以為井田六尺為歩歩百為畆畆百為夫九夫為井量入修賦量九土之所入而治理其賦税賦車籍馬齒疏其毛色歲籍以備軍用賦車兵車兵甲士徒兵歩卒甲楯之數使器楯有常數旣成以授子木禮也得治國之禮孫叔敖為楚相施教導民上下和合世俗盛美政緩禁止吏無姦邪盜賊不起秋冬則勸民山採春夏以水乗多水時而出村竹各得其所使民皆樂其生荘王以為幣輕更以小為大百姓不便皆去其業市令言之相曰市亂民莫安其處次行不定相曰如此幾何頃乎市令曰三月頃相曰罷吾今令之復矣後五日朝相言之王曰前日更幣以為輕今市令來言曰市亂民莫安其處次行之不定臣請遂令復如故王許之下令三日而市復如故楚民俗好庳車王以為庫車不便馬後下令使髙之相曰令數下民不知所好不可王必欲髙車臣請教閭里使髙其梱乗車者皆君子君子不能數下車王許之居半歲民悉自髙其車此不教而民從其化近者視而效之逺者四靣望而法之莊王十五年叔敖城沂沂楚邑使封人慮事封人其時主築城者慮事先慮計功以授司徒司徒掌役量功命日命作日數分財用財用築作之具平版榦榦楨也稱畚築稱量輕重畚盛土器程土物為作程限議逺邇均勞逸畧基趾趾城足畧行也具餱糧餱乾食也度有司謀監主事三旬而成十日為旬不愆于素不過素所慮之期也言叔敖之能使民也吴起相楚悼王明法審令捐不急之官廢公族踈逺者以撫養戰鬭之士要在強兵破馳説之言從横者於是南平百越北并陳蔡却三晉西伐秦申不害為韓昭侯相内修政教外應諸侯十五年終申子之身國治兵强無侵韓者衛鞅為秦左庶長定變法之令令民為什伍而相牧司連坐不告姦者腰斬告姦者與斬敵首同賞匿姦者與降敵同罰民有二男以上不分異者陪其賦有軍功者各以率音律受上爵為私鬬者各以輕重被刑大小僇力本業耕織致粟帛多者復其身事末利及怠而貪者舉以為牧孥宗室非有軍功論不得為屬籍明尊卑爵秩等級各以差次名田宅臣妾衣服以家次有功者顯榮無功者雖富無所芬華令旣具未布恐民之不信已乃立三丈之木於國都市南門募民有能徙置北門者予十金邑民怪之莫敢從復曰能徙者予五十金有一人徙之輒予五十金以明不欺卒下令令行於民期年秦國之民都言初令之不便者以千數於是太子犯法衛鞅曰法之不行自上犯之将法太子太子君嗣也不可施刑刑其傅公子䖍黥其師公孫賈明日秦人皆趍令行之十年秦民大悦道不拾遺山無盗賊家給人足民勇于公戰怯于私鬭鄉邑大治秦民初言令不便者有來言令便者鞅曰此皆亂化之民也盡遷之於邊城其後民莫敢議令於是以鞅為大良造居三年作為築冀鬬宫庭於咸陽秦自雍徙都之而令民父子兄弟同室内息者為禁而集小都鄉邑聚為縣置令丞凡三十一縣為田開阡陌封疆而賦税平平斗桶音勇今之斛也權衡丈尺行之四年公子䖍復犯約劓之居五年秦人富彊天子致胙于孝公諸侯畢賀知禮禮者國之幹也身之文也於人之若麴蘖在治之由粉澤降自中古下逮列國承商因之制増周監之文故有家陪之臣禮義是習辨尊卑之序達升降之節别㑹盟之等詳贈勞之規或辭享於王朝徹加於鄰國避湛露之賦歸宰旅之司致三肅以惟恭薦六儀而靡忒宜乎寵以文路賜之州田享昌阜之祥加好貨之數傳曰忠信之人可以學禮其斯之謂歟韓厥為晉大夫晉郤克與齊侯戰于鞍魯成公二年齊師敗績韓厥從齊侯及之執縶馬前縶馬絆也執之示修臣僕之職再拜稽首奉觴加璧以進進觴璧亦以示敬曰寡君使羣臣為魯衛請曰無令輿師陷入君地本但為二國救請不意乃過入君地謙辭下臣不幸屬當戎行無所逃隠屬適且懼奔辟而忝兩君臣辱戎士若奔避則為辱晉君并為齊侯羞故言二君此盖韓厥自處臣僕謙敬之飾言敢告不敏攝官承乏言欲以己不敏攝承空乏從君俱還齊侯以逢丑父故獲免丑父齊臣與公易位故韓厥獲丑父也其後晉侯享齊侯魯成公二年齊侯視韓厥韓厥曰君知厥也乎齊侯曰服改矣戎朝異服也言服改明識其人韓厥登舉爵曰臣之不敢愛死為兩君之在此堂也郤至為晉大夫鄢陵之戰魯成公十六年郤至以韎韋之跗注三遇王卒賈逵云一染曰韎鄭司農説以為韎茅蒐染也韎齊也韋昭謂茅蒐今絳草也急疾呼茅蒐成韎也凡染一入為縓跗注兵服也自腰以下注于跗也見王必下奔下下車奔走退戰王使工尹襄問之以弓工尹楚官襄名問遺也曰方事之殷也事戎事殷中也有韎韋之跗注君子也屬見不榖而下無乃傷乎屬適傷恐其傷郤至甲胄而見客免胄而聽命免脱也脱胄為障耳曰君之外臣至以寡君之靈間蒙甲胄蒙被也被介在甲胄之間不敢當拜君命之辱為使者故敢三肅之禮軍事肅拜肅拜者下手至地也君子曰勇以知禮禮軍禮也韓宣子為晉大夫聘于周魯襄公二十六年王使請事問何事來聘對曰晉士起将歸時事于宰旅無他事矣起宣子名禮諸侯大夫入天子國稱士時事四時貢職宰旅冡宰之士言獻職貢於宰旅不敢斥尊王聞之曰韓氏其昌阜於晉乎辭不失舊阜大也傳言周衰諸侯莫能如禮惟韓起不失舊趙文子為晉大夫楚屈建卒魯哀公二十八年趙文子䘮之如同盟禮也宋之盟有𠂻甲之隙不以此廢好故曰禮公孫叚為鄭大夫鄭伯如晉魯昭公三年公孫叚相甚敬而卑禮無違者晉侯嘉焉授之以策策賜命之書曰子豐有勞於晉國子豐叚之父余聞而弗忘賜女州田州縣今屬河内郡以胙乃舊勲伯石再拜稽首受策以出君子曰禮其人之急也乎伯石之汰也伯石叚字汰驕也一為禮於晉猶荷其祿况以禮終始乎詩曰人而無禮胡不遄死其是之謂乎女叔齊為晉大夫魯昭公如晉五年自郊勞至於贈賄無失禮晉侯謂女叔齊曰魯侯不亦善於禮乎對曰魯侯焉知禮公曰何為自郊勞至於贈賄禮無違者何故不知對曰是儀也不可謂禮禮所以守其國行其政令無失其民者也今政令在家不能取也有子家羈弗能用也奸大國之盟陵虐小國利人之難不知其私公室四分民食于他思莫在公不圖其終為國君難将及身不恤其所禮之本末将於此乎在而屑屑焉習儀以亟言以習儀為急言善于禮不亦遠乎君子謂叔齊於是知禮趙孟為晉大夫越圍吳魯哀公二十年趙孟降於䘮食趙孟襄子無恤也時有父簡子之䘮楚隆曰三年之䘮親暱之極也主又降之無乃有故乎楚隆襄子家臣趙孟曰黄池之役先主與吳王有質先主簡子質盟信也曰好惡同之今越圍吳嗣子不廢舊業而敵之嗣子襄子自謂欲敵越救吳非晉之所能及也吾是以為降楚隆曰若使吳王知之若何趙孟曰可乎隆曰請嘗之嘗試之也乃往先造乎越軍曰吳犯間上國多矣聞君親討焉諸夏之人莫不欣喜惟恐君志之不從請入視之許之告于吳王曰寡君之老無恤使陪臣隆敢展謝其不共展陳也黄池之役君之先臣志父得承齊盟曰好惡同之今君在難無恤不敢憚勞非晉國之所能及也使陪臣敢展布之王拜稽首曰寡人不佞不能事越以為大夫憂拜命之辱與之一簞珠簞小笥使問趙孟問遺也曰句踐將生憂寡人寡人死之不得矣皇武子為鄭卿宋成公如楚還入於鄭魯僖公二十四年鄭伯將享之問禮於皇武子對曰宋先代之後也於周為客天子有事膰焉有事祭宗廟也膰祭肉尊之故賜以祭胙有䘮拜焉宋弔周䘮王特拜謝之豐厚可也鄭伯從之享宋公有加禮也子産為鄭大夫鄭簡公卒魯昭公十二年將為葬除除葬道及游氏之廟游氏子太叔族將毁焉子太叔使其除徒執用以立而無庸毁用毁廟具曰子産過女而問何故不毁乃曰不忍廟也諾將毁矣教毁廟者之辭既如是子産乃使辟之司墓之室有當道者簡公别營葬地不在鄭先公舊墓故道有臨時遷直也司墓之室鄭之掌公墓大夫徒屬之家毁之則朝而下棺弗毁則日中而子太叔請毁之曰無若諸侯之賔何不欲乆留賔子産曰諸侯之賔能來㑹吾䘮豈憚日中無損於賔而民不害何故不為遂弗毁日中而葬君子謂子産於是乎知禮禮無毁人以自成也是嵗晉侯享諸侯子産相鄭伯辭於享請免䘮而後聽命簡公未葬晉人許之禮也善晉不奪孝子之情季孫宿為魯大夫如晉魯昭公六年拜莒田也謝前年受牟夷邑不見討晉侯享之有加籩籩豆之數多于常禮武子退使行人告曰小國之事大國也茍免於討不敢求貺貺賜也得貺不過三獻常禮大夫三獻今豆有加下臣弗堪無乃戾也懼以不堪為罪宣子曰寡君以為驩也以加禮致驩對曰寡君猶未敢未敢當此加也况下臣君之隸也敢聞加貺固請徹加而後卒事晉人以為知禮重其好貨宴好之貨叔孫武叔為魯大夫從哀公㑹吳子伐齊魯哀公十一年将戰吳子呼叔孫叔孫武叔州仇也曰而事何也問其何職對曰從司馬從吳司馬所命王賜之甲劍鈹曰奉爾君事敬無廢命叔孫未能對衛賜進賜子貢孔子弟子也曰州仇奉甲從君而拜拜受之縣子為魯大夫陳荘子死赴於魯魯人欲勿哭君無哭鄰國大夫之禮陳荘子齊大夫陳常之孫名伯繆公召縣子而問焉縣子曰古之大夫束修之問不出竟欲哭之安得而哭之以其不外交今之大夫交政于中國雖欲弗哭焉得而勿哭言時君弱臣强政在大夫專盟㑹以交接且臣聞之哭有二道有愛而哭之有畏而哭之以權激勸之公曰然然則如之何而可縣子曰請哭諸異姓之廟明不當哭於是與哭諸縣氏寗武子為衛大夫聘於魯魯文公四年公與之宴為賦湛露及彤弓非禮之常公特命樂人以示意故言為賦湛露彤弓詩小雅不辭又不答賦使行人私焉私問之對曰臣以為肄業及之也肄習也魯人失所賦寗武子佯不知此其愚不可及昔諸侯朝正於王朝而受政教也王宴樂之於是乎賦湛露則天子當陽諸侯用命也湛露曰湛湛露斯匪陽不晞晞乾也言露見日而乾猶諸侯禀命天子而行諸侯敵王所愾而獻其功敵猶當也愾恨怒也王於是乎賜之彤弓一彤矢百玈弓矢千以覺報宴覺明也謂諸侯有四夷之功王賜之弓矢又為歌彤弓以明報功宴樂今陪臣來繼舊好方論天子之樂故自稱陪臣君辱貺之其敢干大禮以自取戾戾罪也合左師為宋大夫楚子合諸侯于申魯昭公四年使問禮於左師與鄭子産左師曰小國習之大國用之敢不薦聞言所聞謙言所未行獻公合諸侯之禮六其禮六儀也宋爵公故獻公禮子産曰小國共職敢不薦守獻伯子男㑹公之禮六鄭伯爵故稱伯子男㑹公之禮其禮同所從言之異君子謂合左師善守先代子産善相小國管仲為齊大夫齊侯使管仲平戎於王魯僖公十二年平和也王以上卿之禮享管仲管仲辭曰臣賤有司也有天子之二守國髙在國子髙子天子所命為齊守臣皆上卿也荘公二十二年髙傒始見經僖公二十八年國歸父乃見傳歸父之父曰懿仲髙傒之子曰荘子不知當今誰世若節春秋來承王命何以禮焉節時也陪臣敢辭諸侯之臣曰陪臣王曰舅氏伯舅之使故曰舅氏余嘉乃勲應乃懿徳謂督不忘往踐乃職無逆朕命功勲美徳可謂正而不可忘者不言位而言職者管仲位卑而執齊政故欲以職尊之管仲受下卿之禮而還管仲不敢以職自髙卒受本位之禮君子曰管仲之世祀也宜哉讓不忘其上詩曰愷悌君子神所勞矣國荘子為齊大夫聘于魯魯荘公三十三年自郊勞至於贈賄禮成而加之以敏迎來曰郊勞送去曰贈賄敏審當于事也穆叔為魯大夫齊人城郟穆叔如周魯襄公二十四年聘且賀城王嘉其有禮也賜之大路大路天子所乗車之總名商陽為楚工尹與陳棄疾追吳師及之工尹楚官名棄疾楚公子棄疾也陳棄疾謂工尹商陽曰王事也子手弓而可手弓子射諸商陽仁不忍傷人以王事勸之射之斃死韔弓不忍復射斃死人死也韔韜也又及謂之又斃二人毎斃一人掩其目掩其目不忍視之止其御曰朝不坐燕不與殺三人亦足以反命矣朝燕於寢大夫坐于上士立于下然則商陽與御者皆士也兵車叅乗射者在左戈盾在右御在中央孔子曰殺人之中又有禮焉善之册府元龜巻七百三十八
