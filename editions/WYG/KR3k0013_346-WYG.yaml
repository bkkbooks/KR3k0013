body:
  text: 冊府元龜卷三百四十六宋王欽若等撰将帥部佐命第七梁龎師古曹州南華人初以中涓從太祖性端愿未嘗離左右及太祖鎮汴樹置戎伍始得馬五百匹即以師古為偏将軍援陳破蔡累有戰功及朱珍以罪誅遂用師古為都指揮使乃渡淮餉軍于廬壽攻滁州破天長下髙郵沿淮轉戰所至克捷尋代朱友裕領軍攻下徐州斬時溥首以獻遂移軍伐兖入中都寨于梁山敗朱瑄之衆襲至壘下又破朱瑾于清河從討汶陽與朱瑄朱瑾及晉将史儼兒戰于故樂亭大捷而回唐昭宗乾寕四年正月復統諸軍伐鄆拔之擒其帥朱瑄以獻始表為天平節度留後尋以功授徐州節度使後與淮人戰沒於陣霍存洺州曲周縣人性驍勇善騎射在黄巢中已為将領唐僖宗中和四年太祖大破巢軍于王藩渡時存與葛從周張歸霸皆自巢軍來降太祖宥而納之其後破王夏寨擊殷鐵林並在戰中尋佐朱􅎇取滑臺攻淄州趣傅昌皆預戰立功蔡賊張郢在汴北存以三千人夕犯其營破之用本部騎兵敗秦賢軍殺五千人連破四寨盡得其輜重從討盧塘張郢殪萬餘人存功居多我軍之圍濮州也有賊升眺樓大詬太祖怒甚召存射之矢一發而屍殞其下賞賚甚厚復佐朱􅎇擒石璠破魏師敗徐戎又佐龎師古至吕梁敗時溥二千餘衆以是累遷官初王師渡淮乏食不甚利唯存軍戰有功淮賊乃引退太祖之討宿州也葛從周以水壊其垣丁㑹以師乗其墉存戰壘外敗其軍宿人乃降明年佐郴王友裕擊時溥于碭山破之獲蕃将石君和等五十人是嵗復與晉軍戰于馬牢川始入為前鋒出則後拒虜不敢逼乃渡河襲淇門殺三十餘人曹州刺史郭紹賔之來歸也存以師援之遂代其任始朱友裕以大軍伐鄆臨其壁旣而師陷圍中以急來告存領二百騎馳赴擊退之太祖喜拔為諸軍都指揮使後與徐兖之衆合戰於石佛山下中流矢而卒張存敬譙郡人也性剛直有膽勇臨危無所畏憚唐僖宗中和中從太祖赴汴以其壯節頗見親昵首為右騎都尉從討巢蔡凡歴百戰多於危䠞之間顯有竒畧繇是頻立殊效光啟中李罕之㑹晉軍圍張崇奭於盟津太祖遣丁會葛從周及存敬同徃馳救存敬引騎軍先犯虜騎諸軍翼之虜騎大敗乃解河南之圍昭宗大順二年為諸軍都虞侯佐霍存董大軍収宿州以功奏加撿校兵部尚書太祖東征徐兖存敬屢有俘斬之功凡受指顧皆與機㑹矢石所及必以身先太祖尤加優異以為行營都指揮使後累以戰功除護國将軍留後移宋州刺史将之任卒冦彦卿大梁人也祖琯父裔皆宣武軍牙校大祖鎮汴以彦卿将家子擢在左右弱冠選為通贊官太祖為元帥府押牙領雒州刺史羅紹威将殺牙軍遣使告于太祖太祖命彦卿使于魏密與紹威謀之竟成其事彦卿之力也彦卿身長八尺隆凖方面語音如鐘善騎射好書史復善伺太祖之㫖凡所作為動皆𤣥合太祖每言曰敬翔劉捍冦彦卿盖為我而生其見重如此太祖有所乗馬號一丈烏嘗以賜彦卿唐天復中太祖迎昭宗于鳯翔累與岐軍對陣時彦卿為諸道馬歩軍都排陣使常躬擐甲胄乗其所賜烏馬騁于陣前太祖目之曰真神將也昭宗還京賜迎鑾毅勇功臣改邢州刺史尋遷亳州圑練使太祖受禪授華州節度使葛從周濮州鄄城人從周少豁達有智畧初入黄巢軍漸至軍校唐僖宗中和四年三月太祖大破黄巢于王藩渡從周與霍存張歸霸昆弟相率來降七月從太祖屯兵於西華破蔡賊王夏寨太祖臨陣馬踣賊衆來追甚急從周扶太祖上馬與賊軍格鬭傷面矢中于肱身被數鎗奮命以衛太祖賴張延夀囘馬轉鬭從周與太祖俱免退軍溵水諸将並削職唯擢從周延壽為大校其後入長葛靈井大敗蔡賊至斤溝淝河殺鐵林三千人獲九寨都虞侯王涓太祖遣郭言募兵於陜州有黄花子賊據於溫谷從周擊破之又破秦賢之衆於滎陽尋佐朱􅎇収兵於淄青間時兖州齊克譲軍於任城從周破之擒其将吕全真淄人不受制復與之戰獲其驍将鞏約㑹青州以歩騎萬餘人列三寨于金嶺以扼要害從周與朱􅎇戰大殱其衆虜其将楊昭範五人而還至太原不解甲徑至板橋擊蔡賊破盧塘寨塘自溺而死又于赤岡殺蔡軍二萬餘人從討謝殷于亳州擒之廻襲曹州虜刺史丘宏禮以歸與兖鄆軍遇於臨濮之劉橋間殺數萬人朱瑄朱瑾僅以身免擒都将鄒務卿以下五千人從太祖至范縣復與朱瑄戰虜尹萬榮等三人遂平濮州未幾與朱􅎇擊蔡賊於陳亳間獲都将石璠文徳元年魏博軍亂樂從訓來告急從太祖渡河拔黎陽李固臨河等鎮至内黄破魏軍萬餘衆獲其将周儒等十人李罕之引并人圍張全義於河陽從周與丁㑹張存敬牛存節率兵赴援大破并軍殺蕃漢二萬人解河陽之圍以功表授撿校工部尚書從朱􅎇討徐州拔豐縣敗時溥於吳康得其輜重加檢校刑部尚書佐龎師古討孫儒於淮南略地至廬夀滁等州下天長髙郵破邵伯堰廻軍攻濠州殺刺史魏勳得餉船十艘昭宗大順元年八月并師圍潞州太祖遣從周率敢死之士夜銜枚犯圍而入會王師不利於馬牢川即棄上黨而歸其年十二月與丁㑹諸将討魏州連收十邑明年正月大破魏軍于永定橋魏軍五敗斬首萬餘級十月佐丁㑹攻宿州從周壅水灌其城刺史張筠以郡降從討兖州破朱瑾之軍於馬溝景福二年二月與諸将大破徐兖之兵於石佛山八月與龎師古同攻兖州乾寧元年三月軍至新太縣朱瑾令都将張約李胡椒帥三千人來拒戰師古遣從周張存敬掩襲生擒張約李胡椒等都将數十人二年十月圍兖州兖人不出從周詐揚言并人鄆人來救即引軍趨髙吳夜半潜却歸寨朱瑾果出兵攻外壕我軍士突出掩殺千餘人生擒都将孫漢筠從周累立戰功自懐州刺史歴曹宿二州刺史累遷檢校左僕射三年五月并師以大軍侵魏遣其子落落率二千騎屯洹水從周以馬歩二千人擊之殺戮大盡擒落落于陣并師號泣而去遂自洹水與龎師古渡河擊鄆四年正月下之從周乗勝伐兖州朱瑾出師在徐境其將康懐英以城降以功授兖州留後檢校司空復領兵萬餘人渡淮討楊行密至濠州聞龎師古清口之敗遽班師光化元年四月率師經畧山東時并帥以大軍屯邢洺從周至鉅鹿與并軍相遇大破之并帥遁走我軍追襲至青山口數日之内邢洺磁三州連下斬首二萬級獲将吏一百五十人即以從周兼領邢州留後十月復破并軍五千騎于張公橋晉将李嗣昭急攻邢州陣于城外從周大破之擒蕃将賁金鐵慕容騰等百餘人二年春幽州劉仁恭率軍十萬冦魏州屠其郡從周自邢臺馳入魏州燕軍突上水關攻館陶門從周與賀徳倫率五百騎出戰謂門者曰前有敵不可返顧令闔其門從周等極力死戰大破燕人擒都将薛突厥王鄶郎等翊日破其八寨追擊至臨清劉仁恭走滄州從周受宣義軍司馬五月并人討李罕之於潞州太祖以丁㑹代罕之令從周馳入上黨七月并人陷澤州太祖召從周令賀徳倫守潞州徳倫等尋棄城而歸三年四月領軍討滄州先攻徳州下之及進攻浮陽幽州劉仁恭大舉來援時都監􅃽𤣥暉謂諸将曰吳王命我䕶軍志存攻取今燕師來赴不可外戰當縱其入壁聚食囷廩力屈糧盡可取也從周對曰兵在機機在上将非督䕶所言也乃令張存敬氏叔琮守其寨從周逆戰于乾寧軍老鴉堤大破燕軍斬首三萬獲将佐馬慎交已下百餘人奪馬三千匹八月并人攻邢洺從太祖破之從周追襲至青山口斬首五千級獲其将王郃郎楊師恱等得馬千匹表授撿校太保兼徐州兩使留後尋為兖州節度使天復元年三月與氏叔琮討太原從周以兖鄆之衆自土門路入與諸軍會於晉陽城下以糧運不給班師頃之從周染疾會青州将劉鄩陷兖州太祖命從周討之遂力疾臨戎三年十一月鄩舉城降以功授撿校太傅後致仕張歸霸清河人歸霸少倜儻好兵術唐僖宗乾符中冦盗蜂起歸霸率昆弟三人棄家投黄巢頗以勇畧聞巢陷長安遂署為左蕃功臣中和中巢領徒走宛丘時太祖在汴奉詔南討巢黨日尅歸霸昆仲與葛從周李讜等相率來降尋補宣武軍劇職光啟二年與蔡将張存戰于盧氏三年夏又與蔡将盧塘戰于雙丘復與秦宗賢戰于萬勝皆敗而殱之翌日秦宗權遣将張郅來冦列寨於赤堈一日出騎将校勝歸霸為飛弋所中即拔馬却逸控弦一發賊洞頸而墜遂兼騎而還太祖時于髙丘下瞰備見其状面加賞激厚以金帛及所獲馬錫之又嘗被命以控弦之士五百人伏于壕内太祖統數百騎稍逼其寨蔡人果以銳士麾壘來追歸霸發伏兵掩殺千餘人奪馬數十匹尋奏授檢校左散騎常侍其後從太祖伐鄆副李唐賔渡淮咸著竒績文徳初大軍臨蔡州賊将蕭顥來斫寨歸霸與徐懐玉各以所領兵自東南二扉分出合勢殺賊蔡人大敗及髙祖整衆離營冦塵已息太祖召至賞之曰昔耿弇不俟光武擊張歩言不以賊遺君父弇之功爾其二焉昭宗大順中郭紹賔拔曹州歸霸提兵數千守之俄而朱瑾統大軍自至歸霸與丁㑹逆擊之于金鄉瑾大敗擒賊将宋江等七十餘人曹州以寧明年破濮州生擒刺史邵儒又佐葛從周與晉軍戰于洹水生擒克用愛子落落復與燕人戰於内黄殺仁恭兵三萬餘衆戎績超特居諸将之右累官至檢校左僕射光化二年權知邢州事明年春李嗣昭以蕃漢五萬來冦歸霸堅壁設備晉軍不敢顧其城遂移軍攻洺州陷焉時太祖在滑頗慮邢之失守及葛從周復洺水嗣昭北遁歸霸出兵襲之殺二萬餘衆捷至賞賜殊等旋以功奏加檢校司空天祐初遷萊州刺史秩滿授左衛上将軍又除曹州刺史其秋加檢校司徒副劉知俊禦邠鳯之冦敗之太祖受禪拜右龍虎統軍楊師厚潁川斤溝人也初為李罕之部将以猛決聞尤善騎射及罕之敗退保澤州師厚與李鐸何綱等來降太祖署為忠武軍牙将繼歴軍職累遷檢校右僕射表授曹州刺史唐昭宗天復二年從太祖迎昭宗于岐下李茂真以勁兵出戰為師厚所敗及王師範以青州叛太祖遣師厚率兵東討時淮賊王景仁以衆二萬來援師範師厚逆擊破之追至輔唐縣斬首數百級授齊州刺史将之任太祖急召見於鄆西境遣師厚率歩騎屯于臨胊而聲言欲東援密川留輜重於臨胊師範果出兵來擊師厚設伏於野追擊至聖王山殺萬餘衆擒都将八十人未幾萊州刺史王師誨以兵救師範又大敗之自是師範不復敢戰師厚移軍寨於城下師範力屈竟降三年二月加檢校司徒徐州節度使天祐元年加諸軍行營馬歩都指揮使二年八月太祖討趙凝於襄陽命師厚統前軍以進趙凝嚴兵以備師厚至榖城西童山刋木造浮橋引軍過漢水一戰趙凝敗散携妻子沿漢遁去翌日表師厚為山南東道節度留後即令南討荆州留後趙明亦棄軍上峽不浹旬併下兩鎮乃正授襄州節度使太祖受禪加撿校太保同平章事牛存節青州博昌人也本名禮太祖改而字之少以雄勇自負唐僖宗乾符末鄉人諸葛爽為河陽節度使存節徃從之爽卒存節謂同輩曰天下汹汹當擇英主事之以圖富貴遂歸于太祖初授宣義軍小将屬蔡冦至金堤驛犯酸􅀥靈昌存節日與之鬭凡二十餘徃每徃必執俘而還前後斬首二千餘級獲孳畜甚衆太祖擊蔡賊于板橋赤堈酸􅀥門封禪寺枯河北存節皆預其行與諸将於濮州南劉橋范縣大破鄆衆自此深為太祖奨遇文徳元年夏李罕之以兵圍張宗奭於河陽太祖遣存節率軍赴之屬嵗歉饟餽不至村民有儲乾椹者存節以器用錢帛易之以給軍食大破賊於淇河罕之引衆北走又預討徐宿有功及討河北存節前鋒下黎陽収臨河至内黄以兵四千餘人當魏人萬二千衆大破其陣僵仆蔽野太祖深所歎激謂有神兵之助昭宗大順元年改滑州左右廂牢城使諸将討時溥累破賊軍景福元年秋改遏後都指揮使攻濮之役領軍先登遂拔其壘二年四月下徐州梟時溥存節力戰其功居多乾寧三年夏太祖東討鄆州存節領軍次故樂亭扼其要路都指揮使龎師古屯馬頰存節宻與都将王言謀入鄆壘十二月存節遣王言夜伏勇士於州西北以船踰濠舉梯登陴既而王言不克入存節獨率伏軍負梯䡴破其西壅城奪其濠橋諸軍俱進四年正月陷其城尋與葛從周降下兖州其年秋大舉以伐淮南至濠州東聞前軍失利于青口諸軍退至渒河無復隊伍存節遏其後與諸将大騎歩鬭諸軍稍得濟収合所部并敗兵共八千餘人至于淮涘時不食已四日矣存節訓勵部分以禦追冦遂得旋師五年除濠州刺史俄遷宣武軍都指揮使改宿州刺史明年淮賊大至彭城存節乃以部下兵夜發直趣彭門淮人訝其神速震恐而退諸将服其智識光化二年罷歸復為左衛都将兼馬歩教練使天復元年授潞州馬歩都指揮使法令之整士庶安之及追赴行在士卒泣送者不絶於道加金紫光禄大夫檢校司空改滑州左衛歩軍指揮使知邢州軍州事天祐元年授邢州圑練使時州兵未及二百人晉人知之以大軍來冦太祖在鄴發長直兵二千人赴援存節率壯健出門以家財賞激戰士并軍急攻之七日不能克而去太祖召至勞慰乆之厚賚金帛鞍馬冬罷郡署為元帥府左都押牙四年太祖受禪除右千牛衛上将軍王彦章鄆州壽張縣人也彦章少從軍𨽻太祖帳下以虓勇聞稍遷軍職累典禁兵從太祖征討所至有功嘗持鐵槍衝堅陷陣敵人畏之目之為王鐵槍開平二年十月自開封府押牙左親從指揮使授左龍天軍使三年轉左監門衛上将軍依前左龍驤軍使徐懐玉本名琮亳州焦夷縣人少以雄傑自任隨太祖起軍唐僖宗中和末從赴大梁光啟初蔡冦屯金堤驛懐玉将輕騎連破之繇是累遷親從副将改左長劍都虞侯又從破蔡賊於板橋収秦宗權八寨文徳初同諸将解河陽之圍復從破徐宿乾寕中太祖賜名懐玉又破朱瑾於金鄉南擒宋江以獻龎師古失利于清口懐玉獨完軍以退光化初轉滑州右都押牙兼右歩軍指揮使俄奏授沂州刺史頃之王師範以青州叛屢出兵侵軼懐玉擊退之天復三年轉齊州防禦使從大軍迎駕于岐下歸署華州觀察留後一年復領所部兵戍雍州尋召赴河中補晉絳同華五州馬歩都指揮使天祐三年授左羽林統軍轉右龍虎統軍領六軍之士赴澤州尋為晉軍所攻晝夜衝擊穴地而入之玉率親兵逆殺於隧中晉人遂退開平元年授曹州刺史劉捍開封人少為牙職太祖初鎮夷門以捍聰敏擢副典客唐僖宗中和四年夏太祖以朱􅎇為淄州刺史令収兵於淄青間命捍監其兵路逢大敵皆破之入博昌獲精兵三萬以歸四月合大軍敗蔡賊秦宗賢數萬衆於汴西文徳元年十一月蔡将申叢折宗權足納欵于太祖使捍奏其事加兼察御史大夫光化三年六月太祖北伐鎮定至恒山而王鎔危懾送欵於太祖命捍入壁門𫝊諭時兩軍未整守門者戈㦸千匝捍馳騎而入竟達其命又移師次中山至懐徳驛大破定人五萬衆王處直乞降捍復單馬入州安撫而廻太祖迎昭宗於岐下以捍為親事指揮使天復三年正旦宋文通令客将郭啟竒使於太祖命捍復命昭宗聞其至即召見詢東兵之事仍以錦服銀鞍勒馬賜之翌日授登州刺史昭宗還京改常州刺史賜號迎鑾毅勇功臣四月太祖伐王師範於青州改左右長直都指揮使天祐三年正月授宋州刺史太祖受禪授左龍虎統軍兼元從親軍馬歩都虞侯朱􅎇徐州豐縣雍鳯里人也太祖初起兵􅎇與龎師古許唐李暉丁會氏叔琮鄧季筠王武等八十餘人以中涓從摧堅陷陣所向盪決及太祖鎮汴領招討使署􅎇為宣武右職唐僖宗光啟元年署諸軍都指揮使始為上将太祖令􅎇募兵至乾封與淄人戰于白草口敗之青人以歩騎三萬列三寨於金嶺驛􅎇與戰連破之殱其帥盡獲軍器戎馬是夕攻博昌大獲兵衆而還其後破盧塘張郅及朱琮朱瑾之衆平定曹濮未嘗不在戰中梁山之救􅎇以踏白騎士入陳亳間以邀蔡人遂南至斤溝破淮西石璠之師三萬人虜璠以獻􅎇旋師自亳北趣静戎濟舟于滑破黎陽臨河李固三鎮軍于内黄敗樂從訓萬餘人分命聶金范居實畧澶州與魏師遇于内黄魏軍有豹子軍二千人戮之無噍類威振河朔復攻淮西至上蔡夾河而寨敗将蕭皓之衆皆擁于河溺死之進軍蔡州營其西既破羊馬垣遇雨班師􅎇以兵援劉贊赴楚州至襄山南遇徐戎扼其路􅎇乃攻豐下之時溥乃以全師會戰于豐南吳康里􅎇敗其三萬餘衆及蔡賊平􅎇比諸将功居多昭宗龍紀初與諸将屯於蕭縣以禦時溥及太祖徃蕭縣􅎇率将校迎謁氏叔琮尉氏人唐末應募為騎軍初𨽻于龎師古為伍長叔琮壮勇沉毅膽力過人太祖討巢蔡于陳許間叔琮奮擊首出諸校太祖壮之自行伍間擢為後院馬軍都将時東伐徐鄆多歴年所叔琮身當矢石奮不顧命觀者許焉累遷為指揮使尋奏授宿州刺史撿校左僕射鄧季筠宋州下邑人也少入巢軍𨽻于太祖麾下及太祖鎮汴首署為牙将主騎軍伐鄆之役生擒排陣将劉矯以獻康懐英兖州人太祖素聞其名得之甚喜尋署為軍校唐昭宗光化元年秋從氏叔琮伐襄漢懐英以一軍攻下鄧州三年從征河朔佐張存敬敗燕軍于易水之上天復元年冬太祖率師迎昭宗于鳯翔時李茂真遣大将符道昭領兵萬餘屯武功以拒太祖太祖命諸将擊之以懐英為前鋒領衆先登一鼓而大破之虜甲士六千餘人奪馬二千匹翌日太祖方至顧左右曰邑名武功今首盪逆黨真武功也乃召懐英大加奨激仍以駿馬珍器賜之二年四月符道昭復領大軍屯於虢縣之莫谷其建寨之所前臨巨澗後倚峻阜險不可升太祖遣懐英提騎數千急擊之道昭以懐英兵寡有俯視之意乃率甲士萬人絶澗以挑戰懐英始以千騎交鬭戰酣發伏以擊之岐軍大敗秋八月鄜帥李周彛屯軍於三原以援鳯翔太祖命懐英討之周彛拔軍而遁追至黎園因攻下翟州擒其守來獻俄而岐軍屯奉天太祖令懐英寨于岐軍之東北以備敵人一夕岐軍大至急攻其營懐英以夜中不可驚動諸軍獨以二千餘人抗數萬之衆自乙夜至四鼓身被十餘槍岐軍不勝而退昭宗還京賜迎鑾毅勇功臣是嵗淮人聞青兖之叛遣兵數萬以冦宿州太祖命懐英馳騎以救之淮人遁去即以懐英為權知宿州刺史天祐三年冬佐劉知俊破邠鳳之衆五萬于美原収十五餘寨乗勝引軍攻下鄜州以功授陜州節度使太祖受禪加撿校太保郭言太原人也家於南陽新野少以力穡養親鄉里稱之唐僖宗廣明中黄巢擁衆西犯秦雍言為巢黨所執後從太祖赴汴初為騎軍繼有戰功後擢為裨校言性剛直有權畧勤于戍事或以家財分給将士之貧者繇是頗得士心屢将兵與蔡冦戰于浚郊每以少擊衆出必勝歸太祖嘉其勇果謂賔佐曰言乃吾之虎侯也時秦宗權支黨數十萬太祖兵不過數千每恨其寡與之不敵一日命言董數千人越河雒趨陜虢招召丁壮以實部伍言夏徃冬旋得銳士萬餘遂遷歩軍都将自是隨太祖掩襲蔡冦斬獲掠奪不可勝計宗權以兹敗北太祖盡収其地因命言将兵導達貢奉以安郵𫝊自汴鄭迄於潼關去奸恤弱甚得其所光啟中僖宗以太祖兵威日振命兼領揚州節度使太祖遣幕吏李璠領兵赴淮揚以制置為名時言為李璠前鋒深入淮甸破盱眙而還梁祖東伐徐鄆言将偏師畧地千里頻逢冦敵言出竒決戰所向皆捷大挫東人之銳太祖録其績以排陣斬斫之號委之尋表為宿州刺史撿校右僕射于時徐宿兵鋒日夕相接控扼偵邏以言為首劉康乂壽昌安封縣人也以農桑為業唐僖宗乾符中關東羣盗並起江淮間徧罹其酷因為巢黨所掠康乂沈黙有膂力善用矛槊然不樂為暴中和三年從太祖赴鎮委以心腹康乂枕戈擐甲夷險無憚其後累典親軍襲巢破蔡斬獲尤多累以戰功遷元從都将從太祖連年攻討徐兖鄆所向多捷尤善於營壘充諸軍壕寨使及太祖盡下三鎮議其功奏加撿校右僕射兼領軍衛范居實絳州翼城人事太祖初為隊将軍從討巢蔡有功又從朱􅎇収滑州改左廂都虞侯預破兖鄆功遷感義都頭鄭州馬軍指揮使幽州劉仁恭舉衆南下冦魏郡北闉居實與葛從周張存敬率兵救魏大破幽滄之衆於内黄太祖迎昭宗於岐下以居實為河中馬軍都指揮使及昭宗還京賜迎鑾毅勇功臣遥領錦州刺史又遷左龍驤馬軍都指揮使從征淮南廻改登州刺史轉左神勇軍使開平元年用軍於潞州命居實統軍以解州之圍授耀州刺史令以郡兵屯固鎮尋除澤州刺史居實拳勇善戰頗立軍功册府元龜卷三百四十六
