body:
  text: 册府元龜卷八十二宋王欽若等撰帝王部赦宥書曰宥過無大又曰𤯝災肆赦易曰雷雨作解君子以赦過宥罪周禮秋官司刺掌三宥三赦之法春秋書肆大𤯝斯皆赦宥之制也是知帝王以為死者不可復生刑者不可復續故開仁恕之道行曠蕩之恩所以釋既往之辜示自新之路也漢晉而下歴代相承至若展義時廵遂行於慶賜弔民伐罪惟新其號令亦有覩災異而戒懼因祥瑞而報功雖行渙汗之恩或起徼倖之弊故古人有言曰赦不欲數數則惠奸非為政之善也管子云赦者犇馬之委轡也是以王者戒而慎之漢高祖二年立太子赦罪人五年正月詔曰兵不得休八年萬民與與音弋庶切苦甚今天下事畢其赦天下殊死以下六月壬辰大赦天下六年十二月詔曰天下既安豪傑有功者封侯新立未能畫圖其功身居軍九年或未習法令或以其故犯法大者死刑吾甚憐之其赦天下八年八月吏有罪未發覺者赦之九年正月詔曰丙寅前有罪殊死以下皆赦之十年七月癸卯太上皇崩塟萬年赦櫟陽囚死罪㔾下萬年陵在櫟陽縣界特赦之十一年秋七月淮南王布反上赦天下死罪已下皆令從軍十二年三月詔曰燕王綰與吾有故愛之如子聞與陳豨有謀吾以為亡有故使人迎綰綰稱疾不來謀反明矣燕吏民非有罪也賜其吏六百石㔾上爵各一級與綰居去來歸者赦之四月丁未大赦天下孝惠四年三月甲子皇帝冠赦天下孝文以高后八年閏七月乙酉即皇帝位即日夕入未央宫還坐前殿下詔曰丞相太尉御史大夫閒者諸吕用事擅權謀為大逆欲危劉氏宗廟賴將相列侯宗室大臣誅之皆伏其辜朕初即位其赦天下賜民爵一級女子百户牛酒酺五日二年正月丁亥詔曰夫農天下之本也其開藉田朕親率耕以給宗廟粢盛民讁作縣官及貸種食未入入未備者赦之三年七月詔曰濟北王背徳反上詿誤吏民為大逆濟北吏民兵未至先自定及㠯軍城邑降者皆赦之復官爵與王興居去來者赦之八月濟北王興居自殺赦諸與興居反者十五年四月幸雍始郊見五帝大赦天下脩名山大川常祀而絶者有司以歲時致禮後元四年五月赦天下免官奴婢為庶人孝景元年四月赦天下賜民爵一級三年正月吴王濞膠西王卬楚王戊趙王遂濟南王辟光菑川王賢膠東王雄渠皆舉兵反大赦天下二月破七國六月詔曰廼者吴王濞等為逆起兵相脅詿誤吏民不得㔾今濞等已滅吏民當坐濞等及逋逃亡軍者皆赦之四年六月赦天下賜民爵一級中元元年四月赦天下賜民爵一級五年六月赦天下賜民爵一級後元元年三月赦天下賜民爵一級中二千石諸侯相爵右庶長右庶長第十一爵孝武建元元年二月赦天下賜民爵一級年八十復二筭九十復甲卒二筭二口之筭也復甲卒不豫革車之賦也五月赦吴楚七國帑輸在官者吴楚七國反時其首事者妻子没入為官奴婢武帝哀焉皆赦遣之也帑讀與孥同元光元年四月赦天下賜民長子爵一級四年五月地震赦天下六年春詔曰夷狄無義所從來乆間者匈奴數寇邊境故遣將撫師古者治兵振旅因遭虜之方入將吏新會上下未輯詔言古者出則治兵入則振旅素練其衆不虧戎律今之出師因遭寇虜方入為害而將吏新會上下未和故校尉棄軍而奔北也輯與集同代郡將軍敖雁門將軍廣所任不肖肖似也不肖者言無所象類謂不才之人也校尉又背義妄行棄軍而北少吏犯禁少吏小吏也用兵之法不勤不教將率之過也教令宣明不能盡力士卒之罪也將軍已下廷尉使理正之而又加法於士卒二者並行非仁聖之心朕閔衆庶䧟害欲刷恥改行復奉正義厥路亡繇一䧟重刑無因復從正道也繇讀與由同其赦雁門代郡軍士不循法者元朔元年三月甲子詔曰朕聞天地不變不成施化隂陽不變物不暢茂易曰通其變使民不倦詩云九變復貫知言之選朕嘉唐虞而樂殷周據舊以鍳新其赦天下與民更始諸逋貸及訴訟在孝景後三年以前皆勿聽治三年三月詔曰夫刑罰所以防姦也内長文所以見愛也言有文德者即親内而崇長之所以見愛之道見謂顯示也以百姓之未洽于教化朕嘉與士大夫日新厥業祗而不解其赦天下解音懈元狩元年四月赦天下丁卯詔曰朕聞咎繇對禹曰在知人知人則哲惟帝難之葢君者心也民猶支體支體傷則心􅉃怛日者淮南衡山脩文學流貨賂兩國接壤怵於邪說而造簒弑此朕之不德詩云憂心慘慘念國之為虐已赦天下滌除與之更始元鼎元年五月大赦天下五年四月南越王相吕嘉反殺漢使及其王王太后乃赦天下元封二年四月上祠泰山塞决河還赦所過徒賜孤獨高年米四石六月詔曰甘泉宫内中産芝九莖連葉上帝愽臨不異下房賜朕𢎞休言天廣臨不以下房為幽側而隔異之賜以此芝其赦天下賜雲陽郡百户牛酒四年三月祠后土詔曰朕躬祭后土地祗見光集于靈壇一夜三燭幸中都宫殿上見光其赦汾隂夏陽中都死罪賜三縣及楊氏無出今年租賦楊氏河東聚邑名五年四月詔曰朕廵荆揚輯江淮物會大海氣以合泰山上天見象增脩封禪其赦天下所幸縣母出今年租賜鰥寡孤獨帛貧窮者粟六年三月祠后土詔曰朕禮首山崑田出珍物化或為黄金昆田首山下田也祭后土神光三燭其赦汾隂殊死以下賜天下貧民布帛人一疋太初二年四月詔曰朕用事介山祭后土皆有光應介山在河東皮氏縣東南其特立周七十里高三十里其赦汾隂安邑殊死以下天漢元年五月赦天下三年三月行幸泰山脩封祀明堂還幸北地祠常山四月赦天下行所過毋出田租太始元年六月赦天下四年五月赦天下征和三年五月赦天下後元元年二月詔曰朕郊見上帝廵于北邊見羣鶴㽞止以不羅罔靡所獲獻時春也非用羅罔時故無所獲也薦于泰畤光景并見其赦天下孝昭以後元二年二月即位六月赦天下始元元年七月赦天下賜民百户牛酒四年三月甲寅立皇后上官氏赦天下辭訟在後二年前皆勿聽治武帝後一年元鳯元年六月赦天下十月詔曰燕王迷惑失道前與齊王子劉澤等為逆抑而不揚望王反道自新今廼與長公主及左將軍桀等謀危宗廟王及公主皆自伏辜其赦王太子建公主子文信及宗室子與燕王上官桀等謀反父母同産當坐者皆免為庶人其吏為桀等所詿誤未發覺在吏者除其罪二年六月赦天下四年六月赦天下六年夏赦天下宣帝以元平元年七月即位九月赦天下本始元年五月鳳凰集膠東千乗大赦天下賜吏二千石諸侯相下至中都官宦吏六百石爵各有差自左更至五大夫賜天下人爵各一級女子百户牛酒租税勿收四年三月乙卯立皇后霍氏賜丞相㔾下至郎吏從官金錢帛各有差赦天下四月壬寅郡國四十九地震或山摧水出詔曰葢災異者天地之戒也朕承洪業奉宗廟託于士民之上未能和羣生廼者地震北海瑯邪壊祖宗廟朕甚懼焉丞相御史其與列侯中二千石博問經學之士有以應變輔朕之不逮毋有所諱令三輔太常内郡國與賢良方正各一人律令有可蠲除以安百姓條奏被地震壊敗甚者勿收租賦大赦天下地節二年四月鳯凰集魯羣鳥從之大赦天下三年四月立皇太子大赦天下四年七月大司馬霍禹謀反詔曰廼者東織室令史張赦使魏郡豪李竟報冠陽侯霍雲謀為大逆朕以大將軍故抑而不揚兾其自新今大司馬愽陸侯禹與母宣成侯夫人顯及從昆弟冠陽侯雲樂平侯山諸姊妹壻度遼將軍范明友長信少府鄧廣漢中郎將任勝騎都尉趙平長安男子馮殷等謀為大逆顯前又使女侍醫淳于衍進藥殺共哀后謀毒太子欲危宗廟逆亂不道咸伏其辜諸為霍氏所詿誤未發覺在吏者皆赦除之元康元年三月詔曰廼者鳯凰集泰山陳留甘露降未央宫朕未能章先帝休烈協寧百姓承天順地調序四時獲䝉嘉瑞賜茲祉福夙夜兢兢靡有驕色内省匪懈永惟罔極書不云乎鳳凰來儀庶尹允諧其赦天下徒賜勤事吏中二千石以下至六百石爵自中郎吏至五大夫佐史以上二級民一級女子百户牛酒加賜鰥寡孤獨三老孝弟力田帛所賑貸勿收二年正月詔曰書云文王作罰刑茲無赦今吏脩身奉法未有能稱朕意朕甚愍焉其赦天下與士大夫勵精更始神爵二年二月詔曰廼者正月乙丑鳯凰甘露降集京師羣鳥從之萬數朕之不德屢獲天福祗事不怠其赦天下四年二月詔曰廼者鳯凰甘露降集京師嘉祥并見脩興泰一五帝后土之祠祈為百姓䝉祉福鸞鳯萬舉蜚覽翺翔集止于旁齋戒之暮神光顯著薦鬯之夕神光交錯或降于天或登于地或從四方來集于壇上帝嘉饗海内承福其赦天下賜民爵一級女子百户牛酒鰥寡孤獨高年帛五鳯元年夏赦徒作杜陵者三年三月詔曰往者匈奴數為邊寇百姓被其害朕承至尊未能綏安匈奴虛閭權渠單于請求和親病死右賢王屠耆堂諸王並自立分為五單于更相攻擊死者以萬數畜産大耗什八九人民饑餓相燔燒以求食因大乖亂單于閼氏子孫昆弟及呼遫累單于名王右伊秩訾且渠當户以下將衆五萬餘人來降歸義單于稱臣使弟奉珎朝賀正月北邊晏然靡有兵革之事朕飭躬齋戒郊上帝祠后土神光並見或興于谷燭燿齋宫十有餘刻甘露降神爵集㔾詔有司吿祠上帝宗廟三月辛丑鸞鳯又集長樂宫東闕樹上飛下止地文章五色留十餘刻吏民並觀朕之不敏懼不能任婁婁讀曰屢蒙嘉瑞獲茲祉福書不云乎雖休勿休祗事不怠公卿大夫其朂焉减天下口錢赦殊死已下賜民爵一級女子百户牛酒大酺五日賜鰥寡孤獨高年帛甘露二年正月詔曰廼者鳯凰甘露降集黄龍登興醴泉滂流枯槁榮茂神光並見咸受禎祥其赦天下減民筭三十賜諸侯王丞相將軍列侯中二千石金錢各有差賜民爵一級女子百户牛酒鰥寡孤獨高年帛元帝初元元年正月辛丑孝宣皇帝塟杜陵賜諸侯王公主列侯黄金吏二千石以下錢帛各有差大赦天下二年三月詔曰廼者二月戊午地震于隴西郡毀落太上皇廟殿壁木飾壊敗豲道縣豲道屬天水音桓城郭宫寺及民室屋壓殺人衆山摧地裂水泉湧出惟天降灾震驚朕師其間者歲數不登元元困乏不勝饑寒以䧟刑辟朕甚閔之郡國被地動灾甚者無出租賦赦天下有可蠲除减省以便萬民者條奏毋有所諱三年四月詔曰廼者火灾降於孝武園舘咎在朕躬百姓仍遭凶阨阨與厄同無以相振加以煩擾乎苛吏拘牽乎微文不得永終性命朕甚閔焉其赦天下四年三月行幸河東祠后土赦汾隂徒賜民爵一級女子百户牛酒鰥寡高年帛行所過無出租賦永光元年正月行幸甘泉郊泰畤赦雲陽徒三月詔曰壬人在位壬人佞人也吉士壅蔽重以周秦之弊民漸薄俗去禮義觸刑法豈不哀哉繇此觀之元元何辜其赦天下令勵精自新二年二月詔曰今隂陽未調三光晻昧元元大困流散道路盗賊并興是皆朕之不明朕自甚耻為民父母若是之薄謂百姓何其大赦天下六月詔曰間者連年不收四方咸困於饑饉亡以相救朕為民父母德不能覆而有其刑甚自傷焉其赦天下四年二月詔曰朕承至尊之重不能燭理百姓屢遭凶咎加以邊境不安師旅在外賦歛轉輸元元騷動窮困亡聊犯法抵罪夫上失其道而繩下以深刑朕甚痛之其赦天下所貸民勿收責建昭二年四月赦天下四年正月以誅郅支單于告祠郊廟赦天下五年三月詔曰葢聞明王之治國也明好惡而定去就崇敬讓而民興行故法設而民不犯令施而民從今朕獲保宗廟兢兢業業匪敢懈怠徳薄明晻晻與暗同教化淺微𫝊不云乎百姓有過在予一人其赦天下成帝以竟寧元年六月即位七月大赦天下建始元年二月詔曰廼者火災降於祖廟有星孛于東方始正而虧咎孰大焉羣公孜孜帥先百寮輔朕不逮崇寛大長和睦凡事恕㔾毋行苛刻其赦天下使得自新二年正月辛巳上始郊祀長安南郊詔曰廼者徙泰畤后土于南郊北郊朕親飭躬郊祀上帝皇天報應神光並見赦奉郊縣長安長陵及中都官耐罪徒三年三月赦天下徒河平元年四月己亥晦日有食之既詔曰朕獲保宗廟戰戰栗栗未能奉稱傳曰男教不脩陽事不得則日為之蝕天著厥異辜在朕躬公卿大夫其勉悉心以輔不逮百寮各脩其職惇任仁人退逺殘賊陳朕過失無有所諱大赦天下四年正月匈奴單于來朝赦天下徒賜孝弟力田爵二級陽朔元年二月丁未晦日有蝕之三月大赦天下四年二月赦天下鴻嘉元年二月行幸初陵赦作徒三年四月赦天下永始四年春行幸甘泉郊泰畤神光降集紫殿大赦天下元延元年四月赦天下綏和元年正月大赦天下哀帝以綏和二年四月丙午即位大赦天下建平元年正月赦天下二年四月詔曰漢家之制推親親以顯尊尊定陶恭皇之號不宜復稱定陶尊恭皇太后曰帝太太后恭皇后曰帝太后立恭皇廟于京師赦天下徒六月待詔夏賀良等言赤精子之䜟詔以材技徴召未有正官故曰待詔高祖感赤龍而生自謂赤帝之精賀良等因是作䜟文漢家歴運中衰當再受命宜改元易號詔曰漢興二百載歴數開元皇天降非材之佑漢國再獲受命之符朕之不徳曷敢不通夫基事之元命基始也始為大事之命必與天下自新其大赦天下以建平二年為太初元年號曰陳聖劉太平皇帝陳舜後王莽陳之後謬語以明莽當簒立而不知漏刻以百二十為度八月詔曰待詔夏賀良等建言改元易號增益漏刻可以永安國家朕過聽其言兾為海内獲福卒亡嘉應皆違經背古不合時宜六月甲子制書非赦令也皆蠲除之言非赦書事皆除之元壽元年正月辛丑朔日有蝕之詔曰朕獲保宗廟不明不敏夙夜憂勞未皇寧息皇暇也惟隂陽不調元元不贍未睹厥咎婁勅公卿庶幾有望婁古屢字至今有司執法未得其中音竹仲切或上暴虐假埶獲名温良寛柔䧟於亡滅是故殘賊彌長和睦日衰百姓愁怨靡所錯躬錯置也音七故切乃正月朔日有蝕之厥咎不逺在予一人公卿大夫其各悉心勉帥百寮敦任仁人黜逺殘賊期於安民陳朕之過失無有所諱其與將軍列侯中二千石舉賢良方正能直言者各一人大赦天下平帝以元夀二年九月即位大赦天下元始元年五月丁巳朔日有蝕之大赦天下九月赦天下徒四年二月丁未立皇后王氏大赦天下後漢光武以更始二年六月己未即位於鄗南千秋亭五成陌改元建武大赦天下二年三月大赦天下六月戊戌立貴人郭氏為皇后子彊為皇太子大赦天下三年正月壬午大赦天下六月壬戌大赦天下四年四月甲申大赦天下五年二月丙午大赦天下五月丙子詔曰乆旱傷麥秋種未下朕甚憂之將殘吏未勝獄多寃結元元愁恨感動天氣乎其令中都官三輔郡國出繫囚中都官謂京師諸官府也國謂諸侯王國也罪非犯殊死一切勿案殊死謂斬刑殊絶也左傳曰斬其木而弗殊一切權時非乆制也見徒免為庶人務進柔良退貪酷各正厥事焉六年五月辛丑詔曰惟天水隴西安定北地吏人為隗囂所詿誤者又三輔遭難赤眉有犯法不道者自殊死以下皆赦除之是年九月庚子赦樂浪謀反大逆殊死㔾下七年正月丙申詔中都官三輔郡國出繫囚非犯殊死皆一切勿案其罪見徒免為庶民耐罪亡命吏以文除之耐輕罪之名漢書音義曰一歲刑為罰作二歲刑以上為耐耐音乃代切亡命謂犯耐罪而改名逃者令吏為文薄記其姓名而除其罪恐遂逃不歸因失名籍四月壬午詔曰比隂陽錯謬日月薄食百姓有過在予一人大赦天下十八年七月吴漢抜成都斬史歆等壬戌赦益州所部殊死已下二十三年九月詔曰日者地震南陽尤甚朕甚懼焉其令南陽勿輸今年田租芻藁其死罪繫囚在戊辰前减死罪一等徒皆弛解鉗衣絲絮舊法徒者不得衣絮今赦許之二十四年正月乙亥大赦天下二十九年二月丁巳朔日有蝕之遣使者舉寃獄出繫囚四月詔令天下繫囚自殊死以下及徒各减本罪一等其餘贖罪輸作各有差中元元年四月己卯大赦天下改元明帝以中元二年二月戊戌即位四月詔弛刑及郡國徒在中元元年四月己卯赦前所犯而後捕繫者悉免刑邊人遭亂為内郡人妻在己卯赦前一切遣還恣其所樂中二千石下至黄綬貶秩贖論者悉皆復秩還贖永平二年正月祠明堂禮畢登靈臺使尚書令持節詔驃騎將軍三公曰今令月吉日宗祀光武皇帝於明堂以配五帝禮備百物樂和八音詠祉福舞功德其班時令勑羣后事畢升靈臺望元氣吹時律觀物變羣寮藩輔京室子孫衆郡奉計百蠻貢職烏桓濊貊咸來助祭單于侍子骨都侯亦皆陪位斯固聖祖功德之所致也朕以闇陋奉承大業親執珪璧恭祀天地仰惟先帝受命中興撥亂反正以寧天下封泰山建明堂立辟雍起靈臺恢𢎞大道被之八極而嗣子無成康之質羣臣無吕旦之謀盥洗進爵踧踖惟慙素性頑鄙臨事益懼故君子坦蕩蕩小人長戚戚其令天下自殊死已下謀反大逆皆赦除之百寮師尹其勉脩厥職順行時令敬若昊天以綏兆人十年四月戊子詔曰昔歲五榖登衍今茲蚕麥善收其大赦天下方盛夏長養之時蕩滌宿惡以報農功百姓勉務桑稼以備水旱吏敬厥職無令愆墮十五年四月乙巳大赦天下其謀反大逆及諸不應宥者皆赦除之章帝以永平十八年八月壬子即位十月丁未大赦天下建初二年四月戊子詔還坐楚淮陽事徙者四百餘家令歸本鄉三年正月己酉宗祀明堂禮畢登靈䑓望雲物大赦天下元和元年八月詔曰朕道化不德吏政失和元元未諭抵罪於下冦賊争心不息邊野邑屋不脩永惟庶事思稽厥衷與凡百君子共𢎞斯道中心悠悠將何以寄其改建初九年為元和元年郡國中都官繋囚减死一等勿笞詣邊縣妻子自隨占著在所其犯殊死一切募下蚕室其女子宫繫囚鬼薪白粲以上皆减本罪一等輸司寇作亡命者贖各有差十二月詔曰書云父不慈子不祗兄不友弟不恭不相及也往者妖言大獄所及廣逺一人犯罪禁至三屬莫得垂纓仕宦王朝如有賢才而没齒無用朕甚憐之非所謂與之更始也諸以前妖惡禁錮者一皆蠲除之以明棄咎之路但不得在宿衞而㔾二年二月東廵狩丙子詔曰朕廵狩岱宗柴望山川吿祀明堂以章先勲其二王之後禮記曰存二王之後尊賢不過二代公羊傳曰二王之後所以通三王也漢之二王殷周之後也先聖之裔東觀記曰孔子後褒成侯等咸來助祭東后藩衞東后謂東方國君也諸侯為天子藩屏故曰藩衞伯父伯兄仲叔季弟㓜子童孫尚書吕刑文皆天子同姓諸侯有父叔兄弟子孫列者故總而言之百寮從臣宗室衆子要荒四裔要荒二服名要服去王城二千里荒服去王城二千五百里要者言可要約以文教荒者言其荒忽無常也裔逺也謂荒服之外沙漠之北葱嶺之西西河舊事曰葱嶺山名在敦煌西其山高大多葱故以為名焉冐耏之類字書曰耏多須貌音而言其須多蒙冐其面或曰西域人多著冐而長故舉以為言也䟦涉懸度草行曰䟦水行曰涉左傳子太叔曰䟦涉山川西域傳曰懸度者石山也溪谷不通以䋲索相引而度去陽關五千八百五十里陵棧阻絶駿奔郊畤駿疾也音俊尚書駿奔走郊畤祭天處也漢書音義曰畤神靈之居止者咸來助祭祖宗功徳延及朕躬予一人空虛乆疚纂承尊明疚病也纂繼也盥洗享薦慙媿祗慄詩不云乎君子如祉亂庶遄已詩小雅遄速也已止也祉福也鄭𤣥注云福者福賢者謂爵禄之也如此則亂亦庶幾可疾止也歴數既從靈燿著明歴數既從謂行四分歴也靈燿著明謂日月貞明亦欲與士大夫同心自新其大赦天下諸犯罪不當得赦者皆除之復愽奉高瀛無出今年田租芻藁和帝永元二年五月丁丑大赦天下三年十二月庚辰帝至自長安减弛刑徒從駕者刑五年正月乙亥宗祀五帝於明堂遂登靈臺望雲物大赦天下六年七月京師旱詔中都官徒各除半刑讁其未竟五月已下皆免遣十一年二月詔郡國中都官徒及篤癃老小女徒各除半刑未竟三月者皆免歸田里四月丙寅大赦天下十四年三月戊辰臨辟雍饗射大赦天下元興元年四月庚午大赦天下改元宗室以罪絶者復屬籍安帝永初元年正月癸酉朔大赦天下六月丁卯赦除諸𦍑相連結謀反逆者罪三年正月庚子皇帝加元服大赦天下四年二月詔自建初以來諸妖言它過坐徙邊者各歸本郡其没入官為奴婢者免為庶人三月戊子杜陵園火癸巳郡國九地震四月司𨽻豫兖徐青冀六州蝗丁丑大赦天下五年二月詔隴西徙襄武安定徙羙陽上郡徙衙左傳戰於彭衙是也北地徙池陽閏月丁酉赦凉州河西四郡六年六月辛巳大赦天下元初元年四月丁酉大赦天下二年十月詔吏人聚為盗賊有悔過者除其罪三年三月赦蒼梧鬱林合浦南海吏人為賊所迫者四年二月乙卯大赦天下永寧元年四月丙寅立皇子保為皇太子改元大赦天下建元元年二月癸亥大赦天下七月己卯改元大赦天下延光元年三月丙午改元大赦天下還徒者復户邑屬籍順帝永建元年正月甲寅詔曰先帝聖德享祚未永早棄鴻烈姦慝緣間人庶怨讟上干和氣疫癘為災朕奉承大業未能寧濟葢至理之本稽𢎞德惠蕩滌宿惡與人更始其大赦天下賜男子爵人二級為父後三老孝弟力田三級流民欲自占者一級鰥寡孤獨篤癃貧不能自存者粟人五斛貞婦帛人三疋坐法當徙勿徙亡徒當傳勿傳徒囚逃亡當傳捕者放之弗捕宗室以罪絶皆復屬籍其與閻顯江京等交通者悉勿考勉脩厥職以康我民四年正月丙寅詔曰朕託王公之上涉道日寡政失厥中隂陽氣隔㓂盗肆暴庶獄彌繁憂悴永歎疢如疾首詩云君子如祉亂庶遄㔾三朝之會明旦立春嘉與海内洗心自新其赦天下從甲寅赦令㔾來復秩屬籍三年正月已來還贖其閻顯江京等知識婚姻禁錮一原除之一猶皆也務崇寛和敬順時令遵典去苛以稱朕意陽嘉元年三月庚寅帝臨辟雍饗射大赦天下改元九月詔郡國中都官繫囚皆减死一等亡命者贖各有差三年五月戊戌制詔曰昔我太宗丕顯之德假于上下儉以恤民政致康乂朕秉事不明政失厥道天地譴怒大變仍見春夏連旱寇賊彌繁元元被害朕甚愍之加與海内洗心更始其赦天下自殊死㔾下謀反大逆諸犯不當得赦者赦除之永和元年正月己巳宗祀明堂登靈臺大赦天下四年四月戊午大赦天下賜民爵及粟帛各有差漢安元年春正月癸巳宗祀明堂大赦天下建康元年四月立皇子炳為皇太子大赦天下賜人爵各有差質帝以永嘉元年正月丁丑即位二月乙酉大赦天下賜人爵及粟帛各有差還王侯所削户邑本初元年六月大赦天下賜民爵及粟帛各有差桓帝建和元年正月大赦天下賜吏更勞一歲男子爵人二級為父後及三老孝弟力田人三級鰥寡孤獨篤癃貧不能自存者粟人五斛貞婦帛人三疋災害所傷什四以上勿收錢租其不滿者以實除之四月詔郡國繫囚减死罪一等勿笞惟謀反大逆不用此書二年正月甲子皇帝加元服庚午大赦天下三年五月乙亥詔曰間者日食毀缺陽光晦暗朕祗懼潜思匪遑啓處昔孝章皇帝愍前世禁徙故建初之元並䝉恩澤流徙者使還故郡没入者免為庶人先皇德政可不務乎其自永建元年迄乎今歲凡諸妖惡支親從坐及吏民减死徙邊者悉歸本郡唯没入者不從此令和平元年正月甲子大赦天下元嘉元年正月癸酉大赦天下永興元年正月大赦天下二年春正月甲午大赦天下永夀元年正月戊申大赦天下三年正月己未大赦天下延熹元年六月戊寅大赦天下三年正月大赦天下四年六月京兆扶風及凉州地震庚子岱山及愽尤來山並頺裂己酉大赦天下六年三月戊戌大赦天下八年三月辛巳大赦天下永康元年六月庚申大赦天下悉除黨錮時李膺等頗引宦者子弟宦官懼請帝以天時當赦帝許之故除黨錮也靈帝以建寧元年正月庚子即位二月庚午謁高廟辛未謁世祖廟大赦天下賜民爵及帛各有差二年正月丁未大赦天下四年正月甲子帝加元服大赦天下賜公卿以下各有差唯黨人不赦熹平元年五月己巳大赦天下二年二月壬午大赦天下三年二月己巳大赦天下四年五月丁卯大赦天下五年四月癸亥大赦天下是月使侍御史行詔獄亭部理寃枉原輕繫囚徒六年正月辛丑大赦天下光和元年三月辛丑大赦天下二年四月丁酉大赦天下諸黨人禁錮小功以下皆除之時上禄長和浮上言黨人錮及五族有乖典訓帝乃從之三年正月癸酉大赦天下四年四月庚子大赦天下五年正月辛未大赦天下六年三月辛未大赦天下中平元年二月鉅鹿人張角自稱黄天其部帥有三十六萬皆着黄巾同日反三月壬子大赦天下黨人還諸徙者唯張角不赦時中常侍吕彊言於帝曰黨錮乆積若與黄巾合謀悔之無救帝懼皆赦之十二月己巳黄巾平大赦天下三年二月庚戌大赦天下四年正月己卯大赦天下五年正月丁酉大赦天下少帝以中平六年四月即位大赦天下光熹元年八月戊辰中常侍張讓等刼少帝走小平津尚書盧植追斬讓等辛未還宫大赦天下改光熹為昭寧獻帝以昭寧元年九月甲戌即位大赦天下改元永漢初平元年正月山東州郡起兵以討董卓辛亥大赦天下二年正月辛丑大赦天下三年正月丁亥大赦天下五年丁酉大赦天下六月董卓部曲將李㴶等䧟長安己未大赦天下四年正月丁卯大赦天下興平元年正月辛丑大赦天下改元二年正月癸丑大赦天下建安元年正月癸酉郊祀上帝於安邑大赦天下七月甲子車駕至雒陽丁丑郊祀上帝大赦天下魏文帝以延康元年十一月庚子受漢禪即位於繁陽改延康為黄初大赦黄初五年八月為水軍親御龍舟循蔡潁浮淮幸夀春揚州界將吏士民犯五歲刑㔾下皆原除之九月遂至廣陵赦青徐二州明帝以黄初七年五月丁巳即位大赦太和二年三月丁未幸長安四月丁酉還雒陽宫赦繫囚非殊死已下五年七月己酉皇太子殷生大赦青龍二年三月己酉大赦四年十二月幸許昌宫明年改元景初五月己巳行還雒陽宫己丑大赦景初元年十月遼東太守公孫淵叛己卯詔遼東將吏士民為淵所脅略不得已降者一切赦之二年四月庚戌大赦齊王以景初三年正月丁亥朔即帝位大赦七月齊王始親臨朝八月大赦正始四年四月乙卯立皇后甄氏大赦嘉平元年正月以誅曺爽丙午大赦三年三月壬辰大赦天下四年二月立皇后張氏大赦五年三月辛亥大赦四月立皇后王氏大赦高貴鄉公以嘉平六年九月司馬景王廢齊王十月己丑公即位詔曰昔三祖神武聖德應天受祚齊王嗣位肆行非度顛覆厥德皇太后深惟社稷之重延納宰輔之謀用替厥位集大命于予一人以𦕈𦕈之身託于王公之上夙夜祗畏懼不能嗣守祖宗之大訓恢中興之洪業戰戰兢兢如臨于谷今羣公卿士股肱之輔四方征鎮宣力之佐皆積德累功忠勤帝室庶憑先祖先父有德之臣左右小子用保乂皇家俾朕䝉暗垂拱而治葢聞人君之道德厚侔天地潤澤施四海先之以慈愛示之以好惡然後教化行於上兆民聽於下朕雖不德昧於大道思與宇内共臻茲慶書不云乎安民則惠黎民懐之大赦改元正元正元二年閏正月壬子以毋丘儉文欽平特赦淮南士民諸為儉欽所詿誤者三月立皇后卞氏大赦十一月甲午以隴右四郡及金城連年受敵或亡叛投賊其親戚留在本土者不安皆特赦之甘露二年五月以諸葛誕反丙子赦淮南將吏士民為誕所詿誤者九月大赦陳留王以甘露五年六月甲寅嗣位大赦改元景元賜民爵及榖帛各有差景元四年十一月大赦是月巴蜀平咸熈元年二月鍾㑹反於蜀為衆所討辛卯特赦諸在益土者二年五月詔晉王加殊禮癸未大赦九月乙未大赦晉武帝以魏咸熈二年十二月丙寅受禪設壇于南郊即雒陽宫幸太極前殿詔曰昔朕皇祖宣王聖哲欽明誕應期運熈帝之載肇啓洪基伯考景王履道宣猷緝熈諸夏至于皇考文王叡哲光逺允協靈祗應天順時受茲明命仁濟于宇宙功格於上下肆魏氏引鑒于古訓儀刑于唐虞疇咨羣后爰輯大命於朕身予一人畏天之命用不敢違惟朕寡昧負荷洪烈託于王公之上以君臨四海惴惴恐懼罔知所濟惟爾股肱爪牙之佐文武不二之臣乃祖乃父實左右我先王光隆我大業思與萬國共饗休祚於是大赦改元泰始賜天下爵人五級鰥寡孤獨不能自存者榖人五斛復天下租賦及闗市之稅一年逋債宿負一皆勿收除舊嫌解禁錮亡官失爵者悉復之泰始四年正月丁亥耕于籍田戊子詔曰古設象刑而衆不犯今雖參夷而姦不絶何德刑相去之逺哉先帝深愍黎元哀矜庶獄乃命羣后考正典刑朕守遺業永惟保乂皇基思與萬國以無為為政方今陽春養物東作始興朕親率王公卿士耕藉田千畆律令既就班之天下將以簡法務本惠育海内宜寛有罪使得自新其大赦天下五年二月赦五歲刑已下四月曲赦交阯九真日南五歲刑六年三月赦五歲刑㔾下七年五月雍梁秦三州飢赦其境内殊死㔾下八月分益州之南中四郡置寧州曲赦四郡殊死已下八年六月壬辰大赦咸寧元年正月戊午朔大赦改元二年二月甲午赦五歲刑㔾下十月丁卯臨軒遣太尉賈充策立皇后楊氏因大赦賜王公已下至于鰥寡各有差百寮上禮五年三月星孛于柳四月又孛于女御大赦降除部曲督以下質任太康元年三月吴孫皓降乙酉大赦改元大酺五日恤孤老困窮十年四月太廟成乙巳遷神主於新廟帝迎於道左遂祫祭大赦文武増位一等作廟者二等惠帝以太熈元年四月即位大赦改元永熈永平元年三月誅太傅楊駿壬辰大赦改元元康元年六月賈后矯詔使楚王瑋殺太宰汝南王亮太保衞瓘乙丑又殺瑋曲赦雒陽二年八月壬子大赦四年八月上谷居庸上庸並地䧟裂人有死者大饑九月丙辰赦諸州之遭地災者六年正月大赦十月泰雍氐𦍑叛推齊萬年稱帝乙未曲赦雍凉二州八年三月壬戌大赦永康元年正月癸亥朔大赦改元四月趙王倫矯詔廢賈后大赦八月淮南王允舉兵討趙王倫不克遇害曲赦雒陽十一月甲子立皇后羊氏大赦永寧元年正月趙王倫簒位四月齊王冏逐倫歸第乗輿反正癸亥詔曰朕以不德纂承皇統逺不能光濟大業靖綏四方近不能閑明刑威式遏姦宄至使逆臣孫秀敢肆凶虐窺間王室遂奉趙王倫饕據天位鎮東大將軍齊王冏征北大將軍成都王頴征西大將軍河間王顒並以明德茂親忠規允著首建大策圖救國難尚書淮共立大謀左衞將軍王輿與羣公卿士協同謀略親勒本營斬秀及其二子前趙王倫為秀所誤與其子等已詣金墉迎朕幽宫旋軫閶闔豈在予一人獨饗其慶宗廟社稷實有賴焉於是大赦改元孤寡賜榖五斛大酺五日誅侯質等及倫之黨六年壬辰大赦増吏位二等八月大赦戊辰原徙邊者太安元年三月赦司冀兖豫四州十二月長沙王乂攻殺齊王冏大赦改元二年正月甲子朔赦五歲八月河間王顒成都王頴舉兵逼京師帝出幸于城東丙申大赦永興元年正月成都王頴自鄴諷于帝大赦改元永安三月戊申詔曰朕以不徳纂承洪緒于茲十有五載禍亂滔天姦逆仍起至幽廢重宫宗廟圮絶成都王頴温仁惠和克平暴亂其以頴為皇太弟都督中外諸軍事丞相如故大赦賜鰥寡高年帛三疋大酺五日七月丙申朔右衞將軍陳聄以詔勒兵討成都王頴大赦復皇后羊氏及皇太子覃己亥帝北征軍敗幸頴軍明日幸鄴庚申大赦改元建武八月匈奴左賢王劉元海遣王浚攻頴大敗頴奉帝走雒陽辛巳大赦十一月乙未帝幸長安遺宫在雒陽者為留臺承制行事丙午留臺大赦改元復為永安十二月大赦改元永興二年八月辛丑大赦懐帝以光熈元年十一月癸酉即位大赦永嘉元年正月癸丑大赦改元三月庚午立豫章王詮為皇太子辛未大赦八月撫軍苟晞敗汲桑於鄴甲辰大赦幽并司冀兖豫等六州二年正月丁未大赦十二月辛未朔大赦三年三月丁巳東海王越勒兵收近臣中書令繆播等害之丙寅曲赦河南郡四年正月乙丑朔大赦六年九月雍州刺史賈疋奉秦王為皇太子大赦愍帝建興元年壬申即位大赦改元二年正月己巳朔黑霧五日乃止辛未隕于地三日出西方丁未大赦三年四月大赦六年丁未地震辛巳大赦册府元龜卷八十二
