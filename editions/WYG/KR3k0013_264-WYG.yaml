body:
  text: 册府元龜卷二百六十四宋王欽若等撰宗室部封建第三晉武帝泰始元年十二月即位封皇叔祖父孚為安平王皇叔父幹為平原王亮為扶風王伷為東莞王駿為汝隂王彤為梁王倫為琅邪王皇弟攸為齊王鑒為樂安王幾為燕王皇從伯父望為義陽王皇從叔父輔為渤海王晃為下邳王瓌為太原王珪為髙陽王衡為常山王景為沛王泰為隴西王權為彭城王綏為范陽王遂為濟南王遜為譙王睦為中山王陵為北海王斌為陳王皇從父兄洪為河間王皇從父弟楙為東平王六年十一月立皇子柬為汝南王七年五月立皇子憲為城陽王九年二月立皇子祗為東海王十年十二月立太原王緝為髙陽王咸寧三年正月立皇子裕為始平王八月徙扶風王亮為汝南王東莞王伷為琅邪王汝隂王駿為扶風王琅邪王倫為趙王渤海王輔為太原王太原王顒為河間王北海王陵為任城王陳王斌為西河王汝南王柬為南陽王濟南王眈為中山王河間王威為章武王立皇子瑋為始平王允為濮陽王該為新都王遐為清河王九月立齊王子㽔為遼東王賛為廣漢王大康元年八月封皇弟延祚為樂平王詔曰弟祚早孤無識情所哀愍㓜得篤疾日冀其瘥今遂廢痼無復後望意甚傷之封為樂平王使有名號以慰吾心四年二月立長樂亭侯寔為北海王五年二月立南宫王子玷為長樂王九年十二月立河間王洪子英為章武王十年十一月改封南陽王東為秦王始平王瑋為楚王濮陽王允為淮南王並假節之國各統方州軍事立皇子又為長沙王頴為成都王晏為吴王熾為豫章王皇孫遹為廣陵王立濮陽王子廸為漢王始平王子儀為毗陵王汝南王次子羕為西陽公徙扶風王暢為順陽王暢弟歆為新野公琅邪王覲弟澹為東武公繇為東安公漼為廣陵公卷為東莞公惠帝永平元年三月進封東安公繇爵為王八月徙長沙王乂為常山王進西陽公羕爵為王永康元年五月立皇孫尚為襄陽王永寧元年七月立吳王晏子國為漢王八月徙南平王祥為宜都王九月封楚王瑋子範為襄陽王十二月封齊王冏子冰為樂安王英為濟陽王超為淮南王永興二年四月封樂平王紹為齊王光熈元年九月進東瀛公騰爵為東燕王平昌公模為南陽王懐帝以光熈元年十一月即位十二月封彭城王植子融為樂成縣王永嘉元年三月改封東燕王騰為新蔡王二年十二月立長沙王乂子碩為長沙王斟為臨淮王元帝建武元年封王子宣成公裒為琅邪王十一月封汝南王子弼為新蔡王大興元年十二月封顯義亭侯渙為琅邪王成帝咸和元年十二月封皇弟岳為吴王二年十二月徙封吴王岳為琅邪王五年九月徙樂成王欽為河間王封彭城王紘子浚為髙宻王六年六月封彭城王植子融為樂成王章武王混子珍為章武王康帝以咸康八年六月即位封成帝子丕為琅邪王奕為東海王哀帝升平五年五月自琅邪王入即位詔曰朕獲承明命入纂大統顧惟先王宗廟烝嘗無主太妃喪庭廓然靡寄悲痛感摧五内抽割宗國之尊情禮兼隆裔嗣之重義無與二東海王奕戚屬親近宜奉本統其以奕為琅邪王宋長沙景王道憐髙祖中弟進封竟陵縣公髙祖受命封長沙王食邑五千户道憐子桂陽縣侯義融永初元年封凡王子侯者食邑皆千户義融弟新渝縣侯義宗幼為髙祖所愛字曰伯奴賜爵新渝縣男永初元年進爵為侯義宗子當陽縣侯秉元徽二年封義宗弟興安縣侯義賔元嘉二年封新野縣侯六年以新野荒弊改封興安義賔弟營道縣侯義綦元嘉六年封營浦侯遵考髙祖族弟晉末為冠軍將軍髙祖初即位下推恩之詔曰遵考服屬之親國戚未逺宗室無多宜蒙寵爵可封營浦縣侯食邑五百户廬陵孝獻王義真髙祖子晉末封桂陽縣公食邑千户永初元年封廬陵王食邑三千户彭城王義康髙祖子永初元年封食邑三千户江夏文獻王義恭髙祖子元嘉元年封食邑五千户孝武即祚増封二千戸孝建元年又増封一千户衡陽王義季髙祖子元嘉元年封衡陽王食邑五千户南郡王義宣髙祖子元嘉元年封竟陵王食邑五千户九年以竟陵羣蠻􅂶斥役刻民數改封南譙王孝武即位改封南郡王食邑萬户始興王濬文帝第二子元嘉十三年封南平穆王鑠字休𤣥文帝第四子元嘉十六年封鑠第二子敬淵封安南縣侯竟陵王誕字子休文帝第六子元嘉二十年封廣陵王食邑二千户年十一二十六年以廣陵彫弊改封隋郡王孝武孝建初改封竟陵王食邑五千戸建平宣簡王宏字休度文帝第七子元嘉二十一年年十一封建平王食邑二千戸廬江王禕字休秀文帝第八子元嘉二十二年始十嵗封東海王食邑二千戸大明五年増一千戸明帝踐祚改封廬江晉熈王㫤字休道文帝第九子元嘉二十二年始十歲封義陽王食邑二千戸泰始三年改封晉熈武昌王渾字休淵文帝第十子元嘉二十四年始九歲封汝隂王食邑二千戸後魏南侵破汝隂郡徙為武昌王始安王休仁文帝第十二子元嘉二十九年十歲立為建安王食邑二千戸明帝即位後降封始安縣王晉平王休祐文帝第十三子孝建二年年十一封山陽王食邑二千戸明帝即位以山陽荒弊改封晉平海陵王休茂文帝第十四子孝建二年年十一封食邑二千戸大明二年増食邑千戸鄱陽王休業文帝第十五子孝建二年年十一封食邑二千戸臨慶王休倩文帝第十六子孝建元年年九歲疾篤封東平王食邑二千戸未拜薨太始六年追改為臨慶王以臨賀郡為臨慶國桂陽王休範文帝第十八子孝建二年年九歳封順陽王食邑二千戸大明元年改封桂陽巴陵王休若文帝第十九子孝建三年年九歳封巴陵王食邑二千戸豫章王子尚字孝師孝武第二子孝建二年年五歳封西陽王食邑二千戸五年改封豫章晉安王子勛字孝