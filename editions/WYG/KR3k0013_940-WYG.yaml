body:
  text: 册府元龜卷九百四十宋王欽若等撰總録部不嗣患難不嗣夫以堯舜之仁聖而丹朱商均之不肖何况臣庶之子孫不克負荷者多矣故有擅藻麗之文而其子頑闇有神明之政而其息貪暴有翼戴之勲而其嗣顚覆有脩謹之操而其裔悖亂故有懐知子之先見嘆承家之乏嗣形於悲咤良亦可哀而坤之文言曰積善之家必有餘慶積不善之家必有餘殃則先聖之㫖將有属焉帝鴻氏有不才子帝鴻黄帝掩義隱賊好行兇德醜類惡物頑嚚不友是與比周醜亦惡也比近也周宻也天下之民謂之渾敦謂驩兠渾敦不開通之貌少皥氏有不才子少皥金天氏之號次黄帝毁信廢忠崇餙惡言靖譛庸回服讒蒐慝以誣盛德崇聚也靖安也庸用也回邪也服行也蒐隱也慝惡也盛德賢人也天下之民謂之窮竒謂共工其行窮其好竒顓頊氏有不才子不可教訓不知話言話善也告之則頑德義不入舍之則嚚不道忠信傲狠明德以亂天常天下之民謂之檮杌謂鯀檮杌頑㐫無儔匹之貌縉雲氏有不才子縉雲黄帝時官名貪于飲食冒于貸賄侵欲崇侈不可盈厭聚斂積實不知紀極不分孤寡不恤窮匱冒亦貪也盈滿也實財也天下之民比之三㓙非帝王子孫故别以比三㓙謂之饕餮貪財為饕貪食為餮漢劉纒即項伯也高祖五年降漢賜姓劉氏封射陽侯射或作貰嗣子睢有罪不得代石慶為丞相時諸子孫為吏至二千石者十三人及慶死後稍以罪失孝謹衰矣金日磾為光禄大夫有二子賞奉車建駙馬都尉及孫則衰矣霍光為大將軍而子禹與張安世子千秋俱為中郎將皆將兵隨度遼將軍范明友撃烏桓還謁大將軍光光問千秋戰鬭方畧山川形勢千秋口對兵事畫地成圖無所忘失光復問禹不能記曰皆有文書光由是賢千秋以禹為不才歎曰霍氏世衰張氏興矣及禹誅滅而安世子孫相繼晉王導為丞相其子恬少好武不為公門所重導見恬便有怒色梁王茂為司空侍中封望蔡縣公及薨子貞秀嗣以居喪無禮為有司所奏徙越州後梁許世武少襲父孝敬為大將軍好勇不拘行撿重賔客施與不節資産既盡鬱鬱不得志遂謀奔陳事覺誅後魏劉休賔初仕宋為幽州刺史鎭梁鄒後以城降休賔叔父旋之早亡其妻許氏携二子法鳳法虎入國孤貧不自立並疎薄不倫為時人所棄母子皆出家既而反俗孝文太和中選盡物望河南人士才學之徒咸見申擢法鳳兄弟無可收用不蒙選授田彪北平人初仕北燕馮䟦與石城太守李崇俱降而彪子孫道徽劣焉盧度世為青州刺史卒其子淵昶等並脩文風顯閨門之禮為世所推後淵兄弟既亡家風衰損子孫多非法帷薄混穢為時論所鄙平恒為秘書丞博通經籍而三子並不率父業好酒自棄恒常忿其世衰植杖廵舍側堈而哭不為營事婚宦任意官娶故仕聘濁碎不得及其門流恒婦弟鄧宗慶及外甥孫元明等毎以為言恒曰此軰㑹是衰頓何煩勞我夏侯史瀛州刺史道遷之子為鎭逺將軍性好酒居喪不戚醇醪肥鮮不離於口沽買飲噉多所費用父時田園貨賣畧盡人間債負猶數千餘匹榖食至常不足弟妹不免饑寒李𦙍䕶晉司徒廣陸侯允八世孫允子順璠及孫沉志皆為名宦沉孫根為慕容寶中書監根子後智等隨慕容德南渡河居青州數世無名位三齊豪門多輕之北齊邢邵為太常卿中書監其文章典麗獨歩當時而孽子大德大道畧不識字焉隋長孫平高祖仁壽中為太常卿判吏部尚書賜爵襄陽公卒官子師孝性輕狡好利數犯法帝以其不克負荷遣使弔平國官師孝後為渤海主簿政教凌遲師孝恣行貪濁為王世充所害唐楊師道尚高祖女桂楊公主為太常卿駙馬都尉師道卒子豫之不肖薄行太宗常謂羣臣曰子有孝與不孝臣有忠與不忠公等見不孝之子不忠之臣豈不同嫉然不孝之子父母亡没已後肆情為惡虧犯名教良由闕於義方今縁師道兒喪虧禮節誠所難恕若訓導合宜縱其頑鄙猶不至狼狽公等各有子弟咸須示語無頼者亦勿存育乃令司徒長孫無忌往豫之家分其貲産家人以與長姊及同産兄趙斌等後豫之在母服淫亂為駙馬都尉竇奉節所執捶擊無數因割去耳鼻然後死虞世南太宗時為秘書監文學德行時稱五絶其子昶既無才術厯將作少匠工部侍郎累居工作之司時來常父䕶兒在隋為猛將常與弟濟俱以學行見稱相次為侍中許敬宗歎曰士之登用不繫世業履道則為衣冠失緒則為匹庶來䕶兒兒作宰相虞世南男作木匠忠賢文武固無種也狄仁傑則天時為魏州刺史人為立生祠及去職後其子景暉為魏州司功參軍貪暴為人所惡由是遽毁其神像焉王方慶則天時為相聚書甚多不减秘閣至於圖畫多異本諸子莫能守其業卒後尋併散亡李嶠中宗朝與蘇瓌同居相位嶠有才華其子不肖瓌以幹理而子頲有文詞故代稱蘇瓌有子李嶠無兒劉贊祖父皆以文學稱贊獨不知書為宣州刺史宣歙池觀察使唯以彊猛立威官吏畏重之宣州天下殷贍處也贊厚斂財貨以務貢獻用求恩寵又無教訓子孫童稚者便以驕傲為事崔行功總章中秘書少監兼通事舍人有文集四十卷自行功以降名位卑替李日知中宗景龍初以刑部尚書罷知政事孝行知足為時所稱少子伊衡以妾為妻費散田宅仍列訟諸兄家風替矣劉崇龜父藻生八子弟崇魯為水部郎中知制誥與宰相崔昭緯相善昭宗命翰林學士李谿為相昭緯與崇魯謀沮之及谿宣制之日出班而哭由是谿命不行谿自十一月至歲暮聨上十表訴寃其詞詆毁所不忍聞時崇龜在外聞之大恚數日不食謂其親曰吾家兄弟進身有素未嘗以聲利敗名吾門不幸生此等也晉張從賔父全義為河南尹四十年積而能散以至令終及從賔繼祚好治生商賈盈門多藏而致禍也患難老子有言禍兮福所倚福兮禍所伏則知患難之於世也無凖否泰之於人也靡常消息盈虚既明鑒而斯在屈伸合散信任運而可量叔世惟艱聖人陻厄而體道禍機莫測賢者逃遯以俟時至有沈厠以幸全繫獄而獲宥道存於巳命在於天或垂名聲於後代或擅美譽於當世信謂知窮達存亡之至者也若乃被患於深刑無辜於横議道之廢也其如命何孔子將適陳過長垣顔刻為僕以其䇿指之曰昔吾入此由彼缺也長垣人聞之以為魯之陽虎嘗暴長垣人長垣人於是遂止孔子孔子狀類陽虎拘焉五日顔淵後言與孔子相失故在後也子曰吾以汝為死矣顔淵曰子在回何敢死言夫子在已無所致死也長垣人拘孔子益急弟子懼孔子曰文王既没文不在兹乎兹此也言文王雖已沒其文見在此此自謂其身也天之將喪斯文也後死者不得與于斯文文王既沒故孔子自謂後死也言天將喪此文本不當使我知之今使我知之未欲喪之也天之未喪斯文也長垣人其如予何如予何猶言奈我何也天未喪此文則我當傳之長垣人欲奈我何言不能違天以害己孔子使從者為寗武子臣於衞然後得去又適宋年表定公十三年孔子至衞十四年至陳哀公三年孔子過宋與弟子習禮大樹下宋司馬桓魋欲殺孔子拔其樹孔子去弟子曰可以速矣孔子曰天生德於予桓魋其如予何天生德者謂既以聖德性合天地吉無不利故曰其如予何又居陳三歲㑹晉楚争强更伐陳及吳侵陳陳常被冦孔子曰歸與歸與吾黨之小子狂簡進取不忘其初於是孔子去陳過蒲㑹公叔氏以蒲畔蒲人止孔子弟子有公良孺者以私車五乘從孔子其為人長賢有勇力謂曰吾昔從夫子遇難於長垣今又遇難於此命也已吾與夫子再罹難寧鬬而死鬬甚疾蒲人懼謂孔子曰苟毋適衞吾出子與之盟出孔子東門孔子遂適衞子貢曰盟可負耶孔子曰要盟也神不聽又遷于蔡三歲吳伐陳楚救陳魯哀公四年軍于城父聞孔子在陳蔡之間楚使人聘孔子孔子將往拜禮陳蔡大夫謀曰孔子賢者所刺譏皆中諸侯之疾今者久留陳蔡之間諸大夫所設行非仲尼之意今楚大國也來聘孔子孔子用於楚則陳蔡用事大夫危矣於是乃相與發徒役圍孔子於野不得行絶糧從者病莫能興興起也孔子講誦弦歌不衰子路愠見曰君子亦有窮乎孔子曰君子固窮小人窮斯濫矣濫溢也君子固亦有窮時但不如小人窮則濫溢為非子貢色作孔子曰賜爾以予為多學而識之者與曰然然謂多學而識之非與問今不然耶孔子曰非也予一以貫之善有元事有㑹天下殊途而同歸百慮而一致知其元則衆善舉也故不待學以一知之孔子知弟子有愠心乃召子路而問曰詩云匪兕匪虎率彼曠野率循也吾非兕虎而循曠野也吾道非耶吾何為於此子路曰意者吾未仁耶人之不我信也言人不信吾豈以未仁故乎意者吾未知耶人之不我行也言人不使通行而困窮者豈以我未知乎孔子曰有是乎由譬使仁者而必信安有伯夷叔齊使知者而必行安有王子比干子路出子貢入見孔子曰賜詩云匪兕匪虎率彼曠野吾道非耶吾何為於此子貢曰夫子之道至大也故天下莫能容夫子夫子蓋少貶焉孔子曰賜良農能稼而不能為穡種之為稼斂之為穡言良農能善種之未必能斂穫之良工能巧而不能為順言良工能巧而已不能毎順人之意君子能脩其道綱而紀之統而理之而不能為容今爾不脩爾道而求為容賜而志不逺矣子貢出顔回入見孔子曰回詩云匪兕匪虎率彼曠野吾道非耶吾何為於此顔回曰夫子之道至大故天下莫能容雖然夫子推而行之不容何病不容然後見君子夫道之不脩也是吾醜也夫道既已大脩而不用是有國者之醜也不容何病不容然後見君子孔子欣然而笑曰有是哉顔氏子使爾多財吾為爾宰宰主財者也為女主財言志之同也於是使子貢至楚楚昭王興師迎孔子然後得免范睢字叔先事魏中大夫須賈須賈為魏昭王使於齊范睢從留數月未得報齊襄王聞睢辯言乃使人賜睢金十斤及牛酒睢辭謝不敢受須賈知之大怒以為睢持魏國陰事告齊故得此饋令睢受其牛酒還其金既歸心怒睢以告魏相魏之諸公子曰魏齊大怒使舍人笞擊睢折脅摺齒睢佯死即卷以簀置厠中賔客飲者醉更溺睢故僇辱以懲後令無妄言者睢從簀中謂守者曰公能出我我必厚謝公守者乃請出棄簀中死人魏齊醉曰可矣范睢得出後漢樊宏少有志行王莽末義兵起劉伯升與族兄賜俱將兵攻湖陽城守不下賜女弟為宏妻湖陽由是收繫宏妻子令出譬伯升宏因留不反湖陽軍師欲殺其妻子長吏以下共相謂曰樊重子父禮義恩德行於鄉里雖有罪且當在後㑹漢兵日盛湖陽惶急未敢殺之遂得免脫後至光禄大夫位特進來歙光武祖姑之子光武甚親敬之數共往來長安漢兵起王莽以歙劉氏外属乃收繫之賔客共簒奪得免寒朗字伯竒魯國薛人也生三日遭天下亂棄之荆棘數日兵解母往視猶尚氣息遂收養之後至清河太守趙岐字邠卿京兆長陵人也岐少明經有才藝年三十餘有重疾臥蓐七年蓐寢蓐也聲類曰蓐薦也其後疾瘳為京兆功曹先是中常侍唐衡兄玹玹音𤣥為京兆虎牙都尉郡人以玹進不繇德皆輕侮之岐及從兄襲又數為貶議玹深毒恨玹為京兆尹岐懼禍及乃與從子戬逃避之玹果收岐家属宗親䧟以重法盡殺之岐遂逃難四方江淮海岱靡所不厯自匿姓名賣餅北海市中時安丘孫嵩藏岐複壁中數年岐作戹屯歌二十三章後諸唐死滅因赦乃出公卿舉岐擢拜并州刺史坐黨事免靈帝初復遭黨錮十餘歲中平元年四方兵起詔選故刺史二千石有文武才用者徵岐拜議郎車騎將軍張温西征闗中請補長史别屯安定大將軍何進舉為燉煌太守行至襄武岐與新除諸郡太守數人俱為賊邊章等所執賊欲脅以為帥岐詭辭得免展轉還長安岐還至陳倉復遇亂兵裸身得免在草中十二日不食也杜林扶風茂陵人也初為郡吏王莽末盗賊起林與弟成及同郡范逡孟冀等將細弱俱客河西道逢賊數千人遂掠取財裝褫奪衣服拔刅向林等將欲殺之冀仰曰願一言而死將軍知天神乎赤眉兵衆百萬所向無前而殘賊不道卒至破滅今將軍以數千之衆欲規霸王之事不行仁恩而反遵覆車不畏天乎賊遂釋之俱免於難後至大司空魏郭淮為征西將軍都督雍凉諸軍事淮妻王凌之妹凌誅妹當從坐御史往收督將及羗胡渠帥數千人叩頭請淮表留妻淮不從妻上道莫不流涕人人扼腕欲刼留之淮五子叩頭流血請淮淮不忍視乃命左右追妻於是追者數千騎數日而還淮以書白司馬宣王曰五子哀母不惜其身若無其母是無五子無五子亦無淮也今輙追還若於法未通當受罪於主者覲展在近書至宣王亦宥之蜀裴雋字奉先魏尚書令潛弟也雋姊夫為蜀中長史雋送之時年十餘歲遂遭漢末大亂不得還既長知名為蜀所推重也吳黄蓋字公覆隨周瑜拒曹公於赤壁為流矢所中時寒墮水為吳軍人所得不知其蓋也置厠牀中蓋自彊以一聲呼韓當當聞之曰此公覆聲也向之垂涕解易其衣遂以得免後至武鋒中郎將晉王尼字孝孫辟車騎府舍人不就値雒陽䧟避亂江夏時王澄為荆州刺史遇之甚厚尼早喪婦止有一子無居宅惟畜露車有牛一頭每行輙使子御之暮則共宿車上常歎曰滄海横流處處不安也俄而澄卒荆土饑荒尼不得食乃殺牛壞車煑肉噉之既盡父子俱餓死摯虞流離鄠杜之間轉入南山中糧絶餓甚拾橡實而食之後得還洛厯光禄勲太常卿及洛京荒亂盗竊從横人饑相食虞素清貧遂以餒卒鮑靚為南海太守嘗行部入海遇風饑甚取白石煑食之以自濟南燕慕容超字祖明德之兄北海王納之子時慕容垂起兵山東苻昌收納及諸德子皆誅之納母公孫氏以老耄獲免納妻段氏方娠未决囚之于郡獄獄掾呼延平德之故吏也嘗有死罪德免之至是將公孫及叚氏逃于羗中而生超焉年十歲而公孫氏卒臨終授超以金刀曰若天下太平汝得東歸可以刀還汝叔也平又將超母子奔于吕光及吕隆降于姚興超又隨凉州人徙于長安宋江謐字令和父徽宋尚書都官郎吳令為太祖所殺謐繋尚方孝武平京邑乃得出後至左戸尚書王懿字仲德父苗事苻堅為二千石及堅敗仲德年十七與兄叡同起義兵與慕容垂戰敗仲德被重創走與家属相失經大澤不能前困卧林中忽有青衣童兒騎牛行見仲德問曰食未仲德告饑兒去頃之復來携食與之仲德食畢欲行㑹水潦暴至莫知所之有一白狼至前仰天而號號訖衘仲德衣渡水仲德隨之獲濟與叡相及渡河至滑臺復為翟遼所留使為將帥積年仲德欲南歸乃奔太山遼遣騎追之急夜行忽有炬火前導仲德隨之行百許里乃免後至徐州刺史朱脩之為司徒從事中郎後隨到彦之北伐彦之自河南廻留脩之戍滑臺為虜所圍數月糧盡將士熏䑕食之遂䧟於虜初脩之母聞其被圍既久嘗憂之忽一旦乳汁驚出母號泣告家人曰吾今已老忽復有乳汁斯不祥矣吾兒其不利乎後問至修之果以此日䧟沒元魏嘉其守節以為侍中妻以宗室女脩之潛謀南歸妻疑之毎流涕問其意脩之雖嘉其義終竟不告也後鮮卑馮宏稱燕王都黄龍元魏伐之脩之與同沒人邢懐明並從又有徐卓者復欲率南人竊發事泄被誅脩之懐明懼奔馮宏宏不禮留一年㑹宋使傳詔至脩之名位素顯傳詔見即拜之彼國敬傳詔謂為天子邊人見其致敬於脩之乃始加禮時魏屢伐宏或說宏遣脩之歸求救遂遣之泛海至東萊遇猛風柁折垂以長索船乃復正海師望見飛鳥知其近岸須臾至東萊元嘉九年至京邑以為黄門侍郎梁沈約字休文父璞淮南太守璞元嘉末被誅約尚幼潛竄㑹赦免既而流寓孤貧後至尚書僕射范雲起家郢州西曹書佐轉法曹行参軍俄而沈攸之舉兵圍郢城父抗時為府長流入城固守留家属居外雲為軍人所得攸之召與語聲色甚厲雲容貌不變徐自陳說攸之乃笑曰卿定可兒且出就舍明旦又召令送書入城城内或欲誅之雲曰老母弱弟懸命沈氏若違其命禍必及親今日就戮甘心如薺長史栁世隆素與雲善乃免之後至尚書令裴䆳舉秀才對䇿高第奉朝請東昏踐祚始安王蕭遥光為撫軍將軍揚州刺史引􅃉為參軍後遥光敗䆳還壽陽値刺史裴叔業以壽陽降魏州之豪族皆被驅掠􅃉遂隨衆北徙魏宣武帝雅重之以為司徒属中書郎魏郡太守魏遣王肅鎮壽陽䆳固求隨肅宻圖南歸天監初自拔還朝除後軍諮議參軍袁昻父顗為雍州刺史泰始初舉兵奉晉安王子勛事敗誅死昻時年五歲乳媪携抱匿於廬山㑹赦得出猶徙晉安至元徽中走還時年十五後至司空陸襄為度支尚書太清二年侯景舉兵圍宫城以襄直侍中省三年三月城䧟襄逃還吳賊尋寇東境景將宋子仙進攻錢塘海鹽人陸黯舉義有衆數千人夜出襲郡殺偽太守蘇單于推襄行郡事淮南守文成侯蕭寧逃賊入吳襄遣迎寧為盟主遣黯及兄子映公帥衆距子仙子仙聞兵起乃退還與黯戰黯敗走吳下軍聞之亦各奔散襄匿于墓下一夜憂憤卒時年七十賀琛為中軍宣城王長史侯景䧟城琛被創未死賊求得之輿至闕下求見僕射王克領軍朱异勸開城納賊克等讓之涕泣而止賊復輿送莊嚴寺療之明年臺城不守琛逃歸鄉里其年賊冦㑹稽復執琛逸出以為金紫光禄大夫卒劉峻字孝標父珽宋始興内史峻生朞月母携還鄉里宋泰始初青州䧟魏峻年八歲為人所畧至中山中山富人劉實愍峻以束帛贖之教以書學魏人聞其江南有戚属更徙之桑乾齊永明中從桑乾得還後至荆州戸曹參軍陳徐陵弟孝克梁太清初起家為太學博士至孝遭父憂殆不勝喪事所生母陳氏盡就養之道梁末侯景冦亂京邑大饑餓死者十八九孝克養母饘粥不能給妻東筦臧氏領軍將軍臧盾之女也甚有容色孝克乃謂之曰今饑荒如此供養交闕欲嫁卿與富人望彼此俱濟於卿意如何臧氏弗之許也時有孔景行者為侯景將頗富於財孝克宻因媒者陳意景行多從左右逼而迎之臧氏涕泣而去所得穀帛悉以供養孝克又剃髪為沙門改名法整兼乞食以充給焉臧氏亦深念舊恩數私致饋餉故不乏絶後景行戰死臧氏伺孝克於途中累日乃見謂孝克曰往日之事非為相負今既得脱當歸供養孝克黙然無答於是歸俗更為夫妻周豫𤣥宏正子也年十四與父俱載入東乘小船渡岸見藤花宏正挽之船覆俱溺宏正僅免豫𤣥遂得心驚疾後魏崔衡長子敞宣武初為鉅鹿太守弟朏之逆也敞為黄木軍主韓文殊所藏其家悉見籍沒唯敞妻李氏以公主之甥自隨奴婢田舍二百餘口得免正光中普釋禁錮敞復爵崔𤣥伯初為苻堅著作佐郎堅亡避難於齊魯之間為丁零翟釗及司馬昌明叛將張願所留縶郝軒歎曰斯人而遇斯時不因扶揺之勢而與鷃雀飛沉豈不惜哉賈彞初仕慕容氏歸垂為驃騎長史垂太子寶兵敗被執道武即位拜尚書左丞甚見委用天賜末彛請詣温湯療病為叛胡所拘執送於姚興積數年遁歸又為屈丐所執與語悅之拜秘書監卒太武平赫連昌子秀迎其尸柩葬于代南李孝祖祖敷以罪誅孝祖以年小藏免後敷妻崔氏得出宫養之至平凉太守陰道方為荆州刺史李神儁長流參軍正光末梁簡文遣其軍主曹義宗等擾動邊蠻神儁令道方馳傳向新野處分軍事於路為蠻所掠送於義宗義宗又傳致襄陽仍傳於梁武梁武囚之尚方孝昌中始得還國劉芳字伯友彭城人出後伯父宋東平太守遜之父邕同宋劉義宣之事身死彭城芳隨伯母房逃竄青州㑹赦免舅元慶為宋青州刺史沈文秀建威府司馬為文秀所殺芳母子入梁鄒城慕容白曜南討青齊梁鄒降芳北徙為平齊民時年十六後至太常郭祚父洪之坐崔浩事被誅祚亡竄得免弱冠州主簿刺史孫小委之書記又太原王希逸妻之以姪共相賙恤得以饒振後為征西將軍雍州刺史楊藻為瀛州安東府長史以年老歸家闔門不關世事孝昌中在鄉為賊帥杜洛周所囚發病卒北齊王晞為大鴻臚開府儀同三司及晉陽䧟敗與同志避周兵東北走山路險逈懼有土賊而晞温服膏粱曽不廢行侣尤之晞曰莫尤我我行事若悔久作三公矣魏收初仕後為太學博士及爾朱榮於河陰濫害朝士收亦在圍中以日晏獲免後周盧柔為賀㧞勝大行臺郎中掌書記及孝武西遷東魏遣侯景襲穰勝敗南奔梁後與勝俱還行至襄陽齊神武懼勝西入遣侯景以輕騎邀之勝及柔乃棄船山行贏糧冒險經數百里時属秋霖徒侣凍餒者大半幾至於死大統二年至長安封容城縣男竇熾扶風人父畧平逺將軍魏正光末北鎭擾亂熾乃隨畧避地定州因沒於葛榮榮欲官畧畧不受榮疑其有異志遂留畧於冀州將熾及熾兄善隨軍永安元年爾朱榮破葛榮熾乃將家隨榮於并州後至太傅陸通少敦敏好學有志節父政為文帝行臺左丞原州長史通幼從在河西遂逢冦難與政相失通乃自以東歸從爾朱榮榮死又從爾朱兆及爾朱氏滅乃入闗後至大司馬姚僧垣仕梁為湘東王府記室參軍侯景䧟宫城逃歸吳興俄而景兵大至攻戰累月郡城遂䧟僧垣竄避久之乃被拘縶景將侯子鑒素聞其名深相器遇因此獲免後至上開府儀同大將軍隋劉炫河間人為太學博士以品卑去任歸於河間于時盜賊起穀食踊貴炫與妻子相去百里聲聞斷絶鬱鬱不得志時在郡城糧餉斷絶其門人多隨賊哀炫窮乏詣郡城下索炫郡官乃出炫與之炫為賊所將過下城堡未幾賊為官軍所破炫饑餓無所依復投縣城長史意炫與賊相知恐為後變遂閉門不納之時夜永寒因此凍餒而死時年六十八其後門人諡曰宣德先生唐李百藥初為隋建安郡丞及煬帝被弑展轉沈法興李子通杜伏威軍中備嘗艱苦乃著省躬賦以致其情及高祖遣使江南百藥說伏威迎之後復勸伏威令身入朝渡江至厯陽伏威狐疑中悔將害百藥乃飲以石灰酒因大洩痢而宿病皆除伏威知百藥不死乃書與輔公祏令殺之賴王雄誕救䕶得免及公祏反署百藥為吏部侍郎人有言百藥初說杜伏威不聽入朝今又共輔公祏反髙祖大怒公祏平趙郡王孝恭得伏威與公祏令殺百藥書奏之髙祖意乃稍解詔配涇州為司戸徐文逺初仕隋為國子博士時洛陽饑饉出城採樵為李宻所及宻敗復歸王世充其子士㑹狂悖之人委棄文逺西歸長安王世充大怒絶其廪食此後大餒將死者數矣復因樵採遇羅士信候騎獲之送入京師復授國子博士張𤣥素蒲州虞鄉人隋末為景城縣户曹竇建德攻䧟景城𤣥素被執將戮縣民千餘人號泣請代其命曰此人清慎殺之乃無天也大王將定天下當深加禮接以招四方如何殺之使善人解體建德遽命釋之署為治書侍御史固辭不受髙士廉隋時坐事謫為交阯朱鳶縣主簿尋屬天下大亂王命阻絶太守丘和署為司法書佐郡丞元肅從横士也多所交結謀殺和而據駱越以窺天下之變見士廉為時望所歸亦傾心推結憚其立操不敢以謀告之然肅竟以事洩為和所族士廉坐與交通幾危矣和子行淹保明之由是獲免及蕭銑敗高祖遣使狥嶺南武德五年乃與丘和上表歸國追入特蒙顧待拜大將軍路敬淳貝州臨清人也父文逸隋大業末闔門遇盜文逸潛匿草澤晝伏於死人中夜行避難自傷窮梗閉口不食同侣閔其至性勸以不當滅性搶拾以食之遞負之而行遂免於難後至太子司議郎仍授崇賢舘學士來濟隋左翊衞大將軍榮國公䕶子也宇文化及之難闔門遇害濟幼逢家難流離艱險後至中書令韋斌為太常少卿天寶五載右相李林甫搆刑部尚書韋堅貶蒼梧太守七載又重貶江夏别駕堅兄弟四人並賜死於貶所姊惠宣太子妃隨子嗣薛王瑜遷於夜郎郡安置斌以親累貶巴陵太守後為銀青光禄大夫天寶十四載冬安禄山反䧟洛陽斌為賊所得偽授黄門侍郎李彭年為馮翊太守𤣥宗幸蜀賊䧟西京彭年沒於賊偽授工部侍郎彭年脅授偽官常憤歎忽忽不得志與韋斌相次而卒王維為給事中安禄山䧟兩京維在西京詐中風失瘖久之賊重其名追赴洛陽偽授給事中崔器天寶末為奉先令逆胡䧟西京器沒於賊仍守奉先居無何属賊兵同羅叛賊將安守中張通儒並避難藏匿又渭上義兵起一朝聚徒萬人器恐懼憂惶先有賊文牓符牒一時焚之牓召義師欲應渭上軍及通儒出兵使擊渭上軍破賊將崔乾祐先頓蒲同使麾下騎三十人捉器器遂北走靈武李進為工部侍郎代宗初皇儲為天下元帥平河洛以進參佐時元帥在陜兼統蕃兵廻紇恃功而驕敢恣狠戾進與中書舍人韋少華皆為皮鞭所辱進數月病瘡僅以全生叚秀實為安西節度荔非元禮判官邙山之敗軍徙翼城元禮為麾下所殺將佐亦遇害而秀實獨以智全馬總字㑹元扶風人少孤貧好學性剛直不妄交逰貞元中姚南仲鎮滑臺辟為從事南仲與監軍使不叶監軍誣奏南仲不法及罷免總坐貶泉州别駕監軍入掌機宻福建觀察使栁冕希㫖欲殺總遣從事穆贊鞫總贊稱無狀總方免死後量移恩王傅嚴懐志以涇原裨將隨渾瑊㑹吐蕃背盟懐志等䧟沒居吐蕃中十餘年逃入以西諸國為所掠賣又脫走經十餘國至天竺占波國泛海而歸貞元十四年始至温州徵詣京師德宗以懐志處蕃久不欲令出外囚之仗内順宗即位乃釋之初懐志之䧟父母俱存及歸父母皆没妻嫁他人吕温者以小吏事崔漢衡貞元初吐蕃背盟漢衡為吐蕃所虜將殺之温趨往以背受之刅吐蕃義之由是與漢衡俱免及漢衡歸獨留蕃中吐蕃尚浮屠法温因求為僧久之乃得歸亦以習吐蕃事囚焉順宗即位得釋與懐志授中郎將魏義通為黔中觀察使行至涪州泝灘舟壊沉失其所持節及賜馬梁張雋字彦臣祖父咸有聞於時雋少孤雅自修餙善為五言詩其警句頗為人所稱廣明中黄巢犯京師天子幸蜀士皆竄伏窟穴以保生雋亦晦跡浮泛不失其道後至兵部郎中監鐵判官後唐劉岳初少孤以先人官卑羣從之間最不調兩都喪亂流寓青齊丐食業文厲心苦節後至太常卿趙鳳幽州人也少為儒天祐中燕帥劉守光與太原爭霸率十夫團為軍伍而黥面為文儒者患之多為僧鳳亦落髪與逰方者雜處後為相終朱宏昭為文思使與安重誨情不協故罕得居内任天成二年秋以李嚴為西蜀監軍乃用宏昭為東川副使嚴至成都為孟知祥所害宏昭懼求還京師董璋待之雖厚而嘗猜防伺察宏昭坦懐從命而璋不疑尤重之㑹有軍事雖論列乃令宏昭入覲偽辭之不獲繇是免禍後為襄州節度使襄州留軍有朽腐甲胄數百宏昭奏不堪完補詔投之於漢水詔至宏昭集賔佐棄之登南城依却敵以視無何懸鐘格木朽墮宏昭至城璋絆之於木左右梯而下之幸無損但喪魄讋氣而已晉趙瑩為相開運末虜䧟京城瑩從少帝於北塞周太祖遣尚書左丞田敏報命于契丹遇瑩于幽州瑩得見華州人悲悵不已謂田敏曰老身漂零寄命於此近聞室家喪逝弱子無恙蒙中朝皇帝倍加存卹東京舊第本屬公家亦聞優恩特給善價老夫至死無以報效於是南望稽首涕泗横流先是漢初以晉入蕃將相第宅賜隨駕大臣以瑩第賜太祖太祖召瑩子前刑部郎中易則告之曰所賜第除素属版籍外如别有契券已所置者可歸本直即以千餘緡遺易則易則惶恐辭讓太祖堅之乃受故瑩言及之未幾瑩卒於幽州瑩初被病遣人祈告于虜主願歸骨於南朝使覉魂幸復鄉里虜主閔而許之及卒遣其子易從及家人數軰䕶喪而還仍遣大將送至京師太祖閔瑩死于異域而知夷狄亦不能違物性歸其喪柩感歎久之仍賜其子絹五百疋以備喪事令歸葬于華陰故里華温琪年始二十長七尺餘唐廣明中黄巢為亂掠為紀綱從巢南犯交阯西䧟長安偽署温琪供奉都知官既得志習平時官者故態毎肩舁出入以自奉及巢敗奔至滑臺以形貌魁岸懼不自容乃投白馬下流俄而浮至淺處㑹行人救免又登桑自經枝折墜地不死至夜胙縣界有田父見温琪非常人也遂匿於家經歲餘漢龍敏初唐莊宗平河雒徵為司門員外郎以家貧乏養求為興唐少尹踰年丁母喪退居鄴下㑹趙在禮據鄴城以敏鄉人强起令署事又為亂軍所迫敏不敢拒明年在禮鎮浮陽敏復居喪制周馮道唐天祐中劉守光辟為幽州掾嘗以利害箴守光守光怒寘於獄中後仕晉為相晉末北虜犯闕廻虜先留馮道與李崧和凝文武官等在常山以閏七月二十九日虜中有偽詔追崧令選朝士十人赴木葉山行事虜帥解里召道等至帳前所欲諭之崧偶先至見其㫖懼形於色解里將以明日與朝士齊遣之崧乃不候道與凝先出既而相遇帳門之外因與分首俱歸俄而李筠等縱火與虜交鬬鈹槊相及是日道若齊至與解里相見稍躊躇則悉為俘矣時論者以道在布衣有至行立公朝有重德其陰報昭感多此類也劉皥初自魏博歸于唐莊宗梁將劉鄩自梁欲乘虚襲太原軍至樂平時皥客於縣舍為鄩軍所俘髠其髪謝彦章許之知其學儒禮之謂其鄉人劉去非曰為公得一宗人令皥見之去非詢其爵里乃親族也對泣久之自是隨去非客于彦章門下後至衛尉卿安叔千為太子太師叔千以都城内難之際軍士未戢其家財無孑遺大遭笞捶以是成疾請歸雒都卒王繼宏為河陽節度使少無頼為吏所拘械繫常州獄將殺之㑹赦以其壯健特宥之配於本軍册府元龜卷九百四十
