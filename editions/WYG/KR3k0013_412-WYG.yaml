body:
  text: 冊府元龜卷四百十二宋王欽若等撰將帥部仁愛得士心仁愛蓋大徳以施惠制勝之攸先仁者佐賢諜帥之斯允故慈愛之用著於治戎寛簡之徳彰於御衆古之善為將者何莫由斯也已固有務兼撫納存乎恩信形惻隱於官次表忠恕於心術解衣推食以䘏吏士救寒振餒以濟黎氓給醫藥以赴創病設棺歛以藏暴露至使殊俗歸嚮窮民安集愛之如父母薫之如椒蘭不幸云亡如失所怙追懐遺徳乆而彌篤自非其中心誠信於士大夫又豈可驅而致哉漢李廣為前將軍及自剄百姓聞之知與不知老壯皆為垂泣班固曰李將軍恂恂如鄙人口不能出辭及死之日天下知與不知皆為流涕彼其中心誠信於士大夫也諺曰桃李不言下自成蹊此言雖小可以喻大叚㑹宗元帝竟寧中以杜陵令五府舉為西域都䕶騎都尉光禄大夫西域敬其威信三嵗後為雁門太守數年坐法免西域諸國上書願得㑹宗成帝陽朔中復為都䕶後以安輯烏孫病死烏孫中城郭諸國為發䘮立祠後漢來歙光武時為中即將建武中歙率馮異等平隴西既而人饑流者相望歙乃傾倉廩轉運諸縣以賑贍之於是隴西遂安而涼州流通焉馬成建武中為揚武將軍屯常山中山以備北邊在事五六年光武以成勤勞徴還京師邊人多上書求請者復遣成還屯馬援建武中為伏波將軍討交趾女子徴側及女弟徴二嶠南悉平所過輙為郡縣治城郭穿渠灌溉以利其民竇固明帝永平初為奉車都尉屯涼州在邊數年羗胡服其恩信有羗胡見客炙肉未熟人人長跪前割之血流指間進之於固固輙為啗不穢賤之是以愛之如父母耿秉章帝時為度遼將軍視事七年匃奴懐其恩信匃奴聞秉卒舉國號泣或至梨面流血梨即􅋇字古字通用也􅋇割也音力私反鄧訓為䕶羗校尉羗胡俗耻病死每病臨困輙以刀自刺訓聞有困病者輙拘持縛束不與兵刃使醫藥療之愈者非一小大莫不感恱及訓卒吏人羌胡愛惜旦夕臨者日數千人戎俗父母死耻悲泣皆騎馬歌呼至聞訓卒莫不吼號或以刀自割又刺殺其犬馬牛羊曰鄧使君已死我曹亦俱死耳前烏桓吏士皆奔走道路至空城郭吏執不聽以狀白校尉徐傿傿嘆息曰此義也乃釋之遂家家為訓立祠每有疾病輙就請禱求福曹褒和帝永元中為射聲校尉營舍有停棺不𦵏百餘所褒親自履行問其意故吏對曰此等多是建武以來絶無後者褒愴然為買空地悉𦵏其無主者設祭以祀之袁紹為大將軍督兾青幽并四州牧軍敗後發病嘔血死紹為人政寛百姓徳之河北士女莫不傷悲市巷揮淚如䘮其親魏孫禮齊王時為伏波將軍揚州刺史時吳大將全琮帥數萬衆來侵冦禮躬勒衛兵禦之賊衆乃退詔書慰勞賜絹七百疋禮為死事者設祀哭臨哀號發心皆以絹付亡者家無以入身蜀馬忠為鎮南大將軍處事能斷威恩並立是以蠻夷畏而愛之及卒莫不自致䘮庭流涕盡哀吳范慎為武昌左都督慎自恨乆為將遂託老耄軍戀之舉營為之隕涕朱桓為前將軍領青州牧愛養吏士贍䕶六親俸祿産業皆與共分桓疾困舉營憂戚大帝赤烏元年卒吏士男女無不號慕晉羊祜為衛將軍都督中外諸軍事及薨南州人征市日聞祜䘮莫不號慟聲相接吳守邊將士亦為之泣其仁徳所感如此成都王頴為大將軍都督中外諸軍事既迎天子反正遂自歸鄴盧志言於頴曰黄橋戰亡者有八千餘人既經夏暑而露骨中野可為傷惻昔周王葬枯骨故詩云行有死人尚或墐之况此等致死王事乎頴乃造棺八千餘枚以成都國秩為衣服歛祭𦵏於黄橋北樹枳籬為之瑩域又立都祭堂刋石立碑紀其赴義之功使亡者之家四時祭祀有所乃表其門閭加常戰亡二等又命河内温縣埋藏趙王倫戰死士卒萬四千餘人穎以前在陽翟與彊賊相持乆百姓創痍饑餓凍餒宜急賑救乞差發郡縣車一時運河北邸閣米十五萬觧以賜陽翟饑人祖逖為鎮西將軍領豫州刺史及卒豫州士女若䘮考妣庾彬領䕶烏丸校尉坐事檻車徴彬付廷尉以事直見釋百姓追慕彬功徳生為立碑作頌劉宏為鎮南將軍荆州刺史南蠻校尉宏嘗夜起聞城上持更者歎聲甚苦遂呼省之兵年過六十羸疾無檽宏愍之乃謫罰主者遂給韋袍複㡌轉以相付温嶠為江州刺史都督平南將軍及薨於武昌江州士庶聞之莫不相顧而泣禇裒為征討大都督徐兗青揚豫五州諸軍事穆帝永和五年卒逺近嗟悼吏士哀慕之前燕陽裕為慕容皝大將軍左司馬士大夫流亡覊絶者莫不經營收葬存恤孤貧宋劉敬宣為冠軍伐蜀譙氏縱送毛璩一門諸䘮其妻女并文處茂母及與諸士人䘮柩浮之中流敬宣皆拯救之檀道濟為髙祖北伐前鋒至雒陽凡㧞城破壘俘四千餘人議者謂應悉戮以為京觀道濟曰伐罪弔民正在今日皆釋而遣之於是戎長感悦相率歸之者甚衆劉勔為寧朔將軍㑹豫州刺史殷啖反假勔輔國將軍討之及琰開門請䧏勔約令三軍不得妄動城内士民秋毫無所失百姓感恱咸曰來蘇百姓生為立碑王元謨為平北将軍都督徐州刺史時北土饑饉乃散私榖十萬斛牛千頭以賑之衡陽王義季為荆州刺史都督荆湘八州諸軍事隊主續豐母老家貧無以充養遂斷不食肉義季哀其志給豐每月白米二斛錢一千并制豐噉肉南齊曹虎為右衛將軍形幹甚毅善於誘納日食荒客常數百人梁裴䆳為將少言笑沈深有思略為政寛明能得士居身方正有威重將吏憚之少敢犯法及其卒也淮淝間莫不流涕以為䆳不死雒陽不足㧞韋叡京兆杜陵人為冠軍將軍江南太守行郢府事初郢城之拒守也男女口垂十萬閉壘經年疾疫死者十七八皆積屍於牀下而生者寢處其上毎屋輙盈滿叡料簡隱䘏咸為營理於是死者得埋塟生者反居業百姓頼之後為平北將軍寕蠻校尉雍州刺史初叡起兵鄉中客隂雙光泣止之及叡還為州雙光道候叡笑謂之曰若從公言乞食於路矣餉耕牛十頭叡於故舊無所遺惜士大夫年七十以上多與假板縣令鄉里甚懐之陳荀朗初仕梁為豫州刺史以侯景之亂入援臺城據山寨自守景開府宋子仙不能尅時京師大饑百姓皆於江外就食朗更招致部曲觧衣推食以相賑衆至數萬人華皎為文帝都録事及帝平杜龕仍配以人馬甲仗猶為都録事御下分明善於撫養時兵荒之後百姓饑饉皎解衣推食多少必均後魏李神雋為前將軍荆州刺史時寇賊之後城外多有露骸神雋敎令收葬之崔巨倫莊帝時為假節中堅將軍領東濮陽太守假征虜將軍别將時河北紛梗人士避賊多住郡界嵗儉饑乏巨倫傾資贍恤務相全濟時類高之北齊婁昭從神武入雒兖州刺史樊子鵠反以昭為東道大都督討之子鵠既死諸將勸昭盡誅其黨昭曰此州無狀橫被殘賊其君是怨其人何罪遂皆捨焉魏郡王叡為定州刺史文帝詔令領山東兵築長城先是役徒罷作任其自返丁壯之軰各自先歸羸弱之徒棄在山北加以饑病多致僵殞叡於是親帥所部與之俱還配合州鄉部分營伍督帥監領强弱相持遇善水草即為停頓分有餘贍不足頼以全者十三四焉趙彦深為東南道行臺尚書徐州刺史為政尚㤙信為吏人所懐多所䧏下所營軍處士庶追思號趙行臺頓後周張軌魏末為鎭逺將軍時榖糴踊貴或有請貸官倉者軌曰以私害公非吾宿志濟人之難詎得相違乃賣所賜衣物糴粟以賑之王傑武帝建德初除江州總管傑少從軍旅雖不習吏事所歴州府咸以忠恕為心以是頗為百姓所慕丁翼自陜入九曲攻㧞造簡等諸城徑到雒陽齊雒州刺史獨孤永業開門出降河南九州三十鎭一時俱下襄陽民庶等喜復見翼並壺漿塞道尋即除雒懐等九州諸軍事河陽總管尋徙豫州總管陳將魯天念又圍光州聞翼到汝南望風退散霍州蠻首田元顯負險不賔於是送質請附陳將任蠻奴悉衆攻顯立柵拒戰莫有離心及翼還朝元顯便叛其得殊俗物情皆此類也唐瑾從于謹平江陵衣冠士伍並沒為僕𨽻瑾察其才行片善者輙議免之賴瑾獲濟者甚衆時論多焉隋劉方髙祖仁夀中為交州道行軍總管討交州李佛子之亂時長史敬德亮從軍尹州疾甚不能進留之州舘分别之際方哀其危篤流涕嗚咽感動行路其感德如此論者稱為良將李景為柱國右武衛將軍煬帝使營建遼東戰具於北平遇賊見害契丹䍪羯素感其㤙聞之莫不流涕幽燕人士於今傷惜之唐程名振高祖武德初遥授永年令率兵經略河北名振夜襲鄴俘其男女千餘人去鄴八十里閱婦人有乳汁者九十餘人悉放遣之鄴感其仁劉仁軌為帶方州刺史鎮守百濟經福信之亂合境凋殘僵屍相屬仁軌始令收歛骸骨􅄟埋吊祭賑貸貧乏存問孤老條録户口郭子儀𤣥宗天寳末為朔方節度使討安禄山㧞趙郡生擒四千人皆捨之李復德宗貞元初為容管招討使先是西京叛亂前後經略使征討反者獲其人皆沒官為奴婢配作坊重役復令訪其親屬悉歸還之高崇文憲宗元和初統神策軍征劉闢于西川衣冠陷賊者皆匍匐衙門請命崇文條奏全宥之朱忠亮元和中為涇原節度使涇上舊俗多賣子忠亮以俸錢贖而還其親者約三百人晋趙杜禮為晋昌節度使或賑人之急時論賞之周趙暉為鳯翔節度使太祖廣順二年上言王景崇叛亂時殺戮餓死骸骨除先有使臣埋􅄟外令掘曲坑并聚十八車埋􅄟祭奠得士心傳曰師克在和又云德以施恵戰所由克古之良將率由兹道以至身犯寒暑不敢先裘葛衆未食飲不敢言饑渴周旋撫馭甘苦同之孜孜焉唯恐乎狥已之私而失人之心也用能親若父兄隨如臂指始乃欣然景附願属麾下終亦爭先為用奮不顧死繇是推堅却敵毎多成績其或投於亡地固守心誠結義寖深卒無離叛迨夫兵盡勢窘不忍捨去肝腦塗地靡有悔恨又復過更増戀遺愛難忘尊奉感涕發於誠欵至有新兵甫集同人烏合激勵忠憤開示恩信折服英毅樂為我使斯又智略之速達也呉起為魏將與士卒分勞苦卒有病疽者起為吮之卒母聞而哭之人曰子卒也而將軍自吮其疽何哭為母曰非然也往年起嘗吮其父父戰不旋踵遂死於敵吳公今又吮其子妾不知其死所矣是以哭之文侯以起盡能得士心以為西河守拒秦韓秦末田橫為齊王漢韓信灌嬰平齊地横亡走梁歸彭越漢滅項籍後横與其徒属五百餘人入居海島中高帝使使赦横罪而召之横既至尸鄉廐置遂自剄高帝以王者禮塟横既塟其客三人穿其冡旁皆自剄餘尚五百人在海中聞横死亦皆自殺於是乃知田横能得士也漢袁盎為隴西都尉仁而愛士士卒皆為致死李廣歴北平太守前後四十餘年得賞賜轉分其麾下飲食與士卒共之將兵之處見水士卒不盡飲不近水士卒不盡飱不嘗食士以此愛樂為用李陵為騎都尉將歩卒五千人出居延至浚稽使麾下騎陳歩樂還以聞歩樂召見道陵將率得士死力帝甚喜韓威延夀之孫仕至將軍亦多㤙信能拊衆得士死力蓋寛饒宣帝時為衛司馬寛饒初拜未出殿門斷其襌衣令短離地冠大冠帶長劍躬案行士卒廬室視其飲食居處有病疾者身自撫循臨問加致醫藥遇之甚有㤙及嵗盡交代帝臨饗罷衛卒得代當歸者也衛卒數千人者叩頭自請願復留共更一年更猶今言上畨也以報寛饒厚德帝嘉之後漢馮異初隨光武為偏將軍及破邯鄲乃更部分諸將各有配隷軍士皆言願属大樹將軍光武以此多之耿秉為征西將軍擊匃奴秉休止不結營部然逺斥候明要誓有警軍陳立成士卒皆樂為死鄧訓章帝時將黎陽營兵屯狐奴建初六年遷䕶烏桓校尉黎陽故人多擕將老㓜樂隨訓徙邊訓故吏最貧羸者舉國念訓常所服藥北州少乏又知訓好青泥封書從黎陽步推鹿車於雒陽市藥還過趙國易陽並載青泥一襆至上谷遺訓其得人心如是段紀明為破羌將軍征羌毎行軍仁愛士卒疾者親自贍省手為裹瘡在邊十餘年未甞一日蓐寢與將士同勤苦故皆樂為死戰皇甫嵩為右中郎將平黄巾䘏士卒甚得衆情臧洪為東郡太守治東武陽太祖圍張超于雍丘超言惟恃臧洪當來救洪圍之徒跣號泣並勒所領兵又從袁紹請兵馬求欲救超而紹終不聼許超遂旋滅洪由是怨紹絶不相通紹興兵圍洪於東武陽城中糧盡外無援救自度不免呼吏士謂曰袁紹無道所圖不軌且不救洪郡將洪于大義不得不死念諸君無事空與此禍可先城未破將妻子出將吏皆垂泣曰明府之于袁氏本無怨隙今為郡將之故自致危困吏人何忍當捨明府去也初尚掘䑕煑䈥角後無所復食主簿啟内厨米三斛請稍為饘粥饘麋也洪曰何能獨甘此邪使為薄糜徧班士衆又殺其愛妾以食兵將兵將咸流涕無能仰視男女七八十人相枕而死莫有離叛魏曹真為大將軍真每征行與將士同勞苦軍賞不足輙以家財班賜士卒皆願為用張耽為中郎將性勇銳而善撫士卒軍中皆為用命鮑信為破虜將軍厚養將士居無餘財士以此歸之夏侯覇為右將軍屯隴西其養士和戎並得其歡心諸葛誕為征東大將軍既死麾下坐不䧏皆為司馬文王所戮數百人拱手為列每斬一人輙䧏之竟不變皆曰為諸葛公死不恨其得人心如此時人比之田橫吳孫瑜字仲異堅弟静之子以恭義校尉始領兵衆是時賓客諸將多江西人瑜虚心綏撫得其歡心建安末領丹陽太守為衆所附至萬餘人加綏逺將軍孫歆為邊將數十年養士卒得死力凌統為偏將軍統以山中人尚多壯悍可以威信誘也帝令東占且討之統素愛士士亦慕焉得精兵萬餘人陳修為别部司馬授兵五百人時諸將新兵多有逃叛而修撫循得意不失一人大帝竒之拜為校尉黄盖為丹陽都尉姿貎嚴毅善于養衆毎所征討士卒皆爭為先陸抗為大將軍既誅歩闡東還樂鄉貎無矜色謙冲如常故得將士歡心陳表父武從擊合肥戰死表以父死敵塲求用為將領兵五百人表欲得戰士之力傾意接待士皆爱附樂為用命而有盗官物者疑無難士施明明素壯悍收考極毒雖死無辭廷尉以聞大帝以表能得徤兒之心詔以明付表使自以意求其情實表便破械沐浴易其衣服厚設酒食歡以誘之明乃首服具列支黨表以狀聞帝竒之欲全其名特為赦明誅戮其黨遷表為無難右部督徐平字伯先遷武昌左部督傾心接物士卒為盡力甘寕為折衝將軍開爽有計略能厚養徤兒士亦樂為用命晉王濬為巴郡太守郡邊吳境兵士苦役生男多不舉濬乃嚴其科條寛其徭課其産育者皆與休復所全活者數千人及伐吳先在巴郡之所全育者皆堪徭役供軍其父母戒之曰王府君生爾爾必勉之無愛死也􅄞紹為侍中河澗王顒成都王穎舉兵向京都以討長沙王又大駕次于城東乂宣言于衆以討曰今日西討欲誰為都督乎六軍之士皆曰願􅄞侍中戮力前驅死猶生也遂拜紹使持節平西將軍劉羣字公度琨之子少拜廣武侯世子隨父入晉陽遭逢宼亂數領偏軍征討性清慎有裁斷得士類歡心郗鑒為龍驤將軍兖州刺史鎮鄒山時荀藩用李述劉琨用兄子演並為兖州各屯一郡以力相傾闔州編户莫知所適又徐龕召勒左右交侵日尋干戈外無救援百姓饑饉或掘野䑕蟄燕而食之終無叛者二年衆至數萬元帝就加輔國將軍都督兖州諸軍事賈定字彦度愍帝時為驃騎大將軍少有志略器望甚偉見之者莫不恱附特為武夫之所瞻傾願為致命周訪為安南將軍善于撫納士衆皆為致死桓宣監沔中軍事南中郎將江夏相鎮襄陽十餘年間石季龍再造騎攻之宣能得衆心每以寡弱距守論者以為次於祖逖周訪韓璞為張實司馬實知劉曜逼遷天子遣璞等赴國難及璞次南安諸羌斷軍路相持百餘日糧竭矢盡璞殺駕牛饗軍泣謂衆曰汝曹念父母乎曰念念妻子乎曰念欲生還乎曰欲從我令乎曰諾乃鼔譟進戰會張閬率金城軍繼至夾撃大敗之斬級數千慕容翰廆庶長子也作鎮遼東高句䴡不敢為宼善撫接愛儒學自士大夫至於卒伍莫不樂而從之宋沈文秀為青州刺史魏軍圍城文秀善於撫御將士咸為盡力每與虜賊戰輙摧破之掩擊營砦往無不㨗明帝進文秀號輔國將軍被圍三年外無援軍士卒為之用命無離叛者日夜戰闘甲胄生蟣蝨遂為虜所陷卜天與領東掖防關隊從臧質救懸瓠劉興祖守白石並率所領隨之魏兵退遷領輦後第一隊撫䘏士卒甚得衆心朱修之孝武初為寕蠻校尉雍州刺史加都督修之在政寛簡士衆恱附梁鄧元超為平南中兵叅軍毎戰必㨗勇􅃣當時敢死之士樂為用命者萬有餘人陳慶之為南北司豫州都督射不穿札馬非所便而善撫軍士能得其死力馬仙琕為將與士卒同勞逸戰多尅㨗士卒亦甘心為之用向僧祐為車騎將軍時西魏㓂至以僧祐為都督城東諸軍四軍四靣起攻百道齊舉僧祐親當矢石晝夜督戰奨勵將士明於賞罰衆皆感之咸為致死所向摧殄賊莫敢前王操為大將軍時明帝出頓紀南操撫循將士莫不用命昌義之為䕶軍將軍性寛厚為將能得人死力及居藩任吏人安之陳魯悉達梁元帝時為仁威將軍江州刺史及敬帝即位王琳據有上流留異余孝頃周廸等所在蠭起悉達撫綏晉熈等五郡甚得民和士卒皆樂為之用後魏遼西公意烈子道武以宗親委之心腹明元踐祚除渤海太守吏人樂之轉平原鎮將得將士心崔寛為鎮西將軍拜陜城鎮將二崤地險民多㓂刼寛性滑稽誘接豪右宿盗魁帥與相交結傾衿待遇不逆細㣲是以能得民庶歡心莫不感其意氣周㡬為宋兵將軍率雒州刺史于栗磾以萬人襲陜城卒于軍軍人無不惜之源子雍為夏州刺史時沃野鎮人破六韓㧞陵首為反亂所在蠭起統萬逆徒與相應接子雍嬰城自守城中糧盡煑馬皮而食之子雍善綏撫得士之心人人戮力無有離貳辛纂為輔國將軍善撫將士人多用命房士達為濟南太守永安末爾朱兆入雒刺史蕭贊為城民趙雒周所逐城内無主雒周等以士達鄉情所歸乃就郡請之命攝州事劉藻為雍威鎮將雍州人王叔保等三百人表乞藻為騃奴戍主詔曰選曹已用人藻有恵政自宜他叙在任八年遷離城鎮將北齊慕容儼為開府鎮郢州梁大都督侯瑱任約等率水陸軍來攻城中食少糧運阻絶無以為計惟煑槐楮桑葉并紵根水葒葛艾等草及帶䈥角等物而食之人有死者即取其肉火别分噉惟留骸骨儼猶申令將士信賞必罰分甘同苦死生以之自正月至六月人無異志宋顯為西兖州刺史勇决有氣幹檢御左右咸能得其心力叚韶為武衛將軍長于計略善于御衆得將士之心臨敵之日人人争奮王琳在梁為相州刺史琳果勁絶人又能傾身下士所得賞物不以入家麾下萬人多是江淮羣盗平侯景之勲與杜龕俱為第一恃寵縱暴于建業王僧辯禁之不可懼將為亂啟請誅之琳亦疑禍令長史陸納率部曲前赴湘州身徑上江陵將行謂納等曰吾若不反子將安之咸曰請死相報泣而别及至元帝以下吏而使廷尉卿黄羅漢太府卿張載宣諭琳軍陸納等及軍人並哭對使者莫肯受命乃縶黄羅漢殺張載載性深刻為帝所信荆州疾之如讐故納等因人之欲抽其腸繫馬脚使繞而走腸盡氣絶又臠割備五荆而斬之元帝遣王僧辯討納納等敗走長沙是時湘州未平武陵王兵又甚盛江陵公私恐懼人有異圖納啟申琳罪請復本位永為奴婢元帝乃鏁琳送長沙時納兵方出戰㑹琳至僧辯升諸樓車以示之納等投戈俱拜舉軍皆哭曰乞王即入即出及放琳入納等乃䧏湘州平仍復本位陳覇先殺僧辯琳軍敗䧏齊為驃騎大將軍揚州刺史陳將吳明徹來㓂與戰大敗單馬突圍僅而獲免還至彭城魏帝令便赴夀陽并許召募又進封琳巴陵郡王明徹進兵圍之堰淝水灌城而皮景和等屯於淮西竟不赴救明徹晝夜攻擊城内水氣轉侵人皆患腫死病相枕從七月至十月城陷被軌百姓泣而從之吳明徹恐其為變殺之城東北二十里時年四十八哭者聲如雷有一叟以酒脯至酹哭盡哀收其血懷之而去𫝊首建康懸之于市初明徹欲全之而其下將領多琳故吏爭來致請并相資給明徹由此忌之故及于難當時田夫野老知與不知莫不為之歔欷流泣觀其誠信感物雖李將軍之恂恂善誘殆無以加焉斛律光為左丞相光自結髪從戎未嘗失律行兵用匃奴法吉㐫無不中軍營未定終不入幕或竟日不坐身不介胄常為士卒先有罪者唯大杖撾背未嘗妄殺衆皆爭為之死盧文偉為常景行臺即中後為杜雒周所虜雒周敗復入葛榮榮敗歸家時韓樓據薊城文偉率鄉閭屯守范陽與樓相抗共推文偉行范陽郡事防守二年與士卒同勞苦分㪚家財救貧乏莫不人人感恱爾朱榮遣將侯深討樓平之文偉以功封大夏縣男後周李達都督義州宏農等二十一防諸軍事善撫綏有幹略守戰之備無不精銳每厚撫境外人使為間諜敵中動静必先知之至有事泄被誅戮者亦不以為悔其得人心如此梁椿為大將軍性果毅善于撫納所獲賞物分賜麾下故每踐敵塲咸得其力崔猷為梁州都督閔帝即位始利沙興等諸道阻兵為逆信合開楚四州亦叛唯梁州境内人無二心若干恵為右衛將軍善於撫御將士莫不懐恩王思政持節河南諸軍事守潁川城為齊文襄所攻陷思政初入潁川士卒八千人城無外援亦無叛者齊王憲從武帝東伐為前鋒憲善兵謀多算略尤長于撫御達于任使摧鋒䧟陣為士卒先羣下感恱咸為之用閻慶為撫軍將軍善于撫綏士卒故盡得其死力陳忻為驃騎大將軍㪚財施恵得士衆心身死之日將吏荷其恩徳莫不感慟焉朝廷以忻雅得士心還令其子萬敵領其部曲李仙哲為驃騎大將軍兵士有疾親加醫藥軍中感之人思効命宼雋為左將軍梁州刺史屬魏末多故州又僻逺梁人知無外援遂遣大兵頓魏興志圖攻取雋撫勵將士人思効命梁人知其得衆心弗之敢逼宼雒與賀㧞岳同鄉里募從入闗以功封安鄉縣子及岳為大行臺以雒為右都督侯莫陳恱既害岳欲并其衆時初䘮元帥雒于諸將中最為舊齒素為衆信乃收集將士志在復讐既至原州衆推雒為盟主宇文虬為驃騎大將軍每經行陣必身先卒伍故上下同心戰無不克隋張湏陁大業中為齊郡丞勇决善戰又善于撫馭得士卒心論者號為名將後為河南道十二郡討捕使擊東郡賊翟讓戰死其所部兵晝夜號哭數日不止唐李勣為司空勣毎行軍用師人皆用命所向尅㨗洎乎死日聞者莫不悽慘哥舒翰初為河西節度王忠嗣衙將疎財重氣士多歸之髙仙芝為副元帥拒禄山軍敗𤣥宗命監軍邊令誠齎勅誅之仙芝曰我退罪也死不敢辭然以我為减截兵糧及賜物等則誣我也謂令誠曰上是天下是地兵士皆在足下豈不知乎其召募兵排列在外素愛仙芝仙芝呼謂之曰我于京中召兒郎輩雖得少許物裝束亦未能足方與君輩破賊然後取髙官重賞不謂賊勢憑陵引軍至此亦欲固守潼闗故也我若實有此君輩即言實我若實無之君輩當言枉兵士齊呼曰枉其聲動地裴冕為劍南節度使冕遭流謗朝廷將遣使推按兵馬使崔寕部下截耳稱寃中使奏之郭子儀性忠信事上誠藎臨下寛厚每降城下邑所至之處必能得士衆心與李光弼齊名雖威略不逮而寛厚得人過之張獻甫為金吾將軍時李懐光未平殄吐蕃又侵擾西邊獻甫領禁軍出鎮咸陽凡累年軍人百姓恱之張伾建中初以澤潞將守洺州田恱攻之城守累月攻益急士死傷多而食少救兵未至伾知事不濟無以勸士乃悉召將卒命其女出拜之謂曰將士辛苦戰征惜家無尺寸物與公等為賞獨有此女幸未嫁人願出賣之為將士一日之費衆皆大哭曰今日為將軍出死命戰且守日夜不解㑹馬璲以太原之師至與衆軍合擊恱於城下大敗之伾乗勢出戰士一當百圍解以功累遷泗州刺史李晟為神䇿行營節度使討朱泚宿兵東渭橋時轉輸不至盛夏軍士或衣裘褐晟以同勞苦每以大義奮激士皆流涕感恱卒無離叛者任廸簡初為天德軍使李景略判官及景略卒衆以廸簡長者私議請為帥監軍使聞之拘廸簡于别室軍衆連呼而至發户簒取之及表聞徳宗使察焉具以軍情奏因除豐州刺史天德軍使自殿中侍御史授兼御史大夫劉澭為隴右經略使輕財愛士得人之死力烏重𦙍為河陽節度淮西吳元濟軍人李湍者過溵水來降其妻為賊束縳于樹臠肉食至死呌其夫而言曰善事烏僕射觀者義之重裔出自行間及為長帥赤心奉上能與下同甘苦所至周宻曲盡禮敬故當時名士咸願依焉長慶三年再鎮天平及病牙將王贄饋以股肉歿後數日有軍士二十餘人皆割股肉以祭之古之良將無以加也閻巨源為邠寕節度使無他智能然以寛厚為將卒所懐殷侑為滄景節度觀察使與士卒之下者同甘苦故滄人大恱上請立碑田布魏博節度使宏正之子為軍將討淮西宏正爱之慮有罪不能行法俾以他使代焉其士卒皆愛布乞留監軍使以聞詔復從之李光顔鎮邠寕吐蕃入宼光顔發邠師邠人皆曰人給五千而不識戰鬭彼何人也常額衣資不得而前蹈白刃此何人也憤聲洶洶不可止光顔素得士心為陳大義言發涕下衆皆感之久而發焉韓充宏之弟少居東郡以舅劉元佐得為河陽昭義牙門將及宏節度宣武召歸主親兵軍中奏官累至御史大夫宏虐用其衆人人皆不自保充獨謙下執禮未甞稍怠由是頗得衆意然以親逼權重常不自安元和六年因獵近郊單騎走至雒下時朝廷方姑息宏亦憐充無異志擢拜右金吾將軍長慶元年為清州節度是嵗汴州節度使李愿為帳下所逐賊黨領兵立都將李㝏為留後朝廷以充乆在汴州衆心恱附命充為宣武軍節度使兼統義成軍徃征之㑹李㝏疽發腦属兵於牙門將李質以計誅首亂者送㝏歸京師充遂不戰而入時陳許李光顔亦奉詔討㝏軍在尉氏意欲必先入汴因大肆浮掠汴州監軍使姚文夀亦欲招許下之師先入不以變告充時充在中牟聞之即時率衆直入汴人素懐充來皆踴躍相賀無復疑貳詔遂加司空充宣武軍節度使髙瑀為陳許節度使性寛和有體量為官雖無赫赫之名所至皆理尤能得士心論者以是推之敬播為易定節度使易定两州土地冣狹播在鎮甚得士卒心兵乗整齊常為幽鎮所忌梁時溥徐州人初為州之驍將唐中和初秦宗權據蔡州侵宼鄰藩節度使支詳命溥率師以討之徐軍屢㨗軍情歸溥詳以旄節授之牛存節唐天復元年授潞州馬歩都指揮使發令嚴整士庶安之及追赴行在士卒泣送者不絶于道王重師知平盧軍留後加檢校司徒其後北伐幽滄鎮定屢與晉軍接戰頗得士心故多勝㨗郭言廣明中從太祖赴汴初為騎軍繼有戰功後擢為禆校言性剛直有權略勤于戎事或以家財分給將士之貧者由是頗得士心楊師厚為魏博節度使性寛簡無威儀善撫士衆初為大祖部曲頗得士心累為刺史遷襄陵滑等州節度使有戰功冊府元龜卷四百十二
