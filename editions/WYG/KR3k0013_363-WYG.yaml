body:
  text: 册府元龜卷三百六十三宋王欽若等撰將帥部機畧第三晉衛瓘初仕魏為廷尉卿鄧艾鍾㑹之伐蜀也瓘以本官持節監艾㑹軍事行鎭西將軍蜀既平艾輙承制封拜詔使檻車徴之㑹遣瓘先收艾㑹以瓘兵少欲令艾殺瓘因加艾罪瓘知欲危已然不可得而距乃夜至成都檄艾所統諸將稱詔收艾其餘一無所問若來赴官軍爵賞如先敢有不出誅及三族比至鷄鳴悉來赴瓘惟艾帳内在焉平旦開門瓘乘使者車徑入至成都殿前艾臥未起父子俱被執艾諸將圖欲刼艾整仗趣瓘營瓘輕出迎之偽作表草將申明艾事諸軍信之而止俄而㑹至乃悉請諸將胡烈等因執之囚益州廨舍遂發兵反於是士卒思歸内外騷動人情憂懼㑹留瓘謀議乃書板云欲殺胡烈等舉以示瓘瓘不許因相疑貳瓘如厠見胡烈故給使使宣語三軍言㑹反㑹逼瓘定議經宿不眠各横刀膝上在外諸軍已潛欲攻㑹瓘既不出未敢先發㑹使瓘慰勞諸軍瓘心欲去且堅其意曰卿三軍主宜自行㑹曰卿監司且先行吾當後出瓘便下殿㑹悔遣之使呼瓘瓘辭眩疾動詐仆地比出閣數十信追之瓘至外廨服鹽湯大吐瓘素羸便似困篤㑹遣所親人及醫視之皆言不起㑹繇是無所憚及暮門閉瓘作檄宣告諸軍諸軍並已唱義陵旦共攻㑹㑹率左右距戰諸將擊敗之唯帳下數百人隨㑹繞殿而走盡殺之瓘於是部分諸將羣情肅然杜預為鎭南大將軍都督荆州諸軍啟請伐吳武帝許之預以太康元年正月陳兵於江陵遣叅軍樊顯尹林鄧圭襄陽太守周竒等率衆循江西上授以節度旬月之間累尅城邑皆如預䇿焉又遣牙門管定周旨伍巢等率竒兵八百潛舟夜度以襲樂鄉多張旗幟起火巴山出於要害之地以奪賊心吳都督孫歆震恐與伍延書曰北來諸軍乃飛渡江也吳之男女降者萬餘口旨巢等伏兵樂鄉城外歆遣軍出拒王濬大敗而還旨等發伏兵隨歆軍而入歆不覺直至帳下虜歆而還故軍中為之謠曰以計代戰一當萬於是進逼江陵時衆軍㑹議或曰百年之冦未可盡尅今向暑水潦方降疾疫將起宜俟來冬更為大舉預曰昔樂毅藉濟西一戰以并强齊今兵威已振譬如破竹數節之後皆迎刄而觧無復着手處也遂指授羣帥徑造秣陵所過城邑莫不束手議者以書謝之孫皓既平封當陽侯王濬為龍驤將軍太康元年正月率師發自成都率巴東監軍廣武將軍唐彬攻吳丹陽尅之擒其丹陽監盛紀吳人於江險磧要害之處並以鐵鎻横截之又作鐵錐長丈餘暗置江中以逆拒船先是羊祜獲吳間諜具知情狀濬乃作大筏數十亦方百餘歩縳草為人披甲持杖令善水者以筏先行筏遇鐵錐輙着筏去又作火炬長十餘丈大數十圍灌以麻油在船前遇鏁燃炬燒之須㬰融液㫁絶於是船無所礙李矩為冠軍將軍領河東平陽太守時劉聰遣從弟暢歩騎三萬討矩屯於韓王故壘相去七里遣使招矩時暢猝至矩未暇為僃遣使奉牛酒詐降於暢潛匿精勇見其老弱暢不以為虞大饗渠帥人皆醉飽矩謀夜襲之兵士以賊衆皆有懼色矩令郭誦禱鄭子産祠曰君昔相鄭惡鳥不鳴㐫胡臭羯何得過庭使巫揚言東里有教當遣神兵相助將士聞之皆踴躍争進乃使誦及督䕶楊璋等選勇敢千人夜掩暢營獲鎧馬甚多斬首數千級暢僅以身免周訪為振武將軍與諸軍共征湘中賊帥杜弢弢作桔橰打官軍船艦訪作長岐棖以距之桔橰不得為害後王敦表為豫章太守征討都督時梁州刺史張光卒愍帝以侍中第五猗為征南大將軍監荆梁益寜四州出自武闗賊率杜曽摯瞻胡混等並迎猗奉之取兵數萬破陶侃於石城攻平南將軍荀崧於宛不尅引兵向江陵王敦以從弟廙為荆州刺史令督䕶征虜將軍趙誘襄陽太守朱軌陵江將軍黄峻等討曽而大敗於女觀湖誘軌並遇害曽遂逐廙徑造沔口大為冦害威震江沔元帝命訪擊之訪有衆八千進至沌陽曽等鋭氣甚盛訪曰先人有奪人之心軍之善謀也使將軍李桓督左甄許朝督右甄訪自領中軍髙張旗幟曽果畏訪先攻左右甄曽勇冠三軍訪甚惡之自於陣後射雉以安衆心令其衆曰一甄敗鳴三皷兩甄敗鳴六皷自旦至申兩甄皆敗訪聞皷音選精鋭八百人自行酒飲之勑不得妄動聞皷音乃進賊未至三十歩訪親鳴皷將士皆騰躍奔赴曽遂大潰殺千餘人訪夜追之訪將請待明日訪曰曽驍勇能戰向之敗也彼勞我逸是以尅之宜及其衰乘之可滅皷行而進遂定漢沔曽等走固武當訪以功遷南中郎將督梁州諸軍梁州刺史屯襄陽訪謂其僚佐曰昔城濮之役晉文以得臣不死而有憂色今不斬曽禍難未已於是出其不意又擊破之曽遁走訪部將蘇温收曽詣軍并獲第五猗胡混摯瞻等送於王敦又白敦説猗逼於曽不宜殺敦不從而斬之祖逖為奮威將軍豫州刺史初北中郎將劉演拒於石勒也流人塢主張平樊雅等在譙演署平為豫州刺史雅為譙郡太守又有董瞻于武謝浮等十餘部衆各數百皆統屬平逖誘浮使取平浮譎平與㑹遂斬以獻逖是時􅅫陂塢主陳川以衆附石勒逖率衆伐川石季龍領兵五萬救川逖設竒以擊之季龍大敗收兵掠豫州徙陳川還襄國留桃豹等守川故城住西䑓逖遣將韓潛等鎭東䑓同一大城賊從南門出入放收逖軍開東門相守四月逖以布囊盛土如米狀使千餘人運上䑓又令數人擔米偽為疲極憇息於道賊果逐之皆棄擔而走賊既獲米謂逖士衆豐飽而胡戍饑乆益懼無復膽氣石勒將劉夜堂以驢千頭運糧以饋桃豹逖遣韓潛馮鐵等追擊於汴水盡獲之桃豹宵遁蔡謨為征北將軍領徐州刺史石季龍於青州造船數百掠緣海諸縣所在殺戮朝廷以為憂謨遣龍驤將軍徐𤣥等守中州并設募若得賊大白船者賞布千疋小船百疋是時謨所統七千餘人所戍東至土山西至江乘鎭守八所城壘凢十一處􅇏火樓望三十餘處隨宜防僃甚有算畧謝尚為安西將軍禦後趙於夀春初尚之行也使建武將軍濮陽太守戴施據枋頭㑹冉閔之子智興與其大將軍蔣幹來附復遣行人劉猗詣尚請救施止猗求傳國璽猗歸以告幹幹謂尚已敗慮不能救已猶豫不許施遣叅軍何融率壯士百人入鄴登三䑓助戍譎之曰今且可出璽付我㐫冦在外道路梗澁亦未敢送璽當遣单使馳白天子聞璽已在吾許知卿等至誠必遣重軍相救并厚相餉幹乃出璽付融融齎璽馳還枋頭尚遣振武將軍胡彬率騎三百迎璽致諸京師温嶠為中壘將軍時王敦反王含錢鳯奄至都下嶠燒朱雀桁以挫其鋒明帝怒之嶠曰今宿衛寡弱徴兵未至若賊豕突危及社稷陛下何惜一橋賊果不得渡袁喬為江夏相桓温伐蜀以喬領二千人為軍鋒師次彭模去賊已近議欲兩道並進以分賊勢喬曰今深入萬里置之死地士無反顧之心所謂人自為戰者也今分為兩軍軍力不一萬一偏敗則大事去矣不如全軍而進棄去釡甑齎三日糧勝可必矣温以為然即一時俱進前凉謝艾為軍師將軍率歩騎三萬進軍臨河後趙石季龍將麻秋以三萬衆距之艾乘軺車冠白幍鳴皷而行秋望而怒曰艾年少書生冠服如此輕我也命黒矟龍驤三千人馳擊之艾左右大擾左戰帥李偉勸艾乘馬艾不從乃下車踞胡牀指麾處分賊以為伏兵發也懼不敢進張瑁從左南緣河而截其後秋軍乃退艾乘勝奔擊遂大敗之斬秋將杜勲及魚俘斬一萬三千級秋匹馬奔大夏又云艾為中堅將軍配歩騎五千擊秋引師出振武夜有二梟鳴牙中艾曰梟邀也六博得梟者勝今梟鳴牙中尅敵之兆於是進戰大破之斬首五千級前趙游子逺為劉曜將巴氐叛子逺討之盡破氐衆先是上郡氐羌十餘萬落保嶮不降酋大虛除權渠自號秦王子逺進師至其壁下權渠率衆來距五戰敗之權渠恐將降其子伊餘大言於衆曰徃劉曜自來猶無若我何况此偏師而欲降之率勁卒五萬晨壓壘門左右勸戰子逺曰吾聞伊餘之勇當今無敵士馬之强復非其匹又其父新敗怒氣甚盛且西戎剽勁鋒鋭不可擬也不如緩之使氣竭而擊之乃堅壁不戰伊餘有驕色子逺候其無僃夜誓衆蓐食晨大風霧子逺曰天贊我也躬先士卒掃壁而出遲明覆之生擒伊餘悉俘其衆權渠大懼被髪割面而降子逺啓曜以權渠為征西將軍西戎公分徙伊餘兄弟及其部落二十餘萬口於長安西戎之中權渠部最强皆禀其命而為冦暴權渠既降莫不歸附曜大悅宋王鎭惡晉末為安逺䕶軍討蠻帥向博底根據阬頭屢為㐫暴鎭惡討平之初行告荆州刺史司馬休之求遣軍以為聲援休之遣其將朱襄領衆助鎭惡㑹髙祖西討休之鎭惡乃告諸將曰百姓皆知官軍已上朱襄等復是一賊表裏受敵吾事敗矣乃率軍夜下江水迅急倐忽行數百里直據都尉治既至乃以竹籠盛石堙塞水道襄軍下夾岸擊之斬襄首殺千餘人後隨髙祖北征大軍次潼闗謀進取之計鎭惡請率水軍從河入渭偽鎭北將軍姚强屯兵涇上鎭惡遣毛德祖擊破之直至渭橋鎭惡所乘皆蒙衝小艦行船者悉在艦内羌見艦沂渭而進外不見有乘行船人北士素無舟檝莫不驚惋咸謂為神鎭惡既至令將士食畢便棄船登岸渭水流急倐忽間諸艦悉逐流去時姚泓屯軍長安城下猶數萬人鎭惡撫慰士卒曰卿諸人並家在江南此是長安城東門外去家萬里而舫乘衣糧並已逐流去豈復有求生之計耶唯宜死戰可以立大功不然則無遺類矣乃身先士卒衆亦知無復退路無不騰踊争先泓衆一時奔潰即䧟長安城泓身逃走明日率妻子歸降城内夷晉六萬餘戸鎭惡宣揚國恩撫慰初附號令嚴肅百姓安堵朱齡石晉末為持節益州諸軍事義熈十年率衆征蜀既至彭模諸將以賊水北城險阻衆多咸欲先攻其南城齡石曰不然雖冦在北今屠南城不足以破北若盡鋭以㧞北壘南城不麾而自散也七月齡石率劉鍾蒯恩等攻城詰朝戰至日昃焚其樓櫓四面並登斬侯輝譙詵仍囬軍以麾南城即時散潰凢斬大將十五級諸營守以次土崩衆軍乃舍船歩進龍驤將軍臧熹至廣漢病卒齡石至廣漢復破譙道福别軍乘船䧟牛脾城斬其大將譙撫譙縱聞諸處盡敗奔於涪城巴西人王志斬送偽尚書令馬躭封府庫以待王師道福聞彭模不守率精鋭五千兼行來赴聞縱已走道福衆亦散乃逃於獠中巴西民杜瑶縳送之斬於軍門桓謙弟恬隨謙入蜀為寧蜀太守至是亦斬焉臨川王道規晉末為荆州刺史盧循冦逼京邑道規遣司馬王鎭之及揚武將軍檀道濟廣武將軍到彥之等赴援朝廷至尋陽為賊黨荀林所破循即以林為南蠻檢校尉分兵配之使乘勝伐江陵揚聲云徐道覆已克京邑而桓謙自長安入蜀譙縱以謙為荆州刺史厚加資給與其大將譙道福俱冦江陵正與林㑹林屯江津謙軍枝江二冦交逼分絶都邑之間魯宗之率衆數千自襄陽來赴衆議欲使檀道濟到彥之與宗之共擊道規曰盧循擁隔中流扇張同異桓謙荀林更相首尾人懷危懼莫有固心成敗之機在此一舉非吾自行其事不决乃使宗之居守委以腹心率諸軍攻謙諸將佐皆固諌曰今逺出討謙其勝難必荀林近在江津伺人動静若來攻城宗之未必能固脱有差跌大事去矣道規曰諸君不識兵機耳荀林愚竪無他竒計以吾去未逺必不敢向城吾今取謙徃至便克沉疑之間已自還反謙敗則林破膽豈暇得來且宗之獨守何為不支數日觧南蠻校尉印以授諮議叅軍劉遵馳徃攻謙水陸齊進謙大軍遂敗单舸走欲下就林追斬之還至浦口林又奔散劉遵率軍追林至巴陵斬之初謙至枝江江陵士庻皆與謙書言城内虚實道規悉焚燒不視衆乃大安進號征西將軍先是桓歆子道兒逃於江西出擊義陽郡與盧循連結循使蔡猛助之道規遣叅軍劉基破道兒於大薄臨陣斬猛徐道覆率衆三萬􅍕至破家魯宗之已還襄陽遣召不及人情大震或傳循已平京師遣道覆上為刺史江漢士庻感焚書之恩無復二志道規使劉遵為遊軍自拒道覆於豫章口前驅失利道規壯氣愈厲激揚三軍遵自外横擊大破之斬首萬餘級赴水死者殆盡道覆單舸走還湓口初使遵為遊軍衆咸云今强敵在前唯患衆少不應割削見力置無用之地及破道覆果得遊軍之力衆乃服焉何無忌晉末為輔國將軍瑯琊内史南追桓𤣥與振武將軍劉道規俱受冠軍劉毅節度𤣥留其龍驤將軍何澹之前將軍郭銓江州刺史郭昶之守湓口無忌等次桑落洲澹之等率軍來戰澹之嘗所乘舫旌旗甚盛無忌曰賊帥必不居此欲詐我爾宜亟攻之衆咸曰澹之不在其中其徒得之無益無忌謂道規曰今衆寡不敵戰無全勝澹之雖不居此舫取則易獲因縱兵勝之可以一皷而敗也道規從之遂獲賊舫因傳呼曰已得何澹之矣賊中驚擾無忌之衆亦謂為然道規乘勝徑進無忌又皷譟赴之澹之遂潰江道晉末為殷浩諮議叅軍時羌及丁零叛浩軍震懼姚襄去浩十里結營以逼浩浩令逌擊之逌進兵至襄營謂將校曰今兵非不精而衆少於羌且其塹栅甚固難與較力吾當以計破之乃取數百雞以長繩連之繫火於足羣雞駭散飛集襄營火發因其亂隨而擊之襄遂大敗檀祗髙祖時為征虜將軍青州刺史廣陵相亡命司馬國璠兄弟自北徐州界聚衆數百潛得過淮因天夜隂闇率百許人緣廣陵城得入呌喚直上㕔事祗驚起出門將處分賊射之傷敗乃入祗語左右賊乘闇得入欲掩我不僃但打五更懼曉必走矣賊聞皷鳴謂為曉於是奔散追討殺百餘人宗慤為震武將軍文帝時隨交州刺史檀和之討賊破圍區粟城入象浦林邑王范陽邁傾國來拒以具裝被象前後無際士卒不能當慤曰吾聞獅子威服百獸乃製其形與象相禦象果驚奔衆因潰散遂克林邑收其異寳雜物不可勝計沈靈寵為建威將軍時豫州刺史殷琰與晉安王子勛反晉熈太守閻湛之據郡同逆詔靈寵自廬江攻之湛之未知潯陽已敗固守不降靈寵乃取諸將破劉順文書置車中攻城偽敗棄車而走湛之得書大駭其夜奔逃垣䕶之為輔國將軍南郡王義宣反率大衆至梁山與王𤣥謨相持栁元景率䕶之及䕶之弟詢之柳叔仁鄭琨等諸軍出鎭新亭𤣥謨見賊强盛遣司馬管法濟求救甚急帝遣元景等進據南州䕶之水軍先發賊遣將龎法起率衆襲姑孰適值䕶之鄭琨等至奮擊大破之斬獲及投水死畧盡𤣥謨馳信告桞元景曰西城不守唯東城衆寡相懸請退還姑孰更議進取元景不許將悉衆赴救䕶之勸分軍援之元景然其計乃以精兵配䕶之赴梁山及戰䕶之見賊舟艦累沓謂𤣥謨曰今當以火平之即使隊主張談等燒賊艦風猛水急賊軍以此奔敗梁山平䕶之率軍追討㑹朱修之已平江陵至潯陽而還遷督徐兖二州豫州之梁郡諸軍事寜朔將軍徐州刺史封益陽縣侯食邑千户後為建武將軍領濟北太守率二千人隨張永攻碻磝先據委粟津魏杜道生與其尚書伏連來援碻磝䕶之拒之賊因引軍東去蕭思話遣䕶之迎軍至梁山魏尚書韓元興率精騎卒至䕶之依險拒戰斬其都運長史甲首數千魏軍乃退思話將引還誑䕶之云沈慶之救軍埀至可急於濟口立橋䕶之揣知其意即分遣白於思話復令渡河戍乞活堡以防追軍桞元景為廣威將軍隋郡太守既至而蠻斷驛道欲來攻郡郡内少糧器仗又乏元景設方畧得六七百人分五百人屯驛道或曰蠻將逼城不宜分衆元景曰蠻聞郡遣重戍豈悟城内兵少且表裏合勢於計為長㑹蠻垂至乃使驛道為僃潛出其後戒曰火舉馳進前後俱發蠻衆驚擾投鄖水死者千餘人斬獲數百郡境肅然無復冦抄吕安國為寧朔將軍時晉安王子勛反以殿中將軍劉順為司馬以前右軍將軍杜叔寳為長史太宗遣安國與輔國將軍劉勔西討鎭歴陽為諸軍總督叔寳本謂䑓軍停在歴陽不辦進順等至無不瓦解唯齎一月口糧既與勔相持軍食盡報叔寳送食叔寳乃遣車千五百乘載米餉順自以五千精兵防送之安國謂勔曰劉順精甲八千而我衆不能居半相持既乆强弱勢殊茍復催遷則無以自立所頼在彼糧將竭我食有餘爾若使叔寳米至非唯難可復圖我亦不能持乆今唯有間道襲其米車出彼不意若能制之將不戰走矣勔以為然乃以疲弱守營簡選千百精手配安國及軍主黄回等間路出順後於横塘抄之安國始行計叔寳尋至止齎二日熟食食盡叔寳不至將士並欲還安國曰卿等且已一食今晩米車不容不至若其不至夜去不晚叔寳果至以米車為函箱陣叔寳於外為遊軍幢主楊仲懷領五百人居前與安國回等相㑹仲懐部曲並欲退就叔寳并力擊安國仲懐曰賊至不擊復欲何待且統兵在後正相去二里間比吾交手何憂不至即與回戰所領並淮南楚子天下精兵衆力既倍合戰便破之於陣殺仲懷仲懐所領五百人死盡叔寳至而仲懷及士卒伏尸蔽野回等欲乘勝擊之安國曰彼將自走不假復擊退軍三十里止宿夜遣騎叅候叔寳果棄米車奔走安國即復夜徃燒米車驅牛二千餘頭而還劉順聞米車見燒叔寳又走五月一日夜衆潰奔還夀陽沈攸之為寧朔將軍與南賊對軍賊帥袁顗復率大衆來入鵲尾相持既乆軍主張興世越鵲尾上據錢溪劉胡自攻之攸之率諸將攻濃湖遣人傳唱錢溪已平衆並懼攸之曰不然若錢溪實敗萬人中應有逃亡得還者必彼戰失利唱虛聲以惑衆爾勑軍中不得妄動錢溪信尋至果大破賊攸之悉以錢溪所送胡軍耳鼻示之顗駭懼急追胡還攸之諸軍悉力進攻多所斬獲日暮引歸鵲尾食盡遣千人徃南陵迎米為䑓軍所破燒其資實胡於是棄衆奔顗亦叛走沈慶之為建威將軍伐沔北諸山蠻命諸軍各穿池於營内朝夕不外汲兼以防蠻之火頃風甚蠻夜下山人提一炬以燒營營内多幔屋及草菴火至輙以池水灌滅諸軍多出弓弩夾射之蠻散走張興世為龍驤將軍明帝即位四方反叛興世領水軍拒南賊於赭圻相持乆不决興世建議曰賊據上流兵彊地勝今以竒兵潛出其上使其首尾周遑進退疑沮糧運自艱制勝之竒莫過於此沈攸之吳喜並善其計分戰士七千配之興世乃令輕舸沂流而上旋復回還一二日中輙復如此使賊不為之僃劉胡聞興世欲上笑曰我尚不敢越彼下取揚州興世何人欲據我上興世謂攸之等曰上流唯有錢溪可據乃徃據之及劉胡來攻將士欲迎擊之興世禁曰賊來尚逺而氣盛矢驟驟既力盡盛亦昜衰此曹劌所以破齊也今將士不得妄動治城如故俄而賊來轉近興世乃命夀寂之任農夫率壯士數百擊走之袁顗愠曰賊據人肝臟裏云何得活是月赭圻軍士伐木為柵於青山遇一童子曰賊下旬當平無為自苦忽不見至是果敗興世又遏其糧道賊衆漸饑劉胡棄軍走袁顗仍亦奔散張興世遂與吳喜共平江陵南齊劉懐珍仕宋為輔國將軍明帝勅懐珍權鎭山陽先是青州刺史明僧暠遣將於王城築壘以逼沈文秀塹壁未立為文秀所破仍進攻僧暠帝使懐珍率龍驤將軍王廣之五百騎馬歩卒二千人沿海救援至東海而僧暠已退保東萊懷珍進據朐城衆心忷懼或欲且保郁州懐珍謂衆曰卿等傳文秀厚賂胡帥規為外援察其徒黨何能必就左袵齊士庻民見於名義積葉聲介一馳東萊可飛書而下何容阻軍緩邁止於此耶遂進至黔陬偽髙宻平昌二郡太守潰走懷珍逹朝廷意送致文柄文秀終不從命焚燒郭邑百姓聞懷珍至皆喜偽長廣太守劉桃根領數千人戍不其城懷珍引軍次洋水衆皆曰文秀今游騎滿境内宜堅壁伺隙懐珍曰今衆少糧单我懸彼固正宜簡精鋭掩其不僃爾遣王廣之將百騎襲䧟其城刼留髙麗獻使懐珍又遣寧朔將軍明慶符與廣之擊降延僧遣髙麗使詣京師文秀聞諸城皆敗乃遣使張靈碩請降懷珍乃還歸張敬兒宋末為寧朔將軍越騎校尉桂陽事起𨽻齊太祖頓新亭賊矢石既交休範白服乘轝徃勞樓下城中望見其左右人兵不多敬兒與黄回白太祖曰桂陽所在僃防寡闕若詐降而取之此必可擒也太祖曰卿若能辦事當以本州相賞敬兒相與出城南放仗走大呼稱降休範喜召至轝側回佯致太祖宻意休範信之回目敬兒敬兒奪取休範防身刀斬休範首休範左右數百人皆散敬兒馳馬持首歸新亭除驍騎將軍加輔國將軍宋末周山圖為左中郎將時沈攸之事起世祖在湓城使城局叅軍劉皆陳淵委山圖以處分事山圖斷取行旅船板以造樓櫓立水柵旬日皆辦世祖甚嘉之垣崇祖宋末為朐山戍主朐山邉海孤險人皆未安崇祖嘗浮舟舸於水側有急得以入海軍將得罪亡叛具以告魏魏圂城都將東徐州刺史成固公始得青州聞叛者説遣歩騎二萬襲崇祖屯洛要去胊山城二十里垣崇祖出送客未歸城中驚恐皆下船欲去崇祖還謂心腹曰賊此擬來本非大舉政是承信一説易遣誑之今若得百餘人還事必濟矣但人情一駭不可歛集卿等可急去此二里外大呌而來唱艾塘義人已得破虜湏戍軍速徃相助逐退船中人果喜争赴岸崇祖引入據城遣羸弱入島令人持兩炬火登山鼓呌魏叅騎謂其軍僃甚盛乃退後為豫州刺史建元初魏梁王郁豆眷及劉昶馬歩三十萬冦夀春崇祖召文武議曰賊衆我寡當用竒計以制之當修外城以待敵城既廣闊非水不固今欲堰淝水却淹為三面之險諸君意何如衆曰昔佛狸侵境宋南平王士卒完盛以郭大難守退保内城今日之事十倍於前古來相承不築淝堰皆以地形不便積水無用故也若必行之恐非事宜崇祖曰卿見其一不識其二若捨外城賊必據之外修樓櫓内築長圍四周無礙表裏受敵此坐自為擒守郭築堰是吾上謀也乃於城西北立堰塞淝水堰北起小城周為深塹使數千人守之崇祖謂長史封延伯曰虜貪而少慮必悉力攻小城圖破此堰見塹狹城小謂一徃可尅當以蟻附攻之放水一激急踰三峽事窮奔透自然沉溺此豈非小勞而大利耶虜衆繇西道集堰内分軍東路内薄攻小城崇祖著白紗㡌肩轝上城手自轉式至日晡時决小史埭水勢奔下虜攻城之衆漂墜塹中人馬溺死數千人衆皆退走王元邈為梁秦二州刺史建元初亡命李烏奴作亂梁部䧟白馬戍元邈率東從七八百人討之不克慮不自保仍使人偽降烏奴告之曰王使君兵衆羸弱棄伎妾於城内攜愛妾二人去已數日矣烏奴喜輕兵襲州城元邈設伏擊破之烏奴挺身走太祖聞之曰元邈果不負吾意遇也還為征虜將軍長沙王後軍司馬東南海太守裴叔業為持節督徐州諸軍魏主冦沔北帝令叔業援雍州叔業啓曰北人不樂逺行唯樂侵掠伐虜界則雍州之賊自然分張無勞動民向逺也從之梁劉坦齊末為長沙太守行湘州事時東昬遣安城太守劉希祖破西䑓所選太守范僧簡於平都希祖移檄湘部於是始興内史王僧粲應之自是湘部諸郡悉皆蜂起唯臨湘湘隂瀏陽羅四縣猶全州人咸欲汎舟逃走坦悉聚船焚之遣將尹法畧距僧粲相持未决前湘州鎮軍鍾元紹潛謀應僧粲要結士庻數百人皆連名定計刻日攻州城坦聞其謀偽為不知因理訟至夜而城門遂不閉以疑之元紹未及發明旦詣坦問其故坦乆留與語宻遣親兵收其家書元紹在坐未起而收兵已報具得其文書本末元紹即首伏於坐斬之焚其文書其餘黨悉無所問衆愧且服州部遂安法畧與僧粲相持累月建康城平公則還州羣賊始散韋叡為輔國將軍天監四年督衆軍伐魏叡城未能㧞叡廵行圍柵魏城中忽出數百人陳於門外叡欲擊之諸將皆曰向本輕來未有戰僃徐還授甲乃可進爾叡曰不然魏城中二千餘人閉門堅守足以自保無故出人於外必其驍勇者也若能挫之其城自㧞衆猶遲疑叡指其節曰朝廷授此非以為飾韋叡之法不可犯也乃進兵士皆殊死戰魏軍果敗走因急攻之中宿而城㧞五年魏中山王元英先於邵陽洲兩岸為兩橋樹栅數百歩跨淮通道叡裝大艦使梁郡太守馮道根廬江太守裴􅃉秦郡太守李文釗等為水軍值淮水暴長叡即遣之鬬艦競發皆臨壘以小艦載草灌之以膏從而焚其橋風怒火盛煙塵晦㝠敢死之士㧞柵斫橋水又漂疾倐忽之間橋栅俱壊而道根等皆身自摶戰軍人奮勇一呼聲動天地無不一當百魏人大潰元英見橋絶脱身遁去陳慶之為東宫直閣大通元年𨽻領軍曹仲宗伐渦陽魏遣征南將軍恒山王元昭等率馬歩十三萬來援前軍至駞澗去渦陽四十里慶之欲逆戰明威將軍韋放以賊之前鋒必是輕鋭與戰若㨗不足為功如其不利沮我軍勢兵法所謂以逸待勞不如勿擊慶之曰魏人逺來皆已疲倦去我既逺必不見疑及其來集須挫其氣出其不意必無不敗之理且聞虜所據營林木甚盛必不夜出諸君若皆疑惑慶之請獨取之於是與麾下二百騎奔撃破其前軍魏人震恐庾域為華陽太守時魏軍初圍南鄭州有空倉數十所域封題指示將士云此中粟皆滿足支二年但努力堅守衆心以安虜退以功拜羽林監陳韋載初仕梁為信武將軍羲興太守降髙祖髙祖引置左右與之謀議徐嗣徽任約等引齊軍濟江據石頭城髙祖問計於載載曰齊軍若分兵先據三吳之路畧地東境則時事去矣今可急於淮南即侯景故壘築城以通東道轉輸别命輕兵絶其糧運使進無所虜退無所資則齊將之首旬日可致髙祖從其計侯安都梁末為南徐州刺史髙祖東討杜龕安都留䑓居守徐嗣徽任約等引齊冦入據石頭城游騎至於闕下安都閉門偃旗幟示之以弱令城中曰登陴㸔賊者斬及夕賊收軍還石頭安都夜令士卒宻營禦敵之具將旦賊騎又至安都率甲士一千三百人開東西掖門與戰大敗之賊乃退還石頭不敢逼䑓城侯瑱為都督西討諸軍事瑱於梁山與王林相持百餘日未决天嘉元年二月東闗春水稍長舟艦得通王琳亦引合肥巢湖之衆舳艫相次而下其勢甚盛瑱率軍進戰檻州琳亦出船列於江西隔州而泊明日合戰琳軍少却退保西岸及夕東北風大起吹其舟艦並壊没於沙中溺死者有數十百人浪大不得還浦夜中又有流星墜於賊營及旦風静琳入浦治船以荻船塞於浦口又以鹿角繞岸不敢復出是時西魏遣大將軍史寧躡其上流瑱聞之知琳不能持乆收軍却據湖浦以待其敝及史寧至圍郢州琳恐衆潰乃率船艦東下去蕪湖十里而泊擊柝聞於軍中明日齊人遣兵數萬來助琳琳引衆向梁山欲越官軍以屯險要齊儀同劉伯球率兵萬餘人助琳水戰行䑓慕容恃猶子子㑹領鐵騎二千在蕪湖洲西岸博望山南為其聲勢瑱令軍中晨炊蓐食分搥盪頓蕪湖洲尾以待之將戰有㣲風至自東南衆軍施拍縱火定州刺史章昭逹乘平虜大艦中江而進發拍中於賊艦其餘冐突青龍各相當瑱又以牛皮冐蒙衝小船以觸賊艦并鎔鐵灑之琳軍大敗其歩軍在西岸者自相蹂踐馬騎並淖於蘆荻中棄馬脱走以免者十二三盡獲其舟艦器械并擒齊將劉伯球慕容子㑹其餘俘馘以萬計琳與其黨潘純等乘单舴艋冐陣走至湓城猶欲收合離散衆無附者乃與妻妾左右十餘人入齊陸子隆為明威將軍廬陵太守時周迪據臨川反東昌縣人修行師應之率兵以攻子隆其鋒甚盛子隆設伏於外仍閉門􅅯甲示之以弱及行師至腹背擊之行師大敗因乞降子隆許之送於京師周文育為平西將軍時廣州刺史蕭勃舉兵踰嶺詔文育督衆軍討之㑹新吳洞主余孝頃舉兵應勃遣其弟孝勵守郡城自出豫章據於石頭勃使其子孜將兵與孝頃相㑹又遣其别將歐陽頠頓軍苦竹灘傅泰據塶口城以拒官軍官軍船少孝頃有舴艋三百艘艦百餘乘在上牢文育遣軍主焦僧度羊東潛軍襲之悉取而歸仍於豫章立柵時官軍食盡並欲退還文育不許乃使人間行遺周廸書約為兄弟并陳利害迪得書甚喜許饋糧餉於是文育分遣老小乘故船舫沿流俱下燒豫章郡所立栅偽退孝頃望之大喜因不設僃文育繇間道兼行信宿逹羊韶羊韶上流則歐陽頠蕭勃下流則傅㤗余孝頃文育據其中間築城饗士賊徒大駭歐陽頠乃退入泥溪作城自守文育遣嚴威將軍周鐵武與長史陸山才襲頠擒之於是盛陳兵甲與頠乘舟而醼以巡傅㤗城下因而攻㤗尅之蕭勃在南康聞之衆皆股慄莫能自固其將譚世逺斬勃欲降為人所害世逺軍主夏侯明徹持勃首以降蕭孜余孝頃猶據石頭髙祖遣侯安都助文育攻之孜降文育孝頃退走新吳廣州平文育還頓豫章以功授鎮南將軍開府儀同三司都督江廣衡交等諸軍事周文昭為都督安蘄江衡司安等州刺史北齊遣尚書左丞陸騫以衆二萬入自巴蘄與文昭相遇文昭留羸弱輜車設疑兵以當之身率精鋭繇間道邀其後大敗騫軍虜獲器械驢馬不可勝數進攻巴州尅之於是江北諸城及榖陽士民並誅渠帥以城降章昭逹為車騎大將軍帥師征蕭巋於江陵時蕭巋與周軍大蓄舟艦於青泥中昭逹分遣偏將錢道戢程文季等乘輕舟襲之焚其舟艦周兵又於峽下南岸築壘名曰安蜀城於江上横引大索編葦為橋以度軍糧昭逹乃命軍士為長㦸施於樓船之上仰割其索索斷糧絶因縱兵以攻其城降之蕭摩訶為武毅將軍譙州刺史及周武帝㓕齊遣其將宇文忻率衆争吕梁戰於龍晦時忻有精騎數千摩訶領十二騎深入周軍縱横奮擊斬馘甚衆及周遣大將軍王軌來赴結長圍連鏁於吕梁下流斷大軍還路摩訶謂明徹曰聞王軌始鎻下流其兩頭築城今尚未立公若見遣擊之彼必不敢相拒水路未斷賊勢不堅彼城若立則吾屬且為虜矣明徹乃奮髯曰搴旗䧟陣將軍事也長算逺畧老夫事也摩訶失色而退一旬之間周兵益至摩訶又請於明徹曰今求戰不得進退無路若潛軍突圍未足為恥願公率歩卒乘馬轝徐行摩訶領鐵騎數千驅馳前後必當使公安逹京邑明徹曰弟之此計乃良圖也然老夫受脤專征不能戰勝攻取今被圍逼慙寘無地且歩軍既多吾為總督必須身居其後相率兼行弟馬軍宜須在前不可遲緩摩訶因率馬軍夜發先是周軍長圍既合又於要路下伏數重摩訶選精騎八千率先衝突自後衆騎繼焉比旦逹淮南髙宗詔徴還授右衛將軍岳陽王叔愼為湘州刺史時隋兵南伐叔愼偽遣人奉降書於隋將龎暉暉信之克期而入叔愼伏甲待之暉又令數百人屯於城門自將左右數十人入於㕔事俄而伏兵發縳暉以徇盡擒其黨皆斬之册府元龜卷三百六十三
