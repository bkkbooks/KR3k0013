body:
  text: 冊府元龜卷三百四十宋王欽若等撰將帥部摠序唐堯之時棄為后稷兼掌司馬司馬所以掌武事也暨舜之世有苖弗率命禹徂征又夏啓與有扈大戰於甘乃召六卿蓋天子六軍其將皆命卿焉至仲康命𦙍侯掌王六卿為大司馬以羲和湎淫廢時亂日𦙍徃征即其事也周官大司馬卿一人又有小司馬中大夫二人各率其屬以掌軍政凡制軍萬有二千五百人為軍王六軍大國三軍次國二軍小國一軍軍將皆命卿二千五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫百人為卒卒長皆上士二十五人為兩兩司馬皆中士五人為伍伍皆有長一軍則二府六史胥十人徒百人及晉獻公作二軍公將上軍將軍本名起於此也周末有前後左右將軍秦因之位上卿復有䕶軍都尉之名漢興大將軍驃騎將軍佐次丞相車騎將軍衛將軍左右前後將軍位次上卿掌京師兵衛四夷屯警至武帝初置城門校尉掌京師城門屯兵有司馬十二城門候中壘校尉掌北軍營壘内外掌西域屯騎校尉掌騎士歩兵校尉掌上林苑門屯兵越騎校尉掌越騎長水校尉掌長水宣曲胡騎又有胡騎校尉掌池陽胡騎不常置射聲校尉掌待詔射聲士虎賁校尉掌輕車凡八校尉皆武帝初置有丞司馬及征閩越東甌又有伏波樓船及伐朝鮮大宛復置横海度遼貳師宣帝又增蒲類破羗其餘雜號非一蓋權時之制因事立名亦不常設也又置騎都尉䕶西域三十六國有副校尉丞一人司馬候千人各二人元帝又置戊巳校尉丞司馬各一人􅇋五人成帝綏和元年以大司馬驃騎大將軍為大司馬罷將軍官光武中興諸將軍皆稱大夫及天下已定武官悉省比公者四第一大將軍次驃騎將軍次車騎將軍次衛將軍明帝又有前後左右將軍長史司馬皆一人司馬主兵如太尉從事中郎二人本注曰職參謀議東觀書曰大將軍出征置中䕶軍一人令史及掾屬三十一人又賜官騎三十人及鼓吹其雜號將軍衆多皆主征伐事訖皆罷其領軍皆有部曲大將軍營伍部部校尉一人軍司馬一人部下有曲曲有軍􅇋曲下有屯屯長一人其不置校尉部但軍司馬一人又有軍假司馬假􅇋皆為副貳其别營領屬為别部司馬其兵多少各隨時宜門有門􅇋其餘將軍置以征伐無員職亦有部曲司馬軍􅇋以領兵其職吏部集各一人摠知營事兵曹掾史主兵事其後復有四征四鎮之號魏武為相漢建安四年丞相府自置中領軍將軍又遣大將軍督軍二十一年征孫權還夏侯惇督二十六軍是也又置都䕶中尉䕶軍將軍文帝受漢禪有太尉而大司馬大將軍各自為官位在三司上又置領軍將軍主五校中壘武衛等三營又置都督諸州軍事或領刺史又上軍大將軍曹真都督中外諸軍事假黄鉞則摠統内外諸軍矣又有四安四平之號明帝遣晉宣王征蜀加號大都督晉文亦為之魯豢曰魏世驃騎為都督督儀與四征同若不為都督雖持節屬四征者與前後左右雜號將軍同其或散還從文官之例位三司蜀有軍師呉有督軍中郎將其餘雜號大抵同於漢魏也晉武帝受魏禪以都督諸軍為上監諸軍次之督諸軍為下使持節為上持節次之假節為下使持節得殺二千石以下持節殺無官位人若軍事得與使持節同假節唯軍事得殺犯軍令者江左以來都督中外尤重唯王導等權重者乃居之又以領䕶左右衛驍騎㳺擊為六軍文帝初置中衛武帝分為左右衛竝置長史司馬功曹主簿江左罷長史左右前後將軍為四軍屯騎歩兵射聲越騎長水等校尉號五校二衛始制前驅繇基強弩為三部司馬各置督史左衛熊渠武賁右衛佽飛武賁二衛各五部督其命中武賁驍騎游擊各領之又置武賁羽林上騎異力四部幷命中為五督其衛鎮四軍如五校各置千人更制殿中將軍中郎校尉司馬比驍騎持椎斧武賁分屬二衛尉中武賁持鈒冗從羽林司馬常從人數各有差武帝甚重兵官故軍校多選朝廷清重之士居之又置中軍將軍以統宿衛七軍五王作難東海王越以須行事皆繇殿省乃奏宿衛有侯爵者皆罷之時殿中武官竝封侯由是出者略盡乃以東海官領左右衛復有四安四平四中郎將征虜等號初武帝省領軍將軍使中軍將軍羊祜統二衛前後左右驍騎七軍營兵即領軍之任也懐帝永嘉中改中軍曰中領軍元帝永昌元年改曰北軍中候尋復為領軍成帝世復為中候尋復為領軍䕶軍將軍江左以來領軍不復别領營摠統二衛驍騎材官諸軍猶别有營也資重者為領軍䕶軍將軍資輕者為中領軍中䕶軍屬官有長史司馬功曹主簿五官受命出軍則置參軍左右衛將軍宋受命人臣無都督之號江夏王義恭假黄鉞則專戮節將非人臣常噐矣其四征四鎮四安四平左右前後征虜等將軍及四中郎將唯處諸王素所無為者自左右前後將軍以下及四十號謂漢宣威明威之類唯四中郎各將一人餘皆無定員自車騎以下為刺史又都督及儀同三司置官如領兵但云都督不儀同三司者不置從事中郎置功曹一人主吏在主簿上功曹參軍一人主佐記室下户曹上監以下不置諮議記室餘則同矣太宗以來皇子皇弟雖非都督亦置記室參軍小號將軍為大郡邊守置佐吏者又置長史餘則同也南齊有驃騎車騎衛鎮軍中軍撫軍四征四鎮將軍凡加大字位從公開府儀同如公又有四安四平左右前後征虜將軍四中郎將亦因宋制唯處諸王素族無為者又有冠軍輔國寧朔寧逺龍驤將軍凡諸小號亦有置府者又有領軍將軍中領軍䕶軍將軍中護軍凡為中小者同一官也諸為將軍官皆敬領䕶諸王為將軍道相逢則領䕶讓道焉自晉世以來領軍䕶軍及左右二衛驍騎㳺擊將軍為六軍又有前後左右將軍號四軍又有屯騎歩兵射聲越騎長水號五校又有虎賁中郎將冗從僕射羽林監積射強弩殿中員外殿中將軍殿中司馬督武衛將軍武騎常侍自二衛四軍五校以下竝謂之西省而散騎為東省復荆州置䕶南蠻校尉巴州置䕶三巴校尉雍州置寧蠻校尉益州置平蠻校尉寧州置鎮蠻校尉廣州置平越中郎將又有䕶西戎校尉䕶羗校尉鎮蠻䕶軍安逺䕶軍皆置官屬有差梁武以將軍之名高卑舛雜命更加釐定於是有司奏至一百二十五號將軍以鎮衛驃騎為二十四班内通外用四征東南西北正施外也四中軍衛撫權正施内也為二十三班八鎮東南西北正施在外左右前後正施在内為二十二班八安東南西北正施在外左右前後正施在内為二十一班四平東南西北四翊左右前後為二十班凡三十五號為一品是為重號將軍忠武軍師為十九班武臣爪牙龍騎雲麾為十八班代舊前後左右四將軍鎮兵翊師宣恵宣毅為一十七班代舊四中郎十號為一品智威仁威勇威信威嚴威為十六班代舊征虜智武仁武勇武信武嚴武為十五班代舊冠軍十號為一品所謂五徳將軍者也輕車征逺鎮朔武旅貞毅為十四班代舊輔國凡將軍加大者唯至貞毅而已通進一階優者方得比加位從公凡督府置長史司馬諮議諸曹有録事記室等十八曹事天監七年更置中録記室中直兵參軍各一人寧逺明威振逺電耀為十三班代舊寧朔十號為一品武騎武威武猛壯武飈武為十二班電威馳銳追鋒羽騎突騎為十一班十號為一品折衝冠武和戎安壘猛烈為十班掃狄䧺信掃虜武鋒摧鋒為九班十號為一品略逺貞威决勝開逺光野為八班厲鋒輕銳討狄蕩夷為七班十號為一品武毅鐡騎樓船宣猛樹功為六班尅狄平虜討夷平狄威戎為五班十號為一品伏波雄㦸長劔衝冠鵰騎為四班佽飛安夷尅戎綏狄威虜為三班十號為一品先鋒武毅開邊招逺全威為二班綏虜蕩宼殄虜横野馳射為一班十號為一品凡十品二十四班亦以班多為貴其制品十取其盈數班二十四以法氣序制簿悉以大號居後以為選法自小遷大也前史所記以位得從公故將軍之名次于台槐之下至是備其班品叙於百司之外其不登二品應須軍號者有牙門代舊建威期門代舊建武為八班􅇋騎代舊振威雄渠代舊振武為七班中堅代舊奮威典戎代舊奮武為六班戈船代舊揚威繡衣代舊揚武為五班執訊代舊廣武行陣代舊廣威為四班鷹揚為三班陵江為二班偏將軍禆將軍為一班凡十四號别為八班以象八風所施甚輕又有武安鎮逺䧺義擬車騎為二十四班四撫東西南北擬四征為二十三班四寧東西南北擬四鎮為二十二班四威東西南北擬四安為二十一班四綏東西南北擬四平為二十班凡十九號為一品安逺安邊擬忠武軍師為一十九班輔義安沙衛海撫河擬武臣等四號為一十八班平逺撫朔寧沙航海擬鎮兵等四號為十七班凡十號為一品翊海朔野拓逺威河龍幕擬智威等五號為十六班威隴安漠綏邊寧宼梯山擬智武等五號為十五班凡十號為一品寧境綏河明信明義威漠擬輕車等五號為十四班安隴向義宣節振朔候律擬寧逺等五號為十三班凡十號為一品平宼定逺陵海寧隴振漠擬武威等五號為十二班馳義横朔明節執信懐徳擬電威等五號為十一班凡十號為一品撫邊定隴綏關立信奉義擬折衝等五號為十班綏隴寧邊定朔立節懐威擬掃狄等五號為九班凡十號為一品懐關静朔掃宼寧河安朔擬畧逺等五號為八班揚化超隴執義來化度嶂擬礪鋒等五號為七班凡十號為一品平河振隴䧺邊横沙寧關擬武毅等五號為六班懐信宣義𢎞節浮遼鑿空擬尅狄等五號為五班凡十號為一品捍海欵塞歸義凌河明信擬伏波等五號為四班奉忠守義𢎞信仰化立義擬佽飛等五號為三班凡十號為一品綏方奉正承化浮海度河擬先鋒等五號為二班懐義奉信歸仁懐澤伏義擬綏虜等五號為一班凡十號為一品大凡一百九號將軍亦為十品二十四班正施於外國及大通三年有司奏曰天監七年改定將軍名有因有革普通六年又置百號將軍更加刋正雜號之中微有移異大通二年奏移寧逺班中明威將軍進輕車班中又置安逺將軍代貞武宣逺代明烈其戎夷之號亦加附擬選序則依此承用遂以定制轉則進一班黜則退一班班即階也同班以優劣為前後有鎮衛驃騎車騎同班四中四征同班八鎮同班八安同班四平四翊忠武軍師同班武臣爪牙龍騎雲麾冠軍同班鎮兵翊師宣惠宣毅四將軍東南西北四中郎將同班智威仁威勇威信威嚴威同班智武仁武信武勇武嚴武同班為五徳將軍輕車鎮朔武旅貞毅明威同班寧逺安逺征逺振逺宣逺同班威䧺威猛威烈威振威信威勝威略威風威力威光同班武猛武略武勝武力武毅武健武烈武威武鋭武勇同班猛毅猛烈猛威猛鋭猛震猛進猛智猛威猛勝猛駿同班壯武壯勇壯烈壯猛壯鋭壯盛壯毅壯志壯意壯力同班驍雄驍桀驍猛驍烈驍武驍勇驍銳驍名驍勝驍迅同班雄猛雄威雄明雄烈雄信雄武雄毅雄壯雄健同班忠勇忠烈忠猛忠銳忠壯忠毅忠捍忠信忠義忠勝同班明智明略明逺明勇明烈明威明勝明進明鋭明毅同班光烈光英光逺光勝光銳光命光勇光戎光野同班颷勇颷猛颷烈颷銳颷竒颷决颷起颷略飈勝飈竒飈出同班龍驤武視雲旗風烈電威雷音馳銳追銳羽騎突騎同班折衝冠武和戎安壘超猛英果掃冦掃狄武銳摧鋒同班開逺略逺貞威决勝清野堅銳輕銳拔山雲勇振旅同班超武鐡騎樓船宣猛樹功尅狄平虜稜威昭威威戎同班伏波雄㦸長劍衝冠鵰騎佽飛勇騎破敵尅敵威勇威虜同班前鋒武毅開邊招逺全威破陣蕩宼殄虜横野馳射同班牙門期門同班候騎熊渠同班中堅典戎同班執訊行陣同班伏武懐竒同班偏禆將軍同班凡二百四十號為四十四班又雍州置寧蠻校尉廣