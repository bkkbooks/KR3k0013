將軍貞元二年十六衛各置上將軍一員諸府隋置驃騎鷹揚等府充天下守戍兵不成軍曰府府有上中下折衝都尉各一人唐因隋折衝果毅郎將之名改統軍為折衝别將為果毅都尉左右果毅都尉各一人别將各一人其餘輔國鎮軍二大將軍冠軍雲麾忠武壯武宣威明威信逺游騎㳺擊十將軍為散號將軍以加武士之無職事者又以秦王齊王下統軍為䕶軍副統軍為副䕶軍上大都督為驍騎尉大都督為飛騎尉帥都督為雲騎尉都督為武騎尉車騎將軍為㳺騎將軍親衛驃騎將軍為親尉中郎將其勲衛驃騎准此親衛車騎將軍為親衛中郎將其勲衛翊衛車騎竝准此監門府郎將為監門中郎將領左右郎將准此諸軍驃騎將軍為統軍其秦王齊王下領三衛及庫直驅咥直車騎竝准此諸軍車騎將軍為别將貞觀十一年更置驃騎大將軍為從一品武散官輔國鎮軍二大將軍為從二品武散官冠軍將軍加大字及雲麾以下㳺撃以上改為五品以上武散官又置昭武振威致果翊麾宣節禦武仁勇陪從八校副尉自六品至從九品上階為校尉下階為副將六品以下武散官又武徳元年五月改隋鷹揚郎將為軍頭六月改軍頭為驃騎將軍副為車騎將軍至二年五月車騎將軍𨽻驃騎府七年三月改驃騎將軍為統軍車騎將軍為副軍至貞觀十年改統軍為折衝都尉副為果毅都尉武徳七年又置都督府改大府官以上為大都督府管十州都督不滿十州只為府徳宗時六軍又置統軍諸衛又置上將軍其出師專征者有摠管都統元帥分土治戎者有團練使防禦使節度使統押戎夷者有都䕶又貞元之後中人治兵别有䕶軍中尉觀軍容使五代以後典掌禁軍則有侍衛親軍都指揮使及殿前都檢校殿前都指揮使而下皆以藩臣領之唐之軍衛名存而實廢矣夫軍旅者所以防禍機遏亂略將帥者所以摠戎政揚國威入則壯乎翊衛出則鎮其方面士卒之存亡攸屬邦家之休戚是繫茍得其人折衝於萬里儻非其任則三軍奔北故古先哲王質於蓍龜所以難其選也拜於壇塲所以重其任也推轂而遣所以專其事也列壤而封所以報其功也若乃保於誠節濟乎功名則福禄隨之寡於方略䧟於敗衂則鈇鉞及焉今竝採其善惡之迹成敗之謀忠逆之心賢愚之效寘之於篇以示鍳戒凡一百六門佐命第一夫帝王之興也必有命世之人傑折衝之虎臣周旋翼從夷兇戡難然後大勲以集歸運斯格御天下之圖制億兆之命者也自成周著伐罪之誓漢高有扶義之舉白水興復當塗締構繇是而下或艱難以創業或累積而啓祥莫不有毅勇之士為之爪牙奮揚威武式遏亂略周旋夷險勤宣忠力搴旗以克敵略地以闢國用能震天聲而消羣慝厲輿師而一衆志成樂推欣戴之美享利建世及之報功成名立為方策之所稱述其不偉歟周太公望吕尚初事文王及武王即位欲修王業東伐以觀諸侯集否師行師尚父師之尚之父之故曰師尚父亦男子美稱遂至孟津諸侯不期而會者八百皆曰紂可伐也武王曰未可還師太公作泰誓居二年紂殺王子比干囚箕子武王將伐紂卜龜兆不吉風雨暴至羣公盡懼唯太公强之勸武王武王於是遂行十一年正月甲子誓於牧野以伐紂紂師敗績明日武王立于社羣公奉明水衛康叔封布采席師尚父牽牲史佚䇿祝以告神說討紂之罪遷九鼎修周政與天下更始師尚父謀居多封於齊營邱詩曰惟師尚父時惟鷹揚諒彼武王諒佐也尚父佐武王為之尚將漢韓信淮隂人秦末項梁渡淮信乃仗劍從之梁敗又屬項羽為郎中數以䇿干羽羽弗用漢王入蜀信亡楚歸漢為連敖楚官名坐法當斬其疇十三人皆已斬疇類也至信信乃仰視適見滕公夏侯嬰也曰上不欲就天下乎而斬壯士滕公竒其言壯其貌釋之言於漢王以為治粟都尉蕭何言於漢王曰王必欲爭天下非信無可與計事漢王乃拜信為大將事具宰輔薦賢及帝王選將門遂聽信計部署諸將部分而署置之漢王元年舉兵東出陳倉定三秦二年出關收魏河南韓殷王皆降令齊趙共擊楚彭城漢兵敗散而還信復發兵與漢王會榮陽擊破楚京索間以故楚不能西漢之敗却彭城齊趙魏反漢王以信撃魏魏王豹驚引兵迎信信遂虜豹定河東使人請益兵三萬人臣請以北舉燕趙東擊齊南絶楚之糧道西與大王會於榮陽漢王與兵三萬人遣張耳與俱進擊趙代破代禽夏說閼與夏說代相閼與邑名信之下魏代漢輒使人收其精兵詣榮陽信以兵數萬東下井陘擊趙斬成安君泜水上禽趙王歇於是用趙將廣武君李左車䇿發使使燕燕從風而靡乃遣使報漢因請立張耳王趙以撫其國漢王許之楚數使騎兵渡河擊趙王耳信來徃救趙四年漢王出成臯渡河拜信為相國發趙兵未發者擊齊齊王廣亡去信追北至城陽虜廣楚卒皆降遂平齊使人言漢王曰齊夸詐多變反覆之國南近楚不為假王以鎮之其勢不定漢王遣張良立信為齊王徴其兵使擊楚五年漢王之敗固陵用張良計徴信將兵會垓下項羽死封為楚王曹參沛人也高祖為沛公時參以中㳙從㳙潔也言其在中主知潔清洒掃之事蓋親近左右也擊胡陵方與攻秦監公軍大破之秦一郡置守尉監三人公者時人尊稱之耳東下薛擊泗水守軍薛郭西復攻胡陵取之從守方與方與反為魏擊之豐反為魏攻之賜爵七大夫北擊司馬欣軍碭東取狐父祁善置善置置名也狐父祁二縣名也置若今之驛也又攻下邑以西至虞擊秦將章邯車騎攻轅戚及亢父先登遷為五大夫北救東阿擊章邯軍䧟陳追至濮陽攻定陶取臨濟南救雍丘擊李繇軍破之殺李繇虜秦􅇋一人章邯破殺項梁也沛公與項羽引兵而東楚懐王以沛公為碭郡長將碭郡兵於是乃封參執帛楚爵孤卿號曰建成君遷為戚公屬碭郡為戚縣之令其後從攻東郡尉軍破之成武南擊王離軍成陽南又攻杠里大破之追北西至開封擊趙賁軍破之圍趙賁開封城中西擊秦將楊熊軍於曲遇破之虜秦司馬及御史各一人遷為執珪執珪古爵名也從西攻陽武下轘轅緱氏絶河津擊趙賁軍尸北破之尸鄊之北從南攻犨與南陽守齮戰陽城郭東今堵陽䧟陳取宛虜齮定南陽郡高紀言南陽守齮降封為殷侯而此傳言虜齮紀傳不同疑傳誤從西攻武關嶢關取之前攻秦軍藍田南又夜擊其北軍大破之遂至咸陽破秦項羽至以沛公為漢王漢王封參為建成侯從至漢中遷為將軍從還定秦攻下辨故道武都二縣也雍斄扶風縣也擊章平軍於好畤南破之圍好畤取壤鄊壤地名也擊三秦軍壤東及高櫟破之復圍章平平出好畤走因擊趙賁内史保軍破之東取咸陽更名曰新城參將兵守景陵二十三日縣名也三秦使章平等攻參參出擊大破之賜食邑於寧秦今華隂以將軍引兵圍章邯廢丘以中尉從漢王出臨晉關至河内下修武度圍津在東郡東擊龍且項佗定陶破之東取碭蕭彭城擊項籍軍漢軍大敗走參以中尉圍取雍丘王武反於外黄程處反於燕皆漢將燕東郡之縣故南燕國徃擊盡破之柱天侯史失姓名反於衍氏進破取衍氏擊羽嬰於昆陽追至葉葉南陽縣也還攻武彊武疆城在陽武因至滎陽參自漢中為將軍中尉從擊諸侯及項王敗還至滎陽敗謂戰彭城而敗漢二年拜為假左丞相入屯兵關中月餘魏豹反以假丞相别與韓信東攻魏將孫遫東張東張屬河南大破之因攻安邑得魏將王襄擊魏王於曲陽追至東垣生獲魏王豹取平陽得豹母妻子盡定魏地凡五十二縣賜食邑平陽因從韓信擊趙相國夏說軍於鄔東鄔大原縣也大破之斬夏説韓信與故常山王張耳引兵下井陘擊成安君陳餘而令參還圍趙别將戚公於鄔城中戚公出走追斬之西引兵詣漢王之所韓信已破趙為相國東擊齊參以左丞相屬焉攻破齊歴下軍遂取臨淄還定濟北郡收著漯隂平原鬲盧五縣名也時未有濟北郡史追書之耳已而從韓信擊龍且軍於上假宻或以為高宻大破之斬龍且虜亞將周蘭亞將次將也定齊郡凡得七十縣得故齊王田廣相田光其守相許章及故將軍田既守相為相居守者韓信立為齊王引兵東詣陳與漢王共破項羽而參畱平齊未服者漢王即皇帝位韓信徙為楚王參歸相印焉高祖六年與諸侯剖符賜參爵列侯食邑平陽萬六千三十户世世勿絶陳平陽武户牖人也初歸漢拜為都尉使參乘遂與東伐項羽至彭城為楚所敗引師而歸收散兵至滎陽以平為亞將屬韓王信軍廣武遷䕶軍中尉盡䕶諸將其後楚急擊絶漢甬道於滎陽城漢王患之乃出黄金四萬斤予平縱反間於楚軍項王果大疑亞父亞父欲急擊下滎陽城項羽不聼事見將帥間諜門平乃夜出女子二千人滎陽東門楚因擊之平與漢王從城西門出去遂入關收聚兵而復東封平以户牖鄊用其計䇿卒滅楚七年更封為曲逆侯周勃其先卷人徙沛以織薄曲為生葦薄為曲高祖為沛公初起勃以中㳙從後攻胡陵下方與方與反與戰却敵攻豐擊秦軍碭東還軍留及蕭復攻碭破之下下邑先登賜爵五大夫攻蘭虞取之擊章邯車騎殿殿鎮也謂鎮後以扞蔽勃擊破章邯之殿兵也略定魏地攻轅戚東緡以徃至栗取之攻齧桑先登擊秦軍阿下破之追至濮陽下蘄城攻都關定陶襲取宛朐得單父今夜襲取臨濟攻夀張以前至卷破李繇雍丘下攻開封先至城下為多多謂功多也後章邯破項梁沛公與項羽引兵東如碭自初起沛還至碭一歳二月楚懐王封沛公為碭郡長拜勃為襄賁令從沛公定魏地攻東郡尉於城武破之攻長社先登攻潁陽緱氏絶河津擊趙賁軍尸北尸北鄊也南攻南陽守齮破武關嶢關攻秦軍於藍田至咸陽滅秦項羽至以沛公為漢王漢王賜勃爵為威武侯從入漢中拜為將軍還定三秦賜食邑懐徳攻槐里好畤最於將帥之中功為最也北擊趙賁内史保於咸陽最北救漆漆扶風縣擊章平姚卭軍西定汧汧今隴西縣也還下郿潁陽即今鳯翔郿縣潁陽在櫟陽東圍章邯廢丘破之西擊益己軍破之益己章邯將也攻上邽東守嶢關擊項羽攻曲遇最還守敖倉追羽羽已死因東定楚地泗水東海郡凡得二十二縣還守雒陽賜爵列侯剖符世世不絶食絳八千二百八十户樊噲沛人以屠狗為事高祖為沛公噲以舎人從攻胡陵方與還守豐擊泗水監豐下破之泗水郡名監謂監郡也破之於豐縣下復東定沛破泗守薛西謂破郡守於薛縣之西與司馬尼戰碭東尼秦將軍邯之司馬却敵斬首十五級賜爵國大夫即官大夫也嘗從沛公擊章邯軍濮陽攻城先登斬首二十三級賜爵列大夫即公大夫也從攻陽城先登下户牖陽武縣北鄊破李繇軍斬首十六級賜上聞爵上聞謂名通於天子從攻圉都尉陳留圉縣東郡守尉於成武却敵斬首十四級捕虜十六人賜爵五大夫從攻秦軍出亳南今河南偃師湯亭是河間守軍於杠里破之擊破趙賁軍開封北以却敵先登斬候一人首六十八級捕虜二十六人賜爵卿從攻破楊熊於曲遇攻宛陵先登斬首八級捕虜四十四人賜爵號賢成君從攻長社轘轅絶河津東攻秦軍尸鄊南攻秦軍於犨破南陽守齮於陽城東攻宛城先登西至酈南陽縣也以却敵斬首十四級捕虜四十人賜重封重封加二號也攻武關至霸上項羽欲攻沛公既饗軍士中酒中酒飲酒之中也亞父謀欲殺沛公時獨張良得入坐噲居營外聞事急廼持盾直撞入立帳下以盾撞擊人也言於項羽曰沛公先入定咸陽暴師霸上以待大王大王今日至聼小人之言與沛公有隙臣恐天下解心疑大王也羽黙然沛公如厠麾噲去既出沛公留車騎獨騎馬噲等四人歩從山下走歸霸上軍而使張良謝羽羽亦因遂已已止也無誅沛公之心後數日羽屠咸陽立沛公為漢王漢王賜噲爵為列侯號臨武侯遷為郎中從入漢中還定三秦别攻西丞白水北西今西縣白水水名言擊西縣之丞於白水之北擁輕車騎雍南破之從攻雍斄城先登斄縣名屬武功擊章平軍好畤攻城先登䧟陣遷為郎中騎將從擊秦車騎壤東地名却敵遷為將軍攻趙賁下郿槐里栁中咸陽栁中即細栁地灌廢丘最以水灌廢邱也至櫟陽賜食邑杜之樊鄊今樊川從攻項羽屠煑棗未詳其地擊破王武程處軍於外黄攻鄒魯瑕丘薛項羽敗漢王於彭城盡復取魯梁地噲還至滎陽益食平隂二千户以將軍守廣武一歳廣武在滎陽項羽引兵東從漢王擊羽下陽夏虜楚周將軍卒四千人周殷也圍項羽于陳大破之於陳縣圍之屠胡陵羽死漢王即皇帝位以噲有功益食邑八百户其秋燕王臧荼反噲從攻荼定燕地楚王韓信反噲從至陳取信定楚更賜爵列侯與剖符世世勿絶食舞陽號為舞陽侯彭越字仲昌邑人嘗漁鉅野澤中為盗陳勝起澤間少年相聚百餘人徃從越請為長設壇祭令徒屬乃行略地收諸侯散卒得千餘人沛公從碭北擊昌邑越助之昌邑未下沛公引兵西越亦將其衆居鉅野澤中收魏敗散卒項籍入關王諸侯還歸越衆萬餘人無所屬齊王田榮叛項王漢乃使人賜越將軍印使下濟隂以擊楚楚令蕭公角將兵擊越越大破楚軍漢與魏豹及諸侯東擊楚越將其兵三萬餘人歸漢外黄於外黄來歸漢漢王曰彭將軍收魏地得十餘城欲急立魏後今西魏王豹魏咎從弟真魏也豹真魏後也廼拜越為魏相國擅將兵略定梁地項王與漢王相距滎陽越攻下睢陽外黄十七城項王聞之乃使曹咎守成臯自東收越所下城邑皆復為楚越將其兵北走穀城項王南走陽夏越復下昌邑旁二十餘城得粟十餘萬斛以給漢食漢王敗使使召越并力擊楚越曰魏地初定尚畏楚未可去漢王追楚為羽所敗固陵用張良策發使使越取睢陽以北至穀城皆許以王越又言所以許韓信越乃引兵至垓下羽死立越為梁王都定陶黥布六人也初從項羽入咸陽為前鋒羽封諸將立布為九江王都六齊王田榮叛楚項王徵兵九江布稱病不徃遣將將數千人行漢王敗楚彭城布又稱病不佐楚項王由此怨布布愈恐不復徃漢王與楚大戰彭城不利出梁城至虞今宋州虞城縣使隋何使布何說布起兵攻楚事具摠録㳺說門楚使項聲龍且攻淮南項王留而攻下邑今宋州縣也龍且攻淮南破布軍布間行與隋何歸漢漢王使人之九江得布故人幸臣將衆數千人歸漢漢益分布兵而與俱北收兵至成臯四年立布為淮南王與擊項籍布使之九江得數縣五年布與劉賈入九江誘大司馬周殷殷反楚遂舉九江兵與漢擊楚破垓下項籍死布遂剖符為淮南王都六九江廬江衡山豫章郡皆屬焉盧綰豐人高祖初起沛以客從入漢為將軍常侍中從東擊項羽封長安侯項籍死使綰别將與劉賈擊臨江王共尉共敖子也還從擊燕王臧荼皆破平高祖詔諸將相列侯擇羣臣有功者以為燕王皆曰大尉綰嘗從平定天下功最多可王乃立綰為燕王酈啇高陽人陳勝起商聚少年得數千人沛公初略地商以所將四千人屬沛公於岐從攻長社先登賜爵封信成君從攻緱氏絶河津破秦軍雒陽東從下宛穰定十七縣别將攻旬關旬關分水二關也西定漢中以將軍為隴西都尉别定北地郡破章邯别將於烏氏栒邑泥陽烏氏定安也栒邑在幽州泥陽北地縣也賜食邑武城六千户從擊項籍軍與鍾離昧戰受梁相國印益食四千户從擊項羽二嵗攻固陵漢王即帝位燕王荼反臧荼也商以將軍從擊荼戰龍脫地名先登陷陣破荼軍易下今易縣却敵遷為右丞相賜爵列侯與剖符世世勿絶食邑涿郡五千户夏侯嬰沛人為沛廏司御每送使客還過泗上亭與高祖相愛高祖為沛公賜爵七大夫以嬰為太僕嘗奉車從攻胡陵嬰與蕭何降泗水監平平以胡陵䧏賜爵嬰五大夫從擊秦軍碭東攻濟陽下户牖破李繇軍雍丘以兵車趣攻戰疾破之趣急速也下同賜爵執帛從擊章邯軍東河濮陽下以兵車趣攻戰疾破之賜爵執圭從擊趙賁軍開封楊熊軍曲遇嬰從捕虜六十八人䧏卒八百五十人得印一匱又擊秦軍雒陽東以兵車趣攻戰疾轉為滕令膝今徐州縣因奉車從攻定南陽戰於藍田芷陽芷陽後為霸陵縣至霸上沛公為漢王賜嬰爵號昭平侯復為太僕從入蜀漢還定三秦從擊項籍至彭城漢王不利馳去見孝恵魯元公主載之漢王急馬罷虜在後嘗蹳兩兒棄之嬰嘗收載行面雍樹馳雍擁面背也言取兩兒令面背已而抱持之以馳故云面雍樹馳也漢王既至滎陽收散兵復振賜嬰食邑沂陽擊項籍下邑追至陳卒定楚至魯益食兹氏縣名屬大原漢王即帝位燕王臧荼反嬰從擊荼明年從至陳取楚王信更食汝隂剖符世世勿絶灌嬰睢陽販繒者繒者帛之摠名高祖為沛公略地至雍丘章邯殺項梁而沛公還軍於碭嬰以中涓從擊破東郡尉於成武及秦軍於杠里疾鬬賜爵七大夫從攻秦軍亳南開封曲遇戰疾力力强也賜封執帛號宣陵君從攻陽武以西至雒陽破秦軍尸北北絶河津南破南陽守齮陽城東遂定南陽郡西入武關戰於藍田疾力至霸上賜爵執圭號昌文君沛公為漢王拜嬰為郎中令從入漢中拜為中謁者從還定三秦下櫟陽䧏塞王還圍章邯廢丘未拔從東出臨晉關擊䧏殷王定其地擊項羽將龍且魏相項佗軍定陶南疾戰破之賜爵號昌文侯食杜平鄊杜縣平郷復以中謁者從䧏下碭以北至彭城項羽擊破漢王漢王遁而西嬰從還軍於雍丘王武魏公申徒反故秦將䧏為分從擊破之攻下外黄西收軍於滎陽楚騎來衆漢王拜嬰為中大夫令李必駱甲二人皆故秦騎士重泉縣人為左右校尉將郎中騎兵擊楚騎於滎陽東大破之受詔别擊楚軍後絶其饟道起陽武至襄邑擊項羽之將項冠於魯下破之所將卒斬左右司馬騎將各一人擊破柘公王武軍燕西柘縣名公者柘之令也王武其人姓名燕西南燕國也所將卒斬樓煩將五人樓煩縣名其人善騎射故名射士為樓煩連尹一人楚官也擊王武别將桓嬰白馬下破之所將卒斬都尉一人以騎度河南送漢王到雒陽從北迎相國韓信軍於邯鄲還至敖倉嬰遷為御史大夫三年以列侯食邑杜平鄊受詔將郎中騎兵東屬韓信擊破齊軍於歴下所將卒虜車騎將軍華母傷及將吏四十六人䧏下臨淄得相田光追齊相田横至嬴博二縣名擊破其騎所將卒斬騎將一人生得騎將四人攻下嬴博破齊將軍田吸於千乘斬之東從韓信攻龍且留公於假宻留縣名公縣令也攻龍且及留縣令於假宻卒斬龍且卒嬰所將卒也生得右司馬連尹各一人樓煩將十人身生得亞將周蘭亞次也齊地已定韓信自立為齊王使嬰别將擊楚將公杲於魯北破之轉南破薛郡長長亦如郡守也時每郡置長身虜騎將一人攻博陽前至下相以東南僮取慮徐僮取慮徐三縣名度淮盡䧏其城邑至廣陵謂從下相以東南盡䧏城邑乃至廣陵皆正定項羽使項聲薛公郯公復定淮北嬰度淮擊破項聲郯公下邳斬薛公下下邳夀春擊破楚騎平陽此平陽在北郡遂䧏彭城虜柱國項佗䧏留薛沛酇蕭相此六縣攻苦譙二縣名復得亞將與漢王會頥郷從擊項籍軍陳下破之所將卒斬樓煩將二人虜將八人賜益食邑二千五百户項籍敗陔下嬰以御史大夫將車騎别追籍至東城破之所將卒五人共斬項籍皆賜爵列侯左右司馬各一人卒萬二千人盡得其軍將吏下東城歴陽度江破呉郡長呉下得呉守遂定呉豫章會稽郡還定淮北凡五十二縣漢王即帝位賜嬰邑三千户以車騎將軍從擊燕王荼明年從至陳取楚王信還剖符世世勿絶食邑潁隂二千五百户韓王信故韓襄王孼孫孼庶子項梁立楚懐王燕齊趙魏皆已前王唯韓無有後故立韓公子横陽君成為韓王欲以定韓地項梁死定陶成犇懐王成謂所立韓王沛公引兵擊陽城使張良以韓司徒徇韓地得信以為韓將將其兵從入武關沛公為漢王信從入漢中乃說漢王曰項王王諸將王獨居此此左遷也士卒皆山東人跂而望歸及其蠭東郷可以争天下漢王從之蠭謂軍中將士氣鋒也竦謂引領東望也蠭與鋒同漢王還定三秦乃許王信先拜為韓太尉將兵略韓地時項籍已殺韓王成聞信略韓地乃令故籍㳺吳時令鄭昌為韓王項藉在吳時昌為吳縣令距漢漢二年信略定韓地十餘城漢王至河南信急擊韓王昌昌䧏漢乃令立信為韓王嘗將韓兵從漢王使信與周苛等守滎陽楚拔之信䧏楚已得亡歸漢漢復以為韓王竟從擊破項籍五年春與信剖符王潁川傅寛初以魏五大夫騎將從沛公為舎人起横陽從攻安陽杠里趙賁軍於開封及擊楊熊曲遇陽武斬首十二級賜爵卿從至霸上沛公為漢王賜寛爵號共徳君從入漢中為右騎將還定三秦賜食邑雕隂縣名屬上郡從擊項籍待懐待高祖於懐縣也今懐州賜爵通徳侯從擊項冠周蘭龍且所將卒斬騎將一人敖下敖地名左傳曰敖鄗之間益食邑屬淮隂撃破齊歴下軍擊田解屬相國參殘博參曹參也博太山縣因定齊地剖符世世勿絶封陽陵侯食邑二千六百户靳歙以中㳙從起宛朐今曹州縣攻濟陽破李繇軍擊秦軍開封東斬騎千人將一人騎將師號為千人漢儀注邊郡置部都尉千人司馬侯也首五十七級捕虜七十三人賜爵封臨平君又戰藍田北斬車司馬二人謂主車司馬也騎長一人謂騎之長也首二十八級捕虜五十七人至霸上沛公為漢王賜歙爵建武侯遷騎都尉從定三秦别西擊章平軍於隴西破之定隴西六縣所將卒斬車司馬候各四人騎長十二人從東擊楚至彭城漢軍敗還保雍丘擊反者王武等略梁地别西擊邢說軍菑南破之菑縣名今孝城縣身得說都尉二人司馬候十二人䧏吏卒四千六百八十人破楚軍滎陽東食邑四千二百户别之河内擊趙賁軍朝歌破之所將卒得騎將二人車馬二百五十匹從攻安陽以東至棘蒲下十縣别攻破趙軍得其將司馬二人候四人降吏卒二千四百人從䧏下邯鄲别下平陽身斬守相所將卒斬兵守郡一人兵守郡當言兵郡守也謂將兵郡守也䧏鄴從攻朝歌邯鄲又别擊破趙軍降邯鄲郡六縣還軍敖倉破項籍軍成臯南擊絶楚饟道起滎陽至襄邑破項冠魯下略地東至鄫郯下邳南至蘄竹邑擊項悍濟陽下還擊項籍軍陳下破之别定江陵降柱國大司馬以下八人身得江陵王致雒陽江陵王謂共敖之子尉也因定南郡從至陳取楚王信剖符世世勿絶定食四千六百户為信武侯周緤沛人也以舎人從高祖起沛至霸上西入蜀漢還定三秦嘗為參乘賜食邑池陽從東擊項羽滎陽絶甬道從出度平隂遇韓信軍襄國戰有利不利終無離上心帝以緤為信武侯食邑三千三百户册府元龜卷三百四十
