body:
  text: 冊府元龜卷四十一宋王欽若等撰帝王部寛恕臯陶稱舜之徳曰御衆以寬孔子謂一言而終身行者其恕乎况乃宅四海之富居兆民之上固宜恢含垢之度廓包荒之量垂旒塞纊靡極其聰明天覆地容用示於廣大然後一眚者不掩其羙小過者無累其善跅弛者得盡其能悻直者咸竭其慮勲舊有以自保反側以之獲安詿誤者惟新狂簡者蒙宥百揆時叙萬邦咸懐君人之徳於斯為盛矣漢高祖初范陽人蒯通嘗説齊王韓信欲令背漢信不聽通乃陽狂為巫天下既定信後以罪廢為淮隂侯謀反被誅臨死嘆曰悔不用蒯通之言死於女子之手高帝曰是齊辯士蒯通乃詔齊召蒯通通至帝欲烹之曰若教韓信反何也若汝也通曰狗各吠非其主當彼時臣獨知齊王韓信非知陛下也且秦失其鹿以鹿喻帝位天下共逐之高材者先得天下匃匃爭欲為陛下所為顧力不能顧念也可殫誅邪殫盡也帝乃赦之呉王濞怨望稱疾不朝使來輙繋責治之呉王恐所謀滋甚又後使人為秋請律春曰朝秋曰請如古諸侯朝聘也濞不自行使人代為致請禮文帝復責問呉使者使者曰察見淵中魚不祥言天子竊見下之私則不祥也今呉王始詐疾及覺見責急愈益閉恐上誅之計乃無聊唯帝與更始言赦其已往之事於是天子皆赦呉使者歸之而賜呉王几杖老不朝呉得釋其謀亦益觧武帝遣貳師將軍李廣利伐宛軍行非乏食戰死不甚多而將吏貪不愛卒侵牟之以此物故者衆侵牟言如牟賊之食苗也物故謂死也天子為萬里征伐不録其過廼頒賞焉後漢光武建武四年率諸將圍秦豐於黎丘璽書招豐豐出惡言不肯降朱祐盡力攻之明年城中窮困豐肉袒降祐檻車𫝊豐雒陽斬之大司馬呉漢劾奏祐廢詔受降違將帥之任帝不加罪尹敏為郎中辟大司空府校圖䜟敏因其闕文増之曰君無口為漢輔帝見而怪之召敏問其故對曰臣見前人増損國書敢不自量竊冒萬一帝深非之竟不加罪而亦以此沉滯章帝時孔僖崔駰同遊太學習春秋因讀呉王夫差事僖廢書歎曰若是所謂畫虎不成反類狗者駰曰然昔孝武皇帝始為天子年十八崇信聖道師則先王五六年間號勝文景及後恣已忘其前之為善僖曰書𫝊若此多矣隣房生梁郁攙和之曰攙謂不與之言而傍對也禮記曰無攙言如此武帝亦是狗邪僖駰黙然不對郁怒恨之隂上書告駰僖誹謗先帝刺譏當世事下有司駰詣吏受訊僖以吏捕方至恐誅乃上書自訟曰臣之愚意以為凡言誹謗者謂實無此事而虛加誣之也至如孝武皇帝政之羙惡顯在漢史坦如日月是為直説書傳實事非虛謗也夫帝者為善則天下之善咸歸焉其為不善則天下之惡亦萃焉斯皆有以致之故不可以誅於人也且陛下即位以來政教未過而徳澤有加言政教未有過失也天下所具也臣等獨何譏刺哉假使所非實是則固應悛改儻其不當亦宜含容而何罪焉陛下不推原大數深自為計徒肆私忿以快其意臣等受戮死即死耳顧天下之人必回視易慮以此事闚陛下心自今以後苟見不可之事終莫敢言者矣臣之所以不愛其死猶敢極言者誠為陛下深惜此大業陛下若不自惜則臣何賴焉齊桓公親揚其先君之惡以唱管仲魯莊公束縛管仲以與齊桓公親迎於郊而與之坐問焉曰昔吾先君襄公築臺以為高為田狩畢弋不聴國政卑聖侮士而惟女是崇九妃六嬪陳妾數百食必粱肉衣必文繡戍士凍餒是以國家不日引不月長恐宗廟不掃除社稷不血食敢問為此若何管仲曰昔者聖人之理天下定人之居成人之事而慎用其六柄焉四人者勿使雜處則其言恕其事易也然後羣臣得盡其心今陛下乃欲以十世之武帝逺諱實事豈不與桓公異哉臣恐有司卒然見搆銜恨蒙枉不得自叙使後世論者擅以陛下有所方比寧可復使子孫追掩之乎謹詣闕伏待重誅帝始亦無罪僖等意及書奏立詔勿問拜僖蘭臺令史和帝時周榮初辟司徒袁安府安舉奏竇氏事皆榮所具草後為潁州太守坐法當下獄帝思榮忠節左轉共令順帝時雷義為尚書侍郎有同時郎坐事當居刑作義黙自表取其罪以此論司冦同臺郎覺之委位自上乞贖義罪帝詔皆除刑楊倫為大將軍梁商長史諫諍不合出補常山王傅病不之官詔書勅司𨽻催促發遣倫乃居河内朝歌以病自上曰有留死一尺無北行一寸刎頸不易九裂不恨裂死也楚詞曰雖九死其猶未悔也匹夫所執强於三軍固敢有辭帝乃下詔曰倫出幽升高詩曰出於幽谷遷于喬木寵以藩傅稽留王命擅止道路託疾自從苟肆狷志狷狂狷也音絹遂徴詣廷尉有詔原罪靈帝時范冉或作丹辟司空府是時西𦍑反叛黄巾作難制諸府掾屬不得妄有去就冉首自劾退帝詔書特原不理罪獻帝初平四年春正月甲寅朔日有食之時未晡八刻太史令王立奏曰日晷過度無變也朝臣皆賀帝令候焉未晡一刻而食賈詡奏曰立司候不明疑誤上下請付理官帝曰天地𤣥逺事驗難明欲歸咎史臣益重朕之不徳也魏明帝太和二年幸長安及還雒是時謡言云國有大故從駕羣臣迎立雍丘王植京師自卞太后羣公盡懼及帝還皆私察顔色卞太后悲喜欲推始言者帝曰天下皆言將何所推晉武帝泰始初司𨽻校尉李憙上言故立進令劉友前尚書山濤中山王睦故尚書僕射武陔各占官三更稻田請免濤睦等官陵已亡請黜諡詔曰法者天下取正不避親貴然後行耳吾豈將枉縱其間哉然案此事皆是友所作侵削百姓以繆惑朝士姦吏乃敢作此其考竟友以懲邪侫濤等不貳其過者皆勿有所問易稱言王臣謇謇匪躬之故今憙亢志在公當官而行可謂邦之司直者矣光武有云貴戚且斂手以避二鮑豈其然乎其申勅羣寮各慎所司寛宥之恩不可數遇也憙為二代司𨽻朝野稱之又武帝嘗因南郊禮畢喟然謂司𨽻校尉劉毅曰卿以朕方漢何帝也對曰可方桓靈帝曰吾徳雖不及古人猶克己為政又平呉會混一天下方之桓靈其已甚乎對曰桓靈賣官錢入官庫陛下賣官錢入私門以此言之殆不如也帝大笑曰桓靈之世不聞此言今有直臣故不同也何劭為中庶子與其兄遵等受故鬲令袁毅貨雖經赦宥宜皆禁止事下廷尉詔曰太保與毅有累世之交遵等所取差薄一皆置之太保劭父曽也裴秀為尚書令安逺䕶軍郝詡與故人書云與尚書令裴秀相知望其為益有司奏免秀官武帝詔曰不能使人之不加諸我古人所難交闗之事詡之罪耳豈尚書令能防乎其勿有所問司𨽻校尉李熹復上言騎都尉劉尚為尚書令裴秀占官稻田求禁止秀詔又以秀幹翼朝政有勲績於王室不可以小疵掩大徳使推正尚罪而觧秀禁止焉王宏為汲郡太守在郡有殊績武帝下詔稱之俄遷衛尉河南尹大司農無復能名更為苛碎坐桎梏罪人以泥墨塗面置深坑中餓不與食又擅縱五嵗刑以下二十一人為有司所劾帝以宏累有政績聽以贖論元帝初阮孚辟太傅府遷騎兵屬避亂渡江帝以孚為安東㕘軍􅅫髪飲酒不以王務嬰心時帝既用申韓以救世而孚之徒未能棄也雖然不以事任處之轉丞相從事中郎終日酣縱嘗為有司所按帝每優容之琅琊王裒為車騎將軍鎮廣陵高選綱佐以孚為長史帝謂曰卿既統軍府郊壘多事宜節飲也孚答曰陛下不以臣不才委之以戎旅之重臣􅀈俛從事不敢有言者竊以今王蒞鎮威風赫然皇澤遐被賊冦斂迹氛祲既澄日月自朗臣亦何可爝火不息正應端拱嘯詠以樂天年耳遷黄門侍郎散騎常侍嘗以金貂換酒復為所司彈劾帝宥之周訪㕘鎮東軍事時有與訪同姓名者罪當死吏誤収訪訪奮擊収者數十人皆散走而自歸於帝帝不之罪康帝時阮裕在東山徴散騎常侍領國子祭酒俄而復以為金紫光禄大夫領琅邪王師經年敦逼並無所就御史中丞周閔奏裕及謝安違詔累載並應有罪禁止終身詔書貰之後魏道武攻中山未克六軍乏粮民多匿榖問羣臣以取要方畧御史中丞崔逞曰取椹可以助粮故飛鴞食椹而改音詩稱其事帝雖衘其侮慢然兵既須食乃聽以椹當租逞又曰可使軍人及時自取過取則落盡帝怒曰内賊未平兵人安可觧甲仗入林野而収椹乎是何言歟以中山未㧞故不加罪太武時古弼為安西將軍及議征凉州與尚書李順臧言􅋽州乏水草不宜行師帝不從既克姑臧微嫌之以其有將畧故弗之責也孝文性寛慈進食者曽以熱羮傷帝手又曽於食中得蟲穢之物並笑而恕之延興三年六月詔曰往年縣召民秀二人問以守宰治狀善惡具聞將加賞罰而賞者未幾罪者衆多肆法傷生情所未忍今特垂寛恕之恩申以觧網之恵諸為民所列者特原其罪盡行貸之穆罷丁公崇之後世為虎牢鎮將頻以不法致罪孝文以其勲徳之胄讓而赦之房伯玉初為河間太守坐弟叔玉南奔徙於北邉後亦叛入齊為南陽太守孝文尅宛伯玉面縛而降孝文引見伯玉并其㕘佐二百人詔伯玉曰朕承天馭宇方欲一清寰域卿蕞爾小戍敢拒六師卿之愆罪理在不赦伯玉對曰臣既小人備荷驅使縁百口在南致拒皇畧罪合萬死孝文曰凡立忠抱節皆應有所至若奉逆君守迷節古人所不為卿何得事逆賊蕭鸞自貽伊譴伯玉對曰臣愚癡晩悟罪合萬斬今遭陛下乞生命孝文曰凡人唯有兩途知機獲福背機受禍勞我王師彌歴歲月如此為降何人有罪且朕前遣舎人公孫延景城西共卿語曰天無二日土無二王卿答曰在此不在彼天道悠逺變化無方卿寧知今日在此不在彼乎伯玉乞命而已更無所言從弟思安為樂陵太守頻為伯玉泣請故特宥之高道悦為治書侍御史時孝文南征徴兵閱集雒陽道悦以使者侍御主文中散元志等稽違期㑹奏舉其罪時道悦兄觀為外兵即中而任城王澄奏道悦有黨兄之負孝文詔責然以事經恩宥遂寢而不論劉昶孝文時除都督呉越楚彭城諸軍事義陽拒守不克昶乃班師太和十九年帝在彭城昶至入見昶曰臣奉勅専征克殄兇醜徒勞士馬久淹歲時有損威靈伏聽斧鉞帝曰朕之此行本無攻守之意正欲伐罪弔民宣威布徳二事既暢不失本圖朕亦無克而還豈但卿也宣武時李澤為東都守以贓徴還帝使武士提以入澤􅎨言曰將軍今日猶自禮賢耶帝笑而捨之孝莊時温子昇為南主客郎中脩起居注曽一日不直上黨王天穆時録尚書事將加捶撻昇遂逃遁天穆甚怒奏人代之帝曰當世才子不過數人豈能為此便相放黜乃寢其奏北齊神武時李義深初為魏龍驤將軍義旗初歸帝於信都以為大行臺郎中中興初除平南將軍鴻臚少卿義深見爾朱兆兵盛遂叛帝奔兆兆平帝恕其罪以為大丞相府記室㕘軍後周太祖以耿豪為驃騎大將軍開府儀同三司豪性凶悍言多不遜帝惜其驍勇每優容之隋文帝開皇六年雒陽男子高徳上書請帝以為太上皇傳位皇太孫帝曰朕承命撫育蒼生日旰孜孜猶恐不逮豈學近代帝王事不師古傳位於子自求逸樂者哉賀若弼坐怨望除名為民歲餘復其爵位帝亦忌之不復任使然每宴賜遇之甚厚開皇十九年帝幸仁夀宫讌王公詔弼為五言詩詞意憤怨帝覽而容之虞慶則使突厥還㑹帝幸晉王第置酒㑹羣臣高熲等帝因曰高熲平江南虞慶則降突厥可謂茂功矣楊素曰皆由至尊威徳所被慶則曰楊素前出兵武牢硤石若非至尊威徳亦無克理遂與互相長短御史欲彈之帝曰今日計功為樂宜不須劾蕭摩訶子世畧在江南作亂摩訶當從坐帝曰世畧年未二十亦何能為以其名將之子為人所逼耳因赦摩訶王仁恭為驃騎將軍典蜀王軍事及蜀王以罪廢官屬多罹其患高祖以仁恭素質直置而不問唐太宗嘗辟人從兩騎幸故未央宫遇一衛士佩刀不去車駕至惶懼待罪太宗謂之曰仗司之失非汝之罪今若付法當死者便數人我所不忍因赦之而去李靖破突厥送隋蕭后於京師初有降胡言中國人有潜通書啓於蕭后者至是中書舎人楊文權請鞫之帝曰往國家未定匈奴侵擾愚民寡識或當思念今天下寧一反側自安既往之愆不須問也韋挺授銀青光禄大夫行黄門侍郎攝魏王泰府事時泰有寵庶人承乾多罪失太宗微有廢立之意中書侍郎杜正倫以漏洩禁中語徙邉挺時亦預其事太宗謂之曰朕已罪正倫不忍更置卿於法尋拜太常卿承乾之廢也挺又以交搆聞太宗竟寢其事待之如初十九年為御史大夫從李勣擊破葢牟城詔挺統兵鎮守挺素無威畧不堪其憂乃貽書於術士公孫常置辭怨望㑹常以他罪自殺於其囊中得挺所與常書太宗召挺問之對多不以實太宗尤責讓之仍以宿經驅策不忍加誅授朝散大夫守象州刺史江夏王道宗從征遼築土山攻安市城土山壊道宗失於部署為賊所據歸罪果毅傅休愛斬之道宗跣行詣旗下請罪太宗曰漢武殺王恢不如秦穆赦孟明土山之失且非其罪捨而不問賈敦頤為洺州司馬有罪當下獄太宗欲宥之御史再三執劾太宗曰為國者先教化而後刑罰億兆之人豈能無過吾去其太甚者耳若有奏劾即陷酷刑孝子猶不可從厥父而况道義合能久事其君乎竟赦之高宗永徽五年雍州㕘軍薛景宣以脩築京師羅郭城功畢上封事言漢恵帝城長安後尋即殂落今者營築必有災咎又楊正道有隋之孽流竄北蕃随突厥歸化便即詐死今日猶存有人隱藏猶未彰露帝大驚遂令推究正道死日既知景宣詐妄左僕射于志寧等以其言渉不順請誅之帝曰景宣因上封得罪恐塞直言之路特令免之乾封中帝謂司戎少常伯楊武曰卿在司戎授官多非其才何也武曰臣妻剛悍此其所囑不敢違阻帝嘉其不隱笑而遣之中宗神龍元年正月即位麟臺監張易之等先以濳圖逆亂伏誅詔有與易之往復書疏並焚之用安反側百寮莫不稱慶𤣥宗開元六年十月癸亥貝州人張希嶠上表不經詔曰比每晝至側景夜至分宵期聞政要用忘寢食但能㑹理不責其文貝州張希嶠上表及詞義鄙淺有同諧弄據其不遵理度固合與罪恐後來正直其謂我何故特矜愚不寘於法且令河南府示語逓還本貫十二年七月黔中道招討使内侍楊思朂討平溪州賊帝謂賊帥覃行章等曰汝破傷州縣殘害吏人據汝罪名合寘刑法我好生惡殺特捨汝命可授汝商州洵水府别將往欽哉肅宗至徳二載九月元帥廣平王將収西京王當闕不乗馬歩出水馬門而後乗馬管崇嗣為王都虞侯先王上馬御史大夫顔真卿進狀奏彈之帝曰朕兒每欲出朕一一教示之其何敢失禮崇嗣老將患脚朕欲優容乃自曉諭之狀還真卿乾元元年六月戊午詔曰朕聞古先哲王慎罰以䘏人命脅從罔理罪疑從輕成湯有觧網之仁光武有焚書之令葢恵彼至理受其刑章是以法不濫加刑所以措也間者時遭冦逆患在干戈衣冠之流逼廹者衆事不獲己情稍輕焉頃者委在三司窮其五聽議重者累中刑典稍輕者猶被勾留况時久淹延人皆窘乏衣食且猶不給家屬又悉乖離艱難之憂無甚於此豈朕泣辜宥罪作人父母之意耶况恩澤頻加科條逓减原其事狀稍近平人豈可尚議遷貶窮其反側萬方有責罪實在予一物失所憂將誰屬永言憫念用惻於懐而兩京官應被賊逼授偽官三司所推問未了者一切放免其賊中守本官至冬方選曽受驅馳既寛刑典免其貶降並至來冬放選合得官時仍委所司量事輕重注擬其已貶官者續有處分上元二年正月詔安禄山偽置三司有名應在流貶者原情議罪負國誠深朕已捨其殊死竄于荒徼固當與衆共棄長為匪人然皆邦家舊臣嘗挂纓冕使其終没裔土永慝慚魂孰若貸以殊私俾令効節亦准例處分兼委中書門下量輕重類例奏取處分代宗大厯八年閏十一月渤海質子盗脩衮龍擒之詞云慕中華文物帝矜而捨之十年二月乙巳昭義軍節度留後薛萼以失守至自相州見於銀臺門之内殿河陽三城使常休明至自河陽素服待罪並特詔釋放徳宗貞元初韓遊環為邠寧節度其子欽緖與李廣𢎞謀逆事發腰斬遊環以其子大逆表乞代免且自詣闕謝帝固止之寄任如初遊環又械繫欽緒二子送京師請從坐帝亦捨之及遊環來朝以其子欽緒謀逆素服待罪朝堂帝釋之勞遇如初憲宗元和六年正月丙中朔御含元殿受朝賀攝太尉張茂昭宰臣于頔李藩並行事失儀詔釋罪十二年十月乙卯淮西平甲申詔其淮西諸州鎮官吏將健雖被脅汙皆非本心除同惡巨蠧者一切不問穆宗以元和十五年正月即位七月鹽州送到先刼烏白洲鹽女子拓拔三娘并婢二人召入内親詰之赦罪送本州敬宗即位召嶺南節度使孔戣為吏部侍郎長慶中或告戣在南海時家人受賂帝不之責改右散騎常侍文宗太和元年三月賛善大夫李方現與惡徒燕昵為其所毆詔以事經恩蕩釋之而不問其父保義軍節度使寰知之奏請削奪方現官階仍乞追赴晉州杖之並不許開成四年五月諫議大夫韋力仁仗内奏曰臣伏見軍家捉錢事侵府縣軍司與府縣各有區别今富商大賈𨽻軍司著一紫衫府縣莫制當陛下至聖至明之時固不宜有此禁軍是陛下衛士警夜廵晝以備不虞不合攪擾百姓以干法理伏乞陛下戒勅統帥令各歸其分則人情獲安天下幸甚帝問宰臣等奏曰凡語事須當力仁所言乃欲生事帝曰葢論名分耳李􅀈曰軍家所出榜是自捉軍人百姓即府縣自捉此無乖名分帝曰當廷論此亦似近名然諫官論事不合怪之後唐莊宗入汴齊州刺史孟璆上章請死詔原之璆初事帝為騎將天祐十三年帝與劉鄩莘縣對壘璆領七百騎奔梁至是來請罪帝報之曰爾當吾急引七百騎投賊何面目相視璆惶恐請死帝恕之未幾移貝州刺史明宗天成三年五月有軍人於軍噐庫内盗銀鎗一條帝捨其罪侍臣以盗庫噐於宫内其罪難恕帝竟釋放長興二年五月泗水縣令李雲獻時務䇿天下民多除田土徴租稅其餘不計是何物色並請配定稅錢勅㫖益國利民方為良策越常生事則亂􅂜章李雲粗讀儒書曽居假官所進條件既廣徴引仍繁而於職畧之間荒唐頗甚且鄉閭之内苦樂不無則可沿古制而檢繩度物宜而均濟豈得請行峻法大撓羣情詳暴歛之品題無稍通之氣味况五兵乍息兆庶小康忽有此陳未測何意便合勘窮疏率申舉科條尚縁言路方開政刑務恤特從寛宥俾自省循九月丙戌太傅致仕王建立不由詔旨二日至京而通事不敢引對留於閣門久之自至後樓朝見帝以故將不之罪是月庚戌獻時務人前澤州録事參軍韓滔所司面試策問一件無詞以對勅旨以納言路廣進策人多别出試題葢防假手韓滔獨隳衆例輒出已懐敢以閒詞有違明勅而又情惟自􅃷事匪合宜朝堂干禄之時尚猶倔强州縣親人之處可任作為合舉違勅之科加以不恭之罪縁當誕月刑法務寛宜殿一選末帝清泰元年楊凝式為兵部侍郎帝按兵於懐覃凝式在扈從之列頗以心恙諠譁於軍砦帝以其才名優容之詔遣歸雒二年三月太常丞史在徳上疏言事其略曰朝廷任人率多濫進稱武士者不閑計䇿雖披堅執鋭戰則棄甲窮則背軍稱文士者鮮有藝能多無士行問䇿謀則杜口作文字則倩人所請虛設具貟枉耗國力逢陛下維新之運是明文革弊之秋臣請應内外所管軍人凡勝衣甲者請宣下本都本將貳考試武藝短長權謀深淺居下位有將才者便㧞為大將居上位無將畧者移之下軍其東班臣寮請内出䇿題下中書令宰臣面試如下位有大才者便㧞居大位處大位無大才者即移之下僚其疏大約如此盧文紀等見其奏不悦班行亦多憤悱故諫官劉濤楊昭儉等上䟽請出在徳䟽辨可否宣行中書覆奏亦駁其錯誤帝召學士馬裔孫謂曰史在徳語太凶其實難容朕初臨天下須開言路若朝士以言獲罪誰敢言者爾代朕作詔勿加在徳之罪詔曰左補闕劉濤等奏太常丞史在徳所上章䟽中書門下駁奏未奉宣諭乞將施行分明黜陟朕嘗覽貞觀故事見太宗之理以貞觀升平之運太宗明聖之君野無遺才朝無闕政盡善盡羙無得而名而陜縣丞皇甫徳㕘輙上封章恣行訕謗人臣無禮罪不容誅賴文貞彌縫恕徳叅之狂瞽徴奏太宗曰陛下思聞得失只可恣其所陳若所言不中亦何損於國家朕每思之誠要言也遂得下情上逹徳盛業隆太宗之道彌光文貞之節斯著朕惟寡昧獲奉宗祧業業兢兢懼不克荷思欲率循古道採㧞時材懐忠抱直之人虛心渇見便佞詭随之説杜耳惡聞史在徳近所貢陳誠無避忌中書以文字紕繆比類僣差改易人名觸犯廟諱請歸憲法以示戒懲葢以中書既委㕘詳合盡事理朕纉承前緒誘勸將來多言數窮惟聖祖之所戒千慮一得冀愚者之可從因覽文貞之言遂寛在徳之罪爰令停寢不遣宣行劉濤等官列諫垣宜陳讜議請定短長之理以行黜陟之文昔魏徴則請賞徳叅今濤等請黜在徳事同言異何相逺哉將議允俞恐虧開納方今朝廷粗理俊乂畢臻留一在徳不足為多去一在徳不足為少苟可懲勸朕何愛焉但縁情在傾輸理難黜責濤等敷奏朕亦優容宜體含洪勉思竭盡凡百在位悉聽朕言晉高祖天福四年秋七月御史奏太子賓客韓惲國子祭酒唐汭左丞崔税吏部侍郎盧𨗳左司郎中趙上交左賛善大夫李専美太常博士祝格左龍武將軍李藏左衛將軍李崇本入閣後至衝班失儀帝以人之小過不用情不撓法雖曰失恭恕而已矣遂不令罰俸少帝天福七年襄州行營都部署高行周奏收下逆賊城其安從進并骨肉並自焚擒到從進男𢎞賛斬之差人監送襄州行軍司馬安友規到闕釋罪賜服帶靴笏周太祖初親族及王俊家並為劉銖所害帝入京城銖夫婦祼露以席自蔽平旦執之下獄帝遣人讓銖曰與公同事先帝寧無故人之分吾家屬屠㓕公雖奉君命加之酷毒一何忍哉今亦有妻兒家屬公還惜否銖但稱死罪時羣臣方集帝言曰前青州劉侍中墜馬傷甚昨夜又軍士凌逼殆有微生據法屠人家族罪不容誅然寃報往還循環不息今欲奏太后止罪其身原其家屬何如羣臣稱善及奏從之廣順初太祖念嘗同奉漢室乃詔賜銖妻陜州莊宅一區世宗顯徳元年三月親征河東四月戊申命河陽節度使劉詞押歩騎三千赴雒州皆樊愛能何徽之部兵也上以既誅其主將不欲加罪於衆乃遣詞押領分屯於雒州二年尚書吏部貢院進新及第進士李覃等一十六人所賦詩賦文論䇿文詔曰國家設貢舉之司求英俊之士務詢文行方中科名比聞近年以來多有濫進或以年老而得第或因媒勢以出身今嵗所放舉人試令看騐果見紕繆須至去留其李覃何曮楊徽之趙隣幾等四人宜放及第李震等一十二人藝學未精並宜勾落且令苦學以俟再來禮部侍郎劉温叟失於選士頗屬因循據其過尤合行譴謫尚示寛恕特與矜容劉温叟放罪册府元龜卷四十一
