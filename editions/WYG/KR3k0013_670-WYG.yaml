body:
  text: 册府元龜卷六百七十宋王欽若等撰内臣部誣搆皇居上體乎環極邇臣内法乎四星由古以還典掌有序兩漢而下寵任彌渥或參居重職或分幹諸局惟忠信所以絜矩惟謹厚可以守官在視聽而必公實聰明之攸賴而有履用弗率爱惡相攻萌邪僻之端恣驕吝之氣罔懲私忿寖成厚誣素業用隳鄙志是逞消鑠媒孼枝葉生於謀議朋比締搆機穽浚於城府觸類而長何可勝言虞典曰朕墍讒説殄行其來逺矣恵牆伊戾宋寺人也恵牆氏伊戾名宋芮司徒生女子芮司徒宋大夫赤而毛棄諸堤下共姬之妾取以入共姬宋伯姬也名之曰棄長而美平公入夕平公共姬子也共姬與之食公見棄也而視之尤尤甚也姬納諸御嬖生佐佐元公惡而婉佐貌惡而心順太子痤美而狠貌美而心狠戾合左師畏而惡之合左師向戍伊戾為大子内師而無寵楚客聘於晉過宋太子知之請野享之公使徃伊戾請從之公曰夫不惡女乎夫為太子也對曰小人之事君子也惡之不敢逺好之不敢近敬以待命敢有二心乎縱有共其外莫共其内伊戾為太子内師不行恐内侍廢闕臣請徃也遣之至則㰱用牲加書徵之詐作盟處為太子反徵驗也而騁告公騁馳也曰太子將為亂既與楚客盟矣公曰為我子又何求對曰欲速言欲速得公位公使視之則信有焉有盟徵也問諸夫人與左師夫人佐母棄也則皆曰固聞之公囚太子太子曰唯佐也能免我以其婉也召而使請曰日中不來吾知死矣左師聞之聒而與之語聒讙也欲使佐失期過期乃縊而死佐為太子公徐聞其無罪也乃烹伊戾寺人桺有寵於宋平公太子佐惡之華合比曰我殺之欲以求媚太子桺聞之乃坎用牲埋書詐為盟處而告公曰合比將納亡人之族亡人華臣也㐮十七年奔衛既盟於北郭矣公使視之有焉遂逐華合比合比奔衛於是華亥欲代右師亥合比弟欲得合比處乃與寺人桺比從為之徵曰聞之久矣聞合比欲納華臣公使代之代合比為右師後漢曹節為小黄門和帝時用事於中梁商為大將軍遣子冀不疑與交友然宦者忌商寵任反欲陷之永和四年中常侍張逵遽政内謁者令石光尚方令傅福冗從僕射杜永連謀共譛商及中常侍曹騰孟賁云欲徵諸王子圗議廢立請收商等案罪帝曰大將軍父子我所親騰賁我所爱必無是但汝曹共妬之耳逵等知不用懼迫遂出矯詔收縛騰賁於省中帝聞震怒勅宦者李歙急呼騰賁釋之逵等悉伏誅李閏為中黄門安帝少號聰敏及長多不徳而乳母王聖以鄧太后久不歸政慮有廢置嘗與閏候伺左右及安帝親政宫人先有受罰者懐怨恚因誣告鄧后兄特進隲弟虎賁郎將悝侍中𢎞閶先從尚書鄧訪取廢帝故事謀立平原王徳帝聞追怒令有司奏悝等大逆無道遂廢西平矦廣宗葉矦廣徳西華矦忠陽安矦珎都鄉矦甫徳皆為庶人隲以不與謀但免特進遣就國宗族皆免官歸故郡沒入隲等貲財田宅徙鄧訪及家屬扵逺郡郡縣逼迫廣宗及忠皆自殺又徙封隲為羅矦隲與子鳳並不食而死隲從弟河南伊豹廣遼將軍舞陽矦遵將作大匠暢皆自殺惟廣徳兄弟以母閻后戚屬得留京師樊豐為中常侍順帝陽嘉中李固對䇿言不當封爵阿母王聖使樊豐之徒乘權放恣帝即時出阿母還舍諸常侍悉叩頭謝罪而疾固言直因詐飛章以陷其罪事從中下大司農黄尚等請之於大將軍梁商又僕射黄瓊救明固事久乃得拜議郎黄龍楊佗孟叔李建張賢史汎王道李元李剛等九人並為中常侍順帝時與阿母山陽君宋娥更相貨賂求髙官増邑又誣㒺中常侍曹騰孟賁等永和二年發覺並遣就國減租四分之一矦覧為中常侍靈帝建寧二年喪母還家大起塋冢督郵張儉因舉奏覧貪侈奢縱前後請奪人宅三百八十一所田一十八頃起立第宅十有六區皆有髙樓池苑堂閣相望飾以綺畫丹漆之屬制度重深僭類宫省又豫作壽塚生而自為塚曰壽塚石椁雙闕髙廡百尺廡廊下周屋也破人居室發掘墳墓虜奪良人妻略婦子及諸罪釁請誅之而覧伺候遮截章竟不上儉遂破覧冢宅籍沒資財具言罪狀又奏覧母生時交通賓客干亂郡國復不得御御進也覧遂誣儉為鈎黨及故長樂少府李膺太僕杜密等皆夷滅之又苑康為太山太府時張儉既殺覧母案其宗黨賓客或有逃匿太山界者康既嘗疾閹宦因此皆窮相收掩無得遺脫覧大怨之誣康與兖州刺史第五種及都尉壺嘉詐上賊降徵康詣廷尉獄減死罪一等徙日南又史弼為河東太守被一切詔書當舉孝廉弼知多權貴請託乃豫勅㫁絶書屬覧果遣諸生齎書請之并求假鹽稅積日不得通生乃說以他事謁弼而因逹覧書弼大怒命左右引出楚捶數百遂付安邑獄即日考殺之覧大怨遂詐作飛章下司隸誣弼誹謗檻車徴之吏人莫敢近者惟前孝廉裴瑜送到淆澠之間大言於道傍曰明府摧折虐臣選徳報國如其獲罪足以垂名竹帛願不憂不懼弼曰誰謂荼苦其甘如薺昔人刎頸九死不恨及下廷尉詔獄平原吏人奔走詣闕訟之又前孝廉魏劭毁變形服詐為家僮贍䕶於弼弼遂受誣事當棄市劭與同郡人賣郡邸行賂於覧得減死罪一等論輸左校時人或譏曰平原行貨以免君無乃蚩乎陶丘洪曰昔文王羑里南散懐金史弼遭患義夫獻寳亦何疑焉於是議者乃息王甫靈帝時為中常侍初桓帝時渤海王悝謀為不道貶為癭陶王後因甫求復國許謝錢五千萬後帝遺詔復為渤海王悝知非甫功不肯還謝錢甫怒隂求其過初迎立靈帝道路流言悝恨不得立欲鈔徵書而中常侍鄭颯中黄門董騰竝任俠道剽輕數與悝交通甫伺察以為有姦密言告司隸校尉叚紀明熹平元年遂收颯送北寺獄使尚書令廉忠誣奏颯等謀迎立悝大逆不道遂詔冀州刺史收悝考實又遣大鴻臚持節與宗正廷尉之渤海迫責悝自殺妃妾一十人子女七十人妓女二十四人皆死獄中傅相以輔導王不忠悉伏誅悝立二十五年國除衆庶莫不憐之又靈帝宋皇后無寵而居正位後宫幸姬衆共譖毁初甫枉誅渤海王悝及妃宋氏妃即后之姑也甫恐后怨之乃與大中大夫程响共讙言皇后挾左道祝詛帝信之光和元年遂策收璽綬后自致㬧室以憂死曹節為中常侍靈帝光和二年陽球為司隸校尉奏誅中常侍王甫太尉叚紀明等其冬司徒劉郃與球議收案張讓及節節等知之共誣白球等嘗與籓國交通有惡意數稱永樂聲勢取受狼籍歩兵校尉劉納及永樂少府陳球交通書疏謀議不軌帝大怒遂收球送雒陽獄誅死妻子徙邊趙忠夏惲竝為中常侍靈帝中平元年黄巾賊起帝問中常侍吕强所宜施行强欲先誅左右貪濁者大赦黨人料簡刺史二千石能否帝納之於是忠惲等遂共搆强云與黨人共議朝廷數讀霍光傳言其欲謀廢立也强兄弟所在竝皆貪穢帝不悦使中黄門持兵召强强聞帝召怒曰吾死亂起矣丈夫欲盡忠國家豈能對獄吏乎遂自殺忠惲復譖曰强見召未知所問而就外草自屏有姦當審外草自屏謂在外野草自殺也遂收捕宗親沒入財産焉張譲為中常侍時張角作亂侍中向栩上便宜頗譏刺左右不欲國家興兵但遣將於河上北向讀孝經賊自當消滅讓讒栩不欲令國家命將出師疑與張角同心欲為内應收送黄門北寺獄殺之蜀黄皓宦人也以信任用事時劉永始封魯王建興八年改封為甘陵王初永憎皓皓乃譖搆永於後主稍疎外永至不得朝見者十餘年孟玖諂事成都王穎穎聽玖之言將害陸雲而江統蔡克力諫穎遲廻者三日盧志又曰昔趙王殺中䕶軍趙浚赦其子驤驤詣明公而擊趙即前事也蔡克入至穎前叩頭流血曰雲為孟玖怨隙逺近莫不聞今果見殺罪無影驗將令羣心疑惑竊為明公惜之僚屬隨克入者數十人流涕固請穎惻然有宥雲色孟玖扶穎入催令殺雲前趙郭猗劉聰時為中宫僕射聰以弟北海王乂為皇太弟又以子晉王粲為相國羽儀威尊踰於東宫太師盧志等勸乂謀反乂不從東宫舍人荀裕告之帝使寇威卜拙監守東宫禁乂朝賀猗有憾於乂謂粲曰太弟于主上之世懐不逞之志此則殿下父子之深讎四海蒼生之重怨也而主上過垂寛仁猶不替二尊之位一旦有風塵之變臣竊為殿下寒心且殿下髙祖之世孫主上之嫡統凡在含齒孰不係仰萬機事大何事與人臣昨聞太弟與大將軍相見極有言矣若事成許以主上為太上皇大將軍為皇太子乂又許衛軍為大單于二王已許之矣二王居不疑之地竝握重兵以此舉事事何不成臣謂二王兹舉禽獸之不若也背父親人人豈親之今又茍貪其一切之力耳事成之後主上豈有全理殿下兄弟故在㤀言東宫相國單于在武陵兄弟何肯與人許以三月上已因讌作難事淹變生宜早為之所春秋傳曰蔓草猶不可除况君之寵弟乎臣屢啓主上主上性敦友于謂臣言不實刑臣刀鋸之餘而蒙主上殿下成造之恩故不慮逆鱗之誅每所聞必言兾垂採納臣當入言之願殿下不泄密表其狀也若不能信臣言可呼大將軍從事中郎王皮衛軍司馬劉惇假之恩顧通其歸善之路以問之必可知也粲深然之猗密謂皮惇曰二王逆狀主相已具知之矣卿同之乎二人大驚曰無之猗曰此事必無疑吾憐卿親舊幷見族耳於是欷歔流涕皮惇大懼叩頭求哀猗曰吾為卿作計卿能用不二人皆曰謹奉大人之敎猗曰相國必問卿卿但云有之若責卿何不先啓卿即答云臣誠負死罪然仰謂主上聖性寛慈殿下篤於骨肉恐言成詿偽故也皮惇許諾俄而召問二人至不同時而辭若畫一粲以為信然初靳準從妹為乂孺子淫于侍人乂怒殺之而屢以嘲準準深慚恚說粲曰東宫萬機之副殿下宜自居之以領相國使天下知早有所繫望也至是準又説粲曰昔孝成距子政之言使王氏卒成簒逆可也粲曰何可之有準曰然誠如聖旨下官亟欲有所言矣但以徳非更生親非皇宗恐忠言暫出霜威已及故不敢耳粲曰君但言之準曰聞風塵之言謂大將軍衛大将軍及左右輔皆謀奉太弟尅季春搆變殿下宜為之備不然恐有商臣之禍粲曰為之奈何準曰主上愛信於太弟恐卒聞未必信也如下官愚意宜緩東宫之禁固勿絶太弟賓客使輕薄之徒得與交遊太弟既素好待士必不思防此嫌輕薄小人不能無逆意以勸太弟之心小人有始無終不能無貫髙之流也然後下官為殿下露表其罪殿下與太宰拘太弟所與交通者考問之窮其事原主上必以無将之罪罪之不然今朝望多歸太弟主上一旦晏駕恐殿下不得立矣於是粲命卜抽引兵去東宫後遂搆成其罪宋華願兒者内臣也前廢帝愛幸有盛寵時戴法興為越騎校尉而廢帝年已漸長凶志轉成欲有所為法興每相禁制每謂帝曰官所為如此欲作榮陽聖帝意不平又賜與願兒金帛無算法興嘗加裁減願兒甚恨之帝使願兒出入市里察聽風謡而道路之言謂法興為眞天子帝為應天子願兒因此告帝又云法興是孝武左右復久在宫闈今将佗人作一家深恐此坐席非復官許帝遂發怒免法興官遣還田里尋賜死於家後魏宗愛太武時為秦郡公恭宗之監國也每事精察愛天性險暴行多非法恭宗每銜之給事阮道盛侍郎任平誠等任事東宫微為權勢帝頗聞之二人與愛素不睦愛憤道盛等案其事遂搆告其罪詔斬道盛等於都街趙黑文成時為選部尚書仍加侍中是時尚書李訢亦有寵於獻文與黒對管選部訢奏中書侍郎崔覧為東徐州北部主書郎公孫處顯為荆州選監公孫􅕋最為幽州皆曰有能也實有私焉黑疾其虧亂選體遂爭扵殿庭曰以功授官因爵與禄國之常典中書侍郎尚書郎者曹監勲能俱立之不過列郡今訢皆用為方州臣實為惑獻文疑之曰公孫處顯公孫􅕋最為訢所厚於是黒與訢遂為深隙訢竟列黑為監藏時多所截沒先是法禁寛緩百司所典與官竝食故多所損折遂黜為門士黑自以為訢所陷歎恨終日廢寢㤀食規報前怨踰年還入為侍御散騎常侍侍中尚書左僕射復兼選部如昔黑微告訢專恣訢遂出為徐州及其将獲罪也黑搆成以誅之然後食甘寢安志在於職唐程元振為内侍代宗即位自矜定策之功忌嫉宿将以郭子儀功髙難制巧行離間請罷副元帥加實封七百户充肅宗山陵使子儀既謝恩上表進肅宗所賜前後詔勅因自陳訴曰臣徳薄蟬翼命輕鴻毛累蒙國恩猥厠朝列㑹天地震盪中原血戰臣北自靈武冊先皇帝乃舉兵而南大蒐於岐陽先帝憂勤宗社託臣以家國俾陛下掃兩京之妖祲陛下雄圖丕㫁再造區宇自後不以臣寡劣委文武之二柄外敷邦教内調鼎飪是以嘗許國家之死實荷日月之明臣本愚賤言多詆直慮此招謗上凟冕旒陛下居髙聽卑察臣不二皇天后土察臣無私伏以器忌滿盈日増兢惕焉敢偷全久妨賢路臣自受恩塞下制敵行間東西十年前後百戰天寒劔折濺血染衣野宿魂驚飲冰傷骨䟦涉艱阻出沒死生所仗惟天以至今日陛下曲垂恵奨念及勤勞貽臣詔書一千餘首聖旨微婉慰諭綢繆録微臣一時之功成子孫萬代之寳自靈武河北河南彭原鄜坊河東鳳翔兩京絳州臣所經行賜手詔勅書凡二十卷昧死上進庶煩聰覧詔答曰朕不徳不明俾大臣憂疑朕之過也朕甚自愧公勿以為慮帝以子儀頃同患難收復兩京禮之逾厚時史朝義尚據雒陽元帥雍王率師進討帝欲以子儀副之而魚朝恩程元振亂政殺裴茂來瑱子儀既為所間其事遂寢乃留京師自西蕃入寇車駕東幸天下皆咎程元振諫官屢論之元振懼又以子儀復立功不欲天子還京勸帝且都洛陽以避蕃寇帝然之子儀累表請車駕還京乃止吕太一大歴初為嶺南矯詔募兵為亂乃以台州刺史韋倫為韶州刺史兼御史中丞韶連郴三州都團練防禦使竟遭太一黷貨反間貶信州司馬薛盈珎徳宗貞元十五年為鄭滑監軍使姚南仲為節度使盈珎怙勢干奪軍政南仲不從數為盈珎讒搆於帝帝頗疑之十六年盈珎遣小使程務盈馳驛表奏南仲誣譖頗甚南仲裨将曹文洽時奏事赴京師竊知盈珎表中語文洽私懐忿怒遂晨夜兼道追務盈至長樂驛及之與同舍宿中夜殺務盈沉務盈表於厠中乃自殺日旰驛吏闢門見血傷滿地旁得文洽二緘一緘狀末告於南仲一緘表理南仲寃且陳謝殺務盈帝聞其事頗駭動髙重昌憲宗元和九年為江西監軍使誣奏李位決四十剝邑配役於建陵仍籍沒其家許遂振為嶺南監軍使時楊於陵為節度使遂振悍戾貪恣干撓軍政於陵奉公潔已遂振無能奈何以飛語上聞憲宗初驚惑賴裴垍軰為於陵申理帝感悟乃除吏部侍郎遂振終得罪王守澄為神策中軍尉文宗太和五年二月戊戍守澄奏得本軍衙前虞候豆盧著狀告宰相宋申錫與十宅漳王謀反末後帝令中人急召宰相入赴延英中人赴宰相牛僧儒私第至安邑里北街馬奔乏死於道即於僧孺里第易所乘馬趨以復命是日宰相路隨李宗閔牛僧孺宋申錫旬休在私第悉聞命赴召至中書東門中人曰所召無宋申錫始知被罪望延英以笏叩額而退隨等至帝以守澄所奏狀示隨等隨等相顧皆愕然初守澄於浴堂以鄭注所搆告於帝登時郎於市里追捕又将以二百騎就靖恭里屠申錫之家㑹内官馬存亮同入見爭於帝曰今謀反者宋申錫耳盍不召南司他相㑹議今卒然為此京師企足自亂矣守澄不能難乃止三月己亥右軍差人於宋申錫宅輔孔目官張全貞家人買子信縁等又於十六宅及市肆追捕胥吏以成其獄庚子詔以宋申錫為太子右庶子辛丑上巳休假宰相竝入中書帝在延英中人復出宣事勅旨令召師保僕射尚書丞郎常侍給事諫議舍人御史中丞京兆尹大理卿同於中書及集賢院雜驗北軍豆盧著所告宋申錫反狀翌日壬寅國忌宰相復入中書便赴延英召對應昨日議事官帝竝召入親自詢訪太子太保趙宗儒以年老宣令不拜已而兩省諫官自常侍巳下至午時復於延英請對帝即時召入於是左常侍崔𤣥亮給事中李固言諫議大夫王質補闕盧鈞之舒元褒羅泰蔣係裴休竇宗直韋温拾遺李羣韋端符丁居䀲袁都等一十四人皆伏玉階下請北軍所告不於中鞫帝曰吾已謀於公卿大僚訖卿等且出𤣥亮固言援引古今辭理懇切𤣥亮涕泣久之帝意稍解乃曰今即與宰相商議𤣥亮等退即於是日復召宰相入議翌日癸卯詔漳王降封巢縣開國公又詔宋申錫可守開州司馬員外置同正員仍馳驛發遣内官飛龍使開府儀同三司馬存亮表請致仕初守澄奏據當軍同正将兼衙前虞候豆盧著狀告前供内品官市典朱訓與前十六宅宫市典晏敬則及宰相宋申錫親事王師文等同謀反逆幷取受宋申錫銀絹稱與漳王計㑹直上之事兼受漳王信物等臣准告狀追晏敬則等推問咸伏取受及得支証人貨賣銀絹櫃坊主人賣物牙郎及見晏敬則從十六宅西門至漳王院取信累路往過所勾當門司所繇十六宅判官張忠榮等不告報官司各得款狀百姓朱訓得款稱取受絹五百二十疋銀五挺又責得朱訓狀稱先與宰相宋申錫親事王師文知聞多時因語話次其人稱伏狀宋申錫多年本使云聖人多疾又縁太子小未堪成立其次合是漳王要結託佗日之事問訓有何人通徹得訓即云比與晏敬則兄弟相識多時委知其人是十六宅宫市使典曽伏事漳王來王師文見訓說遂濳報宋申錫知至閏十二月初訓與晏敬則王師文同於宣平坊商量此事前後約二十餘度去年閏十二月内一度見宋申錫云一切委王師文君但與王師文計議訓前後三度於師文邊領得銀三挺又於晏敬則得銀一挺又前後兩件共領得絹二百八十疋轉分付晏敬則又正月内訓謀王師文作人何公義同於十六宅門外待晏敬則至午時敬則從十六宅出來便身上解下白吳綾汗衫一件白熟線綾一疋充信宋申錫通徹漳王結託佗日之事幷取受宋申錫銀絹之愆請准法科㫁又品官晏敬則兩度取受宰相宋申錫絹及銀共二百八十五兩絹二百八十疋銀五挺賣得一百五十七貫文去年十二月内見朱訓説宋申錫有一事擬結託取漳王至望在他日便説宋申錫欲與漳王進奉銀結向後事王師文道宋申錫云國無皇太子恐後漳王相㤀所以教敬則向漳王邊取得白吳綾汗衫子白熟線綾一疋充信物竝付敬則上繫着王師文朱訓解下分付王師文因兹便説宋申錫意道國無太子欲擬商量阿郎為太子恐阿郎不知佗日相㤀具漳王便言虗實敬則云實其憑虗搆詭譎如此甲辰勅宋申錫已從别勅處分朱訓晏敬則宜各決痛杖一頓處死作人何公義配流康州奴楊忠義配流春州竝錮身所在差人防押遞過至彼到具月日聞奏王師文委御史臺下縣及諸道切捕捉獲日聞奏餘各委本司疎理處分其餘被誣詿決杖配流追捕凡數十百人天下莫不寃之初申錫為翰林學士帝初即位嘗患中人權柄太盛自元和寳歴比致宫禁之禍及守澄領禁兵恃其宿舊䟦扈尤甚有鄭注者依恃守澄為姦利入軍禁賣官販權中外咸扼腕帝雅聞之不能堪申錫時居内廷帝察其忠厚可任之事嘗因召對從容言及守澄外縱鄭注無可奈何者以密旨諭申錫令與外廷朝臣謀為去之計且約即日當命為相申錫頓首謝未幾自翰林出拜尚書右丞逾月加平章事内知申錫素謹直寵遇超軰數月之後剖㫁循常望實不相副既以鄭注附押守澄貨賂大行乃除王璠為京兆尹喻之中旨璠不能行而注與守澄潜為備漳王者帝之爱弟也賢而有人望有豆盧著者職屬禁軍與注親表注又告以其謀遂令著結成申錫與漳王反狀白於守澄翌日奏上其謀交織璅密帝不省其詐遂罷申錫為右庶子時京城恟恟衆庶譁言以為宰相真連十宅反百寮震駭居一二日方審其詐諫官伏閣懇論帝赫怒叱諫官出者數四時中外屬望大寮三數人廷辨其事僕射竇易直曰人臣無將將而必誅聞者愕然唯京兆尹崔琯大寺卿王正雅連上疏請出内獄且曰王師文未獲即獄未具且請出豆盧著與申錫同付外廷勘當人情翕然推重初議申錫抵死顧物論不可又將投於嶺表帝終寤外廷之言乃有開州之命初申錫既被罪怡然不以為意自中書歸私第止于外㕔素服以俟命妻出謂之曰公為宰相人臣位極於此何負天子反乎申錫對曰吾自書生被厚恩擢相位不能鋤去姦亂反為所羅網夫人察申錫豈反者乎因相與泣數行下申錫自居内廷及為宰相以時風侈靡居要位者尤取納不顧風俗不暇更方逺古且與貞元時甚相背矣申錫至此約身謹潔尤以公廉為已任四方問遺悉無受者既被罪為有司驗劾多獲其四方受領所還問遺之狀朝野為之歎息丁未詔曰朕以菲徳奉兹丕構雖䖍恭修已不敢暇逸而誠亮格物未能𢎞敷遂使姦兇懐非覬之端藩戚有陷君之責外詿宰臣傍連禁吏怵惕自咎中宵靡寧親臨鞫訊改寘刑典顧為大義實愧御家猶慮憸狡之徒忿怨相冒遂至誣引或連非辜載懐靦慙宜諭深旨應緣漳王及宋申錫等被論告事除今月六日已前准勅旨處分幷捕捉王師文一人外餘竝一切不問宣示中外用體朕懐申錫雖為寃謫姦人尚未快其意是日詔下後中外為寛解田令孜為神策軍中尉僖宗光啓元年十月壬子詔隨邠寧節度使朱玫以本軍兼統鳳翔兵共三百萬屯沙苑攻河中王重榮出師拒之先是其年春有詔追封王重榮父縱及加父母妻國邑號時以令孜假子為使重榮恃勲待之不厚及還乃謀於令孜令孜因奏兩池之利請歸正省重榮知之又有詔移鎮欲以太原軍送王處存至任重榮不自安乃抗表述令孜擅權復修偽詔以書諭太原云近奉密詔俟公送處存至此則令當鎮圖之皆朱温朱玫與令孜惑朝廷也使者因出偽詔示之時太原與汴師有隙遂累上表請討温玫朝廷務紓國難每降詔抑之繇是太原頗以私嫌積憤於帝既因河府之間遂起兵上章以誅田令孜朱玫為名西門重遂為左觀軍容使初天威都馬軍都將賈徳晟以李順節非罪見殺曽宣怨言於人重遂誣以他罪奏帝帝遂誅之時都下馬千餘騎皆驚散西投鳳翔自是朝廷勢削鳳翔軍盛矣後唐李延安李從襲吕知柔皆供奉中官也荘宗同光三年伐蜀魏王繼岌為都統郭崇韜為副十月十九日下鳳州㧞固鎮敗賊三泉收劍利興元梓州望風納欵勢如破竹其招懐制置官吏補署師行籌畫軍書告喻皆出招討府繼岌承命而已時荘宗令延安從襲知柔為都統府綱紀見崇韜行府職事殷繁將吏請謁輻湊降人爭為賂遺其都統府惟大將省謁牙門索然繇是大為詬恥及軍至偽蜀六軍使王宗弼歸欵行賂先招討府洎王衍以成都降崇韜居王宗弼之府先是宗弼徙王衍於西宫衍之珍玩妓妾宗弼擇其善者邀留以奉崇韜求為蜀帥崇韜子廷誨令蜀人列狀見魏王請奏崇韜為蜀帥繼岌覧狀召崇韜謂曰主上倚侍中如衡華尊於廟堂之上以制四夷必不置元老於蠻夷之地況予不敢議此請諸公詣闕自陳李從襲等謂繼岌曰郭公收蜀部人情意在難測王宜自備繇是隂相猜察帝令中官向延嗣齎詔喻蜀促令班師詔使至崇韜不郊迎於禮稍倨延嗣情憤告從襲曰乃公何者魏王貴太子也主上萬福郭公專弄威柄旁若無人昨令蜀賊請己為帥令郭廷誨擁從出入貴擬王者所與遊狎無非軍中驍果蜀士兇豪晝夜妓樂相歡指天畫地近聞廷誨白父請表以為蜀帥又曰兩川數百萬户珍玩貨泉靡所不有地形阻固自是一秦大人何不善自為謀此語流聞逺近父子如此可見其心今諸軍將校無非郭氏之黨魏王懸軍孤弱一朝班師事恐紛擾吾屬莫知暴骨之所矣因相向垂涕向延嗣廻具以事奏劉皇后泣告於帝請保全繼岌帝復閲蜀簿且曰人言蜀中珠玉金銀不知其數何如是之微也延嗣奏曰臣前到西川見招討府吏言蜀川珍貨皆積崇韜之門言崇韜自入蜀所得金萬兩銀四十萬兩錢百萬名馬千匹王衍愛妓六十樂工百犀玉竒帶百郭廷誨有金銀十萬兩犀玊帶五十藝色絶妓七十樂工七十佗財物稱是臣見魏王所居除公府外蜀人賂遺不過匹馬束帶唾壺麈柄而已蜀府空竭無足為怪帝初聞蜀人留崇韜已不平之又聞所得妓樂寳馬怒見顔色即日命中官馬彦珪馳往蜀川視崇韜去就如恭命班師則已若别有遲留跋扈之狀則與繼岌圗之彦珪請見劉皇后遽曰臣見向延嗣説蜀中事勢今已不可主上遣臣偵視凡禍機之發間不容髪何能於三千里外緩急資決皇后再言之帝曰傳言未知事實吾以闗外兵柄付之無故行事否則患生詎可便令果決皇后不得請因自為教與繼岌令殺崇韜是時成都雖定諸州山林羣盜結聚崇韜令任圜張筠分道招撫孟知祥未至慮發軍之後别生變故稍緩班師之期正月六日馬彦珪至時大軍定取十二日發離成都令任圜權知蜀事以俟知祥諸軍部署已定彦珪出皇后教示繼岌曰大軍將發他無釁端安得為此負心之事公軰勿復言從襲等泣白曰聖上旣有密勅王若不行使彼沿路訪知則中途有變為患轉深繼岌曰帝無詔書徒以皇后文字安得殺招討使從襲巧造事端以間繼岌既無英㫁即僶俛從之詰旦從襲傳繼岌命召崇韜計事繼岌登樓以避之崇韜方昇階魏王爪牙奮擿以碎其首其子廷信從父請死即殺之李從襲率兵圍招討府以攻廷誨擒而殺之收其妓樂寳馬崇韜有子五人廷誨廷信從父死於蜀第三子廷説為尚書郎在雒陽及馬彦珪報殺崇韜令楊彦珞誅於其家第四子廷讓誅於鄴第五子廷議誅於太原家産籍没明宗即位詔令歸葬所有郭氏田宅皆賜崇韜妻周氏廷誨有男奴哥廷讓有男行奴皆稚齒姻族保之獲免令周氏鞠養於晉陽之故第崇韜服勤盡節左右王家草昧艱難功無與比西平巴蜀宣暢皇威誣搆而誅其禍已酷身死之日夷夏寃之李存乂為鄜州節度使同光四年伏誅於邸存乂荘宗異母弟也郭崇韜之子壻崇韜既誅其後朝野駭惋羣居州處議論紛然帝令閹竪綱紀察訪外事言存乂於諸將坐上嘗訴郭氏無罪言詞怨望又於妖術人楊千郎所居飲酒聚㑹兇豪攘臂垂泣楊千郎者魏州賤民自言傳墨子術於婦翁能役使隂物帽下召食物果實之類又蒱博必勝人有拳握之物以法必取又說鍊丹乾水易人形破扃鐍或云可騐初在鄴都貴要間皆神竒之白於帝甚蒙待遇官至檢校尚書郎賜紫其妻出入宫掖頗承恩寵人士有憑之而仕宦者及在雒陽輕薄少年畢與之遊皇弟存乂存渥元行欽嘗朋滛於其家至是姦閹欲盡去郭氏之黨故誣吿之千郎亦被其禍册府元龜卷六百七十
