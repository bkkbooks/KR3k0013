body:
  text: 册府元龜卷八百七十一宋王欽若等撰總錄部救患第二晉荀顗仕魏為侍中時曹爽專權何晏等欲害太常傅嘏顗營救得免成都王頴武帝第十六子也陸機為殿中郎趙王倫輔政引為相國参軍倫將簒位以為中書郎倫之誅也齊王冏以機職在中書九錫文及禪詔疑機與焉遂收機等九人付廷尉頼頴與呉王晏並救理之得减死徙邊遇赦而止石崇為太僕劉輿兄弟少時為王愷所嫉愷召之宿因欲坑之崇素與輿等善聞當有變夜馳詣愷問二劉所在愷迫卒不得隱崇徑進於後齋牽出同車而去語曰年少何以輕就人宿輿深徳之傅祗為侍中時裴楷子瓚娶楊駿女及駿誅楷以姻親收付廷尉頼祗救䕶得免猶坐去官孫琰為都官從事時江統為愍懐太子洗馬及太子廢䖏金墉賈后諷有司不聼宫臣追送統與官臣冐禁至伊水拜辭道左悲泣流漣都官從事悉收統等付河南雒陽獄付郡者河南尹樂廣悉散遣之繫雒陽者猶未釋琰說賈謐曰所以廢徙太子以為惡故爾東宫故臣冐罪拜辭涕泣路次不顧重辟乃更彰太子之徳不如釋之謐語雒陽令曹攄繇是皆免蕭隆為殿中將兵齊王冏被誅初兵交冏左司馬嵇紹奔散赴宫有持弩在東閣下者將射之隆見紹姿容長者疑非凢人趨前㧞箭於此得免崔岳字元嵩為朝鮮令初劉曜有罪亡與曹恂奔於劉綏綏匿之於書匱載送於王忠忠送之朝鮮嵗餘饑窘變姓名客為縣卒岳見而異之推問所繇曜叩頭自首流涕求哀岳曰卿謂崔元嵩不如孫賔碩乎何懼之甚也今詔捕卿甚峻百姓間不可保也此縣幽僻勢能相濟縱有大急不過解印綬與卿俱去爾吾既門衰無兄弟之累身又薄祐未有兒子卿猶吾子弟也勿為過憂大丈夫處身立世鳥獸投人要欲濟之而况君子乎給以衣服資供書傅曜遂從岳質通疑滯恩顧甚厚岳從容謂曜曰劉生姿宇神調命世之才也四海脫有㣲風揺之者英雄之魁卿其人矣曹恂維於屯厄之中事曜有君臣之禮故皆徳之郭陽為將軍太安中并州饑亂石勒與諸小胡亡散乃自鴈門還依寗驅北澤都尉劉監欲縳賣之驅匿之獲免勒於是潛詣納降都尉李川路逢郭敬泣拜言饑寒敬對之流涕以帶貨鬻食之并給以衣服勒謂敬曰今者大饑不可守窮諸胡饑甚宜誘將冀州就穀因執賣之可以兩濟敬深然之㑹建威將軍閻粹說并州刺史東瀛公騰執諸胡於山東賣充軍實騰使陽與張隆虜羣胡將詣冀州兩胡一枷勒時年二十餘亦在其中數為隆所毆辱敬先以勒屬陽及兄子時陽敬族兄也是以陽時毎為解請道路饑病頼陽時而濟裴楷為鎮南將軍初大康末汝南王亮被害亮子西陽縣公散騎常侍羕時年八歳楷與之親姻竊之以逃一夜八遷故得免秦璩與陳訓同鄉人也訓善占候㑹陳敏作亂遣弟宏為歴陽太守訓謂邑人曰陳家無王氣不乆當滅宏聞將斬之璩時為宏参軍乃說宏曰訓善風角可試之如不中徐斬未晚也乃赦之祖納為太子中庶子齊王冏建議趙王倫收冏弟北海王實及前皇門郎𢎞農董祚弟艾與冏俱起皆將害之納上疏救焉並見宥石勒門幹鄧攸為郎時幹也幹失名氏永嘉末攸為河南太守沒于勒勒宿忌諸官長二千石聞攸在營馳召將殺之攸至門門幹識攸攸求紙筆作辭幹候勒和恱致之勒重其辭乃命勿殺錢舉呉興武康人也沈勁亦武康人也勁父充與王敦搆逆衆敗而逃為部曲將呉儒所殺勁當坐誅舉匿之得免郭舒為荆州别駕荆州士人宗廞嘗因酒忤刺史王澄澄怒叱左右棒廞舒厲色謂左右曰使君過醉汝軰何敢妄動澄恚曰别駕狂邪誑言我醉因遣人搯其鼻炙其眉頭舒跪而受之澄意少釋而廞遂得免荀羡為徐州刺史監青州軍事又領兖州刺史鎮下邳羡自鎮來朝時蔡謨固讓司徒不起中軍將軍殷浩欲加大辟以問於羡羡曰蔡公今日事危明日必有桓文之舉浩乃止桓冲溫弟也初朱綽兄憲及斌為西中郎袁真所殺綽從溫平夀陽時已死輒發棺戮尸溫怒將斬之冲苦請得免嗣譙王尚之為驃騎諮議叅軍初王國寳之誅也散騎常侍劉鎮之彭城内史劉㳙子徐州别駕徐放並以同黨被收將加大辟尚之言於㑹嵇王道子曰刑獄不可廣宜釋鎮之等道子以尚之昆季並居列職毎事仗焉乃從之曇氷者沙門也王廞起兵為王恭所殺子華時年十二在軍中與廞相失隨曇氷逃竄時劉牢之搜檢覓華甚急曇氷使華提衣幞隨後津邏咸疑焉華行遲氷呵罵云奴子怠懈行不及我以杖捶華數十衆乃不疑繇此得免宋張榮為右將軍王𤣥謨隊主初張暢為南譙王義宣長史朝廷徴為吏部尚書未行義宣反遂拘留之及義宣敗於梁山暢為軍人所掠衣服都盡遇𤣥謨乗輿出營暢已得敗衣遂排𤣥謨上輿𤣥謨甚不悅諸將請殺之榮救之得免報送都下付廷尉見原王誕為司馬元顯驃騎長史元顯討桓𤣥欲悉誅桓氏誕固陳桓循等與𤣥志趣不同繇此得免循誕甥也及𤣥得志誕將見誅循為之陳請又言循等得免之繇乃徙誕廣州何尚之為尚書左僕射及元㓙劭弑立進位司空領尚書令時三方興義將佐家在都者劭悉欲誅之尚之誘說百端並得全免沈煥為散騎郎元㓙劭弑逆南郡王義宣起義劭收義宣世子恢及弟悰憬􅳜繫於外令煥防守之煥密有歸順意謂恢等禍福與諸郎同之願勿憂及臧質自白下上趨廣莫門劭令煥殺恢等煥乃解其梏率所領數十人與恢等向廣莫門欲出門者拒之煥曰臧公已至㓙人走矣此司空諸郎並能為諸君得富貴非徒免禍而已勿相留亦值質至因以得出沈慶之為建威將軍封始興公初申坦坐事將棄市羣臣為之請莫能得將行刑慶之入市抱坦慟哭曰卿無罪為朝廷所枉誅我入市亦當不乆市官以白孝武乃原生命繫尚方尋被宥復為驍騎將軍又王𤣥謨為寧朔將軍北征受輔國將軍蕭斌節度及兵敗斌將斬之慶之固諫曰佛狸威震天下控弦百萬豈𤣥謨所能當且殺戰將以自弱非良計也斌乃止王僧朗殷叡外曾祖也叡祖元素元嘉末坐染太初事誅叡遺腹亦當從戮僧朗啓孝武救之得免南齊戴僧静初没于魏後叛還淮隂太祖撫蓄之常在左右僧静於都載錦出為歐陽戍所得繫兖州獄太祖遣薛淵餉僧静酒食以刀子置魚腹中僧静與獄吏飲酒既醉以刀刻械手自折鎻發屋而出歸太祖匿之齋内以其家貧年給糓千斛王晏為世祖領軍司馬中軍從事中郎初晏父普曜為沈攸之長史嘗慮攸之舉事不得還時王奐為吏部轉普曜為内職晏深德之及奐為丹陽尹而晏仕世祖府奐從弟藴反世祖謂晏曰王奐宋家外戚王藴親同逆黨既其羣從豈能無異意我欲具以啓聞晏叩頭曰王奐脩謹保無異志晏父母在都請以為質世祖乃止王儉為侍中尚書令丹陽尹時江斆除太子中庶子領驍騎將軍未拜門客通􅂍利世祖遣使撿覈斆藏此客躬自引咎帝甚有怪色儉從容啟帝曰江斆若能治郡此便是具美爾帝意乃釋王廣之為右衛將軍初李元履與王融㳺狎及王融誅鬰林勅元履隨廣之北征宻令於北殺之廣之先為元履父安人所厚又知元履無過甚擁䕶之㑹鬰林敗死元履拜謝廣之曰二十二載父母之年自此已外丈人之賜也梁徐勉為尚書僕射沈約嘗侍晏值豫州獻栗徑半寸髙祖竒之問曰栗事多少與約各疏所憶少帝三事出謂人曰此公䕶前不讓即羞死帝以其言不遜欲抵其罪勉固諌乃止栁世隆為郢州長史沈攸之舉兵圍郢城范雲為攸之所得令送書入郢城内或欲誅之雲曰老母弱弟懸命沈氏若其違命禍必及親今日就戮甘心如薺世隆素與雲善乃免之禇淵為太宰初齊髙帝受禪悉誅宋宗室近屬將及劉季連等淵素善季連固請乃免侯子鑒侯景將也姚僧垣為湘東王記室叅軍侯景之亂逃歸呉興及兵大至乃被拘繫子鑒素聞其名深相器遇因此獲免後魏崔浩為司徒初趙逸仕姚興歴中書侍郎為興將齊難軍司征赫連屈丐難敗為屈丐所虜拜著作郎太武平統萬見逸所著曰此豎無道安得為此言乎作者誰也其速推之浩進曰彼之謬述亦猶子雲之美新皇王之道固宜容之太武乃止拜逸中書侍郎冦謙之嵩山道士也毛脩之初在雒敬事謙之脩之為宋武帝子義興司馬後沒于魏時謙之為太武所信敬營䕶之故得不死遷於平城胡叟初從宋益州刺史吉翰入蜀時蜀沙門法成鳩集僧旅㡬千人鑄丈六金像宋文帝惡其聚衆將加大辟叟聞之即赴丹陽啓申其美遂得免焉復還於蜀法成感之遺其珍物價值千餘金叟謂法成曰緯蕭何人能棄明珠吾以徳請財何為也無所受北齊陳元康字長猷為右丞初髙祖葬后崔㥄竊言黄頷小兒堪當重任不崔暹外兄李慎以㥄言告暹暹啓文襄絶㥄朝謁㥄要拜道左帝發怒曰黄頷小兒何足拜也於是鎻㥄赴晉陽而訊之㥄不伏暹引邢子才為證子才執無此言㥄在禁與子才曰卿知我意屬太丘不子才出告㥄子瞻云尊公意正應欲結姻於陳元康瞻有女乃許妻元康子求其父元康為言之於帝曰崔㥄名望素重不可以私處言語便以殺之帝曰若免其性命猶當徙之遐裔元康曰㥄若在邊或將外叛以英賢資冦敵非所宜也帝曰既有季珪之罪還令輸作可乎元康曰嘗讀崔琰傳追恨魏武不𢎞㥄若在所作而殞後世豈道公不殺也帝曰然則奈何元康曰崔㥄合死朝野莫不知之公誠能以寛濟猛特輕其罰則仁徳彌著天下歸心乃舍之㥄進謁奉謝帝猶怒曰我雖無堪忝當大任被卿名作黄頷小兒金石可銷此言難滅和雒興為葛榮下都督時溫子昇為廣陽王深東北道行臺郎中深軍敗子昇為葛榮所得雒興與子昇舊識以數十騎濳送子昇得逹冀州還京李楷執其手曰卿今得免足使夷甫慙徳自是無復宦情閉門讀書勵精不已劉靈助麄踈無頼以卜筮為爾朱榮功曹恭軍建議初榮於河隂王公卿士悉見屠害時奉車都尉盧道䖍兄弟亦相率朝於行宫靈助以其州里衞䕶之繇是朝士與諸盧相隨免害者數十人王則為侯景行臺郎中顔之推為郢州管記侯景䧟郢州欲殺之頼則以免囚送建鄴景平還江陵楊愔字遵彦為僕射陳王瑜琳弟也為侍中永定元年使齊以陳郡袁憲為副齊以王琳之故執而囚之文宣帝毎行載死囚以從齊人呼曰供御囚毎有他怒則召殺之以快其意瑜及憲並危殆數矣遵彦憫其無辜毎存䕶之天嘉二年還陳後周張曜初為後魏將韓軌長史樊深初仕後魏征虜將軍孝武西遷樊王二姓舉義為東魏所誅深改姓易名㳺學於汾晉之間習天文及筭厯之術後為人所告因送河東曜重其儒學延深至家因是更得逃隱隋房彦謙初仕齊為齊州治中齊亡歸于家周武帝遣柱國辛遵為齊州刺史為賊帥輔帶劍所執彦謙以書諭之帶劒慙懼送遵還州諸賊並各歸首元巖初仕周為内史中大夫宣帝嗣位為政昏暴京兆郡丞樂運乃輿櫬詣朝堂陳帝八失甚切至帝大怒將戮之朝臣皆恐懼莫有救者巖謂人曰臧洪同日尚可俱死其况比干乎若樂運不免吾將與之俱斃詣閤請見言於帝曰樂運知書奏必死所以不顧身命者欲取後世之名陛下若殺之乃成其名落其術内爾不如勞而遣之以廣聖度運因獲免何稠為開府耿詢伎巧絶人初為官奴後賜蜀王秀及秀廢當誅稠言於髙祖曰詢之巧思若有神異誠為朝廷惜之帝於是特原其罪唐許紹為陜州都督武徳中蕭銑據荆楚江嶺未賔遣開府李靖安輯之靖從逺將數人馳𫝊至金州與廬江王瑗共擊之破蠻賊鄧雒進至䕫州阻蕭銑不得前髙祖遲之因更發怒隂勅紹斬之紹惜其才為之請命於是獲免温彦博為中書令先是楊纂為長安令有婦人袁氏妖逆為人所告纂詰問之不得其狀袁氏後又事發伏誅太宗以纂為不忠將殺之彦博以纂過誤罪不至死固諌乃赦之李安逺朔方人隋雲州刺史徹子也少襲父爵城陽公與王珪友善大業初珪坐叔頗當配流安逺為之營䕶獲免後為正平令朱敬則長安三年為正諫大夫同鳯閣鸞臺平章事時御史大夫魏元忠鳯閣舍人張說為張易之兄弟所誣搆將䧟重辟諸宰相無敢言者敬則獨具疏申理曰元忠張說素稱忠直而所坐無名若令得罪豈不失天下之望也乃得免死哥舒翰初為河西節度王忠嗣衙將忠嗣以為大斗軍副使使別為將討吐蕃天寳六載擢授隴右節度副使河源軍使其冬王忠嗣下獄勅召翰方代之諸將或請以金帛行救忠嗣者翰惟以一單囊行曰若道之將行以是足矣如其不行多金帛亦奚以為翰至𤣥宗素聞其才虛心待之遂以為鴻臚卿兼西平太守攝御史中丞代忠嗣為隴右節度翰極言救忠嗣𤣥宗不從起入禁中翰叩頭隨帝而前言詞慷慨聲涙俱下帝感而寛之遂貶忠嗣為漢陽太守王綽大歴中為路嗣㳟江西觀察判官嗣恭將䧟害判官李泌誅戮之綽說諭救解獲免李忠臣為淮西節度為大將李希烈所逐單騎赴京師因留奉朝請時常侍張渉承恩用事坐受賄財事露帝將以法繩之渉即帝在東宫時侍讀也忠臣奏曰陛下貴為天子而先生以乏財抵法以愚臣觀之非先生之過也帝意解但令歸田里前湖南觀察辛京杲嘗以忿怒杖殺部曲有司劾奏京杲殺人當死帝將從之忠臣奏曰京杲合死乆矣帝問之對曰渠伯叔某於某處戰死兄弟某於某處戰死渠從至戰所獨不死是以知渠合死矣帝亦憫然不令加罪改授王傅而已張光晟京兆人起於行間天寳末哥舒翰兵敗潼關大將王思禮所乘馬中流矢而斃光晟時在騎卒之中因下馬授思禮思禮問其姓名不告而退思禮隂記其形貎嘗使人宻求之無何思禮為河東節度使其偏將辛雲京為代州刺史屢為將校譛毁思禮怒焉雲京惶懼不知所出光晟時𨽻雲京麾下因間進曰光晟素有徳於王司空比不言者耻以求恩授賞爾今使君憂迫光晟請奉命一見司空則使君之難可解雲京然其計而令之太原及謁思禮未及言舊思禮識之遽曰爾豈非吾故人乎何相見之晚也光晟遂陳潼關之事思禮大喜因執其手感泣曰吾有今日子之力也求子頗乆終此相逢何慰如之即命同榻而坐結為兄弟光晟遂述雲京之屈思禮曰雲京比渉謗言過亦不細今為故人特舍之矣杜佑為淮南節度時徐州張建封卒濠州刺史杜兼誣奏從事李藩揺動軍情徳宗詔佑殺之佑素重藩懐詔旬日不忍發因引藩論釋氏曰果報之事信有之不藩曰信然曰審如此君宜遇事無恐因出詔藩覽之無動色曰某與兼信為報也佑曰慎勿出口吾已宻論持百口保君矣徳宗得佑解怒不釋追藩赴闕及召見望其儀形曰此豈作惡事人乃釋然除秘書郎裴度為東都留守司徒中書令太和九年李訓等伏誅其親戚踈逺者皆在囚繫或以加流竄度上疏理之收䘏者數十家李勉為梁州都督山南西道觀察使勉以故吏前宻縣尉王晬勤幹俾攝南鄭令俄有詔處死勉問故乃為權倖所誣勉詢將吏曰帝方以牧宰為人父母豈以譛言而殺不辜乎即停詔拘晬飛表上聞晬遂獲宥而竟為執政所非追入為大理卿謁見靣陳王晬無罪政事脩舉盡力吏也肅宗嘉其守正即日除太常少卿王晬後以推擢拜大理評事龍門令終有能名時稱知人後唐墨君和鎮州鼓刀之士也鎮州王鎔初襲父位為節度鎔為晉人所侵求救於幽州李威威出軍為鎔援時威兵勢方盛以鎔冲弱有窺圖之志威再來赴援為弟儔奪據其位退無歸路鎔乃舘威於寳夀佛寺鎔以威因已而失國又感其援助之大事之如父鎔謁威於其舘威隂遣部下伏甲劫鎔抱持之即並轡歸府舍鎔軍拒之竟殺威鎔本踈瘦時年始十七當與威並轡之時雷雨驟作屋瓦皆飛有一人於缺垣中望見鎔識之遽挾于馬上肩之而去翼日鎔但覺頂痛頭偏盖因為有力者所挾不勝其苦故也旣而訪之則君和也遂厚賞之任圜為潞州刺史從莊宗攻鎮州及城潰誅元惡之外官吏咸保其家屬亦圜横身以固䕶焉周王知權唐景思紀綱之僕也景思初仕漢為㳂淮廵檢屢挫淮賊時史𢎞肇滛刑黷貨多羅織南北富商殺之以利其財大開告宻之門景思部下有僕夫希求無厭雖委曲待之不滿其心一日拂衣而去見𢎞肇言景思受淮南厚賂私貯器械欲為内應𢎞肇即令親吏殿三十騎徃收之告者謂收吏曰景思多力十夫之敵也見便殺之不然則無及矣收騎至景思迎接有欲擒之者景思以兩手抱之大呼曰寃哉景思何罪設若有罪死亦非晚何不容披雪公等皆丈夫安忍如此都將命釋之引告者靣證景思言受淮南賂景思曰我從人家人並在此若有十緡貯積亦是受賂言我貯甲杖除官賜外有一事亦是私貯使者捜索其家惟衣一笥軍籍糧簿而已乃寛之景思曰使者但械繫送我入京先是知權在京聞景思被誣乃見𢎞肇曰唐景思赤心為國某服事三十年孝於父母義於朋友被此誣枉何以伸陳某請先下獄願公追釋景思免至寃横𢎞肇慜之令在獄日與酒食景思既桎梏就路潁亳之人隨至京師衆保證之𢎞肇乃令鞫告事者具伏誣䧟即斬之遂奏釋景思册府元龜卷八百七十一
