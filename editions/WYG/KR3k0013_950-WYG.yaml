body:
  text: 册府元龜卷九百五十宋王欽若等撰總録部咎徵洪範咎徵叙其惡行春秋災異謂之譴告非獨繫扵邦國亦将儆扵人臣自昔不忠其君無徳而禄貌言視聽有斁扵􅂜倫偽采滛㤗卒䧟乎非道者曷嘗不妖興扵未兆怪見於所居葢天意之弗蠲俾神物之申儆故有五行之屬萬類之衆殊形異狀失其常理提耳注目使之先覺而覩機若瞑不䏻知變以至于禍敗者可勝言哉若乃地名䜟亡天象示化車服牆屋無故而隳落衣服器皿忽焉而變故至有賢臣良士行道之人而不䏻免者其命也夫漢爰盎景帝時為太常病免居家初梁孝王欲求爲漢嗣盎進說其後語塞塞不行也梁王以此怨盎使人刺盎刺者至闗中問盎稱之比白不容口廼見盎曰臣受王命刺君君長者不忍刺君然後刺者十餘曹曹軰也備之盎心不樂家多怪廼之培生所問占音棓秦時賢士善術者也還梁刺客後曹果遮刺殺盎安陵郭門外梁孝王武景帝時入朝歸國意忽忽不樂北獵梁山有獻牛足出背上孝王惡之六月中病熱六日薨足當處下所以輔身也今出背上象孝王背朝而干上也臨江閔王榮以孝景前四年爲皇太子四嵗廢為臨江王三嵗坐侵廟壖地為宫壖音人縁切上徵榮榮行祖於江陵北門祖者送行之祭因享飲也昔黄帝之子纍祖好逺逰而死於道故後人以為行神也既上車軸折車廢廢壊也江陵父老流涕竊言曰吾王不反矣榮至詣中尉府對簿中尉郅都簿責訊王簿皆音薄戸切訊問也音信王恐自殺燕剌王旦昭帝時謀反令羣臣皆装是時天雨虹下屬宫中屬猶注也音之欲切飲井水竭厠中豕羣出壊大官竈厠養豕圂也圂音胡困切烏鵲鬬死䑕舞殿端門中端門正門也殿上戸自閉不可開天火燒城門大風壊宫城樓折㧞樹木流星下墜后姬以下皆恐王驚病使人祠葭水台水葭水在廣平南和台水在鴈門葭音家台音怡王客呂廣等知星為王言當有兵圍城期在九月十月漢當有大臣戮死者王愈憂恐謂廣等曰謀事不成妖祥數見兵氣且至奈何㑹葢王舍人父燕倉知其謀告之繇是發覺伏誅昌邑王賀昭帝時聞人聲曰熊視而見大熊左右莫見以問郎中令龔遂遂曰熊山野之獸而来入宫室王獨見之此天戒大王恐宫室將空危亡象也賀不改寤後卒失國霍禹宣帝時嗣其父大将軍光博陸侯為大司馬光兄孫雲爲中郎将雲弟山爲奉車都尉初光夫人顯毒殺許后帝始聞之而未察及雲山禹有邪謀長安男子張章告之詔雲山不宜宿衛山禹等甚恐顯夢第中井水溢流庭下竈居樹上又夢大将軍謂顯曰知捕兒不知児見捕不亟下捕之亟疾下捕之亟音居力切第中䑕暴多與人相觸以尾畫地鴞數鳴殿前樹上鴞惡聲之鳥也古者室屋髙大則通呼為殿爾非止天子宫中第門自壊雲尚冠里宅中門亦壊巷端人共見有人居雲屋上徹瓦投地就視亡有大怪之禹夢車騎聲正讙来捕禹舉家憂愁㑹謀逆事發雲山自殺禹要斬顯棄市董賢哀帝時爲大司馬第門自壊時賢以私愛居大位賞賜無度驕嫚不敬大失臣道見戒不改後賢夫妻自殺家徒合浦翟義字文仲為東都太守王莽居攝義舉兵将誅莽義兄宣居長安先義未發家數有怪言義未發兵之前夜聞哭聲聽之不知所在宣教授諸生滿堂有狗従外入齧其中庭羣鴈數十比驚救之巳皆斷頭比必寐切狗走出門求不知處宣大惡之謂後母曰東郡太守文仲素俶儻俶音土厯切今數有惡怪恐有妄爲而大禍至也太夫人可歸爲棄去宣家者言歸其本族自絶扵翟氏以避害母不肯去後數月義舉兵敗其家遂族王匡仕王莽為太師時盜賊起遣匡與更始将軍㢘丹東東謂東出也祖都門外天大雨霑衣上長老嘆曰是爲泣軍果為光武所敗後漢更始自雒陽而西初發李松奉引馬驚奔觸北宫鐵柱門三馬皆死續漢書曰馬禍也時更始失道将亡之徵彭寵光武建武初為漁陽太守其妻數惡夢又多見怪變一説夢嬴祖冠幘踰城髠徒推之又寵堂上聞蝦蟇聲在火鑪下鑿地求之不得也卜筮及望氣者皆言兵當從中起寵疑子后蘭卿質漢歸故不信之使將兵居外無親扵中寵齋獨在便室蒼頭子密等斬寵及妻頭詣闕岑彭爲征南大将軍建武中討公孫述至武陽所營地名彭亡彭聞而惡之欲徙㑹暮蜀刺客詐為亡奴降夜刺殺彭任文公巴郡閬中人爲治中從事公孫述時蜀武擔石折文公曰噫西州智士死我乃當之自是常㑹聚子孫設酒食後三月果卒魏李勝為河南尹嵗餘㕔事前屠蘓壊小草屋也令人更治之小材一枚激墮正撾受符吏石虎頭斷之後旬日遷爲荆州刺史未及之官而敗楚王彪本封白馬齊王嘉平初東郡有訛言云白馬河出妖馬夜過官牧邉鳴呼衆馬皆應眀日見其跡大如斛行數里還入河兖州刺史令狐愚以彪有智勇及聞此言遂與王凌謀共立之事泄凌愚被誅彪賜死張臶鉅鹿人養志不仕正始元年戴鵀之鳥巢臶門隂臶告門人曰夫戴鵀陽鳥而巢門隂此凶祥也乃援琴歌詠作詩二篇旬日而卒公孫淵爲遼東太守司馬宣王以太尉出征圍其城時有長星色白有芒鬛自襄平城西南流扵東北墜于梁水城中震摺無㡬何淵攻南圍突出宣王縦兵擊敗之斬扵梁水之上星墜之所初淵家數有怪犬冠幘絳衣上屋炊有小兒蒸死甑中襄平北市生肉長圍各數尺有頭目口喙無手足而動搖尋誅滅蜀諸葛亮為丞相大将軍屯扵五丈原有長星墜亮之壘是年亮卒吳諸葛恪為荆楊二州牧督中外諸軍事時孫峻因民之多怨衆之所嫌搆恪欲爲變與孫亮謀置酒請恪恪将見之夜精爽擾動通夕不寐眀將盥潄聞水腥臭侍者授衣衣亦臭恪怪其故易衣易水其臭如初意惆悵不恱嚴畢趨出犬䘖引其衣恪曰犬不欲我行乎還坐頃刻乃復起犬又䘖其衣恪令從者逐犬升車初恪将征淮南有孝子者著縗衣入其閣中從者白之令外詰孝子曰不自覺入時中外守備亦悉不見衆皆異之出行之後所坐㕔事屋棟中折自新城出往東興有白虹見其船還拜蔣陵白虹復繞其車俄爲峻所殺恪已被殺其妻在室使婢語曰汝何故血臰婢曰不也有頃愈劇又問婢曰汝眼目視瞻何以不常婢蹷然起躍頭至扵棟攘臂切齒而言曰諸葛公乃爲孫峻所殺於是大小知恪死矣而吏兵尋至鄧嘉爲戍将殺豬祠神治畢懸之忽見一人頭在食案嘉引弓射中之咋咋作聲繞屋三日後嘉謀叛闔門被誅晉衛瓘爲太保恵帝永熙初瓘家人炊飯墮地盡化爲螺出足起行嵗餘及禍張華為司空所封壯武郡有桑化爲栢識者以爲不祥又華第舍及監省數有妖怪少子韙以中臺星坼勸華遜位華不従曰天道𤣥逺惟脩徳以應爾不如静以待之以俟天命及趙王倫孫秀將廢賈后遂害華夷三族賈謐本姓韓其母午賈后妹也謐冐姓賈氏恵帝元康中雒陽南山有䖟作聲曰韓屍屍識者曰韓氏将死也言屍屍者盡死意也其後謐誅而韓族殱焉又謐將誅其家數有妖異飄風吹其朝服飛上數百丈墜扵中丞臺又蛇出其被中夜暴雷震其室柱壓毁牀帳謐益恐及趙王倫廢賈后謐及母賈午皆伏誅官至􅄆騎常侍侍講東宫宋逹爲丹陽内史家犬生三子皆無頭後為楊州刺史曹武所殺周玘為南郡太守初玘於陽羡起宅始成而邊戸有聲如人歎咤者又玘家有鵝在籠中而頭斷出籠外玘亡後家誅裴楷爲光禄大夫家炊黍在甑或變如拳或作血或作蕪菁子其年卒楊駿爲太傅輔政初徵髙士孫登遺以布被登截被扵門大呼曰斫斫刺刺旬日託疾詐死及駿被誅其言果驗王浚爲幽州牧謀将僭號有狐據府門翟雉入㕔事俄為石勒所殺愍懐太子既爲賈后所忌将害之時有桑生扵宫西廂日長尺餘數日而枯後太子臧初立為太孫桑復生扵西廂太孫廢仍枯石崇爲衛尉将被誅其家稻米飯在地經宿皆化爲螺時人以爲族滅之應趙王倫僣即帝位時有雉入殿中自太極東階上殿驅之更飛西鍾下有頃飛去又倫扵殿上得異鳥問皆不知名累日向夕宫西有素衣小兒言是服劉鳥倫使録小児并鳥閉置牢室明旦開視戸如故并失人鳥所在倫目上有瘤時以爲妖焉齊王冏爲大司馬輔政有一婦人詣冏府求寄産吏詰之婦人曰我截臍便去爾識者聞而惡之時又謡云著布袙腹爲齊持服俄而冏誅卞粹齊王冏輔政時粹爲侍中中書令及長沙王乂専權粹立朝正色乂忌而害之初粹如厠見物若兩眼俄而難作成都王頴起兵誅長沙王乂既次朝歌每夜矛㦸有光若火其壘井中皆有龍象頴既縊死棄棺扵故井中陸機爲平原内史成都王頴輔政以機為後将軍討長沙王乂機始臨戎而牙旗折意甚惡之機戰敗頴聽孟玖之譛将殺機其夕機夢黒幰繞車手决不開天明而禍及皇太子覃初為清河世子所佩金鈴欻生隠起如麻粟祖母陳太妃以爲不祥毁而賣之占者以金是晉行大興之祥覃為皇裔是其瑞也毁而賣之象覃見廢不終之驗也祖逖為豫州刺史先是華譚庾闡問術人戴洋洋曰祖豫州九月當死初有妖星見扵豫州之分厯陽陳訓又謂人曰今年西北大将當死逖亦見星曰爲我矣方平河北而天欲殺我此乃不祐國也俄卒扵雍丘張茂元帝大興中為吳郡太守府舍得二狗頭其後茂爲吳興兵所殺王敦爲荆州牧在武昌鈴下儀仗生華如蓮華五六日而萎落干寳以爲狂華生枯木又在鈴閤之間言威儀之富榮華之盛皆如狂華之發不可久也其後敦終以逆命加戮其尸甘卓為閬州牧将襲王敦既而中止及還襄陽意氣騷擾舉動失常自炤鏡不見其頭視庭樹而頭在樹上心甚惡之其家金櫃鳴聲似槌鏡清而悲巫云金櫃将離是以悲鳴尋為襄陽太守周慮等襲殺之王導爲司徒廐羊生無後足眀年蘇峻入京都導與成帝俱幽石頭僅乃身免周筵爲冠軍将軍扵姑孰立屋五間而大梁一時躍出墮地衡立柱頭零節之上甚危雖以人功不䏻然也後竟為王敦所害覆族王機為廣州刺史入厠忽見二人著烏衣與機相捍良久擒之得二物似烏鴨南海太守鮑靚曰此物不祥機焚之逕飛上天機尋誅死謝安為太傅太元中出鎮廣陵始發石頭金皷忽破又語未嘗謬而忽一誤衆亦怪異之尋薨王國寶為尚書左僕射先是太元中小児以兩鐵相打於土中名曰鬬族後國寶與王恭一姓之中自相攻擊也庾晞史失其官四五年中喜為挽歌自揺大鈴為唱使左右齊和又燕㑹輙令倡伎作新安人歌舞離别之辭其聲悲切時人怪之後亦果敗諸葛長民爲豫州刺史兼太尉留府事常一月中輙十數夜眠中驚起跳浪如與人相打毛脩之嘗與同宿見之駭愕問其故長民答曰正見一物甚黒而有毛脚不分眀竒徤非我無以制之其後来轉數屋中柱及椽桷間悉見有蛇頭令人以刀懸斫應刅隠蔵去輙復出又擣衣石相與語如人聲不可解扵壁見有巨手長七八尺臂大數圍令斫之豁然不見未㡬伏誅王矩爲廣州刺史将赴職忽見一人持奏謁矩自云京兆莊靈之矩問之答稱天上京兆被使君召為主簿矩意甚惡之至州月餘卒庾翼為豫州刺史入厠見一物如方相俄而疽發背卒殷仲文為東陽大守謀反因炤鏡不見其面數日而伏誅朱猗爲龍驤将軍戍夀陽婢炊飯忽有羣鳥集竈競来啄噉婢驅逐不去有獵狗咋殺鳥鵲餘者因共啄狗即死又噉害唯餘骨存尋而猗死桓𤣥初封楚王已設拜席羣官陪位未及出有狗来便其席萬衆雕候疑莫不驚怪𤣥性猜暴竟無言者逐狗改席而已𤣥既僣亂出僞詔改年為建始右丞王攸之曰建始趙王倫偽號也又改為永始復是王莽始執權之嵗其兆號不祥㝠符僣逆如此𤣥入建康宫逆風迅激旗旌儀飾皆傾偃及小㑹扵西堂設伎樂殿上施絳綾帳鏤黄金爲顔四角作金龍頭衘五色羽葆旒蘇羣臣竊相謂曰此頗似轜車亦王莽仙葢之流也龍角所謂亢龍有悔者也𤣥在宮中嘗覺不安若爲神鬼所擾自簒盗至敗凡八旬王綏為冠軍将軍其家夜中梁上無故有人頭墮扵牀而血流滂沱俄拜荆州刺史假節坐父愉之謀與弟納並被誅前凉張天錫為涼州牧州楊樹生松天成若曰松不改柯易葉楊者柔脆之木此永久之葉将集危亡之地是後天錫降氐宋彭城王義康為大将軍領司徒東府㕔事前井水忽涌溢野雉江鷗並飛入所住齋前尋被誅削臨川王義慶為楊州刺史在廣陵有疾而白虹貫城野麕入府心甚惡之因陳求還太祖許觧州以本號還朝薨扵京邑始興王濬字休眀将産之夕有伏鳥鳴扵屋上後與元凶劭同逆伏誅劉敬宣爲右将軍夜與僚佐宴集空中有投一隻芒屩扵坐中墜敬宣食盤上長三尺五寸巳經人著耳鼻間並欲壊頃之而敗晉安王子勛僣號之日雲雨晦合行禮忘稱萬嵗吏以子勛所乗車除脚為輦置偽殿之西其夕有鳩棲其中鴞集其幰又有秃鶖集城上又以安陸王子綏為司徒子綏拜司徒日電雷晦㝠震其黄閤柱鴟尾墜地又有鴟棲其帳上尋敗並伏誅竟陵王誕為南徐州刺史在京夜大風飛落屋瓦城門及牀倒覆誕心惡之及遷鎮廣陵入城衝風暴起揚塵晝晦又中夜間坐有赤光炤室見者莫不怪愕左右侍直眠中夢人告之曰官須髮為矟眊既覺已失髻矣如此者數十人誕甚怪懼大眀二年發民築治廣陵城誕循行有人干輿揚聲大罵曰大兵尋至何以辛苦百姓誕執之問其本末答曰姓夷名孫家在海陵天公去年與道佛共議欲燒除此間人道佛苦諌得止今大禍将至何不立六慎門誕問六慎門云何答曰古時有言禍不入六慎門誕以其狂悖殺之又五音士忽狂易見鬼驚怖啼哭曰外軍圍城城上張白布帆誕執録二十餘日乃赦之誕尋為建康陳文紹等告其反状伏誅徐羡之爲司徒少時隨從兄履之爲臨海樂安縣甞行經山見黑龍長丈餘頭有角前兩足皆具無後足曵尾而行及拜司空守關将入彗星晨見危南又當拜時䨇鶴集太極東鴟尾鳴喚後與傅亮同誅江湛爲吏部尚書初湛家數見怪異未敗少日所眠床忽有數升血尋為元凶所害蕭思話爲青州刺史嘗所用銅㪷覆在藥㕑下得二死雀思話曰斗覆而雙雀殞其不祥乎既而被繫檀道濟爲司空江州刺史還鎮下渚未發有似鷦鳥集船悲鳴㑹太祖疾動彭城王義康矯詔召入道濟収付廷尉及其子給事黄門侍郎植司徒從事中郎粲太子舍人混征北主簿丞伯秘書郎中遵等八人並誅黄囘南兖州刺史太祖将誅回囘被召上車愛妾見赤光冠其頭至足苦捉留囘回不肯止及至見誅劉斌爲吳郡太守郡堂屋西頭鴟尾無故落地治之未畢東頭鴟尾復落頃之斌誅劉遁為南海太守在廣州昇眀元年沈攸之反刺史陳顯逹起兵應朝廷遁豫見殺遁家人在都従野夜歸見兩三人持堊制其家門須臾滅明日而遁死問至册府元龜卷九百五十
