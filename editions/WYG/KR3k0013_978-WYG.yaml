body:
  text: 册府元龜卷九百七十八宋王欽若等撰外臣部和親戎狄之國世為邊患禮義不能革其貪干戈不能絶其類故上自虞夏商周固不程督雖有竆兵追擊而亦亡失略等所謂獸聚鳥散從之如摶景者也是以聖人用權變之道遠御不絶而已漢高始納奉春之計建和親之議歲用絮繒酒食奉之非惟解兵息民亦欲漸而臣之為覊縻長乆之策耳高后文帝至于宣元皆用是道故得呼韓朝於北闕之下及魏道武讀漢史至欲以魯元妻匈奴為之掩卷太息於是以諸女皆釐降于賔附之國此乃深識從權濟時之略焉易曰惟幾也故能成天下之務其是之謂乎漢高帝罷平城歸韓王信亡入胡當是時冒頓單于兵彊控弦四十萬騎控引也謂背引弓也數苦北邊帝患之問奉春君劉敬敬曰天下初定士卒罷於兵革罷讀曰疲未可以武服也冒頓殺父代立妻群母以力為威未可以仁義說也獨可以計乆逺子孫為臣耳然陛下恐不能為帝曰誠可何為不能顧為柰何顧思念也敬曰陛下誠能以適長公主妻單于適讀曰嫡謂皇后所生厚奉遣之彼知漢女送厚蠻夷必慕以為閼氏生子必為太子代單于何者貪漢重幣陛下以歲時漢所餘彼所鮮數問遺鮮少也問遺謂餉饋之也鮮音息善反使辯士風諭以禮節風讀曰諷冒頓在固為子婿死外孫為單于豈曽聞孫敢與大父亢禮哉可毋戰以漸臣也若陛下不能遣長公主而令宗室及後宫詐稱公主彼亦知不肯貴近無益也近音其革反帝曰善欲遣公主吕后泣曰妾惟以一太子一女言唯以屯自慰柰何棄之匈奴帝竟不能遣長公主而取家人子為公主妻單于於外庶人之家取女而名之為公主使敬往結和親約一云奉宗室女公主為單于閼氏歲奉匈奴絮繒酒食物各有數約為兄弟以和親冒頓乃少止惠帝三年春以宗室女為公主嫁匈奴單于時冒頓寖驕寖漸也乃為書使使道高后其辭悖􅗦高后善季布言令大謁者張澤報書曰單于不㤀敝邑賜之以書敝邑恐懼退日自圖圖謀也年老氣衰髪齒墜落行歩失度單于過聽不足以自汙過誤也敝邑無罪宜在見赦竊有御車二乘馬二駟以奉常駕冒頓得書復使使來謝曰未嘗聞中國禮義陛下幸而赦之因獻馬遂和親文帝卽位復修和親四年匈奴遺漢書曰天所立匈奴單于敬問皇帝無恙前時皇帝言和親事稱書意合驩稱副也言與所遺書意相副而共結驩親漢邊吏侵侮右賢王不請不請言不告也為三年右賢王入寇聽後義盧侯難支等計與漢吏相恨絶二主之約離昆弟之親皇帝讓書再至發使以書報不來漢使不致讓書有責讓之言也謂匈奴再得漢書而發使將書以報漢􅇔其使不得來還而漢又更不發使至匈奴也漢以其故不和隣國不附今以少吏之敗約少吏猶言小吏故罰右賢王使至西方求月氏擊之以天之福吏卒良馬力强以滅夷月氏盡斬殺降下定之樓蘭烏孫呼掲其旁二十六國皆已為匈奴諸引弓之民并為一家北州以定願寢兵休士養馬除前事復故約以安邊民以應古始使少者得成其長老者得安其處世世平樂未得皇帝之志故使郎中係虖淺奉書請獻槖駝一騎馬二駕一駟皇帝卽不欲匈奴近塞則且詔吏民遠舍使者至卽遣之六月中來至新望之地漢界上塞下之地書至漢議擊與和親孰便公卿皆曰單于新破月氏乗勝不可擊也且得匈奴地澤鹵非可居也和親甚便漢許之六年遺匈奴書曰皇帝敬問匈奴大單于無恙使係虖淺遺朕書云願寢兵休士除前事復故約以安邊民世世平樂朕甚嘉之此古聖之志漢與匈奴約為兄弟所以遺單于甚厚背約離兄弟之親者常在匈奴然右賢王事已在赦前勿深誅單于若稱書意明告諸吏使無負約有信敬如單于書使者言單于自將并國有功甚苦兵事服繡袷綺長􅃭錦袍各一服者天子自所服也繡者為表綺為裏也袷者充衣絮也繡袷綺衣以繡袷音工袷反比疎一辮髪之餙也以金為之比音頻寐反疎字或作金字黃金飾具帶一黃金犀毗一犀毗胡帶之鈎也繡十疋錦二十疋赤綈緑繒各四十疋使中大夫意謁者令肩遺單于後頃之冒頓死子稽粥立稽音奚粥音育號曰老上單于老上稽粥單于初立帝復遣宗人女公主為單于閼氏宗人女亦諸侯王之女使宦者燕人中行説傳公主十四年後匈奴歲入邊殺略人民漢甚患之及使使遺匈奴書單于亦使當户報謝復言和親事後二年使使遺匈奴書曰皇帝敬問匈奴大單于無恙恙音漾使當户且渠雕渠難郎中韓遼遺朕馬二疋已至敬受當户且渠者一人為二官雕渠難者其姓名先帝制長城以北引弓之國受令單于長城以内􅃣帶之室朕亦制之使萬民耕織射獵衣食父子毋離臣主相安俱無暴虐今聞渫惡民貪降其趨渫音先列反降下也謂下意於利也趨讀曰趣背義絶約忘萬民之命離兩主之驩然其事已在前矣書云二國已和親兩主驩說說讀曰恱寢兵休卒養馬寢息也世世昌樂翕然更始朕甚嘉之聖德日新改作更始使老者得息㓜者得長各保其首領而終其天年朕與單于俱繇此道繇從也用也順天恤民世世相傳施之無窮天下莫不咸嘉使漢與匈奴鄰敵之國匈奴處北寒殺氣早降故詔吏遺單于秫蘖金帛絮它物歲有數今天下大安萬民熈熈獨朕與單于為之父母朕追念前事薄物細故謀臣計失皆不足以離昆弟之驩朕聞天不頗覆地不偏載朕與單于皆捐細故俱蹈大道也墜壞前惡以圖長久使兩國之民若一家子元元萬民下及魚鼈上及飛鳥跂行喙息蝡動之類跂行凡有足而行者也喙息凡以口出氣者蝡蝡動貌跂音蚑喙音許穢反兖反莫不就安利避危殆故來者不止天之道也俱去前事朕釋逃虜民謂漢人逃入匈奴者令不追單于毋言章尼等背單于降漢者朕聞古之帝王約分明而不食言凡云食言者終為不信棄其前言如食而盡單于留志天下大安和親之後漢過不先言更不負約單于其察之單于旣約和親於是制詔御史匈奴大單于遺朕書和親已定亡人不足以益衆廣地匈奴無入塞漢無出塞犯今約者殺之可以久和親後無咎俱便朕已許其布告天下使明知之又詔曰朕旣不明不能逺德使方外之國不寧息夫四荒之外不安其生戎狄荒服故曰四荒言其荒急去來無常也封圻之内勤勞不處圻亦畿字不處者不獲安居二者之咎皆自本朕之德薄而不能逹逺也間者累年匈奴並暴邊境多殺吏民邊臣兵吏又不能諭其内志以重吾不德諭曉告也重音直用反夫久結難連兵中外之國將何以自寧今朕夙興夜寐勤勞天下憂苦萬民為之惻怛不安惻痛也怛恨也未嘗一日忘於心故遣使者冠蓋相望結轍於道使車往返故轍如結也以諭朕志於單于今單于反古之道計社稷之安便萬民之利新與朕俱棄細過偕之大道偕亦俱也之徃也趣也結兄弟之義以全天下元元之民元元善意也和親以定始于今年景帝元年四月遣御史大夫陶青至代下與匈奴和親三年秋復與匈奴和親五年夏遣公主嫁匈奴單于初帝旣卽位趙王遂陰使於匈奴㑹吳楚反欲與趙合謀入邊漢圍破趙匈奴亦止自是後帝復與匈奴和親通關市給遺單于遣公主如故約終帝世時時小入盜邊無大寇武帝卽位初明和親約束厚遇關市饒給之匈奴自單于以下皆親漢往來長城下帝令張騫使烏孫匈奴聞其與漢通怒欲擊之烏孫於是恐使使獻馬願得尚漢公主為昆弟天子問羣臣議計曰必先内聘然後遣女烏孫以馬千疋聘入聘財元封中遣江都王建女細為公主以妻焉賜乗輿服御物為備官屬官侍御數百人贈送甚盛烏孫昆莫以為右夫人匈奴亦遣女妻昆莫以為左夫人公主至其國自治宫室居歲時一再與昆莫㑹置酒飲食以幣帛賜王左右貴人昆莫年老言語不通公主悲愁自為作歌曰吾家嫁我兮天一方逺託異國兮烏孫王穹廬為室兮旃為牆以肉為食兮酪為漿食謂食飲居嘗土思兮心内傷亡思而懷謂憂思本土願為黃鵠兮歸故鄉天子聞而憐之間歲遣使者持帷帳錦繡賂遺焉間歲者謂毎隔一歲而往也昆莫年老欲使其孫岑陬尚公主公主不聽上書言狀天子報曰從其國俗欲與烏孫共滅胡岑陬尚江都公主生一女少夫名少夫公主死漢復以楚王戊之孫解憂為公主妻岑陬岑陬且死以國與季父大禄子翁歸靡後尚楚主解憂翁歸靡死岑陬子泥靡代立號狂王復尚楚主解憂是時匈奴自馬邑軍後絶和親數侵邊漢亦累出兵討破之伊穉􅀈單于用漢降將趙信遣使好辭請和親帝下其議或言和親或言遂臣之丞相長史任敞曰匈奴新困宜使為外臣朝請於邊元鼎中烏維單于立數使使好辭丼言求和親復遣楊信使匈奴謂單于曰卽欲和親以單于太子為質質音至謂以物相與質當也於漢單于曰非故約漢常遣公主給繒絮食物有品以和親品等差也今吾太子為質無㡬矣無㡬言當盡也當武帝之世兵深入匈奴窮追二十餘年匈奴孕重墜殰罷極苦之孕重懷任者男也極困也苦也墜落也殰之心厭苦也􅈢鹿姑單于以下常有欲和親計後欲求和親㑹病死壺衍鞮單于旣立風謂漢使者言欲和親其臣衛律在時亦常言和親之利匈奴不信及死後兵數困國益貧單于弟左谷蠡王思衛律言欲和親而恐漢不聽故不肯先言常使左右風漢風讀曰諷然其侵盜益希遇漢使愈厚欲以漸至和親漢亦羈縻之宣帝時烏孫昆彌自將擊匈奴有功漢遣校尉常惠持金幣賜烏孫貴人有功者元康二年烏孫昆彌因惠上書願以漢外孫元貴縻音美為嗣得令復尚漢公主結婚重親畔絶匈奴願聘馬臝各千疋詔下公卿議大鴻臚蕭望之以為烏孫絶域變故難保不可許帝美烏孫新立大功又重絶故業重難也故業謂先與烏孫皆親也遣使者至烏孫先迎取聘昆彌及太子左右大將都尉皆遣凡三百餘人入漢地迎取少主廼以烏孫主解憂弟相失為公主置官屬侍御百餘人舍上林中學烏孫言舍也天子自臨平樂觀㑹匈奴使者外國君長大角抵設樂而遣之使長羅侯光禄大夫為副凡持節者四人送少主至燉煌未出塞聞烏孫昆彌歸翁靡死烏孫貴人共從本約立岑陬子深靡代為昆彌號狂王惠上書願留少主燉煌惠馳至烏孫責讓不立元貴靡為昆彌迎還少主天子用蕭望之議徵還少主神爵二年匈奴單于遣名王奉獻賀正月始和親是時匈奴虗閭權渠單于旁塞獵欲入寇單于病罷兵去乃使題王都梨胡次等入漢請和親未報㑹單于死元帝時呼韓邪單于自言願壻漢氏以自親帝以後宫良家子王嬙字昭君賜單于昭君南郡人時呼韓邪來勑以宫女五人賜之昭君入宫數歲不得見御積悲怨乃請掖庭令求行呼韓邪臨辭大㑹帝召五女以侍之昭君豐容靚飾光明漢宫顧景裴回竦動左右帝見大驚意欲留之而難於失信遂與匈奴生二子及呼韓邪死其前閼氏子代立欲妻昭君上書求歸成帝勑令從胡俗遂復為後單于閼氏後漢光武建武中上谷太守王霸上書言宜與匈奴結和親二十二年匈奴中連年旱蝗赤地數千里草木盡枯人畜饑疫死耗大半單于畏漢乗其弊乃遣使詣漁陽請和親使中郎將季茂報命二十七年北單于遣使詣武威求和親天子召公卿廷議不決皇太子言曰南單于新附北虜懼於見伐故傾耳而聽爭欲歸義耳今未能出兵而反交通北虜臣恐南單于將有二心北虜降者且不復來矣帝然之告武威太守勿受其使二十八年北匈奴復遣使詣闕貢馬及裘更乞和親并請音樂又求率西域諸國胡客與俱獻見帝下三府議酬答之宜司徒掾班彪奏曰臣聞孝宣帝勑邊守尉曰匈奴大變詐交接得其情則却敵折衝應對入其數則反為輕欺今此匈奴見南單于來附懼謀其國故數乞和親又逺驅牛馬與漢合市重遣名王多所貢獻斯皆外示富彊以相欺誕也臣見其獻益重知其國益虗歸親愈數為懼愈多然今旣未獲助南則亦不宜絶北羈縻之義禮無不答謂可頗加賞賜略與所獻相當明加曉告以前世呼韓邪郅支行事報答之辭今必有適令且藁草上并曰單于不忘漢恩追念先祖舊約欲修和親以輔身安國計議甚高為單于嘉之往者匈奴數有􅆾亂呼韓邪郅支自將相讎隙並蒙孝宣皇帝垂恩救䕶故各遣侍子稱藩保塞其後郅支忿戾自絶皇澤而呼韓附親忠孝彌著及漢滅郅支遂保國傳嗣子孫相繼今單于擁衆向南欵塞歸命自以呼韓嫡長次第當立而侵奪失職猜疑相背數請兵將歸北庭䇿謀紛紜無所不至惟念斯言不可獨聽又以北單于比年貢獻欲修和親故拒而未許將以成單于忠孝之義漢秉威信總率萬國日月所炤皆為臣妾殊俗百蠻義無親疎服順者褒賞叛逆者誅罰善惡之效呼韓郅支是也今單于欲修和親欵誠已逹何嫌而欲率西域諸國俱來獻見西域國屬匈奴與屬漢何異單于數遭兵亂國内虗耗貢物裁以通禮何必獻馬裘令齎雜繒五百疋弓鞬韇丸一矢四發藏弓為鞬藏箭為韇丸箭箙也四矢曰發遣遺單于又賜獻馬左骨都侯右谷蠡王雜繒各四百疋斬馬劍各一單于前言先帝時所賜呼韓邪竽瑟箜篌皆敗願復裁賜念單于國尚未安方厲武節以戰攻為務竽瑟之用不如良弓利劍故未以齎言不齎特往遺也朕不愛小物於單于便宜所欲遣驛以聞帝悉納從之三十一年復遣使如前欲修和親乃璽書報答賜以綵繒不遣使者明帝永平六年北匈奴猶盛數寇邊朝廷以為憂北單于欲合市遣使求和親帝冀其交通不復為寇乃許之遣給事中鄭衆持節使匈奴及衆還朝議復欲遣使衆上疏諌曰臣伏聞北單于所以要致漢使者欲以離南單于之衆堅三十六國之心也又當揚漢和親誇示鄰敵令西域欲歸化者局促􅈢疑懷土之人絶望中國耳漢使旣到便偃蹇自倨若復遣之虜必自謂得謀其羣臣駮議不敢復言如是南庭動搖烏桓有離心矣南單于久居漢地具知形勢萬分離柝旋為邊害今幸有度遼之衆揚威北垂雖勿報答不敢為患帝不從章帝元和二年武威太守孟雲上言北虜以前旣和親而南部復生鈔掠北單于謂漢敗盟謀欲犯塞謂宜還南所掠生口以􅇺安其意帝從大僕袁安議許之乃下詔曰昔獫狁獯鬻之敵中國其所繇來尚矣往者雖有和親之名終無絲髮之效墝埆之人屢嬰塗炭父戰於前子死於後弱女乗於亭障孤兒號於道路老母寡妻設虗祭飲泣涕相望歸䰟於沙漠之表豈不哀哉傳曰江海所以能長百川者以其下之也少加屈下尚何足病况今與匈奴君臣分定辭順約明貢獻累至豈宜違信自受其曲其勑度遼及領中郎將龎奮倍雇南郡所得生口以還北虜其南部斬首獲生計功受賞如常科時北單于遣使貢獻欲求和親詔羣僚議者或以為匈奴變詐之國無内向之心徒以畏漢威靈逼憚南虜故希望報命以安其離叛今若遣使恐失南虜親附之歡而成北狄猜詐之計不可𤣥武司馬班固議曰竊自思惟漢興以來曠世歷年兵纒夷狄尤事匈奴綏御之方其塗不一或修文以和之或用武以征之或卑下以就之或臣服而攻之雖屈伸無常所因時異然未有拒絶棄放不與交接者也故自建武之世復修舊典數重出使前後相繼至於其末始乃暫絶永平八年復議通之廷爭連日異同紛囘多執其難少言其易先帝聖徳逺覽瞻前顧後遂復出使事同前世以此而推未有一世闕而不修者也今烏桓就闕稽首譯官康居月氏自逺而至匈奴離柝名王來降三方歸服不以兵威此誠國家通於神明自然之徵也臣愚以為宜依故事復遣使者上可繼五鳯丼露致逺人之㑹下不失建武永平羈縻之義虜使再來然後一往旣明中國主在忠信且知當朝禮義有常豈同逆詐示猜孤其善意乎絶之未知其利通之不聞其害設後北虜稍强能為風塵方復求為交通將何所及不若因今施惠為䇿近長和帝永元十六年北單于遣使詣闕貢獻願和親修呼韓邪故約帝以其舊禮不備未許之而厚加賞賜不答其使元興元年重遣使詣燉煌貢獻辭以國貧未能備禮願請天使當遣子入侍天子降天使至國卽遣子隨天使入侍時鄧太后臨朝亦不答其使但加賜而已後魏道武時引吏部尚書崔𤣥伯講漢書至婁敬說漢祖欲以魯元公主妻匈奴帝善之嗟嘆者良乆是以諸公主皆釐降于賓附之國朝臣子弟雖名族美産不得尚焉時蠕蠕閭大肥率宗族歸國尚華陰公主公主薨復尚䕶澤公主東魏孝靜帝時蠕蠕王阿那瓌遣朝貢求婚以常山王妹樂安公主許之改為蘭陵公主瓌遣奉馬千匹為聘禮迎公主詔宗正無奇送公主往北自是朝貢武定三年吐谷渾國奉其從妹以備後庭納為容華嬪北齊神武為魏相國時阿那瓌彊盛與西魏通和欲連兵東伐神武病之令杜弼使蠕蠕為世子求婚世子卽文襄也阿那瓌曰高王自娶則可神武猶豫尉景與武明皇后及文襄並勸請乃從之武定三年使慕容儼往聘之號曰蠕蠕公主八月神武迎於下館阿那瓌使其弟秃突佳來送女且報聘仍戒曰待見外孫然後反國公主性嚴毅一生不肯華言神武常有疾不得往公主所秃突佳怨恚神武輿疾就公主其見將䕶如此神武後文襄烝公主從蠕蠕國法産一女焉又為第九子湛卽武成也聘蠕蠕太子菴羅辰女號隣和公主湛年始八歲後主武平四年突厥使求婚後周太祖為魏相突厥土門使使獻方物時鐵勒將伐茹茹土門率所部邀破之盡降其衆五萬餘部恃其彊盛乃求婚於茹茹主阿那瓌大怒使人罵辱之曰爾是我鍛奴何敢發是言也土門亦怒殺其使者遂與之絶而求婚於周太祖許之以魏長樂公主妻之武帝時與齊人交争戎車歲動故毎連突厥為外援初魏恭帝世突厥侯升許進女於太祖契未定而太祖薨尋而侯升又以他女許帝未及結納齊人亦遣求婚侯升貪其幣厚將悔之保定中詔遣凉州刺史楊荐武伯王慶等往結之慶等至諭以信義侯升遂絶齊使而定婚焉五年詔陳公純大司徒宇文貴神武公竇毅南安公楊荐等往迎女天和二年侯升又遣使來獻陳公純等至侯升復貳於齊㑹有風靈變乃許純等以君后歸宣帝大象元年突厥他鉢請和親帝冊趙王招女為千金公主嫁之二年二月突厥遣使獻方物且逆千金公主隋高祖開皇中突厥沙鉢略與從弟地勤察有隙各遣使詣闕請和求援帝皆不許㑹周千金公主上書請為一子之例高祖遣開府徐平和使於沙鉢略諱沙鉢略遣使致書曰辰年九月十日從天生大突厥天下聖賢天子伊利俱盧設莫何始波羅可汗致書大隋皇帝使人開府徐平和至辱告言語具聞也皇帝是婦父卽是翁此是女夫卽是兒例兩境雖殊情義是一今重叠親舊子子孫孫乃至萬世不斷上天為證終不違約此國所有羊馬都是皇帝畜生彼有繒綵都是此物彼此有何異也高祖報書曰大隋天子貽書大突厥乙利俱盧設莫何沙鉢略可汗得書知大有好心向此也旣是沙鉢略婦公今日看沙鉢略共兒子不異旣以親舊厚意常使之外今特别遣大臣虞慶則往彼看女復看沙鉢略也十一年吐谷渾主伏使其兄子無素奉表稱藩并獻方物請以女備後庭帝謂滕王曰此非至誠但急計耳乃謂無素曰朕知渾主欲令女事朕若依來請他國聞之便當相學一許一塞是謂不平若並許之又非好法朕情存安養欲令遂往豈可聚歛子女以實後宫乎竟不許十六年以先化公主妻吐谷渾主伏伏上表稱公主為天后帝不許其年國人殺伏立其弟伏允為主使請依俗尚主帝從之自是朝貢歲至十七年突厥突利可汗染干遣使來逆女舍之太常教習六禮先是帝改封周千金公主為大義公主賜姓楊氏後帝以陳叔寶屏風賜之公主心不平因書屏風為詩叙陳亡以自寄其辭帝聞而惡之公主復與西面突厥况利可汗連結帝恐其為變將圖之㑹主與所從胡私通因發其事下詔廢黜之恐都藍不從遣竒章公牛𢎞將美妓四人以㗖之時沙鉢略子曰染干居北方遣使求婚帝令裴矩謂之曰當殺大義公主者方許婚突利以為然復􅉲之都藍因發怒遂殺公主於帳至是以宗女安義公主妻之帝欲離間北夷故特厚其禮遣牛𢎞蘇威斛律孝卿相繼為使突厥前後遣使入朝三百七十輩突利本居北方以尚主之故南徙度斤舊鎭一云初突厥雍閭表請婚僉議將許之長孫晟奏曰臣觀雍閭反覆無信特共玷厥有隙所以依倚國家縱與為婚終當必叛今若得尚公主承藉威靈玷厥染干必又受其徵發强而更反後恐難圖且染干者處羅侯之子也素有誠欵于今兩代臣前與目見亦乞通婚不如許之招令南徙兵少埶弱易可撫馭使敵雍閭以為邊捍帝曰善乃遣慰喻染干許尚公主染干遣五百騎隨晟來逆女以宗女封安義公主以妻之晟說染干率衆南徙居度斤舊鎭雍閭疾之亟來抄略染干伺知動靜輙遣奏聞是以賊來毎先有備十九年高熲楊素擊突厥玷厥大破之拜染干為意利珍臣啓民可汗於朔州築大利城以居時安義公主已卒帝以宗女義成公主妻之部落歸者甚衆先是十八年染干為玷厥等所攻乃隨長孫晟歸朝至是高熲等擊破玷厥乃命染干出居大利城焉煬帝大業三年幸榆林啓民及義成公主來朝行宫前後獻馬三千疋帝大恱賜物萬三千叚啓民上表曰已前聖人先帝莫縁可汗存在之月憐臣賜臣安義公主種種無少短至尊今還如聖人先帝捉天下四方坐也還養活臣及突厥百姓實無少短臣今憶想聖人及至尊養活事具奏不可盡帝乃親幸啓民所居啓民奉觴上壽跪伏甚恭帝賜啓民及公主金甕各一及衣服被褥錦綵特勒以下各有差明年啓民卒子始畢可汗立表請尚公主詔從其俗唐初始畢死處羅可汗立處羅死頡利可汗立並妻主焉四年高昌王伯雅遣使貢獻帝待其使甚厚明年伯雅來朝因從擊高麗還尚宗女華容公主十年正月以宗女為信儀公主嫁於突厥高昌娑那可汗賜錦綵袍十具綵萬疋帝將復其故地以遼東之役故未遑也唐高祖義寧中遣襄武郡公琛與太常卿鄭元璹齎女妓遺突厥始畢可汗以結和親武德五年西突厥葉䕶可汗遣使請婚六年突厥又請和親歸我馬邑八年四月宴西蕃突厥使時中國以突厥為患故遣使與西突厥連和以備北狄於是葉䕶請婚帝謂侍中裴矩曰西突厥與我懸逺有急不得相助今來請婚其意如何對曰西蕃懸逺誠如聖旨但北宼盛彊数為邉害當今之計湏逺交而近攻權可許婚以近頡利且羈縻之待一二年後中國完實足抗北夷然後徐思其宜此蓋一時之䇿也帝然之令高平王道立至其國統葉䕶大恱遇頡利頻歲入㓂西蕃路梗繇是未果太宗貞觀八年吐蕃贊普弄讚嗣位帝遣行人馮德遐往撫慰之弄讃見徳遐大悦聞突厥及吐谷渾皆尚公主乃遣使隨德遐入朝多賫金寶奉表求婚帝未之許使者旣反言於弄讚曰初至大國待我甚厚許嫁公主㑹吐谷渾王入朝有相離間繇是禮薄遂不許嫁弄讚遂與羊同連發兵以擊吐谷渾吐谷渾不能支遁於青海之北以避其鋒其國人畜並為吐蕃所掠於是進兵攻破党項及白蘭諸羌率其衆二千餘頓於松州西境遣使貢金甲云來迎公主又謂其屬曰若大國不嫁公主於我卽當入冦遂進攻松州都督韓威輕騎覘賊反為所敗邊人大擾帝遣吏部尚書侯君集為當彌道行軍大總管右領軍大將軍執失思力為白蘭道行軍總管左武衛將軍牛進達為濶水道行軍總管右領軍留蘭為洮河道行軍總管率部騎五萬擊之進達先鋒自松州夜襲其營斬千餘級弄讚大懼引兵而退遣使謝罪因復請婚帝許之弄讚乃遣其相禄東贊至禮獻金五千兩自餘寶玩數百事十四年吐谷渾烏也抜勤豆可汗諾曷鉢入朝請婚先是帝卽位初吐谷渾王伏允為子尊王求婚帝責其親迎以羈縻之尊王稱疾不朝有詔停婚至是遂以𢎞化公主妻諾曷鉢資送甚厚十五年帝以文成公主妻之令禮部尚書江夏郡王道宗主婚持節送公主于吐蕃弄讚率其部兵次栢海親迎于河源見王人執子壻之禮甚恭旣而歎大國服飾禮儀之美俯仰有媿沮之色及與公主歸國謂所親曰我祖父未有通婚上國者今我得尚大唐公主為幸實多為公主築一城以誇示後代遂築城邑立棟宇以居處焉公主惡其人赭面弄讚令國中權且罷之身亦釋氊裘襲紈綺漸慕華風猜獷日革至遣子弟入國學而習業焉十六年九月延陁真珠毗伽可汗遣其叔父沙鉢羅泥熟俟斤來請婚獻馬三千疋貂皮三萬八千馬腦鏡一帝許以女妻之徵可汗備親迎之禮帝志懷逺人於是發詔幸靈州與之㑹可汗大恱謂其國中曰我本鐵勒之小帥也蒙大國聖人樹立我為可汗今復嫁我以公主車駕親至靈州斯亦足矣於是稅諸部羊馬以為聘財或說可汗曰我薛延陁可汗與大唐天子俱為一國主何以自往朝謁如或拘留悔之無及可汗曰吾聞大唐天子聖德逺被日月所炤皆來賔服我歸心委質冀得一覩天顔無所復恨然磧北之地必當有主舍我别求固非大國之計我志決矣勿復多言於是言者遂止帝止三道發使受其羊馬然延陁無府藏調斂其國往返且萬里旣沙磧無草羊馬逸死遂後期帝於是停幸靈州徵還三道之使旣而其聘羊至所耗將半議者以為戎狄則不可以禮義畜若聘財未備而與之婚或輕中國要令備禮以加重於是反其使者羣臣或勸帝云旣許以公主妻延陁邊境得以休息納其獻聘不可失信於蕃人宜在速成帝謂之曰君等進計皆非也君等知古而不知今昔漢家匈奴强而中國弱所以厚飾子女嫁與單于今時中國強而北狄弱漢兵一千堪擊其數萬延陁所以匍匐稽顙􅔤我所為不敢驕􅗦者以新得立為長雜姓本非其屬將倚大國用服其衆彼同羅僕固等十餘部落兵數萬并力足制延陁所以不敢發者延陁為我所立懼中國也今若以女之大國子壻增崇其禮深結黨援雜姓部落屈膝低眉更遵服之夷狄之人豈知禮義微不得意勒兵南下如君所言可謂養獸自噬也吾今不與其女頗簡使命諸姓部落知吾弃之其爭擊延陁必矣於是遂絶其婚十七年八月突厥咄陸可汗遣使求婚帝謂曰爾數年闕朝獻而敢留我使人此如摘叢林一葉盜海水一滴耳於我大國無損在爾褊識不足竟不許之二十年六月西突厥乙毗射遺可汗遣使朝貢仍求婚焉帝璽書報其善心優撫至甚册府元龜卷九百七十八
