body:
  text: 冊府元龜卷一百四十一宋王欽若等撰帝王部念良臣抑外戚尊外戚念良臣良臣之於君也有股肱之喻有心腹之寄故存則倚任沒而追思此哲王之所同也漢氏而下乃有懐其勲烈念其才徳形於震悼發乎嘆喟以至申命文學頌其畫像親枉輿駕臨其館舍或裒述其懿範或存記其讜言稱詠發于章句􅈖賻越於夷等逮夫罷宴停景驚食流涕靡涓日而發哀遥望車而増慟極云亡殄瘁之痛深憗遺畀予之嗟斯足以篤愛賢之心厚同體之義者傳所謂聼鼓鼙琴瑟而必有所思焉其是之謂矣漢成帝時西羗常有警帝思将帥之臣追美趙充國乃召黄門郎揚雄即充國圖畫而頌之充國宣帝時以功徳與霍光等列畫未央宫後漢光武時祭遵為征虜将軍屯隴下建武九年春卒於軍光武愍悼之尤甚遵䘮至河南縣詔遣百官先㑹䘮所車駕素服臨之望哭哀慟還幸城門過其車騎涕泣不能已喪禮成復親祠以太牢既葬車駕復臨其墳存見夫人室家其後㑹朝帝每嘆曰安得憂國奉公之臣如祭征虜者乎遵之見思若此帝數嗟嘆衛尉銚期見帝感動對曰陛下至仁哀念祭遵不已羣臣各懐慚懼祭彤為太僕坐伐北匈奴逗撓下獄免嘔血死帝雅重彤方更任用聞之大驚召問其疾状嗟嘆者良久焉賈復與五校戰於真定大破之復傷創甚光武大驚曰我所以不令賈復别将者為其輕敵也果然失吾名将聞其婦有孕生女邪我子娶之生男邪我女嫁之不令其憂妻子也眀帝永平四年郭丹為司徒坐事免卒於家後帝回朝㑹問羣臣郭丹家今何如宗正劉裔對曰昔孫叔敖相楚馬不秣粟妻不衣帛子孫竟蒙寢丘之封丹出典州郡入為三公而家無遺産子孫困匱帝乃下南陽訪求其嗣鍾離意為僕射以上疏出為魯相後徳陽殿成百官大㑹帝思意言謂公卿曰鍾離尚書若在此殿不立章帝建初三年光禄大夫周舉卒朝廷以舉清公亮直方以為宰相深痛惜之乃詔告光禄勲汝南太守曰昔在前世求賢如渴封墓式閭以光賢哲故公叔見誄翁歸蒙述所以昭忠厲俗作範後昆故光禄大夫周舉性侔夷魚伯夷史魚也忠踰随管随食管仲前授牧守及還納言出入京輦有欽哉之績在禁闈有宻静之風予録乃勲用登九列方欲式序百物亮恊三事不永夙終用乖逺圖朝廷愍悼良為愴然詩不云乎肇敏戎功用錫爾祉其令将大夫以下到䘮發日復㑹弔加賜錢十萬以旌委蛇素絲之節焉靈帝時楊賜為太尉以冦賊免先是黄巾帥張角等執左道稱大賢以誑耀百姓天下襁負歸之賜時在司徒召掾劉陶吿曰張角等遭赦不悔而稍益滋蔓今若下州郡捕討恐更搔擾速成其患且欲切勑刺史二千石簡别流人各䕶歸本郡以孤弱其黨然後誅其渠帥可不勞而定何如陶對曰此孫子所謂不戰而屈人之兵廟勝之術也賜遂上書言之㑹去位事留中後帝乃徙南宫閱録故事得賜所上張角奏及前侍講注籍乃感悟下詔封賜臨晉侯邑千五百户獻帝時尚書令荀彧卒帝哀惜之祖日為之廢讌樂祖日謂祭祖神之日因為廢樂也共工氏之子日脩好逺遊祀以為祖神魏太祖時郭嘉字奉孝為軍祭酒深見委遇㑹疾篤帝問疾者交錯及薨臨其喪哀甚謂荀攸等曰諸君年皆孤輩惟奉孝最少天下事竟欲以後事属之而中年夭折命也夫又與荀彧書追傷嘉曰郭奉孝年不滿四十相與周旋十一年險阻艱難皆共罹之又以其通逹見世事無所凝滯欲以後事属之何意卒爾失之悲痛傷心今表増其子滿千户然何益亡者追念之感深且奉孝乃知孤者天下人相知者少又以此痛惜奈何奈何又與彧書曰追惜奉孝不能去心其人見時事事過絶於人又人多畏病南方有疫嘗言往南方則不生還然與共論計之當先定此為不但見計之忠厚必欲立功名推命定事人心乃爾何得使人忘之後太祖征荆州還於巴丘遇疾疫燒船嘆曰郭奉孝在不使孤至此初陳羣非嘉不治行檢數廷訴嘉嘉意自若太祖愈益重之然以羣能持正亦悦焉傅子曰太祖又云哀㢤奉孝痛㢤奉孝惜㢤奉孝又表於天子曰臣聞褒忠寵賢未必當身念功繼續恩隆後嗣是以椘宗孫叔顯封厥子岑彭既沒爵及支庶故軍祭酒郭嘉忠良淵淑體通性逹每有大議發言盈庭執中處理動無遺策自在軍旅十有餘年行同騎乘坐共幄席東禽吕布西取睢固斬袁譚之首平朔土之衆踰越險塞盪定烏丸震威遼東以梟袁尚雖假天威易為指麾至於臨敵發揚誓命凶逆克殄勲實繇嘉方将表顯短命早終上為朝廷欽惜良臣下自毒恨䘮失奇佐宜追増嘉封并前千户裒亡為存厚往勸来也王粲字仲宣為侍中從征吴道卒二子為魏諷所引誅後絶太祖時征漢中聞粲子死嘆曰孤若在不使仲宣無後荀攸字公逹為尚書令從征孫權道薨太祖言則流涕令曰孤與荀公逹周游二十餘年無毫毛可非者真賢人也明帝太和中中䕶軍􅃽濟上疏曰宜遵古封禪詔曰聞濟斯言使吾汗出流足事寢歴嵗後遂議修之使髙堂隆撰其禮儀帝聞隆沒歎息曰天不欲成吾事髙堂生舍我亡也晉武帝時太保睢陵公王祥薨時文眀皇太后喪始踰月其後詔曰為睢陵公發哀事乃至今雖每為之感歎要未得特叙哀情今便哭之劉毅為青州大中正卒武帝撫几驚曰失吾名臣不得生作三公即贈儀同三司使者監䕶䘮事羊祜為征南大将軍都督荆州諸軍事及薨武帝素服哭之甚哀是日大寒帝涕沾鬚鬢皆為氷焉李裔為司徒薨武帝後思其清節詔曰故司徒李裔太常彭灌並履忠清儉身沒家無餘積賜裔家錢二百萬榖千斛灌家半之恵帝時稽紹為侍中成都王舉兵向京師帝出禦之紹被害於帝側血濺御服天子深哀惜之及事定左右欲浣衣帝曰此稽侍中血勿去之眀帝時王廙為荆州刺史及卒眀帝與大将軍温嶠書曰痛謝鯤未絶於口世將世将廙字復至於此並盛年雋才不遂其志痛切于心廙眀古多通鯤逺有識致其言雖未足令人改聼然味之不倦近未易有也坐視盡如何成帝時劉超為右衛将軍為帝所親遇蘓峻之亂超侍帝石頭峻使任讓将兵入収超及侍中鍾雅帝抱持悲泣曰還我侍中右衛任讓不奉詔因害之及峻平任讓與陶侃有舊侃欲持不誅之乃請於帝帝曰讓是殺我侍中右衛者不可宥繇是遂誅讓及超将改葬帝痛命之不已詔遣髙顯近地葬之使出入得瞻望其墓追贈衛尉諡曰忠穆帝時荀羡為兗州刺史鎮下邳以疾篤觧職升平二年卒帝聞之歎曰荀令則王敬和相繼凋落股肱腹心將復誰寄乎後魏太武監國以穆觀為右弼出則統攝朝政入則應對左右事無巨細皆闗決焉泰常八年暴疾薨帝親臨其喪悲動左右及即位每與羣臣談宴未嘗不歎息慇懃以為自秦以来佐命勲臣文武兼濟無及之者其見稱如此于栗磾為鎮南将軍卒栗磾自少治戎迄于白首臨事善斷所向無前加以謙虛下士刑罰不濫太武甚悼惜之屈桓為鎮東大将軍歴官公正帝信任之真君四年墜馬卒時太武幸隂山恭宗遣使乘傳奏狀太武甚惜之謂使人曰汝等殺朕良臣何用乗馬遂令步歸贈征西大将軍崔浩為司徒浩死後太武北伐時宣城公李桓疾篤傳者以為卒帝聞而悼之謂左右曰李宣城可惜又曰朕向失言崔司徒可惜李宣城可哀孝文時李冲為僕射卒葬於覆舟山後帝車駕自鄴還雒路經冲墓左右以聞帝時臥疾望墳掩涕久之詔曰司空文穆公徳為時宗勲簡朕心不幸殂逝託墳邙嶺旋鑾覆舟盼睇塋域悲仁惻舊有慟朕哀可遣太牢之祭以申吾懐及與留京百官相見皆叙冲亡沒之故言及流涕孝眀時崔光為車騎大将軍儀同三司薨車駕親臨撫屍慟哭御輦還宫流涕於路為減常膳言則追傷每至光坐講讀之處未曽不改容悽悼孝荘帝時李苖為冠軍将軍討爾朱世隆於河南橋左右盡死浮於河帝聞苖死哀傷久之曰苖若不死當應更立奇功後周太祖時蘓綽為大行臺度支尚書卒於位帝痛惜之哀動左右及将葬乃詔公卿等曰蘓尚書平生謙退敦尚儉約吾欲全其素志便恐悠悠之徒有所未逹如其厚加贈諡又乖宿昔相知之道進退維谷孤有疑焉尚書令史麻瑶越次而進曰昔晏子齊之賢大夫一狐裘三十年及其死也遣車一乘齊侯不奪其志綽既操履清白謙挹自若愚謂宜從儉約以彰其美太祖稱善及綽歸葬武功唯載以布車太祖與羣公皆步送出同州郭門外太祖親於車後酹酒而言曰尚書平生為事妻子兄弟不知者吾皆知之惟爾知吾心吾知爾意方欲其定天下不幸遂捨我去奈何因舉聲慟哭不覺失巵於手至葬日又遣使祭以太牢太祖自為其文劉亮為車騎大将軍東州刺史卒䘮還京師太祖親臨之泣而謂人曰股肱䘮矣腹心何寄隋文帝時劉行本為太子左庶子太子虛心敬憚未㡬卒官帝甚傷惜之及太子廢帝曰嗟乎若使劉行本在男不及此又裴政為太子左庶子多所規正見稱純終出為襄州總管卒官及太子廢髙祖追憶之曰向遣裴政劉行夲在共輔弼之應不令至此王韶字子相為晉王并州行臺右僕射秦王俊為并州總管仍為長史嵗餘馳驛入京勞敝而卒時年六十八髙祖甚傷惜之謂秦王使者曰語爾王我前令子相緩来如何乃遣馳驛殺我子相豈不繇汝耶言甚悽愴使有司為之立宅曰往者何用宅為但以表我深心耳又曰子相受我委寄十有餘年終始不易寵章未極舍我而死乎發言流涕因命取子相封事數十紙傳示羣臣帝曰其直言規正禆益甚多吾每披尋未嘗釋手元巖為蜀王秀益州總管長史王性好奢侈憚巖為人每循法度巖卒之後王漸致非法寮佐無敢諫正者及秀得罪帝曰元巖若在吾兒豈有是乎栁裘開皇初為曹州刺史髙祖思裘定策功欲加榮秩将徵之顧問朝臣曰曹州刺史何當入朝或對曰即今冬也帝乃止裘尋卒髙祖傷惜者久之煬帝時長孫晟為右驍衛将軍卒帝深悼惜之􅈖贈甚厚後突厥圍雁門帝歎曰向使長孫晟在不令匈奴至此元夀為右光禄大夫大業七年兼左翊衛将軍從征遼東行至涿郡遇疾卒時年六十三帝悼惜焉哭之甚慟贈尚書右僕射光禄大夫後帝追思之擢子敏為守内史舍人唐髙祖武徳中許紹為陜州刺史行軍總管趙郡王孝恭之擊蕭銑也復令紹督兵以圍荆州㑹紹卒帝聞而傷惜為之流涕太宗貞觀四年尚書右僕射杜如晦薨帝手詔著作郎虞世南曰朕與如晦君臣義重不幸奄從物化追念勲舊痛惜于懐卿體吾此意為製碑文也後因食􅆶而羙愴然悼之遂輟食之半遣使置之靈座焉後賜房𤣥齡黄銀帶因謂𤣥齡曰如晦與公同輔朕今日所賜唯獨見公因泫然下泣以黄銀辟惡恐為鬼神所畏令取金帶遣𤣥齡親送于靈所其後帝夢見如晦若平生及旦以告𤣥齡言畢􅒣欷侍衛莫不掩涕因遣送御食以祭焉眀年如晦忌日帝復遣尚書官至第慰問妻子其國官府佐皆不之罷終始恩遇未之有焉六年襄州都督張公謹卒太宗聞而嗟悼出次發哀有司奏言隂陽書曰子在辰不可哭泣又為流俗所忌帝曰君臣之義同於父子情發于中安避辰日遂哭之十二年𢎞文館學士虞世南卒帝手勑魏王泰曰虞世南於我猶一體也拾遺補闕無日暫忘寔當代名臣人倫凖的吾有小失必犯顔而諫之今其云亡石渠東觀之中無復人矣痛惜豈可言也未㡬作詩一篇追思往古興亡之道既而嘆曰鍾子期死伯牙破琴朕之此篇将何所視因令起居郎褚遂良詣其靈帳讀而焚之兾世南神識感悟十六年太子太師魏徴薨帝追思不已謂侍臣曰夫以銅為鏡可以正衣冠以古為鏡可以知興替以人為鏡可以眀得失朕嘗保此三鏡以防己過今魏徴殂逝遂亡一鏡矣十八年宴司徒長孫無忌以下十餘人於丹霄殿各賜以貘皮右衛大将軍薛萬徹豫焉帝意在賜萬徹而誤呼其兄萬均愴然不樂曰萬均朕之兄舊不幸早亡朕不覺呼名豈其魂靈欲朕之賜也因令取皮呼萬均以同賜而焚之於前侍坐者無不感嘆是嵗右衛大将軍工部尚書李大亮卒帝素服哭於雒陽苑甚慟十九年車駕征遼中書令岑文本卒帝親臨視撫之流涕其夕帝聞巖鼓之聲曰文本殞逝情深惻怛今宵夜警所不忍聞遂命停之温彦博為中書令薨太宗謂侍臣曰彦博以憂國之故勞精竭神我見其不逮已二年矣恨不縱其閒逸致夭性靈姜確為左屯衛将軍遼東之役以行軍總管督兵攻盖牟城中流矢而卒時年五十一太宗甚哀悼之為五言詩曰鑿門初奉衛仗節始臨戎振鱗方躍浪騁翼正凌風未展六騎術先虧一簣功防身不足智狥命有餘忠悲驂嘶向路哀笳咽逺空悽凉大樹下流悼滿深衷時人榮之子暕嗣以確死王事拜朝散大夫髙宗總章二年司空英國公李勣薨帝謂左相姜恪等曰貞觀之初勣已經事朕荏苒之間四十餘載嵗月既久情素可知此人奉上忠貞事親孝謹執心平直終始不渝歴事三朝未嘗有過自古賢臣罕有其比忽此殂逝痛惜良深此公為性㢘慎不營産業今既亡沒當無餘財所有􅈖賻務令優厚因泣下久之開耀元年十二月太子少保郝處俊卒贈開府儀同三司荆州大都督帝甚傷悼之顧謂侍臣曰處俊志存忠正兼有學識至於雕飾服翫雖極知無益然常人不能抑情棄捨皆好尚奢侈處俊常保其質素終始不渝雖非元勲佐命固亦多時驅使又見遺表憂國忘家今既云亡深可傷惜即於光順門舉哀一日不視事祭以少牢𤣥宗開元八年右散騎常侍禇元量卒帝震悼久之謂宰相宋璟蘓頲等曰元量碩儒且有徳業朕蚤所師習每用尊崇三史九經前言往行有可以禆益時政規正朕躬未嘗不瞭瞭切論昨聞其属纊之時唯以修書為意永念其逝實軫于懐庶事宜皆優厚十五年蘓頲卒其葬日帝遊咸宜宫将出獵聞頲喪出愴然曰蘓頲今日葬吾寧忍娱遊遂中路還宫二十二年八月追贈故大理卿袁仁敬為越州刺史仁敬修身簡儉為政以清介稱帝思其為人乃詔褒贈肅宗時辛雲京太原節度回紇畏之數年無烽警之虞卒肅宗為之流涕後宰臣子儀元載等見帝言及雲京泫然久之代宗大歴中宰相楊綰薨帝驚悼久之詔贈司空仍宣㫖謂百官曰天不使朕致太平奪我楊綰之速也甫及大殮與卿等悲悼同懐宰輔賻贈恩遇哀榮之盛近来未有其比徳宗興元元年二月在奉天贈故永平軍節度行營兵馬使右散騎常侍兼御史大夫武威郡王賈隠林左僕射賜實封三百户隠林累有殊功性頗朴直初奉天圍觧百寮稱賀隠林抃舞因質言曰朱泚奔遁臣下大慶此皆宗社無疆之休然陛下性靈太急不能容忍若舊性不改雖朱泚敗亡臣亦恐憂未艾也帝虛懐納之及是思其讜言功效故褒贈有加焉仍贈絹百疋米百石喪官給貞元元年八月西平王李晟既卒時初城鹽州復鹽池帝賜宰相新鹽惻然思之命致鹽於靈座又特遣中使至晟第存撫諸子教戒備至聞愿等有一善帝喜見於色九月以贈太師李晟薨日近罷九日宴㑹十一年十一月辛亥以前太子賔客李愿為左領軍大将軍李憑為右威衛大将軍依前兼中丞皆太尉晟之子以免喪故晟諸子同日授官者凡九人景辰李愿及諸弟等九人召見於延英帝見愿等憫然久之曰朕雖在此常念卿等追懐勲舊何日㤀之卿等咸善居䘮或出於等倫朕甚嘉之各賜衣一襲帛三十疋張宏靖為監察御史時徳陽公主下嫁治地将侵宏靖家廟宏靖拜章陳情具述祖考之徳宏靖祖嘉貞相𤣥宗父延賞相徳宗徳宗慰撫之不令毁廟憲宗元和四年覽貞觀故事見侍中魏徴諫諍匪躬詔令京兆尹訪其子孫及故居其居在永興坊已質賣更無魏姓折為九家矣帝愍之出内庫錢二百萬購之以賜其孫稠及善仍禁其質賣文宗開成四年司徒中書令裴度以疾歸第帝思其勲舊勞問賜與中使旁午仍形於詠言御扎及聞度已薨歿帝震悼久之重令繕寫置於靈座周太祖時翟光鄴權知京兆尹光鄴卒帝初聞訃至􅆭然驚嘆曰天不助余為治賢良之臣遽此奄忽非獨予之不幸亦民之不幸也傷㢤世宗顯徳六年三月樞宻使王朴暴卒帝聞之駭愕即時幸其第及柩前以所執玉鉞卓地而慟者數四抑外戚王者膺天禄之重履至尊之勢非獨内徳茂也盖有外戚之助焉其所繇来尚矣然而地居貴寵家承豐富驕侈不期而自至禮度因縱而致敗自非見之於未朕防之於将然曷以免夫禍機而綏乎吉禄者矣故有挺英果之斷躬哲恵之羙志絶乎私愛慮極乎㡬深避閨閫之嫌思名器之重察其才智鑒乎古昔但加體貌之禮莫叅帷幄之議至有為惡自敗寘之於典刑檢身無状申之以教督抑損斯在懲艾兼至用能恢至公之道符大中之訓垂之嘉話為方来之軌範焉漢文帝以皇后弟竇廣國賢有行欲相之曰恐天下以吾私廣國久念不可而髙祖時大臣餘見無可者見謂見在之人乃以御史大夫嘉為丞相宣帝后霍光女也宣帝自在民間聞知霍氏尊盛日久内不能善光薨帝始躬親朝政御史大夫魏相給事中光妻顯謂其子禹雲山曰汝曹不務奉大将軍餘業曹軰也今夫給事中他人一間汝能復自救邪㑹魏大夫為丞相數宴見言事平恩侯與侍中金安上等徑入出省中時霍山自若領尚書自若猶言如故也帝令吏民得奏封事不闗尚書羣臣進見獨来往謂各各得盡言于上也於是霍氏甚惡之元帝時馮野王為大鴻臚數年御史大夫李延夀病卒在位多舉野王帝使尚書選第中二千石定其髙下之差也而野王行能第一帝曰吾用野王為三公後世必謂我私後宫親属以野王為比比例比音必媚之乃下詔曰剛强堅固確然亡欲大鴻臚野王是也心辨善辭可使四方少府五鹿充宗是也㢘潔節儉太子少傅張譚是也其以少府為御史大夫上繇下第而用譚越次避嫌不用野王以昭儀兄故也野王乃歎曰人皆以女寵貴我兄弟獨賤野王雖不為三公甚見器重有名當世成帝立有司奏野王王舅不宜備九卿以秩出為上郡太守哀帝少在國見成帝委政外家王氏僣盛常内悒悒即帝位多欲有所規正封拜丁傳奪王氏權後漢光武時馮衍與外戚隂興隂就交結帝懲西京外戚賔客故皆以法䋲之大者抵死徙其餘至貶黜眀帝永平中馬援女立為皇后帝圖畫建武中名臣列将于雲臺以椒房故獨不及援東平王蒼觀圖言於帝曰何故不畫伏波将軍像帝笑而不言馬防以特進就第多牧馬畜賦斂羗胡帝不善之數加譴勑所以禁遏甚備繇是權勢稍損賔客亦衰館陶公主為子求郎眀帝不許而賜錢千萬謂曰郎官上應列宿出宰百里有非其人則民受其殃是以難之閻章永平中為尚書以二妹為貴人章精力曉舊典久次當遷以重職帝以後宫親属竟不用出為步兵校尉魏太祖初卞后弟秉當建安時得為别步司馬后嘗對太祖怨言太祖答言但得與我作婦弟不為多邪后又欲太祖給其錢帛太祖又曰但汝盜與不為足邪故訖太祖世秉官不移財亦不益又詔曰后族之家不得當輔政之任又不得横受茅土之爵以此詔傳後世若有違背天下共誅之文帝黄初中欲封太后父母尚書陳羣奏曰陛下以聖徳應運受命創業革制當永為後式按典籍之文無婦人分土命爵之制在禮典婦因夫爵秦違古法漢氏因之非先王之令典也帝曰此議是也其勿施行以作著詔下蔵之臺閣永為後式後魏孝文時李比思皇后從父鳯之子也爵栢人侯弟安祖浮陽侯典祖安喜侯道念真定侯昆弟四人以外戚蒙見詔謂曰卿之先世内外有犯得罪於時然官必用才以親非興邦之選外氏之寵超於末葉從今已後自非竒才不得復外戚謬班抽舉既無殊能今且可還後列降爵安祖等改侯為伯並去軍號唐徳宗貞元六年閏四月詔原富平令侯遵罪停其官初遵縣人李載配納元陵園糞兩車愆期或譛毁載於遵者因寄怒以痛絶之載所負之直不過數千而罰之三百貫又枷禁拽辱焉載妹壻昭徳皇后弟王果奏言帝命御史臺鞫之具欵伏宰臣董晉竇叅進曰李載不納差科未為巨蠧侯遵峻其懲罰頗越常倫况是國親去就有禮毁損過甚理當罪責望貶澧州司户叅軍帝不欲以戚属之故而貶吏故有是命憲宗元和元年九月戊戌詔曰公主郡主駙馬等所養鷹鷂按放但於城南不得輙越諸界其故違者府縣切加簡察録名聞奏十二年十二月以駙馬都尉張克禮鄭何劉士涇等並停正官慮以戚属不脩官業故也文宗開成四年正月丁夘夜於咸泰殿觀燈延安公主衣裙寛大即時遣歸駙馬都尉竇澣待罪勑曰公主入叅衣服踰制從夫之義過有所歸竇澣宜奪兩月賜錢宣宗大中五年八月庚子勑曰應公主家有庒宅邸店宜依百姓例差役徴科如邑司擅行文牒隠庇兼蔵匿要人便委諸軍諸使及府縣當時捕捉収禁聞奏其邑司官吏及印本縁徴封湏行文牒今即便因他事攪擾府縣自今以後除徴封外如縁公事並令邑司申宗正寺寺司與酌量公事行牒其邑司並不得擅行文牒尊外戚春秋褒紀侯之義大雅詠申伯之思盖外戚之尊其所由来者尚矣􅒊自周室降及漢家厥政彌文其制増重崇母后之族貴皇孋之親慶延祖考寵被存沒或追崇名諡建置寢園或茂錫珪璋大唘土宇盡飾終之禮以賁於泉扄極加等之榮以光其門閥盖王者展因親之孝重齊體之道焉然能抑河潤之勢監肺腑之私時中而行盖可宗也周桓王將納后於紀紀本子爵故先褒為侯一云天子将娶于紀與之奉宗廟傳之無窮故封之百里盖以為天子得娶庶人女以其得専封也漢髙祖為漢王元年封吕后父吕公為臨泗侯文帝即位薄太后母前死葬櫟陽北帝乃追封太后父為靈文侯㑹稽郡置園邑三百家長丞以下使奉守寢廟上食祠如法櫟陽亦置靈文夫人園令如靈文侯園儀又景竇皇后景帝母也親早卒葬觀津薄太后詔有司追封竇后父為安成侯母曰安成夫人令濟河置園邑二百家長丞守比靈文園法武帝即位尊皇太后帝母景帝王后母也母臧兒為平原君追尊皇太后父仲為共侯仲槐里人也槐里起園邑二百家長丞奉守及平原君薨葬長陵亦置園邑如共侯法昭帝即位追尊皇太后帝母武帝趙媫妤也外祖趙父為順成侯詔右扶風置園邑二百家長丞奉守如法上官安上官皇后父祖将軍桀子也初安女入為昭帝媫伃安為騎都尉月餘立為皇后安以后父封桑樂侯遷車騎将軍后母前死葬茂陵郭東追尊曰敬夫人置園邑二百家長丞奉守如法宣帝地節三年求得悼后帝母史皇孫王夫人也母王媪制詔御史賜外祖母號為博平君以博平蠡吾兩縣户萬一千為湯沐邑追賜外祖王廼始諡曰思成侯詔涿郡治冢室置園邑四百家長丞奉守如法嵗餘博平君薨諡曰思成夫人詔徙思成侯合葬奉明顧成廟南置園邑長丞本號廣明故戾太子傳云皇孫及王夫人皆葬廣眀其後以置園邑奉守改曰奉明罷涿郡思成園許廣漢宣帝許后王父也帝即位嵗餘封為昌成君後封為平恩侯位特進廣漢薨諡曰載侯葬南園旁置邑三百家長丞奉守如法王奉光宣帝皇后父也后立帝封奉光為卭城侯元帝即位二年奉光薨諡曰共侯葬長門南園邑二百家長丞奉守如法元帝即位以太子母王妃為媫伃封其父楚為平陽侯後三日媫伃立為皇后楚位特進永光二年薨諡曰頃侯成帝許皇后父平恩侯嘉元帝舅也嘉自元帝時為大司馬車騎将軍輔政八九年矣及成帝立久之以特進侯就朝位後嵗餘薨諡曰恭侯趙臨成帝趙后父也后初入宫為媫伃帝封臨為成陽侯哀帝傅皇后定陶傅太后從弟子也哀帝即位傳太后封傅妃父晏為孤鄉侯傅氏既盛安㝡尊重後漢光武郭皇后父昌真定人仕郡功曹娶真定恭王女虢主恭王名普景帝七代孫建武二十六年后母虢主薨帝親臨送葬百官大㑹遣使者迎昌䘮柩與主合葬追贈昌陽安侯印綬諡曰思侯隂隆光烈隂皇后父也南陽人建武九年追爵諡隆為宣哀侯樊重光武外祖也建武十八年帝南祠章陵過湖陽祀重墓追爵諡為夀張敬侯立廟於湖陽章帝竇皇后父勲大司徒融孫也建初七年追爵諡勲安成思侯和帝永元九年追尊貴人帝母章帝梁貴人也為恭懐皇后制詔三公大鴻臚曰夫孝莫大於尊尊親親其義一也詩云父兮生我母兮鞠我撫我畜我長我育我顧我復我出入腹我欲報之徳昊天罔極朕不敢興事覽於前世太宗中宗是有舊典太宗文帝中宗宣帝追命外祖以篤親親其追封諡皇太后父竦為褒親愍侯比靈文順成侯魂而有靈嘉斯寵榮好爵顯服以慰母心遣中謁者與嬺及扈備禮西迎竦喪竦死漢陽獄故西迎也詣京師改殯賜東園畫棺玉匣衣衾建塋於恭懐皇后陵旁帝親臨送䘮百官畢㑹鄧訓鄧皇后父也為䕶羗校尉永元二年卒官十四年后立元興元年和帝以訓皇后之父使謁者持節至訓墓賜䇿追封諡曰平夀敬侯中宫自臨百官大㑹安帝永初元年爵號太夫人為新野君萬户供湯沐邑安帝元初二年立閻貴人為皇后二年以后父侍中暢為長水校尉封北宜春侯食邑五千户四年卒諡曰文侯延光元年追尊后母宗為滎陽侯宋楊女為章帝貴人安帝之祖母也安帝即位追封諡楊為當陽穆侯順帝梁皇后父商恭懐皇后弟葉氏侯雍子也為黄門侍郎永建元年襲父封三年選商女及妹入掖庭遷侍中屯校尉陽嘉元年女為皇后妹為貴人加商位特進更増國土賜安車駟馬其嵗拜執金吾三年以商為大将軍固稱疾不起四年使太常桓焉奉䇿就第即拜商乃詣闕受命眀年夫人隂氏薨追號開封君贈印綬桓帝鄧皇后父香和熹皇后從兄子也后立帝追贈香車騎将軍安陽侯印綬封后母宣為昆陽君宣卒贈葬禮皆依后母舊儀竇武扶風平陵人桓思皇后父也延熹八年后初入掖庭為貴人帝拜武郎中其冬立為皇后武遷越騎校尉封槐里侯五千户眀年冬拜城門校尉靈帝立拜武為大将軍更封武為聞喜侯靈帝建寧四年宋皇后立帝拜后父酆執金吾封不其鄉侯何真南陽宛人靈思皇后父也后以選入掖庭光和三年立為皇后眀年追號真為車騎将軍舞陽宣徳侯因封后母興為舞陽君獻帝伏皇后父完為侍中興平二年后立完遷執金吾建安元年拜完輔國将軍儀同三司魏眀帝太和元年三月以中山魏昌之安城鄉户千追封帝母文昭甄皇后父上蔡令追諡曰敬侯毛嘉河内人眀悼毛皇后父也太和元年后立眀帝拜嘉騎都尉進為奉車都尉又封博平鄉侯遷光禄大夫卞廣文帝母武宣皇后祖父眀帝太和四年追諡廣曰開陽君侯后父逺曰敬侯祖母周封陽都君為恭侯夫人皆賜印綬郭永安平廣宗人文徳皇后父也眀帝太和四年追諡永為安陽鄉敬侯母董為都鄉君青龍三年又追改封永為觀津敬侯世婦董為堂陽君使使者奉策祠以太牢齊王甄后文昭皇后兄儼孫女也后立父已沒帝封后母三人樂鄉君郭滿西平人眀元皇后父也齊王即位追封諡滿為西都定侯太后母杜為郃陽君髙貴鄉公卞后父隆武宣皇后弟秉孫也以后父為光禄大夫位特進封睢陽侯妻王為睢陽鄉君追封隆前妻留為順陽鄉君后親母故也陳留王卞后父琳秉弟蘭子也后立時小已歿封大妻留曰上陽鄉君晉武帝泰始九年追贈景獻羊皇后母漢左中郎将蔡邕女陳留蔡氏為之陽縣君諡曰穆王肅妻羊氏武帝母文眀王皇后母也未崇諡號泰始三年下詔曰昔漢文追崇靈文之號武宣有平原愽平之封咸所以奉尊尊之敬廣親親之恩也故衛将軍蘭陵景侯王肅夫人羊氏含章體順仁徳醇備内承世胄出嬪大國三從之行率禮無違仍遭不造頻喪統嗣撫育衆裔克成家道母儀之教光于邦族誕唘聖眀祚流萬國而早世殂殞不遇休寵皇太后孝思烝烝永慕罔極朕感存遺訓追逺傷懐其封夫人為縣君依徳紀諡主者詳如舊典於是使使持節謁者何融追諡為平陽靖君其後帝追慕不已復下詔曰外曽祖母故司徒王朗夫人楊氏舅氏尊属鄭劉二從母先后至愛每惟聖善敦睦遺言渭陽之感永懐靡及其封楊夫人及從母為鄉君邑各五百户太康七年追贈后祖母夏侯氏為滎陽鄉君楊文宗武元皇后父也初事魏為通事郎早卒武帝以后父追贈車騎将軍諡曰穆皇后終于眀光殿詔曰皇后逮事先后常冀能終始永奉宗廟一旦殞殂痛惜傷懐每自以夙喪二親於家門之情特隆入有心欲改葬父祖以頃者務崇儉約初未有言近垂困説此意情益愍之其使領前軍将軍駿等自克改葬之宜至時主者供給葬事賜諡母趙氏為縣君以繼母段氏為鄉君傳不云乎慎終追逺民徳歸厚且使亡者有知尚式嘉之楊駿武悼皇后父也為鎮軍府司馬武帝以后父超居重位自鎮軍将軍遷車騎将軍封臨晉侯恵帝即位進駿為太傅大都督假黄鉞録朝政恵帝賈皇后父充為太宰魯公薨帝即位充廟備六佾之樂母郭氏為宜城君及郭氏亡諡曰宣特加殊禮羊𤣥之恵帝羊皇后父也初為尚書郎帝以后父拜光禄大夫特進散騎常侍更封興晉侯遷尚書右僕射加侍中進爵為公成都王頴之攻長沙王乂也以討𤣥之為名遂憂懼而卒追贈車騎将軍開府儀同三司眀帝即位追贈元敬虞皇后父故南陽王文學豫為散騎常侍驃騎大将軍開府儀同三司平山縣侯又追懐母養之恩贈豫妻王氏為邙陽縣君庾琛眀穆皇后父也為丞相軍諮祭酒卒官明帝以后父追贈左将軍妻母丘氏追封鄉君子亮陳先志不受咸和中成帝又下詔追贈琛驃騎将軍儀同三司亮又辭焉成帝恭杜皇后父乂鎮南将軍預孫襲封當陽侯為丹陽丞卒咸康初追贈金紫光禄大夫諡曰穆后母裴氏封髙安鄉君至孝武帝崇進為廣徳縣君裴氏夀考號曰杜姥康帝即位徴拜褚皇后父豫章太守裒為侍中遷尚書封后母謝氏為尋陽鄉君穆帝即位尊后曰皇太后帝幼冲未親國政太后臨朝有司以裒皇太后父議加不臣之禮拜侍中衛軍録尚書事永和五年卒贈侍中太傅諡曰元穆六年正月帝臨朝以裒喪故懸而不樂十二年正月帝臨朝又以裒妻皇太后母喪懸而不樂穆帝即位徴拜何皇后父凖㪚騎侍郎不起卒升平元年追贈金紫光禄大夫封晉興縣侯子惔以父素行髙潔表讓不受哀帝即位贈王皇后母爰氏為國安鄉君孝武寧康初追贈簡順王皇后父故光禄勲遐為光禄大夫加散騎常侍王藴孝武定王皇后父也為吴興太守定后立藴以后父遷光禄大夫領五兵尚書封建昌縣侯藴不肯拜乃授都督京口諸軍事左将軍徐州刺史假節鎮于京口徴拜左僕射遷丹陽尹復為都督浙江東五郡鎮軍将軍㑹稽内史太元九年卒贈左光禄大夫開府儀同三司安帝即位追贈王皇后父故中書令獻之侍中特進光禄大夫恭帝禇皇后父爽為義興太守早卒帝以后父追贈金紫光禄大夫後魏道武慕容皇后立母孟為溧陽君文成和平二年追贈母閭后祖父延襄康公成定襄懿王馮熈文成馮皇后父為太師内都太官文成母詔熙上書不臣入朝不拜孝文太和十九年薨于代将葬贈假黄鉞侍中都督十州諸軍事大司馬太尉冀州刺史加黄屋左纛備九錫前後羽葆鼓吹皆依晉太宰安平王故事宣武立髙貴嬪為皇后入座奏封后母王氏為武邑郡君髙颺宣武母文昭皇后父也景眀中贈颺左光禄大夫賜爵渤海公母盖氏追封清河郡君于勁宣武于皇后父也初為征虜将軍宣武納其女為后封太原郡公妻劉氏為章武郡君勁卒贈司空孝眀踐祚以宣武胡后帝母也父河州刺史國珍為光禄大夫後妻梁為趙平君唐髙宗王皇后父仁祐為羅山令髙宗為皇太子以仁祐為陳州刺史永徽初以仁祐為特進魏國公母栁氏為魏國夫人仁祐尋卒贈司空中宗和思趙皇后父瓌為夀州刺史坐越王真連謀被誅神龍元年贈左衛大将軍韋𤣥貞中宗韋庶人父也為晉州叅軍庶人初納為太子妃以𤣥貞為豫州刺史神龍元年中宗即位追贈𤣥貞為上洛郡王睿宗肅眀劉皇后父延景陜州刺史景雲元年追贈尚書右僕射沛國公竇孝諶睿宗昭成竇皇后父也為潤州刺史景雲元年追贈太尉邠國公𤣥宗王皇后父仁皎下邽人先天元年以仁皎為太僕卿累加開府儀同三司祁國公肅宗張皇后父去逸為太僕卿肅宗即位贈左僕射母竇氏封義帝縣主代宗寳應二年追贈肅宗章敬吳皇后代宗母也祖神泉司徒贈后父令珪太尉贈后母李氏秦國夫人徳宗建中元年贈代宗睿真沈皇后徳宗母也父故秘書監易直太師貞元七年詔贈外祖随今沈琳贈司徒追封徐國公與外祖易直等立五廟以琳為始祖縁祠廟所湏官給王遇徳宗昭徳王皇后順宗母也父也官至秘書監貞元中贈揚州大都督順宗荘憲王皇后憲宗母也曽祖思敬試太子賔客祖難得英武軍使贈潞州都督父子顔衛尉卿順宗内禪贈思敬司徒難得太傅子顔太師穆宗即位詔皇太后憲宗懿安郭皇后穆宗母也曽祖贈太保追封岐國公敬之贈太傅太后父駙馬都騎太尉母虢國大長公主贈齊國大長公主敬宗即位崇重母族贈穆宗恭僖王皇后敬宗母也父故婺州金華令詔卿司空母張氏贈趙國夫人文宗即位贈穆宗貞獻蕭皇后文宗母也曽祖倰為太保祖聰為太傅父俊為太師冊府元龜卷一百四十一
