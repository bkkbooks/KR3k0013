body:
  text: 册府元龜巻七百三十六宋王欽若等撰陪臣部智謀傳云智者利人又云咨難曰謀盖智以興利謀以紓難者古之道也春秋之世下逮戰國諸侯競取其覇大夫各圖其功故有處重臣之列負先見之明考幾㣲極思慮畫經久之畧獻康濟之謀詭辭以濟禍亂重幣以誤仇敵或兵車之既㑹金皷之既陳辨盟載之義決勝負之策飾之以文辭潤之以禮樂足以讋服諸夏光啓邦家若其合從連衡搆怨速禍專任喉舌遐棄二刑者盖不足稱焉管子名夷吾字敬仲齊大夫也桓公問於管仲曰楚者山東之强國也其人民習戰鬬之道舉兵伐之恐力不能過兵弊於楚功不成於周為之奈何管子對曰即以戰鬬之道與之矣曰何謂也管子對曰公貴買其鹿桓公即為百里之域使人之楚買生鹿楚生鹿當一而八萬管子即令桓公與民通輕重藏榖什之六令左司馬伯公將白徒而鑄錢於莊山令中大夫王邑載錢二千萬求生鹿於楚楚王告其相曰彼金錢人之所重也國之所以存明主之所以賞有功禽獸者羣害也明主之所棄逐也今齊以重寳貴買吾羣害則是楚之福也天且以齊私楚也子告吾民􅇥求生鹿以盡齊之寳楚民即釋其耕農而田鹿管仲告楚之賈人曰子為我致生鹿二十賜子金百斤什至而金千斤也則是楚不賦於民而財用足也楚之男子居外女子居涂隰朋殺民藏粟伍倍楚以生鹿藏錢伍倍管子曰楚可下矣公曰奈何管子對曰楚錢伍倍其君且自得而修榖錢伍倍是楚强也桓公諾因令人閉闗不與楚通使楚王果自得而修榖榖不可三月而得也楚糴四百齊因令人載粟處芉之南楚人降齊者十分之四三年而楚服桓公又曰寡人欲西朝天子而賀獻不足為此有數乎管子對曰請以令城隂里使其牆三重而門九襲因使玉人刻石而為璧尺者萬泉八寸者八千七寸者七千珪中四千瑗中五百璧之數已具管子西見天子曰敝邑之君欲率諸侯而朝先王之廟觀於周室請以令使天下諸侯朝先王之廟觀於周室者不得不以彤弓石璧不以彤弓石璧者不得入朝天子許之曰諾號令於天下諸侯載黄金珠玉五榖文采布帛輸齊以收石璧流而之天下天下財物流而之齊故國八歳而無藉隂里之謀也桓公又曰寡人多務令衡籍吾國之富商蓄賈稱貸家以利吾貧萌農夫不失其本事反此有道乎管子對曰惟反之以號令為可耳桓公曰行事奈何管子對曰請使賓胥無馳而南隰朋馳而北寗戚馳而東鮑叔馳而西四子之行定夷吾請號令謂四子曰子能為我君視四方稱貸之間其受息之氓幾何干家以報吾鮑叔馳而西反報曰西方之氓者帶濟負河沮澤之萌也漁獵取薪蒸而為食其稱貸之家多者千鍾少者六七百鍾其出之鍾也一鍾其受息之萌九百餘家賓胥無馳而南反報曰南方之萌者山居谷處登降之萌也上斷輪軸下采杼栗田獵而為食其稱貸之家多者千萬少者六七百萬其出之中伯伍也其受息之萌八百餘家寗戚馳而東反報曰東方之萌帶山負海若處上斷福漁獵之萌也治葛縷而為食其稱貸之家丁惠高國多者五千鍾少者三千鍾其出之中鍾五釡也其受息之萌八九百家隰朋馳而北反報曰北方之萌者衍處負海煮泲為鹽梁濟取漁之萌也薪食其稱貸之家多者千萬少者六七百萬其出之中伯二十也受息之萌九百餘家凡稱貸之家出泉三千萬出粟三數千萬鍾受子息民三萬家四子已報管子曰不棄我君之有萌中一國而五君之正也然欲國之無貧兵之無弱安可得哉桓公曰為此有道乎管子曰惟反之以號令為可耳諸以令賀獻者皆以鐻枝蘭皷則必坐長什倍其本矣君之棧臺之職以坐長什倍請以令召稱貸之家君因酌之酒太宰行觴桓公舉衣而問曰寡人多務令衡藉吾國聞子之假貸吾貧萌使有以終其上令寡人有鐻枝蘭皷其賈中純萬泉也願以為吾貧萌決其子息之數使無劵契之責稱貸之家皆齊首而稽顙曰君之憂萌至於此請再拜以獻堂下桓公曰不可子使吾萌春有以倳耜夏有以決芸寡人之德子無所寵若此而不受寡人不得於心故稱貸之家曰皆再拜受所出棧臺之職未能參千純也而決四方子息之數使無劵契之責四方之萌聞之父敎其子兄敎其弟曰夫墾田發務上之所􅇥可以無庶乎君之憂我至於此此之謂反凖管子曰昔者癸度居人之國必四面望於天下天下高亦高天下高我獨下必失其國於天下桓公曰此若言曷謂也管子對曰昔萊人善染練茈之於萊純錙緺綬之於萊亦純錙也其周中十金萊人知之聞綦茈空周且歛馬作見於萊人操之萊有推馬是自萊失綦茈而反凖於馬也故可因者因之乘者乘之此因天下以制天下此之謂國凖桓公又曰寡人以定三君之居處矣三君杞邢衛今又將何行管子對曰臣聞諸侯貪于利勿與分于利君何不發虎豹之皮文錦以使諸侯令諸侯以縵帛鹿皮報桓公曰諾於是以虎豹皮文錦使諸侯諸侯以縵帛鹿皮報則令因始行於天下矣又桓公曰仲父何不遂交楚哉管子對曰不可楚人攻宋鄭燒􅌊熯焚鄭地使城壊者不得復築也屋之燒者不得復葺也令人有喪雌雄居屋如鳥鼠處穴要宋田夾塞兩川使水不得東流東山之西水淺滅垝四面百里而後可田也楚欲吞宋鄭思人衆兵强而能害已者必齊也是欲以文克齊以寳幣賂齊而齊自服故曰以文克齊而以武取宋鄭也楚取宋鄭而不知禁是失宋鄭也禁之則是又不信于楚也知困於内兵困於外非善舉也桓公曰善然則若何管子對曰請興兵而南存宋鄭而令曰無攻楚言與楚王遇冬㑹曰遇至於遇上而以鄭城與宋水為請楚若許則是我以文令也楚若不許則遂以武令焉桓公曰善于是遂興兵而南存宋鄭與楚王遇于召陵之上而令于遇上曰無貯粟無曲堤無擅廢適子無置妾以為妻因以鄭城與宋水為請于楚楚人不許遂退七十里而舍使軍人城鄭南之地立百代城焉取其雖百代而無敢毁者曰自此而北至于河者鄭自城之而楚不敢隳也東發宋田夾兩川使水復東流而楚不敢塞也遂南伐及踰方城濟于汝水望汶山汶音岷岷山江水所從出南致楚越之君而西伐秦北伐狄東存晉君于南自伐秦而自存晉於晉之南故曰東存北伐孤竹還存燕山兵車之㑹六乘車之㑹三九合諸侯反位為己覇修鐘磬而復樂管子曰此臣之所謂樂也又桓公問於管子曰代國之出何有管子對曰代之出狐白之皮公其貴買之管子曰狐白應隂陽之變六月而一見公貴買之代人忘其難得喜其貴賈必相率而求之則是齊金錢不必出代民民必去其本而居山林之中離枝聞之必侵其北離枝侵其北代必歸於齊公因令齊載金錢而徃桓公曰諾即令中大夫王師北將人徒載金錢之代谷之上求狐白之皮代王聞之即告其相曰代之所以弱於離枝者以無金錢也今齊乃以金錢求狐白之皮是代之福也子急令民求狐白之皮以致齊之幣寡人將以來離枝之民代人果去其本處山林之中求狐白之皮二十四月而不得一離枝聞之則侵其北代王聞之大恐則將其士卒保於代谷之上離枝遂侵其北王即將其士卒願以下齊齊未亡一錢幣使修三年而代服桓公又問於管子曰吾欲制衡山之術為之奈何管子曰公其令人貴買衡山之械噐而賣之燕代必從公而買之秦趙聞之必與公爭之衡山之械器必倍其賈天下爭之衡山械器必十倍以上公曰諾因令人之衡山求買械器不敢辨其賈齊修械器於衡山十月燕代聞之果令人之衡山求買械器燕代修三月秦國聞之果令人之衡山求買械噐衡山之君告其相曰天下争吾械器令其賈再什以上衡山之民釋其本修械器之巧齊即令隰朋漕粟於趙趙糴十五隰朋取之石五十天下聞之載粟而之齊齊修械器十七月修糴五月即閉闗不與衡山通使燕代秦趙即引其使而歸衡山械器盡魯削衡山之南齊削衡山之北内自量無械器以應二敵即奉國而歸齊矣又桓公問曰夫軍令則寄諸内政矣齊國寡甲兵為之若何管子對曰輕過而移諸甲兵制重罪贖以犀甲一㦸重罪死罪犀犀皮可為甲㦸車㦸也袐長丈六尺輕罪贖以鞼盾一㦸輕罪劓刖之屬鞼盾綴華有文如繢小罪讁以金分小罪不入五刑者以金贖有分兩之差今之罰金是也書曰金作贖刑宥閒罪宥赦也閒罪刑罰之疑者尚書曰五刑之疑有赦索訟者三禁而不可上下坐成以束矢索求也求訟者之情三禁禁之三日使審實其辭不可上下辭定不可移也坐成獄訟之坐已成也十二矢為東矢取徃而不反周禮以兩造禁民訟入束矢于朝然後聼之美金以鑄㦸劍鑄冶試諸狗馬狗馬難為利者惡金以鑄鉏夷斤􅠁惡粗夷平也所以削草平地也斤形似鉏而小􅠁研也試諸壤土則甲兵大足也王繆秦繆公内史也戎將由余使秦秦繆公問之得失之要對曰古有國者未嘗不以恭儉也失國者未嘗不以驕奢也由余因論五帝三王之所以衰及至布衣之士所以亡繆公然之於是告王繆曰鄰國有聖人敵國之憂也由余聖人也將奈之何王繆曰夫戎王居僻陋之地未嘗見中國之聲色也君遺之女樂以媱其志亂其政其臣下必踈因為由余請緩期使其君臣有間然後可圖繆公曰善乃使王繆以女樂二列遺戎王為由余請緩期戎王大悦許之於是張酒聼樂日夜不休終嵗媱縱牛馬多死由余歸數諫不聼去之秦繆公迎拜之上卿遂以并國十二辟地千里又云秦繆公見由余悦而欲留之由余不肯繆公以告蹇叔曰君以告史廖廖曰戎人不逹于五音與五味君不若遺之繆公以女樂二人與良宰遺之宰謂膳宰戎王喜迷惑大亂飲酒晝夜不休由余驟諫不聽因怒而歸秦屈瑕楚莫敖也楚伐絞軍其南門屈瑕曰絞小而輕輕則寡謀請無扞采樵者以誘之扞衛也樵薪也從之絞人獲三十人獲楚人也明日絞人爭出驅楚役徒于山中楚人坐其北門而覆諸山下坐猶守也覆設伏兵而待之大敗之為城下之盟而還公孫偃魯大夫也齊師宋師伐魯次于郎公孫偃曰宋師不整可敗也宋敗齊必還請擊之魯莊公弗許自雩門竊出䝉臯比而先犯之雩門魯南城門臯比虎皮公從之大敗宋師于乘丘齊師乃還鬬亷楚大夫也屈瑕將盟貳軫貳軫二國名鄖人軍于蒲騷將與隨絞州蓼伐楚師鄖國在江夏雲杜縣東南有鄖城蒲騷鄖邑絞國名州國在南郡華容縣東南蓼國今義陽棘陽縣東南湖陽城莫敖患之莫敖楚官名即屈瑕鬬亷曰鄖人軍其郊必不誡且日虞四邑之至也虞度也四邑隨絞州蓼也君次于郊郢以禦四邑君謂屈瑕也郊郢楚地我以銳師宵加于鄖鄖有虞心而恃其城恃近其城莫有鬬志若敗鄖師四邑必離莫敖曰盍請濟師於王盍何不也濟益也對曰師克在和不在衆商周之不敵君之所聞也商紂也周武王也傳曰武王有亂臣十人紂有億兆夷人成軍以出又何濟焉莫敖曰卜之對曰卜以決疑不疑何卜遂敗鄖師于蒲騷卒盟而還荀息晉大夫也晉獻公欲伐虢荀息曰君何不以屈産之乘垂棘之璧而借道乎虞也荀息晉大夫屈邑産駿馬垂棘出良璧公曰此晉國之寳也如受吾幣而不借吾道則如之何荀曰此小國之所以事大國也此謂璧馬之屬彼不借吾道必不敢受吾幣如受吾幣而借吾道則是我取之中府而藏之外府取之中廐而置之外廐也公曰宮之竒存焉宮之竒虞之賢大夫必不使受也荀息曰宮之竒之為人也逹心而懦懦弱又少長於君逹心則其言畧明逹之人言則舉綱領要不言提其耳則愚者不悟也懦則不能彊諌少長於君則君輕之且夫玩在耳目之前而患在一國之後此中知以上乃能慮之臣料虞公中知以下也公遂借道而伐虢宮之竒諌曰晉國之使者其辭卑而幣重必不便於虞虞公弗聼遂受其幣而借之道宫之竒諫曰語曰唇亡則齒寒其斯之謂與語諺語也挈其妻子以奔曹獻公亡虢五年而後舉虞荀息牽馬操璧而前曰璧則猶是也而馬齒加長矣猶是言如故先軫晉大夫也楚伐宋宋人使門尹般如晉師告急門尹般宋大夫公曰宋人告急舍之則絶與晉絶告楚不許我欲戰矣齊秦未可若之何未肯戰先軫曰使宋舍我而賂齊秦求救於齊秦藉之告楚假借齊秦使為宋請我執曹君而分曹衛之田以賜宋人楚愛曹衛必不許也不許齊秦之請喜賂怒頑能無戰乎言齊秦喜得宋賂而怒楚之頑必自戰也不可告請故曰頑公悦執曹伯分曹衛之田以畀宋人楚子使子玉去宋子玉使宛春告於晉師曰請復衛侯而封曹臣亦釋宋之圍衛侯未出境曹伯見執在宋已失位故言復衛封曹子犯曰子玉無禮哉君取一臣取二君取一以釋宋圍惠晉侯臣取二復曹衛為己功不可失矣言可伐先軫曰子與之定人之謂禮楚一言而定三國我一言而亡之我則無禮何以戰乎不許楚言是棄宋也救而棄之謂諸侯何言將為諸侯所怪楚有三施我有三怨怨讎已多將何以戰不如私許復曹衛以擕之私許二國使告絶于楚而後復之擕離也執宛春以怒楚既戰而後圖之須勝負決乃定計公悦乃拘宛春於衛且私許復曹衛曹衛告絶于楚子玉怒從晉師晉師退軍吏曰以君辟臣辱也且楚師老矣何故退子犯曰師直為壯曲為老豈在久乎㣲楚之惠不及此重耳過楚楚成王有贈送之禮退三舍辟之所以報也一舍三十里初楚子云若返國何以報我故退三舍以報背惠食言以亢其讎亢猶當也讎謂楚也我曲楚直其衆素飽不可謂老直氣盈飽我退而楚還我將何求若其不還君退臣犯曲在彼矣退三舍楚衆欲止子玉不可戰於莘北楚師敗績狐偃晉大夫也楚子及諸侯圍宋宋公孫固如晉告急公孫固宋莊公孫先軫曰報施救患取威定覇於是乎在矣先軫晉下軍之佐原軫也報宋贈馬之施狐偃曰楚始得曹而新昬於衛若伐曹衛楚必救之則齊宋免矣楚圍宋宋復告急于晉晉文公欲救則攻楚謂楚嘗有德不欲伐也欲釋宋宋又嘗有德于晉晉患之先軫曰執曹伯分曹衛地以與宋楚急曹衛其勢宜釋宋於是文公從之而楚成王乃引兵歸師叔楚大夫潘尫也楚伐庸自廬以徃振廪同食徃徃伐庸也振發也廪倉也同食上下無異饌也次于句澨楚西界也使廬戢黎侵庸戢黎廬大夫及庸方城方城庸地上庸縣東有方城亭庸人逐之囚子揚䆫䆫戢黎官屬三宿而逸曰庸師衆羣蠻聚焉不如復大師還復句澨師且起王卒合而後進師叔曰不可姑又與之遇以驕之彼驕我怒而後可克先君蚡冒所以服陘隰也蚡冒楚武王諸父陘隰地名也又與之遇七遇皆北軍走曰北惟禆儵魚人實逐之禆儵魚庸三邑魚魚復縣今巴東永安縣輕楚故但使三邑人逐之庸人曰楚不足與戰矣遂不設僃楚子乘驛㑹師於臨品驛傳車也臨品地名分為二隊隊部也兩道攻之子越自石溪子貝自仞以伐庸子越鬬椒也石溪仞皆庸道秦人巴人從楚師羣蠻從楚子盟蠻見楚强故遂滅庸公孫申鄭大夫也晉人執鄭伯鄭人圍許公孫申謀之曰我出師以圍許示不畏晉為將改立君者而紓晉使紓緩也勿亟遣使詣晉示欲更立君也晉必歸君明年晉歸鄭伯仲孫蔑魯大夫孟獻子也襄公二年秋㑹晉荀罃宋華元衛孫林父曹人邾人于戚謀鄭故也鄭人叛晉謀計也孟獻子曰請城虎牢以偪鄭虎牢舊鄭邑今屬晉知武子曰善鄫之㑹吾子聞崔子之言今不來矣元年孟獻子與齊崔杼次于鄫崔杼有不服晉之言獻子以告武子滕薛小邾之不至皆齊故也三國齊之属寡君之憂不惟鄭言復憂齊叛罃將復於寡君而請于齊以城事白晉君而請㑹之欲以觀齊志得請而告吾子之功也得請謂齊人應命告諸侯㑹築虎牢若不得請事將在齊將伐齊吾子之請諸侯之福也城虎牢足以服鄭息征伐豈惟寡君頼之傳言荀罃能用善謀冬復㑹于戚齊崔武子及滕薛小邾之大夫皆㑹知武子之言故也武子言吾事將在齊齊人懼帥小國而㑹之遂城虎牢鄭人乃成如獻子之謀慶虎陳大夫也楚子嚢圍陳諸侯㑹陳侯于鄬以救之晉㑹諸侯陳侯患楚楚圍陳故慶虎慶寅謂楚人曰吾使公孫黄徃而執之二慶陳執政大夫公子黄哀公弟楚人從之為執黄二慶使告陳侯于㑹鄬之㑹曰楚人執公子黄矣君若不來羣臣不忍社稷宗廟懼有二圖背君屬楚陳侯逃歸知武子晉大夫也諸侯伐鄭鄭人恐乃行成與晉成也中行獻子曰遂圍之以待楚人之救也而與之戰不然無成獻子荀偃也恐楚救鄭鄭復屬之知武子曰許之盟而還師以敝楚人敝罷也吾三分四軍分四軍為三部與諸侯之鋭以逆來者來者楚也於我未病楚不能矣晉各一動而楚三來故曰不能猶愈於戰勝聚戰暴骨以逞不可以爭言爭當以謀不可以暴骨大勞未艾君子勞心小人勞力先王之制也艾急也言當從勞心之勞諸侯皆不欲戰乃許鄭成子展鄭大夫也鄭人患晉楚之故諸大夫曰不從晉國幾亡幾近也楚弱於晉晉不吾疾也疾急也晉疾楚將辟之何為而使晉師致死於我言當作何計楚弗敢敵而後可固與也固與晉也子展曰與宋為惡諸侯必至吾從之盟楚師至吾又從之則晉怒甚矣晉能驟來楚將不能乃固與晉大夫説之使疆埸之司惡於宋使守疆埸之吏侵犯宋宋向戍侵鄭大獲子展曰師而伐宋可矣若我伐宋諸侯之伐我必疾吾乃聼命焉且告於楚楚師至吾又與之盟而重賂晉師乃免矣言如此乃免於晉楚之難子展侵宋欲以致諸侯諸侯伐鄭齊太子光宋向戍先至於鄭門於東門其莫晉荀罃至于西郊東侵舊許許之舊國鄭新邑衛孫林父侵其北鄙諸侯㑹于北林師于向向地在潁川長社縣東北右還次于𤨏北行而西為右還榮陽宛陵縣西有𤨏候亭圍鄭觀兵于南門觀示也西濟于濟隧濟隧水名鄭人懼乃行成荀偃晉大夫中行獻子也衛侯出奔衞人立公孫剽晉侯問衞故於中行獻子問衛逐君當討否對曰不如因而定之衞有君矣謂剽已立伐之未可以得志而勤諸侯史佚有言曰因重而撫之重不可移就撫安之仲虺有言曰亡者侮之亂者取之推亡固存國之道也仲虺湯左相君其定衛以待時乎待其昏亂之時乃伐之冬㑹於戚謀定衛也定立剽樂王鮒晉大夫桓子也晉欒盈帥曲沃之甲因魏獻子以晝入絳獻子魏舒絳晉國都初欒盈佐魏莊子於下軍莊子魏絳獻子之父獻子私焉故因之私相親愛趙氏以原屏之難怨欒氏成八年荘姫譖之欒郤為徵韓趙方睦韓起讓趙武故和睦中行氏以伐秦之役怨欒氏十四年晉伐秦欒黶違荀偃命曰余馬首欲東而固與范氏和親范宣子佐中行偃于中軍知悼子少而聼於中行氏悼子知罃之子荀盈也少年十七知氏中行氏同祖故相聴從程鄭嬖於公鄭亦荀氏宗惟魏氏及七輿大夫與之七輿官名樂王鮒侍坐于范宣子或告曰欒氏至矣宣子懼桓子曰奉君以走固宫必無害也且欒氏多怨子為政欒氏自外子在内其利多矣既有利權又執民柄賞罰為民柄將何懼焉欒氏所得其惟魏氏乎而可强取也夫克亂在權子無懈矣公有姻喪夫人有杞喪王鮒使宣子墨縗冐絰晉自殽戰還遂常墨縗二婦人輦以如公恐欒氏有内應拒之故為婦人服而進奉公以如固宮固宮宮之有臺官備守者叔孫豹魯大夫穆叔也襄公在楚楚康王卒楚人使公親襚望侯有遣使賵禭之禮今楚欲依遣使之禮公患之穆叔曰祓殯而禭則布幣也先使巫祓除殯之凶而行禭禮與朝而布幣無異乃使巫以桃茢先祓殯楚人弗禁既而悔之厨人濮宋厨邑大夫也華登以吳師救華氏登前年奔吳齊烏枝鳴戍宋烏枝鳴齊大夫厨人濮曰軍志有之先人有奪人之心後人有待其衰盍及其勞且未定也伐諸若入而固則華氏衆矣悔無及也從之齊師宋師敗吴師于鴻口獲其二帥公子苦雂偃州員冀芮晉大夫也晉獻公二十三年遂發賈華等伐屈賈華晉右行大夫屈潰夷吾將奔翟冀芮曰不可重耳已在矣今徃晉必移兵伐翟翟畏晉禍且及不如走梁梁近於秦秦强吾君百嵗後可以求入焉遂奔梁二十五年晉伐翟翟以重耳故亦擊晉於齧桑翟地晉兵解而去晉既殺奚齊卓子秦穆使公子縶弔公子重耳重耳再拜不稽首起而哭退而不私縶退弔公子夷吾于梁如弔重耳之命夷吾告冀芮曰秦人勤我矣冀芮曰公子勉之乎亡人無狷潔狷潔不行重賂配德公子盡之無愛財人實有之我以徼幸不亦可乎夷吾出見使者再拜稽首而不哭退而私於公子縶曰中大夫里克與我矣吾命之以汾陽之田百萬丕鄭與我矣吾命之以負蔡之田七十萬君茍輔我蔑天命矣吾必遂矣亡人茍入掃除宗廟定社稷亡人何國之與有君實有郡縣且入河外列城五豈謂君無有亦為君之東游津之上無有難急也亡人之所環挾纓瓌以望君之塵垢者黄金四十鎰白玉之珩六雙不敢當公子請納之左右公子縶反致命穆公曰吾與公子重耳重耳仁再拜不稽首不敢為後也起而哭愛其父也退而不私不没於利也公子縶曰君之言過矣君若求置晉君而戴之置仁不亦宜乎君若求置晉君以成名於天下則不如置不仁以滑其中且可以進退臣聞之仁有置武有置仁置徳武置服是故先置公子夷吾寔為惠公穆公問冀芮曰公子誰恃於晉國對曰臣聞之亡人無黨有黨必有讎夷吾之少也不好弄戲不過所復怒不及色及其長也弗改是故出亡亦無惡於國而衆安之不然夷吾不佞其誰能恃君子曰善以徴勸張孟談趙臣也知伯帥趙魏而伐范中行氏滅之休數年使人請地於韓韓康子欲勿與叚規諌曰不可夫知伯之為人也好利而鷙復來請地不與必加兵於韓矣君其與之與之彼狃又將請於他國他國不與必鄉之以兵然則韓可以免於患難而待事之變康子曰善使使者致萬家之邑一於知伯知伯悦又使人請地於魏魏宣子欲勿與趙葭諫曰彼請地於韓韓與之請地於魏魏弗與則是魏内自强而外怒知伯也然則其錯兵於魏必矣不如與之宣子曰諾因使人致萬家之邑一於知伯知伯悦又使人之趙請蔡臯狼之地趙襄子弗與知伯因隂結韓魏將以伐趙趙襄子召張孟談而告之曰夫知伯之為人陽親而隂踈三使韓魏而寡人弗與焉其移兵寡人必矣今吾安居而可張孟談曰夫董閼安于簡子之才臣也世治晉陽而尹鐸循之其餘政敎猶存其定居晉陽君曰諾乃使延陵君將車騎先之晉陽君因從之至行城郭案府庫視倉廪召張孟談曰吾城郭之完府庫足用倉廪實矣無矢奈何張孟談曰臣聞董子之治晉陽公宫之垣皆以狄蒿苫楚廧之其高至丈君發而用之於是發而試之其堅則箘簬之勁不能過也君曰矢足矣吾銅少若何張孟談曰臣聞董子之治晉陽也公宮之室皆以鍊銅為柱質請發而用之則有餘銅矣君曰善號令以定備守以具三國之兵乘晉陽城遂戰三月不能㧞因紓軍而圍之決晉水而灌之圍晉陽三年城中巢居而處懸釜而炊財食將盡士卒羸病襄子謂張孟談曰糧食匱城力盡士大夫病吾不能守矣欲以城下何如張孟談曰臣聞之亡不能存危不能安則無為貴知士也君釋此計勿復言也臣請見韓魏之君襄子曰諾張孟談於是隂見韓魏之君曰臣聞唇亡則齒寒今知伯帥二國之君伐趙趙亡矣亡則君為之次矣二君曰我知其然矣夫知伯之為人也麤中而少親我謀未遂而知則禍必至為之奈何張孟談曰謀出二君之口入臣之耳人莫之知也二君即與張孟談隂約三軍與之期日夜遣入晉陽張孟談以報襄子襄子再拜之張孟談因朝知伯而出遇知過一云知果轅門之外知過入見知伯曰二主殆將有變君曰何如對曰臣遇張孟談於轅門之外其志矜其行高知伯曰不然吾與二主約謹矣破趙三分其地寡人所親之必不欺也子釋之勿出諸口知過出見二主入説知伯曰二子色動而意變必背君不如令殺之知伯曰兵著晉陽三年矣旦暮當拔之而嚮其利乃有他心不可子愼勿復言知過曰不殺則遂親之知伯曰親之奈何知過曰魏宣子之謀臣曰趙葭韓康子之謀臣曰叚規是皆能移其君之計君其與二君約破趙則封二子者各萬家之縣一如是則二主之心不可變而君得其所欲矣知伯曰破趙而三分其地又封二子者則吾所得者少不可知過見君之不用也言之不聼出更其姓為輔氏遂去不見張孟談聞之入見襄子曰臣遇知過於轅門之外其視有疑臣之心入見知伯出更其姓今暮不擊必後之矣襄子曰諾使張孟談見韓魏之君日夜期敎守堤之吏而決水灌知伯軍救水而亂韓魏翼而擊之襄子將卒犯其前大敗知伯軍而禽知伯知氏盡滅惟輔氏存焉叚規韓臣也三晉已破知氏將分其地叚規謂韓王曰分地必取成臯韓王曰成臯石溜之地也寡人無所用之叚規曰不然臣聞一里之厚而動千里之權者地利也萬人之衆而破三軍者不意也王用臣言則韓必取鄭矣王曰善果取成臯至韓之取鄭也果從成臯始大伍員事吳吳子問於伍員曰初而言伐楚余知其可也而恐其使余徃也又惡人之有余之功也今余將自有之矣伐楚何如對曰楚執政衆而乖莫適任患若為三師以肄焉肄猶勞也一師至彼必皆出彼出則歸彼歸則出楚必道敝罷敝于道亟肄以罷之亟數也多方以誤之既罷而後以三軍繼之必大克之闔廬從之楚於是乎始病文種越大夫也吳王夫差起師伐越越王勾踐起師逆之江大夫種乃獻謀曰夫吳之與越惟天所授王其無庸戰夫申胥華登簡服吳國之士於甲兵而未嘗有所挫也一人善射百夫决拾勝未可成也夫謀必素見成事焉而後履之不可以授命王不如設戎約辭行成以喜其民以廣侈吳王之心吾以卜之於天天若棄吳必許吾成而不吾足也將必寛然有伯諸侯之心焉既罷弊其民而天奪之食安受其燼乃無有命矣越王許諾乃令諸稽郢行成于吳曰寡君勾踐使下臣郢不敢顯然布幣行禮敢私告於下執事曰昔者越國見禍得罪於天王天王親舉玉趾以心孤勾踐而又赦宥之君王之於越也繄起死人而肉白骨也孤不敢忘天災其敢忘君王之大賜乎今句踐申禍無良草鄙之人敢忘天王之大德而思邉垂之小怨以重得罪於下執事句踐用帥二三之老親任重罪頓顙於邉今君王不察盛怒屬兵將殘伐越國越國固貢獻之邑也君王不以鞭箠使之而辱軍士使寇令焉句踐請盟一介嫡女執箕帚以晐姓於王宫一介嫡男奉盤匜以隨諸御春秋貢獻不解於王府天王豈辱裁之亦征諸侯之禮也夫諺曰狐埋之而狐搰之是以無成功今天王既封殖越國以名聞於天下而又刈亡之是天王之無成勞也雖四方之諸侯則何實以事吳敢使下臣盡辭惟天王秉利度義焉吳王夫差乃許越成范蠡越大夫也越國大饑榖不熟王恐召范蠡而謀之蠡曰王何患焉今之饑此越國之福而吳之禍也夫吳國甚富而財有餘其王年少智寡剽輕好須㬰之名不思後患其王吳王夫差王若重幣卑辭以請糴於吳則食可得也王越王勾踐也食得其糶越必有吳而王何患焉得其糶終必得吳國王何憂焉王曰善乃使人請食於吳王將與之伍子胥諫曰不可與也夫吳之與越接土鄰境道易人通仇讎敵國也非吳喪越越必喪吳若燕秦齊魯山處陸居豈能踰五湖九江越十七陂以有吳哉踰渡也越歴也陂險難也故曰非吳䘮越越必喪吳今將輸之粟與之食是長吾讎而飬吾死也財匱而民怨悔無及也不若勿與而攻之固其數也數術也此昔吾先王之所以覇且夫饑代事也先王闔閭也代更也猶淵之與陂誰國無有吳王曰不然吾聞之義兵不攻服仁者食饑餓今服而攻之非義兵餓而不食非仁者不仁不義雖得十越吾不為也遂與之不出三年而吳亦饑使人請食於越越王弗與乃攻之夫差為禽陳軫與張儀俱事秦惠王皆貴重爭寵軫奔楚楚未之重也而使陳軫使於秦過梁欲見犀首犀首謝弗見軫曰吾為事來公不見軫軫將行不得待異日犀首見之陳軫曰公何好飲也犀首曰無事也曰吾請令公饜事可乎曰奈何曰田需約諸侯從親楚王疑之未信也公謂於王曰臣與燕趙之王有故數使人來曰無事何不相見願謁行於王王雖許公公請勿多車以車三十乘可陳之於庭明言之燕趙燕趙客聞之馳車告其王使人迎犀首楚王聞之大怒曰田需與寡人約而犀首之燕趙是欺我也怒而不聼其事齊聞犀首之北使人以事委焉犀首遂行三國相事皆斷於犀首軫遂至秦韓魏相攻期年不解秦惠王欲救之問於左右左右或曰救之便或曰勿救便惠王未能為之决陳軫適至秦惠王曰子去寡人之楚亦思寡人不陳軫對曰王聞夫越人莊舄乎王曰不聞曰越人莊舄仕楚執珪有頃而病楚王曰舄故越之鄙細人也今仕楚執珪富貴矣亦思越不中謝對曰凡人之思故在其病也彼思越則越聲不思越則楚聲使人徃聼之猶尚越聲也今臣雖棄逐之楚豈能無秦聲哉惠王曰善今韓魏相攻期年不解或謂寡人救之便或曰勿救便寡人不能決願子為子主計之餘為寡人計之陳軫對曰亦嘗有以夫卞莊子刺虎聞於王者乎莊子欲刺虎館竪子止之曰兩虎方且食牛食甘必爭爭則必鬬鬬則大者傷小者死從傷而刺之一舉必有雙虎之名卞莊子以為然立須之有頃兩虎果鬬大者傷小者死從傷者而刺之一舉果有雙虎之功今韓魏相攻期年不解是必大國傷小國亡從傷而伐之一舉必有兩實此猶莊子刺虎之類也臣主與王何異也惠王曰善卒弗救大國果傷小國亡秦興兵而伐大尅之此陳軫之計也張儀事秦惠王王欲發兵以伐蜀以為道險狹難至而韓又來侵秦秦惠王欲先伐韓後伐蜀恐不利欲先伐蜀恐韓襲秦之敝猶豫未能決司馬錯與張儀争論於惠王之前司馬錯欲伐蜀張儀曰不如伐韓王曰請聞其説儀曰親魏善楚下兵三川塞什谷之口徐廣曰一作尋成臯鞏縣有尋口當屯留之道魏絶南陽楚臨南鄭秦攻新城宜陽以臨二周之郊誅周王之罪侵楚魏之地周自知不能救九鼎寳噐必出據九鼎按圖籍挾天子以令於天下天下莫敢不聼此王業也今夫蜀西僻之國而戎翟之倫也敝兵勞衆不足以成名得其地不足以為利臣聞爭名者於朝爭利者於市今三川周室天下之朝市也而王不爭焉顧争於戎翟去王業逺矣司馬錯曰不然臣聞之欲富國者務廣其地欲强兵者務富其民欲王者務博其德三資者備而王隨之矣今王地小民貧故臣願先從事於易夫蜀西僻之國也而戎翟之長也有桀紂之亂以秦攻之譬如使豺狼逐羣羊得其地足以廣國取其財足以富民繕兵不傷衆而彼已服焉拔一國而天下不以為暴利盡西海而天下不以為貪是我一舉而名實附也而又有禁暴止亂之名今攻韓劫天子惡名也而未必利也又有不義之名而攻天下所不欲危矣臣請論其故周天下之宗室也齊韓之與國也周自知失九鼎韓自知亡三川將二國并力合謀以因乎齊趙而求解乎楚魏以鼎與楚以地與魏王不能止也此臣之所謂危也不如伐蜀完惠王曰善寡人請聼子卒起兵伐蜀十月取之遂定蜀貶蜀王更號為侯而使陳莊相蜀蜀既屬秦秦以益强富厚輕諸侯儀又以商於六百里地詐楚懐王後秦要楚欲得黔中地欲以武闗外易之楚王曰不願易地願得張儀而獻黔中地秦王欲遣之口弗忍言張儀乃請行惠王曰彼楚王怒子之負以商於之地是且甘心於子張儀曰秦强楚弱臣善靳尚尚得事楚夫人鄭袖所言皆從且臣奉王之節使楚楚何敢加誅假令誅臣而為秦得黔中之地臣之上願遂使楚楚懐王至則囚張儀將殺之靳尚謂鄭袖曰秦王甚愛張儀而不欲出之今將以上庸之地六縣賂楚以美人聘楚以宫中善謳歌者為媵楚王重地尊秦秦女必貴而夫人斥矣不若為言而出之於是鄭袖日夜言懐王曰人臣各為其主用今地末入秦秦使張儀來至重王王未有禮而殺張儀秦必大怒攻楚妾請子母俱遷江南毋為秦所魚肉也懐王後悔赦張儀厚禮之如故叚干朋齊臣也魏惠王圍邯鄲趙求救於齊齊威王召大臣而謀曰救趙孰與勿救騶忌子曰不如勿救叚干朋曰不救則不義且不利威王曰何也對曰夫魏氏并邯鄲其於齊何利哉且夫救趙而軍其郊是趙不伐而魏全也故不如南攻襄陵以弊魏邯鄲拔而乘魏之弊威王從其計無忌魏公子也齊楚相約而攻魏秦昭王救之魏王以秦救之故欲親秦而伐韓以求故地無忌謂魏王曰秦與戎翟同俗有虎狼之心貪戾好利無信不識禮義德行茍有利焉不顧親戚兄弟若禽獸耳此天下之所識也非有所施厚積德也故太后母也而以憂死穰侯舅也功莫大焉而竟逐之兩弟無罪而再奪之國此於親戚若此而况於仇讎之國乎今王與秦共伐韓而益近秦患臣甚惑之而王不識則不明羣臣莫以聞則不忠今韓氏以一女子奉一弱主内有大亂外交强秦魏之兵王以為不亡乎韓亡秦有韓地與大梁鄰王以為安乎王欲得其故地今負强秦之親王以為利乎秦非無事之國也韓亡之後必將更事更事必就易與利就易與利必不伐楚與趙矣是何也夫越山踰河絶韓上黨而攻强趙是復閼與之事秦必不為也若道河内倍鄴朝歌絶漳滏水與趙兵決於邯鄲之郊是知伯之禍也秦又不敢伐楚道涉山谷行三千里而攻冥阨之塞楚之險塞也徐廣曰或以為今江夏鄳縣所行甚逺所攻甚難秦又不為也若道河外倍大梁右蔡左召陵與楚兵決陳郊秦又不敢故曰秦必不伐楚與趙矣又不攻衞與齊矣夫韓亡之後兵出之日非魏無攻已秦固有懐茅在修武軹縣有茅亭邢丘在平臯城垝津以臨河内河内共汲必危汲縣屬河内有鄭地成臯滎陽亦屬鄭得垣雍垣雍城在卷縣卷縣屬魏地巻縣又有長城經陽武到密者也決滎澤水灌大梁大梁必亡王之使者出過而惡安陵氏於秦召陵有安陵郡征羌有安陵亭也秦之欲誅之久矣秦葉陽昆陽與舞陽鄰聼使者之惡之隨安陵氏而亡之繞舞陽之北以東臨許南國必危國無害已夫憎韓不愛安陵氏可也夫不患秦之不愛南國非也異日者秦在河西晉國去梁千里魏國之界千里又云河南梁縣有注城有河山以䦨之有周韓以間之從林鄉軍林鄉在宛縣以至於今秦七攻魏五入囿中一作城中邉城盡拔文臺墮垂都一云魏山都句陽有垂亭焚林木伐麋鹿盡而國繼以圍又長驅梁北東至陶衛之郊北至平監平縣屬河南平或作乎字史記齊闞止作監字闞在東平須昌縣所亡於秦者山南山北河外河内大縣數十一作百名都數百一作十秦乃在河西晉去梁千里而禍若是矣又況於使秦無韓有鄭地無河山而䦨之無周韓而間之去大梁百里禍必繇此矣異日者從之不成也楚魏疑而韓不可得也今韓受兵三年秦撓之以講識亡不聼投質於趙請為天下雁行頓刄楚趙必集兵皆識秦之欲無窮也非盡亡天下之國而臣海内必不休矣是故臣願以從事王王速受楚趙之約趙挾韓之質以存韓而求故地韓必効之此士民不勞而故地得其功多於與秦共伐韓而又免與彊秦鄰之禍也夫存韓安魏而利天下此亦王之天時已通韓上黨於共甯朝歌有甯鄉使道安城出入賦之是魏重質韓以其上黨也今有其賦足以富國韓必德魏愛魏重魏畏魏韓必不敢反魏是韓則魏之縣也魏得韓以為縣大梁河外必安矣今不存韓二周安陵必危楚趙大破衛齊甚畏天下西鄉而馳秦入朝而為臣不久矣虞卿為趙上卿秦趙戰於長平趙不勝亡一都尉趙王召樓昌與虞卿曰軍戰長平不勝尉復死復一作係寡人使束甲而趨之何如樓昌曰無益也不如發重使為媾古后切求和曰媾虞卿曰昌言媾者以為不媾軍必破也而制媾者在秦且王之論秦也欲破趙之軍乎不邪王曰秦不遺餘力矣必且欲破趙軍虞卿曰王聼臣發使出重寳以附楚魏楚魏欲得王之重寳必内吾使趙使入楚魏秦必疑天下之合從且必恐如此則媾乃可為也趙王不聼與平陽君為媾發鄭朱入秦秦内之趙王召虞卿曰寡人使平陽君為媾於秦秦已内鄭朱矣卿以為奚如虞卿對曰王不得媾軍必破矣天下賀戰勝者皆在秦矣鄭朱貴人也入秦秦王與應侯必顯重以示天下楚魏以趙為媾必不救王秦知天下不救王則媾不可得成也應侯果顯鄭朱以示天下賀戰勝者終不肯媾長平大敗遂圍邯鄲為天下笑秦解邯鄲圍而趙王入朝使趙郝約事於秦割六縣而媾虞卿謂趙王曰秦之攻王也倦而歸乎王以其力尚能進愛王而弗攻乎王曰秦之攻我也不遺餘力矣必以倦而歸也虞卿曰秦以其力攻其所不能取倦而歸王又以其力之所不能取以送之是助秦自攻也來年秦復攻王王無救矣王以虞卿之言告趙郝趙郝曰虞卿誠能盡秦力之所至乎誠知秦力之所不能進此彈丸之地弗與秦來年復攻王王得無割其内而媾乎王曰請聼子割矣子能必使來年秦之不復攻我乎趙郝對曰此非臣之所敢任也他日三晉之交於秦相善也今秦善韓魏而攻王王之所以事秦必不如韓魏也今臣為足下解負親之攻開關通幣齊交韓魏至來年而王獨取攻於秦此王之所以事秦必在韓魏之後也此非臣之所敢任也王以告虞卿虞卿曰郝言不媾來年秦復攻王王得無割其内而媾乎今媾郝又以不能必秦之不復攻也今雖割六城何益來年復攻又割其力之所不能取而媾此自盡之術也不如無媾秦雖善攻不能取六縣趙雖不能守終不失六城秦倦而歸兵必罷我以六城收天下以攻罷秦是我失之於天下而取償於秦也吾國尚利孰與坐而割地自弱以强秦哉今郝曰秦善韓魏而攻趙者必以為韓魏不救趙也而王之軍必孤又以王之事秦不如韓魏也是使王歳以六城事秦也即坐而城地盡來年秦復求割地王將與之乎弗與是棄前功而挑秦禍也與之則無地以給之語曰强者善攻弱者不能守今坐而聼秦秦兵不弊而多得地是强秦而弱趙也以益强之秦而割愈弱之趙其計固不止矣且王之地有盡而秦之求無已以有盡之地而給無已之求其勢必無趙矣趙王計未定樓緩從秦來趙王與樓緩計之曰予秦地何如毋予孰吉緩辭讓曰此非臣之所能知也王曰雖然試言公之私樓緩對曰王亦聞夫公甫文伯母乎公甫文伯仕於魯病死女子為自殺於房中者二人其母聞之弗哭也其相室曰焉有子死而弗哭者乎其母曰孔子聖人也逐於魯而是人不隨也今死而婦人為之自殺者二人若是者必其於長者薄而於婦人厚也故從母言之是為賢母從妻言之是必不免為妬妻故其言一也言者異則人心變矣今臣新從秦來而言勿予則非計也言予之恐王以臣為為秦也故不敢對使臣得為大王計不如予之王曰諾虞卿聞之入見王曰此飾説也王眘音慎勿予樓緩聞之徃見王王又以虞卿之言告樓緩樓緩對曰不然虞卿得其一不得其二夫秦趙搆難而天下皆説何也曰吾且因强而乘弱矣今趙兵困於秦天下之賀戰勝者則必盡在於秦矣故不如亟割地為和以疑天下而慰秦之心不然天下將因秦之强怒乘趙之弊𤓰分之趙且亡矣何秦之圖乎故曰虞卿得其一不得其二願王以此決之勿復計也虞卿聞之徃見王曰危哉樓子之所以為秦者是愈疑天下而何慰秦之心哉獨不言其示天下弱乎且臣言勿予者非固勿予而已也秦索六城於王而王以六城賂齊齊秦之深讎也得王之六城并力西擊秦齊之聼王不待辭之畢也則是王失之於齊而取償於秦也而齊趙之深讎可以報矣而示天下有能為也王以此發聲齊兵末窺於境臣見秦之重賂至趙而反媾於王也從秦為媾韓魏聞之必盡重王重王必出重寳以先於王則是王一舉而結三國之親而與秦易道也趙王曰善則使虞卿東見齊王與之謀秦虞卿未返而秦使者已在趙矣樓緩聞之亡去趙於是封虞卿以一城虞卿又謂趙王曰人之情寜朝人寜朝於人乎趙王曰寜朝人耳何故寜朝於人虞卿曰夫魏為從主而違者范痤也今王能以百里之地君萬戸之都請殺范痤痤死則從事可移於趙趙王曰善乃使人以百里之地請殺范痤於魏魏主許諾使司空執范痤而未殺也痤獻書魏主曰臣聞趙王以百里之地請殺痤之身也夫殺無罪痤薄故也而得百里之地大利也臣竊為大王美之雖然而有一焉百里之地大可得而死者不可復生也則王必為天下笑也臣竊以為與其死人市不若以生人市便也又遺其後相信陵君一作信安君書曰夫趙魏敵戰之國也趙王以咫尺之書來而魏王輕為之殺無罪之痤痤雖不肖故魏之免相也嘗以魏之故得罪於趙夫國内無用臣外雖得地勢不能守然今能用魏者莫如君矣王聼趙殺痤之後强秦襲趙之欲倍趙之割君將何以止之此君之累也信陵君曰諾遽言之王而出之孫臏齊臣也魏伐趙趙與韓親共擊魏趙不利戰於南梁宣王召田忌復故位韓氏請救於齊宣王召大臣而謀曰蚤救孰與晩救騶忌子曰不如勿救田忌曰弗救則韓且折而入於魏不如蚤救之孫臏曰夫韓魏之兵未弊而救之是吾代韓受魏之兵顧反聼命於韓也且魏有破國之志韓見亡必東面而愬於齊矣吾因深結韓之親而晩承魏之弊則可重利而得尊名也宣王曰善乃隂告韓之使者而遣之韓因恃齊五戰不勝而東委國於齊齊因起兵使田忌田嬰將嬰一作盻孫子為師救韓趙以擊魏大敗之馬陵殺其將龎涓虜魏太子申又云南梁之難韓氏請救于齊田侯召大臣而謀曰早救之孰與晚救之便張丐對曰晩救之韓且折而入于魏不如蚤救之田忌曰不可夫韓魏之兵未弊而我救之是我代韓而受魏之兵顧反聴命于韓也且夫魏有破韓之志韓見且亡必東愬于齊我因隂結韓之親而晩承魏之弊則國可重利可得名可尊矣田侯曰善乃隂告韓使者而遣之韓自以専有齊國五戰五不勝東愬于齊齊因起兵擊魏大敗之馬陵魏破韓弱韓魏之君因田嬰北面而朝田侯田侯齊宣王也樂毅為燕亞卿當是時齊湣王强南敗楚相唐昧於重丘西摧三晉於觀津遂與三晉擊秦助趙滅中山破宋廣地千餘里與秦昭王爭重為帝已而復歸之諸侯皆欲背秦而服於齊湣王自矜百姓弗堪於是昭王問伐齊之事樂毅對曰齊覇國之餘業也地大人衆未易獨攻也王必欲伐之莫如與趙及楚魏於是使樂毅約趙恵文王别使連楚魏令趙嚪秦嚪進説之意以伐齊之利諸侯害齊湣王之驕暴皆爭合從與燕伐齊樂毅還報燕昭王悉起兵使樂毅為上將軍惠施魏臣也齊魏戰於馬陵齊大勝魏殺太子申覆十萬之軍魏王召惠施而告之曰夫齊寡人之讎也怨之至死不忘國雖小吾嘗欲悉起兵而攻之何如對曰不可臣聞之王者得度而覇者知計今王所以告臣者疏於度與計王固先屬怨於趙而後與齊戰今戰不勝國無守戰之備王又欲起而攻齊此非臣之所諭也王若欲報齊乎則不如因變服折節而朝齊楚王必怒矣王㳺人而令其鬬則楚必伐齊以休楚而伐罷齊則必為楚禽矣是王以楚毁齊也王曰善乃使人報於齊願臣畜而朝田嬰許諾張丑曰不可戰不勝魏而得朝禮與魏和而下楚此可以大勝也今戰勝魏覆十萬之軍而禽太子申臣萬乘之魏而卑秦楚此其暴戾定矣且楚王之為人也好用兵而甚務名終為齊患者必楚矣田嬰不聼遂内魏王而與之並朝齊使再至趙氏醜之楚王怒自將而伐齊趙應之大敗齊於徐州册府元龜巻七百三十六
