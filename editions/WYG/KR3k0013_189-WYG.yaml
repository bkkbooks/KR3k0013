body:
  text: 册府元龜卷一百八十九宋王欽若等撰閏位部孝德奉先尊親孝德夫孝德之本也故王者之德莫大於孝上所以寕宗廟下所以教人民導揚徽聲感勵風俗莫加於此焉若乃凌晨問安時刻靡失逾月侍疾衣帶不解躬易脂澤至於感慟親臨祭享罔不流涕所以雲物變采井泉湧發盖天性之所感故明靈之攸答傳示後葉美莫大焉宋髙祖少時家貧有大志不治亷隅事繼母以孝謹稱及即大位春秋已髙每旦入朝太后未嘗失時刻梁髙祖生知淳孝年六嵗獻皇太后終水漿不入口三日哭泣哀苦有過成人内外親黨咸皆敬異及丁文皇帝憂時為齊隨王諮議隨府在荆鎮髣髴奉問便投劾星馳不復寢食倍道就路憤風驚浪不蹔停止髙祖形容本壯及還至京都銷毁骨立親表士友不復識焉望宅奉諱氣絶乆之每哭輙嘔血數升服内不復嘗米唯資大麥日止二溢拜掃山陵涕淚所洒松草變色及居帝位即於鍾山造大愛敬寺青溪邉造智度寺又於臺内立至敬等殿又立七廟堂月中再過設浄饌每至展拜嘗涕泗滂沱哀動左右大同十年三月謁建陵有紫雲蔭陵上食頃乃散帝望陵流涕所霑草皆變色陵傍有枯泉至是而流水香潔辛丑哭于脩陵簡文帝居穆貴嬪憂哀毁骨立晝夜號哭不絶聲所坐之席霑濕盡爛後梁宣帝性不飲酒安於儉素事其母以孝聞明帝孝悌慈仁有人君之量四時祭享未嘗不悲慕涕北齊孝昭帝性至孝太后不豫出居南宫帝行不正履容色貶悴衣不解帶殆將四旬殿去南宫五百餘歩鷄鳴而去辰時方還來去徒行不乘輦太后所苦小増便即寢伏閣外食飲藥物皆躬親太后嘗心痛不自堪忍帝立侍帷前以􅆶搯手心血流出袖友愛諸弟無君臣之隔梁太祖性孝愿奉太后未嘗小失色朝夕視膳為士君子之規範帝嚴察用法無纎毫假貸太后言之嘗頗為省刑奉先夫有國家者曷嘗不宗祀以本仁作廟以觀德尊祖以致孝奉先以盡禮自秦遷周鼎頗遵古制逮於呉蜀建號江左禪代莫不追加號謚充奉園邑増建廟貌聿修時祭親執卣鬯躬謁松檟載籍所記可得而詳也東魏北齊以及朱梁雖國褊運促日不暇給而崇薦尊稱肅祗嘗事亦未曽闕焉秦始皇二十六年初并天下采上古帝位號號曰皇帝追尊莊襄王為太上皇二十七年為太極廟二世元年下詔増始皇寢廟犧牲令羣臣議尊始皇廟羣臣皆頓首言曰古者天子七廟諸侯五大夫三雖萬世世不軼毁今始皇為極廟四海之内皆獻貢職增犧牲禮咸備無以加先王廟或在西雍或在咸陽天子儀當獨奉酌祠始皇廟自襄公已下軼毁所置凡七廟羣臣以禮進祠以尊始皇廟為帝者祖廟蜀先主章武元年四月即皇帝位于成都立宗廟祫祭髙皇帝以下裴松之云先王雖云出自孝景而世數悠逺昭穆難明既紹漢祚不知以何帝為元祖以立親廟于時英賢作輔儒生在官宗廟制度必有憲章而載紀闕畧良可恨哉後主以章武三年五月襲位于成都是月先主梓宫自永安宫還成都謚曰昭烈皇帝追尊母甘皇后曰昭烈皇后呉大帝權黄龍元年四月即皇帝位追尊父破虜將軍烏程侯堅為武烈皇帝廟曰始祖墓曰髙陵母呉氏為武烈皇后張紘以破虜有破走董卓扶持漢室之勲討逆平定江東建立大業宜有記頌以昭公美既成呉大帝省讀悲感曰君貪識孤家門閥閲也廢帝亮建興元年四月即位上大帝尊謚曰大皇帝墓曰蔣陵五鳯二年十二月作太廟太平元年正月為太帝立廟稱太祖廟景帝即位遣使追尊母王夫人曰敬懷皇后改葬敬陵後主皓元興元年八月即位謚休曰景皇帝葬定陵九月追謚父和曰文皇帝初尊和為昭獻皇帝俄又改為文皇帝改葬明陵置園邑二百家令承奉守寳鼎元年十月分呉郡丹陽九縣為呉興郡治烏程置太守四時奉祠文皇帝廟二年有司奏言文皇帝宜立廟京邑是年七月使守大匠薛珝營立寢堂號曰清廟十二月遣守丞相孟仁太常姚信等備官寮中軍歩騎二千人以靈輿法駕東迎神於明陵皓引見仁親拜送于庭一云比孟仁還皓手詔日夜相繼奉問神靈起居動止巫覡言見和被服顔色如平生皓悲喜淚涕悉召公卿尚書詣闕門下受賜靈輿當至使丞相陸凱奉三牲祭於近郊皓於金城外露宿明日望於東門之外其翊日拜廟薦祭歔欷悲感又追尊和母王夫人曰大懿皇后宋髙祖初為宋王立廟于彭城祭髙祖以下四世永初元年六月即位追尊皇考為孝穆皇帝皇妣為穆皇后七月戊申遷神主于太廟車駕親奉少帝以永初三年五月即位上武帝謚曰武皇帝廟號髙祖葬初寜陵九月有司奏武皇帝配南郊武敬皇后配北郊文帝元嘉元年八月丁酉謁初寕陵還即位戊午拜太廟甲辰追尊所生胡媫妤為皇太后謚曰章皇太后陵曰熈寕立廟於京師四年二月乙卯行幸丹徒謁京陵二十六年二月乙亥車駕陸道幸丹徒謁京陵二十八年三月拜初寕陵孝武帝以元嘉三十年四月即位于新亭崇改太祖文皇帝號謚初元凶劭弑逆上謚曰景皇帝廟號中宗至是改焉五月甲午謁初寕陵大明二年正月壬戌拜初寕陵六年正月辛卯宗祀文皇帝于明堂以配上帝八年正月辛巳宗祀文皇帝于明堂前廢帝以大明八年閏五月即位上孝武皇帝尊謚廟號世祖九月祔葬文穆皇太后于景寜陵明帝泰始元年十二月即位乙亥追尊所生沈媫妤曰宣皇太后陵號崇憲壬午車駕謁太廟後廢帝以㤗豫元年四月即位上明皇帝尊謚廟號太宗順帝昇明元年七月壬辰即位癸卯車駕謁太廟南齊太祖髙皇帝建元元年四月即位追尊皇考曰宣帝皇妣為孝皇后陵曰永安六月庚辰法駕奉七廟主于太廟十月己卯車駕殷祠太廟武帝以建元四年三月即位上髙皇帝尊謚廟號太祖五月庚申以髙皇帝配南郊髙昭皇后配北郊永明五年四月庚午車駕殷祠太廟九月詔太廟四時祭宣皇帝薦麥餅鴨臛孝皇后薦笋鴨卵脯醬炙白肉髙皇帝薦肉膾葅羮昭皇后薦茗粽炙魚竝平生所嗜也十年十月車駕殷祠太廟鬱林王以永明十一年七月即位上武皇帝尊謚廟號世祖九月辛酉追尊父文惠太子為世宗文皇帝隆昌元年正月戊午車駕拜崇安陵明帝建武元年十月即位十一月追謚父始安貞王道生為景皇妃江氏為懿皇后别立寢廟陵號脩安四年八月追尊景皇所生王氏為恭太后東昏侯以永㤗元年七月即位上髙宗尊謚曰明皇帝梁髙祖武帝初封梁公立四親廟天監元年四月即位追尊皇考為文皇帝廟號太祖皇妣為獻皇后陵號建陵十一月己未立小廟十二年六月癸巳新作太廟増基九尺十五年六月丙申改作小廟畢大同十年三月甲午輿駕幸蘭陵謁建陵至脩陵壬寅詔曰朕自違桑梓五十餘載乃眷東顧靡日不思今四方欵闗海外有截獄訟稍簡國務小閒始獲展敬園陵但増感慟帝嘗夢具朝服入太廟拜伏悲感且於延務殿説所夢何敬容對曰臣聞孝悌之至通於神明陛下性與天通故感應斯夣上極然之便有拜陵之議簡文帝以太清三年五月辛巳即位癸未追尊所生穆貴嬪為皇太后十一月上武皇帝尊謚廟號髙祖陵號脩陵元帝以承聖元年十一月即位於江陵追尊所生妣阮脩容為文宣太后後梁宣帝詧大定元年追尊其父統為昭明皇帝廟號髙宗統妃蔡氏為昭德皇后明帝巋以大定八年二月嗣位上宣皇帝尊謚廟號中宗改元天保元年五月太皇太后龔氏薨謚曰元太后九月所生母曹太妃薨謚曰孝皇太妃二年皇太后王氏薨謚曰宣静皇后陳髙祖武帝永定元年十月即位追尊皇考曰景皇帝廟號太祖陵曰瑞陵皇妣董太夫人曰安皇后依梁初園陵故事遷景皇帝神主祔於太廟二年四月甲子親祀太廟文帝以永定三年六月即位上武皇帝尊謚廟號髙祖天嘉元年六月辛巳改謚皇祖妣景安皇后曰景文皇后甲午追䇿故始興昭烈王妃曰孝妃始興王文帝父也二年十二月甲申立始興國廟於京師用王者之禮帝自入祠而皇考始興昭烈王廟在始興謂之東廟至是徙東廟神主祔于梁之小廟故曰國廟祭用天子儀廢帝以天康元年四月即位六月上文皇帝尊謚廟號顯祖十月庚申親祠太廟光大元年十月甲申親祠太廟二年七月丙午親祠太廟九月戊午親祠太廟宣帝大建元年正月甲午即位乙未謁太廟戊午親祠太廟十月壬午親祠太廟二年春正月丙午親祠太廟閏四月戊申謁太廟十月乙酉親祠太廟三年十月甲申親祠太廟四年正月庚午親祠太廟十月乙酉親祠太廟五年正月甲午親祠太廟六年正月壬午親祠太廟四月甲午親祠太廟八年四月乙未親祠太廟東魏孝静帝以天平元年十月丙寅即位壬申享太廟四年四月辛未遷七帝神主入新廟北齊文襄帝初為魏相置王髙祖秦州使君王曾祖太尉武貞公王祖太師文穆公王考相國獻武王凡四廟文宣帝天保元年五月即位己未追尊皇祖文穆王為文穆皇帝皇祖妣為文穆皇后皇考獻武王為獻武皇帝亡兄文襄王為文襄皇帝甲戌遷神主於太廟三年正月乙丑有事于太廟十月丁卯文襄皇帝神主入於太廟文宣帝受禪置六廟曰皇祖司空公廟皇祖吏部尚書廟皇祖秦州使君廟皇祖文穆皇帝廟太祖獻武皇帝廟世宗文襄皇帝廟為太廟獻武已下不毁已上則遞毁竝同廟而别室既而遷神主于太廟文襄文宣竝太祖之子文宣初疑其昭穆之次欲别立廟衆議不同至二年冬始祔太廟春祠夏禴秋嘗冬蒸皆以孟月并臘凡五祭禘祫始梁之制每祭室一太牢始以皇后配祭至河清定令四時祭廟禘祭及元日廟建竝設庭燎三所廢帝乾明元年二月上文宣皇帝尊謚廟號髙祖孝昭帝皇建二年正月壬子禘于太廟武成帝太寜元年十一月即位上孝昭皇帝尊謚河清元年正月壬午享太廟五月祔葬武明皇后于義平陵二年正月以武明皇后配祭北郊後主天統元年十一月己丑太上皇詔改太祖獻武皇帝為神武皇帝廟號髙祖獻明皇后為武明皇后其文宣謚號委有司議定十二月庚午有司奏改髙祖文宣皇帝為威宗景烈皇帝二年正月癸巳祫祭於太廟四年十二月上太上皇尊謚曰成皇帝廟號世祖武平元年十月改威宗景烈皇帝謚號顯祖文宣皇帝梁太祖初為梁王以唐乾寜二年二月領親軍屯於單父㑹寒食帝乃親拜文穆皇帝陵於碭山縣午溝里開平元年四月即位追尊四代廟號髙祖媯州府君上謚曰宣元皇帝廟號肅祖太廟第一室陵號興極祖妣髙平縣君范氏追謚宣僖皇后皇曾祖宣惠王上謚曰光獻皇帝廟號敬祖第二室陵號永安祖妣秦國夫人楊氏追謚光孝皇后皇祖武元王上謚曰昭武皇帝廟號憲祖第三室陵號光天祖妣呉國夫人劉氏追謚昭懿皇后皇考文明王上謚曰文穆皇帝廟號烈祖第四室陵號咸寜皇妣晉國太夫人王氏追謚文惠皇后五月甲午詔天下管屬及州縣官名犯廟諱者各宜改換城門郎改為門局郎避烈考諱茂州改為汶州避曽祖諱桂州慕化縣改為歸化縣潘州茂名縣改為越裳縣癸卯司天監奏曰辰内有戊字請改為武從之七月己亥帝御崇元殿内出追尊四廟上謚號玉册寳共八副宰臣文武百官儀仗鼓吹導引至太廟行事三年正月己巳奉遷太廟四室神主赴西京太常儀仗鼓吹導引齊車文武百官奉祠於開明門外甲戌帝發東都己卯至西都庚寅親享太廟二月丙午宗正寺請修興極永安光天咸寜陵竝合添修上下宫殿栽植松栢制可癸亥勑豐沛之基寢園所在悽愴動闗於情理充奉自繫於國章宜設陵臺兼升縣望其輝州碭山縣宜升為赤縣仍以本縣令兼四陵臺令七月丙寅命宰臣楊渉赴西都以孟秋享太廟乾化元年十月有司以立冬太廟薦享上言詔丞相杜曉赴西都攝祭行事二年正月丙戌有司以孟春太廟薦享上言命丞相杜曉攝祭行事末帝即位追尊母賢妃張氏為元貞皇太后祔葬宣陵貞明三年十二月幸雒陽遂幸伊闕拜宣陵尊親夫王者之政不可得而變革者尊尊也親親也所以宣孝熈之德崇教化之本况夫膺餘閏之數富霸王之資當創物之初暨繼明之始莫不采有司之奏稽歴代之典緣禮經之大義傳春秋之深㫖尊以懿號崇以宫名昭備物之章極奉親之意誠有國者之要道也雖云角立其可闕諸蜀後主章武三年五月襲位于成都尊先主皇后曰皇太后呉孫皓元興元年八月即位九月尊母何姬為昭獻皇后稱升平宫月餘進為皇太后宋髙祖永初元年即位六月尊王太后蕭氏為皇太后有司奏曰臣聞道積者慶流德洽者禮備故祗敬表于崇髙嘉號彰於盛典伏惟太后母儀之德於穆不已保翼之訓光被洪業雖幽明同慶稱謂未窮稽之前代禮有常凖宜式遵舊章允副羣望臣等請上宋王太后號曰皇太后少帝永初三年五月即位尊皇太后曰太皇太后景平元年七月尊所生母張夫人為皇太后有司奏曰臣聞嚴親敬始所因者本克孝之道繇中被外伏惟夫人德並坤元徽音光紹發祥兆慶誕啓聖明宜崇極徽號永備盛則從春秋母以子貴之義遵漢晉推愛之典謹上尊號為皇太后宫曰永樂孝武帝元嘉三十年四月即位尊所生路淑媛為皇太后有司奏曰歴集周邦徽音克嗣氣淳漢國沙麓發祥昔在上代業隆祚逺未有不敷隂教以闡洪基膺淑慶以載聖哲者也伏惟淑媛柔明内服徽儀外範􅅤靈初廸則庶熈仰耀𢎞訓蕃閫則家邦被德民應惟和神屬推祉故能誕鍾睿躬用集大命固靈根於既殞融勲烈乎中興載厚化深聲永詠緝宜式諧舊典恭享極號謹奉尊號曰皇太后宫曰崇憲前廢帝大明八年閏五月即位崇皇太后曰太皇太后皇后曰皇太后宫曰永訓明帝㤗始元年十二月即位太皇太后復號崇獻皇太后後廢帝㤗豫元年四月即位七月尊皇后曰皇太后宫曰𢎞訓崇拜所生陳貴妃為皇太妃有司奏曰臣聞河龍啟聖理映明神郊電基皇慶爍大地故資敬之道粹古銘風沿貴之誼𦕈代凝則伏惟貴妃含和月晷表淑星樞徽音峻古柔光照世聲華帝掖軌秀天嬪景發皇明祚昌睿命而備物之章未煥彛䇿逺酌前王允陟鴻典臣等叅議謹上尊號曰皇太妃輿服一如晉孝武李太妃故事宫曰𢎞化順帝即位昇明元年崇拜帝所生陳昭華為皇太后南齊鬱林王即位尊母文恵太子妃為皇太后稱宣徳宫梁敬帝紹㤗元年十月即位尊所生夏貴妃為皇太后後梁宣帝詧為周太祖所立居江陵東城稱皇帝於其國尊其所生母龔氏為皇太后明帝巋嗣位之元年尊其祖母龔太后曰太皇太后嫡母王皇后曰皇太后所生母曹貴嬪曰皇太妃陳文帝永定三年六月即位七月尊皇后章氏為皇太后宫曰慈訓廢帝天康元年四月即位五月尊皇太后曰太皇太后皇后沈氏曰皇太后宫曰安德後主大建十四年即位尊皇后桞氏為皇太后宫曰𢎞範北齊文宣帝天保元年五月即位尊皇太后婁氏為太皇后宫曰宣訓廢帝天保十年十月即位尊皇太后為太皇太后皇后李氏為皇太后孝昭帝皇建元年八月即位詔奉太皇太后還稱皇太后皇太后稱文宣皇后後主天統四年十二月太上皇帝殂上太上皇后尊號為皇太后册府元龜卷一百八十九
