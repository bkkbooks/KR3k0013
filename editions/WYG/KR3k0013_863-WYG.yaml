body:
  text: 册府元龜卷八百六十三宋王欽若等撰總録部生日名諱為人後生日禮曰子生男子設弧於門左又曰夫告宰名宰辯告諸男名書曰某年某月某日某生而藏之皆所以重其嗣而謹其籍也故或父子叶辰或君臣同日拘於俗避㡬滅其天性善於知人遽識其國器然則廢興之數吉凶之理盖黙定於上天非人謀之所能易也著之編次取捨可見矣魯莊公名同桓公子也桓公六年九月丁卯子同生公曰是其生也與吾同物命之曰同物類也謂同日孔子以魯襄公二十一年十月一日庚子生時嵗在己卯齊田文相齊封孟嘗君初父靖郭君嬰有子四十餘人其賤妾有子名文文以五月五日生嬰告其母曰勿舉也其母竊舉生之及長其母因兄弟而見其子文於嬰嬰怒其母曰吾令若去此子而敢生之何也文頓首因曰君所以不舉五日子者何故嬰曰五日子者長與戸齊將不利其父母文曰人生受命於天乎將受命於戸邪嬰黙然文曰必受命於天君何憂焉必受命於戸則可髙其戸耳誰能至者嬰曰子休矣漢盧綰者豐人也與髙祖同里盧綰親與髙祖太上皇相愛親謂父也及生男髙祖綰同日生里中持羊酒賀兩家及髙祖綰壯俱學書又相愛也里中嘉兩家親相愛生子同日壯又相愛復賀兩家羊酒綰後封燕王宋王鎮惡北海劇人也祖猛字景畧符堅僭號關中猛為將相有文武才北土重之父休為河東太守鎮惡以五月五日生家人以俗忌欲令出繼疎宗猛見竒之曰此非常兒昔孟甞君惡月生而相齊是兒亦將興吾門矣故名之為鎮惡後位至安西司馬征虜將軍後周宇文孝伯字胡玉吏部安化公深之子也其生與髙祖同日太祖甚愛之養於第内及長又與髙祖同學位至大將軍唐史思明營州柳城人也與安禄山同鄉生先禄山一日思明以歳除日生禄山歳日生後俱以謀逆伏誅喬琳為太子太師䧟於朱泚為偽吏部尚書及官軍收復京城坐斬臨刑歎曰喬琳以七月七日生亦以此日死豈非命也名諱生而制名殁而是諱盖孝子因心之道先王立禮之方然而君無所隱奉至尊也臨文亦稱存大義也若乃畏冐諱之禁慮犯上之咎史家自變其例連職難與之俱理所未安事必改作其或惡其聲近特以字行發乎智端無所廢事又若初不内出人肆凌犯形於諧翫深辱士風亦有封執沽名矯枉傷正是為過當殊非中禮至於徳愛在民久而彌劭衆為之避不亦韙乎晉僖侯名司徒廢為中軍宋武公名司空廢為司城魯獻公名具武公名敖廢二山二山具敖也更以其鄉名山孔子母名徵在言徵不稱在言在不稱徵漢司馬遷父名談遷作史記袁盎𫝊以宦者趙談為趙同班固撰前漢書復作趙談後漢陳蕃子逸為魯相國人為諱改蕃縣曰皮晉江統為中郎選司以統叔父春為宜春令統因上疏曰故事父祖與官職同名皆得改選之例臣以為父祖改選者盖為臣子開地不為父祖之身也而身名所加亦施於臣子佐吏係屬朝夕從事官位之號發言所稱若指實而語則違經禮諱尊之義若詭亂廻避則為廢官擅犯憲制今以四海之廣職位之衆名號繁侈士人殷富至使有受寵皇朝出身宰牧而令佐吏不得表其官稱子孫不得言其位號所以上嚴君父下為臣子體例不通若易私名以避官職則違春秋不奪人親之義臣以為身名與官職同者宜與觸父祖名為比體例既全於義為𢎞朝廷從之羊祜為都督荆州諸軍事及祜薨荆州人為祜諱名屋室皆以門為稱改戸曹為辭曹焉毛穆之字憲祖小字武生名犯靖王后諱故行字後又以桓温母名憲及更稱小字後為安西將軍庾翼叅軍王述父承祖湛述為揚州刺史加征虜將軍初至主簿請諱報曰亡祖先君名播海内逺近所知内諱不出門餘無所諱王舒父名㑹舒授撫軍將軍㑹稽内史秩中二千石舒上疏辭以父名朝議以字同音異於禮無嫌舒復陳音雖異而字同求換他郡於是改㑹字為鄶舒不得已而行孔安國父名愉安國除侍中表以黄門郎王愉名犯私諱不得連署求觧有司議云名終諱之有心所同聞名心懼亦明前誥而禮復云君所無私諱大夫之所有公諱無私諱又云詩書不諱臨文不諱豈非公義奪私情王制屈家禮哉尚書安衆男臣先表中兵曹郎王祐名犯父諱求觧職明詔爰發聽許換曹盖是恩出制外耳而頃者互相瞻式源流既啓莫知其極夫皇朝禮大伯僚備職編官列署動相經渉若以私諱人遂其心則移官易職遷流莫已既違典法有虧政體請一斷之從之宋謝𢎞微從叔峻無後以𢎞微為嗣𢎞微本名密犯所係内諱故以字行𢎞微位至侍中邵陵王友為江州刺史府州文案及臣吏不諱有無之有時蕭子良為王友不廢此官王𢎞為太保𢎞父珣仕晉為司徒賔客疑所諱𢎞曰身家諱與蘇子髙同謝超宗靈運之孫鳯之子為新安王子鸞國常侍王母殷淑儀卒超宗作誄奏之文帝大嗟賞謂謝莊曰超宗殊有鳯毛靈運復出右衛將軍劉道隆在御座出候超宗曰聞君有異物可見乎超宗曰懸磬之室復有異物耶道隆武人無識正觸其父名曰旦侍宴至尊說君有鳯毛超宗徒跣還内道隆謂簡覔毛至闇待不得乃去范曄父名泰曄作後漢書郭泰字林宗鄭泰字公業皆作太字曄至太子詹事王琨避諱過甚父名懌母名恭心並不得犯焉時咸謂矯枉過正琨仕至武陵王師侍中梁謝朏之父名莊宋明帝甞𠡠朏與鳯子超宗從鳯莊門入二人俱至超宗曰君命不可以不往乃趨而入朏曰君處臣以禮進退不入時人兩稱之以比王尊王陽朏位至中書令王亮父名攸亮既為晉陵太守時有晉陵令沈巑之性麄疎好犯亮諱亮不堪遂啓代之巑之怏怏乃進坐云下官以犯諱被代未知明府諱若為攸字當作無骹尊傍犬為大傍無骹尊若是有心攸無心攸乞告示亮不及履下牀跣而走巑之撫掌大笑而去張稷父名永稷為永寧太守以郡犯諱私改為長寧北齊徐之才父名雄李平子諧於廣坐稱其父名曰卿嗜熊白生不之才曰平耳又曰卿此言於理平不諧遽出避之道逢其甥髙徳正徳正曰舅顔色何不恱諧告之故徳正徑造坐席連索熊白之才謂坐者曰箇人諱底衆莫知之才曰生不為人所知死不為人所諱此何足問之才位至太子太師隋劉臻父名顯臻性好噉蜆以音同父諱呼為扁螺臻位至左僕射唐唐臨除永州刺史以犯曾祖諱為辭改為潮州刺史蔣儼除太僕卿以父名卿固辭改授太子右衛副率源乾曜罷侍中遷太子少師以曾祖名師固辭乃拜太子少傅賈曾除中書舍人固辭以父忠同音議者以為中書是曹司名又與曾父音同字别於禮無嫌曾乃就職崔寧為劒南西川節度使奏本管兵馬使瀘州刺史韓澄與先代諱同請改名潭許之李涵為太子少傅充代宗山陵副使涵判官殿中侍御史呂渭上言涵父名少康今官名犯諱恐乖禮典宰相崔祐甫奏曰若朝廷事有乖舛羣心悉能如此實太平之道除渭司門貟外郎尋有人言涵昔為宗正少卿此時無言今為少傅渭妄有奏議詔曰呂渭濳陳章奏為其本使薄訴官名朕以宋有司城之嫌晉有辭曹之諱歎其忠於所事亦謂確以上聞乃加殊恩俾膺厚賞近聞所陳少字往歳已任少卿昔是今非罔我何甚豈得謬當朝奬更厠周行宜佐遐籓用誡薄俗可歙州司馬同正由是改涵檢校工部尚書兼光禄卿蕭復為兵部侍郎徳宗建中末舒王誼為諸軍行營兵馬元帥以復為元帥府統軍長史舊例有行軍長史以復父名衡故特更之李竦除鄂州刺史兼御史中丞鄂岳等州都團練觀察使竦以父名史上疏陳讓乃以為檢校左散騎常侍知鄂州事使如故裴胄除京兆少尹以父名不拜換國子司業李賀父名晉肅不應進士韓愈為賀作辨諱令舉進士馮宿除華州刺史以父名子華拜章乞罷改左散騎常侍兼集賢殿學士晉崔居儉仕後唐為太常卿閔帝應順初明宗山陵合為禮儀使居儉以祖諱蠡辭於執政乃授祕書監居儉訴於人曰名諱有令式在余何罪也周王昭吉仕晉為右金吾衛大將軍天福三年昭吉奏臣伏覩漢書昌邑中尉王吉是臣逺祖避名之禮允屬於斯臣請改名澈從之陳觀仕晉為尚書兵部郎中兼侍御史知雜事開運三年以觀為右諫議大夫觀以祖諱義乞改官尋授給事中張鑄為給事中顯徳三年以鑄為光禄卿鑄以卿字與祖名同援令式上訴尋改授祕書監判光禄寺事為人後禮曰大宗無後以小宗之子後之食其舊徳世禄之榮可尚非我族類蒸甞之享奚宜若乃虞世緒之中衰懼家聲之莫繼擇純謹於宗黨承肯構於天性先王之教所以重似續君子之心繇是廣親愛既禮經之明訓亦人情之常道也其有國封已廢王澤復加選於支屬授以爵土斯又表明庭繼絶之恩示人臣同體之義焉茍或違厥彛訓亂夫昭穆逺取異姓俯狥私昵豈獨王制之所禁故乃神理之不歆後漢伏恭字叔齊司徒湛之兄子也湛弟黯位至光禄勲無子以兄子恭為後魏劉阜廙之弟子也廙為太祖丞相㑹曹屬文帝即王位為侍中賜爵關内侯黄初二年卒廙别傳云時年四十二無子帝以阜嗣案劉氏譜阜字伯陵陳留太守阜子喬字仲彦晉陽秋曰喬有賛世志力惠帝末為豫州刺史喬胄裔丕顯貴盛至今陳矯為尚書令本劉氏子出嗣舅氏徐統諫議大夫奕之族子奕卒文帝思奕之為人奕無子詔以統為郎以奉奕後蜀諸葛喬字伯松亮兄瑾之第二子也本字仲慎與兄元遜俱有名於時論者以為喬才不及兄而性業過之初亮未有子求喬為嗣瑾啓孫權遣喬来西亮以喬為已適子衛繼字子業漢嘉嚴道人也兄弟五人繼父為縣功曹繼為兒時與兄弟隨父游􅃧庭寺中縣長蜀郡張君子數命功曹呼撫其子省弄甚憐愛之張因言宴之間語功曹欲乞繼功曹即許之遂養為子繼敏達夙成學識通博進仕州郡歴職清顯而其餘兄弟四人各無堪當世者父甞言已之將衰張明府將盛也時法禁以異姓為後故復為衛氏吳朱然字義封朱治之姊子也本姓施氏初治未有子然年十三乃啓孫策乞以為嗣策命丹陽郡以羊酒召然到吳策優以禮賀晉王愔為陽平太守戎之從弟也戎子方早卒庶子興戎不齒以愔子為嗣皇甫謐字士安㓜名静安定朝那人漢太尉嵩之曾孫也出後叔父賈謐本姓韓太尉充之外孫充薨無嗣充婦郭槐輙以謐為充子黎民後奉充後郎中令韓咸中尉曹軫諫槐曰禮大宗無後以小宗支子後之無異姓為後之文無令先公懐腆后土良史書過豈不痛心槐不從咸等上書求改立嗣事寢不報槐遂表陳是充遺意帝乃詔曰太宰魯公充崇徳立勲勤勞佐命背世殂隕每用悼心又𦙍子早終世嗣未立古者列國無嗣取始封支庶以紹其統而近代更除其國至於周之公旦漢之蕭何或豫建元子或封爵元妃盖尊顯勲庸不同常制太宰素取外孫韓謐為世子黎民後吾退而斷之外孫骨肉至近推恩計情合於人心其以謐為魯公世孫以嗣其國自非功如太宰始封無後如太宰所取必以已自出不如太宰皆不得以為比羊祜封南城侯無子武帝以祜兄子暨為嗣暨以父沒不得為人後帝又令暨弟伊為祜後又不奉詔帝怒並收免之宋劉蔚祖輔國將軍東興縣侯劉懐肅弟懐慎之子懐肅卒無子懐慎以蔚祖嗣封官至江夏内史謝𢎞微武昌太守思之子也從叔峻司空琰之第二子無後以𢎞微為嗣本名密犯所繼内諱故以字行劉湛字𢎞仁南陽湼陽人也祖躭父柳並晉左光禄大夫開府儀同三司湛出繼伯父淡襲封安衆縣五等男范曄字蔚宗順陽人車騎將軍泰少子也出繼從伯𢎞之襲封武興縣五等侯王延之父昇之都官尚書延之出繼伯父秀才粲之張冲字思納吳郡吳人父東通直郎冲出繼從伯侍中景裔南齊王奐字彦孫瑯琊臨沂人也祖僧朗宋左光禄儀同父粹黄門郎奐出繼從祖中書令球故字彦孫江斆字叔文少有美譽初尚宋孝武女臨汝公主明帝勑斆出繼從叔愻為從祖渟後於是僕射王儉啓禮無從小宗之文近世縁情皆繇父祖之命未有既孤之後出繼宗族也雖復臣子一揆而義非天屬江忠簡胄嗣所寄唯斆一人傍無其屬斆宜還本若不欲江愻絶後可以斆小兒繼愻為孫尚書叅議曹問立後禮無其文荀顗無子立孫墜禮之始何琦又立此論義無所據於是斆還本家詔使自量立後者梁張纘父策從父兄𢎞籍髙祖舅也為齊鎮西叅軍卒於官無子䇿以第三子纘為嗣封利亭侯何遲任侍中㸃從弟耿之子㸃卒無子宗人以遲任為嗣後魏封叔念懐州刺史磨奴之族子磨奴卒以叔念為後于永超尚書左僕射忠弟之子也忠臨薨上表曰先帝録臣父子一介之誠昭臣家世奉公之節故申之以㛰姻重之以爵禄至乃位亞三槐秩班九命自大明利見之始百官總已之初臣復得猥攝禁戎輯寧内外斯誠社稷之靈兆民之福臣何力之有焉但陛下以叡明御㝢皇太后以聖善臨朝袵席不遺簪履弗棄復乃寵窮出内榮遍宮闈外牧兩河入叅百揆顧服知妖省躬識戾而臣將慎靡方致兹疴疾自去秋苦痢纒綿迄今藥石備甞日增無損又今年已来力候轉惡微喘緒息振復良難鴻慈未酬伏枕涕咽臣薄福無男遺體莫嗣貪及餘生謹陳宿抱臣先養育第四弟第三子司徒掾永超為子猶子之念實切於心乞立為嫡傳此山河靈太后令曰于忠表如子既誠勲宜録又無子可矜臨危所祈不容致奪可特聽如請以彰殊効李容兒侍中神雋從弟延度之第三子神雋無子延度以容兒後之劉俊大司農懌弟廞之子懌卒無子廞以俊為後崔孝演字伯則趙郡太守孝􅁮之弟也出繼伯父孝演無子弟孝直又以子士遊為後崔龍子定州大中正勉弟宣度之子勉卒無子宣度以龍子後之畢義暢瀛州刺史祖朽弟祖歸之子祖朽卒無子祖歸以義暢為後宋弁字義和廣平列人人也祖愔為廣平太守封列人子愔卒弁伯父世顯襲世顯無子養弁為後髙崇字積善渤海蓚人也父潛獻文初詔以沮渠牧犍女賜潛為妻封武威公主崇舅氏坐事誅公主痛本生絶嗣遂以崇繼牧犍後改姓渠崇為雒陽令卒髙緒滄州東平府主簿謹之兄謙之第二子謹之卒無子謹之弟慎之好學又卒無子以緒繼焉孫伯融濟州長史瑜弟歩兵校尉彛之子出繼瑜後官至太守李侃晞思皇后猶子燕州刺史興祖兄安祖之子興祖無子侃晞為後襲先封南陽郡王胡僧洗靈太后父中書監儀同三司安定郡公兄真之子國珍無男養僧洗為後國珍後生子祥襲封北齊袁聿修字叔徳陳郡陽夏人魏中書令飜之子也出後叔父躍後周鄭譯字正義從祖文寛尚魏平陽公主主則太祖元后之妺也主無子太祖令譯後之繇是譯少為其太祖所親甞令與諸子遊集文寛後誕二子譯復歸本生隋梁操字孟徳士彦之子出繼伯父官至長寧王府驃騎楊𤣥挺司徒素異母弟浙陽太守約之子徵入朝未㡬卒素以𤣥挺後之薛收司𨽻大夫道衡之子也道衡有五子收最知名出繼族父孺孺與道衡偏相友愛收自㓜遂出為後養於孺宅至於成長始能識本生唐殷元吏部尚書嶠弟之子嶠無子以元嗣戴至徳民部尚書胄兄子也胄無子以至徳為嗣盧紀宰相邁從弟之子邁為相再娶無子以紀為嗣崔植字公修故相祐甫從父孫廬江縣令嬰甫之子祐甫無子公既寢疾謂其妻曰吾疾不起當以廬江次子主吾祀及卒䕶䘮者以上聞徳宗悲歎久之遣中人召植于淮南俾為祐甫嗣時八歳既終䘮用𢎞文生授河南府叅軍白景受刑部尚書致仕居易之姪孫居易卒無子以景受為嗣梁王珂河中人祖縱鹽州刺史父重榮河中節度使破黄巢有大功封瑯琊郡王珂本重榮兄重簡之子出繼重榮後唐霍彦威字子重不知何許人梁將霍存得於村落間年十四初列於厮養從存征戍愛其爽邁遂養為已子王都者本姓劉小字雲郎中山陘邑人也初有幻人李應之得於村落間養為已子應之以左道醫定州帥王處直不久病間處直神之待為羽人處直時未有子應之遺都於處直曰此子生而有異因為處直之子晉孔崇弼者唐僖昭兩朝宰相魯國公緯之子也緯有重名於時無子崇弼以猶子入繼承䕃授畿尉册府元龜卷八百六十三
