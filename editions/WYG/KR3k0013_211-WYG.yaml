body:
  text: 册府元龜卷二百十一宋王欽若等撰閏位部求舊繼絶求舊周書曰人惟求舊傳曰禮不忘其本蓋云仁厚之至也自孫劉並起南北建號以暨于梁室咸君臨其國施命興化至乃追念疇曩深懐雅固篤其恩意推之禮遇或屈法以申宥或歎逝而思賢以至廵省維桑周爰顧慕優其賜予加之蠲復頒爵州閭之耆艾延寵藩國之僚佐人用胥恱俗以歸厚夫如是則澤雖渥而非偏賞雖豐而不僭矣蜀先主初領荆州牧以廖立為長沙太守㑹吳將吕䝉掩襲南三郡立脫身走自歸先主先主素識待之不深責也以為巴郡太守後主爲太子時來敏爲家令後主即位爲光禄大夫坐過黜免後主以敏東宫舊臣特加優等故廢而復起以爲執慎将軍吳孫䇿與周瑜同年友善瑜自夀春還吳䇿親自迎瑜授瑜建威中郎将䇿又給瑜皷吹為治舘舍贈賜莫與為比䇿令曰周公瑾英雋異才與孤有總角之好骨肉之分如前在丹陽發兵衆及船糧以濟大事論徳酬功此未足以報者也大帝嘗與朱然同書學結恩愛至綂事以然為餘姚長累遷左司馬右軍師緫為大督及寢疾帝晝為减膳夜為不寐中使醫藥口食之物相望於道自創業功臣疾病帝意所鍾吕蒙凌統外然其次矣及卒素服舉哀為之感慟滕裔父胄善屬文大帝待以賔禮軍國書疏嘗令損益潤色之亦不幸短命帝為之追録舊恩封裔都亭候景帝初為琅邪王居㑹稽時太守濮陽興深與相結及即位徴興為太常衛将軍平軍國事封外黄侯宋髙祖時謝景仁初為桓𤣥黄門侍郎時髙祖為桓修撫軍中兵参軍嘗詣景仁諮事景仁與語悅之因留髙祖共食食未辨而景仁為𤣥所召𤣥性促急俄頃之間騎詔續至髙祖屢求去景仁不許曰主上見待要應有方我欲與客共食豈當不得待竟安坐飽食然後應召髙祖甚感之嘗謂景仁是太𫝊安孫及平京邑入鎮石頭景仁與百僚同見髙祖髙祖目之曰此名公孫也謂景仁曰承制府湏記室参軍今當相屈以為大将軍武陵王遵記室参軍仍為從事中郎雅相推重申以婚姻廬陵王義真妃景仁女也永初元年詔曰彭沛下邳三郡首事所基情義繾綣事由情奨古今所同彭城桑梓本郷加隆攸在優復之制宜同豐沛可復租布三十年文帝初為冠軍将軍以丘淵之為長史及即位以舊恩歴顯官侍中都官尚書吳郡太守元嘉四年三月丙子詔曰丹徒桑梓綢繆大業攸始踐境永懐觸感罔極昔漢章南廵加恩元氏况情義二三有兼曩日思播遺澤酬慰士民其蠲此縣今年租布二十六年三月幸丹徒申南北沛下邳三郡復又詔曰京口肇祥自古著符近代衿帶江山表裏華甸經途四逹利盡淮海城邑髙明土風淳壹包總形勝實唯名都故能光宅靈心克昌帝業頃年岳牧遷廻軍民從散㕓里廬宇不逮徃日皇基舊郷地兼藩重宜令殷阜式崇形望可募諸州樂移者數千家給以田宅并蠲復五月丙寅又詔曰吾生於此城及盧循肆亂害流茲境先帝以桑梓根本寔同休戚復以䝉稚猥同艱難情義繾綣夷險兼備舊物遺蹤猶存心目嵗月不居逝踰三紀時人故老與運零落眷惟既徃倍深感嘆可搜訪于時士庶文武今尚存者具以名聞人身已亡而子孫見在優量賜賚之孝武帝初為都督江州刺史時江蠻為㓂文帝遣太子歩兵校尉沈慶之伐之慶之以王國令使吳喜自隨使命去來喜為帝所知賞帝於巴口建義喜遇病不堪隨慶之下事平帝以喜為主書稍見親遇擢為諸王學官王景文為宣城太守元㓙劭以為黄門侍郎未及就孝武帝入討景文遣間使歸欵以父在都邑不獲致身及事平頗見嫌責猶以舊恩除南平王鑠司空長史不拜出為東陽太守大明二年詔曰先帝靈命初興龍飛西楚嵗紀浸逺感徃纒心奉迎文武情深常棣思𢎞殊澤以申永懐吏身可賜爵一級軍户免為平民七年三月廵南豫南兖二州詔曰朕弱年操製出牧司雍承政宣風荐歴年紀國歩中阻治戎江甸艱夷情義寔繋于懐今或講練蒐訓渉茲境閭故邑耆舊在目罕存年世未逺殱亡大半撫迹惟事傾慨兼著太宗讌故晉陽洽恩世祖流仁濟畿暢澤永言徃猷恩廣前賚可蠲歴陽郡租輸三年遣使廵慰問民疾苦鰥寡孤老六疾不能自存者厚賜粟帛年髙加以羊酒凡一介之善隨才銓貫前國名臣及府州佐吏量所沾錫人身已徃施及子孫十二月幸歴陽追思在藩之舊下詔曰故光禄勲前征虜長史鄧𦙍之體局沈隠累任著績朕昔當藩重首先佐務心力欵盡弗忘于懐徃嵗息璩㓙悖自取誅剪㳂恩及琬特免釁戮今可擢為給事黄門侍郎以旌宿誠明帝初為湘東王時虞愿為國常侍轉尋陽王府墨曹参軍及帝立以愿儒史學渉兼藩國舊恩意遇甚厚除太常丞江謐字令和為于湖令明帝為南豫州謐傾身奉之為帝所親待即位以為驃騎参軍轉尚書度支郎俄遷右丞兼比部郎南齊太祖初為宋相國沈昭略為西曹掾甚賞之及即位謂王儉曰南士中有沈昭略何職處之儉擬以前軍將軍帝不欲違乃可其奏尋為中書郎累遷侍中崔慧景宋末為長水校尉自結太祖昇明三年豫章王為荆州太祖受禪遣慧景奉表稱慶還京師太祖召見加意勞接轉平西府慧景留為鎮西司馬兼諮議太祖受禪封安樂縣子三百戸司馬南郡内史垣閎宋昇明初為散騎常侍領長水校尉與豫章王對直殿省遷右衛将軍太祖即位以有心誠封爵如舊加給事中領驍騎将軍武帝少年與蕭景先共車行泥路車乆故壊至領軍府西門車轅折狼狽景先謂帝曰兩人脫作領軍亦不得忘今日艱辛及武帝踐祚詔以景先為兼領軍将軍拜日羽儀甚盛傾朝觀矚拜還未至府門中詔相聞領軍今日故當無折轅事邪景先奉謝景先事上盡心故恩寵特宻初西還帝坐景陽樓召景先語故舊唯豫章王一人在席而已王晏初為西安主簿武帝時為長史與晏相遇後轉鎮西板宴記室鎮湓城晏専心奉事軍旅書翰皆委焉及武帝即位累遷常侍丹陽尹宴位任親重朝夕進見言論朝事自豫章王嶷尚書令王儉皆降意以接之而晏每以疎漏被帝呵責連稱疾乆之帝以晏湏禄飬轉為江州刺史晏固辭不願外出見許留為吏部尚書領太子右率終以舊恩見寵張欣㤗為尚書都官郎武帝與欣㤗早經欵遇及即位以爲直閣将軍領禁旅沈冲字景綽為武帝征虜長史尋陽太守甚見委遇世祖還都使冲行府州縣太子中庶子帝在東宫待以恩舊及即位轉御史中丞虞悰初為宋黄門郎武帝始從官家貧薄悰推國士之眷數相分與每行必呼帝同載帝甚徳之昇明中世祖為中軍引悰為諮議参軍遣吏部江謐持手書謂悰曰今因江吏部有白以君情顧意欲相屈建元初轉太子庶子帝即位以悰布衣之舊從容謂悰曰我當令卿復祖業轉侍中朝廷咸驚其羙臣欽若等曰按晉書虞肅父孝武帝時為侍中即悰祖也劉悛初為宋桂陽王征北中兵参軍與武帝同直殿内為明帝親待繇是與世祖欵好遷通直散騎侍郎及武帝鎮湓城後悛出為廣州刺史武帝自尋陽還遇悛於舟渚間歡宴敘舊停十餘日乃下遣文恵太子及竟陵王子良攝衣履修父友之敬帝既即位累遷長兼侍中車駕數幸悛宅宅盛治山池造甕牖世祖著鹿皮冠被悛菟皮衾於牖中宴樂以冠賜悛至夜乃去後從駕登蔣山帝數嘆曰貧賤之交不可忘糟糠之妻不下堂頋謂悛曰此况卿也世言富貴好改其素情吾雖有四海今日與卿盡布衣之適悛起拜謝周山圖初為輔國将軍及武帝踐祚遷竟陵王鎮北司馬帶南昌太守将軍如故以湓城之舊出入殿省甚見親信王諶永明初遷豫章王太尉司馬武帝與諶相遇於宋明之世故委任為輔國将軍到撝爲黄門郎解職武帝即位遷太子中庶子不拜又除長沙王中軍長史司徒左長史先是宋世帝數遊㑹撝家同從明帝射雉郊野渴倦撝得早青𤓰與帝對剖食之帝懐其舊徳意眄良厚至是一歲三遷海陵王初為新安王及即帝位詔曰新安國五品以上悉與滿敘自此以下皆聽解遣其欲仕者適所樂明帝初為宣城王即位詔宣城國五品以上悉與滿敘自此以下皆聽解遣其欲仕者適所樂梁髙祖初開覇府以齊司徒右長史任昉為驃騎記室参軍始髙祖與昉遇竟陵王西邸從容謂昉曰我登三府當以卿為記室昉亦戯髙祖曰我若登三事當以卿為騎兵謂髙祖善騎也至是故引昉符昔言焉昉奉箋曰伏承以今月令辰肅膺典䇿徳顯功髙光副四海含生之倫庇身有地况昉受教君子将二十三年咳唾為恩眄睞成飾小人懐恵頋知死所昔承清晏屬有緒言提挈之㫖形乎善謔豈非多幸斯言不渝雖情謬先覺而迹淪驕餌湯沐具而非弔大厦構而相驩明公道貫二儀勲超䆳古將使伊周奉轡桓文扶轂神功無紀化物何稱府朝初建俊賢驤首惟此魚目唐突璵璠頋已循涯寔知塵忝千載一逄再造難答雖則隕越且知所報天監元年復南蘭陵武進縣依前代之科大同十年三月帝幸蘭陵謁建陵至脩陵詔曰故鄉老少接踵逺至情貎孜孜若歸于父宜有以慰其此心並可錫位一階并加頒賚所經縣邑無出今年租賦監所責民蠲復二年普賚内外從軍官主左右錢米各有差因作還舊鄉詩癸卯詔園陵職司叅軍勤勞并賜位一階并加沾賚是月幸廻賔亭宴帝郷故老及所經郡縣奉迎候者少長數千人各賚錢二千蕭琛為侍中髙祖在西邸早與琛狎毎朝讌接以舊恩呼為宗老琛亦奉陳昔恩以早簉中陽夙忝同閈雖迷興運猶荷洪慈帝答曰雖云早契濶乃自非同志忽談興運且異狂奴陶𢎞景齊末義師平建康問議禪代𢎞景援引圖䜟數處皆成梁字令弟子進之髙祖既早與之遊及即位後恩禮逾篤書問不絶冠盖相望何㸃與髙祖有舊及踐祚手詔曰昔因多暇得訪逸軌坐修竹臨清池忘今語古何其樂也蹔别丘園十有四載人事艱阻亦何可言自應運在天每思相見密邇物色勞甚山阿嚴光排九重踐九等談天人敘故舊有所不臣何傷於髙文先以皮弁謁子桓伯况以縠綃見文叔文先陽彪字子桓魏文帝字伯况周黨字文叔光武字求之徃䇿不無前例今賜卿鹿皮巾等後數日望能入也㸃以巾褐引入華林園髙祖甚恱賦詩置酒恩禮如舊仍下詔曰前徴士何㸃髙尚其道身安容膝脫落形骸棲志窅𡨕朕日昃思治尚想前哲况親得同時而不與爲政喉舌任切必俟邦良誠望賁然屈居獻替可徵為侍中辭疾不起乃復詔曰徴士何㸃居貞物表縱心塵外夷坦之風率繇自逺徃因素志頗申讌言眷彼子陵情兼惟舊昔仲虞邁俗受俸漢朝安道逸志不辭晉禄此盖前代盛軌徃賢所同可詳加資給並出在所日費所湏大官别給既人髙曜卿故事同垣下袁渙字曜卿魏太祖賜垣下榖天監三年卒時年六十八詔曰新除侍中何㸃棲遲衡泌白首不渝奄至殞䘮倍懐傷惻可給第一品材一具賻錢二萬布五十疋䘮事所湏内監經理又勑㸃弟裔曰賢兄徴君弱冠拂衣華首一操心遊物表不滯近跡脫落形骸寄之幽逺理情勝致遇興彌髙文㑹酒徳撫際逾逺朕膺籙受圖思長聲教朝多君子既貴成雅俗野有外臣宜𢎞此難進方頼清徽式隆大業昔在布衣情期早著資以仲虞之秩待以子陵之禮聽覧暇日角巾引見窅然汾射兹焉有記一旦萬古良懐傷悼鄉友于淳至親從彫亡偕老之願致使反奪纒緜永恨伊何可任永矣奈何曹景宗爲領軍将軍髙祖數讌見功臣共道故舊景宗醉後謬忘或誤稱下官髙祖故縱之以爲笑樂范雲為吏部尚書嘗侍讌髙祖謂臨川王宏鄱陽王惔曰我與尚書少親善申四海之敬今為天下主此禮既革汝宜代我呼范為兄二王下席拜與雲同車還尚書下省時人榮之王珍國嘗以明鏡獻誠於髙祖髙祖㫁金以報之後因侍宴帝問曰卿明鏡尚存昔金何在珍國答曰黄金在臣肘不敢失墜復為右衛将軍加給事中遷左衛将軍加散騎常侍天監初封灄陽縣侯邑千户元帝初鎮荆州顔恊為記室及卒甚歎惜之為懐舊詩以傷之其一章曰𢎞都多雅度信乃含忠實鴻漸殊未昇上材淹下秩宗懔初為元帝記室後為别駕江陵令及帝即位擢為尚書侍郎又手詔曰昔扶桞開國尚曰故人西郷作土本繇賓客况事渉勲庸而無爵賞尚書侍郎宗懔極有帷幄之謀誠深股肱之任從我於邁多歴嵗事可封信安縣侯食邑一千戸王褒為安成郡太守侯景度江建業擾亂文帝承制轉智武将軍南平内史及嗣位於江陵欲待褒以不次之位褒時猶在郡勑王僧辨以禮發遣褒乃将家西上元帝與褒有舊相得甚歡拜侍中累遷吏部尚書左僕射陳髙祖即位以左光禄大夫王冲前代舊臣特申長幼之敬沈恪吳興武康人也在梁為新喻侯髙祖與恪同郡情好甚䁥蕭暎卒後髙祖南討李賁仍遣妻子附恪還尋補東宫直文帝梁末避地臨安于駱牙母觀帝儀表知非常人待之甚厚及即位牙為越州刺史初牙母之卒也于時饑饉兵荒至是始葬詔贈牙母常安國太夫人諡曰恭遷牙為貞威将軍晉陵太守華皎梁代為尚書比部令史侯景之亂事景黨王偉髙祖南下文帝為景所囚皎遇帝甚厚景平文帝為吳興太守以皎為都尉録軍府榖帛多以委之皎聰慧勤於簿領及文帝即位除開逺将軍右衛将軍天嘉元年封懐仁縣伯邑四百戸北齊髙祖少與司馬子如相結託分義甚深及入雒除右僕射與侍中髙岳侍中孫騰右僕射髙隆之等共知朝政甚見信重髙祖鎮晉陽子如時徃謁見待之甚厚並坐同食從旦逹暮及其當還髙祖及武明后俱有賚遺率以為常劉貴為御史中尉雖非佐命元功然與髙祖布衣之舊特見親重叚長仕東魏為懐朔鎮将常見髙祖甚異之謂髙祖云君乃康世之才終不徒然也請以子孫爲託興和中啓贈司空公子寜相府從事郎中崔陵仕東魏為左光禄大夫仍鎮黄門尋以貪汚為御史所劾因還郷里遇赦始出髙祖以陵本豫義旗復其黄門文宣帝天寳初陳留太守徐逺為御史所劾遇赦免沈廢二年帝以逺勲舊特用為領軍府長史武成帝居藩曽病文宣令齊州刺史崔季舒療之傋盡心力太寜初追還引見慰勉累拜度支尚書開府儀同三司張雕為平原太守坐贓賄失官武成即位以舊恩除通直散騎侍郎魏收為中書監兼右僕射開府坐罪除名河清三年起除清都尹尋遣黄門郎元文遥勅收曰卿舊人事我家最乆前者之罪情在可恕比令卿為尹非為羙授但初起卿斟酌如此朕豈可用卿之才而忘卿身待至十月當還卿開府梁太祖唐天復元年正月兼河中節度至府出東郊以素服拜于故節度使王重榮之壠以申夙分又辟其少子瓚為節度判官又請故宰相張濬為重榮神道碑曰帝頃自左馮來歸蒲坂而重榮識在田之竒狀有附翼之深期劉宣威坐席之言形于昔日喬太尉英雄之許感極茲辰帝追思之深故恩禮若是開平二年四月以户部尚書致仕裴廸復為右僕射廸敏事慎為達吏治明籌筭帝初建節旄於夷門廸一謁見如故知乃辟為從事自是之後厯三十年委四鎮租賦兵籍帑廪官吏獄訟賞罰經費運漕事無巨細皆得専之帝每出師即知軍州事逮于二紀不出梁之闉閎甚有禆贊之道禪代之嵗命為太常卿屬年已耆耋視聽昏塞不任朝謁遂請老許之朞月復起師長庶官焉三年以蒲州肇迹之地且因經略鄜延於是廵幸數月暇日遊豫至焦梨店頗述前事念王重榮舊功下詔褒奨而封崇之劉崇太祖㣲時嘗傭力崇家及即位召崇用之歴殿中監商州刺史崇之母撫梁祖有恩梁氏號為國婆徐宋之民謂崇家為豢龍劉家子鼎起家為大理評事繼絶夫繼絶之禮王者所以歸民置後之文聖人所以勸善况餘分建歴大徳未融固宜昭興㓕之仁豐延世之賞俾神明之後不廢於蒸嘗公侯之家克紹於圭組用能率勵勲徳懐服蒸黎者焉宋髙祖永初元年四月即位詔曰夫㣲禹之感歎深後昆盛徳必祀道隆百世晉氏封爵當隨運改至於徳参㣲管勲濟蒼生愛人懐樹猶或勿剪雖在異代義無冺絶降殺之宜一依前典可降始興公封始興縣公廬陵公封柴桑縣公千戸始安公封荔浦縣侯長沙公封醴陵縣侯康樂公可即封縣公各五百戸以奉晉故丞相王導太𫝊謝安大将軍温嶠大司馬陶侃車騎将軍謝𤣥之祀是月封晉臨川王司馬寳為西豐縣侯食邑千戸南齊太祖建元元年四月即位詔曰繼世象賢列代盛典疇庸嗣羙前載令圖宋氏通侯乃宜隨運省替但欽徳懐義尚表墳閭况功濟區夏道光民俗者哉降差之典宜遵徃制南康縣公華容縣公可為侯萍郷縣侯可為伯减戸有差以繼劉穆之王𢎞何無忌後梁髙祖天監元年四月巴陵王殂南齊和帝以謝沭縣公蕭寳義為巴陵王以奉齊祀是年詔曰褒隆徃代義炳彛則朕當此樂推思𢎞前典齊豫章王元琳故巴陵王昭胄子周齊氏宗國髙武嫡嗣宜祚井邑以傳世祀降封新塗縣侯五百户敬帝太平元年十二月以前昌平令劉督為汝隂王前鎮西法曹行参軍蕭綋為巴陵王奉宋齊二代後陳髙祖永定三年四月江隂王殂梁敬帝以梁武林侯蕭諮子季卿嗣為江隂王宣帝太建三年六月江隂王蕭季卿以罪免封東中郎長沙王府諮議参軍蕭彛為江隂王是年追封侯安都為陳集縣侯邑五百戸子亶為嗣安都於文帝天嘉四年坐事賜死至是追封北齊孝昭皇帝皇建元年八月即位詔自髙祖創業已來諸在佐命功臣子孫絶㓕國統不傳者有司搜訪近親以名聞當量為立後又詔曰昔武王克商先封兩代漢魏二晉無廢兹典及元氏統厯不率舊章朕纂承大業思𢎞古典但二王三恪舊說不同可議定是非列名條奏其禮儀體式亦仰議之梁太祖開平二年三月以鴻臚卿李從唐室宗屬封萊國公為二王後有司奏萊國公李從合留三廟於西都選地位建立廟宇以備四仲祀祭命度支供給以遵彛典十二月立二王三恪南郊禮儀使狀曰詩稱有客書載虞賓實因禪代之初必行興繼之命俾之助祭式表推恩兼垂恪敬之文别示優崇之典徴於歴代襲用舊章謹案唐朝以後魏元氏子孫韓國公為三恪以周宇文氏子孫為介國公隋朝楊氏子孫為􅈶國公為二王後今伏以國家受禪封唐朝子孫李從為萊國公今参詳合以介國公為三恪􅈶國公萊國公為二王後册府元龜卷二百十一
