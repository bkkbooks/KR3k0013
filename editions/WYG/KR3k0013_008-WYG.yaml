body:
  text: 册府元龜卷八宋王欽若等撰帝王部創業第四後唐荘宗太祖長子年十一從太祖討王行瑜因令獻㨗昭宗一見駭之除隰州刺史尋改汾晉二郡皆遥領之天祐五年正月太祖厭世帝嗣晉王位四月召周徳威軍歸晉陽汴人既見班師知其國禍以為潞州必取無復再舉遂停斥堠梁祖亦自澤州歸雒帝知其不備率親軍直抵夾寨破之梁軍大敗招討使康懷真得百餘騎出天井闗事具帝王謀畧門帝乃班師晉陽九月邠岐蜀三鎮復大舉攻長安帝遣李嗣昭周徳威將兵三萬攻晉州以應之三鎮攻長安梁祖懼自雒率親軍屯於陜州令其將尹皓將兵赴援平陽周徳威與尹皓之師戰於神山北梁人大敗六年七月邠岐劉知俊遣使來吿將大舉討靈夏兼收平闗輔請出兵晉絳以張犄角八月帝御軍南征令周徳威李存審丁㑹統大軍出隂北闗攻晉州刺史邊繼威登陴拒守梁祖令其將楊師厚領兵赴援屯於絳州我軍攻城急小校萇諫募兵寡不敵而退我為地道壞城二十餘步城中血戰拒守夜復乗城汴軍至䝉坑周徳威逆戰敗之斬首二百級師厚退保絳州七年七月茂貞知俊及邠州楊崇本各遣使來吿言靈武韓遜夏州將李仁福朋附梁孽屢犯邊陲請出師協力以討時岐人言劉知俊三敗汴軍於寧州韓遜危慽岐隴之師大舉決定取河西帝命振武節度使周徳威將兵萬人西渡河以應㑹劉知俊為岐人所搆乃自退九月周徳威軍旋晉陽十一月梁祖欲兼并鎮定遣親軍三千入于深冀鎮州王鎔懼求援於帝帝遣周徳威率軍屯於趙州梁軍王景仁等營於柏鄉帝遂親征八年正月周徳威史建塘帥三千騎致師於柏鄉設伏於村塢間遣三百騎直壓賊營賊軍怒悉其軍結陣而來徳威與之轉戰至於鄗南賊陣横亘六七里時我軍未成列李存璋引諸軍旋陣於野河之上賊五百人薄我争橋鎮定步軍偏師與之血戰賊敗而復整周徳威李嗣源李存璋等大破之斬首二萬級餘賊棄深冀而遁徳威與史建塘前軍狥地邢洺先馳檄諭邢洺魏博衛滑諸郡縣曰王室遘屯七廟被凌夷之酷旻天不弔萬民罹塗炭之災必有英主奮庸忠臣効順斬長鯨而清四海廓妖祲以泰三靈予位忝維城仍當分閫念兹顛覆詎可宴安故仗桓文輔合之規問羿浞兇狂之罪逆温碭山傭𨽻巢孽餘兇當僖宗奔播之初我太祖掃平之際束身泥首請命牙門包藏姦詐之心惟示婦人之態我太祖俯憐窮鳥曲為開懷特發表章請帥梁汴纔出萑蒲之澤便居茅社之尊殊不感恩遽行猜忍我國家祚隆周漢迹盛伊唐二十聖之鎡基三百年之文物外則五侯九伯内則百辟千官或代襲簪纓或門傳忠孝皆遭陷害永抱沉寃且鎮定兩藩國家巨鎮兾安民而保族咸屈節以稱藩逆温惟仗隂謀專行不義欲全吞噬先據屬州趙州特發使車來求援助予情惟盪㓂義切親仁躬率賦輿赴兹盟約賊将王景仁將兵十萬屯據柏鄉遂驅三鎮之師授以七擒之畧鸛鵝纔列梟獍大奔易如走坂之丸勢若燎原之火殭尸仆地流血成川組甲雕戈皆投草莽謀夫猛將盡作俘囚羣夫既快於天誅大憝湏懸於鬼録今則選蒐兵甲簡練車徒乘勝長驅翦除元惡凡爾魏博邢洺之衆感恩懷義之人乃祖乃孫為聖唐赤子豈徇虎狼之黨遂忘覆載之㤙盖以封豕長蛇憑陵薦食無方逃難遂被脅從空嘗膽以䘖寃竟無門而雪憤既聞告㨗想所慰懷今義旅徂征止于招撫昔耿純焚廬而向順蕭何舉族以從軍皆審料興亡能圖富貴殊勲茂業翼子貽孫轉禍見機決在今日如能詣轅門而効順開城堡以迎降長吏則改補官資百姓則優加賞賜所經詿誤更不推窮三鎮諸軍己申嚴令不得焚燒廬舍剽掠馬牛但仰所在生靈各安耕織予恭行天伐罪止元兇已外歸民一切不問凡爾士衆咸諒予懷於是帝親御軍邢帥王檀懼請師于雒梁遣其將徐仁溥將兵五百夜入邢州助檀固守帝令張承業李存璋以三鎮步卒攻邢州遣周徳威史建塘將三千騎長驅澶魏帝與李嗣源率親軍繼進王師所至壺漿塞路郡邑長吏村閭文學咸扣馬言曰久罹䘮亂獲見義師帝躬自臨問勞之軍法甚嚴秋毫無所犯但討其拒命者時汴軍自王景仁敗後殺戮大半其餘漏刃亡散皆青徐兖鄆諸道之軍各歸本鎮梁祖遣楊師厚於河陽招聚亡敗之衆旬餘方得萬人二月帝自雒磁相三郡次于洹水謀報汴滑之軍據黎陽周徳威進至臨河己未魏帥羅周翰出兵五千塞石灰窰口周徳威以騎三千掩擊廹入觀音門帝舍於狄公祠東西列營十數羅周翰閉壁自固我軍攻西南北隅城㡬陷朱温遣杜廷隠将兵五百送李振為魏博副使夜入鄴城是時朱温出兵萬餘将渡赴援聞王師至棄舟而退鄆州步騎二千自黎陽來歸梁祖自汴歸雒陽周徳威自臨清徇地貝郡夏津髙唐攻博州下東望朝城攻澶州偽刺史張可臻棄城而遁進擊黎陽下臨河淇門逼衛州掠新鄉共城是月梁祖在潞聞我師將攻河陽率親軍屯白司馬坡令楊師厚戒嚴八月幽州劉守光僭稱大燕皇帝十二月帝遣周徳威劉光濬李嗣源及諸將率蕃漢之兵討之九年正月燕將王行方等以部下四百人來奔二月梁祖率舉河南之衆以援守光三月周徳威遣李存暉攻瓦橋闗四月李嗣源攻瀛州皆下之五月徳威大破燕軍於羊頭岡斬首五千餘級自涿州進軍于幽州城下六月梁祖為其子友珪所弑八月友珪遣其将韓勍康懷英牛存節率兵五萬急攻河中朱友謙遣使求援帝令李存審率師救之十月帝自澤潞赴河中遇梁將康懷英於平陽破之斬首千餘級追至白徑嶺友謙㑹帝於猗氏梁軍解圍而去十年正月徳威攻順州二月攻安逺軍皆下之三月攻廬臺及古北口五月壬寅朔劉光濬逼營州刺史楊靖以城降得李知諲馬步兵四百因令五院將李益權典州事六月帝遣監軍張承業至幽州是月収下莫州九月守光率衆夜出遂陷順州十月入檀州徳威自涿州将兵躡之守光循山而南徳威追及大敗之守光復之諲城十一月帝親征幽州十二月執偽燕主劉守光并其父仁恭班師晉陽次行唐鎮州節度使王鎔迎謁於道路鎔啟曰燕主劉太師頃為隣國謀之不臧患生膝下今既伏罪履薪之㑹僕欲挹其風儀可乎帝促命主者破械引守光仁恭至與鎔答拜同宴久之十一年正月至自幽州是日於汾亭令軍士數百組練係仁恭守光號呼而入與其黨李小喜鄭臧斐皆伏法是月鎮州王鎔定州王處直再遣使奉書推册帝為尚書令帝可之乃撰日受册開霸府建行臺如武徳故事帝以燕薊初平将軍南伐七月帥師自黄沙嶺東下㑹周徳威王鎔於趙州大軍進至洺州徇地而還十二年三月梁主朱友貞分魏博六州為兩道以賀徳倫為魏博節度使張筠為澶相節度使魏人不從乃歸於帝帝命馬步副摠管李存審自鎮州帥前軍先進屯臨清五月帝帥親軍㑹之徳倫遣從事於司空陳宻㫖言軍士張彦為亂軍之首廹徳倫上章請却復六州大王鎮撫魏人宜誅首惡及帝進軍次於永濟張彥選銀槍効節軍五百人皆勇悍者持矛仗㦸自衛而來帝登驛樓數其罪而斬之六月入府城撫勞軍士賀徳倫上符印請帝兼領魏鎮帝承制授徳倫大同軍節度使是月帝遣騎軍五百襲徳州拔其城七月攻梁澶州下之八月復為梁將賀瓌所陷十三年三月攻梁衛州降之進攻磁州四月攻洺州並皆拔之相州節度使張筠遣人納欵師旋於魏州五月還晉陽八月大閱師徒進攻邢州令降将張温率汴軍五百於城下招降之邢州平九月帝還晉陽梁滄州節度使戴思逺棄城遁舊将毛璋入其城復命明宗帥師招撫之毛璋以城降以李存審為節度使是月貝州降河朔悉平十四年十二月黄河氷合帝觀兵河上汴人據楊劉城縁河數十里間列柵相望我軍急攻皆平之進至楊劉城中登堞者甲士三千帝率善射者萬餘環城馳射步兵持斧斬其鹿角以葭葦埋塹帝率先負葭葦以勵士衆四面鼓譟拔㦸乘城其衆因潰騎軍掩擊自辰及酉斬戮千計狥地至鄆濮而還閱兵於魏州時幽州盧龍軍節度使蕃漢馬步摠管周徳威帥幽薊步騎之師三萬横海軍節度使蕃漢馬步副摠管李存審帥滄景步騎之師萬人成徳軍節度使王鎔遣其将王徳明帥鎮冀步騎之師三萬昭義軍節度使李嗣昭帥澤潞步騎萬人安國軍節度使李嗣源帥邢洺步騎之師萬人義武軍節度使王處直使其将帥易定之步騎萬人麟勝雲蔚新武等州諸部落奚契丹室韋吐谷渾等馬萬匹總河東魏博十鎮之師閱於魏州部陣嚴肅精甲曜日師旅之盛近代未之有也梁将賀瓌王彦章帥兵屯於濮州北行臺里結壘相持百有餘日十五年六月帝與梁軍戰於楊劉大破之拔其四寨十二月帝令軍中老幼悉歸魏州塞井夷竈起軍赴汴攻濮陽拔之李存審城徳勝夾河置禦捍之備十六年四月梁将賀瓌攻徳勝南城圍塹既周又以䝉衝戰艦斷其津渡百道齊攻帝陣於北岸親從将王徤選勇卒三百人斬其竹纜繇是得渡梁軍棄城逃遁帝命騎軍追襲至於濮陽十二月帝軍於河南御鐵騎千餘突入梁陣諸軍繼進左右斬擊梁軍大奔獲馬三千餘匹俘斬萬級十八年八月鎮州王鎔為其將張文禮所殺帝援鎮州行營偏將符習成徳軍兵馬留後以所統鎮冀兵進討又遣閻寳史建塘將兵以益之文禮聞王師至憂悸病疽而卒子處球代其任十九年九月鎮州平鎮人請帝兼領因以符習領天平軍節度使同光元年二月諸藩鎮相繼上牋勸進四月遂即帝位晉髙祖憲祖第二子憲祖以上事具帝王帝系門後唐明宗初為代州刺史妻以愛女領親騎左射軍天祐十三年梁將劉鄩率兵攻鄴城莊宗至自甘陵未陣為鄩所掩截帝領十餘騎横槊深入収部伍而旋荘宗壯之十四年鄩兵陣莘之西北明宗從荘宗酣戰久之而塵埃四合帝與明宗俱陷陣中帝挺身躍劒反覆轉鬭行數十里遂敗鄩於故元城之東十五年梁將賀瓌設伏無石山明宗為瓌所迫帝為後殿破賊五百餘騎按轡而還十二月莊宗大蒐兵胡柳坡下衆號十萬總管周徳威将左軍雜以燕人前鋒不利徳威死之荘宗率步衆五千固守髙陵以避敵之銳氣明宗獨完右廣伏於土山之下顧謂帝曰梁人首獲其利旌旗甚整何計可以挫之帝曰臘候如此出手墮指彼多步衆易進難退莫若啜糒飲水徐而困之且超乗徒行其勢不等一撃而破期在必勝明宗曰是吾心也㑹日暮梁軍列於平野不下五六萬人為一方陣麾逰騎廹我帝曰敵将遁矣乃請明宗令士整胄寛而羅之命左射軍三百人鳴矢馳轉漸束其勢以數千騎合之敵人迨夜旌旗皆靡而一角先潰三面踵之其牙若火爆之聲横屍積甲不可勝計繇是梁人勢削進營徳勝渡矣十八年十月從明宗戰梁人於徳勝渡敗梁將戴思逺殺二萬餘人十九年戰胡蘆套唐軍稍却帝覩其敵銳拔劍闢道肩䕶明宗而退人望之無敢襲者二十年從明宗觀梁人之楊村寨部曲皆不擐甲俄而敵出不意以兵掩明宗刅將及背帝挾㦸而進一擊而凶酋落馬者數輩明宗遂解其難是歳荘宗即位於鄴改元同光遣明宗越河懸軍深入以取鄆鄆人殆不知覺帝以五十騎從明宗涉濟突東門而入俄而鄆兵拒我帝中刃翼明宗而羅於通衢嶷然不動㑹後騎繼至遂拔中城以據之汶陽遂定俄而平汴荘宗朝官未顯者以帝不好矜伐故也唯明宗心知之四年三月明宗討趙在禮于鄴㑹諸軍有變叩馬請明宗帝河北明宗受霍彦威勸将自訴於天子遂紿諾諸軍諸軍亦恐事之不果而散者甚衆明宗所全者惟常山一軍西次魏縣帝宻籌於明宗曰猶豫者兵家大忌必若求訴宜決其行某願率三百騎先趨汴水以探虎穴如遂其志請大軍速進夷門者天下之要害也據之可以自雪安有上将與三軍言變他日有平手乎危在頃刻不宜恬然明宗至相州遂分驍騎三百付之遣帝繇黎陽濟河自汴水西門而入因據其城使人促明宗明宗趨白馬渡繼焉及明宗犒師於郡荘宗親統師至城之西北五里登髙歎曰吾不濟矣繇是荘宗從兵遂大潰來歸明宗明宗尋遣帝率兵為前鋒趨汜水闗收撫亂兵俄而荘宗為親将郭從謙流矢所中是月明帝入雒嘉帝功自總管府署陜州兵馬留後明宗即位改元天成五月以帝為保義軍節度陜虢等州觀察處置等使賜竭忠建策興復功臣時荘宗皇子魏王繼岌降西蜀王衍督軍而還軍亂於雍繼岌見害朝廷又遣帝慰撫諸軍示以恩㫖自陜至雒秋毫無有犯者二月兼六軍諸衛副使十月明宗幸汴以帝為御營使始次涼水汴帥朱守殷叛命命帝董親軍倍道星行信宿及汴城一鼓而登之守殷自屠其家賊中遂定詔以帝充宣武軍節度汴曹等州觀察處置侍衛親軍馬步軍都指揮使兼六軍諸衛副使三年四月加同中書門下平章事興唐尹鄴都留守天雄軍節度管内觀察處置等使長興元年九月東川董璋悖命有制削奪官爵命帝為東川行營都招討使二年春以川路險艱糧運不繼帝懼人情有變請以急詔徵還朝廷然之四月復兼六軍諸衛副使六月改河陽節度使十一月以契丹犯雲中加侍中充河東節度使兼大同振武彰國威塞等軍蕃漢馬步總管三年十月契丹引吐渾突厥犯塞秦王從榮奏宜早命大將與范延光俱言帝可用帝素不欲為其軍之副即奏曰臣願北行明宗曰卿為吾行事無不濟即宣㫖施行及受詔不落六軍副使帝却遷延辭避閔帝即位加中書令移鎮常山末帝清泰元年五月復除河中節度使蕃漢馬步總管二年夏帝屯軍于忻州朝廷遣使送夏衣傳詔撫諭後軍人遽呼萬歳者數四帝懼斬挾馬都将李暉三十餘人以狥三年五月移鎮暉州帝心疑之召寮佐謂曰孤再受太原之日主上面宣云與卿北門一生無議除改今忽降命豈以去年忻州亂兵見廹過相猜乎又今年以千春節請公主入覲當辭時謂公主曰爾歸心甚急欲與石郎反邪此疑訝之狀固甚明矣今國家用后族委邪臣沉湎荒惑萬機停擁今張昭逐延浩於鄴以延浩后之愛弟不加其罪是失刑也副樞宻使劉延朗黷貨賂抑功勲侯伯為之長歎是失賞也二者皆去不亡何待吾自應順中少主出奔之日覩人情大去不能扶危持顛憤憤於方寸者三年矣此際我無異志朝廷自啟禍機不可頽然􅂮於道路况太原險固之地積粟稍多若且寛我我當奉之必若加兵我當内吿隣方北搆強虜興亡之數皎皎在天今欲發表稱病以伺其意諸公以為如何判官趙瑩懼形於色但唯唯桑維翰與漢髙祖贊成其事乃不奉詔末帝削奪帝爵遣晉州節度使張敬達圍帝晉陽末帝既有詔促令攻取敬達長城連棧勇者盡其力工者運其思日夜窮土木之力時督事者每有所搆則暴風大雨平地水深數尺而城柵摧墮竟不能合其圍帝求援契丹俄遣人復書諾之約以中秋赴義六月北面招討指揮使安重榮以戍卒部曲數千人入城七月代州屯将安元信背刺史張朗率軍與西北面先鋒指揮使安審信引五百騎俱至八月懷州彰聖軍軍使張萬廸等各千餘騎來歸是月張敬達攻圍甚急帝親與矢石人心雖固廩食漸困九月辛丒契丹大酋長邪律氏率衆自鴈門而南旌騎不絶五十餘里與南軍騎将髙行周符彦卿等合戰時張敬達楊光逺列陣西山之下士未及伍而行周彦卿為伏兵所斷捨軍而退敬達等步兵大敗􅂮者萬人是夜帝出城北門與邪律相見因論父子之義明日帝與契丹圍敬達營寨南軍不復出矣是月末帝率親軍三萬出次河橋遣樞宻使趙延夀分衆二萬為北面招討使又詔魏博節度使范延光統本軍二萬人屯遼州十月幽州節度使趙鈞領所部萬餘人自上黨呉兒谷合延夀兵屯圑柏谷與敬達寨相去百里彌月不能相通十一月戎王築臺於晉陽城南册帝為大晉皇帝改元天福閏十一月甲子唐将楊光逺殺敬達以諸軍來降甲戌帝至昭義受趙徳鈞趙延夀降己夘至河陽北節度使萇從簡降辛巳末帝自焚帝遂入雒都漢髙祖顯祖之子初仕後唐明宗列於麾下晉髙祖為梁軍所襲馬甲連革斷帝輟騎授之取斷革者自跨徐殿其後晉髙祖感而壯之明宗踐祚晉髙祖為北京留守以帝前有䕶援之力奏移麾下署為都校應順初閔帝出奔與晉髙祖㑹於衛州謀欲害之帝率衆盡殺閔帝左右遂免於難末帝清泰元年晉髙祖復鎮河東三年夏移鎮汶陽帝勸其舉義贊成宻計晉髙祖以帝為北京馬步軍都指揮使及契丹以全軍赴難大破張敬達之衆於晉陽城下有降軍千餘人帝盡殺之天福元年晉國建授侍衛馬軍都指揮使權㸃檢隨駕六軍諸衛使尋改陜州節度使充侍衛馬步軍都虞候二年八月改許州節度使三年十月授侍衛馬步軍都指揮使十一年移宋州節度使十二月加同平章事五年三月改鄴都留守六年七月授河東節度使朝廷以常山安重榮狂悖漸露招致退渾白承福等在五臺山北以招契丹為名晉髙祖患之召漢髙祖賜宴宻戒曰北門吾豐沛之故宅也今内有兇竪勾引近塞部落與朝廷生事吾今將幸鄴州以幷州為巨屏遍揣大臣非公不可作鎮當與李徳珫交致宜勉是行副倚屬也十月吐渾白承福與部族來歸始晉髙祖以前月有詔委帝招誘退渾節度使白承福等遲疑未決因使人謂之曰契丹強盛方與同盟聖上已曾割𨽻公合自守部落安重榮将圖不軌朝夕敗亡天下之人已共棄矣况朝廷明有吿諭便可速來無待臨以兵威南北無向差之毫釐悔無及矣承福等懼遂歸命焉帝優以繒帛米糒奏於河東安置而重榮北遣記室盧陶傳檄逺近以吐渾達靼契苾同起為名至是無一人赴者大摧其勢皆帝之謀也七年正月加侍中八年三月加中書令開運元年正月契丹南下虜主以大軍直抵澶州遣蕃将偉王率兵入鴈門少帝以帝為幽州道行營招討使大破偉王於忻口三月封太原王七月兼北面行營都統二年四月封北平王三年五月加守太尉九月契丹犯塞帝親率牙兵至朔州南陽武谷大破之四年正月虜王入東京諸侯皆附焉帝亦遣使送欵紿云有疾知邪律氏恃勝傲下使漢兵饑寒縱蕃騎暴横蹂踐鄭滑曹濮百姓為之一空必華戎相厭主客生變可坐而圖也繼發副使白文珂奉以纎繪名馬宻偵所為邪律氏亦以帝觀望不動生猜貳焉即以虜通事髙唐英領安陽耿崇美領上黨偽侍中崔廷勲赴河橋且欲扼太原之衝也帝繇是偃戢旗鼓但示弱而已左右或勸帝曰契丹敗漢法而人心已揺可議進取之計帝曰夫兵法有急擊而破敵緩守而成功者隨時消息不可失也今北虜降我軍十萬入據京邑内未有變其可輕議者哉且犬羊之性貪而好利利飽必去是其常也况氷雪已消虜畏其熱蓄銳待時理將未晚時潞府連帥張從恩遣使謀於帝曰某以勢迫懷雒欲詣虜帳去之與住一禀明公帝遣回使答曰我以一隅之地敢抗天下之大乎君其行之當繼往矣從恩以為誠而帝甘言多此類也少帝北遷二月河東行軍司馬張彦威與文武將吏等以中原無主帝威望日隆羣情所屬三上牋勸進是月辛未於太原宫受冊即皇帝位帝謂羣臣曰帝王稱謂孤已迫於羣情而遜避無所其國號正朔未忍遽改繇是降制以少帝開運四年改稱晉天福十二年遣都督史𢎞肇率兵討代州平之是月權晉州兵馬留後張晏洪權陜西留後趙暉權潞州留後王守恩並上表歸順二月權延州留後髙允權丹州都指揮使髙彦珣並以城歸命是月虜主還本國四月卒於鎮州之欒城五月丙申帝發河東取隂地闗路幸東京偽汴州節度使蕭翰迎郇國公李從益知南朝軍國事戊申帝至絳州刺史李從朗以郡降六月丙辰至雒兩京文武官寮自新安相次奉迎詔賜從益死甲子遂至東京周太祖慶祖之子年十八事後唐潞州留後李繼韜為牙兵荘宗平繼韜配從焉直天成中晉髙祖領副侍衛以帝長于書計召置麾下令掌軍籍漢髙祖累鎮蕃閫皆從之及鎮并州尤深待遇出入帷幄受腹心之寄開運末契丹犯闕晉帝北遷帝與蘇逢吉等勸漢祖建號以副人望及即位以帝為樞宻副使乾祐元年正月隠帝嗣位拜樞宻使㑹李守貞據河中朝廷遣白文珂常思等討之七月西河師徒大集未果進取制加帝同平章事即遣西征以安慰撫招為名詔西面諸軍竝取帝節度八月二十日師至河中命白文珂營於河西帝營於河東不數日周設長塹復築長連城以迫之二年五月十七日攻城自是晝夜攻之七月十三日帝三砦將士奪羅城二十一日城陷守貞自焚而死又於城中搜索出守貞男崇玉崇緒崇英緇哥女喜哥延哥偽宰相靖􅀈孫愿樞宻使劉芮國師僧總倫司天監王廷秀博士焦文傑偽滑州節度使張球澤州刺史劉仁祐忻州刺史安在欽秀州刺史張延朗等二十五人秦王印及四門旗龍鳳日月等旗傘扇玉鉞等差弓箭庫使劉延珪露布以聞詔曰李守貞頃在前朝驟承委遇迨事先帝復委藩垣効淺功㣲寵深位大而狡性難制小器易盈蔑義􅃜忠窮凶極逆江海不能流其惡鼎鑊不足快其誅卿憤激於心義形於色覩兹妖孽志在剪除動息之間必思於經畧寢食之際無忘于寇讐撫士愛人分甘共苦躬臨矢石親冒梯衝揮戈而蛇豕就誅破竹而金湯失險氛霾既息宗社再安非我元臣莫隆景運朕之倚愛何止寢興言念辛勤無忘嘉愧九月加侍中十月契丹入寇帝受詔率師赴北邊謂諸屯戍壯士曰自虜王䘮敗今纔四年幽州所屯其數無㡬然而屢犯吾境屢傷吾民非彼驍雄盖禦備之失者有三主將無謀城池不固備預無素禦捍闕供其敗一也主將輕佻妄謀躁進不顧利害輕用士民希覬功名以邀爵賞其敗二也貪他羊馬互市往來姦利之人兩為間諜軍謀國事泄之於敵其敗三也予昨者繕城池增堡障儲守備之用料将校之才盖欲自兹庶無敗事所在鎮戍當用吾言凡虜小寇則進追大侵則保壁不得與蕃人交市不得輕戰邀功民蠶麥登時黍禾熟日早令収穫俾入城池偵邏警廵為民外扞亦州牧戍將之職也虜雖衰破逺在沙塲倐忽往來難為駕馭縱得一夫一騎不足為功但自保邊斯為上策况百年之虜未易卒除使國富刑清兵多馬衆彼則占風不暇欵塞争先予非畏胡服之有時耳自是邉上鎮戍專切戒嚴虜縱侵騷於民無損帝既至邢州而虜已退三年二月班師三月制授鄴都留守樞宻使如故十一月十四日澶州節度使李洪義遣副使陳光穂至鄴報京師有變羣小害楊邠史𢎞肇等又言后弟李業等遣腹心齎宻詔至澶州令洪義殺侍衛步軍指揮使王殷洪義恐事不濟乃以宻詔示殷殷與洪義即遣光穂馳報于帝光穂既至以洪義意宻啟于帝俄頃供奉官孟鄴馳驛來亦詔護聖左廂都指揮使郭崇等害王峻及帝仍命以首級馳獻太祖即集三軍將校諭之曰予從㣲至著披肝露膽置立漢家宗社先皇登遐親受顧託與楊史諸公彈壓經謀忘寢與食一旦無罪盡已誅夷予獨何生黽勉居世死歸地下無愧先帝爾三軍斷予首報天子各圖功業自此長辭郭崇帥所管將校士卒伏於帝前言曰崇等從公征行備嘗艱苦星行露宿畧無寧息侍衛令公忘身為國不避怨謗䕶息邦家無名誅族遣誰致力崇等思揣此事必非聖㫖即是李業等奸權誣罔竊發假如此輩使握權柄國得安乎必湏披論以判忠邪何事信單車之使輙欲自棄使千載被惡名乎崇等願從公入朝面自洗雪盪除鼠輩以廓帝圖辭未絶郭崇遽領騎軍先往澶州橋帝翌日為衆所迫不獲已遵路明日行次遇内養鸗脫者隠帝之小竪也來覘太祖訊之對曰見召前開封尹侯益鄜州節度使張彦超客省使閻晉卿鄭州防禦使呉處裕令將兵守澶州帝謂鸗脫曰詔郭崇殺我崇而不忍害我言為我論列兵士廻戈我力不能制爾以此聞奏帝因寘奏状於鸗脫衣領奏曰昨為兵士擁至河上言京中誅史𢎞肇等盡非聖意請陛下宻詔内班擒縛李業等送至澶州詔諭兵士臣即却歸鄴中一則雪将相之深寃一則安陛下之家國隠帝覧奏疑不能決復詔李業輩示之於是盡害帝及王峻等親屬帝欲往澶州候鸗脫至闕伺其詔命兵士肆言我輩家屬在汴未知存亡此不可往遂燒民廬舍鼓譟不可遏王殷率步騎從履氷而渡十六日趨滑臺節度使宋延渥迎謁于路十七日以滑之府庫縑緍賞諸軍大閱步騎於州城南帝誓軍曰朝令使侯令公等率大軍將至彼既成列不肯徒然我思道理必欲交鋒便匪朝天之意如其束手何制逆我之師欲全爾等功名不如奉行前詔我以一死謝天子實無所恨諸將徬徨啟曰國家負公公不負國所以萬人奮命如復私讎侯益之徒安能為患保為公擒之十八日大軍至滑而南十九日過封丘時隠帝又令左神武統軍袁㠖前鄧州節度使劉重進繼率禁軍來拒望塵退走與侯益等軍屯赤關是夜俱退二十日兩軍相遇於劉子陂隠帝結營於七里店道西二十一日復陣於劉子陂帝令諸軍曰比除君側之惡無得犯蹕按軍不動者久之無何慕容彥超揮戈奮擊步騎雲委李筠郭崇乃率兵禦之慕容彥超馬倒㡬欲成擒而侯益張彥超袁㠖劉重進皆倒戈而來二十二日旦隠帝自砦乗馬將還宫而前鋒已及乃西南以避之事迫而郭允明遂行弑逆辰巳時諸軍畢入京城晚太祖將入宫門待罪進名朝太后以軍未整戢且歸舊第二十四日率羣臣起居於明徳門外奏曰昨者左右熒惑輿駕蒼皇歸闕師徒未免驚動帝王出令其位難虗軍國事多早宜册立嗣君以係人望伏請太后行敎令指揮太后令曰北京留守崇許州節度使信髙祖皇帝之愛弟也徐州節度使贇開封尹勲皆髙祖之裔子也俱列盤維皆分屏翰已委文武百寮六軍將校議擇賢明以承大統二十六日帝率羣臣班於明徳門外起居太后獻議請以劉贇入承正統太后下令宜備法駕迎贇於徐州即皇帝位即遣太師馮道備儀注往奉迎二十七日帝率羣臣班於明徳門外拜章以新君未知軍國之事一日萬機不可暫廢請太后權臨朝聽政二十九日鎮定言契丹入冦三道而來太后令帝赴北面軍前為都統帥相度進取新君未至其軍國公事委王峻已下商量施行其兵馬軍事委王殷勾當廵簡十二月甲午朔帝北征十九日六軍履氷渡河次澶州驛舍二十日早步兵前進帝於庭中省其装發忽聞驛外闞譟聲如雷霆俄而士卒不繇門户登墻越屋雲屯山積來迫帝曰天子請侍中自作劉家社稷盡矣縱然立得亦無好事却報讐於將校也亂軍得黄袍扶抱帝加袍於背不肯解帝紿之曰爾等解去我無所避也二十日帝上太后牋論列澶州三軍逼脅之事不獲已班師又言臣事先帝過承君父之恩及奉嗣君願竭腹心之効豈期禍難事與願違方擇當璧之賢又爽大横之兆永言膝下何慰慈顔望太后以宗子待㣲臣臣敢不奉宗廟如本朝事太后為慈母悃欵之至祈戀增深太后令曰侍中功烈崇髙徳聲昭著剪除禍亂安定乾坤謳詠有歸歴數攸屬所以羣情推戴億兆同歡老身未終殘年屬兹多難唯以衰朽托於始終載省來牋如母見待感切深意涕泗横流其諸誠懷難盡宣述是日王峻以所立新君在宋州恐聞澶州軍變之事部下為亂令郭崇率騎七百急赴之二十三日帝至韋城二十五日至七里店東西步騎陳列是日百寮上章勸進御營於臯門村二十六日太后以帝為監國中外庶事並聽監國處分四年正月丁邜漢太后令奉符寳授監國即皇帝位是日太祖自臯門歸大内御崇元殿即位制以大周為號改乾祐四年為廣順元年册府元龜卷八
