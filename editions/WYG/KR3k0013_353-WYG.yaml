body:
  text: 册府元龜卷三百五十三宋王欽若等撰將帥部立功第六後魏長孫道生太武即位初以南綂將軍汝隂公從征蠕蠕與尉眷等率衆出白黒兩漠間大捷而還太武征赫連昌道生以廷尉與司徒長孫翰宗正娥清為前驅遂平其國長孫翰為司徒襲赫連昌破之太武復征昌翰與廷尉道生宗正娥清率騎三萬為前驅昌戰敗奔上邽翰以八千騎追之至髙平不及而還從襲蠕蠕車駕渡漠大檀奔走其弟匹黎率衆赴之遇翰交戰匹黎潰走斬其渠帥數百人王度為衞尉卿從太武征赫連昌討蠕蠕並有功賜爵濟陽公加散騎常侍平南將軍詔度率五千騎與叔孫連合擊宋兖州刺史竺靈秀於湖陸大破之奚眷為鎭南將軍鎭長安太武幸美稷眷受詔督諸軍事共討山胡白龍于西河破之屠其城斬首數千級虜其妻子而還太武平姑臧遣眷討沮渠臧孫牧犍弟私署張掖太守宜得宜得奔酒泉酒泉太守無諱與宜得奔髙昌獲其二城後沮渠天周復據酒泉眷討平之虜男女四千餘人尉眷為安北將軍出鎭北境與平陽王長孫翰擊蠕蠕别帥阿伏干於柞山率師至歌刪山擊蠕蠕别帥便度弟庫仁直引師而北蠕蠕部帥莫孤帥髙車騎五千來逆眷擊破之斬首千餘級又從征蠕蠕眷出白黒兩漠之間擊其東部大獲而還又從征赫連昌眷出道南擊昌於上邽士衆乏粮臨淮公丘堆等租於郡縣為昌所敗昌乗勝抄掠諸將患之眷與侍御史安頡隂謀設伏邀擊擒昌以功拜寜北將軍加散騎常侍進爵源陽公後從征和龍眷督萬騎前驅䧏二千餘户尋為假節加侍中都督豫雒二州及河内諸軍事安南諸軍開府鎭虎牢張掖王秃髪保周之反也徵眷與永昌王健等率衆討之破保周於畨禾周遁走眷率騎追之保周窮迫自殺詔眷留鎭涼州加都督涼沙二州諸軍事安西將軍領䕶羌戎校尉轉燉煌鎭將又擊破吐谷渾俘三千餘口眷歴鎭四藩威名並著文成時北擊伊吾尅其城大獲而還尋拜侍中太尉進爵為王薛謹為平西將軍秦州刺史時山胡白龍慿險作逆太武詔鎭南將軍奚眷與謹自太平北入討平之除安西將軍梧陵公羅斤為侍御中散從太武討赫連昌帝追奔入城昌邀擊左右多死斤力戰有功帝嘉之錄勲除散騎常侍後為平西將軍平涼州攻城野戰多有克捷以功賜爵帶方公司徒楚之為安南大將軍屯潁川宋將到彦之泝河而西列守南岸至於衞闗及彦之等退走楚之破其别軍於長社又與冠軍將軍安頡攻滑臺拔之擒宋將朱循之季元德及東郡太守申謨俘萬餘人從征涼州以功賜𨽻户一百張黎為鎭北將軍鎭長安太武詔黎鎭兵一萬二千人通莎泉道帝征涼州蠕蠕吳提乗虚入冦黎與司空道生拒擊走之來大千為征北大將軍從太武討蠕蠕戰功居多遷征北大將軍賜爵盧陵公鎭雲中兼統北道軍事賊北叛大千前後追擊莫不平殄延和初北伐大千為前鋒大破虜軍陸真為内三郎數從太武征伐所在有功宋將王𤣥謨衆數萬人冦滑臺㝠從帝討之夜與數人乗小船突𤣥謨軍入城撫慰登城巡行賊營中乃還渡河至明𤣥謨敗走從駕至江真再破賊軍拜建武將軍石城子還攻盱眙真功多遷給事中奚烏侯為治書御史建義將軍從征蠕蠕擊赫連昌以功進爵城陽公加貟外散騎常侍陸陵侯為武牢鎭大將平涼休屠金崖羌狄子玉等叛以侯為平西將軍追討崖等皆獲之韓茂為虎賁中郎將從太武征赫連昌大破之帝謂諸將曰今若窮兵極武非弔伐之道明矣當共卿等取之徙其民而還以軍功賜茂爵蒲隂子加强弩將軍遷侍輦郎又從征統萬大破之從平涼當茂所衝莫不應弦而殪繇是帝壯之拜内侍長進爵九門侯從征蠕蠕頻戰大捷與樂平王丕等伐和龍徙其居民從征涼州茂為前鋒都將戰功居多遷司衞監錄前後功拜散騎常侍殿中尚書進爵安定公從破薛永宗葢吳轉都官尚書從征懸瓠頻破賊軍車駕南征分為六道茂與髙涼王那出青州諸軍渡淮䧏者相繼拜茂徐州刺史以撫之長孫陳為羽林郎征和龍賊自西門出將犯外圍陳擊退之追斬至其城下以功賜爵五等男屈垣為中領軍督諸軍東伐進號鎭東大將軍師次和龍馮文通致牛酒以犒軍獻甲三千垣責其不送侍子數之以王命遂掠男女六千口而還封勅文為鎭西將軍䕶西羌校尉詔勅文率步騎七千征吐谷渾莫利延兄子拾歸於抱罕衆少不能制詔遣安逺將軍廣川公乙烏頭等二軍與勅文會隴右軍次武始拾歸夜遁勅文引軍入抱罕虜拾歸妻子及其民户分徙千家於上邽皮豹子為選部尚書淮陽公宋遣將裴方明等侵南秦王楊難當遂陷仇池太武徵豹子拜仇池鎭將督闗中諸軍與古弼等分命諸將十道並進豹子進擊樂郷大破之擒宋將王奐之長卿等六人斬首三千餘級俘獲二千人豹子進軍下辨宋將强𤣥明辛伯奮棄城遁走追斬之悉獲其衆宋使其秦州刺史胡崇之鎭仇池至漢中聞官軍已西懼不敢進𤣥明益其兵而遣之豹子與司馬楚之至於濁水擊擒崇之盡虜其衆宋將姜道祖降仇池平未幾諸氐復反推揚文德為主宋復遣揚文德姜道盛率衆二萬人冦濁水别遣將青陽顯伯守斧山以距豹子濁水城兵射殺道盛豹子至斧山斬顯伯悉俘其衆豹子又與河間公元齊俱會于濁水賊衆震恐棄其兵甲夜遁初南秦王楊難當歸命詔送楊氏子弟詣京師文德以行賂得留亡奔漢中宋以文德為武都王給兵二千人守葭蘆招誘氐羌於是武都隂平五部氐民叛應文德詔豹子率諸軍討之文德阻兵固險以距豹子文德將楊髙來降引諸軍向其城文德棄城南走收其妻子寮屬軍資及故武都王保宗妻公主送京師宋白水太守郭啟𤣥率衆救文德豹子分軍逆擊大破之啟𤣥文德走還漢中豹子尋為内都大官宋遣其將殷孝祖修兩當城於清東以逼南境天水公封勅文擊之不克詔豹子助之豹子以南冦城守攻圍費日遂畧地至高平宋瑕丘鎭遣歩卒五千助戍两當去城八里與豹子前鋒候騎相遇即便交戰豹子軍繼至大破之縱騎追擊殺之至於城下其免者十餘人而已城内恐懼不敢出救既而班師古弼為安西將軍鎭長安時宋遣將裴方明等擊南秦王楊難當遣使請救兵未至難當奔上邽方明尅仇池立楊𤣥庻子保熾於是假弼都督隴右諸軍宋遣其秦州刺史胡崇之屯仇池弼與平西將軍元齊邀崇之於濁水臨陣擒之其衆走還漢中弼等從祥郊山南入與東道將皮豹子等討仇池遣永安侯賀純攻宋塞狹道守將姜道祖退守狹亭諸將以山道險峻時又雪深用馬不便皆遲留不進弼獨進軍元齊賀純等擊狹亭道祖南走仇池平尉撥文成時為太學生募從羅忸擊賊於陳汝有功賜爵介休男從討和龍遷虎賁帥轉千人軍將又從樂平王丕討和龍除為涼州軍將擊吐谷渾獲其人一千餘落後吐谷渾小將率三百餘落來降尋復亡叛撥率騎追之盡獲而還以功進爵為子獻文即位為北征都將南攻懸瓠破宋將朱湛之水軍三千人拜懸瓠鎭將陸眞為選部尚書時丁零數千家竊冦并定眞與并州刺史乞伏成龍自樂平東入與定州刺史許崇之併力討㓕尋遷安西將軍長安鎭將假建平公胡賊帥賀畧孫聚衆千餘人叛于石樓眞擊破之殺五百餘人是時初置長蛇鎭眞率衆築城未訖而氐豪仇傉檀等反叛氐民咸應其衆甚盛眞擊平之殺四千餘人卒城長蛇而還薛拔為都將與陸眞討反仇傉檀强免生平之房拔為北鎭將興光元年擊蠕蠕虜其將豆渾與句等獲馬千餘匹于洛拔為外都大官會隴西屠各王景文等恃險竊命私署王侯文成詔洛拔與南陽王惠壽督四州之衆討平之徙其惡黨三千餘家於趙魏轉拜侍郎殿中尚書源賀為太尉時蠕蠕冦邉賀從文成追討破之及孝文即位時河西勅勒叛遣賀率衆討之降二千餘落倍道兼行追賊黨郁朱千等至抱罕大破之斬首五千餘級虜男女萬餘口雜畜三萬餘頭復追綂萬髙平上邽三鎭叛勅勒至千金城斬首三千級尉元為鎭南大將軍獻文天安元年宋將薛安都以徐州内附元與孔伯恭赴援宋遣將張永沈攸之等率衆討安都屯于下磕永乃分遣羽林監王穆之領卒五千守輜重於武原龍驤將軍謝善居領卒二千據吕梁散騎侍郎張𢎞領卒二千守茱萸督上租粮供其軍實安都出城見元元依朝㫖授其徐州刺史遣中書侍郎髙閭李璨等與安都俱還入城别令孔伯恭精甲二千撫安内外然後元入彭城元以張永仍據險要攻守勢倍懼傷士卒乃命安都與璨等固守身率精銳揚兵於外分擊吕梁絶其糧運善居遁奔茱萸仍與張𢎞東走武原馳騎追擊斬首八百餘級武原窮冦八千餘人拒戰不下元親擐甲胄四面攻之破其外營殺傷大半獲其輜重五百餘乗以給彭城諸軍然後收師緩戰開其走路穆之率餘燼奔于永軍永勢挫力屈元乗勝圍之攻其南門永遂捐城夜遁伯恭安都乗勝追擊時大雨雪泗水冰合永棄船而走元豫策永必將東亡身率衆軍邀其走路南北奮擊大破於吕梁之東斬首數萬級追北六十餘里死者相枕手足凍斷者十八九生擒宋都督梁南北秦三州諸軍事寜朔將軍垣恭祖羽林監沈承伯等永攸之輕騎走免收其船車軍資器械不可勝數吕洛拔為平原鎭都將宋徐州刺史薛安都歸誠請援詔遣尉元率衆救之洛拔隨元入彭城宋將張永遣將王茂之領兵五千入武原援其運車元遣洛拔率騎詣武原擊之格戰二日手殺九人奪賊運車二百餘乗牛二百五十頭仍共擊永大敗之賜爵成武侯加建義將軍孔伯恭為散騎常侍宋徐州刺史薛安都以彭城内附宋遣張永沈攸之等擊安都獻文遣伯恭副尉元救之永等引師而退時皇興元年正月天大寒雪泗水冰合永與攸之棄船而走伯恭以書喻下邳宿豫城内時攸之呉憘公等率衆數萬来援下邳屯軍焦墟曲去下邳五十餘里伯恭遣子都将侯汾等率騎五百在水南奚升等五百餘騎在水北南北邀之伯恭宻造火車攻具欲水陸俱進攸之等既聞將戰引軍退保樊階城伯恭又令子都将孫天慶等步騎六千向零中峽斫木㫁清水路宋寧朔将軍陳顯達領衆二千遡清而上以迎之屯于睢清合口伯恭率衆渡水大破顯達軍俘斬十九攸之聞顯達軍敗順流退下伯恭從睢陵城東向零中峽分軍為二道遣司馬范師子等在清南伯恭從清西與攸之合戰遂大破之斬其將姜産之髙遵世及邱幼弼邱隆先沈誕沈榮宗陸道景等首攸之憘公等輕騎遁走乗勝追奔八十餘里資糧器械虜獲萬計進攻宿豫宋戍将魯僧遵棄城夜遁又遣将孔太恒等領募騎一千南討淮陽二年以伯恭都督徐南北兖州諸軍彭城鎮將尉多侯孝文時為假節征西将軍領䕶羌戎校尉延興初蠕蠕遣部帥旡盧真率三萬騎入塞圍鎭多侯擊走之以功進號征西大將軍後多侯獵于南山蠕蠕遣部帥度㧞入圍燉煌斷其還路多侯且前且戰遂衝圍而入率衆出戰大破之追北數十里斬首千餘級皮喜為南部尚書太和元年宋葭蘆戍主楊文度遣弟鼠竊據仇池詔喜率衆四萬討鼠軍到建安鼠棄城南走進次濁水遣平西將軍楊靈珍擊文度所置仇池太守楊眞眞衆潰僅而得免喜遂軍於覆津文度將强大黒固守津道懸崖險絶偏閣單行喜部分將士攀崖涉水衝擊大黒大黒潰走追奔西入攻葭蘆城㧞之斬文度傳首京師殺一千餘人韋珍為樂陵鎭將齊司州民謝天葢自署司州刺史規欲以内附事泄為齊將崔慧景攻圍詔珍率在鎭士馬渡淮援接時齊聞珍將至遣將茍元賓據淮逆拒珍乃分遣鐡騎於上流潛渡親率歩士與賊對壘旗鼓始交鐡騎掩至腹背奮擊破之天葢尋為左右所殺降於慧景珍乗勝馳進又破慧景擁䧏民七千餘户内徙表置城陽三郡以處之李崇為河南尹孝文南討漢陽以崇行梁州刺史氐楊靈珍遣弟婆羅與子雙領歩騎萬餘襲破武興與齊相結詔崇為使持節都督隴右諸軍事率衆數萬討之崇槎山分進出其不意表裏攻襲群氐皆棄靈珍散歸靈珍衆减大半崇進據赤土靈珍又遣從弟建率五千人屯龍門躬率精勇一萬據鷲硤龍門之北數十里中伐樹塞路鷲硤之口積大木聚磻石臨崖之下以拒官軍崇乃命統軍慕容拒率衆五千從他路夜襲龍門破之崇乃自攻靈珍靈珍連戰敗走俘其妻子崇多設疑兵襲克武興齊梁州刺史隂廣宗遣參軍鄭猷王思考率衆援靈珍崇大破之并斬婆羅首殺千餘人俘獲猷等珍走奔漢中以崇為都督梁秦二州諸軍事及靈珍偷據白水崇擊破之靈珍逺遁孝明初徵為右衞將軍轉左衞將軍相州大中正魯陽蠻柳北喜魯北鷰等聚衆反叛諸蠻悉應之圍逼湖陽游擊將軍李暉先鎭此城盡力捍禦賊勢甚盛詔以崇為使持節都督征蠻諸軍事以討之蠻衆數萬屯據形要以拒官軍崇累戰破之斬北鷰等徙萬餘户於幽并諸州孝明追賞平氐之功封魏昌縣開國伯邑五百戸東荆蠻樊安聚衆於龍山僣稱大號梁武共為唇齒遣兵應之諸將討擊不利乃以崇為使持節散騎常侍都督征蠻將軍事進號鎭南將軍率歩騎以討之崇分遣諸將攻擊賊壘連戰尅捷生擒樊安進討西荆諸蠻悉降延昌初加侍中車騎將軍都督江西諸軍事時梁武遣其游擊將軍趙祖悅襲據西硤石更築外城逼徙㳂淮之人於城内又遣二將昌義之王神念率水軍泝淮而上規取壽春田道龍冦邉城路長平冦五門胡興茂冦開霍揚州諸城皆被冦逼崇分遣諸將與之相持密装船艦二百餘艘敎之水戰以待臺軍梁武霍州司馬田休等率衆冦建安崇遣綂軍李神擊走之又命邉城戍主邵申賢要其走路破之於濡水俘斬三千餘人靈太后璽書勞勉許昌縣令兼紵麻戍主陳平王南引梁軍以戍歸之崇自秋請援表至十餘詔遣鎭南將軍崔亮救硤石鎭東將軍蕭寶寅於梁人堰上流決淮東注朝廷以諸將乖角不相赴乃以尚書李平兼右僕射持節節度之崇遣李神乗鬭艦百餘艘㳂淮與李平崔亮合攻硤石李神水軍尅其東北外城祖悅力屈乃降朝廷嘉之進號驃騎將軍儀同三司刺史都督如故王肅為輔國將軍長史詔討南齊義陽肅至義陽頻破賊軍降者萬餘孝文遣散騎侍郎勞之以功進號平南將軍賜駿馬一匹宣武初為尚書令時南齊裴叔業以壽春内附拜肅使持節都督江西諸軍事車騎將軍與驃騎大將軍彭城王勰率歩騎十萬以赴之齊豫州刺史蕭懿率衆三萬屯於小峴交州刺史李叔獻屯合肥將圍壽春懿遣將胡松李居士等領衆萬餘屯據死虎肅進師討擊大破之擒其將喬岷等斬首數千進討合肥生擒叔獻蕭懿棄小峴南走肅還京師帝以肅淮南累捷賞帛四千七百五十匹進位開府儀同三司封昌國縣開國侯奚康生為中堅將軍西臺直後吐京胡反自號辛支王康生為軍主從章武王彬討之胡遣精騎一千邀谷斷截康生率五百人拒戰破之追至石羊城斬首三十級彬甲卒七千與胡賊戰分為五軍四軍俱敗康生軍獨全遷為統軍時壽春來降詔康生宣撫俄而齊將桓和屯軍梁城陳伯之據硤石民心駭動頗有異謀康生乃防禦内外音信不通固城一月援軍乃至康生出擊桓和伯之等二軍並破走之拔梁城合肥洛口三戍以功遷征虜將軍封安戎縣開國男食邑二百戸及梁將宋黒率衆冦擾彭城時康生遭母憂詔起為别將持節假平南將軍領南青州諸軍擊走之後梁復遣都督臨川王蕭密副將張惠紹勒甲十萬規冦徐州又假宋黒徐州刺史領衆二萬水陸俱進徑圍髙塜戍詔授康生武衞將軍持節假平南將軍為别將領羽林三千人騎歩甲士隨便割配康生戰破走之長孫百年為抱竿領將太和中攻吐谷渾所置洮陽泥和二戍克之獲三千餘人僧淵為黄郭戍主太和末齊將王曇紛等萬餘人冦南青州僧淵擊破之悉虜其衆陸叡為北征都督擊蠕蠕大破之遷侍中都曹尚書時蠕蠕又犯塞詔叡率騎五千以討之蠕蠕遁走追至石磧擒其帥赤阿突等數百人而還加散騎常侍遷尚書左僕射領北部尚書又為使持節鎭北大將軍與楊平王蹟並為都督領軍將軍斛律桓等北征三道諸軍事歩騎十萬以討蠕蠕叡以下各賜衣物布帛孝文親幸城北訓誓群帥除尚書令衞將軍叡大破蠕蠕而還穆亮為都督秦梁益三州諸軍事征南大將軍領䕶西戎校尉仇池鎭將時宕昌王梁彌機死子彌博立為吐谷渾所逼來奔仇池亮以彌機蕃欵素著矜其亡㓕彌博凶悖氐羗所棄彌機兄子彌承戎民歸樂表請納之孝文從焉於是率騎三萬次于龍鵠擊走吐谷渾立彌承而還楊播為龍驤將軍與楊平王蹟等出漢北擊蠕蠕大獲而還孝文嘉其勲賜奴婢十餘口遷武衞將軍復擊蠕蠕至居延山而還除左衞將軍後為右衞將軍從駕討崔慧景於鄧城破之進號平東將軍劉思祖孝文朝屢為綂軍南征累著功捷宣武初為平逺將軍任城王之圍鍾離也梁遣其冠軍將軍張惠紹及彭瓫與張豹子等率衆二萬送糧鍾離思祖領兵數千邀梁餉軍於邵陽遣其長史元龜步騎一千於鍾離之北遏其前鋒錄事㕘軍繆琰掩其後思祖身率精銳横衝其陣三軍合擊大破之擒惠紹及梁驍騎將軍祁陽縣開國男趙景悅之弟寜逺將軍景循寜逺將軍梅世和屯騎校尉任景攸長水校尉邉欣越騎校尉賈慶眞龍驤將軍徐州敞等俘斬數千人趙遐宣武景明初為梁城戍主被梁將攻圍以固守及戰功封牟平子後以左將軍督巴東諸軍事鎭南鄭時梁冠軍將軍軍主姜脩衆二萬屯羊口輔國將軍姜白龍據南城龍驤將軍泉建率土民北入桑坯姜脩又分軍據興勢司州刺史王僧炳頓南安並扇動夷獠規翻南鄭遐率甲卒所在衝擊數百里間莫不摧靡前後斬首五千餘級還司馬悅為鎭逺將軍豫州刺史悅與鎭南將軍元英攻義陽尅之詔改梁司州為郢州以悅為征虜將軍郢州刺史梁遣其豫州刺史馬仙琕左軍將軍永陽戍主陳可等率衆一萬於三闗南六十里因山起城名為竹敦遣其輔國將軍濟隂太守薊沛精兵二千以戍之後於闗南四十里麻陽舊柵起城仙琕輕騎東西為之節度闗南之民多懷兩望悅令西闗統軍諸靈鳳掩擊敗之盡燔其城樓儲積擒薊沛及其輔國將軍軍主劉靈秀以散騎常侍徵還從征涼州以功賜𨽻户一百傅豎眼為建武將軍鎭合肥武興氐楊集義反叛推其兄子紹先為主攻圍闗城梁州刺史邢巒遣豎眼討之集義衆逆戰頻破走之乗勝追北乃尅武興後為昭武將軍益州刺史以州初置境逼巴獠給羽林虎賁三百人進號冠軍將軍及髙肇伐蜀假豎眼征虜將軍持節領步兵三萬先討北巴梁髙祖聞大軍西伐遣其寜州刺史任太洪從隂平偷路入益州北境欲擾動氐蜀以絶運路乗國諱班師遂扇誘土民奄破東洛除口二戍因此詐言南軍繼至氐蜀信之翕然從逆太洪率氐蜀數千圍逼闗城豎眼遣寜朔將軍成興孫討之軍次白䕶太洪遣其輔國將軍任碩北等率衆一千邀險拒戰在虎徑南山連置三營興孫分遣諸綂隨便掩擊皆破之太洪又遣軍主邉昭等率氐蜀三千攻逼興孫柵興孫力戰為流矢所中死豎眼又遣綂軍姜喜季元度從東嵠潛入廻出西崗邀賊之後表裏合擊大破之斬邉昭及太洪前部王隆䕶首於是太洪及闗城五柵一時逃散及孝明時屢請解州乃以元法僧代之至洛拜征虜將軍大中大夫梁遣將趙祖悅入屯硤口以逼壽春鎭南將軍崔亮討之以豎眼為持節鎭南軍司法僧既至大失民和梁遣其信武將軍衡州刺史張齊因民心怨入冦晉壽頻陷葭萌小劒諸戍進圍州城朝廷以西南為憂乃驛徵豎眼於淮南既至以為右將軍益州刺史尋加散騎常侍平西將軍假安西將軍西征都督率騎三千以討張齊給銅印千餘須有假職者聼六品以下板之豎眼既出梁州梁冠軍將軍勾道侍梁州刺史王太洪等十餘將所在拒塞豎眼三日之中轉戰二百餘里甲不去身頻致九捷土民統軍席廣度等處處邀擊斬太洪及梁征虜將軍楊伏錫等首張齊引兵西退遂奔葭萌蜀民聞豎眼復為刺史人人喜悅迎於路者日有百數豎眼至州白水以東民皆寜業先是梁信義將軍都統白水諸軍事楊興起征虜將軍李光宗襲據白水舊城豎眼遣虎威將軍强虬與隂平王楊大赤率衆千餘夜渡白水旦而交戰大敗賊軍斬興起首尅復舊城又遣綂軍傅曇表等大破梁寜朔將軍王光昭於隂平張齊仍阻白水屯㓂葭萌豎眼分遣諸將水陸討之齊遣其寜朔將軍費忻督步騎二千逆來拒戰軍主陳洪起力戰破之乗勝追奔遂臨夾谷三柵綂軍胡小虎四面攻之三柵俱潰張齊親率驍勇二萬餘人與諸軍交戰豎眼命諸綂帥同時奮擊軍主許暢斬梁雄信將軍牟興祖軍主孔領周射齊中足於是大破賊軍斬獲甚衆齊乃柵於虎頭山下賊帥任令崇屯據西郡豎眼復遣討之令崇棄衆夜遁乃進討齊破其三柵斬首萬餘齊被重創奔竄而退小劒大劒賊亦捐城西走益州平田益宗為征虜將軍宣武景明初梁遣軍主吳子陽率衆冦三闗益宗遣光城太守梅與之步騎四千進至隂山闗南八十餘里據長風城逆擊子陽大破之斬獲千餘級梁建寜太守黄天賜築城赤亭復遣其黄公賞屯於漴城與風相持益宗命安蠻太守梅景秀爲之犄角擊討破天賜等斬首數百獲其二城後梁寜朔將軍楊僧逺率衆二千冦逼蒙籠益宗命魯生與戍主奇道顯逆擊破之追奔十里俘斬千餘進號平南將軍楊大眼為征虜將軍東荆州刺史景明中蠻酋樊秀安等反詔大眼為别將𨽻都督李崇討平之後遷平南將軍持節都綂軍正始中梁遣其前江州刺史王茂先率衆數萬次于樊雍招誘蠻夏規立宛州又令其所署宛州刺史雷豹狼軍主曹仲宗等領衆二萬偷據河南城宣武以大眼為武衞將軍假平南將軍持節都督綂軍曹敬邴虬樊魯等諸軍討茂先等大破之斬梁輔國將軍王花龍驤將軍申天化俘馘七千有餘梁又遣其勇將張惠紹總率衆軍竊據宿豫又假大眼平東將軍為别將與都督邢巒討破之薛眞度景明中為平南將軍時梁豫州刺史王超宗率衆圍逼小峴眞度遣兼綂軍李叔仁等率步騎擊之超宗逆來拒戰叔仁擊破之俘斬三千還朝除金紫光祿大夫加散騎常侍魏承祖為右將軍善撫士卒兼有將材自宣武景明以後嘗為綂軍南北征伐累有戰功歴太原太守至光祿大夫陳伯之為冠軍將軍正始初梁征虜將軍趙祖悅築城於水東與潁川接對置兵數千欲為攻討之計伯之進軍討祖悅大破之乘勝長驅入城刺祖悅三創賊衆大敗進討破諸郡賊斬獲數千刁整為尚書左中兵郎中正始中梁江州刺史王茂先來冦南境平南將軍楊大眼討之詔整持節為大眼軍司大破茂先斬梁輔國將軍王花等永平初以軍功除貟外散騎常侍畢祖朽為寜逺將軍正始中梁將蕭及先率歩騎二萬人冦兖州及先令别帥角念屯于蒙山以祖朽為綂軍假寜朔將軍𨽻邢巒討之祖朽開誘有方降者相繼賊出逆戰祖朽大破之賊走還柵祖朽夜又焚擊賊徒潰散追討百餘里斬獲及赴沂死者四千餘人斬龍驤將軍矯道儀寜朔將軍王秀以功封南城縣開國男食邑二百户李世哲為三闗别將延昌三年大破羣蠻斬梁龍驤將軍文思之文天生李煥為輔國將軍梁州刺史時武興氐楊集起舉兵作逆令弟集義邀斷白馬戍勅假煥平西將軍督别將石長樂綂軍王祐等與軍司茍金養俱討之大破集起軍會秦州民吕茍兒反煥仍令長樂等繇麥積崖赴援屬都督元麗至遂共平之時氐王楊定進猶據方山與茍兒影響煥密募氐趙芸路斬定邢巒為尚書時梁朝梁秦二州行事夏侯道遷以漢中内附詔加巒使持節都督征梁漢諸軍事假鎮西將軍進退徵攝得以便宜從事巒至漢中白馬以西猶未歸順巒遣寜逺將軍楊舉統軍楊衆愛氾洪雅等領卒六千討之軍鋒所臨賊皆欵附唯補谷戍主何法靜據城拒守舉等進師討之法靜奔潰乗勝追至闗城之下梁龍驤將軍闗城流雜李侍叔逆以城降梁輔國將軍任僧幼等三十餘將率南安廣長東洛大寒武始除口平溪桶谷諸郡之民七千餘户相繼而至梁平西將軍李天賜晉壽太守王景𦙍等擁衆七千屯據石亭統軍韓多寳等率衆擊之破天賜前將軍趙睹擒斬一千三百遣統軍李義珍討晉壽景𦙍宵遁遂平之拜巒使持節安西將軍梁秦二州刺史梁巴西太守龎景民恃逺不降巒遣巴州刺史嚴𤣥思往攻之斬景民巴西悉平梁遣其冠軍將軍孔陵等率衆二萬屯據深坑冠軍將軍曾方達固安南冠軍任僧褒輔國將軍李畎戍石同巒統軍王足所在擊破之梟梁輔國將軍樂保明寜朔將軍李伯度龍驤將軍李思賢賊遂保回車柵足又進擊梁輔國將軍范峻自餘斬獲殆將萬數孔陵等收集遺衆奔保梓潼足又破之斬梁輔國將軍符伯度其殺傷投溺者萬有餘人開地定民東西七百南北千里獲郡十四二部䕶軍及諸縣戍後為安東將軍先是梁輔國將軍蕭及先率衆二萬冦陷固城冠軍將軍魯顯文驍騎將軍相文玉等率衆一萬屯於孤山梁將角念等率衆一萬擾亂龜蒙土民從逆十室而五巒遣綂軍樊魯討文玉别將元恒攻固城統軍畢祖朽討角念樊魯大破文玉等追奔八十餘里斬首四千餘級元恒又破固城畢祖朽復破念等兖州悉平巒破賊將藍懷恭於睢口進圍宿豫而懷恭等復清南造城規斷水陸之路巒身率諸軍自水南而進遣平南將軍楊大眼從水北逼之統軍劉思祖等夾水造筏燒其船舫衆軍齊進拔柵塡塹直登其城火起中流四面俱擊乃陷賊城俘斬數萬在陣别斬懷恭擒其列侯列將直閣直後三十餘人俘斬一萬宿豫既平蕭昞亦於睢陽退走二戍獲米四十餘萬石後豫州城民白早生殺刺史司馬悅以城南入詔巒持節討之巒率騎八百倍道兼行五日次於鮑口賊遣大將軍胡孝智率衆七千去城二百逆來拒戰巒擊破孝智乗勝長驅至於懸瓠賊出城逆戰又大破之因即渡汝既而大兵繼至遂長圍之詔加巒使持節假鎭南將軍都督南討諸軍事征南將軍中山王英南討三闗亦次於懸瓠以後軍未至前冦稍多憚不敢進乃與巒分兵掎角攻之梁將齊茍仁等二十一人開門出䧏即斬早生等同惡數十人豫州平裴良以尚書左丞為西北道行臺討汾州羣胡薛羽等値别將李德龍為羽所破良入汾州與刺史汝隂王景和及德龍率兵數千人慿城自守賊併力攻逼詔遣行臺裴延儁大都督章武王融都督宗王彌孫等赴援時有五城郡山胡馮宜都賀悅廻成等以妖妄惑衆假稱帝號服素衣持白傘白幡率諸逆衆於雲臺郊抗拒王師融等與戰敗績賊乗勝圍城良率將士出戰大破之於陣斬廻成李平為鎭北將軍討京兆王愉於冀州平至城南十六里賊攻圍濟州軍拔柵塡塹未滿者數尺諸將合戰無利而還憚於更進平親入行間勸以重賞士卒乃前大破逆衆愉時墜馬乃有一人下馬援愉上而鬭死乗勝逐北至於城門斬首數萬級遂圍城燒門愉與百餘騎突門出走遣綂軍叔孫頭追之去信都八十里擒愉冀州平後遷鎮軍大將軍率步騎二千以赴夀春平巡視硤石内外知其盈虚之所嚴勒崇亮令水陸兼偹尅期齊舉崇亮憚之無敢乖互頻日交戰屢破賊軍安南将崔延伯立橋於下蔡以拒賊之援軍賊将王神念昌義之等不得進救趙祖悦守死窮城平乃分部攻之令崔亮督陸卒攻其城西李崇勒水軍擊其東面然後鼓噪南北俱上賊衆周章東西赴戰屠賊外城賊之将士相率歸附祖悦率其餘衆固保南城通夜攻守至明乃降斬祖悦送首於洛俘獲甚衆册府元龜卷三百五十三
