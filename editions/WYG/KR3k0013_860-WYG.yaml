body:
  text: 册府元龜卷八百六十宋王欽若等撰總録部相術洪範五事著休咎之徵孟子亦云觀人之良莫良於眸子劉歆所紀數術之學有形法焉所以辨骨法之度數察形氣之首尾表其貴賤知其吉凶以極精㣲之致也簡牒所記代有人焉咸著其徵驗以彰其獨異盖繇專門精學積思懸觧多言屢中遂幾於神且有隠跡閭巷不顯名氏邂逅胥遇恍若靈化固非恒情之能測也若乃善惡之興本乎心術殃慶之報速於影響則形貎之際休戚之數安在確乎而不易能哉孔子適鄭與弟子相失孔子獨立郭東門鄭人或謂子貢曰東門有人其顙似堯其項類皋陶其肩類子産然自腰以下不及禹三寸纍纍若䘮家之狗䘮家之狗主人哀荒不見飲食故纍然而不得意子貢以實告孔子孔子欣然笑曰形狀末也而似䘮家之狗然哉然哉周王使内史叔服㑹𦵏於魯公孫敖聞其能相人也公孫敖魯大夫慶父之子見其二子焉叔服曰穀也食子難也收子穀文伯難惠叔食子奉祭祀供養者也收子𦵏子之身也穀也豐下必有後於魯國豐下盖靣方也楚子將以商臣為太子訪諸令尹子上子上曰是人也蜂目而豺聲忍人也不可立鬭子良為司馬生子越椒子文曰必殺之子文子良之兄是子也熊虎之状而豺狼之聲不殺必滅若敖氏矣諺曰狼子野心是乃狼也其可畜乎姑布子卿見趙簡子姑布姓子卿字簡子徧召諸子相之子卿曰無為將軍者簡子曰趙氏其滅乎子卿曰吾嘗見一子於路殆君之子也簡子召子母䘏母䘏至則子卿起曰此真將軍也簡子曰此其母賤翟婢也奚道貴哉子卿曰天所授雖賤必貴其後竟立母䘏為嗣晉司馬寅為大夫黄池之㑹吳晉爭先趙鞅呼寅對曰請姑視之反曰肉食者無墨墨氣色下今吳王有墨國勝乎國為敵所勝太子死乎乃先晉人時越伐吳獲吳子友王孫彌庸夀於姚吳人告敗于王乃先晉人趙平原君勝謂趙王曰澠池之㑹臣察武安君白起之為人小頭鋭上瞳子白黑分明眡瞻不轉小頭鋭上斷敢行也瞳子白黑分明者見事明也眡瞻不轉者執志强也可與持乆難與爭鋒秦蔡澤者燕人也㳺學於諸侯小大甚衆不遇而從唐舉相曰吾聞先生相李兊曰百日之内持國秉政有之乎曰有之曰若臣者何如唐舉熟視而笑曰先生曷鼻巨肩曷一作仰巨一作渠魋顔蹙膝攣攣兩膝曲也吾聞聖人不相殆先生乎蔡澤知唐舉戲之乃曰富貴吾所自有吾所不知者夀也願聞之唐舉曰先生之夀從今以徃者四十三嵗蔡澤笑謝而去謂其御者曰吾持梁刺齒肥持梁作飯也刺齒當作齕躍馬疾驅懐黄金之印結紫綬於腰揖讓人主之前富貴四十三年足矣秦王見尉繚亢禮衣服食飲與繚同繚曰秦王為人蜂凖長目摯鳥膺豺聲少恩而虎狼心居約易出人下得志亦輕食人我布衣也然見我常身自下我誠使秦王得志於天下天下皆為虜矣不可與乆游乃亡去王覺固止之以為秦國尉吕公者單父人好相人見漢髙祖狀貎因敬重之引入坐上坐蕭何曰劉季固多大言少成事髙祖因狎侮諸客遂上坐無所詘酒闌吕公固畱髙祖竟酒後吕公曰臣少好相人相人多矣無如季相願季自愛臣有息女願為箕箒妾酒罷吕媪怒曰公始常欲竒此女與貴人沛令善公求之不與何自妄許與劉季吕公曰此非兒女子所知卒與高祖吕公女即高后漢髙祖初為泗水亭長嘗告歸之田吕后與兩子居田中有一老父過請飲后后因餔之老父相后曰夫人天下貴人也令相兩子見孝惠帝曰夫人所以貴者乃此男也相魯元公主亦皆貴老父巳去髙祖適從旁舍来吕后具言客有過相我子母皆大貴髙祖問曰未逺乃追及問老父老父曰鄉者夫人兒子皆以君君相貴不可言髙祖乃謝曰誠如父言不敢忘徳及髙祖貴遂不知老父處矣吳王濞初封髙祖召濞相之曰若狀有反相因撫其背曰漢後五十年東南有亂者豈若邪事具帝王知臣門黥布姓英氏少時有客相之曰當刑而王及壯坐法黥布欣然笑曰人相我當刑而王幾是乎幾及也人有聞者共俳笑之後為九江王鄧通為上大夫文帝使善相者相通曰當貧餓死帝曰能富通者在我於是賜通蜀嚴道銅山得自鑄錢通後寄死人家周亞夫為河内守時許負相之曰君後三嵗而侯八嵗為將相持國秉貴重矣於人臣無二後九年而餓死亞夫笑曰臣之兄已代父侯矣有如卒子當代我何說侯乎然既已貴如負言又何説餓死指示我負指其口曰縱理入口此餓死法也縱豎也居三嵗兄絳侯勝之有罪文帝擇勃子賢者皆推亞夫廼封為條侯文帝後六嵗匈奴大入邊亞夫以河内守為將軍軍細栁孝景三年為太尉五嵗為丞相景帝三年以病免相為人上變入廷尉因不食五日嘔血而死衛青其父鄭季給事平陽侯家與平陽公主家僮衛媪通生青青冐姓衛氏少時歸其父父使牧羊民母之子皆奴畜之不以為兄弟數民母嫡母也言鄭季正妻别於公主家也青嘗從人至甘泉居室居室甘泉徒所居也有一鉗奴相青曰貴人也官至封侯青笑曰人奴之生得無笞罵即足矣安得封侯事乎青後為大將軍封長平侯李陵為騎都尉將五千兵出塞與單于相值武帝欲陵死戰召陵母及婦使相者視之無死喪色後聞陵降帝怒甚翟方進汝南上蔡人少失父給事太守府為小史廼從汝南蔡父相問巳能所宜言從何術藝可以自達蔡父大竒其形貎謂曰小史有封侯骨當以經術進努力為諸生學問方進後至丞相黄覇少為陽夏游徼游徼主徼廵盗賊者也與善相人者共載出見一婦人相者言此婦人當富貴不然相書不可用也覇推問之乃其鄉里巫家女也覇即取為妻與之終身覇後至丞相王莽為人侈口蹷顄侈大也蹷短也顄頤也露眼赤睛大聲而嘶嘶聲破也長七尺五寸好厚履髙冠以􅈊裝衣毛之强曲者曰􅈊以装禇衣中令其張起也反膺髙視瞰臨左右是時有用方技待詔黄門者或問以莽形貎待詔曰莽所謂鴟目虎吻豺狼之聲者也故能食人亦當為人所食問者告之莽誅滅待詔而封告者韋賢為吏至大鴻臚有相工相之當至丞相賢有男四人使相工相之至第二子元成相工曰此子貴當封侯後為丞相後漢光武征河北以朱祐為䕶軍祐侍光武讌從容曰長安政亂公有日角之相此天命也世祖曰召刺姦收䕶軍王莽置左右刺姦使督姦猾祐乃不敢復言明徳馬皇后㣲時太夫人呼相者使占諸女見后大驚曰我必為此女稱臣然貴而少子若養他子者得力乃當踰於所生養賈貴人子是為章帝班超為校書郎行詣相者曰祭酒布衣書生爾一坐所尊則先祭酒稱祭酒尊敬之辭也而當封侯萬里之外超問其狀相者指曰生燕頷虎頸飛而食肉此萬里侯相也章徳竇皇后融之曾孫也父勲坐事死家既廢壊數呼相工問息耗見后者皆言當大尊貴非臣妾容貎蘓文相者也和熹鄧皇后㣲時文見后驚曰此成湯之法也家人竊喜而不敢宣茅通相工也順烈梁皇后初與姑俱選入掖庭時年十三通見后驚再拜賀曰此所謂日角偃月相之極貴臣所未嘗見也袁逢使善相者相趙壹云仕不過郡吏竟如其言魏髙元吕善相人太祖不時立太子太子自疑乃呼元吕問之對曰其貴乃不可言問夀幾何元吕曰其夀至四十當有小苦過是無憂也後無幾而立為皇太子是為文帝年果終四十劉良相者也文帝使相文昭甄皇后及諸子良指后曰此女貴乃不可言朱建平沛國人善相術於閭巷之間效騐非一太祖為魏公聞之召為郎文帝為五官將坐上㑹客三十餘人文帝問已年夀又令徧相衆賔建平曰將軍當夀八十至四十時當小厄願謹䕶之謂夏侯威曰君四十九位為州牧而當有厄厄若得過可年至七十位致公輔謂應璩曰君六十二位為常伯而當有厄先此一年當獨見一白狗而傍人不見也謂曹彪曰君據藩國至五十七當厄於兵宜善防之初潁川荀攸鍾繇相與親善攸先亡子㓜繇經紀其門户欲嫁其妾與人書曰吾與公逹曾共使朱建平相建平曰荀君雖少然當以後事付鍾君吾時啁之曰惟當嫁卿阿騖爾何意此子竟早殞没戲言遂騐乎今欲嫁阿騖使得善處追思建平之妙雖唐舉許負何以復加也文帝黄初七年年四十病困謂左右曰建平所言八十謂晝夜也吾其决矣頃之果崩夏侯威為兖州刺史年四十九十二月上旬得疾念建平之言自分必死豫作遺令及送喪之備咸使素辦至下旬轉差垂以平復三十日日昃請紀綱大吏設酒曰吾所苦漸平明日雞鳴年便五十建平之戒真必過矣威罷客之後合暝疾動夜半遂卒璩六十一為侍中直省内欻見白狗問之衆人悉無見者於是數聚㑹并急㳺觀田里飲宴自娛過期一年六十三卒曹彪封楚王年五十七坐與王凌通謀賜死凡説此軰無不如言不能具詳故粗記數事惟相司空王昶征北將軍程喜中領軍王肅有蹉跌云肅年六十二疾篤衆醫竝以為不愈肅夫人問以遺言肅云建平相我踰七十位至三公今皆未也將何慮乎而肅竟卒管輅族兄孝國居在斥丘輅往從之與二客㑹去後輅謂孝國曰此二人天庭及口耳之間同有㓙氣異變俱起䨇魂無宅一云厚味腊毒天精幽夕坎為棺椁兊為喪車流魂於海骨歸於家少許時當竝死也後數日二人飲酒醉夜共載車牛驚下道入漳河中皆即溺死也輅舉秀才吏部尚書何晏請之鄧颺在宴許輅言切至還舍具以語舅舅責輅言太切至輅曰與死人語何所畏邪舅大怒謂輅狂悖後聞晏颺皆誅舅乃服問輅前見何鄧之日為已有㓙氣未也輅言與禍人共㑹然後知神明交錯與吉人相近又知聖賢求精之妙夫鄧之行歩則筋不束骨脉不制肉起立傾倚若無手足謂之鬼躁何之視候則魂不守宅血不華色精爽煙浮容若槁木謂之鬼幽故鬼躁者為風所收鬼幽者為火所燒自然之符不可以蔽也後卒誅死輅至少府丞卒鍾繇字元常頴川長社人也甞與族父瑜俱至雒陽道遇相者曰此童有貴相然當厄於水努力慎之行未十里度橋馬驚墮水幾死瑜以相者言中益貴繇而供給資費使得專學繇後為太傅鍾㑹繇小子㓜敏慧時中䕶軍蔣濟著論謂觀其眸子足以知人㑹年五嵗繇遣見濟濟甚異之曰非常人也後位至鎮西將軍張緝為尚書郎以稱職為明帝所識帝以為緝之材能多所堪任試呼相工相之相之者云不過二千石帝曰何材如是而位止二千石乎緝後為光禄大夫蜀先主穆皇后陳留人兄吳壹少孤壹父素與劉焉有舊是以舉家隨焉入蜀焉有異志而聞善相者相后當大貴為子瑁納后瑁死后寡居先主定益州納后為夫人遂為皇后鄧芝字伯苗義陽新野人漢末入蜀未見知待時益州從事張裕善相芝徃從之裕謂芝曰君年過七十位至大將軍封侯芝後至車騎將軍封武陽亭侯裕喜占候又曉相術每舉鏡視靣自知刑死未嘗不撲之於地也先主衘其不遜誅之吳大帝漢末舉孝亷時孫策初有江東漢以策逺修職貢遣使者劉琬加錫命琬語人曰吾觀孫氏兄弟才秀明達然皆禄祚不終唯中弟孝亷形貎奇偉骨體不常當有大貴之表年又最夀爾其識之孫皓少時西湖民景養相皓當大貴皓隂喜而不敢泄晉文帝初未定嗣而屬舞陽侯攸武帝時為中撫軍懼不得立問裴秀曰人有相否因以竒表示之秀後言於文帝曰中撫軍人望既茂天表如此固非人臣之相也繇是世子乃定武元楊皇后少聰慧善書姿質美麗閑於女工有善相者嘗相后當極貴文帝聞而為世子聘焉簡文帝諸姬絶孕將十年乃令善相者召諸愛妾而示之皆云非其人又悉以諸媵婢示焉時李后為宫人在織坊中形長而色黑宫人皆謂之崑崙既至相者驚云此其人也帝以大計召之以侍寢后夢兩龍枕膝日月入懐意以為吉祥向儕類説之帝聞而異焉遂生孝武帝及會稽孝文王鄱陽長公主羊祜少時嘗游於汝水之濵遇父老謂之曰孺子有好相年未二十必建大功於天下既而去莫知所在祜後為征南大將軍建平吳之策卒年五十八卒後二嵗而吳平張華為司空又得豐城寳劍嘗曰吾少時有相者言吾年出六十位登三事當得寳劍佩之吾彦初仕吳為通江吏時將軍薛珝杖節南征軍容甚盛彦觀之慨然而歎有善相者劉札謂之曰以君之相後當至此不足慕也後至南中都督交州刺史周訪少時遇善相者廬江陳訓謂訪與陶侃曰二君皆位至方岳功名畧同但陶得上夀周當下夀優劣更繇年爾訪小侃一嵗大興三年卒於安南將軍梁州刺史時年六十一陶侃字士行有善相者師圭謂侃曰君左手中指有􅆆理當為公若徹於上貴不可言侃以針决之見血灑壁而為公字以紙裛手公字愈明侃後至太尉年七十六陳訓善相術甘卓為歴陽太守訓私謂所親曰甘侯頭低而視仰相法名為眄刀又目有赤脉自外而入不出十年必以兵死不領兵則可以免卓果為王敦所害丞相王導多病每自憂慮以問訓訓曰公耳豎垂肩必夀亦大貴子孫當興於江東咸如其言載洋好道術陳敏為右將軍堂邑令孫混見而羡之洋曰敏當作賊族滅何足願也未幾敏果反而誅焉洋至丞相令史王珍少游侠京師隠者董仲道見而謂之曰君豺聲豹視好亂樂禍若天下搔擾不作士大夫矣後為石勒左司馬為勒所殺魏詠之生而兔缺有善相者謂之曰卿當富貴後為荆州刺史持節都督六州領南蠻校尉詠之初在布衣不以貧賤為恥及居顯位亦不以富貴驕人始為殷仲堪之客未幾竟踐其位論者稱之前趙劉元海膂力過人姿儀魁偉有屯留崔懿之襄陵公師彧等皆善相人及見元海驚相謂曰此人形貎非常吾所未見也於是深相崇敬推分結恩後趙石勒少時居武鄉北原時父老及相者皆曰北胡狀貎奇異志度非常其終不可量也勸邑人厚遇之時多􅅓笑惟鄔人郭敬陽曲寗驅以為信然竝皆資贍勒亦感其恩為之力耕石季龍年六七嵗有善相者曰此兒貎奇有壯骨貴不可言前秦苻堅年七嵗髙平徐統遇之於路統謂左右曰此兒有覇王之相左右怪之統曰非爾所及也後又遇之統下車屏人宻謂之曰苻郎骨相不恒後當大貴但僕不見如何堅曰誠如公言不敢忘徳宋髙祖義旗之建以檀慿之為建武將軍髙祖嘗與何無忌魏詠之同會慿之所㑹善相者晉陵韋叟見慿之大驚曰卿有急兵之厄其候不過三四日耳且深藏以避之不可輕出及宣元將皇甫敷之至羅落橋也慿之與髙祖各領一隊而戰軍敗為敷軍所害髙祖初與何無忌等共建大謀有善相者相髙祖及無忌等竝當大貴其應甚近惟云慿之無相髙祖與無忌宻相謂曰吾等既為同舟理無偏異吾徒咸皆富貴則檀不應獨殊深不觧相者之言至是而慿之戰死髙祖知其事必捷桓修令韋叟相髙帝當得州不叟曰當得邉州刺史退而私於帝曰君相貴不可言帝笑曰若相中當用為司馬後叟謂帝曰成王不負桐葉之信公亦應不忘司馬之言今不敢希鎮軍司馬願得領軍佐於是用焉柳元景少時貧苦嘗下都值大雪日暮寒甚頗有羇旅之歎岸側有一老父自稱善相謂元景曰公方大富貴位至三公元景曰豈朢富貴老父曰後當相憶及貴求之不知所在後至侍中驃騎將軍開府儀同三司徐羡之年少時嘗有一人来謂曰我是汝祖羡之拜此人曰汝有貴相而有大厄宜以錢二十八文埋宅四角可以免灾過此可位極人臣後隨親之縣住在縣内常暫出而賊自後破縣縣内人無免者雞犬亦盡惟羡之在外獲全後至司徒沈攸之賤時與吳郡孫超之全景文共乘小船出京都三人共上引埭有一人止而相之曰君三人皆當至方伯攸之曰豈有三人俱有此相者曰骨法如此若有不驗便是相書誤爾其後攸之為郢荆二州超之廣州刺史景文南豫州刺史李安民為武衛將軍討晉安王子勛有功明帝大㑹新亭樓勞諸軍主樗蒲官賭安民五擲皆盧帝大驚目安民曰卿靣方如田封侯相也安民少時貧窶有一人從門過相之曰君後當大富貴與天子交手共戲至是安民尋此人不知所在南齊明帝脾上有赤痣嘗秘不言既而江祏勸帝出以示人晉夀陽太守王洪範罷任還上袒示之曰人皆謂此是日月相卿幸無泄之洪範曰公日月在軀如何可隠輙當言之公卿帝大悦宣孝陳皇后宣帝從任在外后嘗留家治事教子孫有相者謂后曰夫人有貴子而不見之后歎曰我三兒誰當應之呼太祖小字曰政應是汝爾張欣㤗少時有人相其當得三公而年裁三十後屋瓦墮傷額又問相者曰無復公相年夀更増亦可得方伯爾後為持節督梁南北秦四州軍事雍州刺史卒年三十六王僧䖍少時羣從宗族㑹客有相之者云僧䖍年位最髙仕當至公餘人莫及也僧䖍後為尚書令年六十梁武帝初為随王鎮西諮議參軍行經牛渚逢風入泊龍瀆有一老人謂帝曰君龍行虎歩相不可言天下將亂安之者其在君乎問其名忽不見髙祖丁貴嬪生於樊城相者曰此女當大貴髙祖臨州丁氏因人以聞貴嬪時年十四髙祖納焉宜豐侯修參軍陳晃善相人修因法㑹將晃自隨令相簡文有天下否晃言簡文九州骨成必踐帝位而地部過弱非但王畿寖蹙兼恐不得善終吕僧珍字元瑜東平范陽人也世居廣陵家甚寒賤始童兒時從師學有相士歴觀諸生指珍謂博士曰此兒有奇聲封侯相也及為平北將軍典籖魏軍侵沔北司空陳顯達出討一見異之因屏人呼上座謂曰卿有貴相後當不見減努力為之後至鎮軍將軍平固縣侯元帝初在尋陽背生黑子巫媪見曰此大貴兆當不可言從劉景受相術因訊以年答曰未至五十當有小厄禳之可免帝自勉曰茍有期㑹禳之何益及魏師入四十七矣陳章昭達字伯通吳興武康人昭達性倜儻輕財尚氣少時嘗遇相者謂昭達曰卿容貎甚善須小虧損則當富貴初仕梁為東宫直後因醉墜馬鬢角小傷昭達喜之相者曰未也及侯景之亂昭達率募鄉人援臺城為流矢所中眇其一目相者曰卿相善矣不乆當富貴臺城䧟昭達還鄉里與世祖遊因結君臣之分侯景平世祖為吳興太守昭達杖策来謁世祖世祖見之大喜因委以將帥位至司空宣帝貎若不慧魏將楊忠門客張子煦見而奇之曰此人虎頭當大貴也駱文牙字旗門吳興臨安人年十二宗人有善相者云此郎容貎非常必將逺致文牙封臨安侯豐州刺史後魏㓂讃為南雍州刺史賜爵河南公加安南將軍初讃未貴時嘗從相者唐文相文曰君額上黒子入幘位當至方伯封公及其貴也文以民禮拜謁曰明公憶民疇昔之言乎昔日但知公當貴然不能自知得為州民也讃曰往時卿言杜瓊不得官長人咸謂不然及瓊被選為盩厔令卿猶言相中不見而瓊果暴疾未拜而終昔魏舒見主人兒死自知巳必至公吾常以卿言瓊之驗亦復不息此望也乃賜文衣服良馬盧淵年十四嘗詣長安將還諸相餞送五十餘人别於渭北有相者扶風人王伯達曰諸君皆不如此盧郎雖位不副實然徳聲甚盛望踰公輔後三十餘年當制命闗右願不相忘後淵果為安南將軍督闗右諸軍事相者年過八十詣軍門請見言叙平生未幾拜儀曹尚書李訢字元盛母賤為諸兄所輕父崇曰此子相者言貴吾每觀察或未可知遂使入都為中都學生訢後為司空侍中郭祚少孤貧姿貎不偉鄉人莫之識也有女巫相祚後當富貴後至左僕射雍州刺史北齊綦連猛初與尉興慶謝猥餧竝善射小心給事神武左右神武使相者視之曰猛大貴尉謝無官及芒山之役興慶救神武之窘為周軍所殺神武歎曰富貴定在天也猛竟如相者卒以榮寵自畢位至大將軍段長遼西人龎蒼鷹太原人俱有先知之鑒長為魏懐朔鎮將嘗見髙祖甚異之謂髙祖曰君有康世之才終不徒然也請以子孫為託興和中啓贈司空公子寧相府從事中郎天保初兼南中郎將蒼鷹交㳺豪侠厚待賔旅居於州城髙祖客其舍初居處於蝸牛廬中蒼鷹母數見廬上赤氣属天蒼鷹亦知髙祖有覇王之量每私加敬割其宅半以奉髙祖繇此遂蒙親識暴顯字思祖㓜時見一沙門指之曰此郎子好相表必為良將貴極人臣語終失僧莫知所去後累遷特進驃騎大將軍封定陽王燕子獻字季則廣漢下雒人少時相者謂之曰君使役在胡代富貴在齊趙其後遇宇文氏稱覇闗中用為典籖將命使於蠕蠕子獻欲驗相者之言来歸神武見之大悦尚淮陽公主甚被待遇官至侍中右僕射文襄時有吳士雙盲而妙於聲相文襄歴試之聞劉桃枝之聲曰有所繫屬然當大富貴王侯將相多死其手譬如鷹犬為人所使聞趙道徳之聲曰亦繫屬人富貴翕赫不及前人聞太原公之聲太原公即文宣帝初封郡也曰當為人主聞文襄之聲不動崔暹私搯之乃謬言亦國主也文襄以為我家羣奴猶當極貴况吾身也觧法選河内人少明相術鑒炤人物皆如其言頻為和士開相中士開牒為府叅軍皇甫玉善相人嘗㳺王侯家文宣既即位試玉相術故以帛巾袜其眼而使歴摸諸人至於文宣曰此是最大達官於任城王曰當至丞相於常山長廣二王常山長廣即孝昭武成二帝初封國也並曰亦貴而各私搯之至石動桶曰此弄癡人至供膳曰整得好飲食而已玉嘗為髙歸彦相曰位極人臣但莫反歸彦曰我何為反玉曰不然公有反骨玉謂其妻曰殿上者不過二年妻以告舍人斛斯慶妻慶以告帝帝怒召之玉每炤鏡自言當兵死及被召謂其妻曰我今去不廻若得過日午時或當得活既至正中遂斬之徐之才幼而儁發號為神童劉孝綽嘗云徐郎燕頷有班定逺之相後至左僕射崔冏字法峻幼好學汎覽經傳多伎藝尤工相術為鴻臚卿武平六年從駕在晉陽嘗語中書侍郎李徳林云此日看髙相王以下文武官人相表俱盡其事口不忍言惟第一人更應富貴當在他國不在朝吾亦不及見也其精妙如此後周閔帝初九嵗封畧陽郡公時有善相者史元華見帝退謂所親曰此公子有至貴之相但恨其夀不足以稱之爾辛昂字進君年數嵗便有成人志行有善相人者謂其父仲畧曰公家雖世載冠冕然名徳富貴莫有及此兒者仲畧亦重昂志氣深以為然後至驃騎將軍開府儀同三司李賢幼有志節不妄舉動嘗出㳺逢一老人鬢眉皓白謂曰我年八十觀士多矣未有如卿卿必為台牧努力勉之後至大將軍隋髙祖初仕後周為右小宗伯明帝嘗遣善相者來和視之和詭對曰不過作柱國爾既而隂謂髙祖曰公當為天下君必大誅殺而後定善記鄙言来和字𢎞順京兆長安人好相術所言多騐後周大冡宰宇文䕶引之左右繇是出入公卿之門髙祖㣲時来詣和相和待人去謂髙祖曰公當王有四海及為丞相拜儀同既受禪進爵為子開皇末和上表自陳曰臣早奉龍顔自周代天和三年已来數蒙陛下顧問當時具言至尊膺圗受命光宅區宇此乃天授非繇人事所及臣無勞效坐致五品二十餘年臣是何人敢不慚懼愚臣不任區區之至謹録陛下龍潜之時臣有所言一得書之秘府死無所恨昔陛下在周嘗與永富公竇榮定語臣曰我聞有行聲即識其人臣當時即言公眼如曙星無所不炤當王有天下願忍誅殺建徳四年五月周武帝在雲陽宫謂臣曰諸公皆汝所識隋公相禄何如臣報武帝曰隋公止是守節人可鎮一方若為將領陣無不破臣即於東宫靣奏聞陛下謂臣此語不忘明年烏丸軌言於武帝曰隋公非人臣帝尋以問臣臣知帝有疑臣詭報曰是節臣更無異相於時王誼梁彦先等知臣此語大象二年五月至尊從永巷東門入臣在永巷門東北靣立陛下問臣曰我得無災鄣不臣奏陛下曰骨法氣色相應天命已有付屬未幾遂總百揆上覽之大悦進位開府賜物五百段米三百石地十頃和同郡韓則嘗詣和相和謂曰後四五當得大官人初不知所謂洎至開皇十五年五月而終人問其故和曰十五年為三五加以五月為四五大官槨也和言皆此類著相經四十卷韋鼎善相術初為陳大府卿鼎嘗聘周與髙祖相遇鼎謂髙祖曰觀公容貎故非常人而神監深逺亦非羣賢所逮也不乆必大貴貴則天下一家嵗一周天老夫當委質公相不可言願深自愛及陳平帝馳召之授上儀同三司待遇甚厚時蘭陵公主寡帝為之求夫選親衛桺述及蕭瑒等以示鼎鼎曰瑒當封侯而無貴妻之相述亦通顯而守位不終帝曰位繇我爾遂以主降述述後除名卒年三十九煬帝為晉王時髙祖宻令善相者来和遍視諸子和曰晋王眉上雙骨隆起貴不可言牛𢎞初在襁褓有相者見之謂其父曰此兒當貴善愛養之𢎞後為僕射趙綽為大理少卿守法稱職髙祖每謂綽曰朕於卿無所愛惜但卿骨相不當貴爾仁壽中卒官時年六十三帝為之流涕宇文述年十一時有相者謂述曰公子善自愛後當位極人臣述後至左衛大將軍叅朝政李景初為馬軍總管配事漢王髙祖奇其壯武使袒而觀之曰卿相表當位極人臣齊王韋妃早卒遂與妃姊元氏婦通生一女外人皆不得知隂引喬令則於第内宴召相工遍視後庭相工指妃姊曰此産子者當為皇后貴不可言唐髙祖為譙隴刺史善相者史良言於髙祖曰公骨法非常必為人主至於命也非所敢知乆之良復遇髙祖乃大驚曰骨法如舊年夀之相頓異昔時勿忘鄙言願深自愛髙祖心益自負郭𢎞道初仕隋為尚食奉御時髙祖為殿内少監深善之𢎞道善相因言曰公天中伏犀下接於眉此非人臣之相願深自愛髙祖取𢎞道銀盆置之於地引弓射之謂𢎞道曰向言有驗當一發中之既發應弦而中𢎞道曰願令公事驗之日賜賞金盆髙祖大悦太宗初四嵗時忽有書生自言善相詣髙祖曰公是貴人有大貴子因目太宗曰龍虎之姿天日之表也公之貴以此兒後必繇之而創功業年將三十必能濟世安民矣髙祖聞其言甚懼及書生辭出使人捕欲殺之以滅口也而不知所在乙弗𢎞禮貝州髙唐人也隋煬帝居藩召令相已𢎞禮跪而賀曰大王骨法非常必為萬乗之主誠願戒之在得煬帝即位召天下道術人置坊以居之仍令𢎞禮統攝帝見海内漸亂𤣥象錯謬内懐憂恐嘗謂𢎞禮曰卿昔相朕其言已驗且占相道術朕頗自知卿更相朕終當何如𢎞禮逡廵不敢答帝廹之曰卿言與朕術不同罪當死𢎞禮曰臣本觀相書凡人之相有類於陛下者不得善終臣聞聖人不相故知凡聖不同爾自是帝遣使監之不得與人交言初泗州刺史薛大鼎隋時常坐事沒為奴貞觀初與數人詣𢎞禮相大鼎次至𢎞禮曰君奴也欲何所相咸曰何以知之𢎞禮曰觀其頭目直是賤人但不知餘處何如耳大鼎有慚色乃觧衣視之𢎞禮曰看君靣不異前言占君自腰以下當為方岳之任大鼎後歴五州刺史而卒其占相皆此類也貞觀末卒馬周為中書舍人岑文本謂人曰周鳶肩火色騰上必速恐不能乆爾未幾周卒袁天綱益州成都人尤工相術隋大業中為資官令武徳初蜀道使詹俊赤牒授火井令初天綱以大業元年至雒陽時杜淹王珪韋挺就之相天綱謂淹曰公蘭臺成就學堂寛博必得親紏察之官以文藻見知謂王曰公三亭成就天地相臨從今十年已外必得五品要職謂韋曰公靣似大獸之靣交友極誠必得士友擕接初為武職復語淹等二十年外終恐三賢同被責黜暫去即還淹尋遷侍御史武徳中為天策府兵曹文學館學士王珪為太子中允韋挺隋末與隠太子友善後太子引以為率至武徳六年俱配流嶲州淹等至益州見天綱曰袁公雒邑之言則信矣未知今日之後何如天綱曰公等骨法大勝徃時終當俱受榮貴至九年被召入京共造天綱謂杜曰公當即得三品要職年夀非天綱所知王韋兩公在後當得三品官兼有年夀然晚途皆不稱惬韋公尤甚淹至京拜御史大夫檢校吏部尚書王珪尋授侍中出為同州刺史韋挺歴御史大夫太常卿貶授象州刺史皆如天綱之言大業末竇軌客逰徳陽嘗求問天綱謂曰君額上伏犀貫玉枕輔角又成必於梁益州大樹功業武徳初軌為益州行臺僕射引天綱深禮之天綱又謂軌曰骨法成就不異往時之言然目氣赤脉貫瞳子語則赤氣浮靣如為將軍恐多殺人願深自戒慎武帝九年軌坐事被徵將赴京謂天綱曰更得何官曰靣上家人坐仍未見動輔角右畔光澤更有喜色至京必承恩還来此任其年果授益州都督武士彠之為利州也勅召天綱詣京師途經利州士彠使視其妻楊氏天綱曰夫人當生貴子乃盡召其子女視之見元慶元爽可至刺史終亦屯否見韓國夫人曰此女大貴不利其夫武后時襁褓衣男子之服乳母抱之而至天綱大驚令舉目瞻視又令提行而觀之曰此郎君龍睛鳳頸貴人之極也若是女後當為天下主矣貞觀八年太宗聞其名召至九成宫時中書舍人岑文本令視之天綱曰舍人學堂成就眉覆過目文才振於海内頭又生角猶未大成若得三品恐是損夀之徵文本官至中書令尋卒其年侍御史張行成馬周同問天綱曰馬侍御伏犀貫頂後有玉枕又背如負物當富貴不可言近古以来君臣道合罕有如公者公靣色赤命門色暗耳後骨不起耳無根只恐非夀者周後位至中書令兼吏部尚書年四十八卒謂行成曰公五岳四瀆成就下亭豐滿得官雖晚終居宰輔之地行成後至尚書右僕射天綱相人所中皆此類也申國公髙士亷嘗謂曰君更作何官天綱曰自知相命今年四月盡矣果至是月而卒髙智周少時與来濟郝處俊孫處約同遊寓於揚州江都人石仲覽傾産以待又嘗引相工觀濟等相工曰四人皆宰相也而石氏不及見焉然来早貴而末途屯躓髙晚達而最為夀耉夫速登者易顛徐達者少患天之道也仲覽貞觀末為兵部郎中卒後而濟等乃貴皆如相工所言劉仁軌初為陳倉尉相工袁天綱謂曰君終當位鄰台輔年將九十後果如其言後至文昌左相同鸞臺鳳閣三品蕭嵩初娶賀晦女與雒陽縣尉陸象先為僚壻時嵩尚未入仕宣州夏榮稱有相術謂象先曰陸郎十年内位極人臣然不及蕭郎一門盡貴官位髙而有夀時人未之許後果大貴嵩至太子太師象先至太子太保蔣子慎與鄉人髙智周善同詣善相者相者謂智周曰明公位極人臣𦙍嗣㣲弱蔣侯官禄至薄而子孫轉盛子慎後累年為建安尉卒其子繪来謁智周已貴矣曰吾與子父有故子復有才因以女妻之永淳中為緱氏尉鄭州司兵卒繪子挺舉進士開元中歴臺省仕至湖延二州刺史子貴贈揚州大都督挺子洌渙竝進士及第洌歴禮部戸部吏部三侍郎尚書左丞渙天寳末給事中永泰中右散騎常侍時髙氏誅滅已乆果符相者之言後唐周元豹燕人世為從事元豹少為僧其師有知人之鑒從逰十餘年盡悴無憚師知其可教遂傳其秘㫖既長還鄉歸俗盧程寄褐嘗逰於燕與同志數人謁焉元豹退謂鄉人張殷衮曰適二君子明年花發俱為故人唯彼道士他年甚貴来嵗二子果零落於趙魏間又二十年盧程登庸於鄴下後晉陽張承業信重之言事數中明宗時為内衙都指揮使承業俾帝易衣列於諸校之下以他人詐之曰此非也元豹指帝於末綴曰骨法非常此為内衙太保歟咸服其異或問帝之前程惟云末後為鎮州帥時懿皇后夏氏方事巾櫛時有悞㫖大犯檟楚元豹偶見之曰此人有藩侯夫人之位當生貴子赫怒因觧其言竟驗太原察判司馬揆不同舍留其居忽謂揆曰公五日之内奉使萬里未見回期揆數日後酒酣坐為衣領扼之而卒王都為定州節度臨戎數年惟以􅆭虐為務不敢竝語周元豹見之曰形若鯉魚難免刀几王安節少善賈得相術於奇士因事見末帝於私邸退謂人曰真北天王相也位當至天子終則莫我知也漢趙延夀少時有相者云此官豈止於是邪後必有兵甲大權位極列土人或詰云此人妍柔如女子安有大兵權乎俄遷盟津許田汴水宋城連帥宣徽使樞宻使兼領河陽清㤗中復為樞宻使周趙廷乂世為星官兼通三式而於袁許之鑒尤長於氣色清㤗末胡果通為司天監廷乂專待詔内廷嘗與樞宻學士吕琦同宿琦從容宻問國家運祚廷乂曰来年厄㑹之期俟過别論琦敦訊不已廷乂曰保邦在刑政保祚在福徳於刑政則術士不敢言奈際㑹諸公罕有福徳者下官竊有恤緯之憂尋而晉髙祖入雒翟光鄴權知永興軍膚革肥晳善於攝養趙廷乂謂人曰翟君外厚而内薄雖貴而無夀果如其言册府元龜卷八百六十
