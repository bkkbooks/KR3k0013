body:
  text: 冊府元龜卷六百九十五宋王欽若等撰牧守部刺舉屏盗折獄刺舉夫方伯之任民物是司必在當官而行臨事而斷不畏權倖靡私親暱糾發瑕釁考案是非使吏不能為姦民不受其弊政事明舉風威振肅共治之善於斯為要先民有言養禾者去其稂莠其斯之謂與漢盖寛饒為司隸校尉刺舉不可廻避魏相為揚州刺史考案郡國守相多所貶退何武為揚州刺史所舉奏二千石長吏必先露章服罪者為虧除免之而已虧減也減除其狀令免去也不服極法奏之抵罪又云二千石有罪應時舉奏其餘賢不肖敬之如一後漢郅夀為兾州刺史兾部屬郡多封諸王賔客放縱類不檢節夀案察之無所容貸乃使部從事専住王國又徙督郵舍王宫外動静失得即時騎驛言上奏王罪及劾傅相於是藩國畏懼並為遵節視事三年兾土肅清徐璆字孟玉為荆州刺史時董太后姊子張忠為南陽太守因勢放濫贓罪數億璆臨當之部太后遣中常侍以忠屬璆璆對曰臣身為國不敢聞命太后怒遽徴忠為司隸校尉以威相臨璆到州舉奏忠贓餘一億使冠軍縣上簿詣大司農以彰暴其事又奏五郡太守及屬縣有贓汙者悉徴案罪威風大行蘇章字孺文為兾州刺史故人為清河太守章行部案其姦贓乃請太守為設酒肴陳平生之好甚歡太守喜曰人皆有一天我獨有二天章曰今夕蘇孺文與故人飲者私恩也明日兾州刺史案事者公法也遂舉正其罪州境知章無私望風畏肅第五種為兖州刺史時中常侍單超兄子裔為濟隂太守負勢貪放種欲收舉未知所使㑹聞從事魏羽素抗直乃召羽具告之曰聞公不畏彊禦今欲相委以重事若之何對曰願庶幾於一割羽出遂馳到定陶閉門收裔賔客親吏四十餘人六七日中糾發其贓五六十萬種即奏裔并以劾超蔡衍為兾州刺史中常侍貝瑗託其弟恭舉茂才衍不受乃收齎書者案之又劾奏河間相曹鼎贓罪千萬鼎中常侍騰之弟騰使大將軍梁兾為書請之衍不答鼎竟坐輸作左校羊陟為兾州刺史奏案貪濁所在肅然陳翔字子鱗為揚州刺史舉奏豫章太守王永奏事中官吳郡太守徐參在職貪穢並徴詣廷尉參中常侍璜之弟繇此威名大振劉祐為揚州刺史時㑹稽太守梁旻大將軍兾之從弟也祐舉奏其罪旻坐徴王龔為青州刺史劾奏貪濁二千石數人安帝嘉之徴拜尚書趙戒為荆州刺史時梁襄弟譲為南陽太守恃椒房之寵不奉法戒到州劾奏之後戒為南陽太守糾豪傑恤吏人奏免中官貴戚子弟為令長貪濁者徴拜為尚書令种暠為益州刺史永昌太守冶鑄黄金為文虵以獻大將軍梁兾暠糾發追捕馳傳上言魏賈逵為豫州刺史是時天下初復州郡多不攝逵曰州夲以御史出監諸郡以六條詔書察長吏二千石以下故其狀皆言嚴能鷹揚有督察之才不言安静寛仁有愷悌之徳也今長吏慢法盜賊公行州知而不舉天下復何取正乎兵曹從事受前刺史假逵到官數月乃還考竟其二千石以下阿縱不如法者皆舉奏免之文帝曰逵真刺史矣布告天下當以豫州為法賜爵關内侯後魏辛術為東南道行臺尚書安州刺史時臨清太守盱眙蘄城二鎮將犯法術皆按奏殺之武昌悼王鍳為徐州刺史先是京兆王愉為徐州王既年少長史盧淵寛以馭下郡縣多不奉法鑒表曰梁郡太守程靈虬惟酒是躭貪財為事虐政殘民寇盜並起黷音悖響盈于道路郡境吁嗟僉焉怨酷梁郡密邇偽畿醜聲易布非直有㸃清風臣恐取嗤荒逺請免所居官以明刑憲詔免靈虬郡守徴還京師於是徐境肅然薛虎子為徐州刺史時沛郡太守邵安下邳太守張攀咸以贓汙虎子案之於法唐孔若思為衡州刺史先是諸州别駕皆以宗室為之不為刺史致敬繇是多行不法若思至州舉奏别駕李道欽罪犯請加鞫訊乃詔别駕於刺史致禮嗣曹王臯為温州長史攝行州事州人李鈞及弟鍔棄其親不養凡十餘年時鈞為殿中侍御史鍔為京兆法曹臯奏鈞鍔不孝皆除名勿齒栁公綽為山南東道節度觀察使司農少卿李彤前為鄧州刺史坐贓錢百餘萬仍自刻石紀功號為善政碑公綽以事聞貶吉州司馬同正屏盗夫養雞者不畜狸牧獸者不育豺樹木者憂其蠧保人者除其賊故古之為邦者著詰盜之制垂去惡之訓以惠保于小民也矧乃百城共治之攸重萬夫觀政之所屬寛猛為術􅆭舒云繫而能奮嫉惡之志竭刺姦之勞勇畧速成威信兼逹廣設科禁周深淵藪行反間之計開自新之路懸告捕之賞恕既往之罪傳檄敦諭殱厥兇渠厲兵掩擊滅其黨類或竄伏他境或悔歸夲業澄清所治震肅鄰部路有遺而莫顧商次野而如室其或饑民放僻獷俗貪殘無假滋章不煩血刄推心布惠令行禁止斯又堯舜之良吏也漢王温舒為廣平都尉擇郡中豪敢往吏十餘人為爪牙豪傑而性果敢一往而無所顧者以為吏也皆把其隂重罪而縱使督盜賊快其意所欲得此人雖有百罪弗法言其捕盜賊得其人而快温舒意者則不問其先所犯罪也法謂行法也即有避回夷之亦滅宗以故齊趙之郊盜不敢近廣平廣平聲為道不拾遺趙廣漢為潁川太守郡大姓原禇宗族横恣原禇二姓也賔客犯為盜賊前二千石莫能禽制廣漢既至數月誅原禇首惡郡中震慓龔遂為渤海太守先是左右郡嵗饑盜賊並起聞新太守至發兵以迎遂皆遣還移書勅屬縣悉罷逐捕盜賊吏諸持鉏鈎田器者皆為良民吏毋得問持兵者乃為賊遂單車獨行至府郡中翕然盜賊亦皆罷渤海又多劫掠相随聞遂教令即時解散棄其兵弩而持鉏鉤盜賊於是悉平嚴延年為涿郡太守時郡比得不能太守比頻也涿人畢野白等繇是廢亂大姓西髙氏東髙氏東西高氏各以其所居為號者自郡吏以下皆畏避之莫敢與牾牾逆也咸曰寜負二千石莫負豪大家賔客放為盜賊發輙入髙氏吏莫敢追浸浸日多道路張弓拔刄然後敢行其亂如此延年至遣掾蠡吾趙繡按髙氏得其死罪繡見延年新將謂郡守為郡將者以其兼領武事也心内懼即為兩劾欲先白其輕者觀延年意怒廼出其重劾延年已知其如此矣趙掾果白其輕者延年索懐中得重劾即收送獄夜入晨將至市論殺之先所按者死在前髙氏者死吏皆股栗更遣吏分考兩髙窮竟其姦誅殺各數十人郡中震恐道不拾遺三嵗遷河南太守賜黄金二十斤豪彊脅息野無行盜威震旁郡張敞為膠東相先是膠東盜賊起敞自請治之既辭之官又自請治劇郡非賞罰無以勸善懲惡吏追捕有功効者願得一切比三輔尤異一切權時也趙廣漢奏請令長安㳺徼獄史秩百石左馮翊有二百石卒史此之謂尤異也天子許之敞到膠東明設購賞開羣盜令相捕斬除罪吏追捕有功上名尚書調補縣令者數十人由是盜賊解散轉相捕斬吏民翕然國中遂平是時潁川太守黄覇以治行第一入守京兆尹覇視事數月不稱罷歸潁川於是制以膠東相敞守京兆尹自趙廣漢誅後比更守尹如覇等數人皆不稱職京師寖廢長安市偷盜尤多百賈苦之宣帝以問敞敞以為可禁敞既視事求問長安父老偷盜酋長數人居皆温厚出從童騎閭里以為長者敞皆召見責問因貰其罪把其宿負令致諸偷以自贖偷長曰今一旦召詣府恐諸偷驚駭願一切受署敞皆以為吏遣歸休置酒小偷悉来賀且飲醉偷長以赭汙其衣裾吏坐里閭閲出者汙赭輙收縛之一日捕得數百人窮治所犯或一人百餘發盡行法罰繇是枹皼稀鳴市無偷盜枹擊皼椎也天子嘉之後殺賊捕掾絮舜亡命數月兾州部中有大賊天子思敞功効使使者即家拜為兾州刺史敞起亡命復奉使典州既到部而廣川王國羣軰不道賊連發不得敞以耳目發起賊主名區處誅其渠帥廣川王姬昆弟及王同族宗室劉調等通行為之嚢橐言容止賊盜若嚢櫜之盛物也吏逐捕窮窘蹤迹皆入王宫敞自將郡國吏車數百兩圍守王宫搜索調等果得之殿屋重轑中轑椽也重轑重棼也重棼即今之廊舍也一邊虚為兩厦者也敞傳吏皆捕格斷頭言敞自監䕶吏而捕之縣其頭王宫門外因劾奏廣川王天子不忍致法削其户敞居部嵗餘兾州盜賊禁止王尊成帝時為京兆尹先是南山郡盜傰宗等數百人為吏民害拜故𢎞農太守傅剛為校尉將迹射士千人逐捕迹射言能尋迹而射取之也嵗餘不能禽或説大將軍王鳳賊數百人在轂下發軍擊之不能得難以視四夷獨選賢京兆尹乃可於是鳳薦尊為諌議大夫守京輔都尉行京兆尹事旬月間盜賊清息蕭育為大鴻臚以鄠名賊梁子政阻山為害久不伏辜名賊者自顯其名無所避匿言其強也育為右扶風數月盡誅子政等薛宣為臨淮太守政教大行㑹陳留郡有大賊廢亂徙為陳留太守盜賊禁止吏民敬其威信朱博為犍為太守先是南蠻若兒數為寇盜博厚結其昆弟使為反間襲殺之郡中清平後漢董宣為北海相坐殺人多濫左轉宣懐令後江夏有劇賊夏喜等寇亂郡境以宣為江夏太守到界移書曰朝廷以太守能禽姦賊故辱斯任今勒兵界首檄到幸思自安之宜喜等聞懼即時降散郭伋為漁陽太守漁陽既罹王莾之亂重以彭寵之敗民多猾惡寇賊充斥伋到示以信賞糾戮渠帥盜賊銷散魯恭為樂安相時東州多盜賊羣軰攻劫諸郡患之恭到重購賞開恩信其渠帥張漢等率支黨降恭上以漢補博昌尉其餘遂自相捕擊盡破平之州郡以安馬稜為濮陽太守坐事抵罪後數年江湖多劇賊以稜為丹陽太守稜發兵掩擊皆禽滅之第五種為髙密侯相永夀中徐兖二州盜賊羣軰髙密在二州之郊種乃大儲糧稸勤厲吏士賊聞皆憚之桴皼不鳴流民歸者嵗中至數千家度尚為泰山都尉寇賊望風奔亡及在長沙宿賊皆平張覇為㑹稽太守始到越賊未解郡界不寧乃移書開購明用信賞賊遂束手歸附不煩士卒之力童謡曰棄我㦸捐我矛盜賊盡吏皆休樊􅁮為天水太守道不拾遺行旅至夜聚衣裝道傍曰以付樊公陽球辟司徒劉寵府舉髙第九江山賊起連月不解三府上球有理姦才拜九江太守球到設方畧凶賊殄破收郡中姦吏盡殺之魏臧洪漢末為青州刺史洪在州二年羣盜奔走田豫為南陽太守時郡人侯音反聚數千人在山中為羣盜大為郡患前太守收其黨與五百餘人表奏皆當死豫到郡悉見諸繫囚慰喻開其自新之路一時破械遣之諸囚皆叩頭願自效即相告語羣賊一朝解散郡内清静具以狀上太祖善之晉周玘為吳興太守吳興寇亂之後百姓饑饉盜賊公行玘甚有威惠百姓敬愛之期月之間境内寕謐陶侃為武昌太守時天下饑荒山夷多斷水劫掠侃令諸將詐作商船以誘之劫果至生獲數人是西陽王羕之左右侃即遣兵逼羕令出向賊侃整陣於釣臺為後繼羕縳送帳下二十人侃斬之自是水陸肅清前秦苻融為司𨽻校尉及鎮關東所在賊盜止息路不拾遺宋劉鍾為髙陽内史領石頭戍事髙祖討司馬休之前軍將軍道憐留鎮東府領屯兵治亭羣盜數百夜襲鍾壘拒擊破之南齊虞欣祖為豫章王嶷中兵叅軍嶷為荆湘二州刺史時義陽劫帥張羣亡命積年鼓行為賊義陽武陵天門南平四界郡被其殘破沈攸之連討不能禽末乃首用之攸之起事羣從下郢於路先叛結砦于三溪依據深險嶷遣祖為義陽太守使降意誘納之厚為禮遺於坐斬首其黨數百人皆散四郡獲安王敬則為吳興太守郡舊多剽掠有十數嵗小兒於路取遺物殺之以狥自此道不拾遺郡無劫盜又錄得一偷召其親屬於前鞭之令偷身長掃街路久之乃令偷舉舊偷自代諸偷恐為其所緝皆逃走境内以清梁王珍國為桂陽内史捕討盜賊境内肅清蕭景為雍州刺史州内清肅縁漢水陸千餘里抄盜絶迹又為郢州刺史齊安晉陵郡接魏界多盗賊景移書告示魏即焚塢戍保境不復侵畧臧厥字獻卿為晉安太守郡居山海常結聚逋逃前二千石雖募討捕而寇盜不止厥下車宣風化凡諸凶皆襁負而出居民復業商旅流通謝覽為吳興太守郡境多劫為東道患覽下車肅然一境清謐檀和之為豫州刺史和之先厯始興太守交州刺史所在有威名盜賊屏迹每出獵猛獸伏不敢起陳王猛為晉陵太守威恵兼舉姦盜屏迹富商野次云以付王府君郡人歌之以比漢之趙廣漢徐儉為潯陽内史為政嚴明盜賊静息後魏莫題道武時為中山太守督司州之山東七郡事車駕征姚興次于晉陽而上黨羣盜秦頗丁零翟都等聚衆於壺關詔題帥衆三千以討之上黨太守捕頗斬之都走林慮詔題搜窮討盡平之李曽為趙郡太守令行禁止劫盜奔竄胡元嘉之薛裔為河北太守郡𢃄山海路多盜賊有韓馬兩姓各二千餘家恃強憑險㝡為狡害劫掠道路侵暴鄉閭裔至都之日即收其姦魁二十餘人一時戮之於是羣盜懾氣郡中清肅韓均為兾州刺史廣阿澤在定兾相三州之界土廣民稀多有盜賊乃置鎮以静之均在兾州劫盜止息夏侯道為西平將軍華州刺史轉安東將軍瀛州刺史為政清嚴善禁盜賊李安世為相州刺史初廣平人李波宗族強盛殘掠生民前刺史薛道標親往討之波率其宗族拒戰大破道標軍遂為逋逃之藪公私咸患百姓為之語曰李波小妹字雍容褰裙逐馬如卷蓬左射右射必疊雙婦女尚如此男子那可逢安世設方畧誘波及諸子姪三十餘人斬於鄴市境内肅然髙祐為西兖州刺史設禁賊之方令五户相保若盜發皆連坐初雖似煩碎後風化大行寇盜止息廣陽王嘉子深孝明初拜肆州刺史預行恩信胡人便之劫盜止息李崇為兖州刺史兖土舊多劫盜崇乃村置樓樓懸一皼盜發之處雙槌亂擊四面諸村始聞者撾皼一通次復聞者以二為節次後聞者以三為節各擊數千槌諸村聞皼皆守要路是以盜發俄頃之間聲布百里之外其中險要悉有伏人盜竊始發便爾擒送諸州置樓懸皼自崇始也崔休為渤海太守性嚴明雅長治體下車先戮豪猾數人廣布耳目所在姦盜莫不擒翦百姓畏之寇盜止息清身率下渤海大治崔延伯為荆州刺史荆州土險蠻左為寇每有結聚者延伯輙自討之莫不摧殄繇是穰土帖泰無敢為患辛纂為滎陽太守民有姜洛生康乞得者舊是太守鄭仲明左右豪猾偷竊境内為患纂伺捕擒獲梟於郡市百姓欣然李洪之為河内太守河内北連上黨南接武牢地險人悍數為劫害長吏不能禁洪之至郡嚴設科防募斬賊者便加重賞勤勸務本盜賊止息誅鉏姦黨過為酷虐北齊王峻為營州刺史營州地接邊城賊數為民害峻至州逺設斥候廣置疑兵每有賊發常出其不意要擊之賊不敢發合境獲安蘇瓊為南清河太守其郡多盜賊及瓊至民吏肅然姦盜止息或外境姦非輙從界中行過者無不捉送之宋世良為清河太守郡東南有曲隄成公一姓阻而居之羣盜多萃於此人為之語曰寕渡東吳㑹稽不厯成公曲隄世良施八條之制盜奔他境民又謡曰曲隄雖險賊何益但有宋公自屏迹後周泉企為東雍州刺史蜀人張國雋聚黨剽劫州郡不能制企命收而戮之闔境清肅李遷哲為直州刺史鎮白帝黔陽蠻田烏度田都唐等每抄掠江中為百姓患遷哲随機出討殺獲甚多由是諸蠻畏威各送糧餼又遣子弟入質者千有餘家遷哲乃於白帝城外築城以處之并置四鎮以静峡路自此寇盜頗息軍糧贍給韓褒為北雍州刺史州𢃄北山多有盜賊褒密訪之並豪右所為也而陽不之知厚加禮遇謂之曰刺史起自書生安知督盜所頼卿等共分其憂耳乃悉召桀黠少年素為鄉里患者署為主帥分其地界有盜發而不獲者以故縱論於是諸被署者莫不惶懼皆首伏曰前發者並某等為之所有徒侣皆列其姓名或亡命隠匿者亦悉言其所在褒乃取盜名簿蔵之因大牓州門曰自知行盜者可急来首即除其罪盡今月不首者顯戮其身籍没妻子以賞前首者旬日之間諸盜咸悉首盡褒取名簿校之一無差異並原其罪許以自新繇是羣盜屏息宇文貴為益州刺史蜀人多劫盜貴乃召任侠傑徤者署為㳺軍令其督捕繇是頗息隋元景山為亳州總管先是州民王廻洛張季貞等聚結亡命每為劫盜前後牧守不能制景山下車逐捕之廻洛季貞挺身奔江南擒其黨數百人皆斬之法令明肅盜賊屏迹稱為大治隂世師為武賁郎將遼東之役出襄平道明年帝復擊髙麗以夲官為涿郡留守於時盜賊蜂起世師逐捕之往往尅㨗及帝還大加賞勞楊子崇為離石太守時百姓饑饉相聚為盜子崇前後捕斬數千人河間王宏為蒲州刺史得以便宜從事時河東多盜賊民不得安宏奏為盜者百餘人投之邊裔州境帖然號為良吏麥鐵杖為汝南太守稍習法令羣盜屏迹唐吕子臧仕隋為南陽郡丞性剛直有幹用討擊羣賊往往克勝諸郡多荒殘南陽殷實子臧之力也楚王靈龜為魏州刺史為政嚴肅姦盜屏絶左難當太宗貞觀初為江州刺史時以江中盜賊劫掠為商旅之害詔以難當為静江大使自是江路肅清李栖筠代宗時為常州刺史時草賊帥張度因荒饉聚徒於陽羡西山且地接宣城逼之則烏散坡谷緩之則公行寇掠累嵗為四境之患莫能翦除栖筠既至部設權畧不踰時而覆其巢穴度子六七人一朝伏辜繇是郡界無犬吠之虞而人知敬讓吕元膺憲宗元和中為東都防禦使時淄青節度使李師道置邸於河南府兵諜雜以往来吏不敢辨因吳元濟北犯郊畿多警防禦兵盡戍伊闕師道潜以兵數千百人内其邸謀焚宫闕而肆殺掠既烹牛饗衆矣明日將出㑹有卒楊進李再興者謁元膺告急變元膺始自伊闕追兵圍之半日無敢進攻者防禦判官王荗元殺一人而進或有毁其墉而入者賊衆突出殺數人圍兵奔駭賊得結伍中衢内其妻子於􅌩槖以甲胄殿而行防禦兵羅觀其後不敢追賊出長夏門殺行人而奪其馬轉掠郊墅濟伊水乃望山而逸元膺誡境上兵重購以捕之數日有山棚鬻鹿於市賊遇而奪之山棚走而徴其黨或引官軍共圍之谷中盡獲之窮驗得其魁中岳寺僧曰圓净年八十餘甞為史思明將偉悍過人初執之使巨力者奮鎚折其脛不能折圓净罵曰鼠子折人脚猶不能敢稱徤兒乎乃自置其足使折之如其教乃折臨誅乃曰誤我事不得使洛城流血死者凡數千人留守防禦將二人都亭驛卒五人甘水驛卒三人皆潜受其職而為之耳目自始謀及將敗無知者初師道多買田於伊闕陸渾之間凡十餘處故以舍山棚而衣食之訾嘉珍門察者潜布分之以屬圓净圓净以師道錢千萬偽理嵩山之佛光寺期以嘉珍竊發時舉火於山中集二縣山棚入作亂及窮按之嘉珍門察皆稱賊武元衡者也元膺密檻聞以送之蘇良嗣為雍州長史時京城人相食盜賊縱横良嗣為政嚴肅盜發三日内無不擒獲逺近稱為神明崔郾為岳鄂安黄等州觀察使江湖之間萑蒲是聚因造䝉衝小艦上下千里期月而盡獲羣盜梁蔡從訓開平末權知汝州刺史殺山賊誅其首領李䖍後唐竇廷琬同光初為復州逰奕使姦盜屏迹晉孫彦韜初仕後唐為濮陽刺史屬清泰末羣盜入郡郡人大擾彦韜率帳下百人一呼破之陸思鐸為深州刺史羣盜結聚與屬邑為患思鐸率數十騎朝夕討捕出必擒獲境内肅然百姓頼之周李榖漢末為工部侍郎權知開封府以中牟多盜誘縣人求其淵藪有劉徳餘者梁時累攝簿尉於畿甸德餘時閒居中牟宗正之劉繼儒與之有舊因見而問曰髙祖踐祚四方羣盜屏息何國門之外惟中牟為患德餘素幹事謂繼儒曰如朝廷要捕賊假僕攝主簿或鎮時可勦絶矣繼儒登時言於榖榖納其言尋版署攝主簿僅旬日榖請侍衛兵數十騎付徳餘悉擒其黨一人縣佐吏一人役御史臺為其首也索其家得金寳犀玉𢃄羅錦衣服頗多積年兄弟為賊自是中牟無道路之患王晏為徐州節度使晏滕人少以無頼攻剽為吏所搜索乃從軍洎為節將于故里徐方多盜前後帥守不能禁詰晏下車悉召故時僚友與之衣服鞍馬謂之曰吾鄉有多盜之名後来者應出諸君之下為我召集徧諭之當我鎮撫時各宜禁戢由是自晏撫封閭井晏然枹皼之音頓息折獄吕刑有折獄之文秋官有弊訟之義非夫明智絶俗臨事不惑又安能察㣲隐而辯疑似以厭乎人心者哉自炎漢而下修舉吏職親民之重濟以法術繇是按察捕劾著績尤異若乃詰作折惑申寃訊盜斷之以經義聼之以辭氣濟之以識畧叅之以竒譎靡待兩造之備克申片言之敏寘於憲法畏若神明斯固簡孚閱實之可尚也漢雋不疑昭帝時為京兆尹時有一男子自稱衛太子詔公卿將軍中二千石雜視不疑到叱從吏收縛或曰是非未可知且安之不疑曰諸君何患於衛太子昔蒯瞶違命出奔輒拒而不納春秋是之蒯瞶衛靈公太子輒蒯瞶子也蒯瞶得罪于靈公而出奔晉及靈公卒使輒嗣位而晉趙鞅納蒯瞶于戚欲求入衛魯哀公三年春齊國夏衛石曼姑帥師圍戚公羊傳曰曼姑受命于靈公而立輒曼姑之義固可以距蒯瞶也輒之義可以立乎曰可其子奈何不以父命辭王父命也衛太子得罪先帝亡不即死今来自詣此罪人也遂送詔獄天子與大將軍霍光聞而嘉之曰公卿大臣當用經術明於大誼由是名聲重於朝廷在位者皆自以不及也魏國淵為魏郡太守時有投書誹謗者太祖疾之欲必知其主淵請留其本書而不宣露其書多引二京賦淵勅功曹曰此郡既大今在都輦而少學問者其簡開解年少欲遣就師功曹差三人臨遣引見訓以所學未及二京賦博物之書也世人忽畧少有其師可求能讀者從受之又密喻㫖旬日得能讀者遂往受業吏因請使作箋比方其書與投書人同手收攝案問具得情理胡質為東筦太守士盧顯為人所殺質曰此士無讎而有少妻所以死乎悉見其比居年少書吏李若見問而色動遂窮詰情狀若即自首罪人斯得孫禮為兾州牧太傅司馬宣王謂禮曰今清河平原争界八年更二刺史靡能决之虞芮待文王而了宜善令分明禮曰訟者據墟墓為驗聼者以先老為正而老者不可加以夏楚又墟墓或遷就髙敞或徙避仇讎如今所云雖臯陶猶將為難若欲使必也無訟當以烈祖初封平原時圖决之何必推古問故以益辭訟昔成王以桐葉封叔虞周公便以封之今圖蔵在天府便可于坐上斷也豈待到州乎宣王曰是也當别下圖禮到案圖宜屬平原而曹爽信清河言下書云圖不可用當叅異同禮上疏曰管仲伯者之佐其器又小猶能奪伯氏駢邑使没齒無怨言臣受牧伯之任奉聖朝明圖騐地著之界界實以王翁河為限而鄃以馬丹侯為騐詐以鳴犢河為界假虚訟訴疑誤臺閣竊聞衆口鑠金浮石沈木三人成市虎慈母投其杼今二郡争界八年一朝决之者緣有解書圖畫可得尋按擿校也平原在兩河向東上其間有爵隄爵隄在髙唐西南所争地在髙唐西北相去二十餘里可為長歎息流涕者也案解與圖奏而鄃不受詔此臣軟弱不勝其任臣亦何顔尸祿素餐輒束𢃄著履駕車待放爽見禮奏大怒劾禮怨望結刑五嵗在家期年衆人多以為言除城門校尉前秦符融為司隸校尉京兆人董豐㳺學三年而返過宿妻家是夜妻為賊所殺妻兄疑豐殺之送豐有司豐不堪楚掠誣引殺妻融察而疑之曰汝行往還頗有怪異及卜筮與否豐曰初將發夜夢乗馬南渡水返而北渡復自北而南馬停水中鞭之不去俯而視之見兩日在于水下馬左白而濕右黒而燥寤而心悸竊以為不祥還之夜夢如初問之筮者云憂訟獄逺三枕避三沐既至妻為具沐夜授豐枕豐記筮者之言皆不從之妻乃自沐枕枕而寢融曰吾知之矣周易坎為水馬為離夢乗馬南渡旋北而南從坎之離三爻同變變而成離離為中女坎為中男兩日二夫之象坎為執法吏吏詰其夫婦人被流血而死坎二隂一陽離二陽一隂相承易位離下坎上既濟文王遇之囚羑里有禮而生無禮而死馬左而濕濕水也左水右馬馮字也兩日昌字也其馮昌殺之乎於是推驗獲昌而詰之昌具首服曰本與其妻謀殺董豐期以新沐枕枕為騐是以誤中婦人又在兾州有老母遇劫於路母揚聲唱盜行人為母逐之既擒劫者返誣行人為盜時日垂暮母及路人莫知孰是乃俱送之融見笑曰此易知耳可二人並走先出鳳陽門者非盜既而還入融正色謂後出者曰汝真是盜何以誣人其發姦摘伏皆此類也後魏司馬恱字慶宗為豫州刺史有汝南上蔡董毛奴者齎錢五千死在道路郡縣疑民張隄為劫又於隄家得錢五千隄懼拷掠自誣言殺獄既至州恱觀色察言疑其不實引見毛奴兄靈之謂曰殺人取錢當時狼狽應有所遺此賊竟遺何物靈之云惟得一刀鞘而已恱取鞘視之曰此非里巷所為也乃召州城刀匠示之有郭門者前曰此刀鞘門手所作去嵗賣與郭民董及祖恱收及祖詰之曰汝何故殺人取錢而遺其刀鞘及祖引靈之又於及祖身上得毛奴所着皂􅃭及祖伏法恱之察獄多此類也宋世良為清河太守陽平郡移掩劫盜三十餘人世良訊其情狀惟送十二人餘皆放之陽平太守魏明朗大怒云輙放吾賊及推問送者皆實放者皆非明朗大服辛祥為并州平北府司馬有白壁還兵樂道顯被誣為賊官屬推處咸以為然祥曰道顯面有悲色察獄以色其此之謂乎苦執申之月餘别獲真賊栁崇為河北太守初留郡郡民張明失馬疑十餘人崇見之不問賊事人别借以温顔更問其親老存否農桑多少而微察其辭色即獲真賊吕穆等二人餘皆放遣郡中畏服境内帖然李崇為揚州刺史先是夀春縣人茍泰有子三嵗遇賊亡失數年不知所在後見在同縣人趙奉伯家泰以狀告各言已子並有鄰證郡縣不能斷崇曰此易知耳令二父與兒各在别處禁經數旬然後遣人告之曰君兒遇患向已暴死有教解禁可出奔哀也茍泰聞即號咷悲不自勝奉伯咨嗟而已殊無痛意崇察知之乃以兒還泰詰奉伯詐狀奉伯乃欵引云先亡一子故妄認之又定州流人解慶賔兄弟坐事俱徙揚州弟思安背役亡歸慶賓懼後役追責規絶名貫乃認城外死尸詐稱其弟為人所殺迎歸殯葬頗類思安見者莫辯又有女巫楊氏自云見鬼説思安被害之苦饑渴之意慶賓又誣疑同軍兵蘇顯甫李盖等所殺經州訟之二人不勝楚毒各自欵引獄將決矣崇疑而停之密遣二人非州内所識者偽從外来詣慶賓告曰僕住在州北去此三百里有一人見過寄宿夜中共語疑其有異便即詰問迹其繇緒乃云是流兵背役逃走姓解字思安時欲送官苦見求及稱有兄慶賓今住揚州相國城内嫂姓徐君脱矜愍為往報若見申委曲家兄聞此必重相報所有資財當不愛惜今但見質若往不獲送官何晚是故相造指申此意君欲見顧幾何當放賢弟若其不信可見随㸔之慶賓悵然失色求其少停當備財物此人具以報崇崇攝慶賓問曰爾弟逃亡何故妄認他尸慶賓引伏更問盖等乃云自誣數日之間思安亦為人縳送崇召女巫視之鞭笞一百崇斷獄精審皆此類也李惠為雍州刺史人有負鹽負薪者同釋重擔息於樹隂二人將行争一羊皮各言藉背之物惠遣争者出顧州綱紀曰以此羊皮拷知主乎羣下以為戲言咸無應者惠令人置羊皮席上以杖擊之見少鹽屑曰得其實矣使争者視之負薪者乃伏而就罪凡所察䆒多如此類繇是吏民莫敢欺犯北齊任城王湝為并州刺史有婦人臨汾水浣衣有乗馬人換其新靴而去婦人持故靴詣州言之湝召城外諸嫗以靴示之紿曰有乗馬人於路被賊劫害遺此靴焉得無親屬乎一嫗撫膺哭曰兒昨着此靴向妻家如其語捕獲一時稱明察彭城王浟為滄州刺史有一人從幽州来驢䭾鹿脯至滄州界脚痛行遲偶㑹一人為伴盜驢及脯去明旦告州浟乃令左右及府僚吏分市鹿脯不限其價其主見識之推獲盜者轉都督定州刺史時有人被盜黒牛背上有白毛長史韋道建謂中從事魏道勝曰使君在滄州擒姦如神若捉得此定神也浟乃詐為上府市牛皮倍酬價直使牛主認之因獲其盜建等歎服又有老母姓王孤獨種菜三畆數被偷浟乃令人密往書菜葉為字明日市中㸔菜葉有字獲賊爾後境内無盜政化為當時第一蘇瓊為南清河太守初零陵縣民魏雙成失牛疑其村人魏子賓送至郡一經窮問知子賓非盜者即便放之雙成訴云府君放賊去百姓牛何處可得瓊不理其語密遣訪獲盜者從此畜牧不收多放散云但付府君有鄰郡富人將財物寄置界内曰我物已寄蘇公矣遂去平原郡有妖賊劉黒狗搆結徒侣通於滄海所部人連接村居無相染累鄰邑於此服其徳後為左丞行徐州事徐州城中五級寺忽被盜銅像一百區有司徴撿四鄰防宿及蹤迹所疑逮繫數十人瓊一時放遣寺僧怨訴不為推賊瓊遣僧謝曰但且還寺得像自送爾後十日抄賊姓名及贓處所徑收掩悉獲實騐賊徒欵引道路歎伏後周栁慶初仕後魏為雍州别駕有賈人持金二十斤詣京師交易寄人停止每欲出行常自執管鑰無何緘閉不異而失之謂是主人所竊詣縣訊問主人遂自誣服慶聞而歎之乃召問賈人曰卿鑰常置何處對曰常自𢃄之慶曰頗與人同宿乎曰無曰與人同飲乎曰向者曽與一沙門再度酣宴醉而晝寢慶曰主人特以痛自誣非盜也彼沙門乃真盜耳即遣吏逮捕沙門乃懐金逃匿後捕得盡獲所失之金又有胡家被劫郡縣按察莫知賊所鄰近被囚繫者甚多慶以賊徒既衆似是烏合既非舊交必相疑阻可以詐求之乃作匿名書多牓官門曰我等共劫胡家徒侣混雜終恐泄露今欲首懼不免誅若聼先首免罪便欲来告慶乃復施免罪之牓居二日廣陽王欣家奴面縛自告牓下因此推窮盡獲黨與慶之守正明察皆此類也每歎曰昔于公斷獄無私闢髙門可以待封倘斯言有騐吾其庶幾乎于仲文為安固太守有任氏杜家各失牛後得牛兩家俱認州郡久不能决益州長史韓伯㒞曰于安固少聰察可令決之仲文曰此易解耳於是令二家各驅牛至郡乃放所認者遂同任氏羣牛又隂使人微傷其牛任氏嗟怨杜家自若仲文於是詞詰杜氏杜氏服罪而去隋元褒為原州總管有商人為賊所劫其人疑同宿者而執之褒察其色寃而辭正遂捨之其盜尋發于他所韋鼎為光州刺史有人客逰通主家之妾及其還去妾盜珍物於夜逃去尋于草中為人所殺主家知與客通因告客殺之縣司鞫問具得姦狀因斷客死獄成上於鼎鼎覽之曰此客實姦而殺非也乃某寺僧詃妾盜物令奴殺之贓在某處即放此客遣人掩僧并獲贓物自是部内肅然不犯咸稱其有神道不拾遺晉張希崇鎮汾州日有民與郭氏為義子自孩提以至成人因愎戾不受訓遣之郭氏夫婦相次俱死郭氏有嫡子已長時郭氏諸親與義子相約云親子欲分其財助而訟之前後數政不能理遂成疑獄希崇覧其訴斷云父在已離母死不至止稱假子孤二十年撫養之恩倘曰親兒犯三千條悖逆之罪頗為傷害名教復敢理認田園其生涯並付血裔所訟人與朋姦者委法官以律定刑聞者服其明冊府元龜卷六百九十五
