body:
  text: 冊府元龜卷七百八十七宋王欽若等撰總錄部德行德苞五常之性冠四科之首在醜則為君子立敎則為人師者其唯德也歟故卷懐自守雖幽蔀而靡欺忠信以行於蠻貊而何間其大也喻神靈之變化其達也為朝野之規矩見之者既欣而且慕親之者不孤而有隣若乃就其深居蔚為仁里讓之高位發於言歎屈王公而盡禮來州將之致恭其有當叔世遷訛暴亂橫起處廣澤而自若得衆力之全讓或惡子望風而引避或小人聞言而改操爭訟繇之取決禮讓為之興行豈辭小官自成德化長㓜咸服薰灼彌廣雖復考終長逝義形嗟泣飾終之禮曲盡繇衷至有身輕鴻毛願贖其死孟軻所謂以德服人者斯之謂歟老子者楚苦縣厲鄉曲里人姓李名耳字伯陽周守藏室之史也孔子適周將問禮於老子老子曰子所言者其人與骨已朽矣獨其言在耳且君子得其時則駕不得其時則蓬累而行吾聞之良賈深藏若虚君子盛德容貌若愚去子之驕氣與多欲態色與滛志是皆無益於子之身吾所以告子若是而已孔子去謂弟子曰鳥吾知其能飛魚吾知其能㳺獸吾知其能走走者可以為網㳺者可以為綸飛者可以為矰至於龍吾不能知其乘風雲而上天吾今日見老子其猶龍耶孔子魯大夫也於鄕黨恂恂如也似不能言者恂恂温恭之貌其在宗廟朝廷便便言為謹爾便便辯也雖辯而謹敬朝與下大夫言侃侃如也侃侃和樂之貌顔回字子淵孔子弟子孔子曰自吾有回門人益親回為孔子胥附之有能使門人日親曾子曰以能問於不能以多問於寡有若無實若虛犯而不校校報也言見侵而不報昔者吾友嘗從事於斯矣友謂顔淵漢嚴尊字君平蜀人卜筮於成都市以為卜筮者賤業而可以惠人有邪惡非正之問則依蓍龜為言利害與人子言依於孝與人弟言依於順與人臣言依於忠為因埶道之以善從吾言者已過半矣揚雄少時從㳺學已而仕京師顯名數為朝廷在位賢者稱君平德季強為益州牧喜謂揚雄曰吾真得嚴君平矣及至蜀改禮與相見卒不敢言以為從事後漢卓茂南陽宛人性寛仁恭愛鄕黨故舊雖行能與茂不同皆愛慕欣欣焉後終於太傅周黨字伯况太原廣武人勑身修志州里稱其高行王莽竊位託疾杜門自後賊暴縱横殘㓕郡縣唯至廣武過城不入建武中徵為議郎以病去職荀恁太原廣武人隱居山澤以求厥志王莽末匈奴冦其本縣廣武聞恁名節相約不入荀氏閭夏恭梁國蒙人王莽末盜賊縱横攻没郡縣恭以恩信為衆所附擁兵固守獨獲安全光武即位召拜郎中遷太山都尉樊宏南陽湖陽人王莽末與宗家親屬作營塹自守老弱歸之者千餘家時赤睂賊掠唐子郷多所殘殺欲前攻宏營宏遣人持牛酒米穀勞于赤睂赤睂長老先聞宏仁厚皆稱曰樊君素善且今見待如此何心攻之引兵而去遂免冦難逢萌字子康北海都昌人居瑯琊勞山養志修道人皆化其德北海太守素聞其高遣吏奉謁致禮萌不答太守懐恨而使捕之吏叩頭曰子康大賢天下共聞所在之處人敬如父往必不獲祗自毁辱太守怒收之繫獄更發他吏行至勞山人果相率以兵弩捍禦吏被傷流血奔而還蔡衍汝南項人以禮讓化郷里有争訟者輙詣衍決之其所平處皆曰無怨宗慈字孝初南陽安衆人為修武令棄官徵拜議郎未致道疾卒南陽郡士皆重其義行孟嘗會稽上虞人為合浦太守病自上被徵隱處窮澤身自耕傭隣縣士民慕其德就居止者百餘家陳實潁川人為太邱長在鄕閭平心率物其有爭訟輒求判正曉譬曲直退無怨者至及嘆曰寧為刑罰所加不為陳君所短實卒大將軍何進遣使弔祭海内赴者三萬餘人制衰麻者以百數司馬均字少賓安貧好學隱居敎授不應辟命信誠行乎州里郷人有所計争輒令呪賓不直者終無敢言爰延字季平陳留外黃人為鄕嗇夫仁化大行人但聞嗇夫不知郡縣鄭𤣥北海高宻人自徐州還高宻道遇黃巾賊數萬人見𤣥皆拜相約不敢入縣境後為大司農任旐字子旟博昌人以至行稱黃巾賊起天下飢荒人民相食冦到博昌聞旐姓字乃相謂曰宿聞任子旟天下賢人也今雖作賊那可入其鄕耶遂相帥而去繇是聲聞遠近許劭字子將汝南平輿人為郡功曹太守徐㻛甚敬之府中聞子將為吏莫不改操飾行同郡袁紹公族豪俠去濮陽令歸車徒甚衆將入郡界乃謝遣賔客曰吾輿服豈可使許子將見遂以單車歸家孔嵩字仲山為新野縣阿里長正身厲行街中子弟皆服其訓化遂辟公府之京師道宿下亭盜共竊其馬尋問知其嵩也乃相責曰孔仲山善士豈宜侵盜乎於是送馬謝之王扶少脩節行客居瑯琊不其縣所止聚落化其德徐穉豫章南昌人異行矯時俗閭里服其德化有失物者縣以相還道無拾遺太守請署功曹後舉有道家拜太原太守並不就蘇純字桓公扶風平陵人性強切而持毁譽士友咸憚之至乃相謂曰見蘇桓公患其敎責人不見又思之三輔號為大人大人長老之稱言尊事之也後官至南陽太守孫期濟隂成武人少為諸生習京氏易古文尚書遠人從其學者皆執經壟畔以追之里落化其仁讓黃巾賊起過期里陌相約不犯孫先生舍桓曄字文林沛郡人也議郎鸞之子避地會稽浮海客交阯越人化其節至閭里不爭訟仕為郡功曹王孫瑞毎三公缺楊彪皇甫嵩皆讓位於瑞後官至僕射劉虞東海郯人為幽州刺史以疾歸家時鄉曲有所訴訟不以詣吏自投虞以情理為之論判皆小大敬從不以為恨王烈字彦方太原人少師事陳實以義行稱鄕里有盜牛者主得之盜請罪曰刑戮是甘乞不使王彦方知也烈聞而使人謝之遺布一端或問其故烈曰盜懼吾聞其過是有恥惡之心既有恥惡必能改善故以此激之後有老父遺劍於路行道一人見而守之至暮老父還尋得劍因而問其姓名以事告烈烈使推求之乃先盜牛者也諸有爭訟曲直將質之於烈或至塗而反或望廬而還其以德感人若此察孝亷三府並辟皆不就會董卓作亂避地遼東躬秉農器編於四民布衣蔬食不改其樂東域之人奉之若君時衰世弊識真者少朋黨之人互相讒謗自避世在東國者多為人所害烈居之厯年未嘗有患使遼東強不凌弱衆不暴寡商賈之人市不二價曹公累徴不至龎德公襄陽人諸葛孔明毎至其家獨拜牀下德公初不令止荆州刺史劉表數延請不能屈後携妻子登鹿門山採藥不返魏徐裔漢末盜賊縱橫敬裔禮行轉相約勑不犯其閭管寧漢末避地遼東民化其德左右無鬭訟之聲禮讓移於海表與人子言敎以孝與人弟言訓以悌言及人臣誨以忠貌甚順觀其行邈然若不可及即之熙熙然甚柔而温因其事而寧之於善是以漸之者無不化焉寧之亡天下知與不知聞之無不嗟嘆醇德之所感若此不亦至乎後詔書徵不起而卒胡昭潁川人轉居陸渾山信行著於鄕黨百姓聞馬超叛避兵入山者千餘家飢乏漸相刼掠昭嘗遜辭以解之於是冦難消息衆咸宗焉故其所居部落中三百里無相侵暴者蜀向朗為諸葛亮丞相長史免官歸成都開門接賔誘納後進講論古義不干時事以是見稱上自執政下及童冠皆敬重焉楊儀兄慮字威方少有德行為江南冠冕州郡禮召諸公辟請皆不能屈年十七天郷人宗貴號曰德行楊君為諸葛亮丞相長史中軍師朱冲字巨容南安人居近夷俗羌戎奉之若君冲亦以禮讓為訓邑里化之路不拾遺村無凶人毒􅆉猛獸皆不為害晉蔡克陳留考城人博渉書記為邦族所敬性公亮守正行不合已雖富貴不交也高平劉整恃才縱誕服飾詭異無所拘忌嘗行造人遇克在坐整終席慙不自安克時為處士而見憚如此束晳陽平元城人為趙王倫記室罷歸敎授門徒年四十卒元城市里為之廢業門生故人立碑墓側華表為太常以光祿大夫致仕表性淸淡嘗慮天下退理司徒李裔司𨽻王宻等嘗稱曰若此人者不可得而貴不可得而賤不可得而親不可得而踈賀循為元帝軍諮祭酒有淸德伏於一時廷尉張闓住在小市將奪左右近宅以廣其居乃私作都門早閉晏開人多患之訟於州府皆不見省會循出至破岡連名詣循質之循曰見張廷尉當為言及之闓聞而遂毁其門詣循致謝其為世所敬服如此宋張進之永嘉安固人少有志思行義聞於鄉里時刼掠充斥毎入村抄暴至進之村輙相約靳不得侵犯其信義所感如此厯郡五官主簿范叔孫吳郡錢塘人少而仁厚固窮濟急郷里貴其義行莫有呼其名者除竟陵王國中軍將軍不就南齊何伯璵廬江人與弟㓜璵俱厲節操誨人不倦鄕里呼為人師郡守下車莫不修謁梁嚴植之性謹厚不以所長高人又仁慈好隂德雖在闇室未嘗怠也官至中撫軍記室㕘軍兼五經博士陳虞寄會稽餘姚人為建安王諮議以疾加大中大夫及謝病私庭毎諸王為州將下車必造門致禮命釋鞭板以几杖侍坐嘗出逰近寺閭里轉相告語老㓜羅列望拜道左或言誓為約者但指寄便不欺其至行所感如此馬樞扶風􅔛人博極經史尤善佛經少屬亂離毎居之處盜賊不入依託者常數百家文帝以度支尚書徵不起後魏呂顯字明東平壽張人性亷直郷人分爭者皆就而質焉北齊李元忠趙郡伯大夫也後魏孝明時盜賊􅉕起淸河有五百人西戍還經南趙趙郡以路梗共投元忠奉絹千疋元忠唯受一匹殺五羊以食之遣奴為導曰若逢賊但道李元忠遣送奴如其言賊皆捨避終於驃騎大將軍開府儀同三司隋李士謙趙州平棘人仕魏為廣平王府㕘軍自以少孤未嘗飲酒食肉口無殺害之言隋有天下畢志不仕開皇八年終於家時年六十六趙郡士女聞者莫不流淚曰我曹不死而令李㕘軍死乎會𦵏者萬餘人鄉人李景伯等以士謙道著邱園條其狀詣尚書省請先生之諡事寢不行遂相與樹碑於墓徐孝肅汲郡人宗族數千家多以豪侈相尚肅性儉約事親以孝聞雖在㓜齒宗族間毎有爭訟皆至肅所平論之為肅所短者無不引咎而退後母卒負土成墳廬於墓所四十餘載而卒張文詡江東人毎以德化人鄕黨移風俗閒居而卒年四十而鄉人立碑號張先生焉柳儉河東解人也少有局量立行淸苦為州里所敬雖至親昵無敢狎侮官至上大將軍唐張元素蒲州虞鄕人隋末為景城縣户曹竇建德攻陷景城元素被執將戮縣民千餘人號泣請代其命曰此人淸慎殺之乃無天地大王將定天下當深加禮接以招四方如何殺之使善人解體建德遽命釋之楊綰華州華陰人素以德行著或造之者淸談終日未嘗及名利或有客欲以世務干者見綰言必元遠不敢發辭内愧而退位至中書侍郎平章事陽城字亢宗隱河東條山下遠近慕其德行來學者相繼於道閭里有爭者不詣官府詣城以決之終於道州刺史甄濟字孟成中山無極人隱居衞縣靑巖山環山之人服其操行約不畋漁採訪使表薦為范陽節度掌書記行夫孔門四科德行為首是知行者人倫之本衆善之源故君子立身行道造次不違乘之以端方守之以淳固仁近之矣乃有能降其志不茍於得必以中慮匪以利回靡息曲木之陰罔取非義之給盛衰一致死生等節至於千里赴弔於知已皓首罔渝於締交繇是白圭無玷闇室不欺敦厚之風行於鄕里徽音之美播於簡書士之所為良足尚矣孔子絶四毋意以道為度故不任意毋必用之則行舍之則藏故無專必毋固無可無不可故無固行毋我述古而不自作處群而不自異唯是之從故不有其身顔回字子淵閔損字子騫冉耕字伯牛冉雍字仲弓孔子皆以為有德子路有聞未之能行唯恐有聞前所聞未及行故恐後有聞不得並行柳下惠少連降志辱身言中倫行中慮其斯而已矣但能言應倫理行應思慮如此而已後漢淳于恭初遭賊冦百姓莫事農桑恭嘗獨力耕田鄕人止之曰時方淆亂死生未分何空自苦為恭曰縱我不得它人何傷墾耨不輟後至侍中騎都尉承宫嘗出行得虎所殺鹿持歸肉分門下取皮上師不受宮因棄之人問其故宮曰既已與人義不可復取後至侍中祭酒張湛字子孝右扶風人以篤行純淑鄕里歸德雖居幽闇自整頓三輔以為儀表為大中大夫徐穉公府辟皆不就人有死喪負笈赴弔嘗於家豫炙雞一隻以兩緜絮漬酒中暴乾以裹雞徑到所赴冡􅎬外以水漬緜使有酒氣斗米飯白茅為藉以雞置前醊酒畢留謁則去不見喪主穉嘗為太尉黃瓊所辟不就及瓊卒歸𦵏穉乃負糧徒歩到江夏赴之設雞酒薄祭哭畢而去不告姓名魏袁奥行足以厲俗言約而理當終於光祿勲任嘏㓜號神童及漢末荒亂家貧賣魚會官稅魚魚貴數倍嘏取直如常又與人共買生口各雇八疋後生口家來贖時價直六十疋共買者欲隨時價取贖嘏自取本價八疋共買者慙亦退還取本價吳陳表少知名與諸葛恪顧譚張休等並侍東宫皆其親友尚書暨豔亦與表善後豔遇罪時人咸自營䕶信厚言薄表獨不然士以此重之表俄徙太子中庶子拜翼正都尉晉羊祜妻夏侯覇之女及覇之降蜀也姻親多告絶祜獨安其室恩禮有加焉徵拜中書侍郎劉實少貧寠杖策徒行毎所憇止不累主人薪水之事皆自營給後至太常宋阮長之為散騎侍郎在中書省直夜徃隣省誤著履出閣依事自列門下門下以闇夜人不知不受列長之固遣送之曰一生不悔闇室郭世道察孝亷不就少有學行仁厚之風行於鄕里隣村大小莫有呼其名者嘗與人共於山陰市貨物誤得一千錢當時不覺分背方悟請其伴以求此錢追還本主伴大笑不答世道以巳錢充數送還之錢主驚嘆以半直與世道世道委之而去朱百年會稽山陰人也少有高情親亡服闋攜妻孔氏入會稽南山伐樵採藥為業以樵藥置道頭輙為行人所取明旦又復如此人稍恠之積久方知是朱隱士所賣隨其所取多少留錢取樵藥而去南齊崔慰祖為始安王刑獄㕘軍賣宅四十五萬買者云寧有減不答曰誠慙韓伯休何容二價買者又曰君但賣四十六萬一萬見與慰祖曰是即同君欺人豈是我心乎虞悰為正員常侍率性敦實與人知識必相存訪親疎皆有終始世以此稱之徐伯珍徵辟不就舉動有禮過曲木之下趨而避之辛普明兄將𦵏隣人嘉其義賻助甚多普明初受後皆反之贈者甚恠普明曰本以兄墓不周故不逆來意今何忍死者餘物以為家財周山圖為黃門郎與人周旋皆白首不異梁甄彬有行業鄕黨稱善嘗以一束苧就州長沙寺庫質錢後贖苧還於苧束中得五兩金以手巾裹之彬得送還寺庫道人驚云近有人以此金質錢時有事不得舉而失檀越乃能見還輙以金半仰酬往復十餘彬堅然不受因詠曰五月披羊裘而負薪豈拾遺金者耶卒還金何遠東海郯人為東陽太守免歸還輕財好義周人之急言不虚妄葢天性也遠無戲言嘗語人云卿能得我一妄語則謝卿以一縑衆共伺之不能記也陳歐陽頠為廣州刺史征南將軍初交州刺史袁曇緩宻以金五百兩寄頠令以百兩還合浦太守龔為四百兩付兒智矩餘人弗之知也頠尋為肅勃所破資財並盡唯所寄金獨在曇緩亦尋卒至是頠並依信還之時人莫不嘆服其重然諾如此殷不佞為散騎常侍兼尚書右丞不佞事寡嫂張氏甚謹所得祿俸不入私室後魏崔降宗為大將軍府長史仁信待物出以至誠故見重於世也辛穆字叔宗舉茂才為雍州别駕初隨父在下邳與彭城陳敬文友善敬文弟敬武少為沙門從師遠學經久不反敬文病臨卒以雜綾二十疋寄穆與敬武穆久訪不得經二十餘年始於雒陽見敬武以物還之封題如故世稱其亷信趙柔少以德行知名為河内太守柔嘗在路得人所遺金珠一貫價直數百縑柔呼主還之後有人遺柔鏵數百枚與子善明鬻之於市有人從柔買素絹二十疋有商人知其賤與柔三十疋善明欲取之柔曰與人交易一言便定豈可以利動心也遂與之搢紳之流聞而敬服鹿悆嘗詣徐州馬疲附船而至大梁夜睡從者上岸竊禾四束以飼其馬船行數里悆覺問得禾之處從者以告悆大忿即停船上岸至取禾處以縑三丈置禾束下而反後至梁州刺史趙琰天水人皇興中京師儉婢簡粟糶之琰遇見切責勑留輕粃嘗送子應冀州聘室從者於路遇得一羊行三里而琰知之令送於本處又遇路傍主人設羊羮琰訪知盜殺卒辭而不食遣人買耜刃得利六百即令送還刃主刃主高之義而不受琰命委之而去後至淮南王府長史後周冦雋性亷恕不以財利為心家人曾賣物與人而剩得絹五疋雋於後知之乃曰惡木之陰不可暫息盜泉之水無容誤飲得財失行吾所不取也遂訪主還之其雅志如此後至驃騎將軍開府儀同三司隋張處威為謁者大夫攝江都贊治嘗在途見一遺嚢恐其主永失因令左右負之而後數日物主來認悉以付之趙軌開皇初為齊州别駕其東鄰有桑椹落其家軌遣人悉拾還其主誡其諸子曰吾非此求名意者非機杼之物不願侵人汝等宜以為誡為原州總管司馬在道夜行其左右馬逸入田中暴人禾軌駐馬待明訪禾主酬直而去原州人吏聞之莫不改操唐于邵為太子賔客性孝悌内行修潔老而彌篤武儒衡字庭碩才度俊偉氣直貌莊言不妄發與人交友終始不渝班肅長慶元年自前坊州刺史為司封員外郎時宰臣上言曰將欲淸風俗必在厚人倫竊見皇甫鎛權位盛時班行之中多所親附及得罪後議論立變憎嫉如讎俗之衰薄一至於此唯班肅以曾為郎官判度支案始終如一獨送出城周行之間多美其事今郡秩已罷望授一省官以表其行故有是拜後唐趙光逢為司空平章事以疾辭授司徒致仕嘗有女冠寄黃金一鎰於其室家併屬離亂女冠委化於他土後二十年金無所歸納於河南尹張全義請付諸宮觀其舊封尚在冊府元龜卷七百八十七
