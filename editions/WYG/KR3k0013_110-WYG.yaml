body:
  text: 册府元龜卷一百十宋王欽若等撰帝王部宴享第二唐髙宗永徽三年二月甲辰宴三品于百福殿帝舉酒極歡賜以錦綵各有差甲寅京城百姓以嵗旱帝避正寢撤膳遂降甘雨相率宴樂兼奏倡優百戲帝御安福門樓以觀之五年四月癸巳宴文武羣官及麟遊縣老人於𤣥武門賜物各有差九月乙亥御丹霄殿臨觀三品以上行大射禮丙子賜五品以上射帝升永光門樓以觀之顯慶元年正月己卯宴文武羣官及朝集使蕃客京城老人八十以上賜物各有差二年二月幸雒陽宫癸亥御貞觀殿宴従行文武官及雒州父老宗姓等賜物各有差五年二月幸并州丙戌宴從官及諸親并州官屬父老等奏九部樂極歡而罷賜帛有差十二月辛未校獵于長社之安樂川丙子詔侍臣及蕃客夜讌帝賦詩以紀講習之事龍朔元年九月勅中書門下五品以上諸司長官尚書省侍郎并諸親三等以上並詣沛王宅設宴禮奏九部樂禮畢賜帛雜綵各有差麟徳元年八月丙子帝自萬年宫還便幸舊宅丁丑宴羣臣賜物有差乾封元年正月戊辰朔有事于泰山壬申禮畢御朝覲壇受朝賀癸酉帝謂羣臣曰升中大禮不行来數千載近代帝王雖稱封禪其間事有不同或謂求仙克禋或以廵逰望拜皆非崇祖業近在隋朝䘮亂最甚老小填溝壑少壯染兵鋒髙祖發自晉陽撥亂反正先朝躬擐甲胄贊成大業掃除氛祲廓清區宇遂得四海宅心萬邦仰化朕丕承寳歴十有七年終日孜孜夙夜無怠屬國家無事天下太平華夷乂安逺近敦睦所以躬親展禮褒贊先烈情在歸功固非為己遂得上應天心下允人望今大禮既成深以為慰公等休戚是同故應共此慶欲與公等飲讌盡歡各宜在外更衣即来相見乃勅所司撤幄帳施御牀三品以上升壇四品以下列坐壇下縦酒設樂羣臣及諸岳牧競来上夀起舞日晏方止四月甲辰帝至京師先謁太廟是日御景雲閣宴羣臣設九部樂頒賜綵各有差總章元年十月癸丑文武官獻食賀破髙麗帝御𤣥武門之觀徳殿宴百官設九部樂極歡而罷賜帛各有差咸亨元年十一月壬戌帝親于殿前宴京城父老有不能行者仍許子弟扶至殿庭宣勅謂之曰朕雖居九重之内常以萬姓為心而誠不動天遂使隂陽錯謬自従去嵗闗中旱儉禾稼不收多有乏絶百姓不足責在朕躬每自思此深以為愧今雒口倉廪且復充實更為轉運於是艱辛理有便宜所以行也故召卿等為宴别耳仍節級賜物及黄袍等以遣之三年六月甲寅御冷泉宫亭子召許敬宗臯男生及東西臺三品舉酒作樂四年七月庚午皇太子新宫成帝親送太子入宫五品以上及諸親並従宴㑹奏樂極歡而止賜物有差上元元年九月辛亥百官俱新服上禮帝御麟徳殿之景雲閣以宴羣臣儀鳳三年七月丁巳宴百寮及諸親於九成宫之咸亨殿帝謂霍王元軌等曰去冬無雪今春少雨昨五月避暑此宫甘雨屢降夏麥豐熟秋稼滋榮又得李敬𤣥表奏吐蕃已入龍支張䖍朂率領驍勇與其交戰一日兩陣賊俱敗走奔趨數百里虜獲極多又太史先奏七月朔太陽合虧而日竟不食此是上天垂祐宗社降靈豈在虗薄所能致此又以男輪最小特所留愛比来與選新婦多不稱情近納劉延景女觀其極有孝行不失婦容復是私衷一喜思共叔等同為此歡宜各盡情相勸樂酒飲酣帝賦詩作栢梁體曰屏欲除奢政返淳皇太子曰叨恩監守戀晨昏霍王元軌曰聖徳無為同混元相王輪曰長歡膝下鎮承恩右僕射戴至徳曰天皇萬福振長源黄門侍郎來常曰䇿蹇叨榮青𤨏門中書侍郎薛元超曰鵷池濫職奉王言自餘羣臣以次繼作日晏而罷賜綵物有差調露二年正月乙酉御雒城南門樓引諸王及三品以上并諸州都督刺史登樓賜宴太常奏新造六合還淳之舞日晏而罷四月癸酉九𤣥殿㑹文武百寮謂曰匈奴為患侵鎬及方方地名自秦漢以来即有此弊我國家拓定四海尚虧事大之禮貞觀之始猶自執迷所以命將出師頻有摧殄遂使土分瓦觧君臣面縛未忍殱殄許以自新五十年間俱稱臣妾自去冬以来忽相扇動潛行合聚逺事交結遂殺戮百姓侵損邊陲故遣裴行儉等聊申薄伐軍威暫舉兵不血刅應時破潰欵伏軍門朕自聞以来情甚歡慰故廣召百官以申讌喜王公卿士想同兹慶中宗神龍元年四月壬子宴房州父老於雒城南門各賜勲一級帛十五段己巳宴皇親及皇后内外諸親於武成殿賜物有差景龍二年十一月辛巳以安樂公主出降宴羣臣于兩儀殿十二月丙申宴堅昆使于兩儀殿三年正月乙亥宴侍臣及近親於梨園亭八月乙巳幸安樂公主山池宴従官賜繒帛有差四年正月乙丑宴吐蕃使于苑内毬塲命駙馬都尉楊慎交與吐蕃使打毬帝率侍臣觀之四月丁亥帝遊櫻桃園引中書門下五品以上諸司長官學士等入芳林園置酒為樂乙未張樂於隆慶池泛舟戲象宴羣臣仍命賦詩睿宗景雲二年正月乙卯宴吐蕃使賜物有差九月丁酉宴吐蕃使於承慶殿十一月戊子御承天門宴突厥可汗男楊我支特勒太極元年正月乙未朔御安福門宴突厥可汗男楊我支特勒延和元年七月庚申御安福門宴羣公卿士設太常九部樂帝夜觀樂焉𤣥宗先天元年八月己酉吐蕃遣使朝賀帝宴蕃使於武徳殿設太常四部樂于庭九月乙亥太上皇御安福門賜羣公卿士射二年九月庚辰宴王公百寮于承天門開元元年十二月丁酉以吐蕃遣其大臣來求和命有司引吐蕃使宴于三殿二年二月癸丑宴突厥使及新羅王子于朝堂以旱廢樂十月庚辰宴新羅使于内殿勅宰臣及四品以上諸官預焉七年二月壬申朝集使還本任命有司布饌宴羣臣於庭賜帛有差三月壬辰勅百官三月三日宜准常式賜射壬子御丹鳳樓宴九姓同羅及契丹各賜物一百段小妻主友三十段八年正月丙寅以皇太子加元服宴百官於太極殿十一月己巳御丹鳳樓宴九姓蕃安等設九部樂九年三月戊午宴朝集使賜帛有差四月戊辰御丹鳳樓宴平胡節將王晙郭知運王智方髙崇謝知信等四品以上清官及供奉官陪宴十二月甲午宴朝集使賜物各有差十年正月乙巳御含元殿宴羣臣賜帛各有差十一年五月丙戌命有司㑹羣臣宴突厥使暾泥熟於都城南門十二年三月庚午宴朝集使于紫宸殿賜帛有差十四年十一月己丑幸寧王憲宅與諸王宴探韻賦詩帝詩曰魯衞情先重親賢愛轉多冕旈豐暇日乗景暫經過戚里申髙宴平臺奏雅歌復尋為善樂方驗保山河十五年四月丙午涼州都督王君㚟破吐蕃凱旋詔置食朝堂宴之及將士等並賜物有差帝謂君㚟及將士等曰吐蕃小醜敢懐逆命輙窺亭障以逞凶狂卿等智勇夙彰軍威克振纔整旗鼓屢剪渠魁深入寇庭當甚勞耳五月丁丑是日端午宴羣臣于武成殿各賜衣一襲帝親自賦詩曰端午臨中夏時清日復良鹽梅已佐鼎麴糵且傳觴事古人留迹年深縷續長當軒知槿茂向水覺蘆香億兆同歸夀羣公共保昌忠貞如不替貽厥後昆芳特賜宰臣季元紘及兵部尚書蕭嵩金章紫綬以寵之十一月庚子御含元殿宴羣臣賜帛有差十六年十一月丙午御含元殿宴羣臣賜帛有差十七年八月癸亥帝降誕之日大置酒張樂宴百寮於花萼樓十八年三月命侍臣及百寮每旬暇日尋勝地讌樂仍賜錢令所司供帳造食四月丁卯侍臣以下讌于春明門外寧王憲之園池帝御花萼樓邀其廻騎更令坐飲逓起為舞班賜有差十九年二月丁亥詔曰百靈降福庻君叶心隂陽調而生植以滋政理孚而黎獻咸若由庚知萬物之樂華黍洽三農之慶信可以率禮輔仁式歌且舞者矣况生成式序氤氲致和卉物發榮池籞含麗思順時令以申恵澤咸宜邀歡芳月繼賞春風夙夜在公既同咸一之理休沐式宴俾共昇平之樂中書門下及供奉官嗣主郡王左右丞相少傅賓客諸司三品以上長官侍郎郎官少監少卿少匠司業少尹兩縣令都水使者朝集使上佐以上并雜處未赴任者及東宫諸司長官中舍中允少詹事諭徳中郎率蕃官三品以上至春末以來毎置暇日宜准去年正月二十九日勅賜錢造食任逐勝賞二十年二月壬辰許百寮於城東闗亭子尋勝因置檢校尋勝以厚其事文官三品以上及兩省供奉官侍郎中丞御史咸預焉四月乙亥讌百寮于上陽東州醉者賜以衾褥肩舁以歸相屬于路五月丁卯召河北立功將士於朝堂謂之曰天地無逺四夷奔走而来庭山川無幽百神肸蠁而奉職斯皆上𤣥啓佐宗廟威靈肆予一人肅將明命而已乃者林胡小醜敢兹不恭爰命師徒掃除邊祲卿等屬當武旅之寄得奮才畧之雄取如拾遺月獻三㨗雖天誅則爾亦卿等力焉今屬旋師聊申宴勞應有官賞已勅所繇敘定之日朕將親覧必有當功之賞用増乗輿之氣且宜坐食兼賜卿等少物食訖領取二十一年八月詔曰大射展禮先王創儀雖沿革或殊而遵習無曠往有陳奏遂従廢寢永監大典無忘舊章將射侯以觀徳豈愛羊以去禮緬惟古訓罔不率繇自我而闕何以示後其三九射禮宜依舊遵行以今年九月九日賜射於安福門樓下時京官五品以上乃預其㑹二十三年七月戊寅以藉田禮畢大置酒於應天門以㑹百官八月丁亥帝降誕之日御花蕚樓宴羣臣御製千秋節詩序時小旱是日大㴻雨百官咸上表賀九月辛巳宴朝集使於朝堂賜物有差二十四年二月甲寅宴新授縣令於朝堂八月壬子千秋節帝御廣達樓宴羣臣奏九部樂内出舞人䋲伎頒賜有差制曰自古風俗所傳嵗時相樂亦各有事大小在人朕生于仲秋厥日惟五遂為嘉節慶感誠深今屬時和氣清年榖漸熟中外無事朝野大安不因此時何云宴喜卿等即宜坐飲相與盡歡又召京兆父老等宴之勅曰今兹節日榖稼有成頃年以来不及今嵗百姓既足朕實多歡故於此時與父老同宴自朝及野福慶同之並宜坐食食訖樂飲兼賜少物宴訖領取甲寅以突騎施遣大酋領胡禄達于來求和許之宴于内殿賜錦衣一副帛一百放還蕃二十五年正月壬午制曰百司每旬節休假並不須親職事任追勝為樂宣示中外知朕意焉己丑以望日命有司於勤政樓前樹燈宴羣臣於樓下八月丁未千秋節宴羣臣於勤政樓下二十六年三月己巳賜朝集使五品以上錢三十萬任追勝為樂是年正月帝親迎氣東郊詔曰今朝廷無事天下和平美景良辰任百官追勝為樂十月庚戌停朝叅命百官於尚書省宴朝集使二十八年正月壬寅以望日御花蕚樓宴羣臣命有司樹燈于樓前㑹大雪而罷因勅當以二月望日燒燈八月己未以降誕日御花蕚樓宴羣臣賜帛有差天寳元年正月甲寅命有司宴女國王及佛逰國于曲江令宰臣以下同宴十月庚辰御花蕚樓宴蕃客放還蕃三載三月勅中書門下及兩省五品以上并三品以下正貟長官諸司侍郎御史中丞於鴻臚亭子祖錢朝集使及范陽節度使安禄山四載正月勅今月十四十五十六日宜令中書門下及兩省供奉官諸司文官四品以上郎官御史節度採訪使等並於花蕚樓下宴五載正月勅今月十四十五十六日宜令中書門下及兩省供奉官文官四品以上武官三品以上正貟並御史中丞嗣王郡王郎官御史節度使並於花蕚樓下叅宴不須入朝十載正月詔曰百辟叶心交修皇極所以天降休命寳祚維新今郊廟精禋大禮克舉萬方無事九有忻心屬獻歲芳春上元望日既當行慶之序式廣在鎬之恩自今後非惟旬休及節假百官等曹務無事之後任追逰宴樂十三載三月丙午御躍龍殿門張樂宴羣臣賜物有差極歡而罷十四載三月庚申許常叅官追勝宴樂百官因上表曰伏奉恩勅令臣等三月以来分日入朝逐便尋勝伏以聖政和平景光韶麗道風淳被朝野歡娱陛下均恵澤而不遺俾簮纓而共賞因其無事許以番休草木加春沉翔益暢生成之徳報効何階復以宫闕増修子来云就軍麾告㨗飲至初行臣等無汗馬之勞空霑分器懐賀鷰之志敢効獻芹伏請進錢一千貫文以充宴樂願接順陽之慶得伸就日之懇許之丙寅御勤政樓宴羣臣帝賦詩效栢梁體羣臣畢和八月辛卯天長節御勤政樓宴羣臣肅宗乾元元年二月戊戌宴迴紇使于紫宸殿前八月甲辰天長節太上皇於金明樓宴百官賜綵五百疋二年三月甲申迴紇王子骨咄特勒宰相帝徳等十五人自相州奔于西京帝宴之于紫宸殿賞物有差八月壬戌十姓突騎施黒姓可汗阿多裴羅等並波斯進物使李摩自及寧逺國使葛等来朝並宴於内殿九月丙寅帝降誕日宴百官於宣政殿前賜絹三千疋十二月戊申宴蕃胡拓翔於三殿各賜物三十段代宗寳應元年六月丁巳以突厥奴刺部落千餘人内屬請討賊自効宴奴刺大酋領于内殿賜物有差七月辛卯宴六軍將于内殿賜物有差八月己丑奚及契丹來朝宴于三殿丁巳宴宰臣及師保常侍給舎中丞六尚書左右丞侍郎諸司長官等于延英殿賜物有差九月戊寅宴郭子儀等諸將于延英殿賜物有差丙申迥紇可汗舉國兵馬至太原遣使奉表請助王師討平殘寇是日引其使宴于延英殿賜物有差廣徳二年十一月戊午公卿率錢於哥舒翰宅宴慰副元帥郭子儀特給太常音樂永泰元年正月辛亥宴宰臣及兩省五品以上御史臺五品以上尚書省四品以上等官及諸司長官於延英殿大歴二年三月丙戌郭子儀至自河中府癸卯許宰臣元載王縉及左僕射裴冕戸部侍郎判度支第五琦京兆尹黎幹各出錢三十萬宴郭子儀于子儀私第内侍魚朝恩叅其㑹焉朝恩出錦三十段綵羅五十疋綵綾一百疋為子儀纒頭之費極歡而罷舊俗賞歌舞人以綵置之頭上謂之纒頭三月甲戌内侍魚朝恩請於春明門外私第宴宰臣僕射舊相節度使度支京兆等許之乙亥郭子儀請宴宰臣等于私第許之戊寅汴宋節度使田神功請宴宰臣于私第許之時子儀等以寇難漸平蹈舞王化乃置酒連宴酒酣皆起舞出良馬寳鞍錦羅綾綵等為纒頭之費上自宰臣公卿及中官髙品凡列坐者百餘人下及伶人皆獲享賚子儀朝恩神功或費至十萬貫者己夘宴吐蕃使于禮賔院八月癸未御三殿宴李抱玉杜鴻漸及河南江淮轉運使劉晏荆南節度衛伯玉等賜物有差三年二月戊子宴闗内河東副元帥郭子儀鳳翔澤潞節度使李抱玉及邠寧節度使馬璘等五月戊午宴劍南陳鄭神䇿將士三千五百人於三殿賜物有差丙寅御紫宸殿宴新羅迴紇使十二月丁巳宴宰臣及諸道節度使於内殿賜物有差四年十月丁巳宴吐蕃尚悉摩等八人於紫宸殿五年六月辛丑宴宰臣節度使六尚書御史大夫京兆尹於内殿賜物有差六年正月己卯宴宰臣及節度使六尚書御史大夫京兆尹判度支戸部侍郎於内殿賜物有差十一月宴文單國王婆彌等二十五人于三殿八年十一月戊午宴宰臣郭子儀李抱玉王縉元載及僕射裴遵慶侯希逸御史大夫李栖筠吏部尚書劉晏渭北節度使臧希讓神䇿軍兵馬使王駕鶴京兆尹杜濟於延英殿賜物有差閏十一月癸亥宴宰臣及節度使轉運使御史大夫京兆尹判度支戸部侍郎于内殿賜錦綵金銀器物各有差九年四月辛巳宴宰臣及諸節度使轉運使御史大夫京兆尹判度支戸部侍郎及勲舊大臣于内殿賜物有差七月辛酉宴吐蕃使于内殿十年八月乙亥宴宰臣及御史大夫節度使轉運使判度支户部侍郎京兆尹於三殿賜物各有差十三年正月甲戌帝御三殿宴宰臣及節度使轉運使判度支戸部侍郎京兆尹等賜物有差二月庚辰帝御三殿宴侍臣五品以上御史臺五品以上尚書省四品以上及節度觀察在城判官等并宰臣勲臣弟兄等並赴㑹凡三日連宴錫賚極於豐厚十四年二月壬辰帝御三殿宴宰臣及兩省供奉官并文武百寮賜物有差癸巳又御三殿宴至徳以來勲臣子弟及藩邸舊臣子弟賜物有差順時令廣恩也徳宗興元元年七月壬午車駕自興元至京師帝即還宫每間日宴勲臣於麟徳殿必親閲酒饌盛陳音樂極歡而罷其所領賜李晟首之渾瑊次之諸宰臣及節將又次之所以褒元功崇秩序也貞元元年二月寒食節命昭義節度使李抱真山南西道節度使嚴振與神䇿金吾六軍使擊鞠于内殿賜物各有差四年二月戊戌帝御麟徳殿觀宰臣李晟馬燧及諸將㑹鞠李泌辭以不能請記籌従之頒賜有差辛丑帝以寒食假滿内鞠㑹未畢是日特賜百官假一日三月甲寅宴百寮於麟徳殿設九部樂及内出舞馬帝製序及詩以賜羣臣於是給御筆仍命屬和頒賜各有差至徳以來軍事務殷宴賜殆絶大歴末唯宴兩省供奉官及諸司三品官而已朝臣不周及焉至是常叅官及二王後皇室従曽祖以下親異姓諸親勲臣節將子孫悉集焉四月御𤣥英門宴六軍及神䇿神威諸將頒賜有差五月賜宴東蠻鬼王驃傍苴夢衝苴鳥星等於麟徳殿賜物各有差九月詔曰内外卿士左右朕躬朝夕公門勤勞衆務今方隅無事蒸庶小康其晦日上已重陽三節任擇勝地追賞每節仍賜宰相及常叅官錢五百貫翰林學士一百貫左右神威神䇿十軍共一千貫金吾英武威逺及諸衞將軍共二百貫客省奏事官一百貫委度支節前五日分付永為常例六年二月戊辰朔中和節宴百寮於曲江亭帝賦詩賜之三月庚子百僚宴於曲江亭帝賦詩以賜之己酉帝以寒食與宰臣及北諸軍將軍擊鞠於麟徳殿頒賜各有差四月帝曰朕頃以四方不寧宵衣旰食百寮亦遑遑無暇今兵革漸息夏麥又登朝官有暇日逰宴者令京兆尹不須聞奏八年正月詔三節宴集先已賜諸衞將軍錢其部率以下可賜錢百千八月詔曰屬者春秋令節朝野多歡乃與公侯庶寮俾同宴賞今西河吳楚連被水災悼于厥心實未寧息尚軫愛念豈遑偷樂其九日宴㑹宜罷九年二月庚戌朔初以中和節賜宴錢給百寮先是宰相以曲江合宴陳設供辦為府縣之弊請分給是錢令諸司㑹于他所従之自是訖于貞元三節公宴悉分矣九月以贈太師李晟薨日近罷九日宴㑹十年九月十日以重陽宴賜百寮追賞初九日以雨罷宴及是方㑹宴帝賦詩以賜百官十一年三月上已賜宰臣及兩省供奉官宴于曲江九月癸卯賜中書門下及兩省供奉官宴于曲江帝賦詩以賜百寮百寮畢和十二月戊辰臈帝畋于苑中上戒多殺行三驅之禮軍士無不知感畢事幸左神䇿軍勞軍饗士而還十二年二月己卯寒食節帝御麟徳殿之東亭觀武臣及勲戚子弟㑹毬兼賜宰臣醼饌于宰臣位後施畫屏風圗漢魏名相仍紀其嘉言美行題之于下宰臣各賜錦綵百疋銀瓶盤各一具其従官直省各有差十三年二月丁巳朔賜宰臣及兩省供奉官宴于曲江又寒食賜宰臣宴于麟徳殿前觀㑹毬各賜錦綵瓶盤等九月重陽節賜宰臣及兩省供奉官宴于曲江賜中書門下及百寮詩十四年正月帝謂宰臣等曰文武之士列在朝序熙我庶績勤效用彰今屬勾芒應時萬物生育朕在中和之節欲于麟徳殿宴㑹羣寮所冀君臣相歡式昭在鎬之義宰臣等奏曰八表清寧天下無事中和令節時屬上春萬國歡心咸同此日陛下俯降恩㫖欲宴朝臣天光下臨曲示慈恵臣等不勝慶忭之至二月壬子朔以雨雪不克宴㑹改俟他日戊午帝御麟徳殿賜文武百寮宴樂於東西廂初奏破陣樂舞帝自製中和樂是日奏之又奏九部樂及禁中歌舞妓者十數人布列于庭樂飲極歡日晏方罷賜宰臣錦綵各二百疋加瓶盤等餘各有差帝製中春麟徳殿㑹百寮觀新樂詩仍令皇太子書以示百寮九月重陽節以襄陽節度樊澤卒廢朝其百官宴享宜改取十一日十五年正月詔罷今年中和宴㑹以旱故也二月詔罷今年三月三日宴九月詔罷今年重陽日宴㑹是日吳少誠逆徒圍許州十六年正月詔罷今年中和節宴㑹二月詔罷今年三月三日宴㑹九月壬寅駙馬都尉郭曖卒罷九日宴㑹十七年二月朔賜羣臣㑹宴於曲江亭帝命中使薛盈珍賜詩三月上已賜羣臣㑹宴于曲江九月重陽賜羣臣㑹宴于曲江十八年二月朔賜羣臣㑹宴于延康里故馬璘池亭三月上已賜宰臣及兩省官㑹宴于故馬璘池亭九月重陽節賜宰臣及中書門下兩省官㑹於故馬璘池亭御製豐年多慶九日書懐詩以賜羣臣十九年二月朔賜宰臣兩省供奉官㑹宴于馬璘池亭三月上已賜中書門下及兩省供奉官㑹宴于馬璘池亭二十年二月朔罷中和宴歲儉故也九月九日賜中書門下及兩省供奉官㑹宴于馬璘池亭册府元龜卷一百十
