body:
  text: 册府元龜卷六百八十宋王欽若等撰牧守部静理推誠静理夫古人之為政者曷嘗不崇清静以致治資簡易以成化故老氏著𤣥黙之教仲尼垂耻格之訓盖斯民三代之所以直道而行也豈可挾術而致擾哉漢室而下良牧相繼乃有推寛大之志布仁厚之徳宣流愷悌敦修禮讓專務通恕悉蠲煩苛或反已而自思獄訟以止或責成而委任曹事咸舉物安其所民愛其賜斯足以為循吏之稱首矣漢曹參初為齊相使者召參參去囑其後相曰以齊獄市為寄慎勿擾也後相曰治無大於此者乎參曰不然夫獄市者所以并容也今若擾之姦人安所容乎吾是以先之孟康曰夫獄市者兼受善惡若窮極姦人無所容竄久且為亂㤗人極刑而天下畔孝武峻法而獄繁此其效也兒寛為左内史治民勸農業緩刑罰理獄訟卑體下士務在於得人心擇用仁厚士推誠與下不求名聲吏民大信愛之汲黯為東海太守學黄老言治官民好清静擇丞史任之擇郡丞及史任之也鄭當時為大司農官屬丞史亦是也責大指而已不細苛黯多病卧閣内不出嵗餘東海大治黄覇為潁川太守力行教化而後誅罰力猶勤也言先以徳教化於下若有弗從然後用刑罰也務在成就全安長史不欲易代反損傷許丞老病聾許縣丞督郵白欲逐之覇曰許丞廉吏雖老而能拜起送迎止頗重聽何傷且善助之毋失賢者意或問其故覇曰數易長史送故迎新之費及姦史縁絶簿書盗財物縁因也因交代之際而棄匿簿書以盗官物也公私費耗甚多皆當出於民所易新吏又未必賢或不如其故徒相益為亂凡治道去其泰甚者耳龔遂宣帝時選為渤海太守遂曰臣聞治亂民猶治亂繩不可急也唯緩之然後可治臣願丞相御史且無拘臣以文法得一切便宜從事帝許之薛宣為右馮翊性宻静有思有智思也思省吏職求其便安省視也下至財用筆研皆為設方畧利用而省費利便也省减也便於用而减於費也吏民稱之郡中清静後漢衛颯字子彦河内修武人也建武初為桂陽太守理䘏民事居官如家其所施政莫不合於物宜視事十年郡内清理鮑永為揚州牧時南土尚多冦暴永以吏人痍傷之後乃緩其銜轡示誅彊横而鎮撫其餘百姓安之馬援為隴西太守務開寛信恩以待下任吏以職但總大體而已賔客故人日滿其門諸曹時白外事援輙曰此丞掾之任何足相煩頗愛老子使得遨遊若大姓侵小民黠羗欲旅距此乃太守事耳劉寵為㑹稽太守山民愿朴乃有白首不入市井者頗為官吏所擾簡除煩苛禁察非法郡中大化王况字文伯性聰敏為陳留太守以徳行化人杜安為邑郡太守率身正下以禮化俗郭賀為河南尹以清静稱廉范歴武威武都二郡太守隨俗化導各得治宜建中初遷蜀郡太守其俗尚文辯好相持短長范每勵以淳厚不受偷薄之説魏覇為鉅鹿太守以簡朴寛恕為政掾吏有過要先誨其失不改者乃罷之王堂為魯相政存簡一至數年無辭訟張敏為汝南太守清約不煩用刑平正有理能名任延更始初拜㑹稽都尉時年十九迎官驚其壯壯少也及到静泊無為唯先遣饋禮祠延陵季子盧植為九江太守以疾去官㑹南夷反叛以植嘗在九江有恩信拜為廬江太守植深逹政宜務存清静𢎞大體而已魏華歆漢末為豫章太守為政清静不煩吏民感而愛之㳺楚字仲元漢末為蒲阪令後遷隴西太守為人慷慨厯位宰守所在以恩徳為治不好刑殺孟康齊王正始中為𢎞農守領典農校尉康到官清已奉職嘉善而矜不能省息獄訟縁民所欲因而利之郡領吏二百餘人渉春遣休嘗四分遣一事無宿諾楊阜為武都太守郡濵蜀漢阜請依龔遂故事安之而已蜀楊􅃧出領梓潼太守入為射聲校尉所在清約不煩晉傅嘏為河南尹河南尹内掌帝都外統京畿兼古六鄉六遂之士其民異方雜居多豪門大族商賈胡貊天下四万㑹利之所聚而姦之所生前尹司馬芝舉其綱而太簡次尹劉静綜其目而太宻後尹李勝毁常法以收一時之聲嘏立司馬氏之綱統裁劉氏之細目以經緯李氏之所毁以漸補之郡有七百吏半非舊也河南俗黨五官掾功曹典選職皆授其本國人無用異邦人者嘏各舉其良而對用之官曹分職而後以次考核之其治以徳教為本然持法有常簡而不可犯見理識情獄訟不加檟楚得其實不為小惠有所薦逹及夫有益於民事皆隠其端迹若不繇已出故當時無赫赫之名吏民久而後安之和嶠為潁川太守為政清簡甚得百姓懽心鄭冲為陳留太守冲以儒雅為徳蒞職不為幹局之譽王承為東海太守政尚清静不為細察王述為臨海太守遷㑹稽内史蒞政清肅終日無事劉琰為丹陽尹為政清整門無雜賔時百姓頗有訟官長者諸郡往往有相舉正琰歎曰夫居下訕上此弊道也古之善政司契而已豈不以其敦本正源鎮静流未乎君雖不君下安可以失禮若此風不革百姓將往而不返遂寢而不問宋王𢎞為江州刺史至州省賦簡役百姓安之張茂度為廣州刺史綏静百越嶺外安之謝述為吳興太守在郡清省為吏民所懐袁湛為吳郡太守秩中二千石蒞政和理為吏民所稱段福榮為豫州刺史蒞任清謹為西土所安南齊裴昭明為廣陵太守明帝以其在事無啟奏代還責之昭明曰臣不欲競執闗揵故耳王綸之為吳興太守為政寛簡稱良二千石張岱為吳興太守秩中二千石岱晩節在吳興更以寛恕著名梁王峻仕齊為桂陽内史㑹髙祖義師起上流諸郡多相驚擾峻閉閣静坐一郡帖然百姓頼之又為宣城太守為政清和吏民安之江蒨為晉安内史蒞政清約務在寛簡吏民便之馮道根為南梁太守豫州刺史厯處州郡和理清静為下所懐張充為義興太守為政清静吏民便之王志為丹陽尹為政清静去煩苛徐摛為新安太守至郡為治清静教民禮義勸課農桑期年之中風俗便改張纉為吳興太守治郡省煩苛務清静民吏便之蕭子雲為臨川内史在郡以和理民吏悦之謝舉為豫章内史為政和理甚得民心後為晉陵太守在郡清静百姓化其徳境内肅然范述曾為永嘉太守為政清平不尚威猛民俗便之任昉為新安太守在郡不事邉幅率然曵杖徒行邑郭民通辭訟者就路决焉為政清省吏民便之范雲為零陵内史在任潔已省煩苛去游費百姓安之又為始興内史郡多豪猾大姓二千石有不善者謀共殺害不則逐去之邉帶蠻俚尤多盗賊前内史皆以兵刃自衛雲入境撫以恩徳罷亭候商賈露宿郡中稱為神明韋放為竟陵太守在郡和理為吏民所稱王承為東陽太守為政寛惠吏民悦之伏暅為永陽内史在郡清潔政務安静張緬為豫章内史為政任恩惠不設鉤距吏人化其徳亦不敢欺故老咸云數十年未有也劉孺為晉陵太守在郡和理為吏民所稱謝朏為義興太守加秩中二千石在郡不省雜事悉付綱紀曰吾不能作主者吏但能作太守耳殷均為臨川内史體多疾閉閣卧理而百姓化其徳刼盗皆奔出境陶季真為東莞太守在郡號為清和後為建安太守為政清静百姓便之王茂為江州刺史歴丹陽尹性寛厚居官雖無譽亦為吏民所安禇翔為義興太守蒞政潔已省煩苛去游費百姓安之蕭洽為臨海太守為政清平不尚威猛民俗便之陳王勵為晉陵太守時兵饑之後郡中凋弊勵為政清簡吏民便安之魯逹為巴州刺史為政簡要推誠任下吏民便之後魏彭城王勰為揚州刺史簡刑道禮與民休息州境無虞遐邇安静樂安王範為長安鎮都大將謙㳟惠下推心撫綏百姓稱之時秦土新罹殺賊流亡相繼範請崇易簡之體帝納之於是遂寛徭與人休息張白澤為雍州刺史清心少欲吏民安之茹皓為濮陽太守清簡寡事張衮為幽州刺史清儉寡欲勸課農桑百姓安之賈雋為荆州刺史在州五載清静寡事為吏民所安賈禎為魯陽太守清素善撫接得百姓情髙悦為長樂太守為政寛惠民庶安之陸惟州為相州刺史政尚寛惠吏民安之酈約厯東萊魯郡二郡太守為政清静吏民安之韓麒麟為齊州刺史在官寡於刑罰從事劉普慶説麒麟曰明公仗節方夏而無所斬戮何以示威麒麟曰刑罰所以止惡盖不得已而用之民不犯法何以戮乎若必須斬戮以立威名當以卿應之普慶慙懼而退游明根為東兖州刺史為政清平新民樂附房景伯為齊州輔國長史值刺史死勅行州事政存寛簡百姓安之韋崇為南潁川太守不好發摘細事嘗云何用小察以傷大道吏民感之郡中大治李訢為相州刺史為政清簡明於折獄姦盗止息百姓稱之劉元孫起家拜蘭陵太守治以清静為名鄭道昭為光州刺史轉青州刺史其在二州政務寛厚不任威刑為吏民所愛鄭尚為濟州刺史為政寛簡百姓安之畢祖杇為東婺州刺史初杇善撫邉人清平有信務在安静百姓稱之王襲為并州刺史太和中孝文輿駕詣雒路幸其治供帳粗辦境内清静帝頗嘉之李平為太子中庶子平因侍從容請自效一郡孝文曰卿復欲以吏事自試也拜長樂太守政務清静吏民懐之裴叔義為兖州安東府外兵參軍累遷太守為政清静吏民安之裴芬為東秦州刺史在州有清静之稱栁僧習為北地太守為政寛平氐羗悦愛賈思同為襄州刺史雖無明察之譽百姓安之曹世表為清河太守治官省約百姓安之張烈為瀛州刺史為政清静吏民安之范紹為并州刺史清慎守法頗得民和劉道斌為𢎞農太守遷岐州刺史所在有清治之稱張偉為營州刺史在州郡以仁徳為先不任刑罰清身率下宰守不敢為非王珝為濟州刺史清静愛民有政治之稱北齊堯䧺初仕東魏為豫州刺史雄雖武將而性質寛厚治民頗有誠信為政去煩碎舉大綱而已段榮為濟州刺史厯相州秦州事性温和所厯皆推仁恕吏民愛之段韶為并州刺史為政舉大綱不存小察甚得民和時又有韓賢為雒州刺史雖武將而性和直不甚貪暴雖無善政不為吏民所苦後周閻慶為寜州刺史性寛和不苛察百姓悦之馮遷為廣漢郡守時蜀土初平人情擾動遷政在簡恕夷俗頗安之李穆為并州總管時東夏甫平人情尚擾穆鎮之以静百姓安之顔之儀為濟州刺史在州清静夷夏悦之李和為漢陽郡守治存寛簡百姓稱之後為夏州刺史又除雒州刺史和前在夏州頗留遺惠及有此授商雒父老莫不想望徳音和至州以仁恕訓物獄訟為之簡静兾携為襄樂郡守遷湖州刺史性静退每以清約自處前後所厯頗有聲稱梁椿為渭州刺史在州雖無他政績而夷夏安之王雅為鄜城郡守政尚簡易吏人安之韓果為華州刺史為政寛簡吏民稱之皇甫璠為隨州刺史政存簡惠百姓安之王子直為行𤓰州事性清静務以徳政化民西土悦附庾信為雒州刺史多識舊章為政簡静吏民安之魏𤣥為熊州刺史政存簡惠百姓悦之庫狄峙為益州刺史性寛和尚清静為夷獠所安隋栁裘為許州刺史在官清簡民吏懐之河間王𢎞出為寜州總管在州治尚清静甚有恩惠韋世康為絳州刺史以雅望鎮之合境清肅又為荆州總管為政簡静百姓愛悦合境無訟韋藝為齊州刺史為政清簡士庶懐惠栁儉為蓬州刺史訟者庭遣不為文書約束從容而已獄無繫囚蜀王秀時鎮益州列上其事遷沔州刺史公孫景茂為息州刺史法令清静徳化大行梁彦光初為岐州刺史其俗頗質以静鎮之合境大化唐楊恭仁隋末為甘州刺史㳟仁務舉大綱不為苛察戎夏安之文帝謂其父雄曰恭仁在州甚有善政非惟朕舉得人亦是卿義方所致也襄武王琛為晉州道行臺總管馭衆寛簡大為民夷所附宇文士及貞觀初為蒲州刺史為政寛簡吏人安之張文琮貞觀中為亳州刺史為政清簡百姓愛之田留安貞觀中厯徐洪二州都督皆以寛簡為吏民所安高智周為夀州刺史政存寛惠百姓安之霍王元軌前後為刺史至州唯閉閣無為吏事責成於長史司馬陸象先為益州大都督府長史仍為劍南道按察使在官務以寛仁為政大司馬韋抱貞言曰望明公稍行杖罰以立威名不然恐下人怠惰無所懼也象先曰為政者理則可矣何必嚴刑樹威損人益已恐非仁恕之道竟不從抱貞之言象先𤣥宗開元中為蒲州刺史仍為河東道按察使嘗有小吏犯罪但語示而遣之録事白曰此例皆合與杖象先曰人情相去不逺此豈不觧吾言若其必須行杖即當自汝為始録事慙懼而退象先嘗謂人曰天下本自無事秪是庸人擾之始為繁耳但當静其源則亦何憂不簡前後為刺史其政如一吏咸懐思之李適之為河南尹適之性簡率不務苛細人吏便之倪若水為汴州刺史政尚清静人吏安之苗晉卿天寳中為金州刺史厯魏郡太守政化大行晉卿寛厚廉謹為政舉大綱不問小過所在有惠化鄧景山肅宗至徳初為揚州長史淮南節度使政理簡肅聞於朝廷崔衍為宣歙池觀察使政務簡便人頗懐之韋夏卿為京兆尹東都留守為政務通適不喜改作魏少㳺早以吏幹知名累遷京兆尹居職縁餙成務不為事首有䂓簡善任人果於集事前後四領京兆雖無赫赫之名而齪齪廉謹有足稱者張延賞為河南尹時河雒兵戈之後邑里丘墟延賞政尚易簡東都甚理張鎰代宗大厯中為濠州刺史為政清静州事大理李勉為京兆尹政尚簡肅甚有時稱及為􅉸亳永平節度使在鎮八年以舊徳清重不言而理東諸侯雖暴驁者亦宗敬之闗播大歴中以淮南判官攝滁州刺史為政清静簡惠既無盗賊人甚安悦之馬燧為懐州刺史乗兵亂後夏大旱人失耕種燧乃務教化去煩苛段秀實為涇州刺史清約率易逺近安之退公之後端居静慮而已薛播徳宗建中初為晉州刺史遷河南尹皆為政簡肅甚獲當時之稱韋元甫有器局所蒞有聲為揚州長史淮南節度在揚州三年政尚不擾事亦能理吳湊為京兆尹孜孜為政以勤儉清簡為務人心安悦及為婺州都團練觀察使為政勤儉清正美聲聞於朝廷裴諝為河南尹不鞫人於贓罪以寛厚和易為理武元衡為西川節度使在成都比三年公私皆濟撫蠻夷異類約束明具輙不生事崔詠為鄧州刺史後為桂管觀察使皆不生事溪洞夷俗頗安孔戣憲宗元和中為廣州刺史時桂管經畧使楊旻桂仲武裴行立等騷動生蠻以求功伐遂致嶺表累嵗用兵唯戣以清儉為理不務邀功交廣大理王鍔為容管經畧使凡八年溪洞安之薛放為江南西道觀察使在鎮唯用清潔為理一方之人至今思之閻濟美為福建觀察使復移鎮浙左所至常以簡澹為理兩地之人常賦之外不知其他丁公著為浙西觀察使二年為河南尹皆以清静為理沈傳師為湖南江西宣州三觀察使所至以亷静稱理崔郾為鄂岳浙西觀察使所至用寛政清簡少事財用有餘人遂寜泰漢李殷累為郡守性沉厚所蒞無苛暴之名周馮道後唐清泰初為同州節度使為政閑淡獄市無撓翟光鄴權知京兆以寛静為治前政有煩苛之事一切停罷百姓便之推誠禮云惟天下至誠為能盡其性又曰惟天下至誠為能化夫欲盡物之性而化之者其唯至誠乎故古之良二千石妙識治體推誠明之性為撫御之術簡畧苛細輸寫心腹選任於淳質慰薦於勤勵待衆以信而民不忍欺推功於下而人樂為用或因壘以喻冦賊或刻期以遣囚繫動發于𠂻以底于治宜乎詔勅之嘉奬史册之褒紀𫝊云安静之吏悃愊無華日計不足月計有餘其是之謂乎漢趙廣漢二千石王欽若等曰漢厯京兆尹潁川太守秩皆二千石以和顔接士其慰薦待遇吏殷勤甚備慰薦為安慰而薦逹之事推功善歸之於下曰某縁卿所為非二千石所及行之發於至誠吏見者皆輸寫心腹無所隠匿咸願為用僵仆無所避嚴延年為涿郡太守吏忠盡節者厚遇之如骨肉皆親鄉之讀鄉曰嚮出身不顧以是治下無隠情兒寛為左内史勸農業緩刑罰理獄訟卑體下士務在於得人心擇用仁厚士推情與下不求名聲吏民大愛信之韓延夀為左馮翊恩信周徧二十四縣莫復以辭訟自言者推其至誠吏民不敢欺紿紿䛘也龔遂為渤海太守先是渤海左右郡嵗饑盗賊並起郡聞新太守至發兵以迎遂皆遣還移書勅屬縣悉罷逐捕盗賊吏諸持鉏鉤田器者皆為良民吏毋得問也鉤鎌也持兵者乃為賊遂單車獨行至府郡中翕然盗賊亦皆罷罷讀曰疲言為盗賊久心疲厭也渤海又多刼掠相隨聞遂教令即時觧㪚棄其兵弩而持鉤鉏盗賊於是悉平後漢郭伋為并州刺史行部到西河美稷有童兒數百各騎竹馬迎拜伋問曰兒曹何自逺來對曰聞使君到喜故來迎諸兒復送到郭門外問使君何日當還伋曰别駕從事計日告之行部還入美稷界先期一日伋念負諸童兒遂止於野亭須期乃入馬援為隴西太守務開寛信恩以待下任吏以職但總大體而已諸曹時白外事輙曰此丞掾任何足相煩戴封為中山相時諸縣囚四百餘人辭狀已定當行刑封哀之皆遣歸家與尅期日皆無違者詔書褒美焉張綱為廣陵太守初廣陵賊張嬰等衆數萬人殺刺史二千石前太守往輙多請兵及綱受拜詔問當得兵馬㡬何綱對曰無用兵馬遂單車之官徑詣嬰壘門示以禍福嬰大驚懼走欲閉門綱又於門外罷遣吏兵留所親者十餘人以書語其長老素為嬰所信者請與相見問以本變因示以詔恩使還請嬰嬰見綱意誠即出見綱綱延置上坐問疾苦禮畢乃謂之曰前後二千石多非其人杜塞國恩肆其私求鄉郡逺天子不能朝夕聞也故民人相聚以避害二千石信有罪矣為之者乃非義也忠臣不欺君以自明孝子不損父以求福天子聖人欲文徳以來之故使太守來思以爵禄相榮不願以刑也今誠轉禍為福之時也若聞義不服天子赫然發怒大兵雲合豈不危乎宜深計其利害嬰聞泣曰荒裔愚人數為二千石所侵枉不堪其困故遂相聚偷生明府仁及草木乃嬰等更生之澤但恐投兵之日不免拏戮耳綱曰豈其然乎要之以天地誓之以日月方當相顯以爵位何禍之有乎嬰曰茍赦其罪得全首領以就農畆則抱戴沒齒爵禄非所望也嬰雖為大賊起於狂暴自以為必死及得綱言曠然開明乃辭還營明日遂將所部萬餘人與妻子面縳詣綱綱悉釋縳慰納謂嬰曰卿諸人一旦觧㪚方陲蕩然當條名上之必受封賞嬰曰乞歸故業不願以穢名汙明時也綱以其至誠乃各從其意親為安居宅子弟欲為吏者隨才任職欲為民者勸以農桑田業並豐南州晏然劉岱為兖州刺史虚已愛物為士人所附魏田豫為南陽太守先時郡人侯音反衆數千人在山中為羣盗大為郡患前太守收其黨與五百餘人表奏皆當死豫悉見諸繫囚慰諭開其自新之路一時破械遣之諸囚皆叩頭願自効即相告語羣賊觧㪚郡内清静蜀董和為益州郡太守與蠻夷從事務推誠心南土愛而信之晉劉𢎞為荆州刺史值王室多難得專命一方盡其器能推誠御下厲以公義每有手書郡國丁寜欵宻莫不感悦顛倒奔赴咸曰得劉公一紙書賢於十部從事宋謝方明轉晉陵太守復為南部相常年終江陵縣獄囚事無輕重悉㪚聽歸家候過正三日還到罪應入重者有二十餘人紀綱以下莫不疑懼時晉陵郡送故主簿𢎞季盛徐夀之並隨在西固諫以為昔人雖有其事或是記籍過言且當今民情偽薄不可以古義相許方明不納一時遣之囚及父兄皆驚喜涕泣以就死無恨至期有重罪二人不還方明不聼討捕其一人醉不能歸違至二日乃反餘一囚十日不至五官朱千期請見欲白討之方明知為囚事使左右謝五官不須入囚自當反囚逡廵墟里不能自歸鄉村責讓之率領將送遂竟無逃亡者逺近咸歎服焉南齊安陸王緬為雍川刺史留心辭訟親自隠䘏刼鈔渡口皆赦遣以自新再犯乃加誅為百姓所畏愛梁何𦙍字子秀初仕齊為建安太守為政有恩信民不忍欺每伏臘放囚還家依期而返始興王憺為荆州刺史自以少年始居重任思欲開導物情乃謂佐吏曰政之不臧士君子所宜共惜言可用用之可也如不可用於我何傷吾開懐矣爾其勿恡於是小人知恩而君子盡意矣王志為東陽太守郡獄有重囚十餘人冬至日悉遣還家過節皆反唯一人失期獄司以為言志曰此自太守事主者勿憂明旦果自詣獄辭以為婦孕吏民益歎服之陳沈君髙為平越將軍廣州刺史嶺南俚獠世相攻伐君髙本文吏無武幹推心撫御甚得民和後魏沛郡公禎為南豫州刺史初豫州城豪胡丘生數與外交通及禎為刺史丘生嘗有犯懐恨圖為不軌詐以婚集城人告云刺史欲遷城中大家送之向代共謀翻城城人石道起以事宻告禎速掩丘生并諸預謀者禎曰吾不負人人何以叛但丘生誑誤若即收掩衆必大懼吾静以待之不乆自當悔服語未訖而城中三百人自縛詣州門陳丘生譎誑之罪而丘生單騎逃走禎恕而不問宇文福為瀛州刺史性忠清在公嚴毅以信御民甚得聲譽艾陸伯子華為齊州刺史先是州境數經反逆邢果之亂王欽若等曰是時平府主簿邢果作亂也人不自保而子華撫集豪右委之管籥衆感悦境内帖然李仲遵為營州刺史時四方州鎮叛亂相續營州城内咸有異心仲遵單車赴州旣至與大使盧同以恩信懐誘率皆怡悦北齊張華原為兖州刺史境内大賊及鄰州亡命二百餘人皆詣華原歸欵咸撫以恩信放歸田里於是人懐感附冦盗􅃦息州獄先有囚千餘人華原皆决遣至年暮唯有重罪者數十人華原亦遣歸家申賀依期至獄後周宇文測行汾州事政在簡惠頗得人和地接東魏數相抄竊或有獲其為冦者多實而文測皆命觧縛置之賔館然後引與相見如客禮焉仍宴設放還其國而送出境自是東魏人大慙乃不為冦兩界遂通慶問時論方之羊叔子王欽若等曰羊叔子事具將帥推誠門隋令􅈢熈為桂州總管有寗猛力者與陳後主同日生自言貌有貴相在陳日已據南海平陳後髙祖因而撫之即拜安州刺史然驕倨恃其阻險未嘗參謁熙手書諭之申以交友之分其母有疹熙復遺以藥物猛力感之詣府請謁不敢為非衛𤣥為資州刺史時獠攻圍大牢鎮𤣥單騎造其營謂羣獠曰我是刺史銜天子詔安飬汝等勿驚懼也諸賊莫敢動於是説以利害渠帥感悦觧兵而去唐田留安為魏州總管劉黒闥之亂來攻州城于時山東豪猾多殺長吏以應賊百姓兇人咸懐異志凡諸郡守皆以心腹自衛多所猜防繇是上下情隔怨叛者多留安獨撫結所部示無疑阻但有白事者無問踈逺皆至臥内謂人曰吾與卿輩同為國守自宜一心無為疑二也必欲棄國即異背順歸逆亦任卿軰斬吾頭而去矣城中父老逓相誡勵子弟曰田公以赤心相付何得負之繇是人情遂同張伯義為廣州刺史嶺南節度朴直不知書然能推誠委任軍府簡肅人皆便之于邵為巴州刺史時嵗儉夷獠相聚山澤為盗數千百人来圍州城邵撫勵州兵與之拒戰凡旬有二日間遣使説喻示以善惡山盗邀邵出乃以儒服出城致之不疑因皆降之節度使李抱玉以聞遷梓州刺史吕元膺為蘄州刺史頗著恩信常嵗終閲郡獄囚囚有自告者曰某有母在明日元正不得相見因泣下元膺憫焉盡脱其械縱之與期守吏曰賊不可縱元膺曰吾以忠信待之及期無後至者繇是羣盗感義相引而去册府元龜卷六百八十
