body:
  text: 册府元龜卷九百二十九宋王欽若等撰總錄部不知人謬舉不知人知人不易著之前聞惟口起羞書垂名訓故子羽不可以貌取賜也徒聞其億中葢謂是矣乃有昧人倫之鑒乖授任之㫖諒朱紫之莫辨曷雅鄭之能究取捨斯失譏誚隨作以至禍其身而敗其國者咸著之於篇云子西為楚令尹初太子建之遇䜛也自城父奔宋又避華氏之亂於鄭鄭人甚善之又適晉與晉人謀襲鄭乃求復焉鄭人復之如初晉人使諜於子木請行而期焉謂行襲鄭之期子木即建也子木暴虐於其私邑邑人訴之鄭人省之得晉諜焉遂殺子木其子曰勝在吳子西欲召之葉公曰吾聞勝也詐而亂無乃害乎葉公子高沈諸梁也子西曰吾聞勝也信而勇不為不利舎諸邉境使衛藩焉使為藩屏之衛葉公曰周仁之謂信周親也率義之謂勇率行也吾聞勝也好復言言之所許必欲復行之不原道理而求死士殆有私乎私謀復前復言非信也期死非勇也俱非也子必悔之弗從召之使處吳竟為白公白楚邑楚縣西南有白亭請伐鄭子西曰楚未節也言楚自親復政令數未得節制不然吾不㤀也他日又請許之未起師晉人伐鄭楚救之與之盟勝怒曰鄭人在此讐不逺矣比子西於鄭人勝自厲劔子期之子平見之曰王孫何自厲也曰勝以直聞不告女庸為直乎將以殺爾父平以告子西子西曰勝如卵余如翼而長之以鳥為喻楚國第用士之次第我死令尹司馬非勝而誰勝聞之曰令尹之狂也得死乃非我言我必殺之若得自死我乃不得成人子西不悛吳人伐慎白公敗之汝陽慎縣也請以戰備獻與吳戰之所得鎧杖兵噐而獻之欲因以為死許之遂作亂殺子西子期于朝而刼恵王子西以袂掩面而死漢張湯為廷尉廷尉府盡用文史法律之吏史謂善史書倪寛為人温良有亷知自將將衛也以智自衛䕶也善屬文屬綴也音之欲切然懦為武懦柔也又音需口弗能發明也寛以儒生在衆中見謂不習事不署曹不署為官曹也署表也置也除為從使從使者不主文書魏裴潛父茂建安初為尚書潛少不修細行繇此為父所不禮潛自感為父所不禮折節仕進雖多所經歴清省恪然官至尚書令其家教有類於石奮自魏興以來少能及者鍾繇為魏王相國沛人魏諷有感衆才傾動鄴都繇繇是辟為西曹掾為王征漢中大將未及諷潛結徒黨又與長樂衛尉陳禕謀襲鄴未期禕懼告之太子誅諷繇坐免劉表為荆州牧時王粲年十七司徒辟詔除黄門侍郎以西京擾亂皆不就乃之荆州依表表以粲貌寢而體弱通悦不甚重也晉博昌令者史不書姓名時樂安人光逸初為博昌小吏後為門亭長迎新令至京師時母輔之與荀䆳共詣令家望見逸謂䆳曰彼似竒才便呼上車與談良乆果俊噐令怪客不入吏白與光逸語令大怒除逸名斥遣之山濤為右僕射掌選後拜司徒子簡字秀倫性溫雅有父風年二十餘濤不之知也簡嘆曰吾年幾三十而不為家君所知後與嵇紹劉謨楊淮齊名為征南將軍都督荆湘交廣四州諸軍事假節鎮襄陽魏衡為吏部郎有名當世兄子舒少朴質衡不知之使守水碓嘆曰舒堪數百戸長我願畢矣舒亦不以介意舒後位至司徒刁逵為豫州刺史領平越中郎將逵以貨殖為務初宋髙祖㣲時素貧嘗負逵社錢三萬經時無以還被逵執之王謐宻以己錢代償繇是得釋桓𤣥立以逵豫州刺史鎮歴陽髙祖起義叅軍諸葛長民趨歴陽逵棄而走為下人所執斬於石頭南燕慕容法為慕容徳兖州牧時慕容超初自長安行至梁父鎮南長史悦夀還謂法曰向見北海王子天資𢎞雅神爽髙邁始知天族多竒玉林皆寳法曰昔成方遂詐稱衛太子人莫辨之此復天族乎超聞恚恨形於言色法亦怒處之外舘繇是結憾及徳死法又不奔䘮超遣使讓焉法嘗懼禍至因此遂與慕容鍾段宏等謀亂宋謝方明為㑹稽郡守其子恵連有才悟而輕薄不為方明所知靈運嘗自始寕至㑹稽造方明過視恵連大相知賞時何長瑜教恵連讀書亦在郡内靈運又以為絶倫謂方明曰阿連才悟如此而尊作嘗兒遇之何長瑜當今仲宣而飴以下客之食尊既不能禮賢宜以長瑜還靈運靈運載之而去劉遵考為領軍文帝元嘉二十七年索虜南冦發三吳民丁沈攸之少孤貧亦被發既至京都詣遵考求補白丁隊主遵考謂之曰君形陋不堪隊主因隨沈慶之征討攸之後為右將軍北齊麻祥為令史神武㣲時為函使毎至雒陽給使于祥祥嘗以肉㗖神武神武性不立食坐而進之祥以為慢已笞神武四十後唐周𤣥豹自言善相術太原監軍特進張承業嘗延之歴視諸僚佐時廵官馮道初自燕來性不事華潔灰塵滿面而以文行見知承業命典書奏承業問𤣥豹曰馮廵官何如曰廵官漪蓮泛水幸遇特進禮士之秋官不踰宰百里承業笑曰他已為起居郎公何忽耶謬舉秦應侯范雎魏相齊使舎人笞擊雎折脇槢齒得出後魏人鄭安平遂操雎亡伏匿更名姓秦昭王使謁者王稽於魏鄭安平詐為卒侍王稽問魏有賢人可與西遊者乎鄭安平曰臣里中有張祿先生即范雎也欲見君言天下事王稽知雎賢載睢入秦雎既相秦言於王曰非王之賢聖莫能貴臣今臣官至於相爵在列侯王稽之官尚止於謁者非其内臣之意也昭王召王稽拜為河東守三歲不上計不上計不隨史入計也又任鄭安平使將擊趙安平為趙所困急以兵二萬人降趙應侯席藁請罪秦之法任人而所任不善者各以其罪罪之於是應侯罪當收三族秦昭王恐傷應侯之意乃下令國中有敢言鄭安平事者以其罪罪之而加賜相國應侯食物日益厚以順適其意後二歲王稽為河東守與諸侯通坐法誅而應侯日益以不懌昭王臨朝嘆息應侯進曰臣聞主憂臣辱主辱臣死今大王中朝而憂臣敢請其罪昭王曰吾聞楚之鐡劔利而倡優拙夫鐡劔利則士勇倡優拙則思慮逺夫以逺思慮而御勇士吾恐楚之圖秦也夫物不素具不可以應卒今武安君既死而鄭安平等畔内無良將而外多敵國吾是以憂欲以激厲應侯應侯懼不知所出漢顔延年宣帝時為河東太守察御史亷状不入身延年察舉其獄吏為亷而此人乃有贓罪然贓不入身也延年坐選舉不實貶秩張勃封富平侯陳湯西至長安求官得大官獻食丞數歲勃與湯交髙其能初元二年元帝詔列侯舉茂才勃舉湯湯待遷父死不犇喪犇古奔字司隸奏湯無循行勃選舉故不以實坐削戸三百㑹薨賜謚曰繆侯以其繆舉人也湯下獄何武為京兆尹坐舉方正所舉者召見槃辟雅拜槃辟猶言盤旋也辟音闢有司以為詭衆虚偽偽遣也武坐左遷楚内史後漢王丹為太子少傅客初有薦士於丹者因選舉之而後所舉者䧟罪丹坐以免客慙懼自絶而丹終無所言尋復徴為太子太傅乃呼客謂曰子之自絶何量丹之薄也不為設食以罸之相待如舊左雄順帝時為司隸校尉舉故冀州刺史馮直以為將帥而直嘗坐贓受罪晉王導進位侍中司空假節錄尚書領中書監㑹太山太守徐龕反元帝訪可以鎮撫河南者導舉太子左衛率羊鑒既而鑒敗抵罪導上疏曰徐龕叛戾乆稽天誅臣創議征討調舉羊鑒鑒闇懦覆師有司極法聖恩降天地之施全其首領然臣受重任總錄機衡使三軍挫衂臣之責也宜自貶黜以穆朝倫詔不許阮抗元帝時為奮武將軍丞相行叅軍宋挺本揚州刺史劉陶門人陶亡後挺娶陶愛妾以為小妻愍帝建興中挺又割盗官布六百餘疋正刑棄市遇赦免既而抗請為長史司直劉隗劾奏曰挺蔑其死主而専其室悖在三之義傷人倫之序當投之四裔以禦魑魅請除挺名禁錮終身而奮武將軍太山太守阮抗請為長史抗緯文經武剖符東藩當庸勲忠良昵近仁賢而襃求贓汚舉頑用嚚請免抗官下獄理罪奏可而挺病死後魏張兖為幽州刺史道武天興初徴還京師後與崔逞荅晉將郗恢書失㫖出為尚書令史兖遇創業之始以有才謀見任率心奉上不顧嫌疑道武曾問南州人於兖兖與盧溥同里數談薦之又兖未嘗與崔逞相見聞風稱羡及中山平盧溥聚黨為逆崔逞荅書不允並乖本言故忿之張彛為尚書時襲常山王素孫昭小兒阿倪彛引兼殿中郎李文將為齊郡王蘭舉哀而昭乃作宫懸帝大怒詔曰阿倪愚騃誰引為郎於是黜彛白衣守尚書昭遂停廢隋宇文述煬帝大業中為左衛大將軍凡所薦逹皆至大官趙行樞以太常樂户家財億計述謂為兒多受其賂稱其驍勇起家為折衝郎將唐李傑為御史大夫䕶作橋陵時引御史王旭為判官旭貪賄受贓傑將繩之初不得其實反為旭所搆出為衢州刺史韓朝宗為荆州刺史兼判襄州刺史山南道採訪使𤣥宗開元二十四年九月鄧州南陽縣令李泳擅興賦役貶為康州都城縣尉泳之為令也朝宗所薦乃貶為洪州刺史制曰所遣使臣將恤人隠類亦諭㫖期於悉心而政或相䝉賞或失善以此致理未嘗聞之韓朝宗亟登清要爰委條察不恭爾職以副朕懐而乃私其所親請以為邑未盈三載已至兩遷既殊徳舉因速官謗及令按事果騐非才傷敗實多矯誣斯甚舉不為黨豈其然歟事咨於周則異於果未能自律何以正人仍期後效且示輕貶可授洪州刺史雖知人則哲在予之責已深而事上竭誠為臣之節當勵其有賞罰不正枉直不明䧟於比周隳我綱目有一於此誰其捨諸凡今刺舉宜以為戒天寳三載長安縣令栁昇坐贓於朝堂杖殺之昇為令也朝宗為京兆尹所薦朝宗為髙平郡太守坐舉人不直制曰髙平郡太守上柱國長山縣開國伯韓朝宗頃承榮奨擢在神京􅂺薦凶人超登赤縣果彰貪穢大獲贓私舉非允當已有比周之責使之交易更渉嫌疑之地頗招物議實負朝廷宜從貶黜用申懲戒可置吳興郡别駕員外張渉為國子博士太子侍讀與懐州刺史喬琳友善及徳宗嗣位多以政事詢訪於渉渉盛稱琳識度才畧堪備大用因拜御史中大夫平章事琳本麄才年髙有耳疾帝每有顧問對荅失次論奏不合時機居相位凡八十餘日除工部尚書罷政事孟簡為山東道觀察使憲宗元和十四年御史臺奏簡舉均州鄖鄉縣鎮遏兵馬使趙潔充本縣令有虧典刑勑罰一月俸料李肇李翺並為中書舍人文宗太和三年六月貶肇為將作監翺為少府少監並分司東都以栢耆納賂賜死肇與翺同薦栢耆故也後唐盧質為河東節度判官質性閒放不願居大任欲求留守太原莊宗即位歴求宰輔乃舉定州節度判官豆盧革河東觀察判官盧程皆卿相之家可當輔相即時徴之及並命為丞相程為中書侍郎平章事監修國史本非重徳一旦舉大位舉止不常時朝廷草創庶務未備班列蕭然寺署多闕程革受命之日即乗肩輿駢導喧沸莊宗聞訶導之聲詢于左右曰宰相擔子入門莊宗駭異登樓視之笑曰所謂似是而非者也册府元龜卷九百二十九
