body:
  text: 册府元龜卷二百九十四宋王欽若等撰宗室部退讓專政退讓易曰卑而不可踰書美羣后徳讓葢讓之為徳也其至矣哉矧乃聫華帝胄厠於藩戚而能識知退之理踐崇讓之言思害盈福謙之誡杜過制失軌之漸是之謂令徳也三代以上靡得而記漢室而下訖於隋唐乃有固守謙退不求聞逹邈畏盛滿捨去權寵或稱疾以求奉祀或辭賞以懼公議或願寢殊禮以申素志或表讓兵政以授能者或退身以弭天變或推功以避封爵斯皆深逹損益之理能守止足之訓葢冨而無驕寵而能降者素士之所難也矧於公族乎斯足以稱賢矣漢楚元王孫辟疆武帝時隨二千石論議冠諸宗室清靜少欲不肯仕後漢順陽懐侯嘉光武族兄也建武三年到雒陽從征伐拜為千乗太守六年病上書乞骸骨徴詣京師城陽王祉光武族兄舂陵康侯敞之子也建武十一年祉疾病上城陽王璽綬願以列侯奉先祭祀帝自臨其疾東海恭王疆光武子也建武二十年帝優以大封兼食魯郡合二十九縣賜虎賁旄頭宫殿設鍾簴之懸擬於乗輿疆臨之國數上書讓還東海又因皇太子固辭帝不許深嘉歎之東平王蒼光武子也為驃騎將軍位在三公上永平四年蒼以在朝數載多所隆益而自以至親輔政聲望日重意不自安上䟽歸職曰臣蒼疲駑特為陛下慈恩覆䕶在家被教導之仁升朝䝉爵命之首制書褒美班之四海舉負薪之才負薪喻小人也升君子之器凡匹夫一介尚不㤀簞食簟竹器也圓曰簟方曰笥之惠况臣居宰相之位同氣之親哉宜當暴骸骨為百僚先而愚頑之質加以固病誠羞負乗辱汙輔將之位將被詩人三百赤紱之刺赤紱大夫之服今方域晏然要荒無儆將遵上德無為之時也文官猶可并省武職尤不冝建昔象封有庫不任以政誠由愛深不忍揚其過惡前事之不㤀來事之師也自漢興以來宗室子弟無得在公卿位者惟陛下審覽虞帝優飬母弟遵承舊典終卒厚恩乞上驃騎將軍印綬退就藩國願䝉哀憐帝優詔不聽其後數陳乞辭甚懇切五年乃許還國而不聼上將軍印綬章帝建初六年詔沛濟南東平中山四王賛皆勿名蒼既至升殿乃拜天子親答之其後諸王入宫輙以輦迎至省閣乃下蒼以受恩過禮情不自寧上䟽辭曰臣聞貴有常尊賤有等威卑髙列序上下以理陛下至徳廣施慈愛骨肉既賜奉朝請咫尺天儀而親屈至尊降禮下臣毎賜讌見輙興席改容中宫親拜事過典故臣惶怖戰慄誠不自安每㑹見踧踖無所措置此非所以章示羣下安臣子也帝省奏歎息愈褒賞焉晉齊獻王攸武帝子也帝詔議藩王令自選國内長吏攸奏議曰昔聖王封建萬國以親諸侯軌迹相承莫之能改誠以君不世居則人心偷幸人無常主則風俗偽薄是以先帝深覽經逺之統思復先哲之軌分土畫疆建爵五等或以進徳或以酬功伏惟陛下應期創業樹建親戚聽使藩國自除長吏而今草創制度初立雖庸蜀順軌吴猶未賔宜俟清㤗乃議復古之制書比三上輙報不許其後國相上長吏缺典書令請求差選攸下令曰忝受恩禮不稱惟憂至於官人叙才皆朝廷之事非國所宜裁也其令自上請之時王家人衣食皆出御府攸表租秩足以自供求絶之前後十餘上帝不許㑹稽文孝王道子簡文子也孝武太元初拜散騎常侍中軍將軍進驃騎將軍後公卿奏道子親賢莫二宜正位司徒固讓不拜使錄尚書六條事尋加開府領司徒及謝安薨詔曰新䘮哲輔華戎未一自非明賢懋徳莫能綏御内外司徒琅邪王道子體道自然神識頴逹實當旦奭之重冝摠二南之任可領揚州刺史錄尚書假節都督中外諸軍事衛府文武一以配驃騎府讓不受數年領徐州刺史太子太傅公卿又奏宜進位丞相揚州牧假黄鉞羽葆皷吹並讓不受及恭帝為琅邪王道子受封㑹稽國并宣城為五萬九千户安帝踐阼有司奏道子冝進位太傅揚州牧中書監假黄鉞備殊禮固讓不拜又解徐州詔内外衆事動静諮之帝既冠道子稽首歸政王國寳始總國權勢傾朝廷王恭乃舉兵討之道子懼收國寳斬之乃乞解中外都督錄尚書以謝方岳詔不許武陵威王晞孝武帝子初穆帝時為太宰海西公太和初加羽葆鼔吹入朝不趨贊拜不名劍履上殿皆固讓宋臨川烈武王道規髙祖少弟也為輔國將軍以義勲遷使持節都督荆寧秦梁雍司州之河南六州軍事領䕶南蠻校尉荆州刺史道規辭南蠻以授殷叔文臨川王義慶道規子也元嘉中為丹陽尹加右僕射㑹太白犯左執法義慶懼有災禍乞求外鎮文帝詔譬之曰𤣥象茫昧既難可了且史家諸占各有異同兵星王時有所干犯乃桓𤣥當誅以此言之益無懼也鄭僕射亡後左執法嘗有變王光祿至今平安日蝕三朝天下之至忌晉孝武初有此異彼庸主耳猶竟無佗天道輔仁福善謂不足横生憂懼兄與後軍各受内外之任本以維城表裏經之盛衰此懐實有由來若天必降灾寧可千里逃避耶既非逹者之事又不知吉凶定所若在都則有不測去此必保利貞者豈敢茍違天耶義慶固求解僕射乃許之加中書令進號前將軍常侍尹如故江夏文獻王義恭武帝子也武帝即位授持節都督揚州南徐二州諸軍事孝建元年十一月遷鎮京口二年春督東南兖二州徴為揚州刺史加入朝不趨贊拜不名劍履上殿義恭固辭殊禮又解持節都督南譙王義宣武帝子也文帝時為中軍將軍揚州刺史值元凶弑立孝武入討義宣遣参軍徐遺寳率衆三千助為前鋒孝武即位以義宣為中書監都督楊豫二州丞相録尚書六條事改封南郡王進謚義宣所生為獻太妃封次子宜陽侯愷為南譙王食邑千戸義宣固辭内任及愷王爵於是改授都督荆湘雍益梁寧南秦八州諸軍荆湖二州刺史持節侍中丞相如故降愷為宜陽縣主南平穆王鑠文帝第四子也元嘉二十六年進號平西將軍讓不拜始安王休仁文帝第十二子明帝即位為揚州刺史時諸方逆命休仁督征討諸軍事中流平定休仁之力也乃増休仁邑四千戸固辭乃受千戸上流雖平薛安都據彭城招引後魏復都督北討諸軍事又增食邑三千戸不受南齊豫章王嶷太子第二子也武帝永明元年領太子太傅觧中書監手啓帝曰陛下以叡孝纂業萬㝢維新諸弟有序臣屢荷隆愛叨授台首不敢固辭俛仰祗寵心魂如失負重量力古今同規臣窮生如浮質操空素任居鼎石已移氣序自頃以来宿疾稍纒心慮怳忽表於容狀視此根體常恐命不勝恩加以星緯屢見災祥雖脩短有常能不耿介此心欲從俗啟解今職但厝辭為鄙或貽物誚所以息意緘黙一委時運而可復加寵榮増其顛墜且儲傅之重實非常選遂使太子見臣必東帶宫臣皆再拜二三之宜何以當此臣近亦侍言太子告意子良且因王儉申啟未知粗上聞否福慶方隆國祚永始若天假臣年得預人位唯當請降貂璫以餙㣲軀永侍天顔以惟畢世此臣之願也服之不衷猶為身災况寵爵乎殊榮厚恩必誓以命請帝答曰事中恐不得從所陳三年文惠太子講孝經畢求解太傅不許皇孫婚竟又陳解詔曰公惟徳惟行無所厝辭且魯且衛其誰與二方式範當時流聲史籍豈容屢秉撝謙以乖期寄嶷嘗慮盛滿又因宫宴求解楊州授竟陵王子良帝終不許曰畢汝一世無所多言嶷自以地位隆重深懐退讓北宅舊有園田之美乃盛脩理之七年啟求還第帝令世子亷代鎮東府嶷進位大司馬八年給皁輪車尋加中書監固辭梁臨川靖惠王宏太祖第六子也宏有七子正義正徳正則正立正表正信世子正仁為吴興太守有治能天監十年卒謚曰哀世子無子髙祖詔羅平侯正立為世子由宏意也宏薨正立表讓正義為嗣髙祖嘉而許之封正立千戸侯正義先封平樂侯正徳西豐侯正則樂山侯正立羅平侯正表封山侯正信封化侯長沙元王弟藻文帝孫也武帝天監十年自南琅邪太守入為侍中藻性謙退不求聞逹後出為丹陽尹大通六年入為尚書左僕射加侍中藻固辭不就詔不許後魏武昌簡王平原道武子河南王曜之孫也平原有五子長子和為沙門捨其子顯以爵讓其次弟鑒鑒固辭詔許鑒身終之後令顯襲爵鑒乃受之京兆王繼道武曽孫南平王霄第二子也以藩王宿官舊貴孝文時厯内外顯任意遇已隆靈太后臨朝入居心膂兼處門下厯轉台司繼子乂又居權重榮赫一世繼頻表遜位乞以司徒授崔光詔遣侍中安豐王延明給事中黄門侍郎盧同敦勸繼又啟固讓轉太保侍中如故加後部鼔吹頻表陳辭不許又轉太傅侍中如故頻讓不許又遣使敦勸乃受之靈太后臨朝除特進驃騎將軍侍中領軍如故繼頻表固辭許之及門下八座奏追論繼太和中慰諭髙車安輯四鎮之勲増邑一千五百戸繼又上表陳讓詔聽减五百陽城王長夀景穆之子也長夀子徽為吏部尚書加侍中征東將軍遷武衛將軍右光祿大夫拜尚書左僕射轉車騎將軍儀同三司固辭不拜聽解侍中然後受詔後以從莊帝北廵之功除侍中大司馬太尉公邑二萬户徽表辭官封前後屢上又啟云河上之功將士之力求回所封加諸勲義徽為莊帝親侍内懼爾朱榮等故有此辭以防外議莊帝識其意聽其辭封不許讓官彭城王勰獻文子也孝文時為中書監侍中孝文南討漢陽假勰中軍大將軍加鼓吹一部勰以寵授頻煩乃面陳曰臣聞兼親踈而兩並異同而建此既成文於昔臣願誦之於後陳思求而不允愚臣不請而得豈但今古云殊遇否大異非徒曹植逺羨於臣是亦陛下賤魏文而不顧帝大笑執勰手曰二曹才名相忌吾與汝以道徳相親緣此而言無慙前烈汝但克巳復禮更何多及又從孝文征沔北及車駕還京行飲至䇿勛之禮増邑一千戸勰辭曰臣受遇緣親榮枯事等以此獲賞深乖情願乞追成㫖用息謗言詔以勰為司徒太子太傅髙陽王雍獻文子也靈太后時鎮司州牧詔雍乗步挽出入掖門又以本官錄尚書事雍頻表辭遜優荅不許詔侍中敦諭廣陵王羽獻文子也領廷尉卿車駕南討命羽留守羽表辭廷尉不許趙郡王幹獻文子也幹子諶為鴻臚少卿遷後將軍泗州刺史固辭不拜後以親例封上蔡縣開國公食四百戸讓而不受後周齊王憲太祖第五子髙祖時累有戰功自以威名日重潛思屏退及帝欲親征北蕃乃辭之以疾帝變色曰汝若憚行誰為吾使憲懼曰臣陪奉鑾輿誠為本願但身嬰疹疾不堪領兵帝許之隋觀徳王䧺髙祖族子也初改封安徳王嵗餘授懐州刺史尋拜京兆尹帝親征吐谷渾詔雄總管澆河道諸軍及還改封觀徳王上表讓曰臣早逄興運預班末屬有命有時藉風雲之㑹無才無徳濫公卿之首䝉先皇不次之賞荷陛下非分之恩乆紊台槐常慮盈滿豈可仍叨匪服重竊鴻名臣實面墻敢緣往例臣誠昧寵交懼身責昔劉賈封王豈備二階之任曹洪上將寕超五等之爵况臣衮章踰於帝子京尹亞於皇枝錫土列藩紐金開國於臣何以自處在物謂其乖分是以露欵執愚蘄恩固守伏願陛下曲留睿炤特鑒丹誠頻觸宸嚴伏増流汗優詔不許唐宋王成器睿宗子也𤣥宗先天初進位太尉成器固辭太尉之命帝嘉其意許之制曰宋王成器温良恭儉明允篤誠朕之元昆人之師表間者鼎席虚位台陛俟能堅守讓詞願移成命冝聫華於補職更叅議於論道可開府儀同三司開元十四年兼太常卿成器又上言曰臣聞選賢任職量能授官茍非其才坐貽厥咎臣本愚劣累忝榮任叨居禮樂之司實乖河海之任吹庭鍾鼓克諧謝於昔人踈署威儀為政慙於徃哲僶俛從事于兹六年詩稱素餐於是乎在伏惟開元神武皇帝陛下繼業昭暢仁化清和乗暇奏薫風之琴追賞聚雲和之曲典章斯備雅亮攸歸逺美咸英獨冠區宇臣幸膺國戚乆亞台陛兼管寺卿實黷朝憲惡盈之誡列在前經過寵之談復聞斯日願矜其庸昧授以良能人無異言官無曠位伏使晨趨北闕奉漢幄之龍顔夕赴西園飛魏庭之華葢則臣之願畢矣聖主之恩深矣不任竦望翹勤之至謹詣朝堂奏表陳讓以聞帝覽表重違其意手詔曰開府儀同三司兼太常卿寧王憲秉徳夷逺體道淳深頃以茂親典司宗社禮經之文既備鍾律之度已和成而不居謙以自牧固辭兼領情所重違宜遂雅懐俾停劇務專政夫並建周親藩屏王室所以深根固本為不可㧞者也故詩曰大宗維翰又曰懐徳維寕是以内有骨肉之親外有藩翼之衛强弱相制枝葉相持此周漢所以為徳也吴晉之後法制過差始以親親假其勢位終以驕蹇顓乎威福或本根之莫庇或干戈之日尋小者踰越法度大者傾敗邦政斯所謂寵之適所以禍之也得失之際可不鑒哉是以著其始終盛衰之變以存厯代之戒焉魏曹爽太祖族子真之子也為大將軍假節鉞都督中外諸軍事錄尚書事封武安侯邑萬二千户賜劔履上殿入朝不趨贊拜不名丁謐畫䇿使爽白天子發詔轉宣王為太傅外以名號尊之内欲令尚書奏事先來由已得制其輕重也吴孫峻大帝末為侍中受遺輔政領武衛將軍既誅諸葛恪遷吴丞相大將軍督中外諸軍事初羣臣上奏共推峻為太尉議滕𦙍為司徒時有媚峻者以為大統冝在公族若滕𦙍為亞公聲名素重衆心所附不可貳也乃表以峻為丞相又不置御史大夫士人皆失望矣孫綝廢帝時自偏將軍代孫峻為侍中武衛將軍領中外諸軍事知朝政景帝時綝一門五侯皆典禁兵權傾人主自吴國朝臣未嘗有也晉趙王倫既誅賈后遂為使持節大都督中外諸軍事相國侍中一依宣文輔魏故事百官總已聽於倫齊王冏既誅趙王倫因留輔政坐拜百官符勅臺府涇醟尊驕不一朝覲此狂恣不肅之容也天下莫不髙其功而慮其亡也冏終弗改遂至夷㓕成都王頴為太尉大將軍都督中外諸軍假節加黄鉞錄尚書事鎮業及齊王冏之敗頴懸執朝政事無巨細皆就鄴諮之東安王繇既誅楊駿後專斷刑賞威震内外㑹稽王道子為錄尚書都督中外諸軍事世子元顯時年十六為侍中心惡王恭請道子討之乃拜元顯為征虜將軍其先衛府及徐州文武悉配之于時王恭威鎮内外道子甚懼復引譙王尚之以為腹心尚之説道子曰藩伯彊盛宰相權輕宻宜樹置以自藩衛道子深以為然乃以其司馬王愉為江州刺史以備恭與尚之等日夜謀議以伺四方之隙王恭知之復舉兵以討尚之為名荆州刺史殷仲堪豫州刺史庾楷廣州刺史桓𤣥竝應之道子使人説楷曰本情相與可謂斷金往年帳中之飲結帶之言寧可㤀邪卿今棄舊交結新援㤀王恭疇昔陵侮之耻乎若乃欲委體而臣之若恭得志以卿為反覆之人必不相信何冨貴可保禍敗亦旋及矣楷怒曰王恭昔赴山陵相王憂懼無計我知事急即勒兵而至去年之事亦俟命而奮我事相王無相負者既不距恭反殺國寳自爾已來誰復敢攘袂於君之事乎庾楷實不能以百口助人屠㓕當與天下同舉誅鉏姦臣何憂府不開爵不至乎時楷已應恭檄正徴士馬信反朝廷憂懼於是内外戒嚴元顯攘袂慷慨謂道子曰去年不討王恭致有今役若復從其欲則太宰之禍至矣道子日飲醇酒而委事於元顯元顯雖年少而聰明多涉志氣果鋭以安危為己任尚之為之羽翼時相傅㑹者皆謂元顯有明帝神武之風於是以為征討都督假節統前將軍王絢左將軍謝琰及將軍桓之才毛㤗髙素等伐恭㓕之既而楊佺期桓𤣥殷仲堪等復至石頭元顯於竹里馳還京師遣丹陽尹王愷鄱陽太守桓放之新蔡内史何嗣潁川太守温詳新安太守孫㤗等發京邑士庻數萬人據石頭以拒之道子將出頓中堂忽有驚馬蹂藉軍中因而擾亂赴江而死者甚衆仲堪既知王恭敗死狼狽西走與桓𤣥屯于潯陽朝廷嚴兵相距内外騷然詔元顯甲仗百人入殿尋加散騎常侍中書令又領中領軍持節都督如故㑹道子有疾加以昏醉元顯知朝望去之謀奪其權諷天子解道子揚州司徒而道子不之覺元顯自以少年頓居權重慮有譏議於是以琅邪王領司徒元顯自為揚州刺史既而道子酒醒方知去職於是大怒而無如之何廬江太守㑹稽張法順以刀筆之才為元顯謀主交結朋援多樹親黨自桓謙以下諸貴遊皆歛袵請交元顯性苛刻生殺自己法順屢諌不納又發東土諸郡免奴為客者號曰樂屬移置京師以充兵役東土囂然人不堪命天下苦之矣既而孫恩乗釁作亂加道子黄鉞元顯為中軍以討之又加元顯錄尚書事然道子更為長夜之飲政無大小一委元顯時謂道子為東錄元顯為西錄西府車騎填凑東第門下可設雀羅矣元顯無良師友正言弗聞謟譽日至或以為一時英傑或謂為風流名士由是自謂無敵天下故驕侈日増帝又以元顯有翼亮之功加其所生母劉氏為會稽王夫人金章紫綬㑹雒陽覆没道子以山陵幽辱上䟽送章綬請歸藩不許及太皇太后䘮詔道子乗輿入殿元顯因諷禮官下議稱已徳隆望重既錄百揆内外羣僚皆應盡敬於是公卿皆拜于時軍旅荐興國用虚竭自司徒已下日廪七升而元顯聚斂不已冨過帝室及謝琰為孫恩所害元顯求領徐州刺史加侍中後將軍開府儀同三司都督十六州諸軍事封其子彦璋為東海王尋以星變元顯解錄復加尚書令㑹孫恩至京口元顯栅斷石頭率兵距戰頻不利道子無佗謀畧唯日禱蔣侯廟為厭勝之術既而孫恩遁于北海桓𤣥復據上流致牋於道子曰賊造近郊以風不得進以雨不致火食盡故去耳非力屈也昔國寳卒後王恭不乗此威入統朝政足見其心非侮於明公也而謂之非忠今之貴要腹心有時流清望者誰乎豈可云無佳勝直是不能信之耳用理之人然後可以信義相期求利之徒豈有所惜而更委信邪爾来一朝一夕遂成今日之禍矣阿衡之重言何容易求福則立至干忤或致禍在朝君子豈不有懐但懼害及身耳𤣥忝任在逺是以披冩事實元顯覽而大懼張法順謂之曰桓𤣥承藉門資素有豪氣既并殷楊專有荆楚然桓氏世在西藩人或為用而第下之所控引止三吴耳孫恩為亂東土塗地編戸饑饉公私不贍𤣥必乗此縱其奸兇竊用憂之元顯曰為之奈河法順曰𤣥始據荆州人情未輯方就綏撫未遑佗計及其如此發兵誅之使劉牢之為前鋒而第下以大軍繼進桓𤣥之首必懸於麾下矣元顯以為然遣法順至京口謀於牢之而牢之有疑色法順還説元顯曰觀牢之顔色必二於我未若召入殺之不爾敗人大事元顯不從道子㝷拜侍中太傅置左右長史司馬從事中郎四人崇異之儀備盡盛典其驃騎將軍僚佐文武即配太傅府加元顯侍中驃騎大將軍開府征討大都督十八州諸軍事儀同三司加黄鉞班劍二十人以伐桓𤣥竟以牢之為前鋒法順又言於元顯曰自舉大事未有威斷桓謙兄弟每為上流耳目斬之以孤荆楚之望且事之濟不繼在前軍而牢之反覆萬一有變則禍敗立至可令牢之殺謙兄弟以示不貳若不受命當逆為其所元顯曰非牢之無以當桓𤣥且始事而誅大將人情必動二三不可于時揚土饑虚運漕不繼𤣥斷江路商旅遂絶於是公私匱乏士卒唯給粰橡大軍將發𤣥從兄驃騎長史石生馳使告𤣥𤣥進次尋陽傳檄京師罪狀元顯俄而𤣥至西陽帝戎服餞元顯于西池始登舟而𤣥至新亭元顯棄船退屯國子學堂明日列陣於宣陽門外元顯佐吏多散走或言𤣥已至大桁劉牢之遂降于𤣥元顯廻入宣陽門牢之叅軍張暢之率衆逐之衆潰元顯奔入相府唯張法順隨之問計於道子道子對之泣𤣥遣太傅從事中郎毛泰收元顯送於新亭縛於舫前而數之元顯答曰為王誕張法順所誤于是送付廷尉并其六子皆害之𤣥又奏道子酣縱不孝當棄市詔徙安成郡使御史杜竹林防衛竟承𤣥㫖酖殺之時年三十九帝三日哭於西堂宋彭城王義康為侍中都督南徐兖三州諸軍事司徒錄尚書事南徐州刺史與揚州刺史王𢎞共輔朝政𢎞既多疾且每事推謙自是内外衆務一斷之義康性好吏職鋭意文案既專總朝權事决自己生殺大事以錄命斷之凡事陳奏無不可方伯已下並委義康授用由是朝野輻凑勢傾天下後魏元义江陽王繼之第二子靈太后臨朝以義妹夫累遷侍中領軍既在門下兼總禁兵深為靈太后所信委及清河王懌被殺與髙陽王雍等輔政常直禁中孝明呼為姨夫自後專綜機要巨細决之威震於内外百寮重跡後周晉公宇文䕶文帝之兄子也為大冡宰武帝立百官總於䕶自文帝為丞相立左右十二軍總屬相府後皆受䕶處分凡所徴發非護不行䕶屯兵禁衛盛於宫闕事無巨細皆先斷後聞册府元龜卷二百九十四
