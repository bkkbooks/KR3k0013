body:
  text: 册府元龜卷七百四十五宋王欽若等撰陪臣部有詞聲子蔡大夫通使於晉為國通平事魯㐮公二十六年還如楚令尹子木與之語問晉故焉故事且曰晉大夫與楚孰賢對曰晉卿不如楚其大夫則賢皆卿材也如杞梓皮革自楚徃也杞梓皆木名雖楚有材晉實用之言楚亡臣多在晉子木曰夫獨無族姻乎夫謂晉對曰雖有而用楚材實多歸生聞之歸生聲子名善為國者賞不僣而刑不濫賞僣則懼及滛人刑濫則懼及善人若不幸而過寜僣無濫與其失善寜其利滛無善人則國從之從之亡也詩曰人之云亡邦國殄瘁無善人之謂也殄盡也瘁病也故夏書曰與其殺不辜寜失不經懼失善也不經不用常法啇頌有之曰不僭不濫不敢怠皇命于下國封建厥福言殷湯賞不僣差刑不濫溢不敢怠解自寛假故能為下國所命為天子此湯所以獲天福也古之治民者勸賞而畏刑樂行賞而憚用刑恤民不倦賞以春夏刑以秋冬順天時是以將賞為之加膳加膳則飫賜飫饜也酒食賜下無不饜足所謂加膳也此以知其勸賞也將刑為之不舉不舉則徹樂不舉盛饌此以知其畏刑也夙興夜寐朝夕臨政此以知其恤民也三者禮之大節也有禮無敗今楚多滛刑其大夫逃死於四方而為之謀主以害楚國不可救療所謂不能也療治也所謂楚人不能用其材也子儀之亂析公奔晉在文十四年晉人寘諸戎車之殿以為謀主殿後軍繞角之役晉將遁矣析公曰楚師輕窕易震蕩也若多皷均聲以夜軍之均同其聲楚師必遁晉人從之楚師宵潰晉遂侵蔡襲沈獲其君敗申息之師於桑隧獲申麗而還成公六年晉欒書救鄭與楚師遇於繞角楚師還晉侵沈獲沈子八年復侵楚敗申息獲申麗鄭於是不敢南面楚失華夏則析公之為也雍子之父兄譛雍子君與大夫不善是也不是其曲直雍子奔晉晉人與之鄐鄐晉邑以為謀主彭城之役晉楚遇於靡角之谷在成十八年晉將遁矣雍子發命於軍曰歸老㓜反孤疾二人役歸一人簡兵蒐乗簡擇蒐閲秣馬蓐食師陳焚次次舍也焚舍示必死明日將戰行歸者而逸楚囚欲使楚知之楚師宵潰晉降彭城而歸諸宋以魚石歸在元年楚失東夷子辛死之則雍子之為也楚東小國及陳見楚不能救彭城皆叛五年楚人討陳叛故殺令尹子辛子反與子靈爭夏姬子靈巫臣而雍害其事子反亦雍害巫臣不使得取夏姬子靈奔晉晉人與之邢邢晉邑以為謀主扞禦北狄通吳於晉教吳叛楚教之乗車射御驅侵使其子狐庸為吳行人焉吳於是伐巢取駕克棘入州來駕棘皆楚邑譙國鄼縣東北有棘亭楚罷於奔命至今為患則子靈之為也事見成七年若敖之亂伯賁之子賁皇奔晉晉人與之苖若敖亂在宣四年苖晉邑以為謀主鄢陵之役在成十六年楚晨壓晉軍而陳晉將遁矣苖賁皇曰楚師之良在其中軍王族而已言楚之精卒惟在中軍若塞井夷竈成陳以當之塞井夷竈以為陳欒范易行以誘之欒書時將中軍范燮佐之易行謂簡易兵備欲令楚貪已不復顧二穆之兵中行二郤必克二穆郤錡時將上軍中行偃佐之郤至佐新軍令此三人分良以攻二穆之兵楚子重子辛皆出穆王故曰二穆吾乃四萃於其王族必大敗之四萃四面集攻之晉人從之楚師大敗王夷師􅑒夷傷也吳楚之間謂火滅為􅑒子反死之鄭叛吳興楚失諸侯則苖賁皇之為也子木曰是皆然矣聲子曰今又有甚於此椒舉娶於申公子牟子牟得戾而亡君大夫謂椒舉女實遣之懼而奔鄭引領南望曰庻㡬赦余亦弗圖也言楚亦不以為意今在晉矣晉人將與之縣以比叔向以舉材能比叔向彼若謀害楚國豈不為患子木懼言諸王益其禄爵而復之聲子使椒鳴逆之椒鳴伍舉子傳言聲子有辭伍舉所以得反子孫復仕於楚向戍宋大夫如晉請弭諸侯之兵魯㐮公二十七年子木謂向戍請晉楚之從交相見也使諸侯從晉楚者更相朝見也向戍復於趙孟趙孟曰晉楚齊秦匹也晉之不能於齊猶楚之不能於秦也不能勝而使之楚君若能使秦君辱於敝邑寡君敢不固請於齊請齊使朝楚游吉鄭大夫鄭伯使游吉如楚魯㐮公二十八年及漢楚人還之曰宋之盟君實親辱君謂鄭伯今吾子來寡君謂吾子姑還吾將使驛奔問諸晉而以告謂鄭君應來朝否子大叔即游吉也曰宋之盟君命將利小國而亦使安定其社稷鎭撫其民人以禮承天之休休福祿也此君之憲令而小國之望也憲法也寡君是故使吉奉其皮幣聘用乗皮束帛以嵗之不易聘於下執事言嵗有饑荒之難故鄭伯不得自朝楚今執事有命曰女何與政令之有必使而君棄而封守䟦渉山川蒙犯霜露以逞君心小國將君是望敢不唯命是聽無乃非盟載之言以闕君德而執事有不利焉小國是懼不然其何勞之敢憚其後鄭伯如晉魯昭公二十四年子大叔相相謂相其儀見范獻子獻子曰若王室何對曰老夫其國家不能恤敢及王室抑人亦有言曰嫠不恤其緯嫠寡婦也織者常苦緯少寡婦所宜憂而憂宗周之隕為將及焉恐禍及已今王室實蠢蠢焉蠢蠢動擾貌吾小國懼矣然大國之憂也吾儕何知焉吾子其早圖之詩曰缾之罄矣惟罍之耻罍大器缾小器常禀於罍者而所受罄盡則罍為無餘故耻也王室之不寜晋之耻也獻子懼而與宣子圖之宣子韓起乃徵㑹於諸侯期以明年其後葬晉頃公魯昭公三十年游吉弔且送葬魏獻子使士景伯詰之曰悼公之䘮子西弔子蟜送葬在襄十五年今吾子無貳何故弔葬共使無有副貳對曰諸侯所以歸晉君禮也禮也者小事大大字小之謂事大在共其時命隨時共所求字小在恤其所無以敝邑居大國之間共其職貢與其備御不虞之患豈忘共命言不敢忘共命以所備御者多不及辦之先王之制諸侯之䘮士弔大夫送𦵏唯嘉好聘享三軍之事於是乎使卿晉之䘮事敝邑之間先君有所助執紼矣紼輓索也禮送葬必執紼若其不間雖士大夫有所不獲數矣不得如先王禮數大國之惠亦慶其加慶善也謂善其君自行而不討其乏明底其情底致也取備而已以為禮也靈王之䘮在㐮二十九年我先君簡公在楚我先大夫印叚實徃敝邑之少卿也少年少也王吏不討恤所無也今大夫曰女盍從舊盍何不也舊有豐有省不知所從從其豐則寡君㓜弱是以不共從其省則吉在此矣唯大夫圖之晉人不能詰蹶由吳子弟也楚子以諸侯及東夷伐吳魯昭五年薳射以繁揚之師㑹於夏汭㑹楚子越大夫常壽過帥師㑹楚子于𤨏𤨏楚地聞吳師出薳啓疆帥師從之從吳師也遽不設備吳人敗諸鵲岸廬江舒縣有鵲尾渚楚子以馹至於羅汭馹傳也羅水名吳子使蹶由犒師犒勞楚人執之將以釁皷王使問焉曰女卜來吉乎對曰吉寡君聞君將治兵於敝邑卜之以守龜曰余亟使人犒師請行以觀王怒之疾徐而為之備尚克知之言吳命龜如此龜兆告吉曰克可知也君若歡焉好逆使臣兹敝邑休怠休觧也而忘其死亡無日矣今君奮焉震電馮怒馮盛也虐執使臣將以釁皷則吳知所備矣敝邑雖羸若早修完完器備其可以息師息楚之師難易有備可謂吉矣且吳社稷是卜豈為一人使臣獲釁軍皷而敝邑知備以禦不虞其為吉孰大焉國之守龜其何事不卜言常卜一臧一否其誰能常之城濮之兆其報在邲城濮戰楚卜吉其效乃在邲今此行也其庸有報志言吳有報楚意乃弗殺薳啓疆楚大宰楚子成章華之臺魯昭公七年願與諸侯落之宫室始成祭之為落臺今在華容城由薳啓疆曰臣能得魯侯薳啓疆來召公辭曰昔先君成公命我先大夫嬰齊曰吾不忘先君之好將使衡父照臨楚國鎭撫其社稷以輯寕爾民嬰齊受命于蜀蜀盟在成二年衡父公衡奉承以來弗敢失隕而致諸宗祧言奉成公此語以告宗祧曰我先君共王引領北望日月以冀冀魯朝傳序相授於今四王矣四王共康郟敖及靈王嘉惠未至惟㐮公之辱臨我䘮㐮公二十八年如楚臨康王䘮孤與其二三臣悼心失圖在哀䘮故社稷之不皇况能懐思君德皇暇也言有大䘮多不暇今君若歩玉趾辱見寡君趾足也寵靈楚國以信蜀之役致君之嘉惠是寡君既受貺矣何蜀之敢望言但欲使君來不敢望如蜀復有質子其先君鬼神實嘉頼之豈惟寡君君若不來使臣請問行期問魯見伐之期寡君將承質幣而見于蜀以請先君之貺請問也質之二切公如楚子服惠伯魯大夫季孫在晉為晉所執子服惠伯私於中行穆子私與之語魯昭公十三年曰魯事晉何以不如夷之小國魯兄弟也土地猶大所命能具若為夷棄之使事齊楚其何瘳於晉瘳差也親親與大賞共罰否所以為盟主也子其圖之諺曰臣一主二言一臣必有二主道不合得去事他國吾豈無大國言非獨晉可事穆子告韓宣子且曰楚滅陳蔡不能救而為夷執親將焉用之乃歸季孫惠伯曰寡君未知其罪合諸侯而執其老老尊卿稱若猶有罪死命可也死晉命也若曰無罪而惠免之諸侯不聞是逃命也何免之為請從君惠於㑹欲得盟㑹見遣不欲私去宣子患之謂叔向曰子能歸季孫乎對曰不能鮒也能鮒叔魚乃使叔魚叔魚見季孫曰昔鮒也得罪於晉君自歸於魯君蓋襄二十一年坐叔虎與欒氏黨并得罪微武子之賜不至於今武子季平子祖父也雖獲歸骨於晉猶子則肉之敢不盡情歸子而不歸鮒也聞諸吏將為子除館於西河西使近河其若之何且泣泣以信其言平子懼先歸惠伯待禮晏嬰齊大夫聘吳吳王問曰君子之行何如對曰君順懐之政治歸之不懐暴君之禄不居亂國之位君子見兆則退不與亂國俱滅不與暴君偕亡嬰又使楚楚王聞之謂左右曰齊遣晏子使寡人之國㡬至矣左右曰晏子天下之辯士也與之議國家之務則不如也與之論徃古之術則不如也王獨可以與晏子坐使有司束人過王王問之使言齊人善盗故束之是宜可以困之王曰善晏子至即與之坐語圖國之急務辨當世之得失再舉再窮王黙然無以凟居有間束徒以過之王曰何為者也有司對曰是齊人善盗束而詣吏王欣然大笑曰齊乃冠帶之國辯士之化固善盗乎晏子曰然物固有之王不見夫江南之樹乎名橘樹之江北則化為枳何則地土使然乎夫人處齊之時冠帶而立􅌂有伯夷之亷今居楚而善盗意土地之化俗使然乎王又何怪乎祝佗衛大夫劉文公㑹諸侯伐楚魯定公四年將㑹衛子行敬子言於靈公子行敬子衛大夫曰㑹同難難得宜嘖有煩言莫之治也嘖至也煩言忿争其使祝佗從公曰善乃使子魚子魚即祝佗子魚辭曰臣展四體以率舊職猶懼不給而煩刑書若又共二共二職徼大罪也且夫祝社稷之常𨽻也𨽻賤臣也社稷不動祝不出竟官之制也社稷動謂國遷君以軍行祓社釁皷師行先有事祓禱於社謂之宜社於是殺牲以血塗皷􅎏為釁皷祝奉以從奉社主也於是乎出竟若嘉好之事謂朝㑹君行師從二千五百人卿行旅從五百人臣無事焉公曰行也及臯鼬將盟將長蔡於衛欲令蔡先衛㰱衛侯使祝佗私於萇𢎞曰聞諸道路不知信否若聞蔡將先衛信乎萇𢎞曰信蔡叔康叔之兄也蔡叔周公兄康叔周公弟先衛不亦可乎子魚曰以先王觀之則尚德也昔武王克商成王定之選建明德以藩屏周故周公相王室以尹天下尹正也於周為睦睦親厚也以盛德見親厚分魯公以大路大旂魯公伯禽也此大路金路錫同姓諸侯車也交龍為旂周禮同姓以封夏后氏之璜璜美玉名封父之繁弱封父古諸侯也繁弱大弓名殷民六族條氏徐氏蕭氏索氏長勺氏尾勺氏使帥其宗氏輯其分族將其類醜醜衆也以法則周公用即命于周即就也使六族就周受周公之法制是使之職事于魯共魯公之職事以昭周公之明德昭顯也分之土田陪敦陪増也敦厚也祝宗卜史大祝宗人大卜太史凡四官祝備物典策典策春秋之制官司彛器官司百官也彛器常用器因商奄之民商奄國名也與四國流言或迸散在魯皆令即屬魯懐柔之命以伯禽伯禽周公世子時周公惟遣伯禽之國故皆以付伯禽而封於少皥之虚少皥虚曲阜也在魯城内分康叔康叔衛之祖以大路少帛綪茷旃旌少帛雜帛也綪茷大赤取染草名也通帛為旃析羽為旌大呂鐘名殷民七族陶氏施氏繁氏錡氏樊氏饑氏終葵氏封畛土略自武父以南及圃田之北竟畛塗所徑也略界也武父衛北界圃田鄭藪名取於有閻之土以共王職有閻衛所受朝宿邑蓋近京畿取於相土之東都以㑹王之東蒐為湯沐邑王東廵守以助祭泰山􅅨季授土􅅨季周公弟司空陶叔授民陶叔司徒命以康誥而封於殷虚康誥周書殷虚朝歌也皆啓以商政疆以周索皆魯衛也啓開也居殷故地因其風俗開用其政疆理土地以周法索法也分唐叔唐叔晉之祖以大路宻須之皷宻須國名闕鞏甲名沽洗鐘名懐姓九宗職官五正懐姓唐之餘民九宗一姓為九族職官五正五官之長命以唐誥而封於夏虚唐誥誥命篇名也夏虚大夏今太原晉陽也啓以夏政亦因夏風俗聞用其政疆以戎索太原近戎而寒不與中國同故自以戎法三者皆叔也而有令德故昭之以分物不然文武成康之伯猶多而不獲是分也惟不尚年也管蔡啓商惎間王室惎毒也周公攝政管叔蔡叔開道紂子禄父以毒亂王室王於是乎殺管叔而蔡蔡叔周公承王命以討二叔蔡放也以車七乗徒七十人與蔡叔車徒而放之其子蔡仲改行帥德周公舉之以為已卿士為周公臣見諸王而命之以蔡命為蔡侯其命書云王曰胡無若爾考之違王命也胡蔡仲名若之何其使蔡先衛也武王之母弟八人周公為大宰康叔為司冦􅅨季為司空五叔無官豈尚年哉五叔管叔鮮蔡叔度成叔武霍叔處毛叔􅅨也曹文之昭也文王子與周公異母晉武之穆也武王子曹為伯甸非尚年也以伯爵居甸服言小今將尚之是反先王也晉文公為踐土之盟衛成公不在夷叔其母弟也猶先蔡踐土召陵二㑹經書蔡在衛上霸主以國大小之序也子魚所言盟㰱之次其載書云王若曰晉重文公魯申僖公衛武叔武蔡甲午莊侯鄭捷文公齊潘昭公宋王臣成公莒期兹丕公也齊序鄭下周之宗盟異姓為後藏在周府可覆視也吾子欲復文武之略略道也而不正其德將如之何萇𢎞説告劉子與范獻子謀之乃長衛侯於盟叔孫武叔魯大夫也定公十年郈宰侯犯以郈叛武叔懿子圍郈弗克是年侯犯奔齊齊人乃致郈武叔聘于齊謝致郈也齊侯享之曰子叔孫若使郈在君之他竟寡人何知焉屬與敝邑際故敢助君憂之以致郈徳叔孫對曰非寡君之望也所以事君封疆社稷是以以猶為也敢以家𨽻勤君之執事夫不令之臣天下之所惡也君豈以為寡君賜言義在討惡非所以賜寡君太宰嚭陳大夫吳夫差侵陳魯哀公元年秋斬祀殺厲祀神位有屋樹者厲疫病吳侵陳以魯哀元年秋師還出竟嚭使於師夫差謂行人儀曰是夫也多言盍嘗問焉師必有名人之稱斯師也者則謂之何太宰行人官名也夫差吳子光之子盍何不也嘗猶試也夫差修舊怨庻㡬其師有善名太宰嚭曰古之侵伐者不斬祀不殺厲不獲二毛獲謂係虜之毛鬢髪班白今斯師也殺厲與其不謂之殺厲之師與欲微攻之故其言似若不審然正言殺厲重人曰反爾地歸爾子則謂之何子謂所獲民臣曰君王討敝邑之罪又矜而赦之師與有無名乎又微勸之終其意吳楚僣號稱王子服景伯魯大夫魯哀公七年㑹吳于鄫吳欲霸中國吳來徵百牢子服景伯對曰先王未之有也吳人曰宋百牢我是時吳過宋得百牢魯不可以後宋且魯牢晉大夫過十晉大夫范鞅也在昭二十一年吳王百牢不亦可乎景伯曰晉范鞅貪而棄禮以大國懼敝邑故敝邑十一牢之君若以禮命於諸侯則有數矣有常數若亦棄禮則有滛者矣滛過也周之王也制禮上物不過十二上物天子之牢以為天之大數也天有十二次故制禮象之今棄周禮而曰必百牢亦惟執事吳人弗聽景伯曰吳將亡矣棄天而背本違周為背本不與必棄疾於我捨棄凶疾来伐我乃與之其後哀公㑹單平公晉定公吳夫差于黄池十三年吳人將以公見晉侯子服景伯對使者曰王合諸侯則伯率侯牧以見於王伯王官伯侯牧方伯伯合諸侯則侯帥子男以見於伯伯諸侯長自王以下朝聘玉帛不同故敝邑之職貢於吳有豐於晉無不及焉以為伯也今諸侯㑹而君將以寡君見晉君則晉成為伯矣敝邑將改職貢魯賦於吳八百乘若為子男則將半邾以屬於吳半邾三百乗而如邾以事晉如邾六百乗且執事以伯召諸侯而以侯終之何利之有焉吳人乃止既而悔之謂景伯欺之將囚景伯景伯曰何也立後於魯矣何景伯名將以二乘與六人從遲速惟命遂囚以還及戸牖戸牖陳留外黃縣西北東昏城是謂大宰曰魯將以十月上辛有事於上帝先王季辛而畢何世有職焉有職於祭事自襄以來未之改也魯襄公若不㑹祝宗將曰吳實然言魯祝宗將告神云景伯不㑹坐為吳所囚吳人信鬼故以是恐之且謂魯不共而執其賤者七人何損焉大宰嚭言於王曰無損於魯而祗為名適為惡名不如歸之乃歸景伯子貢孔子弟子哀公七年吳大宰嚭召季康子康子使子貢辭大宰嚭曰國君道長言君長大於道路而大夫不出門此何禮也對曰豈以為禮畏大國也畏大國不敢虚國盡行大國不以禮命於諸侯茍不以禮豈可量也寡君既共命焉其老豈敢棄其國大伯端委以治周禮仲雍嗣之斷髪文身臝以為飾豈禮也哉有由然也大伯周大王之長子仲雍大伯弟也大伯仲雍譲其弟季歴俱適荆蠻遂有民衆大伯卒無子仲雍嗣立不能行禮致化故效吳俗言其權時制宜以辟災害非以為禮也端委禮衣也反自鄫以吳為無能為也棄禮知其不能覇也十二年公㑹吳於槖臯吳子使大宰嚭請尋盟尋鄫盟公不欲使子貢對曰盟所以周信也周固故心以制之制其義玉帛以奉之奉贄神明言以結之結其信明神以要之要以禍福寡君以為茍有盟焉弗可改也已若猶可改日盟何益今吾子曰必尋盟若可尋也亦可寒也尋重也寒歇也乃不尋盟十五年子服景伯如齊子貢為介陳成子館客使景伯子貢就館曰寡君使常告曰寡人願事君如事衛君言衛與齊同好而魯未肯景伯揖子貢而進之對曰寡君之願也昔晉人伐衛在定八年齊為衛故伐晉冠氏䘮車五百在定九年冠氏陽平館陶縣因與衛地自濟以西禚媚杏以南書社五百二十五家為一社籍書而致之吳人加敝邑以亂在八年齊因其病取讙與闡亦在八年寡君是以寒心若得視衛君之事君也則固所願也成子病之乃歸成病其言也王孫茍吳大夫吳王夫差㑹諸侯于黃池魯哀公十三年既退乃使王孫茍告勞于周勞功也曰昔者楚人為不道不供承王事吾先君闔廬不貰不忍貰赦被甲𢃄劔挺鈹搢鐸挺㧞搢振以與楚昭王毒逐於中原栢舉栢舉戰在定四年毒暴也中原原中天舍其𠂻𠂻善也言天舍善於吳楚師敗績今齊侯任不鑒于楚任齊景公孫悼公之子簡公任也不鑒不以楚敗為鑒戒又不供承王命夫差不貰不忍被甲𢃄劔挺鈹搢鐸遵汶伐博齊别都䔲笠相望於艾陵䔲笠備雨器也相望言不避暑艾陵之戰在上傳曰五月克博至嬴天舍其𠂻齊師還言敗而還夫差豈敢自多文武實舍其𠂻文武二后敢使茍告於下執事周王答曰昔周室逢天之降禍遭民之不祥周王周景王子敬王匄也子朝簒立敬王出奔民成周之民助子朝者余心豈忘憂䘏不唯下土之不康靖不但憂四方乃憂王室今伯父曰戮力同德戮并伯父秉德已侈大哉惠子為魏惠王為法為法已成以示諸良人諸良人皆善之獻惠王惠王亦善之以示翟煎翟煎曰善惠王曰可行也翟煎曰不可惠王曰善而不可行何故煎曰今夫舉大木者前將輿諕後亦應之此其輿舉大木者善矣豈無鄭衛之音哉然不若此其宜也夫國亦木之大者也蘇秦在燕人有毁蘇秦者曰左右賣國反覆之臣也將作亂蘇秦恐得罪歸而燕王不復官也蘇秦見燕王曰臣東周之鄙人也無有分寸之功而王親拜之於廟而禮之於廷今臣為王却齊之兵而攻得十城宜以益親今來而王不官臣者人必有以不信傷臣於王者臣之不信王之福也臣聞忠信者所以自為也進取者所以為人也且臣之説齊王曽非欺之也臣棄老母於東周固去自為而行進取也今有孝如曽參亷如伯夷信如尾生得此三人者以事大王何若王曰足矣蘇秦曰孝如曽參義不離其親一宿於外王又安能使之歩行千里而事弱燕之危王哉亷如伯夷義不為孤竹君之嗣不肯為武王臣不受封侯而餓死首陽山下有亷如此王又安能使之歩行千里而行進取於齊哉信如尾生與女子期於梁下女子不來水至不去抱柱而死有信如此王又安能使之歩行千里却齊之强兵哉臣所謂以忠信得罪於上者也燕王曰若不忠信耳豈有以忠信而得罪者乎蘇秦曰不然臣聞客有逺為吏而其妻私於人者其夫將來其私者憂之妻曰勿憂吾已作藥酒待之矣居三日而夫果至妻使妾舉藥酒進之妾欲言酒之有藥則恐其逐主母也欲勿言乎則恐其殺主父也於是乎佯僵而棄酒主父大怒笞之五十故妾一僵而覆酒上存主父下存主母然而不免於笞惡在乎忠信之無罪也夫臣之遇不幸而類是乎燕王曰先生復就故官益厚遇之張儀在秦秦使使約復與楚親分漢中之半以和楚楚懐王曰願得張儀不願得地張儀聞之請之楚秦王曰楚且甘心於子柰何張儀曰臣善其左右靳尚靳尚又能得事於楚王幸姬鄭袖袖所言無不從者且儀以前使負楚以商於之約今秦楚大戰有惡臣非靣自謝楚不解且大王在楚不宜敢取儀誠殺儀以便國臣之願也儀遂使楚至懐王不見因而囚張儀欲殺之儀私於靳尚焉尚為請懐王曰拘張儀秦王必怒天下見楚無秦必輕王矣又謂夫人鄭袖曰秦王甚愛張儀而王欲殺之今將以上庸之地六縣賂楚以美人聘楚王以宫中善歌者為之媵楚王重地秦女必貴而夫人必斥矣夫人不若言而出之鄭袖卒言張儀於王而出之儀出懐王因善遇儀儀因説楚王以叛從約而與秦合親約婚姻張儀已去屈原使從齊來諫王曰何不誅張儀懐王悔使人追儀弗及冊府元龜卷七百四十五
