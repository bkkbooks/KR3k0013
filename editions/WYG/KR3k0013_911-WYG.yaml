body:
  text: 册府元龜卷九百十一宋王欽若等撰總録部偽政第二王莽建國元年正月朔莽帥公侯卿士奉皇太后璽韍韍謂璽之組上太皇太后順符命去漢號焉初莽妻宜春侯王氏女立為皇后王訢為丞相初封宜春侯傳爵至孫咸莽妻咸之女本生四男宇獲安臨二子前誅死安頗荒忽廼以臨為皇太子安為新嘉辟辟君也謂之辟者取為國君之義封宇子六人千為功隆公夀為功明公吉為功成公宗為功崇公世為功昭公利為功著公大赦天下莽乃䇿命孺子曰咨爾嬰昔皇天佑乃太祖佑助也歴世十二享國二百一十載厯數在於予躬詩不云乎侯服於周天命靡常言殷之後嗣乃為諸侯服事周室天命無常也封爾為定安公永為新室賔於􅃧敬天之休休美也往踐乃位毋廢予命又曰其以平原安徳漯隂鬲重丘凡户萬五縣也地方百里為定安公國立漢祖宗之廟於其國與周後竝行其正朔服色世世以事其祖宗永以令徳茂功享厯代之祀焉以孝平皇后為定安太后讀䇿畢莽親執孺子手流涕􅒣欷曰昔周公攝位終得復子明辟今予獨廹皇天威命不得如意哀歎良乆中傅将孺子下殿北面而稱臣百寮陪位莫不感動又按金匱輔臣皆封拜以太傅左輔驃騎将軍安陽侯王舜為太師封安新公大司徒就徳侯平晏為太傅就新公少阿義和京兆尹紅休侯劉歆為國師嘉新公廣漢梓潼哀章為國将美新公是為四輔位上公太保後丞承陽侯甄邯為大司馬承新公丕進侯王尋為大司徒章新公歩兵将軍成都侯王邑為大司空隆新公是為三公大阿右拂大司空衛将軍廣陽侯甄豐為更始将軍廣新公京兆王興為衛将軍奉新公輕車将軍成武侯孫建為立國将軍成新公京兆王盛為前将軍崇新公是為四将凡十一公王興者故城門令史王盛者賣餅人莽按符命求得此姓名十餘人兩人容貌應卜相徑從布衣登用以視神焉餘皆拜為郎莽封拜卿大夫侍中尚書官凡數百人諸劉為郡守皆徙為諫大夫改明光宫為定安館定安太后居之以故大鴻臚府為定安公第皆置門衛使者監領敕阿乳母不得與語常在四壁中令定安公居四壁中不得有所見至於長大不能名六畜後莽以女孫宇子妻之莽䇿羣司曰嵗星司肅東嶽太師典致時雨貌之不㳟是謂不肅敬也厥罰常雨常雨水也故申戒厥任使雨澤以時也衆物生於東方故戒太師也青煒登平考景以晷煒青氣之光輝也言青陽之氣始升而上以成萬物也春秋分立表以正東西東日之始出也考景以晷屬焉營惑司哲南嶽太傅典致時燠視之不明是謂不哲哲智也厥罰常燠燠暑也南方盛陽之位太傅師尊之稱故戒之也赤煒頌平考聲以律頌寛頌也夏假也物假大乃宣平也六月隂氣之始故為地綂地之中數六六為律律有形有色色尚黄故考聲以律屬焉太白司艾西嶽國師典致時陽言之不從謂之不艾艾安也厥罰常陽陽旱也白煒象平考量以銓量斗斛也銓權衡也象形也萬物無不成形於西方大小輕重皆可知故稱量屬焉辰星司謀北嶽國将典致時寒聴之不聰是謂不謀謀圖也厥罰常寒北伏也陽氣伏於下隂主殺故戒國将𤣥煒和平考星以漏推五星行度以漏刻也和合也萬物皆合蔵於北方水又主平故曰和平厯度起於斗分日月紀於攝提攝提值斗杓所指以建時節故考星屬焉月刑元股左司馬典致武應考方法矩月為刑司馬主武又典兵故使主威刑也主司天文欽若昊天敬授民時力來農事以豐年榖欽敬若順力來勸勉之也日徳元肱右司馬典致文瑞考圜合規日為陽位肱圜也五教在寛則和氣感物四靈見象故文瑞屬焉主司人道五教是輔帥民承上宣美風俗五品乃訓五教謂父義母慈兄友弟恭子孝也五品謂仁義禮智信也斗平元心中司空典致物圖考度以繩斗北斗也主齊七政司空主水土土為中故責之中央為四季土土者信信者直故為繩也主司地里平治水土掌名山川衆殖鳥獸蕃茂草木各䇿命以其職如典誥之文置大司馬司允允信也大司徒司直太司空司若若順也位皆孤卿更名大司農曰義和後更為納言大理曰作士太常曰秩宗大鴻臚曰典樂少府曰共工水衡都尉曰予虞與三公司卿凡九卿分屬三公毎一卿置大夫三人一大夫置元士三人凡二十七大夫八十一元士分主中都官諸職更名光禄勲曰司中太僕曰太御衛尉曰太衛執金吾曰奮武中尉曰軍正又置大贅官主乗輿服御物贅聚也言財物所聚也後又典兵秩位皆上卿號曰六監改郡太守曰大尹都尉曰大尉縣令長曰宰御史曰執法公車司馬曰王路四門長樂宫曰常樂室未央宫曰夀成室前殿曰王路室如言路寝也長安曰常安更名秩百石曰庶士三百石曰下士四百石曰中士五百石曰命士六百石曰元士千石曰下大夫比二千石曰中大夫二千石曰上大夫中二千石曰卿車服黻冕各有差品黻謂衣裳之黻又置司恭司徒司明司聰司中大夫及誦詩工徹膳宰以司過䇿曰予聞上聖欲昭厥徳㒺不慎修厥身用綏於逺是用建爾司於五事毋隱尤毋將虛尤過也將助也虛謂虛羙也言勿隱吾過而助為虛羙也好惡不愆立於厥中愆過也於戲朂哉朂勉也令王路設進善之旌誹謗之木敢諫之皷諫大夫四人嘗坐王路門受言事者封王氏齊衰之屬為侯大功為伯小功為子緦麻為男其女皆為任任充也男服之義男亦任也男以睦女以隆為號焉睦隆皆其受封邑之號取嘉名皆授印韍韍印之組令諸侯立大夫人夫人世子亦授印韍又曰天無二日民無二王百王不易之道也漢氏諸侯或稱王至於四夷亦如之違於古典繆於一統其定諸侯王之號皆稱公及四夷僣號稱王者皆更為侯又曰帝王之道相因而通盛徳之祚百世享祀予惟黄帝帝少昊帝顓頊帝嚳帝堯帝舜帝夏禹臯陶伊尹咸有聖徳假於皇天假至也功烈巍巍光施於逺予甚嘉之營求其後將祚厥祀惟王氏虞帝之後也出自帝嚳劉氏堯之後也出自顓頊於是封姚恂為初睦侯奉黄帝後姚舜姓故為黄帝後梁䕶為脩逺伯奉少昊後以為伯益之後故封皇孫功隆公千奉帝嚳後劉歆為祁烈伯奉顓頊後國師劉歆子疊為伊休侯奉堯後劉歆為祁烈伯又言國師劉歆子為伊休侯是則祁烈伯自别一劉歆非國師也媯昌為師睦侯奉虞帝後山遵為褒謀子奉臯陶後伊𤣥為褒衡子奉伊尹後漢後定安公劉嬰位為賔周後衛公姬黨更封為章平公亦為賔殷後宋公孔𢎞運轉次移更封為章昭侯位為恪恪敬也言待之加敬亦如賔也周以舜後并杞宋為三恪夏後遼西姒豐封為章功侯亦為恪姒夏姓四代古宗宗祀於明堂以配皇始祖考虞帝周公後褒魯子姬就宣尼公後褒成子孔鈞已前定焉莽又曰予前在攝時建郊宫定祧廟立社稷神祗報况况賜也或光自上復於下流為烏或黄氣熏蒸昭燿章明以著黄虞之烈焉烈餘業也自云承黄虞之後自黃帝至於濟南伯王而祖世氏姓有五矣濟南伯王莽之髙祖黄帝二十五子分賜厥姓十有二氏虞帝之先受姓曰姚其在陶唐曰媯在周曰陳在齊曰田在濟南曰王予伏念皇初祖考黃帝皇始祖考虞帝以宗祀於明堂宜序於祖宗之親廟其立祖廟五親廟四后夫人皆配食郊祀黃帝以配天黃后以配地黄帝之后也以新都侯東第為大禖嵗時以祀禖祀也立此大祀帝以嵗時祀其先也家之所尚種祀天下言國已立大禖祀先祖矣其衆庶之家所尚者各令傳祀勿絶普天之下同其法姚媯陳田王氏凡五姓者皆黄帝苗裔予之同族也書不云乎惇序九族惇厚也其令天下上此五姓名籍於秩宗皆以為宗室世世復無有所與其元城王氏勿令相嫁娶元城王氏不復與四姓婚娶以其同祖也餘他王氏則不禁焉以别族理親焉封陳崇為統睦侯奉胡王後追王陳胡公田封為世睦侯奉敬王後追王陳敬仲天下牧守皆以前有翟義趙明等領州郡懷忠孝封牧為男守為附城又封舊恩戴崇金渉箕閎楊竝等子皆為男遣騎都尉囂等分治黃帝園位於上都橋畤橋山之上故曰橋畤虞帝於零陵九嶷胡王於淮陽陳敬王於齊臨淄愍王於城陽莒齊愍王伯王於濟南東平陵孺王於魏郡元城莽之髙祖名遂字伯紀曽祖名賀字翁孺故謂之伯王孺王使者四時致祠其廟當作者以天下初定且祫祭於明堂太廟以漢髙廟為文祖廟欲法舜受終於文祖莽曰予之皇始祖考虞帝受禪於唐漢氏初祖唐帝世有傳國之象堯傳舜漢傳莽自以舜後故言有傳國之象予復親受金䇿於漢髙皇帝之靈惟思襃厚前代何有忘時漢氏祖宗有七漢本紀祖宗有四莽以元帝成帝平帝為宗故有七以禮立廟於定安國其園寢廟在京師者勿罷祠薦如故予以秋九月親入漢氏髙元成平之廟諸劉更屬籍京兆大尹勿解其服各終厥身州牧數存問勿令有侵寃又曰予前在大麓至於攝假大麓者謂為大司馬宰衡時妄引舜納於大麓烈風雷雨不迷也攝假謂初為攝皇帝又為假皇帝深惟漢氏三七之阨赤徳氣盡思索廣求索亦求也所以輔劉延期之術靡所不用以故作金刀之利幾以濟之然自孔子作春秋以為後王法至於哀之十四而一代畢協之於今亦哀之十四也漢哀帝即位六年平帝五年居攝三年凡十四年赤世計盡終不可强濟皇天明威黃徳當興隆顯大命屬予以天下今百姓咸言皇天革漢而立新革改也廢劉而興王夫劉之為字卯金刀也正月剛卯金刀之利皆不得行剛卯以正月卯日作佩之長三寸廣一寸四分或用玉或用金或用桃著革帶佩之銘其一面曰正月剛卯金刀莽錢也莽以劉字上有卯下有金旁又有刀故禁剛卯及金刀也博謀卿士僉曰天人同應昭然著明其去剛卯莫以為佩除刀錢勿以為利承順天心快百姓意四月徐鄉侯劉快起兵攻即墨快兄殷扶崇公閉城自繫獄吏民拒快快敗走至長廣死莽曰昔予之祖濟南愍王困於燕寇自齊臨淄出保於莒宗人田單廣設竒謀獲殺燕将復定齊國今即墨士大夫復同心殄滅反虜予甚嘉其忠者憐其無辜其赦殷等非快之妻子他親屬當坐者皆勿治弔問死傷賜亡者葬錢人五萬殷知大命深疾惡快以故輙伏厥辜其滿殷國萬户地方百里又封符命臣十餘人是秋遣五威將王竒等十二人班符命於天下徳祥五事符命二十五福應十二凡四十二篇其徳祥言文宣之世黄龍見於成紀新都髙祖考王伯墓門梓柱生枝葉之屬符命言井石金匱之屬福應言雌雞化為雄之屬其文爾雅依託皆為作說爾雅近正也謂近於正經依古義而為之説大歸言莽當代漢有天下云總而說之曰帝王受命必有徳祥之符瑞協成五命申以福應五命謂五行之次相承以受命也申重也然後能立巍巍之功傳於子孫永享無窮之祚故新室之興也徳祥發於漢三七九世之後二百一十嵗九天子也肇命於新都受瑞於黄支獻生犀開王於武功定命於子同梓潼縣名莽改也成命於巴宕巴郡宕渠縣也申福於十二應天所以保佑新室者深矣固矣武功丹石出於漢氏平帝末年火徳銷盡土徳當代皇天眷然去漢與新以丹石始命於皇帝皇帝謙譲以攝居之未當天意故其秋七月天重以三能文馬能三台星也文馬縞身金精周成王時犬戎獻之皇帝復謙譲未即位故三以鐡契四以石龜五以虞符六以文圭七以𤣥印八以茂􅁜石書九以𤣥龍石十以神井十一以大神石十二以銅符帛圖申命之瑞寖以顯著寖漸至於十二以昭告新皇帝深惟上天之威不可不畏故去攝號猶尚稱假改元為初始欲以承塞天命克厭上帝之心塞當也厭滿也然非皇天所以鄭重降符命之意鄭重猶言頻煩也故是日天復决其所以勉書哀帝所作䇿書也言數有瑞應莽自謙居攝天復决疑勸勉令為真也又侍郎王盰見人衣白布單衣赤繢方領繢者㑹五綵也以布為單衣以赤加繢為其方領也冠小冠立於王路殿前謂盰曰今日天同色以天下人民屬皇帝同色者言五方天神共齊其謀同其顔色也字或作包包者言天總包括天下人衆而與莽也屬委也盰怪之行十餘歩人忽不見至丙寅暮漢氏髙廟有金匱圖䇿髙帝承天命以國傳新皇帝明旦宗伯忠孝侯劉宏以聞乃召公卿議未决而大神石人談曰趣新皇帝之髙廟受命毋留於是新皇帝立登車之漢氏髙廟受命受命之日丁卯也丁火漢氏之徳也卯劉姓所以為字也明漢劉火徳盡而傳於新室也皇帝謙譲既備固譲十二符應廹著命不可辭廹促也著明也懼然祗畏葦然憫漢氏之終不可濟懼然自失之意也葦然變動之貌也亹亹在左右之不得從意亹亹自勉之意左右助也言承漢室而廹天命不得從其本意也為之三夜不御寢三日不御食延問公侯卿大夫僉曰宜奉如上天威命於是乃改元定號海内更始新室既定神祗歡喜申以福應吉瑞累仍申重也仍頻也詩曰宜民宜人受禄於天保佑命之自天申之言有功徳宜於衆人者則受天福禄天乃保安而佑助之命以邦國也申謂重其意也此之謂也五威将奉符命齎印綬王侯以下及吏官名更者更改也外及匈奴西域徼外蠻夷皆即授新室印綬因收故漢印綬賜吏爵人二級民爵人一級女子百户羊酒蠻夷幣帛各有差大赦天下五威将乗乾文車畫天文象於車也駕坤六馬坤為牝馬六地數背負鷩鳥之毛服飾甚偉鷩雉屬即鵕䴊也每一将各置左右前後中帥凡五帥衣冠車服駕馬各如其方面色數色者東方青南方赤也數者若木數三火數二之類将持節稱太一之使帥持幢稱五帝之使莽䇿命曰普天之下迄於四表迄亦至也靡所不至其東出者至𤣥莬樂浪髙句驪夫餘夫餘亦東北夷也南出者隃徼外歴益州貶句町王為侯西出者至西域盡改其王為侯北出者至匃奴庭授單于印改漢印文去璽曰章單于欲求故印陳饒椎破之單于大怒而句町西域後卒以此皆畔莽置五威司命中城四闗将軍司命上公以下中城主十二城門䇿命統睦侯陳崇曰咨爾崇夫不用命者亂之原也大姦猾者賊之本也鑄偽金錢者妨寳貨之道也驕奢踰制者兇害之端也漏泄省中及尚書事者機事不宻則害成也易繫辭曰君不宻則失臣臣不宻則失身機事不宻則害成故引之拜爵王庭謝恩私門者禄去公室政從亡矣凡此六條國之綱紀是用建爾作司命柔亦不茹剛亦不吐不侮鰥寡不畏强禦皆詩美仲山甫之辭帝命帥繇統睦於朝帥循也命説符侯崔發曰重門擊柝以待暴客擊柝謂擊木以守夜也暴謂姦暴之人来為㓂害者也女作五威中城将軍中徳既成天下說符説音悦命明威侯王級曰繞霤之固南當荆楚繞霤者言四面塞阸其道屈曲谿谷之水囬繞而霤今商州界七盤十二繞是也女作五威前闗将軍振武奮衛明威於前命尉睦侯王嘉曰羊頭之阨北當燕趙羊頭山名在上黨壺闗縣女作五威後闗将軍壺口捶扼尉睦於後壺口亦山名也捶扼謂據險阨而捶擊也命堂威侯王竒曰殽渑之險東當鄭衛殽肴山也渑渑池也皆在陕縣之東女作五威左闗将軍函谷批難掌威於左批糾閉之也函谷故闗今在桃林縣界命懷𦍑子王福曰汧隴之阻西當戎狄汧扶風汧縣有呉山汧水之阻隴謂隴阺也汧隴相連女作五威右闗将軍成固據守懐𦍑於右二年二月赦天下五威将帥七十二人還奏事漢諸侯王為公者悉上璽綬為民無違命者封将為子帥為男禁民不得挟弩鎧徙西海匃奴單于求故璽莽不與遂㓂邉殺掠吏民莽更名單于匃奴曰降奴服于知知者莽改單于之名也本名囊知牙斯莽曰降奴服于知威侮五行引夏書甘誓之文背畔四條四條莽所與作制者侵犯西域延及邉陲為元元害罪當夷滅命遣立國将軍孫建等凡十二将十道竝出共行皇天之威罸于知之身于知先祖故呼韓邪單于稽侯㹪累世忠孝保塞守徼不忍以一知之罪滅稽侯㹪之世今分匈奴國土人民以為十五立稽侯㹪子孫十五人為單于遣中郎將藺苞戴級馳之塞下召拜當為單于者諸匈奴人當坐虜知之法者皆赦除之遣五威将軍苗訢虎賁将軍王況出五原厭難将軍陳欽震狄将軍王廵出雲中振武将軍王嘉平狄将軍王萌出代郡相威将軍李棽鎮遠将軍李翁出西河誅貉将軍陽俊討穢将軍嚴尤出漁陽奮武将軍王駿定胡将軍王晏出張掖及偏禆以下百八十人募天下囚徒丁男甲卒三十萬人轉衆郡委輸五大夫衣裘兵器糧食長吏送自負海江淮至北邉使者馳傳督趣以軍興法從事天下騷動先至者屯邉郡須畢具乃同時出初莽因漢承平之業匃奴稱藩北蠻賔服舟車所通盡為臣妾府庫百官之富天下晏然莽一朝有之其心意未滿謂愛惜之意未飽也陋小漢家制度以為疏濶莽以漢家制度為太疏􅷧而更其陋小宣帝始賜單于印璽與天子同而西南夷句町稱王莽乃遣使易單于印改句町王為侯二方始怨侵犯邉境莽遂興發三十萬衆欲同時十道竝出海内擾矣三年莽曰百官改更職事分移律令儀法未及悉定且因漢律令儀法以從事令公卿大夫諸侯二千石舉吏民有德行通政事能言語明文學者各一人詣王路四門是時諸将在邉須大衆集須待也吏士放縱而内郡愁於徴發民棄城郭流亡為盗賊并州平州尤甚莽令七公六卿號皆兼稱将軍遣著武将軍逯竝等填名都中郎将繡衣執法各五十五人分填縁邉大郡督大姦猾擅弄兵者皆便為姦於外撓亂州郡貨賂為市侵漁百姓莽下書曰虜知罪當夷滅故遣猛將分十二部將同時出一舉而决絶之矣内置司命軍正外設軍監十有二人誠欲以司不奉命令軍人咸正也今則不然各為權勢恐猲良民猲謂以威力脅之也妄封人頸得錢者去權臣妄以法枉良人為僮僕封其頸以别之也得顧錢乃去封毒蠭竝作農民離散司監若此可謂稱不自今以來敢犯此者輙捕繫以名聞然猶放縱自若而藺苞戴級到塞下招誘單于弟咸咸子登入塞脅拜咸為孝單于賜黄金千斤錦繡甚多遣去将登至長安拜為順單于留邸初匈奴侵㓂甚莽大募天下囚徒人奴名曰豬突豨勇豬性觸突人故取以喻東方名豕曰豨一曰豨豕走也一切税吏民訾三十而取一又令公卿以下至郡縣黄綬吏皆保養軍馬保者不許其死傷吏盡復以與民轉令百姓養之民揺手觸禁不得耕桑繇役煩劇而枯旱蝗虫相因又用制作未定上自公卿下至小吏皆不得奉禄而私賦斂貨賂上流獄訟不决吏用苛暴立威旁縁莽禁侵刻小民旁依也冨者不得自保貧者無以自存起為盗賊依阻山澤吏不能禽而覆蔽之浸滛日廣浸滛猶漸染也於是青徐荆楚之地徃徃萬數戰鬬死亡縁邉四夷有所係虜䧟罪饑疫人民相食及莽未誅而天下户口减半矣太師王舜自莽篡位後病悸寖劇死心動曰悸莽曰昔齊太公以淑德累世為周氏太師盖予之所監監見也其以舜子延襲父爵為安新公延弟襃新侯匡為太師將軍永為新室輔為太子置師友各四人秩以大夫以故大司徒馬宫為師疑故少府宗伯鳯為傅丞博士袁聖為阿輔京兆尹王嘉為保拂是為四師故尚書令唐林為胥附博士李充為奔走諌大夫趙襄為先後中郎将亷丹為禦侮是為四友又置師友祭酒及侍中諌議六經祭酒各一人凡九祭酒秩上卿琅琊左咸為講春秋潁川滿昌為講詩長安國由為講易平陽唐昌為講書沛郡陳威為講禮崔發為講樂祭酒遣謁者持安車印綬即拜楚國龔勝為太子師友祭酒勝不應徴不食而死寧始将軍姚恂免侍中崇禄侯孔永為寧始将軍四年二月赦天下厭難将軍陳歆言捕虜生口虜犯邉者皆孝單于咸子角所為莽怒斬其子登於長安以示諸蠻夷初西域都䕶但欽上書言匈奴南将軍右伊秩訾将人衆冦擊諸國莽於是大分匈奴為十五單于遣中郎将藺苞副校尉戴級将兵萬騎多齎珍寳至雲中塞下招誘呼韓邪單于諸子欲以次拜之使譯出塞誘呼右犂汗王咸咸子登助三人至則脅拜咸為孝單于賜安車皷車各一黃金千斤雜繒千疋戲㦸十戲㦸有旗之㦸也拜助為順單于賜黄金五百斤傳送助登長安莽封苞為宣威公拜為虎牙将軍封級為揚威公拜為虎賁將軍咸既受莽孝單于之號馳出塞歸庭具以見脅狀白單于單于更以為於粟置支侯匈奴賤官也後助病死莽以登代助為順單于厭難将軍陳歆震狄将軍王廵屯雲中葛邪塞是時匈奴數為邉㓂殺将率吏士掠人民毆畜産去甚衆捕得虜生口驗問皆曰孝單于咸子角數為㓂兩将以聞莽遂㑹諸蠻夷斬登大司馬甄邯死以孔永為大司馬侯輔為寧始将軍莽每出輙先摉索城中名曰横摉是月横摉五日莽至明堂授諸侯茅土下書曰予以不德襲於聖祖為萬國主思安􅀺元在乎建侯分九州正域以美風俗追監前代爰綱爰紀惟在堯典十有二州衛有五服詩國十五抪徧九州謂周南召南衛王鄭齊魏唐秦陳鄫曹豳魯商凡十五國也一曰周南召南邶鄘衛王鄭齊魏唐秦陳鄶曹豳是為十五國也殷頌有奄有九有之言啇頌𤣥鳥之詩湯有功德故能覆有九州禹貢之篇則無并幽周禮司馬則無徐梁帝王相改各有云為或昭其事或大其本厥義著明其務一矣昔周二后受命故有東都西都之居予之受命盖亦如之其以雒陽為新室東都常安為新室西都邦畿連體各有采任州從禹貢為九爵從周氏有五諸侯之員千有八百附城之數亦如之以俟有功諸公一國有衆萬户土方百里侯伯一國衆户五千土方七十里子男一則衆户二千有五百土方五十里附城大者食邑九成衆户九百土方三十里自九以下降殺以兩兩兩而䧏殺至於一成十里為成五差備具合當一則今已受茅土者公十四人侯九十三人伯二十一人子百七十一人男四百九十七人凡七百九十六人臣欽若等曰當是八百六人恐史誤附城千五百一十一人九族之女為任者八十三人及漢氏女孫中山承禮君遵德君脩義君更以為任十有一公九卿十二大夫二十四元士定諸國采邑之處使侍中講禮大夫孔秉等與州部衆郡曉知地理圖籍者共較治於壽成朱烏堂予數與羣公祭酒上卿親聽視咸已通矣夫襃德賞功所以顯仁賢也九族和睦所以襃親親也予永惟匪懈思稽前人稽考也将彰黜陟以明好惡安元元焉是時莽意方盛以為四夷不足吞滅專念稽古之事復下書曰伏念予之皇始祖考虞帝受終文祖在璇璣玉衡以齊七政遂類於上帝禋於六宗望秩於山川徧於羣神廵狩五嶽羣后四朝敷奏以言明試以功予之受命即真到於建國五年已五載矣陽九之阨既度百六之㑹已過嵗在壽星填在明堂倉龍癸酉德在中宫倉龍太嵗也太嵗起於甲寅為龍東方倉癸德在中宫也壽星角亢也東宫倉龍房心也心為明堂填星所在其國昌莽自謂土也土行主填星癸徳在中宫宫又土也觀晉掌嵗龜策告從觀辰星進退掌主也國語晉文公以卯出酉入過五鹿得土嵗在壽星其日戊申莽欲法之為吉祥正以二月建寅之節東巡狩者取萬物生之始也視晉識太嵗所在宿度所合卜筮皆吉故法之其以此年二月建寅之節東廵狩具禮儀調度郡公奏請募吏民人馬布緜又請内郡國十二買馬發帛四十五萬疋輸常安前後毋相須須待也至者過半莽下書曰文母太后體不安其且止待後是嵗改十一公號以新為心後乂改心為信五年二月文母皇太后終葬渭陵與元帝合而溝絶之葬於司馬門内作溝絶之立廟於長安新室世世獻祭元帝配食坐於牀下莽為太后服䘮三年大司馬孔永乞骸骨以同風侯逯竝為大司馬是時長安民聞莽欲都雒陽不肯繕治室宅繕補也或頗徹之莽曰𤣥龍石文曰定帝徳國雒陽符命著明敢不欽奉以始建國八年嵗纒星紀纒踐歴也星紀斗牛之間在雒陽之都其謹繕脩常安之都勿令壞敗敢有犯者輙以名聞請其罪冊府元龜卷九百十一
