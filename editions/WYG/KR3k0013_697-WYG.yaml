body:
  text: 册府元龜卷六百九十七宋王欽若等撰牧守部酷虐苛細驕逸邪佞酷虐孔子曰道之以政齊之以刑民免而無恥老子曰其政察察其民缺缺故歴代史官以酷吏敘傳者其貶惡亦深矣自秦網凝密不務敎化滅絶仁義殘及至親上之所行下有甚者至於守土之吏又何足論本其為術出於法家故其御民也若薙氏之去草既蕰崇之又行火焉漢承秦弊凡事簡易禁網疎濶僅至刑措然吏二千石而下以能挫豪猾威震郡國為己任者亦比比而有其弊也氷慘火烈鷹擊虎怒以刀鋸為治具流膏血於境内急若束濕害過屠伯充積寃氣鮮聞令終斯乃椎埋刻薄之人非鄉黨禮義之士任官茍失何世無之如狼牧羊誠非虚語則共理之政得不慎擇其循良也哉漢周陽由周陽姓由名也景帝時為郡守武帝即位吏治尚修謹然由居二千石中最為暴酷驕恣所愛者撓法治之所憎者曲法滅之撓亦屈曲也所居郡必夷其豪寗成為内史抵罪家居武帝欲以為郡守御史大夫公孫𢎞曰臣居山東為小吏時成為濟南郡尉其治如狼牧羊成不可令治民帝乃拜成為闗都尉歳餘闗吏税肄郡國出入闗者肄閱也號曰寧見乳虎無值寗成之怒猛虎産乳養䕶其子則搏噬過常故以喻也值當也其暴如此義縱為河内都尉至則族滅其豪穰氏之屬河内道不拾遺自河内遷為南陽太守聞闗都尉寗成家居南陽及至闗寗成側行送迎然縱氣盛弗為禮至郡遂案寗氏破碎其家成坐有罪及孔暴之屬皆奔亡南陽孔氏暴氏二家素豪猾者吏民重足一迹而平氏朱彊杜衍杜周為縱爪牙之吏任用平氏杜衍二縣名遷為廷尉史軍數出定襄定襄吏民亂敗於是徙縱為定襄太守縱至掩定襄獄中重罪二百餘人及賔客昆弟私入相視者亦二百餘人縱一切捕鞫曰為死罪解脱一切皆捕之也律諸囚徒私解脱桎梏鉗赭加罪一等為人解脱與同罪縱鞫相賂餉者二百人以為解脱死罪盡殺之鞫窮也謂窮治也是日皆報殺四百餘人奏請得報而論罪郡中不寒而慄猾民佐吏為治百姓有豪猾素為罪惡者今畏縱之嚴反為吏耳目助治公務以自效是時趙禹張湯為九卿矣然其治尚寛輔法而行縱以鷹擊毛摯為治言如鷹隼之擊奮毛羽執取飛鳥也後㑹更五銖錢白金起更改也民為姦京師尤甚迺以縱為右内史王温舒為中尉温舒至惡所為弗先言縱縱必以氣陵之言温舒雖酷惡而縱又甚也敗壊其功其治所誅死甚多然取為小治姦盜不勝直指始出矣吏之治以斬殺縛束為務閻奉以惡用矣王温舒為廣平郡尉擇郡中豪敢往吏十餘人為爪牙豪傑而性果敢一往無所顧者以為吏皆把其陰重罪而縱使督盜賊快其意所欲得此人雖有百罪弗法言所捕盜賊得其人而快温舒意者則不問其先所犯罪也法謂行法也即有避回夷之亦滅宗避回謂不盡意捕擊也以故盜不敢近廣平事具牧守屏盜門遷為河内太守素居廣平時皆知河内豪姦之家及往以九月至令郡具私馬五十疋為驛自河内至長安以私馬於道上往往置驛也部吏如居廣平時方畧捕郡中豪猾相連坐千餘家上書請大者至族小者乃死家盡沒入償贓以贓致罪者既沒入之又令出倍贓或收入官或還其主也奏行不過二日得可事論報至流血十餘里天子可其奏而論决之殺人既多故流血十餘里河内皆恠其奏以為神速盡十二月郡中無犬吠之盜其頗不得失之旁郡追求㑹春温舒頓足歎曰嗟乎令冬月益展一月足吾事矣立春之後不復行刑故云然展伸也其好殺行威不愛人如此尹齊為淮陽都尉所誅滅尤甚及死仇家欲燒其尸妻亡去歸塟田雲中祁連將軍廣眀之弟為淮陽守亦敢誅殺吏民守闕告之竟坐棄市嚴延年為涿郡太守疾惡太甚中傷者多尤巧為獄文善史書所欲誅殺奏成於手中主簿親近史不得聞知奏可論死奄忽如神冬月傳屬縣囚㑹論府上總集郡府而論殺流血數里河南號曰屠伯言延年殺人如屠兒之殺六畜伯長也令行禁止郡中清正尹賞為江夏太守捕格江賊及所誅吏民甚多坐殘賊免鄭昌為太原涿郡太守南陽太守𢎞之弟也昌用刑罰深不如𢎞平陳咸為南陽太守所居以殺罰立威豪猾吏及大姓犯法輒論輸府府謂郡之府以律程作司空司空主作役之官為地臼木杵舂不中程或私解脱鉗􅎂衣服不如法鉗在頸釱在足皆以鐵為之輒加罪笞督作劇不勝痛作程劇苦又被督察笞罰既多故不勝痛也自絞死歳數百千人久者蟲出腐爛家不得收後漢樊曄為天水太守政嚴猛好申韓法善惡立斷人有犯其禁者率不生出獄吏人及羌胡畏之凉州為之歌曰游子嘗苦貧力子天所富寧見乳虎穴不入冀府寺大笑期必死忿怒或見置嗟我樊府君安可再遭值李章為千乘太守坐誅斬盜賊過濫徵下獄免周紆為司𨽻校尉六年夏旱車駕自幸雒陽録囚徙二人被掠生蟲坐左轉騎都尉又為渤海太守每赦令到郡輒隠閉不出先遣使屬縣盡決刑罪乃出詔書坐徵詣廷尉免歸陽球為平原相天下大旱司空張顥條奏長吏苛酷貪汚者皆罷免之球坐嚴苛徵詣廷尉王吉中常侍甫之養子為沛相顓選剽悍吏擊斷非法若有生子不養即斬其父母合土棘埋之凡殺人皆磔尸車上隨其罪目宣示屬縣夏月腐爛則以繩連其骨周徧一郡乃止見者駭懼視事五年凡殺萬餘人其餘慘毒刺刻不可勝數郡中慄恐慄懼也莫敢自保及陽球奏甫球為司𨽻校尉奏收甫等乃就收執死雒陽獄魏施畏丹陽人倪覬魯郡人胡業南陽人並為刺史郡守時人謂之苛暴劉類髙陽人歴位宰守苛慝猶甚嘉平中為𢎞農太守吏二百餘人不與休暇専使為不急過無輕重輒捽其頭又亂杖撾之牽出復入如是數四乃使人掘地求錢所在市里有孔穴又外託簡省每出行陽勅督郵不得使官屬曲修禮敬而陰識不來者輒發怒中傷之茍晞為領青州刺史以嚴刻立功日加斬戮流血成川人不堪命號曰屠伯晞出屯無鹽以弟純領州刑殺更甚於晞百姓號小茍酷於大茍晉裴盾為徐州刺史委任長史司馬奥奥勸盾刑殺立威大發良人為兵有不奉法者罪便至死在任三年百姓著怨王廙代陶侃為荆州刺史廙在州大行誅戮侃時將佐及徵士皇甫方回於是大失荆土之望人情乖阻帝乃徵廙為輔國將軍加散騎常侍羊聃為廬陵太守疑郡人簡良等為賊殺一百九十人徙謫百餘人有疾見簡良為祟旬日而卒宋趙伯符為徐兖二州刺史為政苛暴吏人畏之若􅉘虎然而寇盜逺竄無敢犯境為丹陽尹在郡嚴酷吏人苦之或至委判被錄赴水而死典筆吏取筆不如意鞭五十沈攸之為郢州刺史為政刻薄或鞭士大夫上佐以下有忤意輒面加罵辱將吏一人亡叛同籍符伍充代者十餘人而曉達吏事自强不息士民畏憚人莫敢欺江謐為長沙内史行湘州事政治苛刻僧遵道常與謐情欵隨謐􅊩郡犯小事餓繫郡獄遵道裂三衣食之既盡而死為有司所奏徵還遇赦得免南齊劉季連為益州刺史東昏即位徵季連為右衞將軍道斷不至季連聞東昏失徳京師多故稍驕矜本以文吏知名性忌而褊狹至是遂嚴愎酷狠士人始懐怨望蕭惠開為益州刺史嚴用威刑蜀人號曰卧虎梁臧厥為晉安太守為政嚴酷少恩吏民小事必加杖罰百姓謂之臧獸後魏趙郡王謐為岐州刺史性嚴暴虐下人元麗為雍州刺史為政嚴酷吏人畏患之後遷冀州刺史入為尚書左僕射帝問曰聞公在州好殺無理枉濫非一又大殺道人對曰臣在冀州僅殺道人二百許人亦復何多帝曰一物不得其所若納諸隍況殺道人二百而言不多麗脱冠謝元瞻字道周任城王澄之子為兖州刺史頗愛書史而貪暴好殺澄深恥忿之絶其往來薛忱為北廣平太守為治暴虐曾因公事一家之内併殺數人為民所訟將致之罪遇患卒於郡于雒侯為秦州刺史而貪酷安忍州人富熾奪民吕勝脛纒一具雒侯輒鞭富熾一百截其右腕百姓王隴客刺殺民王羌奴王愈二人依律罪死而已雒侯生㧞隴客舌刺其本并刺胸腹二十餘瘡隴客不堪苦痛隨刀戰動乃立四柱磔其手足命將絶始斬其首支解四體分懸道路見之者無不傷楚合州驚震人懐怨憤百姓王元夀等一時反叛有司糾劾孝文詔使者於州嘗刑人處宣告民兵然後斬雒侯以謝百姓胡尼為宋州刺史以暴虐刑罰酷濫就家賜自盡李洪之為安南將軍秦益二州刺史在任設禁姦之制有帶刀行者罪與刼同輕重品格各有條章於是大享州中豪傑長老示之法制乃夜密遣騎分部覆諸要路有犯禁者輒捉送州宣告斬決其中枉見殺害者百數刻害之聲聞於朝野崔暹為瀛州刺史貪暴安忍庶人患之嘗出獵州北單騎至於民村井有汲水婦人暹令飲馬因問曰崔瀛州何如婦人不知其暹也答曰百姓何罪得如此癩兒刺史暹黙然而去王質為瀛州刺史質在州十年風化粗行察姦糾慝究其情狀民庶畏服之而刑政刻峻多所笞戮號為威酷元昭孝眀時為尚書河南尹聾而狠戾理務峭急所在患之尋出為雍州刺史在州貪虐大為人害元暹字叔炤莊帝初除南兖州刺史在州猛暴多所殺害累遷秦州刺史先秦州城人屢為反覆暹盡誅之存者十一二後除涼州刺史貪暴無極欲窺府人及商胡富人等物詐䑓符誣諸豪等云欲加賞一時屠戮所有資財生口悉沒自入鄭伯猷為青州刺史在州貪惏妻安豐王元延眀女専為聚斂貨賂公行潤及親戚戸口逃散邑落空虚乃誣陷良民云欲反叛藉其資財盡以入已誅其丈夫婦女配沒百姓怨苦聲聞四方為御史糾劾死罪數十條遇赦免因以頓廢齊文襄作相每誡厲朝士嘗以伯猷及崔叔仁為喻皇甫㻛為豫州刺史為政殘暴百姓患之北齊庫狄伏連為開府鄭州刺史性嚴酷不識士流開府參軍多是衣冠士族伏連加以箠撻逼遣築墻隋庫狄士文為貝州刺史至州發摘姦隐長吏尺布㪷粟之賍無所寛貸得千人悉配防嶺南親戚相送哭聲遍於州境至嶺南遇瘴癘死者十八九於是父母妻子唯哭罵士文士文聞之令人捕搦捶楚盈前而哭者彌甚司馬京兆韋焜清河趙達二人並苛刻唯長史有恵政時人語曰刺史羅刹政司馬蝮蛇瞋長史含笑判清河坐喫人文帝聞之歎曰士文暴過猛獸竟坐免燕榮為青州總管榮在州選絶有力者為伍伯吏人遇之者必加詰問輒楚撻之瘡多見骨姦盜屏迹境内肅然他州縣人行經其界者畏若寇讐不敢休息後為幽州總管榮性嚴酷有威容長吏見者莫不惶懼自范陽盧氏代為著姓榮皆署為吏卒以屈辱之鞭笞左右動至千數血流盈前飲噉自若嘗案部道次見藂荆堪為笞捶命取之輒以試人人或自陳無咎榮曰後若有罪當免爾及後犯細過將撾之人曰前日被杖使君許有罪宥之榮曰無過尚爾況有過耶榜捶如舊田式為襄州總管顓以立威為務每視事於外必盛氣以待其下官屬股慄無敢仰視有犯禁者雖至親昵無所容貸其女婿京兆杜寧自長安省之式誡寧無出外寧久之不得還竊上北樓以暢覉思式知之笞寧五十其所愛奴嘗詣式白事有蟲上其衣袷揮袖拂去之式以為慢已立棒殺之或僚吏姦贓部内刼盜者無問輕重悉禁地牢中寢處糞穢令其苦毒自非身死終不得出每赦書到州未暇省讀先召獄卒殺重囚然後宣示百姓其刻暴如此元𢎞嗣除觀州總管長史在州専以嚴峻任事吏人多怨之二十年轉幽州總管長史于時燕榮為總管肆虐於𢎞嗣每被笞辱𢎞嗣心不伏遂禁𢎞嗣於獄將殺之及榮誅死𢎞嗣為政酷又甚之每推鞫囚徒多以酢灌鼻或椓杙其下竅無敢隠情姦偽屏息趙仲卿為石州刺史法令嚴猛纎微之失無所容捨鞭笞長吏輒至二百官人戰慄無敢違犯盜賊屏息皆稱其能遷兖州刺史未之官拜朔州總管于時塞北盛興屯田仲卿總統之㣲有不理者仲卿輒召主掌撻其胸背或解衣倒曵於荆棘中時人謂之猛獸事多克濟繇是收穫歳積邊戍無餽運王文同為常山郡丞有一人豪猾每持長吏長短前後守吏咸憚之文同下車聞其名召而數之因令左右剡木為大橛埋之於廷出尺餘四角各埋小橛令其人踣心於木橛上縛四支於小橛以捧毆其背應時潰爛郡中大駭吏人相視懾氣元褒為齊郡太守煬帝興遼東之役郡官督事者前後相屬有西曹掾當行詐疾褒詰之掾理屈褒杖之掾遂大言曰我將詣行在所欲有所告褒大怒因杖百餘數日而死坐是免官唐蘭謨為武候大將軍令於雒陽宫留守謨性苛刻遇下無恩縱有病者亦逼令就役小吏或懼威而自縊者詔遣案驗使者以法繩之謨以為詰已遂妄稱疾密入京繇是坐免崔湜為襄州刺史請别開南山新路以趣商州役工數萬死者十三四仍嚴錮舊道不許人行其新路每經夏潦摧壓踣陷行旅艱辛僵仆相繼後湜流於嶺表俄誅戮於路山南人先苦湜所役競以磚瓦投擲其尸應時盡碎而商州奏請復依舊路而行張仁愿為并州都督府長史神龍二年檢校洛州長史時都城榖貴盜竊甚衆仁愿一切皆捕獲杖殺之尸積府門逺近震懾無敢犯者令狐彰為滑州節度使性識猜阻人有忤意不加省察輒至斃踣李選為江西觀察使狥喜怒無辜而斃踣者不可勝紀李實為京兆尹恃寵强愎不顧文法人皆側目貞元二十年春夏旱闗中大歉實為政猛暴方務聚斂進奉以固恩寵百姓所訴一不介意因入對徳宗問人疾苦實奏曰今年雖旱田榖甚好繇是税租皆不免人窮無告乃撤屋瓦木賣苖麥以供賦斂優人成輔端因戯作語為秦民艱苦之狀實聞之怒言輔端誹謗國政徳宗遽令決殺京師無不切齒以怒實二十一年有詔蠲王畿内逋租實違詔徵之百姓大困官吏多遭笞罰剥割掊斂聚錢三十萬貫胥吏或犯者即按之有乞丐絲髮固死無者且曰死亦不屈亦杖殺之京師貴賤同苦其暴虐順宗在諒闇逾月實斃人於府者十數遂議逐之乃貶為通州長史制出市人皆袖瓦石將碎其首實知之繇月營門自苑西出人人相賀韓滉為浙江東西兩鎮觀察使政令眀察末年傷於嚴急嘗以縱人庶之殺耕牛政之蠧也巡内婺州傍縣有犯其令誅及鄰伍死者數百人又俾推覆官分察境内情涉疑似必寘極法誅殺殘忍一判即勦數十人月無虚日雖令行禁止而寃濫相尋于頔為陜虢觀察使自以為得志益恣威虐官吏日加笞罰掾曹姚峴不勝其虐與其弟汎舟於河遂自投而死李􅅠為揚州節度使七年令行禁止擒摘生殺一委軍吏參伍束手居人頗陷非法王遂為沂兖海等州觀察使遂器用不𢎞僻於聚斂而非亷撫之才但峻威刑以繩亂俗其所製杖笞率踰常制遂既死監軍中使封其杖進呈上令出示於朝以誡亷使李紳為揚州節度使有舉子訴揚子江舟人不渡恐失試期紳判云昔在風塵曾遇此輩今之多幸得以相逢各抛付揚子江其苛急也如此周慕容彦超晉天福中累授磁單僕埭等州刺史志性輕脱人面獸心㳂法為姦是為常態用酷虐為氣勢以陰狡為聰眀故所至以貪苛聞執事者不勝其苦然捜摘盜賊必窮隱伏兇黠之輩竄奔他境而良善之民横遭詿誤破家陷獄者不可勝紀葉仁魯漢乾祐中授衞州刺史部内多盜賊仁魯每親自擒捕隨意殺戮濫死者衆嘗有羣賊部民聚而追之追至山林不復見賊矣仁魯至盡執追者為盜悉斷其足筋曝於林麓之下宛轉號呼數日而死許遷為單州刺史切於除盜嫉惡過當或釘磔賊人令部下臠割苛細漢宣帝有言曰與我共治者其惟良二千石乎若夫不務寛大惟尚煩苛令既滋彰民不堪命政失寛裕俗所厭勞為之師長不其爽歟仲尼所謂苛政甚於猛虎其是之謂乎漢減宣為左内史其治米鹽米鹽細雜也事小大皆闗其手自部署縣名曹寶物官吏令丞弗得擅捶痛以重法繩之居官數年一切為小治辯然獨宣以小至大能自行之難以為經經常也不可謂常法也鮑宣為豫州牧歳餘丞相司直郭欽奏宣舉錯煩苛代二千石署吏聽訟所察過詔條坐免歸家王吉為沛相課使郡内各舉姦吏豪人諸嘗有微過酒肉為賍者雖數十年猶加貶棄注其名籍後漢孫堪為左馮翊坐遇下促急司𨽻校尉舉奏免官魏王思為豫州刺史思亦能吏然苛碎無大體劉類為𢎞農太守吏二百餘人不與休暇専使為不急過無輕重輒捽其頭又亂杖撾之牽出復入如是數四乃使人掘地求錢所在市里皆有孔穴又外託簡省每出行陽勅督郵不得使官屬曲修禮敬而陰識不來者輒發怒中傷之性又少信每遣大吏出輒使小吏隨覆察之白日常自於墻壁間闚閃夜使幹亷察諸曹復以幹不足信又遣鈴下及奴婢使轉相簡驗嘗案行宿止民家民家二狗逐猪猪驚走頭挿柵間鳴呼良久類以為外之吏擅共飲食不復徵察便使伍伯曵五官掾係弼入頓頭責之弼以實對類自愧不詳因詐問以他事民尹昌年垂百歳聞類出行當經過謂其兒曰扶我迎府君我欲陳恩兒扶昌在道左類望見呵其兒曰安用是死人扶來見我其視人無禮皆此類也晉王𢎞為河南尹務為苛碎後為司𨽻校尉簡察士庶使車服異制庶人不得衣紫紺及綺練錦繢武帝嘗遣左右微行觀風俗𢎞緣此復遣吏科簡婦人袒服至褰發於路論者以為暮年謬妄由是獲譏於世坐免官宋王𤣥謨為雍州刺史令九品以上租役貧富相通境内莫不嗟怨劉道濟為益州刺史初道濟以五城人帛𤣥奴梁顯為參軍督䕶費謙固執不與逺方商人多至蜀土貲貨或有直數百萬者謙又限市絲綿各不得過五十斤馬無善惡限蜀錢二萬府又立治一斷民私鼓鑄而貴賣鐵器商旅吁嗟百姓咸欲為亂𤣥奴既懐恚忿聚黨為盜賊北齊庫狄干為定州刺史不閑吏事事多擾煩隋李徳林為懐州刺史在州逢亢旱課民掘井溉田空致勞擾竟無補益為考司所貶歳餘卒官唐潘好禮𤣥宗開元中為豫州刺史為政孜孜而繁於細事人吏雖憚其清嚴亦厭其苛察于頎代宗大厯中為京兆尹為政苛細無大體及為河南尹以無政績代還盧􅮅徳宗建中初為京兆尹無術學為政苛躁盧杞甚惡之諷有司彈奏貶撫州司馬吕渭貞元中為湖南都團練觀察使在任三歳政理煩碎薛珏貞元中為京兆尹以勤身率下失於纎悉無文學大體元義方憲宗元和中為福建觀察徵拜京兆尹歴鄜坊觀察使皆著程能趣辦之績然為政稍務苛刻人多怨之崔詠元和中為嶺南節度使為吏清刻然不知大體政號苛碎李紳文宗開成中為汴州節度使紳上言於本州置利潤樓店從之議者以為與下争利非長人者所宜晉李永福髙祖時為同州節度使性鄙狹無器局好察人微事多有詆訐錐刀小過不能恕工商之業輿𨽻之情官吏之幸皆善知之雖不欺詐不貪濁然自任所見無所準的故人多薄之驕逸夫荷千里之寄布六條之政必勤䘏而是務豈驕逸而可恣其有以小人之質乘君子之器恃其豪率不拘簡節惟誇詫以自得率胸臆以行事聲色自娱奢費無度受詞訟於逰獵畫龍虎於兵車及乎罪戾不解猶悔自掇非不幸也漢韓延夀為東郡太守後為左馮翊延夀在東郡時試騎士每歳大試也治餙兵車畫龍虎朱爵延夀衣黄紈方領以黄色素作直領也衣於記切駕四馬傳總建幢棨幢麾也棨有衣之㦸也其衣以朱墨繒為之幢文江切棨音啟植羽葆植亦立也羽葆聚翟尾為之亦今纛之類也植嘗職切鼓車歌車如今郊駕時車上鼔吹也郊駕祀時備法駕也功曹引車皆駕四馬載棨㦸五騎為伍分左右部軍假司馬千人持幢旁轂旁歩浪切歌者先居射室都試射堂也望見延夀車噭咷楚歌噭音叫呼之叫咷音滌濯之滌又它釣切延夀坐射室騎吏持㦸夾陛列立騎士從者帶弓鞬羅後鞬弓衣也音居言切使騎士兵車四面營陳被甲鞮鞪居馬上抱弩負蘭鞮鞪即兜鞪也蘭盛弩矢者也其形如木桶鞮丁奚切鞪莫侯切又使騎士戲車弄馬盜驂戲車弄馬之技也馳盜解驂馬御者不見也延夀又取官銅物候月蝕鑄作刀劍鈎鐔放效尚方事鉤亦兵器也似劍而曲所以鉤殺人也鐔劍鼻也又曰鐔似劍而小陋鐔音滛又音尋及取官錢帛私假繇使吏假謂過賃也繇讀與徭同及治餙車甲二百萬以上御史大夫蕭望之劾奏延夀延夀竟坐棄市魏畢軌為黄門郎子尚公主居處殷富遷并州刺史在州名為驕豪夏侯惇為陳留太守舉郡人衞臻計吏命婦出宴臻以為末世之俗非禮之正惇怒執臻既而赦之晉魏志字允恭為樂平太守後遷章武趙郡太守雖累郡職不以政事為意晝則逰獵夜誦詩書以聲色自娱當時見者未能審其量也宋臧質為徐兖二州刺史奢費無度爵命無章為有司所紏王僧達為宣城太守性好逰獵而山郡無事僧達肆意馳騁或三五日不歸受詞訟多在獵所民或相逢不識問府君所在僧達曰近在後周朗為盧陵内史郡後荒蕪頗有野獸母薛氏欲見獵朗乃合圍縱火令母觀之火逸燒郡廨朗悉以秩米起屋償所燒之限稱疾去官為州司所紏還都謝孝武曰州司舉臣愆失多有不允臣在郡虎三食人蟲鼠犯稼以此二事上負陛下帝變色曰州司不允或可有之蟲虎之災寧闗卿小物後魏元志為揚州刺史晚年躭好聲妓侍側將百人器服珍麗冠於一時李訢為相州刺史獻文以訢治為諸州之最加賜衣服自是遂有驕矜自得之志北齊髙季式為濟州刺史豪率好酒又恃舉家勲功不拘簡節與光州刺史李元忠生平逰欵在濟州夜飲憶元忠開城門令左右乘驛馬持一壺酒往光州勸元忠飲朝廷知而容之唐李邕為汲郡北海二郡太守性豪侈不䕶細行嚴武為成都尹蜀土頗饒珍産武窮極奢靡賞賜無度或悦一言賞至百萬蜀方閭里以徵斂殆至匱竭然蕃虜亦不敢犯境而性本狂狡視事多率胸臆雖慈母之言亦不之顧裴均自江陵節度使入為僕射未㡬出鎮襄陽居兩府凡十年荒縱無法度士流以為穢恥晉房知温為兖州節度使厚斂不已積貨數百萬治第於南城出則以妓樂相隨任意所之曾不以政事為務有幕客顔衎者正直之士也委曲陳其利病知温不能用焉邪佞古人有言曰邪佞者宇宙之螟螣王化之蟊賊也斯賢者疾之巳甚之言也然而詩曰思無邪盖將舉直以錯諸枉者也傳曰逺佞人盖惡色取而行違者也若乃受専城之寄總方伯之任利姦而為用希世以取容或諂事權貴致毒良善或潜行賂遺茍圖爵寵阿上意以媮合匱民力以市恩下不聊生自為得計斯先王之法所深惡者也亦復為英主之所察致偽行之靡顧彰厥心迹盖無㡬焉所以前訓謂其孔壬先聖言其厚貌者良謂是已後漢移良安帝時為𢎞農太守時太尉楊震為中常侍樊豐等共譛遂䇿收太尉印綬遣歸本郡行至城西夕楊亭飲酖而卒良承樊豐等㫖遣吏於陜縣留停震䘮露棺道側謫震諸子代郵行書道路皆為隕涕郵境上行書舍也晉茍晞恵帝時為兖州刺史見朝政日亂懼禍及已而多所交結每得珍物即貽都下親貴兖州去洛五百里恐不鮮美募得千里牛每發信旦遣暮還鞠仲為慕容徳青州刺史徳僣位後因讌其羣臣酒酣笑而言曰朕雖寡薄恭巳南面而朝諸侯在上不驕夕惕於位可方自古何等主也仲曰陛下中興之聖后少康光武之儔也帝顧命左右賜仲帛千疋仲以賜多為讓徳曰卿知調朕朕不知調卿乎卿餙對非實故亦以虚言相賞賞不謬加何足謝也宋劉徳願孝武時為秦郡太守性觕率為帝所狎侮帝寵姬殷貴妃薨塟畢數與羣臣至殷氏之墓謂徳願曰卿哭貴妃若悲者當加厚賞徳願應聲便號慟撫膺擗踊涕泗交流帝甚悦以為豫州刺史南齊崔慧景武帝時為南郡内史梁南秦二州刺史又為司州刺史每罷州輒資獻奉動數百萬帝以此嘉之劉悛武帝時為益州刺史悛既藉舊恩尤能悦附人主承迎權貴賓客閨房供費奢廣罷廣司二州傾資貢獻家無留儲後魏長孫道生眀元時為冀州刺史取人美女以獻帝切責之以舊臣不加罪黜寇臻字仙勝獻文末為中川太守時雒州刺史馬熙政號貪虐仙勝微能附之甚得其意轉𢎞農太守薛懐吉宣武時為汾州刺史偏有聚納之響自以支庶懐吉散騎常侍莫度之庶子餌誘勝已共為婚姻多擕親戚悉令同行兼為之彌縫恣其取受而奨勞賔客曲盡物情送去迎來不避寒熱性少言每有接對但黙然而返既指授先期眀人馬之數左右密已記錄俄而酒饌相尋芻粟繼至逮於將别贈以錢縑下及厮傭咸過本望其延納貴賤若此韋景孝眀時為武威太守内官賈燦與元乂為黨廢靈太后自云本出武威魏太尉文和之後遂移家焉景承露意以其兄緒為功曹緒時年向七十未㡬又以緒為西平太守比景代下巳轉武威太守北齊敬長瑜為廣陵太守多受財賄刺史陸駿將啟劾之長瑜以貨求於散騎常侍和士開士開以畫屏風詐為長瑜之獻齊主大悦駿啟尋至遂不問焉隋魚俱羅焬帝時為趙郡太守因朝集至東都與將軍梁伯𨼆有舊數相往來又從郡多將雜物以貢獻帝不受因遺權貴御史劾俱羅以郡將交通内臣帝大怒與伯隱俱坐除名王世充為江都郡丞焬帝數幸江都充善候人主顔色阿䛕順㫖每入言事帝善之又以郡丞領江都宫監乃彫餙池臺陰奏逺方珍物以媚於帝繇是益昵之唐趙元楷太宗時為蒲州刺史貞觀十二年駕幸其境元楷課父老服黄紗單衣迎謁路左盛餙廨宇修營樓雉欲以求媚又潜餉羊百口魚數千頭將饋貴戚帝知而數之曰朕巡省河雒經歴數州凡有所須皆資官物卿餉羊養魚彫餙院宇此乃亡隋弊俗不可復行當識朕心改卿舊態黎幹代宗時為京兆尹大歴九年七月以旱故祈雨於朱雀門街造土龍悉召城中巫覡舞於龍所幹與巫覡更舞觀者駭笑彌月不雨幹又請禱於文宣王廟帝聞之曰丘之禱久矣命毁土龍祈雨減膳節用以聽天命俄而澍雨豐霈朝野相賀陳少逰歴晉鄭二州刺史厚斂財貨交結權右以是頻獲遷擢後除桂管觀察使少逰以嶺徼遐逺欲規求近郡時中官董秀掌樞密用事少逰乃宿於其里候其下直際晚謁之從容曰七郎家中人數㡬何每月所費復㡬何秀曰乆忝近職家累甚重又屬時物騰貴一月過千餘貫少逰曰據此之費俸錢不足支數日其餘常須索求外人方可取濟倘有輸誠供億者但留心庇福之固易為力耳少逰雖不才請以一身獨供七郎之費每歳請送錢五萬貫今見有大半請即受納餘到官續送免貴人勞慮不亦可乎秀既踰於始望欣愜頗甚因與之厚相結少逰言訖泣曰南方炎瘴深愴逺僻但恐不生還載覩顔色矣秀遽曰中丞美才不當逺官請從容旬日冀竭蹇分時少逰又已納賄於元載子仲武矣秀載内外引薦數日拜宣州刺史兼御史中丞宣歙池都圑練觀察使大歴五年改越州刺史兼御史大夫浙東觀察使八年遷揚州長史淮南觀察使所在悉心綏緝而多以任數為政好行小恵胥吏得職人亦安焉十餘年間三總大藩皆天下殷厚處也以故徵求貿易且無虚日斂積財寶巨累億萬多賂遺權貴視文雅清流之士蔑如也初結元載每年饋金帛約十萬貫又多納賄於用事中官駱奉先劉清潭吳承倩等繇是美聲達於中禁後見元載在相位年深以過犯漸見疑忌少逰亦稍疎之無何載子伯和貶官揚州少逰外與之交結而陰使人伺其過失密以上聞代宗以為忠待之益厚宋晦為虢州刺史與元載賄交率百姓採盧氏山林為載製造東都私第并私致書結載子弟及主書卓英倩載得罪晦遂為百姓所發帝初猶疑下憲司訊鞫悉自欵伏自同州刺史貶灃州員外司馬杜亞徳宗時東都留守厚賂中官令奏河南尹鄭式瞻為衢州刺史進絹五千疋銀二千兩徳宗曰式瞻坐事已詔御史按問進物宜付左蔵庫裴肅徳宗時為常州刺史鬻薪貨炭案牘百價之上皆規利焉歳餘又進奉無㡬遷浙東觀察使天下刺史進奉自肅始盧徵徳宗時自戸部侍郎歴同華刺史故事同華以近地人貧每至端午降誕所獻甚微薄徵遂竭其財賦每所進獻輒加常數人不堪命裴均徳宗時為山南東道節度使均素與内官左神䇿䕶軍中尉竇文塲善有崔太素亦得幸於文塲太素一日晨省文塲文塲卧帳中賔客填門獨引太素入卧内太素自謂文塲之眷極深徐觀後床一人寢方醒乃均也太素大慚而出李錡為湖州刺史是時李齊運獨被徳宗恩顧計從言行錡累以吳中寶貨密輸齊運繇是遷潤州刺史范傳正憲宗時為宣歙觀察使厚以財貨問遺權貴視公蓄如私蔵幸而不至甚敗李修歴坊州絳州刺史餙厨傳以奉往來中貴及賔客以求名稱後為京兆尹顓務聚斂貢獻以希恩寵班行正直之士多潜見誣毁時人為之側目時憲宗方切於貨財以浙西宣歙皆號富饒遂與王遂同拜觀察使數歳以病歸闕庭未朝見而卒人皆相賀李道古為鄂州觀察使以貪暴聞懼終得罪乃薦山人栁泌以媚於憲宗裴𢎞泰文宗時為鄭滑節度使奏縁妖星見為國設三千僧齋劉源文宗時為銀州刺史請置營田事多不實或朝廷遣使至邊上源必先令下吏多驅馬皆負布囊實之以土聲言運粮於屯田百千䭾之中或致粟麥之囊一二因潜為識認於使者前私決其囊以遺之用取信於人而廣以財賄交通遂擢授夏州節度使又虚増監牧馬數以取其度支供給時人知其贓仗倚權倖有司不敢舉劾終不寘於極法議者以為幸馮行襲哀帝時為金州節度使奏當道昭信軍額内一字與元帥梁王諱字同乃賜號戎昭軍後唐叚凝仕梁為懐州刺史乾化元年十二月梁祖北征迴過郡凝貢獻加等梁祖大悦二年梁祖復北征凝迎奉進貢有加於前楊思權為邠州節度使進新修佛寺圖思權前帥禁軍倒戈入岐州違負朝廷獲節旄之賞心嘗愧畏邠即思權故里遂率民修寺冀銷陰禍故也册府元龜卷六百九十七
