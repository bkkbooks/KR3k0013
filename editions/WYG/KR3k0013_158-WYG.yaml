body:
  text: 册府元龜卷一百五十八宋王欽若等撰帝王部誡勵第三唐𤣥宗開元九年三月勑朝集使等曰卿兼承朝委分軄外臺陳國之法制為人之師長將何𢎞宣政要阜安甿俗熈我淳徳以臻太和頃年以來戸口逃逸波逝而徃井邑虗弊州縣不以為事逋亡乃是其常言念下人豈無懷土之戀思皇多士未有移風之術輯寧政教仁逺乎哉提振公方道存於爾宜加招撫咸使安服又去年諸州申有旱澇流亡雖聞蠲放莫能平允多非清正守法或以暗慢順情在於公私俱不折𠂻自今已後務從於實卿等職在親人稍存意於此宜躬問疾苦務崇簡惠勸以桑穡敦其學校利而勿害静則自安卿等每還之時朕亦嘗有其誡及聞至彼多不遵行咸以為朝廷常務會同常禮因循既乆㒺以為意卿宜敷𢎞朕意宣慰人心勉思政途以奉朝奬如仍舊相習當别有處置事有不便於人者各與按察使商量奏聞十年正月朝集使各還本州敕曰朕承天休子育萬方樹之師長俾敷景化將以固兹邦本致諸昇平而大道緬然淳風未暢租賦雖减户口猶虗水旱相仍耕桑莫贍豈朕之不徳而吏之無方言念於兹良增歎息卿等與朕共理實曰分憂各勉思政途以輔不逮若人有疾苦鄉有姦豪不勤農桑不崇學校竝宜敦勸以正風俗其臺省處分不便於時者具利害聞奏勿復依随以損百姓爾其留意綏我兆人九月勑曰朕君臨寰宇子育黎元内修睦親以叙九族外恊庶政以濟兆人勲戚極褒厚之恩兄弟盡友于之至務崇敦化克慎明徳今小人作孽已抵憲章恐不逞之徒猶未能息凢在宗屬用申懲戒自今已後諸王公駙馬外戚等家除非至親以外不得與餘人交結其卜祝占相及非類惡人亦不得遣出入門庭妄説言語所以共存至公之道永恊雍和之化克固藩翰以保厥休貴戚懿親宜書座右又下制曰百官等禄秩既優勲賢是寄皆合守其正道無宜聽彼異端至如卜祝之流妄陳休咎占候之輩假託徴祥誑惑既生愆違斯作因搆䜛慝遂行訕毁取䧟網羅良増歎息懲一足以勸百有犯不可無刑姦狡以此累身百寮誠宜飭己自今已後各宜謹慎竝不得與如此等色及無職人交逰來徃仍令御史訪察有即弹奏當加嚴罰十二月朝集使各還本州勑之曰朕君臨宇内子育黎元何嘗不簡易愛人勤恤庶政天下至廣不能獨任故樹之牧宰咨其共理而淳化未敷至道猶鬱庸賦尚减戸口且虗水旱相仍倉儲莫贍無聞慈惠之政未息凋弊之流豈朕之不明吏之無術每念於此用惻于懷卿等是行勉思厥政百姓間有鰥寡惸獨不能存濟者務令優飬㳺業浮惰不勤稼穡者特令正肅敦以學校勤以農桑差役之間務使平允逃亡之戸兼藉招攜令其下人使得蘇息諸州遭澇之處多是政理無方隄堰不修或溝渠未洩頻以處分竟無承稟嘗破租庸是何檢校至州之日各宜勸勉應合修塞開道宜預施功若不暫勞何以獲利宜勵所職勿犯常科十三年三月詔曰御史出使舉正不法身苟不正焉能正人如州縣祗迎相望道路牧宰祗候僮僕不若作此威福其正人何如聞自今已後宜申明格敕不得更爾違者州縣科罪御史貶降十六年二月諸州朝集使還帝謂之曰朝集使等𢎞風善俗寄於良吏求瘼䘏隱職在親人朕竝建藩牧擇其師長欽若古訓俾人用康而教化或未洽黎甿或未寧攘竊者時有犯禁逋亡者罕聞復業豈朕敦諭之道尚闕而牧宰之訓未明歟永念於此不忘旰昃卿等咸承朝寄分掌外臺共理之道期於康濟至若率身以正馭衆以仁而下不化者未之有也卿等還州宜禁侵漁絶浮惰惸獨孤寡尤資惠育盗賊妖訛特宜禁㫁其征鎮人每須優賞科歛之事必在均平頃者水災荐及河朔朕思無不至憂彼元元發倉廪濬江淮以賑之免租稅停征役以安之今屬春陽布和農事方起或慮乏絶致妨耕桑雖已遣使宣撫或恐事未周贍如有不支濟者即便量事賑給諸道有損之處亦宜准此朕不欲一物失所衆情不遂納羣生於夀域躋大化於昇平卿等各宜恭守朝章宣布朕意雖萬方有罪敢忘在予而三載考績須徴行事安人稱職可不勉歟七月詔曰州縣牧守等竝受朕之寄助國為理實兾其共康庶績俾乂羣甿頻經處分合盡誠節仍有不遵法式自紊紀綱貿遷營利或縱親識侵暴下人或在郵傳規求貨馬諸如此類不可具言豈教之不明而人之多僻當宁遐想深惕於懷各宜徇公以副所委十八年正月畿縣令朝見勑之曰諸縣令等撫綏百姓莫先於宰字煦育黎民須自於厥徳卿等日在京畿各親吏理務在用心以安疲瘵庶期成政以副朕懷二十年正月勑曰政在飬人人安其業先王所以用明察之長求忠信之師務斯道也朕勤恤庶政保綏羣元濟育之誠不違於終食聽理之慮每軫於宵興將使載其清淨息其勞費如聞輦轂之下政令猶煩或廣修器物將有供待或差斂人户以充庖費豈副朕薄賦輕徭息人减費之意其雒陽令韋紹縣尉顔思賓輙有科率擬備祗供雖事未行終是專擅宜貶出河南尹孟温禮雖不覺察狀異知情宜特寛捨自今已後府縣宜洗心懲革不得更然其或不悛仍有勞擾仰百姓即詣匭使具狀奏聞輙不得稽壅所犯之人當有處分二十二年三月命有司引新授縣令等見勑之曰新除河南府宻縣令張稷等令長之任黎庶尤切比嘗選衆未盡得人然而勇進之流乃非其好矯弊之政豈為所革今既各膺奬用當盡良能周月政成風謡各著所列清要唯待才賢既爾有聞不患無位各宜勉勵以副朕心二十四年二月宴新授縣令於朝堂勑之曰自古致理在其命官今之所切莫如守宰朕每嘗屬意尤重此官有善者雖逺必升無能者縱近必廢唯取才實非務官資事亦坦然天下所見而浮競之輩未識朕懷俾其宰邑便為棄地或以煩碎而不專意或以僻逺而不專心或以徇己而貪婪或以畏法而巽愞浸染成俗妨奪為常嗷嗷下人於何寄命朕所以寢興軫念思以濟人故命吏曹精選才幹卿等各膺推擇用簡朕心若能理化有聲名實相副必有超擢終不食言如其謂人不知唯利是視自速負敗兩喪身名智者所圖應不至是各宜勉勵以副勤屬并製令長新誡一篇頒賜天下縣令其詞曰我求令長保乂下人人之所為必有所因侵漁浸廣賦役不均使夫離散莫保其身徴諸善理寄爾良臣與之革故政在維新調風變俗背偽歸真教先為富惠恤於貧無大無小必躬必親責躬勸農其惟在勤墨綬行令孰不攸遵曷云被之我澤如春二十五年正月詔曰宰輔之任簡在朕心亦既同徳是為一體其有惡直醜正以私害公結搆䜛慝圖議離間隳我軌度莫甚於斯御史中丞盧怡累登清宻爰委繩凖宜遵國典以正朝綱而乃妄起猜嫌輙為朋黨交通小吏傾側大臣潜求㒺極之言欲䧟無辜之善雖浸潤之譛縱盈篋而不疑而囘邪之端若燎火而難近宜從逺貶以戒具寮可潮州司馬員外置且清淨者政之本和平者國之福朝多君子可不務乎如或妄動以干時矯舉以違道逓相好惡便作比周斯為亂常必有明罰凡厥在位知朕意焉七月以宗正少卿崔秀為太子右庶子司農少卿皇甫惟明檢校司農卿少府少監李齊國檢校少府監邠王府司馬杜鵬舉為豐王府長史課勤也勑曰古者官宿其業吏不數變實欲觀其始終因以别其能否若用捨非當遲速不備是開趨競之門豈曰和均之道宗正少卿崔秀等名行早著朝廷所推各效一官已經四載器能有適乆次當遷宜副僉諧俾膺兹命且承平日乆從任者多必慿考績方為進轉但須慎守豈滯其能如或躁求是招其累速則不逹謙而必通凡今庶寮宜悉朕意八月御製戒六篇以示諸王其㫖蓋明君臣父子之義齋祭稼穡之事也忠王璵等上表請宣付史官及示百寮許之宰臣李林甫等奏曰臣等伏以聖謩埀訓輝映千古頒示朝廷未及天下兼望宣布中外帝手詔謂曰周公聖人攝行王政戒伯禽曰無以魯國驕人朕方聖雖慙豈忘戒子昭示庭訓何足以宣布中外耶二十九年十二月帝謂新授刺史縣令等曰卿等頃因内舉竝膺明試朕廣推薦之路而一槩盡收乃至授官率皆優假朝恩若此不亦厚歟以卿等器能乆從官政所蒞之處固必有聲然今兹舉人將勵天下髙懸賞罰俾自懲勸先宜自勉以副朕心卿所舉人皆别標名歴得知卿等能否褒貶必擬同之無累爾親當榮所薦言可復也宜悉至懷初詔公卿各舉所親為牧宰及對䇿畢上以羣臣推薦必盡忠誠遂悉收之各以資轉職天寳元年十月諸州朝集使廻勑曰今之牧守古之諸侯撫育黎元歳有朝㑹蓋問之疾苦審以安危必在適時期於不擾洎告辭處分師古前規如聞遥自朝廷初到郡縣便逺追僧道廣說滋彰山谷徃還日夜疲弊通賢當無此事俗吏誠恐有之朕夙夜在心期之清淨頃聞此說深疚廼懷宜覺前非俾無後悔當道採訪固不得違寮友之間遽相戒勵宜知朕意各守章程竝宜好去三載五月長安令栁升坐贓於朝堂杖殺之詔曰朕㳟守丕業臨炤百官冀君臣一心中外勵節長安縣令桞升徃因推薦寘彼周行而乃禀性囘邪恣情聚斂黷于貨賄紊我紀綱是而可容孰不可赦故令鞫按用致嚴刑豈惟懲息姦源抑欲庶寮知戒况聞朝廷卿士多與交逰比之匪人門通賂遺用𢎞寛典咸為匿瑕且古人以亷耻立名清白貽範苟虧斯節謂忝前修况身荷恩榮家享重禄陳力無紀徇財已彰取愧素飡自投疎網每念於此良用憮然凡在百寮宜為殷鑒仍宣示中外令知朕懷五載七月貶縉雲郡太守韋堅為江夏郡司馬乃下詔書曰無總貨寳生生自庸傳曰官之失徳寵賂彰也則古先哲王不聞好貨垂以明戒無易紀律然法貴變通罰宜平典罪止其惡過從寛宥庶乎有勸冀乎有懲韋堅是司潭漕妄事興易餉遺朝廷計其積贓數目甚廣朕以衣冠之士豈徃求之而姦囘之人是為抑與韋堅以别有處分所司已一切不問咸令自新冀有亷隅成予徳化各思變節無貳過焉宣示中外知此朕意十三載六月引吏部新授縣令見勑曰唐虞之理命以子男周漢建官委以令宰朕稽古前哲寤寐全才委之銓衡愼擇銅墨至於上敷朝政下字淳人親其農桑均其力役使惸嫠者視之猶父母俾匱乏者賴之以安全然後八使類能六條舉最擢以含香粉署奬以秋簡霜臺是乃立身効官移忠入仕榮家報國豈不美歟若徇己冒私擾人敗政有懷潤屋無懼害公豈惟刑網貽憂抑亦名節隳替蓋士君子之所耻亦名教之罪人鴻漸于磐豈不勉哉今卿等將欲赴官朕之所言提撕之耳所謂聽訟吾猶人也必也使無訟乎况今之人也與古人不殊今之官也與古者無别榖璧銅印其猶昔榮而卓茂魯恭逈然無繼將勸奬之道不至豈淳樸之風未還撫事君臨載深勵惕今者庶乎卿等能副此心賞旣超倫刑必當罪各宜勉勵敷我皇猷無謂天髙四聰必達竝即於朝堂賜食食訖好去代宗大厯五年制曰朕覽漢文詔書至陽和之時草木羣生之類皆有以自樂而吾百姓或阽於死亡而莫之省緬然遐想感歎増懷哀今之人又甚於昔思有贍恤俾安其居觀察節度使及刺史各宜訓勵所部使奉科條變貪官之節溉循吏之行其清白明著政理殊尤者具以名聞必加奬擢若干冒貨賄紊我紀綱切宜紏按當峻刑憲其官人犯贓經恩免罪者並宜申報中書門下及所司不得容其却上自王室多故積有歳時皆我文武之臣中外戮力今天下既定崇徳報功與之剖符傳代不絶至於莅官述職各宜明愼刑典貽慶子孫憲宗元和四年正月以左司郎中鄭敬使淮南宣歙吏部郎中崔芁使浙西浙東司封郎中孟簡使山南東道荆南湖南京兆少尹裴武使江西鄂岳等道宣撫行日並召對告之曰朕宫中用度一疋以上皆有簿歴唯拯救百姓則不計費焉卿等今者賑䘏災旱當勤於奏職勿如潘孟陽所到務飲酒逰山寺而已仍許卿等以便宜從事七年六月中使梁守謙傳宣曰自今史官記事每須指實不得虗美時帝讀肅宗實録見大臣傳多浮詞飾美故有是戒穆宗長慶元年四月制曰昔者卿大夫相與讓於朝士庶人相與讓於列周成王刑措不用漢文帝耻言人過眞古理也朕甚慕焉中代以還爭端斯起掩抑其言則專蔽誘掖其說則侵誣自非責實循名不能彰善癉惡故孝宣必有敢告乃下光武不以單辭遽行語稱訕上之非律有匿名之禁所以防三至之毁重兩造之明是以爵人於朝則皆勸刑人於市則皆懼罪有歸而當於事也末代偷巧内荏外剛卿大夫無進思盡忠之誠多退有後言之謗士庶人無切磋琢磨之益多銷鑠浸潤之讒進則諛言諂笑以相求退則羣居雜處以相議留中不出之請蓋發其隂私公論不容之談是生於朋黨擢一官則曰恩皆自我黜一職則曰事出他門比周之跡已彰尚稱介獨繇徑之蹤盡露自謂貞方居省寺者不能以勤恪莅官而曰務從易簡提紀綱者不以凖繩檢下而曰宻奏風聞獻章疏者更相是非備顧問者互有憎愛苟非秦鏡照膽堯羊觸邪時君聽之安可不惑叅㫁一謬俗化一訛禍發齒牙言生枝葉率是道也朕甚憫焉我國家貞觀開元同符三代風俗歸厚禮讓偕行兵興己來人㪚乆矣姑欲道之以徳不欲驅之以刑然而信有未孚理有未至曾無耻格益用凋刓小則綜覈之權見侵於下輩大則樞機之重旁撓於簿徒尚念因而化之亦既去其尤者而臣等懼其寖染未克清澄備引祖宗之書願垂戒勵之詔遂申告戒頗用殷勤各當自省厥躬與我同底于道凡百多士宜體朕懷文宗太和四年四月壬戌詔曰蓋儉以足用令出唯行著在前經斯為理本朕自臨四海憫元元之久困日昃忘食宵興疚懷雖絶文繡之飾尚愧茅茨之儉亦喻卿士刑于詔條如聞積習流弊餘風未革車服第室相髙以華靡之制資用貨寳固啟于貪冒之源有司不禁侈俗滋扇是朕之教導未敷使兆庶昧於耻尚也其何以足用行令臻於至理歟永念慙歎迨兹申敕自今内外班列職位之士各務素樸𢎞兹國風有僭差尤甚者御史糾上主者宣示中外知朕意焉自艱難以還制度等衰蕩而無級矣帝薄於自奉布聞天下時相大臣與左右前後權貴之臣不導揚上意廣素樸以刑於下雖赦令每以為言建此深詔竟不聞少為懲懼七月以鴻臚卿張賈為衢州刺史帝顧謂賈曰聞卿大善長行賈知帝不喜博遂自解說乃曰臣公事之餘聊與賓客為戲非有所妨也帝曰豈謂好之而不妨事哉自後刺史面辭帝必慇懃戒飭曰無嗜博無飲酒七年八月詔御史臺所置六察分紏百司比來因循不能舉軄起今以後諸司如有身名偽濫隱盗官錢及違法等事他處發覺者本察御史竝當貶斥九年正月戊午對賀正使于麟徳殿既退復召諸道判官孔温質李暨苗惲等九人問以出身所繇詞學所工徳音誨勉至于再三各别賜綵絹十疋開成元年四月庚午朔詔御史中丞李翊兵部尚書判户部王起禮部侍郎髙諧鴻臚卿李逵司農卿李紀等各問本司事帝曰朝廷事在衆官戮力同心方得必理勉務躬親公事十二月庚子御史中丞狄兼謩謝官帝曰御史中丞朝廷紀綱一臺理則朝廷理朝廷理則天下理無曠厥職兼謩奏曰凡天下有擬法不得中道事臣盡得以彈奏帝曰大抵以顧望畏忌為心者自失職業卿等梁公之後將嗣家聲不可不留意四年四月壬戌帝御紫宸殿問宰臣曰皇城使上言太廟中有麞走出安有宗廟之中得此野獸臣請宣示宗政寺便令廵檢帝曰可召宗政卿來朕自戒勵之遂召宗政卿李踐方至帝曰宗廟至重卿宜恪勤官業勿俾太廟有所壞隳勿拘隂陽不旋修葺漢有昭陽未央尚猶崇飭潔淨况宗廟乎無長蒿萊以藏野獸言訖泫然踐方叩頭請罪乆之帝自即位宗廟祀事未嘗不戒勵有司俾其嚴潔武宗㑹昌元年正月詔曰州縣官比聞縱情盃酒之間施刑喜怒之際致使簿書停廢獄訟滯寃其縣令每月非暇日不得輙㑹賓客逰宴其刺史除暇日外有賓客須申宴餞者聴之仍須簡省諸道觀察使任居亷察表率一方宜自勵清規以為程法四年潞州劉從諫子􅍬拒命詔晉絳石雄等討之七月賜雄詔書曰古者有必勝之將無必勝之人將立竒功實在謀帥朕所以求鷙鶚於累百得飛將於無雙總率諸軍以臨賊境眷言勲績深注予懷近聞劉從諫時百姓相驚云卿以七千兵至數告于衆視兆于人今天策向晨已及成軍之候龍驤建飾必叶渡江之謡舊史昭然宜符可騐加以天道在于西北順歳有功福星煥於天庭為國大慶勉𢎞方畧契此休徴昔鍾㑹以二十萬兵頓于劔閣鄧艾衆纔一萬直抵成都只在决機豈繇衆寡知卿能辦故諭此懷然聞卿自履軍中常先士卒既為輕敵未足耀竒借卿一舉之功將定必擒之計勇雖為本怯亦有時勇怯之間在乎得中况卿為萬人之帥啟十乗之行舉必貴謀動資持重報國在於平賊不在輕身為將本於坐籌寧勞陷陣卿服此誡常自書紳務立功名副兹委遇後唐莊宗同光二年三月勑選舉二門仕進根本當擬掄於多士全委仗於有司苟請託是從則踰濫斯極况方行公事已集羣材須行戒勵之文俾絶僥求之路宜令吏部禮部掄材考藝必盡於精詳滅私循公無從於請託仍委三銓貢院牓示省門暁告中外明宗天成二年二月勑曰君使臣以禮臣事君以忠禮不可一日不順忠不可一夕不念二者全則上下順一途廢則出入差須振紀綱以嚴規矩凡在策名之列皆知辨色之朝儻不夙興是虧匪懈君上思政猶自求衣未明為下服勤固合假寐待旦宜令御史臺編示文武兩班自此每日早赴朝叅職司既得整齊公事的無擁滯如或尚兹懈怠具録奏聞八月以鄧州連帥陶玘黷貨得罪降詔諭天下云夫有功不賞何以激盡忠有罪不刑何以戒為惡二者不失庶務有成朕自統華夷不求奢侈臨食念兵師之餒授衣思黎庶之寒仗中外勲賢為國家基址邇者熒惑應犯而自退太陽暫蝕而還圓百果無不熟之方五榖無不豐之處顧兹寡德何稱嘉祥惟陜府石敬瑭晉州安崇阮洺州張萬進耀州孫岳等杜絶誅求尋加奬賞今陶玘與亳州李鄴輙為聚斂自掇悔尤功過既分黜陟斯在玘鄴尋寘於法書九月新授汝安州防禦使萇從簡辭帝臨階召曰爾久從征伐甚有戰功語其威名乃闗張之比也前後酬奬累任郡符皆有酷暴之名委卿理人不謂以狼牧羊乎朕今嘉爾驍雄復還爾於上郡汝能改節擁旄仗鉞豈後於他人如未省前非國有常典朕不能為功臣終曲其法爾宜勉焉從簡拜謝而去十一月新授鄜州節度使米君立辭帝誨之曰擢汝於行伍令理吾民勿以左右小輩妄裁政事須與賔佐官吏商量吾賞罰無私汝宜聽之三年八月下制誡勵長吏曰朕自承天命恭襲帝圖務令黔黎永安非止皇居獨樂當難虞之際與良將共静邉塵及開泰之時於諸侯各加官爵既酬勲而示寵賴撫俗以經心託在無私期於共理有功者切於慶賞有過者非所願聞陶玘以偶違勑條無柰何而從謫官陶玘為鄧州觀察留後税外科配貶嵐州司馬廷𨼆以全虧公道不獲已而就極刑暫廷隠為齊州防禦使奏孔目吏伏法不實勑自盡乃朝典之須行實朕心之不樂備軫泣辜之念更嚴加禁之規况在藩方皆明理本節度使等時號山河之主縣令亦人呼父母之君竝功為時皆勤布化不獨榮於身世兼乃慶及子孫當䖍夕惕之懐同廣日新之政各處有功之地永為無過之人宜體朕懐共資王道四年十月乙巳帝御中興殿謂宰臣馮道曰盧質近日喫酒否道奏曰盧質到中書臣曽勸酒不過三爵别處即不聞飲酒帝曰盧質舊來好酒酒後多過失得不慎歟道曰酒是狂藥善侈人性若不節飲便致患生陛下聖謨雅符古道乙丑新授閬州節度使李仁矩辭帝謂之曰卿今為節度使人臣之貴不此過矣勿作苛政以害生民便孤朝寄也長興元年七月宣徽南院使判三司馮贇為北京留守贇母辭赴太原明宗賜衣服銀器因謂姥曰吾軰老矣贇昨來總角趨走吾之左右今日便得力吾頃事先朝為將帥視節度使富貴極矣彼時吾不望為山河主况贇乎姥至鄉中常存内訓勿令失禮於耆舊也二年九月前遼州和順縣令劉䖍膺上時務云里俗有父母在而析財别居又宗族之間或有不義凌其孤弱者請行止絶勑㫖王者以孝理萬邦化敷兆庻用勲賢而接部專刑賞以宣風其在懲勸知方統臨得術比屋有可委之俗六親無不和之人劉䖍膺曾州縣為官見鄉閭弊事宜加條理免亂彜章宜令諸道長吏嚴行誡約如有違者准法加刑三年正月詔藥彦稠康福往方渠鎮討党項叛命者丁酉康福等率騎軍先進帝御興教樓誡以賞罰三月神武兵士鞏縣就糧辭帝誡之曰無擾吾民四月李贊華赴鎮滑州帝誡之曰吾命藩侯郡守蓋為飬治軍民恐卿乆在戎行未諳民事吾今慎擇叅佐卿於公事宜與之叅决勿自執所見也十月丁巳前涇原節度使李金全再進馬十五匹帝不納召而諭之曰公患馬多耶何進獻之數也金全曰臣馬非多也非敢有所覬以妄陳奏苐愚陋無逺識頃在西邊地無異産得此鹿馬在京無所使願進以益邊軍帝曰卿在鎮為治如何莫專以馬為事金全謝之帝雖黽勉受之而心不懌金全邊人累更名郡藩鎮所在掊歛聚財賂結權要而掩其弊政之迹帝頗聞其不亷故以言譏之己巳安審琦率捧聖龍武馬軍北戍忻代召將校至中興殿面戒勵之曰邊人生梗不奈侵搔爾等咸宜戢歛岢嵐軍地當要害城池常須善完軍旅之間須明賞罰壬子秦王從榮入謁帝謂之曰爾軍務之餘還習何事對曰臣公事之隙讀書與諸儒講經義帝曰經有君臣父子之大要讀之益人智思吾少鍾喪亂馬上取功名不暇留心經籍在藩邸時每見判官論說經義予雖不能深逹其㫖大綱令人開悟今朝廷有正人端士宏才碩學者可親附之庶㡬有益吾見先帝在藩時愛自作歌詩將家子文非素習未能盡妙諷於人口恐被諸儒竊笑吾老矣不能勉强於此唯書義尚欲耳裏頻聞時從榮方聚新進浮薄子以歌詩吟咏為事帝道此言規風之四年七月辛巳帝御廣壽殿新滄州節度使李金全赴鎮辭帝戒之曰聞爾為治愛擾人長吏當以䘏民為務爾事予為小校今仗旄秉鉞為節度使當改故態分吾憂寄吾民慎勿擾也帝素知金全為人故面自戒勵之末帝清泰元年七月宰臣李愚劉昫因論公事於政事堂相詬辭甚鄙惡各欲非時見訟是非帝令劉延朗宣諭卿皆輔弼之臣萬國式瞻不宜如是此後不得更然二年詔曰近日告勑牒書寫生疎裝禠鹵莽未欲便行罰責今後書體裝禠竝宜如法中書舎人辭告亦可以其人揚歴功效或訓或奬竝宜允當又須體認急切如有宣取盡時應副無令稽緩晉少帝天福元年四月分令文武臣寮三十六人使雒陜孟潞蒲岐邠涇同華秦鄧徐兖相滑邢洺澤衛隰絳慶寧沁復隨郢汝蔡沂宻埭懷磁濮等州率民財産以資軍用將行帝召賜酒食戒之曰朕凉徳嗣位天降薦饑契丹作梗河北凋弊社稷所賴在軍士耳乏衣匱食危之道也事不獲已議及於斯卿等宜體朕意切戒左右勿為滋横以重取怨讟也周世宗顯徳五年十一月諸道定稅使臣奉辭帝臨軒諭之曰夫國以民為本本立則國家安朕以近代已來賦租不等貧者抱虗而無告富者廣植以不言州縣以舊額為規官吏以相承為凖須行均定用致蘇舒卿等宜正身莅事副朕兹意仍與逐處長吏和順商𣙜但務從長共集其事無使朕之赤子枉罹於峻法也册府元龜卷一百五十八
