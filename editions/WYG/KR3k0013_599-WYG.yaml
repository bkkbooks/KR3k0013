body:
  text: 册府元龜卷五百九十九宋王欽若等撰學校部侍講講論侍講夫六藝之文先王所以明天道正人倫致治之成法也自漢氏之罷黜百家崇尚經術制祿位以勸學者延儒生而備淸問雖復禁庭冲䆳廣内凝嚴而通經之士得以方領矩歩侍講淸燕稽古之力不亦榮乎魏晉而下以迄於唐從容近對延訪大義葢不乏其人焉逮於元和之末始建學士之職列於内署恩禮尤重自非强記博識待問而不匱守道而無邪又曷能啓廸丕訓述宣帝裁順羙而規失陳言以諷今者焉漢兒寛治尚書武帝時爲侍御史見帝語經學帝說之從寛問尚書一篇擢爲中大夫寛有俊才初見武帝語經學帝曰吾始以尚書爲樸學弗好及聞寛說可觀乃從寛問一篇梁丘賀瑯琊人從京房受易宣帝時爲都司空令坐事論免爲庶人待詔黃門數人說教侍中爲請侍中說經爲教授以召賀賀入說帝善之韓商嬰之孫宣帝時爲博士以易徴待詔殿中曰所受易卽先太傅所傳也班伯少受詩於師丹成帝時大將軍王鳳薦伯宜勸學召見宴昵殿誦說有法拜爲中常侍帝方鄉學鄭寛中張禹朝夕入說尚書論語於金華殿中詔伯受焉旣通大義又講異同於許商遷奉車都尉數年金華之業絶出班斿博學有俊材爲右曹中郎以選受詔進讀羣書於天子前讀書後漢桓榮習歐陽尚書光武召榮令說尚書甚善之拜爲議郎每朝會輒令榮於公卿前敷奏經書帝稱善曰得生幾晩因拜榮爲博士車駕幸太學會諸博士論難於前辯明經義特荷賞賜建武末爲太常明帝卽位乗輿嘗幸太常府令榮坐東面設几杖會百官天子親自執業每大射養老禮畢輒引榮及弟子升堂執經自爲下說乃封榮關内侯榮子郁以父任爲郎明帝以郁先師子甚見親厚嘗居中論經書和帝卽位爲長樂少府復入侍講經郁授二帝恩寵甚篤樓望少習嚴氏春秋明帝永平初爲侍中越騎校尉入講省内張興習梁邱易永平十六年拜太子少傅明帝數訪問經術旣而聲稱著聞弟子自逺至者著錄且萬人譙瑛𤣥之子善說易授明帝爲北宮衛士令丁鴻年十三從桓榮受歐陽尚書自明帝永平十年詔徴鴻至卽召見說文侯之命篇頃之拜侍中後章帝詔鴻與廣平王羡及諸儒樓望成封桓郁賈逵等論定五經同異於北宫白虎觀使五官中郎將魏應主承制問難侍中淳于恭奏上帝親稱制臨决賈逵爲郎章帝立降意儒術好古文尚書左氏傳建初元年詔逵入講北宮白虎觀南宫雲臺帝善逵說召馴習韓詩爲騎都尉建初中侍講章帝包咸爲大鴻臚習論語授顯宗子福亦以論語授和帝魏應經明行修建初四年爲五官中郎將章帝甚重之數進見論難於前特受賞賜時會京師諸儒於白虎觀講論五經同異使應專掌問難侍中淳于恭奏之帝親臨稱制如石渠故事桓焉郁中子也順帝卽位拜太傅錄尚書事復入授經禁中蔡𤣥順帝時爲議郎講論五經同異甚合帝意趙典少篤行隱約隱猶靜也約儉也博學經書弟子自遠方至桓帝建和中四府表薦四府太尉司徒司空大將軍府也典性明逹志節淸亮益州舉茂才以病辭太尉黃瓊胡廣舉有道方正皆不應桓帝公車徵對策爲諸儒之表徴拜議郎侍講禁内桓彬爲議郎建和中入侍講禁中楊賜爲越騎校尉建寧初靈帝當受學詔太傅三公選通尚書桓君章句宿有重名者三公舉賜乃侍講於華光殿中雒陽宫殿名劉寛建寧初徴拜太中大夫侍講華光殿遷侍中賜衣一襲荀悅爲黃門侍郎獻帝頗好文學悅與荀彧及黃門侍郎董遇少府孔融侍講禁中旦夕談論黃瓊爲太常和平中選入侍講禁中魏劉邵爲散騎常侍齊王正始中執經講學賜爵關内侯淳于儁爲博士高貴鄕公丼露元年四月幸太學問諸儒曰聖人幽贊神明仰觀俯察始作八卦後聖重之爲六十四立爻以極數凡斯大義㒺有不備而夏有連山商曰歸藏周曰周易易之書其故何也儁對曰庖羲因燧皇之圖而制八卦神農演之爲六十四黃帝堯舜通其變三代隨時質文各繇其事故易者變易也名曰連山似山出内氣連天地歸藏者萬物莫不歸藏於其中也帝又曰若使庖羲因燧皇而作易孔子何以不云燧人氏没庖羲氏作乎儁不能答帝又問曰孔子作彖象鄭𤣥作注雖聖賢不同其所釋經義一也今彖象不與經文相連而注連之何也儁對曰鄭𤣥合彖象於經者欲所學者尋省易了也帝曰若鄭𤣥合之於學誠便則孔子曷爲不合以了學者乎儁對曰孔子恐其與文王相亂是以不合此聖人以不合爲謙帝曰若聖人以不合爲謙則鄭公何獨不謙耶對曰古義𢎞深聖問奥遠非臣所能詳盡帝又問曰繫辭云黃帝堯舜垂衣裳而天下治此庖羲神農之世爲無衣裳但聖人化天下何殊異爾邪儁對曰三皇之時人寡而禽獸衆故取其羽皮而天下用足及至黃帝人衆而禽獸寡是以作爲衣裳以濟時變也帝又問乾爲天而復爲金爲玉爲老馬與細物並耶儁對曰聖人取象或遠或近近取諸物遠則天地講易畢復講尚書帝問曰鄭𤣥云稽古同天言堯同於天也王肅云堯順考古道而行之二義不同何者爲是博士庾峻對曰先儒所執各有乖異臣不足以定之然洪範稱三人占從二人之言賈馬及肅皆以爲順考古道以洪範言之肅義爲長帝曰仲尼言唯天爲大唯堯則之堯之大美在乎則天順考古道非其至者也今發篇開義以明聖徳而舍其大更稱其細豈作者之意邪峻對曰臣奉遵師說未喻大義至於折中裁之聖思次及四嶽舉鯀帝又問曰夫大人者與天地合其徳與日月合其明思無不周明無不炤今王肅云堯意不能明鯀是以試用如此聖人之明有所未盡邪峻對曰雖聖人之𢎞猶有所未盡故禹曰知人則哲惟帝難之然卒能改授聖賢緝熈庶績亦所以成聖也帝曰夫有始有卒其惟聖人若不能始何以爲聖其言惟帝難之然卒能改授葢謂知人聖人所難非不盡之言也經云知人則哲能官人若堯疑鯀試之九年官人失序何得謂之聖哲峻對曰臣竊觀經傳聖人行事不能無失是以堯失之四㐫周公失之二叔仲尼失之宰予帝曰堯之任鯀九載無成汨陳五行民用昬墊至於仲尼失之宰予言行之間輕重不同也至於周公管蔡之事亦尚書所載皆博士所當通也峻對曰此皆先賢所疑非臣寡見所能究論次及有鰥在下曰虞舜帝問曰當堯之時洪水爲害四㐫在朝宜速登賢聖濟斯民之時也舜年在旣立聖徳光明而乆不進用何也峻對曰堯咨嗟求賢欲遜已位岳曰否徳忝帝位堯復使岳揚舉側陋然後薦舜薦舜之本實繇於堯此葢聖人欲盡衆心也帝曰堯旣聞舜而不登用又時忠臣亦不進逹乃使岳揚側陋而後薦舉非急於用聖恤民之謂也峻對曰非臣愚見所能逮及於是復命講禮記帝問曰太上立徳其次務施報爲治何繇而敎化各異皆修何政而能致於立徳施而不報乎博士馬炤對曰太上立徳謂三皇五帝之世以徳化民其次報施謂三王之世以禮爲治也帝曰二者致化薄厚不同將主有優劣邪時使之然乎炤對曰誠繇時有樸文故化有薄厚也晉鄭冲初仕魏爲司空及高貴卿公講尚書冲執經親授與侍中鄭小同俱被賞賜荀顗字景倩仕魏爲侍中爲少帝執經拜騎都尉賜爵關内侯庾峻爲諫議大夫嘗侍文帝講詩中庶子何邵論風雅正變之義峻起難徃反四坐莫能屈之徐邈博渉多聞孝武帝始覽典籍招延儒學之士邈年四十四始補中書舍人在西省侍帝車𦙍爲中書侍郎孝武帝嘗講孝經僕射謝安侍坐尚書陸納侍講侍中卞耽執讀黃門侍郎謝石吏部郎袁宏執經􅉙與丹陽尹王混擿句時論榮之宋袁粲㤗始中爲中書令領丹陽尹六年明帝於華林園茅堂講周易粲爲執經梁伏曼容字公儀初仕宋明帝好周易集朝臣於淸暑殿講詔曼容執經曼容素美風采帝嘗以方嵇叔夜使吳人陸探微畵叔夜像以賜之朱异爲揚州議曹從事史兼太學博士高祖自講孝經使异執讀後爲右衞將軍於儀賢堂奉述高祖老子義及就講朝士及道俗聽者千餘人爲一時之盛時城西開士林館以延學士异與左丞賀琛遞日述高祖禮記中庸義孔子祛兼中書通事舍人高祖撰五經講疏及孔子正言專使子祛簡閱羣書以爲義證事竟勑子袪與右衞朱异左丞賀琛於士林館遞日執經累遷通直正員郎舍人如故皇侃少好學尤明三禮孝經論語起家兼國子助教高祖召入夀光殿講禮記義帝善之拜員外散騎侍郎賀瑒爲太常丞有司舉治賔禮召見說禮義高祖異之詔朝朔望預華林講陳張譏初仕梁補國子正言生武帝嘗於文徳殿釋乾坤文言譏與陳郡袁憲等預焉勑令論議諸儒莫敢先出譏乃整容而進諮審循環辭令温雅帝甚異之賜裙襦絹等仍云表卿稽古之力累遷士林館學士簡文在東宮出士林館發孝經題譏論議徃復甚見嗟賞自是每有講集必遣使召之後魏崔浩明元初爲博士祭酒嘗授明元經書燕鳳爲黃門侍郎行臺尚書甚見禮重明元世與崔𤣥伯封懿梁越等入講經傳出議朝政孫惠蔚初爲皇宗博士侍講東宫及宣帝卽位仍在左右敷訓經典自冗從僕射遷祕書丞崔僧淵入國坐兄弟徙於薄骨律鎭太和初得還孝文聞其有文學又閑佛經善譚論勑以白衣賜褠幘入聽於永樂經武殿董徴爲四門小學博士宣武詔徴入璇華宮令孫惠蔚問以六經崔光爲車騎大將軍熈平元年二月太師高陽王雍等奏舉光授孝明帝經胡國􅈿爲中書監與高陽王雍等輔政後與崔光俱授孝明經侍直禁中馮元興爲侍讀尚書賈思伯爲侍講授孝明杜氏春秋於式乾殿元興嘗爲擿句儒者榮之封隆之爲侍中東魏靜帝詔爲侍講除吏部尚書賈思同爲黄門侍郎與國子祭酒韓子熈並爲侍講授静帝杜氏春秋竇瑗西魏出帝時爲廷尉卿及釋奠開講瑗與散騎常侍温子昇給事黄門侍郎魏季景通直散騎常侍李業興並爲擿句北齊李繪初仕東魏爲高邕從事靜帝於顯揚殿講孝經禮記繪與從弟褰裴伯茂魏收盧元明等俱爲錄議繪素長筆札尤能傳授綴緝詞義簡舉可觀張雕武成帝時爲散騎常侍㑹侍講馬敬徳卒乃入授經書帝甚重之以爲侍讀與張景仁並被尊禮同入華光殿共讀春秋加國子祭酒假儀同三司待詔文林館後周辛公義爲太學生太和中武帝詔入露門學令受道義每月集御前令與大儒講論數被嗟異時軰慕之隋宇文㢸爲太子虞侯率開皇中文帝嘗親臨釋奠㢸與博士論議詞致淸遠觀者屬目帝大悅顧謂侍臣曰朕今者覩周公之制禮見宣尼之論孝實慰朕心於是頒賜各有差元善爲國子祭酒文帝嘗親臨釋奠命善講孝經於是敷陳義理兼之以諷諌帝大悅曰聞江陽之說更啓朕心善初仕周武帝太子宮尹賜爵江陽縣公唐陸徳明武徳中爲太學博士高祖幸國子學時徐文逺講孝經沙門惠乗講般若經道士劉進喜講老子詔徳明難此三人徳明雅有詞致論難鋒起三人皆爲之屈高祖稱曰儒𤣥佛義各有宗㫖徐劉釋等並爲之傑徳明一舉而蔽之可謂逹學矣賚帛五十疋孔頴逹太宗貞觀中爲給事中太宗問曰論語云以能問於不能以多問於寡有若無實若虛何謂也頴對曰聖人設敎欲人謙光已雖有能不自矜大仍就不能之人求訪能事已之才藝雖多猶以爲少仍就寡少之人更求所益己之雖有其狀若無己之雖實其容若虛非惟士庶也帝王之徳亦當如此夫帝王内藴神明外須𤣥黙深不可測廣不可知故易稱以蒙養正以明夷蒞衆若其位居尊極炫燿聰明以才凌人餙非拒謀則上下情隔君臣道乖自古滅亾莫不繇此也太宗深善其對後拜國子祭酒太宗幸國子學親觀釋奠頴逹講孝經右庶子趙𢎞智問之曰夫子門人曾閔俱稱大孝而云獨爲曾說不爲閔說何邪答曰曾孝特優門人不能逮也制㫖駮之曰朕聞家語云昔曾晳使曾參鉏𤓰而誤斷其本晳怒援大杖以擊其背曾子仆地絶而後蘇孔子聞之告門人曰參來勿内旣而曾子請焉孔子曰舜之事父也使之嘗在側欲殺乃不可得小箠則受大杖則走今參於父委身以待暴怒䧟親於不義不孝罪莫大焉繇斯而言孰愈於閔子騫也頴逹不能對太宗又謂侍臣曰諸儒各生異意皆非聖人論孝之本㫖也夫孝者善事父母自家形國忠於其君戰陣勇朋友信揚名顯親此之謂孝俱在經典而論者多離其文逈出事外以此爲敎勞而非法何謂孝之道趙𢎞智爲陳王師永徽二年十二月高宗命𢎞智於百福殿講孝經召中書門下三品及𢎞文館學士國子學官並令預坐𢎞智演暢微言備陳五孝之義學生等難問連環𢎞智酬應如響帝謂𢎞智宜畧陳此經要道以補不逮對曰昔者天子有爭臣七人雖無道不失天下微臣顓愚願以此言奉獻帝甚悅賜絹二百疋名馬一匹上官儀爲𢎞文館學士顯慶五年六月高宗御齊聖殿引儀及呂才直學士李𤣥植道士張惠元李榮黃𤣥歸及名僧等於御前講論命李𤣥植登講坐發易題呂才李榮等以次問難敷揚經義移時乃罷禇無量杭州鹽官人也初爲國子博士時𤣥宗在春宮召拜國子祭酒兼皇太子侍讀𤣥宗卽位爲右散騎常侍復爲侍讀以其年老每隨仗出入特許緩歩又爲造腰轝令内給事舁於内殿馬懷素爲光祿卿開元三年十月制曰春卿入講道盛儒學徳璉賦詩義均師友光祿卿馬懷素靜專動直資忠履信詞賦成於鼔吹典墳富於泉海絶韋勵精重席待問豈止本仁祖義行先王之道故亦謙退謹密多君子之風朕以聽政之餘嘗思稽古之對俾遷近侍潤滋鴻業可左散騎常侍仍每日入朝侍讀薛放憲宗元和末爲兵部郎中充皇太子侍讀穆宗卽位拜工部侍郎集賢殿學士雖事任非灱而恩顧轉隆又轉刑部兵部二侍郎禮部尚書兼學士如故韋處厚元和末爲戸部郎中知制誥穆宗卽位以處厚爲司勲員外郎史館修撰路隨並充翰林侍講學士召入太液亭命分講毛詩關雎尚書洪範等篇訪以禮體處厚等演經義以廣規諷之道從容開納賜酒果而罷崔郾寶厯初以諫議大夫充翰林侍講學士郾奏曰陛下授臣以侍講今八望矣未蒙召訪經義臣内慚尸素外愧臣僚敬宗答曰朕機務稍閒當召卿請益宋申錫少孤貧有文學寶厯二年轉禮部員外郎尋充翰林侍講學士申錫自䇿名及在朝行淸愼介潔不起黨與長慶寶厯之間時風囂薄朋比大扇及申錫備用時論以爲激勸張仲方爲諫議大夫太和元年三月文宗召仲方與給事中高重中書舍人鄭澣度支郎中許康佐對並以將選侍講學士故也是月以澣守本官康佐爲駕部郎中並充翰林侍講學士丁公爲禮部尚書太和三年四月充侍講學士鄭覃太和五年爲翰林侍講學士每入見必以厚風俗黜朋比再三言之李仲言太和八年十月自國子監四門助敎爲國子周易博士充翰林侍講周易學士高重開成七年十月以國子祭酒充翰林侍講學士詔令每月一日十日入院不絶本司嘗務梁吳藹爲崇政副使太祖乾化二年自右散騎常侍遷刑部侍郎與宣徽副使左散騎常侍李珽並充侍講學士講論易之麗澤有講習之象記之函丈著學問之規葢古之方聞通經之士固有詳考同異辯析理趣以駕說傳道者矣自漢之表章六經爲制祿位儒先間作議論蠭起以至備對上前待詔淸禁揚㩁義訓發明體要本乎師授濟之口辯讐難交致精悍靡屈逮於羣居州處較練墳籍迭宣其奥賾雅彰於鴻博或微言特出逈折於異端或移書具存聿垂於嘉誥斯皆贊聖師之遺範爲學者之所宗焉漢轅固以治詩孝景時爲博士與黃生爭論於上前黄生曰湯武非受命乃殺也固曰不然夫桀紂荒亂天下之心皆歸湯武湯武因天下之心而誅桀紂桀紂之民弗爲使而歸湯武湯武不得已而立非受命而何黃生曰冠雖敝必加於首履雖新必貫於足何者上下之分也今桀紂雖失道然君上也湯武雖聖臣下也夫主有失行臣不正言補過以導天子反因過而誅之代立南靣非殺而何固曰必若云是高皇帝代秦卽天子之位非邪於是上曰食肉不食馬肝未爲不知味也言學者毋言湯武受命不爲愚遂罷韓嬰孝文時爲博士武帝時與董仲舒論於帝側其人精悍處事分明悍勇銳仲舒不能難也瑕邱江公爲博士武帝時江公與董仲舒並仲舒通五經能持論善屬文江公呐於口呐古訥字帝使與仲舒議不如仲舒而丞相公孫𢎞本爲公羊學比輯其議卒用董生於是帝因尊公羊家詔太子受公羊春秋繇是公羊大興劉歆字子駿哀帝時與父向領校祕書歆嘗白帝左氏春秋可立帝令歆與五經博士講論其義諸博士或不能置對並不與歆意同故不肯立其學也置對置辭以對也歆因移書太常博士讓之曰昔唐虞旣衰而三代迭興迭互也聖帝明王累起相襲其道甚著周室旣微而禮樂不正道之難全也如此是故孔子憂道之不行厯國應聘自衞反魯然後樂正雅頌各得其所修易序書制作春秋以紀帝王之道及夫子没而微言絶七十子終而大義乖重遭戰國棄籩豆之禮理軍旅之陳籩豆盛食之器也以竹曰籩以木曰豆孔氏之道抑而孫吳之術興陵夷至於暴秦燔經書殺儒生設挾書之法行是古之罪以古事爲是者卽罪之道術繇是遂滅漢興去聖帝明王遐遠仲尼之道又絶法度無所因襲時獨有一叔孫通畧定禮儀天下惟有易卜未有他書也至孝惠之世乃除挾書之律然公卿大臣絳灌之屬咸介胄武夫莫以爲意至孝文皇帝始使掌故朝錯掌故官名也從伏生受尚書尚書初出於屋壁朽折散絶今其書見在時師傳讀而已詩始萌芽言如草木之初生天下諸書徃徃頗出皆諸子傳說猶廣立於學宮爲置博士在漢朝之儒惟賈生而已謂賈誼至孝武皇帝然後鄒魯梁趙頗有詩禮春秋先師前學之師皆起於建元之間當此之時一人不能獨盡其經或爲雅或爲頌相合而成泰誓後得博士集而讀之故詔書稱曰禮壞樂隳書缺簡脫朕甚閔焉時漢興已七八十年離於全經固已久矣言廢絶已久不可得其眞也及魯共王壞孔子宅欲以爲宫而得古文於壞壁之中逸禮有三十九書十六篇天漢之後孔安國獻之遭巫蠱倉卒之難未及施行及春秋左氏邱明所修皆古文舊書多者二十餘通藏於秘府伏而未發孝成皇帝閔學殘文缺稍離其眞乃陳發秘藏校理舊文得此三事以考學官所傳經或脫簡傳或間編脱簡遺失之簡編謂舊編爛絶就更次之前後錯亂也間音古莧反傳問民間則有魯國桓公趙國貫公膠東庸生之遺學與此同抑而未施此乃有識者之所惜閔士君子之所嗟痛也徃者綴學之士不思廢絶之闕茍因陋就寡分文析字煩言碎辭學者罷老且不能究其一藝罷讀曰疲䆒竟也信口說而背傳記是末師而非徃古至於國家將有大事若立辟雍封禪廵狩之儀則幽㝠而莫知其原幽㝠謂暗昧也猶欲保殘守缺伏恐隅見放僻之私意而無從善服義之公心或懷妬嫉不考情實雷同相從隨聲是非抑此三學以尚書爲備當時學者謂尚書惟二十八篇不知本有百篇謂左氏爲不傳春秋豈不哀哉今聖上徳通神明繼統揚業亦閔文學錯亂學士若兹雖昭其情猶依違謙讓依違言不專執樂與士君子同之故下明詔試左氏可立不遣近臣奉㫖衘命將以輔弱扶微與二三君子比意同力兾得廢遺比合也經藝有廢遺者兾得興立之也比音頻寐反今則不然深閉固距而不肯試猥以不誦絶之猥茍也茍不誦習之而欲絶去此學欲以杜塞餘道絶滅微學夫可與樂成難與慮始此乃衆庶之所爲耳非所望士君子也且此數家之事皆先帝所親論今上所考視其古文舊書皆有徴驗外内相應豈茍而已哉夫禮失求之於野古文不猶愈於野乎愈勝也徃者博士書有歐陽春秋公羊易則施孟然孝宣皇帝猶廣立榖梁春秋梁邱易大小夏侯尚書義雖相反猶並置之何則與其過而廢之也寧過而立之過猶誤也傳曰文武之道未墜於地在人賢者識其大者不賢者識其小者論語孔子弟子子貢之言也識記也一曰記今此數家之言所以兼包大小之義豈可偏絶乎哉若必專巳守殘專執己所偏見茍守殘缺之文黨同門妒道眞黨同師之學妒道藝之眞也妒與妬同違明詔失聖意以䧟於文吏之議甚爲二三君子不取也其言甚切諸儒皆怨恨是時名儒光祿大夫龔勝以歆移書上疏深自罪責願乞骸骨罷及儒者師丹爲大司空亦大怒奏歆改亂舊章非毁先帝所立帝曰歆欲廣道術亦何以爲非毁也哉後漢范升爲博士尚書令韓歆上疏欲爲費氏易左氏春秋立博士詔下其議建武四年正月朝公卿大夫博士見於雲臺帝曰范博士可前平說升起對曰左氏不祖孔子而出於邱明師徒相傳又無其人且非先王所好無因得立遂與韓歆及太中大夫許淑等互相辯難日中乃罷魏王弼好論儒道辭才逸辯齊王時爲尚書郎與鍾會論議以校練爲家然每服弼之高致何晏以爲聖人無喜怒哀樂其論甚精鍾會等述之弼與不同以爲聖人茂於人者神明也同於人者五情也神明茂故能體冲和以通元五情同故不能無哀樂以應物然則聖人之情應物而無累於物者也今以其無累便謂不復應物失之多矣弼注易潁川人荀融難弼大衍義弼答其意白書以戲之曰夫明足以尋極幽微而不能去自然之性顔子之量孔父之所預在然遇之不能無樂䘮之不能無哀又嘗狹斯人以爲未能以情從理者也而今乃知自然之不可革足下之量雖已定乎胸懷之内然而隔踰旬朔何其想思之多乎故知尼父之於顔子可以無大過矣弼注老子爲之指畧致有理統著道畧論注易往往有高麗言太原王濟好譚病老莊嘗云見弼易注所悞者多管輅字公明冀州刺史裴徽辟爲别駕齊王正始九年舉爲秀才輅辭徽徽言丁鄧二尚書有經國才畧於物理不精也何尚書神明精微言皆巧妙巧妙之志殆破秋毫君當愼之自言不解易九事必當以相問比至雒宜善精其理也輅言何若巧妙以攻難之才游形之表未入於神夫入神者當歩天元推陰陽探𤣥虛極幽明然後覽道無窮未暇細言若欲差次老莊而參爻象愛微辯而興浮藻可謂射侯之巧非能破秋毫之妙也若九事皆至義者不足勞思也若陰陽者精之已久輅爲何晏所請果共論易九事九事皆明晏曰君論陰陽此世無雙時鄧颺與晏共坐颺言君見謂善易而語初不及易中辭義何故也輅尋聲答曰夫善易者不論易也晏含笑而讃之曰可謂要言不煩也因請輅爲卦輅旣稱引鑒戒晏謝之曰知幾其神乎古人以爲難交疏而吐其誠今人以爲難君今一面而盡二難之道可謂明徳惟馨詩不云乎中心藏之何日㤀之時平原太守劉邠淸和有思理好易而不能精與輅相見意甚喜歡自說注易向訖也輅言今明府欲勞不世之神經緯大道誠富羙之秋然輅以爲注易之急急於水火水火之難登時之驗易之淸濁延於萬代不可不先定其神而後垂明思也自旦至今聽採聖論未有易之一分易安可注也輅不解古之聖人何以處乾位於西北坤位於西南夫乾坤者天地之象然天地至大爲神明君父覆載萬物生長無首何以安處二位與六卦同列乾之象彖曰大哉乾元萬物資始乃統天夫統者屬也尊莫大焉何繇有列位也邠依易繫辭諸爲之理以爲注不得其要輅尋聲下難事皆窮析曰夫乾坤者易之祖宗變化之根源今明府論淸濁者有疑疑則無神恐非注易之符也輅於此爲論八卦之道及爻象之精大論開廓衆化相連邠所解者皆以爲妙所不解者皆以爲神自說欲注易八年用思勤苦歴載靡寧定相得至論此才不及易不愛久勞喜承雅言如此相爲高枕偃息矣欲從輅學射覆輅言今明府已虛神於注易亦宜絶思於靈蓍靈蓍者二儀之明數陰陽之幽契施之於道則定天下吉㐫用之於術則收天下毫纎纎微未可以爲易也邠曰以爲術者易之近數欲求其端耳若如來論何事於斯留輅五日不遑恤官但共淸談邠自言數與何平叔論易及老莊之道至於精神遐流與化周旋淸若金水鬰若山林非君侣也邠問輅易言剛徤篤實輝光日新斯爲同不輅曰不同之名朝旦爲輝日中爲光又魏郡太守鍾毓淸逸有才難輅易二十餘事自以爲難之至精也輅尋聲投響言無留滯分張爻象義皆殊妙毓卽謝輅晉顧榮與紀瞻共破陳敏後瞻爲尚書郎與榮同赴雒在塗共論易太極榮曰太極者葢謂渾沌之時曚昧未分日月含其輝八卦隱其神天地混其體聖人藏其身然後廓然旣變淸濁乃陳二儀著象陰陽交泰萬物始萌六合闓拓老子云有物混成先天地生誠易之太極也而王氏云太極天地愚謂未當夫兩儀之謂以體爲稱則是天地以氣爲名則是陰陽今若謂太極爲天地則是天地自生無生天地者也老子又云天地所以能長且久者以其不自生故能長久一生二二生三三生萬物以資始冲氣以爲和原元氣之本求天地之根恐疑以此爲準也瞻曰昔庖羲畫八卦陰陽之理盡矣文王仲尼係其遺業三聖相承共同一致稱易準天無復其餘也夫天淸地平兩儀交泰四時推移日月輝其間自然之數雖經諸聖孰知其始吾子云曚昧未分豈其然乎聖人人也安得渾沌之初能藏其身於未分之内老子先天之言此葢虛誕之說非易者之意也亦謂吾子神通體解所不應疑意者直謂太極極盡之稱言其理極無復外形外形旣極而生兩儀王氏指向可謂近之古人舉至極以爲驗謂二儀生於此非復謂有父母若必有父母非天地其孰在榮遂止宋周續之字道祖少有孝行晉末居廬山布衣蔬食終身不娶高祖踐祚復召之乃盡室俱下帝爲開舘於東郭外招集生徒乘輿降幸並見諸生問續之禮記傲不可長與我九齡射於矍圃三義辯析精奥稱爲名通南齊陸澄武帝永明元年轉度支尚書尋領國子博士時國學置鄭王易杜服春秋何氏公羊麋氏糓梁鄭𤣥孝經澄謂尚書令王儉曰孝經小學之類不宜列在帝典乃與儉書論之曰易近取諸身逺取諸物彌天地之道通萬化之情自商瞿至田何其間五傳年未爲逺無訛雜之失秦所不焚無摧壞之弊雖有異家之學同以象數爲宗數百年後乃有王弼王濟云弼所悟者多何必能頓廢前儒若謂易道盡於王弼方須大論意者無乃仁智殊見且易道無體不可以一體求屢遷不可以一遷執也晉大興四年太常荀崧請置周易鄭𤣥注博士行乎前代于時政繇王庾皆才雋神淸能言𤣥逺捨輔嗣而用康成豈其妄然泰元立王肅易當以在𤣥弼之間元嘉建學之始𤣥弼兩立逮顔延之爲祭酒黜鄭置王意在貴𤣥事成敗儒今若不大𢎞儒風則無所立學衆經皆儒惟易獨𤣥𤣥不可棄儒不可缺謂宜並存所以合無體之義且弼於注經中已舉繫辭故不復别注今若專取弼易則繫說無注左氏㤗元取服䖍而兼取賈逵經繇服傳無經雖在注中而傳又有無經者故也今留服而去賈則經有所闕按杜預注傳王弼注易俱是晩出並貴後生杜之異古未如王之奪實祖述前儒特舉其過又釋例之作所引惟深榖梁㤗元舊有麋信注顔益以范寗麋猶如故顔論閏分范注當以同我者親嘗謂榖梁劣公羊爲注者又不盡善竟無及公羊之有何休恐不足兩立必謂范善便當除麋世有一孝經題爲鄭𤣥注觀其用辭不與注書相類按𤣥自序所注衆書亦無孝經儉答曰易體微遠實貫羣籍施孟異聞周韓殊㫖豈可專據小王便爲該備依舊存鄭允同來說元凱注傳超邁前儒若不列學官其可廢矣賈氏注經世所罕習榖梁小書無俟兩注存麋畧范率繇舊式凡此諸義並同雅論疑孝經非鄭所注僕以此書明百行之首實人倫所先七畧藝文並陳之六藝不與蒼頡凡將之流也鄭注虛實前代不嫌意謂可安仍舊立置梁劉杳高祖天監初爲太學博士宣惠豫章王行叅軍杳少好學博綜羣書沈約任昉以下每有遺㤀皆訪問焉嘗於約坐語及宗廟犧樽約云鄭𤣥答張逸謂爲畫鳳凰尾娑娑然今無復此器則不依古杳曰此言未必可安古者尊彛皆刻木爲鳥獸鑿項及背以出内酒魏世魯郡地中得齊大夫子尾逆女器有犧尊作犧牛形晉永嘉賊曹嶷於靑州發齊景公冡又得此二尊形亦爲牛象二處皆古之遺器知非虛也約大以爲然約又云何承天纂文竒博其書載張仲師及長頸王事此何出杳曰仲師長尺二寸惟出論衡長頸是毗騫王朱建安扶南以南記云古來至今不死約卽取二書尋檢一如杳言伏挺天監初除中軍叅軍事居宅在潮溝於宅講論語聽者傾朝後魏陳竒與河間邢祐同召赴京祕書監游雅引入祕書省與竒論典誥至易訟卦天與水違行雅曰自葱嶺以西水皆西流推此而言易之所及自葱嶺以東耳竒曰易理緜廣包含宇宙若如公言自葱嶺以西豈東回望兊哉竒執義非雅每如此類雅性䕶短因以爲嫌册府元龜卷五百九十九
