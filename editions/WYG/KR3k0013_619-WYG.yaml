body:
  text: 冊府元龜卷六百十九宋王欽若等撰刑法部案鞫深文枉濫案鞫夫周官司冦之職有两造两劑之禁設鈎金束矢之制以五刑聼萬民之獄訟求之於辭氣耳目以察其情簡孚閲實乃蔽其訟斯案鞫之遺範也原夫衆庶之心本乎多辟三代而後嚚訟滋豐雖法令之繁密不能勝夫姦宄雖聼察之明慎不能措其刑辟繇是有司參治承詔劾問逮捕㦯至於寝廣訊掠乃遵於程式以至身䧟乎公憲罪歸乎吏議亦比比而有焉自非司其事者悉其聰明致其忠愛得情而勿喜盡心而是圖亦曷嘗無頗類哉漢劉德為宗正丞雜治劉澤詔獄劉澤齊孝王之孫謀反欲殺青州刺史後為宗正雜案上官氏蓋主事又云德武帝時治主事得淮南王枕中鴻寳苑秘書張湯為廷尉治淮南衡山江都反獄皆窮根本終軍為謁者給事中元鼎中博士徐偃使行風俗使膠東魯國皷鑄鹽鐡還奏事徙為太常丞御史大夫張湯劾偃矯制大害法紀偃以為春秋之義大夫出疆有可以安杜稷存萬民專之可也湯以致其法不能詘其義有詔下軍問狀軍詰偃曰古者諸侯國異俗分百里不通時有聘㑹之事安危之勢呼吸成變故有不受辭造命專己之宜今天下為一萬里同風故春秋王者無外偃廵封域之内稱以出疆何也且鹽鐵郡有餘藏謂先有畜積正二國廢國家不足以為利害而以安社稷存萬民為辭何也偃窮詘服罪當死軍奏偃矯制專行非奉使體請下御史徴偃即罪王禁封陽平侯元帝時中書令石顯用事待詔賈捐之數短顯以故不得官後稀復見而長安令楊興新以材能得幸與捐之相善捐之欲得召見即與興共為薦顯奏宜賜爵闗内侯又共為薦興奏可試守京兆尹顯聞知白之元帝乃下興捐之獄令禁與顯共雜治奏興捐之㒺上不道捐之棄市興减死罪一等髠鉗為城旦諸葛豐為司𨽻校尉侍中許章以外屬貴幸奢滛不奉法度賔客犯事與章相連豐按劾章欲奏其事適逄章出豐駐車舉節詔章曰下欲收之章廹窘馳車去豐追章因得入宫門自歸上豐亦上奏於是收豐節司𨽻去節自豐始彭宣為左將軍哀帝時傅太后怨從弟高武侯傅喜不已使從弟孔鄉侯晏風丞相令奏免喜侯丞相朱博與御史大夫趙𤣥奏免喜為庶人哀帝知傅太后素常怨喜疑博𤣥承㫖即召𤣥詣尚書問状𤣥辭服有詔宣與中朝者雜問宣等劾奏博不道𤣥大不敬晏失禮不敬方賞為廷尉建平中梁王立坐殺人哀帝遣賞與大鴻臚陽由持節即訊後漢寒朗字伯竒明帝永平中以謁者守侍御史與三府掾兵案楚王英獄英與漁陽王平顔忠等造作圗書有逆謀事韓紓永平時為謁者考劾竇勲獄勲大司空融之孫城門校尉穆之子穆父子自失勢數出怨望語捕繫子宣俱死平陵獄勲以北陽主婿留京師亦死雒陽獄魏滿寵漢末為許令時故太尉楊彪收付縣獄尚書令荀彧少府孔融等並屬寵但當受辭勿加考掠寵一無所報考訊如法數日求見太祖言之曰楊彪考訊無他辭語當殺者宜先彰其罪此人有名海内若罪不明必大失民望竊為明公惜之太祖即日赦出彪初彧融聞考掠彪皆怒及因此得了更善寵鍾繇為大理毛玠為尚書僕射典選崔琰既死玠内不悅後有白玠出見黥靣反者其妻子没為官奴婢玠言曰使天不雨盖此也太祖大怒收玠付獄繇詰玠曰自古聖帝明王罪及妻子書云左不共左右不共右予則孥戮汝司冦之職男子入于罪欵女子入于舂藁漢律罪人妻子没為奴婢黥面漢法所行黥墨之刑存於古典今真奴婢祖先有罪雖歴百世猶有黥靣供官一以寛良民之命二以宥并罪之辜此何以負於神明之意而當致旱按典謨急恒寒若舒恒燠若寛則亢陽所以為旱玠之吐言以為寛耶以為急也急當隂霖何以反旱成湯聖世野無生草周宣令王旱魃為虐亢旱以來積三十年歸咎黥面為相值不衛人伐邢師興而雨罪惡無徴何以應天玠譏謗之言流於下民不悦之聲上聞聖聼玠之吐言勢不獨語時見黥面凡為㡬人黥靣奴婢所識知耶何緣得見對之嘆言時以語誰見荅云何以何日月於何處所事已發露不得隠欺具以状對玠曰臣聞蕭生縊死困於石顯賈子放外讒在絳灌白起賜劒於杜郵晁錯致誅於東市伍員絶命於吳都斯數子者或妬其前或害其後臣垂髫執簡累勤取官職在機近人事所竄屬臣以私無勢不絶語臣以寃無細不理人情滛利為法所禁法禁於利勢能害之青蠅横生為臣作謗謗臣之人勢不在佗昔王叔陳生爭正王廷害子平理命舉其契是非有宜曲直有所春秋嘉焉是以書之臣不言此無有時人説臣此言必有徴要乞蒙宣子之辯而求王叔之對若臣以曲聞即刑之日方之安駟之贈賜劒之來比之重賞之惠謹以状對時桓階和洽進言救玠玠遂免黥卒於家何晏為尚書與大将軍曹爽等專政爽敗司馬宣王使晏典治爽等獄晏窮治黨與兾以獲宥宣王曰凡有八族晏䟽丁謐鄧颺等七姓宣王曰未也晏窮急乃曰豈謂晏乎宣王曰是也乃收晏並夷三族梁蔡法度為廷尉卿時有吉翂父為吳興原鄉令為姦吏所誣罪當大辟翂撾登聞鼔乞代父命高祖異之勅法度曰翂請死贖父義誠可嘉但其幼童未必自能造意卿可嚴加脅誘取其欵實法度受勑還寺盛陳徽纆備列官司厲色問翂曰爾求代父死勅已相許便應伏法然刀鋸至劇審能死不且爾童孺志不及此必為人所教姓名是誰可具列答若有悔異亦相聽許翂對曰囚雖蒙弱豈不知刑可畏憚顧諸弟稚藐惟囚為長不忍見父極刑自延視息所以内斷胷臆上干萬乗今欲殉身不測委骨泉壌此非細故奈何受人教耶明詔聼代不異登仙豈有迴貳法度知翂至心有在不可屈撓乃更和言誘語之曰主上知尊侯無罪行當釋亮觀君神儀明秀足稱佳童今若轉辭幸父子同濟奚以此妙年苦求湯鑊翂對曰凡鯤鮞螻蟻尙惜其生况在斯人豈願韲粉但囚父挂深劾必正刑書故思殞仆兾延父命今瞑目引領以聼大戮情殫意極無言復對乃貸其父後魏黨暄文成時為中散奉使齊州撿平原鎭将及長史貪暴事推情診理皆得其實于烈為屯田給納太和初秦州刺史尉雒侯雍州刺史宜都王目辰長安鎭将陳提等貪殘不法烈受詔案騐咸獲贓罪雒侯目辰等皆至大辟提坐徙邉和其奴為尚書左僕射時以西征吐渾諸将淹停不進乆囚未决其奴與尚書毛法仁等窮問其状連日具伏栁崇為尚書右外兵郎中于時河東河北二郡爭境其間有鹽池之饒虞坂之便守宰及民皆恐外割公私朋競紛囂臺府孝文乃遣崇撿斷民官息訟唐馬懐素為左臺監察御史長安中御史大夫魏元忠為張易之所搆配徙嶺表太子僕崔貞慎東宫率獨孤褘之餞於郊外易之怒使人誣吿貞愼等與元忠同謀則天令懐素案鞫遣中使促廹諷令搆成其事懐素執正不受遂得觧崔隠甫為御史大夫與中丞宇文配李林甫奏彈尚書左丞相兼中書令張説引術人夜觧及受􅂍等状勅宰臣源乾曜刑部尚書韋抗大理少卿明珪與隠甫就尚書省鞫問説兄左庶子先詣朝堂割耳稱寃時中書主事張觀左衛長史范堯臣並依倚説勢詐假納賂又私度僧王慶則徃來與説占􅁲吉㐫為隠甫等所鞫伏罪説經两宿𤣥宗使中官高力士視之廻奏説坐於草上瓦器中食蓬首垢面自罸憂懼之甚𤣥宗憫之由是説停中書令觀及慶則杖死連坐者十餘人毛若虗為監察御史乾元中鳯翔府七坊押官剽刼州縣不制大興縣尉謝夷甫因衆怒遂榜殺之其妻訴於李輔國輔國奏請御史孫鎣鞫之不能正其事又令中丞崔伯陽三司推訊之又不成其罪因令若虛推之遂歸罪於夷甫伯陽與之言若虗頗不遜伯陽數譲之若虗馳吿肅宗肅宗曰卿且出對曰臣出即死矣帝乃潜留若虚簾内召伯陽至頗短若虗帝怒頃之因流夷甫貶伯陽同推官十餘人皆嶺外逺惡處宰臣李峴以左右於鎣亦被貶斥於是若虗威震朝列公卿慴懼矣敬羽為御史中丞太子少傅宗正卿李遵為宗正太子通事舍人李若氷告其贓私詔羽按之羽延遵各危坐於小牀羽小痩遵豐碩頃間問即倒請垂足羽曰尚書下獄是囚羽禮延坐何得慢耶遵絶倒者數四請問羽徐應之授紙筆書贓數千貫奏之肅宗遵勲舊捨之但停宗正卿及嗣薛王珍潜謀不軌羽召其黨布拷訊之具以究之信宿獄成珍坐死左衛将軍竇如玢等九人並斬太子洗馬趙非熊等六人杖殺駙馬都尉薛履謙賜自盡左散騎常侍張鎬貶辰州司户趙涓代宗永㤗初為御史禁中失火焚屋室數十間與東宫稍逼近帝深驚疑之涓時為廵使俾令即訊涓周歴壖囿案驗證㨿乃上直官遺火所致也推鞫明審頗盡事情帝甚嘉賞焉杜亞大厯中為諫議大夫元載得罪也亞與劉晏李涵等㭍人同鞫訊之載死之翌日亞遷給事中河北宣慰使宇文邈德宗時為御史中丞前萬年尉盧伯逹上表云𤣥法寺僧法湊與寺衆爭競無理臣已斷還俗法凑又披法服詣臺訴臣御史崔芃敬騫曲受法凑状欲䧟害臣是日令邈與刑部侍郎張彧大理卿鄭雲逵為三司使及功德使判官衢州司馬諸葛述同於尚書省刑部推案既而彧疾甚兩吏扶入中書邈以疾請假並特召至延英令依前推事未㡬貶騫高州電白尉騫與雲逵忿言爭語過深又令子弟假別人姓名進状訴故獄未竟先貶僧法凑决四十流崖州李元素為侍御史東都留守将令狐運逐賊出郊其中有刦轉運絹於道者留守杜亞以運豪家子意其為之乃令判官穆員及從事張𢎞靖同鞫其事員與𢎞靖皆以運職在牙門必不為盗抗請不案亞不聼而怒斥逐員等令親事将武金鞫之金笞箠運從者十餘人一人笞死九人不勝考掠自誣竟無贓状亞具以聞請流運於嶺表德宗令元素與刑部員外郎崔從太大理司直盧士瞻三司覆按運獄既竟明運迹非行盗以曽捕掠人配流歸州武金肆虐作賊教人通欵配流建州後歳餘河南尹齊抗捕得刼轉運絹賊郭郜朱瞿之等七人及贓絹詔亞與留臺同劾之皆首伏然終不原運運竟死於歸州李夷簡為御史中丞劾奏京兆尹楊慿前為江西觀察使贓罪及他不法事勅付御史臺覆案刑部尚書李􅅠大理卿趙昌同鞫問臺中又捕得慿前江南判官監察御史楊瑗繫於臺後命大理少卿胡珦左司員外郎胡証侍御史韋顗同推鞫之詔貶賀川臨賀縣尉先是慿在江西夷簡自御史出官在廵屬慿頗踈縱不顧接之夷簡嘗切齒及慿歸朝修第於永寧里功作併興又廣畜妓妾於永樂里之别宅時人大以為言且修營之僣将欲殺之及下獄置對數日未得其事夷簡持之益急帝聞且貶焉韓臯為左僕射穆宗長慶初王廷凑朱克融連兵圍牛元翼於深州朝廷俱赦其罪賜爵鉞令罷兵俱不奉詔元稹為相以天子非次㧞擢欲有所立以報上有和王府司馬于方故司空頔之子進與稹言有竒士王昭王友二人嘗客於青鄆㳺於燕趙間頗與賊黨熟可以反間而出元翼仍自以家財資其行仍賂兵吏部令史偽出吿身二十通以便宜給賜稹皆然之有季賔者知于方之謀以稹與裴度有隙乃吿度云于方為稹所使欲結客王昭等刺度度隠而不發神䇿中尉奏其事詔臯與兵部尚書李逄吉給事中鄭覃為三司使等訊鞫而害裴事無驗而前事盡露遂俱罷稹度平章事裴充為大理少卿文宗太和八年十二月癸巳命充與刑部郎中張諷侍御史盧𢎞正充三司使就御史臺推户部錢物事華州刺史宇文鼎户部員外郎盧允中左司員外郎判户部姚康並下御史臺推鞫先是宇文鼎妾支和糴官秦季元錢八萬餘貫姚康盧允中與廵官李孚楊洵美并典吏等分取秦季元絹凢六千九百四十疋至是御史臺以具獄聞鼎貶循州刺史康貶韶州始興縣尉允中貶高州良德縣尉洵美與孚各杖一百流嶺外深文夫法令所以閑邪防姦祥刑閲實明慎國章欽恤人命非所以殺之将所以生之而惨忍之徒苛刻之吏以希㫖為奉公以繁刑為稱職鍜鍊而成獄巧詆而舞文欲其民恊於中政是以和不可得矣董安于為趙上地之守行石阜山中見深澗峭如墻深百仞因問其卿左右曰人嘗有入此者乎對曰無有嬰兒癡聾狂亂人嘗有入此乎對曰無有馬羊牛嘗有入此乎對曰無有安于喟然歎曰吾能治矣使吾法之無赦猶入澗之必死也則民莫之犯何為不治耶秦趙高為郎中令更變律令有罪者相坐收族漢張湯為侍御史治陳皇后巫蠱獄深窮黨與武帝以為能遷大中大夫與趙禹共定諸律令務在深文拘守職之吏拘刻於守職之吏已而禹至少府湯為廷尉又治淮南衡山江都反獄皆窮根本嚴助伍被帝欲釋之湯爭曰伍被本造反謀而助親幸出入禁闥腹心之臣乃交私諸侯如此弗誅後不可治帝可論之可湯所奏而論决之其治獄所巧排大臣自以為功多此類繇是益尊任杜周為廷尉史使案邉失亡因虜入為㓂而失人畜甲兵倉廪者也所論殺甚多奏事中武帝意任用以奏事當天子之意故被任用也中音竹仲切與减宣更為中丞者十餘歳更互也音工衡切周少言重遲遲謂性非敏速也而内深次骨其用法深趙禹以佐史補中都官用廉為令史事太尉周亞夫亞夫為丞相禹為丞相史府中皆稱亷平然亞夫弗任曰極知禹無害然文深禹持文法深刻不可以居大府孝武帝時禹以刀筆吏積勞稍遷為御史帝以為能咸宣為御史及中丞使治主父偃及淮南反獄所以㣲丈深詆殺者甚衆稱為敢决疑數廢數起為御史及中丞者㡬二十歳後漢周紆為廷尉史為人刻削少恩好韓非之術苛惨失中數為有司所奏蜀吕義為蜀郡太守入為尚書轉尚書令持法深刻好用文俗吏故居大官名聲損於郡縣後魏羊祉性剛愎好刑名宣武時為光禄大夫祉自當官不憚彊禦時有檢覆每令出使好慕名利頗為深文所經之處人號天狗北齊崔昂為廷尉卿本性清嚴凡見黷貨軰疾之若讐以是治獄文深世論不以平恕相許隋蘇威為内史令脩格令章程並行於當世然頗傷苛碎論者以為非簡乆之法趙仲卿為檢校司農卿蜀王秀之得罪奉詔徃益州窮案秀之賔客經過處仲卿必深文致法州縣長吏坐者大半文帝以為能賞奴婢五十口黄金二百两米粟五千石竒珍雜物稱是劉子通為大理寺丞性愛深文每隨牙奏獄能承順帝意唐張楚金為司刑卿在官公清然傷於忍刻時人鄙之崔元綜為鸞臺侍郎同鳯閣鸞臺平章事情深刻薄每受制鞫獄必披毛求疵䧟於重比以故人多畏而鄙之胡元禮為司刑少卿李日知為司刑丞元禮用法嚴急日知獨寛平無寃濫羅希奭為吏持法深刻𤣥宗天寳中右相李林甫引與吉溫持獄遷殿中侍御史自韋堅皇甫惟明李適之栁勣裴敦復李邕鄔元昌楊慎矜趙奉璋下獄皆與溫鍜錬故時稱羅鉗吉網惡其深刻也後唐李殷夢為刑部員外郎時徐州奏沛縣令鄭曈下鄉将縣印隨身誤有亡失大理正宋昇以誤失定罪合除一任官殷夢詳覆以為置印在懐輙稱亡失請以毁棄論其累任告示並請追赴都省焚之枉濫易曰君子以明慎用刑而不留獄書曰欽哉欽哉惟刑之恤哉斯皆懼其枉濫以及善人之謂也則有處士師之任参議讞之列心惟邪僻行必傾險或深文巧詆以寘於法或臨財茍得以縱其罪或希望於風㫖或附麗於權要乖審克之理無閲實之状成茲枉撓亂彼典章以至洩寃憤之氣見變恠之異使禍不旋踵亾身覆族者良有以也詩人菀栁之刺繇是而作矣樂王鮒字叔魚晉大夫也初晉邢侯與雍子爭鄐田邢候楚申公巫臣之子也雍子亦故楚人乆而無成士景伯如楚士景伯晉理官叔魚攝理攝代景伯韓宣子命斷舊獄罪在雍子雍子納其女扵叔魚叔魚蔽罪邢侯蔽斷也邢侯怒殺叔魚與雍子扵朝宣子問其罪於叔向叔向曰三人同罪施生戮死可也施行罪也雍子自知其罪而賂以買直鲋也鬻獄邢侯專殺其罪一也已惡而掠羙為昏掠取也昏亂也貪以敗官為墨墨不㓗之稱也殺人不忌為賊忌畏也夏書曰昏墨賊殺逸書三者皆死刑臯陶之刑也請從之乃施邢侯而尸雍子與叔魚于市伯州犁為楚大宰楚侵鄭至於城麋鄭皇頡戌之皇頡鄭大夫守城麋之邑出與楚師戰敗穿封戌囚皇頡公子圍與之爭之公子圍共王子靈王也正於伯州犁正曲直也伯州犁曰請問於囚乃立囚伯州犁曰所爭君子也其何不知言王子圍及穿封戌皆非細人易别識也上其手曰夫子為王子圍寡君之貴介弟也介大也下其手曰此子為穿封戍方城外之縣尹也誰獲子上下其手以道囚意囚曰頡遇王子弱焉弱敗也言為王子所得戍怒抽戈逐王子圍弗及楚人以皇頡歸秦司馬欣為櫟陽獄掾項梁嘗有櫟陽獄逮乃請蘄獄掾曹咎書抵欣以故事皆已蘄音機縣名屬沛郡抵歸也已止也謂梁嘗被櫟陽縣逮梁乃請蘄獄掾曹咎書至櫟陽獄掾司馬欣事故得止息也漢周陽由以宗家任為郎由為郡守武帝即位吏部尚修謹然由居二千石中最為暴虐驕恣所愛者撓法活之所憎者曲法滅之撓亦屈曲也所居郡必夷其豪杜周為廷尉其治大抵放張湯大抵大歸也放依也放甫徃切而善候伺觀望天子意帝所欲擠者因而䧟之擠音濟墜也帝所欲釋乆繫待問而㣲見其寃状見顯也詔獄亦益多矣二千石繫者新故相因不减百餘人郡吏大府舉之廷尉舉皆也言郡吏大府獄事皆歸廷尉也大府丞相御史之府也一歲至千餘章章大者連逮証案數百小者數十人遠者數千里近者數百里㑹獄往赴對也吏因責如章告劾皆令服罪如所告劾之本章不服以掠笞定之定其辭令服也於是聞有逮証皆亡匿獄久者至更數赦十餘歲而相告言更歴也其罪或非赦例故不得除而乆迯亾不出至於十餘歳猶相告言由周用法深刻故也更音工衡切大氐盡詆以不道以上氐讀與抵同抵歸也詆誣也並音丁禮切廷尉及中都官詔獄逮至六七萬人中都官凡京師諸官府也獄詞所及追考問者六七萬人也吏所增加十有餘萬吏又於此外以文致之更增加也晉劉頌為廷尉㑹滅吳諸将爭功遣頌校其事以王渾為上功王濬為中功帝以頌折法失理左遷京兆太守後魏袁翻為廷尉頗有不平之論盧同為黄門侍郎初楊昱與元乂有讐及元氏之廢太后乃出昱為濟隂内史中山王熈起兵於鄴乂遣同詣鄴收熈并窮黨與同希乂指就郡鎻昱赴鄴訖百日後乃還任北齊盧斐為尚書左丞别典京畿詔獄酷濫非人情所為無問事之大小拷掠過度於大棒車輻下死者非一或嚴冬至寒置囚於氷雪之上或盛夏酷熱暴之日中枉䧟人致死者前後百數又伺察官人罪失動即奏聞朝士見之莫不重迹屛氣皆目之為盧校事斐後以謗史與李庶俱病鞭死獄中隋楊遠劉子通高祖時並為大理寺丞子通等性愛深文每隨牙奏獄能承順帝意帝大悦並遣於殿廷三品行中供奉每有詔獄專使主之候帝所不快則案以重抵無殊罪而死者不可勝原遠又能附楊素每於途中接候而以囚名白之皆隨素所為輕重其臨終赴市者莫不途中呼枉仰天而哭梁敬眞為大理司直時焬帝欲成光禄大夫魚俱羅之罪令敬真治其獄遂希㫖䧟之極刑未㡬敬真有疾見俱羅為之厲數日而死裴藴焬帝時為御史大夫楊𤣥感之反也帝遣藴推之其黨與謂藴曰𤣥感一呼而從者十萬益知天下人不欲多多即相聚為盗耳不盡加誅則後無以勸藴由是以峻法治之所戮者數萬人皆籍没其家唐王世充仕隋為兵部貟外郎善敷奏明習法律然舞弄文法高下其心或有駁難之者世充利口飾非辭議鋒起衆雖知其不可而莫能屈李承嘉為御史大夫時武三思詿構桓彦範貶為龍州司馬是歳秋三思又隂令人䟽皇后穢行牓於天津橋請加廢黜中宗聞之怒命承嘉推求其人承嘉希三思㫖奏言彦範與敬暉張柬之袁恕已崔元暐等教人宻為此牓雖託廢后為名實有危君之計請加族滅制依承嘉所奏大理丞李朝隠執奏云敬暉等既未經鞫問不可即肆誅夷請差御史案罪待至准法處分大理卿裴談奏云敬暉等只合㨿勅斷罪不可别候推鞫請並處斬籍没中宗納其議仍以彦範等五人嘗賜之鐡券許以不死乃長流彦範於瀼州敬暉於崖州張柬之於隴州袁恕已於環州崔元暐於古州並終身禁錮子弟年十六已上者亦配流嶺外擢授承嘉金紫光禄大夫進封襄武郡公韋氏又特賜承嘉綵物五百叚瑞錦被一張擢拜裴談為刑部尚書左貶李朝隠為聞喜令姚璹為益州長史新郡丞朱侍辟坐贓至死逮捕繫獄侍辟素與沙門理中隂結諸不逞因侍辟以殺璹為名擬據巴蜀為亂人有宻表吿之者制令璹按其獄璹深持之事渉疑似引而誅死者以千數天后又令雒州長史宋元爽御史中丞霍獻可等重覆之亦無所發明逮繫獄數百人不勝酷毒逓相附㑹以就反狀因此籍沒者復五十餘家其餘稱知反配流者十八九行道寃之監察御史袁恕已劾奏其事天后初令璹與恕已對定又尋令罷推周興明習法令為司刑少卿秋官侍郎自垂拱以來屢受制决獄被其䧟害者數千人索元禮為游擊将軍則天令於雒州收院推案制獄元禮性殘忍推一人廣令引數十百人衣冠震懼甚於狼虎則天數召見賞賜張其權勢凢為殺戮者數千人册府元龜卷六百十九
