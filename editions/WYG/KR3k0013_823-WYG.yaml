body:
  text: 册府元龜卷八百二十三宋王欽若等撰總録部清談藴藉清談𫝊曰言談者身之文老子曰善言無瑕讁乃若和順内積辭氣清越振金玉而條暢去枝葉之扶疏抵掌開談應機晤對深造至理煥發仁聲析羣言之微妙為時輩之傾仰扣之不竭聽者忘倦斯皆修餙雅調敷述精義婉而成章著為令譽者也江左相尚流風最盛非夫識度冲逺議論典正洞協名理作世模範者則無取焉後漢孔伷字公緒陳留人能清談尚論嘘枯吹生後為豫州刺史魏荀粲字奉倩潁川潁隂人也太和初到京邑與傅嘏談嘏善名理而粲尚𤣥逺宗致雖同倉卒時或有格而不相得意裴徽通彼我之懐為一家騎驛頃之粲與嘏善夏侯𤣥亦親嘗謂嘏𤣥曰子等在世塗間功名必勝我但識劣我耳嘏難曰能勝功名者識也天下孰有本不足而末有餘者邪粲曰功名者志局之所奬也然則志局自一物耳固非識之所獨濟也我以能使子等為貴然未必齊子等所為也管輅字公明冀州刺史裴徽檄召為文學從事一相見清論終日不覺罷倦天時炎熱移牀在庭前樹下乃至鷄向晨然後出王弼字輔嗣少好學時淮南人劉淘善論縱横為當時所推每與弼語嘗屈弼天才卓出當其所得莫能奪也裴徽為吏部郎弼未弱冠往造焉徽一見而異之問弼曰夫無者識萬物之所資也然聖人莫肯致焉而老子申之無己者何弼曰聖人體無無又不可以訓故不説也老子是有者也故嘗言無所不足尋亦為傅嘏所知于時何晏為吏部尚書甚竒弼歎之曰仲尼稱後生可畏若斯人者可與言天人之際乎卒於尚書郎爰俞字世都清真貴素辯於論議採公孫龍之辭以談微理少有能名辟太尉府稍歴顯位晉裴遐善言𤣥理音辭清暢冷然若琴瑟嘗與河南郭象談論一坐嗟服為東海王越主簿郭象少有才理好莊老能清言太尉王衍每言聽象語如懸河瀉水注而不竭卒於東海王太傅主簿裴頠字季彦樂廣嘗與頠清言欲以理服之而頠辭論豐博廣笑而不言時人謂頠為言談之林藪後為尚書僕射侍中為賈后所害胡母輔之字彦國少擅髙名王澄嘗語人曰彦國吐言如鋸木屑霏霏不絶誠後進領䄂也後為楊武軍湘州刺史王濟字武子為侍中每侍見未嘗不諮論人物及萬機得失濟善於清言修飾辭令諷議將順朝臣莫能尚焉王戎善發談端賞其要㑹朝賢嘗上已禊雒或問王濟曰昨游有何言談濟曰張華善説史漢裴頠論前言往行衮衮可聽王戎談子房季札之間超然𤣥箸其為識鑒者所賞如此後為司徒王衍既有盛才美貌明悟若神嘗自比子貢兼聲名籍甚傾動當世好善𤣥言惟説老莊為事每捉玉柄麈尾與手同色義理有所不安随即更改世道口中雌黄朝野翕然謂之一世龍門矣累居顯職後進之士莫不景慕倣效選舉登朝皆以為稱首後為太尉與石勒戰敗遇害樂廣尤善談論每以約言折理以厭人之心其所不知黙如也裴楷嘗引廣共談自夕申旦雅相欽挹歎曰我所不如也尚書令衛瓘朝之耆舊逮與魏正始中諸名士談論見廣而竒之曰自昔諸賢既没嘗恐微言將絶而今乃復聞斯言於君矣命諸子造焉曰此人之水鏡見之瑩然若披雲霧而見青天也王衍自言與人語甚簡至及見廣便覺已之煩其為識者所歎美如此後至尚書令阮瞻字千里讀書不甚研求而黙識其要遇理而辨辭不足而旨有餘見司徒王戎戎問曰聖人貴名教老莊明自然其旨同異瞻曰將無同戎咨嗟良久即命辟之時謂三語掾阮修字宣子好易老善清言王衍當時談宗自以論易畧盡然有所未了研之終莫悟每云不知比没當見能通之者不衍族子敦謂衍曰阮宣子可與言衍曰吾亦聞之但未知其亹亹之處何如及與修談言寡而旨暢衍乃歎服焉後為太子洗馬被害衛玠好言𤣥理其後多病體羸毋嘗禁其語遇有勝日親友時請一言無不咨嗟以為入微琅琊王澄有髙名少所推服每聞玠言輙歎息絶倒故時人為之語曰衛玠談道平子絶倒謝鯤先雅重玠相見欣然言論彌日王敦謂鯤曰昔王輔嗣吐金聲於中朝此子復玉振於江表微言之緒絶而復續不意永嘉之末復聞正始之音何平叔若在當復絶倒為太子洗馬卒祖納字士言最有操行能清言文義可觀後除光禄大夫潘京荆州人舉秀才到雒尚書令樂廣與京同舟共談累日深歎其才謂京曰君天才過人恨不學耳若學必為一代談宗京感其言遂勤學不倦時武陵太守戴昌亦善談論與京共談京假借之昌以為不如已笑而遣之令過其子若思京方極其言論昌竊聽之乃歎服曰才不可假遂父子俱屈焉孫盛字安國博學善言名理于時殷浩擅名一時與抗論者惟盛而已盛嘗詣浩談論對食舊擲麈尾毛悉落飯中食冷而復暖者數四至暮忘餐理竟不定累遷秘書監加給事中郄超有重名時沙門支遁以清談著名于時風流勝貴莫不崇敬意為造微之功足叅諸正始而遁嘗重超以一時之雋甚相知賞後為司徒左長史殷浩識度清逺弱冠有美名尤善𤣥言與叔父融俱好老易融與浩口談則辭屈著論則融勝浩由是為風流談論者所宗後至中軍將軍謝安字安石弱冠詣王濛清言良久既去濛子修曰向客何如大人濛曰此客亹亹為来逼人王導亦深器之由是少有重名嘗與王羲之登冶城悠然遐想有髙世之志羲之謂曰夏禹勤王手足胼胝文王旰食日不暇給今四郊多壘宜思自效而虚談廢務虚文妨要恐非當今所宜安曰秦任商鞅二世而亡豈清言致患邪後至太保贈太傅張慿有志氣為鄉閭所稱舉孝亷負其才自謂必叅時彦初欲詣劉惔鄉里及同舉者共笑之既至惔處之下坐神意不接慿欲自發而無端㑹王濛就惔清言有所不通慿於末坐判之言旨深逺足暢彼我之懐一坐皆驚惔延之上坐清言彌日留宿至旦遣之慿既還船須臾惔遣傳教覔張孝亷船便召與同載遂言之於簡文帝帝召與語歎曰張慿勃窣為理窟謝萬字萬石工言論簡文帝作相召為從事中郎萬着白綸巾鶴氅裘履版而前既見與帝共談移日為豫州刺史謝朗字長度善言𤣥理文義􅃩發總角時病新起體甚羸未堪勞於叔父安前沙門支遁講論遂至相苦其母王氏再遣信令還安欲留使竟論王氏因出云新婦少遭難一生所寄惟在此兒遂流涕携朗去終於東陽太守殷仲堪能清言每云三日不讀道徳經便覺舌本間强其談理與韓康伯齊名士咸慕愛之後為荆州刺史王濛為司徒左長史善清談謝安嘗稱美濛至長史語甚不多可謂令音又云濛恬暢能言名理宋張敷性整貴文韻端雅好𤣥言善屬文初父邵使與髙陽宗少文談繋象往復數畨少文每欲屈拂麈尾歎曰吾道東矣於是名價日重卒於司徒左長史袁豹善言雅俗每商較古今兼以誦詠聽者忘疲為太尉長史張鏡少與光禄大夫顔延之隣居談義飲酒喧呼不絶而鏡静嘿無言聲後鏡與客談延之從籬邉聞之取胡床坐聽辭義清𤣥延之心服謂客曰彼有人焉由是不復酣呌卒於新安太守宗炳字少文精於言理累徵太子庶子不應南齊張緒吐納風流聽者皆忘饑疲見者肅然如在宗廟雖終日與居莫能測焉後至光禄大夫徐嗣伯字叔紹有孝行善清言位正員郎諸府佐劉繪為後進領袖敏悟多能時張融以言辭辯㨗周顒彌為清綺而繪音采不贍麗雅有風則時人為之語曰三人共宅夾清漳張南周北劉中央言其處二人間也後為大司馬從事中郎張融字思光𤣥義無師法而神解過人白黑談論鮮能抗拒後為司徒左長史周顒每賔友㑹同顒虚席晤語辭韻如流聽者忘倦兼善老易與張融相遇輙以𤣥言相滯彌日不解清貧寡欲日長蔬雖有妻子獨處山舍甚機辯衛將軍王儉謂顒曰卿山中何所食顒曰赤米白鹽緑菜紫葵文惠太子問顒菜食何味最甚顒曰春初早韭秋末晚菘何𦙍亦精信佛法無妻太子又問顒卿精進如何𦙍對曰三塗八難共所未免然各有累太子曰所累伊何對曰周妻何肉其言辭應變如此轉國子博士兼著作太學諸生慕其風争事華辨始著四聲切韻行於時梁張卷字令逺少以知理著稱能清言位至都官尚書伏曼容仕宋為尚書外兵郎嘗與袁粲罷朝相㑹言𤣥理時論以為一臺二絶子晅㓜傳父業能言𤣥理張充能清言與從叔稷俱有令譽後為金紫光禄大夫張嵊少方雅有志操能清言後為吴興太守范縝性質直好危言髙論不為士友所安惟與外弟蕭琛相善琛名曰口辦每服縝簡詣為國子博士卒官何朗字石明早有才思上清言周捨每與共談服其精理歴官散騎侍郎到洽美容質善談吐武帝嘗問待詔丘遲曰到洽如何沆漑洽沆溉之從父兄也遲曰正情過於沆文章不減漑加以清竒殆將難及後為潯陽太守嚴植之少善莊老能𤣥言累遷中撫軍記室叅軍陳周𢎞正少通老子周易叔父侍中捨每與談論輙異之後為右僕射領國子祭酒𢎞正善清談梁末為𤣥宗之冠龔孟舒善談名理位至大中大夫後魏閻慶裔博識洽聞善於談論聽其言説不覺忘疲為敷城太守卒崔孝芬為吏部尚書博聞口辦善談論愛好後進終日忻然啇確古今間以嘲謔聽者忘疲唐陸徳明受學於周𢎞正善言𤣥理為國子博士卒房琯好賔客善談論為宰相無匪懈之意俱與庶子劉秩諫議李何忌等髙談虚論説釋氏因果老子虚無而已後罷相久之為刑部尚書卒楊綰雅尚𤣥言凡所知友皆一時名士或造之者清談終日未嘗及名或有客欲以世務干者見綰言必𤣥逺不敢發詞内媿而退後為中書侍郎平章事卒藴藉𫝊云和順積中英華發外又云進退可度容止可觀斯藴藉之謂也豈徒天資淑茂吟韻清婉盖亦習尚書云矜持舉措與塵游而不雜在醜夷而不争周旋君子之儀縹緲有神仙之稱者矣若夫進對温雅談論調暢陟降軒陛側媚于天子回翔表著則鬰為士範型王言之嘉奬聳朝論之欣慕至乃釋愠怒為悦豫去鄙吝為夷曠加以服用玩好奢素各擅其所宜飲食宴集風流遂成于故事閒雅自喜姿致可觀内無媿于方人外有名於競爽本其源出職自禮官逮漢官之肇興頗餙以儒雅南朝寖盛冠絶向時元魏以還氣裕遷卓然其風標峻爽詞調明朗規矩誠設從容以和者亦何嘗冺没於鄉曲間哉漢司馬相如蜀郡成都人也車騎雍容閒雅甚都都間雅之稱也終文園令薛廣徳為御史大夫為人温雅有藴藉後漢馬援為伏波將軍援為人明白鬚髪眉目如畫閑於進對尤善述前事每言及三輔長者至閭里少年皆可觀聽皇太子諸王聞者莫不屬耳忘倦虞延字子大陳留人光武東廵路過小黄髙帝母昭靈后園陵在焉時延為部督郵詔呼問園陵事進止從容跽拜可觀帝善之鄧衍為新野功曹以小子侯每預朝㑹容姿趨歩有出於衆明帝目之曰朕之容貌豈若此人特賜與焉袁紹為冀州牧容貌端正威儀進止動見倣效郭泰字林宗舉有道不應善談論美音制褒衣博帶周游郡國嘗於陳梁間行遇雨巾一角墊時人乃故折一角以為林宗巾魏孟達自蜀来歸文帝既至譙進見閒雅才辯過人衆莫不屬目終新城太守蜀劉琰字威碩魯國人也先主在豫州辟為從事其宗姓有風流善談論厚親待之遂随從周旋嘗為賔客車服飲食號為侈靡侍婢數十皆能為聲樂又悉教誦讀魯靈光殿賦吴滕𦙍為人白晳威儀可觀每正朔朝賀修謹在位大臣見者莫不歎賞終衛將軍晉樂廣與王衍俱託心事外名重於時故天下言風流者謂王樂為稱首焉廣終尚書令王衍字夷甫神情明秀風姿詳雅妙善𤣥言每捉玉柄麈尾與手同色位至太尉尚書令何邵字敬祖少與武帝同年有總角之好帝為王太子邵為中庶子及即位轉散騎常侍甚見親待邵雅有姿望逺客朝見必以邵侍直每諸方貢獻帝輙賜之而觀其占謝焉温嶠字太真風儀秀整美於談論見者皆愛悦之後為驃騎將軍鎮武昌卒庾亮為中書令以蘇峻之亂奔陶侃侃與亮談宴終日亮啖薤因留白侃問曰安用此為亮云故可以種侃於是尤相稱歎云非惟風流兼有為政之實後鎮武昌諸佐吏殷浩之徒乗秋夜往共豋南樓俄而不覺亮至諸人將起避之亮徐曰諸君少住老子於此處興復不淺便據胡牀與浩等談課何充字次道風韻淹雅文義見稱能飲酒雅為劉惔所貴惔每見次道飲曰令人欲傾家醸言其能温克也充為侍中録尚書事謝萬弱冠辟司徒掾遷右西屬不就簡文帝作相聞其名為撫軍從事中郎萬著白綸巾鶴氅裘履版而前既見帝共談移日車武子善於賞㑹當時每有盛坐而武子不在皆云無車公不樂謝安游集之日輙開筵待之武子終吏部尚書王裒陽城營陵人少禮操非禮不動非法不言身長八尺四寸容貌絶異音聲清亮辭氣韶雅隐居教授三徵七辟皆不就王恭美姿儀人多愛悦或目之曰濯濯如春月栁嘗被鶴氅裘渉雪而行孟㫤窺見之嘆曰此真神仙中人也恭後為平北將軍假節鎮京口王獻之字子敬少有盛名而髙邁不羈雖困居終日容止不怠風流為一時之冠終中書令王濛字仲祖與沛國劉惔齊名友善惔嘗稱濛性至通而自然有節濛每云劉君知我勝我自知時人以惔方荀奉倩濛比袁曜卿凡稱風流者舉惔為宗焉濛為司徒左長史王珣為衛將軍加散騎常侍以疾辭職嵗餘卒桓𤣥與㑹稽王道子書曰珣神情朗悟經史明徹風流之美公私所寄忽爾䘮失歎悼之深顧愷之每食甘蔗嘗自尾至本人或恠之云漸入佳境官至散騎常侍宋張敷特善音儀盡詳緩之致與人别執手曰念相聞餘響久之不絶張氏後進至今慕之其源流起自敷也終司徒左長史羊欣少静黙無競於人善言笑美容止可觀官至中散大夫江夷美風儀善舉止歴任以和簡著稱位至湘州刺史龔祈字孟道武陵人風姿端雅容止可觀中書郎范述見而歎曰此荆楚仙人也祈時或賦詩言不及世事不應徵辟袁粲清整有風操自遇甚厚嘗著妙徳先生傳以續嵇康髙士傳以自况後為中書監領司徒宅宇平素器物取給好飲酒善吟諷獨酌園庭以此自適居負南郭時杖䇿獨游素寡往来門無雜客南齊禇淵美儀貌善容止俯仰進退咸有風則每朝㑹百僚逺國莫不延首目送之宋明帝嘗歎曰禇淵能遲行緩歩便持此得宰相矣位至司徒檀超字悦祖髙平人為國子博士兼左丞超嗜酒好言詠舉止和靡自以晉郗超為髙平二超謂人曰猶覺我為優也太祖賞愛之庾杲之為黄門郎風範和潤善音吐武帝令對魏使兼侍中帝每歎其風器之美王儉在座曰杲之為蟬冕所照更生風采陛下故當與其即真帝意未用也王儉為僕射兼領祭酒十日一還學監試諸生申引在庭劍衛令史儀容甚盛作解散䯻斜挿幘簪朝野慕之相與倣效儉嘗謂人曰江左風流宰相惟有謝安盖自比也江斆湛孫也為丹陽丞時袁粲為尹見斆歎曰風流不墜正在江郎數與宴賞流連日夜封孝琰為通直散騎常侍孝琰文筆不髙但以風流自立善於談謔威儀閒雅容止進退人皆慕之張緒為尚書令益州獻蜀栁數株條甚長枝大若絲縷時舊宮芳林苑始成武帝以植於太昌靈和殿前嘗賞玩咨嗟曰此楊栁風流可愛似張緒少年時其見賞愛如此王儉為尚書令丹陽尹時諸令史問訊有一令史善俯仰進止可觀儉賞異之問曰卿與誰共事荅云十餘嵗在張令門下儉目送之時尹丞殷臶在坐曰是康成門人也胡諧之為左衛將軍加給事中諧之風采環潤善自居處兼以舊恩見遇朝士多與交游徐孝嗣為太子右衛率轉長史兼侍中善趨歩閒容止與太宰禇淵相埒武帝深加待遇梁謝顥宋末為豫章太守至石頭遂白服登烽火樓坐免官謁齊髙帝自占謝言辭清麗容儀端雅左右為之傾目宥而不問臧盾為尚書中兵郎盾美風姿善舉止每趨奏髙祖甚悦焉到沆美風神容止可悦天監初遷征虜主簿髙祖初臨天下收扶賢俊甚愛其才到漑字茂灌美風儀善容止終於散騎常侍賀琛為尚書左丞參禮儀事每見髙祖與語嘗移晷刻故省中為之語曰上殿不下有賀琛容止都雅故時人呼之何昌㝢少而清浄幽獨不羣所交者必當世清名是以風流籍甚位至侍中領驍騎將軍陳蕭允少知名神彩凝逺通逹有識鑒容止藴藉動合規矩起家邵陵王法曹叅軍謝哲字頴預陳郡陽夏人美風儀舉止藴藉而襟情豁然為士君子所重官至散騎常侍中書令領前將軍王㻛司空冲之第十二子也沉静有器局美風儀舉止藴藉梁大同中起家秘書郎陸繕為太子中庶子領歩兵校尉掌東宫管記繕儀表端麗進退閒雅世祖使太子諸王咸取則焉其超歩躡履令習繕規矩後魏張濟字士度渉獵書傳清辨美儀容道武愛之引侍左右與公孫表等俱為行人拜散騎侍郎崔朗美容貌渉獵經史少温厚有風俗以軍功起家震威將軍畢祖彦渉獵書傳風度閒雅為時所知為光禄大夫王誦字國章融之子學渉有文才神氣清雋風流甚美位至給事黄門侍郎李諧字䖍和風流閒潤博學有文辨當時才士咸相欽賞終於秘書監劉藻字彦先渉獵羣籍美談笑善與人交為太尉司馬裴粲沉重美風儀歴正平𢎞農二郡太守髙陽王雍曽以事屬粲不從雍甚為恨後因九日馬射勅畿内太守皆赴京師雍時為州牧粲往修謁雍含怒待之粲神情閒邁舉止抑揚雍目之不覺解顔及坐定謂粲曰相愛舉動可更為一行粲便下席為行從容而出坐事免官後宣武聞粲善自樹置欲觀其風度忽令傳詔就家急召之須臾之間使者相屬合家恐懼不測所以粲更恬然神色不變帝歎異之北齊髙乾性明悟俊偉有智畧美音容進止都雅為府儀同三司徐州刺史崔陵狀貌偉麗善於容止少有名望為當時所知為東兖州刺史楊愔㓜聰敏好學及長能清言美風神俊悟容止可觀人士見之莫不敬異有識者多以逺大許之後為驃騎大將軍開封府王裴譲之字士禮為文㐮主簿兼中書舍人文㐮嘗入朝譲之導引容儀藴藉文㐮目之曰士禮佳舍人遷長史兼中書侍郎領舍人王昕北海劇人為銀青光禄大夫判祠部尚書事生九子並風流藴藉世號王氏九龍盧昌衡衛尚書左僕射道䖍之子尚書王昕以雅談獲罪諸弟尚守而不墜自兹以後此道浸微昌衡與頓丘李若彭城劉珉河南陸彦師隴西辛徳源太原王循並為後進風流之士沈靖有才識風儀藴藉容止可觀為尚書郎後與柳機少有令譽風儀辭令為當世所推官至華州刺史獨孤信武川人美容儀風度𢎞雅善騎射以北邉䘮亂避地中山為葛榮所獲信既少年好自修餙服章有殊於衆軍中號為獨孤郎以軍功拜安南將軍為秦州刺史時因獵日暮馳馬入城其㡌微側詰旦而吏人有戴㡌者咸慕信而側㡌焉其為衆庶所重如此周惠逹幼有志操好讀書美容貌進退可觀見者莫不重之為儀同三司王褒字子淵識量淹通志懐沉静美風儀善談笑終於宜州刺史栁霞㓜而聰邁神采嶷然梁西昌侯琛藻鎮雍州霞時年十二以民禮修謁風儀端肅進止詳雅琛藻美之試遣左右踐霞衣裾欲觀其舉措霞徐歩稍前曽不顧盻終於霍州刺史楊雄初名惠美姿容器度雍容閑雅進止可觀官至江陵總管隋栁謇之字公正身長七尺五寸儀容甚竒風神爽亮進止可觀轉守廟下士周武帝有事太廟謇之讀祝文音韻清雅觀者屬目帝善之擢為宣納上士元善雒陽人以風流藴藉俯仰可觀音韻清朗聽者忘倦由是為後進所歸開皇初拜内史侍郎髙祖每望之曰人倫表儀也凡有敷奏詞氣抑揚觀者矚目唐杜如晦少聰悟美風調精彩絶人及長雍容儒雅好談文史每以風流自命官終尚書左僕射崔日用美容止善談笑少舉進士為并州長史李紓為吏部侍郎厚自奉飬轝馬極鮮明以放逹藴藉稱於時韋夏卿有風韻善談讌與人相親終年而喜愠不形於色為太子少保卒李逈秀為鳳閣鸞臺平章事雅有文才飲酒斗餘廣接賔朋當時稱為風流之士權徳輿自貞元元和三十年間羽儀朝行性真亮寛恕動作語言一無外飾藴藉風流為時稱嚮官終山南西道節度使周和凝字成績㓜而聰敏姿狀秀㧞神彩射人性好修整自釋褐至登台輔車服僕從必加華楚進退容止偉人也位至太子太傅册府元龜卷八百二十三
