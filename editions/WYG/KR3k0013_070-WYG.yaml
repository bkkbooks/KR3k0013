body:
  text: 册府元龜卷七十宋王欽若等撰帝王部務農禮記曰天子親耕於南郊以供粢盛周禮地官遂大夫之職正嵗簡稼器修稼政虢文公曰民之大事在農上帝之粢盛於是乎出民之蕃庶於是乎生王符曰國之所以為國者以其有民也民之所以為民者以其有榖也故曰所寳惟榖又曰食為民天是知食居八政之先榖乃六府之一天下之本其惟農乎先王繇是申勞農之典立勸桑之制或下詔以敦勉或設官以案行重其力則俾之孝悌同科惜其功則不使小罪徴召此皆務農之深㫖也故賈誼曰積貯者天下之大命也苟粟多而財有餘何為而不成以攻則取以守則固以戰則勝管子曰倉廩實知禮節衣食足知榮辱則知王者務農之道其太平之本歟神農氏斵木為耜揉木為耒耒耜之利以教天下天下號曰神農氏帝堯命羲仲寅賓出日平秩東作寅敬賓導秩序也歲起于東而始就耕謂之東作東方之官敬導出日平均次序東作之事以務農也舉棄為農師天下得其利帝舜命棄曰黎民阻饑汝后稷播時百榖阻難播布時是也衆人之難在于饑汝后稷布種是百榖以濟之美其前功以勉之也周文王卑服即康功田功言卑其衣服以就其安人之功田功知稼穡之艱難成王親與后世子出觀農事其詩曰曽孫來止以其婦子饁彼南畆田畯至喜攘其左右嘗其㫖否曽孫謂成王也饁饟饋也田畯司穡也喜讀為饎酒食也為農人之在南畆者設饋以勸之司嗇至則又以酒食饋其左右從行者成王親為嘗其饋之美否示親之也又率主田之吏使民耕田而種百榖故作噫嘻之詩曰率是農夫播厥百榖漢文帝二年九月詔曰農天下之大本也民所恃以生也而民或不務本而事末故生不遂衣食乏絶致有夭䘮故不遂其生朕憂其然故今兹親率羣臣務農以勸之其賜天下民今年田租之半十二年三月詔曰道民之路在於務本朕親率天下農十年于今而野不加辟辟讀曰闢歲一不登民有饑色登成也是從事焉尚寡而吏未加務也從事從農事也吾詔書數下歲勸民種樹而功未興是吏奉吾詔不勤而勸民不明也且吾農民甚苦而吏莫之省将何以勸焉其賜農民今歲田租之半十三年六月詔曰農天下之本務莫大焉今厪身從事瘽古勤字而有租稅之賦是謂本末者無以異也本農也末賈也言農與賈俱出租無以異也故除田租其於勸農之道未備其除田之租稅景帝後二年四月詔曰雕文刻鏤傷農事者也錦繡纂組害女紅者也纂赤組也紅讀曰功農事傷則饑之本也女紅害則寒之原也夫饑寒竝至而能亡為非者寡矣朕親耕后親桑以奉宗廟粢盛祭服為天下先不受獻減大官省繇賦省所領切繇音徭欲天下務農蠶素有蓄積以備災害三年正月詔曰農天下之本也黄金珠玊饑不可食寒不可衣以為幣用不識其終始幣者所以通有無易貴賤也間歲或不登意為未者衆農民寡也其令郡國務勸農桑益種樹可得衣食物樹植也吏發民若取庸采黄金珠玉者坐􅂍為盗發民用其民用其資以雇取庸二千石聽者與同罪又食貨志云時宫室列館車馬益増修矣然屢敕有司以農為務民遂樂葉武帝元狩三年秋遣謁者勸有水災郡種宿麥又末年悔征伐之事廼封丞相為富民侯富民沛郡蘄縣之鄉名也欲百姓殷實故取其嘉名也下詔曰方今之務在於加農以趙過為捜粟都尉過能為代田一畆三甽甽壠也音工免切字或作􅅵歲代處故曰代田古法也元帝永光元年三月詔赦天下令各務農畆無田者皆假之貸種食建昭五年三月詔曰方春農桑興百姓戮力自盡之時也故是月勞農勸民無使後時今不良之吏覆案小罪徴召證案興不急之事以妨百姓使失一時之作亡終歲之功公卿其明察申勅之成帝陽朔四年春正月詔曰夫洪範八政以食為首斯誠家給刑錯之本也先帝劭農劭勸勉也音時召切薄其租稅寵其强力令與孝弟同科間者民彌惰怠鄉本者少趨末者衆将何以矯之鄉讀曰向矯正也方東作時春位在東耕者始作故曰東作其令二千石勉勸農桑出入阡陌致勞來之書不云乎服田力穡乃亦有秋農夫服田厲其膂力乃有秋收也其朂之哉平帝元始元年置大司農部丞一十三人人部一州勸課農桑平帝二年定墾田八百二十七萬五百三十六頃葢紀漢盛時之數據元始二年千二百二十三萬三千每戸合得田六十七畆百四十六歩有竒也後漢光武中元二年十二月詔曰方春戒節人以耕桑其勅有司務順時氣使無煩擾明帝永平三年春正月癸巳詔曰夫春者歲之始也始得其正則三時有成比年水旱不節邉人食寡政失於上人受其咎有司其勉順時氣勸課農桑去其螟蜮以及蝥賊章帝元和元年二月詔曰王者八政以食為本故古者急耕稼之業致耒耜之勤節用儲蓄以備凶災是以歲雖不登而人無饑色自牛疫以來榖食連少良由吏教未至刺史二千石不以為負負猶憂也其令郡國募人無田欲徙他界就肥饒者悉聽之到在所賜給公田為扉耕傭賃種餉貰與田器勿收租五歲除筭三年其後欲還本鄉者勿禁和帝永元五年九月壬午令郡縣勸民蓄蔬食以助五榖安帝永初三年七月庚子詔長吏案行在所皆令種宿麥蔬食務盡地力其貧者給種餉魏明帝時司馬芝為大司農先是諸典農各部吏民末作治生以要利入芝奏曰王者之治崇本抑末務農種榖王制無三年之儲國非其國也管子書言以積榖為急方今二虜未滅師旅不息國家之要惟在榖帛武皇帝特開屯田之官專以農桑為業建安中天下倉廪充實百姓殷足自黄初以來聽諸典農治生各為部下之計誠非國家大體所宜也夫王者以海内為家故傳曰百姓不足君孰與足富足之繇在於不失天時而盡地力今商旅所求雖有加倍之顯利然於一統之計已有不貲之損不如墾田益一畆之收也夫農民之事田自正月耕種耘鋤條桑耕熯種麥穫禾築場十月乃畢治廪繫橋運輸租賦除道理梁墐塗室屋以是終歲無日不為農事也今諸典農各言留者為行者宗田計課其力勢不得不爾不有所廢則當素有餘力臣愚以為不宜復以商事雜亂專以農桑為務於國計為便帝從之晉宣帝初為魏國軍司馬言於魏武曰昔箕子陳謨以食為首今天下不耕者葢二十餘萬非經國逺籌也雖戎甲未卷自宜且耕且守魏武納之於是務農積榖國用豐贍武帝時石苞為司徒苞言州郡農桑未有賞罰之制宜遣掾屬循行皆當均其土宜舉其殿最然後黜陟焉因下詔曰農殖者為政之本有國之大務也雖欲安時興化不先富而教之其道無繇而至今四海多事軍國用廣加承征役之後屢有水旱之事倉庫不充百姓無種古者稼穡樹藝司徒掌之今雖登論道然經國立政惟時所急故陶唐之世稷官為重今司徒位當其任乃心王事有毁家紓國乾乾匪躬之志其使司徒督察州郡播殖将委事任成垂拱仰辦若宜有所循行者其増置掾屬十人聽取王官更練事業者泰始五年正月癸巳申戒郡國計吏守相令長務盡地利禁游食商販元帝太興元年詔曰徐揚二州土宜三麥可督令熯地投秋下種至夏而熟繼新故之交於以周濟所益甚大昔漢遣輕車使者汜勝之督三輔種麥而闗中遂穰勿令後晩其後頻年麥雖有旱蝗而為益猶多後魏孝文延興二年四月庚子詔工商雜役盡聽赴農諸州郡課民以種菜果三年二月癸丒詔牧守令長勤率百姓無令失時同部之内貧富相通家有兼牛通借無者若不從詔一門之内終身不仕守宰不督察免所居官太和元年春正月辛亥詔曰今牧民者與朕共治天下也宜簡以徭役先之勸奨相其水陸務盡地利使農夫外布桑婦内勤若輕有徴發致奪民時以侵擅論民有不從長教惰於農桑者加以罪刑三月丙午詔曰朕政治多闕災眚屢興去年牛疫死傷大半耕墾之利當有虧損今東作既興人須肄業其勅在所督課田農有牛者加勤於常歲無牛者倍庸於餘年一夫制治田四十畆中男二十畆無令人有餘力地有遺利四年四月乙卯幸廷尉籍坊二獄引見諸囚詔曰廷尉者天下之平民命之所懸也朕得惟刑之恤者仗獄官之稱其任也一夫不耕将或受其餒一婦不織将或受其寒今農時要月百姓肆力之秋而愚民陥罪者甚衆宜隨輕重決遣以赴耕耘之業五年五月庚申朔詔廼者邉兵屢動勞役未息百姓因之輕䧟刑網獄訟煩興四民失業朕每念之用傷懷抱農時要月民須肆力其勅天下勿使有留獄久囚十三年八月詔諸州鎮有水田之處各通灌溉遣匠者所在指授十六年六月甲辰詔曰務農重榖王政所先勸率田疇君人常事今四氣休序時澤滂潤宜用天分地悉力東畆然京師之民遊食者衆不加督勸或耘耨失時可遣明使撿察勤惰以聞二十年五月丙子詔曰農唯政首稷實民先澍雨豐洽所宜敦勵其令畿内嚴加課督堕業者申以楚撻力田者具以名聞七月丁亥詔京民始業農桑為本田稼多少課督與否具以狀言宣武正始元年九月丙午詔緣淮南北所在鎮戍皆令及秋播麥春納粟稲隨其土宜水陸兼用必使地無遺利兵無餘力比及來稔令公私俱濟也後周武帝建徳四年正月壬申詔曰今陽和布氣品物資始敬授民時義兼敦勸詩不云乎弗躬弗親庶民弗信刺史守令宜親勸農桑百司分播躬自率道事非機要竝停至秋隋煬帝大業三年四月丙申北廵狩戊戌勅百司不得踐暴禾稼其有須開為路者有司計地所收即以近倉酬賜務從優舉唐髙祖武徳五年四月戊辰謂羣臣曰比者兵革事煩不遑隴畆今諸方畧定軍國無虞太平之基在於家給人足今兹麥既大􅌻宜停庶務毎司别留一二人守曹局餘皆宜休假親事務農流罪以下囚罪名定者亦放收穫六年六月乙未詔曰有隋䘮亂區宇分離百姓凋殘弊於兵甲田畆荒廢饑饉薦臻元元無辜堕於溝壑朕膺圖馭極廓清四海安輯遺民期於寧濟勸農務本蠲其力役然而邉鄙餘官向或未除頃年已來戎車屢出所以農功不致倉廪未登永念於兹無忘寤寐今既風雨順節苗稼實繁普天之下咸通茂盛五十年來未嘗有此倉廂之積指日可期時為溽暑方資耕耨廢而不修歲功将闕宜從優縱肆力千頃其公私債負及追徴輸送所至處且勿施行尋常營造役使工匠事非急要亦宜停止見在囚繫事未決斷旁引支證未須追廹司攝常務竝宜且停内外官人行署以上量事分播皆盡九月三十日其軍機急速及盜賊之事不在停限州縣牧宰明知勸導咸使戮力無或失時務從簡静以稱朕意太宗貞觀四年四月帝以夏麥大稔謂御史大夫蕭瑀曰前代帝王以麟鳳龜龍為嘉瑞朕以民安年豐為上瑞公謂若何在位者皆賀中宗景龍二年七月辛卯勅戒諸州郡督刺史縣令務盡地利禁游食𤣥宗開元四年九月壬寅詔曰闗中田苗今正成熟若不收刈便恐飄零緣頓差科時日尚逺宜令併功收拾不得妄有科喚致妨農業仍令左右御史撿察奏聞十二年六月壬辰詔曰有國者必以人為本固本者必以食為先先王於是務其三時前聖所以分其五土勸農之道實在於斯朕撫圖御歴殆踰一紀旰食宵衣勤乎兆庶故兢兢翼翼不敢荒寧頃歲以來雖稍豐稔猶恐地有遺利人多廢業游食之徒未盡歸生榖之疇未均墾以是軫念遣使臣恤編户之流亡閲大田之衆寡至如百姓逃散良有所繇當天册神功之時北狄西戎作梗大軍之後必有凶年水旱相仍逋亡滋甚自此成弊於今患之且違親越鄉葢非獲已暫因規避旋被兼并既冒刑網復損産業居且常懼歸又無依積此艱危遂成流轉或因人而止或傭力自資懷土之思空盈返本之圖莫遂朕處荷丕構子育萬姓立徳非宜而兹弊未革納隍馭朽實切於心既深在予之責思𢎞自新之令其先是逋逃竝宜自首仍能服勤壟畆肆力耕耘所在閒田勸其開闢逐土任宜收税勿令州縣差科征役租庸一皆蠲放若登時不出或因此更逃習俗或然非以為法且阻我誠信是紊我大綱爰及所繇須加嚴限且天下風壤多有不同地既異宜俗亦殊習固當因利制事不可違人立法宜令兵部員外郎兼侍御史宇文融兼充勸農使廵按人邑安撫戸口所在與官僚及百姓商量處分乃至賦役差科於人非便者並量事處分續状奏聞務令安輯勿使勞繁當行賞罰之科各竭忠公之力所到之處宣示百姓逹我勸人之心十五年五月丁酉是日夏至賜宰臣及供奉官諸司長官各綟絲先是帝命宫中養蠶親自臨視欲使嬪御以下知女工之事及蠶罷獲絲甚多因以賜焉十六年十月勅曰諸州客户有情愿屬邉緣利者至彼給良沃田安置仍給永年優復宜令所司即與所管客户州計㑹召取情愿者隨其所樂具數奏聞十七年春正月丁酉詔曰獻嵗發生陽和在候乃睠甿庶方就農桑其力役及不急之務一切并停百姓間有不稳便事須處置者宜令中書門下與所司喚取朝集使審向商量奏聞二十一年正月詔其聚衆興役妨時害功特宜禁止以助春事二十二年五月帝於苑中種麥率皇太子已下躬自收穫謂曰此将薦宗廟是以躬親亦欲令汝等知稼穡之艱難也因分賜侍臣等謂曰比嵗令人廵撿苗稼所對多不以實故自種植以觀其成且春秋書無麥禾豈非古人所重也二十九年制曰古之為理必順時行令獻嵗發春仁氣育物直叶陽和之徳以勤播種之務天下諸州委刺史縣令加意勸課仍令採訪使勾當非灼然要切事不得妄有追擾其今月諸色當審人有單貧老弱者所司即揀擇量放營農至春末已來竝宜准此天寳五載正月詔曰今土膏既動農事将興丁壮就功不可妨奪其不急之務一切竝停九載七月詔曰農為政本食乃人天必禾稼之及期遂京坻之厚積是以愛人存乎重榖勤政在乎厚生俗之所資何急於此如聞逺近每至秋中榖禾熟時即賣充馬藳苟求規利之心殊害生成之性静言斯弊實資懲革自今已後不得更然其三京及天下諸郡竝委所繇長官嚴加捉搦如非成熟不得輙刈犯者量決四十仍牓示要路咸使聞知十四載正月詔不急之務一切且停待至農閒任依常式肅宗上元二年正月詔王者設教務農為首今土膏方起田事将興敦本勸人實惟政要宜令天下刺史縣令各於所部親勸農桑九月詔曰田功在謹農事惟勤不有司存何成種榖諸州等各置司田參軍一人主農事每縣各置田正二人於當縣揀明閑田種者充務令勸課乾元元年建卯月御明鳯門大赦詔其建辰月應蕃彍騎宜三分量留一分其餘即放歸營農至建巳月任依常式諸州刺史縣令及司田參軍令設法勸課令其耕種不得失時貧不支濟户仍方圓處置量事借貸務令存立嵗終廵案量其功效代宗永泰元年正月朔大赦制曰農政本也食人天也方春之首重於東作除軍興至急餘一切竝停令百姓專營農事其逃户復業及浮客情愿編附者仰州縣長吏親就存撫特矜賦役全不濟者量貸種子務令安集大歴十三年正月壞京畿白渠磑八十餘所以妨奪農業也帝思政理之本務於農人以田農者生民之源苦於不足磑碾者興利之業主於竝兼遂發使行具其損益之繇僉以為正渠無害支渠有損乃命府縣凡支渠磑一切罷之時昇平公主上之愛女出降駙馬都尉郭曖有磑兩輪并曖父子儀有磑兩輪竝在支渠内公主聞之不時入謁乞留此磑帝目公主曰吾為蒼生爾識吾意可為衆先公主遂即日毁之由是諸磑不令而毁者非一百姓便之自去冬少雪是日雨雪豐霈咸以為聖感徳宗貞元五年五月初以二月一日為中和節詔文武百辟進農書獻穜稑六年二月戊辰朔中和節百僚始進兆人本業三卷司農獻粟及黍各一斗二十年詔曰理化之本繫乎京師副朕憂人屬於長吏宜勉務農桑各安生業以輸朕懷憲宗元和七年四月詔曰農桑切務衣食所資始聞閭里之間蠶織猶寡所宜勸課以利於人諸道州府有田户無桑處每撿一畆令種桑兩根勒縣令專勾當毎至年終委所在長吏撿察量其功具殿最奏聞兼令兩稅使同訪察其桑仍切禁採伐犯者委長吏重加責科穆宗長慶二年二月勅以修築河隂院恐妨農務罷之文宗太和二年二月勅李絳所進則天聖后刪定兆人本業書三卷宜令在所州縣寫本散配鄉閭開成元年十二月壬子御紫宸殿謂宰臣曰深以宿麥為憂今日東風應即有雪鄭覃對曰正月得之亦未為晩武宗㑹昌元年四月勅勸課種桑比有勅命或能増數毎年奏聞如聞都不遵行恣為剪伐列於市肆貨作柴薪自今州縣切宜禁斷宣宗大中元年二月制應天下逃戸見在桑田屋宇等多是暫時東西便被鄰人與所繇等計㑹雖云代納稅錢悉将斫伐毁拆及願歸復多以蕩盡因致荒廢遂成閒田從今後如有此色勒鄉村耆老與所繇并鄰近等同田産人且為佃蒔與納稅錢如五年内不來復業者任便收租佃者為主逃戸不在理論之限其屋宇桑田樹木等權佃人逃戸未歸五年内不得輙有毁除斫伐如有違犯據根口量情科責并科所繇等不撿挍之罪二年正月制云君以人為本人以食為天有國有家捨此無急如聞州府之内皆有閒田空長蒿萊無人墾闢與其虛棄曷若濟人宜令所在長吏設法召募貧人課勵耕種所收苗子以備水旱及當處軍糧憂念農耕是資牛力絶其屠宰須峻科條天下諸州屠牛訪聞都不遵守自今已後一切禁斷二月刑部奏牛者稼穡之資邦家所重雖加條約多有違犯今後請委州府縣令并錄事㕘軍嚴加捉搦如有牛主自殺及盗竊殺者即請准乾元元年二月五日勅先決六十然後准法科罪其本界官吏嚴加止絶五年正月勅畿甸及天下府州應屠牛宜起大中五年五月一日後三年内切加禁斷如郊廟享祀合使者即以諸畜代之中書奏曰屠牛之禁格令至重此立條流必令禁斷臣等商量應天下諸州府如有牛死便於所在經官陳状勘驗無他故然後使令就市解剝貨賣不得更将歸私家如有屠牛事發不唯本主抵法鄰里保社竝須痛加懲責本縣官吏委刺史節級科罰仍委諸道觀察使各逐所管州縣穩便更别立條制須極嚴峻務令止絶其行勞處亦准此禁斷從之後唐明宗天成二年四月駕出北門觀麥翊日謂侍臣曰昨日出城詢諸父老苗稼滋潤牛驢皆肥喜形於色朕亦樂之左右皆賀是月蔡州進新繭宣示庭臣長興元年三月車駕出上陽門觀稼至晚歸宫二年三月陜州准詔放獵戸歸農三年三月帝觀稼於郡郊民有父子三人同挽犁來者帝閔之賜耕牛三頭帝顧謂侍臣曰朕昨日以雨霽暫巡綠野遥望西南山坡之下初謂羣羊俯而察之乃貧民耦耕朕甚憫焉范延光對曰陛下輕徭薄賦所以村落之間自勤於稼穡也是時帝哀貧民多無耕牛斵地以種延光以為勤於稼穡非主上憂民之意歟九月壬午帝幸南荘翊日謂侍臣曰朕見西郊種麥已生民之辛苦深可憫念帝憂民之㫖無日暫忘十二月甲寅詔曰富民之道莫尚於務農力田之資必先於利器器苟不利民何以安近聞諸道監治所賣農器或大小異同或形状輕怯纔當墾闢旋致損傷近百姓秋稼雖登時物頗賤既艱難於置買遂抵犯於條章苟利錐刀擅興鑪冶稍聞彰露須議誅夷緩之則贍國不充急之則殘民轉甚加以廵撿節級騷擾鄉閭但益煩苛殊非通濟欲使上不奪山澤之利下皆遂􅅵畆之宜務在從長庶能經久自今後不計農器燒器動使諸物竝許百姓遂便自鑄諸道監治除依常年定數鑄辦供軍熟鐵并器物外只管出生鐡比已前價各随逐處見定髙低毎斤一例減十文貨賣雜使熟鐵亦任百姓自揀廵撿節級勾當賣鐵場官并舖户等一切竝廢鄉村百姓只於係省秋夏田畆上每畆納農器錢一文五分足各隨秋夏稅二時送納去後歴晉漢周皆不改其制四年三月帝幸龍門七星亭農事方春田民遍野帝見其㓢桑稼樹枉駕勞問親自勸課其月辛酉太原石敬塘進耒耜一具時帝嘗廵幸近郊見農民田具細弱而犁耒尤拙曰農器若此宜其無所穫也因詔河東河北進農具以為式様太原首有是進降詔褒之晉髙祖天福二年二月前隴州長史杜簉進策曰伏見近年百姓頗遇災荒縱納得王租即不充口食此葢播種不廣頃畆無餘既稅外無溢數之苗致民中有不及之弊且國以民為本民以食為天苟百姓不足君孰與足伏請曉示天下應有荒田一任百姓開種候及三年外即撿炤所開種頃畆多少量納一半租稅所貴家國富饒上下通濟者勅曰闢彼汙萊期於富庶方當開創正切施行徃日雖曽指揮漸恐廢堕當重申於勸誘期共樂於豐穰宜令逐處長吏遍下管内應是荒田有主者一任本主開耕無主者一任百姓請射佃蒔三年内竝不在收稅之限七年二月丙午勅鄧唐隨郢諸州管界多有曠土宜令逐處曉諭人戸一任開墾佃蒔仍自開耕後與免五年差徭兼仰指揮其荒閒田土本主如是無力耕佃即不得虛自占吝仍且與招攜到人戸分析以聞少帝開運二年十二月中書舍人陶榖奏竊以稼穡為生民之天機杼乃豐財之本是以耕耜在御王者用三推之儀鞠衣載陳后妃有躬桑之禮則知自天子至於庶人不可斯須忽於農桑也又司馬遷著書曰齊魯之間千畆桑安邑千樹棗其人與千戸侯等伏見近年以來所在百姓皆伐桑為柴忘終嵗之逺圖趨一日之小利既所司不禁乃積習生常苟桑柘漸稀則繒帛須缺三數年内國用必虧雖設法課人種桑且無及也舊木已伐新木未成不知絲綿欲慿何出若以下民方困不可禁之儻斫伐一空所在如是嵗或不稔衣食盡亡饑凍逼身須為羣盗圖難於易哲王令猷作事謀始有國常務乞留眷覽詢訪輔臣欲望特下明勅此後不得以桑􅀥為柴官塲亦不許受納州縣城門不令放入及不得嚢私置賣犯者請加重罪勅曰陶榖方思豐國切欲勸農以貿易於柴薪多斫伐於桑棗請行禁絶宜舉科條仍付所司漢隐帝於乾祐元年二月即位三月殿中少監胡崧上言請禁斫伐桑棗為薪城門所繇專加捉搦從之周太祖廣順元年正月勅農桑之務衣食所資一夫不耕有艱食之慮一婦不織有無褐之虞今氣正陽春候當生發宜勤用天之業将觀望嵗之心應諸道州府長吏宜勸課耕桑以豐儲積編民樂業仍倍撫綏二年正月勅諸道府州吏六府允修無先重榖九扈分職厥惟勤農今則東作聿興西成係望我有羣后政在養民苟不懈於行春諒倍登於多稼卿分憂事任道俗亷平樹以風聲靡如草偃必汙萊之地竝作百㕓游惰之民咸勤四體用洽帶牛之化更彰棲畆之謡眷倚之懷寤興斯切詔到卿可散下管内勸課鄉縣百姓依時耕種栽接桑棗勿縱遊惰務在精勤三年正月詔曰宜令三京及諸道州府委長吏指揮管内人戸勉勤耕稼廣闢田疇勿使蒿菜有廢膏腴之地務添桑棗用資種養之方仍令常切撫綏不得輙加科役所貴野無曠土廬有環桑致榖帛以豐盈遂蒸黎之蘓息世宗顯徳二年二月帝曰自古厚農寳榖故家給人足近世以來俗尚輕巧若使耕稼者有利游惰者無歸則自然倉廪實衣食足澆浮之風當自息矣宜令遍示天下厚農桑薄伎巧優力田之夫禁末游之軰以稱朕意焉二年八月詔課民種樹其上户所種毎嵗須及百本其次降殺有差又令民毎口種韭一畦以助其食册府元龜卷七十
