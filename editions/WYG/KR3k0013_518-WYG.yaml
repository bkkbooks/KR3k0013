body:
  text: 册府元龜卷五百十八宋王欽若等撰憲官部彈劾秦置御史之職掌舉察非法受公卿羣吏奏事有違失舉劾之歴代因之以為風憲之任故使專其搏擊重其威權蓋所以震肅外庭紀綱百辟者也乃有居是任者特禀剛毅之性内懐骨鯁之操嫉惡以自任臨事而不惑靡畏於彊禦無避於貴倖正言以斥其短露章以暴其過使恃寵者禠魄懐姦者喪膽激揚風烈聳動倫類斯固足以稱專席之任光眊筆之選成繡衣直指之義振恵文彈治之業者也而漢初叔孫通之制禮亦曰御史舉不如儀者輒引去之東漢凡祠郊廟及大朝㑹大封拜則御史一人監威儀劾違失此又成廟庭之尊致禮容之肅故雖暴威武者亦知懼焉漢張湯為御史大夫時徐偃以博士使行風俗矯制使膠東魯國皷鑄鹽鐡鑄銅鐡扇熾火謂之皷還奏事徙為太常丞湯劾偃矯制大􅊣法至死偃以為春秋之義大夫出疆有可以安社稷存萬民顓之可也湯以致其法不能詘其義有詔下終軍問状軍詰偃曰古者諸侯國異俗分百里不通時有聘㑹之事安危之勢呼吸成變故有不受辭造命顓已之宜今天下為一萬里同風故春秋王者無外偃巡封域之中稱以出疆何也且鹽鐵郡有餘藏先有蓄積正二國廢國家不足以為利害而以安社稷存萬民為辭何也又詰偃膠東南近琅邪北接北海魯國西枕泰山東有海受鹽鐵偃度四郡口數田地率其用器食鹽不足以并給二郡邪将勢宜有餘而吏不能也何以言之偃矯制而鼓鑄者欲及春耕種贍民器也今魯國之鼓當先具其備備者猶言調度至秋乃能舉火此言與實反者非重問之偃已前三奏無詔不報聴也不惟惟思也所為不許而直矯作威福以從民望干名采譽干求也采取也此明聖所必加誅也枉尺直尋孟子稱其不可今所犯罪重所就者小偃自予必死而為之邪将幸誅不加欲以采名也偃窮詘服罪當死軍奏偃矯制顓行非奉使體請下御史徴偃即罪奏可上善其詰有詔示御史大夫嚴延年為侍御史宣帝立延年劾奏大将軍霍光擅廢立主無人臣禮不道奏雖寢朝廷肅焉敬憚又劾大司農田延年持兵干屬車干犯也屬車天子後車也大司農自訟不干屬車事下御史中丞譴責延年何以不移書宫殿門禁止大司農而令得出入宫於是覆劾延年闌内罪人法至死故事有所劾奏並移宫禁止不得入覆反也反以此事劾之延年亡命蓋寛饒宣帝時為司𨽻校尉平恩侯許伯入第許伯皇太子外祖也入第者治第新成始入居之丞相御史将軍中二千石皆賀寛饒不行許伯請之迺往酒酣樂作長信少府檀長卿起舞為沐猴與狗鬭沐猴彌猴坐皆大笑寛饒不說因起趨出劾奏長信少府以列卿而沐猴舞失禮不敬帝欲罪少府許伯為謝良久帝迺解王駿為司𨽻校尉奏免丞相匡衡初衡封僮之樂安鄉屬臨淮郡鄉本田提封三千一百頃南以閩佰為界閩者佰之名也初元元年郡國誤以閩佰為平陵佰積十餘嵗衡封平陵佰在閩佰南誤以十餘嵗衡乃始封此鄉臨淮郡遂封真平陵佰以為界多四百頃至建始元年郡迺定國界上計簿更定圖言丞相府衡謂所親吏趙殷曰主簿陸賜故居奏曹習事曉知國界署集曹掾明年治計時衡問殷國界事曹欲奈何殷曰賜以為舉計令郡實之舉發上計之簿令郡改從平陵佰以為實定恐郡不肯從實可令家丞上書衡曰顧當得不耳何至上書顧念也亦不告曹使舉也聴曹為之後賜與屬明舉計曰案故圖樂安鄉南以平陵佰為界不足故而以閩佰為界解何不足者不依故圖而滿足也解何者以分解此時意猶今言分疏意也郡即復以四百頃付樂安國衡遣從使之僮収取所還田租榖千餘石入衡家駿與少府忠行廷尉事劾奏衡監臨盜所主守直十金以上十金以上當時律定罪之次若今律條言一尺以上一匹以上春秋之義諸侯不得專地所以大一統尊法制也衡位三公輔國政領計簿知郡實正國界計簿已定而背法制專地盜土以自益及賜明阿承衡意猥舉郡計亂減縣界猥曲也附下罔上擅以地附益大臣皆不道於是帝可其奏勿治丞相免為庶人王尊為司𨽻校尉元帝時中書謁者令石顯貴幸專權為姦邪丞相匡衡御史大夫張譚皆阿附畏事顯不敢言久之成帝即位顯徙為中太僕内常侍之屬官不復典權衡譚乃奏顯舊惡請免顯等尊於是劾奏丞相衡御史大夫譚位三公典五常九徳五常仁義禮智信也九徳寛而栗柔而立愿而恭亂而敬擾而毅直而温簡而㢘剛而塞强而義也事見虞書臯陶謨以總方略一統類廣教化美風俗為職知中書謁者令顯等專權擅勢大作威福縱恣不制無所畏忌為海内害不以時白奏行罰而阿䛕曲從附下罔上懐邪迷國無大臣輔政之義也皆不道在赦令前赦後衡譚舉奏顯不自陳不忠之罪而反揚著先帝任用傾覆之徒妄言百官畏之甚於主上卑君尊臣非所宜稱失大臣體又正月行幸曲臺臨饗罷衛士諸衛士更盡得代去故天子自臨而饗之衡與中二千石大鴻臚賞等㑹坐殿門下臣欽若等按百官表賞姓浩衡南鄉賞等西鄉衡更為賞布東鄉席起立延賞坐私語如食頃衡知行臨天子當臨饗士時百官共職萬衆㑹聚而設不正之席使下坐上相比為小恵於公門之下動不中禮亂朝廷爵秩之位衡又使官大奴入殿中問行起居還言漏上十四刻行臨到衡安坐不變色改容無怵惕肅敬之心驕慢不謹皆不敬有詔勿治於是衡慙懼免冠謝罪上丞相侯印綬天子以新即位重傷大臣重難也乃下御史丞問状劾奏尊妄詆欺非謗赦前事猥歴奏大臣無正法飾成小過以塗汙宰相摧辱公卿輕薄國家奉使不敬有詔左遷尊為髙陵令翟方進為丞相司直從上至甘泉宫㑹廷中司𨽻校尉陳慶與廷尉范延夀語時慶有章劾自道行事以贖論當祭泰畤時行事有闕失罪合贖今尚書持我事來當於此決前我為尚書時常有所奏事忽忘之留月餘言此者冀尚書􅁯己之事不奏方進於是舉劾慶曰慶等奉使刺舉大臣故為尚書知機事周宻一統明主躬親不解慶有罪未伏誅無恐懼心豫自設不坐之比比例也又暴揚尚書事言遲疾無所在虧損聖徳之聰明奉詔不謹皆不敬既自云不坐又言遲疾無所在此二條皆為不敬臣謹以劾慶坐免官又故事司𨽻校尉位在司直下初除謁兩府兩府丞相及御史也其有所㑹居中二千石前與司直並迎丞相御史初方進新視事而㳙勲亦初拜為司𨽻不肯謁丞相御史大夫後朝㑹相見禮節又倨方進陰察之勲私過光禄勲辛慶忌又出逢帝舅成都侯商道路下車立􅓄過乃就車􅓄待也於是方進舉奏其状因曰臣聞國家之興尊尊而敬長爵位上下之禮王道綱紀春秋之義尊上公謂之宰海内無不統焉丞相進見聖主御坐為起在輿為下漢舊儀云皇帝見丞相起謁者賛稱曰皇帝為丞相起起立乃坐皇帝在道丞相迎謁謁者賛稱曰皇帝為丞相下車立乃升車羣臣宜皆承順聖化以視四方勲吏二千石幸得奉使不遵禮儀輕慢宰相賤易上卿而又詘節失度邪讇無常私過辛慶忌見王商而下車是邪謟色厲内荏墮國體墮毁也亂朝廷之序不宜處位臣請下丞相免勲遂貶勲為昌陵令孫寳成帝時為丞相司直帝舅紅陽侯立使客因南郡太守李尚占墾草田數百頃隠度而取之也草田荒田也頗有民所假少府陂澤略皆開發舊為陂澤本屬少府其後以假百姓百姓皆已田之而立總為草田占云新自墾上書願以入縣官立上書云新墾得此田請以入官也有詔郡平田予直受其田而凖償價值也錢有貴一萬萬以上増於時價寳聞之遣丞相史案驗發其姦劾奏立尚懐姦罔上狡猾不道尚下獄死立雖不坐後兄大司馬衛将軍商薨次當代商帝度立而用其弟曲陽侯根為大司馬驃騎将軍度過也過立而用根解光為司𨽻校尉哀帝即位奏曲陽侯王根宗重身尊三世據權五将秉政天下輻凑自效根行貪邪贓累鉅萬縱横恣意大治室第第中起土山立市殿上赤墀户青瑣遊觀射獵使奴從者被甲持弓陳為歩兵止宿離宫水衡共張發民治道百姓苦其役内懐姦邪欲筦朝政推親近吏主簿張業以為尚書蔽上内壅王路外交藩臣驕奢僣上壊亂制度案根骨肉至親社稷大臣謂先帝棄天下根不悲哀思慕山陵未成公聘取故掖庭女樂五官殷嚴王飛君等五官内官名也置酒歌舞捐􅁯先帝厚恩背臣子之義及根兄子成都侯况幸得以外親繼父為列侯侍中不思報厚恩亦聘取故掖庭貴人以為妻皆無人臣禮大不敬不道於是天子曰先帝遇根况父子至厚也今乃背忘恩義以根嘗建社稷之策謂立哀帝為嗣也遣就第免况為庶人歸故郡根及况父商為薦舉為官者皆罷陳崇為丞相司直時陳遵為河南太守而弟級為荆州牧當之官候過長安富人故淮陽王外家左氏飲食作樂後崇聞之劾奏遵兄弟幸得蒙恩超等歴位遵爵列侯備以郡守級州牧奉使以舉直察枉宣揚聖化為職不正身自慎如遵初除乗藩車入閭巷藩車之有屏者過寡婦左阿居置酒謳歌遵起舞跳梁頓仆坐上暮因留宿為侍婢扶卧遵知飲酒飫宴有節宴食曰飫禮不入寡婦之門而湛酒溷肴亂男女之别輕辱爵位羞汙印韍韍謂印之組也惡不可忍聞臣請皆免後漢鮑永建武十年為司𨽻校尉光武叔父良尊戚貴重永以事劾良大不敬時良從送中郎将來歙喪還入夏城門中與五官将軍相逢道迫良怒召門候岑尊叩頭馬前永劾奏良曰今月二十七日車駕臨故中郎将來歙喪還車駕過須㬰趙王良從後到與右中郎将張邯相逢城門中道迫狹叱邯旋車又召候岑尊詰責使前走數十歩按良諸侯藩臣蒙恩入侍知尊帝城門候吏六百石而肆意加怒令叩頭都道奔走馬頭前無藩臣之禮大不敬也由是朝廷肅然莫不戒慎馬嚴章帝初為御史中丞奏益州刺史朱酺揚州刺史倪說涼州刺史尹業等每行考事輒有物故又選舉不實曽無貶坐是使臣下得作威福也書奏帝納其言而免酺等官宋意為司𨽻校尉永元初大将軍竇憲兄弟貴盛歩兵校尉鄧疊河南尹王調故蜀郡太守㢘范等羣黨出入憲門負勢放縱意隨違舉奏無所迴避由是與竇氏有隙陳忠為尚書安帝永寧元年西南夷撣國王獻樂及幻人能吐火自支解易牛馬頭明年元㑹作之於庭帝與羣臣共觀大竒之諫議大夫陳禪獨離席舉手大言曰昔齊魯為夾谷之㑹齊作侏儒之樂仲尼誅之又曰放鄭聲逺佞人帝王之庭不宜設夷狄之技忠劾奏禪曰古者合歡之樂舞於堂四夷之樂陳於門故詩云以雅以南韎任朱離今撣國越流沙踰縣度萬里貢獻非鄭衛之聲佞人之比而禪廷訕朝政請劾禪下獄有詔勿收左轉為𤣥莬候城障尉詔敢不之官上妻子從者名禪既行朝廷多訟之張綱為御史順帝漢安元年選遣八使徇行風俗皆耆儒知名多歴顯位維綱年少官次最微餘人受命之部而綱獨埋其車輪於雒陽都亭曰豺狼當道安問狐狸遂奏曰大将軍兾河南尹不疑蒙外戚之援荷國厚恩以蒭蕘之資居阿衡之任不能敷揚五教翼賛日月而專為封豕長蛇肆其貪叨甘心好貨縱恣無底多樹謟䛕以􅊣忠良誠天威所不赦大辟所宜加也謹條其無君之心十五事斯皆臣子所切齒者也書御京師震竦御進也時兾妹為皇后内寵方盛諸梁姻族滿朝帝雖知綱言直終不忍用种暠順帝末為侍御史時所遣八使光禄大夫杜喬周舉等多所糾奏而大将軍梁冀及諸宦官互為請救事皆被寝遏暠自以職主刺舉志案姦違法乃復劾諸為八使所舉蜀郡太守劉宣等罪惡章露宜伏歐刀又奏請勅四府條舉近臣父兄及知親為刺史二千石尤殘穢不勝任者免遣案罪帝乃從之陳翔為侍御史時正旦朝賀大将軍梁冀威儀不整奏冀恃貴不敬請收案罪時人竒之虞詡為司𨽻校尉數月間奏大傅馮石太尉劉熹中常侍程璜陳秉孟生李閨等韓演為司𨽻校尉時中常侍新豊侯單超武原侯徐璜東武陽侯具瑗上蔡侯左悺汝陽侯唐衡五侯宗族賓客虐徧天下民不堪命起為㓂賊演因奏悺罪惡及其兄太僕南鄉侯稱請託州郡聚歛為姦賓客放縱侵犯吏民悺稱皆自殺演又奏瑗兄沛兒弟相恭贓罪徴詣廷尉瑗詣獄謝上還東武陽侯印綬詔貶為都鄉侯卒於家超及璜衡襲封者並降為鄉侯租入嵗皆三百萬子弟分封者悉奪爵土朱穆桓帝時為侍御史值帝臨辟雍行禮畢公卿出虎賁置弓階上公卿下堦皆避弓穆過呵虎賁曰執天子器何故投於地虎賁怖即攝弓穆劾奏虎賁抵罪公卿皆慙曰朱御史可謂臨事不惑者也晉何曽魏嘉平中為司𨽻校尉撫軍校事尹謨憑寵作威姦利盈積朝野畏憚莫敢言曽劾奏朝廷稱之劉毅為司𨽻校尉皇太子朝鼓吹將入西掖門毅以為不敬止之於門外奏劾保傅以下詔赦之然後得入又劾奏何曽侈㑀無度帝以曽重臣一無所問又䕶軍羊琇乗羊車為毅所奏武帝詔曰羊車雖無制非素者所服免官劉享為都官從事奏何曽華侈以銅鈎黻引車瑩牛蹄角侯史光為御史中丞太保王祥久疾廢朝光奏請免之詔優祥而寝光奏崔洪武帝世為御史治書時長樂馮恢父為𢎞農太守愛少子淑欲以爵傳之恢父終服闋乃還鄉里結草為廬陽瘖不能言淑得襲爵恢始仕為博士祭酒散騎常侍翟嬰薦恢髙行邁俗侔繼古烈洪奏恢不敦儒業令學生番直左右雖有讓恢㣲善不得稱無倫輩嬰為浮華之目遂免嬰官朝廷憚之傅祗為司𨽻校尉武帝時荆州刺史石崇得鴆鳥鶵以與後軍将軍王愷時制鴆鳥不得過江祗糾劾奉詔原之燒鴆於都街傅咸為尚書左丞時司𨽻荀愷從兄喪自表赴哀詔聴之而未下愷乃造楊駿咸奏曰死喪之威兄弟孔懐同堂亡隕方在信宿聖恩矜愍聴使臨喪詔未下而便以行造急諂媚之敬無友于之情宜加顯貶以隆風教帝以駿管朝政有詔不問駿甚憚之後為議郎長兼司𨽻校尉時朝廷寛弛豪右放恣交私請託朝野溷淆咸奏免河南尹澹左将軍倩廷尉光兼河南尹何攀等京都肅然貴戚攝伏咸以聖人久於其道天下化成是以唐典三載考績九載黜陟其在周禮三年大比孔子亦云三年有成而中間以來長吏到官未幾便遷百姓困於無定吏卒疲於送迎時僕射王戎兼吏部咸奏戎備位台輔兼掌選舉不能謐静風俗以凝庶績至令人心傾動開張浮競中郎李重李義不相規請免戎等官詔曰政道之本誠宜久於其職咸奏是也戎職在論道吾所崇委其觧禁止王戎為甲午制凡選舉皆先治百姓然後受用咸奏戎曰書稱三載考績三考黜陟幽明今内外羣官居職未朞而戎奏還既未定其優劣且送故迎新相望道路巧詐逓生傷農害政戎不仰依堯舜典謨而驅動浮華虧敗風俗非徒無益乃有大損宜免戎官以敦風俗戎舉賈郭通親竟得不坐御史中丞解結以咸劾戎為違典制越局侵官干非其分奏免咸官詔亦不許咸上事以為按臨御史中丞督司百僚皇太子以下其在行馬内有違法憲者皆彈糾之雖在行馬外而監司不糾亦得奏之如今之文行馬之内有違法憲謂禁防之事耳宫内禁防外司不得而行故專施中丞今道路橋梁不修鬭訟屠沽不絶如此之比中丞推責州坐即今所謂行馬内語施於禁防既云中丞督司百僚矣何復說行馬之内乎既云百僚而不得復說行馬之内者内外衆官謂之百僚則通内外矣司𨽻所以不復說行馬内外者禁防之事已於中丞說之故也中丞司𨽻俱糾皇太子以下則共對司内外矣不為中丞專司内百僚自有中丞司𨽻以來更互奏内外衆官惟所糾得無内外之限也而結一旦横挫臣臣前所以不羅縷者冀因結奏得從私願也今既所願不從而勑云但為過耳非所不及也以此見原臣忝司直之任宜當正已率人若其有過不敢受原是以申陳其愚司𨽻與中丞俱共糾皇太子以下則從皇太子以下無所不糾也得糾皇太子而不得糾尚書臣之闇塞既所未譬皇太子為在行馬之内邪皇太子在行馬之内而得糾之尚書在行馬之内而不得糾無有此理此理昭然而結以此挫臣臣可無恨耳其於觀聴無乃有恠邪臣識石公前在殿上脫衣為司𨽻荀愷所奏先帝不以為非于時莫謂侵官今臣裁糾尚書而當有罪乎咸累自上稱引故事條理昭然朝廷無以易之劉暾為侍御史時司徒王渾主簿劉輿獄辭連暾将収付廷尉渾不欲使府有過欲距劾自舉之與暾更相曲直渾怒便遜位還第暾乃奏渾曰謹按司徒王渾蒙國厚恩備位鼎司不能上佐天日調和隂陽下遂萬物之宜使卿大夫各得其所敢因劉輿距扞詔使私欲太府興長獄訟昔陳平不答漢文之問丙吉不問死人之變誠得宰相之體也既興刑獄怨懟而退舉動輕速無大臣節請免渾官右長史楊立亭侯劉肇便辟善柔茍於阿順請大鴻臚削爵土諸聞暾奏者皆歎美之暾後為左丞兼侍御史中丞奏免尚書僕射東海公繇及王粹董艾等十餘人朝廷嘉之遷司𨽻校尉奏免武陵王澹及劉坦温畿李晅等顧和為御史大夫中丞劾奏尚書左丞戴抗贓百萬付法議罪并免尚書傅玩郎劉傭官百僚憚之温嶠為司𨽻都官從事散騎常侍庾敳有重名而頗聚歛嶠舉奏之京都震肅張輔為侍御史中丞時積弩将軍孟觀與明威将軍郝彦不恊而觀因軍事害彦又賈謐潘岳石崇等共相引重及義陽王威有詐冐事輔並糾劾之傅宣為御史中丞東海王越誅繆播王延等皆上依劉輿之謀延愛妾荆氏有音伎延尚未殮輿便聘之未及迎又為大傅從事中郎王俊所争奪宣劾奏之越不問輿而免俊官熊逺轉御史中丞時尚書刁恊用事衆皆憚之尚書郎盧綝将入直遇恊於大司馬門外恊辭醉使綝避之綝以當直不肯迴恊令牽捽墮馬至恊車前而後釋逺奏請免恊官詔令白衣領職劉隗遷丞相司直委以刑憲時建康尉収護軍士而為府将簒取之隗奏免護軍将軍戴若思官世子文學王籍之居叔母喪而婚隗奏之帝下令曰禮稱殺禮多婚以㑹男女之無夫家正今日之謂也可一解禁止自今以後宜為其防東閣祭酒顔含在叔父喪嫁女隗又奏之廬江太守梁龕明日當除婦服今日請客奏伎丞相長史周顗等三十餘人同㑹隗奏曰夫嫡妻長子皆杖居廬故周景王有三年之喪既除而宴春秋猶譏况龕匹夫暮宴朝祥慢服之愆宜肅喪紀之禮請免龕官削侯爵顗等知龕有喪吉㑹非禮宜各奪俸一月以肅其違從之祖約為從事中郎典選舉約妻無男而性妬約亦不敢違忤常夜寝於外忽為人所傷疑其妻所為約求去職帝不聴約便從右司馬營東門私出隗劾之曰約幸荷殊寵顯位選曹銓衡人物衆所具瞻當敬以直内義以方外杜漸防萌式遏㓂害而乃變起蕭牆患生婢妾身被刑傷虧其膚髪羣小噂􅊱囂聲逺被塵穢清化玷累明時天恩含垢猶復諭􅇺而約違命輕出既無明知以保其身又孤恩廢命宜加貶黜以塞衆謗帝不之罪隗重加執據終不許丞相行叅軍宋挺本揚州刺史劉陶門人陶亾後挺娶陶愛妾以為小妻建興中挺又割盜官布六百餘疋正刑棄市遇赦免而奮武将軍阮抗請為長史隗劾奏曰挺蔑其死主而專其室悖在三之義傷人倫之序當投之四裔以禦魑魅請除挺名禁錮終身而奮武将軍太山太守阮抗請為長史抗緯文經武剖符東藩當庸勲忠良昵近仁賢而褒求贓汚舉頑用嚚請免抗官下獄理罪奏可而挺病死隗又奏符㫖挺已喪亾不復追貶愚惷意闇未逹斯義昔鄭人斵子家之棺漢明追討史遷經傳褒貶皆追書先世數百年間非徒區區欲釐當時亦将作法垂於來世當朝亡夕沒便無善惡也請曹如前追除挺名為民録妾還本顯證惡人班下逺近從之南中郎将王含以族彊貴驕傲自恣一請叅佐及守長二十許人多取非其才隗劾奏文致甚苦事雖被寝王氏深忌疾之而隗之彈奏不畏彊禦皆此類也建興中丞相府斬督運令史淳于伯而血逆流隗又奏曰古之為獄必察五聴三槐九棘以求民情雖明庶政不敢折獄死者不可復生刑者不可復續是以明王哀矜用刑曹参去齊以獄市為寄自頃烝荒殺戮無度罪同㫁異刑罰失冝謹案行督運令史淳于伯刑血著柱遂逆上終極柱末二丈三尺旋復下流四尺五寸百姓諠譁士女縱觀咸白其寃伯息忠訴辭稱枉云伯督運訖去二月事畢代還無有稽乏受賕使役罪不及死軍是戍軍非為征軍以乏軍興論於理為枉四年之中供給運漕凡諸徴發租調百役皆有稽停而不以軍興論至於伯也何獨明之捶楚之下無求不得囚人畏痛飾辭應之理曺國之典刑而使忠等稱寃明時謹按從事中郎周筵法曺叅軍劉裔屬李正幸荷殊寵並登列曺當思敦奉政道詳法慎殺使兆庶無枉人不稱訴而令伯枉同周青寃魂哭於幽都訴靈恨於黄泉嗟嘆甚於杞梁血妖過於壊城故有隕霜之人夜哭之鬼伯有晝見彭生為豕刑殺失中妖眚並見以古况今其揆一也皆由筵等不勝其任請皆免官於是右将軍王導等上疏引咎請解職帝曰刑政失中皆吾闇塞所由尋示愧懼思聞忠告以補其闕而引過求退豈所望也由是導等一無所問隗遷御史中丞周嵩嫁女門生㫁道解廬砍傷二人建康左尉赴變又被斫隗劾嵩兄吏部尚書顗曰顗幸荷殊寵列位上僚當崇明憲典恊和上下刑于左右以御于家邦而乃縱肆小人羣為兇害公於廣都之中白日刄尉逺近訩赫百姓諠譁虧損風望漸不可長既無大臣簡御之節不可對揚休命宜加貶黜以肅其違顗坐免官卞壼為御史中丞忠於事上權貴屏跡時淮南小中正王式繼母前夫終更適式父式父終喪服訖議還前夫家前夫家亦有繼子奉養至終遂合𦵏於前夫式自云父臨終母求去父許諾於是制出母齊衰朞壼奏曰就如是父臨終許諾必也正名依禮為無所據若父有命須顯七出之責當存時棄之無縁以絶義之妻留家制服若式父臨困謬亂使去留自由者此必為相要以非禮則存亡無所得從式宜正之以禮魏顆父命不從其亂陳乾昔欲以二婢子殉其子以非禮不從春秋禮記善之並以妾媵猶正以禮况其母乎式母於夫生事奉終非為既絶之妻夫亡制服不為無義之婦自云守節非為更嫁離絶之㫁在夫沒之後夫之既沒是其從子之日而式以為出母此母以子出也致使存無使容居沒無所託也寄命於它人之門埋尸於無名之冡若式父亡後母尋沒於式家必不以為出母明矣許諾之命一耳以為母於同居之時至沒前子之門而不以為母此為制離絶於二居裁出否於意㫁離絶之㫁非式而誰假使二門之子皆此母之生母戀前子求去求絶非禮於後家還反又非禮於前門去不可去還不可還則為無寄之人也式必内盡規諌外極防閑不絶明矣何至守不移於至親略情禮於假繼乎繼母如母聖人之教式為國士閨門之内犯禮違義開闢未有於父則無追亡之善於母則無孝敬之道存則去留自由亾則合𦵏路人可謂生事不以禮死𦵏不以禮者也虧損世教不可以居人倫銓正之任案侍中司徒臨潁公組敷宣五教實在任人而含容違禮曽不貶黜揚州大中正侍中平望亭侯曄淮南大中正散騎侍郎𢎞顯執邦論朝野取信曽不能率禮正違崇孝敬之教並為不勝其任請以見事免組曄𢎞官大鴻臚削爵土廷尉結罪疏奏詔特原組等式付鄉邑清議廢棄終身鍾雅成帝初為御史中丞時國喪未朞而尚書梅陶私奏女妓雅劾奏曰臣聞放勲之殂八音遏宻雖在凡庶猶能三載自兹以來歴代所同肅祖明皇帝棄背萬國尚未朞月聖王縞素泣血臨朝百僚慘悽動無歡容陶無大臣忠慕之節家庭侈靡聲妓紛葩絲竹之音流聞衢路宜加放黜以整王憲請下司徒論正清議穆后臨朝特原不問雅直法繩違百僚憚之司馬恬為御史中丞值海西廢簡文帝登祚未解嚴大司馬桓温屯中堂吹警角恬奏劾温大不敬請科罪温視奏嘆曰此兒乃敢弹我真可畏也恬忠正有幹局在朝憚之江績為御史中丞王恭將代譙王尚之先遣何澹之孫無終向句容左衛將軍桓修以左衛領振武將軍與輔國將軍陶無忌距之修次句容俄而恭敗無終遣書求降修既旋軍而楊佺期已至石頭時朝廷無備内外惶駭修進說曰殷桓之下專恃王恭恭既破滅莫不失色今若優詔用𤣥𤣥必内喜則能制仲堪佺期使並順命朝廷納之以修為龍驤将軍荆州刺史假節權領左衛文武之鎮又令劉牢之以千人送之轉仲堪為廣州修未及發而立等盟於潯陽求誅牢之尚之并訴仲堪無罪獨被降黜於是詔復仲堪荆州續奏修承受楊佺期之言交通信命宣傳不盡以為身計疑誤朝筭収付廷尉時詔免官褚粲為御史中丞中書令中領軍王國寳與㑹稽王道子恃威權扇動内外及弟忱卒國寳自表求解職迎母并奔忱喪詔特賜假而盤桓不時進發為粲所奏國寳懼罪衣女子衣託為王家婢詣道子告其事道子言之於帝故得原後驃騎将軍王徽請國寳同讌國寳素驕貴使酒怒尚書左丞袒台之攘袂大呼以盤盞樂器擲台之台之不敢言復為粲所彈詔以國寳縱肆情性甚不可長台之懦弱失監司體並坐免官王楨之為御史中丞司馬休之為荆州刺史桓振襲江陵休之戰敗出奔㐮陽寜朔将軍張暢之髙平相劉懐肅自汚攻振走之休之還鎮楨之奏休之失戍免官朝廷以豫州刺史魏詠之代之徴休之還京師阮歆之為御史中丞後将軍司馬休之與尚書虞肅父犯禁嬉戲歆之奏劾休之降號征虜将軍宋鄭鮮之在晉為御史中丞外甥劉毅權重當時朝野莫不歸附鮮之盡心髙祖獨不屈意於毅毅甚恨焉義熈六年鮮之使治書侍御史丘洹奏彈毅曰上言傳詔羅道盛輒開牋遂盜發宻事依法棄市奏報行刑而毅以道盛身有侯爵輒復停宥案毅勲徳光重任居次相既殺之非已無縁生之自由又奏之於先而弗請於後閫外出疆非此之謂中丞鮮之於毅舅甥制不相糾臣請免毅官詔無所問王𢎞宋國初建為尚書右僕射奏彈謝靈運曰臣聞閑厥有家垂訓大易作威專戮致戒周書斯典或違刑兹無赦世子左衛率康樂縣公臣謝靈運力人桂興淫其嬖妾殺興江涘棄尸洪流事發京畿播聞遐邇宜加重劾肅正朝風案世子左衛率康樂縣公謝靈運過蒙恩奨頻承榮授聞禮知禁為日已久而不能防閑閫闈致兹紛穢罔顧憲軌忿殺自由此而勿治典刑将替請以見事免靈運所居官上臺削爵土收付大理治罪御史中丞都亭侯王淮之顯居要任邦之司直風聲噂􅊱曽不彈舉若知而弗糾則情法斯撓如其不知則尸昧已甚豈可復預清階式是國憲請免所居官以侯還散輩中内臺舊體不得用風聲舉彈此事彰赫曝之朝野執憲蔑聞羣司循舊國典既頺所虧者重臣𢎞忝承人乏位副朝端若復謹守常科則終莫之糾正所以不敢拱黙自同秉彛違舊之愆伏須准裁髙祖令曰靈運免官而已餘如奏端右肅正風軌誠副所期豈拘常儀自今為永制孔琳之為御史中丞奏劾尚書令徐羡之曰臣聞事上以奉憲為恭臨下以威嚴為整然後朝典惟明莅衆必肅斯道或替則憲綱其頺臣以今月七日預皇太子正㑹㑹畢車去并猥臣停門待闕有何人乗馬當臣車前收捕驅遣命去何人罵詈收捕諮審欲録臣尚慮有紛紜語令勿問而何人獨罵不止臣乃使録何人不肯下馬連呌大喚有兩威儀走來擊臣收捕尚書令省事倪宗又牽威儀手力擊臣下人宗云中丞何得行兇敢録令公人凡是中丞收捕威儀悉皆縛取臣勅下人一不得鬭凶勢輈張有頃乃散又有羣人就臣車側録収捕樊馬子牙行築馬子頓伏不能還臺臣自録非本無對較而宗敢乗勢凶恣簒奪罪身尚書令臣羡之與臣列車紛紜若此或云羡之不禁或云羡之禁而不止縱而不禁既乖國憲禁而不止又不經通陵犯監司凶聲章赫容縱宗等曽無糾問虧損國威無大臣之體不有准繩風裁何寄羡之内居朝右外司輦轂位任隆重百辟所瞻而不能𢎞惜朝章肅是風軌致使宇下縱肆凌暴憲司凶赫之聲起自京邑所謂已有短垣而自踰之又宗為簒奪之主縱不糾問二三虧違宜有裁貶請免羡之所居官以公還第宗等簒奪之愆已屬掌故御史隨事檢處詔曰小人難可檢御司空無所問餘如奏羡之任居朝端不欲以犯憲示物時羡之領揚州刺史琳之弟􅟛之為治中羡之令解釋琳之停寝其事琳之不許􅟛之固陳琳之謂曰我觸忤宰相正當罪止一身汝必不應從坐何須勤勤邪自是百寮震肅莫敢犯禁荀赤松為尚書左丞顔延之為國子祭酒司徒左長史坐啟買人田不肯還直赤松奏之曰求田問舎前賢所鄙延之唯利是視輕冒陳聞依傍詔恩拒捍餘直垂及周年猶不畢了昧利茍得無所顧忌延之昔坐事屏斥復蒙抽進而曽不悛革怨誹無已交遊闒茸沉迷麴蘖横興譏謗詆毁朝士仰竊過榮増憤薄之性私恃顧盻成彊梁之心外示寡求内懐奔競干禄祈遷不知已極預讌班觴肆罵上席山海含容每存遵養愛兼彫虫未忍遐棄而驕放不節日月彌著臣聞聲聞過情孟軻所恥况聲非外來聞由已出雖心智薄劣而髙自比擬客氣虛張曽無愧畏豈復弼亮五教増曜台階請以延之訟田不實妄干天聴以彊凌弱免所居官詔可何承天為御史中丞謝元為尚書左丞太尉江夏王義恭嵗給資費錢三千萬布五萬疋米七萬斛義恭素奢侈用常不充元嘉二十一年逆就尚書換明年資費而舊制出錢二十萬布五百疋以上並應奏聞元輒命議以錢二百萬給太尉事發覺元乃使令史取僕射孟顗命元時新除太尉諮議叅軍未拜為承天所糾帝大怒遣元長歸田里禁錮終身元時又舉承天賣茭四百七十束與官屬求貴價承天坐白衣領職劉瑀為御史中丞瑀使氣尚人為憲司甚得志彈蕭恵開云非才非望非勲非地彈王僧達云廕籍髙華人品冗末朝士莫不畏其筆端蔡准為治書御史泰始二年西討解嚴車駕還宫徐孝嗣登殿不著韎准奏罰金二兩袁豹為御史中丞時鄱陽縣侯孟懐玉上母擅拜國太夫人有司奏許豹以為婦人從夫之爵懐玉父大司農綽見居列卿妻不宜從子奏免尚書右僕射劉栁左丞徐羡之郎何邵之官詔並贖論册府元龜卷五百十八
