body:
  text: 冊府元龜卷四百六宋王欽若等撰將帥部清儉正直清儉夫儉則固以約失之者鮮皆先儒之格訓也若乃本兵柄司戎重萬旅之所禀令天子之所注意乃能敦尚亷節率循清素靡思治産匪念殖貨奉養無事於華侈貲貨罔致於餘羡斥去賂遺不染膏潤貞規内立英風外馳用能震動乎殊鄰鎮靖乎方靣卒乗懐服邊夷愛慕樹風聲於當世延寵遇於時主載美方牘流於無窮西漢而下蓋不乏其人矣漢李廣以良家子從軍擊胡廣歴七郡太守前後三十年家無餘財終不言生産事辛慶忌為左將軍居處恭儉飲食被服尤節儉後漢鮑永初為更始尚書僕射行大將軍事雖為將率而車服敝素為道路所識常衣皂襜褕路稱鮑尚書兵馬吴漢為大將軍但脩里宅不起第夫人先死薄塟小墳不作祠堂祭遵為征虜將軍所得賞賜輙盡與吏士身衣韋袴布被夫人裳不加縁帝以是重焉縁或作綵李恂為西域副校尉西域殷富多珍寳諸國侍子反督使賈胡數遺恂奴婢宛馬金銀香􅄢之属一無所受張奐為安定属國都尉羗豪帥感奐恩徳上馬二十疋先零酋長又遺金鐻八枚奐並受之而召主簿於諸羗前以酒酹地曰使馬如羊不以入廐使金如粟不以入懐悉以金馬還之羗性貪而貴吏清前有八都尉率好財貨為所患苦及奐正身潔已威化大行魏滿寵為征東將軍以老徵還遷為太尉寵不治産業家無餘財詔曰君典兵在外專心憂公有行父祭遵之風賜田十頃榖五百斛錢二十萬以眀清忠儉約之節焉趙儼為征西將軍都督雍凉正始中以老疾求還徵為驃騎將軍故事西征有官厨財籍遷轉之際無不因縁而儼乂手上車發到覇上忘持其嘗所服藥雍州聞之乃追送雜藥材數箱儼笑曰人言語殊不易我偶問所服藥耳何用是為邪遂不取胡質為征東將軍假節都督青徐諸軍事性沉實内察不以其節簡物所在見思嘉平初薨家無餘財唯有賜衣書篋而已軍帥以聞追封陽陵亭侯邑百户田豫為䕶鮮卑校尉鮮卑素利等數以牛馬遺豫豫轉送官胡以為前所餉豫物顯露不如持金乃宻懐金三十斤謂豫曰願避左右我欲有所道豫從之胡因跪曰我見公貧故前後遺公牛馬公輙送官今宻以此上公可以為家資豫張袖受之答其厚意胡去之後皆悉付外具以狀聞於是詔褒之曰昔魏綘開懐以納戎賂今卿舉袖以受狄金朕甚嘉焉乃即賜絹五百疋豫得賜分以其半藏小府後胡復來以半與之後為䕶匃奴中郎將并州刺史清約儉素賞賜皆散之將士每胡狄私遺悉簿藏官不入家家嘗貧匱雖殊類咸髙豫節蜀董和漢末為益州太守先主定蜀為掌軍中即將與諸葛亮並署左將軍大司馬府事自和居官食禄外牧殊域内幹機衡二十餘年死之日家無擔石之儲鄧芝為大將軍二十餘年身之衣食資仰於官不茍於取素儉翛然不治私産妻子不免饑寒死之日家無餘財吳朱然為左大司馬右軍帥然長不盈七尺氣候分眀内行脩潔其所文采惟施軍器餘皆質素魯肅為橫江將軍性方嚴寡於玩飾内外節儉不務俗好陳表為偏將軍北屯章阬家財盡於養士死之日妻子露立太子登為起屋宅蔣欽為津右䕶軍典領辭訟大帝嘗入其室内母踈帳縹被妻妾布裙帝嘆其在貴守約即勅御府為母作錦被改易帷帳妻妾衣服悉皆錦綉鍾離牧以前將軍假節領武陵太守卒官家無餘財士民思之晉王沈為驃騎將軍素清儉不營産業應詹為南平太守鎮南將軍督五郡軍事與陶侃破杜弢於長沙賊中金寳溢目詹一無所取唯收圖書莫不歎之周顗為䕶軍將軍王敦搆逆被害敦使繆坦籍顗家收得素簏數枚盛故絮而已酒五甕米數石在位者服其清約桓温為大司馬都督中外諸軍事温性儉每讌唯下七奠伴茶果而已桓冲為鎮武將軍督荆江十郡軍事性儉素而謙虚愛士嘗浴後其妻送以新衣冲大怒促令持去其妻復送之而謂曰衣不經新何縁得故冲笑而服之前燕皇甫貞為奉車都尉後入為典書令從慕容評攻拔鄴都珍貨充溢貞一無所取唯存恤人物收圖籍而已楊裕為慕容皝大將軍左司馬性謙恭清儉雖歴居朝端若布衣之士宋宗慤為振武將軍破林邑收其異寳雜物不可勝計慤一無所取衣櫛蕭然文帝甚嘉之劉懐慎為䕶軍將軍禄賜班於宗族家無餘財卒謚肅侯南齊劉善眀為征虜將軍質素不好聲色所居茅齋斧木而已牀榻几案不加剗削及卒家貧無遺儲唯有書八千卷太祖聞其清貧賜其子滌葛塘屯榖五百斛周山圖為寕朔將軍淮南太守盗發桓温塜大獲寳物客竊取以遺山圖山圖不受簿以還官梁韋叡為䕶軍將軍所得禄賜皆散之親故家無餘財陳慶之為南北司豫州都督性祗慎衣不紈綺不好絲竹馮道根為右衛將軍雖貴顯而性儉約所居宅不脩墻屋無器服侍衛入室則蕭然如素士之貧賤者當世服其清退武帝亦雅重之後魏李順為左軍將軍征統萬赫連昌昌出逆戰順督勒士衆破其左軍及尅統萬太武賜諸將珍寳雜物順固辭唯取書數千卷太武善之張黎為鎮北將軍與樂安王範濟南公崔徽鎮長安清約公平甚著聲稱當代去之日家無餘財王肅為都督淮南諸軍事揚州刺史清貞好施簡絶聲色終始亷約家無餘財司馬楚之為雲中鎮大將軍朔州刺史在邊二十餘年以清儉著聞楊固為前軍將軍居官清潔家無餘財終歿之日家徒四壁無以供䘮親故為具棺歛焉史寕為凉州大都督破獠甘衆所得軍實悉分賞將士寕無私焉北齊元景安為左右大將軍時初築長城鎮戍未立突厥强盛慮或侵邊仍詔景安與諸將等率軍縁塞以備守督領既多且所部軍人富於財物遂賄貨公行文宣帝聞之遣使推簡同行諸人贓汙狼藉唯景安纎毫無犯帝深嘉之乃詔有司以所聚歛賍絹五百疋賜之以彰清節辛術為淮南經略所部郡守犯大辟朝廷以其奴婢百口及貲財盡賜術三辭不見許乃送詣所司不復以聞邢劭聞之遺術書曰昔鍾離意云孔子忍渇於盗泉便以珠璣委地足下今能若此可謂異代一時後周長孫澄為驃騎大將軍操履清約家無餘財太祖嘗謂曰我於公間志無所惜公有所湏宜即具道澄曰澄自頂至足皆是眀公恩造即如今者實無所湏裴尼初仕西魏為通直散騎常侍從于謹平江陵所獲軍實謹恣諸將校取之餘人皆競取珍玩尼唯取梁元帝素琴一張而已謹深嘆美之唐瑾為元帥府長史從于謹平江陵及軍還諸將多因虜掠大獲財物瑾一無所取唯得書两車載之以歸或白文帝曰唐瑾大有輜重悉是梁朝珍玩帝初不信之然欲眀其虚實宻遣使簡閱之唯見墳籍而已乃嘆曰孤知此人二十年許眀其不以利干義向若不令簡視恐常人有􅄬杼之疑所以益眀之耳凡受人委任當如此也賀蘭祥為驃騎大將軍荆州刺史性甚清素州境南接襄陽西通岷蜀物産所出多諸珍異時既與梁通好行李往來公私贈遺一無所受梁雍州刺史岳陽王蕭詧欽其節儉乃以竹屏風絺綌之属及經史贈祥祥難違其意取而付諸所司太祖後聞之並以賜之王思政為驃騎將軍以勤王為務不營資産嘗被賜園地思政出征後家人種桑菓及還見而怒曰匃奴未滅去病辭家况大賊未平何事産業命左右拔而去之故身䧟之後家無蓄積赫連達為夏州縂管三州五防諸軍事邊境胡民或饋達以羊者達欲招納異類報以繒帛主司請用官物達曰羊入我厨物出官庫是欺上也命取私帛與之識者嘉其仁恕焉王羆為驃騎大將軍羆性儉率不事邊幅嘗有臺使至羆為設食使乃裂其薄餅縁羆曰耕種收穫其功已深舂㸑造成用力不少乃爾選擇當是未饑命左右撤去之使者愕然大慙雖貴顯鄉里舊宅不改衡門身死之日家甚貧罄當時服其清潔司馬裔為大將軍性清約不事生産所得俸禄並散之親戚身死之日家無餘財宅宇卑陋䘮停無所詔為起祠堂焉蔡祐為大將軍性節儉所得禄皆散與宗族死之日家無餘財梁椿為中堅大將軍雅好儉素不營貲産時論以此稱焉隋韋師為兵部尚書平陳之役以本官領元帥掾陳國府藏悉委於師秋毫無犯稱為清白唐羅士信為新安道行軍總管使圖王世充士信凡所虜獲悉分士卒以此為常身未嘗自取屈突通為行軍元帥長史從平薛舉時珍物山積諸將皆爭取之通獨無所犯髙祖聞而謂曰公清正奉國著自終始名下定不虚也特賜金銀六百两綵物一千叚李大亮為左衛大將軍雖位望通顯而居處卑陋衣服儉率死之日家無珠玉以為含唯有米五石布三十疋阿史那杜尒為右衛大將軍貞觀十四年伐髙昌杜尒為行軍􅄣管髙昌平諸人咸即受賞杜尒以未奉進止秋毫無所取及䧏别勅然後受之及所取唯老弱故弊而已還太宗美其亷慎叚秀實為四鎮北庭行軍涇原節度使清約率易逺近稱之非公㑹不聼樂飲酒私室無妓媵無贏財退公之後端居静慮而已張孝忠為義武軍節度使貞元二年河北蝗旱米斗一千五百文復大兵之後民無蓄積餓殍相枕孝忠所食豆䜺而已其下皆甘粗糲人皆服其勤儉孝忠為一時之賢將也盧羣為鄭滑節度使羣先寄寓鄭州典質得良田數頃及授節度各以本地契書分付所管令長令還本主時論稱美裴玢自鄜坊除山南西道節度使玢武臣清心苦節蔬食敝衣居處纔避風雨故􅁶授大鎮李愬西平王晟之子也為昭義軍節度使除太子少保歸東都卒其兄弟皆營搆以相矜誇愬六遷大鎮所處先人舊宅一所而已辛祕為昭義軍節度使久歴重任無豐財厚産為時所稱王廷湊為成徳軍節度使性至勤儉退食燕居布衣木器而已婢妾之數掌事者留榻無累裀庭有芳草類寒素士大夫也後唐郭崇韜為中門副使天祐中李存審既收鎮州遣崇韜閱其府庫或以珍寳賂遺一無所取但市書籍而已晉李徳玩為廣晉尹再領荆州卒於鎮徳玩所治之地雖無殊政然以寛恕及物家無濫積亦武侯之亷者梁漢顒為威衛上將軍漢顒雖起於行陣植性温厚軍政之暇不倦接納歴數鎮家無餘積亦武臣之亷者正直易之述中正詩之紀司直蓋夫為人臣者未有不據直守正而能納君於善身享令名焉若乃居將帥之任􅄣師兵之要入侍階㦸出開幕府而能靣折廷諍不為從諛中立守道不畏強禦唯公家是利唯王室是念姦邪不能回其慮權嬖不能誘其𠂻持謇謇之正論保惓惓之亮節臨難有守遭事不變斯蓋忠精感發懿行惇固志隆於體國義存於軌俗勁正無撓誠信不欺固足以為眀王楨幹之臣協風人爪牙之詠者也漢季布孝恵帝時為中即將單于嘗為書嫚吕太后嫚謂詞語䙝汚也太后怒召諸將議之上將軍樊噲曰臣願得十萬衆橫行匃奴中諸將皆阿吕太后阿曲也曲從其意以噲為然布曰樊噲可斬也夫以髙帝兵三十餘萬困於平城噲時亦在其中今噲奈何以十萬衆橫行匃奴中靣謾謾欺誑也且秦以事胡陳勝等起今創痍未瘳痍傷也瘳差也噲又靣䛕欲揺動天下是時殿上皆懼太后罷朝遂不復議匃奴事趙充國為後將軍神爵元年春討叛𦍑酒泉太守辛武賢奏言以七月分兵並出張掖酒泉合擊罕开在鮮水上者帝乃以書敕讓充國曰將軍欲至正月乃擊罕𦍑不早及秋共水草之利因天時誅不義萬下必全勿復有疑充國既得讓以為將任兵在外更宜有守以安國家乃上書謝罪因陳兵利害其秋充國病帝賜書曰制詔後將軍聞苦脚脛寒泄寒泄下利也言其患足脛將軍年老加疾一朝之變不可諱恐其死朕甚憂之今詔破𦍑將軍詣屯所為將軍副急因天時大利吏士銳氣以十二月擊先零𦍑即疾劇留屯毋行獨遣破羌強弩將軍時羌䧏者萬餘人矣充國度其必壞欲罷騎兵屯田以待其敝作奏未上㑹得進兵璽書充國子中即將卬懼使客諌充國曰誠令兵出破軍殺將以傾國家將軍守之可也即利與病又何足争一旦不合上意遣繡衣來責將軍將軍之身不能自保繡衣謂御史何國家之安充國歎曰是何言之不忠也本用吾言𦍑虜得至是邪言預防之可無今日之冦往者舉可先行羌者吾舉辛武賢丞相御史復曰遣義渠安國竟沮敗𦍑沮壊也金城湟中榖斛八錢吾為耿中丞耿夀昌也為司農中丞糴三百斛榖𦍑人不敢動矣預儲糧食可以制羌耿中丞請糴百萬斛迺得四十萬斛耳義渠再使且費其半失此二䇿𦍑人故敢為逆失之毫釐差以千里是既然矣今兵久不决四夷卒有動揺相因而起雖有知者不能善其後𦍑獨足憂邪言倘如此則所憂不獨在羌吾固以死守之眀主可為忠言遂上屯田奏其後討叛羌振旅而還所善浩星賜迎說充國浩星姓賜名也曰衆人皆以破𦍑強弩出擊多斬首獲䧏虜以破壊然有議者以為虜勢窮困兵雖不出必自服矣將軍即見宜歸功於二將軍出擊非愚臣所及如此將軍計未失也充國曰吾年老矣爵位已極豈嫌伐一時事以欺眀主㢤兵勢國之大事當為後法老臣不以餘命一為陛下眀言兵之利害卒死誰當復言之者卒以其意對卒終也帝然其計罷遣辛武賢歸酒泉太守官充國復為後將軍衛尉後漢蓋勲為討虜校尉靈帝召見問天下何苦而反亂如此勲曰倖臣子弟擾之時宦者上軍校尉蹇碩在坐帝顧問碩碩懼不知所對而以此恨勲帝又謂勲曰吾已陳師於平樂觀多出中藏財物以餌士何如勲曰臣聞先王耀徳不觀兵今㓂在逺而設近陳不足昭果毅祗黷武耳帝曰善恨見君晚羣臣初無是言也皇甫嵩為左將軍中平五年督前將軍董卓各率二萬人拒梁州賊王國於陳倉眀年卓拜為并州牧詔使以兵委嵩卓不從嵩從子酈時在軍中說嵩曰本朝失政天下倒懸能安危定傾者唯大人與董卓耳今怨隙已結勢不俱存卓被詔委兵而上書自請此逆命也又以京師昏亂躊躇不進此懐姦也且其凶戾無親將士不附大人今為元帥仗國威以討之上顯忠義下除凶害此桓文之事也嵩曰專命雖罪專誅亦有責也不如顯奏其事使朝廷裁之於是上書以聞帝讓卓卓又増怨於嵩張奐獻帝時為度遼將軍其為將帥有勲名董卓慕之使其兄遺縑百疋奐惡卓為人絶而不受朱儁為城門校尉遷河南尹董卓擅政以儁宿將外甚親納而心實忌之及関東兵盛卓議移都儁輙止卓卓雖憚儁然貪其名重乃表拜太僕以自副使者拜儁辭不肯受因曰國家西遷必孤天下之望以成山東之釁臣不見其可也使者詰曰召君受拜而君拒之不問徙事而君陳之其故何也儁曰副相國非臣所堪也遷都計非事所急也辭所不堪言所非急臣之所宜也使者曰遷都之事初不聞其計事属未露何所承受儁曰相國董卓具為臣說使人不能屈繇是止不為副卓後入關留儁守雒陽儁以河南殘破乃東屯中牟及卓誅郭汜李㴶作亂儁猶在中牟陶謙與諸豪傑共推儁為太師因移檄牧伯同討李㴶奉迎天子㑹李㴶用太尉周忠尚書賈詡䇿徵儁入朝軍吏皆憚入關欲應陶謙等儁曰以君召臣義不俟駕况天子詔乎且大事可濟遂辭謙議而就㴶徵復為太僕謙等遂罷魏楊沛初仕漢為䕶羌都尉建安十六年馬超反大軍西討沛隨軍都督孟津渡時太祖已南過其餘未畢而中黃門前渡忘持行軒私北還取之從吏求小船欲獨先渡吏呵不肯黃門與吏争言沛問黃門有疏邪黃門云無疏沛怒曰何知汝不欲逃邪遂使人捽其頭與杖欲捶之而逸得去衣幘皆裂壊自訴於太祖太祖曰汝不死為幸矣繇是聲名益振李典為破虜將軍與張遼樂進屯合肥吳大帝率衆圍之遼欲出戰典遼素不睦遼恐其不從典慨然曰此國家大事顧君計何如耳吾豈敢以私憾而忘公義乎乃率衆與遼破走吳軍徐晃文帝時為右將軍嘗歎曰古人患不遭眀君今幸遇之當以功自効何用私譽為終不廣交援杜恕齊王嘉平初為幽州刺史加建威將軍使持節護烏丸校尉時征北將軍程喜屯薊尚書袁侃等戒恕曰程申伯處先帝之世傾田園讓於青州足下今俱杖節使共屯一城宜深有以待之而恕不以為意至官未期有鮮卑大人兒不繇関塞徑將數十騎詣州州斬所從來小子一人無表言上喜於是劾奏恕初喜欲恕折節謝已諷司馬宋權示之以㣲意恕答權書曰向示委曲奉法天下事以善意相待無不致快也以不善意相待無不致嫌隙也而議者言凡人天性皆不善不當待以善意更堕其調中僕得此輩便欲歸蹈滄海乗桴耳不能自諧在其間也然以年五十二不見廢棄頗亦遭眀逹君子亮其本心若不見亮使人刳心着地正與數斤肉相似何足有所眀故終不自解說程征北功名宿著在僕前甚多有人出征北乎若令下官事無大小咨而後行則非上司彈䋲之意若咨而不從又非上下相順之宜故推一心任一意直而行之耳殺胡之事天下謂之是邪是僕諧也呼為非邪僕自受之無所怨咎程征北眀之亦善不眀之亦善諸君子自共為其心耳不在僕言也喜於是遂深文劾恕下廷尉當死以父畿勤事水死免為庶人徙章武郡蜀龎統為軍師中即將從先主入蜀於涪大㑹置酒作樂謂統曰今日之㑹可謂樂矣統曰伐人之國而以為歡非仁者之兵也先主醉怒曰武王伐紂前歌後舞非仁者邪卿言不當宜速起出於是統逡廵引退先主尋悔請還統復故位初不顧謝飲食自若先主謂曰向者之論阿誰為失統對曰君臣俱失先主大笑宴樂如初宗預後主景耀中為鎮軍大將軍領兖州刺史時都䕶諸葛瞻初統朝事廖化過預欲與預共詣瞻所預曰吾等年踰七十所竊已過但少一死耳何求於年少輩而屑屑造門邪遂不往吳虞翻為騎都尉時魏將于禁為蜀將關侯所獲繫在城中大帝至釋之請與相見他日帝乗馬出引禁併行翻呵禁曰爾䧏虜何敢與吾君齊馬首乎欲抗鞭擊禁帝呵止之朱績字公緒為偏將軍營下督領盗賊事持法不傾魯王覇注意交績嘗至其廨就之坐欲與結好績下地住立辭而不當顧悌為偏將軍大帝末年嫡庶不分悌數與驃騎將軍朱據共陳禍福言辭切直朝廷憚之留賛為屯騎校尉時事得失毎嘗規諌好直言不阿㫖大帝以此憚之晉解系為雍州刺史揚烈將軍西戎校尉假節㑹氐羌叛與征西將軍趙王倫討之倫信用佞人孫秀與系争軍事更相表奏朝廷知系守正不撓而召倫還系表殺秀以謝氐羌不從周馥恵帝時為鎮東將軍馥自經世故毎欲維正朝廷忠情懇至以東海王越不盡臣節毎言厲然越深憚之車𦙍孝武太元中為䕶軍時王國寳謟於㑹稽王道子諷八座啟以道子為丞相加殊禮𦙍曰此乃成王所以尊周公也今主上當陽非成王之比相王在位豈得為周公乎望實二三並不宜爾必大忤上意乃稱疾不署其事疏奏帝大怒而甚嘉𦙍意梁韋叡為䕶軍將軍時武帝方銳意釋氏天下咸從風而化叡自以信受素薄位居大臣不欲與衆俯仰所行略如他日後魏周㡬為寕朔將軍鎮河南嘗嫌奚斤等綏撫関中失和百姓不附毎至言論形於聲色斤等憚焉楊固為前軍將軍剛直雅正不畏強禦東魏劉貴為行臺僕射獨孤如願於雒陽貴嚴斷濟務有益機速性峭直攻訐無所迴避故見賞於時隋髙熲隨晉王伐陳為元帥長史三軍諮禀皆取斷於熲及陳平晉王欲納陳主寵姬張麗華熲曰武王伐殷戮妲己今平陳國不宜取麗華乃令斬之王甚不恱唐尉遲敬徳太宗貞觀中為右武候大将軍素抗直不能容人之非毎見房元齡杜如晦等短長必靣折廷辯由是與執政不平乃出為襄州都督髙仙芝元宗時為河西節度使監軍邊令誠毎事規仙芝芝多不從韋倫肅宗乾元三年自隴州刺史拜襄鄧等十州節度使時李輔國秉權用事節將除拜皆出其門倫既朝廷公用又不私謁輔國由是未行改秦州刺史兼御史中丞防禦使叚秀實徳宗時為邠寕節度都虞侯權知奉天行營事馬璘奏加開府儀同三司軍中有能引二十四弓而犯盗者璘欲免之秀實曰將自有私愛則法令不一雖韓白復生亦不能為理璘善其議竟使殺之璘决事有不合理者必固争之得璘引過乃已李晟毎理軍尤惡下為朋黨相搆好善嫉惡出於天性裴胄貞元中為荆南節度簡儉清正時諸道節度觀察使競剥下厚歛製竒錦異綾以進奉為名又貴人宣命必竭公藏以買其歡胄待之有節皆不盈數金常賦之外無橫歛宴勞禮止三爵未嘗酣樂張建封為徐州節度使貞元中來朝詔書矜免百姓諸色逋賦帝因問建封對曰凡逋賦殘欠皆是積累年月無可徵收雖蒙陛下憂恤百姓亦無所禆益時河東節度使李說華州刺史盧微皆中風疾口不能言足不能行但信任左右胥吏决遣之建封皆悉聞奏帝深嘉納吕元膺憲宗時為河中節度使時方鎮多事姑息元膺獨以堅正自處監軍使洎往來中貴無不敬憚入拜吏部侍即李􅅠為鳳翔節度使是鎮承前多用武將有神䇿行營之號初受命必詣軍脩謁􅅠謝恩日陳其不可遂去神䇿行營字但為鳳翔節度裴玢元和中自鄜州節度改授山南西道節度觀察等使玢厯二鎮頗以清心苦節為政不交權幸不務貢獻崔從為山南西道節度觀察使時有權倖知帝意欲大用從使人通其旨以要厚賂從終不答楊於陵為嶺南節度使㑹監軍使許遂振悍戾貪恣干撓軍政於陵奉公潔己遂振無能奈何以飛語上聞憲宗初驚惑頼裴輩為於陵申理帝感悟乃除吏部侍即遂振終得罪柳公綽敬宗時為邠寧慶等州節度觀察處置等使先時神䇿諸鎮列屯要地未嘗受節制虜毎窺間為患公綽疏上其弊即詔神䇿諸鎮在其部者邊上有警盡得聽節度指揮康全藝為鄜坊節度文宗太和元年為右驍騎衛上將軍全藝平張韶之難以功拜鄜畤理軍節費不交貴近竟以無助入居散秩論者甚惜之劉從諫為澤路節度使太和九年李訓事敗宰相王涯等四人被禍時涯兼掌邦計雖不與李訓同謀然不自異於其間既死非其罪從諫素徳涯之私恩心頗不平四上章請涯等罪名仇士良輩深憚之是時中官頗横天子不能制朝臣日憂䧟族頼從諫論列而鄭覃李石方能粗秉朝政後唐張廷藴事莊宗統御營黃甲軍常在左右時皇后劉氏在鄴多縱其下擾人廷藴多斬之覩者壮焉册府元龜卷四百六
