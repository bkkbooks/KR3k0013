body:
  text: 冊府元龜巻九百九十六宋王欽若等撰外臣部鞮譯納質責讓鞮譯王制云東曰寄南曰象西曰狄鞮北曰譯此蓋王者居域中之大享四海之富莫不來逺人懐殊俗乃傳此徒通八蠻之言語導外臣之嗜欲所以其心上逹我澤下降至於飲食必豐衣服必美或錫之冠𢃄或授之印綬故得廻靣内向欣戴皇仁楛矢東來白狼西入獻彼犀象發為詠歌皆繇此道也周公居攝三年越裳以三象胥重譯而獻白雉曰道路悠逺山川阻深音使不通故重譯而朝故周官象胥掌蠻夷閩貉戎狄之國使掌傳王之言而諭説焉秦始皇時匈奴單于北徙十有餘年姓蠻鞮氏蠻音力金切鞮音下奚切其國稱之曰撑犁孤塗單于撑音田庾切匈奴謂天為撑犁謂子為孤塗單于者廣大之貎也言其象天單于然也漢武帝元鼎五年平南越置交阯郡凡交阯所統雖置郡縣而言語各異重譯乃通成帝建始中復株絫復音服絫音力追切若鞮單于立匈奴謂孝為若鞮自呼韓單于降後與漢親宻見漢帝諡為孝慕之王其子復株絫以下皆稱若鞮南單于以下直稱鞮也哀帝元夀元年博士弟子秦景憲受大月氐王使伊存口授浮屠經浮屠正號曰佛陁與浮屠聲相近皆西方言其來轉為二音華言譯之則謂淨覺言㓕穢成明道為聖悟服其道者相與和居治心修淨行乞以自給謂之沙門或曰桑門亦聲相近總謂之僧皆胡言也僧譯為和命衆桑門為息心比丘為行乞所謂佛者本號釋迦文者譯言能仁謂德充道備勤濟萬物也王莽建國元年遣五威将軍王駿等六人授匈奴單于印綬單于佐姑夕侯蘇為譯後漢明帝永平中益州刺史朱輔上疏言曰狼王唐菆等慕化歸義作詩三章臣輙令詳其風俗譯其辭語遣從事史李陵䕶送詣闕事下史官録其歌并載夷人本語為注其一曰逺夷樂德歌詩曰大漢是居提官隗權與天合意魏冐踰糟吏譯平端岳譯劉䏷不從我來旁莫支留聞風向化徴衣隨攘所見竒異知唐桑艾多贈繒布邪毗􅀈䋠甘美酒食推澤攸逺昌樂肉飛招拒蘇便屈伸悉備局后仍離蠻夷貧薄僂讓龍洞無所報嗣莫支度繇願主長夀陽雒僧鱗子孫昌熾莫穉兩存其二曰逺夷慕德歌詩曰蠻夷所處僂讓反以日入之部且交陵俉慕義向化繩動隨旅歸日出主落且棟雒聖德深恩德渡諾與人富厚魏薗渡洸冬多霜雪紵邪流藩夏多和雨作邪尋螺寒温時適藐潯沪離部人多有薗橘邪推渉危歴險辟危歸險不逺萬里莫受萬抑去俗歸德術疊附德心歸慈母仍蕗孶模逺夷懐德歌曰荒服之外荒服之儀土地墝埆犁籍憐二食肉衣皮坐蘇邪犁不見鹽榖莫碭麤沐吏譯傳風因譯傳徴大漢安樂是漢夜拒㰎負歸仁蹤優路仁觸冐險陜雷折險龍髙山岐峻偷狼藏撞縁崖磻石扶路側禄本薄發家息落服滛百宿到雒理瀝髪雒父子同賜捕菃茵毗懐抱匹帛懐槀匹漏傳告種人傳宣呼敕長願臣僕陵陽臣僕和帝永元六年永昌郡徼外敦忍乙王莫延慕義遣使譯獻犀牛大象九年徼外蠻及禪國王雍繇調禪音擅遣重譯奉國珍寳靈帝熹平二年日南徼外國重譯貢獻晉惠帝元康中有胡沙門支恭明譯佛經維摩法華三本前凉張重華鎮凉州天竺國重四譯來貢樂噐后秦姚興時有胡沙門􅱉摩羅什為興所敬於長安草堂寺集義學八百人重譯經本羅什聰辨有淵思逹東西方言北凉沮渠蒙遜鎮凉州時有􅄢賔沙門曇摩䜟與沙門智嵩等譯湼槃諸經十餘部梁髙祖普通二年新羅王募秦始遣使隨百濟奉獻其俗呼城曰健矣羅其邑在内曰啄評在外曰邑勒亦中國之言郡縣也語言待百濟覆通後魏道武時太史令晁崇弟懿以善北人語内侍左右為黄門侍郎是時蠕蠕社崙自號豆代可汗豆代猶魏言駕馭開張也可汗猶魏言皇帝也社崙卒立其弟斛律號謁苦蓋可汗猶魏言姿質美好也斛律卒立其季父僕渾之子大擅號牟汗紇升蓋可汗猶魏言制勝也大擅卒子呉提立號處勑連可汗猶魏言神聖也呉提卒子吐賀真立號處可汗猶魏言唯也吐賀真卒子予成立號受羅部真可汗魏言惠也予成卒子豆崙立號伏名敦可汗魏言嘗也豆崙卒立其叔父那蓋號候其代庫者可汗魏言悦樂也那蓋死子伏圖立號他汗可汗魏言緒也伏圖為髙車所殺子醜奴立號豆羅伏䟦豆代可汗魏言彰制也醜奴卒立其弟阿那環奔魏國人推娑羅門為主號彌偶可社句可汗魏言安靜也明元時沙門法顯自長安逰天竺歴二十餘國隨有經律之處學其書語譯而寫之還至江南更與天竺禪師䟦陁羅辨定之䟦陁羅共沙門法業重加釋撰獻文時中散吕文祖以舊語譯注皇誥辭義通辨孝文時羽林監孟威以明觧北人之語勑在注作以備推訪北齊後主武平末侍中劉世清能通四夷語為當時第一後主命世清作突厥語翻湼槃經以遺突厥可汗勑中書侍郎李德林為其序隋髙祖開皇十四年新羅王真王遣使貢方物新羅言語名物有似中國人名國為邦弓為弧賊為冦行酒為行觴相呼皆為徒不與馬韓同焉唐太宗貞觀十四年三月流鬼國遣使余志重三譯朝貢𤣥宗開元中安西都䕶蓋嘉惠撰西域記云堅昆國人皆赤髪緑睛其有黒髪黒睛者則李陵之後故其人稱是都尉苖裔亦有繇然又今改稱紇扢斯者亦是北夷舊號臣案國史叙鐵勒種類云伊吾以西焉耆以北旁白山則有契弊烏䕶紇骨等其契弊則契秘烏䕶則烏紇也後為回鶻其紇骨即紇扢斯也繇是而言蓋鐵勒之種常以稱紇骨矣其轉為黠戞斯者蓋夷音有緩急即傳譯語不同其或自稱黠黠斯者語急而然耳訪於吏譯云黠戞斯是黄頭赤靣義即似為囘鶻所呼今使者稱自有此名未知孰是安禄山觧六蕃語為𤣥帝牙郎代宗寳應元年加冊囘紇可汗為登里頡咄登宻施含俱録英義逮加毗伽可汗加冊可敦為婆墨光親麗華毗伽可敦頡咄華言社稷法用登密施華言到竞􅅤俱録華言婁羅毗伽華言足意知婆墨華言得憐唐德宗貞元八年驃國王遣其弟悉利移因南詔重譯來朝華言謂之驃自謂突羅成闍婆人謂之徒里拙文宗開成元年五月勑應邊州今置譯語學官掌令教習以逹異意後唐李存信惠黠多數㑹四夷語别六蕃書善戰識兵勢初為獻祖親信晉康福善諳蕃語初仕後唐明宗視政之暇毎詔入便殿諮訪時之利病福即以蕃語奏之樞宻使安重誨惡焉嘗靣戒之曰康福但亂奏事有日斬之福懼周世宗顯德末占城國遣使朝貢所貢表文于貝多葉簡以香木其言譯之方諭其意納質夫四夷稱臣納子為質其來久矣自漢氏建元之後窮兵黷武開拓提封北逐匈奴南誅閩粤由是百蠻懾伏厥角稽顙或内向而請吏或遣子於宿衛武力之盛振古莫傳然而國帑虚竭生民減半復何補哉雖後世相㳂或遵前制豈惟質其種裔習我華風而又降其部落布之内地暨為害之深也則五胡亂於西晉朱耶横於唐季六月之詩曰薄伐玁狁至于太原言逐出之而已漢武帝建元六年南粤王胡為閩粤王郢所攻漢為興師討閩粤王弟餘善殺郢以降天子使嚴助往諭意南粤王胡頓首曰天子乃興兵誅閩粤死亾以報德遣太子嬰齊入宿衛胡病甚太子嬰齊請歸胡薨嬰齊嗣立遣子次公入宿衛元光中大行王恢佐從驃侯趙奴虜樓蘭王樓蘭既降匈奴聞發兵擊之於是樓蘭遣一子質匈奴一子質漢征和元年樓蘭王死國人來請質子在漢者欲立之質子嘗坐漢法下蚕室宫刑故不遣報曰侍子天子愛之不能遣其更立其次當立者樓蘭更立王漢復責其質子太初四年貳師将軍李廣利斬大宛王更立貴人昧察為宛王及貳師将軍之東旋車東出諸所過小國聞宛破皆使其子弟從入貢獻見天子因為質焉嵗餘宛貴人殺昧察立故宛王母寡弟蟬封為王遣子入侍質於漢漢因使使賂賜鎮撫之宣帝五鳯四年匈奴單于稱臣遣弟谷蠡王入侍甘露元年正月遣子右賢王銖樓渠堂入侍郅支單于亦遣子右大将駒子利受入侍元帝初元四年遣使奉獻因求侍子願為内附遣衛司馬谷吉送之成帝建始二年匈奴呼韓邪單于子死子雕陶莫臯立為復株絫若鞮單于遣子右致盧兒王醯諧屠奴侯入侍是時康居亦遣子侍漢史失其年鴻嘉元年復株絫單于死弟且麋胥立為搜諧若鞮單于遣子左祝都韓王朐留斯侯入侍元延元年搜諧若鞮單于死弟且莫車立為車牙若鞮單于遣子右於駼􅄷撣王烏夷當入侍綏和元年車牙若鞮單于死弟􅇸知牙斯立為烏珠留若鞮單于遣子右股奴王烏鞮牙斯入侍二年匈奴侍子右股奴死歸葬遣子右於駼􅄷撣王稽留昆入侍哀帝元夀二年匈奴單于來朝帝遣侍子稽留昆隨單于去到國平帝元始初單于復遣稽留昆同母兄右大且方與婦入侍還歸復遣且方同母兄左日逐王都與婦入侍是時帝㓜太皇太后稱制新都侯王莽秉政欲説太后以威德至盛異於前説讀日悦以此事取悦於太后廼風單于風讀曰諷令遣王昭君女須卜居次云入侍云者其女名太后所以賞賜之甚厚後漢光武建武二十一年冬鄯善王車師王等十六國皆遣子入侍奉獻願請都䕶帝以中國初定未遑外事乃還其子也一云車師鄯善焉耆等十八國俱遣子入侍二十五年三月南單于遣子入侍明帝永平十六年春奉車都尉竇固出酒泉破呼衍王天山呼衍匈奴王號天山即祈連山一名雪山在伊州北留兵屯伊吾盧城明年春西域于寘諸國皆遺子入侍西域自絶六十五載後復通焉十七年戊己校尉耿恭屯後王部金蒲城金蒲城車師後王城廷也今廷州蒲昌縣移檄烏孫示漢威德大昆彌已下皆願遣子入侍恭乃發使齎金帛迎其侍子和帝永元二年大将軍竇憲破北匈奴車師震慴前後王並遣子入侍車師有後王前王前王即後王之子其庭相去五百里六年西域都䕶班超大破焉耆尉犁斬其王自是西域降服納質者五十餘國安帝永初中鮮卑大人燕荔陽詣闕朝賀令止烏桓校尉所居寗城下通胡市因築南北兩部質館築館以受降質鮮卑邑落百二十部各遣子入質順帝永建五年疏勒國王臣磐遣侍子與大宛莎車使俱詣闕貢獻魏明帝太和元年十月焉耆王遣子入侍晉武帝太康元年八月車師前部遣子入侍四年八月鄯善國遣子入侍假其子歸義侯六年十月龜兹焉耆國遣子入侍後魏太武正平元年車師國王遣子入侍是時狄道人李寳初欲謀歸欵令其子承隨表入質帝深相噐異禮遇甚優賜爵姑臧侯孝文太和十五年詔立髙句麗王雲又詔雲遣世子入朝雲上書辭疾遣其從叔子隨使詣闕唐𤣥宗開元二年二月壬寅新羅王子金守忠來朝留宿衛賜宅及帛以寵之是年閏五月戊寅詔曰我國家統一寰宇歴年滋多九夷同文四隩來暨夫其襲冠𢃄奉正朔顒顒然嚮風而慕化列於天朝編於屬國者蓋亦衆矣我則潤之以時雨炤之以春陽淳德以柔之中孚以信之𤣥風既同羣物兹遂莫不自天壤窮海域厥角以請吏執贄以來庭皇唐之德於此為盛今外蕃侍子久在京國雖威惠之及自逺畢歸而覊旅之志重遷斯在宜命所司勘㑹諸蕃充質宿衛子弟等量放還國契丹及奚延通質子並即停追前令還蕃首領等至幽州且住交替者即旋去朕欲以鳥獸咸若華戎俱㤗來則納其朝謁之禮去則隨其生育之心推我至誠崇彼大順含𢎞之施德莫厚焉十五年契丹遣首領諾括來送質子并獻方物代宗大歴九年二月辛卯渤海質子大英俊還蕃引辭于延英殿德宗貞元七年八月渤海王遣其子太貞幹一作真幹來朝請備宿衛憲宗元和元年十一月放宿衛新羅質子金獻忠歸本國十五年二月新羅質子試太子中允賜紫金魚袋金士信奏臣本國朝天二百餘載常差質子宿衛闕庭毎有天使臨蕃即充副使轉通聖㫖下告國中今在城宿衛質子臣次當行之文宗開成元年新羅王金景徽遣其子義琮來謝恩兼宿衛二年四月放還蕃是年十二月新羅國質子試光禄卿紫金魚袋金允夫進状稱本國王命臣入朝充質二十六年矣三蒙改授試官再當本國宣慰及冊立等副使准徃例皆蒙特授正官遂授武成王廟今晉髙祖天福三年八月青州王建立奏髙麗國宿衛質子王仁翟乞放歸鄉里可之責讓夫要荒之服聲教攸暨天子有守在四夷之道春秋著彊以天下之法故威讓之命所以懲其不貢文告之辭所以譴其不庭惟制御之多方在羈縻而勿絶若乃象胥是設言語既通使者載馳要領斯得而乃陸梁負約桀驁渝盟䑕首多疑狼心肆志或自相殘孽或敢行侵叛憫其類之所愬慮我邊之有聳繇是布之言令昭以刑德示曲直之㫖諭誅賞之意故有革心改圖厥角謝罪者矣漢武帝太初中樓蘭王遣一子質漢一子質匈奴後貳師擊大宛匈奴欲遮之貳師兵盛不敢當即遣騎因樓蘭候漢使后過者欲絶勿通軍正任文将兵屯玉門闗為貳師後距後距者居後以拒敵捕得生口知状以聞帝詔文便道引兵捕樓蘭王将詣闕簿責王以文簿一一責之對日小國在大國間不兩屬無以自安願徙國入居漢地帝直其言遣歸國宣帝時賜烏孫大吏大禄大監金印紫綬使尊輔大昆彌星靡星靡死子雌栗靡立為小昆彌後末振将使人刺殺之漢責大禄大吏大監以雌靡見殺状奪金印紫綬更與銅墨哀帝建平二年烏孫庶子卑援音爰㚄音竹二切入匈奴界冦盗匈奴擊敗之卑援㚄恐遣子趍逯為質匈奴逯音録單于受以状聞漢遣中郎将丁野林副校尉公乗音使匈奴責讓單于告令還歸卑援㚄質子單于受詔遣歸後漢順帝永和中南匈奴左部勾龍王吾思居細等背叛中郎将梁並等擊破之天子遣使責讓單于開以恩義令相招降單于本不預謀乃脱㡌避帳詣並謝罪隋髙祖開皇六年契丹諸部相攻擊久不止又與突厥相侵髙祖使責讓之其國遣使詣闕頓顙謝罪十七年賜髙麗王湯璽書曰朕膺天命愛育率土奠王海隅宣揚朝化欲使圓首方足各遂其心王毎遣使人嵗常朝貢雖稱藩附誠節未盡王既人臣須同朕德而乃驅逼靺鞨固禁契丹諸蕃頓顙為我臣妾忿善人之慕義何毒害之情深乎大府工人其數不少王必須之自可聞奏昔年潜行財貨利動小人私将弩手逃􅇡下國豈非修理兵噐意欲不臧恐有外聞故為盗竊時命使者撫慰王蕃本欲問彼人情教彼政術王乃坐之空舘嚴加防守使其閉目塞耳永無聞見有何隂惡弗欲人知禁制官司畏其訪察又數遣馬騎殺害邊人屢騁姦謀動作邪説心在不賔朕於蒼生悉如赤子賜王土宇錫王官爵深恩殊澤彰著遐邇王專懐不信常自猜疑常遣使人密覘消息純臣之義豈若是也蓋當繇朕訓導不明王之愆違一巳寛恕今日以後必須改革守藩臣之節奉朝正之典自化爾蕃勿忤他國則長享富貴實稱朕心彼之一方雖地狹人少然普天之下皆為朕臣今若黜王不可虗置終須更選官屬就彼安否王若洒心易行率繇憲章即是朕之良臣何勞别遣才彦也昔帝王作法仁信為先有善必賞有惡必罰四海之内俱聞朕㫖王若無罪朕勿加兵其餘蕃國謂朕何也王必虚心納朕此意慎勿疑惑更懐異圖往者陳叔寳代在江隂殘害人庶驚動我􅇏候抄掠我邊境朕前後誡勑經歴十年彼則恃長江之外聚一隅之衆惛狂驕傲不從朕言故命将出師除彼㓙逆往來不盈旬月兵騎不過數千歴代逋冦一朝清蕩遐邇久安人臣胥悦聞王歎恨獨致悲傷黜陟幽明有司是職罪王不為陳㓕賞王不為陳存樂禍好亂何為爾也王謂遼水之廣何如長江髙麗之人多少陳國朕若不存含育責王前愆命一将軍何繇多力慇懃曉示許王自新耳宜體朕懐自求多福湯得書惶恐将奉表陳謝㑹病卒唐太宗貞觀十五年二月既破薛延陁是月延陁使者辭還大宗謂之曰語爾可汗延陁為大突厥為小爾責突厥羊馬又勒首領侍衛我今最處尊大亦須徴發於爾我既不為爾安得妄作爾云突厥部數竊羊馬犬䑕之盗何國無之執而加罪足以懲誡豈得将兵踰漠違負要約耶我國家西越昌海東踰遼澤縁邊州郡列屯将士亦猶延陁有四靣可冦至便擊朔州道總管為大度設引兵欲入長城輕軍往問曾無報荅控弦馳突輕我師衆致此狼狽爾誠自取我邊方馬士一麾雲集今青山甲卒未盈三千斬将搴旗猶能若是舉措利害爾當自思二十年十月壬申詔曰髙麗餘燼謂能悔禍故遣停兵全其巢穴而兇頑成性殊未革心前後表聞類多不實毎懐詭誑罪極難宥見朕使人又虧蕃禮所令誨云莫擾新羅口云從命侵凌不止積其姦惡常苞禍心蓋天攸棄豈宜馴飬自今已后勿聼朝貢髙宗時吐谷渾為吐蕃擊走投凉州請附内地吐蕃大臣禄東賛亦屯兵於青海之地遣使人諭仲琮入朝上表稱吐谷渾之罪仍請和親髙宗不許之遣左衛郎将劉文祥使于吐蕃降璽書以責讓之德宗貞元十三年正月吐蕃賛普遣使農索昔齎表請修和好邊将以聞德宗以其􅉘狼之心數負恩背約不受表状任其使却歸武宗㑹昌四年十月賜黨項詔曰自爾祖歸欵國家依附邊塞為我赤子編于黔黎牛馬蕃孳種落殷盛不侵不叛頗効信誠比聞邊将不守朝章失於綏緝因縁徴歛害及無辜念爾逺人莫知控告特命朕之愛子實總元戎所冀羣帥聼命而不敢自專諸部懐寃有所披訴奉我憲令以保和好如聞莫顧恩私遂懐憑恃攘奪不避于官物驅掠罔憚于中人擅用甲兵恣行攻刼豈有朝廷内地輙此䲭張道路阻艱商旅殆絶朕便欲詔命諸鎮同力勦除深慮玉石難分善惡同弊今再為條制各使得宜却令節将指揮許其處斷如亊有寃濫政乖公平並遣廵院奏聞朝廷必與申理如或不知恩貸猶敢猖狂國有典章必難容捨故兹曉示當體朕懐初黨項自貞觀五年詔開河曲地為六十州内附者三十萬口有大酋長拓抜赤詞者與諸首領歸欵朝廷以為松州都督賜姓李氏自是從大積石山已東並為中國之境嵗來朝覲及武宗即位以破廻鶻之衆塞上紛擾慮邊将統押不得威重故以皇子德王愕遥鎮朔方道節度充管押西北諸蕃部落使時曾遣中使宣撫或為戎騎所掠故有是詔戒之後唐荘宗初為晉王天祐十四年二月新州編将盧文進殺其帥李存矩叛投契丹冦我新州先是契丹阿保機當武皇時屢盟於雲中靣相約束欵塞交歡義為弟兄􅇥難相救彼無侵苦至是容納叛臣渝盟犯塞使讓之曰畫野離疆雖有華戎之别惟忠與信不違蠻貊之邦契丹王氣稟貞忠心懐仁義為天山之貴族據玉塞之雄藩恩加辮髪之鄉威讋控弦之俗往者降情修好欵塞通盟各守封疆交陳贄幣錦車使者常馳問遺之書牙帳賢王頗識㑹同之禮闗山無事風馬有歸青塜路邊罕有射鵰之騎受降城北更無遺鏃之憂永保初終不渝信誓近者盧文進潜圖兇逆茍避誅夷苞姦藴惡之情何方可保有父有君之國皆所不容契丹王未始苞藏專聼誑惑黨一夫之罪惡絶兩國之歡盟縱彼犬羊窺吾亭鄣徒封牛耳難保獸心輙将左袵之徒幸我中原之利見蒐兵甲决戰西樓暫勞車騎之師佇見槀街之首冊府元龜卷九百九十六
