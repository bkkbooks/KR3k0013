body:
  text: 册府元龜卷九百六十九宋王欽若等撰外臣部朝貢第二陳髙祖永定三年五月扶風國遣使獻方物文帝天嘉二年十一月髙麗國遣使獻方物四年正月于陁利國遣使獻方物廢帝天康元年十二月髙麗國獻方物光大元年十月百濟國遣使獻方物二年六月新羅國九月林邑國狼牙脩國並遣使獻方物宣帝太建二年六月新羅國十一月髙麗國並遣使獻方物三年五月遼東新羅丹丹天竺盤盤等國十月丹丹國並遣使獻方物四年三月扶南林邑國並遣使獻方物六年正月髙麗國遣使獻方物九年七月百濟國遣使獻方物十年七月新羅國遣使獻方物十三年十月丹丹國遣使獻方物後主至徳元年十二月頭和國遣使獻方物二年十一月盤盤國百濟國並遣使獻方物三年十月丹丹國十二月髙麗國並遣使獻方物四年九月百濟國遣使獻方物禎眀二年六月扶南國遣使獻方物後魏道武天興二年十二月秃髪鹿孤遣使朝貢五年十二月秃髪傉檀遣使朝貢眀元永興五年正月頞㧞大渠率四十餘人詣闕奉貢賜以繒帛錦􅄢各有差泰常八年四月車駕南巡至雒陽觀石經蠻王梅安率渠師數千人來貢方物太武神䴥元年四月氐南秦王楊𤣥遣使朝貢四年閏六月蠕蠕國遣使朝獻延和元年十月吐谷渾慕璝遣使朝獻三年二月蠕蠕吳提遣其異母兄秃鹿傀及左右數百人朝貢獻馬二千匹十月蠕蠕國遣使朝貢太延元年二月蠕蠕焉耆車師諸國六月髙麗鄯善國並遣使朝貢八月粟特國遣使朝貢二年八月東北髙車國遣使朝貢三年二月髙麗契丹三月龜兹悅般焉耆車師粟特疏勒烏孫渴盤陁鄯善諸國各遣使朝獻十一月破雒那者舌國遣使朝獻奉汗血馬四年三月鄯善王弟素延耆來朝五年四月鄯善龜兹疏勒焉耆諸國遣使朝獻五年遮逸國獻汗血馬十一月髙麗及粟特渴盤陁破雒那悉居半國各遣使朝貢太平真君十一年十一月頞盾國獻獅子一文成興安元年十二月保達沙獵國各遣使朝獻二年三月疏勒國八月渴盤陁國十二月厙莫奚契丹􅄢賔等十餘國各遣使朝貢興光元年九月厙莫奚國獻名馬有一角状如麟十二月出于叱萬單國各遣使朝貢獻太安元年六月遮逸國十月波斯疏勒國並遣使朝貢二年十一月嚈噠普嵐國並遣使朝獻三年正月粟特于闐國十二月于闐扶餘等五十餘國各遣使朝貢五年五月居常國遣使朝獻和平元年十月居常王獻馴象一二年八月波斯國遣使朝獻三年三月髙麗蓰王契嚙思厭於師疏勒石那悉居半渴盤陁諸國各遣使朝獻五年十二月吐呼羅國遣使朝獻六年二月髙麗蓰王對曼諸國各遣使朝獻四月破雒那國獻汗血馬普嵐國獻寶劍獻文天安元年三月髙麗波斯于闐阿襲諸國十月曹利彤曷國各遣使朝貢皇興元年二月髙麗厙莫奚具伏弗郁羽陵日連匹黎爾于闐諸國九月髙麗于闐普嵐粟特國各遣使朝獻二年四月髙麗厙莫奚契丹具伏弗郁羽陵日連匹黎爾叱六手悉萬斤阿大阿羽真侯于闐波斯等國十二月悉萬丹等十餘國各遣使朝貢三年二月蠕蠕髙麗厙莫奚契丹國七月蠕蠕國並遣使朝貢四年二月髙麗厙莫奚契丹各遣使朝貢孝文延興二年七月髙麗國八月地豆于厙莫奚國並遣使朝貢昌亭國遣使貢獻蜀馬三年二月髙麗契丹國四月契丹八月髙麗厙莫奚國九月厙莫奚國悉萬斤國十月悉萬斤國並遣使朝獻四年正月粟特國遣使朝獻二月吐谷渾拾寅遣子費斗斤入侍并獻方物三月髙麗吐谷渾曹利國五月蠕蠕國六月濶悉國七月髙麗國八月吐谷渾國九月契丹厙莫奚地豆于十一月吐谷渾國並遣使朝獻五年二月髙麗國遣使朝獻閏二月吐谷渾國四月龜兹國並遣使朝獻五月契丹厙莫奚國各遣使獻名馬八月髙麗吐谷渾地豆于諸國十月蠕蠕國並遣使朝獻勿吉國遣使朝獻承眀元年春二月蠕蠕髙麗厙莫奚波斯諸國五月蠕蠕國七月髙麗厙莫奚八月蠕蠕國九月髙麗厙莫奚契丹宕昌悉萬斤十一月蠕蠕國並遣使朝獻太和元年二月髙麗契丹厙莫奚國三月厙莫奚契丹國並遣使朝獻四月蠕蠕國遣使朝貢九月蠕蠕車多羅髙麗西天竺舍衞十月厙莫奚疊伏羅龜兹諸國各遣使朝貢契丹國並遣使朝貢十一月吐谷渾國粟提婆國十二月員濶吐谷渾國並遣使朝貢二年正月吐谷渾遣使朝獻二月蠕蠕國遣使朝獻七月龜兹國遣使獻名駞七十頭八月勿吉國遣使朝獻九月龜兹國遣使獻大馬名駞珍寶甚衆三年三月吐谷渾髙麗國四月蠕蠕國並遣使朝獻吐谷渾國遣使獻氂牛五十頭九月髙麗吐谷渾國地豆于契丹厙莫奚龜兹諸國各遣使朝獻十二月粟特州逸河龔疊伏羅員濶悉萬斤諸國各遣使朝貢四年三月蠕蠕國七月悉萬斤國並遣使朝貢五年五月鄧至國十月蠕蠕國並遣使朝貢六年二月地豆于國六月蠕蠕國十一月吐谷渾國並遣使朝貢八年二月蠕蠕國十月髙麗國並遣使朝貢九年三月宕昌國五月髙麗國十月髙麗吐谷渾國十二月宕昌國髙麗吐谷渾等國並遣使朝貢十年三月蠕蠕國四月髙麗吐谷渾國十二月勿吉國並遣使朝貢十一年四月吐谷渾國五月髙麗吐谷渾國八月悉萬斤國並遣使朝獻十二年二月髙麗國三月宕昌國四月髙麗吐谷渾國六月宕昌國並遣使朝貢八月勿吉國貢楛矢石砮九月吐谷渾宕昌國並再遣使朝貢閏九月髙麗國遣使朝貢十三年二月髙麗國三月吐谷渾國六月髙麗國七月隂平國八月中尺國九月吐谷渾武興宕昌諸國十月髙麗國並遣使朝貢十四年二月吐谷渾國三月悉萬斤等國五月髙麗國八月宕昌國九月髙麗國並遣使朝貢十五年正月吐谷渾國三月悉萬斤等國五月髙麗國七月吐谷渾國九月吐谷渾髙麗宕昌鄧至諸國並遣使朝獻十六年