body:
  text: 册府元龜卷四百四十一宋王欽若等撰將帥部敗衂易曰師岀以律否臧凶禮曰謀人之軍師敗則死之蓋失律則凶寡謀則敗者往典之明戒也若夫受脤於社援枹而行臨敵制宜先勝後戰故能開擴封略式遏冦讎若乃奉戎昭之寄任素厲之威忽棄逺圖忸􅏸小利以勞從逸以力制謀故鼓音未衰而勇氣先竭以至靡亂旗轍亡失師屬拔斾投衡奔潰不暇雖或忘身殉節下吏聽議而於國之事已無及矣於戲古者重詩禮之選審仁賢之用有繇哉屈瑕楚大夫莫敖也魯桓公十三年屈瑕伐羅使徇于師曰諫者有刑徇宣令也及鄢亂次以濟鄢水在襄陽宣城縣入漢遂無次且不設備及羅羅與盧戎兩軍之盧戎南蠻大敗之莫敖縊于荒谷子玉楚大夫魯僖公二十八年夏四月戊辰晉侯宋公齊國歸父崔夭秦小子憖次于城濮國歸父崔夭齊大夫也小子憖秦穆公子也城濮衞地子玉使鬭勃請戰鬬勃楚大夫己巳晉師陳于莘北欒枝使輿曵柴而偽遁曵柴起塵詐為衆走楚師馳之原軫郤溱以中軍公族横擊之公族公所率之軍狐毛狐偃以上軍夾攻子西楚左師潰楚師敗績孟明秦大夫也魯僖公三十年秦伯使杞子逢孫楊孫戍鄭三十二年冬杞子自鄭使吿于秦曰鄭人使我掌其北門之管管籥也若潛師以來國可得也穆公訪諸蹇叔蹇叔曰勞師以襲逺非所聞也蹇叔秦大夫公辭焉辭不受其言召孟明西乞白乙使出師於東門之外孟明百里孟明視西乞西乞術白乙白乙丙蹇叔哭之曰吾見師之出而不見其入也明年夏四月辛巳晉敗秦師于殽獲百里孟明視西乞術白乙丙以歸至魯文公二年春孟明視帥師伐晉以報殽之役二月晉侯禦之甲子及秦師戰于彭衙秦師敗績華元宋大夫魯宣公二年春鄭公子歸生受命于楚伐宋受楚命也華元樂吕禦之二月壬子戰于大棘宋師敗績囚華元獲樂吕及甲車四百六十乘俘二百五十人馘百人馘人首狂狡輅鄭人鄭人入于井狂狡宋大夫輅迎也倒㦸而出之獲狂狡荀林父晉大夫魯宣公十二年春楚子圍鄭夏六月晉師救鄭荀林父將中軍代郤缺先縠佐之彘季代林父士㑹將上軍河曲之役郤缺將上軍宣八年代趙盾為政將中軍士㑹代將上軍郤克佐之郤缺之子代㬰駢趙朔將下軍代欒盾欒書佐之欒盾之子代趙朔趙括趙嬰齊為中軍大夫括嬰齊皆盾異母弟鞏朔韓穿為上軍大夫荀首趙同為下軍大夫茍首林父弟趙同趙嬰兄韓厥為司馬韓萬𤣥孫及河聞鄭既及楚平桓子欲還曰無及於鄭而勦民焉用之桓子林父勦勞也楚歸而動不後動兵伐鄭隨武子曰善武子士㑹彘子曰不可彘子先縠以中軍佐濟佐彘子所帥也濟渡河韓獻子謂桓子獻子韓厥曰彘子以偏師䧟子罪大矣子為元帥師不用命誰之罪也失屬亡師為罪已重不如進也令鄭屬楚故曰失屬彘子以偏師䧟故曰亡師事之不㨗惡有所分㨗成也與其専罪六人同之不猶愈乎三軍皆敗則六卿同罪不得獨責元帥師遂濟楚子北師次於郔郔鄭北地沈尹將中軍沈或作寢寢縣也今汝隂固始縣子重將左子反將右將飲馬於河而歸子反公子側聞晉師既濟王欲還嬖人伍參欲戰伍參奢之祖父令尹孫叔敖弗欲曰昔歲入陳今兹入鄭不無事矣戰而不㨗參之肉其足食乎參曰若事之㨗孫叔為無謀矣不㨗參之肉將在晉軍可得食乎令尹南轅反斾廻車南郷斾軍前大旗士季使鞏朔韓穿帥七覆于敖前帥將七覆為伏兵七處故上軍不敗趙嬰齊使其徒先具舟于河故敗而先濟潘黨既逐魏錡言魏錡見逐而退趙旃夜至於楚軍二人雖俱受命而行不相隨趙旃在後至席於軍門之外使其徒入之布席坐示無所畏也楚子為乗廣三十乗分為左右右廣雞鳴而駕日中而說說舎也左則受之日入而說許偃御右廣養由基為右彭名御左廣屈蕩為右楚王更迭載之故各有御名乙卯王乗左廣以逐趙旃趙旃棄車而走林屈蕩搏之得其甲裳下曰裳晉人懼二子之怒楚師也使軘車逆之軘車兵車名潘黨望其塵使騁而吿曰晉師至矣楚人亦懼王之入晉軍也遂出陳孫叔曰進之寧我薄人無人薄我詩云元戎十乘以先啓行先人也元戎戎車在前也詩小雅言王者軍行必有戎車十乗在前開道先人為備軍志曰先人有奪人之心薄之也遂疾進師車馳卒奔乘晉軍桓子不知所為鼓於軍中曰先濟者有賞中軍下軍爭舟舟中之指可掬也兩手曰掬晉師右移上軍未動及昏楚師軍於邲晉之餘師不能軍不能成營也宵濟亦終夜有聲言其兵衆將不能用劉康公王季子也魯成公元年春晉侯使瑕嘉平戎于王文公十七年邥垂之役詹嘉處瑕故謂之瑕嘉單襄公如晉拜成單襄公王卿士謝晉為平戎劉康公徼戎將遂伐之戎平還欲要其無備叔服曰背盟而欺大國此必敗叔服周内史背盟不祥欺大國不義神人弗助將何以勝不聽遂伐茅戎三月癸未敗績于徐吾氏徐吾氏茅戎之别也孫良夫衞大夫也魯成公二年夏四月衞侯使良夫石稷寗相向禽將侵齊與齊師遇齊伐魯還相遇於衛也良夫孫林父之父石稷石碏四世孫寗相寗俞子石子欲還孫子曰不可以師伐人遇其師而還將謂君何言無以答君若知不能則如無出今既遇矣不如戰也良夫帥師及齊師戰于新築衞師敗績鄧廖楚大夫魯襄公三年春楚子重伐吳為簡之師克鳩兹至于衡山鳩兹吳邑在丹陽蕪湖縣東今臯夷也衡山在吳興烏程縣南使鄧廖帥組甲三百被練三千組甲被練皆戰備也組甲漆甲成組文被練練袍也以侵吳吳人要而擊之獲鄧廖其能免者組甲八十被練三百而已子重歸既飲至三日吳人伐楚取駕駕良邑也鄧廖亦楚之良也君子謂子重於是役也所獲不如所亡臧紇魯大夫襄公四年冬十月邾人莒人伐鄫臧紇救鄫侵邾敗於狐駘臧紇武仲也鄫屬魯故救之狐駘邾地魯國畨縣東南有目台亭國人逆喪者皆髽魯於是乎始髽髽麻髪合結也遭喪者多故不能備凶服髽而已國人誦之曰臧之狐裘敗我於狐駘臧紇時服狐裘我君小子朱儒是使朱儒朱儒使我敗於邾襄公㓜弱故曰小子臧紇短小故曰朱儒敗不書魯人諱之子蕩楚令尹魯昭公六年徐儀楚聘于楚儀楚徐大夫楚子執之逃歸懼其叛也使薳洩伐徐薳洩楚大夫吳人救之令尹子蕩帥師伐吳師于豫章而次于乾谿乾谿在譙國城父縣南楚東境吳人敗其師於房鍾房鍾吳地獲宫廐尹棄疾鬬韋龜之父子蕩歸罪於薳洩而殺之歸罪於薳洩不以敗告故不書叔弓魯大夫也魯昭公十三年春叔弓圍費弗克敗焉為費人所敗不書諱之也公子光吳王諸樊子也魯昭公十七年冬子光伐楚陽匄為令尹卜戰不吉陽匄穆王曾孫令尹子瑕司馬子魚曰我得上流何故不吉子魚公子魴也順江而下易用勝敵且楚故司馬令龜我請改卜令曰魴也以其屬死之楚師繼之尚大克之吉得吉兆戰于長岸子魚先死楚師繼之大敗吳師獲其乗舟餘皇餘皇舟名史皇楚大夫魯定公四年史皇謂子常曰楚人惡子而好司馬司馬沈尹戍若司馬毁吳舟于淮塞城口而還城口三隘道之總名是獨克吳也子必速戰不然不免乃濟漢而陳自小别至于大别禹貢漢水至大别南入江然則此二别在江夏界三戰子常知不可欲奔知吳不可勝史皇曰安求其事求知政事難而逃之將何所入子必死之初罪必盡說言致死以克吳可以免貪賄致冦之罪十一月庚午二師陳于柏舉闔廬之弟夫槩王晨請於闔廬以其屬五千先擊子常之卒子常之卒奔楚師亂吳師大敗之子姚子般鄭大夫魯哀公二年六月晉趙鞅納衞太子于戚八月齊人輸范氏粟子姚子般送之子姚罕達子般駟𢎞士吉射逆之趙鞅禦之遇於戚陽虎曰吾車少以兵車之斾與罕駟兵車先陳斾先驅車也以先驅車益其車以示衆罕駟自後隨而從之彼見吾貌必有懼心晉人先陳鄭人隨之不知其虚實見車多必懼於是乎㑹之㑹合戰必大敗之從之卜戰龜焦兆不成樂丁曰詩曰爰始爰謀爰契我龜樂丁晉大夫詩大雅言先人事後卜筮謀協以故兆詢可也詢諮詢也故兆始納衞太子卜得吉兆言今既謀同可不須更卜簡子誓曰范氏中行氏反易天明不事君也斬艾百姓欲擅晉國而滅其君寡君恃鄭而保焉今鄭為不道棄君助臣二三子順天明從君命經徳義除詬恥在此行也克敵者上大夫受縣下大夫受郡周書作雒篇千里百縣縣有四郡士田十萬十萬畝也庶人工商遂得遂進仕人臣𨽻圉免去厮役志父無罪君實圖之志父趙簡子之一名也言己事濟君當圖其賞若其有罪絞縊以戮絞所以縊人物桐棺三寸不設屬辟屬辟棺之重數王棺四重君再重大夫一重素車樸馬以載柩無入于兆兆葬域下卿之罰也為衆設賞自設罰所以能克敵甲戍將戰郵無恤御簡子衞太子為右郵無恤王良也登鐵上鐵丘名望見鄭師衆太子懼自投于車下子良授太子綏而乘之曰婦人也言其怯簡子廵列曰畢萬匹夫也七戰皆獲有馬百乘死於牖下畢萬晉獻公卿也皆獲有功死於牖下言得壽終羣子勉之死不在冦言有命繁羽御趙羅宋勇為右三子晉大夫羅無勇麋之麋束縛也吏詰之御對曰痁作而伏痁瘧疾也衞太子禱曰曾孫蒯聵敢昭告皇祖文王周文王皇大也烈祖康叔烈顯也文祖襄公繼業守文故曰文祖蒯聵襄公之孫鄭勝亂從勝鄭聲公名釋君助臣為從於亂晉午在難午晉定公名不能治亂使鞅討之鞅簡子名蒯聵不敢自佚備持矛焉戎右持矛敢告無絶筋無折骨無面傷以集大事無作三祖羞集成也大命不敢請佩玉不敢愛不敢愛故以祈禱鄭人擊簡子中肩斃于車中斃踣也獲其蠭旗蠭旗旗名太子救之以戈鄭師北獲温大夫趙羅羅無勇故鄭師雖北猶獲羅太子復伐之鄭師大敗獲齊粟千車趙孟喜曰可矣趙孟簡子也喜太子前怯今更勇武子賸鄭大夫魯哀公九年賸之嬖許瑕求邑無以與之賸罕達也瑕武子之屬請外取許之瑕請取於它國故圍宋雍丘宋皇瑗圍鄭師許瑕師每日遷舍作壘塹成輙徙舎合其圍壘合鄭師哭子姚救之大敗子姚武子賸也二月甲戌宋取鄭師于雍丘使有能者無死惜其能也以郟張與鄭羅歸鄭之有能者徐承吳大夫魯哀公十年㑹吳子邾子郯子伐齊南鄙師于鄎鄎齊地邾郯不書兵并屬吳不列於諸侯徐承帥舟師將自海入齊齊人敗之吳師乃還國書齊大夫魯哀公十一年春國書帥師伐我孟孺子洩帥右師冉求帥左師戰于郊師獲甲首八十冉求所得齊人不能師不能整其師宵諜曰齊人遁諜間也冉有請從之三季孫弗許夏為郊戰故公㑹吳子伐齊欲以報也五月克博壬申至于嬴博嬴齊邑也二縣皆屬泰山中軍從王吳中軍胥門巢將上軍王子姑曹將下軍展如將右軍三將吳大夫齊國書將中軍高無㔻將上軍宗樓將下軍陳僖子謂其弟書爾死我必得志書子占也欲獲死事之功宗子陽與閭丘明相厲也相勸厲致死子陽宗樓也桑掩胥御國子國子國書公孫夏曰二子必死亦勸勉也將戰公孫夏命其徒歌虞殯虞殯送葬歌曲示必死陳子行命其徒具含玉子行陳逆也具含玉亦示必死公孫揮命其徒曰人尋約吳髪短約繩也八尺曰尋吳髪短欲以繩貫其首東郭書曰三戰必死於此三矣三戰夷儀五氏與今使問弦多以琴弦多齊人也六年奔魯問遺也曰吾不復見子矣言將死戰陳書曰此行也吾聞鼓而已不聞金矣鼔以進軍金以退軍不聞金言將死也傳言吳師强齊人皆自知敗甲戌戰于艾陵展如敗高子齊上軍敗國子敗胥門巢吳上軍亦敗王卒助之大敗齊師獲國書公孫夏閭丘明陳書東郭書革車八百乗甲首三千以獻于公公以兵從故以勞公高無㔻齊大夫魯哀公二十三年夏六月晉荀瑤伐齊荀瑤荀躒之孫知伯襄子高無㔻帥師禦之知伯視齊師馬駭遂驅之曰齊人知余旗其謂余畏而反也及壘而還將戰長武子請卜武子晉大夫知伯曰君告于天子而卜之以守龜於宗祧吉矣吾又何卜焉且齊人取我英丘君命瑤非敢耀武也治英丘也治齊取英丘以辭伐罪足矣何必卜壬辰戰于犂丘犂丘隰也齊師敗績知伯親禽顔庚顔庚齊大夫顔涿聚趙括代廉頗為趙將悉更約束易置軍吏秦將白起聞之縱奇兵佯敗走而絶其糧道分斷其軍為二士卒離心四十餘日軍餓趙括出銳卒自搏戰秦軍射殺趙括括軍敗數十萬之衆遂降秦秦悉坑之趙前後所亡凡四十五萬公孫喜為韓將釐王三年使公孫喜率周魏攻秦敗我二十四萬虜喜伊闕栗腹為燕相燕王喜用栗腹之計欲攻趙而問昌國君樂間樂間曰趙四戰之國也其民習兵攻之不可燕王不聽遂伐趙趙使廉頗擊大破栗腹之軍於鄗禽栗腹樂乘李信秦將也信年少壯勇嘗以兵數千逐燕太子丹至於衍水中卒破得丹始皇以為賢勇於是始皇問李信吾欲攻取荆於將軍度用幾何人而足李信曰不過用二十萬人始皇問王翦王翦曰非六十萬人不可始皇曰王將軍老矣何怯也李將軍果勢壯勇勢一作新其言是也遂使李信及蒙恬將二十萬南伐荆王翦言不用因謝病歸老于潁陽李信攻平與音余蒙恬攻寢今固始寢丘大破荆軍信又攻鄢郢破之於是引兵而西與蒙恬㑹城父荆人因隨之三日三夜不頓舎大破李信軍入兩壁殺七都尉秦軍走章邯為秦將二世末張耳陳餘立趙歇為趙王邯及王離擊趙耳與趙王歇走入鉅鹿城王離圍之餘北收常山兵得數萬人軍鉅鹿北章邯軍鉅鹿南棘原築甬道屬河屬聨及也音之欲切饟王離饟古餉字謂饋運其軍糧也王離兵食多急攻鉅鹿城中食盡陳餘使五千人令張黶陳澤先嘗秦軍至皆没當是時燕齊楚聞趙急皆來救張敖亦北收代兵得萬餘人來皆壁餘旁項羽兵數絶章邯甬道王離軍乏食項羽悉引兵渡河遂破章邯軍諸侯軍乃敢擊秦軍遂虜王離於是趙王歇張耳乃得出龍且為楚將時韓信已定臨菑遂東追齊王田廣至高密西楚亦使龍且將號稱二十萬救齊齊王廣龍且并軍與信戰未合人或說龍且可無戰而降也龍且曰吾平生知韓信為人易與耳遂戰與信夾濰水陳濰水出琅邪北流至北經臺昌縣入海韓信乃夜令人為萬餘囊滿盛沙壅水上流引軍半渡擊龍且佯不勝還走龍且喜曰固知信怯也遂追信渡水信使人決壅囊水大至龍且軍大半不得渡即急擊殺龍且龍且水東軍散走漢韓千秋故濟北相也武帝時南粤王興嗣立其母中國人欲入朝相吕嘉不聽有叛心遣千秋與王太后弟樛樂將二千人往入粤境嘉遂反而韓千秋兵之入也破數小邑其後粤直開道給食未至畨禺四十里粤以兵擊千秋等滅之楊僕為樓船將軍荀彘為左將軍彘與僕討朝鮮王右渠右渠發兵距險左將軍卒多率遼東士多卒將名也兵先縱敗散多還走坐法斬樓船將齊兵七千人先至王險右渠城守窺知樓船軍少即出擊樓船樓船軍敗走將軍僕失其衆遁山中十餘日稍求收散卒復聚李廣為將軍出鴈門擊匈奴匈奴兵多破廣軍生得廣單于素聞廣賢令曰得李廣必生致之胡騎得廣廣時傷置兩馬間絡而盛之卧行十餘里廣佯死睨其傍有一兒騎善馬睨邪視也音玉系切暫騰而上胡兒馬因抱兒鞭馬南馳數十里得其餘軍匈奴騎數百追之廣行取兒弓射殺追騎以故得脫於是至漢漢下廣吏吏當廣亡失多為虜所生得當斬贖為庶人李陵為騎都尉將歩卒五千人出居延北行三十日至浚稽山與單于相值騎可三萬圍陵陵軍居兩山間以大車為營千弩俱發擊殺虜數千人明日復戰斬首三千餘級南行至山下因發連弩射單于單于下走是日捕得虜言單于曰此漢精兵擊之不能下日夜引吾南近塞得毋有伏兵乎諸當戸君長皆言單于自將數萬騎擊漢數千人不能滅後無以復使邊臣令漢益輕匈奴復力戰山谷間尚四五十里得平地不能破廼還是時陵軍益急匈奴騎多戰一日數十合復傷殺虜二千餘人虜不利欲去㑹陵軍候管敢為校尉所辱亡降匈奴具言陵軍無後救射矢且盡獨將軍麾下及成安侯校各八百人為前行以黄與白為幟當使精騎射之即破矣成安侯者潁川人父韓千秋故濟北相奮擊南越戰死武帝封子延年為侯以校尉隨陵單于得敢大喜使騎竝攻漢軍疾呼曰李陵韓延年趣降遂遮道急攻陵陵居谷中虜在山上四面射矢如雨下漢軍南行未至鞮汗山鞮音丁奚切一日五十萬矢皆盡即棄車去士尚三千餘人徒斬車輻而持之徒但也軍吏持尺刀抵山入陿谷單于遮其後乘隅下壘石放石以投人因山隅曲而下也壘音盧對切士卒多死不得行昏後陵便衣獨歩出營便衣謂著短衣小褏也止左右無隨我丈夫一取單于耳良久陵還太息曰兵敗死矣軍吏或曰將軍威震匈奴天命不遂後求道徑還歸如浞野侯為虜所得後亡還天子客遇之况於將軍乎陵曰公止吾不死非壯士也於是盡斬旌旗及珍寶埋地中陵歎曰復得數十矢足以脫矣今無兵復戰天明坐受縳矣各鳥獸散猶有得脫歸報天子者令軍士人持二升糒一半冰半讀曰判判大片也期至遮虜鄣者相待夜半時擊鼓起士鼓不鳴陵與韓延年俱上馬壯士從者十餘人虜騎數千追之韓延年戰死陵曰無面目報陛下遂降軍人分散脫至塞者四百餘人陵敗處去塞百餘里邊塞以聞後漢鄧禹為大司徒征關中自馮愔反後禹威稍損又乏食歸附者離散而赤眉復還入長安禹與戰敗走至高陵軍士饑餓者皆食棗菜光武乃徴禹還勑曰赤眉無榖自當來東吾折箠笞之非諸將憂也無得復妄進兵禹慙於受任而功不遂數以饑卒徼戰輒不利三年春與車騎將軍鄧𢎞擊赤眉遂為所敗衆皆死散馮異為征西大將軍㑹鄧禹率車騎將軍鄧𢎞等引歸與異相遇禹𢎞要異共攻赤眉異曰異與賊相拒且數十日雖屢獲雄將餘衆尚多可稍以恩信傾誘難卒用兵破也上今使諸將屯黽池要其東而異擊其西一舉取之此萬成計也禹𢎞不從𢎞遂大戰移日赤眉陽敗棄輜重走車皆載土以豆覆其上兵士饑爭取之赤眉引還擊𢎞𢎞軍潰亂異與禹合兵救之赤眉小郤異以士卒饑倦可且休禹不聽復戰大為所敗死傷者三千餘人禹得脫歸宜陽異棄馬歩走上囘谿阪囘谿在雒州永寧縣與麾下數人歸營復堅壁蓋延為虎牙將軍時董憲將賁休舉蘭陵城降憲聞之自郯圍休時延及龎萌在楚請往救之光武勑曰可直往擣郯則蘭陵必自解延等以賁休城危遂先赴之憲逆戰而陽敗延等遂逐退因拔圍入城明日憲大出兵合圍延等懼遽出突走因往攻郯帝讓之曰間欲先赴郯者以其不意故耳今既奔走賊計已立圍豈可解乎延等至郯果不能克而董憲遂拔蘭陵殺賁休延等往來要擊憲别將於彭城郯邳之間戰或日數合頗有尅獲帝以延輕敵深入數以書誡之及龎萌反攻殺楚郡太守引軍襲敗延延走北渡泗水破舟檝壊津梁僅而得免又云萌攻延延與戰破之詔書勞延曰龎萌一夜反畔相去不逺營壁不堅殆令人齒欲相擊而將軍有不可動之節吾甚美之此傳言僅而得免與彼不同吳漢為大司馬從車駕上隴遂圍隗囂於西城帝勑漢曰諸郡甲卒但坐費糧食若有逃亡則沮敗衆心宜悉罷之漢等貪并力攻囂遂不能遣糧食日少吏士疫没逃亡者多及公孫述救至漢遂退敗鄧隲為車騎將軍任尚為征西校尉安帝永初元年先零别種滇零與鍾羌諸種大為冦掠斷隴道時羌歸附既久無復器甲或持竹竿木枝以代戈矛或負板案以為楯或執銅鏡以象兵郡縣畏懦不能制遣隲及征西校尉任尚將五營及三河三輔汝南南陽潁川太原上黨兵合五萬人屯漢陽明年春諸郡兵未及至鍾羌數千人先擊敗隲軍於冀西殺千餘人校尉侯霸坐衆羌反叛徴免以西域都䕶叚禧代為校尉其冬隲使尚及從事中郎司馬鈞率諸郡兵與滇零等數萬人戰于平襄尚軍大敗死者八千餘人司馬鈞為左馮翊安帝元初二年零昌種衆分兵冦益州乃使屯騎校尉班雄屯三輔遣鈞行征西將軍督右扶風仲光安定太守杜恢北地太守盛包京兆虎牙都尉耿溥右扶風都尉皇甫旗等合八千餘人又龎參將羌胡兵七千餘人與鈞分道竝北擊零昌參兵至勇士東為杜季貢所敗於是引退鈞等獨進攻拔丁奚城大克獲杜季貢率衆偽逃鈞令光恢包等收羌禾稼光等違鈞節度散兵深入羌乃設伏要擊之鈞在城中怒而不救光竝没死者三千餘人鈞乃遁還坐徴自殺參以失期軍敗抵罪以馬賢代領校尉事馬賢建光元年為䕶羌校尉討燒當羌於金城不利順帝永和六年為征西將軍與且凍羌戰于射姑山賢軍敗没尹耀為揚州刺史順帝末揚徐賊羣起盤互連歳建康元年九江范容周生等相聚反亂屯據歴陽為江淮巨患遣御史中丞馮緄將兵督耀及九江太守鄧顯討之耀顯軍敗為賊所殺田晏為破鮮卑中郎將靈帝熹平六年八月遣晏出雲中使匈奴中郎將臧旻與南單于出鴈門䕶烏桓校尉夏育出高柳竝伐鮮卑三道出塞經二千里檀石槐率衆逆擊育等大敗死者十七八董卓為東中郎將中平元年持節代盧植擊張角於下曲陽軍敗抵罪孔融為北海相當黄巾賊衝融到郡收合士民起兵講武賊張饒等羣軰二十萬衆從冀州還融逆擊為饒所敗乃收敗兵保朱虚縣稍復鳩集吏民魏王朗為㑹稽太守時孫策渡江略地朗功曹虞翻以為力不能拒不如避之朗自以身為漢吏宜保城邑遂舉兵與策戰敗績浮海至東冶策又追擊大破之朗乃詣策策令使者語朗曰問逆賊故㑹稽太守王朗朗受國恩當官云何不惟報徳而阻兵安忍大軍征討幸免梟夷不自掃屏復聚黨衆屯聚郡境逺勞王誅卒不悟順捕得云降庶以欺詐用全首領得爾與不具以狀對朗稱擒虜對使者曰朗以𤨏才誤竊朝私受爵不讓以遘罪網前見征討畏死茍免因治人物寄命須㬰又廹大兵惶怖北引從者疾患死亡略盡獨與老母共乘一欐流矢始交便棄欐就俘稽顙自首於征役之中朗惶惑不達自稱降虜縁前迷謬被詰慙懼朗愚淺駑怯畏威自驚又無良介不早自歸於破亡之中然後委命下𨽻身輕罪重死有餘辜申脰就鞅屯足入絆叱咤聽聲東西惟命策以其儒雅答辭遜讓而不害曹休為大司馬都督揚州明帝太和二年九月休率諸軍至皖與吳將陸議戰於石亭敗績王昶為大將軍齊王嘉平四年十一月詔昶及征東將軍胡遵鎮南將軍毌丘儉等征吳十二月吳大將軍諸葛恪拒戰大破衆軍於東關不利而還時昶及儉聞東軍敗各燒屯走王經為雍州刺史高貴鄉公正元二年八月辛亥蜀大將軍姜維攻狄道經戰於洮西經大敗還保狄道城蜀馮習字休元隨先主入蜀先主東征吳習為領軍將軍統諸軍大敗於猇亭猇音鶚馬謖為諸葛亮參軍後主建興六年亮出軍向祁山時有宿將魏延吳壹等論者皆言以為宜令為先鋒而亮違衆拔謖統大衆在前與魏將張郃戰于街亭為郃所破士卒離散亮進無所據退軍還漢中謖下獄被誅姜維為大將軍後主延熙十九年整勒戎馬與鎮西大將軍胡濟期㑹上邽濟失誓不至故維為魏大將鄧艾所破於叚谷星散流離死者甚衆衆庶繇是怨讟而自隴以西亦騷動不寧維謝過引負求自貶削為後將軍行大將軍事吳孫綝輔政遷大將軍魏諸葛誕舉壽春叛保城請降吳遣文欽唐咨全端全懌等帥三萬人救之魏鎮南將軍王基圍誕欽等突圍入城魏悉中外軍二十餘萬増誕之圍朱異帥三萬人屯安豐城為文欽勢魏兖州刺史州泰拒異於陽淵異敗退為泰所追死傷二千人綝於是大發卒出屯鑊里復遣異率將軍丁奉黎斐等五萬人攻魏留輜重於都陸異屯黎漿遣將軍任度張震等募勇敢六千人於屯西六里為浮橋夜渡築偃月壘為魏監軍石苞及州泰所破軍却退就髙異復作車箱圍趣五木城苞泰攻異異敗歸而魏太山太守胡烈以奇兵五千詭道襲都陸盡焚異資糧綝授兵三萬人使異死戰異不從綝斬之於鑊里而遣弟恩救㑹誕敗引還綝既不能拔出誕而喪敗士衆自戮名將莫不怨之劉俊為交州刺史後主寶鼎三年遣俊及前部督修則等入擊交阯為晉將毛景等所破皆死兵散還合浦張悌為丞相軍師後主天紀末悌與䕶軍孫震丹陽太守沈瑩禦晉軍降成陽都尉張喬濟江與晉討吳䕶軍張翰揚州刺史周浚成陣相對沈瑩領丹陽銳卒刁楯五千號曰青巾兵前後屢䧟堅陣於是以馳淮南軍三衝不動退引亂晉薛勝蔣班因其亂而乘之吳軍以次瓦解將帥不能止張喬又出其後大敗吳軍於版橋獲悌震瑩等册府元龜卷四百四十一
