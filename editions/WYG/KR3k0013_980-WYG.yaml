body:
  text: 冊府元龜卷九百八十宋王欽若等撰外臣部通好夫服逺以徳先王之盛猷和戎為利昔賢之嘉論蓋所以屈已含垢繼好息民偃戢兵威道迎善氣自古之所尚矣故易曰古之聰明睿智神武而不殺者蓋言聖人服萬物而不以威刑也自春秋之後司籍所記或列於盛㑹或通乎信使申以金幣之錫加之冠帶之寵或褒以爵秩或重其報宴接以殊禮式表乎綏懐待以誠心用期於純固繇是邊鄙不聳師徒不勤荒裔清寧表裏悦穆蓋躋民於仁壽之域而馴致乎太平之業者未始不繇斯也已魯宣公八年春白狄及晉平十年晉卻成子求成於衆狄衆狄疾赤狄之役遂伏於晉赤狄路氏最强故服役衆狄秋㑹於攅函衆狄服也襄公四年無終子嘉父使孟樂如晉無終山戎國名樂其衆臣因魏莊子納虎豹之皮以請和諸戎欲戎與晉和莊子魏絳晉侯曰戎狄無親而貪不如伐之魏絳曰諸侯親服陳新來和將觀於我我徳則睦否則攜貳勞師於戎而楚伐陳必弗能救是棄陳也諸華必叛諸華中國戎禽獸也獲戎失華無乃不可乎公曰然則莫若和戎乎對曰和戎有五利焉戎狄薦居貴貨易士薦聚也易猶輕也士可賈焉一也邊鄙不聳民狎其野穡人成功二也聳懼狎習也戎狄事晉四鄰振動諸侯威懐三也以徳綏戎師徒不勤甲兵不頓四也頓壊也鑒於后羿而用徳度以后羿為鑒戒逺至邇安五也君其圖之公説使魏絳盟諸戎脩民事田以時傳言晉使能用善謀漢文帝時匈奴單于遺漢書云北州以定願寢兵休士養馬以安邊民使少者得成其長老者得安其處故使郎中係虖淺奉書請皇帝即不欲匈奴近塞則且詔吏民逺舍舍居止也武帝時匈奴謀歸漢使不降者蘇武馬宏等馬宏者前副光禄大夫王忠使西國為匈奴所遮忠戰死馬宏生得亦不肯降故匈奴歸此二人欲以通善意和帝時南單于於漢北遺竇憲古鼎容五斗其傍銘曰仲山甫鼎其萬年子子孫孫永保用憲乃止之前秦苻堅時匈奴左賢王衞辰遣使降於堅遂請田内地堅許之雲中䕶軍賈雍遣其司馬徐斌率騎襲之因縱兵掠奪堅怒曰朕方脩魏絳和戎之術不可以小利忘大信昔荆吳之戰事興蠶婦澆𤓰之惠梁宋息兵夫怨不在大事不在小擾邊動衆非國之利也所獲資産其悉以歸之免雍官以白衣領䕶軍遣使脩和示之信義辰於是入居塞内貢獻相尋西秦吐谷渾視連既立通聘於乞伏乾歸拜為白蘭王宋高祖西伐長安索虜嗣先取姚興女乃遣十萬騎屯結河北救之大為帝所破於是遣使求和自是使命嵗通齊武帝永明中扶南國王臣僑陳如闍耶跋摩遣使上啓曰天化撫育感動靈祗四氣調適伏願聖主尊體起居康御皇太子萬福六宫清休諸王妃主内外朝臣普同和睦鄰境士庶萬國歸心五穀豐熟災害不生士清民泰一切安穏臣及人民國土豐樂四氣調和道俗濟濟並蒙陛下光化所被咸荷安泰後魏太武太平真君五年三月遣使者四輩使西域太延元年五月遣使者二十輩使西域二年六月又遣使六輩使西域西魏文帝大統十六年大軍東討齊師恐蠕蠕乗虛冦掠乃遣帳内都督楊薦往諭和好以安慰之北齊神武以魏孝靖興和三年五月使使與蠕蠕通和後周太祖西魏大統十一年突厥土門部落稍盛願通中國帝遣酒泉胡安諾槃陁使焉其國皆相慶曰今大國使至我國將興也武帝建徳元年二月遣大將軍昌城公孫深使於突厥隋文帝開皇八年突厥處羅侯死遣長孫晟往弔仍齎陳國所獻寶器以賜雍閭十一年三月壬午遣通事舍人若干洽使於吐谷渾十八年百濟王昌使其長史辯那來獻方物屬興遼東之役遣使奉請為軍導帝不許詔曰往嵗為高麗不供職貢無人臣禮故命將討之高元君臣恐懼畏服歸罪朕已赦之不可致伐厚其使而遣之是年突厥啓民可汗為達頭所攻帝令發兵助啓民伐之啓民上表陳謝曰大隋聖人莫緣可汗憐養百姓如天無不覆也如地無不載也諸姓蒙威恩赤心歸服並將部落歸投聖人可汗來也或南入長城或往白道人民羊馬徧滿山谷染干譬如枯木重起枝葉枯骨重生皮肉千萬世長與大隋典羊馬也煬帝大業三年三月遣羽騎尉朱寛使於琉球國是年啓民可汗上表乞依大國服飾帝下其議公卿請依所奏帝以為不可乃下詔曰先王建國夷夏殊風君子教民不求變俗㫁髮文身咸安其性旃裘卉服各尚所宜因而利之其道𢎞矣何必化諸削衽縻以長纓豈遂性之至理非包荒之逺度衣服不同既辨要荒之叙庶類區別彌見天地之情仍璽書答啓民以為磧北未靜猶須征戰但使存心孝順何必改變衣服也唐高祖武徳四年定襄王李大恩敗突厥頡利於鴈門先是漢陽公蘓瓌太常卿鄭元璹左驍衞大將軍長孫順徳等各使於突厥頡利並拘之我亦留其使人前後數輩至是為大恩所挫於是大懼乃放順徳還更請和好獻魚膠數十斤欲令二國同於此膠帝嘉之放其使者特勒熱寒阿史徳等還蕃賜以金帛七年八月壬申頡利可汗遣其從叔畢特勒阿史那思摩來朝帝引申御榻頓顙固辭帝謂之曰頡利誠心遣特勒朝拜今見特勒如見頡利引之就坐因伏而言可汗稱陛下馭中原突厥據漠北各一方何敢相犯但為漢人不交搆也今見秦王即為要契請子子孫孫永為蕃附是月丁酉遣尚書左僕射裴寂使於突厥八年七月壬戌吐谷渾遣使請和九年辛巳突厥頡利率十萬餘騎突武功京師戒嚴進冦高陵太宗與侍中高士廉中書令房𤣥齡將軍周範馳六騎幸渭水之上與頡利隔津而語責以負約其首帥皆下馬羅拜頡利請和詔許焉幸城西刑白馬與頡利同盟於便橋之上太宗貞觀十六年夏四月薛延陁以前擾漢南遣使謝罪二十一年十二月乙亥高麗使第二子莫離支高任武朝賀因謝罪帝許納之高宗儀鳯四年二月吐蕃賛普卒遣使齎璽書往弔之𤣥宗開元元年十二月吐蕃遣其大臣來求和丁酉命有司引吐蕃使宴於三殿六年春正月辛丑北夷請和乃降璽書曰突厥煞省表具知往者黙啜狂逆為人之蠧又詐降遣使於我求婚我國家不違賞賜無數所在軍鎮為之解嚴遂背信乗虚縱凶深犯損我百姓陷我數州從此之後常行賊計近者梟戮實謂天誅卿能舉前事之非有降和之請但能誠實何慮不依且漢日有呼韓邪是卿族類既率部落來慕中華終保寵榮足為前鑒今契丹奚等輸欵入朝皆封郡王各賜公主放歸所部以息其人卿若能來此是成例官榮重功則授財帛賞善斯行此乃國家所餘亦是卿之所要若懐姦設變口順心違應朝不朝以惡繼惡還學黙啜自取殘亡想卿解思不至於此也七年六月吐蕃遣使請和求皇帝親署誓文帝以為昔嵗和親已有成約而今何乃重請盟書但信必繇衷聿尋前化足矣不許大享使因賜其束帛用修前好以雜綵二千段賜賛普五百段賜賛普祖母四百段賜賛普母二百段賜可敦一百五十段賜坌達廷一百三十段賜論乞力徐一百段賜尚賛咄及大將軍大首領各有差皇后亦以一千段賜賛普五百段賜賛普母二百段賜可敦九年二月丙戌突厥遣使來朝獻方物且通和好帝降璽書謂曰國家舊與突厥和好之時蕃漢非常快活甲兵休息互市交通國家買突厥馬羊突厥將國家綵帛彼此豐足皆有便宜自三四十年已來不似舊時法用總縁黙啜可汗失信遂令使命不通一口稱和一心即背每將兵馬常抄邊軍天嗔地知人怨神怒身被誅滅豈不繇兹今可汗承破亡之遺餘驗違負之得失禍福斯在吉凶可見計合早相依附如何久事遲迴仍襲甘涼復行抄刼初聞為惡不能無怪賴自遣使至此通和國家如海之容如天之覆不念既往之過以納將來之誠可汗若實好心求為和好計彼此百姓各得自安斟酌一生更亦何慮若言無准定意有翻覆還似往日可汗又違今時明信不煩更差使命徒令再遣往來至於邊疆之任侵掠自當更擬宜審思之十年五月戊午突厥遣大首領阿史徳􅀈泥熟來和授右驍衞大將軍員外置放還蕃十二年五月新羅賀正使金武勲還蕃帝降書謂新羅王金興光曰卿再承正朔朝貢闕庭言念所懐深可嘉尚又得所進雜物等並踰越滄波跋涉草莽物既精麗深表卿心今賜卿錦袍金帶及綵素共二千疋以答來獻至宜領之二十一年正月命工部尚書李暠使於吐蕃制曰繼好之義雖屬邊鄙受命以出必在親賢事欲重於當時禮故崇於殊俗選衆之譽無出宗英工部尚書李暠體合柔嘉識致明允為公族之領袖是朝廷之羽儀今金城公主既在蕃中漢廷公卿非無専對有懐於逺夫豈能忘宜持節充入蕃使所司准式發遣以國信物一萬疋私覿二千疋皆雜以五綵遣之二十三年三月命内使竇元禮使於吐蕃使悉諾勃藏還蕃命通事舍人楊紹賢往赤嶺以宣慰焉二十四年八月甲寅突厥騎施遣大首領胡禄達干來求和許之宴於内殿授左金吾將軍員外置賜錦衣一副帛及綵一百疋放還蕃二十六年八月命中官魏泰使於突厥騎施降書謂突厥騎施可汗曰朕與可汗結為父子恩義所感骨肉何殊可汗乃信彼小子自生疑阻前後使往非不具論自爾已來當所迷也使至省表以變其節過而能改善莫大焉既効忠誠深可嘉尚朕本意相待如初父子之間更敦前好凡為君須守信義不信則身危若外飾甘言内藏姦計未能有損終必自傷想可汗通明固不至於此巧言似實深宜察也若忠信不易更復何憂千秋萬嵗俱享多福故令中使専達少信悉朕意焉肅宗上元元年正月吐蕃遣其大臣論吐蕃彌來請和且請與吐谷渾復脩隣好元年建寅月甲辰吐蕃遣使來朝請和勑宰相郭子儀蕭華裴遵慶等於中書宴設代宗寶應四年二月兼御史大夫李之芳使於吐蕃兼御史中丞崔倫為之副通舊好也永泰元年正月以四鎮行營節度使馬璘為南道和蕃使三月吐蕃請和遣宰相元載杜鴻漸等於興唐寺與之盟而罷三年三月命大理少卿楊濟兼御史中丞使於吐蕃脩舊好也九月楊濟自吐蕃使還吐蕃遣其首領論位藏等百餘人隨濟來朝謝申好也十月乙酉引吐蕃使見於宣政殿丙申命宰相宴吐蕃使論位藏於中書天厯二年二月遣檢校戸部尚書兼御史大夫薛景西使於吐蕃脩舊好也三年七月命左散騎常侍蕭昕兼御史大夫持節充弔祭囘紇可敦使徳宗以大厯十四年五月即位八月命太常少卿韋倫持節使吐蕃統蕃俘五百人歸之建中元年四月太常少卿韋倫至自吐蕃自大厯中吐蕃聘使前後數輩皆留之不遣俘獲其人必遣中官部統徙之江嶺因緣求財及給養之費不勝其弊去年冬吐蕃大興師以三道來侵一自靈武一自山南一自蜀約蹤齊舉㑹帝初即位以徳綏四方徵其俘囚五百餘人各給衣一襲使倫統還其國與之約和勑邊將無得侵伐吐蕃始聞歸其人不之信及蕃俘入境部落皆畏威懐惠其賛普乞立賛謂倫曰不知是來也而有三恨奈何倫曰未達所云乞立賛曰不知大國之喪而弔不及哀一也不知山陵之期而賻不成禮二也不知皇帝舅聖明繼立已發衆軍三道連衡今靈武之師聞命輒囘矣而山南之師已入扶文蜀師已趨灌口追且不及是三恨也及發使奉贄不二旬而復命蜀帥上所獲戎俘有司請准舊事頒為徒𨽻帝曰要約著矣言庸二乎乃各給縑二疋衣一襲而歸之五月以韋倫為太常卿復使吐蕃十二月倫至自吐蕃與其宰相欽論明思等五十五人皆至獻其方物初吐蕃見倫再至甚歡既就舘聲樂以娛之留九日而旋兼遣其渠帥報命倫一嵗再往復絶域戎夷奉教無此之速者也二年二月以萬年令崔漢衡為殿中少監持節使西戎初吐蕃遣使求沙門之善講者至是遣僧良琇文素二人行二嵗一更之十二月入蕃使判官監察御史常魯與吐蕃使論悉諾羅等至自蕃中初魯與其使崔漢衡至列舘賛普令止之先命取國信勑書既而使謂漢衡曰來勑云所貢獻物普領訖今賜外甥少信物至領取我大蕃與唐舅甥國耳何得以臣禮見處又所欲定界雲州之西請以賀蘭山為界其盟約請依景龍二年勑書云唐使到彼外甥先與盟誓蕃使到此阿舅亦親與盟乃邀漢衡遣使奏定魯使還奏帝為改勑書以貢獻為進以賜為寄以領取為領之且謂曰前相楊炎不循故事致此悮耳其定界盟約並從之三年九月和蕃使殿中少監兼御史中丞崔漢衡與吐蕃使區頰賛至自蕃中時吐蕃大相尚結息忍而好殺以嘗覆敗於劍南思刷其恥不肯約和其次相尚結賛有材畧因言於賛普請定界明約以息邊人賛普然之竟以結賛代結息為大相約終和好期以十月十五日㑹盟於境上四年二月以鴻臚卿崔漢衡兼御史大夫持節答蕃使送區頰賛等歸蕃六月答蕃使判官監察御史于頔與吐蕃使論頰没藏等至自青海興元元年二月以御史大夫于頎為右散騎常侍尋加兼御史大夫往涇州已來宣慰吐蕃仍與州府計㑹頓逓時吐蕃欵塞請以兵助平國難故遣使焉八月甲子以右武衞將軍周皓為太僕卿兼御史大夫宣慰迴紇使貞元二年二月辛未以水部員外郎趙聿為倉部郎中兼侍御史入吐蕃使九月丁未詔遣左監門將軍康成使於吐蕃初吐蕃大相尚結賛累遣使請盟㑹定界乃命成使之至上砦原與結賛相見結賛令其使論乞陁與成同來甲寅以左千牛大將軍裴謂為吏部侍郎充入蕃使俄以吐蕃退遂不行其年冬吐蕃入冦陷鹽夏二州詔加河東節度使馬燧綏鞍麟勝招討使燧乃將兵次石州時吐蕃深入人馬疾疫渠帥論頰熱因退貞元三年正月燧引軍還太原三年二月以前太子右諭徳崔澣為檢校左庶子兼御史中丞充入吐蕃使三月丁酉以左庶子李銛充入吐蕃使五年七月以殿中監嗣滕王湛然為太子賔客迴鶻使如故六年春迴鶻忠貞可汗為其弟所殺而簒立國人殺簒者立忠貞之子為可汗乃遣達比特勒梅録將軍告忠貞可汗之哀於我且請冊新君也十三年二月劔南西川節度使韋臯奏南詔前年於巂州築得城一所今請據舊境歸還已受領訖十九年五月吐蕃使論頰熱等至其年以右龍武將軍薛伾兼御史大夫使於吐蕃二十年五月以祕書監史館修撰張薦為工部侍郎兼御史大夫依前史館修撰持節弔贈吐蕃以左金吾衞將軍薛徑為檢校工部尚書兼右金吾將軍兼御史大夫持節和吐蕃憲宗永貞元年十一月以通王府長史孫果為鴻臚少卿兼御史中丞持節充冊立囘紇使其月以衞尉少卿侯幼平兼御史中丞充入吐蕃告冊立等使元和四年正月命中官元文政往渤海充弔祭冊立使七月吐蕃遣使來和好五年五月吐蕃遣使論思頰熱來朝并歸鄭叔矩路泌之柩及叔矩男武延等一十三人叔矩㑹盟使崔漢衡之從事泌渾瑊之從事貞元初吐蕃背盟所陷凡二十餘年竟不屈節因殁於蕃中至是請和故歸其柩六月宰相與吐蕃使語中書令㕔蕃使拜階下宰相階還半禮七月以陜州大都督府左司馬兼通事舍人李銛為鴻臚少卿攝御史中丞持節充入吐蕃使仍賜紫金魚袋太子中舍人吳暈為丹王府長史兼侍御史為之副七年正月癸未以鴻臚卿張茂宣充入囘鶻使通事舍人張賈副焉二月吐蕃東道節度論誥都宰相尚綺心兒以書遺鳯翔節度使李惟蘭惟蘭奏獻之三月命宰相於中書與吐蕃使議事七月以京兆府功曹李汭為殿中侍御史充入新羅副使八年正月命内侍李重旻充渤海冊立宣慰使十一月黔中奏昆明夷請歸其先侵牂牁之地十一年二月授渤海使國信以歸五月命中使二人送囘鶻使歸國十一月以宗正卿李誠兼御史中丞充入囘鶻使十二年四月吐蕃以賛普卒來告己未以右衞將軍烏重玘兼御史中丞充弔贈吐蕃賛普使五月癸亥以右補闕段均為殿中侍御史充弔贈吐蕃使十三年三月渤海國遣使李繼常等二十六人來朝十月鳯翔節度使鄭餘慶奏吐蕃遣使脩好穆宗元和十五年即位八月乙亥命宰臣召吐蕃使於中書議事十月命高品竇千乗使於吐蕃十月庚午朔以太子中允張賈為太府少卿攝御史中丞持節充入吐蕃答請和好使庚辰命宰臣留吐蕃使於中書議事以郯王府長史邵同為太府少卿兼御史中丞持節入吐蕃充答請和好使十二月以左散騎常侍崔元畧充黨項宣撫使丁丑改命太子中允李寮兼侍御史充党項宣撫副使長慶元年十二月豐州刺史李祜奏先入囘鶻使裴通高品袁有直并囘鶻六十四人到鸊鵜泉二年二月癸酉吐蕃遣使十五人來請定界甲戌召對於麟徳殿賜有差八月鳯翔送落蕃人宇文律等一百八十人詔付京兆府詳勘尋令親族識認任其歸還十月辛酉以太子僕杜載為太僕少卿兼御史中丞持節充答吐蕃謝㑹盟禮畢使仍賜服金紫敬宗初即位雞林人前右監門衞率府兵曹參軍金雲卿進狀請充入本國宣慰副使從之寶厯元年三月以前蘄州刺史于人文為司門郎中攝御史中丞持節入迴鶻充弔祭冊立使仍賜紫金魚袋以右賛善大夫裴常守本官兼侍御史為之副四月以前江南西道觀察推官試大理評事陳璟夫守河南府雒陽縣丞兼監察御史充入迴鶻弔祭冊立使判官仍賜緋魚袋十月以岳王傅成杭為右庶子兼御史中丞充入吐蕃答賀正使仍賜紫金魚袋以太常博士劉幼復為殿中侍御史為之副仍賜緋魚袋以前萬年縣丞韓澥為大理丞兼殿中侍御史入吐蕃答賀正使判官仍賜緋魚袋二年二月鳯翔節度使進到落蕃囘鶻四人勑㫖令付鴻臚寺待有還蕃使即放歸國十月靈武節度使奏收得吐蕃石金山等四人詔委本道節度使差人送付本界遊奕吐蕃取領聞奏仍優賞發遣文宗太和二年十二月以前棣州刺史唐𢎞實為莒王傅兼御史大夫持節充入吐蕃答賀正使三年十二月庚寅西川監軍判官張士謙奏南蠻宣尉囘得蠻人事物金盞銀水瓶等並進首領王􅀢巔狀一封云被杜元穎欺擾蕃界又云南蠻續自羌専使奏事乙亥郭釗又奏蒙􅀢巔差使送書信共四角以聞又奏追還三百餘里五年五月劔南西川節度使李徳裕奏南蠻放還先虜掠百姓工巧僧道約四十人到本道十一月入吐蕃使宗正少卿李從易至蕃中六年十一月以少府少監田早守本官兼御史中丞持節充入吐蕃答賀正使仍賜紫金魚袋七年夏四月九姓囘鶻可汗薨以左驍衞將軍皇城留守唐𢎞實為右金吾衞將軍兼御史大夫持節充入回鶻弔祭冊立使八年春正月庚申鳯翔節度使李聽進吐蕃賛普賀正表函九年五月辛酉入朝迴紇進太和公主所獻馬射女子七人沙陁小兒二人十一月以宗正少卿李從簡守本官兼御史中丞持節充入吐蕃答賀正使仍賜紫金魚袋開成元年十二月以太子少詹事李景儒兼御史中丞充入吐蕃答賀正使二年十一月天徳奏吐蕃東北道元帥論夷加羌使信物乃木夾到本道以其書信上聞三年秋七月新羅王金祐徴遺淄青節度使奴婢帝矜以逺人詔令却歸本國四年三月以太子詹事李景儒為入吐蕃使武宗㑹昌二年十一月吐蕃賛普卒遣使論普熱入朝告哀遣將作少監李景入蕃弔祭三年八月黠戛斯遣使諦徳伊斯難珠來朝九月與黠戛斯勑書曰皇帝敬聞黠戛斯可汗將軍諦徳伊斯難珠至覽書并白馬二疋具悉可汗降精斗極雄朔漠以為君稟耀旄頭分天街而建國特負英豪之氣夙推驍馭之才眷想嘉猷載深寤歎來書云温仲令將軍歸國後漢使不來温仵合去日朕書具云速遣報章此當遣重臣冊命自是可汗未諭此意報答稍遲來信又云道路隔絶蓋為山川悠逺未得與可汗封壤接連非是兩國之情猶有阻隔想可汗明識無復致疑又云兩地致書彼此不㑹且書不可以盡言言不可以盡意況蕃漢文字傳譯不同祗在共推赤心永保盟好豈必緣飾詞語以此交歡想每欲思惟先相好意不更疑惑便是明誠又云欲除兩楹間惡刺如此之事最為嘉言緣迴鶻據雄北方為一代君長諸蕃臣伏百有餘年今可汗掃除穹居大雪讐恥功業既高於前古威聲已振于北荒固當深務逺圖豈可更留餘孽黑車子不度徳量力敢保冦讐則是侮可汗獨力向化此而可忍孰不可容況可汗前來訪送公主云上天入地必須覔得今若捨而不問何以取信朕懐想可汗乗彼盛秋長驅精騎問囘鶻逋逃之罪行黑車子後服之誅取若拾遺役無再舉從兹盪定豈不美歟來書又云送公主到彼無一語來緣公主纔離可汗五日便被囘紇刼奪所遣來使盡被殺傷公主二年之中流離沙漠事已隔逺所以不再叙言然趙蕃去日已具感悅之心足表殷勤之意又聞今秋欲移往囘紇牙帳滅其大國便保舊居足使諸蕃威畏迴鶻絶望稍近漢境頗謂良圖所云請發遣兵馬期集公處緣黒車子猶去漢界一千餘里在沙漠之中從前漢兵未嘗到彼比聞囘鶻深意嘗欲投竄安西待至今秋朕當令幽州太原振武天徳縁邊四鎮要路出兵料可汗攻討之時迴紇必當潛遁各令邀截便可梟擒此是軍期須如符契想可汗必全大信用叶一心諦徳伊斯難珠朕已於前殿面對兼賜宴樂並依來表更不滯留朕續遣重臣便申冊命故先達此㫖令彼國明知冊命之禮並依迴紇故事可汗爰始立國臨長諸蕃須示隣壤情深宗盟義重以此鎮撫誰敢不從宜體至懐共宏逺畧春暖想可汗休泰將相以下並存問之黠戛斯者亦名紇吃斯本前代堅昆國在囘紇西北自稱李陵之後初破囘紇國之時得太和公主以天家貴種又與國同姓令達干十人送公主至塞上中路為烏介可汗所得盡殺黠戛斯使人乃質公主同行及黠戛斯上表問公主所在及所遣使者十人帝顧問宰臣議者奏以黠戛斯是囘紇深讐今烏介可汗尚須與通和令自將兵馬求殺使者罪人兼討黒車子容納可汗之罪帝心末決以囘紇故事自平禄山之後嵗賜絹三萬疋以為定制又黠戛斯有可汗之名慮不脩臣禮宰臣又奏云今黠戛斯與囘紇故事不同未有大功安敢邀利如肯同囘紇稱臣即加冊命不爾便停無傷國體兼許為宗盟可以尊卑諭之令展子孫之禮帝意乃定故降此書僖宗乾符二年南蠻騎信遣使乞盟許之梁太祖乾化元年鄜州以囘紇可汗所與書來上制以左監門衞上將軍楊沼為右驍衞上將軍押領迴紇等還蕃又河中奏迴紇宣慰諭使楊沼押領二蕃酋長一百二十人歸本國後唐武皇天祐四年契丹阿保機大冦雲中武皇遣使連和因與之面㑹於雲州東城大具享禮延入帳中約為兄弟謂之曰唐室為賊所簒吾欲今冬大舉弟可以精騎二萬同收汴雒保機許之賜予甚厚留馬三千匹以答貺左右咸勸武皇可乗間虜之武皇曰逆賊未殄不可失信於夷狄自亡之道也乃盡禮遣之莊宗同光初滄州奏偵間契丹國舅撒剌宴送羊馬於幽州申和好二年八月幽州進契丹國舅撒剌宴書三年七月丁巳靈武奏恩賜迴紇王勑書降已送甘州四年正月幽州李紹斌奏契丹阿保機與臣貂裘一生吐蕃谷渾杜每兒爰生李紹威遣梅老茹真貢馬明宗初簒嗣遣供奉官姚坤空函告哀至契丹西樓屬阿保機在渤海又徑至慎州崎嶇萬里既至謁見保機延入穹廬保機身長九尺被錦袍大帶垂後與妻對榻引見坤坤未致命保機先問曰聞爾漢江河南河北各有一天子信乎坤曰河南天子今年四月一日雒城軍變今凶問至矣河北總管令公比為魏州軍亂先帝詔令除討既聞内難衆軍離心及京城無主上下堅冊令公請主社稷今已順人望登帝位矣保機曰漢國兒與我雖父子亦曽彼此讐掣俱有惡心與爾今天子彼此無惡足得歡好爾先復命我續將馬二萬騎至幽鎮已來與爾家天子面為盟約我要幽州令漢兒把捉更不復侵汝漢界天成初阿保機死其母令次子徳光權主牙帳明年徳光遣其使梅老等三千餘人來脩好又遣使為父求碑石帝許之賜予甚厚并賜其母纓絡錦綵自是山北安靜蕃漢不相侵擾天成元年九月幽州趙徳均奏先羌軍將陳繼威使契丹部内今使還得狀稱今年七月二十日至渤海界扶餘府契丹族帳在府城東南隅繼威既至求見不通竊問漢兒言契丹主阿保機已得疾其月二十七日阿保機身死八月三日隨阿保機靈柩發離扶餘城十三日至烏州契丹主妻始受却當府所持書信二十七日至龍州契丹主妻令繼威歸本道仍遣撩括梅老押馬三匹充答信同來繼威見契丹部族商量來年正月葬阿保機於木葉山下兼差近位阿思没骨餒持信與先入蕃天使供奉官姚坤同來赴闕告哀兼聞契丹部内取此月十九日一齊舉哀朝廷及當府前後所差人使繼威來時見處分候到西樓日即並放歸十月辛丑契丹告哀使没骨餒見言契丹國主阿保機今年七月二十七日薨勑曰朕以近纉皇圖恭脩帝道務安夷夏貴洽雍熙契丹王世豫歡盟禮交聘問遽聞凶訃倍軫悲懐可輟今月十九日朝參二年四月奏黎州狀雲南使趙和於大渡河南起舍一間留信物十五籠并雜牋詩一卷遞至闕下初郭崇韜平蜀之後得王衍昔獲蠻俘數十以天子命令殿直李楷持國信賜其國王并歸其俘囚楷入其部為止於界上惟國信與蠻俘得往月餘乏食而還續有轉牒稱督爽大長和國宰相布燮等上大唐皇帝舅奏疏一封自鶴枯發遞厯機美白崖爽等又入弄梗演習白鸚鵡郡繕裔爽等又入平夷新安寧逺標莎差人轉送黎州其紙厚硬若皮筆力遒健有書詔體後有督爽陁酋忍爽王寶督爽彌勤忍爽董徳義督爽長坦綽爽楊布爽等所署有綵牋一軸轉韻詩三章章三韻共十聯有類擊筑詞時有思本朝姻親之意理亦不遜其禇中之物即却返其國信舊封猶存復命左衞上將軍烏昭遇等再往使焉至西川知李楷又不能進遂迴十一月契丹使梅老等三十餘人見傳本主願和好之意帝謂侍臣曰俱保邊鄙以安疲民朕豈辭降志耶彼既求和足得懐柔矣三年正月己酉契丹主阿保機妻差使送前振武副使劉在金到行闕賜在金錢帛銀器金帶鋪陳氊褥甚厚長興元年五月青州奏所與高乞國勑書鈿函已付本國知後宫七月振武張方進呈納契苾木書二封二年五月癸亥青州上言有百姓過海北樵採附得東丹王堂兄京尹汚整書問慕華行止欲修貢也閏五月青州進呈東丹國首領耶律羽之書二封七月乙未兖州奏宻州淮口准勑放過往來商客一千八十八人十二月丙辰幽州奏契丹乞通和好三年正月庚子契丹遣使拽骨等來朝五月己亥契丹朝貢使迭羅卿辭歸蕃迭羅卿來求歸萴刺帝初欲遣之大臣爭之未決㑹幽州趙徳均狀奏及楊檀皆言其不可遣帝意方解仍曰鮮卑脩好朕意在息邊悉所共求但不遣敵即有詞其前骨舍利朕欲放還冀不全阻其請執政不敢復爭乃遣從北使歸蕃十一月乙巳雲州節度使張敬達奏探得契丹主在黒榆林南撩刺泊率蕃族三百帳見製造攻城之具云蕃界無草欲借漢界水草詔親直指揮使張萬全供奉官周務謙齎書國信雜綵五百疋銀器二百兩往賜契丹主四年五月丙戌契丹國使述骨卿三十四人入朝其年契丹耶律徳光以兄東丹王突欲在闕下其母繼發使申欵朝廷亦優容之賜突欲姓李氏名賛華出鎮滑州以莊宗夫人夏氏嫁之愍帝應順元年正月乙亥契丹遣都督没辣干來朝獻馬四百駝十羊二千先是遣供奉官西方璟入契丹復命故有是獻末帝清泰三年八月戊午契丹遣使梅里來朝其年契丹遣使銀折梅里入朝晉高祖即位於晉陽改號天福元年車駕將入雒閏十一月甲戌契丹主舉酒言於帝曰余逺來赴義大事已成皇帝頃赴京都今已令大相温勒兵相送至於河梁要過河者即多少任意余亦且在此州俟京雒已定便當北轅執手相泣久不能别脫白貂裘以衣帝贈馬二十匹戰馬一千二百匹仍誡曰子子孫孫各無相忘焉二年二月契丹太子解里舍利梅老等到闕見四月契丹宫苑使李可與到闕見三年八月戊寅以左僕射劉昫為契丹冊禮使左散騎常侍韋動為副使給事中盧重冊契丹太后使贈賜帛器皿有差九月庚申契丹使􅎤􅎤廷信押按各馬往雒京般取後唐公主丙寅趙延壽進馬二匹謝恩放燕國長公主歸幽州十一月契丹遣梅里齎書到闕賀范延光歸明其月戊寅契丹命使以寶冊上帝徽號曰英武明義左右金吾六軍儀仗兵部法物太常鼓吹殿中省􅏛扇等並出城迎引至崇元殿前陳列帝受徽號畢御殿受百官賀四年十月契丹使近臣崔廷勲領兵交戍於雲丘之北帝遣中官李威以吳赴上酹遣而勞之十一月戊子契丹遣遥折來使因聘吳越五年四月甲子契丹使興化王來聘十一月契丹使舍利來聘致馬百匹及玉鞍狐裘等其年迴紇可汗仁美遣使貢良馬白玉謝冊命也六年四月己未契丹使述括來聘七月壬戌涇州奏西涼府留後李文謙今年二月四日閉宅門自焚遣元入西涼府譯語官楊行實與來人齎三部族蕃書進之八月蕃通事康王六自契丹迴復遣使焉六年九月遣供奉官李延業以時果送於契丹十一月契丹遣使楊通事與供奉官李仁廓同到闕見七年春正月庚午契丹遣使達剌已下三十六人來聘三月乙夘朔契丹通事高模翰來聘閏三月遣殿直馬延理内班王延斌送櫻桃於契丹六月辛酉契丹遣達剌于來聘癸亥遣殿直張延杲使於契丹少帝以天福七年六月乙丑即位八月宣喚契丹王母使舍利共一十二人宴於崇徳殿八年漢高祖時為太原節度使奏以太原往例每年差人押送葡萄往契丹今年伏候勑㫖有詔罷之高祖曰此土産常物廢而不行必啓戎心以生怨也周太祖廣順元年二月丁未左千牛衞將軍朱憲使於契丹復命契丹主充欲復遣使䮍骨支伴送朱憲歸京師又賀我登極兼獻良馬一駟仍達蕃情云兩地通歡近因晉祖議和好之理為逺大之謀五月己巳遣左金吾將軍姚漢英右神武將軍華光裔使於契丹辭各賜襲衣銀帶絹綵三百疋銀器五十兩契丹入朝使大御賜重錦五疋衣著三百疋銀器百兩别賜衣著五十疋馬價衣著一百五十疋副使賜有差曳刺五人各賜中錦一疋衣著五十疋仍遣供奉官李誦押援兵防送至樂壽八月契丹遣幽州教練使曹繼筠䕶送宰相趙瑩喪柩至其家先是開運末虜陷京城瑩與馮玉李彦韜俱遷於北塞未㡬卒至是方歸喪柩二年正月涇州史光懿言囘紇可汗遣悉里來等四人到州迎接進奉囘使十月沙州僧興齎表辭囘紇阻隔囘紇世世以中國主為舅朝廷亦以甥呼之沙州陷蕃後有張氏世為州將後唐同光中長史曹義金者遣使朝貢靈武韓洙保薦之乃授沙州刺史充歸義軍節度使𤓰沙等州處置使其後久無貢奉至是遣僧辭其事其月淮南送高麗使陳參等到闕見勑有司賜酒食衣服冊府元龜卷九百八十
