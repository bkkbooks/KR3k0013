body:
  text: 册府元龜卷三百五十一宋王欽若等撰將帥部立功第四宋檀祗晉末為振武將軍𨽻振武大將軍劉道規追討桓𤣥每戰克捷江陵平定道規遣祗征溳沔亡命桓道兒張靖苻嗣等皆悉平之除龍驤將軍又破桓亮於長沙苻宏於湘東加寧朔將軍劉敬宣晉末為輔國將軍晉陵太守元興中桓歆率氐賊楊秋冦歴陽敬宣與建威將軍諸葛長民大破歆於芍陂歆單騎走渡淮斬楊秋於練固而還又擊桓亮苻宏於湘中所在有功傅𢎞之晉末為桂陽公劉義眞西戎司馬寧朔將軍時畧陽太守徐師髙反叛𢎞之討平之赫連勃勃偽太子瓌率衆三萬襲長安𢎞之又領騎五千於池陽大破之殺傷甚衆瓌又抄掠渭南𢎞之又於寡婦渡破瓌獲賊三百掠七千餘口蒯恩晉末以寧逺將軍領幢隨振武將軍劉道規西討虜桓仙客克偃月壘遂平江陵後從髙祖伐廣固又有戰功盧循逼京邑恩戰于查浦賊退走與王仲徳等追破循别將范宗民於南陵循既走還廣州恩又領千餘人隨劉藩追徐道覆於始興斬之遷龍驤將軍蘭陵太守孫季髙晉末為振武將軍盧循之難於石頭扦栅戍越城查浦破賊於新亭髙祖遣季髙率衆三千汎海襲畨禺初賊不以海道為防季髙至東衝去城千餘里城内猶未知循守戰士猶有數千城池甚固季髙先焚舟艦悉力登岸㑹天大霧四面陵城即日克拔循父擬長史孫建之司馬虞尫夫等輕舟奔始興即分遣振武將軍沈田子等討平始興南康臨賀始安嶺表諸郡循於左里奔走而衆力猶盛自嶺道還襲廣州季髙拒戰二十餘日循乃破走所殺萬餘人吉翰督梁南秦二州諸軍事元嘉三年仇池氐楊興平遣使歸順并兒弟為質翰遣始平太守龎諮據武興仇池大帥楊𤣥遣弟難當率衆拒諮又遣將強鹿皮向白水諮擊破難當等餘並退走裴方明為龍驤將軍元嘉十九年氐賊楊難當冦盜不已太祖遣方明率禁兵五千討之方明至武興率太子積弩將軍劉康祖後軍參軍梁坦陳彌裴肅之安西叅軍段叔文魯尚期始興王國常侍劉僧秀綏逺將軍馬洗振武將軍王奐之等進次潭谷去臯蘭數里難當遣其建節將軍苻𢎞祖琰元等固守臯蘭鎮北將軍苻徳義於外為遊軍難當子撫軍大將軍和衆兵繼其後方明進擊大破之於濁水斬𢎞祖並三千餘級遣康祖追之過臯蘭二十餘里又遣徳義來戰康祖又大破之和退保脩城難當遣建忠將軍楊林振威將軍姚憲領二千騎就和方明又率諸將攻之和敗走追至赤亭難當席卷奔叛方明遣康祖直趣百頃偽丞相楊萬壽等一時歸降難當第三息虎先戍隂平難當既走虎逃竄民間生擒之送京都斬于建康市沈慶之為建威將軍元嘉十九年率衆助征西司馬朱脩之討雍州蠻脩之以失律下獄慶之専軍進討大破縁沔諸蠻禽生口七千人進征湖陽又獲萬餘口後為廣陵王誕北中郎將中兵叅軍雍州蠻又為冦慶之隨誕入沔既至襄陽率中兵叅軍桞元景隨郡太守宗慤振威將軍劉顒司空叅軍魯尚期安北叅軍顧彬馬文恭左軍中兵叅軍蕭景嗣前青州别駕崔目連安蠻叅軍劉雍之奮威將軍王景式等二萬餘人伐沔北諸山蠻宗慤自新安道入太洪山元景從均水據五水嶺文恭出蔡陽口取赤係塢景式繇延山下向赤圻坂目連尚期諸軍八道俱進慶之取五渠頓破塢以為衆軍節度前後伐蠻皆山下安營以迫之故蠻得據山為阻於矢石有用以是屢無功慶之乃㑹諸軍於茹丘山下謂衆曰今若縁山列斾以攻之則士馬必損去歳蠻田大稔積粟重巖未有饑弊卒難禽翦今令諸軍各率所領以營于山上出其不意諸蠻必恐恐而乘之可不戰而獲也於是諸軍並斬山開道不與蠻戰鼓譟上山衝其腹心先據險要諸蠻震擾因其懼而圍之莫不奔潰自冬至春因糧蠻榖頃之南新郡蠻帥田彦生率部曲十封六千餘人反叛攻圍郡城慶之遣元景率五千人赴之軍未至郡已被破焚燒城内倉儲及廨舎蕩盡并驅畧䧏户屯據白楊山元景追之至山下衆軍悉集圍山數重宗慤率其所領先登衆軍齊力急攻之威震諸山羣蠻皆稽顙慶之引軍自茹丘山出檢城大破諸山斬首三千級虜生蠻二萬八千餘口䧏蠻二萬五千口牛馬七百餘頭米粟九萬餘斛隨王誕築納䧏受俘二城於白楚慶之復率衆軍討幸諸山大羊蠻縁險築重城施門櫓甚峻山多木石積以為礧立部曲建旌旗樹長帥鐡馬成羣慶之連營山中開一門相通又命諸軍各穿池於營内朝夕不外汲兼以防蠻之火頃之風甚蠻夜下山人提一炬以燒營營内多幔屋及草菴火至輙以池水灌滅諸軍多出弓弩夾射之蠻散走慶之令諸軍斬山開路攻之而山髙路險暑雨方盛乃置東㟠蜀山宜民西砦黄徼上夌六戍而還蠻被圍守日久並饑乏自後稍出歸䧏慶之前後所獲蠻並移京邑以為營户慶之又為孝武撫軍中兵叅軍帝以本號為雍州隨府西上時蠻㓂太甚水陸梗硋帝停大堤不得進分軍遣慶之掩討大破之䧏者二萬口帝至而驛道蠻反慶之又討之王𤣥謨鎮荆州王方回領臺軍並㑹平定諸山獲七萬餘口鄖山蠻最強盛魯宗之屢討不能克慶之翦定之禽三萬餘口慶之還京師㑹竟陵王誕據廣陵反復以慶之為使持節都督南兖徐三州諸軍事車騎大將軍開府儀同三司南兖州刺史率衆討之至歐陽誕遣客慶之宗人沈道愍齎書說慶之餉以玉環刀慶之遣道愍反數以罪惡慶之至城下誕登樓謂之曰沈君白首之年何為來慶之曰朝廷以君狂愚不足勞少壯故使僕來耳帝慮誕北奔使慶之斷其走路慶之移營白土去城十八里夕進新亭誕果出走不得去還城慶之進營洛橋西焚其東門值雨不克慶之兄子僧榮時為兖州刺史鎮瑕丘遣子懐明率數百騎詣受慶之節度慶之塞壍造攻道立行樓土山并諸攻具時夏雨不得攻城帝使御史中丞庾徽之奏免慶之官以激之詔無所問誕餉慶之食提挈者百餘人出自北門慶之不問悉焚之誕於城上授函表倩慶之為送慶之曰我奉詔討賊不得為汝送表汝必欲歸死朝廷自應開門遣使吾為汝送䕶之每攻城輒身先士卒帝戒之曰卿為統任當令處分有方何蒙楯城下身受矢石邪脫有傷挫為損不少自四月至於七月乃屠城斬誕其後西陽五水蠻復為冦慶之以郡公統諸軍討之攻戰經年皆悉平定獲生口數萬人宗慤為振武將軍元嘉二十三年為蕭景憲軍副隨交州刺史檀和之伐林邑圍區粟城林邑遣將范毗沙達來救區粟和之遣偏軍拒之為賊所敗又遣慤慤乃分軍為數道偃旗潜進討破之拔區粟入象浦遂尅林邑收其異寳雜物不可勝計慤為隨郡太守雍州蠻屢為冦建威將軍沈慶之率慤及栁元景等諸將分道攻之羣蠻大潰又南新郡蠻帥田彦生率部曲反叛焚燒郡城屯據白楊山元景攻之未能下慤率其所領先登衆軍隨之羣蠻繇是畏服臧質為寧朔將軍元嘉二十七年伐汝南西境刀壁山蠻大破之獲萬餘口劉胡為振威將軍元嘉二十八年率步騎三千討上如南山就溪蠻大破之栁元景元嘉末世祖西鎮襄陽江夏王義恭以元景為將帥即以為廣威將軍隨郡太守既至而蠻斷驛道欲來攻郡郡内兵少糧仗又乏元景設方略得六七百人分五百人屯驛道或曰蠻將逼城不宜分衆元景曰蠻聞郡遣重戍豈悟城内兵少且表裏合攻於計為長㑹蠻垂至乃使驛道為備潛出其後戒曰火舉馳進前後俱發蠻衆驚擾投鄖水死者千餘人斬獲數百郡境肅然無復冦抄朱脩之討蠻元景又與之俱後又副沈慶之征鄖山進尅太陽世祖入討元凶以為諮議叅軍領中兵加冠軍將軍太守如故配萬人為前鋒宗慤薛安都等十三軍皆𨽻焉賊步將魯秀王羅漢劉簡之騎將常伯興等及其士卒皆殊死戰劉簡之先攻西南頻得燒草舫略渡人程天祚砦未立亦為所摧王羅漢等攻壘北門賊艦亦至元景水陸受敵意氣彌彊麾下勇士悉遣出戰左右唯留數人宣𫝊分軍助程天祚還得固砦因此破賊元景察賊衰竭乃命開壘鼔譟以奔之賊衆大潰投淮死者甚多劭更率餘衆自來攻壘復大破之其所殺傷過於前戰劭手斬退者不能禁奔還宫僅以身免蕭斌被創簡之收兵而止陣猶未散元景復出薄之乃走競投死馬澗澗為之滿斬簡之及軍主姚叔藝王江寳朱明智諸葛邈之等水軍主禇湛之軍副劉道存並來歸順帝至新亭即位以元景為侍中領左衞將軍薛安都為寧朔將軍領馬軍與栁元景俱隨孝武入討元凶安都至朱雀航横矛瞋目叱賊將皇甫安民等曰賊弑君父何必事之世祖踐祚除右軍將軍率所領騎為前鋒直入殿庭賊尚有數百人一時奔散以功封南郷縣男累加左將軍㑹魯爽反王𤣥謨拒南郡王義宣臧質於梁山安都復領騎為支軍賊有水步營在蕪湖安都遣將吕興夀率數十騎襲之賊衆驚亂斬首及赴水死者甚衆義宣遣將劉湛及譚攻𤣥謨𤣥謨命衆軍擊之使安都引騎出賊陣后其副建武將軍譚金三歴賊陣乗其隙縱騎突之諸將繼進是朝賊馬軍發蕪湖欲來㑹戰望安都騎甚盛隠山不敢出賊陣東南猶堅安都横擊陷之賊遂大潰安都隊主劉元儒於艦中斬湛首沈法系為寧朔將軍領三千人與栁元景宗慤入討元凶既至新亭元景居中營宗慤居西營法系居東營據㟠賊攻元景法系臨射之所殺甚衆法系塹外樹悉伐之令倒賊劭來攻縁樹以進彭排多開隟選善射手的射發無不中死者交横事平以為寧朔將軍始興太守討蕭簡於廣州聞臺軍將至簡誑其衆曰臺軍是賊劭所遣並信之前征北叅軍顧邁被脅從城内善天文云荆江有大兵城内繇此固守初世祖先遣鄧琬圍簡唯治一攻道法系至曰宜四面並攻若守一道何時可拔琬慮功不在已謂法系曰更相申五十日盡又不克乃從之八道俱攻一日即拔斬蕭簡廣州平封庫藏付鄧琬而還鄧琬為輔國將軍孝武即位元凶劭黨南海太守蕭簡據廣州反琬討平之朱脩之孝建初為寧蠻校尉都督雍州刺史時南郡王義宣反令魯秀擊襄陽脩之命斷馬鞍山道秀不得前及義宣敗於梁山單舟南走脩之率衆南追遺冦時竺超民執義宣脩之至乃殺之以功封南昌縣侯王𤣥謨為徐州刺史都督諸軍事孝建中南郡王義宣與江州刺史臧質反𤣥謨以輔國將軍豫州刺史與栁元景南討軍屯梁山夾岸築偃月壘水陸待之義宣遣劉湛就臧質陳軍城南𤣥謨留老弱守城悉以精兵接戰賊遂大潰加都督前將軍封曲江侯張興世為貟外將軍孝建中隨王𤣥謨出梁山戰有功明帝即位進興世號龍驤將軍領水軍拒南賊於赭圻築二城於湖目偽龍驤將軍陳慶領舸於前為遊軍興世率龍驤將軍佼長生董凱之攻克二城因擊慶慶戰大敗時投水死者數千人宋越為江夏王義恭大司馬參軍濟陽太守㝷加龍驤將軍孝建中臧質魯爽反越率軍據歴陽爽遣將軍鄭徳𤣥前據大峴徳𤣥分遣偏師楊胡興劉蜀馬步二千進攻歴陽越以步騎五百於城西十餘里拒戰大破之斬胡興劉蜀等爽平又率所領進梁山拒質敗走越戰功居多大眀三年轉長水校尉竟陵王誕據廣陵反越領馬軍𨽻沈慶之攻誕遂陷其城殷孝祖大眀初為積射將軍與魏軍戰于青州頻大破之累加龍驤將軍竟陵王誕據廣陵為逆孝祖𨽻沈慶之攻誕又有戰功劉勔大明中為西陽王子尚撫軍入直閤先是遣費沈伐陳檀不克乃除勔龍驤將軍西江督䕶鬱林太守勔既至率軍進討隨以翦定大致名馬并獻珊瑚連理樹後為右將軍太始四年魏遣汝陽司馬趙懐仁步騎五百冦武津縣勔遣龍驤將軍曲元徳輕兵進討魏衆驚散魏子都公閼於拔又率三百人防運車千兩於汝陽臺東水上結營元徳單騎直入斬拔首因進攻汝陽臺即陷外壘獲車一千三百乘斬首一百五十級勔又使司徒參軍孫臺瓘督弋陽以西魏軍冦義陽臺瓘大破之魏上其北豫州租有車二千兩勔招羌人徼擊於許昌魏衆奔散焚燒米榖沈攸之眀帝即位初除東海太守未拜㑹四方反叛南賊已次近道以攸之為寧朔將軍㝷陽太守率軍據虎檻時南賊前鋒鍾沖之薛常寳等屯據赭圻殷孝祖攻之為流矢所中死攸之推寧朔將軍江方興為綂帥大破賊於赭圻城外奔至姥山分遣水軍乘勢進討又破其水軍拔胡白二城㝷假攸之節進號輔國將軍代孝祖督前鋒諸軍事薛常寳在赭圻食盡南賊大帥劉胡屯濃湖以囊盛米擊流查及船腹陽覆船順風流下以餉赭圻攸之疑其有異遣人取船及流查大得囊米攸之從子懐寳為賊將帥在赭圻遣親人楊公讚齎宻書招誘攸之攸之斬公讚封懐寳書呈太宗㝷尅赭圻遷使持節督雍梁南北秦四州郢州之竟陵諸軍事冠軍將軍領寧蠻校尉雍州刺史袁顗復率大衆來入鵲尾相持既久軍主張興世越鵲尾上據錢溪劉胡自攻之攸之率諸將攻濃湖胡遣人𫝊唱錢溪已平衆並懼攸之曰不然若錢溪實敗萬人中應有逃亡得還者必是彼戰失利唱空聲以惑衆耳勒軍中不得妄動錢溪信㝷至果大破賊攸之悉以錢溪所送敵軍耳鼻示之顗駭懼急追胡還攸之諸軍悉力進攻多所斬獲吳喜孝武朝授河東太守眀帝即位改建武將軍率貟外散騎侍郎竺超之殿中將軍杜敬真馬步東討先是孝武世喜既見驅使嘗充使命性寛厚所至人並懐之及東討百姓聞吳河東來便望風降散故喜所至克捷遷步兵校尉將軍如故封竟陵縣侯東土定又率所領南討遷輔國將軍㝷陽太守南賊退走喜遂平定荆州遷前軍將軍魏㝷侵豫州喜統諸軍出討大破之荆亭魏長社公遁走戍主帛乞奴歸䧏事寧復以本位兼左衞將軍黄回為寧朔將軍軍主𨽻劉勔討于死虎破杜叔寳軍除山陽王休祐驃騎行叅軍龍驤將軍攻合肥破之累遷至將校以功封葛陽縣男陸攸之為殿中將軍眀帝太始二年永世縣民史逸宗據縣為逆攸之討平之任農夫為司徒叅軍督䕶㑹稽太守孔顗等反眀帝每遣軍輒多所求須不時上道外監朱㓜舉農夫驍果有膽力性又簡率資給甚易乃以千人配之使助東討時庾業兵盛農夫於延陵出長塘雖云千兵至者裁四百未至數十里遣人叅侯云賊築城猶未合農夫率廣武將軍髙志之永興令徐崇之馳徃攻之因其城壘未立農夫親持刀楯赴城入陣大破之庾業棄城走義興先是龍驤將軍阮佃夫募得蜀人數百多壯勇便戰皆著犀皮鎧執短兵本應就佃夫向晉陵未發㑹農夫須人分以配之及戰每先登東人並畏憚又恠其形飾殊異舊𫝊狐獠食人每見之輒奔走農夫收其船仗與髙志之進義興援吳喜二月一日喜乃渡水攻郡分兵擊諸壘栅農夫雖至衆力尚少兵勢不敵喜乃與數騎登髙東西指麾若招引四面俱進者東軍大駭諸營一時奔散唯龍驤將軍孔叡一栅未拔喜以殺傷者多乃開圍緩之其夜庾業孔叡相率奔走義興平劉延熈投水死有人告之乃斬尸𫝊首京邑陳伯紹為龍驤將軍交州人李長仁據州叛妖賊攻廣州殺刺史羊南伯紹討平之張瓌為輔國將軍順帝昇眀元年吳郡太守劉遐據郡反瓌討斬之南齊劉懐珍初仕宋為義恭大司馬参軍直閤將軍大明二年虜圍泗口城青州刺史顔師伯請援孝武遣懐珍將步騎數千赴之於麋溝湖與虜戰破七城拜建武將軍樂陵河間二郡太守賜爵廣晉縣侯累遷羽林監屯騎校尉建安王休仁濃湖與賊相持久未決明帝召懐珍領軍向青山助擊劉胡事平除游擊將軍累加左將軍沈攸之圍郢城懐珍遣建寧太守張謨游擊將軍裴仲穆統蠻漢軍萬人步出西陽破賊前鋒公孫方平軍數千人収其器甲進平南將軍増督南豫北徐二州增邑千戸李安民初仕宋為殿中將軍晉安王子勛反明帝除安民武衞將軍領水軍擊赭圻湖白荻浦獺窟皆㨗除積射將軍軍主張興世據錢溪糧盡為賊所逼安民率舟乘數百越五城送米與興世偽軍主沈仲王張引軍自􅀈口欲斷江安民進軍合戰破之又擊鵲尾江城皆有功封邵武縣子寧朔將軍宂從僕射戍泗口領舟軍縁淮游防至壽春魏遣長社公連營十餘里冦汝隂豫州刺史劉勔擊退之魏荆亭戍主昇乞奴棄城歸降安民率水軍攻破荆亭絶其津逕累加左將軍給事中建平王景素作難冠軍黄囘游擊將軍髙道慶輔國將軍曹欣之等皆宻遣致誠而游擊將軍髙道慶領衆出討太祖慮其有變使安民及南豫州刺史段佛榮行以防之安民至京口破景素軍於葛橋景素誅留安民行南徐州事建元初加領軍將軍鎮壽春先是宋世亡命王元初聚黨六合山僣號州郡討之不能擒積十餘年安民遣軍偵候生擒元初斬建康市加散騎常侍三年引水步軍入清泗於淮陽與魏軍戰破之王敬則宋泰始初為龍驤將軍軍主隨寧朔將軍劉懐珍征夀春殷琰遣將劉從築四壘於死虎懐珍遣敬則以千人繞後直出横塘賊衆驚退除奉朝請元徽二年隨太祖拒桂陽賊於新亭敬則與羽林監陳顯逹寧朔將軍髙道慶乘舸䒁於江中迎戰大破賊水軍焚其舟艦事寧帶南泰山太守右俠轂主周山圗宋太始初為殿中將軍四方反叛僕射王彧使山圗領百舸為前驅山圗與軍主佼長生等攻破賊湖白赭圻二城加振武將軍領兵濃湖追賊至西陽明帝賞之賜苑西宅一區五年為龍驤將軍領兵守歴陽鎮城初臨海亡命田流自號東海王逃竄㑹稽鄞縣邊海山谷中立屯營分布要害官軍不能討眀帝遣直后聞人襲說䧏之授流龍驤將軍流受命將黨與出行逹海鹽放兵大掠而反是冬殺鄞令耿猷東境大震六年􅃯山圖將兵東屯浹口廣設購募流為其副暨拏所殺别帥杜連梅雒生各擁衆自守至明年山圗分兵掩討皆平之王廣之泰始初除寧朔軍主𨽻劉懐珍征殷琰於壽春琰將劉從築壘拒守臺軍相守移日琰遣長史杜叔寳領五千人運車五百乗援從懐珍遣廣之及軍主辛慶祖黄囘千道連等要擊於横塘寳結營拒戰廣之等肉薄攻營自晡至日没大敗之殺傷千餘人遂退燒其運車從聞之棄壘奔走時合肥城反官軍前後受敵都督劉勔召諸軍主㑹議廣之曰請得將軍所乘馬徃平之勔以馬與廣之廣之去三日攻尅合肥賊仍隨懐珍討淮北時明帝遣青州刺史明僧暠北征至三城為沈文秀所攻廣之將步騎三千餘人縁海救之俱引退廣之又進軍襲文秀所置長廣太守劉桃根桃根棄城走軍還封安蠻縣子三百戸吕安國宋泰始二年以建威將軍為劉勔軍副征殷琰於夀春衆軍擊破琰長史杜叔寳軍於横塘安國抄斷賊糧道燒其運車多所傷殺琰衆奔走勔遣安國追之先至壽春琰閉門自守安國與輔國將軍垣閎屯據城南於是衆軍繼至安國勲第一封彭澤縣男全景文宋泰始二年以假節寧朔將軍宂從僕射軍主隨前將軍劉亮討破東賊於晉陵假輔國將軍北討薛索兒於破釡領水軍斷賊運仍隨太祖於葛冢石梁再戰皆有功姚道和宋末為游擊將軍隨太祖新亭破桂陽賊有功為撫軍司馬陳顯逹宋末為羽林監𨽻太祖討桂陽賊於杜姥宅大破之後為鎮西將軍都督益寧二州軍事益部山險多不賓服大度村獠前後刺史不能制顯逹分部將吏聲將出獵夜徃襲之男女無少長皆斬山夷震服累遷侍中䕶軍將軍永明五年荒人桓天生自稱𤣥宗族與雍司二州界蠻虜相扇動據南陽故城世祖遣顯達假節率征虜將軍戴僧靜等水軍向宛葉雍司衆軍受顯逹節度天生率虜萬餘人攻舞隂舞隂戍主輔國將軍殷公愍擊殺其副張麒麟天生被創退走仍以顯逹為使持節散騎常侍都督雍梁南北秦郢州之竟陵司州之隨郡諸軍事鎮北將軍領寧蠻校尉雍州刺史顯逹進據舞陽城遣僧靜等先進與天生及虜再戰大敗之官軍還數月天生復出攻舞陰殷公愍破之天生還竄荒中遂城平民曰土三城稍稍降散焦度宋末為武陵王贊前軍叅軍沈攸之事起太祖遣使假度輔國將軍屯騎校尉攸之大衆至夏口將直下都留偏兵守郢城而已度於城樓上肆言罵辱攸之至自發露形體穢辱之故攸之怒改計攻城度親力戰攸之衆蒙楯將登度令投以穢器賊衆不能冐至今呼此樓為焦度樓事寧度功居多轉後軍將軍封東昌縣子崔慧景建元初為都督梁南北秦沙四州軍事初梁州賊李烏奴屢為官軍所破走氐中乗間出擾動梁漢據關城遣使詣荆州請降豫章王不許遣中兵叅軍王圖南率益州軍從劒閣掩討大摧破之烏奴還保武興慧景發漢中兵衆進頓白馬遣支軍與圗南腹背攻擊烏奴大敗遂奔於武興周盤龍為右將軍建元二年魏軍冦壽春以盤龍為軍主假節助豫州刺史垣崇祖決水漂潰盤龍率輔國將軍張倪馬步軍於西澤中奮擊殺傷數萬人獲牛馬輜重垣崇祖建元中為都督平西將軍戍下蔡魏軍攻之崇祖自率衆渡淮與戰大破之追奔數十里殺獲千計戴僧静為太子右率永明五年𨽻䕶軍陳顯逹討荒賊桓天生於比陽僧静與平西司馬韓孟度華山太守康元隆前進未至比陽四十里頓深橋天生引虜步騎十萬奄至僧静合戰大破之殺獲萬計天生退還比陽僧静進圍之天生軍出城外僧静又擊破之天生閉門不復出僧静力疲乃退除征虜將軍南中郎司馬淮南太守曹虎為游擊將軍永明六年四月羌賊桓天生復引魏軍出據隔城遣虎督數軍討之虎令輔國將軍朱公恩領騎百匹前行蹹伏值魏遊軍因合戰破之遂進至隔城魏軍拒守虎引兵圍栅絶其走路須臾候騎還報魏援已至尋而天生率馬步萬餘人迎戰虎奮擊大敗之獲二千餘人明日遂攻隔城拔之斬魏虎威將軍襄城太守帛烏祝復殺二千餘人賊棄平氏城退走王茂為寧朔將軍江夏内史建武初魏軍圍司州茂以郢州之師救梁髙祖率衆先登賢首山魏將王肅劉昶來戰茂從髙祖拒之大破肅等魏軍退茂還郢仍遷朝國長史襄陽太守張冲為征虜將軍建武二年魏軍攻淮泗假冲節都督青冀二州北討諸軍事魏并兵攻司州徐青詔出軍分其兵勢冲遣軍主桑係祖繇渣口攻拔魏軍建陵驛馬厚丘三城多所殺獲又與青州刺史王洪軌遣軍主崔季延襲魏紀城據之冲又遣軍主杜僧䕶攻拔魏虎坑馮時即丘三城驅生口輜重還至溘溝魏救兵至縁道要擊僧䕶力戰大破之蕭坦之為右衞將軍建武二年假節督徐州諸軍事魏軍圍鍾離春斷淮洲坦之擊破之裴叔業為建武將軍建武二年魏軍圍徐州叔業以軍主𨽻右衞將軍蕭坦之救授叔業攻虜淮栅外二城尅之賊衆赴水死甚衆以功封武昌縣伯永泰元年以豫州刺史詔領東海太守孫令終新昌太守劉思効馬頭太守僧諸侯等五萬圍渦陽魏南兖州所鎮去彭城百二十里兖州刺史孟表固守拒戰叔業攻圍之積所斬級髙五丈以示城内又遣軍主蕭璝成寳真分攻龍亢戍即魏馬頭郡也魏人閉城自守徐州刺史廣陵王率二萬人騎五千匹至龍亢璝等拒戰不敵叔業率三萬餘人助之數道攻魏魏軍新至未立於是大敗廣陵王與數十騎走官軍追獲其節魏又遣將劉藻髙思繼至叔業率軍迎擊破之再戰斬首萬級生口三千人器仗驢馬絹布千萬計册府元龜卷三百五十一
