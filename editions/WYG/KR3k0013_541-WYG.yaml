body:
  text: 冊府元龜卷五百四十一宋王欽若等撰諌諍部直諌第八宋鄭鮮之初為宋國奉常赫連佛佛南朝以㪍㪍為佛佛兵䧟關中高祖復欲北討行意甚盛鮮之上表諌曰伏思聖略深遠臣之愚管無所厝其意然臣愚竊有所懐敵之㓙狡情狀可見自關中再敗皆是師徒違律非是内有事故致外有敗傷虜聞殿下親御六軍必謂見伐當重兵潼關其勢然也若凌威長驅臣實見其未易若輿駕頓雒則不足上勞聖躬如此則進退之機冝在熟慮賊不敢乘勝過陜遠懾天威故也今盡用兵之笇事從屈伸遣師撲討而南夏清宴賊方懼將來永不敢動若輿駕造雒而反㓙醜更生揣量之心必啓邊戎之患此既必然江南顒顒注輿駕忽聞遠伐不測之淺深必以殿下太申威靈未還人情恐懼事又可推往年西征劉鍾危殆前年刼盗破廣州人士都盡三吳心腹之内諸縣屡敗皆由勞役所致又聞處處大水加遠師民弊至於敗散自然之理殿下在彭城刼盗破諸縣事非偶爾皆是無頼凶慝凡順而撫之則百姓思安違其所願必為亂矣古人所以救其煩穢正在於斯漢高身困平城吕后受匈奴之辱魏武軍敗赤壁宣武䘮師枋頭神武十功無所一損况偏師失律無虧於廟堂之上者耶即之事實非敗之謂唯齡石等可念耳若行也或速其禍反覆思惟愚謂不煩殿下親征小刼西虜或為河雒之患今正冝通好北邊則河南安河南安則濟泗静伏願聖鍳察臣愚懷范㤗為散騎常侍景平初致仕少帝在位多諸愆失㤗上封事極諫曰伏聞陛下時在後園頗習武備鼔鼙在宫聲聞於外黷武掖庭之内諠譁省闥之間不聞將帥之臣統御之主非徒不足以威四夷秪生逺近之恠近者東冦紛擾皆欲伺國瑕隙今之吳㑹軍過二漢關河根本既揺于何不有如水旱成災役夫不息無冦而戒為費漸多河南非復國有羯衆難以理期此臣所用忘􅃦食而干非其位者也陛下踐祚委政宰臣實同高宗諒闇之美而更親狎小人不免近習懼非社稷至計經世之道王言如絲其出如綸下觀而化疾於影響伏願陛下思𢎞古道式遵遺訓從理無滯任賢無疑如此則天下歸徳宗社惟永書云一人有慶兆民頼之天高聽卑無幽不察興衰在人成敗易暁未有治政在於上而人亂於下者也臣蒙先朝過遇陛下殊私實欲盡心竭誠少報萬分而惛耄已及百疾互生便為永違聖顔無復自盡之路貪及視息陳其狂瞽陛下若能哀其所請留心覽察則臣夕隕於地無恨九泉少帝雖不能納亦不加譴元嘉二年遂輕舟逰東陽時太祖雖當陽親覧而徐羡之等猶秉重權㤗復上表曰伏承廬陵王已復封爵猶未加贈陛下孝慈天至友于過隆伏揆聖心已自有在但司契以不唱為高冕旒以因寄成用臣雖言不足採誠不亮時但猥蒙先朝忘醜之眷復沾廬陵矜顧之末息晏委質有兼常欵契濶戎陣顛狽艱危厚徳無報授令路絶此老臣兼不能自已者也朽謝越局無所逃刑㤗諸子禁之表竟不奏張約之堂邑人前為吉陽令廬陵王義真既為徐羡之等所廢約之上䟽諌曰臣聞仁義之在天下若中原之有菽理之感被萬物固不繫於貴賤是以考叔反悔誓於及泉壺關復寃䰟於湖邑也當斯之時豈無尊卿賢輔哉或以事廹心違或以道壅謀屈何甞不願聞善於輿𨽻兾藥石於阿氏哉臣雖草芥備充黔首少不量力頗高殉義之風謂蹈善於朝聞愈徒生於白首用敢干禁忘戮披叙丹愚伏惟高祖武皇帝誕兹神武撫運龍興仰清天歩則齊徳有虞俯廓九州則侔功大夏故䖍順天人享有萬國雖靈祚修長聖躬弗永陛下繼明紹統遐邇一心藩王哲茂四維寧謐傾耳康哉之詠企踵升平之風竊念廬陵王少蒙先皇優慈之遇長受陛下穆愛之恩故在心必言所懷必亮容犯臣子之道致招驕恣之愆至於天資夙成寔有卓然之美冝在容養録善掩瑕訓盡義方進退以漸今猥加剥辱幽徙逺郡上傷陛下棠棣之篤下令遠近恇然失圖士庶杜口人為身計臣伏思大宋之興雖協應符緯而開基造次根條未繁冝廣樹藩戚敦睦以道使兄弟之美比輝魯衞龜策告同祚均七百豈不善哉陛下富於春秋慮未重復忽安危之逺算肆不忍於一朝特願留神九思重加詢採上考前代興亡之由中存武皇締構之業下顧蒼生顒顒之望特開曲宥反王都邑選保傅於舊老求四友於髦俊引誘情性導逹聰明凡人在苦皆能自厲况王質朝心聰易加訓範且中賢之人未能無過過貴自改罪願自新以武皇之愛子陛下之懿弟豈可以其一𤯝長致淪棄哉謹昧死詣闕伏地以聞惟願丹誠一經天聽退就斧鑊無愧地下矣書奏以約之為梁州府叅軍尋又見殺何尚之為尚書右僕射時文帝行幸還多侵夕尚之表諌曰萬乘冝尊重不可輕此聖心所鑒豈假臣啓輿駕比出還多冒夜群情傾懼寔有未寧清道而動帝王成則古今深戒安不忘危若值汲黯辛毗必將犯顔切諫但臣等碌碌毎存順黙耳伏望少採愚誠思垂省察以慰四海之望優詔納之扶令育為龍驤叅軍時彭城王義康出鎮豫章令育詣闕上表曰盖聞哲王不逆切㫖之諫以博聞為道人臣不忌殱夷之罸以盡言為忠是故周昌極諌馮唐面折孝惠所以克固諸嗣魏尚所以復任雲中彼二臣豈好逆主干時犯顔違色者哉又袁盎之諌孝文曰淮南王若道遇疾死則陛下有殺弟之名奈何文帝不用追悔無及臣草莾微臣竊不自揆敢抱葵藿傾陽之心仰慕周易匪躬之志故不遠千里願言命侣謹貢丹愚希垂察納伏惟陛下躬執大象首岀萬物王化咸通三才必理闢天人之路開大道之門搜殊逸於巖穴招竒英於側陋窮谷無白駒之唱喬岳無遺賢之嗟羅飛翮於垂天網沉鱗於溟海况於彭城王義康先朝之愛子陛下之次弟哉一旦出削逺送南垂恩絶於内形隔於逺取離明主身放聖朝草萊黔首皆為陛下痛之臣惟景平元嘉之釁幾於危殆三公託以興廢之冝宻懐不臣之計台輔伺隙於京甸強楚闚􅎿於上流或苞惡而窺國或顯逆而凌主有生之所惴恐神祗之所忿忌也頼宗社靈長廟筭流逺灑滌塵埃殄馘醜類氛霧時靖四門載清肅之時義康豈不願叅皇謀均比休咎哉且陛下舊楚形勝非親勿居遂以驃騎之號任以藩夏之重撫政南郢綏民遏冦播皇宋之澤以治幽荒陛下之潤被之九有豈有南荆之民沾渥而已焉遂召之以宰輔又宰之以和味既居三事又牧徐揚所以幽顯齊歎人神同忭莫不言陛下授之為得義康受之為是也今如何信疑貌之似闕兄弟之恩乎若有迷謬之愆可責之罪正可􅂾之以善惡導之以義方且廬陵王往事足以知今此乃陛下前車之殷鑒後乘之靈龜也夫曽子之不殺人雖二告而猶織仁主之令範也故詩云無信人之言人實不信又云兄弟雖䦧不廢親也尚書曰克明峻徳以親九族九族既睦可以親兄弟安可棄乎臣伏願陛下上尋往代黜廢之禍下惟近者䜛言之釁廬陵王既申寃魂於后土彭城王亦弭疑愆於宋京此非徒皇代當今之計乃盖良史萬世之美也且謟諛難辨是非易黷福始禍先古人之所畏故愛身之士身為己計莫不結舌杜口孰肯冒忌干主哉臣以頑昧獨獻微管所以勤勤懇懇必訴丹誠者寔恐義康年窮命盡奄忽於南遂令陛下有棄弟之責臣雖微賤竊為陛下羞之况書言記事之史豈能屈典謨而諱哉脫於臣慮陛下恨之何益揚子雲云獲福之大莫先於和穆遘禍之深莫過於内難毎服斯言以為警戒矧今覩王室大事豈得韜筆黙爾而已哉臣將恐天下風靡離間是懼遂令宇内遷觀民庶革心欲致康哉實為難也陛下徒云惡枝之冝伐豈悟伐柯之傷樹乃往古之所悲當今所冝改也陛下若蕩以平聽屏此猜情垂訊蒭蕘之謀曲察狂瞽之計一發非意之詔逮訪慱古之士速召義康返於京甸兄弟協和君臣輯穆息宇内之機絶多言之路如是則四海之望塞䜛說之道消矣何必司徒公揚州牧然後可以安彭城王哉若臣所啓違憲於國為非請即伏誅以謝陛下雖復分形赴鑊煑體烹屍始願所甘豈不幸甚表奏即收付建康獄賜死蔡興宗為侍中時孝武新年拜陵興宗負璽陪乘及還帝欲因以射雉興宗正色曰今致䖍國陵情敬兼重從禽猶有餘日請待他辰帝大怒遣令下車用是失㫖張邵為世子中軍叅軍十四年武帝以世子鎮荆州邵諌曰儲貳之重四海所繫不冝處外敢以死請從之梁郭祖深為後軍叅軍時武帝溺情内教朝政縱弛祖深輿櫬詣闕上封事其略曰大梁應運功高百王慈悲既引憲律如替愚輩㒺識悖慢斯作各競奢侈貪穢遂生頗繇陛下寵勲太過馭下太寛故亷㓗者自進無途貪苛者取入多徑直弦者淪溺溝壑曲鈎者升進重沓餙口利辭競相推廌訥直守信坐見埋沒勞深勲厚福賞未均無功側入反加寵擢昔宋人賣酒惡犬致酸陛下之犬其甚矣哉臣聞人為國本食為人命故禮曰國無六年之儲謂非其國也推此而言農為急務而郡縣苛暴不加勸奬今年豊歳稔人猶有饑色設遇水旱何以救之陛下昔歳尚學置立五舘行吟坐詠誦聲溢於境比來慕法普天信向家家齋戒人人懴禮不務農桑空談彼岸夫農桑者今日濟育功徳者將來勝因豈可墮本勤末置交効賖也今商旅轉繁遊食轉衆耕夫日少杼軸日空陛下若廣興屯田賤金貴粟勤農桑者擢以階級惰耕織者告以明刑如此數年家給人足亷譲則可生君子小人智計不同君子志於道小人謀於利志於道者安國濟人志於利者損物圖己逆惡者害國小人也忠良者捍國君子也臣見疾者詣道士則勸奏章僧尼則令齋講俗師則鬼禍湏解醫診則湯熨散丸皆先自為也臣謂為國之本與療病相類療病當去巫鬼尋華扁為國當黜佞邪用管晏今之所任腹背之毛耳論外則有勉捨徐勉周捨也說内則有雲旻范雲也旻失其姓雲旻所議則傷俗盛法勉捨之志唯願安枕江東主慈臣怯息謀外甸使南中士女南望懐寃若賈誼重生豈不慟哭臣今直言犯顔罪或容宥而􅆾忤貴臣則禍在不測所以不憚鼎鑊區區必聞者正以社稷計重而蝼蟻命輕使言入身滅臣何所恨夫謀臣良將何代無之貴在見知要在用耳陛下皇基兆運二十餘載臣子之節諫諍是誰執事皆同而不和荅問唯唯而已入對則言聖㫖宸𠂻出論則云誰敢逆耳過實在下而讁見於上遂使聖皇降誡躬自引咎宰輔晏然曽無謙退且百僚卿士渺有奉公尸禄競利不尚亷㓗累金積鏹侍列如仙不田不商何因而爾法者人之父母惠者人之仇讎法嚴則人思善徳多則物生惡惡不可長欲不可縱伏願去貪濁進亷平明法令嚴刑罸禁奢侈薄賦歛則天下幸甚謹上封事二十九條伏願抑獨㫁之明少察愚瞽時帝大引釋典將以易俗故祖深尤言其事條以為都下佛寺五百餘所窮極寵麗僧尼十餘萬貫資産沃壌所在郡縣不可勝言道人又有白從尼則畜飬女皆不貫人籍天下户口幾亡其半而僧尼多畜飬女皆服羅紈其蠧俗傷法抑由於此請精加簡括若無道行四十已下皆使還俗附農罷白從養女聽畜奴婢唯著青布衣僧尼皆命蔬食如此則法與俗盛國富人殷不然恐方來處處成寺家家剃落尺土一人非復國有朝廷擢用勲舊為三郵州郡不顧御人之道唯以貪殘為務廹脅良善害甚豺狼江湘人庶尤受其弊自三關以外是處遭毒而此勲人投化之始但有一身被及任用皆募部曲而揚徐之人逼以衆役多投其募利其貨財皆虚名上簿送出三津名在逺役身歸鄉里又懼本属簡問於是逃亡他境僑户之興良由此故又梁興已來發人征役號為五三及投募將營主將無恩在䘏失理多有物故輙利叛亡或有身殞戰塲而名在叛目符下討捕稱為逋叛録質家丁合家又叛則取同籍同籍又叛則取比伍比伍又叛則望村而取一人有犯則合村皆空雖肆𤯝時降蕩滌惟始而監符猶下舊日限以嚴程上任信下轉相督促䑓使到州州又遣押使至郡州郡競急切同趣下城令宰多庸才望風畏伏於是歛户課薦其箱使人納重貨許立空文有百里㣲欲矯俗則嚴科立至自是所在恣意貪利以事上官又請斷界首將生口入比及闗津廢替湏加紏擿又言廬陵年少不冝鎮襄陽左僕射上􅀈在䘮被起為吳郡曽無辭譲其言深刻又請復郊四星帝雖不能悉用然嘉其直擢為豫章鍾陵令員外散騎常侍蕭介為光禄大夫太清中侯景於渦陽敗走入夀陽高祖勅韋防黙納之介聞而上表諌曰臣抱患私門竊聞侯景以渦陽敗績隻馬歸命陛下不悔前禍復勅容納臣聞凶人性不移天下之惡一也昔吕布殺丁原以事董卓終誅董而為賊劉牢之反王㳟以歸晋還背晋以搆妖何者狼子野心終無馴狎之性養獸之喻必見饑噬之禍侯景獸心之種鳴鏑之類以㓙狡之才荷高歡翼長之遇位忝台司任居方伯然而高歡墳土未乾即還反噬逆力不逮乃復逃死闗西宇文不容故復投身於我陛下前者所以不違細流正欲以属國降人以討匈奴兾獲一獸之効耳今既亡師失地眞是境上之匹夫陛下愛匹夫而棄與國之好臣竊不取也若國家猶望其高鳴之晨歳暮之効臣竊惟侯景必非歳暮之臣棄鄉國如脫屣背君親如遺芥豈知逺慕聖徳為江淮之淳臣事跡顯然無可致惑一隅尚且如此觸類何可具陳臣朽老疾侵不應輙干朝政但楚㐮將死有城郢之患衞魚臨亡亦有屍諌之節臣忝為宗室遺老敢㤀劉向之心伏願天慈少思苦口之語高祖省表歎息卒不能用陳章華禎明初上書極諌其大略曰昔高祖南平百越展拓疆宇世祖東定吳㑹西破王琳高宗克復淮南辟地千里三祖之功亦至勤矣陛下即位於今五年不思先帝之艱難不知天命之可畏溺於嬖寵惑於酒色祠七廟而不出拜妃嬪而臨軒老臣宿將棄之草莾謟佞䜛邪昇之朝廷今疆塲日蹙隋軍壓境陛下如不改弦易轍臣見麋鹿復逰於姑蘇矣書奏後主大怒即日命斬之後魏崔浩為祭酒神瑞二年秋穀不登太史令王亮蘇垣因華隂公等言䜟書國家當治鄴應大樂五十年勸明元遷都浩與時進周澹言於明元日今國家遷都於鄴可救今年之饑非長乆之策也東州之人嘗謂國家居廣漠之地民畜無崖號稱牛毛之衆今留守舊都分家南徙恐不滿諸州之地叅居郡縣處榛林之間不便水土疾疫死傷情見事露則百姓意沮四方聞之有輕侮之意屈丐蠕蠕必提挈而來雲中平城則有危殆之慮阻隔常有千里之險雖欲救援赴之甚難如此則聲實俱損矣今居北方假令山東有變輕騎南出燿威桑梓之中誰知多少百姓見之望塵震服此是國家威制諸夏之長策也至春草生乳酪將出兼有菜菓足接來秋若得一熟事則濟矣帝深然之曰唯此二人與朕意同復使中貴人問浩澹曰今既餬口無以至來秋或復不熟將如之何浩等對曰可簡下窮乏户諸州就穀若來秋無年願更圖也但不可遷都帝從之於是分民詣山東三州就食出倉穀以廪之來年遂大熟賜浩澹妾各一人御衣一襲絹五十疋綿五十斤髙允為中書侍郎給事中熟善明性多機巧欲逞其能勸文成大起宫室允諌曰臣聞太祖道武皇帝既定天下始建都邑其所營立必因農隙不有所興今建國已乆宫室已備永安前殿足以朝㑹萬國西堂温室足以安御聖躬紫楼臨望可以觀望遠近若廣修壯麗為異觀者冝漸致之不可倉卒計斫材運土及諸雜役湏二萬人丁夫充作老小供餉合四萬人半年可訖古人有言一夫不耕或受其饑一婦不織或受其寒况数萬之衆其損廢亦以多矣推之於古騐之於今必然之効也此誠聖心所冝思量帝納之張白澤為壅州刺史時獻文詔諸監臨之官所監治受羊一口酒一斛者罪至大辟與者以坐論紏告得尚書以下罪狀者各隨所紏官輕重而授之白澤上表諌之曰伏見詔書禁尚書已下受禮者刑身紏之者代職伏惟三載考績黜陟幽明斯乃不易之令軌百王之通式今之都曹古之公卿也皆挾美萬機讃徽百揆風化藉此而平治道由兹而穆且周之下士尚有代耕况皇朝貴任而服勤無報豈所謂祖述堯舜憲章文武者乎羊酒之罸若行不已臣恐姦人闚望忠臣懈節而欲使事静民安治清務簡至於委任責成不亦難辦如臣愚量謂依律令舊法稽同前典班禄酬亷羊去亂羣常刑無赦茍能如此則升平之軌朞月可望刑措之風三年必致矣獻文納之後為雍州刺史大和初懐州民依祁茍初三十餘人謀反將殺刺史文明皇后欲盡誅一城之民白澤諌曰臣聞上天愛物之生明王重民之命故殺一人而取天下仁者不為且書云父子兄弟罪不相及今群㓙肆虐轅裂誅盡合城無辜奈何極辟不誣十室而况一州或有忠焉或有仁者若滛刑濫及殺忠與仁斯乃西伯所以歎息於九侯孔子所以廽輪於河上伏惟聖徳昭明殷鑒永諳前禮止迅烈之怒抑雷霆之威則溥天知幸矣昔厲防民口卒㓕宗姬文聽輿頌終摧強楚願不以人廢言留神省察太后從之陵馥為選部尚書獻文將禪位於京兆王子推任城王雲隴西王原賀等並皆固諌馥抗言曰皇大子聖徳承基四海属望不可横議干國之紀臣請刎頸殿庭有死無貳乆之帝意乃解詔曰馥直臣也其能保吾子乎遂以馥為太保與太尉源賀持節奉皇帝璽綬傳位於孝文李冲為侍中孝文南伐加冲輔國大將軍統衆翼從自發大都至於雒陽霖雨不霽仍詔六軍發軫孝文戎服執鞭御馬而出群臣稽顙於馬首之前帝曰長驅之謀廟筭已定今大將軍運公等更欲何云冲進曰臣等不能折衝帷幄坐制四海而令南有竊號之渠寔臣等之咎陛下以文軌未一親勞聖駕臣等誠思亡軀盡命効死戎行然自京都滛雨士馬困弊前路尚遥水潦方甚且伊雒境内水小猶尚致難况長江浩汗越在南境若營舟檝必湏停滯師老糧乏進退為難矜䘮反斾於義為允帝曰一同之意前已具論卿等正以水雨為難然天時頗亦可知何者夏既炎旱秋固雨多去冬之初必當開爽比後十月間若雨猶不已此乃天也脫於此而晴行則無害古不伐䘮謂諸侯同軌之國非王者統一之文已至於此何容停駕冲又進曰今者之舉天下所不願唯陛下欲之漢文言吾獨乘千里馬竟何至也臣有意而無其辭敢以死請帝大怒曰方欲經營宇宙一同區域而卿等儒生屡疑大計斧鉞有常卿勿復言策馬將出於是大司馬安定王休兼左僕射任城王澄等並殷勤泣諌帝乃喻以遷都洛陽之意遂南伐崔挺為光州刺史時以犯罪配邊者多有逃越遂立重制一人犯罪逋亡合門充役挺上書以為周書父子罪不相及天下善人少惡人多以一人犯罪延及合門司馬牛受桓魋之罸栁下惠嬰盗跖之誅豈不哀哉辭甚雅切孝文納之成淹為謁者僕射以遷都與家累至雒陽行次靈丘属南齊遣使勅驛馬徵淹車駕濟淮淹於路左請見孝文竚駕而進之淹曰蕭鸞悖逆幽明同棄陛下俯應人神按見江涘然敵不可小蜂蠆有毒而况國乎深願聖明保萬全之策詔曰前車之轍得不慎乎淹曰伏聞發雒已來諸有諌者解官奪職恐非聖明納下之義帝曰此是我命耳卿不得干於斧鉞淹曰昔文王詢於蒭蕘晋文聽輿人之誦臣雖卑賤敢同匹夫帝優而容之詔賜絹百疋高道悦為諌議大夫兼御史中尉留守雒京時宫極初基廟庫未搆孝文將水路幸鄴已詔都水廻營搆之才已造舟楫道悦表諌曰臣聞博納輿言君上之崇務箴規輔正臣下之誠節是以置皷設榜爰自曩日虚襟博聽義属今辰臣既䟱魯濫蒙榮貴司兼獻弼職當然否佩遇恩華願陳聞見竊以都作營構之材部别科擬素有定所工治已訖廽付都水用造舟艫闕永固居宇之功作暫時遊嬉之用損耗殊倍終為棄物且子來之誠本期營起今不修繕舟檝更為非務公私徊惶僉深怪愕又欲御泛龍舟經由右齊其沿河攙道乆以荒蕪舟楫之人素不便習若欲委棹正流深薄之危古今共慎若欲挽牽取進授衣之月祼形水陸恐􅆾視人若子之義且鄴雒相望陸路平直時乘沃若往來匪難更乃捨周道之安即渉川之殆此乃愚智等慮朝野俱惑進退伏思不見其可又從駕群僚聽將妻累舟楫之間更無限隔士女雜亂内外不分當今景御休明惟新式度又氐羗犯順玉帛未恭西戎内侵介胄仍襲南冦紛擾對接近畿蠻民踈戾毎造不軌闚􅎿間隙或生慮外愚謂應妙選懿親撫寧後事令姦回息覬覦之望邊冦絶闚疆之心臣禀性愚直知而無隐區區丹𠂻冒昧以聞詔曰省所上事深見乃心但卿之立言半非矣當湏陳非以示謬稱是以彰徳然後明所以而不用有由而為之不爾則未相體耳廻材都水暫營嬉遊終為棄物修繕非務舟檝無限士女雜亂此則卿之失辭矣深薄之危撫後之重斯則卿之得言也於是孝文遂從陸路盧淵為散騎常侍孝文議伐齊淵表曰臣誠識不周覽頗尋篇籍自晋以前承平之世未有皇輿親御六軍决勝行陣之間者勝不足為武弗勝有虧威徳明千鈞之弩不為鼷鼬發機故也昔魏武以弊卒一萬而袁紹土分胡銳以歩兵三千而苻軍瓦觧勝負不由衆寡成敗在於湏臾若用田豐之謀則坐制益徳矣益徳張飛字魏既并蜀迄於晋世分有江水居其上流大小勢殊徳政理絶然猶君臣協謀垂􅂾十載孫皓暴戾上下雋爽水陸俱進一舉始克今蕭氏以簒弑之燼政虐役繁又支属相屠人神同棄吳㑹之民延踵皇澤正是齊軌之期一同之㑹若大駕南廵必左袵革面閩越倒戈其猶運山壓卵有征無戰然愚謂萬乘親戎轉漕難繼千里饋糧士有饑色大軍之後必有㓙年不若命將簡銳盪滌江右然後鳴鑾廵省告成東岳則天下幸甚率土戴頼臣又聞流言闗右之民自比年以來競設齋㑹假稱豪貴以相扇惑顯然於衆坐之中以謗朝廷無上之心莫此之甚愚謂宜速懲絶其魁帥不爾懼成黄巾赤眉之禍育其微萌而不詔之毫末斧斤一加恐蹈害者衆臣世奉皇家義均休戚誠知干忤之愆寔深然不忠之罪莫大詔曰至徳雖一樹功多途三聖殊文五帝異律或張或弛豈必相因逺惟承平之主所以不親斾五戎者盖有由矣英明之主或以同軌無征守庸之君或志在侵伐今若喻之英皇時非昔類比之庸后意有恧焉脫元極之尊本不冝駕二公之徙革輅之義寧非焉且曹操勝袁盖由徳義内舉苻堅瓦觧當縁立政未至定非弊卒之力強一萬之衆寡也今則驅先天之駕用仁義之師當審觀成敗庻免斯咎長江之阻未足可憚踰紀之略亦復何尚洞庭彭蠡竟殷固奮臂一呼或成漢業經略之義當付之臨機足食之籌望寄之蕭相將希混一豈好輕動利見之事何得委人也又水旱之運未必由兵堯湯之難詎因興旅頗豐之後雖静有之闗左小紛已勑禁勒流言之細曷足以紆大功深録誠心勿恨不相遂耳陸叡為尚書令太和十九年叡表曰臣聞先天有弗違之略後天有順時之規今蕭鸞盗有名目竊㨿江左惡盈罪稔天人棄之取亂攻昧誠在兹日愚以長江浩蕩彼之巨防可以徳招難以力屈南土昏霧暑氣鬰蒸師人經夏必多疾病而鼎遷草剏庶事甫爾䑓省無論政之館府寺靡聽治之所百寮居上事等行路沉雨炎陽自成癘疫且兵徭並舉聖王所難今介胄之士外攻讎冦羸弱之夫内勤土木運給之費日損千金驅罷軟之兵討堅城之虜將何以取勝乎陛下往冬之舉正欲耀武江漢示威衡湘自春㡬夏理冝釋甲願櫜旌卷斾為持乆之方崇成帝居深重本之固聖懐無内念之虞兆庶休斤板之役循理華區觀風雒浦然後簡英略之將任猛毅之雄南取荆㐮㨿其要府則梁秦以西覩機自服撫附振威白麾東指則義陽以左囬聲可制然後布仁化以綏近播恩施以懐逺凡在有情孰不思奮還遣慕徳之人效其餘力乘流而赴勢勝萬倍蕞爾閩區敢不稽顙豈必兹年競斯寸尺惟願固存近勑納降而馳不紆鑾輿乆臨炎暑帝從之旋崔光為太常卿宣武正始元年夏有典事史元顯獻四足四翼雞詔散騎侍郎趙邕以問光光表答曰臣謹按漢書五行志宣帝黄龍元年未央殿路軨中雌雞化為雄毛變化而不鳴不將將謂率領其群也無距元帝初元中丞相府史家雌雞伏子漸化為雄冠距鳴將永光中有獻雄雞生角劉向以為雞者小畜主司時􅁸居至時而鳴以為人起居之節小臣執事為政之象也言小臣將乘君威以害政事猶若顯也竟寧元年石顯伏􅇳此其效也靈帝光和元年南宫寺雌雞化為雄一身毛皆似雄但頭冠尚未變詔以問議郎蔡邕對曰貌之不恭則有雞祸臣竊推之頭為元首人君之象也今雞一身已變未至於頭而上知之是將有其事而不遂成之象也若應之不精政無所改頭冠或成為患滋大是後張角作亂稱黄巾賊遂破壤四方疲於賦役民多叛者上不改遂至天下大亂今之雞狀雖與漢不同而其應頗相類矣向邕並博逹之士考物驗事信而有證誠可畏也臣以邕言推之翅足衆多亦群下相扇助之象雛而未大脚羽差小亦其勢尚微易制御也臣聞災異之見皆所以示吉㓙明君覩之而懼乃能招福闇主視之彌慢所用致禍詩書春秋秦漢之事多矣此陛下所觀者也今或有自賤而貴闗預政事殆亦前代君房之匹比者南境死亡千計白骨横野存有酷恨之痛殁為怨傷之魂義陽屯師盛夏未反荆蠻狡猾征人奄次東州轉輸往多無還百姓困窮絞縊以殞北方霜降蠶婦輟事羣生憔悴莫甚於今此亦賈誼哭歎谷永刼諌之時司冦行戮君為之不舉陛下為民父母所冝矜䘏國重戎戰用兵猶火内外恐怨而易以亂離陛下縱欲忽天下豈不仰念太祖取之艱難先帝經營劬勞也誠願陛下留聰明之鍳警天地之意禮處左右節其貴越往者鄧通董賢之盛愛之正所以害之又躬饗加罕晏宗或闕時應親肅郊廟延敬諸父簡訪四方務加休息爰發慈㫖撫鎮貧瘼簡費山池减徹聲妓晝存政道夜以安身博採芻蕘進賢出佞則兆庶幸甚妖弭慶集矣宣武見之大悅後􅂾日而茹皓等並以罪失伏法於是光愈重正始二年八月光表曰二十八日有物出於太極之西序勑以示臣臣按其形即莊子謂蒸成菌者也又云朝菌不知晦朔雍門周所稱磨蕭斧而伐朝菌皆指言蒸氣鬰長非有根種柔脆之質彫殞速易不言旬月無擬斧斤又多生墟落穢濕之地罕起殿堂高華之所今棟宇崇麗墻築工宻糞杇弗加沾濡不及而兹菌歘搆厥状扶䟱誠足異也夫野木生朝野鳥入廟古人以為敗亡之象然懼災修徳者咸致休慶所謂家利而怪先國興而妖豫是故桑穀拱庭太戊以昌雊雉集鼎武丁用熙自比鴟鵲巢於廟殿梟服鳴於宫寢菌生賔階軒坐之正准諸往記信可為誡且東南未静兵革不息郊甸之内大旱跨時民勞物悴莫此之甚承天子育者所冝矜恤伏願陛下追殷二宗感變之意側躬聳誠惟新聖道節夜飲之忻強朝御之膳養方富之年保金玉之性則魏祚可以永隆皇夀等於山岳為中書令永平元年秋將刑元愉妾李氏群官無敢言者勑光為詔光逡廵不作奏曰伏聞當刑元愉妾李加之屠割妖惑扇亂誠合此罪但外人竊云李今懷妊例待分産且臣尋諸舊典兼推近事戮至刳胎謂之虐刑桀紂之主乃行斯事君舉必書義無隐昧酷而􅆾法何以示後陛下春秋已長未有儲體皇子襁褓至有夭失臣之愚識知無不言乞停李獄以俟育孕宣武納之李平為河南尹宣武將幸鄴平上表諌曰伏見己丑詔書雲軒鑾輅行幸有期鳯服龍驂鹽梅相濟祁奚云叔向之賢可及世而康不免其身寔可嗟惜未幾康除龍驤將軍平州刺史高謙之為河隂令舊制二縣令得面陳得失時佞幸之軰惡其有發聞遂共罷奏謙之乃上䟽曰臣以無庸謬宰神邑實思奉法不撓稱是官方酬朝廷無貲之恩盡人臣守器之節但豪家支屬戚里親媾縲紲所及舉目多是皆有盗憎之色咸起怨上之心縣令輕弱何能克濟先帝昔發明詔得使靣陳所懐臣亡父先帝臣崇之為雒陽令常得入奏是非所以朝貴歛手無敢干政近日以來此制遂寢致使神宰威輕下情不逹今二聖逺遵堯舜憲章髙祖愚臣亦望策其駑蹇少立功名乞親舊典更明往制庻姦豪知禁頗自屛心詔曰此啓深會朕意付外量聞謙之又上䟽曰臣聞夏徳中微少康成克復之主周道將廢宣王立中興之功則知國無常安世無常弊唯在明主所以變之有萬化之道耳自正光已來邊城屡擾命將出師相繼於路軍費戎資委輸不絶至如弓格賞募咸有出身槊刺斬首又蒙階級故四方壯士願征者多各各為己公私兩利若使軍柄付得其人賞勲不失其實則何賊不平何征不㨗也諸守帥或非其才多遣親者妄稱入募别倩他人引弓格鬭虚受征官身不赴陣唯遣奴客充数而已對冦臨敵曾不彎弓則是正爵虚加征夫多闕賊虜何可殄除忠良何以勸誠也冝近習侍臣歳屬朝士請託官曹擅作威福如有清身奉法不為回者咸共譛毁横受罪罸在朝顧望誰肯申聞蔽上壅下虧風敗政使䜛謟甘心忠讜息議况且頻年以來多有徵發民不堪命動致流離茍保妻子競逃王役不復顧其桑井憚此刑書正由還有必困之理歸無自安之路若聽歸其本業徭役微甄則還者必衆墾田増闢數年之後大獲課民今不務以理還之但欲嚴符切勒臣恐數年之後走者更多安業無㡬故有國有家者不患民心不歸唯患政之不立不恃敵不我攻唯恃吾不可侮此乃千載共遵百王一致且琴瑟不韻知音改弦更張騑驂未調善御執轡成組諺云迷而知反得道不逺此言雖小可以喻大陛下一日萬㡬事難周攬元凱結舌莫肯明言臣雖庸短世受榮禄竊慕前賢匪躬之義不避斧鉞之誅以希一言之益伏垂覽察略加推採使朝章重舉軍威更振海内起惟新之歌天下見復禹之績則臣奏之後笑入下泉靈太后得其䟽以責左右近侍寵要者由是疾之乃啓太后云謙之有學藝冝在國學以訓胄子詔從之除國子監博士孫紹為右軍將軍乆之為徐兖和糴使還朝大陳軍國利害不報紹表曰臣聞文質相用治道以之緝熙汗隆得時人物以之通濟故能事恢三靈仁治九服伏惟陛下應靈踐祚中明炤物宰輔忠純伊霍均美既致昇平之基應成無為之業而漠北叛命隴右冦逆中州驚擾民庶竊議其故何哉皆由上法不通下情怨塞故也臣雖愚短具鍳始末往在代都武質而治安中京以來文濟而政亂故臣昔於大和極陳得失具論四方華夷心動高祖垂納又應可尋延昌正光奏䟽頻上主者收録不蒙報問即日事勢乃至於此盡微臣豫陳之驗今東南有僭號之􅆆西北有逆命之冦豈得怨天實尤人矣臣今不憂荒外正慮中畿急須改張以寧其意若仍持疑變亂尋作肘腋一􅆾大事去矣然臣奉國四世欣慼是同但職在冗散不闗樞宻寧濟之計欲陳無所可謂經緯甚多無機可織夫天下者大噐也一正難傾一傾難正當今之危躡足之急臣備肉食痛心無已泣血上陳願垂採察若得言叅執事獻可替否冦逆獲除社稷稱慶雖死如生犬馬情畢紹性抗直毎上封事常至懇切不憚犯忤但天性䟱脱言乍高下時人輕之不見採納張普惠為諌議大夫表論時政得失一曰審法度平斗尺調租務輕賦役務省二曰聽輿言察怨訟先皇舊事有不便於政者請悉追改三曰進忠謇退不肖任賢勿貳去邪勿疑四曰興滅國繼絶世勲親之裔所冝收叙書奏孝明靈太后引普惠於宣光殿隨事難詰延對移時令曰寧有先皇之詔一時翻改普惠僶俛不言令曰卿似欲致諌故以左右有人不肯苦言朕為卿屛左右卿其盡陳之對曰聖人之養庶物愛之如傷况今二聖纂承洪緒妻承夫子承父夫父之不可安然仍行豈先帝傳委之本意仰惟先帝作事或有司之謬或權時所行在後以為不可者皆追而正之聖上㤀先帝之自新不問理之伸屈一皆抑之豈蒼生黎庶所仰望於聖徳太后曰小小細務一一翻動更成煩擾普惠曰聖上之養庶物若慈母之養赤子㡬臨危壑將赴水火以煩勞而不救豈赤子所望於慈母太后曰天下蒼生寧有如此苦事普惠對曰天下之親懿莫重於太師彭城王然遂不免枉死微細之苦何可得無太后曰彭城之苦吾已封其三子何足復言普惠曰聖后封彭城之三子天下莫不欣然至徳知慈徳之在上臣所以重陳者凡如此枉乞垂聖察太后曰卿云興㓕國繼絶世㓕國絶世竟復誰是普惠對曰昔淮南逆終漢文封其四子盖骨肉之不可棄親親故也竊見故太尉咸陽王冀州刺史京兆王乃皇子皇孫一徳之虧自貽悔戾沉淪幽壌緬焉弗收豈是興滅繼絶之意乞收𦵏二王封其子孫愚臣之願太后曰卿言有理朕深識之當命公卿博議此事又靈太后父司徒胡國珍薨贈相國太上秦公普惠以前世后父無太上之號詣闕上䟽陳其不可左右畏懼莫敢為通㑹聞胡家穿壙下聞有磐石乃宻表曰臣聞優名寳位王者之所光錫尊君愛親臣子所以慎終必使勲績相侔號秩相可然後能顯揚當時傳徽萬代者矣竊見故侍中司徒胡公懐道含靈實誕聖后載育至尊母儀四海近樞克唯允之寄居槐體論道之明故以功餘九錫褒假鑾纛深聖上之加隆極慈后之至愛憲章天下不亦可乎而太上之號竊謂未𠂻何者易稱天尊地卑乾坤定矣故曰大哉乾元又曰至哉坤元明乾坤不可並大禮記曰天無二日民無二王嘗禘郊社尊無二上明君臣不可並上伏見詔書以司徒為太上秦公夫人為太上秦君夫人蒙號於前司徒繫之於後尊光之美盛矣竊惟高祖受禪於獻文皇帝故仰尊為太上皇皆因上上而生名也皇太后稱令以繫勑下盖取三從之道逺同文母列於十亂則司徒之為太上恐􅆾繫勑之意春秋傳曰葬稱公臣子辭明不可復加上也書曰兹予大饗於先王爾祖其從與饗之司徒位尊属重必當配饗先朝稱太上以為臣以事太上皇恐非司徒翼翼之心漢祖創有天下尊父曰太上皇母曰昭靈后乃帝者之事晋有小子侯尚曰僭之於天子司徒三公也其可同號於帝乎孔子曰必也正名乎名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罸不中刑罸不中則民無所措手足易曰有大者不可以盈故受之以謙謙尊而光卑而不可踰天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙又困於上者必反於下故受之以井比尅吉定兆而以淺改卜羣心悲惋亦或天地神靈所以垂至戒啓聖情伏願聖后廻日月之明察微臣之請停司徒逼同之號從卑下不踰之稱畏困上之監邀謙光之福則天下幸甚臣聞見災修徳災變成善此太戊所以興殷桑穀以之自滅况今卜遷方始當修革之㑹愚以為無上之名不可假之脫譏於千載恐貽不言之咎且君之於臣比葬三臨之禮也司徒誠為后父實人臣也雖子尊不加於父乃天下母以義斷恩不可遂在室之意故曰女子有行遠父母兄弟况乃應坤之載承天之重而朔望於司徒之殯晨昏於郊墓之間雖聖思蒸蒸其不虞冝戒離宸極之嚴居疲雲蹕於道路此於億兆蒼生瞻仰失圖伏願尋載馳之不歸存静方之光大則草木可繁人靈斯穆臣職忝諌司敢獻狂瞽謹冒死上聞不敢宣露乞垂省覽昭臣微欵脫得奉謁聖顔曲盡愚𠂻者死且不朽太后覽表親至國珍宅召集王公八座卿尹及五品以上愽議其事遣使召普惠與相問答又令侍中阮乂中常侍賈燦監觀得失任城王澄問普惠曰漢高祖作帝尊父為太上皇今聖母臨朝贈父太上公求之故實非為無㨿且君舉作則何必維舊對曰天子稱詔太后稱令故周臣十亂文母預焉仰思所難竊謂非疋澄曰前代太后亦有稱詔聖母自欲存謙光之義故不稱耳何得以詔命之别而廢嚴父之孝對曰后父太上自昔未有前代母后豈不欲尊崇其親王何以不遠謨古義而近順今㫖未審太后何故謙於稱詔而不謙於太上竊願聖后終其謙光太傅清河王懌曰昔在僭晋禇氏臨朝殷浩遺禇褒書曰足下今之太上皇也况太上公而致疑對曰禇褒以女輔政辭不入朝淵源譏其不恭淵源殷浩字故有太上之刺本稱其非不記其是不謂殿下以此賜難侍中崔光曰張生表中引晋有小子侯出自鄭注非為正經對曰雖非正經之文然述正經之㫖公好古習禮復同斯難御史中丞尉元康因謂崔光曰張表云晋之小子侯以號同稱僭今者太上公名同太上皇比晋小子義似相類但不學不敢辨其是非普惠對曰中丞既疑其是不正其非豈所望於三獨尚書崔亮曰諌議所見正以太上之號不應施於人臣然周有太公尚父亦兼二名人臣尊重之稱固知非始今日普惠對曰尚父者有徳可尚太上者上中之上名同義異此亦非並亮又曰古有文王武王亦有文子武子然則太上皇太上公亦何嫌其同也普惠對曰文武者徳行之迹故迹同則謚同太上公者尊極之位豈得通施於臣下廷尉少卿袁飜曰周官上公九命上大夫四命命數雖殊同為上何必上者皆是極尊普惠厲聲訶飜曰禮有上卿上士何止大夫與公但今所行以太加上二名䨇舉不得非極雕蟲小藝微或相許至於此處豈卿所及飜甚有慚色黙不復言任城王澄曰諌諍之體各言所見至於用捨固在應時卿向答袁氏聲何太厲普惠對曰所言若是冝見採用所言若非懼有罪及是非湏辨非為茍競澄曰朝廷開不諱之門以廣忠言之路卿今意在向義何云乃虞罪罸議者咸以太后當朝志相黨順遂奏曰張普惠辭雖不屈然非臣等所同渙汗已流請依前詔太后復遣阮乂賈燦宣令謂普惠曰朕向召卿與群官對議往復既終皆不同卿表朕之所行孝子之志卿之所陳忠臣之道群公已有成議卿不得苦奪朕懐後有所見勿得難言普惠於是拜令辭還初普惠被召傳詔馳驊騮馬來甚迅速佇立催去普惠諸子憂怖流涕普惠謂曰我當休明之朝掌諌議之職若不言所難言諌所難諌便是唯唯曠官尸禄人生有死死得其所夫復何恨然朝廷有道汝軰勿憂及議罷㫖勞還宅親故賀其幸甚元昭業為諌議大夫孝莊將畋雒南昭業叩馬諌止帝避之而過冊府元龜卷五百四十一
