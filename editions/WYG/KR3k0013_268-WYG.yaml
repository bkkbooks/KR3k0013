body:
  text: 册府元龜卷二百六十八宋王欽若等撰宗室部来朝輔政就國来朝昬定晨省為子之道也春朝秋覲事君之義也蓋所以正班爵而有叙訓上下而為典者焉自漢氏之世戚藩列樹連城布土分王同姓愼簡僚宷為之傅相雖違顔於咫尺而存心於象魏故得嵗自入謁時或召對恭上之體無越於常度展親之憂宛如於家人亦有徵詣行在駿奔祀事忠勤形於貢奉孝弟著於誠明為國邸之表儀推聞望於英哲宜乎優賜名數加進秩封遂其請求曽無所吝者矣魏晉而下奉圭覲見者咸以記云漢髙祖九年十月楚王交朝未央宫八年九月自雒陽至長安十年十月荆王賈楚王交齊王肥来朝惠帝元年淮南王長入朝長立三年也二年十月齊悼惠王肥來朝獻城陽郡以益魯元公主邑文帝二年三月立皇子武為代王參為太原王揖為梁王武後徙為淮陽王又徙梁王十四年文帝十五年入朝十七年十八年比年入朝留比頻也留謂留在京師其明年乃之國二十一年入覲參五年一朝凡三朝揖五年一朝凡再入朝景帝二年梁王武入朝武立二十四年也三年梁王武復入朝武立二十五年也四年衡山王勃來朝初呉楚王反王堅守無二心是年呉楚已破王朝帝以為貞信乃勞苦之勞音來到反曰南方卑濕徙王於濟北以褒之七年十月梁王武入朝武立二十九年帝使使持乗輿駟馬迎梁王於闕下天子副車駕駟馬輿即車也既朝上疏因留中六年冬梁王武復入朝武立三十五年也上疏欲留帝弗許後二年諸王來朝有詔更前稱壽歌舞長沙定王發但張袖小舉手左右笑其拙帝怪問之對曰臣國小地狹不足囘旋帝以武陵零陵桂陽屬焉武帝元光六年衡山王賜入朝是時淮南王安河間王徳入朝安徳史失其年昭帝元鳯中廣陵厲王胥入朝益封萬戸成帝河平中楚孝王囂入朝正月時被疾帝閔之詔與子男一人俱從王入朝也是時東平思王宇來朝上疏求諸子及太史公書帝以問大將軍王鳯對曰臣聞諸侯朝聘考文章正法度非禮不言今東平王幸得來朝不思制節度以謹防危失危失謂失道而傾危也而求諸書非朝聘之義也諸子書或反經術非聖人或明鬼神信物怪物亦鬼太史公書有戰國縱横權譎之謀漢興之初謀臣竒策天官災異地形阸塞皆不宜在諸侯王不可予不許之辭宜曰五經聖人所制萬事靡不畢載王審樂道傅相皆儒者朝夕講誦足以正心虞意虞與娯同夫小辯破義大道不通致逺恐泥皆不足以留意泥音乃細反陷滯不通也諸益於經術者不愛於王愛惜也於王無所惜對奏天子如鳯言遂不與後漢光武中元元年正月東海王疆沛王輔楚王英濟南王康淮陽王延趙王旴皆來旴音詡又况于反二月從封岱山疆因留京師二年冬歸國明帝永平二年九月沛王輔楚王英濟南王康淮陽王延東海王政來朝六年正月沛王輔楚王英東平王蒼淮陽王延琅邪王京東海王政趙王旴北海王興齊王石來朝十一年正月沛王輔楚王英濟南王康東平王蒼淮陽王延中山王焉琅邪王京東海王政來朝十五年二月帝幸彭城耕於下邳三月徵琅邪王京㑹良成縣名故城在今下邳縣北徵東平王蒼會陽都縣名在今沂水縣南又徵廣陵侯及其三弟會魯祠東海恭王陵章帝建初七年正月沛王輔濟南王康東平王蒼中山王焉東海王政琅邪王宇來朝元和二年九月徵濟南王康中山王焉會祭烝嘗三年正月北巡狩濟南王康中山王焉西平王羨六安王恭樂成王黨淮陽王昞任城王尚沛王定皆從臣欽若等按元和二年九月徵濟南王康中山王焉其餘史不書來朝年月章和二年正月濟南王康阜陵王延中山王焉來朝安帝延光三年二月幸大山齊王無忌東海王普樂安王延來朝魏文帝黄初四年任城王彰雍丘王植朝京師明帝太和五年冬詔諸王朝京師青龍三年徵燕王宇入朝景初二年徵燕王宇詣京師晉武帝泰始四年太原王瓌入朝賜衮冕之服六年髙陽王珪入朝以父孚年高乞留供養拜尚書遷右僕射咸寧中河間王顒與諸王俱來朝帝歎顒可以為諸國表儀惠帝永光二年二月鎮南將軍楚王瑋鎮東將軍淮南王允來朝是時秦王柬來朝史不書月元康九年淮南王允入朝拜驃騎將軍宋高祖永初二年長沙王道憐自京口朝正入住殿省後魏獻文和平六年十月徵陽平王新城京兆王子推濟隂王小新城汝隂王天賜任城王雲入朝後周靜帝即位趙王括陳王純越王達代王盛滕王道來朝唐太宗貞觀十一年十一月丁亥潞州刺史韓王元嘉絳州刺史霍王元軌豫州刺史道王元慶並來朝十二年齊州都督齊王祐入朝因稱疾願留京師十六年十一月癸丑朔梁州都督漢王元昌徐州都督徐王元禮絳州刺史霍王元軌壽州刺史舒王元名揚州都督越王元貞來朝二十年十月徐州刺史霍王元軌許州刺史蔣王惲來朝二十一年十月滑州刺史舒王元名相州刺史趙王貞來朝貢二十二年十月絳州刺史徐王元禮襄州刺史紀王愼來朝梁太祖開平四年十月乙亥東京留守博士友文入覲召之也後唐愍帝應順元年閏正月癸亥洋王從璋自河中入覲獻甲馬二十疋輔政夫右賢左戚古之道也自商周之並建子弟以屏王室或入為卿士宰司國政故雖五屬之親而無官蓋尚徳也是知熙帝載執國成惟賢明而是託當親羈而並進繇漢而下迄於後周或選自宗英寘於輔弼典掌衡軸彌綸政治蓋有奕葉載徳濟美垂裕任職興化式是人望斯固鬷嘏寅亮之業茂焉非特藩翼懐寧之謂也至或登用非允授受斯失致覆敗者亦時有之斯可監也已商㣲子啓帝乙元子為紂卿士周公旦武王之弟自武王即位旦常輔翼武王用事居多武王九年東伐至孟津周公輔行十一年伐紂至牧野周公佐武王作牧誓破殷入商宫封周公旦於少昊之墟曲阜是為魯公公不就封留佐武王及成王即位少在襁褓之中周公恐天下畔周乃踐阼代成王攝行政當國成王長能聴政於是周公乃還政於成王就羣臣之位臣欽若等曰周公不就封以子伯禽之國其為王卿士者世為周公厲王奔彘時周公與召公立太子靜是為宣王二相輔之史闕其名其後荘王時有周公黒肩畢公高文王之子成王懼太子釗之不任乃命召公畢公率諸侯以相太子而立之衛康叔封封名也冉季載周公母弟皆有馴行於是周公舉康叔為周司寇冉季為周司空以佐成王治皆有令名於天下武公和康叔之後有文章又能聴其規諫以禮自防厲王時入相於周詩人作淇澳以美之祭公謀父周公之後穆王時為王卿士凡伯周公之裔厲王時為王卿士虢文公文王母弟虢仲之後宣王時為王卿士鄭桓公友周厲王少子而宣王庶弟也年表云母弟幽王以為司徒幽王八年為司徒和集周民周民皆説河雒之間人便思之武公掘突桓公子父子為周司徒善於其職國人宜之故作緇衣之詩美其徳以明有國善善之功焉王子虎襄王時為太宰漢澎侯澎東海縣屈􅈊中山靖王子武帝時自涿郡太守為左丞相詔曰夫親親任賢周唐之道也以澎户二千二百封左丞相為澎侯後漢東平王蒼光武子明帝時為驃騎將軍在朝數載多所隆益而自以至親輔政聲望日重意不自安上疏歸職帝優詔不聴疏云居宰相之位同氣之親餘具宗室退讓門魏邵陵侯眞太祖族子文帝黄初三年以眞為上軍大將軍都督中外諸軍事遷中軍大將軍七年與陳羣等受遺詔輔政明帝即位累遷大將軍司馬貞子武安侯爽明帝時為衛武將軍帝寢疾乃引爽入卧内拜大將軍假節鉞都督中外諸軍事録尚書事與太尉司馬懿並受遺詔輔少主晉安平王孚宣帝次弟為魏太傅武帝受禪詔曰太傅勲徳𢎞茂朕所瞻仰以光導𢎞訓鎮靜宇内願奉以不臣之禮其封為安平王邑四萬户進拜太宰持節都督中外諸軍事有司奏諸王未之國者所置官屬權未有備帝以孚明徳屬尊當宣化樹教為羣后作則遂備置官屬焉孚子義陽王望為魏司徒武帝泰始三年詔曰夫尚賢庸勲尊崇茂親所以體國經化式是百辟也且台司之重存乎天官故周建六職政典為首司徒中領軍以明德近屬世濟其美祖考創業翼佐大命出典方任入贊朝政文徳既著武功宣暢逮朕嗣位弼道惟明宜登上司兼統軍戎内輔帝室外隆威重其進位太尉中領軍如故置太尉軍司一人參軍事六人騎司馬五人又増置官騎十人并前三十假羽葆皷吹汝南文成王亮宣帝子武帝末為太尉録尚書事遺詔委以後事楊駿索詔視遂不還及駿誅詔曰大司馬汝南王亮體道沖粹通識政理宣翼之績顯於本朝二南之風流於方夏將憑逺猷以康王化其以亮為太宰録尚書事入朝不趨劍履上殿增掾屬十人給千兵百騎與太保衛瓘對掌朝政亮子西陽王羕元帝太興初録尚書事進位太宰領太尉梁王肜宣帝子惠帝元康中為大將軍尚書令領軍將軍録尚書事永康初共趙王倫廢賈后詔以肜為太宰守尚書令是時改司徒為丞相以肜為之倫滅詔肜以太宰領司徒齊王攸文帝之子武帝踐祚時朝廷草創而攸總管軍事撫寧内外莫不景附遷驃騎將軍開府辟召禮同三司每朝政大義悉心陳之累遷侍中司空攸子武閔王冏惠帝時為平東將軍假節鎮許昌與成都河間常山新野四王誅趙王倫惠帝反正以冏為大司馬於是輔政居攸故宫成都王穎武帝子助齊王冏誅趙王倫惠帝以穎為大將軍録尚書事冏敗穎懸執朝政事無巨細皆就鄴諮之髙密王泰宣帝弟馗之子惠帝永熙初為司空楚王瑋之被收泰嚴兵將救之祭酒丁綏諫曰公為宰相不可輕動且夜中倉卒宜遣人參審定問泰從之瑋既誅乃以泰録尚書事遷太尉尚書令東海孝獻王越惠帝西幸以越為太傅與太宰顒夾輔朝政讓不受懐帝即位委政於越武陵忠敬王遵元帝孫宋高祖義旗興復朝廷稱受密詔使遵總攝萬㡬加侍中大將軍移入東宫内外畢敬遷轉百官稱制書又教稱令書安帝反正更拜太保會稽文孝王道子孝武帝子大元中録尚書六條事尋領司徒安帝踐祚有司奏道子宜進位太傅揚州牧中書監假黄鉞備殊禮固辭不拜詔内外衆事動靜諮之帝既冠道子稽首歸政宋彭城王義康髙祖子文帝即位初為荆州刺史元嘉六年司徒王𢎞表義康宜還入輔政侍中都督揚南徐兖三州諸軍事司徒録尚書事領平北將軍南徐州刺史持節如故二府並置佐領兵與王𢎞共輔朝廷𢎞既多疾且每事推謙自是内外衆務一㫁之義康性好吏職銳意文按糾剔是非莫不精盡既專總朝權事決自已生殺大事以録命㫁之凡所陳奏入無不可方伯以下並委義康授用繇是朝野輻凑勢傾天下義康亦自强不息無有懈倦府門每旦常數百乗車雖復位卑人微皆被引接愛惜官爵未嘗以階級私人凡朝士有才用者引入闕下樂為竭力不敢欺負江夏王義恭髙祖子文帝元嘉十六年進位司空加侍中都督揚南徐兖三州諸軍事司徒録尚書事二十一年進太尉領司徒義恭既小心恭慎且戒義康之失雖為總録奉行文書而已故文帝安之孝武踐阼累加太宰前廢帝即位詔曰總録之典著自前代孝建始年雖蹔并省而因革有宜理存濟務朕㷀獨在躬未涉政道百揆庶務允歸尊徳太宰江夏王義恭新除中書監太尉地居崇重受遺阿衡實深慿倚冀康庶績可録尚書事本官監太宰王如故南郡王義宣髙祖子孝武帝即位初為中書監都督揚豫二州丞相録尚書六條事揚州刺史建平王宏文帝子孝武入嗣以宏為僕射冠軍將軍中書監宏謙儉周愼禮賢接士明曉政事世祖信仗之南齊竟陵王子良武帝子帝遺詔使子良輔政安成王知尚書事子良素仁厚不樂世務乃推安成詔云事無大小悉與鸞參議巴陵王寶義和帝西臺建以為侍中司空梁王定京邑宣德太后令以寳義為太尉領司徒詔云不言之化形於自逺時人皆云此實録也後魏江夏公吕道武族弟位外都大官委以朝政大見尊重扶風公處真烈帝之後少以壯烈聞位殿中尚書委以大政甚見尊禮文安公屈國之踈族明元時居門下出納詔命明元東巡命屈行右丞相命掌軍國甚有聲譽彭城王勰獻文子孝文時除侍中長直禁内參決軍國大政萬㡬之事無不預焉咸陽王禧孝文末為太尉與司徒彭城王勰司空北海王祥尚書左僕射廣陽王嘉等受遺輔政景明二年春詔曰朕以寡昧夙罹閔㓙憂㷀在疚罔知攸濟實賴先帝聖徳遺澤所覃宰輔忠賢劬勞王室用能撫和上下清肅内外乃式遵復子歸政告遜辭理懇至邈然難奪便當勵茲空乏親覽機務咸陽王尊唯元叔道性淵凝可進位太保領太尉司空北海王季父英明聲略茂舉可大將軍録尚書事髙陽王雍宣武末為太尉孝明即位初侍中于忠以門下議以帝幼年未親機政太尉髙陽王雍屬尊望重宜入居西相栢臺省決庶政任城王澄明徳茂親可為尚書令總攝百揆清河王懌孝明即位靈太后以懌帝之懿叔徳允具瞻委以朝政事擬周霍懌竭力輔佐以天下為己任汝南王悦正光中為侍中太尉孝明詔入居門下與丞相髙陽王雍參決尚書奏事東魏孝靜天平二年二月以太尉咸陽王坦為太傅以司州牧西河王悰為太尉三年二月以開府儀同三司華山王鷙為大司馬四年正月以汝陽王暹為録尚書事興和四年四月以太尉彭城王韶為録尚書事武定二年三月以元弼為録尚書事北齊任城王湝髙祖子自孝昭武成時車駕還鄴常令湝鎮晉陽總并省歴司徒太尉并省録尚書事彭城景思王浟髙祖子皇建初拜大司馬兼尚書令轉太保武成入承大業遷太師録尚書浟明練世務果於斷決事無大小咸悉以情趙郡王叡河清中為司空攝録尚書事累加尚書令拜太尉叡乆典朝政譽望日隆後周晉蕩公護太祖之兄邵惠公顥之少子自太祖為丞相立左右十二軍總屬相府太祖崩後皆受護處分凡所徵發非護書不行護屯兵禁衛盛於宫闕事無巨細皆先斷後聞孝閔踐祚大司馬封晉國公邑萬户遷大冡宰髙祖立百官總已於護保定元年以護為都督中外諸軍事令五府總於天官就國自漢懲亡秦之失尊王子弟魏晉代興咸進戚屬申畫邦壤署置官號南面君民奕世傳祚所以屏翰王室為磐石之宗也而史氏或載其就封之始或述其還國之自乃有勝衣疏爵既壯而方出明徳入輔辭寵以言歸或修覲而旋或被遣而去至於慈愛隆篤恩紀優洽亦并而叙之所以記封建沿襲之異宜典章因革之殊制者已漢營陵侯澤立為琅邪王與齊人田生之國生勸澤急行毋留出闗吕太后果使人追之已出即還齊悼惠王肥高祖六年立孝惠二年入朝帝與齊王燕飲太后前置齊王上坐如家人禮以兄弟齒列不從君臣之禮故曰家人也太后怒欲鴆之齊王自以為不得脫長安内史士曰内史王官士者其名太后獨有帝與魯元公主今王有七十餘城而公主乃食數城王誠以一郡上太后為公主湯沐邑太后必喜無患矣於是齊王獻城陽郡以尊公主為王太后為齊王太后言以母禮事之所以自媚也吕太后喜而許之迺置酒齊邸樂飲遣王歸國梁孝王武孝文十七年十八年比年入朝留比頻也留謂留在京師其明年乃之國孝景二十九年入朝帝廢栗太子太后心欲以梁王為嗣大臣有所闗説太后議格乃辭歸國三十五年冬復入朝上疏欲留帝不許乃歸國燕刺王旦武帝元狩六年四月與齊王閎廣陵厲王胥同日立旦壯大就國淮陽憲王欽宣帝元康三年立宣帝甚愛之元帝即位乃遣之國東平思王宇宣帝甘露二年立元帝即位就國舂陵侯仁以舂陵下濕求減邑内徙元帝初元四年徙封南陽之白水鄉猶以舂陵為國名遂與從弟鉅鹿都尉回及宗族往家焉仁子敞襲封為廬江都尉族兄安衆侯劉崇起兵王莽思惡劉氏徵敞至長安免歸國後漢魯王興哀王石並建武二十七年就國東海恭王彊建武二年立為皇太子十七年而母郭后廢彊不自安數陳懇誠願備藩國十九年封為東海王二十八年就國帝以彊廢不以過去就有禮故優以大封兼食魯郡初魯恭王好宫室起靈光殿甚壯是時猶存故詔彊都魯中元元年入朝徙封岱因留京師明年春帝崩冬乃歸國沛王輔楚王英濟南王康淮陽王延並建武二十八年就國中山王焉以郭太后少子諸王就國焉獨留京師三十年徙封中山王永平二年冬諸王來㑹辟雍歸藩詔焉與俱就國從以虎賁官騎焉上疏辭讓顯宗報曰凡諸侯出境必備左右故夾谷之會司馬以從今五國各官騎百人稱娖前行皆北軍胡騎便兵善射弓不空張發必决皆夫有文事必有武備所以重藩職也王其無辭東平王蒼明帝即位為驃騎將軍表乞上將軍印綬退就藩國辭甚懇切永平五年乃許還國而不聴上將軍印綬六年帝幸魯徵蒼從還京師明年隂太后既葬乃歸國十一年與諸侯朝京師月餘還國帝臨送歸宫悽然懐思乃遣使手詔賜國中傅曰辭别之後獨坐不樂因就車歸伏軾而吟瞻望永懐實勞我心誦及采菽以增歎息蒼建初六年冬上疏求朝明年正月帝許之七年三月大鴻臚奏遣諸王歸國帝特留蒼賜以秘書列仙圖道術秘方至八月飲酎畢有司復奏遣蒼乃許之詔賜蒼曰骨肉天性誠不以逺近為親疎然數見顏色情重昔時念王乆勞思得還休欲署大鴻臚奏不忍下筆顧授小黄門中心戀戀惻然不能言於是車駕祖送流涕而訣復賜乗輿服御珍寶輿馬錢布以億萬計琅邪王京明帝尤愛幸永平五年乃就國西平王羨章帝遺詔徙封陳王章和二年就國六安王恭章帝遺詔徙封彭城王章和二年就國樂成王黨與章帝同年尤相親愛章和二年就國下邳王衍有容貌章帝即位常在左右章和二年就國梁王暢明帝尤愛幸章帝縁先帝之意恩寵甚篤和帝即位就國常山王章殤帝延平元年就國清河王慶殤帝延平元年與濟北王壽河間王開常山王章就國慶立凡二十五年乃歸國和帝遵肅宗故事兄弟皆留京師有司請遣諸王歸藩不忍許之殤帝立乃就國千乗王伉伉子寵皆薨於京師子鴻嗣順帝即位始就國魏任城王彰太祖之子文帝即王位彰與諸侯就國彰始以先王見任有功冀因此遂見授用而聞當隨例意甚不悦不待遣而去陳思王植黄初元年與諸侯並就國四年來朝是時待遇諸侯法峻任城暴薨諸侯既懐友于之痛植及白馬王彪還國欲同路東歸以叙隔濶而監國使者不聴植發憤告離作詩以贈彪晉東平王楙為侍中與東安公繇善繇欲擅朝政與汝南王亮不平亮託以繇討楊駿顧望免繇楙等官遣楙就國又鎭下邳惠帝西幸遣使者劉䖍即拜兖州刺史范陽王虓徙楙青州楙不受命虓遣將田徽擊破楙楙走就國太原王輔武帝受禪初封渤海王泰始二年之國下邳王晃泰始二年與太原王瓌之國瓌子河間王顒初襲父爵咸寧二年就國梁王肜武帝踐祚封梁王及之國遷北中郎將武帝咸寧初遣諸王之國獨平原王幹有篤疾故特詔留之樂安王鑒泰始中拜越騎校尉咸寧初以齊之梁鄒益封因之國服侍中之服汝南王亮繇衛將軍侍中出為鎭南大將軍都督豫州諸軍事開府假節之國楚王瑋初封始平王太康末徙封於楚出之國都督荆州諸軍事趙王倫武帝受禪封琅邪郡王及之國行東中郎將齊王攸為鎭軍大將軍侍中太子太傅武帝諸子並弱太子不令内外屬意於攸中書監荀朂從容言于帝曰百僚内外皆歸心於齊王陛下試詔齊王之國必舉朝以為不可則臣言有徵侍中馮紞又言曰陛下遣諸侯之國成五等之制者宜先從親始莫若齊王帝既信朂言又納紞説太康三年乃下詔曰古者九命作伯或入毗朝政或出御方嶽周之吕侯五侯九伯實得征之侍中司空齊王攸明徳清暢忠允篤誠以母弟之親受台輔之任佐命立勲劬勞王室宜登顯位以稱具瞻其以為大司馬都督青州諸軍事侍中如故假節將本營千人親騎帳中司馬大車皆如舊増皷吹一部官騎滿二十置騎司馬五人餘主者詳按舊制施行秦獻王柬為鎮西將軍西戎校尉假節與楚淮南王俱之國淮南王允初封濮陽王拜越騎校尉太康十年徙封淮南仍之國東海王越蕩隂之敗奔于下邳竟陵王楙不納越乃還國後周宣帝大象元年五月以洺州襄國郡為趙國以齊州濟南郡為陳國以豐州武當安富二郡為越國以潞州上黨郡為代國以荆州新野郡為滕國邑各一萬户令趙王招陳王純越王盛代王達滕王逌並之國册府元龜卷二百六十八
