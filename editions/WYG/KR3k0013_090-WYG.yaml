body:
  text: 册府元龜卷九十宋王欽若等撰帝王部赦宥第九唐穆宗以元和十五年正月即位二月丁丑御丹鳳樓大赦天下制曰著大明者日也出乎震而見乎離則八紘開朗萬象炤煥孚大號者風也發厚地如鼓羣動則氛蒙盪滌鬱伏舒散王者如日之炤臨故聖躳作而庶類覩如風之號令故德音降而兆人從朕以寡薄方茲嗣服荷天地之眷祐承宗祧之祚運夙夜祗厲懼不克周永惟風敎之流弊甿俗之疾苦思布濟時之政宜𢎞利物之澤庶有以導迎和氣感致懽心宜申在宥之恩用啓自新之路可大赦天下自元和十五年二月五日昧爽已前大辟罪已下罪無輕重咸赦除之唯官典犯贓及故殺人者不在免限左降官量移近處已經量移者更與量移如復資者即任依常調選責授降資正員官者亦與進改亡官失爵不齒者量加收敘流人及僧尼道士移𨽻者節級放還及移近處諸色得罪人中如先有勅去縱逢恩赦不在放還之限者亦並與量移若曾任五品已上官者奏待進止左降官及流人先有官者如亡殁各還本官自今日已前曾有㾗累禁錮等一切竝與洗滌永惟罔極弓劍不留號奉終天用深哀感應緣山陵制度䘮儀禮物冝委中書門下及諸司長官等博詢故實務遵禮度必誠必信副朕哀懐所縁山陵造作及橋道置􅉐並以内庫錢充不得輒令科配百姓度支諸州府監院從貞元八年已後至元和十年已前共記欠錢一百一萬五千九百餘貫鹽鐵使諸監院應欠元和十三年已前錢物除準前制䟽理外共欠一百八萬八千六百餘貫石等户部諸州府從建中三年以後至元和十三年已前應欠在州貧竆并遭水旱逃亡百姓腹内兼連接淮西南賊界并燒刼散去及賑貸百姓錢物五十萬九百餘貫石等京兆府從元和五年已後至三十年已前欠諸色錢物共四十一萬九千五百餘貫石束等州府監院百姓欠負但在官典所由腹内者一切放免諸州府除京兆河南府外應有官莊宅舖店碾磑菜園鹽畦車坊等宜割屬所管官府諸道除邊軍營田處其軍粮既取其正税米分給其所管田自為軍中資用不合取百姓營田并以瘠薄地廻授百姓濃肥地其軍中如要營田任取食糧健児不得輒妄招召天下百姓等自屬艱難棄其鄉井戸部版籍虗繫姓名建中元年已來改革舊制悉歸兩税法久則弊奸濫益生自今已後冝準例三年一定兩税非論土著客居但據資産差率其擇刺史縣令冝委門下中書省御史臺官有所諳知即具聞薦如贓汚殘人當坐舉主𣙜税之法雖合同遵瘡痍之餘姑欲寛假其河北税鹽宜委度支與𣙜鹽使審細商量具條疏聞奏内外百官食利錢一倍至五倍已上節級放免仍每經十年即内外百司各賜錢一萬貫充本各據司大小公事閒劇及當司貧富作等級付應屬諸軍諸使諸司人等在村鄉及坊市舖店經紀者宜與百姓一例差科不得妄有影占如有違越所司具屬司并人名奏聞如聞度支鹽鐵院等所在影占富商高戸庇人院司不伏州縣差科疲人偏苦事轉不濟如有此色仰當日勒歸諸州縣道除正勅率税外不得妄託進奉擅有諸色權率天下州府除兩税合送上都錢物乃所繇常貢外輙不得别進錢物并方鎭得替後至城亦不得輒有進獻掖庭籍没罪人妻子等宜並放歸親族其諸軍先擒吐蕃生口配在諸處者並放歸國願住者亦聽内外文武見任及致仕官三品以上賜爵一級四品以下加一階諸道諸軍將士等普恩之外賜階爵有差二王三恪文宣王及公主縣主嗣王節級賜與二子官及出身宗子才行者委以名聞奏仍委中書門下量才叙用皇王等已上親皇太后二等已上親並賜階爵武德已來配饗及第一等功臣并張廵許逺南霽雲顏眞卿杲卿等尚父子儀贈大尉秀實子孫中與一子官有差其中有才行堪任臺省者量才叙用中書門下竝諸道節度使諸州府長官東都留守及京常叅官諸軍使等父母祖父母並節級與追贈父母存者與官封已經追贈更與改贈興元奉天功臣及蔡鄆立功將士普恩之外更賜勲爵亡殁者與追贈中書門下及節度等使東都留守度支鹽鐵使京兆尹諸州刺史等賜一子官有差在城諸軍將士節級賞賜仍加階爵京西京北及振武天徳八道節給都防禦使下及神䇿一十二鎮將士等共一十八萬六千七百餘人都賜物一百八萬一千八百餘疋東宫官及侍讀普恩之外賜爵加階仍普與進改自國哀及行事命職事官普恩之外賜階爵及勲其受顧命撰制誥及册文并寫制誥官等特加一階賜爵一級並賜上柱國優與進改書册官特加一階尊親之禮即展於徽章廣愛之恩宜申其慶賜皇太后諸親委中書門下量第等節級優賞文武常叅官及外官職事五品已上有母者並加邑號如已至郡太夫人者許回授周親應縁皇太后册禮職事官並節級賜天下百姓父母祖父母年高者賜粟帛城内蕃客等並節級賜今年正月二十八日至閏正月二日宫苑諸門守捉西内立仗將士等量加改轉應内侍省及内防宫正等並賜勲爵常叅官及諸州刺史少尹赤令有先得替及因病假滿百日解官并終制未授官者及致仕官並與進擬天下諸道州不得擅有閉糴禁錢務令通濟内外文武官及諸色人中任上封事極言時政得失才有可觀别當甄奬應外色役等賜勲有差十一月制王承元首陳章疏願赴闕廷宜令諌議大夫往鎭州宣慰王澤所洽天網方恢宥過釋寃與人休泰其管内見禁囚徒罪無輕重並冝赦免長慶元年正月辛丑郊禋禮畢御丹鳳樓大赦改元制曰朕聞自昔盛王之所以合天地諧神人莫過乎誠致其誠展其敬莫重於祭祭之大者莫大於郊廟故必躬行而心奉之然後百靈助慶萬國蒙福此帝王之孝也我國家祖功宗徳立號配天日月所炤雨露咸被孝思善繼聖敬允升郊丘歲奉於嚴禋宗廟時修其明薦朕以冲昧自獲纘承仰荷睠命懼不克享幸天多祐俾嵗大穰河朔底寧邊封靖謐及此元日至於上辛式遵典禮有事郊廟當祗見之夕感慕增懐洎大報之辰誠敬彌勵因體元而紀號用敷化之覃恩可大赦天下改元和十六年為長慶元年自正月三日昧爽已前大辟罪已下罪無輕重咸赦除之唯故殺人者十惡内者及官典犯贓不在免限左降官量移近處如復資便任選亡官失爵不齒者量加收叙左降官及流人先有官者如已亡歿者各還本官天下百姓今年夏税每貫放一百五十文州縣應徴科兩税𣙜酒錢内舊額須納見錢數者並任百姓隨所有段疋斛㪷依常處時價送納不得邀索見錢度支鹽鐵户部應納税茶兼糶鹽中須納見錢者亦與時估段疋及斛㪷如情願納見錢亦任穏便任永為常式其公私便換錢物先已禁斷宜委京兆府切加覺察應度支鹽鐵户部三司官吏所繇欠負元和十三年已前諸色錢物斛㪷委本司盡底勘責如是入已隱欺即準條處分如縁欠折攤徵元保外可納者宜並與疏理諸軍使亦準此處分兩税外不得别有差率刺史如違越觀察使舉奏觀察使事􅆾格勅刺史不得輒受中使及郎官御史奉使所在並不得與人事物諸道諸州縣宜委中書門下及觀察使刺史量閒劇形便可併省者事宜聞奏河北諸道管内宜各委本道團定兩税務令均濟河北州縣凋殘户口未復其官各據郡邑大小量公事留置餘並停應諸道管内百姓或因水旱兵荒流離死絶見在桑産如無近親承佃委本道觀察使於官健中取無莊園有人丁者處多少給付便與公驗任充永業不得令有力職掌人妄為請射其官健仍借種糧放三年租税榷酒有以分配百姓處又置酒店官酤并諸色榷率切宜禁斷亡官失爵放還流人有田莊不經没官被人請射本官及子孫到並委却還天下諸色人中有精通一經堪為師法者委國子祭酒訪擇其有課績特殊堪在朝奬者臺省官有闕宜先選擢自今郡守恪奉詔條清潔可紀四考與轉諸道或閉糴禁錢自為條約切宜禁斷其内外文武及致仕官三品已上賜爵一級四品已下各加一階陪位白身人賜勲兩轉故尚父子儀汾陽王贈太師晟贈太尉秀實各與一子八品官顔眞卿杲卿張廵許逺南霽雲各與一子出身武徳已來功臣子孫量加奬用中書門下及節度使帶平章事各與一子八品正員官祖父母及父母並與贈官封父殁母存與邑號已贈已封者更與追贈及邑號禮儀使大禮使度支鹽鐵使京兆尹各與一子出身文武常叅官并致仕官及諸道節度觀察經畧等使及神策等諸軍使父見存者量與致仕官母存者與邑號父母亡與贈官及邑號東都留守及諸道節度觀察經畧等使神䇿六軍大將軍威逺鎮國軍使各與一子出身陜州奉先興元功臣更賜勲爵有差身歿未經追贈者並與追贈應縁大禮移仗宿衞御樓立仗將士普恩之外贈爵有差仍準舊例賜錢物二十萬四千九百六十端疋貫大禮職掌行事官及留守等更賜勲爵及加階升壇殿行事官更特加一階應在城内蕃客等賜物有差常叅官及刺史有停替及病假解官及中制未授官委中書門下量才進擬其有情願授致仕官者亦聽天下諸色人中有賢良方正能直言極諫博通墳典逹於教化軍謀宏逺堪任將帥政術詳明可以理人者委有司各舉所知限今年十月到上都天下百姓高年者賜米及綿絹有差七月壬子册尊號禮畢御丹鳳樓宣制曰我高祖太宗化隋為唐奄宅區夏包舉海内全付子孫其何事哉彼昏盈而我勤勞也明皇承之能大其業六戎八蠻罔不貢奉繇是庶尹弛政庶吏弛刑視人不勤視道不謹燕冦勃起動無藩籬六十有七年兵革大試其何事哉據安逸而易萌漸也逮我聖父勤身振攘斬斷誅除天下畧定曾是幽冀賜予懐來荷頼景靈丕訓不墜環嵗之内二方平寧粤予何功時帝之力而卿大夫猥以大號加予𦕈身讓於四三益甚其請皇太后始聞其事懽然慰心慈㫖下臨臣誠上迫祗受典禮懍乎予懐尚念昔者七十二君莫不升中慶成自以為堯舜莫已若也然而不為堯舜之行者來代無傳焉朕常推是為心不欲名浮於實今卿大夫謂我為文武孝德矣其將何道以輔予予其業業兢兢日慎一日慕陶堯虞舜之行以自勉思文武憲章之道以自勤予苟不思無忘納誨於戲溢美之名既不克讓潤物之澤夫何愛焉可大赦天下自長慶元年七月十八日昧爽以前罪無輕重咸赦除之唯故殺人并官典犯贓不在限應左降官及流人未經量移者宜與量移近處有左降官流人本因犯贓得罪者宜依今年正月三日制處分京畿諸縣度支鹽鐵户部欠負各疎理放免有差經戰陣之處所在州縣收瘞遺骸仍量事賜與槥櫝兼以禮致祭李師道呉元濟自絶於天並從誅滅念其祖父嘗事先朝墳墓所在並不得令人擅有毁發愛人本於省賦雖必在輕國用出於地財又安可闕今淮蔡并山東率三十餘州約數千里頒賜或踰於鉅萬給復有致於連年應河南北等州給復限滿處置宜委所在長吏審詳墾田开桑見定數均輸税賦兼濟公私毎定税訖具所增加申奏其諸道定戸宜委觀察使刺史必加審實務使均平京兆府亦宜準此其百司職田在京畿諸縣者訪聞本地多被所繇侵隱抑令貧户佃食蒿荒百姓流亡半在於此宜委京兆府勘㑹均配務使公平其京兆府百姓屬諸軍使者冝令各具挾名勅下京兆府一户之内除已屬軍屬使餘父兄子弟據令式年幾合入色役者並令京兆府明立簿籍並同百姓一例差遣頻年已有制勅分委京兆府舉舊章條聞奏刑獄所繫理道最切如聞比來多有稽滯一拘囹圄動變炎凉自今已後宜令御史臺切加訪察毎季差御史廵囚事渉情故或斷給不當有失政刑具事繇聞奏其天下州縣並委御史臺并出使郎官御史兼諸道廵院切加察訪近邊所置和糴皆給實價如聞頃來積弊頗甚美利盡歸於主掌善價不及於村閭或虗招以奉於彊家或廣僦用資於㳺客若不嚴約弊何可除冝委度支精擇京西北應供軍糧并和糴院官并營田水陸運使切加訪察仍作條䟽檢轄速具奏聞應停諸道終年勾并不許刺史上使并録事叅軍不得擅離本州委御史臺切加糾舉内外文武見任并致仕官各賜爵有差神策六軍金吾威逺皇城將士普恩之外各賜勲三轉大長公主長公主嗣王郡主縣主神策六軍金吾威逺皇城等諸軍將士統軍已下并將士等長行立仗及守本軍本營者各賜物有差鴻臚禮賔院應在城内蕃客等並節級賜物隂山貴女來迓天孫㑹玉明庭克觀盛典念吾妹之將逺於賔禮而宜加其回鶻公主别有賜物攝侍中讀寶户部侍郎平章事杜元頴讀册官中書侍郎平章事崔植各加一階譔册文官與一子正員官奉寶綬書玊册官書寶官各加兩階進寶綬進中嚴外辦禮儀贊導押册押寶綬舁寶册官各加一階其餘應職掌行事官并冩制書官太常修撰儀注禮官并内定行事中使三品已上賜爵一級四品已上加一階仍並賜勲兩轉鐫造玊册并塡金字造寶裝寶官等各賜物五十段尊師重傅有國嘗經李逄吉韋綬薛放丁公著等普恩之外各加一階如已至三品四品者賜爵一級天下百姓年九十已上委所在長吏量加存問孝子順孫義夫節婦先以旌表者亦量加優恤五岳四瀆名山大川并自古聖帝明王忠臣烈士各令所在以禮致祭二年十二月乙未帝以疾痊平勅在京諸司疏放繫囚癸丑制曰朕上奉宗祧下臨邦國承烈祖垂鴻之慶當累聖奕葉之尊祗膺寶圖敬守丕業體明離立象之重表青宫建嗣之崇元良以貞國本斯固皇太子湛恭孝温文生知夙禀日者春闈尚曠東序未興朕常訓以義方舉明嚴敬匪資調護已逹詩書克保承休爰當主鬯膺兹典禮慶感良深踐位少陽允孚明命用𢎞惠澤庶洽兆人自長慶二年十二月二十日昧爽已前天下應罪合死除犯贓降從流罪已下逓減一等左降官及流人並與量移亡殁者任歸葬文武常叅官及諸州府長官子為父後者賜勲兩轉縁册太子攝大尉稱賀攝侍中承㫖宣制進中嚴外辦攝中書令讀册授册各賜爵一級其行事職掌官及書寶𢎞册寶舁舉册寶禮儀使禮官等三品已上賜爵一級四品已下加一階撰册文官特加一階仍並賜物有差導引官各加一階鐫造册寶及禮生等賜勲有差文武常㕘及陪位官并宗子諸親賜勲一轉景王府官量與進改夫師賢友善庶發清明習近性遷必資𢎞道所以愼簡師傅用保元良其太子侍讀宜委中書門下精擇二人具名聞奏敬宗以長慶四年正月丙子卽位三月壬子御丹鳳樓大赦天下自長慶四年三月二日昧爽已前大辟罪已下罪無輕重常赦所不原者咸赦除之左降官縱元勅云終年不齒者亦與收録諸色得罪人先有勅云縱逢恩赦不在免限並别勅安置者亦放還京畿諸縣應今年夏青苗錢並宜放免秋青苗錢并河南府夏苗錢每貫放二百文其京兆府路所放青苗錢外更放錢五萬貫斛㪷五萬石河南府除所放青苗錢外亦更量放錢三萬貫斛㪷三萬石其天下常貢之外更不得别有進獻縱節度觀察使入朝亦不得進奉諸道監軍自今後在本道并入奏並不得進天下所貢竒綾異錦雕文刻鏤一事已上有渉踰制者悉斷至於䘮葬嫁娶車馬衣服事闗制度不合踰越委中書門下明立科條頒示天下有不守者御史臺及出使郎官御史嚴加訪察節級科處其六宅十宅諸王女宜令毎年於選人中擇端良者降嫁老宫人及殘病不堪使役并有父母羸老疾病者並委所司選擇放出鷹犬之類本備蒐狩委所司量留多少其餘並解放仍勒州府更不得進來宫禁經費及乗輿服膳委所司起今年三分其本色物價及水陸脚價一半委度支收管一半便任本州收充助貧下戸闕額税錢其元和已來兩河節度使全家歸闕者如張茂昭王承元程權劉聰田𢎞正等五家在本道日所有債負并有異於法制之事被人言訴者一切不得為理仍各與一子正員官天下州府財物有餘羨者委觀察使及所管州郡約舊事費用者條件繇中書門下便差官類例詳定可留可去者聞奏務從寛濟勿使難守其餘羡錢非兩税外徴率並不用勘問自今已後州府所申戸帳及墾田頃畆宜據見徴税案為定後與戸部類㑹具單數聞奏仍勒五年一定税如有逃亡死損州縣須隨事均補亦仰年終申戸部如有隱漏委御史臺及所廵院察訪聞奏天下兩税及諸色𣙜糧税等錢弊重輕須有損益亦委中書門下條疏聞奏諸道除正勅率税外不得擅有諸色𣙜税渉擾人並宜禁斷其軍屯營種有侵占丁田課役税戸者宜委御史臺切加訪察仍限勅到一月内毎道各具所還州縣頃畆分折聞奏其諸軍先擒獲吐蕃生口配在諸處者宜委本道資給放還本國天下諸州府縣官吏應行鞭捶本罪不致死者假以責情致令殞斃毎念於此良增惻然宜委御史臺及出身郎官御史等切加察訪仍具事繇聞奏天下諸色人中有賢良方正能言直諫經術優深可為人師詳閑吏理逹於教化軍謀宏逺堪任邊將者委常叅官并諸道節度觀察使諸州刺史各舉所知限來年正月到上都其所在淫祠不合禮經者並委長吏禁斷寶歴元年正月辛亥祀昊天上帝於南郊禮畢還御丹鳳樓大赦天下改長慶五年為寶歴元年正月七日昧爽已前大辟罪已下罪無輕重已發覺未發覺已結正未結正繫囚見徒常赦所不原者咸赦除之官典犯贓不在此限左降官自長慶四年三月三日制後未量移者並與量移近處已經量移者更與量移常叅官及諸州刺史有先因停替及病解假官并制未授官者委中書門下量才進擬諸州先擒獲吐蕃生口配流諸處者委本道資給放還邊上仍不得更受投降人并擒捉生口天下諸色人中能精通一經堪為師法者委國子祭酒訪擇具名以聞天下州縣各委刺史縣令招延儒學明加訓誘大理寺官比來吏部所授多非其才冝令精選有志行詞學兼詳明法律者注擬其課績特殊堪任朝奬者臺省有闕冝先選擇如聞去冬吏部所選人駁放者衆或文狀乖錯或書判差池主司守文不得不爾既施惠澤亦在霑恩其長名及雜駁選人如有未離京城者委吏今月内簡勘除渉踰濫者餘并却收以比逺殘闕注擬如不情願不可彊之朕卽位之初已有赦令至如損撤服御止絶他獻限䘮葬以息淫費禁竒靡以專女工他徭擅賦閉糴禁錢吏行姦欺人曷依庇僧道踰濫流貶重輕錢弊利害軍屯侵占車馬衣服之制未幾廢格已多或職司惰慢而不能將明或詔書纔行而已下不守以此求理不亦難乎其元和已來詔并長慶四年三月三日赦令有委廢不行事在朕躬者諫官直言得失無有所隱其在臺閣者左右承據詔條勘舉具事繇聞奏刺史縣令已後無過犯未滿三周年不得除替如理行尤異但議就加其有才宜他職灼然章著者中書門下先具事繇及授上年月奏聽進止四月癸巳册尊號禮畢大赦天下自寶歴元年四月二十日昧爽已前大辟罪已下罪無輕重咸赦除之左降官已經量移者宜與量移近處京百司職田散在畿内諸縣舊制配地出子嵗月已深佃户致有流亡官曹多領虗數欲令據額均入地盤萬户供輸百司盡得隨税出子逐畆平攤比量舊制孰為允便宜委京兆時與屯田審計㑹條流聞奏如聞京城諸司捕繫推鞫動經旬時每季御史廵囚罕能舉劾積成寃滯為弊頗深宜重舉明長慶元年七月十八日赦件聞奏京畿百姓多屬諸軍諸使或户内一人在軍其父子兄弟皆不受府縣差役頃者頻有制勅等分如聞尚未遵行宜委京兆府亦舉明前後條制聞奏内外文武見任及致仕官賜爵加階有差文宗太和元年正月乙巳御丹鳳樓大赦天下制曰朕聞古先哲王之為理也修己以安百姓恤刑而矜庶獄端立政以謹始𢎞厚澤以體仁推其禮以及於物誠於中而化於外和氣斯洽休徴以臻故兵革不試而四海寧疵癘不作而三靈泰我有唐祖武宗文光宅天下列聖承統遂康區中漸濡丕冒掩軼前載𢎞兹道以騰英聲煥其文以耀終古惟此鴻業屬予冲人荷無疆之丕構託於兆人之上晝􅅥宵儆惄焉如疾抑惟宗社儲休神祗恊力克靖内難恢復皇綱思布和以立極爰正風於更始因體元紀號之典舉肆眚覃恩之命昭我恤隱與人惟新可大赦天下改寶歴三年為太和元年正月十三日昧爽已前大辟罪已下罪無輕重已發覺未發覺已結正未結正見繫囚徒常赦所不免者咸赦除之惟十惡五逆及故殺人官典犯入己贓不在於免限左降官量移近處已經量移其合復資者五品已上中書門下速與處分六品已下任從常例選丁憂去任在憂未赴貶所者服闋日亦與量移如有親故在上都任經本司陳狀不必更待州府申請流貶之中縱勅不量許多者及言終身勿齒者亦與例依處分亡官失爵各與收叙㾗累禁錮並從洗滌其縁去年十二月八日坐累流𨽻者不在此限應縁山陵制度及䘮儀禮物冝委中書門下及諸司長官轉詢故實務遵禮度必誠必信副朕哀懐所縁山陵造作及橋道置􅉐所資並以内庫錢物充用如不足以度支户部錢充京兆府今年夏税青苗量放一半太皇太后第二等已上親大行皇帝皇太后第一等親委中書門下量才叙用九廟子孫陪位者加兩階仍據始封每王後與一人出身委宗正卿簡尋圖譜取一房最沉翳者充數具名聞奏内外文武官及諸色人任上封事極言得失無有隱諱天下諸色人中有賢良方正能直言極諫者及經學優深可為師法詳閑吏理逹於教化軍謀宏逺堪任將帥者常叅官及方牧郡守各舉所知無人舉者亦聽自舉并限來年正月到上都今年正月十四日上皇太后尊號及朕受册進寶譔卽位册文承㫖宣制等官各與一子正員七品官江王府官去年十二月已前在任者並與改進其去年十二月九日立功將士普恩之外三品已上更賜爵一級四品已下更加一階其赴難軍使兵馬使都虞候將士等仍各與改轉名衘聞奏是日立㐲兵士南北軍合二萬人翰林學士並升樓備顧問六月乙卯詔曰朕聞動人以行不以言應天以實不以文盖明誠者感通之大本也刑德者隂陽之大倫也故五事陳於洪範時令著於禮經雖堯湯之災或丁於天數而休咎之萌必徵乎人事朕祗荷大統子視兆人宵衣昃食不敢自逸猶慮上心不逹於下下志不通於上是以正朝延聽便殿訪求事之益者罔不行弊之壅者罔不去庶乎交感以致洽和而誠有所未臻應有所未逹自春及夏亢陽為害雖麥秋大稔而禾歲未登京畿之間隂陽小爽齋禱備至膏澤未濡中心惻然思所以濟豈庶獄之未孚將一夫之不獲永用惕戒載懷哀矜其京畿見禁囚徒犯死罪非故殺人者並降流流已下罪逓減一等依令有司約禮禱祠宗廟徧祈山川務盡莊敬以副予志百司庶務有不便於人者各委長吏悉心陳列無使壅於下聞其寶歴二年十二月二十七日勅及今年二月十二日赦條所釐革施行未畢者宜舉中書門下速與處分朕志唯克己誠在恤人自臨御已來躬行不逮乃者永虞艱食瞻仰昭回幽禱移災蔬食逾月益罷浮費用嚴天譴尚懼明有未燭道有未宣聞於神者無馨香施於理者或繆戾終夕三省履氷在懷内外卿士有規朕以道宜封事條奏宰衡庶尹侯衞守長各勵乃職庶承於天休三年十一月甲午有事於南郊禮畢御丹鳳樓大赦天下四方並不得輒以雜様難成非常之物為獻其於纎麗若花絲布繚綾之類並禁斷勅到一月機杼一切焚棄刺史分憂得以專逹事有違法觀察使然後舉奏如聞州司常務巨細所裁官吏移攝將士解補占留支用刑獄等動須禀奉不得自專雖有政能無所施設選置長吏將何責成宜委御史嚴加察訪亷使奏聽進止判官不能規正及刺史不守朝章量加貶降若所管州郡控接蕃夷軍戎之間事咨前制即不在此限六年正月壬子詔曰朕聞天聽自我民聽天視自我民視朕之菲德渉道未明不能調序四時導迎善氣自去冬已來踰月雨雪寒氣尤甚頗傷和氣念兹庶甿或罹凍餒無所假貸莫能自存中宵載懐旰食興歎怵惕若勵時予之辜思𢎞惠澤以順時令其天下犯死罪除官吏犯贓及故殺人者餘並降從流流已下逓減一等應京畿諸縣宜以常平倉斛㪷賑恤京城内鰥寡癃殘無告不能自存者委京兆尹量事濟恤具數以聞言念赤子視之如傷天或儆予示此隂沴撫躬夕惕予甚悼焉七年八月庚寅册皇太子禮畢制曰帝者承天地貞邦國法明離之象固鴻業之本必命元子以備儲闈斯皇王之令謨古今之丕典祗受眷祐䖍恭寳圖欽若彛章光修聖緒皇太子永㓜禀仁智生知孝愛體温文以立徳資敏哲以保躬寛裕有常貞愼無怠爰膺盛禮俾奉青宫嚴宗廟主鬯之儀遵朝夕視膳之節册命云畢感悦良深問安既慶於寢門布澤宜覃於天下自太和七年八月七日昧爽已前天下應犯死罪從流流已下逓減一等唯官典犯贓及故殺人刼獄奪囚持杖強刼者不在此限左降官流人並與量移如因流貶及諸色得罪人所在亡殁並許歸葬宗周之盛實在於維城二漢之隆亦繇於磐石自開元已後累聖子孫皆長於深宫罔知稼穡曽不得習詩書以修禮樂交氣類以叙人倫雖有間出之才莫施魯衞之政永言淪廢深疚朕懐諸王等宜以今年已後相次出閣宜授緊望已上刺史上佐觀其才能續有叙用人倫所先婚禮為重笄年許嫁則有明文其十六宅諸縣主等宜選良偶以時出適仍委吏部乃於諸色人中選簡令具名聞奏漢代用人皆由儒術故能風俗深厚教化興行近日苟尚浮華莫修經藝先聖之道堙蕪不傳况進士之科尤要釐革雖鄉舉里選不可復行然務實抑華必有良術既當甚弊思其改張今寰宇人寧干戈已戢皇太子方從師傅授五經一二年之後當令齒胄國庠以興墜典宜令國子監於諸道搜訪名儒置五經博士各一人其公卿士族子弟明年已後不先入國學習業不在應明經進士之限其進士舉冝先試帖經并略問大義精通者次試議論各一道文理高者便與及第其所試賦並停其試經官便以國子監學官充禮部不得别更奏請𢎞文崇文兩舘生齋郎並依令式試經畢仍差都省郎官兩人覆試卿大夫者下人之所視逺方之所倣若非恭儉克己亷貞化人而望其服從固不可得况朕不寶珠玊不御纎華逮於六宫皆務儉薄卿大夫得不叶朕此志率先兆人比年所頒制度皆約國家令式去其甚者稍謂得中而士大夫苟自便身安於習俗因循未革以至於今百官士族起今年十月服冬裘已後其衣服輿馬並準太和六年二月十七日勅處分如故違制度九品已上量加黜責其布衣五年不得舉選百姓軍人各委州府長吏漸施教化使自遵行不要便為禁制令其驚擾惠飬疲人本於亷吏阜其生殖在絶貪求其諸道方鎭刺史等有聚斂貨財濳行餽遺者委御史臺糾察以聞仍委度支鹽鐵分廵院同為訪察不得容蔽親人之官切在守長久於其道政乃可成其方鎭刺史三考已下者不得輙議替換如治有異等委中書門下訪察就加寵奬如灼然可録者别與甄升其或政有乖理害及百姓者即不在滿三考限易譏豐屋傳羙卑宫雕刻礱磨先賢所戒近者官纔升於郎署位始至於郡符莫不高其閈閎廣以池榭非唯僭侈踰制實亦耗蠧傷財其百官等宅已造成者並許仍舊今日後如更有創立新宅及屋室高大者並委御史臺糾弹必嚴加黜責御史臺所置六察分糾百司比來因循鮮能舉職起今以後諸司如有身名偽濫隱盜官錢及違法等事他處發覺者監察御史並當貶斥考課之法前王所重盖以綜覈吏理勵精政途名實苟違將何沮勸宜準故事置内外知考使兼令中書舍人給事中各一人監考百姓困窮弊繇奸吏政苟不擾人皆自安其司農寺宫供内及諸厨冬藏菜並委本寺自供其菜價仍委京兆府約每年時價支付更不得配京兆府和市其諸陵守當夫宜委京兆府以價直送陵司令自顧召並不得差配百姓應寒食雜差配及樹栽修橋柴木選塲棘等便於本戸税錢内尅折不得更令和市天下諸州府應納義倉及諸色斛㪷二合耗外切宜禁斷仍委度支鹽鐵分廵院及出使郎官切加訪察其義倉斛㪷先有借用處委户部勾當並須及時塡足文武常叅官及諸州府長官子為父後者賜勲兩轉應縁册禮行事官賜爵加階加勲并賜物有差魯王府官未經進改者量與進改其皇太子侍讀宜委中書門下精選二人具名聞奏天下孝子順孫先旌表門閭者及高年廢疾者委所管州縣各加存恤册府元龜卷九十
