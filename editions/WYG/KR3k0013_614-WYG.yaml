body:
  text: 册府元龜卷六百十四宋王欽若等撰刑法部議讞周官議獄羣士各麗其法漢制疑罪天下各讞所屬盖慮夫文法之失實而人心之不厭也故議事以制先民所述有司請讞禮經攸載則聽訟之職斯為重矣漢承秦弊禁網漸濶一成之典思求大中於是原其本心與衆定罪魏晉以下其論彌著若夫律令之設科條實繁世有輕重之殊法有貪涼之變事茍涉於疑似罪寧失於不經惟君子之盡心雖濡首而求濟非夫操心如秤不私于物昭然獨見無畏強禦則何能激發正論折中羣惑簡孚厥罪澄清庶獄者哉漢趙増壽為廷尉成帝時東萊郡黑龍冬出人以問陳湯湯曰是所謂𤣥門開微行數出出入不時故龍以非時出也又言當復發徙傳相語者十餘人丞相御史奏湯惑衆不道妄稱詐歸異於上非所宜言大不敬增壽議以為不道無正法以所犯劇易為罪臣下丞用失其中故移獄廷尉無比者先以聞比謂相比付者所以正刑罰重人命也明主哀憫百姓下制書罷昌陵勿徙吏民己申布湯妄以意相謂且復發徙雖頗驚動所流行者少百姓不為變不可謂惑衆湯稱詐虚設不然之事非所宜言大不敬也制曰廷尉増壽當是當謂處正其罪也湯前有討郅支單于功其免湯為庶人徙邊孔光為廷尉時定陵侯淳于長坐大逆誅長小妻廼始等六人皆以長事未發覺時棄去或更嫁及長事發丞相方進大司空武議翟方進及何武以為今犯法者各以法時律令論之此具引令條之文也法時謂始犯法之時也明有所訖也訖止也長犯大逆時廼始等見為長妻已有當坐之罪與身犯法無異後乃棄去於法無以解解免也請論光議以為大逆無道父母妻子同産無少長皆棄市欲懲犯法者也懲創止也夫妻之道有義則合無義則離長未自知當坐大逆之法而棄去廼始等或更嫁義已絶而欲以為長妻論殺之名不正不當坐有詔光議是御史中丞鄭衆哀帝初博士給事中申咸毁故宰相薛宣不供養行喪服薄於骨肉前以不忠孝免不宜復列封侯在朝省宣子右曹侍郎况數聞其語賕客楊明欲令創咸面目使不居位㑹司𨽻缺况恐咸為之遂令明遮斫咸宫門外斷鼻唇身八創事下有司衆等奏况朝臣父故宰相再封列侯不相敇丞化而骨肉相疑疑咸受弟修言以謗毁宣咸所言皆宣行迹衆人所共見公家所宜聞况知咸給事中恐為司𨽻舉奏宣而公令明等廹切宫闕要遮創戮近臣於大道人衆中欲以鬲塞聰明杜絶論議之端鬲杜塞也桀黠無所畏忌萬衆諠譁流聞四方不與凡民忿怒爭鬬者同臣聞敬近臣為近主也禮下公門式路馬過公門則下車見路馬則撫式盖崇敬也式車前橫木君畜産且猶敬之春秋之義意惡功遂不免於誅遂成也言舉意不善雖有成功猶加誅上浸之源不可長也浸近也言傷戮大臣有所逼近也浸或作侵侵犯也其義兩通况首為惡明手傷功意俱惡手傷人為功使人行傷人者為意皆大不敬明當以重論及况皆棄市廷尉直以為律曰鬬以刃傷人完為城旦其賊加罪一等與謀者同罪詔書無以詆欺成罪詆毁也傳曰遇人不以義而見疻者與痏人之罪鈞惡不直也以杖手毆擊人剥其皮膚腫起青黒而無創瘢者律謂疻痏遇人不以義為不直雖見毆亦與毆人同罪也咸厚善修而數稱宣惡流聞不義不可為直言咸為修而毁宣是不義而不直况以故傷咸計謀已定後聞置司𨽻因前謀而趣明非以恐咸為司𨽻故造謀也本爭私變雖於掖門外傷咸道中與凡民爭鬬無異殺人者死傷人者刑古今之通道三代所不易也孔子曰必也正名名不正則至於刑罰不中刑罰不中則民無所措手足論語章孔子之言也錯置也音于故切今以况為首惡明手傷為大不敬公私無差春秋之義原心定罪原謂尋其本也原况以父見謗發忿怒無他大惡加詆欺輯小過成大辟輯與集同集合也陷死刑違明詔恐非法意不可施行聖王不以怒増刑明當以賊傷人不直以其受財也况與謀者皆爵減完為城旦以其身有爵級故得減罪而為完也况身及同謀之人皆從此科帝以問公卿議臣丞相孔光大司空師丹以中丞議是自將軍以下至博士議郎皆是廷尉况竟減罪一等徙敦煌宣坐免為庶人歸故郡卒於家後漢梁統建武中為大中大夫在朝廷數陳便宜以為法既輕下姦不勝宜重刑罰以遵舊典乃上疏曰臣竊見元哀二帝輕殊死之刑以一百二十三事手殺人者減死一等自是以後著為常准故人輕犯法吏易殺人臣聞立君之道仁義為主仁者愛人義者政理愛人以除殘為務政理以去亂為心刑罰在衷無取於輕是以五帝有流殛放殺之誅三王有大辟刻肌之法故孔子稱仁者必有勇又曰理財正辭禁民為非曰義高帝受命誅暴平蕩天下約令定律誠得其宜文帝寛惠柔克遭世康平唯除省肉刑相坐之法他皆率繇無革舊章武帝値中國隆盛財力有餘征伐遠方軍役數興豪傑犯禁姦吏弄法故重首匿之科著知從之律以破朋黨以懲隠匿宣帝聰明正直總御海内臣下奉憲無所失墜因循先典天下稱理至哀平繼體而即位日淺聽斷尚寡丞相王嘉輕為穿鑿虧除先帝舊約成律數年之間百有餘事或不便於理或不厭民心謹表其尤害於體者傅奏於左伏惟陛下包元履德權時撥亂功踰文武德侔高皇誠不宜因循季末衰微之軌回神明察考量王失宣詔有司詳擇其善定不易之典施無窮之法天下幸甚事下三公廷尉議者以為隆刑峻法非明王急務施行日久豈一朝所釐統今所定不宜開可統復上言曰有司以臣今所言不可施行尋臣所奏非曰嚴刑竊謂高祖以後至乎孝宣其所施行多合經傳宜比方今事驗之往古聿遵前典事無難改不勝至願願得召見若對尚書近臣口陳其要帝令尚書問狀統對曰聞聖帝明王制立刑法故雖堯舜之盛猶誅四凶經曰天討有罪五刑五庸哉又曰爰制百姓於刑之衷孔子曰刑罰不中則民無所措手足衷之為言不輕不重之謂也春秋之誅不避親戚所以防患救亂全安衆庶豈無仁愛之恩貴絶殘賊之路也自高帝之興至於孝宣君明臣忠謨謀深博猶因循舊章不輕改革海内稱理斷獄益少至初元建平所減刑罰百餘條而盜賊浸多嵗以萬數間者三輔從橫羣軰竝起至燔燒茂陵火見未央其後隴西北地西河之賊越州度郡萬里交結攻取庫兵刼掠吏人詔書討捕連年不獲是時天下無難百姓安平而狂狡之埶猶至於此皆刑罰不中愚人易犯之所致也繇此觀之則刑輕之作反生大患惠加姦宄而害及良善也故臣統願陛下採擇賢臣孔光師丹等議上遂寢不報杜林建武中為光禄勲時羣臣上言古者肉刑嚴重則人畏法令今憲律輕薄故姦宄不勝宜増科禁以防其源詔下公卿林奏曰夫人情挫辱則義節之風損法防繁多則茍免之行興孔子曰道之以政齊之以刑民免而無恥道之以德齊之以禮有恥且格古之明王深識遠慮動居其厚不務多辟周之五刑不過三千大漢初興詳覽失得故破矩為圓斵彫為樸蠲除苛政更立疏網海内歡欣人懐寛德及至其後漸以滋章吹毛索疵詆欺無限果桃菜茹之饋集以成贓小事無妨於義以為大戮故國無亷士家無完行至於法不能禁令不能止上下相遁為弊彌深臣愚以為宜如舊制不合翻移光武從之郭躬辟公府明帝永平中奉車都尉竇固出擊匈奴騎都尉秦彭為副彭在别屯而輒以法斬人固奏彭專擅請誅之帝乃引公卿朝臣平其罪科躬以明律召入議議者皆然固奏躬獨曰於法彭得斬之帝曰軍征校尉一綂於督督謂大將彭既無斧鉞可得專殺人乎躬對曰一綂於督者謂在部曲也今彭專軍别將有異於此兵事呼吸不容先關督帥且漢制棨㦸即為斧鉞於法不合罪有衣之㦸曰棨帝從躬議章帝元和末為廷尉章和元年赦天下繫囚在四月丙子以前減死罪一等勿笞詣金城而文不及亡命未發覺者躬上封事曰聖恩所以減死罪使戍邊者重人命也今死罪亡命無慮萬人又自赦以來捕得其衆而詔令不及皆當重論伏惟天恩莫不蕩宥死罪以下竝蒙更生而亡命捕得獨不霑澤臣以為赦前犯死罪而繫在赦後者可皆勿笞詣金城以全人命有益於邊帝善之即下詔赦焉躬又條諸重文可從輕者四十一事奏之事皆施行著於令陳寵建初中為尚書是時承永平故事吏政尚嚴尚書决事率近於重寵以章帝新即位宜改前世苛法乃上疏曰先王之政賞不僣刑不濫與其不得已寧僣不濫故唐堯著典曰流宥五刑𤯝灾肆赦帝舜命臯陶以五宅三居惟明克允文王重易六爻而列叢棘之聽周公作立政戒成王勿誤乎庶獄陛下即位率繇此義而有司執事未悉奉承斷獄者急於榜格酷烈之痛執憲者繁於詆欺放濫之文違本離實箠楚為姦或因公行私以逞威福夫為政猶張琴瑟大絃急者小絃絶故子貢非臧孫之猛法而美鄭僑之仁政方今聖德充塞假於上下宜因此時隆先聖之務蕩滌煩苛輕薄箠楚以濟羣生廣至德也帝納寵言决罪行刑務於寛厚其後遂詔有司禁絶鉆鑽諸慘酷之科解妖惡之禁除文致之請讞五十餘事定著於令是後人俗和平屢有嘉瑞永元中寵既為廷尉鉤較律令條法溢於甫刑者除之曰臣聞經禮三百曲禮三千故甫刑大辟二百五刑之屬三千禮之所去刑之所取失禮則入刑相為表裏者也今律令死刑六百一十耐罪千六百九十八贖罪以下二千六百八十一溢於甫刑者千九百八十九其四百一十大辟千五百耐罪七十九贖罪春秋保乾圖曰王者三百年一蠲法漢興以來三百二年憲令稍増科條無限又律有三家其説各異宜令三公廷尉平定律令應經合義者可使大碎二百而耐罪贖罪二千八百并為三千悉删除其餘令與禮相應以易萬人視聽以致刑措之美傳之無窮未及施行會坐詔獄吏與囚交通抵罪又漢制斷獄報重嘗盡三冬之月章帝改用冬十月元和二年旱長水校尉賈宗等上言以為斷獄不盡三冬故陰氣微弱陽氣發泄招致災旱事在於此帝以其言下公卿議寵奏曰夫冬至之節陽氣始萌故十一月有蘭射干芸荔之應時令曰諸生蕩安形體天以為正周以為春十二月陽氣上通雉雊雞乳地以為正殷以為春十三月陽氣已至天地已交萬物皆出蟄蟲始振人以為正夏以為春三微成著以通三綂周以天元殷以地元夏以人元若以此時行刑則殷周嵗首皆當流血不合人心不稽天意月令曰孟冬之月趣獄刑無留罪明大刑畢在立冬也又孟冬之月身欲寜事欲靜若以降威怒不可謂寜若以行大刑不可謂靜議者咸曰旱之所繇咎在改律臣以為殷周斷獄不以三微而化致平康無有災害自元和以前皆用三冬而水旱之異往往為患繇此言之災害自為它應不以改律秦為虐政四時行刑聖漢初興改從簡易蕭何草律季秋論囚俱避立春之月而不計天地之正二王之春實頗有違陛下探幽析微允執其中革百載之失建永年之功上有迎承之敬下有奉微之惠稽春秋之文當月令之意聖功美業不宜中疑書奏帝納之遂不復改張敏和帝永元中為尚書先是建初中有人侮辱人父者而其子殺之章帝貰其死刑而降宥之自後因以為比是時遂定其議以為輕侮之法敏駁議曰夫輕侮之法先帝一切之恩不有成科班之律令也夫死生之决宜從上下猶天之四時有生有殺若開相容恕著為定法者則是故設姦萌生長罪隙孔子曰民可使繇之不可使知之春秋之義子不報讐非子也而法令不為之減者以相殺之路不可開故也今托義者得減妄殺者有差使執憲之吏得設巧詐非所以導在醜不爭之義又輕侮之比寖以繁滋至有四五百科轉相顧望彌復増甚難以埀之萬載臣聞師言救文莫如質故高帝去煩苛之法為三章之約建初詔書有改於古者可下三公廷尉蠲除其弊議寢不省敏復上疏曰臣敏蒙恩特見拔擢愚心所不曉迷意所不解誠不敢茍隨衆議臣伏見孔子埀經典臯陶造法律原其本意皆欲禁民為非也未曉輕侮之法將以何禁必不能使不相輕侮而更開相殺之路執憲之吏復容其姦枉議者或曰平法當先論生臣愚以為天地之性惟人為貴殺人者死三代通制今欲趣生反開殺路一人不死天下受敝記曰利一害百人去城郭夫春生秋殺天道之常春一物枯即為災秋一物華即為異王者承天地順四時法聖人從輕律願陛下留意下民考尋利害廣令平議天下幸甚帝從之應劭獻帝時為太山太守初安帝時河間人尹次潁川人史玉皆坐殺人當死次兄初及玉母軍竝詣官曹求代其命因縊而物故尚書陳忠以罪疑從輕議活次玉劭後追駁之據正典刑有可存者其議曰尚書稱天秩有禮五服五章哉天討有罪五刑五用哉而孫卿亦云凡制刑之本將以禁暴惡且懲其末也凡爵列官秩賞慶刑威皆以類相從使當其實也若德不副位能不稱官賞不酬功刑不應罪不祥莫大焉殺人者死傷人者刑此百王之定制有法之成科高祖入關雖尚約法然殺人者死亦無寛降夫時化則刑重時亂則刑輕書曰刑罰時輕時重此之謂也今次玉公以清時釋其私憾阻兵安忍僵屍道路朝恩在寛幸至冬獄初軍愚狷妄自投斃昔召忽親死於子糾之難而孔子曰經於溝瀆人莫之知晁氏之父非錯刻峻遂能自隕其命班固亦云不如趙母指括以全其宗傳曰僕妾感慨而至死者非能義勇固無慮耳夫刑罰威獄以類天之震耀殺戮也温慈和惠以放天之生殖長育也是故春一草枯則為灾秋一木華亦為異今殺無罪之初軍而活當死之次玉其為枯華不亦然乎陳忠不詳制刑之本而信一時之仁遂廣引八議求生之端夫親故賢能功貴勤賔豈有次玉當罪之科哉若乃小大以情原心定罪此謂求生非謂代死可以生也敗法亂政悔其可追劭凡為駁議三十篇皆此類也魏盧毓為冀州主簿時天下草創多逋逃故重士亡法罪及妻子亡士妻白等始適夫家數日未與夫相見大理奏棄市毓駁之曰夫女子之情以接見而恩生成婦而義重故詩云未見君子我心傷悲亦既見止我心則夷又禮未廟見之婦而死歸葬女氏之黨以未成婦也今白等生有未見之悲死有非婦之痛而吏議欲肆之大辟則若同牢合􅈟之後罪何所加且記曰附從輕言附人之罪以輕者為比也又書云與其殺不辜寧失不經恐過重也茍以白等皆受禮聘已入門庭刑之為可殺之為重太祖曰毓執之是也又引經典有意使孤嘆息繇是為丞相法曹議令史高柔為太祖丞相理曹掾鼓吹宋金等在合肥亡逃舊法軍征士亡考竟其妻子太祖患猶不息更重其刑金有母妻及二弟皆給官主者奏盡殺之柔啓曰士卒亡軍誠在可疾然竊聞其中時有悔者愚謂乃宜貸其妻子一可使賊中不信二可使誘其還心正如前科固已絶其意望而猥復重之柔恐自今在軍之士見一人亡逃誅將及已亦且相隨而走不可復得殺也此重刑非所以止亡乃所以益走耳太祖曰善即止不殺金母弟蒙活者甚衆遷為潁川太守陳羣為御史中丞太祖議復肉刑令曰安得通理君子達於古今者使平斯事乎昔陳鴻臚以為死刑有可加於仁恩者正謂此也御史中丞能申其父之論乎羣對曰臣父紀以為漢除肉刑而増加笞本興仁惻而死者更衆所謂名輕而實重者也名輕則易犯實重則傷民書曰惟敬五刑以成三德易著劓刖滅趾之法所以輔政助教懲惡息殺也且殺人償死合於古制至於傷人或殘毁其體而裁剪毛髮非其理也若用古刑使淫者下蠶室盜者刖其足則永無淫放穿窬之姦矣夫三千之屬雖未可悉復若斯數者時之所患宜先施用漢律所殺殊死之罪仁所不及也其餘逮死者可以刑殺如此則所刑之與所生足以相貿矣今以笞死之法易不殺之刑是重人支體而輕人軀命也時鍾繇與羣議同王朗及議者多以為未可行太祖深善繇羣言以軍事未罷顧衆議且寢鍾繇為大理文帝臨饗羣臣詔謂繇太祖欲復肉刑此誠聖王之法公卿當善共議議未定會有軍事復寢明帝太和中繇為太傅復上疏曰大魏受命繼蹤虞夏孝文革法不合古道先帝聖德固天所縱墳典之業一以貫之是以繼世仍發明詔思復古刑為一代法連有軍事遂未施行陛下遠追二祖遺意惜斬趾可以禁惡恨入死之無辜乃明習律令與羣臣共議出本當右趾而入大辟者復行此刑書云皇帝清問下民鰥寡有辭於苗此言堯當除蚩尤有苗之刑先審問於下民之有辭者也若今蔽獄之時訊問三槐九棘羣吏萬民使如孝景之令其當棄世欲斬右趾者許之其黥劓左趾宫刑者自如孝文易以髠笞能有姦者率年二十至四五十雖斬其足猶任生育今天下人少於孝文之世下計所全嵗三千人張蒼除肉刑所殺嵗以萬計臣欲復肉刑嵗生三千人子貢問能濟民可謂仁乎孔子曰何事於仁必也聖乎堯舜其猶病諸又曰仁遠乎哉我欲仁斯仁至矣若誠行之斯民永濟書奏詔曰太傅學優才高留心政事又於刑理深逺此大事公卿羣僚善共平議司徒王朗議以為繇欲輕減大辟之條以増益刖刑之數此即起偃為竪化屍為人矣然臣之愚猶有未合微異之意夫五刑之屬著在科律科律自有減死一等之法不死即為減施行已久不待逺假斧鑿於彼肉刑然後有罪次也前世仁者不忍肉刑之惨酷是以廢而不用不用已來歴年數百今復行之恐所減之文未彰於萬民之目而肉刑之問已宣於宼讐之耳非所以來逺人也今可案繇所欲輕之死罪使減死之髠刖嫌其輕者可倍其居作之嵗數内有以生易死不訾之恩外無以刖易􅎂駭耳之聲議者百餘人與朗同者多帝以呉蜀未平且寢晉程咸魏時為司𨽻主簿毌丘儉之誅其子甸妻荀氏應坐死其族兄顗與景帝姻通表魏帝以匄其命詔聽離婚荀氏所生女芝為潁川太守劉子元妻亦坐死以懷姙繋獄荀氏辭詣司𨽻校尉何曾乞恩求沒為官婢以贖芝命曽哀之使咸上議曰夫司寇作典建三等之制甫侯修刑通輕重之法叔世多變秦立重辟漢又修之大魏承秦漢之弊未及革制所以追戮已出之女誠欲殄醜類之族也然則法貴得中刑愼過制臣以為女人有三從之義無自專之道出適他族還䘮父母降其服紀所以明外成之節異在室之恩而父母有罪追刑已出之女夫黨見誅又有隨姓之戮一人之身内外受辟今女既嫁則爲異姓之妻如或産育則為他族之母此為元惡之所忽戮無辜之所重於防則不足懲姦亂之源於情則傷孝子之心男不得罪於他族而女獨嬰戮於二門非所以哀矜女弱蠲明法制之本也臣以為在室之女從父母之誅既醮之婦從夫家之罰宜改舊科以為永制於是有詔改定律令何曽為太傅時司空賈充宴朝士河南尹庾純行酒而充不時飲因發怒訶之遂免純官又以純父老不求供養使據禮典正其臧否曽與太尉荀顗驃騎將軍齊王攸議曰凡斷正臧否宜先稽之禮律八十者一子不從政九十者其家不從政新令亦如之案純父年八十一純兄弟六人三人在家不違侍養純不求供養其於禮律未有違也司空公以純備位卿尹望其有加於人而純荒醉肆其忿怒臣以爲純不遠希至孝之行而近惜常人之失應在譏貶司徒石苞議純榮官忘親惡聞格言不忠不孝宜除名削爵土司徒西曹掾劉斌議以為敦敘風俗以人倫為先人倫之教以忠孝為主忠故不忘其君孝故不遺其親若孝必專心於色養則明君不得而臣忠必不顧其親則父母不得而子也是以為臣者必以義斷其恩為子也必以情割其義在朝則從君之命在家則隨父母之志然後君父兩濟忠孝各序純兄峻以父老求歸峻若得歸純無不歸之勢峻不得歸純無得歸之理純雖自聞同不見聽近遼東大守孫和廣漢太守鄧良皆有老母良無兄弟授之遠郡辛苦自歸皆不見聽且純近為京尹父在界内時得自啓定省獨於禮法外處其貶黜斌愚以為非禮也禮年八十一子不從政純有一弟在家不為違禮又令年九十乃聽悉歸今純父實未九十不為犯令罵辱宰相宜加放斥以明國典聖恩愷悌示加貶退臣愚無所請議河南功曹史龎札等表曰臣郡前尹關内侯純醉酒失常戊申詔書既免尹官以父篤老不求供養下五府依禮典正其臧否臣謹案三王養老之制八十一子不從政九十其家不從政斯誠使人無闕孝養之道為臣不違在公之節也先王制禮埀訓莫尚於周當其時姬公留周伯禽之魯孝子不匱典禮無愆今公府議七十時制八十月制欲以駁奪從政之限削除爵土是為公旦立法還自越之魯侯為子即為罰首也石奮期頥四子列郡近太宰獻王諸子亦在藩外古今同符忠孝竝濟臣聞悔吝之疵君子有之尹性少飲多遂至沈醉尹醒聞之悼恨前失執謙引罪深自奏劾求入重法今公府不原所繇而謂傲狠是為重罪過醉之言而没迷復之義也臣聞父子天性愛繇自然君臣之交出自義合而求忠臣必於孝子是以先王立禮敬同於父原始要終齊於所生如此猶患人臣罕能致身今公府議云禮律雖有常限至於疾病歸養不奪其志如此則為禮禁正直而陷人以詐違越王制開其始原尹少履清苦事親色養歴職内外公亷無私此陛下之所以屢發明詔而尹之所以仍見擢授也尹行已也恭率下也敬先衆後已實是宿心一旦繇醉責以暴慢案奏狀不忠不孝羣公建議削除爵土此愚臣所以自悲自悼拊心泣血也案令父母年過八十聽令其子不給限外職誠以得有歸來之縁今尹居在郡内前每表屢䝉定省尹昆弟六人三人在家孝養不廢兄侍中峻家之嫡長往比自表求歸供養詔諭不聽國體法同兄弟無異而虗責尹不求供養如斯臣懼長假飾之名而損忠誠之實也夫禮者所以經國家定社稷也故陶虞之隆順考古典周成之美率繇舊章伏惟陛下聖德欽明敦禮崇教疇諮四嶽以詳典制尹以犯違受黜而所繇者醉公以教義見責而所因者忿積忿以立義繇醉以得罪禮律不復為斷文致欲以成法是以愚臣敢冒死亡之誅而恥不伸於盛明之世惟蒙哀察帝復下詔曰自中世以來多為貴重順意賤者生情故令釋之定國得名於前世今議責庾純不惟温克醉酒沈湎此責人以齊聖也疑賈公亦醉若其不醉終不於百客之中責以不去官供養也大晉依聖人典禮制臣子出處之宜若有八十皆當歸飬亦不獨純也古人云繇醉之言俾出童羖明不責醉恐失度也所以免純者當為將來之醉戒耳齊王劉掾議當矣復以純為國子祭酒劉頌武帝時為廷尉頻表宜復肉刑不見省又上言曰臣昔上行肉刑從來積年遂寢不論臣竊以為議者拘孝文之小仁而輕違聖王之典刑未詳之甚莫過於此令死刑重故非命者衆生刑輕故罪不禁姦所以然者肉刑不用之所致也今為徒者類性元惡不軌之族也去家懸遠作役山谷飢寒切身志不聊生雖有廉士介者茍慮不首死則皆為盜賊豈况本性姦凶無頼之徒乎又令徒富者輸財解曰歸家乃無役之人也貧者起為姦盜又不制之虜也不刑則罪無所禁不制則羣惡横肆為法若此近不盡善也是以徒亡日屬賊盜日煩亡之數者至有十數得輒加刑日益一嵗此為終身之徒也自顧返善無期而灾困逼身其志亡思盜勢不得息事使之然也古者用刑以止刑今反於此諸重犯亡者髪過三寸輒重髠之此以刑生刑也加作一嵗此以徒生徒也亡者積多繋囚猥畜議者曰囚不可不赦復從而赦之此為刑不制罪法不勝姦不知法之不勝相聚而謀為不軌月異而嵗不同故自頃以來姦惡陵虐所在充斥議者不深思此故而曰肉刑於名忤聽忤聽孰與賊盜不禁聖王之制肉刑遠有深理其事可得而言非徒懲其畏剥割之痛而不為也乃去其為惡之具使夫姦人無用復肆其志止姦絶本理之盡也亡者刖足無所用復亡盜者截手無所用復盜滛者割其勢理亦如之除惡塞源莫善於此非徒然也殘不為虗棄而所患歸家父母妻子共相養恤不流離於塗路有今之困創愈可役上准古制隨宜業作雖已刑此等已刑之後便各都塞又生育繁阜之道自若也今宜取死刑之限輕及三犯迯亡淫盜悉以肉刑代之其三嵗刑以下自杖罰遣又宜制其罰數使有嘗限不得減此其有宜重者又任之官長應四五嵗刑者皆髠笞笞一百稍行使各有差悉不復居作然後刑不復生刑徒不復生徒而殘體為戮終身作誡人見其痛畏而不犯必數倍於今且為惡者隨發被刑去其為惡之具此為諸已刑者皆良士也豈與全其為姦之手足而蹴居必死之窮地同哉而猶曰肉刑不可用臣竊以為不識務之甚也臣昔常侍左右數聞明詔謂肉刑宜用事便於政願陛下信獨見之斷使夫能者得奉聖慮行之於今比塡溝壑兾見太平周禮三赦三宥施於老㓜悼髦黔黎不屬逮者此非為惡之所出故刑罰逆舍而宥之至於自非此族犯罪則必刑而無赦此政之理也至今常以罪積獄繁赦以㪚之是以赦愈數而獄愈塞如此不已將至不勝原其所繇肉刑不用之過也今行肉刑非徒不積且為惡無具則姦息去此二端獄不得繁故無取於數赦於政體勝矣疏上又不見省華廙表之子為南中郎將以迕㫖因事免廙官削爵土大鴻臚何遵奏廙免為庶人不應襲封請以表世孫混嗣表有司奏曰廙所坐除名削爵一時之制廙為世子著在名簿不聽襲嗣此為刑罰再加諸侯犯法八議平處者褒功重爵也嫡綂非犯終身棄罪廢之為重依律應聽襲封詔曰諸侯薨子踰年即位此古制也應即位而廢之爵命皆去矣何為罪罰再加且吾之責廙以肅貪穢本不論常法也諸賢不能將明此義乃更詭易禮律不顧憲度君命廢之而羣下復之此為上下正相反也於是有司奏免議者官詔皆以贖論裴頠為尚書惠帝之世政出羣下毎有疑獄各以私情刑法不定獄訟繁滋頠表陳之曰夫天下之事多塗非一司之所􅃹中才之情易擾頼常制而後定先王知其所然也是以辨方分職為之凖局凖局既立各掌其務刑賞相稱輕重無二故下聽有常羣吏安業也舊宫掖陵廟有水火毁傷之變然後尚書乃躬自奔赴其非此也皆止於郎令史而已刑罰所加各有常刑云元康四年大風之後廟闕屋瓦有數枚傾落免太常荀寓於時以嚴詔所譴莫敢據正然内外之意僉謂事輕責重有違於常會五年二月有大風主者懲懼前事臣新拜尚書始三日本曹尚書有疾權令兼出案行蘭臺主者乃瞻望阿棟之間求索瓦之不正者得棟上瓦小邪十五處或是始瓦時邪蓋不足言風起倉卒臺官更往太常案行不及得周文書未至之頃便競相禁止臣以權兼暫出出還便罷不復得窮其事而本曹據執却問無已臣時具加解遣而主者畏咎不從臣言禁止太常復興刑獄昔漢氏有盜高廟玉環者文帝欲族誅釋之但處以死刑曰若侵長陵一抔土何以復加文帝從之大晉垂制深惟經遠山陵不封園邑不飾墓而不墳同乎山壤是以丘坂存其陳草使齊乎中原矣雖陵兆尊嚴惟毁發然後族之此古典也若登踐犯損失盡敬之道事止刑罪可也去八年奴聽教加誣周龍燒草廷尉遂奏族龍一門八口并命㑹龍獄翻然後得免考之情理准之前訓所處實重今年八月陵上荆一枝圍七寸二分者被斫司徒太常奔走道路雖知事小而案劾難測搔擾驅馳各競免負於今太常禁止未解近日太祝署失火燒屋三間半署在廟北隔道在重牆之内又即已滅頻為詔㫖所問主者以詔㫖使問頻繁使責尚書不即案行輒禁止尚書免在法外刑書之文有限而舛違之故無方故有臨時議處之制誠不能皆得循常也至於此軰皆為過當每相逼廹不復以理上替聖朝畫一之德下損崇禮大臣之望臣愚以為犯陵上草木不應乃用同産畢刑之制案行奏劾應有定凖相承務重體例遂虧或因餘事得容淺深頠雖有此表曲議猶不止時劉頌為三公尚書又上疏曰自近世以來法漸多門令甚不一臣今備掌刑斷職思其憂謹具啓聞臣竊伏惟陛下為政每思盡善故事求曲當曲當則例不得直盡善故法不得全何則夫法者固以盡理為法而上求盡善則諸下牽文就意以赴主之所許是以法不得全刑書徴文徴文必有乖於情聽之斷而上安於曲當故執平者因文可引則生二端是法多門令不一則吏不知所守下不知所避姦偽者因法之多門以售其情所欲淺深茍斷不一則居上者難以撿下於是事同議異獄犴不平有傷於法古人有言人主詳其政荒人主期其事理詳匪他盡善則法傷故其政荒也期者輕重之當雖不厭情茍入於文則依而行之故其事理也夫善用法者忍違情不厭聽之斷輕重雖不允人心經於凡覽若不可行法乃得直又君臣之分各有所司法欲必奉政故令主者守文理有窮塞故使大臣釋滯事有時宣故人主權斷主者守文若釋之執犯蹕之平也大臣釋滯若公孫𢎞斷郭解之獄也人主權斷若漢祖戮丁公之為也天下萬事自非斯格重為故不近似此類不得出以意妄議其餘皆以律令從事然後法信於下人聽不惑吏不容奸可以言政人主軌斯格以責羣下大臣小吏各守其局則法一矣古人有言善為政者看人設教㸔人設教制法之謂也又曰隨時之宜當務之謂也然則看人隨時在大量也而制其法法軌既定則行之行之信如四時執之堅如金石羣吏豈得在成制之内復稱隨時之宜傍引看人設教以亂政典哉何則始制之初固已㸔人而隨時矣今若設法未盡當則宜改之若謂已善不得盡以為制而使奉用之司公得出入以差輕重也夫人君所與天下共者法也已令四海不可以不信以為教方求天下之不慢不可繩以不信之法且先識有言人至愚而不可欺也不謂平時背法意㫁不勝百姓願也上古議事以制不為刑辟夏殷及周書法象魏三代之君齊聖然咸棄曲當之妙鑒而任徴文之直凖非聖有殊所遇異也今論時救弊不及中古而執平者欲適情之所安自託於議事以制臣竊以為聽言則美論理則違然天下至大事務重雜時有不得悉循文如令故臣謂宜立格為限使主者守文死生以之不敢錯思於成制之外以差輕重則法常全事無正據名例不及大臣論當以釋不滯則事無閡至如非常之㫁出法賞罰若漢祖戮楚臣之私已封趙氏之無功惟人主專之非奉職之臣所得擬議然後情求傍請之迹絶似是而非之奏塞此盖齊法之大凖也主者小吏處事無常何則無情則法徒克有情則撓法積克似無私然乃所以得其私又常所阻以衛其身斷當恒克世謂盡公時一曲法乃所不疑故人君不善倚深似公之斷而責守文如令之奏然後得為有撿此又平法之一端也夫出法懽制指施一事厭情合聽可適耳目誠有臨時當意之快勝於徵文不允人心也然起為經制終年施用常得一而失十故小有所得者必大有所失近有所漏者必遠有所苞故諳事識體者善權輕重不以小害大不以近妨遠忍曲當之近適以全簡直之大凖不牽於凡聽之所灾必守徵文以正例每臨其事常御此心以决斷此又法之大槩也又律法斷罪皆當以法律令正文若無正文依附名例斷之其正文名例所不及者皆勿論法吏以上所執不同得為異議如律之文守法之官唯當奉用律令至於法律之内所見不同乃得為異議也今限法曹郎令史意有不同為駁惟得論釋法律以正所斷不得援求諸外論隨時之宜以明法守局之分詔下其事侍中大宰汝南王亮奏以為夫禮以訓世而法以整俗理化之本事實定之若當斷不斷輕重隨意則王憲不一人無所錯矣故觀人設教在上之舉守文直法臣吏之節也臣以去太康八年隨事異議周懸象魏之書漢詠畫一之法誠以法與時共議不可二令法素定而法為議則有所開長以為宜如頌所啓為永乆之制於是門下屬三公曰昔先王議事以制自中古以來執法斷事既以立法誠不宜復求法外小善也若常以善奪法則人逐善而忌法其害甚於無法也案啓事欲令法令斷一事無二門郎令史已下應復出法駁案隨事以聞也衛展元帝為丞相時為晉王大理考擿政事有不合情者上書曰今施行詔書有考子正父死刑或鞭父母問子所在近主者所稱庚寅詔書舉家逃亡家長斬若長是逃亡之主斬之雖重猶可設子孫犯事將考祖父逃亡逃亡是子孫而父祖嬰其酷傷順破教如此者衆相隱之道離則君臣之義廢君臣之義廢則犯上之姦生矣秦網密文峻漢興掃除煩苛風移俗易㡬於刑厝大人革命不得不蕩其穢慝通其圯滯今詔書宜除者多有便於當今著為正條則法差簡易帝令曰禮樂不興則刑罰不中是以明罰勑法先王所愼自元康以來事故荐臻法禁滋蔓大理所上宜朝堂會議蠲除詔事不可用者此孤所虗心者也及帝即位展為廷尉又上言古者肉刑事經前聖漢文除之増加大辟今人戸彫荒百不遺一而刑法峻重非勾萌養胎之義也愚謂宜復古施行以隆太平之化詔内外通議於是驃騎將軍王導太常賀循侍中紀瞻中書郎庾亮大將軍諮議參軍梅陶散騎郎張嶷等議以肉刑之典繇來尚矣肇自古昔以及三代聖哲明王所未曽改也豈是文帝常主所能易者乎時蕭曹已沒絳灌之徒不能正其議逮班固深論其事以為外有輕刑之名内實殺人又死刑太重生刑大輕生刑施於上死刑怨於下輕重失當故刑政不中也且原先王之造刑也非以過怒也非以殘人也所以救姦所以當罪今盜者竊人之財滛者奸人之色亡者避叛之役皆無殺害也刖之以刑刑之則止而加之斬戮戮過其罪死不可生縱虐於此嵗以巨計此乃仁人君子所不忍聞而况行之於政乎若乃惑其名而不練其實惡其生而趣其死此畏水投舟避坎䧟井愚夫之不若何取於政哉今大晉中興遵復古典率繇舊章起千載之滯義拯百代之遺黎使皇典廢而復存黔首死而更生至義暢於三代之際遺風播乎百世之後生肉枯骨惠侔造化豈不休哉或者乃曰死猶不懲而况於刑然民者㝠也其至愚矣雖加斬戮忽為灰土死事日徃生欲日存未以為改若刑諸市朝朝夕人戒刑者詠為惡之永痛惡者覩殘刖之長廢故足懼也然後知先王之輕刑以御物顯誠以懲愚其理遠矣尚書令刁協尚書薛兼等議以為聖上悼殘荒之遺黎傷犯死之繁衆欲行刖以代死刑使犯死之徒得存性命則率土蒙更生之澤兆庶必懷恩以反化也今中興祚隆大命維新誠宜設寛法以宥人然懼羣小愚蔽習翫所見而忽異聞或未能咸服愚謂行刑之時先明申法令樂刑者刖甘死者殺則心必服矣古典刑不上大夫今士人有犯者謂宜如舊不在刑例則進退為允尚書周顗郎曹彦中書郎桓彛等議以為復肉刑以代死誠是聖王之至德哀矜之𢎞私然竊以為刑罰輕重隨時而作時人少罪而易威則從輕而寛之時人多罪而難威則宜重刑而濟之肉刑平世所應立非救弊之宜也方今聖化草創人有餘姦習惡之徒為非未已截頭絞頸尚不能禁而更斷足劓鼻輕其刑罰使欲為惡者輕犯寛刑陷罪更衆是為輕其刑以誘人於罪殘其身以加楚酷也昔之畏死刑以為善人者今皆犯輕刑而殘其身畏重之常人反為犯輕而致囚此則何異斷刖常人以為恩仁邪受刑者轉廣而為非者自多踊貴屨賤有鼻者醜也徒有輕刑之名而實開長惡之源不如以殺止殺重以全輕權少停之湏聖化漸著兆庶易威之日徐施行也議奏帝猶欲從展所上大將軍王敦以為百姓習俗日久忽復肉刑必駭遠近且逆寇未殄不宜有􅆭酷之聲以聞天下於是乃止册府元龜卷六百十四
