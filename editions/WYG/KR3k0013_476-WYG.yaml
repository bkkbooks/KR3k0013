body:
  text: 册府元龜卷四百七十六宋王欽若等撰臺省部奏議第七後唐李元龜末帝時為刑部郎中清泰元年上言以聞開成格凡貶降官本處春秋以存亡報省如沒於貶所有骨肉許歸葬如無骨肉本處便與埋葬乃下詔曰李元龜官處法司次當候對以稍􅄽於時雪請特降於優恩初則以貶謫官亡歿外州乞容歸葬次則以亡歿者兒孫絶嗣請本處瘞埋宜依所陳頒告諸道周元樞為侍御史清泰元年陳十事其行者四詔曰請再示賞罰提舉縣令事百里象雷之地一同製錦之人期在養民豈宜失職諸州觀察使刺史嚴切提撕請牢籠俊又搜訪賢良况選部貢闈每年慎擇尚慮貞廉之士愧趨躁競之門諸道亷使更宜搜訪請斷無名率配委三司使省奏舉行請止急徵暴賦况秋夏徴科自有常限宜令官吏不得踰違清泰二年御史中丞盧損上言五事其一臣覩陛下勤儉為本宵旰是專日新之徳繼聲時病之憂漸息事纔達聽言乃必行若有隠於聖明必貽咎於隂責器小而誠難測海日下而但合傾心今欲曉諭中外臣寮載星登車端門待漏寅初開鑰日出排班中興殿庻事未通乞光降宣不坐冀視朝之制合古事君之禮得中匪懈之誠咸專未明之求外顯其二曰臣聞食以時則百骸皆理失其言而駟馬難追利便可行踈濶莫返况開闔之制出入湏常且貴賤而不分恃強壯而争進此後逐日早辰軍人百姓馬羣放牧令兩掖門出廣列尊卑其三云帝居皇宅法象太微取則皆自於上𤣥隳度無違於古道標正影端之語萬世不踰從權就便之規一時難守臣見九衢巷陌已是漸微兆庻街坊未止侵占陛下仁恕在念約絶難行且乞五鳯樓南定鼎門北禁止搭掤籬圏籠樹舎簷取土填街引渠穢路請指揮金吾軍廵止絶其四橋號天津名實帝道人臣履歴尚合兢趨牛車往來公然縱恣請止絶天津橋中道兩頭下闗駕出即開兩傍之路士庻往來其車牛並浮橋路來往其五朝廷所重名器為先叙禮樂道尊卑明貴賤伏見禁門之内人馬出入極多臣請凡官貟除將被袋馬外其餘騎從竝令於光政門外下馬詔曰聽政不坐禮儀而合使先知牧馬趨朝道路而宜令有異况民家占侵於御路固合條流牛車來往於天津宜湏禁止盧損益深奉職言切為時詳五件之封章俾四方之觀政除光政門外下馬一件續有處分餘並從之是年又上言准天成二年二月勅每年進士合有聞喜宴春闗宴并有司所出春闗牒用綾紙竝官給臣等以舉人既成名第宴席所費屬私况國用未充枉有勞費請依舊制不賜又准天成元年七月及四年十二月勅應中外官除授不繫品秩一例宣賜告身請依舊制合賜外各令自出綾紙又准天成元年七月勅加每月十五日入閤罷五日起居臣等以中旬排仗有勞聖躬請只以月首入閤五日起居如舊又天成元年八月勅除㫖授令録皆令内殿辭謝臣等以令録卑微不可内廷展謝請依舊制正衙辭謝又天成三年五月長興二年七月勅許節度使帶使相嵗薦五人餘薦三人防禦團練使二人臣惟州縣貟闕甚少若容薦舉則每年銓選可以注擬請特行釐革又長興二年八月勅州縣簿尉判司差充軍廵判官仍同一任自邇已來頗傷物論以為不當請行止絶依舊令衙前選任詔曰令録之任總六曹之糾轄繫百里之慘舒恵養吾民可以親承顧問内殿辭謝可如舊制藩侯郡守薦人或諳公事或有裨益不可全阻許依天成勅帶使相藩臣嵗薦三人餘二人直屬京州郡防禦團練一人諸色官告舉人春闗冬集綾紙聞喜闗宴所賜錢竝仍舊官給餘竝從之劉鼎為吏部員外郎清泰二年上疏臣見建中元年正月勅中外文武臣寮授官上後三日舉人自代事下中書如除官用人選所薦多者擬議多事已來此道乆廢今後乞復施行詔曰設官分職為時主之敷㤙推賢讓能乃朝臣之盛事是以詩稱伐木史載彈冠俾㧞茅連茹之時見力行脩身之道劉鼎官居雉省立近龍墀因貢讜言請行故事欲使子皮舉善終明子産之賢鮑叔讓能不掩夷吾之畧兼可以致同心協力表後己先人克揚文子之風免有展禽之歎舉實公當便可施行情渉阿私理當比驗許遜為右拾遺清泰二年上疏曰臣見上封事者多不闗時政得失或以事不合已或以位未及人但欲虛鼓聲名妄邀抽擢全非切當空事游詞數件之中一無可取不惟熒惑聖聽兼屬侮慢朝綱今後請除兩省官合上封事者其别班除論本司公事外請准太和二年勅輪轉待制給事合司封奏大凡食禄之道本在致君不可獨善一身歸惡萬乗惜暫時之逆耳貽他日之痛心事切三思理實不可其切要言者或君上情躭酒色志好畋逰言動稍乖理湏論諍職司其事合在諌官况陛下嗣位已來憂勤庻政鮮有過悞無可陳論朝廷班外之宜職在御史臺如有愆違御史彈糾其餘鞫獄自有法司事若有違他自論奏此外越局言事竝望寝停詔曰上書言事諌署舊規各有所司豈宜越局若思出於位理或侵官言匪盡忠徒欲沽於謇直詞多率意實有望於指陳許遜所上封章請依近勅各司其事允叶舊章李慎儀為考功員外郎清泰二年上言今春已來稍愆雨澤陛下念稼穡之重深宵旰之憂倍軫聖心遍走羣望盈尺則告瑞於元朔如膏則潤浹於暮春可卜豐穰動諧響應請天下凡祠宇有益於人者下本處常令修飾冀集洪休從之李遘為刑部郎中清泰二年上言臣忝掌刑名合論法律臣見比年已來有前州縣官或假侵官不量事體皆投匭乞官况大朝取士之門有舉有選茍有長才茂器舉選安敢滯留國家置匭之意本為訴寃士人乞官安得造次又閭里淺識濫繇官路妄有求請不顧格律條章所司以陛下方開言路不敢是非典法是國家大經誰可析言輕議此後凡投匭上言乞官亂法者望下所繇法司勘驗可否從之張守吉為吏部員外郎清泰三年上封事伏覩兩道興兵所宜備慮臣恐京師天下州府所禁囚徒獄户不完兇徒多狡或踰垣破械結黨連羣或聚緑林或奔逆壘以此為患事狀非輕臣望所禁重囚除惡逆放火殺人外可恕者量減本罪一等斷遣兼州縣近山澤人煙濶逺處量令州縣置舖警廵以防聚集詔曰所奏除惡逆外降罪一等下大理寺詳簡疾速施行晉梁文矩為吏部尚書天福二年七月奏臣伏奉勅牒令參詳文武百官所進封事内宗正卿石光贊上章云伏見滎陽縣道左萬石君廟本前漢大中大夫石奮之廟德行意績備列前書乞降封崇俾光宗祖者切以萬石君播盛徳於漢朝立嚴祠於鄭圃爰開聖緒永叶昌期石光贊所上公言備章軄分深為允當望賜施行勅漢大中大夫石奮徳盛軒裳道光簡素享萬䂖休明之禄成一門忠孝之名彰茂實於前脩契隆興於景運宗正卿石光贊特上章疏欲示封崇異表深源式昭豐祚宜贈太傅八月又奏臣看詳左拾遺任瑤所進封事切見唐莊宗朝宰臣豆盧革韋說洎歴數朝累行宥典俱遂昭雪頗是分明然則河南令豆盧昇南頓令韋濤因父配流遂停官爵况曾居郎署乆在朝行或以被茜袍或以紆紫綬前後十遷嵗歴八奉赦書至於嘗赦不原亦得乗時被寵况豆盧昇等唐少帝之時刑部已得雪牒便可却復舊官旋屬偽廷却除宰子既塵墨綬須服荷衣敢望明朝特加殊澤切以任瑤所進封章請復豆盧昇等官序服色望中書商議勅豆盧昇等已經洗滌又復官常俟著政能當行甄奬曹國珍為吏部郎中天福三年十月隰州蒲縣令竇溫顔進策内一曰兵不可不戰將不可不擇每於月旦宜令敎習楚莊立功而心懼晉文戰勝而色憂居安慮危古之道也此乃鴻圖永固霸業彌芳詳定官等以其徴引方拙未可奏聞國珍與其議以為可行乃上言曰臣聞去華務實捨短從長片善不遺羣材畢録切詢古道宛是良圖將隆講武之規宜舉訓戎之典故左氏春秋傳云禁暴戢兵保大定功安民和衆豐財此所以昭宣七徳制服萬邦又云春蒐夏苗秋獮冬狩皆於農隙以講武事此所謂聿脩戰法俾耀軍威又云三時務農一時講武不敎民戰是謂棄之所請每月旦敎習事伏乞宣駙馬歩軍都指揮使簡練馴閲甚為允當望賜施行勅習戰講武歴代通規選士練兵其來舊制宜以每年農隙時講武仍准令式處分張恕為刑部郎中天福二年十月奏伏以革故從新方恢於聖運赦過宥罪繼洽於君恩故澤布九天無所不及慶流萬國無所不周伏惟皇帝義布幽明化均動植改秦隋之覆轍繼周漢之昌圖上簡帝心蕩蕩方臻於夀域下符民欲熈熈將返於淳風彌寛含垢之情遐廣推恩之道臣伏見去年閏十一月二十九日赦書節文應為廷貶降官未量移者與復資責授官亦與復資應徒流收管人竝放還者又覩今年八月二十五日徳音節文應自創業已來降黜者竝與放還枯鱗再泳朽木重芳是知𢎞貸之朝大舉哀矜之典所有偽廷貶降官等雖經量移盡思歸復每望雲天之澤常懸省責之心特冀聖慈更加念恤未敢希復序資品且乞令放還鄉閭所冀表明代之好生遂小人之懐土臣叨司刑典獲奉赦條願廻觧網之仁用廣垂衣之化從之殷鵬為起居郎天福二年十二月上言切聞司封格式内外文武臣寮纔昇朝籍者無父母便與追封追贈父母在即未叙未封以臣所見誠為不可此則輕生者而重死者棄今人而録古人其榮何有其理安在又云父母在品秩及格者即與封其母不言其父便加邑號兼曰大君遂令妻則旁若無夫子則上若無父豈有父則賤而母則貴夫則卑而妻則尊若謂其父未合加恩安得其母受賜若謂以子便合從貴何得其父不先伏以父尊母卑天地之道尊無二上國家同體今母受封父無爵名敎不順莫大於兹臣伏乞自今後文武臣寮父母在其父已有官爵者即叙進資品以及格式或不任禄仕即可授以致仕或同正官所貴得以叙封妻室即父母俱榮孝子無不逮之感閨門交映聖君覃慶賞之㤙噫荷陛下孝治之風受陛下榮親之禄者静而屈指不過數人陛下得以特議舉行編為令式勸天下之為善令域中之望風自然見前代之闕文成我朝之盛典况唐明宗朝長興元年徳音内一節應在朝中外臣寮父母在竝與加恩司封不行明制堅執前文儻布新恩兼合舊勅庻使事君事父常遵一體之規為子為臣不失兩全之義臣又聞司封令式内外臣寮官階及五品已上者即封妻䕃子固不分於清濁但祗言其品秩且諫議大夫給事中中書舍人竝是五品贊善大夫洗馬中允奉御等亦是五品若論朝廷之委任宰相之擬掄出入之階資中外之瞻望則天壤相懸矣及其叙封乃為一貫相㳂至此其理甚非而况北省為陛下侍從之臣南宫掌陛下彌綸之務憲臺執陛下紀綱之司首冠羣寮總為三署當職尤重責望非輕此則清列十年不遂顯榮之願彼則雜班兩任便承封廕之恩事不均平理宜改革伏乞自今後應諸司官及五品已上者即依舊制施行應三署清望官及六品已上便與封廕清濁既異秩品宜昇仍下所司議為常式勅人子之道禄貴在於及親王者之恩事必從於尊本應内外文武臣寮父母在如子品秩及格與加恩在朝行者父與致仕官母與叙封郡邑號其外四品已上節度團練防禦使刺史父與致仕官其餘與同正官母與叙封郡邑號如内外官父已有致仕及同正官母已曾叙封子品高者更與加進半俸續議指揮如父有職官不在此限餘竝准格文處分仍編令式永著常規邉光範為太府少卿天福三年三月上書曰臣聞太宗有言曰朕居深宫之中視聽不能及逺所委者惟都督刺史則知此官實繫治亂本須得人臣竊見今之刺史或因縁世祿或貢奉家財或微立軍功或但詢官序實恐撫民寡術仰貪吏以無方以此牧民而望民安未可得也特乞除此舊訛委其能吏將袪民病永召時和疏留中不出李祥為中書舍人天福三年三月上疏曰臣聞除舊布新故順天而設敎惟名與器不假人以樹恩所以示㝢縣之至公所以仰朝廷之大柄今則既逄英主未革前蹤是敢聊舉一端輕塵四達酌其損益幸補㳙埃伏覩南北兩班内庭諸局或有不文不武非舊非勲論伎術則罔有所長語才行則罕聞其異但思月限以冒官常俾五細以在庭使四方而何則有虛華級仍蔭私門沗榮更及於子孫禄利徒銷於府庫况今乃興戎事乆困生民因無用之官寮具員無闕計有限之財力帑藏正虛若不去留空成耗蠧伏望畧加澄汰稍辨幽明則支分或減於殷憂内外庻成於通濟又覩十年已來肆赦頻降諸道職掌一例奬酬藩方不守於規程奏薦罔論其高下僕𨽻則動逾數百絲綸則皆示特恩所以倉塲管鑰之微人曹局簡札之小吏至於伶倫賤類灑掃庸奴初命便假於貴階銀章青綬拜賜遽披於法服牙笏紫袍乃致貴賤不分寵榮濫被雖雷雨作觧渥澤恐遺於萬物而衣裳在笥貞規何法於百王此後或有溥恩應諸道職員除主兵將校外其衙前職列伏乞明示條章俾循事體節度州只許奏都押衙都虞候敎練使客將孔目官及有朱記大將十人仍取上名支郡則只許薦都押衙都虞候孔目官其諸色人竝委本道量轉職次則得之者感恩有異受之者與衆稍殊寰區仰天子之尊藩后知王澤之貴名器之重治亂是資伏惟皇帝陛下俯廻宸覧畧炤愚𠂻勿為小善不行勿謂舊弊難改失之在漸謀之在初儻或因此留神自可觸類而長宰臣奏李祥才光鳯閣志奉龍圗聰明有作誥之方名器無假人之理以兹留意爰具上章乃是大綱且非小善既叶聖人之敎可嘉君子之言所奏節度刺史州衙前職員等事望賜施行從之劉皥為駕部員外郎知雜事天福三年三月上言曰藩侯郡牧仗鉞分符繫千里之慘舒行一方之威福自古選任須擢賢明近代統臨為酬勲績將邦域之生聚展將領之人情識分者附正營私黷貨者嚴刑廣取諸頭剥削多贍爪牙自黄巢已來偽梁之後公署例皆隳壊編户悉是凋殘或不近邉陲不屯師旅無城郭郡邑非控扼藩垣試任廉能且權嘗理逐年屬州錢物每季申省區分支觧有餘罄竭供進府庫漸足黎庻稍蘓縱有過愆亦施懲責言雖鄙近望賜施行疏留中不出趙仁竒為司天少監天福三年五月上言曰臣聞自古創業之君開基之主設官分職革故鼎新必有強名用為公器以誘英彦皆不徒然伏見近年酬賞在京諸指揮使皆遥授刺史得非朝廷以貴其地望優其禄利乎臣以為大輅起推輪之始濫觴成方舟之流但恐滋深不可改易非創業制命之所宜也今六軍諸衛品秩皆高不用酬勲是成虚設遂使掌禁軍者鄙昇朝之貴貪外任者無戀闕之心稍涉官邪徒費國用其六軍諸衛官員伏望委宰臣約前唐故事依文班品第加以料錢自此後非有軍功不可輕授名器無假中外迭居豈唯正於等威抑亦省於經費時下中書行之宰臣奏云朝廷所設環衛此掌禁軍乆屬從權驟難改制望令將來商議施行趙逺少帝時為刑部侍郎開運二年奏臣伏覩長興四年五月二十三日勅州縣官在任日有覆推刑獄公事雪得寃獄活人性命者准長興元年二月二十一日南郊赦書節文便許非時叅選特與超資注官仍賜章服者宜令諸道州府凡有雪活寃獄州縣官等依元勅㸃檢給付公慿本官自齎赴刑部投狀委刑部據狀追取本道雪活公案叅驗如事理合得元勅便仰給付優牒此葢道𢎞激勸務絶罔欺在酬奬以甚優期刑殺而無濫臣詳元勅只言州縣官員所許加恩未該内外職掌臣又詳前後請給優牒人等文案若繋雪寃屈本道尋合奏開例過五年十月本人方來論請須却尋追文案勞擾公方於事難明於理未當伏惟皇帝陛下體堯仁而御㝢敷舜徳以臨民大闡化條克脩刑政旁詢闕典用整𢎞綱功必賞而罪必誅善者進而能者勸起今後但能雪活寃獄不限在朝職司亦乞量加旌賞應闗諸道州縣官員雪活寃獄不虛委逐處長吏抄畧指實案節先具奏聞所付本人慿由官滿到京便於刑部投狀不得隔越年嵗方可論訴功勞庻内外以皆同使期程而有守廣亭毒好生之道盡高低察獄之明者勑㫖理寃申屈勞績可加内職外官課最無異茍能雪活何吝甄酬宜先録公文直具奏聞或官滿到闕投狀無到隔年庻絶濫訛用分真偽宜依仍付所司漢盧擢為右拾遺天福十二年轉對奏曰臣聞詩云哀哀父母生我劬勞又仲由云樹欲静而風不止子欲孝而親不待皆以昊天所覆永報為難今陛下信及昆蟲孝理天下漏泉之澤儻尚拘於常制過隙之恨誠何慰於孝思今請應在朝内外文武臣寮亡父亡母竝請特與追贈追封既存沒以知榮則寰區而荷徳勅曰盧擢忠勤奉職讜直立言貢以封章舉其墜典詳觀𢎞益尤切歎嘉宜下所司竝令舉奏乾祐元年詔尚書省集議内外臣寮父在母承子蔭叙封追封合加太字否以聞尚書省奏議曰今詳前後勅條凡母皆太字存歿竝同此即是父歿母存即叙封追封内加太字母歿追封亦加太字故云存歿竝同若是父在據勅格無載為母加太字處若以妻近勅因子貴與父命官父自有官則妻從夫品可以封妻父在不合以其子加母太字若雖有因子之官其品尚卑未得䕃妻亦不合用子䕃之限從之麻麟乾祐元年為水部郎中上言臣聞漢朝除吏茍稱其職不數遷移自先朝開國已來牧守多酬勲舊以寵勞臣竊見晉朝除刺史或數月驟替或一嵗即移不惟送故迎新轉成煩擾其次廉能者未暇施政貪濁者轉急誅求以臣愚管望朝廷立定年限觀其考課以議轉遷吕咸休為給事中乾祐元年上言臣見前朝閩浙入貢物色下船之後官差脚乘搬送到京臣悉諳知害民尤甚比來貢奉自是勤王差擾貧民貢之何益以臣管見凡此數處貢物竝令自出脚乘不困貧民於理無爽王易乾祐二年為尚書左丞上言尚書省名曰中臺素稱會府列曹令式廢墜多年兩轄紀綱隳紊積嵗或因貢一時之淺見破千載之通規遂俾廨宇類乎衡門官位等乎虛器若以從權改易應變弛張又未見國富時康家給民足禮記曰以舊防為無所用而壊之者必有水敗以舊禮為無所用而去之者必有亂患伏惟陛下守文繼統宰輔戮力致君立太平之基創無窮之業其尚書省二十四司公事望准令式積漸施行所有唐末艱難已來權立名目請皆停罷即守官有視事之方為吏無虛名之役于徳辰為兵部侍郎乾祐二年上封九事其一文武兩班有年深不遷官不改服色者或遭䘮闋而不追者今遇聖朝幸均渥澤其二每年貢舉人數極多登科者少伏恐淹滯賢能乞量增所放人數其三潭郡茶貨只至襄州客旅竝不北來請三司差清強官於襄州自立茶務收稅買茶足以贍國其四湖南見食嶺南鹽請置官綱於湖南立務權賣其五文武兩班差使出入所令部轄幹濟者聊加酬奬其六河朔縁邉豪俠丁壯能抵拒契丹鬭戰者官中訪聞擢用其七臣伏見官禁牛皮條流太重每請甲科合要皮請量於地畆上配納若民間牛死損亦從許貨賣其皮價不得過錢五百其八昨山陵宜仗一行道路人戸配米者未納已納竝請放免其九西道行營立功將卒早宜賞勞不報梁文贊為戸部員外郎乾祐二年上言臣竊見諸道州府力及人戸廣置田園不勤耕稼唯為興利以事末遊臣慮因循以成漸染請量為條敎以塞源流臣請在處官吏搜求此色戸民令出代耕錢納官以督農務劉濤為中書舍人乾祐二年上言方鎮之内土俗不同山澤川原租賦各異任土作貢蓋便黎民臣恐天下税賦上供土産各異恐於調度或未便安請勅諸道州府於所部之内貢賦供輸有未便特許上書論列以協物宜邉歸讜初仕晉為給事中開運三年奏臣近以宣達絲綸經過州縣切見使臣於劵料外别要供侍以紊紀綱亂索人驢自遞行李挾命為勢凌下作威或副應稍遲即便恣行打棒既遭屈辱寕免怨嗟天聽未聞無處披訴伏乞潛令察訪兼便明降指揮官吏秪供亦須精細使臣取索嚴示戒懲庻息煩苛漸期開泰者勅邉歸讜近曾銜命經歴郵亭見使臣踰違以公言上疏事為允當理協規程其諸道州府舘驛宜體所奏施行仍付所司又至隠帝時為刑部侍郎乾祐三年上言臣伏見諸處有人抛無名文書及言風聞訪聞之事不委根苗即便追擾既非責實多是構虛窮理本之有傷瀆化源之無益遂使貪吏狡吏蓄私憾以讐人讒夫佞夫扇狂言而害物請明行條制庻絶罔誣其受納獄訟直須顯有披論具陳名姓即據理詳按無縱舞文其無名文書及風聞訪聞竝望止絶不得施行俾存欽䘏之風不失含𢎞之體從之時史𢎞肇弄權殺害酷毒不循理體以羅織成風歸讜嫉之故有是奏周太祖廣順三年正月兵部尚書言管諸道州府貢物㨿元勅諸道州府合輸土貢每年冬至後到京嵗前㸃簡候正伏於殿廷樂懸南排列如不依期限到京者本州録事叅軍殿罰勾押官典各料斷當司每年坐勅文告報催促去年冬諸州府輸貢物違勅限者丹絳登曹等四州直至今年正月一日後方送貢物其本官典合行殿責欲移本州勘責從之竇儼為中書舍人顯徳四年上疏云伏以歴代至理六綱為首一曰明禮禮不明則彛倫不叙二曰崇樂樂不崇則二儀不和三曰熈政政不熈則羣務不整四曰正刑刑不正則巨姦不懾五曰勸農農不勸則資澤不流六曰經武武不經則軍功不盛故禮有紀若人之衣冠樂有章若人之喉舌政有統若人之情性刑有制若人之呼吸農為本若人之飲食武為用若人之手足斯六者不可斯須而去身也陛下思服帝猷寤寐獻納亟下方正之詔廓開藝能之路士有一技必得自效學攻百端靡不明至故小臣不揆愚鄙欲有陳導於禮樂刑政之内勸農經武之中相今所宜各具疏列其一曰夫禮者太一之紀品物之崇與天地同其節與隂陽順其道協於分藝行於國家本之以忠孝文之以倫義君臣父子夫婦之制冠婚䘮祭射御之容朝聘享宴之宜軍旅田獵之事各有宜稱不相侵越所以講信修睦所以洗心防患上得之尊下得之安定親疏而别同異明是非而彰貴賤執之則致福繆之則招悔憲物成敎崇政明本未有不繇於禮者也自五帝之後三王以來有益有損或因或革咸有章憲書於册書浩浩千編不可遽悉越在唐室典章頗盛程軌量昭采物酌中古訓垂法百代則有開元禮在紀先後明得失次其沿變志其楷式則有通典在録一朝之事包五禮之儀義類相從討尋不紊則有會要在此三者聖敎經制國之大綜也爰自梁朝之後仍世多故典臺之官皆差使於公務禮直之吏悉昧昏於撿按至今每有戎祀之事朝會之期多於市㕓草議定注前後矛楯卒多粃稗臣竊以保殘守缺因狭就寡乃暗主之事非明君所為豈可以光陛下超世之宏圗為大朝千載之盛美也所宜闡崇令猷以立國典綴叙舊書以為邦紀義在精審理資端要可以範圍五帝楷則萬古彰陛下之聖明禮不虛道者也伏請依唐會要所設門類上自五帝迄于聖朝凡所施為悉令編次凡闗禮樂無有闕漏開元禮通典之書包綜于内名之曰大周禮俾禮院掌之太常博士如得其人宜乆其職年深則兼官在任勿使旁轉如是則助風敎以彌隆昇典制於將替隠覈前軌聲施無窮者也其二曰夫樂者以徳為本以聲傳御中出所以導志外揚所以審政有天地辰宿有軌數形色有隂陽逆順有離合隠見天數五地數六六五相合故十一月至生黄鐘黄鐘者同律之主五音之元宫也元宫之諧於仲吕母子也傳於林鐘夫婦也廻於太簇父子也聚於南吕子婦也兩陽必爭二隂必乖故抗衡者多異前五相追而後五相隨蓋繇是也一章之中凡有七閏亥未巳丑酉午寅者七閏之正也日有盈縮之度月有遲速之期故或進於前或退於後隂陽之理也六鐘六間十二節凡二十有四位聲氣之大率也平分為七直而略其餘則子寅卯巳未酉戌謂之羽子寅辰午未酉亥謂之宫子丑卯巳未申戌謂之角子卯辰巳未酉戌謂之商此四者靡靡成章峻而清厲鄭衛之音也與夫推歴生律以律命吕九六之偶旋相為宫三正生天地之美七宗固隂陽之序者於其通人神宣嵗功生成範宜之德紀協長大之算則精麤異矣在乎審治亂察盛衰原性情應形兆則殊塗而同歸也三正者一為天二為地三為人七宗者黄鐘為宫太簇為商姑洗為角林鐘為徵南吕為羽應鐘為變宫㽔賓為變徵角為木商為金宫為土變徵為日變宫為月徵為火羽為水龍角元龜天豕井侯主乎角平亢河鼓婁聚輿鬼主乎商天根湏女庖爼鳥啄主乎宫辰馬隂虛旄頭天都主乎變徵大火兵封天高鳥翼主乎變宫龍尾𤣥窒四兵天倡主乎徵天津東壁叅伐輹車主乎羽角之數六十有四商之數七十有二宫之數八十有一變徵之數五十有六變宫之數四十有二徵之數五十有四羽之數四十有八極商之數九十陽之數一百二十有八隂之數一百一十有二五音之數畢矣神無形而有化處乎聲之門故昭之以音合之以算音以定主算以來象觸於耳而激於心然後可言其樂也其音五其聲十二其調六十雅部之樂也其音四其聲八其調二十有四胡部之樂也隋唐已來樂兼夷夏天寳之世雅部大備寳應之後音律漸衰郊廟殿廷舊事失次洎黄巢盪覆京兆鐘磬皆毁龍紀返正之嵗有司别創樂懸乗風雖存旋宫何在音範寖失至今闕然豈可以一時偶失之事為百代無窮之制何以訓正四方綏和百神軌物垂則示人之極也昔唐虞歴載頌聲方作文武相繼樂敎大同陛下布昭聖武彰信天下宗社靈祗聿監明徳所宜憲章成式不失舊物原始以要終體本以正末使樂與天地同和禮與天地同節伏請命博通之士上自五帝迄於聖朝凡樂章㳂革揔次編録凡三絃之通七絃之琴十三絃之筝二十絃之離二十五絃之瑟三漏之籥六漏之簥七漏之笛八漏之箎十三管之和十七管之笙十九管之巢二十三管之簫皆列譜記對而合之類從聲等雖異必通編於歴代樂録之後永為定式名之曰大周正樂俾樂寺掌之依文敎習務在齊肅如是則可以移風俗和上下和順之象著則嘉盛之徳備則六變至幽深九奏達高明知樂之為大者也其三曰夫政者正也以正率下下思盡誠則上無闕政人能持政非政持人若失人而務政則雖勤而何益故人道敏政政在擇人擇人之先自相而始登庸廊廟則有經啓措置之權入侍帷幄則有將迎承弼之任機事攸綜號令攸發平章於百揆維制於四方不可不重也唐末政出中要輕於爰立才處輔相之任便兼公揆之官卿大夫奔競公行禮讓道息未得之日則以致身富貴為馳騖既得之後則以與國休戚為憂虞乃三緘於統要之司獨善於兼濟之職但思觧宻勿之務守崇重之官逍遥林亭保安宗族於身之謀甚利於國之效如何方今宰臣實罄忠力燮和元化則嵗以之豐稔攸叙􅃔倫則時以之雍靖上無闕政下無異議固能明舉賢才羅濟經略也伏請今宰臣於南宫三品之中兩省給舍已上有能經營國家寜衛社稷者具名以舉若陛下素諳才業上符定制則輔相公揆之授誠亦得宜陛下嚮不知名或官品未稱則令以本官權知政事若尚書丞郎權知政事則兼散騎常侍之官陛下嵗年之間察其作為如能興利除害獻可替否進賢才退不肖則遷其官加其秩官高者則受平章事末高者但循資而轉且令權知如其非才即便守本官罷知政事讓其舉主令廷謝知過亦繇子玉敗軍令尹當責之義也書曰試可乃已又曰歴試諸艱今班行之中有員無職者大半可令量才授任臨事制宜出則以公務效試入則以舊位登叙任事者有賞不任事者當黜黜陟既明天下自正此則為政之道畢矣其四曰刑者五行之鞭䇿五性之權衡下民之隄防有國之紀律自古五刑之設期於無刑仲尼曰民有輕辜必求其善以赦其過民有大罪必原其故以輔其化如有死罪期使之生則其善也刑肅俗弊禮謂疵國勝殘去殺傳稱善人昔漢文斷獄四百殆致刑措唐朝貞觀之世嵗決死罪二人今陛下恤刑慎獄義權情恕非不至也而天下冐禁麗法者甚衆殊死大辟者頗多蓋繇未塞其原而理其著者也省刑之要厥有二端一者謹吏二者息盗謹吏在乎責長息盗在乎類取吴姬羣笑孫武加戮於隊長此責長之明效也襄民不道班伯得賊於酋豪此息盗之良術也夫一縣之政總於令長令長正下吏自肅一州之權統於牧守牧守繆僚屬必濫濫之與肅上使然也近代下民之訟多訟令佐敢訴牧守十中或一訟令佐者皆得理察訟牧守者十無一問縱或詰之而歸罪陪隸者衆矣斧鉞不用刀鋸日弊古人耻之典刑不阿貴賤貴猶當罰賤者自戒如是則官吏畏法刑損其半矣而又除其㓂盗使無逸越除盗之術大概有三一者使賤人徒侣自相糾告糾告不虛則以所告賊産之半賞其告者或一人能告十賊亦以十賊半産與之親屬之間比許容隠在於用權救弊亦可暫更今後有骨肉為非許令首告然所被告者不可令至極刑傷宗族之情失風敎之義只令通指同行徒侣則除惡甚多骨肉所首之人特與疎放如是則同惡自相疑阻争先於陳告骨肉欲保其親競來於原首此息盗之上䇿也二者如鄭州新鄭一縣團結鄉社之人名為義營分立將佐一戸為賊則累其一村一戸被刼則罪其一將大舉皷聲之所壯丁雲集賊徒至多不過一二十數義營所聚動及百人賊人奔逃無有免者見今鄭州封内唯新鄭獨免敓􅔯頃嵗尉氏強民潛徃宻縣行刼廻入新鄭疆界殺獲苦無漏遺豈止自部之中不留㐫慝兼令渉境之㓂難出網羅此息盗之中䇿也三者有賊之後村人報鎮鎮將詣村驗蹤團保限外不能獲賊罪罰鎮戍此息盗之下䇿也如是則姦盗漸息刑又損其半矣何慮漢文之年貞觀之世不在於今時邪其五曰農者至正之道自然之資為邦大本當今急務欲國家之康濟在府庫之充盈欲府庫之充盈在田疇之修闢人力可以課致地利可以計生若地利有遺人力不勸欲邦寜本固化洽時雍不可得也今宰牧怠職百姓怠業曠土不墾履畆是憂但隨宜以耕耘惟天時而是頼茍有水旱其將奈何危殆之機在乎反掌晉朝開運之嵗即其驗歟夫欲富國強兵愛民利物興事任力崇德尊道敷至化恢長御革頺風洽豐澤無不繇家給人足而馴致其道也家給人足始於務農務農之原實有三術一曰廣田二曰已債三曰節費廣田則所獲豐羡已債則儲積可保節費則嵗計有餘今民不廣田良有以也蓋慮無盡地之稼括為稅簿則并竭所收輸不滿要誰不懼也晉漢二代累發德音使民多種廣耕只以舊額供賦既種之後旋以見苗計租以至倉箱匱空鄉井愁歎先皇享御之始赦書節文之中亦勸民勤勞不殊前意至今曠隙之地荒萊不開繇於誠信前失民無固志者也夫為政之先莫若著信商君移木豈禮也哉蓋使人信之則無不治也陛下宜散下明詔使民廣田但輸舊租永不簡案上言宗廟以表至誠令州郡懸法之所刻石示民民必信之而田廣矣田廣則多獲多獲則民足王者藏於天下實一國之富完此廣田之上䇿也小畆歩百周之制也中畆二百四十漢之制也大畆三百六十齊魯之制也今所用者漢之中畆若歩以大畆之田輸其中畆之稅或額不敷舊則虛加滿之逮於次年而田自多矣此廣田之中䇿也前所言已債節費利莫大焉今編戸之甿以債成俗賦稅之外罄不償債收獲纔畢率無囷倉官有科折之弊私有酺醵之緍倍稱速息半價速賣則利貸一斗而償四斗矣欲民不困豈可得哉此外鄉閭之中常有酒食之耗謟僧佞佛相扇成風且瑞雪甘雨和氣所致非為一鄉一里委曲而降小民無知競作齋賽一嵗之内數數有之是則債利之刼民也將倍於公賦齋賽之蠧民也又等於王租欲民之饒終不可致莫若已債節費歸利於民起於來年不得通債今嵗見償之者但令以本債償之留其利餘為民不債之僃則民食資半矣夫陽秋之候豺獺尚祭民祭里社自古而然宜於二社之辰得以祭餘共相飲食其餘祈禱散賽之事嚴禁罷之則民食又資其半矣民食既足則民力普存民力普存則穡事敦業穡事敦業財用益豐因其利而利之則國富刑清天下知禮節矣其六曰兵者所以成武功遏亂略行天討順人心混一區宇昭宣文徳三五之代不能去兵故軒戰阪泉堯征丹浦西伯戡黎之誥成王踐奄之誓即其前躅也陛下卜世之數莫知其紀五徳所正涖萬方之率從未占而孚契人心不戒而謀同時利唯淮南李景負固不賓陛下神略内融大權潛運整軍經武倐往忽來戎輅一廵則八州降附靈旗再指則四塞盪平歸命者一一皆存來戰者萬萬無免偏師獻捷迨有百數仁贍交臂以請命夀春全城而北遷淮上嚥喉古來未有今以衆擊寡以尊伐卑以正破偽以強凌弱鮮不克矣然兵道貴速速則恵民在敵境者免驅掠俘馘之無期處内地者免資糧供億之為役荆湖兩浙竝有舟師聞其水戰之利勝於淮㓂皆未肯叶心齊力犄角成功者蓋慮呑韓併衛滅虞兼虢唇亡齒寒勢之懼也陛下宜分命使臣諭其成䇿錫之以丹書鐵契質之以左宗右社其三方協同大舉如秣陵淪䧟南服懐柔則元功盛勲當崇賞厚報俾百世傳襲保其江山旌旗服章僚屬官秩咸用舊制朝廷弗詢彼既得信誓之文又蒙寛大之詔必能禀大君之神算藉清廟之靈祥親督蒙衝横江長騖李景必分兵禦拒首尾支離陛下乃躬御六師方軌南進駐蹕江北圗惟厥成則濠廬等州可不攻而㧞矣帝覧而善之册府元龜卷四百七十六
