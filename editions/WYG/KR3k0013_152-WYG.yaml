body:
  text: 册府元龜卷一百五十二宋王欽若等撰帝王部眀罰雷電有震曜之象秋冬行肅殺之令王者法之以制刑典其來尚矣故士師用弼於五教犯雖小而必刑王制具列於四誅害為大而無赦葢聖人躬眀哲之性通天地之心佐徳以威順時行罰威克厥愛而事允濟罰當其罪而衆知勸大則殛竄殊死非所以為重也小則鞭扑入贖非所以為輕也然而閲罪簡孚有司之詳慎好生宥過王者之寛恕不及於嗣刑期無刑隨世損益厥有論要吕刑云屬於五極咸中有慶其是之謂乎舜流共工於幽州象恭滔天足以惑世故流放之幽州北裔放驩兠於崇山黨於共工罪惡同崇山南裔竄三苗於三危三苗國名縉雲氏之後為諸侯號饕餮三危西裔殛鯀於羽山方命圯族績用不成殛竄放流皆誅也異其文述作之體羽山東裔在海中四罪而天下咸服周武王既伐紂乃殺惡來惡來紂臣善䜛毁諸侯漢髙祖嘗為項羽將丁公逐窘丁公名固髙祖彭城西短兵接漢王急顧謂丁公曰兩賢豈相戹哉丁公引兵而還及項王滅丁公謁見髙祖以丁公徇軍中曰丁公為項王臣不忠使項王失天下者也遂斬之曰使後世之為人臣者無傚丁公也文帝十六年東莞侯劉吉坐事國人過員免事見役使之員數也景帝三年冬十二月詔曰襄平侯嘉紀通子也子恢説不孝謀反欲以殺嘉大逆無道恢說有私怨于其父而自謀反欲令其父坐死也說讀曰悦其赦嘉為襄平侯及妻子當坐者復故爵律大逆不道父母妻子同坐皆棄市今赦其餘子不與恢說謀者復其故爵論恢說及妻子如法武帝元封六年黎侯召延坐不出持馬要斬待發馬給軍匿不出也征和二年春制詔御史故丞相賀臣欽若等曰姓公孫倚舊故乗髙埶而為邪帝為太子賀已為舍人故為舊故興美田以利子弟賔客不顧元元無益邊穀戍邊卒糧乏不能為方計以益之也貨賂上流丞相貪冐受賄於下故使衆庶貨賄上流執事朕忍之乆矣終不自革革改也迺以邊為援使内郡自作車耕者自轉所以饒邊饒邊所以行恩施為己名援也或曰以胡為援也使内郡自省作車邊屯無事之時宜自治作車以給軍用而令内郡自省减諸餘功用而作車也省音所領切又令耕者自轉以困農自轉穀於邊煩擾畜者重馬傷耗武備衰减重謂懐孕者言轉運之勞畜産疲团故反使懐孕者為之傷耗以减武備也下吏妄賦百姓流亡又詐為詔書以姦傳朱安世傳逮捕也獄已正於理昭帝元鳯四年五月丁丑孝文廟正殿火太常及廟令丞郎吏皆劾大不敬會赦太常轑陽侯徳免為庻人元帝時諸葛豐為司𨽻校尉以春夏繫治人在位多言其短徙豐為城門校尉豐上書告光禄勲周堪光禄大夫張猛帝不直豐迺制詔御史城門校尉豐前與光禄勲堪光禄大夫猛在朝之時數稱言堪猛之美豐前為司𨽻校尉不順四時脩法度專作苛暴以獲虗威朕不忍下吏以為城門校尉不内省諸己省察也而反怨堪猛以求報舉舉言其事以報怨告案無證之辭暴揚難驗之罪毁譽恣意不顧前言前言謂稱堪猛之美今乃更言其短是不顧也不信之大者也朕憐豐之耆老不忍加刑其免為庶人成帝即位丞相御史條奏長信中太僕石顯舊惡及其黨牢梁陳順皆免官顯與妻子徙歸故郡憂懣不食道病死先是元帝時顯為中書令巧慧習事能探人主微㫖内深賊持詭辯以中傷人至是免官及諸所交結以顯為官皆廢永始二年十二月詔曰故將作大匠萬年佞邪不忠妄為巧詐多賦斂煩徭役興卒暴之作卒徒蒙辜死者連屬毒流衆庶海内怨望雖䝉赦令不宜居京師於是湯與萬年俱徙燉煌初將作大匠解萬年與闗内侯陳湯上封事起昌陵其後卒不就哀帝建平二年秋八月詔曰待詔夏賀良等建言改元易號増益漏刻可以永安國家朕過聴賀良等言過誤也兾為海内獲福卒亡嘉應皆違經悖古不合時宜六月甲子制書非赦令也皆蠲除之改元易號大赦天下以求延祚而不蒙福哀帝悔之故更下制書諸非赦罪事皆除之謂改制易號令皆復故也非赦令也猶言自非赦令耳也語終辭也而讀者不曉輙改也為他字失本文也賀良等反道惑衆下有司皆伏辜平帝即位以冷褎段猶等哀帝時定議尊定陶傅太后為太皇太后丁后為帝太后與太后同尊又為共皇立廟京師議入孝元皇帝貶褎猶皆徙合浦復免髙昌侯宏為庻人又有司奏方陽侯孫寵及右師譚等皆造作奸謀罪及主者骨肉雖䝉赦令不宜處爵位在中土皆免寵等徙合浦郡後漢明帝時何湯為郎中守開陽門候帝㣲行夜還湯閉門不納更從中東門入明旦詔詣大官賜食諸門候皆奪俸北鄉侯初即位大將軍耿寳中常侍樊豐侍中謝惲周廣乳母野王君王聖坐相阿黨豐惲廣下獄死寳自殺聖徙㕐門順帝為太子江京樊豐共搆䧟廢為濟隂王中黄門孫程等十九人迎立之閻顯兄弟聞帝立率兵入北宫尚書郭鎮與交鋒刅遂斬顯弟衛尉景遣使者入省奪得璽綬乃幸嘉徳殿遣侍御史持節收閻顯及其弟城門校尉耀執金吾晏並下獄誅永建元年虞詡代陳禪為司𨽻校尉數月間奏太傅馮石太尉劉熹中常侍程璜陳秉孟生李閏等百官側目號為苛刻三公劾奏詡盛夏多繫拘無辜為吏人患詡上書自訟曰法禁者俗之隄防刑罰者人之銜轡今州曰任郡郡曰任縣更相委逺百姓怨窮以苟容為賢盡節為愚臣所發舉贓罪非一二府恐為臣所奏遂加誣罪臣將從史魚死即以尸諫耳順帝省其章乃為免司空陶敦桓帝延熹二年梁冀以罪自殺其他所連及公卿列校刺史二千石死者數十人故吏賔客免黜者三百餘人朝廷為之空虗獻帝誅諸議郎侯祈尚書馮碩侍中臺崇討有罪也魏齊王芳嘉平中夏侯𤣥與李豐張緝蘇鑠劉賢樂敦同謀害司馬景王景王聞其謀先召李豐殺之事下有司收𤣥緝鑠敦賢等送廷尉鍾毓奏豐等謀迫脅至尊擅誅冡宰大逆無道請論如法於是會公卿朝臣廷尉議咸以為豐等各受殊寵典綜機宻緝承外戚椒房之尊𤣥備世臣居列侯位而包藏禍心搆圖凶逆交闗閹䜿授以姦計畏憚天威不敢顯謀乃欲要君脅上肆其詐虐謀誅良輔擅相建立將以傾覆宗室顛危社稷毓所正皆如科條律報毓施行詔書齊長公主先帝遺愛原其三子死命李豐子韜尚公主於是豐𤣥緝敦賢等皆夷三族其餘親屬徙樂浪郡晉武帝時石鑒轉尚書時秦凉為虜所敗遣鑒都督隴右諸軍事坐論功虗偽免官後為鎮南將軍豫州刺史坐討吳賊虗張首級詔曰昔雲中守魏尚以斬首不實受刑武牙將軍田順以詐増虜獲自殺誣罔敗法古今所疾鑒備大臣吾所取信徃者西事公欺朝廷以敗為得竟不推究中間黜免未乆尋復授用兾能補過而乃與下同詐所謂大臣義得爾乎有司奏是也顧未忍耳令遣歸田里終身不得復用勿削爵土也穆帝升平二年佽飛督王饒獻鴆鳥帝怒鞭之二百使殿中御史焚其鳥於四逹之衢後魏道武天興三年李栗為左將軍性簡慢矜寵不率禮度毎在帝前舒放倨傲帝積其宿過誅之於是威嚴始厲制勒羣下盡卑遜之禮自栗始也天賜六年秋七月慕容支屬百餘家謀欲外奔發覺伏誅死者三百餘人太武太平真君五年二月中山王辰等八人以北伐後期斬于那南八年六月西征諸將軍扶風公處貞等八將坐盗沒軍資所在虜掠贓各千萬詔並斬之封磨奴渤海人被刑為官人崔浩之誅也太武謂磨奴曰汝本應全所以致刑者繇事浩之故文成興安三年十一月辛酉行幸信都中山觀察風俗十二月誅河間鄭民為賊盗者男生十五以下為生口班賜從官各有差孝文延興四年十二月詔西征吐谷渾兵在句律城初叛軍者斬次分配柔𤣥武川二鎮斬者千餘人城陽王鸞與安南將軍盧淵李佐攻赭陽不利敗退而還時孝文幸瑕丘鸞請罪行宫孝文引見鸞等責之曰卿等摠率戎徒義因奮節而進不能夷㧞賊城退不能殄兹小㓂􅉻損王威罪應大辟朕革變之始事從寛貸今赦卿等死罪城陽降為定襄縣王削户五百古者軍行必載廟社之神所以示其威惠各有攸歸今懲卿等敗軍之罪於社之前以彰厥咎李洪之為秦益二州刺史洪之素非亷靖毎多受納時孝文始建禄制法禁嚴峻司察所聞無不窮紏遂鏁洪之赴京孝文臨太華庭集羣臣有司奏洪之受贓狼藉又以酷暴孝文親臨數之以其大臣聴在家自裁宣武時高聰為散騎常侍兼䕶軍藉貴因權耽於聲色賄納之音聞於遐邇中尉崔亮面陳聰罪帝乃出聰為平北將軍孝眀踐祚以其素附高肇出為幽州刺史孝莊建義三年四月爾朱天光討醜奴蕭寳寅於安定破禽之送於京師醜奴斬於東市寳寅死於駝牛渚後周閔帝元年二月丁亥楚國公趙貴謀反伏誅詔曰朕聞文考昔與羣公洎列將衆官同心戮力共治天下始終二十三載迭相輔弼上下無怨是以羣公等用升余於天位朕雖不徳豈不識此是以朕與羣公同姓者如兄弟同於一心平定宇内各令子孫享祀百世而朕不眀不能輯睦致使楚公貴不悦于朕與俟㡬通此奴興王龍仁子孫衍等隂相假署圖危社稷事不克行為開府宇文盛等所告及其推究咸伏厥辜興言及此心焉如痗音妹病也但法者天下之法朕既為天下守法安敢以私情廢之書曰善善及後世惡惡止其身其貴通與龍仁罪止一家衍止一房餘皆不問武帝建徳六年伐齊於陣獲其齊昌王莫多婁敬顯帝責之曰汝有死罪三前從并走鄴㩦妾棄母是不孝外為偽主戮力内實通啓於朕是不忠送欵之後猶持兩端是不信如此用懐不死何待遂斬之隋高祖開皇九年以陳都官尚書孔範散騎常侍王嵯王儀御史中丞沈觀等邪佞於其主以致亡滅皆投之邊裔沈君公自梁元帝敗後嘗在江陵禎明中與蕭憲蕭嚴叛隋歸陳後主擢為太子詹事君公博學有材辨善談論後主深噐之陳亡隋文帝以其叛亡命斬於建康王誼為郢國公以思禮稍薄頗懐怨望上柱國元諧亦頗失意誼數與相徃來言論醜惡胡僧告之公卿奏誼大逆不道罪當死帝見誼愴然曰朕與公舊為同學甚相憐愍將奈國法何於是下詔曰誼有周之世早豫人倫朕共遊庠序遂相親好然性懐險薄巫覡盈門鬼言怪語稱神道聖朕受命之初深存誡約口云改悔心實不悛乃説四天王神道誼應受命書有誼䜟天有誼星桃鹿二川岐州之下歳在辰已興帝王之業宻令卜問伺殿省之災又説其身是眀王信用左道所在詿誤自言相表當王不疑此而赦之將或為亂禁暴除惡宜伏國刑帝復令大理正趙綽謂誼曰時命如此將若之何於是賜死於家煬帝大業元年八月并州縂管漢王諒反左僕射楊素討平之三年正月癸亥詔并州逆黨已流配而逃亡者所獲之處即宜斬决九年斛斯政奔髙麗十年帝親征髙麗高麗囚送政帝大悦八月班師十月帝還京師十一月支解政於金光門外唐髙祖武徳元年十一月髙祖見奴賊帥張貴數之曰汝之為賊事絶人理不可忍言至乃對人父婿辱其妻女古來羣盗未有如斯之酷為人若此何可乆全左右㩧而腰斬之三年太宗破王行本面縳請降引見於華隂髙祖恐其亡逃慰勉之還令入城髙祖尋至蒲州數之曰汝請援建徳求助武周彌歴多時竟無至者知窮食盡方始出降遂使城内官民乆罹荼毒若不戮汝何謝寃魂於是斬之籍沒其妻子太宗貞觀二年六月下詔曰天地定位君臣之義以彰卑髙既陳人倫之道斯著是用篤厚風俗化成天下雖復時經治亂主或昏眀疾風勁草芬芳無絶剖心焚體赴蹈如歸夫豈不愛七尺之軀重百年之命諒繇君臣義重名教所先故能明大節於當時立清風於身後至如趙髙之殞二世董卓之鴆𢎞農人神所疾異代同憤况凡庸小䜿有懐凶悖遐觀典策罔不誅夷辰州刺史長蛇縣男裴䖍通昔在隋代委質藩寮煬帝以舊邸之情特相愛幸遂乃忘蔑君親潛圖弑逆宻伺間隙招結羣醜長㦸流矢一朝竊發天下之惡孰云可忍宜其夷宗焚首以彰大戮但年代異時兼累逢赦令可特免極刑投之四夷用明逆順之理以􅅄君臣之義可除名削爵遷配驩州初宇文化及得志大見親委及王世充敗以彭城歸國髙祖方以綏懷為務不之罪也初授滁州摠管太宗嘗從容謂侍臣曰君雖不君臣不可以不臣䖍通煬帝故人也而親為亂首朕方崇教義何得忘之後數日而發詔䖍通平常時毎云身除隋室以啓大唐自以為功頗冇觖望之色及得罪怨憤嵗餘而死七月戊申詔萊州刺史牛方裕綘州刺史薛世良廣州都督府長史唐奉義隋武牙郎將髙元禮並於隋代俱䝉任使乃恊契宇文化及搆成弑逆宜依裴䖍通除名配流嶺表七年春正月戊子詔曰宇文化及弟智及司馬徳戡裴䖍通孟景元禮楊覧唐奉義牛方裕元敏薛良馬舉元武逹李孝本李孝質張愷許𢎞仁令狐行逹席德方李覆等大業季年咸居列職或恩結一代任重一時乃包藏㓙慝罔思忠義爰在江都遂行弑逆罪百閻趙釁深梟獍雖事是前代嵗月已乆而天下之惡古今同棄宜從重典以厲臣節其子及孫并宜禁錮勿令齒叙化及為魁首又竊名號一門之内凶惡尤甚但其兄士及不預逆謀雖云昆季僅免誅戮自委質皇朝勲庸克著彰善癉惡抑有舊章士及一房不在此例布告天下咸使聞知十九年十一月庚辰帝征遼廽次易州界司馬陳元璹令百姓種蔬坑上而㣲火煦之欲其速生以擬供進太宗聞之責其謟媚詔免官髙宗永徽四年正月丙子司徒荆王元景司空吳王恪房州刺史駙馬都尉房遺愛寧州刺史駙馬都尉薛萬徹嵐州刺史駙馬都尉柴令武謀反二月乙酉遺愛萬徹令武并斬元景及恪遺愛妻髙陽公主令武妻巴陵公主并賜死帝引遺愛謂曰與卿親故何恨遂欲謀反遺愛曰臣包藏姦慝誠合誅夷但臣告吳王恪冀以贖罪竊見貞觀中紇于承基游文芝并與侯君集劉蘭同謀不軌於後承基告君集文芝告劉蘭並全首領更加官爵帝曰卿承籍緒餘身尚公主豈比承基等且告吳王反事無乃晩乎遺愛遂伏罪龍朔三年四月壬辰右史董思恭以知考功貢舉事預賣䇿問受贓帝令於朝堂斬之百僚畢集帝使謂之曰古者帝王皆不獨理藉股肱舟楫共安百姓今委寄公等本望副朕心董思恭賣䇿問取錢物悉已搜獲亂我憲章蠧害特甚事須以殺止殺懲警後來公等宜㸔决思恭與衆共棄使語思㳟曰汝是百代寒㣲未及倫伍只如右史簡英俊為之為汝薄解文章所以不次擢授計應少自勉厲深荷恩榮遂敢狼藉取錢自觸刑網汝須丼心服死為天下鍳誡思㳟臨刑告變免死長流嶺表咸亨二年婺州司馬秦懐恪坐贓特令朝堂斬之仍集百寮及朝集使宣勑謂之曰王者統天理物莫不先安百姓百姓安者止在庻寮朕所以每精簡岳牧及諸州上佐自非至誠清白景行循良者不輒畀此職庻其各申智效以禆政道泰懐恪法司抵罪但合處流朕以刑政之典須越常憲豈不知哀敬折獄情恤哀矜但以殺止惡義在懲肅又以刑人於市與衆棄之故對公等加其顯戮但法者國之權衡時之凖繩也權衡所以定輕重凖繩所以正曲直也罪惡難容者雖小必刑情狀可原者雖大必宥此乃彛典非故濫誅公等諸人當識朕意足為殷鍳各宜勉之中宗神龍元年三月制曰國之大綱惟刑與政刑之不中政乃必􅉻劉光業王徳夀王處貞屈貞筠鮑思恭劉景陽等庸流淺識姦吏險夫以酷暴為能官以凶殘為奉法徃從按察害虐在心倐忽加刑呼吸就戮曝骨流血其數甚多寃濫之聲盈於海内朕惟新布澤恩被人羣撫事長懐尤深惻𨼆光業等五人積惡成釁并謝生涯雖其人已殂而其跡可貶光業所有官爵並宜追奪其枉被殺人各令州縣鄉里埋塟還其官䕃劉景陽身雖見在情不可矜特以㑹恩免其􅃊罰宜從貶降以釋寃情是月又制酷吏丘神勣來子珣萬國俊周興來俊臣魚承曄王景昭索元禮傅逰藝王𢎞義張知黙裴籍焦仁亶侯思止郭覇李敬仁皇甫文備陳嘉言等雖已身死并遣除名睿宗唐隆元年六月以越州長史宋之問饒州刺史冉祖雍並交通凶逆徙於嶺表景雲元年九月制曰潞州刺史趙彦昭交結囬邪謟附凶孽輿金輦貨冒寵祈榮可貶歸州刺史先是巫媪趙氏昵於韋庻人得封為隴西夫人與彦昭隣居因附焉及趙氏誅自其家獲彦昭納賄賂故貶官𤣥宗平韋庻人以左御史大夫竇懐貞謟事逆徒貶授濠州司馬員外郎先天二年九月壬戌貶特進李嶠之子太子率更令暢為䖍州刺史嶠隨暢之任勑曰事君之節危而不變為臣則忠貳乃無赦特進致仕李嶠徃縁宗韋弑逆襲行戡定揖讓之際天命有歸嶠妄有窺覦不知逆順伏陳詭計朕親覧之以其早負詞學累居台輔忍而莫言將掩其惡今忠邪既辨與物惟新賞罰儻乖下民安勸雖經赦典猶宜放斥於其老疾俾遂餘生聴随子暢赴任十月癸卯帝親講武於驪山之下徴兵二十萬旌旗連亘五十餘里戈鋋金甲照曜天地列大陣於長川坐作進退以金皷之聲節之三軍出入號令如一帝親擐戎服持沉香大鎗立於陣前威振宇宙長安士庻奔走縱觀填塞道路兵部尚書郭元振以􅉻失軍容坐於纛下將斬之宰相劉幽求張說跪馬前諫曰元振翼戴上皇有大功於國雖犯軍令不可加刑伏望寛宥以從人望帝乃捨之配流新州給事中知禮部事唐紹以董軍儀有失坐於纛下斬之開元三年正月以郯王府長史崔恪與昆弟不睦冀州刺史平嗣先乆闕温凊之禮并解見任二月戊子勑曰涪州刺史周利貞滑州刺史裴談饒州刺史張利貞大理評事張思敬大理評事王承本京兆府華元令劉暉貝州鄃縣令楊允陳州太康令康璋侍御史封詢行及判官張芝衞遂之公孫琰申州司馬鍾思亷等十三人皆為酷吏比周興來俊臣侯思止等事跡稍輕並宜放歸草澤終身勿齒三月丙午廓州刺史左感意坐贓杖殺勑曰好生之徳雖叶於天意止殺之義用勸於生靈止者因而不犯殺者豈以為暴前廓州刺史左感意頃居塞上㧞自行間薄效未輸率情狂鄙輕侮彛憲侵擾公私贓數既多割剥滋甚曽飢狼之不若固害馬之宜除比令按問咸自承伏且縁邉人徭役辛苦朕嘗思惠養特所哀憐寕有作牧宣條恣行非法儻不悛于常典何以塞彼深愆宜其處置以謝百姓四年正月癸未皇后妹婿尚衣奉御長孫昕與其妹婿楊仙玉於里巷間毆撃御史大夫李傑初昕以細故與傑不恊自負懿戚遂肆其豪縱辱之即日傑上表自訴曰髪膚見毁雖則痛心冠冕被凌誠為辱國帝大怒令於朝堂斬昕等左散騎常侍馬懐素以陽和之月不可行刑累表陳諫乃下詔曰夫為令者自近而及逺刑罰者先親而後踈長孫昕楊仙玉等慿恃戚屬恣行兇險輕侮常憲損辱大臣情特難容故令斬决今羣官等累陳表䟽故有誠請以陽和之節用肅殺之時援引古今詞義深懇朕志雖從諫情亦惜法宜寛異門之罰從聴枯木之斃即宜决殺以謝百寮仍降勑書慰諭傑曰長孫昕等朕之宻戚不能相遵以禮而使凌犯衣冠惟寘以極刑俾之謝罪卿志氣忠亮為國柱臣宜以剛腸疾惡勿以兇人介意十年閏五月乙酉上封人蔣寵言事渉邪杖四十流于藤州勑曰朕以菲徳㳟承大寳執天下之政奉宗廟之靈于今十載矣何嘗不日慎一日雖休勿休夙夜憂勞無忘鍳寐永惟萬事之統恐累三光之明幸天地休和羣生樂業尚且内惟輔弼外咨牧宰徴諫納善舉才任賢佇求瘼以利人思進道以益化宇宙至大軍國事殷慮一物之失所當萬方之重責故設匭皷以通諫許士庻之盡言而政教未孚澆訛日甚獻言者苟求自逹論事者多渉於妄國子進士常州人蔣寵學不師古識未知今或離間君臣或非毁骨肉固是異端阿僻之説甚乖輸忠效直之意若寖以成風則姦險道長人而無禮法所宜誅朕志在好生情求進善恐來者未悟儻黙而不言思存大猷務設寛典宜决杖一頓移貫藤州為百姓自今已後貢舉及陳奏上封者必須景行循謹無使僥倖求名若制令有􅉻禮刑致紊失於政理責在朕躬則敬佇昌言法當無𨼆百辟兆庶識朕意焉十一年帝謂宰臣曰昨聞萬年縣界崇仁坊有黄衣長上斫殺人不見州縣奏來是何道理時左金吾衛黄衣長上楊駱持刀入烏那昇家傷昇妻女僅而免死有司懼罪將掩之及是張説等且以實奏曰陛下至眀無幽不燭臣等闇劣誠負聖朝帝曰事在有司非卿之過宜令京兆尹孟温即收駱集衆杖殺十五年趙州平棘縣人趙乾祐獻書妄引經義論及休咎配流安南是年尚書左丞相張説御史大夫崔德甫中丞宇文融以朋黨坐説致仕德甫免官侍母融出為魏州刺史十七年七月丁巳吏部侍郎崔澣坐交游非道制曰朕聞四時之義信在不言三代之風徳以歸厚道可先乎訓俗理必繇乎在位有犯無隠名教之攸先上和下睦憲章之惟舊其有辯言亂政實誡殷書偽行登朝深懲魯典朝請大夫守吏部侍郎上䕶軍崔澣累踐清要誠宜至公承議郎守興州别駕麻察頻經貶逐理合遷善乃交搆將相離間君臣作謟黷之笙簧是徳義之蝥賊都水監丞齊敷靈州都督府兵曹參軍郭禀等趨走末品姦譎在心左道與人横議於下並青蠅可鍳害馬難容或任高星象或名㣲草芥上耻大夫之辱下羞徒𨽻之刑特解􅃊誅宜從逺逐澣可高州良徳縣丞員外置長任察可潯州皇化縣尉員外置長任敷宜量决一百長流崖州禀亦量决一百長流白州仍並差使馳驛領送雖萬方之過情切在予而四罪以聞刑其自爾且如非賢勿理食禄憂政庶乎文武百辟忠公事主出惟長者之逰言必先王之道光昭雅訓可不務乎如或迹在不經思出其位雖輕勿赦抑有常法布之朝綱知朕意焉二十年六月幽州長史趙含章坐盗用庫物左監門貟外將軍楊元方受含章饋餉並於朝堂决杖流瀼州皆賜死于路二十四年四月詔曰武温眘聚合姦黨託附權要妄搆異端為其魁傑兼有私穢合當極法宜重杖决一百河南府福昌縣主簿魏萱前睦州桐廬縣尉王延祐相為黨與朝夕談議既渉非違宜各决一頓長流竇州天寳二年正月貶吏部侍郎苖晉卿吏部侍郎宋遥時李林甫為尚書專在廟堂銓事唯委晉卿及宋遥主之選人既多毎年兼命他官有識者同考定書判務求其寔是載春御史中丞張倚男奭叅選晉卿與遥以倚初承恩欲恱附之考選人列等第凡六十四人癸甲乙丙科奭在其首衆知奭不讀書論議紛然有蘇孝藴者嘗為范陽令前事安禄山具其事告之禄山恩寵特異謁見不常因而奏之𤣥宗大集登科人御花蕚樓親試升第者十無一二焉奭手執試紙竟日不下一字時人謂之曳白帝怒貶晉卿為安康郡太守遥為武當郡太守倚為淮陽郡太守勑曰門庭之間不能訓子選調之際仍以託人時士子皆以為􅉻笑考官禮部郎中裴朏起居舍人張烜監察御史宋昱右判拾遺孟正朝皆貶官嶺外五載十月河北道黜陟使以鄴郡鄩陽縣令楊懋等十五人清狀及善狀聞劍南道黜陟使以江油郡太守趙憕等六人贓狀聞初詔委周親舉守令及是考績乃下詔曰朕憂彼黎元寄之牧宰嘗慮授任非當撫字乖方頃所以設舉親之科廣得賢之路爰初詣闕亦既明試以言及乎從政必欲深考其實懸之賞罰要以始終近日分遣使臣因之廵察善惡之騐事既足明懲勸之端言斯可復其楊懋等七人黜陟使並奏清狀宜與改轉其所舉主六品已下付所司准此處分五品已上各賜一上下考李連等八人既奏善狀除已改官者至選日各减三兩選仍稍優與處分一中上考趙憕等六人但犯贓私除已流貶者自餘並速准律科㫁其舉主各量犯者罪狀輕重咸從貶黜仍宣示中外咸使知悉六載二月丁酉嶺南五府經略採訪使彭果坐贓伏罪詔曰嶺南五府經略採訪使光禄少卿兼南海郡太守攝御史中丞彭果頃者擢以非次鎮彼方隅不能慎守名簡克副朝寄而乃貪惏匪極求欲無厭官吏恣其侵漁蒼生受其塗炭醜聲轉露穢迹彌彰及令推窮並自招伏計其贓數十萬有餘議以常科法當殊死但尚寛典免致􅃊誅宜從杖罰俾徙荒徼即就大理寺門决六十除名長流溱溪郡仍即差使馳驛領送至彼捉搦勿許東西十四載正月左降官澧陽郡長史吉温坐非法伏罪詔曰太中大夫澧陽長史員外置同正員吉温頃因任使輙肆威福行刻物之法人殆不堪􅁬自賢之心士無敢忤况徇私傾險公行毁譽飾偽言而售詐崇詭行以釣名離貳朝廷猜攜倫伍近皆發露薄從貶黜而作孽未弭𨼆慝更彰且縱姦非逼人子女復受賄賂莫懼彛章或侵漁田宅取納口馬尚恐誣謬當令按劾及尋枝葉咸悉根源人之無良乃至于此國有常憲合寘極刑時屬陽生特從寛議宜謫遐裔以戒庶寮可晉康郡端溪縣尉員外置長任所在即馳驛發遣十一月范陽節度安禄山反兵向闕是月斬其男太僕卿慶宗肅宗幸靈武至安定郡初帝之北新平太守薛羽安定太守徐㲄皆棄郡走使人驚散左右勸帝斬之以勵天下帝斬之而後行至徳元載九月肅宗引潼闗敗將王思禮吕崇賁李承光等於纛下將斬之文部尚書平章事房琯救之獨斬承光餘并釋放二載鳯翔張謙奴附子告謙與逆賊為細作三司推鞫虗妄乃下詔曰周以五聲聴訟漢以三章約法自下訟上敗俗亂常矯誣之詞妄稱不軌忿意之嫉圖有誅夷朕處分中書門下再令按問備兹閲實其妄告張謙奴附子宜付鳯翔郡集衆决殺十月帝自鳯翔還京西京文武脅從官免冠徒跣朝堂謝罪收付大理京兆獄分繋之十二月受賊偽官陳希烈逹奚珣等二百餘人並繋楊國忠宅付三司推鞫丙戌東京脅從官免禁繋者數百人引于朝堂免冠徒跣號泣叩頭謝罪辛亥又遣禮部尚書李峴兵部侍郎吕諲為三司詳理使是月三司所推受賊偽官陳希烈等定六等罪於尚書省集議皆以為極重刑之於市與衆棄之其次自盡及重杖一頓其次三等皆流貶壬申以嵗除之日行刑於子城西南隅柳樹下集百寮觀焉自盡於大理寺决杖於京兆府門詔曰人臣之節有死無二為國之體將而必誅况乎委質賊庭宴安逆命耽受寵禄淹延嵗時不顧恩義助其効用此則可宥法將何施逹奚珣等或受任台輔位極人臣或累葉寵榮姻聨戚里歴踐臺閣職通中外夫以犬馬㣲賤之畜猶知戀主龜蛇蠢動之類皆能報恩豈曰人臣曾無感激有靦面目事於㓂讐亂臣賊子何以過也自逆賊作難傾覆邦家凡在黎元皆含憤怒殺身殉國者不可勝數此等黔首獨背國恩豈可列在崇班荷兹禄位不思君親之分唯與凶逆同心受任於梟獍之間諮謀於豺虺之輩静言思此情何可矜朕志在含𢎞法務寛貸然凶惡之類自招其咎人神所棄天地不容原其本心皆合殊死就中情狀仍有處分逹奚珣等一十八人並宜處斬陳希烈等七人並賜自盡前大理卿張均特宜免死長流合浦郡代宗永泰元年殿中侍御史内供奉李鈞鈞弟京兆府法曹叅軍鍔並不守名教配鈞于施州鍔于辰州縱㑹非常之赦不在免限鈞鍔温州人也天寳中州舉道舉咸赴京師既升第叅官遂割貫長安與鄉里絶凡二十餘載母死不舉温州别駕知州事嗣曹王臯具以事聞下憲司訊問鈞等具伏罪帝歎息乆之曰三千之刑莫大于此合寘轘裂豈止謫竄焉大厯二年正月逆賊周智光男元翰華州司馬元耀判官監察御史邵賁都虞候蔣羅漢並伏誅其元翰邵賁處極刑要斬勑曰大逆不道抵夷狄之誅同惡相濟當棄市之法以懲干紀式按彛章周元翰賊臣之子兇慝成性與父偕亂厥罪惟均邵賁敢有包藏恣其悖虐怙威㓕義奪攘徃來䖍戮無辜罪浮于帥宜並處極法其周元耀蔣羅漢尹元經毛崇彬李尚林等共肆醜圖同惡相濟猶捨斧鑕俾全要領其劉憲周封崔勸等同附姦邪俱行扇惑以私情蠧國議法從寛周元清年在㓜冲法當配沒並准法處分朕自臨萬國思措五刑不虞兇殘有此冐犯寘以眀憲期於止殺凡百卿士知朕意焉四年正月辛卯詔曰恃衆專殺謂之亂常合旅併命謂之不道按以春秋重其責帥况自悖人理實生厲階合從棄市之論尚就議親之典夷州流人前潁州刺史李岵幸以宗屬列於藩任政之不脩亂是用長輕侮法令動揺軍州御史姚奭廵至所部其弟叅於佐理諸將素有猜嫌欲加之罪不可無狀遂言使者之來事在不測俾其完聚甲兵變更將守潜䟽其意以搆禍萌而岵親自㸃竄詐云奭之遺堕以此疑衆因而合謀兄弟同誅宗黨咸淪胥而斃又䧟數家勤兵抗威以拒所統人不堪命一方騷然頃發近臣審令按理醜圖既露姦狀甚眀薄示戒懲已從流斥詢于羣議頗屈常典朕思以道徳在宥天下庶使一代之人登于仁夀之域風俗猶薄政教不眀致令長吏專此威暴無罪無辜横分身首寃氣慘結有傷元和惕然增懐良亦自咎期於止殺不可措刑寛其斧鑕之誅降從盤水之禮宜賜自盡雖恩不掩義道在無私而禮有縁情誠亦多愧王者之法敢忘至公凡百卿士宜知朕意初岵專殺有司以岵當流罪帝務息人慮三軍不安乃按軍令癸巳詔曰葢議讞之道期于無刑有眀罰以校其犯者有立訓以導其迷者有捨過以舉其才者有諭㫖以愧其心者在於聴理必叅而用之朝奉郎守京兆府奉先縣令賜緋魚袋張增忝為奉法之吏不具獄論而自專威命雖義形嫉惡而情近深文鄜坊都防禦使衙前將右驍衛大將軍員外置同正員賜紫金魚袋叔孫勝不率戒訓自抵彛章恣其舊猛以至凌犯豈非惠姦縱暴者歟凡人之情各於其黨皆不能屈心引義同合至公過用此生刑用此作詢于卿士咸引正議朕以増之宰邑頗有政能惠于疲人可謂良吏勝亦乆服戎事備經戰守艱虞已來累有勲績並寛以常憲惜其所長俾從罷黜用佇來效宜各解見任其叔孫勝仍付抱玉軍前驅使初勝之屬怒率麾下數十人突入公府増遭毆辱僅而獲全帝聞而怒之發御史訊鞫咸得其狀故有是命也六年上封人李少良告宰臣元載隂事復又漏言於韋頌等帝大怒乃勑曰李少良韋頌等兇險悖戾反常逆理恣其䜛説將搆禍階離間君臣矯誣中外醜圖姦狀按驗皆眀殿中侍御史陸珽幸忝清憲之職仍叅儒館之侍交結非類包藏不測豈有周行之列容此一凶跡既同惡法當均罪并宜付京兆府各决重杖一頓朕毎以君子小人貌同心異必先觀行然後察言豈兹譖讟能廽聴㫁夫招賢納諫君之體也獻直盡規臣之節也朕仄席思理佇聞政道豈謂姦邪凶慝紊我彛倫須别是非用分涇渭再加詳鞫能正刑典凡百在位宜悉朕懐時元載專政用事所居第宅崇侈子弟縱横貨賄公行士庶咸嫉之少良忿不見用乘衆怒以抗䟽帝聞之留少良於禁中客省少良友人韋頌因至禁門訪少良少良漏其言頌不慎宻遂為載備知其㫖班國子司業善經之子也少傳父業頗通經史性浮躁而踈故俱及於難自是載之惡始彰十二年五月元載黨卓英倩李待榮李季連並付京兆府集衆杖殺十月京畿水旱京兆尹黎幹奏損田户部侍郎判度支韓滉執奏幹不實乃命廵覆時渭南縣令劉藻曲附度支且善干名以縣界田並無損白于府及户部分廵御史趙計不欲忤度支奏報恊藻帝覧奏以為水旱咸均不宜渭南獨免申命侍御史朱敖再覆敖復命渭南損田三千餘頃帝歎息乆之大怒藻因謂敖曰縣令職在字人不損猶宜稱損損而不問豈有恤隠之意耶卿之此行可謂稱職下有司訊覆藻及趙計並伏罪乃罷藻為萬州南浦縣員外尉計為澧州貟外司户叅軍十三年三月隴右節度判官御史裴昕及昭義軍節度使李承昭之子潤之並專殺伏罪勑曰自古制刑殺人者死法不可緩㫁之則行裴昕頃在軍幕遂知留務内懐私忿敢蓄凶謀曽無罪名專殺良將憲司鞫問欵占眀白宻邇京師擅行威戮宜付京兆府集衆决殺又李潤之賊殺無辜汙染屬籍與衆同棄何必甸人朕於勲臣子孫皆欲優異但殺人之罪法不可寛國有舊條是用恭守及兹即戮愍惻良深亦宜付京兆府集衆决殺昕左僕射冕之從兄弟也隴右副元帥李抱玉引為判官有吏幹抱玉卒掌留務於􅉦厔行營以法操下有兵馬大將張肅耻為所屬頗慢易之昕方以􅃊毅取名兾其趨拜會是激怒因杖殺之三軍惕駭軍吏馳驛以聞帝異之下有司訊問昕詞無所屈承罪而已潤之兇悖之徒也父承詔掌方面家産優厚肆其狂悖因姦通使酒殺人事泄金吾擒之以聞册府元龜卷一百五十二
