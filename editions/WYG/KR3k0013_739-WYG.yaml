body:
  text: 册府元龜巻七百三十九宋王欽若等撰陪臣部忠義夫珪璋之徳投烈火而辨松栢之姿渉歲寒而顯忠臣之志因危難而覩義士之操遇顛沛而彰當夫周道衰微諸侯立政旣有内患且多外虞茍或失人何以為國乃有叅家陪之列當囏阨之㑹秉大節仗明誠不以利囘不以威奪臨鈇鉞而靡懼隳肝膽而無悔或身狥於社稷或功濟於邦家雖成敗有殊而蹈死無異故可書之竹帛賁其封樹聳觀於千載伸勸於多士焉徒人費齊人也齊襄公以魯桓十八年殺公子彭生魯荘公八年齊連稱管至父謀作亂冬齊侯游于姑棼遂田于貝丘姑棼貝丘皆齊地田獵也樂安博昌縣南有地名貝丘見大豕從者曰公子彭生也公見大豕從者見是彭生皆妖鬼公怒曰彭生敢見射之豕人立而啼公懼隊于車傷足喪屨反誅屨于徒人費誅責也弗得鞭之見血走出遇賊于門劫而束之費曰我奚禦哉袒而示之背信之費請先入詐欲助賊伏公而出鬬死於門中石之紛如死於堦下石之紛如齊小臣亦鬬死賊入殺孟陽於牀孟陽亦小臣代公居牀仇牧宋大夫也魯荘公十二年宋長萬摶閔公絶其脰牧聞難而至遇萬於門手劍而叱之萬臂擬仇牧而殺之齒著乎門闔鬻拳楚大閽也魯荘公十九年春巴人伐楚楚子禦之大敗于津禦巴人為巴人所敗津楚地或曰江陵縣有津鄉還鬻拳弗納遂伐黄黄嬴姓國今弋陽縣敗黄師于踖陵踖陵黄地還及湫有疾南郡鄀縣東南有湫城夏六月卒鬻拳葬諸夕室夕室地名亦自殺也而葬于絰皇絰皇冢前闕生守門故死不失職初鬻拳彊諫楚子楚子不從臨之以兵懼而從之鬻拳曰吾懼君以兵罪莫大焉遂自刖也楚人以為大閽謂之大伯若今城門校尉官使其後掌之使其子孫掌主此官君子曰鬻拳可謂愛君矣諫以自納于刑刑猶不忘納君于善言愛君明非法也楚文王能盡其忠愛所以興也季友魯公子也魯荘公三十二年公疾問後於叔牙對曰慶父材盖欲進其同母兄問於季友對曰臣以死奉般季友荘公母弟故欲立般公曰鄉者牙曰慶父材成季使以君命命僖叔待于鍼巫氏成季季友也鍼巫氏魯大夫使鍼季酖之酖鳥名其羽有毒以畫酒飲之則死曰飲此則有後於魯國不然死且無後飲之歸及逵泉而卒立叔孫氏逵泉魯地不以罪誅故得立後世其祿八月癸亥公薨于路寢子般即位鬬穀於莵為令尹申公鬬般殺子元申楚縣也令尹自毁其家以紓楚國之難𢎞演一作寅衛懿公之臣也受命而使未及反魯閔公二年翟人攻衛於是懿公欲興師迎之其民皆曰君之所與祿位者鶴也所富者宫人也不若亦使鶴與宫人戰余安能戰左傳曰狄伐衛懿公好鶴鶴有乗軒者将戰國人受甲者皆曰使鶴鶴實有祿位余焉能戰遂潰而皆去翟人至追及懿公于熒澤殺之盡食其肉獨舍其肝𢎞演至報使於肝辭畢呼天而號盡哀而止曰若臣者獨死可耳於是遂自刳出腹實納懿公之肝乃死齊桓公聞之曰衛之亡也以無道也今有臣若此不可不存於是復立衛于楚丘如𢎞演可謂忠士矣殺身以狥其君非徒狥其君又令衛之宗廟復立祭祀不絶可謂有大功者矣荀息晉大夫也魯僖公九年九月晉獻公卒里克丕鄭欲納文公故以三公子之徒作亂丕鄭晉大夫三公子申生重耳夷吾初獻公使荀息傅奚齊公疾召之曰以是藐諸孤言其㓜賤與諸子縣藐辱在大夫其若之何欲屈辱荀息使保䕶之荀息稽首而對曰臣竭其股肱之力加之以忠貞其濟君之靈也不濟則以死繼之公曰何謂忠貞對曰公家之利知無不為忠也送往事居偶俱無猜貞也往死者居生者偶兩也送死事生兩無猜疑所謂正也及里克将殺奚齊先告荀息曰三怨将作三公子之徒秦晉輔之子将何如荀息曰将死之里克曰無益也荀叔曰吾與先君言矣不可以貳能欲復言而愛身乎荀叔荀息也復言言可復也雖無益也将焉辟之且人之欲善誰不如我我欲無貳而能謂人已乎言不能止里克使勿忠于申生等冬十月里克殺奚齊于次次喪寢荀息将死之人曰不如立卓子而輔之荀息立公子卓以葬十一月里克殺公子卓于朝荀息死之君子曰詩所謂白圭之玷尚可磨也斯言之玷不可為也荀息有焉叔詹鄭大夫也晉公子重耳過曹曹共公不禮焉聞其駢脅欲觀其狀止其舍諜其将浴設微薄而觀之未候微蔽薄廹也公子過鄭鄭文公亦不禮焉叔詹諫弗聽請殺之弗聽公子反國是為文公文公誅觀狀以伐鄭鄭人以名寳行成公不許曰與我詹而師還詹叔儋伯也詹請往鄭伯不許詹固請曰一臣可以救百姓而定社稷君何愛于臣也鄭人以詹與晉人晉人将烹之詹曰臣欲盡辭而死公聽其辭詹曰天降鄭禍使淫觀状棄禮違命淫放也放曹國不禮於君臣曰不可夫晉公子賢明若使復國而得志於諸侯禍不赦矣今禍及矣尊明勝患智也明謂公子勝猶過也殺身贖國忠也乃就烹據鼎耳而疾號曰自今以往知忠以事君者與詹同命乃不殺厚為之禮而歸之鄭人以詹伯為将軍侯獳曹伯之豎豎掌通内外者魯僖公二十八年晉執曹伯晉侯有疾晉侯文公也侯獳貨筮史史晉史使曰以曹為解以滅曹為解故齊桓公為㑹而封異姓封邢衛今君為㑹而滅同姓曹叔振鐸文之昭也叔振鐸曹始封之君文王之子先君唐叔武之穆也且合諸侯而滅兄弟非禮也與衛偕命私許復曹衛而不與偕復非信也同罪異罰非刑也衛已復故禮以行義信以守禮刑以正邪舍此三者君将若之何公説復曹伯寗俞衛大夫也初衛侯與元咺訟寗武子為輔鍼荘子為坐士榮為大士大士治獄官也周禮命夫命婦不躬坐獄訟元咺又不宜與其君對坐故使鍼荘子為主又使衛之忠臣及其獄官質正元咺傳曰王叔之宰與伯輿之大夫坐獄于王庭各不身親盖今長吏有罪先騐吏卒之義衛侯不勝三子辭屈殺士榮刖鍼莊子謂寗俞忠而免之執衛侯歸之於京師寘諸深室深室别為囚室寗子職納槖饘焉寗俞以君在幽隘故親以衣食為己任槖衣之槖饘糜也言其忠志所慮者深也魯僖公三十年晉侯使醫衍酖衛侯衍醫名晉侯實怨衛侯欲殺而罪不及死故使醫因治疾而加酖毒俞貨醫使薄其酖衛侯不死俞視衛侯衣食故得知之弦髙鄭商人也魯僖公三十三年春秦使孟明西乞白乙侵鄭及滑弦髙将市於周遇之以乗韋先牛十二犒師商行賈也乗四韋先韋乃入牛古者将獻遺于人必有以先之曰寡君聞吾子将歩師出于敝邑敢犒從者不腆敝邑為從者之淹居則具一日之積腆厚也淹久也積芻米菜薪行則備一夕之衛且使遽告于鄭若敖克黄令尹子文之孫為楚箴尹魯宣公四年楚子文卒子越将攻王戰于臯滸遂滅若敖氏克黄使於齊還及宋聞亂其人曰不可以入矣箴尹曰棄君之命獨誰受之君天也天可逃乎遂歸復命而自拘于司敗王思子文之治楚國也曰子文無後何以勸善使復其所改命曰生易其名也解揚晉大夫魯宣公十五年楚圍宋宋人告急于晉晉使解揚如宋使無降曰晉師悉起将至矣鄭人囚而獻諸楚楚子厚賂之使反其言反言晉不救不許三而許之登諸樓車使呼宋人而告之遂致其君命楚子将殺之使與之言曰爾旣許不穀而反之何故非我無信女則棄之速即爾刑對曰臣聞之君能制命為義臣能成命為信信載義而行之為利謀不失利以衛社稷民之主也義無二信欲為義者不行兩言信無二命欲行信者不受二命君之賂臣不知命也受命以出有死無隕隕廢墜也又可賂乎臣之許君以成命也死而成命臣之福也寡君有信臣下臣獲考考成也死又何求楚子舍之以歸逢丑父為齊頃公車右魯成公二年六月齊侯與晉師戰于鞍齊師敗績逢丑父與公易位居公位将及華泉驂絓於木而止驂馬維也韓厥執縶馬前韓厥晉中軍司馬縶馬絆也執之示修臣僕之禮再拜稽首奉觴加璧以進曰寡君使羣臣為魯衛請曰無令輿師陷入君地下臣不幸屬當戎行無所逃隐且懼奔辟而忝兩君臣辱戎士敢告不敏攝官承乏丑父使公下如華泉取飲鄭周父御佐車宛茷為右載齊侯以免佐車副車韓厥獻丑父郤獻子将戮之呼曰自今無有代其君任患者有一於此将為戮乎郤子曰人不難以死免其君我戮之不祥赦之以勸事君者乃免之齊侯免求丑父三入三出重其代已故三入晉軍求之子叔聲伯魯大夫也成公十六年秋公㑹諸侯於沙隨初宣伯叔孫僑如通於穆姜穆姜成公之母欲去季孟而取其室季文子孟獻子将行穆姜送公而使逐二子公以晉難告㑹晉伐鄭曰請反而聽命姜怒公子偃公孫鉏趨過二公子公庶弟指之曰女不可是皆君也言欲廢公更立君公待於壞隤申宫儆備申勑宫備設守而後行七月公㑹尹武公及諸侯伐鄭将行姜又命公如初復欲使公逐季孟公又申守而行諸侯之師次于鄭西我師次于督揚不敢過鄭督揚鄭東地子叔聲伯使叔孫豹請逆於晉師豹叔孫僑如弟也僑如於是遂作亂豹因奔齊為食於鄭郊師逆以至聲伯戒叔孫以必須所逆晋師至乃食聲伯四日不食以待之食使者使者豹之介而後食言其忠也宣伯使告郤犨曰魯之有季孟猶晉之有欒范也政令於是乎成今其謀曰晉政多門不可從也政不由君寧事齊楚有亡而已蔑從晉矣蔑無也若欲得志於魯請止行父而殺之行父季文子也我斃蔑也蔑孟獻子也時留守公官而事晉蔑有二矣魯不二小國必睦不然歸必叛矣九月晉侯執季文子於苕丘公還待於鄆鄆魯西邑東郡廪丘縣東有鄆城使子叔聲伯請季孫於晉郤讐曰茍去仲孫蔑而止季孫行父吾與子國親於公室親魯甚于晉公室對曰僑如之情子必聞之矣聞其淫慝之情若去蔑與行父是大棄魯國而罪寡君也若猶不棄而惠徼周公之福使寡君得事晉君則夫二人者魯國社稷之臣也若朝亡之魯必夕亡以魯之密邇仇讎仇讎謂齊楚也亡而為讎治之何及言魯屬齊楚則還為晉讎郤犨曰吾為子請邑對曰嬰齊魯之常隸也隸賤官敢介大國以求厚焉介由也承寡君之命以請承奉也若得所請吾子之賜多矣又何求范文子謂欒武子曰季孫於魯相二君矣二君宣成妾不衣帛馬不食粟可不謂忠乎信讒慝而棄忠良若諸侯何子叔嬰齊奉君命無私不受郤犨請邑謀國家不二謂四日不食以堅事晉圖其身不忘其君辭邑不食皆先君而後身若虚其請是棄善人也子其圖之乃許魯平赦季孫韓厥晉大夫韓獻子也魯成公十七年晉厲公旣殺三郤欒武子中行獻子圍公於匠麗氏乃召獻子獻子辭曰殺君以求威非吾所能為也威行為不仁事廢為不智享一利亦得一惡非所務也昔者吾畜於趙氏孟姬之讒吾能違兵古人有言曰殺老牛莫之敢尸而况君乎二三子不能事君安用厥也中行偃欲伐之欒書曰不可其身果而辭順順無不行果無不徹犯順不祥伐果不克乃止子駟鄭大夫也魯襄公二年鄭成公疾子駟請息肩於晉欲避楚役以負擔喻公曰楚君以鄭故親集矢於目謂鄢陵之戰晉人射楚王中目非異人任寡人也言楚子任此患不為他人盖在己若背之是棄力與言其誰暱我言盟誓之言也免寡人惟二三子秋七月庚辰鄭伯㫻卒於是子罕當國攝國事子駟為政為政卿子國為司馬晉師侵鄭晉伐䘮非禮也諸大夫欲從晉子駟曰官命未改成公未葬嗣君未免䘮故言未改不欲違先君意公子貞字子􅌩楚令尹也魯襄公十四年子􅌩還自伐吳卒将死遺言謂子庚必城郢楚都郢未有城郭公子爕公子儀因築城為亂事未得訖子囊欲訖而未暇故遺言見意君子謂子囊忠君薨不忘增其名謂謚君為共将死不忘衛社稷可不謂忠乎一云荆人與吳人将戰荆師寡吳師衆荆将軍子囊曰我與吳人戰必敗若敗王師辱王名虧壤土忠臣不忍為也不復于王而遁至于郊使人復於王曰臣請死王曰将軍之遁也以其為利今誠利将軍何死子囊曰遁者無罪則後世之為主将者皆依不利之名而赦臣遁若是則荆國終為天下笑遂伏劍而死王曰請成将軍義乃為之桐棺三寸加斧鑕其上可賈獲陳大夫魯襄公二十五年鄭伐陳陳侯扶其太子偃師奔墓遇賈獲載其母妻下之而授公車公曰舍而母辭曰不祥雖急猶不欲男女無别與其妻扶其母以奔墓亦免祝佗父齊大夫魯襄公二十五年五月崔杼弑荘公佗父祭於髙唐髙唐有齊别廟至復命不脱弁而死於崔氏爵弁祭服申蒯齊侍漁者侍漁監取魚之官崔杼之亂蒯退謂其宰曰爾以孥免孥宰之妻子我将死其宰曰免是反子之義也反死君之義與之偕死一曰申蒯漁於海将入死之其御止之曰君無道聞於天下不可死也申蒯曰安得食亂君之祿而死治君之事乎及門門者止之申蒯曰汝疑我乎吾與汝臂乃斷左臂以與門者以示崔杼崔杼陳八列令其入申蒯拔劍呼天鬬殺七列未及崔子二列而死之陳不占齊人也崔氏之亂不占聞君之難将赴之比去飡則失匕上車失式御者曰怯如是去之益乎不占曰死君之義公也無勇私也不以私害公遂往聞戰鬬之聲恐駭而死人曰不占可謂仁者之勇矣申鮮虞齊荘公近臣也崔氏之亂鮮虞奔魯僕賃于野以䘮荘公袁克陳侯嬖人之貴者魯昭公八年四月陳侯溺卒九月楚公子棄疾帥師奉孫吳圍陳孫吳悼太子偃師之子惠公也十一月壬午滅陳壬午十月十八日言十一月誤也克殺馬毁玉以葬欲以非禮厚葬哀公楚人将殺之請寘之寘馬玉旣又請私私盡君臣恩私於幄加絰於顙而逃幄帳也逃不欲為楚臣也夙沙釐鼓子之臣也魯昭公十五年晉中行伯旣克鼓以鼓子宛支來令鼓人各復其所非寮勿從夙沙釐以其孥行軍吏執之辭曰我君是事非事土也名曰君臣豈曰土臣今君實遷臣何頼於鼓穆子召之曰鼓有君矣爾正事君吾定而爵祿對曰臣委質于翟之鼓未委質于晉之鼓也臣聞之委質為臣無有貳心委質而策死古之法也君有烈名臣無畔質敢即私利以煩司寇而亂舊法其若不虞何穆子歎而謂其左右曰吾何徳之務而有是臣也乃使行旣獻言於頃公與鼔子田于河陰使夙沙釐相之申亥楚芊尹無宇之子也魯昭公十三年楚靈王聞羣公子之死也㳂夏将欲入鄢夏漢别名順流為㳂順漢水南至鄢申亥曰吾父再奸王命謂斷王旌執人于章華宫王弗誅惠孰大焉君不可忍惠不可棄吾其從王乃求王遇諸棘闈以歸棘里名闈門也厨人濮宋人也魯昭公二十一年宋華氏之亂華登以吳師救華氏齊烏枝鳴戍宋華登敗宋師宋公欲出出奔厨人濮曰吾小人可藉死可借使死難而不能送亡君請待之請君待復戰决勝負乃狥曰揚徽者公徒也徽識也衆從之公自陽門見之見國人皆揚徽雎陽正東門名陽門下而廵之曰國亡君死二三子之耻也豈専孤之罪也厨人濮以裳裹首而荷以走曰得華登矣遂敗華氏於新里新里華氏所取邑諸梁楚葉公也楚令尹子西将召白公葉公止之不從及白公之亂子西子期死葉公聞之曰吾怨其棄吾言而徳其治楚國之能平均以復先王之業者夫子也以小怨棄大徳吾不義也将入殺之帥方城之外以入殺白公而定王室葬二子之族王孫由于楚大夫魯定公四年吳伐楚入郢楚昭王濟江入于夢中入于雲夢澤中所謂江南之夢王寢盜攻之以戈撃王由于以背受之中肩王奔鄖由于徐蘇而從以背受戈故當時悶絶子西楚令尹也吳伐楚楚昭王奔隨王之在隨也子西為王車服以保路國于脾洩脾洩楚邑也失王則恐國人潰散故僞為王車服立國脾洩以保安道路之人聞王所在而後從王王使由于城麋於麋築城復命子西問髙厚焉弗知子西曰不能如辭言自知不能當辭勿行城不知髙厚小大何知對曰固辭不能子使余也人各有能有不能王遇盜于雲中余受其戈其所猶在袒而示之背曰此余所能也脾洩之事余亦弗能也鄖公辛楚鬬辛也吳伐楚楚敗鄖公辛之弟懷将弑昭王曰平王殺吾父吾殺其子不亦可乎辛蔓成然之子也昭公十四年楚平王殺成然辛曰君討臣誰敢讎之君命天也若死天命将誰讎詩曰柔亦不茹剛亦不吐不侮矜寡不畏彊禦惟仁者能之言不辟强陵弱違强陵弱非勇也乗人之約非仁也滅宗廢祀非孝也弑君罪應滅宗動無令名非知也必犯是余将殺女鬬辛與其弟巢以王奔隨子期楚昭王兄公子結也昭王奔隨吳人從之謂隨人曰周之子孫在漢川者楚實盡之天誘其𠂻致罰於楚而君又竄之竄匿也周室何罪君若顧報周室施及寡人以奨天𠂻奨成也君之惠也漢陽之田君實有之楚子在公宫之北隨公宫也吳人在其南子期似王逃王而已為王曰以我與之王必免隨人卜與之不吉乃辭吳曰以隨之僻小而宻邇於楚楚實存之世有盟誓至於今未改若難而棄之何以事君執事之患不惟一人一人楚王也若鳩楚竟敢不聽命吳人乃退鳩安集也申包胥楚人也吳敗楚兵于栢舉遂入郢昭王出亡在隨申包胥不受命而赴于秦乞師曰吳為無道行封豕長蛇以蠶食天下從上國始於楚寡君失社稷越在草莽使下臣告急曰吳夷狄之求無饜滅楚則西與君接竟若鄰于君君疆場之患也逮吳之未定君其圖之若得君之靈存撫楚國世以事君秦伯使辭焉曰寡人聞命矣子其就舘将圖而告子對曰寡君越在草茅未獲所休下臣何敢即安依於庭牆立哭日夜不絶聲水漿不入口七日七夜秦哀公為賦無衣之詩兵出包胥九頓首而坐秦哀公曰楚有臣若此而亡吾無臣若此吾亡無日矣於是乃出師救楚申包胥以秦師至楚秦大夫子蒲子虎率車五百乗子蒲曰吾未知吳道使楚人先與吳人戰而㑹之大敗吳師吳師旣退昭王復國而賞始於包胥包胥曰輔君安國非為身也救急除害非為名也功成而受賞是賣勇也君旣定矣又何求焉遂逃賞終身不見棼冐勃蘇楚人也吳入郢棼冐勃蘇羸糧潜行十日而薄秦朝鶴立不轉晝吟宵泣七日不得告水漿不入於口秦王聞而走之冠劍不相及左奉其首右濡其口於是秦救楚退吳師復楚茅夷鴻邾大夫也季康子伐邾以邾子益來獻於亳社邾夷鴻以束帛乗韋自請救於吳無君命故言自也曰魯弱晉而遠吳慿恃其衆慿依也而背君之盟辟君之執事辟陋也以陵我小國邾非敢自愛也懼君威之不立小國之憂也若夏盟於鄫衍鄫衍即鄫也秋而背之成求其不違言魯成其所求無違逆也四方諸侯其何以事君且魯賦八百乗君之貳也貳敵也魯以八百乗之賦貢于吳言其國大也邾賦六百乗君之私也為私屬以私奉貳惟君圖之吳子從之明年吳伐魯子閭楚公子也魯哀公六年七月楚子在城父将救陳卜戰不吉卜退不吉王曰然則死也再敗楚師不如死前已敗于栢舉今若退還亦是敗棄盟逃讎亦不如死死一也其死讎乎命公子申為王不可則命公子結亦不可則命公子啟申子西結子期啟子閭皆昭王之兄五辭而後許将戰王有疾庚寅昭王攻大㝠卒於城父大㝠陳地吳師所在子閭退曰君王舍其子而讓羣臣敢忘君乎從君之命順也從命許立立君之子亦順也二順不可失也與子西子期謀潜師閉塗逆越女之子章立之而後還潜師宻發也閉塗不通外使也越女昭王妾章惠王也公山不狃魯人奔吳魯哀公八年吳為邾故将伐魯問於叔孫輒問可伐否輒亦故魯人叔孫輒對曰魯有名而無情有大國之名無情實伐之必得志焉退而告公山不狃公山不狃曰非禮也君子違不適讎國違奔亡也未臣而有伐之奔命焉死之可也未臣所適之國若有伐本國者則可還奔命死其難所託也則隠曽所因託則為之隐惡且夫人之行也不以所惡廢鄉不以其私怨惡廢棄其鄉黨之好今子以小惡而欲覆宗國不亦難乎輒公族故謂之宗國若使子率子必辭王将使我子張病之子張輒也王問於子洩子洩不狃對曰魯雖無與立緩時若無能自立必有與斃急則人人知懼皆将同死戰諸侯将救之未可以得志焉晉與齊楚輔之是四讎也與魯而四夫魯齊晉之唇唇亡齒寒君所知也不救何為三月吳伐我子洩率故道險從武城故由險道欲使魯成備孔子魯人也哀公十四年齊陳成子弑簡公孔子沐浴而朝告於哀公曰陳常弑其君請討之将告君故先齊齊必沐浴公曰告夫三子謂三卿孔子曰以吾從大夫之後不敢不告也君曰告夫三子者我禮當告君不當告三子君使我在故復往告之三子告不可孔子曰以吾從大夫之後不敢不告也孔子由君命之三子告不可故復以此辭語之而止仲由字子路卞人也哀公十五年齊陳瓘如楚瓘陳恒之兄子玉也過衛仲由見之曰天或者以陳氏為斧斤旣斵䘮公室而他人有之不可知也其使終饗之亦不可知也饗受也若善魯以待時不亦可乎何必惡焉仲由事孔子故為魯言子玉曰然吾受命矣子使告吾弟弟成子也冬及齊平子服景伯如齊子贛為介見公孫成公孫成成宰公孫宿也曰人皆臣人而有背人之心况齊人雖為子役其有不貳乎言子叛魯齊人亦将叛子也子周公之孫也多饗大利猶思不義利不可得而䘮宗國将焉用之䘮宗國謂以邑入齊使魯有危亡之禍也成子曰善哉吾不蚤聞命傳言仲尼之徒皆忠于魯國慶忌吴公子也魯哀公二十年慶忌驟諫吴子曰不改必亡弗聽吴子弗聽出居于艾艾吴邑豫章有艾縣遂適楚聞越將伐吴冬請歸平越遂歸欲除不忠者以説于越吴人殺之城北餘子由基者魯人也佛肸以中牟縣叛設禄邑炊鼎曰與我者受邑不與我者烹中牟之士皆與之由基獨後至袪衣將入鼎曰由基之義軒冕在前非義不乗斧鉞於後義死不避遂袪衣將入鼎佛肸止之趙簡子屠中牟得而取之論有功者用由基為始基曰吾聞亷士不恥人如此受中牟之功則中牟之士終身慙矣遂襁負其母南徙於楚楚王髙其義待以司馬申鳴者楚士也治園以養其母孝聞於楚國王欲授之相申鳴辭不受其父曰王欲相汝汝何不受乎申鳴對曰捨父之孝子而為王之忠臣何也其父曰使其祿於國立義於庭汝樂吾無憂矣吾欲汝之相也申鳴曰諾遂入朝楚王因授之相居三年白公為亂殺司馬子期申鳴将往死之父止之曰棄父而死其可乎申鳴曰聞夫士者身歸於君而祿歸於親今去父事君得無死於難乎遂辭而往因以兵圍之白公謂石乞曰申鳴者天下之孝子者也子往劫其父以兵申鳴聞之必來與之語白公曰善則往取其父持之以兵告申鳴曰子與吾吾與子分楚國子不與吾子父則死矣申鳴流涕而應之曰始吾父之孝子也今吾君之忠臣也吾聞之也食其食者死其事受其祿者畢其能今吾已不得為孝子矣乃君之忠臣也吾何得以全身援桴皷之遂殺白公其父亦死王賞之百斤金申鳴曰食君之食避君之難非忠臣也定君之國殺臣之父非孝也名不可兩立行不可兩全也如是而生何面目立於天下遂自殺荘善楚人也惠王有白公之難荘善辭其母将往死之其母曰棄其親而死其君可謂義乎荘善曰吾聞事君者内其祿而外其身今所謂養母者君之祿也身安得無死乎遂辭而行比至公門三廢車中其僕曰子懼矣曰懼曰旣懼何不返荘善曰懼者吾私也死義吾公也吾聞君子不以私害公及公門刎頸而死君子曰好義乎哉屈盧楚人也楚白公勝将殺惠王王出亡令尹司馬皆死復拔劍而屬之于屈盧曰子與我将舍子不與我将殺子屈盧曰詩有之曰莫莫葛虆延於條枚愷悌君子求福不回今子殺子叔父而求福於盧也可乎且吾聞之知命之士見利不動臨難則死是謂人臣之禮故上知天命下知臣道其有可劫乎子胡不推之白公勝乃入其劍焉石他人齊人也陳恒弑簡公而盟者皆完其家不盟即殺之石他人曰昔之事其君者皆得其君而事之今謂他人曰舍而君而事我他人不能雖然不盟則殺父母也從而盟是無君臣之禮也生於亂世不得正行劫於暴上不得道義故雖盟必以父母之死不如退而自殺以禮其君乃自殺子淵捷齊人也陳恒弑君使勇士六人劫之子淵捷曰子之欲與我以我為知乎臣弑君非知也以我為仁乎見利而倍君非仁也以我為勇乎劫我以兵懼而與子非勇也使吾無此三者與何補於子若有此三者終不從子矣乃舍之孔伋字子思孔子孫也居於衛衛有齊寇或曰寇至盍去諸子思曰如伋去君誰與守王孫賈年十五事齊閔王王出走失王之處王孫賈乃入市中曰淖齒亂齊國殺閔王欲與我誅者袒右市人從者四百人與之誅淖齒刺而殺之王蠋齊畫邑人齊西南近邑畫音獲燕之初入齊聞蠋賢令軍中曰環畫邑三十里無入以王蠋之故已而使人謂蠋曰齊人多髙子之義吾以子為将封子萬家蠋固謝燕人曰子不聽吾引三軍而屠畫邑王蠋曰忠臣不事二君烈女不更二夫齊王不聽吾諫故退而耕於野國旣破亡吾不能存今又劫之以兵為君将是助桀為暴也與其生而無義固不如烹遂經其頸于樹枝自奮絶脰而死齊亡大夫聞之曰王蠋布衣義不北面於燕况在位之食祿者乎乃相聚如莒求諸子立為哀王縮髙秦安陵人其子為管守魏攻管不下信陵君使人謂安陵君曰其遣縮髙吾将仕之以五大夫使為持節尉安陵君曰安陵小國也不能必使其民使者自往請使使道使者至謂縮髙曰将使髙為将縮髙曰君之幸髙也将使髙攻管也夫以父攻子宗人大笑也見臣而下是倍主也父教子倍亦非君之所喜也敢再拜辭使者以報信陵君信陵君大怒遣大使之安陵曰安陵之地亦猶魏也今吾攻管而不下則秦兵及我社稷必危矣願君之生束縮髙而致之若君弗致也無忌将發十萬之師以造安陵之城安陵君曰吾先君成侯受詔襄王以守此地手受太府之憲憲之上篇曰子殺父臣弑君有恒不赦國雖大赦降城亡子不得與焉縮髙辭大位以全父子之義而君曰必生致之是使我負襄王詔而廢太府之憲也雖死終不敢行縮髙聞之曰信陵君為人悍而自用此辭反必為國禍吾已全己之為人臣之義矣豈可使吾君有魏患也乃之使者之舍刎頸而死信陵君聞縮髙死素服辟舍使使者謝安陵君曰無忌小人也困於思慮失言於君敢再拜釋罪樂毅為燕将去燕之趙趙王欲圖燕毅泣曰臣事昭王猶事大王若獲戾在於他國終身不敢謀趙之徒隸况燕昭王後嗣乎李同趙邯郸傳舍吏子也秦圍邯郸急且降平原君甚患之同説平原君曰君不憂趙亡耶平原君曰趙亡則朕為虜何為不憂乎同曰邯郸之民炊骨易子而食可謂急矣而君之後宫以百數婢妾被綺縠餘梁肉而民褐衣不完糟糠不厭民困兵盡或剡木為矛矢而君噐物鐘磬自若使秦破趙君安得有此使趙得全君何患無有今君誠能令夫人以下編於士卒之間分功而作家之所有盡散以饗士方其危苦之時易徳耳於是平原君遂從之得敢死士三千人李同遂與三千人赴秦軍秦軍為之却三十里亦㑹楚魏救至秦兵遂罷邯鄲復存李同戰死封其父為李侯申公子培荆大夫也荆荘哀王獵於雲夢荆荘哀王考烈王之子在春秋後雲夢楚澤也今在南郡華容縣射隨兕中之申公子培劫王而奪之隨兕惡獸申公子培申邑宰也楚僣稱王邑宰稱公也殺隨兕者凶故劫奪王受殃也王曰何其暴而不敬也命吏誅之下陵其上謂之暴誅之誅子培也左右大夫進諫曰子培賢者也又為王百倍之臣此必有故願王察之也子培之賢百倍于人必有所為也故願王察之不出三月子培疾而死為代王殺隨兕故死也荆與晉師戰于兩裳大勝晉兩裳地名也荆克晉負故曰大勝歸而賞有功者申公培之弟請賞于吏曰人之有功也於軍旅臣之兄有功也於車下于王車下奪王隨兕所以代王死臣之兄是有功也王曰何謂也對曰臣之兄犯暴不敬之名觸死亡之罪於王之側其愚心将以忠於君王之身而持千歲之夀忠猶愛也持猶得也忠愛君王犯奪隨兕是代君受死亡之疾使君王得千歲之夀也臣之兄嘗讀古記曰殺隨兕者不出三月古記古書也三月必死故曰不出也是以臣之兄驚懼而争之驚懼王夀之不長故與王争隨兕而奪王也故伏其罪而死罪殃也王令人發平府而視之於古記果有乃厚賞之平府府名也賞之賞子培之地黄歇楚人事頃襄王頃襄王使歇與太子完入質於秦秦留之數年楚頃襄王病太子不得歸而楚太子與秦相應侯善於是黄歇乃説應侯曰相國誠善楚太子乎應侯曰然歇曰今楚王恐不起疾秦不如歸其太子太子得立其事秦必重而徳相國無窮是親與國而得儲萬乗也若不歸則咸陽一布衣耳楚更立太子必不事秦夫失與國而絶萬乗之和非計也願相國熟慮之應侯以聞秦王曰令楚太子之傅先往問楚王之疾返而後圖之黄歇為楚太子計曰秦之留太子也欲以求利也今太子立未能有以利秦也歇憂之甚而陽文君子二人在中王若卒大命太子不在陽文君子必立為後太子不得奉宗廟矣不如亡秦與使者俱出臣請止以死當之楚太子因變衣服為楚使者御以出關而黄歇守舍常為謝病度太子已遠秦不能追歇乃言秦昭王曰楚太子已歸出遠矣歇當死願賜死昭王大怒欲聽其自殺也應侯曰歇為人臣出身以狥其主太子立必用歇故不如無罪而歸之以親楚秦因遣黄歇歸歇至楚三月頃襄王卒太子完立是為考烈王册府元龜巻七百三十九
