body:
  text: 冊府元龜卷三百四十四宋王欽若等撰将帥部佐命第五宋朱齡石初為髙祖參軍盧循至石頭齡石領中軍選敢死之士數千人上南岸髙祖遣齡石領鮮卑歩稍過淮擊之齡石率厲将士皆殊死戰殺數百人賊乃退齡石既有武幹又練吏職髙祖甚親委之盧循平以為寧逺将軍寧蠻䕶軍西陽太守晉安帝義熈八年髙祖西伐劉毅齡石從至江陵九年為伐蜀元帥蜀平進號将軍封豐城縣侯十二年北伐為左将軍十四年與桂陽公義真為佛佛所殺朱超石初歸髙祖為徐州主簿累遷中兵叅軍寧朔将軍沛郡太守西伐劉毅髙祖使超石率步騎出江陵未至而毅平及討司馬休之遣冠軍将軍檀道濟及超石歩軍出大薄魯宗之聞超石且至自率軍攻之未戰而江陵平晉安帝義熈十二年北伐超石為前鋒大軍進克蒲坂以超石為河東太守及髙祖自長安來除中書侍郎封興平縣五等侯檀韶字令孫世居京口初辟本州從事西曹主簿輔國司馬髙祖建義韶及弟檀道濟等從平京城行叅髙祖建武將軍事都邑既平為鎮軍將軍加寧逺將軍東海太守進號建武將軍遷龍驤將軍秦郡太守北陳留内史以平桓𤣥功封巴丘縣侯食邑五百户復叅車騎將軍事加龍驤將軍遷騎將中軍諮議叅軍加寧朔將軍從征廣固率向彌胡蕃等五十人攻臨胊城克之及圍廣固慕客超夜燒樓當韶圍分降號横野將軍城陷之日韶率所領先登領北瑯邪太守進號寧朔將軍瑯邪内史從討盧循於左里又有戰功并論廣固功更封宜陽縣侯食邑七百户降先封一等為伯減户之半二百五十户賜次子臻坐六門内乗輿白衣領職晉安帝義熈七年號輔國將軍八年丁母憂起為冠軍將軍明年復為瑯邪内史淮安太守將軍如故鎮姑熟尋進號左将軍領本州大中正十二年遷督江州豫州之西陽新蔡二郡諸軍事江州刺史將軍如故有罪免官髙祖受命以佐命功増八百户并前千五百户檀道濟韶之弟也髙祖創義道濟從入京城叅武帝建置軍事西討平魯山禽桓振累以義勲封吳興縣五等侯盧循寇逆羣盜互起以道濟為揚武將軍天門太守討平之又從劉道規討桓謙荀林等率厲文武身先士卒所向摧破及徐道覆來逼道規親出拒戰道濟戰功居多髙祖北伐道濟為前鋒歩自淮肥所至諸城戍望風降服進尅許昌凡拔城破壘俘四千餘人皆釋而遣之於是夷戎感恱相率歸之者甚衆進據潼關與諸將軍共破姚紹長安既平以為征虜將軍瑯邪内史髙祖受命轉䕶軍領石頭戍聽直入殿尋以佐命功改封永脩縣公向靖字奉仁小字彌河内山陽人名與髙祖同改稱小字世居京口與髙祖少舊從平京城叅建武軍事進平京邑行叅鎮軍事加寧逺將軍京邑雖平而羣冦互起彌與劉蕃孟龍符征破桓歆桓石康石綏於白茅攻夀陽尅之晉安帝義熈三年遷建武將軍秦郡太守北陳留内史戍堂邑以平京城功封山陽縣五等侯從征鮮卑大戰於臨胊累日不決彌與檀韶等分軍自間道攻臨胊城彌擐甲先登即時陷潰斬其牙旗賊遂奔走攻拔廣固彌又先登盧循屯據蔡州以親黨阮賜為豫州刺史攻逼姑熟彌率譙國内史趙恢討之時輔國將軍毛脩之戍姑熟告急續至彌兼行進討破賜収其輜重除中軍諮議叅軍將軍如故盧循退走髙祖南征彌為前鋒於南陵雷池左里三戰並大捷軍還除太尉諮議叅軍下邳太守將軍如故八年轉游擊將軍尋督馬頭淮西諸軍事龍驤將軍鎮蠻䕶軍安豐汝隂二郡太守梁國内史戍夀陽以平廣固盧循功封安南縣男食邑五百户十年遷冠軍將軍髙陽内史臨淮太守領石頭戍事髙祖西征司馬休之以彌為吳興太守將軍如故明年髙祖北伐彌以本號侍從留戍碻磝進屯石門栢谷遷督北青州諸軍事北青州刺史將軍如故髙祖受命以佐命功封曲江縣侯食邑千户劉懐慎始叅髙祖鎮軍将軍事振威將軍彭城内史從征鮮卑每戰必身先士卒及克廣固懐慎率所領先登從髙祖拒盧循於石頭屢戰克捷加輔國將軍晉安帝義熈八年以本號監北徐州諸軍事鎮彭城尋加徐州刺史為政嚴猛境内振肅九年亡命王靈秀為冦討平之十一年進北中郎將以平廣固盧循功封南城縣男食邑五百户十三年髙祖北伐以為中領軍征虜将軍宿衞輦轂坐府内相殺免官宋䑓建召為五兵尚書仍督江北淮南諸軍前将軍南徐州刺史復徴為度支尚書加散騎常侍髙祖遷都夀春留懐慎督北徐兖青淮北諸軍事前軍将軍徐州刺史以亡命入廣陵城降號征虜将軍永初元年以佐命功進爵為侯增邑千户進號平北将軍劉懐肅初為費令聞髙祖起義弃縣來奔京邑平定振武将軍劉道規追桓𤣥以懐肅為司馬𤣥留何澹之郭欽等戍桑落州進擊破之𤣥既死從子振大破義軍於楊林義軍退尋陽懐肅與江夏相張暢之攻澹之於西塞破之偽鎮東将軍馮該戍夏口東岸孟山圖據曽山城桓仙客守月壘皆連壁相望懐肅與道規攻之躬擐甲胄陷二城馮該走石城生擒仙客晉安帝義熈元年正月振敗走道規遣懐肅平石城斬馮該及其子山靖三月振復襲江陵荆州刺史司馬休之出奔懐肅自雲杜馳赴晝夜兼行七日而至振勒兵三萬旗幟蔽野躍馬横矛躬自突陣流矢傷懐肅額衆懼欲奔懐肅瞋目奮戈膽氣益壮於是士卒爭先臨陣斬振首江陵既平休之反鎮執懐肅手曰㣲子之力吾無所歸矣偽輔國将軍符嗣馬孫偽龍驤将軍金符靚樂志等屯結中夏懐肅又討之梟樂志等道規懐肅督江夏九郡權鎮夏口除通直郎仍為将軍淮南歴陽二郡太守二年又領劉毅撫軍司馬軍郡如故以建義功封東興縣侯食邑千户劉粹字道冲粹家在京口少有志幹初為州從事髙祖克京城叅建武軍事從平京邑轉叅鎮軍事尋加建武将軍沛郡太守又領下邳太守復為車騎将軍叅軍從征廣固戰功居多以功封西安縣五等侯軍還轉中軍諮議叅軍盧循逼京邑京口任重太祖時年四歳髙祖使粹奉太祖鎮京城轉遊擊将軍遷建威将軍江夏相衛将軍毅粹族兄也粹盡心髙祖不與毅同髙祖欲謀毅衆並疑粹在夏口髙祖愈信之及大軍至粹竭其誠力事平封灄縣男食邑五百户母憂去職俄而髙祖討司馬休之起粹為寧朔将軍竟陵太守統水軍入河明年進號輔國将軍遷相國左司馬侍中中軍司馬冠軍将軍遷左衛将軍永初元年以佐命功改封建安縣侯食邑千户王鎮惡北海劇人也或薦於髙祖即召之既至與語甚異焉以為青州治中從事行叅中軍太尉軍事署前部賊曹拒盧循於查浦屢戰有功封博陸縣五等子後以討劉毅功封漢夀縣子食邑五百户又討平蠻帥向博柢根除游擊将軍髙祖北伐鎮惡行龍驤将軍領前鋒鎮惡入賊境戰無不捷邵陵許昌望風奔散破虎牢及栢谷塢斬賊帥趙𤣥軍次雒陽偽陳留公姚洸歸順進次澠池遣司馬毛徳祖攻偽𢎞農太守尹雅於蠡城生擒之仍行𢎞農太守方軌徑據潼闗偽大將軍姚紹率大衆拒險深溝髙壘以自固鎮惡懸軍逺入轉輸不克與賊相持乆将士乏食乃親到𢎞農督上民租百姓競送義粟軍食復振紹又病死偽撫軍将軍姚讃代紹守險衆力猶盛髙祖至湖城讃引退大軍次潼關謀進取之計鎮惡率衆水軍自河入渭偽鎮北将軍姚强屯兵涇上鎮惡遣毛徳祖擊破之直至渭橋鎮惡所乗皆蒙衝小艦行船者悉在艦内羌見艦泝渭而進艦外不見有乗行船人北土素無舟楫莫不驚惋咸謂為神鎮惡既至令將士食畢便棄船登岸渭水流急倐忽間諸艦悉逐流去時姚泓屯軍在長安城下猶數萬人鎮惡乃身先士卒衆亦知無復退路莫不騰踊爭先泓衆一時奔潰即陷長安城泓挺身逃走明日率妻子歸降城内夷晉六萬餘户鎮惡宣揚國恩撫慰初附號令嚴肅百姓安堵髙祖将至鎮惡於霸上奉迎髙祖勞之曰成吾霸業者卿也進號征虜将軍趙倫之字幼成髙祖起兵以軍功封閬中縣五等侯累遷雍州刺史髙祖北伐倫之遣順陽太守傅宏之扶風太守沈田子出嶢柳大破姚泓於藍田及髙祖受命以佐命功封霄城縣侯安北將軍鎮襄陽到彦之字道豫彭城武原人髙祖討孫恩以鄉里樂從每有戰功義旗將起彦之家在廣陵臨州武烈王道規尅桓宏彦之時近行聞事捷馳歸而道規已南渡江倉卒晩方獲濟及至京口武帝已向鄴孟㫤居守留之及見髙祖被責不自陳㫤又不為申理故不加官晉安帝義熈元年補鎮軍行叅軍六年盧循逼都彦之與檀道濟掩循輜重與循黨荀林戰敗免官後以軍功封狼山縣子為太尉中兵叅軍驃騎将軍道鄰鎮江陵以彦之為驃騎諮議叅軍尋遷司馬南郡太守又從文帝西鎮徐使持節南蠻校尉高祖受命進爵為侯胡藩豫章人髙祖召為員外散騎侍郎叅軍事從征鮮卑賊屯聚臨胊藩言於髙祖曰賊屯軍城外内守必寡今徃取其城而斬其旗幟此韓信所以克趙也髙祖乃遣檀韶與藩等潜徃既至即克其城賊見城陷一時奔走還保廣固累月未拔之夜佐史並集忽有鳥大如鵝蒼黑色飛入髙祖帳裏衆皆駭愕以為不祥藩起賀曰蒼黑者胡虜之色胡虜歸我大吉之祥也明旦攻城陷之從討盧循於左里頻戰有功封吳江縣五等子除正員郎尋轉寧逺將軍鄱陽太守從伐劉毅毅初當之荆州表求東道還京辭墓去都數十里不過拜闕髙祖出倪塘㑹之藩勸於座殺毅髙祖不從至是謂藩曰吾從倪塘之謀無今舉也又從征司馬休之復為叅軍加建武将軍領遊軍於江津徐達一作走之敗沒髙祖怒甚即日於馬頭岸渡江而江津岸峭壁立數丈休之臨岸置陳無繇可登髙祖呼藩令上藩有疑色髙祖奮怒命左右擒來欲斬之藩不受命顧曰藩寧前死耳以刀頭穿岸劣容脚指於是直上隨之者稍多既得登岸殊死戰之賊不能當引退因而乗之一時奔潰髙祖伐羌假藩寧朔將軍叅太尉軍事統别軍至河東暴風飄輜重艦渡北岸虜牽得此艦取其器物藩氣厲心憤率左右十二人乗小船逕徃河北賊騎五六百見藩來並笑之藩素善射登岸射賊應弦而倒者十許人賊皆奔退悉収所失而反又遣藩及朱超石等破索虜於平城虜騎數重藩及超石所領皆割配新軍不盈五千率厲力戰大破之又與超石等擊姚業於蒲坂超石失利退還藩収超石所捨資實徐行而反業不敢追髙祖還彭城叅相國軍事時盧循餘黨與蘇淫等大相聚結以為始興相論平司馬休之及廣固功封陽山縣男食邑五百户虞丘進東海郯人晉安帝隆安中從髙祖征孫恩頻戰有功元興元年從髙祖東征臨海於石步固與盧循相守二十餘日二年又從髙祖至東陽破徐道覆其年又至臨松穴破賊追至永嘉千江又至安固累戰皆有功三年從平京城定京邑除燕國内史義熈二年除龍驤将軍封龍川縣五等侯從髙祖伐廣固於臨胊破賊盧循逼京邑孟㫤諸葛長民等建議奉天子過江進廷議不可面折㫤等髙祖甚嘉之獻計伐樹樹柵石頭除鄱陽太守將軍如故統馬步十八隊於東道出鄱陽至五畝橋循遣將莫糾為上饒令千餘人守故城進攻破之循又遣童敏之為鄱陽太守據郡進從餘千歩道趣鄱陽敏之退走追破之斬首數百復隨劉藩至始興討斬徐道覆八年除寧蠻䕶軍尋陽太守十年從征劉毅事平補太尉行叅軍尋加振威将軍九年以前後功封望蔡縣男食邑五百户加龍驤將軍討司馬休之又有戰功軍還除輔國將軍山陽太守宋䑓令書除秦郡太守督陳留郡事將軍如故元熈二年宋王令書以為髙祖第四子義康右將軍司馬孟懐玉世居京口髙祖東伐孫恩以懐玉為建武司馬豫義旗從平京城進定京邑以功封鄱陽縣侯食邑千户髙祖鎮京口以懐玉為鎮軍叅軍下邳太守晉安帝義熈三年出為寕朔將軍西陽太守新蔡内史除中書侍郎轉輔國將軍領丹陽府兵戌石頭盧循逼京邑懐玉於石頭岸連戰有功為中軍諮議參軍賊帥徐道覆屢欲以精銳登岸畏懐玉不敢上及循南走懐玉與衆軍追躡直至嶺表徐道覆屯結始興懐玉攻圍之身當矢石旬月乃陷仍南追循循平又封陽豐縣男食邑二百五十户復為太尉諮議叅軍征虜将軍劉鍾彭城人晉安帝隆安中髙祖伐孫恩鍾願從每戰有功自義旗将建板為郡主簿從入京城将向京邑髙祖命曰預是彭沛鄉人赴義者並可依劉主簿於是立為義隊常在左右連戰皆捷明日桓謙屯于東陵卞範之屯覆舟山髙祖疑賊有伏兵顧視左右正見鍾謂之曰此山下當有伏兵卿可率部下稍徃撲之鍾應聲馳進果有伏兵數百一時奔走桓𤣥西奔其夕髙祖止桓謙故營遣鍾宿據東府轉鎮軍參軍督䕶桓歆冦歴陽遣鍾助豫州刺史魏詠之討之歆即奔迸除南齊國内史封安丘縣五等侯從征廣固除振武将軍廣川太守盧循逼京邑鍾率麾下距柵身被重瘡賊不得入循南走鍾與輔國将軍王仲徳追之循先留别帥范崇民以精兵髙艦據南陵夾屯兩岸鍾自行覘賊天霧賊鉤得其舸鍾因率左右攻艦户賊遽閉户拒之鍾乃徐還與仲徳攻崇民崇民敗走鍾追討百里燒其船乗又隨劉藩追徐道覆於始興斬之補太尉行叅軍寧朔将軍髙祖討劉毅鍾率軍繼王鎮惡江陵平定與朱齡石伐蜀平之以廣固功封永新縣男恭帝元熈元年終右衛将軍禇叔度為髙祖諮議叅軍署中兵加建威将軍從伐鮮卑盡其誠力盧循攻查浦叔度力戰有功循南走髙祖板行廣州刺史領平越中郎将孫處字季髙㑹稽永興人少任氣髙祖東征孫恩季髙隨髙祖平定京邑以為振武将軍封新夷縣五等侯廣固之役先登有功傅宏之字仲度髙祖義旗建輔國将軍劉道規以為叅軍寧逺將軍魏興太守盧循作亂桓石綏自上雒甲口自號荆州刺史徴陽令王天恩自號梁州刺史襲據西城時宏之父韶為梁州遣宏之討石綏等並斬之除太尉行叅軍從征司馬休之署後部賊曹仍為建威將軍順陽太守髙祖北伐宏之與扶風太守沈田子等七軍自武關入偽上雒太守脫身奔走進據藍田招懐戎晉晉人龎斌之戴養胡人康横等各率部落歸化為桂陽王義真雍州治中從事西戎司馬寧朔將軍與義真同沒佛佛齊薛淵汾隂人從父安都為宋徐州刺史以彭城降魏親族皆入北太祖鎮淮隂淵遁來南委身自結果幹有氣力太祖使領部曲備衛帳内從征伐宋後廢帝元徽末以勲官至輔國将軍右軍将軍驍騎将軍軍主封竟陵侯沈攸之難太祖入朝堂豫章王嶷代守東府使淵領軍屯司徒左府分備京邑袁粲據石頭豫章王嶷夜登西門遥呼淵驚起率軍赴難先至石頭焚門攻戰事平明旦衆軍還集杜姥宅街路皆滿宫門不開太祖登南掖門樓處分衆軍各還本頓至食後城門開淵方得入見太祖且喜且泣太祖即位増邑為二千五百户除淮陵太守加寧朔将軍陳顯達仕宋為羽林監濮陽太守𨽻太祖討桂陽王休範舉兵至新亭壘宋劉勔大衍敗賊進杜姥宅及休範死太祖欲還衛宫城或諫太祖曰桂陽雖死賊黨猶熾人情難固不可輕動太祖乃止遣顯達率司空參軍髙敬祖自查浦渡淮緣石頭北道入承明門屯東堂宫中恐動得顯達至乃稍定齊䑓建為散騎常侍左衛將軍領衛尉太祖即位遷中䕶軍増邑千六百户轉䕶軍将軍戴僧静少為太祖撫畜常在左右魏軍圍角城遣僧静戰盪數捷補帳内軍主隨還京師勲階至積射将軍羽林監沈攸之事太祖入朝堂僧静為軍主後袁粲據石頭太祖遣僧静将腹心先至石頭時蘇烈據倉城僧静将書與烈夜縋入城粲登城西南門列燭火乃分䑓軍至射之火乃滅廻登東門其黨輔軍将軍孫曇瓘驍勇善戰每盪一合輙大殺傷官軍死者百餘人軍主王天生殊死拒戰故得相持自亥至丑有流星赤色炤地墜城中僧静率力攻倉門身先士卒率衆潰僧静殺粲於是外軍燒門入僧静以功除前軍將軍寧朔将軍宋順帝昇明二年除游擊将軍攸之平論封諸将以僧静為建昌縣侯邑千戸太祖即位增邑千二百户除南濟隂太守荀伯玉初為太祖冠軍刑獄參軍太祖為明帝所疑及徴為黄門郎深懐憂伯玉勸太祖遣數十騎入魏界安置摽榜於是魏游騎數百履行界上太祖以聞猶懼不得留令玉卜伯玉斷卦不成行而宋明帝詔果復太祖本任繇是親侍後為太祖驃騎中兵參濟陽太守霸業既建伯玉忠勤盡心常衛左右加前軍将軍隨太祖太尉府轉中兵将軍太守如故建元元年封南豐縣子四百户轉輔國将軍武陵王征虜司馬曹虎字士威宋明帝時太祖為領軍補防殿隊主直西齋蒼梧廢明日虎欲出外避難遇太祖在東華中門問虎何之虎因曰故欲仰見明公耳仍留直衛太祖鎮東府以虎與戴僧静各領日直三百人累至屯騎校尉帶南城令豫平石頭封羅江縣男除前軍将軍太祖受禪增邑為四百户直閣將軍領細仗主尋除寧朔将軍東莞太守尹略淮南人少伏事太祖晚習騎射以便捷見使為将宋順帝昇明中為虎賁中郎将越騎校尉建元初封平固男三百户桓康北蘭陵承人也勇果驍悍宋孝武大明中隨太祖為軍容從世祖在贑縣後為世祖冠軍府參軍除殿中将軍武騎常侍出補襄賁令桂陽事起康棄縣還都就太祖㑹事已平除員外郎宋元徽五年七月六日夜少帝㣲行至領軍府帝左右人曰一府皆眠何不縁墻入帝曰我今夕欲一處作適待明日夜康與太祖所養健兒盧荒向黒於門間聽得其語明旦王敬則將帝首至扣府門康謂是變與荒黒抜白刄欲出仍隨入宫太祖鎮東府除康武陵王中兵寧朔将軍帶蘭陵太守常衛左右建元元年封吳平縣伯五百户轉輔國将軍左軍将軍游擊将軍太守如故周山圖為宋左中郎将時武陵王贊為郢州太守令山圖領兵衛送世祖與晉熙王燮自郢下以山圖為後防沈攸之事起世祖為西討都督啟山圖為軍副世祖留據湓城衆議以湓城城小難固不如還都山圖曰今據中流為四方勢援大衆致力川岳可為城隍小事不足難也世祖使城局參軍劉皆陳淵委山圖以處分事山圖斷取行旅船板以造樓櫓立水柵旬日皆辦世祖甚嘉之授前軍将軍加寧朔将軍進號輔國将軍攸之攻郢城世祖令山圖量其勢山圖曰攸之見與鄰鄉承同征伐悉其為人性度險刻無以結國士心如頓兵堅城之下適所以為離散之漸耳攸之既敗平西将軍黄回乗輕舸從白服萬餘人在軍前下流緣叫湓城中恐須臾知是回凱歸乃安世祖謂山圖曰周公前言可謂明於見事矣還都太祖遣山圖領部曲鎮郢城鎮戍諸軍悉受節度遷游擊将軍輔國将軍如故建元元年封晉興縣男邑三百户梁沈約髙祖在西邸與約有舊建康城平引為驃騎司馬征虜将軍時髙祖王業既就天人允屬約嘗扣其端髙祖黙而不應佗日又進曰今與古異不可以淳風期萬物士大夫攀龍附鳯者皆望有尺寸之功以保其福厥今童兒牧豎悉知齊祚已終莫不云明公其人也天文人事表革運之徴永元以來尤為彰著䜟云行中水作天子此又歴然在記天心不可違人情不可失茍是歴數所至雖欲謙光亦不可得已髙祖曰吾方思之對曰初起兵樊沔此時應思今王業已就何所復思昔武王伐紂始入民便曰吾君武王不違民意亦無所思公自至京邑已移氣序比於周武遲速不同若不早定大業稽天人之望脱有一人立異便損威徳且人非金石時事難保豈可以建安之封遺之子孫若天子還都公卿在位則君臣分定無復異圖君明於上臣忠於下豈復有人方更同公作賊髙祖然之約出髙祖召范雲告之雲對畧同約㫖髙祖曰智者乃爾暗同卿明早将休文更來雲出語約約曰卿必待我雲諾許而約先期入髙祖令草其事約乃出懐中詔書并諸選置髙祖初無所改俄而雲自外來至殿門不得入徘徊夀光閣外但云咄咄約出雲問曰何以見處約舉手向左雲笑曰不乖所望有頃髙祖召范雲謂曰生平與沈休文羣居不覺有異人處今日才智縱横可為明識雲曰公今知約不異約今知公髙祖曰我起兵於今三年矣功臣諸将實有其勞然成帝業者乃卿二人也王茂為雍州長史髙祖以王佐許之事無大小皆詢焉人或譛茂帝弗之信譛者驟言之遣視其甲矟則蟲網焉乃誅言者或云茂與帝不睦帝諸腹心並勸除之而茂少有驍名帝乂惜其用曰将舉大事便害健將此非上䇿乃令腹心鄭紹叔徃候之遇其臥因問疾茂曰我疾可耳紹叔曰都下殺害日甚使君家門塗炭今欲起義長史那猶臥茂因擲枕起即袴褶隨紹叔入見帝大喜下牀迎因結兄弟被推赤心遂得盡力發雍部遣茂為前驅郢魯既平從帝東下為軍鋒師次秣陵東昏遣大将王珍國盛兵朱雀門衆號二十萬及戰帝軍引却茂下馬單刀直前外甥韋欣慶勇力絶人執鐵纒矟翼茂而進故大破之茂勳第一欣慶力也建康城平以茂為護軍将軍遷侍中領軍将軍張恵紹字徳繼少有武幹初仕齊為竟陵横桑戍主母喪歸鄉里聞髙祖起兵乃自歸累有戰功髙祖踐祚封石陽縣侯位驍騎將軍直閣左細伏主時東昏餘黨數百人竊入南北掖門夜燒神獸門害衛尉張宏䇿恵紹馳率所領赴戰賊乃敗走遷太子右衛率曹景宗字子震新野人髙祖為雍州刺史表為冠軍将軍竟陵太守及義師起髙祖至景陵以景宗與冠軍将軍王茂濟江圍郢城自二月至於七月城乃降復帥衆前驅至南州領馬歩軍取建康道至江寧東昏将李居士以重兵屯新亭是日選精騎一千至江寧行頓景宗始至安營未立且師行日乆器甲穿弊居士望而輕之因皷噪前薄景宗景宗被甲馳戰短兵裁接居士棄甲奔走景宗皆獲之因皷而前徑至皁莢橋築壘景宗又與王茂吕僧珍犄角破王珍國於大航茂衝其中堅應時而陷復與衆軍長圍六門城平拜散騎常侍右衛将軍封湘西縣侯食邑一千六百户吕僧珍字元瑜髙祖臨雍州為中兵參軍委以心膂僧珍隂養死士歸之者甚衆髙祖頗招武猛士庶響從㑹者萬餘人因命按行城西空地将起數千間屋以為止舍多伐材竹沈於檀溪積茅盖若山阜皆未之用僧珍獨悟其㫖亦私具櫓數百張義兵起髙祖夜召僧珍及張宏䇿定議明旦乃㑹衆發兵悉取檀溪材竹装為艛艦葺之以茅並立辦衆軍将發諸将果爭櫓僧珍乃出先所具每船付二張爭者乃息及建康城平髙祖命僧珍率所領先入清宫與張宏䇿封簡府庫即日以本官帶南彭城太守遷給事黄門侍郎領武賁中郎将髙祖受禪以為冠軍将軍前軍司馬封平固縣侯邑一千二百户夏侯詳譙郡譙人也在齊為司州刺史辭不之職髙祖義兵起詳與蕭穎胄同創大舉西䑓建以詳為中領軍加散騎常侍南郡太守凡軍國大事穎胄多決於詳及髙祖圍郢城下穎胄遣衛尉席闡文如髙祖軍詳獻議曰窮壁易守攻取勢難頓甲堅城兵家所忌誠宜大𢎞經畧詢納羣言軍主以下至於鄙夫皆令獻其所見盡其所懐擇善而從選能而用不以人廢言不以多問寡又須量我衆力度賊樵糧窺彼人情權其形勢若使賊人衆而食少故宜計日而守之食多而力衆故宜悉衆而攻之若使糧力俱足非攻守所屈便宜散金寳縱反間使彼智者不用愚者懐猜此魏武之所以定大業也若三事未可宜思變通觀於人情計我糧榖若徳之所感萬里同符仁之所懐逺邇歸義金帛素積糧道又充乃可以列圍寛守引以嵗月此王翦之所以尅楚也若圍之不卒降攻之未可下間道不能行金粟無人積天下非一家人情難可豫此則宜更思變計矣變計之道實資英斷謀之所深要難以紙宣輙布言於席衛尉特願垂採髙祖嘉納焉天監元年徴為侍中車騎将軍論功封寧都縣侯邑二千户鄭紹叔字仲明榮陽人髙祖臨司州命為中兵叅軍領長流因是厚自結附髙祖舉義兵以為驍騎将軍侍從東下江州留紹叔監州事督江湘二州糧運無闕乏天監初入為衛尉卿封營道縣侯邑千户加冠軍将軍以營道縣户彫弊改封東興縣侯邑如故紹叔自髙祖臨司州為中兵㕘軍領長流因是厚自結附髙祖罷州還京師謝遣賔客紹叔獨固請願留髙祖謂曰卿才幸自有用我今未能相益宜更思他途紹叔曰委質有在義無二心髙祖固不許於是乃還夀陽及髙祖為雍州刺史紹叔間道西歸補寕蠻長史扶風太守東昏既害朝宰疑髙祖紹叔兄植為東昏直後東昏遣至雍州託以候紹叔實潜使為刺客紹叔知之宻以告髙祖植既至髙祖於紹叔處置酒宴之戯植曰朝廷遣卿見圖今日閒宴是見取良㑹也賔主大笑令植登臨城隍周觀府署士卒器械舟艫戎馬莫不富實植退謂紹叔曰雍州實力未易圖也紹叔曰兄還具為天子言之若取雍州紹叔請以此衆一戰送兄於南峴相持慟哭而别楊公則字君翼天水人為荆州西中郎參軍髙祖舉義師於雍州以為西中郎諮議中兵參軍率衆東下時湘州行事張寳積發兵自守未知所附公則軍及巴陵仍回師南討軍次白沙寳積懼釋甲以俟焉公則到州撫納之湘境遂定齊和帝即位授持節都督湘州諸軍事湘州刺史髙祖勒衆軍次于沔口增山城主孫樂祖郢州刺史張冲各據城未下公則率湘府之衆㑹于夏口時荆州諸軍悉受公則節度雖蕭頴達宗室之貴亦𨽻焉累進征虜将軍左衛将軍持節刺史如故郢城平髙祖命衆軍即日俱下公則受命先驅徑掩柴桑江州即定連旌東下直造京邑公則號令嚴明秋毫不犯所在莫不賴焉天監元年進號平南将軍封寧都縣侯柳慶逺為髙雍州别駕從事齊方多難慶逺謂所親曰方今天下将亂英雄畢起庇民定霸其吾君乎因盡誠協贊及義兵起慶逺嘗居帷幄為謀主遷冠軍征東長史從軍東下身先士卒髙祖行營壘見慶逺頓舍嚴整每歎曰人人若是吾又何憂建康城平入為侍中領前軍将軍城内常夜火禁中驚懼髙祖時居宫中悉斂諸鑰問柳侍中何在慶逺至悉付之其見任如此霸府建以為太尉從事中郎髙祖受禪遷散騎常侍右衛將軍加征虜将軍封重安侯食邑千户蕭穎達蘭陵人也為西中郎外兵參軍髙祖舉義為冠軍将軍及楊公則等率師隨髙祖曹景宗等圍郢城穎達㑹軍於漢口與王茂攻郢城陷之隨髙祖平江州髙祖進溧州使與曹景宗先率馬歩進趨江寧破東昏将李居士又下東城建康城平髙祖以穎逹為前軍将軍丹陽尹及大論功賞封穎達吳昌縣侯邑千五百户鄧元起字仲居南郡當陽人也為平南中兵參軍髙祖義師東下為冠軍将軍率衆與髙祖㑹于夏口髙祖命王茂曹景宗及元起等圍郢城結壘九里刺史張冲屢戰輙大敗乃嬰城固守齊和帝即位授節冠軍将軍平越中郎将廣州刺史遷給事黄門侍郎移鎮南堂總西渚軍事中興元年七月郢城降以本號為益州刺史仍為前軍先定尋陽及大軍進至京邑元起築壘於建陽門與王茂曹景宗等合長圍身當鋒鏑建康城平進號征虜将軍天監初封當陽縣侯食邑一千二百户庾域字司大髙祖舉義兵以為寧朔将軍領行選從髙祖東下師次陽口齊和帝遣御史中丞宗史銜命勞軍域乃諷史曰黄鉞未加非所以總率侯伯史反西䑓即授髙祖黄鉞蕭穎胄既都督中外諸軍事論者謂髙祖應致牋域爭不聽乃止郢城平域及張宏䇿議與髙祖意同即命衆軍便下每獻謀畫多被納用天監初封廣牧縣子張宏䇿為髙祖雍州録事參軍帶襄陽令髙祖覩海内方亂有拯濟之心宻為儲備謀猷所及唯宏䇿而已及義師将起髙祖夜召宏䇿吕僧珍入宅定議旦乃發兵以宏䇿為輔國将軍軍主領萬人督後部軍事西䑓建為歩兵校尉遷車騎諮議參軍及郢城平蕭穎達楊公則諸将皆欲頓軍夏口髙祖以為宜乗勢長驅直指京邑以計語宏䇿與髙祖意合又訪寧朔将軍庾域域又同乃命衆軍即日上道沿江至建康凡磯浦村落軍行宿次立頓處所宏䇿逆為圖測皆在目中義師至新林王茂曹景宗等於大航方戰髙祖遣宏䇿持節勞勉衆咸奮厲是日仍破朱雀軍髙祖入頓石頭城宏䇿屯門禁衛引接士類多所全免天監初加散騎常侍洮陽縣侯邑一千二百户宏䇿文獻皇后從父弟齊明帝建武末從髙祖宿酒酣徙席星下語及時事宏䇿因問髙祖曰緯象云何國家故當無恙髙祖曰其可言乎宏策因曰請言其兆髙祖日漢北有失地氣浙東有急兵祥今冬初魏必動若動則亡漢北帝今以疾多異議上下同釁諸部且乗機而作是以無成徒驅除耳明年都邑有大亂死人過於亂麻齊之歴數自兹亡矣梁楚樊漢當有英雄興宏䇿曰英雄今何在為己富貴為草茅髙祖笑曰光武有云安知非僕宏䇿起曰今夜言是天意也請定君臣之分髙祖曰舅欲效鄧晨乎是冬魏軍冦新野髙祖将兵為援且受宻㫖仍代曹武為雍州宏䇿聞之心喜謂髙祖曰夜中之言獨當驗矣髙祖笑曰且勿多言宏䇿從髙祖西行仍參帷幄身親勞役不憚辛苦及為髙祖雍州録事參軍時長沙宣武王罷益州還仍為西中郎長史行郢州事髙祖使宏䇿陳計於宣武王宏䇿因說王曰昔周室既衰諸侯力爭齊桓盖中人耳遂能一匡九合於今稱之齊徳告㣲四海方亂蒼生之命㑹應有主以郢州居中流之要雍部有戎馬之饒卿兄弟英武當今無敵虎據兩州三分天下糾合義兵為百姓請命廢昏立明易於掌握如此則桓文之業可成不世之功可建無為豎子所敗取笑身後雍州揣之已熟願圖之天頗不懌而無以拒也蔡道恭字懐儉齊和帝鎮荆州以為西中郎中兵參軍輔國将軍髙祖舉義師于雍州蕭穎胄以道恭舊将素著威畧専相委任遷冠軍将軍西中郎諮議參軍仍轉司馬中興元年遷右衛将軍天監初論功封漢夀縣伯邑七百户册府元龜卷三百四十四
