  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_631-1a}
body:
  text: 册府元龜卷六百三十一宋王欽若等撰銓選部條制第三唐憲宗元和二年正月制曰江淮大縣毎歳據闕委三省御史臺諸司長官節度觀察使各舉堪任縣令不限選數並許赴集臺省官及刺史赤令有闕先於縣令中揀擇如有能否與元舉人同賞罰復置具員簿以序内外庻官五月中書門下舉奏正月赦文令於中書置具員簿以序内外庻官爰自近年因循遂廢清源正本莫急於斯令京常叅官及外官五品已上前資見任起元和二年量定考數置具員簿應諸州刺史次赤府少尹次赤令諸陵令五府司馬及上州以上上佐東宮官除左右庻子王府官四品已下並請五考其臺官先定月數令諸侍御史滿十三月殿中侍御史滿十八月監察御史依前二十五月與轉三省官並三省餘官及三考四考外其文武官四品已下並五考商量與改尚書省四品已上文武官三品已上縁品秩已崇不可限以此例須有進改並臨時奏聽進止其權知官須至兩考然後正授不得用權知官資改轉其内外諸色官中縁官闕要人及縁事須有改移者卽不在常格叙遷之限諸道及諸使副使行軍司馬判官叅議掌書記支使推官廵官等有勑充職掌舉簡挍五品已上官及臺省官三考與改轉餘官四考與改如未經考者並諸授同類官經兩考者依資與轉如前衘已是使下官未經考者請以本官改轉經三考者依資與轉仍許通前任計爲考數其軍州戎鎭别立功效事跡彰著爲衆所知者須别甄錄卽具上事奏聽進止其罷使郎官御史任依舊冬薦其諸道應須薦送人等自今已後諸郎官御史者便其時限同爲冬薦所同准例簡勘申送中書門下六品已上官非郎官御史者狀到後望付吏部准貞元元年二月七日勑處分從之三年三月詔秘書省𢎞文舘左春坊司經局挍書郎正字宜委吏部自今於平留選人中擇取志行貞進藝學精通者注擬綜覈名實唯在得人不須以登科及第其挍書正字限考入畿縣簿尉任依常格四月詔重定舉縣令之法准元年赦書所舉縣令皆令直言其事不得妄爲文飾吏部舉其事狀随事簡勘者今主司只畧勘資歴未究材能自今已後宜委吏部精加考覈必使詳實所冀舉不妄施官無虚授仍令四時注擬其觀察刺史所舉不得授以本州府縣令到任後有罪犯其舉主准前勑貶罰四年正月中書門下奏伏准元和二年制告舉薦縣令等前後勑文非一有司難於遵守令㫖中外所舉縣令並依表狀十月三十日到省省司精加磨勘依平選人例分入三銓注擬平選人中有資考事跡人才與縣令相類卽先注擬時集望停從之令長親人之吏也比以資授多才不稱官故令庻僚舉也上才或不屑就受薦者多不出其類徒以未渉資序遂超踐優等論者以為啓倖門故稍復舊制焉三月制今後宗正寺修撰圗譜官知匭使判官至考滿日宜各减兩選七年八月中書門下奏請州府五品已上官替後委本道觀察使及長吏量其才行幹能堪奬用者具人才資歴毎年冬季一度聞薦其罷使郎官御史委中書門下兩省御史臺尚書省常叅及諸司職事三品已上文官左右庻子詹事諸司少卿國子司業少尹國子博士長安萬年縣令太常博士著作郎秘書丞等毎年冬准此聞薦諸司府叅佐簡挍官從元授官月日計如是五品已上官及臺省官三十箇月外任餘轉改餘官經三十六箇月奏改轉如未經考便有事及停替官本限之外更加十箇月即任申奏從之八年九月刑部奏准今年七月二十一日勑諸色左降官等經五考滿許量移者其貶降日授正員官或無責詞亦是責授並請至五考滿然後許本任處申闕並餘左降官緣任處多在遐逺至考滿日其申牒稽遲致使留滯者其刺史錄事叅軍等請與下考如滿後随己申牒未量移間其祿料並准天寳貞元兩度勑文依舊支給其本犯十惡等罪已有正名請依舊從之十一月勑有司奏申光蔡三州州縣官緣給復無稅應支俸料今量定員額及課料其六品已下官仍令吏部於選人中擇優與注擬毎月課料錢委所司量與支給其員外課料等本額待給復年滿一切仍舊十二月吏部奏比逺州縣官請量减選四選五選六選請减一選七選八選九選各請减兩選十選十一選十二選各减三選伏以比逺處都七十五州選人試後懼不及限者即伏請注擬雖有此例毎年不過一百餘人其比逺州縣皆是開元天寳中仁風樂土今者或以俸錢减少或以地在逺方凡事平流從前不注至若勸課耕種歸懐迯亡其所擇才急於近地有司若不注授所在唯聞假攝編甿益困田土益荒請减前件選勑㫖宜依十一年九月中書門下奏字人之官從古所重遂許論薦冀得循良其或不依節文虚指事跡既開謬舉之路實長倖求之風望自今已後所舉人事跡與節文不同及簡勘無據并到官後不稱職及有負犯等事並請量輕重坐其舉主輕則削奪重則貶謫伏以前後勑文雖有條約比來銓覈多務因循今重申明所期畫一其舉人到省後所簡勘如與節文不同仰具事由並舉主名衘申中書門下如所司鹵莽便與判成察知事狀違越則所司舉主同坐從之十二年六月勑自今已後應受權判官京官一考已上外官兩考已上職事條舉者然後正授如未及正授别要除改者不得全用權知判官資如特委重務即不在此限十三年六月停每年舉薦縣令十四年三月吏部奏請用鄆曹濮等一十二州州縣官員闕先是淄青不申闕員至是叛將李師道誅始用闕馬穆宗以元和十五年正月即位二月中書門下奏見任正員官充職掌等比限兩考及授官經二周年以上方許奏請然後依資改轉有才在下位者不免留滯請自今已後諸道使應奏請正員官充職掌經一年者即依資與改轉如未周者即量與同類試官如此處分庻將得中勑㫖依奏長慶二年三月制曰如聞近日武班之中淹滯頗乆又有諸道薦送大將或随節使歸朝自今已後宜令神策六軍使及南衙常叅武官具由歴并前後功績牒送中書門下若勲伐素髙人才特異者量加奬擢其常叅武官准具員年月日改轉勿令淹滯諸道軍府大將監察以上官者三周年與改轉大將未曾奏官者亦准奏請應天下諸軍各委本道據守舊額不得輙有减省官健有死王事者三周年不得停本分衣糧自憲宗御宇至此十八年矣凡朔方呉蜀洎山東兩河累興問罪之師其間兵戈少息者不五六歳故帝自藩邸細聞軍旅之事謂戎臣武卒常宜姑息繼統之始則以恣行給賚神策禁旅須左右三軍兵建號長行者其名最衆人尚獲五萬至於非時賜與不可勝紀驕横不戢其勢已甚今又降優假之詔俾其蕃大復有工賈胥吏窺昇朝籍者厚持緍貨納於方鎭方鎭嗜利者即以大將文符給之僞其職秩年月未㡬則求薦聞必曰某以歳乆宜遷某以殊勲合奬宰臣奏擬下得王官欲望兵復於農官清其品難矣九月詔曰廣徳貞元再有勑㫖要官密戚並不許任京兆判司畿令兩赤縣丞簿尉等緣人不遵行更資提舉自今已後切宜禁斷十月中書門下奏諸司要官密戚周親見任府縣官伏以所立隄防止緣權要今諸司卿監保傳三少詹事祭酒王傅西班將挍等亦無威力敢冐典章一概防閑事誠太過自今已後應宰臣及左右僕射御史大夫中丞給事舍人左右丞諸司尚書侍郎度支􅐭鐵使在京城者并諸王駙馬朞周以上親并女婿親外甥請准廣徳二年三月十一日及貞元二年二月十三日勑不得任京兆府判司畿令兩赤縣長安萬年丞簿尉其餘一切並不在此限冀典法易遵羣情大惬詔付所司永爲常式敬宗寳厯元年正月制曰如聞去冬吏部選人駁放者衆或文狀粟錯或書判差池主司守文不得不爾既施惠澤亦在霑恩其長名及雜駁選人如有未離京城者委吏部今月内簡勘除渉踰濫者餘並却收以比逺殘闕注擬如不情願不可強之又刺史縣令已後若無過犯未滿三周年不得除替如理行尤異但議就加其有才宜他職灼然要籍者中書門下先具事由及授上年月奏聽進止二年二月容管經畧使嚴公素上言容州及普寕等七縣請同廣韶桂賀四州例北選從之十一月勑京百司應𢃄職奏正員官者自今已後宜於諸司及府縣見在任官中選擇便以本官充職如見任無相當者即任於當年見選人中奏用便據資序與官不要更待銓試仍永爲常式十二月勑應請以一子官廻授諸親者自今已後須是周親仍勘騐分明方可注擬從有司之請也是月吏部又奏伏以吏部毎年集人及定留放至於注擬皆約闕員近者入仕歳增由闕日少實由諸道州府所奏悉行致令選司士子無闕貧弱者凍餒滋甚留滯者喧訴益繁至有待選十餘年褁糧千餘里累駁之後方敢望官注擬之時别遇勑授私惠行於外府怨謗歸於有司特望明立節文令自今已後諸司諸使天下州府選限内不得奏六品已下官勑㫖依奏文宗太和元年正月山陵使奏伏以景陵光陵已來諸司諸使所差補押當及雜職掌等官皆據舊例合得减選其中有無選可减者便放非時選吏曹緣是承優放選例多判成有過格年深身名踰濫赴常選不得者多求减選職掌圗得非時集因緣優勑成此倖門其吏曹爲弊頗甚今請應差前資官充職掌並不得取選數已過格人庻絶奸冐勑㫖依奏是月勑應緣諸軍使充押當雜任使合承優减選人請差前資官充不得取選數過格人五月禮部奏山陵挽郎准光陵合補二百二十人伏以近者仕進多門身名轉濫茍循徃例爲弊滋深取前𢎞文崇文舘生及已考滿太廟齋郎充如人數不足兼取前明經充其中有未過者請放冬集仍减兩選已定各集者减二選從之八月勑諸道諸軍使應奏判官并毎年冬薦等所奏判官除新開幕府據元額置署外其向後奏請如是元闕即云官某職今奏某人充如已有今更奏即云某職某人緣某事停奏某人替具前使下臺省官合冬薦者除府使罷外既有薦用當且要籍豈合數月之間便稱去職自今已後如帶職掌授臺省未經兩考者不在冬薦限如其中實有事故罷免者亦湏待授官周嵗然後許冬薦狀中具言罷免事故其他官據品秩合冬薦者則依元九月中書門下奏諸道應奏州縣官衘散試官及無出身人幕府遷授致仕官諸京司奏流外諸道進奏官等兩畿及諸道奏長馬縣令錄事叅軍簿尉等兩京及諸道州府六品已下官除初授外並合是吏部注擬近日優勞資䕃入仕轉多毎年選集無闕可授若容濫請是啟倖門遂使平人不無受屈今請並停淮山南三川硖内及諸道比逺雖吏部注擬不情願赴任者及元不注擬者其縣令叅軍長史倚頼義不容私如有才術優長假攝勞效特許前資見任及有出身人中奏請每道不得過三五人如諸道縣令錄事叅軍政事異能决疑及緝理殘破若須旌賞者許所在奏論然須指事而言在選限内亦請准寳厯二年十二月七日勑處分京諸司流外官並毎年繫部闕員今並不許奏請致仕酌法循舊頗越典章自今請自常叅官五品以外官及四品者許致仕餘停又幕府遷授章服貞元元和之間使府奏職至侍御史然後兼省官至於章服皆奬時效人思勸勉克巳慕名近日奏殿中及戎卒便請朱紫數事俱行其中自綠腰金皆非典故請自侍御史後年月足後便始與省官至於朱紫許於本使府有事跡尤異爲衆所知者然後許奏請唯副使行軍奏職時如先着綠便許着緋餘不在此限又諸道進奏官舊例皆不奏正官近既奏請仍於别道占請有俸祿處頗乖典制今請並奏當道官如資歴已至五品考滿日已前者望許至考滿日從之近歳倖門雜啟以前四條者又甚時宰臣方貞百度故次第矯革馬十月中書門下奏應禮部諸色貢舉人及吏部諸色科目選人等凡未有出身未有官如有文學只合於禮部應舉有出身有官合於吏部赴科目選近年以來格文差斥多有白身及用散試官並稱鄉貢者並赴科目選及注擬之時即妄論資次曾無格例有司不知所守其宏詞㧞萃學究一經則有定制然亦請不在用散試官限其三禮三傳一史三史明習律令第如白身並令國子監及州府同明經進士薦送如考試及第明習律令同明經一史三禮三傳同進士三史常年闕送吏部便授第二任官如有出身及有正員官本是吏部常選人則任於吏部不限選數應科目三史則超一資授官如制舉人既諸色人中皆得選試則無出身官人並可以請不用散試官從之二年閏三月都省奏落下吏部三銓甲内今春注超資官凡六十七人勑部省所執是格銓司所引是例互相陳列頗亦紛紜所貴清而能通亦繇議事以制今選已過方此争論選人可哀難更停滯其三銓已授官都省落下並依舊注與重團奏仍限五日内畢其中如官超一資半資已今據稍優者至後選日量事降折尚書侍御注擬不一致令都省以此興詞鄭絪丁公著各罰一季俸東銓所落人數較少楊嗣復罰兩月俸其今年選格仍分明標出近例有可行者收入格不可者於格内書破則所司有文可守選人無路倖求時尚書左丞韋𢎞景以吏部注擬不公選人多超資授官紀按其事落下甲勑申吏部引例以為據選人軰又惜官已成道路沸騰日詣宰相喧訴遂降此勑六月勑應諸軍使及諸道軍將兼特授正官如聞内外官曹悉皆充滿上自要重下至卑散班行府縣更無闕員或未經考便須更替相沿薦請為弊滋深况設官有定額不可增加列職無常數難兼命秩又文武名分授受各殊其諸使諸道將校等自今後宜依注例除舊有正官外並不得兼授正官九月勑吏部今年東都選事宜令河南尹王播權知侍郎銓試畢日停三年二月勑嶺南選補雖是舊制逺路行李未免勞人當處若有才能亷使宜委推擇待兵息事簡續舉舊章其南選使可更停一二年四月中書門下奏内外文武官除授近日人多干競跡罕貞修或日詣宰司自陳功狀或上黷宸扆曲祈恩私亦有粗因勞績已授官榮及居今任别無課效唯引向前事狀只希更與遷昇凡是此流稍要立制伏望自今須有除授並先選吏跡有聞行已務退者随才奨用如有跡渉浮躁事形徼求者量加擯棄從之又詔東都選事宜權停七月勑諸道進奏官舊例多是本道差文武職掌官充自後遂有奏帶正官者近又有諸兼簡校官及憲官者逓相援引轉無章程自今已後更有奏請帶正官者不得兼簡校及憲官如准諸道諸軍諸使職掌官例請簡校兼憲官充則不得帶正員官其見任有官者且聽仍至合轉改時商量處分四年五月中書門下奏准太和元年九月十九日勑釐革兩畿及諸道奏請州縣官唯山劒三川硤内及諸道比逺許奏縣令錄事叅軍其餘並停自勑下以來諸道累有奏請如滄景徳棣勑後已與數員伏以勑令頒行不合違越茍有便宜則須改張自今已後山劔三川硤内及諸道比逺州縣官有出身及前資正員官人中每道除録事外望各許奏三數員如河北諸道滄景徳棣之類經破傷之後及靈夏邠寧麟坊涇原振武豐州全無俸料有出身人及正員官悉不肯去吏部從前多不注擬如假攝有勞望許於諸色人中量事奏三數員其餘勒約及期限並依太和元年九月十九日勑處分可之七月吏部奏當司兩銓侍郎㕔伏以吏部居文昌首曹侍郎為尚書二職銓庭所宜順序㕔事固有等差舊以尚書㕔之次為中銓其次為東銓自乾元中侍郎崔器以當時休咎為虞奏改中銓為西銓乆次侍郎居左以新除侍郎居右因循倒置議者非之伏請今以後以乆次侍郎居西銓以新除侍郎居東銓勑㫖依奏是月吏部奏三銓正令史每銓元置七人今請依太和元年流外銓起請置五人减下二人南曹令史一十五人今請依太和元年流外銓起請節文减下三人奉勑宜依五年二月吏部奏請量抽太和三年終已來至今年三月四月已來得員及計人成三考闕四十五員伏緣去冬諸色黄衣叅選者倍多於常年其間十七人皆是勲臣貴戚及常叅官子弟不可任逺處州縣官三銓以當年合用闕方員發遣之外毎銓各有十餘人未得官今請准元和中及長慶初勑例據見在人數量抽前件闕注擬畢具所用闕聞奏勑㫖宜依六月勑應選人未試已前南曹駁放後經廢置詳斷及准堂判却收比來南曹據給帖人數續到續試銓司吏不考判便同平留選人例注擬稍渉僥倖自今已後應有此色並請待正月十日准格詳斷限畢都引試判不及格并雜犯及續簡勘庫報并前選子案不同並駁放不在更陳狀披訴及重詳斷之限是月又勑應選人及冬集人子案門下省簡勘畢後比來更考南曹令史收領却納門下甲庫在於公事頗甚勞煩自今已後請勒吏部過院本令史便自分付甲庫以備他年檢勘請門下省勒甲庫令史毎過選切㸃勘收什明立文案據官吏等逓相分付不得妄有破除南曹申請之時如有稱失落欠少本令史專知官准簡報楷改違條例處分是月吏部奏准貞元十八年四月一日勑諸親注得外官欲赴任自今已後毎年須先奏聞者今請至時准勑簡勑聞奏其諸親已薨歿子弟注得外官者准前後勑合奏聞起今已後請便赴集更不在重奏限其給觧處審勘責仍於家狀一一具言親等第如違駁放勑㫖依奏是月勑南曹簡勘廢置詳斷選人儻有屈事足以徃覆辨明近年已來不問有理無理多經中書門下接訴致令有司失職莫知所守選人踰分唯望哀矜若無條約恐更滋甚起今已後其被駁選人若已依期限經廢置詳斷不成自謂有屈任經中書門下陳状状到吏部後銓曹及廢置更為詳斷審其事理可收即收如散至三人已上廢置郎官請牒都省罰直如至十人以上具事状申中書門下取處分如未經廢置詳斷公然越訴或有已經詳斷不錯輙更有投論者選人量殿兩選當具格文牓示冀無寃濫亦免倖求七月勑諸色藝能授官自今已後如有罪犯停職者委本司牒報吏部不在叙用限六年五月御史臺奏請諸道節度觀察防禦經畧等使有子孫授京城及諸州府官合赴任奏請勾留在本道事伏以本置官員藉其任守吏曹注擬皆是職司况調選須有出身合年十五已上比及於二十已下十年則二十五年足可以為成人矣今則皆稱年小奏請勾留在於相承習以成例若實年小即不合早補身名若實當年又何慮為官不了今請諸方鎮子孫應選授及奏授官一切勒歸本任不得輙更奏留如或恩出殊常特賜一子者年五十以下即任奏聽進止庶得藩方絶塵冐之請州府無假攝之官中外遵承典章不紊從之八月制凡權知授官皆緣本資稍優未合便得藉才擢用故且權知若通計五考即便同正授極為僥倖自今已後應諸州府五品長馬權知正授通計六考滿停其勒留官如有未滿六考停給課科者便准此却與支給七年五月中書門下奏國之根本繫於生靈人之性命縣於守宰刺史猶官重事隔莫得躬親親人之切無如縣令况自兵興已來仍歳災歉百姓凋弊救弊之術在於擇吏又錄事叅軍糾察屬縣課責下僚一郡紀綱藉其提舉若曰令吏曹注擬無由得盡人才真偽難知貪亷莫辨准太和二年赦書已令揀擇縁吏部起請多有異同訪聞近年已來所舉殆絶又去年吏部舉請令郎官御史等舉薦堪為縣令錄事叅軍者雖有保任之言殊非責成之道臺省官假使是其親故或素所深知既非得於任官未必究其事實豈若考績效於理所聽善惡於氓謡則政之否臧較然易辨臣等商量望令京兆河南尹及天下刺史各於本府本道常選人中揀勘擇堪為縣令司錄錄事叅軍人名具課績才能聞薦其諸州先申牒觀察使都加考覈申送至吏部至選集日不要就選場更試書判吏部尚書侍郎引詣銓曹試時務狀一道訪以理人之術及自陳歴任以來課績令其一一條對但事理明切不假詞華取其理識優長者以為等第便於大縣及難理處注擬仍取税五萬貫以下縣注授即免盡占常選人闕員其刺史所舉縣令錄事叅軍如并有兩人得上下考就加爵秩在任年考已深者便優與進改其縣令錄事叅軍如在任績效明著兼得上下考及􅕾狀者許非時放選仍優與處分便委本州長吏聞薦庶得詳其實效如所舉縣令錄事叅軍犯賍一百貫已下者刺史量削階秩一百貫已上者移守僻逺小郡觀察使望委中書門下奏聽進止其犯賍官縱屢逢恩赦亦不在收敘之限所舉人中如有兩人善政一人犯賍亦得贖免如此則長吏切於求理須自擇才上奉朝章必無濫舉可之其餘官見任得上下考與减三選如兩選已下者同非時人例處分七月中書門下奏諸道諸使停罷郎官御史等望令罷職後其所任官經兩考已上方得冬薦如所任官未經考者許以罷職後計月日成兩考即得冬薦如考數未滿便冬薦者其所舉官量加殿罰如文學才行堪奨用者中書門下别加採擇不在此限諸州府上佐罷秩後便求本道薦状入城今中外官員年不盈溢聞薦繼至除授稍難其上佐考滿後望量立年限經二年已上方得聞薦其非時替者更守二年即似稍屈望一年後許冬薦如才行政績為衆所知者望委中書門下搜訪與昇奨不在此限例從之八年正月吏部奏准勑疏理諸色入仕人等今諸司流外令史府史掌固禮生楷書醫工及諸軍諸使承優官典總一千九百七十二員共請權减六百五十七員兵部奏應管左右仗干牛僕寺殿中省司馬左右金吾仗長上共一百六十一員今三色共請减六十七員文簡武簡三衛每年三銓都請留六十人為定禮部奏明經𢎞文舘生太廟郊社齋郎掌坐等共五百五十二人今六色共請減一百三十八人從之九月勑復集吏部禮部兵部今年選舉銓試之期逓延一月九年十二月勑中書門下吏部各有甲庫籍天下諸色出身以防踰濫諸道應奏諸色官改轉悉下三庫以稽其實委給事中中書舍人吏部格式郎中各與本甲庫官具有無異同申中書門下然後進擬如諸司使所奏不實或以無為有各加懲殿以絶奸源開成元年二月中書門下上言諸州刺史諸府少尹次赤令諸州府五品已上官并常叅官等在任之例約是三載命代之後遽使到京人數既多闕員常少稍經時月則訴饑寒起今後請據舊章刺史及五品已上官在外應受替去任非有徴召未得到京宜委所在州府毎兩月一度申中書門下其初状仍具前任政績受代月日中書門下准前置具員量才除授其家在上都因自歸止者京兆府申奏十月中書門下奏兩畿及兩京奏六品已下官除勑授外並吏部注擬准太和五年五月二十六日勑中書門下奏近勑隔絶諸司奏六品已下寛免占吏部闕員亦稍絶邪濫其兩府司錄及尉知捕賊皆藉幹能用差專任吏部所注或慮與事稍乖自今已後京兆府及河南府司錄及知捕賊滿據官員合入者充其餘並准太和元年九月勑及太和四年五月四日勑處分二年二月吏部奏准制請敘一子官張茂昭男左武衛大將軍克勤進状稱男小未堪授任請廻與外甥准起請節文只許廻與周親克勤又奏承前諸家請廻授外甥並蒙允許中書省牒吏部詳斷左司員外郎權判吏部廢置裴夷直斷一子官恩在報功貴延賞典若無己子許及周親今張克勤自有息男妄以外甥奏請移於他族知是何人儻渉賣官實為亂法雖援近日勑例難破著定節文國章既在必行宅相恐難虗授具状上中書門下并牒申中書省克勤所請不允遂為定例四月中書門下奏天下之理在能官人古人以還委重吏部自循資授任衡鏡失權立格去留簿書得計比緣今年三月選事方畢四月已後方修來年格文五月頒下及到地逺已及秋期今請起今月與下長格所在州府牓門暁示其所資官取本任黄衣本貫觧一千里内三月十日觧到省二千里三千里逓加十日並勒本州賫送選人發觧訖任各歸家其年七月十五日齊於所住府㸔吏部長榜定留放其得留人並限其年十二月十日齊到省試注唱正月内銓門開永為定例如其年合用闕少選人文書無違犯可校則於本色闕内先集選深人年長人其餘人既無闕可集南曹俱為判成榜示所住州縣府許次年取本住州府公騐便依限赴集更不重取本住本貫觧舊格已乆不便更改事遂不行七月諸道有以試御奏授州縣官者帝於閣内謂宰臣曰毎年選人辛勤用苦尚無缺員與之試御奏授不可輕許唯河北道吏部不注許其奏請繇是四方之倖人暫息十二月庚戌中書門下奏武官合入郎將等其堪送名者請中書門下准吏部送名例磨勘仍先過堂然後比擬從之三年三月吏部奏去年所修長定選格或乖徃制頗不便人不可乆施請却用舊格從之八月辛丑中書門下奏伏准開成元年正月一日勑諸州刺史少尹赤令並常叅官等授替去任非有徴召不得到京宜委所在州府取其由歴每兩月一度申中書門下省叅詳勑意以前件官到京後未有除授旅食可矜且令在外以候遷陟訪聞逺地不諭朝㫖將謂故有勑格阻其戀闕之心干進者亦以迭來守道者便成廢滯恐須釐正以狥衆情其諸道州府應有前件官等得替後任赴闕廷或家在四方亦随所便從之十二月制曰應諸道奏請軍將兼廵内州别駕長史判司等近日諸色入流人多官途隘窄諸道軍將自有衣糧優厚之處仍兼月俸若更占州縣員闕則文吏無所容身須有申明人知分限起今已後諸道節度團練防禦等使不得更奏大將充廵内上佐等官今日已前見任者且依任前守官應京有司有專知别當及諸色職掌等近日諸司奏請州縣官及六品已下官充本司職掌援引舊例色目漸多致使勾留溢於舊額起今已後各於本司見任官寮之中揀擇差署不得别更奏官如是勑額職名當司無官員相當者即任准舊例奏請四年正月吏部奏嶺南五管及黔中道選補准元和十年九月二十九日格五年一集至選前一年南曹先牒五管等道催索文觧又准太和五年三月十八日勑權停令欲准格簡舉排比伏請裁下制曰兩道選補停罷多時極為利便隔年舉奏撓動逺情宜更停五年議者以為人逺地便不足為慮曾不知舊制無遺於逺人事可經乆令一方之政得其人則一境之人受其福茍非其人則假攝之官皆授里人至有胥賈用賄求假本州令錄裒斂剝下而又恣其喜怒以報已私自罷選補使令藩方差官杼軸之歎南人益困二月勑吏部去冬粟錯及長名駁放選人等如聞經冬在京窮悴頗甚街衢接訴有可哀矜宜委吏部簡勘條流鈐轄如非踰濫正身不到欠考欠選大叚瑕病之外即與重收以比逺殘闕注擬不得用平留闕如員闕不相當一唱不伏官者便任冬集不在更論訴限如未經中書門下陳状勑下後不得續收今年已後不得以為例七月己丑制曰諸門入仕人數轉多毎年吏曹注擬無闕唯河北諸道河東澤潞山劒三川京北京西管内官員稍多假攝之中實有勞効毎年許奏三兩人仍須是元額闕不得替見任人其餘諸道並不得奏人五年七月潮州刺史林郇陽奏州縣官諸同漳河廣韶桂賀等州例吏曹注官勑㫖潮州是嶺南大郡與韶州畧同宜下吏部准韶州例收闕注擬餘依十一月嶺南節度使盧鈞奏當道伏以海嶠擇吏與江淮不同若非諳熟土風即難搜求人瘼且嶺中徃之弊是南選今之弊是北資臣當管二十二州唯韶廣州官僚每年吏部選授道途遐逺瘴癘交侵選人若家事任持身名真實孰不自負無繇肯來更以俸入单微毎歳號為比逺若非下司貧弱令使即是逺處無能之流比及到官皆有積債十中無一肯識亷恥臣到任四年備知情状其潮州官吏伏望特循徃例不令吏部注擬且委本道求才若攝官亷慎有聞依前許觀察使奏正事堪經乆法可施行勑㫖依奏册府元龜卷六百三十一
