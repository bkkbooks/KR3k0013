body:
  text: 冊府元龜卷五百四十六宋王欽若等撰諌諍部直諌第十三唐韓思復為諌議大夫開元初山東蝗蟲大起姚崇為中書令奏遣使分河南北諸道殺蝗蟲而埋之思復以為蝗是天災當修徳以禳之恐非力所剪滅上䟽曰臣聞河南河北蝗蟲頃日更益繁熾經歴之䖏苖稼都損今漸翾飛向西逰食至雒使命来往不敢昌言山東數州甚為惶懼且天災流行埋瘞難盡臣望陛下悔過責躳發使宣慰損不急之務召至公之人上下同心君臣一徳持此誠實以答休咎前後驅蝗使等伏請緫停書云皇天無親惟徳是輔人心無常惟恵之懐不可不收攬人心也帝深然之出思復䟽以付崇崇廼請遣思復往山東簡視蝗蟲所損之䖏及還具以實奏又請令監察御史劉沼重加詳覆沼希崇㫖意遂笞撻百姓廻改舊状以奏之由是河南數州竟不得損免思復遂為崇所擠出為徳州刺史皇甫憬為陽翟尉開元初監察御史宇文融請簡察偽濫逃户憬上䟽曰臣聞知者千慮或有一失愚夫千計亦有一得且無益之事繁則不急之務衆不急之務衆則役數役數則人疲人疲則無聊生矣是以太上務徳以静為本其次化之以安為上但責其疆界嚴其提防山水之餘即為見地何必聚人阡陌親遣括量故奪農時遂令受弊又應出使之軰未識大體所由殊不知陛下愛人至深務以勾剥為計州縣懼罪據牒即徵逃亡之家隣保代出隣保不濟又使更輸急之則都不謀生緩之則憲法交及臣恐逃逸從此更深至如澄流在源止沸繇火不可不慎今之具寮向逾萬數蠶食府庫侵害黎人國絶數載之儲家無經月之蓄雖其厚稅亦不可供户口逃亡莫不繇此縦使伊臯申術管晏陳謀豈息兹弊若以此給将何以堪雖東海南山盡為粟帛亦恐不足豈括田稅容能周給也左拾遺楊相如上言咸陳括為不便𤣥宗方委任融侍中源乾祐及中書舎人陸堅皆贊成其事乃貶憬為盈州尉桞澤開元二年為殿中侍御史嶺南監選使㑹市舶使右衛威中郎将周慶立波斯僧及烈等廣造竒噐異巧以進澤上書諌曰臣聞不見可欲使心不亂是知見欲而心亂必矣竊見慶立等雕鐫詭物制造竒噐用浮巧為珍玩以譎怪為異寳乃理國之所巨蠧聖王之所嚴罰紊亂聖謀汨斁彛典昔露臺無費明君尚或不忍象箸非多忠臣猶且憤歎王制曰作異服竒噐以疑衆者殺月令曰無作滛巧以蕩上心巧謂竒伎怪好也蕩謂惑亂情欲也今慶立皆欲求媚聖意揺蕩上心若陛下信而使之是宣奢滛於天下必若慶立矯而為之是禁典之無赦也陛下即位日近萬邦作孚固宜昭宣菲薄廣敷節儉則萬姓幸甚崔向為右補闕開元七年上䟽曰臣聞千金之子坐不垂堂百金之子立不倚衡况居大寳之位也哉陛下宜保萬夀之體副三靈之望安可輕出入重盤逰乎天子三田前古有訓豈唯為乾豆賔客庖厨者哉亦足以閱兵講武誡不虞也詩美宣王之田徒御不驚有聞無聲謂畋獵時人皆啣枚有言聞而無諠譁也又曰悉率左右以燕天子謂悉驅禽獸順其左右之宜以安待王射也則知大綏将下亦有禮焉側聞畋於渭濵有異於是六飛馳騁萬騎騰躍衝翳薈蹴蒙籠越嶃險靡榛叢紅塵坐昬白日将暗毛羣擾攘羽族繽紛左右戎夷競申驍勇攢鏑亂下交刃霜飛而降尊亂卑争捷於其間豈不殆哉夫環衛而居暴客攸侍清道而出行人尚驚如有墜駕之虞流矢之變獸竆則摶鳥竆則戄陛下復何以當之哉静言思之臣深為陛下戰慄也書曰不畏入畏又曰從諌則聖惟陛下深思逺慮以誡後圗則其天下孰不幸甚吴兢為太子左庶子𤣥宗東封多射獵兢諌曰陛下爰自雒邑将告禪岱宗行經數州屢以畋獵為事伏恐外荒之攸漸誠非致理之所急况陳封告成禮容甚大伏願罷此畋逰之事克備文物之儀又貞觀時太宗文皇帝凡有廵幸則慱選識逹古今之士以在左右每至前代興亡之地皆問其所繇用為鑒誡伏願陛下遵而行之則與夫騁奔馬於澗谷要狡獸於叢林不慎垂堂之危不思馭朽之變安可同年而較其優劣施敬本為右補闕開元十六年五月六日唐昌公主出降有司進儀注於紫宸殿行五禮敬本與右拾遺張烜左拾遺李銳等連名上䟽曰竊以紫宸殿者漢之前殿周之露寝陛下所以負黼扆正黄屋饗萬國朝諸侯人臣至敬之所猶𤣥極可見不可得而升也昔周女出降於齊而以魯侯為主但有外館之法而無露寝之事今欲紫宸殿㑹禮即當人臣攝行馬入於庭醴升於牖主人授几逡廵紫座之間賔使就筵登降赤墀之地又據主人辭稱吾子有事至於寡人之室言詞僣越事理􅆾張既黷威靈深虧典制其問名納采等並請權於别所𤣥宗納其言移於光順門外設次行禮裴耀卿為尚書左丞相開元二十四年特進盖嘉運破突騎施立功還詔加河西隴右兩節度使仍令經畧吐蕃嘉運既承恩寵日夕酣宴不時赴軍耀卿宻上䟽曰伏見蓋嘉運立功破賊更委兩軍以勇果之才承戰勝之勢吐蕃小醜不足殱夷然臣近日與其同班觀其舉措精勁勇烈誠則有餘言氣矜誇恐難成事莫敖狃於蒲騷之役舉趾稍髙春秋書之以為懲誡恐其有驕敵之色臣竊憂之入秋防邉日月稍逼接封人吏須識其宜今将撫邉軍未言發日若臨事始去人吏未諳雖决在一時恐非制勝萬全之道况兵未訓練不知禮法人未懐恵士或生心求其忘性命於一時憚嚴刑於少選縱威逼而進因而立功恐非師出以律久長之義又萬人性命决在将軍不得已而行之鑿凶門而即路今酣宴朝夕優渥有餘亦恐非愛人憂國之意不可不察若不可廻緩即望速遣進途仍乞聖恩朂以嚴命䟽奏𤣥宗乃促嘉運赴軍竟以無功而還梁鎮為昭應令代宗廣徳二年道士李國禎以道術見因奏皇室仙系冝修崇靈跡請於昭應縣南三十里山頂置天華上宫靈臺大地婆父三皇道君大古天皇中古伏羲媧皇等祠堂并置洒掃宫戸一百人又於縣之東義扶谷故湫置龍堂并許之時嵗饑荒人甚不安鎮上奏曰臣聞國以人為本害其本則非國神以人為主虐其主則非神故昔之聖王所以極陳理道明著祀典将愛其人而慎用其材力敬其神而䖍恭於祠祭故神享其明徳而降之福人受其大賚而盡其力然後神人以和而國家可保也一昨蟊賊作孽水旱為災雖王畿皆徧而臣縣最苦此則神之不能禦大災也明矣又何力於陛下而得烈其祀典哉且以殘弊之餘當凶荒之嵗丁壮素出家入仕羸老方飛蒭􅞮粟今但供億王事已不堪命更奔走鬼道何以聊生臣又聞天地之神尊之極者掃地可祭精意可饗陛下亦何必廢先王之典崇俗巫之說走南畝之客殺東鄰之牛而後冀作非妄之福陛下雖欲為人祈福福未至而人已困矣其不可一也陛下不視昔者有道之君至徳之后何不卑宫室菲飲食恭已以遂萬物之性哉陛下今違神亭育之心竭人疲困之力如是又何從而致其福哉此又不可二也又陛下宗廟之敬極矣尚無一月三祭之禮今此獨為則宗廟之靈将等以親䟱較以厚薄陛下又何以言哉此又不可三也又大地婆父祀典無文言甚不經義無可取若陛下特與大地建祖宗之廟必上天貽向背之責陛下又何以為詞哉此其不可者四也夫湫者龍之所居也龍得水則神無水則螻蟻之匹也故知水存則龍在水竭則龍亡此愚智之所以同知也今湫竭亦久龍安所存陛下又崇飾祠宇豐潔奠為去龍之穴破生人之産人且怨矣神何歆哉此又不可五也其道君三皇五帝則兩京及所都之䖏皆建宫觀祠廟時設齋醮饗祀國有彛典官有常禮盖無闕失矣又何勞神役靈此又不可六也臣稽先王典禮觀前聖之軌躅休咎豐凶災祥禍福必至帝王五事不在山川百神此又不可七也臣伏察此弊頗知其繇盖以道士李國禎等動衆則得人興工則獲利祭祀則受胙主執則有權是以鼔動禁中熒惑天聽踰越險阻負荷粢盛以日繋年無時而息曽不課神功力空止竭人膏血以使人神胥怨灾孽並生罔上害人左道亂政原情定罪非殺而何臣昨受命之時承聖㫖務要安緝許逐權宜誠願沉鄴縣之巫安流弊之俗其所興兩祠土木之功丹青之役洒掃之戸謹明宣㫖並亦權宜停訖人吏百姓等知陛下以從善為心嫉惡為務蠲除不急剗革煩苛皆諠呼於庭忭躍於路所徵糧糗無不樂輸臣伏以國禎等並交結中貴狡蠧成性臣雖忘身許國不懼䜛搆終恐賄及豪右復為姦惡其國禎等見具状推勘如獲贓状伏望許臣徵收便充當縣郵館本用其湫既竭不可置祠堂又不可當為大地建立祖宗廟臣並請停其三皇道君天皇伏羲女媧等既先各有宫廟望請並於本所依禮齋祭上從之姚南仲為右補闕大歴中将葬貞懿皇后代宗恩寵所屬令繕陵寝邇章敬寺後當逰行幸近地左右莫敢言者南仲上䟽曰伏聞貞懿皇后今於城東章敬寺北以起陵廟臣不知有司之請乎陛下之意乎隂陽家流之希㫖乎愚以為非所宜也謹具䟽之伏願暫留天眷而省察焉臣聞人臣宅於家君主宅於國今夫長安城陛下皇居也其可穿鑿興動而建陵墓於其側乎此非所宜一也夫葬者蔵也欲人之不得見也是以古帝前王葬后妃莫不馮丘原逺郊郭今則西甫宫闕南逼康荘若使近而可見歿而復生雖在西宫待之且何如骨肉歸土魂無不之章敬之北竟何所益示之兆庶則彰溺愛垂之萬代則累明徳此非所宜二也夫帝王者居髙明燭幽滯先皇所以因龍首建望春盖為此今若起陵目前動傷宸慮天心一傷數日不平且匹夫向隅滿堂為之不樂萬乗不樂人其可歡心乎又暇日歌鐘於内此地皆聞此非所宜三也伏惟貞懿皇后坤徳配天母慈逮下陛下所以切軫旒扆以久俟蓍龜始謚之以貞懿終待之以䙝近臣竊惑焉非所以稱述后徳光被下泉也今國人皆曰貞懿皇后之陵邇於城下者主也上将日省而時望焉斯有損於聖徳無益於貞懿将欲寵之而返辱之此非所冝四也凡此數事實黯大猷天下咸知伏惟陛下熟計而取其長也陛下方将偃武靖人一誤於此其傷實多臣恐君子是非史官貶褒大明忽虧於掩蝕至徳翻後於堯舜不其惜哉今指事尚遥改卜何害抑皇情之殊眷成貞懿之美號天下幸甚代宗覽表歎息立從其議賜緋魚袋特加五階宣付史臣郇模晉州人以麻辮髪持竹籠及葦席哭於東市人問其故對曰有三十字請獻於上若無堪便乃以竹籠貯屍棄之於野京兆府以聞代宗即詔見賜衣舘於禁内客省其獻三十字一字論一事其要者團字監字團者請罷諸州團練使也監者請罷諸道監軍使也顔真卿為簡校刑部尚書知省事永泰中元載引用私黨懼朝臣論奏其短乃請百官凡欲論事皆先白長官長官白宰相然後上聞真卿上䟽曰御史中丞李進等召百寮傳宰相語稱奉進上縁諸司官奏事頗多朕不憚勞但所奏多挟私䜛毁自今論事者諸司官皆湏先白長官長官白宰相宰相定可否然後奏聞者臣自聞此語已来朝野囂然人心莫不衰退矣何則諸司長官皆達官也言皆専達於天子也郎官御史者陛下腹心耳目之臣也故其出使天下事無巨細得失皆令訪察廻日奏聞以明四目達四聰也今陛下欲自屏耳目使不聰明則天下何則焉詩云營營青蝇止于棘䜛言罔極交亂四國以其能變白為黒變黒為白也詩人深惡之故曰取彼譛人投畀豺虎豺虎不食投畀有北則夏之伯明楚之無極漢之江充皆䜛人也孰不惡之陛下惡之深得君人之體矣陛下何聽其言虗誣者則䜛人也因誅殛之其言不虗誣者則正人也因奨勵之陛下捨此不為使衆人皆謂陛下不能明察倦於聽覽以此為辭其諌諍臣竊為陛下痛惜之臣聞太宗勤於聽覽庶政以理故著司門式云其有無門籍人有急奏者皆令監門司與伏家引奏不許關礙所以防擁蔽也并置立伏馬二匹湏有乗騎便往所以平天下正用此道也天寳已後李林甫威權日盛羣臣不先諮宰相輙奏事者不過仍託以他故中傷猶不敢明約百司令先白宰相又閹官袁思藝日宣詔至中書𤣥宗動静必告林甫先意奏請𤣥宗驚喜若神以此權柄恩寵日甚道路以目上意不下宣下情不上逹所以漸致潼關之禍皆權臣誤主不遵太宗之法故也陵夷至於今日天下之蔽盡萃於聖躬豈陛下招致之乎盖其所從来者漸矣自艱難之初百姓尚未凋弊太平之理立可便致屬李輔國用權宰相専政遞相姑息莫肯直言大開三司不安反側逆賊􅄆落将士比走黨項合集土賊至今為患偽将更相驚恐因思明危懼扇動却反又令相州敗􅄆東都䧟沒先帝為此憂勤至於損夀臣每思之實痛切心骨今天下兵戈未戢瘡瘠未平陛下豈得不日聞讜言以廣視聽而欲頓隔忠讜之路乎臣竊聞陛下在陕州時奏事者不限貴賤務廣聞見乃堯舜之事也凡百臣庶以為太宗之理可翹足而待也臣又聞君子難進而易退繇此言之朝廷開不諱之路猶恐不語况懐厭怠令宰相宣進止使御史臺作條目不令直進從此人必不敢奏事則陛下聞見只在三數人耳目天下之士方鉗口結舌陛下後見無人奏事必謂朝廷無事可論豈知懼不敢進即林甫國忠復起凡百臣庶以為危殆之期又翹足至也如今日之事曠古未有雖李林甫楊國忠猶不敢公然如此今陛下不早覺悟漸成孤立後縱悔之無及矣臣實知忤大臣者罪在不測不忍孤負陛下無任懇迫之至其激切如此於是中人争冩内本布於外裴諝為金吾将軍建中初徳宗於廟堂别置三司以决庶獄争者輙撃登聞鼔諝上䟽曰夫諫皷謗木之設所以達幽枉延直言今輕猾之徒援桴鳴皷始動天聽竟因纎㣲若然者安用吏理乎帝然之悉歸有司權徳輿為左補闕時貞元中裴延齡以巧倖判度支自司農少卿遷户部侍郎仍判度支徳輿上䟽曰臣伏以爵人於朝與衆共之况經費之司安危所係延齡頃自權判逮今旬嵗不稱之聲日甚於初羣情衆口諠於朝市不敢悉煩聖聽今謹畧舉所聞多云以租賦正額支用未盡者便謂之剰利以為己功又重破官錢買常平先所收市雜物遂以再給估價用充别貯利錢又云邉上諸軍皆至懸闕自今秋以来並不支糧伏以疆場之事所虞非細誡誠聖謨前定終事切於有司陛下必以延齡孤貞獨立為時所抑醜正之黨結此流言何不以新收剰利徵其本末令分析條奏又擇朝賢信臣與中使一人廵覆邉軍察其資儲有無虗實儻延齡授任已来精意勤力每事省約别收羡餘至於正數各有區别又邉軍儲蓄寔猶可支身自歛怨為軍國惜費自冝更加優奨以洗羣疑明書厥勞昭示天下如或言者非謬罔上實多豈以邦國重務委之非據臣職在諌曺合採羣議正拜已来今已旬日道路云云無不言此豈京師士庶之衆愚智之多合而為黨共有讎疾陛下似宜稍廻聖鑒俯察羣心是時拾遺王仲舒亦抗䟽論之許孟容為給事中上䟽曰臣竊謂陛下數月来齋居損膳為兆庶心禱又勑有司走於羣望祈於百神而宻雲不雨首種未入豈觴牢有闕巫祝非誠為隂陽適然豐歉前定何聖意精至甘澤未答也臣歴觀自古天人交感未答者未有不繇百姓利病之急者切者邦家教令之大者逺者京師是萬國所㑹強幹弱枝者自古通䂓其一年稅錢及地稅出入一百萬貫臣伏冀陛下即日下令全放免之其次三分收二且使旱涸之際更免流亡若播種無望徵歛如舊則必愁怨遷徙不顧墳墓矣臣愚以為徳音一發膏澤立應變災為福期在斯湏户部于收掌錢非度支嵗計本防緩急别用今此炎旱直支一百餘萬貫代京兆百姓一年差科實陛下巍巍睿謀天下鼔舞歌揚者也復更省察庶政之中有流移征防當還而未還者徒役禁錮當釋而未釋者逋懸饋送當免而未免者沉滯鬰抑當伸而未伸者有一于此則特降明命令有司條例三日内奉奏其當還當釋當免當伸者詔下之日所在即時施行臣愚以為如此而神不監嵗不稔古未之有䟽寝不報穆質為給事中元和初掌賦使院多擅禁繋户人而有笞掠至於死者質乃論奏鹽鐵轉運司應决私鹽繋囚湏與州府長吏監决自是刑名畫一四年鎮州王承宗叛憲宗用内官吐突承璀為招討使質率同列伏閣論奏言自古無以中官為将帥者憲宗雖改其名心頗不恱尋改質為太子左庻子獨孤郁為左補闕元和四年鎮州王承宗拒命詔以左神策䕶軍中尉左衛上将軍吐突承璀為左右神策河中河陽浙西宣歙等道赴鎮州行營兵馬招討䖏置等使帝御延英殿對度支使李元素鹽鐵使李鄘京兆尹許孟容御史中丞李夷簡諌議大夫孟簡給事中吕元膺穆質等及郁皆言中官吐突承璀不可以統師且非舊制郁言尤激切翌日乃削承璀捴河陽浙西宣歙四道兵但充鎮州已来招討宣慰等使時論諌者皆以為中外任殊承璀不宜捴戎招討至是改䖏置為宣慰猶存招討之名孟簡為諌議大夫鎮州王承宗阻兵下詔誅伐以中貴人吐突承璀為行營招討䖏置等使宰臣裴垍陳奏以為中官不宜統兵言未允納簡與吕元府許孟容李夷簡穆質等上䟽抗論又偕詣延英面陳不可之状遂退改承璀使號簡在諌署三年言論切正繇是出為常州刺史裴度為御史中丞先是五防小使每嵗冬以鷹犬出近畿習狩謂之外按宣徽院供奉官為其使領數百或有恃恩恣横郡邑驚擾皆厚禮迎犒之恣其所便止舎私邸百姓畏之如㓂盜每留旬月方更其所元和九年冬裴寰為下封令嫉其暴横但據名供饋使䖏公館杜其侵擾使者歸或譛寰有慢言上大怒将以下不敬論宰臣於延英懇救理之帝怒不解及出逢度将入元衡等謂曰裴寰事上意不聞恐不可論度唯唯而入抗陳其事謂寰無罪帝愈怒曰如卿言裴寰無罪則當决五防小使小使無罪則當决裴寰度曰誠如聖㫖但以裴寰為令長愛惜陛下百姓如此豈可罪之帝怒稍解初令書罰翌日釋之放歸本縣視事焉裴潾為左補闕兩河用兵憲宗寵任内官有至専兵柄者又以内官充舘驛使有曺進玉者恃恩暴戾遇四方使多倨有至捽辱者宰相李吉甫奏罷之及淮西用兵使復以内官為使潾上䟽曰館驛之務每驛皆有専官畿内有京兆尹外道有觀察使刺史迭相監臨臺中又有御史充館驛使専察過闕伏知近有敗事上聞聖聰但明示科條督責官吏據其所犯重加貶黜敢不惕懼日夜勵精若令宫闕之臣出叅館驛之務則内臣外事職分各殊切在塞侵官之源絶出位之漸事有不便必誡於初令或有防不必在大儻掃静妖氛之日開太平至理之風澄本正名實在今日言雖不用帝意嘉之潾為起居舎人時憲宗垂意方士既得桞泌益信金丹藥石之說推心服之無疑焉潾抗䟽曰臣聞除天下之害者受天下之利共天下之樂者饗天下之福故上自黄帝顓頊堯舜禹湯及文王武王咸以功濟生靈徳配天地故皆報之以上夀垂祚於無疆伏見陛下以大孝安宗廟以至仁貴黎元自踐祚以来剗積代之妖兇開削平之洪業而又禮敬宰輔待以終始内能大斷外寛小故夫此神功聖化皆自古聖王明君所不及今陛下躬親行之實光映千古矣是則天地神祇必報陛下以山嶽之夀宗廟聖靈必福陛下以億萬之齡四海蒼生咸祈陛下以覆載之永自然萬靈保祐聖夀無疆伏見自去年以来諸䖏頻薦藥術之士有韋山甫桞泌等或更相稱引迄今薦送漸多臣伏以真仙有道之士皆匿其名姓無求於代潛遁山林滅影雲壑恐人見之懼人聞之肯干謁公卿自鬻其術哉所有誇衒藥術者必非知道之士咸為求利而来自言飛煉為神以誘權貴賄賂大言怪論驚聽惑時及假偽敗露曽不耻於逃遁如此情状豈可深信其術親餌其藥哉禮曰夫人食味别聲被色而生者也春秋左傳曰味以行氣氣以實志又曰水火醯醢鹽梅以烹魚肉宰夫和之齊之以味君子食之以平其心夫三牲五穀禀自五行發為五味盖天地生之所以養人也是以聖人節而食之以致康強逢吉之福若夫藥石者前聖以之療疾盖非常食之物况金石皆含酷烈熱毒之性加以焼治動經嵗月既兼烈火之氣必恐難為防制若乃逺徵前史者則秦漢之君皆信方士如盧生徐福欒大李少君其後皆奸偽事發其藥竟無所成事著史記漢書皆可驗視禮曰君飲藥臣先嘗之臣子一也臣願所有金石煉藥人及所薦之人皆先服一年以考其真偽則自然明驗矣伏惟元和聖文神武法天應道皇帝陛下合日月照臨之期禀乾元利貞之徳崇正若指南受諌如轉䂓是必發精金之刄斷可疑之網所有藥術虚誕之徒伏乞特賜罷遣禁其幻惑使浮雲盡徹朗日増輝道化侔羲農悠久配天地實在於此矣伏以貞觀以来左右起居有褚遂良杜正倫吕向韋述等咸能竭其忠誠悉心䂓諌小臣謬叅侍從職奉起居侍臣之中最近左右傳曰近臣盡䂓則近侍之臣上達忠欵實其本職也䟽奏貶潾為江陵令韓愈為刑部侍郎元和十四年憲宗命中使領禁兵迎䕶鳯翔法門寺釋迦牟尼佛指骨至京王公士庶瞻禮捨施如恐不及百姓有廢業竭産焼頂灼臂而去供養者又有閭肆惡子不苦焚烙之痛譎言供養而爇其肌膚繇是佛骨所在往往盜發既擒獲或嚮之自灼者農人多廢東作奔走京城愈上䟽極諌曰臣伏以佛者夷狄之一法耳自後漢時始流入中國上古未嘗有也昔黄帝在位百年年百一十嵗少昊在位八十年年百嵗顓頊在位七十九年年九十八嵗帝嚳在位七十年年百五嵗帝堯在位九十八年年百一十八嵗帝舜及禹年皆百嵗此時天下太平百姓安樂夀考然而此時中國未有佛也其後殷湯亦年百嵗湯孫太戊在位七十五年武丁在位五十九年書史不言其年夀所極盖亦俱年不減百嵗周文王九十七嵗武王九十三嵗穆王在位百年此時佛法亦未至中國非因事佛而致然也漢明帝時始有佛法明帝在位纔十八年耳其後亂亡相繼運祚不長宋齊梁陳元魏以下事佛漸謹年代尤促惟梁武帝在位四十八年前後三度捨身施佛宗廟之祭不用牲牢盡日一食止於菜菓其後竟為侯景所逼餓死臺城國亦尋滅事佛求福反更得禍繇此觀之佛不足信事亦可知矣髙祖始受隋禪則議除之當時羣臣材識不逺不能深知先王之道古今之宜推闡明聖以救斯弊其事遂止臣嘗恨焉伏惟睿聖文武皇帝陛下神聖毅武數千百年以来未有倫比即位之初不許度人為僧尼道士又不許創立寺觀臣嘗以為髙祖之志必行於陛下之手今縱未能即行豈可恣之轉令盛也今聞陛下令羣僧迎佛骨於鳯翔御樓以觀舁入大内又令諸寺逓迎供養臣雖至愚必知陛下不惑於佛作此崇奉以祈福祥也直以豐年之樂狥人之心為京都士庶設詭異之觀戯翫之具耳安有聖明若此而肯信此等事哉然百姓愚冥易惑難暁茍見陛下如此将謂真心信佛皆云天子大聖猶一心敬信百姓微賤於佛豈合更惜身命所以焚頂燒指百十為羣解衣􅄆錢自朝至暮轉相倣傚惟恐後時老少奔波棄其業次若不即加禁遏更歴諸寺必有斷臂臠身以為供養傷風敗俗傳笑四方非細事也佛本夷狄之人與中國言語不通衣服殊製口不言先王之法言身不服先王之法服不知君臣之義父子之情假如其身尚在奉其國命来朝京師陛下容而接之不過宣政一見禮賔一設賜衣一襲衛而出之於境不令惑於衆也况其死已久朽枯之骨凶穢之餘豈宜以入宫禁孔子曰敬鬼神而逺之古之諸侯行弔於國尚令巫祝先以桃茢袚除不祥然後進弔今無故取穢朽之物親臨視之巫祝不先桃茢不用羣臣不言其非御史不舉其罪臣實耻之乞以此骨出付有司投諸水火永絶根本斷天下之疑絶後代之惑使天下之人知大聖人之所作為出於尋常萬萬也豈不盛哉豈不快哉佛如有靈能作禍福凡有殃咎宜加臣身上天監臨臣不怨悔李渤為户部員外郎将皇甫鏄作相剥下以希㫖㑹陳許節度使郗士美卒令渤充弔祭使路次陕西渤上䟽曰臣自出使力求利病竊知渭南縣長源鄉本有四百户今纔四十餘户閿鄉縣本有三千户今纔有一千餘户其他州縣大畧相似其弊所自起於攤逃約十家内一家逃亡即攤賦稅使九家共出稅額長定有逃即攤似投石井中不到底不止攤逃之弊户不盡不休此皆聚歛之臣競剥下以奉上唯思竭澤不慮無魚伏乞詔書絶其攤逃以見在户家産錢數為定其餘有欠且特恩免之計不數年人必歸於農矣夫農者國之本本立然後可以議太平若不繇此而云太平者是佞邪之臣也伏乞陛下察而逐之䟽奏仍具状申中書門下又言道途不修驛馬多死憲宗覽疏驚異即以飛龍馬數百匹付畿内諸驛渤既以章䟽切直大忤時宰謝病東歸徙為江州刺史張平叔判度支奏徴久逺逋懸渤在州上䟽曰伏奉詔勅云度支使奏令臣設計徴填當州貞元二年逃户所欠錢四千四百一十貫臣當州管田二千一百九十七頃今已旱死一千九百頃有餘若更勤狥度支使所為必懼史官書陛下於大旱中徴三十六年前逋懸臣任刺史罪無所逃臣既上副聖情下不忍鞭笞黎庶不敢輕離符印特乞放臣歸田遂下詔云江州所奏實為懇誠若更抑為必難務濟所訴逋欠宜令特放長慶三年為諌議大夫敬宗冲年即位坐朝常晚一日入閤久不坐殿羣臣候立紫宸門外有耆年衰病者㡬将傾仆渤出次白宰相曰昨日拜䟽陳論今坐益晚是諌官不能廻人主之意渤之罪也請先出閤待罪於金吾仗語次喚仗乃止遷給事中来年大赦改元中官毆鄠縣令崔發於金鷄竿下渤上䟽曰縣令不合拽中人中人不合毆御囚其罪一也然縣令所犯在恩前中人所犯在恩後中人事至於此是朝廷馴致使然若不早正刑法臣恐夷狄於四方之歸還者各傳其言竊恐慢易之心寖萌於此楊虞卿為監察御史穆宗即位初頻逰幸虞卿上䟽諌曰臣聞鳶鵲遭害則仁鳥逝誹謗不誅則良言進况詔㫖勉諭許陳愚誠故臣不敢避誅死竊聞堯舜受命以天下為憂而未聞以位為樂也况北虜猶梗西戎未賔西河之瘡瘠未平五嶺之妖氛未解生人之疾苦盡在朝廷之制度莫修邉儲屢空國用猶屈固未可以髙枕無虞也陛下初臨御宇有憂天下之志恒日延輔臣公卿百執事垂聽而問造膝以求使四方内望有所觀焉今自聽政以来六十日矣八開延英獨三數大臣仰龍顔承聖問其餘侍從詔誥之臣偕入而偕出何足以聞政事哉諌臣盈庭忠言未聞於聖聽臣實羞之盖繇主恩尚踈而衆正之路未啓也夫公卿大臣宜朝夕見天子論道賜與從容則君臣之情相接而理道備聞矣方自宰臣以下四五人時得頃刻侍坐天威不逺鞠躬隕越随㫖上下無能往来此繇君太尊臣太卑故也自公卿以下雖歴踐清地曽未祇奉天睠以承下問鬰塞正路偷安幸門况陛下神聖如五帝臣下莫能望清光所宜周遍顧問恵其氣色使支體相輔君臣無間陛下求理於公卿公卿求理於臣軰自然上下孜孜相問使進忠若趨利論政若訴寃如此而不聞過失不致昇平者未之有也自古帝王居位思安之心不相殊居安慮危之心不相及故不得皆為聖帝明王小臣踈賤豈宜及此獨不忍冒榮偷禄以負聖朝伏惟陛下深憐之帝令中使宣付宰臣云虞卿所上䟽切直可奨後宰臣令狐楚蕭俛叚文昌延英奏事因以納諌稱賀趙知㣲衡山人長慶初上䟽曰臣聞色荒禽荒尚書以為至誡前代失徳之主鮮不繇此以致顛危故聲色則慆滛心耳蕩􅄆神精馳騎則蹈渉傾欹變生衡蹶此前代聖主賢臣最為深誡者也是以周公作無逸之篇而成王致理漢文冒馳峻之險而袁盎興諌皆事理明切著為格言今陛下嗣守鴻業之初萬方仰聽之際尤資静慎用副觀聽而旬月以来逰幸未節優戱在側馳驅無度臣是以内則慮深識之賢憂歎興謗外則恐軼材之獸軫轂可虞伏望逺覽古聖稍息逰玩怡神閒燕肆目經書求理道於既安播休聲於永代實天下幸甚䟽奏帝深嘉歎之李珏為拾遺長慶元年穆宗召邠寧節度使李光顔徐州節度使李愬赴闕或言欲及重陽節與百寮内宴珏與宇文鼎温㑹韋瓘馮葯等上䟽曰臣聞人臣之節本於忠藎茍有所見即宜上陳况臣等為陛下諌官食陛下美禄豈得腹非誠隱孤負恩榮臣聞諸道路不知信否皆云遣光顔李愬及重陽令節内宴百寮儻誠有之乃陛下親羣臣𢎞徳澤之慈㫖也然使以元朔未改園陵尚新雖陛下就易月之期俯從人欲而禮經著三年之制猶服心喪遵同軌之㑹適去於中邦告逺夷之使未復其誠命遏宻弛禁盖為濟人合讌内庭事将未可夫明主動而為天下則言而為天下法臣恐王言忽降其出如綸茍紊皇猷徒彰直諌臣等是以昩死上聞曲突徙薪義實在此其李光顔李愬久統戎旅皆有忠勞今者時當盛秋務切邉㓂及至之日陛下降恩召見詢訪才謀褒其舊勲付以疆事如此則與歌鐘錫宴酒食邀歡固不同年而語矣竊見陛下自臨御以来施號發令無非孝理因心屢形於詔勑行已實感於人倫唯在敬慎威儀保全聖徳臣等不敢緘黙輙貢狂言懼不允當伏待刑憲是年冬羣臣入閤既退諌議大夫鄭覃崔郾補闕辛邱度拾遺韋瓘温㑹等廷論得失覃進言曰陛下即位以来宴樂過多畋遊無度今蕃㓂在境緩急奏報不知乗輿所在臣等忝備諌列不勝憂迫伏願稍減逰樂留心政道又竊聞陛下晨夜暱狎倡優近習之徒賞賜過厚凡金銀貨幣皆出於蒼生膏血不可使無功之人濫沾賜與縱内藏有餘亦乞陛下恭守節儉勿容易而􅄆如四方有事得以支用免令有司重歛百姓實天下幸甚帝初訝之顧宰臣蕭俛曰此軰何人俛進曰諌議大夫鄭覃等帝意稍解謂俛等曰朕有過失臣下能犯顔直諌豈非忠也又謂覃等曰允卿所奏宰臣皆蹈舞稱賀既退宰臣復詣延英奏事帝令宣示覃等曰閤中奏事殊不從容今日已後有事湏面論者可於延英請對當與卿等從容講論時久無論諌於内閤者覃等庭諍帝欣然納之中外相賀陶居簡不知何許人長慶三年稱䖏士上䟽請用正直去謟競穆宗甚嘉之竟不尋訪居簡所在李徳裕為浙西觀察使長慶四年七月上表曰臣百生多幸獲遇昌期受寄多藩常懼曠職孜孜夙夜上答國恩數年以来災旱相繼罄竭微慮粗免流亡物力之間尚未完復臣伏見今年三月三日赦文常貢之外不令進獻此則陛下至聖至明細㣲洞炤一恐聚歛之吏成姦一恐凋瘵之人不勝其弊上𢎞儉約之徳下敷憫惻之仁萬國羣甿鼔舞未息又奉五月二十三日明詔令訪茅山真隱将欲師䖏謙守約之道廣務實去華之美雖無人上塞丹詔實率土以偃𤣥風豈止微臣獨懐忭賀况進獻之事臣子常心雖有勑文不許亦合竭力上貢且臣之當道本號富饒近年以来與舊頓異貞元中李錡任觀察使日職兼鹽鐵百姓除随貫出𣙜酒錢外更置官酤兩重納𣙜獲利至厚又訪問當時進奉亦兼用鹽鐵羡餘供獻繁多自後莫及至薛平任觀察使時又奏置𣙜酒上供之外頗有餘財軍用之間實為優足自元和十四年七月初三日勑却停𣙜酤又准元和十五年五月七日赦文諸州羡餘不令送使唯有留使錢五十萬貫每年支用猶欠十三萬貫不足常湏是事節儉百計充填經費之中偶免懸欠至於綾紗等物猶是本州所出易於方圎金銀非當土所有皆湏外市去二月奉宣索盝子計當銀九千四百餘兩其時進奉貯備銀無二三百兩皆是諸處招商收市此時亦稍優饒悉力上供幸免敗闕又奉宣索粧具令先造兩具進来昨所造成兩具以當銀一千三百餘兩並是具廻今年冬至及来年元日常進噐物料内金銀充約計二十具共當銀一萬三千餘兩金一百三十餘兩今續於淮南側近百萬收市旋得旋造星夜就功雖見更求實懼不逮臣若因循不奏則負陛下任使之恩若分外誅求又累陛下慈儉之徳伏乞陛下覽前件𣙜酤及諸州羡餘之目則知臣軍用偏短本末有繇伏願陛下平見臣奏論必賜詳悉知臣竭愛君守事之節盡納忠罄直之心伏乞聖慈宣令宰臣商議何以遣臣得上不違宣索下不闕軍儲不困疲人不歛物怨前後詔勑並可遵承輙冒宸嚴敢陳丹懇臣不勝戰汗隕越之至時制罷竒珍之獻曽未數月徵貢之詔道路相繼故徳裕有是表焉九月又上表曰已縁當道宣索昨已具軍資嵗計及近年物力聞奏伏料聖慈必賜省覽又奉詔更令織定羅紗袍縀及可幅盤絛繚綾等一千匹伏讀詔書倍増煌灼臣伏見太宗朝臺使至涼州見名鷹諷李大亮獻之大亮宻表陳誡太宗賜詔云使遣獻之遂不曲順再三嘉歎載在史官又𤣥宗朝令中使至江南採鵁鶄諸鳥至汴州倪若水抗表上論𤣥宗亦賜詔嘉納鳥即時皆放又令皇甫詢於益州織半臂背子琵琶捍撥鏤牙合子等蘓頲不奉詔書輙自停織太宗𤣥宗皆不加其罪欣納所陳臣竊以鵁鶄鏤牙至於微細若水等尚以勞人損徳瀝欵効忠當聖祖之朝有臣如此豈明主之代獨無其人盖有位者蔽而不言必非陛下拒而不納又伏覩四月二十三日徳音云方詔侯伯有位之士無或棄吾謂不可教其有違道傷理狥欲懐安面刺廷攻無有隱諱則是以陛下納誨從善道光祖宗不盡忠䂓過在臣下况立鵝天馬掬豹盤絛文彩珍竒只合聖躳自服今所織千匹費用至多在臣愚誠亦所未諭昔漢文廢綈弋之衣元帝罷輕絹之服仁徳慈儉至今稱之伏惟陛下近覽太宗𤣥宗之容納逺思漢文孝元之恭已以臣前表宣示羣臣酌臣當道物力所宜更賜節減則海隅蒼生無不受賜臣不勝激切兢惶之至優詔答之許罷進盤絛綾一千匹敬宗寳歴二年徳裕上䟽曰臣聞道之髙者莫若廣成𤣥元人之聖者莫若軒皇孔子昔軒皇問廣成子理身之要可以長久廣成子云無視無聽抱神以静形将自正神必自清無勞子形無揺子精乃可以長生慎守其一以䖏其和故我修身一千二百嵗吾形未嘗衰矣又云得吾道者上為皇而下為王𤣥元語孔子曰去子之驕氣與多慾態色與滛志是皆無益於子之身吾所告子者是已故軒皇發謂天之歎孔子興猶龍之感前聖於道不其至乎伏惟文武大聖廣孝皇帝陛下稽𤣥祖宗之訓修軒皇帝之術凝神閒館物色異人将以覿氷雪之姿屈順風之請恭惟聖感必降真仙若使廣成𤣥元混迹而至語陛下之道授陛下之言以臣度思無出於此臣所慮赴召者必怪誕之士茍合之徒使物淖水以為小術眩耀邪僻蔽欺聰明如文成五利無一可驗臣所以三年之内四奉詔書未敢以一人塞詔實有所懼臣又聞前代帝王雖好方士未有服其藥者故漢書稱黄金成以為飲食噐則益夀又髙宗朝劉道合𤣥宗朝孫甑生皆成黄金二祖竟不敢服豈不以宗廟社稷之重不可輕易此事炳然具載國史以臣微見儻陛下睿慮精求必致真隱唯問保和之術不求餌藥之功縱使必成黄金止可充於玩好則九廟靈鑒必當慰恱寰海兆庶誰不懽心臣輙罄愚𠂻以禆王化輙陳懇欵伏積兢惶獨孤郎為諌議大夫長慶四年十二月淮南節度使王播以錢十萬貫賂遺恩倖求鹽鐵使郎與諌議大夫張仲方起居郎孔敏行桞公權起居舎人宋申錫補闕韋仁實劉敦儒拾遺李景讓薛延老等十人前一日詣延英抗論其事薛延老寳厯初與舒元褒李漢俱為拾遺於閤内諌曰臣伏見近日除授往往不繇中書進擬或是宣出臣恐自此綱紀寖壊姦邪恣行乞聖恩詳察帝厲聲曰更有何事元褒進曰陛下近日修造亦太多帝色變曰何䖏修元褒俛首不能對延老奏曰臣等是諌臣有所聞即合論奏亦豈知陛下修造之所但見船輦瓦木絶多即知修造不已伏乞稍留聖慮帝曰所奏知然後各復位議者以為不廢其職冊府元龜卷五百四十六
