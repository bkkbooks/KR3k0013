body:
  text: 册府元龜卷三百十七宋王欽若等撰宰輔部正直第二唐魏徵為秘書監參預朝政貞觀六年太宗臨朝有誡懼之言中書令温彦慱進曰伏願陛下為政若貞觀之初則無憂不太平矣太宗曰朕其怠乎徵進曰陛下貞觀之初勵精思政從諫如流每因一事觸類而為善志存節儉無所營求比者造作微多諫者頗忤以此為異耳太宗拊掌歡笑曰良有是夫長孫無忌為太尉高宗將立昭儀武氏為皇后無忌屢言不可帝乃宻遣使賜無忌金銀寳器各一車綾錦十車以悦其意昭儀母楊氏復自詣無忌宅屢加祈請時禮部尚書許敬宗又屢申勸請無忌嘗厲色折之帝後又召無忌左僕射于志寧右僕射禇遂良謂曰武昭儀有令徳朕欲立為皇后卿等以為如何無忌曰自貞觀二十三年後先朝付託遂良望陛下問其可否帝竟不從無忌等言而立昭儀為皇后皇后以無忌先受重賞而不助己心甚銜之郝處俊為中書令高宗欲下詔令天后攝知國政與宰相議之處俊曰臣聞禮經云天子理陽道后理隂徳外内和順國家以理然則帝之與后猶日之與月陽之與隂各有所主不相奪也若失其序上則謫見于天下則禍成于人昔魏文帝著令雖有少主尚不許皇后臨朝所以追鍳成敗杜其萌也况天下者高祖太宗之天下陛下正合謹守宗廟傳之子孫誠不可持國與人有私於后且曠古以來未有此事伏乞特垂詳審中書侍郎李義琰為申處俊所引經典其言至忠惟聖慮無疑則蒼生幸甚由是遂止李義琰為中書侍郎同中書門下三品義琰博學多識典故高宗每有顧問言多切直劉仁軌則天初為左僕射同中書門下三品專知留守事上䟽辭以衰老請罷居守之任因陳吕氏禍敗之事以申規諫則天使武承嗣齎璽書徃京慰諭之曰今以皇帝諒闇不言𦕈身且代親政逺勞勸誡復辭衰疾怪望既多廻遑失㨿又云吕后見嗤于後代禄産貽禍于漢朝引喻良深愧慰交集公忠貞之操終始不渝勁直之風古今罕此初聞此語能不罔然静而思之是為龜鏡且端揆之任儀刑百辟况公先朝舊德遐邇具瞻願以禆救為懐無以暮年致請尋進封郡公岑長倩則天時為文昌右相天授初鳳閣舍人張嘉福與王慶之等表請立魏王武承嗣為皇太子長倩以皇嗣在東宫不可更立承嗣乃與納言歐陽通奏請切責上書者告示令散繇是大忤諸武意被斥令西征吐蕃李昭徳為内史延載初鳳閣舍人張嘉福令雒陽人王慶之率輕薄惡少數百人詣闕上表請立武承嗣為皇太子則天不許慶之固請不已則天令昭徳詰責之令散昭徳使杖殺慶之餘衆乃息昭徳因奏曰臣聞文武之道布在方䇿豈有已為天子而為姑立廟乎以親親言之則天皇是陛下夫也皇嗣是陛下子也陛下正合傳之子孫為萬代計况陛下承天皇顧託而有天下若立承嗣臣恐天皇不血食矣則天悟之乃止時朝廷䛕佞者多獲進用故幸恩者事無大小但近諂䛕皆獲進見有人於雒水中獲白石數㸃赤詣闕輙進諸宰相詰之對云此石赤心所以來進昭徳叱之曰此石赤心洛水中餘石豈能盡反耶左右皆笑格輔元為地官尚書同鳳閣鸞臺平章事張嘉福等請立武承嗣為皇太子上以問輔元固稱不可遂為承嗣所譛故及于禍周允元為鳯閣侍郎同鳯閣鸞臺平章事允元嘗與諸宰臣侍宴則天令各述詩書中善言允元曰恥其君不如堯舜武三思以為語有指斥糾而駮之則天曰聞此言足以自誡豈得將為過也耶王及善為内史雖無學術在官每以清正見知臨事難奪有大臣之節杜景佺為鳯閣侍郎同鳯閣鸞臺平章事則天嘗以季秋月内出梨花一枝示宰臣曰是何祥也諸宰臣曰陛下德及草木故能秋木再花雖周文德及行葦無以過也景佺獨曰謹按洪範五行傳隂陽不相奪倫瀆之即為災乂春秋傳云冬無愆陽夏無伏隂春無凄風秋無苦雨今已秋矣草木黄落而忽生此花瀆隂陽也臣恐陛下布教施令有虧典禮乂臣等忝為宰臣助天理物理而不和臣之罪也于是再拜謝罪則天曰卿真宰相朱敬則為鳳閣鸞臺平章事時御史大夫魏元忠為張易之兄弟所謗將陷重辟當時宰相無敢言者敬則獨抗䟽理之頗得明白麟臺監張昌宗廣集當時學者删補文思博要撰為三教珠英又命畵工圖冩梁王武三思納言李嶠麟臺少監王紹宗等十八人形像號為高士圖每引敬則預其事固辭不就其高潔守正如此魏元忠為鳳閣侍郎同鳳閣鸞臺平章事中宗在春坊元忠檢校太子左庻子時張易之昌宗權寵日盛傾朝附之元忠嘗言於則天曰臣承先帝顧命受陛下厚恩不狥忠死節使小人得在君側臣之罪也則天不悦易之昌宗繇是含怒姚元崇為宰相長安四年張易之先請移京城大徳僧十人配定州私置寺僧等告訴元崇斷停易之屢以為言崇不納繇是改授司僕卿知政事如故便充靈武道大總管開元初為紫微令時左丞相劉幽求有女出適諷所司舉舊例賜物元崇奏曰自神龍以來或有承恩宰相男女婚禮皆得賜物事出一時不合著例此後望停從之袁恕已以中宗神龍初為中書侍郎同中書門下三品時將作大匠楊務亷素以工巧見用中興初恕已恐其更啟游娯侈靡之端言于帝曰務亷致位九卿積有年嵗讜言嘉謀無足可紀每宫室營搆必務其侈若不斥之何以廣昭聖徳由是授務亷陵州刺史蘇瓌以景龍二年拜侍中充西京留守時秘書監鄭普思謀為妖逆瓌考訊之普思妻第五氏以鬼道為韋庶人所重嘗居止禁中帝特勅諭令釋普思之罪瓌上言普思幻惑罪當不赦俄而駕還京師瓌又面陳其狀尚書左僕射魏元忠曰蘇瓌長者其忠懇如此願陛下察之帝遂流普思於嶺外三年拜尚書右僕射同中書門下三品明年將親祠南郊國子祭酒祝欽明希􅅊庶人㫖建議請皇后助祭安樂公主終獻瓌深非其議嘗于御前面折欽明帝不悟竟從欽明所奏時公卿大臣初拜官者例許獻食名為燒尾瓌拜僕射無所獻後因侍宴將作大匠宗晉卿謂瓌曰拜僕射竟不燒尾豈不喜耶帝黙然瓌奏曰臣聞宰相者主調陰陽助天理物今粒食踊貴百姓不足臣見宿衞兵至有二日不得食者愚不稱職罪正在臣是以不敢燒尾陸象先𤣥宗先天初為中書侍郎平章事太平公主用事同時宰相蕭至忠岑羲崔湜等咸傾附之唯象先孤立未嘗造謁至忠等伏誅象先獨免其難以保䕶功封兖國公賜實封三百户加銀青光禄大夫盧懐慎開元初為黄門監薛王業之舅王仙童侵暴百姓憲司按罪以聞業奏求免詔下紫微黄門重按覆懐慎與紫微令姚崇等奏曰仙童倚恃王親欺奪百姓事狀明白人人共知御史推尋實知枉濫御史若不堪信他人何必可依如更動揺恐招物議望准前狀從之宋璟以開元四年與蘇頲同為宰相時特進王毛伸奏看鷹人歙州别駕員外置同正員羅元譲看鷹勤勞請優與進改𤣥宗許之付中書門下璟頲執奏曰鷹鳥之屬畋游所用陛下曾于苑囿之内鞲紲總捐以後或存而不論未能全斷今縱備物致用不可絶無則命録勤勞不宜如此帝曰朕在藩日先有欵誠時供驅使亦不録鷹鳥璟等曰若别縁課効誠合遷除乃奏擬右驍衛翊府右郎將員外郎同正員帝曰卿之改擬深為折𠂻韓休以開元二十一年拜黄門侍郎同平章事休性方正有萬年尉李美玉得罪帝特令流于嶺外休進曰美玉卑位所犯又非巨害今朝廷有大姦尚不能去豈得捨大而取小也臣切見金吾大將軍程伯獻依恃恩寵所在貪冐第宅輿馬僣擬過甚臣請先出伯獻而後罪美玉帝初不許之休固争曰美玉微細尚不容伯獻巨猾豈得無罪陛下若不出獻臣即不敢奉詔流美玉帝以其切直竟從之宋璟聞之曰不謂韓休乃能如此是仁者之勇也裴冕為僕射平章事時李輔國驕恣日甚求為宰臣肅宗曰以公勲力何官不可但未知朝望如何輔國諷冕聨章薦已帝宻語宰相蕭華曰輔國欲𢃄平章事卿等欲有章薦信乎華問裴冕冕曰初無此事吾臂可截宰相不可得也華復入奏帝喜曰冕固堪大用輔國深衘之李峴肅宗朝為吏部尚書同平章事與吕諲李揆第五琦同拜相峴位望稍高軍國大事諸公莫敢言皆獨决于峴由是諲揆衘之初李輔國判行軍司馬潜令官軍于民間聼案是非謂之察事忠良徃徃枉被誣搆復有追呼諸司莫敢抗拒御史臺大理有重囚在獄推斷未了有牒追就銀臺不問輕重一時釋放莫有輙敢違者每日於銀臺門决天下事須處分便稱制勅禁中符印悉佩之出入縱有勅輔國押署然後施行及峴為相叩頭論輔國專權亂國帝悟之賞峴正直事並變革輔國以此讓行軍司馬請歸本官察事等並停繇是深怨峴又鳳翔七馬坊押官先為盗刼掠平人州縣不能制天興縣令知捕賊謝夷甫擒獲决殺之其妻進狀訴夫寃輔國先為飛龍廄使黨其人為之上訴詔監察御史孫鎣推之鎣初直其事其妻又訴詔令御史中丞崔伯陽刑部侍郎李曄大理卿權獻三司訊之三司與鎣同妻又上言詔令侍御史毛若虚覆之若虚歸罪于夷甫又言伯陽等有情不能質定刑獄伯陽怒使人召若虚詞氣不順伯陽欲上言之若虚先馳謁告急于帝帝云已知卿出去若虚奏帝曰臣出即死帝因留在簾内有頃伯陽至帝問之伯陽頗言若虚順㫖附㑹中人帝怒叱出之伯陽貶端州高要尉權獻彬州桂陽尉鳯翔尹嚴向及李曄皆貶嶺下一尉鎣除名長流潘州峴以數人非其罪責重欲理之遂奏毛若虚希㫖用刑不守國法陛下若信之重輕是無御史臺帝怒峴言出峴為蜀州刺史時右散騎常侍韓擇木入對帝謂之曰李峴欲專權耶何乃云任毛若虚是無御史臺也今貶蜀州刺史朕自覺用法寛擇木對曰李峴言直非專權陛下寛之只益聖德耳代宗朝復拜黄門侍郎平章事故事宰臣不於政事堂邀客時海内多務宰相元載等見中官宣傳恩詔至中書者引之政事堂上仍置榻坐焉峴屏左右去所置榻言詞頗正蕭復字履初德宗建中四年拜吏部尚書平章事嘗奏言宦官為監軍豈可參軍機政事之間徳宗不悦又請别對奏云陛下自用楊炎盧杞相次秉政以致今日之事因述君臣獻替大端今雖危急伏願陛下革慮臣方敢當任若令臣依阿偷免臣不敢曠職時盧杞或對帝前奏議阿䛕順㫖復正色曰盧杞之詞不正帝愕然大驚謂左右曰蕭復頗輕朕遂令徃江淮山南湖南道宣慰安撫興元元年改門下侍郎平章事充宣撫使先時淮南節度陳少游首稱臣於李希烈鳳翔將李楚琳殺節度使張鎰以應朱泚鎰判官韋臯先知隴州留後首殺豳隴叛卒數百人不應李楚琳復使逥與諸宰相同對訖復獨留奏曰陛下自還宫闕勲臣已蒙官爵唯旌善懲惡未有區分陳少游將相之寄最崇首敗臣節韋臯名宦最卑特建忠義請令韋臯代少游則天下明然知逆順之理帝許之復出諸相李勉盧翰劉從一方同歸中書中使馬欽緒續至揖從一耳語而退諸相各歸閣從一詣復曰適欽緒宣㫖令與公商量朝來所奏便進勿令李勉盧翰知復曰適來奏對亦聞勅㫖然未喻聖心已面陳述上意尚爾復未敢言其事復又曰唐虞有僉曰之論朝廷有事尚合與公卿同議今勉翰不可在相位即去之既在相位合同商量何故獨避此之一節且與公行之無爽但恐寖以成俗此政之大弊也竟不以所奏事言于從一從一奏之帝寖不悦復累上表辭疾請罪罷官詔乃許之時興元元年十月也乆之以親累貶檢校左庻子饒州安置至是終年五十七復性孝友居家雍睦及登台輔臨事不茍頗為同列所嫉以故不乆居位焉李勉建中末為司徒平章事無何盧杞自新州員外司馬除澧州刺史給事中裴高以杞邪佞蠧政貶未塞責停詔執奏遂授澧州别駕他日德宗謂勉曰衆言盧杞姦邪豈有此乎曰天下皆知奸邪而陛下不知則杞善為奸邪矣時人多云正直然自是見踈貞元二年以開州别駕白志貞為果州刺史勉及諌官等以志貞罪均盧杞不宜收擢固執之不許凡踰旬方下其詔桞渾貞元三年為兵部侍郎平章事先是韓滉自浙西入覲帝虚已待之至于調兵食籠鹽鐵勾官吏贓罰鉏豪强兼并帝委仗焉毎奏事或至日旰他相充位而已公卿救過不暇無敢枝梧者滉于省中榜吏至死渾雖滉所引心惡其專政正色謂之曰先相公狷察臣欽若等曰韓滉父休開元中為相為相不經年而罷今相公榜吏于省中至死况省闥非刑人地相公奈何蹈前非行于今朝專立威福豈尊主卑臣之義也滉感悟愧悔為霽威焉及白志貞除浙西觀察使渾奏曰志貞末吏憸人縱稱亷謹不當頓居重職臣死而後已不敢奉詔適遇渾以疾告歸即日遂下其詔渾疾間因上表乞骸骨優詔不許渾與張延賞同列延賞怙權矜已而疾渾守正俾其所厚謂渾曰相公舊徳但節言于廟堂則重位可久荅曰為吾謝張相公桞渾頭可斷舌不可禁也自是竟為延賞所擠尋除右散騎常侍罷知政事陸贄貞元中為相時裴延齡判度支天下皆嫉怨而獨幸于徳宗朝廷無敢言其短長者贄獨身當之毎于延英極論其誕妄不可令掌財賦徳宗以為排擯待延齡益厚贄上書䟽其失曰前嵗秋首班宏䘮亡特詔延齡繼司邦賦數月之内遽衒功能奏稱勾獲隠欺計錢二千萬貫請貯别庫以為羡餘供御所須永無匱乏陛下欣然信納因謂委任得人既頼盈餘之財稍𢎞心意之欲興作浸廣宣索漸多延齡務實前言且希睿㫖不敢告闕不敢辭難勾獲既是虚言無以應命供辨皆承嚴約茍在及期遂乃搜求市􅌀豪奪入獻追捕夫匠廹脅就功以敕索為名而不酬其直以和雇為稱而不償其傭都城之中列肆為之晝閉興役之所百工比于幽囚聚詛連羣遮訴盈路持綱者莫敢致詰廵察者莫敢為言時有詰而言之翻謂黨邪醜直天子轂下囂聲沸騰四方觀瞻何所取則傷心于上歛怨于人欺天䧟君逺近危懼此其罪之大者也總制邦用度支是司出納貨財大府攸職凡是大府出納皆禀度支文符大府依符以奉行度支慿案以勘覆互相關鍵用絶奸欺其出納之數則每旬申聞見在之數則每月計奏皆經度支勾覆又有御史監臨旬旬相承月月相繼明若指掌端如貫珠財貨多少無容隠漏延齡務行邪諂公肆詆欺遂奏云左藏庫司多有失落近因檢閲使置簿書乃于糞土之中收得銀十三萬兩其匹叚雜貨又百萬有餘皆是文賑脫遺並同已棄之物今所收獲即是羨餘悉合移入雜庫以供别勅支用者其時特宣進㫖並宜所奏施行大府卿韋少華抗䟽上陳殊不引伏確稱每月申奏皆在見在數中請令推尋足驗奸詐兩司既有論執理須詳辨是非陛下縱有罔欺不加案問以在庫之物為收獲之功以常賦之財為羨餘之費罔上無畏視人不慚此又罪之大者也國家府庫出納有常延齡險猾售奸詭譎求媚遂于左藏之肉分建六庫之名意在别貯嬴餘以奉人主私欲曾不知王者之體天下為家國不足則資之于人人有餘則輸之于國在國為官物在人為私財何謂嬴餘須别收貯是必巧詐以變化官物暴法以刻剥私財捨此二途其將安取陛下方在崇信不加檢裁姑務保持曽無詰責延齡謂能蔽惑不復懼畏奸威既沮于四方險態復行于内府繇是蹂躪官屬傾倒貨財移東就西便為課績取此適彼遂號羨餘愚弄朝廷有同兒戯夫理天下以義為本以利為未以人為本以財為末本盛則其末自舉末大則其本必傾自古及今徳義立而利用不豐人庻安而財貨不給因以䘮邦失位者未之有也故曰不患寡而患不均不患貧而患不安有徳此有人有人此有土有土此有財百姓足君孰與不足蓋謂此也自古及今徳義不立而利用克豐人庻不安而財貨可保因以興邦富位者未之有也故曰財散則人聚財聚則人散與其有聚歛之臣寜有盗臣無令侵削兆人為天子取怨于下也且陛下初膺寳歴志剪羣兇師旅繁興徵求寖廣𣙜算侵剥下無聊生是以涇原叛徒乘人咨怨白晝犯闕都邑甿庻恬然不驚反與賊衆相從比肩而入宫殿雖蚩蚩之性靡所不為然亦繇徳澤未洽于人而暴令驅之以至于是也于時内府之積尚如丘山竟資凶渠以餌貪卒此則陛下躬覩之矣是乃失人而聚貨夫何利之有焉車駕既幸奉天逆泚旋回圍逼一壘之内萬衆所屯窘如涸流庻物空匱嘗欲發一徤歩出覘賊軍其人懇以苦寒為辭跪奏乞一襦袴陛下為之求覔不致竟閔然而遣之又嘗宫壼之中服用有闕聖㫖方以戎事為急不忍重煩于人乃剥親王飾𢃄之金賣以給值是時行從將吏赴難師徒倉皇奔馳咸未冬服漸屬凝沍且無薪蒸饑凍内攻矢石外廹晝則荷戈奮􅌺夜則映堞呻吟凌風飊冐霜霰踰四旬而衆無携貳卒能走強賊全危城者陛下豈有嚴刑重賞使之然也唯不厚其身不藏其貨與衆庻同其憂患與士伍共其有無乃能使人捐軀命而扞冦讎餒之不離凍之不憾臨危而不易其守見死而不去其君所謂聖人感人心而天下和平此其效也及乎重圍既觧諸路稍通賦税漸臻貢獻繼至乃扵行宫外廡之下别置瓊林大盈之司未賞功勞遽私賄玩甚沮維新之望頗携死義之心于是輿誦興譏而軍士始怨矣財聚人散不誠然乎旋屬蟊賊内訌翠華南狩奉天所積財貨悉復殱于亂軍既遷岷梁日不暇給獨慿大順遂復皇都是知天子者以得人為資以畜義為富人茍歸附何患蔑資義茍修崇何憂不富豈在貯之内府方為己有哉故藏于天下者天子之富也藏于境内者諸侯之富也藏于囷倉篋櫝者農夫商賈之富也奈何以天子之貴海内之富而猥行諸侯之弃徳守農商之鄙業也哉陛下若謂厚取可以恢武功則建中之取既無成矣若謂多積可以為己有則建中之積又不在矣若謂狥欲不足傷理化則建中之失傷已甚矣若謂歛怨不足致危亡則建中之亂危亦至矣然而遽能靖滔天之禍成中興之功者良以陛下有側身修勵之志有罪已悔懼之詞罷息誅求敦尚節儉渙發大號與人更新故靈祗感陛下之誠臣庻感陛下之意釋憾廻慮化危為安陛下亦當為宗廟社稷立不傾不㧞之永圖為子孫黎元立可大可久之休業懲前事狥欲之失復日新盛徳之言豈宜更縱險邪復行冦暴事之追悔豈可再乎臣又竊慮陛下納彼盜言墮其奸計以為搏噬拏攫怨集有司積聚豐盈利歸君上是又大謬所宜慎思夫人主昏明繫于所任臯陶稷契之道長而虞舜享濬哲之名皇甫棸楀之嬖行而周厲嬰顛覆之禍自古何嘗有小人柄用而灾患不及于邦家者乎譬猶操兵以刅人天下不委罪于兵而委罪于所操之主畜蠱以殃物天下不歸咎于蠱而歸咎于所畜之家理有必然不可不察臣伏慮陛下以延齡之進獨出宸衷以延齡之言多順聖意若以罪置辟則似為衆所擠故欲保持用彰堅斷若然者陛下與人終始之意則善矣其于改過勿吝去邪勿疑之道或未盡善今希㫖順黙浸以成風奨之使言猶懼不既若又沮抑誰當貢誠或恐未亮斯言請以一事為証只如延齡凶妄流布寰區上自公卿近臣下迨輿臺賤品宣談論議億萬為徒能以上言其人有幾陛下試令親信博採輿詞參校比來所聞足鍳人間情偽臣以卑鄙位當台衡既極崇高又承渥澤豈不知觀時附㑹足保舊恩隨衆沉浮免貽厚責謝病出退獲知幾之名黨奸茍容無見嫉之患何急自苦獨當豺狼上違懽情下餌䜛口良以内顧庸昧一無所堪夙蒙眷知唯以誠直綢繆帷扆一紀于兹聖慈既以此見容愚臣亦以此自負况從陛下歴播遷之臲􅑶覩陛下致興復之艱難至今追思猶為心悸所以畏覆車而駭慮懼燬室而悲鳴蓋情激于衷雖欲罷而不能自黙因事陳諌雖已頻煩天聼尚高未垂諒察輙伸悃欵已極愚誠憂深故語煩意懇故文切以微臣自固之謀則過于陛下慮患之計甚周糜軀奉君所不敢避沽名􅃷直亦不忍為願廻睿聰為國熟慮社稷是頼豈唯微臣書奏徳宗不悦待延齡益厚竇參為中書侍郎同平章事黜禮部侍郎令狐偃為衡州司馬初李泌為相以偃為左庻子史館修撰至則與同職孔述睿等争競細碎數侵述睿述睿長者讓不與争泌卒參惡其為人黜之鄭珣瑜貞元末為相時李實以恩幸為京兆尹剥下以進奉珣瑜乃責實狀以為留守錢皆有定額有餘即當還度支進奉錢乃出何色使實上其對將罷黜之實有恩故終不行及順帝初即位王叔文用事韋執誼因之為相時珣瑜方與諸宰相㑹食于中書故事丞相方食百寮無敢通見叔文是日至中書欲與執誼計事令直省通執誼直省以舊事告叔文怒叱直省懼入白執誼執誼逡廵慚赧竟起迎叔文就其閣語良乆宰相杜佑高郢珣瑜皆停筯以待有報者云叔文索飯韋公亦與之同食閣中矣佑郢等心知不可畏懼叔文執誼不敢出言珣瑜獨嘆曰吾豈可復處此乎顧左右取馬徑歸遂不起裴度元和末為門下侍郎同中書門下平章事時五坊使楊朝汶以賈人久負息利錢取其私簿記遂逮捕故東川節度盧坦男令償之後知乃盧羣筆記諫官上䟽陳其暴蠧之狀度與崔羣因對又極言之憲宗曰且欲與卿等商量東軍此小事我自處置度進曰用兵小事也五坊使追捕平人大事也今兵事不理祇憂山東五坊使横暴恐亂輦轂帝不悦及對罷帝乃大悟召五坊使數之曰嚮者為爾使吾羞見宰臣遂殺之即日原免坐繫者時户部侍郎判度支皇甫鎛與鹽鐵使程异同日平章事鎛雖有吏才素無公望特以聚歛媚上刻削希恩詔書既下物情駭異至于賈販無識亦相譏誚度與崔羣以物議上聞憲宗怒而不聴度上䟽乞罷知政事論之曰臣昨于延英陳乞伏奉聖㫖未遂愚𠂻切以明王聖帝致理興化雖繇元首亦在股肱所以述堯舜之道則言稷契臯䕫紀太宗𤣥宗之徳則言房杜姚宋自古至今未有不任輔弼而能獨理今天下異于十年已前方馭駕文武廓清冦亂建昇平之業十已得八九然華夏安否係于朝廷輕重在于宰相如臣駑鈍夙夜戰兢常以為上有聖君下無賢臣不能增日月之明廣天地之徳遂使每事皆勞聖心所以平賊安人費力如此實繇臣軰不稱所職方期陛下博採物議旁求人望致之於輔弼責之以化成而乃忽取微人列于重地始則殿庭班列相與驚駭旋則街衢市肆相與笑呼伏計逺近流聞與京師無異何者天子如堂宰臣如陛陛高則堂高陛卑則堂不得高矣宰臣失人則天子不得尊矣伏以陛下叡哲文明惟天所授凡所閱視洞達無遺所以比來選任宰相縱道不周物才不濟時公望所歸皆有可取况皇甫鎛自掌財賦唯事割剥以苛為察以刻為明自京兆西城鎮及百司并逺近州府應是仰給度支之處無不苦口切齒願食其肉猶賴臣等每加勤誡或為奏論事事之中抑令通濟比者淮西諸軍糧料所破五濟錢其實只與一成兩成士卒怨怒皆欲離叛臣到行營方且慰諭慮其遷延不進供軍漸難但能前行必有優賞以此約定然後切勒供軍官且支九月一日兩成已上錢但各努力方將小安不然必有潰散今舊兵悉向淄青討伐忽聞此人入相則必相與驚憂以為更有前時之事則無告訴之處雖侵刻不少然漏落亦多所以罷兵之後經費錢一千三十萬貫此事猶可直以性情狡詐言不誠實朝三暮四天下共知唯能上惑聖聽足見姦邪之極程异雖人品凡俗然心事和平處之煩劇或亦得力但昇之相位使在公卿之上實亦非冝如皇甫鎛天下之人怨入骨髓陛下今日收為股肱列在台鼎交怨不可伏惟圖之倘陛下納臣懇欵速賜移易以副天下之望則天下幸甚伏聞李修疾病亦求入來如浙西觀察使日與亦得臣知言一出口必犯天威但使言行甘心獲戾今者臣若不退天下之人謂臣不識亷恥臣若不言天下之人謂臣有負恩寵今退未許言又不聽如火燒心若箭攅體臣自無措陛下今日事勢何者淮西盪定河北底寧承宗歛手削地程權束身赴闕韓𢎞輿疾討賊此豈京師氣力能制其命袛是朝廷處置能服其心今既繼開中興再造區夏陛下何忍却自破除使億萬之衆離心四方諸侯觧體凡百君子皆欲慟哭况陛下任臣之意豈比常人臣事陛下之心敢同衆士所以昧死重封以聞如不足觀臣當引領受責陛下引一市肆商徒與臣同列在臣亦有何損陛下實有所傷不勝憤懣惶恐之至時憲宗以世道漸平欲肆意娱樂池亭館宇稍增崇餙而异鎛探知帝㫖數貢羨餘以備經搆故帝獨排物議相之見裴度疏以為朋黨竟不省覽長慶中除淮南節度使平章事如故度將赴鎮昭義奏軍亂欲殺監軍劉承階劉悟救免穆宗臨軒以問度度曰臣外藩也名帶宰相不可與聞政事帝曰第言之宰相豈有中外耶對曰承階怙寵亂軍臣實知之陛下必欲收忠義之心獨斬承階可也帝曰我何愛焉太后以為己子今囚拘而太后不之知也更言其次度曰逺竄之竟如度計昭義遂安繇是復拜司空兼門下侍郎平章事李絳為中書侍郎平章事同列李吉甫便辟喜逢迎君意絳鯁直多所規諫故與吉甫大不同時議以吉甫通于吐突承璀故絳尤惡之憲宗察絳忠直自立故絳論奏多所允從元和七年五月憲宗謂宰臣曰比者見卿累言吴越去歳水旱昨有御史推轂至自江淮乃言不至為灾人非甚困不知竟有此否絳對曰臣昨見浙西浙東及淮南奏狀並云本道水旱稻麥不登至有百姓逐熟多去鄉井各請設法招携意懼朝廷罪責茍非事實豈敢上陳况天灾流行年歳代有方隅授任皆朝廷信重之臣此固非虚說也御史官軰選擇非必能賢奏報之間或容希媚此正當姦佞之臣近有兩軍御史至淮南推鞫今理當詰遂不知言者主名伏望明示典法况推誠之道君人大本任大臣以事不可以小臣之言間之帝曰卿言是也朝廷大體以恤人為本茍一方不稔當即日賑救濟其饑寒不可疑之也何者不思而有此問朕之言過矣絳等稽首陳賀於是命自今凡有被饑饉之境速蠲其賦裴垍為相諫官言時政得失舊事操權者多不悅其舉職垍在中書有獨孤郁李正辭嚴休復自拾遺轉補闕及參謝之際垍廷詰之曰獨孤與李補闕孜孜獻納今之遷轉可謂酬勞無愧矣嚴補闕官業或異於斯昨者進擬不無疑緩休復悚恧而退楊於陵為嶺南節度使與監軍許遂振不和遂振誣奏於陵憲宗令追與慢官垍曰以遂振故罪一藩臣不可請授吏部侍郎權徳輿與李藩同在相位時河南節度使王鍔來朝貴幸多譽鍔者憲宗特加平章事李藩堅執以為不可徳輿繼奏曰夫平章事非序進而得國朝方鎮帶相者葢有大忠大勲大歴以來又有䟦扈難制者不得已而與之今王鍔無大忠勲又非姑息之時欲假此名實恐不可帝從之鄭餘慶為相時有主書滑涣乆司中書簿籍與内官典樞密劉光琦情通宰相議事為光琦異同者令渙達意未嘗不遂所欲宰相杜佑鄭絪皆姑息之議者云佑私呼為滑八四方書幣貲貨充集其門弟泳官至刺史及餘慶冄入中書與同寮集議渙指陳是非餘慶怒其僣叱之尋而餘慶罷相為太子賔客其後渙贓汚發賜死憲宗寖聞餘慶叱渙事甚重之乃改為國子祭酒武元衡以元和八年為門下侍郎平章事時宰相李吉甫李絳互以事理曲直于憲宗前元衡居中無所違附帝稱為長者崔羣以元和十二年拜中書侍郎平章事屬皇甫鎛陰結權幸以求宰相羣累上疏因奏對面論鎛奸邪遂語及天寳開元中事羣對曰安危在出令存亡係所任𤣥宗用姚崇宋璟張九齡韓休李元紘杜暹則理用李林甫楊國忠則亂人皆以天寳十五年祿山自范陽起兵是理亂分時臣以為開元二十年罷賢相張九齡專任奸臣李林甫理亂自此已分矣用人得失所係非小詞意激切左右為之感動韋貫之元和中為相嚴身律下以清流品為先故門無雜賔有張宿者利口得幸於憲宗擢為左補闕將使淄青宰臣裴度欲為請章服貫之曰小人以他門獲進吾軰未能排抑豈可假其恩寵耶所議遂寢宿深銜之卒為所搆誣以朋黨罷為吏部侍郎不渉旬出為湖南觀察使蕭俛穆宗時以清直居相位嘗有詔令撰王承宗先父事具碑文俛上言以承宗當元和時不盡臣節臣實不忍溢言其美又撰述後例有貺遺若臣公然阻絶違陛下撫納之宜受此貨財非微臣平生之志竟不受詔時人益服其清節會王播以交通權幸自西州入求大用俛於帝前論事以鯁言不勝免侻家代有忠節祖父國初宋國公瑀肅宗徐國公華徳宗門下侍郎平章事復悉以剛鯁不附邪倖載名國史至俛之入相正當澆末囂競之俗可謂冠彼當時嫓美于前代名臣矣韋處厚文宗初為中書侍郎同中書門下平章事太和元年十月丙申勅池州司馬勒留堂頭湯銖宜赴任銖為中書小胥其所掌謂之孔目房宰相遇休假有内狀出即召銖至延英門付之然後送知印宰相繇此稍以機權自張廣納財賄處厚初入相即惡之戲謂之曰此是半装滑渙矣不去之必為禍至是以事逐之半装乃俚言也滑渙者永貞末居銖之職得罪鄭覃與李石同在相位太和九年京師之亂既平内官或以南司不利于中貴憾于相廷者覃石謂之曰京師之亂始自訓注訓注之起始自何人内官莫能對人情稍頼以安陳夷行為工部侍郎平章事開成四年閏正月文宗内殿議政楊嗣復曰前嘉州刺史王正謩縁是李晟外孫與上佐以其孝行不全今欲貶夷行曰正謩之事假使李晟有之身不可免魏謩以宣宗大中十年拜門下侍郎平章事謩儀容魁偉言論切直與同列上前言事他宰相必委曲規諷惟謩讜言無所畏避宣宗每曰魏謩綽有祖風名公子孫我心更重之然竟以語辭太剛為令狐綯所忌罷之􅅊昭度昭宗朝為宰相初王行瑜䟦扈朝廷欲加尚書令昭度力止曰太宗文皇帝以此官總政而登大位後郭子儀以累朝立功雖有其名終身退譲今行瑜安可輕授因請加尚父乾寧二年為行瑜所憾被誅時人寃之孔緯為相家尚節義挺然不屈雖權勢薰灼未嘗假以恩禮大順初天武都頭李順節恃恩頗横不期年領浙西節度使俄加平章事謝日臺吏申中書稱天武相公衙謝准例班見百寮緯判曰不用立班順節麄暴小人不閑朝法盛飾趨中書既見無班心甚怏怏他日因會順節㣲言之緯曰必知公慊也夫百辟卿士天子廷臣也比來班見宰相以輔臣居班列之首奉長之義也公握天武健兒而於政事㕔受百寮見意自安乎若須此儀俟去都頭二字可也順節不敢復言秉禮不廻多此類也時楊復㳟為樞密使尤恃權勢緯為南郊大禮使昭宗將升壇復㳟具禮服冠劍以從緯矯宣遽命焚去覩者股慄復恭竟不能傾之御史臺嘗欲移門屋以狀白中書緯批曰仍舊貫如之何何必改作播遷之後朱全忠併作數鎮兵刃强盛乗朝廷多故欲表請判鹽鐵事詔下宰臣議之緯力爭不從謂其邸吏曰朱公若取鹽鐵印非興兵不可全忠尋止後唐李愚為中書侍郎平章事長興末秦王恣横權要之臣避禍不暇邦之存亡無敢言者愚性剛介往往形于言任圜為平章事初豆盧革韋説得罪執政議命相樞密使孔脩意不欲河朔人居相位圜欲相李琪而鄭珏素與琪不恊孔脩亦惡琪謂安重誨曰李琪非無執學但不亷耳朝論莫若崔恊重誨然之因奏擇相明宗曰誰可乃以恊對圜奏曰重誨被人欺賣如崔恊者少識文字時人謂之没字碑臣比不知書無才而進已為天下笑何容中書之内更益笑端安重誨為樞宻使明宗天成四年二月車駕在汴帝謂重誨曰外邊人聞朕歸京雒去者如市兼令差船載官人及隨行諸物極是重滯重誨曰收復定州大駕歸闕人情胥恱競赴京師乃知海内無事却是官人漸多並前嵗已増其半帝㣲有愧色漢楊邠隠帝初以輔立功為中書侍郎兼吏部尚書同平章事以樞宻院直學士刑部侍郎王度為考功郎中近例直樞院自正郎為給諫王度憸巧凟貨邠頗惡之故改轉未離郎署蘇逄吉為司空平章事周太祖之鎮鄴也逄吉奏請落樞宻使隠帝曰有前例否逄吉奏曰樞宻之任方鎮帶之非便史𢎞肇曰兼樞宻所冀諸軍禀畏竟從𢎞肇之議𢎞肇怨逄吉之異已逄吉曰此國家之事也且以内制外則順以外制内豈得便耶事雖不從物議多之册府元龜卷三百一十七
