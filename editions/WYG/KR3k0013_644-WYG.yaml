body:
  text: 册府元龜卷六百四十四宋王欽若等撰貢舉部考試第二唐徳宗貞元元年九月乙巳御宣政殿䇿賢良方正能直言極諫等三科舉人皇帝若曰蓋聞上古至道之君垂拱無為以臨海内不理而人化不勞而事成星辰軌道風雨時若邈乎其不可繼何施而臻此歟三代以來制作滋廣異文質之變明利害之嚮威之以刑道之以禮敦其俗而彌薄防其人而益踰豈澆醨必繫於時邪何聖賢間生而莫之振也朕祗膺累聖之業猥居兆人之上䖍恭求厲如恐失墜憂濟庶務夕惕晨興唯求前王之典謀朕乃是憲是則師大禹以崇儉法高宗以求賢興夏啟之征作周文之罰旌孝悌舉直言養高年敦本業平均徭税黜陟幽明勵精孜孜勤亦至矣然而浮靡不革理化不行暴亂不懲姦犯不息五敎猶欎七臣未臻鄉黨廢尚齒之儀蒸黎無安土之志賦入日減而私室愈貧廉察月増而吏道愈濫意者朕不明歟何古今之事同而得失之效異也思欲剗革前弊創立新規施之於事而易從考之於文而有據備陳本末將舉而行無或憚煩略於條對自頃隂陽舛候䘲沴薦興仍嵗旱蝗稼穡不稔上天作孽必有由然屢降㓙災其咎安在傳曰時之不乂厥罰𤾉又曰堯湯水旱數之常也二者􅆾反其誰云從今人靡蓋藏國無廪積朕屢延卿士詢訪謀猷至乃减冗食之徒罷不急之務既開嘉話亦已遵行而停廢之餘所費猶廣俟轉輸於江徼則逺不及期將捜粟於闗中則擾而無獲節軍食則功臣懐怨省吏員則多士靡歸中心浩然罔知攸濟子大夫藴蓄材噐通明古今副我虚求森然就列禆朕之寡昧拯時之艱災畢志直書無所隐十月甲子授賢良方正能直言極諫韋執誼等一十八人官有差十年九月丁丑以官授賢良方正能直言極諫前進士裴垍等一十人憲宗元和元年四月丙午命宰臣已下監試應制舉人於尚書省以制舉人皆先朝所徴故不親試制曰朕以寡薄獲奉睿圗嚴恭寅畏不敢暇逸永惟萬邦之廣庶務之殷而燭理未明體道未至思欲復三代之盛烈顯十聖之耿光是用詳求正言思繼先志子大夫等藏噐斯久賁然而來白駒就維洪鍾待扣膺兹獻納朕甚嘉之言觀國光宜有廷試本將詢事豈忘臨軒園邑有期營奉是切求言誠感未暇躬親爰命公相洎於卿士親諭朕意延訪嘉謀至於興化之源才識攸重練逹吏理詳明儒術當是三道副朕旁求意或開予靡有所隐條例所問畢志盡規當酌古而叅今使文約而意備朕將親覽擇善而行並宜坐食訖就試䇿賢良曰朕觀古之王者君人受命兢業敬天順地靡不思賢能以濟其理求讜直以聞其過故禹拜昌言而嘉猷罔伏漢徴極諫而文學稍進康時濟俗罔不率繇厥後相循有名無實而又設以科條増求茂異捨斥己之至言角無用之虛説文㫖著明罕稱於代兹朕所以嘆息欎悼思索其真是用虚懇惻之誠咨體用之要庶乎言之可行行之不倦上獲其益下輸其情君臣之間驩然相與子大夫得不勉思朕言而茂明之我國家光宅四海年將二百十聖𢎞化萬邦懐仁三王之禮靡不講六代之樂罔不舉浸澤於下升中於天周漢已還莫斯為盛自禍階漏壊兵宿中原生人困竭耗其大半農戰非古衣食罕儲念兹疲甿遂􅆾冨庶督耕植之業而人無戀本之心峻摧酤之科而下有重斂之困舉何方而可以復其盛用何道而可以濟其艱既徃之失何者宜懲將來之虞何者當戒昔主父懲患於晁錯而用推㤙夷吾致覇於齊桓而行寓令精求古人之意啟廸來哲之懐眷兹洽聞固所詳究又執契之道垂衣不言委之於下則人用其私專之於上則下無其效元帝優游於儒學盛業竟衰光武責課於公卿峻政非羙二途取捨未獲所從余心浩然益所疑惑子大夫敦究其㫖屬之於篇興自朕躬無悼後害辛酉詔曰搆大厦者必總於羣材成大川者必資於百谷故思理之主求賢罔遺所以昭宣令圗廣大前緒觀文緝化其在兹乎朕以寡昧獲奉丕業虛已問政實始於兹考言求益敢不祗若故命左右輔弼洎有位之臣㑹於中臺必究其論間宻以獻省自朕躬果獲賢能副於饑渴才識兼茂明於體用科人第三次等元稹韋惇第四等獨孤郁白居易曹京伯韋慶復第四次等崔韶羅讓崔護元修薛存慶韋珩第五上等蕭俛李蟠沈傳師柴宿逹於吏理可使從政科第五上等陳岵等咸以待問之羙觀光而來詢以三道之要復於九變之選得失之覽粲然可觀宜膺徳茂之異式叶言揚之舉其第三次等人委中書門下優與處分第四等第四次等第五上等中書門下即與處分三年二月御宣政殿試四科舉人裴垍元和初召入翰林三年詔舉賢良時有皇甫湜對䇿其言激切牛僧儒李宗閔亦苦諌時政考官楊於陵韋貫之考三䇿皆在第垍居中復視無所同異及為貴幸泣訴請罪於帝帝不得已黜於陵貫之官罷垍翰林學士除户部侍郎穆宗以元和十五年正月即位二月壬寅勑應賢良方正直言極諌科等人宜令中書門下尚書省四品以上三月二十三日於尚書省同試三月戊午吏部尚書趙宗儒等奏應制科人等伏奉今月十一日勑比者先朝徴集應制人等已及時限恐皆來自逺方難於乆住酌宜審事遂委有司定日就試如聞所集之人多已分散須知審的然議裁定其令所司商量聞奏者伏以制科所設本在親臨南省䇿試亦非舊典今覃恩既畢庶政惟新况山陵日近庶務繁廹待問之士就試非多臣等商量恐須停罷從之長慶元年三月勑今年進士及第鄭朗等一十四人宜令中書舎人王起主客郎中知制誥白居易試聞奏四月丁丑詔曰國家設文學之科本求才實茍容僥倖則異至公訪聞近日浮薄之徒善為朋黨謂之闗節干擾主司毎嵗䇿名無不先定永言敗俗深用興懐鄭朗等昨令重試意在精覈藝能不於異書之中固求深僻題目貴令所試成就以觀學藝淺深孤竹管是祭天之樂出於周禮正經閲其呈試之文都不知其本事詞律鄙淺蕪累至多亦令宣示錢徽庶其深自懐愧誠宜盡棄以警將來但以四海無虞人心方泰用引寧僭式示殊恩特掩爾瑕庶明予志孔温業趙存約竇洵直所試粗通與及第盧公亮等十人並落下從自今以後禮部舉人宜准開元二十五年勑及第訖所試雜文并䇿送中書門下詳覆貶禮部侍郎錢徽為江州刺史十月詔文武常叅官及諸州府准制舉薦賢良方正人等以十一月二十五日御宣政殿䇿試宜令所司准式十一月戊午御宣政殿試制科舉人制曰古人有言常引一代之人以理一代之務雖雋賢茂彦不乏於時然亦在敷納以言精覈其實若決川瀆以導其氣考金石以求其音使抱忠義者必盡其誠知古今者必先其慮朕纂承鴻業以撫兆人常欲效三代之禮修烈祖之法猶念和氣之未洽休祥之未臻百姓之未安五兵之未戢故詳延修潔之士庶得乎未聞將以逹天地之心究俗化之變研安危之慮探理亂之言子大夫覃思於六經馳騖於百氏得不講求至論以沃朕心方直者舉朕之闕政術者體時之要慕𤣥逺者禆其論贍文詞者抑其華言經者折衷於聖人以明敎化論將者先之以仁誼無效縱横於戲子大夫當朕之時必思自逹且古之翼戴其君者尚委輅納説荷擔吐竒由壼闗之上言自南昌而諷刺况文陛之下負扆親臨若藏噐不耀結囊而去頋朕深志復何望焉當體予衷無懼後害宜坐食訖就試又䇿賢良曰蓋聞舜禹之有天下也起於側㣲積徳累勤多歴年所經聖之慮豈有遺哉然猶好問察言勤求賢士蓋以承天之任重憂人之志深也况朕長於深宫渉道日淺奉列聖之洪緒撫萬㝢之黎人夙夜嚴恭不敢有懈實懼燭理未究省躬未明所以詳求讜言以輔不逮子大夫是宜發所藴蓄沃予虚懐當極意正詞勿有隐諱昔王政之興必臻於康泰霸道所立由致於富彊我國家提封溢於三代斟酌兼乎百王無堯湯之災積祖宗之禮而人未蕃庶俗尚彫訛家無蓋藏公闕儲偫卒乘之數貨帛之資統而較之莫計前代豈率土生殖變於古歟將阜時政令失於今歟固以揣摩必窮利病明徴未失之漸具陳興復之舉且文武兼學以成身士農迭居以豐業故家給足以戀本才周可以應時近古各狥一端不相資用政令從事異心難以成課民佚無守輕為游惰指明共貫之方訢合二途之利永言致理期約厥中施為或差得失斯逺將修睦勸義則在下難知將任數馭情則人心益偽思聞㫖要得合誠明旌别比周之情敷詳忠厚之道知人則哲從古攸慎九徴恐泥五事難精或望可服人而智非周物或言皆詣理而行者乖方宜定取捨之端以彰真偽之辨至於朝廷之闕四方之弊詳延而至可得而書退有後言朕所不取子大夫其勉之中書舎人白居易膳部郎中陳岵考工員外郎賈飼同考制䇿十二月辛未制曰朕自郊上𤣥御端門發大號與天下更始思得賢雋標明四科令羣公卿士暨守土之臣詳延下位周於草澤成列待問副予虚求昧爽臨軒俾究其論正辭良術精義宏謀繹之旬時深見忠益言刈其楚列而第之賢良方正能直言極諫第三等人龎嚴第三次等人吕術第四等人韋曙姚中立李躔第四次等人崔嘏崔龜從任畹第五上等人韋正貫崔知白陳𤣥錫博通墳典逹於敎化第四等人李思𤣥詳明政術可以理人第四次等人崔郢軍謀宏逺堪任將帥第三等人吳思第五等人李商卿咸以懿學茂識揚於明廷况當短晷之辰頗著論思之美粲然高論深沃朕心永言藏噐之規豈忘縶駒之義寵之命秩允答嘉猷其第三等人第三次等人委中書門下優與處分其第四次等人第五上等人中書門下即與處分甲申以登制科人前試𢎞文館校書郎龎嚴為左拾遺前試秘書省校書郎呂述為右拾遺前試大常寺協律郎呉思為右拾遺供奉京兆府富平縣尉韋曙為左拾遺内供奉前鄉貢進士姚中立李躔崔嘏並可秘書省校書郎同州叅軍崔龜從為京兆府鄠縣尉太子正字任畹為京兆府興平尉草澤韋正貫為太子校書郎前鄉貢進士崔知白為秘書省正字前鄉貢進士崔郢為太子校書郎前鄉貢進士李商卿為崇文館校書郎制曰昔仲尼之門以四科品第諸生所得十哲今吾徴四海九州之士而登名者十有五人捜羅簡㧞非不勤至以今况古可謂才難是用詔爵以嘉奬其忠超擢以光明其道俾巖石之下人思自奮晁董之盛逺以為隣延登諫垣式佇忠益讐書結綬皆曰顯途修其秩次亦示科等服我逺命助我逺猷可依前件敬宗寳厯元年三月辛酉詔常參及諸州府准去年三月三日制舉諸色科目見到總三百一十九人今月二十八日御宣政殿臨試宜付所司准式辛未帝御宣政殿試制舉人詔曰朕聞心術順道天下可一言而興聰明壅途堂上有千里之逺故唐虞而降則考試觀俗漢魏之際則詔䇿求賢朕纉紹丕圗撫臨方夏實懼誠有所偏信鑒有所未周乃前嵗詔六官九卿方岳尹正有位之士逮於庶僚高懸四科博薦羣彦將訪衆政之闕酌至論之中子大夫庭列儼然可應其品是用宵興前殿永日渴求條列坦明咸本經史固子大夫之所講磨矣當竭誠慮無有蘊藏宜坐食訖就試以中書舎人鄭㴠吏部郎中李虞仲並充考制䇿官丁亥制曰朕深居法宫高處宸極嘗慮天下多務壅於上聞朝廷大猷闕於中典至於伏陛叩顙造膝犯顔皆驟遷顯榮寵以優錫尤思物不得茂遂道有所欎堙是用虚中訪賢側席前殿緘宻以獻閲自朕躬切弼予違無所回忌第於上下揚於正朝吾之不􅈔亦可謂信於海内矣賢良方正能直言極諫科舉人第三等唐伸韋端符舒元襄第四等蕭敞楊魯士楊儉來擇趙柷裴惲第四次等韋繇李昌實嚴荆田鬯崔璜第五上等李滻蕭夷中馮球元晦詳閑吏理逹於敎化科第五上等韋正貫軍謀宏逺材任邊將科第三等裴儔第四次等侯雲章咸以讜言正詞兵符敎本應問如響不窮如泉著之於篇爛然盡在宜膺中鵠之選用叶縻爵之經在第三等人委中書門下優與處分第四等第四次等第五上等中書門下即與處分後不數日帝謂宰相曰韋端符楊魯士皆渉物議宜與外官端符授同州白水縣尉魯士授興元府城固縣尉宰臣等竟請罪名不得文宗太和二年三月辛巳御宣政殿親䇿試制舉人制曰志本於道蓋道以致君為先代實生才蓋才以濟理為務不索何以獲其實不言何以知其志故帝堯重詢衆之訓殷宗首沃心之術其傳曰嘉言罔攸伏又曰俊民用彰漢魏以還詔䇿時作暨於我唐遵為故事繇是善政惟乂魁能間出朕祗荷大寳勤恤兆人明不燭於幽暗惠未流於鰥寡御朽兢慮求思永圗是以詔命有司㑹羣材列稽疑延闕政子大夫逹學通識儼然來思操觚濡翰條誨宿滯慰我虚佇必引嘉猷故臨軒命書䇿以審訪繼燭俟奏其悉乃辭各宜坐食食畢就試左散騎常侍馮宿太常少卿賈餗庫部郎中龎嚴宜並充考制䇿官是日宰臣等以監侍制舉人及夜並宿於中書省甲午詔曰王者謹天戒酌人言叶時凝命資賢贊理斯為令典也朕以菲徳祗膺大統嵗屬㓙旱人思底寕庶察弊以勤理因舉能而詢衆科别條問臨軒致試載捜尤才果副虚佇賢良方正能直言極諫科舉人第三等裴休裴素第三次等李邵第四等南卓李甘杜牧馬植鄭亞崔璵第四次等崔讜王式羅紹京崔渠崔慎繇苗愔韋昶崔槫第五上等崔渙韓賓詳閑吏理逹於敎化科舉人第四次等宋昆軍謀宏逺堪任將帥科舉人第四次等鄭冠李栻等皆直躬遵道博古知微敷其逺猷志在引益實能攻朕闕紹政經究天人交際之理極皇王道變之義指切精洽粲然可觀既校才於試可宜旌能於受禄其第三等第三次等人委中書門下優與處分第四次等第五上等人中書門下即與處分時有劉蕡應直言極諌科條對激切凡數千言雖不中第其文本行於時三年三月御史䑓據吏部分察姚中立稱准勑考試别頭進士明經等官考功員外郎高鍇考試禮部闗送到進士鄭齊之季景素兩人明經王淑等十八人並及第放牓之後羣議沸騰職當分察不敢緘黙及得高鍇狀伏以進士明經並先無格限其所送進士二人文藝並堪與及第明經比年所送不過三五人今年禮部開送十一人及考試帖義十一人並堪與及第勑鄭齊之季景素據所試比校常例得者不甚過差宜並與及第明經王淑等五人覆試帖義通數高並與及第餘落之武宗㑹昌四年二月權知貢舉左僕射判太常卿王起下及第二十五人續奏五人堪放及第楊知至竇緘楊嚴鄭朴源重奉勑只放楊嚴及第餘並落下五年二月左諫議大夫陳商知舉放進士二十八人覆落八人時以去年僕射王起知舉放二十五人續奏江陵節度使崔元式甥鄭朴東都留守牛僧儒女壻源重故相竇易直子緘監察御史楊収弟嚴勑遣户部侍郎翰林學士白敏中覆試落下三人唯放楊嚴一人至是又遣敏中覆試落下八人議者以為公宣宗大中元年正月禮部侍郎魏扶放及第二十三人續奏堪放及第三人封彦卿崔瑑鄭延林等皆以文藝為衆翰林學士户部侍郎知制誥韋琮等考盡合程度其月二十三日奉進止並付所司放及第有司考試只合在公如渉狥私自有刑典從今以後但依常例取捨不得别有奏聞懿宗咸通十一年正月以吏部尚書蕭鄴吏部侍郎于徳孫吏部侍郎楊知温考官司勲員外郎李輝禮部員外郎崔澹等考試應宏詞選人十二年三月以吏部尚書蕭鄴吏部侍郎歸仁晦李當考官司勲郎中鄭紹業兵部員外郎陸勲等試宏詞選人十三年三月以吏部尚書蕭鄴吏部侍郎獨孤雲考官職方郎中趙蒙駕部員外郎李紹考試宏詞選人試日蕭鄴替差右丞孔温裕權判僖宗乾符四年正月以吏部尚書鄭從讜吏部侍郎孔晦吏部侍郎崔蕘考宏詞選人五年六月以吏部尚書鄭從讜吏部侍郎崔沆考宏詞選人六年三月以吏部侍郎崔沆崔澹試宏詞選人駕部郎中盧藴刑部郎中鄭頊為考官晉高祖天福七年五月勑應諸色進䇿人等皆抱材能方來投獻宜加明試俾盡臧謀起今後應進䇿條中書奏覆勑下其進策人委門下省試策三道仍定上中下三等如是元進䇿内有施行者其所試䇿或上或中者委門下省給與減選或出身優牒合格叅選日其試䇿上者委銓司超一資注擬其試䇿中者委銓司依資注擬如是所試䇿或上或中元進䇿條並不施行所試䇿下元進䇿條内有施行者其本官並仰量與恩賜發遣若或所試䇿下所進䇿條並不施行便仰曉示發遣不得再有投進餘並准前後勑文處分周太祖廣順元年六月差翰林學士魚崇諒就樞宻院引試進䇿人考定昇降聞奏三年五月勑進䇿獻書人宜令翰林學士申文炳如樞宻院引試定優劣聞奏十一月乙卯命翰林學士竇儼試進䇿官曹巨源鄧杲李嶢等於禁中䇿曰王者以禮御人倫以樂和天地以兵柔萬國以刑齊兆民四者何先殊途同治或因或革各適所宜故五帝殊時不相襲禮三王異世不相沿樂兵有務戰不戰之異刑有輕次重次之差歴朝張施繁不具引自唐祖混一區夏太宗嗣成聖功言其禮則三正有常言其樂則七宗有秩兵息而臣道咸順刑措而民心不渝五帝三王不足尚也越自天寳之後國經混然禮樂湮墜而衆不知兵刑煩擾而下不畏朱梁晉漢皆用因仍洎我朝開創以來力務興振然薫歇燼滅歴年滋多焦思勞神觀效未著予欲父慈子孝兄友弟恭君仁臣忠夫義婦聽聲明文物無其缺祝嘏辭説必有序萬儀咸秩百神受職家肥國肥知禮之尊也當用何理副兹虚懐予欲六律六品七政九變金石絲竹之噐羽旄干戚之容歌其政舞其徳與夫文音武坐比崇昔時天和地平知樂之崇也子當深辨其理為時陳之予欲混同天下親征未服手振金皷䟦履山川如商高宗之伐鬼方若魏武帝之登柳塞則六師所至供億無窮衆興民勞自古皆慎若但任偏將屯於邊鄙縱兵時入茹食居人交尸塞路暴骨盈野終嵗如是得無憫然何以令佳兵不具彼魁革面王塗無所玘隔方貢自來駿奔更思爾謀以逮明畧予欲斧鉞不用刀鋸不興桎梏朽蠧無所設施無城舂鬼薪之役無三居五宅之流􅀞衣冠而人不犯虛囹圄而不入無刑之理何以致諸子大夫博議洽聞窮微覩奥提筆既干於竒遇撞鍾必應於嘉音抱屈將伸直言勿隐既而以所對之詞上進乃授巨源及杲簿掾賜嶢進士出身冊府元龜卷六百四十四
