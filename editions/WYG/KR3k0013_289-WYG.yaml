body:
  text: 册府元龜卷二百八十九宋王欽若等撰宗室部圗興復古者封建子弟藩屏王室平居則共其樂多難則同其憂所謂宗子維城本支百世也故有窮之難少康以庖正而復舊物新都之簒光武以諸王而致中興雖復藉祖宗之道徳因億兆之懷思葢繇天姿異常靈命夙集耳其有屬居宗室世值艱虞或神器将移或王業既墜乃将糾率義旅殘㓕讐怨或投間於中或稱兵於外而天未悔禍時方不利志雖自激功卒無成豈謀慮之未臧葢鎡基之靡固耳亦有流寓絶域羇旅鄰邦思借人之兵以復已之圗而運移勢去終底滅亡區區之心有足悲也與夫歸國邑獻符命以圗生者豈不逺乎漢安衆侯崇長沙定王六世孫平帝時與舂陵侯敞俱朝京師助祭明堂平帝時王莽輔政祫祭明堂諸侯王二十八人列侯百二十八人宗室子九百餘人徴助祭也崇見王莽将危漢室私謂敞曰安漢公擅國權羣臣莫不迴從􅂞曲也社稷傾覆至矣太后春秋髙天子㓜弱謂元后平帝也髙皇帝所以分封子弟葢為此也敞心然之及莽居攝崇與相張紹謀曰安漢公莽專制朝政必危劉氏天下非之者乃莫敢先舉此宗室恥也吾帥宗族為先海内必和紹等從者百餘人遂進攻宛不得入而敗張紹竦之從兄莽汙池其室宅徐鄉侯快一云名炔膠東恭王子聞王莽僭位乃結黨數千人起兵於其國欲誅莽快兄殷為扶崇公快攻即墨殷閉城門自繫獄吏民距快快敗走至長廣死是時陵鄉侯曽楚思王子扶恩侯貴不知誰子孫皆以起兵誅莽敗舂陵侯敞二弟𢎞梁𢎞先起義兵卒梁少以侠氣聞更始元年起兵豫章欲狥江東自號就漢大将軍暴疾卒後漢光武族兄𤣥字聖公舂陵戴侯熊渠曾孫也王莽地皇二年新市人王匡王鳳馬武王常成丹等攻㧞竟陵縣名今復州轉擊雲杜安陸安陸今安州縣三年與其支黨朱鮪張卬等北入南陽號新市兵皆自稱将軍平林人陳牧廖湛復聚衆千餘人􅃅平林兵以應之聖公因往從牧等為其軍安集掾是時光武及兄伯升亦起㫪陵與諸部合兵而進四年正月破王莽前隊大夫甄阜屬正梁丘賜斬之􅃅聖公為更始将軍衆雖多而無所統一諸将遂共議立更始為天子二月辛巳設壇塲於淯水上沙中陳兵大㑹更始即位南靣立朝羣臣素懦弱羞愧流汗舉手不能言於是大赦天下建元更始元年悉拜置諸将以族父良為國三老王匡為定國上公王鳳成國上公朱鮪大司馬族弟伯升大司徒陳牧大司空餘皆九卿将軍五月伯升拔宛於元功縣名在南陽六月更始入都宛城盡封宗室及諸将為列侯者百餘人更始忌伯升威名遂誅之以光禄勲劉賜為大司徒前鍾武侯劉望起兵畧有汝南時王莽納言将軍嚴尤秩宗将軍陳茂既敗於昆陽往歸之八月望遂自立為天子以尤為大司馬茂為丞相王莽使太師王匡與更始新封國公同姓名國将哀章守雒陽哀姓魯哀公之後更始遣定國上公王匡攻雒陽西屏大将軍申屠建丞相司直李松攻武闗三輔震動是時海内豪傑翕然響應皆殺其牧守自稱将軍用漢年號以待詔命旬月之間徧於天下長安中起兵攻未央宫九月東海人公賔就斬王莽於漸䑓公賔姓就名漸䑓太液池中臺收璽綬傳首詣宛時更始在便坐黄堂取視之喜曰莽不如是當與霍光等寵姬韓夫人笑曰若不如是帝焉得之乎更始悦乃懸莽首於宛城市是月拔雒陽生縛太師王匡國将哀章至斬之十月使奮威大将軍劉信擊殺劉望於汝南并誅嚴尤陳茂更始遂北都雒陽以劉賜為丞相申屠建李松自長安傳送乘輿服御又遣中黄門從官奉迎遷都二年二月更始自雒陽而西至長樂宫初王莽敗唯未央宫被焚而已其餘宫舘一無所毁宫女數千備列後庭自鐘鼓帷帳輿輦器服太倉武庫官府市里不改於舊李松與棘陽人趙萌説更始宜悉王諸功臣朱鮪争之以為髙祖約非劉氏不王更始乃先封宗室太常将軍劉祉為定陶王劉賜為宛王劉慶為燕王劉歙為元氏王大将軍劉嘉為漢中王劉信為汝隂王後遂立王匡為比陽王王鳳為宜城王朱鮪為膠東王衛尉大将軍張卬為淮陽王廷尉大将軍王常為鄧王執金吾大将軍廖湛為穰王申屠建為平民王尚書胡殷為隨王柱天大将軍李通為西平王五威中郎将李軼為舞隂王水衡大将軍成丹為襄邑王大司空陳牧為隂平王驃騎大将軍宋佻為頴隂王尹尊為郾王唯朱鮪辭曰臣非劉宗不敢干典遂讓不受乃徙鮪為左大司馬劉賜為前大司馬使與李軼李通王常等鎮撫關東以李松為丞相趙萌為右大司馬共秉内任萌專權威福自己郎吏有説萌放縱者更始拔劍擊之自是無敢復言萌私忿侍中引下斬之更始救請不從時李軼朱鮪擅命山東王匡張卬横暴三輔其所授官爵者皆羣小賈竪或有膳夫庖人多着繡靣衣錦袴襜褕褚于褚于大掖衣也襜褕其短者罵詈道中長安為之語曰竈下養中郎将爛羊胃騎都尉爛羊頭闗内侯十二月赤眉西入闗三年正月更始使蘇茂拒赤眉於𢎞農茂軍敗死者千餘人三月遣李松㑹朱鮪與赤眉戰於蓩鄉地名在虢州湖城縣之間松等大敗棄軍走死者三萬餘人時王匡張卬守河東為鄧禹所破還奔長安卬與諸将議曰赤眉近在鄭華隂間旦暮且至今獨有長安見㓕不久不如勒兵掠城中以自富轉攻所在東歸南陽收宛王等兵事若不集復入湖池中為盗耳申屠建廖湛等皆以為然共入説更始更始怒不應莫敢復言及赤眉立劉盆子更始使王匡陳牧成丹趙萌屯新豐李松軍掫以拒之新豐有鴻門亭掫城是也張卬廖湛胡殷申屠建等與御史大夫隗囂合謀欲以立秋日貙膢時共刼更始貙獸名以立秋日祭獸冀州北郡以八月朔作飲食為膢俱成前計侍中劉能卿知其謀以告之更始託病不出召張卬等皆入将悉誅之唯隗囂不至更始狐疑使卬等四人且待於外廬卬與湛殷疑有變遂突出獨申屠建在更始斬之卬與湛殷遂勒兵掠東西市昏時燒門入戰於宫中更始大敗眀旦将妻子車騎百餘東奔趙萌於新豐更始復疑王匡陳牧成丹與張卬等同謀乃並召入牧丹先至即斬之王匡懼将兵入長安與張卬等合李松還從更始與趙萌共攻匡卬等於城内連戰月餘匡等敗走更始徙居長信宫赤眉至髙陵匡等迎降之遂共連兵而進更始城守使李松出戰敗死者二千餘人赤眉生得松時松弟汎為城門校尉赤眉使使謂之曰開城門活汝兄汎即開門九月赤眉入城更始單騎走從厨城門出長安故城北中門也諸婦女從後連呼曰陛下當下謝城更始即下拜復上馬去至髙陵止傳舍遣劉恭請降赤眉使其将謝禄往受之十月更始隨禄降赤眉封長沙王禄縊殺之齊武王縯字伯升光武長兄性剛毅慷慨有大節自王莽簒漢常憤憤懷復社稷之慮不事家人居業傾身破産結交天下雄俊莽末盗賊羣起南方尤甚伯升召諸豪傑計議曰王莽暴虐百姓分離今枯旱連年兵革竝起此天亡之時復髙祖之業定萬世之秋也衆皆然之於是分遣親客使鄧晨起新野光武與李通李軼起於宛伯升自發㫪陵子弟合七八千部署賔客自稱柱天都部柱天者若天之柱也都部者都統其衆人也使宗室劉嘉往招新市平林兵王匡陳牧等合軍而進屠長聚及唐子鄉殺湖陽尉進拔棘陽因欲攻宛至小長安與王莽前隊大夫甄阜屬正梁丘賜戰時天宻霧漢軍大敗姊元弟仲皆遇害宗室死者數十人伯升復收㑹兵衆還保棘陽阜賜乘勝留輜重於藍鄉今唐州比陽縣有藍鄉引精兵十萬南渡潢淳水諸水二湖流注合為潢水又南經棘陽縣之潢淳聚又謂之潢淳水在今唐州湖陽縣臨泚水阻兩川間為營絶後橋示無還心新市平林見漢兵數敗阜賜軍大至各欲解去伯升甚患之㑹下江兵五千餘人至宜秋宜秋聚名在泚陽縣乃往為説合從之勢下江從之伯升於是大饗軍士設盟約休卒三日分為六部濳師夜起襲取藍鄉盡獲其輜重眀旦漢軍自西南攻甄阜下江兵自東南攻梁丘賜至食時賜陳潰阜軍望見散走漢兵急追之却迫潢淳水斬首溺水者二萬餘人遂斬阜賜王莽納言將軍嚴尤秩宗將軍陳茂聞阜賜軍敗引欲據宛伯升乃陳兵誓衆焚積聚破釜甑斬首三千餘級尤茂棄軍走伯升遂進圍宛自􅃅柱天大将軍自阜賜死後百姓日有降者衆至十餘萬諸将㑹議立劉氏以從人望豪傑咸歸於伯升而新市平林将帥樂放縱憚伯升威眀而貪聖公懦弱先共定䇿立之然後使騎召伯升示其議伯升曰諸将軍幸欲尊立宗室其徳甚厚然愚鄙之見竊有未同今赤眉起青徐衆數十萬聞南陽立宗室恐赤眉復有所立如此必将内争今王莽未㓕而宗室相攻是疑天下而自損權非所以破莽也且首兵唱號鮮有能遂陳勝項籍即其事也㫪陵去宛三百里耳未足為功遽自尊立為天下凖的使後人得承吾敝非計之善者也今且稱王以號令若赤眉所立者賢相率而往從之若無所立破莽降赤眉然後舉尊號未晩願各思之諸将多曰善将軍張卬拔劍擊地曰疑事無功今日之議不得有二衆皆從之聖公既即位拜伯升為大司徒封漢信侯繇是豪傑失望多不服五月伯升拔宛六月光武破王尋王邑自是兄弟威名益盛更始君臣不自安遂共謀誅伯升乃大會諸将以成其計初伯升部将宗人劉稷時起兵擊魯陽今汝州魯山縣聞更始立怒曰本起兵圖大事者伯升兄弟也今更始何為者耶更始君臣聞而心忌之以稷為抗威将軍稷不肯拜更始乃與諸将陳兵數千人先收稷将誅之伯升固争李軼朱鮪因勸更始并執伯升即日害之中山王茂泗水王歙從父弟年十八嵗漢兵之起茂自號劉先職聚衆京宻間京宻二縣俱屬河南稱厭新将軍攻下頴川汝南衆十餘萬人光武既至河内茂率衆降晉南陽王保愍帝時為相國都督陕西諸軍事帝之蒙塵也保自稱晉王建元署置百官遣使拜凉州張寔為征西大将軍儀同三司增邑三千戸俄而保為都尉陳安所叛氐羗皆應之保窘迫遂去上邽遷祁山寔遣将韓璞歩騎五千赴難陳安退保緜竹保歸上邽未幾保復為安所敗使詣寔乞師寔遣宋毅赴之而安退㑹保為劉曜所逼遷于桑城将謀奔寔寔以其宗室之望若至河右必動物情遣其将隂監逆保聲言翼衛實禦之也㑹保薨其衆散奔凉州者萬餘人司馬楚之宣帝弟太常馗之八世孫年十七值宋髙祖輔政誅夷司馬戚屬楚之乃亡於汝潁之間楚之少有英氣能折節待士與司馬順眀道恭等所在聚黨及髙祖自立楚之規欲報復收據長社歸之者常萬餘人髙祖深憚之楚之尋奔于後魏為征西将軍荆州刺史與山陽公奚斤共平河南宋劉秉長沙王道憐孫順帝即位初為尚書令中軍時齊王輔政袁粲鎮石頭粲濳與秉及諸大将軍黄回等謀欲作亂本期夜㑹石頭旦乃舉兵秉素怯懦騷動擾不自安冄哺後便自丹陽郡車載婦女盡室奔石頭部曲數百赫奕滿道既至見粲粲驚曰何遽便来事今敗矣秉曰今得見公萬死亦何恨從弟中領軍韞值在省内與直閣将軍卜伯興謀其夜共攻齊王㑹秉去事覺齊王夜使驍騎将軍王敬則收韞韞已戒嚴敬則率壮士直前韞左右皆披靡因殺之伯興亦伏誅粲敗秉踰城出走於領䄡湖見擒與二子承侯並誅後魏始平縣公孝矩為南豐州刺史時見周太祖專政将危元氏孝矩每慨然有興復社稷之志隂謂昆季曰昔漢時有諸吕之變朱虛東牟卒安劉氏今宇文㤗之心路人所見顛而不扶焉用宗子盍将圗之為兄則所遏孝矩乃止北齊范陽王紹義敗奔突厥他鉢可汗謂文宣英雄天子以紹義重踝似之王欽若等曰踝骨重也甚見愛重凡齊人在北者悉𨽻紹義遂即皇帝位稱武平元年以趙穆為天水王他鉢聞寳寧得平州亦招諸部各舉兵南向云共立范陽王作齊帝為其報讐周武帝大集兵於雲陽将親北伐遇疾暴終紹義聞之以為天賛已盧昌期據范陽亦表迎紹義俄而周将宇文神舉攻㓕昌期其日紹義適至幽州聞周總管出兵於外欲乗虚取薊城列天子旌旗登燕昭王冡乗髙望逺部分兵衆神舉遣大将軍宇文恩将四千人馳救幽州半為齊軍所殺紹義聞范陽城陥素服舉哀迴軍入突厥周人購之於他鉢又使賀若誼徃説之他鉢猶不忍遂偽與紹義獵於南境使誼執之流于蜀紹義妃渤海封孝宛女自突厥逃歸紹義在蜀遺妃書云夷狄無信送吾於此竟死蜀中隋越王侗煬帝諸孫大業十三年帝幸江都令侗與金紫光禄大夫叚達大府慶元文都攝民部尚書韋津右武衛将軍皇甫無逸等揔留䑓事宇文化及之弑逆也文都等議以侗元徳太子之子屬最為近於是乃共尊立大赦改元曰皇㤗謚帝曰眀廟號世祖追尊元徳太子為孝成皇帝廟號世宗尊其母劉良娣為皇太后未幾宇文化及立秦王子浩為天子来次彭城所經城邑多從逆黨侗懼遣使者葢琮馬公政招懷李宻宻遂遣使請降侗大悦禮其使甚厚即拜宻為太尉尚書令魏國公令拒化及下書曰我大隋之有天下於兹三十八載髙祖文皇帝聖略神功載造區夏世祖眀皇帝則天法地財一華戎東暨蟠木西通細桺前踰丹徼後越幽都日月之所臨風雨之所至圎首方足禀氣食毛莫不盡入提封皆為臣妾加以寳貺畢集靈瑞咸臻作樂制禮移風易俗知周寰海萬物咸受其賜道濟天下百姓用而不知世祖往因歴試統臨南服自居皇極順兹望幸所以往嵗省方展禮肆覲停鑾駐蹕按駕清道八屯如昔七萃不移豈意釁起非常逮於軒陛災生不意延及冕旒奉諱之日五情哀隕攀號荼毒不能自勝且聞之自古代有屯剥賊臣逆子無世無之至如宇文化及世傳庸品其父述往屬時来早霑厚遇賜以婚媾置之公輔位尊九命禄重萬鍾禮極人臣榮冠世表徒承海嶽之恩未有涓塵之答化及以此下材夙蒙顧盻出入外内奉望階墀昔陪藩國統領禁衛及從升皇阼陪列九卿但本性兇狼恣其貪穢或交結惡黨或侵掠貨財事重刑篇状盈獄簡在上不遺簮履恩加草芥應至罪辜每蒙恕免三經除解尋復本職冄徙邉裔仍即追還生成之恩昊天罔極奨擢之義人事罕聞化及梟獍為心禽獸不若縱毒興禍傾覆行宫諸王子弟一時殘酷痛暴行路世不忍言有窮之在夏時犬戎之於周代釁辱之極亦未是過朕所以刻骨摧心飲膽嘗血瞻天視地無處容身今王公卿士庻寮百辟咸以大寳鴻名不可顚墜元兇巨猾須早夷殄翼戴朕躬嗣守寳位顧惟寡薄志不逮此今者出黼扆而仗旄鉞釋衰麻而擐甲胄銜寃誓衆忍淚治兵指日遄征以平大盗耳化及偽立秦王之子幽遏比於囚拘其身自稱霸相專擅擬於九五履踐禁御據有宫闈昻首揚眉初無慙色衣冠朝望外懼兇威志士誠臣内皆憤怨以我義師順彼天道梟夷醜族匪夕伊朝大尉尚書令魏公丹誠内發宏略外舉率勤王之師討違天之逆果毅争先熊羆競逐金鼓振讋若火焚毛鋒刃縱横如湯沃雪魏公志在扶翊投袂前驅朕親御六軍星言繼進以此衆戰以斯順舉辟山可以動射石可以入况擁爾徒皆有離徳京都侍衛西憶家鄉江左淳民南思江邑比来表書駱驛人信相尋若王師一臨舊章蹔覩自應解甲倒戈冰消葉散且聞化及自恣天奪其心弑戮不辜挫辱人士莫不道路以目號天跼地朕今復讐雪恥梟轘者一人拯溺救焚所哀者士庶唯天鑒孔殷祐我宗社億兆感義但㑹朕心梟戮元兇䇿勲飲至四海交㤗稱朕意焉兵術軍機竝受魏公節度宻見使者大悦北靣拜伏臣禮甚恭宻遂東拒化及士貴頗不恊王欽若等曰士貴謂元文都皇甫無逸等人隂有相圗之計未幾元文都盧楚郭文懿趙長子等為世充所殺皇甫無逸遁走世充既破李宻為鄭王揔百揆於九錫備物侗不能禁世充又逼侗遜位幽於含凉殿月餘遇害唐琅邪王冲越王貞之子垂拱四年為博州刺史據州舉兵初韓王元嘉魯王靈夔霍王元軌越王貞及元嘉子黄公譔靈夔子范陽王藹元軌子江都王緒等自則天臨朝常怏怏有不平之志宻有異圗是嵗七月譔作謬書與貞云内人病漸重必須早療若至今冬恐成痼疾宜早下手仍速相報至是以明堂将成追皇宗赴集因逓相語云大享之際神皇必遣人大行誅戮皇家子弟無遺種矣譔詐為皇帝璽書與冲云朕被縶王等宜各發兵救拔我也冲又偽為帝璽書云神皇欲傾李家社稷移國祚於武氏冲乃呼長史蕭徳宗等令召募兵士分報韓魯霍越紀等五王各令起兵應接以赴神都於是制左金吾将軍丘勣為行軍大總管以討冲初冲募得五千餘人将武水縣令郭武悌赴魏州請授魏州縣令馬𤣥素領兵千七百人在路邀截恐力不及敵先入武水城閉門拒守乃令積草車上放火燒城南門擬乗火突入火之未起南風甚急及草已然遽迴為北風未至城門燒草已盡冲軍繇是沮氣有堂邑丞董𤣥寂為冲統率兵仗及冲擊武水𤣥寂曰琅邪王與國家交戰此乃反也冲聞之斬𤣥寂以狥兵衆懼而散入草澤不可禁止唯有家僮左右不過數十而已乃却走入愽州城為守門者所殺傳首神都梟於闕下冲起兵凡七日而敗初冲與諸王連及冲先發而莫有應者唯冲父豫州刺史越王貞獨舉兵以應之尋遣兵攻上蔡縣既聞冲敗恐懼索鏁欲自拘馳驛詣闕謝罪㑹其所署新蔡令傅延慶募得勇士二千餘人貞遂有拒敵之志乃宣言於其衆曰琅邪王已破魏相數州兵至二十萬朝夕即到爾宜勉之徴屬縣兵至五千人分為五營貞自為中營署其所親汝陽丞裴守徳為大将軍内營總管趙成羙為左郎将押左營周𢎞道為右郎将押右營安摩訶為郎将後軍總管王孝思為右将軍前軍總管又以豫州長史韋慶禮為銀青光禄大夫行其府司馬凡署九品已上官五百餘人令道士及僧轉讀諸經以祈事㨗家僮及戰士咸帶符以辟兵其所授官皆以迫脅見從本無鬪志唯裴守徳實與之同守徳有膂力善騎射貞将起事便以其女良鄉縣主妻之而委以爪牙心腹之任九月庚辰命左豹韜衛大将軍麴崇裕為中軍大總管夏官尚書岑長倩為後軍大總管率兵十萬討之仍令鳳閣郎中張光輔為諸軍節度削貞及冲屬籍改姓虺氏官軍至豫州城東四十里貞命子規及裴守徳拒戰規等兵潰而歸貞大懼閉門自守裴守徳排閣入問王安在意欲以貞自購也貞自仰藥而死規又自殺守徳擕良鄉縣主亦同縊而死丙寅豫州平崇裕傳貞父子及守徳等首梟於闕下貞起兵凡二十日而敗初越王貞之起兵也韓王元嘉與其子譔實為謀首於是皇宗國戚内外相連者甚廣魯王靈夔子范陽王藹遣使於貞及冲曰若四面同来事無不濟諸道計㑹未審而先發兵倉卒唯貞應之諸道莫有赴者故其事不成坐致誅㓕册府元龜卷二百八十九
