body:
  text: 册府元龜卷九百十二宋王欽若等撰總録部偽政第三王莽天鳯元年正月赦天下莽曰予以二月建寅之節行廵狩之禮太官齎糒乾肉内者行張坐卧糒乾飯也帳坐卧謂帷帳茵席也所過毋得有所給言自齎食及帷帳以行在路所經過不須供費也予之東廵必躬載耒每縣則耕以勸東作耒耜曲木也予之南廵必躬載耨每縣則薅以勸南訛耨鉏也薅去草也訛化也予之西廵必躬載銍每縣則穫以勸西成予之北廵必躬載拂每縣則粟以勸盖藏拂所以擊治禾者也今謂之連枷粟謂治粟畢北廵狩之禮即於土中居雒陽之都焉敢有趨讙犯法輙以軍法從事趨讙走呼也羣公奏言皇帝至孝徃年文母聖體不豫躬親供養衣冠稀觧因遭棄羣臣悲哀顔色未復飲食損少今一嵗四廵道路萬里春秋尊非糒乾肉之所能堪且無廵狩須闋大服以安聖體臣等盡力養牧兆民奉稱明詔莽曰羣公牧羣司諸侯庶尹願盡力相帥牧養兆民欲以稱予繇此敬徳其朂之哉毋食言焉更以天鳯七年嵗在大梁倉龍庚辰行廵狩之禮厥明年嵗在實沈倉龍辛巳即土之中雒陽之都廼遣太傅平晏大司空王邑之雒陽營相宅兆圖起宗廟社稷郊兆云三月壬申晦日有食之大赦天下䇿大司馬逯竝曰日食無光干戈不戢其上大司馬印韍就侯氏朝位太傅平晏勿領尚書事省侍中諸曹兼官者以利苗男訢為大司馬利苗邑名莽即真尤備大臣抑奪下權朝臣有言其過失者輙㧞擢孔仁趙博費興等以敢擊大臣故見信任擇名官而居之公卿入宮吏有常數太傅平晏從吏過例掖門僕射苛問不遜僕射苛問平晏其言不遜戊曹士收繫僕射莽自以士行故使太傅置戊曹士士掾也莽大怒使執法發車騎數百圍太傅府捕士即時死大司空士夜過奉常亭亭長苛之告以官名亭長醉曰寧有符傳邪士以馬箠擊亭長箠策也亭長斬士亡郡縣逐之家上書亭長家上書自治莽曰亭長奉公勿逐大司空邑斥士以謝國将哀章頗不清莽為選置和叔特為置此官勅曰非但保國将閨門當保親屬在西州者諸公皆輕賤而章尤甚莽以周官王制之文置卒正連率大尹職如太守屬令屬長職如都尉置州牧部監二十五人見禮如三公監位上大夫各主五郡公氏作牧侯氏卒正伯氏連率子氏屬令男氏屬長皆世其官其無爵者為尹分長安城旁六鄉置帥各一人分三輔為六尉郡三輔黄圖云渭城安陵以西北至栒邑義渠十縣屬京尉大夫府居故長安寺高陵以北十縣屬尉府大夫府居故廷尉府新豐以東至湖十縣屬翊尉大夫府居城東覇陵杜陵東至藍田西至武功郁夷十縣屬光尉大夫府居城南茂陵槐里以西至汧十縣屬扶尉大夫府居城西長陵池陽以北至雲陽祋祤十縣屬列尉大夫府居城北河東河内𢎞農河南潁川南陽為六隊郡置大夫職如太守屬正職如都尉更名河南大尹曰保忠信卿益河南屬縣滿三十置六郊州長各一人人主五縣及他官名悉改大郡至分為五郡縣以亭為名者三百六十以應符命文也縁邉又置竟尉以男為之諸侯國閒田為黜陟增减云莽下書曰常安西都曰六鄉衆縣曰六尉義陽東都曰六州衆縣曰六隊粟米之内曰内郡禹貢去王城四百里納粟五百里納米皆在甸服之内故也其外曰近郡有鄣徼者曰邉郡合百二十有五郡九州之内縣二千二百有三公作甸侯是為惟城諸在侯服是為惟寧在采任諸侯是為惟翰采采服也任男服也在賔服是為惟屏賔服即古衛服也取諸侯賔服以為名在揆文教奮武衛是為惟垣在九州之外是為惟藩凡此惟城以下取詩大雅板之篇云价人惟藩大師惟垣大邦惟屏大宗惟翰懷徳惟寧宗子惟城以為名號也各以其方為稱總為萬國焉其後嵗復變更一郡至五易名而還復其故吏民不能紀每下詔書輙繫其故名曰制詔陳留大尹太尉其以益嵗以南付新平陳留圉縣莽改曰益嵗新平故淮陽以雍丘以東付陳定陳定故梁郡以封丘以東付治亭治亭故東郡以陳留以西付祈隧祈隧故滎陽陳留已無復有郡矣大尹太尉皆詣行在所其號令變易皆此類也令天下小學戊子代甲子為六旬首冠以戊子為元日元善也昬以戊寅之旬為忌日昏謂娶妻也百姓多不從者寧始将軍侯輔免以講易祭酒戴參為寧始将軍二年二月置酒王路堂公卿大夫皆佐酒助行酒也大赦天下大司馬苗訢左遷司命以延徳侯陳茂為大司馬莽意以為制定則天下自平故鋭思於地理制禮作樂講合六經之説公卿旦入暮出論議連年不决不暇省獄訟寃結民之急務縣宰缺者數年守兼不拜正官權令太守兼一切貪殘日甚中郎将繡衣執法在郡國者竝乗權執傅相舉奏又十一公士分布勸農桑班時令按諸章冠盖相望交錯道路召㑹吏民逮捕證左郡縣賦斂遞相賕賂白黒紛然白黒謂清濁也紛然亂意也言清濁不分也守闕告訴者多莽自見前顓權以得漢政故務自㩜衆事有司受成苟免莽事事自决成熟乃以付吏吏苟免罪責而已諸寳物名帑藏錢榖官皆宦者領之吏民上封事書宦官左右開發尚書不得知其畏備臣下如此又好變改制度政令煩多當奉行者輙質問乃以從事質正也前後相乗憒眊不渫乗樍也登也憒眊不明渫㪚也徹也莽常御燈火至明猶不能勝尚書因是為姦寢事上書待報者連年不得去拘繫郡縣者奉赦而後出衛卒不交代三嵗矣榖常貴邉兵二十餘萬人仰衣食縣官愁苦五原代郡尤被其毒起為盗賊數千人為軰轉入旁郡莽遣捕盗将軍孔仁将兵與郡縣合撃嵗餘迺定邉郡亦略将盡言其逃亡結為盗賊在者少也邯鄲以北大雨霧水出深者數丈流殺數千人立國将軍孫建死司命趙閎為立國将軍寧始将軍戴參歸故官南城将軍亷丹為寧始将軍三年五月莽下吏禄制度曰予遭陽九之阸百六之㑹國用不足民人騷動自公卿以下一月之禄十緵布二疋緵八十縷也或帛一疋予毎念之未嘗不戚焉今阸㑹已度府帑雖未能充畧頗稍給其以六月朔庚寅始賦吏禄皆如制度四輔公卿大夫士下至輿僚凡十五等僚禄一嵗六十六斛稍以差増上至四輔而為萬斛莽又曰普天之下莫非王土率土之濵莫非王臣盖以天下養焉周禮膳羞百有二十品令諸侯各食其同國則謂公食同侯伯食國子男食則也辟任附城食其邑辟君也任公主也公卿大夫元士食其采謂因官職而食地也多少之差咸有條品嵗豐穰則充其禮有災害則有所損與百姓同憂喜也其用上計時通計天下幸無災害者太官膳羞備其品矣即有災害以什率多少而損膳焉東嶽太師立國将軍保東方三州一部二十五郡南嶽太傅前将軍保南方二州一部二十五郡西嶽國師寧始将軍保西方一州二部二十五郡北嶽國将衛将軍保北方二州一部二十五郡大司馬保納卿言卿仕卿作卿京尉扶尉兆隊右隊中部左洎前七部大司馬保此官皆如郡守也左與前故特七部洎及也大司徒保樂卿典卿宗卿秩卿翼尉光尉左隊前隊中部右部有五郡大司空保予卿虞卿共卿工卿師尉列尉祈隊後隊中部洎後十郡及六司六卿皆随所屬之公保其災害亦以什率多少而損其禄郎從官中都官吏食禄都内之委者以太官膳羞備損而為節言随其多少諸侯辟任附城郡吏亦各保其災害幾上下同心勸進農業安元元焉莽之制度煩碎如此課計不可理吏終不得禄各因官職為姦受取賕賂以自供給七月辛酉霸城門災民間所謂青門也長安城東出南頭名霸城門俗以其色青名曰青門戊子晦日有食之大赦天下復令公卿大夫諸侯二千石舉四行各一人依漢光禄之四科大司馬陳茂以日食免武建伯嚴尤為大司馬莽之伯子男號也十月平蠻将軍馮茂擊句町士卒疫死者什六七賦斂民財什取五益州虚耗而不克徴還下獄死更遣寧始将軍亷丹與庸部牧史熊擊句町頗斬首有勝莽徴丹熊丹熊願益調度必克乃還復大賦斂就都大尹馮英不肯給上言自越嶲遂久讐牛同亭邪豆之屬反畔以來積且十年遂乆縣名讐牛等越嶲旁夷郡縣距擊不已續用馮茂苟施一切之政僰道以南山險髙深茂多驅衆遠居費以億計吏士罹毒氣死者什七罹遭也今丹熊懼於自詭期㑹詭責也自以為憂責調發諸郡兵榖復訾民取其什四發人訾財十取其四也空破梁州功終不遂遂成也冝罷兵屯田明設購賞莽怒免英官後頗覺寤曰英亦未可厚非復以英為長沙連率四年五月莽曰保成師友祭酒唐林故諌議祭酒琅琊紀逡孝悌忠恕敬上愛下博通舊聞徳行醇備至於黄髪靡有愆失黄髪老稱謂白髪盡落更生黄者其封林為建徳侯逡為封徳侯位皆特進見禮如三公朝見之禮賜第一區錢三百萬授几杖焉六月更授諸侯茅土於明堂曰予制作地理建封五等考之經藝合之傳記通之於義理論之思之至於再三自始建國之元以來九年於茲廼今定矣予親設文石之平陳菁茅四色之土尚書禹貢苞匭菁茅儒者以為菁菜名也茅三脊茅也而莽此言以菁茅為一物則是謂善茅為菁茅也土有五色而此云四者中央之土不以封也欽告於岱宗泰社后土先祖先妣以班授之各就厥國養牧民人用成功業其在縁邉若江南非詔所召遣侍於帝城者納言掌貨大夫且調都内故錢予其禄調謂發取之公嵗八十萬侯伯四十萬子男二十萬然復不能盡得莽好空言慕古法多封爵人性實遴嗇託以地理未定故且先賦茅土用慰喜封者是嵗復明六筦之令每一筦下為設科條防禁犯者罪至死吏民抵罪者寖衆又一切調上公以下諸有奴婢者率一口出錢三千六百天下愈愁盗賊起納言馮常以六筦諌莽大怒免常官置執法左右刺姦選用能吏侯霸等分督六尉六隊如漢刺史與三公士郡一人從事八月莽親之南郊鑄作威斗威斗者以五石銅為之以五色藥石及銅為之若今作鍮石也若北斗長二尺五寸欲以厭勝衆兵既成令司命負之莽出在前入在御旁鑄斗日大寒百官人馬有凍死者天下吏以不得俸禄竝為姦利郡尹縣宰家累千金莽下詔曰詳考始建國二年邉方不靖以來諸軍吏及縁邉吏大夫以上為姦利増産致富者収其家所有財産五分之四以助邉急公府士馳傳天下考覆貪饕闗吏告其将奴婢告其主幾以禁姦姦愈甚以直道侯王渉為衛将軍渉曲陽侯根子成帝時為大司馬薦莽自代莽思之以曲陽非令稱乃追諡根曰直道讓公渉嗣其爵是嵗赤眉力子都樊崇等以饑饉相聚起於琅琊轉鈔掠衆皆萬數遣使者發郡國兵擊之不能克六年莽見盗賊多乃令太史推三萬六千嵗厯紀六嵗一改元布天下書曰紫閣圖曰太一黄帝皆僊上天張樂崑崙䖍山之上後世聖主得瑞者當張樂秦終南山之上長安南山詩所謂終南故秦地故言秦也予之不敏奉行未明乃今諭矣復以寧始将軍為更始将軍以順符命易不云乎日新之謂盛德生生之謂易易道生諸當生者也下繫之辭體化合變故曰日新予其饗哉欲以誑燿百姓銷解盗賦衆皆笑之初獻新樂於明堂太廟羣臣始冠麟韋之弁鹿皮冠也是時闗東饑旱數年力子都等黨衆寖多更始将軍亷丹擊益州不能克徴還更遣復位後大司馬䕶軍郭興庸部牧李􅁮擊蠻夷若豆等太傳羲叔士孫喜清潔江湖之盗賊而匈奴冦邉甚莽乃大募天下丁男及死罪囚吏民奴名曰豬突豨勇以為鋭卒令公卿以下至郡縣黄綬皆保養軍馬保養言不許其冇死失多少各以秩為差又博募有竒技術可以攻匈奴者将待以不次之位徴天下能為兵法者六十三家數百人竝以為軍吏選練武衛招募猛士旌旗輜重千里不絶周禮折羽為旌熊虎為旗輜車名謂軍糧什物雜載之以其累重故稱輜重時有長人巨無霸王莽連率韓博上言有竒士長一丈大十圍自謂巨無霸出於蓬萊東南五城西北昭如海濵軺車不能載三馬不能勝卧則枕皷以鉄著食長一丈大十圍以為壘尉軍壁曰壘尉者主壘之事又驅諸猛獸猛或作獷虎豹犀象之屬以助威武自秦漢出師之盛未嘗有也匈奴右骨都侯須卜當其妻王昭君女也嘗内附莽遣昭君兄子和親侯王歙誘呼當至塞下脅将詣長安強立以為須卜單于後安公單于者匃奴之號也後安公者中國之爵而加之欲出大兵以輔立之兵調度亦不合而匃奴愈怒竝入北邉北邉繇是壞敗㑹當病死莽以其庶女陸逯任妻後安公奢陸逯邑也莽改公主曰任奢本為侯莽以女妻之故追爵為公所以尊寵之甚厚終為欲出兵立之者言為此計意不止始欲誘迎當大司馬嚴尤諌曰當在匈奴右部兵不侵邉單于動静輙語中國此方靣之大助也於今迎當置長安藁街一胡人爾藁街蠻夷館所在也不如在匃奴有益莽不聽既得當欲遣尤與亷丹擊匃奴皆賜姓徴氏號二徴将軍當誅單于輿而立當代之輿者時見為單于之名出車城西横廏未發尤素有智畧非莽攻伐四夷數諌不從著古名将樂毅白起不用之意及言邉事凢三篇奏以諷諌莽及當出廷議尤固言匈奴可且以為後先憂山東盗賦莽大怒乃䇿尤曰視事四年蠻夷猾夏不能遏絶冦賊姦宄不能殄滅不畏天威不用詔命貎佷自臧持必不移貎佷言其佷戾見於容貎也臧善也自以為臧美固持其所見不可移易懷執異心非沮軍議沮壊也未忍致於理其上大司馬武建伯印韍韍者印之組歸故郡以䧏符伯董忠為大司馬翼平連率田況奏郡縣訾民不實舉百姓訾財不以實數莽復三十税一以況忠言憂國進爵為伯賜錢二百萬衆庶皆詈之青徐民多棄鄉里流亡老弱死道路壮者入賊中地皇元年從三萬六千嵗歴號也正月乙未大赦天下下書曰方出軍行師敢有趨讙犯法者輙論斬毋須時趨讙謂趨走讙譁須待也盡嵗止於是春夏斬人都市百姓震懼道路以目莽見四方盗賊多復欲厭之又下書曰予之皇初祖考皇帝定天下将兵為上将軍建華盖立斗獻謂斗魁及杓末如勺之形也内設大将軍外置大司馬五人大将軍二十五人偏将軍百二十五人裨将軍千二百五十人校尉萬二千五百人司馬三萬七千五百人侯十一萬二千五百人當百二十二萬五千人當亦官名百非其數士吏四十五萬人士千三百五十萬人應恊於易弧矢之利以威天下予受符命之文稽前人将條備焉稽考也考法於前人也於是置前後左右中大司馬之位賜諸州牧號為大将軍郡卒正連帥大尹為偏将軍屬令長裨将軍縣宰為校尉乗傳使者經厯郡國日且十軰倉無見榖以給傳車馬不能足賦取道中車馬於道中行者即執取之以充事也取辦於民七月大風毁王路堂復下書曰乃壬午晡時有烈風雷雨發屋折木之變烈風烈暴之風予甚弁焉予甚栗焉予甚恐焉弁疾也一曰弁撫手也言驚懼也伏念一旬迷廼觧矣先言烈風雷雨後言迷廼觧矣盖取舜納於大麓烈風雷雨不迷以為言也昔符命文立安為新遷王安莽第三子也莽改汝南新蔡曰新遷臨國雒陽為統義陽王是時予在攝假謙不敢當而以為公其後金匱文至義者皆曰臨國雒陽為統謂據土中為新室統也冝為皇太子自此後臨久病雖瘳不平朝見挈茵輿行有疾以執茵輿之行謂坐茵褥之上而令四人對挈茵之四角輿而行之也見王路堂者張於西廂及後閣更衣中張帳也更衣中謂朝賀易衣服處室屋名也又以皇后被疾臨且去本就舍妃妾在東永巷言臨侍疾故去其所本居而來就此止息是以妃妾在東永巷也壬午烈風毁王路西廂及後閣更衣中室昭寧堂池東南榆樹大十圍東僵擊東閣閣即東永巷之西垣也皆破折瓦壞發屋㧞木予甚驚焉又侯官奏月犯心前星厥有占予甚憂之伏念紫閣圖文太一黄帝皆得瑞以僊後世襃主登終南山襃主大主也所謂新遷王者乃太一新遷之後也太一黄帝欲令安追繼其後也統義陽王乃用五統以禮義登陽上遷之後也臨有兄而稱太子名不正宣尼公曰名不正則言不順至於刑罰不中民無所措手足措安置也惟即位以來陰陽未和風雨不時數遇枯旱蝗螟為災榖稼鮮耗百姓苦饑鮮少也耗虛也蠻夷猾夏冦賊姦宄人民正營無所措手足正營惶恐不安之貎深惟厥咎在名不正焉其立安為新遷王臨為統義陽王幾以保全二子子孫千億外攘四夷内安中國焉莽又見四方盗賊多欲視為自安能建萬世之基者乃下書曰予受命遭陽九之阨百六之㑹府帑空虚百姓匱乏宗廟未脩且祫祭於明堂太廟夙夜永念非敢寧息深惟吉昌莫良於今年予乃卜波水之北郎池之南惟玉食黄圖有西波池即池皆在石城南上林中玉食謂龜為玉兆之文而墨食也予又卜金水之南明堂之西亦惟玉食予将親築焉於是遂營長安城南盖所謂金水之南明堂之西也提封百頃九月甲申莽立載行視立載謂立而乗車也親舉築三下司徒王尋大司空王邑持節及侍中常侍執法杜林等數十人将作作領築作之人崔發張邯説莽曰徳盛者文縟文禮文也縟繁也冝崇其制度宣視海内且令萬世之後無以復加也莽乃博徴天下工匠諸圖畵以望法度算及吏民以義入錢榖助作者駱驛道路駱驛言不絶也壞徹城西苑中建章承光包陽大臺儲元宫及平樂當路陽禄館凡十餘所自逮章以下至陽禄皆上林苑中館取其財瓦以起九廟是月大雨六十餘日令民入米六百斛為郎其郎吏増秩賜爵至附城九廟一曰黄帝太初祖廟二曰帝虞始祖昭廟三曰陳胡王統祖穆廟四曰齊敬王世祖昭廟五曰濟北愍王王祖穆廟凡五廟不堕云六曰濟南伯王尊禰昭廟七曰元城孺王尊禰穆廟八曰陽平頃王戚禰昭廟九曰新都顯王戚禰穆廟殿皆重屋太初祖廟東西南北各四十丈高十七丈餘廟半之為銅薄櫨薄櫨柱上枅即今所謂㭼也飾以金銀琱文窮極百工之巧帶高増下本因高地而建立之其旁下者更増築功費數百鉅萬卒徒死者萬數鉅鹿男子馬適求等謀舉燕趙兵以誅莽大司空士王丹發覺以聞莽遣三公大夫逮治黨與逮謂逮捕之也連及郡國豪傑數千人皆誅死丹為輔國侯自莽為不順時令百姓怨恨莽猶安之又下書曰惟設此一切之法以來常安六鄉巨邑之都枹皷稀鳴盗賊衰少巨大也枹所以擊皷者也百姓安土嵗以有年此乃立權之力也今胡虜未滅誅蠻僰未絶焚江湖海澤麻沸盗賊未盡破殄麻沸言如亂麻而沸涌乂興奉宗廟社稷之大作民衆動揺今復一切行此令盡二年止之以全元元救愚姦太傅平晏死以予虞唐尊為太傳是時南郡張霸江夏羊牧王匡等起雲杜緑林號曰下江兵木起江夏雲杜縣後分西兵入南郡屯藍田故號下江衆皆萬餘人武功中水鄉民三舍墊為池墊䧟二年正月以州牧位三公刺舉怠觧更置牧監副秩元士冠法冠行事如漢刺史是月莽妻死諡曰孝睦皇后葬渭陵長壽園西令永侍文母名陵曰億年新遷王安病死初莽為侯就國時幸侍者増秩懷能開明懐能生男興増秩生男匡女曄開明生女㨗皆留新都國以其不明故也言侍者或與外人私通所生子女不可分明也及安疾甚莽自病無子為安作奏使上言興等母雖㣲賤屬猶皇子不可以棄章視羣公以所上之章徧示之皆曰安友於兄弟冝及春夏加封爵於是以王車遣使者迎興等封興為功脩公匡為功建公曄為睦脩任捷為睦逮任孫公明公壽病死旬月四䘮焉莽壞漢孝武孝昭廟分葬子孫其中魏成大尹李焉與卜者王況謀況謂焉曰新室即位以來民田奴婢不得賣買數改錢貨徴發煩數軍旅騷動四夷竝侵百姓怨恨盗賊竝起漢家當復興君姓李李音徴徴者火也當為漢輔因為焉作䜟書言文帝發忿居地下趣軍北告匃奴南告越人江中劉信執敵報怨復續古先四年當發軍江湖有盗自稱楚王姓為劉氏萬人成行不受赦令欲動秦雒陽十一年當相攻太白揚光嵗星入東井其號當行號謂號令也又言莽大臣吉㓙各有日期㑹合十餘萬言焉令吏冩其書吏徃告之莽遣使者即捕焉獄治皆死三輔盗賊麻起言起者亂如麻也乃置捕盗都尉官令執法謁者追擊長安中建鳴皷攻賊幡而使者随其後遣太師羲仲景尚更始将軍䕶軍王黨将兵擊青徐國師和仲曹放助郭興撃句町轉天下榖幣詣西河正原朔方漁陽每一郡以百萬數欲以擊匃奴秋隕霜殺菽闗東大饑蝗民犯鑄錢伍人相坐沒入為官奴婢其男子檻車兒女子歩以鐵鏁琅當其頸傳詣鍾官以十萬數琅當長鏁也鍾官主鑄錢之官也到者易其夫婦改相配匹不依其舊也愁苦死者什六七孫熹景尚曹放等擊賊不能克軍師放縱百姓重困莽以王況䜟言荆楚當興李氏為輔欲厭之廼拜侍中掌牧大夫李棽為大将軍揚州牧賜名聖改其舊名以聖代䜟使将兵奮擊上谷儲夏自請願説𤓰田儀儲夏人姓也莽以為中郎使出儀説之令自出儀文降未出而死上文書言䧏而身未出莽求其屍葬之為起塜祠室諡曰𤓰寧殤男幾以招來其餘然無肯降者閏月丙辰大赦天下天下大服民私服在詔書前亦釋除初四方皆以饑寒窮愁起為盗賊稍稍羣聚嘗思嵗熟得歸鄉里衆雖萬數亶稱巨人從事三老祭酒言不為大號不敢畧有城邑轉掠求食日闋而已言随日而盡也諸長吏牧守皆自亂鬬中兵而死中傷也賊非敢欲殺之也而莽終不諭其故謂不曉此意也是嵗大司馬士按章豫州有上章相告者就而按治之為賊所獲賊送付縣士還上書具言状莽大怒下獄以為誣罔因下書責七公曰夫吏者理也宣徳明恩以牧養民仁之道也抑彊督姦捕誅盗賊義之節也今則不然盗發不輙得至成羣黨遮畧乗傳宰士士得脱者又妄自言我責數賊何故為是賊曰以貧窮故爾賊䕶出我今俗人議者率多若此惟貧困饑寒犯法為非大者羣盗小者偷穴不過二科穴謂穿牆為盗也今乃結謀連黨以千百數是逆亂之大者豈饑寒之謂邪七公其嚴敕卿大夫卒正連率庶尹謹牧養善民急捕殄盗賊有不同心并力疾惡黜賊而妄曰饑寒所為輙捕繫請其罪於是羣下愈恐莫敢言賊情者亦不得擅發兵賊繇是遂不制唯翼平連率田況素果敢發民年十八以上四萬餘人授以庫兵與刻石為約赤麋聞之不敢入界麋眉也以朱塗眉故曰赤眉古字通用况自劾奏莽讓况讓責也未賜虎符而擅發兵此弄兵也厥辠乏興擅發之罪與乏軍興同科也以況自詭必擒滅賊故且勿治詭責也自以為憂責後況自請出界擊賊所嚮皆破莽以璽書令況領青徐二州牧事況上言盗賊始發其原甚㣲非部吏伍人所能擒也咎在長吏不為意縣欺其郡郡欺朝廷實百言十實千言百朝廷忽畧不輙督責遂至延蔓連州乃遣将率多發使者傳相監趣郡縣力事上官應塞詰對力勤也塞當也共酒食具資用以救斷斬交懼斬死之刑也不給復憂盗賊治官事給暇也將卒又不能躬率吏士戰則為賊所破吏氣寖傷徒費百姓寖漸也前幸蒙赦令賊欲觧㪚或反遮擊恐入山谷轉相告語故郡縣䧏賊皆更驚駭恐見詐滅因饑饉易動旬日之間更十餘萬人此盗賊所以多之故也今雒陽以東米石二千竊見詔書欲遣太師更始将軍二人爪牙重臣多從人衆道上空竭少則亡以威視遠方冝急選牧尹以下明其賞罰收合離鄉小國無城郭者徙其老弱置大城中積藏榖食并力固守賊來攻城則不能下所過無食勢不得羣聚如此招之必降擊之則滅今空復多出將率郡縣苦之反甚於賊冝盡徴還乗傳諸使者以休息郡縣委任臣况以二州盗賊必平定之莽畏惡況陰為發代遣使者賜況璽書使者至見況因令代監其兵況随使者西到拜為師尉大夫況去齊地遂敗册府元龜卷九百十二
