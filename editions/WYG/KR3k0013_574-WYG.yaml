body:
  text: 冊府元龜卷五百七十四宋王欽若等撰掌禮部奏議第二後漢杜林為侍御史光武建武七年大議郊祀制多以為周郊后稷漢當祀堯詔復下公卿議議者僉同光武亦然之林獨議曰當今政卑易行禮簡易從人無愚智思仰漢德基業特起不因縁堯堯逺於漢人不曉信言提其耳終不恱諭后稷近周人所知之又據以興基繇其祚詩曰不愆不忘率繇舊章宜如舊制以觧天下之惑張純為五官中郎将以宗廟未定昭穆失序建武十九年乃與太僕朱浮共奏言陛下興於匹庻蕩滌天下誅鉏暴亂興繼祖宗竊以經義所紀人事衆心雖同創革而名為中興宜奉先帝恭承祭祀者也元年以來宗廟奉祀髙皇帝為受命祖孝文皇帝為太宗孝武皇帝為世宗皆如舊制又立親廟四世推南頓君以上盡於舂陵節侯禮為人後者則為之子既事大宗則䧏其私親今禘祫髙廟陳序昭穆而舂陵四世君臣竝列以卑厠尊不合禮意設不遭王莽而國嗣無寄推求宗室以陛下繼統者安得復顧私親違禮制乎昔髙帝以自受命不繇太上宣帝以孫後祖不敢私親故為父立廟獨羣臣侍祠臣愚謂宜除今親廟以則二帝舊典願下有司博採其議詔下公卿大司徒戴渉大司空竇融議宜以宣元成哀平五帝四世代今親廟宣元皇帝尊為祖父可親奉祀成帝以下有司行事别為南頓君立皇考廟其祭上至舂陵節候羣臣奉祀以明尊尊之敬親親之恩帝從之是時宗廟未備自元帝以上祭於雒陽髙廟成帝以下祀於長安髙廟其南頓四世隨所在而祭焉二十六年詔純曰禘祫之祭不行已久矣三年不為禮禮必壊三年不為樂樂必廢宜據經典詳為其制純奏曰禮三年一祫五年一禘春秋傳曰大祫者何合祭也毁廟及未毁廟之主皆登合食乎太祖五年而再殷漢舊制三年一祫毁廟主合食髙廟存廟主未甞合祭元始五年諸王公列侯廟㑹始為禘祭又前十八年親幸長安亦行此禮禮說三年一閏天氣小備五年再閏天氣大備故三年一祫五年一禘禘之為言諦諦定昭穆尊卑之義也禘祭以夏四月夏者陽氣在上隂氣在下故正尊卑之義也祫祭以冬十月冬者五榖成熟物備禮成故合聚飲食也斯典之廢於兹八年謂可如禮施行以時定議帝從之自是禘祫遂定曹褒章帝元和初為博士二年詔曰朕以不德膺祖宗𢎞烈乃者鸞鳯仍集麟龍竝臻甘露霄䧏嘉榖滋生赤草之類紀於史官朕夙夜祗畏上無以彰於先功下無以克稱靈物漢遭秦餘禮壊樂隳且因循故事未可觀省有知其說者各盡所能褒省詔乃嘆息謂諸生曰昔奚斯頌魯考甫詠殷夫人臣依義顯君竭忠彰聖行之美也當仁不讓吾何辭焉遂復上疏具陳禮樂之本制改之意拜褒侍中從駕南廵既還以事下三公未及奏詔召𤣥武司馬班固問改定禮制之宜固曰京師諸儒多能說禮宜廣招集共議得失帝曰諺言作舍道旁三年不成㑹禮之家名為聚訟互生疑異筆不得下昔堯作大章一䕫足矣章和元年正月乃詔褒詣嘉德門令小黄門持班固所上叔孫通漢儀十二篇勅褒曰此制散畧多不合經今宜依禮條正使可施行於南宫東觀盡心集作褒既受命乃次序禮事以凖舊典雜以五經䜟記之文撰次天子至於庻人冠㛰吉㓙終始制度以為百五十篇寫以二尺四寸簡其年十二月奏上帝以衆論難一故但納之不復令有司平奏和帝即位褒乃為作章句帝遂以新禮二篇冠擢褒監羽林左騎永元四年遷射聲校尉後太尉張酺尚書張敏等奏褒擅制漢禮破亂聖術宜加刑誅帝雖寝其奏而漢禮遂不行張奮和帝永元中為司徒罷在家上疏曰聖人所美政道至要本在禮樂五經同歸而禮樂之用尤急孔子曰安上治民莫善於禮移風易俗莫善於樂又曰揖讓而化天下者禮樂之謂也先王之道禮樂可謂盛矣孔子謂子夏曰禮以修外樂以制内丘已矣夫又曰禮樂不興則刑罰不中刑罰不中則民無所措其手足臣以為漢當制作禮樂是以先帝盛德數下詔書愍傷隳缺而衆儒不逹議多駮異臣累世台輔而大典未定私竊惟憂不忘寝食臣犬馬齒盡誠兾先死見禮樂之定十三年更詔拜太常復上疏曰漢當改作禮樂圗書著明王者化定制禮功成作樂謹條禮樂異議三事願下有司以時考定昔者孝武皇帝光武皇帝封禪告成而禮樂不定事不相副先帝以詔曹褒今陛下但奉而成之猶周公斟酌文武之道非自為制誠無所疑乆執謙讓令大漢之業不以時成非所以章顯祖宗功德建太平之基為後世法帝雖善之猶未施行陳忠為尚書安帝元初三年有詔大臣得行三年喪服闋還職忠因此上言孝宣皇帝舊令人從軍屯及給事縣官者父母死未滿三月皆無徭令得𦵏送請依此制太后從之至建光中尚書令祝諷祝或作祋尚書孟布等奏以為孝文皇帝定約禮之制光武皇帝絶告寕之典貽則萬世誠不可改宜復建武故事忠上疏曰臣聞之孝經始於愛親終於哀戚上自天子下至庻人尊卑貴賤其義一也夫父母於子同氣異息一體而分三年乃免於懐抱先聖縁人情而著其節制服二十五月是以春秋臣有大喪君三年不呼其門閔子雖要絰服事以赴公難退而致位以究私恩故稱君使之非也臣行之禮也周室陵遲禮制不序蓼莪之人作詩自傷曰缻之罄矣惟罍之耻言已不得終竟子道者亦上之耻也髙祖受命蕭何創制大臣有寜告之制合於致憂之義建武之初新承大亂凡諸國政多趨簡易大臣既不得告寕而羣司營禄念私鮮循三年之喪以報顧復之恩者禮義之方實為彫損大漢之興雖承衰弊而先王之制稍以施行故藉田之耕起於孝文孝亷之貢發於孝武郊祀之禮定於元成三雍之序備於顯宗大臣終喪成乎陛下聖功美業靡以尚兹孟子有言老吾老以及人之老㓜吾㓜以及人之㓜天下可運於掌臣願陛下登髙北望以甘陵之思揆度臣子之心則海内咸得其所宦豎不便之竟寢忠奏周舉為大鴻臚梁太后臨朝詔以殤帝冲㓜廟次宜在順帝下太常馬訪奏宜如詔書諫議大夫吕勃以為應依昭穆之序先殤帝後順帝詔下公卿舉議曰春秋魯閔公無子庶兄僖公代立其子文公遂躋僖于閔上孔子譏之書曰有事於太廟躋僖公傳曰逆祀也及定公正其序經曰從祀先公為萬世法也今殤帝在先於秩為父順帝在後於親為子先後之義不可改昭穆之序不可亂吕勃議是也太后下詔從之蔡邕靈帝時為郎中上封事曰明堂月令天子以四立及季夏之節迎五帝於郊所以𨗳致神氣祈福豐年清廟祭祀追往孝敬養老辟雍示人禮化皆帝者之大業祖宗所祗奉也而有司數以蕃國疎喪宫内産生及吏卒小汙屢生忌故竊見南郊齊戒未甞有廢至於它祀輙興異議豈南郊卑而它祀尊哉孝元皇帝䇿書曰禮之至敬莫重於祭所以竭心親奉以致肅祗者也又元和故事復申先典前後制書推心懇惻而近者以來更任太史忘禮敬之大任禁忌之書拘信小故以虧大典禮妻妾産者齋則不入側室之門無廢祭之文也所謂宫中有卒三月不祭者謂士庻人數堵之室共處其中耳豈謂皇居之曠臣妾之衆哉自今齋制宜如故典庻答風霆災妖之異書奏帝乃親迎氣北郊及行辟雍之禮後為左中郎将奏議曰漢承亡秦㓕學之後宗廟之制不用周禮毎帝即位世輙立一廟不止於七不列昭穆不定迭毁元皇帝時丞相匡衡御史大夫貢禹始建大議請依典禮孝文孝武孝宣皆以功德茂盛為宗不毁孝宣尊崇孝武歴稱世宗中正大夫夏侯勝等猶執異議不應為宗至孝成皇帝議猶不定太僕王舜中壘校尉劉歆據不可毁上從其議古人據正重順不敢私其君若此其至也後遭王莽之亂光武皇帝受命中興廟稱世祖孝明皇帝聖德聰明政叅文宣廟稱顯宗孝章皇帝至孝烝烝仁惠博大廟稱肅宗皆方前世得禮之宜自此以下政事多釁權移臣下嗣帝殷勤各􅁒褒崇至親而已臣下懦弱莫能執夏侯之直今聖朝遵古復禮以求厥中誠合禮儀元帝世在第八光武世在第九故以元帝為考廟尊而奉之孝明遵述亦不敢毁孝和以下穆宗威宗之號皆省去五年而再殷合食於太祖以遵先典議遂施行魏董遇漢末為黄門侍郎既詣鄴轉為散冗甞從太祖西征道繇孟津過𢎞農王冢太祖疑欲謁顧問左右左右莫對遇乃越第進曰春秋之義國君即位未踰年而卒未成為君𢎞農王即位既淺又為暴臣所制降在藩國不應謁太祖乃過常林為太常明帝太和中魯相上言漢舊立孔子廟褒成侯嵗時奉祀辟雍行禮必祭先師王家出榖春秋祭祀今宗聖侯奉祠未有命祭之禮宜給牲牢長吏奉祀尊為貴神制三府議博士傳祗以春秋傳言立在祀典則孔子是也宗聖適足繼絶世章盛德耳至於顯立言崇明德則宜如魯相所上林議以為宗聖侯亦以王命祀不為未有命也周武王封黄帝堯舜之後及三恪禹湯之世不列於時或特命他官祭也今周公以上逹於三皇忽焉不祀而其禮經亦存其言今獨祀孔子者以世近故也以大夫之後特受無疆之祀禮過古帝義踰湯武可謂崇明報德矣無復重祀於非族也髙堂隆青龍中為侍中領太史令以為改正朔易服色殊徽號異噐械自古帝王所以神明其政變民耳目故三春稱王明王統也於是敷演舊章奏而改焉明帝從其議晉杜預為尚書武帝太始十年既𦵏楊皇后於峻陽陵依舊制帝及羣臣除喪即吉先是尚書祠部奏從博士張靖議皇太子亦從制俱釋服博士陳逵議以為今制所依盖漢帝權制興於有事非禮之正皇太子無有國事自宜終服有詔更詳議預以為古者天子諸侯三年之喪始同齊斬既𦵏除喪服諒闇以居心喪終制不與士庻同禮漢氏承秦天下為天子修服三年漢文帝見其下不可乆行而不知古制更以意制祥禫除喪即吉魏氏直以訖𦵏為節嗣君皆不復諒闇終制學者非之乆矣然竟不推究經傳考其行事專謂王者三年之喪當以衰麻終二十五月嗣君茍若此則天子羣臣皆不得除喪雖志在居篤更通而不行至今世主皆從漢文輕典繇處制者非制也今皇太子與尊同體宜復古典卒哭除衰麻以諒闇終制於義既不應不除又無取於漢文乃所以篤喪禮也於是尚書僕射盧欽尚書魏舒問預證據所依預云傳稱三年之喪自天子逹此謂天子絶朞唯有三年喪也非謂居喪衰服三年與士庶同也故后世子之喪而叔向稱有三年之喪二也周公不言髙宗服喪三年而云諒闇三年此釋服心喪之文也叔向不譏景王除喪而譏其燕樂已早明既𦵏應除而違諒闇之節也春秋晉侯享諸侯子産相鄭伯時簡公未𦵏請免喪以聽命君子謂之得禮宰咺來歸惠公仲子之賵傳曰弔生不及哀此皆既𦵏除喪諒闇之證先儒舊說往往亦見學者未之思耳喪服諸侯為天子亦斬衰豈可謂終服三年耶上考七代未知王者君臣上下衰麻三年者誰下推将來恐百世之主其理一也非必不能乃事勢不得故知聖人不虚設不行之制仲尼曰禮所損益雖百世可知此之謂也於是欽舒從之遂命預造議奏曰侍中尚書令司空魯公臣賈充侍中尚書僕射奉車都尉大梁侯臣盧欽尚書新沓伯臣山濤尚書奉車都尉平春侯臣胡威尚書劇陽子臣魏舒尚書堂陽子臣石鑒尚書豐樂亭侯臣杜預稽首言禮官叅議博士張靖等議以為孝文權制三十六日之服以日易月道有汚隆禮不得全皇太子亦宜割情除喪博士陳逵等議以為三年之喪人子所以自盡故聖人制禮自上逹下是以今制将使諸遭父母喪皆假寕二十五月敦崇孝道所以風化天下皇太子至孝著於内而衰服除於外非禮所謂稱情者也宜其不除臣欽臣舒臣預謹按靖逵等議各見所學之一端未統帝者居喪古今之通禮也自上及下尊卑貴賤物有其宜故禮有以多為貴者有以少為貴者有以髙為貴者有以下為貴者唯其稱也不然則本末不經行之不逺天子之與羣臣雖哀樂之情若一而所居之宜實異故禮不得同易曰上古之世喪期無數虞書稱三載四海遏宻八音其後無文至周公旦乃稱殷之髙宗諒闇三年不言其傳曰諒信也闇黙也下逮五百餘嵗而子張疑之以問仲尼仲尼答云何必髙宗古之人皆然君薨百官總已以聽於冢宰三年周景王有后世子之喪既𦵏除喪而樂晉叔向譏之曰三年之喪雖貴遂服禮也王雖弗遂宴樂已早亦非禮也此皆天子喪事見於古文者也稱髙宗不云服喪三年而云諒闇三年此釋服心喪之文也譏景王不譏其除喪而譏其宴樂已早明既葬應除而違諒闇之節也堯喪舜諒闇三年故稱遏宻八音繇此言之天子居喪齊斬之制苴杖絰帶當遂其服既葬而除諒闇以終三年無改父之道故百官總已聽於冢宰喪服已除故稱不言之美明不復寝苫枕塊以荒大政也禮記三年之喪自天子逹又云父母之喪無貴賤一也又云端衰喪車皆無等此通謂天子居喪衣服之節同於凡人心喪之禮終於三年亦無服喪三年之文然繼體之君猶多荒寧自從廢諒闇之制至今髙宗擅名於往代子張致疑於當時此乃賢聖所以為譏非譏天子不服終喪也秦燔書籍率意而行亢上抑下漢祖草創因而不革乃至率天下皆終重服旦夕哀臨經罹寒暑禁塞嫁娶飲酒食肉制不稱情是以孝文遺詔歛畢便葬葬畢制紅禫之除雖不合髙宗諒闇之義近於古典故傳之後嗣於時預營陵廟故歛葬得在浹辰之内因以定制近至明帝存無陵寝五旬乃葬安在三十六日此當時經學疏畧不師前聖之病也魏氏革命以既葬為節合於古典然不垂心諒闇同譏前代自㤗始開元陛下追遵諒闇之禮慎終居篤允臻古制超絶於殷宗天下歌德誠非靖等所能原本也天子諸侯之禮當以具矣諸侯惡其害己而削其籍今其存者唯士喪一篇戴聖之記雜錯其間亦難以取正天子之位至尊萬機之政至大羣臣之衆至廣不同之於凡人故大行既葬祔祭於廟則因疏而除之已不除則羣臣莫敢除故屈己以除之而諒闇以終制天下之人皆曰我王之仁也屈己以從宜皆曰我王之孝也既除而心喪皆曰我王猶若此之篤也凡等臣子亦焉得不勉以崇禮此乃聖制移風易俗之本髙宗所以致雍熙豈唯衰裳而已哉若如難者更以權制自居疑於屈伸厭降欲以職事為斷則父在為母朞父卒三年此以至親屈於至尊之義也出母之喪以至親為屬而長子不得有制體尊之義升降皆從不敢獨也禮諸子之職掌國子之倅國有事則帥國子而致之太子惟所用之傳曰君行則守有守則從從曰撫軍守曰監國不無事矣喪服母為長子妻為夫妾為主皆三年内宫之主可謂無事揆度漢制孝文之喪紅禫既畢孝景即吉於未央薄后竇后必不得齊斬於别宫此可知也况皇太子配貳至尊與國為體固宜逺遵古禮近同時制屈除以寛諸下恊一代之成典君子之於禮有直而行有曲而殺有經而等有順而去之存諸内而已禮云非玉帛之謂喪云唯衰麻之謂乎此既臣等所謂經制大義且即實近言亦有不安今皇太子至孝烝烝發於自然號咷之慕匍匐殯宫大行既奠往而不反必想像平故彷徨寝殿若不便從諒闇則東宫臣僕義不釋服此為永福官屬當獨衰麻從事出入殿省亦難以繼今将吏雖蒙同二十五月之事寕至於大臣亦奪其制昔翟方進自以身為漢相居喪三十六日不敢踰國典而况於皇太子臣等以為皇太子宜如前奏除服諒闇終制於是太子遂以厭䧏之議從國制除衰麻諒闇終制於時外内卒聞預異議多恠之或者乃謂其違禮以合時時預亦不自觧說退使博士殷暢博採典籍為之證據令大義著明足以垂示将來暢承預㫖遂撰集書傳舊文條諸實事成言以為定證以𢎞指趣其傳記有與今議同者亦具列之博舉一隅明其會歸以證斯事魏舒為左僕射領吏部太康初上言今選六宫聘以玉帛而舊使御府丞奉聘宣成嘉禮䞇重使輕以為拜三夫人宜使卿九嬪使五官中郎将美人良人使謁者於典制為𢎞有詔詳之衆議異同遂寝華嶠為散騎常侍太康六年奏議曰先王之制天子諸侯親耕耤田千畆后夫人躬蠶桑宫今陛下以聖明至仁修先王之緒皇后體資生之德合配乾之義而坤道未光蠶禮尚闕宜依古式備斯盛典詔曰昔天子親耤以供粢盛后夫人躬蠶以備祭服所以聿遵孝敬明教示訓也今籍田有制而蠶禮不備繇中間務多未暇崇備今天下無事宜修禮以示四海其詳依古典及近代故事以叅今宜明年施行於是蠶於西郊盖於耤田對其方也乃使侍中成粲草定其議朱整為尚書武帝太康八年有司奏婚納徴大婚用𤣥纁束帛加珪馬二駟王侯𤣥纁束帛加璧乘馬大夫用𤣥纁束帛加羊古者以皮馬為庭實天子加以榖珪諸侯加大璋可依周禮改璧用璋其羊鳫酒米𤣥纁如故諸侯婚禮加納采告期親迎各帛五疋及納徴馬四匹皆令夫家自備惟璋官為具致之整議按魏氏故事王娶妃公主嫁之禮天子諸侯以皮馬為庭實天子加以榖珪諸侯加以大璋漢髙后制聘后黄金二百斤馬十二匹夫人金五十斤馬四匹魏氏王娶妃公主嫁之禮用絹百九十疋晉興故事用絹三百疋詔曰公主嫁繇夫氏不宜皆為備物賜錢使足而已惟給璋餘如故事傅咸為車騎司馬晉初仍魏大社有稷而官社無稷故二社一稷至太康九年改建宗廟而社稷祠壇與廟俱徙乃詔曰社實一神其并二社之祀咸表曰祭法王社太社各有其義天子尊事宗廟故冕而躬耕也者所以重孝享之粢盛親耕故自報自為立社者為耤田而報者也國以人為本人以榖為命故又為百姓立社而祈報焉事異報殊此社之所以有二也王景侯之論王社亦謂春祈耤田秋而報之也其論太社則曰王者布下圻内為百姓立之謂之太社不自立之於京都也景侯此論據祭法大夫以下成羣立社曰置社景侯觧曰今之里社是也景侯觧祭法則以置社為人間之社矣而别論復以太社為人間之社未曉此㫖也太社天子為百姓而祀故稱天子社郊特牲曰天子太社必受霜露風雨以羣姓之衆王者通為立社故稱太社也若夫置社其數不一蓋以里所為名左氏傳盟於清丘之社是衆庻之社既已不稱太矣若復不立之京都當安所立乎祭法又曰王為羣姓立七祀王自為立七祀言自為者自為而祀也為羣姓者為羣姓而祀也太社與七祀其文正等說者窮此因云墳籍但有五祀無七祀也按祭五祀國之大祀七者小祀周禮所云祭凡小祀則墨冕之屬也景侯觧大厲曰如周社鬼有所歸乃不為厲今云無二社者稱景侯祭法不謂無二則曰口傳無其文也夫以景侯之明擬議而後為觧而欲以口論除明文如此非但二社當見思惟景侯之觧亦未易除也前被勅尚書召誥乃社於新邑惟一太牢不二社之明義也按郊特牲曰社稷太牢必援一牢之文以明社之無二明稷無牲矣說者曰舉社則稷可知茍可舉社以明稷何獨不舉一以明二國之大事在祀與戎若有二而除之不若過而存之况存之有義而除之無據乎周禮封人掌社設壝無稷字今帝社無稷蓋出於此然國主社稷故經傳動稱社稷周禮王祭社稷則絺冕此王社有稷之文也封人所掌壝之無稷字說者以為畧文從可知也謂宜仍舊立二社而加立帝社之稷時成粲議稱景侯論太社不立京都欲破鄭氏學咸奏表以為祭法之論景侯之觧交以此壊大雅云乃立冡土毛公觧曰冡土太社也景侯觧詩即用此說禹貢惟土五色景侯觧曰王者取五色土為太社封四方諸侯各割其方色王者覆四方也如此太社復為立京都也不知此論何從而出而與觧乖上違經記明文下壊景侯之觧臣雖頑蔽少長學門不能黙也謹復續上劉實與咸議同詔曰社稷一神而相襲二位衆議不同何必改作其便仍舊議一如魏制其後摯虞奏以為臣按祭法王為羣姓立社曰太社王自立社曰王社周禮大司徒設其社稷之壝又曰以血祭祭社稷則太社也又曰封人掌設王之社壝又有軍旅宜乎社則王社也太社為羣姓祈報祈報有時主不可廢故凡祝社釁皷王奉以從是也此皆二社之明文前代之所尊以尚書召誥社於新邑三牲各文詩稱乃立冡土無兩社之文故廢帝社惟立太社詩書所稱各指一事又皆在公旦制作之前未可以易周禮之明典祭法之正義前改建廟社營一社之處朝議斐然執古正今世祖武皇帝躬發明詔定二社之義以為永制宜定新禮從二社詔從之至元帝建武元年又依雒京立二社一稷其太社之祝曰地德普施惠存無疆乃建太社保佑萬邦悠悠四海咸頼嘉祥其帝社之祝曰坤德厚載邦畿是保乃建帝社以神地道明祀惟辰景福來造摯虞為尚書郎先是明堂郊祀以文帝配後復以宣帝尋復還以文帝配其餘無所變革是則郊與明堂同配異配參差不同矣虞議以為漢魏故事明堂祀五帝之神新禮五帝即上帝即天帝也明堂除五帝之位惟祭上帝按仲尼稱郊祀后稷以配天宗祀文王於明堂以配上帝周禮祀天旅上帝祀地旅四望四望非地則上帝非天斷可識矣郊丘之祀掃地而祭牲用繭栗器用陶匏事反其始故配以逺祖明堂之祭備物以薦三牲竝陳籩豆成列禮同人理故配以近考郊堂兆位居然異體牲幣品物質文殊趣且祖考同配非謂尊嚴之美三日再祀非謂不黷之義其非一神亦足明矣昔在上古生為明王沒則配五行故太昊配木神農配火少昊配金顓頊配水黄帝配土此五帝者配天之神同兆之於四郊報之於明堂祀天大裘而冕祀五帝亦如之或以為五精之帝佐天育物者也前代相因莫之或廢晉初始從異議庚午詔書明堂及南郊除五帝之位惟祀天神新禮奉而用之前太醫令韓楊上書宜如舊祀五帝太康十年詔己施用宜定新禮明堂及郊祀五帝如舊議詔從之又漢魏故事王公羣妾見於夫人夫人不答拜晉新禮以為禮無不答更制妃公侯夫人答妾拜虞以為禮妾事女君猶婦之事姑妾服女君朞女君不報則敬與婦同而又加賤也名位不同本無酬報禮無不答義不謂此先聖殊嫡庻之别以絶陵替之漸峻明其防猶有僣違宜定新禮自如其舊詔可其議又漢魏故事皇太子稱臣晉新禮以太子既以子為名而又稱臣臣子兼稱於義不通除太子稱臣之制虞以為孝經資於事父以事君義兼臣子則不嫌稱臣宜定新禮皇太子稱臣如舊詔從之賈充武帝時為司空尚書河南尹王恂上言𢎞訓太后入廟合食於景皇帝齊王攸不得行其子禮充議以為禮諸侯不得祖天子公子不得禰先君皆謂奉統承祀非謂不得服其父祖也攸身宜服三年喪事自如臣制有司奏若如充議服子服行臣制未有前比宜如恂表攸喪服從諸侯之例帝從充議束晢為賊曹屬惠帝元康六年禖壇石中破為二詔問䂖毁今應復不博士議禮無髙禖置石之文未知造設所繇既已毁破可無改造更下西府博議晢議以為䂖在壇上蓋主道也祭噐弊則埋而置新今宜埋而更造不宜遂廢時此議不用後得髙堂隆故事魏青龍中造立此䂖詔更鐫謝衡為散騎常侍惠帝太安元年三月皇太孫尚薨有司奏御服齊衰朞詔通議衡以為諸侯之太子誓與未誓尊卑體殊喪服云為嫡子長殤謂未誓也已誓則不殤也中書令卞粹曰太子始生故已尊重不待命誓若衡議已誓不殤則元服之子當斬衰三年未誓而殤則雖十九當大功九月誓與未誓其為升䧏也㣲斬與大功其為輕重也逺而今注云諸侯不降嫡殤重嫌于無服以大功為重嫡之服則雖誓無復有三年之理明矣男能奉衞社稷女能奉婦道各以可成之年有已成之事故可無殤非孩齓之謂也殤後者尊之如父猶無所加而止殤服况以天子之尊為無服之殤行成人制耶凡諸宜重之殤皆士大夫不加服而令至尊獨居其重未之前聞也博士蔡克同粹秘書監摯虞議太子初生舉以成人之禮則殤理除矣太孫亦體君傳重繇位成而服全非以年也天子無服殤之義絶朞故也於是從之冊府元龜卷五百七十四
