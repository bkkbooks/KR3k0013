body:
  text: 册府元龜卷一百五十五宋王欽若等撰帝王部督吏夫官者治亂之攸繫吏者師表之斯屬自堯舜垂拱夏商用乂逮夫周室有以寧之盛斯皆官得其人民安其業上下熈洽同底於道者也及叔世多偽淳風不競羣吏之政或愆或忘罕能脩舉幾於曠廢或以㓕裂為簡或以苛刻為公官邪而姦生禁宻而俗弊淪胥以敗罔克攸濟於是乎申嚴號令誕布條教周旋敷諭丁寧欵宻乃至形於殿最以儆其違峻其舉察以懲其枉乃至丞弼之重左右之臣誥之以告猷訓之以裕蠱逮乎㓂竊姦宄董其逐捕農桑稼穡急其勸課斯亦敏政之大端責實之舊典也漢景帝後二年夏四月詔曰强毋攘弱衆毋暴寡老耆以夀終幼孤得遂長今歳或不登民食頗寡其咎安在或詐偽為吏詐自稱吏吏以貨賂為市漁奪百姓侵牟萬民牟食苗根蟲也縣丞長吏也姧法與盜盜甚無謂也姧法因法作姧也與盜謂盗者當治而知情反佐與之是則共盗無異也其令二千石各脩其職不事官職耗亂者丞相以聞請其罪耗不明也讀與眊同音莫報切布告天下使明知朕意武帝時郡守尉諸侯相二千石欲為治者大抵盡效王温舒等而吏民益輕犯法盗賊滋起滋亦益也南陽有梅免百政梅百皆姓也楚有段中杜少中讀曰仲齊有徐勃燕趙之間有堅盧范生之屬大羣至數千人擅自號攻城邑取庫兵釋死罪釋解也縳辱郡守都尉殺二千石為檄告縣趨具食趨讀曰促小趨以百數掠鹵鄉里者不可稱數於是帝始使御史中丞丞相長史使督之出為使者督察也猶弗能禁乃使光禄大夫范昆諸郡都尉及故九卿張徳等衣繡衣持節虎符發兵以興擊以軍興之法而討擊也斬首大部或至萬餘級及以法誅通行飲食坐相連郡甚者數千人數歳廼頗得其渠率渠大也散卒失亡復聚黨阻山川往往為羣無可奈何於是作沈命法沈没也敢蔽匿盗賊者没其命也曰羣盜起不發覺發覺而弗捕滿品者品率也以人數為率二千石以下至小吏主者皆坐死其後小吏畏誅雖有盜弗敢發恐不能得坐課累府府亦使不言府郡府也故盗賊寖多寖漸也上下相為匿以避文法焉宣帝黄龍元年詔曰蓋聞上古之治君臣同心舉措曲直各得其所是以上下和洽海内康平其徳弗可及已朕既不明數申詔公卿大夫務行寛大順民所疾苦將欲配三王之隆明先帝之徳也今吏或以不禁姦邪為寛大縱釋有罪為不苛或以酷惡為賢皆失其中奉詔宣化如此豈不謬哉方今天下少事繇役省减兵革不動而民多貧盗賊不止其咎安在上計簿具文而已務為欺慢以避其課三公不以為意朕將何任諸請詔省卒徒自給者皆止時有請云詔使出者省卒徒以其直自給不復取稟假雖有進入於官非舊章也故絶之又曰先是武帝以用度不足自省以益官者或奉使求不受俸禄自省其徒衆以取其稟者或自給於是姦吏縁以為利所得多於本禄故絶之後漢光武建武十五年詔考實二千石長吏阿枉不平者明帝永平十八年章帝即位詔曰三事大夫莫肯夙夜小雅之所傷也予違汝弼汝無面從股肱之正義也羣后百僚勉思厥職各貢忠誠以輔不逮申勑四方稱朕意焉章帝建初元年正月詔曰比年牛多疾疫墾田减少穀價頗貴人以流亡方春東作宜及時務二千石勉勸農桑𢎞致勞來羣公庶尹各推精誠專急人事罪非殊死須立秋案驗有司明慎選舉進柔良退貪猾順時令理寃獄五教在寛帝典所美愷悌君子大雅所歎布告天下使明知朕意二年春三月詔曰比年隂陽不調饑饉屢臻深惟先帝憂人之本詔書曰不傷財不害人誠欲元元去末歸本而今貴戚近親奢縱無度嫁娶送終尤為僭侈有司廢典莫肯舉察春秋之義以貴理賤今自三公並宜明紏非法宣振威風朕在弱冠未知稼穡之艱難區區管窺豈能炤一隅哉其科條制度所宜施行在事者備為之禁先京師而後諸夏和帝永元五年三月詔曰選舉良才為政之本科别行能必繇鄉曲而郡國舉吏不加簡擇故先帝明勑在所令試之以職乃得充選又徳行尤異不須經職者别署狀上而宣布以來出入九年二千石曾不承奉恣心從好司𨽻刺史訖無紏察今新蒙赦令且復申勑後有犯者顯明其罰在位不以選舉為憂督察不以發覺為負非獨州郡也是以庶官多非其人民被姦邪之傷繇法不行故也八年九月詔曰百僚師尹勉脩厥職刺史二千石詳刑辟理寃虐恤鰥寡矜孤弱思惟致灾興蝗之咎十二年三月詔曰比年不登百姓虛匱京師去冬無宿雪今春無㴻雨黎民流離困於道路朕痛心疾首靡知所濟瞻仰昊天何辜今之人三公朕之腹心而未獲承天安民之䇿數詔有司務擇良吏今猶不改競為苛暴侵愁小民以求虛名委任下吏假勢行邪是以令下而姦生禁至而詐起巧法析律飾文增辭貨行於言罪成乎手朕甚病焉公卿不思助明好惡將何以救其咎罰咎罰既至復令灾及小民若上下同心庶或有瘳安帝永初三年秋七月海賊張伯路等㓂略縁海九郡遣侍御史龎雄督州郡兵討破之四年伯路復與渤海平原劇賊劉文河周文光等攻厭次殺縣令遣御史中丞王宗督青州刺史法雄討破之元初三年春正月蒼梧欝林合浦蠻夷叛二月遣侍御史任逴督州郡兵討之逴音丁角切靈帝光和元年妖異數見制下太尉司徒司空曰夫瑞不虛生灾必有縁朕以不徳秉統未明以招妖偽將何以昭顯憲法哉三司任政者也所當究心而各拱黙訖未有聞將何以奉荅天意敉寧我人其各悉心思所崇改務消復之術稱朕意焉晉武帝㤗始四年詔曰郡國守相三載一巡行屬縣必以春此古者所以述職宣風展義也見長吏觀風俗恊禮律考度量存問耆老親見百年録囚徒理寃枉詳察政刑得失知百姓所患苦無有遠近便若朕親臨之敦喻五教勸務農功勉勵學者思勤正典無為百家庸末致遠必泥士庶有好學篤道孝弟忠信清白異行者舉而進之有不孝敬於父母不長悌於族黨悖禮棄常不率法令者紏而罪之田疇闢生業脩禮教設禁令行則長吏之能也人窮匱農事荒姦盗起刑獄煩下陵上替禮義不興斯長吏之否也若長吏在官公亷慮不及私正色直節不飾名譽者及身行貪穢謟黷求容公節不立而私門日冨者並謹察之揚清激濁舉善彈違此朕所以垂拱總綱責成於良二千石也於戲戒哉太康九年春詔曰興化之本繇政平訟理也二千石長吏不能勤恤人隱而輕挾私故興長刑獄又多貪濁煩撓百姓其勑刺史二千石紏其能否議其黜陟令内外羣官舉清能拔寒素元帝大興元年詔曰王室多故姦凶肆暴皇綱弛墜顛覆大猷朕以不徳統承洪緒夙夜憂危思改其弊二千石令長當祇奉舊憲正身明法抑齊豪强存恤孤獨隱實户口勸課農桑州牧刺史當互相檢察不得顧私虧公長吏有志在奉公而不見進用者有貪惏穢濁而以財勢自安者若有不舉當受故縱蔽善之罪有而不知當受闇塞之責各明愼奉行後魏明元神瑞二年三月詔曰刺史守宰率多逋慢前後怠惰數加督罰猶不悛改今年貲調懸違者謫出家財充之不聽徵發於民文成太安四年五月詔曰朕即阼至今屢下寛大之㫖蠲除煩苛去諸不急欲令物獲其所人安其業而牧守百里不能宣揚恩意求欲無厭斷截官物以入於己使課調懸少而深文極墨委罪於民苟求免咎曾不改懼國家之制賦役乃輕比年已來雜調减省而所在州郡咸有逋懸非在職之官綏導失所貪穢過度誰使之然自今常調不充民不安業宰民之徒加以死罪申告天下稱朕意焉獻文以和平六年五月即位九月詔曰先朝以州牧親民宜置良佐故勑有司班九條之制使前政選吏以待俊乂必謂銓衡允衷朝綱應叙然牧司寛惰不祇憲㫖舉非其人愆於典度今制刺史守宰到官之日仰自舉民望忠信以為選官不聽前政共相干冐若簡任失所以罔上論孝文太和二年十一月詔曰懸爵於朝而有功者必縻其賞懸刑於市而有罪者必罹其辜斯乃古今之成典治道之實要諸州刺史牧民之官自頃以來遂各怠慢縱姦納賂背公縁私致令賊盗並興侵刼滋甚姦宄之聲屢聞朕聽承太平之運屬千載之期思光洪緒惟新庶績亦望藩翰羣司敷徳宣惠以助冲人共成斯美幸克己復禮思愆改過使寡昧無愧於祖宗百姓見徳於當世有司明為條禁稱朕意焉六年十二月詔曰朕以寡薄政缺平和不能仰緝緯象蠲兹六沴去秋淫雨洪水為灾百姓嗷然朕用嗟愍故遣使者循方賑恤而牧守不思利民之道期於取辦愛毛反裘甚無謂也今課督未入及將來租算一以丐之有司勉加勸課以要來穰稱朕意焉九年帝嘗引見王公卿士責留京之官司州牧咸陽王禧等曰昨望見婦女之服仍為夾領小袖我徂東山雖不三年既離寒暑卿等何為有違前詔禧對曰陛下聖過堯舜光化中原臣雖仰稟明規毎事乖互將何以宣布皇經敷贊帝則舛違之罪實合刑憲帝曰若朕言非卿等當須廷論如何入則順㫖退有不從昔舜語禹汝無面從退有後言其卿等之謂乎又謂尚書等曰朕仰纂乾構君臨萬宇往者稽古典章樹兹百職然尚書之任樞機是司豈惟縂括百揆緝和人務而已朕之得失實在於斯自卿等在任年垂二周未嘗言朕之一失獻可否之片規又不嘗進一賢而退一不肖此二事罪之大者宣武景明二年三月詔曰諸州刺史不親民事緩於督察郡縣稽逋旬月之間纔一覽决淹獄久訟動延時序百姓怨嗟方成困敝尚書可明條制申下四方令日親庶事嚴勒守宰不得因循寛怠虧政六月考諸州刺史加以黜陟孝明孝昌初梁武遣將裴􅃉等㓂淮南詔行臺酈道元都督河間王琛討之停師城父累月不進勑廷尉少卿崔孝芬持節齎齊軍力催令赴接賊退而還後廢帝中興二年正月詔曰自中興草昧典制權輿郡縣之官率多行督假有正者風化未均眷彼周餘專為漁獵朕所以夙興夜寐有惕於懐有司明加紏罰稱朕意焉唐太宗貞觀十六年四月帝謂褚遂良曰卿為諫議比來何為不諫遂良曰臣聞木從繩則正君從諫則聖而歴代帝王進納忠讜從善如流者國嘗獲安化洽聲稱厥後絶忠臣之路惡諌諍之言沉迷嗜欲賊害良善者何嘗不國敗身亡以為後誡陛下功徳之盛古今莫二視朝之餘假以顔色奬誘愚臣使罄矇瞽臣實慙駑下不稱萬一尸禄素飡誠負陛下髙宗乾封元年十一月帝引朝集使相州刺史許圉師等謂曰與朕共理在於牧守必在賢明方膺此選去嵗東封觀諸州刺史大有老弱者比令改移猶未能盡此朕所以憂也又封禪舉人比望有經綸之才遺逸藪澤者乃聞多是不第進士豈實無人物可言為復卿等不能用心蔽賢濫舉殊不稱求賢之意何也圉師等引咎而退中宗景龍元年十月令内外諸司長官具僚佐功過逓相朂勵勉脩其職𤣥宗先天元年十一月謂御史等曰卿處憲司職當彈紏如聞百僚非常弛慢即宜訪察聞奏如其寛縱國有常典開元二年六月詔曰尚書禮閣國之政本郎官之選實藉良才如聞諸司郎中員外郎怠於理煩業唯養望凡厥案牘每多停擁容縱典吏仍有貨賕欲使四方何以取則事資先令義貴能改宜令當司官長慇懃示諭并委左右丞勾當其有與奪不當及稽滯稍多者各以狀聞五年四月帝以尚書省天下政本乃令有司各司職事吏部員外郎禇璆等十人案牘稽遲詔曰朕居萬人之上以百姓為心嘗恐有寃不申有理見滯憂勤庶績宵旰興懐且六官分事四方取則尚書郎皆是妙選須稱其職焉可尸禄悠悠曾無斷决昨者試令詢問遂有如此稽逋動即經年是何道理至如行判程限素編令式令便准法科責乃是尋常但為積習寛疎欲得申明告諭自今以後各宜懲革若有犯者别當處分十年三月詔曰國之設法本以閑邪敬無所施雖立安用朕以寡昧纘丞丕業夙夜怵惕恐不克勝馭朽徒知其所危渉川罔知其所濟是用寤寐永歎嘗思罪已冕旒不欲見其臧否黈纊不欲聞其是非隱忍含容十載于兹矣不能使令行禁止訟息刑清家習禮讓之教人懐亷耻之節此朕之不徳也河南府雒陽縣主簿王鈞貪殘其性暴虐其心輕侮我章程刻剥我黎獻處事不遵乎法理黷貨不知其紀極此而可恕孰不可容且輦轂之下事猶如此想其遠處人何以堪然而當發生之時屬陽和之月朕情存惡殺不加殊死且從杖罪以肅朝端可與朝堂集衆决殺自今以後内外官有犯賄至解免以上縱使逢恩獲免並宜勿齒終身御史憲司職當推劾不存紏舉多有顔情綱紀不施誰任其咎又府縣寮寀上下相承犯法公然無問按詰若或知而故縱即是職務不舉各自思審何以當官自今以後所進擬御史皆須歴職清白衆所推者不得虛相引進僥倖所榮凡厥朝臣宜悉朕意十一年六月帝謂宰臣曰尚書省諸曹事多因循頗虧格式偽濫之軰縁此得行可令左右丞申明勾當勿使更然十二年二月詔曰如聞在外官人罕遵法式孤弱被抑寃不獲申有理之家翻遭逼迫侵刻之吏務欲加誣州縣有好長官同寮豈敢違法御史執憲綱紀是司多惜人情未聞正色内外同此何致至公宜令刺史縣令嚴加捉搦御史按其有犯彈奏代宗大厯六年四月勑曰弛張刑政興化阜俗使吏無貪汙之跡下無愁恨之聲不惟良二千石亦在郡主簿縣大夫親其教訓舉其綱目條察善惡惠養困窮方伯得以考求殿最故漢置刺史臨課郡國周制官刑紏䋲邦理其義明矣朕思舉舊典以清時俗頻詔長吏精擇此官如聞近日猶有姦濫或未習政事素無令問因依請託尸曠禄位邪枉附法懦弱廢官人弊於下怨歸於上閭井减耗賄賂日聞豈所謂建明職守共副憂勤者也又别駕秩位頗崇若郡守廢闕掌同其任舊例補署或匪其才既不稱職則多傷害自今後别駕縣令録事參軍有犯贓私並暗弱老耄疾患不稱所職户口流散者並委觀察節度等使與本州刺史計㑹訪察聞奏與替其犯贓私者便禁身推問具狀聞奏其疾患者准式解所職老耄暗弱及無贓私才不稱職者量資考改與員外官餘官准前後勑處分其刺史不能覺察觀察節度使具刺史名品聞奏如觀察節度管内不能勾當郎官御史出入訪察聞奏徳宗貞元六年二月制曰朕嗣守丕圖于兹七稔每念萬方所奉惟在一人百姓未康豈安終食故所以賑瞻優貸思致乂安方鎮牧守誠宜遵奉如有違越委御史臺及出使郎官御史訪察以聞於是宰臣等表賀焉文宗太和三年十一月詔刺史分憂得以專達事有違法觀察使然後奏聞如聞州司嘗務巨細所裁官吏移攝將士解補占留支用刑獄等動須禀奉不得自專雖有政能無所施設選置長吏將何責成宜委御史臺及出使郎官御史嚴加察訪亷使奏聽進上本判官不能規正及刺史不守朝章並量加貶降若所管州郡控接蕃夷軍戎之間事資節制即不在此限宣宗大中四年正月詔曰應天下州縣或土風各異或物産不同或制置乖宜或章條舛謬或云施之嵗久或縁礙於勑文有利於人而可舉行者有害於物而可革去者並委所任縣令録事參軍備論列於刺史具以上聞委中書門下據事件下觀察使詳言列奏當與改更各從便安自當蘇息如或在官因循不舉後來者無以申明利害較然違慢可見當重加懲罰仍更不得授縣令録事參軍刺史委中書門下具名奏聞别議殿責又曰每思前賢設官分職豈徒然哉今州有上佐縣有丞簿俗謂閒官不領公事殊乖制作之本意也自今後州縣公事上佐丞簿得失須共參詳如有敗闕或不遵法理及百姓流亡不先舉明並須連坐兾得人展其才官無冗食又曰刑獄之内吏得使情推斷不平因成寃濫無問有贓無贓並不在原免之限六年十二月中書門下奏諸道觀察使職當亷問位在藩隅受人主之寵榮同國家之休戚不可自事冨貴惟貪優游羅聲色以自娯顧凋殘而不問縱逃顯責必受隂誅自今請責其成效專彼事權使得展意盡心恢張皇化敬事以守法度節用以减征徭有利於國者必行不以近名為利有害於人者必去不以循例為辭絶連夜之酣歌務盡忠之讜論常准此道方免曠官其巡屬州縣須知善惡具以上聞隱而不言罪歸亷帥應有論薦須是直書强能立事者上陳不得蔽善懦弱失職者奏免非可徇情如此則遠近相臨上下相制共為致理同歸至公勑曰卿等所言甚為切務可速行之後唐莊宗同光四年二月吏部侍郎盧文紀上疏請責内外百司各舉其職明行考課以激其能從之明宗長興二年閏五月勑曰要道纔行則千岐共貫宏綱一舉則萬目皆張前王之法制罔殊百代之科條悉在無煩改作各有定規守度程者心逸日休率胸臆者心勞日拙天垂萬象星辰之分野靡差地載羣倫岳瀆之方隅不易儻各司其局則皆盡其心且律令格式六典凡關庶政互有區分久不舉行遂至隳紊宜准舊制令百司各於其間録出本局公事巨細抄冩不得漏落纎毫集成卷軸兼粉壁書在公㕔若未有廨署者其文書委官司主掌仍毎有新授官到令自冩錄一本披尋或因顧問之時應對須知次第無容曠廢每在執行使庶寮則守法奉公宰臣則提綱振領必當彛倫攸叙所謂至道不繁何必朞年告諭催促限兩月内抄錄及粉壁書冩須畢其間或有未可便行及曾釐革事件委逐司旋申中書門下當更參酌覆奏施行閔帝應順元年閏正月詔吏部三銓南北曹禮部貢院注擬考試依格疾速發遣勿令虛有滯留册府元龜卷一百五十五
