body:
  text: 册府元龜卷五百七十九宋王欽若等撰掌禮部奏議第七梁周捨為尚書禮部郎天監七年議詔旨以王者衮服宜􅀞鳯凰以示差降按禮有虞氏皇而祭深衣而養老鄭𤣥所言皇則是􅀞鳯凰羽也又按禮所稱雜服皆以衣定名猶如衮冕則是衮衣而冕明有虞言皇者衣名非冕明矣􅀞鳯之旨事實灼然制可又王僧崇云今祭服三公衣身􅀞獸其腰及袖又有青獸形與獸同義應是蜼即宗彞也兩袖各有禽鳥形類鸞鳯似是華蟲今􅀞宗彞即是周禮但鄭元云蜼禺屬昂鼻長尾是獸之輕小者謂宜不得同獸尋冕服無鳯應改為雉又裳有圓花於禮無礙疑是􅀞飾加蘤耳藻朱黼黻竝乖古制今請改正并去圓花帝曰古文日月星辰此以一辰攝三物也山龍華蟲又以一山攝三物也藻火粉米又以一藻攝三物也是爲九章今衮服畫龍則宜應畫鳯明矣孔安國云華者花也則爲花非疑若一尚畫雉差䧏之文復將安寄鄭義是所未允帝又曰禮主祀昊天上帝則大裘而冕祀五帝亦如之又云莞席之安而蒲越槀秸之用斯皆至敬無文貴誠重質今郊用陶匏與古不異而大裘蒲秸獨不復存其於質敬恐有未盡且一獻為質其劔佩之飾及公卿所著冕服可共詳定五經博士陸瑋等竝云祭天猶存掃地之質而服章獨取黼黻為文於義不可今南郊神座皆用苮席此猶莞類未盡質素之理以槀秸為下藉蒲越為上席又司服云王祀昊天服大裘明諸臣禮不得同自魏以來皆用衮服今請依古制更大裘制可瑋等又尋大裘之制惟鄭𤣥注司服云大裘羔裘也既無所出未可為據按六冕之服皆元上纁下今宜以元繒為之其制式或如裘其裳以纁皆無文繡冕則無旒詔可又乘輿宴㑹服單衣黒介幘舊三日九日小㑹初出乗金輅服之八年帝改去還皆乗輦白服紗㡌九年司馬筠等叅議禮記玉藻云諸侯𤣥端以祭禆冕以朝雜記又云大夫冕而祭於公弁而祭於己今之尚書上異公侯下非卿士止有朝衣本無冕服但既豫齋不來同於在朝宜依太常及博士諸齋官例著白衣緯襈中單竹葉冠若不親奉則不須入廟帝從之孔休源為尚書左丞是年舍人周捨以為禮玉輅以祀金輅以賔則祭日應乗玉輅諸下其議休源議玉輅既有明文而儀注金輅當繇宋齊乖謬宜依捨議帝從之司馬聚為祠部郎是年武帝以一獻為質三獻則文事天之道理不應然詔下言議専士陸瑋明山賔與聚以為宗祧三獻義兼臣下上天之禮主在帝王約理申義一獻為允自是天地之祭皆一獻始省太尉亞獻光禄終獻司馬筠為祠部郎是年建議曰今大事徧告七廟小事止告一室於是議以封禪南北郊祀明堂廵省四方御臨戎出征皇太子加元服冦賊平蕩築宫立闕纂嚴解嚴戒嚴合十一條則徧告七廟講武修宗廟明堂臨軒拜封公主四夷欵化貢方物諸公王以愆削封及詔封王紹襲合六條則告一室從之先是梁主迎氣以始先祖配牲用特牲儀同南部筠議是昆蟲未蟄不以火田鳩化為鷹蔚羅方設中春之月祀不用牲止珪璧及幣斯又事神之道可以不殺明矣况今祀天豈容尚此謂夏初迎氣祭不用牲帝從之是年安成太妃陳氏薨江州刺史安成王季荆州刺史始興王憺竝以慈母表解刺史詔不許還攝本任而太妃薨京邑䘮祭無主舍人周捨議曰賀彦光稱慈母之子不服慈母之黨婦又不從婦而服慈姑功服無徒故也庾蔚之云非從子不從母而服其黨孫又不從父服而其慈繇斯而言慈祖母無服明矣尋門内之哀不容自同於常按父之祥禫子竝受弔今二王諸子王冝以成服白單衣一日為位受弔制曰二王在逺世子冝攝祭事捨又曰禮云縞冠元武子姓之可冠則世子衣服為異於常可著細布衣絹為領帶三年不聴樂又禮及春秋庶母不世祭也盖為無王命者耳吴太妃既朝命所加得用安成禮秩則當祔廟五親盡乃毁陳太妃命數之重雖則不異慈孫既不服廟食理無傳祀子祭孫止是㑹經文高祖因是勑禮官議皇子服訓養母禮依庶母慈已宜從小功之制按曾子問云子游曰䘮慈母禮歟孔子曰非禮也古者男子外有傅内有慈母君命所使敎子也何服之有鄭𤣥注云此指為國君之子也若國君子不服則王者之子不服可知又䘮服經云君子子為庶母慈已者傳曰君子子者貴人子也鄭𤣥引内則三母止施於卿大夫以此而推之則慈母之服不在五等之嗣下不逮三士之恩儻其服者止卿大夫尋諸侯之子尚無此服况乃施之皇子謂宜依刋除以反前代之惑高祖以為不然曰禮言慈母凡有三條一則妾之子無母妾之無子者養之命為母子服以三年䘮服齊衰章所言慈母是也一則嫡妻之子無母使妾飬之慈撫隆至雖均乎慈愛但嫡妻之子重妾無為母之義而恩深事重故服以小功䘮服小功章所以不直言慈母而云庶母慈己者明於三年之慈母也其三則子非無母正是擇賤者視之義同師保而慈愛故亦有慈母之名師保既無其服則此慈母亦無服矣内則云擇於諸母與可者使為子師其次為慈母其次為保母此其明文此言擇諸母是擇人而為此三母非謂擇取兄弟之母也何以知之若是兄弟之母其先有子者則是長妾長妾之禮寔有殊嘉和容次妾生子乃退成保母斯不可也又有多兄弟之人於義或可若始生之子便應三母俱闕邪繇是推之内則所言諸母是謂三母非兄弟之母明矣子游所問自是師保之慈母無服之證乎鄭𤣥不辯三慈混為訓釋引彼無服以注慈己後人致謬實此之繇經言君子子者此雖起於大夫猶爾自斯以上彌應不異故傳云君子子者貴人子也總言之貴則無所苞經傳元文相顯發則知慈母加之義通乎大夫以上矣宋代此科不乗禮意便加除削良是所疑筠等諸依制改定嫡妻之子母殁為父妾所養服之五月貴賤竝同以為永制徐勉為吏部郎天監八年有司以為禮云凡為人子者升降不繇阼階按今學堂凡有三階愚謂客若降等則就主人之階今先師在堂義所尊敬太子宜祭阼階以明從師之義若釋奠事訖宴㑹之時則無復先師之敬太子升堂則宜從西階以明不繇阼義勉議鄭𤣥云繇命士以上父子異宫室宮室既異無不繇阼階之禮請釋奠及宴㑹太子升堂竝冝繇東階若輿駕幸學自然中陞從之後為尚書右僕射時人間䘮事多不遵禮朝終夕殯相尚以速勉上疏曰禮記䘮制云三日而大殮者以使其生也三日而不生亦不生矣自頃以來不遵斯制送終之禮殯以朞日潤屋豪家乃或半晷衣衾棺槨以速為榮親戚徒𨽻各念休反故属纊纔畢灰釘已具志狐䑕之顧步愧燕雀之徊翔傷情㓕理莫此為大且人子承衾之時志懣心絶䘮事所資悉闗佗手愛憎深淺事實惟原覘視或爽存没違濫使萬有其一怨酷已多豈若緩其告歛之辰申其望生之兾請自今士庶冝悉依古三日大歛如有不奉加以紏䋲詔可其奏朱异為儀曹郎先是明堂在國之陽梁初依宋齊其祀之法猶依齊制禮有不通者武帝更與學者議之齊儀郊祀帝皆以衮冕至天監七年始造大裘而明堂儀注猶云衮服十年异以為禮大裘而冕祭昊天上帝五帝亦如之良繇天神高逺儀須誠質今泛祭五帝理不容文於是改服大裘异又以為齊儀初獻鐏尋明堂貴質不應三獻又不應象鐏禮云朝踐用大鐏鄭云大鐏瓦也記又云有虞氏瓦鐏此皆在廟所用猶以質素况在明堂理不容象今請改用瓦鐏庶合文質之中又曰宗廟貴文故庶羞百品天義尊逺則須簡約今儀注所薦與廟不異即理徴事如為未允請自今明堂有饍准三郊但帝之為名本主生育成嵗之功實為顯著非如昊天義絶言象雖曰同郊復應微異若水土之品蔬菜之属猶宜以薦止用梨棗橘栗四種之果薑蒲葵韭四種之葅粳稻黍粱四種之米自此以外郊所無者請從省除初愽士明山賔制儀注明堂祀五帝行禮先自赤帝始异又以為明堂既泛祭五帝不容的有先後東階而升宜先春帝請改從青帝始又以為明堂籩豆等器皆以雕餙尋常郊祀貴質改用陶匏宗廟貴文誠宜彫爼明堂之禮既方郊為文則不容陶匏比此廟為質又不應彫爼斟酌二途須存厥中理請改用純漆异乂以舊為明堂祀五帝先酌欝鬯灌地求神及初獻清酒次酃終醁禮畢大祝取爼上黍肉當御前以授請依郊儀止一獻清酒且五帝天神不可求之於地二郊之祭竝無黍肉之禮竝請停灌及授爼法又以為舊明堂皆用大牢按記云郊用特牲又云天地之牛角繭栗五帝既曰天神禮無三牲之祭而毛詩我將篇云祀文王於明堂有維羊維牛之説良繇周監二代其義貴文明堂方郊未為極質故特用二牲止為一代之制今斟酌百王義存通典蔬果之薦雖符周禮而牲牢之用宜遵夏殷請自明堂止用特牛既合質文之中又是貴誠之義帝竝從之十年武帝以雩祭燔柴以火祈水於理為乖异議曰按周宣雲漢之詩手注有瘞埋之文不見有燔柴之説若以五帝必柴今明堂人無其事於是停用柴從坎瘞典十一年帝曰四望之祀頃來遂絶冝更議復异議鄭衆云四望謂日月星海鄭元云謂五岳四鎭海瀆尋二鄭之説互有不同竊以望是不即之名凡厥遥祭皆有斯目豈容局於星海拘於海瀆請今天司有闕水旱之義爰有四海名山大川能興雲致雨一皆備祭帝從之劉孝綽為僕射普通三年十一月始興王薨舊事以東宫禮絶傍親朝見竝依常儀昭明太子意以為疑令孝綽議其事孝綽議曰按張鏡撰東宮儀記稱三朝發哀者踰月不舉樂鼔吹寢奏服限亦然尋傍絶之義義在去服服雖可奪情豈無悲鐃歌輟奏良亦為此既有宜稱兼慕卒哭之後依常舉樂稱悲與此理例相符謂猶應兼慕至卒哭僕射徐勉左率周捨家令陸扆竝同孝綽義太子令曰張鏡儀記云依士禮終服闋稱慕綽人曰凡三朝發哀者踰月不舉樂劉僕射議云傍絶之義義在去服服雖可奪情豈無悲卒哭之後依常舉樂稱悲與此理例相符尋情悲之説止卒哭之後縁情為論此自難一也用張鏡之舉樂棄張鏡之稱悲一鏡之言取捨有異此自難二也陸家令止云多歴年所恐非事證雖復累稔所用意嘗未安延亦嘗經以此問繇來立意謂猶慕悼之言張豈不知舉樂事大稱悲事小所以用小而忽大良亦有以至如元正六佾事為國章雖情或未安而禮不可廢鏡吹軍樂比之亦然書䟽方之事則成小差可縁心聲樂自外書䟽自内樂自佗書自己劉僕射之議即情未安可令諸賢更共詳𠂻司農卿明山賔中兵校尉朱异議議稱慕悼之冝終服月於是令付典書遵用以為永准賀琛為尚書左丞叅禮儀事普通中皇太子議大功之末可以冠子嫁女琛駁之曰令旨以大功之末可得冠子嫁女不得自冠自嫁推以記文竊猶致惑按嫁冠之禮本是父之所成無父之人乃可自冠故稱大功小功竝以冠子為文非闗准得為子以身不可也小功之未既得自嫁娶而亦云冠子娶婦其義益明故先列二服毎明冠子嫁女于後方顯自娶之義既明小功自娶則知大功自冠矣盖是約言而見旨若謂縁父服大功子服小功服故不得自嫁自冠者則小功之末非明父子服殊不應復云冠子嫁女也若謂小功之文言已冠故知身有大功不得自行嘉禮但得冠子嫁女竊謂有服不行嘉禮本為吉㓙不可相干子雖小功未可得為其嫁冠若父於本功之末可以冠子嫁女是於㓙禮無礙吉禮無礙豈不得自冠自嫁若自冠自嫁於事有礙則冠子嫁女寜獨可通今許其冠子而塞其自冠是琛之所惑也又令指推下殤小功不可娶婦則降服大功亦不得為子冠嫁伏尋此旨若謂䧏服大功不可冠子嫁女則降服小功亦不可自冠自娶是為凡厥䧏服大功小功皆不得冠娶矣記文應云降服則不可寜得准稱下殤今不言降的舉下殤寔有其義夫出嫁出後或有稱降出後之身於本家姊妹降為大功若是大夫服士又以尊降則成小功其於冠嫁義無以異所以然者出嫁則有受我出後則有傳重竝欲薄於此而復於彼昔寔朞親雖再降猶依小功之禮可冠可嫁若夫朞降大功降為小功止是一等降殺有倫服未嫁冠故無有異唯下殤之服特明不娶之義者盖縁以推之故天奪情深既愛厚佗姓又異傳重彼宗嫌其年雅服輕頓申殺略故特明不娶其義若此則不得大功之降服皆不可冠嫁也且記云下殤小功言下殤則不得通於中上語小功又不兼於大功若實大小功降服皆不冠嫁上中二殤小功則不可恐非文意此又琛之所疑也遂從琛議琛後遷御史中丞叅禮儀事奏今南北二郊及籍田往還竝宜御輦不復乗輅三郊請用素輦籍田徃還乗常輦皆以侍中陪乘停大將軍及大僕詔侍尚書博議施行改素輦名大桐輦郊祀宗廟乗珮輦徐摛大通中為中庶子是時臨城公納夫人王氏即簡文妃之姪女也晉宋以來初婚三日婦見舅姑衆賔皆列觀引春秋議云丁丑夫人姜氏至戊寅公使大夫宗婦覿用幣戊寅丁丑之明日故禮官據此皆云宜依舊規太宗以問摛摛曰儀禮云質明贊見婦於舅姑雜記又云婦見舅姑兄弟姊妹皆立于堂下正言婦是外宗未審􅈺令所以停坐三朝觀其七德舅延外客姑率内賔堂下之儀以備盛禮近代婦於舅姑本有戚屬不相瞻㸔夫人乃妃姪女有異佗姻覿見之儀謂應可畧簡文從其議蕭子雲為侍中領國子祭酒大同中郊廟未革牲牷樂辭皆沈約撰至是承用子雲始建言冝改啓曰伏惟聖敬率繇尊嚴郊廟得西鄰之心知周孔之迹載革牢爼德通神明黍稷蘋藻竭誠嚴配經國制度方懸日月垂訓百王於是乎在臣比兼職齋官見伶人所歌猶用未革牲前曲圓丘眡僚向言式俻牲牷北郊城雅亦奏牲云孔備清廟登歌而稱我牲以㓗三朝食學猶詠朱尾碧鱗聲被皷鐘未符盛制臣職司儒訓意以為疑未審應改定樂辭以不勅答曰此是主者守株宜急改也仍使子雲撰定陳顧和為侍中永定元年高祖即位散騎常侍徐陵白所定乘輿御服皆採之舊制又以為冕旒後漢用白玉珠晉過江服章多闕遂用珊瑚雜珠餙以翡翠和奏今不能備玊珠可用白璇從之蕭驕子云白璇蜯珠是也帝曰形制依此今天下初定務從節儉應用繡織成者竝可採盡金色宜塗珠玉之餙任用蜯珠至天嘉初悉改易之沈洙為員外散騎常侍大匠卿永定初有司奏前寜逺將軍建康令沈孝軌門生陳三兒牒呈主人翁靈柩再周主人奉使闗内因欲迎䘮乆而未返此月晦日即是再周主人弟息見在此者為至月未除靈内外即吉為侍主人還情禮申竟以事諮左丞汪德藻德藻謂王衞軍云久䘮不塟惟主人不變其餘親各終月數而除蓋引禮文論在家内有事故未得葬者耳孝軌既在異域雖已迎䘮還期無指諸弟若遂不除永絶婚嫁此於人情或為未允中原淪䧟以後理有事例宜諮沈常侍詳議曰禮有變正又有從宜禮小記云久而不葬者惟主祭者不除其餘以麻終月數者除䘮已注云其謂傍親如鄭所解衆子皆應不除王衞軍所引此盖禮之正也但魏氏東闗之役失卞屍柩葬埋無期議以為禮無終身之䘮故制使除服晉氏䘮亂或死於虜庭無繇迎殯江左故復申明舊制李裔之祖王華之父竝存亡不測子皆制服依時釋縗此竝變禮之宜也孝軌雖因奉使便欲迎䘮而戎狄難親還期永尅愚謂冝依東闗故事在此國内者竝應釋除縗麻毁靈祔祭若䘮柩得還别行改塟之禮自天下冦亂西朝傾覆流播絶域情禮莫申若此之徒諒非一二寜可䘮期無數而弗除衰服朝廷自應為之限制以義斷恩通訪博士折禮之𠂻德藻依洙奏可許亨為大中大夫攝太常卿文帝天嘉中南郊改以高祖配北郊以德皇帝配享奏曰昔梁武帝云天數五地數五五行之氣天地俱有故南北郊内竝祭五祀臣按周禮以血祭社稷五祀鄭元云隂祀自血起貴氣臭也五祀五官之神主五行𨽻於地故與埋沉疈辜同為隂祀既非煙柴無闗陽祭故何休云周爵五等者法地有五行也五行位在北郊圓丘不宜重設制曰可亨又奏曰梁儀注曰一獻為質三獻為文事天之事故不三獻臣按周禮司鐏彛所言三獻施於宗祧而鄭注一獻施於群小祀今用小祀之禮祀施於天神大帝梁武此議為不通矣且鐏爼之物依於質拜獻之禮主於䖍敬今請凡郊丘祀事准於宗祧三獻為允制曰依議亨又奏曰梁武帝議箕畢自是二十八宿之名風伯雨師自是箕畢下𨽻非即星也故郊雩之所皆兩祭之臣按周禮大宗伯之職云槱燎祀司中司命風伯雨師鄭衆云風師箕也雨師畢也詩云月離于畢俾滂沱矣如此則風伯雨師即箕畢星矣而今南郊祀箕畢二星復祭風伯雨師恐乖祀典制曰若郊設星位任即除之王元規為尚書祠部郎初宣帝即位以南北二郊卑下議更増廣久而不决至㤗建十一年元規議曰按前漢黄圖上帝壇徑五丈高九尺后土壇方五丈高六尺梁南郊壇上徑十一丈下徑十八丈高二丈七尺北郊壇上方十丈下方十二丈高一丈即曰南郊壇廣十丈高二丈二尺五寸北郊壇廣九丈三尺高一丈五尺今議增南郊壇上徑十二丈則天大數下徑十八丈取於三分益一高二丈七尺取三陪九王之堂北郊壇上方十八丈以則地義下至十五丈亦取三分益一高一丈二尺亦取二倍漢家之數禮記云為高必因丘陵為下必因川澤因名山升中于天因吉土饗帝于郊周官云冬日至祠天於地上之圓丘夏日至祭地於澤中之方丘祭法云燔柴於太壇祭天也瘞埋於太折祭地也禮云至敬不壇掃地而祭於其質也此以報覆幬持載之功爾雅亦云丘言非人所造為古圓方兩丘竝因見有而祭本無高廣之數後世遂事遷都而建立郊禮或有吉地而未必有丘或有見丘而不必廣㓗故有築建之法而制丈尺之儀愚謂郊祀事重圓方丘高下廣狹既無明文但五帝不相㳂三王不相襲今謹迹漢梁竝即曰三代壇不同及更修丈尺如前聼旨尚書僕射臣繕左戸尚書臣尤饒左丞臣周確舍人臣蕭淳儀曹郎臣沈客卿同元規議詔遂依用册府元龜卷五百七十九
