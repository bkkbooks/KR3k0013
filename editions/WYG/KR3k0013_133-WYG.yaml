body:
  text: 册府元龜卷一百三十三宋王欽若等撰帝王部褒功第二隋髙祖受禪周法尚為巴州刺史破三鵶叛蠻於鐵山復從柱國王誼擊走陳寇遷衡州總管四州諸軍事改封譙郡公邑三千户後帝幸雒陽召之及引見賜金鈿酒鍾一雙綵五百叚良馬十五匹奴婢三百口給鼔吹一部法尚固辭帝曰公有大功於國特給鼓吹者欲令公卿聞知朕之寵公也固與之宇文忻從韋孝寛平尉遲逈帝顧謂忻曰尉遲逈傾山東之衆連百萬之師公舉無遺策戰無全陣誠天下之英傑也進封英國公増邑三千户賀婁子幹初為後周秦州刺史及尉遲逈作亂子幹與宇文從録韋孝寛討之遇賊圍懐州子幹與宇文述等擊破之帝乃大悦手書曰逆賊尉遲逈敢遣蟻衆作宼懐州公受命誅討中書令南陽郡公𡊮恕己等並徳惟神降材與運生道叶台嶽名書䜟緯寅亮帝載勤勞王家參復禹之嘉謀奉昇唐之景命惟徂謝易久而勳烈益彰撫彞鼎以念功想旂常而増感緬遵故實用表徽懿俾列在清廟登於眀堂克申從祀之儀式茂疇庸之典並可配饗中宗孝和皇帝廟庭十年十一月丙申朔方郡節度使兵部尚書信安郡王禕破突厥凱旋引將士等見帝置酒享之勅曰禕總戎朔陲􅀴畧萬里賦軍籍車精卒鋭兵自其有虞莫不素練而醜虜背誕偏師致誅謀若有神取如俯拾雖廟畧之云逺亦將士之力焉威武載揚頑㓙自懾窮宼覆巢以奔北羣師掉鞅而来歸因其凱旋聊加宴樂各宜坐飲相與盡歡十二年隴右節度使鄯州都督王君㚟破土蕃来獻戎㨗帝置酒於内殿享之謂曰卿能振國威恢邉破敵誠節既著俘獲又多疇庸策勳已有處分卿及將士等並宜飲宴兼有賜物各宜領取韓擒虎平金陵執陳後主叔寳時賀若弼亦有功帝下詔於晉王曰此二公者深謀大畧東南逋寇朕本委之静地恤民悉如朕意九州不一已數百年以名臣之功成太平之業天下盛事何用過此聞以忻然實深慶快平定江表二人之力也賜物萬叚又下優詔於擒虎弼曰申國威於萬里宣朝化於一隅使東南之民俱出湯火數百年之寇旬日廓清専是公之功也髙名塞於宇宙盛業光於天壤逖聴前古罕聞其匹班師凱入誠知非逺相思之甚寸隂若嵗賀若弼字輔伯平陳之役為行軍總管晉王以弼先期决戰違軍命於是以弼屬吏帝驛召之及見迎勞曰克定三吳公之功也命登御坐賜物八千叚加位上柱國進爵宋國公真食邑三千戸加以寶劍寶帶金甕金盤各一并雉尾扇曲蓋雜綵二千叚女樂二部又賜陳叔寳妹為妾拜右領軍大將軍王韶字子相伐陳為元帥府司馬及克金陵帝謂公卿曰晉王以㓜稚出藩遂能克平吳越綏静江湖子相之力也於是進位柱國賜奴婢三百口綿絹五千叚達奚長儒為上大將軍破突厥沙鉢畧可汗帝下詔曰突厥猖狂輙犯邉塞敵騎之衆彌亘山原而長儒受任北鄙式遏寇賊所部之内少將百倍以晝通宵四面抗敵凡十有四戰所向必摧兇徒就戮過半不返鋒刄之餘亡魂竄迹自非英威奮發奉國情誠撫御有方士卒用命豈能以少破衆若斯之偉言念勳庸宜隆名噐可上柱國餘勳逥授一子李安為楊素司馬仍領行軍總管襲破陳師帝嘉之詔書勞曰陳賊之意自言水戰為長險隘之間彌謂官軍所憚開府親將所部夜盪舟師摧破賊徒生擒虜衆益官軍之氣破賊人之膽副朕所委任以勳進位上大將軍除郢州刺史元諧為行軍元帥討吐谷渾名王公侯来降帝大悦下詔曰褒善疇庸有聞前載元諧識用眀逹神情警悟文規武畧譽流朝野申威拓土功成疆場深謀大節實簡朕心加禮延世宜隆賞典可柱國别封一子縣公諧拜寕州刺史韋冲為南寕州總管持節撫尉冲既在南寕渠帥㸑震及西㸑首領皆詣府參謁帝大悦下詔褒揚之豆盧毓為漢王諒府主簿諒作亂毓苦諫不從見害諒平帝下詔曰褒顯名節有國通規加等餙終抑惟令典毓深識大義不顧姻親出於萬死首建竒策去逆歸順殉義亡身追加榮命宜優常禮可贈大將軍封正義縣公賜帛二千疋諡曰愍衛𤣥與代王留守京師㑹王𤣥感圍逼東都𤣥率歩騎七萬援之苦戰賊稍却既而𤣥感西遁𤣥遣斛斯萬善監門直閣龎玉追之及於閿鄉與宇文述等合擊破之車駕至髙陽徴詣行在所帝勞之曰社稷之臣也使朕無西顧之憂仍下詔曰近者妖氛充斥擾動闗河文昇率勵義勇應機響赴表裏奮擊摧破兇醜宜昇榮命式𢎞賞典可右光禄大夫賜以良田甲第資物鉅萬樊子蓋為東都留守楊𤣥感作逆来逼王城盡鋭攻城不能克車駕至髙陽追詣行在所既而引見髙祖逆勞之曰昔髙祖留蕭何於闗西光武委冦恂以河内公其人也子蓋謝曰臣任重噐小寕可竊譬兩賢但以陛下威靈小盜不足除耳進位光禄大夫封子蓋建安侯尚書如故賜縑二千匹女樂五十人子蓋固讓優詔不許後車駕還東都帝謂子蓋曰𤣥感之反神眀故以彰公赤心耳折珪進爵宜有令謨是日下詔進爵為濟公言其功濟天下特為立名無此郡國也賜縑三千匹奴婢二十口後與蘇威宇文述陪宴積翠亭帝親以金杯屬子蓋酒曰良筭嘉謀俟公後動即以此杯賜公用為永年之端并綺羅百匹麥鐵杖為右屯衛大將軍遼東之役與賊戰死帝為流涕購得其屍下詔曰鐵杖志氣驍果宿著勳庸陪麾問罪先登陥陣節髙義烈身殞功存興言至誠追懐傷悼宜頼殊榮用彰餙往可贈光禄大夫宿國公諡曰武烈子孟才嗣尋授光禄大夫孟才有二弟仲才季才俱拜正議大夫賜贈鉅萬賜輼輬車給前後部羽葆鼓吹平壤道敗將宇文述等百餘人皆執紼王公已下送至郊外楊恭仁大業初轉吏部侍郎楊𤣥感作亂帝詔恭仁率兵經畧與𤣥感戰於破陵大敗之𤣥感兄弟挺身遁走恭仁又與屈突通等追討獲之軍旋帝召入殿内謂曰我聞破陵之陣唯卿力戰功最比雖知卿奉法清慎都不知勇决如此也納言蘇威曰仁者必有勇固非虛也張須陁大業中為齊郡丞賊帥王簿聚結數萬人寇掠郡境須陁擊破之露布以聞帝大悦優詔褒揚使者圖其形容而奏之唐髙祖武徳元年八月下詔曰朕自起兵晉陽遂登皇極經綸天下實仗羣才尚書令秦王世民尚書右僕射寂或契合元謀或同心運始並陥義輕生捐家殉節艱辛備履金石不移論此忠勤特宜優異官爵之榮抑惟舊典勳賢之議宜有别恩其犯罪非叛逆可聴恕一死其太原元謀勳效者宜以名聞及所司進簿裴寂劉文静如恕二死長孫順徳劉孔基趙文恪竇琮劉政㑹劉世龍殷開山柴紹唐儉武士彠張平髙許世緒李思行李髙遷並恕一死李襲譽少通敏有識度隋末為冠軍府司兵時隂師輔代王為京師留守所在多盜賊隂師遣襲譽募山南士馬以援京師襲譽既至漢中㑹帝已定長安遣使授襲譽蜀漢道招慰大使仍令承制封拜襲譽率漢川之衆西指成都屬叚綸為益州總管代襲譽招撫襲譽乃入拜右光禄大夫太府少卿帝嘉其功命為三從姪詔曰安康郡王襲譽我之同姓𣲖别枝分惟厥祖考世敦恭睦襲譽部率宗人協同義舉立功巴蜀誠節開基宜有褒榮用超階序特聴合譜宗正恩禮之差同諸服屬劉瞻為涪州刺史時劉武周連年為宼隣城多陥賊數攻之輙為瞻所敗帝下書勞之曰涪州之全卿之力也功績垂成念自朂勵富貴之事非卿而誰馬三寳本柴紹家僮奉平陽公主遁於司竹及義兵濟河三寳以衆數萬詣軍後領平道軍將嘗從幸司竹帝顧謂三寳曰是汝建英雄處邪衛青大不惡太宗貞觀初代州行軍總管李靖撫納降附突厥頡利可汗歸欵太宗嘗謂之曰昔李陵提歩卒五千不免身降匈奴尚得書名竹帛卿以三千􅁿騎深入虜庭克復定襄威振北狄古今未有足報往年渭水之役也武徳九年八月帝初即位突厥入宼至渭水帝與頡利盟於便撟突厥引兵而退五年李子和從太宗平劉黒闥陥陣有功賜姓李氏拜右武衛將軍七年右武衛將軍張士貴破反獠而還帝勞之曰聞公親蒙矢石為士卒先雖古名將何以加也况朕嘗聞以身報國者不顧性命但聞其語未覩其實於公方見之矣十二年四月左武衛大將軍秦叔寳卒贈徐州都督陪𦵏于昭陵令所司于其塋内立石人馬以旌戰陣之功焉十三年特進楊恭仁卒册贈開府儀同三司潭州都督陪𦵏昭陵諡曰孝十四年詔淮安王神通與河間王孝恭贈陕州大行臺右僕射鄖節公殷開山贈民部尚書渝襄公劉政㑹配饗髙祖廟庭十六年宇文士及卒初士及為右衛大將軍尋録其功别封一子為新城縣公在職七年復為殿中監加金紫光禄大夫及疾篤太宗親問撫之流涕及卒贈左衛大將軍凉州都督陪𦵏昭陵十七年二月戊申詔曰自古皇王褒崇勳徳既勒銘於鍾鼎又圖形於丹青是以甘露良佐麟閣著其羙建武功臣雲臺紀其迹司徒趙國公無忌司空楊州都督河間王孝恭故司空菜文成公如晦故司空相州都督太子太師鄭文貞公徴司空梁國公𤣥齡開府儀同三司尚書右僕射申國公士㢘開府儀同三司鄂國公敬徳特進衛國公靖特進宋國公瑀故輔國大將軍䕫國公𢎞基故尚書左僕射蔣忠公通故陕東道大行臺尚書左僕射耶節公開山故荆州都督譙襄公紹故荆州都督邳襄公順徳雒州都督鄖國公張亮光禄大夫吏部尚書潞國公侯君集故左驍衛大將軍剡襄公張謹左領軍盧國公程知節故禮部尚書永興文懿公虞世南故户部尚書渝襄公劉政㑹光禄大夫户部尚書莒國公唐儉光禄大夫兵部尚書英國公李勣故徐州都督胡壮公秦叔寳等材惟棟樑謀猷經逺綱紀帷帳經綸覇圖或學綜經籍得範光煒隠犯同致忠讜日聞或竭力義旗委質藩邸一心表節百戰標竒或受脤廟堂闢土方面重氛載朗王畧遐宣並契闊屯夷劬勞師旅賛景業於草昧翼淳化於隆平茂績嘉庸冠冕列辟昌言直道牢籠搢紳固以瞻伊吕而連衡邁周召而長騖者矣宜酌故實𢎞兹令典可並圖畵于凌煙閣庶念功之懐無謝於前載旌賢之義永貽于後昆二十年八月丁亥詔曰周室姬公陪于畢陌漢庭蕭相附彼髙園寵錫墳塋聞諸上代從窆陵邑信有舊章蓋以懿戚宗親類本同之枝榦元功上宰猶在身之股肱哀榮之義實隆始終之契斯允今宜聿遵故實取譬拱辰庶在鳥耘之地無􅃜魚水之道宜令所司于昭陵南左右廂封境取地仍即標誌壃域擬為𦵏所以賜功臣其有文祖陪陵子孫欲来從𦵏者亦宜聴允丘行恭為光禄大夫從討王世充㑹戰于邙山之上太宗欲知其虛實雖弱乃與數十騎衝之直出其後衆皆披靡莫敢當鋒所殺傷甚衆既而限以長隄與諸騎相失唯行恭獨從尋有勁騎數人追及太宗矢中御馬行恭乃廽騎射之發無不中行恭然後下馬㧞箭以其所乗馬進太宗行恭于御馬前歩執長刀巨躍大呼斬數人突陣而出入大軍貞觀中有詔刻石為人馬以象行恭㧞箭之狀立于昭陵門前郭孝恪武徳中為宋州刺史令與徐勣􅀴營武牢已東所得州縣委以選補其後竇建徳率衆来援王世充孝恪于青城宫進策于太宗曰世充日蹴月迫力盡計窮懸首面縳翹足可待建徳逺来助虐糧運阻絶此是天䘮之時請固武牢屯軍汜水隨機應變則易為尅殄帝然其計及破建徳平世充帝于雒陽置酒髙㑹謂諸將曰郭孝恪謀禽建徳之業王長光龍門下米之功皆出諸人之右也長孫無忌為司空太宗追思王業艱難佐命之力乃作威鳳賦以賜焉又嘗謂無忌曰朕即位之初上書者或言人主必須權威獨運不得委任羣下或欲耀兵振武懾服四夷唯有魏徴勸朕偃革興文布徳施恵中國既安逺人自服朕從其語天下大寕絶域君長皆来朝貢九夷重譯相望于道此皆魏徴之力也河間王孝恭自隋大業末羣兇競起皆為太宗所平謀臣猛將並在麾下罕有别立勳庸惟孝恭著方面之功聲名甚盛及卒太宗素服舉哀哭之甚慟贈司空揚州都督陪𦵏獻陵諡曰元配享髙祖廟庭楊𢎞禮為兵部侍郎專典兵機之務太宗征遼𢎞禮入參謀議出則統衆攻戰駐蹕之陣領馬步二十四軍出其不意以擊之所向摧破太宗自山上見𢎞禮所統之衆人皆盡力殺獲居多甚壯之謂許敬宗等曰越公兒郎故有家風矣髙宗嗣位詔與長孫無忌配饗太宗廟庭李勣為司空初貞觀中太宗以勣勳庸特著嘗圖其像于凌煙閣至是髙宗又命寫形焉仍親為之序勣嘗侍從墜馬帝親問以所乘馬賜之後勣寢疾詔以勣弟晉州刺史弼為司衛正卿使得視疾尋薨帝為之舉哀輟視朝七日諡曰貞武給東園秘器陪𦵏昭陵令司平太常伯楊昉攝司員正卿監䕶及𦵏帝幸未央故城登樓臨送望栁車慟哭并為設祭皇太子亦從駕臨送哀慟悲感左右詔百官送至故城西所築二墳一准衛霍故事象隂山鐡山及烏得鞬山以旌破突厥薛延陁之功顯慶三年十二月鄂國公尉遲敬徳卒許敬宗奏請加贈帝曰敬徳功業誰之儔也對曰武徳末年二兇搆亂經綸中興之業能致宗廟之安有敬徳功當第一太尉無忌曰敬徳早從征伐勳庸茂著貞觀之初特効殊績比諸將帥超越等倫李靖南定荆吳北平突厥外内之事雖别論其勳効實宜相准帝以為然為之舉哀廢朝三日令京官五品已上及朝集使赴哭册贈司徒賜東園秘噐陪𦵏昭陵儀鳳中司列少常伯安撫大食使裴行儉擒偽可汗都之及李􅃒匐還帝賜宴謂行儉曰卿文武兼資今都授卿二職即日拜禮部尚書兼檢校右衛大將軍中宗神龍元年十一月襄州刺史漢陽郡王張柬之抗表請辭王位帝不許因下書曰卿履謹尚遜忌盈戒滿詞㫖勤勤請謝王位然懸爵所以勸善申至公也裂土所以酬庸非徇私也故漢徳之盛異姓而王者八人魏祚之隆同功而邑者千户今卿列爵之貴未越于漢圖食邑之豐纔半于魏制而逺形簡牘一何甚也朕承三代之丕業荷七廟之威靈惟唐㨿氶祧之尊于周保元良之重至於復予休命配天大業雖厯數有歸亦謳謌所繼然狐䑕不掘終貽城社之憂頑兇未夷實負朝廷之懼卿誠亮白日忠勵秋霜懐直道以立身固一心而徇國自三兇搆患潜圖不軌惡迹初彰釁萌始露卿之大節義在不􅃜烈士之首期于必碎及難作宫禁禍生肘腋卿上啣天命外發兵符行正夘之戮既于兩觀磔蚩尤之屍俄成四冡曽不延畧鬰成大功分壤錫珪固其宜矣行當勉以自愛享此眉夀乗几杖之榮極鄉園之樂崇讓小節念勿為也睿宗初即位下詔曰尚書右僕射同中書門下三品監修國史許國公蘇瓌自周旋近宻損益樞機謨猷有成弼賛無忌頃者遺恩顧託先意昭明奸囬動揺内外危逼獨申讜議實挫邪謀况藩邸寮屬念殷惟舊無徳不報抑惟令典可尚書左僕射景雲二年冬十月甲辰以吏部尚書劉幽求為侍中降璽書曰頃者王室不造中宗厭代内戚専政姦臣擅國將頃社稷幾遷龜鼎朕與王公皆將及于禍難卿見危思奮在變能通翊賛儲君叶和義士殄殱元惡流放凶徒我國家之復存繄茲是頼厥庸甚茂朕用嘉焉故委卿以鈞軸胙卿以茅土然征賦未廣寵錫猶輕昔西漢行封更擇多户東京朕賞復增大邑故加賜卿實封二百户兼舊七百户使夫髙岸為谷長河如帶子子孫孫與國無絶又以卿㤀軀徇難宜有恩榮故特免十死並書諸金鐵俾傳之後卿其保茲功業永作國禎可不羙哉太極元年四月詔曰朕聞御宸極握靈圖為天下之尊居域中之大者上以奉宗廟下以育黎元迹宜彰于簡編事須聞于朝野朕髙宗少子特蒙慈愛顧復之至禮絶諸王運屬上僊遭家難未嗣歴中宗出藩大聖天后臨朝以權立朕為嗣朕自惟虛薄固讓中宗誠願上從用寕社稷比居藩邸深嘉清閑不意景龍之間先帝暴棄天下凶族潜計謀覆邦家髙祖之業幾墜于地皇太子隆基忠孝天感仗義行誅一夕之間戡定禍難朕當宿夕初不聞知及見事平且悲且慰方與四海同奉嗣君子温王㓜冲頻屬艱疚因發警悸日夜啼號因以先聖立朕為太弟之意令鎮國太平長公主諫議大夫薛稷等奉承先㫖朕固誠請至于再三乃使中書舍人蘇頲奉表陳乞襄王便不肯視事避于别宫中外皇皇莫知所向隆基鎮國太平長公主成噐範業薛稷劉幽求麻嗣宗等以為宗廟不可無主萬機不可暫曠且從人望因定策禁中朕又固辭僉謀卿士得蕭至忠崔湜韋嗣立趙彦昭麻嗣宗薛儆鄭萬均唐晙等同詞勸進以為㓜主之心既不可奪先聖之㫖固不可違事不獲已乃順衆望要盟之言其文猶在朕纂承洪業于今三年謂宗廟郊天大禮斯備永惟所以獲奉宗禋臨兆人者蓋非朕之本心實乃鎮國太平長公主皇太子諸王郡公之意也雖顒顒之誠四海同望然因此致力在此數人已依西漢舊章各酬其徳董狐執筆闕而未書宜勑左右編于史册𤣥宗先天元年封魏知古為梁國公初竇懐貞等將謀逆也知古獨宻奏其事及懐貞誅賜實封二百户物五百段仍以前賞猶薄又手勑曰魏知古去年七月已前屢申啟沃毎竭忠誠姦臣有謀先奏其兆事君之忠良可嘉嘆可更賜實封一百户開元二年六月丁夘北庭大都䕶澣海軍使阿史那獻梟都擔首獻于闕下并擒其孥及胡禄等部落五萬餘帳内屬帝降書謂獻曰十姓部落比多欵附蕞爾都擔敢為背誕以卿忠果令其討伐遂斬首䘮元并児及妻兼復胡禄屋闕啜等五萬餘帳壺漿塞陌襁負而來自非信著逺蕃何以翕然至此邊陲寕謐繄卿是頼雖鄭吉之䕶南道班超之臨西域無以過焉言念勤勞豈忘鑒寐是年又詔曰疇庸賞善百王攸先追逺餙終千載同徳故尚書左丞相太子少傅贈司空荆州大都督許國文貞公蘇瓌履正體道方外直内悉心奉上卑身率禮叶賛帷幄三朝有鹽梅之任燮諧台衮九命為社稷之臣先朝晏駕釁起宫掖國擅稱制之姦人懐綴旒之懼凶威孔熾宗祀幾傾顧命遺恩太皇輔政逆臣刋削韋氏臨朝遂能首發昌言偘然正色列諸視聽暴于朝野松檟已逺風烈猶存緬懐誠節良深耿嘆可賜實封一百户至四年命與徐國公幽求配享睿宗廟庭三年二月郭䖍瓘為北庭都䕶累破吐蕃及突厥黙啜斬獲不可勝計以其俘来獻𤣥宗置酒勞之及將士等並賜帛手詔謂曰黙啜殘兇屈强邉徼吐蕃小醜孤負聖恩我國家豫在懐柔未遑吊伐而乃敢肆蜂蠆屢犯疆陲䖍瓘心藴六竒折衝千里追奔邁於三捜受降逾於萬計建功若此朕實嘉之六年六月丁亥詔曰凡有功者銘書于王之太常祭于大烝司勳詔之允所謂疇庸紀勞頌賞旌善蔵于天府享于廟庭臣哉隣哉其道光也故尚書左僕射太子少傅贈司空荆州大都督許文貞公瓌閑邪存誠允廸厥徳故尚書右丞相太子少保郴州刺史徐國公幽求聞義盡節克茂乃勳並儀刑羣后左右厥辟直道罔缺危言孔臧景雲末年邦國多難愷悌君子服勞王家或親受顧託以安劉氏或潜圖翼賛願奉唐侯纉乃舊服協于先契𢎞濟弼亮厥猷茂焉俾台小子嗣守文武之業獲奉宗廟之靈實資元輔是敭末命兹予大享於先王爾祖其從祀以配我有唐之休烈並可配享睿宗大聖真皇帝廟庭又詔曰皇輿肇建必有輔佐之臣天歩艱難爰仗經綸之業故侍中譙國公桓彦範故侍中平陽郡公敬暉故中書令兼吏部尚書漢陽郡公張柬之故特進博陵文貞公崔𤣥暐故中書令南陽郡公袁恕已等並徳惟神降材與運生道叶台嶽名書䜟緯寅亮帝載勤勞王家參復禹之嘉謀奉昇唐之景命雖徂謝已久而勳烈益彰撫彞鼎以念功想旂常而增感緬遵故實用表徽懿俾列在清廟登于眀堂克申從祀之儀式茂疇庸之典並可配享中宗孝和皇帝廟庭十年十一月丙申朔方軍節度大使兵部尚書信安郡王禕破突厥凱旋引將士等見帝置酒享之勑曰禕搃戎朔陲經畧萬里賦軍籍馬精卒銳兵自其有虞莫不素練而醜虜背誕偏師致誅謀若有神取如俯拾雖廟畧之云逺亦將士之力焉威武載揚頑凶且懾窮㓂覆巢以奔北羣師掉鞅而来歸因其凱旋聊加宴樂各宜坐飲相與盡歡十二年隴右節度使鄯州都督王君􅎢破吐蕃來獻戎㨗帝置酒于内殿享之謂曰卿能振國威恢邉破敵誠節既著俘獲又多疇庸策勳已有處分卿及將士等並宜飲燕兼有賜物各宜領取十七年三月𤓰州刺史墨離軍使張守珪沙州刺史賈順文大破吐蕃帝降書謂守珪曰吐蕃小宼干我邉鄙頻經䘮䘏竟不悛懲卿等早懐勇烈久司戎旅各効忠誠暗申計畧逺聞决勝加慰良深守珪及思順並宜賜紫其立功人敘録具状奏聞必要㨿實勿使踰濫今内出緋紫袍卿等領取量功分賞其被傷人仍給醫藥使得安全陣亡人具名録奏當加優贈天寳六載正月南郊禮畢詔太廟配享功臣髙祖太室加裴寂劉文静太宗室加長孫無忌李靖杜如晦髙宗室加禇遂良髙季輔劉仁軌中宗室加狄仁傑魏元忠王同皎文武之道既惟並用宗敬之儀不可獨闕肅宗至徳二年十月郭子儀既復東都加司徒封代國公實封一千户尋来朝兵仗迎于㶚上帝見之曰雖吾家國實卿再造之子儀頓首謝恩加中書令乾元二年二月丁未郭子儀破逆賊執其將車昻獻俘于朝徇于東西兩市而斬之御製郭子儀李光弼苗晉卿李麟李輔國考詞代宗寳應元年五月丁酉詔文武官應在凌霄門内謁見者并飛龍射生等並宜加寳應功臣七月乙巳射生使李惟詵藥子昂歩軍使彭體盈張知節並賜名寳應功臣八月壬戌殿中少監専知尚食李恕宜賜為寳應功臣二年七月上尊號大赦河北副元帥懐恩河東副元帥光弼幽州節度懐僊李抱玉郭英乂辛雲京侯希逸田神功孫志直白孝徳令狐彰李寳臣薛嵩田承嗣張獻誠魚朝恩程元振僕固瑒髙彦崇渾日進李建義李光逸楊崇光李懐光張如嶽白元光温如雅拓䟦澄泌髙暉盧欽文成惟良曹楚玉等各賜鐵劵以名蔵太廟盡畫像於凌煙之閣并宼難已来將相勳業多者其名籍圖畫亦准此廣徳元年吐蕃陥京師乗輿東幸郭子儀至吐蕃乃退代宗還京師見子儀曰用卿不早遂及於是乃賜鐵劵圖形凌煙閣徳宗建中元年十二月丁酉令詳定國初已来將相功臣名跡崇髙功效眀著者為二等搃一百八十七人武徳已来宰相以房𤣥齡杜如晦蕭瑀髙士㢘魏徴王珪戴胄岑文本馬周劉洎禇遂良于志寕張行成髙季輔韓瑗来濟張文瓘郝處俊李義琰裴炎蘇良嗣狄仁傑婁師徳王方慶王及善魏元忠姚崇朱敬則蘇瓌宋璟魏知古陸象先蘇頲張嘉貞李元紘韓休張九齡三十七人為上等竇威陳叔達等四十人為次等功臣以裴寂劉文静長孫無忌河間孝王恭李勣尉遲敬徳屈突通殷開山劉𢎞長孫順徳唐儉柴紹叚志𤣥劉政㑹張公瑾程知節秦叔寳虞世南李傑張柬之崔𤣥暐桓彦範袁恕已張仁愿敬暉劉幽求崔日用郭元振張説王琚王俊三十四人為上等淮安王神通等五十人為次等至徳已来將相既歿者以裴冕房琯杜鴻漸李嗣業劉正臣顔杲卿袁履謙張廵許逺盧奕南霽雲十一人為上等李光弼等十五人為次等二年十二月詔曰忠臣之事君也願隳家以奉國良將之養士也或均材以周恵爰自古昔其儔益鮮故竇嬰陳金于廟廡趙奢散財于部曲皆受之天府不取私門猶能垂名史册遺芳千載而况執上將之旗皷率先登之士卒將行命賞罄乃家財上以彰憂國之誠下以竭奉公之效不有褒羙孰旌忠賢河東節度使馬燧誠羙夙著宏畧載宣克揚經武之規實重安人之寄屬河朔干紀磁邢當寇而能忠義奮發奉辭問罪出師之際宣布眀誠誓將貲産分給戰士故得三軍之衆相與感激百勝之績於茲競勸朕當遂其懇懐以成厥羙殊常之跡古人所難舉而行之用眀信賞仍班王府之貨式表忠臣之節宜令度支出錢充給將士其馬燧家資並却還之興元元年四月帝在梁州詔諸軍從奉天隨從將士並賜為元從奉天定難功臣從糓口已来隨從將士賜名元從功臣六月副元帥李晟討朱泚既收復京城以露布聞帝覽之感泣百官皆出涕因上夀稱萬嵗曰李晟䖍奉聖謨盪滌凶逆然古之樹勳乃復都邑者往往有之至於不驚宗廟不易市肆長安人不識旗鼔安堵如初三代已來未之有也帝笑曰天生李晟為社稷萬人不為朕也百官再拜而退拜晟司徒賜永寕里第及涇陽上田延平之門林園女樂八人晟入所賜永寕里甲第帝令宰相及諸將㑹送是日特賜京兆府供饌具鼓吹迎導集宴京師以為榮觀女樂八人及銀綵噐等又令太常教坊備樂七月壬午車駕自興元至京師帝既還宫每間日宴勳臣於麟徳殿必親閲酒饌盛陳音樂極歡而罷其所頒賜李晟首之渾瑊次之諸宰相節將又次之所以褒元功示秩序也九月詔靈州大都督渾瑊入所賜太寕里第特賜女樂五人及錦綵銀噐等仍令宰臣節將㑹送有司備樂供饌貞元二年八月李懐光平詔曰河東保寕等軍節度并管内諸軍節度副元帥檢校司徒平章事北郡王燧惟嶽降生鬰為時傑奉上有匪躬之節訓師懐盡敵之謀嘉猷屢聞能事畢備朔方河中同降陜虢等州節度及管内諸軍行營兵馬副元帥侍中咸寕郡王瑊堅持不奪之志亟陳必勝之畧輯睦士旅崇功允集惟乃二帥一其誠心奉行天誅同奨王室是加寵命以荅殊勳燧可兼侍中仍與一子五品正員官并階餘並如故瑊可檢校司空仍與一子五品正員官并階餘並如故華州潼闗鎮國軍節度檢校尚書右僕射駱元光邠寕慶節度觀察等使檢校尚書左僕射韓遊瓌鄜坊丹延等州節度觀察使檢校兵部尚書唐朝臣等並節著艱危功成討伐可各賜實封二百户仍各與一子六品正員官并五品階餘並如故應諸軍同討懐光將士宜共賜三十萬端匹以充宴賞並各放歸本道仍令所司敘録即超資與改轉三年三月詔加李晟太尉依前兼中書令四月帝御宣政殿備禮册拜晟受封訖其羽儀乘輅謁太廟遂赴上於尚書省帝令中官就省賜晟良馬二匹錦綵一千疋銀噐十餘事并酒脯等以寵之五年九月西平王李晟與侍中馬燧召見於延英殿帝嘉其大勳乃詔曰昔我烈祖乘乾坤之盪滌掃隋季之荒屯體元御極作人父母則亦有熊羆之士不二心之臣左右經綸參翊締搆昭文徳恢武功威不若康不乂用端命于上帝付畀四方宇宙既清日月既貞王業既成太階既平乃圖厥容列于斯閣懋昭績効表式儀形一以不忘于朝夕一以永垂乎來𦙍君臣之義原莫重焉貞元己巳嵗秋九月我行西宫瞻宏閣崇搆見老臣遺像顒然肅然和敬在色想雲龍之叶應感致業之艱難覩往思今取類非逺且功與時並才為代生苟藴其才遇其時尊主庇民何代不有在中宗則桓彦範等著推戴之績在𤣥宗則劉幽求等申翼奉之勳在肅宗則郭子儀掃殄氛祲今則李晟等保寕朕躬咸宣力肆勤光復宗祏訂之前烈夫豈多謝閉而未録孰謂旌賢况念功紀徳文祖所為也在予曷其敢怠有司宜敘年代先後各圖其像列于舊臣之次仍令皇太子書於壁庻播嘉庸昭明天下俾後之来者知元勳不朽又書以賜晟刻石於門左於是史官考其功績第其先後以禇遂良蘇定方郝處俊等二十七人充之憲宗元和初杜黄裳為相劉闢作亂黄裳堅請討除及闢平宰臣入賀帝獨目黄裳曰此卿之功也四年四月制曰夫定社稷濟生人存不朽之名垂可久之業者必報以殊常之寵待以親比之恩遺國無窮時惟茂典故奉天定難功臣太尉兼中書令上柱國西平郡王食實封一千五百户贈太師李晟間代英賢自天忠勇邁濟時之宏算抱絰武之長材貫以丹誠協于一徳嘗遭屯難之際實著戡定之功鯨鯢既殱宫廟斯復眷兹勳伐則有褒榮永元天歩之夷載懐邦傑之力是加崇于往烈爰協比于後昆睦以宗親將予厚意其家宜令編附屬籍八月詔曰朕聞昔之佐時制物者咸有大功是惟五官以配五帝自時厥後有國家者莫不以輔弼之竒社稷之勳名登大烝陪享清廟苟非茂徳孰允盛儀贈太尉冕望重巖廊時為貞幹靈武艱阻首賛經綸宣力股肱平心鼎鉉任戡定之成業推翼戴之嘉猷贈太師晟識精韜鈐神假雄武建中宼孽躬踐憂虞垂餌虎狼致威罇爼刷宫廟之塵穢逥日月之光輝贈太尉秀實氣全剛柔節固金石兇渠僣逆潛蹶根萌矯命還師衷刃决死紓阽危于怵迫挫狂狡之姦謀並材為時生用當國否感雲龍而應變炳辰象以䧏靈光復寰區振揚風槩勳庸蔵于盟府寵餙備于前朝光隂不追盛烈如在朕頃因郊祀爰舉典常俾差茂勳以配殷祭惟咸有一徳允屬乎三臣庻昭示于將来式崇恩于既往冕宜配享肅宗廟庭晟秀實宜配享徳宗廟庭馬總元和中為安南都䕶以綏蠻功就加金紫文宗太和元年十一月勑故太尉兼中書令李晟勳業崇髙銘在鍾鼎其神道碑宜令所司建立二年二月丁亥朔太子詹事叚伯倫奏亡父贈太尉秀實准前後勑令所司置廟立碑今營造已畢取今月二十五日行升祔禮詔曰叚秀實忠衛宗社功配廟食義風所激千載興起間代勳力須異等夷宜賜綾絹五百匹以度支物充仍令所司供少牢并給鹵簿人夫兼令太常博士一人檢校後唐莊宗同光元年三月詔隨駕收復汴州并扈從到雒及南郊立仗都將已下至節級長行軍將等朕自削平中夏掃盪羣兇被介胄以征行歴星霜而扈從凡經百戰盡力殊功永念丹心真同赤子若無旌賞豈表恩榮其都將官員司並賜謀定亂佐國功臣自僕射尚書常侍至大夫中丞宜並賜忠勇拱衛功臣其初帶銜宜並賜忠烈功臣已有功臣名者不在此限其節級長行軍將並賜扈蹕功臣十月己夘入汴己亥宴于崇元殿偽將段凝霍彦威戴思逺王瓉等侍酒酣帝以酒屬眀宗曰今辰宴客皆吾前日之仇敵也一旦與吾同筵蓋卿前鋒之效也偽將等泥首稱謝帝曰吾與總管話舊公輩勿以為嫌因賜服玩撫慰之郭崇韜自莊宗嗣位為中門使從擒王彦章誅梁氏䧏段凝皆崇韜賛成其功也荘宗至汴州宰相豆盧革在魏州令崇韜權行中書事俄拜侍中兼樞宻使及郊禮畢以崇韜兼領鎮冀節度使進封郡公邑二千户賜鐵劵恕十死周徳威同光初追贈太師大成中詔與李嗣昭苻存審配享莊宗廟庭朱友謙自梁歸順破梁軍加守太尉西平王同光初莊宗滅梁友謙覲于雒陽莊宗置宴享勞寵錫無算親酌觴屬友謙曰成吾大業者公之力也符彦超同光末赴北京廵檢先是朝廷令内官二人在太原一監兵一監倉庫及眀宗入雒皇弟存覇单騎奔河東與内官謀殺彦超與留守張憲彦超覺之宻與憲謀未决部下大譟州兵畢集張憲出奔是夕軍士殺内官存覇於衙城詰旦聞雒城禍變彦超告諭三軍眀宗又令其弟龍武都尉侯彦卿馳騎安撫後彦超入覲眀宗召見撫諭授晉州留後未行㑹其弟前曹州刺史彦饒平宣武亂軍眀宗喜召彦超謂之曰吾得爾兄弟力餘更何憂爾為我往河東撫育耆舊即授北京留守太原尹眀宗天成四年三月辛巳王晏球至自定州帝曰中山悖逆勞卿攻討今已掃盪兼敗鮮卑中興已来未有立功如卿者晏球曰臣謬主兵權不能尋振皇成久煩饋運上頼睿算薄有所成失律是懼臣有何功命樂舉酒錫賚殊異移授天平軍莭度晉髙祖天福三年正月乙丑西京留守李周奏乞正鄉名里號勑李周位列藩宣秩居台輔忠能佐國孝以成家今貢表章請改鄉里既久符于舊典當普示于新恩宜賜俞允兼諸道應帶平章事已上並准唐長興二年正月十五日勑命施行周世宗顯徳四年七月己丑賜宰臣李糓親征圖一面其文翰林學士承㫖陶穀之所撰也先是帝征淮南以夀陽未㧞時穀卧疾未愈遂詔宰臣范質王溥就第以問之穀因上章陳親征之利者三後城㧞帝以其表示陶穀且曰臣之事君不當有隠觀李穀敷奏忠誠可嘉爾為賛述以勸來者因有是賛册府元龜卷一百三十三
