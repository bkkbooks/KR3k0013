body:
  text: 册府元龜卷五百七十七宋王欽若等撰掌禮部奏議第五南齊王逡之仕宋為尚書左丞順帝昇明三年錫齊王大輅戎輅各一乘黄五輅無大輅戎輅逡之議大輅殷之祭車故不登周輅之名而明堂位云大輅殷輅也注云大輅木輅也月令中央土乘大輅注云殷輅也禮器大輅繁纓一就注云大輅殷之祭天車也周禮五輅玉輅金輅象輅革輅木輅則周之木輅殷之大輅周苹輅建大白以即戎此則戎輅也意謂國之大事在祀與戎故錫以殷祭天之車與周之即戎之輅祀則以殷戎必以周者明郊天義逺逮前代之禮即戎事近故以今世之制明堂云魯君孟春乘大輅載旂十有二旒日月之章祀帝于郊夫必以大輅以錫諸侯良有以也今木輅即大輅也太尉左長史王儉議宜用金輅九旒時乘黄無副借用五輅天朝臨軒權列三輅王儉為左僕射高帝建元元年太常上朝堂諱訓儉議曰后諱依舊不立訓禮天子諸侯諱羣祖臣𨽻既有從敬之義宜為太常府君諱至於朝堂牓題本施至極既追尊所不及禮降於在三晉之京兆宋之東安不列牓題孫毓議稱京兆列在正廟臣下應諱而不上牓宋初博士司馬道敬議東安府君諱冝上牓何承天執不同即為明據其有人名地名犯太常府君及帝后諱者皆改宣帝諱同二名不偏諱所以改承明門為北掖以榜有之字與承并東宮承華門亦改為宣華云是年有司奏郊殷之禮未詳郊在何年復以何祖配郊殷復在何時未郊得先殷與不明堂亦應與郊同年而祭不若應祭者復有配與無配不祀者堂殿職僚毁置云何八座丞郎通闗博士議議曹郎中裴昭明儀曹郎中孔逷議今年七月冝殷祠來年正月冝南郊明堂竝祭而無配殿中郎司馬憲議南郊無配饗祠如舊明堂無配宜應廢祀其殷祠同用今十月儉議案禮記王制天子先祫後時祭諸侯先時祭後祫春秋魯僖二年祫明年春禘自此以後五年再殷禮緯稽命徴曰三年一祫五年一禘經記所論禘祫與時祭其言詳矣初不以先殷後郊為嫌至於郊配之重事由王迹是故杜林議云漢業特起不因縁堯冝以高帝配天魏高堂隆議以舜配天蔣濟云漢時奏議謂堯已禪舜不得為漢祖舜亦已禪禹不得為魏之祖今宜武皇帝配天晉宋因循即為前式又按禮及孝經援神契竝云明堂有五室天子毎月於此聴朔布敎祭五帝之神配以有功德之君大戴禮記曰明堂者所以明諸侯尊卑也許愼五經異義曰布政之宫故稱明堂明堂盛貌也周官匠人職稱明堂有五室鄭𤣥云周人明堂五室帝一室也初不聞有文王之寢鄭志趙商問云説者謂天子廟制如明堂是為明堂即文廟耶鄭答曰明堂主祭上帝以文王配耳猶如郊天以后稷配也袁孝尼云明堂法天之宫本祭天帝而以文王配之配其父於天位則可牽天帝而就人鬼則非義也㤗元十三年孫耆之議稱郊以配天故配之以后稷明堂以祀帝故配之以文王由斯言之郊為皇天之位明堂即上帝之廟徐邈謂配之為言必有神主郊為天壇則堂非文廟史記云趙綰王臧欲立明堂于時亦未有郊配漢又祀汾隂五畤即是五帝之祭亦未有配議者或謂南郊之日已旅上帝若又以無配而特祀明堂則一日再祭於義為黷案古者郊本不共日蔡邕獨斷曰祠南郊禮畢次北郊又次明堂高廟世祖廟謂之五供馬融云郊天之祀咸以夏正五氣用事有休有王各以其時兆於方郊四時合嵗功作相成亦以此月總旅明堂是則南郊明堂各日之證也近代從省故與郊同日猶無煩黷之疑何者其為祭雖同所以致祭則異孔晁云言五常佐天化育故有從祀之禮旅上帝是也至於四郊明堂則是其本祀之所譬猶功臣從饗豈復廢其私廟且明堂有配之時南郊亦旅上帝此則不疑於共日今何故致嫌於同辰又禮記天子祭天地四方山川五祀嵗遍尚書堯典咸秩無文詩云昭事上帝聿懐多福據此諸義則四方山川猶必齊祀五帝大神義不可畧魏文帝黄初二年正月郊天地明堂上帝太和元年正月以武皇帝配天文皇帝配上帝然則黄初中南郊明堂皆無配也又郊日及牲色異議紛然郊特牲云郊之用辛周之始郊也盧植云辛之為言自辛潔也鄭𤣥云用辛日者謂人當齋戒新身也漢魏以來或丁或巳而用辛常多考之典據辛日為允郊特牲又云郊牲幣宜以正色繆龍據祭法云天地騂犢周家所尚魏以建丑為正牲宜尚白白虎通云三王祭天一用夏正所以然者夏正得天之數也魏用異朔故牲色不同今大齊受命建寅創厯郊廟用牲一依晉宋謂宜以今年十月殷祀宗廟自此以後五年再殷來年正月上辛有事南郊冝以共日還祭明堂又用次辛饗祀北郊而竝無配犧牲之色率由舊章詔可明堂可更詳有司又奏明堂尋禮無明文惟以孝經為正切謂設祀之意盖為文王有配則祭無配則止愚謂既配上帝則以帝為主今雖無配不應闕祀徐邈近代碩儒每所折𠂻其云郊為天壇明堂非文廟此實明據内外百司立議已定如更詢訪終無異説傍儒依史竭其管見既聖㫖惟疑羣下所未敢詳廢置之宜仰由天鍳詔依舊四年世祖即位儉為尚書令其秋有司奏尋前代嗣位或數前郊年或别始晉宋以來未有畫一今年正月已郊未審明年應南北二郊祀明堂與不依舊通闗八座丞郎博士議儉議案秦為諸侯雜祀諸畤始皇并天下未有定祠漢高受命因雍四畤而起北畤始畤五帝未定郊丘文帝六年新垣平議初起渭陽五帝廟武帝初至雍郊見五畤後帝三嵗一郊祠雍元鼎四年始立后土祠於汾隂明年立太一祠於甘泉自是以後二嵗一郊與雍更祠成帝初即位丞相廷尉匡衡於長安定南北郊哀平之際又復甘泉汾隂祠天地平帝元始五年王莽奏依丞相衡議還依復長安南北二郊光武建武二年定郊兆於洛陽魏晉因循率由漢典雖時或叅差而類多間嵗至於嗣位之君參差不一冝有定制撿晉明帝太寧五年南郊其年九月成帝即位明年改元即郊簡文咸安二年南郊其年七月孝武即位明年亦郊宋元嘉三十年正月南郊其年二月孝武嗣位明年改元亦郊此則二代明例差可依放謂明年正月宜饗祀二郊䖍祭明堂自兹厥後仍舊間嵗尚書領國子祭酒張緒等十七人並同儉議詔可是年司空禇淵薨時司空掾屬以淵未拜疑應為吏敬不儉議依禮媍在塗聞夫家䘮改服而入今掾屬雖未服勤而吏禀於天朝宜申禮敬司徒府又以淵既解職而未恭後授府猶應上服以不儉又議依中朝士孫德祖從樂陵遷為陳留未入境率樂陵郡吏依見君之服陳留迎吏依娶女有吉日齊衰弔司徒府宜依居官制服永明元年當南郊而立春在郊後世祖欲遷儉啓案禮記郊特牲云郊之祭也迎長日之至也大報天而主日也易説三王之郊一用夏正盧植云夏正在冬至後傳曰啓蟄而郊此之謂也然則圜丘與郊各自行不相害也鄭𤣥云建寅之月晝夜分而日長矣王肅曰周以冬祭於天圜丘以正月又祭天以祈糓祭法稱燔柴太壇則圜丘也春秋傳云啓蟄而郊則祈榖也謹尋禮傳二文各有其義盧王兩説有若合符中朝省二丘以并二郊即今之郊禮義在報天事兼祈糓既不全以祈農何必候啓蟄史官惟見傅義未逹禮㫖又尋景平元年正月三日辛丑南郊其月十一日立春元嘉十六年正月六日辛未南郊其月八日立春此復是近世明例不以先郊後春為嫌若或以元日合朔為礙者則晉成帝咸康元年正月一日加元服二日親祠南郊元服之重百僚備列雖在致齊行之不疑今齋内合朔此即前准若聖心過恭寧在嚴潔合朔之日散官備防非預齋之限者於止車門外别立幔省若日色有異即列於省前望實為允謂無煩遷日從之是年十二月有司奏今月三日臘祠太社稷一日合朔日蝕既在致齋内未審於社祠無礙不曹撿未有前准撿議禮記曾子問天子嘗禘郊社五禮之祭簠簋既陳惟大䘮乃廢至於當祭之日火及日蝕則停尋伐鼓用牲由來尚矣而簠簋初陳問所不及據此而言致齋初日仍值薄蝕則不應廢祭又後漢初平四年士孫瑞議以日蝕廢冠而不廢郊朝議從之王者父天母地郊社不殊此則前准謂不宜廢詔可三年正月詔立學創立堂宇召公卿子弟下及員外郎之嗣凡置生二百二十人其年秋中悉准有司奏宋元嘉舊事學生到先釋奠先聖先師禮又有釋菜未詳今當行何禮用何樂及禮器儉議周禮春入學舍釋菜合舞學記云始敎皮弁祭菜示敬道也又云始入學必釋菜於先聖先師中朝以來釋菜禮廢今之所行釋奠而已金石俎豆皆無明文方之七廟則輕比之五禮則重陸納車武子謂宣尼廟宜依亭侯之爵范寗欲依周公之廟用王者儀范宣謂當其為師則不臣也釋奠日冝備帝王禮樂此則車陸失於過輕二范傷於大重喻希云若至王者自設禮樂則肆賞於致敬之所若欲嘉美先師則所况非備尋其此説守附情理皇朝屈尊𢎞敎以師資禮同上公即事惟允裴松之議應儛六佾以郊樂未具故權奏登欹今金石已備冝設軒縣之樂六佾之儛牲牢器用悉依上公其冬皇太子講孝經親臨釋奠車駕幸聼五年十月有司奏南郡王昭業冠求儀注未有前准儉議皇孫冠事歴代所無禮雖有嫡子嫡孫而地居正體下及五世今南郡王體自儲暉實惟國重元服之典冝異列蕃案士冠禮主人元冠朝服賔加其冠贊者結纓鄭𤣥云主人冠者之父兄也尋其言父及兄則明祖在父不為主也大戴禮記公冠篇云公冠自為主四加元冕以卿為賔此則繼體之君及帝之庶子不得稱子者也小戴禮記冠義元冠於阼以著代也醮於客位三加彌尊加有成也注稱嫡子冠於阼庶子冠於房記又云古者重冠故行之於廟所以自卑而尊先祖也據此而言彌與鄭注義禮相㑹是故中朝以來太子冠則皇帝臨軒司徒戎事之所乘犧牲蠒握之所薦竝冝悉依尚色三代服色以姓音為尚漢不識音故還尚其行運之色今既無善律則大齊所尚亦宜依漢道若有善吹律者便應還取姓尚太子僕周顒議三代姓音古無前記裁音配尚起自曼容是曼容善識姓聲不復方假吹律何故能識逺代之宫商而更述皇代之律吕而云當今無吹律以定尚宜附漢以從闕耶皇朝本以行運為尚非闗不定於音氏如此設有善律之知無不依導聲以為尚散騎常侍劉郎之等十五人竝議駁之事不行蔡履為祠部郎永明三年履議郊與明堂本宜異日漢東京禮儀志南郊禮畢次北郊明堂高廟世祖廟謂之五供蔡邕所據亦然近存簡省制故郊堂共日來年郊祭宜有定准太學愽士王祐議來年正月上辛宜祭南郊次辛有事明堂後辛饗祀北郊兼􅀶士劉蔓議漢元鼎五年以辛巳行事自後郊日畧無違異元封元年四月癸卯登封泰山坐明堂五月甲子以高祖配漢家郊祀非盡天子之縣故祭祀之日事有不同後漢永平以來明堂兆於國南而郊以上丁故供修三祀得并在初月雖郊有常日明堂猶無定辰何則郊丁社甲有説則從經禮無文難以意造是以必算辰良而不祭寅丑且禮之奠祭無同共者惟漢以朝日合於報天耳若依漢書五供便應先祭北郊然後明堂則是地先天食所未可也兼太常丞蔡仲熊議鄭志云正月上辛祀后稷於南郊還於明堂以文王配故宋氏創立明堂郊還即祭是用鄭志之説也盖為志者失非元意也元之言曰未審周明堂以何日於月令則以季秋案元注月令季秋大饗帝云大饗遍祭五帝又云大饗於明堂配以文武大司樂凡大祭祀宿縣尋預縣之㫖以日出行事故也若日闇而後行事則無假預縣果日出行事何得方俟郊還東京禮儀志不記祭之時日而志云郊天夕牲之夜夜漏未盡八刻進熟明堂夕牲之夜又夜漏未盡七刻進熟明堂在郊前一刻而進獻奏樂方待郊還魏高堂隆表九日南郊十日北郊十一日明堂十二日宗廟案隆此言是審於時定制是則周禮二漢及魏皆不共日矣禮以辛郊書以丁祀辛丁皆合宜臨時詳擇太尉從事中郎顧憲之議春秋傳以正月上辛郊祀禮記亦云郊之用辛尚書獨云丁巳用牲于郊先儒以為先甲三日辛後甲三日丁可以接事天神之日後漢永平二年正月辛未宗祀光武皇帝於明堂辛既是常郊之日郊又在明堂之前無容不郊而堂則理應郊堂同日西閣祭酒梁王議孝經鄭𤣥注云上帝亦天别名如鄭㫖與天亦言不殊近代同辰良亦有據泰和元年正月丁未郊祀武皇帝以配天宗祀文皇帝於明堂以配上帝此則已行之前准驍騎將軍江淹議郊旅上天堂祀五帝非為一日再黷之謂無俟釐苹尚書陸澄議遺文餘事存乎舊書郊宗地近勢可共日而不共者義在必異也元始五年正月六日辛未郊高皇帝以配天二十一日丁亥宗祀孝文於明堂配上帝永平二年正月辛未宗祀五帝於明堂光武皇帝配章帝元和二年廵狩岱宗柴祭翌日祠五帝於明堂柴山祠地尚不共日郊堂宜異於例益明陳忠奏事云延光三年正月十三日南郊十四日北郊十五日明堂十六日宗廟十七日世祖廟仲逺五祀紹統五供與忠此奏皆為相符高堂隆表二郊及明堂宗廟各一日摯虞新禮議明堂南郊間三兆禋天饗地共日之證也又上帝非天昔人言之已詳今明堂用日冝依古在北郊後漢惟南郊備大駕自北郊以下車駕十省其二今祠明堂不應大駕尚書令王儉議前漢各日後漢亦不共辰魏晉故事不辨同異宋立明堂惟據自郊徂宫之義未逹祠天旅帝之㫖何者郊壇旅天甫自詰朝還祀明堂便在日昃雖致祭有由而煩黷斯甚異日之議於理為宏春秋感精符云王者父天母地則北郊之祀應在明堂之先漢魏北郊亦皆親奉晉㤗寜有詔未及遵遂咸和八年甫得營繕太常顧和秉議親奉康皇之世已經遵用宋氏因循未遑釐革今宜親祠北郊明年正月上辛祠昊天次辛瘞后土後辛祀明堂御竝親奉車服之儀率遵漢制南郊大駕北郊明堂降為法駕衮冕之服諸祀咸同詔可何諲之為太常丞永明三年有司奏來年正月二十五日丁亥可祀先農即日輿駕親耕宋元嘉大明以來竝用立春後亥日尚書令王儉以為亥日籍田經記無文通下詳議兼太學博士劉蔓議禮孟春之月立春迎春又於是月以元日祈糓又擇元辰躬耕帝籍盧植説禮通辰日日甲至癸也辰子至亥也郊天陽也故以日籍田隂也故以辰隂禮卑後必居其末亥辰之末故記稱元辰注曰吉亥又五行之説木生於亥以亥日祭先農又其義也諲之議鄭元云元辰盖郊後吉亥也亥水辰也凡在懇稼咸存灑潤五行説十二辰為六合寅與亥合建寅月東耕取月建與日辰合也國子助敎桑惠度議尋鄭𤣥以亥為吉辰者陽生於子元起於亥取陽之元以為生物亥又為水十月所建百糓頼兹沾潤畢熟也助敎周山文議盧植云元善也郊天陽也故以日籍田隂也故以辰蔡邕月令章句觧元辰云日幹也辰支也有事於天用日有事於地用辰助敎何佟之議少牢饋食禮云孝孫其來日丁亥用薦歳事于皇祖伯某注云丁未必亥也直舉一日以言之耳禘太廟禮日用丁亥若不得丁亥則用己亥辛亥茍有亥可也鄭又云必用丁巳者取其令名自丁寜自變改皆為謹敬如此丁亥自是祭祀之日不専施於先農漢文用此日耕籍祠先農故後王相承用之非有别議殿中郎顧暠之議鄭𤣥稱先郊後吉辰而不説必亥之由盧植明于亥為辰亦無常辰之證漢世躬籍肇發漢文詔云農天下之本其開籍田斯乃草創之令未覩親載之吉也昭帝癸亥耕鈎盾弄田明帝癸亥耕下邳章帝乙亥耕定陶又辛丑耕懐魏之列祖寔書辛未不繫一辰徴於兩代矣推晉之革魏宋之因晉正是服膺康成非有異見者也班固序亥位云隂氣應亡射該藏萬物而雜陽閡種且亥既水辰含育為性播厥取吉其在兹乎固序丑位云隂大旅助黄鍾宣氣而牙物序未位云隂氣受任助㽔賔君主種物使長大茂盛是漢朝迭選魏所遷的舊用丑實兼有據叅議奏用丁亥詔可六年諲之議今祭有生魚一頭干魚五頭少牢饋食禮云司士外魚腊膚肉用鮒十五上既云腊下必是鮮其數冝同稱膚足知鱗革無毁記云槁魚曰商祭鮮魚曰脡祭鄭注商量脡直也尋商量㫖裁截脡義在全賀循祭義猶用魚十五頭今鮮頓刪約槁皆全用謂冝鮮槁各二頭槁徴斷首尾亦存古義國子助敎桑惠度議記稱尚元酒而爼腥魚𤣥酒不容多鮮魚理宜約干魚五頭者以其既加人功可法於五味以象酒之五齊也今欲鮮槁各雙義無所法諲之議不行後為祠部郎十年詔故太宰禇淵故太尉王儉故司空栁世隆故驃騎大將軍王敬則故鎭東大將軍陳顯逹故鎮東將軍李安民六人配饗太祖廟廷諲之議功臣配饗累行宋世撿其遺事題列坐位具書贈官爵謚及名文不稱主便是設板也白虎通祭之有主孝以繫心也揆斯而言外配廟庭不容有主宋時板度既不復存今之所制大小厚薄如尚書召板為得其𠂻有司攝太廟舊人亦云見宋功臣配饗坐板與尚書召板相似事見於儀注王晏為右僕射永明十一年與吏部尚書徐孝嗣侍中何裔奏故太子祔太廟既無先准撿宋元后故事太尉行禮太子拜伏與太尉俱臣等叅議依擬前典太常王廟位太尉執禮祔太孫拜伏皆與之俱正禮既畢隂室之祭太孫宜親自進奠詔可庾曇隆為通直散騎常侍明帝建武二年上啓伏見南郊壇圓兆外内永明中起瓦屋形製宏壯撿案經史無所准尋周禮祭天於圓丘取其因高之義兆於南郊就陽位也故以高敞貴在上昭天明旁流氣物自秦漢以來雖郊祀叅差而壇域中間竝無更立宫室其意何也正是質誠尊天不自崇樹兼事通曠必務開逺宋元嘉南郊至時權作小陳帳以為休息太始薄加修廣永明初彌漸高麗徃年工匠遂起立瓦屋前代皇帝豈於上天之祐而昧營搆所不為者深有情矣記稱掃地而祭於其質也器用陶匏天地之性也故至敬無文以素為貴竊謂郊事宜擬休偃不俟高大以明謙恭肅敬之㫖庶或仰允大靈俯愜群望詔付外詳國子助敎徐景嵩議伏尋三禮天地兩祀南北二郊但明祭取特牲器用陶匏不載人君偃處之儀今帳瓦之搆雖殊具非千載成例冝務因循太學士賀瑒議周禮王旅上帝張氊案設皇郊國有故而祭亦旅氊案以氊為牀於幄中不聞郊所置宮宇兼左丞王摛議掃地而祭於郊謂無築室之議竝同曇隆驍騎將軍虞炎議以為誠慤所施止在一壇漢之郊祀饗帝甘泉天子自行宫望拜息殿去壇塲既逺郊奉禮畢旋幸於此瓦殿之與惟宮謂無闗簡格祠部郎李撝議周禮凡祭祀張其旅幕張尸次尸則有幄仲師云尸次祭祀之尸所居更衣帳也凡祭文之設既不止於郊祀立尸之言理應闗於宗廟古則張幕今則房省宗廟旅幕可變為棟宇郊祀氊案何為不轉製擔薨曇隆議不可蕭琛為尚書左丞永㤗元年有司議帝初立應廟見不尚書令徐孝嗣議嗣君即位竝無廟見之文蕃支纂業乃有虞謁之禮琛議曰竊聞祗見厥祖義著商書朝于武宮事光晉册豈有正位居體繼業承天而不䖍覲祖宗格于太室毛詩周頌篇曰烈文成王即政諸侯助祭也鄭注云新王即政必以朝享之禮祭於祖考告嗣位也又篇曰閔予小子嗣王朝廟也鄭注云嗣王者謂成王也除武王之服將始即政朝於廟也則隆周令典煥炳經紀體嫡居正莫若成王又以二漢由太子而嗣位者西京七主東都六帝其昭成哀和四君竝皆謁廟文存漢史其惠景武明章五君前史不載謁事或是偶有闕文理無異説議者乃云先在儲宫已經致敬卒哭之後即親奉時祭即是廟見故無别謁之禮竊以為不然儲后在宫亦從郊祭若謂前䖍可兼後敬開元之始則不假復有配天之祭矣若不親奉時祭仍為廟見者自漢及晉支庶嗣位竝皆謁廟既同有蒸嘗何為獨循繁禮且晉成帝咸和元年改號以謁廟咸康元年加元服又更謁廟夫時非異主猶不疑二禮相因况位隔君臣而追以一謁兼敬宜逺纂周漢之盛範近黜晉宋之乖義展誠一廟駿奔萬國奏可徐孝嗣為尚書令永㤗元年奏議曰夫人倫之始莫重冠婚所以尊表成德結歡兩姓年代汙隆古今殊則繁簡之儀因時或異三加廢於王庶六禮限於天朝雖因習永久事難頓改而大典之要深宜損益案士冠禮三加畢乃醴冠者醴則惟一而已故醴辭無二若不醴則毎加輙醮以酒故醮辭有三王肅云醴本古味其禮重酒用時味其禮輕故也或醴或醮二三之義詳於經文今皇王冠畢一酌而已即可擬古設醴而猶用醮辭寔為乖𠂻尋婚禮實篚以四爵加以合􅈟既崇尚質之理又象判合之義故三飯卒食再酳用􅈟先儒以禮成好合事終於三然後用卺合儀注先酳􅈟以三有違㫖趣又郊特牲曰三王作牢而用太古之器重夫婦之始也今雖以方樏示約而彌乖昔典又連􅈟以鏁盖出近俗復别有牢燭彫費乎飾亦虧曩制方今聖政日隆聲敎惟穆則古昔以敦風存餼羊以愛禮㳂襲之䂓有功治要嘉禮實重宜備舊章謂自今王侯已下冠畢一酌醴以遵古之義醴即用舊又於事為元婚亦依古以􅈟酌終酳之酒竝除金銀連鏁自餘雜器悉用埏陶堂人執燭足􅂶炳燎牢燭華侈亦冝停省庶别斵雕可期移俗有漸叅議竝同奏可册府元龜卷五百七十七
