body:
  text: 册府元龜卷六百六十八宋王欽若等撰内臣部翊佐規諫翊佐夫垂統繼世荷三靈之睠協力諌議資中人之助自炎漢甫定外戚擅權積成姦威幾易皇胄頼其忠言饗應群疑氷釋輔正神器翊登天極降及於後益濟其美首公竭節扶危成安昭諸信書厥有丕績者焉漢張澤為宦者令太尉周勃與丞相陳平誅諸呂迎立代王是為孝文帝初東侔侯與太僕滕公入清宮殿麾左右執㦸者皆仆兵罷去有數人不肯去澤諭告示亦去兵後漢孫程為中黄門給事長樂宮遷中常侍順帝為太子時安帝乳母王聖大長秋江京后兄車騎將軍閻顯等讒太子廢為濟隂王延光四年三月北鄉侯立為天子其年十月病篤程謂濟隂王謁者長興渠姓興名渠曰王以嫡統本無失徳先帝用讒遂至廢黜若北鄉侯不起共斬江京閻顯事乃可成渠等然之乂中黄門南陽王康先為太子府史自太子之廢嘗懐歎憤又長樂太官丞京兆王國並附同於程至二十七日北鄉侯薨閻顯白太后徵諸王子簡為帝嗣未及至十一月二日程遂與王康等十八人聚謀於西鍾下皆截單衣為誓四日夜程等共㑹崇徳殿上因入章臺門時江京劉安及李閏陳逹等俱坐省門下程與王康共就斬京安逹以李閏權勢積為省内所服欲引為主因舉刄脇閏曰今當立濟隂王無得摇動閏曰諾於是扶閏起俱於西鍾下迎濟隂王立之是為順帝曹騰為中常侍桓帝即位騰與長樂太僕州輔等七人以定策功皆封亭侯曹節為中常侍奉車都尉建寧元年持節將中黄門虎賁羽林千人北迎靈帝陪乘入宮及即位以定策功封侯後魏趙黑字文靖為侍中封河内公獻文將傳位京兆王子推訪諸羣臣百官唯唯莫敢亢言者唯源賀等辭義正直不肯奉詔獻文怒變色復以問黑黑曰臣愚無識信情率意伏惟陛下春秋始富如日方中天下說其盛明萬物懐其光景元元之心願終萬歳若聖性淵逺欲頥神味道者臣黑以死奉戴皇太子不知其他獻文黙然良久遂傳祚於孝文王温字桃陽為尚食典御中給事中給事東宮延昌四年群官迎孝明於東宮温於卧中起帝與保母扶抱入踐帝位平季字稚穆為中給事中與爾朱榮等議立莊帝即位超拜平北將軍肆州刺史尋除撫軍中侍中以參謀之勲封元城縣開國侯食邑七百户唐李輔國少侍東宮天寳末𤣥宗幸蜀輔國侍太子扈從至馬嵬乃獻策請分兵北如朔方以圗興復輔國從至靈武勸太子即帝位以係人心及肅宗即位擢為太子家令判元帥府行軍司馬事以心腹委之程元振直内侍省為内射生使寳應元年四月肅宗大漸皇后張氏有寵無子慮失權勢結少子越王係宻搆異謀將圖廢立是月乙丑皇后矯詔召太子元振知之濳發於李輔國輔國久典禁兵素與皇后嫌隙及聞元振言有自得色乃與元振定策伏兵於凌霄門擁太子請不赴召以兵翼太子入飛龍厩候變而動既夜輔國元振乃勒兵㑹於三殿收捕越王係及同謀中官朱光輝馬英俊等百餘人禁錮之逼皇后幽於别殿丁卯肅宗疾不起元振等始迎太子於九僊門見羣臣行監國之禮己巳即皇帝位是為代宗俱文珍從義父改姓劉名貞亮順宗自正月即位疾患不能言至四月益劇時王叔文韋執誼等專政雖時扶坐殿羣臣入閣望拜而已未嘗有進見者天下事皆專斷於叔文而中官李忠言特詔王伾為之内主執誼行之於外朋黨讙譁榮辱進退生於造次唯意所欲不拘程度既知内外厭毒慮其摧敗即謀兵權欲以自固於是人情益疑懼不測其所為朝夕伺候㑹其與執誼交惡心腹内離外有韋臯裴均嚴綬等牋表而文珍與中官劉光奇薛盈珍尚演解玉等皆先朝任使舊人同心怨憤屢以啟帝帝固厭倦萬機嫉惡叔文等至七月乙未遂詔翰林學士鄭絪衞次公王涯等入至金鑾殿撰制詔命太子勾當軍國事及太子受内禪時議嘉其忠藎累遷至右衞大將軍知内侍省事王守澄元和末入侍憲宗疾大漸守澄與中尉馬進潭梁守謙劉承偕韋元素等定策立穆宗楊復恭為觀軍容使文徳元年二月僖宗不豫未知所主羣臣以吉王最賢將立之復恭請以封王監國乃宣遺詔立為皇太弟遂即帝位是為昭宗加復恭開府金吾上將軍劉景宣與西門重遂為兩軍中尉昭宗大順二年十二月天威軍使李順節恃恩恣横出入以兵仗自隨景宣重遂懼其覬圖非望乃傳詔召順節節以甲士三百自隨至銀臺門門司傳詔止從者景宣重遂在仗舍邀順節坐次令部將伊先審斫順節頭隨劍落後唐張承業昭宗時以寺人監河東軍及誅内官太祖雖奉詔命實保憐之匿於斛律佛寺其後復以為監軍待遇益至承業每歔欷感徳後太祖病篤啟手之夕召承業屬之曰吾兒孤弱羣庶縱横後事公善籌之承業奉遺顧爰立莊宗初入聼大事時季父振武節度使克寧為管内蕃漢馬步都知兵馬使典握兵柄莊宗以軍府事讓之曰兒年幼稚未通庶政雖承遺命恐未能彈壓季父勲徳俱髙衆情推伏請當制置以鎮羣心克寧曰亡兄遺命屬在我兒孰敢異議但嗣世中外之事何憂不辦因率先拜賀初太祖奬勵戎功多畜庶孽衣服禮秩如嫡者六七比之嗣王年齒又長各有部下之兵朝夕聚議欲謀為亂及莊宗紹統或强項不拜鬱鬱憤惋託疾廢事命李存顥以陰計干克寧曰兄亡弟及古今舊事季父拜姪理所未安克寧妻素剛狠因激怒克寧陰圗禍亂存顥存實欲以克寧之弟謀害承業及李存璋等欲以并汾九州歸附於梁送貞簡太后為質克寧意將激發乃擅殺大將軍李存質請授已雲州節度轄附朔應州為屬郡莊宗悉俞允然知其陰禍有日克寧候莊宗過其第則圗竊發幸臣史敬鎔者亦為克寧所任盡得其情來告莊宗莊宗謂承業曰季父所為如此無猶子之情予當避路則禍亂不作矣承業曰臣受命先帝言猶在耳存顥軰欲以太后降賊公欲何路求生不即誅除亡無日矣因召吳珙李存璋李存敬朱守殷說其謀衆咸憤怒三月壬戌命存璋伏甲攻之遂平其難及莊宗平定河朔連歳出征軍國大事一以委承業夙夜在公以身犯難不畏强禦蒞官行法督賦徵租廪藏盈衍帝所倚頼以兄事之從周徳威討劉守光令承業往視賊勢因請莊宗自行果成大㨗承業感武皇厚遇自莊宗在魏州垂十年太原軍國政事一委承業而積聚庾帑收兵市馬招懐流散勸課農桑成是霸基者承業之忠力也規諫夫邇臣盡規不專在於守和而已繇東京已來乃有列宮省之任在皇位之側處乎近習便蕃左右而植性忠厚飭躬方雅詳知前訓通曉吏事辯邪正之攸趣明理亂之所急繇是奮勵悃幅敷陳當否斥姦侫之首叙政治之失防禁非辟保全良俊建讜議以興國贊經典以愛人或形於奏書辭義可舉或備於進對亮直不囘斯足以參乎宻侍而資乎訪問者也後漢孫程順帝時為中黄門拜騎都尉永建元年司隸校尉虞詡以中常侍張防時用權勢每請託受取詡輒按之而屢寢不報乃自繫廷尉奏言其罪防流涕訴帝詡坐論輸左挍程與張賢孟叔馬國等知詡以忠獲罪乃相率奏乞陛下見一云懐表上殿程曰陛下始與臣等造事之時謂順帝為太子被江京等廢為濟隂王程等謀立之時也嘗疾姦臣知其傾國今者即位而復自為何以非先帝乎司隸校尉虞詡為陛下盡忠而更被拘繫常侍張防贓罪明正反搆忠良今客星守羽林其占宮中有姦臣宜急收防以塞天變詔出詡還假印綬程復上書陳詡有大功語甚切激帝感悟復徵拜議郎數日遷尚書僕射呂彊為中常侍靈帝時封都鄉侯彊辭讓懇惻不敢當帝乃聽之因上疏陳事曰臣聞諸侯上象四七下裂王土髙祖重約非功臣不侯所以重天爵明勸戒也伏聞中常侍曹節王甫張讓等及侍中許相並為列侯節等宦官祐薄品卑人賤讒諂媚主侫邪徼寵放毒人物嫉妬忠良有趙髙之禍未被轘裂之誅趙髙指鹿為馬而殺胡亥轘裂以車裂也掩朝廷之明成私樹之黨而陛下不悟妄授茅土開國承家小人是用易曰開國承家小人勿用又兼及家人重金兼紫金印紫綬重兼言累積也相繼為蕃輔受國重恩不念爾祖聿修厥徳詩大雅云無念爾祖聿修厥徳聿述也而交結邪黨下比羣侫陛下惑其瑣才瑣小也特加恩澤又授位乖越賢才不升素餐私倖必加榮擢隂陽乖剌稼穡荒蔬鄭𤣥註周禮云蔬草有實者人用不康罔不繇兹臣誠知封事已行言之無逮所以冒死干觸陳愚忠者實願陛下損改既謬從此一止臣又聞後宮綵女數千餘人衣食之費日數百金比穀雖賤而户有饑色按法當貴而今更賤者繇賦發繁數以解縣官縣官調發既多故賤糶穀以供之寒不敢衣饑不敢食民有斯戹而莫之恤宮女無用填積後庭天下雖復盡力耕桑猶不能供昔楚女悲愁則西宮致災公羊傳曰西宮災何以書記災也何休注云是時僖公為齊桓公所脅以齊媵為嫡楚女廢居西宮而不見恤悲愁怨曠所生也况終年積聚豈無憂怨乎夫天生蒸民立君以牧之君道得則民戴之如父母仰之猶日月左傳師曠對晉侯曰君養人如子盖之如天容之如地人奉其君愛之如父母仰之如日月敬之如神明畏之如雷霆天生人而立之君使司牧之勿使失其性也雖時有征稅猶望其仁恩之惠易曰恱以使民民忘其勞恱以犯難民忘其死易兊卦彖辭儲君副主宜諷誦斯言南面當國宜履行其事易曰聖人南面嚮明而治杜預注左傳曰當國執政也又承詔書當於河間故國起解瀆之館陛下龍飛即位雖從藩國然既處九天之高豈宜有顧戀之意楚辭曰圓則九重孰營度之圓謂天也且河間疏逺解瀆邈絶而當勞民單力未見其便又今外戚四姓貴倖之家及中官公族無功徳者造起館舍凡有萬數樓閣連接丹青素堊郭璞注山海經曰堊似玉白色音惡雕刻之飾不可殫言䘮葬踰制奢麗過禮競相倣效莫肯矯拂矯正也拂戾也穀梁傳曰財盡則怨力盡則懟尸子曰尸子晉人也名佼秦相衞鞅客也鞅謀計未嘗不與佼規也商君被刑恐并誅乃亡逃入蜀作書二十篇十九篇陳道德仁義之紀一篇言九州險阻水泉所起也君如杅椀属民如水杅方則水方杅圓則水圎上之化下猶風之靡草今上無去奢之儉下有縱欲之敝至使禽獸食民之甘土木衣民之帛昔師曠諫晉平公曰梁柱衣繡民無褐衣池有棄酒士有渴死廐馬秣粟民有饑色近臣不敢諫逺臣不得暢此之謂也說苑犯諫晉文公之辭也又聞前召議郎蔡邕對問於金商門而令中常侍曹節王甫等以詔書喻㫖邕不敢懐道迷國而切言極對毁刺貴臣議呵竪宦陛下不宻其言至令宣露群邪項領膏唇拭舌毛詩云駕彼四牡四牡項領註云項大也四牡者人所駕今但養大其領不肯為用喻大臣自恣王不能使也膏唇拭舌謂所讒毁故也競欲咀嚼造作非條非條飛書也陛下靣受誹謗致邕刑罪室家徙放老幼流離豈不負忠臣哉今羣臣皆以邕為戒上畏不惻之難下懼劍客之害謂蔡邕徙朔方時陽球使刺客追刺邕也臣知朝廷不復得聞忠言矣故太尉叚紀明武勇冠世習於邊事垂髮服戎功成皓首垂髮謂童子也歴事二主謂桓帝靈帝也勲烈獨昭陛下既已式序位登台司而為司隸校尉陽球所見誣脅一身既斃而妻子逺播天下惆悵功臣失望宜徵邕更授任及紀明家属則忠貞路開衆怨以弭矣帝知其忠而不能用時帝多稸私藏收天下之珍每郡國貢獻先輸中署名為導行費中署内署貢獻外别有所入以為所獻希之導引也彊上疏諫曰天下之財莫不生之隂陽歸之陛下萬物禀隂陽而生歸之陛下豈有公私而今中尚方歛諸郡之寳中御府積天下之繒西園𢎞司農之藏中廐聚太僕之馬而所輸之府輒有導行之財調廣民困費多獻少姦吏因其利百姓受其弊又阿媚之臣好獻其私容諂姑息自此而進舊典選舉委任三府三府有選參議掾属咨謀也其行狀度其噐能受試任用責以成功若無可察然後付之尚書尚書舉劾請下廷尉覆按虛實行其誅罰今但任尚書或復勑用如是三公得免選舉之負尚書亦復不坐責賞無歸豈肯空自苦勞乎夫立言無顯過之咎明鏡無見玼之尤如惡立言以記過則不當學也不欲明鏡之見玼則不當照也韓子曰古人之目短於自見故以鏡觀靣智短於自規故以道正已鏡無見玼之罪道無明過之惡目失見則無以正鬢眉身失道則無以知迷惑玼與疵同也願陛下詳思臣言不以記過見玼為責書奏不省中平初黄巾賊起彊言於帝曰黨錮久積人情多怨若久不赦宥轉與張角合謀為變滋大悔之無及帝懼乃大赦黨人又云司隸校尉陽球奏收故太尉叚紀明就獄詰責紀明飲鴆死強上疏追訟紀明功靈帝詔紀明妻子還本郡後魏王叡孝文時為中吏部尚書時沙門法秀謀逆事發多所牽引叡曰與殺不辜寧赦有罪宜梟斬首惡餘疑從赦不亦善乎帝從之免者千餘人劇鵬髙陽人粗覧經史閑曉文事與王質等俱充宦官文明太后時已見眷遇為給事中孝文遷雒嘗為宮官事幽后后之惑薛菩薩也鵬宻諫止之不從遂發憤而卒後唐張承業初為太原監軍後事莊宗嘗從征討栢鄉之役王師既廹汴營大將周徳威慮其奔衝堅請退舍帝怒其懦不聽垂帳而寢諸將不敢言事咸詣監軍請白承業遽至牙門褰帳而入撫帝曰此非王安寢時周徳威老將洞識兵勢姑務萬全言不可忽帝蹶然而興曰予方思之其夕收軍保髙邑帝初獲玉璽諸將勸帝復唐正朔承業自太原急趣謁帝從容言曰老奴受先王顧命謹事郎君利害否臧盡合忠言殿下父子血戰三十餘年盖縁報國復讎為唐宗社今元㐫未殄軍賦不充河朔數州弊於供億日望殿下掃除梁汴休戰息民今元惡未平遽先大號費養兵之事力困凋弊之生靈臣以此為一未可也繇咸通中便在宮掖每見國家册命大禮儀仗法物百司庶務經年草定臨事猶闕今殿下旣化家為國新創廟朝典禮制度須取太常準約方今禮院未見其人儻失舊章為人輕笑二未可也老臣愚懇未願殿下受人推戴者此也大凡舉事量力而行悠悠之譚無益實事因泣下沾衿帝曰予非所願奈諸將何承業自是多病日加危篤卒於官㐫問至帝悲慟連日輟食因言曰天奪孤之子布也按五代史承業天祐十九年十一月卒明年四月莊宗始即帝位册府元龜卷六百六十八
