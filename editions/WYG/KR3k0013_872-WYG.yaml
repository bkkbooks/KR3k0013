body:
  text: 册府元龜卷八百七十二宋王欽若等撰總錄部訟寃昔史遷有言人之窮也未嘗不呼天疾痛惨怛未嘗不呼父母斯亦茹寃衘恤之不能無告者也若夫大道之䘮亂獄滋豐上聼不聰巧言競進邪曲害於正讒諂蔽其眀懐寳而被誣含忠而獲戾乃至樹勲以光國獨見擯棄仗節以没世反䝉譛毁蹈非辜於公憲䧟惡名於鉤黨推是而徃其流實繁盖有齎志以沉幽壤竄跡而投遐裔遭刑辟之荼毒淪輸作之幽窘乃或奮不顧死自訟其寃逮乎近親故吏仁人志士伏闕以申理露章而上訴因以攄宿憤而䝉委炤起痿廢而被昭洗者固多乎哉若夫辭意懇到卒不見諒者斯可悲矣楚人卞和得玉璞而獻之厲王厲王使玉尹相之曰石也王以和為謾而斷其左足厲王薨武王即位和又奉玉璞而獻之武王使玉尹相之曰石也又以為謾而斷其右足武王薨共王即位和乃奉璞而哭於荆山中三日不食泣盡而繼之以血共王聞之使人問之曰天下之則者衆矣子獨何哭之悲也對曰夫寳玉而名曰石貞士戮之以謾此臣所以悲也共王曰惜矣吾先王之聼難剖石而易斬人之足夫死者不可生斷者不可續何聼之殊也乃使人理其璞而得寳焉故名之曰和氏之璧漢鄒陽齊人客㳺於梁人或讒之於孝王孝王怒下陽吏將殺之鄒陽客㳺以讒見禽乃從獄中上書曰臣聞忠無不報信不見疑臣嘗以為然徒虚語爾昔者荆軻慕燕丹之義白虹貫日太子畏之衞先生為秦畫長平之事太白食昴昭王疑之夫精變天地而信不諭兩主豈不哀哉今臣竭忠盡誠畢議願知左右不眀卒從吏訊為世所疑是使荆軻衞先生復起而燕秦不悟也願大王熟察之昔者玉人獻寳楚王誅之李斯竭忠胡亥極刑是以箕子佯狂接輿避世恐遭此患也願大王熟察玉人李斯之意而後楚王胡亥之聼無使臣為箕子接輿所笑臣聞比干剖心子胥鴟夷臣始不信乃今知之願大王熟察少加憐焉語曰有白頭如新傾蓋如故何則知與不知也昔者樊於期逃秦之燕籍荆軻首以奉丹事王奢去齊之魏臨城自剄以却齊而存魏夫王奢樊於期非新於齊秦而故於燕魏也所以去二國死兩君者行合於志慕義無窮也是以蘇秦不信於天下為燕尾生白圭戰亡六城為魏取中山何則誠有以相知也蘓秦相燕人惡之於燕王燕王按劒而怒食之以駃騠白圭顯於中山人惡之於魏文侯文侯投以夜光之璧何則兩主二臣剖心析肝相信豈移於浮辭哉故女無美惡入宫見妬士無賢不肖入朝見嫉昔者司馬喜臏脚於宋卒相中山范雎拉脇折齒於魏卒為應侯此二人者皆信必然之畫捐朋黨之私挾孤獨之交故不能自免於嫉妬之人也是以申徒狄蹈雍之河徐衍負石入海不容於世義不茍取比周於朝以移主上之心故百里奚乞食於路繆公委之以政甯戚飯牛車下而桓公任之以國此二人者豈素宦於朝借譽於左右然後二主用之哉感於心合於行堅如膠漆昆弟不能離豈惑於衆口哉故偏聼生姦獨任成亂昔魯聼季孫之說逐孔子宋任子冉之計囚墨翟夫以孔墨之辯不能自免於讒諛而二國以危何則衆口鑠金積毁銷骨也秦用戎人由余而伯中國伯讀曰覇齊用越人子臧而强威宣二王諡此二國者豈係於俗牽於世繫竒偏之辭哉公聼並觀垂眀當世故意合則胡越為昆弟由余子臧是矣不合則骨肉為敵讐朱象管蔡是矣今人主誠能用齊秦之眀後宋魯之聼則五伯不足侔而三王易為比也是以聖王覺悟捐子之之心而不說田常之賢封比干之後修孕婦之墓故功業覆於天下何則欲善無厭也夫晉文公親其讐强覇諸侯齊桓公用其仇一匡天下何則慈仁殷勤誠加於心不可以虚辭借也至夫秦用商鞅之法東弱韓魏兵强天下卒車裂之越用大夫種之謀擒勁呉覇中國卒誅其身是以孫叔敖三去相而不悔於陵子仲辭三公為人灌園今人主誠能去驕傲之心懐可報之徳披心腹見情素墮肝膽施徳厚終與之窮達無愛於士則桀之犬可使吠尭而跖之客可使刺繇况因萬乗之權假聖王之資乎然則荆軻沈七族要離燔妻子豈足為大王道哉臣聞眀月之珠夜光之璧以闇投人於道衆無不按劍相盼者何則無因而至前也蟠木根柢輪囷離竒而為萬乗器者以左右為之先容也故無因而至前雖出隋珠和璧祗足以結怨而不見徳故有人先㳺則枯木朽株樹功而不忘今天下布衣窮居之士身在貧羸雖蒙堯舜之術挾伊管之辯懐龍逢比干之意而素無根柢之容雖竭精神欲開忠于當世之君則人主必襲按劍相眄之迹矣是使布衣之士不得為枯木朽株之資也是以聖王制世御俗獨化於陶鈞之上而不牽乎卑亂之言不惑乎衆多之口故秦皇帝任中庶子蒙之言以信荆軻而匕首竊發周文王獵涇渭載吕尚歸而王天下秦信左右而亡周用烏集而王何則以其能越拘攣之語馳域外之議獨觀於昭曠之道也今人主沉諂諛之辭牽帷廧之制使不羈之士與牛驥同皂此鮑焦所以忿世而不留富貴之樂也臣聞盛飾入朝者不以私汙義砥礪名號者不以利傷行故里名勝母而曾子不入邑號朝歌而墨子廻車今欲使天下寥廓之士籠於威重之權脅於勢位之貴回面汙行以事謟諛之人而求親近於左右則士有伏死崛穴巖藪之中爾安有盡忠信而趨闕下者哉書奏孝王孝王立出之卒為上客也于公東海郯人為郡决曹東海有孝婦少寡亡子養姑甚謹姑欲嫁之終不肯姑謂鄰人曰孝婦事我勤苦哀其亡子守寡我老乆絫丁壯奈何其後姑自經死不欲累婦故自殺姑女告吏婦殺我母吏捕孝婦孝婦辭不殺姑吏驗治孝婦自誣服具獄上府府郡之曹府于公以為此婦養姑十餘年以孝聞必不殺也太守不聼于公争之不得乃抱其具獄哭於府上具獄者獄案已成其文備具也因辭疾去郡中枯旱三年後太守至卜筮其故于公曰孝婦不當死前太守强㫁之咎當在是乎於是太守殺牛祭孝婦冡因表其墓天立大雨歳熟郡中以此大敬重于公鄭昌為諌大夫宣帝時葢寛饒上書誹謗昌愍傷寛饒忠直憂國以言事不當意而為文吏所詆挫上書訟寛饒曰臣聞山有猛獸藜藿為之不采國有忠臣姦邪為之不起司𨽻校尉寛饒居不求安食不求飽進有憂國之心退有死節之義上無許史之屬下無金張之託職在司察直道而行多仇少與上書陳國事有司劾以大辟臣幸得從大夫之後官以諌為名不敢不言帝不聼公乗興湖三老也京兆尹王尊坐免吏民多稱惜之興等湖縣名也今虢州湖城縣取其名上書訟尊治京兆功効日著徃者南山盗賊阻山横行剽刦良民殺奪法吏道路不通城門至以警戒歩兵校尉使逐捕暴師露衆曠日煩費不能禽制二卿坐黜三輔皆秩中二千石號為卿也即前京兆尹王昌貶為鴈門太守甄遵河内太守也羣盗寖强吏氣傷沮寖益也沮壊也流聞四方為國家憂當此之時有能捕斬不愛金爵重賞關内侯寛中使問所徴故司𨽻校尉王尊捕羣盗方畧拜為諌大夫守京輔都尉行京兆尹事尊盡節勞心夙夜思職卑體下士厲奔北之吏起沮傷之氣二旬之間大黨震壊渠率效首效致也斬其首而致之也賊亂蠲除民反農業拊循貧弱鉏耘豪强長安宿豪大猾東市賈萭城西萭章翦張禁酒趙放萭音矩翦張禁酒趙放此二人作翦作酒之家杜陵楊章等皆通邪結黨挾養姦宄上干王法下亂吏治并兼役使侵漁小民為百姓豺狼更數二千石二十年莫能禽討更歴也尊以正法案誅皆伏其辜姦邪銷釋吏民說服釋解也說讀曰悅尊撥劇整亂誅暴禁邪皆前所稀有名將所不及雖拜為真未有殊絶褒賞加於尊身今御史大夫奏尊傷害隂陽為國家憂無承用詔書之意靖言庸違象共滔天此引虞書尭典之辭也靖治也庸用也違僻也滔漫也謂其言假託於治實用違僻貎象共過惡漫天也原其所以出御史丞楊輔故為尊書佐素行隂賊惡口不信謂其口惡而心不信也好以刀筆䧟人於法輔嘗醉過尊大奴利家利家捽搏其頰捽持頭也摶擊也兄子閎㧞刀欲剄之輔以故深怨疾毒欲傷害尊疑輔内懐怨恨外依公事建畫為此議也傅致奏文建立謀畫此議也傅讀曰附謂益其事而引致于罪狀浸潤加誣以復私怨浸潤猶漸染也復報也昔白起為秦將東破韓魏南㧞郢都應侯譛之賜死杜郵應侯范雎也杜郵地名在咸陽也呉起為魏守西河而秦韓不敢犯讒人間焉斥逐奔楚秦聼浸潤以誅良將魏信讒言以逐賢守此皆偏聼不聰失人之患也臣等竊痛傷尊修身潔己砥節首公砥厲也首向也刺譏不憚將相誅惡不辟豪强誅不制之賊解國家之憂功著職修威信不廢誠國家爪牙之吏折衝之臣今一旦無辜制於仇人之手傷於詆欺之文上不得以功除罪下不得䝉棘木之聼周禮三槐九棘公卿於下聼訟獨掩怨讐之偏奏被共工之大惡共工官名尭時諸侯舜流之於幽州也無所陳怨愬罪尊以京師廢亂羣盗並興選賢徴用起家為卿賊亂既除豪猾伏辜即以佞巧廢黜一尊之身三期之間乍賢乍佞豈不甚哉期年也孔子曰愛之欲其生惡之欲其死是惑也浸潤之譛不行焉可謂眀矣願下公卿大夫博士議郎定尊素行夫人臣而傷害隂陽死誅之罪也靖言庸違放殛之刑也殛誅也審如御史章尊乃當伏觀闕之誅孔子誅少正夘於兩觀之間放於無人之域不得茍免非止合免官而已也及任舉尊者當獲選舉之辜不可但已但徒也空也已止也不可空然而止也即不如章飾文深詆以愬無罪詆毁也亦宜有誅以懲讒賊之口絶詐欺之路懲創也惟眀主參詳使白黒分別書奏天子復以尊為徐州刺史杜欽為議郎先是宣帝時漢數出使西域多辱命不稱或貪汙為外國所苦苦謂困辱之是時烏孫大有擊匈奴之功而西域諸國新輯輯與集同集和也漢方善遇欲以安之選可使外國者前將軍韓增舉馮奉世以衞侯使持節送大宛諸國客至伊脩城伊脩城在鄯善國漢於其中置屯田吏士也都尉宋將言莎車與旁國共攻殺漢所置莎車王萬年莎車國名萬年其王名也莎素和切并殺漢使者奚充國時匈奴又發兵攻車師城不能下而去莎車遣使揚言北道諸國已屬匈奴矣於是攻刧南道與㰱盟畔漢從鄯善以西皆絶不通鄯音善都䕶鄭吉校尉司馬意皆在北道諸國間奉世與其副嚴昌計以為不亟擊之則莎車日彊亟急也音居力切其埶難制必危西域遂以節諭告諸國王因發其兵南北道合萬五千人進擊莎車攻㧞其城莎車王自殺傳其首詣長安諸國悉平威振西域奉世乃罷兵以聞宣帝召見韓增曰賀將軍所舉得其人奉世遂西至大宛大宛聞其斬莎車王敬之異於他使得其名馬象龍而還言馬形似龍者帝甚說說讀曰悅下議封奉世下其事令議之丞相將軍皆曰春秋之義大夫出疆有可以安國家則專之可也專與顓同奉世功効尤著宜加爵土之賞少府蕭望之獨以奉世奉使有指本為送諸國客而擅矯制違命發諸國兵雖有功効不可以為後世法即封奉世開後世奉使者例以奉世為比比必寐切争逐發兵要功萬里之外逐競也為國家生事於夷狄漸不可長奉世不宜受封帝善望之議以奉世為光祿大夫水衡都尉及奉世卒後二年西域都䕶甘延夀以誅郅支單于封為列侯時丞相匡衡亦用延夀矯制生事據蕭望之前議以為不當封而議者咸美其功帝從衆而侯之於是欽上疏追訟奉世前功曰前莎車王殺漢使者約諸國背畔約謂共為契約左將軍奉世以衞侯便宜發兵誅莎車王䇿定城郭功施邊境城郭者謂西域諸國為城郭而居者議者以奉世奉使有指春秋之義亡遂事漢家之法有矯制亡遂事者謂臨事制宜前事不可必遂也漢家之法擅矯詔命雖有功勞不加賞也故不得侯今匈奴郅支單于殺漢使者亡保康居都䕶延夀發城郭兵屯田吏士四萬餘人以誅斬之封為列侯臣愚以為比罪則郅支薄量敵則莎車衆用師則奉世寡計勝則奉世為功於邊境安慮敗則延夀為禍於國家深其違命而擅生事同延夀割地封而奉世獨不錄臣聞功同賞異則勞臣疑罪均刑殊則百姓惑疑生無常惑生不知所從無常則節趨不立趨讀曰趣趣謂意思所向不知所從則百姓無所措手足措置也千故切奉世圖難忘死信命於殊俗圖難謀除國難也信讀曰伸威功自著為世使表自著謂顯眀也表猶首也獨抑厭而不揚厭乙渉切非聖主所以塞疑厲節之意願下有司議帝以先帝時事不復錄劉向為宗正時甘延夀陳湯誅郅支單于既至論功石顯匡衡以為延夀湯擅興師矯制幸得不誅如復加爵土則後奉使者争欲乘危徼幸生事於蠻夷為國招難漸不可開元帝内嘉延夀湯功而重違衡顯之議議乆不决向上疏曰郅支單于囚殺使者吏士以百數事暴揚外國傷威毁重羣臣皆閔焉陛下赫然欲誅之意未嘗有㤀西域都䕶延夀副校尉湯承聖指倚神􅂕總百蠻之君㩜㩜與攬同城郭之兵出百死入絶域遂蹈康居屠五重城搴歙侯之旗斬郅支之首縣旌萬里之外揚威昆山之西掃谷吉之恥立昭眀之功萬夷慴伏莫不懼震呼韓邪單于見郅支已誅且喜且懼向風馳義稽首來賔願守北藩累世稱臣立千載之功建萬世之安羣臣之勲莫大焉昔周大夫方叔吉甫為宣王誅玁狁而百蠻從其詩曰嘽嘽焞焞如霆如雷嘽它丹切焞它回切顯允方叔薄伐玁狁蠻荆來威易曰有嘉折首獲匪其醜言美誅首惡之人而諸不順者皆來從也今延夀湯所誅震雖易之折首詩之雷霆不能及也論大功者不錄小過舉大羙者不疵細瑕司馬法曰軍賞不踰月欲民速得為善之利也葢急武功重用人也吉甫之歸周厚賜之其詩曰吉甫宴喜既多受祉來歸自鎬我行永乆千里之鎬猶以為逺况萬里之外其勤至矣延夀湯既未獲受祉之報反屈捐命之功乆挫於刀筆之前非所以勸有功勵戎士也昔齊桓前有尊周之功後有滅項之罪君子以功覆過而為之諱行事貳師將軍李廣利捐五萬之師靡億萬之費靡散也音糜經四年之勞而厪獲駿馬三十匹厪與僅同雖斬宛王母之首猶不足以復費其私罪惡甚多孝武以為萬里征伐不錄其過遂封拜兩侯三卿二千石百有餘人今康居國强於大宛郅支之號重於宛王殺使者罪甚於留馬而延夀湯不煩漢士不費斗糧比於貳師功徳百之且嘗惠隨欲擊之烏孫鄭吉迎自來之日逐猶皆裂土受爵故言威武勤勞則大於方叔吉甫列功覆過則優於齊桓貳師近事之功則髙於安逺長羅而大功未著小惡數布臣竊痛之宜以時解縣通籍除過勿治尊寵爵位以勸有功於是天子下詔曰匈奴郅支單于背畔禮義留殺漢使者吏士甚逆道理朕豈忘之哉所以優㳺而不征者重動師衆勞將率故隠忍而未有云也今延夀湯睹便宜乗時利結城郭諸國擅興師矯制而征之頼天地宗廟之􅂕誅討郅支單于斬獲其首及閼氏貴人名王以下千數雖踰義干法内不煩一夫之役不開府庫之藏因敵之糧以贍軍用立功萬里之外威鎮百蠻名顯四海為國除殘兵革之原息邊境得以安然猶不免死亡之患罪當在於奉憲朕甚閔之其赦延夀湯罪勿治詔公卿議封焉耿育為議郎時射聲校尉關内侯陳湯徙焞煌育上書言便宜因寃訟湯曰延夀湯為聖漢揚鉤深致逺之威雪國家累年之耻討絶域不羈之君係萬里難制之虜豈有比哉先帝嘉之仍下眀詔宣著其功改年埀歴傳之無窮應是南郡獻白虎邊陲無警備㑹先帝寢疾然猶埀意不㤀數使尚書責問丞相趣立其功獨丞相匡衡排而不予封延夀湯數百戸此功臣戰士所以失望也孝成皇帝承建業之基乘征伐之威兵革不動國家無事而大臣傾邪讒佞在朝曾不深惟本末之難以防未然之戒欲專主威排妬有功使湯塊然被寃拘囚不能自眀卒以無罪老棄焞煌正當西域通道令威名折衝之臣旋踵及身復為郅支遺虜所笑誠可悲也至今奉使外蠻者未嘗不陳郅支之誅以揚漢國之盛夫援人之功以懼敵棄人之身以快讒豈不痛哉且安不􅁯危盛必慮衰今國家素無文帝累年節儉富饒之畜又無武帝薦延梟俊禽敵之臣獨有一陳湯爾假使異世不及陛下尚望國家追錄其功封表其墓以勸後進也湯幸得身當聖世功曾未乆反聼邪臣鞭逐斥逺使亡逃分竄死無處所逺覽之士莫不計度以為湯功累世不可及而湯過人情所恒有湯尚如此雖復破絶筋骨暴露形骸猶復制於唇舌為嫉妬之臣所係虜耳此臣所以為國家尤戚戚也書奏成帝還湯卒於長安鮑宣為諫大夫時大司空何武遣吏迎後母㑹成帝末吏恐道路有盗賊留止左右或譏武事親不篤遂䇿免後五歳宣數稱寃之天子感丞相王嘉之對而髙安侯董賢亦薦武繇是復徴為御史大夫孫寳鴻嘉中以廣漢羣盗起選為益州刺史廣漢太守扈商者大司馬車騎將軍王音姊子軟弱不任職寳到部親入山谷諭告羣盗非本造意渠率皆得毁過自出渠大也遣歸田里自劾矯制奏商為亂首擅放羣盗歸故云矯制繇商不任職致有盗賊故云為亂首也春秋之義誅首惡而已商亦奏寳所縱或有渠率當坐者縱放也商徴下獄寳坐失死罪免益州吏民多陳寳㓛効言為車騎將軍所排上復拜寳為冀州刺史册府元龜卷八百七十二
