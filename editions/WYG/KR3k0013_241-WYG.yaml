body:
  text: 册府元龜卷二百四十一列國君部崇祀旌表禮士崇祀祀為大事乃有國之通規祭不越望實諸侯之常禮故山川神祗於是乎舉之水旱癘疫於是乎禱之享以克誠薦以備物是以祭則受福民頼其賜然而魯郊上帝葢以周公之故秦作西畤始僭王者之儀自兹已降興偽益多矣若乃薦事不時將命不肅慢神凟祀蓋有司之過也虢公當魯莊公三十二年七月有神降於莘虢公使祝應宗區史嚚享焉曰神賜之土田祝太祝也宗宗人也史太史應區嚚皆名晉獻公十六年伐霍魏耿而趙夙為將伐霍霍公求犇齊求一作來晉大旱卜之曰霍太山為􅑂使趙夙召霍君於齊復之以奉霍太山之祀晉復禳二十二年滅虞虜虞公而修虞祀虞所祭祀命祀也魯僖公三十一年四月四卜郊不從乃免牲龜曰卜不從不吉也卜郊不吉故免牲免猶縱也猶三望三望分野之星國中山川皆因郊祀望而祭之魯廢郊天而修其小祀故曰猶猶者可止之辭望郊之細也不郊亦無望可也諸侯不得郊天魯以周公故得用天子禮樂故郊為魯常祀魯頌曰周公之孫莊公之子龍旗承祀六轡耳耳春秋匪解享祀不忒周公之孫莊公之子謂僖公也耳耳然至盛也交龍為旗承祀謂視祭祀也四馬故六轡春秋猶言四時也忒變也皇皇后帝皇祖后稷享以騂犧是饗是宜降福既多騂赤犧純也皇皇后帝謂天也成王以周公功大命魯郊祭天亦配之以君祖后稷其牲用赤牛純色與天子同也天亦享之宜之多與之福宣公三年王正月郊牛之口傷改卜牛牛死乃不郊牛不稱牲未卜日也猶三望其言之何据食角不言之緩也辭間容之故為緩不若食角急也别天牲主以角書者譏宣公養牲不謹敬不潔清而灾重事至尊故詳録其簡甚曷為不復卜据定十五年牛死改卜牛養牲養二卜二卜語在下帝牲不吉帝皇天大帝在北辰之中主總領天地五帝羣神也不吉者有灾則扳稷牲而卜之先卜帝牲養之有灾更引稷牲卜之以為天牲養之凡當二卜爾復不吉不復郊帝牲在于滌三月滌宮名養帝牲三牢之處也謂之滌者取其蕩滌潔清三牢者各主一月取三月一時足以充其天牲於稷者唯具是視視其身體具無灾害而已不特養于滌宫所以降稷尊帝郊則曷為必祭稷据郊者主為祭天王者必以其祖配祖謂后稷周之始祖姜嫄履大人迹所生配配食也王者則曷為必以其祖配据方父事天自内出者無匹不行匹合也無所與㑹合則不行自外至者無主不止必得主人乃止者天道闇昧故惟人道以接之不以文王配者重本尊始之義也故孝經曰郊祀后之稷以配天宗祀文王於明堂以配上帝上帝五帝在太微中迭生子孫更王天下書改卜者善其應變得禮成公七年正月鼷䑕食郊牛角改卜牛鼷䑕又食牛角乃免牛稱牛未卜日免放也免牛可也不郊非禮也冬大雩書過十七年九月辛丑用郊夏之始可以承春以秋之末承春之始蓋不可矣郊春事也僖公時四月卜郊不從傳曰四月不時春言可者方明秋末之不可故以是為猶可也九月用郊用者不宜用也宮室不設不可以祭衣服不修不可以祭車馬器械不備不可以祭有司一人不備其職不可以祭祭者薦其時也薦其敬也薦其美也非享味襄公七年四月三卜郊不從乃免牲孟獻子曰吾今而後知有卜筮夫郊祀后稷以祈農事也是故啓蟄而郊郊而後耕今既耕而卜郊宜其不從也啓蟄夏正建寅之月耕謂春分昭公三年八月大雩旱也八年秋大雩不旱而雩過也十六年九月大雩旱也鄭大旱使屠擊祝欵豎柎有事於桑山三子鄭大夫有事祭也斬其木不雨子産曰有事於山蓺山林也蓺養護令繁殖而斬其木其罪大矣奪之官邑二十五月七月上辛大雩季辛又雩季者有中之辭也不言中辛中辛無事又有繼之辭也縁有上辛大雩故言又也定公十五年正月鼷䑕食郊牛牛死改卜牛不言所食處舉死重也改卜禮也五月辛丑郊書過哀公元年鼷䑕食郊牛改卜牛夏四月辛巳郊書過也不言所食所食非一處晉平公二十三年鄭子産聘於晉魯昭公七年也晉侯有疾韓宣子逆客私焉私語曰寡君寢疾於今三月矣竝走群望晉所望祀山川皆走往祈禱有加而無瘳今夢黄熊入於寢門其何厲鬼也對曰以君之明子為大政其何厲之有昔堯殛鯀于羽山羽山在東海祝其縣西南其神化為黄熊以入于羽淵實為夏郊三代祀之鯀禹父夏家郊祀之歴殷周二代又通在群神之數并見祀晉為盟主其或者未之祀也乎言周衰晉為盟主韓子祀夏郊祀鯀晉侯有間間差也賜子産莒之二方鼎方鼎莒所貢楚共王無冡適有寵子五人無適立焉乃大有事於群望群望星辰山川而祈曰請神擇於五人者使主社稷乃遍以璧見于群望曰當璧而拜者神所立也誰敢逆之既乃與巴姬密埋璧於太室之庭使五人齊而長幼入拜康王跨之靈王肘加焉子干子晢皆遠之平王弱抱而入再拜皆壓紐秦襄公八年攻戎救周列為諸侯而居西八年自以為主少昊之神作西畤祠白帝其牲用駵駒黄牛羝羊各一云駵赤馬黑鬛尾也羝牡羊也文公十年東獵汧渭之間汧渭二水名卜居之而吉文公夢黄蛇自天下屬地屬著也其口止於鄜衍鄜音孚三輔謂山陵間為衍今之鄜州蓋取名於此也文公問史敦秦之太史敦其名也敦曰此上帝之徵君其祠之於是作鄜畤用三牲郊祭白帝焉自未作鄜畤而雍旁故有吳陽武畤雍旁有吳陽地也雍東有好畤皆廢無祀或曰自古以雍州積高神明之隩土之可居曰隩故立畤郊上帝諸神祠皆聚云十九年獲若石云于陳倉北阪城祀之其質如石似肝陳倉之北阪上城中也云語辭也其神或歲不至或歲數來也常以夜光輝若流星從東方來集于祠城若雄雉其聲殷殷云野雞夜鳴殷殷聲也云傳聲之亂也野雞亦雉也避呂后諱故曰野雞言陳寳若來而有聲則野雞皆鳴以應之也上言雄雉下言野雞史駮文也殷音隱以一牢祠之名陳寳陳倉縣有寳夫人祠或一歲二歲與葉君合葉君神來時天為之殷殷雷鳴雉為之雊也作陳寶祠靈公三年作上下畤上畤祭黄帝下畤祭炎帝德公立卜居雍即今之雍縣子孫飲馬於河遂都雍雍之諸祠自此興用三百牢於鄜畤作伏祠六月伏日也周時無至此乃有之伏者謂隂氣將起迫於殘陽而未得升故為藏伏因名伏日也立秋之後以金代火金畏於火故至庚日必伏庚金也磔狗邑四門以御蠱災宣公四年作密畤於渭南祭青帝獻公十七年櫟陽雨金獻公自以為得金瑞故作畦畤櫟陽而祀白帝昭襄王五十四年郊見上帝於雍趙襄子為知伯所攻奔于晉陽原過從後至於王澤見三人自帶以上可見自帶以下不可見與原過竹二節莫通曰為我以是遣趙毋䘏原過既至以告襄子襄子齋三日親自剖竹有朱書曰趙毋䘏余霍泰山在河東永安縣山陽侯天使也三月丙戌余將使女反滅知氏女亦立我百邑余將賜女林胡之地至于後世且有伉王亦黑龍靣而鳥噣鬢麋髭􅏋大膺大胷修下而馮左袵界乘修或作隨界一作介奄有河宗至於休溷諸貉南伐晉别北滅黒姑襄子再拜受三神之令後滅知氏遂祠三神於百邑使原過主霍泰山祠祀旌表古者友邦冡君莫不奉天子贊教化推之彌廣四海是凖然則宥善競勸之道莫過乎旌别良淑表章功行則有報乃忠力褒其高節顯揚茂烈昭明嘉績繇是辭形銘篆恩崇賞典尊寵殊品封賜特厚逮夫既往禮亦異數生榮死哀而盡在懿德英風而可尚賢哲之嗣靡絶社稷之功用答垂裕後昆率為彜制俾夫千載之下義聲凛然矣魯莊公及宋人戰于乘丘縣賁父御卜國為右縣卜皆氏也凡車右勇力者為之馬驚敗績驚奔失列公隊佐車授綏戎車之貳曰佐授綏乘公公曰末之卜也末之猶微哉言卜國無勇縣賁父曰他日不敗績今日敗績是無勇也公他日戰其御馬未嘗驚奔遂死之因即赴敵而死圉人浴馬有流矢在白肉圉人掌飬馬者白肉股裏肉公曰非其罪也流矢中馬非御與右之罪遂誄之誄其赴敵之功士之有誄自此始也晉文公初返國賞從士及功臣大者封邑小者尊爵未盡行賞周襄王以弟帶難出居鄭地來告急晉初定欲發兵恐他亂起是以賞從士未至隱者介子推推亦不言祿祿亦不及推曰獻公之子九人唯君在矣惠懐無親外内棄之天未絶晉必將有主主晉祀者非君而誰天實啟之二三子以為己力不亦誣乎竊人之財猶曰是盗況貪天之功以為己力乎下冒其罪上賞其姦上下相蒙蒙欺也難與處矣其母曰盍亦求之以死誰懟推曰尤而效之罪又甚焉且出怨言不食其祿母曰亦使知之若何對曰言身之文也身欲隱安用文之文之是求顯也其母曰能如此乎與女偕隱至死不復見介子推從者憐之乃懸書宮門曰龍欲上天五蛇輔之龍已升去四蛇各入其宇一蛇獨怨終不見處所文公出見其書曰此介子推也吾方憂王室未圖其功使人召之則亡遂求所在聞其入綿上山中綿上晉地在西河介休縣南於是文公環綿上山中而封之以為介推田號曰介山以記吾過且旌善人楚莊王時令尹子揚子揚子文之子為司馬子越譛而殺之子越姓闘名椒子越既為令尹將攻王戰于臯滸遂滅若敖氏其孫箴尹克黄箴尹官名克黄子揚之子使於齊還及宋聞亂其人曰不可以入矣箴尹曰棄君之命獨誰受之君天也天可逃乎遂歸復命而自拘於司敗王思子文之治楚國也曰子文無後何以勸善使復其所改命曰生易其名也孫叔敖為楚相既卒數年莊王欲以優孟為相優孟曰楚相孫叔敖持亷至死方今妻子窮困負薪而食不足為也於是莊王謝優孟乃召孫叔敖子封之寢丘在固始四百户以奉其祀衞獻公時太史柳莊寢疾公曰若疾革雖當祭必告革急也公再拜稽首請於尸曰有臣柳莊也者非寡人之臣社稷之臣也聞之死請往急弔賢者不釋服而往遂以襚之脱君祭服以襚臣親賢也所以襚之者以其不用襲也凡襚以斂之與之邑裘氏與縣潘氏書而納諸棺曰世世萬子孫毋變也公子鱄字子鮮獻公弟也獻公出奔子鮮與寗喜言納公公入而寗喜專公患之公孫免餘攻寗氏殺喜及右宰穀尸諸朝子鮮終身不仕公䘮之如税服終身税即繐也䘮服繐縗裳縷細而希非五服之常本無月數痛愍子鮮故特為此服無月數而獻公尋斃故言終身齊景公時伐晉夷儀敝無存先登死齊侯謂夷儀人曰得敝無存者以五家免給其五家令常不共役事乃得其尸公三襚之襚衣也比殯三加襚深禮厚之與之犀軒與直蓋犀軒卿車而先歸之坐引者以師哭之停䘮車以盡哀也君方為位而哭故挽䘮者不敢立也親推之三齊侯自推䘮車輪三轉衞莊公德孔悝立已依禮褒之故孔悝之鼎銘曰六月丁亥公假於太廟孔悝大夫公曰叔舅乃祖莊叔左右成公乃命莊叔隨難于漢陽卽宮于宗周奔走無射啓佑獻公獻公乃命成叔纂乃祖服乃考文叔興舊嗜欲作率慶士躬恤衞國其勤公家夙夜不解民咸曰休哉公曰叔舅予女銘若纂乃考服悝拜稽首曰對揚以辟之勤大命施于烝彜鼎魯哀公十一年齊伐魯戰于郎公叔禺人昭公子與其鄰重汪踦往皆死焉奔敵死齊冦鄰鄰里也重當為童童未冠者之稱姓汪名踦鄰或作郯春秋傳曰童汪踦魯人欲勿殤重汪踦見其死君事有士行欲以成人之䘮治之言魯人者死君事國為斂塟問於仲尼仲尼曰能執干戈以衞社稷雖欲勿殤也不亦可乎善之十六年孔丘卒公誄之曰旻天不弔不憗遺一老俾屏余一人以在位仁覆閔下故稱旻天弔至也憖且也俾使也屏蔽也㷀㷀余在疚嗚呼哀哉尼父無自律疚病也律法也言䘮尼父無以自為法越王勾踐既滅吳范蠡乘輕舟以浮於五湖勾踐令工以良金寫范蠡之狀而朝禮之浹日而令大夫朝之環㑹稽三百里者以為范蠡地曰後世子孫有敢侵蠡之地者使無終没於越國皇天后土四鄉地主正之魏惠王時公叔痤為將西與韓趙戰澮北禽樂祚王説郊迎以賞田百萬祿之公叔痤反走再拜辭曰夫使士卒不奔直而不倚棟撓不避者此吳起餘敎也臣不能為也王曰善於是索吳起之後賜之田二十萬禮士古人有言曰霸者與其友處故北面等禮不乘之以勢以求其臣則友朋之才至矣孟子曰用上敬下謂之尊賢若乃千乘之國能下布衣之士者曷嘗不恢道德之政隆邦家之基以至任之以事而舉國稱治當乎其世而南面稱霸者率用此道也故有卑體折節以致其恭分庭曲坐以厚其遇乃至玉帛無所愛舘舍極其盛詢其謀猷任其智力繇是威宣於鄰壤惠浹於四封名聲章明稱為賢王向使驕而且吝則天下之士至者蓋鮮矣齊桓公田至於麥丘見麥丘邑人問之子何為者也對曰麥丘邑人也公曰年幾何對曰八十有三矣公曰羙哉壽乎子其以子之壽祝寡人麥丘邑人曰祝主君使主君甚壽金玉是賤人為寶桓公曰善哉至德不孤善言必再吾子一復之麥丘邑人曰祝主君使主君無羞學無惡下問賢者在旁諌者得人桓公曰善哉至德不孤善言必三吾子一復之麥丘邑人曰祝主君使主君無得罪於群臣百姓桓公怫然作色曰吾聞之子得罪於父臣得罪於君未嘗聞君得罪於臣者也此一言者非夫二言者之匹子更之麥丘邑人坐拜而起曰此一言者夫二言者之長也子得罪於父可以因姑姊叔父而解之父能赦之臣得罪於君可以因便辟左右而謝之君能赦之昔者桀得罪於湯紂得罪於武王此則君之得罪於其臣者也莫為謝至今不赦公曰善頼國家之福社稷之靈也寡人得吾子於此扶而載之自御以歸禮之於朝封之以麥丘而斷政焉管仲齊人隨公子紏在魯桓公使鮑叔求管仲於魯魯乃束縳而柙以予齊柙檻至于堂阜之上堂阜地名鮑叔袚而浴之三祓謂除其凶邪之氣桓公親迎之郊管仲詘纓揷袵示将就戮使人操斧而立其後操斧者欲受斧鉞之誅公辭斧三然後退之退操斧者公曰垂纓下袵寡人将見管仲再拜稽首曰應公之賜殺之黄泉死且不朽言君賜之死尚感恩不朽况生之乎公遂與歸禮之於廟三酌而問為政焉其後公謂管仲曰請致仲父父者尊老有德之稱桓公欲尊事管仲故以仲父之號致之公與管仲父而將飲之行飲酒禮以尊顯之掘新井而柴焉新井而又柴蓋之欲以潔清示敬十日齋戒召管仲管仲至公執爵大夫執尊觴三行管仲趨出公怒曰寡人齋戒十日而飲仲父寡人自以為修矣仲父不告寡人而出其故何也謂不辭而出所以怒鮑叔隰朋趨而出及管仲于途曰公怒管仲反入倍屏而立公不與言少進中庭公不與言少進傅堂公曰寡人齋戒十日而飲仲父自以為脱於罪矣仲父不告寡人而出未知其故也對曰臣聞之沉於樂者洽於憂樂過則憂博厚於味者薄于行慢于朝者緩於政害於國家者危於社稷臣是以敢出也公遽下堂曰寡人非敢自以為修也仲父年長雖寡人亦衰矣吾願一朝安仲父也言俱至於衰老故欲一朝樂飲而為安也對曰臣聞壯者無怠老者無偷順天之道必以善終者也三王失之也非一朝之萃其所由來者漸矣非一朝萃集也君奈何其偷乎管仲走出公以賓客之禮再拜送之桓公設庭燎為士之欲造見者朞年而士不至於是東野有以九九見者桓公使戲之曰九九何足以見曰臣聞君設庭燎以待士朞年而士不至夫士之所以不至者君天下之賢也而四方之士皆自以為不及君故不至也夫九九薄能爾而君猶禮之况賢於九九者乎夫太山不讓礫石江海不辭小流所以成其大也詩曰先民有言詢于芻蕘博謀也桓公曰善乃因禮之朞月四方之士相選而至矣桓公見小臣三往不得見左右曰小臣國之賤臣也君三往而不得見其可止矣桓公曰惡是何言也吾聞之布衣之士不欲富貴不輕身於萬乘之君萬乘之君不好仁義不輕身於布衣之士縱夫子不欲富貴可也君不好仁義不可也五往而後得見寗越衞人欲干齊桓公困窮無以自逹於是為商旅将任車任載也詩曰我任我輦以商於齊暮宿於郭門之外桓公郊迎客夜開門辟任車爝火甚盛爝熒也從者甚衆寗越飯牛車下望見桓公而悲擊牛角而疾商歌桓公聞之撫其僕之手曰異哉歌非常人也命後車載之桓公反至從者以請桓公贛之衣冠而見説以為天下桓公大說秦繆公時戎王使繇余於秦繆公示以宮室積聚繇余曰使鬼為之則勞神矣使人為之亦苦人矣繆公於是與繇余曲席而坐傳器而食其後繇余遂去䧏秦繆公以客禮禮之百里奚為秦繆公夫人媵既而亡秦走宛南陽有宛縣楚鄙人執之繆公聞百里奚賢欲重贖之恐楚人不與乃使人謂楚曰吾媵臣百里奚在焉請以五羖羊皮贖之楚人遂許與之當是時百里奚年已七十餘繆公釋其囚與語國事百里奚曰臣友蹇叔賢而時莫知繆公使人厚幣迎蹇叔以為上大夫晉文公自少好士有賢士五人曰趙衰狐偃咎犯賈佗先軫其餘不名者數十人平公時亥唐隱居陋巷中平公往造唐言入公乃入言坐乃坐言食乃食雖蔬食菜羮未嘗不飽蓋不敢不飽也然終於此而已矣衞靈公三十五年孔子至衞靈公問孔子居魯得䘵幾何對曰奉粟六萬衞人亦致粟六萬魯哀公時孔子自衞反魯歸至其舍哀公就而以禮館之季孫為魯大夫其母死哀公弔焉曾子與子貢弔焉閽人為君在弗内也閽人守門者曾子與子貢入於其廐而修容焉更莊餙子貢先入閽人曰鄉者已告矣旣不敢止以言下之曾子後入閽人辟之見兩賢相隨彌益恭也渉内􅋼卿大夫皆辟位公䧏一等而揖之禮之周豐魯人也哀公執贄請見之下賢也贄禽贄也諸侯而用禽贄䧏尊從卑之義而曰不可辭君以尊見卑士禮先生異爵者請見之則辭公曰我其已夫已止也魏文侯師子夏於西河之上而文侯擁篲田子方居西河魏文侯友之公季成曰田子方雖賢人然而非有土之君也君常與之齊禮假之有賢於子方者君又何以加之侯曰如子方者非成所得議也子方仁人也仁人也者國之寶也智士也智士也者國之器也博通士也博通士也者國之尊也故國有仁人則羣臣不爭國有智士則無四鄰諸侯之患國有博通之士則人主尊固非成之所議也公季成自退於郊三日請罪段干木辟䘵而處家魏文侯過段干木之閭而軾其僕曰君胡為軾曰此非段干木之閭與段干木蓋賢者也吾安敢勿軾且吾聞段干木未嘗肯以己易寡人也吾安敢驕之段干木光乎德寡人光乎地段干木富乎義寡人富乎財其僕曰然則君何不相之於是請相之段干木不肯受君乃置祿百萬而時往館之國人皆喜相與誦之曰吾君好正段干木之敬吾君好忠段干木之隆居無幾何秦興兵欲攻魏司馬唐且諫秦君曰段干木賢者也而魏禮之天下莫不聞舉兵伐之無乃妨於義乎乃按兵而輟不敢攻費惠公費魯附庸之國曰吾於子思則師之矣吾於顔般則友之矣齊威王時孫臏與龎涓俱學兵法田忌進孫子於威王王問兵法遂以為師楚威王聞莊周賢使使厚幣迎之許以為相魏惠王數被於軍旅卑禮厚幣以招賢者鄒衍淳于髠孟軻皆至鄒衍適魏惠王郊迎執賓主之禮燕昭王即位於破燕之後卑禮厚幣以招賢者謂郭隗曰齊因孤之國亂而襲破燕孤極知燕小力少不足以報然誠得賢士以共國以雪先王之恥孤之願也先生視可者得以身事之郭隗曰臣聞古之人君有以千金求千里馬者三年不能得㳙人言於君曰請求之君遣之三月得千里馬馬已死買其骨五百金反以報君君大怒曰所求者生馬安用死馬而捐五百金㳙人對曰死馬且市五百金况生馬乎天下必以王為能市馬馬今至耳於是不能朞年千里馬至者三今王誠欲致士請從隗始隗且見事况賢於隗者乎豈遠千里哉於是昭王為隗築宮而師之樂毅自魏往毅為使於燕昭王以客禮待之毅辭讓遂委質為臣昭王以為亞卿鄒衍自齊往劇辛自趙往士爭走燕燕王吊死問孤與百姓同甘苦二十八年燕國殷富士卒樂軼輕戰於是遂以樂毅為上将軍與秦楚三晉合謀以伐齊用樂毅之筴得賢之功也鄒衍齊人如燕昭王擁篲先驅請列弟子之座而受業築碣石宮身親往師之齊宣王喜文學游説之士自如鄒衍淳于髠田駢接子慎到環淵之徒七十六人皆賜列第為上大夫不治而議論是以齊稷下學士復盛且數百千人齊有稷門城門也談説之士期㑹於稷下也王斗齊人造門而欲見宣王宣王使謁者延入王斗曰斗趨見王為好勢王趨見斗為好士於王何如使者復還報王曰先生徐之寡人請從宣王因趨而迎之一作王升騶奭齊諸騶子頗采騶衍之術以紀文於是齊王嘉之自如淳于髠以下皆下命曰列大夫為開第康莊之衢爾雅曰四逹謂之衢五逹謂之康六逹謂之莊髙門大屋尊寵之覽天下諸侯賓客言齊能致天下賢士也趙武靈王即位少未能聽政慱聞師三人左右司過三人及聽政先問先王貴臣肥義加其秩國三老八十月致其禮孝成王時虞卿以㳺説之士躡蹻擔簦説王一見賜黄金百鎰白璧一雙再見為上卿故號虞卿册府元龜卷二百四十一
