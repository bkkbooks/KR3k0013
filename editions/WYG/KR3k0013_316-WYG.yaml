  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_316-1a}
body:
  text: 册府元龜卷三百十六宋王欽若等撰宰輔部正直詩曰有覺徳行四國順之周書曰爾身克正罔敢不正斯正直之謂也盖有為天子之宰居鬷假之任庶民具瞻羣司承式而能勵骨鯁之操茂羔羊之徳臨大節而不奪履中道而無二危言抗論進無徒從守法持正事無過舉靡狥人主之欲而求容悦罔阿貴近之意以紊憲度乃至指佞邪於公朝拒請托於私室孤立特行無所畏憚積毁羣吠莫之動撓廷議表介石之節板蕩彰勁草之志流風嘉話溢于前聞斯固神眀之介福後來之聳慕者已周仲山甫佐宣王柔亦不茹剛亦不吐不畏强禦漢周昌髙帝時為御史大夫嘗燕入奏事以帝宴時入奏事燕謂安閑之時也帝方擁戚姬擁抱也昌還走還謂却退帝逐得騎昌項問曰我何如主也昌仰曰陛下即桀紂之主也於是帝笑之然尤憚昌及帝欲廢太子而立戚姬子如意為太子大臣固争莫得帝以留侯䇿即止而昌廷争之强帝問其説昌為人吃又盛怒曰臣口不能言然臣期期知其不可陛下欲廢太子臣期期不奉詔以口吃故每重言期期帝欣然笑即罷吕后側耳于東廂聼正寝東西室皆曰廂言其似箱篋之形見昌為跪謝曰㣲君太子㡬廢㣲無也王陵恵帝末為左丞相髙后欲立諸吕為王問陵陵曰髙皇帝刑白馬而盟曰非劉氏而王者天下共擊之今王吕氏非約也太后不悦問左丞相平及絳侯周勃等皆曰髙帝定天下王子弟今太后稱制欲王昆弟諸吕無所不可太后喜罷朝陵讓平勃曰始與髙帝唼血盟諸君不在邪唼小飲也今太后女主欲王吕氏諸君縱欲阿意背約何靣目見髙帝於地下乎曰今面折廷争臣不如君廷争謂當朝廷而諌争全社稷定劉氏後君亦不如臣陵無以應之於是吕太后欲廢陵乃陽遷為帝太傅實奪之相權陵怒謝病免杜門竟不朝請杜塞也閉塞其門也請音才性反申屠嘉文帝時為丞相大中大夫鄧通方愛幸賞賜累鉅萬帝嘗宴飲通家其見寵如是嘉入朝而通居帝旁有怠慢之禮嘉奏事畢因言曰陛下幸愛羣臣則富貴之至於朝廷之禮不可以不肅肅敬也帝曰君勿言吾私之言欲私戒教之罷朝坐府中嘉為檄召通詣丞相府檄木書也長二尺不來且斬通通恐入言帝帝曰汝第徃第且也吾今使人召若若亦汝也通至詣丞相府免冠徒跣頓首謝嘉嘉坐自如如其故也弗為禮責曰夫朝廷者髙皇帝之朝廷也通小臣戯殿上大不敬當斬吏今行斬之嘉語其吏也今便行斬之通頓首首盡出血不觧帝度丞相已困通使使持節召通而謝丞相曰此吾弄臣君釋之鄧通既至為帝泣曰丞相幾殺臣周亞夫景帝時為丞相帝甚重之帝廢栗太子亞夫固争之不得帝由此疎之而梁孝王每朝嘗與太后言亞夫之短竇太后曰皇后兄王信可侯也帝譲曰始南皮及章武先帝不侯南皮竇彭祖太后弟長君子章武太后母弟廣國及臣即位乃侯之信未得封也竇太后曰人生各以時行耳言富貴當及已身也竇長君在時竟不得侯死後乃其子彭祖顧得侯顧及也吾甚恨之帝趣侯信也帝曰請得與丞相計之亞夫曰髙帝約非劉氏不得王非有功不得侯不如約天下共擊之今信雖皇后兄無功侯之非約也帝黙然而沮沮者止壊之意也其後匈奴王徐盧等五人降漢功臣表云睢徐盧帝欲侯之以勸後亞夫曰彼背其主降陛下陛下侯之即何以責人臣不守節者乎帝曰丞相議不可用乃悉封徐盧等為列侯亞夫因謝病免相卜式武帝元鼎中代石慶為御史大夫式既在位言郡國不便鹽鐵而船有筭可罷帝由是不悦式霍光為大司馬大將軍昭帝時金日磾二子賞建俱侍中與昭帝畧同年及賞嗣侯佩兩綬帝謂光曰金氏兄弟兩人不可使俱兩綬耶光對曰賞自嗣父為侯耳帝笑曰侯不在我與將軍乎光曰先帝之約有功乃得侯蕭望之為太子太傅宣帝寢疾以望之為前將軍與大司馬車騎將軍史髙光禄大夫周堪受遺詔輔政領尚書事太子襲尊號是為元帝初宣帝不甚從儒術任用法律而中書宦官用事中書令𢎞恭石顯乆典樞機明習文法亦與車騎將軍髙為表裏論議嘗獨持故事不從望之等恭顯又時傾仄見詘恭顯不能持正故議論大事見詘于天子也望之以為中書政本冝以賢明之選自武帝游宴後庭故用宦者非國舊制又違古不近刑人義禮曰刑人不在君側也自欲更置士人由是大與髙恭顯忤忤猶相違逆也元帝初即位謙譲重改作重難也未欲更置士人于中書也議久不定何武成帝時為大司空多所舉奏號為煩碎不稱賢公功名畧比薛宣其材不及也而經術正直過之師丹為大司空哀帝卽位王太后詔令傳太后丁姬十日一至未央宫高昌侯董宏希指希望天子意指也上書言宜立丁姬為帝太后丹劾奏宏懐邪誤朝不道帝初即位謙譲從丹言止王嘉為丞相時侍中董賢愛幸於哀帝欲侯之帝心憚嘉乃先使皇后父孔鄉侯傅宴持詔書視丞相御史於是嘉與御史大夫賈延上封事諫帝感其言止数月遂下詔封賢髙安侯後日食嘉復奏封事言陛下初即位共皇寢廟比比當作共皇哀帝之父即定陶恭王也比比猶頻頻也共讀曰恭憂閔元元為用度不足惟思也以義割恩輙且止息今始作治而董賢亦起官寺上林中又為賢治大第開門鄉郷讀作向北闕引王渠灌園池王渠官渠也又田在城東覆盎門外使者護作賞賜吏卒甚於治宗廟賢母病長安厨給祠具長安有厨官主為官食道中過者皆飲食禱於道中故行人皆得飲食爲賢治器器成奏御乃行或物好特賜其工自貢獻宗廟三宫猶不至此三宫天子太后皇后也宜深覧前世以節賢寵于是帝寖不恱初廷尉梁相與丞相長史御史中丞及二千石雜治東平王雲獄時冬月未盡二旬而相心疑雲寃獄有飾詞假飾之詞非其實也奏欲𫝊之長安𫝊謂移其獄事更下公卿覆治尚書令鞫譚僕射宗伯鳯以為可許宗伯姓也天子以為相等幸雲踰冬無討賊疾惡如仇之意制詔免相等皆為庶人後數日大赦嘉奏封事薦相等書奏上不能平後二十餘日嘉封還益董賢户事帝乃發怒詔假謁者召嘉詣廷尉詔獄嘉下獄嘆曰幸得充備宰相不能進賢退不肖死有餘責吏問賢不肖主名嘉曰賢故丞相孔光故大司空何武不能進惡髙安侯董賢父子佞邪亂朝而不能退罪當死死無所恨嘉不食嘔血而死後帝覽其對而思嘉言復以孔光代嘉為丞相徴用何武為御史大夫後漢宋𢎞字仲子光武建武二年為大司空帝嘗問𢎞通博之士𢎞乃薦沛國桓譚才學洽聞㡬能及揚雄劉向父子於是召譚拜議郎給事中帝每宴輙令鼓琴好其繁聲𢎞聞之不悦悔於薦舉伺譚内出正朝服坐府上遣吏召之譚至不與席而譲之曰吾所以薦子者欲令輔國家以道徳也而今數進鄭聲以亂雅頌非忠正者也能自改邪将令相舉以法乎譚頓首辭謝良久乃遣之後大㑹羣臣帝使譚鼓琴譚見𢎞失其常度帝怪而問之𢎞乃離席免冠謝曰臣所薦桓譚者望能以忠正導主而今朝廷耽悦鄭聲臣之罪也帝改容謝使反服其後遂不復令譚給事中𢎞嘗燕見御坐新屏風圖畫列女帝數顧視之𢎞正容言曰未見好徳如好色者帝即為撤之笑謂𢎞曰聞義則服可乎對曰陛下進徳臣不勝其喜侯霸建武五年為大司徒在位眀察守正奉公不回趙熹為太尉中元末熹受遺詔典喪禮是時藩王皆在京師自王莽簒亂舊典不存皇太子與東海王等雜止同席憲章無序憙乃正色横劍殿階扶下諸王以眀尊卑時藩國官屬出入宫省與百僚無别憙乃表奏謁者将䕶分止他縣諸王並令就邸唯朝晡入臨整禮儀嚴門衛内外肅然袁安章帝章和元年為司徒及和帝即位竇憲北擊匈奴憲弟衛尉篤執金吾景各専威權公於京師使客遮道奪人財物景又擅使乘驛施檄縁邊諸郡發突騎及善騎射有膂力者漁陽鴈門上谷三郡各遣吏将送詣第有司畏憚莫敢言者安乃劾景擅發邊兵驚惑吏人二千石不待符信而輙承景檄當伏顯誅又奏司𨽻校尉河南尹阿附貴戚無盡節之義司𨽻鄭據河南尹蔡嵩請免官案罪並寝不報憲景等曰益横盡樹其親黨賔客於名都大郡河南尹王調漢陽太守朱敞南陽太守滿殷髙丹等皆賔客前書曰十二萬户為大郡也皆賦斂吏人更相賂遺其餘州郡亦復望風從之安與任隗舉奏諸二千石又它所連及貶職免官者四十餘人竇氏大恨但安隗素行髙亦未有以害之任隗為司空和帝即位大将軍竇憲秉權専作威福内外朝臣莫不震懾時憲擊匈奴國用勞費隗奏議徴憲還前後十上獨與司徒袁安同心畢力持重處正鯁言直議無所回隠鄭𢎞為太尉奏尚書張林阿附侍中竇憲而素行􅂍穢又上雒陽令楊光憲之賔客在官貪殘並不宜處位書奏吏與光故舊因以告之光報憲憲奏𢎞大臣漏泄宻事帝詰譲收上印綬𢎞自詣廷尉詔勅出之因乞骸骨歸未許病篤上書陳謝并言竇憲之短帝省章遣醫治𢎞病比至已卒臨沒悉還賜物勅妻子褐巾布衣素棺殯殮以還鄉里陳寵永元十六年為司空太尉張禹司徒徐防共奏追封和憙皇后父䕶羌校尉鄧訓寵以先世無奏請故事爭之連日不能奪乃從二府議及訓追加封謚禹防復約寵俱遣子奉禮於虎賁中郎將鄧隲寵不從隲心不平之劉愷安帝時為司徒時征西校尉任尚以奸利被徵抵罪尚曾副大將軍鄧隲隲黨䕶之而太尉馬英司空李郃承望隲㫖不復先請即獨解尚贓錮愷不肯與議後尚書案其事二府並受譴咎朝廷以此稱之楊震延光二年代劉愷為太尉安帝舅大鴻臚耿寳薦中常侍李閏兄於震震不從寳乃自往候震曰李常侍國家所重欲令公辟其兄寳惟傳上意耳震曰如朝廷欲令三府辟召故冝有尚書勅遂拒不許寳大恨而去皇后兄執金吾閻顯亦薦所親厚於震震又不從王龔為太尉深疾宦官専權志在匡正上書極言其狀請加放斥諸黄門恐懼各使賔客誣奏龔罪順帝命亟自實亟急也前掾李固奏記大將軍梁商即言之於帝事乃得釋楊秉為太尉桓帝南廵園陵時詔秉從南陽太守張彪與帝㣲時有舊恩以車駕當至因傍發調多以入私秉聞之下書責譲荆州刺史以狀副言公府南陽郡荆州所部也又中常侍侯覽弟參為益州刺史累有贓罪虐一州秉劾參檻車徵詣廷尉參惶恐道自殺秉奏參取受罪􅂍累億牂柯男子張攸居為富室參横加非罪云造訛言殺攸家八人沒入廬宅又與同郡諸生李元之官共飲酒醉飽之後戯故相犯誣言有淫慝之罪應時捶殺以人臣之勢行桀紂之態傷和逆理痛感天地冝當糺持以謝一州又曰京兆尹袁逢於長安客舎中得參重車三百餘乗金銀珍玩不可勝記秉因奏覽及中常侍具瑗曰臣按國舊典宦豎之官本在給使省闥司昏守夜而今猥受過寵執政操權其阿䛕取容者則因公褒舉以報私恵有忤逆于心者必求事中傷肆其凶忿居法王公富擬國家飲食極肴膳僕妾盈紈素雖季氏専魯穣侯擅秦何以尚兹按中常侍侯覽弟參貪殘元惡自取禍滅覽顧知釁重必有自疑之意臣愚以為不宜復見親近昔懿公刑邴歜之父奪閻職之妻而使二人參乘卒有竹中之難春秋書之以為至戒盖鄭詹來而國亂四佞放而衆服以此觀之容可近乎覽宜急屏斥投畀豺虎若斯之人非恩所宥請免官送歸本郡書奏尚書召對秉掾屬曰公府外職耳奏劾近官經典漢制有故事乎秉使對曰春秋趙鞅以晉陽之甲逐君側之惡傳曰除君之惡惟力是視鄧通懈慢申屠嘉召通詔責文帝從而請之漢世故事三公之職無所不統尚書不能詰帝不得已竟免覽官而削瑗國每朝廷有得失輙盡忠規諌多見納用周景為司空時宦官任人及子弟充塞列位景初視事與太尉楊秉舉奏諸姦猾自将軍牧守以下免者五十餘人遂連及中常侍防東陽侯侯覽東武陽侯具瑗皆坐黜朝廷莫不稱之杜喬為太尉桓帝将納梁冀妹冀欲令以厚禮迎之喬據執舊典不聼又冀屬喬舉汜宫為尚書喬以宫臧罪眀著遂不肯用因此日忤於冀先是李固見廢内外喪氣羣臣側足而立惟喬正色無所回撓繇是海内嘆息朝野瞻望焉黄瓊為司空桓帝欲褒崇大将軍梁冀使中朝二千石以上㑹議其禮特進胡廣太常羊溥司𨽻校尉祝恬大中大夫邊韶等咸稱冀之勲徳其制度賚賞以宜比周公錫之山川土田附庸瓊獨建議曰冀前以親迎之勞増邑三千又其子𦙍亦加封賞昔周公輔相成玉制禮作樂化致太平是以大啓土宇開地七百今諸侯以户邑為制不以里數為限蕭何識髙祖於泗水霍光定傾危以興國皆益户増封以顯其功冀可比鄧禹合食四縣賞賜之差同於霍光使天下知賞必當功爵不越徳朝廷從之永興元年遷司徒轉太尉梁冀前後所托辟召一無所用雖有善人而為冀所辟舉者亦不加命延熹元年以日食免梁冀被誅瓊復拜太尉瓊首居公位舉奏州郡素行貪汚至死徙者十餘人海内咸翕然望之尋而五侯擅權傾動内外自度力不能正乃稱疾不起五侯謂左悺徐璜等李固為太尉种暠為益州刺史時永昌太守冶鑄黄金為文蛇以獻梁冀暠糾發逮捕馳傳上言而二府畏懦不敢案之冀繇是銜之愈怒㑹巴郡人服直聚黨數百人自稱天王暠與太守應承討捕不克吏人多被傷害冀因此陷之傳逮暠承固上疏救曰臣伏聞討捕所傷本非暠承之意實由縣吏懼法畏罪迫逐深苦致此不祥比盜賊羣起處處未絶暠承以首舉大奸而相隨受罪臣恐沮傷州縣糾發之意更共飾匿莫復盡心梁太后省奏乃赦暠承罪免官而已陳蕃以桓帝延熹八年為太尉九年司𨽻校尉李膺遭黨事考實膺案經三府蕃卻之曰今所考案皆海内人譽憂國忠公之臣此等猶将十世宥也豈有罪名不章而致收掠者乎不肯平署及竇太后臨朝蕃為太傅録尚書事蕃與后父大将軍竇武同心盡力共參政事而帝乳母趙嬈旦夕在太后側中常侍曹節王甫等與共交結諂事太后太后信之數出詔命有所封拜及其支類多行貪虐蕃常疾之志誅中官㑹武亦有謀蕃自以既從人望而徳於太后必謂其志可申乃先上䟽曰臣聞言不直而行不正則為欺乎天而負乎人危言極意則羣凶反目禍不旋踵此二者臣寧得禍不敢欺天也今京師囂囂道路諠譁言侯覧曹節公乘昕王甫鄭䬃等與趙夫人諸女尚書並亂天下附從者升進忤逆者中傷方今一朝羣臣如河中木耳泛泛東西耽祿畏害陛下前始攝位順天行誅蘇康管覇並伏其􅇳是時天地清明人鬼歡喜柰何數月復縱左右元惡大奸莫此之甚今不急誅必生變亂傾危社稷其禍難量願出臣章宣示左右并令天下諸奸知臣疾之太后不納朝廷聞者莫不震恐於是蕃武共定䇿誅中官㑹五月日食蕃復説武曰昔蕭望之困一石顯近者李杜諸公禍及妻子况今石顯數十軰乎蕃以八十之年欲為将軍除害今可且因日食斥罷宦官以塞天變又趙夫人及女尚書旦夕亂太后急宜退絶惟将軍慮焉武乃白太后故事黄門常侍但當給事省内典門户主近署財物耳今乃使與政事而任權重子弟布列專為貪暴天下匈匈正以此故冝悉誅廢以清朝廷太后曰漢朝故事世有但當誅其有罪豈可盡廢耶時中常侍管覇頗有才畧專制省内武先白誅覇及中常侍蘇康等竟死武復數白誅曹節等太后猶豫未忍故事乆不發至八月太白出西方劉瑜以書勸令速斷大計于是蕃以朱瑀為司𨽻校尉劉祐為河南尹虞祁為雒陽令武乃奏免黄門令魏彪以所親小黄門山氷代之使氷奏素狡猾尤無狀者長樂尚書鄭䬃送北寺獄蕃謂武曰此曹子便當收殺何復考為武不從令氷與尹勲侍御史祝瑨雜考䬃辭連及曹節等使劉瑜内奏時武出宿歸府典中書者先以告長樂五官史朱瑀繇是曹節聞之矯詔誅武蕃等何進為大将軍與太𫝊袁隗輔政録尚書事時靈帝中平末何太后臨朝進素知中官天下所疾兼以蹇碩圖已及秉朝政隂規誅之袁紹亦素有謀因進親客張津勸之曰黄門常侍權重日久又與長樂太后專通奸利将軍冝更清選賢良整齊天下為國家除患進然其言又以袁氏累世寵貴海内所歸而紹素善養士能得豪傑用其從弟虎賁中郎将術亦尚氣俠故並厚待之因復博徵智謀之士龎紀何顒荀攸等與同心腹袁滂靈帝時為司徒當權寵之盛或以同異致禍滂獨中立於朝故愛憎不及焉楊彪以靈帝中平六年為司徒明年關東兵起董卓懼欲遷都以避其難乃大㑹公卿議曰高祖都關中十有一世光武居雒陽於今亦十世矣案石包䜟冝徙都長安以應天人之意百官無敢言者彪曰移都改制天下大事故盤庚五遷殷民胥怨昔關中遭王莽變亂宫室焚燒民庻塗炭百不一在光武受命更都雒邑今天下無虞百姓樂安明公建立聖主光隆漢祚無故損宗廟棄園陵恐百姓驚動必有糜沸之亂石包室䜟妖邪之書豈可信用卓曰關中肥饒故秦得并吞六國且隴右材木自出致之甚易又杜陵南山下有武帝故瓦陶竈數千所并功營之可使一朝而辦百姓何足與議若有前却我以大兵驅之可令詣滄海彪曰天下動之至易安之甚難惟明公慮焉卓作色曰公欲沮國計邪太尉黄琬曰此國之大事楊公之言得無可思卓不答司空荀爽見卓意壯恐害彪等因從容言曰相國豈樂此耶山東兵起非一日可禁故當遷以圖之此秦漢之勢也卓意少觧爽私謂彪曰諸君堅争不止禍必有歸故吾不為也議罷卓使司𨽻校尉宣播以災異奏免琬彪等獻帝興平元年復為太尉及李傕郭汜之亂彪盡節衛主﨑嶇危難之間郭汜饗公卿議欲攻傕彪曰羣臣共鬬一人刼天子一人執公卿此可行乎汜怒欲手刃之中郎將楊宻及左右多諫汜乃歸之建安四年復拜太常魏文帝受禪欲以彪為太尉先遣使示㫖彪辭曰彪備位三公遭傾亂不能有所補益耄老被病豈可賛維新之朝遂固辭黄琬為太尉董卓議遷都長安琬與司徒楊彪同諫不從琬退而駁議之曰昔周公營洛邑以寧姬光武卜東都以隆漢天之所啟神之所安大業既定豈冝妄有遷動以虧四海之望時人懼卓暴怒琬必及害固諌之琬對曰昔白公作亂于楚屈廬冐刃而前崔杼弑君于齊晏嬰不懼其盟吾雖不徳誠慕古人之節琬竟坐免卓猶敬其名徳舊族不敢害趙温為司徒録尚書事時李傕與郭汜相攻傕虜掠禁省刼帝幸北塢外内隔絶傕素疑温不與已同乃内温于塢中又欲移乘輿于黄白城温與傕書曰公前托為董公報仇然寔屠陷王城殺戮大臣天下不可家見而户説也今與郭汜争睚眦之隙以成千鈞之仇人在塗炭各不聊生曾不改悟遂成禍亂朝廷仍下明詔欲令和觧上命不行威澤日損而復欲移轉乗輿更幸非所此誠老夫所不解也于易一為過再為渉三而弗改滅其頂凶不如早共和觧引軍還屯上安萬乗下全人民豈不幸甚傕大怒欲遣人殺温董卓從弟應温故椽也諌之數日乃獲免魏董昭明帝太和中為司徒上䟽陳末流之弊曰凡有天下者莫不貴尚敦樸忠信之士深疾虚偽不真之人者以其毁教亂治敗俗傷化也近魏諷則伏誅建安之末曹偉則斬戮黄初之始伏惟前後聖詔深疾浮偽欲以破散邪黨常用切齒而執法之吏皆畏其權勢莫能糾擿毁壊風俗侵欲滋甚切見當今年少不復以學問為本專更以交㳺為業國士不以孝弟清修為首乃以趨勢游利為先合黨連羣互相褒嘆以毁訾為罰戮用名譽為爵賞附己者則歎之盈言不附者則為作瑕釁至乃相謂今世何憂不度邪但求人道不勤羅之不博耳又何患其不知已矣但當吞之以藥而柔調耳又聞或有使奴客名作在職家人冐之出入徃來禁奥交通書䟽有所探問凡此諸事皆法之所不取刑之所不赦雖諷偉之罪無以加也帝于是發切詔斥免諸葛誕鄧颺等蔣濟齊王初為太尉是時曹爽專政丁謐鄧颺等輕改法度有日蝕變詔羣臣問其得失濟上䟽曰昔大舜佐治戒在比周周公輔政慎于其朋齊侯問災晏嬰對以布惠魯君問異臧孫答以緩役應天塞變乃實人事今二賊未滅将士暴露已數十年男女怨曠百姓貧乏夫為國法度惟命世大才乃能張其綱維以垂于後豈中下之吏所能改易哉終無益于治適足傷民望冝使文武之臣各守其職率以清平則和氣祥瑞可感而致也又司馬宣王收曹爽兄弟皆誅之濟曰曹真之勲力不宜絶祀帝不聼臣欽若等曰曹真爽之父也衛臻為司徒正始中進爵長垣侯初太祖乆不立太子而方竒貴臨菑侯臣欽若等曰臨菑侯植也丁儀等為之羽翼勸臻自結臻以大義拒之及文帝即位東海王霖有寵帝問臻平原侯何如臣欽若等曰植先封平原侯臻稱明徳美而終不言曹爽輔政使夏侯𤣥宣指欲引臻入守尚書令及為弟求婚皆不許蜀諸葛亮為丞相後主踐祚以來敏為虎賁中郎將亮在漢中請敏為軍祭酒輔軍將軍坐事去職亮教曰將軍來敏對上官顯言新人有何功徳而奪我榮資與之耶諸人共憎我何故如是敏年老狂悖生此怨言昔成都初定議者以為來敏亂羣先帝以新定之際故遂含容無所禮用後劉子初選以為太子家令先帝不悦而不忍拒也今上即位吾闇于知人遂復擢為將軍祭酒違議者之審見背先帝所䟽外自謂能以敦勵薄俗帥之以義今既不能表退職使閉門思愆呉顧雍大帝時為丞相平尚書事于公朝有所陳及詞色雖順而所執者正帝嘗令中書郎詣雍有所咨訪若合雍意事可施行即與相反覆䆒而論之為設酒食如不合意雍即正色改容黙然不言陸凱為丞相時殿上列將何定佞巧便辟貴幸任事凱面責定曰卿見前後事主不忠傾亂國政寧有得以壽終者邪何以專為奸邪穢塵天聴冝自改勵不然方見卿有不測之禍矣定大恨凱思中傷之凱終不以為意乃心公家義形于色表䟽皆指事不飾忠懇内發晉王祥在魏為太尉陳㽞王咸熈元年司馬文王既進爵為王祥與司徒何曾司空荀顗並詣王顗曰相王尊重何侯與一朝之臣皆已盡敬今日便當相率而拜無所疑也祥曰相國位勢誠為尊貴然要是魏之宰相吾等魏之三公公王相去一階而已班例大同安有天子三公可輙拜人者損魏朝之望虧晉王之徳君子愛人以禮吾不為也及入顗遂拜而祥獨長揖王謂祥曰今日然後知君見顧之重衛瓘武帝時為司空領太子少𫝊時惠帝在東宫朝臣咸謂太子純質不能親政事瓘毎欲陳啟廢之而未敢發後㑹宴凌雲臺瓘托醉因跪帝牀前曰臣欲有所啟帝曰公所言何耶瓘欲言而止者三因以手撫牀曰此座可惜帝意乃悟因謬曰公真大醉耶瓘于此不復有言賈后繇是怨瓘瓘男宣尚公主數有酒色之過楊駿素與瓘不平駿復欲自專權以為宣若離昏瓘必遜位于是遂與黄門等毁之諷帝奪宣公主瓘慚懼告老遜位乃下詔進位太保以公就第有司又奏收宣付廷尉免瓘位詔不許帝後知黄門虚搆欲還復主而宣疾亡王導為司空加守尚書令時元帝愛琅琊王褒將有奪嫡之議以問于導導曰夫立子以長且紹又賢臣欽若等曰紹明帝也不宜改易帝猶疑之導旦夕陳諫故太子卒定及成帝時進位太傳拜丞相帝舅庾亮字元規以望重地逼出鎮江州亮雖居外而執朝廷之權既據上流擁强兵趨向者多歸心導内不能平嘗遇西風塵起舉扇自蔽徐曰元規塵汚人後魏古弼太武時為尚書令參政事時上谷民上書言苑囿過度民無田業減大半以賜貧人弼覧之入欲陳奏遇太武與給事中劉樹棊志不聼事弼侍坐良乆不獲申聞乃起于太武前捽樹頭掣下牀以手搏其耳以拳毆其背曰朝廷不治是爾之罪太武失容放棊曰不聼奏事實在朕躬樹何罪置之弼具状以聞太武竒弼公直皆可其所奏以與百姓弼曰為臣而逞其志于君前者非無罪也乃詣公車免冠徒跣自劾請罪太武遣使者召之源賀為太尉獻文欲禪位于京兆王子推任城王雲進言不可賀又進曰陛下今欲外選諸王而禪位于皇叔者臣恐春秋烝嘗昭穆有亂脫萬世之後必有逆享之譏願深思任城之言獻文從之高陽王雍孝明初為太傅侍中領太尉詔雍入居太極西栢堂咨决大政時領軍于忠擅權專恣僕射郭祚勸雍出之忠怒矯詔殺祚及尚書裴植廢雍以王歸第雍表曰臣初入栢堂見詔㫖之行一由門下而臣出君行不以悛意每覧傷矜視之􅆭目深知不可不能禁制臣之罪一也臣近忝内樞兼居師傅冝保䕶聖躬温凊晨夕而于忠身居武司禁勒自在限以内外朝謁簡絶皇居寢食所在不知社稷安危又不豫出入栢堂尸位而已臣之罪二也忠規欲殺臣頼在事執拒又令僕卿相任情進黜遷官授職多不經旬斥逐賢良專納心腹威震百僚勢傾朝臣臣見其如此欲出忠為雍州刺史鎮撫關右在心未行反為忠廢忝官尸禄孤負恩私臣之罪三也先帝昇遐儲宫纂統斯乃君父之常謨臣子之永則加賞之義自古無之忠既人臣受恩先帝䘮禍之際竭節是常迎陛下於東宫臣下之常事如其不爾更欲何為而忠意氣凌雲坐要封爵爾日抑之交恐為禍亂臣以權臣所欲不敢輙違即集王公卿士議其多少清河王臣懌先帝懿弟識度寛明臨衆唱議非以勤而賞之憚違權臣之㫖望顔而授臣知不可因而從之臣之罪四也忠秉權門下且居宰執又揔禁旅為崇訓衛尉身兼内外横于宫掖臣之罪五也古者重罪必命三公㑹期至旬日所以重死刑也先帝登極十有七年細人犯刑猶寛憲墨朝廷貴仕不戮一人今陛下踐祚年未半周殺僕射尚書如去一草是忠秉權矯㫖擅行誅戮臣知不能救臣之罪六也臣位荷師相年未及終難恕之罪顯露非一何情以處何顔以生雖經恩宥猶有餘責謹反私門伏聼司敗太后感忠保䕶之勛不問其罪北海王祥宣武為司徒公録尚書時御史中尉甄琛與黄門郎李慿以朋黨被召尚書邢巒窮其阿附之狀琛曾拜官親賔悉集巒乃晩至琛謂巒曰卿何處放蛆來今晩始顧雖以戯言巒變色衘忿及此大相推窮祥等奏曰臣聞黨人為患自古所疾政之所忌雖寵必誅皆所以存天下之至公保靈基于永業者也伏惟陛下纂聖前暉洞鍳幽慝恩斷近習憲軌惟新大政蔚以增光鴻猷于焉永泰謹按侍中領御史中尉甄琛身居直法糾摘是司風邪響黷猶冝劾糾况趙修奢暴聲著内外侵公害私朝野切齒而琛嘗不陳奏方更徃來綢繆結納以為朋黨中外影響致其談譽令布衣之父超登正四之官七品之弟越陟三階之禄虧先皇之選典塵聖明之官人又與武衛將軍黄門郎李慿相為表裏慿兄叨封知而不言及修釁彰方加彈奏生則附其形勢死則就地排之竊天之功以為己力仰欺朝廷俯罔百司其為鄙詐于茲甚矣不實不忠寔合黜貶謹依律科從請以職除其父中散實為叨越雖皇族帝孫未有此例既得不以倫請下收奪李慿朋附趙修是謂交逰之道不依常度或晨昏從就或吉凶徃來至乃身拜其親妻見其子每有家事必先請託緇㸃皇風塵鄙政化此而不糾將何以肅整阿䛕奨勵忠槩請免所居官以肅風軌奏可琛遂免歸本郡左右相連死黜者二十餘人北齊厙狄干文宣天保中為太宰干尚神武妹樂陵長公主以親地見待自預勤王嘗揔大衆威望之重為諸侯最而性嚴猛曾詣京師魏譙王元孝友扵公門言戱過度干正色責之孝友大慚時人稱善隋蘇威為納言從煬帝征遼東領右禦衞大將軍楊𤣥感之反帝引威于帳中懼見于色謂曰此小兒聦明得不為患耶威曰𤣥感麄疎非聰明者必無慮但恐寖成亂階耳勞役不止百姓思亂欲以微諷帝意竟不悟册府元龜卷三百十六
