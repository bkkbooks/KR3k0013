body:
  text: 册府元龜卷七百二宋王欽若等撰令長部能政遺愛課最能政夫建縣邑置令長有社稷焉有人民焉政之所由出也歴代而下曷嘗不推擇而授任故其宣美績流淑聲者亦不乏其人焉或明以炤姦或智能治劇或推之以恩信或鎮之以清靜或兼文武之用或適寛猛之宜而史氏之述曰其民稱之懷之詠歌之不欺之畏而愛之雖為政不同歸于能矣孔子為中都宰一年四方皆則之宓不齊字子賤治單父其民附孔子曰告丘之所以治之者對曰不齊發倉廩賑窮補不足孔子曰是小附耳未也對曰當有能招賢才退不肖孔子曰是士附耳未也對曰所父事者三人所兄事者五人所友事者十有二人所師者一人孔子曰所父事者三人所兄事者五人足以教弟矣所友者十有二人足以逹壅蔽矣所師者一人足以慮無遺策舉無敗功矣惜乎不齊為之大功乃與堯舜參詩曰愷悌君子民之父母子賤其似之矣吕氏春秋曰宓子賤治單父彈鳴琴身不下堂而單父治巫馬期以星出以星入日夜不居以身親之而單父亦治巫馬期問其故于宓子宓子曰我之謂任人子之謂任力任力者固勞任人者固逸子賤君子矣逸四支平耳目而百官以治義矣任其教而已矣子竒年十八齊君使之化阿至阿鑄其庫兵以為耕器出倉廪以賑貧窮阿縣大化西門豹魏文侯時為鄴令河内稱治名聞天下子産治鄭民不能欺子賤治單父民不忍欺西門豹治鄴民不敢欺三子之才能誰最賢哉辨治者當能别之漢朱邑字仲卿廬江舒人少時為舒桐鄉嗇夫㢘平不苛以愛利為行仁愛于人而安利也未嘗笞辱人存問耆老孤寡遇之有恩所部吏民愛敬焉召信臣字翰卿九江壽春人以明經甲科為郎出補榖陽長舉髙第遷上蔡長其治視民如子所居見稱述超為零陵太守後漢公孫述字子陽扶風茂陵人哀帝時以父任為郎後父仁為河南郡尉而述補清水長仁以述年少遣門下掾隨之官月餘掾辭歸白仁曰述非待教者也卓茂為宻令勞心諄諄視人如子舉善而教口無惡言吏民親愛而不忍欺之歐陽歙為原武令世祖平河北到原武見歙在縣修政遷河南都尉班彪察司徒㢘察舉也司徒薦為㢘為望都長吏民愛之耿國歴頓丘陽翟上蔡令所在吏人稱之李咸為髙密令政多竒異青州表其状劉平彭城人為郡吏守菑丘長政教大行其後每屬縣有劇賊輙令平守之所至皆理由是一郡稱其能後為全椒長政有恩惠百姓懷感人或増貲就賦或减年從役刺史太守行部獄無繫囚人自以得所不知所問惟班詔書而去魯王興光武兄子試守緱氏令有明畧善聽訟甚得名稱法雄為平氏長善政事吏人畏愛之南陽太守鮑得上其理狀遷兖陵令滕撫為涿令有文武才用太守以其能委任郡職兼六縣風政修明流愛于人在事七年道不拾遺劉騊駼為湞陽長政化大行道不拾遺韋義為廣都長甘陵陳二縣令政甚有績官曹無事牢獄空虛陸康為髙城令縣在邊陲舊制令户一人具弓弩以備不虞不得行來行來猶往來也長史新到輙發民繕修城郭康至皆罷遣百姓大悦以恩信為治寇賊亦息州縣表上其狀和拂為宛令時南陽縣郡吏因休沐游市里為百姓所患拂出逢之必下車公謁以愧其心自是莫敢出者政有能名第五訪補新都令政平化行三年之間鄰縣歸之户口十倍趙苞為廣陵令視事三年政教清明郡表其狀遷遼西太守葛龔為湯隂令又為臨汾令居二縣皆有稱績王渙為雒陽令以平正居身得寛猛之宜任浚為劇令劇縣名屬北海郡初雒陽令王渙卒後連詔三公時選皆不稱職順帝永和中以浚補之浚擢用文武吏皆盡其能一歳斷獄不過數十衛颯辟大司徒鄧禹府舉能按劇除侍御史襄城令政有名績童翊舉孝㢘除須昌長化有異政吏人生為立碑宋登為汝隂令為政明能號稱神父桓鸞為已吾汲二縣令甚有名迹諸公並薦劉洪為曲成侯相政教清均吏民愛而畏之為州郡之所禮異也崔瑗為汲令在事數言便宜視事一年百姓歌之袁安歴隂平長任城令所在吏人畏而愛之荀淑為朗陵侯相號稱神君劉虞為博平令治政推平髙尚純樸境内無盗賊災害不生魏梁習漢末為漳長累轉乘氏海西下邳令所在有治崔林河東武成人太祖定冀州召除鄔長無車馬單歩之官太祖征壺闗問長吏徳政最者并州刺史張陟以林對于是擢為冀州主簿徙署别駕丞相掾屬倉慈字孝仁黄初末為長安令清約有方吏民畏而愛之吉茂字叔暢舉茂才除臨汾令在官清靜吏民不忍欺蜀吕又為新都綿竹令乃心隱䘏百姓稱之為一州諸城之首晉曹攄為雒陽令仁惠明斷百姓懷之喬智明少以徳行聞成都王頴表為殄寇將軍隆慮共二縣令二縣愛之號為神君竇允始平人出自寒門清尚自修少仕縣稍遷郡主簿察孝㢘除浩舋長勤于為政勸課田蚕平均調役百姓頼之為臨水令克己勵俗改修政事士庶悦服咸歌詠之潘京歴巴丘邵陵泉陵三令京明于政術路不拾遺陸雲為浚儀令縣居都㑹之要名為難理雲到官肅然下不能欺市無二價宋傳僧祐有吏才再為山隂令甚有能名末世令長莫及江秉之為烏程令以善政著名東土徴為建康令為治嚴察京邑肅然後為山隂令民户三萬政事煩擾訟訴殷積階庭常數百人秉之御繁以簡常得無事宋世惟顧凱之亦以省務著績其餘雖復刑政循理而未能簡事以在縣有能遷補新安太守徐豁為山隂令精練法理為時所推陸徽呉人也補建康令清平無私為太祖所善南齊沈憲為烏程令甚著政績太守褚淵嘆之曰此人方圓可施蕭赤斧為錢塘令治政為百姓所安遷正員郎吏民請留之時議見許蕭景為永寧令永嘉太守范述曾居郡號稱㢘平雅服景為政乃牓郡門曰諸縣有凝滯者可就永寧令决之傳琰字季珪山隂令僧祐子也琰又為山隂令山隂東土大縣難為官長僧祐在縣有稱琰尤明察父子並著竒績江左鮮有世云諸傅有治縣譜子孫相傳不以示人一云琰為武庫令遷山隂令並著能名一縣皆謂之傅聖也劉𤣥明有吏能為山隂令大著名績傅琰子翽代𤣥明為山隂令問𤣥明曰願以舊政告新政尹答曰我有竒術卿家譜所不載我臨去當告卿將别謂之曰作縣惟日食一升飯而莫飲酒此第一策也顧憲之為建康令性清儉强力為政甚得民和故京師飲酒者得醇㫖輙號為顧建康醇清且美也丘仲孚為山隂令居職甚有聲稱百姓為之謡曰二傅沈劉不如一丘前世傅琰父子沈憲劉𤣥明相繼宰山隂並有政績言仲孚皆過之也吉翂年十七應辟為本州主簿出監萬年縣攝官期月風化大行陳殷不佞初仕梁承聖初為武康令時兵荒饑饉百姓流移不佞廵撫招集襁負而至者以千數江徳藻為新渝令政尚恩惠頗有異績後魏韓念祖為上黨令徐州刺史尉元表念祖始臨之初舊民南叛全無一人撫慰招集愛民如子南來民費傒先等前後歸附户至二百有餘南濟隂郡睢陵縣人趙憐等辭稱念祖善于綏撫清身請乞念祖為睢陵令若得其人必能招集離叛成立一縣獻文詔曰樹君為民之情如此可聽如請呉平仁為定陽令有恩信户增數倍汾州刺史穆羆以吏民懷之為表請孝文從之楊機行河隂縣事明逹政事斷獄以情甚有聲譽髙謙之為河隂令在縣二年損益治體多為政事北齊杜弼為光州曲城令為政清靜務盡仁恕詞訟止息逺近稱之隋房恭一字慎言沉深有局量逹于從政為平恩令有能名郎茂初仕北齊為保城令有能名百姓為立清徳頌周平齊後為衛國令歴年詞訟不詣州省魏州刺史元暉謂茂曰長史言衛國民不敢申訴者要明㢘耳茂進曰民猶水也法令為隄防隄防不固必致奔突茍無决溢使君何患哉暉無以應之長孫熾為諫議大夫攝長安令與大興令梁毗俱為稱職然毗以嚴正聞熾以寛平顯為政不同部内各化魏徳深大業中為貴鄉長遼東之役徴税百端使人往來責成郡縣于時王綱弛紊吏多贓賄所在徴斂下不堪命惟徳深一縣有無相通不竭其力所求皆給百姓不擾稱為大化于是盗賊羣起武陽諸城多被淪陷惟貴鄉獨全郡丞元寳藏受詔逐捕盗賊每戰不利則器械必盡輙徴發于人動以軍法從事如法者數矣其鄰城營造皆聚于㕔事吏人逓相督責晝夜喧囂猶不能清徳深各問其所欲任隨便修營官府寂然常若無事惟約束長吏所修不須過餘使百姓勞苦然在下各自竭心常為諸縣之最髙世行大業末為櫟陽令劉髙為蕭令劉熾為城臯令俱有恩惠風教大洽獄無繫囚為吏人所稱唐顔師古隋仁壽中為安養尉尚書左僕射楊素見師古年弱貌羸因謂曰安養劇縣何以克當師古曰割鷄焉用牛刀素竒其對官梁以幹理聞獨孤懷恩為鄠縣令髙祖平京城授長安令在職嚴明甚得時譽韋承慶調露中為烏程令風化大行李峴信安王禕第三子樂善下士頗有吏才以門䕃入仕累遷髙陵令政術知名特遷萬年令所蒞皆著聲績蔣沅乾元中為陸渾盩厔咸陽髙陵四令當軍旅之後瘡痍未平沅竭心撫綏所至安輯副元帥郭子儀每統兵由其縣必誡軍吏曰蔣令清嚴幹辦供億固當有數士衆得蔬飯見饋則已無撓清政其為時人所稱如此闗播大厯中為河南府兵曹攝職數縣皆有政能田庭玠魏博節度使興之父㓜敦儒雅不樂軍職起家為平舒丞遷樂壽清池東城河間四縣令所至以良吏稱王正雅穆宗朝為萬年令時京邑號為難理正雅抑强扶弱政甚有聲㑹柳公綽為京兆尹于帝前保稱帝命以緋衣銀章就縣宣賜遷户部郎中後唐賈復累為鎮冀屬邑令所蒞有能政劉逺清泰初為鉅野令縣民張廷煦等舉留逺詔曰月限外量留一年李温美清泰中為愽州武水令縣民二百舉留温美詔本限外留一年王遵美為密州諸城令考限欲滿部人以善政舉留時已除替人特减一選晉李顓美為武陽令性㢘謹大著政聲任沉為青州邑益都令縣民舉留勅量留一年孟承誨為宗城令秩滿以百姓舉留移常山槀城令皆有善政宇文頡為汝州襄城令縣民舉請勅月限外量留一年李殷為太谷令北京上言殷釐務公㢘以徳化下獄無囚繫刑無鞭扑薪水之事不擾于民力賦輿之數不失于公程三時勸農躬行田井乾糇曝饊裹行而食一邑熙熙長幼有序流者歸復如戀父母今考秩垂滿衆情願留敢希明恩重令治任詔下褒美量留一年周司徒詡清河人後唐明宗之鎮邢臺詡往謁之甚見禮遇命試吏于邯鄲歴永年須城令皆有能名景範初以明經擢第歴貝州清陽簿濮州范縣令皆以强幹著名李元懿為青州北海縣令民五千餘詣闕舉稱元懿所任添千户出税錢貫疋萬勸課百姓種樹十三萬于縣廨内種樹千其年早霜北海不損田諸縣蝗不入縣界泥龍求雨無應李令笞龍責之即日雨足民有詞訟當面剖斷出俸錢修公廨置什物當李令在官曽將其事于本州舉請前使劉銖以為阿附例遭决責令以元懿之政望更賜李令三二年時元懿已授宋城令以縣民堅請遂復為北海以奬之遺愛觀夫寄百里之命布一同之政若乃清白自處風教外行訢合民情允臻王化則有因伏臘以放囚繫勸農桑而成歳事民懷其惠吏不忍欺頌徳以立碑畫像以配祀故先民有言曰善人為政歿且不朽其是之謂乎西門豹為鄴令鑿十二渠引河水灌民田皆溉至漢時長吏以為十二渠橋絶馳道相比近不可欲合渠水且至馳道合三渠為一橋鄴民人父老不肯聽長吏以為西門君所為也賢君之法式不可更也長吏終聽置之漢朱邑少時為舒桐鄉嗇夫㢘平不苛以愛利為行未嘗笞辱人存問耆老孤寡遇之有恩所部吏民愛敬焉後遷大司農病死屬其子曰我故為桐鄉吏其民愛我必塟桐鄉後世子孫奉嘗我不如桐鄉民嘗謂烝嘗之祭及死其子塟之桐鄉西郭外民果共為邑起冡立祠歳時祠祭至今不絶焦贛為小黄令化行縣中舉最當選三老官屬上書願留贛有詔許増秩留後漢卓茂初為宻令是時王莽秉政置大司農下部丞勸農桑遷茂為京丞宻人老少皆涕泣隨送魯恭為中牟令㑹遭母䘮去官吏人思之王喬為葉令及卒百姓乃為立廟號葉君祠韋義為廣都長以兄順䘮去官廣都為生立廟後為甘陵陳二縣令及卒二縣吏民為義舉哀若䘮考妣寒郎為濟陽令以母䘮去官百姓追思之章和元年和帝東廵狩過濟陽三老吏人上書陳郎前政狀帝至梁召見郎三府為辟首由是辟司徒府楊仲績為祁令甚有徳惠人為立祠劉寵為東平陵令以仁惠為吏民所愛母疾棄官去百姓將送塞道車不得進乃輕服遁歸姜詩為江陽令卒于官所居治鄉人為立祀宋登為汝隂令後為潁川太守病免卒汝隂人配社祠之王渙為雒陽令病卒百姓市道莫不咨嗟男女老壯皆相與賦歛致奠醊以千數渙䘮西歸道經𢎞農民㢘皆顧褩按于路吏問其故咸言平常持米到雒為卒司所鈔常亡其半自王君在事不見侵枉故來報恩其政化懷物如此人思其徳為立祠于安陽亭西毎食輙弦歌薦之陳寔為太丘長修徳清靜百姓以安以沛相賦歛違法乃觧印綬去吏人追思之荀淑為當塗長歴朗陵侯相及卒二縣皆為立祠劉陶為順陽長又云名騊駼為湞陽以病免吏民思而歌之曰邑然不樂思我劉君何時復來安此下民蜀董和為成都令縣界豪强憚和嚴去訖益州牧劉璋轉和為巴東屬國都尉吏民老幼相携乞留和者數千人璋聽留二年晉荀朂為安陽令轉驃騎從事中郎朂有遺愛安陽生為立祠陸雲為浚儀令郡守害其能屢譴責之雲乃去官百姓追思之圖畫形像配食縣社孔奕為全椒令在官有惠化及卒市人若䘮慈親南齊樂預為永世令民懷其徳卒有一老嫗行擔觧䔩若將詣市聞預死棄擔號泣周顒為剡令有恩惠百姓思之梁樂藹為龍陽相以父憂去職吏民詣州請之塟訖起焉劉香為臨津令有善績秩滿縣人三百餘人詣闕請留勑許焉蕭景為永寧令以疾去官永嘉人胡仲宣等千人詣闕表請景為郡不許還為驃騎將軍傅岐為始平令後去縣民無老小皆出境拜送啼號之聲聞于數十里隋劉曠髙祖開皇初為平鄉令在職七年風教大洽及去官吏人無少長號泣于路將送數百里不絶魏徳深煬帝大業中為貴鄉長百姓不擾稱為大化遷舘陶長貴鄉吏人聞之相與言及其事皆欷歔流涕語不成聲及將赴任傾城送之號泣之聲道路不絶既至舘陶闔境老幼皆如見父母貴鄉父老冐渉險難詣闕請留有詔許之舘陶父老復詣郡相訟以貴鄉文書為詐郡不能决㑹持節使者韋霽杜釐等至兩縣詣使訟之乃斷從貴鄉貴鄉吏人歌呼滿道互相稱慶舘陶衆庶合境悲哭因而居住者數百家後與賊戰沒于陣貴鄉舘陶人庶至今懷之房彦謙為長葛令超授鄭州司馬吏民號哭相謂曰房明府今去吾屬何用生為其百姓思之立碑頌徳唐張元濟隋大業中為武陽令務以徳教訓下百姓懷之髙叡為通義令以善政稱去官後人吏樹碑頌其徳崔務智為博州清平令以歳滿當去職百姓懷其善政詣闕請更留一年制許之韋景駿為肥鄉令後為趙州長史路由肥鄉人吏驚喜競來犒餞留連經日有童稚數人年甫十餘歳亦在其中景駿謂曰計吾去此時汝輩未生既無舊恩何慇懃之甚也咸對曰比聞長宿傳説縣中廨宇學堂舘舍隄橋並是明公遺迹將謂古人不意親得瞻覩不覺欣戀倍于常也其為人所思如此崔縱為藍田令寛明勤謹徳化大行縣人請立碑薛珏為渭南令以清白尤異聞遷昭應令縣人請立碑紀政珏因固讓不受裴耀卿為長安令在職二年寛猛得𠂻及去官縣人甚思詠之晉史圭為樂壽令里人為之立碑課最夫郡縣者國之藩維令長者民之父母欲親其民必修其政則有立神明之譽興㢘讓之風吏民悦服獄訟和平清白尤異課績連最莫不升諸公朝待之異數所以三考黜陟前王令典五等優劣後世凖䋲不然清濁不分善惡何勸乎漢卜式為緱氏令緱氏便之遷成臯令將漕最為縣令而又使領漕其課最上趙廣漢為陽翟令以治行尤異遷京輔都尉守京兆尹王尊行美陽令事宣帝行幸雍過虢尊供張如法而辦尊雖行美陽令而就虢供張也以髙第擢為安定太守義縱補上黨郡中令治敢往少温藉敢行暴虐之政少温藉言無所含容也縣無逋事逋亡也負也舉第一遷為長陵及長安令焦延壽守贛為少黄令愛養吏民化行縣中舉最當遷以課最而被舉故一遷而為他官也三老官屬上書願留贛有詔許增秩留依許留而増其秩召信臣為榖陽長舉髙第遷上蔡長後漢杜詩為成臯令視事三歳舉政尤異魯恭為中牟令在事三年州舉尤異魯丕為新野令視事朞年州課第一祭肜為偃師長有權畧視事五歳縣無盗賊課為第一牟融以司徒茂才為豐令視事三年縣無獄訟吏畏而愛之治有異迹為州郡最孔奮守姑臧長詔書以奮在姑臧治有絶迹賜爵闗内侯胡紹為河内懷令政教清平為三河表陳重舉茂才除細陽令政有異化舉尤異當選為㑹稽太守劉祐除任城令兖州舉為尤異童恢為不其令青州舉尤異遷丹陽太守伏恭為劇令視事十三年以惠政公㢘聞青州舉為尤異魏張旣字徳容馮翊髙陵人舉茂才除新豐令治為三輔第一臧旻為盧奴令冀州舉尤異遷揚州刺史蜀吕義為新都綿竹令乃心隱䘏百姓稱之為一州諸城之首晉鄭袤為黎陽令吏民悦服太守班下屬城特見甄異為諸縣之最杜軫除池陽令為雍州十一郡最宋夏侯詳為新汲令治有異績豫州刺史叚佛榮班下境内為屬城表轉治中從事史南齊蕭景為永寧令治為百城最梁丘仲孚再為山隂令仲孚長于撥煩善適權變吏民敬服號稱神明治天下第一隋長孫熾建徳二年授雍州倉城令尋轉盩厔令頻宰二邑考績連最遷崤郡守劉曠開皇中為臨潁令清名善政為天下第一房恭懿開皇初為新豐令政為三輔之最房彦謙為長葛令仁壽中文帝令持節使者廵行州縣察長吏能否以彦謙為天下第一唐劉思穆為深州饒陽令與冀州信都令崔懷嶷課績居最薛珏拜試太子中允兼渭南令奏課第一間歳復以清白尤異聞路嗣恭始名劒客後歴仕郡縣有能名後授神烏令考績上下為天下最以其能賜名嗣恭裴向累為京兆府户曹轉櫟陽渭南縣令奏課皆第一朝廷亟聞其理行擢為户部員外郎王播為殿中侍御史授三原令臨所部政理修明恃勢豪門未嘗貸法歳終考課為畿邑之最冊府元龜卷七百二
