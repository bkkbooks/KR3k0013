body:
  text: 册府元龜卷四百七十八宋王欽若等撰臺省部簡傲廢職父惡漏泄簡傲直而不倨蓋存乎格言傲不可長亦載諸往誡矧夫居臺閣之任忘謙虛之美安肆自處鄙悖成風失庸行之規虧好讓之道雖曰君子其猶病諸况在中人胡足多者斯亦不仁者足以取禍深識者可以自戒矣晉衛瓘為尚書令以法御下視尚書若叅佐尚書郎若掾屬和嶠為中書令舊制監令共車入朝時荀朂為監嶠鄙朂為人以意氣加之每同乗高抗專車而坐乃使監令異車自嶠始也何綏字伯蔚曾之孫劭之子也官至侍中尚書自以繼世名貴性既輕物翰札簡傲城陽王尼見綏書疏謂人曰伯蔚居亂而矜豪乃爾豈其免乎後為東海王越所誅宋何承天為尚書左丞承天性剛愎不能屈意朝右頗以所長侮同列劉湛為給事中與殷景仁竝被任遇湛常云今世宰相何難此正可當我南陽郡漢世功曹爾張敷為秘書郎嘗在省直中書令傅亮貴宿權要聞其好學過候之敷卧不即起亮怪而去後敷為正貟外郎中書舎人狄當周赳竝管要務以敷同省名家欲詣之赳曰彼若不相容便不如勿往詎可輕行耶當曰吾等竝已貟外郎矣何憂不得共坐敷先設二牀去壁三四尺二客就席酬接甚歡既而呼左右移我逺客赳等失色而去其自標遇如此王僧達孝武時為中書令黄門郎路瓊之太后兄慶之孫也宅與僧達門竝嘗盛車服詣僧達僧達將獵已改服瓊之就坐僧達了不與語謂曰身昔門下騶人路慶之者是君何親遂焚瓊之所坐牀太后怒泣涕於帝曰我尚在而人凌之我死後乞食矣帝曰瓊之年少無事詣王僧達門見辱乃其宜耳僧達貴公子豈可以此加罪乎太后又謂帝曰我終不與王僧達俱生後竟坐死梁張稷初出吴興郡以僕射徵還道繇吴鄉人候稷者滿水陸稷單裝徑還京師人莫之識其率素如此也謝幾卿為左丞僕射省嘗議集公卿幾卿外還宿醉未醒取枕高卧傍若無人又嘗於閣省裸袒酣飲小遺下霑令史為南司所彈幾卿亦不介意任孝恭為中書通事舎人而性頗自伐以才能尚人於流軰中多有忽略世以此少之蕭子顯為吏部尚書性凝簡頗負其才氣及掌選見九流賓客不與交言但舉扇一撝而已衣冠竊恨之陳蔡凝為吏部侍郎年位未高而才地為時所重嘗端坐西齋自非素貴名流罕所交接趣時者多議焉後魏穆紹莊帝時為侍中時河南尹李奨往詣紹奨以紹郡民謂必加敬紹又恃封邑是奨國主待之不為動膝奨憚其位望致拜而還議者兩議焉北齊封孝琰為尚書左丞性頗簡傲不諧時俗意任遇漸高彌自矜誕舉動舒遲無所降屈識者鄙之崔㥄為光禄大夫仍領黄門郎㥄預義旗頗自矜縱崔瞻為銀青光禄大夫性簡傲以才地自矜所與周旋皆一時名望在御史臺嘗為宅中送食備盡珍羞别室獨飡處之自若後周王悦文帝初為散騎常侍遷授大行臺尚書後以儀同領兵還鄉里悦乆居顯職及此之還私懐怏怏猶陵駕鄉里失宗黨之情隋柳述高祖仁夀中判吏部尚書事述雖職務修理為當時所稱然不達大體暴於馭下又怙寵驕豪無所降屈楊素時方貴倖朝臣莫不讋憚述每凌侮之數於帝前面折素短判事有不合素意素或令述改述輒謂将命者曰語僕射道尚書不肯王胄為散騎常侍性踈率不倫恃才自伐鬰鬰於薄宦每負氣陵傲忽略時人為諸葛頴所嫉屢譛之於煬帝崔儦為貟外散騎侍郎越國公楊素時方貴倖重儦門地為子𤣥縱娶其女為妻聘禮甚厚親迎之始公卿滿座素令騎迎儦儦故敝其衣冠騎驢而至素推令上座儦有輕素之色禮甚倨言又不遜素忿然拂衣而起竟罷坐唐顔師古為中書侍郎性簡峭罕所推接視同儕蔑如也人亦以是少之韋陟中書令安石之子𤣥宗天寳初為吏部侍郎自以門地才業坐取三公嘗以簡貴自處當時朝貴視之蔑如也崔元翰為職方貟外郎知制誥性剛偏簡傲不能取容於時甞頗忤執政故掌制誥二年而官不遷罷職王仲舒為中書舎人初仲舒與楊慿穆質許孟容李鄘為友故時人稱楊穆許李之友仲舒以後進慕賢而入性尚簡傲不能接下以此人多怨之鄭仁表文宗朝宰相肅孫也為起居郎文筆尤稱俊㧞然恃才傲物人士薄之後唐陳乂為中書舎人微有才術嘗自恃其能及居西掖而姿態愈倨位竟不至公卿蓋器度促狹者也廢職詩有素飡之刺書垂沉湎之戒斯皆棄命廢職之謂也乃有居紳紱之列踐臺省之任或性識庸昧或材用迂濶或雅有嗜好或素多疾疹繇是忘在公之節忽盡瘁之義宴安自得弛慢無媿遂使曹事曠闕官方沸騰冐有司之糾彈罹邦家之典憲則知龜玊之毁咎将誰執當塗而下咸用論次者焉魏李豐為侍中僕射在臺閣多託疾制滿百日當解禄豐未滿百日蹔起已而復臥如是數嵗山弼為尚書郎在臺既淺事功亦雅非所長益不留意焉晉牽秀為尚書秀少在京輦見司𨽻劉毅奏事而扼腕慷慨自謂居司直之任當能激濁揚清處皷鞞之間必建將帥之勲及在常伯納言亦未曾有規獻弼違之竒也宋王敬𢎞為尚書僕射闗署文案初不省讀嘗豫聽訟文帝問以疑獄敬𢎞不對帝變色問左右何故不以訊牒副僕射敬𢎞曰臣乃得訊牒讀之正自不解帝甚不悅王球為尚書僕射素有脚疾録尚書江夏王義恭謂尚書何尚之曰當今乏才羣下宜加戮力而王球放恣如此恐宜以法糾之尚之曰球有素尚加又多疾應以淡退求之未可以文案責也猶坐白衣領職何承天為御史中丞承天素好奕棊頗用廢事文帝賜以局子承天奉表陳謝帝答曰局子之賜何必非張武之金耶殷恒為度支尚書屬父道矜疾積久為有司所奏明帝詔曰殷道矜生便有病更無横疾恒因愚習惰乆妨清序左遷散騎常侍何尚之為尚書令時徐湛之轉尚書僕射尚之以湛之國戚任遇隆重欲以朝政推之凡諸辭訴一不科省湛之亦以職官記及令文尚書令敷奏出納事無不總令缺僕射任總又以事歸尚之互相推委御史中丞袁淑奏竝免官詔曰令僕治務所寄不輕将求體當而互相推委糾之是也然故事殘舛所以致兹疑執特無所問時詳正之乃使湛之與尚之竝受辭訴尚之雖為令而以朝事悉歸湛之南齊王綸之為侍中世祖幸瑯琊城綸之與光禄大夫全景文等二十一人坐不叅承為有司所奏詔綸之親為陪侍之職而同外惰慢免官景文等贖論張緒為尚書倉部郎都令史諮詳郡縣米事緒蕭然直視不以經懐梁謝幾卿為尚書三公侍郎尋為治書侍御史舊郎官轉為此職者世謂之南奔幾卿頗失志多陳疾臺事略不復理徙為散騎侍郎陳到仲舉為左僕射叅掌選事仲舉既無學術朝章非其所長選舉引用出自袁樞性踈簡不干時務與朝市無所親狎但聚財酣飲而已後魏陸昶為光禄大夫昶無他才能唯飲酒為事張普恵為諫議大夫初任城王澄嘉賞普恵臨死啓為尚書右丞靈太后既深悼澄覧啓從之詔行之後尚書諸郎以普恵地寒不應便居管轄相與為約竝欲不復上省紛紜多日乃息北齊崔瞻為給事黃門侍郎瞻患氣兼性遲重雖居二省竟不堪敷奏杜臺卿為中書黃門侍郎兼尚書左丞省中以其耳聾多戲弄之下辭不得理者乃至大罵臺卿見其口動謂為自陳令史又故不曉喻訓對往往乖越聽者以為嗤笑王普明為尚書右僕射百餘日便謝病而退告人曰廢人飲酒安能作刀筆吏披故紙乎隋柳機高祖開皇初自華州刺史徵為納言機性寛簡有雅望然當近侍無所損益又好飲酒不親細務栁誓為内史侍郎以無吏幹去職唐韋巨源則天時歴文昌左右丞遷納言為政委碎不達大體王昻代宗時為刑部尚書專事奢靡廣修第宅多畜妓妾以逞其志在刑部雖公務有程昻耽狥私宴連日不視曹事李藩憲宗元和初為吏部郎中掌曹事為吏所蔽濫用官闕黜為著作郎李元素為御史大夫居位一無修舉大失人情周楊昭儉太祖廣順初為中書舎人多在假告少親職司勑令觧官俾遂私便蕭愿為兵部郎中性嗜酒無節職事弛慢既掌告身即覃㤙之次頗怠職司父頃為吏部尚書代愿視印篆其散率如此交惡臺省之職古今所重莫不妙選英俊以居其任若乃官聨相接出處攸同至有怙寵恃權專斷任氣逓相裁抑互構短長繇是至於諠譁盈於糾奏或遜免以避禍或誅殺以逞憾斯乃軒冕之醜行簡册之所譏至有比周之徒引繩連根懐背公死黨之信造罔上附下之􅄽是故竝牒比名連曹分置者得不疾其邪偽指其􅄽罪雖謂之交惡誠可懲也史稱忠臣不和和臣不忠良有以焉漢袁盎為中大夫素不好御史大夫鼂錯錯所居坐盎輒避盎所居坐錯亦避兩人未嘗同堂語孝景即位錯使吏案盎受吴王財物抵辠詔赦以為庻人晉任愷為侍中時賈充為尚書令愷惡充之為人也不欲令乆執朝政每裁抑焉充病之不知所為後承間言愷忠貞局正宜在東宫使䕶太子武帝從之以為太子少傅而侍中如故充計畫不行會秦雍寇擾天子以為憂愷因曰秦凉覆敗闗右騷動此誠國家之所深慮宜速鎮撫使人心有庇自非威望重臣有計略者無以康西土也帝曰誰可任者愷曰賈充其人也中書令庾純亦言之於是詔充西鎮長安傅𤣥為侍中進皇甫陶及入而抵𤣥以事與陶爭言諠譁為有司所奏二人竟坐免官謝石為散騎常侍以公事與吏部郎王恭互相短長恭甚忿恨自陳褊阨不允且疾源深固乞還私門石亦上疏遜位有司奏石輒去職免官武帝詔喻令還嵗餘不起表十餘上帝不許宋何承天文帝時為御史中丞與尚書左丞謝元素不相善二人競伺二臺之違累相糺奏太尉江夏王義恭歲給資費錢三千萬布五萬匹米七萬斛義恭素奢侈用嘗不充元嘉二十一年逆就尚書换明年資費而舊制出錢二十萬布五百匹以上竝應奏聞元輒命議以錢二百萬給太尉事發覺元乃使令史取僕射孟顗命元時新除太尉諮議叅軍未拜為承天所糾帝大怒遣元長歸田里禁錮終身元時又舉承天賣茭四百七十束與官屬求貴價承天坐白衣領職蕭惠開孝武初為黄門侍郎與侍中何偃争事偃任遇甚隆恵開不為之屈偃怒使門下推彈之恵開乃上表觧職曰陛下未炤臣愚故引叅近侍臣以職事非長故委能何偃凡諸當否不敢叅議竊見積射将軍徐冲之為偃命所黜臣愚懐謂有可申故聊設微異偃恃恩使貴欲使人靡二情便呵脅主者手定文案割落臣議專載已辭雖天炤廣臨竟未見察臣理違顔咫尺致兹壅濫則臣之受劾蓋何足悲但不順侍中臣有其咎當而行之不知何過且議之不允未有彈科省心揆天了知在宥臣不能謝諐右職改意重臣刺骨鑠金将在朝夕乞觧所忝保拙私庭時偃寵方隆繇此忤㫖别勅免恵開官南齊張岱字景山宋末為吏部時王儉為吏部侍郎專斷曹事岱每相違執及儉為宰相以此頗不相善虞玩之為黄門郎以年老致政玩之於人物好臧否宋末王儉舉貟外郎孔逷使魏玩之言論不相饒逷儉竝恨之及玩之東歸儉不出送朝廷無祖餞者其後貟外郎孔瑄就儉求會稽五官儉方盥投皂莢於地曰卿鄉俗惡虞玩之至死煩人梁張纘武帝時為尚書僕射初與叅掌何敬容意趣不協敬容居權軸賓客輻輳有過詣纘纘輒拒不前曰吾不能對何敬容殘客及是遷為讓表曰自守股肱入尸衡尺可以仰首伸眉論列是非者矣而寸衿所滯近蔽耳目深淺清濁豈有能預加以矯心飾貌酷非所閑不喜俗人與之共事此言以指敬容也後魏李順為中書侍郎太武始光初順從征蠕蠕以籌略之功為後軍将軍太武将討赫連昌謂侍中崔浩曰朕前北征李順獻䇿數事實合經略大謀今欲使總攝前驅之事卿以為何如浩對曰順智足周務實如聖㫖但臣與之婚姻深知其行然性果於去就不可專委太武乃止初浩弟娶順妹又以弟子娶順女雖二門婚媾而浩頗輕順順又弗之伏也繇是潛相猜忌故浩毁之順又從擊赫連定於平凉三秦平遷順為四部尚書甚見寵待時沮渠蒙遜以河西内附太武欲簡行人崔浩先與順有隙浩曰蒙遜稱藩欵著河右俾遐域流通殊荒畢至宜令清徳重臣奉詔褒慰尚書順即其人也太武曰順納言大臣不宜方為此使若蒙遜身執玉帛而朝於朕復何以加之浩曰邢貞使吴亦魏之太常茍事是宜無嫌於重爾日之行豈吴王入覲也太武從之以順為太常策拜蒙遜為太傅凉王後順使於凉州而沮渠蒙遜數與順游宴頗有悖慢之言恐順東還洩之以金寳納順懐中故蒙遜罪不聞崔浩知之宻言於太武太武畜怒後以事殺之及浩之誅太武怒甚謂孝伯曰卿從兄往雖誤國朕意亦未便至此繇浩譛毁朕忿遂盛殺卿從兄者浩也李冲孝文時為尚書僕射李彪之入京也孤微寡援而自立不羣以冲好士傾心宗附冲亦重其器學禮而納焉每言之於帝公私共相援益及彪為中尉兼尚書為帝知待便謂非復藉冲而更相輕背唯公坐歛袂而已無復宗敬之意也冲頗銜之後帝南征冲與吏部尚書任城王澄並以彪倨傲無禮遂禁止之奏其罪状冲手目作家人不知辭甚激切因以自劾帝覧其表歎悵者乆之既而曰道固可謂溢也李彪字道固僕射亦為滿矣冲時震怒數數責彪前後愆悖瞋目大呼投折几案盡收御史皆泥首面縛詈辱肆口冲素性溫柔而一旦暴恚遂發病荒悸言語亂錯猶扼腕呌罵稱李彪小人醫藥所不能療或謂肝臟傷裂旬有餘日而卒宋弁為黄門侍郎始孝文北都之選也尚書李冲多所參預頗抑弁弁有恨於冲而與僕射李彪交結雅相知重及彪之抗冲冲謂彪曰爾如狗爾為人所嗾及冲劾彪不至大罪者弁之力也彪除名為民韋伯昕為貟外散騎常侍自以才智優於尚書裴植嘗輕之植疾之如讐山偉為中書令外示沈厚内實矯競與左光禄大夫綦雋少甚相得晩以名位之間遂若水火北齊孫騰為侍中時京兆王愉女平原公主寡居騰欲尚之公主不許侍中封隆之無婦公主欲之騰妬隆之遂相間搆高祖啓免騰官請除外任後周楊寛為御正中大夫性通敏有器識然與司㑹中大夫栁慶不協及寛參知政事慶遂見踈忌出為萬州刺史隋柳述高祖仁壽中判吏部尚書事雖職務修理為當時所稱然不達大體暴於馭下又怙寵驕豪無所降屈僕射楊素時稱貴倖朝臣莫不讋憚述每陵侮之數於帝前面折素短判事有不合素意或令述改之述輒謂将命者曰語僕射道尚書不肯素繇是銜之唐劉文静太宗貞觀中為户部尚書自以才能幹用在僕射裴寂之右又屢有軍功而位居寂之下嘗怏怏身多在外老母在京無屋居益以不平又素輕寂為人數相侵侮每庭議多相違戾寂有所是文静必非之二人繇是有隙文静性嗜酒與其弟文起酣飲出惡言拔刀擊柱曰㑹當斬裴寂頭爾李麟為兵部侍郎時楊國忠亦為兵部侍郎欲專權不悦麟同列宰相奏麟以本官權知禮部貢舉俄而國忠為御史麟復兵部楊慎矜為御史中丞時韋堅得罪慎矜及侍御史王鉷按其事鉷推堅獄慎矜引身中立鉷恨之初慎矜嘗與鉷争職田背詈鉷詆其母氏鉷不堪其辱班宏為户部尚書副竇叅初為大理司直時宏已為刑部侍郎及叅為相領度支使帝以宏乆司國計因令為副且謂班宏曰朕以竇叅為使藉其宰相以臨遠方衆務悉委卿勿為辭也叅以宏先貴甞觧悅之私謂宏曰參後來一朝居尚書右甚不自安一年之後當歸使於公宏心喜嵗餘參不復言宏性剛愎為人間之且怒參食言於公事多與參異揚子院鹽鐡轉運之委輸也宏以御史中丞徐粲主之頗不理又以賄聞參欲代之宏執不可參又選諸知院者未嘗與宏議宏知之宻䟽參所用者過惡而奏事輒留中繇是與叅有隙無何參以使勞加吏部尚書宏進封蕭國公怒參愈甚每奉詔有所營建宏必極壯麗親程課役又厚結權幸以傾參又張滂先善於宏宏薦為司農少卿及參欲以滂分掌江淮鹽鐡問於宏宏以滂疾惡慮以法繩徐粲因毁滂曰滂強戻難制不可用滂知為宏毁深銜之參知為帝所踈懼問罪乃讓度支使遂以宏專判度支參不欲使務悉歸於宏問於京兆尹薛珏珏曰張滂與宏交惡滂剛決若分鹽鐡轉運於滂必能制宏參乃薦滂為户部侍郎鹽鐡使判轉運宏以權有所分又惡滂同事聞命氣沮乆之滂至揚州乃窮徐粲逮僕妾子姓得贜巨萬粲徙嶺表故參得罪宏頗有力焉漏洩易曰臣不宻則失身機事不宻則害成所以孔光溫樹之不言羊祜奏藁之斯毁蓋慎宻之至也其有位居臺閣職備論思忘率履於恪恭輕訓戒於兢畏預參機事既不慎於三緘漏洩王言徒有違於千里禍不旋踵何可勝言漢夏侯勝宣帝時為諌議大夫給事中嘗見出道上語入見天子而以其言為外人道之上聞而讓勝讓責也勝曰陛下所言善臣故揚之堯言布於天下至今見誦臣以為可傳故傳爾陳咸元帝時為御史中丞總領州郡奏事課第諸刺史内執法殿中公卿以下皆敬憚之是時𢎞恭死石顯代為中書令用事顓權咸頗言顯短顯等恨之時槐里令朱雲殘酷殺不辜有司舉奏未下天子未下其章也咸素善雲雲從刺候敎令上書自訟雲從咸刺探伺候事之輕重咸因教令上書於是石顯微伺知之白奏咸漏洩省中語下獄掠治掠笞擊也音力向反減死髠為城旦因廢京房元帝時為郎上中郎任良姚平願以為刺史試考功法時淮陽憲王舅張博從房受學以女妻房房與相親每朝見輒為博道其語所與天子言皆具說之也以為上意欲用房議而羣臣惡其害已故為衆所排博具從房記諸所説災異事因令房為淮陽王作求朝奏草皆持柬與淮陽王中書令石顯微伺具知之以房親近未敢言及房出守郡顯告房與張博通謀誹謗政治歸惡天子詿誤諸侯王竟徵下獄房博皆棄市晉郄𢎞為尚書左丞坐洩事免宋何承天為御史中丞遷廷尉未拜文帝欲以為吏部郎已受宻㫖承天宣漏之坐免官羊希為尚書左丞益州刺史劉瑀先為右衛將軍與府司馬何季穆共事不平季穆為尚書令建平王宏所親待屢毁瑀於宏㑹瑀出為益州奪士人妻為妾宏使希彈之瑀坐免官瑀恨希切齒有門生謝元伯往來希間瑀令訪訊被免之繇希曰此奏非我意瑀即日到宏門奉牋陳謝云聞之羊希希坐漏洩免官梁何敬容為尚書令參掌大選多漏禁中語因此嘲誚日至陳陸琛後主時為給事黄門侍郎中書舎人參掌機宻琛性頗踈坐漏洩禁中語詔賜死東魏韋鴻為中書舎人天平三年坐洩漏賜死於家畢義亮性豪踈為中書舎人天平中與舎人韋鴻坐洩宻賜盡於宅隋盧思道初仕北齊為散騎常侍直中書省以漏洩省中語出為丞相西閤祭酒元敏煬帝大業末為内史舎人而交通博徒數洩省中語唐王珪太宗貞觀中為侍中坐漏洩禁中語左遷為同州刺史杜正倫貞觀中為中書侍郎皇太子承乾先有足疾魏王泰有文才甚獲當時之譽其後太宗頗知承乾奢縱嘗與正倫言承乾不可承宗廟之意兼又稱魏王泰之美正倫嘗為左庻子後雖徙職而承乾嘗遣給事使於正倫覘候帝言正倫遂以太宗言告承乾勸其遷善以自固承乾既聞太宗詔欲廢之乃佯不信正倫遂奏其言實欲令太宗有所慙也太宗大怒正倫坐漏洩禁中語除名徙邉李乾祐為司刑太常伯嘗舉雍州司功崔擢為尚書郎事既不果私以告擢其後擢有犯遂告乾祐洩禁中語以贖罪乾祐坐免立於九成朝堂之間涷中洩卒杜景儉則天時為秋官尚書坐漏洩禁語左授司刑少卿出為并州長史道病卒張宿憲宗元和中居諫列以舊恩數召對禁中機事不宻貶郴州郴縣丞册府元龜卷四百七十八
