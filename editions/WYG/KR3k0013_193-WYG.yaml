body:
  text: 册府元龜卷一百九十三宋王欽若等撰閏位部崇祀弭災崇祀古者天子祭天地禋六宗四方山川迨夫七祀凡有功及於物徳施於下生民仰頼靈貺昭達茍非此族靡著于典故周禮之法所以馭神洪範之政厥用成教非鬼而祭謂之謟匱神乏祀必速禍聖人之制祭祀也不亦重乎雖嬴秦彊暴祠官㒺廢八神致享稍異古制孫劉跨㨿舊章克舉宋齊而下咸有司存牢具珪幣隨時損益自非至誠明徳或増慢黷者耳秦始皇二十八年東廵郡縣祠騶嶧山騶魯縣也嶧山在北東㳺海上行禮祠名山川及八神八神将自古而有之或曰太公以來作之齊所以為齊以天齊也謂其衆神異如天之復齊也其祀絶莫知起時八神一曰天主祠天齊天齊淵水居臨菑南郊山下下者下下為㝡下也臨菑城南有天齊水五泉竝出盖謂此也二曰地主祠泰山梁父盖天好隂祠之必於髙山之下畤命曰畤名其祭處曰畤也地貴陽祭之必於澤中圜丘云三曰兵主祠蚩尤在東平陸監鄉齊之西境也東平陸縣名監其縣之鄉名四曰隂主祠三山三山即下所謂三神山五曰陽主祠之罘山之罘山在東菜垂縣六曰月主祠之莱山在東莱長廣皆在齊北竝渤海七曰日主祠盛山盛山斗入海盛山在東莱不夜縣斗入海也最居齊東北陽以迎日出云八曰四時主祠琅邪在齊東北盖嵗之所始琅邪臺在渤海間謂臨海有山形如臺也皆各用牢具祠而巫祝所損益主幣雜異焉秦本記云犬戎敗幽王周東從雒邑秦襄公始封為諸侯作西畤用事上帝僣端見矣禮曰天子祭天地諸侯祭其域内名山大川今秦雜戎翟之俗先暴戾後仁義位在藩臣而僣扵郊祀君子譏焉三十七年十一月出㳺行至雲夢望祀虞舜於九嶷山浮江下觀藉舸渡海渚過丹陽至錢塘臨浙江江水至會稽山隂為淛江水波惡乃西百二十里從狭中渡盖在餘杭也上會稽祭大禹望于南海二世襲位下詔増山川百祀之禮蜀先主章武二年十月詔丞相諸葛亮營南北郊扵成都吳大帝始都武昌及建業不立郊祀至太元元年十一月始祭南郊其地今秣陵縣南十餘里郊中是也宋髙祖永初元年皇太子拜告南北郊二年正月辛酉車駕祀南郊少帝景平元年正月辛丑祠南郊文帝元嘉二年正月車駕祠南郊三年帝西征謝晦幣告南郊四年正月辛巳車駕親祠南郊六年正月辛丑車駕親祠南郊十二年正月辛未車駕親祠南郊十四年正月辛卯車駕親祠南郊二十年正月辛亥祠南郊二十六年正月辛巳車駕親祠南郊孝武帝孝建元年正月己亥朔車駕親祠南郊六月癸巳八座奏劉義宣臧質干時犯順滔天作戾戒嚴之日二郊廟祀皆已遍陳其義宜以牲告南北二郊詔可二年正月有司奏今月十五日南郊詔可三年正月車駕親祀南郊大明二年正月車駕祀南郊四年正月辛未車駕祀南郊六年正月車駕親祀南郊是日又宗祀明堂七年二月甲寅車駕廵南豫南兖二州丙辰詔曰江漢楚望咸秩同禋禮九疑扵盛唐祀蓬莱於渤海皆前載流訓烈聖遺式霍山是曰南嶽實維國鎮藴雲呈瑞羣光宋道朕竚蹕止野有事岐陽瞻睇風雲徘徊以想可遣使奠祭明帝泰始二年十月辛酉詔今九服既康百祀咸秩宜遵前典郊謁上帝有司奏考擇十一月嘉吉詔可四年正月己未車駕親祀南郊六年正月己亥詔自今可間二年一祭南郊間一年一祭明堂後廢帝元徽三年正月辛巳車駕親祠南郊明堂南齊太祖建元二年正月辛丑車駕親祀南郊武帝永明元年正月辛亥車駕祀南郊三年正月辛卯車駕祀南郊二月辛丑祀北郊九年正月辛丑車駕祀南郊鬱林王隆昌元年正月辛亥車駕祀南郊二月辛卯祀明堂東昏侯永元元年正月辛卯車駕祀南郊三年正月辛亥車駕祀南郊梁髙祖天監四年正月戊申詔曰夫禋郊饗帝至敬攸在致誠盡慤猶懼有違而徃代多令宫人縱觀兹禮帷宫廣設輜軿耀路非以仰䖍蒼昊昭感上靈屬車之間見譏前世便可自今停止是月辛亥車駕親祀南郊八年正月辛巳車駕親祀南郊九年詔曰祭祀用洗匜中水盥仍又滌爵爵以禮神宜窮精潔而一器之内親用洗手外可詳議於是御臣及三公應盥及洗爵各用一匜十年正月辛丑車駕親祀南郊二月辛酉祀明堂十二年正月辛卯車駕親祀南郊十月丁亥詔曰明堂地勢卑濕未稱乃心外可量就埤起以盡誠敬十四年正月辛亥車駕親祀南郊十六年正月辛未車駕親祀南郊十七年帝以靈威仰耀魄寳俱是天帝於壇則尊於下則卑南郊所祭天皇共五帝别有明堂之禮不煩重設又郊祀二十八宿而無十二辰神於義􅇅然於是南郊始除五帝祀加十二神座與二十八宿各於其方而為壇天監中太常丞王増崇以五祀位在北郊圓丘不宜重設帝曰五行之氣天地俱有故宜兩祀王増崇又曰風伯雨師即箕畢矣而今南郊祀箕畢二星復祭風伯雨師恐乖祀典帝曰箕畢自是二十八宿之名風伯雨師自是箕畢下𨽻雨祭非嫌十八年正月辛卯車駕親祀南郊普通二年正月辛巳車駕親祀南郊二月辛丑親祀明堂四月改作南北郊四年正月車駕親祀南郊丙午親祀明堂六年正月辛亥車駕親祀南郊大通元年正月辛未車駕親祀南郊中大通元年正月辛酉車駕親祀南郊辛巳親祀明堂三年正月辛巳車駕親祀南郊二月辛丑親祀明堂五年正月辛卯車駕親祀南郊辛亥親祀明堂大同元年二月辛巳車駕親祀明堂三年正月辛丑車駕親祀南郊五年正月辛未車駕親祀南郊七年正月辛巳車駕親祀南郊辛丑親祀明堂中大同元年二月辛巳車駕親祀明堂太清元年正月辛酉祀南郊甲子祀明堂陳髙祖永定元年即位初車駕幸鍾山祀蔣帝廟二年正月辛丑輿駕親祀南郊乙巳親祀北郊文帝天嘉元年正月辛酉車駕親祀南郊辛未親祀北郊二年正月庚戌設帷宫於南郊幣告胡公以配天辛亥車駕親祀南郊辛酉車駕親祀北郊五年五月辛巳車駕親祀北郊廢帝光大元年正月辛卯車駕親祀南郊宣帝大建元年正月辛丑車駕親祀南郊二年正月辛酉車駕親祀南郊三年二月辛巳車駕親祀明堂五年正月辛巳車駕親祀南郊二月辛丑親祀明堂九年正月辛卯車駕親祀北郊東魏孝静帝天平二年十一月祀圜丘武帝二年十一月祀圜丘北齊文宣帝天保元年既受魏禪詔分遣使人致祭於五岳四瀆其堯祠舜廟下及孔父老君等載於祀典者咸秩㒺遺二年正月辛亥有事於圜丘以神武皇帝配八年八月庚辰詔曰丘郊禘祫時祀皆仰市取少牢不得刲割有司監視必令豐備農社先蠶酒肉而已雩禖風雨司民司禄靈星雜祀果餅酒脯唯當務盡誠敬義同如在孝昭帝皇建二年正月辛亥祀圜丘武成帝河清元年正月辛巳祀南郊二年正月丁丑祭北郊後主天統二年正月辛卯祀圜丘武平二年正月己巳祀南郊梁太祖開平元年九月兩浙錢鏐奏鎮東軍神祠頗有靈驗救災祈福人民頼之特請封崇賜號為崇福侯十一月福建王審知奏閩縣界砧碕里古廟祈禱有靈鄉閭父老皆有陳請望賜封崇遂名之曰昭福廟二年正月宰臣上表請郊天謁太廟命有司擇日備儀因先布告岳牧方伯於是太常禮院選用四月二十四日有事于南郊壬寅應郊祀大禮儀仗車輅鹵簿法物祭器樂懸各令所司修飭以河南尹張宗奭充都㸃集諸司法物使三月帝以魏博鎮定助修西都宫内工役方興禮容未備其郊天謁廟宜扵秋冬别選良日七月詔曰祀典之垂有國之大事也如聞官吏慢扵展敬禮容牲饌有異精䖍宜令御史疏其條件以聞定詳禮儀使奏得太常禮院狀選用今年十一月己丑冬至有事於南郊奉勅西都宫内修造尚未畢功過此一冬方當絶手宜令于来年正月内選日申奏十一月太常禮院奏選用来年正月二十四日辛卯親祭南郊可之詔以左千牛衛上将軍胡規充南郊儀仗使金吾衛将軍趙麓充車路法物使時以執儀仗将軍輅皆武士故分二將以董之是月冬至命宰臣祀昊天上帝于圜丘三年正月乙酉詔曰初宅雒都将行郊祀應嶽瀆名山大川及諸州有靈迹封崇神祠各宜差官吏精䖍祭告是月禮儀使奏請皇帝宿齋三日庚寅親饗太祖辛卯親祀昊天上帝扵圜丘是月降雪盈尺及升壇而止三月遣宰臣薛貽矩以孟夏雩祀昊天上帝宰臣于競薦享太廟竝赴西都甲戌車駕發西都庚辰至河中府分命羣臣告祭山川靈迹七月甲戌詔曰朕自膺眷佑勉副樂推三載于兹多難未弭但䝉靈貺毎竊休徴致稼穡之有年乃隂陽之克叙昨者以災興右地叛結左馮連邠鳯之兇狂據關河之險固王師纔進逆黨生擒寸刃未施重門盡唘以致元㓙自遁道壘皆降賊除不出於浃旬兵罷匪踰於一月而况時當炎暑路渉惡山風迎馬以納凉雲随車而不雨功因㨗速而免滯留非𦕈質之敢當頼上𤣥之垂祐合申告謝用表精䖍宜令所司擇日親拜郊祀八月詔曰封岳告功前王重事祭天肆覲有國常規朕自以𦕈身恭臨大寳既功徳未敷於天下而災祥互降於域中慮於告謝之儀有闕齋䖍之禮宜修昭報用契幽通宜令中書侍郎同平章事于競徃東嶽祭拜祝訖聞奏九月詔曰秋冬之際隂雨相仍所司擇日拜郊或慮臨時妨事宜令别更擇日聞奏是月禮儀使奏今據所司申奏稱日内十一月二日冬至祀昊天上帝于圜丘今參詳十月十七日已後入十一月節十一月二日冬至一陽生之辰宜行親告之禮從之十一月癸巳朔帝齋扵内殿不視朝甲午日長至五更一㸃自大内出於文眀殿受宰臣已下起居自五鳯樓出南郊左右金吾太常兵部等司儀仗法駕鹵簿及左右内直控鶴等引從赴壇文武百官太保韓建已下班以候至帝升壇告謝是嵗降制國之大事唯祀與戎祭法所標禮經尤重其齊心必至備物精臻方感召於神祗乃降通於福祐近者所司祠祭或聞官吏因循虚破支供動多􅃜闕致隂陽之失序仍水旱以為災毎一念思實多凛若宜加提舉用復敬恭湏委元臣以専重事自今後應在京四時大小祀及諸色祭祀竝委宰臣貽矩専判躬親㸃檢無令怠墮有失典常又詔以所率官僚俸錢修文宣王廟分一半修武明王廟四年八月車駕西征次于陕命宰臣杜曉祭華岳并禱九月丁亥朔車駕幸陕府命宰臣于競赴西都祀昊天上帝于圜丘乾化元年北廵廻次孟州命散騎常侍孫隲右諫議大夫張衍光禄卿李翼各齎香合祝板告祭于孟津之望祠二年正月庚辰有司以南郊上辛祈榖命丞相趙光逢攝太尉行事弭災夫天災流行國家代有而南面之君寅威靈命側身戒懼又曷嘗不消咎徴而道善氣者自孫吳崛起保界川險劉宋乘勢再王江左迨夫朱氏垂及千􅑤其或天象謫見五行愆度旱暵昏墊風霾蟲蠧交作害物震驚下民而能䖍恭夕惕克謹天戒修補闕政申嚴祀典恵綏矜䘏稽衆詢事斯亦徃聖罪已之道春秋勤民之㫖焉吳大帝赤烏十一年二月地仍震詔曰朕以寡徳過奉先祀莅事不聰獲譴靈祗夙夜祗戒若不終日羣僚其各厲精思朕過失無有所諱宋少帝景平元年以旱詔赦五嵗以下罪人文帝元嘉五年正月詔以隂陽愆序求讜言八年三月大雩六月旱故又大雩閏六月遣使者省行獄訟簡省徭役孝武帝大明七年八月詔曰昔匹婦含怨山燋北鄙孀妻懐慟臺傾東國良以誠之所動在微必著感之所震雖厚必摧朕臨察九野志深待旦弗䏸使爛然成章各如其節遂令炎精損物陽偏不施嵗云不稔咎實朕由太官供膳宜從貶徹近道刑獄當親科省其王畿内及神州所統可遣尚書與所在共訊畿外諸州委之刺史并請省律令思存利民其考讁貿襲在大明七年以前一切勿治尤弊之家開倉賑給後廢帝元徽元年京師旱詔曰比亢序愆度留熏燿晷有傷秋稼方貽民瘼朕以𦕈疾未𢎞政道囹圄尚繁枉滯猶積夕厲晨矜毎惻于懐尚書令可與執法以下就訊衆獄使寃訟洗遂困弊昭蘇頒下州郡咸令無壅南齊武帝即位詔曰水潦為患星緯乖序京都囚擊可克日訊决諸逺獄委刺史以時察判梁髙祖大同十一年正月地震華林園光嚴殿重雲閣帝自貶拜謝上天累刻乃止陳髙祖永定三年夏久旱閏四月丙午幸鍾山祀蔣帝廟是日降雨迄于月晦宣帝大建十二年三月己卯以旱大雩壬午雨梁髙祖開平二年二月自去冬少雪春深農事方興久無時雨兼慮有災疾帝深軫下民遂命庶官遍祀于羣望掩瘞暴露令近鎮案古法以禳祈旬日乃雨五月己丑令下諸州去年有蝗蟲下子處盖前冬無雪今春亢陽致為災沴實傷壠畆必慮今秋重困稼穡自知多在荒陂榛蕪之内所在長吏各項分配地界精加翦撲以絶根本壬辰夜火星犯月太史奏災分合在荆楚乃令設武備寛刑罰恤人禁暴以禳之六月辛亥以亢陽慮時政之闕乃詔曰邇者下民䘮禮法吏舞文銓衡既失於選求州鎮又無其舉刺風俗未厚獄訟實繁職此之由上貽天譴至是决遣囚徒及戒勵中外丙寅月犯角宿帝以其分野在兖州乃令長吏治戎事設武備省獄訟恤疲病祈福禳災以順天戒三年六月己亥以久雨命官祈禱扵神祠靈迹八月甲午以秋稼將登霖雨特甚命宰臣已下禱於社稷諸祠四年五月己丑朔以連雨不止至壬辰御文明殿命宰臣分拜祠廟八月車駕西征己巳次陕府是時憫雨且命宰臣從官分禱靈迹既中而雨翌日止帝大恱九月辛丑以久雨命宰臣薛貽矩鼎門趙光逢祠嵩岳十一月戊戌詔曰自朔至今暴風未息諒惟不徳致此咎徴皇天動威罔敢不懼宜徧命祈禱副朕意焉差官分徃祠所止風乾化元年正月丙戌朔日有蝕之帝素服避殿百官守司以㳟天事明復而止庚寅制曰兩漢以来日蝕地震百官各上封事指陳得失今兹謫見當有咎徴其令列辟羣寮危言正諫三月辛夘以久旱令宰臣分禱靈迹翌日大澍雨丙子復憫雨命宰臣分徃嵩華祈禱十一月宣宰臣各赴望祠禱雨故事皆以兩省無功職事為之帝憂民重農猶以足食足兵為念爰自御極每愆陽積隂多命丞相躬其事辛丑大雨雪宰臣及文武師長各奉表賀焉十二月詔以時雪稍愆命丞相及三省官各於望祠祈禱二年正月甲申以時雪稍愆命丞相及三省官羣望祈禱二月癸丑勅曰今載春寒頗甚雨澤仍愆司天監占以夏秋必多霖潦宜令所在郡縣告喻百姓備滛雨之患三月丙午帝北廵次至濟源縣詔曰淑律將遷亢陽頗甚宜令魏州差官攪龍祈禱戊申詔曰雨澤愆期祈禱未應宜令宰臣各於魏州靈祠精加祈禱四月甲寅夕月掩心大星丙辰勅近者星辰違度式在修禳宜令兩京及宋魏州取此月至五月禁斷屠宰仍各於佛寺開建道塲以迎福應五月丁亥以彗星謫見詔兩京見禁囚徒大辟罪以下遞減一等限三日内疎理訖聞奏辛卯詔曰亢陽滋甚農事已傷宜令宰臣于競赴中嶽杜曉赴西嶽精切祈禱其近京靈廟宜委河南尹五帝壇風師雨師九宫真人委中書各差官祈之册府元龜卷一百九十三
