body:
  text: 册府元龜卷三百二十一宋王欽若等撰宰輔部器度畏慎慎宻知人禮士器度夫包荒含垢兼容虗受居不充詘動無怵廹斯君子之盛徳也若乃居廟堂之上宅台揆之任斟酌元化儀刑列辟而能恕小過忘舊惡臨敵而靡懼受寵而勿喜髙譚于危難之際忘懐於得䘮之域坐鎮浮競立安反側徳宇寛裕心量淵䆳誠足為庻尹之表式副下民之瞻望哉漢曹參為相國見人有細過掩匿覆蓋之府中無事丙吉為丞相吉馭吏嗜酒數逋蕩嘗從吉出醉嘔丞相車上西曹主吏白欲斥之吉曰以醉飽之失去士使此人將復何所容言無所容身西曹第忍之此不過汚丞相車裀耳遂不去也後漢張温為司空時邊卒韓遂為亂温衘命征討以揚武都尉陶謙字恭祖為㕘軍事接遇甚厚而謙輕其行事心懐不服及軍罷還百僚髙㑹温令謙行酒謙衆辱温温怒徙謙於邊或說温曰陶恭祖本以材畧見重於公一朝以醉飲過失不蒙容貸逺棄不毛厚徳不終四方人士安所歸望不如釋憾除恨克復初分於以逺聞徳美温然其言乃追還謙至或人謂謙曰足下輕辱三公罪自己作今蒙釋宥徳莫厚矣宜降志卑辭以謝之謙曰諾又謂温曰陶恭祖今深自罪責思在變革謝天子禮畢必詣公門公宜見之以慰其意時温於宫門見謙謙仰曰謙自謝朝廷豈為公耶温曰恭祖癡病尚未除耶遂為之置酒待之如初蜀蔣琬為丞相諸葛亮長史亮卒琬為尚書遷大將軍録尚書時新䘮元帥逺近危悚琬出類拔萃處羣僚之右既無戚容又無喜色神守舉止有如平日繇是衆望漸服東掾楊戯素性簡畧琬與言論時不應答或謂琬曰公與戯語而不見應戯之慢上不亦甚乎琬曰人心不同如其面焉面從後言古人之所誡也戯欲贊吾是耶則非其本心欲反吾言則顯吾之非是以黙然是戯之快也又督農楊敏曽毁琬曰作事憒憒誠非及前人或以白琬主者請推治敏琬曰吾實不如前人無可推也主者重據聽不推則乞問其憒憒之狀琬曰茍其不如則是事不當理事不當理則憒憒矣復何問耶後敏坐事繫獄衆人猶懼其必死琬心無適莫得免重罪其好惡存道皆此類也費禕為大將軍録尚書事延禧七年魏軍次於興勢假禕節率衆徃禦之光禄大夫來敏詣禕别求共圍棊於時羽檄交馳人馬擐甲嚴駕已訖禕與敏留意對戯色無厭倦敏曰向聊觀試君耳君信可人必能辦賊者也禕至敵遂退吳顧雍為丞相乆之呂壹秦博為中書典校詣宫府及州郡文書壹等因此漸成威福遂造作𣙜酤障管之利舉罪糾姦纎介必聞重以深按醜誣毁短大臣排陷無辜雍等皆見舉白用被譴讓後壹姦罪發露收繫廷尉雍徃斷獄壹以囚見雍和顔色問其辭狀臨出又謂壹曰君意得無欲有所道壹叩頭無言時尚書郎懐叙面詈辱壹雍責叙曰官有正法何至如此晉陳騫為大司馬與賈充石苞裴琇等俱為心膂而騫智度過之充等亦自以為不及也王戎為司徒惠帝之西遷也戎出奔於郟在危難之間親接鋒刄談笑自若未嘗有懼容時召親賔歡娛永日王導為侍中司空假節録尚書領中書監劉隗用事導漸見疎逺任真推分澹如也有識咸稱導善處興廢焉庾亮為中書令與王導受遺詔輔幼主蘇峻作逆兵至京師戰于建陽門兵敗亮乗小船西奔亂兵相剝掠亮左右射賊誤中柁工應弦而倒船上咸失色欲散亮不動容徐曰此手何可使着賊衆心乃安謝安為侍中吏部尚書受顧命桓温入赴山陵止新亭大陳兵衛將移晉室呼安及王坦之欲於坐害之坦之甚懼問計於安安神色不變曰晉祚存亡在此一行既見温坦之流汗沾衣倒執手板安從容就席坐定問温曰安聞諸侯有道守在四鄰明公何須壁後置人耶温笑曰正自不能不爾耳遂笑語移日及苻堅率衆號百萬次於淮淝京師震恐加安征討大都督安遣弟石及兄子𤣥征討𤣥入問計安夷然無懼色答曰已别有㫖既而寂然𤣥不復敢言圍棊賭别墅安嘗棊劣於𤣥山墅親朋畢集方與𤣥乃令張𤣥重請安遂命駕出是日𤣥懼便為敵手而又不勝安顧謂其甥羊曇曰以墅乞汝安遂游陟至夜乃還指授將帥各當其任𤣥等既破堅有驛書至安方對客圍棋看書既竟便攝放牀上了無喜色棊如故客問之徐答云小兒輩遂已破賊既罷還内過户限心喜甚不覺屐齒之折宋徐羡之為司空録尚書事羡之起自布衣又無學術直以志力局度一旦居宗朝野推服咸謂有宰臣之望沉宻寡言不以憂喜見色唐婁師徳為納言嘗薦狄仁傑及仁傑為宰相不知師徳薦已數排師徳令充外使則天嘗出師徳舊表示之仁傑大慙謂人曰吾為婁公所含如此方知不逮婁公逺矣師徳頗有學識器量寛厚喜怒不形於色狄仁傑天授中為地官侍郎同鳯閣鸞臺平章事則天謂曰卿在汝南時甚有善政欲知譖卿者乎仁傑謝曰陛下以臣為過臣當改之陛下眀臣無過臣之幸也若臣不知譖者並為善友臣請不知則天深加歎異裴耀卿開元中為黄門侍郎平章事充轉運使凡三年運七百萬石省脚錢三十萬貫或説耀卿請進所省脚錢以眀功利耀卿曰此蓋公家盈縮之利耳不可以之求寵也乃奏充所司和市糴等錢賈耽為右僕射同中書門下平章事每自朝居家接對賔客及暮乃止而人未嘗見其喜愠趙憬為中書侍郎平章事初亷察湖南日令狐峘崔儆並為巡屬刺史峘嘗歴中書舍人禮部侍郎儆亦乆在朝列所為或虧法令憬毎以正道制之峘儆密遣人數憬罪狀毁之於朝及憬為相拔儆自大理卿為尚書左丞峘先貶官為别駕又擢為吉州刺史時人多之周馮道仕晉平章事時奏請徵史圭為刑部侍郎鹽鐵副使圭在明宗時為右丞權判銓事道在中書嘗以堂判衡銓司所注官圭怒力争之道亦微有不足之色後道首舉圭圭方愧其度量逺不及也畏慎得寵若驚老氏攸戒先慎乎徳君子所守矧夫宰衡重任天子是毗百度羣倫罔不咸在進退語黙為衆規矩其有慎終若始執虗如盈集木思危履虎增畏預懐棟撓之懼深懲味厚之毒舉止恭遜周旋悚慄至有讓爵散財避賢自劾形于憂慮積成疾疢詔㫖敦諭時或彊起側身卑退若無所容斯蓋承榮禄之厚慙忠報之薄其君子之盛徳歟周仲山甫為宣王卿士令儀令色小心翼翼令善也翼翼然恭敬貌漢蕭何為相國素恭謹及誅韓信益封五千户令卒五百人一都尉為相國衛諸君皆賀召平獨弔曰今者淮隂新反於中有疑君心夫置衛衛君非以寵君願君讓封不受悉以家私財佐軍何從其計石慶為丞相醇謹而已元封四年關東流民二百萬口無名數者四十萬公卿議欲請徙流民於邊以實之武帝以為慶老謹不能與其議乃賜丞相告歸而按御史大夫以下議為請者慶慙不任職上書避賢者路詔報反室還家也慶素質見詔自以為得許欲上印綬掾史以為見責甚深而終以反室者醜惡之辭也或勸慶宜引决慶甚懼不知所出遂復起視事先是公孫𢎞年八十終丞相位其後李蔡嚴青翟趙周石慶公孫賀劉屈氂繼踵為丞相繼踵言相躡也自蔡至慶丞相府客館丘墟而已言不能進賢故不繕修其屋室也至賀屈氂時壞以為馬廐車庫奴婢室矣唯慶以醇謹復終相位醇厚也其餘盡伏誅云公孫賀代石慶為丞相初不受印綬頓首涕泣曰臣本邊鄙以鞍馬騎射為官材誠不任宰相帝與左右見賀悲哀感動下泣曰扶起丞相賀不肯起帝廼起去賀不得已拜出左右問其故賀曰主上賢眀臣不足以稱恐負重責從此始矣張安世昭帝時為左軍將軍與霍將軍同心輔政初安世兄賀幸于衛太子太子敗賀下蠺室後為掖庭令而宣帝養于掖庭號皇曽孫賀以舊恩養視皇曽孫甚厚及曽孫壯大賀欲以女孫妻之是時昭帝始冠長八尺二寸安世聞賀稱譽皇曽孫欲妻以女安世怒曰曽孫乃衛太子後也幸得以庻人衣服縣官足矣勿復言予女事於是賀止宣帝即位為大司馬車騎將軍領尚書事歲餘霍禹謀反夷宗族安世素心畏忌已内憂矣忌者戒盈滿之禍其女孫敬為霍氏外屬婦女孫即今所謂孫女也當相坐安世痩懼形於顔色形見也帝怪而憐之以問左右乃赦敬以慰其意安世寖恐後漢李通光武時為大司空性謙恭常欲避權勢素有消疾自為宰相謝病不視事連年乞骸骨帝每優寵之竇融為大司空自以非舊臣一旦入朝在功臣之右每召㑹進見容貌辭氣卑恭已甚帝以此愈親厚之融小心久不自安數辭讓爵位詔不許順帝時王龔為太尉在位恭慎自非公事不通州縣書記橋𤣥靈帝時為太尉謙恭下士子弟親族無在大官者劉寛為太尉嘗於坐被酒睡伏帝問太尉醉耶寛仰對曰臣不敢醉但任重責大憂心如醉帝重其言南齊陳顯逹為太尉侍中建武世心懷不安深自貶匿車乗朽敗導從鹵簿皆用羸小不過十數人北齊趙彦深為司徒嘗參機近柔温謹慎唐房𤣥齡太宗朝為尚書左僕射或時以事被譴則累日朝堂稽首請罪悚懼踖踧若無所容岑文本貞觀中遷中書令歸家有憂色其母怪而問之文本曰非勲非舊濫荷寵位責重位髙古人所懼撫已循心所以憂耳親賔有來賀者輙曰受弔不受賀婁師徳神功元年拜納言雖參知政事而深自畏避竟能以功名終為識者所重後唐趙光逢莊宗同光末平章事其弟謁問於私第嘗語及政事他日至止光逢已署其户曰請不言中書之事其清静寡慾進退存亡端然如此慎宻易曰庸行之謹又曰臣不宻則失身若夫居台鼎之位秉鈞衡之重斟酌正典財成物軌弼君之違補職之闕緝熈百志彌綸九叙固元首之同體庻尹之司南者也自非深中篤厚舉止詳慎其何以贊樞機之務成將順之美哉漢世以來宗公間作乃有嘉謀匪躬之奏退則削藁熈工救物之議外無漏言道濟於元元美歸於君上斯足以副師尹之瞻為天子之宰矣漢張安世為大司馬領尚書事職典樞機以謹慎周宻自著外内無間著眀也間隙也每定大政已决輙移病出移病謂移書言病也一曰以病而移居聞有詔令乃驚使吏之丞相府問焉自朝廷大臣莫知其與議也有郎功髙不調調選也自言安世應曰君之功髙眀主所知人臣執事何長短而自言乎絶不許已而郎果遷安世外陽拒之實令其遷後漢魯恭為三公性謙退奏議依經潛有補益然終不自顯故不以剛直為稱魏華歆為司徒性周宻舉動詳慎嘗謂人臣入陳事務以諷諫合道為貴就有所言不敢顯露故其事多不見陳羣為司空前後數宻陳得失每上封事輙削其草時人及其子弟莫能知也論者或議羣居位拱黙羣薨正始中詔撰羣臣上書以為名臣奏議朝士乃見羣諫事皆歎息焉吳顧雍為丞相時訪民間及政職所宜輙宻以聞若見納用則歸之於上不用終不宣泄大帝以此重之軍國得失行事可否自非面見口未嘗言之北齊趙彦深為司徒歴事累朝嘗參機務温柔謹慎喜怒不形於色隋髙熲開皇初拜尚書左僕射兼納言熲執政將二十年治致昇平論者以為真宰相所有竒策宻謀及損益時政熲皆削藁世無知者唐戴胄貞觀中為吏部尚書參預朝政胄雅有幹局凡所敷奏坦然可觀時政得失輙隨事封進多所補益奏便削藁繇是外無知者温彦愽貞觀中為中書令性周慎不妄交逰自掌機務杜絶賔客國之利害知無不言太宗以是嘉之楊師道為侍中參預朝政性周慎謹宻未嘗漏泄内事親友或問禁中之言乃更對以他辭嘗曰吾少窺漢史至孔光不言温室之樹每欽餘風王珪貞觀中為侍中與房𤣥齡李靖温彦愽戴胄魏徵同知國政珪所有陳說多封上而焚藁故其事不得而詳也髙士廉貞觀中為吏部尚書參預朝政俄遷尚書右僕射任遇既隆多所表奏成輙焚藁人莫知之戴至徳髙宗朝為右僕射知政事時左僕射劉仁軌每遇申訴寃滯者輙美言許之而至徳先據理難詰若有理者宻為奏之終不顯已之斷决繇是譽歸於仁軌或以問至徳答曰夫慶賞刑罰人主權柄凡為人臣者豈得與人主争權柄耶帝知而深歎美之陸元方在官清謹再為宰相則天將有遷除每先以訪之必宻封以進未嘗露其私恩臨終取前後草奏悉命焚之且曰吾隂徳及人多矣其後庻幾廣福不衰乎又有書一匣自嘗緘封家人莫有見者及卒視之乃前後勑書其慎宻如此蕭嵩為中書令兼脩國史在公慎宻人莫測也苖晉卿為侍中代宗即位年已衰暮凡歴三朝皆以慎宻見稱李晟徳宗時為司徒每嘗帝所顧問必極言匪躬盡大臣之節性沉黙未嘗泄於所親李徳裕㑹昌中為宰相於長安私第别搆起草院院有精思亭每朝廷用兵詔令制置裕獨處亭中凝然握管左右侍者無得預焉知人夫居輔相之位處台衡之重使卿大夫各任其職賢不肖咸得其所輪轅曲直適於用鳬鶴短長安於分自非識可以察言觀行眀可以望表洞裏風鑒融朗機神警悟其孰能臻於是哉稽諸舊史眇觀前載乃有知賢而奬任得士而慰薦集髦彦於公府登俊乂於朝右至於旌别淑慝預志淪敗皆可徵焉周周公從武王入殷聞有長者武王徃見之問殷所以亡長者曰王欲知之則明日請以日中為期武王與周公明日又徃要其期則不得也武王怪之周公曰吾已知之矣此君子也耻不能諫其主又以其惡告王故不忍也漢周亞夫景帝時為丞相而趙禹為丞相吏府中皆稱其廉平亞夫弗任曰極知禹無害無害言無人能勝也然文深禹持文法深刻者不可以居大府丙吉宣帝時為丞相病篤薦西河太守杜延年廷尉于定國太僕陳萬年帝皆許焉及吉薨御史大夫黄覇為丞相徵西河太守杜延年為御史大夫㑹其年老乞骸骨病免以廷尉于定國代為御史大夫黄覇薨而定國為丞相太僕陳萬年代定國為御史大夫居位皆稱吉為知人黄覇為丞相薦樂陵侯史髙可太尉天子使尚書責問覇免冠謝覇死後髙竟為大司馬史著此者亦言覇奏髙為太尉適事宜也薛宣元帝時為丞相而翟方進為司直宣知方進名儒有宰相器深結厚焉後方進竟代為丞相後漢張純為大司空選辟掾史皆知名大儒王龔順帝時為太尉其所辟命皆海内長者杜喬為太尉見荀爽稱之曰可為人師魏蔣濟為太尉時曹爽輔政司空宣王稱疾避爽正始十年正月車駕朝髙平陵宣王部勒兵馬先據武庫遂出屯雒水奏爽罪大司農桓範矯詔開平昌門南奔爽宣王謂濟曰知囊徃矣濟曰範則智矣駑馬戀棧豆爽必不得用也爽果不能納範計蜀諸葛亮為丞相時董厥為府令史亮稱之曰董令史良士也吾每與之言思慎宜適徙為主簿又關侯子興少有令聞亮深器異之弱冠為侍中中監軍又楊洪始為李嚴功曹嚴未至犍為而洪已為蜀郡洪門下書佐何祗有才策勤幹舉郡吏數年為廣漢太守時洪亦尚在蜀郡是以西土咸服亮能盡時人之器用也又亮軍向祁山姜維詣亮亮辟為掾亮與留府長史張喬參軍蔣琬書曰姜伯約忠勤時事思慮精宻考其所有永南季常諸人不如也其人凉州上士也又曰湏先教中虎歩兵五六千人姜伯約甚敏於軍事既有膽義深解兵意此人存心漢室而才兼於人畢教軍事當遣詣宫覲見主上蔣琬字公琰隨先主入蜀除廣都長先主嘗因逰觀奄至廣都見琬衆事不理時又沉醉先主大怒將加罪戮亮時為軍師將軍請曰蔣琬社稷之器非百里之才其為政以安民為本不以修飾為先願主公重加察之先主雅敬亮乃不加罪倉卒但免官而已亮又拔彭羕為治中從事羕起徒歩一朝處州人之上形色囂然自矜得遇滋甚亮雖外接待羕而内不能善屢宻言先主羕心大志廣難可保安先主既敬信亮加察羕行事意似稍疎左遷羕為江陽太守又劉巴字子初先主辟為西曹掾亮亦曰運籌策於帷幄之中吾不如子初逺矣若提枹鼓㑹軍門使百姓喜勇當與人議之耳晉陳騫武帝時為大司馬因入朝言於帝曰胡烈牽𢎞皆勇而無謀彊於自用非綏邊之材也將為國耻願陛下詳之時𢎞為揚州刺史不承順騫命帝以為不恊相搆於是徵弘既至尋復以為凉州刺史騫竊歎息以為必敗二人後果失羌戎之和皆被冦䘮没征討連歲僅而得定帝乃悔之張華惠帝時為司空皇甫重性沉果有材為華所知蔡謨為司徒甚器重杜乂嘗言於朝曰恨諸君不見杜乂也其為名流所重如此王導為司徒謝尚書善音樂愽綜衆藝導深器之比之王戎嘗呼為小安豐乃辟為掾臣欽若等曰王戎封安豐縣侯謝安為衛將軍録尚書事嘗疑劉牢之既不可獨任又知王咏之不宜專城牢之既以亂終而咏之亦以貪敗繇是識者服其知人宋王𢎞為司徒時羊𤣥保為長史𢎞甚知重之謂左長史庾登之吏部尚書王淮之曰卿二賢眀美朗識㑹悟多通然𢎞懿之望故當共推羊也南齊王儉為尚書令謂人曰徐孝嗣將來必為宰相又嘗謂中書侍郎江淹曰卿年三十五已為中書侍郎才學如此何憂不至尚書金紫所謂富貴卿自取之但問年夀何如耳淹曰不悟眀公見眷之重後魏李冲為司空時裴宣早有聲譽事母兄以孝友稱舉秀才見司空李訢與言自旦及夕訢嗟善不已冲有人倫鑒識見而重之後周元天穆為太宰時雒陽人于謹性沉深有識量屏居州里天穆見之歎曰王佐才也後為太傅大宗伯天穆為太宰屬元顥自梁入雒通直散騎常侍楊寛初與顥少相器重後從天穆赴石濟寛夜行失道後期諸將咸言寛少與北海同周旋今不來矣天穆答曰楊寛非輕於去就者也其所逗遛必有他故吾當為諸君保眀之語訖候騎白寛至天穆撫髀而笑曰吾固知其必來遽出帳迎之握其手曰是所望也即給牛三十頭車五乗綿絹一十五車羊五十口與天穆俱謁孝莊於太行唐狄仁傑為納言時桓彦範以門䕃調補右翊衛仁傑以其慷慨俊爽特相禮異嘗謂曰足下才識如是必能自致逺大尋擢授監察御史後至宰相郭子儀建中初為尚父有疾百官造問皆不屏妾婢及御史中丞盧杞來子儀速麾去侍妾獨隠几待杞杞去或問其故子儀曰彼形怪陋而心險吾左右見之必笑此人若得權吾無遺類矣杜黄裳元和初同平章事時劉闢阻兵朝議討伐黄裳以為獨任髙崇文可以成功憲宗從之崇文果破劉闢裴垍為相時崔植為大理評事秩滿退居雒下潛心經史尤精易象垍知其操行擢拜左拾遺李吉甫元和中同平章事先是叚文昌家于荆州倜儻有氣義節度使裴胄知之而不能用韋臯在蜀表授祕書郎吉甫刺忠州文昌嘗以文干之及吉甫居相位與裴垍同加奬擢授登封集賢殿校理文昌後兼相位韋處厚與裴度同平章事陳許節度使卒物議以陳許軍四征有功必自擇帥或以禁軍之將得之處厚與度議以太僕卿髙瑀深沉方雅曽刺陳蔡人懐良政又熟忠武軍情欲請用瑀事未聞陳許表至果請瑀為帥乃授檢校左散騎常侍許州刺史忠武軍節度使自大厯以來節制之除拜多出禁軍中尉凡命一帥必廣輸重賂禁軍將校當為帥者自無家財必取資於人得鎮之後則膏血疲民以償之及瑀之拜以内外公議縉紳相慶曰韋公作相債帥鮮矣後唐任圜同平章事時李愚為翰林學士圜雅相欽重屢言於樞宻使安重誨請引為同列屬孔循用事援引崔恊以塞其請後愚至宰相漢蘇逢吉為相監修國史以諫議大夫賈緯頻投文字甚知之遷史館修撰判館事禮士陸賈有言曰天下安注意相然則起館開閣夷心虛想以優士禮賢者豈欲獨厚於食客故人哉亦所以廣聰眀助教化以副股肱耳目之寄而已以薛宣之煩碎猶謂朱雲曰留我東閣可以觀四方之竒士况風采醖藉有踰於宣者也故平勃之間附㑹者不為朋比田竇之客鎮撫者多其策畫其於安危固有裨益矣若乃降車騎於里巷屈台槐以揖客啓招權納賄之路興背公死黨之譏暱近匪人隳廢衮職禁網疎濶時或優容王道清夷孰免禍敗斯亦可深戒至於休沐謝絶齪齪謹廉不能從容開宴咨諏得失括囊公府丘墟客館者又何取焉周周公相成王一沐三握髮一飯三吐哺起以待士猶恐失天下之賢人漢公孫𢎞為丞相起客館開東閣以延賢人閣者小閣也東向開之避當庭門而引賔客以别於掾史官屬也與參謀議𢎞身食一肉脫粟飯才脫粟而不精潔也故人賔客仰衣食故人平生故交禄皆以給之家無所餘王音為大司馬時揚雄年四十餘自蜀來游至京師音竒其文雅召以為門下史王根為大司馬驃騎將軍以李尋治尚書好洪範災異學天文月令隂陽根厚遇之王商為大司馬衛將軍時樓䕶為天水太守既免家長安中商罷朝欲候䕶其主簿諫將軍至尊不宜入閭巷商不聽遂徃至䕶家馬宫為大司徒陳遵為公府掾遵日出醉歸言每日出必飲也曹事數廢西曹以故事讁之按舊法令而罰之也故事有百讁者斥滿百西曹白請斥遵宫大儒優士又重遵優禮賢士尤敬重遵謂西曹此人大度士奈何以小文責之乃舉遵能治三輔劇縣補都夷令古扶風之縣後漢宋由為太尉辟何敞待以殊禮敞論議髙常引大體多所規正司徒袁安亦深敬重之楊賜為太尉愽士趙咨謝病去賜特辟使飾巾出入請與講議以幅巾為酋飾不加冠冕橋𤣥為司徒蔡邕辟𤣥府𤣥甚敬待之袁逢為司徒靈帝時漢陽趙壹舉郡上計到京師是時逢受計計吏數百人皆拜伏庭中莫敢仰視壹獨長揖而已逢望而異之令左右徃讓之曰下郡計吏而揖三公何也對曰昔酈食其長揖漢王今揖三公何遽怪哉逢則斂衽下堂執其手延置上坐因問西方事大恱顧謂坐中曰此人漢陽趙元叔也朝臣莫有過之者吾請為諸公分坐坐者皆屬觀來豔為司空好學下士開館養徒衆皇甫嵩為三公以身起於汗馬折節下士蜀諸葛亮為丞相建興二年領益州牧選迎皆妙簡舊徳以秦宓為别駕伍梁為功曹杜微為主簿微少受學於廣漢任安為劉璋從事以疾去官及先主定國微嘗稱聾閉門不出外亮以為主簿微固辭轝而致之既至亮引見微微自陳謝亮以微不聞人語於堂上與書曰伏聞徳行饑渇歴時清濁異流無縁咨覯王元泰李伯仁王文儀楊季休丁君幹李永南兄弟文仲寶等每歎髙志未見如舊猥以空虛統領貴州徳薄任重慘悸憂慮朝廷主公今年已十八天資仁敏愛徳下士天下之人思慕漢室欲與君因天順民輔此眀主以隆季興之功著勲於竹帛也以賢愚不相為謀故自割絶守勞而已不徒自屈也微自乞老病求歸亮又與書答曰曹丕篡弑自立為帝是猶土龍蒭狗之有名也欲與羣賢因其邪偽以正道滅之怪君未有相誨便還於山野丕又大興勞役以向吳楚今因不多務且以閉境勤農育養民物並治甲兵以待其挫然後伐之可使兵不戰民不勞而天下定也君但當以徳輔時耳不責君軍事何為汲汲欲去乎其敬微如此拜為諫議大夫以從其志馬謖以荆州從事隨先主入蜀加綿竹成都令越巂太守才器過人好論軍計亮深加器異以謖為參軍每見談論自晝逹夜費禕為黄門侍郎亮南征還羣僚於數十里逢迎年位多在禕右而亮特命禕同載繇是衆人莫不易觀晉張華為司空華性好人物誘進不倦至於窮賤候門之士有一介之善者便咨嗟稱咏為之延譽陸機及弟雲俱入雒造華華一見而竒之曰伐吳之役利在獲二雋遂為之延譽薦之諸公太傅楊駿辟機為祭酒轉太子洗馬尚書著作郎雲為吳王郎中令王導為揚州刺史都督中外諸軍領中書監録尚書事顧和為導從事和嘗詣導導小極對之疲睡和欲叩㑹之因謂同坐曰昔每聞族叔元公道公叶贊中宗保全江表體小不安令人喘息導覺之謂和曰卿珪璋特逹機警有鋒不徒東南之美實為海内之俊繇是知名南齊褚淵為司徒領尚書令引王僧䖍之子志為主簿謂僧䖍曰朝廷之恩本為殊特所可光榮在屈賢子淵接引賔客未嘗驕倦梁袁昻為司徒以蕭乾容止雅正性恬簡深敬重之後魏陸酈為司徙兼領太子愽士酈好學愛士嘗以講習為業其所待者皆篤行之流士多稱之北齊髙隆之為太保録尚書事欽尚文雅搢紳名流必存禮接後周宇文䕶為大冡宰引樊叔畧為中尉叔畧多計數習時事䕶委信之唐張嘉貞為中書令自中書舍人苖延嗣呂太一考功貟外郎貟嘉静殿中侍御史崔訓皆為嘉貞所引位列清要嘗在門下共議朝政時人為之語曰令公四俊苖呂貟訓李勉為宰相禮賢下士始終盡心裴度為中書侍郎平章事先是徳宗朝宰臣歸私第百官不敢及門度以方討不廷宰臣宜日接多士冀有所聞因奏請私第通賔客帝方屬意許之四方布衣盡得以策畫干丞相至今宰臣私第接士因度之請也周和凝自釋褐至台輔好延納後進士無賢不肖皆虛懐以待之或致其仕進故甚有當時之譽册府元龜卷三百二十一
