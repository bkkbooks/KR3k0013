body:
  text: 册府元龜卷六百三十二宋王欽若等撰銓選部條制第四唐武宗㑹昌元年五月中書奏州縣攝官假名求食常懐茍且不䘏疲民其州縣闕少官員今後望委本州刺史於當州諸縣官中量賢劇分配公事勾當如官員數少力實不逮處即於前資官選擇清謹有能者差攝不得取散試官充二年四月制准太和九年十二月十八日勑進士初合格並令授諸州府叅軍及𦂳縣尉未經兩考不許奏職盖以科第之人必𢎞理化黎元之弊欲使諳詳近者諸州長吏漸不遵承雖注縣官多靡使職茍從知己不念蒸民流例寖成供費不少况去年選格更改新條許本郡奏官便當府充職一人從事兩請料錢虗名吏曹正員不親本任公事其進士宜至合選年許諸道依資奏授試官充職如奏授州縣官即不在兼職之限五年七月制應在京百司官典優成授官人等既云趨吏執舉簿書優成命官須居散秩近日僣越殊紊舊規累資或至於登朝班序豈容於雜類自今已後如有改轉官宜止於中下州長馬但不能登朝事貴得體永為常式六年五月制縣令員數至廣朝廷難悉諳知吏部三銓秪慿資考訪於近日多不得人委觀察使於前資攝官内精加選擇當具薦論如後犯賍連坐所舉人及判官重加懲責宣宗大中六年正月中書門下奏應天下令錄簿掾有闕及見任見者改正委長吏舉其能者代之如舉之不當請准前後勑殿其舉主從之五月制吏部選格一曰縣令司錄錄事叅軍今任四上考减兩選餘官得四上考縣令司錄叅軍得三考並减一選二曰選人大功已上親連任停觧如已得資者依本官選數集未得資及未上並同非時選人例放選懿宗咸通十二年七月中書門下奏准今年六月十二日勑釐革諸道及在京諸司奏官并請章服事者其諸道奏州縣官司錄縣令録事叅軍或見任公事敗闕不理切要替換及前任實有勞效且見有闕員即任各舉所知毎道奏請仍不得過兩人其河東潞府邠寧涇原靈武寜夏振武天徳鄜坊滄徳易定三川等道觀察防禦等使及嶺南五管毎道毎年除令錄外許量奏簿尉及中下州判司及縣丞共三人福州不在奏州縣官限其黔中所奏州縣官及大將管内即任准舊例處分在京諸司及諸道帶職奏官或非時僉替考限未滿並却與本資官諸道節度及都團練防禦使下將校奏轉試官及憲御等令諸節度使毎年量許五人都團練防禦量許三人為定不得更於其外奏請其御史中丞已下即准勑文條䟽須有軍功方可授任自今後如顯立戰伐功勞者任具事績申奏如簡勘不虚當别具商量處分以外輙不得更有奏請其幽鎮魏三道望且准承前舊例處分勑㫖從之僖宗廣明元年正月勑吏部選人粟錯及除駮放者除身名踰濫及欠選欠考並以比逺殘闕收注哀帝天祐二年三月制曰設官分職各有司存銓衡既任於吏曹除授寧煩於宰執但所司注擬申到中書過驗酌量茍或差舛難可盡定近年除授其徒實繁占選部之闕員擇切當之優便遂使三銓注擬之間皆曠職務且以宰臣所任提舉百辟唯務公平將致無私克臻有道應天下州府令錄並委吏部三銓注擬中書門下自天祐二年四月十一日後並不除授或有諸道薦守量留據状詳度可否施行庶㡬各司其局免致繁隳宰相提綱永存事體從宰臣所奏也三年四月吏部奏比者格式申送員闕選人多有重疊皆是兩人同到本道致使磨勘之際各有爭論盖是選人指闕之時妄稱事故銓司無因得知具状須與注擬如到任替闕叅差請准舊條殿選除此外如是格式申送員闕仰且穏便去處請官不得更妄指射諸道假滿抛官不到任不放上停官不赴任員闕及違程不及限等員闕冀其畫一免悮銓司公事者制曰比者吏部注官只慿格式送闕近以諸州不申闕觧且從權指揮選人指射之時既不詳審銓司注唱之際遂使交加頗屬弊訛頻起論訟所司釐革合議允從十一月制應合赴吏部常調選人等三銓公事素有條流近年多不公平遂致授任重叠既聞争競須暫停留今者元帥梁王動静推公周旋陳理或慮選人羈旅特請准式施行兼縁已及深冬所司未有起請若或稽滯必緩程期功在考詳務令精當今年冬常調選人宜委三銓並准舊例處分如或踰濫輙違格文罪在官曹非止猾吏其四鎮管内官員須候本道申闕到省方可注擬梁太祖開平元年四月勑開封府司錄叅軍及六曹掾屬宜各置一員兩畿赤縣置令簿尉各一員二年十月勑省諸道州府六曹掾屬只留戸曹叅軍一員通判六曹乾化二年三月丙申詔曰夫興隆邦國必本於人民惠飬疲羸允資於令長茍選求之踰濫固撫理之乖違如聞吏部擬官中書除授或縁親舊處約或為勢要力干姑狥私情靡求才實念兹蠧弊宜舉條章自今已後應中書用人及吏部注擬並宜省藩身之才業騐為政之否臧必有可觀方可任用如或尚行請託猶假貨財其所司人吏等必當推窮重加懲斷有司官長别有處分後唐莊宗同光二年三月中書門下奏糾轄之任時謂外臺宰執之官古稱列爵如非朝命是廢國章近日諸道多是各例官御使指州縣請朝廷之正授樹藩鎮之私恩頗亂規程宜加條制自今後大鎮節度使管三州已上者毎年許奏管内官三人如管三州已下者許奏管内官二人仍須有課績尤異方得上聞若止於簡慎無瑕徴科及限是守常道只得書考旌善不得特有薦奏其防禦使毎年只許奏一人並無尤異不得奏薦刺史無奏薦之例不得輙亂規程更有將資官員請他處除授請之横薦最亂格文其已前事件如故違所司不得輙與通進若奏下中書亦不在施行之限是月中書門下奏賞善罰惡致理之源選才任能為政之本所在刺史縣令有政績尤異為衆所知或招復戸口能增加賦税者或辨雪寃獄能活人生命者及去害物之積弊立利人之新規有益於州縣為衆所推者即仰大處逐件分明開奏不得輙加緣飾以為浮詞據事状不虚則加奨激以勸能吏如在任貪猥誅剝生靈公事不治為政怠惰具事節聞奏勘覈不虚當加譴罰以戒慢官其州縣官任三考滿即具闕申送吏部格式候勑除銓注本道不得擅差攝官輙替正授者從之是月勑應南郊大禮六品已下行事官朕禋祀天地朝享祖宗百司各具其威儀郡吏遂䝉其置攝希因霈澤以錄微勞然而躁妄之徒經求競進叅雜之道真濫莫分勘職名則半是冗員語人數則又盈千計若無簡舉便與寵榮不惟開僥倖之門兼恐撓銓衡之務須明條例方别等差應諸司行事官並付三銓各遣取告赤考牒觧繇入仕歴子等磨勘如文書盡備只欠一選者便與依資注官欠兩選者與注同類官欠三選四選者與减一選欠五選至七選者與减兩選欠八選至十一選者與减三選一奏一除未合入選門者許自同光二年數本官選數滿日赴集其太常寺先以白身差攝本寺官應奏祠祭勞考稍深者追取元額補牒簡勘不虚即與正授如因大禮差補行事有前任官及出身者即須准諸司例追告赤磨勘其諸色黄衣欠兩選者與减一選應官資已髙不合銓司注擬者亦委子細簡勘送名中書門下如全無文書稱失墜官告勑簡勑甲又無證據只有格式公驗并諸司諸州府公慿及試授官文牒兼文書過格年月深逺者並落下所冀官無濫受恩不虚行四月三銓奏准本朝故事州府官員府置司錄叅軍外有功倉戸法兵事六曹州有錄事叅軍亦置六曹縣置令丞主簿各一員尉三員分判公事自後除兩京外都督府及州置尸法二員餘四員並省縣置令主簿各一員丞尉並省者伏以今年除本分合格選人外有郊禋行事人數絶多伏見州官事簡掾曹請依舊兩員縣局務繁佐官請添一員其間有尉無簿者請添置主簿一員其赤畿次畿並請准此除兩京外其判司只置司戸司法兩員從之八月中書奏吏部三銓門下省南曹廢置甲庫格式流外部銓等司公事並繁長定格循資格十道圖等前件格文本朝剏立簡制姦濫倫敘官資頗謂精詳乆同遵守自亂離之後巧偽滋多兼同光元年八月車駕在東京權判南曹工部員外郎盧重本司起請一卷盖以興復之始務切懐來凡有條流多失根本以至冬集起選人并南郊行事官及倍位宗子共一千三百餘人銓曹檢勘之時互相援引去留之際不絶争論若有依違必長訛濫望差權判尚書省銓左丞崔沂吏部侍郎崔貽孫給事中鄭韜光李光序吏部員外郎盧損等同詳定舊長定格循資格十道圖務令簡要可乆施行從之九月侍中郭崇韜奏臣伏見今年三銓選人并行事官等内有冐名入仕假䕃發身或卜祝之徒工商之類既淄澠之一亂諒玉石之寕分盖以偽朝已來蠧政斯乆猾吏承寛而得計非才行貨以自媒上下相䝉薰蕕同器遂使寒素者多遭排斥亷介者翻至湮沉不唯顯紊於官箴抑亦頗傷於治本近以注擬之後送省之間引驗而已有異同僣濫而果招論訟將敷至化須塞倖門臣欲請别降條䟽特行釐革許其濳相覺察互有吿陳若真偽之能分即賞罰之必舉應見注授官員等内有自無出身入仕買覔鬼名告赤及將骨肉文書楷改名姓或歴任不足妄稱失墜押彼公慿或假人䕃緒托形勢論嘱安排叅選所司随例注官者如有人陳論勘鞫不虚者元論事人特議超奬如未合格人或無名駮放者便承偽濫人所授官資其所犯人下所司簡格處分如同保人知保内有冐名濫進之謀亦許陳首若逓相盖藏被别人論告並當駮放其銓司闕頭人吏如被形勢廹脅主張踰濫選人及自己不公亦許陳首並與放罪若被人論告當行朝典兼恐見任官及諸道選人身死多有不肖子孫將出身歴任告赤貨賣與人自今後仰所在身死之處並須申報本州令錄事叅軍於告勑上分明書身死月日却分付子孫兼毎年南曹及三銓停滯多及周歲致選人廣作京債經費倍多致其到官必不亷慎此後至春來並須公事了絶若更逗留當加責罰所有懼罪逃移者仰所司具錄名姓申奏請終身勿齒兼牒本貫州縣各令知悉或有條䟽未盡處仰所司簡長定格别具條奏從之銓綜之司偽濫斯乆識者皆知不可承前未能卒除及崇韜條奏之後澄汰甚嚴或放棄田閭毁抹告赤者十七八矣議者以為惟新之始品物咸亨條奏諸蠧衆怨大作怒其苛察之甚三年八月勑諸司人吏授官從來只繫勞考年滿赴選方許離司近日已來頗隳條制到司曾無考課公事尚未諳詳便求薦論深為僥倖遂使故事都失盖繇舊人不存豈唯勞逸之罔均兼致司局之曠敗自今年除勞考滿三銓注官即許赴任非時不得奏薦如有注掌難重勞績可稱許本司奏聞當與减選或是顯然事迹在司年深齒髪祗役不任即許觧職赴任餘切依格條處分四年二月左拾遺李慎儀吏部員外王松上表云諸道州縣皆是攝官誅剝生靈漸不存濟此盖郭崇韜在中書日未詳本朝故事妄被閒人獻疑㸃簡選曹曲生異議行矯枉過直之道成欲益反損之文其選人凡闗一事闕違並是有渉踰濫或告赤欠少或文字参差保内一人不來五保皆須並廢文書一紙有悮數任皆不勘詳且自天下亂離將五十載無人不遇兵革無處不遭焚燒性命脱免者尚或甚稀文書保全者固應極少其年選人及行事官一千三百餘員得官者􅅻及數十皆以踰濫為名盡被焚毁棄逐遂令選人或斃踣於旅店或號哭於行途萬口一詞同為怨酷臣等頃曾商議堅確不㢠廻以至二年已來選人不敢赴集銓曹無人可注中書無人可除去年闕近二年授官不及六十乃致諸道皆是攝官朝廷之恩澤不行縉紳之祿秩皆廢衘寃負屈不敢申陳列局分曹莫非僥倖且攝官只自州府多因賄賂而行朝廷不知姓名所司不考課績皆無拘束得恣貪殘及有罪名又不申奏互相掩蔽無迹追㝷遂使人户流移州縣貧困日甚一日為弊轉多若不直具奏聞别為條例不惟難息時病兼且益亂國章臣等商量伏請特降勑文宣布逺邇明言徃年制置不自於宸𠂻此日焦勞特頒於睿慮兼以選曹公事情偽極多中書條疏亦恐未盡望以中書所條件及王松等所論事節并與新定選格有輕重未盡處並委銓曹子細㸃簡酌量但可以去其踰濫革彼弊訛不失本來曹永例者務在酌中以為定制别具起請諸條從之二月勑三川涇鳯秦隴等州縣官員數目極多其上佐官自少尹已下依本朝舊制各具見任員闕申奏其州判司准近制置錄事叅軍司尸司法叅軍各一員縣置縣令主簿各一員餘並停其出替選任一准三銓常式明宗天成元年四月制曰力學登第承䕃出身或欠文書浸成踰濫先遭抹毁㡬至調選無人州縣多是攝官為弊滋甚宜令三銓别為啟請止除偽濫餘復舊規七月樞密使宣㫖使府判官州縣官告勑此後宜據道數進納仍令祗候宣賜者中書奏徃例朝廷命官除將相外並不賜官告因偽朝條流凡准宣授官即特恩賜今使府判官皆許本道奏請或聞多在京師至於令錄悉是放勑後本官自於吏部出給告赤中書不更管係今若為㸃簡所授官吏器能欲令親承聖澤臣等商量自兩使判官州縣令錄在京除授者即望令於内殿謝官便辭赴任不便進納官告其判司主簿已下極是卑秩不合更許朝對勑下後望准舊例處分從之八月勑中書先條奏州縣令錄正衙後合赴内殿謝辭者如令錄是除授者宜令給事中引對如是㫖授准舊例委三銓尚書侍郎各自引對仍須前一日閤門進状勑朕以方平區宇念切蒸黎頃當災歉之餘未絶瘡痍之苦緬惟邦本實繫官常茍未致於雍熈則莫寧於宵旰必在委於良吏付以親人儻縱因循轉成勞擾先朝以選門興訟剝放極多近年以來銓注無㡬遂致諸道州縣悉是攝官既無考課之規豈守亷勤之節而况多因薦託茍狥顔情替罷不常送迎為弊殘民害物以日繫時言念所深焦勞何已宜令三京及諸道州府據見任攝官如未有正官到間且差月日錄名申奏如已後或為公事及月限已滿要行替換即須具因繇并選差攝官自來歴任姓名聞奏責免無故頻有替換如有内外臣僚輙行薦託並不得應副儻聞違越當舉憲章二年正月吏部郎中孔邈奏近見選人或以志在循陔難違色飬或以家同懸磬不辦衣裳致違調選之期遂遇廢沉之例臣愚伏請自天成元年已前有出身分明者悉許注擬况三蜀之内員闕極多俾出自於朝恩免使希於假攝三月銓司奏據南曹駮放選人累經銓及經中書門下論接准堂判具新舊過格年限分析申上者伏以選人或有出身或因除授各拘上例方赴調集多因逺地兵戈兼以私門事故遂致過格固非願為新條標在七年舊格容於千載臣等叅詳其選人過格年限伏請且依舊格不問破優停集除本選數過格十年外不在赴集之限奏勑宜依十月制曰掄選之道雖在精研調集之勞頗聞艱苦應選人内有過格年深無門叅選縱有材器難遂進趨宜令三銓磨勘行止實曽兵戈阻隔即與今年冬集判成選人例量材注官如或詐稱不在此限十二月中書門下條䟽應諸道選人等其中有過格年深無門叅選者准天成二年十月二十三日徳音並委吏部南曹磨勘如實曾阻兵戈者許令注擬如或詐稱不在此限者凡是選人專思合格不肯固踰選限自滯身名縱阻干戈須在州縣應有過格人仰吏部南曹子細磨勘曽阻兵戈州府去處或曽假攝即有随處文牒一一指實即便送銓司亦須詳先授告身攝牒及審驗年貌方可注擬三銓注擬自有常規從前或有宰臣占著好州縣員闕不令銓曹注授今年應是員闕並送曹銓候移省之時若有好闕尚在必議勘㝷其請託及受嘱人等當行黜責選人之内族類甚多經任之中資考備在應南曹判成人等仰三銓各據逐人出身入仕文書一一比驗年貌灼然不謬方與注官據長定格選人中有隠憂者殿五選伏以人倫之貴孝道為先既有負於尊親定不公於州縣有傷風教須峻條章自今後諸色官員内有隠憂冒榮者勘責不虚終身不齒所有入仕已來告勑並封付所司焚毁奏勑宜依三年正月吏部格式司状申當司先准勑及堂帖指揮應焚毁告身勘同人及失墜文書等臣伏請重給告身令先與簡勑甲如無勑甲可簡即仰取同勑甲人告身勘驗同即與出給若是本朝授官及同光元年後授勘簡同即重與告身如是偽朝授官勘簡不虚即與出給公驗便同告身例處分者伏以再給文書實為難事有司㸃簡務在周防當司近曾申堂請以合准指揮出給告身公驗旋具選人出身歴任行止牒甲庫永為應驗證明奉判准申者其所追取到選人授官勑甲或同甲勑告身勘驗既同須准前指揮出給見有勑甲者便須注出重給事繇年月日若不注破慮恐選人却將失墜告身叅選刺驗勑甲既同文書浩大所司難為一一㸃簡如是引驗同勑甲之人告身出給佗後却將失墜文書選時甲庫又無慿應驗其同勑甲人告身欲於後面連粘紙亦須使印批注仍牒報南曹要慿將來簡勘者奉勑宜依所申仍具已出給告身公驗人數姓名開奏將來更有合給者旋具申奏五月二十一日勑先准同光三年十二月二十五日勑北京及河北諸道攝官内有御署一任簡牒分明前衘先有正官告勑者便與據正官資敘依資授一任官其無正官告勑者與授黄衣初任者其兩任三任已上簡牒分明兼有正官告勑者與超資授一任官其無正官告勑只有兩任三任簡牒者與授從黄衣第二任官各令取近罷攝任處州府文觧便許非時赴選者前件攝官等當任使之際共副憂勤及開泰之期豈宜昇降凡有先皇帝御署兼朕署攝簡牒毎一任同一任正官赴選日依資注擬宜令北京及河北諸道州府知悉餘准元勑處分是月中書條奏在朝庶官有託故停官者時日稍多即却與前官百司人吏合格者並從選未合格者逐司以年勞奏薦只與勒留官凡百司長官月限將滿及已有人替不得奏薦人使改補職次諸道薦人總與不可全阻又難今後諸道節度使每年許薦二人帶使相者許薦三人團練防禦使各一人節度觀察判官並留㫖授書記已下即随府議者以為百司人吏只以年勞方得赴選今許非時薦勞以勒留官為特恩即合格之日又何為勞考哉雖使其司長將滿其奈教猱升木何此欲止之而反啟之藩侯舉知俾資共理茍得其人多亦何害如非其人患及黎庶又何以名器狥諸侯之請託而使賓佐即慮難守茍能守之即有知人之益矣是月詔州縣官以三十月為考限刺史以二十五月為限以到任日為始七月中書舍人盧詹上言曰一同分土五等命官所以字彼黎民司其輿賦至於田租桑税夏歛秋徴或㫖限不愆或簡量增羡殊非異政乃是常程竊見諸州頻奏縣令多以税輸辦集便作功勞諸道纔有表章朝廷已行恩命且徴科是縣令之職分不過合望於甄酬若一年兩度轉遷則三載六昇階級併加寵渥慮失規程伏乞止絶薦論但稽課最即銓司黜􅕾自有等差貴塞倖門以循舊制奉勑盧詹職居近侍懇述大綱案州縣之規程重國家之恩命既為允當須示聽從八月癸未中書舍人劉贊請令選人准舊制試判從之九月右諫議大夫張延雍請令南曹引驗選人正身校其年貌從之十一月勑禮部員外和凝奏應補齎郎並須引驗正身以戒冐名凡使䕃者云一任官得補一人今後改官頓轉品者即可如無嫡子即許以親姪繼院並念書十卷試可則補是月吏部郎中何澤以流外官只考勞乞不試書判從之十二月勑選門官吏訛濫者多自今後並令各錄三代家状鄉里骨肉在朝親情先於曹印署納吏部中書門下三庫各一本候得判印状即許所司給付新簽告兼本任官處及鄉里亦具一本納送州縣四年正月大理寺奏近為陵令虚稱試衘簡法以詐假論又據長定格選人無出身未曾任正員官使虚衘散試官奏授正員官及權知權判等官未得資日以諸事故觧官並立選集限勑㫖居官之榮其求甚重試攝之任所得非輕徐究根源亦闕治道自亂離已來天下州府例是攝官皆給試衘或因勘窮便闗詐假法中書雖則不可選條内其奈不無爰當大定之期宜示惟新之道已前或有稱試衘者一切不問此後並宜禁止五月詔曰凡在祿仕固有規程發身必藉於器能在任須彰於勞考否臧斯異黜􅕾並行朕自統寰區務均渥澤淹滯者皆期振舉勤恪者亦議旌酬既開進取之門遂有躁求之衆或不守選限㨗路希恩或􅅻罷官資奔波取事侵有數之員闕屈無媒之選人以此比方宜各條理自今後應前資官有出身及兩除官並可依常調赴選兼有荘宗并朕御署亦可准近勑赴選其一任除官未入選緒若無定制難以進身宜約所守官資序髙低許令同有出身人合格年限求官赴京日仍須本道申送則與除第二任官兩除後便准常調選人例如此則事有區分人無奔競如藉才器非時昇擢不在此限九月中書門下奏來年二月南郊大理應諸司寺監合行事官伏以明徳惟馨冀神靈之昭鍳作事謀始庶王道之和平前件將來行事官等既預嚴禋希霑聖澤先宜條貫免忤擬倫應合差行事官但是前資并及第黄衣及三司徴科勒㽞官充仍逐司寺監先引騐歴任告身分明則得差補若失墜文書則須得本處當時公驗不得慿諸處所給慿繇如是州縣官須見四道五道已上歴攝文牒皆是節察及直屬京防禦團練使差署乃㸃勘逐任年月逺近曾親公事及得替因繇不是虚牒則得收補其逐司合差職員官吏須是已經附奏者充不得臨時旋出虚牒將來所司磨勘如不依元指揮公然顔情互容謬妄其逐司官吏并本人並當勘責各行嚴斷從之初同光二年郊天諸寺監行事官千餘人不先引驗或以貨賂收補及行事畢銓注覆奏率皆偽濫無慿時樞密使郭崇韜在中書宰臣豆盧革韋説等共議懲革奏請焚毁塗抹其告勑偽濫者五百人一時逃竄其文書不足者乆駐京師終無所得皆相率慟哭而去士人側目以崇韜為詞然所行雖正失於不先定格式引驗俾仕進者真偽自判也今宰臣所奏既行議者以為宜之十月詔曰本朝一統之時除嶺南黔中去京地逺三年一降選補使號為南選外其餘諸道及京有司諸色選人毎年動及數千分在三銓尚書繁重近代選人每年不過數百何必以一司公事作三處官方况有格條各作資考兼又明行勑命務絶阿私宜新公共之規俾慎官常之要其諸道選人宜令三銓官員都在省署子細磨勘無違礙後即據格同商量注擬連署申奏仍不得踵前於私第注官如此則人吏易可整齊公事亦無遲滯者十一月勑應諸道見任州縣官司在任之時若時違犯本道非時衝替宜却勒赴任考滿即罷其本判官當行責罰時藩鎮帥臣不識國體妄罷邑宰欲署其假官朝廷知之故有是命也十二月戊戌勑其自陳状乞除官者所賜告身並係特恩雖舊例令本官自出價錢慮不迨者稍難送納兼知本司人吏以此為名接便更致邀頡於官估綾羅紙價外廣索價數力及者随時應副闕乏者須至淹延今後應是官告除准宣官破外其過伏乞除官并追封追贈敘封進封官告及舉人冬集綾羅紙縹軸錦袋等宜令並與官破仍勒各随色様尺寸如法装修疾速書冩印署進納是月己酉勑應諸道州府令錄等官告勑牒元是中書進納入内令閣門宣賜其判司主簿官告舊是所司發遣受恩命後赴本任地里逺近各有程限比候進納恐有停滯沉緩紙縹軸價錢近已官破今後所除州縣官告身勑牒宜令中書門下指揮不要進納並委宰臣當靣給付貴無畱滯兼免住京破費是月勑應三銓公事宜准近勑指揮仍只使吏部尚書印其東銓印並封宜付中書門下封送禮部權收管訖申奏册府元龜卷六百三十二
