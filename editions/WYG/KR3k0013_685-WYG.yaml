body:
  text: 册府元龜卷六百八十五宋王欽若等撰牧守部忠第一古人有言曰竭身命以狥國經夷險而一節者忠臣也是故公家之利知無不為儒者之寶於是乎在謂之令徳豈虛談哉繇漢以來居牧守之任者乃有明誠内孚英規外著奮志而滅敵挺躬而冒險忿大盜之肆慝糾衆而致誅察姦人之無良先事而除怨値亂而不廢貢職遭難而克敦禦備濟王師之乏困保臣節於艱虞以至強寇侵逼危城失守轉鬭冒刃遂隕厥軀王綱絶紐大事將去守義不囘因罹非命凜然生氣塞於民聽誠足以聳厲來者俾知委質之道焉漢􅁲式為齊相武帝時南粤吕嘉反式上書曰臣聞主媿臣死羣臣宜盡節其駑下者宜出財以佐軍如是則強國不犯之道也臣願與子男子男自謂其子也及臨菑習弩博昌習船者請行死之以盡臣節帝賢之下詔曰朕聞報徳以德報怨以直今天下不幸有事郡縣諸侯未有奮繇直守者也齊相雅行躬耕雅正也言其行雅正又躬耕也隨牧畜蕃輒分昆弟更造言畜牧滋多則與昆弟而更自營為也不為利惑日者北邊有興日者徃日也興謂發軍上書助官徃年西河歲惡率齊人入粟歲惡猶㓙歲也禮曰歲㓙年穀不登今又首奮雖未戰可謂義形於色矣其賜式爵關内侯黄金十斤田十頃布告天下使明知之王尊為益州刺史先是瑯琊王陽為益州刺史行部至邛郲九折阪郲山名在蜀郡嚴道縣郲音來歎曰奉先人遺體奈何數乘此險後以病去及尊為刺史至其阪問吏曰此非王陽所畏道邪吏對曰是尊叱其馭曰驅之王陽為孝子王尊為忠臣翟義為東郡太守時新都侯王莽居攝義心惡之乃謂姊子上蔡陳豐曰新都侯攝天子位號令天下故擇宗室幼稚者以為孺子依託周公輔成王之義且以觀望必代漢家其漸可見今宗室衰弱外無彊蕃天下傾首服從莫能亢扞國難吾幸得備宰相子王欽若等曰翟義丞相方進子身守大郡父子受漢厚恩義當為國討賊以安社稷欲舉兵西誅不當攝者選宗室子孫輔而立之設令時命不成死國埋名猶可以不慙於先帝埋名謂身埋而名立今欲發之乃肯從我乎乃爾也豐年十八勇壯許諾義遂與東郡都尉劉宇嚴鄉侯劉信信弟武平侯劉璜結謀及東郡王孫慶素有勇略以明兵法徵在京師義廼詐移書以重罪傳逮慶追赴獄也於是以九月都試日太守都尉令長殿丞尉會都試課最也斬觀令觀縣名音工喚切因勒其車騎材官士募郡中勇敢部署將帥嚴鄉侯信者東平王雲子也雲誅死信兄開明嗣為王薨無子而信子匡復立為王故義舉兵并東平立信為天子義自號大司馬柱天大將軍以東平王傅蘇隆為丞相中尉􅆏丹為御史大夫移檄郡國言莽矯攝尊號今天子已立共行天罰共讀曰恭郡國皆震比至山陽衆十餘萬尋為莽兵所敗後漢文齊王莽時為益州太守及公孫述據益土齊固守拒險述拘其妻子許以封侯齊遂不降聞光武即位乃間道遣使自聞蜀平徵為鎮逺將軍封成義侯伏湛更始初為平原太守時天下驚擾門下督素有氣力謀欲為湛起兵湛惡其惑衆即收斬之徇首城郭以示百姓於是吏人信向郡内以安平原一境湛所全也梁統為酒泉太守遣使隨竇融長史劉鈞詣闕奉貢願得詣行在所詔加宣德將軍光武自征隗囂統與竇融等將兵會車駕囂敗封成義侯寇恂建武初為河内太守光武北征時軍食乏恂以輦車驪駕轉輸前後不絶尚書升斗以稟百官帝數䇿書勞問耿況為上谷太守時漁陽太守彭寵反自以與況有重功而恩賞並薄數遣使要結誘況況不受輒斬其使傅燮靈帝中平中為漢陽太守金城賊王國韓遂等殺涼州刺史耿都進圍漢陽城中兵少糧盡燮猶固守時北胡騎數千隨賊攻郡皆夙懷燮恩共於城外叩頭求送燮歸鄉里子幹年十三從在官舍知燮性剛有髙義恐不能屈志以免進諫曰國家昏亂遂令大人不容於朝今天下已叛而兵不足自守鄉里羌胡先被恩德欲令棄郡而歸願必許之徐至鄉里率厲義徒見有道而輔之以濟天下言未終燮慨然而歎呼幹小字曰别成汝知吾必死邪葢聖達節次守節且殷紂之暴伯夷不食周粟而死仲尼稱其賢今朝廷不甚殷紂吾德亦豈絶伯夷世亂不能養浩然之志食禄又欲避其難乎吾行何之必死於此汝有才知勉之勉之主簿楊會吾之程嬰也幹哽咽不能復言左右皆泣下王國使故酒泉太守黄衍説燮曰成敗之事已可知矣先起上有霸王之業下成伊吕之勲天下非復漢有府君寧有意為吾屬師乎燮按劒叱衍曰若剖符之臣反為賊説耶遂麾左右進兵臨陣戰殁朱雋為河南尹董卓入關畱雋守雒陽雋與山東諸將通謀為内應既而懼為卓所襲乃棄官奔荆州卓以𢎞農楊懿為河南尹守雒陽雋聞復進兵還雒懿走雋以河南殘破軍無所􅓵乃東屯中牟移書州郡請師討卓徐州刺史陶謙遣精兵三千餘州郡稍有所給謙乃上雋行車騎將軍董卓聞之使其將李傕郭汜等數萬人屯河南拒雋逆擊為傕汜所破雋自知不敵留闕下不敢復前及董卓被誅傕汜作亂雋時猶在中牟陶謙以雋名臣數有戰功可委以大事乃與諸豪傑共推雋為大帥因移檄牧伯同討李傕等奉迎天子乃奏記於雋曰徐州刺史陶謙前揚州刺史周乾瑯琊相隂德東海相劉馗彭城相汲廉北海相孔融沛相袁忠太山太守應劭汝南太守徐璆前九江太守服䖍博士鄭𤣥等敢言之行車騎將軍河南尹幕府國家既遭董卓重以李傕郭汜之禍幼主刼執忠良殘敝長安隔絶不知吉凶是以臨官尹人縉紳有識莫不憂懼以為自非明哲雄霸之士曷能克濟禍亂自起兵已來於茲三年州郡轉相顧望未有奮擊之功而互爭私變更起疑惑謙等並共諮諏議消國難僉曰將軍君侯既文且武應運而出凡百君子靡不顒顒故相率厲簡選精悍堪能深入直指咸陽多持􅓵糧足支半歲謹同心腹委之元帥會李傕用太尉周忠尚書賈詡䇿徵雋入朝葢勲為京兆尹董卓廢少帝左將軍皇甫嵩精兵三萬屯扶風勲密相要結將以討卓會與嵩俱被徵勲以衆弱不能獨立遂並還京師陶謙為徐州刺史時董卓之亂州郡起兵天子都長安四方斷絶謙遣使間行致貢獻遷安東將軍徐州牧封溧陽侯陸康為廬江太守獻帝初天下大亂康蒙險遣孝廉計吏奉貢朝廷詔書策勞加忠義將軍秩中二千石時袁術屯兵壽春部曲饑餓遣使求委輸兵甲康以其叛逆閉門不通内修戰備將以禦之袁術大怒遣將孫䇿攻康圍城數重康固守吏士有先休假者皆遁伏還赴暮夜緣城而入受敵二年城陷月餘病卒王正為河内太守時董卓擅政正屯兵河陽津將以圖卓卓疑兵挑戰而潛使鋭卒從小平津過津北破之死者略盡孔融為北海相時袁曹方盛而融無所協附左丞黄祖者稱有意謀勸融有所結納融知袁曹終圖漢室不欲與同曹公怒而殺之徐璆為東海太守被徵當還為袁術所刼僭號欲授以上公之位璆終不為屈術死後璆得術璽致之漢朝拜衞尉太常魏華歆漢末為豫章太守為政清静不煩吏民感而愛之時揚州刺史劉繇死其衆願奉歆為主歆以為因時擅命非人臣之宜衆守之連月卒謝遣之不從游楚為隴西太守明帝太和中蜀將諸葛亮出隴右吏民騷動天水南安太守各棄郡東下楚獨據隴西召會吏民謂之曰太守無恩德今蜀兵至諸郡吏民皆以應之此爾諸卿富貴之秋也太守本為國家守郡義在必死卿諸人便可取太守頭持往吏民皆涕淚言死生當與明府同無有二心楚復言卿曹若不願我為卿畫一計今東二郡已去必將來寇但可共堅守若國家救到敵必去是為一郡守義人人獲爵寵也若官救不到蜀攻日急爾乃取太守以降未為晩也吏民遂城守而南安果將蜀兵就攻隴楚聞兵到乃遣長史馬顒出門設陣而自於城上曉謂蜀帥言卿能斷隴使東兵不上一月之中則隴西吏人不攻自服卿若不能虚自疲弊爾使顒鳴鼓擊之蜀人乃去後十餘日諸軍上隴諸葛亮破走南安天水皆坐應亮破滅兩郡守各獲重刑而楚以功封列侯長史掾屬皆賜拜明帝嘉其治詔牧聽朝引上殿吳士燮漢末為交阯太守是時天下喪亂道路斷絶而燮不廢貢職特下詔拜安遠將軍封度亭侯虞忠為宜都太守吳之亡也堅壁不降遂死之晉劉暾為司隸校尉惠帝達長安留暾守雒陽河間王顒遣使鴆羊皇后暾乃與畱臺僕射荀藩河南尹周馥等上表理后無罪顒見表大怒遣陳顔吕朗率騎五千收暾暾東奔髙密王略㑹劉根作逆略以暾為大都督加鎮軍將軍討根暾戰失利還雒至酸棗值東海王越奉迎大駕及帝還雒羊后反宫后遣使謝暾曰賴劉司隸忠誠之志得有今日暾後為太原内使趙王倫簒位假征虜將軍不受與三王共舉義劉宏為荆州刺史鎮南大將軍惠帝幸長安宏遣使受東海王越節度成都王穎南奔欲歸本國宏拒之及宏卒宏司馬郭勱欲推穎為主宏子璠追遵宏志於是墨絰率府兵討勱戰於濁水斬之㐮沔肅清初東海王越疑宏與劉喬貳於已雖下節度心未能安及宏子璠又斬勱朝廷嘉之越手書與璠贊美之張光為新平太守屬雍州刺史劉忱被密詔討河間王顒光起兵助忱忱時委任秦州刺史皇甫重重自以關西大族心每輕光謀多不用及二州軍潰為顒所擒顒謂光曰前起兵欲作何策光正色答曰但劉雍州不用鄙計故令大王得有今日也顒壯之引與歡宴彌日張髦為河南尹愍帝建興初劉聰寇河南髦死之麴特為新平太守時劉曜既據長安安定太守賈疋及諸氐羗皆送質任唯特與西平太守竺恢固守不降䕶軍麴允潁陽令梁肅自京兆南山將奔安定遇疋任子於隂密擁還臨涇推疋為平西將軍率衆五萬攻曜於長安扶風太守梁綜及特恢等亦率衆十萬㑹之曜遣劉雅趙染來拒敗績而還曜又盡長安鋭卒與諸軍戰於黄邱曜衆大敗華軼為江州刺史時天子孤危四方瓦解軼有匡天下之志每遣貢獻入雒不失臣節謂使者曰若雒都道斷可輸之瑯琊王以明吾之為司馬氏也顧衆為尚書郎大將軍王敦請為從事中郎元帝以衆補南康太守衆徑之鄱陽不過敦敦甚怪焉及敦搆逆令衆出軍衆遲囘不發敦大怒以軍期召衆還詰之聲色甚厲衆不為動容敦意漸釋後為義興太守時蘇峻反王師敗績衆還吳潛圖義舉時吳國内史庾氷奔於會稽峻以蔡謨代之前陵江將軍張悊為峻收兵於吳衆遣人喻悊悊從之衆乃遣郎中徐機告謨曰衆已潛合家兵待時而奮又與張悊尅期效節謨乃檄衆為本國督䕶揚威將軍仍舊衆從弟護軍叅軍颺為威逺將軍前鋒督護吳中人士同時響應峻遣將孔徽領甲卒五百鼓行而前衆與颺悊要擊徽戰於髙莋大破之收其軍謨以氷當還任故便去郡衆遣颺率諸軍屯無錫氷至鎮御亭恐賊從海虞道入自徃備之而賊率張健馬流攻無錫颺等大敗庾氷亦失守健等遂據吳城衆自海虞繇婁縣東倉與賊别率交戰破之義軍又集屯烏苞會稽内史王舒吳興内史虞潭並檄衆為五部大都護統諸義軍討健潭遣將姚休為衆前鋒與賊戰没衆還守紫壁時賊黨方銳義軍沮退人咸勸衆過浙江衆曰不然今保固紫壁可得全錢塘以南五縣若越他境便為寓軍控引無所非長計也臨平人范明亦謂衆曰此地險要可以制寇不可委也衆乃版明率宗黨五百人諸軍凡四千人復進討健健退于曲阿留錢宏為吳令軍次路丘即斬宏首衆住吳城遣督護朱祈等九軍與蘭陵太守李閎共守庱亭健遣馬流陶陽等徃攻之閎與祈等逆擊大破之斬首三千餘級峻平論功衆以承檄奮義推功於謨謨以衆唱謀非巳之力具表相讓論者美之司馬勲為梁州刺史守武當時後趙石季龍死中國亂雍州諸豪帥馳告勲勲率衆出駱谷壁于懸鈎去長安二百里遣部將劉煥攻長安又㧞賀城於是關中皆殺季龍太守令長以應勲勲兵少未能自固復還梁州應詹為南平太守時荆州刺史王澄假詹督南平天門武陵三郡軍事及雒陽傾覆詹攘袂流涕勸澄赴援澄使詹為檄詹下筆便成辭義壯烈見者慷慨然竟不能從也王舒明帝大寧初為廷尉從兄敦表舒為荆州刺史及敦敗敦兄含父子俱奔舒舒遣軍逆之並沈於江熊遠為會稽内史時王敦作逆沈充舉兵應之加寧逺將軍拒而不受不輸軍資於充保境安衆為務敦至石頭諷朝廷徵逺乃拜太常卿謝邈為吳興太守孫恩之亂為賊胡桀郜驃等所執害之賊逼令北面邈厲聲曰我不得罪天子何北靣之有遂害之江績為南郡相會荆州刺史殷仲堪舉兵以應王恭仲堪要績與南蠻校尉殷覬同行並不從仲堪等屢以為言績終不為之屈覬慮績及禍乃於仲堪坐和解之績曰大丈夫何至以死相脅江仲元行年六十未知獲死所爾一坐皆為之懼仲堪憚其堅正以楊佺期代之朝廷聞而徵績為御史中丞辛恭靖為河南太守會姚興來寇恭靖固守百餘日以無救而陷被執至長安引見興而不拜興曰朕將任卿以東南之事恭靖曰我寧為國家鬼不為羌賊臣興怒幽之别室經三年至元興中誑守者乃踰垣而遁歸於江東安帝嘉之宋王鎮之晉末為安城太守及桓元敗將苻宏寇亂郡境鎮之拒戰彌年子弟五人並臨陣見殺杜瑗晉末為交州刺史時盧循竊據廣州遣使通好瑗斬之劉䖍之晉末為髙夏相髙祖西征司馬休之魯宗之等遣將軍檀道濟朱超石步騎出㐮陽䖍之率府郡兵力出溳城屯三連立橋聚糧以待道濟等積日不至為宗之子軌所襲衆寡不敵叅軍孫長庸流涕勸退軍䖍之厲色曰我仗順伐罪理無不克如其不幸命也戰敗見殺禇叔度為廣州刺史時髙祖征劉毅叔度遣三千人過嶺荆州平乃還張邵為湘州刺史時謝晦反遺書要邵邵不發亟馳使呈髙祖杜宏文為交州刺史文帝元嘉四年以廷尉王徽代之宏文就徵會得重疾牽以就路親舊見其患篤勸表待病愈宏文曰吾世荷皇恩仗節三世嘗欲投軀帝庭以報所荷況親被徵命而可晏然者乎如其顛沛此乃命也宏文母既年老見宏文輿疾就路不忍分别相與俱行到廣州遂卒臨死遣弟宏獻詣京朝廷甚哀之王僧達為宣州太守時魏軍來逼都邑危懼僧達求入衞京師見許賊退又除宣城太守頃之徙任義興及元凶弑立孝武入討普檄諸州郡又符郡發兵僧達未知所從客説之曰方今釁逆滔天古今未有為君之計莫若承義師之檄移告旁郡使工言之士明示禍福茍在有心誰不響應此䇿之上也如其不能可躬率向義之徒詳擇水陸之便致身南歸亦其次也僧達乃自間道南奔逢孝武於鵲頭即命為長史加征虜將軍初孝武發尋陽沈慶之謂人曰王僧達必來赴義人問其所以慶之曰虜馬飲江王出赴難見在先帝前議論開張執義明決以此言之其至必也帝即位以為尚書右僕射臧質為雍州刺史元凶劭弑立質家遣門生師顗報質質疏顗所言馳告司空義宣又遣州祭酒從事田穎起銜命報孝武率衆五千馳下討逆自陽口進江陵義宣質諸子在都邑聞舉義並逃亡劭欲相慰恱乃下書曰臧敦等無因自駭急便竄逸迷昧過甚良可怪歎質國戚勲臣忠誠篤亮方當顯位贊翼京輦而子弟波迸傷其乃懷可遣宣譬令還咸復本位劭尋録得敦使大將軍義恭行杖三十厚給賜之義宣得報質即日舉兵馳信報孝武板進質號征北將軍質逕赴潯陽與孝武同下蕭思話為徐兖二州刺史元凶搆逆思話即率部曲還彭城起義以應孝武遣使奉牋曰下官近在歴下始奉國諱所承使人不知濶狹既還在路漸有所聞猶謂人倫無容有此私懷感慨未敢載言奉被今教果出慮表重增哀惋不能自勝此實天地所不覆載人神所不容忍率土臣民莫不憤咽況下官蒙荷榮渥義兼嘗志此月五日被驛使追命騎還朝切齒拊心輒已種疾雖百口在都一非所顧正欲遣啓受規略會奉令㫖悲懼兼情伏承司徒英圖電發殿下神武霜斷臧質忠䖍並到不謀同時仗順沿流席卷江甸前驅風邁已應在近下官復練始集遣輔國將軍申垣龍驤將軍梁坦二軍分配精甲五千申垣為統便以即日水陸齊下下官悉率文武絡繹繼發慿威䇿懦勢同振朽開泰有期悲欣交集孝武至新亭坦亦進克京口坦護之為寧逺將軍冀州刺史孝建元年南都王義宣反兖州刺史徐遺寶護之妻弟也遠相連結與護之書勸使同逆護之馳使以聞遺寶時戍湖陸護之畱子恭祖守歴城自率步騎襲遺寶道經鄒山破其别戍未至湖陸六十里遺寶焚城西走劉延孫鎮京口南兖州刺史竟陵王誕有罪不受徵延孫馳遣中兵叅軍杜幼文率兵起討既至誕已閉城自守乃遣還誕使劉公泰齎書要之延孫斬公泰送首京師梁曠為山陽内史時竟陵王誕舉兵反曠家在廣陵誕執其妻子遣使要曠曠斬使拒誕誕怒滅其家劉懷珍為河間太守時竟陵王誕反郡人王弼族甚盛勸懷珍起兵助誕懷珍殺之帝嘉其誠除豫章王子弼車騎叅軍冊府元龜卷六百八十五
