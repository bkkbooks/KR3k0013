body:
  text: 册府元龜卷九百八十七宋王欽若等撰外臣部征討第六唐肅宗上元元年六月桂州經畧使奏破管内西原蠻賊二十萬衆斬獲大賊帥黄乾曜等九人是月鳯翔節度崔光逺奏破涇州隴州等界羌渾黨項等十餘萬衆又於普潤縣界破黨項四千餘衆斬二千級生擒一百餘人收獲駝馬牛羊噐械等不可勝數乾元元年九月招討黨項使王仲升斬黨項首領拓㧞戎徳等十人傳首闕下代宗廣徳二年九月劔南節度使嚴武破吐蕃七萬餘衆抜其當狗城十月嚴武又㧞吐蕃鹽州城是月吐蕃冦邠州􅃋方兵馬使左散騎常侍郭晞遣馬歩三千於邠州西夜斬賊營殺千餘人生擒八十三人俘大將四人馬四百匹永泰元年九月吐蕃大將尚結息賛磨尚息東賛及馬重英等十萬衆冦奉天醴泉等縣大掠居人男女數萬計焚廬舎而去同華節度周智光以兵追撃于澄城破賊萬計十月闗内副元帥郭子儀先鋒白元光合回紇軍擊吐蕃之衆於靈臺縣之西原斬首五萬級俘獲人畜凡二百里不絶大歴二年九月吐蕃冦靈州進冦涇州副元帥郭子儀率兵三萬鎮涇陽十月靈州破吐蕃二萬三年八月吐蕃冦靈武進冦邠州邠寧節度馬璘破三萬衆九月靈州將白元光破吐蕃二萬於靈武是月郭子儀破吐蕃六萬餘衆於靈州十二月劔南西川破吐蕃萬餘衆八年十月吐蕃冦涇邠等州副元帥郭子儀遣先鋒將渾瑊與吐蕃戰于宜禄不利村墅居人為吐蕃驅掠去者凢千餘人是夜瑊收合散卒襲賊營㑹涇原節度使馬璘又襲賊輜重殺賊凢數千人賊遂潰十年正月劔南西川節度使崔寜奏破吐蕃數萬於西川斬首萬級生擒數千獲馬牛數千頭匹十一年正月崔寜上言大破吐蕃故洪等四節度兼突厥吐渾氏蠻羌黨項等二十餘萬衆斬首萬餘級生擒首領一千三百五十人獻功闕下十二年十二月崔寧奏於西山大破三路及攻南吐蕃十萬餘衆斬首八千生擒九百人十三年四月吐蕃冦靈州朔方留後常謙光擊敗之徳宗以大歴十四年五月即位十月吐蕃率南蠻衆十萬来冦一入茂州過汶川及灌口一入扶文過方維白塡山一自黎雅過卭峡闗連䧟郡邑乃發禁兵四千人及幽州兵五千人同討大破之貞元二年十月鳯翔節度使李晟以吐蕃侵軼遣兵襲其摧沙壁大破之焚其儲積斬蕃酋扈屈律悉蒙等七人傳首京師五年十月劔南節度使韋臯遣將王有道等與東蠻两林苴那時勿鄧夢衝等帥兵於故嶲州臺北谷大破吐蕃青海臘城二節度殺其大兵馬使乞臧遮悉多楊朱斬首二千餘級其投崔谷赴水死者不可勝數生擒籠官四十五人收獲噐械一萬餘事馬牛羊一萬餘頭匹遮遮者吐蕃之驍勇者也􅂉云尚結賛之子頻為邊患自其死也官軍所攻城栅無不降下蕃衆日却數年間盡復嶲州之􅃇境也八年十一月山南西道節度嚴震擊破吐蕃於芳州及黒水堡焚其積聚并獻首虜九年四月劔南西川節度韋臯遣兵出西山破吐蕃峨和城定廉城通鶴軍凡平堡五十餘所獲首虜噐械旗幟牛馬獻於闕下十年六月韋臯奏西山峨和城擊破吐蕃三萬又出兵黎雅以㧞雲南收吐蕃栅城斬首三千八百級生虜及降吐蕃二百四十人得其噐械牛馬十一年四月幽州節度劉濟奏大破奚王啜剌等六萬餘衆十二年三月韋臯奏收降蠻七千戸得吐蕃所賜金字告身五十五片十三年五月吐蕃於劔南馬領三處開路進軍逼䑓登城嶲州刺史曺髙任率領諸軍將士并東蠻子弟大破之生擒大籠官七人陣上殺獲三百餘人被刀箭傷者不可勝數收獲馬畜五百餘頭匹噐械二千餘事十四年十月夏州節度使韓全義破吐蕃於鹽州西北十七年九月西川韋臯奏大破吐蕃於維州擒其相論莽熱来獻賜崇仁里宅以居之初吐蕃冦靈􅃋䧟麟州詔韋臯出兵成都西山以紓北邊臯遂使鎮静軍使陳洎等三萬人出三竒路威武軍兵馬使崔堯臣率兵一千出龍谿石門路南維州保州兵馬使仇冕并保覇两州刺史董振等率兵二千進逼吐蕃維州城中北路兵馬使邢玭并諸州刺史董懐愕等帥兵四千進攻吐蕃棲鷄老翁等城都將髙倜王天俊等率兵二千進逼故松州隴東路兵馬使元膺并諸州郝宗等復分兵八千出南路雅卭黎嶲路又令卭州鎮南軍使御史大夫韋良金發鎮兵一千三百進軍雅州經畧使路惟明與三部落主趙日進等率兵三千進攻吐蕃逋租偏松等城黎州經略使王有道率三部落主郝全信等兵二千過大渡河深入吐蕃界嶲州經略使陳孝陽與行營兵馬使何大海韋義等及磨些蠻三部落主苴郡時等率兵四千進攻昆明諾濟城自八月至于十二月累破十六萬衆㧞其七城五軍鎮受降三千餘人擒生口六千餘人斬首一萬餘級遂進圍維州救軍再至轉戰千餘里吐蕃連靈朔之冦引衆南下於是賛普遣莽熱以内大相兼東境五道節度兵馬都統羣牧大使率雜虜十萬衆来觧維州之圍王師萬餘衆據險設伏以待之先以一千人挑戰莽熱見我師之少也悉衆来追入于伏中諸將四面疾擊遂擒莽熱虜衆大潰憲宗元和四年八月安南都護張丹奏破環王國偽號驩愛州都統三萬餘人及獲王子五十九人噐械戰象等稱之十三年十月靈武奏於定逺城破吐蕃三萬人殺戮二千人獲羊馬甚衆是月平凉鎮遏使郝玭破三萬餘衆收復原州城獲羊馬不知其數夏州節度使田縉於靈武亦破三千餘人十一月夏州奏破吐蕃五萬靈武奏攻破吐蕃長樂州羅城焚其屋宇噐械西川節度王播攻㧞峨和棲鷄等城十四年十月靈武奏大将史奉敬大破吐蕃於鹽州城下穆宗以元和十五年正月即位十月吐蕃冦涇州命左軍中尉梁守謙充左右神策京西京北行營都監神策兵四千人并發八鎮全軍往討之十一月夏州節度使李祐奏准詔自領兵赴長澤鎮討吐蕃靈武節度使李聦奏自領兵赴長樂州討吐蕃長慶元年六月吐蕃犯青塞堡以國家與廻鶻和親故也鹽州刺史李文恱發兵擊退之二年七月靈武節度使李進誠上言於鹽州界追殺吐蕃三百餘人文宗太和三年十二月南蠻逼戎州遣使起荆南鄂岳湘鄧陳許等道兵擊之是月卭州為蠻所䧟以右領軍大將軍董重質充西川監討蠻使又命中使往太原鳯翔宣取兵馬赴西川己丑内出陌刀七百口錐突七百具遞西川是月也軍抽退四年四月幽州節度使李載義上言今月三日發兵入奚界殺奚賊五千餘人生擒刺史縣令大將首領等二百七十三人武宗㑹昌二年二月囘鶻冦天徳以振武麟勝節度劉沔為河東節度以太原之師討之八月囘鶻烏介可汗過天徳至把頭峰北薦掠雲朔北州乃徴發許蔡汴滑等六鎮之師以劉沔為囘鶻南面招討使以張仲武為囘鶻東面招討使以李思忠為河西黨項都將囘鶻西南面招討使皆㑹軍於太原又詔太原起室韋沙陀三部落吐渾諸部委石雄為前鋒易定兵千人守大同軍契苾通何請河鎮沙陀吐渾六千騎赴天徳李思忠並囘鶻黨項之師屯于大栅三年二月劉沔奏諸將大破囘鶻於殺胡山巳迎得太和公主其烏介可汗被瘡而走方議收於殺制曰其囘鶻既已破滅義在剪除宜令諸道兵馬便同進討是時囘鶻有赤心宰相一族東逼漁陽張仲武乃與從弟公素率其部下勁兵三萬人大破之收其侯王貴族千餘人降三萬餘人戸牛馬槖駝㫋墻􅄢幕不勝計尋遣従事李周曈牙門将國従玘相次獻㨗先是奚契丹皆有囘鶻監護使督以嵗貢且為漢諜事至是仲武遣神將石公緒等論意凡戮八百餘人又囘鶻初遣宣門將軍等四十七人来偵欲敺雜虜遂逗留其使緩彼師期人病馬死竟不遣之囘鶻烏介可汗既敗近邉乃依康居求活盡従餘種寄託于黒車子仲武繇是威加北狄又繼以詞㫖諭其諸戎黒車子後殺烏介可汗宣宗大中元年春幽州大破奚衆懿宗咸通五年四月南蠻冦邕管以秦州經畧使髙駢率禁軍五千赴邕管㑹諸道之師討之尋以駢為安南都䕶六年秋髙駢自海門進軍破蠻軍收復安南府先是李琢為安南都䕶虐賊夷獠人多怨叛遂詔將軍合勢攻安南䧟之累命將帥未能收復及駢至合五管之兵朞年之内招懐谿洞誅其首惡一戰而蠻卒遁去收復交州郡邑十年十一月南詔蠻驃信綽酋龍率衆二十萬冦嶲州定方軍節度都頭安再榮守清溪闗為賊所攻再榮退保大渡河北去清溪闗二百里隔水相射凡九日八夜定邊軍節度使竇滂勒兵拒之十二月驃信遣清平官十餘人来偽和與竇滂語次蠻軍舩栰競渡忠武武寜軍兵士結陣抗之接戰自午及申蠻軍稍却竇滂懼自縊于帳中徐州將苗全緒觧之謂滂曰都統何至於是但安心全緒與再榮宏節等血戰取勝全緒三人率兵而出滂乃單騎宵遁其夜蠻軍營於山下全緒等謀曰彼衆我寡若明日對陣吾屬盡矣可夜擊之令其軍亂我自觧去忠武武寜之師乃夜入蠻軍弓弩亂發蠻衆大駭全緒等三將保軍而去蠻軍乗勝進攻西川城朝廷以顔慶復為大渡河制置劔南應接節度使宋威為行營都知兵馬使將兵數萬與忠武武寧之師合與蠻軍戰于漢州之毗橋大㨗觧西川之圍明日蠻軍遁走两川平僖宗乾符元年冬南詔蠻冦西蜀詔河東河西山南西道東川徴兵赴援西川節度使髙駢奏奉勅抽發長武鄜州河東等道兵士赴劔南行營者伏以西川新軍舊軍差到已衆况蠻蜒小醜必易枝梧今以道路﨑嶇館驛窮困更有軍頓立見流移所為望一處完全而百處俱破且兵不在衆而在於和其左神䇿長武鎮麟州河東所抽甲兵人數不少况備辦軍食費損尤多又縁三道藩鎮盡振羌戎邉鄙未寜望不差發如己在路道並請降勅勒囘詔荅曰蠻蜒如尚憑陵固湏倍兵禦敵若巳奔退即要併力追擒方籍北軍助平南冦其三處兵士宜委髙駢候到蜀日分布驅使且務多多之辦寜辭整整之師其河東一千二百人令竇澣不要差發時駢扞蠻已退長武兵士竟至蜀而還議者惜其勞費而虚􅌽出入之賞也後唐荘宗初為晉王天祐十三年八月契丹阿保機率諸部號稱百萬自麟勝䧟振武長驅雲􅃋北邉大擾帝親赴援於代北虜衆方退十八年十二月契丹阿保機冦幽州節度使李紹宏帥士固守契丹引衆而南攻涿州圍逼十餘日䧟之契丹冦定州王都遣使告急御親軍赴之十九年正月甲午帝御親軍五千進擊契丹至新城南探報契丹前鋒三千騎宿於新樂渡沙河而南矣帝令前鋒偵契丹所至報云渡沙河矣軍中相顧失色咸欲釋鎮州之圍班師于魏以避契丹俟其還塞再議進軍諸将上言曰今北戎舉國入冦我師既寡難與争鋒又聞汴賊内侵鄴中危急儻有差跌吾何所歸宜且旋師魏州徐圗勝負帝曰古者覇王舉事自有天道漢祖不亡於冐頓周宣詎伏於獯戎時事在吾比於無患且武徳中突利頡利二可汗率衆三十餘萬侵冦闗内髙祖欲播棄長安徙居樊鄧文皇帝諌曰獫狁孔熾作患中華自古有之非獨今也周漢並有兹患未聞還移都邑霍去病漢廷之將帥耳猶且志滅匈奴若聼臣微效不數年之間必係單于之頸自後頡利二可汗部落束身闕下為宿衛之人今吾以數萬之衆底定山東張文禮厮僕小人非吾所敵阿保機潼中勇切酪賤類唯利是求犯難而来其強易弱一逢挫敗奔走無路爾曹軰但垂馬同行看吾破賊帝乃率鐡騎五千精甲曜日至新城北半出桑林契丹萬餘騎遽見我軍惶駭而退帝乃分軍為二廣乗之躡數千里獲其大将一人即機之子其衆益恐時沙河氷薄橋道甚狹虜騎軍無行次相踐而過䧟溺人馬帝際晚追襲宿于新樂阿保機車帳方在定州敗兵夜至㧞族而遁保于望都帝軍次定州王都迎謁言詞懇切是夜宿于開元寺来日帝引軍趨望都契丹逆戰帝身先騎士馳擊數四虜騎退而結陣我徙兵陣於水次俄而帝與李嗣昭躍馬交戰賊騎大潰俘斬數千級獲其酋長數十追擊至於易州所獲氊車毳幕羊馬不可勝紀時自正月􅃋雪平地五尺賊芻粟已竭人馬踣死於積雪中纍纍不絶帝乗勝追襲至幽州而還時獲賊中人言阿保機之来盖取信於王郁初郁說保機曰臣父處直使愚布欵鎮州金城湯池玉帛山積燕姬趙女充牣其中俟君一到不屬佗人如不時至必為晋人所有保機躍馬將進其妻曰我有牛馬娱樂西樓足可娛樂育兒孫何更逺離鄉土我聞晋人無敵兵强天下事一不測後悔何追保機曰張文禮有金玉百萬留待皇后當率騎同取非有他患遂傾部落而来既遇挫敗狼狽而旋保機繫王郁責譲自是不聼其謀妻亦譲保機曰聼狂口貪貨財稱其敗也保機亦大慙同光二年正月契丹冦瓦橋闗以天平軍節度使李嗣源為北面行營招討使陕州留後霍彦威為副率軍討之是月契丹還五月幽州上言契丹阿保機将冦河􅃋以滄州節度使李紹斌為東北面招討使以兖州節度使李紹欽為副招討使以宣徽使李紹宏為招討都監率大軍渡河而北十二月契丹冦幽州以宣武軍節度使李嗣源部署大軍北征三年正月李嗣源上言於涿州東南殺敗契丹生擒首領三十人遣人告㨗是月嗣源送所獲契丹俘囚首領衢多等八人斬於應天門外明宗天成二年四月幽州節度使趙徳均令衙校常玉破奚於檀州斬首百餘級奪漢民四十擒生奚二三年四月定州王都作亂求援於契丹耶律徳光遂䧟平州遣秃餒以騎五千援都於中山北面行營招討使王晏球破之於繇陽秃餧走保賊城六月幽州趙徳均奏殺契丹百餘人於幽州之東奪馬六百匹是月詔王晏球攻取定州詔逵怛及諸蕃東入契丹界以張軍勢七月契丹遣楊隠率七千騎救定州招討使王晏球逆戰於唐河大破之幽州趙徳均以生兵接於西路生擒首領楊隠等五十餘人接殺皆盡契丹强盛僅三十年雄據北戍諸蕃䑕伏屢為邉患漢兵甞憚之前後戰争罕得其利是役也曲陽之敗已失下騎唐河之陣兵號七千潰敗之後溝渠之益官軍襲殺人不暇食秋雨繼降泥濘莫進人飢馬乏散投村落所在村人持白挺毆之徳均生兵接於要路惟竒峯嶺北有棄馬潜遁脫者數十餘無噍類帝致書諭其本國皇威大振是月殿直崔處納押契丹偽平州刺史羽厥律以下一百七十人至内十七人有骨肉識認餘分於两橋斬之閏八月幽州趙德均獻俘於行闕蕃将楊隐等五十人留於親衛鮮卑六百人皆斬之四年二月定州王都平擒禿餧及餘衆斬之自是契丹大挫數年不敢窺邉十二月靈武康福奏方其渠北掩殺野利大䖝两族三百餘帳牛羊二萬計長興元年四月雲州奏掩殺契丹吐渾突厥等斬首級四十六獲契丹副行首尼列以下十人牛羊駝馬萬計三年正月遣邠州節度使藥彦稠靈武節度使康福等率歩騎七千往方渠鎮討黨項之叛命者二月康福奏賀蘭山下蕃部數百帳順命者撫之其背叛者見除討次所獲駝馬牛羊數千計是月樂彦稠奏誅黨項河埋三族韋悉褒勒疆賴埋厮骨尾各一族屈悉保三族計十族得七百餘人黒玉一團七月靈武奏夏州黨項七百騎侵擾當道出師逆戰敗之生擒首領以下五十騎追至賀蘭山下掩擊之末帝清泰元年七月己巳囘鶻朝貢多為河西雜虜剽掠詔邠州節度使康福遣将軍牛知柔率禁兵援送至靈武虜之為患者随便討之十二月北面討使使河東節度使石敬塘晋髙祖送擒獲契丹首領来海金等至京師二年北靣總管奏雲州殺退契丹具籍報前軍奪甲馬又援送靈武軍衣副都部署潘環言至馬嶺黨項殺牛族結集遂殺獲首領阿磨而下五人又獲撥相公族人馬通路前進三年九月甲辰北面行營都招討使張敬逹奏此月十五日與契丹戰於太原城下王師敗績時契丹主自率部族来援太原時晉髙祖起義髙行周符彦卿率左右廂騎軍出鬪蕃軍引退已時後蕃軍復成列張敬達楊光逺安審琦等陣於賊城西北倚山横陣諸将奮擊蕃軍屢却至晡我騎軍將移陣蕃軍如山而進王師大敗詔遣侍衛歩軍都指揮使符彦饒率兵屯河陽詔范延光率兵繇青山路趨榆次詔幽州趙徳均繇飛狐路出軍賊後耀州防禦使潘環合防戎軍出磁隰以援張敬達晉髙祖天福四年八月西蕃冦邉涇州節度使張彦澤獲其大首領野离王子羅蝦獨少帝天福九年定州節度使馬全節戰契丹於北平擒千餘人而斬之開運三年八月李守貞奏大軍至望都縣相次至長城北遇虜冦千餘騎轉闘四十里斬蕃将觧里相公漢髙祖即位稱天福十二年鎮州先屯騎将白再榮奏逐出虜將麻荅復其城隠帝乾祐二年十一月契丹入冦前軍至貝州䧟髙老鎮千餘家乃西北至南宫堂陽剽虜人畜諸鎮守閉闗自固時髙行周以重名鎮鄴而諸屯戍甲兵雲布帝慮行周年髙避事緩急踈於應變時周太祖為樞宻使帝乃詔於内殿謂之曰國祚初基先皇厭代冲人嗣襲政教未孚而守貞之徒連結方靣偽􅆆未誅憂不暇食卿受託孤之寄率伐叛之師俾其落角摧牙夷兇盪冦實卿之力也樞機雖重在朕面前玁狁内侵實憂境上夫兵機不可預授權道全在臨時茍非良將主謀安能却敵卿可更為朕河􅃋之行則予無北顧之憂矣對曰臣受顧託之重處將相之地安敢憚於赴蹈唯陛下指使帝曰卿速撰行無使虜塵滋蔓翌日賜玉帶名馬金鞍戎装噐仗雜綵銀噐仍宣供奉官趙延希等二十人殿直都知張盛等二十八人樞宻院承㫖張闕名等五人前汾州刺史白文遇随州刺史康延詔房州刺史李彦崇均州刺史曹奉金天文趙脩己醫官顧師珙等從行仍令宣徽南院使王浚叅與軍事十二月深冀易等州契丹退是年湖南上言蠻冦叛遣賀州大将徐進率兵援之接戰於風陽山下大敗蠻獠斬首五千級周太祖廣順二年九月鎮州何福進言契丹冦深冀遣龍㨗都指揮使劉成誨兵馬監押慕延釗本州衙内指揮使何繼筠率兵拒之至武强縣奪下老小千餘口賊軍遁去三年二月環州皇甫進邠州折從院各上言奉命率軍討慶州蕃部野鷄族世宗顯徳元年五月符彦卿上言逐契丹過忻口北殺蕃軍二千餘衆大軍巳還忻州從官稱賀六年四月大治舟師以備北伐分命諸將㳂流設備以前鄜州節度使田景咸為淤口部署以右神武統軍李洪信為合流口部署以前鳯翔節度使王晏為益津闗一路都部署侍衛馬軍都指揮使韓令坤副焉以侍衛馬􅇍都虞侯韓通為陸路都部署殿前都虞侯石守信副焉五月帝将救瓦橋闗以侍衛馬歩都指揮使韓令坤為覇州都部署虎㨗左廂主張鐸副焉以滑州節度留後陳思譲為雄州都部署龍㨗左廂主髙懐德副焉仍命各率部兵以戍焉餘具親征及帝王功業門恭帝即位初北靣兵馬都部署韓令坤奏敗契丹五百騎於覇州北册府元龜卷九百八十七
