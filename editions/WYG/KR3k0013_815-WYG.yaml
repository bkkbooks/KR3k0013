body:
  text: 册府元龜卷八百十五宋王欽若等撰總録部誠感隂德誠感禮曰至誠如神易曰觀其所感而天地萬物之情可見矣蓋夫鍾最靈之質陶中和之氣精懇内激𡨕期潛會乃至湍流自却金石爲開集天澤於旱暵燭異光於幽晦神交於夢寐德柔於猛騖殊類擾狎竒徴恊應以至嶽靈通感海神助順品物效正纍囚不欺斯固繇衷以發寂然而通以至情而格于神眀君子之爲貴者也楚熊渠子夜行見寢石以爲伏虎彎弓而射之没金飲羽下視知其石也因復射之矢摧無跡漢李廣嘗出獵見草中石以爲虎而射之中石没矢視之石也他日射之終不能入矣廣位至前將軍王尊成帝時爲東郡太守乆之河水盛溢泛浸瓠子金隄老弱奔走恐水决爲害尊躬率吏民投沈白馬劾水神河伯尊親執圭璧使巫䇿祝請以身塡金隄因止宿廬居隄上吏民數千萬人爭叩頭救止尊終不肯去及水盛隄壊吏民皆奔走唯一主簿泣在尊旁立不動而水波稍却廻還吏民嘉壯尊之勇節後漢許楊汝南人太守鄧晨署楊都水掾使復立鴻郤陂豪右大姓因緣陂役競欲辜較在所楊一無聼遂共譖楊受取賂晨遂收楊下獄而械輙自觧獄吏恐遽白晨驚曰晨果濫矣太守聞忠信可以感靈今其效乎即夜出楊遣歸時天大隂晦道中若有火光炤之時人異焉陳弇以尚書教授躬自耕種嘗有黄雀飛来隨弇翺翔諒輔廣漢人仕郡爲五官掾時夏天旱太守自出祈禱山川連日而無所降輔乃自暴庭中慷慨呪曰輔爲股肱不能進諫納忠薦賢退惡和調隂陽承順天意至令天地否隔萬物焦枯百姓喁喁無所訴告咎盡在輔今郡太守改服責已爲民祈福精誠懇到未有感激輔今敢自祈請若至日中不雨乞以身塞無狀於是積薪柴聚茭茅以自環搆火其傍將自焚焉未及日中時而天雲晦合湏臾澍雨一郡沾潤世以此稱其至誠范式字巨卿與張元伯爲友元伯卒式忽夢見元伯𤣥冕􅂷纓屣履而呼曰巨卿吾以某日死當以爾時葬永歸黄泉子未我忘豈能相及式恍然覺寤悲嘆泣下具告太守請徃奔䘮太守雖心不信而重違其情許之式便服朋友之服投其葬日馳往赴之式未及到而喪已發引既至壙將窆而柩不肯進其母撫之曰元伯豈有望耶遂停柩移時乃見有素車白馬號哭而来其母望之曰必是范巨卿既至叩喪言曰行矣元伯死生路異永從此辭會葬者千人咸爲揮涕式自執紼而引柩於是乃前式後位至廬江太守魏管寜北海人避難至於遼東所居左右無鬬訟之聲禮讓移於海表文帝即位徵寧將家屬浮海還郡寜之還也在海中遇暴風船皆没惟寜乗船自若時夜風晦𡨕船人盡惑莫知所泊望見火光輙趨之得島島無居人又無火燼行人咸異焉以爲神光之佑也後復以安車徵之會寜卒朱冲南安人居近夷俗羗戎奉之若君冲亦以禮讓爲訓邑里化之路不拾遺村無凶人毒蟲猛獸皆不爲害卒以壽終晉嵇康遇王烈共入山烈嘗得石髓如飴即自服半餘半與康皆凝而爲石又於石室中見一卷素書遽呼康徃取輙不復見烈乃嘆曰叔夜志趣非常而輒不遇命也其誠心所感每遇幽異如此位至中散大夫徐苖有志行嘗宿亭舍有神告亭壊遽出得免苖雖徵辟皆不就束晳陽平元城人太康中郡界大旱晳爲邑人請雨三日而雨注衆謂晳誠感爲作歌曰束先生通神明請天三日甘雨零我黍以育我稷以生何以酬之報束長生晳官至尚書郎陸機吳郡人有駿犬名曰黄耳機在雒謂犬曰我家絶無書信汝能齎書取消息不犬揺尾作聲機乃爲書以竹筩盛之而繫其頸犬尋路南走遂至其家得報還雒其後因以爲常後河間王顒假機後將軍河北大都督董景道永平中知天下將亂隠於商雒山衣木葉食樹果彈琴歌笑以自娛毒蟲猛獸皆繞其傍是以劉元海及聰屢徵皆礙而不逹以壽終顔含二親既終兩兄既没次嫂樊氏因疾失眀含課勵家人盡心奉養每日自嘗省藥饌察問息耗必簮履束帶醫人疏方應須蚺蛇膽而尋求偹至無由得之含憂嘆累時嘗晝獨坐忽有一青衣童子年可十三四持一青囊授含開視乃虵膽也童子逡廵出户化成青鳥飛去得膽藥成嫂病即愈繇是著名爲光祿勲致仕卒喪在殯而鄰家失火移棺紼斷火將至而滅僉以爲淳誠所感也郭文隠居餘杭大壁山中窮谷無人之地倚木於樹苫覆其上而居焉亦無壁鄣時猛獸爲暴入屋害人而文獨宿十餘年卒無患害嘗著鹿裘葛巾不飲酒食肉區種菽麥嘗有猛獸忽張口向文文視其横骨乃以手探去之猛獸明旦致一鹿於其室前羅含爲常侍侍中在官舍有一白雀棲集堂宇及致仕還家階庭忽蘭菊叢生以爲德行之感焉徐義爲慕容永所獲械埋其足將殺之義誦觀世音經至夜中土開械脱於重禁之中若有人導之者遂奔楊佺期佺期以爲雒陽令宋謝述少有志行隨凡純在江陵純遇害述奉純喪還都行至西塞值暴風純喪舫漂流不知所在述尋小船尋求之經純妻庾舫遇庾遣人謂述曰喪舫存没已應有在風波如此豈可小船所冐小郎去必無及寜可存亡俱盡耶述泣答曰若安全至岸當須營理如其已致意外述亦無心獨存因冐浪而進見純喪幾没述號呌呼天幸而獲免咸以爲精誠所致也髙祖聞而嘉之述後位至吳興太守南齊江泌性行仁義衣弊蝨饑死乃復取置衣中數日間終身無復蝨後武帝以爲南康王侍讀卒顧歡晚節服食不與人通每旦出戸山鳥集其掌取食事黄老道觧隂陽書詔以太學博士徵之不就謝昌寓陳郡人也爲廣州叅軍孝性甚至嘗養一鵠昌寓疾二旬而鵠二旬不食昌寓亡而鵠遂飛去虞愿爲晉平太守郡舊出蚺蛇膽可爲藥有餉愿蛇者愿不忍殺放於二十里外山中一夜蛇還牀下復送四十里經宿復還故處愿更令遠送乃不復歸論者以爲仁心所致也盧度始興人有道術少隨張永北征永敗虜追急阻淮水不得度過度心誓曰若得免死從今不復殺生須臾見兩楯流來接之得免復隠居西昌三顧山鳥獸隨之夜有鹿觸其壁度曰汝壊我壁鹿應聲去屋前有池養魚魚次第來取食乃去永眀末以壽終何㸃盧江灊人也累徵不就少時嘗患渇痢積歲不愈後在吳中石佛寺建講於講所晝寢夢一道人形貎非常授丸一掬夢中服之自此而差時人以爲淳徳所感何𦙍居虎丘西寺講論經義嘗禁殺有虞人逐鹿鹿徃來趨何伏而不動又有異鳥如鶴紅色集講堂馴狎如家禽焉後詔徵爲侍中不就卒韋鼎初爲梁邵陵王主簿侯景之亂鼎兄昻卒於京城鼎負尸出寄於中興寺求棺無所得鼎哀憤慟哭忽見江中物流至竊竊異之徃視乃新棺也因以充殮元帝聞之以爲精誠所感陳王固爲梁元帝相國戸曹屬掌管記聘於西魏固宴饗之際請停殺一羊於固前跪拜後周王思政初爲太祖丞相中軍大將軍雖被任委自以非相府之舊每不自安太祖在同州與羣公宴集出錦􅄢及雜綾絹數叚命諸將樗蒲取之物既盡太祖又觧所服金帶令諸人遍擲曰先得盧者即與之羣公將軍莫有得者次至思政乃斂容跪坐而自誓曰王思政羈旅歸眀蒙宰相國士之遇方願盡心効命上報知已若此誠有實令宰相賜知者願擲即爲盧若内懐不盡神靈亦當明之使不作也便當殺身以謝所奉辭氣慷慨一坐盡驚即㧞佩刀横於膝上覽樗蒲拊髀擲之比太祖止之擲爲盧矣徐乃拜而受自此之後太祖倚待更深轉驃騎將軍李遠爲都督嘗較獵於莎栅見石在藂薄中以爲伏兎射之而中鏃入寸餘就而視之乃石也太祖聞而異之賜書曰昔李將軍廣親有此事公今復爾可謂世載其德雖熊渠之名不能獨擅其羙張元字孝始河北芮城人年六歲村陌有狗子爲人所棄者元見即收而養之其叔父怒曰何用此爲將欲更棄之元對曰有生之類莫不知其性命若天生天殺自然之理今爲人所棄而死非其道也若見而不收養無仁心也是以收而養之叔父感其言遂許焉未㡬乃有狗母衘一死兎置元前而去隋王伽河間章武人開皇末爲齊州行叅軍初無雅稱後被州使送流囚李叅等七十餘人詣京師時制流人竝枷鏁傳送伽行次滎陽伽哀其辛苦悉呼而謂之曰卿軰既犯國刑虧損名教身嬰縲紲此其職也今復重勞援卒豈獨不愧於心哉叅等辭謝伽曰汝等雖犯憲法枷鏁亦大苦吾欲與汝等脱去行至京師總集能不違期否皆拜謝曰必不敢違伽於是悉脱其枷停援卒與期曰某日當至京師如致前却吾當爲汝受死舍之而去流人感悦依期而至一無離叛帝聞而驚異之召見與語稱善乆之於是悉召流人并令携負妻子俱入賜宴於殿庭而赦之擢伽爲雍令郭儁字宏文太原文水人家門雍穆七葉共居犬豕同乳烏鵲通巢時人以爲義感之應州縣上其事髙祖遣平昌公宇文㢸詣其家勞問之持書御史柳彧廵省河北表其門閭唐裴寂字元眞年十四州補主簿隋開皇中爲左親衛家貧無以自業每徒歩詣京師嘗至華岳因祭神而祝曰裴元眞窮困至此敢修誠謁神神之有靈鑒其運命若富貴可期當降吉夢再拜而去夜夢白頭翁謂寂曰卿年四十以後方可得志終當位極人臣耳唐臨爲萬泉丞縣有輕囚十數人會春暮時雨臨白令請出之令不許臨曰明公若有所疑臨請自當其罪令因請假臨召囚悉令歸家耕種與之約期令歸繫所囚等皆感恩貸至時畢集詣獄臨因是知名王隴德本馮翊王藏仁之蒼頭也藏仁父母先没未獲合塟既而從役物故其妻孀居旁無親屬隴德迎致其屍并其父母而葬之因廬其墓以負土成墳每有雉悲鳴於墳上焉太宗幸長春宫記表其閭王義方坐與張亮交逰貶授儋州吉安丞行至南海舟人將以酒脯致祭義方曰黍稷非馨義在明德乃酌水而祭爲文曰思帝郷而北顧望海浦而南浮必也行愆諸已義負前修長鯨擊水天吳覆舟如因忠獲戾以孝見尤四維霧廓千里安流靈應如響無作神羞時當盛夏風濤蒸毒既而開霽南渡數歲改授洹水丞歸崇敬大厯中爲倉部郎中充册立新羅王使至海中流波濤迅急舟船壊漏衆咸驚駭舟人請以小艇載崇敬避禍崇敬曰舟人凡數百我何獨濟逡廵波濤稍息竟免爲害李康威少好勇不拘小節自布素中以飲博爲事漁陽士子多忌之曾一日與諸逰俠軰釣於桑乾赤欄橋之側自以酒禱曰吾若有幽州節度分則獲一大魚俄有餌鈎者隨手持之得鯉魚長三尺餘人甚異焉後果鎭幽州後唐内臣張承業爲監軍夾城之役遣承業求援於鳳翔時河中阻絶自離石渡河春氷方泮淩澌奔䠞􅋈舟不得渡因禱河神是夜夢神人謂曰子但渡流水無患既寤津吏報曰河氷合矣凌晨躡氷而濟旋踵氷觧周徐台符晉末爲翰林學士契丹之䧟中原也台符從虜帳北至於薊門及戎人内潰乃竄身南歸初台符所乘馬性好嘶鳴及自虜中廻嘗露宿於草中雖胡騎連羣經其左右而台符馬若箝其口然及行至漢地即嘶鳴如故時人以爲積善之所感也段希堯初仕晉爲右諫議大夫使于吳越及乘舟汎海風濤暴越檝師僕從皆相顧失色希堯謂左右曰吾生平履行不欺暗室昭昭天鑒豈無佑乎汝等但以吾爲託必當無患言訖而風止乃獲利渉隂德夫明晦之際雖則有殊而善惡之報誠亦無忒是以爲善則錫之福而昌厥世爲惡則降之咎而殛其身盖如影響之相須符契之胥合者也若乃濟危難恤羈孤愼罰緩死以存乎性命危言切諫以申乎幽寃迨及骼胔之類鳥獸之微莫不形惻隠之心成全活之惠故能恩洽於物慶流於家成必大之徵享無疆之祐貽孫翼子乃公乃侯足以見天道之不誣人心之可復者爾魏顆父武子爲晉大夫有嬖妾無子武子疾命顆曰必嫁是疾病疾甚曰病則曰必以爲殉及卒顆戒之曰疾病則亂吾從其治也及輔氏之役顆見老人結草以亢杜回亢禦也杜回秦之力士杜回躓而顚故獲之夜夢之曰余爾所嫁婦人之父也爾用先人之治命余是以報韓厥晉人感晉景公紹趙孤之子武以成程嬰公孫杵臼之義此天下之隂徳也韓氏之功於晉未覩其大者也然與趙魏終爲諸侯十餘世宜乎哉孫叔敖楚人初爲兒出逰歸遂憂而不食其母問其故泣而對曰吾聞見兩頭蛇必死吾恐人又見之殺而埋之母曰無憂汝不死矣吾聞有陰徳者天必報之以福果不死漢丙吉字少卿武帝末巫蠱事起吉以故廷尉監徵詔治巫蠱郡邸獄連歲不决後元二年武帝疾徃來長楊五柞宫長楊五柞宮竝在盭厔徃來二宮之間望氣者言長安獄中有天子氣於是帝遣使者分條中都官詔獄繫條謂疏録之亡輕重一切皆殺之内者令郭穰夜到郡邸獄吉閉門拒使者不納曰皇曾孫在他人亡辜死者猶不可况親曽孫乎相守至天明不得入穰還以聞因劾奏吉武帝亦寤曰天使之也因赦天下郡邸獄繫者獨頼吉得生恩及四海也吉拒閉使者天子感寤乃普赦天下其郡邸繫于獄者既因吉得生而赦宥之恩遂及四海也及曾孫立是爲宣帝吉爲人深厚不伐善自曾孫遭遇吉絶口不道前恩遭遇謂升大位也故朝廷莫能明功也後帝知吉有厚恩封吉爲博陽侯邑千三百户臨當封吉疾病帝將使人加紼而封之及其生存也紼繫印之系也帝憂吉疾不起太子太傅夏侯勝曰此未死也臣聞有隂德者必饗其樂以及子孫今吉未獲報而疾甚非其疾也後病果愈後五歲代魏相爲丞相于定國父于公史失其名其閭門壊父老方共治之閭門里門也于公謂曰少高大閭門令容駟馬髙車我治獄多隂德未嘗有所寃子孫必有興者至定國爲丞相永爲御史大夫封侯傳世王翁孺爲綉衣御史逐捕羣盗及吏畏懦逗留當坐者翁孺皆縱不誅以奉使不稱嘆曰吾聞活千人有封子孫吾所活者萬餘人後世其興乎後漢何敞六世祖比干字少卿經明行修兼通法律爲汝隂縣獄吏决曹掾平活數千人一云比干武帝時爲廷尉與張湯同時湯持法深而比干務仁恕數與湯争雖不能盡得然所濟活者以千數後爲丹陽都尉獄無寃囚淮汝號曰何公武帝征和三年三月辛亥天大隂雨比干在家日中夢貴客車騎滿門覺以語妻語未已而門有老嫗可八十餘頭白求寄避雨雨甚而衣履不霑漬雨止送至門乃謂比干曰公有隂德今天賜君䇿以廣公之子孫因出懐中䇿符狀如簡長九寸凡九百九十枚以授比干子孫佩印綬者當如此算比干年五十八有男六又生三子宣帝本始元年自汝隂徙平陵代爲名族臣欽若等曰案後漢書比干生蜀郡太守壽壽生京輔都尉顯顯生光禄大夫鄢鄢生濟南太守寵寵生五官中郎將敞也鄧禹爲太傅嘗嘆曰吾將百萬之衆未嘗妄殺一人其後代必有興者禹子陔又言嘗聞活人者子孫有封兄訓爲使者修石臼河歲活數千人天道可信家必蒙福臣欽若等曰按後漢書訓子隲悝宏閭皆封萬戸侯訓女卽和熹皇后也虞詡陳國武平人祖父經爲郡縣獄吏按法平允務存寛恕每冬月上其狀嘗流涕隨之嘗稱曰東海于公高爲里門而其子定國卒至丞相吾决獄六十年矣雖不及于公其庻㡬乎子孫何必不爲九卿邪故字詡曰升卿詡後爲司𨽻校尉尚書僕射梁商曾祖父綂更始二年爲中郎將安集凉州商女卽順烈皇后也后少善女工好讀書史商深異之竊謂諸弟曰我先人全濟河西所活者不可勝數雖大位不究而積德爲報若慶流子孫者儻興此女乎袁安字邵公好學有威重明帝朝爲楚郡太守治楚王獄所申理者四百餘家皆蒙全濟安遂爲名臣章帝時至司徒生蜀郡太守京弟敞爲司徒京子陽爲太尉陽四子長子平平弟成左中郎將成弟逢逢弟隗皆爲公楊震華隂人父寳年九歲時至華隂山北見一黄雀為鴟梟所摶墜於樹下爲螻蟻所困寳取之以歸置巾箱中唯食黄花百餘日毛羽成乃飛去其夜有黄衣童子向寳再拜曰我王母使者君仁愛救拯實感成濟以白環四枚爲寳令君子孫潔白位登三事如此環矣臣欽若等曰按後漢書震與子兼曽孫彪俱爲太尉孫賜爲司徒王忳廣漢新都人嘗詣京師於空舍見一書生疾困愍而視之書生謂忳曰我當到雒陽而被病命在須臾􅆎下有金十斤願以相贈死後乞藏骸骨未及問姓名而命絶忳即鬻一斤營其殯葬餘金悉置棺下乆無知者後歸數年縣署忳大度亭長初到之日有馬馳入亭中止其日大風飄一繡被復墮忳前即言之於縣縣以歸忳忳後乗馬到譙縣馬遂奔走牽忳入宅舍主人見之喜曰今擒盗矣問忳所由得馬忳具説其狀并及繡被主人悵然良乆乃曰被隨旋風與馬俱亡卿何隂德而致此二物忳自念有葬書生事因說之并道書生形貌及埋金之䖏主人大驚號曰是我子也姓金名彦前徃京師不知所在何意卿乃葬之大恩乆不報天以此章卿德耳忳悉以被馬還之彦父不取又厚遺忳忳辭譲而去時彦父爲州從事因告新都令假忳休息自迎彦喪餘金具存忳由是顯名晉孔愉以討華軼功封餘不亭侯愉嘗行經餘不亭見籠龜於路者愉買而放之溪中龜中流左顧者數四及是鑄侯印而印龜左顧三鑄如初印工以告愉乃悟遂佩焉毛寳初在昌武軍人有如市買得一白龜長四五寸養之漸大放於諸江中邾城之敗養龜人被鎧持刀自投於水中如覺墮一石上視之乃先所養白龜長五六尺送至東岸遂得免焉殷仲堪逰於江濱見流棺接而葬焉旬日間門前之溝忽起爲岸其夕有人通仲堪自稱伯𤣥云感君之惠無以報也仲堪因問門前之岸是何祥乎對曰水中有岸其名爲洲君將爲州言終而没至是果臨荆州後魏高允爲中書侍郎轉令監評刑三十餘載中外稱平以孝文太和十一年卒年九十八初允每謂人曰吾在中書有隂德濟救民命若陽報不差吾壽應享百年矣先卒旬外微有不適尤不寢臥呼醫請藥出入行止吟詠如常髙祖文明太后聞而遣醫李循徃脉視之告以無恙循入宻陳允榮衛有異懼其不乆於是遣使備賜御膳珍羞自酒米至於鹽醢百有餘品皆盡時味及牀帳衣服茵被尺杖羅列於庭王官徃還慰問相屬允喜形於色語人曰天恩以我篤老大有所賚得以贍客矣表謝而已不有他慮如是數日夜中卒家人莫覺唐徐有功則天時爲司刑丞酷吏周興來俊臣丘神勣等搆䧟無辜皆抵極法詔下大理者有功皆議出之前後濟活數十百家累遷司刑少卿以諫奏枉誅者三經斷死而執志不渝酷吏由是少衰時人比漢之于張焉先是潤州刺史竇孝諶妾龎氏爲奴所誣當坐斬有功明其無罪於是龎氏减死有功至則天長安中卒𤣥宗踐祚孝諶子希瑊等請以身之官爵讓有功子倫以報舊恩倫由是自太子司議郎遷恭陵令陸元方則天時爲宰相臨終曰吾隂德於人多矣其後庻幾福不衰矣元方子象先爲𤣥宗宰相景倩爲監察御史景融爲工部尚書景獻爲屯田員外郎景允爲庫部郎中皆有美譽裴度爲東都畱守文宗太和九年十一月李訓王涯賈餗舒元輿等被誅其親屬門人從坐者數十百人下獄訊劾欲加流竄度上疏理之全活者數十家册府元龜卷八百十五
