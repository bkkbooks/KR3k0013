body:
  text: 册府元龜卷四百四十五宋王欽若等撰將帥部無謀逗撓軍不整無謀夫將帥者民之司命而安危之主也非夫内懐英畧獨負竒計策慮先定機權脗合亦何以暢乎善志而保其必勝哉乃有膺爪牙之寄當旗皷之任董率戎旅襲行於討伐保扞徼塞式遏於寇讎而闇然寡謀率爾輕進失於貞律之義愆夫固圉之術措置非當豫備乖宜以至啓鈔暴之端貽䘮敗之辱良繇昧於前籌短於應變猶豫無决以成乎厲階聽納不明致紊於軍志昔人有言曰置將不善一敗塗地授受之際良可戒哉孫良夫為衛大夫衞侯使良夫與石稷甯相向禽將侵齊與齊師遇石子欲還孫子曰不可以師伐人遇其師而還將謂君何言無以答君若知不能則如無出今既遇矣不如戰也既戰衛師敗績石子曰師敗矣子不少須衆懼盡子䘮師徒何以復命皆不對又曰子國卿也殞子辱矣子以衆退我此乃止我於此止禦齊師且吿車來甚衆齊師乃止漢韓安國武帝時為材官將軍屯漁陽捕生口虜言匈奴逺去即上言方佃作時安國上奏也佃治田也音與田同請且罷屯罷屯月餘匈奴大入上谷漁陽安國壁廼有七百餘人出與戰安國傷入壁匈奴虜畧千餘人及畜産去帝怒使使責讓安國徙益東屯右北平後漢馬援為伏波將軍討武陵五溪蠻夷軍次下雋有兩道可入從壺頭則路近而水嶮從充則塗夷而運逺壺頭山名充縣名屬武陵郡音昌容􅋀帝初以為疑及軍至中郎將耿舒欲從充道援以為棄日費糧不如進壺頭搤其喉咽充賊自破以事上之帝從援策進營壺頭賊乘髙守隘水疾船不得上㑹暑甚士卒多疫死援亦中病耿舒與兄好畤侯弇書曰前舒上書當先擊充糧雖難運而兵馬得用軍人數萬争欲先奮今壺頭竟不得進大衆拂欝行死誠可痛惜前到臨鄉賊無故自致若夜撃之即可殄滅伏波類西域賈胡到一處輒止以是失利今果疾疫皆如舒言弇得書奏之帝乃使虎賁中郎將梁松乘驛責問援㑹援卒吳張悌為丞相軍師䕶軍孫震丹陽太守沈瑩當晉之討吳吳遣悌等率衆三萬濟江圍城陽都尉張喬於楊河橋衆才七千閉栅自守舉白接告降吳副軍帥諸葛靚欲屠之悌曰强敵在前不宜先事其小且殺降不祥靚曰此等以救兵未至而力少故先偽降以緩我非來伏也因其無戰心而盡坑之可以成三軍之義若舍之而前必為後患悌不從撫之而進晉討吳䕶軍張翰等乘之吳軍以次瓦解張喬又出其後大敗吳軍於板橋晉王澄為荆州刺史領南蠻校尉時京師危逼澄率衆赴難㑹王如㓂襄陽澄前鋒至宜城遣使詣山簡為如黨嚴嶷所獲嶷偽使人從襄陽來而問之曰襄陽㧞未答云昨旦破城已獲山簡乃隂緩澄使令得亡去澄聞襄陽䧟以為信然散衆而還既而恥之託糧運不贍委罪長史蔣俊而斬之竟不能進甘卓為安南將軍梁州刺史假節鎮襄陽王敦作逆敦叅軍樂道融惡敦背朝廷乃説卓誅敦卓雖從之而性不果决且年老多疑計慮猶豫軍次豬口累旬不前敦聞卓已下兵卓兄子卬時為敦叅軍使卬求和於卓令其旋軍卓信之将旋主簿鄧騫與道融勸卓曰將軍起義兵而中廢為敗軍之將竊為将軍不取今將軍之下士卒各求其利一旦而還恐不可得也卓不從後為王敦所害桓修自部郎為左衞將軍王恭將伐譙王尚之先遣何澹之孫無終向句容修以左衛領振武將軍與輔國將軍陶無忌距之修次句容俄而恭敗無終遣書求降修既旋軍而楊佺期已至石頭時朝廷無偹内外震駭修進說曰殷桓之下專恃王恭恭既破滅莫不失色今若優詔用𤣥𤣥必内喜則能制仲堪佺期使並順命朝廷納之以修為龍驤將軍荆州刺史假節權領左衛文武之鎮又令劉牢之以千人送之轉仲堪為廣州修未及發而𤣥等盟於㝷陽求誅牢之尚之并訴仲堪無罪獨被降黜於是詔復仲堪荆州刺史中丞江績奏修承受楊佺期之言交通信命宣轉不盡以為身計疑誤朝算請收付廷尉特詔免官梁王僧辯為車騎大將軍平建業遣陳霸先守京口都無備防于顗屢以為言僧辯不聽竟及於禍隋于仲文髙祖大業中為光禄大夫遼東之役率衆屯鴨淥水髙麗將乙支文徳詐降來入其營仲文先奉密㫖若遇髙元及文徳者必擒之至是文徳來仲文將執之時尚書右丞劉士龍為慰撫使固止之仲文遂捨文徳㝷悔遣人紿文徳曰更有言議可復來也文徳不從遂濟仲文選騎渡水追之每戰破賊文德遺仲文詩曰神策究天文妙算窮地理戰勝功既髙知足願云止仲文答書諭之文徳燒柵而遁皇甫綰煬帝大業末為將軍屯兵一萬在枹罕薛舉自稱西秦霸王選精鋭二千人襲綰與綰軍遇於赤岸陳兵未戰俄而風雨暴至初風逆舉陳而綰不撃之忽反風正逆綰陳氣色昏昧軍中擾亂舉策馬先登諸軍從之隋軍大潰遂陷枹罕時羌首鍾利浴擁兵三萬在峩山界盡以衆降舉兵遂大振唐姜寳誼髙祖武徳初為并鉞將軍時劉武周將黄子英徃來雀䑕谷帝令寳誼撃之子英數以輕兵挑戰寳誼兵纔接子英徑遁如是者再三寳誼悉衆以逐之伏兵發軍遂大敗寳誼為賊所擒後得逃歸郭孝恪太宗貞觀末為安西都䕶時阿思那社爾既擒龜兹王令孝恪守之其相那利僅以身免潜引西突厥之衆并其國兵萬餘人來襲孝恪時孝恪營於城外有龜兹人來謂孝恪曰那利我國相人心素歸今亡在野必思為變城中之人頗有異志公其備之孝恪不以為意那利率兵奄至孝恪始覺乃領部下千餘人將入城而那利之徒已登城矣城中降胡與那利表裏以撃孝恪自為前鋒力戰而入既失部分為西賊之所蹂躪戰於城門中流矢而死孝恪子待詔亦同死於陣鄭仁泰為鐵勒道行軍大總管既降鐵勒部落副將楊志追討之反為所敗有候騎告仁泰曰賊輜重在近畜牧被野可徃而擒也仁泰領騎一萬四千人捲甲輕齎倍道副之遂踰大嶺至仙蕚河竟不見賊糧且盡遂勒兵而還士卒飢甚又遇大雪凝凍棄其戈甲殺馬以食之强弱自為伍前後分散馬盡人相食比入境餘纔八百人哥舒翰𤣥宗天寳末為先鋒兵馬副元帥拒安禄山次于靈寳縣之西原與賊交戰官軍南廹險峭北臨黄河賊將崔乾祐以數千人先據險要翰及良丘等浮船中流以觀進退謂乾祐兵少輕之遂促將士令進争路擁塞無復隊伍因為兇徒所乘房琯肅宗至徳初為吏部尚書平章事加持節招討西京兼防禦蒲潼兩關兵馬節度使遇賊於咸陽縣之陳濤斜時琯用春秋車戰之法以車二千乗馬歩夾之既戰賊順風揚塵鼓譟牛皆震駭因縱火焚之人畜撓敗為賊所傷殺者四萬餘人存者數千而已琯用兵素非所長而天子採其虚聲兾成實效琯既自無廟勝乂以虚名擇將吏以至於敗及與賊對壘琯欲持重以伺之為中使邢延恩等督戰蒼黄失據遂及於敗馬燧為河東保寧等道節度徳宗貞元二年三月來朝初吐蕃將尚結賛既陷鹽夏二州各留兵千餘人守之結賛大衆屯於鳴沙自冬及春羊馬多死糧餉不繼頗無固志時詔遣華州潼關節度駱元光邠寧節度韓遊瓌統衆與鳳翔鄜坊及諸道戍卒屯於塞上又命燧率師次於石州分兵濟河與元光等犄角討之結賛聞而大懼累遣使請和仍約盟㑹帝皆不許又遣其大將論頬熱厚禮卑詞求燧請盟燧以奏焉帝又不許惟促其合勢討之燧不虞其詐乃與頰熱俱入朝盛言其可保信請許盟約帝於是從之燧之赴朝也諸軍但閉壁而已結賛懼悉其衆棄夏州而歸馬既多死有徒行者及是夏平凉之㑹竟渝盟焉燧亦繇此失兵柄而奉朝請矣渾鎬憲宗元和中為義武軍節度討王承宗定鎮二州相去九十里鎬驅全師討賊驟勝分壓鎮州北路而壁焉鎬之和門去承宗之牙三十餘里鼔角相聞賊徒恟恐而鎬計慮不周但耀其軍鋒賊得分衆潜入鎬地燒其城邑屠掠居人鎬軍始揺遷延内顧㑹中使督鎬追賊乃復出戰三合而大敗嚴綬元和中為山南東道節度使初憲宗以綬在太原所發偏裨戰討多尅故移袁滋於江陵置綬於襄州臨吳元濟綬自帥師至境上無威算以制敵到軍日遽發公藏賞士卒府藏之積悉以賂中貴人師徒凍餒閉壁而已後裴度屢言其無軍政故罷為太子少保索日進元和末為神策軍郃陽鎮遏使蔡賊冦溵水鎮兵不能支部將死者三人焚芻藁而去初裴度遣使間入蔡州得元濟状元濟已宻有降欵而日進隔河大呼之遂令三軍防元濟繇是不果降後唐王鎔為鎮州節度莊宗為晉王時梁將杜廷隠之襲深冀也聲言分兵就食汴人奔鎮州者或以奸謀事吿鎔懼為始禍猶豫未敢拒絶鎔偏將石公立戍深州欲杜關不納請命於府鎔遽令啓關移兵於外公立禀鎔命廷隠遂盜有州城公立既出指城闉而言曰朱氏狡惡不仁簒唐宗社五尺童子亦知彼為人我公尚顧舊盟猶豫不斷開門納盜後悔何追此城數萬生靈坐為俘馘因投刀泣下數日廷隠閉城門殺留鎮兵士登陴拒守鎔方命公立攻之即有備矣及柏鄉陣敗兩州之人悉為奴虜老弱者坑之張廷裕同光中為新州節度使塞上多事廷裕無控制之術邉鄙常聳漢慕容彦超晉末從髙祖圍杜重暉於鄴下彦超累言於漢祖請急攻賊城漢祖信之乃親督諸軍四面齊進自寅及辰官軍傷者及萬餘人死者千餘人乃抽軍罷攻議者無不歸罪於彦超自是不復言及攻城矣逗撓夫膺閫外之寄總戎昭之重固當決機制勝因時乗便摧堅履險以思克敵而乃忘身先之訓懐敵勍之畏或屯留不進或引兵擅還或隠伏私嫌或顧望時事矯辭飾偽以為解深溝髙壘以自固致寇讎之滋長而威聲之寖微蓋繇性本懦怯不能武事亦或心非忠藎茍圖智免因此而下吏至於誅死者非不幸也宋義為楚上將軍秦章邯圍趙王歇於鉅鹿義所遇齊使者髙陵君顯見楚懐王曰宋義論武信君必敗數日果敗軍未戰先見敗徴徵證也可謂知兵矣王召宋義與計事而説之説讀曰悦因以為上將軍羽為魯公為次將范増為末將諸别將皆屬號卿子冠軍冠軍言其在諸軍之上北救趙至安陽留不進今相州安陽縣秦三年羽謂宋義曰今秦軍圍鉅鹿疾引兵渡河楚擊其外趙應其内破秦軍必矣宋義曰不然夫搏牛之蝱不可以破蟣虱摶擊也言以手擊牛之背可以殺其上蝱而不能破蝨喻今將兵方欲滅秦不可盡力與章邯即戰或未能禽徒費力也何益哉今秦攻趙戰勝則兵罷我承其敝罷讀曰疲不勝則我引兵鼓行而西必舉秦矣鼔行謂撃鼔而行無畏懼也故不如先鬭秦趙夫攻撃輕銳我不如公坐運籌策公不如我因下令軍中曰猛如虎狠如羊貪如狼强不可令者皆斬遣其子襄相齊身送之無鹽縣也飲酒髙㑹髙㑹大㑹也天寒大雨士卒凍飢羽曰將戮力而攻秦久留不行今嵗飢民貧士卒食半菽士卒食蔬菜以菽雜半之菽謂豆也軍無見糧無見在之糧廼飲酒髙㑹不引兵渡河因趙食與併力擊秦廼曰承其敝夫以强秦之强攻新造之趙其勢必舉趙趙舉秦强何敝之承且國兵新破王生不安席掃境内而屬將軍屬委也音之欲切國家安危在此一舉今不䘏士卒而狥宴私非社稷之臣也後遂殺義破秦軍漢彭越為魏相國擅將兵略定梁地項王南走陽夏走音奏夏音攻雅切越復下昌邑旁二十餘城漢王敗使使召越併力擊楚越曰魏地初定尚畏楚未可去漢王追楚為籍所敗張成為大司農武帝時南粤平諸校留屯豫章閩粤王餘善發兵距漢殺漢三校尉是時漢使成故山州侯齒將屯齒城陽恭王子也舊封山州侯不敢撃郤就便處郤退也音五畧反皆坐畏懦誅路博徳為彊弩將軍天漢二年貳師將三萬騎出酒泉擊右賢王於天山武帝召騎都尉李陵欲使為貳師將輜重陵見帝願以少擊衆歩兵五千人渉單于庭帝壯而許之因詔博徳將兵半道迎陵軍博徳故伏波將軍亦羞為陵後距奏言方秋匈奴馬肥未可與戰臣願留陵至春俱將酒泉張掖騎各五千人並擊東西浚稽可必禽也浚稽山名時虜分居此兩山也浚音峻稽音雞書奏帝怒疑陵悔不欲出而教博徳上書廼詔博徳吾欲予李陵騎云欲以少撃衆今虜入西河其引兵走西河遮鈎營之道胡來要害道令博徳遮之走音奏詔陵以九月發出遮虜鄣鄣者塞上險要之處徃徃修築别置候望之人所以自鄣蔽而伺敵也遮虜鄣名也至東浚稽山南龍勒水上徘徊觀虜即亡所見從浞野侯趙破奴故道抵受降城休士抵歸也受降城本公孫敖所築休息也浞音促仕角反因騎置以聞騎置謂驛騎也所與博徳言者云何天子疑陵教博徳上書求至春乃俱西也具以書對陵於是出兵田廣明為祁連將軍宣帝遣五將出塞廣明出塞千六百里至雞秩山斬首捕虜十九級獲牛馬羊百餘逢漢使匈奴還者冉𢎞等言雞秩山西有虜衆祁連即戒𢎞使言無虜欲還兵御史屬公孫益夀諫以為不可祁連不聽遂引兵還坐知虜在前逗遛不進下吏自殺後漢祭肜以太僕將萬餘騎與南單于左賢王信伐北匈奴期至涿邪山信初有嫌於肜行出髙闕塞九百餘里得小山乃妄言以為涿邪山肜到不見虜而還坐逗遛畏懦下獄免郭襄以謁者領䕶羌校尉事到隴西聞凉州羌盛還詣闕抵罪鄧鴻為車騎將軍出塞追叛胡逢侯坐逗遛下獄死劉岱為兖州刺史時董卓廢少帝岱與豫州刺史孔伷廣陵太守張超陳留太守張邈諸牧守共謀討卓大㑹酸棗設壇場而盟然諸軍各懐遲疑莫適先進遂使糧儲單竭兵衆乖散晉汝南王亮武帝時持節都督關中雍凉諸軍事㑹秦州刺史胡烈為羌虜所害亮遣將軍劉旂騎督敬琰赴救不進坐是貶為平西將軍旂當斬亮與軍司曹冏上言節度之咎繇亮而出乞丐旂死詔曰髙平困急計城中及旂足以相㧞就不能徑至尚當深進今奔突有投而坐視覆敗故加旂大戮今若罪不在旂當有所在有司又奏免亮官削爵土詔惟免官蔡豹元帝時為建威將軍徐州刺史是時泰山太守徐龕以郡叛歸石勒詔征虜將軍羊鑒臨淮太守劉遐等與豹共討之鍳及劉遐等竝疑憚不相聽從互有表聞故豹久不得進尚書令刁協奏曰臣等伏思淮北征軍已失不速今方盛暑冐渉山險山人便弓弩習土俗一人守扼百夫不當且運漕至難一朝糧乏非復智力所能防禦也書云寧致人不致於人宜頓兵所在深壁固壘至秋不了乃進大軍詔曰知難而退誠合兵家之言然小賊雖狡猾故成擒耳未戰而退先自摧衂亦古之所忌且郡存已據賊壘威勢既振不可退一歩也於是遣治書御史郝嘏為行臺催攝令進討豹欲遥進鍳執不聽協又奏免鍳官委豹為前鋒以鍳兵配之降號折衝將軍以青後効宋臧質為雍州刺史時太祖北伐使質率所統見兵向潼關質頓兵近郊不肻時發獨遣司馬栁元景屯兵境上不時進軍質又顧戀嬖妾棄營單馬還城散用臺庫見錢六百萬為有司所糺帝不問也南齊李安民為領軍將軍屯壽春時淮北四州聞太祖受命咸欲南歸至是徐州人桓摽之兖州人徐猛子等合義衆數萬砦險求援太祖詔曰青徐泗州義舉雲集安民可長轡遐馭指授羣帥安民赴救留遲虜急兵攻摽之等皆没帝甚責之梁鄧元起武帝時為平西將軍益州刺史詔以西昌侯蕭藻代之是時梁州長史夏侯道遷以南鄭叛引魏人白馬戍主尹天寳馳使報蜀魏將王景𦙍孔陵寇東西晉壽竝遣告急衆勸元起急救之元起曰朝廷萬里軍不卒至若㓂賊浸淫方須撲討董督之任非我而誰何事怱怱便救長史庾黔婁等苦諫之皆不從髙祖亦假元起節征討諸軍將救漢中比是魏已攻陷兩晉壽蕭藻將至元起頗營還装糧儲器械略無遺者藻入城甚望之因表其逗遛不憂軍事收付州獄於是自縊唐竇琮髙祖義寧初為右領軍大將軍時隋河陽都尉獨孤武潜謀歸國乃令琮以歩騎一萬自柏崖道應接之遲留不進武見殺坐是除名段志𤣥太宗時為左驍衛大將軍遣率兵徃青海掩吐谷渾良馬志𤣥去青海三十里遲留不進坐免官張文幹行撫州刺史平壌道行軍總官貞觀十九年征遼廻次易州文幹以渡海多覆舟船詔廹逗遛不赴斬之韋待價則天永昌初為安息道大總管與副大總管安西大都䕶温古征吐蕃遲留不進待價配流繡州温古處斬李光弼為河南淮南山南東道荆南等道副元帥封臨淮王廣徳初吐蕃入㓂京畿代宗詔徴天下兵光弼與程元振不協遷延不至十月西戎犯京師代宗幸陜李正己為淄青節度使大厯十年魏博節度田承嗣之叛也正己與成徳軍節度使李寳臣同㑹於兾州之棗强縣進圍貝州承嗣發精兵㓂磁州為貝州援寳臣等見承嗣兵出各退守行營淮西節度使李忠臣聞之棄衛州偃月城濟河而南屯於陽武桂仲武憲宗元和十五年為安南都䕶先是安南兵亂殺都䕶李象古朝廷以仲武簡亷有材用委以緝綏仲武既行遇南兵方擾逗遛不進貶安州刺史以裴行立代焉周王峻為樞宻使討并冦太祖廣順元年十二月峻遣供奉官翟守素奏臣所差仇𢎞超等襲賊軍至霍邑路追及皷譟蹙煞其賊黨人騎投岸墮澗不可稱計賜翟守素幣帛袍𢃄先是王萬敢嬰城拒賊攻之甚急太祖命峻將兵先進欲因幸雒都更以禁軍繼之至是峻言劉崇一行棄甲而遁遣仇𢎞超掩襲逐至霍邑當險阻之路也𢎞超無勇緩兵賊遂安然解去若𢎞超撃疾雷之勢則彼無孑遺矣盖峻不能自率師而逐之致誤大事非将帥之才也武守琦為左廂都校顯徳四年世宗幸淮南帝令守琦帥驍騎數百徑趨維揚路出於髙郵髙郵乃揚州大邑素多儲峙守琦利其糧草不時而進故吳人因得虜其士馬渡江南去後數日王人至揚州乃督衆以救焚故其寺觀廬舍僅有存者及閲其遺民惟殘癃十數人而已軍不整夫整軍經武安民和衆将帥之職也故先庚後甲以申其號令鏗金伐鼓以節其進退既有嚴而有翼且必誠而必信俾等夷有序上下無譁靡犯於秋毫克貞於師律者率是道也乃有失制勝之略無馭衆之法或臨敵而先却或陳隙而自潰或䖍劉於黎庶或剽掠於玉帛因緣縱暴猖狂莫遏卒使國威斯損民怨是歛采諸方冊咸用論次百代而下足為鍳戒者已荀林父晉大夫桓子也將中軍魯宣公十二年帥師及楚子戰于邲楚師車馳卒奔乗晉軍桓子不知所為鼔於軍中曰先濟者有賞中軍下軍争舟舟中之指可掬也及昏楚師軍於邲晉之餘師不能軍不能成營屯宵濟亦終夜有聲言其兵衆将不能用季康子魯大夫哀公七年秋伐邾師遂入邾處其公宫衆師晝掠虜掠取財物也邾衆保於繹繹邾山也在鄒縣北師宵掠以邾子益來益邾隠公也晝夜掠傳言康子無法後漢吳漢為大司馬建武二年南郡人秦豐據黎丘董訢起堵鄉許邯起杏又更始諸將各擁兵據南陽諸城光武遣漢伐之漢軍所過多侵暴時破虜将軍鄧奉謁歸新野怒漢掠其鄉里遂反撃破漢軍晉祖逖元帝時為徐州刺史尋徴軍諮祭酒居丹徒之京口逖以社稷傾覆常懐振復之志賔客儀從皆暴桀勇士逖遇之如子弟時揚土大饑此輩多為盜賊攻掠富室逖撫慰問之曰比復南塘一出不或為吏所䋲逖輙擁䕶救解之談者皆以此少逖然自若也王敦元帝時為鎮東大将軍經畧指麾千里之外肅然而麾下擾而不能整梁曹景宗仕齊為㳺撃将軍及髙祖為雍州刺史景宗深自結附髙祖以景宗為軍鋒與王茂吕僧珍犄角破王珍國於大航景宗軍士皆桀黠無頼御道左右莫非富室抄掠財物略奪子女景宗不能禁臨州王宏為揚州刺史天監四年都督諸軍侵魏軍次雒口宏部分乖方多違朝制九月雒口軍潰宏棄衆走其夜暴風雨軍驚宏與數騎逃亡諸將求宏不得衆散而歸棄甲投戈填滿水陸捐棄病者彊壮僅得脱身宏乘小船濟江夜至白石壘欵城門求入臨汝侯登城謂曰百萬之師一朝奔潰國之存亡未可知也恐奸人乗間為變城門不可夜開宏無辭以對乃縋食餉之邵陵王綸為中衞将軍侯景搆逆加征討大都督綸與前髙州刺史李遷仕援兵至北岸百姓扶老携㓜以候王師纔得過淮便競剥掠賊黨有欲自㧞者聞之咸止後周權景宣為荆州總管時陳湘州刺史華皎舉州欵附表請援兵敇景宣統水軍與皎俱下景宣到夏口陳人已至而景宣以任遇隆重遂驕傲縱恣多自矜伐兼納賄賂指揮節度朝出夕改將士憤怒莫肯用命及水軍始交一時奔北船䌫噐仗略無孑遺時衞公直總督諸軍以景宣負敗欲䋲以軍法朝廷不忍加罪遣使就軍赦之尋遇疾卒隋韋沖髙祖開皇中為寧州總管其兄子伯仁隨沖在府掠人之妻士卒縱暴邉人失望帝聞而大怒令蜀王秀治其事益州刺史元巖性方正案沖無所寛貸沖竟坐免韓擒虎為廬州總管以平陳功進位上柱國有司劾擒虎放縱士卒滛汙陳宫坐此不加爵邑唐崔光逺肅宗上元中為劔南節度使梓州刺史段子章反東川節度使李奐敗走投光逺光逺率將花驚定等討平之将士肆其剽刼婦女有臂串金銀釧兵皆斷其腕以取之亂殺數千人光逺不能禁郭英乂為神策軍節度使代宗初元帥雍王自陜統諸軍討賊雒陽留英乂在陜為後殿東都平以英乂權知東都留守時東都再經賊亂朔方軍及英乂魚朝恩等軍不能禁暴與囘紇縱掠坊市及鄭汝等州比屋蕩盡人悉以紙為衣或有祼身者李抱玉為鳳翔節度使大厯五年抱玉自鳳翔移鎮盩厔縣鳳翔將士以移鎮忿怨縱兵大掠鳯翔坊市因燒草積居人擾駭數日方定李忠臣為淮南節度使大厯二年同華節度周智光據州反忠臣入覲次潼關聞智光阻兵駐所部将健兒禦之及智光死忠臣進兵入華州大掠自赤水關二百里間畜産財物殆盡官吏至有著紙衣或數日不食者又大厯十一年與河陽三城使馬燧各率所部官兵次于鄭州逆賊李靈耀盜張旗幟來犯我師淮西軍驕而無謀河陽軍勇不設備及聞賊至忠臣惶遽退衂燧亦隨之頓軍于滎澤淮西士卒潰者十五六西至汝葉北至河雒道路相繼鄭州士庻悚駭竄避皆趣東都城鄭州村落殆空劉昌為宣武軍兵馬使徳宗貞元三年昌率其衆自坊州赴靈臺既次三原遂縱掠一夕時淮西散兵百餘人隸於昌及是昌歸罪淮西兵盡殺之王朝幹為渾瑊將吐蕃圍隴州瑊遣朝幹以衆二千戍鳳翔及岐山遂縱剽掠信宿方定劉悟穆宗時為昭義軍節度使時監軍劉承偕頗恃恩權甞對衆辱悟又縱其下以亂法悟不能平異日有中使至承偕宴之請悟悟欲往左右皆曰徃則必為其困辱衆因亂悟不止之遂擒承偕至牙門殺其二僕欲并害承偕悟救之獲免梁李思安為檢校左僕射亳州刺史思安性勇悍每統戎臨敵不大勝必大敗開平元年春率兵伐幽州營於桑乾河虜獲甚衆燕人大懼及軍廻潞累月不克師人多逸太祖怒甚詔疏其罪盡奪其官爵委本郡以民戸係焉踰嵗起之復令領兵亦無鉅績可紀胡規為北面招討使乾化初河南尹張宗奭奏規修河軍人擾村閭殺樹奪税戸絲羣衆以石磔人太祖曰我今以河南府積薪治敗岸且有将領何敢是耶翌日命宣徽院使趙殷衡押領規及六軍使已下徃都外閲視林木至榆林已來園林果木砍伐殆盡仍招伏軍人侵奪百姓財物下詔曰胡規比緣微効遂委劇權不能禁戢諸軍而敢侵凌百姓輙生狂計欲起亂階備見包藏何堪委用從來兇逆已露鋒鋩此際輕侮足量肝膽茍無極斷慮掇後艱胡規并男義方委宗奭准軍令處置其婦女任從所適都指揮使韓勍已下一十二人罸俸有差後唐李存信為都指揮使初朱瑄朱瑾再乞師於武皇武皇假道於魏州羅𢎞信委之乃令存信將歩騎三萬與李承嗣史儼㑹軍以拒汴人存信軍於華與朱瑾合勢頻挫汴軍汴師患之乃反間魏人存信御兵無法稍侵魏之芻牧者𢎞信乃與汴師通出師三萬攻存信軍存信揭營而退保於雒州晉丁審琪為延州節度使審琪部曲數千人失於簡御民甚苦之軍校賀行政等與審部連結聚衆攻城㡬遭屠滅頼隣道軍救觧幸獲保全尋受代歸闕周馬鐸漢末為申州刺史監兵在尉氏縣㑹太祖在澶淵為衆軍廹請為主王峻在京以許州節度使劉信是漢之宗室遣鐸至許州圖之鐸至信自殺鐸不能戢兵而㣲有所掠太宗知而怒之不時任使册府元龜卷四百四十五
