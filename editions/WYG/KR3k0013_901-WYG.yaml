body:
  text: 册府元龜卷九百一宋王欽若等撰總録部公直直服義公直滅私之謂公正曲之謂直君子之懿徳也自上古之世移至公之道廢則情勝於理恩克於義心繇利易政以勢遷自非時厥中庸好是正直執不囘之道守無頗之性則焉能獻替可否不以讎而掩賢閲實憲章不以親而害法臨事盡節靡顧於妻孥當官而行罔避於權右形奏列而無隠斥問遺而不通故能成剛毅之風全忠信之行先聖所以嘉歎良史所以攸書宜乎為後世之懿範也史魚為衛大夫孔子曰直哉史魚邦有道如矢邦無道如矢有道無道行直如矢言不曲叔向為晉大夫晉邢侯與雍子争鄐田邢侯楚申公巫臣之子也雍子者亦故楚人也久而無成士景伯如楚士景伯晉理官叔魚攝理攝代景伯韓宣子命斷舊獄罪在雍子雍子納其女於叔魚叔魚蔽罪邢侯蔽斷也邢侯怒殺叔魚與雍子於朝宣子問其罪於叔向叔向曰三人同罪施生戮死可也施行罪也雍子自知其罪而賂以買直鮒也鬻獄邢侯専殺其罪一也已惡而掠美為昏掠取也昏亂也貪以敗官為墨墨不潔之稱殺人不忌為賊忌畏也夏書曰昏墨賊殺逸書三者皆死刑臯陶之刑也請從之乃施邢侯而尸雍子與叔魚於市仲尼曰叔向古之遺直也言叔向之直有古人之遺風治國制刑不隠於親謂國之大問已所答當也至於他事則宜有隠三數叔魚之惡不為末減末薄也減輕也皆以正言之曰義也夫可謂直矣於義未安直則有之平丘之㑹數其賄也謂言凟貨無厭以寛衛國晉不為暴歸魯季孫稱其詐也謂言鲋能也以寛魯國晉不為虐邢侯之獄言其貪也以制刑書晉不為頗三言而除三惡加三利三惡暴虐頗三惡除則加三利殺親益榮榮名益也猶義也夫三罪唯答宣子問不可以不正其餘則以直傷義故重疑之解狐為魏大夫與荆伯桞有怨文侯問於解狐曰寡人將立西河守誰可用者解狐對曰荆伯桞者賢人殆可文侯曰是文侯將以荆伯桞為西河守荆伯桞問左右誰言我於君左右皆曰解狐也荆伯桞往見解狐而謝之曰子寛臣之過而言於君謹再拜謝解狐曰言子者公也怨子者私也直事以行怨子如故張弓射之走十歩而殁鉅子腹䵍秦之墨者鉅姓子通稱腹䵍字也其子殺人秦恵王曰先生之年長矣非有他子也寡人已令吏弗誅矣恵王秦孝公子也他異也先生之以此聽寡人也腹䵍對曰墨者之法曰殺人者死傷人者刑此所以禁殺傷人也夫禁殺傷人者天下之大義也王雖為之賜賜受也而令吏弗誅腹䵍不可不行墨者之法欲必行之怨其子也不許恵王遂殺之漢郅都為人勇有氣節公㢘不發私書問遺無所受請寄無所聽嘗稱曰已背親而出身固當奉職死節官下終不顧妻子矣官至少府卜式為太子太傅武帝時嵗小旱帝令百官求雨式言曰縣官當食租衣税而已今桑𢎞羊令吏坐市列販求利市列謂列肆烹𢎞羊天乃雨後漢任延拜武威太守光武親戒之曰善事上官無失名譽延對曰臣聞忠臣不私私臣不忠履正奉公臣子之節上下雷同非陛下之福善事上官臣不敢奉詔帝歎曰卿言是也馬嚴拜為五官中郎將行長樂衛尉事陳留太守嚴當之職乃言於章帝曰昔顯親侯竇固誤先帝出兵西域置伊吾盧屯煩費無益又竇勲受誅其家不宜親近京師是時勲女為皇后竇氏方寵時有側聽嚴言者以告竇憲兄弟繇是大失權貴心逢紀字元圖漢末冀州牧袁紹以紀統軍事初紹去董卓出奔與許攸及紀俱詣冀州紹以紀聰達有計䇿甚親信之與共舉事後審配任用與紀不睦或有䜛配於紹紹問紀紀稱配天性烈直古人之節不宜疑之紹曰君不惡之邪紀答曰先日所争者私情今所陳者國事紹善之卒不廢配配繇是更與紀為親善蜀楊洪為蜀郡太守後為越騎校尉領郡如故五年丞相諸葛亮北住漢中欲用張裔為留府長史問洪何如洪對曰裔天姿眀察長於治劇才誠堪之然性不公平恐不可専任不如留向朗朗情偽差少裔隨從目下效其器能於事兩善初裔少與洪親善裔流放在吳洪臨裔郡裔子郁給郡吏微過受罰不特原假裔後還聞之深以為恨與洪情好有損及洪見亮出至裔許具説所言裔答洪曰公留我子矣眀府不能止時人或疑洪意自欲作長史或疑洪知裔自謙不願裔處要職典後事也後裔與司監校尉岑述不和至于忿恨亮與裔書曰君昔在栢下營壊吾之用心食不知味後流近南海相為悲歎寢不安席及其来還委付大任同奬王室自以為與君古之石交也石交之道舉讎以相益割骨肉以相眀猶不相謝也况吾但委意於元儉而君不能忍耶論者繇是眀洪無私晉石苞為鄴典農中郎將時魏世王侯多居鄴下尚書丁謐貴傾一時並校時利苞奏列其事繇是益見稱郭瑗為尚書都令史時尚書杜預有所増損瑗多所校正之以公方著稱終於建平太守曹莫為石季龍大司農季龍將以少子世為太子世方十嵗母劉曜女有寵季龍與張舉李農定議勑公卿上書請立世莫不署名季龍使張豹問其故莫頓首曰天下業重不宜立少是以不敢署也季龍曰莫忠臣也然未達朕意張舉李農知吾心矣其令諭之晉王建立初仕後唐為代州虞侯時莊宗鎮晉陽以諸陵在郡遣使享祭其下有擾於民者必捕而笞之莊宗怒令收之多為眀宗所䕶繇是知名直仲尼有言曰民之生也直又曰叔向古之遺直也詩曰彼已之子邦之司直斯皆美正直之徳之謂也盖夫人者禀五行之秀肖二儀之形純粹内充剛毅外發危言正色必守其名節戴仁抱義以鎮於雅俗繇是遭慘毒之世而無所懼遇僣竊之主而無所謟或陳天災之應兆或言時政之闕失不乾没於榮利不朋比於權勢斯盖古人所難也若乃褊狷任已訐譎為務者固在夫君子之後也亦用論次冀觀之者自擇焉能意見齊宣王能姓意名王曰寡人聞子好直有之乎對曰意焉能直聞好直之士家不處亂國身不見汙君今身得見王而家宅故齊意焉能直宣王怒曰野士能意曰少而好之長而行之王胡不能與野士以章其所好王乃舍之後漢郅惲字君章汝南人善天文知漢必再命西至長安乃上書王莽曰臣聞天地重其人惜其物故運機衡垂日月含元包一甄陶品類顯表紀世圗録豫設漢歴久長孔為赤制不使愚惑殘人亂時智者順以成徳愚者逆以取害神器有命不可虚獲上天垂戒欲悟陛下令就臣位轉禍為福劉氏享天永命陛下順節盛衰取之以天還之以天可謂知命矣若不早圖是不免於竊位也且堯舜不以天顯自與故禪天下陛下何貪非天顯以自累也天為陛下嚴父臣為陛下孝子父教不可廢子諫不可拒惟陛下留神莽大怒即收繫詔獄劾以大逆猶以惲據經䜟難即害之使黄門近臣脅惲令自告狂病恍忽不覺所言惲乃瞋目詈之曰所陳皆天文聖意非狂人所能造遂繫獄頃冬會赦得出乃與同郡鄭敬南遁蒼梧後為長沙太守左轉芒令免荆邯平陵人為公孫述騎都尉述欲出兵以問羣臣博士吳柱曰昔武王伐殷先觀兵孟津八百諸侯不期同辭然猶還師以待天命未聞無左右之助而欲出師千里之外以廣封疆者也邯曰今東帝無尺土之柄驅烏合之衆跨馬䧟敵所向輙平不亟乗時與之分功而坐談武王之説是效隗囂欲為西伯也井丹字大春扶風郿人性清髙未嘗脩刺候人建武末沛王輔等五王居北宫皆好賔客更遣請丹不能致信陽侯隂就光烈皇后弟也以外戚貴盛乃詭説五王求錢千萬約能致丹而别使人要刼之丹不得已既至就故為設麥飯葱葉之食丹推去之曰以君侯能供甘㫖故来相過何其薄乎更致盛饌乃食及就左右進輦丹笑曰吾聞桀駕人車豈此邪坐中皆失色就不得已而令去輦自是隠門不闗人事以夀終吳良字大儀齊國臨淄人初為郡吏嵗旦與掾吏入賀門下掾王望舉觴上夀謟稱太守功徳良於下坐勃然進曰望佞邪之人欺謟無狀願勿受其觴太守斂容而止讌罷轉良為功曹恥以言受進終不肯謁後為司徒長史每處大議輙據經典不希㫖偶俗以徼時譽第五倫字伯魚亰兆人或問倫曰公有私乎對曰昔人有與吾千里馬者吾雖不受每三公有所選舉心不能忘而亦終不用也吾兄子常病一夜十往退而安寢吾子有疾雖不省視而竟夕不眠若是者豈可謂無私乎倫官至司空孔季彦魯國人世舉孝㢘不就安帝延光元年河西大雨雹大者如斗帝詔有道術之士極陳變異乃詔季彦見於徳陽殿帝親問其故對曰此皆隂乗陽之徴也今貴臣擅權母后黨盛陛下宜脩聖徳慮此二者帝黙然左右皆惡之唐檀豫章人安帝元初七年郡界有芝草生太守劉祗欲上言之以問檀檀對曰方今外戚豪盛陽道微弱斯豈嘉瑞乎祗乃止之范滂字孟博汝南人為郡功曹繫獄尚書霍諝理之及得免到京師往候諝而不為謝或有讓滂者對曰昔叔向嬰罪祁奚救之未聞羊舌有謝恩之辭祁奚有自伐之色竟無所言蜀李邈廣漢郪人振威將軍劉璋為益州牧時以邈為牛鞞長先主領牧為從事正旦命行酒得進見讓先主曰振威以將軍宗室肺腑委以討賊元功未效先寇而滅邈以將軍之取鄙州甚為不宜也先主曰知其不宜何以不助之邈曰匪不敢也力不足爾有司將殺之諸葛亮為請得免晉李憙魏末宣帝辟不就及景帝輔政命憙為大將軍從事中郎憙到引見謂憙曰昔先公辟君而君不應今孤命君而君至何也對曰先君以禮見待憙得以禮進退眀公以法見繩憙畏法而至帝甚重之閻纉為西戎校尉司馬及司空張華遇害賈謐被誅朝野震悚纉獨撫華尸慟哭曰早語君遜位而不肯今果不免命也夫過叱賈謐尸曰小児亂國之繇誅其晚矣庾衮嘗與諸兄弟過邑人陳凖兄弟諸兄弟友之皆拜其母衮獨不拜凖弟徽曰子不拜吾親何衮曰未知所以拜也夫拜人之親者將自同於人之子也其義至重衮敢輕之乎遂不拜凖徽歎曰古有亮直之士君近之矣君若當朝則社稷之臣歟君若握兵臨大節孰能奪之方今徴聘君實宜之後舉異行不降志崔洪少以清厲顯名骨鯁不同於物人之有過輙面折之而退無後言歴吏部尚書司農卿卒官劉殷趙王倫簒位孫秀夙重殷名以散騎常侍徴之殷逃奔鴈門及齊王冏輔政辟為大司馬軍諮祭酒既至謂殷曰先王虚心詔君君不至今孤辟君君何能屈也殷曰世祖以大聖應期先王以至徳輔世既堯舜為君稷契為佐故殷希以一夫而拒千乗為不可廻之圖幸邀唐虞之世是以不懼斧鉞之戮爾今殿下以神武眷姿除殘反政然迹稍麄嚴威滋肅殷若復爾恐招華士之誅故不敢不至也冏竒之謝琨安之孫也桓𤣥嘗欲以安宅為營琨曰召伯之仁猶恵及甘棠文靖之徳更不保五畝之宅邪元聞慙而止後至左僕射後趙姚弋仲為石季龍將季龍末梁犢敗李農于滎陽季龍大懼馳召弋仲率其部衆八千餘人屯于南郊輕騎至鄴時季龍病不時見弋仲引入領軍省賜其所食之食弋仲怒不食曰召我擊賊豈来覔食邪我不知上存亡若一見雖死無恨左右言之乃引見弋仲數季龍曰兒死来愁邪乃至于疾兒小時不能使好人輔相至令相殺兒自有過責其下人太甚故反爾汝病久所立兒小若不差天下必亂當宜憂此不煩憂賊也犢等因思歸之心共為姦盜所行殘賊此成擒爾老羌請効死前鋒使一舉而了弋仲性狷且俗無尊卑皆汝之季龍怒而不責南燕封孚渤海人為慕容徳吏部尚書徳死超嗣位政出權嬖多違舊章軌憲日頽殘虐滋甚孚屢盡禆救超不能納也後臨軒謂孚曰朕於百王可方誰孚對曰桀紂之主超大慙怒孚徐歩而出不為改容司空鞠仲失色謂孚曰與天子言何其亢厲宜應還謝孚曰行年七十墓木已拱惟求死所爾竟不謝宋鄭鮮之晉末為御史中丞初髙祖少時事戎旅不經渉學及為宰相頗慕風流時或言論人皆依違之不敢難也鮮之難必切至未嘗寛假要湏髙祖辭窮理屈然後置之髙祖或有時慙恧變色動容既而謂人曰我本無術學言義尤淺此時言論諸賢多見寛容唯鄭不爾獨能盡人之意甚以此感之時人謂為格佞顔延之文帝時為光禄勲致仕元㓙弑立以為光禄大夫先是延之子竣為孝武南中郎諮議叅軍及孝武義師入討竣叅定密謀兼造書檄劭召延之示以檄文問曰此筆誰所造延之曰竣之筆也又問何以知之延之曰竣筆體臣不容不識劭又曰言辭何至乃爾延之曰竣髙尚不顧老父何能為陛下劭意乃釋由是得免梁裴之髙為豫州刺史侯景之亂元帝召為侍中到江陵時之髙第六弟之悌在侯景中或傳之悌斬侯景元帝使兼中書舍人黄羅漢報之髙之髙竟無言直云賊自殺賊非之髙所聞元帝深嗟其介直後魏崔光韶河東武城人為廷尉卿孝莊永安末還鄉里刺史元弼前妻是光韶之繼室兄女而弼貪惏多諸不法光韶以親情亟相非責弼衘之時耿翔反於州界弼誣光韶子通與賊連結囚其合家考掠非理而光韶與之辯争辭色不屈會樊子鵠為東道大使知其見枉理出之時人勸令詣樊陳謝光韶曰羊舌大夫已有成事何勞往也子鵠亦歎尚之後周韋夐志尚夷簡不仕時晉公䕶執政廣營第宅嘗召夐至宅訪以政事夐仰視其堂徐而歎曰酣酒嗜音竣宇雕墻有一於此未或弗亡䕶不悦有識者以為知言隋元諧為寧州刺史頗有威恵然剛愎好排詆不能取媚於左右嘗言於帝曰臣一心事主不曲取人意帝曰宜終此言李文博為司𨽻從事在雒下曽詣房𤣥齡相送於衢路𤣥齡謂之曰公生平志尚唯在正直今既得為從事故應有㑹素心比来激濁揚清所為多少文博遂奮臂厲聲曰夫清其流者必潔其源正其末者湏端其本今治源混亂雖日免十貪郡守亦何所益其瞽直疾惡不知忌諱皆此類也劉子翼為秘書學士秘書監栁顧言甚重之性不容非朋僚有短長面折之安平李百藥嘗稱曰劉四雖復罵人人都不恨唐蕭瑀為司空性端直鯁亮好詰人之短不能容衆意鄙浮華而務善道趙光竒新店野人也貞元三年徳宗畋於新店幸光竒家問曰百姓樂乎對曰不樂帝曰仍嵗頗稔何不樂乎對曰盖繇陛下詔令不信於人所以然也前詔云兩税之外悉無他徭今非理而誅求者殆過之又云和糴於百姓曽不識一錢而强取之始云所糴粟麥納於道次今則遣政於京西行營動過數百里車摧牛斃破産奉役不能支也百姓愁苦若此何有於樂乎雖頻降優恤之詔而有司多不奉之亦恐陛下深在九重未之知也帝感異之因詔復降其家武儒衡元和中為諫議大夫兵部侍郎守道不囘嫉惡太甚終不至大任服義盖古之君子不飾其非不遂其過周旋進退惟義之從其或言之失中事有踰矩慮雖素定悔尚可追乃有方聞之士形於規誨陳理道以申救納箴諷以成徳辭至於違拂意絶於將迎而能降志以延納虚懐而聽受引咎以歸乎已稱善以加於人渙然革心曽不旋踵至或既往之亹其傷盖多已濟之惡云補無及亦能追責其非深甘其戾發歎以自刼折節而為謝斯皆賢達之風軌可以垂訓者焉趙盾晉大夫宣子也初邾文公元妃齊姜生貜且二妃晉姬生捷菑文公卒邾人立定公捷菑奔晉趙盾以諸侯之師八百乗納捷菑于邾八百乗六萬人言力有餘邾辭曰齊出貜且長貜且定公宣子曰辭順而弗從不祥乃還立適以長故曰辭順范鞅晉大夫獻子也獻子聘於魯問具山敖山魯人以其鄉對獻子曰不為具敖乎對曰先君獻武之諱也獻子歸徧戒其所知曰人不可以不學乎吾適魯而名其二諱為笑焉唯不學也人之有學猶木之有枝葉也木有枝葉猶庇䕃人而况君子之學乎趙武晉大夫文子也文子為室斵其椽而礱之張老夕焉而見之不謁而歸文子聞之駕而往曰吾不善子亦告我何其速也對曰天子之室斵其椽而礱之加密石焉諸侯礱之大夫斵之士首之備其物義也從其等禮也今子貴而忘義富而忘禮吾懼不免何敢以告文子歸令之勿礱也匠人請皆斵之文子曰止為後世之見之也其斵者仁者之為也其礱者不仁者之為也文子成室晉大夫發焉作室成晉君獻之謂賀也諸大夫亦發禮以往張老曰美哉輪焉美哉奐焉心譏其奢也輪輪困言髙大奐言衆多歌於斯哭於斯聚國族於斯祭祀死䘮燕㑹於此足矣言此者欲防其後復為文子曰武也得歌於斯哭於斯聚國族於斯是全要領以從先大夫於九亰也北面再拜稽首全要領者免於刑誅也晉卿大夫之墓地在九原京盖字之訛當為原君子謂之善頌善禱善頌謂張老之言善禱謂文子之言禱求也趙鞅晉大夫簡子也簡子使尹鐸為晉陽曰必隳其壘培隳壊也壘荀寅士吉射圍趙氏所作壘壁也吾將往焉若見壘培是見寅與吉射也累塹曰培尹鐸往而増之増髙其壘因以自備簡子如晉陽見壘怒既不隳又増之故怒曰必殺鐸也而後入大夫辭之不可曰是昭餘讎也昭明也眀怨讎以辱郵無正進無正晉大夫郵良伯樂耳曰昔先主文子少亹於難文子趙簡子之祖趙武亹離也難謂莊姬之䜛趙氏是討也從姬氏公宫姬氏莊姬趙朔之妻文子之母晉景公之娕姬淫於趙嬰兄趙同趙括放之姬䜛同括景公殺之文子從之莊姬於公宫也有孝徳以出在公族為公族大夫有恭徳以升在位布鄉位有武徳以羞為正卿正卿上卿羞進有温徳以成其名譽失趙氏之典刑典常刑法而去其師保在公宫故無師保基於其身以克復其所基始也始更修之於身以能復其先及景子長於公宫景子文子之子簡子之父越成從其王母在公宫未及教訓而嗣立矣亦能纂脩其身以受先業無謗於國順徳以學子學教擇言以教子擇師保以相子今吾子嗣位有文之典刑有景之教訓重之以師保加之以父兄同宗之父兄子皆疏之以及此難荀士之難夫尹鐸曰思樂而喜思難而懼人之道也委士可為師保吾何不増言見壘培可以戒懼足當師保何為不増是以修之庶曰可以鑑而鳩趙宗乎鑑鏡鳩安若罰之是罰善也罰善必賞惡臣何望矣簡子説曰微子吾㡬不為人矣㣲無以免難之賞賞尹鐸司馬子期楚公子結也子期欲以其妾為内子訪之左史倚相曰吾有妾而愿欲笄之其可乎對曰昔先大夫子囊違王之命子夕嗜芰子木有羊饋而無芰薦君子曰違而道穀陽豎愛子反之勞也而獻飲焉以弊於鄢芋尹申亥從靈王之欲以隕於乾谿君子曰從而逆君子之行欲其道也故進退周旋唯道之從夫子木能違若敖之欲以之道而去芰薦吾子經營楚國而欲薦芰以干之其可乎子期乃止子亹楚申公也左史倚相廷見申公子亹子亹不出左史謗之舉伯以告舉伯楚大夫子亹怒而出曰女無亦謂我老耄而舍我而又謗我八十曰耄舍棄也左史曰唯子老耄故欲見以交儆子交夹若子方壯能經營百事倚相將奔走承序承受事業次序也於是不給而何暇得見給共昔衛武公年數九十有五矣武公衛僖公之子共伯之弟武公和猶箴儆於國箴刺儆戒曰自卿以下至于師長士師長大夫士衆士茍在朝者無謂我耄而舍我舍謂不諫戒在轝有旅賁之規規諫旅賁勇力之士掌載戈盾夹車而趨車上則持轉位宁有官師之典中延之左右謂之位門屏之間謂之宁師長典常也倚几有誦訓之諫誦訓工師所誦之諫書之於几也居寢有􅉏御之箴􅉏近臨事有瞽史之道事戎機也瞽樂太師掌詔吉㓙史太史掌詔禮事宴居有師工之誦師小師工瞽矇也誦誦箴諫也史不失書矇不失誦以訓御之御進於是乎作懿戒以自儆也懿大雅抑之萹懿讀曰抑衛武公刺厲王亦以自儆也及其没也謂之叡聖武公叡眀也書叡作聖諡法曰威强而叡曰武也子實不叡聖於倚相何害周書曰文王至于日中昃不遑暇食日映日昃易曰日中則昃恵于小民惟政之恭文王猶不敢惰今子老楚國而欲自安也以禦數者王將何為禦止也數者謂箴戒誹謗也為人臣尚如此王將復何為若嘗如此楚其難哉難以為治子亹懼曰老之過也老子亹名乃趣見左史游吉鄭大夫子太叔也初晉合諸侯于平丘子産子太叔相鄭伯以㑹子産以幄幕九張行張幕軍旅之帳子太叔以四十既而悔之每舍損焉及會亦如之亦九張也言子産之適宜太叔之從善罕虎鄭大夫子皮也罕虎與魯叔孫婼齊國弱宋華定衛北宫喜許人曹人莒人邾人滕人薛人杞人小邾人如晉葬平公子皮將以幣行見新君之贄子産曰䘮焉用幣用幣必百兩載幣用車百乗百兩必千人千人至將不行行用也不行必盡用之不得見新君將自費用盡幾千人而國不亡言千人之費不可數子皮固請以行既葬子皮盡用其幣歸謂子羽曰非知之實難將在行之言不患不知患不能行夫子知之矣我則不足言已出子産之戒既知其不可而遂行之足我之不足書曰欲敗度縱敗禮逸書我之謂矣夫子知度與禮矣我實縱欲而不能自克也欲因䘮以慶新君故縱而行之不能自勝韓起晉大夫宣子也宣子有環其一在鄭商玉環同工共朴自工為䨥宣子謁諸鄭伯謁請也子産弗與子太叔子羽謂子産曰韓子亦無㡬求言所求少晉國亦未可以二晉國韓子不可偷也偷薄也子産曰吾非偷晉而有二心將終事之是以弗與及鄭六卿餞宣子於郊宣子私覲於子産以玉與馬曰子命起舍夫玉是賜我玉而免吾死也敢不藉手以拜以玉馬藉手拜謝子産翟璜事魏文侯文侯問李克先生嘗教寡人曰家貧則思良妻國亂則思良相今所置非成則璜文侯弟名成二子何如李克對曰臣聞之卑不謀尊踈不謀戚臣在闕門之任不敢當命文侯曰先生臨事勿讓李克曰君不察故也居視其所親富視其所與達視其所舉窮視其所不為貧視其所不取五者足以定之矣何待克哉文侯曰先生就舍寡人之相定矣李克趨而出過翟璜之家翟璜曰今者聞君召先生而卜相果誰為之李克曰魏成子為相矣翟璜忿然作色曰以耳目之所覩記臣何負於魏成子西河之守臣之所進也君内以鄴為憂臣進西門豹君謀欲伐中山臣進樂羊中山已拔無使守之臣進先生君之子無傅臣進屈侯鲋臣何以負於魏成子李克曰且子之言克於子之君者豈將比周以求大官哉君問而置相非成則璜二子何如克對曰君不察故也居視其所親富視其所與達視其所舉窮視其所不為貧視其所不取五者足以定之矣何待克哉是以知魏成子之為相也且子安得與魏成子比乎魏成子以食禄千鍾什九在外什一在内是以東得卜子夏田子方叚干木此三人者君以師之子之所進五人者君皆臣之子惡得與魏成子比也翟璜逡巡再拜曰璜鄙人也失對願卒為弟子卜商字子夏䘮其子而䘮其眀眀目精曽子弔之曰吾聞之也朋友䘮眀則哭之痛之曽子哭子夏亦哭曰天乎予之無罪也怨天罰無罪曽子怒曰商女何無罪也吾與女事夫子於洙泗之間言其有師也洙泗魯水名退而老於西河之上西河龍門至華隂之地使西河之民疑女於夫子爾罪一也言其不稱師也䘮爾親使民未有聞焉爾罪二也言居親䘮無異稱䘮爾子䘮爾眀爾罪三也言隆於妻子而曰爾何無罪與子夏投其杖而拜曰吾過矣吾過矣謝之且服罪也吾離羣而索居亦已久矣羣謂同門朋友也索猶散也曽參字子輿南武城人也弔於負夏負夏衛地主人既祖填池祖謂移柩車去載處為行始也填池當為奠徹聲之誤也奠徹謂徹遣奠設祖奠推柩而反之反於載處榮㑹子弔於更始降婦人而後行禮禮既祖而婦又降今反柩婦人辟之復升堂矣柩無反而反之而又降婦人盖欲矜賔於此婦人皆非從者曰禮與恠之曽子曰夫祖者且也且未定之辭且胡為其不可以反宿也給説從者又問諸子游曰禮與疑曽子言非子游曰飯於牖下小斂於户内大斂於阼殯於客位祖於庭葬於墓所以即遠也故䘮事有進而無退眀曽柩非曽子聞之曰多矣乎予出祖者善子游言且服曽子襲裘而弔子游裼裘而弔曽子指子游而示人曰夫夫也為習於禮者如之何其裼裘而弔也曽子盖知臨䘮無節大夫猶言此丈夫也子游於時名為習禮主人既小斂袒括髮子游趨而出襲裘帯絰而入於主人變乃變也所子者朋友曽子曰我過矣我過矣夫夫是也服且善子游孟嘗君為齊相出記問門下諸客誰習計㑹能為文收責於薛者乎馮驩署曰能孟嘗君怪之曰此誰也左右曰乃歌夫長鋏歸来者也孟嘗君笑曰客果有能也吾負之未嘗見也請而見之謝曰文倦於是憒於憂而性懧愚沈於國家之事開罪於先生先生不羞乃有意欲為收責於薛乎馮驩曰願之於是約車治裝載劵契而行辭曰責畢收以何市而反孟嘗君曰視吾家所寡有者驅而之薛使吏召諸民當償者悉来合劵劵徧合赴矯命以責賜諸民因燒其劵民稱萬嵗長驅到齊晨而求見孟嘗君怪其疾也衣冠而見之曰責畢收乎来何疾也曰收畢矣以何市而反馮驩曰君云視吾家所寡有者臣竊計君宫中積珍寳狗馬實外廐美人充下陳君家所寡有者以義爾竊以為君市義孟嘗君曰市義奈何曰今君有區區之薛不拊愛子其民因而賈利之臣竊矯君命以責賜諸民因燒其劵民稱萬歳乃思所以為君市義也孟嘗君不悦曰諾先生休矣孟嘗君逐於齊而復反譚拾子迎之於境謂孟嘗君曰君得無有所怨齊士大夫乎孟嘗君曰有君滿意殺之乎孟嘗君曰然譚拾子曰事有必至理有固然君知之乎孟嘗君曰不知譚拾子曰事之必至者死也理之固然者富貴則就之貧賤則去之此事之必至理之固然者請以市論市朝則滿夕則虚非朝愛市而夕憎之也求存故往亡故去願君勿怨孟嘗君乃取所怨五百牒削去之不敢以為言田單齊將也將攻狄往見魯仲連仲連曰將軍攻狄不能下也田單曰臣有五里之城七里之郭破萬乗之燕復齊墟攻狄而不下何也上車弗謝而去遂攻狄三月而不克之齊嬰兒謡曰大冠若箕修劍柱頥攻狄不能下壘枯丘田單懼乃問魯仲連曰日者先生謂單不能下狄請問其説魯仲連曰將軍之在即墨坐而織蕢立則杖鍤為士卒倡曰何往矣宗廟亡矣歸於何黨矣當此之時將軍有死之心而士卒無生之氣聞若言莫不揮泣奮臂而欲戰此所以破燕也當今將軍東有夜邑之奉西有淄上之虞黄金横𢃄而馳乎淄澠之間有生之樂無死之心所以不勝者也田單曰單有心先生志之矣眀日乃厲氣循城立於矢石之所乃援枹皷之狄人乃下吳起為西河守甚有聲名而魏置相相田文起不悦謂田文曰請與子論功可乎田文曰可起曰將三軍使士卒樂死敵國不敢謀子孰與起文曰不如子起曰治百官親萬民實府庫子孰與起文曰不如子起曰守西河而秦兵不敢東鄉韓趙賔從子孰與起文曰不如子起曰此三者子皆出吾下而位加吾上何也文曰主少國疑大臣未附百姓不信方是之時屬之於子乎屬之於我乎起黙然良久曰屬之子矣文曰此乃吾所以居子之上也吳起乃自知弗如田文㢘頗為趙將時藺相如為上卿位在㢘頗之右㢘頗曰我為趙將有攻城野戰之功而藺相如徒以口舌為勞而位居我上且相如素賤人吾羞不忍為之下宣言曰我見相如必辱之相如聞不肯與㑹相如每朝時常稱病不欲與㢘頗争列已而相如出望見㢘頗相如引車避匿於是舍人相與諫曰臣所以辭親戚而事君者徒慕君之髙義也今君與㢘頗同列㢘君宣惡言而君畏匿之恐懼殊甚且庸人尚羞之况於將相乎臣等不肖請辭去藺相如固止之曰公之視㢘將軍孰與秦王曰不若也相如曰夫以秦王之威而相如庭叱之辱其羣臣相如雖駑獨畏㢘將軍哉顧吾念之彊秦之所以不敢加兵於趙者徒以吾兩人在也今兩虎共鬬其勢不俱生吾所以為此者以先國家之急而後私讎也㢘頗聞之肉袒負荆因賔客至藺相如門謝罪曰鄙賤之人不知將軍寛之至此也卒相與驩為刎頸之交漢翟方進舉眀經遷議郎是時宿儒有清河胡常宿久舊也與方進同經常為先進名譽出方進下常官學雖在前而名譽不及方進心害其能論議不右方進毁短也方進知之候伺常大都授時都授謂總集諸生大講論遣門下諸生至常所問大義疑難因記其説如是者久之常知方進之宗讓已宗尊也内不自得其後居士大夫之間未嘗不稱述方進遂相親友後漢寇恂為潁川守執金吾賈復在汝南部將殺人於潁川恂捕得繫獄時尚草創軍營犯法率多相容恂乃戮之於市復以為恥還過潁川謂左右曰吾與寇恂並列將帥而今為其所陷大丈夫豈有懐侵怨而不决之者乎今見恂必手劒之恂知其謀不欲與相見谷崇曰崇將也得帯劔侍側卒有變足以相當恂曰不然昔藺相如不畏秦王威而屈於㢘頗者為國也區區之趙尚有死義吾安可以忘之乎乃勑屬縣盛供具儲酒醪執金吾軍入界一人皆兼二人之饌恂乃出迎於道稱疾而還賈復勒兵欲追之而吏士皆醉遂過去恂遣谷崇以狀聞帝乃徴恂恂至引見時復先在坐欲起相避帝曰天下未定兩虎安得私鬬今日朕分之分猶解也於是並坐極歡遂共車同出結友而去陳蕃為光禄勲時主事范滂執公儀詣蕃蕃不止之滂懐恨投版棄官而去郭林宗聞而讓蕃曰若范孟博者豈宜以公禮格之今成其去就之名得無自取不優之議也蕃乃謝焉孔融為北海相在郡教選計當任公卿之才乃以鄭𤣥為計掾彭璆為計吏邴原為計佐融有所愛一人嘗盛嗟嘆之後恚望欲殺之朝吏皆請時其人亦在坐叩頭流血而融意不解原獨不為請融謂原曰衆皆請而君何獨不原對曰眀府於某本不薄也嘗言嵗終當舉之此所謂吾一子也如是朝吏受恩未有在某前者矣而今乃欲殺之眀府愛之則引而方之於子憎之則推之欲危其身原愚不知眀府以何愛之以何惡之融曰某生於㣲門吾成就其兄弟收擢而用之某今孤負恩施夫善則進之惡則誅之固君道也往者應仲遠為泰山太守舉一孝㢘旬月之間而殺之夫君人者厚薄何常之有原對曰仲遠舉孝㢘殺之其義焉在夫孝㢘國之俊選也舉之若是則殺之非也若殺之是則舉之非也詩云彼已之子不遂其媾盖譏之也語云愛之欲其生惡之欲其死既欲其生又欲其死是惑也仲遠之惑甚矣眀府奚取焉融乃大笑曰吾但戲爾原又曰君子於其言出乎身加乎民言行君子之樞機也安有欲殺人而可以為戲者哉融無以答魏鍾繇字元常與荀攸善繇言我每有所行反覆思惟自謂無以易以咨公達輙復過人意位至太傅晉劉遐為北中郎將兗州刺史眀帝太寧初自彭城移屯泗口王含反遐與蘇峻俱赴亰都含敗隨丹陽尹温嶠追含至于淮南遐頗放兵虜掠嶠曰天道助順故王含勦絶不可因亂為亂也遐深自陳而拜謝陸玩成帝時為司空既拜有人詣之索盃酒㵼置柱梁之間呪曰當今乏材以爾為柱石莫傾人梁棟邪玩笑曰戢卿良箴何攀為廷尉平時廷尉卿諸葛冲以攀蜀士輕之及其斷疑獄冲始歎服王澄為荆州刺史行經陳留太守吕豫遣吏迎之時陳留為大郡號稱多士澄入境問吏曰此郡人士為誰吏曰有蔡子尼江應元是時郡人多居大位者澄以其姓名問曰甲乙等非君郡人邪吏曰是也曰然則何以但稱此二人吏曰向謂君侯問人不謂問位澄笑而止到郡以吏言謂豫曰舊名此郡有風俗果然小吏亦知如此髙崧為侍中是時豫州都督謝萬疲於親賔相送萬卧在室崧徑造之謂曰卿今疆理西藩何以為政萬粗陳其意崧便為叙刑政之要數百言萬遂起坐呼崧小字曰阿酃故有才具邪宋顔延之為光禄大夫與張鏡鄰居延之飲酒喧呼不絶而鏡静翳無言聲後延之於籬邊聞其與客語取胡牀坐聽辭義清𤣥延之心服謂賔客曰彼有人焉繇此不復酣呌梁蕭琛范縝外弟也縝性質直好危言髙論不為士友所安唯與琛相善琛名曰口辯每服縝簡詣後魏李謐少好學博通諸經嘗詣侍中太常卿劉芳推問音義語及中代興廢之繇芳乃歎曰君若遇髙祖侍中太常非僕有也髙綽以風槩立名㑹尚書令髙肇拜司徒綽送迎往来時封軌為考功郎中以方直自業竟不詣綽顧不見軌乃遽歸曰吾一生自謂無愆規矩今日舉錯不如封生逺矣隋薛道衡才髙當世以髙構有清鑒所為文章必先以草呈構有所詆訶道衡未嘗不嗟伏仕至司𨽻大夫唐李晦為檢校雍州長史私第有樓下臨市肆其人嘗候晦言曰㣲賤之人雖則禮所不及然家有長幼不欲外人窺之家逼眀公之樓出入非便請從此辭晦即自毁其樓李紳為淮南節度使因科蛤為屬邑令所抗云奉命取蛤且非其時年冬凍寒滴水成凍蛤若生於淺水猶可渉脛而求蛤既處於深泉非没身而不取貴賤則異性命不殊紳慙而止册府元龜卷九百一
