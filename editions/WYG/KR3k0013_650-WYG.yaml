  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_650-1a}
body:
  text: 册府元龜卷六百五十宋王欽若等撰貢舉部應舉觀國之光著乎大易之象有道則見􅂷諸素王之說故策名筮仕起家從政乃士子之常道也粤自漢氏勃興儒術大盛懸科以取士下詔以徴賢暨魏晉而下至五代風流靡絶條目非一繇是丘園特起之秀巖石髙臥之伍或文足以經國或學足以待問或力穡自給或篤行無改或究隂陽之變或窮政教之弊莫不褎然克賦卓爾在庭第之甲科靡之好爵者已漢董仲舒少治春秋孝景時為愽士武帝即位仲舒以賢良對策對畢天子以仲舒為江都相公孫𢎞菑川薛人也年四十餘乃學春秋雜說武帝初即位年六十以賢良徴為博士倪寛千乘人也治尚書以射策為掌故嚴助㑹稽呉人嚴夫子子也夫子嚴忌也或言族家子也亦云夫子之族子也郡舉賢良對策百餘人武帝善助對繇是獨擢為中大夫王吉少好學明經以郡吏舉孝亷為郎後遷雲陽令舉賢良為昌邑中尉駿吉子也以孝亷為郎貢禹以明經潔行著聞徴為博士凉州刺史病去官復舉賢良為河南令龔勝楚人好學明經為郡吏三舉為孝亷以楚王國人不得宿衞補吏再為尉壹為丞勝輙至官廼去州舉茂才為重泉令鮑宣好學明經為縣鄉嗇夫守束州丞後為都尉太守功曹舉孝亷為郎翟方進經學明習以射策甲科為郎杜鄴少孤其母張敞女鄴壯從敞子吉學問得其家書以孝亷為郎何武蜀郡郫縣人也詣博士受業治易以射策甲科為郎又光禄勲舉四行遷為鄠令王嘉以明經射策甲科為郎坐戸殿門失闌免戸止也嘉掌守殿門止不當入者而失闌入之故坐免也光禄勲于永除為掾察亷為南陵丞復察亷為長陵尉鴻嘉中舉敦樸能直言召見宣室對政事得失超遷大中大夫師丹治詩事匡衡舉孝亷為郎元帝末為博士免建始中州舉茂才復補博士召信臣九江壽春人也以明經甲科為郎後漢王方中牟名士也魯恭為中牟令㑹詔百官舉賢良方正恭薦方章帝即徴方詣公車禮之與公卿所舉同方致位侍中魯丕恭弟也章帝建初元年詔舉賢良方正大司農劉寛舉丕時對策者百有餘人惟丕在高第除為議郎魏覇濟隂句陽人也句音鈎建初中舉孝亷韋彪好學洽聞雅稱儒宗建武末舉孝亷除郎中譙𤣥巴郡閬中人也少好學能說易春秋成帝永始二年有日蝕之災乃詔舉敦樸遜譲有行義者各一人州舉𤣥詣公車對策髙第拜議郎李業習魯詩師博士許晃平帝元始中舉明經除為郎袁安祖父良習孟氏易平帝時舉明經為太子舍人安少傳良學為人嚴重後舉孝亷為隂平長蔡茂哀平間以儒學顯徴試博士對策陳災異以髙等擢拜議郎遷侍中景丹馮翊櫟陽人也少學長安王莽時舉四科丹以言語為固德侯相馮豹好儒學以詩春秋教麗山下麗音力之切舉孝亷拜尚書郎申屠剛質性方直舉賢良方正時王莽專朝罷歸田里郅夀善文章以亷能稱舉孝亷稍遷冀州刺史王堂廣漢郪人也初舉光祿茂才遷穀城令蘇章少博學能屬文安帝時舉賢良方正對策髙第為議郎陸康少仕郡以義烈稱刺史臧旻舉為茂才除髙成令鄭𤣥㑹稽山隂人也少為鄉嗇夫太守第五倫行春見而深竒之召署督郵舉孝廉桓彬字彦林少與蔡邕齊名初舉孝亷拜尚書郎徐防祖父宣為講學大夫父憲亦傳宣業防少習父祖學永平中舉孝亷除為郎張敏河間鄚人也建初二年舉孝亷四遷胡廣字伯始舉孝亷既到京師試以章奏安帝以廣為天下第一劉焉江夏竟陵人也以宗室拜郎中去官居陽城山精學教授舉賢良方正稍遷南陽太守袁術司空逄之子也少以俠氣聞後頗折節舉孝亷累遷至河南尹王渙廣漢郪人也初為太守陳寵功曹舉茂才除温令第五訪京兆長陵人也仕郡為功曹察孝亷補新都令劉矩沛國蕭人也少有髙節舉孝亷稍遷雍丘令劉寵東萊牟平人也以明經舉孝亷除東平陵令陽球漁陽泉州人也性嚴厲好申韓之學初舉孝亷補尚書郎張興潁川鄢陵人也習梁丘易以教授舉孝亷為郎戴慿汝南平輿人也習京氏易郡舉明經試徴博士拜郎中周防汝南汝陽人也師事徐州刺史蓋豫受古文尚書經明舉孝亷拜郎中杜根潁川定陵人也性方實好絞直絞急也永初元年舉孝亷為郎中劉陶潁川潁隂人也陶為人居簡不修小節舉孝亷除順陽長李雲甘陵人也性好學善隂陽初舉孝亷再遷白馬令謝弼中直方正為鄉邑所宗師建寧二年詔舉有道之士弼與東海陳敦𤣥莬公孫度俱對䇿皆除郎中蓋勲燉煌廣至人也家世二千石初舉孝亷為漢陽太守臧洪廣陵射陽人也體貌魁梧有異姿舉孝亷補即丘長左雄南郡湼陽人也安帝時舉孝亷稍遷兾州刺史周舉汝南汝陽人也博學洽聞為儒者所宗舉茂才為平丘令陳龜上黨泫氏人也少有志氣永建中舉孝亷五遷五原太守崔瑗早孤銳志好學初辟車騎將軍閻顯府被斥後舉茂才遷汲令崔實瑗子也少沈静好典籍桓帝初詔公卿郡國舉至孝獨行之士實以郡舉徴詣公車除為郎中王龔山陽髙平人也初舉孝亷稍遷青州刺史龔子暢少以清實為稱大將軍梁商特辟茂才四遷尚書令陳球淮浦人也少渉儒學善律令陽嘉中舉孝亷稍遷繁陽令包咸㑹稽曲阿人也習魯詩論語舉孝亷為郎中楊仁巴郡閬中人也習韓詩静居教授仕郡為功曹舉孝亷除郎中董鈞犍為資中人也習慶氏禮舉明經遷廪犧令病去官建武中舉孝亷辟司徒府張𤣥河内河陽人也少習春秋初舉明經補𢎞農文學遷陳倉縣丞後去官舉孝亷除為郎許愼汝南召陵人也少博學經籍為郡功曹舉孝亷再遷除洨長李業廣漢梓潼人也少有志操介特習魯詩舉明經除為郎劉茂太原晉陽人也能習禮經哀帝時察孝亷遷五原属國侯建武中拜議郎後拜侍中周嘉汝南安城人也仕郡為主簿後太守宼恂舉孝亷拜尚書侍郎范式山陽金鄉人也舉州茂才四遷荆州刺史尹勲河南鞏人也宗族多居貴位者而勲獨持清操不以地勢尚人州郡連辟察孝亷三遷邯鄲令蔡衍汝南項人也少明經講授以禮讓化鄉里舉孝亷稍遷冀州刺史羊陟太山梁甫人也少清直有學行舉孝亷辟太尉李固府陳翔汝南邵陵人也少知名善交結察孝亷太尉周景辟舉髙第拜侍御史范康勃海重合人也少受業太學與郭林宗親善舉孝亷再遷潁隂令劉儒東郡陽平人也郭林宗常謂儒口訥心辯有珪璋之質察孝亷舉髙第三遷侍中賈彪潁川定陵人也志節慷慨與同郡荀爽齊名初仕州郡舉孝亷補新息長荀淑潁川潁隂人也少有高行安帝時徴拜郎中後再遷當途長荀爽淑子也㓜而好學年十二能通春秋論語延熹九年太常趙典舉爽至孝拜郎中荀彧朗陵令淑之孫也少有才名中平六年舉孝亷再遷亢父令杜喬河内林慮人也少為書生舉孝亷辟司徒楊震府呉祐陳畱長垣人也常牧豕於長垣澤中行唫經書後舉孝亷延篤南陽犨人也博通經傳及百家之言能著文章舉孝亷為平陽侯相張奐敦煌酒泉人也辟大將軍梁冀府以疾去官復舉賢良對策第一擢拜議郎叚熲武威姑臧人也少便習弓馬尚遊俠輕財賄長乃折節好古學初舉孝亷為憲陵園丞陳蕃汝南平輿人也初仕郡舉孝亷除郎中劉淑河間樂成人也少好學明五經司徒种暠舉淑賢良方正辭以疾桓帝聞淑髙明切責州郡使輿病詣京師淑不得已而赴雒陽對策為天下第一李膺潁川襄城人也性簡亢無所交接初舉孝亷為司徒胡廣所辟舉髙第再遷青州刺史范滂汝南征羌人也少厲清節為州里所服舉孝亷光祿四行李法博通羣書和帝永元九年應賢良方正對策除博士應劭少篤學博覽多聞靈帝時舉孝亷辟車騎將軍何苗掾王逸元初中舉上計吏為校書郎馬融以陽嘉二年詔舉敦樸城門校尉岑起舉融徴詣公車對策拜議郎續漢書曰融對策於北宮端門戴封為光祿主事遭伯父䘮去官詔書求賢良方正直言之士有志行能消灾伏異者公卿郡守各舉一人郡及大司農俱舉封公車徴陛見對策第一髙彪郡舉孝亷試經第一除郎中孔昱太尉舉方正對䇿不合乃辭病去後遭黨錮禁檀敷太尉黄瓊舉方正對策合宜再遷議郎皇甫嵩安定朝那人好讀詩書習弓馬初舉孝亷茂才陳重豫章宜春人也少與同郡雷義為友太守張雲舉重孝亷重以讓義前後十餘通計不聽義明年舉孝亷重與俱在郎署趙苞甘陵東武城人初仕州郡舉孝亷再遷廣陵令謝夷吾㑹稽山隂人也少為郡吏舉孝亷為夀張令李郃漢中南鄭人也通五經善河雒風星初為戸曹吏舉孝亷五遷尚書令公沙穆北海膠東人也習韓詩公羊春秋舉孝亷以髙第為主事遷繒令單颺山陽湖陸人也善明天官筭術舉孝亷稍遷長史令韓說㑹稽山隂人也博通五經舉孝亷魏公孫瓚遼西令支人也以孝亷為郎陶謙字恭祖少好學為諸生仕州郡舉茂才除盧令公孫度遼東襄平人也舉有道除尚書令賈詡武威姑臧人也察孝亷為郎張承河内修武人也以方正徴拜議郎鍾繇潁川長社人也舉孝亷除尚書郎華歆平原髙唐人也舉孝亷除郎中張既馮翊髙陵人也年十六為郡小吏後歴右職舉茂才除新豐令温恢太原祁人也舉孝亷為廪丘長賈逵河東襄陵人也初為郡吏後舉茂才除澠池令桓階長臨湘人也仕郡功曹太守孫堅舉階孝亷除尚書郎楊阜天水冀人也初為安定長史刺史韋康辟阜為别駕察孝亷辟丞相府州表留參軍事管輅平原人也正始九年舉秀才蜀許靖汝南平輿人也太守劉翊舉靖計吏察孝亷除尚書郎典選舉張裔蜀郡成都人也治公羊春秋博渉史漢劉章時舉孝亷為魚復長蔣琬零陵湘鄉人也為丞相府東曹掾舉茂才遷為參軍張翼犍為武陽人也先主領益州牧翼為書佐建安末舉孝亷為江陽長王嗣犍為資中人也舉孝亷稍遷西安圍督吳劉繇東萊牟平人也舉孝亷為郎士爕蒼梧廣信人也少游學京師治左氏春秋察孝亷補尚書郎公事免官父死䘮闋後舉茂才除巫令孫翊權弟也驍悍果烈有兄策風太守朱治舉孝亷司空辟黄蓋零陵泉陵人也初為郡吏察孝亷辟公府闞澤㑹稽山隂人也究覽羣籍通厯數察孝亷除錢塘長賀齊會稽山隂人也建安元年孫策臨郡察齊孝亷為永寧長晉王祥琅邪臨沂人初徐州刺史呂䖍檄為别駕後舉秀才除温令唐彬魯國鄒人也初為郡功曹舉孝亷辟主簿山濤河内懷人也始為郡主簿功曹上計掾舉孝亷州辟部河南從事劉毅東萊掖人也初僑居平陽太守杜恕請為功曹魏末本郡察孝亷辟司𨽻都官從事侯史光東萊掖人也幼有才悟舉孝亷州辟别駕傅𤣥北地泥陽人也博學善属文州舉秀才除郎中王接河東猗氏人也初為都官從事永寧初舉秀才除郎中郤詵濟隂單父人也㤗始中詔天下舉賢良直言之士太守文立舉詵應選以對策上第拜議郎夏侯湛譙國譙人也少為太尉掾㤗始中舉賢良對策中第拜郎中潘岳榮陽中牟人也早辟司空太尉府舉秀才江虨陳留圉人也本州辟舉秀才平南將軍温嶠以為參軍周玘義興陽羡人也累薦名宰府舉秀才除議郎周札玘弟也少以豪右自處察孝亷除郎中周訪汝南安城人也察孝亷除郎中孫旂樂安人也少自修立察孝亷遷黄門侍郎李含隴西狄道人也僑居始平兩郡竝舉孝亷為州别駕舉秀才薦之公府索靖燉煌人也州辟别駕郡舉賢良方正對策髙第索綝靖子也少有逸羣之量舉秀才除郎中温嶠初為都官從事後舉秀才灼然二品司徒辟東閣祭酒紀瞻丹陽秣陵人也舉秀才州又舉寒素大司馬辟東閣祭酒賀循㑹稽山隂人也刺史稽喜舉循秀才除陽羡令薛兼丹陽人也察河南孝亷辟公府除比陽相戴若思廣陵人也舉孝亷入雒辟趙王倫府戴邈若思弟也邈少好學尤精史漢弱冠舉秀才遷太子洗馬丼卓丹陽人也初為郡功曹察孝亷舉秀才為呉王常侍鍾雅潁川長社人也好學有才志舉四行除汝陽令熊遠豫章南昌人也初為州别駕舉秀才除監軍華軼司馬張慿有志氣為鄉閭所稱舉孝亷官至御史中丞虞潭㑹稽餘姚人也清身有簡操州辟從事主簿舉秀才大司馬齊王冏請為祭酒顧衆吳郡吳人也初州辟主簿舉秀才後元帝為鎭東將軍命為參軍陸􅁮吳郡吳人也察孝亷後元帝鎭江左辟為祭酒陸納少有清操貞厲絶俗初辟鎭軍大將軍武陵王掾州舉秀才太原王述引為建威長史丁潭㑹稽山隂人也初為郡功曹察孝亷除郎中陳夀巴西安漢人也舉孝亷除著作郎虞溥髙平昌邑人也郡察孝亷除郎中江灌少知名州辟主簿舉秀才為治中稽含好學能屬文初為楚王瑋掾瑋坐誅免舉秀才除郎中魯芝扶風郿人也初州辟别駕舉孝亷除郎中杜軫蜀郡成都人也察孝亷除建寧令竇允始平人也初為郡主簿察孝亷除浩亹長潘京武陵漢夀人也弱冠郡辟主簿後舉秀才歴巴丘邵陵泉陵三令范平呉郡錢塘人也吳特舉茂才累遷臨海太守文立巴郡臨江人也初仕蜀至尚書蜀平舉秀才除郎中崔遊上黨人也魏末察孝亷除相府舍人曹毗譙國人也善屬詞賦郡察孝亷除郎中汜騰燉煌人也舉孝亷除郎中任旭臨海章安人也初舉郡功曹尋察孝亷除郎中張實字安遜學尚明察敬賢愛士以秀才除郎中宋顧愿字子恭好學有文詞於世大明中舉秀才對策稱㫖擢為著作佐郎太子舍人孔靖㑹稽山隂人也始察郡孝亷為功曹史何偃廬江􅈞人也州辟議曹從事舉秀才除中軍參軍孔覬㑹稽山隂人也好讀書早知名初舉揚州秀才補主簿齊王延之琅琊臨沂人也少而静黙不交人事舉秀才除郎中法曹參軍張緒吳郡吳人也州辟議曹從事舉秀才建平王䕶軍主簿沈冲吳興武康人也為西陽王撫軍法曹參軍尋舉秀才還為撫軍正佐劉瓛沛國相人也初州辟祭酒主簿舉秀才後為秘書郎劉璡瓛弟也舉秀才建平王景素辟征北主簿陸慧曉呉郡人也舉秀才除衞尉史王融博渉有文才舉秀才除晉安王南中郎袁彖陳郡夏陽人也舉秀才後除安成王征虜參軍主簿丘靈鞠吳興烏程人也舉秀才為主簿檀超髙平金鄉人也舉秀才除宣武府參軍丘巨源蘭陵人也少舉丹陽郡孝亷為宋孝武所知大明五年勅助徐源撰國史陸厥吳郡人州舉秀才除晏傅主簿劉善明平原人也舉秀才宋孝武見其對策强直甚異之梁王琳份子也舉南徐州秀才釋褐征虜建安王法曹蕭琛蘭陵人也初王儉為丹陽尹辟為主簿舉為南徐州秀才累遷司徒記室丘遲吳興烏程人也初州辟從事舉秀才除太學博士蕭洽字宏稱幼敏悟能属文齊永明中為國子生舉明經起家著作佐郎任昉舉兖州秀才拜太常博士宗夬少勤學有局幹弱冠舉郢州秀才江淹起家南徐州從事尋舉南徐州秀才對策上第轉巴陵王國左常侍王褒弱冠舉秀才除秘書郎劉濳字孝儀舉秀才起家鎭右始興王法曹行參軍王䂓好學有口辨州舉秀才郡迎主簿起家秘書郎何照年十九解褐揚州主簿舉秀才累遷王府行參軍賀瑒為國子生舉明經揚州祭酒王承字安期僕射暕子七嵗通周易選補國子生年十五射策髙第劉穀字仲寳自國子禮生射策髙第鍾嶸潁川長社人也舉本州秀才起家王國侍郎周興嗣陳郡項人也本州舉秀才除桂陽郡丞陸雲公呉郡人也州舉秀才累遷湘東王行參軍顧憲之吳郡吳人也未弱冠辟議曹從事舉秀才累遷太子舍人庾華新野人也弱冠為州迎主簿舉秀才累遷安西主簿陸倕吳郡吳人也舉秀才竟陵王子良辟議曹從事裴䆳河東聞喜人也舉秀才對策髙第奉朝請顧恊吳郡吳人也為太學博士秀才沈約覽其策而歎曰江左以來未有此作遷安成王國左常侍伏挺齊末州舉秀才對策為當時第一陳孔奐舉秀才射策髙第起家揚州主簿褚翔初為國子生舉髙第後魏李同軌年二十二舉秀才射策除奉朝請酈宣秀才射策髙第為奉朝請李祥字元吉世祖詔州郡舉賢良祥應貢對策合㫖除中書博士鄭羲字幼驎文學頗優弱冠舉秀才鄭伯猷博學有文才早知名舉司州秀才以射策髙第崔士元舉茂才平州錄事參軍崔挺舉秀才射策髙第拜中書博士韓顯宗有才學秀才對策甲科除著作佐郎米世昌少自修立尤精經義舉秀才對策上第拜國子助教盧觀字伯舉范陽涿人也少好學有雋才舉秀才射策甲科除太學博士著作佐郎邢臧字子良河間人光禄少卿虬長孫也幼孤早立操尚博學有藻思年二十一神龜中舉秀才問策五條考上第為太學博士裴敬憲少有志行學博才清司州牧髙陽王雍舉秀才射策髙第除太學博士郭祚以文章尺牘見稱於世舉秀才對策上第拜中書博士徐紇字武伯樂安博昌人也家世寒微紇少好學有名理頗以文詞見稱察孝亷對策上第髙祖㧞為主書裴延雋渉獵墳史頗有才華舉秀才射策髙第裴景融字孔明篤學好属文舉秀才射策髙第除太學博士崔勵大將軍光之長子也噐業才行最有父風舉秀才授中軍彭城王參軍陽藻字景德少孤有雅志渉獵經史舉秀才射策髙第裴他少治春秋杜氏毛詩周易竝舉其宗致舉秀才以髙第除中書博士馮元興年二十三教授常數百人初舉秀才對策髙第又舉孝亷劉桃符中山盧奴人性恭謹好學舉孝亷射策甲科北齊裴讓之少好學有文俊辯早得聲譽舉秀才對策髙第累遷屯田主客郎劉叔宗字樂陵平昌人和謹頗有學業舉秀才稍遷滄州治中盧文偉有志尚頗渉經史州辟主簿年二十八始舉秀才除本州平北府長流參軍後周辛仲景年十八舉文學對策髙第拜司空府主簿辛慶之少以文學徴詣雒陽對策第一除秘書郎唐杜正倫相州洹水人也隋仁夀中與兄正𤣥正藏俱以秀才擢第隋代舉秀才總十人正倫一家有三秀才甚為當時稱羙李義琰魏州昌樂人常州刺史元道族孫少舉進士累補太原尉張柬之則天永昌元年以賢良徴試同時射策者千餘人柬之獨為天下第一擢拜監察御史姚崇為孝敬皇帝挽郎應制下筆成章舉授濮州司倉馬懐素應文學優贍科舉及第拜郿尉鄭愔常以言行聞轉桃林丞又舉賢良𤣥宗時在春宮親問國政愔對策第一擢授左補闕尋判主爵員外郎張鷟應下筆成章及才髙位下詞標文苑等科鷟凡應八舉皆登甲科崔圓少孤貧志尚閎博好讀兵書有經濟宇宙之心開元中詔捜訪遺逸圓以鈐謀射策甲科授執㦸蕭昕河南人少補崇文進士開元十九年首舉博學宏詞授陽武主簿天寳初舉宏詞授夀安尉崔明允天寳元年應文詞秀逸舉明允等二十人儒學博通劉毖等八人軍謀越衆令狐潮等七人竝登科名依資授官元載自幼嗜學好属文性敏慧博覽子史尤學道書家貧徒歩隨鄉賦累上不升第天寳初𤣥宗奉道教下詔捜求明老莊文列四經學者載策入髙科授邠州新平縣尉韓休蚤有詞學應制舉授虞鄉尉楊綰舉進士調補太學正字𤣥宗朝徴賢良有司以綰赴召策中甲科超授右拾遺歸崇敬為四門博士天寳末對策髙第授右拾遺于邵天寳中舉進士一嵗中以書制超絶流軰授崇文館校書李季鄉肅宗朝工部侍郎適之子也弱冠舉明經頗工文詞應博學宏詞科升第再遷京兆府鄠縣尉裴佶字𢎞正侍中右僕射耀卿之孫吏部郎中綜之子幼能属文弱冠舉進士補校書郎姚南仲華州下邽人也乾元中應制登科授太子校書穆質強直應制策入第三等其所條對至今人傳之位給事中陸贄年十八進士及第又以博學宏詞授鄭縣尉馮伉少有經學代宗大歴初登五經秀才科授秘書郎建中四年又登博學三史科韋夏卿字雲客少習文學大歴中與弟正卿應制舉同時策入髙第授髙陵主簿崔元翰初舉進士博學宏詞賢良方正皆中甲科郭子儀以武舉補左衞長史累以武藝登科為諸軍使吳通𤣥徳宗建中初舉以文詞清麗授同州司户奚陟少好讀書舉進士昇第建中元年制舉文詞清麗授𢎞文館校書路泌字安期陽平人博渉經史傳工為五言詩性端亮寡言以孝悌聞於宗族建中末以長安尉從召與李益韋綬等書判同舉髙第裴垍字𢎞中河東聞喜人也宰相裴居道七代孫垍弱冠舉進士貞元中詔選賢良極諫士垍對策第一授美原縣尉桺公綽年十八應制舉登賢良方正直言極諫科授秘書省校書郎貞元元年也貞元四年復應制舉再登賢良方正科時年二十一制出授渭南尉衞次公字從周河東人噐韻𢎞雅弱冠舉進士禮部侍郎潘淡目為國噐擢居上第羅讓字景宣父珦官至京兆尹讓少以文學知名舉進士應詔對策髙第為咸陽尉辛毗隴西人少嗜學累登五經開元禮科鄭亞祖父三世竝登進士第亞字子佐憲宗元和十五年擢進士第又應賢良方正直言極諫制科吏部調選又以書判㧞萃數歲之外連中三科龎嚴起寒微舉進士穆宗長慶初元稹李紳為翰林學士嚴應判考策入第三等仍為之首鄭畋亞子也年十八登進士第釋褐汴州節度推官得秘書省校書郎二十二吏部調選又以書判㧞萃授渭南尉直館事令狐滈綯子也綯為河中尹宣宗大中十三年綯以其子滈求應進士舉表曰臣有男滈爰自孩提便從訓教至於詞藝頗及輩流㑹昌二年臣任戸部員外郎日即應舉大中二年猶未成名臣自湖州刺史䝉先帝擢授考功郎知制誥尋充翰林學士累叨寵澤遂忝樞衡事體有妨因令罷舉自當廢絶十九年每遣退藏更令勤勵竊以祿位逾分齒髪已衰男滈年過長成未霑一第犬馬私愛實切憫傷臣二三年來頻乞罷免每年與男取得文解意望纔離中書郎却令赴舉昨蒙恩詔許寵近藩伏緣已逼禮部試期便令就試至於臨時與奪出自主司固不敢輙有干撓但以初離機務合具上聞臣近于延英奉辭輙擬面對伏以戀主方切陳誠至難伏兾睿慈察臣丹懇勅曰令狐滈多時舉人極有文學流輩所許合得科名比以父綯職在樞衡避嫌不赴今因出鎭却就舉塲况諧通䂓合試之藝宜令主司准大中六年勅考試只在至公如渉狥情自有刑典從今已後但依常例放榜本司取士貴在得人去畱之間惟理所在張衍字𤣥用河南尹魏王宗奭之猶子也其父死於兵間衍讀書為儒始以經學就舉不中選時諫議大夫鄭徽退居雒陽以女妻之令應詞科不數上登第後唐李愚初唐末避難東歸洛陽時衞公李德裕孫道古在平泉舊墅愚徃從焉子弟親採梠負薪以給朝夕未嘗干人故少師薛廷珪掌貢籍之歲登進士第又登宏詞科授河南府參軍馬縞少嗜學以明經及第登㧞萃科李琪天復初應博學宏詞居第四等授武功縣尉辟轉運廵官册府元龜卷六百五十
