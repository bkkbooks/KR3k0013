body:
  text: 册府元龜卷七百八十一宋王欽若等撰總錄部節操夫雪霜大摯知松栢之後凋風雨如晦識雞鳴之不已盖士之立誠自守秉節無貳同夫介石至於沒齒者其若是乎東周之後西漢而下乃有顧義遺利守識求舊居無茍合動不踰矩挺操而㒺屈虞亂而匪汙深拒權倖絶齅鱎餌意趣非偶靡降心而與㳺才任過分必投劾而引去鄙斥邪佞保全名節凛然之槩聳於前聞卓爾之行冠乎羣萃非夫天爵内富性理冥合蹈道而經徳秉彞而守正又曷能篤志終始確乎不㧞者哉鄭太子忽齊侯欲以文姜妻之忽辭人問其故太子曰人各有耦齊大非吾耦也詩云自求多福在我而已大國何為君子曰善自為謀及其敗戎師也齊侯又請妻之固辭人問其故太子曰無事於齊吾猶不敢今以君命奔齊之急而受室以歸是以師昏也民其謂我何遂辭諸鄭伯假父之命以為辭髙哀宋大夫為蕭封人以為卿蕭宋附庸仕附庸還外為卿不義宋公而出遂来奔魯出而待放從放所来故曰遂書曰宋子哀来奔貴之也貴其不食汙君之禄避禍速也楚鍾儀伶人也晉侯觀于軍府見鍾儀問之曰南冠而縶者誰也南冠楚冠縶拘執有司對曰鄭人所獻楚囚也使稅之鄭獻鍾儀在十年稅解也召而弔之再拜稽首問其族對曰伶人也伶人樂官公曰能樂乎對曰先父之職官也敢有二事言不敢學他事使與之琴操南音南音楚聲公曰君王何如對曰非小人之所得知也固問之對曰其為太子也師保奉之以朝于嬰齊而夕于側也嬰齊令尹子重側司馬子及言其尊卿敬老不知其他公語范文子文子曰楚囚君子也言稱先職不背本也樂操土風不忘舊也稱太子抑無私也舍其近事而逺稱少小以示性所自然而至誠名其二卿尊君也尊晉君也不背夲仁也不忘舊信也無私忠也尊君敏也敏達也仁以接事信以守之忠以成之敏以行之事雖大必濟言有此四徳必能成大事君盍歸之使合晉楚之成公從之重為之禮使歸求成閔損字子騫季氏使為費宰費季氏邑季氏不臣而其邑宰數畔聞子騫賢故欲用之也閔子騫曰善為我辭焉不欲為季氏宰語使者善為我辭說令不復召我如有復我者復我者重來召我也則吾必在汶上矣去之汶水上欲北如齊顔叔子獨處于室鄰之嫠婦又獨處于室夜暴風雨至而室壊婦人趨而至顔叔子納之而使執燭放乎旦而燭盡破屋柱繼之自以為辟嫌之不審矣一云魯人有男子獨處于室鄰之嫠婦又獨處于室夜暴風雨至而室壊婦人趨而託之男子閉戸而不納婦人自牖與之言曰子何為不納我乎男子曰吾聞之也男女不六十不同居今子㓜吾亦㓜不可以納子婦人曰子何不若栁下惠然不拒逮門之女國人不稱其亂男子曰栁下惠則可吾固不可吾將以吾之不可學栁下惠之可漢朱建楚人嘗為淮南王黥布相為人有口辯刻亷剛直行不茍合義不取容辟陽侯行不正得幸吕太后欲知建建不肯見趙禹為人亷倨倨亦傲也為吏以来舎無食客公卿相造請禹終不行報謝務在絶知友賔客之請以此意告報公卿孤立行一意而已後為燕相免歸嚴彭祖宣帝時為博士至河南東郡太守以髙第入為左馮翊遷太子太傅亷直不事權貴或說曰天時不勝人事君以不修小禮曲意亡貴人左右之助經誼雖髙不至宰相願少自勉强彭祖曰凡通經術固當修行先王之道何可委曲從俗茍求富貴乎雋不疑為京兆尹大将軍光欲以女妻之不疑固辭不肯當任安田仁俱為衞将軍舎人衞將軍從二人過平陽公主家令兩人與騎奴同席而食此二子㧞刀劍斫席别坐主家皆怪而惡之莫敢呵蕭望之字長倩東海蘭陵人也好學治齊詩經京師諸儒稱述焉是時大将軍霍光秉政長史邴吉薦儒生王仲翁與望之等數人皆召見先是左將軍上官桀與盖主謀殺光光既誅桀等後入自備吏民當見者露索去刀兵兩吏挾持索捜也露形體而捜也望之獨不肯聽自引出閤曰不願見吏牽持匃匈光聞之告吏勿持望之既至前說光曰将軍以功徳輔幼主以流大化致於治平令太平之化通洽四方也是以天下之士延頸企踵爭願自効以輔髙明今士見者皆先露索扶持恐非周公相成王躬吐握之理致白屋之意周公攝政一沐三握髮一飯三吐餔以接天下之士白屋謂白盖之屋以茅覆之賤人所居於是光獨不除用望之而仲翁等皆補大将軍史三歳間仲翁至光禄大夫給事中望之以射䇿甲科為郎射䇿者謂為難問疑義書之於䇿量其大小署為甲乙之科列而置之不使彰顯有欲射者隨其所取得而釋之以優劣射之言投射也對䇿者顯問以政事經義令各對之而觀其文辭定髙下也署小苑東門候署補署也門候至候時而開閉也仲翁出入從蒼頭廬兒皆官府之給賤役者也解在貢禹傳下車趨門傳呼甚寵趨向也下車而向門傳聲而呼侍從者甚冇尊寵也顧謂望之曰不肯録録反抱關為録録謂循常也言望之不隨例搜索以違牾執政不得大官而守門也望之曰各從其志後位至前將軍後漢孔休自哀帝時為新都令後王莽秉權休去官歸家及莽簒位遣使齎元纁束帛請為國師遂嘔血託病杜門自絶光武即位求子孫賜穀以旌顯之桓譚字君山哀帝時董賢為大司馬聞譚名欲與之交譚先奏書於賢說以輔國保身之術賢不能用遂不與通後為六安丞薛方為郡掾祭酒嘗徴不至及王莽以安車迎方方因使者辭謝曰堯舜在上下有巢繇今明主方隆唐虞之徳小臣欲守箕山之節也使者以聞莽說其言不强致譙元為繡衣使者持節分行天下未及終而王莽居攝元於是縱使者車變易姓名間竄歸家因以隠遁車茂為京部丞及王莽居攝以病免歸與同縣孔休陳留蔡勲安衆劉宣楚國龔勝上黨鮑宣六人同志不仕莽世並名重當時蔡勲字君嚴邕六世祖也好黄老平帝時為郿令王莽初受以厭戎連率王莽改隴西郡曰厭戎郡守曰連率勲對印綬仰天歎曰吾䇿名漢室死歸其正昔曾子不受季孫之賜況可二姓哉遂􅂝將家屬逃入深山與鮑宣卓茂等同不仕新室宣秉字巨公少修髙節顯名三輔哀平之際見王氏據權專政侵削宗室有逆亂萌遂隠遁深山州郡連召嘗寝疾不仕王莽為宰衡辟命不應及莽簒位又遣使者徵之秉固稱疾病建武初始為大司徒司直杜林字伯山初為郡吏王莽敗盜賊起與弟成俱客河西隗囂素聞林志節深相敬待以為持書林後因疾告辭還禄食囂復欲令彊起遂稱疾篤囂意雖相望且欲優容之望猶恨也東觀記曰林寄囂地終不降志辱身至簮蒿席萆不食其粟乃出令曰杜伯山天子所不能臣諸侯所不能友盖伯夷叔齊恥食周粟令且從師友之位須道開通使順所志林雖拘於囂而終不屈節後位至大司空崔篆王莽時為建新大尹不得已單車到官稱疾遂去建武初朝廷多薦言之者幽州刺史又舉篆賢良篆自以宗門受莽偽寵慚愧漢朝遂辭歸不仕蔡茂哀平間遷侍中遇王莽居攝以病自免不仕莽朝會天下擾亂茂素與竇融善因辟難歸之融欲以為張掖太守固辭不就每所餉給計日取足而已胡剛清髙有志節大司徒馬宫辟之值王莽居攝解其衣冠縣府門而去遂亡命交阯隠於屠肆之間後莽敗乃歸鄉里郅惲王莽時左隊大夫逯普逯姓也署為吏惲不謁曰昔文王㧞吕尚於渭濵髙宗禮傅說於巖築桓公取管仲於射鉤故能立宏烈就元勲未聞師相仲父而可為吏位也非闚天者不可與圗逺君不授驥以重任驥亦俛首裹足而去可遂不受署積弩将軍傅俊東㣘揚州禮請惲為將兵長史授以軍政所向皆下後還京師而上論之惲耻以軍功取位遂辭歸鄉里杜安年十三入太學洛陽令周紆自徃候安安謝不見京師貴戚慕其行或遺之書安不發悉壁藏之及後捕案貴戚賔客安開壁出書印封如故髙詡世傳魯詩以信行清操知名王莽簒位父子稱盲逃不仕莽世楊寳王莽時與兩龔蔣詡俱徵遂遁不知所處龔勝字君賔舍字君倩蔣詡字元卿並以髙莭著名光武髙其莭建武中公車特徴老病不到卒於家王霸少有清節初王莽簒位棄冠帶絶交賔樂恢為騎都尉性亷直介立行不合已者雖貴不與交初信陽侯隂就數致禮請恢恢絶不答朱暉字文季為尚書令性矜嚴進止必以禮永平初明帝舅信陽侯隂就慕暉賢自徃候之暉避不見復遣家丞致禮暉遂閉門不受就聞曰志士也勿奪其節鄭興更始時為凉州刺史㑹天水有反者攻殺郡守興坐免時赤睂入關東道不通興及西歸隗囂虚心禮請而興恥為之屈稱疾不起及囂遣子恂入侍将行興因恂求歸𦵏父母囂不聼而徙興舎益其秩禮興入見囂曰前遭赤睂之亂以将軍僚舊故敢歸身明徳幸蒙覆載之恩復得全其性命興聞事親之道生事之以禮死𦵏之以禮奉以周旋弗敢失墜今為父母未𦵏請乞體骨若以増秩徙舎中更停留是以親為餌無禮甚矣将軍焉用之囂曰囂将不足留故耶興曰將軍據七郡之地擁羌胡之衆以戴本朝徳莫厚焉威莫重焉居則為專命之使入必為鼎足之臣興從俗者也不敢深居屏處因將軍求進不患不達因将軍求進何患不親此興之計不道将軍者也興業為父母請不可以已願留妻子獨歸葬将軍又何猜焉囂曰幸甚促為辦裝遂令與妻子俱東任延為河内太守初學於長安號為聖童值倉卒避兵之隴西時隗囂已據四郡遣使請延延不應任永字君業犍為人與同郡馮信並好學博古公孫述連徴命待以髙位皆託青盲以避世難王丹資性方潔疾惡豪强河南太守同郡陳遵關西之大俠也自以知名欲結交於丹丹拒而不許後徵為太子少傅時大司徒侯霸欲與交友及丹被徴遣子昱候於道昱迎拜車下丹下答之昱曰家公欲與君結交何為見拜丹曰君房侯霸字也有是言丹未之許也丹後為太子太傅竇章家於外黄居貧蓬戸蔬食躬勤孝養然講讀不輟太僕鄧康鄧珍之子禹之孫聞其名請欲與交辭不肯許康以此益重焉趙岐少明經有才藝娶扶風馬敦女宗姜敦兄子融外戚豪家岐嘗鄙之不與融相見融嘗至岐家多從賔友與從妹宴飲作樂日夕乃出過問趙處士所在岐亦厲節不以妹婿之故屈志於融也與其友書曰馬季長雖有名當世而不持士節三輔髙士未曾以衣裾撇其門也岐曾讀周官二義不通一徃造之賤融如此後官至太常張升少好學多關覽而任情不覊其意相合者則傾身交結不問窮賤如乖其志好者雖王公大人終不屈從嘗歎曰死生有命富貴在天其有知我雖胡越可親茍不相識從物何益後為内黄令成翊世不應三公辟先是順帝廢為濟隂王翊世上書訟之安帝不從及濟隂立為順帝司空張皓以翊世前訟太子之廢薦為議郎翊世自以其功不顯恥於受位自劾歸蔡衍為議郎符節令梁冀聞衍賢請欲相見衍辭疾不徃冀恨之橋元補雒陽左尉梁不疑為河南尹元以公事當詣府受對恥為所辱棄官還鄉里蔡邕陳留圉人妙操音律中常侍徐璜左悺等五侯擅恣聞邕善皷琴遂白天子勅陳留太守督促發遣邕不得已行到偃師稱疾而歸後為左中郎将楊康遷平原令時國相徐曽中常侍璜之兄也康恥與接事託疾牧豕袁山松書楊一名章字叔康夏馥少為書生言行質直同縣髙氏蔡氏並皆富殖郡人畏而事之惟馥閉門不與交通由是為豪姓所讐後入林慮山中而卒張儉山陽髙平人初舉茂才以刺史非其人謝病不起後為衞尉鄭元字康成北海髙宻人家貧客居東萊及黨事起被禁錮遂隠修經業杜門不出靈帝末黨禁解大将軍何進聞而辟之州郡以進權戚不敢違意遂廹脅元不得已而詣之進為設几杖禮待甚優元不受朝服而以幅巾見一宿逃去後公車徵為大司農以病自乞還家許劭字子將汝南平輿人從祖敬敬子訓訓子相並為三公相以諂事宦官自致台司數遣請劭劭惡其薄行終不候之後司空楊彪辟舉方正敦樸皆不就魏張範字公儀河内修武人初太傅袁隗欲以女妻範範辭不受性恬靜樂道忽於榮利徵命無所就範與弟承避地揚州袁術備禮招請範稱疾不徃術不強屈遣承與相見後太祖表為諫議大夫袁渙與陳羣父子皆在吕布軍中布破羣父子見太祖皆拜渙獨髙揖不為禮太祖甚嚴憚之時太祖又給衆官車各數乗使取布軍中物惟其所欲衆人皆重載惟渙取書數百卷資糧而已衆人聞之大慚渙謂所親曰脫我以行陳今軍發足以為行糧而已不以此為我有由是厲名者大悔恨之太祖益以此重焉後至郎中令行御史大夫何䕫陳郡陽夏人初避亂淮南後袁術至夀春辟之䕫不應然遂為術所留乆之術與橋㽔俱攻圍蘄陽蘄陽為魏太祖固守術以䕫彼郡人欲脅令説蘄陽䕫謂術謀臣李業曰昔栁下惠聞伐國之謀而有憂色曰吾聞伐國不問仁人斯言何為至於我哉遂遁匿􅈞山術知䕫終不為己用乃止術從兄山陽太守遺母䕫從姑也是以雖恨䕫而不加害及䕫将還鄉里度術必急追乃間行得免後位至太僕王烈管寜邴原同避亂至遼東烈於時名聞在原寧之右辭公孫度長史商賈自穢太祖命為丞相掾未至而卒崔琰字季珪袁紹以為騎都尉紹卒二子交爭欲得琰琰稱疾固辭由是獲罪幽於囹圄頼隂䕫陳琳營救得免官至中尉王朗為會稽太守為孫䇿所執譴讓之使張昭私問朗朗誓不屈策忿而不敢害也留至曲阿建安三年太祖表徵朗䇿遣之桓階字伯緒劉表辟為從事祭酒欲妻以妻妹蔡氏階自陳已結婚拒而不受因辭疾告退李敏為河内太守去官還鄉里遼東太守公孫度欲强用之敏乘輕舟浮滄海莫知所終杜襲字子緒漢末避亂荆州劉表待以賔禮同郡繁欽數見竒於表襲喻之曰吾所以與子俱来者徒欲龍蟠幽藪待時鳳翔豈謂劉牧當為撥亂之主而規長者委身哉子若見能不已非吾徒也吾其與子絶矣敏慨然曰請敬受命襲遂南適長沙官至大中大夫陳矯字秀弼廣陵廣陽人也避亂江東及東城辭孫䇿袁術之命還本郡後位至司徒吳陳化妻早亡化以古事為鑒乃不復娶大帝聞而貴之以其年壮勅宗正妻以宗室女化固辭以疾帝不違其志虞翻會稽餘姚人曹公為司空辟翻翻曰盜蹠欲以餘財汙良家邪遂拒不受後歸吳為騎都尉晉石偉字公操吳人也少好學修節不怠介然獨立有不可奪之志吳平後武帝太康二年詔曰吳故光禄大夫石偉秉志清白皓首不渝雖處危亂㢘節可紀年已過邁不堪逺渉其以偉為議郎加二千石秩以終厥世偉遂佯狂及盲不受晉爵年八十三太熙元年卒諸葛靚父誕魏司空為文帝所誅靚奔吳為大司馬吳平逃竄不出武帝與靚有舊靚姊又為瑯邪王妃帝知靚在姊間因就見焉靚逃于厠帝又逼見之謂曰不謂今日復得相見靚流涕曰不能漆身皮面復覩聖顔詔以為侍中固辭不拜歸於鄉里終身不向朝廷而卒王褒父儀為司馬文王所殺褒與濟南劉兆俱以不仕顯名褒以父為文王所濫殺終身不應徵聘未嘗西向坐以示不臣於晉也王衍字夷甫楊駿欲以女妻焉衍恥之遂佯狂自免後位至太尉韋忠有節操家貧藜藿不充人不堪其憂而忠不改其樂裴頠為僕射數言之於司空張華華辟之辭疾不起人問其故忠曰吾茨簷賤士本無宦情且茂先張華字也華而不實裴頠慾而無厭棄典禮而附賊后若此豈大丈夫之所宜行邪裴嘗有心託我恐洪濤蕩岳餘波見漂况可臨尾閭而闚沃焦哉觧系字少連武帝時荀朂門宗彊盛朝野畏憚之朂諸子謂系等曰我與卿為友應向我公拜朂又曰我與尊先使君親厚系曰不奉先君遺教公若與先君厚徃日衰頽當有書問親厚之誨非所敢承勗父子大慚當世壯之官至雍州刺史揚烈将軍郄鑒為中書侍郎東海王越辟為主簿舉賢良不行征東大将軍荀晞檄為從事中郎晞與越方以力爭鑒不應其召從兄朂晞之别駕恐禍及已勸之赴召鑒終不廻晞亦不之逼也及京師不守㓂難蠭起鑒遂陷於陳午賊中邑人張實先求交於鑒不許至是實於午營來省鑒疾既而卿鑒鑒謂實曰相與邦壤義不及通何可怙亂至此邪實大慚而退午以鑒有名於世将逼為主鑒逃而獲免午尋潰散鑒得歸鄉里趙王倫辟為掾知倫有不臣之跡稱疾去職及倫簒其黨皆至大官而鑒閉門自守不染逆節賀循山隂人在郡遇陳敏之亂詐稱詔書以循為丹陽内史循辭以脚疾手不制筆又服寒食散露髮袒身示不可用敏意不敢逼是時州内豪傑皆見維縶或有老疾就加秩命惟循與吳郡朱誕不預其事及敏破征東将軍周馥上循領㑹稽相尋除吳國内史公車徵賢良皆不就虞望少有節操元帝為丞相招延四方之士多辟府掾時人謂之百六掾望亦被召恥而不應陸玩為元帝丞相參軍時王導初至江左思結人情請婚於玩玩對曰培塿無松栢薫蕕不同器玩雖不才義不為亂倫之始導乃止後位至侍中司空庾衮字叔褒諸父並貴盛惟衮父獨守貧約衮躬親稼穡以給供養而執事勤恪與弟子樹籬跪以授條或曰今在隠屏先生何恭之過衮曰幽顯易操非君子之志也舉孝亷郡功曹皆不屈王濛為司徒左西屬濛以此職有譴則應受杖固辭詔為停罰猶不就徙中書郎顔含為光禄勲桓溫求婚於含含以其盛滿不許惟與鄧攸深交王述子坦之為桓溫長史溫欲為子求婚於坦之及還家省父而述愛坦之雖長大猶抱置膝上坦之因言溫意述大怒遽排下曰汝竟癡耶詎可畏溫面而以女妻兵也坦之乃辭以他故溫曰此尊君不肯耳遂止官至衛將軍散騎常侍尚書令王獻之為謝安衛将軍長史孝武太元中新起太極殿安欲使獻之題牓以為萬代寳而難言之試謂曰魏時凌雲殿牓未題而匠者誤釘之不可下乃使韋仲将懸登書之比訖鬚鬢盡白裁餘氣息還語子弟宜絶此法獻之揣知其㫖正色曰仲将魏之大臣寜有此事使其若此有以知魏徳之不長安遂不之逼江績字仲元有志氣除祕書郎以父與謝氏不穆故謝安之世辟召無所從論者多之安薨始為會稽王道子驃騎主簿孫潛為豫章太守殷仲堪之討王國寳也潛時在郡仲堪逼以為諮議參軍固辭不就王敬宏少有清尚起家本國左常侍衛軍參軍性恬靜樂山水為天門太守其妻桓元姊也敬宏之郡元時為荆州遣信要令過敬宏至江陵謂人曰靈寳桓元字也見要正當欲與其姊集聚耳我不能為桓氏贅壻乃遣别船送妻徃江陵妻在桓氏彌年不迎謝方明少有志節桓𤣥尅京邑丹陽尹不範之勢傾朝野欲以女嫁方明使尚書吏部郎王騰譬說備至方明終不回桓𤣥聞而賞之方明後為㑹稽太守龔頴為益州刺史毛璩從事璩為譙縱所殺頴獨不屈節縱既僭號備禮徵又不至乃收頴付獄脅以兵刅執志彌堅終無廻改至于蜀平遂不屈節范騰字無忌燉煌人舉孝廉除郎中屬天下兵亂去官還家太守張閟造之閉門不見禮遺一無所受歎曰生於亂世貴而能貧乃可以免散家財五十萬以施宗族柴門灌園琴書自適張軌徵之為司馬騰曰門一杜其可開乎固辭病月餘而卒崔遊年七十餘敦學不倦劉元海僭位命為御史大夫固辭不就卒於家楊軻學業精㣲養徒數百劉曜僭號徵拜太常軻固辭不起曜亦敬而不逼遂隠于隴山桑虞諸兄仕於石勒之世咸登顯位惟虞恥臣非類隂欲避地海東會丁母憂遂止哀毁骨立廬於墓側五年後石勒以為武城令虞以宻邇黄河去海㣲近将申前志欣然就職石季龍太守劉徵甚器重之徵遷青州刺史請虞為長史帶祝阿郡徵遇疾還鄴令虞監行州府屬季龍死國中大亂朝廷以虞名父子必能立功海岱潛遣東筦人華挺授虞寧朔将軍青州刺史虞曰功名非吾志也乃附使者啟讓刺史靖居海右不交境外雖厯偽朝而不豫亂世以此髙之髙瞻隨東夷校尉崔毖伐慕容廆於棘城毖奔敗瞻隨衆降於廆廆署為将軍瞻稱疾不起廆敬其姿器數臨候之撫其心曰君之疾在此不在餘也今天子播越四海分離蒼生紛擾莫知所託孤思與諸君興復帝室剪鯨豕於二京迎天子於吳會廓清八表侔勲古烈此孤之心也孤之願也君中州大族冠冕之餘宜痛心疾首枕戈待旦柰何以華夷之異有懐介然且大禹出於西羌文王生于東夷但問志略何如耳豈以殊俗不可降心乎瞻仍辭疾篤廆深不平之瞻又與宋該有隙該隂勸廆除之瞻聞其言彌不自安遂以憂死吳喬車騎将軍壹之孫没李雄軍中三十年不為雄屈譙秀字元彦巴西人祖周以儒學著稱顯名蜀朝秀少而靜黙不交於世知天下将亂預絶人事雖内外宗親不與相見郡察孝㢘州舉秀才皆不就及李雄據蜀畧有巴西雄叔父驤驤子夀皆慕秀名具束帛安車徵之皆不應嘗冠皮弁弊衣躬耕山藪龔壯嘗歎服焉嵇紹為侍中齊王冏秉政紹嘗詣冏咨事遇冏宴會召華艾葛旟等共論時政艾言於冏曰嵇侍中善於絲竹公可令操之左右進琴紹推不受冏曰今日為歡卿何吝此耶紹對曰公興復社稷當執物作則垂之於後紹雖虛鄙忝備常伯腰紱冠冕鳴玉殿省豈可操執絲竹以為伶人之事若釋公服從私宴所不敢辭也冏大慚艾等不自得而退戴逵字安道嘗以琴書自娛太宰武陵王晞聞其善皷琴使人召之逵對使者破琴曰戴安道不為王門伶人晞怒乃更引其兄述述聞命欣然擁琴而徃以國子祭酒散騎常侍徵皆不至後蜀龔壯巴西人父叔為李特所害壯說李夀討特孫期以報讎果尅之壯謂百行之本莫大忠孝既假夀殺其私讎以雪又欲使其歸朝以明臣節夀既不從壯遂稱聾又云手不制物終身不復至成都惟研考經典覃思文章至李勢時卒前凉辛理美姿貌張駿欲奪其妻以寡妹妻之理割鼻自誓宋庾炳之字仲文初為中書太子舍人劉粹征北長史廣平太守兄登之為謝晦長史炳之徃省之時晦位髙權重朝士莫不加敬炳之獨與抗禮時論韙之顔延之妹適東筦劉憲之穆之子也穆之既與延之通家又聞其美将仕之先欲相見延之終不徃也延之位至金紫光禄大夫領湘東王師王景文美風姿好言理太祖甚相欽重故為明帝娶景文妹髙祖第五女新安公主先適太原王景深離絶當以適景文景文固辭以疾故不成婚景文後領中書令常侍僕射揚州刺史顧覬之為吳郡太守幸臣戴法興權傾人主而覬之未嘗降意左光禄大夫蔡興宗與覬之善嫌其風節過峻覬之曰辛毗有云不事孫劉不過使吾不為三公耳及世祖晏駕法興遂以覬之為光禄大夫加金章紫綬杜慧度交州刺史瑗之第五子為九真太守瑗卒府州綱佐以交土接㓂不宜曠職共推慧度行州府事辭不就垣閎字叔通齊髙帝輔政使褚彦回為子晃求閎女閎辭以齊大非偶帝雖嘉其退讓而心不能歡即以晃婚王伷女謂豫章王嶷曰前欲以白象與垣公婚者重其夷澹事雖不遂心嘗依然白象晃小字也及髙帝即位有誠心封爵如故卒於金紫光禄大夫諡曰定袁淑從母兄劉湛欲其附已而淑不為改意由是大相乖失淑乃賦詩曰種蘭忌當門懐璧莫向楚楚少别玉人門非植蘭所尋以乆疾免官蔡廓為吏部尚書廓因北地傅隆問傅亮選事若悉以見付不論不然不能拜也亮以語録尚書徐羡之曰黄門郎以下悉以委蔡吾徒不復厝懐自此以上故宜共參同異廓曰我不能為徐干木署紙尾也遂不拜干木羨之小字也選案黄紙録尚書與吏部尚書連名故廓云署紙尾也羨之亦以廓正直不欲使居權要徙為祠部尚書南齊褚賁淵之長子厯侍中淵薨服闋見世祖賁流涕不自勝帝甚嘉之以為左民尚書不拜表稱疾讓封與弟蓁世以為賁恨淵失節於宋室故不復仕褚炤彦回之從父弟也少有髙節王儉嘗稱才堪保傅為成安郡還以一目眇召為國子祭酒不拜嘗非彦回身事二代回子賁徃問訊炤炤問曰司空今日何在賁曰奉璽紱在齊大司馬門炤正色曰不知汝家司空将一家物與一家亦復何謂彦回拜司徒賔客滿坐炤歎曰彦回少立名行何意披猖至此門户不幸乃復有今日之拜使彦回作中書郎而死不當是一名士耶名徳不昌遂有期頤之夀彦回性好戲以軺車給之炤大怒曰著此辱門戸那可令人見索火燒之馭人奔車乃免崔慰祖少與江祀欵宻及祀貴嘗來候之而慰祖不徃為始安王遥光記室王好碁數召慰祖對戯慰祖輒辭拙茍非朔望不見也建武中帝欲試以百里慰祖不就王秀之為太子舍人吏部尚書褚淵見秀之正潔欲與結婚秀之不肯以此頻轉為兩府外兵參軍王僧祐太尉儉從祖兄也竟陵王子良聞僧祐善彈琴於座取琴進之不肯從命卒於黄門郎劉悛婦弟王法顯同宋桂陽王作亂悛遂啟與婦别居終身不復見之悛以五兵尚書授散騎常侍領驍騎将軍卒梁江蒨為吏部郎僕射徐勉權重自遇蒨與抗禮勉因蒨門客翟景為第七兒繇求蒨女婚蒨不答景再言之乃杖景四十由此與勉有忤除散騎常侍不拜裴子野遭父憂居䘮盡禮天監初尚書僕射范雲嘉其志行将表奏之會雲卒不果樂安任昉有盛名為後進所慕逰其門者昉必相薦達子野於昉為從中表獨不至昉亦恨焉子野為鴻臚卿領歩兵校尉知著作郎兼中書舍人卒阮孝緒鄱陽忠烈王妃孝緒之姊王嘗命駕欲就之遊孝緒鑿垣而走卒不肯見天監十二年傅昭薦之徵不到臧嚴性孤介於人門未嘗造請僕射徐勉欲識之嚴終不詣卒於鎮南諮議參軍江子一直華林省其姑夫右衞将軍朱异權要當朝休暇之日賔客輻凑子一未嘗造門其髙潔如此子一少好學有志操以客貧闕養因蔬食終身終於南津校尉王承性簡貴有風格時右衞朱异當朝用事每休暇車馬填門時有魏郡申筴好危言髙論以忤權右嘗指异門曰此中輻凑皆以利徃能不至者惟有大小王東陽耳小東陽即承弟穉也當時惟承兄弟及禇翔不至异門世以此稱之嘗任國子祭酒出為東陽太守卒吉翂字彦霄其父為人所誣罪當大辟翂求代父死髙祖乃宥其父丹陽尹王志求欲於歳首舉充純孝之選翂曰異哉王尹何量翂之薄乎夫父辱子死斯道固然若翂有靦面目當其此舉則是因父置名一何甚辱拒之而止後湘州刺史栁忱召為主簿陳王元規父瑋梁武陵王府中記室參軍元規八歳而孤兄弟三人隨母依舅氏徃臨海郡時年十二郡豪劉瑱者資財巨萬以女妻之元規母以其兄弟幼弱欲結强援元規泣請曰因不失親古人所重豈得茍安異域輒婚非類母感其言而止虞寄為梁岳陽王中記室侯景之亂寄隨兄荔入臺除鎮南湘東王諮議參軍加貞威将軍京城陷遁還鄉里及張彪徃臨川强寄俱行寄與彪将鄭璋同舟而載璋嘗忤彪意乃刼寄奔扵晉安時陳寳應據有閩中得寄甚喜髙祖平侯景寄勸令自結寳應從之乃遣使歸誠承聖二年除和戎將軍中書侍郎寳應愛其才託以道阻不遣每欲引寄為僚屬委以文翰寄固辭獲免及寳應結婚留異潛有逆謀寄㣲知其意言說之際每陳逆順之理㣲以諷諌寳應輒引說他事以拒之又嘗令左右誦漢書卧而聼之至蒯通說韓信曰相君之背貴不可言寳應蹶起曰可謂智士寄正色曰覆酈驕韓未足稱智豈若班彪王命識所歸乎寄知寳應不可諌慮禍及已乃為居士服以拒絶之嘗居東山寺偽稱脚疾不起寳應以為假託使燒寄所卧屋寄安卧不動親近将扶寄出寄曰吾命有懸避欲安徃所縱火者旋自救之寳應自此方信及寳應既擒凡諸賔客㣲有交渉者皆伏誅惟寄以先識免禍後魏穆紹宣武時為侍中性方重罕接賔客元乂當權曽候紹紹迎送下階而已後除車騎大將軍固辭不拜又除侍中託疾不起莊帝立爾朱榮遣人徵之紹以為必死哭辭家廟及徃見榮於印山捧手不拜榮亦矯意禮之顧謂人曰穆紹不虚大家兒賈景興清峻鯁正少為州主簿遂栖遲不仕後葛榮陷冀州為榮所虜稱疾不拜景興每捫膝而言曰吾不負汝以不拜葛榮故也裴美字師伯少有美名舉秀才州主簿太尉咸陽王雅相賞愛欲以女妻之美拒而不納盧義僖為大中大夫散秩多年澹然自得李神俊勸其干謁當途義僖曰學先王之道貴行先王之志何能求富貴也後遷散騎常侍時靈太后臨朝黄門侍郎李神軌勢傾朝野求結婚姻謂義僖曰昔人不以一女易五男卿豈易之也義僖曰所以不從正為此耳從之恐禍大而速乃堅握義僖之手曰我聞有命不敢以告人遂適他族臨婚之夕靈太后遣中常侍服景就家勅停内外惶怖義僖夷然自若游肇為黄門侍郎時尚書令髙肇宣武之舅為百僚懾憚以肇名與己同欲令改易肇以孝文所賜秉志不許髙肇甚銜之宣武喜其剛梗崔挺為光州刺史景明初自代歸闕散騎常侍趙修得幸宣武挺雖同州壤未嘗詣門北海王詳為司徒錄尚書事以挺為司馬於後詳攝選衆人競稱考第以來遷叙挺獨無言詳曰崔光州考級並未加授宜投一牒當為申請蘧伯玉恥獨為君子亦何故黙然挺對曰階級是聖朝大例考課亦國之常典下官雖慚古賢不伐之美至於自衒求進竊以羞之詳大相稱歎目為司馬詳未曽呼名嘗稱州號以示優禮楊津為符璽郎津以身在禁宻不外交遊司徒馮誕與津少結交遊而津見其貴寵每嘗退避及相招命多辭疾不徃誕以為恨而津逾逺焉人或謂之曰司徒君之少舊宜蒙進達何遽自外也津曰為勢家所厚復何容易但全吾今日亦以足矣崔光韶河東武城人為廷尉卿永安末還鄉里刺史元弼前妻是光韶之繼室兄女而弼貪惏多諸不法光韶以親情亟相非責弼銜之時耿翔反於州界弼誣光韶子通與賊連結囚其合家考掠非理而韶與之辯爭辭不屈會樊子鵠為東道大使知其見枉理出之時人勸令詣樊陳謝光韶曰羊舌大夫已有成事何勞徃也子鵠亦歎尚之皇甫徽字子元安定朝那人仕梁厯諸王參軍郡守及夏侯道遷入國徽亦因地内屬徽妻即道遷之兄女道遷列上勲書欲以徽為元謀徽曰剏謀之始本不關豫雖貪榮賞實内愧於心遂拒而不許裴粲為宏農太守免官時僕射髙肇以外戚之貴勢傾一時朝士見者咸望塵拜謁粲候肇惟長揖而已及還家人尤責之粲曰何可自同凡俗也北齊楊愔孝昌中父津為定州刺史隨父之職及中山為杜雒周陷全家被囚縶未㡬雒周滅又没葛榮榮欲以女妻之又逼以偽職愔乃託宻含牛血數合於衆中吐之仍佯喑不語榮以為信然乃止裴諏之少有儒學司空髙乾致書曰相屈為戸曹參軍諏之復書不受署元景皓魏陳留王社之子社卒景皓嗣天保時諸元帝室親近者多被誅戮疏宗如元景安之徒議欲請姓髙氏景皓云豈得棄本宗逐他姓大丈夫寧可玉碎不能瓦全景安遂以其言白文宣乃收景皓誅之家屬徙彭城由是景安獨賜姓髙氏自外聽從本姓司馬膺之性方古不會俗舊與楊愔同為黄門郎至愔為尚書令抗禮如初愔嘗有從姊慘尚書卿尹皆跪吊膺之執手而出曽路逢愔威儀導引乃於樹下側避之愔於車望見令呼謂曰兄何意避弟膺之曰我自避赤棒本不避卿愔甚重之然以其疎簡傲物竟天保間淪滯不齒房豹以齊滅還鄉園自養頻徵辭疾終於家後周崔謙為京畿司馬族弟暹當時寵要謙與之舊僚同門非吉凶未嘗造請以雅道自居韋夐髙尚不仕時兄孝寛為延州總管夐至州與孝寛相見将還孝寛以所乗馬及轡勒與夐夐以其華飾心弗欲之笑謂孝寛曰昔人不棄遺簪墜履者惡與之同出不與同歸吾之操行雖不逮前烈然捨舊録新亦非吾志也於是乃乗舊馬以歸裴俠累遷河北郡守躬履儉素清慎奉公從弟伯鳳世彦時並為丞相府佐笑曰人生仕進須身名並裕清苦若此竟欲何為俠曰夫清者莅職之本儉者持身之基况我大宗世濟其美故能存見稱於朝廷沒流芳於典䇿今吾幸以凡庸濫蒙殊遇其窮困非慕名也志在自修懼辱先也翻被嗤笑知復何言伯鳳等慚而退隋李孝貞為給事中于時黄門侍郎髙乾親要用事求婚於孝貞孝貞拒之辛徳源仕周為宣納上士周因取急詣相州會尉廻作亂以為中郎徳源辭不獲免遂亡去蔡允恭大業中為起居舍人與虞世南同為學士煬帝遣斆宫人允恭貞介每以為辱因稱氣疾不時應命於後稍被疎絶唐陸徳明初王充僭號署散騎常侍漢王師將行束脩之禮徳明服巴豆散卧東壁下王充之子入跪牀前徳明對之遺痢竟不與語遂移病於成臯杜絶人事後歸國為國子博士李懐逺字廣徳趙郡栢人人也早孤貧好學屬文有宗人欲以髙䕃相假者懐逺退而歎曰因人之勢髙士不為假䕃求官豈吾本志未㡬應四科舉擢第位至兵部尚書同中書門下三品李勉初為太常少卿肅宗将大用會李輔國寵任意欲勉降禮於己勉不為之屈竟為所抑出汾虢二州刺史蕭復代宗時為太子僕屬連歳不稔穀價翔貴復家累百口無以自給將鬻昭列别業時宰相王縉聞其林泉之美心欲之乃使弟紞誘焉紞曰足下之才固宜居右職姑以别業奉吾兄吾兄當以要地處足下矣復對曰僕之鬻舊業以拯孀孤儻以美職售之姑姊弟姪受凍餒非鄙夫之願也縉既憾之受廢者數年復處之自若崔縱為金部員外孝悌修飾自以父為元載所排退居十餘年左官外府訖載得罪不求聞達杜黄裳為太常卿時順宗即位王叔文之竊權黄裳終不造其門李藩貞元中為祕書郎王紹持權邀藩一相見紹終不就王仲舒韋成季吕洞輩為郎官朋黨輝赫日會聚歌酒慕藩名强致同會藩不得已一至仲舒輩好為訛語俳戯後召藩堅不去曰吾與仲舒輩終日不曉所與言何也後數人果敗元正為河南連帥崔光逺從事屬史思明陷河雒正與弟同侍親潛伏林藪兇黨誘以髙位不出遇害崔應為滄景從事節度使程執恭嘗欲娶其妹不可遂棄職歸雒中執恭銜之遣賊就殺不克韋貫之為長安丞徳宗末年京兆尹李實權移宰相言其可否必數日而詔行人有以貫之之名薦於實者答曰是其人居與吾同里亟聞賢但吾得識其面而進於上舉笏示說者曰實已記其名氏矣說者喜驟以其說告於貫之且曰子今日詣實而明日受賀矣貫之唯唯數歳終不徃李渤祖元珪官至衛尉寺主簿父鈞官至殿中侍御史以母䘮不舉流于施州渤少時恥其家汚堅苦不仕勵志於文學隠嵩山之下讀書為文以自課宇文籍為監察御史坐王承系貶江陵戸曹至任節度使將議署置之賔筵文籍曰以君命黜當以君命升假榮偷奬非所願也後唐李敬義徳裕之孫居於平泉昭宗之都雒也徵為司勲郎中特為河南尹張全義所知給遺頗厚俄而朱溫簒位誓心不事偽室及溫徵命拒而不應退居衛州晉庫部郎中李專美少篤學為文以父樞唐昭宗時嘗應進士舉為覆試所落不許再入專美心愧之由是不游文塲册府元龜卷七百八十一
