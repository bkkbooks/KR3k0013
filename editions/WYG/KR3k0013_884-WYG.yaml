body:
  text: 册府元龜卷八百八十四宋王欽若等撰總錄部薦舉傳曰惟善人能舉其類又曰儒有忠信以待舉力行以待取故士之懐才抱道者曷嘗不思立功於當年而埀名於後世蓋㢘隅之攸尚以衒鬻而為耻焉乃有抱韞匵之價膺推轂之舉伸於知己揚於王庭繇兹而被竒遇都顯位樹洪伐騰徽聲者固不乏矣亦有肇自下位奮於編列上書公車稱薦卿輔而當世之主頗用其言自非倫擬之允諧才徳之胥恊進以成𢎞翼之美退而無朋比之嫌者疇克至是哉漢陳平因魏無知求見漢王漢王召入以平為亞將屬韓王信軍廣武絳灌等或讒平曰聞平居家時盗其嫂今大王尊官之令䕶軍臣聞平使諸將金多者得善處金少者得惡處平反覆亂臣也願王察之漢王疑之以讓無知問曰有之乎無知曰有漢王曰公言其賢人何也對曰臣之所言者能也陛下所問者行也今有尾生孝己之行而無益於勝敗之數陛下何暇用之乎今楚漢相距臣進竒謀之士顧其計誠足以利國家耳盗嫂受金又安足疑乎平位至丞相袁盎為中郎將孝文時張釋之與兄仲同居為騎郎十年不得調釋之曰乆宦减仲之産不遂遂猶達也欲免歸盎知其賢惜其去仍請徙釋之補謁者田叔為漢中守十餘年文帝初立召叔問曰公知天下長者乎對曰臣何足以知之帝曰公長者宜知之叔頓首曰故雲中守孟舒長者也是時孟舒坐虜大入雲中免帝曰先帝置孟舒雲中十餘年矣虜嘗一入孟舒不能堅守無故士卒戰死者數百人長者固殺人乎叔叩頭曰夫貫髙等謀反天子下明詔趙有敢隨張王者罪三族然孟舒自髠鉗隨張王以身死之豈自知為雲中守哉漢與楚相距士卒罷敝而匈奴冒頓新服北夷來為邉冦孟舒知士卒罷敝不忍出言士爭臨城死敵如子為父以故死者數百人孟舒豈敺之哉言不敺之令戰也是乃孟舒所以為長者於是帝曰賢哉孟舒復召以為雲中守鄧公成固人也多竒計建元年中上招賢良公卿言鄧先鄧先猶云鄧先生也一曰先者其名也鄧先時免起家為九卿楊得意蜀人為狗監主天子田獵犬也侍武帝帝讀子虚賦而善之曰朕獨不得與此人同時哉得意曰臣邑人司馬相如自言為此賦帝驚乃問相如相如曰有是然此乃諸侯之事未足觀請為天子游獵之賦上令尚書給筆札書奏天子以為郎嚴助㑹稽人也邑人朱買臣隨上計吏為卒將重車至長安買臣身自充卒而與計吏將重車也載衣食具曰重車詣闕上書書乆不報待詔公車糧用乏上計吏卒更乞匄之㑹助貴幸薦買臣召見說春秋言楚詞帝甚說之拜買臣為中大夫助為㑹稽太守與買臣俱侍中徐福茂陵人霍氏奢侈日甚徐生曰霍氏必亡夫侈則不遜不遜者必侮上侮上者逆道也在人之右衆必害之霍氏秉權日乆害之者多矣天下害之而又行以逆道不亡何待廼上疏言霍氏太盛陛下即愛厚之宜以時抑制無使至亡書三上輒報聞其後霍氏誅滅而告霍氏者皆封人為徐生上書曰臣聞客有過主人者見其竈直突傍有積薪客謂主人更為曲突逺徙其薪不者且有火患主人嘿然不應俄其家果失火鄰里共救之幸而得息於是殺牛置酒謝其鄰人灼爛者在於上行餘各以功次坐而不錄言曲突者人謂主人曰鄉使聼客之言不費牛酒終亡火患今論功而請賓曲突徙薪亡恩澤燋頭爛額為上客耶主人廼寤而請之今茂陵徐福數上書言霍氏且有變宜防絶之鄉使福說得行則國亡裂土出爵之費臣亡逆亂誅滅之敗徃事既已而福獨不䝉其功唯陛下察之貴徙薪曲突之䇿使居燋髪灼爛之右上廼賜福帛十疋後以為郎何武成帝時為丞相司直時數有災異武上封事曰虞有宫之竒晉獻不寐衛青在位淮南寢謀故賢人立朝折衝厭難勝於亡形司馬法曰天下雖安忘戰必危夫將不豫設則亡以應卒士不素厲則難使死敵是以先帝建列將之官近戚主内異姓距外故姦宄不得萌動而破滅誠萬世之長策也光祿勲慶忌辛慶忌也行義修正果毅敦厚謀慮深逺前在邉郡數破敵獲虜外夷莫不聞乃者灾異並見未有其應加以兵革乆寢春秋火災未至而豫禦之慶忌宜在爪牙官以僃不虞其後慶忌拜為右將軍諸史散騎給事中武為人仁厚好進士奬稱人之善為楚内史厚兩龔在沛郡兩唐兩龔龔勝龔舍也兩唐唐林唐遵也及為公卿薦之朝廷此人顯於世者何侯力也世以此為多焉黄霸為丞相長史坐夏侯勝事下廷尉獄中從勝受尚書既得出勝復為諫大夫令左馮翊宋畸舉霸賢良勝又日薦霸於上上擢霸為揚州刺史蕭望之為太子太傅甘露中諸儒薦張禹有詔望之問禹對易及論語大義望之善焉奏禹經學精習有師法可試事奏寢楊興為長安令元帝初即位樂陽侯史髙以外屬為大司馬車騎將軍領尚書事前將軍蕭望之為副望之名儒有師傳舊㤙天子任之多所貢薦髙充位而已言在猶不在也與望之有隙興說髙曰將軍以親戚輔政貴重於天下無二然衆庶論議令聞休譽不專在將軍者何也令善聞名休美也彼誠有所聞也以其不能進賢也以將軍之幕府海内莫不仰望而所舉不過私門賓客乳母子弟人情忽不自知言髙輕忽此事不自知其非然一夫竊議語流天下夫富貴在身而烈士不譽是有狐白之裘而反衣之也古人病其若此故卑體勞心以求賢為務傳曰以賢難得之故因曰事不待賢以食難得之故而曰飽不待食惑之甚者也平原文學匡衡材智有餘經學絶倫但以無階朝廷故隨牒在逺方階謂升次也隨牒謂隨選補之恒牒不被超擢也將軍誠召置幕府學士翕然歸仁誠謂實行之也與叅謀議觀其所有貢之朝廷必為國器所有謂材蓻所長以此顯示衆庶名流於世髙然其言辟衡為議曹史薦衡於帝帝以為郎中翼奉字少君東海下邳人也惇學不仕好律厯隂陽之占元帝初即位諸儒薦之徵待詔宦者署王商為太子中庶子以肅敬敦厚稱嗣父為侯推財以分異母諸弟身無所受居䘮哀戚於是大臣薦商行可以厲羣臣義足以厚風俗宜僃近臣繇是擢為諸曹侍中中郎將谷永長安人鴻嘉初御史大夫于永卒永上疏曰帝王之徳莫大於知人知人則百僚任職天工不曠故臯陶曰知人則哲能官人御史大夫内承本朝之風化外佐丞相統理天下任重職大非庸人所能堪今當選於羣卿以充其缺得其人則萬姓欣喜百僚說服不得其人則大職隳斁王功不興虞帝之眀在兹一舉可不致詳竊見少府宣薛宣也材茂行潔達於從政前為御史中丞執憲轂下不吐剛茹柔舉錯時當出守臨淮陳留二郡稱治為左馮翊崇教養善威徳並行衆職修理姦宄絶息辭訟者歴年不至丞相府赦後餘盗賊什分三輔之一減三輔之賊什九也功効卓爾自左馮翊初置以來未嘗有也孔子曰如有所譽其有所試宣考績功課簡在兩府不敢過稱以奸欺誣之罪臣聞賢材莫大於治人宣已有效其法律任廷尉有餘經術文雅足以謀王體斷國論身兼數器有退食自公之節宣無私黨游說之助臣恐陛下忽於羔羊之詩舍公實之臣任華虚之譽是用越職陳宣行能唯陛下留神考察帝然之遂以宣為御史大夫永位至大司農揚雄字子雲蜀郡人善屬文客有薦雄文似相如者成帝方郊祠甘泉泰畤汾隂后土以求繼嗣召雄待詔承明之庭後為大夫孔光為光祿大夫給事中哀帝詔光舉可尚書令者封上光謝曰臣以朽材前比歴位典大職卒無尺寸之效幸免罪誅全保首領今復㧞擢偹内朝臣與聞政事臣光智謀淺短犬馬齒臷誠恐一旦顛仆無以報稱竊見國家故事尚書以乆次轉遷非有踔絶之能不相踰越踔髙逺也尚書僕射敞公正勤職通敏於事可尚書令謹封上敞以舉故為東平太守敞姓成公東海人也師呉章為王莽所誅敞為大司徒掾自劾呉章弟子收抱章尸歸葬車騎將軍王舜髙其志節表奏以為掾薦為中郎諌大夫王莽簒位王舜為大師復薦敞可輔職為輔弼之任以病免唐林言敞可典郡擢為魯郡太尹更始時安車徵敞為御史大夫復病免去卒于家後漢馮異為光武主簿異因薦邑子銚期叔壽叚建左隆等光武皆以為掾史杜林為大司徒司直隗囂將牛邯有勇力才氣雄於邉埀囂死乃降林與大中大夫馬援並薦之以為䕶羗校尉林又薦同郡范逡趙秉申屠剛等皆被擢用士多歸之鮑駿九江人與丁鴻俱事桓榮甚相友善駿上書言鴻經學至行曰臣聞武王克殷封比干之墓表商容之閭二人無功下車先封之表善顯仁為國之砥礪也伏見丁鴻經眀行修志節清妙明帝甚賢之永平十年詔徵鴻拜侍中謝夷吾㑹稽人同郡友人王充為州治中自免還家夷吾上書薦充才學章帝時詔公車徵病不行夷吾為鉅鹿太守左轉下邳令卒魯恭為中牟令㑹詔百官舉賢良方正恭薦中牟名士王方章帝即徵方詣公車禮之與公卿所舉同方致位侍中杜詩為南陽太守時大司徒陽都侯伏湛䇿免徙封不其侯邑三千六百户遣就國詩上疏薦湛曰臣聞唐虞以股肱康文王以多士寧是故詩稱濟濟書曰良哉臣詩竊見故大司徒陽都侯伏湛自行束修訖無毁玷篤信好學守死善道經為人師行為儀表前在河内朝歌及居平原吏人畏愛則而象之遭時反覆不離兵㓙秉節持重有不可奪之志陛下深知其能顯以宰相之重衆賢百姓仰望徳義㣲過斥退乆不復用有識所惜儒士痛心臣竊傷之湛容貎堂堂國之光輝智畧謀慮朝之淵藪髫髪厲志白首不衰實足以先後王室名足以光示逺人古者選擢諸侯以為公卿是故四方回首仰望京師柱石之臣宜居輔弼出入禁門補缺拾遺臣詩愚戇不足以知宰相之才竊懐區區敢不自竭臣前為侍御史上封事言湛公亷愛下好惡分眀累世儒學素持名信經明行修通逹國政尤宜近侍納言左右舊制九州五尚書令一郡二人可以湛代頗為執事所非但臣詩䝉恩深渥所言誠有益於國雖死無恨故復越職觸冒以聞詩雅好推賢數進知名士清河劉統及魯陽長董崇等鄭衆為中郎將時戊己校尉耿恭屯車師後王城屯置數百人北匈奴圍恭固守章帝發兵迎之歸至玉門唯餘十三人衆上疏曰耿恭以单兵固守孤城當匈奴之衝對數萬之衆連月踰年心力困盡鑿山為井煮弩為糧出於萬死無一生之望前後殺傷醜虜數千百計卒全忠勇不為大漢耻恭之節義古今未有宜䝉顯爵以厲將帥及恭至雒陽鮑昱奏恭節過蘇武宜䝉爵賞於是拜為騎都尉以恭司馬石修為雒陽市丞張封為雍營司馬軍吏范羗為共丞共今衛州共城縣餘九人皆補羽林賈逵為中郎將永元中薦東萊司馬均陳國汝郁帝即徵之並䝉優禮田弱弱一作羽扶風人同郡法真辟公府舉賢良皆不就弱薦真曰處士法真體兼四業學窮典奥幽居恬泊樂以忘憂時蹈老氏之髙蹤不為𤣥纁屈也臣願聖朝就加衮職必能唱清廟之歌致來儀之鳯矣㑹順帝西廵弱又薦之帝虛心欲致前後四徵終不降屈郎顗北海人順帝陽嘉二年公車徴顗詣闕上書薦黄瓊李固並陳消災之術曰臣前對十事要政急務宜於今者所當施用誠知愚淺不合聖聼人賤言廢當受誅罰屛營惶怖靡知厝身臣聞刳舟剡檝將欲濟江海也聘賢選佐將以安天下也昔唐尭在上䕫龍為用文武創徳周召作輔是以能運天地之功增日月之耀也詩云赫赫王命仲山甫將之邦國若否仲山甫明之宣王是頼以致雍熈陛下踐阼以來勤心庶政而三九之位未見其人是以災害數臻四國未寧臣考之國典驗之聞見莫不以得賢為功失士為敗且賢者出處翔而後集爵以徳進則其情不苟然後使君子恥貧賤而樂富貴矣若有德不報有言不醻來無所樂進無所趨則皆懐歸藪澤修其故志矣夫求賢者上以承天下以為人不用之則逆天統違人望逆天統則災𤯝降違人望則化不行災𤯝降則下吁嗟政化不行則君道虧四始之缺五際之戹其咎繇此豈可不剛健篤實兢兢慄慄以守天功盛徳大業乎臣伏見光祿大夫江夏黄瓊耽道樂術清亮自然被褐懐寳含味經籍又果於從政眀達變復言明於變異消復之術也朝廷前加優寵賓於上位瓊入朝日淺謀謨未就因以衰病致命遂志老子曰大音希聲大器晚成善人為國三年乃立天下莫不嘉朝廷有此良人而復怪其不時還任陛下宜加隆崇之恩極養賢之禮徵反京師以慰天下又處士漢中李固年四十又通游夏之藝履顔閔之仁潔白之節情同皦日忠貞之操好是正直卓冠古人當世莫及元精所生王之佐臣天之生固必為聖漢宜䝉特徵以示四方夫有出倫之才不應限以官次昔顔子十八天下歸仁子竒穉齒化阿有聲若還瓊徵固任以時政伊尹傅說不足為比則可埀光景致休祥矣臣顗明不知人伏聼衆言百姓所歸臧否共歎願汎問百僚覈其名行有一不合則臣為欺國惟留聖神不以人廢言拜郎中辭病不就馬融為校書郎時永初四年䕶羗校尉龎參以失期下獄融上書請之曰伏見西戎反畔冦鈔五州陛下愍百姓之傷夷哀黎元之失業殫竭府庫以奉軍師昔周宣獫狁侵鎬及方孝文匈奴亦畧上郡而宣王立中興之功文帝建太宗之號非唯兩主有明睿之姿抑亦扞城有虓虎之助是以南仲赫赫列在周詩亞夫赳赳載於漢䇿竊見前䕶羗校尉龎參文武昭僃智畧𢎞逺既有義勇果毅之節兼以博雅深謀之姿又度遼將軍梁慬前統西域勤苦數年逺留三輔功效克立間在北邉單于降服今皆幽囚䧟於法網昔荀林父敗績於邲晉侯使復其位孟眀視䘮師於崤秦伯不替其官故晉景并赤狄之土秦穆遂霸西戎宜逺覽二君使參慬得在寛宥之例誠有益於折衝毗佐於聖化書奏赦參等皇甫䂓安定人為郎中託疾免歸規與張奐友善奐為使匈奴中郎將梁冀被誅奐以吏免官禁錮奐既被錮凡諸友舊莫敢為言唯規薦舉前後七上在家四歲復拜武威太守何休為議郎史弼坐論輸左較刑竟歸田里稱病閉門不出數為公卿所薦休又訟弼有幹國之器宜登台相徵拜議郎髙彪遷内黄令薦縣人申屠蟠等魏蔣濟為中䕶軍畢􅁤為并州刺史雜虜數為暴害􅁤輒出軍擊鮮卑軻比能失利濟表曰畢􅁤前失既徃不咎但恐是後難可以再凡人材有長短不可强成􅁤文雅智意自為美器今失并州換置他州若入居顯職不毁其徳於國事實善此安危之要唯聖恩察之蜀徐庶字元直潁川人與諸葛亮友善先主屯新野徐庶見先主先主器之謂先主曰諸葛孔眀者臥龍也將軍豈願見之乎先主曰君與俱來庶曰此人可就見不可屈致也將軍宜枉駕顧之繇是先主遂詣亮凡三徃乃見後為御史中丞呉𢎞咨曲阿人孫權姊婿也漢末諸葛瑾避亂江東咨見而異之薦之於權與魯肅等並見賓待嚴畯彭城人也河南徵崇隱於㑹稽所交結如丞相歩隲等咸親焉畯薦崇行足以厲俗學足以為師畯位至尚書令季衡少時知羊道有人物之鑒徃干之衜謂衡曰多事之世尚書劇曹郎才也是時較事吕壹操弄權柄大臣畏偪莫有敢言衜曰非季衡無能困之者遂共薦為郎權引見衡口陳壹奸宄數千言權有愧色數月壹被誅而衡大見顯擢仕至威逺將軍華覈為東觀令孫皓怒樓𤣥送廣州覈上疏曰臣竊以治國之體其猶治家主田野者皆宜良信又宜得一人總其條目為作維綱衆事乃理論語曰無為而治者其舜也與恭已正南靣而已言所任得其人故優游而自逸也今海内未定天下多事事無大小皆當關聞動經御坐勞損聖慮陛下既埀意博古綜極藝文加勤心好道隨節致氣宜得閒静以展神思呼翕清淳與天同極臣夙夜思惟諸吏之中任幹之事足委仗者無勝於樓𤣥𤣥清忠奉公冠冕當世衆服其操無與争先夫清者則心平而意直忠者惟正道而履之如𤣥之性終始可保乞陛下赦𤣥前􅄽使得自新擢之宰司責其後効使為官擇人隨才授任則舜之恭已近亦可得陸凱子褘為偏將軍凱亡後入為太子中庶子右國史華覈表薦褘曰禕體質方剛器幹强固董率之才魯肅不過及被召當下徑還赴都道繇武昌曾不回顧器械軍資一無所取在戎果毅臨財有節夫夏口賊之衝要宜選名將以鎮戍之臣竊思惟莫善於禕晉孫尹樂安人為陳留相時尚書右僕射劉毅年老以光祿大夫歸第後司徒舉毅為青州大中正尚書以毅懸車致仕不宜勞以碎務尹表曰禮凡卑者執勞尊者居逸是順敘之宜也司徒魏舒司𨽻校尉嚴詢與毅年齒相近徃者同為散騎常侍後分授外内之職資塗所經出處一致今詢管四十萬户州兼董司百僚總攝機要舒所統殷廣兼執九品銓十六州論議主者不以為劇毅但知以一州便謂不宜累以碎事於毅太優詢舒太劣若以前聼致仕不宜復與遷授位者故光祿大夫鄭袤為司空是也夫知人則哲惟帝難之尚可復委以宰輔之任不可諮以人倫之論臣竊所未安昔鄭武公年過八十入為周司徒雖過懸車之年必有可用毅前為司𨽻直法不撓當朝之臣多所按劾諺曰受尭之誅不能稱尭直臣無黨古今所悉是以汲黯死於淮陽董仲舒裁為諸侯之相而毅獨遭聖明不離輦轂當世之士咸以為榮毅雖身徧有風疾而志氣聰眀一州品第不足勞其思慮毅嫉惡之心小過主者必疑其論議傷物故髙其優禮令去事實此為機閣毅使絶人倫之路也臣州茂徳唯毅越毅不用則清談劉錯矣於是青州自二品已上光祿勲石鑒等共奏曰謹按陳留相孫尹表及與臣等書如左臣州履境海岱而叅風齊魯故人俗務本而世敦徳讓今雖不克於舊而遺訓猶存是以人倫歸行士識所守也前被司徒符當恭舉州大中正僉以光祿大夫毅純孝至素著在鄉閭忠允亮直竭於事上仕不為榮惟期盡節正身率道崇公忘私行髙義眀出處同揆故能令義士宗其風景州閭歸其清流雖年耆偏疾而神眀克壯實臣州人士所思凖繫者矣誠以毅之眀格不言而信風之所動清濁必􅅯以稱一州咸同之望故也竊以為禮賢尚徳教之大典王制奪與動為開塞而士之所歸人倫為大臣等虛劣雖言廢於前今承尹書敢不列啓按尹所執非惟惜名義於毅之身亦通陳朝宜奪與大凖以為尹言當否應䝉評議繇是毅遂為州都銓正人流清濁區別其所彈貶自親貴者始華譚廣陵人為本國中正後母憂服闋為鄄城令過濮水作莊子贊以示功曹而延掾張延為作答教其文甚美譚異而薦之遂見升擢及譚為廬江延已為淮陵太守後為元帝軍諮祭酒薦于寳范珧顧榮呉國呉人元帝鎮江東以榮為軍司時南土之士未盡才用榮又言陸士元貞正清貴金玉其質甘季思忠欵盡誠膽幹殊快殷薦元質畧有明規文武可施用榮族兄公讓明亮守節困不易操㑹稽楊彦明謝行言皆服膺儒教足為公望賀生沈潛青雲之士陶恭兄弟才幹雖少實事極佳凡此諸人皆南金也書奏皆納之袁琇為元帝鎮東從事中郎時陳頵避難於江西為丹陽内史朱彦叅軍琇薦頵於元帝遷鎮東行叅軍事典法兵二曹干寶與葛洪深相親友寶薦洪才堪國史選為散騎常侍領大著作洪固辭不就寳位至散騎常侍庾翼與桓温友善嘗相期以寧濟之事温尚南康長公主翼嘗薦温於明帝曰桓温少有雄畧願陛下勿以常人遇之常壻畜之宜委以方召之任託其𢎞濟艱難之勲位至征西將軍領南蠻校尉應詹薦韋泓於元帝曰自遭䘮亂人士易操至乃任運固窮耿介守節者尠矣伏見議郎韋泓年三十八字元量執心清冲才識僃濟躬耕隴畝不煩人役静黙居常不豫政事昔年流移來在詹境經冦䘮資一身特立裋褐不掩形蔬菜不充朝而抗志彌厲不遊非類顔回稱不改其樂泓有其分明公輔亮皇室恢維宇宙四門開闢英彦鳬藻收春華於京輦採秋實於巖藪而泓抱璞荆山未剖和璧若䝉銓召付以列曹必能恊隆鼎味緝熙庶績者也帝即辟之詹位至平南將軍宋劉穆之初為髙祖太尉司馬謝晦初為孟昶建威府中兵叅軍昶死髙祖問劉穆之孟昶恭佐誰堪入我府穆之舉晦即命為太尉恭軍穆之此所薦逹不進不止嘗云我雖不及荀令君之舉善然不舉不善王景文瑯琊人少與謝荘齊名荘子􅊪年七歲景文見而異之言於孝武召見於人衆中􅊪舉止閑詳應對合㫖帝恱之景文位至中書監領太子太傅南齊杜京産始平東山開舍授學孔稚珪周顒謝􅊪並致書以通殷勤永明十年稚珪及光祿大夫陸澄祠部尚書虞悰太子右率沈約司徒右長史張融表薦京産曰竊見呉郡杜京産潔静為心謙虛為性通和發於天挺敏達表於自然學遍𤣥儒博通子史流連文藝沈吟道奥泰初之朝挂冠辭世遁捨家業隱於太平葺宇窮巖採芝幽澗耦耕自足薪歌有餘確爾不羣淡然寡欲麻衣藿食二十餘載雖古之志士何以加之謂宜釋巾幽谷結組登朝則巖谷含懽薜蘿起忭矣不報建武初徴為員外散騎侍郎京產曰莊生持釣豈為白璧所廻辭疾不就顧暠之呉郡人為司徒左西曹掾同郡陸欷少有風槩好屬文五言詩體甚新變永明九年詔百官舉士暠之表薦焉梁范縝為中書郎與裴子野未遇聞其行業而善焉㑹遷國子博士乃上表讓之曰伏見前冠軍府錄事叅軍裴子野年四十字㡬原㓜禀至人之行長厲國士之風居䘮有禮毁瘠㡬滅免憂之外蔬水不進棲遲下位身賤名㣲而性不憛憛情無汲汲是以有識嗟推州閭歎服且家傳素業世習儒史苑囿經籍遊息文藝著宋畧二十卷彌綸首尾勒成一代屬辭比事有足觀者且章句洽悉訓詁可傳脫置之膠庠以𢎞奬後進庶一䕫之辯可尋三豕之疑無謬矣伏惟皇家淳耀多士盈庭官人邁乎有媯棫樸越於姬氏茍片善宜錄無論厚薄一介可求不繇等級臣歴觀古今人君欽賢好善未有聖朝孜孜若是之至也敢緣斯義輕陳愚􅎩乞以臣斯忝廻授子野如此則賢否之宜各全其所訊之物議誰曰不允臣與子野雖未嘗銜杯訪之邑里非差虚謬不勝慺慺㣲見冒昧陳聞伏願陛下哀憐悾欵鑒其愚實干犯之諐乞埀赦宥有司以資歴非次弗為通裴儉馮翊人也鄉人吉翂為相州刺史柳恱主簿儉與丹陽郡守臧盾揚州中正張仄連名薦翂以為孝行純至明通易老勅付太常旌舉徐勉為太子詹事天監中勉舉晉安王府恭軍劉杳及顧恊何思澄等入華林撰編畧後魏游雅廣平任人與髙允俱知名大廷中以前後南使不稱妙簡行人雅薦允弟推應選使宋南人稱其才辯又稱薦同郡游眀根於太武太武擢為中書學士雅位至祕書監北齊慕容紹宗為樂平太守時河間人信都芳善宗兄紹宗天文算數隱於并州樂平之東山保樂聞而召之芳不得已而見焉於是紹宗薦之於齊獻武王以為中外府田曹叅軍紹宗位至徐州刺史後周唐瑾封臨淄公時柱國府記室叅軍樂運性方直未嘗求媚於人瑾薦露門學士隋髙孝基為雍州司馬時杜淹與韋福嗣共入太白山中揚言隱逸文帝聞而惡之謫戍江表後淹還鄉里以經籍為娯閉門不出孝基有知人之鑒上表薦之授承奉郎唐恒何貞觀初為中郎將馬周至京師舍於何之家于時太宗正開上書之路虛懐於政術周欲陳便宜二十餘事無繇自達遣何奏之事皆合㫖太宗怪而問何何對曰此非臣之所發慮乃臣之家客馬周也與臣言未嘗不以忠孝為意於是召見與語深恱之宣令直門下省令房𤣥齡試其經義及時務䇿擢第授儒林郎守監察御史奉使稱㫖太宗甚恱以恒何舉得其人賜帛百疋張行成貞觀中為太子詹事太宗征遼髙宗於定州監國即行成本邑也行成因薦鄉人魏唐卿崔寳權馬龍駒張君勃等皆以學行著聞太子召見以其老不任職乃禮而遣之李栖筠才器絶倫而樂人攻已之短奬善舉能嘗薦文武將吏三百餘人登將相踐臺閣顯名於時者僅數十人栖筠位至御史大夫李行修為殿中丞長慶三年六月授進士費冠卿右拾遺冠卿及第歸而父母殁甞恨不及榮養遂絶迹仕進行修薦之除官册府元龜卷八百八十四
