body:
  text: 册府元龜卷七十三宋王欽若等撰帝王部命相第三唐肅宗至徳元年七月即位於靈武以御史中丞裴冕為中書侍郎同平章事二年正月以憲部尚書李麟同平章事二月以前憲部尚書致仕苗晉卿為左相晉卿天寳末為憲部尚書屬禄山叛逆楊國忠以晉卿有時望出為陜州刺史晉卿辭疾不行因而致仕及朝廷失守衣冠流離道路多為逆黨所脅自陳希烈張均已下數十人盡赴雒陽晉卿潛逃山谷南投金州會肅宗至鳳翔手詔追晉卿赴行在所即日拜為左相國務悉以咨之五月以諌議大夫張鎬為中書侍郎平章事十一月以左相苗晉卿為中書侍郎平章事十二月制曰尚書左僕射兼武部尚書平章事子儀才光三傑功格十臣克焯皇威載昌大業可司徒兼尚書左僕射司徒兼户部尚書平章事光弼全徳挺生英材間出干城禦侮坐甲安邊可司空兼兵部尚書並平章事如故乾元元年五月以太常少卿知禮儀事王璵為中書侍郎平章事二年三月甲午制曰出納絲綸是稱喉舌調和鼎飪必在鹽梅况艱難之際擇賢必資於選衆宻勿之地論道固期於得人兵部侍郎吕諲間氣挺生宏才逈發訥言敏行強識博聞謀猷出三傑之先徳業處五人之上乆在朝列尤推審慎復得釣璜之慶宜膺補衮之求可同平章事乙未又制曰出納帝命經綸王言兆若見於非熊位必登於仲虺行御史大夫兼京兆尹李峴朝廷碩徳宗室藎臣中書舍人兼禮部侍郎李揆文房學府命代挺生行户部侍郎兼御史中丞第五琦武庫智囊應期間出皆中和秀氣維嶽降靈可以宣暢謀猷闡宏體要庶得道光風力名重伊臯俱當入夢之辰共舉從繩之直既用立汝宜其弼予峴可行吏部尚書揆可中書侍郎琦可户部侍郎並平章事上元元年五月制曰宰輔之重陶鎔所寄用諧時望必藉素名是以殷登左相伊尹成乎一徳漢命舊臣孔光由其再起葢以上扶皇極下庇蒼甿永懐寅亮之羙實屬股肱之任特進守太子太𫝊上柱國韓國公苖晉卿衣冠宿望廊廟公才體文雅之宏量負經通之逺識累踐臺閣乆彰名器自艱難之際協贊有勞早契風雲之期備陳康濟之術頃以疲疴固辭樞務重違誠懇之志爰假優崇之秩雖訏謀暫間而夢寐無忘今戎事猶虞蒸人未乂漢將且聞於辭第留侯豈遂於停飡成余社稷之本懿爾勲庸之望固可勉行新紱載珥舊貂宜罷輜車之禮俾膺黄閣之政可行侍中二年二月制曰弼予之選審象是求天歩未平廟謨尤切必資明表佇以佐時畫一之材取則不逺正議大夫前河中尹徐國公賜紫金魚袋蕭華公輔成名承家繼業詞標麗則徳藴謨明道開雲霧之光節貫嚴凝之序早登臺閣多識舊章再履宫坊先知至行致君望羙閲相求能且推伊陟之賢更啟漢臣之閣還依日月佐理隂陽俾參政於紫宸用建中於黄極可中書侍郎平章事集賢殿崇文館大學士兼修國史四月制曰致君惟善輔徳在和必俟三台之明用增九鼎之重彜倫所屬元氣是調乃眷公才作予良弼銀青光禄大夫行尚書吏部侍郎裴遵慶體凝精粹理暢黄中學奥全經詞深大雅行歸於簡節固其貞公輔之望攸先古人之風非逺累階朝序乆踐天臺凡所彌綸多為故事咸有斯在王猷是經庶𢎞翼善之功克濟艱難之運登榮瑣闥參政兩闈宜輟山公之啟以光説命之求可行黄門侍郎平章事元年建辰月戊申詔曰天位惟艱廟謨是切委在公輔正于四方佇鼎實之能調補衮章之有闕眷求勵翼式允僉諧朝議大夫行尚書户部侍郎兼御史中丞上柱國許昌縣子賜紫金魚袋充度支等使元載清明在躬貞固幹事信必可復文而不華凖繩朝端金玉王度不有其善遹觀厥成固是生靈之傑咸推宰輔之器執兹大政叙以彜倫建中于人莫匪相爾丹青神化參議兩闈宜書一徳之篇俾恊贊􅆳歌之羙可平章事兼集賢殿崇文館大學士脩國史餘如故代宗寶應二年正月制曰搆廣厦者審象於宏材經萬邦者注意於良弼自非道符夢卜名冠簪裾何以允副虛求式諧時望銀青光禄大夫京兆尹判度支充勾當度支等使上柱國彭城縣開國伯劉晏應期生徳維嶽䧏賢文為君子之儒器藴通人之量學苞前典志在於直方詞蔚古風義存於比興自兼京劇職總均輸變而能通𢎞適時之務居難若易多濟物之心頃者戎事方殷軍賦惟錯率皆倚辦每務推誠冦難初夷皇猷咨弼周王佐國必自於天官漢代登台咸由於亞相宜應選衆之舉用成亮采之功可金紫光禄大夫吏部尚書平章事勲封及度支等使並如故廣徳元年十二月以檢校吏部尚書兼宗正卿李峴為黄門侍郎平章事二年正月以前右散騎常侍王縉為黄門侍郎太常卿杜鴻漸為兵部侍郎並平章事大厯十二年四月制曰體國經務亮采惠疇以遂萬物之宜以刑四方之禮彌縫衮職金玊王猷平景緯於台階濟鹽梅於鼎飪必先時俊允膺旁求朝議大夫守太常卿兼修國史賜紫金魚袋楊綰贍學懿文崇徳廣業表微藏用適務知章朝議郎守尚書禮部侍郎集賢院學士上柱國賜紫金魚袋常衮志業貞諒理識宏深守正居中確乎難奪頃以戎車未戢方事仍殷永言庶政有乖彜叙今將本俗刑教澄源振綱宣九徳以阜成張四維而翼贊洽于僉論咨爾具瞻往副審象之誠懋緝時雍之化綰可中書侍郎平章事集賢殿崇文館大學士修國史散官勲如故衮可門下侍郎平章事太清太微宫崇𤣥𢎞文館大學士㪚官勲賜如故初綰為吏部侍郎典選公平以清貞自守元載心疎忌之奏以為國子祭酒代宗知之遷為太常卿充禮儀使以觀其效用載既伏誅乃拜之綰乆積公輔之望及詔出朝野相賀衮為禮部侍郎集賢院學士載之得罪令衮與劉晏李極等鞫之獄竟遂有是拜徳宗以大厯十四年五月癸亥即位閏月甲戌以新除河南少尹崔祐甫為門下侍郎平章事崇𤣥館𢎞文館大學士太清宫太微宫使時常衮獨當樞務祐甫為中書舍人議䘮服與衮異同堅諍不服衮乃奏貶祐甫潮州刺史内議太重改授河南少尹時郭子儀朱泚俱以功髙為相宻勿之議莫得聞知而衮假署二人之名及詔出子儀及泚皆表明其不直有詔逐衮潮州刺史而以祐甫為相兩換其職八月祐甫改中書侍郎集賢殿崇文館大學士脩國史平章事如故以通州司馬司正楊炎為門下侍郎平章事崇𤣥館𢎞文館大學士太清宫太微宫使初炎為吏部侍郎兼史館脩撰元載為相引炎親重之載敗炎貶道州司馬徳宗初即位議用宰相崔祐甫薦炎有文學器用帝亦自聞其名故特徵拜又以懐州刺史喬琳為御史大夫平章事京畿觀察使建中二年二月以門下侍郎平章事楊炎為中書侍郎平章事脩國史以御史大夫京畿觀察使盧杞為門下侍郎平章事七月以前永平軍節度使張鎰為中書侍郎平章事三年十月以吏部侍郎闗播為中書侍郎平章事四年十月帝在奉天以户部尚書兼御史大夫荆襄江西等道都元帥統軍長史蕭復為吏部尚書侍郎兼御史中丞荆襄江西等道都元帥判官劉從一為刑部侍郎京兆府尹曹參軍翰林學士姜公輔為諫議大夫並平章事興元元年正月以吏部侍郎盧翰為兵部侍郎平章事貞元元年七月以劍南西川節度使張延賞為平章事初駕幸奉天延賞陳謨供獻頗効忠力及駕至梁州倚劍南蜀川為根本即拜延賞為中書侍郎同平章事至是劉從一有疾乃徵延賞入輔大歴末吐蕃冦劍南李晟領神䇿軍戍之及還攜倡妓歸延賞追之晟深憾焉晟既建大功以中書令鎮鳳翔表稱宿故懼延賞之至朝廷以其功髙為之免延賞相拜左僕射二年正月以散騎常侍劉滋給事中崔造中書舍人齊映各守本官平章事三年正月以左僕射張延賞平章事延賞既與李晟有隙因浙東西節度使韓滉来朝滉嘗奬遇晟又知帝欲相延賞而有阻乃因㑹讌説晟使釋憾遂飲極歡且使晟稱延賞於帝前於是復加平章事是月又以兵部侍郎栁渾平章事仍判門下省事又以前檢校禮部尚書陜虢觀察使李泌為中書侍郎平章事五年二月以大理卿董晉為門下侍郎御史中丞權判户部侍郎竇參為中書侍郎並平章事八年四月以尚書左丞趙憬兵部侍郎陸贄並為中書侍郎平章事九年五月以義成軍節度使賈耽為尚書左僕射尚書左丞盧邁守本官並平章事十二年十月以右諫議大夫崔損給事中趙宗儒並平章事仍賜紫金魚袋十四年七月以工部侍郎鄭餘慶為中書侍郎平章事十六年九月以太常卿齊􅎨為中書侍郎平章事十九年三月以淮南節度使檢校尚書左僕射平章事杜祐為檢校司空平章事太清宫使十一月以太常卿髙郢為中書侍郎吏部侍郎鄭珣瑜為門下侍郎平章事順宗貞元二十一年正月丙申即位二月辛亥詔曰宰相之職寅亮緝熈導陰陽之和贊天地之化裁成百揆總領庶官非道契時中識通理本則何以敷暢皇極阜安羣黎朕以𦕈身嗣守丕業思立人紀以承天休其代予言允屬良弼朝議郎守吏部郎中騎都尉賜緋魚袋韋執誼孝友忠肅自誠而眀茂實本於宗師英華發於事業乆參内署動直静專累踐中臺職脩事舉克有公望冠於羣倫以予冲人恭黙思道是用命爾納誨弼違必能行四方之風成天下之務祗服乃職厥惟欽哉可守尚書左丞平章事賜紫金魚袋初執誼為翰林學士知待詔王叔文幸於東宫傾心附之叔文亦欲自廣朋黨宻與交好至是遂特用為相七月制曰輔弼股肱之臣所與共成天功左右邦治者也朕承至尊之重居羣后之上夙興寅畏不敢康寧思所以統天人之和彰祖宗之烈以行四方之政以遂萬物之宜敷求哲人以輔台徳銀青光禄大夫守太常卿充禮儀使上柱國鄭縣開國公杜黄裳𢎞深易簡資博厚之徳朝議郎檢校左散騎常侍兼左金吾大將軍充左街使雲騎尉賜紫金魚袋袁滋冲茂精微體誠眀之性咸以器業閎茂服在大僚祗事先朝克荷休命識逹道奥文為國經固可以儀刑具僚參綜庶務寅亮天下毗予一人罔不同心以輔乃辟黄裳可門下侍郎平章事滋可中書侍郎平章事憲宗永貞元年八月制曰有天下者曷嘗不選賢與能納于輔弼用又厥辟以和羣生所以叙彜倫平憲度建用皇極底乎雍熈者也朕祗若大訓圗任舊人疇咨庶工用佐予理朝議大夫守尚書左丞輕車都尉賜紫金魚袋鄭餘慶全器茂學蹈中秉直易則可乆和而不流嘗踐禁闈亦恭衮職每盡王臣之節實彰君子之風服於大僚克有休問洎綜理㑹府紀綱郡司率繇舊章協于成式固可以儀刑庶尹寅亮天工可平章事十二月制曰朝廷者天下之楨幹宰輔者王化之根源朕夙寤晨興講求為治之本思所以仰承宗廟之重俯協億兆之心諧和隂陽茂育區宇以貞百度以序九疇佐子成功實頼良弼具瞻之地公望攸歸朝議大夫守中書令翰林學士上柱國賜紫金魚袋鄭絪乗仁迪哲守約居易懿以文徳擇乎中庸體元和之淑姿服大雅之眀訓累登班序休有令聞羽儀周行黼藻王度洎發揮綸翰典職禁闈以温文雅麗之才居獻納論思之地從容中節宻勿盡規先朝任能委遇斯重恪恭夙夜縣歴嵗年誠節貫於屯夷茂勲參於顧託名書彜鼎心著丹青朕祗膺睿圗誕受眀命𢎞宣大典澤潤鴻猷保乂於一人儀刑於萬國簡于朕志用選厥勞圗任舊人以輔乃辟疇咨四嶽罔不僉同宜膺弼亮之任式懋彌綸之績於戲為君之難在乎舉而不任為臣之患在乎知而不言事舉其中政脩其本永綏厥位時乃之休可中書侍郎平章事兼集賢殿大學士元和二年正月制曰惟人代工與物施化財成者元首輔翼者股肱况國之號令本於内史政所闗决審於黄樞爰發四方用寧庶績必求同徳資以弼予朝議郎尚書户部侍郎天水縣開國子賜緋魚袋武元衡挺生偉才克振前緒蹈禮合樂謙厚端和居暗室而不欺處巖廊而益重文能合凖吏必立程再司石室之圗遂踐春華之署故事可舉嘉猷日新爰委地征實惟邦本勤於小物𢎞以大綱一心不移於吐茹衆務必歸於領㑹欝此時望稱為名臣朕祗奉鴻休懼于負荷居則神眀之隩位當億兆之尊嘗恐眀不燭幽慮不及逺一物未獲萬方在予書不云乎臣作朕股肱耳目是用命爾處兹弼諧爾其慎於將命勉於規誨必思衮闕無或面從直哉惟清副我眀命可朝議大夫守門下侍郎平章事賜紫金魚袋憲宗為太子時知元衡進退守正及用為宰相甚禮信之又制曰昔周宣王思𢎞文武之道則以申甫代天工漢宣帝思振祖宗之風則以邴魏執邦柄是以克紹前烈俱稱中興朕以𦕈身託于人上亦思所以纉列聖之緒致太階之平懐柔四夷親附百姓將成莫大之業遂獲非常之才授之鈞衡俾作舟楫銀青光禄大夫行中書舍人翰林學士上柱國李吉甫符彩外發清眀内融體仁而温抱義而俊識洞精􅄨知皇王政理之源學該古今窮天人相與之際自擢于綸閣列在禁闈鼓二變之文潤色王度總五材之用參贊廟謨化俗思邁於成康致君願及於堯舜當注意之所向每罄心而俾陳深中不回獨立無懼經綸嘗見其道逺激切多至於涕零王綱以張蜀冦斯殄左右宻勿實由嘉言䧏神而生輔朕為理調三光以序六氣遂物性而熈帝猷是為中樞思我大本命爾俞往其惟朂哉於戲宰輔之任安危所繫百辟為憲萬邦所瞻與其眀察以為公不若嚴重而有制與其將順於甚羙不若拯救於纎違審涇渭以序人倫謹繩墨以示天下交泰之運其在斯乎敬聴朕言以踐乃職可守中書侍郎平章事三年九月以山南東道節度使檢校尚書左僕射同平章事燕國公于頔為守司空平章事初頔專有漢南之地不奉詔㫖擅總兵據南陽徳宗為之旰食反憲宗即位威肅四方頔稍戒懼至是来朝故有是命因以裴均代為節度使是月以户部侍郎裴垍為中書侍郎平章事初垍罷翰林學士憲宗知垍好直信任彌厚因李吉甫出鎮淮南遂以垍為相四年二月制曰皇王理本繫於輔弼内以熈庶績釐百工外以撫四夷式羣后三五已䧏崇替繇之朕祗荷丕圗思底于道夙夜惟厲登延俊賢若渉大川俾作舟楫朝散大夫守給事中上柱國李藩天鍾萃羙氣禀清英信任言前行為人表藴經邦之識度發自眀誠見理道之根本欝為公器學深㫖奥文以忠貞大玉斯寶于東序朱絃可薦於清廟廣則難挹剛則有容處衆無溷其風標存簡較推其名節累登華署克贊彌綸擢授左丞專聞駁議永為股肱之任翼亮是資必求其人豈限嘗次黄樞選重僉曰宜之爰舉朝章式副公望於戲爾惟率正邪罔不懲惟匪躬直誠可以事上惟秉鈞平施可以致和毗予一人允理三事懋乃攸績永孚於休可朝議大夫守門下侍郎平章事賜紫金魚袋五年九月制曰夫宰相之任上以代天工輔佐之宜下以立人極爰得忠正方膺股肱正議大夫守太常卿上柱國襄武縣開國侯賜紫金魚袋權徳輿器度端實智識通敏學成師法文為國華素履嘗踐於貞方黄中允合於易簡自出入清列茂著嘉猷名利無屑於中懐風雨不易其常性驥騄之質嘗識於逺途鸞鳳之姿宜巢於阿閣期於致理推之至公寵以春卿掌我樞務輔天地之徳俾化及清寧道隂陽之和使物靡疵癘予違汝弼言無面從君可臣否事已心許用佇𢎞羙式副虛懐可守禮部尚書平章事散官勲封賜如故六年正月制曰輔弼之重邦家所屬寄深垣翰則外撫諸侯望切股肱則入熈庶績迭居其任厥惟舊哉前淮南節度副大使知節度事管内支度營田觀察處置等使金紫光禄大夫檢校兵部尚書兼中書侍郎同中書門下平章事揚州大都督府長史上柱國趙國公食邑三千户李吉甫𢎞經逺之才研極深之慮脱落細故洞開中懐文稽典謩學升堂室洎司我宻命言屢表於獨眀參予衮職道每彰於孤直貢其誠節竭以公忠墜典載張彜倫攸序輔予不逮懐之豈忘曩以江淮大都吳楚雄鎮嵗屬艱食人多愁聲是假全才用康疲俗下流乎水利不憚乎勞心故矗以長塘瀦其天澤變舄鹵為稻梁之壤致蒸黎有衣食之原吏守成規人無遷志庶富之教既宣於封内輔相之宜俾及於天下顧兹重務屬於良臣去其外職之繁專以中樞之任至於别館良史之褒貶内殿集賢之清秘爰舉舊典式洽新恩無曠厥官往踐乃位可中書侍郎平章事兼集賢殿大學士兼脩國史十二月制曰司重柄者允屬於長材熈大猷者固資於端士朕纉承鴻緒撫有萬方夙夜祗勤懼逺於道故每注意宰輔勞懐夢想誠以得失之效邦家所繫疇若僉論簡予深𠂻必惟其人是舉成命朝議郎守尚書户部侍郎驍騎尉賜紫金魚袋李綘質秀珪玉文含采章抱器挺生居貞特立有史魚秉直之操勵山甫匪懈之誠忠孝兩全學識兼茂清標可以範雅俗正氣可以肅羣倫頃自周行俾參宻命動必以義知無不為謇謇懐經濟之心孜孜陳逺大之畧言無隐避名則静專貫于始終其道一致地卿之貳爰委典司理財先示于簡亷利物每懲于聚斂經通立制器用彌光臺閣之間欝有公望是宜權衡百度宰理庶工允副具瞻掌我庶務於戲予欲驅人俗以躋富夀感人心而致和平爾尚脩眀憲章宣布徳澤必廣大其志無皦察為公任之以職無忘陳平之言苟便于人勿憚蕭何之請敬兹寵擢其懋戒哉可朝議大夫守中書侍郎平章事八年二月制曰邦國興理將相是咨選衆而舉思賢俾乂故有台臣外撫宣力以靖於四方衮職迭居懋功復凝於庶績允兹崇踐爰屬上才前劍南四川節度副大使知節度事管内支度營田觀察處置統押近界諸蠻及西川八國雲南安撫等使銀青光禄大夫檢校吏部尚書兼門下侍郎同中書門下平章事成都尹上柱國臨淮郡開國公食邑二千户武元衡粹厚端莊簡易恒一有成名之道以致用有宏茂之略以佐時直方自得於性術操尚不愆於風雨加以懿文合雅聚學承師通禮樂刑政之源逹古今㳂變之要歴登華貫休問穆然洎處鈞衡中立不倚致君思堯舜之盛脩職以邴魏為宗翼戴之勤夙夜彌亮彜倫攸叙鼎飪載和益部大藩比伏兼濟而能布宣威惠撫控蠻髦縣道輯寧疲黎安息推心而士皆率附正巳而人自嚮方臨之累年理有異等朕以出納王命緝熈帝圗總庶官之職業為百度之扄鍵惟此重任屬于黄扉分憂遂輟於殿邦具瞻再歸于碩望爾尚行之以中正煦之以和平毗予一人膏潤天下祗服禮命無替令猷可守門下侍郎平章事兼崇𤣥館大學士充太清宫使九年六月制曰虞以為盛猶咨五臣殷之用興亦頼三后朕勵精恭己十載于兹嘗以國鈞委之公輔務熈庶績敢怠旁求思欲左右有人在廣股肱之任歴選列辟洎于草澤兾獲能賢俾𢎞正道今兹所命允屬至懐河中晉綘慈隰等州節度度支營田觀察處置等使正議大夫檢校禮部尚書兼河中尹御史大夫上柱國髙平縣開國子食邑五百户賜紫金魚袋張𢎞靖徳禀精微器含冲用温恭諒實眀允克誠素推君子之風雅有大臣之體藴積稽古之學發揮經緯之文嘗司朕言動協謨訓歴踐清貫具揚淑聲爰統方州載膺節制奉法遵道勤公忘私人無不懐績用丕茂予欲正百工之理開太平之階若臨巨川以重舟楫是用命爾參列中台每念臣隣之規以貞棟崇之吉少翁積慶嗣徳漢廷文子勤身繼主晉室爾惟朝夕納誨以翊朕躬是資衮職之勤式重緇衣之羙仍帥司冦之屬俾靖臯陶之刑懋宣厥繇往踐於位可刑部尚書平章事散官勲封如故又制曰弼成大化參叙彜倫克光元首之眀斯其股肱之任所以不自暇逸務求賢能式重舟楫之才以𢎞經濟之道疇若予采僉諧乃公中大夫守尚書左丞上輕車都尉賜紫金魚袋韋貫之清眀在躬禮樂之器藴珪璋特逹之徳茂亷正博雅之觀静而知微動必有守凡踐列位備聞嘉猷當官而行臨事而斷道可正于風俗望彌積於朝倫是宜和静隂陽紀綱邦國命作心膂列于台階夫能慮四方揆百事愛利萬物辨論羣材公以忘私時乃之職而况圗靖藩服繫在廟謀爾惟順下以訓人奉上以宣力因衆功而致用熈衆志以為心朝夕獻可否之誠經綸底文武之績祗膺厥服勿懈于時可守尚書左丞平章事散官勲賜如故十年六月制曰輔相之任重作予股肱經濟之才難在人耳目苟非慮研物表識洞事先則何以出納中樞平章大政詢於時論僉曰汝諧朝議郎守御史中丞兼尚書刑部侍郎飛騎尉賜紫金魚袋裴度勁正循道清眀秉彜文融菁華行茂枝葉居然廊廟之器出於領袖之門西掖司言南臺執憲嘗陳眀略屢告嘉猷實宣力以狥公能外身而憂國霜雪無改風雷有恒朕欲旋觀其能眀試於事俾歴戎閫載馳使軒王澤渙汗以遐宣軍情宻勿而上逹將議抽擢因罹震驚崇道徳之藩籬士有致命資忠信之甲胄兵無容刃人具瞻爾天方賚予昆命于龜爰立作相爾其展四體堅一心廣其道以用賢厚其風而易俗五兵未戢爾惟保定武功百姓未康爾惟勤䘏人隐臨事必斷當官而行濟台階以至平補衮職之有闕光膺慎選其戒之哉可朝議大夫守中書侍郎平章事度知制誥時田𢎞正初以魏博順命度宣慰𢎞正軍中及見境内百姓布揚徳澤上下感悦還奉稱㫖度勁辨能言軍國情體通逹物情尤尚感激繇是將帥多悦自淮西行營還帝益聴信猶以武元衡輩在尚未用度以瘡卧二十餘日詔以衡遇害便以大計屬度度初兵宿第中中使日至未拜相先一日遣使詔度不用到宣政參暇便来延英候對及見念問周悉眀日又召使受制命時外集天下兵而内有大恐及度任政人情始繫以安危十一年二月制曰朕觀古先哲王興化致理未嘗不選建良弼熈寧庶政俾之敷陳大猷左右乃辟者也朝議郎守中書舍人權知禮部貢舉輕車都尉賜緋魚袋李逢吉疏通而守於經制質厚而輔以文華貞恒自居和易待物體賢人之志業茂端士之風規履歴班行發揮事任厥心匪懈所至有聲自彌綸粉闈駁正瑣闥且司言於左掖當納訓於東儲誠明一貫聞望旁洽俾司貢士亦著嘉聞方今外興不得已之師内有不獲安之俗嘗忘食於將旰每求衣於未眀兾清原野之誅用止干戈之役登爾輔弼代予憂勤爾宜敷至化於吾人告嘉猷於厥后銷弭氛祲導迎和平事有不舉其中政或未孚於下爾惟啟沃無乃面從可朝議大夫守門下侍郎平章事賜紫金魚袋時逢吉知禮部貢舉既䇿試未牓第其名而有是命禮部尚書王播署而出之是年十二月制曰上宰參職所以法三台之耀中樞議政在乎遂萬物之宜朕獲承鴻休思建皇極翼沃心而納誨嘗注意以求賢通議大夫尚書工部侍郎知制誥翰林學士上柱國清源縣開國男食邑三百户賜紫金魚袋王涯動直静專踐方居易挺嵗寒之勁質抱夙夜之端誠言皆守中慮每經逺屬者禁垣揮翰五字日宣選部持衡九流風動薦居肘腋之地歴試股肱之才進嘗伏於青蒲出不洩其温樹牟融得大臣之節毛玠有古人之風詢廟算以生知論兵鈐而暗合方今我車尚駕郊壘猶多必候清眀以消氛沴是用付以機宻陟于崇髙爾其發號令以靖其四方陳便宜以寛于百姓行臺閣之故事𢎞朝廷之大體秉徳以立狥公不回予一人垂拱而理敬聴成命懋哉戒哉可守中書侍郎平章事十二年七月制曰成萬方之化通天下之志緝熈帝載昭暢𤣥猷在于股肱之臣共凝治本旁求時彦以叙彜倫朝散大夫守尚書户部侍郎上䕶軍賜紫金魚袋崔羣粹宻由道端莊保和本清眀之上才體博厚之重徳學貫通儒之業詞含大雅之風居敬有恒循性能斷自承宻命職參内廷髙文煥發于綸言敏識詳逹于國典伏奏無撓直躬不囘勤勞八年始終一致春闈取士必後其浮華地官理財能制於輕重儉以約己忠惟事君才適而用深望積而實著風猷己洽于人聴倚屬方注于朕心乃膺審象之誠以副具瞻之望况姦兇叛逆尚駕我車未眀求衣思戢干櫓爾宜酌古今之要舉刑政之中艱厥位以代天工陳其謨以眀皇極敬兹重命往踐台階可守中書侍郎平章事十月制以淮南節度副大使知節度事管内度支營田觀察處置等使銀青光禄大夫檢校尚書右僕射兼揚州大都督府長史御史大夫江夏縣開國侯李􅅠為門下侍郎同平章事十三年三月詔曰致理之道王者猶盡其心弼成之功輔臣所以宣力皇極是建蒼生乃安敷求實難倚任斯重將付大政必惟僉諧正議大夫守御史大夫上柱國成紀縣開國侯食邑一千户賜紫金魚袋李夷簡才稱通眀性本嚴重守以正直傳之文華羽儀朝端晃耀宗籍早司邦憲爰總地征糾逖無間于避強經費克均其定制中立不撓孤標出倫聳善激貪法行令肅自鎮漢上洎臨蜀川儉徳載彰清規一貫山嶽比厚風雷有恒勵貞俊以理心竭忠勞而奉上人望汲黯印歸趙堯俾之持綱萬目皆舉固可以參綜庶務允釐百工燮和隂陽宣發號令是申眀命陟于台階於戲誠積爾躬夢協朕志虛己將求其𢎞濟鯁言罔懼于咈違道必舉中位無苟曠膺此寵擢敬哉戒哉可守門下侍郎平章事十四年七月制曰贊天工而成光濟協帝力以致升平非中和禀氣不能符燮諧之道非誠眀在躬何以庸弼亮之位况今積妖己殄而邊鄙猶虞大化方行而里閭未㤗時欲舉百度甄羣材外經四夷内輯諸夏納之夀域被以仁風代予之勤其孰克任眷求斯得是用命之和陽三城懐州節度使朝議郎使持節懐州諸軍事守懐州刺史兼御史大夫賜紫金魚袋令狐楚根於粹厚著以端眀表山立之莊容洞淵停之精識文髙雄富學茂該通自頃揮翰掖垣持槖禁署常延造膝屢竭啟心發言必誠臨事無惑藹是公望居然國楨及剖符近郊兼暢牧人之術杖節分閫尤深馭衆之才謂器適中外效宣文武宜展舟楫之用式登鼎鉉之司管于中樞持我大柄於戲輔翼之任人臣極崇未至而重議有歸既處而其名罕副萬務攸託朕何頼焉爾其敬聴此言深思其道行致君之志始終勿渝以報國為期夙夜益勵無俾厥后有慙知臣可朝議大夫守中書侍郎平章事八月制宣武節度守司徒兼侍中韓𢎞可守司徒兼中書令以𢎞堅辭戎鎮故也穆宗元和十五年正月即位是日制曰廊廟之任萬邦所瞻調一氣之和序五材之用出納王命發揮帝猷簡求賢能𢎞我理本朝議郎守御史中丞飛騎尉襲徐國公賜緋魚袋蕭俛識通化元道契休運有戴君峻節之志秉見義匪躬之誠代襲公台族髙軒冕學冠古今之要詞深雅誥之宗嘗事先朝職居宥宻奏議無撓忠勞益彰洎執憲南臺肅清朝序休望彌洽直聲日聞朕方臨萬邦思致于理若渉大水浩無津涯將務簡以安人欲息兵而論道審象而授其代予勤爾其端志絶私去末崇本叙禮樂于邦國正風教于人倫舉其鈞衡眀示天下無俾一徳專羙于殷爾其敬之奉我成命可朝散大夫守中書侍郎平章事仍賜紫金魚袋又制曰賚於良弼期有濟人必惟才臣乃克成務况端潔剛毅可以肅具寮敏裕周通可以熈庶績外無飾虛之禮中有效實之誠簡于朕心乃命以位朝散大夫中書舍人翰林學士武騎尉賜紫金魚袋叚文昌門襲忠勲器苞才傑廣而不雜峻而能温脩詞每掇其菁華所尚者風格發言必探于指要所貴者變通識古今理亂之源知遐邇利病之本自掌文翰苑列籍金門出入五年恭勤一致屬朕初承寶命屢進嘉猷諒我憂惕之懐竭其公忠之志昨因召見更有詢咨造膝之言注意斯得必能奉將命之大任申獻替于虛襟爰升鼎鉉之司兾展舟楫之用於戲萬務之始九有所瞻將致治平可不競勵爾其夙夜惟慮弼輔朕躬使四夷咸賔百度惟理阜俗必蘇於瘁瘵審官無欝其賢能理當詳於幾深道當固于乆大惟自誠可以化物惟先己可以律人勉哉戒哉無忝我首命之重可守中書侍郎平章事八月制曰夫宰相者上調元化以亮天工下熈庶績以輔君徳未有心不直而能協於道迹不正而能致其君必求斯人乃命以位朝議郎守御史中丞武騎尉賜紫金魚袋崔植氣志凝逺風標粹清率性而行潔己以進周歴臺閣藹然聲猷頃者姦臣未䧏利權方擅情惟刻下其事將行而植獨能横抗申以駁議朕每嘉重不􅁯于懷自膺寳圖俾掌邦憲又能悉心秉執造膝敷陳歸于無私多所𢎞益爰擢作相冀能弼予於戲惟爾先太傅當徳宗始初清明首居相位克固直道至于今稱之爾其嗣乃家法無廢朕命可朝散大夫守中書侍郎平章事又制以中書侍郎平章事蕭俛為門下侍郎平章事九月戊午制曰懷大中者必誠其茂勲建茂勲者必極其高秩朕䖍守鴻業静思化源姑欲表忠節以勵為臣舉勲籍以勸立志况乎位崇上相遇重先朝首陳宏圖躬率羣帥克定妖孽坐清寰瀛得不再申衮崇昭示倚注河東節度觀察處置等使金紫光禄大夫檢校尚書左僕射兼門下侍郎同中書門下平章事大原尹北都畱守上柱國晉國公食邑三千户裴度材膺啓運道協功偕一心盡忠百志歸正雖量包𢎞曠靡所不容而節抱孤貞凛然難奪所以特承恩顧専委謀猷堅持其誠獨立不懼在昔有晉厥功平吳惟茂先决策於中惟元凱整旅于外兼能竝用度寔有之許國忘身勤亦至矣自居重任出入六年及鎮太原聲績一貫朕永懷丕烈乃睠舊臣將副深衷式加新命惟正三公之位在平九土之司論道再光總戎益重毗我王室永孚于休可守司空依前兼門下侍郎平章事長慶元年二月制曰先朝正姦邪之罪刑海内之心既承大勲付朕鴻業思欲述事繼志偃武脩文揚其耿光屬在髦傑朝散大夫守尚書户部侍郎知制誥翰林學士上柱國建安縣開國男杜元頴識禀人秀才為國華氣縝密以含章言清明而體要亷方不雜峻直無徒動朗鍳而心運陽秋鼓雄詞而氣幹河嶽爰以精粹列于内庭通賈生治亂之言逹管氏刑政之本未至高位蔚為名臣間者妖孽相挺紛亂南北朝夕機命迅如風霆而翰動若飛神無滯用思戢必盡其心力避榮常執其謙光况處奉綴衣導揚訓命雅仗忠貞之志實有安定之功本于忘身愛我以懷感激無隱切劘盡規既納誨于三篇亦陳戒於六事朕甞委以大政詢其逺猷研幾必精應變甞理布舊章于河朔推大信于昆夷無所不諧實由密賛全器焜耀淑聲流聞升于台階允是瞻望於戲昔爾先正為唐宰衡惟爾傳臧孫有後之慶秉邵公是似之徳宜纂舊服協于至公乃思貽厥之謀率攸行之道扼制羣動衡平衆流俾人不迷時乃之績乃守尚書户部侍郎平章事散官勲並如故十月制曰昔蕭何用新造之漢而能調發子弟完補敗亡使關東糧餉不絶者以其盡得秦之圖籍而用知其衆寡也我國家承十一聖之區㝢億兆人之生齒而曰不能足食足兵朕甚懵焉則非惟調隂陽撫夷夏者不欲侵泉貨之任而主㑹計較盈虛者不得參邦國之重乎予將兼之允在能者諸道鹽鐵轉運等使大中大夫守刑部尚書騎都尉大原縣開國男賜紫金魚袋王播在徳宗時以對詔入仕踐更臺閣由御史中丞尹京兆掌縣官鹽鐵為春曹尚書乃長巴髳以控蠻蛋盡稱厥職逹于予聞洎詔徴還便殿與語得所未得聞吾未聞昭然發蒙幾至前席重委操剸鋩刃益精國有羡財而人不加賦東師在野物力蕭然不有主張孰能戡濟是用命爾作相仍以舊務嬰之爾其西備戎羗東定燕冀内實九府外豐萬人百度羣倫罔不在爾於戲典謀訓誥行之維艱邪正是非知之孔易予唯以不敏不明兹用爾為股肱耳目又安能一二戒誨垂之空言爾其自勵于爾心無令觀聽者論爾于鄉校可守中書侍郎平章事依前充鹽鐵轉運等使二年二月制曰朕聞御大器者登俊賢以為輔弼敷大化者擢公忠以施政教故能成天下之務逹天下之精俾三光宣明百度貞正我之倚注方得其人天實賴予允副僉望尚書工部侍郎元稹珪璋茂器鸞鳳貞姿文涵六義之微學探百氏之奥剛而有斷忠不近名勁氣常勵於風霜敏識頗知於今古自擢居朝序休問再揚不自飾以取容不苟安而囘慮處直忘屈在屯若夷卓然懷陶鑄之心豁爾見江湖之量間者司文禁署主朕樞機每因事以立言累披誠而獻計心惟體國義乃􅁯身深陳濟物之才雅見經邦之志朕思𢎞理本用洽生靈式資康濟之材以暢和平之化於戲爾率于正則不正者知慎爾進于善則不善者必悛惟直道可以事君惟至公可以格物是兹數徳毗予一人永孚于休以底於道可平章事又制曰渉大川者操巨艦不畏於洪波搆廣厦者掲雄材乃安於棟宇朕祗奉神器尊臨萬邦思弼諧輔相之臣致易簡雍熙之業爰擇舊徳委之樞衡冀𢎞嘉猷以闡𤣥化淮南節度副大使知節度事管内營田觀察等使光禄大夫守司徒同中書門下平章事兼揚州大都督府長史上柱國晉國公食邑三千戸裴度氣禀宏廓材優康濟逹識高議兼明不渝儀刑可以光巖廊度量可以方海嶽操握政柄弛張化權彛倫典謨合若符契昔我先聖以武畧深計中樞密勿委之廟堂四海咸理朕仄席虛已勞懷宵旰禮命元老聞斯格言衷懐洞然雲霧皆豁是用輟撫淮南舉之台衮换其戎律列自黄扉秩崇上公望積師長寄爾以周召待爾以蕭曹任爾以埏埴授爾以鈞衡於戲衽席樽俎之内堂室牖户之間無俟規臨可以觀察違爾宴息期爾折衝庶乎陰陽協和品物昭泰惟言是納爾舉必從使益稷臯陶爾無慙徳垂衣南面我獲任賢無易斯言式遵明命可守司空兼門下侍郎平章事度拜淮南未行有徐方之變兼河北諸軍進退未一言事者亦多以度出非宜及詔下人人望度尅日定理六月制曰朕聞天地洪罏致之者槖籥帝王大業成之者股肱故堯舜垂衣禹湯恭巳𢎞道任徳為予輔臣則八表乂寜萬邦咸理故伊尹之舉臯陶之升庶績其凝不仁自逺正議大夫守兵部尚書輕車都尉賜紫金魚袋李逢吉大方比量中正持心真玉無瑕堅金在礪峻節而高山可仰推誠而止水可觀剛柔所持吐茹無易往以青宫齒學道我典墳儀刑式孚蘭茝馨茂洎升台席翊奉先朝訏謨密聞獻替潛逹外順昭徳中升至言溫恭聿脩始終一貫朕嗣守丕業思得賢良將俟和羮期於舊老易之襄漢居以南宫每詢嘉言啓沃惟乆今授之相印委以樞衡代天之工爾在專任於戲發號施令選賢與能申于百辟之上行於四海之内朝無黨比人絶澆浮白黑燦然淄澠不溷使巖廊重位揚我清風𢎞宣大猷以暢王度可守門下侍郎平章事三年三月以户部侍郎牛僧孺平章事敬宗長慶四年正月即位制曰理多務者必資經逺之能總衆材者實在選舊而任疇咨輿議參詢廟廷果獲誠臣副予虛位正議大夫尚書吏部侍郎上柱國渭源縣開國男食邑三百户賜紫金魚袋李程文含鍾律器挺珪璋行已蹈常與物無吝早以詞翰密侍帷幄開𢎞顧問發揮訓謩周旋臺閣閱歴中外秀造稱其得俊衡鏡表於無私卑牧難踰深藏不耀朕荷負重搆祗守大業自顧寡昧動遵先規委成台司不操將斵自居無悔之地以馳至正之途而元輔勇於進類常思任人與其自仕不若用賢命之僉求以名列上而程為舉首是必至公爾宜謹繩墨以示諸侯平好惡以待多士秉彛倫以澄躁競覈名實以鎮浮虛協睦乃僚無替朕命爰因銓品之鍳載佇烹飪之功可平章事又制曰昔周宣王漢宣帝思𢎞祖業克紹先搆用申甫邴魏為相然後周道重熙漢徳累洽朕以冲𦕈託于億兆之上緬惟文祖𤣥宗之理若渉大水浩無津涯詢於巖廊俾舉髦碩果得才傑副予虛求必惟其人乃命以位朝議大夫守尚書户部侍郎兼御史大夫判度支上柱國賜紫金魚袋竇易直端厚静慤直方簡亷氣深而和識敏而逹每去華而務實不為善以近名早以器能揚歴中外司憲著紀綱之積亷俗垂惻隱之仁輟于天官掌我邦計底慎材貨均節委輸賙給不窮贍濟皆足國有大柄屬於全才况朕新臨寳圗萬物資始審像而授其代予言爾尚弼予一人用底于道且漢以丞相調兵食周以冡宰質歳成我國家雜用古制以重其事也爾往欽哉無忝我成命可平章事判度支寳厯二年二月丁未制曰朕周觀帝王之道春秋富則倚附舊老享歴乆則簡擢俊髦故我𤣥宗開元之始任宋璟姚元崇之軰以調隂陽東封之後乃用李元紘張九齡之儔以承法度洎予恭守大位于今三年巖廟藩封建于左右前後皆皇祖聖父之人罔有易置况勲望冠代器業絶倫副予揣論贊此休運凡百有位敬而聽之山南西道節度觀察處置等使光禄大夫守中書門下平章事兼興元尹上柱國晉國公裴度以忘家抵患協于憲宗以匪躬不撓佐於先帝十拜相詔四登師垣接士猶布衣之心悲時急戀闕之思價重乎内外名殷乎華夷藉是風猷俾參大柄且滿吾志亦用僉聞於戲君臣合符不可多得千載一遇猶為比肩爾宜援古以自强垂後以居重文終之畫一平陽之并容諸葛持衡之公相如引車之意率彼四子足為成人服兹昌言往踐乃位可守司空平章事是月丙寅以中書侍郎平章事李程攝中書令受册正衙宣制文宗寳厯二年十二月即位庚戌制曰搆大厦者實先梁棟之材濟巨川者必資舟楫之用朕越自藩邸庸期大統夙夜震兢若蹈淵谷况齊思毗乂艱歩甫寜上奉山陵七月之期内停訏謨庶政之始俾我𦕈未寘之極樞將恢興運之功俾協具瞻之望博閱名實獲兹忠賢實帝賚予其誰與譲正議大夫行尚書兵部侍郎知制誥充翰林學士上柱國賜紫金魚袋韋處厚體道為徒見義為勇居易以行古至和而不流氷霜挺松栢之姿貞白秉珪璋之徳文揮風雅學該儒𤣥器洽而保之以謙識眀而用之以晦選自經藝侍于穆宗擢司密命實贊先帝壹彼直操彰其逺猷臨危勵難奪之誠推忠備𢎞益之道屬者變生宫掖謀俟經綸首參底定之功載竭忠貞之效雪憤横涕披肝貢詞約我以禹湯罪已之勤博我以古人致理之要聽必感動悉其條陳洪纎靡差夢卜斯協必能式是中外啓兹雍熈俾予冲人克遂垂拱是用擢升鼎鉉式亮帝圖庶無愧於知人且用光於斯道於戲前哲有言良臣惟聖處殷憂舉衆之仕荷濟理沃心之期注四方傾動之勤在百辟具瞻之任可中書侍郎同中書門下平章事太和元年六月癸巳以淮南節度副大使王播為尚書左僕射同中書門下平章事册府元龜卷七十三
