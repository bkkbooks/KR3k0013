body:
  text: 冊府元龜卷三百二十六宋王欽若等撰宰輔部諫諍第二魏王朗文帝時為司空帝頗出游獵或昬夜還宮朗上疏曰夫帝王之居外則餙周衞内則重禁門将行則設兵而後出幄稱警而後踐墀張弧而後登輿清道而後奉引遮列而後轉轂靜室而後息駕皆所以顯至尊務戒慎垂法教也近日車駕出臨捕虎日昃而行及昏而反違警蹕之恒法非萬乗之至慎也帝報曰覽表雖魏絳穪虞箴以諷晉悼相如陳猛獸以戒漢武未足以喻方今二宼未殄将帥逺征故時入原野以習戎備至扵夜還之戒已詔有司施行又孫權欲遣子登入侍不至是時車駕徙許昌大興屯田欲舉軍東征朗上疏曰昔南越守善嬰齊入侍遂為冡嗣還君其國康居驕黠情不副辭都䕶奏議以為宜遣侍子以黜無禮且吳濞之禍萌扵子入隗囂之叛亦不顧子徃者聞權有遣子之言而未至今六軍戒嚴臣恐輿人未暢聖㫖當謂國家愠扵登之逋留是以為之興師設師行而登乃至則為所動者至大所致者至細猶未足以為慶設其傲狠殊無入志懼彼輿論之未暢者竝懐伊邑臣愚以為宜勅别征諸将各明奉禁令以慎守所部外曜烈威内廣耕稼使泊然若山澹然若淵勢不可動計不可測是時帝以成軍遂行權子不至車駕臨江而還明帝即位使朗至鄴省文昭皇后陵見百姓或有不足是時方營修宮室朗上疏曰陛下即位以来恩詔屢布百姓萬民莫不欣欣臣頃奉使北行徃反道路聞衆徭役其可得蠲除省減者甚多願陛下重留日昃之聽以計制寇昔大禹将欲拯天下之大患故乃先卑其宮室儉其衣食用能盡有九州弼成五服句踐欲廣其禦兒之疆禦兒吳界邉戍之地名馘夫差扵姑蘇故亦約其身以及家儉其家以施國用能囊括五湖席捲三江取威中國定霸華夏漢之文景亦欲恢𢎞祖業増崇洪緒故能割意扵百金之臺昭儉扵弋綈之服内減大官而不受貢獻外省徭役而務農桑用能號穪昇平㡬致刑措孝武之所以能奮其軍勢拓其外境誠因祖考蓄積素足故能遂成大功霍去病中才之将猶以匈奴未滅不治第宅明䘏逺者畧近事外者簡内自漢之初及中興皆於金革畧寝之後然後鳯闕猥開徳陽竝起今當建始之前足用列朝㑹崇華之後足用序内官華林天淵足用展游宴若且先成閶闔之象魏使足用列逺人之朝貢者修城池使足用絶踰越成國險其餘一切且湏豐年一以勤耕農為務習戎備為事則國無怨曠户口滋息民充兵疆而寇戎不賔緝熈不作未之有也轉為司徒時屢失皇子而後宮就館者少朗上疏曰昔周文十五而有武王遂享十子之祚以廣諸姬之𦙍武王既老而生成王成王是以鮮于兄弟此二王者各樹聖徳無以相過比其子孫之祚則不相如蓋生育有早晚所産有衆寡也陛下既徳祚兼彼二聖春秋髙扵姬文育武之時矣而子發未舉扵椒蘭之奥房藩王未繁扵掖庭之衆室以成王為喻雖未為晚取譬伯邑則不為夙周禮六宮内官百二十人而諸經嘗説咸以十二為限至扵秦漢之末或以千百為數矣然雖彌猥而就時扵吉館者或甚鮮明百斯男之本誠在扵一意不但在扵務廣也老臣慺慺願國家同祚扵軒轅之五五而未及周文之二五用為伊邑且少小嘗苦被褥泰温泰温則不能便柔膚弱體是以難可防䕶而易用感慨若嘗令少小之緼袍不至扵甚厚則必咸保金石之性而比夀扵南山矣帝報曰夫忠至者辭篤愛重者言深君既勞思慮又手茟将順三復徳音歆然無量朕繼嗣未立以為君憂欽納至言思聞良䂓陳羣明帝時為司空録尚書事帝初莅政羣上疏曰詩穪儀刑文王萬邦作孚又曰刑于寡妻至于兄弟以御于家邦道自近始而化洽扵天下自䘮亂以來干戈未戢百姓不識王教之本懼其陵遲已甚陛下當盛魏之隆荷二祖之業天下想望至治惟有以崇徳布化惠恤黎庶則兆民幸甚夫臣下雷同是非相蔽國之大患也若不和睦則有讐黨有讐黨則毀譽無端毀譽無端則真偽失實不可不深防備有以絶其源流後皇女淑薨追封謚平原懿公主羣上疏曰長短有命存亡有分故聖人制禮或抑或致以求厥中防墓有不修之儉嬴博有不歸之魂夫大人動合天地垂之無窮又大徳不踰閑動為師表故也八嵗下殤禮所不備况以朞月而以成人禮送之加為制服舉朝素衣朝夕哭臨自古以来未有此比而乃復自徃視陵親臨祖載願陛下抑割無益有損之事但􅊖聽羣臣送葬乞車駕不行此萬國之至望也聞車駕欲幸摩陂實到許昌二宮上下皆􅊖俱東舉朝大小莫不驚怪或言欲以避衰或言欲扵便處移殿舍或不知何故臣以為吉凶有命禍福繇人移徙求安則亦無益若必當移避繕治金墉城西宮及孟津别宮皆可權時分止可無舉宮暴露野次廢損盛節蠶農之要又賊地聞之以為大衰加所煩費不可計量且繇吉士賢人當盛衰處安危秉道信命非徙其家以寧鄉邑從其風化無恐懼之心况乃帝王萬國之主靜則天下安動則天下擾行止動靜豈可輕脱哉帝不聽青龍中營治宮室百姓失農時羣上疏曰禹承唐虞之盛猶卑宮室而惡衣服况今䘮亂之後人民至少比漢文景之時不過一大郡加邉境有事将士勞苦若有水旱之患國家之深憂也且吳蜀未滅社稷不安宜及其未動講武勸農有以待之今舍此急而先宮室臣懼百姓遂困将何以應敵昔劉備自成都至白水多作傳舍興費人役太祖知其疲民也今中國勞力亦吳蜀之所願此安危之機也惟陛下慮之帝答曰王者宮室亦宜竝立滅賊之後但當罷守耳豈可復興役邪是故君之職蕭何之大畧也羣又曰昔漢祖惟與項羽争天下羽已滅宮室燒毀是以蕭何建武庫太倉皆是要急然猶非其壮麗今二虜未平誠不宜與古同也夫人之所欲莫不有辭况乃天王莫之敢違前欲壊武庫謂不可不壊也後欲置之謂不可不置也若必作之固非臣下辭言所屈若少留神卓然囬意亦非臣下之所及也漢明帝欲起徳陽殿鍾離意諌即用其言後乃復作之殿成謂羣臣曰鍾離尚書在不得成此殿也夫王者豈憚一臣蓋為百姓也今臣曽不能少凝聖聽不及意逺矣帝扵是有所减省華歆為太尉明帝太和中遣曹真從子午道伐蜀車駕東幸許昌歆上疏曰兵亂以来過踰二紀大魏承天受命陛下以聖徳當成康之隆宜𢎞一代之治紹三王之迹雖有二賊負險延命茍聖化日躋逺人懐徳将襁負而至夫兵不得已而用之故戢而時動臣誠願陛下先留心扵治道以征伐為後事且千里運糧非用兵之利越險深入無獨克之功如聞今年徴役頗失農桑之業為國者以民為基民以衣食為本使中國無飢寒之患百姓無離上之心則天下幸甚二賊之釁可坐而待也臣備位宰相老病日篤犬馬之命将盡恐不復奉望鑾蓋不敢不竭臣子之懐惟陛下裁察帝報曰君深慮國計朕甚嘉之賊憑恃山川二祖勞扵前世猶不克平朕豈敢自多謂必滅之哉諸将以為不一探取無繇自弊是以觀兵以闚其釁若天時未至周武還師乃前事之鑒朕敬不忘所戒時秋大雨詔真引軍還吳陸遜為丞相荆州牧都䕶領武昌事時太子有不安之議遜上疏陳太子正統宜有磐石之固魯王藩臣當使寵秩有差彼此得所上下獲安謹叩頭流血以聞書三四上及求詣都欲口論適庶之分以匡得失皆不聽許陸凱為左丞相時後主性不好人視已羣臣侍見睛莫敢忤凱説皓曰夫君臣無不相識之道若卒有不虞不知所赴皓聽凱自視後主時徙都武昌揚土百姓泝流供給以為患苦又政事多謬黎元窮匱凱上疏曰臣聞有道之君以樂樂民無道之君以樂樂身樂民者其樂彌長樂身者不乆而亡夫民者國之根也誠宜重其食愛其命民安則君安民樂則君樂自頃年以来君威傷扵桀紂君明闇扵姦雄君惠閉扵羣孽無灾而民命盡無為而國財空辜無罪賞無功使君有謬悞之愆天為作妖而諸公卿媚上以求愛困民以求饒導君扵不義敗政扵滛俗臣竊為痛心今鄰國交好四方無事當務息役養士實其廪庫以待天時而更傾動天心搔擾萬姓使民不安大小呼嗟此非保國養民之術也臣聞吉凶在天猶影之在形響之在聲也形動則影動形止則影止此分數乃有所繫非在口之所進退也昔秦所以亡天下者但坐賞輕而罰重政刑錯亂民力盡扵奢侈目眩扵美色志濁扵財寳邪臣在位賢哲隠藏百姓棄業天下苦之是以遂有覆巢破卵之憂漢所以彊者躬行誠信聽諫納賢惠及負薪躬請巖穴廣采博察以成其謀此徃事之明證也近者漢之衰末三家鼎立曹失綱紀晉有其政又益州危險兵多精彊閉門固守可保萬世而劉氏與奪乖錯賞罰失所君恣意扵奢侈民力竭扵不急是以為晉所伐君臣見虜此目前之明驗也臣闇扵大理文不及義智慧淺劣無復兾望竊為陛下惜天下耳臣謹奏耳目所聞見百姓所為煩苛刑政所為錯亂願陛下息大功損百役務寛盪忽苛政又武昌土地實危險而塉确非王都安國養民之處船泊則沉漂陵居則峻危且童謡云寧飲建業水不食武昌魚寧還建業死不止武昌居臣聞翼星為變熒惑作妖童謡之言生扵天心乃以安居而比死足明天意知民所苦也臣聞國無三年之儲謂之非國而今無一年之畜此臣下之責也而諸公卿位處人上禄延子孫曽無致命之節匡救之術茍進小利扵君以求容媚荼毒百姓不為君計也自從孫𢎞造義兵以来耕種既廢所在無復輸入而分一家父子異役廪食日張畜積日耗民有離散之怨國有露根之漸而莫之恤也民力困窮鬻賣兒子調賦相仍日以疲極所在長吏不加隱括加有監宮既不愛民務行威勢所在搔擾更為煩苛民苦二端財力再耗此為無益而有損也願陛下一息此輩矜哀孤弱以鎮撫百姓之心此猶魚鱉得免毒螫之淵鳥獸得離羅網之綱四方之民襁負而至矣如此民可得保先王之國存焉臣聞五音令人耳不聰五色令人目不明此無益扵政有損扵事者也自昔先帝時後宮列女及諸織絡數不滿百米有畜積貨財有餘及幼景在位更改奢侈不蹈先迹伏聞織絡及諸徒坐乃有千數計其所長不足為國財然坐食官廪嵗嵗相承此為無益願陛下料出賦嫁給與無妻者如此上應天心下合地意天下幸甚臣聞殷湯取士扵商賈齊桓取士扵車轅周武取士扵負薪大漢取士扵奴僕明王聖主取士以賢不拘卑賤故其功徳洋溢名流竹素非求顔色而取好服㨗口容悦者也臣伏見當今内寵之臣位非其人任非其量不能輔國匡時羣黨相扶害忠隠賢願陛下簡文武之臣各勤其官州牧督将藩鎮方外公卿尚書務修仁化上助陛下下拯黎民各盡其忠拾遺萬一則康哉之歌作刑措之理清願陛下留神思臣愚言凱乃心公家義形扵色表疏皆指事不飾忠懇内發皓所行彌暴凱知其将亡又上表曰臣聞惡不可積過不可長積惡長過䘮亂之源也是以古人懼不聞非故設進善之旍立敢諫之鼓武公九十思聞警戒詩美其徳士悦其行臣察陛下無思警戒之義而有積惡之漸臣深憂之此禍兆見矣故畧陳其要寫盡愚懐陛下宜克己復禮述履前徳不可捐棄臣言而放奢意意奢情至吏日欺民民離則上不信下下當疑上骨肉相克公子相奔臣雖愚闇扵天命以心審之敗不過二十稔也臣嘗忿亡國之人夏桀殷紂亦不可使後人復忿陛下也臣受國恩奉朝三世復以餘年值遇陛下不能循俗與衆浮沉若比干伍員以忠見戮以正見疑自謂畢足無所餘恨灰身泉壤無負先帝願陛下九思社稷存焉初皓始起宫凱上表諫不聽凱重表曰臣聞宮功當起夙夜反側是以頻煩上事徃徃留中不見省報扵邑嘆息企想應罷昨食時被詔曰君所諫誠是大趣然未合鄙意如何此宮殿不利宜當避之乃可以妨勞役長坐不利宫乎父之不安子亦何倚臣拜紙詔伏讀一周不覺氣結扵胷而涕泣雨集也臣年已六十九榮禄已重於臣過望復何所兾所以勤勤數進苦言者臣伏念大皇帝創基立業勞苦勤至白髪生扵鬂膚黄耉被扵甲胄天下始靜幼主嗣統柄在臣下軍有連征之費民有彫殘之損賊臣干政公家空竭今彊敵當塗西州傾覆孤罷之民宜當畜養廣力肆業以備不虞且始徙都屬有軍征戰士流離州郡搔擾而大功復起征召四方非保國致治之漸也臣聞為人主者攘灾以徳除咎以義故湯遭大旱身禱桑林熒惑守心宋景退殿是以旱魃消亡妖星移舍今宮室之不利但當克己復禮篤湯宋之至道愍黎庶之困苦何憂宫之不安災之不銷乎陛下不務修徳而務築宮室若徳之不修行之不義雖殷辛之瑶臺秦皇之阿房何往而不䘮身覆國宗廟作􅇕乎夫興土功髙臺榭既致水旱民又多疾其不疑也為父長安使子無倚此乃子離扵父臣離扵陛下之象也臣子一離雖念克骨茅茨不翦復何益焉是以大皇帝居扵南宮自謂過扵阿房故先朝大臣以為宮室宜厚備衛非常大皇帝曰逆虜游魂當愛育百姓何聊趣扵不急然臣下懇惻繇不獲已故裁調近郡茍副衆心比當就功猶豫三年當此之時寇鈔懾威不犯我境師徒奔北且西阻岷漢南州無事尚猶冲讓未肯築宮况陛下危側之世又乏大皇帝之徳可不慮哉願陛下留意臣不虗言陳夀從荆陽来得凱所諫皓二十事曰皓遣親近趙欽口詔報凱前表曰孤動必遵先帝有何不平君所諫非也又建業宮不利故避之而西宮室宇摧朽湏謀移都何以不可徙乎凱上疏曰臣竊見陛下執政以来隂陽不調五星失晷職司不忠姦黨相扶是陛下不遵先帝之所致夫王者之興受之扵天修之繇徳豈在宮乎而陛下不諮之公輔便盛意驅馳六軍流離悲懼逆犯天地天地以災童歌其謡縱令陛下一身得安百姓愁勞何以用治此不遵先帝一也臣聞有國以賢為本夏殺龍逢殷獲伊摯斯前世之明效今日之師表也中常侍王蕃黄中通理處朝忠謇斯社稷之重鎮大吳之龍逢也而陛下忿其苦辭惡其直對梟之殿堂尸骸暴棄邦内傷心有識悲悼咸以吳國夫差復存先帝親賢陛下反之是陛下不遵先帝二也臣聞宰相國之柱也不可不彊是故漢有蕭曹之佐先帝有顧歩之相而萬彧𤨏才凡庸之質昔從家隸超歩紫闥彧已豐扵器已溢而陛下愛其細介不訪大趣榮以尊輔越尚舊臣賢良憤惋智士赫咤是不遵先帝三也先帝愛民過扵嬰孩民無妻者以妾妻之見單衣者以帛給之枯骨不収而取埋之而陛下反之是不遵先帝四也昔桀紂滅繇妖婦幽厲亂在嬖妾先帝鑒之以為身戒故左右不置滛邪之色後房無曠積之女今中宮萬數不備嬪嬙外多鰥夫女吟扵中風雨逆度正繇此起是不遵先帝五也先帝憂勞萬機猶懼有失陛下臨祚以来游戲後宮眩惑婦女乃令庶事多曠下吏容姦是不遵先帝六也先帝篤尚朴素服不純麗宮無高臺物不彫飾故國富民充奸盗不作而陛下徴調州郡竭民財力士被𤣥黄宮有朱紫是不遵先帝七也先帝外杖顧陸朱張内近胡綜薛綜是以庶績雍熈邦内清肅今者外非其任内非其人陳聲曹輔斗筲小吏先帝之所棄而陛下幸之是不遵先帝八也先帝每宴見羣臣抑損醇釀臣下終日無失慢之尤百僚庶尹竝展所陳而陛下拘以視瞻之敬懼以不盡之酒夫酒以成禮過則敗徳此無異商辛長夜之飲也是不遵先帝九也昔漢之桓靈親近宦䜿大失民心今髙通詹廉羊度黄門小人而陛下賞以重爵權以戰兵若江渚有難烽燧互起則度等之武不能禦侮明也是不遵先帝十也今宮女曠積而黄門復􅋅州郡條牒民女有錢則舍無錢則取怨呼道路母子死訣是不遵先帝十一也先帝在時亦養諸王太子若取乳母其夫復役賜與錢財給其資糧時遣歸来視其弱息今則不然夫婦生離夫故作役兒從後死家為空戸是不遵先帝十二也先帝歎曰國以民為本民以食為天衣其次也三者孤存之扵心今則不然農桑竝廢是不遵先帝十三也先帝簡士不拘卑賤任之鄉閭效之扵事舉者不虗受者不妄今則不然浮華者登朋黨者進是不遵先帝十四也先帝戰士不給他役使春惟知農秋惟收稻江渚有事責其死効今之戰士供給衆役廩賜不贍是不遵先帝十五也夫賞以勸功罰以禁邪賞罰不中則士民散失今江邊将士死不見哀勞不見賞是不遵先帝十六也今在所監司已為煩猥兼有内使擾亂其中一民十吏何以堪命昔景帝時交趾反亂實繇兹起是為遵景帝之闕不遵先帝十七也夫校事吏民之仇也先帝末年雖有呂壹錢欽尋皆誅夷以謝百姓今復張立校曹縱吏言事是不遵先帝十八也先帝時居官者咸乆扵其位然後考績黜陟今州郡職司或莅政無㡬便徵召遷轉迎新送舊紛紜道路傷財害民扵是為甚是不遵先帝十九也先帝每察竟觧之奏嘗留心推案是以獄無寃囚死者吞聲今則違之是不遵先帝二十也若臣言可録蔵之盟府如其虗妄治臣之罪願陛下留意按陳夀云博問吳人多云不聞凱有此表或以為凱藏之篋笥未敢宣行病困後主遣董朝省問欲言因以付之晉裴頠為尚書左僕射領侍中惠帝時陳凖子匡韓蔚子嵩竝侍東宮頠諌曰東宮之建以儲皇極其所與游接必簡英俊宜用成徳匡嵩幼弱未識人理立身之節東宮實體夙成之表而今有童子侍從之聲是未光闡遐風之𢎞理也張華為司空時賈后欲廢太子惠帝㑹羣臣扵式乾殿出太子手書徧示羣臣莫敢有言者惟華諌曰此國之大禍自漢武以来每廢黜正嫡恆至䘮亂且國家有天下日淺願陛下詳之尚書左僕射裴頠以為宜先檢挍𫝊書者又請比挍太子手書不然恐有詐妄議至日西不决賈后知華等意堅乃表乞為庶人帝可其奏南齊王儉為右僕射大祖壊宋明帝紫極殿以材柱起宣陽門儉與司徒褚淵及叔父光䘵大夫開府儀同三司僧虔連名上表諌曰臣聞徳者身之基儉者徳之輿春臺将立晉卿秉議北宮肇構漢臣盡規彼二君者或列國常侯或守文中主尚使諌諍在義即悦况陛下聖哲應期臣等職司隆重敢藉前誥竊乃有心陛下登庸宰物節省之教既昭龍衮璇極簡約之訓彌逺乾華外構采椽不斵紫極故材為宣陽門臣等未譬也夫移心疾扵股肱非良醫之美畏影迹而馳騖豈靜處之方且又三農在日千畛咸事輟望嵗之勤興土木之役非所以宣昭大猷光示遐邇若以門居宮南重陽所屬年月稍乆漸就淪胥自可隨宜修理以合制度改作之煩扵是乎息所啓謬合請付外施行帝手詔酬納後魏源賀為太尉獻文欲禪位扵京兆王子推任城王雲進言不可賀又進言曰陛下今欲外選諸王而禪位扵皇叔者臣恐春秋烝嘗昭穆有亂脱萬世之後必有逆饗之譏深願思任城之言帝從之穆亮為司空領太子太傅孝文将自小平汎舟幸石濟亮諌曰臣聞垂堂之訓振古成規扵安思危著扵周易是以馮險弗防没而不弔匹夫之賤猶不自輕况萬乗之尊含生所仰而可忽乎是故處則深宮廣厦行則萬騎千乗昔漢帝欲乗舟渡渭薛廣徳将以首血汙車輪帝乃感而就橋夫一渡小水猶尚若斯况洪河浩汗有不測之慮且車乗繇人猶有奔逸致敗之害况水緩急非人所制脱難出慮表其如宗廟何帝曰司空言是也崔光為車騎大将軍儀同三司神龜二年八月靈太后幸永寧寺躬登九層佛圗光表諫曰伏見親昇上級佇蹕表刹之下袛心佛圗誠為福善聖躬玉趾非所踐陟臣庶徬徨竊謂未可案禮記為人子者不登髙不臨深古賢有言策畫失扵廟堂大人蹷扵中野漢書文帝欲西馳下峻坂袁盎攬轡停輿曰臣聞千金之子坐不垂堂百金之子不倚衡如有車敗馬驚奈髙廟太后何又云上酎祭宗廟出便門欲御樓船薛廣徳免冠頓首曰宜從橋陛下不聽臣臣以血汙車輪樂正子春曽參弟子亦稱至孝固自謹慎堂基不過一尺猶有傷足之愧永寧累級閣道囬隘以柔懦之寳體乗至峻之重峭萬一差跌千悔何追禮将祭宗廟必散齋七日致齋三日然後祭祀神明可得而通今雖容像未建巳為神明之宅方加彫繢飾麗丹青人心所祗鋭觀滋甚登者既衆異心若面縱一人之身嘗盡誠潔豈左右臣妾各竭虔仰不可以獨昇必有扈侍懼或忘慎非唯飲酒茹葷而已昨風霾暴興黄塵四塞白日晝昏特可驚畏春秋宋衛陳鄭同日而災伯姬待姆致焚如之禍去皇興中青州七級亦號崇壮夜為上火所焚雖梓慎禆􅍳之明尚不能逆尅端兆變起倉卒預備不虞天道幽逺自昔深誡墟墓必哀廟社致敬望塋悽慟入門聳慄適墓不登隴未有昇陟之事傳云公既視朔遂登觀臺其下無天地先祖之神故可得而乗也内經寳塔髙華龕室千萬惟盛言香花禮拜豈有登上之義獨稱三寳階從上而下人天交接兩得相見超世奇絶莫可而擬恭敬拜跽􅊖在下級逺存矚眺周見山河因其所眄増發嬉笑未能級級加䖍歩歩崇慎縱使京邑士女公私凑集上行下從理勢以然迄扵無窮豈長世競慕一登而可抑斷哉蓋心信為本形敬乃末重實輕根動實躁君恭己正南面者豈月乗峻極旬御層階今經始既就子來自勸基搆己興彫絢漸起紫山華臺即其宮也伏願息躬親之勞廣風靡之化因立制防班之條限以遏囂汙永歸清寂下竭肅穆之誠上展瞻仰之敬勿踐勿履顯固億齡融教闡悟不其博歟九月靈太后幸嵩髙光上表諫曰伏聞明后當親幸嵩髙徃還累宿鑾遊近甸存省民物誠足為善然當農隙所獲栖畝飢貧之家指為珠玉遺秉滯穟莫不寳惜歩騎萬餘来去經踐駕輦雜遝競騖交馳縱加禁䕶猶有侵耗士女老幼㣲足傷心秋末乆旱塵壤委深風霾一起紅埃四塞轅關峭嶮山路危狭聖駕清道當務萬安乗履澗壑蒙犯霜露出入半旬途越數百飄曝彌日仰虧和豫七廟上靈容或未許億兆下心實用悚慄且蔵蟄節逺昆蟲布列蠉蠕之類盈扵川原車馬輾蹈必有殘殺慈矜好生應垂未惻誠恐悠悠之議将謂為福興罪厮役困扵負擔爪牙窘扵賃乗供頓候迎公私擾費厨兵幕士衣履穿敗晝暄夜凄罔所覆藉監師驅捶泣呼相望霜旱為災所在不稔飢饉荐臻方成儉敝為民父母所宜存恤靖以撫之猶懼離散乃扵収歛初辰致此行舉自近及逺交興怨嗟伏願逺覽虞舜恭己無為近遵老易不出户牖罷勞形之遊息傷財之駕動循典則納諸軌儀委司責成寄之耳目人神幸甚朝野忭悦靈太后不從太后臨朝每扵後園親執弓矢光乃表上中古婦人文章因以致諫曰孔子云士志扵道據扵徳依扵仁遊於藝藝謂禮樂書數射御明前四業丈夫婦人所同修者若射御惟主男子不及婦人則古之賢妃烈媛母儀家國垂訓四海宣教九宗故可秉道懐徳率禮遵仁是以漢后馬鄧術邁祖考羊嬪蔡氏具體伯喈伏惟皇太后含聖履仁臨朝闡化肅雍愷悌靖徽齊穆孝祀通扵神明和風溢於區宇因時暇豫清暑林園逺藐姑射眷言矍相弦矢所發心中正鵠威靈遐暢義震上下文武懾心左右悦目吾王不遊吾何以休不窺重仞安見富美天情冲謙動容祗愧以為舉非蠶織事存無功豈謂應乾順民裁成輔相者哉臣不勝慶幸謹上婦人文章録一帙其集具在内伏願以時披覽仰俾未聞息彎挟之勞納閑拱之㤗頥精養夀栖神翰林是秋靈太后頻幸王公第宅光表諫曰禮記云諸侯非問病弔䘮而入諸臣之家是謂君臣為謔不言王侯夫人明無適臣家之義夫人父母在有時歸寧親没使卿大夫聘春秋紀陳宋齊之女竝為周王后無適本國之事是制深扵士大夫許嫁唁兄又義不得衞女思歸以禮自抑載馳竹竿所為作也漢上官皇后将廢昌邑霍光外祖也親為宰輔后猶御武帳以接羣臣示男女之别國之大節伯姬待姆安就炎燎樊姜俟命忍赴洪流𫝊皆綴之以垂来訓昨軒駕頻出幸馮翼君任城王第雖漸中秋餘熱尚蒸衡蓋徃還聖躬煩倦豐厨嘉醴罄竭時羞上夀弗限一觴方丈甘踰百品旦及日斜接對不憇非謂順時而遊奉養有度縱雲輦崇凉御筵安暢左右僕侍衆過千百扶衛䟦渉袍鉀在身蒙塵曝日渙汗流離致時飢渴飱飯不贍賃馬假乗交費錢帛昔人稱陛下甚樂臣等至苦或其事也伏惟皇太后月靈炳曜坤儀挺茂誕育帝躬維興魏道徳踰文母仁邁和熹親以天至逺異莫間愛繇真固非俟虗隆紆屈鑾駕降臨闉里榮光帝京士女藻悦白首之耋欣遇羲年青矜之童慶屬唐日千載之所難一朝之為易非至明超古忘驕釋吝孰能若斯者哉魏元以来莫正斯美興居出入自當坦然豈同徃嫌曲有矯避但帝族方衍勲貴増遷袛請遂多将成彛式陛下遵酌前王貽厥後矩天下為公億兆己任専薦郊廟止决大政輔養坤和簡息遊幸以徳為車以樂為御考仁聖之風習治國之道則率土屬賴含生仰悦矣臣過荷恩榮所知必盡嘿嘿唯唯愚竊未敢輕陳狂瞽分貽憲法孝明正光二年八月獲秃鶖鳥扵宮内詔以示光光表曰蒙示十四日所得大鳥此即詩所謂有鶖在梁觧云秃鶖也貪惡之鳥野澤所育不應入扵殿庭昔魏氏黄初中有鵜鶘集于靈芝池文帝下詔以曹恭公逺君子近小人博求賢俊太尉華歆繇此遜位而讓管寧者也臣聞野物入舍古人以為不善是以張臶惡鵀賈誼忌鵩鵜鶘蹔集而去前王猶為至誡况今親入宮禁為人所獲方被畜養晏然不以為懼凖諸徃義信有殊矣且饕餮之禽必資魚肉菽麥稻梁時或餐啄一食之費容過斤鎰今春夏陽旱榖糴稍貴窮窘之家時有菜色陛下為民父母撫之如傷豈可棄人養鳥畱意於醜形惡聲哉衛侯好鶴曹伯愛鴈身死國滅可為寒心陛下學通春秋親覽前事何得口詠其言行違其道誠願逺師殷宗近法魏祖修徳延賢消災集慶放無用之物委之川澤取樂琴書頥養神性孝明覽表大悦即棄之池澤冊府元龜卷三百二十六
