body:
  text: 册府元龜卷七十五宋王欽若等撰帝王部任賢夫致千里者必資乎絶足搆廣厦者必擇乎宏材是知端扆嚮明財成萬務致治之具非賢罔濟其親信也喻之心膂其委仗也譬之翰翮及有德冠羣萃才推俊傑智謀可以備贊佐操履可以著表式忠勇質直各負其能或素聞名稱待以不次或因縁彚薦任其所長察言觀行罔有虛授小大之器咸適厥用繇是尊爵以榮之厚禄以寵之推心責成周旋是頼書曰任賢勿二不亦宜乎黄帝舉風后力牧常先大鴻風后黄帝三公也力牧黄帝相也大鴻見封禪書以治民順天地之紀幽明之占死生之説一云幽明之數合死生之説存亡之難時播百榖時是也草木淳化鳥獸蟲蛾旁羅日月星辰水波一作沃土石金玊勞勤心力耳目節用水火財物有土徳之瑞堯命羲和欽若昊天厯象日月星辰敬授人時重黎之後羲氏和氏世掌天地四時之官故堯命之使敬順昊天言元氣廣大星四方中星辰日月所㑹厯象其分節敬致天時以授人也此舉其目下别序之分命羲仲宅嵎夷曰暘谷宅居也東表之地稱嵎夷𤾉明也日出於谷而天下明故稱暘谷暘谷嵎夷一也羲仲居治東方之官寅賓出日平秩東作寅敬賓導秩序也歲起於東而始就耕謂之東作東方之官敬導出日平均次序東作之事以務農也日中星鳥以殷仲春日中謂春分之日鳥南方朱鳥七宿殷正也春分之昏鳥星畢見以正仲春之氣節轉以推季孟則可知厥民析鳥獸孳尾冬寒無事竝入室處春事既起丁壯就功厥其也言其民老壯分析乳化曰孳交接曰尾申命羲叔宅南交申重也南交言夏與春交舉一隅以見之此居治南方之官平秩南訛敬致訛化也掌夏之官平序南方化育之事敬行其教以致其功四時同之亦舉一隅日永星火以正仲夏永長也謂夏至之日火蒼龍之中星舉中則七星可知以正仲夏之氣節季孟亦可知厥民因鳥獸希革因謂老弱因就在田之丁壯以助農也夏時鳥獸毛羽希少改易革改也分命和仲宅西曰昧谷昧𡨕也日入于谷而天下𡨕故曰昧谷昧谷曰西則嵎夷東可知此居治西方之官掌秋天之政寅餞納日平秩西成餞送也日出言導日入言送因事之宜秋西方萬物成序平其政助成物也宵中星虛以殷仲秋宵夜也春言日秋言夜互相備虛𤣥武之中星亦言七星皆以秋分日見以正三秋厥民夷鳥獸毛毨夷平也老壯在田與夏平也毨理也毛更生整理也申命和叔宅朔方曰幽都平在朔易北稱朔亦稱方言一方則三方見矣北稱幽南稱明從可知也都謂所聚也易謂歲改易於北方平均在察其政以順天常上總言羲和敬順昊天此分别仲叔各有所掌日短星昴以正仲冬日短冬至之日昴白虎之中星亦以七星竝見以正冬之三節厥民隩鳥獸氄毛隩室也民改歲入此室處以辟風寒鳥獸皆生耎毳細毛以自温焉帝曰咨汝羲暨和期三百有六旬有六日以閏月定四時成歲咨嗟暨與也匝四時日期一歲十二月月三十日正三百六十日除小月欠六日一歲十二日未盈三嵗是得一月則置閠焉以定四時之節氣成一歲之厯象允釐百工庶績咸熈允信釐治工官績功咸皆熈廣也言定四時成歲厯以告時授事則能信治百官衆功皆廣歎其善帝舜時高陽氏有才子八人高陽帝顓頊之號八人其苗裔蒼舒隤敳檮戭大臨龎降庭堅仲容叔達此即垂益禹臯陶之倫庭堅即臯陶字齊聖廣淵明允篤誠天下之民謂之八愷齊衆也淵深也允信也篤厚也愷和也高辛氏有才子八人高辛帝嚳之號八人亦其苖裔伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍此即稷契朱虎熊羆之倫忠肅共懿宣慈惠和天下之民謂之八元肅敬也懿美也宣徳徧也元善也此十六族世濟其美不隕其名濟成也隕墜也以至於堯堯不能舉舜臣堯舉八愷使主后土后土地官禹作司空平水土即主地之官以揆百事莫不時序地平天成揆度也成平也舉八元使布五教于四方契作司徒五教在寛故知契在八元之中父義母慈兄友弟恭子孝内平外成禹任臯陶以政而卒復舉益任之政周武王即位以太公望為師周公為輔召公畢公之徒左右王師脩文王緒業穆王即位時王道衰微穆王閔文武之道缺乃命伯冏申戒太僕之政作冏命周道復寧漢高祖初為漢王時陳平因魏無知求見拜為都尉使參乘典䕶軍綘灌等或讒平曰絳綘侯周勃也灌灌嬰也平雖美丈夫如冠玉耳其中未必有也餙冠以玉光好外見中非所有也聞平居家時盗其嫂盗猶私也事魏王不容亡而歸楚不中又亡歸漢今大王尊官之令䕶軍臣聞平使諸將金多者得善處金少者得惡處平反覆亂臣也願王察之漢王疑之以讓無知問曰有之乎無知曰有漢王曰公言其賢人何也對曰臣之所言者能也陛下所問者行也今有尾生孝己之行孝己髙宗之子有孝行尾生古之信士一説微生高而無益於勝敗之數陛下何暇用之乎今楚漢相距進竒謀之士顧其計誠足以利國家耳顧念也盗嫂受金又安足疑乎漢王召平而問曰吾聞先生事魏不遂事楚而去遂猶竟今又從吾逰信者固多心乎平曰臣事魏王魏王不能用臣説故去事項王項王不信人其所任愛非諸項即妻之昆弟雖有竒士不能用臣居楚聞漢王之能用人故歸大王羸身來不受金無以為資臣計畫有可采者願大王用之使無可用者大王所賜金具在請封輸官得請骸骨漢王乃謝厚賜拜以為䕶軍中尉盡䕶諸將乃不敢復言張良封留侯初良多病未嘗持兵將嘗為畫策臣時從高祖擊代出竒計下馬邑及立蕭相國何時未為相國良勸高祖立之所與從容言天下事甚衆田叔為趙王郎中趙相貫高等謀逆發覺逮捕高等併捕趙王敖下獄詔敢有隨王罪三族叔與孟舒等十人自髠鉗為王家奴從王就獄王實不知其謀王得出高祖賢趙臣田叔孟舒等十人召見與語漢庭臣無能出其右者高祖説盡拜為郡守諸侯相文帝時張釋之為謁者既朝畢因前言便宜事文帝曰卑之無甚高論令今可行也令其議論依附時事也於是釋之言秦漢之間事秦所以失漢所以興者帝稱善拜釋之為謁者僕射帝幸虎圏就車召釋之驂乗徐行行問釋之秦之弊行問且行且問也具以質言質誠也至宫帝拜釋之為公車令武帝舉賢良對策百餘人帝善嚴助對擢為中大夫後得朱買臣吾丘壽王司馬相如主父偃徐樂嚴安東方朔枚臯膠倉終軍嚴葱竒等竝在左右是時征伐四夷開置邊郡軍旅數發内改制度朝廷多事屢舉賢良文學之士公孫𢎞起徒歩數年至丞相開東閣延賢人與謀議朝覲奏事因言國家便宜帝令助等與大臣辨論中外相應以義理之文中謂天子之賓客若嚴助之軰也外謂公卿大夫也大臣數詘謂計議不如助等每詘服也其尤親幸者東方朔枚臯嚴助吾丘壽王司馬相如終軍至長安上書言事武帝異其文拜為謁者給事中主父偃上書闕下朝奏暮召入見所言九事其八事為律令是時徐樂嚴安亦俱上書言世務書奏帝召見三人謂曰公皆安在何相見之晩也言皆者各在何處廼拜偃樂安皆為郎中元帝時蕭望之周堪本以師傅見尊重帝初即位數宴見言治亂陳王事望之選白宗室明經逹學散騎諫大夫劉更生給事中與侍中金敞並拾遺左右四人同心謀議勸導帝以古制多所欲匡正帝甚嚮納之後漢光武初杜林以王莽敗避亂客河西建武六年帝聞林已還三輔乃徵拜侍御史引見問以經書故舊及西州事甚悦之賜車馬衣被羣寮知林以名德用甚尊憚之又公孫述既平以程烏李育有才幹擢用之於是西土咸悦莫不歸心焉虞延為陳留督郵建武二十三年司徒王况辟之時元正朝賀光武望而識延遣小黄門馳問之即日拜公車令初光武東廵路過小黄詔呼引見問園陵之事延進止從容占拜可觀第五倫舉孝亷補淮陽國醫工長隨王之國光武召見甚異之建武二十九年從王朝京師隨官屬得㑹見帝問以政事倫因此酧對政道帝大悦明日復特召入與語至夕帝戲謂倫曰聞卿為吏篣婦公不過從兄飯寧有之耶倫對曰臣三娶妻皆無父少遭饑亂實不敢妄過人食華嶠書曰帝復曰聞卿為市掾人有遺母一笥餅者卿從外來見之奪母笥探口中餅信乎倫對曰實無此衆人以臣愚蔽故為是語也帝大笑倫出有詔以為扶夷長未到官拜㑹稽太守明帝時東平王蒼上書薦西曹掾呉良帝以示公卿曰前以事見良鬚髮皓然衣冠甚偉夫薦賢助國宰相之職蕭何舉韓信設壇而拜不復考試今以良為議郎朱暉南陽宛人也東平王蒼辟之正月朔旦蒼當入賀故事少府給璧是時隂就為府卿貴驕吏傲不奉法蒼坐朝堂漏且盡而求璧不可得顧謂掾屬曰若之何暉望見少府主簿持璧即往紿之曰我數聞璧而未嘗見試請觀之主簿以授暉暉顧召令史奉之奉之于蒼主簿大驚遽以白就就更以它璧朝帝聞壯之及當幸長安欲嚴宿衛故以暉為衛士令和帝時張酺任太尉策免歸里舍謝遣諸生閉門不通賔客左中郎將何敞及言事者多訟酺公忠帝亦推重之永元十五年復拜為光禄勲桓帝時周景為將作大匠及梁冀誅景以故吏免官禁錮朝廷以景素著忠正頃之復引拜尚書令魏太祖為丞相時以崔琰為東曹掾教曰君有伯夷之風史魚之直貪夫慕名而清壯士尚稱而厲斯可以率時者已故授東曹往踐厥職又教曰領長史王必是吾披荆棘時吏也忠能勤事心如鐡石國之良吏蹉跌久未辟之捨騏驥而弗乗焉遑遑而更求哉故教辟之巳置所宜便以領長史統事如故又表辛毗為議郎久之太祖遣都䕶曹洪平下辨使毗與曹休參之令曰昔高祖貪財好色而良平規其過失今佐治文烈佐治毗字也文烈休字憂不輕矣軍還為丞相長史曹仁為别部司馬數有功拜廣陽太守太祖器其勇畧不使之郡以為議郎督騎晉武帝時并州刺史王廣言劉宣於帝帝召見嘉其占對因曰吾未見宣言虗耳今見其進止風儀眞所謂如圭如璋觀其性質足能撫集本部乃以宣為右部都尉特給赤幢曲盖蒞官清恪所部懐之杜預為輕車將軍以罪免時朝廷以預明於籌略㑹匈奴帥劉猛舉兵反自并州西及河東平陽武帝詔預以散侯定計省闥元帝時諸葛恢為鎮東叅軍與卞壼竝以時譽遷從事中郎兼統記室時四方多務牋疏殷積恢斟酌酬答咸稱折中于時王氏為將軍而恢兄弟及顔含竝居顯要劉超以忠謹掌書命時人以帝善任一國之才明帝時阮孚轉吏部尚書領東海王師稱疾不拜詔就家用之尚書令郄鍳以為非禮帝曰就用之誠不快不爾便廢才後魏道武登國十年破慕容寶衆於俘虜之中推其才識者賈彛賈閠晁崇等與叅謀議憲章故實賈彛少有盛名為慕容垂昌黎太守及垂遣其太子寳來冦大敗于參合陂執彛及從兄代郡太守閠等道武即位拜尚書左丞參預國政崔𤣥伯初為慕容垂尚書左丞道武之征慕容寶次於恒山𤣥伯棄郡東走海濱道武素聞其名遣騎追求執送於軍門引見與語悦之以為黄門侍郎與張衮對總機要張蒲初事慕容寶為陽平河間二郡太守尚書左丞道武定中山寶之官司敘用者多降品秩既素聞蒲名仍拜為尚書左丞明元初即位詔南平公長孫嵩北新侯安同對理民訟簡賢任能彛倫攸叙太武時竇瑾為殿中都官典左右執法帝歎曰古者右賢左戚國之良輔毗陵公之謂矣孝文時王肅自建業來奔是嵗太和十七年也帝幸鄴聞肅至虛襟待之因見問故肅辭義敏切辯而有禮孝文甚哀惻之遂語及為國之道肅陳説治亂音韻雅暢深㑹帝㫖帝嗟納之促席移景不覺坐之疲淹也因言蕭氏危滅之兆可乗之機勸帝大舉於是圖南之規轉鋭器重禮遇日有加焉親貴舊臣莫能間也或屏左右相對談説至夜分不罷肅亦盡忠輸誠無所隱避自謂君臣之際猶𤣥德孔明也孝明時辛穆遷中散大夫加龍驤將軍正光四年以老啓求致仕詔引見謂穆志力尚可除平原相穆善撫導民吏懷之孝莊時辛雄為尚書左丞詔雄為闗西賞勲大使未行之間㑹爾朱榮入雒及河隂之難潛竄不出帝欲以雄為尚書門下奏曰辛雄不出存亡未分帝曰寧失亡而用之不可失存而不用也遂除度支尚書加安南將軍出帝時崔猷以性鯁直有軍國籌略累遷司徒從事中郎既遭家難間行入闗及謁魏帝哀動左右帝為之改容目送曰忠孝之道萃此一門即以本官知門下事後周太祖時栁敏初為河東郡丞及帝克復河東見而器異之乃謂之曰今日甚喜得卿也即拜丞相府叅軍事俄轉戸曹參軍掌記室每有四方賓客嘗令接之爰及吉凶禮儀亦令監總又與蘇綽等脩撰新制為朝廷政典遷禮部郎中唐瑾父永博渉經史容貌甚偉太祖聞其名乃貽永書曰聞君有二子曰陵從横多武畧瑾雍容富文雅可竝遣入朝孤欲委以文武之任因召拜尚書員外郎相府記室叅軍事軍書羽檄瑾多掌之從破沙苑戰河橋竝有功封姑臧縣子隋高祖受禪以蘇威兼納言民部尚書威上表陳讓詔曰舟大者任重馬駿者馳逺以卿有兼人之才無辭多務也威乃止許善心初仕陳為通直散騎常侍聘於隋遇隋高祖伐陳禮成而不獲反命累表請辭帝不許留縶賓舘及陳亡帝遣使告善心素服號哭於西階之下藉草東向經三日勅書唁焉明日有詔就館拜通直散騎常侍賜衣一襲善心哭盡哀入房改服復出北面立垂涕再拜受詔明日乃朝伏泣於殿下悲不能興帝顧左右曰我平陳國唯獲此人既能懐其舊君即是我誠臣也勅以本官直門下省賜物千段皁馬二十匹煬帝初為晉王榮毗先為華州長史時晉王於路次宻置馬坊毗遏絶其事帝即位拜治書侍御史帝謂之曰今日之舉馬坊之事也無改汝心帝亦敬之毗在朝侃然正色為百寮所憚唐太宗貞觀六年閏八月乙卯宴近臣於丹霄殿樓帝甚懽謂長孫無忌曰王珪魏徴徃事息隱諸臣見之若讎不謂今者又同此用之何慙徃烈然徵不許我為非我所以重之徴再拜曰陛下惟導臣使言臣所以敢言若陛下不受臣亦何敢犯龍鱗觸忌諱也帝大悦夜分乃散各賜錢帛有差憲宗時武元衡元和二年正月拜門下侍郎平章事帝為太子時知其進退守正及用為宰相甚禮信之吕元膺為給事中元和四年十月以為同州刺史入謝憲宗問以時政得失元膺奏詞論甚激切帝嘉其剛正翌日謂宰臣曰前日朕問時政得失元膺有讜言直氣今欲留在左右使言得失卿等以為何如李藩裴垍進賀曰陛下納諫超冠前王乃宗社無疆之福臣等不能廣求直士又不能數進直言孤負聖心合當罪責今請以元膺為給事中以備顧問帝悦而從之李絳為翰林學士既盡心規益憲宗每有詢訪多協事機猶以中人之故命守戸部侍郎吐突承璀恩寵莫二用絳為宰相前一日出承璀為淮南監軍翌日以絳為中書侍郎平章事同列李吉甫便辟善逢君意絳梗直多所規諌故與吉甫大不同時又傳言吉甫通於承璀故絳尤惡之帝察絳忠直守正自立故凡絳論奏多所允從晉高祖時顔術為河陽節度副使知州軍以父病棄官而去帝以術在外急於用徴為文昌正郎樞宻學士遣連帥促之術至闕且辭曰臣本書生不通軍旅恐不稱其職未知何人悞逹陛下必望放臣從其私養之願足矣高祖曰朕自知卿非他人薦也周世宗時王朴為左諌議大夫知開封府事初帝以英武自任喜言天下事嘗憤廣明之後中土日蹙值累朝多事尚未克復慨然有包舉天下之志而皆嘗計事者多不諭其㫖唯朴神氣勁峻性剛決有斷凡所謀畫動愜上意繇是急於登用尋拜左散騎常侍端明殿學士知府如故册府元龜卷七十五
