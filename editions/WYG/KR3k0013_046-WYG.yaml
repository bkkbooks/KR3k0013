body:
  text: 册府元龜卷四十六宋王欽若等撰帝王部智識易曰知周乎萬物而道濟天下故不過若乃知幾其神惟睿作聖既明且哲顯仁藏用非聖人孰能與於此哉三王之前尚矣自漢而下膺運厯而履尊極者乃有挺非常之姿藴維新之識表章乎文理究逹乎情僞慮於未兆見於未萌明治體之要通時用之變防微杜漸以息乎厲階探賾索隱以參乎繫表用能總御羣品嘉靖多方窒姦慝之源塞妖妄之逕克貞王度以熙衆志其或位處明兩事彰先見淵識獨運嘉言罔伏垂之綈緗良可述也後漢光武初起義兵見李軼謟事更始貴将謂朱鮪等帝深疑之常以戒兄伯升曰此人不可復信後更始收劉稷将誅之伯升固爭李軼朱鮪因勸更始并執伯升即日害之光武鍳前事之違存矯枉之志不以功臣任職雖冦鄧之髙勲耿賈之鴻烈分土不過大縣數四所加特進朝請而已帝知天下疲耗思樂息肩自隴蜀平後非儆急未嘗復言軍旅皇太子嘗問攻戰之事帝曰昔衞靈公問陳孔子不對此非爾所及明帝十歳能通春秋光武竒之十二為東海公天下墾田多不以實又戸口年紀互有増减詔下州郡檢復其事而刺史太守多不均平或優饒豪右侵刻羸弱百姓嗟怨遮道號呼時諸部各遣使奏事光武見陳留吏牘上有書視之云潁川𢎞農可問河南南陽不可問因詰吏繇趣吏不肯服抵言於長夀街上得之抵欺也光武怒帝在幄後言曰吏受郡勅當欲以墾田相方耳光武曰即如此何故言河南南陽不可問對曰河南帝城多近臣南陽帝鄉多近親田宅踰制不可為凖光武令虎賁将詰問吏吏乃實首服如帝對於是遣謁者考實具知姦状建武二十七年北單于遣使詣武威求和親光武召公卿廷議不决時帝爲太子言曰南單于親附北人懼于見伐故傾耳而聽爭欲歸義耳今未能出兵而反交通北塞臣恐南單于将有二心北人降者且不復來矣光武然之告武威太守勿受其使魏太祖以安定太守毌丘興将之官戒之曰羌胡欲與中國通自當遣人來慎勿遣人往善人難得必将教羌胡妄有所請求因欲以自利不從便爲失異俗意從之則無益事興至遣校尉范陵至羌中陵果教羌使自請爲屬國都尉帝曰吾預知當爾非聖也但更事多耳文帝初爲太子任城王彰之討烏丸力戰而勝北方悉平及軍還時太祖在長安召彰詣行在所彰自代過鄴太子謂彰曰卿新有功今西上宜無自伐應對嘗若不足者彰到如太子言歸功諸将太祖喜持彰鬚曰黄鬚兒大竒也明帝好學多識特留意於法理自即位之後褒禮大臣料簡功能真偽不得相貿務絶浮華􅉲毁之端行師動衆論决大事謀臣将相咸服帝之大畧性又强識雖左右小臣官簿性行名跡所履及其父兄子弟一經耳目終不遺忘晉宣帝爲魏太傅輔政尚書鄧颺李勝等欲令曹爽建立功名勸使伐蜀帝止不可爽果無功而還文帝爲魏相國欲遣鍾會伐蜀西曹屬邵悌求見曰今遣鍾會率十餘萬衆伐蜀愚謂會單身無重任不若使餘人行帝笑曰我寧當復不知此耶蜀爲天下作患使民不得安息我今伐之如指掌耳而衆人皆言蜀不可伐夫人心豫怯則智勇竝竭而強使之適爲敵禽耳惟鍾會與人意同今遣會伐蜀必可滅蜀滅蜀之後就如卿所慮當何所能一辨耶凡敗軍之将不可以語勇亡國之大夫不可與圖存心膽已破故也若蜀破遺民震恐不足與圗事中國将士各自思歸不肯與同也若作惡秪自滅族耳卿不須憂此慎莫使人聞也及會白鄧艾不軌帝将西悌復曰鍾會所統五六倍於鄧艾但可勅會取艾不足自行帝曰卿忘前時所言邪而更云可不須行乎雖爾此言不可宣也我要自當以信意待人但人不當負我我豈可先人生心哉近日賈䕶軍問我言頗疑鍾會不我答言如今遣卿行寧可復疑卿邪賈亦無以易我語也我到長安則自了矣軍至長安會果已死咸如所䇿明帝㓜而聰哲爲元帝所寵異年數歲嘗坐置膝前屬長安使來因問帝曰汝謂日與長安孰逺對曰長安近不聞人從日邉來居然可知也元帝異之明日宴羣僚又問之對曰日近元帝失色曰何以異間者之言乎對曰舉目則見日不見長安繇是益竒之後魏太武時羣臣白帝更峻京邑城隍以從周易設險之義又陳蕭何壮麗之説帝曰古人有言在德不在險屈丐蒸土築城而朕滅之豈在城也今天下未安平方須人力土功之事朕所未暇蕭何之對非雅言也孝文南伐以李冲兼左僕射留守雒陽車駕還都引見冲等謂之曰本所以多置官者慮有令僕闇弱百事稽壅若明則聽斷獨專聦則權勢大并今朕雖不得爲聦明又不爲劣闇卿等不爲大賢亦不爲大惡且可一兩年許少置官司又嘗謂太子太傅穆亮曰徐州表給歸化人稟王者民之父母誠宜許之但今荆揚不賔書軌未一方欲親御六師問罪江介計萬户投化歲食百萬若聽其給也則蓄儲虗竭雖得户千萬猶未成一同且欲隨貧賑恤卿意何如亮對曰所存逺大實如聖㫖隋高祖潛龍時嘗與宇文慶言謂曰天元實無積德其相貌夀亦不長加以法令繁苛耽恣聲色以吾觀之殆将不乆又諸藩微弱各令就國曽無深根固本之計羽翮既翦何能及逺尉遲迥貴戚早著聲望國家有釁必爲亂階然智量庸淺子弟輕佻貪而不慧終致亡滅司馬消難反覆之虜亦非池内之物變在俄頃但輕薄無謀未能爲害不過自竄江南耳庸蜀險隘易生難阻王謙愚蠢素無籌略但爲人所誤不足爲虞未幾帝言皆驗開皇初益州緫管梁睿上平陳之策帝善之下詔曰公英風震動妙筭縱横消蕩江南宛然可見循環三復俱以欣然公既上才若緫戎律一舉大定固在不疑但朕初臨天下政道未洽恐先窮武事未爲盡善昔公孫述隗囂漢之賊也光武與其通和稱爲皇帝尉佗之於高祖初猶不臣孫皓之答晉文書尚云白或尋欵服或即滅亡王者體大義存遵養雖陳國來朝未盡藩節如公大畧誠須責罪尚欲且緩其誅宜知此意淮海未滅必興師旅若命水龍終當相屈想以身許國無足致辭睿乃止焉唐太宗貞觀元年謂侍臣曰周武王平紂之亂以有天下秦始皇乗周之衰遂吞六國何祚運長短若此之懸也左僕射蕭瑀進曰紂爲無道天下苦之故八百諸侯不期而㑹周室雖微六國無罪秦氏專任智力蠶食諸侯平定雖同人情則異帝曰不終周既尅殷務𢎞仁義秦既得志專任詐力非但取之有異抑亦守之不同取或可以逆守不可以不順祚之修短意在兹乎瑀拜手曰實如聖㫖非愚臣之所及也又嘗謂侍臣曰神仙事夲虗妄空有其名秦始皇非分愛好遂爲方士所詐乃遣童男女數千人隨其入海求仙藥方士避秦苛虐因留不歸始皇猶反側踟蹰以待之還至沙丘而死漢武帝爲求仙乃将女嫁道術人事既無騐便行誅戮據此二事神仙不須妄求也二年太常少卿祖孝孫奏新樂太宗曰禮樂之作盖聖人縁物設教以爲樽節治之隆替豈繇於此御史大夫杜淹對曰前代興亡實繇於樂陳将亡也爲玉樹後庭花齊将亡也而爲伴侣之曲行路聞之莫不悲泣所謂亡國之音以是觀之盖樂之繇也帝曰不然夫音聲能感人自然之道也故懽者聞之則悦憂者聽之則悲悲悦之情在於人心非繇樂也将亡之政其民必苦然心之所感故聞之則悲耳何有樂聲哀怨能使悦者悲乎今玉樹伴侣之曲其聲俱存朕當爲公奏之知公必不悲矣尚書右丞相魏徵進曰古人稱禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉樂在人和不繇音調帝然之四年帝臨朝問房𤣥齡蕭瑀曰隋文帝何如主也對曰克己復禮勤勞思政每一坐朝或至日側五品以上引坐論事宿衞之人傳餐而食雖非性體仁明亦是勵精之主也帝曰公得其一未知其二此人性至察而心不明夫心暗則照有不通至察則多疑於物又欺孤兒寡婦以得天下嘗疑羣臣内懷不服不肻信任百司毎事皆自决斷雖則勞神苦形未能盡合於理朝臣既知上意亦復不敢直言宰臣以下承受而已朕意則不然以天下之廣海内之重千端萬緒須合變通皆委百司爲國思審闗繇宰輔安穏奏聞豈得以百司萬㡬獨斷一人之慮也因令諸司曰若詔勅頒下有未穏者必須執奏不得順㫖即便施行務盡臣下之心也十年謂羣臣曰自古帝王上合天心以致太平者皆股肱之力也朕比開不諱之門直言之路者庶知寃屈欲聞規諫比來以奏封事者盈於篋笥多訐人細事殊無可採朕厯選前王但有君疑於臣則下情不能上逹欲求盡忠極慮何可得哉而無識之人務行讒毁交亂君臣殊非益國自今以後宜棄私爲公小事不須聞奏有上封者朕當以䜛人罪之十七年太常丞鄧素使高麗還請於懷逺鎮加戍兵以逼高麗帝謂之曰逺方不至則修文德以來之未聞一二百戍卒能威絶域者也仁義忠信不理於内兵甲士卒逺勞於外有國之深忌朕所不取也是歲林邑王遣使云爲扶南所攻乞師救援帝曰山有猛獸藜藿爲之不採爾爲隣國扶南安敢侵逼此是爾懼自來将無事矣後有使至果如帝言十八年九月帝謂侍臣曰夫人心與貌不相副者多矣或有發言方正而心行邪曲或辭色柔和而志存忠鯁或貌類尫懦而勇堪制敵或果復私讎而怯於公戰或外若至公而内多姦詭或跡雜埃滓而實懷清白或質性劣弱而妄言入死或口未及言而身能踐難心跡暌謬安可勝紀夫𤣥天高逺四時有常即日月運行筭之不踰度此所謂天逺而必信人近而難知也十二月李思摩部落衆十萬勝兵者四萬人叛思摩渡河請居内地詔許之處於勝夏二州之間羣臣或以帝方東征河南去京不逺今近處强胡非計之得請帝鎮雒陽無東征帝曰夫爲人君者當從德義而無猜疑比屋可封化堯之德也比屋可誅化紂之惡也昔成湯周武化桀紂之遺氓各從其化無不遷善孔子云有教無類豈徒言哉昔隋煬帝無道百姓嗟怨𤣥感作亂非夷狄者也但君無疑貳夷狄可以効忠君多猜嫌股肱必至搆禍朕雖不敏頗識機宜昔隋氏伐遼徵發百姓人皆斷手壞足亡命山野朕今征行取其情愿募十得百募百得千不預從軍者懽聲盈路所謂創事而不違朕但憂念蒼生心常不懈雖居河南濟貧贍弱想其懷恩入於骨髓又延陁嗜欲且同今不近走延陁而逺來歸朕其情易見因謂黄門侍郎褚遂良曰爾知起居宜記之我保十五年中突厥無事矣高宗初爲晉王受孝經於著作郎蕭德言太宗問曰此書中何言爲善對曰夫孝始於事親中於事君終於立身君子之事上進思盡忠退思補過将順其美匡救其惡太宗大悦曰行此足以事父兄爲臣子矣及爲皇太子時有告遂州都督彭王元則之罪太宗召元則功曹而問之功曹爲之隱太宗怒而杖之於前退朝問太子曰人君大柄賞罰是也今箠功曹何如太子對曰草野之人天子召問惶恐失度即箠之臣以爲太急又問然則彭王若何對曰陛下之弟情所友愛願付所司詳鞫斷之未晩也太宗稱善自是太宗坐朝嘗令太子侍立百司奏事畢留中書門下三品平章事太宗因爲太子陳説孝道論及政事或時有决罰令太子評其可否商𣙜辯論深逹政要羣臣莫不歎服顯慶二年道王友王𤣥䇿奏言臣從西域使迴将長年婆羅門至此問其合藥之法報臣必成恩㫖今若放還恐失方術之士𤣥䇿退帝謂侍臣曰𤣥䇿昨進對言古人欲招天下賢哲先市駿骨固請留此婆羅門朕觀其狼戻狷急恐竟無益口云合藥成欲服時須斷食三日服藥令吐後還斷食服藥遣三利令人極痩困然後與藥即換肌肉始得長生遍觀史藉定無長生之理昔者秦皇漢武慕神仙求採藥物勞役天下秦皇五十之餘即死漢武末年乃至國用糜費功力不足賴其早覺昔非下制責躬息兵止役始得安靜年踰七十僅免滅亡審念此等必知無成若有其實長生之人即今何在司空李勣對曰此婆羅門未曾經試來或容不可諳悉前已騐其無成所以放去今復更來頭鬚自白衰老漸及豈得仙之状耶𤣥䇿詭誑何處即有所解昨見其重來羣情已甚驚恠陛下知無所用令更放去臣等不勝喜躍睿宗為皇太子有進三足烏者天后以為周室嘉應太子曰烏前足偽也天后不悦須臾而一足􅑁地果如其言𤣥宗初封楚王天授二年開府置官屬始年七歲因朔望朝見車騎嚴整金吾将軍武懿宗見而忌之遂擠排騎從帝呵之曰吾家朝堂於汝何事敢迫吾騎從則天聞而特加嘆異肅宗為皇太子時天寳十三載安禄山自范陽入朝太子觀其兇姿有悖逆之状言之於𤣥宗𤣥宗易之不納徳宗即位有司言宣政内廊壊請修繕太􅁲云孟冬為魁罡不利穿築請卜他月帝曰春秋之義啟塞從時何魁罡之有卒命修之憲宗六七歲時為皇孫徳宗抱置膝上戲曰汝是何人乃在我懷中皇孫對曰此祗是第三天子徳宗驚喜繇是重之及為皇太子宰臣韋執誼幸順宗寝疾與王叔文等竊弄權柄懼太子怒已用事乃以台州刺史陸質為給事中皇太子侍讀令質入侍而濳伺太子意因用解之及質發言太子果怒曰陛下令先生與寡人講學何得言他質惶懼而出元和十二年光禄少卿楊元卿初聞得蔡州請見帝曰淮西甚有寳貨及犀帶臣知往取必得帝曰朕本討賊為人除害今賊平人安則我求得矣寳貨犀帶非所求也命勿言文宗太和九年十二月庚辰御紫宸殿宰臣李石奏曰請准令月三日詔命起居舍人執筆記言記事帝問宰臣曰坊市人得漸安未石對曰亦已漸安然近日苦寒沍盖縁刑殺致此隂沴又罪人索聯枝黨未巳伏乞聖恩特賜寛宥鄭覃曰所坐周親已有處分訖若不寛解即恐連累至多石又奏曰昨聞鄭注到鳳翔招召兵士至多所投募者皆被殺戮竊恐邊上乗此生事伏乞降詔書安諭帝曰政貴寛恕固宜如此覃石等曰遏惡揚善古聖所重帝曰朱叔夜人言有贓須早令御史鞫問如無過即與洗雪無令虗受贓汚之名又曰宰相之務在選賢任用石奏曰臣與鄭覃俱為輔弼罄竭肝膽豈敢不盡但以人各有求苟遂所欲則美譽至稍不如意則謗議生覃曰事有百司請各有委任帝曰各須求才仍委百司宰相豈可一一自領慎不得懼百司有權覃曰臣常聞李林甫忌前好權帝曰林甫姦臣也豈足論石曰比者選才先試以吏事文武兼才者或主邉兵或營錢糓苟有能事然後入用近日皆以資序繇是進用乏人帝曰國朝近來取士與向頗異覃曰臣聞南朝多用文華所以不理今請以才堪即用不必文詞借如中書舍人草制詔每人只要三數句語粗説其人豈必全序官資歴任帝曰凡進士及第有方鎮奏請判官者第一任未經作州縣官莫依但第一任曽作州縣官即第二任依奏覃曰此科多輕薄不必盡用帝曰輕薄敦重色色皆有亦未必全在此科况此科已二百年亦不可遽改覃曰亦乞不崇樹石曰人家兄弟十數人或三五人但稍有知慧者即業文學若州縣有一文學人在其中雖地至偏逺必少差事陛下若盡命選授州縣官即請减選帝曰令加至四十人三年即選與州縣官得資即任諸處奏充判官卿便處置奏來帝曰朕十年孜孜求理迄今竟未見太平如何覃曰究其根源盖以黎人困弊臣聞百姓富則國富國富在藏之於野欲天下理莫若恤蒼生石曰鄭覃志在恤蒼生若得術亦應不難根本事在朝廷事事節用務去冗食祗如司農寺木炭價每年約支八萬貫有司無以堤防奸吏因縁所支不啻一倍以臣所見且去簿書奸盜然後百司理百司理即天下理若網在綱則百事整帝曰我每思貞觀開元之時覩今日之事即往往憤氣填膺覃曰陛下頻言及此臣等不勝慶忭臣與石等漸期條理以副聖心石曰求理之道在乎自上而下至於禁中衣服装飾外皆倣傚以為時尚陛下躬儉節用風俗已移長裾大袂日漸减少若更令戚屬絶其侈靡不慮下不從教帝曰但左街副使張元昌便用金唾盂何奢侈之甚昨因李訓事已漸緝矣覃對曰如張元昌事宜付有司戒約此軰則人自惕懼帝曰此事亦難家至户曉戒勅但要自以儉約化之朕嘗聞前時内庫有兩領錦褑子其上飾以金鳥一領𤣥宗皇帝幸温湯時着一領與楊貴妃着當時貴重如此如今奢靡豈復貴之料今富家亦應往往而有石曰毛玠為吏部尚書性本清儉時人尚不敢鮮衣美食况萬乗之留情故可便為一時之法帝曰周孔文武之業後猶陵遲亦可歎也石又言曲江亭比奉詔令百司修造今将興功更俟進止帝曰且止石曰開元之時亭臺至盛今将倣之未知可否帝曰在開元之際天下太平過有興役已是當時末事况今無當時之太平而倣當時之末事豈為宜哉石又曰請於舊亭子兩邉令京兆府量造小屋餘停罷囘充修館驛并昨所被誅戮數家家具噐用竝請勒度支送館驛充用宰臣退帝命起居郎鄭朗等適所紀録者将來一觀鄭朗對曰臣執筆所紀便目為史臣聞自古帝王不合觀史帝曰故事何在朗曰臣不敢逺徵故實嘗聞太宗皇帝欲親覧國史用知得失諫議大夫朱子奢上表曰史官所述義歸盡善若至曽𤣥已後或非上智中主庸君餙非護短見極陳善惡恐致史官何地逃刑又聞褚遂良對曰今之起居古之左右史以記人君言行善惡必書庻幾不為非法不聞帝王躬自觀史帝又謂朗曰適來所紀且是直書未有否臧一見無爽朗乃進所紀帝畧覧曰卿宜門外重寫録進來其日晩内出詔宣示羣臣曰適來鄭朗等奏朝來所紀之事擬不進本人君良史善惡必書或有平生之閒話不關理道之體要垂諸将來實為取愧異日臨朝庻㡬稍改何妨一見得戒醜言開成二年嘗謂宰臣鄭覃李固言李石等曰濟濟多士文王以寧徳宗皇帝時班行多闕豈乏才乎石曰十室之邑必有忠信安有大國無人盖貞元中進士路塞所以有才之人或託迹非所此乃不進人才之故也固言曰求才之道有人保任便宜奨用後不稱職即罷黜帝曰宰相薦人莫計踈宻朕聞竇易直作相未嘗論用親情若已非相才自須引退若是公舉何避親嫌人鮮全才但用所長耳三年七月甲子以衞尉卿王彦威為忠武節度右金吾大将軍史孝章為邠寧節度丁卯帝於紫宸殿問宰臣曰昨除兩鎮如何夷行曰但出自聖心即好楊嗣復曰若出自聖心即人心皆愜如不當不可但自聖心帝曰誠如此吾固無私夷行曰自三數奸臣竊權陛下不可倒持太阿權假何人帝曰夷行言倒持太阿亦不可但當與不當不在倒持太阿嗣復曰齊桓用管仲豈謂倒持太阿帝曰然四年閏正月謂宰臣曰明經會義否宰臣曰明經只念經䟽不會經義帝曰只念經䟽何異鸚鵡能言四月帝於紫宸殿謂宰臣曰杜悰判度支邊上更無欠闕足見長才嗣復李珏因稱其美請除户部尚書以酧之夷行曰臣謂一切恩權合歸君上陛下自看可否李珏曰太宗任宰臣天下事皆得平章謂之平章政事代天理物上下不相疑阻以此能致太平若除一官皆須决於君上即焉用彼相昔隋文帝一切自用心力臣下發言即疑凡臣下用之即是宰相不用即是庶寮豈可自保夷行曰小官即可大官須陛下自處置帝曰卿言總似未當夷行曰自古敗亂未嘗不因恩權在下嗣復曰夷行必以臣等未合膺委任不然何自為宰相不知宰相之職珏曰陛下嘗語臣云竇易直勸我每宰相進擬五人留三人兩人勾一人渠只合勸我擇宰相不合勸我疑宰相帝曰易直此言甚鄙帝曰韋處厚作相三日薦六節度使亦可大怪珏曰處厚身為宰相信佛求功徳殊昧本後唐荘宗初從太祖起義雲中部下皆北邊勁卒及破賊迎鑾功居第一繇是稍優寵士卒因多不法或陵侮官吏豪奪士民白晝剽攘酒博喧競太祖緩於禁制獨帝不平之從容白曰隄防所以止水禮法所以禁人未有壊隄防而止横流廢禮法而禁兇暴雖堯舜禹湯之明聖捨此則無繇致理竊見将吏驕縱軍士兇豪不唯蠧耗於生靈終慮為國之後患古人防㣲杜漸何况事已顯然不可不禁太祖依違之及安塞不利之後時事多難兇焰日熾氐叔琮屢傾郡邑康懷貞頻犯郊圻隣援携離土疆侵削城門之外鞠為戰塲太祖憂形於色寝膳不怡嘗宴居帝侍側因啟曰夫盛衰有常理禍福繫神道家世二代盡忠王室勢窮力屈無所愧心物不極則不返惡不極則不亡今朱氏攻逼乗輿窺伺神器陷害良善誣誑神祗以臣觀之殆其極矣大人當遵養時晦以待其衰何事輕為沮䘮太祖釋然因奉觴作樂而罷晉高祖初為鎮州節度使九門縣有人鬻地與異居兄議價不定乃移於他人他人須兄立劵兄抑之因訴於令令以兄弟俱不義送帝帝曰人之不義繇牧長新至教化所未能及吾甚愧焉若以至理言之兄利良田弟求善價順之為是阻之則非其兄不義之甚也宜重笞焉市田則以髙價者取之上下服其明漢髙祖晉天福八年鎮太原奏以太原往例每年差人押送葡萄往北朝今年伏候勅㫖晉少帝有詔罷之髙祖曰此圡産常物廢而不行必啟戎心以生怨也又十一年八月朝廷以前遣李守貞皇甫遇張彦澤再援粮入易定彦澤與契丹騎衆相逢逐行四十里獲酋領諧里相公首級帝有表入賀因謂寮佐曰兵者兇器戰者危事朝勝夕負何常之有今常定内地也朝廷不能分置屯田課民種植俟秋早穫清野以待何須多備兵幕招㓂引敵馳鬭是戎人所長堅守乃為我之利伺隙待變平之非晩今半歳之中命将兩出翻為敵騎所誘自取其困何謀之不審耶吾恐得其小㨗而有後衂諸君其志之天福十一年十一月朝廷遣杜重威與諸将攻瀛莫二州以詔諭帝帝謂幕客及左右曰主上富有春秋左右乏正人重威以國親方擅兵柄輕為表請有此無名之役契丹自陽城不利畜謀俟便踰一期矣今國家邊上深溝高壘守猶不足得有侵越乎且瀛莫獲之無以保殘之是為冦立敵招怨在此行也朝廷以我先帝舊臣特都統虗名而已曽不以大事利害一相謀之社稷至重良有憂也始少帝八年在澶淵為契丹所迫命帝為北面招討使第一詔會兵鎮州第二詔會兵邢臺時以雁門有虜黨南下張脅牽之勢故帝親率兵拒焉由是兩路将行皆後期不能赴朝廷以為持疑逗留稽勤王之意少帝曽謂近侍曰太原全不為朕必貯異志有處分便可速為之識者以為言之非祥故後雖有委託之命而無臨制之權帝亦知少帝不為我用嘗鎮靜自守無復敢進一言以箴朝廷之闕十一月杜重威入瀛州界下東城而西以契丹大至故也十二月十日重威以王師降契丹真定東垣渡耶律氏率雜虜漢軍而南先遣我降将張彦澤以二千騎馳渡白馬津入汴據之帝聞而大駭分兵守境以備侵軼之患十二年十二月即位初殿直韓訓進呈造到攻城木鳳斧钁帝聞之謂左右曰衆心成城衆散則城無所保矣斯何用焉周世宗嘗謂侍臣曰近代君臣多不能保其終始何也侍臣奏曰盖為臣者不得事君之道或恃寵以矜功或縱欲以敗度故雖得其位旋失其身帝曰此繇其君也儻君能駕御保惜不寘於顛危之地則臣下必能保守其冨貴自然君臣保其終始也羣臣大稱美之册府元龜卷四十六
