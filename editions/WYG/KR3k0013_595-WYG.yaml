body:
  text: 册府元龜卷五百九十五宋王欽若等撰掌禮部諡法第一夫生有爵死有諡其來尚矣或曰諡者行之迹周公為之所以彰善惡之迹垂沮勸之道君子知勸小人知懼焉故周公太史漢官大行實掌其事自春秋已降載籍所紀始自列國之辟以迄有位之臣或有司考行遵節惠之文或册書褒德舉尊名之典乃至牧宰旌於髙士弟子表其先生雖無封爵亦著稱謂其間溢美者有列曹之駁議追命者有故吏之奏記咸可銓次以明行實復有性惟檮昧行匪純正或謬舉於公朝或肆奢於私室或矜伐以忤物或朋比而搆釁觸類而言為累匪一繇是舉易名之典示貶惡之義則後之觀者得不悚懼而為善乎申生晉獻公世子也獻公将殺世子信驪姬之言公子重耳謂之曰子蓋言子之志於公乎蓋皆當為盍何不也志意重耳欲使言見譛之意重耳申生異母弟後為文公世子曰不可君安驪姬是我傷公之心也言其意則驪姬必誅也驪姬獻公伐驪戎所獲女也申生之母蚤卒驪姬嬖焉曰然則盍行乎行猶去也世子曰不可君謂我欲弑君也天下豈有無父之國哉吾何行如之言人有父則皆惡欲弑父使人辭於狐突曰申生有罪不念伯氏之言也以至於死申生不敢愛其死辭猶告也狐突申生之傅舅犯之父也前此者獻公使伯申生伐東山臯落氏狐突謂申生欲使之行今言謝之氏狐突别氏雖然吾君老矣子少國家多難子驪姬之子奚齊伯氏不出而圖吾君圖猶謀也不出為君謀國家之政然則自臯落氏反後狐突懼乃稱疾伯氏茍出而圖吾君申生受賜而死賜猶惠也再拜稽首乃卒既告狐突乃雉經是以為恭世子也言行如此可以為恭於孝則未之有鄭幽公為子家所弑鄭人討幽公之亂斵子家之棺而逐其族改葬幽公諡之曰靈楚成王之卒諡曰靈不瞑曰成乃瞑共王疾告大夫曰不榖不德少主社稷生十年而䘮先君未及習師保之教訓而應受多福多福謂為君是以不德而亾師於鄢以辱社稷為大夫憂其宏多矣宏大也若以大夫之靈獲保首領以没於地唯是春秋窀穸之事窀厚也穸夜也厚夜猶長夜春秋謂祭祀長夜謂𦵏禮所以從先君於禰廟者從先君代為禰廟請為靈若厲欲受惡也以愧先君也亂而不損曰靈戮殺不辜曰厲大夫擇焉莫對及五命乃許秋楚共王卒子囊謀謚大夫曰君有命矣子囊曰君命以共若之何毁之赫赫楚國而君臨之撫有蠻夷奄征南海以屬諸夏而知其過可不謂共乎請謚之共大夫從之傳言子囊之善公叔文子卒文子衞南公之孫名拔或作發其子戍請謚於君曰日月有時将𦵏矣請所以易其名者君曰昔者衞國凶饑夫子為粥與國之餓者是不亦惠乎君靈公也昔者衞國有難夫子以其死衞寡人不亦貞乎難為魯昭公二十年盗殺衞侯之兄縶也時齊豹作亂夫子聽衞國之政修其班制以與四鄰交衞國之社稷不辱不亦文乎班制謂尊卑之差故謂夫子貞惠文子後不言貞惠者文有以兼之此云公叔文子之臣大夫僎與文子同升諸公子聞之曰可以為文矣孔圉衞大夫也既卒謚曰文子貢問曰孔文子何以謂之文也子曰敏而好學不恥下問是以謂之文也北宮喜為大夫卒衞侯賜謚曰貞子滅齊氏故析朱鉏為大夫卒衞侯賜謚曰成子從公故漢衡山王勃值七國反王堅守無二心徙王濟北以褒之及薨遂賜謚為貞王河間王德立二十七年薨中尉常麗以聞曰王身端行治端直治理溫仁恭儉篤敬愛下明知深察惠於鰥寡大行令奏謚法曰聰明睿智曰獻睿深也通也宜謚曰獻王霍去病為驃騎将軍薨謚之并武與廣地曰景桓侯景武謚也桓廣地謚也謚法布義行剛曰景辟土服遠曰桓張勃嗣父富平侯為諫議大夫元帝初即位詔列侯舉茂材勃舉太官獻丞陳湯獻丞主貢獻物也湯待遷父死不犇喪犇古奔字司𨽻奏湯無循行勃選舉故不以實坐削戸二百㑹薨因賜謚曰繆侯以其所舉不得人故加惡謚繆者妄陽城侯劉德子向坐鑄偽黄金當伏法律鑄偽黄金棄市也德上書訟罪㑹薨大鴻臚奏德訟子罪失大臣體不宜賜謚置嗣制曰賜謚繆侯以其妄訟子王立元帝時以太后弟封江陽侯王仁嗣父譚為平河侯平帝時王莽輔政忌之奏令就國家遣使者廹守立仁令自殺賜立謚曰荒侯仁謚曰剌侯杜業以列侯為太常坐法免官就國平帝時以憂恐發病死初業尚成帝妹頴邑公主無子薨業家上書求還京師與主合葬不許而賜謚曰荒侯後漢祭遵為征虜将軍建武九年卒博士范升上疏追稱遵曰臣聞先王崇政尊美屏惡昔髙祖大聖深見遠慮班爵割地與下分功著錄勲臣頌其德美生則寵以殊禮奏事不名入門不趨死則疇其爵邑世無絶嗣丹書鐵劵傳於無窮斯誠大漢厚下安人長久之德所以累世十餘厯載數百廢而復興絶而復續者也陛下以至德受命先明漢道褒序輔佐封賞功臣同符祖宗征虜将軍潁陽侯遵不幸早薨陛下仁恩為之感傷遠迎河南惻怛之慟形於聖躬喪事用度仰給縣官重賜妻子不可勝數送死有以加生厚亡有以過存矯俗厲化卓如日月古者臣疾君視臣卒君弔德之厚者也陵遲以來久矣及至陛下復興新禮羣下感動莫不自勵臣竊見遵修行積善竭忠於國北平漁陽西拒隴蜀先登坻上深取畧陽衆兵既退獨守衝難制御士心不越法度所在吏人不知有軍清名聞於海内㢘白著於當世所得賞賜輙盡與吏士身無竒衣家無私財同産兄午以遵無子娶妾送之遵乃使人逆而不受自以身任於國不敢圖生慮繼嗣之計臨死遺誡牛車載喪薄𦵏雒陽問以家事終無所言任重道遠死而後已遵為将軍取士皆用儒術對酒設樂必雅歌投壺又建為孔子立後奏置五經大夫雖在軍旅不忘爼豆可謂好禮悦樂守死善道者也禮生有爵死有謚爵以殊尊卑謚以明善惡臣愚以為宜因遵薨論敘衆功詳按謚法以禮成之顯彰國家篤古之制為後嗣法帝乃下升章以示公卿至葬車駕復臨贈以将軍侯印綬朱綸容車介士軍陣送葬謚曰成侯朱頡修儒術安帝時至陳相卒頡子穆與諸儒考依古義謚曰貞宣先生及穆卒蔡邕與人共謚為文忠先生袁山松書載蔡邕議曰魯季文子君子以為忠而謚曰文子又傳曰文忠之實也忠以為實文以彰之遂共謚穆荀爽聞而非之故張璠論曰夫謚者上之所贈非下之所造故顔閔至德不聞有謚朱蔡各以衰世臧否不立故私議之楊厚為侍中病歸以黄老教授卒於家鄉人謚曰文父張霸為侍中卒将作大匠翟酺等與諸門人追錄本行謚曰憲文郭鎮為尚書延光中中黄門孫程誅中常侍江京等立濟陰王鎮率羽林士擊殺衞尉閻景以成大功後為廷尉卒子賀累遷復至廷尉及賀卒順帝追思鎮下詔賜鎮謚曰昭武侯賀曰成侯荀靖字叔慈有至行不仕年五十而終號曰𤣥行先生靖少有俊才動止以禮靖弟爽亦以才顯扵當時或問汝南許章曰爽與靖孰賢章曰皆玉也慈明外朗叔慈内潤及卒學士惜之誄靖者二十六人穎陰令丘禎追謚靖曰𤣥行先生范冉冉或作丹卒大将軍何進移書陳留太守累行論謚僉曰宜為貞節先生清白守節曰貞好㢘自克曰節陳寔字仲弓潁川許人也靈帝時大将軍竇武辟為掾屬後歸鄉閭絶人事三公每缺議者歸之累見徴命遂不起卒於家何進遣使弔海内赴者三萬餘人制衰麻者以百數共刋石立碑謚為文範先生夏恭為㤗山都尉善為文章卒官諸儒共謚曰宣明君子牙少習家業著賦頌讚詩凡四百篇舉孝㢘早卒鄉人號曰文德先生蔡稜陳留郡人邕之父也有清白行謚曰貞定公邕祖携碑云携字叔業有周之胄昔蔡叔没成王命其子仲使踐諸侯之位以國氏姓君其後也君曽祖父勲哀帝時以孝㢘為長及君之身増修厥德順帝以司空髙第遷新蔡長年三十九卒長子稜字伯直處俗孤黨不協於時垂翼華髪人爵不升年五十三卒謚法清白守節曰貞其行不差曰定魏太傅鍾繇薨有司議謚以為繇昔為廷尉辨理刑獄决嫌明疑民無怨者猶于張之在漢也詔曰太傅功髙德茂位為師保論行賜謚當先依此兼敘廷尉于張之德耳乃䇿謚曰成侯吳質為侍中太和四年卒以怙威肆行謚曰醜侯質子應乃上書論枉至正元中乃改謚威侯蜀陳祗為侍中守尚書令加鎮軍将軍祗上承王指下按閹䜿深見信愛景曜元年卒後主痛惜發言流涕乃下詔曰祗統職一紀柔嘉維則幹肅有章和義利物庶績允明命不融遠朕用悼焉夫存有令問則亡加美謚謚曰忠侯趙雲為鎮東将軍後軍敗貶為鎮軍建興七年卒追謚曰順平侯初先主時惟法正見謚後主時諸葛亮功德盖世蒋琬費禕荷國之重亦見謚陳祗寵待特加殊奨夏侯霸遠來歸國故復得謚於是關羽張飛馬超龎綂黄忠及雲乃皆追謚時論以為榮雲别傳載後主詔曰雲昔從先帝功績既著朕以幼冲涉途艱難賴恃忠順濟于危險夫謚所以叙元勲也外議云宜謚大将軍姜維等議以為雲昔從先帝勞績既著經營天下遵奉法度功效可書當陽之役者義貫金石忠以衛上君念其賞禮以厚下臣忘其死死有知足以不溺生者感㤙足以殞身謹按謚法柔賢慈惠曰順執事有班曰平克定禍亂曰平應謚雲曰順平侯晉何曽為太宰侍中咸寧四年薨将葬下禮官議謚博士秦秀議曰故太宰何曽雖階世族之裔而少以髙亮嚴肅顯登王朝事親有色養之名在官奏科尹之謨此二者實得臣子事上之槩然資性驕奢不循軌則詩云節彼南山惟石巖巖赫赫師尹民具爾瞻言其德行髙峻動必以禮爾丘明有言儉德之恭侈惡之大也大晉受命勞謙隠約曽受寵二代顯赫累世暨乎耳順之年身兼三公之位食大國之租荷保傅之貴執司徒之均二子皆金貂卿校列於帝側方之古人責深負重雖舉門盡死猶不稱位而乃驕奢過度名被九域行不履道而饗位非常以古義言之非惟失輔相之宜違斷金之利也穢皇代之美壞人倫之教生天下之醜示後生之慠莫大於此自近世以來宰臣輔相未有受垢辱之聲被有司之劾父子塵累而䝉恩貸若曽者也周公弔二季之陵遲哀大教之不行於是作謚以紀其終曽参奉之啟手歸全易簀而没盖明慎終死而後已齊之史氏亂世陪臣爾猶書君賊累死不懲况於皇代守典之官敢畏强盛而不盡禮管氏有言禮義㢘恥是謂四維四維不張國乃滅亡宰相大臣人之表儀若生極其情罪又無貶是則帝室無正刑也王公貴人復何畏哉所謂四維復何寄乎謹按謚法名與實爽曰繆怙亂肆行曰醜曽之行已皆與此同宜謚繆醜公武帝不從䇿謚曰孝太康末子紹自表改謚曰元賈充為太尉錄尚書太康三年薨初充用韓謐為嗣武帝特許之及下禮官議充謚博士秦秀議曰充舍宗族弗授而以異姓為後悖禮溺情以亂大倫昔鄫養外孫莒公子為後春秋書莒人滅鄫聖人豈不知外孫親耶但以義推之則無父子耳又按詔書自非功如太宰始封後如太宰所取必已自出如太宰不得以為比然則以外孫為後自非元功顯德不之得也天子之禮盖可然乎絶父祖之血食開朝廷之禍門謚法昏亂紀度曰荒請謚荒公帝不從博士段暢希㫖建謚曰武帝乃從之劉毅為尚書左僕射卒羽林左監北海王宫上疏曰中詔以毅忠允匪躬増班台司斯誠聖朝考績以毅著勲之美事也臣謹按謚者行之迹而號者功之表今毅功德竝立有號無謚於義不體臣竊以春秋之事求之謚法主於行而不繼爵然漢魏相承爵非列侯則雖没而髙行不加之謚至使三事之賢臣不如野戰之将銘跡所殊臣願聖世舉春秋之遠制改列爵之舊限使夫功行之寔不相掩替則莫不率賴若以革舊毁制非所倉卒則毅之忠益雖不攻城畧地論德進爵亦應在例臣敢惟行輔周之義謹牒毅功行如右武帝出其表使八座議之多同宮議奏寢不報曹志為散騎常侍遭母憂居喪過禮因此篤病喜怒失常及卒太常奏以惡謚崔褒歎曰魏顆不從亂以病為亂也今謚曹志而謚其病豈謂其病不為亂乎於是謚謚為定陳準為太尉廣陵公及薨太常奏謚散騎常侍領國子博士嵇紹駁曰謚號所以垂之不朽大行受大名細行受細名文武顯於功德靈厲表於闇蔽自頃禮官協情謚不依本準謚為過宜謚曰謬事下太常時雖不從朝廷憚焉郭奕為尚書卒太常上謚為景有司議以貴賤不同號謚與景皇同不可請謚曰穆紹曰謚所以旌德表行按謚法一德不懈為簡奕忠毅清直立德不踰於是遂賜謚曰簡太康八年十月太常上謚故太常平陵男郭奕為景侯有司奏云晉受命以來祖宗號謚羣下未有同者故郭奕與景皇同不可聽宜謚曰穆王濟羊僕等并云夫無窮之作名謚不一若皆相避於制難全如悉不復非推崇事尊之禮宜依諱名之義但及七廟祖宗而已不及於毁之廟成粲武茂劉納竝云同謚非嫌號謚者國之大典所以萬世作教經文人之遠一也同雖歸父義有所不隍及在臣子或以行顯故能使上下愚愆罔有意拒願加也同堯舜以來司謚之禮舍漢魏近制相避之議又引周公文子同謚文武帝詔曰非言君臣不可同正以奕謚景不甚當爾宜謚真簡及大元四年侍中王攸之表君臣不嫌同謚尚書奏以攸之言為然滕修初仕吳為廣州刺史吳平以修為安南将軍廣州牧太康九年卒謚曰聲修之子竝上表曰亡父修羈紲吳壤為所驅馳幸逄開通沐浴至化得從俘虜握戎馬之要未覲聖顔委南藩之重實由勞勲少聞天聽故也年衰疾篤屢乞骸骨未䝉垂哀奄至薨殞臣承遺意輿櫬還都瞻望雲闕實懷痛裂竊聞博士謚修曰聲直章流播不稱行績不勝愚情冐昧聞訴帝乃賜謚曰忠周處為御史中丞從征西将軍梁王彤征氐人齊萬年力戰而没及元帝為晉王将加處䇿謚太常賀循議曰處履德清方才量髙出厯守四郡安人立政入司百僚直節不撓在戎致身見危授命此皆忠賢之茂實烈士之遠節按謚法執德不回曰孝遂以謚焉庾珉字子琚少厯散騎常侍本國中正侍中封長岑男懷帝之没劉元海也珉從在平陽元海大㑹因使帝行酒珉不勝悲憤再拜上酒因大號哭賊惡之㑹有告珉及王雋等謀應劉琨者元海因圖弑逆珉等竝遇害太元末追謚曰貞謝石為衞将軍薨請謚下禮官議博士范𢎞之議曰石階籍門䕃屢登崇顯總司百揆翼贊三臺嫻練庶事勤勞匪懈内外僉議皆曰與能當淮淝之㨗勲極危墜雖皇威遐震狡冦夭亡因時立功石亦與焉又聞建學校以延胄子雖盛化未洽亦愛禮存羊然古之賢輔大則以道事君侃侃終日次則厲身奉國夙夜無怠下則愛人惜力以濟時務此數者然後可以免惟塵之譏塞素飱之責矣今石位居朝端任則論道昌言無忠國之謀守職則容身而已不可謂事君貨黷京邑聚斂無厭不可謂厲身坐擁大衆侵食百姓大東流於遠近怨毒結於衆心不可謂愛人工徒勞於土木思慮殫於機巧紈綺盡於婢妾財用縻於絲桐不可謂惜力此人臣之大害有國之所去也先王所以正風俗理人倫者莫尚乎節儉故夷吾受謗於三歸平仲流美於約已自頃風軌陵遲奢僭無度㢘恥不興利競交馳不可不深防原本以絶其流漢文襲弋綈之服諸侯猶侈武帝焚雉頭之裘靡麗不息良繇儉德雖彰而威禁不肅道自我建而行不及物若存罰其違亡貶其惡則四維必張禮義行矢按謚法因事有功曰襄貪以敗官曰墨宜謚曰襄墨公朝議不從單謚曰襄王述為尚書令卒追贈侍中驃騎将軍開府謚曰穆以避穆帝改曰簡何無忌為㑹稽内史左将軍征盧循兵敗握節死詔贈侍中司空謚曰忠肅宋何朂以尚公主封安成公與臨汝公孟靈休竝各奢豪朂官至侍中追謚荒公顔師伯為散騎常侍尚書僕射領丹陽尹為前廢帝所害明帝即位詔曰師伯昔逄代運豫班榮賞遭罹厄㑹殞命滛刑宗嗣殄絶良用矜悼但其心黷貨宜貶贈典可詔封社以慰寃魂謚曰荒王敬𢎞卒昇明二年詔曰夫珍秘蘭幽貞芳載越徽猷沉遠懋禮彌昭故侍中左光禄大夫開府儀同三司敬𢎞神運冲簡識宇標峻德敷象魏道藹丘園髙挹榮冕凝心塵外清光粹範振俗淳風兼以累朝延賞聲華在詠而嘉篆闕文猷䇿韜采尚想遥分興懷寢寤便可詳定輝謚式旌追典謚為文貞公劉延孫為侍中僕射卒有司奏謚忠穆詔為文穆南齊長沙王晃有武力為太祖所愛太祖嘗曰此我任城也世祖緣此意故謚曰威禇彦回為尚書令卒先是陶季直齊初為尚書比部郎時彦回與季直素善頻以為司空司徒主簿委以府事彦回卒尚書令王儉以彦回有至行欲謚為文孝公季直請曰文孝是司馬道子謚恐其人非具美不如文簡儉從之王晏為吏部尚書以舊恩見寵時尚書令王儉雖貴而踈晏既領選權行臺閣與儉頗不平儉卒禮官議謚帝欲依王導謚為文獻晏啟帝曰導乃得此謚但宋來不加素侯出謂親人曰平頭憲事已行矣梁劉巘有賢行天監元年下詔為巘立碑謚曰貞簡先生徐勉為侍中衞将軍卒有司奏謚曰居敬行簡曰簡帝謚曰執心决斷曰肅因謚簡肅公沈約為尚書令侍中天監十二年卒有司謚曰文髙祖曰懷情不盡曰隠故改為隠劉峻居東陽吳㑹人士從其學普通二年卒時年六十八門人謚曰𤣥靖先生安成康王秀世子機為寧遠将軍湘州刺史大通二年薨於州時年二十機美姿容善吐納家既多書博學强記然而好弄尚力遠士子近小人為州專意聚斂無治績頻被案劾及将葬有司議謚髙祖詔曰王好内怠政可謚曰煬蕭子顯為吳郡太守卒性凝簡負其才氣及葬請謚髙祖手詔云恃才傲物宜謚曰驕蕭曄為晉陵太守卒於郡初曄寢疾厯年官曹壅滯有司按謚法言行相違曰替乃謚替侯邵陵王綸為西魏晉軍所敗死於汝南岳陽王詧遣迎喪葬於襄陽望楚山南贈太宰謚曰安後元帝議追加謚尚書左丞劉榖議謚法怠政交外曰携從之王僉為太子中庶子卒贈侍中承聖三年世祖追贈曰賢而不伐曰恭謚恭王孺為吏部尚書以母憂去職居喪未朞以毁卒時年五十九謚曰孝子劉訏平原人州辟主簿不就及卒宗人至友相與刋石立銘謚曰𤣥貞處士阮孝嗣陳留尉氏人性至孝沈静為名流所欽重南平元襄王聞其名致書要之不赴後卒時年五十八門徒誄其德行謚曰文貞處士劉㪣博學有文才不娶不仕隠居求志遨遊林澤以山水書籍相娛精心學佛及卒親故誄其行迹謚曰貞節處士蕭眎素徴中書侍郎辭不就及卒親故迹其事行謚曰貞文先生陳周敷為鎮南将軍豫州刺史討周廸與廸對廸紿敷曰吾昔與弟戮力同心宗從匪他豈規相害今願伏罪還朝因弟披露心腑乞先挺身共立盟誓敷許之方登壇為廸所害詔曰敷受任遐征淹時違律虚襟姦詭遂貽喪仆但夙著勤誠亟勞戎旅猶深惻惨愍悼於懷可存其第賦量所賻䘏還喪京邑謚曰脱袁泌為司徒左長史卒於官臨終戒其子芳華曰吾於朝廷素無功績瞑目之後無得受贈謚其子述泌遺意朝廷不許謚曰質魯悉逹幼以孝聞及為吳州刺史遭母憂哀毁過禮因遘疾卒謚曰孝侯後魏穆崇為太尉封宜都公天賜三年薨先是衞王儀逆崇預焉道武惜其功而秘之及有司奏謚帝親覧謚法至述義不尅曰丁太祖曰此當矣乃謚曰丁公樂王丕坐劉潔事以憂薨謚曰戾王任城王世雋為尚書令輕薄好去就及薨謚曰躁戾鄭羲為兖州刺史多所受納政以賄成徴為秘書監卒尚書奏謚曰宣詔曰盖棺定謚先典成式激揚清濁治道明範故何曽幼學良史不改繆醜之名賈充寵晉直士猶立荒公之稱羲雖宿有文業而治闕廉清稽古之効未光於朝榮昧貨之談已形於民聽謚以善問殊乖於衷又前嵗之選匪繇備行充舉自荷後任勲績未昭尚書何乃情遺至公愆違明典依謚法博聞多見曰文不勤成名曰靈可贈以本官加謚文靈髙祐為宋王昶傅昶薨徴為宗正卿久而不赴詔免卿太和二十三年卒太常議謚曰煬侯詔曰不遵上命曰靈可謚為靈彭城王勰孝文宣武時累有功及薨太常卿劉芳議勰謚曰王挺德弱齡誕資至孝睿性過人學不師授卓爾之操發自天然不羣之美幼而獨出及入叅政務綸綍有光爰登中鉉敷明五教漠北告危皇赫問罪王内親藥膳外總六師及宮車晏駕上下哀慄奮猛御戚英略潛通翼衞靈輿整戎振斾厯次宛謝迄於魯陽送往奉居無慙周霍禀遺作輔遠至邇安分陜常方流詠燕趙廓清江西威懾南越入整百揆庶績咸熈履勤不惮在功愈挹温恭愷悌忠雅寛仁興居有度善終篤始髙尚厥心功成身退義亮聖衷美光世典依謚法保大定功曰武善問周逹曰宣謚曰武宣王于忠為尚書右僕射薨贈侍中司空公有司奏太常少卿元端議忠剛直猛暴專戅好殺按謚法性剛理直曰武怙威肆行曰醜宜謚武醜公太常卿元修儀議忠盡心奉上翦除凶逆依謚法除偽寧真曰武夙夜恭事曰敬宜謚武敬公二議不同事奏靈太后令曰可依正卿議石祖興常山九門人也太守田文彪縣令和直等䘮亡祖興自出家絹二百餘疋營䕶喪事州郡表列孝文嘉之賜爵二級為上造後拜寧陵令卒吏部尚書李韶奏其節義請加贈謚以奬來者靈太后令所奏有司乃謚曰恭源懷為車騎大将軍卒贈司徒冀州刺史盧昶奏太常寺議謚曰懷體尚寛柔器操平正依謚法柔直考終曰靖宜謚靖公司徒府議懷作牧陜西民飲惠化入總端貳朝列歸仁依謚法布德執義曰穆宜謚穆公二議不同詔曰府寺所執竝不克允愛民好與曰惠可謚惠公索敞為中書博士篤勤訓教多所成益前後所出顯逹位至尚書牧守者數十人出補扶風太守在位清貧未幾卒官時舊同學生等為請謚詔謚曰獻王肅為散騎常侍都督淮南諸軍事揚州刺史薨有司奏以肅貞心大度宜謚康公詔謚宣簡甄琛孝明時為車騎将軍特進加侍中卒贈司徒公尚書左僕射太常議謚文穆吏部袁翻奏曰案禮謚者行之迹也車服者位之章也是以大行受大名細行受細名行生於已名生於人故闔棺然後定謚者累其生時美惡所以為将來勸戒身雖死使名常存也凡薨亡者所屬即言大鴻臚移本郡大中正條其行迹功過承中正移言公府下太常部博士評議為謚列上謚不應法者博士坐如選舉不以實論若行狀失實中正坐如博士自古帝王莫不殷勤慎重以為褒貶之實也今之行狀皆出自其家行其臣子自言君父之行無復相是非之事臣子之欲光揚君父但苦迹之不髙行之不美是以極辭恣意無復限量觀其狀也則周孔聨鑣伊顔接祍論其謚也雖窮文盡武罔或加焉然今之博士與古不同唯知依其行狀又先問其家人之意臣子所求便為議上都不復斟酌與奪商量是非致號謚之加與汎階莫異専以極美為稱無復貶降之名禮官之失一至於此案甄司徒行狀至德與聖人齊蹤鴻名共大賢比迹文穆之謚何足加焉但比來贈謚於例普重如甄之流無不復謚謂宜依謚法慈惠愛民曰孝宜謚曰孝穆公自今已後明勒太常司徒有行狀如此言辭流宕無復節限者悉請裁量不聽為受必准人立謚不得優越復有踵前來之失者付法司科罪從之馮誕為司徒卒有司奏謚詔曰案謚法善行仁德曰元柔克有光曰懿昔貞惠兼美受三謚之榮忠武䨇徽錫兩號之茂式准前迹宜契具瞻既自少綢繆知之唯朕案行定名謚曰元懿羊祉為平北将軍卒太常少卿元端博士劉臺龍議謚曰祉志在埋輪不避强禦及贊戎律熊武斯裁仗節撫藩邊夷識德化沾殊俗襁負懐仁謹案謚法布德行剛曰景宜謚為景侍中侯剛給事黄門侍郎元纂等駁曰臣聞唯名與器弗可妄假定謚准行必當其迹案祉志性急酷所在過戚布德罕聞暴聲屢發而禮官虚述謚之為景非直失於一人實毁朝則請還付外准行更量虚實靈太后令曰依駁更議元端臺龍上言竊唯謚者行之迹狀者迹之稱然尚書銓衡是司釐品庶物若狀與迹乖應抑而不受錄其實狀然後下寺謚法准狀科正豈有舍其行迹外有所求去狀去稱将何所准簡祉以母老辭藩乃䧏手詔云卿綏撫有年聲實兼著安邉寧境實稱朝望及其殁也又加顯贈言祉誠著累朝効彰内外詔册褒美無替倫望然君子使人器之義無求備德有數德優劣不同剛而能克亦為德焉謹依謚法布德行剛曰景謂前議為允司徒右長史𢎞烈主簿李瑒勑稱按祉厯官累朝當官允稱委捍西南邉隅靖遏准行易名奨戒攸在竊謂無虧體例尚書詔又述奏以府寺為允太后可其奏馬熙文明太后之兄也為内都大官太師薨於代有司奏謚詔曰可以威彊恢遠曰武奉謚於公柩後周趙善為左僕射西魏文帝大統九年從戰芒山屬大軍不利善為敵所獲卒於東魏建德初周齊通好齊人乃歸其柩其子表請贈謚詔謚曰敬隋揚雄封觀德王及薨有司考行請謚曰懿帝曰王道髙雅俗德冠生民乃賜謚曰德劉炫炫太學博士以品卑去任歸於河間時盗賊蜂起榖食踊貴教授不行因凍餒而死時年六十八其後門人謚曰宣德先生唐陳叔逹貞觀初為尚書坐閨庭不理歸第及卒太常議謚曰繆後贈戸部尚書改謚曰忠皇甫無逸貞觀中為益州刺史其母疾篤太宗令驛召之無逸性至孝承問惶懼不能飲食因道病而卒贈禮部尚書太常考行謚曰孝禮部尚書王珪駁之曰無逸入蜀之初自當扶持老母與之同去申其色養而乃留在京師子道未足何得為孝謚為良虞世南卒贈禮部尚書貞觀十二年十一月勑曰虞世南學綜古今行篤終始至孝忠直事多𢎞益易名之典抑有舊章前雖謚懿未盡其美可謚曰文懿蕭瑀卒贈司空太常初謚曰德尚書省謚曰肅太宗以易名之典必考其行蕭瑀性多猜貳有失其真更據實謚曰貞􅄶公封德彜卒贈司空太常初謚曰明後治書侍御史唐臨追駁曰包藏之狀死而後發猥加贈謚未正嚴科太宗令百官詳議民部尚書唐儉等議曰罪暴身後恩結生前所厯之官不可追奪請除贈改謚詔從之乃謚曰繆宇文士及卒贈左衞大将軍初謚為恭黄門侍郎劉洎駁之曰士及居家侈縱不宜為恭竟議謚為縱許敬宗為侍中髙陽郡公卒太常定謚博士袁思古議曰敬宗位以才升厯居清級棄長子於荒徼嫁少女如夷落聞詩學禮事絶於趨庭納采問名唯聞於黷貨白圭斯玷有累清虚易名之典須憑實行按謚法名與實爽曰繆請謚為繆敬宗孫太子舍人彦伯訟稱思古與許氏先有嫌怨請改謚博士黄福畤議曰謚者飾終之稱也得失一朝榮辱千載若使嫌隙是實即合據法推繩如其不然未虧直道義不可奪官不可侵二三其德何以言禮請依思古議為定戸部尚書戴至德謂福畤曰髙陽公任遇如此何以定謚為繆答曰昔晉司空何曽既忠直且孝徒以日食萬錢所以貶為繆醜况敬宗忠孝不逮於何曽飲食男女之累有逾於何曽而定謚為繆無負於許氏矣詔令尚書省集五品以上重議禮部尚書楊思敬議稱按謚法既過能改曰恭請謚曰恭韋巨源卒贈特進荆州大都督太常博士李處直議謚曰昭户部員外郎李邕駁之曰三思引之為相阿韋託之為親無功而封無德而祿同族則醜正安石他人則附邪楚客謚之曰昭良恐不當初巨源與安石迭為宰相時人以為情不相叶故邕以此稱之處直仍因請依前謚為定邕又貶曰夫古之議謚在乎勸沮将杜小人之業冀長君子之風故善者雖在不貴仕而没有餘名此賢逹所以守節也為惡者雖生有所幸死懷所懲此回邪所以易心也嗚呼巨源嘗未斯察而乃聞義不從與惡相濟蓄罔上之志叶羣凶之謀苟容聖朝貪昧厚禄自以宰臣之貴不崇朝而賈害者固鬼得而誅之也彼則匹夫之微未受命而行刑者固人得而誅之也幽明之慎斷焉可知天地之心自此而見矣頃者皇運中興功臣翼政時序未幾邪逆執權姦慝者拜爵於私門忠正者降黜於藩郡巨源此際用事方殷於阿韋何親而結為昆季於國家何力而累忝大官此則關通中人附㑹武氏託城社之固亂皇家之基其罪一也又國之大事在祀與戎酌於禮經陳於郊野将以對越天地光揚祖宗既告成功以觀海内推昔亞獻不聞婦人阿韋蓄無君之誠懐自逹之意潜圖帝位議啄皇孫昇壇擬儀拜賜明命将豫家事無守國章巨源創跡於前悖演成功於後時有禮部侍郎徐堅太常博士唐紹蒋欽緒彭景直竝言之莫從其罪二也又上天不弔先帝遇毒悔禍無欽阿韋将簒畫計未果逆心尚揺周章夷猶倉卒迷繆於是太平公主矯為陳謀上官昭容給草遺詔故得今上輔政阿韋叅謀大業垂成而休命中輟者職繇巨源躡韋温之足楚客附巨源之耳梟聲遽發狼顧相驚以阿韋臨朝以韋溫當國其罪三也又人為邦本財實聚人奪其財則人心自離無其人則國本何恃巨源屢踐台輔專行勾徴廢越條章崇尚侵刻樹怨天下剝害生靈兆庶流離戸口減耗况以三思食邑往在貝州時屬九陰災逄多雨租庸捐免甲令昭明匪今獨然自古不易三思慮其封物巨源啟此異端以為稼穡湮沉雖無菽粟蠶桑織絍可輔庸調致使河朔黎人海内士女去其鄉井鬻其子孫饑寒切身朝夕奔命其罪四也但巨源長於華宗仕於累代作萬國之相處具瞻之秋蔽日月之層輝負丘山之重責今乃妄加褒述安能分謗者哉當時雖不從邕議論者是之程行諶卒贈尚書左丞相謚曰貞與岐王府長史裴子餘謚曰孝同時列上中書令張訟省之曰程裴二謚可謂議之無愧者宋慶禮卒贈工部尚書太常博士張星定謚曰慶禮太剛則折至察無徒有事東北所亡萬計所謂害於家凶於國按謚法好功自是曰專請謚為専禮部員外郎張九齡駁之曰營州鎮彼戎夷扼喉斷臂逆則制其死命順則為其主人是稱樂都其來尚矣尋罷海運充廣嵗儲邊亭晏然河朔無擾與夫興師之費轉輸之勞較其優劣孰為利害而云所亡萬計一何繆哉安有踐其迹以制實貶其謚以詢虚乗慮始之謗聲忘經遠之權利義非得所孰謂其當請以所議更下太常庶表行之迹可尋而易名之典不墜也星復執前議慶禮兄子辭上稱寃乃謚曰敬張説為尚書左丞燕國公卒太常初謚為文貞左司郎中楊伯成駁曰謚者德之表行之迹将以激厲風俗簡束名教固無虚譽是存實錄准張説罷相制云不肅細微之人頗乖周慎之㫖又致仕制云行虧半古防闕周身未免𤓰李之嫌而喧衆多之口且玉之有瑕尚可磨也人之斯玷焉可追也謚曰文貞何成勸沮請下太常更據行事定謚工部侍郎張九齡又議請依太常為定衆論未决上為制碑文賜謚曰文貞由是始定裴光庭為侍中卒贈太師太常博士孫琬将議光庭謚以其用循資格非奨勸之道建議謚為克時人以為希蕭蒿意㫖帝聞而特下詔賜謚曰忠獻仍令中書令張九齡為其碑文史官韋述以改謚為非論曰春秋之義諸侯死王事葬之加一等盖加其有功也而不及其賞也爰至漢魏則禭之即受寵被窀穸唯德是褒豈虚受也近代以來寵贈無紀或以職位崇顯一切優錫或以子孫榮貴恩例無加賢愚虚實為一貫矣裴光庭以守法之吏驟登相位踐我機衡豈不多愧贈以師範何其濫歟張燕公有扶翊之勲居講諷之舊秩躋九命官厯二端議者猶謂贈之過當况光庭去斯猶遠何妄竊之甚哉盖名器假人昔賢之所惋也杜暹卒贈尚書左丞相初謚貞肅右司員外郎劉同昇都官員外郎韋康㢘駁曰暹有忠孝之美太常所謚不盡其行博士裴總執曰杜尚書往以墨縗受職事雖奉國不得為孝請依舊為定暹子孝友詣闕陳訴上聞而更令所司詳定竟謚曰貞肅盧奕為安禄山所害贈兵部尚書太常博士獨孤及議曰盧奕剛毅朴忠直方而清勵精吏事所居可紀天寶十四載雒陽陷没於時東京人事狼狽鹿駭猛虎磨牙而争其肉居位者皆欲保性命而全妻子或競先䇿蹇争脱羿彀或不恥茍活甘飲盗泉奕獨正身守位仗義不去以死全節誓不辱身勢窮力屈以朝服就死猶慷慨數賊梟獍之罪觀者伏慄奕不變其色西面辭君而後受害雖古烈士方之者鮮矣或曰雒陽之存操兵者實任其咎非執法吏所能抗師敗将奔去之可也委身冦讐以死誰懟奕以為不然勇者禦而忠者守必社稷是衞則死生以之危而去之是智免也忠於何有荀息殺身於晉不食其言也仲由結纓於衛不避其難也𤣥㝠勤其官而水死守位而㤀軀也伯姬待姆而火死先禮而後身也彼四人者死之日皆於事無補夫豈愛死而賈禍也以為死輕於義而捐生古史書之使事君者勸然則安禄山亂大於里丕奕㢘察之任切於𤣥冥之官分官所繫不啻於保姆逆黨兵威烈於水火於斯時也與能執干戈者同其戮力挽之不來推之不去豈不以師可虧免不可茍身可殺節不可奪故全其特操於白刃之下孰與夫懐安偷生者同其風義謹按謚法圖國忘死曰貞秉德遵業曰烈奕執憲戎馬之間志藩王室可謂圖國國危不能拯而繼之以死可謂忘死厯官十一任言必正事必果而清節不撓去之若始至可謂秉德先黄門以直道佐時奕嗣之忠純可謂遵業請謚曰貞烈從之韋陟為左僕射卒太常博士程皓議謚為忠孝刑部尚書顔真卿以為忠則以身許國見危致命孝則晨昏色養取樂庭闈不合二行殊髙以成忠孝主客員外郎歸崇敬又駁之紛議不已右僕射郭英乂不逹其體請從太常之狀吳兢為常王傅天寶八載卒於家寶應二年三月洪吉等州觀察使洪州刺史張鎬奏曰故常王傅吳兢先朝史臣厯踐中外大行忠信彰於朝野伏以訓誡明㫖謚法攸遵臣早嵗服膺備知名實相副特乞聖恩褒其嘉謚從之苗晉卿卒贈太師初謚為懿獻及勑出改曰文懿太常議謚曰懿獻初晉卿東都留守引用大理評事元載為推官至是載為中書侍郎平章事懷舊㤙諷有司改謚曰文貞郭知運為隴右節度使卒贈凉州都督子英乂等劒南節度議謚曰威右司員外郎崔厚駁之曰郭知運承恩詔葬向五十餘年今請易名竊謂非禮又按禮經云禮時為大又曰過時不及為禮也昔衞公叔文子卒将𦵏其子戍請謚於君曰日月有時将𦵏矣請所以易其名者盖時不可踰也今知運既名不浮行數紀之前門生故吏已合請謚今乃申請竊将有為而為其子英乂頃屬多故屢制方隅朝廷䇿勲崇位端揆附從者竊不中之禮㑹無妄之求况今裂土者接軫專征者百輩若率而行之誰曰無請不唯有司疲於簡牘抑恐名器等於草芥雖欲曲全竊将不可又禮經云已孤暴貴不為父作謚若知運合謚而不以其時則嗣子廢先君之德若不合謚而苟遂其志則先君因嗣子而見尊以僕射而言既詒越禮之誚以國家而言又殊旌善之體請下太常寺重議博士獨孤及議曰禮時為大順次之将葬易名時也有故闕禮追遠請謚順也公叔戍請謚適當𦵏前謹按三百經禮三千威儀曽不言已𦵏則不追謚况帝王殊途不相沿襲新禮則死必有謚不云日月有時今請易名者五家無非𦵏後苗太師一年矣呂禋四年矣盧奕五年矣顔杲卿八年矣竝荷褒寵無異同之論獨知運不幸遂以過時見抑苟必以巳𦵏未𦵏為節則八年與五年其緩一也而與奪殊制無乃不可乎議云已孤暴貴不為父作謚此謂其父無爵而子居貴位不當以己之貴加榮於父若知運方面重寄列位九卿茂勲崇名與衞霍侔飾終之禮宜加於他将一等豈待因嗣子然後作謚今之專征者率多起屠販皂𨽻之中雖逢風雲化為王侯而其間祖父爵位與知運等當請謚者有幾何乃懼名器等於草芥以是廢禮竊為近誣考彼載籍徴諸舊史易名之禮請如前議呂禋為江陵尹卒贈吏部尚書太常議謚曰恭度支員外郎嚴郢駁曰今太常議荆南之政詳矣而曰在台司齪齪無匪躬之能者乃搜瑕掩德非中道之言也國家故事宰臣之謚皆有二字以彰善旌德焉夫呂公文能禁異貞則幹事身則利人威烈懿規不可備舉傳叙八元之德曰忠肅恭懿若以美謚擬於形容博士獨孤及議曰秦苻必加謚二字具以忠配肅謹按舊議凡没者之故吏得以行狀請謚於尚書省而考行定謚則有司存朝廷辨可否宜在衆議今駁議撰謚異同之説竝故吏專之伏恐亂庖人尸祝之分違公器不私之誡且非唐虞師人僉曰之道謚法在懲惡勸善不在字多必稱其大而畧其細故言文不言武言武不言文三代以下朴散禮壞乃有二字之謚非古也其源生於衰周漢蕭何張良霍去病霍光俱以文武大略佐漢致太平其業不一謂一名不足以紀其善於是有文終文成景桓宣成之謚雖黷禮棼天然猶褒不失人唐興叅用周秦之制以魏徴為文貞蕭瑀為貞褊其杜如晦封德彛陳叔逹溫彦博岑文本唐休璟魏知古崔日用竝當時赫赫以功名居宰相者謚之不過一字不聞子孫佐吏有以字少稱屈者此言二字不必為褒一字不必為貶若褒貶果存乎數字則是堯舜禹湯文武成康不如周威烈慎靚也齊宣晉文不如趙武靈魏安釐也杜如晦王珪已下或成或明或懿或憲不如蕭瑀之貞褊也然肅者盛德克就之名足以表之矣以禋之從政威能閑邪德可濟衆故以肅易名而忠在其中矣亦猶隨㑹寗俞之不稱文豈必因重之然後為美魏晉以賈詡之籌筭賈逵之忠壯張既之政能程普之勇智顧雍之密重王渾之器量劉惔之鑒裁庾翼之志畧彼八君子者方之東平宜無慚德身死之日竝謚曰肅當代不以為貶何嘗徴一字二字為之升降乎上稽前典下據甲令叅之禮經而究其行事請依前謚曰肅楊綰卒贈司徒太常謚為文貞比部郎中蘇端駁曰古者美惡無私褒貶必當将以嘉善而退惡為列辟之明典也可不慎歟今謹詳前謚文貞者稽法考來恐非光允時論發揚來訓矣夫道德博聞曰文清白守節曰貞且元載與司徒友敬殊深推為長者首舉清要人莫與京及司徒寵望漸髙載畏其逼又知載隳壞紀綱心貳於君既懼其疑因而踈簡有口皆知載惡而獨曽無一言或有發載之惡證告未明抱誠坐法者司徒時居上列奏逹非難不能因此披衷正詞全志士之命露兇狡之私而乃宴安自泰優游過日使元載禍大滅身竟勞聖上防伺之慮豈守節不隠耶豈懐道無毒耶非謂文貞明矣洎元載将謀不忠罔聰蔽聖嗇恩於下招怨於上使北塞人勞有過時之戍西郊兵入無弔災之惠磁邢堅義之士将死復生梁宋傷夷之人或寒或餒搜訪旌恤中外所急載皆絶之王澤不及於下為行路所嗟而楊公當聖上維新之時居天下得賢之望誠宜不俟終日造次速言乃寂寥啟悟禁閉謨猷貪食萬錢之賜虚承一心之顧使防河之人家聞采緑之歎近甸諸邑多興祈父之憂豈慈惠愛人乎既曰不慈不惠何以謂之文有隠有毒何以謂之貞矣古者諸侯有國卿大夫有家上以報祖宗下以處子孫之義也楊公厯處厚俸人謂儒宗曽不立家又無私廟寧使人世間敬祖之禮位極亡祭禰之宮凡在衣冠誰不歎恨又乖大義克就愍仁接禮之義矣曰文與貞曷可以議聖人立謚有公無私所以周宣不敢私於父謚曰厲漢宣不敢私於祖謚曰戾百王明制厯聖通則昔公叔之子有死衞之節修班制之勤社稷不辱方居此謚爰及太宗初魏徴有規救公直之忠中宗末蘇瓌有保安不奪之節所以諸賢甚衆謚文貞者不過數公至於燕公張説先朝輸能名節昭著省司尚謂不可至今人故稱之由是言之焉可比德請牒太常詳他謚以守彛章庶乎青史之筆不乖於周漢黄泉之魂免慙於蘇魏詔曰褒德勸善春秋之舊章考行易名禮經之通典垂範作則存乎格言故朝議大夫中書侍郎同中書門下平章事集賢殿崇文館太學博士修國史上柱國賜紫金魚袋贈司徒楊綰履道居貞含和毓德行為人紀文合典謨清而晦名無自伐之善約以師儉有不矜之謙方册直書秩宗相禮辟稱良史學茂醇儒委任樞衡掌兹密命彌契沃心之道累陳造膝之誠将以布天下五行之和同君臣一德之運遽軫藏舟之歎未展濟川之材素業久而逾彰清風没而可尚自古飾終之義皆賜以美名謚法曰忠信愛人曰文平易不懈曰簡宜謚曰文簡以其簡儉之風厚於俗也張伯儀為荆南節度使李希烈叛詔伯儀收安州官軍失利後除右龍武綂軍及卒伯儀故吏請謚於有司博士李吉甫論之曰或以伯儀嘗以推轂之任挫師安州於謚法得無貶乎愚以為不然自中興三十年而來兵未戰者患在将帥以養冦自重縱敵藩身若進而亡師貶以為義誡總干戈者必托於萬全之名而忘一戰之効矣然則保其利者亦君子所嫌也錄其忠而勸善者非陽秋之志歟矧平居進退之節不敢二色稱為忠臣議名之際褒勸所在請謚曰恭以旌厥美叚秀實為朱泚所害贈太尉興元初加褒贈謚曰忠烈初泚盗據宮闕也泚以秀實嘗為涇源節度頗得士心後罷兵權以為蓄憤且久必肯同惡乃召與謀秀實初詐從之陰説大将劉海賔何明禮姚令言判官岐靈岳同謀殺泚以兵迎乗輿三人者皆秀實夙所奨遇遂皆許諾泚時遣其将韓旻為馬步三千疾趨奉天時倉皇之中未有武備秀實以為宗社之危期於頃刻乃使人走諭靈岳教其竊令言印不遂乃以司農印倒印符以追兵還至雒驛得牒莫辨其印惶遽而廻秀實謂海賔等曰旻之來吾黨無類矣我當直搏殺泚不得則死終不能向此賊稱臣乃與海賔約事急繼而令明禮應於外明日泚召秀實議事原休姚令言李子平皆在坐秀實戎服與休竝膝語至僭位秀實勃然而起執休腕奪其象笏奮躍而前唾泚面大罵曰狂賊吾恨不斬汝萬叚我豈逐汝反耶遂擊之泚舉臂自捍纔中其顙流血匍匐而走兇徒愕然初不敢動而海賔不至秀實乃曰我不同汝反何不殺我兇黨羣至遂遇害焉至是加褒贈馬燧為司徒卒太常奏燧謚景武上改為莊武以避太祖謚王武俊為成德軍節度使貞元十七年薨太常謚曰威烈德宗曰武俊盡忠奉國賜謚忠烈張柬之為相誅張昌宗轉立中宗為武三思所害元和三年柬之曽孫曛以謚事詣中書陳訴宰相上聞因令有司授曛官仍定柬之等謚柬之為文正彦範為忠烈敬暉為貞烈崔𤣥暐為文忠袁恕已為貞烈册府元龜卷五百九十五
