body:
  text: 冊府元龜卷九十六宋王欽若等撰帝王部赦宥第十五周太祖廣順元年正月丁卯即位制曰自古受命之君興邦建統莫不上符天意下順人心是以夏徳既衰爰啓有商之祚炎風不競肇開皇魏之基朕早事前朝乆居重位受遺輔政敢忘伊霍之忠杖鉞臨戎復委韓彭之任匪躬盡瘁焦思勞心討叛渙于河潼張聲援于岐雍竟平大憝粗立微勞纔旋斾于關西尋統兵於河北訓齊師旅固䕶邊陲只将身許國家不以賊遺君父外憂少息内患俄生羣小連謀大臣遇害棟樑既壞社稷将傾朕方在藩維亦遭讒搆逃一生於萬死徑赴闕庭梟四罪於九衢幸安區宇将延漢祚擇立劉宗徴命已行軍情忽變朕以衆庶所廹逃避無繇扶擁至京尊戴為主重以中外勸進方嶽推崇黽勉雖順于羣心臨御實慙于凉徳改元建號祗率于舊章革故鼎新宜覃于霈澤朕本姬室之遠裔虢叔之後昆積慶累功格天光表盛徳既延於百世大命復集於𦕈躬今建國宜以大周為號改乾祐四年為廣順元年自正月五日昧爽以前應天下見禁人等罪無輕重已發覺未發覺已結正未結正常赦所不原者咸赦除之故漢樞密使楊邠侍衞都指揮使史宏肇三司使王章等以勞定國盡節致君千載逢時一旦同命悲感行路憤結重泉雖尋雪于沉寃宜更申於渥澤並可加等追贈備禮歸𦵏喪事官給仍訪子孫叙用其餘同遭枉害者亦以追贈馬歩都軍将士等戮力協誠輸忠効義先則平持内難後乃推戴朕躬言念勲勞所宜旌賞其員寮将士等各與等第超加恩命仍賜功臣名號已有功臣名號者别與改賜應左降官量加叙録亡官失爵之人宜與齒用配流徒役人並許放還已歿者任從歸𦵏所有杜仲威李守貞王景崇趙思綰賔幕元随親戚及諸色人先因懼罪至今逃匿者並可放還任自取便昨者犯罪人蘇逢吉劉銖閻晉卿李業侯贊聶文進郭允明及同時犯罪人等家族骨肉先已釋罪疎放其逐人所有親戚及門客元随職掌在諸處者切慮尚抱憂疑今並釋放所在不得更有恐動内有手下先管荘田錢榖人等已下三司點檢磨勘了日一任逐便諸處有犯罪逃亡之人及山林草冦等咸許自新一切不問各還鄉里自務營生仍仰所在切加安䘏所繇節級不得𠂻私妄有恐動如赦到後一月不歸本業者復罪如初内外文武臣寮致仕官諸軍将校随使職員及前任藩侯郡守文武朝列前内諸司使副使前禁軍指揮使前資行軍副使等各與等第加恩應見任文武臣寮内諸司使諸道行軍副使藩方馬歩軍都指揮使如父母在未有恩澤者即與恩澤如亡殁未曽追封贈者亦與封贈已封贈者更與封贈晉漢以來兵革屢動賦役煩併黎庶瘡痍鰥寡孤惸不能自濟為人父母爭不閔傷應天下州縣所欠乾祐元年二月已前夏秋殘税及𣲖徴物色并三年夏税諸色殘欠並與除放所有澶州已來大軍經過之時沿路人户恐有蹂踐兩邊共二十里并乾祐三年殘欠秋税並放應河北沿邊州縣自去年九月後來曽經契丹蹂踐處其人户應欠乾祐三年終已前積年殘欠諸色税物並與除放仍委逐處長吏倍加存撫至於防守邊塞優䘏疲羸利害之事各宜條奏自前或有拒扞契丹顯立功勞及将吏之中有歿于王事者具名以聞當議酬奨應係三司主持錢榖敗闕塲院官取乾祐元年終以前徴納外累經較科灼然無抵當者委三司分析聞奏别候指揮秋夏徴科舊有規制如聞諸道州府别立近限催驅或逼䠞過深轉致供輸不易至使蠶欲老而求絲債禾未熟而取榖錢但無逋懸何須急暴應天下百姓納税租並取省限内納畢不在促限徴督如是軍期急速即不拘此例訪聞諸處人户逃移在外者自前省司雖累行招携多未歸復兼知逃户税賦攤配居人公私之間未甚允當念其疾苦常軫于懷宜令所司商量别行條貫庶使逃移者即歸鄉土見居者漸遂舒蘇免困生靈以付勤恤藩侯郡守寄任非輕立政之先養民為本每及徴賦尤要狥公其逐處倉塲庫務宜令節度使刺史專切鈐轄掌納官吏一依省條指揮不得别納斗餘秤耗舊來所進羡餘物色今後一切停罷朕早在藩鎮常戒奢華今御寰區尤思節儉况國家多事帑藏甚虛将緩憂勞所宜省約應乗輿服御之物不得過為華餙宫闈器用並從朴素太官常膳一切减損諸道所有進奉比助軍國支費其珍巧纎華及竒禽異獸鷹犬之類不得輒有貢獻諸無用之物不急之務並宜停罷帝王之道徳化為先崇餙虛名朕所不取苟致治之未洽雖多端以奚為今後諸道所有祥瑞不得輒有奏獻古者用刑本期止辟今兹作法義切禁非葢承弊之時非猛則姦兇難制及知勸之後在寛則典憲得宜相時而行庶臻中道今後應犯盗贓及和姦者並依晉天福元年已前條制施行應諸處犯罪人等除反逆罪外其餘罪並不得籍沒家産及骨肉一依格令處分天下諸侯皆有親校自可慎擇委任當必克勤參禆朝廷選差理或未當宜矯前失庶協通規其先于在京諸司差軍将充諸州郡元從都押牙孔目官内知客等並可停廢仍勒却還舊處職役設官分職具列司存離局侵權誠為紊撓今後諸司公事並湏各歸局分不得越次施行朝廷之務顯有舊章職官具存安可廢墜如聞自前諸司公事多有壅滯今後並可速疾舉國行之大事在祀為先苟爽吉蠲深為凟慢如聞自前祠祭牢饌頗虧肅敬今後委監察御史嚴加覺察必須豐潔庶逹精誠稍或不恭國有常典近代帝王所在陵寝合禁樵採俾奉神靈唐荘宗晉髙祖各置守陵十户以近陵人户充漢髙祖皇帝陵置職員及守陵宫人時月薦饗并守陵人户等一切如故仍以晉漢之裔為三王後委中書門下處分自古聖帝明王莫不好賢納諫是以立誹謗之木采蒭蕘之言時之利病罔不知政之得失無不察逹聰明目其在兹乎應内外文武臣僚有見識灼然益於治道者許非時上章聞逹山林草澤之間懷才抱器之士切在搜訪免致遺賢孝子順孫義夫節婦所宜旌表以勵時風於戲致理保邦非徳教無以安萬國發號施令非誠信無以示四方其或言出行違朝行暮改是為秕政何以子民更頼棟樑羽翼之臣左右前後之士共扶寡昧同致雍熈思致器以永安覩覆車之可戒納隍馭朽予豈忘諸釐革有所未盡者有司具啓請以聞二年五月親征兖州癸亥次曹州行宫在州禁繫罪犯人除死罪外並釋放是月兖州平壬午制曰在昔哲王承天育物莫不内修庶政外撫諸侯推誠以待人人皆自信虛己以馭下下無弗從是以車書大同革兵不試動植遂和平之性蒸黎絶愁嘆之聲朕以𦕈躬猥承大統側微自効常從軍旅之中億兆所推獲託王公之上渉道斯淺於徳未章致其毒螫之兇為我生靈之患逆賊慕容彦超輿臺賤類闒茸微人歴郡牧而至藩侯扇貪風而彰惡迹洎予臨馭無間綏懷而乃顛越不恭姦邪是恣北則結連戎虜南則臣事淮夷每與劉崇潛通人使剖割萬姓傷殘乃杼軸其空盗横一州嚴酷如爐炭之上招呼亡命剽刼隣封繕甲治兵深溝髙壘既顯悖違之状須興討伐之師朕昨暫御戎車來廵軍寨覩貔貅之賈勇憤蛇豕以為妖咸請先登不容假息士怒未洩逆壘俄平盗泉已涸其源流惡草盡除其滋蔓班師振旅六軍方樂於凱旋盪穢滌瑕一境宜覃於霈澤可赦兖州管内取五月二十七日見禁罪人及未發覺者大辟以下並赦除元兇流毒同黨濟姦國有常刑皆合顯戮特示好生之道猥寛連坐之誅應曽與慕容彦超同惡之人逃避潛藏者並與釋放仰於所在自出陳首百日不首者獲罪如初應已伏誅逆黨人等於諸處有骨肉者先已指揮放罪招安尚慮本身抵法之後却有驚疑宜令所在州縣明行告諭並釋放不問兖州城内幕職及州縣官吏軍府将校今並放罪其衙前州使兩院職役人本城軍都並敕仍舊自慕容彦超違背已來鄉州山寨豪强人等接便為非刼掠擄殺今因收復並與洗滌一切不問外諸軍将士等勇於為主奮不顧身所有沒於王事者各等第給孝絹仍以本人半分衣糧與本家一年有親子者官中並與收録安排自軍使都頭以上皆與贈官職賊據一城民殘四境或撤毁其墻屋或蹂躪其田疇槩于徴取供軍㸃集應役並宜矜䘏俾漸蘇舒應兖州城内所有徴取今年屋税及蠶食鹽鐵諸雜税物並與除放城外官軍下寨處四面去州城五里内所毁今年夏税苗子蠶食鹽鐵並諸雜沿徴錢物並與除放五里外十里内除放今年夏苗子三分中減放一分并兖州城内百姓被慕容彦超閉門已來無辜殺害者宜令本州存恤其家其被殺官員宜令本州官具録奏聞當行恩澤所有被毁拆却舎屋極多及收城之時延火燒􅅡官中給賜材木重令葢造攻取城池湏資力役既臨矢石或致喪亡致人殁身在朕深念諸州差别人夫内有遭矢石身死者宜令逐州縣分析姓名聞奏官中各給絹三疋以省庫物充仍放下三年諸雜差遣勒本縣給與文帖其部領人夫州縣官等到城下施功者據勞役日月等第加減選莱蕪監所抽㸃到諸縣義軍已各指揮放散今後更不得管係名額其權充都将節級者亦不得此後於鄉村内更有稱呼於戲夏為長嬴勞軍民以從役聖職教化用干戈而剪兇惟予不明増愧于是尚頼穹旻之祐漸期寰海之安告爾魯人咸體兹意顯徳元年正月丙子親祀圜丘禮畢御樓肆赦曰王者祀天地饗祖宗著於前經謂之大事嚴上者伸尊於下奉先者教孝於民簠簋豆籩陳其備物犧牲玉帛薦以至誠聿遵嚴配之文式展昭事之懇朕仰膺睠命下副樂推有兢兢業業之心無赫赫明明之徳錫珪膺瑞莫繼禹功祝網為仁但欽湯政接近朝䘮亂之後當羣黎凋弊之餘不敏不明何以為治而寒暑三徃車書漸同征人少駐于邊防戰馬多閒于坰牧汚萊加闢杼軸靡空縱大化之未敷亦小康之遽致得非藝祖烈考垂其佑皇天后土被其恩鍾在𦕈躬躋此嘉㑹俾創業垂統傳之無疆治國安民引於有慶将恐将懼雖休勿休祗荷景靈是用大報恭以都邑所在宗廟為先開創已來因仍其舊未伸移奉之禮重増怵􅅥之懷爰自雒陽卜遷浚下今四序資始三元履端陳水陸之毛載見清廟薦陶匏之質對越𤣥穹所謂禮行于郊而百神受職也凡爾衆庶同我䖍恭申其肇禋既謹就陽之禮施於純嘏宜覃及物之恩改號紀年維新行慶可大赦天下改廣順四年為顯徳元年自正月一日昧爽已前應犯罪人已結正未結正已發覺未發覺罪無輕重常赦所不原者咸赦除之其殺人者放罪移置他處貶降官與量移已量移者與復資已復資者與叙用諸配流人並任逐便如刺面配軍收管者不在此例流貶死者許歸𦵏草賊避法隱藏者所有廵檢人諭以恩赦招呼令歸農養如願在軍亦聽其内外馬歩都軍将士各等第優賞應見任内外文武職員諸軍将校致仕官節度防禦團練使刺史前任文武升朝官前内諸司使副使前諸州行軍列使前指揮使諸道進奉專人前資官赴郊廟陪位者並與加恩内外命婦並與進封因夫子叙封者不得過夫子本品其諸寺監攝官如滿七周年以上應奉公事無遺闕文書灼然者並與同明經出身如不滿七周年者任逐便穩今後寺監不得以白身署攝如違本司官吏並當勘罪諸州府廣順二年已前逋欠税沿徴錢並放其二年終已前主持省錢及主倉庫敗闕者據納家業外無抵當者並釋放自開創已來諸軍将校死王事者軍使都頭已上並與追贈已追贈者更追贈有親嫡子孫量才叙用者諸軍将士年老病患不任征行情愿歸農者本軍具以名聞給憑繇放免應見任文武升朝官内諸司使副節度留後防禦團練副使禁軍都指揮使已上藩方馬歩軍都指揮使等父母亡歿未經追贈者並與追贈已追贈者更追贈自廣順元年後來幽州淮南西川河東等界軍人百姓投降者累令安撫所在有無主荒閒田土一任請射住佃為永業西川接界乆不通商今後一任來往只須所屬官吏防閑恐夾帶姦細應祗奉郊廟職掌人員並與恩澤其行事官已勘無違碍者候銓司移省後各與除官合來年集者候将來授任仍並加一階欠三選至五選者減一選欠選以上減兩選幕職並與減一年如欠月限不及一年者便與除官仍轉官資其諸色人駁放皆依格勑其間小小違碍可以情恕者並條奏以聞起今後升朝官兩任以上著録十五周年者與賜緋著緋十五周年者與賜紫凡縣官歴任内曽經五度參選者雖未及六考與授朝散大夫階年七十以上令授優散官者並賜緋其非時特恩不拘此例梁室受命奄有中原當歴數之有歸亦神器之所在潞王踐阼承紹唐基累年司牧於生靈諸夏奉承於正朔荘宗克復以朱氏為偽朝晉祖統臨以清泰為偽號所宜追正庶協通規今後不得名梁朝為偽朝潞王為偽主前代帝王陵廟及名臣墳墓無後者所在官吏檢校勿令樵採耕犂天下年髙殘疾鰥寡孤獨所屬官吏務行存恤孝子順孫義夫節婦州縣以名聞者並與旌表門閭山林隱逸草澤才能所屬長吏搜訪具以名聞於戲安不忘危百王所以慎其徳上之化下一人姑務正厥躬予苟有違衆皆無隱方今庶吏和勸貪者少而亷者多兆民從風令既行而禁亦止司予刑者無忘哀矜又禮讓方興恩信兼布賦役咸遵于法制鄉閭已絶於侵漁家遂求安國當思理從予政者無忘和平凡左輔右弼盡其心五侯九伯宣其力君唱臣和同寅協恭不致昇平未之有也凡百有位暨于羣倫俱承福禧同體朕意節文有所未該者所司條奏以聞世宗以顯徳元年正月即位三月辛巳制曰凡神聖之功乃開基以創業惟帝皇之徳遂垂制而立文生成參天地之靈悠乆鍾子孫之福寕禹湯而獨美豈堯舜以無倫先皇帝出震安時膺乾啓運改相仍䘮亂之轍造勃興開泰之邦儉靜其身寛慈于物寒耕熱耨之苦常念三農宵衣旰食之勤不忘萬務恩霈庶彚義結羣心周室肇興安神器而方固軒臺遽往望仙駕以不廻肆予冲人獲紹丕構孤藐自視寡昧何知禀理命之丁寕副衆情之推奉中心憂塞罔有津涯易月之禮制尋終在天之感慕無巳負荷斯重恭黙以居宜從作觧之文以沛當陽之澤可大赦天下應三月七日昧爽以前所犯罪人已結正未結正已發覺未發覺常赦所不原者咸赦除之諸貶降責授官等量與升陟叙用應配流徒役人及縱逢恩赦不在放還并常知所在者並放逐便諸處有草冦團集仰所在州府及廵檢使臣曉諭恩赦招喚各令歸農兩京及諸道州府人户所欠去年秋夏税租及沿徴物帛並與除放其鄉村逃移人户並仰招喚歸業内外見在文武職官致仕官及諸軍将校並與加恩其前任京官幕職州縣官至今授官日施行諸将軍校自開剏以來有沒于戰陣及身死疆塲者並與追贈如有親嫡子孫未曽録用者並與録用文武外朝官及内諸司使副使禁軍都指揮使以上諸道行軍副使藩方馬歩軍都指揮使父母在者並與恩澤亡歿者與封贈其妻未叙封者特與叙封應沿邊州府接近西川河南契丹河東界處仰所在州府及廵檢使臣鈐轄兵士及邊上人户不得侵擾外界及虜掠人畜務要靜守疆塲勿令騷動其投來人户仍仰倍加安撫大行皇帝山陵有期准遺命不得勞擾百姓者宜令所司奉承先㫖無至隳違應縁山陵公事合使工人役夫並須先給錢物雇覔諸雜費用一切取官物供給不得差遣人户科配州縣文武班列親近臣寮愛國誠堅致君心切苟或聞朕躬之過失覩時政之否臧無借敷陳以輔寡昧苦口良藥逆耳忠言禆益至多翹竚惟切今後内外臣寮或有所見及有所禆益可具實封章表以聞或欲面對便仰閤門司畫時引見懷才抱器出衆超羣或養素于衡門或屈迹于末位孤寒難進志業何伸咸用搜羅待以爵秩諸隱遁不仕及卑官下位中有文武幹畧灼見可稱者所在具名以聞化理之本孝弟為先苟或虧違實亂名教其有士庶之内兇率之徒不順于父兄不恭于尊長狂悖難状訓誨莫從親族容隱而不言里巷畏避而不告傷風敗俗莫甚于兹今後或有不孝不義之人違戾尊長喧悖毁辱及父母在異財别居畧不供侍如此之輩不計官宦軍人百姓之家宜令御史臺及本軍本使所在州縣廂界彈舉覺察如或容縱不切檢舉罪有歸處其有孝子順孫義夫節婦宜所旌表以厚人倫恭惟先皇帝推誠損己焦思勞神念将士之忠勤知戰伐之辛苦餱糧禄賜無非經手經心土地官封不惜酧勲酧效生靈是念稼穡為憂罷非理之差徭去無名之侵耗不貪遊宴盡去奢華減後宫冗食之人停諸司不急之務方嶽止甘鮮之貢殿庭絶珠玉之珍獄訟無寃刑戮不濫凡關物務盡立規繩予小子纘紹丕基恭禀遺訓仰承法度不敢踰違更頼将相公卿左右前後共遵先㫖同守成規庶禆冲人不墜洪業赦書有所未該所司速具聞奏四月庚午制曰昨者劉崇縱肆毒螫勾引蕃戎困我生民深入澤潞朕所以泣辭神御親總甲兵抑荼蓼之哀懷殄豺狼之兇黨誠頼𤣥穹垂祐将士輸忠大剪冦讎尋清原野覽賊冦經繇之地深切憫傷當城池圍閉之時良資捍禦適因駐蹕宜示特恩應潞州諸縣取今月二十七日已前見禁罪人除死罪外並宜與釋放當州數縣昨經賊軍傷殘處人户所徴今年夏税斛㪷錢帛三分與放一分内有村坊元不遭賊冦殘傷者不在蠲放之限潞州昨經圍閉将校職員同力守禦兼以大駕駐蹕迎奉無闕應在城将校官吏職員宜令本州具名銜以聞各加恩澤昨殺戮賊軍之處及四面山谷間屍首絶多宜令逐處官吏差人收歛埋瘞勿令暴露逐處墳墓曽被賊軍發掘者指揮掩閉河東及契丹敗散兵士其中有潛竄山谷間者並令招喚不得輒有傷害如是義軍百姓便可放歸本家若是軍人及諸色人並監送至駕前各與穩便安排遼沁二州新屬潞州乆䧟賊境深可憫傷委本道節度使倍加安撫所有劉崇煩苛事件並與蠲放二年十一月癸丑鳳翔節度王章上言收下鳳州乙卯詔曰朕承宗社之靈居億兆之上祗臨大寶于兹再周每念晉漢以來朝野多故疆宇日削生聚未堪常懷拯救之心冀答天人之意至於夙夜不敢荒寕求安邊拓境之謀思濟世息民之計乃眷秦鳳地接巴卭頃屬亂離因兹阻隔千里之地大朝之聲教不通十年之中百姓之艱苦難状昨者興發師旅經畧封陲皷鼙絶震於郊原虵豕難逃於鋒刄僵尸徧野棄甲如山秦成階等州管内将校官吏軍人百姓等喜冦孽之逋逃舉城壘而歸順飛章送欵協力同謀父老相懽山河如故而偽署鳳州節度使王環等獨迷去就尚據城池朕念彼孤危繼令招諭惜一城之士庶開三面之網羅豈期拒轍之徒不體好生之徳遂令攻擊立見盪平渠帥就擒秦隴無梗宜降惟新之澤庶隆及物之恩應秦鳳階等州管内自顯徳二年十一月已前有罪犯者無問輕重一切釋放應馬歩行營将士等各與恩澤其有殁於王事者自付兵馬使已上並與贈官仍賜􅉠贈物城下攻殁百姓為矢石所害致死者本户除二税外放免三年差徭仍賜本家孝服絹三疋其倍署人夫州縣官並與加階減選秦成階等州歸明将士自長行以上等第支賜優給其官吏将校職員等並與加恩其中有西川人員除恩澤賞賜外如願駐留者厚與請受如願歸去者並給盤纒用慰衆情免違物性應收捉到賊軍将校一切放罪並令押送赴闕各與恩澤自何重建等歸投西川已來訪聞管内州縣連歲饑荒百姓軍人倍加勞役科歛頻併法令滋章既為吾民宜革前弊今後除秋夏兩税徴科外應偽蜀所立諸般科率名目及非理徭役一切停罷徳音未該者宜令所司相次指揮三年五月乙卯帝至自淮南是日詔免在京見禁罪人六月壬申降徳音曰王者經營四方式遏亂畧懷安逸而亡戰伐則雄圖莫震有雪霜而無雨露則歲功不成日者革輅親征靈旗問罪正陽之役呉師無匹馬之歸六合之征楚甲有齊山之積今長江以北半為我疆實頼将相協謀貔貅宣力破彼勍敵成兹茂勲宜敷曠蕩之恩用慰輕揚之俗澤已霑於動植寵豈忘於忠勤聲教惟新甄賞斯在可特赦淮南道諸州管内見禁罪人取顯徳三年六月十一日已前凡有違犯不問輕重並不窮問其江北諸州縣有未收復處宜令行營大将明申招諭儻能知幾變歸順朝廷其向來名位俱一切如故仍選明藩大郡厚加旌賞其軍都自長行以上並與優給其中有願歸江南者亦聽自便應随駕淮南行營諸軍等或破敵成功或攻城効力或收降州縣或䕶衛乗輿咸積忠勤宜加酧奨各與等第優給從駕職官及諸色人員等從征在外奉事有勞各與加恩以奨勤幹諸州夫役自來有沒於矢石者其本户放免三年差徭仍每人支賜贈孝絹三疋淮南道諸州縣先屬江南之時頗有非理科徭無名配率今後一功停罷事有不利於民無益於時者宜令長史條奏以聞四年正月己丑詔曰朕自守丕圖常勤庶政念萬方之至廣終日勞心恐一物之未蘇通宵不寐屬乾元資始春日載陽升紫殿以發徳音秉鎮圭而朝羣后順青帝發生之令體𤣥穹亭育之仁思與羣生同慶嘉運及物之澤罔間於幽遐作觧之恩宜均於雷雨應天下見禁罪人除犯大辟外一切釋放應諸色亡命之人官中自來追捕未獲者今並放罪諸道州府應欠顯徳三年終已前秋夏税物並與除放諸處敗闕塲院人員自來累行徴督尚有逋欠實無抵當者宜令三司具欠分析數目聞奏别候指揮内外文武職官自前曽有犯罪停免黜削人等宜令中書門下樞宻院具罪犯因繇聞奏别候進止應淮南界内百姓宜令行營将校告報諸軍不得俘虜傷害應有文學之吏武勇之人或幕府州縣官等臨事强明在任有所振舉為衆稱譽者宜令所在長吏具名聞奏在朝文武臣僚於知識人中有如此者亦可公舉並當擢用待之厚禄於戲帝王之於億兆也教之化之納於仁夀當五兵未戢舜干暫舞於兩階洎中夏小康湯網宜開於三面用示好生之徳竚遵且格之言凡被炤臨體予朕意三月庚戌以降下夀州制曰朕受天明命繼統中區寰瀛将保於大同征伐葢非於獲已一昨以夀春未㧞呉冦重來内外張皇烽火相接罔避蹔勞之役須興再駕之師歩騎長驅水陸齊進戈船砦柵一皷盪平劉仁贍以衆意憂危援兵覆沒遣子上表瀝血求哀矜彼含生許其納欵兵革之後黎庶未安念孤壘之初開觧疎羅而示徳宜覃在宥之澤俾安向化之心可赦夀州管内見禁罪人自今月二十一日昧爽已前凡有過犯無問輕重並從釋放應歸順官吏将校職員並與等第加恩夀州管界去城五十里内與放今年及明年秋夏租税自來百姓有曽受江南文字聚集山林者押逐處長吏使臣招喚歸家並不問罪如曽有傷害者今後不得更有相酧及經官論訴兼自用兵已來被擄刼骨肉者不計遠近並許本家識認官中給物收贖所在不得藏占曽經陣敵處所暴露骸骨仰差人收拾埋瘞自前後政令有不便於民者委本州條列聞奏當行釐革恭帝以顯徳六年六月甲午即位七月丙寅制赦天下冊府元龜卷九十六
