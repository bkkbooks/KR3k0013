body:
  text: 册府元龜卷六百十宋王欽若等撰刑法部定律令後漢和帝永元十五年初令郡國以日北至按薄刑而州郡好以苛察為政因此盛夏斷獄鄧太后臨朝以章帝詔斷獄皆在冬至前自後論者互多駁異故詔公卿以下㑹議司徒魯恭議奏曰夫陰陽之氣相扶而行發動用事各有時節若不當其時則物隨而傷王者雖質文不同而兹道無變四時之政行之若一月令周世所造而所據皆夏之時也其變者惟正朔服色犧牲徽號器械而已故曰殷因於夏禮周因於殷禮所損益可知也易曰潛龍勿用言十一月十二月陽氣潛藏未得用事雖喣嘘萬物養其根荄而猶盛陰在上地凍水氷陽氣否隔閉而成冬故曰履霜堅氷陰始凝也馴致其道至堅氷也言五月微陰始起至十一月堅氷至也夫王者之作因時為法孝章皇帝深惟古人之道助三正之微定律著令冀承天心順物性命以致時雍然從變改以來年嵗不熟榖價常貴人不安寧小吏不與國同心者率入十一月得死罪賊不問曲直便即格殺雖有疑罪不復讞正一夫吁嗟王道虧損况於衆乎易十二月君子以議獄緩死可令疑罪使詳其法大辟之科盡冬月乃斷其立春在十二月中勿以報囚如故事後卒施行安帝永初元年九月詔曰自今長吏被考竟未報考謂考問其狀也報謂斷决也自非父母喪無故輙去職者劇縣十嵗平縣五嵗以上乃得次用是時陳忠為尚書自以世典刑法用心務在寛詳初父寵在廷尉上除漢法溢於甫刑者未施行上音時掌切及寵免後遂寢而苛法稍繁人不堪之忠畧依寵意奏上二十三條為决事比比例也必寐切以省請讞之弊又上除蠶室刑解贓吏三世禁錮狂易殺人得减重論母子兄弟相代死聽赦所代者事皆施行元初二年十月詔吏人聚為盗賊有悔過者除其罪冲帝以建康元年八月即位十一月令郡國中都官繫囚减死一等徙邊謀反大逆不用此令桓帝建和元年四月壬辰詔州郡不得廹脅驅逐長吏贓滿三十萬而不紏舉者刺史二千石以縱避為罪若有擅相假印綬者與殺人同棄市論靈帝光和元年太中大夫橋元就醫里舍元少子十嵗獨㳺門次卒有三人持仗刼執之入舍登樓就元求貨元不與有頃司隸校尉陽球等恐并殺其子未欲廹之元瞑目呼曰姦人無狀元豈以一子之命而縱國賊乎促令兵進於是攻之元子亦死元乃詣闕謝罪乞下天下凡有刼質皆并殺之不得贖以財寶開張奸路詔書下其章初自安帝以後法禁稍弛京師刼質不避豪貴自是遂絶獻帝建安元年太山太守應劭刪定律令以為漢儀表奏之曰夫國之大事莫尚載籍者也决嫌疑明是非賞刑之宜允獲厥中俾後之人永有監焉故膠東相董仲舒老病致仕朝廷每有政議數遣廷尉張湯親至陋巷問其得失於是作春秋折獄二百三十二事動以經對言之詳矣逆臣董卓蕩覆王室典憲焚燎靡有孑遺開闢以來莫或兹酷今大駕東邁廵省許都拔出險難其命維新臣累世受恩榮祚豐衍切不自揆輙撰具律本章句尚書舊事廷尉板令决事比例司徒都目五曹詔書臣欽若等曰司徒都目鮑昱所作也五曹謂常侍二千石户曹主客三公也及春秋折獄凡二百五十篇蠲去復重為之節文復音覆重直容切又集議駁三十篇以類相從凡八十二事其見漢書二十五漢記四即東觀記皆刪敘潤色以全本體其二十六博採古今瓌瑋之事德義可觀其二十七臣所創造左氏云雖有姬姜不棄憔悴雖有絲麻不棄菅蒯盖所以代匱也是用敢露頑才厠於明哲之末雖未足綱紀國體宣洽時雍庶㡬觀察増闡聖德惟因萬機之餘暇逰意省覽帝善之於是舊事存焉魏太祖既建魏國以鍾繇為廷尉始聽君父已没臣子得為理謗及士為侯其妻不復配嫁繇所創也又定甲子科犯􅎂左右趾者易以木械是時乏鐵故易以木焉又嫌漢律太重故令依律者聽得科半使從半减也先是建安初天下將亂百姓有土分之勢刑罰不足以懲惡於是名儒大才故遼東太守崔寔大司農鄭𤣥鴻臚陳紀之徒咸以為宜復行肉刑漢朝既不議其事故無所用矣及太祖輔政尚書令荀彧博訪百官復欲申之而少府孔融議以為古者敦龎善否區别吏端刑清政無過失百姓有罪皆自取之末世陵遲風化壊亂政撓其俗法害其教故曰上失其道民㪚久矣而欲繩之以古刑投之以殘棄非所謂與時消息者也紂斮朝涉之脛天下謂為無道夫九牧之地千八百君各刖一人是天下當有千八百紂也求世休和弗可得已且被刑之人慮不念生志在思死類多趨惡莫復歸正夙沙亂齊伊戾禍宋趙髙英布為世大患不能止人遂為非也雖忠如鬻拳信如卞和智如孫臏寃如巷伯才如史遷逹如子政一罹刀鋸没世不齒是太甲之思庸穆公之霸秦陳湯之都賴魏尚之臨邊無所復施也漢開改惡之路凡為此也故明德之君遠度深惟棄短就長不苟革其政者也朝廷善之卒不改焉及魏國建陳紀子羣時為御史中丞太祖下令又欲復之使羣申其父論羣深陳其便時鍾繇為相國亦賛成之而奉常王修不同其議太祖亦難以藩國改漢朝之制遂寢不行文帝黄初元年既受漢禪又議肉刑未定後有大女劉朱撾子婦酷暴前後三婦自殺論朱减死輸作尚方因是下怨毒殺人减死之令四年正月詔曰喪亂以來兵革未戢天下之人互相殘殺今海内初定敢有私復讎者皆族之五年正月初令謀反大逆乃得相告其餘皆勿聽治敢妄相告以其罪罪之明帝青龍二年二月詔曰鞭作官刑所以糾慢怠也而頃多以無辜死其减鞭杖之制著於令十二月詔有司刪定大辟减死罪又改士庶罰金之令男聽以罰金婦人加笞還從鞭督之例以其形體祼露故也是時承用秦漢舊律其文起自魏文侯師李悝悝撰次諸國法著法經以為王者之政莫急於盗賊故其律始扵盗賊盗賊須劾捕故著網捕三篇其輕狡越城博戲借假不㢘淫侈踰制以為雜律一篇又以其律具其加减是故所著六篇而已然皆罪名之制也商君受之以相秦漢承秦制蕭何定律除叅夷連坐之罪増部主見知之條益事律興廐户三篇合為九篇叔孫通益律所不及傍章十八篇張湯越官律三十七篇趙禹朝律六篇合六十篇又漢時决事集為令甲以下三百餘篇及司徒鮑昱撰嫁娶辭訟决為法比都目凡九百六卷世有増損率皆集類為篇結事為章一章之中或事過數十事類雖同輕重乖異而通條連句上下相蒙雖大體異篇實相採入盗律有賊傷之例賊律有盗章之文興律有上獄之法廐律有逮捕之事若此之比錯糅無常後人生意各為章句叔孫宣郭令卿馬融鄭者元諸儒章句十有餘家家數十萬言凡斷罪所當由用合二萬六千二百七十二條七百七十三萬二千二百餘言言數益繁覽者益難天子於是下詔但用鄭氏章句不得雜用餘家衞顗又奏曰刑法者國家之所貴重所而私議之所輕賤獄吏者百姓之所懸命而選用者之卑下王政之弊未必不由此也請置律博士轉相教授事遂施行然而律文煩廣事比衆多離本依末决獄之吏如廷尉獄吏范洪受囚絹二丈附輕法論之獄吏劉象受属偏拷囚張茂物故附重法論之洪象雖皆棄市而輕枉者相繼是時大傅鍾繇又上疏求復肉刑詔下其奏司徒王朗議又不同時議者百餘人與朗同者多帝以吳蜀未平又寢其後天子又下詔改定刑制命司徒陳羣㪚騎常侍劉邵給事黄門侍郎韓遜議郎庾嶷中郎黄休荀詵等刪約舊科旁採漢律定為魏法制新律十八篇州郡令四十五篇尚書官令軍中令合百八十餘篇其序畧曰舊律所難知者由扵六篇篇少故也篇少則文荒文荒則事寡事寡則罪漏是以後人稍増更與本體相離今制新律宜都總事類多其篇條舊律因秦法經就増三篇而具律不移因在第六罪條例既不在始又不在終非篇章之義故集罪例以為刑名冠於律首盗律有刼畧恐喝和賣買人科有持質皆非盗事故分以為刼畧律盗律有欺謾詐偽踰封矯制因律有詐偽生死令丙有詐自復免事類衆多故分為詐律賊律有賊伐樹木殺傷人畜産及諸亡印金布律有毁傷亡失縣官財物故分為傷亡律因律有告劾傳覆廐律有告反逮受科有登聞道辟故分為告劾律因律有繋囚鞫獄斷獄之法興律有上獄之事科有考事報讞宜别為篇故分為繫訊斷獄律盗律有受所監臨財枉法雜律有假借不亷令乙有呵人受錢科有使者騐賂其事相類故分為請賕律盗律有勃辱强賊興律有擅興徭役具律有出賣呈科有擅作修舍事故分為興擅律興律有征徭稽留賊律儲峙不辦廐律有乏軍之興及舊典有奉詔不謹不承用詔書漢氏施行有小愆之反不如令輙劾以不承用詔書乏軍腰斬又减以丁酉詔書漢文所下不宜復以為法故别為之留律秦世舊有廐置乗傳副軍食厨漢初承秦不改後以費廣稍省故後漢但設騎置無車馬而律猶著其文斯為虚設欲除廐律取其可用合科者為郵驛令其告反逮驗别入告劾律上言變事以為變事令以警事告急與興律熢燧及科令者以為警事律盗律有還贓畀主金布律有罰贖入責以呈黄金為價律有平庸坐贓事以為償贓律律之初制無免坐之文張湯趙禹始作監臨部主見知故縱之例其見知而故不舉劾各與同罪失不舉劾各以贖論其不見不知不坐也是以文約而例通科之為制每條有違科不覺不知從坐之免不復分别而免坐繁多宜總為免例以省科文故更制定其由例以為免坐律諸律令中有其教制本條無從坐之文者皆從此取法也凡所定増十三篇就故五篇合十八篇扵正律九篇為増扵旁章科令為省矣改漢舊律不行扵魏者皆除之更依古義制為五刑其死刑有三髠刑有四完刑作刑各三贖刑十一罰金六雜抵罪七凡三十七名以為律首又改贓律但以言語及犯宗廟園陵謂之大逆無道腰斬家屬從坐不及祖父母孫至於謀反大逆臨時捕之或汙瀦或梟葅夷其三族不在律令所以嚴絶惡跡也賊間殺人以劾而亡許依古義聽子弟得追殺之㑹赦及過誤相殺不得報讐所以止殺害也正殺繼母與親母同防繼假之隙也除異子之科使父子無異財也毆兄姊加至五嵗刑以明教化也囚徒誣告人反罪及親屬異扵善人所以累之使省刑息誣也改投書棄市之科所以輕刑也止簒囚棄市之罪斷兇强為義之宗也二嵗刑以上除倍家人乞鞫之制省所煩獄也改諸郡不得自擇伏日所以齊風俗也斯皆魏世所改其大畧如是其後正始之間天下無事扵是征西将軍夏侯元河南尹李勝中領軍曹羲尚書丁謐又追議肉刑卒不能决蜀先主既定成都令昭文將軍伊籍與諸葛亮法正劉巴李嚴共造蜀科蜀科之制由此五人焉吳大帝黄武七年将軍翟丹叛如魏帝恐諸将畏罪而亡乃下令曰自今諸将有重罪三然後議嘉禾六年正月詔曰夫三年之喪天下之逹制人情之極痛也賢者割哀以從禮不肖者勉而致之世治道泰上下無事君子不奪人情故三年不逮孝行之門至於有事則殺禮以從宜要絰而處事故聖人制法有禮無時則不行遭喪不奔非古也盖隨時之宜以義斷恩也前古設科長吏在官當須交代而故犯之雖隨科坐猶已廢曠方事之殷國家多難凡在官司宜各盡節先公後私而不恭承甚非謂也中外羣僚其更平議務令得中詳為節度顧譚議以為奔喪立科輕則不足以禁孝子之情重則本非應死之罪雖嚴刑益設違奪必少若偶有犯者加其刑則恩所不忍有减則法廢不行愚以為長吏在遠茍不告語勢不得知比選代之間若有傳者必加大辟則長吏無廢職之負孝子無犯重之刑将軍胡綜議以為喪紀之禮雖有典制茍無其時所不得行方今戎事軍國異容而長吏遭喪知有科禁公敢干突茍念聞憂不奔之恥不計為臣犯禁之罪此由科防本輕所致忠節在國孝道立家出身為臣焉得兼之故為忠臣不得為孝子宜定科文示以大辟若故違犯有罪無赦以殺止殺行之一人其後必絶丞相雍奏從大辟晉武帝泰始三年賈充等上律令六十卷故事三十卷四年班行之先是文帝為魏相國患前代律令本注煩雜陳羣劉邵雖經改革而科網本宻又叔孫郭馬杜諸儒章句但取鄭氏又為偏黨未可承用於是令賈充定法律令與太傅鄭冲司徒荀顗中書監荀朂中軍將軍羊祜中䕶軍王業廷尉杜犮守河南尹杜預散騎侍郎裴楷潁川太守周雄齊相郭頎騎都尉成公綏尚書郎柳軌及吏部令史榮邵等十四人典其事就漢九章増十一篇仍其族類正其體號改舊律為刑名法例辯囚律為告劾繋訊斷獄分盗律為請賕詐偽水火毁亡因事類為衞宫違制撰周官為諸侯律合二十篇六百二十條二萬七千六百五十七言蠲其苛穢存其清約事從中興歸於益時其餘未宜除者若軍事田農酟酒未得皆從人心權設其法太平當除故不入律悉以為令施行制度以此設教違令有罪則入律其常事品式章程名還其府為故事减梟斬族誅從坐之條除謀反適養母出女嫁皆不復還坐父母棄市省禁固相告之條去捕亡亡没為官奴婢之制輕過誤老少女人當罰金杖罰者皆令半之重奸伯叔父母之令棄市淫寡女三嵗刑崇嫁娶之要一以下娉為正不理私約峻禮教之防准五服以制罪也凡律令合二千九百二十六條十二萬六千三百言六十卷故事三十卷㤗始三年事畢表上武帝詔曰昔蕭何以定律令受封叔孫通制儀為奉常賜金五百斤弟子百人皆為郎中夫立功立事古今之所重宜加祿賞其詳考差敘輙如詔簡異弟子百人隨才品用賞帛萬餘匹帝親自臨講使裴楷執讀明年正月大赦天下乃班新律其後明法掾張裴注律表上之其要曰律始於刑名者所以定罪制也終扵諸侯者所以異其政也王政布於上諸侯奉扵下禮樂撫扵中故有三才之義焉其相須而成若一體焉刑名所以經畧罪法之輕重正加减之差等明發衆篇之多義補其章條之不足較舉上下綱領其犯盗賊詐偽請賕者則求罪於此作役水火畜養守備之細事皆求之作本名告訊為之心舌捕繋為之手足斷獄為之定罪名例齊其制自始及終往而不窮變動無常周流四極上下無方不離扵法律之中也其知而犯之謂之故意以為然謂之失違忠欺上謂之謾飾信藏巧謂之詐虧禮廢節謂之不敬兩訟相趣謂之鬬兩和相害謂之戲無變斬擊謂之賊不意誤犯謂之過失逆節絶理謂之不道陵上僣貴謂之惡逆将害未發謂之戕倡首先言謂之造意二人對議謂之謀制衆建計謂之率不和謂之彊改惡謂之畧三人謂之羣取非其物謂之盗貨財之利謂之贓凡二十者律義之較者也夫律者當慎其變審其實若不承用詔書無故失之刑當從贖謀反之同伍實不知情當從刑此故失之變也卑與尊鬬皆為賊鬬之加兵刃水火中不得為戲戲之重也向人室廬道徑射不得為過失之禁也都城人衆中走馬殺人當為賊賊之似也過失似賊戲似鬬鬬而殺傷傍人又似誤盗傷縛守似彊盗呵人取財似受賕囚辭所連似告劾諸勿聽理似故縱持質似恐猲如此之比皆為無常之格也五刑不簡正于五罰五罰不服正于五過意善功惡以金贖之故律制生罪不過十四等死刑不過三徒加不過六囚加不過五累作不過十一嵗累笞不過千二百刑等不過一嵗金等不過四兩月贖不計日日作不拘月嵗數不疑閏不以加至死并死不復加不可累者故有并數不可并數乃累其加以加論者但得其加與加同者連得其本不在次者不以通論以人得罪與人同以法得罪與法同侵生害死不可齊其防親疎公私不可常其教禮樂崇於上故䧏其刑刑法閑於下故全其法是故尊卑敘仁義明九族親王道平也律有事狀相似而罪名相涉者若加威勢下手取財為彊盗不自知為亡縛守将中有惡言為恐猲不以罪名呵為呵人以罪名呵為受賕刼召其財為持質此八者以威勢得財而名殊者也即不求自與為受求所監求而後取為盗賊輸入呵受為留難斂人財物積藏於官為擅賦加毆縶之為戮辱諸如此類皆為以威勢得財而罪相似者也夫刑者司理之官理者求情之機情者心神之使心感則情動於中而形之言暢于四支發于事業是故姦人心愧而面赤内怖而色奪論罪者務本其心審其情精其事近取諸身遠取諸物然後乃可以立刑仰手似乞俯手似奪捧手似謝擬手似訴拱臂似自首攘臂似格鬭矜莊似威怡悦似福喜怒憂歡貌在聲色奸真猛弱候在視息出口有言當為告下手有禁當為賊喜子殺怒子當為戲怒子殺喜子當為賊諸如此類自非至精不能極其理也律之名例非正文而分明也若八十非殺傷人他皆勿論即誣告謀反者反坐十歳不得告言人即奴婢捍主主得謁殺之賊燔人廬舍積聚盗賊贓五疋以上棄市即燔官府積聚盗亦當與同歐人教令者與同罪即令人毆其父母不可與行者同得罪也若得遺物彊取彊乞之類無還贓法隨例畀之文法律中諸不敬違儀失式及犯罪為公為私贓入身不入身皆隨事輕重取法以例求其名也夫理者精𤣥之妙不可以一方行也律者幽理之奥不可以一體守也或計過以配罪或化畧以循常或隨事以盡情或趨舍以從時或推重以立防或引輕以就下公私廢避之宜除削重輕之變皆所以臨時觀釁者用法執詮者幽於未制之中采其根牙之微致之於機格之上稱輕重於毫銖考輩類扵参伍然後乃可以理直刑正夫奉聖典者若操刀執繩刀妄加則物傷繩妄彈則侵直梟首者惡之長斬刑者罪之大棄市者死之下髠罪者刑之威贖罰者誤之誡王者立此五刑所以寶君子而逼小人故為勅慎之經皆擬周易有變通之體焉欲令提綱而大道清舉畧而王法齊其㫖遠其辭文其言典而中其事肆而隠通天下之志唯忠也斷天下之疑唯文也切天下之情唯遠也彌天下之務唯大也變無常體唯理也非天下之聖賢孰能與於斯夫形而上者謂之道形而下者謂之器化而裁之謂之格刑殺者是冬震曜之象髠罪者是秋彫落之變贖失者是春陽悔吝之疵也五刑成章輙相依准法律之義焉是時侍中盧珽中書侍郎張華又表抄新律諸死罪條目懸之亭傳以示兆庶有詔從之惠帝永康元年解結為孫秀所害女適裴氏明日當嫁而禍起裴氏欲認活之女曰家既若此我何活為亦坐死朝廷遂議革舊制女不從坐由結女始也懷帝永嘉初東海王越表除三族之法元帝為晉王時大理衞展以詔有考子證父或鞭父母問子所在恐傷正教竝奏除之明帝太寧三年四月戊辰復三族刑惟不及婦人宋髙祖為宋公時侍中蔡廓建議以為鞫獄不宜令子孫下辭明言祖父之罪虧教傷情莫此為大自今家人與囚相見無乞鞫之訴便足以明伏罪不須責家人下辭朝議以為允從之永初元年七月詔曰往者軍國務殷事有權制刻科峻重施之一時今王道維新政和法簡可一除之二年六月制諸署勅吏四品以下又府署所得輙罰者聽統府寺行四十杖文帝元嘉中衞将軍王宏上疏言主守偷五匹常偷四十匹竝加大辟議者咸以為重宜進主守偷十匹常偷五十匹死四十匹降以補兵既得小寛人命亦足以有懲也從之孝武大明四年尚書左僕射劉秀之改定制令隸殺長吏科議者謂值赦宜加徙送秀之以為律文雖不顯民殺官長之㫖若值赦但止徙送便與悠悠殺人曽無一異民敬官長比之父母行害之身雖遇赦謂宜長付尚方窮其天命家口補兵從之明帝太始四年詔曰夫愆有小大憲隨寛猛故五刑殊用三典異施而降辟次網便暨鉗撻求之法科差品滋遠朕務存欽恤每有矜貸尋剏制科罪輕重同之大辟即事原情未為詳衷自今凡竊執官仗拒戰邏司或攻剽亭寺及害吏民者凡此諸條悉依舊制五人以下相逼奪者可特賜黥刖投畀四遠仍用代殺方古為優全命長户施同造物庶簡惠之化有孚羣萌好生之德無漏幽品南齊武帝永明七年尚書刪定郎王植撰定律章表奏之曰臣尋晉律文簡辭約㫖通大綱事之所質取斷難釋張斐杜預同注一章而生殺永殊自晉泰始以來唯斟酌叅用是則吏挾威福之勢民懷不對之怨所以温舒獻辭於失政絳侯慷慨而興嘆皇運革祚道冠前王陛下紹興光開帝業下車之痛每惻上仁滿堂之悲有矜聖思爰發德音刪正刑律勅臣集定張杜二注謹礪愚䝉盡思詳撰削其煩言錄其允衷取張注七百三十一條杜注七百九十一條或二家兩釋於義乃備者又取一百七條其注相通者取一百三條集為一書凡一千五百三十二條為二十卷請付外詳校摘其違謬從之先是江左相承用晉世張杜律三十卷帝留心法令乃詔獄官詳正舊法是時公卿八座叅議考正舊法輕重竟陵王子良下意多使從輕其中朝議不能斷者制㫖平决至九年廷尉孔稚珪上表曰臣聞匠萬物者以繩墨為政馭大國者以法理為本是以古之聖王臨朝思治遠防邪萌深杜姦漸莫不資法理以成化明刑賞以樹功者也伏惟陛下躡厯登皇乘圖踐帝天地更築日月再張五禮裂而復縫六樂頺而爰緝乃發德音下明詔降恤刑之文申慎罰之典勅臣與公卿八座共刪注律謹奉聖㫖諮審司徒臣子良爰禀受成規矩創立條緒使兼監臣宋躬兼平臣王植等抄撰同異定其去取詳議八座裁正大司馬臣嶷其中洪疑大議衆論相背者聖照𤣥覽斷自天筆始就成立律文二十卷錄敘一卷凡二十一卷今以奏聞請付外施用宣下四海詔報從納事竟不施行東昬侯初即位詔刪省科律梁髙祖天監元年四月詔曰金作贖刑有聞自昔入縑以免施扵中代民悦法行莫尚乎此永言叔世偷薄成風嬰諐入罪厥塗匪一斷蔽之書日纒於聽覽鉗􅎂之刑嵗積扵牢犴死者不可復生生者無因自返由此而望滋實庸可致乎朕夕惕思治念崇政術斟酌前王擇其令典有可以憲章邦國罔不由之庶愧心於四海昭情素扵萬物俗偽日久禁網彌繁漢文四百邈焉已遠雖省事清心無忘日用而委銜廢䇿事未獲從可依周漢舊典有罪入贖外詳為條格以時奏聞八月詔曰律令不一實難去取殺傷有法昬墨有刑此盖常科易為條例至如三男一妻懸首造獄事非慮内法出恒鈞前王之律後王之令因循創附良各有以若逰辭費句無取於實錄者宜悉除之求文指歸可適變者載一家為本用衆家以附丙丁俱有則去丁以存丙若丙丁二事注釋不同二家兼載咸使百司議其可不取其可安以為標例宜云某等如千人同議以此為長則定以為梁律留尚書比部悉使備文若班下州郡上撮機要可無二門侮法之弊時欲議定律令得齊時舊郎濟陽蔡法度家傳律學云齊武時刪定郎王植之集注張杜舊律合為一書凡一千五百三十條事未施行其文殆滅法度能言之於是以為兼尚書刪定郎使損益植之舊本以為梁律法度又請曰魏晉撰律止關數人今若皆諮列位恐緩而無决於是以尚書令王亮侍中王瑩尚書僕射沈約吏部尚書范雲長兼侍中柳惲給事黄門侍郎傅昭通直㪚騎常侍孔藹御史中丞樂藹太常丞許懋等叅議斷定定為二十篇一曰刑名二曰法例三曰盜刼四曰賊叛五曰詐偽六曰受賕七曰告刼八曰討捕九曰繋訊十曰斷獄十一曰雜十二曰戸十三曰擅興十四曰毁亡十五曰衞宫十六曰水火十七曰倉庫十八曰廐十九曰關市二十曰違制其制刑為十五等之差棄市已上為死罪大罪梟其首其次棄市刑二嵗已上為耐罪言各隨伎能而任使之也有髠鉗五嵗刑笞二百收贖絹男子六十疋又有四嵗刑男子四十八疋又有三嵗刑男子三十六疋又有二嵗刑男子二十四疋罰金一兩已上為贖罪贖死者金二斤男子十六疋贖髠鉗五嵗刑笞二百者金一斤十二兩男子十四疋贖四嵗刑者金一斤八兩男子十二疋贖三嵗刑者金一斤四兩男子十疋贖二嵗刑者金一斤男子八疋罰金十二兩者男子六疋罰金八兩者男子四疋罰金四兩者男子二疋罰金二兩者男子一疋罰金一兩者男子二丈女子各半之五刑不簡正于五罰五罰不服正于五過以贖論故為此十五等之差又制九等之差有一嵗刑半嵗刑百日刑鞭杖二百鞭杖一百鞭杖五十鞭杖三十鞭杖二十鞭杖一十又有八等之差一曰免官加杖督一百二曰免官三曰奪勞百日杖督一百四曰杖督一百五曰杖督五十六曰杖督三十七曰杖督二十八曰杖督一十論加者上就次當减者下就次凡繋獄者不即答欵應加測罰不得以人士為隔若人士犯罰違捍不欵宜測罰者先叅議牒唘然後科行斷食三日聽家人進粥二升女及老小一百十刻乃與粥滿千刻而止囚有械杻斗械及鉗竝立輕重大小之差而為定制其鞭有制鞭法鞭常鞭凡三等之差制鞭生革㢘成法鞭生革去㢘常鞭熟靻不去㢘皆作鶴頭紐長一尺一寸稍長二尺七寸廣三寸靶長二尺五寸杖皆用生荆長六尺有大杖法杖小杖三等之差大杖大頭圍一寸三分小頭圍八分半法杖圍一寸三分小頭五分小杖圍一寸一分小頭極杪諸督罰大罪無過五十三十小者二十當笞二百以上者笞半餘半後次中分鞭杖老小扵律令當得鞭杖罰者皆半之其應得法鞭杖者以熟靻鞭小杖過五十者稍行之将吏已上及女人有罰者以罰金代之其以職員應罰及律令指名制罰者不用此令其問事諸罰皆用熟靻鞭小杖其制鞭制杖法鞭法杖自非特詔皆不得用詔鞭杖在京師者皆於雲龍門行女子懷孕者勿得决罰其謀反降叛大逆已上皆斬父子同産男無少長皆棄市母妻姊妹及應從坐棄市者妻子女妾同補奚官為奴婢貲財没官刼身皆斬妻子補兵遇赦降死者黥面為刼字髠鉗補冶鏁士終身其下又讁運配材官冶士尚方鏁士皆以輕重差其年數其重者或終身士人有禁錮之科亦以輕重為差其犯清議則終身不齒耐罪囚八十已上十嵗已下及孕者盲者侏儒當械繋者及郡國太守相都尉關中侯已上之父母妻子及所坐非罪除名之罪二千石已上非檻徴者竝頌繋之丹陽尹月一詣建康縣令三官叅共錄獄察斷枉直其尚書當錄人之月者與尚書叅共錄之大凡定罪二千五百二十九條二年四月癸卯蔡法度表上新律又上令三十卷科三十卷帝乃以法度守廷尉卿班新律於天下三年十一月甲子詔曰設教因時淳薄異政刑以世革輕重殊風昔商俗未移民㪚久矣嬰網䧟辟日夜相尋若悉加正法則赭衣塞路竝申𢎞宥則難用為國故使有罪入贖以全元元之命令遐邇知禁圄犴稍虚率斯以往庶㡬刑措金作權典宜在蠲息可除贖罪之科十一年正月壬辰詔曰自今捕擿之家及罪應質作若年有老少者可停将送十四年正月詔曰世輕世重隨時約法前以墨刑用代重辟猶念改悔其路已壅并可省除大同十一年十月詔曰堯舜以來便開贖刑中年依古許罪身入貲下吏因此不無姦猾所以一日復勅禁斷川流難壅人心惟危既乖内典慈悲之義又傷外教好生之德書云與殺不辜寧失不經可復開罪身皆聽入贖中大同元年七月甲子詔曰禽獸知母不知父無賴子弟過於禽獸至於父母竝皆不知多觸王憲致及老人耆年禁執大可傷愍自今有犯罪者父母祖父母勿坐惟大逆不預今恩冊府元龜卷六百十
