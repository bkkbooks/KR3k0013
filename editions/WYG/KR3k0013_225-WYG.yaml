body:
  text: 册府元龜卷二百二十五宋王欽若等撰僭僞部世子自晋人失御羣雄競逐山河跨據率僭尊極之稱子弟世及亦濫儲兩之制其間簒害廢立十常七八雖蜀有世文趙有大雅好文愛士而不免于禍固與夫貞萬邦繼大統者異矣今以世子命篇者亦猶吳楚稱王春秋書其爵以子之義也唐季諸國并附出焉前凉張軌既為梁州牧表立子實為世子軌卒實紹位張駿寔之弟為梁州牧西平公境内皆稱之為王駿立子重華為世子時中堅將軍宋輯言於駿曰禮急儲君者蓋重宗廟之故周成漢昭立於襁褓誠以國嗣不可曠儲宫當素定也昔武王始有國元王作儲君建興之初先王在位殿下正名統况今社稷彌崇聖躬介立大業遂殷繼貳闕然哉臣竊以為國有累卵之危而殿下以為安踰太山非所謂也駿納之駿卒重華紹位張祚重華之庶兄既簒耀靈僭即帝位立其子太和為皇太子祚為元靚所殺并誅太和張天錫駿之少子元靚死國人立之為凉州刺史西平公以子大懐為世子其後廢為髙昌公更立嬖子大豫為世子西凉李暠領秦梁二州牧世子譚早卒以第二子上業為世子表假撫軍将軍䕶羗校尉暠卒士業嗣前趙劉元海既僭號立其子和為太子元海死和嗣偽位為弟聰所殺劉聦既殺兄和即偽位立其弟北海王乂為皇太弟領大單于其後雨血於其東宫延明殿徹瓦在地者深五寸乂惡之以訪其太師盧志太傅崔瑋太保許遐志等曰主上徃以殿下為太弟者蓋以安衆望也志在晋王乆矣晋王聦子粲也王公以下莫不希㫖歸之相國之位自魏武以來非復人臣之官主上本發明詔置之為贈官今忽以晋王居之羽儀威尊踰於東宫萬機之事無不繇之置太宰大將軍及諸王之營以為羽翼此事勢去矣殿下不得立明也然非止不得立而已不測之危厄在於旦夕宜早為之所四衛精兵不减五千餘營諸王皆年齒尚㓜可奪而取之相國輕佻正可煩一刺客耳大將軍無日不出其營可襲而得也殿下但當有意二萬精兵立便可得鼓行向雲龍門宿衛之士孰不倒戈奉迎大司馬不慮為異也乂弗從乃止東宫舎人荀裕告盧志等勸乂謀反乂不從之狀聦於是收志瑋遐於詔獄假以他事殺之使㓂威卜抽監守東宫禁乂朝賀乂憂懼不知所為乃上表自陳乞為黔首并免諸子之封褒羙晋王粲宜登儲副抽又抑而弗通時中宫僕射郭猗等皆寵幸用事靳凖合宗内外謟以事之郭猗有憾於乂謂晋王粲曰太弟于主上之世猶懐不逞之志此則殿下父子之深仇四海蒼生之重怨也而主上過垂寛仁猶不㬱二尊之位一旦有風塵之變臣竊為殿下寒心且殿下髙祖之世孫主上之嫡寵凡在含齒孰不係仰萬機事大何可與人臣昨聞太弟與大將軍相見極有言矣若事成許以主上為太上皇大將軍為太子乂又許衛將軍為大單于二王已許之矣二王居不疑之地并握重兵以此舉事事何不成臣謂二王茲舉禽獸之不若也背父親人人豈親之今又茍貪其一切之力耳事成之後主上豈有全理殿下兄弟故在忘言東宫相國單于在武陵兄弟何肯與人許以三月上巳因讌作難事淹變生宜早為之所春秋傳曰蔓草猶不可除况君之寵弟乎臣屢啓主上主上性敦友于謂臣言不實刑臣刀鋸之餘而䝉主上殿下成造之恩故不慮逆鱗之誅每所聞必言兾垂採納臣當入言之願殿下不泄密表其狀也若不信臣言可呼大将軍從事中郎王皮衛軍司馬劉惇假之恩顧通其歸善之路以問之必可知也粲深然之猗密謂皮惇曰二王逆狀主相已具知之矣卿同之乎二人驚曰無之猗曰此事必無疑吾憐卿親舊并見族耳於是歔欷流涕皮惇大懼叩頭求哀猗曰吾為卿作計卿能用不二人皆曰謹奉大人之教猗曰相國必問卿但云有之若責卿何不先啓卿即答曰臣誠負死罪然仰惟主上聖性寛慈殿下篤於骨肉恐言成詿偽故也皮惇許諾粲俄而召問二人至不同時而辭若畫一粲以為信然初靳凖從妹為乂孺子滛于侍人乂怒殺之而屢以嘲凖凖深慙恚説粲曰東宫萬機之副殿下宜自居之以領相國使天下之早有所繫也至是凖又説粲曰昔孝成拒子政之言使王氏卒成簒逆可乎粲曰何可之有凖曰然誠如聖㫖下官亟欲有所言矣但以德非更生親非皇宗恐忠言暫出霜威已及故不敢耳粲曰君但言之凖曰聞風塵之言謂大将軍衛将軍及左右輔皆謀奉太弟尅季春構變殿下宜為之備不然恐有商臣之禍粲曰為之奈何凖曰主上愛信於太弟恐卒聞未必信也如下官愚意宜緩東宫之禁固勿絶太弟賓客使輕薄之徒得與交游太弟既素好待士必不思防此嫌輕薄小人不能無逆意以勸太弟之心小人有始無終不能如貫髙之流也然後下官為殿下露表其罪殿下與太宰拘太弟所與交通者考問之窮其事原主上必以無將之罪罪之不然今朝望多歸太弟主上一旦晏駕恐殿下不得立矣於是粲命卜抽引兵去東宫後聦讌羣臣於光極前殿引見太弟乂容貌毁悴鬂髪蒼然涕泣陳謝聦亦對之悲慟縱酒極歡待之如初粲使王平謂乂曰適奉中詔云京師将有變勑𠂻甲以備之乂以為信然乃命宫臣𠂻甲以居粲馳遣告靳凖王沉等曰向也王平告云東宫隂備非常将若之何凖白之聦大驚曰豈有此乎王沉等同聲曰臣等乆聞但恐言之陛下弗信於是使粲遣臣凖收氐羗酋長十餘人窮問之皆懸首髙格燒鐡灼目乃自誣與乂同造逆謀聦謂沉等言曰而今而後吾知卿等忠於朕也當念知無不言勿恨徃日言不用也於是誅乂素所親厚大臣及東宫官屬數十人皆靳凖及閹竪所怨也廢乂為北部王粲使凖賊殺之坑士衆萬五千餘人平陽街巷為之空遂立粲為皇太子領相國大單于總攝朝政劉粲嗣偽位立其子元公為太子粲既為靳凖所殺劉氏無少長皆斬之劉曜元海之族子即偽位立其子熈為皇太子曜既為石季龍所敗熈與將相諸侯皆殺之後趙石勒初為上黨郡公以其長子興為上黨國世子興死立第一子𢎞為世子領中軍及僭號趙天王行皇帝事立為太子𢎞字大雅虚襟愛士好為文詠其所親昵莫非儒素勒謂徐光曰大雅愔愔殊不似將家子光曰漢祖以馬上取天下孝文以𤣥黙守之聖人之後必世勝殘天之道也勒大悦勒死𢎞嗣偽位為石季龍所廢後殺之石季龍既廢𢎞自稱居攝趙王立其子䆳為太子及僭稱大趙天王皇太子季龍荒游廢政多所營繕使䆳省可尚書奏事選牧守祀郊廟唯征伐刑斷乃親覧之􅃉自縂百揆之後荒酒滛色驕恣無道或盤游於田懸管而入或夜出於宫臣家滛其妻妾粧餙宫人羙淑者斬首洗血置於盤上傳共視之又内諸比丘尼有姿色者與其交䙝而殺之合牛羊肉煮而食之亦賜左右以識其味也河間王宣樂安公韜有寵於季龍􅃉疾之如仇季龍荒躭内游威刑失度􅃉以事為可呈呈之季龍恚曰此小事何足呈也時有所不聞復怒曰何以不呈誚責杖棰月至再三􅃉甚恨私謂常從無窮長生中庶子李顔等曰官家難稱吾欲行冐頓之事卿從我乎顔等伏不敢對􅃉稱疾不省事率宫臣文武五百餘騎宴於李顔别舎謂顔等曰我欲至冀州斬石宣有不從者斬行數里騎皆逃散李顔叩頭固諫􅃉亦昏醉而歸􅃉母鄭氏聞之私遣中人責􅃉􅃉怒殺其使季龍聞􅃉有疾遣所親任女尚書察之􅃉呼前與語抽劍擊之季龍大怒收李顔等詰問顔具言始末誅顔等三十餘人幽􅃉於東宫既而赦之引見大武東堂􅃉朝而不謝俄而便出季龍遣吏謂􅃉曰太子應入朝中宫何以便去􅃉遥出不顧季龍大怒廢􅃉為庶人其夜殺􅃉及妻張氏并男女二十六人埋於一棺之中誅其宫臣支黨一百餘人廢鄭氏為東海太妃立其子宣為皇太子宣母杜昭儀為天王皇后以石韜為太尉與太子迭日省可尚書奏事右僕射張離領五兵尚書求媚於宣因説之曰令諸公侯吏部過限宜漸削弱以盛儲威宣素疾石韜之寵乃使離奏奪諸公府吏秦燕義陽樂平四公王欽若等曰秦公韜燕公斌義陽公鍳樂平公皆季龍子所置吏一百九十七人帳下兵二百人自此已下三分置一餘兵五萬悉配東宫於是諸公咸怨為大釁之漸其後宣滛虐日甚而莫敢以告領軍王郎言之於季龍曰今隆冬雪寒而皇太子使人斫伐宫材引於漳水功役數萬士衆吁嗟陛下宜因游觀而罷之也季龍如其言永和中季龍命宣祈於山川因而游獵乗大輅羽葆華蓋建天子旌旗十有六軍戎卒十八萬出自金明門季龍從其後宫升陵霄觀望之笑曰我家父子如是自非天傾地䧟當復何愁但抱子弄孫日為樂耳宣既馳逐無厭所在陳列行宫四面各以百里為度驅圍禽獸皆暮集其所文武跪立圍守重行烽炬星羅光燭如書命勁騎百餘馳射其中宣與嬖姫顯德羙人乗輦觀之嬉娛忘反獸殫乃止季龍復命石韜亦如之出自并州游於秦晉宣素惡韜寵是行也疾之彌甚宦者趙生得幸於宣而無寵于韜㣲勸宣除之於是相圖之計起矣韜起堂於太尉府號曰宣光殿梁長九丈宣視而大怒斬匠截梁而去韜怒増之十文宣聞之恚甚謂所幸楊杯牟成曰韜凶豎勃逆敢違我如是女能殺之者吾入西宫當盡以韜之國邑分封汝等韜既死主上必親臨䘮因行大事蔑不濟矣杯等許諾因韜夜宿於佛精舎宣使杯成及牟皮趙生等縁獮猴梯而入殺韜置其刀箭而去旦宣奏之季龍哀驚氣絶乆之方蘇將出臨之其司空李農諫曰害秦公者恐在蕭墻之内慮生非常不可以出季龍乃止嚴兵發哀於天武殿宣乗素車從千人臨韜不哭直言呵呵使舉衾㸔尸大笑而去收大将軍記室叅軍鄭靖尹武等將委之以罪季龍疑宣之害韜也謀召之懼其不入乃偽言其母哀過危惙宣不虞己之見疑也入朝中宫因而止之建興人史科告稱韜死夜宿東宫楊杯家杯夜與五人從外來相語曰大事已定但願大家老夀吾等何患不富貴語訖科便寢闇中柸不見也科㝷出逃匿俄而柸乃出求科不得杯曰宿客聞人向語當除之斷口舌今而後得去作大事矣科踰墻獲免季龍馳使收之獲楊杯牟皮趙生等杯皮㝷皆忘去執趙生詰之生具首服季龍悲彌甚幽宣於席庫以鐡環穿其頷而鏁之作數斗米糟和􅅅飯以猪狗法食之取害韜刀箭䑛其血哀號震動宫殿積柴鄴北樹標其上標末置轆轤穿之以繩倚梯積柴送於標所使韜親官者郝稚劉伯㧞其髪抽其舌牽之登梯上於柴積郝稚以繩貫其頷轆轤絞上劉伯斷其手足斫眼潰腹如韜之傷四面縱火煙炎際天季龍從昭儀已下數千登中臺以觀之火㓕取灰分置諸門交道中殺其妻子九人宣小子年數嵗季龍甚愛之抱之而泣兒曰非兒罪季龍欲赦之其大臣不聽遂於抱中取而戮之兒猶挽季龍而大呌時人莫不為之流涕又誅其四率已下三百人宦者五十人洿其東宫養猪牛廢宣母杜氏為庶人季龍議立太子其太尉張舉進曰燕公斌彭城公遵竝有武藝文德陛下神齒已衰四海未一請擇二公而樹之初戎昭張豺之破上邽也獲劉曜㓜女年十二有殊色季龍得而嬖之生子世封齊公至是豺以季龍年長多疾規立世為嗣劉當為太后已得輔政説季龍曰陛下再立儲宫皆出自娼賤是以禍亂相尋今宜擇母貴子孝者立之季龍曰卿且勿言吾知太子處矣又議於東堂季龍曰吾欲以純灰三斛洗吾腹膓穢惡故生凶子兒年二十餘便欲殺父今世方十嵗比其二十吾已老矣於是與張舉李農定議勑公卿上書請立世大司農曹莫不署名季龍使張豺問其故莫頓首曰天下業重不宜立少是以不敢署也季龍曰莫忠臣也然未逹朕意張舉李農知吾心矣其令諭之遂立世為皇太子劉氏為皇后季龍死世即偽位為兄遵所廢石遵季龍子既簒世即偽位以燕王斌子衍為太子俄為石鑒所殺冉閔季龍之養孫既殺石鑒僭即皇帝位國號大魏復姓冉氏立子智為皇太子前燕慕容廆為遼東公立子皝為世子慕容皝為燕王以子雋假節安北將軍東夷校尉左賢王燕王世子慕容雋僭即皇帝位立其世子􅁮為皇太子後􅁮死謚獻懐復立次子暐為太子後讌羣臣於溝池酒酣賦詩因談經史語及周太子晉澘然流涕顧謂羣臣曰昔魏武追痛倉舒孫權悼登無已孤嘗謂二主縁愛稱竒無大雅之體自􅁮亡以來孤鬂髪中白始知二主有以而然卿等言􅁮定何如也孤今悼之得無貽將來誚乎其司徒左長史李績對曰獻懐之在東宫臣為中庶子既忝近侍聖質志業臣實不敢不知臣聞道備而無愆其唯聖人乎先太子大德有八未見其闕也雋曰卿言亦以過矣然試言之績曰至孝自天性與道合此其一也聰敏慧悟機思若流此其二也沈毅好㫁理諳無幽此其三也疾諛亮物雅悦直言此其四也好學愛贒不耻下問此其五也英姿邁古藝業超時此其六也虚襟恭譲尊師重道此其七也輕財好施勤恤民隠此其八也雋泣曰卿雖褒譽然此兒若在吾死無憂也前秦苻徤僭即皇帝位立子萇為太子萇既死徤以䜟言三羊五眼符應故立第三子生為太子苻氏本氐人洪生徤徤生生故曰三羊生無一目故曰五眼苻堅既殺生遂即號以其子宏為皇太子其後慕容冲攻長安堅出如五將山付宏以後事宏将母妻宗室男女數千騎出奔歸其南秦州刺史楊璧於下辨璧距之乃奔武都氐豪張熈假道歸於晉處宏於江州宏立位輔國将軍桓𤣥簒位以宏為梁州刺史義熈初以謀叛被誅苻登堅之族孫既即偽位以弟懿為太弟後立其子崇為皇太子登為姚興所敗崇奔於湟中僭號為乞伏乾歸逐殺後秦姚萇僭即皇帝位立長子興為皇太子興字子畧苻堅時為太子舎人萇之在馬牧興自長安冐難奔萇遂立之萇出征討常留統後事與其中舎人梁喜洗馬范朂等講論經籍不以兵難廢業時人咸化之後萇討荷登遣姚碩德鎮李潤碩徳萇弟李潤地名尹緯守長安召興詣行營征南姚方成言於興曰今㓂賊未滅上復寢疾王統苻𦙍等皆有部曲終為人害宜盡除之興於是誅苻裔王統徐成毛盛乃赴召興至萇怒曰王統兄弟是吾州里無他遠志徐成等昔在秦朝竝為名将天下小定吾方任之柰何輙便誅害令人䘮氣㑹苻登與竇衝相持萇議擊之尹緯言於萇曰太子純厚之稱著於遐邇将領英畧未為逺近所知宜遣太子親行可以漸廣威武防闚􅎿之原萇從之戒興曰賊徒知汝轉近必相驅入堡聚而掩之無不尅矣比至胡空堡衝圍自解登聞興向胡空堡引還興因襲平凉大獲而歸咸如萇䇿使興還鎮長安甚有威惠萇死遂嗣位姚興僭即皇帝位立其長子泓為皇太子泓字元子孝友寛和而無經世之用又多疾病興将以為嗣而疑焉乆之乃立為太子興每征伐廵游常留總後事泓博學善談論尤好詩詠尚書王尚黄門郎叚章尚書富允文以儒術侍講胡義周夏侯稚以文章游集泓受經博士淳于岐岐病泓親詣省疾拜於床下自是公侯見師傅皆拜焉興之如平凉也泓留總後事馮翊人劉厥聚衆數千據萬年以叛泓遣鎮軍彭白狼率東宫禁兵討之斬厥赦其餘黨諸将咸勸泓曰殿下神筭電發蕩平醜逆宜露布表言廣其首級以慰逺近之情泓曰主上委吾後事使式遏㓂逆吾綏馭失和以長姦㓂方當引咎責躬歸罪行間安敢過自矜誣以重罪責乎其右僕射韋華聞而謂河南太守慕容筑曰皇太子實有恭惠之德社稷之福也時尚書王敏右丞郭播以刑政過寛議欲峻制泓曰人情挫辱則壮厲之心生政教煩苛則茍免之行立上之化下如風靡草君等參贊朝化𢎞明政軌不務仁恕之道惟欲嚴灋酷刑是豈安上馭下之理乎敏等遂止其後廣平公弼弼泓弟謀害泓稱疾不朝集兵於第興聞之怒甚收其黨殿中侍御史唐盛孫𤣥等殺之泓言於興曰臣誠不肖不能訓諧於弟致弼構逆是非仰慙天日陛下若以臣為社稷之憂除臣而國寜亦家之福也若垂天性之恩不忍加臣刑戮者乞聽臣守藩興􅃤然改容召冠軍姚讚右僕射梁喜京兆尹尹昭輔國歛曼嵬於諮議堂密謀收弼時姚紹屯兵雍城馳遣告之連日不决弼黨恟懼興慮其變乃收弼囚之中曹窮責黨與将殺之泓流涕固請之乃止蜀李雄既僭號将立兄蕩子班為太子時雄有子十餘人羣臣咸欲立雄所生雄曰起兵之初舉手捍頭本不希帝王之業也值天下䘮亂晉氏播蕩群情義舉志濟塗炭而諸君遂見推逼處王公之上推本基業功繇先帝吾兄適統丕祚所歸恢懿眀叡殆天所命大事垂尅薨於戎陣班姿性仁孝好學夙成必為名器李驤與司徒王達諫曰先王樹家適者所以防簒奪之萌不可不慎吳子捨其子而立其弟所以有専諸之禍宋宣不立與夷而立穆公卒有宋督之變猶子之言豈若子也願陛下思之雄不從竟立班驤退而流涕曰亂自此始矣班字世文謙虚博納敬愛儒賢自何㸃李釗班皆師之又引名士王嘏及隴西董融天水文䕫等以為賔友毎謂融等曰觀周景王太子晉魏太子丕吳太子孫登文章鑒識超然卓絶未嘗不有慚色何古賢之髙朗後人莫之逮也班為性汎愛動循軌度時諸李子弟皆尚奢靡而班常戒厲之毎有大議雄輙令豫之班以古者墾田均平貧富獲所今貴者廣占荒田貧者種植無地富者以己所餘而賣之此豈王者大均之義乎雄納之以班為撫軍及雄寝疾班晝夜侍側雄少數攻戰多被傷夷至是疾甚痕皆膿潰雄子越等惡而逺之班為吮膿殊無難色毎甞藥流涕不脫衣冠其孝誠如此雄死嗣偽位以李夀録尚書事輔政班居中執䘮禮政事皆委夀及司徒何㸃尚書令王環等尋為李越所殺李夀雄叔父讓之子既僣即偽位以其子勢為太子尋領大將軍録尚書事夀死勢嗣位後凉吕光僣即三河王位立子紹為世子既僣天王遂立為太子後光疾甚以紹為天王自號為太上皇帝光死紹即位為庶兄纂所簒自殺後燕慕容垂初僣即燕王位立子寳為王太子及僣帝號以寳為皇太子為寳起承華觀以寳録尚書政事巨細皆委之垂總大綱而已又以寳領侍中大單于驃騎大將軍幽州牧建留臺於龍城以髙陽生慕容隆録留臺尚書事寳字道祐垂之第四子也少輕果無志操好人佞已符堅時為太子洗馬萬年令堅淮淝之役寳為陵江將軍及為太子砥礪自脩敦崇儒學工談論善屬文曲事垂左右小臣以求美譽垂之朝士翕然稱之垂亦以為克保家業甚賢之垂死嗣位慕容寳既嗣立以少子濮陽公䇿為太子初垂以寳冡嗣未建憂之寳庶子清河公會多材藝有雄畧垂深竒之及寳之北伐使會代攝宫事總録禮遇一同太子所以見定㫖也垂之伐魏以龍城舊都宗廟所在復使會鎮幽州委以東北之重髙選寮屬以崇威望垂臨死顧命以㑹為寳嗣而寳寵愛䇿意不在會寳庶長子長樂公盛自以同生年長耻會先之乃盛稱䇿宜為儲貳而非毁會焉寳大悦乃訪其趙王麟髙陽王隆麟等咸希㫖贊成之寳遂與麟等定計立䇿䇿母叚氏為皇后䇿為皇太子盛會進爵為王䇿字道符年十一美姿貌而惷弱不慧及寳為蘭汗所殺䇿亦遇害至盛即偽位謚曰哀太子慕容盛寳之庶長子僣位立其子遼西公定為太子及盛死其太后丁氏以國多難宜立長君意在於熈遂廢定迎熈熈字道文垂之少子也慕容雲寳之養子既弑熈自立復姓髙氏以彭為太子西秦乞伏乾歸既僣號秦王立其長子熾磐為太子初乾歸降姚興熾磐拜建武將軍行西夷校尉留其衆鎮菀川及乾歸返政遂立熾磐為太子領冠軍大將軍都中外諸軍録尚書事乞伏熾磐既嗣偽位立其第二子慕末為太子領撫軍大將軍都督中外諸軍事熾磐死慕末嗣偽位北燕馮䟦僣稱天王立其子永為太子尋領大單于置四輔南凉秃髪傉檀僣即凉王位立世子武臺為太子南燕慕容徳僣即皇帝位立其兄子超為皇太子初徳迎超于長安及至徳夢其父曰汝既無子何不早立超為太子不爾恐生人心寤而告其妻曰先帝神眀所勅觀此夢意吾將死矣乃下書立超其月徳果死超嗣位北凉沮渠䝉遜僣即河西王位立其子政徳為世子加鎮衛大將軍録尚書事夏赫連勃勃僣稱天王立子璝為太子册府元龜卷二百二十五
