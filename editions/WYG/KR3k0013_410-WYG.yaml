body:
  text: 冊府元龜卷四百十宋王欽若等撰將帥部壁壘夫石城湯池著於神農之敎固圉重閉載乎春秋之訓誠以守禦之設所以保民營屯之利繇是制勝故司戎律遏外侮者莫不務焉三代以來乃有扞戎貊備鄰敵討彊㓂懐新附審其勢勝防其侵軼收合離散繕完守備因地而占其利先人而奪其心築壘以為固環營而入保繇是軍聲雄震士氣兼倍整武經而惟叙圖戰功而允集克寕封守以安生聚斯蓋治戎之要道備豫之善敎者歟周南仲為將帥宣王之時北有玁狁之難命南仲往築城於朔方為軍壘以禦北狄之難晏弱為齊大夫齊侯召萊子萊子不㑹故晏弱城東陽以偪之東陽齊境上邑遂圍萊滅之孟獻子仲孫蔑也為魯大夫襄公二年七月㑹晉荀罃宋華元衛孫林父曹人邾人於戚謀鄭故也鄭人叛晋謀討之孟獻子曰請城虎牢以偪鄭虎牢鄭舊邑今屬晉知武子荀罃也曰善冬復㑹於戚遂城虎牢鄭人乃成如獻子謀亷頗為趙將軍秦王齕攻趙使亷頗將趙軍士卒犯秦斥兵秦斥兵斬趙禆將趙軍築壘而守之趙奢為趙將秦伐韓軍於閼與趙王令奢將兵救之趙軍武安西屬魏郡秦軍鼓噪勒兵武安屋瓦盡振趙奢堅壁留二十八日不行復益増壘秦間來入趙奢善食而遣之間以報秦將秦將大喜曰夫去國三十里而軍不行乃増壘閼與非趙地也趙奢既已遣秦間乃卷甲而趨之二日一夜至令善射者去閼與五十里而軍軍壘成漢郭蒙髙帝初為城將將築城兵也公孫敖為因杆將軍武帝太初元年遣敖築塞外受䧏城後漢吳漢為大司馬建武中率征南大將軍岑彭等伐公孫述光武戒漢曰成都十餘萬衆不可輕也但堅據廣都待其來攻勿與争鋒若不敢來攻轉營廹之湏其力疲乃可擊也漢乗利遂自將歩騎二萬人進逼成都去城十里餘阻江北為營作浮橋使副將武威將軍劉尚將萬餘人屯於江南相去二十餘里岑彭為征南大將軍南擊秦豐豐與其大將蔡宏拒彭彭乃潜兵渡沔水擊其將張楊於阿頭山大破之從川谷間伐木開道直襲黎􅉌擊破諸屯兵豐聞大驚馳歸救之彭與諸將依東山為營豐與蔡宏夜攻彭彭預為之備出兵迎擊之豐敗走段紀眀為䕶羌校尉破羌將軍時詔遣謁者馮禪說䧏漢陽散羌紀眀以春農百姓布野羌雖暫䧏而縣官無廪必當復為盗賊不如乗虚放兵勢必殄滅夏紀眀自進營去羌所屯凡亭山四十五里遣田晏夏育將五千人據其山上晏等大戰破之紀眀不欲令散走乃遣千人於西縣西縣屬天水郡結木為柵廣二十歩長四十里遮之分遣晏育等將七千人啣枚夜上西山結營穿塹去虜一里許又遣司馬張愷等將三千人上東山紀眀自率歩騎進擊水上羌走因與愷等夾東西山縱兵擊破之虞詡為武都太守既到郡羌衆萬餘攻圍赤亭數十日赤亭故城在渭川羌退因掩擊大破之斬獲甚衆賊繇是敗散南入益州詡乃占相地勢築營壘百八十所招還流亡假賑貧人郡遂以安魏婁圭字子伯漢末從太祖為大將建安十六年太祖征馬超於闗中軍於渭南賊衝突營不得立地又純沙不勝版築子伯說太祖曰今天寒可起沙為城以水灌之湏臾氷堅如鐵石功不達曙百堵斯興雖金湯之固未能過也太祖從之比眀已就張遼為盪㓂將軍陳蘭梅成以氐六縣叛太祖遣于禁臧覇等討成遼督張郃朱蓋等討蘭成僞䧏禁禁還成遂將其衆就蘭轉入灊山灊中有天柱山髙峻二十餘里道險狹步徑裁通蘭等壁其上遼欲進諸將曰兵少道險難用深入遼曰此所謂一與一勇者得前耳遂進到山下安營攻之斬蘭成首盡虜其衆于禁為平虜校尉從至宛䧏張繡繡復叛太祖與戰不利軍敗還舞隂是時軍亂各間行求太祖禁獨勒所將數百人且戰且引雖有死傷不相離虜追稍緩禁徐整行隊鳴鼔而還未至太祖所道見十餘人被創裸走禁問其故曰為青州兵所刼初黃巾䧏號青州兵太祖寛之故敢因縁為略禁怒令其衆曰青州兵同屬曹公而還為賊乎乃討之數之以罪青州兵遞走詣太祖自訴禁既至先立營壘不時謁太祖或謂禁青州兵已訴君君宜促詣公辯之禁曰今賊在後追至無時不先為備何以待敵且公聰眀譛訴何縁徐鑿塹安營訖乃入謁具陳其状太祖恱劉馥為揚州刺史馥受命單馬造合肥空城建立州治又髙為城壘多積木石編作草苫數千萬枚益貯魚膏數千斛為戰守備鄧艾為征西將軍修治障塞築起城塢㤗始中羌虜大叛頻殺刺史凉州道斷吏民安全者皆保艾所築塢焉蜀諸葛亮為丞相建興五年出屯漢中營沔北陽平石馬七年冬亮遣陳式攻武都隂平遂克定二郡亮徙府營於南山下原上築漢樂二城十二年亮悉大衆繇斜谷出以流馬運據武功五丈原與司馬宣王對於渭南相持百餘日亮疾病卒及軍退宣王案行其營壘處所曰天下竒才李嚴為都䕶建興四年春自永安還駐江州築大城今巴郡故城是張嶷為越嶲太守嶷以郡郛宇頽壊更築小塢在官三年徙還故郡繕治城郭夷種男女莫不致力晉羊祜為都督荆州諸軍事以孟獻營武牢而鄭人懼晏弱城東陽而萊子服乃進據險要開建五城收膏腴之地奪吳人之資石城以西盡為晉有杜預為鎮南大將軍都督荆州諸軍事孫皓既平預還鎮江漢懐徳化被萬里攻破山夷錯置屯營分據要害之地以固維城之勢祖逖為鎮西將軍東討石勒乃營繕武牢城城北臨黃河西接成皋四望甚逺逖恐武牢無堅壘必為賊所襲乃使從子汝南太守濟汝陽太守張敞新蔡内史周閎率衆築壘宋毛脩之為河南河内二郡太守行四州事戍雒陽脩治城壘髙祖既至案行善之南齊周山圖為寕朔將軍漣口戍主遏漣水築西城斷魏軍騎路亦以溉田又於石鼈立陽平郡梁曹景宗為右衞將軍魏軍攻徐州詔景宗援之頓邵陽洲立壘與魏城相去百餘步魏將楊大眼對橋北岸立城以通糧運每牧人過岸伐芻槀皆為大眼所略景宗乃募勇敢士千餘人徑渡大眼城南數里築壘親自舉築大眼率衆來攻景宗與戰破之因得壘成使别將趙草守之因謂為趙草城是後恣芻牧焉大眼時遣抄掠輙反為趙草所獲韋叡為左將軍南郡太守時㑹司州刺史馬仙琕北伐還軍為魏人所躡三闗擾動詔叡督衆軍援焉叡至安陸増築城二丈餘更開大塹起髙柵衆頗譏其示弱叡曰不然為將當有怯時不可專勇是時元英復追仙琕將復邵陽之恥聞叡至乃退陳徐度為鎮北將軍髙祖永定三年率衆城南皖口後魏于栗磾眀元時為河内鎮將宋髙祖之伐姚泓也栗磾慮其北擾遂築壘河上親自守焉禁防嚴宻斥堠不通裕甚憚之不敢前進薛㧞父瑾為安西將軍真君中蓋吳擾動闗右薛永宗屯據河側太武親討之乃詔㧞紏合宗鄉壁於河際斷二㓂往來之路事平除中散賜爵永康侯刁雍為征南大將軍薄骨律鎮將真君九年雍表曰臣聞安不忘危先聖之政也况綏服之外帶接邊城防守不備無以禦敵也臣鎮所綰河西爰在邊表嘗懼不虞平地積榖實難守䕶其人散居無所依恃脫有妖姦必致狼狽雖欲自固無以得全今求造城儲榖置兵備守鎮自建立更不煩官又於三時之隙不令廢農一嵗不訖三嵗必成立城之所必在水陸之次大小髙下量力取辦詔許之至十年三月城訖詔曰卿深思逺慮憂勤盡忠今城已周訖邊境無不虞之憂千載有永安之固朕甚嘉焉即名此城為刁公城以旌爾功也北齊潘樂文宣時鎮河陽破西魏將楊標等時帝以懐州刺史平監等所築城深入敵境欲棄之樂以軹闗要害必湏防固乃更脩理増置兵將而還常山王演天保五年八月奉詔與上黨王渙清河王岳平原王叚韶等率衆於雒陽西南築伐惡城新長城嚴城河南城九月文宣親自臨幸欲以致周師慕容儼天保末為揚州行臺與王貴顯侯子監將兵衛送蕭莊築郭黙若耶二城與陳新蔡太守魯悉達戰大蛇洞破走之斛律羡為幽州道行臺僕射以北虜屢犯邊湏備不虞自庫堆戍東距於海隨山屈曲二千餘里其間二百里中凡有險要或斬山築城斷谷起嶂並置立戍邏五十餘所段韶為武衛將軍蒞并州武平二年正月出并州道築威敵平㓂二城而還清河王岳之克郢州執司徒陸法和韶亦預行築魯城於新蔡立郭黙戍而還獨孤永業為雒州刺史宜陽深在敵境周人於黒澗築城成以斷糧道永業亦築鎮以抗之治邊甚有威信王俊為雒州刺史河南道行臺左丞皇建中詔於雒州西界掘長塹三百里置城戍以防間諜斛律光為太子太保河清二年四月光率歩騎二萬築勲掌城於軹西仍築長城二百里置十三戍又與周將齊國公宇文憲申國公㩉䟦顯敬相對一旬光置築統闗豐化二城以通宜陽之路其冬光又率歩騎五萬於玉壁築華谷龍門二城與顯憲敬等相持憲等不敢動光乃進圍定陽仍築南汾城置州以逼之後周達奚武以大將軍鎮玉壁武乃量地形勝立樂昌胡營新城三防齊將髙茍子以千騎攻新城武邀擊之悉虜其衆王思政為驃騎將軍鎮宏農思政以玉壁地在險要請築城即自營度移鎮之遷并州刺史仍鎮玉壁於是修城郭起樓櫓營田農積芻秣凡可以守禦者皆具焉宏農之有備自思政始也後為荆州刺史自武闗以南延袤一千五百里置三十餘城並當衝要之地韋孝寛為驃騎大將軍鎮玉壁汾州之北離石以南悉是生胡抄掠居人阻斷河路孝寛深患之而地入於齊無方誅剪欲當其要處置大城乃於河西徴役徒十萬甲士百人遣開府姚岳監築之岳色懼以兵少為難孝寛曰計成此城十日即畢既去晉州四百餘里一日創手二日僞境始知設令晉州徵兵二日方集謀議之間自稽三日計其軍行二日不到我之城隍足得辦矣乃令築之齊人果至南首疑有大軍乃停留不進其夜又令汾水以南傍介山稷山諸村所在縱火齊人謂是軍營遂收兵自固版築克就卒如其言齊王憲天和四年九月率衆於宜陽築崇徳等城一云劉雄為齊王憲府掾從憲出宜陽築安義等城宇文盛為大宗伯與柱國王傑從齊王憲東討時汾州被圍日久憲遣盛運粟以給之仍赴姚襄城受憲節度齊將段孝先率兵大至盛乃力戰拒之孝先退乃築大寕城而還隋郭榮在周時為宇文䕶中外府水曹叅軍時齊冦屢侵䕶令榮於汾州觀賊形勢汾州與姚襄鎮相去懸逺榮以為二城孤逈勢不相救請於州鎮之間更築一城以相控攝䕶從之俄而齊將段孝先攻䧟姚襄汾州二城惟榮所立者獨能自守榮以功授大都督又以稽胡數為㓂亂使榮綏集之榮於上郡延安築周昌宏信廣安招逺咸寕等五城以遏其要道稽胡繇是不能為㓂李穆仕周為大司空持節綏集東境築武申旦郭慈澗崇德安民交城鹿盧等諸鎮郭衍開皇中為朔州總管築桑乾鎮唐王方翼為安西都䕶髙宗朝安撫大食使裴行儉之討遮匐也詔以方翼為副行儉軍還方翼始築碎葉鎮城立四靣十二門皆屈曲作隱伏出沒之狀五旬而畢西域胡夷競來觀之因獻方物張仁愿神龍中為朔方軍總管先是朔方軍與突厥以河為界河北岸有拂雲神祠突厥將入㓂必先詣祠祭酹求福因牧馬料兵而後渡河時突厥黙啜盡衆西擊突騎施娑葛仁愿請乗其虚奪取漢南之地於河北築三受䧏城首尾相應以絶其南㓂之路太子少師唐休璟以為两漢以來皆守黃河今於㓂境築城恐勞人費功終為賊虜所有建議以為不便仁愿上請不已中宗竟從之仁愿表留年滿鎮兵以助其功時咸陽兵二百餘人逃歸仁愿盡擒之悉斬於城下軍中股慄役者盡力六旬而三城俱就以拂雲祠為中城與東西两城相去各四百餘里皆據津濟遥相應接北拓三百餘里於牛頭朝那山北置烽候一千八百所自是突厥不得度山放牧朔方無復㓂掠減鎮兵數萬人仁愿初建三城不置壅門及郤敵戰格之具或問曰此邊城禦賊之所不為守備何也仁愿曰兵法貴在攻取不宜退守㓂若至此即當併力出戰迴顧望城猶湏斬之何用守備生其退恧之心也其後常元楷為朔方軍總管始築壅門以備㓂議者以此重仁愿而輕元楷焉郭元振先天元年為朔方軍大􅄣管始築定逺城以為行軍㑹集之所至今賴之哥舒翰為隴右節度築神威城於青海上旋為吐蕃所破乂築城於青海中龍駒島上有白龍見遂名龍應城吐蕃自此遁逃不復近青海李懐光為邠寕節度頻嵗率師城長武以處軍士城據原首臨涇水俯瞰東道吐蕃自是不敢南侵為西邊要防矣馬燧為河東節度使建中四年涇原軍叛燧以晉陽王業所起度都城東平易受敵時天下騷動北邊數有警乃西引晉水架汾而城之東瀦以為池㓂至計省守備者萬人汾水環城多為池樹柳以固隄城益固李晟為神䇿軍使討朱泚始至渭橋以逼泚表築城以為固德宗許之劉昌為涇原節度使貞元四年築連雲堡七年又城平凉以扼彈筝峽口命徒庀事旬日而畢詔曰平凉當四㑹之衝居北地之要劉昌請城於兹分兵保戍實以遏其要衝保寕邊鄙平凉固原州屬縣在原州西一百五十里令昌董率諸軍城之度支饋運浹辰而畢仍分兵戍之地當走集得守固之要器械糧榖頗豐而人安焉三月昌新築胡谷堡名曰彰信堡在平原西三十五里李元諒為隴右節度使貞元四年初築良元城距城築臺上彀連弩為城守而益固無㡬乂進築新城以據便地虜每㓂掠輙擊却之涇隴繇是乂安虜深憚之張獻甫為邠寕節度使於彭原置義倉渠馬嶺等縣選險要之地以為烽堡又上疏請復置鹽州及洪門雒原等鎮各置兵防以備蕃㓂朝廷皆從之縁邊軍州安恱楊朝晟為邠寕節度使奏方渠合道木波皆賊路也請城其地以備之詔問湏兵㡬何朝晟奏曰部下兵自可集事不煩外助復問前築鹽州凡興師七萬今何其易也朝晟曰鹽州之役咸集諸蕃戎盡知之今臣境近虜若大興兵即蕃戎來㓂㓂則戰戰則無暇城矣今請宻發軍士不十日至塞下未三旬而功畢蕃人始知己無可奈何帝從之事畢軍還至馬嶺吐蕃始乘障數日而退郝玭為臨涇鎮將以臨涇地居險要當虜要衝白其帥曰臨涇草木豐茂宜畜牧西蕃入㓂每屯其地請完壘益軍以折虜之入㓂前帥不從及叚佐節制涇原深然其䇿元和三年佐請築臨涇城朝廷從之仍以為行凉州詔玭為刺史以戍之自是西蕃入㓂不過臨涇初佐請城臨涇詔麟逰靈臺良原崇信歸化等五鎮並脩整士馬掎角相應臨涇城直涇州西北九十里實險要之鎮從前因循不脩嘗為犬戎所保其界有青石嶺嶺多美土每軍人耕穫屢為蕃㓂掠奪佐請脩築議者是非相半佐決意城之功畢時方以為大利扼川口要害塞上至今賴焉杜佑為淮南節度使在揚州開設營壘三十餘所士馬脩葺張宏靖為河中尹請脩古舜城許之烏重裔為淮汝節度使征淮西奉詔修賈柵堡李光進為振武節度使元和八年七月請修東受䧏城兼理黄河防堰李光顔為邠寕節度使元和十五年奏修築鹽州城畢李祐為夏州節度使長慶四年奏於盧子闗北木𤓰嶺剏築堡柵以捍黨項之衝其壁壘屋並出當軍財力不别請錢祐於塞外凡築五城烏延宥州臨塞隂河淘子而宥州烏延皆方廣數里尤居要害蕃戎畏之遷滄州節度使奏抽管内百姓一萬人於黃河北築城李元喜為安南都䕶寳歴元年上言請移城於江北岸圖其形勢上之制可之張惟清為振武軍節度使請户部錢一十四萬貫充脩築東受降城王承元為鳯翔節度使於汧陽縣西北八十里築新城一所賜額為臨汧城鳳翔西接涇原無山谷之險吐蕃繇是往往入㓂故承元奏於衝要築壘分兵千人以守之又鳳翔城東商旅所集居人多以烽火相驚承元奏益城以環之李泳為振武軍節度使太和四年七月上言先管内修雲伽闗畢功并進畫圖一軸又奏差兵馬一千人赴雲伽闗守牛僧孺為武昌節度使江夏城客土散惡難立垣墉每年加板築賦菁茅以覆之吏縁為姦蠧弊綿嵗僧孺至計茅苫板築之費嵗十餘萬即賦之以塼當苫築之價凡五年墉皆甃葺李徳裕為西川節度使修卭峽闗城及移雋州於臺登城牛藂為西川節度使咸通六年四月藂奏於蠻界築新安城遏戎州功畢時南詔蠻入㓂姚嶲陳許大將顔復戍雋州奏築二城其年秋六姓蠻攻遏戎州為復所敗退去髙駢為西川節度使蜀土散惡成都北無垣墉駢乃計每嵗完葺之費甃之以塼雉堞繇是完堅梁趙珝為忠武軍節度使陳州土壤卑踈每嵗壁壘摧圯工役不逮珝遂營度力用以甃周砌四墉自是無淋潦之虞髙季興為荆南節度使荆南舊無外壘季興始城之楊師厚為襄州節度使先是漢南無羅城師厚始興版築周十餘里郛郭完壯後唐李存進初為建武軍節度使天復十九年王師討張文禮於鎮州閻寳李嗣昭相次不利而歿存進代嗣昭為招討進營東垣度峽滹為壘沙土散惡垣壁難成存進斬伐林樹板築旬日而就賊不能㓂李存賢權典沁州先是州當賊境不能保守乃南去故州一百五十里據險立柵為法所以聚州民已歴十餘年及存賢至郡復繕故州時獨有壊舍三間因召州民鏟草萊除荆棘結茅為舍漸濬城壕未半年間故州完集李存審為蕃漢馬歩總管天祐十六年正月城徳勝夾河置禦捍之備馬殷為湖南節度使同光三年八月奏増築岳州城趙徳鈞為幽州節度使同光末於閻溝築城以戍兵守之因名良鄉縣自是稍息虜㓂自幽州東十里外州人不敢樵牧後德鈞又於州東五十里故潞縣擇潞河築城以兵守之而近州民方敢耕稼自擒破惕隱秃餧之後德鈞又於其東築三河城以遏虜㓂三河接薊州有漕運之利初聚工興築虜騎遮我糧船云此我疆界安得設板築德鈞以禮責之出師將擊虜乃退去故城守堅完到今為形勝之要王晏球為北靣招討副使天成二年九月奏准宣差兵士築城於閻溝店初詔城良鄉復設壁於此蓋取幽涿之中塗以備鮮卑之抄掠也西方鄴為䕫峽節度天成元年十月奏瞿城峽口増脩寨柵楊漢章為雲州節度使天成四年奏修築寰州城池張廷翰為兾州刺史廣順元年八月奉詔率白丁修武疆深州城隍周李重進為淮南道行營招討使顯徳二年十一月上言淮宣夾淮城正陽下蔡功畢仍以圖上進楊信為夀州節度使顯德四年四月奉詔發部内丁夫廣夀州新城冊府元龜卷四百十
