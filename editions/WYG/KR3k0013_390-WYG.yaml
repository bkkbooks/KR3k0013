body:
  text: 册府元龜卷三百九十宋王欽若等撰將帥部誓師警備誓師夫戎者國之大事將者人之司命故周官有五戒千車存乎軍禮兵法有三誓交刅所以致志斯蓋申嚴師律重用民命者也三代而下曷嘗去兵乃有奉辭董衆㳟行討伐紏義赴難志翦凶慝飭桓桓之旅勵逐逐之氣躬秉旄鉞職在旗鼔忠果内激稜威旁騖敦陳成列抗詞出令聲氣慷慨士衆聳勸誠心濬發怒氣兼倍用能摧堅履險而無憚取亂侮亡之必克率和毅勇以集巨伐斯蓋經武之大猷治戎之善志者也傳曰辭之不可以已又曰動人以行不以言自非由衷激憤精意感厲亦何以致人之死力乎夏羲和湎淫廢時亂日羲氏世掌天地四時之官自唐虞至三代世職不絶太康之後沉湎于酒過差非度廢天時亂甲乙𦙍往征之作𦙍征𦙍國之君受王命往征之𦙍征曰奉辭罰罪曰征惟仲康肇位四海羿廢太康而立其弟仲康為天子𦙍侯命掌六師仲康命𦙍侯掌主六師為大司馬羲和廢厥職酒荒于厥邑舎其職官還其私邑以酒迷亂不修其業𦙍侯承王命徂征徂往也就其私邑往討之告於衆曰嗟予有衆誓勅之聖有謨訓眀徴定保徴證保安也聖人所謀之敎訓為世眀證所以定國安家先王克謹天戒臣人克有常憲言君能慎戒臣能奉有常法百官修輔厥后惟明眀修職輔君君臣俱眀每嵗孟春遒人以木鐸徇于路遒人宣令之官木鐸金鈴木舌所以振文敎官師相規工執藝事以諌官師衆官更相規闕百工各執其所治枝藝以諌失常其或不恭邦有常刑言百官廢其職服大刑惟時羲和顛覆厥德顛覆言反倒將陳羲和所犯故先舉孟春之令犯令之誅沉亂于酒畔官離次沉謂醉㝠失位次也俶擾天紀遐棄厥司俶始擾亂也紀謂時日司所主也乃季秋月朔辰弗集于房辰日月所㑹房所舎之次集合也不合即日食可知瞽奏鼓嗇夫馳庶人走凡日食天子伐鼓於社責上公瞽樂官樂官進鼓則伐之嗇夫主幣之官馳取幣禮天神庶人走供救日食之百役也羲和尸厥官罔聞知主其官而無聞知于日食之變異所以罪重昬迷于天象以干先王之誅閤錯天象言昬亂之甚干犯也政典曰先時者殺無赦政典夏后為政之典籍若周官六卿之治典先時謂厯象之法四時節氣弦望晦朔先天時則罪死無赦矣不及時者殺無赦不及謂厯象後天時雖治其官茍有先後之差則無赦况廢官乎今予以爾有衆奉將天罸將行也奉王命行王誅謂殺湎淫之身立其賢子弟爾衆士同力王室尚弼予欽承天子威命以天子威命督其士衆使用命火炎崑岡玉石俱焚山脊曰岡崑山出玉言火逸而害玉天吏逸德烈于猛火逸過天王之吏為過惡之徳其傷害天下甚於火之害玉猛火烈矣又烈於火殱厥渠魁脅從㒺治殱滅渠大魁帥也指謂羲和罪人之身其脅從距王師者無治舊染汙俗咸與維新言其餘人久染汙俗本無惡心皆與更新一無所問嗚呼威克厥愛允濟愛克厥威允罔功以愛勝威無以濟衆信無功其爾衆士懋戒哉言當勉以用命戒以辟戮大公望從武王東伐以觀諸侯集否師行師尚父左仗黃鉞右把白旄以誓曰蒼兕蒼兕總爾衆庶與爾舟楫後至者斬遂至孟津諸侯不期而㑹者八百晉趙鞅納衛太子于戚八月齊人輸范氏粟鄭子姚子般送之子姚罕逺子般駟𢎞士吉射送之趙鞅禦之遇於戚陽虎曰吾車少以兵車之斾與罕駟兵車先陳斾先駟車也以先駟車益其兵車以示衆罕駟自後隨而從之既㑹之簡子誓曰范氏中行氏反易天命不喜君也斬艾百姓欲擅晉國而滅其君寡君恃鄭而討焉今鄭為不道棄君助臣二三子順天眀從君命經德義除詬恥在此行也克敵者上大夫受縣下大夫受郡周書作維篇千里百縣縣有四郡士田十萬十萬畆也庶人工商遂得遂進士人臣隸圉免去厮役志父無罪君實圖之志父趙簡子之一名也言己事濟君當圖其賞若其有罪絞縊以免絞所以縊人物桐棺三寸不設屬辟屬辟官之重數王四重君再重素車樸馬以載板無入于兆兆葬域下卿之罰也為衆設賞自設罰所以能克敵甲子將戰簡子廵列曰畢萬匹夫也七戰皆獲有馬乘死於牖下畢萬晉獻公卿也皆獲有功死於牖下言得壽終羣子勉之死不在㓂言有命後漢齊武王伯升既破甄阜軍乃陳兵誓衆焚積聚破釜甑鼓行而前吳漢為大司馬率諸將圍蘇茂於廣樂時劉永將周建救廣樂漢與戰不利墮馬傷膝還宫建等遂使連兵入城諸將謂漢曰大敵在前而公傷卧衆心懼矣漢乃勃然裹創而起椎牛饗士令軍中曰賊衆雖多皆刼掠羣盜勝不相讓敗不相救非有仗節死義者也今日封侯之秋諸君勉之於是軍士激怒人倍其氣建武十二年漢與諸將伐公孫述漢乗利遂自將歩騎二萬餘人進逼成都去城十餘里阻江北為營作浮橋使副将劉尚将萬餘人屯於江南相去二十餘里述使其将謝豐袁吉将衆十萬許分為二十餘營并出攻漢使别将萬人刼劉尚令不得相救漢與大戰一日兵敗走入壁豐因圍之漢乃召諸将厲之曰吾共諸君踰越險阻轉戰千里所在斬獲深入敵地至其城下而今與劉尚二處受圍勢既不接其禍難量欲濳師就尚於江南并兵禦之若能同心一力人自為戰大功可立如其不然敗必無餘成敗之機在此一舉諸将皆曰諾於是饗士秣馬閉營三日不出乃多樹幡旗使烟火不絶夜銜枚引兵與劉尚合軍豐等不覺明日乃分兵拒水北自将攻江南漢悉兵迎戰自旦至晡遂大破之傅俊為積弩将軍禮請郅惲為将兵長史授以軍政惲乃誓衆曰無掩人不備竆人於厄不得斷人支體祼人形骸放淫婦女張超為廣陵太守請郡人臧洪為功曹董卓圖危社稷洪說超誅滅國賊為天下倡義超然其言與洪西至陳留見兄邈計事邈使洪詣兖州刺史劉岱豫州刺史孔佃遂皆相善邈既先有謀約會超至定議乃與諸牧守大會酸棗設壇場将盟既而更相辭讓莫敢先登咸共推洪洪乃攝衣升壇操血而盟曰漢室不幸皇綱失墜賊臣董卓乗隙縱害禍加至尊毒流百姓大懼淪喪社稷翦覆四海兖州刺史岱豫州刺史佃陳留太守邈東郡太守瑁橋瑁也廣陵太守超等糺合義兵並赴國難凡我同盟齊心一力以致臣節隕首喪元必無二志有渝此盟俾墜其命無克遺育皇天后土祖宗明靈實皆鍳之洪辭氣慷慨聞其言者無不激揚晉郗鑒為大将軍徐州刺史時蘇峻為亂京師䧟没鑒聞之流涕設壇場刑白馬大誓三軍曰賊臣祖約蘇峻不恭天命不畏王誅凶戾肆逆干國之紀陵汨五常侮弄神器遂制脅幽主拔本塞源殘害忠良禍虐黎庶使天地神祗靡所歸依是以率土怨酷兆庶泣血咸願奉辭討罪以除元惡昔戎狄泯周齊桓紏盟董卓陵漢羣后致討義存君親古今一也今主上幽危百姓倒懸忠臣正士志存報國凡我同盟既盟之後戮力一心以救社稷若二寇不梟義無偷安有渝此盟神明殛之鑒登壇慷慨三軍争為用命前秦王猛為司徒録尚書事将兵伐慕容暐既䧟并州暐遣慕容評率四十萬衆以救之乃陣於滑源猛誓衆曰王景畧受國厚恩任兼内外今與諸君深入賊地宜加勉進不可退也願戮力行間以報恩顧受爵明君之朝慶觴父母之室不亦美乎衆皆勇奮破釡棄糧大呼競進梁王僧辨為江州刺史侯景僭逆僧辨發自江州直指建業先是陳霸先率衆五萬出自南江僧辨會于白茅洲登壇盟誓共讀盟文皆淚下霑㯲辭色慷慨隋衛𤣥字文昇為刑部尚書煬帝幸遼東𤣥與代王留守京師㑹楊𤣥感圍逼東都𤣥率歩騎七萬援之旣度函谷於是遣武賁郎將張峻為疑軍於南道𤣥以大兵直趨城北𤣥感逆拒之且戰且行屯軍金谷於軍中掃地而祭髙祖曰刑部尚書京兆内史臣衛文昇敢昭吿於髙祖文皇帝之靈自皇家啓運三十餘年武功文徳漸被海外楊𤣥感孤負聖恩躬為蛇豖蜂飛蟻聚犯我王略臣二世受恩一心事主董率熊羆志梟凶逆若社稷靈長宜令醜徒氷碎如或大運去矣幸使老臣先死詞氣抑揚三軍莫不涕咽唐韋陟為江南東道採訪使肅宗至徳中江東永王擅起兵詔陟為江東節度使以招喻之陟與淮南節度使髙適淮西節度使來瑱等同至安州陟謂適瑱曰今中原未復江淮動揺人心安危實在兹日若不齊盟質信昭示四方令知三帥恊心萬里同力則難以集事矣陟推瑱為地主遂為載書登壇誓衆曰淮南節度使御史大夫適等銜國威命各鎭方隅糺合三垂翦除凶慝好惡同之無有異志有渝此盟墜命亡族無克生育皇天后土祖宗明神實鑒斯言陟等詞㫖慷慨血淚俱下三軍感激莫不隕泣其後江表樹碑以記忠烈張巨濟為神策軍使與兵馬使楊惠元鎭奉天德宗初詔移京西戎兵萬二千人以備關東御望春樓親誓師以遣之及賜宴諸将列坐酒至神策将士皆不飲帝使問之惠元對曰臣初發奉天本軍帥張巨濟與臣等約曰斯役也将策大勲建大名凱旋之日當共為歡茍未戎㨗無飲酒故臣等不敢違約而飲既發有司供餼於道路他軍無孑遺惟惠元一軍缻罍不發帝稱歎之李晟興元初為副帥討朱泚屯兵渭橋帥三軍曰今國歩多艱亂逆繼興屬車西幸關中無主吾等皆受國恩見危死節臣子之分況當此時不能清寇孽取富貴非士也渭橋跨大川吾與公等戮力一心擇利而進興復大業建不世之功能從我乎軍士皆泣下曰唯公所命晟亦歔欷流涕韋臯為御史大夫隴州刺史奉義軍節度使德宗幸奉天臯遣從父兄平及弇繼入奉天城中聞臯有備士氣増倍臯乃築壇于庭血牲與将士盟曰上天不弔國家多難逆臣乗間盜據皇宫而楚琳亦扇兇徒傾䧟城邑酷虐所加爰及本使既不事主安能恤下臯是用激心憤氣不遑底寧誓與羣公竭誠王室凡我同盟一心竭力仗順除兇祖先之靈必當幽贊言誠則志合義感則心齊粉骨糜軀決無所顧有渝此志明神殛之殆於子孫其㒺遺育皇天后土當鑒斯言又使人通於吐蕃以求助朱泚既滅授右金吾衛将軍兼禮部尚書尋遷大将軍馬燧為将善誓師将戰親自號令士無不感動戰皆決死未嘗折北警備書曰警戒無虞左傳曰不備不虞不可以師蓋古之善将兵者曷嘗不堅壁深壘整衆敦陣險其走集明其伍候先據要害以占勢勝為之備豫防乎侵軼以治而待亂以逸而待勞保於未危制於未兆因能摧勁敵集巨伐紏合羣志輔成大業守境者克寧其封守備患者無憚乎夭癘斯所謂固圉重閉眞古之善敎哉史駢晉人為上軍佐秦伯伐晉晉人御之從秦師於河曲駢曰秦不能乆請深壘固軍以待之從之倚相為楚左史楚伐呉救之軍行三十里雨十日夜見星倚相謂子期曰子期公子結也雨十日甲輯兵聚呉人必至不如備之乃為陣而呉人至見有備而反李牧趙人為邊将常居代鴈門備匃奴以便宜置吏市租皆輸入莫府将軍征行無常處所在為治故言莫府莫大也為士卒費日擊數牛饗士習射騎謹􅇏火多間諜厚遇戰士如是數歲亦不亡失漢郭亭為連敖從高祖起單父以塞路入漢還定三秦塞路者主遮塞要路以備敵宼也李廣以邊太守将屯及擊胡而廣行無部伍行陣就善水草屯舍止人人自便不擊刁斗自衛幕府省約文書然亦遠斥候未嘗遇害周亞夫為車騎将軍景帝時七國反亞夫東擊呉深壁而守使輕騎絶呉楚兵後呉數挑戰終不出頃之呉奔壁東南陬陬隅也于後切又音鄒亞夫使備西北已而精兵果奔西北不得入後漢杜茂為車騎大将軍光武建武九年與鴈門太守郭涼擊盧芳将尹由於繁畤今代州縣也時盧芳據高柳與匃奴連兵數寇邊民帝患之十二年遣謁者段忠将衆郡弛刑配茂鎭守北邊因發邊卒築亭候脩􅇏火委輸金帛繒絮供給軍士并賜邊民冠蓋相望茂亦建屯田驢車轉運岑彭為征南大将軍南擊秦豐豐與其大将蔡宏拒彭於鄧彭濳兵度沔水擊其將張楊於阿頭山大破之豐救之彭與諸將依東山為營豐與蔡宏夜攻彭彭豫為之備出兵逆擊之豐敗走馬成為揚武將軍建武十三年屯常山中山以備北邊并領建義大將軍朱祐營又代驃騎杜茂繕治障塞自西河至渭橋河上至安邑太原至井陘中山至鄴皆築保壁起􅇏燧十里一候郭伋為漁陽太守時匃奴數抄郡界邊境苦之伋整勒士馬設攻守之畧匃奴畏憚遠跡不敢復入塞民得安業後以盧芳據北土乃調伋為并州牧伋知盧芳夙賊難卒以力制常嚴􅇏候明購賞以結寇心芳將隋昱遂謀脅芳降伋芳乃亡入匃奴耿秉為征西將軍副車騎將軍竇憲擊北匃奴秉性勇壮而簡易於事軍行常自被甲在前休止不結營部然逺斥候明要誓有警軍陳立成士卒皆樂為死魏夏侯尚為征南將軍假節督南方諸軍事時孫權雖稱藩尚益修攻討之備後權果有貳心滿寵為伏波将軍屯新野大軍南征到精湖寵帥諸軍在前與賊隔水相對寵勑諸将曰今夕風甚猛賊必來燒軍宜為其備諸軍皆警夜半賊果遣十部伏夜來燒寵掩擊破之進封南鄉侯太和二年領豫州刺史三年春降人稱呉大嚴揚聲詣江北獵孫權欲自出寵度其必襲西陽而為之備權聞之退還呉呂據為越騎校尉太元元年大風江水溢流漸淹城門權使視水獨見據使人取大舩以備害權嘉之拜盪魏将軍孫韶吴帝族弟河之子河為媯覽所殺韶年十七收河餘衆繕治京城起樓櫓脩器備以禦敵權聞亂從椒丘還過定丹陽引軍歸呉夜至京城下營試攻驚之兵皆乗城𫝊檄備警讙聲動地頗射外人權使曉喻乃止明日見韶甚器之即拜承烈校尉統河部曲食曲阿丹徒二縣自置長吏一如河舊後為廣陸太守及大帝稱尊號韶為鎮北將軍在邊數十年常以警疆場逺斥候為務先知動靜而為之備故鮮有負敗晉蔡謨為征北將軍領徐州刺史石季龍於青州造舩數百掠縁海諸縣所在殺戮朝廷以為憂謨遣龍驤將軍徐𤣥等守中洲并設募君得賊大舩者賞布千疋是時謨所統七千餘人所戍東至土山西至江乗鎮守八所城壘凡十一處􅇏火樓望三十餘處隨宜防備甚有筭畧馮宏為北燕馮跋將馮弟萬泥叛宏與將軍張興計之興謂宏曰賊明日出戰今夜必來驚營宜備不虞宏乃密遣人課草十東畜火伏兵以待之是夜果遣壮士千餘人來斫營衆火俱起伏兵邀擊俘斬無遺南齊蕭景先為持節督司州軍事寧朔將軍司州刺史領義陽太守時魏軍出淮泗増司部邊戍兵義陽人謝天蓋與魏相構扇魏尋遣南部尚書頞跋屯汝南雒州刺史昌黎王馮莎屯清丘景先嚴備待敵豫章王又遣寧朔將軍王僧炳前軍將軍王應之龍驤將軍莊明三千人屯義陽闗外為聲援魏軍退進號輔國將軍陳周文育為智武將軍文帝濟江襲㑹稽太守張彪得其郡城及帝為彪所襲文育時頓城北香嚴寺帝夜徃趨之因共立栅頃之彪又來攻之文育悉力苦戰彪不能尅後魏于栗磾明元時為河内鎮將宋武帝之伐姚泓也栗磾慮其北擾遂築壘於河上親自守焉禁防嚴密斥候不通宋師憚之不敢前進司馬楚之太武時為散騎常侍車駕伐蠕蠕詔楚之與濟陰公盧中山等督運以繼大軍時鎮北將軍封沓亡入蠕蠕說令擊楚之等以絶糧蠕蠕乃遣姦覘入楚之軍截驢耳而去有告失驢耳者諸將莫能察楚之曰必是覘賊截之以為驗爾賊將至矣即使軍人伐桞為城水灌之令凍城立而賊至氷峻城固不可攻逼賊乃走散帝聞而嘉之尋拜假節侍中鎮西大將軍古弼太武時典南部奏事與劉㓗屯五河北以備叛民盧淵為京兆王愉徐州長史南徐州刺史沈陵密謀外叛淵覺其萌漸濳勅諸戍微為之備屢有表聞朝廷不納陵果殺將佐勒宿預之衆逃叛濱淮諸戍繇備得全尉元為冠軍将軍東平太守無鹽戍主申纂詐降元知非誠欵外示容納而密備焉皮豹子為仇池鎭将與古弼等討仇池楊難當平之未幾諸氐復仄推楊文德為主以圍仇池古弼率諸軍討平之時豹子㳄于下辨聞圍解欲還弼遣使謂豹子曰賊恥其負敗必來報復發舉為難不如陳兵以待之豹子以為然尋除秦雍荆梁益五州諸軍事開府仇池鎭将于烈宣武時為車騎大将軍太尉咸陽王禧謀反武興王楊集始馳於北邙以告時帝從禽於野左右分散直衛無幾倉卒之際莫知訃之所出乃勑烈子忠馳覘虛實烈時留守已處處有備因忠奏曰臣雖朽邁心力猶可此等猖狂不足為慮願緩蹕徐還以安物望帝聞之甚以慰恱曹世表為左軍将軍兼尚書東道行臺㳂河分立鎭戍以備葛榮葛榮五原叛黨司馬子如為爾朱榮司馬軍次高都以建興險阻往來衝要有後顧之憂以子如行建興太守當郡都督北齊斛律光後主武平中為并州刺史率衆築平隴衛壁統戎等鎮戍十有三所後周王思政為驃騎将軍鎭𢎞農思政以玉壁地在險要請築城即自營度移鎭之遷并州刺史仍鎭玉壁於是脩城廓起樓櫓營田農積芻秣凡可以守禦者皆具焉𢎞農之有備自思政始也宇文測為大都督行綏州事每歲河氷合後突厥即來寇掠先是常預遣居民入城堡以避之測至皆令安堵如舊乃於要路數百處并多積柴仍逺道斥候知其動靜是年十二月突厥從連谷入寇去界數十里測命積柴之處一時縱火突厥謂有大軍至懼而遁走自相蹂踐委棄雜畜及輜重不可勝數測徐率所部收之分給百姓自是突厥不敢復至測因請置戍兵以備之隋高熲為監軍尉遲逈之起兵也高祖令韋孝寛擊之熲至軍為橋於沁水賊欲上流縱大栰熲預為木槆以禦之既度焚橋而戰大破之獨孤楷仁壽初為原州總管時蜀王秀鎭益州文帝徴之猶豫未發朝廷恐秀生變拜楷益州總管馳𫝊代之秀果有悔色因勒兵為備秀至興樂去益州四十餘里将反襲楷密令左右覘所為知楷不可犯而止乞伏慧為涼州總管先是突厥屢為寇抄慧於是嚴警􅇏燧逺為斥候虜亦素惮慧名竟不入境蘇䕫為鴻臚少卿從煬帝幸鴈門為突厥所圍䕫領城東靣事䕫為弩樓車箱獸圏一夕而就帝見而善之以功進位通議大夫唐劉宏基武德中為井越将軍㑹突厥入寇宏基率歩騎一萬自豳州北界東拒子午嶺西接臨涇修營鄣塞副淮安王神通備胡寇於北鄙薛萬均為左屯衛将軍從李靖等擊吐谷渾軍㳄青海與萬徹率軍先路道遇虜於赤海萬均将十數騎擊走之追奔至積石山南道大風折旗拔木萬均謂左右曰虜将至矣宜合為備俄而虜至萬均直前斬一賊将於是大潰宇文士及檢校涼州都督時突厥屢為邊寇士及欲立威以鎭邊服毎出入陳兵盛為容衛黒齒常之高宗調露二年吐蕃寇河源河西鎭撫大使李敬𤣥敗績常之為副使頻有戰功擢為河源軍經畧大使詔敬𤣥留鎭鄯州以為之援常之始令遠置􅇏戍開屯田五千餘頃戰守有備吕諲上元元年為荆州節度因請於荆州置南郡改州為江陵府永平軍團練三千人以遏呉蜀之口及至鎭又析江陵置長寧縣又請𨽻湖南岳潭衡柳道邵連七州黔中之涪州並管於江陵李晟德宗興元初為副元帥討朱泚既收復京城晟令蓋渉領兵屯於白華以備苑囿尚可孤屯于望仙門駱元光屯于章敬寺南晟以牙兵三千人屯于安國寺南駱元光為華州節度貞元三年侍中渾瑊為吐蕃㑹盟使元光以兵赴之将發涇州元光謂瑊曰本奉詔命令營於潘原堡以應援竊以潘原堡去盟所六七十里蕃情多詐侍中儻有急我何繇知之請次為營以虞其變瑊以非詔㫖固止之元光竟與同進瑊之營西去盟所二十餘里元光營次之其濠栅頗深固瑊之濠栅可踰焉及瑊單騎奔歸未及其營守将李朝彩不能整衆多已奔散瑊之至也空營而已器械資糧悉棄之頼元光之衆陣於營中瑊既入賊追騎乃退元光乃先進輜重次與瑊俱退申其號令嚴其部伍而還時以為有将帥之風焉曹王臯為襄州節度練兵積財儲糧修車市㢠廻紇馬以益騎兵馬燧為河東節度造甲者必令長短三等構其所衣以便進趨又造戰車象以狻猊刺㦸於後行則載兵甲止則為營陣或塞險阨以遏奔衝器械無不犀利范希朝為振武節度使振武有党項室韋交居川阜陵犯為盜日入慝作謂之刮城門居人惶駭鮮有寧日希朝周知要害置堡栅斥候嚴密人遂獲安張獻甫為邠寧節度使乃於彭元置義方渠馬領等縣選險要之地以為􅇏堡又上疏請復置鹽州及洪門雒原等鎮各置兵防以備蕃寇朝廷皆從之縁邊軍州安恱髙崇文為左神策行營節度使討劉闢崇文初為長武城使練卒五千常若寇至及使至長武卯時宣命辰時出師五千器用無闕者曹華為襄城鎮將憲宗元和十二年七月裴度克淮西宣慰處置使八月甲申至郾城初度過襄城南白草原賊以驍騎七百邀之華先是戒嚴賊折其銳而還李祐為夏州節度使穆宗長慶元年二月統所部四千赴長澤鎭以備邊寇高丞為邠寧慶等州節度觀察處置等使先是羌虜多以秋月犯西邊丞請軍寧州以備之李載義為太原節度使太和九年九月戊申奏差兵三千人防遏當界吐渾部落梁高萬興為延州刺史開平三年九月奏邠鳳賊百騎至韓家寨酈州請添兵於本佛寨犄角備禦後唐史儼唐乾寧中從武皇討王行瑜師㳄渭北武皇遣儼率五百騎䕶駕石門時京城大擾士庶奔迸散布南山儼分騎警衛比駕還京盜賊不作以功檢校右散騎常侍屯於三橋者累月昭宗寵錫優異田承肇鎭晉州上言覘知綏州銀州㑹兵未知所向謹戍兵斥候劉鄩為鎭南軍節度使末帝貞明元年禦晉人於㳂朔以魏之臨清積粟所在引軍将據之遇将周陽五自幽州率兵至鄩乃趨貝州與晉軍遇於堂邑邀擊却之追北五十餘里遂軍於莘縣増城壘浚池湟自華及河築甬道以通餉路晉李周初仕後唐武皇為安霸都指揮使率兵屯臨河楊劉莘縣所至與士卒同甘苦不嚴而整善守備梁軍望其樓櫓如九天之上不知所攻周孫漢均為絳州廣順元年二月言州無守禦兵士今欲抽鄕兵千人防城從之陳思譲廣順元年三月奉詔率兵往磁州控扼黄澤路十月甲寅淄州言萊無鹽為草寇奔衝城壁無可固禦欲率兵五百板築從之劉詞為邢州節度使廣順元年并寇攻晉州詞言上淮請改栅并寨為大城寨至馬嶺寨已來排􅇏火册府元龜卷三百九十
