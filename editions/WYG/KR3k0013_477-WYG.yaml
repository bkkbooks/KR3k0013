body:
  text: 册府元龜卷四百七十七宋王欽若等撰臺省部謀畫漢室而下借箸引籍出入禁闥者皆天子從官而居議臣之任也魏晉而下叅掌機要彌縫政典亦乃佐佑大化而總裁衆務焉固其濟濟而富賢材藹藹而多吉士乃有深達治本詳識國體洞經綸之術練安危之計策慮胸臆智略輻輳或發於占對而曲暢幾微或形於疏議而咸有倫脊談必極於時變誠因彰於忠藎流風嘉論信而有徵斯皆名臣之陳迹立言之不朽者已漢主父偃武帝時為中大夫偃説帝曰古者諸侯地不過百里強弱之形易制也今諸侯或連城數十地方千里緩則驕奢易為淫亂急則阻其強而合從以逆京師今以法割削即逆節萌起前日鼂錯是也今諸侯子弟或十數而適嗣代立餘雖骨肉無尺地之封則仁孝之道不宣願陛下令諸侯得推恩分子弟以地侯之彼人人喜得所願上以徳施實分其國必稍弱矣於是帝從其計因令闗馬及弩不得出絶游説之路重附益諸侯之法急詿誤其君之罪諸侯王遂以弱而合從之事絶矣魏荀彧漢末為侍中守尚書令建安九年或説太祖宜復古置九州則冀州所制者廣大天下服矣太祖將從之彧言曰若是則冀州當得河東馮翊扶風西河幽并之地所奪者衆前日公破袁尚擒審配海内震駭必人人自恐不得保其土地守其兵衆也今使分屬冀州将皆動心且人多説闗右諸將以閉闗之計今聞此以為必以次見奪一旦生變雖有善守者轉相脅為非則袁尚得寛其死而袁譚懐貳劉表遂保江漢之間天下未易圗也願公急引兵先定河北然後脩復舊京南臨荆州責貢之不入則天下咸知公意人人自安天下大定乃議古制此社稷長乆之利也太祖報曰微足下之相難所失多矣遂寢九州議後太祖將伐劉表問彧䇿安出彧曰今華夏已平南土知因矣可顯出宛葉而間行輕進以掩其不意太祖遂行會表病死太祖直趨宛葉如彧計表子琮以州逆降桓階為尚書時曹仁為闗羽所圍太祖遣徐晃救之不觧太祖欲自南征以問羣下羣下皆謂王不亟行今敗矣階獨曰大王以仁等為足以料事勢不也曰能大王恐二人遺力邪曰不然則何為自往曰吾恐虜衆多而晃等勢不便耳階曰今仁等處重圍之中而守死無貳者誠以大王逺為之勢也夫居萬死之地必有死争之心内懐死争外有強救大王按六軍以示餘力何憂於敗而欲自往太祖善其言駐軍於摩陂賊遂退衛覬為尚書是時闗西諸將外雖懐附内未可信司𨽻校尉鍾繇求以三千兵入闗外託討張魯内以脅取質任太祖使荀彧問覬覬以為西方諸將皆豎夫崛起無雄天下意茍安樂目前而已今國家厚加爵號得其所志非有大故不憂為變也宜為後圗若以兵入闗中當討張魯魯在深山道徑不通彼必疑之一相驚動地險衆彊殆難為慮或以覬議呈太祖太祖初善之而以繇自典其任遂從繇議兵始進而闗右大叛太祖自親征僅乃平之死者萬計太祖悔不從覬議繇是益重覬劉􅁮為侍中黄初中孫權遣使求降文帝以問曄曄對曰權無故求降必内有急權前襲殺蜀將取荆州四郡備怒必大興師伐之外有強寇衆心不安又恐中國承其釁而伐之故委地求降一以却中國之兵二則假中國之援以彊其衆而疑敵人權善用兵見策知變其計必出於此今天下三分中國十有其八吴蜀各保一州阻山依水有急相救此小國之利也今還自相攻天亡之也宜大興師徑渡江襲其内蜀攻其外我襲其内吴之亡不出旬月矣吴亡則蜀孤若割吴半蜀固不能乆存况蜀得其外我得其内乎帝曰人稱臣降而伐之疑天下欲來者心必以為懼其殆不可孤何不且受吴降而襲蜀之後乎對曰蜀逺吴近又聞中國伐之便還軍不能止也今備已怒故興兵擊吴聞我伐吴知吴必亡必喜而進與我争割吴地必不改計抑怒救吴必然之勢也帝不聽遂受吴降即拜權為吴王􅁮又進曰不可先帝征伐九分天下兼其八威震海内陛下受禪即真徳含天地聲暨四逺此實然之勢非卑臣頌言也權雖有雄才故漢驃騎將軍南昌侯耳官輕勢卑士民有畏中國心不可彊廹與成所謀也不得已受其降可進其將軍號封十萬戸侯不可即以為王也夫王位去天子一階耳其禮秩服御相亂也彼直為侯江南士民未有君臣之義也我信其偽降就封殖之崇其位號定其君臣是為虎傅翼也權既受王位却蜀兵之後外盡禮事中國使其國内皆聞之内為無禮以怒陛下陛下赫然發怒興兵討之乃徐告其民曰我委身事中國不愛珍貨重寳隨時貢獻不敢失臣禮也無故伐我必欲殘我國家俘我民人子女以為僮𨽻僕妾吴民無縁不信其言也信其言而感怒上下同心戰加十倍矣又不從遂即拜權為吴王權將陸遜大敗劉備殺其兵八萬人備僅以身免權外禮愈卑而内行不順果如曄言蔣濟文帝時為尚書車駕征吴幸廣陵濟表水道難通又上三州論以諷帝帝不從於是戰船千數皆滯不得行議者欲就留兵屯田濟以為東近湖北臨淮若水盛時賊易為寇不可安屯帝從之車駕即發還到精湖水稍盡盡留船付濟船本歴適數百里中濟更鑿地作四五道蹴船令聚豫作土豚遏斷湖水皆引後船一時開遏入淮中帝還雒陽謂蔣濟曰事不可不曉吾前決謂分卒燒船於山陽池中卿於後致之略與吾俱至譙又每得所陳實入吾意自今討賊計畫善思論之明帝即位大司馬曹休帥軍向皖濟表以為深入虜地與孫權精兵對而朱然等在上流乗休後臣未見其利也軍至皖吴出兵安陸濟又上䟽曰今賊示形於西必欲并兵圗東宜急詔諸軍往救之會休軍已敗盡棄器仗輜重退還吴欲塞夾口遇救兵至是以官軍得不沒焉劉放為中書監青龍初孫權與諸葛亮連和欲俱出為寇邉候得權書放乃改易其辭往往換其本文而傅合之與征東將軍滿寵若欲歸化封以示亮亮謄與吴大將歩隲等以見權權懼亮自疑深自觧説孫資為中書令明帝太和末吴遣將周賀浮海詣遼東招誘公孫淵帝欲邀討之朝議多以為不可惟資決行策果大破之又烏丸校尉田豫帥西部鮮卑泄歸尼等出塞討軻比能智鬰築鞬破之還至馬邑故城比能帥三萬騎圍豫帝聞之計未有所出如中書省以問監令資對曰上谷太守閻志柔弟也為比能素所歸信令馳詔使説比能可不勞師而自觧矣帝從之比能果釋豫而還劉邵為散騎常侍青龍中吴圍合肥時東方吏士皆分休征東將軍滿寵表請中軍兵并召休將士須集擊之邵議以為賊衆新至心專氣銳寵以少人自戰其地若便進擊不必能制寵求待兵未有所失也以為可先遣歩兵五千精騎三千軍前發揚聲進道震曜形勢騎到合肥疏其行隊多其旌皷曜兵城下引出賊後擬其歸路要其糧道賊聞大軍來騎斷其後必震怖遁走不戰自破賊矣帝從之兵比至合肥賊果退還晉安平王孚魏文帝時為度支尚書孚以為擒敵制勝宜有備預毎諸葛亮入寇闗中軍兵不能制敵中軍奔赴輒不及事機宜預選歩騎二萬以為二部為討賊之備張華為中書令加散騎常侍武帝潛與羊祜謀伐吴而羣臣多以為不可唯華贊成其計其後祜疾篤帝遣華詣祜問以伐吴之策及將大舉以華為度支尚書乃量計運漕決定廟算衆軍既進而未有剋獲賈充等奏誅華以謝天下帝曰此是吾意華但與吾同耳時大臣皆以為未可輕進華獨堅執以為必剋郄鑒明帝時為尚書令與帝謀滅王敦既而錢鳳攻逼京都時議者以王含錢鳳衆力百倍苑城小而不固宜及軍勢未成大駕自出距戰鑒曰羣逆縱逸其勢不可當可以算屈難以力競且含等號令不一抄盜相尋百姓懲往年之暴皆人自為守乗逆順之勢何往不剋且賊無經略逺圗惟恃豕突一戰曠日持乆必啟義士之心令謀猷得展今以此弱力敵彼彊寇決勝負於一朝定成敗於呼吸雖有申胥之徒義存投袂何補於既往哉帝從之孔坦成帝時為尚書左丞屬蘇峻反坦與司徒司馬陶回謂王導曰及峻未至宜急斷阜陵之界守江西當利諸口彼少我衆一戰決矣若峻未來可往逼其城今不先往峻必先至先人有奪人之功時不可失導然之庾亮以為峻脱逕來是襲朝廷虛也故計不行峻遂破姑熟取鹽米亮方悔之王彪之為吏部尚書時簡文帝為撫軍執政太尉桓温欲北伐屢詔不許溫輒下武昌人情震懼或勸殷浩引身告退彪之言於簡文曰此非保社稷為殿下計皆自為計爾若殷浩去職人情驚駭天子獨坐既爾當有任其責者非殿下而誰又謂浩曰彼抗表問罪卿為其首事任如此猜釁已搆欲作匹夫豈有全地邪且當静以待之令相王與手書示以欵誠陳以成敗當必旋斾若不順命即遣中詔如復不奉乃當以正義相裁無故悤悤先自猖獗浩曰決大事正自難頃日來欲使人悶聞卿此謀意始得了溫亦奉帝㫖果不進宋謝靈運文帝時為侍中陳疾東歸將行上書勸伐河北曰自中原䘮亂百有餘年流離寇戎湮沒殊類先帝聰明神武哀濟羣生將欲盪定趙魏大同文軌運謝事乖理違願絶仰徳抱悲恨存生盡况陵塋未幾凶虜伺隙預在有識誰不憤歎而景平執事竝非其才且遘紛京師豈慮託付遂使孤城窮陷莫肯拯赴綿河千里飜為寇有晩遣鎮戍皆先朝之所開拓一旦淪亡此國耻宜雪被於近事者也又北境自染逆虜窮苦備罹徵調賦歛靡有止已所求不獲輒致誅殞身禍家破闔門比屋此亦仁者所為傷心者也咸云西虜捨末逺師隴外東虜乗虛呼可掩襲西軍既反得據闗中長圍咸陽還路已絶雖遣救援停住河東遂乃逺討天城欲為首尾而西寇深山重阻根本自固徒棄巢窟未足相拯師老於外國虛於内時來之會莫復過此觀兵耀威實在兹日若相持未已或生事變忽值新起之衆則異於今茍乖其時難為經略雖兵食倍多則萬全無必矣又歴觀前代類以兼弱為本古今聖徳未之或殊豈不以天時人事理數相得興亡之度定期俱然故古人云既見天殃又見人災乃可以謀昔魏氏之強平定荆冀乃乗袁劉之弱晉氏之盛拓開吴蜀亦因葛陸之衰此皆前世成事著於史策者也自羌平之後天下亦謂虜當俱滅長驅滑臺席卷下城奪氣䘮魄指日就盡但長安違律潼闗失守用緩天誅假延嵗月爾來至今十有二載是謂一紀曩有前言况五胡代數齊世虜期餘命盡於來年自相攻伐兩取其困卞莊之形驗之今役仰望聖澤有若渴饑注心南雲為日已乆來蘇之兾實歸聖明此而弗乗後則未兆即曰府藏誠無兼儲然凡造大事待國富兵強不必乗會於我為易貴在得時器械既充衆力粗足方於前後乃當有優嘗議損益乆可以證冀州口數百萬有餘田賦之沃著自貢典先才經創基趾猶存澄流引源桑麻蔽野強富之實昭然可知為國長乆之計孰若一往之費耶或懲闗西之敗而謂河北難守二境形勢表裏不同闗西雜居種類不一昔在前漢屯軍覇上通火甘泉况乃逺戍之軍值新故交代之際者乎河北悉是舊户差無雜人連嶺判阻三闗作隘若游騎長驅則沙漠風靡若嚴兵守塞則冀方山固昔隴西傷破鼂錯興言匃奴慢侮賈誼憤歎方於今日皆為賖矣晉武中主耳值孫皓虐亂天祚其徳亦繇鉅平奉策荀賈折謀故能業崇當年區宇一統况今陛下聰明聖哲天下歸仁文徳與武功竝震霜威共素風俱舉協以宰輔賢明諸王美令岳牧宣烈虎臣盈朝而天威逺命亦何敵不滅矧伊頑虜假日而已哉伏惟深機志務乆定神謨臣卑賤側陋竄景巖宂實仰希太平之道傾覩岱宗之封雖乏相如之筆庻免史談之憤以此謝病京師萬無恨矣乆欲上陳懼在觸冐蒙恩賜假暫違禁省消渴十年嘗慮朝露抱此愚志昧死以聞蔡興宗為吏部尚書時太宗初立諸方竝舉兵反國家所保唯丹陽淮南數郡其間諸縣或已應賊東兵已至永世宮省危懼帝集羣臣以謀成敗興宗曰今普天圗逆人有異志宜鎮之以静以至信待人比者逆徒親戚布在宫省若䋲之以法則土崩立至宜明罪不相及之義物情既定人有戰心六軍精勇器甲犀利以待不習之兵其勢相萬爾願陛下勿憂帝從之後魏張衮為給事中時道武在代衮嘗叅謀慕容寳之復來寇也衮言於道武曰寳乗滑臺之功因長子之捷傾資竭力難與争鋒愚以為宜羸師卷甲以侈其心太祖從之果破之後遷黄門侍郎道武南伐師次中山衮言於道武曰慕容寳慿三世之資城池之固雖皇威震赫勢必擒殄然窮兵極武非王者所宜昔酈生一説田横委質魯連飛書聊將授首臣誠徳非古人略無竒策仰慿靈威庻必有感帝從之衮遺寳書喻以成敗寳見書大懼遂奔和龍既剋中山聽入八議拜衮奮武將軍幽州刺史賜爵臨渭侯崔浩為左光禄大夫南藩諸將表宋文帝戒嚴欲犯河南請兵三萬先其未發逆擊之因誅河北流民在界上者絶其鄉導足以挫其鋭氣使不敢深入詔公卿議之咸言宜許浩曰此不可從也往年國家大破蠕蠕馬力有餘南賊震懼常恐輕兵奄至卧不安席故揚聲動衆以備不虞非敢先發又南土下濕夏月蒸暑水潦方多草木深䆳疾病必起非行師之時且彼先嚴有備必堅城固守屯軍攻之則糧食不給分兵肆討則無以應敵未見其利就使能來待其勞倦秋凉馬肥因敵取食徐往擊之萬全之計勝必可剋在朝羣臣及西北守將從陛下征討西滅赫連北破蠕蠕多獲美女珍寳馬畜成羣南鎮諸將聞而生羨亦欲南抄以取資財是以披毛求瑕妄張賊勢冀得肆心既不獲聽故數稱賊動以恐朝廷背公存私為國生事非忠臣也太武從浩議南鎮諸將復表賊至而自陳兵少簡幽州以南戍兵佐守就漳水造舩嚴以為備公卿議者僉然欲遣騎五千幷假署司馬楚之魯軌韓延之等令誘引邉民浩曰非上策也彼聞幽州已南精兵悉發大造舟船輕騎在後欲存立司馬誅除劉族必舉國駭擾懼於滅亡當悉發精銳來備北境後審知官軍有聲無實恃其先聚必喜而前行徑來至河肆其侵暴則我守將無以禦之若彼有見機之人善設權譎乗間深入虞我國虛生變不難非制敵之良計今公卿欲以威力攘賊乃所以招令速至也夫張虚聲而召實害此之謂矣不可不思後悔無及我使在彼期四月前還可待使至審而後發猶未晩也楚之之徒是彼所忌將奪其國彼安得端坐視之故楚之往則彼來楚之止則彼息其勢然也且楚之等𤨏才能招合輕薄無頼而不能成就大功為國生事使兵連禍結必此之羣矣臣嘗聞魯軌説姚興求入荆州至則散敗乃不免蠻賊掠賣為奴使禍及姚泓已然之效浩復陳天時不利於彼曰今兹害氣在揚州不宜先舉兵一也午嵗自刑先發者傷二也日蝕滅光晝昏星見飛鳥墮落宿值斗牛憂在死亡三也熒惑伏匿於翼軫戒亂及䘮四也太白未出進兵者敗五也夫興國之君先脩人事次盡地利後觀天時萬舉而萬全國安而身盛今宋新國是人事未周也災變屢見是天時不協也舟行水涸是地利不盡也三事無一成自守猶或不安何得先發而攻人哉彼必聽我虛聲而嚴我亦承彼嚴而動兩推其咎皆自以為應敵兵法當分災迎受害氣未可舉動也太武不能違衆乃從公卿議浩復固争不從遂遣陽平王杜超鎮鄴瑯琊王司馬楚之等屯潁川於是賊來遂疾到彦之自清水入河泝流西行分兵列守南岸西至潼闗太武聞赫連定與宋懸分河北乃治兵欲先討赫連羣臣皆曰宋猶在河中舎之西行前宼未可必剋而宋乗虛則失東州矣太武疑焉問計於浩浩曰宋與赫連定同惡相招連結馮䟦牽引蠕蠕規肆逆心虛相唱和宋望定進定待宋前皆莫敢先入以臣觀之有似連雞不得俱飛無能為害也臣始謂宋軍來當屯在河中兩道北上東道向冀州西道衝鄴如此則陛下當自致討不能徐行今則不然東西列兵徑二千里一處不過數千形分勢弱以此觀之儜兒情見止望固河自守免死為幸無北度意也赫連定殘根易摧擬之必仆尅定之後東出潼闗席卷而前則威震南極江淮以北無立草矣聖策獨發非愚近所及願陛下必行勿疑平凉既平其日宴會太武執浩手以示蒙遜使曰所云崔公此是也才略之美當今無比朕行止必問成敗決焉若合符契萬無失矣後冠軍將軍安頡軍還獻南俘囚説南賊之言云宋勅其諸將若北國兵動先其未至徑前入河若其不動住彭城勿進如浩所量太武謂公卿曰卿軰前謂我用浩計為謬驚怖固諫常勝之家始皆自謂踰人逺矣至於歸終乃不能及張白澤為給事中時蠕蠕犯塞獻文引見羣臣議之尚書僕射元目辰進曰若車駕親行恐京師危懼不如持重固守自安虜懸軍深入糧無繼運以臣量之自退不乆遣將追擊破之必矣白澤曰陛下欽明則天比蹤前聖而蠢爾荒愚輕犯王略寇乃顛沛於逺圗我將宴安於近毒仰惟神略則不然矣今若鑾輿親動賊必望麾奔散寧容抑挫神兵坐而縱敵萬乗之尊嬰城自守進失可乗之機退非無前之義惟陛下留神帝從之遂大破虜衆程駿為秘書令文明太后臨朝駿上表曰春秋有云見有禮於其君者若孝子之養父母見無禮於其君者若鷹鸇之逐鳥雀所以勸誡將來垂範萬代昔陳恒弑君宣尼請討雖欲宴逸其得已乎今廟算天廻七州雲動將水蕩鯨鯢陸掃凶逆然戰貴不陣兵家所美宜先遣劉昶招諭淮南若應聲響恱同心齊舉則長江之險可朝服而濟道成之首可崇朝而懸茍江南之輕薄背劉氏之恩義則曲在彼矣何負神明哉直義檄江南振旅廻斾亦足以示救患之大仁揚義風於四海且攻難守易則力懸百倍不可不深思不可不熟慮今天下雖謐方外猶虞拾夤僥倖於西南勁敵伺釁於漠北脱攻不稱心恐兵不卒觧兵不卒觧則憂慮逾深夫為社稷之計者莫不先於守本臣愚以為觀兵江滸振曜皇威宜特加撫慰秋毫無犯秋毫無犯則民知徳信民知徳信則襁負而來襁負而來則淮北可定淮北可定則吴寇異圗吴寇異圗則禍釁出然後觀釁而動則不晩矣請停諸州之兵且待後舉所謂守本者也伏惟陛下太皇太后英算神規彌綸百勝之後應機體變獨悟方寸之中臣影頺虞淵昏耄將及雖思憂國終無云補不從崔衡孝文時為給事中車駕廵狩以衡為大都督長史衡涉獵書史頗為文筆蠕蠕時犯邉塞衡上書陳備禦之方便國利民之策凡五十餘條郭祚宣武時為尚書左僕射先是梁帝嘗遣將康絢遏淮將灌揚徐祚表曰蕭衍狂狡擅斷川瀆役苦民勞危亡已兆然古諺有之敵不可縱夫以一勺之水或為不測之淵如不時滅恐同原草宜命一重將率統軍三千人領羽林一萬五千人并料京東七州虎旅九萬長驅電邁遄令撲討擒斬之勲一如常制賊資雜物悉入軍人如此則鯨鯢之首可不日而懸誠知農桑之時非發衆之日茍事理宜然亦不得不爾昔韋顧䟦扈殷后起昆吾之師玁狁孔熾周王興六月之伐臣職忝樞衡獻納是主心之所懐寜敢自嘿幷宜勅揚州選一猛將遣當州之兵令赴浮山表裏夹攻朝議從之李苗為員外散騎常侍孝明正光末二秦反叛侵及三輔時承平已乆民不習戰苗以隴兵強悍且羣聚無資乃上書曰臣聞食少兵精利於速戰糧多卒衆事宜持乆今隴賊猖狂非有素蓄雖據兩城本無徳義其勢在於疾攻日有降納遲則人情離阻坐受崩潰夫飈至風起逆者求萬一之功高壁深壘王師有全制之策但天下乆泰人不曉兵奔利不相待逃難不相顧將無法令士非敎習以憍將御惰卒不思長乆之計務竒正之道必有莫敖輕敵之志恐無充國持重之規如令隴東不守汧軍敗散則兩秦遂強三輔危弱國之右臂於斯廢矣今宜勅大將深溝高壘堅守勿戰别命偏師精兵數千出麥積崖以襲其後則汧岐之下羣妖自散於是詔苗為統軍與别將淳于誕俱出梁益𨽻行臺魏子建子建以苗為郎中仍領統軍深見知待高恭之字道穆為中書舎人元顥逼虎牢城或勸莊帝赴闗西者帝以問道穆對曰闗中今日殘荒何繇可往臣謂元顥兵衆不多乗虛深入者繇國家將帥征捍不得其人爾陛下若親率宿衞高募重賞背城一戰臣等竭其股肱之力破顥孤軍必不疑矣如恐成敗難測非萬乗所履便宜車駕北渡循河東下徵大將軍天穆合於滎陽向虎牢别徵爾朱榮軍令赴河内以犄角之旬月之間何往不剋也臣竊謂萬全俄除給事黃門侍郎於是爾朱榮欲廻師待秋道穆謂榮曰元顥以蕞爾輕兵奄據京雒使乗輿飄露人神恨憤主憂臣辱良在於今大王擁百萬之衆輔天子而令諸侯自可分兵河畔縛篾造船處處遣渡徑擒羣賊復主宫闕此桓文之舉也且一日縱敵數世之患今若還師令顥重完守具徵兵天下所謂養虺成蛇悔無及矣榮深然之曰楊黃門偘已陳此計當更議決耳及莊帝反政因宴次謂爾朱榮曰前若不用高黄門計則社稷不安可為朕勸其酒令醉榮對曰臣本北征蠕蠕高黃門與臣作監軍臨事能決實可任用遷御史中尉兼黃門侍郎及爾朱世隆等率其部類戰於大夏門北道穆受詔督戰又贊成太府卿李苗斷橋之計世隆等於是北遁北齊孫搴高祖時為散騎常侍時又大括燕恒雲朔顯蔚二夏州高平平凉之民以為軍士逃隠者身及主人三長守令罪以大辟沒入其家於是所獲甚衆搴之計也顔之推為黄門侍郎武成清河末周兵陷晉陽帝輕騎還鄴窘急計無所從之推因宦者侍中鄧長顒進奔陳之策仍勸募吴士千餘人以為左右取青徐路共投陳國帝甚納之以告丞相高阿那肱等阿那肱不願入陳乃云吴士難信不須募之勸帝送珍寳累重向青州且守三齊之地若不可保徐浮海南渡雖不從之推計策然猶以為平原太守令守河津源文宗後主時為祕書監陳將吴明徹寇江南歴陽瓜步相尋失守趙彦深於起居省宻訪文宗曰吴賊譸張遂至於此僕妨賢既乆憂懼交深今者之勢計將安出弟往在涇州甚悉江淮間情事今將何以禦之對曰荷國厚恩無繇報效有所聞見敢不盡言但朝廷精兵必不肯多付諸将數千已下復不得與吴楚爭鋒命将出軍反為彼餌尉破胡人品王之所知進既不得退又未可敗績之事匪朝伊夕王而能入朝野傾心脱一日參差悔無所及以今日之計不可再三國家待遇淮南失之同於蒿箭如文宗計者不過專委王琳淮南招募三四萬人風俗相通能得死力兼令舊将淮北捉兵足堪固守且琳之於曇頊不肯北靣事之明矣竊謂計之上者若不推赤心於琳别遣餘人掣肘復成速禍彌不可為彦深歎曰弟此良圖足為制勝千里但口舌争來十日已足終不見從時事至此安可盡言相顧流涕隋趙賢通仕周為民部中大夫武帝出兵鞏雒欲收齊河南之地賢通諫曰河南雒陽四面受敵縱得之不可以守請從江北直指太原傾其巢穴一舉以定帝不納師竟無功宇文㢸仕周為内史都上士武帝將出兵河陽以伐齊謀及臣下㢸進策曰齊氏建國于今累葉雖曰無道藩屏之寄尚有其人今之用兵須擇其地河陽衝要精兵所聚盡力攻圍恐難得志如臣所見彼汾之曲戍小山平攻之易㧞用武之地莫過於此願陛下詳之帝不納師竟無功唐高適為左拾遺天寳末天下兵起潼闗失守適上策曰竭庫藏召募以禦賊猶未失計事雖不行聞者壯之李絳為左僕射寳厯元年澤潞節度使劉悟死子從諌求為留後絳上疏曰臣伏以兵機尚速乆即計生威斷貴定疑即變起人情未一乃可伐謀事勢已分則難命中據劉悟八月十日得病計是日便死逗留掩匿奏報已遲朝廷既知又數十日都未有處分中外人意共惜事機今昭義兵衆必不盡同從諌之亂縱有同者不過所厚一二千人直使一半協同尚有一半守順况從諌不曾乆主兵馬威恵未加於人又此道素亦貧窮非時必無優賞今朝廷但速除近澤潞四面一将帥充昭義節度令倍程赴鎮從諌未及鋪置新使已到潞州所謂先人有奪人之心疾雷不及掩耳真從天上落也新使既到潞州軍心自有所繫從諌無位何名主張又設使未到已前謀撓朝命臣亦料得必無能為若欲多分兵馬守境則事須給付器械將校等既得器械又已有正節度使豈肯更為從諌腹心若欲少分兵馬則不足抗拒新使之人事宜物理昭然可知臣前月十七日已面陳論并具狀聞奏訖至今又二十餘日未有處分恐潞州三軍會朝廷意㫖将欲效順即慮忽與從諌将欲同惡又却恐除别人儻更被姦人為畫狡計虛張賞設錢數兵士覬望尤難指揮今則已似太遲失於制置若更稽緩事恐轉生伏望速賜裁斷仍先下明勅符賜新節度使五十萬匹物令宣示三軍以其從來忠節故有此賜便節級賞設續除劉從諌一軍郡刺史從諌既粗有得必且擇利而行萬萬之中無一二違拒必若不從指揮臣亦以為不假攻討蓋山東三州難自存立若欲旁連魏鎮即須厚賂交通若擬自保封疆即湏終日備禦四面受敵必不支持數月之間定見覆敗况又聞山東官健已不許自畜刀兵足明軍心殊未得一帳下之事亦在不疑長短此方義無便授從諌之理今更於意外料度儻從諌事急将所親厚三二千人散投魏鎮必亦虜縛送歸闕廷上取忠義之名下快讐怨之志此必然之理也在魏博鎮州留一從諌亦何所利其将士三二千既是從逆得散却亦是國家一事縱横揣度股掌無逃又以為直使山東之人未得其便僶俛受制依違俟時朝廷亦只要明勅四面諸軍嚴兵保境勿令公私來往勿使商旅通流遲不一年梟首必至若或捨此數計事或後時即非愚臣所知亦必他日追悔臣不勝憂憤激切之至帝雖多絳之忠誠其時李逢吉王守澄中外議已定朝臣徒瀝丹懇竟不勝茍且之謀王起穆宗時為禮部侍郎長慶初大梁帥李㝏叛與兄播宻上疏請以徐州王智興討之遣自贖其過帝納之果復汴州深謂其有將略焉漢龍敏初仕後唐為吏部侍郎敏學術不甚長然外柔而内剛爱決斷大計清泰末從末帝在懐州時趙徳濟父子有異圗晉安砦旦夕憂陷末帝計無從出問於從臣敏奏曰臣有一計請以兵援送東丹王李贊華取幽州路趨西樓契丹必有北顧之患末帝然之而不能用敏又謂末帝親將李懿曰君連姻帝戚社稷之危不俟翹足安得黙黙茍全耶懿因籌徳濟必破蕃軍之狀敏曰僕燕人也諳趙徳鈞之為人膽小謀拙所長者守城砦嬰壕塹篤勵健兒爾若見大敵奮不顧身推堅陷陣必不能矣况名位震主姦以謀身乎僕有狂策不知濟否茍能必行亦救砦之一術也請言之曰如聞駕前馬僅五千匹請於其間選壯馬精甲健夫千人僕願與郎萬金二人繇介休路出山夜冐契丹循山入大砦千騎之内得其半濟則砦無虞矣張敬達等幽閉不知朝廷援兵近逺若知大軍在圍栢谷中有鐡障亦可為陷况敵衆乎末帝聞之曰龍敏之心極壯用之晩矣人亦以為大言然其慷慨感激皆此類也册府元龜卷四百七十七
