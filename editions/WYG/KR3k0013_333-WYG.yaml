body:
  text: 册府元龜卷三百三十三宋王欽若等撰宰輔部罷免第二魏太祖初封魏王鍾繇為相國數年坐西曹掾魏諷謀反策罷齊王正始九年二月衛將軍中書令孫資與驃騎將軍中書監劉放三月司徒衛臻各遜位以侯就第位特進晉惠帝永康元年四月誅裴頠司徒王戎之婿也頠誅戎坐免官梁武帝大同十一年何敬容為尚書令侍中参掌機宻坐妾弟費慧明為導倉丞夜盗官米為禁司所執送領軍府時河東王譽為領軍將軍敬容以書觧慧明譽卽封書以奏焉高祖大怒付南司推劾御史中丞張綰奏敬容協私罔上合棄市刑詔特免職後魏文成帝興安二年以張黎為太尉古弼為司徒議不合㫖黜為外都太官孝文承明元年二月司空陸定國坐事免官罷為兵東魏孝静帝興和四年四月太尉尉景坐事降為驃騎大將軍開府儀同三司北齊武成帝河清三年時婁叡為司徒濫殺人為尚書左丞宋仲美彈奏經赦乃免隋高祖開皇十九年九月高熲為左僕射上柱國坐事免以公就第未㡬高祖幸秦王俊第召熲侍熲歔欷悲不自勝獨孤后亦對之泣左右皆涕帝謂熲曰朕不負公公自負也因謂侍臣曰我於高熲勝兒子雖或不見常似目前自其觧落冥然忘之如夲無高熲不可以身要君自云第一也唐太宗貞觀元年十二月尚書左僕射宋國公蕭瑀坐事免蕭瑀為中書令嘗薦封德彞於高祖高祖以德彞為中書令太宗卽位瑀遷尚書左僕射徳彞為右僕射德彞素懐險詖與瑀料量將為可奏者至太宗前盡變易之于時房𤣥齡杜如晦既新用事𤣥齡疎瑀而親德彞瑀心不能平遂上封事論之而辭㫖寥落太宗以𤣥齡等功高而瑀先懐疑阻繇是忤㫖廢於家瑀嘗請出家太宗謂曰甚知公素愛桑門今者不能違意瑀旋踵奏稱臣頃思量不能出家太宗以對羣臣吐言而取舍相違怒之瑀稱足疾時詣朝堂但不入見太宗謂侍臣曰瑀豈不得其所乎而自嫌如此遂手詔曰朕聞物之順也雖異質而成功事之違也亦同形而罕用是以舟浮楫舉可濟千里之川轅引輪停不越一毫之地故知動静相循易為務曲直相反難為功况乎上下之宜君臣之際者矣朕無聰明於元首期託德於股肱思欲去偽歸真除澆反朴然於佛教非意所遵雖有國之常經固敝俗之虚誕何則求其道者未騐福於將来循其教者翻受辜於既徃至若梁武窮心於釋氏簡文鋭意於法門傾帑藏以給僧祗殚人力以共塔廟及乎三淮沸浪五嶺騰煙假餘息於熊蹯引殘魂於雀鷇子孫覆亡而不暇社稷俄頃而為墟報施之徴何其謬也而前太子太保宋國公瑀踐覆車之餘軌襲亡國之遺風棄公就私未明隠顯之際身俗口道莫辨邪正之心循累葉之殃源祈一身之福夲上以違忤君主下則扇惑浮華徃前朕謂張亮云卿旣好佛何不出家瑀乃端然自應請先入道朕卽許之尋復不用一回一惑在於瞬息之間自可自否變於帷扆之内所謂乖棟梁之大體豈具瞻之量乎朕猶隠忍至今瑀尚全無悛改宜卽去兹朝闕出牧小藩可商州刺史仍除其封二年正月辛未司空魏國公裴寂坐事免先是有沙門法雅怨望妖言伏法寂辭與相連坐免歸蒲州俄追入闕未㡬有狂人自稱信行寓居汾隂言多妖妄嘗謂寂家僮曰裴公有天分于時信行已死寂監奴恭命以其言白寂寂惶懼不敢奏聞隂呼恭命殺所言者恭命縱令亡匿寂不之知寂遣恭命收納封邑得錢百餘萬因用而盡寂怒將遣人捕之恭命懼而上變太宗謂侍臣曰裴寂有死罪四焉為三公與妖人言辭相渉罪一也事發之後乃負氣憤怒稱國家有天下是其所讓罪二也巫言有天分匿而不奏罪三也隂行誅殺以滅口罪四也我殺之非曰無辭矣議者多言流配朕其從衆乎於是徙交州後竟流静州十七年五月中書令楊師道為吏部尚書庻人承乾逆謀之洩也師道與長孫無忌房𤣥齡同按其獄師道假子趙節與承乾通謀師道㣲諷太宗兾活之繇是獲譴獄未竟不令視事後數日太宗謂侍臣曰師道任寄不輕無心體國翻溺情於假子豈可更居股肱之任於是拜吏部尚書七月丁酉司空太子太傅梁國公房𤣥齡以母憂罷職高宗永徽六年五月癸未以吏部尚書柳奭為遂州刺史奭后舅歴位中書令后旣寵衰不敢乆在機宻頻上表固辭轉為吏部罷中書門下事尋而后母魏夫人被責不許入宫奭繇是出為遂州刺史顯慶五年秋七月戊辰度支尚書同中書門下三品盧承慶坐科配失所免官龍朔三年夏四月戊子詔曰右丞相兼行殷王府長史河間郡公李義府緣兹小技累升顯地塵露之益未表於銓流公亷之譽有紊於彞典漏禁中之語鬻寵授之朝恩交占候之人輕朔望之哀禮蓄邪黷貨實玷衣冠稔惡嫉賢載虧政道特以任使多年未忍加其重罰冝從遐棄以肅朝倫可除名配流巂州其子太子右司議郎津專恃權門罕懐忌憚奸滛是務賄賂無厭潛報機宻亦冝明罰屏跡荒裔配流振州則天載初元年地官尚書同鳳閣鸞臺三品韋萬質坐與弓嗣業通謀配流嶺表天授元年十月檢校内史宗秦客坐􅂍降授鎮州遵化縣尉延載元年八月戊寅鸞臺侍郎同鳯閣鸞臺平章事崔元綜以罪流于振州元綜篤信釋典好潔細行薫辛不歴口者二十餘年雖外示謹愿而情深刻薄每受制鞫獄必披毛求疵陷於重辟以故人多畏而鄙之至是配流朝野莫不稱慶聖歴三年正月天官侍郎鳳閣鸞臺平章事吉頊坐事貶流嶺表乆視元年閏七月己丑鸞臺侍郎李嶠遷為成均祭酒罷政事時以天官侍郎張錫為鳯閣侍郎同鳳閣鸞臺平章事以嶠錫之甥故也長安四年三月鳯閣侍郎同鳯閣鸞臺三品蘓味道請還鄉改葬其父優制令州縣供其葬事味道因此侵毀鄉人墓田役使過度為憲司所劾左授防州刺史中宗神龍元年正月乙卯鳯閣侍郎同鳯閣鸞臺平章事房融以親附張易之兄弟配流嶺表五月甲午封侍中齊國公敬暉為平陽郡王桓彦範為扶陽郡王袁恕已為南陽郡王中書令漢陽公張柬之為漢陽郡王中書令博陵公崔𤣥暉為博陵郡王並加特進令罷知政事外示優崇而實奪其權也睿宗景雲元年七月同中書門下三品唐休璟致仕休璟在任無所𢎞益以老病罷歸私第是月又以黄門侍郎參知政務崔日用為雍州長史中書侍郎參知機務薛稷為散騎常侍時稷與日用爭於帝前稷曰日用傾側諂附三思㡬危社稷非忠臣賣友事主非義士也日用曰臣徃雖有官過今立大功當韋氏悖逆擅權之時大事去矣臣與太子同謀靖難陛下棄瑕録用備位左右如稷外託國親内附逆黨易之楚客恩同骨肉傾側者正屬薛稷不屬於臣故並停政事二年二月出中書令姚元之為申州刺史吏部尚書同中書門下三品宋璟為楚州刺史初元之入輔也進忠良退不肖賞罰必中朝綱克舉又選補平允委用亷吏權門請託無所復行時議以為復貞觀永徽之政也而太平公主專權覩太子明察恐不利已廼隂謀廢黜時元之璟等處宫臣恐其為變具以啓聞及公主出蒲州尢所怨謗皇太子不獲已而奏出焉十月帝御承天門引尚書左僕射同中書門下三品韋安石兵部尚書同中書門下三品郭元振左御史大夫同中書門下三品竇懐貞侍中李日知兵部侍郎同中書門下三品平章事張說制責之曰自頃以來政教尤闕時或水旱人多困斃府庫益竭寮吏日滋僶俛政途罔然如失雖繇朕之薄德固亦輔佐非才安石可尚書左僕射東都留守元振可吏部尚書懐貞可左御史大夫説可尚書左丞並停知政事𤣥宗開元元年十二月癸丑尚書左丞相兼黄門監劉幽求紫微令張説並罷知政事以幽求為太子少保説為相州刺史十二年二月己酉詔曰中書令張嘉貞備位宰相夙承恩命不能勵其公節以訓私門其弟嘉祐頃縁奨受遷在清秩馮寵自肆黷貨有彰豈可仍踐台階儀刑百辟貶居藩守俾肅朝倫可幽州刺史張說遂代為中書令嘉貞惋恨謂人曰中書令幸有三員何相廹之甚也嘉貞弟嘉祐為金吾將軍時以賍状聞張說勸嘉貞素服待罪不得入謁十四年四月庚申停兼中書令張說勑曰特進行尚書右丞相兼中書令燕國公張說徃屬艱難輸誠於履險及兹輔相潤色於告成而不肅細㣲之人頗乖周愼之㫖朕畧小存大念舊録功且法不欲屈宜罷中樞之務義亦有在更全端尹之榮宜停中書令餘如故十七年六月甲戍制曰出納王言發揮綸翰宰臣之任選衆推賢撿校黄門侍郎同中書門下平章事杜暹中書侍郎同中書門下平章事李元紘等咸勵忠勤用登樞揆雖清以自牧而道則未宏不能同心戮力以祗帝載而乃肆懐相短以玷朝倫朕縁事醜股肱情惟隠蔽掩其惡而不率遂其過而彌彰將何以緝叙三光儀刑百辟宜回中禁俾列專城暹可荆州長史元紘可曹州刺史又制尚書左丞相兼侍中源乾曜十載持衡一心自牧台鼎斯重管綜維繁雖勤在公而暮年㣲疾俾司端揆罷劇中樞宜停侍中其尚書左丞相如故天寳五載四月左丞相李適之罷知政事初李林甫搆成其罪遂罷知政事守太子少保遽命親故歡㑹賦詩曰避賢初罷相樂聖且銜盃為問門前客今朝㡬箇來肅宗至德二年三月以左丞相韋見素平章事裴冕為左右僕射並罷知政事冕性忠勤悉心奉公稍得人心然不識大體以聚人曰財乃下令賣官鬻爵度僧尼道士以儲積為務人不願者科令就之其價益賤事轉為弊肅宗移幸鳯翔罷冕執政五月吏部尚書平章事房琯以門客琴人董廷蘭受賂罷相為太子少師三年五月以中書侍郎平章事張鎬為荆州大都督府長史鎬都統淮南等道諸軍事鎭汴州招討河北逆賊賊黨史思明為賊守范陽表請歸順鎬揣知其偽恐朝廷許之手札表奏云思明兇豎因逆竊位兵彊則衆附勢奪則人離包藏不測禽獸無異可以計取難以義望不以威權假之又奏滑州防禦使許叔兾性狡多謀臨難必變望追入宿衞時肅宗意已定表入俱不省鎬為人簡淡不事中要㑹有宦官自范陽及滑州使還者皆言思明叔兾之誠慤肅宗以鎬不切事機遂罷之後思明叔兾皆如其言代宗以寳應元年四月庚午卽位六月庚申中書令李輔國上表請遜位乃特封為愽陵王罷中書令復詔許唯朝朔望二年正月吏部尚書平章事領度支鹽鐡轉運租庸使劉晏為太子賔客坐與中官程元振交通元振得罪晏罷相黄門侍郎平章事李峴為太子詹事峴作相一月為近要所擠遂失恩而罷廣德元年十二月侍中苖晉卿罷知政事册為太保帝卽位晉卿年已衰暮吐蕃冦長安晋卿病卧私第蕃賊聞之逼刼晉卿閉口不言賊不敢害及帝自陕至遂有是命德宗大歴十四年卽位八月以懐州刺吏喬琳為御史大夫平章事琳夲粗才年高有耳疾帝毎顧問對答失次論奏不合時機居相位凢八十餘日除工部尚書罷政事建中二年七月楊炎罷相為左僕射時徳宗嘗訪宰相羣臣中可以大任者盧杞薦張鎰嚴郢炎舉崔昭趙惠伯帝以炎論議益疎濶遂罷炎相四年十二月貶門下侍郎平章事盧杞為新州司馬癸酉以中書侍郎關播為刑部尚書杞與播俱從幸奉天杞與白志貞等先貶出播尚知政事中外囂然以為不可遂罷相改刑部尚書大臣韋倫等皆泣於朝曰宰相不能謀猷翊賛以至今日而尚為尚書誠可痛哉興元元年四月徳宗在梁以諌議大夫平章事姜公輔論事失旨罷為左庻子貞元元年九月中書侍郎平章事劉從一以疾請告至是病甚辭位章疏六上乃許除户部尚書二年正月門下侍郎平章事盧翰罷為太子賔客是年給事中崔造守本官平章事機謀權變非其所長釐革度支弊事却為繁擾數月以疾辭除右庻子三年八月除兵部侍郎平章事柳渾為右散騎常侍停知政事時張延賞與渾同列延賞怙權矜已而疾渾守正俾其所厚謂渾曰相公舊徳但節言於廟堂則重位可乆渾曰為吾謝張相公柳渾頭可㫁而舌不可禁也自是為其所擠故有是命李勉為司徒平章事勉嘗言盧杞姦邪而時人多云正直然自是見疎遂累表陳譲方罷政事十年十二月宰相陸贄罷為太子賔客時裴延齡判度支天下皆嫉怨而獨幸於天子朝廷無敢言其短長者贄獨身當之陳其不可用延齡固欲去贄而代之又知贄之與已多阻其奏請也謗毀百端翰林學士呉通𤣥故與贄同職姦巧刻薄與贄不相知贄與延齡相持有間因盛言贄短宰相趙憬夲贄所引因奏對嫉贄之權宻以贄所譏彈延齡事告延齡延齡益得以為計繇是天子益信延齡而不直贄竟罷贄相以為太子賔客而黜張滂李充等權言事者多言其屈贄固畏愼及為賔客拒門不通交親十三年九月詔曰任重謀猷道在忠諒辭疾之情既懇優賢之義斯崇中書侍郎平章事盧邁朝序公才操履端敏弼諧庻政夙夜惟寅恭恪之心每思獻納而支體未適固請優閒累表敷陳懇誠彌切將遂其志予衷耿然爰舉朝章式加命秩可太子賔客十四年七月詔曰任人之道必在無私審官之宜所期適用給事中平章事趙宗儒早以文學累更職任自居樞近頗歴嵗時雖夙夜載勤而政理猶鬱式移秩序以叶朝經可太子右庶子十九年七月中書侍郎同平章事齊抗以疾罷為太子賔客二十一年七月下詔曰朕承天眷命獲主兆人思致邕熈用康區夏布和緝化屬在輔臣所謂適冝實為通典銀青光禄大夫守吏部尚書平章事上柱國鄭珣瑜銀青光禄大夫守刑部尚書平章事上柱國鄭郢等咸以忠靖累更班列秉彞兢慎植操貞恒自參輔中樞皆能勵節祗勤庶務夙夜惟寅嵗月滋深嬰纒疾恙衮職有闕無以彌綸况銓綜為選士之本刑法乃生人之命俾從專掌以盡至公宜輟台司副予所委珣瑜可守吏部尚書郢可守刑部尚書憲宗初司空平章事于頔坐子殺人降授恩王傅絶朝請元和四年二月丁邜制曰玊者重輔弼之任明進退之冝聞善則升知否則捨兹朕所以推誠不惑與物無私者也銀青光禄大夫門下侍郎同中書門下平章事兼𢎞文舘大學士上柱國賜紫金魚袋陽武縣開國侯鄭絪早以令聞入叅禁署永惟勤績出授台司期爾有終規予不逮嵗月滋乆謀猷寖㣲罔清静以慎身每因循而保位旣乖素履且鬱皇猷宜副羣情罷兹樞務朕以其乆居内職素事先朝恩厚君臣貴全終始俾從優閒之秩用示寛大之恩可太子賔客五年九月中書侍郎平章事監脩國史裴垍以疾請告十一月罷為銀青光禄大夫兵部尚書六年正月壬辰制曰爰立輔臣以熈庻績聿膺其任是亦難能至於明用捨之冝全始終之道兹惟大體寜忘予懐中散大夫守門下侍郎同中書門下平章事兼𢎞文舘大學士上柱國賜紫金魚袋李藩早以學行聞于縉紳洎升朝端克愼素履頃者㧞於非次列在鈞衡是冝直已以佐時匪躬而納誨用副明奨越於常倫而授任以來再逾年序夙夜之勤雖著弼諧之效未孚將何以允至公之求成天下之務宜輟黄樞之重尚居端尹之崇爾其勉之式副優禮可守太子詹事散官勲賜如故藩素有清名及追李吉甫於淮南未至藩有拒之之意吉甫至頗不平屢攻其短遂罷焉十月門下侍郎同平章事李逢吉罷相將討淮蔡日乆王師數不利言事者多以罷兵為請逢吉附其議憲宗不悦無何比部員外郎張宿以他門進逢吉出為濠州刺史宿上疏自理憲宗將擢為諫議大夫逢吉廷爭乆之且曰去臣用宿可也繇是又忤㫖遂罷相八年正月辛未制曰文昌六官宗伯掌禮選授之重自昔攸難非夫台衮之臣分全於始終縉紳之議素洽於羣倫則無以允是優崇膺兹名秩正議大夫守禮部尚書同中書門下平章事上柱國扶風郡開國公權徳輿奥學雄詞虚襟曠度禀中和之氣𢎞信厚之規夙彰厥猷歴踐清華乃者回翔省閣祗服大僚咸推鎭俗之風遂致濟川之望朕永惟理夲宵旰在懐常期獻納之功深屬弼諧之任爰徴僉論俾列鼎司勤勞亟歩於嵗時謙挹每形於造次是用委春卿之職輟樞務之殷任事呈能庻先㑹府帥屬而理汝徃欽哉可守禮部尚書九年二月癸卯制曰輔相之任所貴乎納忠進退之冝寔重於申禮其有以勞奉國以疾固辭聿懐謙譲之風是舉優崇之典朝議大夫守中書侍郎同中書門下平章事上柱國高邑縣開國男食邑三百户賜紫金魚袋李絳端莊秉彛亮直循道抱凌寒之勁節標肅物之貞規嘗以懿文叅于内署亦以公望貳于地卿竭其器能茂著宦業洎居衮職左右朕躬逺慮必陳讜言無隠竭致君之志𢎞濟俗之方確然眞心鬱有休問而歩履嬰疹趨侍為難披誠上聞稽首求免乃眷毗倚乆之未從星霜屢遷衷懇彌激宗伯秩禮時惟大寮宜從喉舌之班用輟鹽梅之寄庻因清簡俾遂頥眞膺兹寵章敬服爾命可守禮部尚書􅄆官封賜如故十一年八月壬寅詔曰朕恭已臨人勵精思理二三執政繇吾股肱念始終之罔虧於進退而尤重茍或將明失中輔導不專依違于懐尚愼斯舉君臣之義豈不𢎞乎中大夫守中書侍郎同中書門下平章事上騎都尉賜紫金魚袋韋貫之早著淑聲累更顯貫潤以文藻懿其風猷爰膺選衆之求式佇弼予之美而自當鈞軸屢變星霜虚懐以聴未聞至論非啓沃之道有所不行何燮諧之功蔑爾無效欲抑浮華之路在捐朋黨之私人亦具瞻事將奚副用觧樞機之務俾居衡鏡之職克乆斯任宜和厥心可守尚書吏部侍郎散官勲如故時貫之以蔡鎮未平天下勞於餽餉慮或水旱乘之則力屈難振屢請緩承宗而專討元濟繇是與裴度爭是非於帝前時專任度以戎事故罷貫之以望其功成初貫之為相嚴身律下以清流品為先故門無雜賔有張宿者利口得倖於憲宗擢為左補闕將使淄青宰臣裴度欲為請章服貫之曰小人以他門獲進吾軰未能排抑豈宜假其恩寵耶所議遂寢宿深銜之卒為所搆誣以朋黨罷為吏部侍郎不渉旬出為湖南觀察使十三年戊戍詔曰夫為君者求舊以申其用施恕以遂其情為臣者陳力以効其能奉身以明其志故在上則始終之道備居下則進退之義全兹惟休哉用厚徳禮銀青光禄大夫守門下侍郎同中書門下平章事上柱國江夏縣開國侯食邑一千户李􅅠居潔履方端明審固有沉毅莊重之質有堅剛迅疾之心勁節夙表於屯夷利器乆彰於中外朕所以跡其衆善詢及庻工登之台階授以政柄將欲藉其碩望𢎞厥壯猷而固辭之誠再疏頗切然猶不允其請所兾或副予懐迨此旬時勞于夙夜益願頥養堅稱衰疾宜罷樞軸之殷俾居喉舌之重就閒高秩式示優崇可守户部尚書十四年十二月乙卯制曰致君之道爰在輔臣發揮正經端理教化或􅂜倫未叙公議不明免其所職盖常典也正議大夫守中書侍郎同中書門下平章事上柱國賜紫金魚袋崔羣根於温恭發以詞彩踐履臺閣潤色絲綸嘗以敏才列於宥宻考能觀行益表謙勤擢處鈞衡用參大政緝熈之績每竭其謀猷翊賛之心亦彰於夙夜朕旰食思理注於話言善而可行無不虛受而顧問之際謂近於至公詳取之間或違於事實將何以同底于道化洽萬方宜罷印於中樞俾報政于外服優以顯秩爾其勉之可使持節都督潭州諸軍事守潭州刺史兼御史大夫充湖南都團練觀察處置等使勲賜如故穆宗長慶元年正月制曰師長庻工總詳六職重任乆曠益難其人自非體參股肱位列鈞鼎能引年以知退致禮而加恩則授受之間何以允兹任也朝議大夫守門下侍郎同平章事襲徐國公蕭俛門承華衮位列清華用能周物志在佐時勤内署之論思肅南臺之綱紀朕初承天序擢處台階推一心獻納之誠贊四方經營之績及此踰嵗累陳懇詞㣲恙所侵堅請難奪朕憂勤庻政親委大臣務厚始終以全進退旣謝弼諧之任宜加端揆之崇爾其戒之服我優秩可守尚書右僕射勲賜如故俛以西川節度使王播前任鹽鐡使日廣進財貨強名羡餘固位竊恩不憚清議及鎭益部又傾竭貢獻以圖台衡宰相段文昌助之勢不可遏俛遂於閣内及延英殿屢諌不納乃以官進退兾帝感悟竟不從故有是拜二年二月制曰宰相者朕之腹心和合天下在乎鎮靖藩服兼附親遠方將𢎞遂物之宜必有更張之道正議大夫守中書侍郎同中書門下平章事武騎尉賜紫金魚袋崔植徃在先朝頗推亷直馴行唯謹保萬石之風清徳不渝紹四公之業遂昇左掖實著能名駁正之美稱於朝列朕以孝公太傅代載忠貞擢於相門授以台席顧惟寡昧奉若丕圗每念為君之難敢忘從諫之義推誠聴納虛已咨詢庻洽羣心以迎和氣叔敖是期於秉羽汲黯謂致於寢謀宵分以興日旰忘食昔藩國多事平津譲侯隂陽未和石慶辭位惟爾謙遜豈嘗求安稱疾拜章勤亦至矣雖愒日之年未及而履氷之意尚堅遂輟樞機用成美志崇以天秩長以秋官君臣之間朕無所愧可刑部尚書散官勲賜如故植在相位端慎信厚有餘而無開物成務之用屬穆宗初幽鎮阻兵方隅多事機務壅滯繇植而失者居多後因堅卧拜章請免遂以刑部尚書罷相六月甲子制曰朕端已推誠資於輔相求人與衆諒在訏謨所以徇公卿之言從士庻之望輟任淮海俾居台階舉先朝勲業之臣當四海具瞻之任推心委柄期在賢能誠效靡孚余將安望光禄大夫守司空兼門下侍郎同中書門下平章事上柱國晋國公食邑三千户裴度器夲端誠道惟蹇諤挺松筠之操蘊桂玉之姿望積巖廊功書竹帛策勲報爵寵極人臣朕恭守睿圖推心輔弼聿求雋彦思致雍熈推昇論道之司再授樞衡之任虛心有日佇乃嘉猷而鼎飪未調弛張異制誠宜有犯無隠忠讜必陳使余誠懐不惑聞聴何苟容於造次致有間於笙簧棘木旣窮匪辭焉驗昔漢以隂陽不和册免丞相今爾訏謨或爽宜罷台司疇勲績以尚功録忠勞而念舊俾居右揆非謂左遷用宗師長之榮勿以優閒自薄可守尚書右僕射散官勲封如故又制曰宰相者列位巖廊權參造化内操政柄上代天工朕嗣守丕圖思興至理每於擢用兾獲雋良為善有聞必資奨寵罹於􅄽謗用罷台階通議大夫守尚書工部侍郎同中書門下平章事上柱國賜紫金魚袋元稹㳺藝資身明經筮仕累應科選益振芳華茂識宏才登名晁董之列佳辭麗句馳聲鮑謝之間頃在憲臺嘗推舉職比及遷黜亦以直聞是以擢以周行典斯誥命洎參宻近旋委台衡宜竭謀猷盡於毗贊而乃不思𢎞益之道遂嬰詿誤之嫌察以中情雖非為已行兹左道豈曰效忠體渉異端理冝偕黜朕以君臣之分貴獲始終任使之時亦聞獻懇每思加膝寜忍墜泉猶宏在宥之心俾列專城之寄左都之大三輔推雄控壓關河連屬宫苑勉於政績副我恩私可使持節同州諸軍事守同州刺史充夲州防禦長春官等使散官勲賜如故文宗開成四年五月景申以右僕射兼門下侍郎國子祭酒平章事鄭覃為右僕射以門下侍郎同平章事陳夷行為吏部侍郎覃以門䕃入仕少清苦貞退不造次與人接狎位至國相所居未嘗修飾纔足以庇風雨家無媵妾時人仰其素風頃李宗閔在相位嘗有侮易之言後李徳裕入相驟加引用覃故怨宗閔而厚於德裕凡宗閔之交逰引用者覃盡以朋黨排之時人以此不直夷行以文學進身獨不羣比及為宰相素與宗閔有隙故善於覃以排斥朋黨為已任而多及善良因並命罷之懿宗乾符六年黄巢陷桂州五月賊圍廣州仍與廣南節度使李岧浙東觀察使崔璆書求保薦乞天平節鉞璆岧上表論之詔公卿議其可否宰相鄭畋盧攜爭論於中書詞語不孫俱罷為太子賔客分司東都僖宗卽位時劉鄴為相及蕭倣崔彦昭秉政素惡鄴乃罷鄴知政事撿校尚書左僕射同平章事揚州大都督府長史淮南節度使是日鄴押班宣麻竟通事引鄴内殿謝不及笏記鄴自叙十餘句語云霖雨無功深愧代天之用煙霄失路未知歸國之期帝為之惻然昭宗乾寕二年八月司空門下侍郎平章事監修國史諸道鹽鐡轉運崔昭緯罷知政事為太子賔客昭緯性奸纎忌前内結中人外連藩帥屬朝廷㣲弱每託援以陵人主昭宗明察心不能堪以誘召二鎭將兵詣闕賊殺宰相内臣帝深切齒會太原之師誅王行瑜罷相授僕射又以託附汴州再貶梧州司馬尋降制數其罪中使至荆南斬之明宗天成二年丙戍制曰朕恭膺大寳䖍荷丕基選衆與能克保君臨之道寳賢念舊庻符帝賚之資繇是推以腹心授之衡柄兾扶持於寡昧申啓沃於始終其樂在宴安勇於冲退冝暫均於勞逸思顯示夫優隆光禄大夫門下侍郎兼工部尚書平章事監脩國史上柱國樂安郡開國侯食邑一千户任圜天授宏材波澄偉度早負公侯之器深懐將相之資智擅圓方謀惟通變先皇帝中興景運再造鴻圖夙叅佐命之功迥著安時之業克平邛蜀大掃妖氛鬱有殊庸雅為良弼朕惟薄徳㝷所注懐爰自六卿擢居四輔秉國鈞之重任掌邦計之劇權内罄沃心外彰陳力方期委任遽閲封章曲徇汝懐固違朕㫖旣披陳而莫抑在進退之有常冝更鳳沼之尊俾踐龍樓之秩勉從頥養勿替謀猷可落平章事太子少保三年三月己未制曰朕聞老氏談經無如知止素王窮易當在庶㡬賢哲所以保身進退於焉合道其有位居元輔功叙彞倫節宣㣲爽於冲和休致屢堅於章表酌其陳力莫若從人俾囘席於三台就懸車於百揆特進行門下侍郎兼刑部尚書同中書門下平章事充太㣲宫使𢎞文舘大學士上柱國滎陽郡開國公食邑一千五百户鄭珏皇朝軒冕清廟笙鏞崇令望於縉紳節雅音於律度而自再持鈞軸益顯公忠㝷更近市之居兼杜掃門之跡克己復禮為官擇人爰屬廵幸浚郊務名賢而好善經營雒邑煩上相以卜年方頼嘉猷忽嬰美疢豆耳何妨於寂聴灰心頓悟於浮榮高慕赤松勇辭黄閣朕以方調殷鼎尚睠晉罇欲盡慇懃具觀堅切可乆之規斯在再三之請莫違所以特許抽簪免勞借箸進崇階於開府假優秩於不朝仍益井田俾厚風俗於戯奚祁請老不無内舉之規張禹言情亦有私恩之事唯卿奉身而退其德不回予寔嘉焉美兼善也勉從頥養永保初終可開府儀同三司尚書左僕射致仕仍加食邑五百户末帝清泰二年十月戊寅制尚書左僕射門下侍郎同平章事𢎞文館大學士太㣲宫使趙郡公食邑二千户食實封二百户李愚可守夲官門下侍郎兼吏部尚書同平章事監修國史判三司彭城郡公邑千五百户劉昫可守尚書右僕射皆免知政事昫司邦計意在至公欲除積弊傷於太察初帝自鳯翔至切於軍賞時王致判三司詔問錢榖奏數百萬在及慶賜無㡬帝怒用昫代致昫性初疾惡又懼訶譴及搜索簿書命判官高延賞鉤計窮詰乃積年殘租或主務不治詰之不已屢遷嵗時計司主典利其所係不欲搜擿至是藏盖彰露昫具條奏可徴者急督之無以償者以籍進韓昭備言繇是逋者咸蠲除之窮民相與歌詠唯王典怨沮乃謀偽書昫名差務官昫疑不繇已詰之獄成云自昫别室内弟御史陳觀鞫訊遣吏取公文昫曰吾一病妻比無别室御史見凌亦須循理觀仍遣吏不已及罷相之日羣吏攜三司印復萃月華門外聞宣昫罷乃相賀快活矣及昫歸第三司無一人從至第者傳所謂盗憎民惡其可忽諸李愚􅄶急素不悦馮道昫與道婚家及道出鎮凡中書積滯事愚指昫云君親家翁所為昫與之口訟動至色厲吏俱惡之乃揚言於外二人欲相毆穢語及之愚之秉執昫之多防帝采其言俱罷之晋高祖天福四年四月樞宻使劉處讓每有敷奏多不稱㫖㑹處讓丁繼母憂因議罷樞宻使其本院庻事並委宰相分判漢隠帝乾祐元年二月制曰朕䖍承遺訓嗣守鴻基常懼𦕈冲不克負荷所以師臣畏相稽衆從人採沃心造膝之謀詢繼體守文之道其或力非任重才不逮時有玷天工顯貽物議宜從罷免用儆厥􅄽開國佐命輔聖功臣光禄大夫行中書侍郎兼户部尚書同中書門下平章事上柱國隴西縣開國伯食邑七百户李濤早預朝倫素虧時望繼踐清華之列曽無倜儻之名先皇帝應運開階濟物成務未明求理虛已待賢擢自禁林升之槐路旣委宰衡之任蔑聞帷幄之謀迨及眇躬初親庻政被顧問之際屢覩醺酣當獻替之時無聞詆訐復虧嚴重但務詼諧詎為君子之儒殊失大臣之體重以梓宫在殯國歩多艱屢陳違衆之言頻建出師之意率爾獨見豈是臧謀朕方務含宏兾全終始雖包荒而在念慮假器以興譏俾輟中樞式存大體仍令還第庻用省躬惟爾自貽無我有怨茍能思過豈吝推恩可罷免勒歸私第周顯德四年八月乙亥制曰鴻水未堙舟楫頼濟川之用宻雲旣雨郊原成利物之功惟賢哲之保躬蹈初終於元吉我有良相時惟正人七年竭力於扶持六氣遂乖於頥養踰嵗伏枕九陳譲章敦諭雖頻告請彌切暫輟秉鈞之任不移論道之資仍益户封斯為異數推忠恊謀佐理功臣特進守司空門下侍郎同中書門下平章事監脩國史上柱國隴西郡開國公食邑一千五百户食實封二百户李榖昔事先朝勤勞王室曁登上相佐佑朕躬疾因憂國而有加志在避權而知足煩燮調而斯乆釋難重以為冝漸俟痊平别期委任俾展輅車之禮用光水土之官惟爾誠明當體優異凡百有位知予尚賢可守司空加食邑五百户食實封二百户功臣散官勲如故仍命所司擇日備禮册命册府元龜卷三百三十三
