body:
  text: 册府元龜卷五十三宋王欽若等撰帝王部尚黄老黄帝曰觀天之道執天之行盡矣老子曰我無為而民自化我好靜而民自正信所謂知之修練滌除冲覧拱黙垂衣而致治猶龍變化而莫測本其妙用歸諸自然故乃凝神御變抱一執契無可無不可者矣自漢之世崇其言於宫壼孝武以降混其術於神仙或嚴祠於掖庭或講議於斧扆廣設壇醮親受符録肹蠁報應與時偕行雖崇奉之至亦未能清淨如此也唐稱􅕺胄茂暢真氣靈宇相望黄冠交暎尊其虛無之論列於儒學之科與夫大易神道設教洪範建用皇極愛民治國之要其歸一揆耳後漢桓帝延熹八年正月遣中常侍左悺之苦縣祠老子十一月使中常侍管霸之苦縣祠老子九年七月祠黄老於濯龍宫文罽為壇餙浮金鉛器設華盖之座用郊天樂於是百姓稍有奉者後遂轉盛晉哀帝雅好黄老斷榖餌長生藥後魏道武好黄老之言誦詠不倦數召諸王及朝臣親為説之太武太平真君三年正月甲申帝至道壇親受符籙法駕旗幟是時道士冦謙之字輔真南雍州刺史讃之之弟自云冦恂之十三世孫早好仙道有絶俗之心少修張魯之術服食餌藥歴年無效幽誠上逹有仙人成公興不知何許人至謙之從母家傭賃謙之嘗覲其姨見興行貌甚强力作不倦請廽賃興代已使役乃将還令其開舎南棗田謙之於樹下坐筭興懇發至勤時来看筭謙之謂曰汝但力作何為看此二三日後来復看之如此不已後謙之筭十一曜有所不了惘然自失興謂謙之曰先生何為不懌謙之曰我學筭累年而近筭周髀不合以此自愧且非汝所知何勞問也興曰先生試隨興語布之俄然便决謙之嘆伏不測興之深淺請師事之興固辭不肯但求謙之為弟子未幾謂謙之曰先生有意學道豈能與興隠遁謙之忻然從之興乃令謙之潔齋三日共入華山令謙之居一石室自出採藥還謙之食藥不復饑乃将謙之入嵩山有三重石室令謙之住第二重歴年興謂謙之曰興出後當有人将藥来但食之莫為疑怪尋有人將藥而至皆是毒蟲臰惡之物謙之大懼出走興還問狀謙之具對興歎息曰先生未便得仙止可為帝王師耳興事謙之七年而謂之曰興不得乆留明日中應去興亡後先生幸為沐浴自當有人見迎興乃入第三重石室而卒謙之躬自沐浴明日中有叩石室者謙之出視見兩童子一持法服一持鉢及錫杖謙之引入至興尸所興欻然而起著衣持鉢執杖而去先是有京兆灞城人王胡兒其叔父亡頗有靈異曽将胡兒致嵩别嶺同行觀望見金室玉堂有一舘尤珍麗空而無人題曰成公興之館胡兒怪而問之其父曰此是仙人成公興舘坐失火燒七間屋被謫為冦謙之作弟子七年始知謙之精誠逺通興乃仙者謫滿而去謙之守志嵩岳精専不懈以神瑞二年十月乙卯忽遇大神乗雲駕龍導從百靈仙人玉女左右侍衞集于山頂稱太上老君謂謙之曰往辛亥年嵩岳嶺靈集仙宫主表天曹稱自天師張陵去世已来修善之人無所師受嵩岳道士上谷冦謙之立身置理行合自然才任範首可處師位吾故来觀汝授汝天師之位賜汝雲中音誦新科之誡二十卷號曰並進言吾此經誡自天地開闢以来不𫝊於世今運數應出汝宣吾新科清整道教除去三張偽法租米錢稅及男女合氣之術大道清虛豈有斯事専以禮度為首而加之以服食閉練使九疑人長容之等十二人授謙之服氣道引口訣之法遂得辟榖氣盛體輕顔色殊麗弟子十餘人皆得其術泰常八年十月戊戌有牧土上師李譜文来臨嵩岳云老君之𤣥孫昔代郡桑乾以漢武之世得道為牧土宫主臨治三十六土人鬼之政地方八十萬里有竒盖厯術一章之數也其中為方萬里者有三百六十萬遣弟子宣教云嵩岳所絡廣漢平􅁟方萬里以授謙之作誥曰吾處天宫敷演真法處法道年二十二歳除十歳為童蒙其餘十二年教化雖無大功且有指授之勞今賜汝遷入内宫大真大寳九州真師治鬼師治民師繼天師四録修勤不懈依勞復遷賜汝天中二真大文録劾召百神以授弟子文録有五等一曰隂陽大官二曰正府三曰正房真官四曰宿宫散官五曰並進録生壇位禮拜衣冠儀式各有差品凡六十餘卷號曰録圖真經付汝奉持輔佐北方太平真君出天宫靜輪之法能興造克就則起真仙矣又地上生民末刼垂及其中行教甚難但令男女立壇宇朝夕禮拜若家嚴君功及上世其中能修身鍊藥學長生之術即為真君種民藥别授方銷鍊金丹雲英玉漿之法皆有訣要上師李君手筆有數篇其餘皆正真書曹趙道覆所書古文鳥跡篆𨽻雜體辭義約辯宛而成章大與世禮相准擇賢推德信者為先勤者次之又言二儀之間有三十六天天之中有三十六宫宫有一主最髙者無極至尊次曰大至真尊次天覆地載隂陽真尊次洪正陽尊姓趙名道隠以殷時得道牧土之来赤松王喬之倫及韓終張世安劉根張陵近世仙者並為翼從牧土命謙之為子與羣仙結為徒友幽𠖇之事世所不了聼謙之具問一二告焉經云佛者昔於西胡得道在四十二天為延真宫主勇猛苦教故其弟子皆髠形染衣繼絶人道始光初奉其書而獻之世祖乃令謙之止於張曜之所供其食物時朝野聞之若存若亡未全信也崔浩獨異其言因師事之受其法術於是上疏讃明其事曰臣聞聖王受命則有天應而河圗雒書皆寄言於蟲獸之文未若今日人神接對手筆粲然辭㫖深妙自古無比昔漢髙雖復英聖四皓猶或恥之不為屈節今清德隠仙不召自至斯誠陛下侔蹤軒黄應天之符也豈可以世俗常談而忽上靈之命臣竊懼之太武欣然乃使謁者奉玊帛牲牢祭嵩岳迎致其餘弟子在山中者於是崇奉天師顯揚新法宣布天下道業大行浩事天師禮拜甚謹人或譏之浩聞之曰昔張釋之為王生結襪吾雖才非賢哲今奉天師足以不愧於古人矣及嵩髙道士四十餘人至遂起天師道塲於京城之東南重壇五層遵其新經之制給道士百二十人衣食齋宿祈請六時禮拜月設􅌮㑹數千人太武將討赫連昌太尉長孫嵩難之太武乃問幽㣲於謙之對曰必克陛下神武應期天經下治當以兵定九州後文先武以成太平太平真君三年謙之奏曰陛下以真君御世建靜輪天宫之法開古以来未之有也應登受符書以彰聖徳太武從之於是親至道壇受符録備法駕旗幟盡青以崇道家之色也自後諸帝每即位皆如之景穆太子見謙之奏造靜輪宫必令其髙不聞鷄鳴狗吠之聲欲上與天神交接功役萬計經年不成乃言於太武曰人天道殊卑髙定分今謙之欲要以無成之期說以不然之事財力費損百姓疲勞無乃不可乎必如其言未若因東山萬仭之上為功差易太武深然景穆之言但以崔浩賛成難違其意沉吟者乆之乃曰吾亦知其無成事旣爾何惜三五百功九年謙之卒塟以道士之禮先於未亡謂諸弟子及吾之在汝曹可求神仙籙吾去之後天宫真難可復遇設㑹之日更布二席於上師坐前弟子問其故謙之曰仙官来是夕卒前一日忽言吾氣息不理腹中大痛而行止如常至明旦便終須臾口中氣狀若煙雲上出空中至天半乃消尸體引長弟子量之八尺三寸三日已後稍縮至斂量之長六尺六寸於是諸弟子以為尸解變化而去不死也時有京兆人韋文秀隠於嵩髙徵詣京師太武曽問方士金丹事多日可成文秀對曰神仙幽昧變化難測可以闇遇難以預期臣昔者受教於先師曽聞其事未之為也太武以文秀關右豪族風操温雅言對有方遣與尚書崔賾詣王屋山合丹竟不能就是時方士至者前後數十人河東祁纎好相人太武賢之拜纎上大夫頻陽絳略聞喜吴邵道引脩養積年百餘歳神氣不衰𢎞農閻平仙博覽百家之言然不能逹其意辭占應對義㫖可聼太武欲授之官終辭不受扶風魯祈連赫連屈子暴虐避地寒山教授子弟數百人好方術少嗜慾河東羅崇從之常餌松栢不食五穀自稱受道於條山太武令崇還鄉里立壇祈請黄老云條山有穴與崑崙蓬莱相屬入穴中得見仙人與之往來詔令河東郡給所須從穴行百餘歩遂窮後召有司以崇誣罔不道奏治之太武曰崇修道之人豈致欺妄以詐於世或𫝊聞不審而至於此古之君子進人以禮退人以禮今治之是傷朕待賢之意遂赦之文成興光元年二月帝至道壇登受圖籙禮畢曲赦京師班賞各有差獻文天安元年三月辛亥帝幸道壇親受符籙曲赦京師時東萊人王道翼少有絶俗之意隱韓山中四十餘年斷粟食荽通逹經章書符籙嘗隱居深山不交世務年六十餘獻文聞而詔青州刺史韓頽遣使就山召之翼乃赴都獻文以其仍守本操遂令増給衣食終身孝文太和十五年秋詔曰夫至道無形虛寂為主自有漢以来置立壇祠先朝以其至順可歸用立寺宇昔京城之内居舎尚希今者里宅櫛比人神猥凑非所以祗崇至法清敬神道可移於都南桑乾之隂岳山之陽永置其所給戸五十以供齋祀之用仍名為崇虛寺可召諸州隠士貟滿九十人遷雒移鄴踵如故事其道塲在南郊方二百歩以正月七日七月七日十月五日壇主道士哥人一百六人以行拜壇祠之禮後周武帝天和四年二月帝御大德殿集百僚道士等討論其藥帝賦詩以記其迹仍勅於師正所居置隆唐觀及帝營奉天宫特置仙遊門以通師正所止之谷唐中宗神龍元年二月制天下諸州各置觀一所咸以大唐中興為名睿宗􅕺雲元年十月制以雒州襄王府宅為太安國觀十二月癸未制曰𤣥元皇帝朕之始祖無為所庇不亦逺乎第八女西域公主第九女昌隆公主性安虛白神融皎昧並令入道奉為天皇天后宜於京城右造觀仍以來年正月令二公主入道二年正月加銀青光禄大夫行太子率更令史崇𤣥為金紫光禄大夫太清觀主三月癸酉制為皇女金仙玉真二公主於京城各置一觀仍以金仙玉真為名四月手制曰朕聞釋及𤣥宗理均迹異拯人救俗教别功齊豈於中間妄生彼我不遵善下之㫖相髙無上之法有殊聖教頗失􅂜章自今每縁法事集㑹僧尼道士女冠等冝令齋行並進𤣥宗開元八年六月道士葉法善卒制曰故道士鴻臚卿貟外置越國公葉法善天真精宻妙理幽暢包括祕要發揮靈符固以𠖇黙難原希夷罕測而精栖蓬閬迹混朝伍保黄冠而不㧞加紫綬而非榮卓爾孤秀泠然獨往勝氣絶俗真風無塵金骨外聳珠光内暎斯乃體應中仙名升上德朕嘗聼政之暇屈詢至道公以理國之法屢奏昌言謀參隠諷事宣𢎞益歎徽音之未冺悲形解之俄留何莫憗遺殱良奄及永惟平昔感愴於懷宜申禮命式賁泉壤可贈越州都督法善三世為道士皆有攝養占卜之術髙宗聞法善名徴詣京師法善自髙宗則天中宗殆五十年常來名山數詔入禁中盡禮問道然排擠佛法議者或譏其向背以其術髙終莫之測也睿宗即位稱法善有𠖇助之功先天二年拜鴻臚卿封越國公仍舊稱為道士止于京師之景龍觀又贈其父為歙州刺史當時尊寵莫與為比年九十卒九年三月置石柱於景龍觀令天台道士司馬承禎依蔡邕石柱三體書寫老子道德經十年正月己丑詔兩京及諸州各置𤣥元皇帝廟一所並置崇𤣥學其生徒令習道德經及荘列文子等每年准明經例舉送四月帝夢京師終南山趾有天尊之象求得之於盩厔樓觀之側十四年九月制曰𤣥元皇帝先聖宗師國家本系昔草昧之始告受命之期髙祖應之遂於神降之所置廟改縣曰神仙近日廟庭屢彰嘉瑞䖍荷靈應祗慶載深宜令本州擇精誠道士七人於羊角廟中潔齋㷊香以崇􅆢敬十八年十月命集賢院學士陳希烈等於三殿講道徳經侍中裴光庭等奏曰堯舜以揖遜而理湯武以干戈而興或勞神以苦形且役智而憔慮有生之類雖亦聞於小康無為之風故未臻於大道今陛下化成天下與道𤣥同小其有為之迹𢎞此不言之教將以去華歸本削偽存真其為道德之鄉固在老荘之術遂命集賢院學士中書舎人陳希烈諫議大夫王迴質侍講學士宗正少卿康子元賛善大夫馮朝隠等於三殿侍講敷暢真文演襄城之七聖及姑山之四子理之於國唯清唯淨之風脩之於身乆視長生之道聖化𤣥運寰瀛樂康咸日用而不知實曠代之未有臣沗職司望編入史册宣示天下帝手詔報曰朕䖍守宗祧祗膺厯數夙夜兢惕懼不克勝求賢臣而委之謀猷延學者而資其􅀶洽用扶不逮雅致咸和旣内平而外成且刑清而訟息端拱多暇留意典墳以為道者𤣥妙之宗徳為教化之本講諷㣲㫖稽詳秘文庶無為而政成不宰而物應豈敢比德堯舜論功湯武者哉然必先正其心深思逮於遐邇務惟齊俗亦欲申於兆庶必若同歸清淨共守𤣥黙所陳編示良用多慙十九年正月壬戌置五岳真君祠廟各於岳下選德行道士數人焚香洒掃焉初司馬承禎隠於天台徵至京師承禎因上言五岳神祗皆是山林之神非真正之神也五岳皆洞府各有上清真人降任其職山川風雨隂陽氣序是所理焉冠冕章服佐從神仙皆有名數請立齋祠之所帝從其言因敕五岳各置真君祠一所其形像制度皆令承禎推按道經創意為之二十年四月己酉勅曰五岳先制真君祠廟朕為蒼生祈福宜令祭岳使選精誠道士以時設醮及廬山使者青城丈人廟並准此祭醮二十年正月制曰老子道德經宜令士庶家藏一本每年貢舉人量減尚書論䇿一兩條准數加老子策俾尊崇道本𢎞益化源今之此勅亦冝家置一本每須三省以識朕懐侍中裴光庭等奏曰伏見昨日一敕教示百僚爰及兆庶聖恩博洽徳澤如天亦旣生成載加誨朂莫不遷善咸知向方臣忝在樞衡未有𢎞益忽承天奨曠若發蒙雖羲軒上皇堯舜至徳無以加也天下幸甚云云望編入國史以示将來從之詔曰𤣥元之教家國是資匪為先祖貴申道本所以首歳元日因行春令清凈之政期諸相國乎為官擇才可以先淳素也二月逸人張果就徴張果不知何許人也則天時隠於條山往来汾晉間時人𫝊其有延年秘術自云年十千歳堯時為侍中人莫之辨則天遣使召之果佯死不赴後人復見之往来鎮州山中鎮州刺史韋濟以狀聞𤣥宗令通事舎人裴晤往迎之果對使絶氣如死人之状良乆漸蘇晤不敢逼馳還具奏𤣥宗又遣中書舎人徐嶠賫璽書以邀迎之果乃隨嶠至東魯肩輿入宫中𤣥宗親訪以理道及神仙藥餌之事尋下制曰鎮州張果先生遊方之外者也跡先髙尚心入􅆼㝠足混光塵召至城闕莫詳甲子之數且謂羲皇上人問以道樞盡㑹宗極今將行朝禮爰升寵命可銀青光禄大夫號曰通𤣥先生其年請入鎮州賜以衣服及雜綵等便放歸山為造棲霞觀於隠所十二月侍講學士陳希烈等講書畢黄門侍郎同中書門下平章事裴耀卿等奏曰臣等伏承陛下講讀尚書周易道徳莊列畢聖心𢎞道國訓崇儒𤣥風逺被更自兹始况以事殷四海念切萬方日午罷朝旣披文於内殿風迴問俗亦函丈於行宫漢皇乙夜無以過此悟老莊之旨齊物而仁恕以行運堯舜之心稽古則憲章攸備鈎深致逺不疾而速陶鈞庶類品物之歡幸實深𢎞奨大猷簡策之輝光載逺臣等叨陪獻納竊奉音徽慶耀之誠倍百常品伏望付史官騰芳盛烈帝手詔報曰尚書雅誥周易精㣲朕㓜奉師資未窮奥義故時令講説耳至乎莊子及道德經遞為表裏詳其所指觸類繁多旣問廣成之道復得方明之相况之今日千載一時故𢎞斯義以喻卿也編緒簡牘隨卿意焉文武百官尚書左丞相集賢院學士蕭嵩奏曰伏見去年以来有勅令集賢院學士工部侍郎陳希烈諫議大夫王迴質膳部郎中馮朝隠等每日侍講𤣥元皇帝道徳經及周易尚書莊子等以今月二十四日講畢臣聞堯放上代之文以成其聖舜觀古人之象以著其明是知道有可尊禮忘於貴不唯聚學將以範人伏惟開元神武皇帝陛下明實天聪舉惟聖作道風允洽文教克成猶尚以廣生知以從積學事必稽古書皆作徴尊祖而習老經體天而觀易象追廣成之説則問以莊篇考唐郊之舊則詳於堯典日者北祠后土東幸温泉或地渉風沙或天將寒雪而講筵必集帳殿如初足以知好學之志彰克勤之德雖包羲畫卦夏禹受書曷以臻兹臣等忝在朝列預聞帝道伏請宣付史官頒示天下帝手詔荅曰爰開集賢引進儒道退朝講讀盖亦其常歳月周施頗尋章句其雅誥則稽之於古以質今其道真則取之於真不崇其放理國之要可不謂然乎宣付史官依卿所請二十二年十月勅曰道家三元誠有科誡朕嘗精意禱亦乆矣而初未䝉福念不在兹今月十四日十五日是下元齋日都内人應有屠宰令河南尹李適之勾當搃與贖取其百司諸厨日有肉料亦責數奏来并百姓間是日並停宰殺漁獵等兼肉料食自今已後兩都及天下諸州每年正月七月十月元日起十三至十五兼冝禁斷二十三年三月癸未親注老子并修疏義八卷及至開元文字音義三十卷頒示公卿士庶及道釋二門聽直言可否文武百官右丞相蕭嵩等奏曰臣等准勅牒問百司并宣示道俗各得報稱咸以為𤣥言造㣲字説該洽刋成代則欽若聖規觀妙知常以埏埴而為體宿疑前失區條流而畢正是以發揮道教𢎞長儒風旣以化人且聞端本雖旁求異義載佇天心而四海同文一辭寧措並請編入史册藏之袐府許之六月庚寅嘉州峨睂山醮壇有神燈徧照諸峰羣萃成響二十四年八月庚午都城道士於龍興觀設齋發揚御書道徳經上表請降中夜親王宰相及朝官行香并獻蔬食許之九月贈故道士王友真為銀青光禄大夫二十五年正月癸未以道士尹愔為諫議大夫集賢學士兼知史官事特賜朝㪚階制曰古者置長過之官立司過之史所以書君舉箴王闕不次而受惟才是與道士尹愔識洞㣲妙心遊淡泊祗服𤣥元𢎞敷聖教雖混萬物獨詣於清真而博綜九流兼通於儒墨方貴無名之朴期不言之化資其妙道寘彼周行宜居納誨之職仍在記言之地愔上表懇讓詔許衣道士服視事愔乃受職二十六年正月丁丑親迎氣於東郊畢制道釋二門皆為聖教義歸𢎞濟禮在遵崇其天下觀寺大小各度十七人簡擇灼然有經業戒行為鄉閭所推仍先取年髙者二十七年十二月宰臣牛仙客李林甫奏曰臣等伏見皇太子送十一月德音付史官伏承陛下前月五日將欲廵幸渭北是夜夢𤣥元皇帝曰明日子欲遊乎北神不在此事冝止五更當自有應且子之享國多年矣何必此日陛下二更便停勅至五更果烈風大起際暮方定伏以玉真體妙莫大於皇極聖明致理孰盛於吾皇繇是感而遂通聖與神合言不測之事示必然之期果兹烈風有叶靈夢旣彰陛下之祚更表無疆之休同天地而乆長若符契之徴驗臣以上自開闢博考圗書神靈效祥帝王膺慶未有若此之昭著也臣等謬當樞近又忝史官預聞德音不勝忭躍伏望宣示百僚頒及中外帝手詔報曰頃欲渭北近遊夢中有命神不守職事不可行出必有名何容易也賴𤣥聖垂告靈應果然朕夙夜驚懷福慶斯在春秋記異况在此乎所請冝依二十八年五月帝謂宰臣曰朕在藩邸有宅在積善里東南隅冝於此地置𤣥元皇帝廟及崇𤣥學二十九年正月詔曰三皇之時兆庶淳朴盖繇其上以道化人自兹厥後為政各異我烈祖𤣥元皇帝禀大賢之德藴至道之精乃著五千文用矯時弊可以理國家超夫象繫之表出彼明言之外朕有處分令家習此書庶乎人用向方政成不宰慮兹下士未逹微言是以重有發明俾之開悟期弱喪而知復𢎞善貸於無窮兩京及諸州各置𤣥元皇帝廟一所每年依道法齋醮兼置崇𤣥學於當州縣學士數内均融量置令習道徳經及莊子文子列子待習業成後每年隨貢舉人例送至省置助教一人委所繇州長官於諸色人内精加訪擇補授仍稍加優奨是月亳州奏𤣥元皇帝廟中之井湧氣成雲五色相映二月帝謂宰臣曰洪州人鄔𤣥宗往在文明中𫝊𤣥元皇帝真告於天后曰我國祚無窮當千萬君遂遭禁錮因兹淪喪自非忠義之士感激過人孰能不避死亡之誅竟逹神靈之命冝與追贈以慰泉壤其子瑗亦依資授一官制曰故洪州人鄔𤣥宗往者來應嘉詔次于虢略忽覩𤣥元皇帝俾之升雲空中與言使戒天后表國祚中興之運示寳歴無疆之期遂能不顧其身来𫝊此旨竟遭幽繫諒可傷嗟自非竭節本朝孰克犯顔兹日宜加追贈用慰幽魂可贈棣州刺史三月亳州奏老君廟九井先涸自奉詔増修觀寺九井皆湧及樹枯復榮四月漏下後帝謂侍中牛仙客中書令李林甫曰朕自臨御以来向三十年来未嘗不四更初起具衣服禮謁尊容盖為蒼生祈福也昨十日前禮謁事畢之後曙色未分端坐靜意有若假窹忽夢見一真容云吾是汝逺祖吾之形象可三尺餘在京城西南一百餘里時人都不知年代之數汝但遣人尋求吾自應見汝當慶流萬葉享祚無窮吾自度其時合吾與汝興慶中相見汝當大慶吾猶未即言語畢覺後昭昭然若有所覩朕即命使兼令諸道士相隨於京都西南求諸果於盩厔縣樓觀東南山阜間乃遇真容一昨迎到便於興慶宫大同殿安置瞻覩與夢中無異卿等可入觀之仙客林甫俱拜賀上言曰𤣥元大聖降見真容感應之徴實符睿徳陛下禮至真之道崇清淨之源何常不禮敬度誠為蒼生祈福故得真容入夢列祖表靈求之西南果與夣恊且興慶宫者濳龍舊邸王業所興當此處而告期與嘉名而相㑹斯乃降於紫府鎮我皇家啓無疆之休論大慶之應陛下爰捨正殿以為法堂是尊是崇至敬至極殊常之禮将萬福而俱臻無外皆覃及億兆而同慶臣等何幸親詣瞻禮自然相好諒絶名言開闢以来典籍所載未之有也請宣示中外編諸簡册帝手詔報曰夢之正者是謂通神於惟聖容果以誠應豈朕德所及而大道是興再省神靈言猶在耳將貽福業代紀彌多初告以行宫乃置之内殿兼之大慶乆屬朕躬稽之道德以兹為寳當慈育萬姓承荅神明卿等宗臣宜同朕意願揚嘉應安敢讓焉五月庚戌帝夢𤣥元皇帝告以休期命有司圗畵真容分布天下乃下詔曰大道混成乃先於天地聖人立教用敷於宗極故能發揮妙本𢎞濟生靈使秉志者悟徃迷方者知復以此救物故無棄人其孰當之粤若我列祖𤣥元皇帝矣朕纂承寳業重闡𤣥猷自臨御以来罔不夙夜滌慮凝想齊心服禮謁於尊容未明而畢事將三十載矣盖為天下蒼生以祈多福不謂微誠上達宗祖垂鑒頃因假寐或夢真容旣覺之後昭焉以瞻殊相自然與夣相恊誠為宻降仙府永鎮人寰告我以無疆之休德音在聽表我以非常之慶靈貺有期乃昊穹幽賛宗社儲休豈朕虛薄能致兹事若便寢之乃乖祗敬宜令所司即冩真容分送諸道採訪使令當州道轉送開元觀安置所在道士等皆具威儀法事迎後象到七日夜設齋行禮仍各賜錫用充齋慶之費自今已後常令講習道德經以暢㣲㫖所置道學須倍加敦勸使有成益是知真理深逺𢎞之在人不有激揚何以勵俗諸色人等有明道德經及莊列文子等委所繇長官訪擇具以名聞朕當親試别加甄奨今者真容應見古所未聞福雖始於邦家慶宜均於士庶其親王公主郡縣主及内外文武官等並量賜錢至休假之辰宜以素飡用申慶樂諸道節度使及将士等亦准此其兩京及諸州父老亦量賜錢同此歡宴其錢以當處官物充伊爾公卿逮乎黎獻冝勉崇𤣥化共復淳源宣布遐邇明知朕意戊寅有慶雲見於亳州真源縣𤣥元皇帝廟兼有白鶴翔於廟門樓八月丁亥陵州奏開元觀老君真容見儀象分明道士十數人皆見乆之方隠請頒示天下從之甲午命有司於興唐觀設齋自内迎𤣥元皇帝真容於觀宰臣百官悉行香有慶雲見侍中牛仙客中書令李林甫上表賀曰伏以𤣥元孚祐聖感潛通将垂介福必有丕應頃屬初夏㣲陽暫愆自夢恊已来頻降膏澤變兹秋稼成此豐年又數日隂雲通宵澍雨聖容将出天景廓清加以霏煙在天瑞氣捧日元符稠疊若此再三惟皇祖之降靈表吾君以大慶爰自古昔所未嘗聞臣等何人覩兹明應伏望宣付史官帝曰卿等表言數事皆聖祖啓佑應以隨迎祗顧薄躬對越靈命編於史册隨卿意焉九月御興慶門數親試明道徳經及莊文列子舉人問䇿曰朕聽政之暇常讀道德經文列莊子其書文約而意精詞髙而㫖逺可以禮國可以保身朕敦崇其教以左右人也子大夫能從事於此甚盛加之古今異宜文質相變若在宥而不理外物而為行􅃉古之化非御今之道適時之術陳其所冝又禮樂刑政所以經邦國聖智仁義所以序人倫使之廢絶未知其旨道德經曰絶學無憂則乖進德修業之教列子力命曰汝奚功於物又違懲惡勸善之文二㫖孰非何優何劣文子曰金積折亷璧襲無嬴且申其義莊子曰括與支交相養明徵其言使一理混同三教兼舉成不易之則副虛佇之懷有姚子彦靳能元載等䇿入第各授之以官十二月勅曰朕毎念黎庶無忘餐寐冀其家給而足富而且夀仙濟之方莫為道教大聖垂範微言粲然遵而行之其應何逺况時将獻嵗萬物發生旣叶陽和或存恵養冝令天下諸觀起来年正月一日至年終以来常轉本際經其四大齋日毎百官齋之日常令講誦庶澤及無外稱朕意焉是年皇太子奏曰臣弟兄奉恩旨共造大𤣥觀庶慿神力永保聖躬望精選二七人度為道士上曰道貴清浄必在人𢎞念爾等勤誠用依來請是月亳州奏𤣥元皇帝廟門之南丁汝璿家有牛忽變成青牛事符仙瑞請頒示中外許之册府元龜卷五十三
