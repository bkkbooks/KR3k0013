body:
  text: 册府元龜卷九百三十三宋王欽若等撰總錄部誣搆第二後魏斛斯椿莊帝時為平北將軍封隆之為儀同三司為椿等搆之於帝逃歸鄉里北齊神武知其被誣召赴晉陽帝尋以本官徴之隆之固辭不赴北齊宋遊道在魏為尚書左丞時魏安平王坐事亡章武二王及諸王妃太妃是其近親者皆被徴責都官郎中畢義雲主其事有奏而禁有不奏輙禁者遊道判下廷尉科罪高隆之不同於是反誣遊道厲色挫辱已遂枉拷羣令史證成之與左僕射襄城王朂尚書鄭述祖等上言曰飾偽亂真國法所必去附下罔上王政所不容謹按尚書左丞宋遊道名望本闕功績何紀屬永安之始朝士亡散乏人之際叨竊臺郎躁行諂言肆其姦詐空識名義不顧典文人鄙其心衆畏其口出州入省歴忝清資而長惡不悛曽無忌諱毁譽繇已憎惡任情比因安平王事遂肆其褊心因公報隙與郎中畢義雲􅉍相紇舉又左外兵郎中魏叔道牒云局内降人左澤等為京畿送省令取保放出大將軍在省日判聼遊道發怒曰往日官府何物官府將此為例又云乗前㫖格成何物㫖格依事請問遊道並皆承引案律對捍詔使無人臣之禮大不敬者死對捍使者尚得死坐况遊道吐不臣之言犯慢上之罪口稱夷齊心懐盗蹠欺公賣法受納苞苴産隨官厚財與位積雖積汙未露而姦詐如是舉此一隅餘詐可驗今依禮據律處遊道死罪是時朝士皆忿為遊道不濟而文襄聞其與隆之相抗之言謂楊遵彦曰此真是鯁直大剛惡人遵彦曰譬之畜犬本取其吠今以數犬殺之恐將來無復有吠狗詔付廷尉遊道坐除名崔季舒為黄門郎高隆之為太保初文襄委任兼右僕射崔暹及季舒等及文宣即位隆之啓文宣王並欲害之不許文宣以隆之舊齒委以政事季舒等仍前隙乃譖云隆之每見訴訟者輙加哀矜之意以示非已能裁文宣以其受任既久知有寃狀便宜申滌何得委過要名非大臣義天寳五年禁止尚書省隆之曽與元昶宴飲酒酣語昶曰與王交遊當生死不相背人有宻言之者文帝未登庸之日隆之意嘗侮帝帝將受魏禪大臣咸言未可隆之又在其中帝深衘之因此遂大發怒令壮士築百餘拳放出渴將飲水人止之隆之曰今日何在遂飲之因從駕死於路中杜弼家客史不書姓名弼為衛尉卿以本官行鄭州事未發為家客告弼謀反收下獄案治無實久乃見原因此絶朝見祖珽後主時為侍中斛律光為左丞相珽及穆提婆怨之周章韋孝寛忌光英勇作謡言令間諜漏其文於鄴曰百升飛上天明月照長安又曰高山不推自摧樹不扶自豎祖珽因續之曰盲老公背上下大斧饒舌老母不得語令小兒歌之於路提婆聞之以告其母令萱以饒舌斥已也盲老公謂珽也遂相與協謀以謡言啓帝曰斛律累世大將明月聲震闗西豐樂威行突厥女為皇后男尚公主謡言甚可畏也帝以問韓長鸞鸞以為不可事寝祖珽又見帝請問唯何洪珍在側帝曰前得公啓即欲施行長鸞以為無此理珽未對洪珍進曰若本無意則可既有此意而不决行萬一泄露如何帝曰洪珍言是也猶豫未决㑹丞相府佐封士讓密啓云光前西討還勑令放兵散光令軍逼帝京將行不軌事不果而止家藏弩甲奴僮千數每遣使豐樂武都處隂謀往來若不蚤圖恐事不可測啓云軍逼帝京㑹帝前所疑意謂何洪珍云人心亦大聖我前疑其欲反果然帝性至怯愞恐即變發令洪珍馳召祖珽告之又恐追光不從令珽因云爾召恐疑不肯入宜遣使賜其一駿馬語云明日將往東山遊觀王可乗此馬同行光必來奉謝因引入執之帝如其言頃之光至引入凉風堂劉桃枝自後拉而殺之時年五十八於是下詔稱光謀反今已伏法其餘家口並不湏問尋而發詔盡滅其族光長子武都為兖州刺史光死遣使於州斬之次湏􅓤中䕶軍開府儀同三司先卒次世雄開府儀同三司次常伽假儀同三司並賜死隋陳茂高祖時為黄門侍郎與桞莊同官不能降意茂見帝及朝臣多屬意於莊心甚不平帝與茂有舊譖愬頗行尚書省常奏犯罪人依法合流而帝處以大辟莊㨿法執之帝不從由是忤㫖俄屬尚藥進丸藥不稱㫖茂因奏莊不親監臨帝怒之何妥為國子博士房恭懿累為郡守有美政下詔褒美因授海州刺史未幾妥奏恭懿尉逈之黨蘇威宇文愷曲相舉薦帝大怒恭懿竟配放嶺南未幾徴還至洪州卒論者寃之高熲為左僕射加上柱國齊國公坐事以公就第頃之熲國令史不書名氏上熲隂事稱其子表仁謂熲曰司馬仲􅓤初託疾不朝遂有天下公今遇此安知非福於是帝大怒囚熲於内史省而鞫之憲司奏熲他事云沙門真覺常謂熲云明年國有大䘮尼令暉復云十七十八年皇帝有大厄十九年不可過帝聞而益怒顧謂羣臣曰帝王豈可力求孔子以大聖之才作法垂世寧不欲大位邪天命不可耳熲與子言自比晉帝此何心乎有司請斬熲帝曰去年殺虞慶則今兹斬王世積如更誅熲天下其謂我何於是除名為民宇文述煬帝時為左衛大將軍許國公時有李渾字金才太師郕國公穆第十子述乃渾之妻兄也初以國賦之半許述得奉穆嗣二歳之後不以俸物與述述大恚之因醉廼謂其友人于象賢曰我竟為李金才所賣死且不忘渾亦知其言繇是結隙後帝討遼東有方士安伽陁自言曉圖䜟謂帝曰當有李氏應為天子勸盡誅海内凡姓李者述知之因誣搆渾於帝曰伽陀之言信有徴矣臣與金才夙親聞其情趣大異常日數共李敏善衡等日夜屏語或終夕不寢渾大臣也家世隆盛身握禁兵不宜如此願陛下察之帝曰公言是矣可覔其事述乃遣武賁郎將裴仁基表告渾反即日發宿衛千餘人付述掩渾等家遣左丞元文都御史大夫裴蘊雜治之案問數日不得其反狀以實奏聞帝不納更遣述窮治之述入獄中召出敏妻宇文氏謂之曰夫人帝甥也何患無賢夫李敏金才名當祓䜟國家殺之無可救也夫人當自求全若相用語身當不坐敏妻曰不知所出惟尊長教之述曰可言李家謀反金才嘗告敏云汝應圖籙當為天子今主上好兵勞擾百姓此亦天亡隋時也當共汝取之若復渡遼吾與汝必為大将軍每軍二萬餘兵固以五萬人矣又發諸房子姪内外親婭竝募從征吾家子弟决為主帥分領兵馬散在諸軍伺候間隙首尾相應吾與汝前後襲取御營子弟響起各殺軍将一日之間天下足定矣述口自傳授令敏妻冩表封定上寫封云上密表述持入奏之曰已得金才反状并有敏妻密表帝覽之泣曰吾宗社幾傾頼親家公而獲全耳於是誅渾敏等宗族三十二人自餘無少長皆徙嶺外王宏為黄門侍郎初辛公義為楊州道黜陟使官寮犯法無所縱捨及煬帝即位宏自楊州長史入為黄門侍郎因言公義之短竟去官吏人等守闕訴寃相繼不絶唐韋雲起為麟州刺史裴寂為尚書右僕射高祖有所廵幸必令居守雲起告裴寂謀反鞫之無端而釋之皇甫希仁者蜀人也時皇甫無逸初仕隋留守雒陽及王充作難無逸棄老母歸國武徳初廵撫益部蜀中賴之希仁見無逸專制方靣徼倖上變云臣父見在雒陽無逸為母之故隂遣臣與王充相知高祖審其詐數之曰無逸偪於世充因棄母歸朕令之委任異於衆人其在益州極為清正此蓋羣小不耐而欲誣之此乃離間我君臣惑亂我視聼於是斬希仁於順天門遣給事中李公昌馳往慰諭之俄而有告無逸隂與蕭銑交通者無逸時與益州行臺僕射竇璡不叶於是上表自理又言璡罪狀高祖覽之曰無逸當官執法無所廻避必是邪佞之徒惡直醜正共相搆扇也因令劉世隆温彦博案其事卒無騐而止所告者坐斬竇璡亦以罪黜無逸既反命高祖勞之曰公立身行已朕之所悉比多譖愬者但為正直致邪佞所憎耳無逸頓首陳謝高祖又曰卿不負朕何勞多謝楊表陜州人時劉師立為左騎衞將軍奏使幽州道簡㸃軍國表上書告師立自云眼有赤光體有非常之相姓氏又應符䜟及師立還太宗謂之曰人言卿欲反師立大懼曰臣仕於隋不過六品身才駑下不敢輙希富貴過蒙陛下非常之遇以性命許國而陛下功成事立臣致位將軍顧已循省實踰涯分臣是何人輙敢言反太宗笑曰知卿不然此人妄言耳宜勿為懷賜帛六十疋召入卧内而慰諭之高甑生為利州刺史李靖為西海道行軍大總管甑生鹽澤道總管以後軍期靖薄責之甑生因有憾於靖與廣州都督府長史唐奉議告靖謀反太宗命理官按其事甑生等以誣罔得罪乃闔門杜絶賓客雖親不得妄進張君徹高祖時為箕州錄事參軍咸亨中與衆共詣闕誣告刺史簡王渾及其子汝南郡王煒謀反詔通事舍人薛思貞馳驛往推究之渾惶懼自縊而死帝知其非命深痛悼之特令斬君徹等四人于承素為岐州長史時桞奭以高宗后舅歴位中書令后寵既衰固辭轉為吏部尋拜后母魏國夫人被責不許入宫奭由是出為遂州刺史行至扶風承素希㫖奏傳奭漏洩禁中之言復坐貶為滎州刺史許敬宗永徽中為禮部尚書上官儀為西臺侍郎同東西二臺三品時有道士郭行真出入宫掖嘗為皇后行厭勝之法中官王伏勝奏言之高宗大怒密召儀議其事將廢后為庶人仍遣儀具詔草俄而后申訴見納帝又自悔恐后怨怒遽詒云此竝上官儀教我也繇是深為后所惡初儀嘗為陳王府諮議與王伏勝俱事梁王忠府繇是許敬宗搆儀云與忠通謀遂下獄死家口籍沒於是左肅機鄭欽泰西臺舍人高正業司虞大夫魏𤣥同張希乗長安尉崔道黙並除名長流嶺南逺界與儀結託故也簡州刺史薛元超及姑河東夫人坐與儀父通元超長流嶲州薛氏削邑號幽於静安宫右相劉祥道為司禮太常伯郜國公郭廣敬為隰州刺史詳行正卿爾朱儀深為沁州刺史司宰正卿竇斌解職事授銀青光禄大夫以散官依前隴右檢校竝坐與儀交遊故也張嗣明為雒陽令繡州流人徐敬真坐隂相交結嗣明敬真恐死多引海内相識稱有異圖自是朝野為其所牽誅戮者不可勝計内史張光輔為嗣明所引去其往豫州日私説圖䜟天文隂懷两端顧望以觀成敗是日棄市家口籍沒周興則天時為秋官侍郎垂拱中左武衛大將軍檢校右羽林軍封燕國公黑齒嘗之充大總管討突厥大破之時有中郎将㸑寳璧表請窮追餘賊遂全軍而沒興等誣搆云與右鷹揚將軍趙懷節等謀反遂自縊而死時甚惜之來俊臣為左臺御史天授中冬官員外劉憲受詔推案俊臣憲嫉其酷暴欲因事以繩之反為俊臣所搆貶鄰水令再遷司僕丞及俊臣伏誅後擢憲為給事中張易之為麟臺監長安三年八月易之與其弟司僕卿昌宗權位日煽傾朝附之其心自負益欲作難將因皇太子遂譛御史大夫魏元忠及司禮丞高戬交通密謀造飛語曰君老矣吾屬當挾太子可謂耐久則天感其言召皇太子相王諱及諸宰相令易之昌宗與元忠及戩於前參對反覆不决昌宗又引鳳閣舍人張説令證其事説初不知之及則天重令宰相與河内王懿宗推鞫遂堅執不附㑹繇是貶元忠為高要尉説及戩流於嶺表王鉷為御史中丞𤣥宗天寳六年十月丁酉户部侍郎楊慎矜及兄少府少監慎餘弟雒陽令慎名竝以罪伏法枝黨連坐者數十人詔左道亂常邦家所禁兇謀逆即天地不容户部侍郎兼御史中丞楊慎矜潜蓄回邪率由艱險猥承門緒得齒朝行援自卑微謬加超擢寄之弩藏總被均輸殊不知外矯清亷内懷貪冐趦趄百變以此狥身首䑕萬端專為罔上觸途苛細歸怨國家還俗僧史敬忠兇匿逆徒狂愚賊品乃妄陳䜟悔别覬異圖密與交通將期委質仍自以亡國之後克復攸歸遂乃手紀灾祥覬覦時變言肆凶悖心在不臣惡迹旣彰欵驗咸服戴天覆地面目何施梟首夷宗未云塞責但以務𢎞大體志在寛刑尚免嚴誅容其自斃其楊慎矜宜賜自盡其兄少府少監慎餘弟雒陽令慎名等不合相從竝為同惡亦宜令自盡其史敬忠首建逆謀世為巨蠧宜决重杖一百鮮于賁詐稱敬忠當王附㑹凶人宜决重杖六十其范滔妄説妖言與之昵狎宜决六十長流嶺南臨江郡其王庭耀既為傭作終不論告宜决四十配𨽻黔中郡楊慎矜外甥前通事舍人辛景凑引致非類成此禍端宜决四十配流嶺南晉康郡其義陽郡司馬嗣號王臣雖則不渉凶謀終與敬忠相識宜解却官於南賓郡安置其太府少卿張瑄素以妄庸専行險詖比緣慎矜篤引驟歴班榮因此交結潜為黨援况犯贓私情逾難恕宜决六十長流嶺南臨封郡其右威衞執㦸攝天馬監万俟承暉妄畜國書與慎矜解説潛相黨附為蠧實深宜决重杖六十其閑廐使殿中監韋衢忝膺重寄不存公道受慎矜囑請為承暉奏官諂黷愈彰比周斯在宜貶與逺官應配流安置人等所在即差縳馳驛領送其楊慎矜及兄弟幷史敬忠有莊宅等宜竝官收其家口男女等竝令所司准法即配流嶺南諸郡其張瑄及万俟承暉鮮于賁等男女并一房家口亦准比配流其内外近親不可尚列班榮及居京輦宜令三司使即括實奏聞且臣之事君有死無二匹夫狥義猶或亡軀豈有位亞六卿任秉三獨父子相續俱承重委兄弟不次皆列通班而更隂圖不軌潛覬異望静言此心良可歎息除惡務本與衆共之令在惟行盖非獲已中外黎庶咸使聞知先是慎矜為御史中丞鉷為侍御史時韋堅得罪慎矜及鉷按其事鉷訊鞫堅慎矜引身中立鉷恨之李林甫亦憾焉慎矜與鉷父瑨中外兄弟鉷即表姪少相狎及鉷遷中丞雖與鉷同列每呼為王鉷鉷恃與林甫善漸不平之天寳五載慎矜遷户部侍郎中丞使并如故慎矜常與鉷争職田背詈鉷詆其母氏鉷不堪其辱而慎矜性疎素昵於鉷言論無所避忌又與還俗僧史敬忠遊處鉷遂於林甫處言之將搆其罪㑹有人飛狀訟慎矜是隋子孫欲克復隋室􅀻畜異書與凶人來往而説國家休咎時𤣥宗在華清宫聞之震怒詔刑部尚書蕭隠之大理卿李道邃少卿楊璹侍御史楊釗殿中侍御史盧鉉同鞫之於尚書省又使京兆士曹吉温往東京收慎矜兄慎名及史敬忠等雜訊之又令盧鉉先太府少卿張瑄不肯答辨鉉百端拷訊竟不從乃使鉉與御史崔器搜慎矜宅拷其小妻韓珠團求䜟書於慎矜卧内􅆆櫃闇凾中獲之鉉以示慎矜慎矜曰是天命也及温以敬忠至慎矜皆引實乃詔慎矜慎餘慎名並賜自盡庾凖為司農卿徳宗建中初凖與宰臣楊炎厚善炎欲殺劉晏知凖與晏有隙乃用為荆南節度凖乃上言得晏與朱泚書且有怨望又召補州兵以拒命於是先殺晏然後下詔賜自盡海内寃恨之炎已殺晏徴凖為尚書左丞令狐建為右羽林將軍貞元四年郭士倫傭教於建家妻李寳臣女也建惡棄之乃誣與士倫姦通召士倫立榜殺之因逐其妻而奏請按劾及詔三司詰之李氏又奴婢欵證被誣頗明白建乃自引㑹赦免坐竇申為給事中申乃左金吾大將軍嗣號王則之從父甥也申又宰相參之同族兵部侍郎陸贄與參有隙申懼贄見用乃濳結吳通𤣥以傾贄通𤣥與兄通徴同為翰林學士亦與贄不叶恃才輕傲同輩然挾權倖以自久次當遷中書舍人及拜諫議大夫知制誥殊失望因申交結則之乃共造謗書言贄考試貢舉不實通𤣥又取宗室女為外婦帝知其毁贄且令察視具得其姦狀並貶之王叔邕為劍南東川觀察使貞元六年八月叔邕奏得遂州刺史韋昉狀别駕崔位緣自憲官除此郡佐心懷怨望意不狥公濳搆軍人欲為背叛雖姦謀未成今惡跡已彰伏請聞奏者臣伏以崔位官居别乗恩奬不輕而乃長惡不悛肆其姦忒州牧舉覺事跡昭然伏望特誡羣僚庶彰明典詔曰崔位素行無良已有容貸忝職州佐殊不知非尚蓄姦謀罪當極法且委王叔邕决重杖一頓處死位先為義成軍節度姚南仲從事南仲與監軍薛盈珍忿競交惡詔徴盈珍還京南仲隨亦朝覲盈珍乃誣奏言南仲為政之惡皆位及同列馬少㣲賛助也故叔邕希㫖而奏之少微亦出為外官令中使領赴任中路推墮江中而死人皆寃之殺崔位制書至九月庚子方下于昌潤權知通州事山南西道觀察使嚴礪奏得昌潤狀量移官通州别駕崔河圖使奴詆百姓妻抑壓於家中驅使又訴稱疾病請於果州尋醫審令驗問並無疾患者崔河圖自量移通州已逾三載不遵法度故犯典章恃其曽踐周行歴官省闥恣為累横侵擾黎元使奴詆抑良人訴疾妄求出界交通豪俠迫脇村閭伏以巴南諸州去使遼逺山川重阻道路踦危若縱姦人必慮扇結况河圖怨望日久情状難原詔曰崔河圖思過之地不能撿身既再抵國章當從放逐宜長流崔州河圖建中年自諫議大夫貶官凡二十餘載至是又以犯忤監軍中使遂遭昌潤誣搆及禍人甚寃傷之杜兼為濠州刺史兼常怒録事參軍韋賞團練判官陸楚守職論事忤己之意密誣奏二人通謀扇動軍中忽有副使至兼率官吏迎於驛中前呼韋賞陸楚出宣制杖殺之賞進士擢第楚兖公象先之孫皆名家有士林之譽一朝以無罪受戮郡中股慄天下寃嘆之又徐州張建封辟李藩為從事時兼帶使職建封病革兼疾驅到府有冀望藩相與省建封出而泣語兼曰僕射公奄忽如此公宜在州防遏今棄州此來欲何也宜疾去不若此當奏聞兼錯愕不虞遂徑歸建封死兼悔所志不就怨藩甚藩歸揚州兼因誣奏藩建封死時揺動軍中徳宗大怒密詔杜佑殺之賴佑執奏得免韋岳者信州刺史李位小將也憲宗元和九年四月貶位為建州司馬初帝密遣中使往洪州訊事朝野莫知其故及觀察使裴堪奏到方知岳告位大逆及追至命三司使推所告不實量貶位而韋岳杖死位常好黄老及煉餌金丹遣山人王仁恭為之兼修道教齋籙岳緣有求不遂怨憾誣告位於當道監軍使稱位與術士圖謀非望及三司按得情實故有是命張宿為左補闕元和中韋貫之為相嚴貞律下以清流品為先故門無雜賓宿以利口得倖於憲宗將使淄青宰臣裴度欲為請章服貫之曰小人以他門獲進吾軰未能排抑豈要假其恩寵邪所議遂寝宿深衘之卒為所搆誣以朋黨罷為吏部侍郎不渉旬出為湖南觀察使又以出吏部郎中韋顗為峽州刺史刑部郎中李正辭為金州刺史度支郎中薛公幹為房州刺史屯田郎中李宣為忠州刺史考功員外郎韋處厚為開州刺史禮部員外郎崔韶為果州刺史宿皆搆以貫之之黨也顗正辭處厚並以清直稱與貫之善公幹等亦頗熟貫之宿因謂之黨時司勲郎中陳諷求知制誥害其名在己右又與交扇之宿既當寵倖而詭辯過人聞者多動故顗等見黜於是人情大惡宿輩沙橘者瓊王府司馬謝少莒之奴也唐敬宗寳厯元年五月戊申沙橘告少莒為不軌詔委内侍省持鞫不實沙橘各决流靈州少莒釋放凡告人不實法當反坐况其家僕則沙橘止於笞責仍竄近地用刑失矣賈鎮趙元臯者皆萬年縣典也寳厯元年七月鎮及元臯誣告故統軍王佖男正慕等七人謀亂詔杖殺之王璠為左丞李徳裕再為浙西觀察使徳裕至鎮奉詔安排宫人杜仲陽於道觀與之偕給仲陽者漳王飬女王得罪放仲陽於潤州故也九年三月璠與户部侍郎李漢進狀論徳裕在鎮厚賂仲陽結託漳王圖為不軌四月文宗於蓬萊殿召王涯李固言路隨王璠李漢鄭注等靣證其事璠漢加誣搆結語甚切至路隨奏曰徳裕實不至此誠如璠漢之言微臣亦合得罪羣論稍息尋授徳裕太子賓客分司東都其月又貶袁州長史路隨坐證徳裕罷相出鎮浙西其年七月李宗閔坐救楊虞卿貶處州李漢坐黨宗閔貶汾州十一月王璠與李訓造亂伏誅而帝􅀷悟前事知徳裕為朋黨所誣明年三月授徳裕銀青光祿大夫量移滁州刺史七月遷太子賓客後唐韓玫與共奉官烏昭遇同使两浙昭遇本偽梁之承㫖數使吳越先是以其數將命故令使之昭遇至彼每以國情私於吳人仍名吳越國王錢鏐為殿下自稱臣指两地則云南朝北朝及昭遇謁鏐稱見拜蹈如事至尊副使韓玫數讓之昭遇對其人誚玫曰昭遇事過五朝天子四為吳越使時事數變昭遇猶在公軰何凝滯邪復隂許鏐陳奏所求之事使回玫具陳其事故停削鏐官爵令致仕是日以烏昭遇下御史臺尋賜自盡後有自杭州使還者言昭遇無臣鏐事皆玫誣搆云玫恃安重誨之勢頗凌烏昭遇常於杭州既醉以馬箠擊昭遇鏐欲奏之昭遇祈而乃止及復命翻誣昭遇人頗以為寃李存信武皇時為蕃漢馬歩軍都校武皇命邢雒節度使李存孝侵鎮趙之南鄙又令存信及李存審率師出井陘以㑹之併軍致臨城栢鄉李威至且議旋師而存信與存孝不叶因搆於武皇言存孝望風退衂無心擊賊恐其有私盟也存孝知之自恃戰功鬰鬰不平因致書通王鎔又歸欵于汴景進者樂官也荘宗時朱友謙賜姓名繼麟兼賜鐡劵莊宗既有河雒稍怠庶政閹官伶人干預國事方靣諸侯畢行賂遺亦求賂於繼麟雖僶俛奉之不滿其請繼麟令人報之曰予於主上有披榛之舊粗立忠勞河中土薄民貧比無珍産責予厚賂何厭之有繇是羣小咸恚每加誣搆泊繼岌伐蜀繼麟請助師進討乃閲兵師令其子令徳率師以行進與羣閹搆曰昨王師初起繼麟以為討已將拒大軍若不除移終為後患閹伶愈得其志即謂帝曰崇韜强項於蜀盖與繼麟私盟内外響應繼麟將赴京師亦聆其事將校曰大王有功王室密邇京師羣小流言曷能離間但端居奉職何事輕行繼麟曰郭侍郎功倍於我今為閹官讒搆事勢將危安可無説若得靣天階自陳肝鬲流言者湏至得罪繼麟乃單車入覲至於雒陽景進搆曰河中人有告變書言繼麟因崇韜欲謀叛自聞崇韜已死又與李存乂結搆其事細窮其状備得姦原當斷不斷禍不旋踵帝駭惑不能决即令朱守殷以兵圍其第驅於輝安門殺之又詔繼岌殺令徳於遂州令王思同殺令錫於許州令李紹竒赤其族於河中紹竒至友謙妻張氏盡率其族二百口謂紹竒曰予骨肉不多婢僕無罪請疏其名籍無致寃負因閲婢僕百餘人以骨肉百餘口歸法將就戮張氏復入持鐡劵而出示紹竒曰此是皇帝去年所賜之物婦人不知此上有何言語詔使慚而無對良久就戮百口塗地血流盈庭怨哭之聲聞於行路人士至今寃之安重誨為樞密使明宗長興初以潞州節度使王建立為太傅致仕建素與重誨不協因其入朝乃誣言建立自鎮歸朝過鄴都日有揺扇之言以是罪之張儉者棒聖軍使李行徳十將也長興初儉奏據告密人邉彦温云樞密承㫖李䖍徽弟説國家徴發兵師樞密使安重誨自為都統欲討淮南又云占相人言重誨貴不可言是日明宗謂重誨曰聞卿樹心腹私市兵仗欲自討淮南有之否重誨惶恐奏曰興師命將出自宸𠂻必是姦人搆臣願陛下窮詰所言者翌日帝召侍衛指揮使安從進藥彦稠等謂之曰有告安重誨私置兵仗綱紀將不利於社稷將若之何從進等奏曰此是姦人結搆離間陛下勲舊且重誨事陛下三十年從微至著無不盡心今日何苦乃圖不軌臣等以家族保明必無此事帝意乃解遂使中使就第召重誨具以告事人邉彦温之言諭之因面窮詰彦温具狀誣告即斬彦温於市李行徳張儉並族誅蕭希甫為散騎常侍引人告變夜扣内門通變書云修堤兵士欲取郊天日舉火為叛安重誨不之信斬告變者軍人訴屈請希甫啖之至是又毁訾内外執政是夜託疾省中翌日肩輿歸私第月餘參告希甫過積授嵐州司户王昶者宿州符離縣民也清㤗二年昶訴縣令張洙業因簡民田受贓法司推劾乃是縣典韓師練取贓誣洙業以失簡轄遇赦放師練杖殺之漢任廷浩初仕晉高祖鎮太原廷浩多言外事出入無間高祖左右皆憚之初為太原掾後改文水令在文水聚斂貨財民欲陳訴廷浩知之一日先誣告縣吏結集百姓欲刼縣庫高祖怒遣騎兵併擒縣民十數家族誅之寃枉之聲聞於行道葛延遇者李崧之部曲也初漢高祖入京城崧隨虜主北去蘇逄吉占其宅及崧西還為太子太傅對朝之權右謙挹承顔未嘗忤㫖常以宅劵獻蘇逢吉逄吉不悦崧二弟嶼義酣酒無識與楊邠逄吉子弟杯酒之間時言及奪我居第逄吉知之延遇通季嶼船傭嶼撻之督其所負延遇有同軰李澄亦事逄吉延遇夜寄宿於澄家以嶼見督情告遂一夕同謀告變逄吉覽之示史宏肇其日逄吉遣吏召崧至第從容語及延遇告變之事崧即以幼女為託逄吉遣吏送崧於侍衛獄既行崧恚曰自古未有不亡之國不死之人及為吏所鞫乃自誣伏罪舉家遇害少長悉尸於市人士寃之高從誨為荆南節度使高祖乾祐元年遣人押送朝州奏事官沈從進至京師乞加恩命初馬希廣馬希蕚争非潭帥希廣用歐宏練張仲荀謀厚賂朝廷請不行朝州恩命從誨革面自新又援引希蕚求通於朝盖欲離間潭成其覆亡之禍也尹重筠者郢州刺史實之子也隠帝乾祐二年實上章謝釋男重筠之罪實於汝州梁縣有别業所供税賦大而恃郡侯家不時輸送梁縣令羅延賞笞其知荘吏㑹重筠至梁縣以笞荘吏為恥無以報怨自朝廷以誣告殺李崧後凡僕使軰皆相倣流言脇主以告事為詞而稍渉迹危者姑息不暇重筠乃詐為延賞與李守貞書言欲殺刺史據汝州應接守貞封書偽遺於途吏得之送刺史石公霸明之延賞幾遭陷害周高行周漢高祖時為太傅及杜重威叛行周為招討使時張鵬為鎮州副使過鄴城行周接之甚懽鵬因言及晉朝傾亡之事少帝任用失人藩輔之臣惟務積財富家不以國家為意以至宗社冺滅非獨帝王之咎也行周性本寛厚不以鵬言為過鵬既退行周左右謂行周曰張副使之言盖譏令公也行周因發怒遂奏鵬怨國訛言故朝廷降詔就誅於常山高紹基為延州衙内指揮使太祖廣順三年二月紹基言觀察判官李彬承節度使夣變結搆内外謀殺都指揮使及行軍副使自據城池已伏誅其李彬妻劉氏子懷義懷義妻高氏竝已收捕其高氏是臣親姊乞留在臣家特報李彬弟勲見充河中馬歩都指揮使彬兄景韜一房九口彬姪懷貞一房十一口彬媵妾一人竝已收捕在州其李勲請行捕録勑李懷義懷貞景韜等並放宜令向訓並諸房骨肉奴僕津置起離量差兵士防援竝於汝州安置又以李彬被誣竝釋其族仍恐遇禍乃徙於汝州册府元龜卷九百三十三
