body:
  text: 册府元龜卷五百六十九宋王欽若等撰掌禮部作樂第五隋煬帝大業元年詔曰古先哲王經國成務莫不因人心而制禮則天明而作樂昔漢氏諸廟既别所樂亦不同至於光武之後始立共堂之制魏文承運初營廟寢太祖一室獨為别宫自兹之後兵車交爭制作規模日不暇給伏惟髙祖文皇帝功侔造物道濟生靈享薦宜殊樂舞須别今若月祭時饗既與諸祖共庭至於舞功獨於一室交違禮意未合人情其詳議以聞有司未及陳奏帝又以禮樂之事總付秘書監柳顧言少府副監何稠著作郎諸葛潁秘書郎袁慶隆等增多開皇樂噐大益樂員郊廟樂懸並令新制其後帝復難於改作其議竟寢諸郊廟歌詞亦並依舊制惟新造髙祖廟歌九首又遣秘書省學士定殿前樂工歌十首二年突厥染干來朝帝欲誇之先是齊武平中有魚龍漫衍俳優侏儒山車巨象㧞井種𤓰殺馬剝驢等竒怪異端百有餘物名為百戲周時鄭譯有寵於宣帝奏徵齊散樂人竝會京師為之蓋秦角抵之流者也開皇初竝放遣之至是總追四方散樂大集東都初於芳華苑積翠池側帝帷宫女觀之有舎利先來戲於場内須臾跳躍􅈭水滿衢黿鼉龜鼇水人蟲魚遍覆於地又有大鯨魚噴霧翳日倐忽化成黃龍長七八丈聳踊而出名曰黃龍變又以繩繫兩柱相去十丈遣二倡女對舞繩上相逢切肩而過歌舞不輟又為夏育扛鼎取車輪石臼大盆噐等各於掌上而跳弄之并二人戴竿其上有舞忽然騰透而換易之又有神鼇負山幻人吹火千變萬化曠古莫儔染干大駭之自是皆於太常教習每嵗正月萬國來朝留至十五日於端門外建國門内綿亘八里列為戲場百官起棚夾路從昏逹旦以縱觀之至晦而罷伎人皆衣錦繡繒綵其歌舞者多為婦人服鳴環珮玉飾以花眊者殆三萬人初課京兆河南製此衣服而兩京繒錦為之中虛初髙祖定令置七部樂一曰國伎二曰清商伎三曰髙麗伎四曰天竺伎五曰安國伎六曰龜兹伎七曰文康伎又雜有疎勒扶南康國百濟突厥新羅倭國等伎至是乃定清商西凉龜兹天竺康國疎勒安國髙麗禮畢以為九部樂噐工衣創造既成大備於兹矣帝又置宴饗設鼓吹依梁為十二架按案别有錞于征鐸軍樂鼔吹等一部案下皆熊羆貙豹騰倚承之以象百獸之舞其大駕鼔吹竝朱漆畵大鼔加金鐲羽葆鼔鐃節鼔皆五彩重蓋其羽葆鼔仍飾以羽葆長鳴中鳴大小橫吹五綵衣幡緋掌畵交龍五彩脚大角亦如之大鼔長鳴大橫吹節鼔及橫吹後笛簫篳篥笳桃皮篳篥等工人服緋地苣文為袍袴及帽金鉦棡鼓皆加八角紫繖小鼔中鳴其棡鼓小橫吹及橫吹後笛簫篳篥笳桃皮篳篥等工人服竝青地苣文􅂁袴及帽羽葆鼔鐃及歌簫笛工人服竝武弁朱褠衣革帶大角工人平巾幘緋衫白皮大口袴其鼔吹督帥服與大角同以下准督帥服亦如之棡鼔一曲一十二變夜警用一曲俱盡次奏大鼓大鼓一十五曲供大駕一十二曲供皇太子一十曲供王公等小鼓九曲供大駕三曲供皇太子及王公等長鳴色角一百二十具供大駕三十六具供皇太子十六具供王公等吹鳴色角一百二十具供大駕十二具供皇太子一十具供王公等大角第一曲起捉馬第二曲被馬第三曲騎馬第四曲行第五曲入陣第六曲収軍第七曲下營皆以三通為一曲其詞竝本之鮮卑鐃鼓十二曲供大駕六曲供皇太子三曲供王公等其樂噐有鼔并歌簫笳大橫吹二十九曲供大駕九曲供太子七曲供王公其樂噐有角節鼓笛簫篳篥笳桃皮篳篥小橫吹十二曲供大駕夜警則十二曲供用其樂噐有角笛篳篥笳桃皮篳篥六年二月大括魏齊周陳樂人子弟悉配太常竝於闗中為防置之其數益多前代是年諸夷大獻方物突厥啓民以下皆國主親來朝賀乃於天津街盛陳百戲自海内凡有竒伎無不總萃崇侈噐玩盛飾文服皆用珠翠金銀錦罽絺繡其營費鉅億萬闗西以安德王雄總之東都以齊王􅌔總之金石匏革之聲聞數十里外彈絃擫管以上八千人大列炬火光燭天地百戲之盛振古無比自是每年以為常焉先是漢至梁陳樂工其大數不相踰越及周并齊隋并陳各得其樂工多為編户至是始大搜括焉柳顧言等又奏先都宫内四時祭享還用太廟之樂歌功論德别製其詞七廟同院樂依舊式又造享宴殿庭宫懸樂噐布陳簨簴大抵同前而於四隅各立建鼔三按文設十二鏄鐘别鐘磬三架各依神位為調合三十六架至於音律節奏皆依雅曲意在演令繁㑹自梁武帝始也開皇時廢不用至是又復焉柳顧言復增房内樂益其鐘磬奏議曰房内樂者主為王后絃歌諷誦以事君子故以房室為名燕禮鄉飲酒禮亦取而用也故云用之鄉人焉用之邦國焉文王之風繇近及逺樂以感人須存雅正既不設鐘鼔義無四懸何以取正於婦道也磬師職云燕樂之鐘磬鄭元曰燕房内樂也所謂隂聲金石備矣以此而論房内之樂非獨絃歌必有鐘磬也内宰職云正后服位詔其禮樂之儀鄭元薦其入出賓客理亦宜同請以歌鐘歌磬各設二虡土革絲竹並副之並升歌下管總名房内之樂女奴𨽻習朝燕用之制曰可於是内宫懸二十虡其鎛鐘十二皆以大磬充去建鼔餘飾並殿庭同皇太子軒懸去南面設三鎛鐘於辰丑申三建鼔亦如之編鐘三虡編磬三虡共三鎛鐘為九虡其登歌減省二人簨虡金三博山樂噐應漆者朱漆之其二舞用六佾其雜樂鼓吹多依開皇之故雅樂合十二噐今列之如左金之屬二一曰鎛鐘每鐘懸一簨虡各應律吕之音即黃帝所命伶倫鑄十二鐘和五音者也二曰編鐘小鐘也各應律吕大小以次編而懸之上下皆八合十六鐘懸於一簨虡石之屬一曰磬用玉若石為之懸如編鐘之法絲之屬四一曰琴神農制為五絃周文王加二絃為七者也二曰瑟二十七絃伏羲所作者也三曰筑十二絃四曰箏十三絃所謂秦聲蒙恬所作者也竹之屬三一曰簫十六管長二尺舜所造者也二曰箎長尺四寸八孔蘇公所作者也三曰笛凡十二孔漢武帝時邱仲所作者也京房備五音有七孔以應七聲黃鐘之笛長二尺八寸四分四釐有竒其餘亦上下相次以為長短匏之屬二一曰笙二曰竽並女媧之所作者也笙列管十九於匏内施簧吹之竽大三十六管土之屬一曰塤六孔㬥辛公之所作者也革之屬五一曰建鼔夏后氏加四足謂之足鼓殷人柱貫之謂之楹鼔周人懸謂之懸鼔近代相承植而貫之謂之建鼔蓋殷所作也棲翔鷺於其上不知何代所加或曰鵠也取其聲揚而逺聞或曰鷺鼔精越王勾踐擊大鼔於雷門以厭吳晉特遺於建康有䨇鷺􅴾鼓而飛乎雲或曰皆非也詩云振振鷺鷺于飛鼔咽咽醉言歸古之君子悲周道之衰頌聲之輟飾鼓以鷺存其風流未知孰是靈鼔靈鼗並八面雷鼓雷鼗六面路鼔路鼗四面鼓以桴擊鼗貫其中而手揺之又有節鼓不知誰所造也木之屬二一曰柷如桶方二尺八寸中有椎柄連底動之令左右擊以節樂二曰敔如伏虎背有二十七鉏鋙以竹長尺橫櫟之以止樂焉簨虡所以懸鐘磬橫曰簨飾以鱗屬植曰虡飾以臝及羽屬簨加木板於上謂之業殷人刻其上為崇牙以掛懸周人畵繪為䈉戴之以璧垂五采羽於其下樹於簨虡之角近代又加金慱山於簨上垂旒蘇以合采羽帝又博訪知鐘律歌管者皆追之時有曹士立裴文通唐羅漢常寳全等雖知操弄雅鄭莫分然總付太常詳令刪定議修一百四曲其五曲在宫調黃鐘也一曲應調大吕也二十五曲商調太簇也十四曲角調姑洗也一十三曲變徵調㽔賓也八曲徵調林鐘也二十五曲羽調南吕也一十三曲變宫調應鐘也其曲大抵以詩為本叅以古調漸欲播之絃歌被之金石仍屬戎車不遑刋正禮樂之事竟無成功焉唐髙祖武德初吏部郎中祖孝孫奏請作樂時軍國多務未遑改創每燕享因隋舊制奏九部樂一燕樂二清商三西凉四扶南五髙麗六龜兹七安國八疎勒九康國九年正月命秘書監竇璡太常少卿祖孝孫修定雅樂太宗貞觀元年正月丁亥宴群臣奏秦王破陣樂之曲太宗謂侍臣曰朕昔在藩屢有征討世間遂有此歌豈意今日登於雅樂然其發揚蹈厲雖異文容功業繇之致有今日所以被於樂章示不忘於本也尚書左僕射封德彛進對曰陛下以聖武戮難立極安人功成化定陳樂象德實𢎞濟之盛烈將來之壯觀文容習儀豈得為比太宗曰朕雖以武功定天下終當以文德綏内外文武之道各隨其時公謂文容不如蹈厲斯為過矣德彛頓首曰臣不敏不足以知之其後令魏徵虞世南禇亮李百藥改製歌詞二年六月祖孝孫奏所製雅樂先是陳梁舊樂雜用吳楚之音周齊舊樂多渉胡戎之伎於是斟酌南北考以古音作為大唐雅樂以十二律各順其月旋相為宫按禮記云大樂與天地同和故製十二和之樂合三十一曲八十四調祭圓丘以黃鐘為宫方澤以林鐘為宫宗廟以太簇為宫五郊朝賀享宴則隨月用律為宫初隋但用黃鍾一宫唯扣七鍾餘五鍾虛懸而不扣及孝孫建旋宫之法皆遍扣鐘無復虛懸者矣祭天神奏豫和之樂地祗奏順和宗廟奏永和天地宗廟登歌俱奏肅和皇帝臨軒奏太和王公出入奏舒和皇帝食舉及飲酒奏休和皇帝受朝奏政和皇太子軒懸出入奏承和元日冬至皇帝禮會登歌奏昭和郊廟俎入奏雍和皇帝祭享酌酒讀祀文及飲福受胙奏壽和五郊迎氣各以月律而奏其音又郊廟祭享奏化康凱安之舞周禮旋宫之義亾絶已久時莫能知一朝復古自此始也太宗曰禮樂者盖聖人緣物設教以為治然治之隆豈此之繇御史大夫杜淹對曰前代興亾實繇於樂陳將亾也為玉樹後庭花齊將亾也而為伴侣曲行路聞之莫不悲泣所謂亾國之音也以是觀之盖樂之繇也太宗曰不然夫音聲能感人自然之道也故歡者聞之則悦憂者聽之則悲悲歡之情在于人心非由樂也將亾之政其民必然苦心所感故聞而則悲何有樂聲哀怨能使悦者悲乎今玉樹對伴侣之曲其聲具存朕當為公奏之知公必不悲矣尚書右丞魏徵奏曰古人稱禮云禮云玉帛云乎哉樂云樂云鐘鼔云乎哉樂在人和不繇音調太宗然之孝孫卒協律郎張文収善音律嘗覽蕭吉樂譜以為未詳悉乃取歴代㳂革截竹為十二律吹之備盡旋宫之義太宗召文収於太常令與少卿祖孝孫叅定雅樂大樂有古鐘十二代唯用七餘有五鐘俗號啞鐘莫能通者文收吹律調之皆響徹人服其能復採三禮言孝孫雖創其端至於郊禋用樂事未周備詔文收與太常掌禮官等更釐改於是依周禮祭昊天上帝以圜鐘為宫黃鐘為角太簇為徵姑洗為羽奏豫和之舞若封太山同用此樂祭地祗方岳以函鐘為宫太簇為角姑洗為徵南吕為羽奏和順之舞禪梁甫同用此樂禘祫宗廟以黃鐘為宫大吕為角太簇為徵應鐘為羽奏永和之舞五郊日月星辰及類於上帝黃鐘為宫奏用豫和之曲大蜡大報以黃鐘太簇姑洗㽔賓夷則無射等調奏豫和順和永和之曲明堂雩以黃鐘為宫奏豫和之曲神州社稷籍田宜以太簇為宫雨師以姑洗為宫山川以㽔賓為宫並奏順和之曲享先妣以夷則為宫奏永和之舞大享燕奏姑洗㽔賓二調皇帝郊廟食舉以月律為宫並奏休和之曲皇帝郊廟出入奏太和之樂臨軒出入奏舒和之樂竝以姑洗為宫皇帝大射姑洗為宫奏騶虞之曲皇太子奏貍首之曲皇太子軒懸姑洗為宫奏永和之曲凡奏黃鐘歌大吕奏太簇歌應鐘奏姑洗歌南吕奏㽔賓歌林鐘奏夷則歌仲吕奏無射歌夾鐘黃鐘㽔賓為宫其樂九變大吕林鐘為宫其樂八變太簇夷則為宫其樂七變夾鐘南吕為宫其樂六變姑洗無射為宫其樂五變仲吕應鐘為宫其樂四變天子十二鐘上公九侯伯七子男五卿六大夫四士三及成奏之太宗稱善於是加級頒賜各有差六年九月幸慶善宫讌三品已上賦五言詩於是起居郎吕才請於樂府被之管絃名為功成慶善樂之曲令童兒八佾皆進德冠紫袴褶為九功之舞冬正享宴及國有大慶與七德之舞偕奏於庭是年詔禇亮虞世南魏徵等分作樂章七年正月帝制破陣樂舞圖左圓右方先偏後伍魚麗鵝鸛箕張翼舒交錯屈伸首尾囘互以象戰陣之形令起居郎吕才依圖教樂工一百二十人被甲執㦸而習之凡為三變每變為四陣有徃來疾徐擊刺之象以應歌節數日而就更名七德之舞癸巳宴三品已上及州牧蠻夷酋長於𤣥武門太宗謂侍臣曰四海和平天下同樂自古帝王罕得事太上皇萬福膝下之懽有倍常慶於是奏七德九功之舞觀者覩其抑揚蹈厲莫不扼腕踴躍懔然震竦武臣烈將咸上壽云此舞皆是陛下百戰百勝之形容羣臣咸稱萬嵗蠻夷十餘種自請率舞詔許之久而罷賜帛各有差十四年正月陜州言河水變清又有景雲見張文收採古朱鴈天馬之義制景雲河清歌名曰讌樂奏之管絃為諸樂之首元會第一奏者是也工人緋綾􅂁絲布袴舞二十人分為四部六月詔曰殷薦祖考以崇功德比雖加以誠潔而廟樂未稱宜令所司詳諸故實制定奏聞八座議曰七廟觀德義冠於宗祀三祖在天式彰於嚴配致敬之情允洽大孝之道攸宜是以八佾具陳肅儀刑於綴兆四懸備展被鴻徽於雅音考作樂之明義擇皇王之令典前聖所履莫大於兹伏惟皇帝陛下天縱感通率繇㝠極孝理昭懿先被於八埏愛敬純深追崇於百葉永言錫祚斯𢎞頌聲鐘律格音播鏗鏘於饗薦羽籥成列申蹈厲於蒸嘗爰詔典司加隆稱謂循聲覆實敬闡尊名竊以皇靈滋慶濬源長委邁吞燕之生商軼擾龍之肇漢盛韜光於九二漸發迹於三分髙祖紐地補天重張區宇反魂肉骨冄造生靈恢恢帝圖與二儀而合大赫赫皇道共七曜以齊明雖復聖迹神功不可得而窺測經文緯武敢有寄於名言敬備樂章式昭彞範皇祖𢎞農府君宣簡公懿王三廟樂請同奏長發之舞太祖景皇帝廟樂請奏大基之舞世祖元皇帝廟樂請奏大明之舞文德皇后廟樂請奏光大之舞七廟登歌請每室别奏制可之十六年十一月乙亥宴百寮奏十部樂先是伐髙昌收其樂付太常乃増九部為十部也髙宗以貞觀二十三年五月即位八月有司奏言謹按太廟每室有樂舞太宗皇帝廟將禘祔廟未有舞名太尉長孫無忌侍中于志寧議曰易云先王作樂崇德殷薦上帝以配祖考請名崇德之舞詔從之永徽三年五月有司奏言文德皇后廟樂請停光大之舞唯進崇德之舞從之顯慶元年正月庚寅改破陣樂舞為神功破陣樂三年十月辛亥太常奏白雪琴曲先是帝以琴中雅曲古人歌之近代以來此聲頓絶令所司簡樂工解琴笙者修習舊曲至是太常上言謹按禮記及家語云舜彈五弦之琴歌南風之詩是知琴操曲弄皆合於歌又張華博物志云白雲是天帝使素娥鼓五十絃琴曲又楚大夫宋玉對襄王云有客於郢中歌陽春白雪國中和者數十人是知白雪琴曲本宜合歌以其詞髙人和遂寡自宋已來迄于千祀未有能歌白雪者臣今准敇倣琴中舊曲定其宫商然後教習竝合於歌輙以御製雪詩為白雪歌詞又按古今樂府正奏曲之後皆别有聲君唱臣和事彰前史輙以侍中許敬宗等奉和雪詩以為迭聲合十六節今悉教訖竝皆諧韻帝善之乃付太常編於樂府龍朔元年正月丙申朔帝欲伐遼詔李勣李義府任雅相許敬宗許圉師張延師蘇定方阿史那忠于闐王伏闇上官儀等謀於雒城門觀屯營新教之舞名之曰一戎大定樂時欲親征遼以象用武之勢麟德二年十月壬戌詔曰國家平定天下革命創制紀旌功德久被樂章令郊祀四懸猶干戚之舞先朝作樂韞而未伸其郊廟享宴等宫懸文舞宜用功成慶善之樂皆着履執拂依舊服袴褶童子冠其武舞宜用神功破陣之樂皆衣甲持㦸其執纛之人亦着金甲仍量加簫笛歌鼔等於懸南列坐與宫懸合奏咸亨四年十一月丙寅帝自製樂章有上元二儀三才四時五行用之俄又詔有司諸大祠享並奏之上元三年十二月勅新造上元之舞先令大祠享皆將陳設自今已後圓丘方澤太廟祠享然後用此舞餘祭並停儀鳳二年八月太常少卿韋萬石奏曰據貞觀禮郊享日文舞奏豫和順和永和等樂其舞人着委貌冠服手執籥翟其武舞奏凱安其舞人着平冕手執干戚奉麟德二年十月敇文舞改用功成慶善樂武舞改用神功破陣樂並改噐服但以慶善樂不可降神破陣樂又未入雅樂雖改用噐服其舞猶依舊迄今不改事既不安恐須别有處分詔曰舊文舞武舞既不可廢并其噐服摠宜依舊若軒懸作上元舞日仍奏成功破陣樂及功成慶善樂并殿庭用舞並須引出懸外而作其安置舞曲宜更商量作安稳法并錄凱安六變法象奏聞萬石又與刋正樂官等奏曰謹按凱安舞是貞觀年中所造武舞准貞觀禮及今禮但郊廟祭享奏武舞之樂即用之凡有六變一變象龍興參野二變象尅靜闗中三變象東夏賓服四變象江淮寧謐五變象獫狁懾伏六變復位以崇象兵還振旅謹按貞觀禮祭享日武舞惟作六變亦如周之大武六成禮止按樂有因人而止如禮云諸侯相見揖讓而入門入門而懸興揖讓而升堂升堂而樂闋是也有著成數者數終則止不得取行事賖促為樂終早晚即禮云三闋六成八變九變是也今禮奏武舞六成而數終未止既作非師古不可依行其武舞凱安望請依古禮及貞觀禮六成樂止立部伎内破陣樂五十二遍修雅樂只有兩遍名曰七德立部伎内慶善樂七遍修大雅樂只有一遍名九功上元舞二十九遍今入雅樂一無所減每見祭享日三獻已終上元舞猶自未畢今更加破陣樂慶善樂恐酌獻已後歌舞更長其雅樂内破陣樂慶善樂及上元舞三曲並望修改通融令長短與禮相稱兾望於事為便破陣樂有象武事慶善樂有象文事先儒所傳國家以揖讓得天下則先奏文舞若以征伐得天下則奏武舞望請應二舞日先奏神功破陣樂次奏功成慶善樂先奉敇於圓丘方澤太廟祠享日則用上元之舞臣據見行禮欲於天皇酌獻降復位已後即作凱安六變樂止有神功破陣樂功成慶善樂上元之舞二曲得修改訖以次通融作之即得新舊並行前後有序詔從之時萬石奏太樂博士弟子等有遭䘮者教習向成一朝囬家隨亦荒廢又此軰皆無别業雖放行服家舎必更鬻伎鄉閭請百日之後量追赴上侍御史劉思立劾之曰竊以移風易俗莫善於樂睦親化人莫善於孝所以三年之禮貴賤咸逹金革之事始有墨縗縱此軰小人先無俯就猶欲凡在其上朂之企及若遣釋服作樂則甚紊禮經帶絰理音又全虧國體豈以其居家不能執禮遂欲曹司約為非法萬石身居禮樂之官輙昧吉凶之本頒之率土理恐未安既爽風化之源請挂糾繩之末上方委任萬石竟不從思立所奏三年七月帝在九成宫於咸亨殿宴集有韓王元嘉霍王元軌及南北軍將軍等樂作太常少卿韋萬石奏稱破陣樂舞者是文皇發迹所繇宣揚祖宗盛烈傳之於後永永無窮自天皇臨馭四海寢而不作既縁聖情感愴羣下無敢闗言臣沗職樂司廢墜是懼依禮祭之日天子親摠干戚以舞先祖之樂與天下同樂之也今破陣樂久廢羣下無所稱述將何以發孝思之情帝瞿然改容俯遂所請有制令奏樂舞既畢帝歔欷感咽涕泗交流臣下悲淚莫能仰視久之顧謂兩王曰不見此樂垂三十年乍此觀聽實深哀感追思徃日王業艱難勤勞若此朕今嗣守洪業可忘武功古人云富貴不與驕奢期驕奢自至朕謂時見此舞以自誡朂兾無盈滿之過非為歡樂奏陳之耳侍宴羣臣咸呼萬嵗調露三年正月乙酉帝御雒城南樓賜晏太常奏新造六合還淳之舞則天光宅元年九月制髙宗廟樂以鈞天為名天授中製天授樂舞四人畵五綵鳳長壽二年正月親享萬象神宫先是自製神宫大樂舞用九百人至是舞于神宫之庭是時又製長壽樂武十有二人畵衣冠延載元年正月製越古長年樂一曲又有鳥歌萬嵗樂時宫中養鳥能人言嘗稱萬嵗為樂以象之舞三人緋大䄂並畵鸜鵒冠作鳥像大定元年幸京師同州刺史蘇壊進聖主還京樂舞御行宫樓觀之賜以束帛令編於樂府睿宗景雲元年有司奏宗廟奏太和之舞𤣥宗開元二年六月左拾遺蔡孚獻龍池集公卿士已下凡三百篇請付太常寺其間詞合音律者為龍池樂章以歌聖德從之初帝在籓與宋王等居于興慶里時人謂為五王子宅及景龍末宅内神池涌出泛灩清瑩流之不竭中有龜龍遊焉故羣臣歌之舞十二人冠飾以芙蓉備用雅樂而無鐘磬舞人躡履六年十月制睿宗廟樂奏景雲之舞八年九月瀛州司法叅軍趙盛言論郊廟用樂表曰祭天地宗廟樂合用商音又周禮三處大祭俱無商調鄭元云此無商調者祭尚柔商堅剛也以臣愚知斯義不當但商金聲也周家木德金能尅木作者去之今皇唐土王即殊周室五音損益須逐便宜豈可將木德之義施土德之用又説者以商聲配金即作剛柔理解殊不知聲無定性音無常主剛柔之體實繇其人人和則音柔人怒則聲烈故禮稱怒心感人者其聲麗以厲愛心感者其聲和以柔祗如宫聲為君商聲為臣豈以臣位配金為臣道便為剛乎是知周制無商不為堅剛見闕蓋以扶木德忌金行故國祚靈長後葉昌盛卜代三十卜年八百是去金之應也即人神之心可見剛柔之理原乎聖人之情詳夫作者之㫖車服噐械為易代之通規郊禋聲調避德王之刑尅此不疑之理也其三祭並請加商調去角調又郊廟二舞人不依古制未恊人神按周禮以樂舞教國子舞雲門大咸大濩大武是知古之舞者即諸侯子孫容服鮮麗故得神祇降福靈光燭壇今之舞人並容貌蕞陋屠沽之流用以接神欲求降福固亦難矣有隋之祭猶以品子為之號為二舞郎逮乎聖朝遂變斯制誠願革兹近誤著復古道其二舞人望取品子年二十以下顔容修正者充令太常博士主之准國子學給科行事之外習六樂之道學五禮之儀經十周年量文武授散官號曰雲門生又按周禮奏太簇歌應鐘以享地祇註云地祇謂神州社稷也太簇陽也位在寅應鐘隂也位在亥故斗建亥則日月會於寅斗建寅則日月會於亥是知聖人之制取合於隂陽歌奏之儀用符於交會今之祭社稷乖古法乃下奏太簇上歌黃鐘但太簇黃鐘俱是陽律上下歌奏不異仍是陽合於陽非特違其禮經抑亦乖於㑹合其社壇歌黃鐘望改為應鐘又五郊工人舞人衣服各依方色按周禮以蒼璧禮天以黃琮禮地以青圭禮東方以赤璋禮南方以白琥禮西方以𤣥璜禮北方是知五天帝德色王不同四時文物各隨方變兾以同色相感同事相宜隂陽交㤗莫不繇此今祭噐茵褥摠隨於五方五郊衣服獨乖其方色舞者常持皂飾工人常服絳衣以臣愚知深為不便但五行相尅賢愚共悉絳為火色有忌於金方皂為水位則妨於火德事理乖迕居然可明其工人舞人衣服望各依方色其宗廟黃色仍各以所主禮神又以樂理身心禮移風俗請立樂教以化兆人周禮曰以樂德教國子中和祗庸孝友其國子諸生望教以樂經同於禮傳則人人知禮家家知樂然後移風易俗灾害不生其樂經章目雖詳稍乖㫖要望委通明博識修譔訖然後頒十二年正月詔曰朕聞舞者所以節八音而行八風豈徒誇詡時代眩曜耳目而已也自立雲韶内府百有餘年都不出於九重今欲陳於萬姓兾與羣公同樂豈獨娛於一身且珠翠綺羅孰非珎玩嘗念百金之費每惜十家之産是以所服之服俱非綺羅所冠之冠亦非珠翠若至弋綈之制大帛之衣德雖謝於古人儉不忘於曩哲庶羣公等觀此當體服之不奢十三年詔燕國公張説改定樂章帝自定聲度説為之詞令太常樂工就集賢院教習數月方畢因定封禪郊廟詞曲及舞至今行焉十五年太常卿韋縚令博士韋逌直太樂季尚冲樂正沈元禮郊社令陳處申懐操等銓叙前後所行用樂章為五卷以付太樂鼔吹兩署令工人習之時太常舊相傳有讌樂五調歌詞各一卷或云貞觀中侍中楊恭仁趙方等所銓集詞多鄭衛皆近代詞人雜詩至是縚又令太樂孫元成更加釐革編為七卷二十九年六月太常奏曰准十三年東封太山所定雅樂曰豫和六變以降天神順和八變以降地祗皇帝行用太和之樂其封太山也登歌奠玉幣用肅和之樂迎爼用雍和之樂酌福飲福用福和之樂送文迎武用夾鐘宫豫和之樂禪社首也送神用林鐘宫順和之樂享太廟也迎神用永和之樂獻祖宣皇帝酌獻用光大之舞懿祖光皇帝酌獻用長發之舞太祖景皇帝酌獻用大政之舞代祖元皇帝酌獻用大成之舞髙祖神堯皇帝酌獻用大明之舞太宗文祖武聖皇帝酌獻用崇德之舞髙宗天皇大帝酌獻用均天之舞中宗孝和皇帝酌獻用大和之舞睿宗大聖眞皇帝酌獻用景雲之舞撒豆用雍和之舞送神用黃鐘宫永和之樂臣以樂章殘缺積有嵗時自有事東巡親謁九廟聖情敦禮精祈感通皆祠前累月考定音律請編諸史策萬代施行帝曰制禮作樂者古之人所用心孰免遺音兼之散失未有舉正曷感神明朕或得之於自然推之於律度卿之前請尋已施行今重彰聞宜編史策乃下制曰王者作樂古之大猷蓋以殷薦上帝嚴配祖考况順天地之理開山川之風發揮雅音導逹和氣揖讓而理不其盛歟自戰國以來此道隳壊但紀鏗鏘之節寧探述作之源歴代因循莫之改革朕嘗以聽政之暇緬尋前典雖舊制之空存而正聲之多缺將何以列彼祠祀感於明靈斯事體大諒資合度是用躬親有以裁狀定六律而為本避五行之相尅哀慢淫過去其弊也清濁剛柔適其中也亦既恊應頗為成文或得之於自然乃不知其本故豈上皇幽贊俾正闕遺者哉方於六代之作亦各一時之義也乃命奉常陳於祀事用昭誠敬且敦風俗而王公卿士爰及有累詣闕上言請以唐樂為名者斯至公之事朕安得而辭焉然則大咸大濩大夏皆以大字表其樂章今之所請宜曰大唐樂自𢎞農府君至大武皇帝六廟貞觀中詔顔師古等定樂章舞號至是太常又奏所定獻祖宣皇帝至睿宗眞皇帝九廟酌獻用舞之號是時有立坐二部立部伎有八部一安樂後周平齊所作周代謂之城舞二太平樂亦謂之五方師子舞三破陣樂四慶善樂五大定樂亦謂之八紘同軌樂太宗平遼時作六上元樂髙宗所作七聖壽樂武太后所作舞時行列成字有聖超千古道泰百王皇帝萬年寳祚彌昌八光聖樂元宗所造自安樂已下每奏皆擂大鼔同用龜兹樂兹立奏之其大定樂加以金鉦唯慶善樂獨用西涼樂最為閑雅其破陣上元慶善三舞皆易其衣冠合之鐘磬以享郊廟坐部伎有六部一讌樂張文收所作也又分為四部有景雲慶善破陣承天等樂二長壽樂武太后長壽年所作三天授樂武太后天授年所作四鳥歌萬嵗樂武太后所作因養吉了鳥嘗稱萬嵗故為樂以像之五龍池樂元宗所作大小破陣樂元宗所作生於立部伎舞用四人被之金甲自長壽已下皆用龜兹樂人皆着靴唯龍池用雅樂而無鐘磬舞人盡躡履而行貞觀中有裴神符者妙解琵琶唯作勝蠻奴大風傾盃樂三世聲度清美太宗深愛之髙宗末其伎遂盛於時自天后至神龍之際大増加立坐部伎諸舞尋亦廢之天寳元年命有司定𤣥元廟告享所奏樂太常奏降神用混成之樂送神用太乙之樂從之十三載七月十四日改諸樂名太簇宫時號沙陁調龜兹佛曲改為金華洞眞因度王改為歸聖曲承天順天景雲君臣相遇九眞九仙天册永昌樂永代樂慶雲樂冬樂樂長壽樂紫極萬國歡封禪曜日光舎佛兒胡歌改為欽明引河東婆改為燕山騎俱倫僕改為寳倫光色俱騰改為紫雲騰摩醯首羅改為歸眞火羅鶬鴿監改為白蛤監羅刹朱羅改為合浦明珠勿薑賤改為無疆壽蘇莫剌耶改為玉京春阿箇盤㢮改為元昭慶急龜兹佛曲改為急金華洞眞蘇末遮改為萬宇清舞仙鶴乞娑㜑改為仙雲昇太簇商時號大食調破陣樂大定樂英䧺樂歡心樂山香樂年年樂武城昇平樂興明樂黄馻䮜人天雲卷白雲遼帝什婆野娑改為九野歡優婆師改為泛金波半射渠沮改為髙唐雲半射没改為慶維新耶婆色雞改為司農寳雞野鵲監改為神鵲監捺利梵改為布春陽蘇禪師胡歌改為懐思引萬嵗樂太簇羽時號般渉詞太和萬夀樂天統九勝樂元妃眞元妃樂監女采樂眞女采樂山水白鶻郎剌耶改為芳桂林移師都改為大仙樂借渠沙魚改為躍泉魚俱倫朗改為日重輪蘇剌耶改為未央年叱鉢羅改為芳林苑苑伎改為泛蘭叢悉你都改為瓊䑓花春楊栁天禽寳引蘇剌耶胡歌改為寳廷引太簇角大同樂六合來庭安平樂成服來賓安公子紅藍花林鐘宫時號道調道曲垂拱樂萬國歡九仙歩虛飛仙景雲欽明引玉京寳輪光曜日光紫雲騰剛改為神仙急火鳳改為監林鐘商時號小食調天地乂寳迎天歡心樂太平樂破陣樂五更轉聖明樂卷白雪凌波神九成樂汎龍舟月殿禪曲英䧺樂山香㑹仙迎祥翊聖司農寳雞九野歡訖陵加胡歌改來賓引胡殘改儀鳳蘇羅宻改丹朝陽須娑栗特改芳苑墟撥雒背陵改為北戍還淳金波借席改為金鳯厥磨賊改為慶淳風慶惟新林鍾羽時號平調大風眞大風急大風舞媚娘長命兩河三䑓監行天急行天僕陽女神白馬春楊柳無愁改為長歡因地利支胡歌改為玉闗引大仙都春䑓東祗羅改為祥雲飛文明新造勝蠻奴改為塞塵清林鍾角調紅藍花綠沉盃赤白桃李花太白紵堂堂十二時天下兵改為荷來蘇黃鍾宫太封山樂黃鍾商時號越調破陣樂天授樂無為傾盃樂文武九華急九華大叠瑞蟬曲北雒歸淳慶淳風杜蘭烏多迴改為蘭山吹孝夀改天長寳夀春鷪轉吹急蘭山髙麗改為來賓引耶娑地調歌改為静邉引婆羅門改為霓裳羽衣思歸進牟雞胡歌改為金方引昇朝陽三部羅改為三輔安黃鐘羽時號黃鐘調火鳳火急鳳春楊柳飛仙大仙都天統司歸逹菩提梵改為洞靈章明鳳樂眞鳴鳳呵藍堆百舌鳥改為濮陽女中吕商時號雙調破陣樂太平樂傾盃樂大麟樂迎天樂蟬曲山香月殿大百嵗老夀改天長寳夀五更轉同昌還城樂慶惟新金風汎金波司晨寳雞金方引俱摩尼佛改紫府洞眞神雀監北雒歸淳南吕商時號水調破陣樂九野歡况金波陵波昇朝陽蘇莫歡心樂蟬曲來賓引天地大寳五更轉金風調蘇莫遮改為感皇恩日天月天風天木天火天五天婆伽兒改為流芳時司空楊國忠左相陳希烈奏中使輔璆琳至奉宣進止令臣將新曲名一本立石刋於太常寺者今既傳之樂府勒在貞珉仍望宣付所司頒示中外勅㫖所請依元宗在位多年善樂音若燕設酺㑹明御勤政樓先一日金吾引駕仗北衙四軍甲士未明陳伏衛尉張設光祿造食候明百寮朝侍中進中嚴外辦中宫素扇天子開簾受朝禮畢又素扇垂簾百寮常叅供奉官貴戚二王後諸蕃酋長謝食就坐太常大鼔藻繪如錦樂工齊擊聲震城闕太常卿引雅樂每色數十人自南魚貫而進列於樓下鼔笛雞婁充庭考聲太常樂立部伎坐部伎依㸃鼔舞間以胡夷之伎日旰即内開廐引蹀馬三千餘使為傾盃樂曲奮首鼔尾從橫應節又施三層板牀乗馬而上休轉如飛又令宫女數百人自帷出擊雷鼔為破陣樂太平樂慶善樂上元樂雖太常積習皆不如其妙若聖首樂則迴身換衣作字如畵又五坊使引大象入塲或拜或舞動容鼔振中於音律盡日而退元宗又於聽政之暇教太常樂工子弟三百人為絲竹之戲音響齊發有一聲誤元宗必覺而正之號為皇帝弟子又云梨園弟子以置院近於禁苑之梨園又有别教院教供奉新曲太常每凌晨鼔笛亂發於太樂署别教院廪食嘗千人宫中居宜春院元宗又製新曲四十餘又親製樂譜每初年望夜又御勤政樓觀燈作樂貴臣戚里借看樓觀望夜闌太常樂府懸散樂畢即遣宫女於樓前縛架出眺歌舞以娛之若繩戲等伎詭異巧妙固無其比及元宗西幸祿山遣其逆黨載京師樂噐樂伎盡入雒城尋而肅宗尅復兩京將行大禮命禮儀使太常少卿于休烈使屬吏於東京留䑓押領赴于朝廷詔給錢使休烈造伎衣及大舞等服於是樂工二舞始備矣肅宗乾元元年三月帝以太常舊鐘磬自隋以來所傳五聲或有差錯謂太常少卿于休烈曰古者聖人作樂以應天地之和以合隂陽之序則人不夭札物不疵厲且金石絲竹樂之噐也以親享郊廟每聽樂聲或宫商不倫或鐘磬失度可盡將鐘磬來朕當於内自定太常進入帝集樂工考試數日審知差錯然後令冄造及磨刻二十五日一部先畢召太常樂工帝臨二殿親觀考擊皆合五音送太常二十八日帝又於内造樂音三十一章送太常郊廟歌之中書門下及百寮上表稱賀代宗寳應二年六月庚辰太常奏元宗室請奏廣運之舞調用太簇肅宗室請奏惟新之舞調用夷則德宗以大厯十四年即位十一月禮儀使奏代宗室樂用保泰之舞貞元三年三月以昭德皇后廟樂章九首付有司初帝令有司議廟舞之號禮宫請號坤元之舞從之樂章初令宰相張延賞柳渾等撰之及進留中不下又命翰林學士吳通元為之四年河東節度使馬燧獻定難曲帝御麟德殿命閲試之四年五月詔有司補諸廟所缺樂章自開元以來外風伯雨師為中祀及創置德明皇帝興聖皇帝讓皇帝武成王廟假郊廟樂章並未奏撰及是有司以功績各異請補其缺詞帝乃令其臣李泌撰之泌未及撰物故遂命于邵包佶李舒等分為之十三年十二月昭儀節度使王䖍休上表曰臣聞於師惟君子為能知樂是故審音以知聲審樂以知政則治道備矣清明廣大終始周旋與天地同其和與四時合其序豈止於鐘鼓管磬云乎哉伏見開元中天長節著于甲令每於是日海縣懽娱稱萬壽之無疆樂一人之有慶故能追堯接舜邁禹踰湯自周已後不能議矣今陛下降誕之辰未有惟新之典無乃臣子之分或有所闕愚臣不揆頑昧敢思祖述每私歌藉抃􅁯寢與食久矣適遇有知音者與臣論其樂章探微賾奥窮理盡情臣乃遣造繼天誕聖樂一曲大抵以宫為調表五音之奉君也以土為德知五運之居中也凡二十五遍法二十四氣而足成一嵗也每遍一十六拍象八元八凱登庸於朝也兾於雲門咸池永傳於律吕空桑孤竹合薦於宫懸不聞惉懘之聲長作中和之樂可使九域之人頓􅁯於肉味四夷之俗皆播於皇風與唐惟休終古盡善臣不勝懇欵屏營之至謹昧死陳獻以聞其所造曲譜謹同封進先時自太常樂人劉玠流落至潞州䖍休因令造此樂也十四年帝自造中和樂御麟德殿奏之并製觀新樂詩令太子書示百官十六年正月南詔異牟尋作奉聖樂舞因西川節度韋臯以進十九年四月修德明興聖及獻懿二祖廟遷神主于廟太常寺奏德明興聖獻祖懿祖廟樂用宫懸詔曰可憲宗永貞元年十二月丙申有司奏德宗廟室酌獻奏文明之舞用黃鍾為宫元和元年有司奏順宗初室奏大順之舞中書侍郎同平章事段文昌撰樂章八年九月詔太常習樂始復用大鼔先是德宗自興元以還闗輔有李懐光吐蕃之虞而又都中屢驚初令習樂者去大鼔及是太子少傅判太常卿鄭餘慶奏復之是月宣武軍節度韓宏進新撰聖朝萬嵗樂等曲譜共三百首穆宗以元和十五年正月即位四月禮儀使奏憲宗皇帝廟樂舞號臣得樂官閻叔逸狀六月祔廟用當月均調林鍾宫臣聞樂以表功舞以象德皇王大政被無窮伏以憲宗皇帝道邁前古業崇丕搆憂勤庶績夙夜惟寅振揚武烈誅謀定命戡剪不乂廓清寰中功格上𤣥德侔厚載綴八佾以成象昭萬祀之徽音憲宗皇帝廟樂請用象德之舞謹按律厯志曰黃鍾太簇林鍾謂之三正律皆音之君也今祔饗始於六月辛未聲應林鍾之宫制可中書侍郎平章事段文昌進撰樂章敬宗以長慶四年正月即位有司奏穆宗室奏和寧之舞中書侍郎平章事牛僧孺奉勅撰奏樂章文宗以寳厯二年即位有司奏敬宗廟奏大均之舞中書侍郎平章事韋處厚撰樂章太和三年八月太常禮院奏謹按凱樂鼔吹之歌曲也周官大司樂王師大獻則奏凱樂註云獻功之樂也又大司馬之職師有功則凱獻于社注云兵樂曰凱司馬法曰得意則凱樂所以示喜也左氏傳載晉文公勝楚振旅凱入魏晉已來鼔吹曲章多述當時戰功是則歴代獻㨗必有凱歌太宗平東都破宋金剛其後蘇定方執賀魯李勣平髙麗皆備軍容凱歌入京都詳簡貞觀顯慶開元禮書并儀註令叅酌古今備其陳設及奏歌曲之儀凡命將征討有大功獻俘馘者其日備策兵衛於東門外如獻俘嘗儀其凱樂用鐃吹二部笛篳篥簫笳鐃鼔每色二人歌工二十四人樂工等乗馬執樂噐次苐陳列如鹵傳之式鼓吹令其前導分行於兵馬俘馘之前將入都門鼔吹振作迭奏破陣樂等四曲破陣樂應聖期賀朝歡君臣同慶樂九月庚辰太常卿王涯少府監庾承憲大常丞李廓等領雲韶樂工於梨園㑹昌殿獻賜王涯錦綵一百疋銀噐三事又賜李廓及樂工等有差文宗天資𢎞約自登極絶不為畋遊之戲視朝之暇好古博雅務追古先聖哲之所尚且以近俗鄭衛之音促速惑人聞聽乃命修復開元雅正之音以為娛悦自後朝臣恩渥深厚者徃徃就賜以示殊寵八年十月宣太常寺准雲韶樂舊用人數令於本寺閲習進來九年五月丁巳太常少卿馮定押進雲韶樂官三百八十人上於麟德殿觀閲翌日以樂成頒賜有差開成元年七月教坊進霓裳羽衣舞女十五已下者三百人帝絶畋遊馳騁之事思玉帛鐘鼔之本語及音律每謂絲竹自有正聲人但趣於鄭衛乃造雲韶等法曲遇内宴奏之顧大臣曰笙磬同音沈吟耽味不圖為樂之至於斯十月太常教成雲韶樂武宗以開成四年即位有司奏文宗廟室奏文成之舞中書侍郎崔洪撰樂章宣宗以㑹昌五年即位武宗廟樂奏大定之舞昭宗以文德元年即位將親謁郊廟先是廣明初黃巢干紀樂工淪散金奏㡬亡至是有司請造樂懸詢於舊工莫知制度時太常博士殷盈孫按周官考工記䆒其樂銑于鼔鉦舞之法用筭法乗除鏄鐘之輕重髙徑乃定懸下編鐘正黃鍾九寸五分下至登歌倍應鍾三寸三分半凡四十八等口項之量徑衡之圍悉為圖進遣金工依法鑄之凡二百四十口修奉使宰臣張濬求知聲者處士蕭承訓樂工陳敬言大樂令李從周令先較定石磬合而擊拊之八音克諧觀者聳聽光化四年正月宴於保寧殿帝自制曲名曰讚成功時中宫劉季述幽帝於西内監州雄毅軍使孫德昭等殺季述昭宗反正乃製曲以褒之又作樊噲排難戲以樂焉哀帝天祐元年即位昭宗祔太廟太常禮院撰定酌獻用咸寧之舞册府元龜卷五百六十九
