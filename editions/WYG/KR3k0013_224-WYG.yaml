body:
  text: 册府元龜卷三百二十四宋王欽若等撰僣偽部奉先孝友宗族奉先夫有國家者必尊尊親親以敦厚風教雖盗有皇器竊據神鄉亦考尋古昔稽合禮文以為崇薦之事不可忘歸尊之義不可廢所以表孝饗而慰神靈也乃至追宗廟之號上園寢之名升陽位以配皇天居明堂以侑上帝陳其樂舞豐其粢盛奉顯相之容竭祗肅之意誠追逺而斯在顧假名而焉如前凉張茂嗣兄實為凉州牧私諡實曰昭公張駿嗣季父茂為凉州牧私諡茂曰成公張重華嗣父駿為凉州牧私諡駿曰文公張耀靈嗣父重華為西平公私諡重華曰昭公後改桓公張祚僣稱帝追崇曽祖軌為武王祖實為昭王從祖茂為成王父駿為文王弟重華為明王前趙劉元海初僣漢王位追尊蜀後主為孝徳皇帝立漢高祖以下三祖五宗神主而祭之劉和嗣父元海僣帝位偽謚元海為光文皇帝廟號高祖墓號永光陵劉聦僣即帝位新作太廟劉粲嗣父聦即偽位諡聦曰昭武皇帝廟號烮宗劉曜既即偽位使劉雅迎母胡氏䘮于平陽還𦵏粟邑墓號陽陵偽諡宣明皇太后僣尊高祖父亮為景皇帝曽祖父廣為獻皇帝祖防為懿皇帝考曰宣成皇帝都長安繕宗廟以冐頓配天元海配上帝後趙石勒初為侍中征東大將軍母王氏死潜窆山谷莫詳其所既而備九命之禮虗𦵏于襄國城南後僣稱趙王始立宗廟及僣號趙天王行皇帝事尊其祖邪曰宣王父周曰元王勒僣即皇帝位追尊其髙祖曰順皇曾祖曰威皇祖曰宣皇父曰世宗元皇帝妣曰元昭皇太后石𢎞嗣父勒偽位號勒墓為髙平陵偽諡明皇帝廟號髙祖石季龍僣稱大趙天王追尊祖㔨邪武皇帝父冦覓太宗孝皇帝其後籍田畢遂如襄國謁勒墓石遵即偽位號季龍墓為顯原陵偽謚武帝廟號太祖石閔僣即偽位國號大魏復姓冉氏追尊其祖隆元皇帝考贍烈祖髙皇帝前燕慕容雋既即偽位追尊祖廆為髙祖武宣皇帝父皝為太祖文明皇帝使昌黎遼東二郡營起廆廟范陽燕郡構皝廟以其䕶軍平熈領將作大匠監造二廟焉慕容暐嗣父雋偽位諡雋為景昭皇帝廟號烈祖墓號龍陵前秦苻徤僣帝偽位諡父洪為恵武帝苻生嗣父徤偽位諡徤明皇帝廟號世宗後改曰髙祖苻堅僣稱大秦天王追諡父雄為文桓皇帝起明堂繕南北郊郊祀其祖洪以配天宗祀其伯徤於明堂以配上帝苻丕僣即帝位追諡父堅曰世祖宣昭皇帝苻登僣即帝位偽諡族父丕為哀平皇帝苻崇僣稱尊號偽諡父登曰髙皇帝廟號太宗後秦姚萇僣即帝位追諡父弋仲曰景元皇帝廟號始祖墓曰髙陵置園邑五百家又諡兄襄魏武王姚興嗣父萇偽位諡萇為武昭皇帝廟號太祖墓稱原陵姚泓嗣父興偽位諡興為文桓皇帝廟號髙祖墓曰偶陵後蜀李雄僣稱成都王追尊其曽祖武曰巴郡桓公祖慕隴西襄王父特成都景王及僣號追尊特曰景皇帝廟號始祖又追諡弟流秦文王李班嗣叔父雄偽位諡雄武帝廟曰太宗墓號安都陵李夀僣即帝位追尊父驤為獻帝後改立宗廟以驤為漢始祖廟以初封漢王欲改國號特雄為大成廟李勢嗣父夀位偽諡夀為昭文皇帝廟曰中宗墓曰安昌陵後凉吕光既僣即三河王位以太廟新成追尊其髙祖為敬公曽祖為恭公祖為桓公父婆樓為景昭王母曰昭烈妃其中書侍郎楊頴上䟽請依三代故事追尊吕望為始祖永為不遷之廟從之吕紹嗣父光位偽諡光為懿武皇帝廟號太祖墓曰髙陵吕隆嗣兄纂僣即天王位偽諡纂靈皇帝墓曰石陵後燕慕容垂僣即皇帝位繕宗廟追尊母蘭氏為文昭皇后慕容寳嗣父垂位偽諡垂武成皇帝廟號世祖墓曰宣平陵慕容盛嗣父寳位偽諡寳恵愍皇帝廟號烈宗追尊伯考獻莊太子全為獻莊皇帝慕容熈僣即帝位偽諡慕容盛昭武皇帝墓號興平陵廟號中宗西秦乞伏乾歸嗣兄國仁位自稱河南王偽諡國仁宣烈王廟號烈祖乞伏熾盤嗣父乾歸位偽諡乾歸武元王北燕馮䟦僣稱天王追尊祖和為元皇帝父安為宣皇帝遣其太常丞劉軒徙北部人五百户于長谷為祖父園邑南凉秃髪利鹿孤嗣兄烏孤位偽諡烏孤曰武王廟號烈祖禿髪傉檀嗣兄利鹿孤位偽諡利鹿孤曰康王南燕慕容徳僣即帝位于廣固設行廟於宫南遣使奉䇿告成慕容超嗣叔父徳位偽諡徳獻武皇帝夏赫連勃勃僣即帝位追尊其髙祖訓兒曰元皇帝曽祖武曰景皇帝祖豹子曰宣皇帝父衞辰曰桓皇帝廟號太祖母苻氏曰桓文皇后吳楊渭僣即帝位追尊父行宻為太祖武皇帝兄渥為景帝楊浦嗣兄渭位偽諡渭宣帝閩王延鈞僣即帝位追尊父審知為武皇帝王昶嗣父延鈞位偽諡延鈞為恵帝前蜀王衍嗣父建位偽諡建為神武聖文孝徳明恵皇帝廟號髙祖墓曰永陵後蜀孟昶嗣父知祥位偽諡知祥為文武聖徳英烈明孝皇帝廟號髙祖陵曰和陵前漢劉玢襲父陟位偽諡陟為太皇大帝廟號髙祖陵曰康陵劉鋹嗣父晟位偽諡晟文武光聖明孝皇帝廟號中宗陵曰昭陵孝友四星東聚五馬南浮獯醜阻兵姦渠盗土昬迷自恣忿驁嘗生亦有懐孝愛之情知友于之分居䘮過禮臨難相先雖非仁義之所成固亦染習而斯至前趙劉元海齠齔英恵七歳遭母憂擗踴號呌哀感旁鄰宗族部落咸共歎賞司空大原王昶等聞而嘉之並遣弔賻前秦苻堅率衆向鄴至安陽過舊閭引諸耆老語及祖父之事泫然流涕乃停信宿後秦姚萇襄之弟也嘗從襄征伐襄之敗于麻田也馬中流矢死萇下馬以授襄襄曰汝何以自免萇曰但令兄濟竪子安敢害萇㑹救至俱免姚興母虵氏死興哀毁過禮不親庶政羣臣議請依漢魏故事既𦵏即吉尚書郎李嵩上䟽曰三王異制五帝殊禮孝治天下先王之髙事也宜遵聖性以光遺訓既𦵏之後應素服臨朝率先天下仁孝之舉也尹緯駮曰帝王䘮制漢魏為凖嵩矯常越禮愆于軌度請付有司以専擅論既𦵏即吉乞依前議興曰嵩忠臣孝子有何咎乎尹僕射棄先王之典而欲尊漢魏之權制豈所望於朝賢哉其一依嵩議興班告境内及在朝文武立名不得犯叔父緒及碩徳之名以彰殊禮興謙恭孝友每見緒及碩徳如家人之禮緒碩徳皆興之叔父也後蜀李雄母羅氏死雄欲申三年之禮羣臣固諌雄弗許李驤謂司空上官惇曰今方難未弭吾欲固請不聼主上終諒闇君以為何如惇曰三年之䘮自天子逹故孔子曰何必髙宗古之人皆然但漢魏以來天下多難宗廟至重不可乆曠故釋縗絰至哀而已驤曰任回方至此人决於行事且上嘗難違其言待其至當與俱請及回至驤與回俱見雄驤免冠流涕固請公除雄號泣不許回跪而進曰今王業初建凡百草創一日無主天下惶惶昔武王素甲觀兵晉襄墨絰從戎豈所願哉為天下屈己故也願陛下割情從權永隆天保遂強扶雄起釋服親政南燕慕容徳僣立於廣固徳母兄先在長安遣平原人杜𢎞如長安問存否𢎞曰臣至長安若不奉太后動止便即西如張掖以死為効臣父雄年踰六十未沾榮貴乞本縣之祿以申烏鳥之情張華進曰杜𢎞未行而求祿要利情深不可使也徳曰吾方散所輕之財招所重之死况為親尊而可吝乎且𢎞為君迎親為父求祿雖外如要利内實忠孝乃以雄為平原令𢎞至張掖為盗所殺徳聞而悲之厚撫其妻子及故吏趙融自長安來始知母兄凶問徳號慟吐血因而寢疾宗族典午失馭羣雄構亂茫茫九土一倡千和於是跨州連郡鴟張蟻聚盗王者之位擬乘輿之制以樹立子弟列為藩輔式是古訓以隆邦翰展親之義靡或闕如彊幹之術於是乎在乃有采夫公望隆其寵數靡容濟濟之讓克厚尊尊之權惇睦無間情禮兼至者焉前凉張祚僣帝位以弟天錫為長樂王子庭堅為建康王弟子靚為凉武侯張天錫自稱西平公以從弟慮為從事中郎西凉李嵩僣稱凉公以其子讓為敦煌太守李歆嗣偽位既為沮渠所敗諸弟酒泉太守翻新城太守預領羽林右監宻左將軍朓右將軍亮等西奔敦煌太守恂與諸子棄敦煌奔于北山歆子重耳奔于江左仕于宋復歸魏為𢎞農太守蒙遜徙翻子寳等于姑臧前趙劉元海僣即帝位以子和為大司馬封梁王又以劉歡樂為大司徒封陳留王宗室以親踈為等悉封郡縣王又封子裕為齊王隆為魯王又為北海王後以子聦為大司徒劉歡樂為太傅劉延年為大司空劉洋為大司馬及元海寢疾將為顧託之計以歡樂為太宰洋為太傅延年為太保聦為大司馬大單于並錄尚書事置單于臺于平陽西以其子裕為大司徒臣欽若等曰自歡樂已下載記不書於元海何親故并姓言之後皆放此又有衞尉西昌王劉鋭領軍劉盛侍中劉乘武衞劉歆劉濬及劉安國劉宣宣字士則初為左賢王元海即王位宣之謀也故特荷尊重勲戚莫二軍國内外靡不専之劉聦僣即帝位封其子粲為河内王署使持節撫軍大將軍都督中外諸軍事易河間王翼彭城王悝髙平王後以劉易為太尉遷太宰劉曜僣即帝位封子襲為長樂王闡太原王冲淮南王敞齊王髙魯王徽楚王徵諸宗室皆封郡王又封子𦙍為永安王署侍中衞大將軍都督二宫禁衞諸軍事開府儀同三司錄尚書事領太子太傅後為大司馬進封南陽王以漢陽諸郡十三為國又有太宰劉雅鎮軍劉錫右軍劉幹侍中中山王劉岳太尉汝南王劉咸大司徒劉緩後趙石勒偽稱天王行皇帝事署其子宏為持節散騎常侍都督中外諸軍事驃騎大將軍大單于封秦王左衞將軍斌太原王少子恢為輔國將軍南陽王又封石生河東王石琪彭城王又以中山王石季龍子䆳為冀州刺史封齊王加散騎常侍武衞將軍宣為左將軍挺為侍中梁王石季龍僣稱大趙天王親王皆貶封郡公以子宣為河間公韜為樂安公斌為燕公遵為彭城公鑒為義陽公宣後為皇太子韜為司徒又加太尉與太子宣迭日省可尚書奏事斌為使持節侍中大司馬錄尚書事又命宣韜生殺拜除皆迭日省决不復啟也其後季龍僣即帝位諸子進爵郡王及疾甚以遵為大將軍鎮闗右斌為丞相錄尚書事前燕慕容雋初僣稱王以弟恪為輔國將軍評為輔弼將軍及僣帝位以恪為侍中封太原王評為都督秦雍益梁江揚荆徐兗豫十州河南諸軍事封子臧為樂安王泓為濟北王冲為中山王慕容暐僣即帝位以慕容恪為太宰錄尚書行周公事慕容評為太傅副賛朝政初慕容皝將終謂子雋曰今中原未一方建大事恪智勇俱濟汝其委之及雋嗣位彌加親任累戰有大功雋寢疾引恪與慕容評屬以後事雋死羣臣欲立恪恪辭曰國有儲君非吾節也及暐之世㧾攝朝權恪虗襟待物諮詢善道量才處任使人不踰位朝廷謹肅進止有常度雖執權政毎事必諮之於評罷朝歸第則盡心色養手不釋卷其百僚有過未常顯之自是庶僚化徳稀有犯者其後暐境内多水旱恪評並稽首歸政請遜位還第暐斷其讓表恪評等乃止恪臨終暐親臨問以後事恪曰臣聞報恩莫大薦士板築猶可而况國之懿藩吳王文武兼才管蕭之亞陛下若任之以政國其少安不然臣恐二冦必有闚􅎿之計言終而死前秦苻徤僣稱天王大單于以弟雄為丞相都督中外諸軍事車騎大將軍領雍州刺史及僣即帝位雄為佐命元勲權侔人主而謙㳟奉法徤嘗曰元才吾姬旦也及卒徤哭之嘔血曰天不欲吾定四海邪何奪元才之速也苻生僣即帝位以符安領太尉符栁為征東大將軍并州牧鎮蒲坂苻謏為征東大將軍豫州牧鎮陜城苻堅僣稱天王以兄法為使持節侍中都督中外諸軍事丞相録尚書從祖侯為太尉從兄栁為車騎大將軍尚書令封弟融為陽平公雙河南公子丕長樂公子暉平原公熈廣平公叡鉅鹿公楊東海公敷清河公融字博休苻徤之世封安樂王融上䟽固辭徤深竒之曰且成吾兒箕山之操乃止苻生愛其器貎嘗侍左右未弱冠便有台輔之望長而令譽彌髙為朝野所屬後拜侍中中書監都督中外諸軍事車騎大將軍司𨽻校尉太子太傅領宗正錄尚書事俄轉司徒融苦讓不受後為鎮東大將軍冀州牧融將發堅祖於覇東奏樂賦詩初為侍中中軍將軍銓綜内外刑政脩理進才理滯王景畧之流也尤善斷獄姦無所容故為堅所委任雖鎮闗東朝之大事靡不馳驛與融議之始議伐晉融曰吳不可伐堅不納及淝水之戰融馳騎略陣馬倒被殺軍遂大敗堅還次于長安東之行宫哭融而後入贈融大司馬謚曰襄公苻丕僣即帝位封子懿為勃海王昶為濟北王又以苻冲為左光祿大夫尚書左僕射封西平王苻纂為大尉東海王纂為苻堅尚書令封魏昌公堅敗自闗中來奔故有是拜又以阜城侯苻定為征東將軍冀州牧髙城侯苻紹為鎮東將軍督冀州諸軍事重合侯苻謨為征西將軍幽州牧髙邑侯苻亮為鎮北大將軍督幽平二州諸軍事並進爵郡公定紹據信都謨亮先據常山慕容垂之圍鄴城也並降于垂聞丕稱尊號遣使謝罪故有是命其後又以苻纂為大司馬苻冲為車騎大將軍尚書令儀同三司及丕敗纂及弟師奴率丕餘衆數萬奔據杏城苻登僣即帝位遣使拜苻纂為使持節侍中都督中外諸軍事太師領大司馬進封魯王纂弟師奴為撫軍大將軍并州牧朔方公纂怒謂使者曰渤海王世祖之孫先帝之子南安王何繇不立而自尊乎纂長史王旅諌曰南安已立理無中改賊虜未平不可宗室之中自為仇敵願大王逺蹤光武推聖公之義梟二虜之後徐更圖之纂乃受命登又封子弁為南安王尚為北海王後秦姚萇僣即帝位以弟緒為司𨽻校尉鎮長安碩徳為征西將軍秦州刺史都督隴右諸軍事領䕶東𦍑校尉鎮上邽後以安定地狹且逼苻登使碩徳鎮安定徙安定千餘家于陰宻遣弟征南靖鎮之姚興僣即帝位封叔父征虜緒為晉王征西碩徳為隴西王征南靖為公不書國名又以碩徳為秦州牧領䕶東羗校尉鎮上邽興班告境内及在朝文武立名不得犯叔父緒及碩徳之名以彰殊禮興謙恭孝友每見緒及碩徳如家人之禮整服傾悚言則稱字車馬服玩必先二叔然後服其次者朝之大政必諮之而後行後興以日月薄蝕災𤯝屢見降號稱王緒與碩徳同讓王爵興弗許緒等又固讓許之又子懿弼洸宣諶愔璞質逹裕國兒皆為公姚泓僣即帝位以姚紹為太宰大將軍大都督都督中外諸軍事假黄鉞改封魯公侍中司𨽻宗正節錄並如故朝之大政皆往决焉紹固辭弗許紹泓之叔父也泓聞姚懿將襲長安召紹等宻謀於朝堂紹曰懿情識鄙近從物推移造成此事惟當孫暢耳但馳使徵暢遣撫軍讃據陜城臣向潼闗為諸軍節度若暢奉詔而至者臣當遣懿率河東見兵共平吳冦如其逆釁已成違距勑㫖當明其罪於天下聲鼓以擊之泓曰叔父之言社稷之計後果執懿囚之誅孫暢等及泓之敗其子佛念年十一兵至泓欲降佛念謂泓曰晉人將逞其欲終必不全願自裁决泓憮然不答佛念遂登宫墻自投而死蜀李特自稱大都督以兄輔為驃騎將軍弟驤為驍騎將軍長子始為武威將軍次子蕩為鎮軍將軍李雄僣稱成都王以其叔父驤為太傅兄始為太保折衝李離為太尉建威李雲為司徒翊軍李璜為司空材官李國為太宰李期僣即帝位封兄越建寧王拜相國大將軍錄尚書事李勢僣即帝位其弟大將軍漢王廣以勢無子求為太弟勢弗許後凉吕光僣即三河王位以其子左將軍他武賁中郎將纂討北虜及僣即帝位諸子弟為公侯者二十人時羣議以髙昌雖在西垂地居形勝外接胡虜易生翻覆宜遣子弟鎮之光以子覆為使持節鎮西將軍都督玉門已西諸軍事西域大都䕶鎮髙昌命大臣子弟隨之其後光疾甚立其太子紹為天王以吕纂為太尉吕𢎞為司徒謂紹曰吾疾病唯増恐將不濟三冦闚􅎿迭伺國隙吾終之後使纂統六軍𢎞管朝政汝恭已無為委重二兄庶可以濟若内相猜貳釁起蕭墻則晉趙之變旦夕至矣又謂纂𢎞曰永業紹字才非撥亂直以正嫡有常猥居元首今外有強冦人心未寧汝兄弟緝穆則貽厥萬世若内自相圖則禍不旋踵纂𢎞泣曰不敢有二心吕纂既僣立以弟𢎞為使持節侍中大都督都督中外諸軍事大司馬車騎大將軍司𨽻校尉錄尚書事改封畨禾郡公吕隆僣稱天王以弟超有佐命之勲拜使持節侍中都督中外諸軍事輔國大將軍司𨽻校尉錄尚書事封安定公後燕慕容垂自稱燕王以弟徳為車騎大將軍封范陽王兄子楷為征西大將軍封太原王其後有左將軍慕容固平北慕容佐衛軍慕容麟鎮南慕容紹樂浪王宙髙陽王隆丹陽王瓉開封公詳及慕容鍾慕容永慕容農不書何親慕容寳嗣偽位庶子清河公㑹長樂公盛並進王爵西秦乞伏乾歸僣稱河南王有弟益州為前將軍秦州牧軻殫為凉州牧軻殫與益州不平奔于吕光又有弟廣武智逹揚武木奕于乾歸長子熾磐次子中軍審䖍熾磐襲偽位署弟延祚為禁中録事北燕馮䟦僣稱天王署弟素弗為侍中車騎大將軍錄尚書事𢎞為侍中征東大將軍尚書右僕射汲郡公從兄萬泥為驃騎大將軍幽平二州牧素弗後為大司馬改封遼西公𢎞為驃騎大將軍改封中山公䟦之偽業素弗所建也䟦之七年素弗死䟦哭之哀慟比𦵏七臨之䟦弟丕先是因亂投於髙句麗䟦迎致之至龍城以為右僕射常山公䟦從兄買從弟睹自長樂率五千餘户來奔署買為衛尉封城陽伯者為太常髙城伯南凉禿髪烏孤僣稱武威王署弟利鹿孤為驃騎大將軍西平公鎮安夷傉檀為車騎大將軍廣武公鎮西平後以利鹿孤為凉州牧鎮西平傉檀入錄府國事秃髪傉檀僣稱凉王為乞伏熾磐所降其少子保周臘于破羗俱延子覆龍鹿孤孫副周烏孤承鉢皆奔沮渠蒙遜乆之歸魏魏以保周為張掖王覆龍酒泉公破羗西平公副周永平公承鉢昌松公南燕慕容徳僣稱燕王以慕容麟為司空領尚書令慕容法為中軍將軍及僣即帝位以慕容鍾為司徒鍾字道明徳從弟也臨難對敵智勇兼濟累進竒䇿徳用之頗中繇是政無大小皆以委之遂為佐命元勲慕容超嗣偽位以慕容鍾為都督中外諸軍務錄尚書事加青州牧又以慕容法為征南都督徐兖楊南兖四州諸軍事慕容鍾加開府儀同三司又有侍中慕容統右衛慕容根及慕容昱慕容凝北凉沮渠蒙遜為沙州刺史以其弟拏為䕶羗校尉秦州刺史封安平侯鎮姑臧旬餘而拏死又以從祖益子為鎮京將軍䕶羗校尉秦州刺史鎮姑臧及僣即河西王位西祀金山遣沮渠廣宗率騎一萬襲烏啼虜大捷而還又遣前將軍沮渠成都將騎五千襲卑和虜降之夏赫連勃勃僣稱天王以其長兄右地代為丞相代公次兄力候提為大將軍魏公叱干阿利為御史大夫梁公弟阿利羅引為征南將軍司𨽻校尉若門為尚書令叱以鞬為征西將軍尚書左僕射乙斗為征北將軍尚書右僕射兄子羅提為左將軍其後以叱干阿利領將作大匠封子延陽平公昌太原公倫酒泉公定平原公滿河南公安中山公又以其子璝都督前鋒諸軍事領撫軍大將軍率騎二萬南伐長安及尅長安僣即帝位以侯提為并州刺史鎮蒲坂于長安置南臺以璝領大將軍雍州牧錄南臺尚書事閩王延均初封閩王表兄延禀為建州節度使累官至中書令頃之延禀以軍州委長子繼雄退居别第王昶僣號以其子繼㳟為福州節度使王延正僣號其子繼勲為泉州刺史唐李景僣號以仲弟遂為皇太弟季弟達為齊王前蜀王衍襲父建偽位封建子宗夀為嘉王宗弼為六軍使又有宗勲宗儼宗昱不書王爵後漢劉崇僣號於河東署其子承鈞為侍衛親軍都指揮使太原尹冊府元龜卷二百二十四
