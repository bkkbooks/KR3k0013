body:
  text: 册府元龜卷二百四十九宋王欽若等撰列國君部攻伐第二成公二年春齊侯伐我北鄙圍龍龍魯邑在㤗山博縣西南頃公之嬖人盧蒲就魁門焉攻龍門也龍人囚之齊侯曰勿殺吾與而盟無入而封封竟弗聽殺而膊諸城上膊磔也齊侯親皷士陵城三日取龍遂南侵及巢丘夏四月丙戌衛孫良夫帥師及齊師戰于新築衛師敗績新築衛地初衛侯使孫良夫石稷寗相向禽将侵齊與齊師遇齊伐魯還相遇於衛也石子欲還孫子曰不可以師伐人遇其師而還将謂君何言無以答君命若知不能則如無出今既遇矣不如戰也石成子曰師敗矣子不少須衆懼盡成子石稷也子䘮師徒何以復命皆不對又曰子國卿也隕子辱矣隕見禽獲子以衆退我此乃止我於此止禦齊師且告車來甚衆新築人救孫桓子故並告令軍衆齊師乃止次于鞫居鞫居衛地新築人仲叔于奚救孫桓子桓子是以免于奚守新築大夫六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊帥師㑹晋郤克衛孫良夫曹公子首及齊侯戰于鞍鞍齊邑初魯衛乞師於晋晉侯許之師從齊師于莘莘齊地六月壬申師至于靡笄之下靡笄山名癸酉師陳于鞍齊師敗績冬楚師鄭師侵衛遂侵我師于蜀使臧孫徃臧孫宣叔辭曰楚逺而久固将退矣無功而受名臣不敢楚侵及陽橋魯地孟孫請徃賂之以執斵執鍼織絍執斵匠人執鍼女工織絍繒布者皆百人公衡為質以請盟楚人許平三年春正月公㑹晉侯宋公衛侯曹伯伐鄭次于伯牛討邲之役也伯牛鄭地遂東侵鄭晋潛軍深入鄭公子偃帥師禦之偃穆公子使東鄙覆諸鄤覆伏兵敗諸丘輿鄤丘輿皆鄭地晋偏軍為鄭所敗夏鄭公子去疾帥師伐許許恃楚而不事鄭鄭子良伐許秋叔孫僑如圍棘取汶陽之田棘不服故圍之僑如叔孫得臣子四年冬十一月鄭公孫申帥師疆許田許人敗諸展陂鄭伯伐許取鉏任泠敦之田展陂許地晋欒書将中軍荀首佐之士爕佐上軍以救許伐鄭取氾祭氾祭鄭地成臯縣東有氾水楚子反救鄭六年二月取剸附庸國也言易也三月晋伯宗夏陽説衛孫良夫寗相鄭人伊雒之戎陸渾蠻氏侵宋夏陽説晋大夫蠻氏戎别種以其辭㑹也辭㑹前年師于鍼衛人不保説欲襲衛曰雖不可入多俘而歸有罪不及死伯宗曰不可衛唯信晋故師在郊而不設備若襲之是棄信也雖多衛俘而晋無信何以求諸侯乃止師還衛人登陴聞說謀秋孟獻子叔孫宣伯侵宋晋命也楚子重伐鄭鄭從晋故也冬晋欒書救鄭與楚師遇于繞角鄭地楚師還晋師遂侵蔡楚公子申公子成以申息之師救蔡申息楚二縣禦諸桑隧汝南朗陵縣東有桑里七年春呉伐郯郯成季文子曰中國不振旅蠻夷入伐而莫之或恤無弔者也夫詩曰不弔昊天亂靡有定其此之謂乎秋楚公子嬰齊帥師伐鄭師于氾氾在襄城縣南諸侯救鄭鄭共仲侯羽軍楚師二子鄭大夫囚鄖公鍾儀獻諸晋八年春晋欒書帥師侵蔡六年未得志故遂侵楚獲申驪楚大夫楚師之還也謂六年遇於繞角時晋侵沈獲沈子揖初從知范韓也沈國今汝南平輿縣是行也鄭伯将㑹晋師㑹伐蔡之師門于許東門大獲焉過許見其無備因攻之冬叔孫僑如㑹晋士爕齊人邾人伐郯初士爕來聘言伐郯也以其事呉故七年郯與呉成公賂之請緩師文子不可文子士爕曰君命無貳失信不立禮無加貨事無二成公私不兩立君後諸侯是寡君不得事君也欲與魯絶爕将復之季孫懼使宣伯帥師㑹伐郯九年秋鄭伯如晋晋人討其貳於楚也執諸銅鞮欒書伐鄭鄭人使伯蠲行成是秋楚子重公子嬰齊侵陳以救鄭陳與晋故冬十一月楚子重自陳伐莒圍渠丘渠丘城惡衆潰奔莒戊申楚入渠丘月六日莒人囚楚公子平楚人曰勿殺吾歸而俘莒人殺之楚人圍莒莒城亦惡庚申莒潰楚遂入鄆莒無備故也是月秦人白狄伐晋諸侯貳故也鄭人圍許示晋不急君也此秋晋執鄭伯是則公孫申謀之曰我出師以圍許示不畏晋為将改立君者而紓晋使紓緩也勿亟使詣晋示欲更立君晋必歸君明年晋歸鄭伯十年春衛子叔黒背侵鄭晋命也晋命衛使侵鄭五月公㑹晋侯齊侯宋公衛侯曹伯伐鄭初鄭人殺繻立髠頑子如奔許髠頑成公太子欒武子曰鄭人立君我執一人焉何益不如伐鄭而歸其君以求成焉晋立太子州蒲以為君而㑹諸侯伐鄭鄭子罕賂以襄鍾子罕穆公子襄鍾鄭襄廟鍾子然盟于脩澤子駟為質子然子駟皆穆公子滎陽卷縣東有脩武亭辛巳鄭伯歸十三年五月公㑹晋侯齊侯宋公衛侯鄭伯曹伯邾人滕人伐秦及秦師戰于麻隧秦師敗績獲秦成差及不更女父不更秦爵曹宣公卒于師師遂濟涇及侯麗而還涇水出安定東南經扶風京兆髙陸縣入渭也十四年八月鄭子罕伐許敗焉為許所敗戊戌鄭伯復伐許庚子入其郛郛郭也許人平以叔申之封四年鄭公孫申疆許田許人敗之不得定其封疆今許以是所封田求和于鄭十五年三月癸丑公㑹晋侯衛侯鄭伯曹伯宋世子成齊國佐邾人同盟于戚討曹成公也討其殺太子自立事在十三年晋侯執曹伯歸于京師不稱人以執者曹伯罪不及民歸之京師禮也六月楚子侵鄭及暴隧遂侵衛及首止鄭子罕侵楚取新石新石楚邑欒武子欲報楚韓獻子曰無庸庸用也使重其罪民将叛之背盟數戰罪也無民孰戰明年晋敗楚於鄢陵十六年四月鄭子罕伐宋滕宋之與國鄭因滕有喪而伐宋宋将鉏樂懼敗諸汋陂敗鄭師也樂懼戴公六世孫将鉏樂氏族退舍於夫渠不儆宋師不儆備鄭人覆之敗諸汋陵獲将鉏樂懼宋恃勝也汋陂夫渠汋陵皆宋地是月衛侯伐鄭至于鳴鴈為晋故也鳴鴈在陳留雍丘縣西北是月晋侯将伐鄭范文子曰若逞吾願諸侯皆叛晉可以逞逞快也晋厲公無道三郤驕故欲使諸侯叛兾其懼而思徳若唯鄭叛晋國之憂可立俟也欒武子曰不可以當吾世而失諸侯必伐鄭乃興師欒書将中軍士爕佐之代荀庚郤錡将上軍代士爕荀偃佐之代郤錡偃荀庚子韓厥将下軍郤至佐新軍荀罃居守荀罃下軍佐於是郤犫代趙旃将新軍上下軍罷矣郤犫如衛遂如齊皆乞師焉欒黶來乞師孟獻子曰有勝矣卑讓有禮故知其将勝楚戊寅晋師起鄭人聞有晋師使告于楚姚句耳與徃句耳鄭大夫與徃非使也為先歸張本楚子救鄭司馬将中軍子反令尹将左子重右尹子辛将右公子壬夫五月晋師濟河聞楚師将至范文子欲反曰我偽逃楚可以紓憂紓緩也夫合諸侯非吾所能也以遺能者我若羣臣輯睦以事君多矣武子曰不可六月晋楚遇于鄢陵范文子不欲戰郤至曰韓之戰惠公不振旅衆散敗也在僖十五年箕之役先軫不反命死於狄也在僖三十三年邲之師荀伯不復從荀林父奔走不復故道在宣十二年皆晋之耻也子亦見先君之事矣見先君成敗之事今我辟楚又益耻也文子曰吾先君之亟戰也有故亟數也秦狄齊楚皆彊不盡力子孫将弱今三强服矣齊泰狄敵楚而已惟聖人能外内無患自非聖人外寜必有内憂驕亢則憂患生盍釋楚以為外懼乎甲午晦楚晨壓晋軍而陳壓笮其未備軍吏患之范匄進匄士爕子曰塞井夷竈陳於軍中而疏行首疏行首者當陳前决開營壘為戰道晋楚唯天所授何患焉文子執戈逐之曰國之存亡天也童子何知焉欒書曰楚師輕窕固壘而待之三日必退退而擊之必獲勝焉郤至曰楚有六間不可失也其二卿相惡子重子反王卒以舊罷老不代鄭陳而不整不整列蠻軍而不陳蠻夷從楚者不結陳陳不違晦晦月終隂之盡故兵家以為忌在陳而囂囂諠譁也合而加囂陳合宜静而益有聲各顧其後莫有鬬心人恤其所底舊不必良以犯天忌我必克之楚子登巢車以望晋軍巢車車上為櫓子重使太宰伯州犂侍於王後州犂晋伯宗子前年奔楚王曰騁而左右何也騁走也曰召軍吏也皆聚於中軍矣曰合謀也張幕矣曰䖍卜於先君也䖍敬也徹幕矣曰将發命也甚嚻且塵上矣曰将塞井夷竈而為行也夷平也皆乗矣左右執兵而下矣曰聽誓也左将帥右車右戰乎曰未可知也乗而左右皆下矣曰戰禱也禱請鬼神伯州犂以公卒告王公晋侯苖賁皇在晋侯之側亦以王卒告賁皇楚鬬椒子宣四年奔晋皆曰國士在且厚不可當也晋侯左右皆以伯州犂在楚知晋之情且謂楚衆多故憚合戰與苖賁皇意異苖賁皇言於晋侯曰楚之良在其中軍王族而已請分良以擊其左右而三軍萃於王卒萃集也必大敗之有淖於前淖泥也乃皆左右相違於淖違辟也歩毅御晋厲公欒鍼為右歩毅即郤毅彭名御楚共王潘黨為右石首御鄭成公唐茍為右欒范以其族夾公行二族强故在公左右䧟於淖欒書将載晋侯鍼曰書退國有大任焉得專之在君前故子名其父大任謂元帥之職且侵官冒也載公為侵官失官慢也去将而御失官也離局姦也逺其部曲為離局有三罪焉不可犯也乃掀公以出於淖掀舉也癸巳潘尫之黨與養繇基蹲甲而射之徹七札焉黨潘尫之子蹲聚也一發逹七札言其能陷堅以示王曰君有二臣如此何憂於戰二子以射夸王王怒曰大辱國賤其不尚知謀詰朝爾射死藝言女以射自多必當以藝死也詰朝猶明朝是戰日吕錡夢射月中之退入於泥吕錡魏錡占之曰姬姓日也周世姬姓尊異姓月也異姓卑必楚王也射而中之退入於泥亦必死矣錡自知亦死及戰射共王中目王召養繇基與之兩矢使射吕錡中項伏弢弢弓衣以一矢復命言一發而中郤至三遇楚子之卒見楚子必下免胄而趨風疾如風楚子使工尹襄問之以弓問遺也曰方事之殷也殷盛也有韎韋之跗注君子也韎赤色跗注戎服若袴而屬於跗與袴連識見不榖而趨無乃傷乎恐其傷郤至見客免胄承命曰君之外臣至從寡君之戎事以君之靈間蒙甲胄間猶近也不敢拜命介者不拜敢告不寜君命之辱以君辱賜命故不敢自安為事之故敢肅使者言君辱命來問以有軍事不得答故肅使者肅手至地若今撎三肅使者而退晋韓厥從鄭伯從逐也其御杜溷羅曰速從之其御屢顧不在馬可及也韓厥曰不可以再辱國君乃止二年鞍戰厥已辱齊侯郤至從鄭伯其右茀翰胡曰諜輅之余從之乗而俘以下欲遣輕兵单進以距鄭伯車前而自後登其車以執之郤至曰傷國君有刑亦止石首曰衛懿公唯不去其旗是以敗於熒乃内旌於弢中熒戰在閔二年唐茍謂石首曰子在君側敗者壹大我不如子子以君免我請止乃死敗者壹大謂君大崩也言石首以君之親臣而執御與車右不同故首當御君以退已當死戰楚師薄於險薄廹也叔山冉謂養繇基曰雖君有命為國故子必射王有死藝命乃射再發盡殪叔山冉搏人以投中車折軾晋師乃止言二子皆有過人之能囚楚公子茷為郤至見譖張本欒鍼見子重之旌請曰楚人謂夫旌子重之麾也彼其子重也日臣之使於楚也子重問晋國之勇臣對曰好以衆整曰又何如又問其餘臣對曰好以暇暇閑暇今兩國治戎行人不使不可謂整臨事而食言不可謂暇食好整之言請攝飲焉攝持也持食徃飲子重公許之使行人執榼承飲造于子重承奉也曰寡君乏使使鍼御持矛御侍也是以不得犒從者使某攝飲子重曰夫子嘗與吾言於楚必是故也不亦識乎知其以徃言好暇故致飲受而飲之免使者而復皷免脱也旦而戰見星未已子反命軍吏察夷傷夷亦傷也補卒乗補死亡繕甲兵繕治也展車馬展陳也鷄鳴而食唯命是聽復欲戰晋人患之苖賁皇徇曰蒐乗補卒蒐閲也秣馬利兵秣穀馬也脩陳固列固堅也蓐食申禱申重也明日復戰乃逸楚囚逸縱也王聞之召子反謀糓陽豎獻飲於子反子反醉而不能見糓陽子反内豎王曰天敗楚也夫余不可以待乃宵遁晋入楚軍三日糓食楚粟三日也范文子立於戎馬之前曰君㓜諸臣不佞佞才也何以及此君其戒之戒勿驕周書曰惟命不于常有徳之謂周書康誥言天無常命惟徳是與楚師還及瑕瑕地名王使謂子反曰先大夫之覆師徒者君不在謂子玉敗城濮時王不在軍子無以為過不榖之罪也子反再拜稽首曰君賜臣死死且不朽王引過亦所以責子反臣之卒實奔臣之罪也子重使謂子反曰初隕師徒者而亦聞之矣盍圗之聞子玉自殺終二卿相惡對曰雖㣲先大夫有之大夫命側側敢不義言以義命已不敢不受側亡君師敢忘其死王使止之弗及而卒秋公㑹尹子晋侯齊國佐邾人伐鄭尹子王卿士子爵遷于制田滎陽宛陵縣東有制澤知武子佐下軍武子荀罃以諸侯之師侵陳至于鳴鹿陳國武平縣西南有鹿邑遂侵蔡未反侵陳蔡不書公不與諸侯遷于潁上戊午鄭子罕宵軍之宋齊衛皆失軍将至與軍相失宋衛不書後也十七年正月鄭子駟侵晋虚滑虚滑晋二邑滑國為秦所滅時屬晋後屬周衛北宫括救晋侵鄭至髙氏高氏在陽翟縣西南五月楚公子成公子寅戌鄭公㑹尹武公單襄公及諸侯伐鄭自戲童至於曲洧晋未能服鄭故假天子之威周使二卿㑹之今新汲縣治曲洧城六月楚子重救鄭師于首止諸侯還畏楚强冬諸侯伐鄭前夏未得志故十月庚午圍鄭楚公子申救鄭師于汝上十一月諸侯還畏楚救不成圍還是月齊侯使崔杼為大夫使慶克佐之帥師圍盧討高弱十二月楚人滅舒庸舒庸人以楚師之敗也敗於鄢陵舒庸東夷國道呉人圍巢伐駕圍釐虺巢駕釐虺楚四邑遂恃呉而不設備楚公子橐師襲舒庸滅之十八年六月鄭伯侵宋及曹門外曹門宋城門遂㑹楚伐宋取朝郟楚子辛鄭皇辰侵城郜取幽丘同伐彭城朝郟城郜幽丘彭城皆宋邑納宋魚石向為人鱗朱向帶魚府焉五子成十五年出奔楚獨書魚石為帥告以三百乗戍之而還襄公元年春正月仲孫蔑㑹晋欒黶宋華元衛寗殖曹人莒人邾人滕人薛人圍宋彭城成十八年楚取彭城以封魚石夫子治春秋追書為宋此為宋討也彭城降晋晋人以宋五大夫在彭城者歸寘諸瓠丘瓠丘晋地河東東垣縣東南有壺丘五大夫魚石向為人鱗朱向帶魚府齊人不㑹彭城晋人以為討夏五月晉韓厥荀偃帥諸侯之師伐鄭入其郛敗其徒兵於洧上徒兵歩兵洧水出宻縣東南至長平入潁於是東諸侯之師次于鄫以待晋師齊魯曹邾杞晋師自鄭以鄫之師侵楚焦夷及陳晋侯衛侯次于戚以為之援為韓厥援秋楚子辛公子壬夫救鄭侵宋吕留吕留二縣今屬彭城郡鄭子然侵宋取犬丘譙國鄼縣東北有犬丘城二年春正月鄭師侵宋楚令也以彭城故齊侯伐萊萊人使正輿子賂夙沙衛以索馬牛皆百匹齊師乃還六月晋師宋師衛寗殖侵鄭鄭成公疾子駟請息肩於晋欲辟楚役以負擔喻公曰楚君以鄭故親集矢於其目謂鄢陵戰時晋射楚王目非異人任寡人也言楚子任此患不為他人故也若背之是棄力與言其誰暱我言盟誓之言免寡人唯二三子秋七月庚辰鄭伯睔卒於是子罕當國攝君事子駟為政為正卿子國為司馬晋師侵鄭晋伐䘮非禮諸大夫欲從晋子駟曰官命未改成公未𦵏嗣君未免䘮故言未改不欲違先君意三年春楚子重伐呉為簡之師簡選練克鳩兹至于衡山鳩兹呉邑在丹陽蕪湖縣東今臯夷也衡山在呉烏程縣南使鄧廖帥組甲三百被練三千以侵呉呉人要而擊之獲鄧廖其能免者組甲八十被練三百而已子重歸既飲至三日呉人伐楚取駕駕良邑也鄧廖亦楚之良也君子謂子重於是役也所獲不如所亡當時君子秋楚司馬公子何忌侵陳陳叛故也冬晋知武子帥師伐許許靈公事楚不㑹于鷄澤四年三月陳成公卒楚人将伐陳聞䘮乃止軍禮不伐䘮陳人不聽命不聽楚命臧武仲聞之曰陳不服于楚必亡大國行禮焉而不服在大猶有咎而况小乎夏楚彭名侵陳陳無禮故也冬楚人使頓間陳而侵伐之故陳人圍頓間伺間缺冬十月邾人莒人伐鄫臧紇救鄫侵邾敗於狐駘臧紇武仲也鄫屬魯故救之狐駘邾地魯國畨縣東南有目台亭國人逆䘮者皆髽魯於是乎始髽髽麻髮合結也遭䘮者多故不能備凶服髽而已國人誦之曰臧之狐裘敗我於狐駘臧紇時服狐裘我君小子朱儒是使朱儒朱儒使我敗于邾襄公㓜弱故曰小子臧紇短小故曰朱儒五年冬諸侯戍陳備楚楚公子貞帥師伐陳初子囊為令尹公子貞范宣子曰我䘮陳矣楚人討貳而立子囊必改行改子辛所行而疾討陳疾急也陳近於楚民朝夕急能無徃乎有陳非吾事也無之而後可言晋力不能及陳故十一月甲午公㑹晋侯宋公衛侯鄭伯曹伯齊世子光于城棣以救之城棣鄭地陳留酸􅀥縣西南有棣城六年秋莒人滅鄫鄫恃賂也鄫有貢賦之賂在魯恃之而慢莒故滅之十一月齊侯滅莱萊恃謀也賂夙沙衛之謀也事在二年於鄭子國之來聘也四月晏弱城東陽而遂圍萊子國聘在五年二年晏弱城東陽至五年四月復託治城因遂圍萊甲寅堙之環城傅於堞堞女墻也堙土山也周城為土山及女墻及杞桓公卒之月此年三月乙未王湫帥師及正輿子棠人軍齊師王湫故齊人十八年奔萊正輿子萊大夫棠萊邑也北海即墨縣有棠鄉三人帥别邑兵來觧圍齊師大敗之敗湫等丁未入萊萊共公浮柔奔棠正輿子王湫奔莒莒人殺之四月陳無宇獻萊宗噐于襄宫無宇桓子陳完𤣥孫襄宫齊襄公廟晏弱圍棠十一月丙辰而滅之遷萊于郳遷萊子于郳國髙厚崔杼定其田定其疆界高厚髙固子七年冬楚公子貞帥師圍陳十二月公㑹晉侯宋公陳侯衛侯曹伯莒子邾子于鄬以救之晉㑹諸侯八年夏四月庚寅鄭子國子耳侵蔡獲蔡司馬公子燮鄭侵蔡欲以求媚于晋子耳子良之子不言敗唯以獲告鄭人皆喜唯子産不順子産子國子不順衆而喜曰小國無文徳而有武功禍莫大焉楚人來討能無從乎從之晋師必至晋楚伐鄭自今鄭國不四五年弗得寜矣子國怒之曰爾何知國有大命而有正卿童子言焉将為戮矣大命起師行軍之命五月莒人伐我東鄙以疆鄫田莒既滅鄫魯侵其西界故伐魯東鄙以正其封疆冬楚子囊伐鄭討其侵蔡也子駟子國子耳欲從楚子孔子蟜子展欲待晋待晋來救子孔穆公子子蟜子游子子展子罕子乃及楚平九年秋秦人侵晋晋饑弗能報也冬十月公㑹晋侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光伐鄭鄭從楚也庚午季武子齊崔杼宋皇鄖從荀罃士匄門于鄟門鄭城門也三國從中軍衛北宫括曹人邾人從荀偃韓起門于師之梁師之梁亦鄭城門三國從上軍滕人薛人從欒黶士魴門于北門二國從下軍杞人郳人從趙武魏絳斬行栗二國従新軍行栗表道樹甲戌師于氾衆軍還聚氾氾鄭地東氾令於諸侯曰脩器備兵器戰備盛餱糧餱乾食歸老幼示将久師居疾于虎牢諸侯已取鄭虎牢故使諸軍疾病息其中肆𤯝圍鄭肆緩也𤯝過也不書圍鄭逆服不成圍鄭人恐乃行成與晋成也中行獻子曰遂圍之以待楚人之救也而與之戰不然無成獻子荀偃也恐楚救鄭復屬之知武子曰許之盟而還師以敝楚人敝罷也吾三分四軍分四軍為三部與諸侯之鋭以逆來者來者楚也於我未病楚不能矣晋各一動而楚三來故曰不能猶愈於戰勝聚戰暴骨以逞不可以争言争當以謀不可以暴骨大勞未艾君子勞心小人勞力先王之制也艾息也言當從勞心之勞諸侯皆不欲戰乃許鄭成晋人不得志於鄭以諸侯復伐之十二月癸亥門其三門三門鄟門師之梁北門也癸亥月五日晋果三分其軍各攻一門閏月戊寅濟于隂阪侵鄭以長歴参校上下此年不得有閏月戊寅戊寅是十二月二十日疑閏月當為門五日以癸亥始攻攻輙五日凡十五日鄭故不服而去明日戊寅濟于隂阪復侵鄭外邑隂阪洧津次于隂口而還隂口鄭地名子孔曰晋師可撃也師老而勞且有歸志必大克之子展曰不可是月楚子伐鄭與晋成故子駟将及楚平子孔子蟜曰與大國盟口血未乾而背之可乎子駟子展曰吾盟固云唯彊是從今楚師至晋不我救則楚彊矣盟誓之言豈敢背之且要盟無質神弗臨也質主也及楚平楚荘夫人卒王未能定鄭而歸王共王也十年夏四月戊午諸侯㑹于柤經書春書始行也戊午月一日晋荀偃士匄請伐偪陽而封宋向戍焉以宋常事晋而向戍有賢行故欲封之為附庸荀罃曰城小而固勝之不武弗勝為笑固請丙寅圍之弗克丙寅四月九日孟氏之臣秦堇父輦重如役堇父孟獻子家臣歩挽重車以從師偪陽人啓門諸侯之士門焉見門開故攻之縣門發鄹人紇抉之以出門者門者諸侯之士在門内者也紇鄹邑大夫仲尼父叔梁紇也鄹邑魯縣東南莝城是也言紇多力抉舉縣門出在内者狄虒彌建大車之輪而蒙之以甲以為櫓狄虒彌魯人也蒙覆也左執之右㧞㦸以成一隊百人為隊孟獻子曰詩所謂有力如虎者也詩邶風也主人縣布堇父登之及堞而絶之偪陽人縣布以試外勇者隊則又縣之蘇而復上者三主人辭焉乃退主人嘉其勇故辭謝不復縣布帶其斷以徇于軍三日帶其斷布以示勇諸侯之師久於偪陽荀偃士匄請於荀罃曰水潦将降懼不能歸向夏恐其乆雨從丙寅至庚寅二十五日故曰久請班師班還也知伯怒知伯荀罃投之以机出於其間出偃匄之間曰女成二事而告余二事伐偪陽封向戍余恐亂命以不女違既成改之為亂命女既勤君而興諸侯牽帥老夫以至於此既無武守無武功可執守而又欲易余罪曰是實班師不然克矣謂偃匄将言爾余羸老也可重任乎不任受女此責七日不克必爾乎取之言當取女以謝不克之罪五月庚寅荀偃士匄帥卒攻偪陽親受矢石躬在矢石間甲午滅之六月楚子囊鄭子耳伐宋師于訾毋庚午圍宋門于桐門衛侯救宋師于襄牛子展曰必伐衛不然是不與楚也鄭得罪於晋又得罪於楚國将若之何子駟曰國病矣師數出疲病也子展曰得罪於二大國必亡病不猶愈於亡乎諸大夫皆以為然故鄭皇耳帥師侵衛楚令也亦兼受楚之勅命也皇耳戍子孫文子卜追之獻兆於定姜姜氏問繇繇兆辭曰兆如山陵有夫出征而䘮其雄姜氏曰征者䘮雄禦寇之利也大夫圗之衛人追之孫蒯獲鄭皇耳於犬丘蒯孫林父子是月晉荀罃伐秦報其侵也侵在九年秋七月楚子囊鄭子耳侵我西鄙還圍蕭八月丙寅克之蕭宋邑九月鄭子耳侵宋北鄙孟獻子曰鄭其有災乎師競已甚競争競也周猶不堪競况鄭乎周謂天王有災其執政之三士乎簡公㓜子駟子國子耳秉政故知三士任其禍為下盗殺三大夫傳莒人間諸侯之有事也故伐我東鄙諸侯有討鄭事諸侯伐鄭齊崔杼太子光先至于師故長於滕太子宜賓之上卿而晋悼以一時之宜令在滕侯上故傳從而釋之己酉師于牛首鄭地也冬諸侯之師城虎牢而戍之晋師城梧及制欲以偪鄭也不書城魯不與也梧制皆鄭舊地士魴魏絳戍之書曰戍鄭虎牢非鄭地也言将歸焉二年晋城虎牢居之今鄭復叛故修其城而置戍鄭服則欲以還鄭故夫子追書繫之于鄭以見晋志鄭及晉平楚子囊救鄭十一月諸侯之師還鄭而南至于陽陵還繞也陽陵鄭地楚師不退知武子欲退曰今我逃楚楚必驕驕則可與戰矣武子荀罃欒黶曰逃楚晋之恥也合諸侯以益耻不如死我将獨進師遂進己亥與楚師夾潁而軍潁水出城陽至下蔡入淮子蟜曰諸侯既有成行必不戰矣言有成去之志從之将退不從亦退從猶服也退楚必圍我猶将退也不如從楚亦以退之以退楚宵渉潁與楚人盟夜渡畏晋知之欒黶欲伐鄭師伐渉潁者荀罃不可曰我實不能禦楚又不能庇鄭鄭何罪不如致怨焉而還致怨為後伐之資今伐其師楚必救之戰而不克為諸侯笑克不可命勝負難要不可命以必克不如還也丁未諸侯之師還侵鄭北鄙而歸欲以致怨楚人亦還鄭服故也十一年四月鄭公孫舍之帥師侵宋初宋向戍侵鄭大獲子展曰師而伐宋可矣若我伐宋諸侯之伐我必疾吾乃聽命焉且告于楚楚至吾又與之盟而重賂晋師乃免矣言如此乃免於晋楚之難是月諸侯伐鄭己亥齊太子光宋向戍先至于鄭門于東門傳釋齊太子光所以序莒上也向戌不書宋公在㑹故其莫晉荀罃至西郊東侵舊許許之舊國鄭新邑衛孫林父侵其北鄙六月諸侯㑹于北林師于向向地在潁川長社縣東北右還次于𤨏北行而西為右還滎陽宛陵縣西有𤨏候亭圍鄭觀兵于南門觀示也西濟于濟隧濟隧水名鄭人懼乃行成楚子囊乞旅于秦乞師旅于秦秦右大夫詹帥師從楚子将以伐鄭鄭逆之丙子伐宋鄭逆服故更伐宋也秦師不書不與伐宋而還九月諸侯悉師以復伐鄭此夏諸侯皆來故曰悉師鄭人使良霄太宰石㚟如楚告将服于晋曰孤以社稷之故不能懐君君若能以玉帛綏晋不然則武震以攝威之孤之願也楚人執之諸侯之師觀兵于鄭東門鄭人使王子伯駢行成十二月庚辰赦鄭囚皆禮而歸之納斥候不相備也禁侵掠秦庶長鮑庶長武帥師伐晋以救鄭庶長秦爵不書救鄭鄭屬晋無所救鮑先入晋地士魴禦之少秦師而弗設備壬午武濟自輔氏從輔氏渡河與鮑交伐晋師己丑秦晋戰于櫟晋師敗績易秦故也十二年春莒人伐魯東鄙圍台季武子救台遂入鄆取其鍾以為公盤冬楚子囊秦庶長無地伐宋師于楊梁以報晋之取鄭也取鄭在前年梁國睢陽縣東有地名楊梁十三年夏取邿邿亂分為三國分為三部志力各異師救邿遂取之秋呉侵楚養繇基奔命子庚以師繼之子庚楚司馬養叔曰呉乗我䘮謂我不能師也養叔養由基也必易我而不戒戒備也子為三覆以待我覆伏兵我請誘之子庚從之戰于庸浦庸浦楚地大敗呉師獲公子黨君子以呉為不吊不用天道相吊恤詩曰不吊昊天亂靡有定言不為昊天所恤則致罪也十四年夏四月叔孫豹㑹晋荀偃齊人宋人衛北宫括鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人伐秦以報櫟之役也櫟役在十一年晉侯待于竟使六卿帥諸侯之師以進言經所以不稱晋侯及涇不濟諸侯之師不肯渡也涇水出安定朝那縣至京兆髙陸縣入渭叔向見叔孫穆子穆子賦匏有苦葉詩邶風也義取于深則厲淺則揭言已志在於必濟叔向退而具舟魯人莒人先濟鄭子蟜見衛北宫懿子曰與人而不固取惡莫甚焉若社稷何懿子説二子見諸侯之師而勸之濟濟涇而次傳言北宫括所以書於伐秦秦人毒涇上流師人多死飲毒水故鄭司馬子蟜帥鄭師以進師皆從之至于棫林棫林秦地不獲成焉荀偃令曰鷄鳴而駕塞井夷竈示不反唯余馬首是瞻言進退從已欒黶曰晋國之命未有是也余馬首欲東乃歸黶惡偃自專故棄之歸下軍從之左史謂魏荘子曰不待中行伯乎中行伯荀偃也荘子魏絳也左史晋太史荘子曰夫子命從帥夫子謂荀偃欒伯吾帥也吾将從之從帥所以待夫子也以從命為待也欒黶下軍帥荘子為佐故曰吾帥伯游曰吾令實過悔之何及多遺秦禽軍帥不和恐多為秦所禽獲乃命大還晋人謂之遷延之役遷延却退欒鍼曰此役也報櫟之敗也役又無功晋之耻也吾有二位於戎路欒鍼欒黶弟也二位謂黶将下軍鍼為戎右敢不耻乎與士鞅馳秦師死焉士鞅反鞅士匄子欒黶謂士匄曰余弟不欲徃而子召之余弟死而子來是而子殺余之弟也弗逐余亦将殺之士鞅奔秦欒黶汰侈誣逐士鞅秋楚公子貞帥師伐呉楚子為庸浦之役故在前年子囊師於棠以伐呉呉不出而還子囊殿殿軍後以呉為不能而弗儆呉人自臯舟之隘要而擊之臯舟呉險阨之道楚人不能相救呉人敗之獲公子宜糓傳言不備不可以師十五年夏齊侯伐我北鄙圍成公救成至遇遇魯地書至遇畏齊不敢至成秋邾人伐我南鄙亦貳於晋故使告于晋晋将為㑹以討邾莒十二年十四年莒人伐魯未之討也晋侯有疾乃止十六年春齊侯伐我北鄙齊貳晋故是春許男請遷于晋許欲叛楚諸侯遂遷許許大夫不可晋人歸諸侯唯以其師討許之不肯遷鄭子蟜聞将伐許遂相鄭伯以從諸侯之師鄭與許有宿怨故其君親行穆叔從公從公歸齊子帥師㑹荀偃夏六月次于棫林庚寅伐許次于函氏棫林函氏皆許地晋荀偃欒黶帥師伐楚以報宋楊梁之役晋師獨進楊梁役在十二年楚公子格帥師及晋師戰于湛阪襄城昆陽縣北有湛水東入汝楚師敗績晋師遂侵方城之外復伐許而還秋齊侯伐我北鄙圍郕郕魯孟氏邑貳晋故伐魯孟孺子速徼之孟獻子之子荘子速也徼要也齊侯曰是好勇去之以為之名速遂塞海陘而還海陘魯隘道十七年春宋荘朝伐陳獲司徒卬卑宋也司徒卬陳大夫卑宋不設備夏衛石買帥師伐曹買石稷子衛孫蒯田于曹隧越竟而獵孫蒯林父之子飲馬于重丘重丘曹邑毁其瓶重丘人閉門而詬之詬罵也曰親逐而君爾父為厲厲惡鬼林父逐君在十四年是之不憂而何以田為衛石買孫蒯伐曹取重丘曹人愬于晋明年晋人執石買秋齊侯伐我北鄙前年圍成辟孟孺子圍桃弁縣東南有桃虚髙厚圍臧紇于防防臧紇邑師自陽關逆臧孫至于旅松陽關在泰山鉅平縣東旅松近防地也魯畏齊不敢至防鄹叔紇臧疇臧賈帥甲三百宵犯齊師送之而復鄹叔紇叔梁紇臧疇臧賈臧紇之兄弟也三子與臧紇共在防故夜送臧紇於旅松而復還守防齊師去之失臧紇故齊人獲臧堅堅臧紇之族齊侯使夙沙衛唁之且曰無死使無自殺堅稽首曰拜命之辱抑君賜不終姑又使其刑臣禮於士以杙抉其傷而死言使賤人來唁已是惠賜不終也夙沙衛奄人故謂之刑臣冬邾人伐我南鄙為齊故也齊未得志於魯故邾助之十八年秋齊人伐我北鄙冬十月公㑹晋侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子同圍齊齊數行不義諸侯同心俱圍之齊侯禦諸平隂塹防門而守之廣里平隂城在濟北盧縣東北其城南有防防有門於門外作塹横行廣一里故經書圍夙沙衛曰不能戰莫如守險謂防門不足為險弗聽諸侯之士門焉齊人多死范宣子告析文子析文子齊大夫子家曰吾知子敢匿情乎魯人莒人皆請以車千乗自其鄉入既許之矣若入君必失國子盍圗之子家以告公公恐晏嬰聞之曰君固無勇而又聞是弗能久矣不能久敵晋齊侯登巫山而望晋師巫山在盧縣東北晋人使司馬斥山澤之險雖所不至必斾而疎陳之使乗車者左實右偽以斾先偽以衣服為人形也建斾以先驅輿曵柴而從之以揚塵齊侯見之畏其衆也乃脱歸脱不張旗幟丙寅晦齊師夜遁師曠告晋侯曰鳥烏之聲樂齊師其遁鳥烏得空營故樂也邢伯告中行伯邢伯晋大夫邢侯也中行伯獻子曰有班馬之聲夜遁馬不相見故鳴班别也齊師其遁叔向告晋侯曰城上有烏齊師其遁十一月丁卯朔入平隂遂從齊師夙沙衛連大車以塞隧而殿此衛所欲守險殖綽郭最曰子殿國師齊之辱也奄人殿師故以為辱子姑先乎乃代之殿衛殺馬於隘以塞道恨二子故塞其道欲使晋得之晋州綽及之射殖綽中肩兩矢夾脰脰頸也曰止将為三軍獲不止将取其𠂻不止復欲射兩矢中央顧曰為私誓州綽曰有如日言必不殺女明如日乃弛弓而自後縳之反縳之其右具丙州綽之右亦舍兵而縳郭最皆衿甲面縳衿甲不觧甲坐於中軍之鼓下晋人欲逐歸者魯衛請攻險險固城守者己卯荀偃士匄以中軍克京兹在平隂城東南乙酉魏絳欒盈以下軍克邿欒黶死其子盈佐下軍平隂西有邿山趙武韓起以上軍圍盧弗克十二月戊戌及秦周伐雍門之萩秦周魯大夫趙武及之共伐萩也雍門齊城門范鞅門于雍門其御追喜以戈殺犬于門中殺犬示閒暇孟荘子斬其槆以為公琴荘子孺子速槆木名己亥焚雍門及西郭南郭劉難士弱率諸侯之師焚申池之竹木二子晋大夫壬寅焚東郭北郭范鞅門于揚門齊西門州綽門于東閭齊東門左驂廹還于門中以枚數闔枚馬檛也闔門扇也數其板示不恐齊侯駕将走郵棠郵棠齊邑太子與郭榮扣馬太子光也榮齊大夫曰師速而疾畧也言欲畧行其地無久攻意将退矣君何懼焉且社稷之主不可以輕輕則失衆君必待之将犯之太子抽劒㫁鞅乃止甲辰東侵及濰南及沂濰水在東莞東北至北海都昌縣入海沂水出東莞盖縣至下邳入泗是月楚公子午帥師伐鄭初鄭子孔欲去諸大夫欲專權将叛晋而起楚師以去之使告子庚子庚弗許子庚楚令尹公子午楚子聞之使揚豚尹宜告子庚曰國人謂不糓主社稷而不出師死不從禮不能承先君之業死将不得從先君之禮大夫圗之其若之何子庚歎曰君王其謂午懐安乎吾以利社稷也帥師治兵于汾襄城東北有汾丘城於是子蟜伯有子張從鄭伯伐齊子張公孫黒肱子孔子展子西守二子知子孔之謀二子子展子西完守入保子孔不敢㑹楚師楚師伐鄭次于魚陵魚陵魚齒山也在南陽犫縣北鄭地右師城上棘遂渉潁次于旃然将渉潁故於水邊權築小城以為進退之備旃然水出滎陽成臯縣東入汴蒍子馮公子格率鋭師侵費滑胥靡獻于雍梁胥靡獻于雍梁皆鄭邑河南陽翟縣東北有雍氏城右回梅山在滎陽宻縣東北侵鄭東北至于蟲牢而反子庚門于純門信于城下而還信再宿渉于魚齒之下魚齒山之下有􅘷水故言渉甚雨及之楚師多凍役徒㡬盡十九年二月晋欒魴帥師從衛孫文子伐齊欒魴欒氏族七月晋士匄帥師侵齊至糓聞齊侯卒乃還二十年秋孟荘子伐邾以報之既盟而又伐之非初邾人驟至以諸侯之事弗能報也驟數也謂十五年十七年伐魯二十三年秋齊侯伐衛先驅糓榮御王孫揮召揚為右先驅前鋒軍申驅成秩御莒恒申鮮虞之傅摯為右申驅次前軍傅摯申鮮虞之子曹開御戎晏父戎為右公御右也貳廣上之登御邢公盧蒲癸為右貳廣公副車啓牢成御襄罷師狼蘧疏為右左翼曰啓胠商子車御侯朝桓跳為右右翼曰胠大殿商子游御夏之御寇崔如為右大殿後軍燭庸之越駟乗四人共乗殿車也傳具載此言荘公廢舊臣任武力自衛将遂伐晋晏平仲曰君恃勇力以伐盟主若不濟國之福也不徳而有功憂必及君崔杼諌曰不可臣聞之小國間大國之敗而毁焉必受其咎君其圗之弗聽陳文子見崔武子文子陳完之孫湏無武子崔杼也曰将如君何武子曰吾言於君君弗聽也以為盟主而利其難羣臣若急君於何有言有急不能顧君欲殺之以説晋子姑止之文子退告其人曰崔子将死乎謂君甚而又過之殺君之惡過於背盟主不得其死過君以義猶自抑也况以惡乎自抑損齊侯遂伐晋取朝歌朝歌今屬汲郡為二隊入孟門登太行二隊分兵為二部孟門晋隘道太行山在河内郡北張武軍於熒庭張武軍築壘壁熒庭晋地戍郫邵取晋邑而守之封少水封晋尸於少水以為京觀以報平隂之役乃還平隂役在十八年趙勝帥東陽之師以追之獲晏㲠趙勝趙旃之子東陽晋之山東魏郡廣平以北晏㲠齊大夫八月叔孫豹帥師救晋次于雍榆禮也救盟主故曰禮冬齊侯還自晋不入不入國遂襲莒門于且于且于莒邑傷股而退明日将復戰期于壽舒夀舒莒地杞殖華還載甲夜入于且于之隧宿於莒郊二子齊大夫隧狹路明日先遇莒子於蒲侯氏蒲侯氏近莒之邑莒子重賂之使無死曰請有盟華周對曰華周即華還貪貨棄命亦君之所惡也莒子親鼓之從而伐之獲杞梁梁即杞殖莒人懼行成勝大國益懼故行成二十四年春仲孫羯帥師侵齊夏楚子為舟師以伐呉舟師水軍不為軍政不設賞罰之差無功而還為下呉召舒鳩起本秋齊崔杼帥師伐莒初齊侯聞将有晋師使陳無宇從薳啓疆如楚辭且乞師辭有晋師未得相見崔杼帥師送之遂伐莒侵介根介根莒邑冬楚子蔡侯陳侯許男伐鄭以救齊門于東門次于棘澤以齊無宇乞師故二十五年春齊崔杼伐我北鄙以報孝伯之師也前年魯使孟孝伯為晋伐齊六月壬子鄭公孫舍之帥師入陳初陳侯㑹楚子伐鄭在前年當陳隧者井堙木刋隧陘也堙塞也刋除也鄭人怨之使子展子産帥車七百乗伐陳宵突陳城突穿也遂入之陳侯扶其太子偃師奔墓欲逃冢間遇司馬桓子曰載余陳之司馬曰将廵城不欲載公以廵城辭遇賈獲賈獲陳大夫載其母妻下之而授公車公曰舍而母辭曰不祥雖急猶不欲男女無别與其妻扶其母以奔墓亦免子展命師無入公宫與子産親御諸門欲服之而已故禁侵掠陳侯使司馬桓子賂以宗器陳侯免擁社免䘮服擁社抱社主示服使其衆男女别而纍以待於朝纍自囚係以待命子展執縶而見見陳侯再拜稽首承飲而進獻承飲奉觴示不失臣敬子羙入數俘而出子美子産也但數其所獲人數不将以歸祝袚社司徒致民司馬致節司空致地乃還祓除也節兵符陳亂故正其衆官修其所職以安定之乃還也秋楚屈建帥師滅舒鳩冬鄭公孫夏帥師伐陳陳及鄭平前雖入陳服之而已故更伐以結成十有二月呉子遏遏諸樊也伐楚以報舟師之役舟師在二十四年門于巢二十六年二月衛人侵戚東鄙以孫林父叛故孫氏愬于晋晋戍茅氏茅氏戚東鄙殖綽伐茅氏殺晋戍三百人孫蒯蒯林父子追之敗之圉雍鉏獲殖綽雍鉏孫氏臣復愬于晋為下晋討衛張本夏楚子秦人侵呉及雩婁聞呉有備而還雩婁縣今屬安豐邵遂侵鄭五月至于城麇鄭皇頡戍之皇頡鄭大夫守城麇之邑出與楚師戰敗穿封戍囚皇頡六月公㑹晋趙武宋向戍鄭良霄曹人于澶淵以討衛疆戚田正戚之封疆取衛西鄙懿氏六十以與孫氏冬楚子蔡侯陳侯伐鄭初許靈公如楚請伐鄭十六年晋伐許他國皆大夫獨鄭伯自行故許恚欲以報之曰師不興孤不歸矣八月卒于楚楚子曰不伐鄭何以求諸侯十月伐鄭為許十二月乙酉入南里墮其城南里鄭邑渉於樂氏樂氏津名門於師之梁鄭城門縣門發獲九人焉渉於汜而歸於汜城下渉汝水南歸而後𦵏許靈公卒靈公之志而後𦵏之昭公元年三月季武子伐莒取鄆兵未加莒而鄆服故言取四年秋七月楚子蔡侯陳侯許男頓子胡子沈子淮夷伐呉宋太子鄭伯先歸時晋之屬國皆歸獨言二國者鄭伯久於楚宋太子不得見故慰遣之宋華費遂鄭大夫從從伐呉以答見慰使屈申圍朱方朱方呉邑齊慶封所封也屈申屈蕩之子八月甲申克之執齊慶封而盡滅其族慶封以襄二十八年奔呉遂以諸侯滅頼頼子面縛銜璧士袒輿櫬從之造於中軍中軍王所将王問諸椒舉對曰成王克許在僖六年許僖公如是王親釋其縛受其璧焚其櫬王從之從舉言遷賴于鄢鄢楚邑九月取鄫鄫莒邑莒亂著丘公立而不撫鄫鄫叛而來著丘公去疾也冬呉伐楚入棘櫟麻棘櫟麻皆楚東鄙邑譙國鄼縣東北有棘亭汝隂新蔡縣東北有櫟亭以報朱方之役朱方役在此年秋楚沈尹射奔命於夏汭夏汭漢水曲入江今夏口也呉兵在東北楚盛兵在東南以絶其後箴尹宜咎城鍾離宜咎本陳大夫襄二十四年奔楚薳啓疆城巢然丹城州來然丹鄭穆公孫㐮十九年奔楚東國水不可以城彭生罷頼之師彭生楚大夫罷鬭韋龜城頼之師五年秋莒人來討初莒牟夷以牟婁及防兹來奔城陽平昌縣西南有防亭姑幕縣東北有兹亭莒人愬于晋愬魯受牟夷晋侯欲止公范獻子曰不可人朝而執之誘也討不以師而誘以成之惰也為盟主而犯此二者無乃不可乎請歸之間而以師討焉閒暇也乃歸公七月公至自晋莒人來討不設備戊辰叔弓敗諸蚡泉莒未陳也冬十月楚子蔡侯陳侯許男頓子沈子徐人越人及東夷伐呉以報棘櫟麻之役役在四年薳射以繁揚之師㑹于夏汭㑹楚子越大夫常夀過帥師㑹楚子於瑣瑣楚地聞呉師出薳啓疆帥師從之從吴師也遽不設備呉人敗諸鵲岸廬江舒縣有鵲尾渚楚子以驛至于羅汭驛傳也羅水名呉子使其弟蹶繇犒師犒勞楚人執之将以釁鼓王使問焉曰汝卜來吉乎對曰吉寡君聞君將治兵於敝邑卜之以守龜曰余亟使人犒師請行以觀王怒之疾徐而為之備尚克知之言吳卜龜如此龜兆告吉曰克可知也君若驩焉好逆使臣兹敝邑休怠休解也而忘其死亡無日矣今君奮焉震電馮怒馮盛也虐執使臣将以釁鼓則呉知所備矣敝邑雖羸若早脩完完器備其可以息師息楚之師難易有備可謂吉矣且呉社稷是卜豈為一人使臣獲釁軍鼓而敝邑知備以禦不虞其為吉孰大焉國之守龜其何事不卜言嘗卜一臧一否其誰能常之城濮之兆其報在邲城濮戰楚卜吉其效乃在邲今此行也其庸有報志言呉有報楚意乃弗殺楚師濟於羅汭沈尹赤㑹楚子次于萊山薳射帥繁揚之師先入南懐楚師從之及汝清南懐汝清皆楚界呉不可入有備楚子遂觀兵於坻箕之山觀示也是行也呉早設備楚無功而還以蹶繇歸楚子懼呉使沈尹射待命于巢薳啓疆待命于雩婁禮也善有備六年秋楚薳罷帥師伐呉初徐儀楚聘於楚儀楚徐大夫楚子執之逃歸懼其叛也使薳洩伐徐薳洩楚大夫呉人救之令尹子蕩帥師伐呉師于豫章而次于乾谿乾谿在譙國城父縣南楚東竟呉人敗其師於房鍾房鍾呉地獲宫廐尹棄疾鬭韋龜之父子蕩歸罪於薳洩而殺之十一月齊侯伐北燕將納簡公簡公北燕伯三年出奔齊晏子曰不入燕有君矣民不貳吾君賄左右謟䛕作大事不以信未嘗可也明年暨齊平八年九月楚公子棄疾帥師奉孫呉圍陳孫呉悼太子偃師子惠公宋戴惡㑹之戴惡宋大夫十一月壬午滅陳十年秋七月季孫意如叔弓仲孫貜帥師伐莒三大夫皆卿季孫為主二子從之取郠郠莒邑十一年夏四月楚公子棄疾帥師圍蔡傳言楚子無道晋人使狐父請蔡于楚弗聽狐父晋大夫冬十一月丁酉楚師滅蔡執蔡世子有以歸用之用之殺以祭山十二年春齊髙偃帥師納北燕伯欵于陽三年燕伯出奔齊髙偃齊大夫陽即唐燕别邑因其衆也言因唐衆欲納之故得先入唐冬十月楚子狩于州來狩冬獵也次于潁尾潁水之尾在下蔡西使蕩侯潘子司馬督囂尹午陵尹喜帥師圍徐以懼呉五子楚大夫徐呉與國故圍之以偪呉楚子次于乾谿在譙國城父縣南以為之援是冬晋伐鮮虞因肥之役也肥役在此年十三年春叔弓帥師圍費弗克敗焉為費人所敗夏楚師還自徐前年圍徐之師呉人敗諸豫章獲其五帥定二年楚人伐呉師于豫章而潛師于巢以軍楚師於豫章又栢舉之役呉人捨舟于淮汭而自豫章與楚夾漢此皆當在江北淮水南蓋後徙在江南豫章十月呉滅州來楚邑令尹子旗請伐呉王弗許曰州來在呉猶在楚也子姑待之十五年秋晋荀呉帥師伐鮮虞圍鼓三月鼓人或請降使其民見曰猶有食色姑脩而城鼓人告食竭力盡而後取之克鼓而反不戮一人以鼓子䳒鞮歸十六年春正月齊侯伐徐二月丙申齊師至于蒲隧十七年秋晋侯使屠蒯如周請有事於雒與三塗屠蒯晋侯之膳宰也以忠諫見進雒水也三塗山名在陸渾南萇𢎞謂劉子曰客容猛非祭也其伐戎乎陸渾氏甚睦於楚必是故也君其備之乃警戎備警戎以備戍欲因晋以合勢九月丁卯晋荀呉帥師渉自棘津河津水名使祭史先用牲于雒陸渾人弗知師從之庚午遂滅陸渾數之以其貳於楚也陸渾子奔楚其衆奔甘鹿甘鹿周地周大獲先警戎備故獲宣子夢文公攜荀呉而授之陸渾故使穆子帥師獻俘於文宫欲以應夢冬呉伐楚楚陽匄為令尹卜戰不吉陽匄穆王曾孫令尹子瑕司馬子魚曰我得上流何故不吉子魚公子魴也順江而下易用勝敵且楚故司馬令龜我請改卜令曰魴也以其屬死之楚師繼之尚大克之吉得吉兆戰于長岸子魚先死楚師繼之大敗呉師獲其乗舟餘皇餘皇舟名使隨人與後至者守之環而塹之及泉環周也盈其隧炭陳以待命隧出入道呉公子光光諸樊子闔廬請於其衆曰䘮先王之乗舟豈唯光之罪衆亦有焉請藉取之以救死藉衆之力以取舟衆許之使長鬛者三人長鬛多鬚與呉人異状詐為楚人潛伏於舟側曰我呼餘皇則對師夜從之師呉師也三呼皆迭對迭更也楚人從而殺之楚師亂呉人大敗之取餘皇以歸傳言呉光有謀十八年六月鄅人藉稻鄅妘姓國今琅邪開陽縣其君自出藉稻蓋履行之邾人襲鄅鄅人将閉門邾人羊羅攝其首焉斬得閉門者頭遂入之盡俘以歸鄅子曰余無歸矣從帑於邾邾荘公反鄅夫人而舍其女鄅夫人宋向戍之女也故向寜請師寜向戍子也請於宋公伐邾十九年二月宋公伐邾圍蟲三月取之蟲邾邑乃盡歸鄅俘秋齊髙發帥師伐莒莒不事齊故莒子奔紀鄣紀鄣莒邑也東海贑榆縣東北有紀城使孫書伐之孫書陳無宇之子子占也初莒有婦人莒子殺其夫已為嫠婦寡婦為嫠及老託於紀鄣紡焉以度而去之因紡纑連所紡以度城而藏之以待外攻者欲以報讐及師至則投諸外投繩城外隨之而出或獻諸子占子占使師夜縋而登縁繩登城登者六十人縋絶師鼓譟城上之人亦譟莒共公懼啓西門而出七月丙子齊師入紀傳言怨不在大二十一年冬十月丙寅齊師宋師敗呉師于鴻口梁國睢陽縣東有鴻口亭初宋元公惡華向而攻之華登奔呉登費遂之子黨華向者明年以呉師救華氏齊烏枝鳴戍宋烏枝鳴齊之大夫廚人濮曰濮宋厨邑大夫軍志有之先人有奪人之心後人有待其衰盍及其勞且未定也伐諸若入而固則華氏衆矣悔無及也從之丙寅敗呉于鴻口獲其二帥公子苦雂偃州員二帥呉大夫華登帥其餘其餘師以敗宋師厨人濮以裳裹首荷以走曰得華登矣遂敗華氏于新里華氏所取邑十一月癸未公子城以晋師至城以前年奔晋今還救宋曹翰胡曹大夫㑹晋荀呉中行穆子齊苑何忌齊大夫衛公子朝前年春奔晋今還衛救宋丙戌與華氏戰于赭丘宋地鄭翩願為鸛其御願為鵞鄭翩華氏黨鸛鵞皆陳名子禄御公子城莊堇為右子禄向宜干犫御吕封人華豹張匄為右吕封人華豹華氏黨相遇城還華豹日城也城怒而反之怒其呼已反還戰將注豹則關矣注傳矢關引弓曰平公之靈尚輔相余平公公子城之父豹射出其間出子城子禄之間將注則又關矣曰不狎鄙狎更也抽矢豹止不射城射之殪豹死張匄抽殳而下殳長丈二在車邊射之折股扶伏而擊之折軫折城車軫又射之死匃死干犫請一矢求死城曰余言女於君欲活之對曰不死伍乘軍之大刑也同乘共伍當皆死干刑而從子君焉用之子速諸乃射之殪犫又死大敗華氏圍諸南里華亥搏膺而呼見華貙曰吾為欒氏矣晉欒盈還入作亂而死二十二年春王二月甲子齊北郭啓帥師伐莒啓齊大夫北郭佐之後莒子將戰苑羊牧之諫牧之莒大夫曰齊帥賤其求不多不如下之大國不可怒也弗聽敗齊師于壽餘莒地齊侯伐莒怒敗莒子行成司馬竈如莒涖盟竈齊大夫六月晉襲鼓初晉之取鼔也在十五年既獻而反鼔子焉獻于廟又叛于鮮虞叛晉屬鮮虞六月荀吳畧東陽畧行也東陽晉之山東邑使師偽糴者負甲息于昔陽之門外遂襲鼔滅之以鼔子䳒鞮歸使涉佗守之守鼓之地涉佗晉大夫二十三年七月吳人伐州來楚薳越帥師令尹以疾從戎故薳越攝其事及諸侯之師奔命救州來吳人禦諸鍾離子瑕卒楚師熸子瑕即令尹不起所疾也呉楚之間謂火滅為熸軍之重主䘮亡故其軍人無復氣勢呉公子光曰諸侯從於楚者衆而皆小國也畏楚而不獲已是以來吾聞之日作事威克其愛雖小必濟克勝也軍事尚威胡沈之君幼而狂狂無常陳大夫齧壯而頑頓與許蔡疾楚政楚令尹死其師熸帥賤多寵政令不一帥賤薳越非正卿也軍多寵人政令不一於越七國同役而不同心七國楚頓胡沈蔡陳許帥賤而不能整無大威命楚可敗也若分師先以犯胡沈與陳必先奔三國敗諸侯之師乃搖心矣諸侯乖亂楚必大奔請先者去備薄威示之以不整誘之後者敦陳整旅敦厚也吳子從之戊辰晦戰于雞父七月二十九日違兵忌晦戰擊楚所不意吳子以罪人三千先犯胡沈與陳囚徒不習戰以示不整三國争之吳為三軍以繫於後中軍從王從吳王光帥右掩餘帥左掩餘呉王夀夢子呉之罪人或奔或止三國亂呉師擊之三國敗獲胡沈之君及陳大夫舍胡沈之囚使奔許與蔡頓曰吾君死矣師譟而從之三國奔三國許蔡頓楚師大奔二十四年冬呉滅巢楚邑初楚子為舟師以略呉疆畧行也行呉界将侵之沈尹戍曰此行也楚必亡邑不撫民而勞之呉不動而速之速召也呉踵楚躡楚踵跡而疆埸無備邑能無亡乎越大夫胥犴勞王於豫章之汭汭水曲越公子倉歸王乗舟歸遺也倉及壽夢帥師從王壽夢越大夫王及圉陽而還圉陽楚地呉人踵楚而邉人不備遂滅巢及鍾離而還鍾離不書告敗畧沈尹戍曰亡郢之始於此在矣王壹動而亡二姓之帥二姓之帥守巢鍾離大夫㡬如是而不及郢詩曰誰生厲階至今為梗詩大雅厲惡階道梗病也其王之謂乎二十五年十二月庚辰齊侯取鄆公為季氏所逐齊取鄲以居公二十六年夏齊侯将納公使公子鉏帥師從公鉏齊大夫成大夫公孫朝謂平子曰有都以衛國也請我受師許之以成邑禦齊師請納質恐見疑弗許曰信女足矣告於齊師曰孟氏魯之敝室敝壊也用成已甚弗能忍也請息肩于齊公孫朝詐齊師言欲降使來取成齊師圍成成人伐齊師之飲馬于淄者曰将以厭衆以厭衆心不欲使知己降也淄水出㤗山梁父縣西北入汶魯成備而後告曰不勝衆告齊言衆不欲降己不能勝師及齊師戰于炊鼻季氏師距公非公命則不書炊鼻魯地齊子淵㨗從洩聲子聲子魯大夫射之中楯瓦瓦楯脊繇朐汰輈匕入者三寸入楯瓦也朐車軛輈車轅繇過也七矢鏃聲子射其馬斬鞅殪殪死也改駕人以為鬷戾也而助之人魯人也鬷戾叔孫氏司馬子車曰齊人也子車即淵㨗将擊子車子車射之殪其御曰又之又欲使射餘人子車曰衆可懼也而不可怒也子囊帶從野洩叱之囊帶齊大夫野洩即聲子洩曰軍無私怒報乃私也将亢子欲以公戰禦之不欲私報其叱又叱之子囊復叱之亦叱之野洩亦叱之言齊無戰心但相叱冉豎射陳武子中手冉䜿季氏臣失弓而罵武子罵以告平子曰有君子白晳鬒鬚眉甚口平子曰必子疆也無乃亢諸子疆武于字對曰謂之君子何敢亢之偽言不敢違季氏林雍羞為顔鳴右下皆魯人羞為右故下車戰苑何忌取其耳何忌齊大夫不欲殺雍但截其耳以辱之顔鳴去之其右見獲懼而去之苑子之御曰視下顧復欲使苑子擊其足苑子刜林雍㫁其足鑋而乗于他車以歸鑋一足行顔鳴三入齊師呼曰林雍乗言魯人皆致力於季氏不以私怨而相棄二十七年春呉子欲因楚䘮而伐之前年楚平王卒使公子掩餘公子燭庸帥師圍潛二子皆王僚母弟潜楚邑在廬江六縣西南楚莠尹然工尹麇帥師救濳二尹楚官然麇其名左司馬沈尹戍帥都君子與王馬之屬以濟師都君子在都邑之士有復除者王馬之屬王養馬官屬校人也濟益也與呉師遇于窮令尹子常以舟師及沙汭而還沙水名左尹郤宛工尹夀帥師至于潛呉師不能退三十年冬十二月呉滅徐初呉子使徐人執掩餘使鍾吾人執燭庸二十七年奔故二公子奔楚楚子大封而定其徙大封與土田定其所徙之居使監馬尹大心逆呉公子使居養二子奔楚楚使逆之于竟也養即所封之地莠尹然左司馬沈尹戍城之城養取於城父與胡田以與之胡田故胡子之地将以害呉也子西諌曰呉光新得國而親其民視民如子辛苦同之将用之也若好吳邉疆使柔服焉猶懼其至柔服謂不與呉搆怨吾又强其讐以重怒之無乃不可乎讐謂二公子呉周之胄裔也而棄在海濵不與姬通今而始大比於諸華光又甚文将自同于先王先王謂太王王季亦自西戎始比諸華不知天将以為虐乎使翦䘮呉國而封大異姓乎其抑亦以祚呉乎其終不逺矣言其行事可知不久我盍姑億吾鬼神億安也而寜吾族姓以待其歸善惡之歸將焉用自播揚播揚猶勞動也王弗聽呉子怒執鍾吾子遂伐徐防山以水之防壅山水以灌徐己卯滅徐徐子章禹㫁其髮㫁髮自刑示懼携其夫人以逆呉子呉子唁而送之使其邇臣從之遂奔楚邇近也楚沈尹戍帥師救徐弗及遂城夷使徐子處之夷城父也呉子問於伍員曰初而言伐楚在十二年余知其可也而恐其使余徃也又惡人之有余之功也今余将自有之矣伐楚何如對曰楚執政衆而乖莫適任患若為三師以肄焉肄猶勞也一師至彼必皆出彼出則歸彼歸則出楚必道敝罷敝於道亟肄以罷之亟數也多方以誤之既罷而後以三軍繼之必大克之闔廬從之楚於是乎始病定四年呉入楚三十一年秋呉人侵楚伐夷侵潛六皆楚邑楚沈尹戍帥師救濳呉師還楚師遷潛於南岡而還呉師圍弦左司馬戍右司馬稽帥師救弦及豫章左司馬沈尹戍呉師還始用子胥之謀也謀在前年三十二年夏呉伐越始用師於越也自此之前雖疆事小争未嘗用大兵史墨曰不及四十年越其有呉乎存亡之數不過三紀嵗星三周三十六歳故曰不及四十年哀二十二年越滅吳至此三十八歳越得歲而呉伐之必受其凶此年歳在星紀星紀呉越之分也歳星所在其國有福呉先用兵故反受其殃册府元龜卷二百四十九
