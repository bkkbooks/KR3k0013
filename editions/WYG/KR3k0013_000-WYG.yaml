body:
  text: 冊府元龜總目類書類帝王部一百八十一卷閏位部三十七卷僭偽部十六巻列國君部二十一巻儲宫部六巻宗室部三十八巻外戚部八部宰輔部三十二卷將帥部一百十七巻臺省部二十六卷邦計部二十九卷憲官部十一卷諌諍部二十七巻詞臣部四卷國史部九巻掌禮部三十四卷學校部十二卷刑法部十一巻卿監部六卷環衛部三巻銓選部十卷貢舉部十三卷奉使部十三巻内臣部六卷牧守部三十卷令長部七卷宫臣部八巻幕府部十五卷陪臣部二十卷總録部二百五卷外臣部四十五巻臣等謹案冊府元龜一千卷宋王欽若楊億等奉𠡠撰真宗景徳二年詔編修厯代君臣事迹以欽若提總同修者十五人至祥符六年書成賜名周必大文苑英華跋王明清揮麈録並稱太宗太平興國中修者悮也其書分帝王閏位僭偽列國君儲宫宗室外戚宰輔將帥臺省邦計憲官諫諍詞臣國史掌禮學校刑法卿監環衛銓選貢舉奉使内臣牧守令長宫臣幕府陪臣總録外臣共三十一部部有總序又子目一千一百四門門有小序皆撰自李維等六人而竄定於楊億其問義例多出真宗親定惟取六經子史不録小説於悖逆非禮之事亦多所刋削又欽若欲去魏書宋書島夷索虜之號而王旦謂舊文不可改故如杜預長厯推甲子多誤者亦皆以誤註其下而不追改裁斷極為精審洪邁容齋隨筆謂其時編修官上言凡臣僚自述及子孫追敘家世如鄴侯傳之類並不採取遺棄既多故亦不能暴白袁氏楓窻小牘亦謂開卷皆常目所見無罕覯異聞不為藝家所重是此書在宋世學者頗不滿之但典籍至繁勢不能遍為掇拾去誣存實未可槩以掛漏相繩况纂輯諸臣皆一時淹貫之士雖卷帙既富難盡免於牴牾而考訂明晰亦多可資覽古之助張耒明道雜志稱楊億修冊府元龜數卷成輒奏之每進本到真宗即降付陳彭年彭年博洽不可欺毫髮故謬誤處皆簽貼有小差誤必見至有數十簽億心頗自愧乃盛薦彭年文字請與同修其言雖不可盡信然亦足見當時校核之勤討論之宻務臻詳慎故能甄綜貫串使數千年事無不條理秩然也乾隆四十四年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀册府元龜原序臣嗣京聞宣尼得帝魁之書迄秦繆凡三千二百四十篇乃斷逺取近止留百二十篇以為萬世君臣之法又因端門之命使子夏等求周史記得百二十國之書乃芟辭取義止因魯史以申天王予奪之權是非大定得失燦然凛乎其不可易故後世司馬光作通鑑朱子作綱目皆始於周威烈之二十三年而不敢上越以避尚書春秋然其立㫖君規臣儆則根本託焉臣謂册府元龜實凖於是何也其該以君臣之道同也今按其書自初卷至三百八十卷必首叙帝王以明一統之尊繇是漸推之宫儲宗室旁及閏僭以終於外戚皆𨽻於君猶之天一耳大而日月星辰小而風雨露雷無一非天之所統邵子曰地以上皆天天道也君之道也自三百八十卷及末卷必首叙宰輔以明百官之長繇是漸推之䑓諫将帥下及守令以終於外夷皆屬之臣猶之地一耳近而五岳四瀆逺而三島十洲無一非地之所分邵子曰天以下皆地地道也臣之道也臣於是而憶馮衍之告鄧禹焉曰昔者先王學大道以觀於政夫為君而純乎道則上有以承天下有以化民為臣而明於道則進足以事君退足以修身故堯年十五而封為諸侯二十而入登帝位其自言曰吾存心於先古加志於窮民痛萬姓之罹罪憂衆生之不遂舜曰以學乃時而行此為良藥周公相成王朝讀書百篇夕見七十二士太公起朝歌端冕奉十六之銘今皇上出處嫓堯用人行政嫓舜而一時大臣又各以周公之徳尚父之才相期共效則休氣四塞榮光出河取天地之精以佐五榖洗兵革之氣以夀民人君臣立極相並納於道中猗歟盛哉則册府元龜當與尚書春秋史鑑並置座右何也其該以君臣之道同也崇禎壬午冬月試監察御史臣李嗣京謹撰册府元龜考據景徳册府元龜景徳二年九月丁卯命資政殿學士王欽若知制誥楊億修歴代君臣事迹欽若等奏請直祕閣錢惟演刁衎龍圖閣待制杜鎬戚綸直集賢院李維直史館王希逸陳彭年姜嶼陳越太子右賛善大夫宋貽序同編修初令維演等各撰篇目送欽若暨億参詳欽若等又自撰集上用欽若等所撰集定有未盡者奉㫖増之又令内臣劉承珪劉崇超典其事編修官供帳飲饌皆異常等俄又令祕書丞陳從易校理劉筠同編修官直舘查道太常博士王曉未成又増直集賢院夏竦軄方員外郎孫奭注撰音義三年四月丙子四年八月壬寅車駕再幸編修之所再閲門類楊億悉以條對編次未及倫理者改正之帝曰朕編此書蓋取著歴代君臣徳羙之事為將來取法至於開卷覽古亦頗資於學者皆命從官坐賜編修官器幣王欽若以南北史有索虜島夷之號欲改去王旦曰舊史文不可改趙安仁曰杜預註春秋以長歴推甲子多誤亦不敢改但註云日月必有誤乃詔欲改者注釋其下凡所録以經籍為先億又以羣書中如西京雜記明皇雜録之類皆繁碎不可與經史並行今竝不取止以國語戰國䇿管孟韓子淮南子晏子春秋吕氏春秋韓詩外傳與經史俱編歴代類書脩文殿御覽之類采摭銓擇凡三十一部部有總序千一百四門門有小序初撰篇序諸儒皆作帝以體例不一祥符元年二月丙午遂擇李維等六人撰記付楊億竄定五月甲申手劄詔凡悖惡之事及不足為訓者悉删去之日進草三卷帝親覽之摘其舛誤多出手書詰問或召對指示商畧三月丁卯詔或有増改事標記覆閲之是年十月丁未手劄令欽若等書名其増損悉書之凡八年而成六年八月十三日壬申欽若等以獻進表曰推明凡例分别部門皆仰稟於宸謨䖍奉遵於成憲刋除非當櫽括無憂每煩乙夜之覽鑒觀自清衷而裁定昔甘露石渠出於議奏開元麗正徒有史名矧皇覽博要之言玊鑑珠英之作但詞林之見采非治本之宜先洪惟上聖之能獨出百王之首崇政殿進呈凡千卷目録十卷音義十卷詔題曰册府元龜御製序序曰太宗皇帝始則編小説而成廣記纂百氏而著御覽集章句而製文苑聚方書而譔神醫次復刋廣疏於九經較闕疑於三史脩古學於篆籀總妙言於釋老洪猷丕顯能事畢陳朕道遵先志肇振斯文載命羣儒共司綴緝粤自正統至於閏位君臣善迹邦家羙政禮樂沿革法令寛猛官師議論多士名行靡不具載用存典刑凡勒成一千一百四門門有小序述其指歸分為三十一部部有總序言其經制凡一千卷祥符八年十一月乙丑欽若等上版本宴編脩官上作詩一章賜命屬和一本云景徳四年九月戊辰上謂輔臣曰所編君臣事迹蓋欲垂為典法異端小說咸所不取觀所著篇序援據經史頗盡體要而誡勸之理有所未盡也欽若等曰自纘集此書發凡起例類事分門皆上稟聖意授之羣官間有凝滯皆細陳論今䝉宣諭勤以懲勸爲本垂世之急務也十月癸亥上謂輔臣曰朕每因暇日閲君臣事迹草本遇事簡則從容省覽事多或至夜漏二皷乃終卷編脩官自王欽若陳彭年至劉筠十一人景徳二年奉𠡠編脩楊億至宋貽共七人天禧四年閏十二月癸丑賜輔臣各一部景祐四年二月甲子賜御史臺臣帝王部一百二十八門閏位七十八門僭偽三十七門列國君四十門儲宫十七門宗室四十二門外戚二十三門宰輔四十一門將帥一百六門臺省二十九門邦計二十九門憲官十五門諫諍六門詞臣八門國史十三門掌禮九門學校十五門刑法九門卿監十五門環衞九門銓選八門貢舉十門奉使十七門内臣十六門牧守四十二門令長二十一門宫臣十一門幕府十六門陪臣二十一門總録二百四十一門外臣三十四門已上出玉海晁氏曰皇朝景徳二年詔王欽若楊億脩君臣事迹唯取六經子史不録小説雜書至祥符六年書成上之凡三十一部有總序一千一百四門有小序同脩者十五人錢惟演杜鎬刁衎李維戚綸王希哲陳彭年姜嶼宋貽序陳越陳從易劉筠查道王曙夏竦初撰編序諸儒皆作帝以體制不一遂擇李維錢惟演陳彭年劉筠夏竦等付楊億竄定賜今名為序冠其首其音釋又命孫奭為之陳氏曰凡八年而書成總五十部部有總序一千一百四門門有小序賜名製序所采五經史之外惟取戰國䇿國語韓詩外傳吕氏春秋管晏韓子孟子淮南子及脩文殿御覽毎門具進上親覽摘其舛誤多出手書或召對指示商畧容齋洪氏隨筆曰真宗初命儒臣編脩君臣事迹後謂輔臣曰昨見宴享門中録唐中宗宴飲韋庻人等預㑹和詩與臣僚馬上口摘含桃事皆非禮也已令削之又曰所編事迹蓋欲垂為典法異端小說咸所不取可謂盡善而編脩官上言近代臣僚自述揚歴之事如李徳裕文武兩朝獻替記李石開成承詔録韓偓金鑾宻記之類又有子孫追述先徳叙家世如李繁鄴侯傳栁氏序訓魏公家傳之類或隠己之惡或攘人之善並多溢羙故匪信書并僣偽諸國各有著撰如偽呉録孟知祥實録之類自矜本國事或近誣其上諸書並欲不取餘有三十國春秋河雒記壺闗録之類多是正史已有秦記燕書之類出自魏邦商芸小說談藪之類俱是談諧小事河南志邠志平剡録之類多是故吏賔從述本府戎帥征伐之功傷於繁碎西京雜記明皇雜録事多語怪奉天録尤是虛詞盡議采取恐成蕪穢竝從之及書成賜名册府元龜首尾十年皆王欽若提總凡一千卷其所遺棄既多故亦不能暴白如資治通鑑則不然以唐朝一代言之叙王世充李宻事用河雒記魏鄭公諫爭用諫録李絳議奏用李司空論事睢陽事用張中丞傳淮西事用凉公平蔡録李泌事用鄴侯家傳李徳裕太原澤潞回鶻事用兩朝獻替記大中吐蕃尚婢婢等事用林恩後史補韓偓鳯翔謀畫用金鑾宻記平龎勛用彭門紀亂討裘甫用平剡録記畢師鐸吕用之事用廣陵妖亂志皆本末粲然然則雜史瑣說家傳豈可盡廢也已上出文獻通考欽定四庫全書卷册府元龜目錄一卷一帝王部一總序卷二帝王部二誕聖卷三帝王部三名諱卷四帝王部四運歴卷五帝王部五創業第一卷六帝王部六創業第二卷七帝王部七創業第三卷八帝王部八創業第四卷九帝王部九繼統第一卷十帝王部十繼統第二卷十一帝王部十一繼統第三卷十二帝王部十二中興告功卷十三帝王部十三都邑第一卷十四帝王部十四都邑第二卷十五帝王部十五年號卷十六帝王部十六尊號第一卷十七帝王部十七尊號第二卷十八帝王部十八帝德卷十九帝王部十九功業第一卷二十帝王部二十功業第二卷二十一帝王部二十一徴應卷二十二帝王部二十二符瑞第一卷二十三帝王部二十三符瑞第二卷二十四帝王部二十四符瑞第三卷二十五帝王部二十五符瑞第四卷二十六帝王部二十六感應神助卷二十七帝王部二十七孝感卷二十八帝王部二十八奉先第一卷二十九帝王部二十九奉先第二卷三十帝王部三十奉先第三卷三十一帝王部三十一奉先第四卷三十二上帝王部三十二崇祭祀第一卷三十二下帝王部三十二崇祭祀第二卷三十三帝王部三十三崇祭祀第三卷三十四帝王部三十四崇祭祀第四卷三十五帝王部三十五封禪第一卷三十六帝王部三十六封禪第二卷三十七帝王部三十七頌德卷三十八帝王部三十八尊親尊師尊乳保卷三十九帝王部三十九睦親卷四十帝王部四十文學好學卷四十一帝王部四十一寛恕卷四十二帝王部四十二仁慈卷四十三帝王部四十三度量多能卷四十四帝王部四十四竒表神武卷四十五帝王部四十五謀畧權畧卷四十