body:
  text: 册府元龜卷一百十九宋王欽若等撰帝王部選將傳曰君子聽皷鼙之聲則思將帥之臣蓋夫總中權之任貞出師之律上所注意人之司命故其為重也繇夏商而上靡得而詳周官司馬掌九伐之法以詰誅暴慢自漢以來或愼簡智勇委之兵柄乃有備物加禮而表其待遇分閫假鉞而申之委任方面付之經畧諸將稟其節度推擇之難斯可見矣或斷自宸志或薦於公府僉諧而登用推誠以付託曷嘗不奮庸而底績哉周宣王使大夫尹氏䇿命程伯休父於軍將行治兵之時使其士衆左右陳列而勑戒之使循彼淮上之旁省視徐國之土地叛逆者故召穆公作常武之詩以美之曰王謂尹氏命程伯休父左右陳行戒我師旅率彼淮浦省此徐土漢髙祖初為漢王王巴蜀時韓信數與蕭何語何竒之至南鄭諸將道亡者數十人信度何等已數言度計量也上不我用即亡何聞信亡不及以聞自追之人有言帝丞相何亡帝怒如失左右手居一二日何來謁帝且怒且喜罵何曰若亡何也若汝也何曰臣非敢亡追亡者耳帝曰所追者誰也曰韓信帝復罵曰諸將亡者以十數公無所追追信詐也何曰諸將易得至如信國士無雙為國家之竒也王必欲長王漢中無所事信無事用信必欲爭天下非信無可與計事者顧王策安決顧思念也王曰吾亦欲東耳安能鬱鬱久居此乎何曰王計必東能用信信即留不能用信信終亡耳王曰吾為公以為將何曰雖為將信不留王曰以為大將何曰幸甚於是王欲召信拜之何曰王素嫚無禮嫚與慢同今拜大將如召小兒此乃信所以去也王必欲拜之擇日齋戒設壇塲具禮乃可王許之諸將皆喜人人各自以為得大將至拜乃韓信也一軍皆驚又初攻下外黄西收軍於滎陽楚騎來衆王廼擇軍中可為騎將者皆推故秦騎士重泉人李必駱甲重泉縣名也地理志屬左馮翊習騎兵今為校尉可為騎將漢王欲拜之必甲曰臣故秦民恐軍不信臣臣願得大王左右善騎者𫝊之傅音附猶言隨從者嬰雖少然數力戰乃拜中謁者灌嬰為中大夫令李必駱甲為左右校尉將郎中騎兵擊楚騎於滎陽東大破之後漢光武初赤眉西入關更始使定國上公王匡襄邑王成丹抗威將軍劉均及諸將分據河東𢎞農以拒之赤眉衆大集王匡等莫能當光武籌赤眉必破長安欲乗釁并關中而方自事山東未知所寄以鄧禹沉深有大度故授以西討之畧乃拜為前將軍持節中分麾下精兵二萬人遣西入關令自選偏裨以下可與俱者於是以韓歆為將軍師李文李春程慮為祭酒馮愔為積弩將軍樊崇為驍騎將軍宗歆為車騎將軍鄭尋為建威將軍耿訢為赤眉將軍左右于為將師將軍建武元年帝以王霸曉兵愛士可獨任拜為偏將軍并將臧宫傅俊兵討周建蘇茂明年春帝使太中大夫持節拜霸為討虜將軍二年帝以赤眉延岑暴亂三輔郡縣大姓各擁兵衆大司徒鄧禹不能定乃遣馮異代禹討之帝送至河陽賜以乗輿七尺具劍勑異曰三輔遭王莽更始之亂重以赤眉延岑之酷元元塗炭無所依訴今之征伐非必畧地屠城要在平定安集之耳諸將非不健鬭然好擄掠卿本能御吏士念自修勑無為郡縣所苦異頓首受命四年拜馬成為揚武將軍督誅虜將軍劉隆振威將軍宋登射聲校尉王賞發㑹稽丹陽九江六安四郡兵撃李憲時帝幸夀春設壇塲祖禮遣之共工氏之子曰修好逺逰舟車所至足躋所逮靡不窮覽故祀以為祖神祖徂也明帝時鄧禹少子鴻好籌䇿永平中以為小侯引入與議邉事帝以為能拜將兵長史率五營士屯鴈門竇固為中郎將坐事廢于家明帝欲遵武帝故事擊匈奴通西域以固明習邊事拜為奉車都尉與耿忠率萬二千騎至天山撃呼衍王斬首千餘級桓帝時橋𤣥拜將作大匠鮮卑南匈奴及髙句驪嗣子伯固竝畔為冦鈔四府舉𤣥為度遼將軍假黄鉞馮緄為太常㑹長沙蠻冦益陽屯聚積乆至延熹五年衆轉盛而零陵蠻賊復反應之合二萬餘人攻燒城郭殺傷長吏又武陵蠻夷悉反冦掠江陵間荆州刺史劉度南郡太守李肅竝奔走荆南皆没於是拜緄為車騎將軍將兵十餘萬討之詔䇿緄曰蠻夷猾夏乆不討攝各焚都城蹈籍官人州郡將吏死職之臣相逐奔竄曽不反顧可愧言也將軍素有威猛是以擢授六師前代陳湯馮傅之徒以寡擊衆郅支夜郎樓蘭之戎頭懸都街衛霍北征功刻金石是皆將軍所究覽也今非將軍誰與修復前迹進赴之宜權時之䇿將軍主之出郊之事不復内御己命有司祖于國門詩不云乎進厥虎臣闞如虓虎鋪敦淮濆仍執醜虜將軍勉之時天下饑饉帑藏虗盡毎出征伐嘗減公卿奉禄假王侯租賦前後所遣將帥官輙䧟以折耗軍資徃徃抵罪緄性烈直不行賂賄懼為所中乃上疏曰埶得容姦伯夷可疑苟曰無猜盗跖可信故樂羊陳功文侯示以謗書願請中常侍一人監軍財費尚書朱穆奏緄以財自嫌失大臣之節有詔勿劾魏太祖時許禇遷武衛將軍都督中軍宿衛禁兵甚親近焉初禇所将為虎士者從征伐帝以為皆壮士也同日拜為将其後以功為将軍封侯者數十人都尉校尉百餘人皆劍客也文帝黄初中大将軍曹仁薨以蒋濟為東中郎将代領其兵詔曰卿兼資文武志節忼愾嘗有超越江湖吞吳㑹之志故復授将帥之任張既為雍州刺史鄒岐為凉州刺史凉州盧水胡伊健妓妾治元多等反河西大擾帝憂之曰非既莫能安凉州乃召鄒岐以既代之詔曰昔賈復請撃郾賊光武笑曰執金吾撃郾吾復何憂卿謀畧過人今則其以便宜從事勿復先請明帝太和末遼東叛帝欲征之而難其人中領軍楊暨舉殄夷將軍田豫應乃使豫以本官督青州諸軍假節徃討之髙貴鄉公正元二年八月蜀將姜維冦狄道詔以長水校尉鄧艾行安西將軍與征西將軍陳泰并力拒維復遣太尉司馬孚為後繼甘露二年七月詔曰今車駕駐項大將軍恭行天罰前臨淮浦昔相國大司馬征討皆與尚書俱行今宜如舊乃令散騎常侍裴秀給事黄門侍郎鍾㑹咸與大將軍俱行晉文帝時石苞為徐州刺史帝之敗於東闗也苞獨全軍而退帝指所持節謂苞曰恨不以此授卿以究大事乃遷苞為奮武將軍假節監青州諸軍事武帝時杜預為度支尚書時帝有滅吳之計而朝議多違唯預羊祜張華與帝意合及祜病舉預自代因以本官假節行平東將軍領征南軍師及祜卒拜鎮南大將軍都督荆州諸軍事給追鋒車第二駙馬武帝咸康元年四月石季龍冦歴陽癸丑帝觀兵於廣莫門分命諸軍遣將軍劉仕救歴陽平西將軍趙裔屯慈湖龍驤將軍路永戍牛渚建武將軍王允之戍蕪湖司空郗鍳使廣陵相陳光率衆衛京師簡文帝時殷浩為揚州刺史石季龍死胡中大亂朝廷欲遂蕩平闗河於是以浩為中軍將軍假節都督揚豫徐兖青五州軍事浩既受命以中原為己任上疏北征許雒將發墜馬時咸惡之既而以淮南太守陳逵兖州刺史蔡裔為前鋒安西將軍謝尚北中郎將荀羡為督統開江畛田千餘頃以為軍儲孝武帝時王恭為中書令時孝武將擢時望以為藩屏乃以恭為都督兖青冀幽并徐州晉陵諸軍事平北將軍兖青二州刺史假節鎮京口初都督以北為號者畧有不祥故桓冲王坦之刁彞之徒不受鎮北之號恭表讓軍號以超受為辭而實惡其名於是改號前將軍安帝元興初朝廷將伐桓𤣥以桓氏世在陜西以大將軍府司馬桓謙父冲有遺惠於荆楚懼人情向背乃用謙為持節都督荆益寧梁四州諸軍事西中郎將荆州刺史假節以安荆楚後魏道武時長孫肥為鎮逺將軍兖州刺史姚平之冦平陽帝將討之選諸將無如肥者乃徵還京師遣與毘陵王順等將六萬騎為先鋒太武時來太千為征北將軍鎮雲中帝以其壯勇數有戰功兼悉北境險阻乃以太千巡撫六鎮以防蠕蠕經畧布置甚得事宜神䴥三年七月聞宋將來冦遂詔大鴻臚卿杜超假節都督冀定相三州諸軍事行征南大將軍太宰進爵為王鎮鄴為諸軍節度司馬文思為廷尉卿宋遣將裴方明撃楊難當於仇池帝以文思為假節征南大將軍督雒豫諸軍南趨㐮陽邀其歸路文成時源懐拜殿中尚書加侍中參都曹事又督諸軍征蠕蠕六道大將咸受節度孝文太和中堯暄為南部尚書時梁遣其將陳顯達冦邊以暄為使持節假中䕶軍將軍都督南征諸軍事平陽公軍次許昌㑹陳顯達遁走暄乃班師太和十七年孝文南討詔趙郡王幹司空穆亮為西道都將時幹年少未渉軍旅帝乃除薛裔假節平南將軍為幹副軍宣武時邢巒為安西將軍徵授度支尚書時梁遣兵侵軼徐兖縁邊鎮戍相繼陷殁朝廷憂之乃以巒為使持節都督東討諸軍事安東將軍尚書如故帝勞遣巒於東堂曰蕭衍冦邊旬朔滋甚諸軍舛互規致連戍陷殁宋魯之民尤罹湯炭誠知將軍旋京未乆膝下難違然東南之寄非將軍莫可將軍其勉建殊績以稱朕懐自古忠臣亦非無孝也巒對曰賊雖送死連城犬羊衆盛然逆順理殊滅當無逺况臣仗陛下之神筭奉律以摧之平殄之期可指辰而待願陛下勿以東南為慮宣武曰漢祖有云金吾撃郾吾無憂矣今將軍董戎朕何慮哉蕭寶寅以梁武克建業殺其兄弟避害來奔後永平四年盧㫤尅梁朐山戍以瑯邪戍主傅文驥守之梁遣師攻文驥盧昶督衆軍救之宣寶寅為使持節假安南將軍别將長驅徃赴受盧昶節度賜帛三百疋宣武於東堂餞之詔曰蕭衍送死連兵再離寒暑卿忠規内挺孝誠外亮必欲鞭尸吳墓戮衍江隂故授卿以摠統之任仗卿以克㨗之規宜其勉歟寶寅對曰讎恥未復枕戈俟旦雖無申包之志敢忘伍胥之心今仰仗神謀俯厲將帥誓必拉彼奸勍以清王畧聖澤下臨不勝悲荷因泣涕横流哽咽良乆於後盧昶軍敗唯寶寅全師而歸李平為度支尚書領御史中尉冀州刺史京兆王愉反於信都以平為使持節都督北討諸軍事鎮北將軍行冀州事以討之宣武臨式乾殿勞遣平曰愉朕之元弟居不疑之地豺狼之心不意而發欲上傾社稷下殘萬民大義滅親夫豈獲己周公行之於古朕亦當行之於今今委卿以專征之任必令應期摧殄務盡經畧之規勿虧推轂之寄也何圖今日言及斯事因欷歔流涕平對曰臣愉天迷其心搆此梟悖陛下不以臣不武委以摠督之任今大宥既敷便應有征無戰脱守迷不悟者當仰慿天威抑厲將士譬猶太陽之消微露巨海之蕩熒燭天時人事咸在昭然如其稽顙軍門則送之大理若不悛待戮則鳴皷釁鍾非陛下之事又梁遣其左遊撃將軍趙祖悦偷據西硤石衆至數萬以逼壽春鎮南崔亮攻之未尅又與李崇乖異詔平以本官使持節鎮軍大將軍兼尚書右僕射為行臺節度諸軍東西州將一以稟之如有乖異以軍法從事楊大眼為中山内史時髙肇征蜀宣武慮梁侵軼徐揚乃徵大眼為太尉長史持節假平南將軍東征别將𨽻都督元遥遏禦淮淝孝明時李崇為征南將軍揚州刺史詔曰應敵制變筭非一途救左撃右疾雷均勢今朐山蟻冦久結未殄賊衍狡詐或生詭刼宜遣銳兵備其不意崇可都督淮南諸軍事坐敦威重遥運聲筭次為尚書令加侍中後北鎮破落汗㧞陵反叛所在響應征北將軍臨淮王或大敗於五原安北將軍李叔仁尋敗於白道賊衆日甚詔引丞相令僕尚書侍郎黄門於顯陽殿詔曰朕比以鎮人搆逆登遣都督臨淮王尅時除翦軍留五原前鋒失利二將殞命兵士挫衂又武川乖防復陷凶手恐賊勢浸淫冦連恒朔金陵在彼夙夜憂惶諸人宜陳良䇿以副朕懷吏部尚書元修義曰強冦充斥事須捍討臣謂須得重貴鎮壓恒朔摠彼師旅備衛金陵詔曰去嵗阿那環叛逆遣李崇令北征崇遂長驅塞北返節榆闗此亦一時之盛乃上表求改鎮為州罷削舊貫朕于時以舊典難革不許其請尋李崇此表開鎮人非冀之心致有今日之事但既徃難追為復畧論此耳朕以李崇國戚望重器識英斷意欲還遣崇行摠督三軍揚旗恒朔除彼羣盗諸人謂可爾以不僕射蕭寶寅等曰陛下以舊都在北憂慮金陵臣等實懷悚息李崇徳位隆重社稷之臣陛下此遣實合羣望崇啓曰臣實無用猥蒙殊寵位妨賢路遂充北伐徒勞將士無勲而還慙負聖朝於今莫己臣以六鎮幽垂與賊接對鳴柝聲弦弗離旬朔州名差重於鎮謂實可悦彼心使聲教日揚微塵去塞豈敢導此凶源開生賊意臣之愆負死有餘責屬陛下慈寛賜全腰領今更遣臣北行正是報恩改過所不敢辭但臣年七十自恨老疾不堪敵塲更願英賢收功盛日於是詔崇以本官加使持節開府北討大都督撫軍將軍崔暹鎮國將軍廣陵王淵皆受崇節度髙樹生太尉謐之子尚氣俠不仕孝昌初北州大亂詔發衆軍廣開募賞以樹生有威畧授以大都督令率勁勇鎮捍舊藩周武帝保定四年十月詔大將軍大冡宰晉國公䕶率軍伐齊帝於太廟庭授以斧鉞於是䕶總大軍出潼闗大將軍權景宣率山南諸軍出豫州少師楊檦出軟關建徳二年六月大選諸軍將朂以戎事梁士彦以軍功拜儀同三司武帝將有事東夏聞其勇決自扶風郡守除九曲鎮將進位上開府封建威縣公齊人甚憚焉隋髙祖時相州王謙搆逆帝將撃之問將於髙熲答曰于義素有經畧可為元帥帝初然之劉昉進曰梁睿位望素重不可居義之下帝乃止於是以睿為元帥義為行軍總管周揺為豫州總管開皇初突厥冦邊燕薊多被其患前總管李崇為虜所殺帝思所以鎮之臨朝曰無以加周揺者拜為幽州總管六州五十鎮諸軍事揺修鄣塞謹斥堠邊民以安源雄為朔州總管深為北人所憚伐陳之役髙祖下册書曰於戲唯爾上大將軍朔方公雄識悟明允風神果毅徃收徐方時逢冦逆建旟馬邑安撫北藩嘉謀絶外境之虞挺劍息韋韝之望沙漠以北俱荷威恩呂梁之間罔不懐惠但江淮蕞爾有陳僭逆今將董率戎旅清彼東南是用命爾為行軍總管徃欽哉於是從秦王俊出信州道及陳平以功進位上柱國賜子崇爵端氏縣伯褒為安化縣伯賜物五千段復鎮朔州韓洪為廉州刺史時突厥屢為邊患朝廷以洪驍勇檢校朔州總管事尋拜代州總管賀若弼周末為壽州刺史及髙祖受禪隂有併江南之志訪可任者髙熲曰朝臣之内文武才幹無出賀若弼者帝曰公得之矣乃拜弼為吳郡總管委以平陳之事弼忻然以為己任李衍為介州刺史朝廷將有事江南詔衍行襄州道營戰船及大衆伐陳授行軍總管從秦王俊出襄陽道杜彥為洪州總管時雲州總管賀婁子幹卒帝悼惜者久之因謂侍臣曰榆林國之重鎮安得子幹之軰乎後數日帝曰吾思可以鎮榆林者莫過杜彥於是徵拜雲州總管十八年遼東之役以行軍總管從漢王至營州帝以彥曉習軍旅令總管五十營事及還拜朔州總管煬帝大業十年齊郡賊盗孟譲冦掠諸郡王世充大破之帝以世充有將帥才畧復遣領兵討諸小盗所向盡平唐髙祖武徳六年八月東南道行臺僕射輔公祐據丹陽反僣稱宋王遣趙郡王孝恭及嶺南道大使永康縣公李靖討之太宗貞觀三年十一月以并州都督李世勣為通漢道行軍總管兵部尚書李靖為定㐮道行軍總管以擊突厥八年十二月命特進李靖兵部尚書侯君集刑部尚書任城王道宗凉州都督李大亮等為大總管各帥師分道以討吐谷渾十三年十二月以吏部尚書侯君集為交河道行軍大總管帥師伐髙昌十八年十一月命太子詹事英國公李勣為遼東道行軍總管出柳城禮部尚書江夏郡王道宗副之刑部尚書鄖國公張亮為平壌道行軍總管以舟師出萊州左領軍常何瀘州都督左難當副之以伐髙麗髙宗永徽二年七月賀魯冦陷金嶺城蒲類縣遣武候大將軍梁建方右驍衛大將軍契苾何力為弓月道總管以討之六年五月命左屯衛太將軍瀘國公程知節等五將軍帥師出蔥山道以討賀魯顯慶二年正月命右屯衛將軍蘇定方等四將軍為伊麗道將軍帥師以討賀魯四年十一月以邢國公蘇定方為神丘道總管劉伯英為昆夷道總管以伐百濟龍朔元年五月命左驍衛大將軍凉國公契苾何力為遼東道大總管左武衛大將軍邢國公蘇定方為平壌道大總管兵部尚書同中書門下三品樂安縣公任雅相為􅀈江道大總管以伐髙麗乾封元年十月命司空英國公李勣為遼東道行軍大總管以伐髙麗三年正月以右相劉仁軌為遼東道總管總章二年六月遣右衛大將軍凉國公契苾何力為駕海道大總管三年四月以右威衛大將軍薛仁貴為邏娑道行軍大總管右衛員外大將軍阿史那道真左衛將軍郭待封為副領兵五萬以撃吐蕃咸亨五年二月遣太子左庶子同中書門下三品劉仁軌為雞林道大總管以討新羅仍令衛尉卿李弼右領軍大將軍李謹行副之上元三年三月吐蕃入冦鄯廓河芳四州命雒州牧周王顯為洮州道行軍元帥領工部尚書劉審禮等十二總管并州都督相王輪為凉州道行軍元帥領左衛將軍契苾何力等軍以討吐蕃二王竟不行永隆二年正月遣禮部尚書裴行儉為定㐮道大總管帥師討突厥永淳二年十一月命將軍程務挺為單于道安撫大使以招討總管討山賊元珍骨篤禄賀魯等中宗神龍三年五月以屯衛大將軍兼檢校雒州長史張仁亶為朔方道大總管以備突厥𤣥宗開元二年四月庚午勑曰大漠南守長河北介地險可慿天兵有警夏潦方壮冬氷未合料敵安邊存乎備預靈武道行軍副大總管右領軍衛大將軍張知運神氣雄傑兵謀果斷持軍出塞可使單于䘮膽抗敵臨邊足令勇夫增氣宜令先持節赴軍簡行處置并縁邊州軍兵馬等亦委知運量事均融乃與幽州刺史攝御史中丞强修計議便宜支備事訖聼蹔入京奏事姚崇職兼樞劇未要即行副既掌同一依軍令三年夏四月庚申帝以􅂒邏禄等部落新歸恐邊境有虞思建將帥乃下詔曰命彼太師聞乎周頌安得猛士欽若漢圖朕懐柔百蠻茂育萬姓綏之則教人息戰靖之則去兵不用故獯戎是逐前史嘗載邊郵為亂先王必征所以罰其浸驕徵其即叙朔方軍壘接太原之備胡右地城池控張掖之遮敵是用誡于師旅揚我兵威誰其任之肅此將命右羽林軍大將軍上柱國河東郡開國公薛訥左衛大將軍上柱國太原郡開國公郭䖍瓘等既明且哲緯武經文登壇有大將之容辭第有忠臣之志或斬其愛子掃塵而清北風或俘其名王却地而盡西海故可以率如羆之勇當非熊之寄然則井陘之間昔不成列河源之路舊多鑿空設險而張逺謀總戎而獻長策俾爾之效在於斯舉固當殱其種落告成於王豈為完我甲兵逸而待冦而已訥可持節充梁州鎮軍大總管赤水建康河源及縁邊州軍並受節度仍與郭䖍瓘張知運杜賔客相知共為表裏夙設方畧䖍瓘可持節充朔州鎮大總管和戎大武及并州以北縁邊州軍竝受節度仍與張知運甄道一相知共為掎角勿失權宜訥便特於凉州住凉州都督楊執一為副大總管䖍瓘於并州住并州長史王晙為副大總管宜排比兵馬精加教練幽州有事即令䖍瓘將和戎兵馬從嘗州土門與甄道一計㑹共討兇逆其同華等兵及精騎徤児并鞍馬等依三月十五日制仍令逺探量事續遣十月壬戌制曰古之命將帥訓甲兵所以宣威武而懲不庭也自非欒郤之裔孫吳之才何以摠中軍而絶大漠矣右羽林軍大將軍上柱國河東郡開國公凉州鎮軍大總管薛訥家代名將國朝元臣智湧泉源氣横雲電廟堂之上則寛而有謀旗皷之間則勇而無撓頃者單于地隔驕子夭亡衆已離心魑魅懸首今則須行弔伐用滅逋逃宜慿推轂之權將待覆巢之勢可持節充朔方道行軍大總管太僕卿呂延祚謀慮經逺才明沉斷右威衛將軍兼靈州刺史杜賔客三軍之雄萬人之敵以之入幕孰不師臧曽謂岀車肅兹王命竝宜充副總管蕭嵩為兵部侍郎時凉州刺史河南節度王君㚟家在𤓰州為吐蕃大將悉諾邏恭禄所攻河隴震駭俄而君㚟又為回紇諸部所殺朝廷議以大臣岀鎮以静邊隅乃拜嵩為兵部尚書河西節度判凉州事嵩乃奏裴寛郭虗巳牛仙客為判官左金吾衛員外將軍張守珪為𤓰州刺史邊境獲安軍師屢㨗帝大悦制以嵩同中書門下三品恩顧莫二天寶十四年十一月范陽節度使安禄山稱兵向闕詔以朔方節度副使兼靈武郡太守御史大夫安思順為戸部尚書弟元貞為太僕卿朔方右廂兵馬使九原郡太守兼西受降城使郭子儀為衛尉卿員外郎置同正員兼靈武郡太守攝御史中丞充朔方節度闗内度支副大使知節度事十五載勑子儀圍雲中收復河朔以朔方節度副使單于副都䕶李光弼為雲中太守攝御史大夫充河東節度副大使知節度事委以東討代宗實録載天寶末安禄山反𤣥宗注意武將光弼子儀皆蒙召見于内殿竝稱㫖特拜光弼代禄山為范陽節度使委以東計肅宗上元二年二月李光弼兵敗於邙山河陽太守魚朝恩退保陜州三年二月河中軍亂殺其帥李國貞時太原節度使鄧景山亦為部下所殺恐其合從連賊朝廷憂之後軰帥臣未能彈壓勢不獲已遂用郭子儀為朔方河中北庭潞儀澤沁等州節度行營行興平定國副元帥充本管觀察處置使進封汾陽王出鎮綘州三月丙申詔曰時屬艱難用勤師旅元帥之任必藉廟謀苟非人傑孰允斯寄司徒兼中書令朔方節度副大使子儀風雲有感星象降生秉文武之姿懐經濟之器自兇狂搆禍區宇未寜藴忠貞以立身資義勇而成務加其識度𢎞逺謀畧冲深張飛乃萬人之敵郄縠是三軍之帥故能掃清強冦收復二京建茲大勲成我王業雖少康嗣位夏靡贊其功光武中興鄧禹集其事以今觀古未足多之但以氛祲未清軍戎是急爰求碩徳伏以師貞宜承重委克濟多難可充東京畿及山南東道并河南諸道元帥仍權知東京留守五月丙戌詔曰元帥之任實屬於師貞左軍之選諒資於邦傑自非道申啓沃學貫韜鈐則何以翊分閫而專征膺鑿門而受律求諸將相允得其人司空兼侍中薊國公光弼器識𢎞逺志懷沉毅藴孫吳之畧有文武之才往屬艱難備形忠勇叶風雲而經始保宗社于阽危繇是岀備長城入扶大厦茂功懸於日月嘉績被於巖廊屬殘冦猶虞總戎有命用擇惟賢之佐式𢎞建親之典必能緝寜邦國叶贊天人誓餘丹浦之師勦彼綠林之盗載申朝奬爰藉舊動宜副岀車之命仍踐分麾之寵仍與天下兵馬元帥趙王係為副知節度行營事來瑱為潁川郡太守乾元中史思明又陷東京詔瑱為陜州刺史充陜虢節度使鎮陜州俾遏東冦無何襄州鎮兵擾亂轉瑱為襄州刺史充山南東道節度觀察等使代宗寶應元年七月辛卯詔曰工部尚書兼御史大夫隴右節度觀察等使大寜郡王僕固懐恩經武大才濟時良具今以冦窘河雒思用討除宜輟務於西陲俾廓清於東夏可充朔方行營節度使本官封如故時將收河雒以懐恩宿將勇而有謀乃委以東討廣徳元年冬吐蕃冦京師乗輿幸陜州以右羽林大將軍衛伯玉有幹畧可當重寄乃拜荆南節度觀察等使二年正月丁巳詔太子賔客薛景仙為南山五溪谷防禦使時蕃冦初潰兇徒盗聚山谷或至數百人晝伏夜動攻害閭里人不甚寧景仙素以勇猛知名及是行也老幼咸悅徳宗建中四年七月以神䇿大將軍尚可孤兼御史大夫充荆襄應援淮西使興元元年四月帝在梁州臨軒備禮授副元帥渾瑊節鉞中書令宣制曰冦賊干紀授爾節鉞以戡多難往欽哉瑊跪曰將相之重悉以寄臣誓當畢力以揚陛下之休拜受而退八月癸卯加神䇿軍京畿衛渭南渭北鄜坊節度及兵馬副元帥司徒兼中書令合川郡王食實封一千五百戸李晟兼鳯翔尹充隴右節度度支營田觀察使仍充管内諸軍及涇原四鎮北庭行營兵馬副元帥改封西平郡王加河東保寧軍節度觀察使太原尹北都留守檢校司徒平章事北平郡王馬燧奉城軍及晉慈隰節度竝管内諸軍行營兵馬副元帥以靈鹽豐夏節度使邠寧振武奉天永平等軍馬副元帥侍中兼靈州大都督樓煩郡王食實封一千八百戸渾瑊為河中尹河中綘州節度觀察等使仍充河中同綘陜虢節度及管内諸軍行營兵馬副元帥改封咸寧郡王貞元初樊澤為襄陽節度使三年代張伯儀為荆南節度觀察等使江陵尹兼御史大夫三嵗加檢校禮部尚書㑹襄州節度曹王臯卒於鎮軍中剽掠擾亂以澤威惠素著於襄漢復代曹王臯為襄州刺史山南東道節度使劉昌初為宣武軍節度使劉𤣥佐兵馬使貞元三年𤣥佐朝京師帝因以宣武士衆八千人委昌北岀五原軍中有退却沮事者昌繼斬三百人遂行尋以本官授京西行營節度使嵗餘授涇州刺史充四鎮北庭行營兼涇原節度度支營田等使李自良為河東軍都將徳宗欲以自良代馬燧為節度使自良以事燧乆不欲代為軍帥帝以河東密邇突厥難於擇帥翌日自良謝帝謂之曰卿於馬燧存軍中事分誠為得體然北門之寄無易於卿即日拜檢校工部尚書兼御史大夫太原尹北都留守河東節度度支營田觀察等使十一年河東節度李自良卒以行軍司馬兼太原少尹御史大夫李説知府事為河東節度度支營田觀察留後北都副留守初自良得疾凡六日卒匿䘮至明日乃揚言病丙戌乃告䘮先是都虞候張瑶久在軍素得衆心嘗請告還葬自良未許至是李說與監軍王定逺謀乃給瑶假以大將毛朝陽代瑶戊子遣以聞先是中使第五國珍奉使靈朔廻至太原遇自良病困遲留比知自良死乃馳赴京師先李說使至帝因命國珍齎授誥命往太原兼勑書三十餘封賜其大將及管内刺史焉十五年蔡州吳少誠悖逆詔宣武等十節度討之十二月王師大潰於小溵河時軍既烏合且無統帥諸營兵馬無多少各有監軍數十人專掌兵制進退討襲互相規利故未甚與賊交鋒而自潰衂車與戈甲資糧屝屨竝為賊所有繇是議招討使之選十六年二月以左神䇿軍行營塩夏綏銀州節度觀察押蕃落使韓全義為蔡州行營招討處置使應北路行營諸軍將士竝取全義指麾陳許節度度支營田觀察使上官恱充副使李景畧貞元中為河東節度行營司馬嵗餘風言回紇將南下隂山豐州宜得其人帝素知景畧居邊練事時方軫慮中官竇文塲在旁復言景畧堪任於是以景畧為豐州刺史天徳軍西受降城都防禦使髙固建中末為邠寧節度渾瑊禆將李懐光既叛使留後張昕取將士萬餘人以資援河中固時在軍中斬昕以狥授前軍兵馬使貞元十七年節度使楊朝晟卒軍中請固為帥徳宗念固前功因而授之累官至檢校右僕射册府元龜卷一百十九
