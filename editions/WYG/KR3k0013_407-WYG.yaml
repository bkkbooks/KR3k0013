body:
  text: 冊府元龜卷四百七宋王欽若等撰將帥部諌諍古者百工庶士有獻藝傳言之典瞽史矇䏂有賦誦書箴之訓况乎處帥臣之重當注意之厚義均乎休戚任兼乎藩輔者邪繇漢以來本兵柄者或内侍交㦸或外臨邦翰以至奉辭伐罪􅄣衆啟行而能奮發忠悃乃心王室援述利病箴諷遺闕乗間伏奏謇諤而無隱奉章論事劘切以盡規用能感悟時主彌綸政務救其失而反之正逆乎志而歸於道自非秉節純亮立誠眀允篤股肱同體之義礪王臣匪躬之操亦疇能及是哉漢樊噲從沛公入闗至咸陽沛公入秦宫室帷帳狗馬重寳婦女以千數意欲留居之樊噲諌沛公不聼張良曰忠言逆耳利於行毒藥苦口利於病願沛公聼樊噲言沛公乃還軍覇上髙帝十一年黥布反時髙帝嘗病惡見人卧禁中詔户者無得入羣臣羣臣絳灌等莫敢入十餘日噲乃排闥直入闥宫中小門也一曰門屏也音土合反大臣隨之帝獨枕一宦者卧噲等見帝流涕曰始陛下與臣等起豐沛定天下何其壮也今天下已定又何憊也憊力極也音滿拜反且陛下病甚大臣震恐不見臣等計事顧獨與一宦者絶乎且陛下獨不見趙髙之事乎髙帝笑而起趙充國為後將軍宣帝時車騎將軍張安世始嘗不快帝所為行不可帝意帝欲誅之充國以為安世本持槖簮筆事孝武帝數十年見謂忠謹宜全度之安世因是得免辛慶忌為左將軍成帝時故槐里令朱雲上書求見願賜尚方斬馬劍斷佞臣一人頭以厲其餘帝曰誰也對曰安昌侯張禹帝大怒曰小臣廷辱師傅罪死不赦御史將雲去慶忌免冠觧印綬叩頭殿下曰此臣素著狂直於世使其言是不可誅其言非固當容之臣敢以死争叩頭流血帝意觧然後得免後漢史弼為北軍中候桓帝弟渤海王悝素行險辟僣傲多不法弼懼其驕悖為亂乃上封事曰臣聞帝王之於親戚愛雖隆必示之以威體雖貴必禁之以度如是和睦之道興骨肉之恩遂昔周襄王恣甘昭公孝景皇帝驕梁孝王而二弟階寵終於悖慢卒致周有播蕩之禍漢有袁盎之變切聞渤海王悝憑至親之屬恃偏私之愛失奉上之節有僣慢之心外聚剽輕不逞之徒内荒酒樂出入無常所與羣居皆有口無行或家之棄子或朝之斥臣必有羊勝伍被之變州司不敢彈糾傅相不能匡輔陛下隆於友于不忍遏絶恐遂滋蔓為害彌大乞露臣奏宣示百寮使臣得於清朝眀言其失然後詔公卿平處其法法决罪定乃下不忍之詔臣下固執然後少有所許如是則聖朝無傷親之譏渤海有享國之慶不然懼大獄將興使者相望於路矣臣職典禁兵備禦非常而妄知藩國干犯至戚罪不容誅不勝憤懣謹冐死以聞帝以至親不忍下其事後悝竟坐逆謀貶為癭陶王陳龜為京兆尹桓帝時羌胡冦邊殺長吏驅略百姓帝以龜世諳邊俗拜為度遼將軍龜臨行上疏曰臣龜蒙恩累世馳騁邊垂雖展鷹犬之用頓斃胡虜之庭魂骸不反薦享狐狸猶無以塞厚責答萬分也至臣頑駑器無鈆刀一割之用過受國恩榮秩兼優生年死日永懼不報臣聞三辰不軌擢士為相蠻夷不恭㧞卒為將臣無文武之才而沗鷹揚之任上慙聖眀下懼素餐雖歿軀體無所云補今西州邊鄙土地塉埆埆音覺又音確謂薄土也鞍馬為居射獵為業男寡耕稼之利女乏機杼之饒守塞候望懸命鋒鏑聞急長驅去不圖反自頃年以來匃奴數攻營郡謂郡有屯兵者即䕶羌校尉屯金城烏桓校尉屯上谷之類殘殺長吏侮略良細戰夫身膏沙漠居人首繫馬鞍或舉國掩户盡種灰滅孤兒寡婦號哭空城埜無青草室如懸磬雖含生氣實同枯朽往嵗并州水雨灾螟互生稼穡荒耗租更空􅇅更謂卒更錢也老者慮不終年少壯懼於困戹陛下以百姓為子品庶以陛下為父焉可不日昃勞神垂撫循之恩㢤唐堯親捨其子以禪虞舜者是欲民遭聖君不令遇惡主也故古公杖䇿其民五倍古公亶父是為太王為百姓所附狄人攻之事之以皮幣玉帛不能免焉太王遂枤策而去踰梁山止於岐山之陽邑於周地邠人從者如歸市一年成邑二年成都三年五倍其初文王西伯天下歸之西伯至仁百姓襁負而至豈復輿金輦寳以為民恵乎近孝文皇帝感一女子之言除肉刑之法女子則太倉令淳于公之女緹縈也體德行仁為漢賢主陛下繼中興之統承光武之業臨朝聽政而未留聖意且牧守不良或出中官懼逆上㫖取過目前呼嗟之聲招致灾害胡虜凶悍因衰縁隙而令倉府單于豺狼之口功業無銖两之効皆繇將帥不忠聚姦所致前凉州刺史祝良初除到州多所糾罰太守令長貶黜將半政未踰時功効卓然實應賞異以勸功能改任牧守去斥姦殘又宜更選匃奴烏桓䕶羌中即將校尉簡練文武授之法令除并凉二州今年租更寛赦罪𨽻埽除更始則善吏知奉公之祐惡者覺營私之禍胡馬不窺長城塞下無候望之患矣帝覺悟乃更選幽并刺史自營郡太守都尉以下多所革易下詔為陳將軍除并凉一年租賦以賜吏民傅爕為䕶軍司馬與左中即將皇甫嵩俱討張角爕素疾中官既行因上疏曰臣聞天下之禍不由於外皆興於内是故虞舜升朝先除四凶然後用十六相眀惡人不去則善人無繇進也今張角起於趙魏黃巾亂於六州此皆釁發蕭墻而禍延四海者也臣受戎任奉辭伐罪始到潁川戰無不克黃巾雖盛不足為廟堂憂也臣之所懼在於治水不自其源末流彌増其廣耳陛下仁德寛容多所不忍故閹豎弄權忠臣不進誠使張角梟夷黃巾變服臣之所憂甫益深耳甫始也何者夫邪正之人不宜共國亦猶氷炭不可同器彼知正人之功顯而危亡之兆見皆將巧辭飾說共長虚僞夫孝子疑於屢至市虎成於三夫若不詳察真僞忠臣將復有杜郵之戮矣陛下宜思虞舜四罪之舉速行讒佞放殛之誅殛亦誅也則善人思進姦凶自息臣聞忠臣之事君猶孝子之事父也子之事父焉得不盡其情使臣身備斧鉞之戮陛下少用其言國之福也書奏宦者趙忠見而忿惡及破張角爕功多當封忠訴譛之靈帝猶識爕言識音志記也得不加罪竟亦不封魏張遼為中堅將軍太祖將征桞城遼諌曰夫許天下之㑹也今天子在許公逺北征若劉表遣劉備襲許據之以號令四方公之勢去矣太祖䇿表必不能任備遂行也蜀趙雲為翊軍將軍孫權襲荆州先主怒欲討權雲諫曰國賊是曹操非孫權也且先滅魏則吳自服操身雖斃子丕簒盗當因衆心早圖闗中居河渭上流以討凶逆闗東義士必裹糧䇿馬以迎王師不應置魏先與吳戰兵勢一交不得卒觧也先主不聽遂東征留雲督江州先主失利於秭歸雲進兵至永安吳軍已退吳張昭為軍師大帝毎田獵常乗馬射虎虎常突前攀持馬鞍昭變色而前曰何有當爾夫為人君者謂能駕御英雄驅使羣賢豈謂馳逐於原埜較勇於猛獸者乎如有一旦之患奈天下笑何帝謝昭曰年少慮事不逺以此慙君然猶不能已乃作射虎車為方目間不置蓋一人為御自於中射之時有逸羣之獸輙復犯車而帝毎手擊以為樂昭雖諌諍常笑而不答吕蒙為䕶軍大帝將欲北取徐州以廣其地蒙諌曰不可今曹操逺在河北新破二袁撫集幽兾未暇東顧今徐州將守惡足言也徃必克之然地勢陸通四靣受敵今日得之眀日還失舉全吳之衆未足守也不如取南郡西據荆州則利盡長江此上流之勢於國之便十徐州也則重闗西門國之固也帝甚然之興師遂擒闗侯而平荆州駱統為建忠即將時徵役繁數重以疫癘民户損耗統上疏曰臣聞君國者以據封疆為強富制威福為尊貴曜德義為榮顯永世嗣為豊􅍈然財湏民生彊賴民力威恃民勢福繇民植德俟民茂義以民行六者既備然後應天受祚保族宜邦書曰衆非后無能胥以寕后非衆無以辟四方推是言之則民以君安君以民濟不易之道也今強敵未殄海内未乂三軍有無已之役江境有不釋之備徵賦調數繇來積紀加以殃疫死䘮之灾郡縣荒虗田疇蕪曠聴聞屬城民户浸寡又多殘老少有丁夫聞此之日心若焚燎思尋所繇小民無知既有安土重遷之性且又前後出為兵者生則困苦無有温飽死則委棄骸骨不反是以尤用戀本畏逺同之於死毎有徵發羸謹居家重累者先見輸送小有財貨傾居行賂不顧窮盡輕剽者則迸入險阻黨就羣惡百姓虚竭嗷然愁擾愁擾則不營業不營業則致窮困致窮困則不樂生故口腹急則姦心動而携叛多也又聞民間非居處不能自供生産兒子多不起養屯田貧兵亦多棄子天則生之而父母殺之既懼干逆和氣感動隂陽且惟殿下開基建國乃無窮之業也強鄰大敵非造次所滅疆場常守非期月之戍而兵民减耗後生不育非所以歴逺年致成功也夫國之有民猶水之有舟停則以安擾則以危愚而不可欺弱而不可勝是以聖王重焉禍福繇之故與民消息觀時制政方今長吏親民之職惟以辨具為能取過目前之急少復以恩恵為治副稱殿下天覆之仁勤恤之徳者官民政俗日以彫弊漸以陵遲勢不可乆夫治疾及其未篤除患貴其未深願陛下少以萬機餘閒留神思省補復荒虚深圖逺計育殘餘之民阜人財之用參曜三光等崇天地臣統之大願足以死而不朽矣大帝感統言深加意焉陸遜為上大將軍右都䕶並掌荆州及豫章三郡事雖身在外乃心於國上疏陳時事曰臣以為科法嚴峻下犯者多頃年以來將吏罹罪雖不慎可責然天下未一當圖進取宜少恩貸以安下情且世務日興良能為先自非姦穢入身難忍之過乞復顯用展其力効此乃聖王忘過記功以成王業昔漢髙捨陳平之愆用其竒略終建勲祚功垂千載夫峻法嚴刑非帝王之隆業有罰無恕非懐逺之宏規也大帝欲遣偏師取夷州及珠崖遜上疏曰臣愚以為四海未定當湏民力以濟時務今兵興歴年見衆損減陛下憂勞聖慮忘寢與食將逺規夷州以定大事臣反覆思惟未見其利萬里襲取風波難測民易水土必致疾疫今驅見衆輕渉不毛欲益更損欲利反害又珠崖絶險民猶禽獸得其民不足濟事無其兵不足虧衆今江東自足圖事但當畜力而後動耳昔桓王創基兵不一旅而開大業陛下承運拓定江表臣聞治亂順逆湏兵為威農桑衣食民之本業而干戈未戢民有饑寒臣愚以為宜育養士民寛其租賦衆尅在和義以勸勇則河渭可平九有一統矣帝遂征夷州得不補失及公孫淵背盟帝欲往征遜上疏曰淵憑險恃固拘留大使名馬不獻實可發忿蠻夷猾夏未染王化鳥竄荒裔拒逆王師至令陛下爰赫斯怒欲勞萬乗汎輕越海不慮其危而渉不測方今天下雲擾羣雄虎争英豪踴躍張聲大視陛下以神武之姿誕膺期運破操烏林敗備西陵襲其荆州斯二虜者當世雄傑皆摧其鋒聖化所綏萬里草偃方蕩平華夏􅄣一大猷今不忍小忿而發雷霆之怒違垂堂之戒輕萬乗之重此臣之所惑也臣聞志行萬里者不中道而輟足圖四海者匪懐細以害大強冦在境荒服未定陛下乗桴逺征必致闚􅎿慼至而憂悔之無及若使大虜時㨗則淵不討自服今乃逺惜遼東衆之與馬奈何獨欲捐江東萬安之本業而不惜乎乞息六師以威大虜早定中夏垂耀將來帝用納焉陸抗為鎮軍大將軍後主建衡二年拜抗都督信陵西陵夷道樂鄉公安諸軍事治樂鄉聞都下政令多闕憂深慮逺乃上疏曰臣聞徳均則衆者勝寡力侔則安者制危蓋六國所以兼并於強秦西楚所以北靣於漢髙也今敵跨制九服非徒闗右之地割據九州豈但鴻溝以西而已國家外無連國之援内非西楚之強庶政陵遲黎民未乂而議者所恃徒以長川峻山限帶封域此乃守國之末事非智者之所先也臣毎逺惟戰國存亡之符近覽劉氏傾覆之釁考之典籍驗之行事中夜撫枕臨餐忘食昔匃奴未滅去病辭家漢道未純賈生哀泣况臣王室之出世荷光寵身名否泰與國同戚死生契濶義無茍且夙夜憂怛念至情惨夫事君之義犯而勿欺人臣之節匪躬是殉謹陳時宜十七條於左時何定弄權閹宦預政抗上疏曰臣聞開國承家小人勿用靖譛庸回唐書攸箴是以雅人所以怨刺仲尼所以嘆息也春秋以來爰及秦漢傾覆之釁未有不繇斯者也小人不眀理道所見既淺雖使竭情盡節猶不足任况其姦心素篤而忠愛移易哉茍患失之無所不至今委以聰眀之任假以專制之威而兾雍熈之聲作肅清之化立不可得也方今見吏殊才雖少然或冠冕之胄少漸道教或清苦自立資能足用自可隨才授職抑黜羣小然後俗化可清庶政無穢也遷都䕶聞武昌左部督薛瑩徵下獄抗上疏曰夫俊乂者國家之良寳社稷之貴資庶政所以倫叙四門所以穆清也故大司農樓𤣥散騎中常侍王蕃少府李朂皆當世秀穎一時顯器既蒙初寵從容列位而並旋受誅殛或圯族替祀或投棄荒裔蓋周禮有赦賢之辟春秋有宥善之義書曰與其殺不辜寕失不經而蕃等罪名未定大辟已加心經忠義身被極刑豈不痛哉且已死之刑固無所識至乃焚爍流剽棄之水濵懼非先王之正典或甫侯之所戒也是以百姓哀聳士民同慼蕃朂永已悔亦靡及誠望陛下赦召𤣥出而頃聞薛瑩卒見逮録瑩父綜納言先帝傅弼文皇及瑩承基内礪名行今之所坐罪在可宥臣懼有司未詳其事如復誅戮益失民望乞垂天恩原赦瑩罪哀矜庶獄清澄刑網則天下幸甚時師旅仍動百姓疲弊抗又上疏曰臣聞易貴隨時傳美觀釁故有夏多罪而殷湯用師紂作淫虐而周武授鉞茍無其時玉臺有憂傷之慮孟津有反斾之軍今不務富國強兵力農畜榖使文武之才効展其用百揆之署無曠厥職眀黜陟以厲庶尹審刑賞以示勸沮訓諸司以德而撫百姓以仁然後順天乗運席卷宇内而聴諸將徇名窮兵黷武動費萬計士卒彫瘁冦不少衰而我已大病矣今争帝王之資而昧十百之利此人臣之姦便非國家之良䇿也昔齊魯三戰魯人再克而亡不旋踵何則大小之勢異也况今師所克獲不補所䘮哉且阻兵無衆古之眀鑑誠宜暫息進取小規以畜士民之力觀釁同隙庶無悔吝鳳凰二年春就拜大司馬荆州牧三年夏疾病上疏曰西陵建平國之蕃表既處下流受敵二境若敵汎舟順流舳艫千里星奔電邁俄然行至非可恃援他部以救倒懸也此乃社稷安危之機非徒封疆侵陵小害也臣父遜昔在西垂陳言以為西陵國之西門雖易守亦復易失若有不守非但失一郡則荆州非吳有也如其有虞當傾國争之臣往在西陵得渉遜迹前乞精兵三萬而至者循常未肯差赴自步闡以後益更損耗今臣所統千里受敵四處外禦強㓂内懐百蠻上下見兵財有數萬羸弊日乆難以待變臣愚以為諸王㓜冲未統國事可且立傅相輔𨗳賢資無用兵馬以妨要務又黃門豎宦開立占募兵民怨役逋逃入占乞特詔簡閱一切料出以補疆場受敵常處使臣所部足滿八萬省息衆務信其賞罰雖韓白復生無所展巧若兵不増此制不改而欲克諧大事此臣之所深慼也若臣死之後乞以西方為屬願陛下思覧臣言則臣死且不朽秋遂卒天紀四年晋軍伐吳龍驤將軍王濬順流東下所至輙克終如抗慮晉王坦之孝武寧康二年為都督徐兖青三州諸軍事北中即將徐兖二州刺史鎮廣陵將之鎮上表曰臣聞人君之道以孝敬為本臨御四海以委任為貴恭順無違則盛德日新親仗賢能則政道邕睦昔周成漢昭並以㓜年纂承大統當時天下未為無難終能顯揚祖考保安社稷蓋尊尊親親信納大臣之所致也伏惟陛下誕竒秀之姿禀生知之量春秋尚富渉道未廣方湏訓𨗳以成天德皇太后仁淑之體過於三母先帝奉事積年每稱聖眀臣願奉事之心便當自同孝宗太后慈愛之隆亦不必異所生琅琊王餘姚王及諸皇女宜朝夕定省承受教誨𨗳習儀刑以成景仰恭敬之美不可以屬非至親自為疎疑昔肅祖殂落成康㓜冲事無大小必諮丞相𨗳所以克就聖德實此之繇今僕射臣安中軍臣冲人望具瞻社稷之臣且受遇先帝綢繆繾綣並志竭忠貞盡心盡力歸誠陛下以報先帝愚謂周旋舉動皆應諮此二臣二臣之於陛下則周之旦奭漢之霍光顯宗之於王𨗳冲雖在外路不云逺事容信宿必宜參詳然後情聴獲盡庶事可畢又天聴雖聰不啟不廣羣情雖忠不引不盡宜數引侍臣詢求讜言平易之世有道之主猶尚戒懼日昃不倦况今艱難未盡慮經安危祖宗之基繫之陛下不可不精心務道以申先帝堯舜之風不可不敬修至德以保宣元天地之祚表奏帝納之殷仲堪為荆州刺史尚書下以益州所統梁州三郡人丁一千畨戍漢中益州未肯承遣仲堪乃奏之曰夫制險分國各有攸宜劍閣之隘實蜀之闗鍵巴西梓潼宕渠三郡去漢中遼逺在劍閣之内成敗與蜀為一而統屬梁州蓋定鼎中華慮在後伏所以分斗絶之勢開荷㦸之路自皇居南遷守在岷卭衿帶之形事異曩昔是以李勢初平割此三郡配𨽻益州將欲重復上流為習坎之防事經英略歴年數紀梁州以統接曠逺求還得三郡忘王侯設險之義背地勢内外之實盛陳事力之寡弱飾哀矜之苦言今華陽乂清汧隴順軌闗中餘燼自相魚肉梁州以論求三郡益州以本統有定更相牽制莫知所從致令巴宕二郡為羣獠所覆城邑空虚士庶流亡要害膏腴皆為獠有今逺慮長規宜保全險塞又蠻獠熾盛兵力寡弱如遂經理乖繆號令不一則劍閣非我保醜類轉難制此乃藩捍之大機上流之至要昔三郡全實正差文武三百以助梁州今浮沒蠻獠十不遺二加逐食鳥散資生未立茍順符指以副梁州恐公私困弊無以堪命則劍閣之守無擊柝之儲號令選用不專於益州虛有監統之名而無制御之用懼非分位之本㫖經國之逺術謂今正可更加梁州文武五百合前為一千五百自此之外一仍舊貫設梁州有急蜀當傾力救之書奏朝廷許焉宋沈慶之為太子歩兵校尉文帝將北討慶之諌曰馬步不敵為日已久矣請捨逺事且以檀到言之道濟再行無功彦之失利而返今料王元謨等未踰两將六軍之盛不過往時將恐重辱王師難以得志帝曰王師再屈别有所繇道濟養冦自資彦之中塗疾動虜所恃惟馬夏水浩汗河水流通汎舟北指則碻磝必走滑臺小戍易可覆㧞尅此二戍舘榖弔民虎牢雒陽自然不固比及冬間城守相接虜馬過河便成擒也慶之又固陳不可時丹陽尹徐湛之吏部尚書江湛並在坐帝使湛之等難慶之慶之曰治國譬如治家耕當問奴織當訪婢陛下今欲伐國而與白靣書生輩謀之事何繇濟帝大笑南齊劉善眀為征虜將軍淮南宣城二郡太守上表陳事曰周以三聖相資再駕乃就漢值海内無主累敗方登魏挾主行令實踰二紀晋廢立持權遂歴四世景祚攸集如此之難者也陛下凝暉自天炤湛神極睿周萬品道洽無垠故能髙嘯閑軒鯨鯢自翦垂拱雲帟九服載宴靡一戰之勞無半辰之棘苞池江海籠苑嵩岱神祗樂推普天歸奉二三年間允膺寳命胄臨皇歴正位宸居開闢以來未有若斯之盛者也夫常勝者無憂恒成者好怠故雖休勿休姬旦作誥安不忘危尼父垂範今皇運草創萬化始基乗宋季葉政多澆苛億兆倒懸仰希蘇振臣早蒙殊養志輸肝血徒有其誠曽闕埃露夙宵慙戰如墜淵谷不識忌諱謹陳愚管瞽言芻議伏待斧鉞所陳事凡十一條其一以為天地開創人神慶仰宜存問逺方宣廣慈澤其二以為京師浩大逺近所歸宜遣醫藥問其疾苦年九十以上及六疾不能自存者隨宜量賜其三以為宋氏赦令蒙恩者寡愚謂今下赦書宜令事實相副其四以為匃奴未滅劉昶猶存秋風揚塵容能送死境上諸城宜應嚴備特簡雄略以待事機資實所湏皆宜豫辦其五以為宜除宋氏大眀太始以來諸苛政細制以崇簡易其六以為凡諸土木之費且可權停其七以為帝子王姬宜崇儉約其八宜詔百司及府州郡縣各貢讜言以繼唐虞之美其九以為忠貞孝悌宜擢以殊階清儉亷節應任以民政其十以為革命惟始天地大慶宜時擇才辯北使匃奴其十一以為交州險夐要荒之表宋末政苛遂至怨叛今大化創始宜懐以恩徳未應逺勞將士揺動邊氓且彼土所出唯有珠寳實非聖朝所湏之急討伐之事謂宜且停又撰賢聖雜語奏之託以諷諌帝答曰省所獻雜語並列聖之眀規衆智之深軌卿能憲章先範纂鏤情識忠欵既昭淵誠肅著當以周旋無忘聴覽也又諌起宣陽門表陳宜眀守宰賞罰立學校制齊禮廣開賔舘以接荒民帝又答曰具卿忠讜之懐夫賞罰以懲守宰飾舘以待遐荒皆古之善政吾所宜勉更撰新禮或非易制國學之美已勅公卿宣陽門今勅停寡德多闕思復有聞孔稚珪為冠軍將軍南陽太守以魏軍連嵗南侵征役不息百姓死傷乃上表曰匃奴為患自古而然雖三代智勇两漢權竒筭略之要二塗而已一則鐵馬風馳奮威沙漠二則輕車出使通驛虜庭推而言之優劣可覩今之議者咸以丈夫之氣恥居物下况我天威寕可先屈吳楚勁猛帶甲百萬截彼鯨鯢何往不碎請和示弱非國計也臣以為戎狄禽獸本非人倫鴟鳴狼踞不足喜怒蜂目蠆尾何関美惡唯宜勝之以深權制之以逺䇿宏之以大度處之以蝥賊豈足肆天下之忿損蒼生之命發雷電之怒争䖝鳥之氣百戰百勝不足稱雄橫尸千里無益上國而蟻聚蠶攅窮誅不盡馬足毛羣難與競逐漢髙橫威海表窘廹長圍孝文國富刑清事屈凌辱宣帝撫納安静朔馬不驚光武卑辭厚禮寒山無靄是两京四主英濟中區輸寳貨以結和遣宗女以通好長轡逺馭子孫是賴豈不欲戰惜民命也唯漢武藉五世之資承六合之富驕心奢志大事匃奴遂連兵積嵗轉戰千里長驅瀚海飲馬龍城雖斬獲名王屠走凶羯而漢之器甲十亡其九故衛霍出闗千隊不反貳師入漠百旅頓降李廣敗於前鋒李陵沒於後陣其餘奔北不可勝數遂使國儲空懸户口减半好戰之功其利安在戰不及和相去何若自西朝不綱東晋遷鼎羣胡沸亂羌狄交橫荆棘攅於陵廟豺虎咆於宫闕山淵反覆黔首塗地逼廹奔騰開闢未有是時得失略不稍陳近至元嘉多年無事末路不量復挑強敵遂連城覆沒虜馬飲江青徐之際草木為人耳建元之初胡塵犯塞永眀之始復結通和十餘年間邊堠且息陛下張天造歴駕日登皇聲雷宇宙勢壓河岳而封豕殘魂未屠劍首長蛇餘喘偷窺外甸烽亭不静五載於斯昔嵗蟻壊瘻食樊漢今兹䖝毒浸淫未已興師十萬日費千金五嵗之費寕可貲計陛下何惜匹馬之驛百金之賂數行詔命誘此凶頑使河塞息肩闗境全命此䇿若行則為百世之福若不從命不過如戰失一隊耳或云遣使不受則為辱命夫以天下為量者不計細恥以四海為任者寕顧小節一城之沒尚不足惜一使不反曽何取慙且我以權取何嫌其恥所謂尺蠖之屈以求伸也臣不言遣使必得和自有可和之理猶如欲戰不必勝而有勝之機耳今宜早發大軍廣張兵勢徵犀甲於岷峨命樓船於浦海使自青徂豫候騎星羅㳂江入漢雲陣萬里據險要以奪其魂斷糧道以折其膽多設疑兵使精銷而計亂固列金湯使神茹而慮屈然後發衷詔馳輕驛辯辭重幣陳列吉凶北虜頑而愛竒貪而好貨畏我之威喜我之賂畏威喜賂願和必矣陛下用臣之啟行臣之計何憂玉門之下而無欵塞之胡哉彼之言戰既慇懃臣之言和亦慊濶伏願察两塗之利害簡二事之多少聖炤𤣥省灼然可斷所表謬奏希下之朝省使同博議臣謬荷殊恩奉佐藩岳敢肆瞽直伏奏千里帝不納後魏樓毅孝文時為都督凉河二州鄯善鎮諸軍事鎮西將軍凉州刺史車駕南伐毅表諌曰伏承六軍雲動問罪荆揚弔民淮表一同甌越但臣愚見竊所未安何者京邑新遷百姓易業公私草剏生途索然兼往嵗弗稔民多饑饉二三之際嗟惋易興天道悠長宜養時晦願抑赫斯以待後日詔曰時不自來因人則合今年人事殊非昔嵗守株之唱便可停也陽九利渉豈卿所知邪辛雄為行臺左丞與前軍臨淮王彧討荆州雄在軍上疏曰凡人所以臨堅陣而忘身觸白刅而不憚者一則求榮名二則貪重賞三則畏刑罰四則避禍難非此數事雖聖王不能勸其臣慈父不能厲其子眀主深知其情故賞必行罰必信使親踈貴賤勇怯賢愚聞鐘鼓之聲見旌旗之列莫不奮激競赴敵場豈厭久生而樂早死也利害懸於前欲罷不能耳自秦隴逆節將歴數年蠻左亂常稍已多載凡在戎役數十萬人三方之師敗多勝少跡其所繇不眀賞罰故也陛下欲天下之早平愍征夫之勤瘁乃降眀詔賞不移時然兵將之動歴稔不决三軍之卒宴然在家致令節士無所勸慕庸人無所畏懾進而擊賊死交而賞賖退而逃散身全而無罪此其所以望敵奔沮不肯盡力者矣若重發眀詔更量賞罰則軍威必張賊難可弭臣聞必不得已去食就信以此推之信不可斯湏廢也賞罰陛下之所易行不能全而行之攻敵士之所難欲其必死寕可得也臣既庸弱忝當戎使職司所見輙敢上聞惟陛下審其可否後周于翼為大將軍先是與齊陳二境各修邊防雖通聘好而毎嵗交兵然一彼一此不能有所克獲武帝既親萬機將圖東討詔邊城鎮並益儲峙加戍卒二國聞之亦増修守禦翼諫曰宇文䕶専制之日興兵至雒不戰而敗所䘮實多數十年委積一朝糜散雖謂䕶無制勝之䇿亦繇敵人之有備故也且疆場相侵互有勝敗徒損兵儲非䇿之上者不若解邊嚴减戍防繼好息民敬待來者彼必喜於通和懈而少備然後出其不意一舉而山東可圖若猶習前蹤恐非蕩定之計帝納之隋梁士彦仕周為晉州刺史齊師來伐武帝救之以將士疲倦意欲班師士彦叩馬而諌曰今齊師既遁衆心皆動因其懼也而攻之其勢必舉帝從之大軍遂進帝執其手曰余之有晉州為平齊之基若不固守則事不諧矣朕無前慮惟恐後變善為我守之及齊平封郕國公進位上柱國郭榮為左候衛大將軍遼東之役以功進位左光禄大夫眀年帝復事遼東榮以為中國疲弊萬乗不宜屢動乃言於帝曰鄰敵失禮臣下之事臣聞千鈞之弩不為鼷䑕發機豈有親辱大駕以臨小冦帝不納樊子蓋為兵部尚書將兵大業十一年從駕汾陽宫至於鴈門車駕為突厥所圍頻戰不利帝欲以精騎潰圍而出子蓋諌曰陛下萬乗之主豈可輕脫一朝狼狽雖悔不追未若守城以挫其銳四靣徵兵可立而待陛下亦何所慮乃欲身自突圍因垂泣願暫停遼東之役以慰衆望聖躬親出慰撫厚為勲格人心自奮不足為憂帝從之其後援兵稍至虜乃引去來䕶兒為右翊衛大將軍煬帝於鴈門為突厥所圍將選精騎潰圍而出䕶兒及樊子蓋並固諌乃止大業十二年駕幸江都䕶兒諌曰自皇家受命將四十年薄賦輕徭户口滋殖陛下以髙麗逆命稍興軍旅百姓無知易為咨怨在外羣盗往往聚結車駕逰幸深恐非宜伏願駐駕雒陽與時休息出師命將掃清羣醜上禀聖筭指日尅除今幸江都是臣衣錦之地臣荷恩深重不敢專為身謀帝聞之厲色而起數日不得見後怒解方被引入謂曰公意乃爾朕復何望䕶兒因不敢言唐執失思力為左領軍將軍貞觀五年十月太宗將逐兎於後苑思力諌曰天授陛下為華夷父母何得自輕倘使萬一馬有顛蹷將若之何太宗顧而異之又將逐鹿思力乃脫巾帶跪而固請太宗為之止焉李大亮為梁州都督初頡利之敗也其酋豪首領至者皆拜將軍布列朝廷五品以上百餘人殆與朝士相半唯大度設拓設泥熟特勒不至遣招慰之使者相望於道大亮以為於事無用徒費中國因上疏曰臣聞欲綏逺者必先安近中國百姓天下本根四夷之人猶於枝葉擾其根本以厚枝附而求久安未之有也自古眀王化中國以信馭夷狄以權故春秋云戎狄豺狼不可厭也諸夏親暱不可棄也自陛下君臨宇宙深根固本人逸本強九州殷盛四夷自服今者拓䟦突厥雖入提封臣愚稍覺勞費未悟其益也然河西甿庶積禦蕃夷州縣蕭條户口鮮少加因隋亂減耗尤多突厥未平之前尚不安業匃奴微弱以來始就農畝若即勞役恐致妨損以臣愚見請停招慰且謂之荒服者故臣而不内是以周室愛人攘狄竟延七百齡秦王輕戰事胡四十載而絶滅漢文養兵静守天下安豐孝武揚威逺略海内虚耗雖悔輪臺追已不及至於隋室早得伊吾兼統鄯善且既得之後勞費日甚虚内致外竟損無益逺尋秦漢近觀隋室動静安危昭然備矣伊吾雖已臣附逺在蕃磧人非夏人地多沙鹵其自豎立稱藩附庸者請羈縻受之使居塞外畏威懐徳永為藩臣蓋行虚恵而收實福矣近日突厥傾國入朝既不俘之江淮以變其俗乃置内地去京不逺雖則寛仁之義亦非久安之計毎見一人初降賜物五匹袍一領首帥悉授大官禄厚位尊理多縻費以中國之租賦供積惡之匃奴其衆益多非中國之利也於是言事者甚衆竟分其部置三都督府竇静為夏州都督時擒頡利處其部衆於河南静以為不便上封事曰臣聞夷狄者同夫禽獸窮則搏噬羣則聚麀不可以刑法䋲不可以仁義教衣食仰給不務耕桑徒損有為之甿以資無知之虜得之則無益於化失之則無損於時然彼首丘之情未易忘也誠恐一旦變生犯我王略愚臣之所深慮如臣計者莫若因其敗亡之後加其無妄之福假以賢王之號妻以宗室之女分其土地析其部落使其權弱勢分易為羈制自可永保邊塞代為藩臣此實長轡逺御之道於時務在懐輯雖未從之太宗嘉其忠謇答以優詔曰北方之務悉以相委以卿為寕朔大使撫鎮華戎朕無北顧之憂矣尉遲敬徳為鄜夏二州都督抗表乞骸授開府儀同三司太宗將征髙麗敬徳奏言車駕若自往遼左皇太子又在定州東西二京府庫所在雖有鎮守總是空虚遼東路遥恐有元感之變且邊隅小國不足親勞萬乗伏請委之良將自可應時摧滅太宗不納令以本官行太常卿為左衛馬軍總管從破髙麗於駐蹕山軍還依舊致仕郭子儀為朔方等道節度時西蕃入㓂詔子儀為闗内副元帥蕃軍退詔子儀權京城留守自西蕃入㓂代宗車駕東幸天下皆咎程元振諌官屢論之元振懼又以子儀復立功不欲天子還京勸帝且都雒陽以避蕃㓂代宗然之下詔有日子儀聞之因兵部侍即張重光宣慰廻附章論奏曰臣聞雍州之地古稱天府右控隴蜀左扼崤函前有終南太華之險後有清渭濁河之固神眀之奥王者所都地方數千里帶甲十餘萬兵強士勇雄視八方有利則出攻無利則入守此用武之國非諸夏所同秦漢因之卒成帝業其後或處之而㤗去之而亡前史所書不唯一姓及隋氏季末煬帝南還河雒丘墟兵戈亂起髙祖唱義亦先入闗惟能剪滅奸雄底定區宇以至於太宗髙宗之盛中宗𤣥宗之眀多在秦州鮮居東雒間者羯胡搆亂九服分離河北河南盡從逆命然而先帝仗朔方之衆慶緒奔亡陛下藉西土之師朝義就戮豈惟天道助順抑亦地形使然此陛下所知非臣飾說近因吐蕃凌逼鑾駕東廵蓋以六軍之兵素非精練皆市肆屠沽之人務掛虚名茍備征賦及驅以就戰百無一堪亦有前輸貨財因以求免又中官掩蔽庶政多荒遂令陛下振蕩不安退居陜服斯蓋闗於委任失所豈可謂秦地非良者哉今道路云云不知信否咸謂陛下已有成命將幸雒都臣熟思其端未見其利夫以東周之地久䧟賊中宫室焚燒十不存一百曹荒廢曽無尺椽中間畿内不滿千户井邑榛棘豺狼所嘷既乏軍儲又鮮人力東至鄭汴達於徐方北自懐覃經於相土人烟斷絶千里蕭條將何以奉萬乗之牲餼供百官之次舍矧其土地狹阨纔數百里間東有成臯南有二室險不足恃適為戰場陛下奈何棄久安之勢從至危之䇿忽社稷之計生天下之心臣雖至愚竊為陛下不取且聖㫖所慮豈不以京畿新遭剽略田野空虚恐稍食不充國用有闕以臣所見深為不然昔衛文公小國之君諸侯之主耳遭懿公為狄所滅始廬於漕衣大布之衣冠大帛之冠元年革車三十乗季年三百乗卒能恢復舊業享無疆之休况眀眀天子恭儉節用茍能黜素餐之吏去冗食之官抑豎刁易牙之權任蘧瑗史鰌之直薄征弛力䘏隱迨鰥委諸相以簡賢任能付老臣以練兵禦侮則黎元自理盗賊自平中興之功旬月可兾卜年之期永永無極矣願時邁順動迴鑾上都再造邦家維新庶政奉宗廟以脩薦享謁陵寢以崇孝思臣雖隕絶死無所恨代宗省表垂泣謂左右曰子儀用心真社稷臣也可亟還京師韋臯為西川節度使順宗即位王叔文等專政臯上表曰臣聞上承宗廟下鎮黎元永固無疆亟先儲貳臣伏聞聖躬以山陵未畢哀毁踰禮因乖攝衛至今未安若更憂勞萬㡬伏恐旬月之間未得痊復皇太子睿質已長淑問日彰四海之心實所倚賴伏望權令親監庶政事無大小一切諮禀候聖躬痊愈即歸春宫如此必兾聖體速就康寕庶政免令擁滯臣位兼將相受恩最深今之所陳是臣職分特望陛下俯從人望克崇萬代之業又上皇太子牋曰殿下體重離之眀當儲貳之重所以克昌九廟式固萬方天下安危係於殿下臯位崇將相志切公忠先聖察知早蒙恩顧人臣之分知無不為將以上答眷私常思罄竭伏以聖上嗣膺鴻業睿哲英眀攀感先皇志存孝理上追殷宗之徳諒闇未嘗發言軍國萬機委於臣佐所宜竭誠翊戴以致雍熈但託付未得其人處理多虧公正今則羣小得志隳紊紀綱官以勢遷政猶情改朋黨交搆熒惑聖朝樹置腹心遍於貴位潜結左右難在蕭墻國賦散於權門王稅不入天府䙝慢無忌髙下在心貨賄既行遷轉失序先朝屏黜􅂍犯之類咸擢在省闥府署之間至令忠臣殞涕正士吞聲遐邇痛之謂之不可將恐奸雄乗便因此謀動干戈危殿下之邦家傾太宗之王業伏以櫛風沐雨經營四方列聖兢兢年將二百將欲傳於萬代永保無疆豈可一朝委任王叔文王伾李忠言等三人小藝之臣付以軍國重務恣其黷亂坐收傾危日夜憂危不勝憤激捐軀報國今則其時特望殿下即日奏聞斥逐羣小天下事務出自殿下之心則四方獲安忠臣得以戮力臯受恩两朝寄任崇重惟知竭節以效懇誠伏惟殿下掃除之臯自以大臣得議國家事且怨叔文不與三川恃處斗絶一方度叔文不能揺動又乗其與韋執誼間隙故極言中外人情尋裴均嚴綬表牋繼至悉與臯同詞忠正之徒皆倚賴以為援而邪黨震懼裴度為河東節度使㑹幽州朱克融鎮州王廷湊作亂詔度充鎮州四靣行營招討使屠城斬將屢以捷聞穆宗深嘉其忠欵時翰林學士元稹交結内官求為宰相與知樞宻魏宏簡為刎頸之交稹雖與度無憾然頗忌前達加於已上度方用兵山東處置軍事有所論奏多為稹輩所持天下皆言稹恃寵熒惑上聴度在軍上疏論之曰臣聞主聖臣直今既遇聖主輙為直臣上答殊私下塞羣謗誓除國蠧無以家為茍獻替之可行何性命之足惜伏惟皇帝陛下恭承丕業光啟雄圖方於頑人之風以立太平之事而逆豎搆亂震驚山東姦臣作朋撓亂國政陛下欲掃蕩幽鎮宜肅清朝廷何者為行有大小議事有先後河朔逆賊只亂山東禁闈姦臣必亂天下是則河朔患小禁闈患大小者臣等與諸戎臣必能剪滅大者非陛下制斷非陛下覺悟無計驅除今文武百寮中外萬品有心者無不憤忿有口者無不咨嗟直以威權方重奬用方深無所畏避不敢抵觸恐事未行而禍已及不為國計且為身謀臣比者猶畏隱忍不願發眀一則以罪惡如山怨謗如雷伏料聖眀必自誅殛一則以四方無事萬樞且過雖紀綱潜壊賄賂公行俟其貫盈必自顛覆今屬兇徒擾攘宸衷憂軫凡有制命計於安危痛此姦邪恣行欺罔干亂聖略非止一途又翰苑舊臣結為朋黨陛下聴其所說更訪於近臣私相計㑹更唱迭和蔽惑聰眀所以臣自兵興以來所陳章疏事皆要切所奉書詔多有參差蒙陛下委付之意不輕被姦臣抑損之事不少臣素與姦佞亦無仇嫌只是昨者臣請乗𫝊詣闕靣陳戎事姦臣之徒最所畏懼知臣若到御坐之前必能悉數其過以此百計止臣此行臣又請領兵齊進遂便討賊姦臣之黨尤加阻礙恐臣統率諸道或有成功進退皆受羈牽意見悉遭蔽塞復共一二檢校同詞合力或两道招撫逗留旬時或遣荆州行營拖曵日月但欲令臣失所使臣無成則天下理亂山東勝負悉不顧矣為臣事君一至於此且陛下左右前後忠良至多亦有熟㑹典章亦有飽諳師旅足以任使何獨斯人以臣愚見若朝中姦臣盡去則河朔逆賊不討而自平若朝中姦臣尚在則逆賊縱平無益臣讀國史知代宗朝蕃戎侵軼直犯都城代宗不知蓋被程元振蒙蔽㡬危社稷當時柳伉乃太常一博士耳猶能抗表歸罪為國除害今臣所處兼􅄣將相豈宜坐觀凶邪有曀日月不勝感憤嫉惡之至謹附中使趙奉國以聞倘陛下未信忠言猶惑姦黨伏乞出臣此表令三事大夫與百寮集議彼不受責臣合伏辜天鍳孔眀照臣肝血得天下之人知臣不負陛下則雖死之日猶生之年繼上三章辭情激切穆宗雖不恱然懼大臣正議乃以魏宏簡為弓箭庫使罷元稹内職然寵稹之意未衰俄拜稹平章事尋罷度兵權守司徒平章事充東都留守諌官相率伏閣詣延英門者日有二三帝知其諌不即被召皆上疏言時未偃兵度有將相全才不宜置之散地帝以章疏旁午無如之何知人情在度遂詔度自太原繇京師赴雒及元稹為相請帝罷兵洗雪廷湊克融解深州之圍蓋欲罷度兵柄故也二年三月度至京師既見先叙克融廷湊暴亂河朔受命討賊無功次陳除職東都許令入覲辭和氣勁感動左右度伏奏龍墀涕泗鳴咽帝為之動容口自諭之曰所謝知朕於延英待卿初人以度無左右之助為姦邪排擯雖度勲徳恐不足感動人主及度奏河北事慷慨之切揚於殿庭在位者無不聳動雖武夫貴介亦有咨嗟流涕者梁韓建唐末為鎮國軍節度使昭宗乾寕中通王滋請故宰臣孔緯宅為營建奏曰孔緯以直道為宰相今其身歿未久朝廷撫凌統之孤祭蕭何之墓奈何奪其故居使其妻子奉几筵無所非君臣始終之道也帝從之後唐蓋寓初為武皇右都押牙領容管經略使武皇平王行瑜旋師渭北暴雨六十日諸將或請入覲且云天顔咫尺安得不行覲禮武皇意未决寓白曰車駕自石門還京寢未安席比為行瑜驚駭乗輿今京師未寕奸兇流議大王移兵渡渭必恐復動宸情君臣始終不在朝覲但歸藩守姑務勤王是忠臣之道也武皇笑曰蓋寓尚阻吾入覲况天下人哉即日班師符存審為魏博馬歩軍都指揮使領橫海軍節度使莊宗勇於征戰毎以輕騎當之遇窘者數四存審毎俟其入必叩馬泣諌曰王將復唐宗宜為天下自愛搴旗挑戰一劍之任無益聖徳請責效於臣古人不以賊遺君父臣雖不武敢不代君之憂莊宗即時回駕冊府元龜卷四百七
