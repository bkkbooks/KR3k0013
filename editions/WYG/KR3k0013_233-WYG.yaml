body:
  text: 册府元龜卷二百三十三宋王欽若等撰僭偽部好土功悔過矜大失䇿好土功一馬化龍劉石猾夏土功競起版築相姱雖金碧以輝煌寔塗膏而潤血務極奢僭弗率典常通晝夜以責功雜寳玉以加飾鼓鐘未息荆棘旋生㓙恣之蹤盖可醜也前凉張茂築靈鈞臺周輪八十餘堵基髙九仞武陵人閻曾夜叩門呼曰武公遣我来曰何故勞百姓而築臺乎姑臧令辛巖以曾妖妄請殺之茂曰吾信勞人曾稱先君之令何謂妖乎張駿西域鄯善王元孟獻女號曰美人駿立賔遐觀以處之前趙劉曜命起酆眀觀立西宫建凌霄樓於滈池於霸陵西南營夀陵侍中髙豫和苞上䟽曰臣聞人主之興作也必仰凖乾象俯順人時是以衛文承亂亡之後宗廟流漂無所而猶上候營室以搆楚宫彼其急也猶尚若兹故能興康叔武公之迹以延九百之慶今奉詔書將營酆眀觀市道芻蕘咸以非之曰一觀之費足以平凉州矣又奉勅旨復欲擬阿房而建西宫模瓊樓而起凌霄以此功費亦可以吞吳蜀翦齊魏矣曜大恱後趙石勒將營鄴宫廷尉續咸上書切諫勒大怒曰不斬此老臣朕宫不得成也勅御史收之中書令徐光進曰陛下天資聰睿超邁唐虞而更不欲聞忠臣之言豈夏癸商辛之君邪其言可用用之不可用故當容之奈何一旦以直言而斬列卿乎勒嘆曰為人君不得自専如是豈不識此言之忠乎向戯之耳人家有百匹資尚欲市别宅况有天下之富萬乘之尊乎終當繕之耳且勅停作成吾直臣之氣也時大雨霖中山西北暴水流漂巨木百餘萬根集於堂陽勒大恱謂公卿知不此非為災也天意欲吾營鄴都耳於是令少府任汪都水使者張漸等監營鄴宫勒親將規矩石季龍於襄國起大武殿於鄴造東西宫大武殿基髙二丈八尺以文石綷之下穹伏室置衛士五百人於其中東西七十歩南北六十五歩皆漆瓦金鐺銀楹金柱珠簾玉壁窮極伎巧又起靈風臺九殿於顯陽殿後選士庶之女以充之後庭服綺縠玩珍竒者萬餘人内置女官十有八等教宫人星占及馬歩射置女史太史於靈臺仰觀災祥以考外太史之虚實又觀雀臺崩殺典匠少府任汪復使脩之倍於常度又盛興宫室於鄴起臺觀四十餘所營長安雒陽二宫作者四十餘萬人又發雍雒秦并州十六萬人及安未央宫時沙門吳進言於季龍曰國運將衰晉當復興宜苦役人以厭其氣季龍於是使尚書張羣發近郡男女十六萬車十萬乘運土築華林苑及長牆於鄴北廣長數十里趙攬申鍾石璞等上疏陳天文錯亂蒼生凋敝及因引見又面諫辭㫖甚切季龍大怒曰墻朝成夕沒吾無恨矣乃促張羣以燭夜作三觀四門三門通漳水皆為鐵扉暴風大雨死者數萬人又鑿城北引水於華林園城壊壓死者百餘人南燕慕容熙大築龍騰苑廣袤十餘里役徒二萬人起景雲山於苑内基廣五百歩峯髙十七丈又起逍遥宫甘露殿連房數百觀閣相交鑿天河渠引水入宫又為其昭儀苻氏鑿曲光海清凉池季夏盛暑士卒不得休息暍死者大半又起承華殿負土北門土與榖同價後凉李暠於南門外臨水起堂名曰靖恭之堂以議朝政又起嘉納堂於後園悔過書重改過勿吝語稱過而能改不逺之復聖哲攸許乃有據有方隅竊居位號鐏柄在手惨舒所繫故窮極武力放肆􅁋志詔令一出國命是司則有忠臣奮發嘉謨啓沃雖雄鷙之勢必霈然回慮盈於感歎革其非心至乎錫幣加號以旌厥功兹所以用區區之國能守其社稷者矣前凉張茂為凉州牧嵗餘築靈鈞臺周輪八十餘堵基髙九仞武陵人閻曾夜叩門呼曰武公遣我来曰何故勞百姓而築臺乎姑臧令辛巖以曽妖妄請殺之茂曰吾信勞人曽稱先君之令何謂妖乎大府主簿馬魴諫曰今世難未夷惟當𢎞尚道素不宜勞役崇飾臺榭且比年已来轉覺衆務日奢於徃每所經營輕違雅度實非士女所望於眀公茂曰吾過也命止作役張駿性卓越不羈而􅁋縱過度常夜微行於邑里國中化之及嗣位為凉州牧欲嚴刑峻制參軍黄斌進諌駿於是厲操改莭勤脩庶政緫御文武咸得其用前趙劉聰為皇后劉氏起䳨儀殿於後庭廷尉陳元達諫聰大怒將出斬之時在逍遥園李中堂元達先鎖腰而入及至即以鎖繞樹左右曳之不能動聰怒甚劉氏時在後堂聞之宻遣中常侍私勅左右停刑於是手䟽切諫聰乃解引元達而謝之易逍遥園為納賢園李中堂為愧賢堂後趙石勒時從事中郎將劉奥坐營建徳殿井木斜縮斬於殿勒悔之贈太常勒將狩於近郊主簿程琅諌曰劉馬刺客離布如林變起倉卒帝王亦一夫之敵耳孫䇿之禍可不慮乎且枯木朽株盡能為害馳騁之弊古今戒之勒勃然曰吾幹力自可足能裁量但知卿文書事不湏白此軰也是日逐獸馬觸木而死勒亦㡬殆乃由不用忠臣言吾之過也乃賜琅朝服錦絹爵闗内侯於是朝臣謁見忠言競進矣勒命參軍鼂讃成正陽門俄而門壊勒大怒斬讃既怒刑倉卒尋亦悔之賜以棺服贈大鴻臚冉閔率歩騎十萬攻石祗於襄國署其子太原王裔為大單于驃騎大將軍以降胡一千配為麾下光禄大夫韋䛕啓諌甚切閔覽之大怒誅䛕及其子孫後閔悔之贈䛕大司徒前燕慕容皝以牧牛給貧家田於苑中公収其八二分入私有牛而無地者亦田苑中公收其七三分入私記室叅軍封裕切諫曰聖王之宰國也薄賦而蔵於百姓分之以三等之田十一而稅之自永嘉䘮亂百姓流亡中原蕭條千里無煙且魏晉雖道消之世猶削百姓不至於七八持官牛田者官得六分百姓四分私牛而官田者與官平分百姓安之臣猶曰非眀王之道而况増乎又諫曰王憲劉眀忠臣也願宥忤鱗之愆收其藥石之效皝乃令曰覽封記室之諌孤實懼焉苑囿悉可罷之以給百姓前秦苻堅銳意荆揚將謀入㓂其左僕射權翼征南大將軍苻融沙門道安與其太子宏少子詵等諫皆不納堅為晉師所敗又為流矢所中單騎遁還淮北饑甚人有進壺飱豚髀者堅食之大恱曰昔公孫豆粥何以加也命賜帛十疋緜十斤辭曰臣聞白龍厭天池之樂而見困豫且陛下目所覩也今蒙塵之難豈自天乎且妄施不為恵妄受不為忠陛下臣之父母也安有子養而求報哉弗顧而退堅大慙顧其夫人張氏曰朕若用朝臣之言豈見今日之事邪當何面目復臨天下乎澘然流涕而去自淮南次於長安東之行宫哭苻融而後入告罪於其太廟厲兵課農存恤孤老諸士卒不返者皆復其家終世贈融大司馬諡曰哀公及姚萇主盟遣尹緯說堅求禪代之事堅問緯曰卿於朕何官緯曰尚書令史堅歎曰卿宰相才也王景畧之儔而朕不知卿亡也不亦宜乎後秦姚興以赫連勃勃為安逺將軍以部衆三萬配之弟邕固諌以為不可後勃勃僭稱天王侵畧嶺北諸城門不晝啓興歎曰吾不用黄兒之言以至於此黄兒姚邕小字也南凉秃髪利鹿孤時乞伏乾歸為姚興所敗率騎數百来奔處之晉興待以上賔之禮鎮北將軍俱延言於利鹿孤曰乾歸本我之屬國妄自尊立理窮歸命非有款誠若奔東秦必引師西侵非我利也宜從於乙弗之間防其越逸之路利鹿孤曰吾方𢎞信義以収天下之心乾歸投誠而徙之四海將謂我不可以誠信託也俄而乾歸果奔於姚興利鹿孤謂延曰不用卿言乾歸果叛卿為吾行也延追乾歸至河不及而還秃髪傉檀利鹿孤弟也既襲偽位將率衆攻北凉沮渠蒙遜太史令景保諌以天文不順難以伐人傉檀不聴果大敗景保為蒙遜所擒讓之曰卿眀於天文為彼國所任違天犯順智安存乎保曰臣匪為無智但言而不從蒙遜乃免之至姑臧傉檀謝之曰卿孤之蓍龜也而不能從孤之深罪封保安亭侯矜大君臣之序邦家之大倫也逆順之理存亡之要道也夫以王政不綱姦臣擅命挟桀黠之小智幸傾圯之大災謂神器可以力移以天命在乎已有去順效逆以臣代君借使懼而思危民猶弗與矧乃硜然自滿亡於何逃以神禹之茂功而納誨於矜伐以宣尼之上聖而見戒於驕奢况兹醜徳自蹈禍機有一於斯不敗奚待前凉張駿為凉州牧得玉璽於河其文曰執萬國建無極時駿盡有隴西之地士馬强盛雖稱臣於晉而不行中興正朔舞六佾建豹尾所置官僚府寺擬於王者而微異其名又分州西界三郡置沙州東界六郡置河州王府官僚莫不稱臣又於姑臧城南築城起謙光殿畫以五色飾以金玉窮極珍巧殿之四面各起一殿東曰宜陽青殿以春三月居之章服器物皆依方色南曰朱陽赤殿夏三月居之西曰政刑白殿秋三月居之北曰𤣥武黒殿冬三月居之其傍皆有直省内官寺署一同方色及末年任所逰處不復於四時而居後趙石勒僭即帝位因饗髙句麗宇文屋孤使酒酣謂中書令徐光曰朕方自古開基何等主也對曰陛下神武籌畧邁於髙皇雄毅卓犖超絶魏祖自三代以来無可比也其軒轅之亞乎勒笑曰人豈不自知卿言亦以太過朕若逢髙皇當北面而事之與韓彭競鞭而争先耳脫遇光武當並驅於中原未知鹿死誰手大丈夫行事當磊磊落落如日月皎然不能如曹孟徳司馬仲達父子欺他孤兒寡婦狐媚以取天下也朕當在二劉之間耳軒轅豈所擬乎其羣臣皆頓首稱萬嵗前秦苻堅僭即天王位引羣臣㑹議伐晉太子左衛率石越進言不可堅曰昔夫差威凌上國而為勾踐所滅仲謀澤洽全吳孫皓因三代之業龍驤一呼君臣面縛雖有長江其能固乎以吾之衆旅投鞭於江足斷其流後秦姚興僭即天王位時潁川太守姚平都自許昌来朝言於興曰劉裕敢懐姦計屯聚芍陂有擾邉之志宜遣燒之以散其衆謀興曰裕之輕弱安敢窺吾疆塲茍有姦心其在子孫乎召其尚書楊佛嵩謂之曰吳兒不自知乃有非分之意待至孟冬當遣卿率精騎三萬焚其積聚嵩曰陛下若任臣以此役者當從肥口濟淮直趨夀春舉大衆以屯城縱輕騎以掠野使淮南蕭條兵粟俱了足令吳兒俯仰回惶神爽飛越興大恱後蜀李夀僭即帝位其將李宏自晉奔於石季龍夀致書請之題曰趙王石君季龍不恱付外議之多有異同中書監王波議曰本李宏以死自誓若得反魂蜀漢當鳩率宗族混同王化若遣而果也則不煩一旅之師而坐定梁益就有進退豈有逃命一夫夀既號並日月跨僭一方今若制詔或敢酬反則取誚戎裔宜書答之并贈以楛矢使夀知我遐荒必臻也於是遣宏備物以酬之宏既至蜀漢夀欲誇其境内下令云羯使来庭獻其楛矢季龍聞之怒甚黜王波以白衣守中書監北凉沮渠蒙遜僭稱河西王下書曰古先哲以應期撥亂者莫不經畧八表然後光闡淳風孤雖智非靖難職在濟時而狡虜傉檀鴟峙舊京毒加夷夏東苑之戮酷甚長平邉城之禍害深獫狁每念蒼生之無辜是以不遑啓處身疲甲胄體倦風塵雖傾其巢穴傉檀尚未授首傉檀弟文支追項伯歸漢之義據彼重藩請為臣妾自西平已南連城繼順惟傉檀窮獸守死樂都四支既落命豈乆全五緯之㑹已應清一之期無餘方散馬金山黎元永逸可露布逺近咸使聞知夏赫連勃勃僭稱天王大單于時姚興鎮北叅軍王買得来奔勃勃謂買得曰朕大禹之後世居幽朔祖宗重暉常與漢魏為敵國中世不競受制於人逮朕不肖不能紹隆先搆今將應運而興復大禹之業卿以為何如買得曰自皇晉失統神器南移羣雄嶽峙人懐問鼎況陛下奕葉載德而不建成大業乎蜀王建陳州項城人唐末𨽻名於忠武軍秦宗權據秦州懸重賞以募之建始自行間得補軍候廣眀中黄巢陷長安僖宗幸蜀時梁祖為巢將領衆攻襄都宗權遣小校鹿晏𢎞從監軍楊復光率師攻之建亦預行是嵗復光入援京師眀年破賊收京城初復光以忠武軍八千人立為八都晏𢎞與建各一都校也復光死晏𢎞率八都迎扈行在至山南乃攻剽金商諸郡縣得兵數萬進逼興元莭度使牛叢奔城而去晏𢎞因自為留後以建等為屬郡刺史不令之任俄而晏𢎞正授莭鉞恐部下謀已多行忍虐由是部衆離心建與别將韓建友善晏𢎞益猜二建偽待之厚引入卧内二建懼夜登城慰守陴者因月下共謀所向謂韓建曰僕射甘言厚意疑我也禍難無日矣早宜擇利而行韓曰善因率三千人夜遁而去閩王昶天福四年十月庚戌昶威武軍莭度使王繼恭使僚佐鄭兀弼来朝貢其方物致書於執政曰閩國一從興建乆歴年華見北辰之星位頻移致東海之風帆多阻願言遐想文不逮誠餘遣邸吏林恩列狀申述壬子詔曰朕仰承天命肇啓帝圖黄屋非尊蒼生在念旰食宵衣而脩庶政推恩示信以御萬方要荒未綏責躬勤止誕慕文徳不􅄽夙心乃睠甌閩素惟藩翰王昶昨脩傾向来效貢輸朕亦釋以前非待之厚禮越羣方之常例崇列國之真風爰及繼恭並昇方伯不謂恃其險阻肆彼僣差矯誣上天狎侮君子左散騎常侍盧損等泛舟海陽持莭遐陬王昶自大自尊不迎不見寝停詔命脅辱使臣遣鄭弼再詣闕庭使林恩别陳狀訴隳君臣之事體希書札以徃来悖禮慢言長無畏忌朕顧惟寡昧䖍賀景靈所患徳之不修豈慮人之未服然以失道􅄽義引惡紊常神祗之心憤怒俱至是用懲其䟦扈何須振以威刑鄭元弼等處此亂邦罹兹虐政諒非獲已良可哀矜宜令所司切加安撫所齎文字及諸貢物不在通進并諸州綱運等勒林恩鄭元弼管押速歸兵部員外郎李知損等奏曰王昶僭踰名器嫚凟朝廷雖天罰之未行在國章而當正所頒詔命過示寛恩且匹夫犯法之贓尚猶徵納而遐裔不臣之物豈可放還伏請禁錮来人籍沒綱運帝可其奏林恩等即時下獄前蜀王衍襲父建偽位後唐莊宗同光二年七月遣户部侍郎歐陽彬朝貢稱大蜀皇帝上書大唐皇帝書詞旨驕怠三年八月戊辰客省使李嚴使蜀迴初帝令嚴市蜀中珍玩蜀法嚴峻不許竒貨東出其許市者謂之入草物嚴不獲珍貨歸而奏之帝大怒曰物歸中夏者命之曰入草王衍寜免為入草之人耶繇是伐蜀之意銳矣後蜀孟知祥後唐末帝清泰元年鳯翔進知祥来書稱蜀皇帝獻書於大唐皇帝且言見廹羣情以今年四月十二日即帝位帝不答漢劉陟僭稱於廣州改名襲又改名襲龑讀為儼古文無此字盖妄撰也每對北人自言家本咸秦恥為蠻夷之主又呼中國帝王為洛州刺史其妄自尊大皆此類也失䇿昔西晉之末羣胡亂華分裂土宇竊僭名號然而習獷悍之性當百六之㑹恃彼强暴大為虐害愎太史之切諫遽寘于刑感術士之狂言以至於敗棄人貴畜失河湟之奥壤背信殺降致巴氐之盡叛遂使士女塗於原野耕桑鞠為榛莽國祚短促覆於旋踵良有由哉前趙劉曜僭立其長水校尉尹車謀反潜結巴酋徐庫彭曜乃誅車囚庫彭等五千餘人於阿房將殺之光禄大夫游子逺固諌曜不從子逺叩頭流血曜大怒幽子逺而盡殺庫彭尸諸街巷之中十日乃投之於水於是巴氐盡叛推巴氐歸善王句渠為主四氐羗氐巴羯應之者三十餘萬闗中大亂後趙石勒僭位既得三臺乃以石季龍為魏郡太守鎮鄴三臺季龍簒奪之萌兆於此矣石季龍僭立將伐燕天竺佛圗澄進曰燕福徳之國未可加兵季龍作色曰以此攻城何城不克以此衆戰誰能禦之區區小豎何所逃也太史令趙攬固諌曰燕地嵗星所守行師無功必受其禍季龍怒鞭之黜為肥如長進師攻棘城旬餘不尅燕王慕容皝遣子恪率胡騎二千晨出挑戰諸門皆若有師出者四面如雲季龍大驚棄甲而遁冉閔僭立其將胡睦孫威為石琨所敗士卒畧盡睦威單騎而還琨等軍且至閔將出擊之衛將軍王泰等曰窮㓂狂迷希望外援今强救雲集欲吾出戰腹背擊我宜固壘勿出觀勢而動以挫其謀今陛下親戎如失萬全大事去矣請慎無出臣請率諸將為陛下滅之閔將從之道士法饒進曰太白經昴當殺胡王一戰百尅不可失也閔攘􅃑大言曰吾决矣敢諌者斬於是衆盡出戰姚襄恱綰石琨等三面攻之石祗衝其後閔師大敗閔潜於襄國行宫與十餘騎奔鄴降胡栗特康等執冉裔及左僕射劉琦等送於祗盡殺之司空石璞尚書令徐機車騎胡睦侍中李綝中書監盧諶少府王鬱尚書劉欽劉休等及諸將士死者十餘萬人於是人物殱矣賊盗蜂起司冀大饑人相食自季龍末年而閔盡散倉庫以樹私恩與𦍑胡相攻無月不戰青雍幽荆州徙户及諸氐𦍑胡蠻數百餘萬各還本土道路交錯互相殺掠且饑疫死亡其能達者十有二三諸夏紛亂無復農者閔悔之誅法饒父子支解之前秦苻堅既為晉師所敗諸軍悉潰惟慕容垂一軍獨全堅以千餘騎赴之垂子寳欲殺堅垂不從乃以兵屬堅收離散比至雒陽衆十餘萬百官威儀軍容粗備未及闗而垂有貳志說堅請巡撫燕岱并求拜墓堅許之權翼固諌以為不可堅不從尋懼垂為變悔之遣驍騎石越率卒三千戍鄴驃騎張蚝率羽林五千戍并州留兵四千配鎮軍蚝當戍雒陽後衛軍從事中郎丁零翟斌反於河南長樂公苻丕遣垂及苻飛龍討之垂南結丁零殺飛龍盡坑其衆遂叛後秦姚興僭立使中軍姚弼後軍斂成鎮逺乞伏乾歸等率歩騎三萬伐秃髪傉檀左僕射齊難等率騎二萬討赫連勃勃吏部尚書尹昭諌曰傉檀恃逺輕敢違逆宜詔蒙遜及李𤣥盛使自相攻擊待其斃也然後取之此卞莊之舉也興不從勃勃退保河曲弼濟自金城進㧞昌松長驅至姑臧傉檀嬰城固守出竒兵擊弼弼敗退據西苑興又遣衛大將軍姚顯率騎二萬為諸莭度至髙平聞弼敗績兼道赴之撫慰河外率衆而還傉檀遣使人徐宿詣興請罪齊難為勃勃所擒後秃髪傉檀獻興馬三千匹羊三萬頭興以為忠於已乃署傉檀為凉州刺史王尚還長安凉州人申屠英等二百餘人遣主簿胡威詣興請留尚興弗許引威見之威流涕謂興曰臣州奉國五年王威不接銜膽棲氷孤城獨守者仰恃陛下威靈俯仗良牧恵化忽違天人之心以華土資狄若傉檀才望應代臣豈敢言竊聞乃以臣等貿馬三千匹羊三萬口如所𫝊實者是為棄人貴畜茍以馬供軍國直煩尚書一符三千餘家户輸一匹朝下夕辦何故以彼方華土委此姦胡昔漢武傾天下之資開建河西隔絶諸戎斷匈奴右臂所以終能屠大宛王毋寡今陛下方布政玉門流化西域奈何以五郡之地資之獫狁忠誠華族棄之虐虜非但臣州里塗炭懼方為聖朝旰食之憂興乃遣西平人車普馳止王尚又遣使喻傉檀㑹傉檀已至姑臧普以狀先告之傉檀懼脅遣王尚遂入姑臧後涼吕纂既僣位將伐秃髪利鹿孤中書令楊頴諌曰夫起師動衆必參之天人茍非其時聖賢所不為秃髪利鹿孤上下用命國未有釁不可以伐宜繕甲養銳觀課農殖待可乘之機然後一舉蕩滅比年多事公私罄竭不深根固本恐為患將来願抑赫斯之怒思萬全之筭纂不從度浩亹河為鹿孤弟傉檀所敗後蜀李雄僭位初楊難敵之奔葭萌也安北李稚厚撫之縱其兄弟還武都難敵遂恃險多為不法稚請討之雄遣中領軍琀及將軍樂次費他李乾等繇白水橋攻下辨征東李夀督琀弟玝攻隂平難敵遣軍拒之夀不得進而琀稚長驅至武街難敵遣兵斷其歸道四面攻之獲琀稚死者數千人琀稚雄兄蕩之子也雄深悼之不食者數日言則流涕深自咎責焉册府元龜卷二百三十三
