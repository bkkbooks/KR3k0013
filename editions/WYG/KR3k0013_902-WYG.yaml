body:
  text: 册府元龜卷九百二宋王欽若等撰總録部貧安貧貧洪範六極其四曰貧困於財之謂也仲尼亦曰貧與賤是人之所惡此言其難處也又曰貧而無怨難此言其多有也在昔先民亦有徳充而道富言忠而行篤或乃家無擔石室如環堵樵蘇不給藜藿苦饑席户以蔽風雨緼袍以禦寒沍耕而為業僕賃以取資以至假貸無獲宦游益困屈志於鄙事盡瘁於力作并日而食徒行以出士之窮也乃至於是其或命運亨㑹勲名崇建出幽遷喬先約後泰者盖不乏焉至有棲遲末路終然淪没者斯子夏所謂富貴在天良有數存乎其中爾叔孫敖為楚相死其子窮困負薪寗戚衛人欲仕齊家貧無以自資乃賃為人推車飲牛扣牛角而歌後為齊大夫晏嬰字平仲齊大夫方食景公使使者至分食食之使不飽晏子亦不飽使者反之公曰晏子如此貧乎使致千金以奉賔客顔無繇字路路子顔囘顔囘死顔路貧請孔子車以葬賣以作椁孔子曰才不才亦各言其子也鯉也死有棺而無椁鯉孔子子也字伯魚吾不徒行以為之椁以吾從大夫之後不可徒行也卜商字子夏魏人衣若懸鶉後為魏文侯師孔伋字子思夫子之孫也居於衛緼袍無裏三旬九食馮煖齊人貧乏不能自存使人屬齊相孟嘗君願寄食門下孟嘗君曰客何能也對曰無能孟嘗君笑而受之漢酈食其陳留髙陽人好讀書家貧落魄無衣食業為里監門吏後號廣野君周勃其先卷人也卷縣名也地理志屬河南音丘權切徙沛勃以織薄曲為生葦薄為曲也常為人吹簫給䘮事後為右丞相陳平少時家貧有田三十畝與兄伯居伯嘗耕田縱平使游學平為人長大美色人或謂平曰貧何食而肥若是其嫂疾平之不視家産曰亦食糠覈爾覈麥糧中不破者也覈音紇京師人謂麄屑為紇頭有叔如此不如無有伯聞之逐其婦而棄之平家貧負郭窮巷負謂借也以敝席為門然門多長者車轍位至丞相韓信家貧無行不得推擇為吏無善行可推舉選擇也又不能治生為商賈行賣曰商坐販曰賈嘗從人寄食後為淮隂侯魏勃少時欲求見齊相曹參家貧無以自通乃嘗獨早夜掃齊相舍人門外後為齊王内史東郭先生拜為都尉先生久待詔公車貧困饑寒衣敝履不完行雪中履有上無下足盡踐地道中人笑之司馬相如字長卿為武騎常侍因病免客游梁梁孝王薨相如歸而家貧無以自業素與臨卭令王吉相善吉曰長卿久宦游不遂而困遂達也来過我於是相如往舍都亭臨卭所治都下之亭臨卭富人卓王孫有女文君新寡夜亡奔相如相如乃與馳歸成都家徒四壁立徒空也但有四壁更無資産文君久之不樂謂長卿曰苐俱如臨卭苐但也從昆弟假貸猶足以為生何至自苦如此相如與俱之臨卭盡賣其車騎買一酒舍乃令文君當壚賣酒之家累土為壚以居酒瓮四面隆起其一面髙形如鍜壚也相如身著犢鼻褌即今之松形似犢鼻松音之容切與保庸雜作滌器於市中滌洒也器食器也食已則洒之賤人之役也倪寛治尚書受業孔安國貧無資用嘗為弟子都養時行賃作帯經而鋤後為御史大夫主父偃遊齊諸子間相與排擯不容於齊家貧假貸無所得北遊燕趙中山皆莫能厚客後為齊相公孫𢎞菑川薛人少時為獄吏有罪免家貧牧豕海上位至丞相胡逮守軍正丞貧無車馬嘗歩與走卒起居蔡義河内温人以眀經給事大將軍幕府家貧嘗歩行資禮不逮衆門下好事者相合為義買犢車令乗之後位至丞相王章字仲卿為諸生學長安獨與妻居章疾病無被卧牛衣中牛衣編亂麻為之與妻决涕泣自謂將死故决涕泣其妻呵怒之曰仲卿亰師尊貴在朝廷人誰踰仲卿者今疾病困戹不自激昻乃反涕泣何鄙也終為京兆尹貢禹字少翁遷光禄大夫上書曰臣禹年老貧窮家貲不滿萬錢妻子糠豆不贍裋褐不完裋者謂僮豎所著布長襦也褐毛布之衣也裋音豎有田百三十畝陛下過意徴臣過猶誤也臣賣田百畝以供車馬陳湯少時家貧匄貸無節不為州里所稱西至長安求官得太官獻食丞匡衡字稚圭東海丞人丞音證父世農夫至衡好學家貧傭作以供資用傭作言賣功傭為人作役而受僱也位至丞相揚雄以病免復召為大夫家資貧嗜酒人希至其門時有好事者載酒以從遊學張竦居貧無賔客時有好事者從之質疑問事論道經書而已及王莽時為郡守封侯後漢許荆字少張家貧無有船車休假嘗單歩荷擔上下後徴諫議大夫卒劉梁宗室子孫而少孤貧賣書於市以自資卒為野王令班超與母至雒陽家貧嘗傭書以供養後位至射聲校尉侯瑾少孤貧依宗人居性篤學常傭作為資暮還輙㸐柴以讀書累召公車有道徴並稱疾不起申屠蟠字子龍家貧傭為漆工郭林宗見而竒之累徴不起卒於家張楷字公超家貧無以為業嘗乗驢車至縣賣藥足給食者輙還鄉里後徴長陵令不至官遂隠居𢎞農山中桓榮字春卿少學長安貧窶無資嘗傭以自給精力不倦官至太常周紆為渤海太守免歸家貧無以自賑贍身築壍以給食章帝知憐之復以為郎檀敷補蒙令以郡守非其人棄官去家無産業子孫同衣而出并日而食馬騰字夀成馬援孫也桓帝時其父字子碩嘗為天水蘭干尉後失官因留隴西與羌錯居家貧無妻遂娶羌女生騰騰少貧無産業嘗從障山中斫材木販詣市以自供給范丹為萊蕪長不到官後辟太尉府嘗徒行敝服賣卜於市遭黨人禁錮遂推鹿車載妻子捃拾自資或寓息客廬或依宿樹䕃如此十餘年乃結草室而居焉孫期少為諸生家貧事母至孝牧豕於大澤中以奉養後司徒黄琬特辟不行卒於家李充家貧兄弟六人同衣遞食以髙行聞後為左中郎將施延字君子家貧母老嘗鬻力供養種𤓰自給位至太尉符融妻亡貧無殯斂鄉人欲為具棺服融不肯受後州郡禮請公府連辟皆不應閔仲叔安居安邑老病家貧不能得肉日買猪肝一片屠者或不肯與安邑令聞勑市吏常給焉後買輙得仲叔聞知其狀乃歎曰閔仲叔豈以口腹累安邑耶遂去客沛魏常林少單貧自非手力不取之於人卒為光禄大夫程堅居貧無資磨鏡自給不受人施裴潛每之官不將妻子妻子貧乏織蔾茈以自供羣弟之田廬嘗歩行家人小大或并日而食後為光禄大夫崔林除鄔長貧無車馬單歩之官楊沛前後宰歴城守不以私計介意又不肯以事貴人故身退之後家無餘積治疾於家借舍從兒無他奴婢後占河南夕陽亭部荒田二頃起蝸牛廬居止其中其妻子凍餓沛病亡鄉人親友故吏民為殯葬也吳闞澤字徳潤好學居貧無資嘗為人傭書以供紙筆位至太子太傅中書令潘璋性嗜酒居貧性好賖貸輙言後豪富相還後為右將軍晉祖納有操行少孤貧嘗自炊㸑以供母後官至光禄大夫葛洪字稚川少好學家貧窮自伐薪以買紙筆夜輙寫書誦習以儒學知名元帝為丞相辟為掾吳隠之為奉朝請謝石請為衛軍主簿隠之將嫁女石知其貧素遣女必當率薄乃令移厨帳助其經營使者至方見婢牽犬賣之此外蕭然無辦官至度支尚書中領軍魏詠之字長道任城人家世貧素而躬耕為事好學不倦後為荆州刺史南蠻校尉李充字宏度為征北將軍褚裒參軍充以家貧苦求外出裒將許之為縣試問之充曰窮猨投林豈暇擇木乃除剡縣令阮脩字宣子王敦時為鴻臚卿謂脩曰卿嘗無食鴻臚丞差有禄能作不脩曰亦復可爾耳遂為之王猛字景畧家于魏郡少貧賤以鬻畚為業嘗貨畚於雒陽後事符堅為丞相中書監宋劉伯龍少而貧薄及長歴位尚書左丞少厯武陵太守貧窶尤甚嘗在家慨然召左右將營什一之方忽見一鬼立傍撫掌大笑伯龍歎曰貧窮固有命乃復為鬼所笑也遂止戴法興㑹稽山隂人家貧父碩子以販紵為業法興少賣葛於山隂市後為越騎校尉顔延之瑯琊臨沂人少孤貧屏居里巷不預人間者十載中書令王球名公子延之居嘗罄匱球輙分財贍之後為金紫光禄大夫湘東王師南齊崔懐慎清河東武城人父耶利魯郡太守宋元嘉中没虜至泰始初因淮北陷没遂入北至桑乾尋父父已卒䘮畢又以弟在南齊建元初又逃歸而弟亦已亡懐慎孤貧獨立宗黨哀之日斂給其升米永眀中卒張緒為國子祭酒死之日無宅以殯王智深為竟陵王司徒叅軍坐事免家貧無人事嘗餓五日不得食掘莞根食之司空王僧䖍及子志分與衣食卒於家張融為宋新安王子鸞行叅軍孝武起新寺僚佐多襯錢帛融獨襯百錢帝曰融殊貧當序以佳禄出為封溪令王延之為司空左長史清貧居宇穿漏禇淵往候之見其如此具啟眀帝即勑材官為起三間齋屋周山圖字季寂少貧㣲傭書自業後為黄門郎領羽林監梁沈崇傃字思整吳興武康人六嵗丁父憂傭書以養母及母卒家貧無以遷厝乃行乞經年始獲葬焉太守栁惲初辟為主簿蕭眎素早孤貧為叔父恵休所收䘏後起家司徒法曹行叅軍劉訏平原人家甚貧苦併日而食隆冬之月或無氊絮訏處之晏然人不覺其饑寒也後刺史張稷辟為主簿訏聞而逃匿事息乃還於家阮孝緒家貧無以㸑僮妾竊隣人樵以繼火孝緒知之乃不食更令撤屋而炊所居室惟有一鹿牀以樹環繞天監十二年詔徴不起陳張種初仕梁為中軍宣城王府主簿種時年已四十餘家貧求為始豐令謝僑素貴嘗一朝無食其子啟欲以班史質錢答曰寧餓死豈可以此充食乎後魏張蒲為南中郎將太武以蒲清貧妻子衣食不給乃出為相州刺史闞駰燉煌人博通經傳聰敏過人為沮渠牧犍姑臧太守入亰師家甚貧不免饑寒性能多食一飯至三升乃飽傅永自東陽禁防為崔道固城局叅軍與道固俱降入為齊民父母並老饑寒十數年賴其强於人事戮力傭丐得以存立北齊杜弼㓜聰敏家貧無書年十二寄郡學受業後為膠州刺史隋虞世基仕陳為尚書左丞及陳滅歸國為通直郎直内史省貧無産業每傭書養親怏怏不平嘗為五言詩以見意情理悽切世以為工作者莫不吟咏唐韓思復初為汴州司户叅軍丁憂家貧鬻薪以終䘮制吕諲蒲州河東人少孤貧不能自振里人程震重其才厚與資給遂游亰師後位至黄門侍郎同中書門下髙適好學以詩知名濩落不事家産僑居梁宋間薄遊州縣求丐取給後為左散騎常侍許康佐擢進士第以家貧母老求為知院官人或恠之笑而不答盖不擇禄而養親也後為禮部尚書李建字杓直家素清貧無餘業與兄造遜於荆南躬耕致養後官至刑部侍郎周楊凝式晉末以禮部尚書致仕開運中宰相桑維翰知其絶俸艱於家食奏拜太子少保尋分司於雒安貧夫貧者士之常孔子曰士志於道而恥惡衣惡食者未足與議也是故賢者樂道君子不憂安徳而忘貧好禮而不懾雖曲肱飲水其樂只且在甕牖繩樞何賤之有至乃韜光處晦研精篤學居四壁之陋無卒嵗之儲誦墳典以自得秉耒耜而忘倦甘於煩辱曽不屑慮非夫造聖哲之域藴道徳之富則何以在窮能固立志不囘無隕穫之累而成名於世者哉傳所謂一畝之宫而無諂仕詩之述衡門之下可以棲遲斯可尚矣顔囘字子淵魯人一簞食一瓢飲簞笥也在陋巷人不堪其憂囘也不改其樂原憲字子思魯人居環堵之室茨以生草蓬户甕牖桑以為樞上漏下濕匡坐而絃歌子貢聞之乗肥馬衣輕裘中紺而表素巷不容軒往見原憲憲楮冠藜杖而應門正冠則纓絶捉襟則肘見納履則踵决子貢曰嘻先生何病也原憲仰而應之曰憲聞之無財之謂貧學而不能行之謂病憲貧也非病也夫希世而行比周而友學以為人教以為已仁義之慝車馬之飾衣裘之麗憲不忍為也子貢逡巡面有慙色不辭而去原憲乃徐歩曳杖歌商頌而反聲淪於天地如出金石天子不得而臣也諸侯不得而友也仲由字子路孔子弟子孔子曰衣敝緼袍與衣狐貉者立而不恥者其由也與漢朱買臣字翁子吳人也家貧好讀書不治産業嘗艾薪樵賣以給食艾讀曰刈給供也擔束薪行且讀書其妻亦負戴相隨數止買臣毋歌嘔道中嘔讀曰謳買臣愈益疾歌妻羞之求去買臣笑曰我年五十當富貴今已四十餘矣女苦日久待我富貴報女功女皆讀曰汝妻恚怒曰如公等終餓死溝中耳何能富貴買臣不能留即聽去後買臣獨行歌道中負薪墓間故妻與夫家俱上塚見買臣饑寒呼飯飲之後拜中大夫侍中出為㑹稽太守揚雄字子雲蜀郡成都人也清靜亡為少耆欲耆讀曰嗜不汲汲於富貴不戚戚於貧賤汲汲欲速之義如井汲汲為也不脩㢘隅以徼名當世徼要也徼字或作激激法也家産不過十金乏無擔石之儲晏如也自有大度非聖哲之書不好也非其意雖富貴不事也䧺後為郎給事黄門轉為大夫後漢袁安字邵公汝南汝陽人也時大雪積地丈餘洛陽令自出案行見人家皆除雪出有乞食者至袁安門無有行路謂安已死令人除雪入户見安僵卧問何以不出安曰大雪人皆餓不宜干人令以為賢舉為孝㢘劉陶字子竒潁川人建武中徙六郡大族陶曽祖自齊来世以儒學安貧樂道故仕不過孝㢘宰府孔嵩字仲山南陽人家貧親老乃變姓名傭為新野阿里街卒友人范式為荆州刺史行部到新野而縣選嵩為導騶迎式式見而識之呼嵩把臂謂曰子非孔仲山耶對之歎息語及平生曰昔與子俱曳長裾遊息帝學吾蒙國恩致位牧伯而子懐道隠身處於卒伍不亦惜乎嵩曰昔侯嬴長守於賤業晨門肆志於抱闗子欲居九夷不患其陋貧者士之宜豈為鄙哉式勑縣代嵩嵩以為先傭未竟不肯去吳祐陳留長垣人年二十䘮父居無擔石而不受贍遺嘗牧豕於長垣澤中行吟經書遇父故人謂之曰卿二千石子而自業賤事縱子無恥奈先君何祐辭謝而已守志如初後舉孝㢘崔寔瑗之子也父卒剽賣田宅起塜塋立碑頌葬訖資産竭盡因窮困以酤釀販鬻為業時人多以此譏之寔終不改亦取足而已不致盈餘及仕宦歴位邊郡而愈貧薄韋彪扶風平陵人舉孝㢘除郎中以病免復歸教授安貧樂道恬於進退竇章字伯向少好學有文章安帝永初中三輔遭羗寇避難東國家於外黄外黄縣屬陳留郡城在今汴州雍丘縣東居貧蓬户蔬食躬勤孝養然講讀不輟李恂為武威太守後坐事免歩歸鄉里潛居山澤結草為廬獨與諸生織席自給向長隠居不仕性尚中和好通老易貧無資食好事者更饋焉受之取足而反其餘范冉冉或作丹字史雲除莱蕪長不到官所止單陋有時絶粒窮居自若言貌無改閭里歌之曰甑中生塵范子雲釜中生魚范莱蕪蜀譙周字允南㓜孤與母兄同居既長躭古篤學家貧未嘗問産業誦讀典籍欣然獨笑以忘寢食後封陽城亭侯吳謝淵字休徳少脩徳操躬秉耒耜既無戚容又不易慮繇是知名舉孝㢘晉嵇康性絶巧而好鍜宅中有一栁樹甚茂乃激水圜之每夏月居其下以鍜康居貧嘗與向秀共鍜於大樹之下以自贍給官至中散大夫劉惔少清逺有標竒與母任氏寓居亰口家貧織芒屩以為養雖蓽門陋巷晏如也後為丹陽尹成公綏字子安東郡白馬人性寡欲不營資産家貧嵗饑常晏如也桓彛字茂倫譙國龍亢人漢五更榮之世孫也彛少孤貧雖簞瓢處之晏如也後以功封萬寧縣丹陽尹王述字懐祖安貧守約不求聞達位至征虜將軍散騎常侍尚書令吳隠之為廣州刺史有清操及歸京師數畝小宅籬垣仄陋内外茅屋六間不容妻子宋髙祖時為太傅賜車牛更為起宅固辭前趙陳元達少而孤貧嘗躬耕兼讀書樂道行詠忻忻如也至年四十不與人交通劉元海徴為黄門郎宋陶潛字淵眀柴桑人性嗜酒而家貧不能恒得親舊知其如此或置酒招之造飲輙盡期在必醉既醉而退曽不吝情去留環堵蕭然不蔽風日裋褐穿結簞瓢屢空晏如也嘗為彭澤令解印綬去張興世竟陵人少家貧南郡宗珍之為竟陵郡與世依之為客竟陵舊置軍府以補叅軍督䕶不就沈道䖍吳興武康人郡州府凡十二命皆不就年老莱食恒無經日之資而琴書為樂孜孜不倦文帝𠡠郡縣使隨時資給沈慶之吳興武康人荒擾之後鄉邑流散慶之躬耕隴畝勤苦自立位至侍中太尉後魏劉芳字伯支彭城人也年十六時南部尚書李敷妻司徒崔浩之弟女芳祖母浩之姑也芳至亰師詣敷門崔恥芳流播拒不見之芳雖處窮窘之中而業尚貞固至有易衣并日之弊而澹然自守不急急於榮利不戚戚於貧賤乃著窮通論以自慰焉位至太常卿後周黎景熈字季眀河間鄴人少以字行西魏大綂末為著作佐郎於時倫軰皆位兼常伯車服華盛唯季眀獨以貧素居之而無愧色隋李文博博陵人性貞介好學不倦為薛道衡所知後直秘書内省典校墳籍守道居貧晏如也雖衣食乏絶而清操逾厲不妄通賔客恒以禮法自處儕軰莫不敬焉道衡知其貧毎延于家給以資費房彦謙居官所得俸禄以周恤親友家無餘財車服器用務存素儉自少及長一言一行未嘗渉私雖致屢空怡然自得常從容獨笑顧謂其子𤣥齡曰人皆因禄富我獨以官貧所遺子孫在於清白卒為涇陽令唐崔從字子乂與次兄能同隠太原山居勵志學業窮困至於絶食不以告人李藩年四十餘未仕讀書揚州困於自給妻子怨尤之晏如也後至相位李遜㓜孤寓居江陵與其弟建皆安貧苦易衣併食講習不倦官至刑部尚書後漢李愚隨計之長安唐昭宗天復初駕在鳯翔汴軍攻蒲華入闗愚避難東歸雒陽時衛公李徳裕孫道古在平泉舊墅愚往依焉子弟親採薪以給朝夕未嘗千人後至相位周翟光鄴太祖時位至宣徽使兼樞密副使食禄日久家無餘財任金吾日假官屋數間以蔽風雨親屬累重糲食纔給人不堪其憂光鄴處之晏如也册府元龜卷九百二
