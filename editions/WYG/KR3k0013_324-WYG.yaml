body:
  text: 册府元龜卷三百二十四宋王欽若等撰宰輔部薦賢夫稱善舉類春秋之格訓推賢援能儒者之篤行矧夫居衡石之任當燮諧之重掌邦國之政贊后王之治總領衆職平章百姓必在乎登良擢俊振淹出滯俾風人絶薖軸之嘆士子適輪轅之用不遺賢於中谷不藉才於異代此所以成舜湯選衆舉仁之美茂尹旦格天光海之業者也三代而上其詳靡記繇漢以下未嘗乏焉莫不隆體國之志竭知人之鑒或以樹巍巍之績或以成彬彬之盛蓋夫寅亮之功將眀之烈曷以加於是乎漢蕭何初為漢王丞相韓信數與何語何竒之至南鄭諸將道亡者數十人信度何等已數言度計量也上不我用即亡何聞信亡不及以聞自追之人有言上曰丞相何亡帝怒如失左右手居一二日何來謁帝且怒且喜罵何曰若亡何也若汝也何曰臣非敢亡追亡者耳帝曰所追者誰也曰韓信帝復罵曰諸將亡者以十數公無所追追信詐也何曰諸將易得至如信國士無䨇為國家之竒士王必欲長王漢中無所事信無事用信必欲争天下非信無可與計事者顧王策安决顧思念也王曰吾亦欲東耳安能鬱鬰久居此乎何曰王計必東能用信信即留不能用信信終亡耳王曰吾為公以為將何曰雖為將信不留王曰以為大將何曰幸甚於是召信拜之田蚡為丞相徵茂陵尉張湯為吏薦補侍御史張湯為御史大夫薦其掾兒寛於天子天子見問說之初寛以試第次補廷尉史是時湯方鄉學以為奏讞掾以古法議决疑大獄而愛幸寛寛為人温良有廉智自將而善著書書奏敏於文口不能發明也湯以為長者數稱譽之及是以寛為掾復薦之霍光昭帝初為大將軍秉政以光禄大夫張安世篤行篤厚也光親重之㑹左將軍上官桀父子及御史大夫桑𢎞羊皆與燕王蓋主謀反誅光以朝無舊臣白用安世為右將軍光禄勲以自副焉魏相為御史大夫霍光薨後數月相上封事曰聖王褒有徳以懐萬方懐來也顯有功以勸百寮是以朝廷尊榮天下鄉風國家承祖宗之業制諸侯之重新失大將軍宜宣章盛徳以示天下顯眀功臣以填藩國毋空大位以塞争權大臣位空則起争奪之權也所以安社稷絶未萌也未萌謂變故未生者也車騎將軍安世事孝武皇帝三十餘年忠信謹厚勤勞政事夙夜不怠與大將軍定策天下受其福國家重臣也宜尊其位以為大將軍毋令領光禄勲事使專精神憂念天下思惟得失後數日拜安世大司馬車騎將軍録尚書事丙吉為相病篤宣帝自臨問吉曰君即有不諱誰可以自代者不諱言死不可復言也吉辭謝曰羣臣行能眀主所知愚臣無所識帝固問吉頓首曰西河太守杜延年眀於法度曉國家故事前為九卿十餘年今在郡治有能名廷尉于定國執憲詳平天下自以不寃太僕陳萬年事後母孝敦厚備於行止此三人能皆在臣右唯上察之帝以吉言皆是許焉蕭望之為御史大夫除薛廣徳為屬數與論議器之以為大器也薦廣徳經行宜充本朝經眀行脩宜於本朝任職也為博士論石渠石渠閣名也何武為大司空除彭宣為西曹掾甚敬重焉薦宣為諫大夫又龔勝為重泉令去官武與執金吾閻崇薦勝哀帝自為定陶王固已聞其名徵為諫大夫武為人仁厚好進士奬稱人之善為楚内史厚兩龔在沛厚兩唐兩龔龔勝龔舍也兩唐唐林唐遵也及為公卿薦之朝廷此人顯於世者何侯之力也世以此多之又與尚書令唐林皆上書言傅喜行義脩潔忠誠憂國内輔之臣也今以寢病一旦遣歸衆庻失望皆云傅氏賢子以論議不合於定陶太后故退百寮莫不為國恨之夫忠臣社稷之衛魯以季友治亂謂季氏亡則魯不昌楚以子玉重輕謂楚誤殺子玉而晉侯喜可知而魏以無忌折衝信陵君項以范增存亡故楚跨有南服帶甲百萬鄰國不以為難子玉為將則文公側席而坐及其死也君臣相慶百萬之衆不如一賢故秦行千金以間廉頗漢散萬金以疏亞父喜立於朝陛下之光輝傅氏之廢興也帝亦自重之眀年正月乃徙師丹為大司空而拜喜為大司馬封髙武侯張忠為御史大夫署潁川孫寶為主簿上書薦寶經眀質直宜備近臣為議郎遷諫大夫王嘉為丞相薦儒者公孫光滿昌及能吏蕭咸薛脩等皆故二千石有名稱天子納而用之張禹為丞相舉彭宣為愽士遷東平太守禹以帝師見尊信薦宣經眀有威重可任政事繇是入為右扶風孔光為御史大夫舉東平王太傅師丹議論深愽廉正守道徵入為光禄大夫丞相司直數月復為光禄大夫給事中繇是為少府光禄勲侍中甚見尊重王根為大司馬驃騎將軍是時多灾異根輔政數虛已問平陵人李尋尋見漢家有中衰阨㑹之象其意以為且有洪水為灾乃說根以物盛必衰自然之理唯有賢友彊輔庻幾可以保身命全子孫安國家根於是薦尋哀帝初即位召尋待詔黄門王音為大司馬車騎將軍時揚雄年四十餘自蜀來至游京師音竒其文雅召以為門下史薦雄為待詔後漢吳漢為大司馬時太山豪傑多擁衆與張歩連兵漢言於帝曰非陳俊不能定此郡於是拜俊太山太守行大將軍事張歩聞之遣其將擊俊戰於嬴下俊大破之追至濟南收得印綬九十餘稍攻下諸縣遂定太山宋𢎞為大司馬推進賢士馮翊桓梁三十餘人或相及為公卿者光武嘗問𢎞通愽之士乃薦沛國桓譚才學洽聞幾能及揚雄劉向父子於是召譚拜議郎給事中又髙詡以信行清操知名王莽篡位父子稱盲逃不仕光武時𢎞薦詡徵為郎趙熹為太傅時魯恭與議白虎觀熹舉恭直言待詔公車拜中牟令范遷為司徒薦豐令牟融忠正公方經行純備宜在本朝并上其理狀第五倫為司徒時擢謝夷吾為鉅鹿太守倫令班固為文薦夷吾曰臣聞堯登稷契政隆太平舜用臯陶政致雍熈殷周雖有髙宗昌發之君猶賴傅說吕望之策故能克崇其業允恊大中竊見鉅鹿太守㑹稽謝夷吾出自東州厥土塗泥而英姿挺特竒偉秀出才兼四科行包九徳仁足濟時智周萬物加以少膺儒雅韜含六籍推考星度綜校圖録探賾聖祕觀變歴徵占天知地與神合契據其道徳以經王務昔為陪𨽻與臣從事奮忠毅之操躬史魚之節董臣嚴綱朂臣懦弱得以免戾寔賴厥勲及其應選作宰惠敷百里降福彌異流化若神爰牧荆州威行邦國奉法作政有周召之風居儉履約紹公儀之操尋功簡能為外臺之表聽聲察實為九伯之冠遷守鉅鹿政合時雍徳量績謀有伊吕管晏之任闡𢎞道奥同史蘇京房之倫雖宻勿在公而身出心隱不殉名以求譽不馳騖以要寵念存遜遁演志箕山方之古賢寔有倫序採之於今超然絶俗誠社稷之元龜大漢之棟甍宜當拔擢使登鼎司上令三辰順軌於歴象下使五品咸訓于嘉時必致休徵克昌之慶非徒循法奉職而已臣以頑駑器非其儔尸禄負乗夕惕若厲願乞骸骨更授夷吾上以光七曜之眀下以厭率土之望庻令微臣塞咎免悔張禹為太尉時周防受古文尚書撰尚書雜記三十二篇禹薦補愽士又薦寒朗為愽士張酺為太尉薦魏郡太守徐防自代帝不許劉愷為司徒時陳忠為廷尉正以才能有聲稱愷舉忠眀習法律宜備機宻於是擢拜尚書使居三公曹成帝置五尚書三公曹尚書主知斷獄也張皓為司空在事多所薦逹天下稱其推士黄瓊為司空先是崔寔為議郎㑹梁冀誅寔以故吏免官禁錮數年時鮮卑數犯邊詔三公舉威武謀畧之士瓊薦寔拜遼東太守瓊為太尉時尚書楊秉以病乞退出為右扶風瓊惜其去朝廷上言秉勸講帷幄不宜外遷留拜光禄大夫李固為太尉時陳蕃公府辟舉方正皆不就固表薦徵拜議郎陳蕃為太尉王暢為漁陽太守免官是時政事多歸尚書桓帝特詔三公令髙選庸能蕃薦暢清方公正有不可犯之色繇是復為尚書後蕃為太傅辟何休與參政事种暠為司徒推逹名臣橋𤣥皇甫規等楊秉為太尉時陳球為侍御史桂楊黠賊李研等羣聚冦鈔陸梁荆部州郡懦弱不能禁秉表球為零陵太守球到設方畧朞月間賊虜消散楊賜為太尉時光禄勲黄琬坐事禁錮被廢棄幾二十年靈帝光和末賜上書薦琬有撥亂之才繇是徵拜議郎擢青州刺史遷侍中魏華歆為司徒黄初四年詔公卿舉獨行君子歆薦管寧詔以寧為大中大夫固辭不受時明帝即位為太尉歆遜位讓寧又以鄭小同有美名歆表曰臣聞勵俗宣化莫先於表善班禄叙爵莫美於顯名是以楚人思子文之治復命其裔漢世嘉江公之徳用顯其世伏見故漢大司農北海鄭𤣥當時之季名冠華夏為世儒宗文皇帝旌録先賢拜𤣥適孫小同以為郎中長假在家小同年踰三十少有令質學綜六經行著郷邑海岱之人莫不嘉其自然美其器重迹其所履有質直不渝之性然而恪恭静黙色養其親不治可見之美不競人間之名斯誠清時所宜式叙前後眀詔所斟酌而求也臣老病委頓無益視聽謹具以聞陳羣為司空薦管寧曰臣聞王者顯善以消惡故湯舉伊尹不仁者逺伏見徵士北海管寧行為世表學任人師清儉足以激濁貞正足以矯時前雖徵命禮未優備昔司空荀爽家拜光禄先儒鄭𤣥即授司農若加備禮庻必可致至延西序坐而論道必能昭眀古今有益大化王朗為司空黄初中鵜鶘集靈芝池詔公卿舉獨行君子朗薦光禄大夫楊彪且稱疾讓位於彪帝乃為彪置吏卒位次三公詔曰朕求賢於君而未得君乃翻然稱疾非徒不得賢更開失賢之路増玉鉉之傾無乃居其室出其言不善見違於君子乎君其勿有後辭朗乃起蜀諸葛亮為丞相時後主嗣位亮將北征住漢中慮後主富於春秋朱紫難别以董允秉心公亮欲任以宫省之事上疏曰侍中侍郎郭攸之費禕董允等先帝簡拔以遺陛下至於斟酌規益進盡忠言則其任也愚以為宫中之事事無大小悉以咨之必能裨補闕漏有所廣益若無興徳之言則戮允等以彰其慢亮尋請禕為㕘軍允遷為侍中領虎賁中郎將統宿衛親兵攸之性素和順備貟而已獻納之任允皆專之矣又蔣琬亮長史亮每言琬託志忠雅宻表後主曰臣若不幸後事宜以付琬晉張華為司空時陳夀遭父䘮有疾使婢丸藥客徃見之鄉黨以為貶議及蜀平坐是沉滯者累年華愛其才以夀雖不逺嫌原情不至貶廢舉為孝廉除著作郎華將舉夀為中書郎荀朂忌華而疾夀遂諷吏部遷夀為長廣太守辭以母老不就杜預將之鎮復薦之於帝宜補黄散繇是授御史治書王渾為司徒時周馥累遷司徒左西屬渾表馥理職清正兼有才幹主定九品簡括精詳臣委任責成褒貶允當請補尚書郎許之王導隨元帝渡江鎮建康導為政清静尤見委仗情好日隆朝野傾心號為仲父帝從容問導曰卿吾之蕭何也對曰昔秦為無道百姓厭亂巨猾陵暴人懐漢徳革命反正易以為功自魏氏以來迄于太康之際公卿世族豪侈相髙政教陵夷不遵法度羣公卿士皆饜於安息遂使姦人乗釁有虧至道然否終斯泰天道之常大王方立命世之勲一匡九合管仲樂毅於是乎在豈區區微臣所可擬議願深𢎞神慮廣擇良能顧榮賀循紀瞻周玘皆南士之秀願盡優禮則天下安矣帝納焉又何充為丹陽尹導與庾亮並言于帝曰何充器局方槩有萬夫之望必能摠録朝端為老臣之副臣死之日願引充内侍則外舉唯緝社稷無虞矣繇是加充吏部尚書進號冠軍將軍温嶠為中書令嶠為棟梁之任帝親而倚之以祖納州里父黨敬而拜之嶠既為時用盛言納有名理除光禄大夫謝安為太傅時東筦人徐邈下帷讀書不游城邑及孝武帝始覽典籍招延儒雅之士邈既東州儒素安舉以應選年四十四始補中書舍人宋王𢎞永平中為江州刺史時徐傅當權出鄭鮮之為豫章太守𢎞竊謂人曰鄭公徳素先朝所禮方之前代鍾元常王景興之流今徐傅出之為郡抑當有以尋有廢立事元嘉三年𢎞入為相舉鮮之為尚書右僕射南齊褚淵為左僕射先是臧榮緒純篤好學隠居京口教授南徐州辟西曹舉秀才不就太祖為揚州徵榮緒為主簿不到淵少時嘗命駕尋之建元中啓太祖曰榮緒朱方隠者昔臧質在宋以國戚出牧彭岱引為行佐非其所好謝疾求免蓬廬守志漏濕是安灌蔬終老與友關康之沉深典素追古著書撰晉史十袠贊論雖無逸才亦足彌綸一代臣嵗時徃京口早與之遇近取其書始方送出庻得備録渠閣採異甄善帝答曰公所道臧榮緒者吾甚志之其有史翰欲令入天禄甚佳王儉為尚書令武帝問儉曰誰可繼卿者儉曰臣東都之日其在徐孝嗣乎及孝嗣出為吳興太守儉贈詩曰方軌叔茂追清彦輔柔亦不茹剛亦不吐時人以比蔡子尼之行狀也在郡有能名㑹王儉亡帝徵孝嗣為五兵尚書梁袁昻為司空以何之元幼好學有才思居喪過禮天監末袁昻薦之因得召見解褐太尉臨川王揚州儀曹從事史後魏廣陽王喜宣武時為尚書令除儀同三司後轉司徒愛敬人物後來才儁未為時知者侍坐之次轉加談引時人以此稱之崔光為太保疾甚表薦都官尚書賈思伯為侍講中書舍人馮元興為侍讀思伯遂入授孝眀杜氏春秋隋髙熲為左僕射兼納言熲進貞良以天下為己任蘇威楊素賀若弼韓擒虎等皆熲所推薦各盡其用為一代名臣其餘立功立事者不可勝數楊素為僕射開皇中以華隂多盗賊妙選良吏素薦殿中局監榮毗為華州長史世號為能素之田宅多在華隂左右放縱毗以法䋲之無所寛貸毗因朝集素謂之曰素之舉卿適以自罰也毗答曰奉法一心者但恐累公所舉素笑曰前者戲耳卿之奉法素之望也又李百藥為太子舍人或有譖百藥者乃託疾免去後追赴仁夀宫素與吏部尚書牛𢎞並重之奏授禮部員外郎又李子雄為大將軍歴郴江二州刺史並有能名仁夀中坐事免漢王諒之作亂也煬帝將發幽州兵以討之時竇抗為幽州摠管帝恐其有貳心問可任於素素進子雄授上大將軍唐陳叔逹武徳中為納言侍中參預朝政江南名士薄游長安者多所薦拔李靖為僕射奏稱秘書郎岑文本之才擢拜中書舍人漸蒙親顧杜如晦為僕射臨終請委戴胄以選舉繇是以本官檢校吏部尚書參預朝政温彦愽太宗貞觀初為中書令帝令祖孝孫増損樂章孝孫乃與眀音律人王良通白明逹遞相長短帝令侍臣更訪能者彦愽奏愽州清平人呂才聰眀多能眼所未見耳所未聞一聞一見皆逹其妙尤長於聲樂請令考之侍中王珪魏徵又咸稱才學術之妙徵曰才能為尺十二枚尺八長短不同各應律管無不諧韻帝即徵才令直𢎞文館朱敬則同鳯閣鸞臺平章事每以用人為先餘細務不之視㑹嶺表蠻帥攻掠郡縣朝廷思得良守以鎮之而甚難其選敬則曰司勲郎中裴懐古有文才將略即其人也遂以為桂州都督懐古既至賊帥果懐其威惠相率來降敬則又引冬官郎中魏知古為鳯閣舍人太子司議郎張思敬為右史後皆以稱職著名狄仁傑為内史嘗以舉賢為意其所引拔桓彦範敬暉竇懐貞姚崇等至公卿者十人初則天嘗問仁傑曰朕要一好漢任使有乎仁傑曰陛下作何任使則天曰朕欲待以將相對曰臣料陛下若求文章資歴則今之宰臣李嶠蘇味道亦足為文吏矣豈非文士齷齪思得竒才用之以成天下之務者乎則天恱曰此朕心也仁傑曰荆州長史張柬之其人雖老真宰相才也且乆不遇若用之必盡節於國家矣則天乃召拜雒州司馬他日又求賢仁傑曰臣前言張柬之猶未用也則天曰已遷之矣對曰臣薦之為相今為雒州司馬非用之也又遷為秋官侍郎後竟召為相柬之果能興復中宗蓋仁傑之推薦也盧懐慎為黄門監開元四年卒臨終遺表曰臣素無才識叨沐恩榮待罪樞宻頗積年序報國之心空知自竭推賢之志終未克申孤負眀恩夙夜惶懼臣染疾已乆形神欲離雖鳬鴈之飛未為乏少而犬馬之志終祈上聞其鳴也哀乞垂聖察宋璟立性公直執心貞固文學足以經務識畧期於佐時動惟直道行不茍合聞諸朝野之說寔為社稷之臣李傑勤苦絶倫貞介獨立公家之事知無不為幹時之才衆議推美李朝隠操履堅貞才識通贍守文奉法頗懐鐵石之心事上竭誠實盡人臣之節盧從愿清貞謹慎理識周宻始終若一朝野共知簡要之才不可多得並眀時重器聖代良臣比經任使微有愆失所坐者小所棄者大所累者輕所貶者逺日月雖近譴責傷深望垂矜録漸加進用臣竊聞黄帝所以垂衣裳而天下理者任風力也帝堯所以光宅天下者任稷卨也且朝廷者天下之本賢良者風化之源得人則庻績其凝失士則彞倫攸斁臣每見陛下憂勞庻政勤求理道慎舉群司必期稱職使鵷鷺成列草澤無遺故得歲稔時和政平訟理此陛下用賢之眀效也臣非木石早識天心瞑目不遥厚恩未報黜殯之義敢不庻幾城郢之言思布愚懇帝深嘉納姚崇為夏官侍郎知政事時韓思復為汴州司户參軍為政寛恕不行杖罰值丁憂家貧鬻薪以終喪制崇深嘉歎之權授司禮愽士張說為相以徐浩少舉眀經工草𨽻以文學尤所器重調授魯山主簿說薦浩為麗正殿校理三遷右拾遺仍為校理宇文融為黄門侍郎平章事薦宋璟為右丞相裴耀卿為户部侍郎許景先為工部侍郎甚允人望張九齡為中書令引韋陟為中書舍人與孫逖梁渉對掌綸誥時人以為美談房琯為相時嚴武為侍御史至徳初肅宗興師靖難大收才傑武仗節赴行在琯以武名臣之子素重之乃首薦才略可稱累遷給事中既收長安以武為京兆少尹兼御史中丞杜鴻漸為相時韋元輔有器局所莅有聲累遷蘇州刺史浙江西都圑練觀察等使鴻漸首薦之徵為尚書右丞相㑹淮南節度使缺鴻漸又薦堪當重寄遂授揚州長史兼御史大夫淮南節度觀察等使在揚州三年政尚不擾事亦粗理以疾終蕭華為相時吏部侍郎裴遵慶恭儉克己持重謹宻頗有時望華素知遵慶每奏見屢稱之遷黄門侍郎同中書門下平章事楊炎入相時常衮為潮州刺史炎與衮善引拜福建觀察使楊綰常衮為相時關播為淮南節度陳少游判官綰衮薦播為都官員外郎建中初遷兵部員外郎張鎰入相播遷給事中常衮為相時劉從一補渭南尉雅為衮所推重遷監察御史居無何丁母憂服除宰相盧杞薦之超遷侍御史蔣沇為刑部郎中元載秉政滯於郎位大歴十二年常衮以羣議稱沇屈擢拜御史中丞崔祐甫為相引薛播為中書舍人播温敏善與人交李栖筠常衮及祐甫皆引擢之至是有此拜李泌初為陜州觀察使時陽城隱於河東中條山下逺近慕其徳行來學者相繼有争者不詣官府詣城决之泌數禮問焉及泌為相舉為諫議大夫賈耽為相以鄭滑節度副使李融為義成軍鄭滑節度觀察使先是耽為鄭滑節度使署奏融為副使居無何耽朝京師召融總留事及耽為相因有是命齊暎為相給事中袁髙以切直忤㫖暎連請為左丞御史大夫皆不行髙郢鄭珣瑜為相時蔣又為起居舍人轉司勲員外郎並脩國史時集賢闕學士求者甚衆㑹詔問神策軍建置之繇相府討求不知所出乃訪於乂乂徵引根源對甚詳悉郢與珣瑜相顧曰集賢有人矣翼日詔兼判集賢院事杜黄裳為相時薛平為右衛將軍在南衙凡一十一年黄裳深器之薦為汝州刺史兼御史中丞治有能名李吉甫自翰林拜相詔將下之夕感恩出涕謂學士裴垍曰吉甫自尚書郎流落逺地十餘年方歸便入禁署今纔滿歲後進彦士罕接識者宰相宜有選㧞今則懵然莫知能否因請垍疏其名得三十餘人數月之内選用畧盡當時翕然有得人之稱後罷相為淮南節度使薦丁公著授太子正字兼集賢殿校理吉甫自淮南入相復薦其行即日授右補闕遷集賢直學士裴垍元和中入相徵韋貫之裴度知制誥擢李夷簡為御史中丞其後繼踵入相咸著名績其餘量材賦職皆叶人望選任之精前後莫及又薛存誠為度支員外郎垍引為起居郎又崔植為夀安尉大理評事秩滿退居雒下潛心經史尤精易象垍知其操行擢拜左拾遺裴度為御史中丞奏崔從為侍御史知雜度作相又奏從自代為御史中丞韋處厚素知韋辭有文學理行辭嘗為殿中侍御史以事累出為朗州刺史再貶道州江州司馬長慶初處厚與路隋以公望居顯要亟稱薦之擢為户部貟外郎累遷吏部郎中文宗即位處厚當政且以澄汰浮薄登用藝實辭與李翺俱拜中書舍人令狐楚為相時李隠進士擢第為秘書省校書郎楚奏為進賢校理盧㩦為相以司空圖為禮部員外郎先是圖寓居雒下㑹㩦與鄭畋左遷太子賔客分司皆厚遇之及㩦再入相因有是命梁趙光裔為相兼集賢殿大學士時楊凝式為禮部員外郎充西京留守巡官光裔素重其才奏為直學士改考功員外郎後唐郭崇韜為樞宻使眀宗拔鄆州得天平軍節度判官趙鳯送之于莊宗崇韜素聞其名及見與語乃薦用為扈鑾學士盧文紀清泰中為相以右諫議大夫李光庭為給事中𢎞文館學士判館事光庭唐故曹王臯之曾孫父龜年光啓中為太卿監光庭從狩蜀舉進士屢遷至兵部郎中昭宗末不仕梁客於北海耕牧以自給莊宗初亦不入朝文紀素知之奏召為諌官及引之判館事李愚為相多振拔沉滯時祕書監劉岳奉使湖南未還愚奏岳為太常卿晉李崧為平章事時髙祖講求輔相崧力薦吕琦於髙祖云可大用髙祖數召琦於便殿言及當世事甚竒之方將倚以為相忽遇疾而逝人皆惜之漢蘇逢吉為相時李濤在翰林逢吉深眷待之㑹四輔闕人髙祖欲擢用吏部尚書竇貞固復問其次逢吉曰頃張彦澤以殺判官張式罷鎮晉祖宥其罪而李濤上疏極言彦澤之罪宥之屈法陛下在太原時論朝士大夫常重濤之為人時髙行周慕容彦超圍杜重威於鄴二師不恊髙祖有親征之意未决㑹濤上疏請駕征鄴大合上㫖遂與貞固同日拜平章事周馮道仕晉髙祖為相時尚書左丞判國子監事田敏長於詩賦道重敏嘗從客白晉祖曰臣所為官合授於敏臣不敢黨蔽也又史圭在後唐眀宗時為右丞權判銓事道在中書嘗以堂判衡銓司所注人圭怒力争之道亦微有不足色及晉髙祖時道再為相圭首為道所舉除刑部侍郎鹽鐵副使圭方愧其度量逺不及也册府元龜卷三百二十四
