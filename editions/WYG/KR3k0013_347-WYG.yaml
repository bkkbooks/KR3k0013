body:
  text: 册府元龜卷三百四十七宋王欽若等撰將帥部佐命第八後唐李嗣昭武皇母弟代州刺史克柔之假子也小字進通不知族姓所岀少從征伐精練軍機唐昭宗乾寧四年為内衙都將援河中敗汴軍於胡壁堡擒汴將滑禮及王珂請婚於武皇武皇以女妻之珂赴禮㑹於太原以嗣昭權典河中留事李罕之襲我潞州也嗣昭率師攻潞與汴將丁㑹戰于含口俘獲三千執其將蔡延恭代李君慶為蕃漢馬歩行營都將進攻潞州遣李存質李嗣本以兵扼天井闗汴將澤州刺史劉玘棄城而遁乃以李存璋為刺史梁祖聞嗣昭之師大至召葛從周謂曰并人若在髙平當圍而取之先須野戰勿以潞州為敵及聞嗣昭軍韓店梁祖曰進通扼八議路此賊决與我鬬公等臨事制機勿落奸便賀徳倫閉壁不出嗣昭日以鐵騎環城汴人不敢芻牧援路斷絶八月徳倫張歸厚棄城遁去遂復取潞州三年汴人攻滄州劉仁恭求救遣嗣昭出師邢洺以應之嗣昭遇汴軍於沙河擊敗之獲其將胡禮進攻洺州下之獲其郡將朱紹宗九月梁祖自率軍三萬至臨洺葛從周設伏於青山口嗣聞梁祖至歛軍而退從周伏兵發為其所敗偏將王邰郎楊師悦等被擒十月汴人大寇鎮定王郜告急於武皇乃遣嗣昭出師下太行擊懷孟汴將侯言守河陽不意嗣昭之師至既無守備驅市人登城嗣昭攻其北門破其外垣俄而汴將閻寶救軍至乃退天復元年河中王珂為汴軍所虜河中晉綘諸郡皆陷四月汾州刺史李瑭謀叛納欵於汴嗣昭討之三日而拔斬瑭是月汴人初得蒲絳乃大舉諸道之師來逼太原汴將葛從周陷承天軍氏叔琮營洞渦驛太原四面汴軍雲合武皇憂迫計無從出嗣昭朝夕選精騎分出諸門掩擊汴營左將右斬或燔或擊汴軍疲於奔命又屬霖雨軍多腫痢糧運不繼五月氏叔琮引退嗣昭以精騎追之汴軍乃棄輜重兵仗萬計六月嗣昭出師隂地攻慈隰降其刺史唐禮張瓌是時天子在鳳翔汴人攻圍有密詔徴兵十一月嗣昭出師晉絳屯吉上堡與汴將王反遇於平陽一戰擒之明年正月嗣昭進營蒲縣十八日汴將朱友寕氏叔琮將兵十萬來拒二十八日梁祖自率大軍至平陽嗣昭之衆大恐三月十一日有白虹貫周徳威之營候者云不利宜班師翌日氏叔琮犯徳威之營汴軍十餘萬列陳四合徳威嗣昭血戰解之乃保軍而退汴軍因乘之時諸將潰散無復部伍徳威引騎軍循西山而遁朱友寕乘勝陷慈隰汾等州武皇聞其敗也遣李存信率牙兵至清源應接復為汴軍所擊汴軍營於晉祠嗣昭徳威收合餘衆登城拒守汴人治攻具於西北隅四面營柵相望時鎮定河中皆為梁有孤城無援師旅敗亡武皇晝夜登城憂不遑食召諸將謀欲出保雲州嗣昭曰王勿為此謀兒等茍存必能城守李存信曰事勢危急不如且入北蕃别圖進取朱温兵師百萬天下無敵闗東河北受他指揮今獨守危城兵亡地䠞儻彼築室反耕環塹深固則亡無日矣武皇將從之嗣昭亟爭不可猶豫未决賴劉太妃極言於内武皇且止數日亡散之衆復集嗣昭晝夜分兵四出斬將搴旗汴軍保守不暇二十一日朱友寧燒營退去嗣昭追擊復收汾慈隰等州五月雲州都將王敬暉據城叛振武石善友亦為部將契苾讓所逐嗣昭皆討平之天祐三年汴人攻滄景劉仁恭遣使求援十一月嗣昭為昭義節度使五年五月莊宗敗汴軍破夾城嗣昭知武皇棄世哀慟㡬絶時大兵攻圍歴年城中士民饑死大半廛里蕭條嗣昭緩法寛租勸農務穡一二年間軍城完集三面隣於敵境寇鈔縱横設法枝梧邊鄙不聳胡柳之戰周徳威戰沒師無行列至晚方集汴人四五萬登無石山莊宗之軍懼形於色或請收軍保營詰旦復戰嗣昭曰賊無營壘去臨濮地逺日已晡晚皆有歸心但以精騎撓之無令返斾晡後追擊破之必矣我若收軍拔寨賊入臨濮俟彼整齊復來即勝負未決荘宗曰非兒言㡬敗吾事軍校王建及又陳方畧嗣昭與建及分兵於土山南北為犄角汴軍懼下山因縱軍擊之俘斬三萬級繇是莊宗帳餞於戚城莊宗酒酣泣而言曰河朔生靈十年饋輓引領鶴望候破汴軍今兵賦不充寇孽猶在坐食軍賦有愧蒸民嗣昭曰臣忝急難之地每一念此寢不安席大王且持重謹守惠養士民臣歸本藩簡料兵賦歳末春首即舉衆復來莊宗離席拜送如家人禮是月汴將劉鄩攻同州朱友謙告急嗣昭與李存審援之九月破汴軍於馮翊乃班師十九年莊宗親征張文禮於鎮州冬契丹三十萬奄至嗣昭從莊宗擊虜於新城阿保機在望都莊宗深入親與虜鬬虜騎圍之數十重良久不解嗣昭號泣赴之引三百騎横擊虜圍馳突出沒者數十合虜退翼莊宗而還是時閻寳為鎮人所敗退保趙州莊宗命嗣昭代寳攻真定七月二十四日王處球之兵出至九門嗣昭設伏於故營賊至發伏擊之殆盡餘三人匿於牆墟間嗣昭環馬而射之為賊矢中腦嗣昭箙中矢盡抜賊矢於腦射賊一發而殪之嗣昭日暮還營所傷流血不止是夜卒莊宗即位贈太師隴西郡王長興中詔配饗莊宗廟庭李嗣本本姓張少事武皇為帳中紀綱漸立戰功得補軍校唐昭宗乾寧初從征李儔為前鋒與燕人戰得居庸闗以功為義兒軍使因賜姓名從討王行瑜授檢校刑部尚書改威逺寧塞等軍使五年討羅𢎞信於魏州嗣本為前鋒師還改馬軍都將從李嗣昭討王暉於雲州論功加檢校司空汴將李思安之圍潞州也從周徳威軍餘吾嗣本率騎軍日與汴人轉鬬前後獻俘千計遷代州刺史六年從攻晉絳為蕃漢副都校後為振武節度使莊宗定魏博劉鄩據莘縣命嗣本入太原巡守都城又從破劉鄩於故元城收洺磁衛等三郡乃還鎮振武李嗣恩本姓駱年十五能騎射侍武皇於振武及鎮太原補鐵林軍小校從征王行瑜奉表獻㨗加檢校散騎常侍漸轉突陣指揮使賜姓名天祐四年逐康懷英於西河解汾州之圍加檢校司空充左廂馬軍都將戰王景仁有功加檢校司徒天祐十二年從莊宗入魏擊劉鄩有功轉天雄軍馬歩軍都指揮使劉鄩之北趨樂平也嗣恩襲之倍程先入晉陽時城中無備得嗣恩兵至人百其勇鄩聞其先過乃遁莘之戰以功轉代州刺史充石嶺闗已北都知兵馬使稍遷振武節度使十五年追赴行在卒於太原李存信本姓張從武皇入闗平賊始補軍職為蕃漢都校從討李儔降赫連鐸白義誠以功加檢校左僕射從入闗討王行瑜加檢校司空領柳州刺史李存孝給事武皇帳中常將騎為先鋒從武皇救陳許逐黄寇及遇難上源每戰無不克㨗後收潞之師圍張濬於平陽營於趙城華州韓建遣壯士三百夜犯其營存孝諜知設伏以擊之盡殪進壓晉州西門獲賊三千自是閉壁不出存孝引軍攻絳州其刺史張行恭棄城而去張濬韓建亦繇合口而遁存孝收晉絳以功授汾州刺史李存進振武人事武皇從入闗還鎮太原署牙職從討王行瑜以功授檢校常侍與李嗣昭同破王珙於河中唐昭宗光化三年契丹犯塞寇雲中改永安軍使鴈門已北都知兵馬使天復初破氏叔琮前軍於洞渦三年授石州刺史莊宗初嗣位入為歩軍右都校檢校司空師出井陘授行營馬歩都虞侯破汴軍於栢鄉論功授汾州刺史轉檢校司徒俄兼西南面行營招討使出師收慈州授慈沁二州刺史李存璋雲中人武皇初起雲中存璋與康君立薛志勤等為奔走之交從入闗以功授國子祭酒累管萬勝雄威等軍從討李儔改義兒軍使唐昭宗光化二年授澤州刺史入為牢城使從李嗣昭討雲州叛將王暉平之改教練使五年武皇疾篤召張承業與存璋授遺詔存璋爰立莊宗夷内難頗有力焉改河東馬歩都虞侯從破汴軍於夾城轉檢校司徒栢鄉之役為三鎮排陣使十一年從盟朱友謙于猗氏授汾州刺史汴將尹皓攻慈州逆戰敗之十三年王檀逼太原存璋率汾州之軍入城固守授大同軍防禦使應蔚朔等州都知兵馬使秋契丹寇蔚州䧟之阿保機遣使馳木書求賂存璋斬其使虜逼雲州存璋拒守城中有古鐵車乃鎔為兵仗以給軍事虜退以功授檢校太傅大同節度雲應等州觀察康君立蔚州興唐人世為邊豪唐僖宗乾符中為雲州牙校事防禦使段文楚時羣盜起河南天下將亂代北仍歳阻饑諸部豪傑咸有嘯聚邀功之志㑹文楚稍削軍人儲給戍兵咨怨君立與薛鐵山程懷信王行審李存璋等謀曰段公儒人難與共事方今四方雲擾皇威不振丈夫不能於此時立功立事非人豪也吾等雖權部衆然以雄勁聞於時者莫若沙陁部復又李振武父子勇冠諸軍吾等合勢推之則代北之地旬月可定功名富貴事無不濟也君立等乃夜謁武皇言曰方今天下大亂天子付將臣以邊事歳偶饑荒便削儲給我等邊人焉能守死公家父子素以威惠及五部當共除虐帥以謝邊人孰敢異議者武皇曰明天子在上舉事當有朝典公等勿輕議予家尊逺在振武萬一相迫俟予禀命君立等曰事機已泄遲則變生曷俟千里咨禀衆因聚譟擁武皇比及雲州衆且萬人師營鬭雞臺城中械文楚以應武皇之軍既收城推武皇為大同軍防禦留後衆狀以聞朝廷不悦詔徴兵來討俄而獻祖失振武武皇失雲州朝廷命招討使李鈞幽州李舉加兵於武皇攻武皇於蔚州君立從擊鈞舉之師屢敗及獻祖入韃靼君立保感義軍武皇授鴈門節度以君立為左都押牙從入闗逐黄孽收長安武皇還鎮太原授檢校工部尚書先鋒軍使文徳初李罕之既失河陽來歸於武皇且求援焉乃以君立充南面招討使李存孝副之帥師二萬助罕之攻取河陽三月與汴將丁㑹牛存節戰於沇河臨戰之次騎將安休休叛入汴軍君立引退八月授汾州刺史昭宗大順元年潞州小校安居受反武皇遣君立討平之授檢校左僕射昭義節度使薛志勤蔚州奉誠人小字鐵山初為獻祖帳中親信唐僖宗乾符中與康君立共推武皇定雲中以功授右牙都校從入韃靼武皇授節鴈門志勤領代北軍使從入闗收京城以功檢校工部尚書河東右都押牙先鋒右軍使從武皇救陳平黄巢武皇遇難於上源驛汴將楊彦洪連車樹栅遮絶巷陌時騎從皆醉宴席既䦨汴軍四面攻傳舍志勤虓勇冠絶復酒膽激壯因獨登驛樓大呼曰朱僕射負恩無行邀我司空圖之吾三百人足以濟事因彎弧發射矢無虚發汴人斃者數十志勤私謂武皇曰事急矣如至五鼔吾屬無類矣可速行因扶武皇而去雷雨暴猛汴人扼橋志勤以其屬血戰擊敗之得侍武皇還營繇是恩顧益厚昭宗大順初張濬以天子之師來侵太原十月天軍入隂地志勤與李承嗣率騎三千抗之敗韓建之軍於䝉坈進收晉絳以功授忻州刺史二年從討鎮州收天長臨城志勤皆先登陷陣勇敢無前王暉據雲州叛討平之以志勤為大同軍防禦使檢校司空乾寧初代康君立為昭義節度使李承嗣代州鴈門人承嗣少仕郡補右職唐僖宗中和二年從武皇討賊闗輔為前鋒王師之攻華隂黄巢令偽客省使王汀㑹軍機於黄揆承嗣擒之以獻賊平以功授汾州司馬改榆次鎮將光啓初從討蔡賊于陳許上源之難遣承嗣奉表行在陳訴其事觀軍容田令孜館而慰譬令逹情於武皇姑務恊和仍授以左散騎常侍朱玫之亂遣承嗣率軍萬人援鄜州至渭橋迎扈車駕王行瑜既殺朱玫承嗣㑹鄜夏之師入定京城獲偽相裴徹鄭昌圖函送朱玫襄王首獻于行在駕還宫賜號迎鑾功臣檢校工部尚書守嵐州刺史賜犒軍錢二萬貫時車駕初還三輔多盗承嗣按兵警邏輦轂又安及還屯於鄜留别將馬嘉福五百騎宿衛孟方立之襲遼州也武皇遣承嗣設伏於榆社以待之邢人既至承嗣發伏擊其歸兵大敗之獲其將奚忠信以功授洺州刺史及張濬之加兵於太原也時鳳翔軍營霍邑承嗣帥一軍攻之岐人夜遁追擊至趙城合大軍攻平陽旬有三日而拔師旋改教練使檢校司徒昭宗乾寧二年兖鄆為汴人所攻勢漸危䠞遣使乞師於武皇武皇遣承嗣帥三千騎假道於魏度河援之時李存信屯于莘縣既而羅𢎞信背盟掩擊王師因茲隔絶及朱瑄朱瑾失守承嗣朱瑾史儼同入淮南承嗣史儼皆驍將也淮人得之軍聲大振武皇深惜之如失左右手乃遣趙岳間道使于淮南請歸承嗣等楊行密許之遣使陳令存修好于武皇其年九月汴將龎師古葛從周出師將收淮南朱瑾率淮軍三萬與承嗣設伏於清口大敗汴人生獲龎師古行密嘉其雄才留而不遣仍奏授檢校太尉領鎮江軍節度使史儼代州鴈門人以便騎射給事於武皇為帳中親將驍果絶衆善擒生設伏望塵揣敵所向皆㨗自武皇入定三輔誅黄巢每出師皆從唐昭宗乾寧中從討王行瑜師次渭北遣儼率五百騎䕶駕石門時京城大擾士庶奔迸散布南山儼分騎警衛比駕還京盗賊不作以功授檢校右散騎常侍屯三橋者累月史建塘鴈門人武皇節制鴈門建塘為九府都督從入闗定京師及鎮太原為裨將唐僖宗中和四年從援陳許為前鋒敗黄巢於汴上追賊至徐兖常將騎挺身酣戰勇冠諸軍是時天下之師雲集軍中無不推伏蓋寓蔚州人祖祚父慶世為州之牙校武皇起雲中寓與康君立等推轂佐佑之因為腹心武皇節制鴈門署職為都押牙領嵐州刺史洎移鎮太原改左都押牙檢校左僕射武皇與之决事言無不從凡出征行靡不衛從唐昭宗乾寕二年從入闗討王行瑜特授檢校太保開國侯邑千户領容管觀察經畧使光化初車駕還京授檢校太傅封成陽郡公寓性通黠多智數善揣人主情武皇性嚴急左右難事無委遇者小有違忤即寘於法唯寓承顔希㫖規其趣向婉辭順意以盡參禆武皇或暴怒將吏事將不測寓欲救止必佯佐其怒以責之武皇怡然釋之有所諫諍必徴近事以為喻自武皇鎮撫太原最推親信中外將吏無不景附朝廷藩隣信使結託先及武皇次入寓門既總軍中大柄其名震主梁祖亦使姦人離間暴揚於天下言蓋寓已代李克用聞者寒心武皇畧無疑間初武皇既平王行瑜旋師渭北暴雨六十日諸將或請入覲且云天顔咫尺安得不行覲禮武皇意未决寓白曰車駕自石門還京寢未安席比為行瑜兄弟驚駭乘輿今京師未寧姦宂流議大王移兵渡渭必恐復動宸情君臣始終不在朝覲但歸藩守姑務勤王是忠之道也武皇笑曰蓋寓尚阻吾入覲况下人哉即日班師周徳威小字楊五朔州馬邑人也初事武皇為帳中騎督唐昭宗乾寧中為鐵林軍使從武皇討王行瑜以功授檢校左僕射移内衙軍副天復中武皇之師不利於蒲縣汴將朱友寧氏叔琮來逼晉陽時諸軍未集城中大恐徳威與李嗣昭選募鋭兵分出諸門以攻其壘擒生斬馘汴人枝梧不暇乃退天祐三年與李嗣昭合燕軍攻潞州降丁㑹後為蕃漢都將李思安之寇潞也徳威軍於餘吾時汴人十萬築夾城圍潞州内外斷絶徳威以精騎薄之屢敗汴人進營髙河令遊騎邀其芻牧汴軍閉壁不出乃自東南山口築埇道樹柵以通夾城徳威之騎軍倒牆堙塹日數十戰首後俘馘不可勝紀梁有驍將黄角鷹房骨崙皆生致之五年四月命徳威班師時莊宗初立徳威外握兵柄頗有浮議内外憂之徳威既至單騎入謁繇是羣情釋然是月二十四日從莊宗再援潞州二十九日徳威前軍營横碾距潞四十五里五月朔晨霧晦暝王師㐲於三埀岡下翌日直趨夾城斬闗破壘梁人大敗解潞州之圍初徳威與李嗣昭有私憾武皇臨終顧謂莊宗曰進通忠孝不負我重圍累年似與徳威有隙以吾命諭之若不解重圍歿有遺恨莊宗逹遺㫖徳威感泣繇是勵力堅戰竟破彊敵與嗣昭歡愛如初以功加同平章事振武節度使七年岐人攻靈夏遣使來求助徳威渡河以應之師還授蕃漢馬歩總管十一月汴人據深冀汴將王景仁軍八萬次栢鄉鎮州節度使王鎔來告難帝遣徳威率前軍出井陘屯於趙州十二月帝親征二十五日進薄汴營距栢鄉五里營於野河北汴將韓勍率精兵三萬鎧甲皆被繒綺金銀炫曜望之森然我軍懼形於色徳威謂李存璋曰賊結陣而來觀其形勢志不在戰欲以兵甲耀威耳我軍人乍見其來謂其鋒不可當此時不挫其鋭吾軍不振矣乃遣存璋諭諸軍曰爾見此賊軍否是汴州天武健兒皆屠沽傭販虚有其表徒被精甲十不當一擒獲足以為貨徳威自率精騎擊其兩偏左馳右決出沒數四是日獲賊一百餘人賊渡河而退徳威謂莊宗曰賊驕氣尤盛宜按兵以待其衰莊宗曰我提孤軍救難解紛三鎮烏合之衆利在速戰卿欲持重吾懼其不可使也徳威曰鎮定之士長於守城列陣野戰素非便習我師破賊惟恃騎軍平田廣野易為施巧今壓賊營令彼見我虛實則勝負未可必也莊宗不悦退卧帳中徳威患之謂監軍張承業曰王欲速戰將烏合之徒欲當劇賊所謂不量力也去賊咫尺限此一渠水彼若早夜以略仢渡之吾族其為俘矣若退軍鄗邑引賊離營彼出則歸彼歸則出復以輕騎掠其芻餉不踰月敗賊必矣承業入言莊宗亦釋然徳威得降人問之曰景仁下令造浮橋數百果如徳威所料二十七日乃退軍保鄗邑八年正月二日徳威率騎軍致師於栢鄉設伏於村塢間令三百騎以壓汴營王景仁悉其衆結陣而來徳威轉戰而退汴軍因而乘之至於鄗邑南時歩軍未成列徳威陳騎河上以抗之亭午兩軍皆陣莊宗問戰時徳威曰汴軍氣盛可以逸制勞造次較力殆難與敵古者師行不踰一舍蓋慮糧餉不給士有饑色今賊逺來决戰縱挾糗糒亦不遑食晡晚之後饑渴内侵戰陣外迫士心既倦將必求退乘其勞弊以生兵制之縱不大敗偏師必喪以臣所籌利在晡晚諸將皆然之時汴軍以魏博之人為右廣宋汴之人為左廣自未至申陣勢稍却徳威麾軍呼曰汴軍走矣塵埃漲天魏人收軍漸退莊宗與史建瑭安金全等因衝其陣夾攻之大敗汴軍殺戮殆盡王景仁李思安僅以身免獲將較二百八十人八月劉守光僭稱大燕皇帝十二月遣徳威率歩騎三萬出飛狐與鎮州將王徳明定州將程嚴等軍進討九年正月收涿州降刺史劉知温五月七日劉守光令驍將單廷珪督精甲萬人出戰徳威遇於龍頭岡初廷珪謂左右曰今日擒周楊五既臨陣見徳威廷珪單騎持槍窮追徳威垂及徳威側身避之廷珪少退徳威奮撾擊墜其馬生獲廷珪賊黨大敗斬獲三千級獲大將李山海等五十二人十二日徳威自涿州進軍良鄉大城守光既失廷珪自是奪氣徳威之師屢收諸郡降者相繼十年十一月擒守光父子幽州平十二月授徳威檢校侍中幽州盧龍等軍節度使徳威性忠孝感武皇奬遇嘗思臨難亡身十二月汴將劉鄩自洹水乘虛將寇太原徳威在幽州聞之徑以五百騎馳入土門聞鄩軍至樂平不進徳威徑至南宫以候汴軍初劉鄩欲據臨清以扼鎮定轉餉之路行次陳宋口徳威遣將擒數十人皆倳刄於背縶而遣之既至謂劉鄩曰周侍中已據宗城矣徳威其夜急騎扼臨清劉鄩乃入貝州是時徳威若不至則勝負未可知也十五年我師營麻口渡將大舉以定汴州徳威自幽州率本軍至十二月二十三日軍次胡柳詰旦騎報曰汴軍至矣莊宗使問戰備徳威奏曰賊倍道而來未成行伍我營柵已固守備有餘既深入賊疆須决萬全之策此去大梁信宿賊之家屬盡在其間人之常情孰不以家國為念以我深入之衆抗彼激憤之軍不以方畧制之恐難必勝王但按軍保柵臣以騎軍疲之使彼不得下營際晚糧爨不給進退無據因而乘之勝之道也莊宗曰河上終日挑戰恨不遇賊今欵門不戰非壯夫也乃率親軍成列而出徳威不獲已從之謂其子曰吾不知其死所矣莊宗與汴將王彦章接戰大敗之徳威之軍在東偏汴之遊軍入我輜重衆駭奔入徳威軍因紛優無行列徳威兵少不能解父子俱戰歿是夜收軍徳威不至莊宗慟哭謂諸將曰喪吾良將吾之咎也同光初追贈太師符存審陳州宛邱人初歸武皇署右職令典義兒軍賜姓李存審性謹厚寵遇日隆自是武皇四征存審常從所至立功改左右廂歩軍都指揮使天祐三年授蕃漢馬歩副指揮使與李嗣昭降丁㑹於上黨從周徳威破賊於夾城以功授忻州刺史領蕃漢馬歩都指揮使七年充漢副總管莊宗擊汴人於栢鄉留存審守太原九年梁祖攻蓨縣存審與史建塘李嗣昭赴援屯下博橋汴人驚亂燒營而遁以功遥領邢洺磁團練使十二年魏博歸欵於莊宗莊宗遣存審率前鋒據臨清以俟進取莊宗入魏存審屯魏縣以抗劉鄩十二年六月鄩營莘縣存審與鎮定之師營莘西三十里一日數戰八月率師攻張源徳於貝州十三年二月劉鄩自莘悉衆來襲我魏州存審以大軍踵其後戰於故元城大敗汴人從收澶衛磁洺等州秋邢州閻寶降授存審安國軍節度使邢洺磁等州觀察使十月戴思逺棄滄州毛璋以城降授存審横海軍節度使兼領魏博馬歩軍都指揮使明年就加平章事十四年八月將兵援周徳威於幽州敗契丹之衆冬破汴將安彥之於楊劉諸軍進營麻口時梁將謝彥章營行臺村莊宗勇於接戰毎以輕騎當之遇窘者數四存審毎俟其出必叩馬泣諫曰王將復唐宗社宜為天下自愛搴於挑戰一劒之任無益聖徳請責效於臣古人不以賊遺君父臣雖不武敢不代君之憂莊宗即時迴駕十二月戰於胡柳晡時之後存審引所部銀槍效節軍敗梁軍於土山下是日辰巳間周徳威歿一軍逗曉梁軍四集存審與其子彥圖冐刄血戰出沒賊陣與莊宗軍合午後師復集擊敗汴人十六年春為内外蕃漢馬歩總管於徳勝口築南北城以據之七月汴將王瓚自黎陽渡河寇澶州存審拒戰瓚退營於楊村渡控我上游自是日與交鋒對壘經年大小凡百餘戰十七年汴將劉鄩攻同州朱友謙求援於我遣存審與李嗣昭將兵赴之九月次河中進營朝邑時河中久臣於梁衷持兩端及諸軍大集芻粟暴貴嗣昭懼其反覆將急戰以定勝負居旬日梁軍逼我營㑹望氣者言西南有黒氣如鬭雞之狀當有戰陣存審曰我方欲決戰而形於氣象得非天贊歟是夜閲其衆詰旦進軍梁軍來逆戰大敗之追斬二千餘級自是梁軍保壘不出存審謂嗣昭曰吾初懼劉鄩據渭河偏師既敗彼若退歸懼我踵之獸窮持人勿謂無事可開其歸路然後追奔乃令王建及牧馬於沙苑劉鄩尹皓知之保衆退去遂解同州之圍存審略地至奉先謁諸帝陵乃班師十八年王師討張文禮於鎮州李嗣昭李存進相次戰歿十九年遣存審率師進攻師於城下文禮之將李再豐隂送欵於存審我師中夜登城擒文禮之子處球等露布以獻鎮州平以功加檢校太傅兼侍中二十年正月師旋於魏州莊宗出城迎勞就第宴樂居無何契丹犯燕薊郭崇韜奏曰汴寇未平李繼韜背叛北邊遮虜非存審不可帝遣中使諭之存審卧病羸瘠附奏曰臣効忠禀命靡敢為辭但痾恙纒綿未堪抵役既而詔存審以本官充幽州盧龍節度自鎮州之任同光初加開府儀同三司檢校太傅中書令邑千户賜號忠烈扶天啟運功臣郭崇韜代州鴈門人也武皇用為典謁奉使鳳翔稱㫖署教練使崇韜臨事機警應對可觀莊宗嗣位尤器重之天祐十四年用為中門副使專典機務艱難戰伐靡所不從十八年從征張文禮於鎮州契丹引衆至新樂王師大恐諸將咸請退還魏州莊宗猶豫未决崇韜曰阿保機為王郁所誘本利貨財非敦隣好苟前鋒小衂遁走必矣况我新破汴寇威振北蕃乘此驅攘往無不㨗且事之濟否亦有天命莊宗從之王師果㨗莊宗即位於魏州崇韜加檢校太保守兵部尚書充樞密使是時衛州陷於梁澶相之間寇鈔日至民流地削軍儲不給羣情忷忷以為霸業終不能濟崇韜寢不安席俄而王彥章陷徳勝南城敵勢滋蔓汴人急攻楊劉城明宗在鄆音驛斷絶莊宗登城四望計無從出崇韜啟曰段凝阻絶津路茍王師不南鄆州安能保守臣請於博州東岸立柵以固通津但慮汴人偵知徑來薄我請陛下募敢死之士日以挑戰如三四日間賊軍未至則柵壘成矣崇韜率毛璋等萬人夜趨博州視矛㦸之端有光崇韜曰吾聞火出兵刃破賊之兆也至博州渡河版築晝夜不息崇韜于葭葦間據胡牀假寐覺袴中冷令左右視之乃蛇也其忘疲勵力也如是居三日梁軍果至城壘低痺沙土散惡戰具不完汴將王彦章杜晏球率衆攻擊軍不得休息崇韜身先督衆四面拒戰有急即應城垂陷俄報莊宗領親軍次西岸梁軍聞之退走因解楊劉之圍未㡬汴將康延孝來奔崇韜延于卧内訊其軍機延孝曰汴人將四道齊舉以困我軍莊宗憂之召諸將謀進取之策宣徽使李紹宏請棄鄆州與汴人盟以河為界無相侵冦莊宗不悦獨卧帳中召崇韜謂曰計將安出對曰臣不知書不能徴比前古請以時事言之且陛下十五年起義圖霸為雪家讐國恥甲胄生蟣虱黎人困輸輓今既纂大號河朔士庶日望盪平纔得汶陽尺寸之地不能保守况盡有中原乎將來歳賦不充物議咨怨設若劃河為界誰為陛下守之臣自延孝言事已來晝夜籌度料我兵力算賊事機不出今年雌雄必决聞汴人決河自滑至鄆非舟楫不能濟又聞精兵盡在段凝麾下王彥章日寇鄆境彼既以大軍臨我南鄙又憑恃決河謂我不能南渡志在收復㳊陽此汴人之謀也臣謂段凝保據河壖茍欲持我臣但請留兵守鄴保固楊劉陛下親御六軍長驅倍道直指大梁汴城無兵望風自潰既若偽主授首賊將自然倒戈半月之間天下必定如不决此計傍採浮譚臣恐不能濟也今歳秋稼不登軍糧纔支數月决則成敗未知不决則坐見不濟臣聞作舍道邊三年不成帝王應運必有天命成敗天也在陛下獨斷莊宗蹶然而興曰正合吾意大丈夫得則為王失則為虜行計决矣即日下令軍中家口並還魏州莊宗送劉皇后興聖宫使繼岌至朝城西野亭泣别曰事勢危蹶今須一决事茍不濟無復相見乃留李紹宏及租庸使張憲守魏州大軍自楊劉濟河是歳擒王彥章誅梁氏降段凝皆崇韜贊成其謀也安金全代北人世為邊將少驍果便騎射武皇時為騎將屢從征伐莊宗之救潞州及平河朔皆有戰功累為刺史安審通金全之猶子也幼事莊宗累有戰功轉先鋒指揮使同光初為北京右廂馬軍都指揮使屯奉化軍四年春赴明宗急召軍趨夷門為前鋒天成初授單州刺史改齊州防禦使兼諸道先鋒馬軍都指揮使安元信字子言代北人元信以將家子便騎射幼事武皇從平巢蔡唐僖宗光啓中吐渾赫連鐸寇雲州武皇使元信拒之信兵敗於居庸闗武皇性嚴急元信不敢還遂奔定州王處存待之甚厚用為突騎都校昭宗乾寧中處存卒子郜嗣時梁軍攻河朔三鎮奔命不暇梁將張存敬軍奄至城下既無宿備郜懼挈其族奔太原元信從之武皇待之如初用為鐵林軍使梁將氏叔琮之攻河東也别將葛從周自馬嶺入元信伏于榆次挫其前鋒梁將李思安之攻上黨也王師將壁髙河為梁軍所逼别將秦武者尤為難敵元信與鬬斃之繇是梁軍解去城壘得立武皇賜所乘馬及細鎧仗遷突騎都將莊宗嗣晉王位元信從救上黨破夾寨復澤潞以功授檢校司空遼州刺史賜玉鞍名馬栢鄉之役日晚戰酷元信重傷莊宗自臨傳藥其年改授檢校司徒武州刺史充内衙副都指揮使山北諸州都團練副使從莊宗定魏博移為州刺史與梁軍對壘得勝渡元信為右廂排陣使未幾為大同軍節度使劉訓字遵範隰州永和人也出身行間初事武皇為馬軍隊長漸至散將屬河中王氏昆仲有尋戈之役訓從史儼攻陜州武皇討王行瑜以訓為前鋒後𨽻河中為隰州守禦都將居無何殺刺史以郡歸莊宗歴瀛州刺史劉彥琮字比徳雲中人也事武皇累從征役先是絳州刺史王瓘叛武皇言於彥琮意欲致之無幾從畋於汾晉之郊彥琮奔絳瓘以為附已待之甚厚因命為親騎㑹瓘出獵於驅馳之際彥琮刃瓘之首來獻武皇甚竒之袁建豐自武皇破黄巢時得於華隂年方九歳愛其精神爽俊俾收養之漸長列於左右復習騎射補鐵林都虞侯從破邠州王行瑜以功遷左親騎軍使轉突騎指揮使從莊宗解圍上黨破栢鄉陣累功加右僕射左廂馬軍指揮使明宗為内衙指揮使建豐為副北討劉守光常身先士伍轉都教練使權蕃漢副總管莊宗入鄴以心腹幹能選為魏府都巡撿使破劉鄩下衛磁洺三郡有功加檢校司空授洺州刺史於臨洺西敗梁將王遷數千人生獲將領七十餘人俄拜相州刺史徴赴河上預戰於柳陂建豐領相州軍士行營在外委州事於小人失於撫馭指揮使孟守謙據城以叛建豐引兵討平之改隰州刺史夏魯竒字邦傑青州人也初事宣武軍為軍校與主將不協遂歸於莊宗以為䕶衙指揮從周徳威攻幽州燕將有單廷珪元行欽時稱驍勇魯竒與之鬬兩不能解將士皆釋兵從觀幽州平魯竒功居多梁將劉鄩在洹水莊宗深入致師鄩設伏於魏縣西南葭蘆中莊宗不滿千騎汴人伏兵萬餘大譟而起圍莊宗數重魯竒遂與玉門闗烏徳兒等奪命決戰自午至申俄而李存審兵至方解魯竒持槍擕劒獨衛莊宗手殺百餘人烏徳兒等披擒魯竒傷痍徧體自是莊宗尤憐之厯磁州刺史中都之戰汴人大敗魯竒見王彥章識之單騎追及槍擬其頸彥章顧曰爾非余故人乎即擒之以獻莊宗壯之賞絹千疋梁平授鄭州防禦使四年授河陽節度使張廷裕代北人也幼事武皇於雲中從平黄巢討王行瑜自行間漸昇為小將莊宗定魏補天雄軍左廂馬歩都虞侯歴蔚慈隰三州刺史康義誠字信臣代北三部落人也少以騎射事武皇從莊宗入魏博補突騎軍使累遷本軍都指揮使索自通字得之太原清源人也自通少能騎射嘗於山墅射獵莊宗鎮太原時遇之於野訊其姓名即補右畨㕔直軍使後因從獵射中走鹿轉指揮使佐周徳威攻燕軍於涿州擒燕將郭在均從莊宗定魏博改突騎指揮使明宗即位自隨駕左右廂馬軍都指揮使授忻州刺史歳餘召還後典禁兵領韶州刺史漢史𢎞肇鄭州滎澤人也𢎞肇少游俠無行拳勇健歩日行三百里走及奔馬梁末每七戸出一兵𢎞肇在籍中後𨽻本州開道都入禁軍常在晉祖麾下遂留為親從及踐祚用為控鶴偏將髙祖鎮太原奏請從行用為牙隊大將後起置武節左右指揮以𢎞肇為都將代州王暉叛以城歸契丹𢎞肇征之身先士卒一皷而㧞加檢校太保領雷州刺史漢國建王守恩以上黨來附虜主命大將耿崇美率衆上太行欲取上黨髙祖命𢎞肇率軍應接守恩軍至潞州契丹退去翟令竒以澤州迎降㑹河陽武行徳遣人迎𢎞肇遂率衆南下與行徳合故髙祖繇蒲陜赴雒如歸𢎞肇前鋒之功也周何福進漢髙祖乾祐中為曹州防禦使時太祖出鎮於鄴將謀北伐奏以福進自隨及太祖入平内難以輔佐功拜忠武軍節度使冊府元龜卷三百四十七
