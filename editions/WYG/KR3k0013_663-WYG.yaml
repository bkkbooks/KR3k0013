body:
  text: 册府元龜卷六百六十三宋王欽若等撰奉使部覊留死事覊留古者念國家之重慎出疆之選故歛旜拭璧著乎法制皇華四牡形於風什至若冐威强鄰投身絶域遇責言之禍因加兵之勢國患未弭道閉不通拘留别舘憔悴窮海嬰維縶之苦極窮愁之感乃有持節不屈誓志無茍興言慷慨以聳其聽移書引喻以動其心終受禮而遂歸能蒙恥而有守此固精剛内激忠純不二雖濵乎九死嬰是多難而保令命於將來為良吏之稱述不亦韙哉石買孫蒯皆衞大夫魯襄公十七年伐曹取重丘曹人愬于晉十八年夏晉人執衞行人石買于長子執孫蒯于純留石買即是伐曹者宜即治本罪而晉因其為行人執之故書行人以罪晉陳無宇齊大夫魯昭公二十年四月送女致少姜晉韓須如齊逆女少姜有寵於晉侯謂之少齊為立别號所以寵異之謂陳無宇非卿欲使齊以適夫人禮送少姜執諸中都中都晉邑在西河介休縣東南少姜為之請曰送從逆班班列也畏大國也猶有所易是以亂作韓須公族大夫陳無宇上大夫言齊畏晉改易禮制使上大夫送遂致此執辱之罪葢少姜謙以示譏叔向言於晉侯曰彼何罪彼無宇君使公族逆之齊使上大夫送之猶曰不共君求以貪國則不共逆卑於送是晉國不共而執其使君刑已頗何以為盟主且少姜有辭謂請無宇之辭冬十月陳無宇歸蹶繇吳子之弟也魯昭公五年冬楚子伐吳以驛至於羅汭驛傳也羅水名吳子使蹶繇犒師楚人執之將以釁鼓王使問焉曰女卜來吉乎對曰吉寡君聞君將治兵於敝邑卜之以守龜曰余亟使人犒師請行以觀王怒之疾徐而為之備尚克知之言吳命龜如此龜兆告吉曰克可知也君若驩焉好逆使臣滋敝邑休怠休解也而忘其死亡無日矣今君奮焉震電慿怒慿盛也虐執使臣將以釁鼓則吳知所備矣敝邑雖羸若早修完完器備其可以息師息楚師難易有備可謂吉矣且吳社稷是卜豈為一人使臣獲釁軍鼓而敝邑知備以禦不虞其為吉孰大焉國之守龜其何事不卜言常卜一臧一否其誰能常之城濮之兆其報在邲城濮戰楚卜吉其效乃在邲今此行也其庸有報志言吳有報楚意乃弗殺是行也吳早設備楚無功而還以蹶繇歸十九年令尹子瑕言蹶繇於楚子曰彼何罪諺所謂室於怒市於色者楚之謂矣言靈王怒吳子而執其弟猶人忿於室家而作色於市人舍前之忿可也乃歸蹶繇季孫意如魯大夫平子也昭公十三年平丘之㑹晉昭公使叔向辭昭公弗與盟子服惠伯曰晉信蠻夷而棄兄弟蠻夷莒也兄弟魯也其執政貳也執政之臣有二心於莒而助之貳必失諸侯豈惟魯然夫失於政者必毒於人魯懼及焉不可以不恭必使上卿從之季平子曰然則意如乎若我徃晉必患我誰為之貳患謂見執貳副也子服惠伯曰椒既言之矣敢逃難乎椒請從椒惠伯名晉人執平子子服惠伯見韓宣子宣子晉正卿曰夫盟信之要也晉為盟主是主信也若盟而棄魯信抑闕矣昔欒氏之亂齊人間晉之禍伐取朝歌間候也欒氏晉大夫欒盈也獲罪奔楚自楚奔齊魯襄二十三年齊莊公納盈不克秋伐晉取朝歌朝歌晉邑也我先君襄公不敢寧處使叔孫豹帥師發敝賦踦跛畢行無有處者以從軍使次於雍榆晉地也與邯鄲勝擊齊之左邯鄲勝晉大夫趙旃之子頃子勝也左左軍也猗止晏萊焉從後曰猗止獲也晏萊齊大夫齊師退而後敢還非以求遠也非以遠求功也以魯之密邇於齊而又小國也齊朝駕則夕極於魯國極至也不敢憚其患而與晉共其憂亦曰庶㡬有益於魯國乎益謂得晉之力也今信蠻夷而棄之夫諸侯之勉於君者將安勸矣若棄魯而茍固諸侯羣臣敢憚戮乎諸侯之事晉者魯為勉矣若以蠻夷之故棄之其無乃得蠻夷而失諸侯之信乎子計其利者小國共命宣子悦乃歸季孫叔孫婼魯大夫昭公二十三年正月邾師過武城遂取之獲鉏弱地邾人愬於晉晉人來討叔孫婼如晉晉人執之使與邾大夫坐坐訟曲直叔孫曰列國之卿當小國之君固周制也在禮卿得㑹伯子男故曰當小國之君邾又夷也邾雜有東夷之風寡君之命介子服回在子服回魯大夫為叔孫之介副請使當之不敢廢周制故也乃不果坐韓宣子使邾人聚其衆將以叔孫與之與邾使執之叔孫聞之去衆與兵而朝士彌牟謂韓宣子彌牟士景伯曰子弗良圖而以叔孫與其讎叔孫必死之魯亡叔孫必亡邾邾君亡國將焉歸時邾君在晉若亡國無所歸將益晉憂子雖悔之何及所謂盟主討違命也若皆相執焉用盟主聽邾衆取叔孫是為諸侯皆得輙相執乃弗與使各歸一舘分别叔孫子服回士伯聽其辭而愬諸宣子乃皆執之二子辭不屈故士伯愬而執之士伯御叔孫從者四人過邾舘以如吏欲使邾人見叔孫之屈辱先歸邾子士伯曰以芻蕘之難從者之病將舘子於都都别都謂箕也叔孫旦而立期立待命也從旦至暮為期乃舘諸箕舍子服昭伯於他邑别囚之范獻子求貨於叔孫使請冠焉以求冠為辭取其冠法而與之兩冠曰盡矣既送作冠之法又進二冠以與之為若不解其意為叔孫故申豐以貨如晉欲行貨以免叔孫叔孫曰見我吾告汝所行貨見而不出留申豐不使得出不欲以貨免二十四年正月晉士彌牟逆叔孫于箕將成禮而歸之叔孫使梁其踁待于門内踁叔孫家臣曰余左顧而欬乃殺之疑士伯來殺已故謀殺之右顧而笑乃止叔孫見士伯士伯曰寡君以為盟主之故是以久子久執子以謝邾不腆敝邑之禮將致諸從者使彌牟逆吾子叔孫受禮而歸樂祁宋大夫魯定公六年秋八月樂祁言於景公曰諸侯唯我事晉今使不徃晉其憾矣樂祁告其宰陳寅以與公言告之陳寅曰必使子徃它日公謂樂祁曰唯寡人悦子之言子必徃陳寅曰子立後而行吾室亦不亡徃必有難故使樂祁立後而行唯君亦以我為知難而行也見溷而行溷樂祁子也見於君立以為後趙簡子逆而飲之酒於緜上獻楊楯六十於簡子楊木名陳寅曰昔吾主范氏今子主趙氏又有納焉以楊楯賈祸弗可為也已知范氏必怨將得禍然子死晉國子孫必得志於宋以其為國死范獻子言於晉侯曰以君命越疆而使末致使而私飲酒不敬二君不可不討也乃執樂祁獻子怒祁主趙氏經所以稱行人八年二月趙鞅復言於晉侯曰諸侯唯宋事晉好逆其使猶懼不至今又執之是絶諸侯也將歸樂祁士鞅曰三年止之無故而歸之宋必叛晉執樂祁在定六年獻子私謂子梁獻子范鞅子梁樂祁曰寡君懼不得事宋君是以止子子姑使溷代子溷樂祁子子梁以告陳寅寅曰宋將叛晉是棄溷也不如待之留待勿以子自代樂祁歸卒于太行太行晉東南山士鞅曰宋必叛不如止其尸以求成焉乃止諸州漢張騫漢中人武帝建元中為郎時匈奴降者言匃奴破月氏王月氏西域胡國也以其頭為飲器匈奴傳云以所破月氏王頭共飲血盟然則飲酒之器是也月氏遁而怨匈奴無與共擊之無人援助也漢方欲事逺略聞此言欲通使道必更匈奴中更過也音工衡反乃募能使者騫以郎應募使月氏與堂邑氏奴甘父堂邑氏之奴本胡人名甘父下云堂邑父者葢取主之姓以為氏而單稱其名曰父俱出隴西經匈奴道由匃奴過匈奴得之傳詣單于單于曰月氏在吾北漢何以得徃使吾欲使越漢肯聽我乎留騫十餘歳予妻有子然騫持漢節不失居匈奴西騫因與其屬亡鄉月氏屬謂同使之官屬鄉讀曰向西走數十日走趨也不能知其道里多少故以日數言之走音奏一曰走謂奔走也讀如本字至大宛聞漢之饒財欲通不得見騫喜問欲何之騫曰為漢使月氏而為匈奴所閉道脱亡惟王使人道送我道讀曰導誠得至反漢漢之賂遺王財物不可勝言大宛以為然遣騫為發譯道抵康居抵至也康居傳致大月氏大月氏王已為胡所殺立其夫人為王既臣大夏而君之以大夏為臣為之作君也地肥饒少㓂志安樂又自以遠遠漢殊無報胡之心下遠音于萬切騫從月氏至大夏竟不能得月氏要領要衣要也領衣領也凡持衣者則執要與領言騫不能得月氏意趣無以持歸於漢故以要領為喻要音一遥切也留歳餘還並南山欲從羌中歸羌音􅇍浪切復為匃奴所得留歳餘單于死國内亂騫與胡妻及堂邑父俱亡歸漢拜騫大中大夫堂邑父為奉使君騫為人彊力寛大信人彊力言堅忍於事蠻夷愛之堂邑父胡人善射窮急射禽獸給食給供也初騫行時百餘人去十三歲唯二人得還郭吉史不載何官武帝元封元年十月親廵朔方歴上郡西河出長城北登單于臺勒兵十八萬以見武節使吉諷告單于吉既至匈奴匈奴主客問所使主客主接諸客者也問以何事而來郭吉卑體好言曰吾見單于而口言單于見吉曰南越王頭已縣於漢北闕下今單于即能前與漢戰天子自將兵待邊即不能亟南靣而臣於漢亟急也音居力反何但遠走亡匿於幕北苦寒無水草之地為但空也語卒單于大怒立斬主客見者而留郭吉不歸遷辱之北海上而單于終不肯為寇於漢邊又云征和四年匈奴單于遣使遺漢書漢遣使者報送單于使單于使左右難漢使者曰漢禮義國繇二師道前太子發兵反何也使者曰然乃丞相私與太子爭闘太子發兵欲誅丞相丞相誣之故誅丞相此子弄父兵罪當笞小過耳孰與冐頓單于身殺其父代立帝妻后母禽獸行也單于留使者三歳蘇武字子卿初為栘中廐監栘中廐名時漢連伐胡故數通使相窺觀匈奴留漢使郭吉路充國等前後十餘軰匈奴使來漢亦留之天漢元年武帝遣武以中郎將使持節送匈奴使留在漢者武與副中郎將張勝及假吏常惠等既至匈奴單于益驕武留單于庭十九歳乃還宋垣榮祖為冗從僕射明帝遣説薛安都為安都所拘不得還因收集部曲為安都將領假置冠軍將軍安都引虜入彭城榮祖攜家屬南奔胊山虜遣騎追之不及榮祖懼得罪乃逃遁淮上後梁庾信為右衞將軍散騎常侍聘于周屬大軍南討遂留長安江陵平拜使持節撫軍將軍右金紫光禄大夫都督陳徐陵初仕梁武帝為通直散騎常侍使魏及侯景宼京師父摛先在圍城内陵不奉家信㑹齊受魏禪元帝承制於江陵復通使於齊陵累求復命終拘留不遣陵乃致書於僕射楊遵彦曰夫一言所感凝暉昭於魯陽一志㝠通飛泉涌於疏勒况復元首康哉股肱良哉鄰國相聞風教相期者也天道窮剥鍾亂本朝情計馳惶公私哽懼而骸骨之請徒淹歳寒顚沛之期空盈卷軸是所不圖也非所仰望也執事不聞之乎昔分鰲命鳯之世觀河拜雒之年則有白鳥流災風禽騁暴天傾西北地缺東南感旱坼三川長波含五嶽我大梁應金圖而有亢纂玉鏡而猶屯何則聖人不能為時斯固窮通之常理也至如荆州刺史湘東王機神之所無寄名言陶鑄之餘猶為堯舜雖復六代之舞陳於總章九州之歌登於司樂虞䕫拊石晉曠調鍾未足頌此英聲無以宣其盛德者也若使郊禋楚翼寧非祀夏之君戡定艱難便是翊周之覇豈徒豳王徙雍朞月為都姚帝遷河周年成邑方今越裳藐藐馴雉北飛肅愼茫茫風牛南偃吾君之子含識知歸而答㫖云何所投身斯所未喻一也又晉熈等郡皆入貴朝去我潯陽徑途何㡬至於鏜鏜曉漏的的宵烽隔漵浦而相聞凭髙臺而可望泉流寳盌遥憶湓城峯號香爐依然廬嶽日者鄱陽嗣王治兵匯𣲖屯戍淪波朝夕牋書春秋方物吾無從而躡屩彼何路而齊鑣豈其然乎斯不然矣又近者邵陵王通和此國郢中上客雲聚魏都鄴下名卿風馳江浦豈盧龍之徑於彼新開銅駝之街於我長閉何彼途甚易非勞於五丁我路為難如登於九折地不私載何其爽歟而答㫖云還路無從斯所未喻二也晉熈廬江義陽安陸皆云欵附非復危邦計彼中途便當靜晏自斯以北桴鼓不鳴自此以南封疆未一如其境外脱殞輕軀幸非邊吏之羞何在匹夫之命又此軰賔逰通無貨殖委非韓起聘鄭私買玉鐶吳札過徐躬掛寶劍繇來宴錫凡厥囊裝行役淹留皆已虛罄散有限之餘財供無期之久客斯可知矣且據圖刎首愚者不為運斧全身庸流所鑒何則生輕一髪死重千鈞不以賈盗明矣骨肉不任充鼎爼皮毛不足入貨財盗有道焉吾無憂矣又公家遣使脱有資須本朝非隆平之時逰客豈皇華之勢輕裝獨宿非勞聚橐之儀微騎間行寧望輶軒之禮歸人侍從私具騾驢縁道亭郵唯希蔬粟若曰留之無煩於執事遣之有費於官司或以顚沛為言或云資裝可懼雖非通論皆是外言斯所未喻三也又若以吾徒應還侯景侯景凶逆殱我國家天下含靈人皆憤厲既不獲投身社稷衞難乘輿四體磔蚩尤千剸割王莾安所謂俛首頓膝歸奉㓂讐佩弭腰鞭為其卑𨽻日者通和方敦曩睦㓙人狙詐遂駭狼心頗疑宋萬之誅彌懼荀罃之請所以奔蹄勁角專恣憑凌凡我行人徧膺讎憾正從葅觔醢骨抽舌探肝於彼凶情猶當未雪海内之所知也君侯之所見焉又聞本朝公主都人士女風行雨散東播西流京邑丘墟葌蓬蕭瑟偃師還望咸為草萊覇陵回首俱沾霜露此又君之所知也彼以何義爭免寇讐我以何親爭歸委質昔鉅平貴將懸重於陸公叔向名流深知於鬷茂吾雖不敏嘗慕前修不圖明庶有懷翻其以此量物昔魏氏將亡羣凶挺爭諸賢戮力想得其名為葛榮之黨邪為邢杲之徒耶如曰不然斯所未喻四也假使吾徒還為㓙黨侯景生於趙代家自幽恒居則台司行為連率山川形勢軍國彛章不勞請箸為籌便當屈指能算景以逋逃小醜羊豕同羣身寓江臯家流河朔舂舂井井如鬼如神其不然乎抑又君之所知也且夫宫闈秘事並若雲霄英俊訏謨寧非帷幄或揚鶩而定䇿或焚藁而奏書朝廷之士猶難叅預覊旅之人何階耳目至於禮樂㳂革刑政寛猛則謳謡已遠萬舞成風不知手之舞之足之蹈之也安在揺其齒牙為間諜哉若謂復命西朝終奔東虜雖齊梁有隔尉候奚殊豈以河曲之難浮而曰江關之可濟河橋馬渡寧非宋典之姦關路鷄鳴皆曰田文之客何其通蔽乃爾相妨斯所未喻五也又兵交使在雖著前經儻同狥僕之尤追肆寒山之怒則凡諸元帥並釋縲囚爰及偏禆同無剪馘乃至鍾儀見赦明發遵途襄老蒙歸虞歌引路吾等張旜拭玉修好尋盟洙泗之與浮河郊勞至於贈賄公恩既被賔敬無違今者何諐翻蒙貶責若以為言斯所未喻六也若曰妖氛永久喪亂悠然哀我奔波存與形魄固已銘兹厚德戴此洪恩譬渤澥而俱深方嵩華而猶重但山梁飲啄非有意於樊籠江海飛浮本無情於鐘鼔况吾營魂已謝餘息空留悲黙為生何能致久是即雖蒙飬䕶更夭天年若以此為言斯所未喻七也若云逆竪殱夷當聽反命高軒繼路飛葢相隨未解其言何能善謔夫屯亨治亂有意於前期謝常侍今年五十有一吾今四十有四介已知命賓又杖鄉計彼後生肩隨而已豈銀臺之要彼未從師金竈之方吾知其訣正恐南陽菊水竟不延齡東海桑田無繇可望若以此為言斯所未喻八也足下清襟勝託書囿文林凡自洪荒終乎幽厲如吾今日寧有其人爰至春和㣲宜商畧夫宗基彌墜覇道昏凶或執政之多門或陪臣之凉德故臧孫有禮翻囚與國之賔周伯無諐空怒天王之使遷箕卿於兩舘縶驥子於三年斯非貪亂之風邪寧當今之高例也至於䨇崤且帝四海爭雄或搆趙而侵燕或連韓而謀魏身求盟於楚殿躬奪璧於秦庭輸寳鼎以託齊王馳安車而誘梁客其外膏唇販舌分路揚鑣無罪無辜如兄如弟逮乎中陽受命天下同規廵省諸華無聞幽辱及三方之覇也孫甘言以娬媚曹屈詐於覊縻旋軫歳到於勾吳冠葢年馳於庸蜀則客嘲殊險賔戲已深共盡逰談誰云猜忤若使搜求故實脱有前蹤恐是叔世之姦謀而非為邦之勝畧也抑又聞之雲師火帝澆淳乃異其風龍躍鱗驚王霸雖殊其道莫不從君親以銘物敦敬飬以治民預有邦司曽無隆替吾奉違温凊身屬亂離宼虜猖狂公私播越蕭軒靡御王舫誰持瞻望鄉關何心天地自非生慿禀付源出空桑行路貪情猶其相愍嘗謂擇官而仕非曰孝家擇事而趣非云忠國况乎欽承有道驂駕前王郎吏明經鴟鳶知禮省方廵狩咸問高年東序西膠皆尊耆耋至以珪璋玉帛通聘來朝屬世道之屯期鍾生民之否運兼年累載無申元直之私啣泣吞聲長對公閭之怒情禮之訢將同逆鱗忠孝之言皆應封舌是所不圖非所仰望也且天倫之愛何得忘懷妻子之情誰能無累夫以清河公主之貴餘姚書佐之家莫限高卑皆彼驅畧自東南醜虜抄販饑民臺署郎官俱餒墻壁况吾生離死别多歴暄寒孀室嬰兒何言可念如得生還鄉土躬自推求猶冀提攜俱免凶虞夫四通不逹華陽君所謂亂臣百姓無寃孫叔敖稱為良相足下髙才重譽叅贊經綸非豹非貔聞詩聞禮而中朝大議曽未矜論清禁嘉謀安能相及諤諤非周舍容容䫫胡廣何其無諍臣哉歳月如流平生何㡬晨㸔旅鴈心赴江淮昏望牽牛情馳揚越朝千悲而掩泣夜萬緒而回腸不自知其為生不自知其為死也足下素挺詞鋒兼長理窟漢丞相解頥之説樂令君清耳之談向所諮疑請能曉諭若鄙言為謬來㫖必通分請灰釘甘從斧鑊何但規規黙黙齰舌低頭而已哉若一理存焉猶希矜眷何必期令我等必死齊都足趙魏之黄塵加幽并之片骨遂使東平拱樹長懷向漢之悲西雒孤墳常表思鄉之夢干祈已屢哽慟増深遵彦更不報書及江陵䧟齊送貞陽侯蕭淵明為梁嗣乃遣陵隨還袁憲武帝永平元年為中書侍郎兼散騎常侍與黄門侍郎王瑜使齊數年不遣天嘉初乃還後魏賀狄于為北部大夫道武遣狄于致馬千匹結婚於姚萇㑹萇死興立因止狄于而絶婚秦王觚翰之子也勇烈有膽氣少與兄儀從道武侍衞左右使於慕容垂垂末年政在羣下遂止觚以求賂道武絶之觚率左右馳還為垂子寳所執垂待之更厚又云叔孫建隨秦王觚使慕容􅂷歴六載乃還耿貳史不載官使於北燕馮跋䟦遣其黄門郎常陋迎之于道為䟦不稱臣怒而不見及至䟦又遣陋勞之貳忿而不謝䟦散騎常侍申秀言於䟦曰陛下接貳以禮而敢驕蹇若斯不可容也中給事馮懿以傾佞有幸盛稱貳之陵傲以激䟦曰亦各有志也匹夫尚不可屈况一方之主乎請幽而降之䟦乃留貳不遣後周元偉為小司寇武帝建德四年偉為使報聘于齊是秋帝親戎東討偉遂為齊人所執六年平齊偉方見釋帝以其久被幽縶加授上開府伊婁謙為宣納上士武帝將伐齊使謙聘齊觀釁帝尋發兵齊王知之令其僕射楊休之責謙曰貴朝盛夏徴兵馬首何向謙答曰僕馮式之始未聞興師設復西増白帝之城東益巴丘之戍人情常理豈足怪哉謙叅軍高遵以情輸於齊遂拘留謙不遣陳許善心為通直散騎聘隋遇高祖伐陳禮成而不獲反命累表請辭高祖不許留縶賔舘唐鄭元璹為太常卿時突厥始畢可汗弟乙力設代其兄為叱羅可汗又劉武周將宋金剛與叱羅共為犄角來宼汾晉高祖詔元璹入蕃喻以禍福叱羅竟不納乃欲總其部落入寇太原以為武周聲援未㡬叱羅遇疾療之弗愈其下疑元璹令人毒之乃囚執元璹不得歸叱羅竟死頡利嗣立留元璹每隨其牙帳經數年頡利後聞高祖遺其財物又許結婚始放元璹來還高祖勞之曰卿在北庭累載拘繫蘇武弗過也拜鴻臚卿又云武德四年四月突厥宼并拘我行人漢陽公蘇􅅛太常卿鄭元璹左騎衞大將軍長孫順徳高祖大怒亦留其使人後鄭元璹數歳得還高祖謂曰卿古之蘇武張騫弗之過也凡五使突厥㡬於死者數焉源休為京兆尹弔册回紇使德宗建中初休奉使至振武軍使張光晟已殺回紇突董等帝初欲遂絶其使令休還待命於太原久之方遣仍令休歸其突董翳密施大小梅録等四屍突董者即武義可汗之叔父也屍既至可汗令宰相已下具彩車及馬來迎其宰相頡于思迦等坐大帳立休等于帳外雪中詰殺突董等故休曰突董等自與張光晟忿鬬而死非天子命也又問使者背唐國負罪當死不能自戮耶不然何假手於我殺之也凡將殺者數矣言頗悖慢乃引去供餼甚薄留之五十餘日乃得還可汗使謂休曰我國人皆欲殺汝唯我不然汝國已殺突董等吾又殺汝猶以血洗血汙益甚爾吾今以水洗血不亦善乎所欠吾馬直絹一百八十萬匹當速歸之遣散支將軍康赤心等隨休來朝休竟不得見可汗尋遣赤心等歸與之帛十萬匹金銀十萬兩償其馬直郭鋒為鴻臚卿貞元六年奉使册忠貞可汗可汗為其弟所殺而簒立時回鶻大將頡于迦斯西擊吐蕃未回及四月其次相率國人殺簒者而立忠貞之子為可汗年方十六七及六月頡于迦斯西討回將至牙帳次相等懼其復有廢立不欲漢使知之留鋒數月而廻及頡于迦斯之至也可汗等出迎於郊野盛陳鋒所送國信器幣可汗與次相等皆俯伏自言廢立之繇且請命曰惟大相生死之悉以所陳器幣贈頡于迦斯以悦之可汗又拜泣曰兒愚㓜無知今幸得立唯仰食於阿爹國政悉不敢問也回鶻謂父為爹可汗以子事之頡于迦斯以其卑遜興感乃相將號哭遂執臣子之禮焉盡以所贈器幣頒賜左右諸行從將士已無所受自是其國稍安乃遣逹比特勒梅録將軍告忠貞可汗之哀於我且請冊新君也魏竇義史不載官為幽州楊志誠春衣使文宗太和七年志誠以簡較工部尚書轉簡較吏部尚書中使傔奔廻奏曰志誠怒不得僕射三軍有怨言兼他使焦奉鸞尹士恭並為志誠縶留矣强文彩史不載官為安南送冬衣使為黄洞賊所留死事烈士之節可殺而不可辱也葢有備使乎之任乘不測之險危言抗論厲聲正色臨白刅而不撓履虎尾而無憚卓然守節甘心死地斯可謂使於四方不辱君命也已其或中反間之謀値變故之勢淪䧟異域遭罹非命際㑹世難以隕厥身誠可悲也至有奄忽被疾逰於客舘復命中途號於左榖亦詩人盡瘁之斯在而春秋加等之攸及咸用論次著之于篇伯蠲鄭大夫魯成公九年晉欒書伐鄭鄭人使伯蠲行成晉人殺之非禮也兵交使在其間可也漢酈食其為高陽里監門高陽聚邑名屬陳留里監門門卒也高祖初為漢王使食其説齊時韓信虜魏王破趙代降燕定三國引兵將東擊齊聞漢王使酈食其已説下齊韓信欲止范陽辯士蒯通説信曰將軍受詔擊齊而漢獨發間使下齊寧有詔止將軍乎間使謂使人伺間隙而單行何以得無行也且酈生一士伏軾掉三寸舌下齊七十餘城掉揺也將軍將數萬衆迺下趙五十餘城為將數歳反不如一竪儒之功乎於是信然之從其計遂渡河齊已聽酈生即留之縱酒罷備漢守禦信因襲齊歴下軍遂至臨淄齊王以酈生為欺已而烹之朱建子臣欽若等曰朱建之子也史闕名文帝時為中大夫使匈奴單于無禮建子罵單于遂死匈奴中安國少季姓安國字少季覇陵人武帝時南粤王嬰齊死子興嗣立其母為太后初嬰齊為太子入宿衞取邯鄲樛氏女及即位立為后太后自未為嬰齊妻時嘗與少季通及嬰齊薨後元鼎四年漢使少季諭王王太后入朝令辯士諫議大夫終軍等宣其辭勇士魏臣等輔其决助命决義也衞尉路􅀶德將兵屯桂陽待使者王年少太后中國人少季徃復與私通國人頗知之多不附太后太后恐亂起亦欲倚漢威勸王及幸臣求内屬即因使者上書請比内諸侯三歳一朝除邊關於是天子許之王太后將入朝其相吕嘉數諫止也王王不聽有畔心數稱病不見漢使者使者注意嘉勢未能誅王王太后亦恐嘉等先事發欲介使者權謀誅嘉等介恃也置酒請使者大臣皆侍坐飲嘉弟為將將卒居宫外酒行太后謂嘉南粤内屬國之利而相君苦不便者何也以激怒使者使者狐疑相杖遂不敢發太后欲誅嘉等力又不能嘉與其弟將卒攻殺太后王盡殺漢使者谷吉元帝時為衞司馬㑹郅支單于怨漢擁䕶呼韓邪而不助已初元四年遣使奉獻因求侍子願為内附漢議遣吉送之御史大夫貢禹博士康衡以為春秋之義許夷狄者不一而足言節制之不皆稱其所求也今郅支單于鄉化未醇不雜曰醇醇一也厚也所在絶遠宜令使者送其子至塞而還吉上書言中國與夷狄有覊縻不絶之義今既飬全其子十年德澤甚厚若絶而不送近從塞還示棄捐不畜畜謂愛飬也使無鄉從之心鄉從謂向化而従命也棄前恩立後怨不便議者見前江迺始無應敵之數知勇俱困以致恥辱即豫為臣憂臣幸得建彊漢之節承明聖之詔宣諭厚恩不宜敢桀言郅支畏威當不敢桀黠也若懷禽獸加無道於臣則單于長嬰大罪嬰猶帶也必遁逃遠舍不敢近邊舍止也没一使以安百姓國之計臣之願也願送至庭單于庭帝以示朝者禹復爭以為吉徃必為國取悔生事不可許右將軍馮奉世以為可遣帝許焉既至郅支單于怒竟殺吉等後漢伏隆字伯文瑯琊夷武人仕郡督郵建武二年張歩兄弟各擁强兵據有齊地光武拜隆光禄大夫使於歩即拜東萊太守而劉永亦遣使立步為齊王步貪受王爵猶豫末决隆曉譬曰高祖與天下約非劉氏不王今可得為十萬戸侯耳歩欲留隆與共守二州二州青徐也隆不聽求得反命歩遂執隆而受永封隆遣間使上書曰臣隆奉使無狀受執凶逆雖在困戹授命不顧又吏人知歩反畔心不附之願以時進兵無以臣隆為念臣得生到闕庭受誅有司此其大願若令没身宼手以父母昆弟長累陛下陛下與皇后太子永享萬年與天無極帝得隆奏召父湛流涕以示之曰隆可謂有蘇武之節恨不且許而遽求還也其後歩遂殺之時人莫不憐哀焉胡母班獻帝初為執金吾與大鴻臚韓融少府隂修將作大將吳修越騎較尉王環安集關東後將軍袁術河内太守王匡各執而殺之班字公節太山人輕財好施以任俠聞為袁紹河内太守唯韓融獲免蜀馬良為侍中先主征吳遣良入武陵招納五溪蠻夷㑹先主敗績於夷陵良亦遇害晉王運為南海太守元帝命陶侃討杜弢弢乞降帝使運受弢降宣詔書大赦凡諸反逆一皆除之加弢巴東監軍弢受命後諸將殉功者攻擊之不已弢不勝憤怒遂殺運而使其將王眞領精卒三千為竒兵出江南向武陵斷官軍運路陶侃使伏波將軍鄭攀邀擊大破之前秦閻負為苻堅遣負及梁殊衘命下書徴張天錫負等到凉州天鍚自以晉之列藩志在保境命斬之宋朱超石仕晉為河東太守其兄齡石先持節督關中諸軍事關中擾亂高祖時為車騎將軍遣超石慰勞河雒至蒲坂値齡石自長安東走至曹公壘超石濟河就之與齡石俱没為佛佛所殺臣欽若等曰佛佛即赫連勃勃孫長度為奉朝請明帝遣庾業孔顗代行㑹稽太守事使長度送仗與之并令召募行逹晉陵袁標就其求仗長度不與為標所殺追贈給事中崔元孫為尚書度支郎㤗始二年青州刺史沈文秀反明帝遣明僧暠等與平原諸郡義兵伐之使元孫慰勞諸義軍元孫隨僧暠戰敗見殺追贈寧朔將軍冀州刺史南齊車僧朗太祖為齊王時遣使于魏㑹宋順帝亦遣殷靈誕使於魏魏孝文大饗群臣僧朗以班在靈誕之後辭不就席宋降人解奉君刅僧朗於㑹中詔誅奉君等梁張載為太府卿時王琳為湘州刺史恃功縱暴為元帝所徴至江陵以下吏乃使載與廷尉黄羅漢宣慰琳軍陸納等及軍人並哭對使者莫肯受命乃縶羅漢殺載載性深刻為帝所信荆州疾之如讐納等因人之欲抽其腸繫馬脚使繞而走腸盡氣絶又臠割備五刑而斬之後魏秦愍王觚明王翰之子觚使於慕容垂垂末年政在羣下遂止觚以求賂道武絶之道武之討中山慕容普驎既自立遂害觚以固衆心帝聞之哀慟及平中山發普驎冡斬其尸收議害觚者高霸程同等皆夷五族以大刃剉殺之乃改葬觚追諡秦愍王封子䕫為豫章王以紹觚高吞字明珍為員外郎散騎侍郎與叔徽俱使西域還至河州遇賊攻圍城䧟見害崔長謙東魏孝靜天平中為主客郎兼散騎常侍使梁還卒於宿預時人歎惜之以死王事贈騎將軍南青州刺史崔士和為中散大夫武定末蕭寳寅之在關中以士和為督府長史時莫念生遣使詐降寳寅表士和兼度支尚書為隴右行臺令入秦撫慰為念生所害唐吳損為諫議大夫兼御史中丞大厯中奉使吐蕃以疾殁于蕃中代宗憫之贈工部尚書吳漵章敬皇后弟也德宗建中初為左金吾大將軍時涇原兵叛駕幸奉天盧杞白志貞稱朱泚必當向順固無背叛之事德宗擇大臣可使者衆憚其行漵歎息謂親友曰國難不能死非人臣也吾忝恩戚知死所矣遂請使焉及至京城賊泚勉勞如常儀漵退而泚逆謀已决因害漵於四方舘之前帝聞而哀悼久之廢朝一日贈太子太傅實封一百戸葬事官給嫡子與正員五品官孔巢父為給事中興元二年李懷光擁兵河中巢父奉使宣慰既傳詔㫖懷光以巢父嘗使魏慱田悦死於帳下恐禍及已又朔方蕃渾之衆數千皆在行列頗驕悖不肅聞罷懷光兵權且懷光素服待命而巢父不止之衆咸忿恚咄嗟曰太尉盡無官矣懷光亦不禁止遂害巢父及中官啖守盈焉德宗聞而驚悼久之贈尚書左僕射賜其家布帛米粟甚厚乃授一子正員官收復河中日所司備禮葬祭之張薦為秘書監貞元二十年吐蕃贊普死以薦為工部侍郎兼御史大夫持節徃弔贈卒於赤眉東嶺東紇辟驛吐蕃傳歸其柩順宗即位贈禮部尚書薛存慶為給事中穆宗長慶元年為幽州宣慰使卒於鎭州以其介左拾遺狄兼謩終事詔贈吏部侍郎以其將命殁於外加等也册府元龜卷六百六十三
