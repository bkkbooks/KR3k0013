body:
  text: 册府元龜卷四百二十一宋王欽若等撰將帥部任謀夫經武之畧在於貴謀濟衆之方本乎從善盖所以詢能者之䇿慮應一時之權變决機制勝以懋厥功故自春秋以來本兵柄者當夫鞠旅撫征之際交刃致志之始有能咨於幙府訪於麾下揣摩周悉計畫先定言之可用舍己而從人智之可師屈身而服義用能剖分猶豫之惑圖建克獲之庸無失相時之機以保出竒之勝者也漢高所謂運籌於帷幄之中魏武亦云任天下之智力足以知善計任謀之為上矣欒書晉大夫也魯成公六年冬欒書救鄭與楚師遇於繞角繞角鄭地楚師還晉師侵蔡楚公子申公子成以申息之師救蔡申息楚二縣禦諸桑隧汝南朗陵縣東有桑里在上蔡縣南趙同趙括欲戰請於武子將許之武子欒書知莊子荀首中軍佐范文子士燮上軍佐韓獻子韓厥新中軍將諫曰不可吾來救鄭楚師去我吾遂至於此是遷戮也戮而不已又怒楚師戰必不克雖克不令成師以出而敗楚之二縣何榮之有焉六軍悉出故曰成師以大勝小不足為榮若不能敗為辱已甚不如還也乃遂還於是軍帥之欲戰者衆或謂欒武子曰聖人與衆同欲是以濟事子盍從衆盍何不也子為大政中軍元帥將酌於民者也酌取民心以為政子之佐十一人六軍之卿佐其不欲戰者三人而已知范韓也欲戰者可謂衆矣商書曰三人占則從二人衆故也商書洪範武子曰善鈞從衆鈞等也夫善衆之主也三卿為主可謂衆矣三卿皆晉之賢人從之不亦可乎晉析公楚大夫也楚子儀之亂析公奔魯在文十四年晉人寘諸戎軍之殿以為謀主殿後軍繞角之役晉將遁矣析公曰楚師輕窕易震蕩也若多鼔鈞聲以夜軍之鈞同其聲楚師必遁晉人從之楚師宵潰趙奢為趙將時秦伐韓軍於閼與趙遣奢救之兵去邯鄲三十里而令軍中曰有以軍事諫者死秦軍武安西屬魏郡在邯鄲西也秦軍鼔噪勒兵武安屋瓦盡振軍守候有一人言急救武安趙奢立斬之堅壁留二十八日不行復益増壘秦間來入趙奢善食而遣之間以報秦秦將大喜曰夫去國三十里而軍不行乃増壘閼與非趙地也趙奢既已遣秦間乃卷甲而趨之二日一夜至令善射者去閼與五十里而軍軍壘成秦人聞之悉甲而至軍士許厯請以軍事諫趙奢曰内之許厯曰秦人不意趙師至此其來氣盛將軍必厚集其陣以待之不然必敗趙奢曰請受令許厯曰請就鈇鑕之誅趙奢曰胥後令至邯鄲許厯復請諫曰先據北山上者勝後至者敗趙奢許諾即發萬人趨之秦兵後至争山不得上趙奢縱兵撃之大破秦軍秦軍解而走遂解閼與之圍而歸趙惠文王封奢號為馬服君以許厯為國尉田忌為齊威王將魏伐趙趙急請救於齊威王欲將孫臏臏辭謝曰刑餘之人不可於是乃以田忌為將而孫子為師居輜車中坐為計謀田忌欲引兵之趙孫子曰夫解雜亂紛糾者不控捲救鬭者不摶撠音㦸批亢𢷬虚形格埶禁則自為解耳今梁趙相攻輕兵銳卒必竭於外老弱罷於内君不若引兵疾走大梁據其街路衝其方虛彼必釋趙而自救是我一舉解趙之圍而收弊於魏也田忌從之魏果去邯鄲與齊戰於桂陵大破梁軍漢韓信為丞相破趙乃令軍中毋斬廣武君有生得之者購千金頃之有縳而至戲下者信解其縳東鄉坐西鄉對而師事之於是問廣武君曰僕欲北攻燕東伐齊何若有功何若猶言何如也廣武君辭曰臣聞之亡國之大夫不可以圖存圖謀也敗軍之將不可以語勇若臣者何足以權大事乎信曰僕聞之百里奚居虞而虞亡之秦而秦伯百里奚本虞臣也後仕于秦遂為大夫穆公用其言以取霸伯讀曰霸非愚於虞而智於秦也用與不用聼與不聼耳向使成安君聽子計僕亦擒矣僕委心歸計願子勿辭廣武君曰臣聞智者千慮必有一失愚者千慮亦有一得故曰狂夫之言聖人擇焉顧恐臣計未足用顧念也願效愚忠夫成安君有百戰百勝之計一日而失之軍敗鄗下常山縣也光武即位於此故改曰高邑身死泜水上今足下虜魏王禽夏說不旬朝破趙二十萬衆誅成安君名聞海内威震諸侯衆庶莫不輟作怠惰靡衣媮食傾耳以待命者輟止也靡輕麗也媮與偷字同茍且也言為羙麗之衣茍且而食恐懼之甚不為長久之計也然而衆勞卒罷其實難用也今足下舉勌敝之兵頓之燕堅城之下情見力屈見顯露也屈盡也欲戰不拔曠日持久糧食殫竭殫亦盡也若燕不破齊必距境而以自彊二國相持則劉項之權未有所分也臣愚竊以為過矣信曰然則何繇繇從也言當從何計也廣武君對曰當今之計不如按甲休兵百里之内牛酒日至以享士大夫北首燕路首謂趨向也然後發一乘之使奉咫尺之書八寸曰咫咫尺者其簡牘或長咫或長尺喻輕率也今俗言尺書或言尺牘盖其遺語耳以使燕燕必不敢不聽從燕而東臨齊雖有智者亦不知為齊計矣信曰善敬奉教於是用廣武君䇿發使燕燕從風而靡周亞夫為車騎將軍景帝三年七國反亞夫將兵東撃吳楚因自請帝曰楚兵剽輕難與争鋒剽音匹妙反願以梁委之絶其食道乃可制也帝許按吳王傳云亞夫至淮陽問鄧都尉為畫此䇿亞夫乃從之今此云自請而後行二𫝊不同未知孰是亞夫既發至霸上趙渉遮說亞夫曰將軍東討吳楚勝則宗廟安不勝則天下危能用臣之言乎亞夫下車禮而問之渉曰吳王素富懐輯死士久矣比知將軍且行必置間人於殽黽阸陿之間且兵事上神密將軍何不從此右去走藍田右謂少西去也走音奏出武闗抵雒陽抵至也間不過差一二日右去行遲止一二日直入武庫撃鳴鼔諸侯聞之以為將軍從天而下也不意其猝也太尉如其計至雒陽使吏搜殽黽間果得伏兵廼請渉為䕶軍亞夫乘六𫝊㑹兵滎陽至雒陽問故父絳侯客鄧都尉曰䇿安出客曰吳楚兵銳甚難與争鋒楚兵輕不能久方今為將軍計莫若引兵東北壁昌邑以梁委吳必盡銳攻之將軍深溝高壘使輕兵絶淮泗口塞吳饟道饟古餉字使吳梁相敝而糧食竭乃以全制其極破吳必矣條侯曰善從其策遂堅壁昌邑南輕兵絶吳饟道竟破吳楚後漢傅俊為積弩將軍光武建武三年俊東徇揚州俊素聞汝南郅惲名乃禮請之上為將兵長史授以軍政惲乃誓衆曰無掩人不備窮人於戹不得斷人支體裸人形骸放淫婦女俊軍士猶發塜陳尸掠奪百姓惲諫俊曰昔文王不忍露白骨武王不以天下易一人之命故能獲天地之應克商如林之旅將軍如何不師法文王而犯逆天地之禁多傷人害物虐及枯尸取罪神明今不謝天改政無以全命願將軍親率士卒收傷葬死哭所殘暴以明非將軍本意也俊從之百姓悅服所向皆下任尚安帝時為中郎將將羽林緹騎五營子弟三千五百人代班雄屯三輔尚臨行懐令虞詡說尚曰使君頻奉國命討逐寇賊三州屯兵二十餘萬人棄農桑疲苦徭役而未有功効勞費日滋若此出不克誠為使君危之尚曰憂惶久矣不知所如詡曰兵法弱不攻强走不逐飛自然之勢也今虜皆馬騎日行數百來如風雨去如絶弦以歩追之勢不相及所以曠而無功也為使君計者莫如罷諸郡兵各令出錢數千二十人共市一馬如此可捨甲胄馳輕兵以萬騎之衆逐數千之虜追尾掩截其道自窮便人利事大功立矣尚大喜即上言用其計乃遣輕騎鈔撃杜季貢於丁奚城斬首四百餘級獲牛馬羊數千頭公孫瓉為奮武將軍禽劉虞盡有幽州之地獻帝建安三年為袁紹所破於鮑邱瓉遂守易京袁紹悉軍圍之瓉遣子求救於黑山賊復欲自將突騎直出傍西南擁黑山之衆陸梁冀州横斷紹後長史闗靖說瓉曰今將軍將士皆已土分瓦解其所以能相守持者顧戀其老小而以將軍為主耳將軍堅守曠日袁紹要當自退自退之後四方之衆必復可合也若將軍舍之而去軍無鎭重易京之危可立待也將軍失本孤在草野何所成耶瓉遂止不出袁紹領冀州牧引沮授為别駕因謂授曰今賊臣作亂朝廷遷移吾歴世受寵志竭力命興復漢室然齊桓非夷吾不能成伯句踐非范蠡無以存國今欲與卿戮力同心共安社稷將何以拯濟之乎授進曰將軍弱冠登朝播名海内值廢立之際忠義奮發單騎出奔董卓懐懼濟河而北勃海稽服擁一郡之卒撮冀州之衆威陵河朔名重天下若舉軍東向則黄巾可掃還討黑山則張燕可滅囘師北首則公孫必禽振脅戎狄則匈奴立定横大河之北合四州之地收英雄之士擁百萬之衆迎大駕於長安復宗廟於雒邑號令天下誅討未服以此争鋒誰能禦之比及數年其功不難紹喜曰此吾心也即表授為􅁬武將軍使監諸將魏郡審配鉅鹿田豐並以正直不得志於韓馥紹乃以豐為别駕配為治中甚見器任魏曹洪太祖時為厲鋒將軍劉備遣吳蘭屯下辯大祖遣洪征之以曹休為騎都尉參洪軍事大祖謂休曰汝雖參軍其實帥也洪聞此令亦委事於休備遣張飛屯固山欲斷軍後衆議狐疑休曰賊實斷道者當伏兵前行今乃先張聲勢此其不能也宜及其未集促撃蘭蘭破則飛自走矣洪從之進兵撃蘭大破之飛果走吳吕蒙為左䕶軍漢昌大守討闗羽騎都尉虞翻從蒙舉軍西上南郡太守麋芳開城出降蒙未據郡城而作樂沙上翻謂蒙曰今區區一心者麋將軍也城中之人豈可盡信何不急入城持其管籥乎蒙即從之時城中有伏計頼翻謀不行魯肅為􅁬武校尉代周瑜領兵時吕蒙為偏將軍領尋陽令肅過蒙屯下肅意尚輕蒙或說肅曰吕將軍功名日顯不可以故意待也君宜顧之遂徃詣蒙酒酣蒙問肅曰君受重任與闗羽為隣將何計畧以備不虞肅造次應曰臨時施宜蒙曰今東西雖為一家而闗羽實熊虎也計安可不豫定因為肅畫五策肅於是越席就之拊其背曰吕子明吾不知卿才畧所及乃至是也遂拜蒙母結交而别晉陶侃為征西大將軍征蘇峻累戰無功諸將請於查浦築壘監軍部將李根建議請立白石壘侃不從曰若壘不成卿當坐之根曰查浦地下又在水南惟白石峻極險固可容數千人賊來攻不便滅賊之術也侃笑曰卿良將也乃從根謀夜修曉訖賊見壘大驚賊攻大業壘侃將救之長史殷羡曰若遣救大業歩戰不如峻則大事去矣但當急攻石頭峻必救之而大業自解侃又從羡言峻果棄大業而救石頭宋朱齡石為建威將軍與下邳太守劉鍾等同討譙縱師次平模去成都二百里縱遣其大將軍侯暉尚書僕射譙詵屯平模夾岸連城層樓重栅衆未能攻齡石謂劉鍾曰天方暑熱賊固險攻之難抜祗困我師吾欲蓄銳息兵伺隙而進卿以為何如鍾曰不然前揚聲言大將繇内水故譙道福不敢捨涪今重軍逼之出其不意侯暉之徒巳破膽矣正可因其兇而攻之勢當必尅既尅平模之後鼔行而前成都必不能守若緩兵相持虚實相見涪軍復來難為敵也進無能戰退無所資二萬餘人因為蜀子虜耳從之翌日進攻皆剋斬侯暉等於是遂進縱之城守者相次解散縱乃出奔栁元景為領軍將軍孝武孝建元年正月魯爽反遣左衛將軍王𤣥謨討之加元景撫軍假節置佐後𤣥謨復以為都督雍梁南北秦四州荆州之竟陵隨二郡諸軍事撫軍將軍領寧蠻校尉雍州刺史持節如故臧質義宣並反元謨南據梁山夾江為壘垣䕶之薛安都渡據厯陽元景出屯采石元謨聞賊盜盛遣司馬管法濟求益兵帝使元景進屯姑熟元景使將武念前進質遣將龐法起襲姑熟值念至撃破之法起單舩走質攻䧟元謨西壘元謨使垣䕶之告元景曰今餘東卒萬人賊軍數倍强弱不敵謂宜還就節下協力當之元景謂䕶之曰師有常刑不可先退賊衆雖多惰而不整今當卷甲赴之䕶之曰逆徒皆云南州有三萬人而麾下裁十分之二若往造賊虚實立見則賊氣成矣元景納其言悉遣精兵助元謨以羸弱居守所遣軍多張旗幟梁山望之如數萬人皆曰京師兵悉至於是衆心乃安繇是剋捷帝遣丹陽尹顔峻宣㫖慰勞與沈慶之俱以本號開府儀同三司封晉安郡公邑如故南齊崔慧景為徐州刺史明帝建武二年虜圍鍾離時張欣泰為軍主随慧景救援虜既為徐州軍所挫更欲於邵陽洲築城慧景慮為久患欣泰曰虜所以築城者外示誇大實懼我躡其後耳今若說之以彼此各願罷兵則其患自息慧景從之遣欣泰至虜城下具述此意及虜引退而洲上餘兵萬人求輸五百匹馬假道慧景欲斷路攻之欣泰說慧景曰歸師勿遏古人畏之死地之兵不可輕也勝之既不足為武敗徒䘮前功不如許之慧景乃聽虜過梁鄧元起為左將軍益州刺史時劉季連發兵拒守元起在道久軍糧乏絶或說之曰蜀土政慢民多詐疾若檢巴西一郡籍注因而罰之所獲必厚元起然之涪令李膺諫曰使君前禦嚴敵後無繼援山民始附於我觀徳若糺以刻薄民必不堪衆心一離雖悔無及何必檢括可以濟師膺請出圖之不患資糧不足也元起曰善一以委卿膺退率富民上軍資未㡬得三萬斛王僧辯為領軍將軍大都督時司馬申為鎮西外兵記室參軍及侯景寇郢州申隨僧辯據巴陵每進籌䇿皆見行用後魏樂平王丕為車騎大將軍督河西高平諸軍討南秦王楊難當難當懼還仇池而諸將議曰若不誅豪帥軍還之後必聚而為寇又以大衆逺出不有所掠則無以充軍實賞將士將從之時中書侍郎高元參丕軍事諫曰今若誅之是傷其向化之心恐大軍一還為亂必速丕以為然於是綏懐初附秋毫無犯皮豹子拜仇池鎮將與古弼等討仇池楊難當平之未㡬諸氐復反楊文徳為主以圖仇池古弼率諸軍討平之時豹子次于下辨聞圍解欲還弼遣使謂豹子曰賊恥其負敗必求報復發舉為難不如陳兵以待之豹子以為然尋除秦雍荆梁益五州諸軍事開府仇池鎮將長孫稚為尚書僕射雍州刺史蕭寳寅據雍州反詔稚討之軍次𢎞農副將楊侃曰昔魏武與韓遂馬超挾闗為壘勝負之理久而無決豈才雄相類算畧抗衡當以河山險阻難用智力今賊守潼闗全據形勝縱曹操更出亦無所逞奇必須北取蒲坂飛掉西岸置兵死地人有鬭心潼闗之賊必覩風而散諸處既平長安自剋稚曰賊黨薛脩義已圍河東薛鳯賢又保安邑都督宗正珍孫停虞坂久不能進雖有此計猶足為疑侃曰珍孫本行陣一夫因縁進逹可以為人使未可以使人一旦受元帥之任處分三軍精神亂矣寧堪圍賊河東理在蒲坂西𢃄河湄所部之人多在東境脩義驅率壯勇西圍郡邑父老妻弱尚保舊村若卒一臨方寸各亂人人思歸則郡圍自解不戰而勝昭然在目稚從之令其子彥等領騎與侃於𢎞農北渡所統悉是騎士習於野戰未可攻城便據石錐壁侃乃班告曰今且停軍於此以待歩卒兼觀人情向背然後行若以名送降者各自還村候臺軍舉􅇏火亦應之以明降欵其無應烽者即是不降之村理須殄戮賞賚軍士民遂相告報未實降者亦詐舉􅇏一宿之間火遍數百里内寳寅時將圍華州不測所以各自散歸長安賊平侃頗有力爾朱榮為柱國大將軍録尚書事黄門郎楊侃為北中郎將時梁人送元顥入洛侃從孝莊帝幸河北及車駕南還顥令陳慶之守北中城自據南崖有夏州義士為顥守河中者乃密信通欵求破橋立效榮率軍赴之及橋破應接不果皆為顥所屠滅榮因悵然將為還計欲更圖後舉侃曰未審明大王發并州之日已知有夏州義士指來相應為欲廣申經畧寧復帝基乎夫兵敗而更合瘡愈而更戰持此收功自古不少豈可以一圖不全而衆慮頓廢今事不果乃是兩賊相殺則大王之利矣若今即還民情失望去就之心何繇可保未若召發民材惟多縛筏間以舟檝􅆓河廣布令數百里中皆為渡勢首尾既逺顥復知防何處一旦得渡必立大功榮大笑曰黄門即奏行此計於是爾朱兆與侃等遂與馬渚楊南渡破顥子領軍將軍冠受禽之顥便南走後周王思政魏孝武時為武衛將軍裴俠為東郡太守及孝武與齊神武有隙徵俠率所部赴雒州思政謂曰當今權臣擅命王室日卑若何俠曰宇文泰為三軍所推居百二之地所謂已操矛戈寧肯授人以柄雖欲撫之恐是據於蒺藜也思政曰奈何俠曰圖歡有立至之憂西廵有將來之慮且至闗右日愼一日徐思其宜耳思政然之乃進俠於帝授左中郎將思政為驃騎大將軍鎭𢎞農郭賢為伏波將軍從思政行𢎞農郡事賢質直有算畧思政甚重之禦邊之謀多與賢參決隋李景檢校代州摠管漢王諒作亂遣兵攻之景戰士不過數千加以城池不固為賊衝撃摧毁相繼司馬馮孝慈司法參軍吕玉並驍勇善戰儀同三司侯莫陳又多謀畫上拒守之術景推誠於此三人無所闗預惟在閣持重時出撫循而已月餘援兵至合撃大破之唐李孝逸為左屯鈐衛大將軍時徐敬業據揚州作亂孝逸督軍討之則天詔殿下侍御史魏元忠監其軍事孝逸至臨晉而偏將雷仁智為敬業先鋒所敗敬業又攻䧟潤州囘兵以拒孝逸孝逸懼其鋒按兵不敢進元忠謂孝逸曰朝廷以公王室懿親故委以閫外之事天下安危實資一決且海内承平日久忽聞狂狡莫不注心傾耳以候其誅今大軍留而不進則解逺近之望萬一朝廷更命他將代公其將何辭以逃逗遛之罪幸速進兵以立大效不然則禍難至矣孝逸然其言乃部勒士卒以圖進發時敬業屯於下阿谿敬業弟敬猷率偏師以逼淮隂元忠請先撃敬猷諸將咸曰不如先攻敬業敬業敗則敬猷不戰而擒矣若撃敬猷則敬業引兵救之是腹背受敵也元忠曰不然賊之勁兵精卒盡在下阿蟻聚而來利在一決萬一不㨗則大事去矣敬猷本出博徒不習戰鬭其衆寡弱人情易搖大軍臨之其勢必剋既剋敬猷我軍乘勝而進彼若引救淮隂計程則不及又恐我之進掩江都必邀我於中路彼則勞倦我則以逸待之破之必矣譬之逐獸弱者先擒豈可捨必擒之弱獸趨難敵之强兵恐未可也孝逸從之乃引兵撃敬猷一戰破之敬猷脫身而遁先是敬業方南攻潤州其弟敬猷屯兵淮陰偽將韋超據都梁山以拒孝逸禆將馬敬臣撃斬賊之别率尉遲昭夏侯瓚等超乃擁衆憑山以自固或謂孝逸曰超衆守險憑山為固攻之則士無所施其力騎無所騁其足窮寇殊死殺傷必衆不若分兵守之大軍直趨揚州未數日其勢必降也度支使薛克構曰超雖蒙險其卒非多今逢小寇不擊何以示武若加兵以守則有闕前機捨之而前則終為後患不如擊之尅超則淮隂自懾淮隂破則楚州諸縣必開門而候官軍然後進兵髙郵直趨江都逆豎之首可指掌而懸也孝逸從其言進兵擊超賊衆壓伏官軍登山急擊之殺數百人日暮圍解超銜枚夜遁孝逸引兵撃淮陰又破敬猷之衆時敬業迴軍屯於下阿谿以拒官軍有流星隊其營孝逸引兵渡溪以撃之敬業初勝後敗孝逸乘勝追奔數十里敬業窘廹與其黨携妻子逃入海曲孝逸進據揚州盡捕斬敬業等振旅而還以功進授鎭軍大將軍封常清為安南節度討大勃律時次賀薩勞城一戰兩勝常清逐之判官叚秀實曰賊兵羸餌我也請備左右搜其山林遂殲其覆李岑為宋州刺史史朝義遣將圍之連月不解城中食盡賊垂將䧟之岑計蹙别駕劉昌為謀曰今河陽有李光弼制勝且江淮足兵此廩中有數千斤麫可以稍食計援兵不二十日當至東南隅之敵衆以為危昌請守之昌被鎧持楯而登之陳逆順以告諭賊衆後十五日副元帥李光弼救軍至賊乃宵潰李僧惠為宋州刺史李靈曜據汴州叛僧惠將受靈曜牽制别駕劉昌密遣僧神表潛說僧惠惠召昌問計昌泣陳逆順僧惠感之乃使神表詣闕請討靈曜遂剪靈曜左翼邢君牙為李晟都虞侯屬駕幸奉天晟率君牙統所部兵倍道兼程來赴國難及駐軍咸陽移營渭橋軍中之事晟惟與君牙商量之他人莫可得而聞也册府元龜卷四百二十一
