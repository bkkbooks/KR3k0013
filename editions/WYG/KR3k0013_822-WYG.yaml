body:
  text: 册府元龜卷八百二十二宋王欽若等撰總録部尚黄老太史公之論六家劉歆之奏七畧其叙黄老之旨載篇籍之數詳矣世之學者亦曷嘗無其人焉乃有敦清浄之訓以助治成化捐利禄之累以越世髙蹈聚徒教授以傳述真宗立言敷演以發揚妙鍵注釋以啓深趣論議以極逺致乃至霛仙通感神期㝠㑹親受祕訣以享遐算豈誣也哉其或業與時契名叅俊選志存靈貺力營𤣥舘波流頺靡増華競逐盖與夫黜聰抱樸之説戾矣老萊子楚人著書十五篇言道家之用慎到趙人與齊人田駢接子楚人環淵皆學黄老道徳之術因發明序其指意到著一十二論今慎子劉向所定有四十一篇環淵著上下篇而田駢接子皆有所論焉莊周梁惠王時為蒙漆園吏蒙縣屬梁國其學無所不闚然其要本歸於老子之言故其著書十餘萬言大扺率寓言也作漁父盗跖胠箧以詆訾孔子之徒以明老子之術申不害韓人為昭侯相十五年終申子之身國治兵强無侵韓者申子之學本於黄老而主刑名著書二篇韓非韓之諸公子喜刑名法術之學而其歸本於黄老樂巨公一名臣公又作鉅姓樂名鉅公者老之稱也趙人善修黄帝老子之言顯聞於齊稱賢師其本師號曰河上丈人不知其所出河上丈人教安期生安期生教毛翕公毛翕公教瑕公瑕公教樂巨公樂巨公教盖公盖公教於齊髙宻膠西為曹相國師漢曹参為齊惠王相齊七十城天下初定王富於春秋參盡召長老諸先生問所以安集百姓而齊故諸儒以百數言人人殊參未知所定聞膠西有盖公善治黄老言使人請之既見為言治道其治要用黄老術故相齊九年齊國安集大稱賢相張良從髙祖定天下乃稱曰以三寸舌為帝者師封萬戸位列侯此布衣之極於是足矣願棄人間事欲從赤松子遊耳乃學道欲輕舉位至太子太傅陳平好讀書治黄帝老子之術位至丞相田叔學黄老術於樂鉅公為人亷直喜任狭喜好也游諸公位至魯相直不疑學老子言其所臨為官如惟恐人之知其為吏迹也不好立名稱為長者位至御史大夫鄧公子章以修黄老言顯諸公間汲黯為東海太守學黄老言治官民好清静擇丞史任之擇郡丞及史任之鄭當時為大司農官屬好黄老言班嗣彪從兄也雖修儒學然貴老嚴之術老老子也嚴莊周也臣欽若等曰明帝諱莊改字曰嚴桓生欲借其書桓譚嗣報曰若夫嚴子者絶聖棄智修生保真清虚澹泊歸之自然澹泊安静也獨師友造化而不為世俗所役者也漁釣於一壑而萬物不奸其志奸犯也栖遲於一丘則天下不易其樂不絓聖人之罔聖人謂周孔不齅驕君之餌餌謂爵禄君所以制使其臣亦猶釣魚之餌蕩然肆志談者不得而名焉肆放也故可貴也今吾子已貫仁義之羈絆繫名聲之韁鎖韁如馬韁也伏周孔之軌躅躅迹也馳顔閔之極縶縶至也人行之所極至既繫攣於世教矣何用大道為自眩矅言用老子莊周之道也為自欲以名眩矅耳昔有學歩於邯鄲者曽未得其髣髴又復失其故歩遂匍匐而歸耳恐以此類故不進言不與其書嗣之行已持論如此後漢耿况與王莽從弟仍共學老子於安丘先生位至上谷太守任隗字仲和少好黄老清静寡欲位至光禄勲鄭均字仲虞少好黄老書嘗稱病家庭不應州郡辟召後為議郎蔡勲字君嚴邕之六世祖好黄老平嘗時為郿令樊融有俊才好黄老不肯為吏樊瑞尚書令準之父也好黄老言清静少欲楊厚為侍中稱病歸家修黄老教授門生上名録者三千餘人翟酺好老子尤善圖緯天文歴算位至光禄大夫將作大匠淳于恭善説老子清静不慕榮名位至侍中騎都尉樊􅁮有俊才好黄老不肯為吏位至天水太守周勰舉之子少尚𤣥虚不應徵辟嘗隐處竄身慕老􅅨清静杜絶人事巷生荆棘十有餘載矯慎字仲彦扶風茂陵人少好黄老隐遯山谷因穴為室仰慕松喬導引之術向長字子平河内朝歌人隐居不仕性尚中和好老易貧無資好事者更饋焉受之取足而反其餘髙恢京兆人少好老子隐於華隂山中魏劉先字始宗博學强記尤好黄老言王弼字輔嗣為臺郎何晏與弼祖述老莊立論以為天地萬物皆以無為為本無也者開物成務無往不存者也隂陽恃以化生萬物恃以成形賢者恃以成徳不肖恃以免身故無爵而貴矣何晏字平叔以才名好老莊言作道徳論位至尚書袁寓精辨有機理好道家之言少被病未官而卒晉嵇康學無師受博覽無不該通長好老莊位至中散大夫向秀字子期清悟有逺識少為山濤所知雅好莊老之學莊周著内外數十篇歴世才士雖有觀者莫適論其旨統也秀乃為之隐解發明其趣振起𤣥風讀之者超然心悟莫不自足一時也惠帝之世郭象又述而廣之儒墨之迹見鄙道家之言遂盛焉位至散騎常侍司馬彪為秘書丞注莊子郭象字子𤣥少有才理好莊老能清言注莊子位至東海王鉞太傅主簿庾􅢺字子嵩為陳留相未嘗以事嬰心從容酣暢寄通而已處衆人中居然獨立嘗讀老莊曰正與人意闇同太尉王衍雅重之河南郭象善老莊時以為王弼之惡􅢺甚知之每曰郭子𤣥何必減庾子嵩山濤字巨源性好莊老每隐身自晦位至司徒謝鯤字㓜輿少知名通簡有髙識不修威儀好老易位至豫章太守郗愔及弟曇奉天師道而何充與弟凖崇信釋氏謝萬譏之云二郗謟於道二何佞於佛位至鎮軍將軍張忠中山人隐於太山無琴書之適不修經典勸教但以至道虚無為宗其居依崇嵓幽谷鑿地為窟室弟子亦以窟居去忠六十餘歩五日一朝其教以形不以言弟子受業觀形而退立道壇於窟上每旦朝拜之食用瓦器鑿石為釡左右居人饋之衣食一無所受好事少年頗或問以水旱之祥忠曰天不言而四時行焉萬物生焉隂陽之事非窮山野叟所能知之其饋諸外物皆此類也葛洪尤好神仙導飬之法著書言黄白之事名曰内篇後為句漏令鮑靚東海人嘗見仙人隂君授道訣百餘嵗卒宋何偃素好談𤣥注莊子逍遥篇傳於世位至吏部尚書羊欣素好黄老嘗手自書章有病不服藥飲符水而已位至潯陽太守沈演之家世為將而演之折節好學讀老子日百遍以義理業尚知名位至吏部尚書孔靈符罷晉安太守有隐遁之懐於禹井山立舘事道精篤每旦於静屋四向朝拜涕泗滂沱東過錢塘北郭於舟中遥拜杜子恭墓周續之字道祖鴈門廣武人年十二詣豫章太守范寗受業居學數年通五經并五緯號曰十經名冠同門稱為顔子既而閒居惟讀老易入廬山事沙門釋慧逺沈道䖍吴興武康人少仁愛好老易居縣北石山下精廬與諸兄子共釡庾而資困不改節南督顧歡字景怡吴郡塩官人年二十餘從雷次宗諮𤣥儒諸義晚節事黄老道以佛道二家互相毁著夷夏論雖同二法而意黨道教宗則退居善易老累徵不起杜京産吴郡錢塘人少恬静閉意榮宦頗渉文義専修黄老沈麟士吴興武康人隐居不就徵飬身静黙著周易兩繫莊子内篇訓注老子要畧數十卷徐伯珍東陽太末人好釋氏老莊之學兼明道術梁嚴植之字孝源建平秭歸人少善莊老能𤣥言位至中撫軍記室叅軍太史叔明吴興烏程人少善莊老無治孝經禮記其三𤣥九精解當世冠絶每講説聽者嘗五百人官至國子助教栁憕少有大意好𤣥言通老易終鎮西安長史阮孝緒陳留尉氏人年十三遍通五經十五冠而見其父彦之誡曰三加彌尊人倫之始宜思自朂以庇爾躬荅曰願迹赤松子於瀛海追許由於空谷庶保死生以免塵論嘗著論云夫至道之本貴在無為聖人之迹存乎極弊極由迹用用有乖於本本既無為為非道之至然不乖其跡則世無以平不究其本則道實交䘮周孔將存其迹故宜權晦其本老莊且明其本亦宜深抑其跡跡既可抑數子所以有餘本方見晦尼丘是故不足非得一之士闕彼明智體二之徒獨懐鑒識然聖已極昭反創其跡賢未居宗更言其本良由跡須極世非聖不能本實明理在賢可炤若能體兹本跡悟彼抑揚則孔莊之意亦過半矣陶𢎞景㓜有異操年十嵗得葛洪神仙傳晝夜研尋便有養生之志謂人曰仰青雲覩白日不覺為逺矣止於句容之句曲山自號華陽隐居始從東陽孫游兵受浮圖經法徧歴名山尋訪經灋天監四年移居積金澗東𢎞辟榖導引之法年踰八十而有壯容位至奉朝請庾承先潁川鄢陵人先學黄老兼渉釋教髙祖詔徵之不起居于五臺山講老子逺近咸来赴集庾曼倩新野人孝元在荆州辟為主簿好黄老之言著莊老議疏馬樞字要理六嵗能誦老子及長尤善老子邵陵王綸為南徐州刺史嘗令學士講老子陳周確字士潛博渉經史篤好𤣥言位至都官尚書陸瑜嘗受莊老於汝南周𢎞正通大旨官至太子中書舍人金緩治周易老莊時人言𤣥者咸推之位至鎮南始興王府詔議叅軍後魏鄭修北海人少隐於岐南雅好經史専意𤣥門屏迹人事不交世俗程駿師事劉昞嘗謂昞曰今世名教之儒咸謂老莊其言虚誕不切實要弗可以經世駿意以為不然夫老子著抱一之言莊生申性本之旨若斯者可謂至順矣人若乖一則煩偽生若爽性則冲真䘮昞曰卿年尚稚言若老成美哉由是聲譽益播北齊杜弼為通直散騎常侍中軍大將軍平陽公淹為并州刺史髙祖又命弼帶并州驃騎府長史弼性好名理探味𤣥宗自在軍旅帶經從役注老子道徳經二卷表上之曰臣聞乗風理弋追逸羽於髙雲臨波命釣引沉鱗于大壑茍得其道為工其事在物既爾理亦固然竊惟道徳二經闡明幽極旨㝠動寂用周凡聖論行也清静柔弱語迹也成功致治實衆流之江海乃羣藝之本根臣少覽經書偏所篤好雖從役軍府而不捨游息鑚味既久亹亹如有所見比之前注微謂異於舊説情發於中而彰諸外輕以管窺遂成穿鑿無取於游刄有慚於運斤不足破秋毫之論何以解連環之結本欲止於門内貽厥童蒙兼以近資愚鄙私偹忘闕不悟姑射凝神汾陽流炤盖髙之聴卑邇言在察春末奉旨猥蒙垂誘令上所注老子謹冐封呈并叙如别詔荅云李君游神窅㝠獨觀恍惚𤣥同造化宗極羣有從中被外周應可以裁成自已及物運行可以資用隆家寧國義属斯文卿才思優洽業尚通逺棲息儒門馳騁𤣥肆既啓専家之學更暢釋老之言戸列門張途通徑逹事理兼申能用具表往賢所未悟遺老所未聞旨極精微言窮深妙朕有味二經倦於舊説歴覽新注所得已多嘉善之来良非一緒已勅殺青編藏之延閣又上一本於髙祖一本于世宗盧臣客風儀甚美少有志尚雅有法度好道家之言羊烈少通敏自修立有成人之風好讀書能言名理以𤣥學知名位至義州刺史後周盧光字景仁好𤣥言撰道徳經章句行於世官至陕州刺史長孫熾頗渉羣書周武帝尚道法尤好𤣥言求學兼經史善於談論者為通道舘學士熾應其選與英俊並游通渉彌博隋張美初仕後周為司成中大夫撰老子莊子義名曰道言五十二篇徐則東海郯人入天台山絶糧飬性初在縉雲山太極真人徐君降之曰汝年出八十當為王者師然後得道也晉王鎮揚州知其名手書召之曰夫道得衆妙法體自然包涵二義混成萬物人能𢎞道道不虚行先生履徳飬空宗𤣥齊物深明義味曉逹法門悦性冲𤣥怡神虚白餐松餌术棲息烟霞望赤城而待風雲游玉堂而駕龍鳳雖復藏名台嶽猶且騰實江淮籍甚嘉猷有勞寤寐欽承素道久積虚襟側席幽人夢想嵓穴霜風已冷海氣將寒偃息茂林道氣休愈昔商山四皓輕舉漢廷淮南八公来儀藩邸古今雖異山谷不殊市朝之隐前賢已說導凡述聖非先生而誰故遣使人徃彼延請想無勞束帛賁然来思不待蒲輪去彼空谷希能屈已竚望披雲則謂門人曰吾今年八十一王来召我徐君之旨信而有徵於是遂詣揚州晉王將請受道法則辭以時日不便其後夕中命侍者取香火如平常朝禮之儀至于五更而死肢體柔弱如生停留數旬顏色無變晉王下書曰天台真隐東海徐公虚確居宗冲𤣥成徳齊物處外儉行安身草褐蒲衣食松餌术栖隐靈岳五十餘年卓矣仙才飄然勝氣千尋萬頃莫測其涯寡人欽承道風久餐徳素頓遣使来逺此延屈兾得䖍受上法或建良縁至止甫爾未淹旬日厭塵羽化反真靈府身體柔軟顔色不變經方所謂尸解地仙者哉誠復師禮未申而心誠有在雖志嘗化猶愴于懐䘮事所資随須供給霓裳羽盖既且騰空空槨餘衣詎籍墳壟但杖舄猶存示同俗法宜遣使人送還天台定𦵏是時自江都至於天台在道多見則徒歩云得放還至其舊居取經書道法分遺弟子仍令自掃一房曰若有客至宜延之於此然後跨石梁而去不知所之須臾屍柩至方知其靈化時年八十二晉王聞而益異之賜物千叚遣畵工圖其狀貌令栁􅈯為之讃曰可道非道嘗道無名上徳不徳至徳無盈𤣥風扇矣問有先生夙練金液怡神玉清石髄方軟雲丹欲成言追葛稚將侣茅盈我王遥屬爰感靈誠柱下暫啓河上沉精留符告信化杖飛聲永思靈跡曷用攄情時披素繪如臨赤城唐潘師正趙州賛皇人隋大業中度為道士師事王逺知盡以道門隐訣及符籙授之師正清静寡欲居於嵩山之逍遥積二十餘年但服松葉飲水而已李播淳風之父仕隋為髙唐尉秩卑不得志棄官而為道士頗有文學自號黄冠子文集行於世薛頤貞觀中為太史令請為道士許之仍拜中大夫為置紫府觀於九嵈之下申其髙尚馬賾河東汾隂人少好𤣥言去俗為道士解天文律歴隋煬帝時引入玉清觀每加恩禮召令章醮鄭詵為河南府叅軍郭仙舟為虢州朱陽縣丞開元六年投匭獻詩勅曰觀其文理是崇道法至於時用不切事情宜各從所好並罷官為道士韓思復為御史大夫性恬澹好𤣥言非察察之吏無幾轉為太子賔客司馬承禎字子㣲少好學出家為道士師事潘師正傳其符籙及辟榖導引服餌之法師正特賞異之謂曰我自陶隐居傳授正一之法法至汝四葉矣承禎嘗遍游名山遂止于天台山則天聞其名召至都降手詔以賛美之及將還勅麟臺監李嶠餞之於雒橋之東景雲二年睿宗令其兄承禕就天台起之至京入宫問以隂陽術數之事承禎對曰經曰為道日損損之又損以至于無為且心目所知見者每損之尚未能也復攻乎異端而増其知慮哉帝曰理身無為則清髙矣理國無為如何對曰國猶身也老子曰游心於澹合氣於漠順物自然而無私焉而天下理易曰聖人者與天地合其徳是知天不言而信無為而成無為之㫖理國之道也睿宗歎息曰廣成之言即斯是也承禎固辭還山乃賜寳琴一張及霞紋帔而遣之朝中詞人贈詩百餘首開元九年又遣使迎至京𤣥宗親受法籙前後賞賜甚厚十年駕入都承禎又請還天台上賦詩以遣之十正年又召至都上令承禎於王屋山自選形勝置壇室以居焉張果不知何許人也嘗著隂符經𤣥解盡其𤣥理後受銀青光禄大夫號通𤣥先生賀知章為祕書監授銀青光禄大夫天寳三載知章因老疾恍惚不醒若神游洞天三清上數日方覺遂有志入道乃上疏請度為道士歸捨本鄉宅為觀𤣥宗許之仍拜其子典設郎曾為㑹稽郡司馬使侍飬御製詩以贈行皇太子已下咸就執别肅宗乾元元年十一月詔曰故越州千秋觀道士賀知章器識夷淡襟懐和雅神清志逸學富才雄挺㑹稽之美箭藴崑岡之良玉故飛名仙省侍講龍樓嘗静黙以飬閒因談諧而諷諫以暮齒辭祿載見欵誠願追二老之踪克遂四明之客允叶初志脱落朝衣駕青牛而不還狎白衣而長徃丹壑非息人琴兩忘惟舊之懐有深追悼宜加縟禮式展哀榮可贈禮部尚書王鉷為御史大夫天寳十載請捨宅為觀表曰臣聞道本無為虚而必應行之者時乗六氣得之者夀越二儀伏惟開元天地大寳聖神文武應道皇帝陛下髙居衆妙深契重𤣥降自三清元君俯為萬方聖主竊見朝之上宰是曰大賢首學真宗先開道觀奉揚慈旨布淳化於蒼生恭啓福因延休祐於皇極臣昧於聞道不敢思齊瞻言報恩寕忘竊比且臣孤立明主所知竭力効官義惟守死捐軀奉國誓不偷生所賜寵榮所蒙任使不因人力特出聖衷加以前後紏彈頻抵忤公言成謗恐不自明直道招愆甘為已分陛下聖明先覺真偽立分燕客上書遥知是詐漢臣引過逾察其忠蒙獨照於聖心免獲罪於浮議嘗憂萬死飜致九遷伏念殊私將深罔極徒申荅効無補萬分臣舊宅在城南安化門内道東第一家祖父相傳竹樹猶茂已更數代垂向百年同蕭何之賣田誠為偏僻異晏嬰之近市稍逺囂塵臣於中選其勝處减兼官之禄俸廽累賜之金帛盡除遺堵創建遵堂廊宇既成功徳將畢伏乞俯矜丹懇時降皇慈因誕聖之辰充報恩之觀捧迎仙榜光映敝廬每至三元八節之時天長乙酉之日臣得澡雪紛垢奉持齋戒一心至願稽首尊容獻福聖躬永資保算千生頂戴萬刼歸依雖螻蟻之負細塵豈能禆岳而烏鵲之銜微毳有志填河倘蒙睿澤曲流愚誠俯遂仰望許臣諸處招灼然有行業道士二十七人嘗修香火無任感恩荷徳之至楊綰雅尚𤣥言宗道釋二教著王開先生𫝊以見意位至中書侍郎平章事李勉字𤣥卿㓜勤經史長而沉雅清俊宗於虚𤣥位至太子太師閻寀為吉州刺史徳宗貞元七年請為道士從之賜名遺榮王紹為定武軍節度憲宗元和四年奏請於宿州置開元觀晉梁文炬喜清静之教聚道書數千卷企慕赤松留侯之事而尤盡其善位至太子太保致仕册府元龜卷八百二十二
