body:
  text: 册府元龜卷四百五十宋王欽若等撰將帥部失守譴讓失守孟軻有言曰城非不髙池非不深委而去之是地利不如人和也夫有仗節臨戎分閫受寄樹藩屏而是賴控咽喉以為要屬四郊之多壘合衆心以為城契宗子之維寧示武夫之重閉是為巨防豈資讎保然而智者多慮或廹於勢孤愚者無謀或罹於衆叛至或扃鐍非謹繕完失時罔思盡忠以固吾圉觀望畏法脫走棄去拘於司敗蓋其宜矣若乃奮不顧身守死無二拒以百術攻非一塗困於阽危守終惇固猛噬之下英聲凛然雖塗膏血於頽垣殊要領於堙塹亦竭節無媿也已後漢朱浮為大將軍幽州牧彭寵及張豐反攻浮浮城中糧盡人相食㑹上谷太守耿况遣騎來救浮浮乃得遁走南至良鄉其兵長反遮之浮恐不得脫乃下馬刺殺其妻僅以身免城降於寵晉郭黙為劉琨假潁川太守為劉曜所圍突圍投冠軍將軍領河東平陽太守李矩後矩轉蹙弱黙深憂懼解印授其參軍殷嶠謂之曰李使君遇吾甚厚今遂棄去無顔謝之三日可白吾去也乃奔陽翟矩聞之大怒遣其將郭誦追黙至襄城及之黙棄家人單馬馳去茍晞為都督中外諸軍屯濛城刑政苛虐衆心稍離莫為致用加以疾疫饑饉其將温畿傅宣皆叛之石勒馳襲濛城執晞李矩為冠軍將軍領河東平陽太守屯新鄭矩將張皮與劉聰子粲戰於孟津矩進救之使壯士三千汎舟迎皮賊臨河列陣作長鈎以鈎船連日不得渡夜遣部將格增潛濟入皮壘選精騎千餘而殺所獲牛馬焚燒器械夜突圍而出奔武牢聰追之不及而退周顗為寧逺將軍荆州刺史領䕶南蠻校尉始到州而建平流人傅密等叛迎蜀賊杜弢顗狼狽失據陶侃遣將吳寄以兵救之故顗得免周撫監沔北軍事南中郎將鎭襄陽石勒將郭敬率騎攻撫撫不能守率所領奔於武昌坐免官和郁為征北將軍時石勒冦趙郡郁自鄴奔于衞國裴純為滎陽太守時石勒冦汲郡執郡守胡寵遂南濟河純奔建鄴庾冰為吳興内史㑹蘇峻作逆遣兵攻冰冰不能禦便棄郡奔㑹稽朱序為南中郎將荆州刺史鎭襄陽苻丕來攻序累戰破賊人情勞懈又以賊退稍逺疑不能來守備不謹督䕶李伯䕶密與賊相應襄陽遂没序䧟於苻堅王愉為江州刺史都督豫州四郡至鎭未幾殷仲堪桓𤣥楊佺期舉兵應王恭乘流奄至愉既無備惶遽奔臨川為𤣥所得𤣥盟于尋陽以愉置壇所愉甚恥之吳隱之安帝時為廣州刺史假節領平越中郎將及盧循冦南海隱之率厲將士固守彌時長子曠之戰没循攻擊百有餘日踰城放火焚燒三千餘家死者萬餘人城遂䧟隱之擕家累出欲奔還都為循所得循表朝廷以隱之黨附桓𤣥宜加裁戮詔不許宋髙祖與循書令遣隱之還久方得反宋朱修之文帝時為司徒從事中郎後隨右軍到彦之北侵彦之自河南廻修之留戍滑臺被魏將安頡攻圍糧盡將士熏䑕食之修之被圍既久母嘗悲憂魏果尅滑臺囚之申謨與修之守滑臺為魏所没後得叛還蕭思話為青州刺史後魏南冦檀道濟北伐既而廻師思話懼魏人大至乃棄鎭奔平昌思話先遣參軍劉振之城下邳聞思話奔亦委城走魏人定不至而東陽積聚已為百姓所焚繇是徴下廷尉仍繫上方南齊王敬則為南兖州刺史進號安北將軍虜冦淮泗敬則恐委鎭還都百姓皆驚散奔走髙帝以其功臣不問以為都官尚書撫軍梁魯休烈初仕齊為巴西太守時江南人程延期反殺太守何法藏休烈懼不自保奔投巴東相蕭慧訓羊鴉仁為豫州刺史羊思為殷州刺史為魏軍所逼並棄城走劉潛字孝儀為豫州内史侯景冦建業孝儀遣子勵帥郡兵三千隨前衡州刺史韋粲入援及宫城不守孝儀為前歴陽太守莊鐵所逼失郡卒賀琛為雲騎將軍中軍宣成王長史侯景舉兵襲京師王移入臺内留琛與司馬楊皦守東府賊尋攻䧟城放兵殺害琛被創未至死賊求得之轝至闕下求見僕射王克領軍朱异勸開城克讓之涕泣而止賊復轝送莊嚴寺療治之陳樊毅為左衞將軍時衆軍北伐毅攻廣陵楚子城㧞之詔以毅為大都督率衆渡淮對清口築城與周人相抗霖雨城壊毅全軍自㧞侯瑱為江州刺史鎭豫章初余孝頃為豫章太守及瑱鎭豫章乃於新吳縣别立城柵與瑱相拒瑱留軍人妻子於豫章令從弟奫知後事悉衆以攻孝頃自夏迄冬弗能克乃長圍守之盡收其禾稼奫與其部下侯方兒不協方兒怒率所部攻奫虜掠瑱軍妓妾金玉歸于髙祖瑱既失根本兵衆皆潰徑歸豫章豫章人拒之乃趨湓城投其将焦僧度僧度勸瑱投齊瑱以髙祖有大量必能容己乃詣闕請罪髙祖復其爵位後魏裴良為汾州刺史先是官粟貸民未及收歛仍值冦亂至是城民大饑人相食賊知倉庫空虚攻圍日甚死者十三四良以饑窘因與城人奔赴西河汾州之治西河自良始也房崇吉初為宋明帝太原太守戍城慕容白曜軍至遣人召之崇吉不降遂閉門固守外城至小人力不多勝仗者不過七百人而白曜侮之乃遣衆陵城不時将克白曜遂築長城圍之崇吉糧矢俱盡突圍走出遁藏民舍後與從兄法壽俱降賈顯度為别將防守薄骨律鎭時北鎭擾亂為賊攻圍顯度拒守多時以賊勢轉熾不可久立乃率鎭民浮河而下既達秀容為爾朱榮所留尋表受直閣將軍左中郎將尉建為兖州刺史時宋髙祖為晉將伐姚泓令其部將王仲徳為前鋒將逼滑臺建率所部棄城仲徳遂入滑臺費穆為雲州刺史招離聚散頗得人心時北境州鎭悉皆淪没唯穆獨據一城四面抗拒既久援軍不至兼行路阻塞糧仗俱盡穆知勢窮乃棄城南走投爾朱榮於秀容既而詣闕請罪孝明詔原之薛曇尚孝明時為南陽太守孝昌初徐州刺史元法僧叛入梁曇尚斬其使人送首於都督安樂王監監不能援遂為梁將王希􅅨所陷拘曇尚送梁梁以禮遇之曇尚乞歸乃聽還韋纘為任城王澄揚州長史澄出征之後梁將姜慶眞乗虚攻襲遂據外郭雖尋克復纘坐免官崔康為燕州刺史時天下多事遂為杜雒周攻圍康堅守歴年朝廷遣都督元潭與第二子仲哲赴救潭敗仲哲死之康遂率城民奔定州坐以免官裴粲為兖州刺史尋為濮陽太守崔巨倫所逐棄州入嵩高山爾朱世隆為假儀同三司前軍都督鎭虎牢時元顥逼大梁世隆不關世事無將帥之畧顥既克滎陽禽行臺楊回世隆懼而遁還莊帝倉卒北廵世隆之罪也泉企為雒州都督東魏將髙敖曹率衆圍逼州城杜窋為其鄉導企拒守旬餘矢盡援絶城乃䧟焉髙敖曹曰泉企力屈志不服也江果為汝州都督時杜雒周葛榮等叛亂臺援不接果以阻隔强冦内徙無繇乃擕子弟并率城民東奔髙麗孝靜天平中詔髙麗送果等元象中乃得還朝張瓊為汾州刺史天平中除慰勞大使仍留鎭之尋為周文帝所䧟卒北齊封祖業行晉州事時薛循義為衞將軍沙苑之役諸軍退還祖業棄城走循義追至洪洞說祖業還守而祖業不從循義還據晉州安集固守後周柳檜為撫軍將軍討上津魏興平之即除魏興華陽二郡守安康人黄衆寶謀反連黨與將圍州城乃相謂曰嘗聞柳君勇悍其鋒不可當今既在外方為吾徒腹心之病也不如先擊之遂圍檜郡郡城卑下士衆寡弱無守禦之備連戰積十餘日士卒僅有存者于是力屈城䧟身被十餘創遂為賊所獲陽猛初仕後魏為華山郡守孝武西遷猛率所部移鎭潼關俄而潼關不守猛于善渚谷立柵收集義徒授征東將軍揚州刺史大都督武衛將軍仍鎭善渚文帝大統三年為竇泰所襲猛脫身得免隋史祥為燕郡太守被賊髙開道所圍祥稱疾不視事及城䧟開道甚禮之㑹開道與羅義通和送於涿郡卒于塗周法尚後周宣帝時為開府順州刺史髙祖為丞相司馬消難作亂隂遣上開府段珣率兵陽為助守因欲奪其城法尚覺其計閉門不納珣遂圍之于時倉卒兵散在外因率吏士五百人拒守二十日外無救援自度力不能枝梧遂㧞所領棄城遁走消難虜其母弟及家累三百人歸于陳于仲文初仕後周宣帝為東郡太守髙祖為丞相尉廻作亂遣將檀讓收河南之城復使人誘致仲文仲文拒之廻怒其不同已遣儀同宇文威攻之仲文迎擊大破威衆斬五百餘級以功授開府廻又遣其將宇文曹度石濟宇文威鄒紹自白馬二道俱進復攻仲文賊勢逾盛人情大駭郡人赫連僧伽敬子哲率衆應廻仲文自度不能支棄妻子將六十餘騎開城西門潰圍而遁為賊所追且戰且行所從騎戰死者十七八仲文僅而獲免達於京師廻於是屠其三子一女髙祖見之引入卧内為之下泣賜綵五百段黄金三百兩進位大將軍領河南道行軍總管給以鼓吹馳𫝊詣雒陽發兵以討檀讓唐張亮隋末從李密𨽻李勣勣歸國後亮檢校定州别駕劉黑闥反於河北勣復以亮從軍令守相州及黑闥兵至亮不能抗棄城而遁齊王元吉守并州懼劉武周所逼棄并州奔于京師程大買為滄州刺史為劉黑闥所逼棄城而遁劉𢎞基為右驍衞大將軍領行軍左一總管屯晉州裴寂為宋金剛所敗人情大駭莫有固志金剛以兵造城下𢎞基不能守遂䧟于賊髙仙芝為西河節度使時安禄山據范陽叛仙芝為討賊副元帥屯軍於陜時范陽平盧節度封常清與安禄山戰於虎牢王師敗績時仙芝聞常清戰敗乃棄軍西奔陜郡太守竇庭芝棄郡北渡吕崇賁為河東防禦使時安禄山反哥舒翰敗潼關不守崇賁及華州防禦使魏仲犀馮翊防禦使季彭年上雒防禦使楊黯皆棄郡走所在兵將解嚴而散顔眞卿為平原太守禄山之亂初糾合兵衆以拒之後兵力漸窮棄郡南走渡河自後河北郡縣盡没於賊中侯希逸肅宗時為平盧節度使既數為賊所廹希逸率厲將士累破賊徒向閏客李懐仙等既淹歳月且無救援又為奚虜侵掠希逸㧞其軍二萬餘人且行且戰遂達于青州平盧始䧟於賊詔以希逸為平盧淄青節度使自是淄青節度皆帶平盧之名崔光逺為魏州刺史充魏州節度使初司徒郭子儀與賊戰於汲郡光逺率汴師千人渡河援之及代蕭華入魏州使將軍李處崟拒賊賊大至連戰不利子儀怒不救處崟遂敗奔還賊隨處崟至城下反間之曰處崟召我來何為不出光逺乃要斬處崟處崟善戰有勇衆皆倚之及死人用危懼魏州城自禄山反袁知秦能元浩等皆繕完之甚為堅峻光逺不能守遂夜潰圍而出渡河而還肅宗不之罪除太子少保董晉為華州刺史潼關鎭國軍使時朱泚僭逆于京邑使凶黨敬江何望之侵逼華州晉奔遁赴行在程權為滄州節度使時鎭州王承宗叛命憲宗元和十二年三月戊寅鎭州賊以衆二萬人入滄州東光縣斷其白橋路權不能禦以衆歸哥舒曜鎭襄城時李希烈反䧟襄城曜西走洛陽李勉為汴宋節度使時李希烈反以他盗為名悉衆來冦勉城守累月救援莫至謂其將曰希烈凶逆殘酷若與交刃必多殺無辜吾不忍也遂潛師潰圍南奔宋州徳宗尋有詔以司徒平章事徴既至朝廷素服請罪優詔復其位勉引過備位而已李齊運為晉絳慈隰都防禦觀察使時李懐光自山東卷甲奔難晝夜倍道比至河中力疲休兵三日齊運傾力犒軍人人悅喜懐光既反驅兵還保河中齊運不能敵棄城走杜彦光為監州刺史時吐蕃冦州彦光棄州奔於慶州張行恭為平州刺史時太原軍犯州城行恭不能守因棄其城梁葛從周仕唐為兖州節度使昭宗天復三年青帥王師範遣將劉鄩䧟兖州初從周方統州兵在外青人知其虚來攻逐之後唐李巖為澶州節度使㑹賊將賀環來冦巖怠於守備城遂䧟賊戴思逺初仕梁為邢州節度使屬燕將張方進殺滄州留後劉繼威以城歸梁梁末帝命思逺鎭之莊宗平定魏博以兵臨滄徳思逺棄鎭渡河歸汴朱守殷為蕃漢馬歩都虞候守徳勝寨為梁將王彦章所攻守殷無備遂䧟南寨莊宗聞之曰駑才大誤予事因撤此寨往固楊劉明宗在鄆州密請以覆軍之罪罪之莊宗私於腹心忍而不問楊漢賔為黔南節度使㑹東川節度使董卓叛攻城漢賔棄城走投忠州安崇阮為䕫州節度使棄所部歸闕翌日待罪于閣門尋命釋放時董璋據東川謀叛來冦峽内諸州而崇阮望風遁走漢劉在明初仕後唐閔帝應順初為貝州刺史明帝移趙州兼北面行營馬軍都指揮使以軍戍易州清泰末幽州節度使趙徳鈞引軍赴團柏谷路繇易州取在明軍從及徳鈞兵敗在明奔歸懐州安友規權永興軍府事屬趙思綰奔衝友規失守城池後除名配流登州沙門島周周密初仕晉為延州節度使㑹契丹䧟中原延州軍亂立髙允權為帥時密據東城允權據西城相拒久之㑹漢髙祖建義於太原遣使安撫密乃棄其城奔於太原隨漢髙祖歸汴譴讓夫將者受脤於社貞師以律荷分閫之重有干城之寄始當受命初無辦嚴是所謂為爪牙而衞社稷者焉茍異於斯否臧凶也若乃擁兵而翫冦示戎而失策或士卒暴露無恤下之心或道路滯留非速進之意或對問失實或臨敵亡備以至不能鎭守遂至退奔斯乃有名無實失將兵之道降城縱掠違弔民之義是以頒尺一以致詰遣使者以問狀勞之以征役之苦終之以訓讓之辭故其聞命以知非立功而贖罪者多矣若夫上有疑心下或恥過因而負釁者蓋亦有焉漢韓王信髙祖六年秋匈奴冒頓大入圍信信數使使胡求和解漢發兵救之疑信數間使有二心間私也上賜信書責讓之曰専死不勇専生不任信為將軍賫必死之意不得為勇賫必生之心不任軍事傳曰期死非勇也必生非任也冦攻馬邑君王力不足以堅守乎安危存亡之地此二者朕所以責於君王言雖處危亡之地執忠履信可以安存責其有二心信得書恐誅因與匈奴約共攻漢以馬邑降胡擊太原彭越封梁王髙祖十年陳豨反代地帝自往擊之至邯鄲徴兵於梁越稱病使使將兵詣邯鄲髙帝怒使人讓梁王讓責也梁王恐欲自往謝其將扈輙曰王始不往見讓而往往即為擒不如遂發兵反梁王不聽稱病梁太僕有罪亡走漢告梁王與扈輙謀反於是捕治越楊僕為主爵都尉武帝以為能南越反拜為樓船將軍有功封將梁侯東越反上欲復使將為其伐前勞伐為矜恃也以書勑責之曰將軍之功獨有先破石門尋陿南越中險地名也非有斬將搴旗之實也搴㧞取之烏足以驕人哉烏於何切前破畨禺捕降者以為虜掘死人以為獲是一過也建徳吕嘉逆罪不容於天下建徳南越王名也尉佗𤣥孫也吕嘉其相也將軍擁精兵不窮追超然以東越為援是二過也以僕不窮追之故令建徳得以東越為援也士卒暴露連歳為朝㑹不置酒將軍不念其勤勞而造佞巧請乗𫝊行塞傳張戀切行下更切因用歸家懐銀黄垂三組夸鄉里是三過也銀銀印也黄金印也僕為主爵都尉又為樓船将軍并將梁侯三印故三組也組印綬也失期内顧以道惡為解内顧言思妻妾也解謂自解說也若今言分疏失尊尊之序是四過也欲請蜀刀問君賈幾何對曰率數百僕嘗為將請官蜀刀詔問賈答言此率數百也賈讀曰價武庫日出兵而陽不知挾偽干君五過也干犯也受詔不至蘭池宫本出軍時欲使之蘭池宫頓而不去蘭池宫在渭城明日又不對假令將軍之吏問之不對令之不從其罪何如推此心以在外江海之間可得信乎今東越深入將軍能率衆以掩過不僕惶恐對曰願盡死贖罪與王温舒俱破東越馮奉世為右將軍元帝時以隴西羌反上言願得兵衆不須煩大將因陳轉輸之費帝於是以璽書勞奉世且讓之讓責也責其不須大將曰皇帝問將兵右將軍官為右將軍而將兵在外故謂之將兵右將軍甚苦暴露羌虜侵邊境殺吏民甚逆天道故遣將軍帥士大夫行天誅以將軍材質之美奮精兵誅不軌百下百全之道也今乃有畔敵之名不敢當敵攻戰為畔敵也大為中國羞以昔不閑習之故耶言未嘗當羌虜不測其形良以恩厚未洽信約不明也言將軍恩惠未洽於士卒又不能明其約誓使在下信也朕甚怪之上書言羌虜依深山多徑道不得不多分部遮要害須得後發營士足以决事部署已定執不可復置大將聞之前為將軍兵少不足自守故發近所騎日夜詣近所隨近之處也日夜言兼行不休息也詣詣軍所非為擊也助其守今發三輔河東𢎞農越騎迹射佽飛彀者羽林孤兒及呼速絫嗕種嗕音辱又乃彀切羌别種也彀工豆切謂能張弩者也絫力追切方急遣言令速至軍所也且兵凶器也必有成敗者患策不定料敵不審也故復遣奮武將軍兵法曰大將軍出必有偏裨所以揚威武參計策將軍又何疑焉夫愛吏士得衆心舉而無悔禽敵必全將軍之職也乃若轉輸之費則有司存將軍勿憂須奮武將軍兵到合擊羌虜須待也十月兵畢至隴西十一月並進羌虜大破斬首數千級餘皆走出塞兵未决間漢復發募士萬人拜定襄太守韓安國為建威將軍自别有此安國非武帝時人也未進聞羌破還帝曰羌虜破散創艾逃亡出塞創艾謂懲懼也創初向切艾讀曰乂其罷吏士頗留屯田備要害處後漢吳漢為大司馬擊公孫述進軍成都城下述死其將延岑舉城降漢悉滅公孫氏并誅岑焚述宫室縱兵火大掠光武聞之詔讓漢及副將劉向曰城中老母嬰兒口以萬數兵火大縱可為酸痛甚違古人弔民之義公等戴天履地何忍行此邪馬援為伏波將軍與耿舒同擊五溪壺頭賊守隘船不得上暑甚士卒多死耿舒與兄好畤侯弇書曰前舒上書當先擊充充縣名屬武陵郡糧雖難運而兵馬得用軍人數百爭欲先奮今壺頭竟不得進大衆拂鬱行死誠可痛惜前到臨鄉賊無故自致若連夜擊之即可殄滅伏波類西域賈胡到一處輙止以是失利今果疾疫皆如舒言弇得書奏之帝乃使虎賁中郎將梁松乗驛責問援因代監軍㑹援病卒皇甫嵩為左車騎將軍討邉章中常侍張讓奏嵩連戰無功所費者多徴還收左車騎將軍印綬削戸六千更封都鄉侯二千戸袁紹為右將軍建安元年曹公迎天子都許乃下詔書於紹責以地廣兵多而専自樹黨不聞勤王之師而但擅相討伐紹上書自陳述言皆飾非吳張昭為綏逺將軍及大帝即位請命百官歸功周瑜昭舉笏欲褒贊功徳未及言帝曰如張公之計今已乞食矣昭大慙伏地流汗昭忠謇亮直有大臣節帝敬重之然所以不相昭者蓋以昔駁周瑜魯肅等議為非也晉羊祜為車騎將軍鎭荆州㑹吳人冦弋陽江夏畧戸口詔遣侍臣移書詰祜不追討之意并欲移州復舊之宜祜曰江夏去襄陽八百里比知賊問賊去亦已經日矣歩軍方往安能救之哉勞師以免責恐非事宜也昔魏武帝置都督類皆與州相近以兵勢好合惡離疆塲之間一彼一此愼守而已古之善教也若輙徙州賊出無常亦未知州之所宜據也使者不能詰宋劉鍾晉末為龍驤將軍太尉參軍事髙祖討司馬休之鍾領石頭戍時大軍外討京邑擾懼鍾以不能鎭遏降號建威將軍劉道規晉末為輔國將軍都督荆寧梁雍六州軍事時荆州刺史劉敬宣征蜀不克道規以都督降為建威將軍劉懐愼自髙祖遷都壽春劉懐愼督北徐兖青淮北諸軍事前軍將軍徐州刺史以亡命入廣陵城降號征虜將軍蕭思話為撫軍將軍兖徐二州刺史統揚武將軍冀州刺史張永衆軍圍碻磝初鎭軍諮議參軍申坦與王𤣥謨圍滑臺不克免官青州刺史蕭斌板坦行建威將軍濟南平原二郡太守守歴城令任仲仁又為坦副并前鋒入河發沿口永司馬崔訓建武將軍齊郡太守胡景世率青州軍來㑹思話及衆軍並至碻磝治三攻道太祖遣員外散騎侍郎徐安宣㫖督戰張永胡景世當東攻道申坦任仲仁西攻道崔訓南攻道賊夜地道出燒崔訓樓及蟇車又燒胡景世樓及攻具尋又毁崔訓攻道城不可㧞思話馳來退師攻城凡十八日解圍還歴下崔訓以樓見燒又不能固攻道被誅於碻磝永坦並繫獄詔曰得撫軍將軍思話啟事碻磝不㧞士卒疲勞且班師清濟更圖進討此鎭山川嚴阻空臨河朔形勝之要擅名自古宜除其授以允望寔思話可解徐州為冀州餘如故彭城文武復量分配即鎭歴城尋為江夏王義恭所奏免官王鎭之為征西大將軍道規司馬時南平太守徐道覆逼江陵加鎭之建威將軍統檀道濟到彦之等討道覆以不經將帥故辭不見聽既而前軍失利白衣領職南齊周盤龍為平北將軍兖州刺史時甬城戍將張蒲與後魏潛相搆結因大霧乘船入清中採樵載虜三十餘人藏伏􅀢下直向城東門防門不禁仍登岸㧞白爭門戍主皇甫仲賢率軍主孟靈寶等三十餘人於門拒戰斬二人賊衆被鎗赴水而魏軍馬歩至城外已三千餘人阻塹不得進淮隂軍主王僧䖍等領五百人赴救魏衆乃退坐為有司所奏詔白衣領職八座尋奏復位陳章昭達為中撫軍大將軍髙祖即位進號車騎大將軍以還朝遲留為有司所劾降號車騎將軍淳于量鎭桂州王綝平後頻請入朝徴為中撫軍大將軍量所部將帥多戀本土並欲投入山谷不願入朝世祖使湘州刺史華皎征衡州界黄洞且以兵迎量天康元年至都以在道淹留為所司奏免儀同餘並如故後魏周觀為髙平鎭將有威名眞君初詔觀統五軍西討秃髪保周於張掖徙其民數百家將置於京師至武威輙與諸將私分之太武大怒黜觀為金城侯改授内都大官任城王澄為揚州刺史攻梁鍾離遇雨淮水暴長引歸壽春還既狼狽失兵四千餘人頻表解州宣武不許有司奏軍還失路奪其開府又降三階元慶和初為梁北道總管魏主至項城朝廷出師討之望風退走梁武責之曰言同百舌膽若鼷鼠遂徙合浦北齊薛孤延仕東魏大都督與諸軍將討潁川延専監造土山以酒醉為敵所襲據潁川平諸將還京師燕於華林園文襄啟魏帝坐延於階下以辱之陽州公永樂仕東魏為北豫州刺史河隂之戰司徒髙昻失利退永樂守南陽城昻走趣城西軍追者將至永樂不開門昻遂為西軍所擒神武大怒杖之二百隋賀若弼為右武侯大將軍開皇末髙祖幸仁壽宫讌王公詔弼為五言詩詞意憤怨帝覽而容之明年春弼又有罪在禁所詠詩自若上數之曰人有性善行惡者公之為惡乃與行俱有三太猛妬嫉心太猛自是非人心太猛無上心太猛昔在周朝已教他兒子反此心終不能改耶唐竇規為益州行臺僕射武徳中徴入朝賜坐御榻規容儀不肅又坐而對詔髙祖大怒因謂曰公之入蜀車騎驃從者二千人為公所斬畧盡我隴種車騎未足給公詔下獄俄而釋之裴寂為晉州道行軍總管遇宋金剛賊衆犯之師遂大潰死皆盡晉州以東城堡一時䧟賊徴入朝髙祖數之曰義舉之始公有翼佐之勲官爵亦已極矣前拒武周兵勢足敵致此喪敗不獨愧於朕乎以其屬吏尋釋之獨孤懐恩為工部侍郎時虞州刺史韋義節擊堯君素於蒲州而義節文吏怯懦頻戰不利髙祖遣懐恩代總其衆懐恩督兵城下為賊所拒頻戰不利髙祖切讓之因是怨望劉仁軌為青州刺史髙宗顯慶中大軍征遼令仁軌監統水軍以後期免特令以白衣隨軍自効田仁琬為太僕卿兼代州刺史充河東諸軍節度副大使𤣥宗天寶元年制曰田仁琬忝居節度鎭守西陲不能振舉師旅緝寧夷夏而乃公行暴政不務恤人撓亂要荒畧無承禀邊官之責職爾之繇宜黜逺藩用誡邊使可舒州刺史即馳驛赴任封常清充伊西節度等使天寳末安禄山叛以常清為范陽節度俾募兵東討禄山渡河䧟陳留入甖子谷兇威轉熾常清退入上東門戰不利賊鼓譟於西城門入殺掠人吏常清又戰於都亭驛不勝退守宣仁門又敗從提象門入苑令人倒樹以礙之至榖水西奔陜郡遇髙仙芝具以賊勢告之遂退守潼關𤣥宗聞常清敗削其官爵令白衣於仙芝軍効力仙芝令常清監左右廂諸軍常清衣皂衣以從事郭子儀為司空平章事肅宗至徳中以副元帥與安禄山賊將安守忠李歸仁大戰於清渠王師敗績降為左僕射仍平章事殷侑為山南東道節度使文宗太和中侑准詔停減軍卒千餘人遂敗為羣盗劫隨州之屬縣時議責侑不先陳論以致㓂盗左授太子賔客夏侯孜為劒南西川節度使懿宗咸通十年正月遷為太子少保分司東都時南詔蠻㓂西川責孜在蜀日失政也梁劉鄩為鎭南軍節度使率軍屯莘縣既而魏軍送欵於太原時莊宗南伐鄩在莘既久糧饋不給人皆思歸莊宗令鐵騎直壓其營挑戰鄩閉壁示弱乃以勁卒絶其甬道持千金斧斬其寨木衆出驚囂俘獲而退末帝遣人謂鄩曰閫外之事全付將軍河朔諸州一旦淪没勞師弊旅患難日滋退保河壖久無鬭志昨日東面諸侯奏事來上皆言倉儲已竭飛輓不充于役之人每遭擒虜夙宵軫念惕懼盈懐將軍與國同休當思良畫如聞㓂敵兵數不多宜設機權以時翦撲則予之負荷無累先人鄩表曰臣受國恩當思閫政敢不仗戈假寐罄節輸忠昨者比欲西取太原斷其歸路然後東收鎭冀解彼連雞止於此時再清河朔豈期天方稔亂國難未平纔出師徒積旬霖潦資糧殫竭軍士札瘥切慮蒼黄乖於統攝乃詢部伍皆欲旋歸凡次舎經行每張犄角又欲絶其餉道且據臨清纔及宗城周揚五奄至騎軍馳突變化如神臣遂領大軍保於莘縣深溝髙壘享士訓兵日夜戒嚴伺其進取偵其營壘兵數極多樓煩之人皆能騎射最為劫掠未可輕謀臣若茍得機謀詎敢坐滋患難臣誠心體國天鑒具明後唐劉訓為襄州節度使檢校太傅充南面招討使知荆南行府事以征討無功責授檢校右僕射守檀州刺史王建立為青州節度使惡生好殺麄暴無政歴數鎭以苛虐聞明宗亦怒之及鎭上黨歳餘乃令致仕樞密使安重誨得罪後建立不繇表請自入朝所繇司不知之徑至後樓謁見泣涕言已無罪為重誨擯斥明宗不悅曰爾作節度使不行好事非重誨譖言亦宜自省旬日令還遼州賜荼藥而死周慕容彦超仕漢為鄆州節度使乾祐中以關中平加侍中遇隱帝誕辰入朝以在鎭不法為執政所責尋授兖州節度使册府元龜卷四百五十
