body:
  text: 册府元龜卷七百十五宋王欽若等撰宫臣部忠於所事昵狎罪譴忠於所事士有修身立志䇿名委質夙夜匪懈思不出位風雨如晦不改其節所謂善於其職而無媿於人矣若乃肇建儲闈列樹藩戚尊崇保傅慎簡寮寀所以贊翊元良保乂宗室式固本支以隆邦翰則有博識端士老成碩徳周旋輔導朝夕規誨奉之以義不納於邪者葢比比有焉其或處艱難之際奮不顧身明趨向之方繼之以死信可以敦激薄俗昭示後世者也漢周昌為趙王相髙祖宴駕太后使使名趙王昌令王稱疾不行使者三反昌曰髙帝屬臣趙王屬委也音之欲反王年少竊聞太后怨戚夫人欲召王并誅之臣不敢遣王王且亦不疾不能奉詔太后怒乃使使召趙相相至謁太后太后罵昌曰爾不知怨戚氏乎而不遣趙王昌旣徵髙后使使召趙王王果來至長安月餘見鴆殺昌謝病不朝見三嵗而薨賈誼為梁王傅梁王勝墜馬死文三王傳言揖此言勝為有兩名誼自傷為傅無狀無善狀嘗哭泣後嵗餘亦死韓安國事梁孝王為中大夫梁王以至親故得自置相二千石出入逰戲僭於天子僭儗也景帝聞之心不善太后知帝不善廼怒梁使者弗見案責王所為安國為梁使見大長公主而泣大長公主景帝姊也曰何梁王為人子之孝為人臣之忠而太后曾不省也省視也夫前日吳楚齊趙七國反自關以東皆合從而西嚮從音子容切唯梁最親為艱難梁王念太后帝在中京師為中猶言中國也而諸侯擾亂一言泣數行而下跪送臣等六人將兵撃郤吳楚吳楚以故兵不敢西而卒破亡梁之力也今太后以苛禮責望梁王苛細也梁王父兄皆帝王而所見者大故出稱蹕入言警蹕止行人也警令戒肅也天子出入皆備此儀而今云出稱蹕入言警者互舉之耳車旗皆帝所賜即以嫮鄙小縣嫮音呼說切夸奼也驅馳國中欲夸諸侯令天下知太后帝愛之也今梁使來輒案責之梁王恐日夜涕泣思慕不知所為何梁王之忠孝而太后不卹也長公主具以告太后太后喜曰為帝言之言之帝心廼解免冠謝太后曰兄弟不能相教廼為太后遺憂悉見梁使厚賜之其後梁王益親驩太后長公主更賜直千餘金更音工衡切繇此顯結於漢竇嬰景帝時為栗太子傅十年太子廢嬰争不能得謝病屏居藍田南山下數月諸竇賓客辨士說莫能來史丹為駙馬都尉元帝令丹䕶太子家時傅昭儀子定陶共王有材蓻共讀曰恭子母俱愛幸而太子頗有酒色之失母王皇后無寵建昭之後元帝被疾不親政事留好音樂留意於音樂或置鼙皷殿下天子自臨軒檻上隤銅丸以摘皷隤音頽下也摘音持益丁厯二切投也聲中嚴皷之節莊嚴皷節後宫及左右習知音者莫能為而定陶王亦能之帝數稱其材丹進曰凡所謂材者敏而好學温故知新皇太子是也若乃器人於絲竹皷􅎏之間則是陳惠李微髙於匡衡可相國也器人取人器能也陳惠李㣲皆黄門鼓吹也於是帝黙然而咲咲古笑字其後中山哀王薨太子前弔哀王者帝之少弟與太子游學相長大同處長養以至於壯大帝望見太子感念哀王悲不能自止太子既至前不哀帝大恨曰安有人不慈仁而可奉宗廟為民父母者乎帝以責謂丹謂者告語也丹免冠謝帝曰臣誠見陛下哀痛中山王至以感損向者太子當進見臣竊戒屬毋涕泣感傷陛下屬之欲切罪廼在臣當死帝以為然意乃解丹之輔相皆此類也竟寧元年帝寢疾傅昭儀及定陶王常在左右而皇后太子希得進見帝疾稍侵意忽忽不平稍侵言漸篤也平和也數問尚書以景帝時立膠東王故事是時太子長舅陽平侯王鳯為衛尉侍中與皇后太子皆憂不知所出不知計所出丹以親密臣得侍視疾候帝間獨寢時丹直入卧内頓首伏青蒲上以青䂓地曰青蒲自非皇后不得至此涕泣言曰皇太子以適長立積十餘年適讀曰嫡名號繫於百姓天下莫不歸心臣竊見定陶王雅素愛幸今者道路流言為國生意以為太子有動揺之議審若此公卿以下必以死争不奉詔臣願先賜死以示羣臣天子素仁不忍見丹涕泣言又切至帝意大感喟然太息曰吾日困劣而太子兩王幼少意中戀戀亦何不念乎然無有此議且皇后謹慎先帝又愛太子吾豈可違指駙馬都尉安所受此語安焉也丹即却頓首曰愚臣妄聞罪當死却退也離青蒲上帝因密謂丹曰吾病寖加恐不能自還還讀曰旋善輔道太子毋違我意道讀曰導丹嘘唏而起嘘音虚唏許旣切太子繇是遂為嗣矣後漢郅惲為上東城門侯光武令惲授皇太子彊經郭后旣廢而太子意不自安惲乃說太子曰久處疑位上違孝道下近危殆昔髙宗明君吉甫賢臣及有纎介放逐孝子春秋之義母以子貴太子宜因左右及諸皇子引愆退身奉養母氏以明聖教不背所生太子從之帝竟聴許張湛為太子太傅及郭氏廢因稱疾不朝拜大中大夫居中東門候舍故時人號曰中東門君帝數存問賞賜朱暉為東平王蒼掾正月朔旦蒼當入賀故事少府給璧是時隂就為府卿貴驕吏傲不奉法蒼坐朝堂漏且盡而求璧不可得顧謂掾屬曰若之何暉望見少府主簿持璧即往紿之曰我數聞璧而未嘗見試請觀之主簿以授暉顧召令吏奉之主簿大驚遽以白就就曰朱掾義士勿復求更以它璧朝蒼旣罷召暉謂曰屬者掾自視孰與藺相如光武聞而壯之杜撫字叔和為驃騎將軍東平王蒼所辟及蒼就國掾史悉補王官屬未滿嵗皆自劾歸時撫為大夫不忍去蒼聞賜車馬財物遣之辟太尉府种暠為侍御史順帝擢監太子於承光宫中嘗侍髙梵從中單駕出迎太子時太傅杜喬等疑不欲從惶惑不知所為暠乃手劒當車曰太子國之儲副天命所係今常侍來無詔何以知非姦邪今日有死而已梵辭屈不敢對馳命奏之詔報太子乃得去喬退而歎息愧暠臨事不惑帝亦嘉其持重稱善者良乆吳謝景字叔發與刁𤣥羊衜等皆為太子登賓客及登薨景時為豫章太守不勝哀情棄官奔赴拜表自劾大帝曰君與太子從事異於他吏使中使慰勞聴復本職即遣還鄉陸𦙍字敬宗凱弟也始為御史尚書選曹郎太子和聞其名待以殊禮㑹全寄楊竺等阿附魯王霸與和分争隂相譖搆𦙍坐收下獄楚毒備至終無他辭晉劉卞為愍懐太子左衛率知賈后廢太子之謀甚憂之以計干司空張華而不見用益以不平賈后親黨微服聴察外間頗聞卞言乃遷卞為輕車將軍雍州刺史卞知言泄恐為賈后所誅乃飲藥卒江統為愍懐太子洗馬及太子廢徙許昌賈后諷有司不聴宫臣追送統與洗馬潘滔舍人杜㽔王敦魯瑶等冐禁至伊水拜辭道左悲泣流漣荀闓為齊王冏掾屬長沙王乂旣誅冏暴尸於西明亭三日而莫敢收歛闓表乞殯塟許之盧志為成都王頴左長史頴之敗也官屬奔散唯志隨從不怠及頴薨親自殯送時人嘉之王矩為長沙王國左常侍時成都王頴遣刺客圖長沙王乂矩侍直見客色動殺之丁潭為琅琊王褒郎中令褒薨潭上疏元帝求行終喪禮曰在三之義禮有達制近代以來或隨時降殺宜一釐革以敦於後輙案令文王侯之䘮官僚服斬旣葬而除今國無繼統䘮庭無主臣實陋賤不足當重謬荷首任禮宜終䘮詔下博議詔使除服心䘮三年張褘為琅琊王國郎中令從王至雒還京都宋髙祖封藥酒一甖付褘使密加酖毒褘受旣還於道自飲而卒宋王璵之琅琊人有才局為竟陵王誕録事㕘軍時誕在廣陵孝武遣戴明寳襲之誕遣壯士擊破之帝又遣車騎大將軍沈慶之討誕時璵之五子悉在建鄴璵之嘗乗城慶之縛其五子示而招之許以富貴璵之曰吾受主王厚恩不可以二心三十之年未獲死所耳安可以私親誘之五子號呌於外呼其父及城平慶之悉撲殺之南齊何昌㝢為臨海王昭秀西中郎長史行荆州事明年上遣𤣥慶西害藩鎮諸王𤣥慶至荆州欲以便宜從事昌㝢曰僕受朝廷意寄翼輔外藩何容以殿下付君一介之使若朝廷必須殿下還當更聴後㫖昭秀以此得還京師江泌為南康王子琳侍讀子琳為明帝所害泌往哭之淚盡以血親視殯葬乃去時廣漢王侍讀嚴桓之亦哭王盡哀王皎為晉安王子懋外兵㕘軍子懋叛明帝遣王𤣥邈及南北討使軍主裴叔業襲盆城中兵㕘軍于琳之說子懋重賂叔業子懋使琳之往因說叔業請取子懋叔業遣軍主徐𤣥慶將四百人隨琳之入城僚佐皆奔散唯周英及皎更移入城内子懋聞之歎曰不意吾府有義士二人琳之從二百人伏入齋子懋笑謂之曰不意渭陽翻成梟獍琳之以袖障面使人害之故人懼罪無敢至者唯英皎及董僧慧號哭盡哀為之䘮殯王思逺為建平王景素南徐州主簿深見禮遇景素被誅左右離散思逺親視殯葬手種松柏與廬江何昌㝢沛郡劉璡上表理之事感朝廷景素女廢為庶人思逺分衣食以相資贍梁庾於陵為齊隨王子隆荆州主簿子隆尋為明帝所害僚吏畏避莫有至者唯於陵獨留陸閑者襄之父也為始安王遥光揚州治中遥光之據東府作亂或勸閑去之閑曰吾為人吏何所逃死臺軍攻陷城閑見執將刑第二子綘求代死不獲遂以身蔽刃刑者俱害之徐摛為太子左衛率太清末侯景攻陷臺城時簡文居永福省賊衆奔入舉兵上殿侍衛奔散莫有存者摛嶷然侍立不動徐謂景曰侯公當以禮見何得如此凶威遂折侯景令拜由是景嘗憚摛帝嗣位進授左衛將軍固辭不拜帝後被幽閉摛不獲朝因感氣疾而卒嚴植之仕齊為廣漢王國右常侍王誅國人莫敢視植之獨奔哭手營殯殮徒跣送䘮墓所為起冡葬畢乃還當時義之陳蕭允初仕梁為太子洗馬侯景攻陷臺城百僚奔散允獨整衣冠坐於宫坊景軍敬焉弗之逼也司馬暠仕梁為太子庶子江陵陷隨例入關而梁室屠戮太子瘞殯失所暠以宫臣乃抗表周朝求還江陵改葬辭甚酸切周朝優詔答曰昔主父從戮孔車有長者之風彭越就誅欒布得陪臣之禮庶子鄉國已改猶懐送往之情始驗忠貞方知臣道即敕荆州以禮安厝顧越文帝時為黄門侍郎東宫皇太子嘗虚己禮接越以宫僚未盡時彦且太子仁弱宣帝有奪宗之兆内懐憤激乃上疏曰臣梁世薄官禄不代耕季年板蕩竄身窮谷幸屬聖期得逢昌運朝廷以臣微涉藝學逺垂徵引擢臣以貴仕資臣以厚秩二宫恩遇有異凡流木石知感犬馬識養臣獨何人㒺懐報徳伏惟皇太子天下之本養善春宫臣陪侍經籍於今五載如愚所見多有曠官輔弼丞凝未極時選至於文宗學府亷潔正人當趨奉龍樓晨逰夕論恒聞前聖格言往賢正道如此則非僻之語無從而入臣年事侵迫非有邀求正是懐此不言則為有負明聖敢奏狂瞽願留中不泄疏奏帝深感焉而竟不能改革殷不佞為太子通事舍人及文帝晏駕廢帝嗣位髙宗為太傅録尚書輔政甚為朝望所歸不佞素以名節自立又受委東宫乃與僕射到仲舉中書舍人劉師知尚書右丞王暹等謀矯詔出髙宗衆人猶豫未敢先發不佞乃馳詣相府面宣勅令相王還第及事發仲舉等皆伏誅髙宗雅重不佞特赦之免其官而已後魏王雒兒明元在東宫時給事帳下帝嘗獵於灅南灅水名在雁門乗氷而濟氷陷没馬雒兒投水奉帝出岸水没雒兒殆將凍死帝解衣以賜之自是恩寵日隆元紹之逆帝左右唯雒兒與帳下師車路頭而已路頭少以忠厚選給東宫晝居山嶺夜還雒兒家雒兒隣人李道潛相奉給晨復還山衆庶頗知喜而相告紹聞收道斬之雒兒猶冐難往還京都通問於大臣大臣遂出奉迎百姓奔赴明元還宫社稷獲乂雒兒有功焉韓子熙為清河王懌常侍遷郎中令及領軍元乂害懌乆不得葬子熙為之憂悴屏處田野每言王若不得復封以禮遷葬誓以終身不仕後靈太后反政以元乂為尚書令解其領軍子熙與懌中大夫劉定興學官令傅靈􅋆賓客張子慎伏闕上書曰竊惟故主太傅清河王職綜樞衡位居論道盡忠貞以奉公竭心膂以事國自先皇晏駕陛下冲幼負扆當朝義同分陜宋維反常小子性若青蠅汙白㸃黒讒佞是務以元乂皇姨之壻權勢攸歸遂相附託規求榮利共結圖謀坐生眉眼誣告國王枉以大逆賴明明在上赫赫臨下泥漬自消玉質還潔謹案律文諸告事不實以其罪罪之維逭無罪出為大郡刑賞僭差朝野怪愕若非宋維與乂為計豈得全其身命方撫千里王以權在寵家塵謗紛雜恭慎之心逾深逾厲去其本宅移住殿西闔門静守親賓阻􅅸于時吏部諮禀劉騰奏其弟官郡戍兼補及經内呈為王駮退騰由此生嫌私深怨怒遂乃擅廢太后離隔二宫掠拷胡定誣王行毒含齒戴髮莫不悲惋及㑹公卿議王之罪莫不俛眉飲氣唯諾是從僕射游肇亢言厲氣發憤成疾為王致死王之忠誠欵篤節義純貞非但藴藏胷襟實乃形於文翰捜括史傳撰顯忠録區目十篇分巻二十旣欲彰忠心於萬代豈可為逆亂於一朝乞追遺志足明丹欵乂藉寵姻戚恃握兵馬無君之心實懐皂白擅廢太后枉害國王生殺之柄不由陛下賞罰之詔一出於乂名藩重地皆其親黨京官要任必其心腹中山王熙本興義兵不圖神器戮其大逆合門滅盡遂令元略南奔為國巨患奚康生國之猛將盡忠棄市其餘枉被屠戮者不可勝數縁此普天䘮氣匝地憤傷致使朔隴猖狂厯嵗為亂荆徐蠢動職是之繇昔趙髙秉秦令關東鼎沸今元乂執權使四方雲擾自古及今竹帛所載賊子亂臣莫此為甚開逆之始起自宋維成禍之末良由騰矣而令逆徒姦黨迭相樹置髙官厚禄任情自取非但臣等痛恨終身抑為聖朝懐慚負愧以臣赤心慺慺之見乂宜梟諸兩觀洿其舍廬騰合斵棺斬骸沉其五族上謝天人幽隔之憤下報忠臣寃酷之痛方乃崇亞三事委以樞端所謂虎也更傅其翼朝野切齒遐邇扼腕蔓草難除去之宜盡厯觀曠代緬追振古當斷不斷其禍更生况乂猜忍更居衡要臣中宵永歎竊以寒心實願宸鑒早為之所臣等潛伏閭閻於兹六載旦號白日夕泣星辰叩地寂寥呼天無響衛野納肝秦庭夜哭千古之痛何足相比今幸遇陛下睿聖親鑒萬幾太后仁明更撫四海臣等敢詣闕披陳乞報寃毒書奏靈太后義之乃引子熙為舍人後遂剖騰棺賜乂死北齊魏收為太子少傅文宣每以酣宴之次云太子性懦宗社事重終當傳位常山收謂楊愔曰古人云太子國之根本不可動揺至尊三爵後每言傳位常山令臣下疑貳若實便須決行此言非戯魏收旣忝師傅正當守之以死但恐國家不安愔以收言奏帝自此便止孫靈暉為南陽王綽師綽死後每至七日至於百日靈暉嘗為請僧設齋轉經行道隋姚最為蜀王秀友秀鎮益州遷秀府司馬秀後隂有異謀文帝令公卿窮治其事開府慶整郝偉等並推過於秀最獨曰凡有不法皆最所為王實不知也榜訊數百卒無異詞竟坐誅論者義之王延為秦王俊府將性忠厚領親信兵十餘年俊甚禮之及俊有疾嘗在閤下衣不解帶俊薨勺飲不入口者數日羸頓骨立文帝聞而憫之賜以御藥授驃騎將軍典宿衛俊葬之日延號慟而絶帝歎異之令通事舍人弔祭焉詔葬延於俊側唐李綱初仕周為齊王憲㕘軍宣帝將害憲召僚屬證成其罪綱誓之以死終無撓辭姚思亷初仕隋為代王侍讀屬義師平京城府寮駭散唯思亷侍王不離其側大言曰義師本扶王室卿等不宜無禮於王衆服其言於是布列階下須㬰太宗至聞而義之許其扶侑至順陽閤下泣拜而去觀者咸歎曰忠烈之士也仁者有勇此之謂乎太宗居藩引為文學及親征徐圓郎思亷時在雒陽太宗嘗從容言及隋亡之事慨然曰姚思亷不懼兵刃以明大節求諸古人亦何以加也因寄物百段遺其書曰想卿節義之風故有斯贈後為文學館學士寫其形像列於十八學士圖令文學褚亮為之贊曰志苦精勤紀言實録臨危殉義餘風厲俗王珪為太子中允劉黒闥反珪及魏徵謂太子建成曰殿下但以地居嫡長爰踐元良功績旣無可稱仁聲又未遐布而秦王勲業克隆威震四海人心所向殿下何以自安今黒闥率破亡之餘衆不盈萬加以糧運阻絶瘡痍未瘳若大軍一臨可一戰而擒也願請討之且以立功深自封植因結山東英俊建成從其計遂請討劉黑闥擒之而旋張公謹倜儻好竒略太宗引入幕府時太宗功徳甚隆每為建成元吉之所譖毁因召公謹訪以自安之術對甚合㫖未見親遇及建成將為亂公謹與長孫無忌等九人奉太宗於𤣥武門以討亂其黨來犯𤣥武門公謹閉門以拒之以功累轉左武候將軍封定逺縣公邑二千户别食一千户魏徵為隠太子洗馬甚禮之徵見太宗勲業日隆每勸建成早為之所及敗太宗使召之謂曰汝離間我兄弟何也徵曰皇太子若從徵言必無今日之禍太宗素器之引為詹事主簿尉遲敬徳為秦王府副䕶兵隠太子巢刺王之有異謀也乃致書於敬徳贈以金銀器物一車敬徳拒之不受因以啟聞太宗謂曰公之素心鬱如山岳積金以至斗極未能動公之情何須慮也元吉等深忌之乃令壯士往刺敬徳覺之終不能害乃譖敬徳於髙祖囚之於大理并拘其親屬訊驗無狀然後得釋㑹突厥侵擾河西建成與元吉為將西討相與隂謀請太宗同送於昆明池因欲肆其凶逆敬徳旣聞其謀遽啟其事且曰大王若不速正之則恐被其圖害然後社稷危矣太宗嘆而言曰如公之言寡人實有兹慮然一旦倉卒其若在上驚動何其若骨肉痛傷何同懐之情終所不忍時房𤣥齡杜如晦皆被斥在外不得復入太宗密令長孫無忌召之𤣥齡等報曰有敕不許更得事王今若私謁必至誅滅不敢奉命太宗大怒謂敬徳曰𤣥齡如晦召之不來果背我也乃取所佩刀以授敬徳曰以賜公且往觀𤣥齡等意若無來意且斬其首以進也𤣥齡聞之惶懼因隨敬徳服道士衣以謁敬徳朝夕進勸太宗猶豫未决敬徳固諍十返然後計定二凶旣誅髙祖汎舟海池太宗乃令敬徳身往侍衛髙祖意乃安於是賜以珍物敬徳並辭而不受事平之後授太子左衛率段志𤣥大業末隨父在太原義兵起志𤣥召募得千餘人授軍頭從太宗後轉右䕶軍隠太子及齊王元吉競以金帛誘之志𤣥拒而不顧每以白太宗及即位遷左驍衛大將軍程知節為秦王府左三統軍為隠太子所忌搆之於髙祖除康州刺史知節白太宗曰大王手臂今並剪除身必不乆知節以死不去願速自全遂從討建成元吉事定拜太子右衛率薛萬徹為車騎將軍封武安縣公隠太子建成引置左右建成被誅萬徹率官兵戰於𤣥武門鼓譟將入秦府將士大懼乃以建成首示之萬徹以十餘騎亡於終南山太宗累遣使諭意萬徹釋仗而來太宗以其忠於所事不之罪也李安嚴與隠太子同取鄭氏因事東宫及建成敗率兵拒戰太宗以為忠於所事故漸任用之謝叔方事巢刺王元吉數有戰功元吉與隠太子作亂太宗討逆於𤣥武門叔方率府兵與東宫率馮立合軍拒戰於北闕下殺屯雲將軍敬君引中郎將吕衡俄而尉遲敬徳傳元吉首以示之叔方號哭而遁明日出首太宗曰義士也命釋之李義琰為太子右庶子章懐太子之廢也髙宗慰勉官僚盡捨罪令復其位薛元超等皆舞蹈謝思義琰獨引罪涕泣時論美之李安仁為太子右庶子顯慶元年皇太子忠旣廢黜官僚皆懼罪亡匿無敢見者安仁獨候忠涕泣拜辭而去時論美之昵狎夫出入承華游從博望皆調䕶斯屬羽儀攸寄者也固當敦厚為徳教導是先其有怠棄典禮昵狎元良追隨禁闥之中羣言罔恤陪侍杯筵之右酣飲過差近失師資逺貽譏謗豈足以増前星之元彩繼南山之軌躅焉漢昌邑王賀從官騶宰奴二百餘人嘗與居禁闥内敖戯魏劉楨字公幹為文帝五官將文學與王粲等並見友善帝嘗賜楨廓落帶其後師死欲借取以為像因書嘲楨云夫物因人為貴故在賤者之手不御至尊之側今雖取之勿嫌其不反也楨答曰楨聞荆山之璞曜元后之寳隋侯之珠燭庶士之好南垠之金登窈窕之首鼲貂之尾綴侍臣之幘此四寳者伏朽石之下潛淤泥之中而揚光千載之上發彩疇昔之外亦皆未能初自接於至尊也夫尊者所服卑者所修也貴者所御賤者所先也故厦屋初成而大匠先立其下嘉禾始熟而農夫先嘗其粒楨所帶無他妙飾若實殊異尚可納也楨辭㫖巧妙皆如是繇是特為諸公子所親愛其後太子嘗請諸文學酒酣坐歡命夫人甄氏出拜坐中衆人咸伏而楨獨平視太祖聞之乃收楨減死輸作吳質文帝初為五官將時質以才學通博為五官將及諸侯所禮及即位嘗召質及曹休歡㑹命郭后出見質等曰卿諦視之其親昵如此晉殷仲堪能清言善屬文孝武為太子召為中庶子甚相親愛陳江總為太子詹事共太子為長夜之飲養良娣陳氏為女太子微行逰總家宣帝怒而免之後魏盧内領太保録尚書事魯元之少子内給侍東宫恭宗深暱之嘗與臥起同衣父子有寵兩宫勢傾天下郭祚領太子少師孝明在東宫幼弱祚嘗隨宣武幸東宫懐一黄㼐出奉太子時應詔左右趙桃弓及祚皆私狎之時人謂之桃弓僕射黄㼐少師北齊和士開為長廣王府㕘軍王性好握槊士開善於此戯繇是遂有此舉加以傾巧便辟又能彈胡琵琶因此親狎嘗謂王曰殿下非天人也是天帝也王曰卿非世人也是世神也其深相愛重如此文宣知其輕薄不欲令王與小人相親善責其戯狎過度徙之馬城隋鄭譯仕周為太子宫尹坐䙝狎皇太子武帝大怒除名為民太子復召之譯戯狎如初因言於太子曰殿下何時可得據天下太子悅而益昵之唐令則為太子左庶子太子勇昵狎之每令以絃歌教内人時劉行本亦為左庶子責之曰庶子當輔太子以正道何有嬖昵房帷之間哉令則甚慚而不能改又太子嵗首宴宫臣令則自請奏琵琶又歌武媚娘之曲洗馬李綱白太子曰令則身任宫卿職當調䕶乃於宴坐自比優倡進淫聲以穢視聴事若上聞罪在不測豈不累於殿下臣請正其罪勇曰我欲為樂耳君勿多事綱趨而出夏侯福為太子左衛率長史為太子勇所昵嘗於閣内與太子戱福大笑聲聞於外左庶子劉行本時在閣下聞之待其出行本數之曰殿下寛容賜汝顔色汝何物小人敢為䙝慢因付執法者治之數日太子為福致請乃釋劉臻為太子勇東宫學士甚䙝狎之栁䛒為晉王諮議㕘軍王為太子引䛒為東宫學士加通直散騎常侍檢校洗馬甚見親待每召入臥内與之宴謔䛒尤俊辯多在侍從有所顧問答應如響性又嗜酒言雜俳諧繇是彌為太子所親狎唐楊璬中宗世為秘書監太常卿武崇訓並檢校太子賔客在職不能讜言正議以申調䕶之禮唯以打毬猥戱取媚於太子故大為時論所譏罪譴夫任處儲官職㕘王府自非才行優著藝術精明故不可以贊於重離資於磐石若乃失調䕶之方忘輔導之訓忠言不發善道靡彰昵狎小人隂圖非望以至自貽官謗坐速刑章者不亦宜乎漢公孫詭為梁孝王中尉初景帝廢栗太子太后心欲以梁王為嗣大臣及袁盎等有所開說於帝太后議格音閤梁王怒袁盎及議臣乃與詭及羊勝之屬謀隂使人刺殺盎及他議臣十餘人賊未得也於是天子意梁意疑也逐賊果梁使之遣使冠葢相望於道覆案梁事捕公孫詭羊勝皆匿王後宫使者責二千石急梁相軒丘豹姓軒丘名豹及内史安國即韓安國皆泣諫王王乃令勝詭皆自殺出之枚臯為梁恭王郎恭王名賈孝王子也三年為王使與宂從事宂從散職之從王者也見讒惡遇罪惡謂宂從言其短惡之事室家没入官臯亡至長安㑹赦許廣漢為昌邑王郎從武帝上甘泉誤取他郎鞍以被其馬發覺吏劾從行而盗當死有詔募下蠶死罪囚欲就宫者聴之王式為昌邑王師為王廢式繫獄當死治事使者責問曰師何以亡諫書式對曰臣以詩三百五篇朝夕授王至於忠臣孝子之篇未嘗不為王反復誦之也復方六切至於危亡失道之君未嘗不流涕為王深陳之也臣以三百五篇諫是以亡諫書使者以聞亦得減死論王吉為昌邑王賀中尉後賀即位二十餘日以行淫亂廢昌邑羣臣坐在國時不舉奏王罪過令漢朝不聞知又不能輔道陷王大惡道讀曰導皆下獄誅唯吉與郎中令龔遂忠直數諫正得減死髠為城旦後漢楚王英旣以不道廢徙丹陽涇縣乃悉出楚官屬無辭語者師遷為陳愍王寵國相靈帝熹平二年遷奏前相魏愔與寵共祭天神希幸非冀罪至不道有司奏遣使者案驗詔檻車傳送愔詣北寺詔獄使中常侍王酺一作王甫與尚書令侍御史雜考愔辭與王共祭黄老君求長生福而已無他冀幸酺等奏愔職在規正而所為不端遷誣告其王㒺以不道皆誅死有詔赦寵不案魏楚王彪有罪自殺彪之官屬以下及監國謁者坐知情無輔導之義皆伏誅晉江統為太子洗馬太子奢費過度統上書諫及太子廢徙許昌南齊張充為武陵王友坐書與尚書令王儉辟㫖激揚御史中丞到撝所奏免官禁錮論者以為有恨於儉也梁王僧孺髙祖天監中為南康王長史行府州國事王典籖湯道愍暱于王用事府内僧孺每裁抑之道愍遂謗訟僧孺逮詣南司奉牋辭府曰下官不能避溺山隅而正冠李下旣貽疵辱方致徽繩解籙收簪且歸初服竊以董生偉器止相驕王賈子上才爰傅卑土下官生年有值謬仰清塵假翼西雍竊步東閣多慙袨服取亂長裾髙榻相望直居坐右長階如畫獨在僚端借其從容之詞假以寛和之色恩禮逺過申白榮望多厠應徐厚徳難逢小人易悅方謂離腸隕首不足以報一言露膽披誠何能以酬屢顧寧謂罻羅裁舉微禽先落閶闔始吹細草仍墜一辭九畹方去五雲縱天網是漏聖恩可恃亦復孰寄心骸何施眉目方當横潭亂海就魚鼈而為羣披榛捫樹從虺蛇而相伍豈復仰聴金聲式瞻玉色顧步髙軒悲如霰委踟蹰下席淚若綆縻僧孺坐免官後魏馮誕為太子太師孝文謂其無師傅奬道風誕深自悔責游肇為中庶子孝文謂曰自建承華已經一稔然東宫之官無直言之士雖未經三載事須考㸃肇及中舍人李平識學可觀可為中庶子安樂王詮可為下中解東華之任退員外散騎常侍馮夙可為下下免中庶子免爵兩任員外常侍如故中舍人閭賢保可為下下退為武騎都尉隋韋世約髙祖開皇中為太子洗馬兄冲為南寧州總管士卒縱暴益州長史元巖治其事無所寛貸世約譖巖於皇太子帝謂太子曰古人有沽酒酸而不售者為噬犬耳今何用世約乎適累汝也世約遂除名栁肅開皇中為太子僕射太子廢坐除名為民栁謇之煬帝大業中為齊王長史王擅寵左右放縱喬令則之徒深見昵狎謇之雖知其罪失不能輔正及玉得罪謇之竟坐除名唐韋挺髙祖武徳中為太子左衛驃騎檢校左衛率隠太子恩遇甚隆宫臣罕與為比㑹有上事者稱挺得幸於隠太子搆扇異端帝訊之有狀與王珪等同流於越嶲王珪武徳中為太子中允為隠太子所禮後以連及隂謀事流於嶲州杜正倫太宗貞觀中為中書侍郎兼太子左庶子時太子承乾有足疾不能朝謁好昵近羣小太宗謂正倫曰我兒疾病乃可事也但全無令譽不聞愛賢好善私相引接多是小人卿可察之若教示不得須來告我正倫數諫不納乃以太宗語告之承乾抗表聞奏太宗謂正倫曰何故漏泄我語對曰訓導不入故以陛下語嚇之冀其有懼或當反善帝怒出為糓州刺史薛大鼎貞觀中為齊王祐長史祐溺情羣小大鼎屢諫不聴太宗以鼎輔導無方竟坐免而以權萬紀代之張𤣥素貞觀中為太子左庶子趙智引令狐徳棻為右庶子濮王仁表家令崔知機並以材選用太子承乾旣敗太宗引大義以讓之皆免為庶人王勃髙宗乾封初上東岳頌及乾元殿頌沛王賢奏就府修撰時諸王以鬬雞為戯勃作檄英王雞文髙宗聞之曰迴車朝歌不踐勝母者惡其名也勃之此文恐成交搆之漸斥勃不令入府蓋文達為蜀王師坐王非法免蕭嵩𤣥宗開元中為太子太師嘗以城南别業遺宦者牛仙童仙童得罪嵩坐交通小人出為青州刺史令狐峘初為衡州刺史李泌輔政召拜右庶子修史無何泌卒竇㕘秉政惡其為人貶吉州刺史蘇弁為太子詹事初入朝班位失序殿中侍御史鄒儒立對仗彈之弁於金吾待罪數刻特釋舊制太子詹事班次太常宗正卿之下貞元三年御史中丞竇㕘叙定班位移詹事在河南太原尹之下弁乃引舊班制立臺官詰之仍紿云已白宰相請依舊故為儒立彈之韋綬憲宗元和中為諫議大夫充皇太子侍讀綬好諧戯兼通人間小說太子因侍或以綬所譚言之他日帝謂宰臣曰侍讀者當以經術輔導太子使深知其君臣父子之教今或聞綬之談論有異於是豈導太子者因命罷其職尋又出之白居易元和中為太子左贊善大夫先是居易母因看花墜井死時居易作賞花及新井詩名教之士譏焉或以其事上言因命宰臣與居易逺州刺史中書舍人王淮上言居易所坐事跡不合理郡乃授江州司馬後唐司徒詡為户部員外郎秦王從榮之開府也朝廷以詡充河南府判官王之遇害例貶寧州尋移相州司馬册府元龜卷七百十五
