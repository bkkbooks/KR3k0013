body:
  text: 册府元龜卷十二宋王欽若等撰帝王部中興告功中興夫帝運之興業厚者其緒逺聖徳所被澤廣者其民懐雖復嗣世間衰稗政相繼而𤓰瓞遐裔奮其餘烈兆庶欣戴復主厥祀故夏氏微弱少康起於庖正周道中絶宣王專其北伐漢光識真人之䜟晉元應渡江之謡雖靈命之有歸亦衆誠之攸贊非夫推亡攻昧勞来安集牢籠如天地慈育如父母其孰能抑揚前軌恢續舊服者哉夏少康帝相子也帝相立后羿自鉏遷于窮石因夏民以代夏政恃其射也羿善射不修民事而滛于原獸滛放原野棄武羅伯因熊髠尨圉四子皆羿之賢臣而用寒浞寒浞伯明氏之讒子弟也寒國北海平夀縣東有寒亭伯明其君名伯明后寒棄之夷羿收之夷氏信而使之以為己相浞行媚于内内宫人而施賂于外愚弄其民欺罔之而虞羿于田樂之以游田樹之詐慝以取其國家樹立也外内咸服信浞詐羿猶不悛悛改也將歸自田羿獵還家衆殺而烹之以食其子食羿子其子不忍食諸死于窮門殺之于國門靡奔有鬲氏靡夏遺臣事羿者有鬲國名今平原鬲縣浞因羿室就其妃妾生澆及豷恃其讒慝詐偽而不徳于民使澆用師滅斟灌及斟尋氏二國夏同姓諸侯仲康之子后相所依樂安夀光縣東南有灌亭北海平夀縣東南有斟亭處澆于過處豷于戈過戈皆國名東萊掖縣北有過鄉戈在宋鄭之間靡自有鬲氏收二國之燼燼遺民以滅浞而立少康少康夏后相之子少康滅澆于過后杼滅豷于戈后杼少康子有窮繇是遂亡失人故也又伍員諫吳王曰昔有過澆殺斟灌以伐斟尋澆寒浞子封於過者二斟夏同姓諸侯襄四年傳曰澆用師滅斟灌滅夏后相夏后相啟孫也后相失國依于二斟復為澆所滅后緍方娠逃出自竇后緍相妻娠懐身也歸于有仍后緡有仍氏女生少康焉為仍牧正牧官之長惎澆能戒之惎毒也戒僃也澆使椒求之椒澆臣逃奔有虞為之庖正以除其害虞舜後諸侯也梁國有虞縣庖正掌膳羞之官頼此以得除巳害虞思於是妻之以二姚思有虞君也虞思自以二女妻少康姚虞姓有田一成有衆一旅方十里為成五百人為旅能布其徳而兆其謀兆始以收夏衆撫其官職襄四年傳曰靡自有鬲氏收二國之燼以滅浞而立少康使女艾諜澆女艾少康臣諜侯也使季杼誘豷豷澆弟也季杼少康子后杼也遂滅過戈復禹之績過澆國戈豷國祀夏配天不失舊物周宣王靜厲王子也初為太子時厲王為國人所襲出奔於彘彘晉地漢為縣屬河東太子静匿召公之家國人聞之乃圍之召公曰昔吾驟諫王王不從以及此難也今殺王太子王其以我為讎而懟怒乎夫事君者險而不讎在危險之中怨而不怒况事王乎乃以其子代王太子太子竟得脱召公周公二相行政號曰共和共和十四年厲王死于彘太子静長於召公家二相乃共立之為王是為宣王宣王即位二相輔之修政法文武成康之遺風諸侯復宗周又云宣王承厲王衰亂之敝萬民離散不安其居而能勞來還定安集之至于矜寡無不得其所故詩人作鴻鴈之篇以美之又云宣王任賢使能周室中興故尹吉甫作烝民之篇後漢光武王莽末南陽荒饑因賣榖於宛宛人李通等以圗䜟説光武光武初不敢當然獨念兄伯升素結賔客必舉大事且王莽敗亡已兆天下方亂遂與定謀於是乃市兵弩與李通從弟軼等起於宛時年二十八遂將賔客還舂陵時光武兄伯升已㑹衆起兵初諸家子弟恐懼皆亡逃自匿曰伯升殺我及見光武綘衣大冠輿郡志曰大冠謂武官冠東觀記曰上時綘衣大冠將軍服也皆驚曰謹厚者乃復為之乃稍自安伯升於是招新市平林兵新市縣属江夏郡故城在今郢州富水縣東北平林地名今在隨州隨縣東北與其帥王鳯陳收西擊長聚聚居也小於鄉曰聚光武初騎牛殺新野尉乃得馬尉秦官秩四百石至二百石也進屠唐子鄉多所誅殺曰屠唐子鄉有唐子山在今唐州湘陽縣西南又殺湖陽尉湖陽属南陽郡今唐州縣也軍中分財不均衆恚恨欲反攻諸劉光武歛宗人所得物悉以與之衆乃悦進㧞棘陽與王莽前隊大夫甄阜属正梁丘賜戰於小長安續漢書曰淯陽縣有小長安聚故城在今鄧州南陽縣南漢軍大敗更始元年正月甲子朔漢軍復與甄阜梁丘賜戰於沘水西大破之斬阜賜沘水在今唐州沘陽縣南廬江灊縣亦有此水與此有别也伯升又破王莽納言將軍嚴尤秩宗將軍陳茂于淯陽淯陽縣属南郡故城在今鄧州南陽縣南淯水之陽進圍宛城二月辛巳立劉聖公為天子以伯升為大司徒光武為太常偏將軍三月光武與諸將狥昆陽定陵郾皆下之狥畧也昆陽定陵郾皆縣名並属潁川郡多得牛馬財物榖數十萬斛轉以饋宛王莽聞阜賜死漢帝立大懼遣大司徒王尋大司空王邑將兵百萬其甲士四十二萬人五月到潁川復與嚴尤陳茂合光武將數千兵徼王莽兵于陽闗聚聚名也酈道元水經注曰潁水東南經陽闗聚聚夹潁水相對在今雒州陽翟縣西北諸將見尋邑兵盛反走馳入昆陽皆惶怖憂念妻孥孥子也欲散歸諸城光武議曰今兵榖既少而外㓂强大并力禦之功庶可立如欲分散勢無俱全且宛城未㧞謂伯升圗之未㧞也不能相救昆陽郡破一日之間諸部亦滅矣今不同心膽共舉功名反欲守妻子財物邪諸將怒曰劉將軍何敢如是光武笑而起㑹候騎還言大兵且至城北軍陳數百里不見其後諸将遽相謂曰更請劉将軍計之光武復為圗畫成敗諸將憂迫皆曰諾時城中唯有八九千人光武乃使成國上公王鳳廷尉大將軍王常留守夜自與驃騎大將軍宗佻五威將軍李軼等十三騎王莽置五威将軍其衣服依五方之色以威天下李軼初起猶假以為號出城南門於外收兵時莽軍到城下者且十萬光武幾不得出既至郾定陵悉發諸營兵而諸将貪惜財貨欲分留守之光武曰今若破敵珍寳萬倍大功可成如為所敗首領無餘何財物之有衆乃從嚴尤説王邑曰昆陽城小而堅今假號者在宛亟進大兵亟急也彼必奔走宛敗昆陽自服邑曰吾昔以虎牙將軍圍翟義坐不生得以見責讓翟義方進少子為東郡太守王莽居攝義心惡之乃立東平王雲子信為天子義自號天柱大將軍以誅莽莽乃使孫建王尋將兵擊義破之義亡自殺故坐不生得今將百萬之衆遇城而不能下何謂邪遇或為過遂圍之數十重列營百數雲車十餘丈雲車即樓車稱雲言其髙也升之以望敵猶墨子云公輸般為雲梯之械瞰臨城中俯視曰瞰旗幟蔽野廣雅曰幟幡也埃塵連天鉦皷之聲聞數百里或為地道衝輣撞城衝撞車也詩曰臨衝閑閑輣樓車也積弩亂發矢下如雨城中負户而汲王鳯等乞降不許尋邑自以為功在漏刻意氣甚逸夜有流星墜營中晝有雲如壊山當營而隕不及地尺而散吏士皆厭伏續漢志曰雲如壊山謂營頭之星也古曰營頭之所墜其下覆軍殺將血流千里六月己卯光武遂與營部俱進自將歩騎千餘前去大軍四五里而陳尋邑亦遣兵數千合戰光武自斬首數千級秦法斬首一賜爵一級故因謂斬首為級諸部喜曰劉將軍平生見小敵怯今見大敵勇甚可怪也且復居前請助將軍光武復進尋邑兵却諸部共乗之斬首數百千級連勝遂前時伯升㧞宛已三日而光武尚未知乃偽使持書報城中云宛下兵到而陽墮其書尋邑得之不喜諸將既經累㨗膽氣益壯無不一當百光武乃與敢死者三千人從城西水上衝其中堅死謂果敢而死者凡軍中事軍將最尊居中以堅鋭自輔故曰中堅也尋邑陳亂乗鋭崩之殺王尋城中亦皷譟而出中外合勢震呼動天地莽兵大潰走者相騰踐奔殪百餘里間殪仆也㑹大雷風屋瓦皆飛雨下如注􅘷川盛溢􅓳水出南陽魯陽縣西堯山東南經昆陽城北東入汝虎豹皆股戰士卒爭赴溺水者以萬數水為不流王邑嚴尤陳茂輕騎乗死人渡水逃去盡獲其軍實輜重車甲􅎇寶不可勝筭舉之連月不盡或燔燒其餘光武因復狥下潁陽㑹伯升為更始所害更始拜光武為破虜大將軍封武信侯九月三輔豪傑共誅王莽傳首詣宛更始將北都雒陽以光武行司𨽻校尉使前整修宫府於是置寮属作文移從事司察一如舊章時三輔吏士東迎更始見諸將過皆冠幘漢官儀曰幘者古之卑賤不冠者之所服也服婦人衣諸于繡镼諸于大掖衣也如婦人之袿衣镼亦作䘿今之半臂也莫不笑之或有畏而走者續漢志曰時知者見之以為服之不𠂻身之灾也乃奔入邊郡避之是服妖也其後更始遂為赤睂所殺及見司𨽻僚属皆歡喜不自勝老吏或垂涕曰不圗今日復見漢官威儀由是識者皆属心焉及更始至雒陽乃遣光武以破虜將軍行大司馬事十月持莭北渡河鎮慰州郡所到郡縣輒見二千石長吏三老官屬下至佐吏考察黜陟如州牧行部事輒平遣囚徒除王莽苛政復漢官名吏人喜恱爭持牛酒迎勞進至邯鄲二年正月光武以王郎新盛乃北狥薊王郎移檄購光武十萬户而故廣陽王子劉接起兵薊中以應郎城内擾亂轉相驚恐言邯鄲使者方到二千石以下皆出迎於是光武趣駕南轅晨夜不敢入城邑舎食道旁至饒陽縣官属皆乏食光武乃自稱邯鄲使者入𫝊舍𫝊吏方進食從者饑爭奪之𫝊吏疑其偽乃椎鼓數十通紿言邯鄲將軍至官属皆失色光武升車欲馳既而懼不免徐還坐曰請邯鄲將軍入乆乃駕去傳中人遥語門者閉之門長曰天下詎可知而閉長者乎遂得南出晨夜兼行蒙犯霜雪天時寒面皆破裂至滹沱河無船適遇氷合得過既入信都因發旁縣得四千人先擊堂陽賁縣皆降之王莽和戎卒正邳彤亦舉郡降又昌城人劉植宋子人耿純各率宗親子弟據其縣邑以奉光武於是北降下曲陽衆稍合樂附者至有數萬人復北擊中山㧞盧奴所過發奔命兵移檄邊部共擊邯鄲郡縣還復響應南擊新市真定元氏房子皆下之因入趙界時王郎大將李育屯柏人漢兵不知而進前部偏將朱浮鄧禹為育所敗亡失輜重光武在後聞之收浮禹散卒與育戰於郭門大破之盡得其所獲育還保城攻之不下於是引兵拔廣阿㑹上谷太守耿况漁陽太守彭寵各遣其將吳漢㓂恂等將突騎来助擊王郎更始亦遣尚書僕射謝躬討郎光武因大饗士卒遂東圍鉅鹿王郎守將王饒堅守月餘不下郎遣將倪宏劉奉率數萬人救鉅鹿光武逆戰于南欒縣名属鉅鹿郡左傳齊國夏伐晉耿欒即其地也其後南徙故加南俗謂之倫聲之轉也斬首數千級四月進圍邯鄲連破之五月拔其城更始遣侍御史持莭立光武為蕭王悉罷兵詣行在所光武辭以河北未平不就徵自是始貳於更始是時長安政亂四方皆叛梁王劉永擅命睢陽公孫述稱王巴蜀李憲自立為淮南王秦豐自號楚黎王張歩起瑯琊董憲起東海延岑起漢中田戎起夷陵並置將帥侵略郡縣又别號諸賊銅馬大彤髙湖重連鐡脛大槍尤来上江青犢五較檀鄉五幡五樓富平獲索等各領部曲衆合數百萬人所在㓂掠光武將擊之先遣吳漢北發十部兵幽州牧苗曽不從漢遂斬曽而發其衆秋光武擊銅馬于鄔縣名属鉅鹿郡故城在今冀州鹿城縣東吳漢將突騎来㑹青陽賊數挑戰光武堅營自守有出鹵掠者輒擊取之絶其糧道月餘日賊食盡夜遁去追至舘陶大破之赤睂别帥與大槍青犢十餘萬衆在射犬光武進擊大破之衆皆散走使吳漢岑彭襲殺謝躬于鄴青犢赤睂賊入函谷闗攻更始光武乃遣鄧禹率六裨將引兵而西以乗更始赤眉之亂時更始使大司馬朱鮪舞隂王李軼等屯雒陽光武亦令馮異守孟津以拒之建武元年春正月平陵人方望立前孺子劉嬰為天子更始遣丞相李松擊斬之光武北擊尤来大槍五幡於元氏追至右北平連破之又戰于順水北乗勝輕進反為所敗賊追急短兵接短兵刀劒也光武自投髙㟁遇突騎王豐下馬授光武撫其肩而上顧笑謂耿弇曰㡬為虜嗤弇頻射却賊得免士卒死者數千人散兵歸保范陽軍中不見光武或云已殁諸將不知所為吳漢曰卿曹努力王兄子在南陽何憂無主衆恐懼數日乃定賊雖戰勝而素懾大威客主不相知夜遂引去大軍復進至安次與戰破之斬首三千餘級入漁陽乃遣吳漢率耿弇陳俊馬武等十二將軍追戰於潞東及平谷大破滅之朱鮪追討難將軍蘇茂攻温馮異㓂恂與戰大破之斬其將賈彊於是諸將議上尊號光武驚曰何將軍出是言可斬也乃引軍還薊及行至鄗縣名今趙州髙邑縣也彊華自闗中奉赤伏符至續漢書曰彊華潁川人羣臣因復奏曰受命之符人應為大萬里合信不議同情周之白魚曷足比焉今上無天子海内淆亂符瑞之應昭然著聞宜答天神以塞羣望光武於是命有司設壇塲於鄗南千秋亭五成陌六月己未即皇帝位燔燎告天禋于六宗望於羣神其祝文曰皇天上帝后土神祗睠顧降命属秀黎元為民父母秀不敢當羣下百僚不謀同辭咸曰王莽簒弑竊位秀發憤興義兵破王尋王邑百萬衆於昆陽誅王郎銅馬赤眉青犢賊平定天下海内蒙恩上當天心下為元元所歸讖記曰劉秀發兵捕不道卯金脩徳為天子秀猶固辭至于再至于三羣下僉曰皇天大命不可稽留敢不敬承於是改元為建武晉元帝宣帝曽孫累加安東將軍都督揚州諸軍事永嘉初用王導計始鎮建鄴加鎮東大將軍及懐帝䝉塵於平陽司空荀藩等移檄天下推帝為盟主江州刺史華軼不從使豫章内史周廣前江州刺史衛展討擒之愍帝即位加左丞相嵗餘進位丞相大都督中外諸軍事遣諸將分定江東斬叛者孫弼於宣城平杜弢於湘州承制赦荆揚及西都不守帝出師露次躬擐甲胄移檄四方徴天下之兵尅日進討明年二月辛巳平東將軍朱哲至宣愍帝詔曰遭運屯否皇綱不振朕以寡徳奉承洪緒不能祈天永命紹隆中興至使外夷敢帥其衆逼迫京輦朕今幽塞窮域憂慮萬端恐一旦無託卿指詣丞相具宣朕意使攝萬機時據舊都脩復陵廟以雪大耻三月帝素服出次舉哀三日西陽王羕及羣僚參佐州正牧守等上尊號帝不許羕等以死固請至于再三帝慨然流涕曰孤罪人也惟有蹈節死義以雪天下之耻庶贖鈇鉞之誅吾本瑯琊王諸賢見逼不已乃呼私奴命駕將反國羣臣乃不敢逼請依魏晉故事為晉王許之辛卯即王位改元建武元年諸參軍拜奉車都尉掾属駙馬都尉辟掾属百餘人時人謂之百六掾乃僃百官立宗廟社稷于建康二年三月癸丑愍帝訃至帝斬縗居廬丙辰百僚上尊號令曰孤以不徳當厄運之極臣節未立營救未舉夙夜所以忘寢食也今宗廟廢絶億兆無係羣臣庶尹咸勉之以大政亦何以辭輒敬從百執是日即皇帝位改元大興大赦天下四年春鮮卑末波奉皇帝信璽庚戌告於太廟乃受之告功夫王者之師所以征不庭而遏亂略震皇靈而昭文徳者焉當其戎狄憑陵侵軼邊境蛇豕䟦扈背違文告則恭行天討弔彼民患及夫戡難而振旅也乃命有司擇吉日布六師僃凱樂獻于九廟陳于大社上以修薦告之典下以行飲至之禮歸功於祖考讓徳于穹昊以至行過之地下詔而錫嘉名受降之壌刋石以載丕緒皆所以示休烈於兆庶揚天聲於華夷俾赫赫之盛播于風雅故頌曰維天之命於穆不已此周人以太平告文王也信乎盛徳之事哉周武王克商之明日除道修社及商紂宫及期百夫荷罕旗以先驅九旒雲罕皆旗名武王弟叔振鐸奉陳常車周公旦把大鉞畢公把小鉞以夹武王散宜生太顛閎夭皆執劒以衛武王王既入立于社南大卒左右畢從毛叔鄭奉明水司烜氏以鑑取明水於月以為𤣥酒衛康叔封布茲兹者藉席之名諸侯病曰負茲召公奭贊采師尚父牽牲尹佚筴祝曰殷之末孫季紂殄廢先王明徳侮蔑神祗不祀昏暴商邑百姓其章顯聞于天皇上帝於是武王再拜稽首曰膺更大命革殷受天明命武王又再拜稽首乃出漢武帝元鼎六年冬將幸緱上侯反氏至左邑桐鄉聞南越吕嘉破以為聞喜縣春至汲新中鄉得吕嘉始為獲嘉縣元帝建昭四年正月以誅郅支單于告祠郊廟赦天下羣臣上夀置酒以其圖書示後宫貴人討郅支之圗書也後漢光武建武三年閏正月赤眉君臣靣縛奉髙皇帝璽綬詔曰羣盗縱横賊害元元盆子竊尊號亂惑天下朕奮兵討擊應時奔解十餘萬衆束手䧏伏先帝璽綬歸之王府斯皆祖宗之靈士人之力朕曷足以饗斯哉其擇吉日祀髙廟和帝永元元年六月車騎將軍竇憲大破匈奴閏七月詔曰匈奴背叛為害乆逺頼祖宗之靈師克有㨗醜虜破碎遂掃厥庭庭謂單于所嘗居也役不再籍猶言籍不再舉萬里清蕩非朕小子𦕈身所能克堪有司其案舊典告類薦功以彰休烈魏太祖建安二十一年二月平張魯還鄴有司以太牢告至筞勲于廟髙貴鄉公甘露三年二月大将軍司馬文王陷壽春城斬諸葛誕三月詔曰古先克敵收其屍以為京觀所以懲昏逆而彰武功也漢孝武元鼎中改桐鄉為聞喜新鄉為獲嘉以著南越之亡大將軍親摠六戎營據丘頭内夷羣凶外殄㓂虜功濟兆民聲振四海克敵之地宜有令名其改丘頭為武丘以武平亂後世不忘亦京觀二邑之義也後魏太武正平元年三月至自南伐飲至筞勲告于宗廟孝文延興二年三月太上皇至自北討飲至筞勲告于宗廟太和十九年五月至自南伐齊告于太廟二十三年正月帝伐齊至自鄴告于廟社行飲至策勲之禮後周武帝建徳六年四月平齊自鄴還京列齊主於前其王公等並從車輦旗幟及器物以次陳於其後大駕布六軍僃凱樂獻俘於太廟京邑觀者稱萬嵗隋髙祖開皇九年四月晉王平陳還帝幸驪山親勞之三軍凱入獻俘於太廟唐髙祖武徳元年十一月秦王平薛仁杲凱旋獻俘於太廟四年六月秦王平王世充竇建徳凱旋親披黄金甲陳鐵馬萬餘騎甲士十三萬人前後部皷吹俘二偽主及隋器物輦輅獻于太廟帝大悅行飲至禮以享焉太宗貞觀四年三月大同道行軍副總管張寶相生擒頡利可汗獻於京師帝以頡利可汗告於太廟十九年六月帝親征髙麗次安市城髙麗别將髙延夀等帥兵十五萬以拒王師大摠管李世勣率兵奮擊帝自髙峰引軍臨之殺獲不可勝紀延夀等以其衆䧏因名所幸為駐蹕山刻石紀功焉二十年三月至自遼東獻俘授馘僃法駕具凱旋之禮蠻夷君長及京邑士女夹道陳設觀者填噎咸稱萬嵗八月帝幸靈州又幸漢故甘泉宫詔曰朕勞形育物盡敬承天蠢動不安􅌨風而罔倦荒隅未靜救焚而靡息獨運方寸貫徹上𤣥凝想冕旒化行戎狄是知惟天為大合其徳者弗違謂地葢厚體其仁者光被故能彌綸八極輿葢兩儀上帝福謙斯其效矣彼匈奴者與開闔以俱生奄有龍庭共上皇而並列僭稱驕子分天街于紫宸仰應旄頭抗大禮于皇極流殃搆禍連年壓境射鵰馳騎亟飲㶚川枉矢騰氛頻驚渭汭貽先皇之動色俾黎庶之塗原社稷為虞軫情何巳自朕御天下二紀于茲曩者聊命偏師遂擒頡利今茲始𢎞廟略已滅延陁雖則麾駕出征未踰郊甸前驅所轥纔掩塞垣長筞風行已振金微之表揚威電發逺讋沙場之外遂使鴈山之北無復單于龍燭之南大開封域其契苾車必俟斤及鐵勒諸姓回紇胡禄俟利發等總統百餘萬户散出北溟逺遣使人委身内属請同編列並為州郡引領翹足暴十日而行油雲延首求哀沉九泉而請營魄朕當暫幸靈州親撫歸附𢎞兹肆赦加以施生頒惠天隅曜威靈朔收其瀚海盡入提封解其辮髮並垂冠𢃄混元以䧏殊未前聞無疆之業永貽來裔古人所不能致今既吞之前王所不能屈今咸滅之斯實書契所未有古今之壯觀豈朕一人獨能宣力葢繇上靈儲祉錫以太康宗廟威靈成茲克定即僃禮告於清廟仍以大慶頒示普天俾與黎元同茲有頼二十二年五月右衛率長史王𤣥筞俘帝那伏王阿羅那順以詣闕太宗大悅謂羣臣曰夫人耳目玩於聲色口鼻耽於臭味此乃敗徳之源若波羅門不刼掠我使人豈致俘虜耶緬尋惟昔中山以貪寳取斃蜀侯以金牛致滅莫不繇之乃詔所司以一太牢䖍告宗廟閏十二月崑山道摠管阿史那社爾破龜茲執其王訶利布失畢及其相郡利以歸明年正月辛亥獻于社稷壬子獻于紫微殿髙宗永徽元年九月庚子右驍衛郎将髙侃執車鼻可汗至京師癸卯獻于社廟又獻于昭陵甲寅獻于武徳殿顯慶三年十一月伊麗道行軍副總管蕭嗣業擒阿史那賀魯至京師甲午獻于昭陵丙申告于太社初賀魯等俘虜将至帝謂侍臣曰賀魯䝉先朝恩禮割二千餘帳令其統攝背恩忘義自取滅亡今欲先獻俘于昭陵可乎許敬宗對曰古者出師凱旋則飲至筞勲于廟若諸侯以王命討不庭亦獻俘馘于天子近代軍将征伐克㨗亦用斯禮未聞獻于陵所也伏以園寝嚴敬義同清廟陛下孝思所發在禮無違亦可行也總章元年十月司空李勣破髙麗虜髙藏男建男産等以歸京師帝令領髙藏等俘囚便道獻于昭陵仍僃軍容奏凱歌入京城獻于太廟十二月帝親祠南郊以髙麗平昭告上帝𤣥宗開元二十年三月信安王褘及幽州長史趙含章大破叛奚及契丹於幽州之北勑曰誅有罪討不庭去其毒螫登于仁夀固以俯安庶類仰叶靈心頃以兩蕃背恩爰命龔伐精意䖍告順天行誅干旄所指不戰而潰山谷遺類盡為俘馘疾如震霆動若神助豈非昊穹垂福陵廟䧏靈故得萬旅安全一隅澄晏永惟昭感之著先洽顧懐之福䖍奉明靈載深寅畏宜令所司擇日發使告享諸陵廟又命王浚親統奚契丹俘虜告廟二十二年六月幽州莭度副大使張守珪大破林胡遣使獻㨗𠡠曰邊境為患莫甚於林胡朝廷是虞㡬煩於将帥而車徒屢出芻粟載勞使燕趙黎萌畧無寧嵗而山戎種落嘗為匪人近者輒變梟聲敢為獸搏幽州莭度副大使張守珪等乗間電發表裏齊攻積年逋誅一朝翦滅則東北之祲便以廓清河朔之人頓寛征伐此皆上憑九廟之略下仗羣帥之功今既凱旋敢不以獻宜擇日告九廟所司准式二十八年八月幽州莭度使奏破奚契丹𠡠曰蕞爾狂胡尚有餘孽近令討襲應時摧敗豈朕菲徳能茂厥功此繇宗廟之靈所以然也宜擇日告廟天寶五載正月己巳獻隴右所獲吐蕃突厥俘于太清宫庚午獻于太廟肅宗至徳二年九月元帥廣平王收西京甲辰㨗書至行在百僚稱賀即日告㨗於蜀太上皇遣宰相裴冕入京告郊廟社稷上元元年十月元帥廣平王奏收懷州城生擒七千餘衆是月獻俘於太廟二年二月河南逆賊劉展反斬偽署大將軍汲子澄楊子英等九人並傳首至京告于太廟梟諸街市代宗寳應二年四月命有司饗太廟兼告獻逆賊史朝義首大厯二年正月華州逆賊周智光平梟首于皇城之南街以示衆命有司具儀奏告太清宫及太廟七陵徳宗貞元元年八月河中平傳李懐光首至告于太廟憲宗元和元年八月西川節度使髙崇文平成都擒劉闢十月戊子詔左右神策兵領劉闢等自臨臯驛至闕下帝御興安樓命中使䧏樓詰其反狀闢曰臣不敢反五院子弟為惡臣不能制帝又令詰之曰朕遣中使送旌節告身何不受闢引罪無辭命獻太清宫太廟太社即日並戮于子城之西南隅十二年十月淮西平十一月丙戌朔帝御興安門文武百官分序街之左右六軍僃衛逆賊吳元濟見于樓下命獻于太廟太社畢狥東西市乃斬于子城西南隅十四年二月魏博莭度使田𢎞正遣使獻逆賊李師道之首命左右軍兵衛之先獻于太廟郊社帝御興安門百寮於樓下列位稱賀穆宗長慶元年四月河北諸道平中書門下奏伏以太宗平突厥髙宗平髙麗皆告陵廟盖以髙祖嘗畜憤於北虜太宗亦鋭意於東夷武功未終列聖繼立亦既平盪所宜啟告伏以鎭冀一道弔罰再加幽薊八州兵戎數起陛下仁聖臨御皆使自効忠誠不勞干戈盡復區宇祖宗宿憤霧廓煙消兵力所致功實相萬豈必獻俘函首方告清廟詩曰維天之命太平告文王也考之經典義亦相符望下禮官撰儀擇日薦告太廟以彰陛下纘服之業上慰聖靈從之五月己酉告于太廟二年八月汴州平逆賊李㝏梟首及其男四人至京師分命攝太尉三人告社稷太廟太清宫詔曰汴州逆賊李㝏竊據城池坐邀符節率其兇黨敢拒王師今既梟首於闕下宜令所司准式其男道源道樞道倫道安等叛逆之子固不可原理湏正刑宜集衆處斬以左右神䇿兵各三百人防押即日行刑於京城之西市武宗㑹昌四年八月辛巳朔平澤潞劉稹傳首京師帝御興安門獻于宗廟社稷百官樓前稱賀僖宗中和四年六月徐州莭度使時溥進表行在獻黄巢首級帝獻賊首於行廟受百僚賀昭宗龍紀元年二月汴州行軍司馬李璠檻送蔡賊秦宗權并妻趙以獻帝御延喜門受俘百僚稱賀以之狥市吿廟社宗權斬於獨柳樹下趙笞死乾寧元年十一月慶州奏邠州節度使王行瑜將家族五百人到州界為部下所殺傳首闕下帝御延喜門獻行瑜首于太廟初行瑜弟行紇行實謀挾帝入邠州事覺討之至是傳首到闕後唐莊宗初為晉王天祐十一年正月平幽薊還以劉守光吿南宫七廟是日與其黨李小喜鄭藏斐皆伏法同光四年二月有司奏偽蜀主王衍到闕日准禮差官告太微宫太廟太稷武成王廟從之明宗天成四年二月王晏球平定州王都獻俘馘帝御咸安樓受之刑部侍郎張文寳奏曰逆賊王都首級請付所司大理卿蕭希甫受之以出獻于郊社畢於街市號令王都男四人弟一人秃餒父子二人並磔於開封橋文武百官稱賀于樓前周太祖廣順二年五月以平定兖州梟夷逆黨差官告社稷郊廟册府元龜卷十二
