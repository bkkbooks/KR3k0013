body:
  text: 冊府元龜卷八百五十一宋王欽若等撰總錄部友悌詩曰因心則友傳曰兄良弟悌史佚有致美之論小雅形莫如之歎蓋孝友之徳通於神明而為民極矣中古已降遺文可覿乃有臨難而争死傭耕以給養割天性之愛全猶子之單緒銜死喪之戚棄仕籍而長徃分財讓爵正家睦族逺跡兆寵推致於天倫克己紓禍全度於世難至乃字育孤㓜養治疴瘵恭順兼極勞苦無憚脊令急難之義以之而彰塤箎和樂之美於是乎在孔子曰孝悌也者其為人之本與信君子之所務也巳衛公子壽宣公之子太子伋之異母弟而子朔之兄也宣公欲廢太子伋而立子朔乃使太子伋於齊而令盜遮界上殺之與太子白旄而告界盜見持白旄者殺之且行壽知朔之惡太子而君欲殺之乃謂太子曰界盜見太子白旄即殺太子可毋行太子曰逆父命求生不可遂行壽見太子不止乃盜白旄而先馳至界盜見其驗即殺之壽已死而太子伋又至謂盜曰所當殺乃我也盜并殺太子伋衛人傷而作二子乘舟之詩仲由字子路有姊之喪可以除之矣而弗除也孔子曰何弗除也子路曰吾寡兄弟而弗忍也孔子曰先王制禮行道之人皆弗忍也子路聞之遂除之趙旃為晉大夫晉楚戰於邲晉師敗旃以其良馬二濟其兄與叔父以他馬反遇敵不能去棄車而走林中趙盾父衰娶狄女叔隗之所生也文公妻衰生原同屏括樓嬰原屏樓三子之邑趙姬以盾為賢請於公以為嫡子後盾為卿請以括為公族括趙盾異母弟趙姬之中子屏季也曰姬氏之愛子也趙姬文公女成公姊也微君姬氏則臣狄人也成公許之盾狄外孫也姬氏逆之以為嫡趙盾為旄車之族旄車當為公行之官盾本卿適其于公族辟屏季故更掌旄車使屏季以其故旄為公族大夫漢陳伯有田三十畆與弟平居伯常耕田縱平使游學為人長大美色人或謂平貧何食而肥若是其嫂疾平之不親家生産曰亦食糠覈耳覈麥糠中不破者京師人謂麄屑為紇頓有叔如此不如無有伯聞之遂棄其婦伯平之兄也史不載官位卜式河南人以田畜為事有少弟弟壮式脫身出脫身謂引身出也獨取畜羊百餘田宅財物盡與弟式入山牧十餘年羊致千餘頭買田宅而弟盡破其産式輒復分與弟者數矣後代石慶為御史大夫王商涿郡人商父封平昌侯商少為太子中庶子以肅敬敦厚稱父薨商嗣為侯推財以分異母諸弟身無所受金敞成帝時為衛尉病甚使使者問所欲以弟岑為托帝召岑拜為使主客官名屬鴻臚主胡客也後漢杜林王莽末客河西弟成物故隗囂聽林持喪東歸既遣而悔追令刺客楊賢於隴坻遮殺之賢見林身推鹿車載致弟喪乃歎曰當今之世誰能行義我雖小人何忍殺義士因亡去建武中為光祿代朱浮為大司空淳于恭王莽末嵗饑兵起恭兄崇將為盜所烹恭請代得俱免後崇卒恭養孤㓜教誨學問有不如法輒反用杖自箠以感悟之兒慙而改過遷侍中騎都尉馬援兄况卒援行服朞年不離墓所敬事寡嫂不冠不入廬位伏波將軍虞延王莽末天下大亂延嘗嬰甲胄擁衛親族扞禦鈔盜賴其全者甚衆延從女弟年在孩乳其母不能活之棄於溝中延聞其號聲哀而收之養至成人以妻同縣人王氏建武初除細陽令郭昌光武郭后之父讓田宅財産數百萬與異母弟國人異之昌追封陽安侯趙孝字長平沛國人及天下亂人相食孝弟禮為餓賊所得孝聞之即自縳詣賊曰禮久餓羸瘦不如孝肥飽賊大驚並放之後孝徴拜諫議大夫禮徵為御史中丞劉平本名曠楚郡人更始時天下亂平弟仲為賊所殺其後賊復忽然而至平援侍其母奔走逃難仲遺腹女始一嵗平抱仲女而棄其子母郤還取之平不聽曰力不能兩活仲不可絶類遂去不顧後遷侍中拜宗正王琳汝南人年十餘嵗喪父母因遭大亂弟季出遇赤眉將為所脯琳自縳請先季死賊矜而放遣繇是顯名鄉邑後司徒府薦士而退兒萌字子明齊國人車成字子威梁郡人二人兄弟竝見執於赤眉將食萌成叩頭乞以身代賊亦哀而兩釋焉史不載官位繆彤汝南召陵人少孤兄弟四人皆同財業及各娶妻諸婦遂求分異又數有争鬬之言彤深懐忿歎乃掩户自撾曰繆彤汝修身謹行學聖人之法將以齊整風俗奈何不能正其家乎弟及諸婦聞之悉叩頭謝罪遂更為敦睦之行卒中牟令魏霸世有禮義霸少喪親兄弟同居州里慕其雍和為光禄大夫卒於官魯恭與弟丕俱居太學恭憐丕少欲先就其名托疾不仕郡數以禮請謝不肯應母强遣之恭不得已而西因留新豐教授建初中丕舉方正恭乃初始為郡吏薛包父母死弟子求財異居包不能止乃中分其財奴婢引其老者曰與我共事久若不能使也田廬取其荒頓者曰吾少時所理意所戀也器物取朽敗者曰我素所服食身口所安也弟子數破其産輒復賑給建光中公車徵至拜侍中楊厚母初與前妻子搏不相安厚年九嵗思令和親乃託疾不言不食母知其㫖瞿然改意恩養加篤安帝永初二年除中郎孔奮扶風人為武都太守弟竒游學雒陽奮以竒經明當仕上病去官守約鄉閭樊梵字文髙長羅侯宏之孫為郎二十餘年三署服其重愼有孫悉推財物二千餘萬與孤兄子樊準宏之族曽孫少勵志行修儒術以先父産業數百萬讓孤兄子為光祿勲卒於官隂興子慶封鮦陽侯推田宅財物悉與弟員丹明帝以慶義讓擢為黄門侍郎李充字太遜陳留人也家貧兄弟六人同衣共食妻竊謂充曰今貧居如此難以乆安妾有私財願思分異充偽酬之曰如欲别居當釀酒具㑹請呼鄉里内外共議其事婦從充置酒讌客充於坐中前跪白母曰此婦人無狀而教充離間母兄罪合遣斥便呵叱其婦逐令出門婦銜涕而去坐中驚肅因遂罷散後遷左中郎将韓稜四嵗而孤養母弟以孝友稱及壯推先父餘財數百萬與從昆弟鄉里髙之後至司空張堪字君游南陽宛人為郡族姓堪早孤讓先父餘財數百萬與兄子後至漁陽太守封觀有志節當舉孝廉以兄名位未顯恥先受之遂稱風疾喑不能言火起觀屋徐出避之忍而不告後數年兄得舉觀乃稱推而仕郡焉許武會稽陽羨人也太守第五倫舉為孝廉武以二弟晏普未顯欲令成名乃請之曰禮有分異之義家有别居之道於是共割財産以為二分武自取肥田廣宅奴婢强者二弟所得並悉劣少鄉人皆稱弟克讓而鄙武貪婪晏等以此竝得選舉武乃㑹宗親泣曰吾為兄不肖盜聲竊位二弟年長未豫榮祿所以求得分財自取大譏今理産所增三倍於前悉以推二弟一無所留於是郡中翕然逺近稱之位至長樂少府許荆武孫也少為郡吏兄子世嘗報讐殺人怨者操兵攻之荆聞乃出門逆怨者跪而言曰世前無狀相犯咎皆在荆不能訓導兄既早没一子為嗣如何令死者傷其滅絶願殺身代之怨家扶荆起曰許掾郡中稱賢吾何敢相侵因遂委去荆名譽益著卒諫議大夫姜肱字伯淮彭城廣戚人也家世名族肱與二弟仲海季江俱以孝行著聞其友愛天至嘗共卧起及各娶妻兄弟相戀不能别寝以係嗣當立乃遽徃就室嘗季江謁郡夜於道遇盜欲殺之肱兄弟更相爭死賊遂兩釋焉謝承書曰肱與季江俱乘車行適野廬為賊所刼取其衣物欲殺其兄弟肱謂盜曰弟年㓜父母所憐愍又未娶願自殺身濟弟季江言兄年徳在前家之珍寳國之英俊乞自戮以代兄命盜賊乃曰二君所謂賢人吾等不良妄相侵犯棄物而走即拜大中大夫伏竄青州鍾皓潁川人少以篤行稱公府連辟為二兄未仕避隠密山密縣山也後辟司徒府自劾去第五訪倫之族孫也少孤貧嘗傭耕以養兄嫂有閒暇則以學文拜䕶羌太尉卒於官崔駰家貧兄弟同居數十年鄉邑化之後至長岑長孔融魯國人也山陽郡東部督郵張儉以忠正為中常侍侯覽所忿疾覽為刋章下州郡捕儉儉與融兄裒有舊亡投裒時值裒出融年十六儉以其少不告也融知儉長者有窘迫色謂曰吾獨不能為君主邪因畱舎藏之後事泄國相以下密就掩捕儉得脫走登時收融及裒送獄融曰保納藏舎者融當坐之裒曰彼来求我罪我之繇非弟之過我當坐之兄弟争死郡縣疑不能决乃上讞詔書令裒坐焉融繇是名震逺近後至中大夫童恢弟翊字漢文名髙於恢宰府元辟之翊陽喑不肯仕及恢被命乃就孝亷陳重為細陽令政有異化舉尤異嘗遷為會稽太守遭姊憂去官譙𤣥遷大常以弟服去職魏張範之子陵及弟承子戩為山東賊所得範直詣賊請二子賊以陵還範範謝曰諸君相還兒厚矣夫人情雖愛其子然吾憐戩之小請以陵易之賊義其言悉以還範初為議郎㕘丞相軍事韓珩字子佩代郡人清粹有雅量少喪父母奉養兄姊宗族稱孝悌焉為袁譚别駕吳孫賁字伯陽父羌字聖壹堅同産兄也賁早失二親弟甫嬰孩賁自贍育友愛甚篤為郡督郵舒仲膺兄伯膺親友為人所殺仲膺為報怨事覺兄弟争死皆得免晉王覽字通𤣥與兄祥異生覽母朱氏遇祥無道覽年數嵗見祥被楚撻輒涕泣抱持至於成童毎諫其母少止凶虐朱屢以非理使祥覽與祥俱又虐使祥妻覽妻亦趨而共之朱患之乃止祥喪父之後漸有時譽朱深疾之密使酖祥覽知之徑起取酒祥疑其有毒争而不與朱遽奪反之自後朱賜祥饌覽輒先嘗朱懼覽致斃遂止覽孝友恭恪名亞於祥以大中大夫歸老髙光字宣茂少習家業明練法理武帝時為廷尉其兄誕放率不倫而決烈過人與光異操謂光小節常輕侮之而光事誕愈謹髙崧字茷琰撫幼弟以友愛稱累遷侍中江逌字道載陳畱圉人少孤與從弟灌共居甚相友悌繇是獲當時之譽仕至太常王徽之與獻之俱病篤時有術人云人命應終而有生人樂代者則死者可生徽之謂曰吾才位不如弟請以餘年代之術者曰代死者以巳年有餘爾今君與弟算俱盡何代也未幾獻之卒徽之奔喪不哭直上靈牀坐取獻之琴彈之久而不調歎曰嗚呼子敬人琴俱亡因頓絶先有背疾遂潰裂月餘亦卒仕至黄門侍郎吳隠之轉征虜㕘軍事兄坦之為袁眞功曹眞敗將及禍隠之詣桓温及乞代兄命温矜而釋之遂為温所知賞仕至光祿勲庾衮叔褒咸寧中大疫二兄俱亡次兄毗復殆癘氣方熾父母諸弟皆出次於外衮獨畱不去諸父兄强之乃曰衮性不畏病遂親自扶侍晝夜不眠其間復撫柩哀臨不輟如此十有餘旬疫勢既歇家人乃反毗病得瘥衮亦無恙父老咸曰異哉此子守人所不能行嵗寒然後知松柏之後凋始疑疫癘不相染也州郡交命察孝亷舉秀才清白異行皆不降志世遂號為異行者也孫晷兄嘗篤疾經年晷躬自扶持侍藥石甘苦必經心因跋渉山水祈求懇至州府辟並不就顔含字𢎞都瑯琊莘人汝隂太守㸃之子少有操行以孝聞兄畿咸寧中得疾就醫自遼遂死於醫家家人迎喪旐每繞樹而不可解引喪者顚仆稱畿言曰我壽命未死但服藥太多傷我五臓爾今當復活愼毋葬也其父祝之曰若爾有命復生豈非骨肉所願今但欲還家不爾𦵏也旐乃還其婦夢之曰吾當復生可急開棺婦頗説之其母及家人又夢之即欲開棺而父不聽含時尚少乃慷慨曰非常之事古則有之今靈異至此開棺之痛孰與不開相負父母從之乃共發棺果有生驗以手刮棺指爪盡傷然氣息甚微存亡不分矣飲哺將䕶累月猶不能語飲食所須托之以夢闔家營視頓廢生業雖在母妻不能無倦矣含乃絶棄人事躬親侍養足不出户者十有三年石崇重含淳行贈以甘㫖含謝而不受或問其故答曰病者綿昧生理未全既不能取噉又未識人惠若當謬留豈施者之意也畿竟不起含後至光祿勲年老遜位李重字茂曾少好學有文辭早孤與羣弟居以友愛著稱裴嶷為滎陽太守屬天下亂嶷兄武先為𤣥莵太守嶷遂求為昌黎太守至郡久之武卒嶷被徵乃将武子開送喪俱南祖約豫州刺史逖之弟初以孝廉為成臯令與逖甚相友愛孔嚴為吳興太守時武康有兄弟二人妻各有孕弟逺行未反遇荒嵗不能兩全棄其子而活弟子謝𤣥以功封康樂縣公力請以先封東興侯賜兄子玩詔聽之更封玩豫寧伯杜烈為衡陽太守聞兄軫亡因自表兄子幼弱求去官詔轉犍為太守蜀士榮之鄧攸没于石勒勒過泗水攸乃研壞車以牛馬負妻子而逃又遇賊掠其牛馬步走擔其子而及其弟子餒甚度不能兩全乃謂其妻曰吾弟早亡惟有一息理不可絶止應自棄我兒爾幸而得存我後當有子妻泣而從之乃棄其子朝棄而暮及明日又繫之于樹而去攸仕至尚書右僕射周顗少有重名顗性寛裕而友愛過人從弟穆亦有美譽欲陵折顗顗陶然弗與之較又弟嵩嘗因酒瞋目謂顗曰君才不及弟何乃横得重名以所然蠟燭投之顗神色無忤徐曰阿奴火攻固出下策爾後終尚書左僕射徐苗性抗烈輕財貴義有知人之鑒弟患口㿈膿潰苗為吮之其兄弟皆早亡撫養孤遺慈愛聞于州里田宅奴婢盡推與之郡察孝廉州辟從事治中别駕舉異行公府五辟博士竝不就謝尚字仁祖豫章太守鯤之子幼有至性七嵗喪兄哀慟過禮親戚異之宋檀道濟少孤居喪備禮奉姊事兄以和謹致稱位司空將軍張暢弟牧嘗為猘犬所傷醫者云食蝦蟇膾可療牧難之暢含笑先嘗牧因此乃食繇是遂愈位侍中卒㑹稽太守胡藩字道序州府辟召不就須二弟冠婚畢乃㕘郗恢征虜軍事謝述景仁之弟也景仁愛其第三弟甝而憎述嘗設饌請髙祖命甝豫坐而髙祖召述述知景仁夙意又慮髙祖命之請急不從髙祖馳遣呼述須至乃嘆及景仁有疾述盡心營視湯藥飲食必嘗而後進不解帶不冠櫛者累旬景仁深懐感愧元嘉二年徴拜中書侍郎蔡廓為祠部尚書奉兄軌如父家事大小皆諮而後行公禄賞賜皆以入軌每有所資須悉就典者請焉從髙祖在彭城妻郄氏書求夏服廓答書知須夏服計給事自應相供無容别寄時軌為給事中杜驥為寧逺將軍青冀二州刺史徵左軍將軍弟坦代為刺史坦長子琬為散騎侍郎太祖嘗有函詔勅坦琬輒開視信未發又追取之勅函已發大相推簡承都答云諸郎開視帝遣王書詰責驥答曰開函是臣弟四子季文伏待刑坐帝特原不問􅃽恭義興臨津人晉陵蒋崇平為刼見擒去與恭妻弟吳晞張為侣晞張先行不在本村遇水晞張妻及息告避水移寄恭家討錄晞張不獲收恭及兄協治罪恭協並欵住舍晞張家口而不知刼情恭列晞張妻息是婦之親今有罪恭身甘分求遣兄協協曰協是户主廷制所繇有罪之日闗協而已求遣弟恭兄弟二人爭求受罪郡縣不能判依事上詳州義之曰禮讓者以義為先自厚者以利為上末世俗薄靡不自私伏膺聖教猶或不逮况在野夫未達誥訓而能互發天倫之愛甘受莫測之罪若斯情義實為殊特蔑爾恭協而能行之兹乃經古之所希盛世之嘉事二子乘舟無以過此豈宜拘執憲文加以罪戮且晞張封筒逺行他界為刼造釁自外贓不還家所寓村伍容或不知亦不合罪勒縣遣還復民伍除恭義成令協義怡令謝𢎞微居身清約器服不華而飲食滋味盡其豐美兄曜卒𢎞微蔬食積時哀慼過禮服雖除猶不噉魚肉沙門釋慧琳詣𢎞微𢎞微與之共食猶獨蔬素慧琳曰檀越素既多疾頃者肌色微損即吉之後未復膳羞以無益傷生豈所望於得理𢎞微答曰衣冠之變禮不可踰在心之哀實未能已遂廢食感咽歔欷不自勝𢎞微少孤事兄如父兄弟友穆之至舉世莫能及也位至吏部尚書江智淵兄子槩早孤養之如子王徽弟僧謙有才譽為太子舍人遇疾徽躬自處治而僧謙服藥失度遂卒徽深自咎恨發病不復自治僧謙卒後四旬徽終沈雍之與兄攸之異生諸弟中性和謹尤見親愛攸之性儉恡子弟不得妄用財物惟恣雍之所須輒取齊中服餙分與親舊以此為常終鎮西將軍荆州刺史徐湛之年數嵗與弟淳之共車行牛奔車壊左右人馳来赴之湛之先令取弟衆咸歎其幼而有識終吏部尚書庾彦達為益州刺史擕姊之鎭分祿秩之半以供贍西土稱焉劉秀之兄欽之為朱齡石右軍叅軍隨齡石敗沒秀之哀戚不歡宴者十年闗康之弟雙之病卒迎哀因得虚勞病寝頓二十餘年時有間日輒卧論文義元嘉中詔徵不起戴顒字仲若譙郡銍人與兄勃逰桐廬名山因畱居止勃疾患醫藥不給顒曰隨兄得閒非有心於語黙兄今疾篤無可治療顒當干祿以自濟取乃求虞海令事垂行而勃卒乃止元嘉初累徵不就張欣泰父興世罷雍州在家還資見錢三十萬蒼梧王自領人刼之一夜垂盡興世憂懼感病卒欣泰兄欣華時任安成郡欣泰悉封餘財以待之江秉之字𤣥叔濟陽考城人給事中纂之子少孤弟妹七人並皆幼稚撫育姻娶罄其心力累遷新安臨海太守王華為侍中有權寵以門户衰弱待從弟琨如親數相親薦為尚書議曹郎王僧䖍兄僧綽為元凶所害親賓咸勸僧䖍逃僧䖍涕泣曰吾兄奉國以忠貞撫我以慈愛今日之事若不見及爾若同歸九泉猶羽化也孝武初出為武陵太守兄子儉於中途得病僧䖍為廢寝食同行客慰喻之僧䖍曰昔馬援處兒姪之間一情不異鄧攸為弟子更逾所生吾實懐其心誠未異古亡兄之嗣不宜忽諸若此兒不救便當廻舟謝職無復遊宦之心矣崔懐愼泰始初以父陷於魏遂入北至桑乾尋父已卒喪畢以弟在南又逃歸而弟亦已亡懐愼孤貧獨立宗黨哀之不載官位虞愿為中書郎領東觀祭酒兄季為上虞令卒愿徙省步還家而待詔便歸孫棘彭城人也世祖大明五年發三五丁弟薩應充行坐違期不至依制軍法人身付獄未及結棘竟詣郡辭不忍令當一門之苦乞以身代薩薩又辭列門户不逮罪應至此狂愚犯法實是薩身也應依法受戮兄弟少孤薩三嵗失父一生恃賴惟在長兄雖可垂愍有何心處世太守張岱疑其不實以棘薩各置一處語棘云已為詔詳聽其相代棘顔色甚悦答云得爾旦則為死又語薩亦欣然曰死自分耳但令兄免薩有何恨棘妻許又寄語囑棘君當門户豈可委罪小郎且大家臨亡以小郎屬君竟未妻娶家道不立君已有二兒死復何恨岱依事表上世祖詔曰棘薩甿𨽻節行可甄特原罪州加辟命并賜帛二十疋袁察初名慜孫少好學有清才有欲與從兄顗婚者伯父洵謂顗父曰顗不堪可與慜孫婚爾時慜孫在坐流涕起出早以特立志行見知孫謙少客居歴陽躬耕以養弟妹鄉里稱其敦睦江夏王義恭聞之引為行㕘軍南齊劉璡兄瓛夜隔壁呼璡共語璡不答方下牀著衣然後立應瓛問其久璉曰向束帶未竟其力操如此㕘大司馬軍事射聲校尉卒官辛普明僑居會稽少與兄共處一帳兄亡以帳施靈座夏月多蚊普明不以露寝見色豫章王辟為議曹從事陶子鏘字海育兄尚宋末為倖臣所怨被繫子鏘公私披訴流血稽顙行路嗟傷逢謝超宗下車相訪迴入縣詣建康令勞彦逺曰豈忍見人昆季如此而不留心勞感之兄得釋公孫僧逺以伯弟亡無以葬身販貼與鄰里供斂送之費躬負土種松栢兄姊未婚嫁乃自賣為之成禮太祖即遣兼散騎常侍解仲恭鴈門人僑居南郡家行敦睦得纎毫財利輒與兄弟平分史不載仕官吳欣之晉陵利城人也宋元嘉末弟周之為武進縣戍隨王誕起義太祖遣軍主華欽討之吏皆散周之獨畱見執將死欣之詣欽乞代弟命辭旨哀切兄弟皆見釋史不載仕官吳達之義興人也從祖弟敬伯夫妻荒年被略賣江北達之有田十畝貨以贖之與之同財共宅郡命敬伯為主簿固以讓兄又讓世業舊田與族弟弟不受田遂閒廢史不載仕官陸澄弟鮮得罪當死澄於路見舎人王道隆叩頭流血以此見原轉光禄大夫加散騎常侍未拜卒胡諧之為太子中庶子兄謨之亡上表乞解所職詔不許劉繪字士車太常悛之弟事悛恭謹與人語呼為使君隆昌中悛坐罪將見誅繪伏闕請代兄死髙宗輔政救解之引為鎮軍長史及悛之亡朝議贈平北将軍雍州刺史詔書已出繪請尚書令徐孝嗣改之劉溓兄渢南陽人事繼母有行弟溓事渢亦謹王思逺為建安内史長兄思𤣥卒思逺友于甚至表乞解不許及祥日又固陳世祖乃許之謝瀹為吏部尚書領右軍將軍兄胐在吳興論啟公事稽晚瀹乃代胐為啟上知非胐手迹被問見原王微字景𤣥初為始興王友父憂去職服闋除南平王鑠右軍諮議㕘軍仍為中書侍郎時兄逺免官歴年微歎曰我兄無事而屏廢我何得而叨忝踰分文帝即以逺為光祿勲王瑒字子璵遷尚書左僕射加侍中參選事瑒居家篤睦每嵗時饋遺徧及近親敦友諸弟稟其規訓南齊張敬兒南陽冠軍人也弟恭兒位正員郎謝病歸本縣嘗居上村不肯出仕與居人不異與敬兒愛友甚篤及聞敬兒敗走入蠻後首出原其罪劉峻字孝標本名法武梁天監初召入西省與學士賀蹤典較祕閣峻兄孝慶時為青州刺史峻請假省之劉之亨字嘉㑹之亨美績嘉聲在朱异之右既不協懼為所害故求出之以代兄之遴為安西王繹長史南郡太守上問朱异曰之亨代兄嘉不曰兄弟因循豈直大馮小馮而已梁傅昭字茂逺北地靈州人也弟映字微逺三嵗而孤昭映兄弟友睦修身厲行非禮不行映有文才褚彦囘聞而恱之乃屈與子賁等遊處年未弱冠彦囘欲令仕映以昭未解褐固辭須昭仕乃就官天監初為烏程令所受俸祿悉歸於兄後昭守臨海陸倕餞之賓主俱歡日昏不反映以昭年髙不可連夜極樂乃自徃迎候同乘而歸兄弟竝已班白時人美而服焉及昭卒映喪之如父年踰七十哀慼過禮服制雖除毎言輒感慟韋放性𢎞厚篤實輕財好施於諸弟尤雍穆毎將逺别及行後初還嘗同一室卧起時號為三姜庾於陵弟肩吾八嵗能為詩特為兄所友悌於陵鴻臚卿鎮荆州大中正卒肩吾終度支尚書韋叡性慈愛撫孤兄子過於己子遷侍中給事中未拜而卒何㸃兄求隠居吳郡虎丘山求卒㸃菜食不飲酒訖于三年腰帶減半徵侍中辭疾不赴何伯璵弟幼璵俱厲節撫養孤兄子及長為婚推家業盡與之而貧瘁枯槁誨人不倦鄉里呼為人師郡守下車莫不修謁史不載仕官江革濟陽人九嵗丁父艱與弟觀同生少孤貧傍無師友兄弟自相訓朂讀書精力不倦後革為尚書駕部郎中建安王為雍州刺史表求管記以革為征北記室㕘軍帶中盧令革與弟觀少長共居不忍離别苦求同行乃以觀為征北行㕘軍兼記室陳虞荔為太子中庶子時荔第二弟寄寓於閩中依陳寳應荔每言之輒流涕文帝哀而謂曰我亦有弟在逺此情甚切他人豈知乃勅寳應求寄寳應不遣荔因以感疾寄自流寓南土與兄荔隔絶亦感氣疾毎得荔書氣輒奔劇危殆者數矣徐伯陽為新安諮議㕘軍聞妹喪發疾而卒顧野王弟充國早卒野王撫養孤幼恩義甚厚仕至黄門侍郎光祿卿江徳操字德操父革梁度支尚書徳操性至孝事親盡禮與異産昆弟居恩惠甚篤拜鎮逺將軍通直散騎常侍自求宰縣出新喻令卒官殷不害字長卿陳郡長平人也家世儉約居甚貧寠有弟五人皆幼養小弟無所不至士大夫以篤稱之終光祿大夫張悌建康人家貧無以供養以情告鄰富人富人不與不勝忿遂結四人作刼所得物三刼持去寔無一錢入已縣抵悌死罪兄松訴稱與弟景是前母子後母子惟悌松長不能教誨乞代悌死景又曰松是嫡長後母惟生悌若從法母亦不全亦請死母憂云悌應死豈以弟罪枉及諸兄悌亦引分兩全兄弟供養縣以上讞帝以為孝義特降死後不得為例冊府元龜卷八百五十一
