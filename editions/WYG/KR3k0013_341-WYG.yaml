  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_341-1a}
body:
  text: 册府元龜卷三百四十一宋王欽若等撰將帥部佐命第二漢王吸以中涓從起豐至霸上爲騎郎將入漢以將軍擊項籍封淸河侯一作淸陽二千二百户召歐以中涓從起沛至霸上為連敖入漢以騎將定燕趙得燕將軍封廣嚴侯二千二百户薛歐以舍人從起豐至霸上為郎入漢以將軍擊項籍將鍾離昧封廣平侯四千五百户陳濞以舍人從起碭以刺客將入漢以都尉擊項羽滎陽絶甬道殺追士卒封博陽侯劉纒兵初起與諸侯共擊秦為楚左令尹漢王與項羽有隙於鴻門纒解難以破羽降漢封射陽侯周昌以職志職志官名主旗幟也擊秦入漢出闗以内史堅守敖倉以御史大夫封汾陰侯比清陽矦武虎一作武儒以謁者從擊破秦入漢定三秦出闗以將軍擊定諸侯比愽陽侯二千八百户封梁鄒侯董渫一作緤以舍人從擊秦為都尉入漢定三秦出闗以將軍定諸侯比厭次侯二千八百户封成侯孔藂以執盾從起碭以左司馬入漢爲將軍三以都尉擊項籍屬韓信此即楚漢春秋及史記所謂孔將軍居左者封蓼侯陳豨以特將將卒五百人從起宛朐至霸上為游擊將軍别定代破臧荼封陽夏侯陳賀以舍人從起碭以左司馬入漢用都尉屬韓信擊項籍為將軍定㑹稽浙江胡陵封費侯周竈以卒從起碭以連敖入漢以長鉟都尉擊項籍連敖楚官左𫝊楚有連尹莫敖其後合為一長鉟官號長刄兵也為刀而劒形史記作長鈹鈹亦刀耳封隆慮侯丁復以越將從起薛至霸上以樓煩將入漢定三秦屬周呂侯破龍且彭城為大司馬破項籍葉謂破楚葉縣也為將軍忠臣封陽都侯七千八百户郭䝉以户衛從起薛屬周呂侯破秦軍扛里陷楊熊軍曲遇入漢為城將定三秦以都尉堅守敖倉為將軍破項籍封東武侯三千户嚴不職一作不言以舍人從起沛至霸上以騎將入漢還擊項籍屬丞相寗功侯用將軍擊黥布封武彊侯宣虎以河南將軍降晉陽以重將破臧荼重將者主將領别重也封南安侯九百户陳武以將軍將卒二千五百人起薛别救東阿至霸上一歲十月入漢擊齊歴下軍臨菑封棘蒲侯朱軫以舍人從起沛以隊帥先降翟王虜章邯封都昌侯合傅胡害以越户將從破秦入漢定三秦以都尉擊項籍封貰侯六百户功比臺侯揺毋餘以越隊將從破秦入漢定三秦以都尉擊項籍封海陽侯一十七百戸蔡寅以魏太僕漢王三年初從以車騎將軍破龍且及彭城封肥如侯千户蟲逹以西城户將三十七人從起碭至霸上為執金吾又為二隊將屬周呂侯入漢定王秦以都尉破項籍陳下封曲成一作曲城侯四千户陳涓以卒起碭從以二隊將入漢擊項籍得梁郎將封河陽侯耏跖以門尉起碭至霸上為定武君入漢還定三秦為都尉擊項羽封芒侯閻澤赤以執盾初起從入漢為河上守遷為殷相擊項籍封敬市侯一作故市千户比平定侯戎賜以連敖從起薛以三隊將入漢定三秦以都尉破項籍軍為將軍封桞丘侯八千户周止以舍人從起沛以郎中入漢為周信侯定三秦以為騎郎將破項籍東城封魏其侯千户繒賀漢王三年以執盾起從晉陽以連敖擊項籍漢王敗走賀擊楚追騎以故不得進漢王顧謂賀祁王戰彭城斬項籍爭惡絶延壁謂之祁王者蓋嘉其功故寵號之許以爲王也爭惡謂爭惡地延壁壁壘之名也封祁侯千四百户許瘛漢三年用趙右林將初擊定諸侯林將言羽林之將也封宋子侯齊受以卒從起留以家車吏入漢以驍騎都尉擊項籍得樓煩將家車吏主漢王之家車封平定敬侯工師喜以舍人從擊破秦以郎中入漢以將軍定諸侯守雒陽封平侯比費侯賀千二百户奚涓以舍人從起沛至咸陽為郎入漢以將軍定諸侯封魯侯四千八百戸尹恢以謁者從入漢以將軍擊定諸侯以右丞相備守淮陽封城父侯二千户襄漢表失其姓一作無姓以執盾隊史從起碭破秦治粟内史人漢以上郡守擊定西魏地封棘丘侯郭亭以連敖從起單父以塞路入漢主遮塞要路以備敵冦也還定三秦屬周呂侯以都尉擊項籍封河陵侯一作阿陵單究一作單甯以舍人從以郎入漢定三秦以騎將軍擊諸侯封昌武侯七百户丙猜以客從入漢定三秦以中尉破項籍封高宛侯一作高苑千六百户丁義以卒從起留以騎將入漢定三秦破項籍軍滎陽為郎騎將破鍾離昧軍固陵封宣曲侯六百七十户華無害以越將從起留入漢定三秦擊臧荼封終陵侯一作絳陽七百四十户劉到一作劉釗以舍人從起碭至霸上以二隊入漢定三秦以都尉擊項籍破臧荼封東茅侯千户唐厲以舍人從起豐以左司馬入漢以亞將攻項籍却敵為東部都尉破項籍封成武侯為中尉擊黥布封斥丘侯千户戴野以舍人從起碭用隊帥入漢以都尉擊項籍籍死屬買將軍擊臨江功封臺侯丁禮以中涓騎從起碭為騎將入漢定三秦為正奉侯以都尉擊項籍屬灌嬰殺龍且更為樂成侯千户鄂秋漢王三年以謁者從定諸侯有功封安平侯二千户陳夫乞以卒從起杠里入漢以都尉擊項籍以將軍定燕封高胡侯千户爰類以愼將謹慎為將也從起留入漢以都尉守廣武封厭次侯陳胥以卒從起薛以將軍入漢以右司馬擊項籍封復陽侯千户其石以中謁者從入漢以郎中騎從定諸侯封河陽侯五百户許盎以駢隣從起昌邑一馬曰駢駢隣竝兩騎也以稅衞入漢税衞謂軍行舍止之時為衞也以中尉擊項籍封栢至侯千户呂馬童以郎騎將從好畤以司馬擊龍且復共斬項籍封中水侯千五百户王翥一作士醫以中郎騎從起下邳屬淮陰侯從灌嬰共斬項籍封杜衍侯千七百户楊喜一作楊嘉以郎中騎從起杜屬淮陰侯從灌嬰共斬項籍封赤泉侯千九百户華寄以舍人從起薛以連敖入漢以都尉擊項籍封朝陽侯千户杜得臣以卒從起湖陵入漢以郎將迎左丞相軍擊項籍封棘陽侯千户呂騰以騎士從出闗以郎中共擊項籍封涅陽侯千三百户林摯以客從起亢父斬章邯所置蜀守用燕相封平棘侯千户趙將夕一作將夜以趙將屬淮陰侯定趙齊楚封深澤侯七百户程黒以趙衞將軍從起盧奴擊項籍敖倉下為將軍攻臧荼封厯侯一作磨侯千户陳遫以舍人從起豐入漢以都尉擊項籍封猗氏侯千一百户室中一作空中同以弩將初起從入漢以都尉擊項籍封清侯千户留肹一作留勝以客吏初起從入漢以都尉擊項籍封彊侯千户秦同以卒從起薛以弩將入漢以都尉擊項籍封彭侯千户楊武以郎中騎將從起下邳擊陽夏以騎都尉擊項籍封吳房侯七百户魏遫以舍人從起碭入漢以都尉擊臧荼封甯侯千户張説以卒從起方與以執盾入漢以司馬擊項籍以將軍定代封安丘侯二千户陳署以卒從起霸上以謁者擊項籍斬曹咎封龍陽侯一作龍侯千户孫赤以中涓從起沛以郎入漢以將軍擊項籍封惠侯坐守滎陽降楚免復來以郎擊項籍為上黨守擊陳豨封堂陽侯八百户高色一作高邑以客從起齧桑以上隊將入漢以將軍擊魏太原井陘屬韓信罌度軍破項籍封祝陽侯一作祝阿千八百户呂臣以舍人從起陳留以郎入漢破曹咎成臯為都尉擊陳豨封甯陵一作寧陵侯千戸靳彊以郎中騎千人從起櫟陽擊項籍以中尉破鍾離昧封汾陽侯袐彭祖以卒從起沛以卒開沛城門為太公僕以中廏令擊陳豨封戴侯千一百户周聚以卒從起豐以隊率入漢擊項籍成臯封博陽侯泠耳以客從起沛入漢用兵擊破齊田解軍以楚丞相堅守彭城封下相侯二千户王虞人一作王周以騎司馬從起廢丘以都尉破田横龍且追項籍至東城封高陵侯九百户季必一作李必以騎都尉從起櫟陽攻破廢丘因擊項籍屬韓信破齊封戚侯千五百户奚意以魏郎初從起陽武擊項籍屬魏王豹封成陽侯六百户陳蒼以中涓從起豐以騎將入漢以將軍擊項籍封紀信侯七百户毛釋之以中涓從起豐以郎騎入漢還從擊諸侯封張侯七百户革朱以越連敖從起薛别以越將入漢擊諸侯以都尉封煑棗侯九百户朱濞以卒從起豐入漢以都尉擊項籍封鄢陵侯二千七百户後漢鄧禹字仲華南陽新野人光武安集河北即杖策北度追及於鄴號曰鄧將軍嘗宿止於中與定計議及王郎起兵光武自薊至信都使禹發奔命得數千人令自將之别攻抜樂陽樂陽縣屬常山郡從至廣阿東觀記曰帝率禹等擊王郎横野將軍劉奉大破之帝過禹營禹進炙魚帝飱㗖勞勉吏士威嚴甚厲衆皆竊言劉公眞天人也光武使别將騎與蓋延等擊銅馬於清陽延等先至戰不利還保城為賊所圍禹遂進與戰破之生獲其大將從光武追賊至滿陽連大克獲北州畧定及赤睂西入闗更始使定國上公王匡襄邑王成丹抗威將軍劉均及諸將分據河東𢎞農以拒之赤睂衆大集王匡等莫能當光武籌赤睂必破長安欲乗釁并闗中而方自事山東未知所寄以禹沈深有大度故授以西討之略乃拜爲前將軍持節中分麾下精兵二萬人遣西入闗令自選偏禆以下可與俱者於是以韓歆為軍師李文李春程慮爲祭酒慮字或為憲馮愔為積弩將軍樊崇為驍騎將軍宗歆為車騎將軍鄧尋為建威將軍耿訢為赤睂將軍左于為軍師將軍引而西建武元年正月禹自箕闗將入河東箕闗在今王屋縣東河東都尉守闗不開禹攻十日破之獲輜重千餘乗進圍安邑數月未能下更始大將軍樊參將數萬人度大陽欲攻禹大陽縣屬河東郡春秋秦伯伐晉自茅津渡河東大陽縣是也禹遣諸將逆擊於解南大破之斬參首解縣屬河東郡於是王匡成丹劉均等合軍十餘萬復共擊禹禹軍不利樊崇戰死㑹日暮戰罷軍師韓歆及諸將見兵勢已摧皆勸禹夜去禹不聽明日癸亥王匡等以六甲窮日不出禹因得更理兵勒衆明旦匡等悉軍出攻禹禹令軍中無得妄動既至營下因𫝊發諸將皷而竝進大破之匡等皆棄軍亡走禹率輕騎急追獲劉均及河東太守楊寳持節中郎將弭彊皆斬之收得節六印綬五百兵器不可勝數遂定河東承制拜李文為河東太守悉更置屬縣令長以鎭撫之馮異字公孫潁川人漢兵起異以郡掾監五縣與父城長苖萌共城守為王莽拒漢光武畧地潁川攻父城不下屯兵巾車鄉異間出行屬縣為漢兵所執時異從兄孝及同郡丁綝呂晏竝從光武因共薦異得召見異曰異一夫之用不足為強弱有老母在城中願歸據五城以効功報德光武曰善異歸謂苖萌曰今諸將皆壯士倔起多暴横獨有劉將軍所到不虜掠觀其言語舉止非庸人也可以歸身苗萌曰死生同命敬從子計光武南還宛更始諸將攻父城者前後十餘軰異堅守不下及光武為司𨽻校尉道經父城異等即開門奉牛酒迎光武署異為主簿苗萌為從事從至雒陽更始數欲遣光武狥河北諸將皆以為不可是時左丞相曹竟子翊為尚書父子用事異勸光武厚結納之及度河北詡有力焉異後因間進說曰天下同苦王氏思漢久矣今更始諸將從横暴虐所至虜掠百姓失望無所依戴今公専命方面施行恩德夫有桀紂之亂乃見湯武之功人久飢渴易為充飽宜急分遣官屬狥行郡縣理寃結布惠澤光武納之至邯鄲遣異乗𫝊撫循屬縣及王郎起光武自薊東南馳至饒陽蕪蔞亭亭名令在饒陽遇大風雨光武引車入道傍空舍異抱薪鄧禹爇火異復進麥飯菟肩因復渡滹沱至信都使異别收河間兵還拜偏將軍從破王郎封應侯應國在城父縣西南别擊破鐵脛於北平又降匈奴于林闟頓王匈奴王號因從平河北時更始遣李軼王田立朱鮪陳僑等僑一作喬將兵號三十萬與河南太守武勃共守洛陽光武乃拜冦恂為河内太守異為孟津將軍統二郡軍河上與恂合勢以拒朱鮪等北攻天井闗拔上黨兩城又南下河南成臯以東十三縣及諸屯聚皆平之降者十餘萬武勃將萬餘人攻諸畔者異引軍渡河與勃戰於士鄉下士鄉亭名屬河南大破斬勃獲首五千餘級勸光武即帝位異與諸將定議上尊號建武二年春定封陽夏侯引擊陽翟賊嚴終趙根破之時赤睂延岑暴亂三輔郡縣大姓各擁兵衆大司徒鄧禹不能定乃遣異代禹討三輔既至皆布威信𢎞農群盜稱將軍者十餘軰皆率衆降異異與赤睂遇於華陰相拒六十餘日戰數十合降其將劉始王宣等五千餘人三年春遣使者即拜異為征西大將軍與鄧禹鄧𢎞等共攻赤睂大破於崤底降男女八萬人餘衆尚十餘萬東走宜陽延岑據藍田王歆據下邽芳丹據新豐蔣震據霸陵張邯據長安公孫守據長陵楊周據谷口呂鮪據陳倉角閎據汧駱蓋延據盩厔任良據鄠汝章據槐里各稱將軍擁兵多者萬餘少者數千人轉相攻擊異且戰且行屯軍上林苑中延岑既破赤睂自稱武安王拜置牧守欲據闗中引張邯任良共攻異異擊破之斬首千餘級諸營保守附岑者皆來降歸異岑走攻析異遣復漢將軍鄧􅁮輔漢將軍于匡要擊岑大破之降其將蘇臣等八千餘人岑遂自武闗走南陽詔拜南陽趙匡為右扶風將兵助異乃稍誅擊豪傑不從令者褒賞降附有功勞者悉遣其渠帥詣京師散其衆歸本業威行闗中唯吕鮪張邯蔣震遣使降蜀其餘悉平吳漢字子顔南陽宛人王莽末亡命至漁陽更始立使使者韓鴻狥河北或謂鴻曰吳子顔竒士也可與計事鴻召見漢甚悅之遂承制拜為安樂令㑹王郎起北州擾惑漢素聞光武長者獨欲歸心乃說太守彭寵曰漁陽上谷突騎天下所聞也君何不合二郡精銳附劉公擊邯鄲此一時之功也寵以為然而官屬皆欲附王郎寵不能奪漢辭出止外亭念所以譎衆未知所出望見道中有一人似儒生者漢使人召見之為具食問以所聞生因言劉公所過為郡縣所歸邯鄲舉尊號者實非劉氏漢大喜即詐為光武書移檄漁陽使生齎以詣寵令具以所聞說之漢復隨後入寵甚然之於是遣漢將兵與上谷諸將并軍而南所至擊斬王郎將帥及光武於廣阿拜漢為偏將軍既拔邯鄲賜號建策侯光武將發幽州兵鄧禹薦之拜大將軍持節北發十郡突騎更始幽州牧苗曾不肯應調漢乃將二十騎先馳至無終在今幽州漁陽縣斬曽而奪其軍北州震駭城邑莫不望風弭從弭服也遂悉發其兵引而南與光武㑹又與岑彭攻更始尚書令謝躬于邯鄲襲其城漢手擊殺躬其衆悉降光武北擊羣賊謂銅馬高胡漢嘗將突騎五千為軍鋒數先登陷陣及河北平漢與諸將奉圖書上尊號光武即位拜為大司馬更封舞陽侯賈復字君文南陽冠軍人王莽末為縣掾時下江新市兵起復亦聚衆數百人於羽山自號將軍更始立乃將其衆歸漢中王劉嘉以為校尉復見更始政亂諸將放縱乃說嘉曰臣聞圖堯舜之事而不能至者湯武是也圖湯武之事而不能至者桓文是也圖桓文之事而不能至者六國是也定六國之規欲安守之而不能至者亡六國是也今漢室中興大王以親戚為藩輔天下未定而安守所保所保得無不可保乎嘉曰卿言大非吾任也大司馬劉公在河北必能相施第馳我書往施用也第但也復遂辭嘉受書北渡河及光武於柏人因鄧禹得召見光武竒之禹亦稱有將帥節於是署復破虜將軍督盜賊光武至信都以復為偏將軍及㧞邯鄲遷都䕶將軍從擊青犢於射犬大戰復被羽先登所向皆靡賊乃敗走又北與五校戰於真定大破之光武即位拜為執金吾封冠軍侯先渡河攻朱鮪於雒陽與陳僑戰連破降之建武二年益封穰朝陽二縣更始郾王尹尊及諸大將在南方未降者尚多光武遣復與騎都尉隂識驍騎將軍劉植南度五社津擊郾連破之月餘尹尊降盡定其地引東擊更始淮陽太守暴汜汜降屬縣悉定南擊召陵新息平定之新息今蔡州縣明年遷左將軍别擊赤睂於新城澠池間連破之與光武㑹宜陽遂降赤睂冦恂字子翼上谷昌平人初為郡功曹太守耿况甚重之㑹王郎起遣將狥上谷急况發兵恂與門下掾閔業共說况曰邯鄲㧞起難可信向昔王莽時所難獨冇劉伯升耳今聞大司馬劉公伯升母弟尊賢下士士多歸之可攀附也况曰邯鄲方盛力不能獨拒如何恂對曰今上谷完實控弦萬騎舉大郡之資可以詳擇去就恂請東約漁陽齊心合衆邯鄲不足圖也况然之乃遣恂到漁陽結謀彭寵恂還至昌平襲擊邯鄲使者殺之奪其軍遂與况子弇等俱南及光武於廣阿拜恂為偏將軍號承義侯從破羣賊數與鄧禹謀議禹奇之薦恂為河内太守行大將軍事㑹更始將朱鮪使討難將軍蘇茂副將賈彊將兵三萬餘人渡鞏河攻温鞏温皆縣名恂勒軍奔擊大破之追至雒陽遂斬賈彊茂兵自投河死者數千生獲萬餘人光武大喜曰吾知宼子翼可任也諸將軍賀因上尊號於是即位建武二年封雍奴侯邑萬户鄧晨字偉卿南陽新野人初娶光武姊元王莽末穰人蔡少公學圖䜟言劉秀當為天子或曰是國師公劉秀光武戲曰何用知非僕耶坐者皆大笑晨心獨喜及光武與家屬避吏新野舍晨廬甚相親愛及漢兵起更始立以晨為偏將軍與光武畧地至潁川俱夜出昆陽城擊破王尋王邑又别狥陽翟以東至京密皆下之京密二縣名京今鄭州滎陽縣東鄭之京邑也密在滎陽東南更始北都雒陽以晨為常山太守光武追銅馬高胡羣賊於冀州晨發積射士千人積與迹同謂尋迹而射也又遣委輸給軍不絶光武即位封房子侯房子今趙州縣也蓋延字巨卿漁陽要陽人彭寵為太守召延署營尉行䕶軍及王郎起延與吳漢同謀歸光武延至廣阿拜偏將軍號建功侯從平河北光武即位以延為虎牙將軍建武二年更封安平侯陳俊字子昭南陽西鄂人江夏有鄂故加西也其城在今鄂州向城縣南少為郡吏更始立以宗室劉嘉為太常將軍俊為長史光武狥河北嘉遣書薦俊光武以為安集掾從擊銅馬於清陽進至滿陽拜彊弩將軍與五校戰於安次俊下馬手接短兵所向必破追奔二十餘里斬其渠帥而還五校引退入漁陽俊將輕騎馳出賊前視人保壁堅完者勑令固守放散在野者因掠取之賊至無所得遂散敗光武即位封為列侯建武二年春攻匡縣賊下四縣更封新處侯新處縣名屬中山耿弇字伯昭扶風茂陵人王莽末弇父况為朔調連帥及更始立諸將略地者前後多擅威權輒改易守令况自以王莽之所置懐不自安時弇年二十一乃辭况奉奏詣更始因齎貢獻以求自固之宜及至宋子㑹王郎詐稱成帝子子輿起兵邯鄲弇從吏孫倉衞包於道共謀曰劉子輿成帝正統捨此不歸遠行安之弇按劔曰子輿弊賊卒為降虜耳我至長安與國家陳漁陽上谷兵馬之用還出太原代郡反覆數十日歸發突騎以轔烏合之衆轔轢也如摧枯折腐耳觀公等不識去就族滅不久也倉包不從遂亡降王郎弇道聞光武在盧奴乃馳北上謁光武留署門下吏弇因說䕶軍朱祐求歸發兵以定邯鄲光武笑曰小兒曹乃有大意哉因數召見加恩慰弇因從光武北至薊聞邯鄲王郎兵方到光武將欲南歸召官屬計議弇曰今兵從南來不可南行漁陽太守彭寵公之邑人上谷太守即弇父也發此兩郡控弦萬騎邯鄲不足慮也光武官屬腹心皆不肯曰死尚南首柰何北行入囊中光武指弇曰是我北道主人也㑹薊中亂光武遂南馳官屬各分散弇走昌平就况因說况使冦恂東約彭寵各發突騎二千匹歩兵千人弇與景丹冦恂及漁陽兵合軍而南所過擊斬王郎大將九卿校尉以下四百餘級得印綬百二十五節二斬首三萬餘級定涿郡中山鉅鹿清河河間凡二十二縣遂及光武於廣阿是時光武方攻王郎傳言二郡兵為邯鄲來衆皆恐既而悉詣營上謁光武見弇等說曰當與漁陽上谷士大夫共此大功乃皆以為偏將軍使還領其兵加况大將軍興義侯得自置偏禆弇等遂從㧞邯鄲時五校賊二十餘萬北㓂上谷况與舒連擊破之賊皆退走更始見光武威聲日盛君臣疑慮乃遣使立光武為蕭王令罷兵與諸將有功者還長安遣苗曽為幽州牧韋順為上谷太守蔡充為漁陽太守竝北之部時光武居邯鄲宫晝卧温明殿弇入造牀下請間因說曰今更始失政君臣淫亂諸將擅命於畿内貴戚縱横於都内天子之命不出城門所在牧守輒自遷易百姓不知所從士人莫敢自安虜掠財物劫掠婦女懷金玊者至不生歸元元叩心更思莽朝又銅馬赤睂之屬數十軰軰數十百萬聖公不能辦也其敗不久公首事南陽破百萬之軍今定河北北據天府之地以義征伐發號響應天下可𫝊檄而定天下至重不可令它姓得之聞使者從西方來欲罷兵不可從也今吏士死亡者多弇願歸幽州益發精兵以集其大計光武大說乃拜弇為大將軍與吳漢北發幽州十郡兵弇到上谷收韋順蔡充斬之漢亦誅苖曽於是悉發幽州兵引而南從光武擊破銅馬高湖赤睂青犢又追尤來大槍五幡於元氏弇常將精騎為軍鋒輒破走之光武乗勝戰愼水上追至容城小廣陽安次連戰破之光武還薊復遣弇與吳漢景丹蓋延朱祐邳彤耿純劉植岑彭祭遵堅鐔王霸陳俊馬武十三將軍追賊至潞東及平谷再戰斬首萬三千餘級遂窮追於右北平無終土垠之間至浚靡而還無終上垠浚靡竝縣名屬右北平賊散入遼西遼東或為烏桓貊人所鈔擊畧盡光武即位拜弇為建威大將軍建武二年更封好畤侯册府元龜卷三百四十一
