body:
  text: 册府元龜卷四十七宋王欽若等撰帝王部友愛慈愛友愛夫孝悌本於仁愛恭順之謂因心而友親族以睦皆王者之徳也肇自有庳垂為休範爾後或異其禮遇篤之情好優賜予之數惻暌違之念形惟疾之憂軫孔懐之痛矜其過失撫其孤藐莫不發於深𠂻表於至性成和協之美致懐寜之福風行化馳民徳歸厚者矣舜父母使舜浚井出從而掩之舜浚井入而即出瞽瞍不知已出從而蓋其井以為死矣象曰謨蓋都君咸我績象舜弟也謨謀也都於也君舜也象言謀於君而殺者皆我也欲與父母分其有故引其功牛羊父母倉廪父母干戈朕琴朕弤朕丁禮切堯賜舜弤弓二嫂治朕棲二嫂娥皇女英也棲牀也象徃入舜宮舜在牀琴象曰欝陶思君爾忸怩象見舜在牀鼔琴愕然反辭曰我欝陶思君故來爾忸怩慙也舜曰惟兹臣庶女其于予治兹此也象素憎舜不至其宮也故舜見來而喜曰惟念此臣庶汝助我治象至不仁封之有庳封之有庳冨貴之也周成王燕兄弟作常棣之詩曰常棣之華鄂不韡韡承華者曰鄂不鄂足鄂足得華之光明則韡韡然盛喻弟以敬事兄兄以榮覆弟恩義之顯亦韡韡然漢惠帝二年齊王肥入朝齊王帝庶兄高祖長子與齊王飲太后前置齊王上坐如家人禮以兄弟齒列不從君臣之禮故曰家人也坐音材卧切太后怒乃令人酌兩巵鴆酒置前鴆鳥赤身黑目食蝮蝎野葛以其羽畫酒中飲之立死令齊王為壽齊王起帝亦起欲俱為壽太后恐自起反反音翻巵齊王怪之因不敢飲陽醉去景帝三年梁王武入朝梁王帝母弟時帝未置太子與孝王宴飲從容言曰千秋萬歲後傳於王王辭謝雖知非至言然心内喜太后亦然明年漢立太子遂止七年十月梁王入朝帝使使持節乗輿駟迎梁王於闕下天子副車駕四馬既朝上䟽因留以太后故入則侍帝同輦出則同車遊獵上林中梁之侍中郎謁者着引籍出入天子殿門著音竹畧切與漢宫官亡異武帝姊修成君帝母王皇后微時所為金王孫生女俗在民間盖諱之也言隨流俗而在閭巷未顯貴韓嫣白之嫣音􅟠帝曰何為不蚤言乃車駕自徃迎之其家在長陵小市直至其門使左右入求之家人驚恐女逃匿扶将出拜帝下車立曰大姊何藏之深也載至長樂宫與俱謁太后太后垂涕女亦悲泣帝奉酒前為壽錢千萬奴婢三百人公田百頃甲第以賜姊太后謝曰為帝費因賜湯沐邑號脩成君男女各一人女嫁諸侯男號脩成子仲成帝河平初定陶王康來定陶王帝庶弟太后與帝承先帝意遇王甚厚賞賜十倍於它王不以徃事為纎芥徃事謂元帝時欲以代太子也言無纎芥之嫌王之來朝也天子留不遣歸國帝謂王曰我未有子人命不諱謂人命無常不可諱也一朝有它且不復相見爾長留待我矣後王薨綏和中徴王子欣為皇太子欣哀帝也後漢光武兄伯升為更始所害光武不敢顯其悲戚每獨居輒不御酒肉枕席有涕泣處馮異獨叩頭寛譬哀情光武止之曰卿勿妄言明帝永平五年琅琊王京就國京帝母弟七年帝悉以光烈皇后遺金寳財物賜京十一年東平王蒼與諸王朝京師月餘還國帝臨送歸宮悽然懐思乃遣使手詔國中傅曰辭别之後獨坐不樂因就車歸伏軾而吟瞻望永懐實勞我心誦及采菽以増歎息十五年帝案地圖将封皇子悉半諸國馬后見而言曰諸子食數縣於制不已儉乎帝曰我子豈宜與先帝子等乎歳給二千萬足矣先是帝庶弟楚王英以大逆自殺後是歲帝幸彭城見許太后及英妻子於内殿悲泣感動左右章帝建初三年有司奏遣陳王羡與鉅鹿王恭樂成王黨俱就國三王皆帝弟帝性篤愛不忍與諸王乖離遂皆留京師明年按輿地圖令諸國户口皆等租入歳各八千萬一云樂成王黨明帝之子與帝同年尤相友愛和帝即位遵章帝故事兄弟皆留京師恩寵篤密有司請遣諸王歸藩不忍許至安帝初乃就國永元十五年有司以日食陰盛奏遣諸王侯就國詔曰甲子之異責繇一人諸王幼稚早離顧復弱􅃣相育嘗有蓼莪凱風之哀選孺之恩知非國典且復須留至冬從祠章陵詔假諸王羽林騎各四十人魏文帝庶弟趙王幹一名良本陳妾子既生三歲而陳死太祖令王夫人養之良年五歲而太祖疾困遺令語太子言此兒三歲亡母五歲失父以累汝也帝繇是親待隆於諸弟良年小嘗呼帝為阿翁帝謂良曰我汝兄帝又愍其如是每為涕泣明帝時燕王宇字彭祖武帝子帝少與宇同止嘗愛異之及即位寵賜與諸王殊晉武帝弟樂平王延祚字大思少有篤疾不任封爵太康初詔曰弟祚早孤無識情所哀愍㓜得篤疾日冀其差今遂廢痼無復後望意甚傷之其封為樂平王使有名號以慰吾心後魏文成弟長樂王處文聰辨夙成年十四薨帝悼傷之自小歛至葬常親臨哀慟陪葬金陵孝文篤於兄弟以咸陽王禧次長禮遇優隆然亦知其性貪每加切戒後以禧長兼太尉公因幸其第謂司空穆亮僕射李冲曰既有天地又有君臣太尉位居台鉉在冢宰之上三槐九棘不可久空元弟禧雖在事不長而戚連皇極且長兼太尉以和飪鼎朕常恐君有空授之名臣貽彼己之刺今幸其宅徒屈二賓良以為愧又幸廣陵王羽第與諸弟言曰朕昨親受人訟始知廣陵之明了咸陽王禧對曰臣年為廣陵兄明為廣陵弟帝曰我為汝兄汝為羽昆汝復何恨又曰叔翻羽字沉疴綿綴遂有危歳我每為深憂恐其不振今得痊愈晚成婚媾且喜其吉慶故命駕耳宣武留愛諸弟京兆王愉等常出入宫掖晨昏寢處若家人焉帝每日華林戲射衣衫騎從往來無闕唐太宗貞觀十年三月諸王歸藩帝流涕而謂之曰友于之情凡人所重朕於兄弟情豈不欲同逰處展親愛耶但以天下事重方成分别不能不悲耳兒子尚或可求兄弟更不可得也遂嗚咽不能止酆王元亨帝之弟也初拜散騎常侍出藩帝以其幼小甚思念之中路賜以金盞遣使者為之設宴以慰其羇思之心高宗永徽二年襄成長公主薨於常州公主太宗長女適州刺史蕭説将陪葬昭陵塗次故城之西帝登城見柩車而哭仍令黄門侍郎宇文節塗中弔諸子焉咸亨二年城陽公主薨于房州公主帝同出適房州刺史薛瓘於顯福門舉哀哭之甚慟五日不視事仍遣中使及宮人徃房州視其喪事給靈輦還京𤣥宗兄弟聖厯初出閣列第於東都積善坊五人分院同居號五王子宅大定元年從幸西京賜宅於降慶坊亦號五王子宅先天初𤣥宗為大被長枕宋王成器等昆季每與同􅃦太平公主奏之太上皇誥曰昆季恩深歡娱共被汝為留愛天倫其睦斯乃萬方有慶九族延休言念仁慈固多忻慰開元初以興慶是龍濳舊邸因以為宫寧王憲於勝業坊東南角賜宅申王撝岐王範於安興坊東南角賜宅薛王業於勝業坊西北角賜宅邸第相望於宮側帝於興慶宮西南置樓西面題曰花蕚相輝之樓南面題曰勤政務本之樓帝時登樓聞諸王音樂之聲咸召昇樓同榻宴謔或便幸其第賜金分帛厚其歡賞諸王每日於側門朝見歸宅之後即奏樂縱飲擊毬鬭鷄或近郊從禽或别野追賞不絶於歳月遊踐之所中使相望以為天下友悌近世無比帝既篤於昆季雖有讒邪交搆其間然友愛如初憲尤謹愼未曾干議時政及與人交結帝尤以此信重之嘗與憲及岐王範書曰昔魏文帝詩云西山一何高高處殊無極上有兩仙童不飲亦不食賜我一藥丸光輝有五色服藥四五日身體生羽翼朕每思服藥而生羽翼何如骨肉兄弟天生之羽翼乎陳思有超代之才堪佐經國之務絶其朝謁卒令憂死魏祚未終遭司馬宣王之奪豈神丸之效也虞舜至聖捨象傲之愆以親九族九族既睦平章百姓此為帝王之軌則于今數千歳天下歸善焉朕未嘗不廢寢忘食欽之者也頃因餘暇妙選仙經得此神方古老云服之必驗今分此藥願與兄弟等同保長齡永無限極開元八年岐王範接待文士劉廷琦張諤等㑹駙馬都尉裴虛已坐與範逰讌兼私挾䜟諱之書配徙嶺外廷琦諤皆坐累貶官然帝未嘗問範恩情如初謂左右曰我兄弟友愛天生必無異意衹是趨競之軰強相託附耳我終不以纎芥之故責及兄弟也是年薛王業疾帝親為祈禱及愈車駕幸其第置酒讌樂更為初生之歡帝賦詩曰昔見漳濵卧言将人事違今逢誕慶日猶謂學仙歸常棣花重滿鴒原鳥再飛其恩意如此十三年帝嘗不豫薛王業妃弟内直郎韋賓與殿中監皇甫恂私議休咎事發帝令杖殺韋賔左遷皇甫恂為錦州刺史妃惶懼降服待罪業亦不敢入謁帝遽令召之業至階下逡巡請罪帝降階就執其手曰吾若有心猜兄弟者天地神明所共咎罰遂歡讌久之仍慰諭妃令復其位十四年岐王範薨帝哭之甚慟輟朝三日為之追福手寫老子經徹膳累旬百僚上表勸諭然後復常二十四年正月辛丑幸故薛王宅以三年之制将終追悼二十八年寧王憲疾帝令中使送醫藥及珍膳相望於路僧崇一療稍瘳帝大悦特賜崇一緋袍魚袋以賞異之時申王等皆先薨唯憲獨在帝尤加恩貸每年至憲生日必幸其宅移時宴樂居常無日不賜憲酒及異饌等尚食總監及四方有所進獻皆分賜之憲嘗奏請年終録付史官每年數百紙二十九年寧王憲薨帝聞之號泣哀不自勝左右皆掩涕追諡曰讓皇帝憲長子汝南郡王璡上表懇辭盛陳先意謙退不敢當帝號手制不許内出御衣一副遣中官高力士齎手書寘于靈坐之前其書曰諱白一代兄弟一朝存没家人之禮是用申情興言感恩悲涕交集大哥孝友近古莫儔當號五王同開邸第逺自童幼洎乎成人長則同遊樂則同業事均形影無不相隨頃以國歩艱危義資克定先帝御極日月照臨大哥嫡長合當儲貳以功見讓爰在薄躬既嗣守紫宸萬㡬事總聽政之暇得展於懐十數年間棣華彫落謂之手足惟有大哥今復淪亡𦕈然無對以兹感慕何恨如之然以厥初生人孰不殂謝所貴光昭徳行以示崇高立徳立名斯為不朽大哥事跡身没讓存故册曰讓皇帝神之昭格當兹寵榮况庭訓傳家璡等申讓善述先志實有遺風成其美也恭惟緒言怳焉如在寄之翰墨悲不自勝肅宗庶弟永王璘數歳失母母曰郭順儀帝鞠養頗憐之至徳一年於江寧擅舉兵戰敗奔南陽至大庾嶺為洪州皇甫侁所執使人潛害璘妻女等使人送至蜀郡帝聞之傷悼久之而廹以大義竟不能加侁罪帝亦愛弟之故隱而不言潛謂人曰皇甫侁生得吾弟何不送歸蜀郡而擅殺之自此不復見用也晉高祖弟曹州防禦使暉卒中書奏天子為五服之内親本服周者三朝哭而止帝俯而從之輟視朝三日慈愛為人父者慈而已矣既慈而愛既愛而親非獨情之所鍾抑亦教之所繇生也是以左傳之述謂之六順戴記所紀冠乎六義若乃引而進之以至於猶子順而下之以及於諸孫皆天屬之至親人情之所篤而况履尊極之位居億兆之首自家以刑國繇上而化下夫如是則天性之愛人倫之義足以敦於禮儀者矣漢文帝少子梁懐王揖好詩書帝愛之異於他子宣帝子淮南憲王欽壯大好經書法律聰達有才帝甚愛之數嗟歎憲王曰真我子也時元帝為太子生成帝於甲觀􅀞堂為世嫡皇孫帝愛之字曰太孫常置左右元帝選許嘉女以配太子初入太子家帝令中常侍黄門親近者侍送還白太子懽説狀説讀曰恱帝喜謂左右酌酒賀我左右皆稱萬歲後漢光武建武十一年徙太原王章為齊王章帝兄伯升之子少孤帝感伯升功業不就撫育恩愛甚篤以其少貴欲令親吏事故使試守平隂令試守者稱職滿歳為真平隂縣屬河南郡又云在平津南故曰平隂文帝改為河隂故城在今雒陽東北濟州平隂縣東北五里亦有平隂縣故城後遷梁郡太守魏太祖子鄧哀王冲字蒼舒少聰察岐嶷太祖數對羣臣稱述有欲傳後意年十三疾病嘗親為請命及亡哀甚文帝寛喻帝帝曰此我之不幸而汝曹之幸也言則流涕為聘甄氏亡女與合塟之又帝孫叡即明帝也生數歳而有岐嶷之姿帝異之曰我基於爾三世矣每朝㑹同於侍中近臣竝列帷幄晉武帝時秦獻王東沉敏有識量帝嘗幸宣武塲以二十六軍兵簿令東科校之東一省便擿脫謬帝異之於諸子中尤見寵愛元帝子琅邪悼王煥帝特所鍾愛初封顯義侯及煥疾篤為之徹膳乃下詔封為琅邪王俄而薨帝悼念無已将塟以渙既封列國加以成人之禮後魏明帝子樂平王丕少有才幹為世所稱帝以丕長愛其氣度特優異之太武太平真君元年六月景穆即太子也生文成於東宮文成少聰逹帝愛之常置左右號世嫡皇孫又高允與崔浩述成國記後以經授太子及浩誅太子救允於帝以直免死太子之薨也允久不進見後帝召允昇階歔欷悲不能止太武流淚命允使出左右莫知相謂曰髙允無言悲泣令至尊哀傷何帝聞之召而謂曰汝不知高允悲乎左右曰臣等見允無言而泣陛下為之悲傷是以竊言耳帝曰崔浩誅時允亦應死東宫苦諫是以得免今無東宫允見朕因悲耳宣武帝即位後頻喪皇子胡充華之生孝明帝自以長嗣深加慎䕶為擇乳保皆取良家宜子者養於别宮皇后及充華皆莫得而撫視焉隋高祖第二子即煬帝初為晉王美姿儀少敏慧高祖及后於諸子中特所鍾愛秦王俊高祖第三子開皇中薨於秦邸帝哭之曰晉王前送一鹿我令作脯擬賜秦王今亡可置靈坐之前心已許之不可虧信唐太宗貞觀中高宗為晉王以文徳皇后最小子后終後累年帝憐之不令出閤至是立為太子十七年十一月甲辰誕皇孫太子宴宫寮于𢎞教殿帝幸東宫自殿北門而入太子自投階下舞蹈稱萬歲帝謂功臣曰頃來生業稍可非乏酒食而唐突公等宴㑹者朕初有此孫故就公為樂耳咸稱萬歲酒酣帝起舞羣臣竝舞樂極而罷賜物各有差魏王泰太宗第四子也太宗以泰愛文學特令别置文館學士嘗幸泰延康坊宅曲赦雍州及長安獄大辟罪以下竝原之免延康里百姓無出今年租賦曲賜泰府官僚及同里老人各有差時承乾為太子泰每月所給料物又踰於太子後以承乾足疾遂有奪嫡計承乾廢泰仍降封東莱王又封順陽王居均州貞觀十八年二月帝手持泰表以謂近臣曰泰文詞美麗豈非才士我心中念泰卿等所知但為社稷之計斷割恩寵遣其居外者亦是兩相安全𤣥宗開元五年夏悼王一薨一生而美秀帝鍾愛無比名之為一孩孺而薨帝追封諡時車駕在東都塟於城南龍門東帝欲宫中舉目見之代宗華陽公主帝愛女也母曰貴妃獨孤氏公主幼聰慧過人善候帝㫖動容發言必隨喜慍帝之所貴則因而美之帝之所惡則因而全之由是帝特所鍾愛大厯元年三月庚寅許華陽公主出於禁外歴過東市及資聖寺遣高品宫人及高品内侍六軍将等以從城内觀者如堵以公主有疾縱令逰觀特寵之也及薨哀悼過深宰臣等以修短常理因中官吳承倩付奏以諷導帝為之節哀初有疾帝命宗師道訓名曰瓊華真人及疾亟帝親自臨視屬纊之際嚙傷帝手指其愛念如此至五月辛丒帝以公主之哀未聽朝宰臣等抗疏言曰伏以華陽公主輟朝又當夏至節假臣等趨事向隔旬時惶駭失圖瞻跼若歲仰惟公主夙成神悟仁眷特鍾嘗禱必親已承減膳幽明遽間倍殄慈衷臣等微誠無由感逹伏惟陛下守累聖之公噐御羣生之重畜夷百戰之艱患撫四海之傷殘虜候為虞戎師近警一言萬務裁成聖心得失謬於毫釐安危存於晷刻伏慮顧懐猶切神志未和衆情之所以不寧臣子之所冝兢悸伏願抑周喪之私痛均品物於至公下慰黔黎上安宗社天下幸甚帝始親朝政徳宗唐安公主帝長女也母昭徳皇后公主性聰敏孝敬帝所鍾愛初詔韋宥尚焉未克禮㑹而遇行幸興元元年幸梁州車駕至城固公主薨帝痛甚令有司厚其葬禮邕王諒皇太子之子徳宗愛念命之為子次為第七授開府儀同三司遥領節度使竟未出閤貞元十五年九月薨憲宗元和二年十二月普寧公主出降于頔之子季友公主帝長女也特所鍾愛其禮甚盛文宗太和二年六月己卯以晉王薨廢朝三日王名普敬宗長子也郭妃生時年五歳帝撫念所至踰於皇子後唐明宗長子即末帝也初與樞宻使安重誨在常山因杯盤失歡末帝以拳擊重誨腦中其櫛走而獲免末帝旦謝重誨重誨終䘖之及末帝鎮蒲中知其出入不時重誨因矯宣中㫖令屯将楊彦温遇出郭則閉門勿納後末帝遊舜廟迴為彦温所拒末帝知重誨搆之馳還雒陽以求自雪重誨繼奏請行重典帝曰朕為小将校時家徒衣食不足賴此兒荷石炭收馬糞存養以至身逹今貴為天子而不能庇一兒卿欲行朝典朕未曉其意卿可速退朕自令居閒便了遂詔歸私邸末帝尚懼重誨多方危陷但日諷佛經隂禱而已明年重誨出鎮河中帝召見泣而謂之曰如重誨意爾安得更相見耶乃以末帝為左衛大将軍册府元龜卷四十七
