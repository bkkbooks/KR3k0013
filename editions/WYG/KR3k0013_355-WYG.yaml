body:
  text: 册府元龜卷三百五十五宋王欽若等撰將帥部立功第八後周蘇椿魏孝明正光中應募討闗右賊授盪冦將軍累功遷奉朝請厲威將軍後領鄉兵破槃頭氐有功除散騎常侍加大都督常安成魏正光末茹茹冦邉以統軍從鎮將慕容勝與戰大破之時破六汗枝陵作亂欲逼安成不從乃率所部討陵以功授伏波將軍給鼓節梁臺魏孝昌中從爾朱天光平闗隴一嵗之中大小二十餘戰以功授都督竇熾魏孝莊永安初從爾朱榮於并州時葛榮别帥韓婁郝長衆數萬人據薊城不下以熾為都督從驃騎將軍侯深討之熾手斬婁以功拜揚烈將軍三年除散騎侍即西魏孝武即位率兵隨東南道行臺樊子鵠追爾朱仲逺仲逺奔梁時又遣元樹入冦攻陷譙城遂據之子鵠令熾率騎兵擊破之封行唐縣子後遷撫軍將軍朱衣直閣遂從帝西遷仍與其兄善重至城下與武衞將軍高金龍戰於千秋門敗之因入宮城取御馬四十匹并鞍勒進之行在所帝大悦賜熾及善駿馬各二匹駑馬各十匹大統三年遷車騎將軍高仲密以北豫州來附熾率兵從太祖援之至雒陽㑹東魏人據邙山為陣太祖命留輜重於瀍曲率輕騎奮擊中軍與右軍大破之悉虜其歩卒熾獨追至石濟而還十三年進驃騎大將軍恭帝元年進爵廣武郡公屬茹茹冦廣武熾率兵與柱國趙貴分路討之茹茹聞軍至引退熾渡河至麴伏川追及與戰大破之斬其酋帥郁乆閭是發獲生口數千及雜畜數萬頭元定為征虜將軍魏永安初從爾朱天光討闗隴羣賊並破之除襄虜將軍及賀拔岳被害定從太祖討侯莫陳悦以功拜平逺將軍又從擊潼闗拔回洛城又從擒竇泰復𢎞農破沙苑戰河橋定皆先鋒當其前者無不披靡以前後功累遷都督征東將軍邙山之役敵人如堵定奮矟衝之殺傷甚衆太祖親觀之論功為最王勇魏永安中万俟醜奴等冦亂闗隴勇召募隨軍討之以功授寧朔將軍奉車都尉又數從侯莫陳悦賀拔岳征討功每居多拜别將後遷侍中驃騎大將軍開府儀同三司西魏恭帝元年從柱國趙貴征茹茹破之勇追擊獲雜畜數千頭進爵新陽郡公增邑通前二千戸仍賜姓厙汗氏泉企為左將軍浙州刺史魏永安中梁將王𤣥真入冦荆州加企持節都督率衆援之遇𤣥真於順陽與戰大破之除撫軍將軍假節鎮南將軍東雍州刺史賀拔岳魏孝莊時為都督副爾朱天光討万俟醜奴于闗中天光以軍事並委於岳遂大破赤水蜀賊軍威大振時醜奴自率大衆圍岐州遣行臺尉遲菩薩等自武功南渡渭天光遣岳率騎赴之岳身先士卒擊之退走岳號令所部賊下馬者皆不聽殺賊顧見之便悉投馬俄而虜獲三千餘人人馬無遺遂擒菩薩降卒萬餘收其輜重醜奴尋棄岐州走安定平亭天光自雍至岐與岳合勢軍於汧渭之間宣言逺近曰今氣候漸熱非征討之時待至秋涼更圖進取醜奴聞之遂以為實分遣諸軍散營農於岐州之北百里納川岳天光諸軍盡發掩之醜奴乃棄平亭而走岳輕騎急追明日及醜奴於平涼之長坑一戰擒之高平城中又執蕭寳夤以降天光又與岳度隴餘衆皆降悉坑之死者萬七千人三秦河渭𤓰涼鄯州咸來歸欵天光雖為元帥而岳功多進封清水郡公侍中給後部鼓吹侯莫陳崇初為魏建威將軍隨賀拔岳入闗破万俟醜奴崇與輕騎逐北至涇州長坑及之賊未成列崇單騎入賊中於馬上生擒醜奴於是大呼衆悉披靡莫敢當之後騎集遂大破之岳以醜奴所乘馬及寳劒金帶賞之後從太祖擒竇泰復𢎞農破沙苑戰河橋又别討平稽胡累戰皆有功進位柱國大將軍若干惠以中堅將軍從賀拔岳西征定隴右毎力戰有功累遷征西將軍王盟為賀拔岳前鋒擒万俟醜奴平秦隴嘗先登力戰拜征西將軍平秦郡守及太祖東征以留後大都督行雍州刺史事節度闗中諸軍趙青雀之亂盟輔魏太子出頓渭北事平進爵長樂郡公增邑并前二千戸冦雒從賀拔岳西征擒万俟醜奴於長坑雒每力戰有功累遷右都督韓杲為賀拔岳帳内擊万俟醜奴及其枝黨轉戰數十合並破之後為征虜將軍從太祖復𢎞農攻拔河南城獲郡守一人論功為最破沙苑戰河橋並有功授撫軍將軍劉亮以都督從賀拔岳西征及岳為侯莫陳悦所害亮與諸軍謀迎太祖仍從平悦後悦黨豳州刺史孫定兒據州不下涇秦諸州悉與相應衆至數萬推定兒為主以拒義師帝令亮襲之定兒以義兵猶逺未為之備亮乃將二十騎先豎一纛於近城高嶺即馳入城中定兒方置酒高㑹卒見亮衆皆駭愕莫知所為亮乃麾兵斬定兒懸首號令賊黨仍遥指城外纛命二騎曰出追大軍賊黨大懼一時降附於是諸州皆歸欵伏文帝置十二軍簡諸將將之亮領一軍每征討與怡峯俱為騎將從擒竇泰復𢎞農與沙苑之役並力戰有功遷車騎大將軍開府長廣郡公怡峯以都督從賀拔岳討平隴右破竇泰復𢎞農破沙苑又與諸軍征討每皆尅捷累遷車騎大將軍開府夏州刺史李賢為殿中將軍賀拔岳為侯莫陳悦所害太祖西征賢與其弟逺穆等宻應侯莫陳崇以功授都督仍守原州及太祖至秦州悦棄城走太祖令兄子導勒兵追之以賢為前驅轉戰四百餘里至牽屯山及之悦自剄於陣賢亦被重瘡馬中流矢太祖嘉之賞奴婢布帛及雜畜等授持節撫軍大將軍都督賀拔勝魏孝武時為驃騎大將軍開府荆州刺史勝攻拔梁下溠戍使人誘勸諸蠻皆率其種落歸欵漢南大駭攻馮翊安定馮陽並下之進位尚書令李延孫為直閣將軍賀拔勝為荆州刺史表延孫為都督肅清鵶路頗有力焉㑹東魏遣行臺慕容紹宗等數道來攻延孫奬勵所部出戰遂破之臨陣斬其揚州刺史薛喜族於是義軍更振乃授延孫京南行臺節度河南諸軍事廣州刺史獨孤信為魏武衞將軍從孝武入闗時荆州雖陷東魏人心猶戀本朝乃以信兼尚書僕射東南道行臺荆州刺史以招懐之信遂大破東魏將田八能辛纂三荆遂定就拜車騎大將軍王雄為驃騎大將軍率軍從子午谷圍梁上津魏興明年克之宇文虬為征虜將軍從獨孤信在荆州破梁人於下溠遂平歐陽鄼城虬俘獲甚多又攻南陽廣平二城擒郡守一人以功加安西將軍孝武西遷虬為帳内都督破田八能擒東魏荆州刺史辛纂虬功居多大統三年論前後功進爵為公擒竇泰復𢎞農及沙苑河橋之戰皆有功進車騎將軍從獨孤信討梁企定破之進驃騎大將軍與王雄征上津魏興等並破之又於白馬與武陵王蕭紀將楊乾運戰破之尋而魏興復叛虬又與王雄討平之進位大將軍段永為平東將軍孝武西遷永時不及從大統初乃結宗人潜謀歸欵宻與都督趙業等襲斬西中郎將慕容顯和傳首京師以功别封昌平縣子徐州刺史從擒竇泰復𢎞農破沙苑並有戰功進爵為公河橋之役永力戰先登授南汾州刺史累遷驃騎大將軍賀蘭祥為都督常居太祖帳下從平侯莫陳悦又迎西魏孝武以前後功封撫夷縣伯邑五百戸仍從擊潼闗獲東魏將薛長孺又攻回洛城拔之還拜左右直長進爵為公孝閔踐祚遷大司馬明帝武成初吐谷渾侵涼州詔祥與宇文貴討之遂與廣定王鍾留王等戰破之因拔其洮陽洪和二城以其地為洮州撫安西土振旅而還王子直為太祖行臺郎中漢熾屠各阻兵於南山與隴東屠各共為唇齒太祖令子直率涇州歩騎五千討破之南山平除尚書左丞兵部郎中楊􅎎為車騎將軍拔東魏邵郡遷為太祖大行臺左丞齊神武敗於沙苑其將韓軌潘雒可朱渾元等為殿􅎎分兵要截殺傷甚衆東雍州刺史司馬恭懼􅎎威聲棄城遁走􅎎遂移據東雍州文帝以􅎎有謀畧堪委邉任乃表行建州事時建州逺在敵境三百餘里然􅎎威恩夙著所經之處並贏糧附之北至建州衆已數萬東魏刺史車折于洛出兵逆戰􅎎一鼓敗之又破其行臺斛律俱歩騎二萬於州西大獲甲仗及軍資以給義士繇是威名大振時東魏以正平為東雍州遣薛榮祖鎮之􅎎將謀取之乃先遣竒兵急攻汾橋榮祖果盡出城中戰士於汾橋拒守其夜􅎎率騎兵二千從他道濟遂襲克之進驃騎將軍既而邵郡民以郡東叛郡守郭武安脱身走免􅎎又率兵攻而復之轉正平郡守又擊破東魏南絳郡虜其郡守屈僧珍錄前後功别封郃陽縣伯邑五百戸邙山之戰􅎎攻拔栢谷塢因即鎮之及大軍不利􅎎亦拔還而東魏將侯景率騎追􅎎􅎎與儀同韋法保同心抗禦且戰且前經十數里景乃引退太祖嘉之賜帛三百疋復授建州刺史趙剛為營州刺史時滑州人鄭五醜搆逆與叛羌傍乞鐵忽相應令剛徃鎮之㑹鄭五醜已尅定夷鎮所在立栅剛至並攻破之散其黨與五醜於是西奔鐵忽剛又進破鐵忽郭賢為車騎大將軍鎮魯陽及潁川被圍東魏遣蠻酋魯和扇動羣蠻規斷鵶路和乃遣其從弟興和為廣漢郡守率其部曲侵擾州境賢密簡士馬輕徃掩襲大破之遂擒魯和陳忻為顯州刺史仍留静邉時東魏將侯景築九曲城忻率衆邀之擒其宜陽郡守趙嵩金門郡守樂敬賓後從李逺平九曲城授帥都督東魏將軍爾朱渾願率精騎三千來向宜陽忻與諸將輕兵邀之願遂退走累加車騎大將軍儀同三司散騎常侍與齊將東方老戰於石泉破之俘獲甚衆時東魏每嵗遣兵送米饋宜陽忻輒與諸軍邀擊之每多克獲王思政為驃騎將軍荆州刺史東魏將侯景叛擁兵梁鄭為東魏所攻景乃請援乞師當時未即應接思政以為若不因機進取後悔無及即率荆州步騎萬餘從魯關陽翟入守潁川景引兵豫州外稱畧地乃宻遣送欵於梁思政分布諸軍據景七州十二鎮太祖乃以所授景使持節太傅大將軍兼中書令河南大行臺河南諸軍事廻授思政泉仲遵為征東將軍東魏北豫州刺史高仲宻舉城入附太祖率軍應之别遣仲遵隨于謹攻柏谷塢仲遵及戰先登擒其將王顯明柏谷既拔復㑹戰於邙山後為車騎大將軍梁荆州刺史柳仲禮每為邉冦太祖令仲遵率鄉兵從開府楊忠討之梁隨郡守桓和拒守不降仲遵率先登城遂擒和仍從忠擊仲禮又獲之進驃騎大將軍陽雄為積射將軍從于謹攻盤豆栅復從李逺經沙苑陣並力戰有功加冠軍將軍後入洛陽戰河橋解玉壁圍迎高仲宻援侯景並預有功陳將侯方兒播純陁冦江陵雄從豆盧寧擊走之田𢎞為帥都督太祖復𢎞農戰沙苑解雒陽圍破河橋陣𢎞功居多累加驃騎大將軍平蜀之後梁信州刺史蕭韶等各據所部未從朝化詔𢎞討平之又討西平叛羌及鳳州叛氐等並破之信州羣蠻反又詔𢎞與賀若敦等平之保定三年從隨公楊忠伐齊拜大將軍明年又從忠東伐師還旋鎮吐谷渾冦西邉宕昌羌潜相應接詔𢎞討之獲其二十五王拔其七十六栅遂破平之天和中為仁夀城主以逼宜陽齊將段孝先斛律明月出軍定隴以為宜陽援𢎞與陳公純破之遂拔宜陽等九城以功增邑五百戸進爵柱國大將軍常善為平東將軍從太祖擒竇泰復𢎞農破沙苑累有戰功除使持節衞將軍豆盧寧以都督從太祖擒竇泰復𢎞農破沙苑除衞大將軍兼大都督權景宣為行臺祠部郎中從太祖拔𢎞農破沙苑皆先登陷陣後留景宣等守張白塢節度東南義軍東魏將王元凱入洛景宣與延孫等擊走之以功授大行臺右丞進屯宜陽攻襄城拔之獲郡守王洪顯俘斬五百餘人太祖嘉之徵入朝錄前後功封顯親縣男邑三百戸後為車騎大將軍鎮荆州委以鵶南之事初梁岳陽王蕭詧將以襄陽歸朝仍勒兵攻梁元帝於江陵詧叛將杜岸乘虚襲之景宣乃率騎三千助詧破岸詧因是乃送其妻王氏及子嶚入質景宣又與開府楊忠取梁將栁仲禮拔安陸随郡進攻應城拔之獲夏侯珍洽於是應禮安隨並平朝議以景宣威行南服乃授并安肆郢新應六州諸軍事并州刺史孝閔徵為江陵防主加大將軍保定四年晉公䕶東討景宣别討河南齊豫州刺史王士良永州刺史蕭世怡並以城降景宣以開府謝徹守永州開府郭彦守豫州以士良世怡及降卒一千人歸詣京尋而雒陽不守乃棄二州拔其將士而還至昌州而羅陽蠻反景宣回軍破之斬首千級獲生口二千雜畜千頭送闕王軌為大將軍太祖總戎東伐六軍圍晉州刺史崔景嵩守城北面夜中宻遣送欵詔令軌率衆應之未明士登城鼓譟齊人駭懼因即退走遂克晉州擒其城主特進海昌王尉相貴俘甲士八千人於是遂從平并鄴以功進位上大將軍趙昶為大都督行南泰州事氐帥葢閙等反昶討擒之又與史寧破宕昌羌獠二十餘萬拜武州刺史裴杲為平東將軍從開府楊忠平隨安陸以功加大都督又從大將軍尉遲迥伐蜀杲率所部為前軍開劒閣破李慶堡降楊乾運皆有功梁椿為驃騎大將軍從李弼赴潁川援侯景别攻閻韓鎮斬其鎮城徐衞城主卜貴雒率軍士千人降叱羅協為尉遲迥行軍長史伐蜀既入劒閣迥令行潼州事時有五城郡氐酋趙雄傑等扇動新潼始三州民反叛聚結二萬餘人在州南三里隔涪水據槐林山置栅拒守梓潼郡民鄧朏王令公等招誘鄉邑萬餘人復在州東十里涪水北置栅以應之同逼州城城中粮少軍人乏食協撫安内外咸無異心遣儀同伊婁訓大都督司馬裔等將步騎千餘人夜渡涪水擊雄傑一戰破之令公以雄傑敗亦棄栅走還本郡復與鄧朏等更率萬餘人於近東南隔水置栅斷絶驛路協遣儀同楊長樂與司馬裔等率師討之復遣大都督裴孟嘗領百騎繼進為其聲勢孟嘗既至梓潼值水長不得即渡而王令公鄧朏見孟嘗騎少乃將三千餘人圍之數重孟嘗以衆寡不敵各棄馬短兵接戰從辰至午於陣斬令公及鄧朏等賊徒既失渠帥遂即散走其從黨仍據舊栅而孟嘗方得渡水與長樂合兵即攻栅經三日賊乃請降此後數有反叛協輒遣兵討平之逹奚武為驃騎大將軍率兵三萬經畧漢川梁將楊賢等以武興白馬降梁州刺史蕭循固守南鄭武圍之其將楊乾運等將兵萬餘救之武逆擊乾運大破之循乃降率所部男女三萬口入朝自劒已北悉平楊寛為大丞相府司馬朝議欲經畧漢川梁宜豐侯蕭循固守南鄭寛從大將軍逹奚武討之梁武陵王蕭紀遣將楊乾運率兵萬餘人救循武令寛督開府王傑賀蘭願德等邀擊之軍至白馬乾運合戰破之俘斬數千人軍還除南幽州刺史賀若敦為驃騎大將軍時岷蜀初開民情尚梗巴西人譙淹據南梁與梁西江州刺史王開業共為表裏扇動羣蠻太祖令敦率軍討之山路艱難人迹罕至敦身先將士攀木緣崖倍道兼行乘其不意又遣儀同扶猛破其别帥向鎮侯於白帝淹乃與開業并其黨泉玉成侯造等率衆七千口累三萬自墊江而下就梁王琳敦邀擊破之淹復依山立栅南引蠻帥向白彪為援敦設反間離其黨與因其懈怠復破之斬淹盡俘其衆扶猛為大將軍羅州刺史率所部千人從開府賀若敦南討信州敦令猛别道直趣白帝所繇之路人迹不通猛乃梯山捫葛備歴艱阻雪深七尺糧運不繼猛勸奬士卒兼夜而行遂至白帝刺史向鎮侯列陳拒猛猛與戰破之乘勝而進入白帝城撫慰民夷莫不悦服武帝保定中又從田𢎞破漢南諸蠻前後十餘戰每有功進位大將軍李遷哲為驃騎大將軍與田𢎞同討信州軍次并州刺史杜滿谷望風送欵進圍疊州克之獲刺史冉助國等遷哲每率驍勇為前鋒所在攻戰無不身先士卒凡下十八州拓地三千餘里時信州為蠻酋向五子王等所圖𢎞又遣遷哲入據白帝賀若敦等復至遂共追擊五子王等破之及田𢎞旋軍帝令遷哲留鎮白帝陸騰為車騎大將軍安康賊黄衆寳等作亂連結漢中衆數萬攻圍東梁州城中粮盡詔騰率軍自子午谷以援之騰乃星言就道至便與戰大破之軍還遷龍州刺史信州蠻蜑據江峡反叛連結二千餘里自稱王侯殺刺史守令等又詔騰率軍討之騰乃先趨益州進驍勇之士兼具樓船㳂外江而下軍至湯口分道奮擊所向摧破乃築京觀以旌武功騰既破信州蠻蜑涪陵郡守藺休祖又據楚向臨容開信等州地方二千餘里阻兵為亂復詔騰討之初與大戰斬首二千餘級俘獲千餘人當時雖摧其鋒而賊衆既多自夏及秋無日不戰師老粮盡遂停軍集市更思方畧賊見騰不出四面競前騰乃激勵其衆士皆爭奮復攻拔其魚令城大獲粮儲以充軍實又破銅盤等七栅前後斬獲四千人并船艦等又築臨州集市二城以鎭遏之後遷江陵總管陳遣其將章昭逹率衆五萬船艦二千圍江陵衞王直聞有陳冦遣大將軍趙誾李遷哲等率步騎赴之並受騰節度時遷哲等守外城陳將程文季雷道勤夜來掩襲遷哲等驚亂不能抗禦騰夜遣開門出甲士奮擊大破之陳人奔潰道勤中流矢而斃虜獲二百餘人陳人又決龍川寧邦堤引水灌江陵城騰親率將士戰於西堤破之斬首數千級陳人乃遁尉遲迥為伐蜀都督督開府元珍乙弗亞万俟吕陵始叱奴興綦連宇文昇等六軍甲士一萬二千騎萬匹伐蜀以魏廢帝二年春自散闗繇固道出白馬趣晉夀開平林舊道前軍臨劒閣蕭紀安州刺史樂廣以州先降紀梁州刺史楊乾運時鎮潼州又降六月迥自潼州大饗將士引之而西紀益州刺史蕭撝不敢戰遂嬰城自守進軍圍之初紀至巴郡聞回來侵遣譙淹迥師為撝外援迥分遣元珍乙弗亞等以輕騎破之遂降前後戰數十合皆為迥所破撝與紀子宜都王蕭大圓率其文武官屬詣軍門請見迥以禮接之其吏人合營等各令復業唯收僮𨽻及儲積以賞將士號令嚴肅軍無私焉詔迥為大都督益潼䓁十八州諸軍事益州刺史任果為沙州刺史率鄉兵二千人從尉遲迥征蜀尋進授驃騎大將軍開府儀同三司蕭紀遣趙跋扈等率衆三萬來援成都果從大軍擊破之及成都平除始州刺史于謹為柱國大將軍梁元帝平侯景之後於江陵嗣位密與齊氏通使將謀侵軼其兄子岳陽王詧時為雍州刺史以梁元帝殺其兄譽遂結讎隙據襄陽來附仍請王師乃令謹率衆出討文帝餞於青泥谷謹乃令中山公䕶及大將軍楊忠等率精騎先據江津斷其走路梁人豎木栅於外城廣輪六十里尋而謹至悉衆圍之梁主屢遣兵出戰為謹所破旬有六日外城遂陷梁主退保子城翼日率其太子已下面縳降尋殺之虜其男女十餘萬人收其府庫珍寳得宋渾天儀梁日晷銅表魏相風烏銅蟠螭趺大玉徑四尺圍七尺及諸轝輦以獻軍無私焉立蕭詧為梁主振旅而旋蔡祐為中領軍江陵初附諸蠻騷動詔祐與大將軍豆盧寧討平之史寧為持節都督涼州諸軍事初茹茹與魏和親後更離叛尋為突厥所破殺其主阿那瓌部落逃逸者仍奉瓌之子孫抄掠河右寧率兵邀擊獲瓌子孫二人并其種落酋長自是每戰破之前後獲數萬人進爵安政郡公就拜大將軍時突厥木汗可汗假道涼州將襲吐渾太祖令寧率騎隨之軍至番禾吐渾已覺奔于南山木汗將分兵追之令俱㑹于青海寧謂木汗曰樹敦賀真二城是吐渾巢穴今若拔其本根餘種自然離散此上策也木汗從之即分為兩軍木汗從北道向賀真寧趣樹敦渾娑周國王率衆逆戰寧擊斬之踰山履險遂至樹敦敦是渾之舊都多諸珍藏而渾主先已奔賀真留其征南王及數千人固守寧進兵攻之偽退渾人果開門逐之因回兵奮擊門未及闔寧兵遂得入生獲其征南王俘虜男女財寳盡歸諸突厥渾賀羅拔王依險為栅周回五十餘里欲塞寧路寧攻其栅破之俘斬萬計獲雜畜數萬頭木汗亦破賀真虜渾主妻子大獲珍物寧軍於青海與木汗㑹木汗握寧手歎其勇決并遺所乘良馬令寧於帳前乘之木汗親自歩送突厥以寧所圍必破皆畏憚之咸曰此中國神智人也及將班師木汗又遺寧奴婢一百口馬五百匹羊一萬口寧乃還州魏𤣥為大都督洛安民雍方雋據郡外叛率步騎一千自號行臺攻破郡國囚執守令𤣥率𢎞農九曲孔城伏流四城士馬討平之武帝天和四年轉和州刺史伏流防主五年齊將斛律明月率衆向宜陽兵威甚盛𤣥率兵禦之每戰輒克辛威為大將軍武帝保定初率兵討丹州叛胡破之三年與逹奚武攻陽闗拔之明年從尉遲迥圍雒陽還拜小司馬天和初進位柱國復為行軍總管討綏銀等諸州叛胡并平之六年從齊王憲東伐拔伏龍等五城劉雄為驃騎大將軍天和中齊人於姚襄築伏龍等五城以處戍卒雄從齊公憲攻之五城皆拔復遣雄從柱國李穆出軹闗攻邵州等城拔之以功獲賞五千皇太子西征吐谷渾雄自涼州從滕王逌率軍先入渾境去伏侯城二百餘里逌遣雄先至城東舉火與大軍相應渾洮王率七百餘騎逆戰雄時所部數百人先並分遣斥候在左右者二十許人雄即率與交戰斬首七十餘級雄亦亡其三騎自是從逌連戰之雄功居多賞物甚厚至大軍東討雄從齊王憲拔洪洞下永安軍還仍與憲回援晉州未至齊後主已率大兵親自攻圍晉州垂陷憲遣雄先徃察其軍勢雄乃率步騎千人鳴鼔角遥報城中尋而高祖兵至齊主遁走從平并州拜上大將軍尉遲運為左武伯中大夫軍司馬天和末齊將斛律明月冦汾北運從齊公憲禦之拔其伏龍城進爵廣業郡公增邑八百戸建徳元年為右宫正時帝幸雲陽宫又令運以本官兼司武與長孫覽輔皇太子居守俄而衛刺王直作亂率其黨襲肅章門覽懼走行在運時偶在門中直兵奄至不暇命左右乃手自闔門直黨與運争門斫傷運指僅而得閉直黨不得進乃取宫中材木及牀第等以益火更以膏油灌之火勢轉熾乆之直不得進乃退運率留守兵因其退以擊之直大敗而走是日非運宫中已不守矣帝嘉之授大將軍賜以直田宅妓樂金帛車馬及什物等不可勝數韋孝寛為雍州刺史武帝東伐趙王招率兵出稽胡與大將軍犄角乃勅孝寛為行軍總管圍守華谷以應接之孝寛尅其四城武帝平晉州復令孝寛還舊鎮時尉遲迥叛詔發闗中兵以孝寛為元帥東伐軍次河陽迥所署儀同薛公禮等圍逼懐州孝寛遣兵擊破之進次懐縣永城橋之東南其城既在要衝雉堞牢固迥已遣兵據之諸將士以此城當路請先攻取孝寛曰城小而固若攻而不拔損我兵威今破其大軍此亦何能為也於是引軍次於武陟大破迥子惇惇輕騎奔鄴軍次于鄴西門豹祠之南迥窮迫自殺兵士在小城中者盡坑於游豫園諸有未服皆隨機討之闗東悉平李澈武帝時從皇太子西征吐谷渾以功賜爵周昌縣男從武帝平齊錄前後功再進爵遷左武衞將軍杜整為儀同武州刺史從武帝平齊加上儀同進爵平原縣册府元龜卷三百五十五
