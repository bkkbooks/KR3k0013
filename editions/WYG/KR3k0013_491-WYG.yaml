body:
  text: 册府元龜卷四百九十一宋王欽若等撰邦計部蠲復第三唐徳宗建中三年既誅李惟忠下詔易定深趙常冀莭度觀察管内百姓除本道所用外者給復三年興元元年春正月癸酉在奉天行宫受朝賀畢大赦改元制其奉天昇為赤縣仍給復五年在縣城内者給復十年六月癸丑詔改梁州為興元府百姓給復一年己巳詔曰朕廵狩于南自春渉夏師旅殷會日費斯廣州閭杼軸嵗計其空東作妨時西成罕望雖僶俛從事人不告勞而愧悼積衷予實知咎昨者減其租稅優以復除庶乎有瘳汔用小息洎駕言旋軫躬履畏途絶硐縈廻危棧綿亘時經途潦道路阻修工徒造舟縣人葺路長㓜耄耋莫獲寜居而又齎荷糗糧共備頓舎渉于千里犒我六師居人露處而㒺息宿麥過時而不穫覩此妨奪彌増感傷前所蠲除未足酬䘏式敷恵澤以艾大勞其興元府除先減放秋稅給復外更給復一年洋州除放秋稅外給復一年鳳州全放今年秋稅七月丙子車駕至鳯翔詔鳯翔府管内今年秋稅及去年已前逋欠並宜放免辛夘大赦制京兆府百姓普恩外給復一年貞元元年八月李懐光平詔河中府及同綘百姓並經䧟賊生業廢棄興言軫念良用憫然宜各給復一年二年四月李希烈平詔淮西百姓等乆經淪䧟兼被傷夷想茲凋殘實足哀愍除供當道軍用之外宜給復二年將士之中不樂在軍願歸農桑者委節度使刺史量給逃户死户田宅并借貸種糧優復終身使之存濟三年十二月庚辰臘嘗畋於新店幸野人趙光竒家問曰百姓樂乎對曰不樂帝曰仍嵗頗稔何不樂乎對曰葢由陛下詔令不信於人所以然也前詔云兩稅之外悉無他徭今非理而誅求者殆過之後又云和糴於百姓曽不識一錢而強取之始云所糴粟麥納於道次今則遣至於京西行營動過數百里車摧牛斃破産奉役不能支也百姓愁苦如此何有於樂乎雖頻降優䘏之詔而有司多不奉之亦恐陛下身在九重未之知也帝感異之因詔復除其家四年正月一日大赦百姓逋欠一切放免九月詔曰興至化者務積於人故欲薄歛長國家者以義為利故使以時朕撫臨區夏宵旰忘勞茍可以助化濟人常思大小皆益近以中夏甫寧頗勤經費遂收諸道停減將士糧料用叶權宜言念疲甿重兹供億其貞元四年已徴到及在路者即依前送其在百姓腹内者並放免五年已後每年各收一百萬八十八貫石亦宜放免委本道觀察使各具當管州所放聞奏并曉示百姓初建中末國家多難諸道咸加詔將士赴國難兩稅外别徴資糧以給之及復京師悉罷歸農去嵗宰相李泌請自貞元二年已後追收其資費納於户部謂之諸道減將士錢乃遣度支員外郎元友直廵州府搜察之既而稅輸錢米百餘萬人力殫竭殆不堪命使臣多懇訴帝濡然而悟特詔免之自是東南之甿復安其業六年閏四月旱詔京兆府諸縣田合徴夏稅者除水利地外一切放免其廻種秋苖者亦不在收稅限八年秋八月江淮荆湘陳宋至於河朔連有水災十二月詔曰恵下䘏人先王之政典視年制用有國之常規故有出公粟以振困窮施嵗征以寛物力乃者諸道水灾臨遣宣撫省覽條奏載懐憫惻其州縣府田苖損五六者免今年稅之半七分已上者皆免委度支條以聞奏朕撫臨億兆思致和平理化未臻良増愧畏十二年十月詔京兆府所奏奉先等八縣旱損秋苗一萬頃計米三萬六千二百石青苗錢一萬二千八百貫比縁春夏少雨秋稼或傷頃畆雖損非多黎庶猶慮艱食况畿甸之内供應實煩湏有優矜以寛疲瘵其所奏損特宜放免先是州府奏水旱損苗别差官檢覆多有異同之議又追集人户煩擾州府至是帝知其弊故特允其奏朝野歡慶十四年正月詔曰朕臨御兆人為之父母思底于道俾安其生然則邦計不可不供封陲且以集事而累經水旱或有流庸積成逋懸寖以凋瘵毎念於此惕然疚懐中宵以興思拯其弊將以憫其疾苦致於康寜豈可更擾疲人尚為徴歛宜𢎞善貸以恵困窮其諸道州府應欠負貞元八年九年十年兩稅及𣙜酒錢總五百六十萬七千餘貫在百姓腹内一切並免如已徴得在官者宜令所司具條疏聞奏於戯天生蒸人君為司牧百姓不足過實在予永思其艱載用祗畏宣示中外令知朕懐輿議以所欠錢物等多是浮於編甿腹中各已逃移年月且乆縱令所司徴納亦無從而致雖有此詔亦無益於百姓矣十八年二月免京兆府逋稅二萬二千貫七月蔡申光三州言春大水夏大旱詔其當道兩稅除當軍將士春冬衣賜及支用外各供上都錢物已徴及在百姓腹内量放二年二十年二月詔曰去夏迄秋頗愆時雨京畿諸縣稼穡不登朕用軫慮愧為其父母今宿麥未收其逋租宿貸六十五萬貫石宜蠲除之禮化之本繫乎京師副朕憂人屬於長吏宜勉務農桑各安生業以諭朕懐順宗以貞元二十一年正月丙申即位二月甲子大赦天下衆百姓應欠貞元二十一年二月三十日已前𣙜酒及兩稅錢物諸色逋懸一物已上一切放免京畿諸縣應今年秋夏青苗錢並宜放免六月丙申詔曰朕君臨寰海子育兆人思欲阜其財求俾遂生殖然後導之以禮樂齊之以政刑興康譲之風洽和平之理而比聞官司之内尚有逋懸毎念黎蒸用深憂軫永言勤恤宜有蠲除其荘宅使從興元元年至貞元二十年十月三十日已前畿内及諸州府荘宅店舖車坊園磑零地等所有百姓及諸色人應欠租課斛斗見錢絁絲草等共五十二萬餘並放免朕方與人休息致之富壽物有不得其所事有可利於人寤寐求思予無所愛宜加曉示令悉朕懐憲宗永貞二年正月即位其月丁邜詔京畿諸縣今年青苗錢及𣙜酒錢並宜放免地稅率與每斗糧放二升江淮荆㐮等十州管内水旱所損四十七州減放米六十萬石秋稅錢六十萬貫元和元年九月西川平十月詔西川百姓等乆䧟兇逆不免傷殘其兩稅錢等委本道觀察使量與矜減其東川州縣及山南西道當兇徒焚剔之後王師攻取之辰發輓饋軍繕完補缺一日之費豈止千金三軍所資盡出百姓永惟勞弊朕所軫懐其東川元和二年上供錢物並放留州留使錢委觀察使量事矜減仍具數奏聞山南西道元和二年上供錢量放一半二年正月辛邜有事於南郊還御丹鳯樓大赦天下制天下應有逋欠在百姓腹内者及京畿今年夏青苗錢並放免淮南江南去年已来水旱疾疫其租稅節級蠲放是月又詔曰令人有産子者復勿算三嵗令諸懐姙者賜胎養穀人三斛復其夫勿算一嵗著以為令二月壬申制以浙江西道水旱相乘蠲放去年兩稅上供三十四萬餘貫四月戊午朔庚申制以劍南西川所管新罹兵革蠲放去年兩稅𣙜酒上供錢五十六萬餘貫今年者免其半七月辛邜蠲劍西南川常賦錢米貫石七十餘萬以經劉闢亂故也十月潤州將張子良等既擒逆賊李錡制曰毎念疲甿乆罹虐政而又廹于逆命驅以饋軍攫歛則灌以漏巵傷殘則烈於猛火永言於此如納諸隍宜申蠲貸之恩兾息歌吟之苦其潤州今年秋稅未徴納者一切放免其管内諸州如李錡作亂之後横加徴剝委元素審加勘責具色目聞奏其𣙜酒錢亦宜處置聞奏四年正月詔元和三年諸道應遭水旱所損州府令放兩稅錢米等損四分以下者宜准此處分損四分已上者並准元和元年六月十八日勅文放免六年二月甲午勅泗州二年水旱所損不虚其欠元和五年錢四千六百四十貫米三千一百石等宜並放免四月丁亥浙江東道觀察使李遜奏當道台眀温婺四州貞元五年准詔權加官健一千五十八人今請停罷歸農其衣糧稅外所徴錢米並請蠲放從之又免鄂岳道逃户錢十三萬五千貫十月戊寅制曰朕聞王者之牧黎元也愛之如子視之如傷茍或風雨不時稼穡不稔則必除煩就簡惜力重勞以圗便安以阜生業况邦畿之内百役所叢雖勤䘏之令亟行而供億之制猶廣重以經夏炎暵自秋霖霪南畆虧播植之功西成失豐登之望内乏口食外牽王徭豈惟轉徙之虞慮有餒殍之患斯葢理道猶鬰和氣未通永言于兹良所咎歎宜加恵貸式示誠懐比者每令折糴本以便人為意今田穀所收其數既少必恐徴納之後種食不充其京兆府宜放今年所配折糴粟二十五萬石如百姓有粟情願折納即於時價外特加優饒與納仍令當處收貯委度支逐便支用今春貸百姓義倉斛斗屬嵗旱歉湏議優矜宜令所司容至豐收日徴塡京兆府從元和五年已前諸縣租稅有逋懸錢在百姓腹内者放免其百姓職田數額甚廣近緣水潦道路不通計搬運脚價所費猶倍務令寛濟使其安存其破損外職田粟宜令逐近貯納仍委度支随便支用其職田粟送城脚價亦宜放免百官今年本分職田粟據損數外宜令於太倉請受其草及水田租既緣城中無可廻給即宜據損數外准舊例令今年畿内田苗應水旱損處無聞至今檢覆未定又屬霖雨所損轉多有妨農收慮致勞擾其諸縣勘覆有未畢處宜令所司據元訴狀便與破損不必更令撿覆其未經申訴者亦宜與類例處分朕以為理之本在乎安人咨爾尹京宰邑之臣實惟親人阜俗之寄必當詢其疾苦奉職詔條恤隠為心無怠於事㒺或狥利以刻下吐剛而茹柔使閭井或安惸􅄔復濟各勉忠效宜悉朕懐閏十二月乙巳勅畿内百姓頃以秋稼旱損農收不登言念疲黎毎務矜恤乃者詔命既下各已加恩如聞村閭之間尚慮乏食更宜優貸以恵吾人其粟及大豆除已徴納外見在百姓腹内者宜令全放青苗錢欠在百姓腹内者量放一半七年二月庚寅制元和六年諸色稅草並職田草共一百一十五萬束並宜放免又有常賦錢穀蠲放之餘貧弊者多慮難輸入欲令寛恤湏有優矜其京兆府欠去年兩稅青苗等錢二萬一千八百貫欠秋稅雜斛斗及職田粟五萬三千三百石並宜放免元和六年春賑貸京畿百姓義倉粟二十四萬石亦宜放免九年二月詔應京畿百姓所欠元和八年秋稅斛斗青苗錢稅草等在百姓腹内者並宜放免五月癸酉以京畿旱免今年夏稅大麥雜菽合十三萬石並随地青苗錢五萬貫十年十月戊申罷四道兩稅十一年四月己未制曰疆理宇内必先於京師恵綏四方亦始於中國葢以千里之壌百役是資俾其不足吾孰與足頃自春及夏時澤未降恐失順成之道或生歉儉之灾是以仰瞻昭回俯察田畆喜獲朝濟之潤方寛夕惕之憂思遂康寧盡蠲逋負其京畿百姓所有積欠元和九年十年兩稅及青苗并折糴折納斛斗及稅草等除在官典所由腹内者並宜放免七月丙戌以淮西四靣諸州隣賊乏食蠲放夏稅錢米有差十二年七月甲子勅淮西四面州縣夏稅並宜免放九月丁未詔免淮西四面之州秋稅十月己邜淮西平甲申詔淮西百姓給復二年仍委州縣長吏設法安撫十三年正月一日赦書其度支元和二年已前諸道借便及縣欠錢物斛斗雜物當四百八十餘萬貫石端匹枚具斤兩等並放鹽鐵户部諸監院應有欠負亦疎理減放十四年五月乙酉勅京畿之内供億所叢雖年穀比登而人食尚寡俾其存濟實在優矜其京兆府及諸縣今年夏稅大麥等共九萬四千六百九十四石並宜放免七月己丑帝御宣政殿册尊號禮畢大赦天下京畿今年秋稅青苗及𣙜酒錢每貫量放四百文從元和五年至十年已前諸縣百姓欠負錢物斛斗等委京兆府疎理減放淮南浙江東道宣歙江南西道湖南福建山南東道荆南等九道今年秋稅錢合上供者每貫量與減放度支鹽鐵户部應有逋懸並委本司疎理具可放數聞奏穆宗以元和十五年正月即位二月丁丑御丹鳯樓降赦詔度支諸州府監院從貞元八年已後至元和十年已前共計欠錢一百一萬五千九百餘貫監錢使諸監院應欠元和十三年已前錢物除准前制疎理外共計一百八萬八千六百餘貫石等户部諸州府從建中三年已後至元和十三年已前應欠在州貧窮並遭水旱逃亡百姓腹内兼連接淮西河南賊界並燒刼散失及賑貸百姓錢物五十萬九百餘貫石等京兆府從元和五年已後至十三年已前應欠諸色錢物共四十一萬九千六百餘貫石束等州府監院百姓欠負但在官典所由腹内者一切放免内外百官食利錢一倍至五倍已上節級放免四月勅京畿二十有二縣欠元和十四年京百司職田二十二萬九千一石束貫等京畿百姓聞甚艱貧頃差搬運軍糧今又修營陵寢雖應緣驅役皆給價錢而屢有牽召頗妨農畆豈可更徴懸欠重使憂愁其所欠並宜蠲免其合受納所欠職田或見在官班各請厚俸或近終考職稍有餘資宜體朕懐以寛人力六月京兆府上言興平醴泉縣雹傷夏苗請免其租入九月宋州奏雨水敗田稼六千頃請免今年租入並從之長慶元年正月辛丑郊禋禮畢大赦天下制度支鹽鐵户部三司官吏所由欠負元和十三年已前諸色錢物斛斗委本司盡勘責如是入已侵欺即准條處分如縁欠折攤徴元保外無可納者宜並與疎理諸軍諸使亦准此處分兩稅外不得别有科率四月己丑河南尹韋貫之請以去年夏末至今年夏初供館驛外殘錢一萬三千五百八十貫草九萬五百八十束代百姓填元和十一年至十五年逋欠及今年夏稅從之七月己酉册尊號禮畢大赦制京畿諸縣及度支鹽鐵户部欠負各疎理放免有差二年八月既誅李㝏汴州平下詔其三州界内有兵馬所到縣百姓或被驚擾處宜於今年稅内三分量放一分敬宗以長慶四年正月即位三月詔京畿諸縣應今年夏青苗錢並宜放免秋青苗錢並河南府夏青苗錢每貫放三百文其京兆府除所放青苗錢外更放錢五萬貫斛斗五萬石河南府除所放青苗錢外亦更量放三萬貫斛斗二萬石文宗太和元年春正月即位勅制京兆府今年夏稅青苗量放一半八月詔三原縣百姓今年秋青苗錢並放免髙陵縣量放一半二年十一月以棣州平詔應在境内百姓宜復一半三年十一月庚子京兆上言奉先富平羙原雲陽華原三原同官渭南等八縣旱雹損田稼二千三百四十頃有詔蠲免四年十二月京畿及河南江南荆㐮鄂岳湖南大水害田稼官出米賑給蠲免其田稼官租五年十月丁邜京兆府上官奉先渭南縣今年夏風電暴雨害田稼至是請蠲免其租可之壬午度支奏據屯田郎中唐扶鄧州内鄉行市黄潤兩塲倉督鄧琬等先主掌貞元二年湖南江南運到糙米至浙江於荒野中權造囤盛貯差鄧琬等交領除支用外六千九百四十五石多年裛爛已成灰塵准度支牒徴原主掌所由從貞元二十年已後所由鄧琬父子兄弟至𤣥孫相承禁繫經今二十八年前後禁死九人適孫及𤣥孫等四人見枷禁奉勅如聞鹽鐵度支兩使此類至多其鄧琬四人資産全以賣納繫禁動經三代死於獄中實傷和氣其鄧晟等四人勒責保放出仍委兩使都勘天下州府監院更有此類但禁經三年已上者一切與疎理各具事由聞奏七年正月詔京兆府太和六年青苗𣙜酒錢在百姓腹内者並放免京兆河中同華陜虢晉絳等州府自太和六年秋稅已前諸色逋懸在百姓腹内悉放免八年二月庚寅詔為政之要必在去煩厚下之恩莫先已責應度支户部鹽鐵積乆欠錢物或囚繫多年資産已盡或本身淪歿展轉攤徴簿書之中虚有名數囹圄之下常積滯寃言念于斯所當矜恤其度支户部鹽鐵應有懸欠委本司具可徴放數條以聞奏不得容有奸濫京畿諸司使食利錢已納利計五倍已上者本利並放免其有攤徴保人納利計兩倍已上者其本利亦並放免九月丁邜詔淮江浙西等道仍嵗水潦其田苗全損處全放其年青苗錢餘亦量議蠲減開成元年正月一日御宣政殿朝賀禮畢詔其户部度支鹽鐵應有諸色欠負太和五年已前者並放免京畿百姓兩稅已降凡一嵗之内徴取者並百官職田並全免一年河中同州絳州去年旱歉賦歛不登宜特放免開成元年夏青苗錢四月詔曰逺人征賦毎嵗徴輸言念辛苦暫為蠲免其安南今年秋稅悉宜放免委都䕶田早集百姓曉示恐軍用闕絶宜賜錢二萬貫以嶺南觀察使合送兩稅供錢充二年三月壬申詔揚州楚州浙西管内諸郡如聞去年稍旱人罹其灾豈可重困黎元更加誅歛爰布蠲除之令用叶拯物之情宜委本道觀察使於兩稅户内不支濟者量議矜減今年夏稅錢每貫作分數蠲放分折速奏仍於上供及留州使額内相均落下務令蘇息十月河南府上言今秋諸縣旱損并雹降傷稼請蠲賦稅從之十一月甲戌户部侍郎李班奏廬州舒縣太平鄉百姓徐行周叔姪兄弟五代同居請免其同籍户稅從之十一月宣歙觀察使崔鄲奏溧陽縣百姓陳班請蠲復賦稅從之三年正月詔淄青兖海鄆曹濮去秋蝗䖝害物偏甚其三道有去年上供錢及斛斗在百姓腹内者並宜放免今年夏稅上供錢及斛斗亦宜全放六月諸道征鎭各奏准詔停進奉以放貧下户租稅十一月以妖星見降詔京畿之内百役繁興欲其阜安切在優䘏其今年二月二十五日勅賑貸諸縣百姓糧種粟八萬四千九百七十八石如聞數内半是義倉斛斗此乃救灾之備豐年自合收填其餘有户部管係者並且停徴以候来嵗畿内諸縣應有開成元年已前諸色逋欠並宜放免仍委度支與府司同撿勘聞奏如是官吏破用不在此限武宗㑹昌六年二月壬申朔癸酉制天下州府耄老惸獨及殘疾窮困交不存濟户今年夏稅並放免懿宗咸通二年二月鄭滑節度使李福奏屬郡頴州去年夏大水雨泥邱汝陰潁上等縣平地水深一丈田稼屋宇淹沒皆盡乞蠲租稅從之四年七月詔安南管内被蠻賊驅刼處本户兩稅丁錢等量放二年候收復後别有指揮僖宗廣眀元年五月乙邜詔自廣眀已前諸色稅賦宜令十分減四分其河中府太原府遭賊掠處亦宜准此哀帝天祐元年八月即位二年四月徳音修奉園陵役費夫匠車牛宜令録奏優復一年梁末帝貞眀六年四月己亥詔曰王者愛育萬方慈養百姓恨不驅之以仁夀撫之以淳和而炎黄有戰伐之師堯舜有干戈之用諒不獲已其猶病諸然則去害除妖興兵動衆殺黒龍而濟中土刑白馬而誓諸侯終能永逸暫勞以至同文共軌古今無異方册具存朕以𦕈末之身託億兆之上四海未艾八年于兹業業兢兢日慎一日雖踰山越海肅慎方來而召雨徴風􅃖尤尚在顧兹殘孽勞我大邦將士乆於戰征黎庶疲於力役木牛暫息則師人有不爨之憂流馬盡行則丁壯有無聊之苦况青春告謝朱夏已臨妨我農時廹我戎事永言大計思致小康宜覃在宥之恩稍示殷憂之㫖用兵之地賦役實煩不有蠲除何使存濟除兩京已放免外應宋亳輝潁鄆齊棣滑鄭濮沂宻青登萊淄陳許均房㐮鄧泌随陜華雍晉絳懐汝商等三十二州應欠貞眀四年已前夏秋兩稅并鄆齊滑濮襄晉輝等七州兼欠貞眀四年已前營田課利物色等並委租庸使逐州據其名額外數目矜放所在官吏不得淹停制命徴督下民致恩澤不及於鄉閭租稅虚損於帳籍其有𠂻私逺年債負生利過倍自違格條所在州縣不在更與徴理之限兖州境内自張守進違背朝廷結連蕃㓂乆勞攻討頗困生靈言念傷殘尋加給復龍徳元年五月丙戌詔應欠貞眀三年四年諸色殘欠五年六年夏秋殘稅並放七月以陳州平先是州刺史恵王友能叛命張漢傑討之勅開封府太康㐮邑雍丘三縣遭陳州賊軍奔衝其夏稅只據見苗輸納後唐荘宗同光元年四月即位詔應諸道管内有髙年踰百嵗者便與給復永俾除名自八十九十者與免一子役州縣不得差徭其雲應邉陲山北八軍易定幽燕邉陲諸縣自鮮卑入㓂仍嵗纒灾睠彼流人良堪興歎或乍來復業纔擬營農尚怯侵搔湏加慰䘏其稅率仍為長吏量與矜减凡有痡毒孤貧惸􅄔鰥寡歴代皆缺於教化自古共切於軫傷免致噢咻遍加恵飬應有欠負不繫公私若曽重重出利累經徴理塡還不迨者並皆釋放十月詔曰理國之道莫若安民勸課之規宜從薄賦庶遂息肩之願兾諧鼓腹之謡應諸道户口並宜罷其差役各務營農所係殘欠賦稅及諸務懸欠積年課利及公私債負等其汴州城内自收復日已前並不在徴理之限應天下諸道自壬午十二月已前並收其兵戈蹂躪之地水旱灾沴之鄉苗稼不登征賦宜減應今年經雹旱所損田苗處撿覆不虚據畆壠蠲免兼北京及河北先為妖祲未平配買征馬如有未請官本錢及買馬不迨者可並放免二年二月詔曰水旱之鄉饑寒宜䘏兵戈之地勞弊堪傷鄴都及河東乆興師旅頗困生靈其近京州縣又輦運徭役無時暫息應北京以北諸州川界及至新州幽州鎮定管界契丹侵掠井邑凋殘兼遼州泌州南界及安義北界澤州諸縣河陽向下至鄆濮齊棣以來邉河州縣數年兵革至甚凋殘自此並宜倍加撫安召令復業應人户所輸稅租特與蠲减已從别勅處分兼諸道州縣有經雹水旱之處所損田苗納稅不迨懸欠處仰仔細撿詳如不虚妄特與蠲放五月勅治國之由安民是本如聞今嵗麥田雖繁而結實不廣其四京諸道百姓於麥察地内種得秋苗並不徴稅十一月中書奏天下州府今秋多有水潦處百姓所輸秋稅請特减以慰貧民勅俟來年蠲免二年二月甲子朔詔曰間者以皇綱中墜國歩多艱率兵甲於兩河漲烟塵於千里憂勤二紀勞役萬端矧乃東京國號大名雄稱全魏昔惟廣晉今實興唐自朕南北舉軍髙低恊力總六州之疆土供萬乘之征租有飛芻輓粟之勞有浚壘深溝之役賦重而民無嗟怨務繁而士竭忠勤致于掃盪氛霾平除偽逆九廟復烝嘗之薦兆人息塗炭之灾静想寅縁深所嘉歎昨者因追曩素載洽歌謡俱懸望幸之誠遂舉省方之典爰臨管界洎至都城對父老之歡呼睠懐斯契睹井田之凋廢臨馭増慙得不特降優恩俾蘇舊地兾表寵綏之道免渝敦激之風應東京随絲鹽錢毎兩俱減放五十文逐年俵賣蠶鹽大鹽甜次冷鹽每斗與減五十文欒鹽與減三十文其小菉豆稅毎畆長與减放三升都城内店宅園圃比來無稅頃因偽命遂有配徴後來原將所徴物色添助軍人衣賜將令通濟宜示矜蠲今據𦂳慢去處於見輸稅絲上毎兩作三等酌量納錢貴與充本廻圗收市軍人衣賜其絲永與除放所有六街内空閒田地並許新歸業人户逐便葢舍居止與免差徭如是本主未来一任坊隣收佃庶令康泰俾表優恩三月車駕自鄴至澶州辛亥次於徳勝鎭頓丘縣人王遇等一百五十人遮道訴曰臣等墳墓田園陛下數年列栅在内桑棗為寨木田園成溝壘十年在外去嵗方歸帝憫然許復一年四年正月壬戌制應同光三年經水灾處有不迨及逃移人户差科夏秋兩稅及諸折配委官吏切加㸃撿並與放免仍一年内不得雜差遣壬午年已前百姓所欠秋夏殘稅及諸色課利錢物先有勅文悉已放免近聞或不遵守依前却有徴收仰下租庸司及諸道州府切准前勅處分其同光元年當戰伐之後是平盪之初人户流離多未復業固於租賦湏議矜蠲其諸色殘欠差稅及不迨係官課利並與放免三蜀管内百姓除秋夏兩稅及三司舊額錢物斛斗並繼岌崇韜申奏减落徴收外所有無名配卒急徴横歛毒害生靈者更委本道新除節度使已後於管内一一檢勘細具聞奏當與放免册府元龜卷四百九十一
