body:
  text: 册府元龜卷三百六十七宋王欽若等撰將帥部機畧第七唐王甫代宗時武將也廣徳元年十月吐蕃犯長安甫誘長安惡少數百人集六街皷於朱雀街大皷之吐蕃聞之震懾乘夜而遁初吐蕃既立廣武王承宏將刼京城士女工匠整隊伍還蕃及是聞皷聲謂有變乃狼狽奔潰段秀實代宗大歴初為邠寧節度馬璘都虞候璘既奉詔徙鎮涇州其士衆嘗自四鎮北庭赴難中原僑居驟移頗積勞怨刀斧將王童之因人心搖動以為亂或告其事且曰候嚴禁鼓為約矣秀實乃召鼓人陽怒失節且戒曰每更籌盡必來報每白之輒延數刻四更畢而曙籌既差互童之亂不能作明日吿者復曰今夜將焚藁塲期救火者同作亂秀實便嚴加警僃夜半火發乃使令於軍中曰救火者斬童之居外營請入救火不許明日斬之捕殺其黨凢十餘人以徇曰敢後徙者族於是遷涇州張光晟為振武軍使德宗建中元年八月光晟殺廻紇之歸國者初廻紇前後繼至有九姓胡雜之通名廻紇凡千餘人納馬于唐而徴其懸估畱京師或十數年資産極厚嘗為暴横有司不能禁止大歴十一年廻紇襲振武使攻東陘越代及忻至于太原大殺掠以還十四年復脩舊好使其帥突董統還其國貲貨甚殷及振武畱數月厚求給養日食肉千斤他費稱是光晟苦之一云廻紇突董梅錄領衆并雜種胡等自京師還國輿載金帛相屬於道光晟訝其裝槖頗多潛令驛吏以長錐刺之則皆引致京師婦人也㑹可汗頓莫賀新立盡殺九姓胡人皆恐懼不敢還多道亡突董部之益峻羣胡迫急乃宻獻計於光晟請盡殺廻紇之種若以兵臨則胡人拱手不敢相抗光晟喜諾焉乃表獻䇿曰廻紇本人非多比助其彊者羣胡耳今聞其國方亂頓莫賀新立未得衆移地徤有孽子及宰相梅録各將數千人方相圖未服且兵非利不往人非財不聚虜無財利一亂不可定夫撫弱攻昧取亂侮亡者聖人之道陛下不以此時乗之而復歸其人奉其幣此真所謂借冦兵而齎盗糧者也請盡殺之光晟乃使將校過其門陽不為禮突董果怒執而鞭之光晟乃勒兵圍擁廻紇并羣胡皆殺之收駞馬數千繒錦十餘萬獨留二胡為證且告曰廻紇抶辱大將乃謀陷振武胡有宻言者故先事誅之帝徴光晟還以彭合芳代焉且使中官王嘉祥與㢠廻紇使聿逹午偕往致其意朱滔為幽州畱後建中初成德軍李寶臣死其子惟岳謀襲父位滔與成徳軍節度使張孝忠征之大破惟岳於束鹿滔命偏帥守束鹿進圍深州惟岳乃統萬餘衆及田悅援兵圍束鹿惟岳將王武俊以騎三千方陣横進滔繪帛為狻猊象使猛士百人蒙之皷譟奮馳賊馬驚亂隨擊大破之惟岳焚營而遁嗣曹王臯為江南西道節度觀察建中初李希烈反賊樹堡柵於蔡山臯度峻險不可攻乃聲言西取蘄州理戰艦分兵傍南涯與舟師泝江而上賊以老弱守柵引軍循江隨戰艦南北與臯兵相直去蔡山三百里賊亦隨之乃令徒兵悉登舟廻舟順流東下不一日乃拔蔡山柵賊亦還兵救柵間一日方至又大破之因進攻蘄遂拔之降其將李良復至黄州斬首千餘級軍益振馬燧為河東節度使建中三年加魏博招討使討田悦悦求救於淄青恒冀燧軍次於漳水悦遣將王光進以兵守長橋築月城以為固軍不得渡燧乃於下流以兵車數百乘維以鐡鏁絶中流實以土囊以遏水水稍淺諸軍畢渡是時糧少悦深壁不戰欲老燧師燧令諸軍持十日糧進次倉口與悦等夾洹水而軍李抱真等問曰糧少深入何也燧曰糧少利速戰兵法善於致人而不致於人今田悦與淄青恒三軍為首尾計欲不戰以老我師若分軍擊其左右兵少未可必破悦且來救是前後受敵也兵法所謂攻其必救固當戰也燧為諸公合而破之燧乃造三橋逾洹水日挑戰悦不敢出恒州兵自以軍少懼為燧所并引軍合於田悦燧又令於軍中曰悦死傷之餘安敢出戰彼所恃者淄青軍爾吾當先破納軍則田悦坐受降也淄青軍聞懼亦引軍合於田悦悦謂燧明日復挑戰乃伏兵萬人欲邀之燧乃令諸軍半夜皆食先鷄鳴時擊皷鳴角潛師傍洹水徑趨魏州令曰聞賊至即止為陣又令百騎鳴皷角留於後仍抱薪持火待軍畢發止鼓角匿其傍伺悦軍渡畢焚其橋軍行十數里悦乃率淄青二州兵歩騎四萬餘踰橋掩其後乘風縦火皷譟而進燧乃坐軍前除草斬榛棘廣百歩以為陣募勇士得五千餘人分為前列以俟賊至比悦軍至則火止氣乏力少衰乃縱擊之悦大敗時神䇿昭義河陽軍小却河東軍勝諸軍還鬭合擊又大破之廹洹水悦軍走橋橋已焚矣悦軍亂赴水斬首二萬殺賊大將孫晉卿安墨啜生獲三千餘人溺死者不可勝數淄青軍殆盡死者相枕藉三十里悦收兵得千餘人夜走至魏州伊慎為蘄州刺史充江南西道節度都知兵馬使建中末車駕在梁洋鹽鐵使包佶以金幣泝江將進獻次於蘄口賊已屠汴州遣驍將杜少誠將歩騎萬餘來冦蘄黄以絶江道慎兵七千遇於永安戍慎列樹三柵相去纔數里偃旗卧皷於中柵少誠至分兵而圍之軍伍未定中柵聲皷三柵悉兵以擊賊軍大亂少誠脱身以免斬級不可勝數江路遂通渾瑊建中末從徳宗幸奉天為行在都虞候朱泚至乃出軍戰于城東王師不利賊遂乘勝奔突將入官軍與賊隔門相持自卯至午殺傷頗甚門内有草車數乘瑊乃令虞候高固等推車塞門焚之以禦乘火力鬭賊衆遂退然重圍已合大脩攻具以僧法堅為匠師造雲橋成闊數十丈下以拒輪為脚推之使前施濕氊生牛革多懸水囊以為障直指城東北隅兩傍搆木為廬覆以牛革廻環相屬負土運薪於其下以填壕塹矢石不能傷城中恟懼相顧失色瑊與防城使侯仲莊揣雲橋來路先鑿地道下可深丈餘上積馬糞深五六尺次二日即令爇火次一日復下柴薪夜燒之平明火焰髙於城壘是時北風正急賊乃隨風推橋以薄城下賊三千餘人相繼而登城上士卒皆久寒餒又少甲胄瑊但感激誡厲之以饑弱之衆當劇賊之鋒雖力戰應敵人憂不濟公卿已下仰首祝天賊徒至地道所橋脚偏陷不能進須㬰風廻熖轉雲橋焚為灰燼賊焚死者數千城中歡聲振地馬勛為梁州禆將興元元年二月德宗在奉天欲移幸梁洋時山南西道節度使嚴震遣兵五千至盩厔以俟南幸其將張用誠隂謀背叛輸欵李懷光朝廷憂之㑹勛至帝臨軒與之謀勛曰臣請計日至山南取節度符召之即不受召臣當斬其首以復命帝喜曰幾日當至勛尅日時而奏帝勉勞而遣之勛既得震符及壯士五人偕行既入駱谷用誠以為未知其叛以數百騎迓勛勛與俱之𫝊舍用誠左右森然勛曰天寒且休軍士軍士皆退勛乃令人多焚草以誘之軍士皆爭附火勛乃從容出懷中符示之曰大夫召君用誠惶駭起走壯士自背束其手而擒之不虞用誠之子居後引刃斫勛勛左右遽承其臂刀不甚下㣲傷勛首遂格殺其子而仆用誠於地令壯士跨其腹以刃擬其喉曰聲則死之勛即馳就其營軍士已被甲執兵矣勛大言汝等父母妻孥皆在梁州一朝棄之從人謀反將欲滅汝族耶大夫使我取張用誠不問汝輩乃何為乎衆讋伏於是縳用誠送洋州震杖殺之拔其貳使總其衆勛以藥自封其來復命愆約半日帝頗憂之及勛至甚悦李晟為神䇿行營節度使興元元年德宗在梁洋晟令判官張彧攝京兆尹權知府事權署官吏四十餘人徵斂芻粟數日山積號令軍士以收復宫闕為志自鑾駕南幸河中李懷光脅奪諸軍士馬頗衆朱泚兵亦未衰晟以孤軍中立財力未集恐為二盗所併乃卑詞厚意偽致誠於懷光外示推崇之實内輯兵賦以濟其志旬日之後軍用整備懷光患之稍移軍涇陽與朱泚約同滅晟晟致書懷光冀其感寤懷光得書雖慙懼然兇愎之性終不能悛晟懼為所併乃宻疏請徙軍東渭橋帝不許懷光為亂益急時鄜坊節度使李建徽神策將楊惠元及晟與懷光聨營晟以事迫㑹有中使過晟營乃令軍曰奉命徙屯渭橋乃為陣而行至渭橋不數日懷光果逐建徽惠元而刼其兵建徽走免惠元死於好畤晟軍東渭橋大陳兵告以收復之事衆皆奮躍㑹將吏數輩自賊逃來言朱泚分離可滅之狀軍士增氣先是賊將姚令言及偽中丞崔宣咸使人來覘發軍之期悉為候騎所得及是晟陳師引覘者示之謂曰爾報諸賊勉力自固無不忠於賊也各飲之酒給錢而遣之仍遺宣書令其善守乃移牒渾瑊駱元光尚可孤等尅期齊進初晟將收復㑹諸將議其方畧皆欲先收外城既有府縣坊市以助軍威然後北清宫闕賊既失衆心必揺動乘其危變不勞而克晟獨曰先收外城則街衢隘狹人家駢比賊必設伏與王師格戰如此則兵冇勝負賊退守宫城又須攻擊賊利則薄吾軍不利則害及百姓吾未見其利且賊重兵精甲皆在苑中當須先抵苑墻衝其巢穴賊既敗散吾則皷行驅除彼救死不暇安能為患於宫闕如此賊擒而百姓免於驚擾矣議者皆伏晟後為鳳翔節度使貞元二年九月以吐蕃侵軼遣其將王佖夜襲賊營率驍勇三千人入汧陽城戒之曰賊之大衆當過城下慎無擊其首尾首尾雖敗其中軍力全若合勢攻汝必受其弊但俟其前軍已過見五方旗虎豹衣則其中軍也突其不意可建奇功佖如言出擊之賊衆果敗副將史庭玉力戰死之辛亥吐蕃二萬餘冦鳯翔城下晟出兵禦之一夕而退劉𤣥佐徳宗貞元中為汴宋節度善用智計每李納遣使至𤣥佐必厚重贈之飾以美女恣其逰娯故多得其隂事常先為之僃故納深憚之李愬為唐鄧節度使元和十二年冬討淮西愬圍蔡州吳房縣斬首千餘級賊衆遂退或勸愬曰乘其退可遂拔吳房愬曰取之則賊必合勢而固其穴不如留之使分其力初髙霞寓袁滋相次貶逐乃以愬為唐鄧節度愬至唐州或以其下不肅為言愬曰賊方安袁尚書之寛易吾不欲使其改僃也又以其覆敗之餘人皆懼戰乃紿其下曰天子知愬柔而忍耻故使撫養爾軰戰者非吾事也軍衆信而樂之愬又歸散其優樂未嘗舉宴士卒傷夷者親自撫之賊以常敗辱二帥又以愬名位非所畏憚者不甚增其僃愬沉勇長算推誠待士故能用其卑弱之勢出賊不意居半歲知人可用乃謀襲蔡州表請濟師詔以河中鄜坊騎士三千以益之㑹賊將吳秀琳以文成柵三千人請降愬獨出至柵下與之語親釋其縳署為都將秀琳感恩因吐誠言於愬曰若欲破賊須李祐某無能為也祐者賊之驍將有膽計嘗侮易官軍去來不可僃愬召其將史用誠誡之曰今祐以衆來穫麥於張柴爾可以三百騎伏旁林中又使搖斾於前示將焚其麥者祐素易我軍必輕而來逐爾以輕騎搏之必獲祜誠如愬計擒祐而還官軍嘗苦祐皆請速殺之愬不聴又解其縳而客禮之初李愬之入蔡州自張柴行七十里比至懸瓠城夜半雪愈甚城傍有鵝鴨池愬令驚擊之以雜其聲梁氏叔琮唐末為晉州節度使初太祖屯軍於岐下晉軍潛襲絳州前軍不利晉軍恃勝而攻臨汾叔琮嚴設僃禦乃於軍中選壯士二人深目虬鬚貎如沙陀者令就襄陵縣牧馬於道周蕃冦見之不疑二人因雜其行間俄而伺隙各擒一蕃兵而來晉軍大驚且疑有伏兵遂退據蒲縣時太祖遣朱友寧兵數萬赴應悉委叔琮節制旣至諸將皆欲休軍叔琮曰若然則賊又遁矣遁則何功焉因夜出潛師截其歸路遇晉軍游騎數百盡殺之遂攻其壘拔之後為保大軍節度使圍晉陽誡衆曰有病者殺而焚之三軍咸稱不病因選精卒殿後徐而退之至石㑹闗留數馬及旌旗虚設于髙岡之上晉人疑有伏兵遂不敢追時皆服其謀也劉鄩唐末為淄州刺史淄青行軍司馬襲取兖州鄩遣細人詐為鬻油者覘兖城虚實及出入之所視羅城下一水竇可以引衆而入遂誌之鄩乃告青帥王師範請歩兵五百宵自水竇銜枚而入一夕而定末帝時為開封尹遥領鎮南軍節度使朝廷分相魏為兩鎮遣鄩率大軍屯南樂尋以精兵萬人自洹水移軍魏縣晉王來覘鄩設伏於河曲叢木間俟晉王至大譟而進圍之數匝殺獲甚衆晉王僅以身免鄩乃潛師繇黄澤西趨太原將行慮為晉軍所追乃結芻為人縳旗於上以驢負之循堞而行將數日晉人方覺軍至樂平㑹霖雨積旬師不克進鄩即整衆旋王重師唐末為潁州刺史從太祖攻濮州縦兵壞其墉濮人因屯火塞其壞壘煙焰亘空人莫敢越重師方苦金瘡卧于軍次諸將或勉之乃躍起命將士悉取軍氊􅄢投水中擲於火上重師然後率精鋭持短兵突入諸軍踵之濮州乃陷宻王友倫唐末為右武衛將軍太祖征兖鄆友倫勒所部兵收聚糧榖以濟軍須幽滄軍至内黄友倫以前鋒夜渡河擊賊奪馬千匹擒斬甚衆因引兵往八議闗卒逢晉軍萬餘騎友倫乃分布兵士多設疑軍因聲皷誓衆士伍奮躍追斬數十里劉仁恭鎮幽州素知契丹軍勢情偽選將練兵乗秋深入踰摘星嶺討之霜降秋暮即燔塞下野草以困之馬多饑死即以良馬賂仁恭以市牧地劉守光戍平州契丹舍利王子率萬騎攻之守光偽與之和張幄幕於城外以饗之羣蕃就席伏甲起擒舍利入城羣蕃聚哭請納馬五千以贖之不許欽德乞盟納賂以求之自是十餘年不敢犯塞後唐李嗣昭為昭義軍節度天祐七年從莊宗南伐胡栁之役周徳威軍不利師無行列至晩方集汴人五六萬登土山衆懼形於色莊宗欲收軍據營詰旦決戰嗣昭曰賊無營壘去臨濮數舍日已晡晩皆有歸心但以精騎撓之無令反斾晡後進擊破賊必矣我若收軍據寨賊入濮州俟彼整緝復來殆難與敵帝曰㣲兄言幾敗吾事乃與軍校主王建及為犄角大破賊軍俘斬萬級由是我軍復振王建及為衛軍都校天祐七年王師攻魏州魏人夜出犯我營建及設伏待之扼其歸路盡殪之汴將劉鄩之營莘縣月餘不出忽一旦出急兵攻鎮定之營軍中騰亂建及率銀槍勁兵千人赴之擊敗汴軍進奔至其壘十七年梁軍圍徳勝城百道齊攻又以蒙衝戰艦斷其津渡莊宗陣於北岸津路不通守將氏延賞告矢石將盡莊宗積錢帛於軍門募能破賊船者於是獻伎者數十或言能吐火焚舟或言能游水破艦或言能禁呪兵刄悉命試之卒無成效城中危急所争晷漏虎臣不能勇智士不能謀莊宗憂形於色建及擐甲而進曰賊帥傾巢昧死冀茲一舉如我師不南則彼為得計今豈可限一衣帶水而縱敵憂君今日勝負臣當効命遂以巨索聨舟十艘選効節勇卒三百人持斧被鎧鼓枻而行中流擊之賊樓船三層處蒙以牛革縣板如睥睨之制我船將近流矢雨集建及率持斧者入賊蒙衝間斬其竹䌫破賊懸楯以矟刺之因於上流取甕數百以木夾口竹笮維之又以巨索牽制積芻薪於其上灌脂沃膏火發亘天别維巨艦中實甲士乗烟皷譟賊斷紲而下沉溺者大半我軍繇是得渡帝曰周瑜得黄葢而挫曹公吾有建及卒破賊艦奇才猛將何代無之周德威為振武軍節度使天祐七年汴將王景仁軍八萬次栢鄉鎮州王鎔告難莊宗遣徳威赴之德威率騎兵致師於栢鄉設伏於村塢間令三百騎以壓汴營王景仁悉其衆結陣而來徳威轉戰而退汴軍因而乗之於髙邑南時步軍未成列徳威陳騎河上以抗之亭午兩軍皆陳莊宗問戰時徳威曰汴軍氣盛可以勞逸制之造次校力殆難與敵古者師行不踰一舍蓋慮糧餉不給士有饑色今賊逺來決戰縱挾糗糧亦不遑食晡晩之後饑渇内侵戰陣外逼士心既倦將必求退乘其勞弊以生兵制之縱不大敗偏師必喪以臣所籌利在晡晩諸將皆然之時汴軍以魏博之人為右廣宋汴之人為左廣自未至申陣勢稍却德威麾軍呼曰汴軍走矣塵埃漲天魏人收軍漸退莊宗與史建瑭安金全等因衝其陣夾攻之大敗汴軍殺戮殆盡王景仁李思安僅以身免十年冬汴軍劉鄩乗虚冦太原時德威在幽州徑以五百騎馳入土門聞鄩軍至樂平不進德威徑至南宫以候汴軍初鄩欲據臨清以扼鎮定轉餉之路行次陳宋口徳威遣將擒數十人皆倳刄於背縶而遣之既至謂劉鄩曰周侍中已據宋城矣德威其夜急騎扼臨清劉鄩乃入貝州是時徳威若不至則勝負未可知也十五年我師營麻口渡將大舉以定汴州德威自幽州率本軍至十二月二十三日軍次胡栁詰旦騎報曰汴軍至矣莊宗使問戰僃徳威奏曰賊倍道而來未成營壘我營柵已固守僃有餘既深入賊疆須決萬全之䇿此去大梁信宿賊之家屬盡在其間人之常情孰不以家國為念以我深入之衆抗彼激憤之軍不以方畧制之恐難必勝王但按軍保柵臣以騎軍疲之使彼不得下營際晩糧㸑不給進退無據因以乘之破賊之道也莊宗不從徳威遂戰没符存審為蕃漢馬歩都指揮使天祐九年莊宗討劉守光於幽州梁太祖因此北伐至于􅀥彊存審以騎軍三千屯于趙州初梁軍聲言五十萬存審以兵少不敵心頗憂之謂禆將趙行實曰朱公儻以五十萬來義軍少我作何禦待行實曰誠如是走入土門為上䇿存審曰賊軍未至難便從公之上䇿但得老賊在東别將西來尚可從容畫䇿不旬日楊師厚攻􅀥强賀徳倫冦蓨縣攻城甚急存審謂趙行實史建瑭曰吾王方事北面南鄙之事付我等數人今西道無兵蓨縣危急我等坐觀其弊何以自安老賊既下蓨城必西冦深冀不預為方畧則滋蔓難圖與公等輕騎而行偵其所向乃選精騎八百急趨信都扼下博橋道存審令史建瑭李都督分道擒生建瑭分麾下五百騎為五軍一軍之衡水一軍之南宫一軍之信都一軍之阜城自將一軍深入各命俘賊討芻糧者十人而㑹于下博橋翊日諸軍所至皆獲賊芻蕘者數百聚而殺之内緩縶一人令其逸去或教其去者云可以報朱公禡爾戰地礪爾戈矛晉王大軍至矣諸軍逸去者皆教以是言賊聞大駭李都督史建瑭各領百餘騎為賊旗幟服色與芻糧者相雜而行至暮及賀徳倫營門殺其門者縱火大呼俘斬而旋其芻蕘者斷手臂得歸皆言我兵大至朱温大駭遂命夜遁趨於貝郡蓨人持耰鋤白梃追擊汴軍收其輜車鎧仗不可勝計朱温先氣痼發動因是愈甚留貝州旬日不能乘肩輿疾作暴怒其將張正言許從實朱彦柔皆斬於軍門以其亡師蓨縣故也十七年七月梁將劉鄩尹浩冦同州先是河中節度使朱友謙以兵收復同州以其子令徳主畱務時友謙貌順友貞請同州節友貞怒其侵已不時與之遂絶友貞請麾節於我因授之友貞乃遣劉鄩與華州節度使尹浩帥兵冦同州塹其城友謙力不能救請師于我帝遣蕃漢馬歩總軍李存審昭義節度使李嗣昭代州刺史王建及帥師赴援九月王師大集於河中朝至夕渡時汴人不意王師速至劉鄩曰蒲人事晉心異貌恭假有乞師寧無猜審至於師行次舍倍道兼程計其行途未能及此李存審聞之笑謂軍吏曰兵法有出奇無窮者兵若自天而墜劉鄩善將何其昧哉汴人素輕蒲兵每遇遊騎挑戰必窮追襲存審初至率精甲千人内選二百處蒲人之間直壓賊壘賊出千騎結陣而追之遽見我師大駭而走獲賊騎五十而旋自是賊軍憚戰明日進軍朝邑時蒲中蒭粟暴貴糧餉不給駐軍浹旬人皆思戰李存審欲徐圖勝負不時聼從存審謂嗣昭曰我率偏師入㓂境蒲中久為賊有人心尚懐兩端事一差跌則吾屬無類且蒲人羸懦不可驅以爭鋒惟悉我師又衆寡不敵持久則資糧不足求戰則勝負難知每一揣謀令人鬚白公方畧如何嗣昭曰我數千里興兵與人解鬬儻無成績則失屬亡師今日良圖無踰急戰存審曰予所料度非不至此但同州南距渭河又數十里連接華州若逼動賊軍夾河結壘持久不戰以逸待勞俟我饋運不充蒲人離貳事生不測吾軰安歸不如示弱按兵侈其鬭志觀其進取然後決機軍士口譚未可取信嗣昭曰善又旬日望氣者言夜見西面黒氣如鬬雞之狀必有戰陣存審曰吾方欲决戰而形於氣象得非天贊我歟召嗣昭友謙聚謀下令軍中誡示所向遲明進軍距於賊壘賊罄壘而出蒲人在南我師在北騎軍既接蒲人小退賊呼曰冀王走矣為賊所躡嗣昭以精騎抗之大軍繼逼賊遂奔潰追斬二千級值夜劉鄩以餘衆保營自是閉壁不出居半月存審謂嗣昭曰予所料者懼劉鄩據渭結營持久待我今精兵亡敗退走無門戰窮摶人勿謂無事不如開其走路然後追奔因令王建及牧馬于沙苑劉鄩知之遂宵遁我師追及渭河棄鎧投仗相蹈藉所收輜重不可勝計劉鄩尹浩單騎獲免李存賢權典沁州天祐九年正月汴人將襲州城伏於城下存賢意其奸變遲明命守陴者皆皷譟如攻戰之勢賊謂我掩襲伏兵大駭因四面攻吾門分兵禦捍至午賊退閻寶為天平軍節度使天祐十四年從明宗援幽州敗契丹指陳方畧多中事機十五年胡栁之役諸軍逗撓汴軍登無石山其勢甚盛莊宗望之畏其不敵且欲保營寶進曰王深入敵境偏師不利王彦章騎軍已入濮州山下唯列歩兵向晩皆有歸志我盡鋭擊之敗走必矣今若引退必為所乘我軍未集更聞賊勝即不戰而自潰也凡决勝料勢决戰料情情勢已得斷在不疑今王之成敗在此一戰若不决戰設使餘衆渡河河朔非王有也王其勉之莊宗聞之聳聼曰㣲公幾失計即引騎大譟奮矟登山大敗汴人郭崇韜同光末為招討使伐蜀軍入大散闗崇韜以馬箠指山險謂魏王繼岌曰朝廷興師十萬已入此中儻不成功安有歸路今岐下飛輓才及旬日必須先取鳯州收其儲積方濟吾事乃令李嚴康延孝先馳書檄以諭偽鳯州節度使王承捷及大軍至承捷果以城降得兵八千軍儲四十萬次至故鎮偽命屯駐指揮使唐景思亦以城降得兵四千又下三泉得軍儲三十餘萬自是師無匱乏軍聲大振其招懐制置官吏補署師行籌畫軍書告諭皆出於崇韜繼岌承命而已康延孝為保義軍節度使四川行營先鋒使延孝既收綿州蜀主王衍斷綿江浮梁而去水深無舟檝可渡延孝謂招撫使李嚴曰吾懸軍深入利在急兵乘王衍破膽之時人心離沮但得百騎過鹿頭闗彼即迎降不暇如俟脩繕津梁便留數日若王衍堅閉近闗折吾兵勢儻延浹旬則勝負莫可知也宜促騎渡江因與李嚴乘馬浮江于時得濟者僅千人歩軍溺死者亦千餘人延孝既濟長驅過鹿頭進據漢州居三日部下後軍方至偽蜀六軍使王宗弼令人持牛酒幣馬歸欵旬日間兩川平定晉范延光初仕後唐為宣徽使明宗幸夷門至滎陽聞朱守殷拒命延光曰若不急攻則賊城堅矣請騎兵五百臣先赴之則人心必駭明宗從其請延光自酉時至夜星馳二百餘里奄至城下與賊交鬬翌日守陴者望見乘輿乃相率開門延光乃入與賊巷戰至厚載門盡殱其黨明宗嘉之漢趙暉乾祐初除鳯陽節度使屬王景崇盗據岐山期不受代朝廷即命暉為西南面行營都部署統兵以討之時李守貞叛於蒲趙思綰據于雍景崇皆援之及引蜀軍出自大散闗勢不可遏暉領兵數千數戰而勝然後塹而圍之暉屢使人挑戰賊終不出暉乃潛使千餘人於城南一舍之外擐甲執兵偽為蜀兵旗幟循南山而下詐令諸軍聲言川軍至景崇乃令數千人潰圍而出以為應援暉設伏而待一皷而盡殪之自是景崇膽破無復敢出明年拔之册府元龜卷三百六十七
