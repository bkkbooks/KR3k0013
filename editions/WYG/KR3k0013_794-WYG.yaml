body:
  text: 册府元龜卷七百九十四宋王欽若等撰總録部知禮家法矜嚴知禮夫衣冠中而動作慎有方之士也是故君子以禮自防擇地而蹈著誠而去偽别嫌而明微如衡誠懸豈輕重之或爽猶水在器故方圓而有凖處閨門則宗族序在朝廷則君臣正祗庸之徳於是乎生殆辱之尤無自而入信哉釋囘増美安上治民捨禮何以哉石祁子衛大夫駘仲之子也駘仲卒無適子有庶子六人卜所以為後者曰沐浴佩玉則兆卜者言齊潔沐浴則得吉兆五人者皆沐浴佩玉石祁子曰孰有執親之䘮而沐浴佩玉者乎不沐浴佩玉心正且知禮石祁子兆衛人以龜為有知也季武子魯大夫武子成寢武子魯公子季友之曾孫季孫杜氏之葬在西階之下請合葬焉許之入宫而不敢哭武子曰合葬非古也自周公以來未之有改也自見夷人寝墓以為宅欲文過吾許其大而不許其細何居命之哭記此者善其不奪人之恩延陵季子呉公子也適齊於其反也其長子死葬於贏博之間季子名札譲國居延陵因號焉春秋傳謂延州來贏博齊地今泰山縣是也孔子曰延陵季子呉之習於禮者也徃而觀其葬焉徃弔之其坎深不至於泉以生恕死其歛以時服以行時之服不改制節既葬而封廣輪揜坎其髙可隠也既封左袒右還其封且號者三曰骨肉歸復於土命也若魂氣則無不之也無不之也還圍也號哭且言也命猶性也而遂行行去也孔子曰延陵季子之於禮也其合矣乎陳尊己魯人乾昔之子乾昔寝疾屬其兄弟而命尊己曰如我死則必大為我棺使吾二婢子夾我婢子妾也乾昔死其子曰以殉葬非禮也况又同棺乎弗果殺善尊己不䧟父於不義孔子在衛有送葬者而夫子觀之曰善哉為䘮乎足以為法矣小子識之子貢曰夫子何善爾也曰其徃也如慕其反也如疑慕謂小兒戀父母啼呼疑者哀親之在彼如不欲還然子貢曰豈若速反而虞乎子曰小子識之我未之能行也哀戚本也祭祀末也仲由字子路為季氏宰宰治邑吏也季氏祭逮闇而祭日不足繼之以燭謂舊時也雖有强力之容肅敬之心皆倦怠矣以其久也有司跛倚以臨祭其為不敬大矣偏任為跛依物為倚他曰祭子路與室事交乎户堂事交乎階質明而始行事晏朝而退室事祭時堂事殯尸孔子聞之曰誰謂由也而不知禮乎多其知禮曽參武城人與客立於門側其徒趨而出徒謂客之旅曽子曰爾將何之曰吾父死將出哭於巷以為不可發凶於人館曰反哭於爾次次舍也禮館人使專之若其自有焉曽子北靣而弔焉曽子寢疾病病謂病困樂正子春坐於床下子春曽参弟子曽元曽申坐於足元申曽參之子童子隅坐而執燭隅坐不與成人並坐童子曰華而睆大夫之簀與華畵也簀謂床笫也説者以睆為刮節目字或為刮子春曰止以病困不可動曽子聞之瞿然曰呼呼虛憊之聲曰華而睆大夫之簀與曽子曰然斯季孫之賜也我未之能易也元起易簀未之能易已病故也曽元曰夫子之病革矣不可以變幸而至於旦請敬易之言夫子者曽子親沒之後齊嘗聘以為卿而不為也革急也變動也幸覩也曽子曰爾之愛我也不如彼彼童子也君子之愛人也以徳成己之徳細人之愛人也以姑息息猶安也言茍容取安也吾何求哉吾得正而斃焉斯已矣斃仆也舉扶而易之反席未安而沒言命雖困猶勤於禮言偃字子游孔子弟子也曽子弔於負夏負夏衛地主人既祖填池祖謂移柩車去載處為行始也填池當為奠徹去聲之誤也奠徹謂遣奠徹祖推柩而反之反之於載處曽子欲更始降婦人而後行禮禮既祖而婦人降今反柩婦人辟之復升堂矣柩無反而復反之而又降婦人葢欲矜賔於此皆非禮也從者曰禮與怪之曽子曰夫祖者且也且未定之辭其不可以反宿也從者又問諸子游曰禮與疑曽子言非子游曰飯於牖下小歛於户内大斂於阼殯於客位祖於庭葬於墓所以即逺也故䘮事有進而無退明反柩非曽子聞之曰多矣乎予出祖者子游且服曽子襲裘而弔子游裼裘而弔曽子指子游而示人曰夫夫也為習於禮者如之何其禓裘而弔也曽子葢知臨䘮無飾夫夫猶言此夫也子游於時名為知禮主人既小斂􅃝括髪子游趨而出襲裘帶絰而入於主人變乃變也所弔者朋友曽子曰我過矣我過矣夫夫是也服且善子游卜商字子夏孔子弟子也孔子之䘮有自燕來觀者舍於子夏氏子夏曰聖人之葬人與人之葬聖人也子何觀焉與及也昔者夫子言之曰吾見封之若堂者矣封築土為壟堂形四方而高見若坊者矣坊形旁殺平上而長見若覆夏屋者矣屋謂茨芃也夏屋今之門廡也其形旁廣而平見若斧者矣斧形旁殺刃上而長從若斧者焉孔子以為刃上難登狹又易為功馬鬛封之謂也谷閫名今一日而三斬板而已封板葢廣一尺長六尺斬板謂斷其縮也上斷止之旁殺盖髙四尺其廣袤未聞也詩云縮板以載尚行夫子之志乎哉尚庶幾也孔伋字子思魯人孔子之孫也子思之母死於衛子思伯魚之子伯魚卒其妻嫁於衛栁若謂子思曰子聖人之後也四方於子乎觀禮子盍慎諸栁若衛人也見子思欲為嫁母服恐其失禮戒之嫁母齊衰期也子思曰吾何慎哉吾聞之有其禮無其財君子弗行也謂時可行而財不足以備禮有其禮有其財無其時君子弗行也謂財足以備禮而時不得行者吾何慎哉時所止則止時所行則行無所疑也䘮之禮如子贈禭之屬不踰主人曽子謂子思曰伋吾執親之䘮也水漿不入於口者七日言已以疾時禮而不如子思曰先王之制禮也過之者俯而就之不至焉者跂而及之故君子之執親之䘮也水漿不入於口者三日杖而後能起為曾子言難繼以禮御之縣子魯人也陳莊子死赴於魯魯人欲勿哭君無哭鄰國大夫之禮陳莊子齊大夫陳常之後名伯繆公召縣子而問焉縣子曰古之大夫束修之問不出境雖欲哭之安得而哭之言時君弱臣强政在大夫專盟㑹以交接且臣聞之哭有二道有愛而哭之有畏而哭之以權微勸之公曰然然則如之何而可縣子曰請哭諸異姓之廟於是與哭諸縣氏漢石奮為中大夫過宫門闕必下車趨見路馬必軾焉路馬天子路車之馬軾謂凭軾盖為敬也後漢馬援為伏波將軍嘗有疾梁松友候之獨拜牀下援不答松去後諸子問曰梁伯孫帝婿貴重朝廷公卿以下莫不憚之大人奈何獨不為禮援曰我乃松父友也雖貴何得失其序乎禮記曰見父之執友不謂之進不敢進不謂之退不敢退不問不敢對鄭𤣥曰敬父同志如事父也張湛為左馮翊後告歸平陵望寺門而歩主簿進曰明府位尊徳重不宜自輕湛曰禮下公門軾路馬孔子於鄉黨恂恂如也父母之國所宜盡禮何謂輕哉呉虞聳為河間太守疾俗䘮祭無度弟昺卒祭以少牢酒飰而已當時族黨竝尊行之宋王𢎞晉末為㑹稽王道子驃騎參軍父珣卒未免䘮後將軍元顯以為諮議參軍加寜逺將軍知記室事固辭不就道子復以為諮議參軍加建威將軍領中兵又固辭時内外多難在䘮者皆不終其哀惟𢎞固執得免南齊殷叡字文子晉荆州刺史仲堪五世孫叡觧義有口才司徒禇淵甚重之謂之曰諸殷自荆州以來無出卿右者叡斂容答曰殷族衰悴誠不如昔若此㫖為虛故不足降此㫖為實彌不可聞梁謝朏初仕宋為衛將軍長史明帝嘗勅朏與謝鳯子超宗從鳯莊門入二人俱至超宗曰君命不可以不徃乃趨而入朏曰君處臣以禮進退不入時人兩稱之以比王尊王陽後魏李諧為給事黄門侍郎遭母憂還鄉里徴為素尹將軍如故以禫制未終表辭朝儀亦以為優仍許其讓唐王珪為侍中子敬直尚帝女南平公主禮有婦見舅姑之儀自王姬下降此事多畧珪曰此禮之廢由來久矣今陛下欽明動循法制吾受公主謁見豈為身榮哉所以成國家之美耳於是夫妻西向坐公主親執笄行盥饋之道禮成而退物議善之自是公主有舅姑者備婦禮自珪始也李大亮為長安副留守遇疾臨終歎曰吾聞禮男子不死婦人之手於是命屏婦人言終而卒苖晉卿上黨壺闗人為魏郡太守河北採訪使㑹入計因陳表請歸鄉里既至壺闗望縣門而歩小吏進曰太守位髙徳重不宜自輕晉卿曰下公門軾路馬况父母之國所宜尊敬汝何言輕哉大㑹鄉黨歡飲累日而去崔造為建州刺史興元元年詔徴至藍田自以源休之甥休與朱泚作亂上疏請罪不敢赴闕帝以為有禮優詔慰勉拜吏部郎中後唐宋令詢不知何許人也事閔帝藩邸知書樂善動皆由禮晉張礪初仕後唐為翰林學士未幾父之妾卒初妾在世礪以久侍先人左右頗亦敬奉諸幼子以祖母呼之及卒礪疑其事詞於同僚未有以對礪即託故歸於金陽閑居三年不行其服論情制宜識者韙之馬全節為鄴都留守以元城是桑梓之邑具白襴詣縣庭謁拜縣令沈遘遘逡巡避之不敢當禮全節曰父母之鄉自合致敬勿讓之也州里榮之家法易曰家人嗃嗃悔厲吉傳曰父子篤兄弟睦夫婦和家之肥也葢夫閨門之内徳範所出位在乎正治尚乎嚴故能致恭肅之美流敦睦之譽古之君子莫不先内治而後施於有政者也乃有禮同賓饋法如官司進止有常體貌無懈由是少長咸叙孝慈兼篤茂亢宗之徳藹王家之訓聳人倫之瞻仰著方來之模楷非夫仁厚成性徳義居質者亦何能及是哉冀缺晉人晉大夫臼季使舍於冀野冀缺耨其妻饁之敬相待如賓夫婦相敬如賓士㑹晉人為大夫家事治漢石奮孝景季年以上大夫禄歸老於家子孫為小吏來歸謁奮必朝服見之不名子孫有過失不誚讓為便坐便坐於便側之處非正室也對案不食然後諸子相責因長老肉􅃝固謝罪改之乃許子孫勝冠者在側雖燕必冠申申如也申申整勑之貌僮僕訢訢如也訢訢敬謹之貌唯謹唯以謹敬為先帝時賜食於家必稽首俯伏而食如在帝前其執䘮哀戚甚執䘮禮記曰執親之䘮子孫遵教亦如之奮家以孝謹聞乎郡國雖齊魯諸儒質行皆自以為不及質重也子慶出為齊相齊國慕其家行不治而齊國大治不治言無所治罰後漢李守通父也為王莽宗師卿為人嚴毅居家如官廷守居家與子孫尤謹閨門之内如官廷也鄧禹有子十三人各使守一藝修整閨門教養子孫皆可以為後世法禹位至太傅樊重南陽湖陽人也性温厚有法度二世共子孫朝夕禮敬常若公家張湛字子孝扶風平陵人動止有則居處幽室必自修整雖遇妻子若嚴君焉易家人卦曰家人有嚴君焉父母之謂也位大中大夫馮艮字君卿志行髙整非禮不動遇妻子如君臣鄉黨以為儀表仇覽初為蒲亭長後入太學學畢歸鄉里州郡竝請皆以疾辭雖在宴居必以禮自整妻子有過輒免冠自責妻子庭謝候覽冠乃敢升堂家人莫敢喜怒聲色之異陳紀字元方太丘長實之子兄弟孝養閨門雝和後進之士皆推慕其風位大鴻臚司馬防厯官京兆尹以年老轉拜騎都尉養志閭巷闔門自守諸子雖冠成人不命曰進不敢進不命曰坐不敢坐不指所有問不敢言父子之間肅如也魏裴潛清潔守道每為牧守而父在京師出入薄軬車羣弟之田廬常歩行家人小大或并日而食其家教上下相奉事有似於石奮其履檢校度自魏興少能及者常林好學帶經耕鉏妻嘗自饋餉之林雖在田野其相敬如賓位光禄大夫曹純仍父業富於財僮僕人客以百數純綱紀督御不失其理鄉里咸以為能位議郎叅司空軍事呉劉基字正輿繇之子也基遭多難妻子困苦潛處味道不以為戚與羣弟居嘗夜卧早起妻妾希見其靣諸弟敬憚事之猶父不妄交游門無雜賓位光禄勲晉何曽性至孝閨門整肅自少及長無聲樂嬖幸之好年老之後與妻相見皆正衣冠相待如賓已南向妻北靣再拜上酒酬酢既畢便出一嵗如此者不過再三焉位太傅庾亮風格峻整動由禮節閨門之内不肅而威時人或以為夏侯太初陳長文之倫也太初𤣥字長文羣字位安西將軍孫盛性方嚴有軌憲雖子孫班白而庭訓愈峻位祕書監宋謝𢎞微從叔峻以為嗣事係親之黨恭謹過常伯叔二母歸宗兩姑晨夕瞻奉盡其誠敬内外或傳語通訊輒正其衣冠位右衛將軍南齊王延之為右光禄大夫竟陵王師家訓方嚴不妄見子弟雖節歲問訊皆先冠曰子倫之見兒子亦然劉璡為武陵王華征虜參軍璡兄瓛夜隔壁呼璡共語璡不答方下牀著衣立然後應瓛問其久璡曰向束帶未竟其立操如此梁劉潛奉寡嫂甚謹家内目細必定諮嫂與妻子朝夕供事未嘗失禮人稱之位豫章内史范雲為僕射雲性篤睦事寡嫂盡禮家事必先諮而後行陳王錫為左僕射兄弟三十餘人居家篤睦每嵗時饋遺遍及近親敦誘諸弟竝禀其規訓後魏李敷兄弟敦崇孝義家門有禮至於居䘮法度吉凶書記皆合典則為北州所稱美崔浩母盧氏湛孫也浩著食經叙曰予自少及長耳目聞見諸母諸姑所修婦功無不藴習酒食朝夕養舅姑四時祭祀雖有功力不任僮使嘗手自親焉昔遭䘮亂饑饉仍臻饘蔬餬口不能具其物用十餘年間不復備設先妣慮久廢志後生無知見而少不習業書乃口授為九篇文辭約舉婉而成章聰辯强記皆此類也位撫軍上將軍楊椿弟津孝友大至兄弟皆有孫惟椿有曽孫年十五六矣椿嘗欲為之早娶望見𤣥孫自椿子昱以下率多學尚時人莫不欽羡焉一家内男女百口緦服同爨庭無間言魏世以來惟有盧淵兄弟及椿昆季當世莫逮焉椿位太保盧度世子淵昶等父母亡後百口同居親從昆弟嘗旦省諸父出坐别室至暮乃入廟府之外不妄交遊其相率以禮如此許詢字伯禮頗有業尚閨門雍睦三世同居吏部尚書李神儁嘗稱其家風宋推字季預性清嚴治家如官府鄭瓊兄弟雍睦其諸娣姒亦咸相親愛閨門之内有無相通為時人所稱美辛少雍為給事中性仁厚有禮義門内之法為時所重少雍卒妻王氏有徳義與其從子懐仁兄弟同居懐仁等事之甚謹閨門禮讓人無比焉士大夫以此稱美崔挺子孝芬孝暐兄弟孝義慈厚弟孝演孝政先亡孝芬等哭泣哀慟絶肉蔬食容貌損瘠見者傷之孝暐等奉孝芬盡恭順之禮坐食進退孝芬不命則不敢也鷄鳴而起旦參顔色一錢尺帛不入私房吉凶有需聚對分給諸婦亦相親愛有無共之始挺兄弟同居孝芬叔振既亡之後孝芬等奉承叔母李氏若事所生旦夕温凊出入啓謹家事巨細一以諮决每兄弟出行有獲財物尺寸以上皆内李氏之庫四時分賚李自裁之如此者二十餘嵗撫從弟宣伯子朗如同氣焉挺弟振字延根少有學行亦居家孝友為宗族所稱挺位北海王詳司馬北齊髙隆之為太保録尚書寡姊為尼事之如母訓督諸子必先文義世甚以此稱之崔㥄為侍中㥄一門婚嫁皆是衣冠之美吉凶儀範為時所稱位東兖州刺史羊烈家傳素業閨門修飾為世所稱一門女不再醮太和中於兖州造一尼寺女寡居無子者竝出家為尼咸存戒行位驃騎將軍後周李和爲柱國大將軍和立身剛簡老而愈勵諸子趨事若奉嚴君裴俠撰九世伯祖貞侯潛傳述裴氏清公欲使後生奉而行之宗室中知者咸付一通栁靖河東解人也為廣徳郡守隋文帝受禪遂退居鄉里閉門自守子弟奉之若嚴君焉其有過者靖必下帷自責於是長㓜相率拜謝庭下靖然後見之朂以禮法鄉里亦慕而化之或有不善者皆曰惟恐栁廣徳知也隋栁敏有髙名好禮篤學治家如官位太子太保崔𢎞度理家如官子弟班白動行箠楚閨門整肅為當時所稱位撿校太府卿唐李勣為司空閨門之内肅若嚴君位太子太師崔祐甫字貽孫太子賓客沔之子家以清儉禮法為士流敬慕位中書侍郎平章事李晟封西平王理家以嚴稱諸子姪非晨昏不得謁見言不及公事視王氏甥如己子嘗正嵗崔氏女歸省未及階晟却之曰爾有家况姑在堂婦當奉酒供以待賓客遂不視而遣還家其達禮敦教如此郭曜尚父汾陽王子儀長子曜性孝友亷謹子儀出征居外曜當留治其家少長千人各得其所位太子少保穆寜子贊與弟質員賞皆以家行人才為縉紳所仰贊官達父母尚無恙家法清嚴贊兄弟奉指使笞責如僮僕贊最詳謹至今言家法者以穆寜為嚴訓之家寜位祕書監晉張仁愿兄仁頴善治家勤而且約婦女衣不曳地什物多厯年所如新市焉位大理卿周裴羽為左常侍性謙恭静守居家嚴肅累將命於四方不渝所履頃在雒邑其隣未嘗聞一日諠譁故終身無玷時論多之鄭受益唐宰相餘慶之曽孫也餘慶生澣澣生從讜兩為太原節度使再登相位從讜兄處誨為汴州節度使家襲清儉深有士風中朝禮法以鄭氏為甲處誨生受益受益亦以文學致身累厯臺閣矜嚴容止可觀傳紀孝熈之徳威儀不忒詩稱宜弟之風豈君子佩服前訓淑慎厥躬方正積中而端莊發外風範詳雅而進退矜嚴周旋中規折旋中矩動有常度識視而不差居無隋容造次而罔失雖處闇而必整抑在野而益嚴正色詳言對妻子而無斁閒居燕處聞雷雨而必變逺暴慢於朋友化真厚於閨門足以儀表薦紳鎮静雅俗仲尼云正其衣冠尊其瞻視儼然人望而畏之其是之謂乎漢董仲舒進退容止非禮不行學士皆師尊之後為膠西王相儁不疑字曼倩渤海人為郡文學武帝末直指使者暴勝之至渤海遣吏請與相見不疑冠進賢冠𢃄櫑具劍古長劍首似玉作并鹿盧形上刻木作山形刻似蓮花初生未敷今大劍木首其狀似此佩環玦𢃄玉環又有玉玦褒衣博帶褒大裾也言著褒大之衣廣博之𢃄也盛服至門上謁上謁若今通名也門下欲使觧劍不疑曰劍者君子武備所以衛身不可觧請退吏白勝之勝之開閤延請望見不疑容貌莊嚴衣冠甚偉勝之躧履起迎履不著跟曰躧謂納履未正曵之而行言其遽也後為京兆尹霍光為大將軍封博陸侯為人沈静詳審出入下殿門進止有常處郎僕射竊識視之不失尺寸其資性端正如此後漢李忠初以父任為郎署中數十人而忠獨以好禮修整稱王莽時為新博屬長王莽改信都國曰新博郡尉曰屬長郡中咸敬信之侯覇字君房為太子舍人矜嚴有威容張湛字子孝扶風平陵人也矜嚴好禮動止有則居處幽室必自修整及在鄉黨詳言正色三輔以為儀表終太中大夫朱暉性矜嚴進止必以禮諸儒稱其髙位至尚書令徐防明帝永平中舉孝亷除為郎體貌矜嚴占對可觀帝異之刁韙為東海相常以法度自整家人莫見其惰容焉魏郎為尚書被黨議免歸家性矜嚴閉門整法度家人不見惰容鄧訓雖寛中容衆而於閨門甚嚴兄弟莫不敬憚諸子進見未嘗賜席接以温色後為䕶羌校尉朱穆少有英才學明五經性矜嚴疾惡不交非類年二十為郡督郵袁安為人嚴重有威敬見於州里初為郡功曹茅容字季偉陳留人年四十餘耕於野時與等輩避雨樹下衆皆夷踞相對夷平也踞蹲也容獨危坐愈恭郭林宗行見之而竒其異遂與共言侯瑾敦煌人也常以禮自持獨處一房如對嚴賔焉州郡累召公車有道徴稱疾不到司馬防性質直方雖閒居宴處威儀不忒位至騎都尉魏崔琰為中尉甚有威重朝士瞻望而太祖亦敬憚焉王朗髙才博雅而性嚴整慷慨多威儀位至司空呉吕範為揚州牧性好威儀州民如陸遜全琮及貴公子皆修敬䖍肅不敢輕脱晉和嶠字長輿少有風槩慕舅夏侯𤣥之為人厚自崇重有盛名於世朝野許其能整風俗理人倫位至太子太傅王劭字敬倫美姿容有風操雖家人近習未嘗見其惰替之容桓温甚器之終呉國内史孫晷呉國富春人恭孝清約學識有理義每獨處幽闇之中容止瞻望未嘗傾邪徴辟竝不就庾亮字元規年十六東海王越辟為掾不就隨父在㑹稽嶷然自守時人皆憚其方嚴莫敢造之宋謝𢎞微性嚴整舉止必修禮度婢僕之前不妄言笑由是尊卑小大敬之若神位至侍中王敬𢎞形狀短小而坐起端方桓𤣥謂之彈棊八勢位至左光禄大夫王𤣥謨性嚴未嘗妄笑時人言𤣥謨眉頭未曾伸後終於都督孔顗為安陸王冠軍長史又隋府轉後軍長史凡二府長史典籖諮事不呼前不敢前不令去不敢去顔竣為吏部尚書容貌嚴毅謝方明初為髙祖主簿性嚴恪雖處闇室未嘗有惰容無他技能自然有雅韻范藹畢之子幼而整潔衣服竟嵗未嘗有塵㸃及曄反伏誅袁粲字景倩峻於儀範清整有風操自遇甚髙梁僕射張稷曰公見人輙矜嚴位至司徒侍中南齊江軻字伯倫真嚴有孝行宗人江槩位至侍中性豪侈惟見軻則敬挹焉王思逺立身簡潔明帝弟季敞性甚豪縱使詣思逺令見禮度都水使者季珪之嘗曰見王思逺終日安坐不妄言笑簮㡌衣領無不整潔便憶丘明士見明士蓬頭㪚𢃄終日酣醉吐論縱横唐突卿宰便憶見思逺言其兩反也思逺位至侍中梁范岫恭敬嚴恪進止以禮位至金紫光禄大夫王茂為中權將軍居處方正在一室衣冠儼然雖僕妾莫見其惰容何敬容為太子中庶子性矜莊衣冠尤事鮮麗每公庭就列容止出入後梁栁洋河東解人少有文學以禮度自居與王湜俱以風範方正為當時所重位至吏部尚書陳蕭引字叔休方正有器局望之儼然雖造次之間必由法度釋褐著作郎顧野王少篤學至性知名在物無過辭失色觀者貌似不能言及其勵精履行皆人所莫及位終光禄卿後魏封軌善自修潔儀容甚偉或曰學士不事修飾此賢何獨如此軌聞笑曰吾聞君子整其衣冠尊其瞻視何必蓬頭垢靣然後為賢言者慙退位至征虜將軍常爽嚴正有志槩雖家人僮𨽻未嘗見其寛誕之容後為宣威將軍裴粲為𢎞農太守免官曽詣清河王懌下車始進便屬暴雨粲容歩舒雅不以霑濡改節懌乃令人持葢覆之歎謂左右曰何代無竒人北齊崔瞻字彦通清河東武城人聰明强學有文情善容止神采嶷然言不妄發年十五刺史髙昻署主簿劉禕字彦英彭城人性宏裕有威重身長六尺容止可觀雖昵友密交朝夕遊處莫不加敬位至睢州刺史趙將父彦深有七子將最知名沈敏有父風温良恭儉雖妻子亦未嘗怠慢終日儼然位為㪚騎常侍後周長孫紹逺魏太師雅之子性寛容有大度望之儼然朋儕莫敢䙝狎位至少司空唐瑾為中大夫兼内史瑾性方重有風格退朝休暇常著衣冠以對妻子遇迅雷烈風雖閑夜宴寢必起冠帶端笏危坐長孫僉少方正有操行狀貌魁梧神彩嚴爽雖在私室終日儼然性不妄交非其同志雖貴遊造門亦不與相見及為大行臺尚書兼相府司馬嘗與羣公侍坐於太祖及退太祖謂左右曰此公閑雅孤每與語嘗肅然畏敬恐其所失後為荆州總管嘗詣闕奉事時值大雪遂立於雪中待報自旦逹暮竟無惰容其奉公勤至皆此類也裴􅃉河東聞喜人性方嚴為州里所推挹為從事中郎隋令狐熈性嚴重有雅量雖在私室終日儼然不妄通賔客凡所交結必一時名士起家吏部上士唐李暠為太常卿厯工部尚書東都留守風儀秀整所厯皆以威重見稱韋陟自㓜風標整峻獨立不羣位至吏部尚書韋斌好修整尚文藝容止嚴厲有大臣體位至太常少卿鄭珣瑜為河南尹迎送中使皆有常處吏窺之馬足差跌不出三五歩崔郾資質偉秀神情雅重人望愛之終不可洽不知者以為事髙簡拘静黙耳終於浙江觀察使令狐楚威儀儼整望之若不可犯性寛厚愛重而門無雜賔嘗與從事醼語方酣有非類偶至因立命徹去筵席毅形語色故累居重任正直之稱如初梁趙凝為襄州節度使氣貌甚偉好自修檢每整衣冠必使人持巨鑑前後照之對客之際烏巾上微覺有塵即令侍妓持紅拂以拂之人有誤犯其家諱者徃徃遭其檟楚其方嚴也如是後唐趙光逢風神秀異從微至著動守規簡見者肅然議者器之自為玉界尺位至司空平章事册府元龜卷七百九十四
