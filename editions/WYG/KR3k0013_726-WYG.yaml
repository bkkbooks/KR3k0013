body:
  text: 册府元龜卷七百二十六宋王欽若等撰幕府部辟署漢氏公卿郡守皆得自舉其屬中興之後辟召尤盛故當時幕府彬彬然多賢才焉魏晉而下内居宰弼之任外膺將領之寄者曷嘗不選衆而舉得人爲盛哉盖夫藩輔之重安危注意綱紀之職左右惟人故能叅賛扵策畫經綸扵政務藹涖官之嘉績昭治戎之善志周旋翊佐以成其美焉至乃羔鴈之贄璧馬之聘盖所以致禮才彦將其厚意然而宣尼有擇木之喻展禽懷枉道之耻若夫含忠履潔之士非志義相期而用舎同趣又豈肯屈身而茍合哉漢倪寛爲廷尉從史之北地視畜數年還至府上畜簿㑹廷尉時有疑奏已再見郤矣掾史莫知所爲寛爲言其意掾史因使寛爲奏成讀之皆服以白廷尉湯湯大驚召寛與語乃竒其材以爲掾湯繇是鄉學以寛爲奏讞掾甚重之及湯爲御史大夫以寛爲掾蕭望之署小苑東門候免歸爲郡吏御史大夫魏相除望之爲屬尹翁歸河東人太守田延年除補卒吏案事發姦窮竟事情延年大重之自以能不及翁歸徙署郵督薛廣徳字長卿蕭望之爲御史大夫除廣徳爲屬數與論議噐之馮奉世以選爲郎前將軍韓増奏以爲軍司空令本始中從事擊匈奴軍罷復爲郎陳湯免射聲校尉大將軍王􅃫奏以爲從事中郎幕府事盡决扵湯王尊涿郡人給事太守府問詔書行事尊無不對太守竒之補除書佐署守屬監獄久之稱病去復召署守屬治獄為郡决曹諸葛豐字少季以明經爲郡文學名特立剛直貢禹爲御史大夫除豐爲屬舉侍御史孫寳潁川人以明經為郡吏御史大夫張忠辟寳為屬欲令授子經更為除舎設儲偫寳自劾去忠固還之心内不平後署寳主簿寳徙入舎祭竈請比隣忠隂察怪之使所親問寳前大夫為君設除大舎子自劾去者欲為髙節也今两府髙士俗不為主簿子既為之徙舎甚説何前後不相副也寳曰髙士不為主簿而大夫若以寳為可一府莫言非士安得獨自髙前日君男欲學文而移寳自近禮有來學義無往教道不可詘身詘何傷且不遭者可無不為况主簿乎忠聞之甚慙侯文京兆故吏剛直不茍合嘗稱疾不肯仕孫寳為京兆尹以恩禮請文欲為布衣友日設酒食妻子相對文求署為掾進見如賓禮數日以立秋署文東部督郵厚渉字巨先父為南陽太守父死渉還南陽賻送行喪塜廬三年繇是顯名京師禮畢扶風謁請為議曺陳咸為御史中丞頗言石顯短後坐事减死髠為城旦因廢成帝初即位大将軍王􅃫以咸前指言石顯有忠直節奏請咸補長史杜欽延年子也王􅃫以外戚輔政求賢以自助􅃫父頃侯禁與欽兄緩相善故􅃫深知欽能奏請欽為大将軍武庫令職閒無事欽所好也谷永為長安小吏博學經書建昭中御史大夫繁延夀聞其有茂材除補屬舉為太常丞杜鄴以病去郎王商為大司馬衛将軍除鄴以為腹心舉侍御史母将隆字君房王音為大司馬車騎将軍内領尚書外典兵馬踵故選置從事中郎踵猶躡也言承躡故事也與叅謀議奏請隆為從事中郎後漢卓茂初辟丞相府史事光光稱為長者董均建武中舉孝亷司徒府博通古今數言政事魯㳟扶風平陵人十五與弟丕俱舉大學兄弟俱為諸儒所稱㳟憐弟丕小欲先就其名託疾不仕郡舉丕方正恭始為郡吏大傅趙熹聞而辟之尹敏待詔公車拜郎中辟大司空府呉良齊國人初為郡吏嵗旦與掾史入賀門下掾王望舉觴上夀謟稱太守功徳良勃然責之太守歛容而止轉良功曺耻以言受進終不肯謁時驃騎将軍東平王蒼聞而辟之署西曹甚相敬愛董宣初為司徒侯覇所辟舉髙第累遷北海相鮑永字君長上黨人父宣哀帝時任司𨽻校尉為王莾所殺永為郡功曺莾以宣不附已欲滅其子孫都尉路平承望風㫖規欲害永太守茍諌擁䕶召以為吏嘗置府中諌卒永自送喪歸扶風平遂収永弟升新太守趙興到聞乃歎曰我受漢茅土不能立節而鮑宣死之豈可害其子也勅縣出升復署永功曹周澤建武末辟大司馬府署議曹祭酒數月徴試博士衛颯字子産建武二年辟大司徒鄧禹府舉能案劇除侍御史王景少學易沈深多伎藝辟司徒伏恭府崔駰善屬文竇憲為車騎将軍辟駰為掾憲府貴重掾屬三十人皆故刺史二千石唯駰以處士年少擢在其間及憲遷大将軍復以傅毅為司馬班固為中䕶軍憲府文章之盛冠於當世杜篤字季雅車騎将軍馬防擊西羌請為從事中郎将戰殁於射姑山第五倫京兆長陵人京兆尹閻興召倫爲主簿樂恢京兆長陵人為郡功曺辟司空牟融府何敞扶風平陵人元和中辟太尉宋繇府繇待以殊禮胡廣南郡人六世祖剛清髙有志節平帝時大司徒馬宫辟之桓榮字春卿少習歐陽尚書教授江淮間年六十餘始辟大司徒府張興辟司徒馮勤舉孝亷稍遷博士楊震字伯起鄧隲為大将軍屬人士荒饑死者相望盗賊羣起四夷侵畔隲崇節儉罷力役辟震與朱寵陳禪置之幕府故天下復安朱穆字公叔舉孝亷屬江淮盗賊羣起州郡不能禁或説大将軍梁兾曰朱公叔才兼文武海内竒士若以爲謀主賊不足平也兾亦素聞穆名乃辟之使典兵事甚見親任劉寛字文饒桓帝時大将軍辟五遷司徒長史大将軍梁兾也應奉為武陵太守坐公事免延熹中武陵蠻復冦亂荆州車騎将軍馮緄以奉有威恩為蠻夷所服上請與俱征拜從事中郎奉勤設方略賊破軍罷緄推功扵奉薦為司𨽻校尉馬融字季長大将軍鄧隲聞融名召為舎人非其好也遂不應命客於凉州武都漢陽界中㑹羗虜飈起邊方擾亂菜糓踴貴自闗以西道殣相望融既饑困乃悔而歎息謂其友人曰古人有言左手據天下之圖右手刎其喉愚夫不為所以然者生貴於天下也今以世俗咫尺之羞滅無貲之軀殆非老莊所謂也故徃應隲召周舉字宣光初辟司徒李郤府後為蜀郡太守坐事免大将軍梁商表為從事中郎甚重焉董昌字聖真㑹稽餘姚人曉習文法仕郡為决曹史行部見昌竒之辟從事杜喬字叔榮少為諸生舉孝亷辟司徒楊震府李膺初舉孝亷為司徒胡廣所辟髙第遷青州刺史杜宻爲人沈躓少有厲俗志爲司徒胡廣所辟魏朗詣太學受五經京師長者李膺之徒争從之辟司徒府再遷彭城令范滂汝南人為光祿主事棄官而去後為太尉黄瓊所辟巴肅為具丘長辭病去辟公府羊陟少清直有學行舉孝亷辟大尉李固府張儉山陽人初舉茂材以刺史非其人謝病不起太守崔超請為東部督郵岑晊南陽人雖在閭里慨然有董正天下之志太守𢎞農成瑨下車欲振威嚴聞晊髙名請為功曹陳翔少知名舉孝亷太尉周景辟髙第拜侍御史何顒字伯求黨事起變名姓亡匿事解辟司空府董尚為蜀郡太守免大将軍梁商表為從事中郎特甚敬重陳蕃汝南人周景為豫州刺史辟為别駕又辟潁川李膺荀緄杜宻沛國朱㝢為從事皆天下英俊之士也史弼字公謙少篤學聚徒數百人州郡辟公府童恢琅琊人少仕州郡為吏司徒楊賜聞其執法亷平乃辟之王允太原人仕郡為吏人有路佛者少無名行而太守王球召以補吏允犯顔固争球怒収允欲殺之刺史鄧盛聞而馳傳辟為别駕從事允繇是知名而路佛以之廢棄允後為冀州刺史辟荀爽孔融等為從事虞詡字升卿早孤祖母終服闋辟太尉李修府拜郎中邉讓字文禮初大将軍何進聞讓才名欲辟命之恐不至詭以軍事徴召既到署令史進以禮見之讓善占謝能辭對賓客滿堂莫不羨其風采趙岐字邠卿辭司空掾後為大将軍梁兾所辟為陳損益求賢之策兾不納舉理劇為皮氏長避􅄷逃難四方蔵北海孫嵩家􅃨壁中後因赦出三府聞之同時竝辟九年乃應司徒胡廣之命盧植涿郡人為尚書免官隱於上谷不交人事冀州牧袁紹請為軍師蔡邕辟司徒喬𤣥府甚敬待之出補河平長孔融辟司徒楊賜府㑹河南尹何進當遷為大将軍賜遣融奏謁賀進不時通融即奏謁還府投劾而去河南官屬耻之私遣劒客欲追殺融客有言於進曰孔文舉有重名将軍若造怨此人則四方之士引領而去矣不如因而禮之以示廣於天下進然之既拜而辟融髙第為侍御史劉表初被訕議為八顧詔書捕黨人亡走得免黨禁解辟大将軍何進掾鍾繇為莒長委官還家初州牧陶謙初辟别駕從事辭疾遜遁謙重令楊州從事㑹稽呉範宣㫖堅守意不移欲威以刑罰然後乃起魏夏侯惇字元讓太祖初起惇嘗為禆将從征伐太祖行􅁬武将軍以惇為司馬荀攸字公逹為漢尚書太祖素聞攸名與語大悦謂荀彧鍾繇曰公逹非嘗人也吾得與之計事天下當何憂哉以為軍師國淵字子尼樂安人與邴原管寧等避亂遼東既還􅃇土太祖辟為司空掾王修字叔治北河營陵人初平中北海相召以主簿袁譚在青州辟為治中從事别駕袁紹又辟修除即墨令後復為譚别駕袁氏政寛在職者多蓄聚太祖破鄴籍没審配等家財物貨以萬數及破南皮閲修家榖不滿十斛書數百卷太祖歎曰士不妄有名乃禮辟為司空掾行司金中郎将邴原字根矩北海朱虗人在遼東一年後太祖辟為司空掾又云孔融在北海以鄭𤣥為計掾彭璆為計吏邴原為計位管寧字㓜安避亂於遼東太祖辟為司空掾崔琰字季珪清河人就鄭𤣥學㑹黃巾賊起去家四年乃歸以琴書自娯大将軍袁紹聞而辟之太祖破袁氏領冀州牧辟琰為别駕從事徐奕字季才東莞人避難江東孫策禮命之奕改姓名微服還本郡太祖為司空辟為掾屬何䕫字叔龍陳郡人避難淮南不應袁術辟閒行道本郡頃之太祖辟為司空掾邢顒字子昻為廣宗長以故将喪棄官太祖更辟司空掾除行唐令入為丞相門下督郵鮑勛字叔業父信爲濟北相恊規太祖身以遇害太祖爲丞相追録信功封勛兄邵新都亭侯辟勛丞相掾華歆字子魚為下邽令㑹天子使太傅馬日磾安集闗東日磾辟歆為掾郭嘉字奉孝太祖召見論天下事太祖曰使孤成大事者必此人也嘉出亦喜曰眞吾主也表為軍司空董昭字公仁除癭陶長相人令袁紹以為叅軍事劉蕐字子揚太祖辟為司空倉曺掾劉放字子棄遭世大亂漁陽王松據其土徃依之太祖克冀州劉放説松舉雍奴泉州安次以附之放為松答太祖書其文甚麗太祖既善之又聞其説繇是遂辟放與松俱至以放叅司空軍事劉馥字元頴避亂揚州建安初説袁術将戚寄秦翊使率衆與俱詣太祖太祖悦之辟為司徒掾王粲字仲宣漢末西京擾亂乃之荆州依劉表表卒粲勸表子琮令歸太祖太祖辟為丞相掾後遷軍叅謀祭酒荀緯字公髙少喜文學建安中召署軍謀掾衛覬字伯儒少夙成以才學稱太祖辟為司空掾屬劉廙字㳟嗣南陽人兄望之有名於世荆州牧劉表辟爲從事後望之見害廙懼奔楊州遂歸太祖太祖辟為丞相掾屬轉五官将文學後徙署丞相倉曹屬阮瑀字元瑜太祖雅聞瑀名辟之不應連見偪促乃逃入山中太祖使人焚山得瑀送至以為司空軍謀祭酒管記室范粲州府交辟皆無所就久之乃應命為治中轉别駕辟太尉掾司馬朗字伯逹年二十二太祖辟為司空掾屬賈逹字梁道除澠池令以祖父喪去官司空辟為掾徐邈字景山燕國人太祖平河朔召為丞相軍謀掾試守奉髙令入為東曺議令史胡質字文徳壽春人為丞相東曹叅令史州請為治中王凌字彦雲稍遷至中山太守所在有治迹太祖辟為丞相掾屬和洽字陽士汝南人太祖定荆州辟為丞相掾屬沐竝字徳信為人公果不畏彊禦丞相召署軍謀掾裴潜字文行河東人避亂荆州劉表待以賓禮潜私謂所親曰劉牧非覇王之才敗無日矣遂南適長沙太祖定荆州以潜叅丞相軍事出歷三縣令入為倉曺掾屬韓暨字公至南陽人避袁術命召徙居山都之山劉表禮辟遂遁居孱陵界表深恨之暨懼應命除宜城長太祖平荆州辟為丞相士曺屬髙柔字文惠袁紹甥髙幹之弟幹以并州叛太祖欲因事誅之以為刺姦令史柔夙夜匪懈至擁膝抱文書而寝太祖嘗夜㣲出觀察諸吏見柔哀之徐解䘮覆柔而去自是辟為丞相倉曺屬孫禮字徳逹涿郡人太祖平幽州召為司空軍謀掾王觀字偉臺少孤貧厲志太祖召為丞相文學掾楊阜字義山天水人以州從事為州牧韋端使詣許拜安定長史非其好遂去官端徴為大僕子康代為刺史辟阜為别駕察孝亷辟丞相府州表留叅軍事髙堂隆字升平泰山人少為諸生太守薛悌命為督郵後去吏避地濟南太祖召為丞相軍謀掾滿寵字伯寧山陽人守髙平令棄官歸太祖臨兖州辟為從事及為大将軍辟署西曹屬田豫字國讓漁陽人公孫瓚敗而鮮于輔為國人所推行太守事以豫為長史豫謂輔曰終能定天下者曹氏也宜速歸命輔從其計太祖召豫為丞相軍謀掾牽招字子經安平人冀州牧袁紹辟為督軍從事兼領烏丸突騎太祖領冀州辟為從事杜䕫字公良避亂奔荆州荆州降太祖以䕫為軍謀祭酒叅大樂事郭淮字伯濟文帝為五官将召署門下賊曺轉丞相兵曹議令史鄧艾字士載義陽人為典農綱紀上計吏因使見太尉司馬宣王宣王竒之辟之為掾管輅字公明平原人清河太尉華表召為文學掾安平趙孔曜薦輅於冀州刺史裴徽徽辟為文學從事引與相見大善友之徙部鉅鹿遷治中傅嘏字蘭石弱冠知名司空陳羣辟為掾胡遵安定人張既為雍凉二州刺史與天水楊之阜酒泉龎涓燉煌張恭周生烈等為既所禮辟終皆有名位張遼少為郡吏漢末并州刺史丁原以遼武力過人召為從事使将兵詣京都單固字㳟夏山陽人為人有器識正始中兖州刺史令狐愚與固父伯龍善辟固欲以爲别駕固不樂為州吏辭以疾愚禮意愈厚固母夏侯氏謂固曰使君與汝父久善故命汝不止汝亦固當仕進自可徃耳固不獲已遂徃虞松字叔茂陳留人弱冠有才從司馬宣王征東宣王命作檄及破賊作露布松從宣還宣王辟為掾時年二十四蜀周羣字仲直巴西閬中州牧劉璋辟為師友從事劉琰字威碩魯國人先主在豫州辟為從事以其宗姓有風流善談論厚親待之遂隨從周旋嘗為賓客劉巴字子㓜零陵人曹公征荆州辟為掾使招納長沙零陵桂陽㑹先主略有三郡巴不得反使遂逺適交趾先主深以為恨巴復從交趾至蜀俄而先主定益州巴辭謝罪負先主不責而諸葛孔明數稱薦之先主辟為左将軍西曹掾龎統字士元襄陽人郡命為功曹先主治荆州以從事守耒陽令在縣不治免官呉将魯肅遺先主書曰龎士元非百里才也使處治中别駕之任始得展其􅂹足耳諸葛亮亦言之先主先主見與善譚大器之以為治中從事麋竺字子仲東河人徐州牧陶謙辟為别駕從事後曹公表竺領嬴郡太守去官隨先主周旋先主将適荆州遣竺先與劉表相聞以竺為左将軍從事中郎孫乾字公祐北海人先主領徐州辟為從事後隨從周旋簡雍字憲和少與先主有舊随從周旋先主至荆州雍與麋竺孫乾同為從事中郎伊籍字機伯隨先主南渡江從入益州益州定以為左将軍從事中郎秦宓字子𠡠廣漢人先主定益州廣漢太守夏侯纂請為師友祭酒領五官掾稱曰仲父益州辟宓從事祭酒建興二年丞相亮領益州牧選宓迎為别駕董和字㓜宰劉璋以為益州太守先主定蜀徴為掌軍中郎将馬良字季常先主領荆州辟為從事先主入蜀辟良左将軍廖立字公淵先主領荆州牧辟為從事年未三十楊儀字威公襄陽人太守闗侯命為功曹奉使詣先主先主大悦之辟為左将軍兵曹掾後為遥署𢎞農太守丞相亮以為叅軍署府事遷長史費詩字公舉犍為人先主領益州以為督軍從事杜瓊字伯瑜益州牧劉璋辟為從事先主定益州以為議曹從事尹黙字思潜梓潼人先主定益州以為勸學從事譙周字允南巴西人丞相亮領益州牧命為勸學從事大将軍蔣琬領刺史徙為典學從事黄權字公衡巴西人少為郡吏州牧劉璋召為主簿李恢字徳昻建寧人先主領益州牧以為公曹書佐主簿更遷别駕從事蔣琬字公琰諸葛亮為丞相開府辟琬為東曹掾舉茂材琬固讓劉邕隂化龎延廖淳亮教答曰思惟背親捨徳以殄百姓衆人既不隱於心實又使逺近不解其義是以君宜顯其功舉以明此選之清重也遷為叅軍又代張裔為長史姚伷字子緒為廣漢太守丞相亮北駐漢中辟為掾竝進文武之士亮稱曰忠益者莫大於進人進人者各務其所向今姚掾竝存剛柔以廣文武之用可謂博雅矣願爲掾各希此事以屬其望遷為叅軍霍弋字紹先先主末年為太子舍人後主踐祚除謁者丞相諸葛亮北臨漢中請爲記室使與子喬共周旋㳺處姜維天水冀人爲中郎叅本郡軍事丞相諸葛亮軍向祁山時天水太守􅃴出案行維及功曹梁緒主簿尹賞主記梁䖍等從行太守聞蜀軍垂至而諸縣響應疑維等皆有異志於是夜亡保上邽維等覺太守去追遲至城門城門已閉不納維等相率還冀冀亦不入維維等乃懼詣諸葛亮㑹馬謖敗於街亭亮㧞將西縣千餘家及維等還故維遂與母相失亮辟為倉曹掾加奉義將軍封當陽亭侯呉張昭字子布孫策創業命為長史程秉字徳樞避亂交州士爕命爲長史朱治字君理丹陽故鄣人初為縣吏後察孝亷州辟從事虞翻字仲翔㑹稽人太守王朗命為功曹孫策征㑹稽翻勸朗避策策後命爲功曹待以交友之禮陸績字公紀大帝統事辟為奏曹掾以直道見憚出為鬰林太守駱綂字公緒大帝以将軍領㑹稽太守綂年二十試為烏程相民户過萬咸歎其惠理帝嘉之召為功曹行騎都尉吾粲字孔休孫河為将軍表粲為曲河丞遷為長史大帝為車騎将軍召為主簿全柔呉郡錢塘人漢靈帝時補尚書郎右丞董卓之亂棄官歸州辟别駕從事後為丹陽都尉大帝為車騎将軍以柔為長史潘濬字承明武陵人年三十荆州牧劉表辟為部江夏從事先主領荆州以為治中從事胡綜字偉則大帝為討虜将軍以綜為金曹從事歩隲字子山大帝為討虜将軍召隲為主記除海鹽長還辟車騎将軍東曹掾帝爲徐州牧以隲為治中從事舉茂才顧徽字子欽少㳺學有脣吻大帝統事聞徽有才辯召署主簿闞澤字徳潤䆒覽群籍兼通歴數大帝為驃騎将軍辟補西曹掾聶支有唇吻少為縣吏虞翻徙交州縣令使支送之翻與語而竒焉為書與豫章太守謝斐令以為功曹郡時見有功曹斐見之問曰縣吏聶支可堪何職對曰此人縣間小吏耳猶可堪曹佐斐曰論者以為宜作功曹君其避之乃用為功曹徐平字伯先諸葛恪為丹陽太守討山越以平威重思慮可與效力請平為丞晉王祥漢末遭亂擕弟覽避地廬江三十餘年徐州刺史吕䖍檄為别駕祥年垂耳順固辭不受覽勸之為具車牛祥乃應召􅐚委以州事王覽字𤣥通祥之弟也名亞扵祥應本郡之召稍遷司徒西曹掾魯芝扶風郡人辟州别駕魏車騎将軍郭淮為雍州刺史深敬重之舉孝亷除郎中㑹丞相諸葛亮攻隴右淮復請芝為别駕從事王沉好書善屬文大將軍曹爽辟為掾鄧殷亮直强正鍾㑹伐蜀竒其才自黽池令召為主簿賈充伐呉請殷為長史劉毅僑居平陽太守杜恕請為功曹後辟司𨽻從事大常鄭袤舉博士文帝辟為相國掾辭疾積年不就時人謂毅忠於魏氏而帝怒其顧望将加重辟毅懼應命轉主簿裴秀字季彦度遼将軍毌丘儉嘗薦秀扵大將軍曹爽爽乃辟為掾唐彬魯國鄒人初為郡門下掾累遷别駕彬忠肅公亮盡規扶救不顯諫以自彰又奉使詣相府計事于時僚佐皆當世英彦見彬莫不欽悦稱之於文帝薦為掾屬帝以問其叅軍人皆切忌其能良久不答陳騫在坐歛板而稱曰彬之為人勝騫甚逺帝笑曰但能如卿固未易得何論於勝因辟彬爲鎧曹屬帝問曰卿何以致辟對曰修業陋巷觀古人之遺跡言滿天下無口􅂈行滿天下無怨惡帝顧四坐曰名不虚行他日謂孔顥曰近見唐彬卿受蔽賢之責矣裴楷字叔則鍾㑹薦之扵文帝辟相國掾荀朂字公曽仕魏辟大将軍曹爽掾荀䆳字道𤣥弱冠辟趙王倫相國掾荀闓字道明有名稱大司馬齊王冏辟爲掾荀組字大章為榮陽太守趙王倫為相國欲収大名選海内徳望之士以江夏李重及組為左右長史東平王堪沛國劉謨爲左右司馬韓夀字徳真美姿貌善容止賈充辟為司空掾李熹字季和宣帝辟為大傅屬固辭疾郡縣扶輿上道王渾字𤣥冲雅有器量魏世辟大将軍曹爽掾王睿字士治𢎞農人州辟部河東從事守令有亷潔者皆望風自引而去山濤字巨源河内人年四十始爲郡主簿功曹上計掾州辟部河南從事郭舒順陽人刺史夏侯含辟為西曹轉主簿含坐事舒自繫含事得釋刺史宗岱命為治中䘮母去職劉𢎞守荆州引為治中𢎞卒王澄代之聞其名引為别駕後轉順陽太守王敦召爲叅軍從事中郎樂廣字彦輔裴楷薦廣扵賈充遂辟太尉掾温羨字長卿少以朗寤見稱齊王攸辟為掾選尚書郎程衛字長𤣥強正方嚴劉毅聞其名辟為都官從事奏中䕶軍羊琇隂私所犯狼藉繇是名振遐邇遂辟公府掾何攀字惠興蜀郡人仕州為主簿王濬為益州辟為别駕劉頌字子雅少能辨物理為時人所稱察孝亷舉秀才不就文帝辟為相府掾傅敷字頴根清凈有道素解屬文永嘉之亂避地㑹稽元帝引為鎮東從事中郎向雄字茂伯河内人太守劉毅嘗以非罪笞雄及呉􅁬代毅為太守又以少譴繫獄司𨽻鍾㑹於獄中辟雄為都官從事阮籍字嗣京太尉蒋濟聞其有雋才而辟之籍詣都亭奏記曰伏惟明公以含一之徳據三台之位英豪翹首俊賢抗足開府之日人人自以為掾屬辟書始下而下走為首昔子夏在西河之上而文侯擁篲鄒子處黍谷之隂而昭王陪乘夫布衣韋𢃄之士孤居特立王公大人所以禮下之者爲道存也今籍無鄒卜之道而有其陋猥見採擢無以稱當方将耕於東臯之陽輸黍稷之税避當塗者之路負薪疲病足力不彊補吏之召非所克堪乞廽謬恩以光清舉初濟恐籍不至得記欣然遣卒迎之而籍已去濟大怒於是鄉親共喻之乃就吏宣帝為大傅命爲從事中郎又爲景帝大司馬從事中郎文帝輔政以為大将軍從事中郎籍後遺落世事雖去佐職嘗逰府内朝宴必與焉阮瞻字千里見司徒王戎戎問曰聖人貴名教老莊眀自然其旨同異瞻曰将無同戎咨嗟良久即辟之時人謂之三語掾阮孚字遥集初辟大傅府遷騎兵屬避亂渡江元帝以爲安東叅軍轉丞相從事郎中終日酣縱嘗為有司所紏帝每優容之庾峻字山甫潁川人少好學有才思歴郡功曹舉計掾州辟從事郭象字子𤣥少有才理辟司徒掾稍至黄門侍郎東海王越引爲大傅主簿甚見親委遂任職當權熏灼内外繇是素論去之摯虞字仲冶京兆人才學博通著述不倦郡檄主簿王接字祖㳺河東人為郡主簿迎太守温宇宇竒之轉功曹史州辟部平陽從事泰山羊亮為平陽太守薦之於司𨽻校尉王堪出補都官從事郤詵字廣基爲議郎母憂去職召為征東叅軍華譚字令思廣陵人爽慧有口辯為隣里所重楊州刺史周凌引爲從事史愛其才器待以賔友之禮建興初元帝命爲鎮東軍諮祭酒轉丞相軍諮陸機字士衡太康末入雒張華薦之諸公太傅楊駿辟為祭酒陸雲字士龍呉郡人刺史周駿召爲從事謂人曰士龍當今之顔子也潘岳字安仁少以才頴見稱早辟司空太尉府江霦字思𤣥陳留人本州辟舉秀才平南将軍温嶠以爲叅軍後爲州别駕辟司空郗鍳掾除長山令鍳又請爲司馬轉黄門侍郎車騎将軍庾氷鎮江州請爲長史氷薨庾翼以爲諮議叅軍江淳字思悛蘇峻之亂避地東陽山太尉郗鍳檄為兖州治中又辟太尉掾康帝為司徒亦辟為征西将軍庾亮請為儒林叅軍孫楚字子荆叅鎮東石苞軍事苞表楚訕毁時政湮廢積年征西将軍扶風王駿與楚舊好起為叅軍孫綽字興公除著作佐郎征西将軍庾亮請為叅軍後遷尚書郎楊州刺史殷浩以爲建威長史㑹稽王羲之引爲右軍長史羅尚字敬之荆州刺史王戎以尚及劉喬爲叅軍竝委任之趙誘字元孫淮南人世以將畧顯州辟主簿刺史郗隆為其下所害誘還家杜門不出右将軍王敦以爲叅軍周訪字士逹汝南人察孝亷除郎中上甲令皆不之官元帝渡江命叅鎮東軍事周撫字道和元帝辟爲丞相掾父喪去官後除武昌太守王敦命爲從事中郎将咸和初司徒王導以為從事中郎皇甫啇秦州刺史重之弟齊王冏輔政以啇為叅軍冏誅長沙王乂以爲叅軍李含字世容隴西人州以短檄召爲門亭長刺史郭奕素聞其賢下車擢爲别駕處群僚之右尋薦之公府大保衛瓘辟爲掾索靖字㓜安燉煌人州辟别駕舉賢良方正賈疋字彦度初辟公府遂歴顯職荀晞字道將少爲司𨽻部從事累遷平陽太守齊王冏輔政晞叅冏軍事冏誅坐免長沙王乂爲驃騎将軍以晞爲從事中郎祖納有操行性至孝平北将軍王敦聞之遺其二婢辟為從事中郎有戲之曰奴價倍婢納曰百里奚何必輕於五羖皮耶范汪弱冠至京屬蘇峻作亂汪乃遁逃西歸庾亮温嶠屯兵潯陽汪勸嶠等急宜進討是日䕶軍平南二府禮命交至始解褐叅䕶軍軍事册府元龜卷七百二十六
