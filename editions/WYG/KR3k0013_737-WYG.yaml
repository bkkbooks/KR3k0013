body:
  text: 册府元龜卷七百三十七宋王欽若等撰陪臣部薦賢賢徳薦賢夫十室之邑必有忠信三人同行厥有我師舉爾所知惟君子之不比各於其黨見士庶之相讓若乃春秋務戰之世敵國急賢之際而有處大夫之列挾覇王之術以尊其主者何嘗不勤接士類汲引材智推轂靡遺於後進拔茅乃至于彚征大則讓卿宰之位小則備家陪之列或以素敦友善夙知隐滯或以方在羈旅久為僕御並加推奨俾之效用至於舉讎取盜曽無嫌間自非深於知人忠於事上者其能若是乎鮑叔牙齊大夫也桓公使為宰宰太宰也辭曰臣君之傭臣也君加惠于臣使不凍饑則君之賜也若必治國家者則非臣之所能也其惟管夷吾乎臣之所不如管夷吾者有五寛惠愛民臣不如也治國家不失其秉臣不如也秉柄也柄所操以作事國柄者賞罰之紀要故也忠信可結於諸侯臣不如也制禮義可法於四方臣不如也執枹皷立於軍門使百姓皆加勇焉臣不如也夫管子民之父母将欲治其子不可棄其父母公曰夫管夷吾射寡人中鈎殆於死今乃用之可乎鮑叔對曰彼為其君動也君若宥而反之其為君猶是也桓公遂任以政管仲相齊三月請論百官桓公曰諾管仲曰升降揖讓進退閑習辯辭之剛柔臣不如隰朋請立以為大行墾草入邑辟土聚粟多衆盡地之利臣不如寗戚請立以為司田平原廣牧廣遠可牧之地車不結轍士不旋踵皷之而三軍之士視死如歸臣不如王子城父請立以為大司馬決獄折中不殺不辜不輕有罪臣不如賓胥無請立以為大司理犯君顔色進諫必忠不避死亡不撓富貴臣不如東郭牙請立以為大諫之臣此五子者夷吾一不如於五子者各不如其一然而以易夷吾夷吾不為也以五子之能易夷吾之徳則夷吾所以不能君若欲治國强兵則五子者存矣若欲霸王夷吾在此桓公曰善孔子曰管仲遇盜取二人焉上以為公臣曰其所與遊者僻也可人也言此人可也但居惡人之中使人犯法管仲死桓公使為之服宦於大夫者之為之服也自管仲始也有君命焉爾也亦記失禮所由也善桓公不忘賢者之舉宦猶仕也此仕于大夫連升于公與為大夫之諸侯同爾禮不反服佚之狐鄭大夫晉文公與秦伯圍鄭佚之狐言於鄭伯曰國危矣若使燭之武見秦君師必退燭之武亦鄭大夫公從之辭曰臣之壮也猶不如人今老矣無能為也已公曰吾不能蚤用子今急而求子是寡人之過也然鄭亡子亦有不利焉許之夜縋而出見秦伯秦師乃還臼季晉大夫使過冀見冀缺耨其妻饁之臼季胥臣也冀晋邑耨鋤也野饋曰饁敬相待如賓與之歸言諸文公曰敬徳之聚也能敬必有徳徳以治民君請用之臣聞之出門如賔如見大賔承事如祭常敬謹也仁之則也公曰其父有罪可乎缺父冀芮欲殺文公對曰舜之罪也殛鯀其舉也興禹禹鯀子管敬仲桓之賊也實相以濟康誥曰父不慈子不祗兄不友弟不恭不相及也祗敬也詩曰采葑采菲無以下體君取節焉可也葑菲之菜上善下惡食之者不以其惡而棄其善言可取其善節文公以為下軍大夫百里奚秦大夫初仕虞虞亡走宛秦繆公以五羖羊皮贖之授之國政號曰五羖大夫百里奚讓曰臣不及臣友蹇叔蹇叔賢而世莫知臣嘗㳺困於齊而乞食䬹人䬹一作姪蹇叔收臣臣因而欲事齊君無知蹇叔止臣臣得脱齊難遂之周周王子頺好牛臣以養牛干之及頺欲用臣蹇叔止臣臣去得不誅事虞君蹇叔止臣臣知虞君不用臣臣誠私利祿爵且留再用其言得脱一不用及虞君難是以知其賢於是穆公使人厚幣迎蹇叔以為上大夫虞丘相為楚相孫叔敖者楚之處士也虞丘相進之於楚荘王以自代趙文子趙武也為晉大夫所舉於晋國管庫之士七十有餘家管庫之士府史以下官長所置也舉之於君以為士大夫也管鍵也庫物所藏晉平公過九原而歎曰嗟呼此地之蘊吾良臣多矣若使死者起也吾将與誰歸乎叔向對曰趙武乎平公曰子黨於子之師也對曰臣敢言趙武之為人也立若不勝衣言若不出於口然其身舉士於白屋下者四十六人皆得其意而公家甚頼之及文子之死也四十六人皆就賔位是其無私徳也臣故以為賢也平公曰善夫趙武賢臣也相晉天下無兵革者九年春秋曰晉趙武之力盡得人也司馬侯為晉大夫悼公與之升臺而望曰樂夫對曰臨下之樂則樂矣徳義之樂則未公曰何謂徳義對曰諸侯之為日在君側以其善行以其惡戒可謂徳義矣公曰孰能對曰羊舌肸習於春秋乃召叔向使傅太子彪祁奚為晉大夫請老老致仕也問嗣焉嗣續其職者稱解狐其讎也将立之而卒解狐卒又問焉對曰午也可午祁奚子於是羊舌職死矣晉侯曰孰可以代之對曰赤也可赤職之子伯華於是使祁午為中軍尉羊舌赤佐之各代其父君子謂祁奚於是能舉善矣稱其讎不為諂立其子不為比舉其偏不為黨諂媚也偏媚屬也周書曰無偏無黨王道蕩蕩蕩蕩平正無私其祁奚之謂矣解狐得舉未得位故曰得舉祁午得位伯華得官建一官而三物成一官軍尉物事也能舉善也夫惟善故能舉其類詩云惟其有之是以似之祁奚有焉言惟有徳之人能舉似己者趙盾為晉大夫趙盾宣子也言韓獻子於靈公獻子韓厥也以為司馬河曲之役趙孟使人以其乗車行獻子執而戮之衆咸曰韓厥必不没矣其主朝升之而暮戮其車其誰安之宣子召而禮之曰吾聞事君者比而不黨夫周以舉義比也舉以其私黨也夫軍事無犯犯而不隐義也吾言汝於君懼汝不能也舉而不能黨孰大焉勉之臨長晉國者非汝其誰皆告諸大夫曰二三子可以賀我矣吾舉厥也而中吾乃今知免於罪也公叔文子為衛大夫薦其家臣僎與文子同升諸公僎本文子家臣薦之使與己並為大夫同升在公朝上孔子聞之曰可以為文矣言行如是可謚為文晏嬰為齊相景公時晉伐阿鄄而燕侵河上齊師敗績景公患之晏嬰薦田穰苴曰穰苴雖田氏庶孽司馬穰苴者田完之苗裔也然其人文能附衆武能威敵願君試之景公召穰苴與語兵事大説之以為将軍嬰嘗出其御之妻從門間而闚其夫其夫為相御擁大蓋策駟馬意氣揚揚甚自得也旣而歸其妻請去夫問其故妻曰晏嬰長不滿六尺身相齊國名顯諸侯今者妾觀其出志念深矣常有以自下者今子長八尺乃為人僕御然子之意自以為足妾是以求去也其後夫自抑損晏子怪而問之御以實對晏子薦以為大夫魏冉為秦相舉白起使代向夀将而攻韓魏敗之伊闕斬首二十四萬虜魏将公孫喜明年又取楚之宛葉公仲連為趙烈侯相國烈侯好音謂公仲連曰寡人有愛可以貴之乎公仲連曰富之可貴之則否烈侯曰然夫鄭歌者槍石二人吾賜之田八萬畆公仲曰諾不與居一月烈侯從代來問歌者田公仲曰求未有可者有頃烈侯復問公仲終不與乃稱疾不朝蕃吾君蕃音盤常山有蕃吾縣自代來謂公仲曰君實好善而未知所持今公仲相趙於今四年亦有進士乎公仲曰未也蕃吾君曰牛畜荀欣徐越皆可公仲乃進三人及朝烈侯復問歌者田何如公仲曰方使擇其善者牛畜侍烈侯施以仁義約以王道烈侯逌然明日荀欣侍以選練舉賢任官使能明日徐越侍以節財儉用察度功徳所與無不充君説烈侯使使謂相國曰歌者之田且止官牛畜為帥荀欣為中尉徐越為内史賜相國衣二襲單復具為一襲趙勝封平原君趙奢者趙之田部吏也平原君以為賢言之於王王用之治國賦國賦大平民富而府庫實田忌為齊大夫孫臏至齊田忌善而客待之進於威王威王問兵法遂以為帥大破梁軍貂勃為齊大夫常惡安平君田單小人也安平君聞之故為酒而召貂勃曰單何以得罪於先生故常見譽於朝貂勃曰跖之狗吠堯非貴跖而賤堯也狗固吠非其主也且今使公孫子賢而徐子不肖然而公孫子與徐子鬬徐子之狗由将攫公孫子之腓而噬之也若乃得去不肖者而為賢者狗豈得攫其腓而噬之哉安平君曰敬聞命明日任之於王王有所幸臣九人之屬傷安平君相與語於王曰燕之伐齊之時楚王使将軍将萬人而佐齊今國已定而社稷已安矣何不使使者謝於楚王王曰左右孰可九人之屬曰貂勃可貂勃使楚李克為魏大夫文侯謂李克曰先生嘗教寡人家貧則思良妻國亂則思良相今所置非成則璜璜翟璜也成文侯弟二子何如李克對曰臣聞之卑不謀尊疎不謀戚臣在關門之外不敢當命文侯曰先生臨事勿讓李克曰君不察故也居視其所親富視其所與達視其所舉窮視其所不為貧視其所不取五者足以定之矣何待克哉文侯曰先生就舍寡人之相定矣李克趨而出過翟璜之家璜曰今者聞君召先生而卜相果誰為之乎李克曰魏成子為相矣翟璜忿然作色曰以耳目之所覩記臣何負於魏成子西河之守臣之所進也君内以鄴為憂臣進西門豹君謀欲伐中山臣進樂羊中山已拔無使守之臣進先生君之子無傅臣進屈侯鮒臣何負於魏成子克曰且子之言克於子之君者豈将比周以求大官哉君問置相非成則璜二子何如克對曰君不察故也居視其所親富視其所與達視其所舉窮視其所不為貧視其所不取五者足以定之矣何待克哉是以知魏成子之為相也且子安得與魏成子比乎魏成子食祿千鍾什九在外什一在内是以東㳺得卜子夏田子方叚干木此三人者君皆師之子之所進五人者君皆臣之子惡得與魏成子比也翟璜逡廵再拜曰璜鄙人也失對願卒為弟子鄭安平魏人范睢旣為魏齊笞擊得出後魏齊悔復召求之安平聞之乃遂操范睢亡伏匿更名姓曰張祿當此時秦昭王使謁者王稽於魏鄭安平詐為卒侍王稽王稽問魏有賢人可與俱西㳺者乎鄭安平曰臣里中有張祿先生欲見君言天下事其人有仇不敢晝見王稽曰夜與俱來鄭安平夜與張祿見王稽語未究王稽知范睢賢謂曰先生待我於三亭之南與私約而去王稽辭魏去過載范睢入秦至湖關望見車騎從西來范睢曰彼來者為誰王稽曰秦相穰侯東行縣邑范雎曰吾聞穰侯專秦權惡内諸侯客此恐辱我我寧且匿車中有頃穰侯果至勞王稽因立車而語曰闗東有何變曰無有又謂王稽曰謁君得無與諸侯客子俱來乎無益徒亂人國耳王稽曰不敢即别去范睢曰吾聞穰侯智士也其見事遲鄉者疑車中有人忘索之於是范睢下車走曰此必悔之行十餘里果使騎還索車中無客乃已王稽遂與范睢入咸陽已報使因言曰魏有張祿先生天下辯士也曰秦王之國危於累卵得臣則安不可以書傳也臣故載來後秦王拜睢為相賢徳夫家陪攸設命曰諸侯之臣徳用孔彰乃為巨室之慕本自列國政出多門武力相征謀臣並騖達從政之道處交兵之間而能滅私狥公克己致讓謙抑周慎教戒垂裕改過不吝容衆在寛正以御家忠以事上信義兼著貞白自守飭行以絜矩恕已以推義無遺時哲得是民好謹厚而知節亷約而繕性至於進退語黙咸適其宜昭厥聲猷為人景仰斯乃得士君子之道矣臾駢為晉上軍佐初賈季奔狄趙宣子使臾駢送其孥孥妻子也宣子以賈季中軍之佐同官故夷之蒐賈季戮臾駢臾駢之人欲盡殺賈氏以報焉臾駢曰不可吾聞前志有之曰敵惠敵怨不在後嗣忠之道也敵猶對也若及子孫則為非對非對則為遷怒夫子禮於賈季我以其寵報私怨無乃不可乎言已䝉宣子寵位介人之寵非勇也介因也損怨益仇非知也殺季家欲以除怨宣子将復怨已是益仇以私害公非忠也釋此三者何以事夫子盡具其帑與其器用財賄親帥扞之送致諸境子良鄭公子也鄭靈公遇弑鄭人将立子良穆公庶子辭曰以賢則去疾不足去疾子良名以順則公子堅長乃立襄公襄公堅也襄公将去穆氏逐羣兄弟而舍子良以其讓已子良不可曰穆氏宜存則固願也若将亡之則亦皆亡去疾何為何為獨留乃舍之皆為大夫郤克郤獻子也為晉大夫将中軍靡笄之役韓獻子将斬人郤獻子馳将救之至則旣斬之矣郤子使速以狥告其僕曰吾以分謗也不欲韓氏獨受謗士爕范文子也為晉大夫佐上軍靡笄之役郤獻子師勝而反范文子後入武子曰爕乎汝亦知吾望爾也乎對曰夫師郤子之師也其事臧若先則恐國人之屬耳目於我也故不敢武子曰吾知免矣公子黒肱為鄭大夫有疾歸邑于公黒肱子張召室老宗人立叚叚子石黒肱子而使黜官薄祭黜官無多受職祭以特羊殷以少牢四時祀以一羊三年盛祭以羊豕殷盛也足以供祀盡歸其餘邑曰吾聞之生於亂世貴而能貧民無求焉可以後亡敬共事君與二三子生在敬戒不在富也是月子張卒君子曰善戒詩曰愼爾侯度用戒不虞鄭子張其有焉詩大雅侯維也義取慎法度戒未然華元為宋大夫宋城華元為植廵功植將主也城者謳曰睅其目皤其腹棄甲而復睅出皤大腹棄謂亡師于思于思棄甲復來于思多鬚之貌使其驂乗謂之曰牛則有皮犀兕尚多棄甲則那那猶何也役人曰從其有皮丹漆若何華元曰去之夫其口衆我寡傳言華元不吝其咎寛而容衆子罕為宋司城鄭尉氏司氏之亂其餘盜在宋亂在魯襄公十年鄭人以子西伯有子産之故納賂于宋三子之父皆為尉氏所殺故以馬四十乗百六十匹與師茂師惠樂師也茂惠其名也公孫黒為質焉公孫黒子晢也司城子罕以堵汝父尉翩司齊與之良司臣而逸之賢而放之託諸季武子武子寘諸卞子罕以司臣託季氏鄭人醢之三人也三人堵汝父尉翩司齊也師慧過宋朝将私焉私小便其相曰朝也相師者慧曰無人焉相曰朝也何故無人慧曰必無人焉若猶有人豈其以千乗之相易淫樂之矇必無人焉故也千乗之相謂子産等也言不為子産殺三盗得賂而歸之是重淫而輕國相子罕聞之固請而歸之言子罕能改過荆人士尹尹一作君池使於宋子罕止而觴之南家之墻擁於前而不直西家之潦經於宫而不止士尹池問其故子罕曰南家工人也為鞔者也吾将徙之其父曰吾恃為鞔以食三世矣今徙是宋邦之求鞔者不知吾處也吾将不食願相國之憂吾不食也為是故不徙也西家髙吾宫卑潦之經吾宫也利為是故吾不禁也士尹池歸荆適興兵欲攻宋士尹池諫於王曰宋不可攻也其主賢其相仁賢者得民仁者能用人攻之無功為天下笑楚乃釋宋而攻鄭孔子聞之曰夫修之于廟堂之上而折衝于千里之外者司城子罕之謂也范武子為晉大夫宋向戍請弭諸侯之兵為㑹于宋楚子木問於趙孟曰范武子之徳何如士㑹賢聞於諸侯故問之對曰夫子之家事治言於晉國無隠情其祝史陳信於鬼神無愧辭祝陳馨香徳足副之故不愧子木歸以語王王曰尚矣尚上也能歆神人歆享也使神享其祭人懷其徳宜其光輔五君以為盟主也五君文襄靈成景也子産為鄭大夫豐卷将祭請田焉弗許田獵也曰惟君用鮮鮮野獸衆給而已衆臣祭以芻豢為足子張怒子張豐巻也退而徵役召兵欲攻子産子産奔晉子皮止之而逐豐巻豐巻奔晉子産請其田里請於公不没入三年而復之反其田里及其入焉田里所收入叔孫豹為魯大夫季武子伐莒莒人告於虢之㑹楚告於晉請戮其使時叔孫豹在㑹欲戮之樂王鲋相趙文子欲求貨於叔孫而為之請叔孫弗與曰諸侯之㑹衛社稷也我以貨免魯必受師是禍之也何衛之為雖怨季孫魯國何罪叔出季處有自來矣吾又誰怨趙孟聞之曰臨患不忘國忠也謂言魯國何罪思難不越官信也謂言叔出季處圖國忘死貞也謂不以禍免謀主三者義也三者忠信貞有是四者又可戮乎并義而四乃請諸楚曰魯雖有罪其執事不辟難執事謂叔孫畏威而敬命矣謂不敢避戮子若免之以勸左右可也若子之羣吏處不避汙汙勞事出不逃難不茍免其何患之有患之所生汙而不治難而不守所由來也能是二者又何患焉不靖其能又誰從之安靖則衆賢能附從魯叔孫豹可謂能矣請免之以靖能者子㑹而赦有罪不伐魯又賞其賢赦叔孫諸侯其誰不欣焉望楚而歸之視遠如邇疆塲之邑一彼一此何常之有恤大舍小足以為盟主子其圖之固請諸楚楚人許之乃免叔孫陳桓子為齊大夫欒施髙疆來奔於魯陳鮑分其室晏子謂桓子必致諸公讓徳之主也讓之謂懿徳凡有血氣皆有争心故利不可彊不可彊取思義為愈義利之本也蘊利生孽蘊畜也孽妖害也姑使無蘊乎可以滋長桓子盡致諸公而請老于莒莒齊邑桓子召子山子山子商子周襄三十一年子尾所逐羣公子私具幄幕器用從者之衣屨私具不告公而反棘焉棘子山故邑齊國西安縣東有㦸里亭子商亦如之而反其邑子周亦如之而與之夫于子周本無邑故更與之齊南於陵縣西北有于亭反子城子公公孫捷三子襄八年子旗所逐而皆益其祿凡公子公孫之無祿者私分之邑桓子以己邑分之國之貧約孤寡者私與之粟公與桓子莒之旁邑辭讓不受穆孟姬為之請髙唐陳氏始大穆孟姬景公母傳言陳氏所以興叔孫婼魯大夫也為晉人所執叔孫所舘者雖一日必葺其牆屋葺補治也去之如始至不以當去而有所毁壞延陵季子吳公子也楚子期伐陳季子救之謂子期曰二君不務徳二君吳楚而力争諸侯民何罪焉我請退以為子名務徳而安民乃還季子吳王夀夢少子司馬牛為宋大夫桓魋之弟也桓魋之寵害于公恃寵驕盈公使夫人驟請享焉而將討之夫人景公母也數請享飲欲因請討未及魋先謀公請以鞍易薄鞍向魋邑薄公邑欲因易邑為公享宴而作亂乃益鞍七邑而請享公焉僞喜于受賜以日中為期家備盡徃甲兵之備公知之魋奔衞司馬牛致其邑與珪焉而適齊珪守邑符信向魋出於衛地公文氏攻之公文氏衛大夫求夏后氏之璜焉與之他玉而奔齊陳成子使為次卿司馬牛又致其邑焉而適吳示不與魋同吳人惡之而反趙簡子召之陳成子亦召之卒於魯郭門之外阬氏葬之丘輿阬氏魯人也泰山南城縣北有輿城錄其卒葬所在愍賢者失所沈諸梁字子髙為楚葉公白公勝作亂殺令尹子西司馬子期圍公陽穴宫負王昭王子惠王也以如昭夫人之宫公陽楚大夫昭夫人王母越女葉公亦至及北門或遇之曰君胡不胄國人望君如望慈父母焉盜賊之矢若傷君是絶民望也若之何不胄乃胄而進又遇一人曰君胡胄國人望君如望歲焉歲年榖也日月以幾冀君來若見君面是得艾也艾安也民知不死其亦夫有奮心猶将旌君以狥於國旌表也而又掩面以絶民望不亦甚乎乃免胄而進言葉公得民心遇箴尹固帥其屬将與白公欲與白公并子髙曰微二子者楚不國矣二子子西子期也栢舉之敗二子功多棄徳從賊其可保乎乃從葉公使與國人以攻白公白公縊死沈諸梁兼二事二事令尹司馬國寧乃使寧為令尹子西之子子國使寛為司馬子期之子而老於葉趙文子為晉大夫其中退然如不勝衣中身也退柔和貌鄉射記曰弓二寸以為侯中退或為安其言呐呐然如不出諸其口呐呐舒囁貌所舉於晉國管庫之士七十有餘家管庫之士府史以下官長所置也舉之於君以為大夫士也管鍵也生不交利亷也死不屬其子焉潔也晏嬰為齊大夫事齊靈公荘公景公其在朝君及之卽危言語不及之即危行國有道即順命無道即衡命以此三世顯名於諸侯册府元龜卷七百三十七
