body:
  text: 册府元龜巻三百六十二宋王欽若等撰將帥部機畧第二魏夏侯淵為䕶軍將軍時趙衢尹奉等謀討馬超姜敘起兵鹵城以應之衢等譎説超使出擊叙於後盡殺超妻子超奔漢中還圍祁山叙等急求救諸將議者欲須太祖節度淵曰公在鄴反覆四千里比報叙等必敗非救急也遂行使張郃督歩騎五千在前從陳倉路入淵自督糧在後郃至渭水上超將氐羌數千逆郃未戰超走郃進軍収超軍器械淵到諸縣皆已降韓遂在顯親淵欲襲取之遂走淵収遂軍糧追至略陽城去遂二十餘里諸將欲攻之或言當攻興國氐淵以為遂兵精興國城固攻不可卒㧞不如擊長離諸羌長離諸羌多在遂軍必歸救其家若遂獨守則孤救長離則官兵得與野戰可必虜也淵乃留督將守輜重輕兵歩騎到長離攻燒羌屯斬獲甚衆諸羌在遂軍者各還種落遂果救長離與淵軍對陣諸將見遂衆惡之欲結營作塹乃與戰淵曰我轉鬬千里今復作營塹則士衆罷敝不可久賊雖衆易與耳乃皷之大破遂軍得其旌麾還略陽進軍圍興國氐王千萬逃奔馬超餘衆降轉擊髙平屠谷皆散走收其糧穀牛馬乃假淵節曹仁以議郎督騎時太祖與袁紹相持於官渡紹遣劉僃徇㶏彊諸縣多舉衆應之自許以南吏民不安太祖以為憂仁曰南方以大軍方有目前急其勢不能相救劉僃以彊兵臨之其背叛固宜也僃新將紹兵未能得其用擊之可破也太祖善其言遂使仁將騎擊僃破走之仁復盡收諸叛縣而還紹遣别將韓荀鈔斷西道仁擊荀於雞雒山大破之繇是紹不敢復分兵出復與史渙等鈔紹運軍燒其糧穀曹休領虎豹騎宿衛劉僃遣將吴蘭屯下辨太祖遣曹洪征之以休為騎都尉參洪軍事太祖謂休曰汝雖參軍其實帥也洪聞此令亦委事於休僃遣張飛屯固山欲斷軍後衆議狐疑休曰賊實斷道者當伏兵潛行今乃先張聲勢此其不能也宜及其未集促擊蘭蘭破則飛自走矣洪從之進兵擊蘭大破之飛果走徐晃為横野將軍時韓遂馬超等反闗右遣晃屯汾隂太祖至潼闗恐不得渡召問晃晃曰公盛兵於此而賊不復别守蒲阪知其無謀也今假臣精兵渡蒲阪津為軍先置以截其衆賊可擒也太祖曰善使晃以歩騎四五千人渡津作塹栅未成賊梁興夜將歩騎五千餘人攻晃晃擊走之太祖軍得渡遂破超等田豫為弋陽太守鄢陵侯彰征代郡以豫為相軍次易北虜伏騎擊之軍人擾亂莫知所為豫因地形回車結圜陣弓弩持滿於内疑兵塞其隙胡不能進散去追擊大破之遂前平代皆豫䇿也文帝初北狄强盛侵擾邊塞使豫持節䕶烏丸校尉牽招解儁并䕶鮮卑自髙栁以東濊貊以西鮮卑數十部比能彌加素利割地統御各有分界乃共要誓皆不得以馬與中國市豫以戎狄為一非中國之利乃先搆離之使自為讐敵互相攻伐素利違盟出馬千匹與官為比能所攻求救於豫豫恐遂相兼并為害滋深宜救善討惡示信衆狄乃单將鋭卒深入虜庭胡人衆多鈔軍前後斷截歸路豫乃進軍去虜十餘里結屯營多聚牛馬糞然之從他道引去胡見煙火不絶以為尚在去行數十里乃知之追豫到馬城圍之十數重豫宻嚴使司馬建旌旗鳴皷吹將歩騎從南門出胡人皆屬目往赴之豫將精鋭自北門出皷譟而起兩頭俱發出虜不意虜衆散亂皆棄弓馬歩走追討二十餘里僵尸蔽地文聘黄初中為後將軍屯沔口吴孫權嘗自將數萬衆圍聘於石陽時大雨城栅隳壞人民散在田野未及補治聘聞權到不知所施乃思惟莫若潛黙可以疑之乃勑城中人使不得見又自卧舍中不起權果疑之語其部黨曰北方以此人忠臣也故委之以此郡今我至而不動此不有宻圖必當有外救遂不敢攻而去之張既黄初中為雍州刺史涼州盧水胡伊健妓妾治元多等反河西大擾文帝憂之曰非既莫能安涼州乃召涼州刺史鄒岐以既代之遣䕶軍夏侯儒將軍費曜等繼其後既至金城欲渡河諸將等以為兵少道險未可深入既曰道雖險非井陘之隘夷狄烏合無左車之計今武威危急赴之宜速遂渡河賊七千餘騎逆拒軍于鸇隂口既揚聲軍從鸇隂乃潛繇且次出至武威胡以為神引還顯美既已據武威曜乃至儒等猶未達既勞賜將士欲進軍擊胡諸將皆曰士卒疲倦虜衆氣鋭難與爭鋒既曰今軍無見糧當因敵為資若虜見兵合退依深山追之則道險窮餓兵還則出候冦鈔如此兵不得解所謂一日縱敵患在數世也遂前軍顯美胡騎數千因大風欲放火燒營將士皆恐既夜藏精卒三千人為伏使參軍成公英督千餘騎挑戰勅使佯退胡果爭奔之因發伏截其後首尾進擊大破之斬首獲生以萬數牽招為鴈門太守以蜀將諸葛亮數出而鮮卑軻比能狡猾能相交通表為防備議者以為懸逺未之信也㑹亮在祁山果遣使連結比能比能至故北地石城與相首尾帝乃詔招使從便宜討之時比能已還漠南招與刺史畢軌議曰胡虜遷徙無常若勞師逺追則遲速不相及若潛襲則山溪艱險資糧轉運難以宻辦可使守新興鴈門二牙門出屯陘北外以鎮撫内令兵田儲蓄資糧秋冬馬肥州郡兵合乗釁征討計必全克未及施行㑹病卒賈逵為建威將軍豫州刺史明帝初吴孫權在東闗當豫州南去江四百餘里每出兵為冦輒西從江夏東從廬江國家征伐亦繇淮沔是時州軍在項汝南弋陽諸郡守境而已權無北方之虞東西有急并軍相救故嘗少敗逵以為宜開直道臨江若權自守則二方無救二方無救則東闗可取乃移屯潦口陳攻取之計帝善之帝使賈逵督前將軍滿寵東莞太守胡質等四軍從西陽直向東闗曹休從皖司馬宣王從江陵逵至五將山休更表賊有請降者求深入應之詔宣王駐軍逵東與休合進逵度賊無東闗之備必并軍於皖休深入與賊戰必敗乃部署諸將水陸並進行二百里得生賊言休戰敗權遣兵斷夾石諸將不知所出或欲待後軍逵曰休兵敗於外路絶於内進不能戰退不得還安危之機不及終日賊以軍無後繼故至此今疾進出其不意此所謂先人以奪其心也賊見吾兵必走若待後軍賊已斷險兵雖多何益乃兼道進軍多設旗皷為疑兵賊見逵軍遂退逵據夾石以糧給休休軍乃振郭淮為雍州刺史齊王正始末督諸軍伐蜀蜀將姜維出石營從彊川乃西迎叛胡至無戴留隂平太守廖化於成重山築城歛破羌保質淮欲分兵取之諸將以維衆西接彊胡化以據險分軍兩持兵勢轉弱進不制維退不㧞化非計也不如合而俱西及胡蜀未接絶其内外此伐交之兵也淮曰今往取化出賊不意維必狼顧比維自致足以定化且使維疲於奔命兵不逺西而胡交自離此一舉而兩全之䇿也乃别遣夏侯尚等追維於沓中淮自率諸軍就攻化等維果馳還救化皆如淮計陳泰齊王嘉平初代郭淮為雍州刺史加奮威將軍蜀大將軍姜維率衆依麴山築二城使牙門將句安李歆等守之聚羌胡質任等冦偪諸郡征西將軍郭淮與泰謀所以禦之泰曰麴城雖固去蜀險逺當須運糧羌夷患維勞役未必肯附今圍而取之可不血刄而㧞其城雖其有救山道阻險非行兵之地也淮從㤗計使㤗率討蜀䕶軍徐質南安太守鄧艾等進兵圍斷其運道及城外流水安等挑戰不許將士困窘分糧聚雪以稽日月維果來救出自牛頭山與泰相對㤗曰兵法貴在不戰而屈人今絶牛頭維無反道則我之禽也勅諸軍各堅壘勿與戰遣使白淮欲自南渡白水循水而東使淮趣牛頭截其還路可并取維不惟安等而已淮善其䇿進率諸軍軍洮水維懼遁走安等孤縣遂皆降其後王經白泰云姜維夏侯覇欲三道向祁山石營金城求進兵為趐使涼州軍至枹罕討蜀䕶軍向祁山㤗量賊勢終不能三道且兵勢惡分涼州未宜越境報經審其定問知所趣向須東西勢合乃進時維等將數萬人至枹罕趣狄道泰勅經進屯狄道須軍到乃規取之泰進軍陳倉㑹經所統諸軍於故闗與賊戰不利經輒渡洮泰以經不堅據狄道必有他變並遣三營在前泰率諸軍繼之經已與維戰大敗以萬餘人還保狄道城餘皆奔散維乗勝圍狄道泰軍上邽分兵守要晨夜進前鄧艾胡奮王祕亦到即與鄧艾祕等分為三軍進到隴西艾等以為王經精卒破衂於西賊衆大盛乗勝之兵既不可當而將軍以烏合之卒繼敗軍之後將士失氣隴右傾蕩古人有言蝮虵螫手壯士解腕孫子曰兵有所不擊地有所不守盖小有所失而大有所全故也今隴右之害過於蝮虵狄道之地非徒不守之謂姜維之兵是所辟之鋒不如割險自保觀釁待弊然後進救此計之得者也泰曰姜維提輕兵深入正欲與我爭鋒原野求一戰之利王經當髙壁深壘挫其鋭氣今乃與戰使賊得計走破王經封之狄道若維以戰克之威進兵東向據櫟陽積穀之實放兵収降招納羌胡東爭闗隴𫝊檄四郡此我之所患也而維以乗勝之兵挫峻城之下鋭氣之卒屈力致命攻守勢殊客主不同兵書云修櫓轒輼三月乃成拒堙三月而後已誠非輕軍逺入維之詭謀倉卒所辦懸軍逺僑穀糧不繼是我速進破賊之時也所謂疾雷不及掩耳自然之勢也洮水帶其表維等在其内今乗髙據勢臨其項領不戰必走冦不可縱圍不可久君等何言如此遂進軍度髙城嶺潛行夜至狄道東南髙山上多舉烽火鳴皷角狄道城中將士見救者至皆憤踊維始謂官救兵當須衆集乃發而卒聞已至謂有竒變宿謀上下震懼自軍之發隴西也以山道深險賊必設伏泰詭從南道維果三日施伏定軍潛行卒出其南維乃緣山突至泰與交戰維退還涼州軍從金城南至沃于阪泰與經共宻期當共向其還路維等聞之遂遁城中將士得出經嘆曰糧不至旬向不應機舉城屠裂覆䘮一州矣泰慰勞將士前後遣還更差軍守並治城壘還屯上邽王昶為征南將軍督荆豫諸軍事嘉平二年昶上言孫權流放良臣適庶分爭可乗釁而制吴蜀白帝夷陵之間黔巫秭歸房陵皆在江北民夷與新城郡接可襲取也乃遣新城太守周㤗襲黔巫秭歸房陵荆州刺史王基詣夷陵昶詣江陵兩岸引竹絙為橋渡水擊之賊奔南岸鑿七道並來攻於是昶使積弩同時俱發權大將施績夜遁入江陵城追斬數百級昶欲引致平地與合戰乃先遣五軍按大道發還使南軍望見以喜之以所獲鎧馬甲胄馳環城以怒之設伏兵以待之績果􅇷軍與戰克之振旅而還王基齊王時為荆州刺史時朝廷議欲伐吴詔基量進取之宜基對曰夫兵動而無功則威名折於外財用窮於内故必全而後用也若不資通川聚糧水戰之備則雖積兵江内而無必渡之勢矣今江陵有沮漳二水溉灌膏腴之田以千數安陵左右陂池沃衍若水陸並農以實軍資然後引兵詣江陵夷陵分據夏口順沮漳資水浮穀而下賊知官兵有經久之勢則拒天誅者意沮而向王化者益固然後率合蠻夷以攻其内精卒勁兵以討其外則夏口以上必㧞而江外之郡不守如此吴蜀之交絶而吴禽矣不然兵出之利未可必矣於是遂止其後母邱儉文欽作亂以基為行監軍假節統許昌軍適與司馬景王㑹於許昌景王曰君籌儉等何如基曰淮南之逆非吏民思亂也儉等誑脅迫懼畏目下之戮是以尚羣聚耳若大兵臨偪必土崩瓦解儉欽之首不終朝而懸於軍門景王令基居軍前議者咸以儉欽慓悍難以爭鋒詔基停駐基以為儉等舉軍足以深入久不進者是其詐偽已露衆心疑沮也今不張示威形以副民望而停軍髙壘有似畏懦非用兵之勢也若或虜略民人又州郡兵家為賊所得者更懷離心儉等所迫脅者自顧罪重不敢復還此為錯兵無用之地而成姦宄之源吴冦因之則淮南非國家之有譙沛汝豫危而不安此計之大失也軍宜速進據南頓南頓有大邸閣計足軍人四十日糧保堅城因積穀先人有奪人之心此平賊之要也基屢請乃聽進據㶏水既至復言曰兵聞拙速未覩巧遲之久方今外有彊冦内有叛臣若不時決則事之深淺未可測也議者多欲將軍持重將軍持重是也停軍不進非也持重非不行之謂也進而不可犯爾今據堅城保壁壘以積實資虜懸運軍糧甚非計也景王欲須諸軍集到猶尚未許基曰將在軍君令有所不受彼得則利我得亦利是謂爭城南頓是也遂輒進據南頓儉等從項亦爭欲往發十餘里聞基先到復還保項時兖州刺史鄧艾屯樂嘉儉使文欽將兵襲艾基知其勢分進兵偪項儉衆遂敗欽等已平遷鎮南將軍都督豫州諸軍事領豫州刺史諸葛誕反基以本官行鎮東將軍都督揚豫諸軍事時大軍在項以賊兵精詔基歛軍堅壘基累啓求進討㑹吴遣朱異來救誕軍於安城基又被詔引諸軍轉據北山基謂諸將曰今圍壘轉固兵馬向集但當精修守備以待越逸而更移兵守險使得放縱雖有智者不能善後矣遂守便宜上疏曰今與賊家對敵當不動如山若遷移依險人心揺蕩於勢大損諸軍並據深溝髙壘衆心皆定不可傾動此御兵之要也書奏報聽大將軍司馬文王進屯邱頭分部圍守各有所統基督城東城南一十六軍文王勅軍吏入鎮南部界一不得有所譴城中食盡晝夜攻壘基輒拒擊破之壽春既㧞文王與基書曰初議者云求移者甚衆時未臨履亦謂宜然將軍深算利害獨秉固志上違詔命下拒衆議終至制敵擒賊雖古人所述不是過也蜀趙雲為翊軍將軍先主時魏將夏侯淵敗曹公爭漢中地運米北山下數千萬囊黄忠以為可取雲兵隨忠取米忠過期不還雲將數十騎輕行出圍迎視忠等值曹公揚兵大出雲為公前鋒所擊臣欽若曰公謂曹公也其下皆同方戰其大衆至勢偪遂前突其陣且鬬且却公軍散已復合雲䧟敵還趣圍將張著被創雲復馳馬還營迎著公軍追至圍此時沔陽長張翼在雲圍内翼欲閉門拒守而雲入營更大開門偃旗息皷公軍疑雲有伏兵引去雲擂皷震天惟以戎弩於後射公軍公軍驚駭自相蹂踐墮漢水中死者甚多先主明旦自來至雲圍視昨戰處曰子龍雲字一身都是膽也作樂飲宴至暝軍中號雲為虎威將軍李恢為庲降都督先主薨髙定恣睢於越嶲雍闓䟦扈於建寧朱褒反叛於牂牁丞相亮南征先繇越嶲而恢案道向建寧諸縣大相糾合圍恢軍於昆明時恢衆少敵倍又得亮聲息紿謂南人曰官軍糧盡欲規退還吾中間久斥鄉里乃今得旋不能復北欲還與汝等同計謀故以誠相告南人信之故圍守怠緩於是恢出擊大破之追奔逐北南至槃江東接牂牁與亮聲勢相連南土平定恢軍功居多諸葛亮後主時為丞相大將軍屯於陽平遣魏延諸將并兵東下亮惟留萬人守城魏將司馬宣王率二十萬衆拒亮而與延軍錯道徑至前當亮六十里所偵候白宣王説亮在城中兵少力弱亮亦知宣王垂至已與相偪欲前赴延軍相去又逺回迹反追勢不相及將士失色莫知其計亮意氣自若勅軍中皆卧旗息皷不得妄出菴幔又令大開四城門掃地却灑宣王常謂亮持重而猥見勢弱疑真有伏兵於是引軍北趣山明日食時亮謂參佐拊手大笑曰司馬懿必謂吾怯將有彊伏循山走矣候邏還白如亮所言姜維後主時為征西將軍隨丞相諸葛亮與魏將司馬宣王相持於渭南㑹亮卒長史楊儀等整軍而出百姓奔告宣王宣王追焉維令儀反旗鳴皷若將向宣王者宣王乃退不敢偪於是儀結陣去入谷然後發䘮景耀初拜大將軍初先主留魏延鎮漢中皆實兵諸圍以禦外敵敵若來攻使不得入及興勢之役王平捍拒曹爽皆承此制姜維建議以為錯守諸圍雖合周易重門之義然適可禦敵不獲大利不若使聞敵至諸圍皆歛兵聚穀退就漢樂二城使敵不得入平且重闗鎮守以捍之有事之日令遊軍並進以伺其虚敵攻闗不克野無散穀千里縣糧自然疲乏引退之日然後諸城並出與遊軍並力搏之此殄敵之術也於是令督漢中胡濟却住漢夀監軍王含守樂城䕶軍蔣斌守漢城又於西安建威武衛石門武城建昌臨逺皆立圍守王平為鎮北大將軍統漢中魏大將軍曹爽率歩騎十餘萬向漢中前鋒己在駱谷時漢中守兵不滿三萬諸將大驚或曰今力不足以拒敵聽當固守漢樂二城遇賊令入比爾間涪軍足得救闗平曰不然漢中去涪垂千里賊若得闗便為禍也今宜先遣劉䕶軍杜参軍據興勢平為後拒若賊分向黄金平率千人下自臨之比爾間涪軍行至此計之上也惟䕶軍劉敏與平意同即便施行涪諸軍及大將軍費禕自成都相繼而至魏軍退還如平本䇿劉敏為左䕶軍揚威將軍與王平俱鎮漢中魏遣曹爽襲蜀時議者或謂但可守城不出拒敵必自引退敏以為男女布野農穀栖畝若聼敵入則大事去矣遂帥所領與平據興勢多張旗幟彌亘百餘里㑹費禕從成都至魏軍即退敏以功封雲亭侯蔣琬為大司馬住漢中琬以為昔諸葛亮數闚秦川道險運艱竟不能克不若乗水東下乃多作舟船欲繇漢沔襲魏興上庸㑹舊疾連動未時得行而衆論咸謂如不克捷還路甚艱非長䇿也於是遣尚書令費禕中監軍姜維等喻指琬承命上疏曰芟穢弭難臣職是掌自臣奉辭漢中已經六年既以闇弱加嬰疾疢規方無成夙夜憂慘今魏跨帶九州根蔕滋蔓平除未易若東西幷力首尾犄角雖未能速得如志且當分裂蠶食先摧其支黨然吴期二三連不克果俯仰惟艱實忘寢食輒與費禕等議以涼州胡塞之要進退有資賊之所惜且羌胡乃心思漢如渇又昔偏軍入羌郭淮破走筭其長短以為事首宜以姜維為涼州刺史若維征行銜持河右臣當帥軍為維鎮繼今涪水陸四通惟急是應若東北有虞赴之不難繇是琬遂還涪吴陸遜初為孫權帳下右部督㑹丹陽賊帥費棧受曹公印綬扇動山越為作内應權遣遜討棧棧支黨多而主兵少遜乃益施牙幢分布皷角夜潛山谷間皷譟而前應時破散遂部伍東三郡彊者為兵羸者補户得精兵數萬人宿惡盪除所過肅清後為偏將軍右部督代吕蒙鎮陸口遜至書與荆州守將曰前承觀釁而動以律行師小舉大克一何巍巍敵國敗績利在同盟聞慶拊節想遂席卷共奬王綱今以不敏受任來西延慕光塵思禀良規又曰于禁等見獲遐邇欣嘆以為將軍之勲足以長世雖昔晉文城濮之師淮隂㧞趙之畧蔑以尚茲聞徐晃等歩騎駐旌闚望麾葆操猾虜也忿不思難恐潛増衆以逞其心雖云師老猶有驍悍且戰㨗之後嘗苦輕敵古人杖術軍勝彌警願將軍廣為方計以全獨克僕書生疏遲忝所不堪喜鄰威徳樂自傾盡雖未合䇿猶可懷也儻明注仰存以察之蜀覽遜書有謙下自托之意意大安無復所嫌遜具啟形狀陳其可擒之要權乃潛軍而上使遜與吕蒙為前部至即克公安南郡黄武元年劉備率大衆來向西界權命遜為大都督假節督朱然潘璋宋謙韓當徐盛鮮于丹孫桓等五萬人拒之備從巫峽建平連圍至夷陵界立數十屯以金錦爵賞誘動諸夷使將軍馮習為大都督張南為前部輔匡趙融廖淳傅肜等各為别督先遣吴班將數千人於平地立營欲以挑戰諸將皆欲擊之遜曰此必有譎且觀之備知其計不可乃引伏兵八千從谷中出遜曰所以不聽諸軍擊班者揣之必有巧故也遜上疏曰夷陵要害國之闗限雖為易得亦復易失失之非徒損數郡之地荆州可憂今日爭之當令必諧備干天常不守窟穴而敢自縱臣雖不材慿奉威靈以順討逆破壞在近尋備前後行軍多敗少成推此論之不足為戚臣初嫌彼水陸俱進今反捨船就歩處處結營察其布置必無他變伏願至尊髙枕不以為念也諸將並曰攻備當在初今乃令入五六百里相銜持經七八月其諸要害皆以固守擊之必無利矣遜曰備是猾虜更嘗事多其軍始集思慮精專未可干也今住已久不得我便兵疲意沮計不復生犄角此冦正在今日乃先攻一營不利諸將皆曰空殺兵耳遜曰吾已暁破之之術乃勅各持一把茅以火攻㧞之一爾勢成通率諸軍同時俱攻斬張南馮習及胡王沙摩柯等首破其四十餘營備將杜路劉寧等窮逼請降備升馬鞍山陳兵自繞遜督促諸軍四靣蹙之土崩瓦解死者萬數備因夜遁驛人自擔燒鐃鎧斷後僅得入白帝城其舟船器械水歩軍資一時畧盡尸骸漂流塞江而下備大慚恚曰吾乃為遜所折辱豈非天耶初孫桓别討備前鋒於夷道為備所圍求救於遜遜曰未可諸將曰孫安東公族見圍已困奈何不救遜曰安東得士衆心城牢糧足無可憂也待吾計成欲不救安東安東自觧及方畧大施備果奔潰桓後見遜曰前實怨不見救定至今日乃知調度自有方爾後為荆州牧嘉禾五年權北征使遜與諸葛瑾攻襄陽遜遣親人韓扁齎表奏報還遇敵於沔中鈔邏得扁瑾聞之甚懼書與遜云大駕已旋賊得韓扁具知吾濶狹且水乾宜當急去遜未答方催人種葑豆與諸將奕碁射戱如常瑾曰伯言多智畧其當有以自來見遜遜曰賊知大駕已旋無所復慼得專力於吾又已守要害之處兵將意動且當自定以安之施設變術然後出爾今便示退賊當謂吾怖仍來相蹙必敗之勢也乃宻與瑾立計令瑾督舟船遜悉上兵馬以向襄陽城敵素憚遜乃還赴城瑾便引船出遜徐整部伍張拓聲勢歩趨船敵不敢干軍到白圍託言往獵潛遣將軍周峻張梁等擊江夏新市安陸石陽石陽市盛峻等奄至人皆捐物入城城門噎不得闗敵乃自斫殺已民然後得闔斬首獲生者凡千餘人賀齊為南郡都尉討候官賊候官既平而建安漢興南平復亂齊進兵建安立都尉府郡發屬縣五千兵各使本縣長將之皆受齊節度賊洪明洪進苑御吴免華當等五人率各萬户連屯漢興吴五姓吴名五六千户别屯大潭鄒臨六千户别屯蓋竹大潭同出餘汗軍討漢興經餘汗齊以為賊衆兵少深入無繼恐為所斷令松陽長丁蕃留備餘汗蕃本與齊鄰城恥見部伍辭不肯留齊乃斬蕃於是軍中震慄無不用命遂分兵留備進討明等連大破之臨陣斬明其免當進御皆降轉擊蓋竹軍向大潭三將又降凡討治斬首六千級名帥盡擒復立縣邑料出兵萬人拜為平東校尉後為威武中郎將討丹陽黟歙時武彊葉鄉東陽豐浦四鄉先降齊表言以葉鄉為始新縣而歙賊帥金竒萬户屯安勤山毛甘萬戸屯烏聊山黟帥陳僕祖山等二萬户屯林厯山林厯山四靣壁立髙數十丈徑路危狹不容刀楯賊臨髙下石不可得攻軍住經日將吏患之齊身出周行觀視形便隂募輕捷士為作鐵戈宻於隱險賊所不備處以戈拓斬山為縁道夜令潛上乃多懸布以援下人得上百數人四靣流布俱鳴皷角齊勒兵待之賊夜聞皷聲四合謂大軍悉已得上驚懼惑亂不知所為守路備險者皆走還依衆大軍因是直上大破僕等其餘皆降凡斬首七千餘級黄蓋為周瑜部將建安十三年九月曹公入荆州劉琮舉衆降吴將士聞皆恐大帝延見羣下問以計䇿議者咸勸迎之周瑜曰不然操託名漢相其實漢賊也瑜請精兵三萬保為將軍破之大帝曰君言當擊甚與孤合此天以君授孤也時劉備為曹公所破欲引南渡江與魯肅遇於當陽遂共圗計因進住夏口遣諸葛亮詣大帝帝遂遣瑜及程普等與備并力逆曹公遇於赤壁時曹公軍衆已有疾病初一交戰公軍敗退引次江北瑜等在南岸蓋曰今冦衆我寡難與持久然觀操軍方連船艦首尾相接可燒而走也乃取蒙衝鬬艦數十艘實以薪草膏油灌其中裹以帷幕上建牙旗先書報曹公欺以欲降江表𫝊載蓋書曰蓋受孫氏厚恩常為將帥見遇不薄然顧天下事有大勢用江東六郡山越之人以當中國百萬之衆衆寡不敵海内所共見也東方將吏無有愚智皆知其不可惟周瑜魯肅偏懷淺戇意未觧耳今日歸命是其實計瑜所督領自易摧破交鋒之日蓋為前部當因事變化効命在近曹公時見行人宻問之口勅曰但恐汝詐爾蓋若信實當授爵賞超於前後也又豫備走舸各繫大船後因引次俱前曹公軍吏士皆延頸觀望指言蓋降蓋放諸船同時發火時風猛火烈悉延燒岸上營落頃之煙炎漲天人馬燒溺死者甚衆軍遂敗退還保南郡江表傳載蓋至戰日先取輕利艦十舫載燥荻枯柴積其中灌以魚膏赤幔覆之建旌旗龍幡於艦上時東南風急因以十艦最著前中江舉㠶蓋舉火白諸校使衆兵齊聲大呼曰降降操軍人皆出營立觀去北軍二里餘同時發火火烈風猛往船如箭飛埃絶燼燒盡北船延及岸邉營栅瑜等率輕鋭軍繼其後擂皷大進北軍大壞曹公退走備與瑜等復共追曹公曹公留曹仁等守江陵城徑自北歸潘璋為平北將軍襄陽太守魏將夏侯尚等圍南郡分前部三萬人作浮橋渡百里洲上時諸葛瑾楊粲並㑹兵赴救未知所出而魏兵日渡不絶璋曰魏勢始盛江水又淺未可與戰便將所領到魏上流五十里伐葦數百萬束縛作大筏欲順流放火燒敗浮橋作筏適畢伺水長當下尚便引退呂䝉為横野中郎將同周瑜程普等圍魏將曹仁於南郡瑜使甘寧前據夷陵曹仁分衆圍寧寧困急使使請救諸將以兵少不足分蒙謂瑜普曰留凌公績凌統字蒙與君行解圍釋急勢亦不久蒙保公績能十日守也又説瑜分遣三百人柴斷險道賊走可得其馬瑜從之軍到夷陵即日交戰所殺過半敵夜遁去行遇柴道騎皆舎馬歩走兵追蹙擊獲馬三百匹方船載還於是將士形勢自倍乃渡江立屯與相攻擊曹仁退走遂據南郡撫定荆州還拜偏將軍後從大帝拒曹公於濡須數進竒計帝欲立塢諸將皆曰上岸擊賊洗足入船何用塢為蒙曰兵有利鈍戰無百勝如有邂逅敵歩騎蹙人不暇及水其得入船乎帝曰善遂作之曹公不能下而退其後劉備令闗公鎮守專有荆土帝命蒙西取長沙零桂三郡蒙移書二郡望風歸服惟零陵太守郝普城守不降而備自蜀親至公安遣公爭三郡帝時住陸口使魯肅萬人屯益陽拒公而飛書召蒙使捨零陵急還助肅初蒙既定長沙當之零陵過􅌕載南陽鄧𤣥之𤣥之者郝普之舊也欲令誘普及被書當還蒙祕之夜召諸將授以方畧晨當攻城顧謂𤣥之曰郝子太聞世間有忠義事亦欲為之而不知時也左將軍在漢中為夏侯淵所圍闗公在南郡今至尊身自臨之近者破焚本屯救􅌕逆為孫規所破此皆目前之事君所親見也彼方首尾倒縣救死不給豈有餘力復營此哉今吾士卒精鋭人思效命至尊遣兵相繼於道今子以旦夕之命待不可望之救猶牛蹄中魚兾頼江漢其不可恃亦明矣若子太必能一士卒之心保孤城之守尚能稽延旦夕以待所歸者可也今吾計力度慮而以攻此曾不移日而城必破城破之後身死何益於事而令百嵗老母戴白受誅豈不痛哉度此家不得外問謂援可恃故至於此爾若可見之為陳禍福𤣥之見普具宣蒙意普懼而聽之𤣥之先出報蒙普尋後當至蒙豫勅四將各選百人普出便入城守門須臾普出蒙迎執其手與俱下船語畢出書示之因拊手大笑普見書知備在公安而闗公在益陽慙恨入地蒙留孫河委以後事即日引軍赴益陽劉備請盟帝乃歸普等割湘水以零陵還之以尋陽陽新為蒙食邑後為右䕶軍虎威將軍代魯肅屯陸口與蜀將闗公分土接境蒙至外倍修恩厚與公結好後公討樊留兵將備公安南郡蒙上疏曰蜀討樊而多留備兵必恐蒙圗其後故也蒙嘗有病乞分士衆還建業以治疾為名蜀聞之必撤備兵盡赴襄陽大軍浮江晝夜馳上襲其空虛則南郡可下而敵可擒也遂稱病篤帝乃露檄召蒙還隂與圗計蜀果信之稍撤兵以赴樊魏使于禁救樊蜀盡擒禁等人馬數萬託以糧乏擅取湘闗米帝聞之遂行先遣蒙在前蒙至尋陽盡伏其精兵􅖻􅑳中使白衣揺櫓作商賈人服晝夜兼行至蜀所置江邉屯候盡収縛之是故蜀不聞知遂到南郡傅士仁麋芳等皆降也吕岱為交州刺史時交趾太守士爕卒帝以爕子徽為安逺將軍領九真太守以校尉陳時代爕岱表分海南三郡為交州以將軍戴良為刺史海東四郡為廣州岱自為刺史遣良與時南入而徽不承命舉兵戍海口以拒良等岱於是上疏請討徽罪督兵三千人晨夜浮海或謂岱曰徽藉累世之恩為一州所附未易輕也岱曰今徽雖懷逆計未虞吾之卒至若我潛軍輕舉掩其無備破之必也稽留不速使得生心嬰城固守七郡百蠻雲合響應雖有智者誰能圗之遂行過合浦與良俱進徽聞岱至果大震怖不知所出即率兄弟六人肉袒迎岱岱皆斬送其首徽大將甘醴桓治等率吏民攻岱岱奮擊大破之朱桓為濡須督黄武元年魏使大司馬曹仁歩騎數萬向濡須仁欲以兵襲取州土偽先揚聲欲東攻羡溪桓分兵將赴羡溪既發卒得仁進軍拒濡須七十里間桓遣使追還羡溪兵兵未到而仁蚤至時桓手下及所部兵在者五千人諸將業業各有懼心桓喻之曰凡兩軍交對勝負在將不在衆寡諸軍聞曹仁用兵行師孰與桓邪兵法所以稱客倍而主人半者謂俱在平原無城池之守又謂士衆勇怯齊等故爾今仁既非勇智加其士卒甚怯又千里歩渉人馬罷困桓與諸軍共據髙城南臨大江北背山陵以逸待勞為主制客此百戰百勝之勢也雖曹丕自來尚不足憂況仁等邪桓因偃旗皷外示虚弱以誘致仁仁果遣其子泰攻濡須城分遣將軍常雕督諸葛䖍王雙等乗油船别襲中洲中洲者部曲妻子所在也仁自將萬人留橐臯復為泰等後拒桓部兵將攻取油船或别擊雕等桓等身自拒泰燒營而退遂梟雕生虜雙送武昌臨陣斬溺死者千餘大帝嘉桓功封嘉興侯徐盛為安東將軍封蕪湖侯魏文帝大出有渡江之志盛建議從建業築圍作薄落圍上設假樓江中浮船諸將以為無益盛不聽固立之文帝到廣陵望圍愕然彌漫數百里江水盛長便引軍退諸將乃伏文帝嘆曰魏雖有武騎千羣無所用也鍾離牧為越騎校尉永安六年蜀并於魏武陵五谿夷與蜀接界時論懼其叛亂乃以牧為平魏將軍領武陵太守往之郡魏遣漢復縣長郭純試守武陵太守率涪陵民入蜀遷陵界屯於赤沙誘致諸夷邑君或起應純又進攻酉陽縣郡中震懼牧問朝吏曰西蜀傾覆邉境見侵何以禦之皆對曰今二縣山險諸夷阻兵不可以驚擾驚擾則諸夷盤結宜以漸安可遣恩信吏宣教慰勞牧曰不然外境内侵誑誘人民當及其根柢未深而撲取之此救火貴速之勢也勅外趣嚴掾史沮議者便行軍法撫夷將軍髙尚説牧曰昔潘太常督兵五萬然後以討五谿夷爾又是時劉氏連和諸夷率化今既無往日之援而郭純已據遷陵而明府以三千兵深入尚未見其利也牧曰非常之事何得循舊即率所領晨夜進道縁山險行垂二千里從塞上斬惡民懷異心者魁帥百餘人及其支黨凡千餘級純等散五谿平遷公安督揚武將軍封都鄉侯陸抗為大將軍鳯凰元年西陵督歩闡據城以叛遣使降晉抗聞之日部分諸軍令將軍左奕吾彥蔡貢等徑赴西陵勅軍營更築嚴圍自赤谿至故市内以圍闡外以禦冦晝夜催切如敵已至衆甚苦之諸將咸諫曰今及三軍之鋭亟以攻闡比晉救至闡必可㧞何事於圍而以弊士民之力乎抗曰此城處勢既固糧穀又足且所繕修備禦之具皆抗所宿規今反身攻之既非可卒克且北救必至而無備表裏受難何以禦之諸將或欲攻闡抗每不許宜都太守雷譚言至懇切抗欲服衆聼令一攻攻果無利圍備始合晉車騎將軍羊祜率師向江陵諸將咸以抗不宜上抗曰江陵城固兵足無所憂患假令敵没江陵必不能守所損者小如使西陵盤結則南山羣夷皆當擾動則所憂慮難可而言也吾寧棄江陵而赴西陵況江陵牢固乎初江陵平衍道路通利抗勅江陵督張咸作大堰遏水漸漬平中以絶冦叛祜欲因所遏水浮船運糧揚聲將破堰以通歩軍抗聞使咸亟破之諸軍皆惑屢諫不聼祜至當陽聞堰敗乃改船以車運大費損功力晉巴東監軍徐裔率水軍詣建平荆州刺史楊肇至西陵抗令張咸固守其城公安督孫遵巡南岸禦祜水軍督留憲鎮西將軍朱琬拒裔身率三軍憑圍對肇將軍朱喬營都督俞贊亡詣肇抗曰贊軍中舊吏知吾虚實者吾常慮夷兵素不簡練若敵攻圍必先此處即夜易夷兵皆以舊將充之明日肇果攻故夷兵處抗命旋軍擊之矢石雨下肇衆傷死者相屬肇至經月計屈夜遁抗欲追之而慮闡畜力項領伺視間隙兵不足分於是但鳴皷戒衆若將追者肇衆忷懼悉解甲挺走抗使輕兵躡之肇大破祜等皆引軍還抗遂䧟西陵誅夷闡族及其大將吏自此已下所請赦者數萬口修治城圍册府元龜卷三百六十二
