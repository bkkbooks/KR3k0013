令及丞並升一階以彰崇奉亞獻皇太子璵賜物一千段終獻榮王琬賜物五百段其餘各賜階爵有差其郡守縣令職守親人必在公勤用康黎庶凡所推擇皆竭乃誠寵錫之門須甄異等普恩之外太守等竝賜爵一級縣令賜􅈴兩轉庶其勉勵以表朕心其京文武官一品賜物一百疋二品八十疋三品七十疋四品五品五十疋六品七品各三十疋八品九品二十段東京北京留守節度採訪使并京官准勅出使未㢠廻者所賜物並同見在例左相陳希烈純粹之道載穆朝廷文儒之風式瞻師表且叶和時令翊贊昇平柔嘉其徳克壯元老與一子五品官賜物五百疋攝太尉奠瓚上册書寳册讀册右相楊國忠宜與一子三品仍與一子五品官更賜物五百段左僕射安禄山既押登歌又押寶册與一子官更賜物四百疋攝太尉張均太清宫祠及脩儀注等使普恩之外又賜物一百疋武徳功臣及貞觀初宰輔等緬想忠義感會風雲用集大􅈴肇興王業其有子孫零落冠冕陵夷無任官者宜令所司勘責依資與一人京官唐初功臣續參締搆錄勞念舊每寘於懐普恩之外宜放一子出身所司依資與一官率土之内賜酺三日三月丙午宴躍龍殿門賜右相楊國忠絹一千五百疋綵羅三百疋綵綾五百疋左相陳希烈絹三百疋綵羅綾各五十疋餘三品八十疋四品五品六十疋六品七品四十疋十四年八月天長節詔南衙九品以上并京兆府畿令等宜共賜物二萬疋左右龍武軍各賜一千疋其唐元功臣言念􅈴舊宜異常倫兩軍各賜物二千疋餘各有差天下侍老各量賜米肅宗至徳元年七月即位於靈武詔天下耆夀各賜帛五段諸百姓本道採訪使差郡縣存問四方將士各賜馬一疋六品以下賜帛十段天下寺觀各度十人内外文武官九品以上各加兩階賜􅈴兩轉三品以上賜爵一級八月上皇至蜀郡大赦天下左相韋見素進封豳國公特加一階兼文部尚書平章事房琯中書侍郎平章事崔圓竝賜特進三品門下侍郎平章事崔渙賜四品驃騎大將軍内侍監知内侍省事渤海郡公髙力士加開府儀同三司進封齊國公左龍武大將軍潁川郡公陳𤣥禮加開府儀同三司進封潁國公朝臣扈從衣緋者賜紫綠者賜緋竝量加進封十二月戊午帝御丹鳳門大赦天下詔五品以上清資官及三品以上官上郡太守父見任無官及官卑竝與五品官及祖先亡沒者贈一人官祖母亡没亦贈邑號天下父老八十以上版授有差竝賜緋魚袋内外文武三品以下各加一階應叙三品五品量加兩考蜀郡鳳翔扈從官九品以上更賜􅈴一轉溥天之下賜酺五日乾元元年二月乙巳受册尊號大赦改元詔内外文武官有三品以上各賜爵一級四品以下及四方通表使各加一階五品以上有父殁者各賜􅈴兩階四月甲寅郊廟禮畢乙卯御丹鳳門大赦天下詔曰其成都府元從聖皇功臣及靈武元從功臣并收兩京將士京留守諸道節度採訪使普恩外三品以上賜爵一級四品以下加一階門人賜􅈴三轉二王三恪各與一子官内外文武官三品以上賜爵一級四品以下加一階八月甲辰天長節上皇於金明樓宴百官賜綵五百疋十月甲辰册成王俶為皇太子大赦天下詔文武官三品以上賜爵一級四品以下各加一階五品以上官子為父後者賜􅈴两轉頃緣國用不足頒賜未周今所鑄新錢數盈於萬其京官文武兩品以上及常參官六軍將士東北京留守及諸道節度將士等各賜物有差其唐元功臣成都元從及朕元從功臣等普恩之外更賜一爵四品以下更加兩階其在靈州及寧州至鳳翔者仰所司類例更逓加一等皇親及諸色陪位人各賜􅈴兩轉其鴻臚蕃客共賜絹一千疋應緣册禮職掌要重者及撰册昇寶官禮官等普恩之外賜􅈴兩轉其禮儀使特賜一階副使普恩之外賜爵一級勅文有不該者所司類例奏聞二年九月丙寅帝降誕日宴百官於宣政殿賜絹三千疋上元元年閏四月己卯御明鳳門大赦改元詔内外文武官賜爵各有差其六軍及飛龍閑廐加賜物其成都靈武元從扈從逓加有差見在諸軍各加錄賞物陣亡將士優加褒贈行人家口所在賑給二年九月壬寅大赦制自今以後但稱元年以今年十一月為嵗首每月以所建為數内外官三品以上賜爵一級四品五品各加一階六品以下賜􅈴兩轉成都府及靈武元從普恩之外三品以下更加賜爵一級四品更加一階六品以下更賜􅈴一轉京文武官等賜物各有差天下父老先版授者改與版授未版授者與版授元年建卯月辛亥大赦制内外文武官三品以上賜爵一級四品以下各加一階成都靈武元從功臣三品以上更賜爵一級四品以下更加一階其京清資正員文官五品以上武官三品以上并兩省供奉官御史諸州刺史並諸道節度以下三品以上父母亡没未經追贈者竝量與追贈册府元龜卷八十
