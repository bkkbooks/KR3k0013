  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0013_WYG_080-1a}
body:
  text: 册府元龜卷八十宋王欽若等撰帝王部慶賜第二唐太宗以武徳九年八月甲子即位於東宫大赦天下文武官五品以上先無爵者賜爵一級六品以下加􅈴一轉甲戌宴羣臣於顯徳前殿賜帛各有差貞觀二年五月丙申以夏麥大稔讌羣臣奏九部樂於庭賜物各有差六月庚寅皇太子治生宴五品以上賜帛有差仍賜天下是月生者粟帛九月壬子宴羣臣奏九部樂賜帛各有差賜天下大酺三日慶有年也十一月甲子宴羣臣賜帛各有差四年二月甲寅赦詔賜天下大酺五日己亥幸温湯賜從官帛有差三月戊辰宴三品已上於林光殿賜物各有差七月辛卯太上皇不豫有瘳詔曰尚齒崇孝徳教所先饗餼是加義超常等諸州都督刺史及文武官人老人八十以上并孝子旌表門閭者並宜節級賜物以申饗宴庶使萬國之内同此歡心施於四海皆知朕意壬辰宴羣臣於芳華殿極歡而罷賜帛各有差十月幸隴州詔岐隴二州八十以上鰥寡篤疾及舊任二州雜職佐史以上賜物各有差百嵗以上就加優恤辛丑校獵於貴泉谷賜將士帛有差丁巳宴從官及武功父老賜帛各有差十二月乙未皇太子誕育宴三品以上於臨華殿賜帛各有差五年正月癸酉大蒐於昆明池甲戌宴羣臣賜從官帛各有差己卯幸左藏庫賜三品以上帛各重負而出四月甲辰宴羣臣賜帛各有差八月己卯以大有年賜羣臣羊酒宴樂於其家十一月己卯宴羣臣賜帛各有差十二月丙午幸温湯新豐賜高年帛有差六年正月宴蠻夷及三品以上於百福殿賜帛各有差三月戊辰幸九成宫丁丑詔行經之所八十以上及孝子順孫鰥寡惸獨賜以粟帛戊寅宴三品以上於九成宫丹霄殿賜從官帛各有差四月癸卯醴泉出丹霄殿之西命公卿以上示之因置酒於側賜帛各有差七月宴三品以上於丹霄殿賜帛各有差八月宴近臣於丹霄殿樓帝甚懽夜分乃散各賜錢帛各有差閏八月帝在岐州皇太子來朝丙申宴東宫官屬賜帛各有差乙巳宴岐州父老賜帛各有差九月幸慶善宫宴從官故老賜帛各有差七年正月癸巳宴三品以上及州牧蠻夷於𤣥武門奏七徳九功之舞蠻夷十餘種自請率舞詔許之久而乃罷賜帛各有差八年二月丙午以皇太子承乾加元服降死罪以下五品以上子為父後者賜爵一級天下大酺三日戊申宴羣臣賜帛各有差九年正月甲申皇太子承乾納妃蘇氏宴羣臣賜帛各有差十一年正月壬辰宴五品以上於兩儀殿賜帛各有差戊辰宴長安父老於𤣥武門賜以穀帛三月幸雒陽宫丙午宴從官賜物各有差癸卯宴雒陽父老於乾元殿賜以粟帛十一月丙午宴五品以上及蕃夷於貞觀殿賜帛各有差十二年二月壬子宴雒陽父老賜帛有差十三年正月乙巳帝朝於獻陵三原縣人年八十以上及孝子順孫義夫節婦鰥寡惸獨有篤疾者賜物各有差宿衛陵邑中郎將齊士員及三原令已下各賜爵一級十四年正月己酉宴羣臣及吐谷渾王河源王慕容諾曷鉢於𤣥武門賜物各有差甲寅幸魏王泰宅賜泰府寮及同里老人各有差十二月賜酺三日十五年正月辛巳如雒陽所過州賜高年篤疾穀帛有差四月乙未詔雒州篤疾及鰥寡惸獨不能自存者各賜米兩石五月壬申并州道士及僧父老等二百人詣闕上表稱太原王業龍興之地登封禮畢伏願臨幸帝賜宴於武成殿各賜物而遣之十六年十一月西狩於武功甲子賜所幸六縣高年篤疾惸獨氈被穀帛各有差是日幸慶善宫召武功之邰城立節三時豐義四鄉士女七十以上及居宫側數百人賜宴畢賜帛各有差十七年四月丙戌詔立晉王為皇太子又立晉王妃帝御承天門大赦文武職事九品以上及五品以上子為父後者各加一級鰥寡惸獨篤疾之徒量加賑卹賜天下酺六月甲午并州父老百餘人詣闕稱陛下發迹太原皇太子疏爵晉藩臣等不勝慶幸今來奉賀帝賜宴及物以遣之閏六月庚申薛延陀可汗突利設獻馬帝於慎思殿大饗百寮盛陳寶器奏慶善破陳樂并十部之樂及橦末跳丸舞劍之技突利設再拜上千萬嵗夀賜物各有差十一月誕皇太孫宴宮寮於𢎞教殿賜物有差是月以貞石表瑞赦制率土賜酺三日十九年二月征遼所經州縣高年及鰥寡孤獨篤疾賜粟帛各有差十月征遼班師次營州戊申詔營州刺史父老及契丹等蕃長以下各頒賜繒綿綾錦數千萬段癸酉至幽州甲戌宴從官三品以上賜物有差十二月辛酉帝在定州三品以上及四品中書門下四品以帝疾瘳詣閣上禮詔引文武五品以上預宴將夕乃罷賜物各有差二十年正月帝自定州幸并州庚辰引從官及太原父老而宴之賜物各有差二月詔遼海人無戰􅈴者汎加􅈴官一級乙未發并州庚申賜高年所過鰥寡孤獨篤疾粟各有差七月帝疾愈宴五品以上於飛霞殿絲竹逓奏羣臣上夀極歡而罷賜綾錦各有差八月幸靈州庚辰至涇州賜高年及鰥寡孤獨篤疾粟帛各有差二十一年正月甲寅以鐡勒諸部并為州縣中外乂安詔賜諸司及京城百姓大酺三日二十二年正月己未奏十部樂會四夷君長於天成殿王公稱觴上夀賜帛各有差三月丙辰至玊華宫賜行幸所過高年篤疾粟帛各有差二十三年五月以甘露降大赦天下八十以上各賜粟帛鰥寡惸獨及篤疾者量加賑貸高宗以貞觀二十三年六月甲戌朔即位大赦天下内外文武賜􅈴官一級永徽三年正月丁亥率公卿耕於藉田賜羣官帛各有差二月甲辰宴三品於百福殿極歡賜以錦綵各有差三月丙辰御觀徳殿陳逆人房遺愛等口馬資財為五垜引王公諸親蕃客及文武九品以上大射賜之七月丁巳立陳王忠為皇太子五品以上子為父後者賜􅈴一轉大酺三日六年正月壬申親謁昭陵還行宫詔左監門員外將軍常基在此宿衛進爵一等陵令陵丞各加一階竝節級賜物二月乙巳皇太子忠加元服詔内外職事五品以上子為父後者賜􅈴一級大酺三日十月立武氏為皇后大赦天下八十以上老人各賜粟二石綿三叚百嵗以上各賜粟五石錦十叚鰥寡惸獨篤疾不能自存者量加賑卹顯慶元年正月辛未立代王𢎞為皇太子壬申大赦文武職事九品以上五品以下子為父後者各加􅈴官一轉亡官失爵並宜量叙諸年八十以上各賜粟帛鰥寡惸孤篤疾之徒不能自存者量加賑卹賜天下大酺三日己卯宴文武羣臣及朝集使蕃客京城老人八十以上賜物各有差十一月乙丑皇太子顯生京職事九品以上及朝集使各加􅈴官一級仍賜宴賚物各有差二年二月辛酉幸雒陽宫癸亥御貞觀殿宴從行文武官及雒州父老宗姓等賜物有差詔百嵗以上各賜氊被一具袍一領綿絹十段粟二十石仍遣使就家存問九十以上各賜綿絹五段十月幸鄭州以高祖在隋嘗守滎陽詔曰百姓免一年租賦八十以上老人及鰥寡惸獨等賜粟帛各有差四年十月皇太子𢎞加元服大赦天下文武官職事五品以上子孫為父祖後者各加􅈴官一級大酺三日閏十月辛巳以駕幸東都詔所經處八十以上老人賜氊袍綿絹及粟有差五年二月幸并州丙戌宴從官及諸親并州官屬父老賜帛有差賜酺三日八月癸未以討平百濟賜天下大酺三日龍朔二年七月丁亥以皇子旭輪滿月賜酺三日京官五品以上并諸親等為誕皇太子上禮於是九品以上咸預宴樂賜物有差麟徳元年八月丁丑幸舊宅宴羣臣賜物有差乾封元年正月戊辰朔有事於泰山壬申御朝覲壇受朝賀大赦改元諸行從文武官及見朝覲岳牧二京留守并邉要州都督刺史三品以下竝賜爵一等四品以下加授一階諸老人八十以上者版授刺史司馬縣令婦人版授郡縣君並節級量賜粟帛天下百姓年二十以上八十以下賜爵一級丁丑詔諸行從文武官入見朝覲諸王岳牧二京留守及守捉邉要長官三品以上前賜爵一等者宜更加為二等四品以下九品以上前加一階等者七品以上宜加二階八品以下更加􅈴官一轉諸非行從内外職事官三品以上加爵一等四品以下各加一階四月甲辰至京師是日御景雲閣宴羣臣設九部樂頒賜繒綵各有差總章元年十月癸丑文武官獻食賀破髙麗帝御𤣥武門之觀徳殿宴百官設九部樂極歡而罷賜各有差二年九月幸岐州以髙祖嘗為扶風太守故曲赦岐州仍賜高年衣服粟帛各有差咸亨四年七月庚午皇太子新宫成帝親逆太子入宫五品以上及諸親竝從宴會奏樂極歡而止賜物有差十月駕在九成宫乙未皇太子納妃裴氏禮畢曲赦岐州大酺上元元年八月壬辰追尊宗廟大赦改元大酺三日帝御含元殿東翔鸞閣觀之時京城四縣及太常音樂分為東西兩廂二年正月勅内外文武官職事四品五品任經十年已上未得階及六品以下出身經十五年以上歴職清勤無殿犯者宜令所司具以名聞其有㢘能著稱清苦奉公不須限以居職年月亦以名聞於是各賜一階三年三月甲辰自汝州温湯還東都詔免汝州田租之半八十以上老人節級賜帛儀鳳三年七月丁巳宴百寮及諸親於九成宫之咸亨殿日晏而罷賜綵物有差永隆元年八月乙丑立英王哲為皇太子改元大赦大酺三日二年二月辛巳特賜京官九品以上大酺三日永淳元年二月癸未以太子誕皇孫滿月大赦改元大酺三日𢎞道元年二月改元大赦老人年八十以上并婦人並節級量賜粟帛孝子順孫義夫節婦表其門閭終身勿事鰥寡孤獨篤疾不能自存者量加賑給見任内外官五品以上經四考及守五考經三考六品以下計滿三考政有清勤狀無私犯者各加一階中宗神龍元年正月丙午即位大赦内外文武官加兩階三品以上加爵二等入五品等特減四考大酺五日二月甲子立妃韋氏為皇后大赦天下内外官預陪位者賜勲一轉大酺三日九月壬午帝親祀明堂禮畢制京文武三品以上賜爵一級四品以上各加一階外文武官九品以上賜􅈴一轉皇親嗣王郡王仍許佩金魚袋内外職事官三品以上及四品清官并中書門下五品官父已亡者並量加追贈自𢎞道已前經任相三年已上及泰府晉府寮佐四品以上并食實封功臣雖經罪責不至破家子孫無任京官者特宜優與一官英府周府舊寮五品以上子孫亦宜准此天下百姓為父後者各賜爵一級大酺三日十一月壬子帝謁太廟告謝受尊號之意大赦天下京官文武官及朝集使九品以上加一階三品以上賜爵一等外官九品以上賜􅈴一轉天下賜酺三日二年十月戊戌至自東都十一月乙巳大赦天下從官文武官九品已上賜爵景隆元年九月受尊號禮畢赦詔改元文武官三品以上賜􅈴一轉二年二月皇后言衣箱中裙上有五色雲起久而方歇帝令畫工圖其狀以示百寮仍大赦天下内外五品以上官母妻各加邑號一等十一月己卯安樂公主降武延秀禮畢大赦賜酺三日三年正月癸酉幸薦福寺賜從官帛有差八月己巳幸安樂公主山池宴從官賜繒帛有差十一月乙丑南郊大赦文武官及應集考使别勅陪位官邊州都督刺史諸軍大使副三品已上賜爵一等四品以上加一階應入三品者三品減四考五品減三考聽入外文武官賜􅈴一轉天下大酺三日十二月甲午幸新豐之温湯從官賜􅈴一轉睿宗初為安國相王景隆四年六月庚子夜臨淄王平韋庶人辛丑相王奉少帝御安福門樓大赦内外文武官三品以上賜爵一等四品以上加一階應入五品不限以年考四等以下及諸親賜勲三轉唐隆元年甲辰即位大赦天下制内外官三品以上各加爵一等四品以下各加一階七月己巳册皇太子大赦天下内外文武官九品以上子承父後者各賜一轉景雲二年四月壬寅大赦天下京官四品以下加一階外官賜􅈴一轉三品以上各賜