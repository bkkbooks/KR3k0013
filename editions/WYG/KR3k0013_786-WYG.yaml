body:
  text: 冊府元龜卷七百八十六宋王欽若等撰總錄部博學多能博學夫學知乎不足廣業在勤友貴乎多聞孤陋為恥葢夫自強不息之士以好古博雅為念泛覽篇籍之囿索隱天人之際以至九流七略之奥諸子百家之言龜䇿厯象之精微方伎術數之元妙史書蟲篆之叢脞聲樂鍾律之鏗鏘逮乎地理山經𤣥文釋典咸能探其幽􅄨洞乎指趣始繇時習之利終成待問之名羣居之言必及於義專門之學自可名家仲尼所謂好古敏以求之者乃斯人之謂矣漢司馬談學天官書於唐都即律厯所云唐都者受易於楊何何字叔元習道論於黃子景帝時人謂之黃生仕於建元元封之間愍學者不逹其意而師誖誖惑也為習師法惑於所身乃論六家之要指六家謂陰陽儒墨名法道也位至太史公司馬遷字子長其渉獵者廣博貫穿經傳馳騁古今上下數千載間位至太史李尋治尚書與張儒鄭寛中同師寛中等守師法敎授尋獨好洪範灾異又學天文月令陰陽位至騎都尉翼奉字少君博學不倦好律厯陰陽之占位至諫大夫翟方進雖受穀梁然好左氏傳天文星厯其左氏則國師劉歆星厯則長安令田終術師也言劉歆及田終術二人皆受學於方進也位至丞相揚雄字子雲少好學不為章句訓詁通而已詁謂指也博覽無所不見而潭思渾天潭深也渾天天象也參摹而四分之三折而四分天之宿度甲乙也極於八十一旁則三摹九据据位也處也極之七百二十九贊亦自然之道也位至大夫後漢王景少學易遂廣闚衆書又好天文術數之事沈深多伎藝位至廬江太守班固字孟堅年九嵗能屬文誦詩賦及長遂博貫載籍九流百家之言無不研究九流謂道儒墨名法陰陽雜縱橫所學無常師不為章句大義而已位至大將軍中䕶軍崔駰能通詩易春秋博學有偉才盡通古今訓詁百家之言善屬文少㳺太學與班固傅毅同師齊名位至長岑長徐淑寛裕博雅好學樂道隨父慎在京師鑚孟氏易春秋公羊禮記周官善誦太公六韜位至度遼將軍劉寛少學歐陽尚書京氏易尤明韓詩外傳星官風角筭厯皆究極師法稱為通儒未嘗與人爭勢利之事後為太尉梁鴻扶風平陵人也受業太學家貧而尚節介博覽無不通而不為章句翟酺四世傳詩酺好老子尤善圖緯天文内厯筭位至將作大匠胡廣有雅才學究五經古今術藝皆異覽之位至太傅蔡邕少博學師事太傅胡廣好辭章術數天文位至左中郎將延篤從馬融受業博通經傳及百家之言能著文章有名京師位至京兆尹劉洪篤信好學觀乎六藝羣書意以為天文數術探􅄨索隱鈎深致遠遂專心銳思唐檀少逰太學習京氏易韓詩顔氏春秋尤好灾異星占位至郎中任安字定祖少逰太學受孟氏易兼通數經又從同郡揚厚學圖䜟究極其術時人稱曰欲知仲桓問任安又曰居今行古任定祖安初仕州郡後徵辟皆不就法真南郡太守雄之子好學而無常家博通内外圖典為關西大儒辟公府舉賢良皆不就公沙穆習韓詩公羊春秋尤鋭思河雒推歩之術位至遼東屬國都尉樊志張漢中南鄭人也博學多通隱身不仕韓說博通五經尤善圖緯之學仕至江夏太守樊英少受業三輔習京氏易兼明五經又善風角星筭河雒七緯推歩灾異七緯者易緯稽覽圖乾鑿度坤靈圖通卦驗是穎謀辨終偹也書緯璇璣鈴考靈耀刑德収帝命驗運期受也詩緯推度灾記厯樞含神務也禮緯含文嘉稽命徵斗威儀也樂緯動聲儀稽耀嘉叶圖徵也孝經緯援神契鈎命決也春秋緯演孔圖元命苞文耀鈎運斗樞感精符合誠圖考異郵保乾圖漢含孶佑助期握誠圖潜潭巴説題辭位至光禄大夫申屠蟠陳留外黃人也隱居精學博貫五經兼明圖緯後以博士徵不至徐稚少為諸生學嚴氏春秋京氏易歐陽尚書兼綜風角星官筭厯河圖七緯推歩四察孝亷五辟宰府三舉茂才李固改易姓名杖䇿驅騾負笈追師三輔學五經積十餘年博覽古今明于風角星筭河圖䜟緯仰察俯占窮神知變位至太尉賀純字仲真會稽山陰人少為書生博極羣藝徵拜議郎數陳災異上便宜數百事多見省納遷江夏太守周昕字大明少游京師事太傅陳蕃博覽羣書明于風角善推災異鄭𤣥少為鄕嗇夫得休歸嘗詣學官不樂為吏父數怒之不能禁遂造太學受業師事京兆第五元先造通京氏易公羊春秋三綂厯九章筭術徵大司農不就應劭字仲遠博學多識尤好事諸所撰述風俗通等凡百餘篇辭雖不雅世服其博聞位至袁紹軍謀校尉魏樂詳字文載學左氏傳又善推歩三五當高貴鄉公時授詔與太史興定律厯太守杜畿亦甚好學署詳文學祭酒蜀孟光字孝裕博物識古無書不覽尤鋭意三史長於漢家舊典位至大司農李譔字欽仲五經諸子無不覽該位至右中郎將譙字榮始巴西充國人也治尚書兼通諸經及圖緯州郡辟請皆不應譙周子也周字允南研精六經尤善書札頗曉天文潜識内敏為益州典學從事總州之學者後入晉拜騎都尉吳陸績字公紀容貌雄壯博學多識星厯筭數無不該覽位至偏將軍王蕃字永元博覽多聞兼通術藝蕃為後主所誅丞相陸凱上疏曰常侍王蕃黃中通理知大和物位至散騎中常侍晉鄭冲覽博究儒術及百家之言仕魏為司徒時文帝輔政命賈充羊祐等分定禮儀律令皆先諮于冲然後施用張華學業優博辭藻溫麗宏贍多通圖緯方伎之書莫不詳覽位至司空虞喜字仲寧會稽餘姚人博學好古專心經傳兼覽䜟緯乃著安天論以難渾盖以散騎常侍徵不起劉殷弱冠時博通經史綜核羣言文章詩賦靡不該覽位至新興太守索靖該博經史兼通内緯位至逰擊將軍索紞字叔徹燉煌人㳺京師受業太學博綜經籍遂為通儒明陰陽天文善術數占候仕至郎中黄沈魏郡人泓之父也善天文秘術泓從父受業精妙踰深兼博覽經史尤明禮易性忠勤非禮不動邵續字嗣祖朴素有志烈博覽經史善談理義妙解天文仕至沁水令杜夷字行齊博覽經籍百家之書筭圖厯緯靡不畢究位至國子祭酒范平字子安研覽墳索遍該百氏姚信賀邵之徒皆從受業位至臨海太守鮑靚字太元學兼内外明天文河雒書宋徐廣字野民世家好學至廣尤精百家數術無不研覽後為秘書監性好讀書老猶不倦答禮問百餘條用於今世仕至中散大夫梁顧協博極羣書於文字及禽獸草木尤稱精詳位至員外散騎常侍庾承先潁川鄢陵人也弱嵗受學於南陽劉虬強記敏識出於羣輩元經釋典靡不該悉九流七略咸所正練不就徵辟隱居而終庾詵字彦寶新野人也㓜聰警篤學經史百家無不該綜緯候書射並一時之絶初高祖起義署為西府記室參軍羊侃字祖忻雅愛文章博渉書記尤耽左氏春秋及孫吳兵法徐摛為皇太子家令兼掌管記高祖問五經大義次問厯代史及百家雜說末論釋敎摛商較縱橫應答如響高祖甚嘉歎異陳顧野王好學七嵗讀五經知大旨長而遍觀經史精記黙識天文地理蓍龜占候蟲篆竒字無所不通位至光禄卿馬樞博極經史尤善佛經及周易老子義文帝徵為度支尚書不應命顧越字允南勵精學業不捨晝夜至於微言𤣥旨九章七曜音律圖緯盡其精微厯北海安西湘東王府參軍及武帝撰制旨新義選諸儒在所流通遣越還吳敷揚講義越遍該經藝深明毛詩傍通異義特善莊老尤長論難位至大中大夫孔奐數嵗而孤為叔父䖍孫所養好學善屬文經史百家莫不通渉沛國劉顯時稱學府每共奐討論深相歎美乃執奐手曰昔伯喈墳素悉付仲宣吾當希彼蔡君足下無愧王氏所保書籍尋以相付位至宏範官衞尉卿周確字士濳美容儀寛大有行檢博渉經史篤好𤣥言位至都官尚書徐孝克陵之第三弟也少好周易有口辯能談𤣥理旣長遍通五經博覽史籍後入隋為國子博士後魏燕鳳字子章代人少好學博綜經史明習陰陽䜟緯位至鎮遠將軍高謙之少以孝聞及長屏絶人事專意經史天文筭厯圖緯之書多所該渉好文章留意老易位至國子博士崔浩字伯淵淸河人也文貞公𤣥伯之長子少好文學博覽經史𤣥象陰陽百家之言無不關綜研精理義時人莫之及位至侍中撫軍大將左光祿大夫高允博通經史天文術數尤好春秋公羊位至光祿大夫高祐博渉經史好文字雜說位至光祿大夫孫紹字世慶少好學通渉經史頗有文才陰陽術數多所貫渉位至左衞將軍右光祿大夫李業興上黨長子人博渉百家圖緯風角天文占候無不討練又長筭厯獨守閒居講肄經典二十餘年時人號為儒林先生後為齊文襄王中外府諮議㕘軍信都芳好學善天文筭數甚為安豐王延明所知延明家有羣書欲抄集五經筭事為五經宗及古今樂事為樂書又取渾天欹器地動銅烏漏刻候風諸圖為器準並令芳筭之會延明南奔芳乃自撰注位中外府田曹參軍劉芳為太子庶子芳才思深敏特精經義博聞強記兼覽倉雅尤長音訓辨析無疑於是禮遇日隆賞賚豐渥常爽字仕明河内人好學博聞強記明習候緯五經百家多所研綜州郡禮命皆不就性好墳籍鳩集不足手自補治躬加題帖其家所有垂將萬卷覽讀不息多有異聞諸儒服其淵博至於學術精微當時莫及後為宣威將軍北齊權會字正理河間人也志尚沉雅動遵禮則少受鄭易探􅄨索隱妙盡幽微詩書三禮文義該洽兼明風角妙識𤣥象位至國子博士後周沈重字德厚吳興武康人學業該博為當世儒宗至於陰陽圖緯道經釋典靡不畢綜位至太常卿柳敏字白澤性好學渉獵經史陰陽卜筮之術靡不習焉盧光字景仁性温謹博覽羣經精於三禮善陰陽解鍾律又好𤣥言位至陜州總管府長史樊深既專經又讀諸史及倉雅篆籀陰陽卜筮之書位至露門學博士下大夫隋李德林幼聰敏該博墳典陰陽候緯無不通渉後至懷州刺史明克讓字宏道少儒雅善談論博渉書史所覽將萬卷三禮禮論尤所精研龜筮厯象咸得其要位至通直散騎常侍房暉遠字崇儒恒山真定人也世傳儒學暉遠幼有志治三禮春秋三傳詩書周易兼善圖緯位至國子博士韋鼎字起盛少通脫博渉經史明陰陽逆刺尤善相術位至光州刺史王頗性識甄明精力不倦好讀諸子徧記異書當代稱為博物為漢王諒府諮議㕘軍潘徽字伯彦吳郡人也性聰敏少受禮於鄭灼受毛詩於施公受書於張冲講莊老於張機並通大義尤精三史仕至西海郡威定縣主簿劉焯以儒學知名專以敎授著述為務孜孜不倦賈馬王鄭所傳章句多所是非九章筭術周髀七曜厯書十餘部推歩日月之經量度山海之術莫不覈其根本窮其秘奥著稽極十卷厯書十卷五經述議並行於世位至太學博士劉炫少以聰敏見稱與王劭同脩國史俄直門下省兼直内省考定羣言炫雖遍直三省竟不得官為縣司責賦役炫自陳於内史送詣吏部尚書韋世康問其所能炫自為狀曰周禮禮記毛詩尚書公羊左傳孝經論語孔鄭王何服杜等注凡十三家雖義有精粗並堪講授周易儀禮穀梁用功差少史子文集嘉言美事咸誦於心天文律厯窮竅㣲妙至於公私文翰未嘗假手吏部竟不詳試然在朝知名之士十餘人保明炫所陳不謬於是拜殿内將軍盧太翼河間人也閑居味道不求榮利博綜羣書爰及佛道皆得其精微尤善占候筭厯之術初隱於白鹿山後卒於雒陽王貞字孝逸梁郡陳留人少聰敏好學善毛詩禮記左傳周易諸史百家無不畢覽後舉秀才授縣尉卒馬光字榮伯武安人少好學從師數十年晝夜不息圖書䜟緯莫不畢覽尤明三禮為儒者所宗位至太學博士唐孔頴達初以敎授為務尤明服氏傳鄭氏尚書王氏易毛詩禮記兼善筭厯博究羣言解屬文頗習政事位至國子祭酒薛豋博渉文史毎與人談論前代故事必廣引證驗有如指掌位至泉州刺史楊綰生而聰慧及長好學不倦博通經史九流七略諸子諸集無不該覽位至中書侍郎平章事徐岱蘇州嘉興人少好學六籍諸子悉所探究位至給事中王起自㓜及耄手不釋卷天下之書無不該覽文宗曾私撰數字以示之起曰臣書中所不識者唯八駿圖中三五字而已今此字臣未知出於何書文宗笑而竒之故待之如師友目曰當代仲尼位至山南東道節度使多能昔夫子以將聖之姿擅多能之譽葢夫經藝之富數術之廣專之者易而兼之者難君子所不求備於人者良有旨也其有挺洽聞彊識之美禀聰明博逹之智周覽圖傳兼通衆技至於觀天之象察地之理精和鵲之鍼石辨䕫牙之鍾吕極研桑之心計曉孫吳之兵法及至圖畫卜筮篆籀草𨽻擊劒盤矟投壺奕棊或才至兼人或品稱第一雖曰小道必有可觀借云異端豈有所害自非英偉茂異亦曷能臻此焉商瞿孔子弟子年長無子其母為取室孔子使之齊瞿母請之孔子曰無憂瞿言四十後當有五丈夫子五男也已而果然漢司馬相如少時好讀書學擊劒擊劒者以劒揺擊而中之非斬刺也為文園令劉向本名更生以父德任為輦郎擢為諫大夫宣帝時更生以通逹能屬文獻賦頌凡數十篇帝復興神僊方術之事而淮南有枕中鴻寶苑秘書書言神仙使鬼物為金之術及鄒衍重道延命方世人莫見而更生父德武帝時治淮南獄得其書更生㓜而讀誦以為竒獻之言黃金可成帝令典尚方鑄作馮奉世昭帝時為武安長學春秋渉大義讀兵法後漢馬嚴妙擊劒習騎射後從平原楊太伯講學專心墳典能通春秋左氏仕郡督郵桓譚父成帝時為太樂令譚以父任為郎因好音律善鼓琴博學多通徧習五經皆訓詁大義不為章句蔡邕少博學好辭章數術天文妙操音律官至左中郎將馬融髙才博洽為世通儒又善鼓琴好吹笛桓帝時為南郡太守陽球能擊劒習弓馬性嚴厲好申韓之學後為都尉酈炎字文勝范陽人有文才解音律州郡辟命皆不就皇甫嵩少有文武志介好詩書習弓馬後至太尉魏王弼性和理樂遊晏解音律善投壺為尚書郎蜀諸葛亮性長於巧思損益連弩木牛流馬皆出其意推演兵法作八陣圖咸得其要位至丞相譙周字允南研精六經尤善書札頗曉天文後為光祿大夫魏封陽城亭侯李仁字德賢博學伎藝筭術卜數醫藥弓弩機械之巧皆致思焉為州書佐尚書令史吳王蕃字永元博覽多聞兼通術藝為散騎常侍沈文字子正吳郡人弱冠博學多所貫綜善屬文辭兼好武事注孫子兵法又辯於口毎所至衆人皆黙然莫與為對咸言其筆之妙舌之妙刀之妙三者皆過絶於人晉傅𢎞少孤貧博學善屬文解鍾律後至司𨽻校尉阮籍字嗣宗博覽羣籍尤好莊老嗜酒能嘯善彈琴為歩兵校尉嵇康學不師受博覽無不該通好老莊彈琴詠詩自足於懷拜中散大夫王廣字世將少能屬丈多所通渉工書畫善音樂射御博奕雜伎後為平南軍䕶南蠻校尉荆州刺史郭璞好古文竒字妙於陰陽筭厯為著作佐郎王裒字偉元城陽營陵人也氣辭雅正博學多能隱居敎授三徵七辟皆不就索襲字偉祖燉煌人也虛靖好學不應州郡之命舉孝亷賢良皆以疾辭㳺思於陰陽之術著天文地理十餘篇多所啓發戴逵字安道譙國人也少博學好談論善屬文能鼓琴工書畫其餘巧藝靡不畢綜後以太學博士散騎侍郎給事中徵不起前秦王墮字安生博學有雄才明天文圖緯為苻洪司馬宋王懿字仲德少沉審有意略通陰陽解聲律為鎮北將軍劉敬宣字萬壽多伎藝弓馬音律無事不善為左衞將軍散騎常侍張永渉獵書史能為文章善𨽻書曉音律騎射雜藝觸類兼善又有巧思益為太祖所知紙及墨皆自營造帝毎得永表啓輙執玩咨嗟自歎供御者了不如也仕至吏部尚書孔琳之彊正有志力好文義解音律能彈棊妙善草𨽻為祠部尚書王微字景𤣥瑯琊臨沂人少好學無不通覽善屬文能書􅀞兼解音律醫方陰陽術數官至中書侍郎沈勃好為辭章善彈琴能圍棊為給事中范曄少好學博渉經史善為文章能𨽻書曉音律為左衞將軍太子詹事劉休為桂陽王征北㕘軍明帝頗有好尚尤嗜飲食休多藝能爰及鼎味問無不解蕭思話渉獵書傳頗能𨽻書解音律便弓馬為侍中領前將軍江湛愛好文義善彈棊鼓琴兼明筭術為吏部尚書南齊祖冲之解鍾律博塞當時獨絶莫能對者為長水校尉柳世隆少立功名晚專以談義自業善彈琴世稱柳公雙璅為士品第一嘗自云馬矟第一淸談第二彈琴第三為侍中衞將軍杜栖吳郡錢塘人少從儒士劉瓛受學善淸談能彈琴飲酒與父京産共隠居不仕梁庾詵字彦寶新野人也㓜聰警篤學經史百家無不該綜緯候書射棊筭機巧並一時之絶湘東王召為鎮西記室不就又徵中書侍郎不起陶𢎞景字淵明丹陽秣陵人為奉朝請諸王侍讀讀書萬餘卷善琴棊工草𨽻又性好著述尚竒異顧惜光景老而彌篤尤明陰陽五行風角星筭山川地理方圓産物醫術本草著帝王年厯又嘗造渾天象云修道所須非止史官是用張孝秀為建安王别駕博渉羣書精釋典善談論工𨽻書凡諸藝能莫不明習朱异既長渉獵文史兼通雜藝博奕書筭皆其所長年二十入都詣尚書令沈約靣試之因戲异曰卿年少何乃不亷异逡巡未逹其旨乃曰天下唯有文義棊書卿一時將去可謂不亷也後為中領軍柳惲好學善尺牘學彈琴特窮其妙又工篇什及品定棊譜登格者二百七十八人第其優劣為棊品三卷惲為第二焉帝謂周舍曰吾聞君子不可求備至如柳惲可謂具美分其才藝足了十人惲著卜杖龜經性好醫術盡其精妙為吳興太守江祿㓜篤學有文章工書善琴為廬陵威王續驃騎諮議㕘軍柳惔好學工製文尤曉音律為南安將軍湘州刺史蕭駿善草𨽻工文章晚更習武膂力絶人與永安侯確相類為超武將軍封南安侯陳蔡凝㓜聰悟美容止既長博渉經傳有文詞尤工草𨽻為黄門侍郎陳禹聰敏有識量渉獵經史解風角兵書頗屬文便騎射官至五府諮議孫瑒少倜儻好謀略博渉經史尤便書翰為五兵尚書吳明徹微渉書史經傳就汝南周𢎞正學天文孤虛遁甲略通其妙官至南兖州刺史侯安都工𨽻書能鼓琴渉獵書史為五言詩亦頗淸靡兼善騎射為邑里雄豪後為征南大將軍江州刺史後魏古弼少忠謹好讀書又善騎射官至尚書令李同軌學綜諸經多所治誦兼讀釋氏又好醫術官至通直散騎常侍裴詢字敬叔美儀貌多藝能音律博奕咸所開解起家奉朝請劉懋聰敏好學博綜經史善草𨽻書多識竒字為輕車將軍崔巨倫字孝宗㓜孤及長渉獵經史有文章武藝仕光祿大夫王繇字茂道好學有文才尤善草𨽻又工摹畫為時人所服仕至尚書郎裴敬憲工草𨽻解音律為太學博士北齊李元忠粗覽史書及陰陽術數解鼓筝兼好射彈有巧思又善於方技官至侍中李字德沉少聰敏有才藝音律博奕之屬多所通解為尚書儀曹郎祖珽字孝徵天性聰明事無難學凡諸技藝莫不措懷文章之外又善音律解四夷語及陰陽占候醫藥之術尤是所長文宣雖嫌其數犯憲法而愛其才技官至尚書左僕射祖孝隱孝徵之弟也有文學早知名詞章雖不逮兄亦機警有口辯兼解音律位至通直散騎常侍祖君信孝徵之子也渉獵書史多諳雜藝位至散騎常侍北周唐令則瑾之次子也性好篇章兼觧音律文多輕艶為時人所傳官至樂部下大夫韓盛字文熾南陽堵陽人也㓜有操行渉獵經史兼善騎射膂力過人仕至新平郡守蕭撝善草𨽻名亞於王褒筭數醫方咸亦留意所著詩賦雜文數萬言頗行於世官至少傅封蔡陽公隋王誼字宜君少有大志便弓馬博覽羣言為大司徒封郢國公令狐熙字長熙博覽羣書尤明三禮善騎射頗知音律起家以通經為吏部上士宇文愷少有器局諸兄並以弓馬自逹愷獨好學博覽書記解屬文多伎藝為名公子累遷御正中大夫儀同三司鄭譯字正義頗有學識兼知鍾律善騎射為上柱國李敏幽州總管崇之子起家千牛美姿儀善騎射歌舞管弦無不通解為柱國盧賁字子徵略渉書記頗解鍾律為太子左庶子長孫熾字仲光性敏慧美姿儀頗渉羣書兼長武藝為户部尚書長孫晟字季晟性通敏渉獵書史工彈善射矯勇過人仕至淮陽太守右驍騎將軍楊素少與天水牛𢎞同㳺好學研精不倦多所通渉善屬文工草𨽻頗留意於風角為司徒陳政字𢎞道太僕卿茂之子少養宫中美風儀有幹局便弓馬解鍾律工文翰兼有口辯十七為太子千牛備員閻毗七嵗襲封石保縣公及長好經史受漢書於蕭該毗通大旨能篆書工草𨽻尤善畫為當時之妙周武帝見而悦之命尚淸都公主入隋為將作少監唐竇璡性寛厚工書解鍾律兼有巧思厯潁川南郡扶風太守盧藏用善琴棊尤工篆𨽻為尚書右丞王維為右丞有俊才博學多藝以詩名盛於開元天寶間書畫特臻其妙筆蹤措思㕘於造化韓滉為右僕射平章事封晉國公滉尤工書善丹靑以繪事非急務自晦其能未嘗傳之好易象及春秋著春秋通例及天文事序議各一卷李勉為太子太師善鼓琴好屬文詩妙知音律能自制琴又有巧思李臯為江陵尹嘗運心巧思為戰艦挾二輪蹈之翔風鼓疾若掛㠶席所造省易而久固又造欹器進入内中歸豋有文學工草𨽻為工部尚書蕭祐閒澹貞退善琴工書畫好五言詩嘗寄情於雲林泉石之間故當時與之逰者皆名人淸士卒為桂州觀察使後唐李嚴幽州人本名讓坤仕燕為刺史渉獵書傳便弓馬多曲藝以功名自許後為客省使晉李從昶秦王茂貞之第三子也為左龍武綂軍少習華侈以逸逰燕樂為務而音律圖畫無不通之冊府元龜卷七百八十六
