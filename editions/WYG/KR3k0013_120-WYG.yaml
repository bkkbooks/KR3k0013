body:
  text: 册府元龜卷一百二十宋王欽若等撰帝王部選將第二唐憲宗初高崇文為長武城使永貞元年冬劉闢阻兵朝議討伐宰臣杜黄裳以為獨任崇文可以成功元和元年春拜檢校工部尚書兼御史大夫充右神䇿行營節度使兼統左右神䇿奉天麟遊諸鎮兵以討闢時宿將專征者甚衆人人自謂當選及詔出大驚崇文在長武練卒五千常若冦至及是中使至長武卯時宣命而辰時出師五千器用無闕者元和二年四月甲子以尚書右僕射伊慎代范希朝為右金吾衛大將軍以希朝代李欒為靈州長史充朔方靈鹽節度仍進位檢校司空以右神䇿鹽州定遠三鎮兵馬𨽻焉所以革近制任邊將也四年十月鎮州王承宗拒命詔左神策護軍中尉吐突承璀討之以左武衛將軍王萬敵為左神䇿軍行營先鋒兵馬使仍復本姓趙氏萬敵本成徳軍禆將也以善戰為王武俊所重令姓王氏士真時遣歸朝習知鎮冀事故授以前鋒九年八月辛酉以河陽節度使烏重𦙍為檢校工部尚書兼汝州刺史充河陽三城懷汝等州節度觀察處置營田等使討淮西故移重𦙍壓境焉十一月甲午以御史中丞胡証充振武麟勝節度使時振武累用節將邊事曠廢朝廷思用儒者以撫安之乃有是命十一年七月以荆南節度使袁滋為彰義軍節度使以徐州刺史楊旻為唐州刺史兼御史中丞充行營都知兵馬使以滋儒者故湏復以旻將其兵渾鎬厯延唐鄧州刺史及討王承宗屬義武軍節度任廸簡疾不能軍帝以鎬藉父名足以鎮之乃令代廸簡為帥鎬始至整練其衆甚有威名十三年五月以左僕射山南東道節度使李愬為鳳翔節度使路繇闕下㑹李師道再叛詔徵兵討之遂改愬為徐泗節度使及青齊平將有事燕趙又命愬以特進檢校尚書右僕射同中書門下平章事為昭義軍節度使抵四月遷魏慱等州節度使穆宗長慶元年八月制曰父子之讐不同天雖下至匹士而猶寢苫枕戈以期必報是以子胥不狥伍奢之死卒能發荆王之墓鞭不義之屍取貴春秋垂名萬古而况於身備將壇父死人手家讐國恥併在一門當懷嘗膽之心豈俟絶漿之禮金革無避其在茲乎前涇原節度觀察處置使檢校左散騎常侍兼涇州刺史御史大夫田布咨爾先臣惟國元老首自河朔来朝帝庭而又東取青齊北討深趙提挈義旅勤勞王家冒白刃而不疑推赤心以自信屬冀方求帥予所重難輟自大名付茲巨鎮而中台暗折上將妖侵蟊賊濳寘於心腹豺狼勃興於肘腋人神憤痛朝野驚嗟深軫予懷誓擒元惡以布詩書竝習忠孝兩全常用魏師克征淮孽素行恩信共著勳庸豈無奮激之徒為報冦讐之黨且魏之諸將繇爾父而崇高魏之三軍䝉爾父之仁愛昔既同其美利今豈念其深寃爾其淬礪勇夫敬恭義士一飯之飽亦同於卒伍一毫之費必用於戈矛非筭畫勿萌於心非軍旅勿言於口居則席藳寒則抱氷以喪禮處之若哀心感者必有為横一刎頸感智捐軀下報營魂旁清醜類於虖至誠何託稔惡難逃矧彼兇殘去將安往墨縗在體𤣥纛在前題劍執金無忘哀敬可起復寧遠將軍守右金吾衛大將軍員外置同正員檢校工部尚書兼魏州大都督府長史充魏慱等州節度觀察處置等使十月甲子以河東節度使裴度兼充鎮西四面行營都招討使以左領軍衛大將軍杜叔良為開府儀同三司檢校工部尚書兼御史大夫充深州諸道行營節度使戊辰以深冀等州節度觀察使牛元翼為檢校工部尚書兼鎮州大都督長史御史大夫充成徳軍節度鎮深冀趙等州觀察等使時王廷湊賊殺田𢎞正竊據土地朝廷以元翼鎮冀舊將素以善戰聞班位勇畧在廷湊之右故前命為深冀節度使及是又以成徳令付之希鎮州兵士望風稟令不戰而歸也丙戌以深州行營節度使杜叔良為滄州刺史充横海軍節度滄徳棣等州觀察處置等使依前檢校工部尚書兼御史大夫以代烏重𦙍以重𦙍檢校司徒兼興元尹兼御史大夫充山南西道節度使重𦙍老于征行以賊憑凌未可輕進觀望累月帝意急於誅討以叔良赴深州行營面辭日指期朝夕殄冦故有此拜十二月戊寅以鳳翔節度使李光顔為許州刺史充忠武軍陳許蔡等州觀察處置等使以代李遜仍兼深州節度使統諸軍以李遜為鳳翔隴州節度觀察處置等使朝廷以光顏盡忠常為陳許節度使頗得士心將討鎮冀遂有此拜以遜文吏故換鎮以便其事陳州刺史兼御史中丞王沛宐委光顏量才任用沛比為光顏麾下都將部署有方畧淮蔡平授陳州刺史以光顏方務征討故委以軍任李聽為羽林軍有名馬穆宗在東宮令近侍諷聽獻之聽以職摠軍不敢從令帝不恱及即位之始幽冀不庭太原與二鎮接境方議易帥宰臣進擬帝皆不允謂宰臣曰李聽為羽林將軍不與朕馬是必可任遂擢授檢校兵部尚書太原節度觀察使兼太原尹充北都留守文宗太和元年四月度申以太僕卿高瑀為檢校左散騎常侍充忠武軍節度觀察處置等使初瑀既以疾亟聞議者多謂忠武之師必自謀帥或曰禁軍諸將得之羣口囂囂以節制之選不繇執政既而裴度韋處厚等密議以瑀常刺陳蔡二州政皆可取且熟忠武軍情莫如瑀者㑹陳許表至果以瑀為請及啓事於延英即以瑀名聞而拜焉節度之權自大歴以来或以邪門而致近歳則財鏹公行畧無避忌貪邪之軰汲汲焉日有窺伺枉道輸貨動逾億千皆以倍稱之約假于富族及至鎮則罄公帑以酬之然後脂血疲人補其所缺天下節度觀察之使繇是而率十六七故高瑀之拜縉紳忭賀者彌月焉宰臣戲相謂曰自今以後作債節度使當少矣烏重𦙍太和初以檢校司徒為天平軍節度鄆曹濮等州觀察處置等使時李同捷私據境土謀襲父位議者以為别命節制慮孽童拒違又朝廷方務安人遂命同捷移鎮兖海以重𦙍羣帥中齒軰舊老加太子太師平章事俾兼綂滄景仍舊割齊州附之蓋望不勞師而底定也數月而卒贈太尉三年冬南蠻入㓂西川節度使杜元頴以失政貶黜特詔東川節度郭釗兼領西川以紓其亂兵至成都府賊蠻奔遁遂以釗檢校司空充劍南西川節度使四年二月興元軍作亂節度使李綘被害假内追朝詔曰漢水上游梁山東險控巴岷之道路作咸鎬之藩屏實命長帥必惟全才簡求臣僚僉屬邦彥是用築齋壇以賜鈇鉞登廉車以察風俗一方之事悉以咨之中大夫守尚書右丞上䕶軍祁縣開國子食邑五百户賜紫金魚袋溫造風度端雅質量閎厚立朝正色直道當官自登周行藹有休稱前在憲府爰持國綱人所未能心已獨至聽言盡主於忠信指事必根於理化豈彼常意自謂知人洎南宮提領右轄郎曹承式體要𢎞通屬聞漢中撫事多故非寛仁不可以理軍旅非廉實不可以緝編甿擇任之時誠異他日繇是命爾尹正褒國節制梁川首列侍從之臣秩遷御史之率至若革故弊以存遠畧因其事以定衆心姑務載安勿使告病弛張威惠在爾能之朂哉惟勤無忝我推轂之命可檢校散騎常侍兼興元尹御史大夫充山南西道節度管内觀察處置等使宣制畢宰相及造并興元宣慰使崔琯同赴對於延英造素有威望及是拜中外莫不瞻矚帝前席與語凡數十百言且趣令赴鎮七年正月甲寅以新授鎮南節度使崔珙為武寧軍節度徐泗觀察等使以右金吾將軍王茂元為嶺南節度觀察經畧等使珙常為泗州刺史深練兵事頗得士心前除廣州申謝於延英陳奏明辨稱旨時高瑀鎮徐州王智興之後兵驕不能制帝常軫慮遂命珙代焉九年黨項㓂邊以左諫議大夫胡証有安邊才畧乃授單于都護御史大夫振武軍節度使前任將帥非統馭之才邊事曠廢朝廷故特用証以鎮之僖宗乾符六年十月制以鎮海軍節度浙江西道觀察處置等使高駢檢校司徒同平章事揚州大都督府長史充淮南節度副大使知節度事江淮鹽鐵轉運江西行營招討等使進封燕國公初駢在浙西遣大將張麟梁纘等大破黄巢於浙東賊進㓂福建踰嶺表故移鎮楊州時賊北踰大庾嶺朝廷授駢諸道行營兵馬都統中和元年黄巢㓂京城七月乙卯車駕幸西蜀丁巳以侍中王鐸檢校太尉中書令兼滑州刺史義成軍節度鄭滑觀察處置兼統京城四面行營兵馬都統以太子太師崔安濳為副觀軍容使西門思恭為天下行營兵馬都監押中書侍郎平章事諸道鹽鐵轉運等使韋昭度為供軍使時淮南節度使高駢為諸道行營都統自車駕出幸中使相繼促駢起軍駢託以周寳劉漢宏不利於己遷延半載竟不出軍乃以鐸為都統以河中節度使王重榮為京城北面都統義武軍節度使王處存為京城東面都統鄜延節度使李存章為京城西北面都統朔方軍節度使拓㧞思恭為京城南面都統以忠武監軍使楊復光為天下行營兵馬都監代西門思恭許王鐸以便宐從事遣郎官御史分行天下徵兵赴闕後唐莊宗初為晉王天祐二十年二月契丹㓂漁陽上擇帥北征郭崇韜以汴㓂未平李繼韜背命北邊虗弱非大將無以鎮臨請命李存審為燕帥捍之時存審方臥病私第羸瘠殆甚帝遣使諭之因奏臣効忠稟命靡敢為辭但痾恙纒綿未堪祗役既而以存審檢校太傅兼侍中充幽州盧龍節度管内觀察處置押奚契丹兩蕃經畧盧龍軍等使勉而赴任同光二年三月幽州李存審疾篤求入覲議擇帥代之方内宴帝曰吾披榛故人零落殆盡所餘者存審耳今復寒疾北門之事知付何人因目右武衛上將軍李行賢曰無易於卿即日授特進檢校太保充幽州盧龍節度行軍司馬旬日以李存審為汴州節度以存賢代存審為幽州盧龍節度使三年秋客省使李嚴使西州廻言王衍可圖之狀莊宗與郭崇韜議討伐之謀方擇大將時明宗為諸道兵馬摠管當行崇韜自以官相傾欲立大功以制之乃奏曰契丹犯邊北面須藉大臣全倚摠管鎮禦臣伏念興聖宮使繼岌徳望日隆大功未著宐依故事以親王為元帥付以討伐之權俾成其威望莊宗方授繼岌即曰小兒幼稚安能獨行卿當擇其副崇韜未答帝曰無踰於卿者乃以繼岌為都統崇韜為招討使明宗天成三年荆南高李興叛九月己亥詔武寧軍節度使房知溫兼荆南行營招討使知荆南行府事以尚食使馬從斌守澤州刺史中外分命百道赴軍襄陽十月定州王都反以齊州防禦使孫璋充北面行營馬歩都虞候丙午制横海軍節度觀察等使檢校司徒李從敏兼北面行營副招討使是月丁酉朔方軍大將已下差人齎絹表到京請朝廷命帥以安藩閫戊戌以前襄州守禦并本州城兵馬都監磁州刺史康福為檢校司空靈州大都督府長史行梁州刺史充朔方河西等軍節度靈威雄武凉州等觀察處置管内營田押蕃落度支溫乜㩁稅等使西方鄴弱冠歸梁得侍左右忿無權位歸莊宗於河上以為奉義指揮使每從征伐咸以身先天成初荆渚違命上據三峽明宗素知其才擢授䕫州刺史充東南面行營招討副使鄴將偏師收復二州畫圖上進長興三年十月戊午帝御廣夀殿謂范延光秦王從瑩等曰契丹欲謀犯塞邊上宐得嚴重帥臣卿等商量誰為可者以聞甲戌秦王從瑩奏伏見北面奏報契丹族帳近塞吐渾突厥已侵邊地北面戍卒雖多未有統率早宐命大將帝曰卿等商量定未具奏曰將校之中康義誠可帝曰召義誠来遂令宣徽使朱𢎞昭往知襄州事代義誠還京師臣欽若等曰時晉高祖首預其選事具帝王創業門末帝清泰二年以安元信為大同軍節度使元信初從莊宗定魏愽元城之戰克捷居多移為愽州刺史與梁軍對壘徳勝渡元信為右廂排陣使王處直引契丹背盟北邊俶擾以元信乆在邊故有是命晉少帝開運元年八月制曰宣王講武逐獫狁於太原漢帝出師走匈奴於瀚海是知蠻夷猾夏不能絶之於古今戎狄無厭不能拘之以信義先皇帝昔當草昧方在龍濳未登鄗邑之壇始有晉陽之難契丹主徑驅蕃部直抵并郊遂解重圍助成大統我之興也彼有力焉於是邀之以鬼神申之以盟誓載諸簡册傳厥子孫爾後常念前因毎思厚報減宮闈之服玩罄府藏之珠珍供億無時道途相望而契丹貪殘滋甚驕縱異常通使命於江淮徵貢輸於郡國苞藏既乆姦譎漸萌既而輿議諠譁羣情憤激軍民扼腕中外同辭請興貔虎之師以遏豺狼之患先皇帝重其信誓篤以初終降萬乗之尊禮不義之虜耗中原之力奉無己之求迨于纘受丕圖䖍承顧命每欲息民繼好敢忘屈己從人所以厚禮卑辭以隆其意推心置腹以示其誠其如鴆毒濳深獸心難革乗我歉嵗伐予大喪平視中原竊窺神器朕實不徳民罹其殃愧悼増深寤寐興嘆向者躬提黄鉞親指靈旗駐於甘泉自春徂夏賴祖宗垂慶天地儲休猛將如雲謀臣若雨士百其勇人一其心寸鏃不遺狂戎自潰氛霾少息師旅凱旋今則漸入秋深慮為邊患朕以志平㓂難不敢荒寧將期親率全師恭行天討庶幾一舉永靜三邊罔辭櫛沭之勞用拯生靈之患得不精求將帥慎柬偏裨冀成破竹之功以殄折膠之㓂爰於剛日乃降命書順國軍節度鎮深趙等州觀察處置幽州道行營副招討等使特進檢校太師兼中書令行真定尹駙馬都尉杜重威地居戚里神授戎韜乆服金革之勞累濟艱難之運虎牢晝閉一麾而蝥賊自消河朔未寧再駕而氛妖繼息戡定之業溢於鼎鐘大平軍節度鄆齊棣等州觀察處置兼管内河堤等使光祿大夫檢校太尉平章事張從思清明可鑑忠正無邪夙懷刺虎之謀早列濯龍之籍當襄陽之役克成監護之勲及北虜之来實賴藩籬之固器業之用可謂縱横西京留守起復檢校太尉兼侍中行河南尹景延廣文武全才雲龍際㑹指經綸於掌内藏甲馬於胷中乆權七萃之師繼委十連之帥軍民畏伏畿甸肅清左右之勞書於盟府武寧軍節度徐宿等州觀察處置等使開府儀同三司檢校太師兼侍中趙在禮河嶽鍾靈松筠植性授玉鈐之祕畧得金版之沈機輔翼數朝周旋重鎮述職而必先九牧事君而唯盡一心尊奬之功光乎史册建雄軍節度晉慈隰等州觀察處置等使特進檢校太師平章事安叔干衆推武庫素曉陣圖疾惡如讎見義思勇觴酒豆肉無虧撫士之心尺籍伍符盡得摠戎之訣軍旅之任實契僉諧前泰寧軍節度充沂密等州觀察處置等使特進撿挍太師平章事安審信乆處腹心早攀鱗翼倜儻乃萬夫之長驍雄真六郡之豪鷰頷虎頭咸仰將軍之相牙璋犀節累持方伯之權英特之名播於中外河中護國將軍節度管内觀察處置等使開府儀同三司檢校太師平章事安審琦嚴明無翳寛簡自居善知奇正之謀備熟孤虗之法首赴風雲之㑹昔同帶礪之盟累殿藩垣常堅夾輔連帥之重倚若長城河陽三城節度孟懷等州觀察處置管内河堤等使青州行營副都部署特進檢校太師符彥卿惟爾先臣實為名將世襲弓裘之慶門傳忠孝之規西漢三雄徒稱傑出東京七校乃為時生竭盡之心貫于金石義成軍節度滑漢等州觀察處置管内河堤等使北面行營馬歩都虞候開府儀同三司檢校太師皇甫遇劍敵萬人力摧九虎赤羽若日蒲大夫之英風快馬如龍曹景宗之意氣繼承重寄必竭純誠義烈之稱播於寰海北面行營馬部都排陣使兼馬軍都指揮使特進檢校太保右神武統軍張彥澤猛若闗張氣吞荆聶荐膺委寄每著勤勞鳴鏑離絃既得吟猿之妙青萍出匣乆彰斷兕之名營陣之間皆推果毅横海軍節度滄景徳等州觀察處置管内河堤等使幽州道行營右廂排陣使特進檢校太師王廷裔鬼谷傳書神龜授印委鎮臨於滄海賴控扼於邊陲繕甲治兵暗蓄摧兇之計深溝高壘不移持重之心捍禦之謀斷於胷臆保義軍節度陜虢等州觀察處置等使特進檢校太尉宋彥筠威惠兼著膽氣無儔累佐戎權善貞師律千軍萬馬憚陳慶之雄名三令五申得孫武之戰術將帥之選皆謂當仁前懷徳軍節度管内觀察處置等使光祿大夫檢校太傅田武早從戎伍備歴艱難安邊展頗牧之才制勝合韓吳之法向者仗其舊徳委以邊藩頗資外禦之功實有分憂之績忠貞之節雅叶東求北面行營歩軍郡排陣使兼歩軍都指揮使特進檢校太保左神武統軍潘環幕府書勲師干著效攻城野戰獨麾鄭國之旗陷陣先登幾獲魚門之胄洎外環衞彌見公忠兵革之時所宐登用而皆位崇侯伯任重茅土俱為社稷之臣悉是棟梁之具或推忠狥義或報國忘家常堅翼戴之心夙藴澄清之志朕所以告於宗廟質以蓍龜授之以征鼙付之以蕭鐵但以狂戎侵掠生聚䖍劉既貽中國之羞抑亦人臣之恥爾等上則受先皇顧託輔予冲人次則副朝廷倚毘委之重任所宐同徳比義戮力齊心各竭乃誠共安國歩功業可以不朽富貴可以無窮况今芻粟俱充士卒咸憤旌旗萬隊甲馬千羣呼吸則山嶽蕩揺號令則乾坤震動以此制敵何敵不摧以此攻城何城不克竚期獻俘清廟懸首素旗同集大功永清四海於戲周王任吉甫南仲乃慴戎夷漢帝任去病衛青遂空沙漠今吾命帥皆謂得人勉立異勲速平多難無令數子獨擅前功凡我股肱當體朕意杜重威充都招討使張從思充兵馬都監景延廣充馬歩軍都排陣使趙在禮充馬歩軍都虞候安叔千充馬歩軍左排陣使安審信充馬歩軍右排陣使安審琦充馬歩軍都指揮使符彥卿充馬軍左都指揮使皇甫遇充馬軍右都指揮使張彥澤充馬軍排陣使王廷裔充歩軍左都指揮使宋彥筠充歩軍右都指揮使田武充歩軍左廂排陣使潘環充歩軍右廂排陣使臣欽若曰時漢高祖為太原留守授北面行營都統具帝王創業門天福九年契丹入侵命宋州節度使高行周為北面行營都部署河陽節度使符彥卿為騎軍右排陣使宿州刺史梁進明副之神武統軍皇甫遇為騎軍右排陣使懷州刺史薛懷讓副之陜府節度使王周為歩軍左排陣使沁州刺史劉詞副之羽林統軍潘環為歩軍右排陣使麟州刺史尹實副之護聖右廂主王景王萬敢為騎軍左右將慈州刺史周景殷武衛將軍張鵬監護奉國左右廂主李殷程福贇為歩軍左右將閣門使蕭處仁高勲監護前綘州刺史劉在明為先鋒都指揮使衛州刺史石公霸副之坊州刺史陳思讓監護又以前單州刺史劉喜為都壕寨使前階州刺史姚武為都橋道使周高祖廣順二年正月以侍衛歩軍都指揮使曹英為兖州行營都部署齊州防禦使史延韜為副部署以皇城使向訓為兵馬都監陳州防禦使樂元福為馬歩軍都虞候率兵討慕容彥超世宗顯徳元年三月以天雄軍節度使衛王符彥卿為河東行營都部署知太原行府事澶州節度使郭崇為行營副都部署宣徽南院使向訓為行營兵馬都監侍衛都虞候李重進為行營都虞候華州節度使史彥超為先鋒都指揮使領歩騎二萬進討河東詔河中節度使王彥超陜府節度使韓通率兵自陰地闗討賊以河陽節度使劉詞為隨駕都部署以鄜州節度使白重贊為隨駕副部署二年六月以曹州節度使韓通充西南面行營都虞候七月以鳳翔節度使王景兼西南面行營都招討使以宣徽南院使鎮安軍節度使向訓兼西南面行營都監以討秦鳳十一月以宰臣李榖為淮南道行營都部署知廬壽州行府事以許州節度使王彥超為行營副部署命侍衛馬軍都指揮使韓令坤等一十二將各帶行征之號以從焉三年正月帝親征淮南甲寅次正陽命侍衛馬歩軍都指揮使李重進為淮南道行營都招討使仍以襲衣金帶玉鞍名馬等賜之册府元龜巻一百二十
