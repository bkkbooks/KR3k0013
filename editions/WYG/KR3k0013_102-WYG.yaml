body:
  text: 册府元龜卷一百二宋王欽若等撰帝王部招諫尚書述帝舜之言曰予違汝弼汝無面從退有後言成王稽首周公以求教誨穆王申命伯冏責其正己斯皆古先哲王勞謙寅畏詢謀補察之美也若夫弁冕端委蔽旒塞纊中堂有千里之阻神龍有逆鱗之威苟非屈己以詳延虛懐以聽納即下之壅遏不聞而上之滿假自用矣是以二帝三王之世莫不樹誹謗之木設敢諫之皷植進善之旌立記過之史乃至公卿列士皆獻詩以諷瞽史瞍矇有書箴賦誦之職百工執藝庶人傳語使下情盡逹衆志咸竭然後斟酌而取舍焉故朝政無闕王度以貞德音享於人神欽明格於上下矣而歴代以還或因三光之謫見水旱之作沴憂勞戒懼諮求讜議斯亦聖哲之常道也若乃訪采惟勤聽受斯鬱命令徒粲於方䇿骨鯁蔑聞於登進先民有言曰應天以實不以文動人以行不以言亦奚益於治體矣夏禹以五音聽治五音宫商角徵羽懸鐘皷磬鐸置鞀以待四方之士爲號曰教寡人以道者擊皷道和隂陽皷一聲以節五音故擊之喻寡人以義者擊鐘鐘金也義取斷喻故擊鐘告寡人以事者振鐸鐸鈴金口木舌合爲音聲告事非一品故振之也語寡人以憂者擊磬磬石也聲急憂亦急務故擊磬也有獄訟者揺鞀獄訟一辨於事故取小鞀搖之漢文帝二年十一月晦日有食之詔曰天下治亂在予一人惟二三執政猶吾股肱也朕下不能治育羣生上以累三光之明其不德大矣令至其悉思朕之過失及知見之所不及匄以啟告朕匃音蓋乞也言以過失開告朕躬是則於朕爲恩惠也及舉賢良方正能直言極諫者以匡朕之不逮五月詔曰古之治天下朝有進善之旌旌幡也堯設之五逹之道民欲有進善者立於旌下言之誹謗之木堯作之橋梁邊板所以書政治之愆失也至秦去之所以通治道而來諫者也今法有誹謗訞言之罪訞與妖同是使衆臣不敢盡情而上無繇聞過失也將何以來遠方之賢良其除之其後賈山上書言除鑄錢令非是又訟淮南王無大罪等事其言多激切善指事意然終不加罸所以廣諫諍之路也後元年三月詔曰間者數年比不登比猶頻也又有水旱疾疫之災朕甚憂之愚而不明未逹其咎意者朕之政有所失而行有過與與讀曰歟下同乃天道有不順地利或不得人事多失和鬼神廢不享與何以致此將百官之奉養或費無用之事或多與何其民食之寡乏也夫度田非益寡而計民未加益度謂量計之音徒各反以口量地其於古猶有餘而食之甚不足者其咎安在無乃百姓之從事於末以害農者蕃末謂工商之業也蕃亦多也音扶元切為酒醪以靡榖者多醪汁酒滓也靡音縻散也六畜之食焉者衆與細大之義吾未能得其中中音竹仲切其與丞相列侯吏二千石博士議之有可以佐百姓者率意遠思無有所隠宣帝地節三年十月詔曰廼者九月壬申地震朕甚恐焉有能箴朕過失及賢良方正能直言極諫之士以匡朕之不逮毋諱有司諱避也雖有司在顯職皆言其過勿避之元帝初元二年二月戊午地震於隴西郡毁落太上皇殿廟壁木餙壊敗䝠道縣城郭官寺及民室壓殺人衆䝠音植属天水凢府庭所在皆謂之寺山崩地裂水泉涌出詔丞相御史中二千石舉茂才異等直言極諫之士六月闗東饑齊地人相食七月詔曰歲比灾害民有菜色五榖不收人但食菜其顔色變惡慘怛於心已詔吏虗倉廪開府庫賑救賜寒者衣今秋禾麥頗傷一年中地再動北海水溢流殺人民隂陽不和其咎安在公卿將何以憂之其悉意陳朕過靡有所諱三年六月詔曰蓋聞安民之道本繇陰陽繇與由同間者陰陽錯謬風雨不時朕之不德庶㡬羣公有敢言朕之過失今則不然媮合苟從未肯極言媮與偷同朕甚憫焉惟烝庶之饑寒遠離父母妻子勞於非業之作衛於不居之宫不急之事古云非業也恐非所以佐隂陽之道也其罷甘泉建章宫衛令就農百官各省費條奏毋有所諱有司勉之毋犯四時之禁丞相御史舉天下明陰陽災異者各三人於是言事者衆或進擢召見人人自以得帝意永光三年十一月詔曰廼者己丑地動中冬雨水大霧中讀曰仲盗賊竝起吏何不以時禁各悉意對四年六月甲戌孝宣園東闕災戊寅晦日有蝕之詔自今以來公卿大夫其勉思天戒慎身修永以輔朕之不逮直言盡意無有所諱成帝建始三年十二月戊申朔日有食之夜地震未央宫殿中詔公卿其各思朕之過失明白陳之河平元年四月己亥晦日有食之既詔百寮陳朕過失無有所諱鴻嘉二年三月詔曰古之選賢傅納以言明試以功傅讀曰敷陳也令陳言而省納之乃試以事也故官無廢事下無逸民逸逋也教化流行風雨和時百榖用成衆庶咸以康寧朕承鴻業十有餘年數遭水旱疾疫之災黎民屢困於饑寒而望禮義之興豈不難哉朕既無率道道讀曰導帝王之道日以陵夷陵丘陵也夷平也言其頽替若丘陵之漸平也意乃招賢選士之路鬱滯而不通與將舉者未得其人也其舉敦厚有行義能直言者兾聞切言嘉謀以輔朕之不逮永始四年六月詔曰廼者地震京師火災屢降朕甚懼之有司其各悉心明對厥咎朕將親覽焉元延元年七月有星孛於東井詔公卿大夫博士議郎其各悉心惟思變意明以經對無有所諱哀帝元壽元年正月辛丑朔日有食之詔公卿大夫陳朕之過失無有所諱平帝元始元年五月朔日有食之大赦天下公卿將軍中二千石舉敦厚能直言者各一人後漢光武建武六年九月丙寅晦日有食之十月丁丑詔曰吾德薄不明冦賊為害强弱相陵元元失所毛詩云日月告㐫不用其行永念厥咎内疚於心其勑公卿舉賢良方正各一人百寮竝上封事無有隱諱有司修職務遵法度七年三月癸亥晦日有食之帝避正殿寢兵不聽事五日詔百寮各上封事無有所諱其上書者不得言聖明帝永平三年八月壬申晦日有食之詔言事者靡有所諱八年十月壬寅晦日有食之既詔羣臣勉脩職事極言無諱於是在位者皆上封事各言得失帝覽章深自引咎章帝以永平十八年八月即位十一月甲辰晦日有食之於是避正殿寢兵不聽事五日詔有司各上封事建初五年二月庚辰朔日有食之詔公卿以下舉直言極諫能指朕過失者各一人遣詣公車朕將親覽問焉和帝永元七年四月辛亥日有食之帝引公卿問得失令將軍大夫御史謁者博士議郎郎官㑹庭中各言封事安帝永初二年七月詔曰昔在帝王承天理民莫不據璿璣玉衡以齊七政朕以不德遵奉大業而隂陽差越變異竝見萬民饑流羌貊叛戾夙夜克己憂心㷀㷀間令公卿郡國舉賢良方正遠求博選開不諱之路兾得至謀以鑒不逮而所對皆循尚浮言無卓爾異聞其百寮及郡國吏人有道術明習灾異隂陽之度璇璣之數者各使指變以聞二千石長吏明以詔書博衍幽隠朕將親覽待以不次兾獲嘉謀以承天誡建光元年十一月郡國三十五地震或坼裂詔三公已下各上封事陳得失順帝陽嘉二年四月己亥京師地震五月詔羣公卿士各悉心直言厥咎靡有所諱三年河南三府大旱詔書以尚書周舉才學優深特下䇿問曰朕以不德仰承三綂夙興夜寢思協大中頃年已來旱災屢應稼穡焦枯民食困乏五品不訓王澤未流羣司素飱據非其位審所貶黜變復之徵厥効何繇分别具對勿有所諱永和元年正月乙卯詔曰朕秉政不明灾眚屢臻典籍所忌震食為重今日變方逺地揺京師咎徵不虗必有所應羣公百僚其各上封事指陳得失靡有所諱冲帝以建康元年八月即位九月京師及太原鴈門地震三郡水涌土裂詔三公特進侯卿校尉舉賢良方正幽逸修道之士各一人百僚皆上封事桓帝建和元年正月辛亥日有食之詔三公九卿校尉各言得失四月庚寅京師地震命列侯將大夫御史謁者千石六百石博士議郎郎官各上封事指陳得失延熹五年五月乙亥京師地震詔公卿各上封事靈帝建寧元年五月丁未朔日有食之詔公卿已下各上封事二年四月大風雨雹詔公卿已下各上封事四年二月詔公卿至六百石各上封事光和六年夏旱七月制書引咎詔羣臣各陳政要所當施行魏太祖爲漢司空建安十一年令曰夫治世御衆建立輔弼誡在面從詩稱聽用我謀庶無大悔斯實君臣懇懇之求也吾充重任每懼失中頻年以來不聞嘉謀豈吾開延不勤之咎邪自今以後諸掾屬治中别駕常以月旦各言其失吾將覽焉文帝初爲魏王延康元年七月下令曰軒轅有明臺之議放勲有衢室之問皆所以廣詢於下也百官有司其務以職盡規諫將率陳軍法朝士明制度牧守申政事搢紳考六藝吾將兼覽焉率與帥同齊王正始元年三月以嵗旱詔令獄官亟平寃枉理出輕㣲羣公卿士讜言嘉謀各悉乃心晉武帝泰始二年九月散騎常侍皇甫陶傅𤣥共掌諫職上䟽言事詔曰二常侍懇懇於所論可謂乃心欲佐益時事者也而主者率以常制裁之豈得不使發憤邪二常侍所論或舉其大較而未備其條目亦可便令作之然後主者八座廣共研精凡關言於人主人臣之所至難而人主苦不能虗心聽納自古忠臣直士之所慷慨至使杜口結舌每念於此未嘗不嘆息也故前詔敢有直言勿有所拒庶㡬得以發䝉補過獲保髙位苟言有偏善情在忠益雖文詞有謬誤言語有得失皆當曠然恕之古人有不拒誹謗况皆善意在可采錄乎近者孔鼂綦毋和皆按以輕慢之罪所以皆原欲使四海知區區之朝而無諱言之忌也四年九月詔曰雖詔有所欲及奏得可而於事不便者皆不可隠情五年七月延羣公詢讜言八年二月帝與右將軍皇甫陶論事陶與帝爭言散騎常侍鄭徽表請罪之帝曰讜言謇諤所望於左右也人主常以阿媚爲患豈以爭臣爲損哉徽越職妄奏豈朕之意遂免徽官太康七年正月甲寅朔日有食之乙卯詔曰比年災異屢發日蝕三朝地震山崩邦之不臧寔在朕躬公卿大臣各上封事具言其故勿有所諱元帝太興元年六月初置諫皷謗木十一月雷震暴雨詔羣公卿士其各上封事具陳得失無有所諱將親覽焉二年五月三吴大饑詔百官各上封事十二月大赦詔百官各上封事明帝太寧三年四月詔曰飡直言引亮正想羣賢逹吾此懐矣予違汝弼堯舜之相君臣也吾雖虛闇庶不拒逆耳之談稷契之任君居之矣望共朂之後魏明元永興四年四月宴羣臣於西宫使各獻直言孝文延興元年九月詔在位及庶民直言極諫有利民益治損政傷化悉心以聞承明元年八月詔曰朕猥承前緒纂成洪烈思隆先志緝熈政道羣公卿士其各勉厥心輔朕不逮諸有便民利國者具狀以聞十月詔曰朕纂承皇極炤臨萬方思闡遐風光被兆庶使朝有不諱之音野無自蔽之響疇咨帝載詢及芻蕘自今已後羣公卿士下及吏民各聽上書直言極諫勿有所隠諸有便宜益治利民可以正風俗者有司以聞朕將親覽三事大夫論其可否裁而用之太和三年八月詔羣臣直言盡規靡有所諱七年九月詔曰朕承祖宗夙夜惟懼然聴政之際猶慮未周至於按文審獄思聞已過自今羣臣奏事當獻可替否無或面從使朕之過彰於逺近八年八月詔曰帝業至重非廣詢無以致治王務至繁非博採無以興政先王知其如此故虗己以求過明恕以思咎是以諫皷置於堯世謗木立於舜庭用能耳目四逹庶績咸熈朕承累聖之洪基屬千載之昌運每希遐風㬌行前式承明之初班下内外聽人各盡規以補其闕中㫖雖宣允稱者少故變時法遵古典裁制俸祿改更刑書寛猛未允人或異議思言者莫由申情求見者無因自逹故令上明不周下情壅塞今制百辟卿士工商吏民各上便宜利民益治損化傷政直言極諫勿有所隠務令辭無煩華理從簡實朕親覽以知世事之要使言之者無罪聞之者足以為戒九年二月詔曰昔之哲王莫不博採下情勤求箴諌建設旌皷詢納芻蕘朕班禄刪刑慮不周允虗懐讜直志獻洪猷百辟卿士及工商吏民其各上書極諫靡有所隠十一年六月詔曰春旱至今野無青草上天致譴實由匪徳百姓無辜將罹饑饉寤寐思求罔知所益公卿内外股肱之臣謀猷所寄其極言無隠以救民瘼宣武正始三年二月詔曰昔虞戒面從昌言屢進周任諫輔王闕必箴朕仰贊鴻基伏膺寳歴思康庶績一日萬幾側望忠言虗求讜直而良䇿弗進規畫無聞豈所謂弼諧元首救其不逮者乎可詔王公已下其有嘉謀深圗直言忠諫利國便民矯時厲俗者咸令指事陳奏無或依違孝明神龜二年二月詔求直言諸有上書者聽宻封通奏孝昌二年六月詔曰自運屬艱棘歴載於茲烽驛交馳旌皷不息祖宗盛業危若綴旒社稷洪基殆將淪墜朕威徳不能遐被經畧無以逺及俾令蒼生罹此塗炭何以苟安黄屋無愧黔黎今便避居正殿􅂼飱素服當親自招募收集忠勇其有直言正諫之士敢決狥義之夫二十五日悉集華林東門人别引見共論得失班告内外咸使聞知孝莊建義元年六月以寇難未夷避正殿責躬撤膳又班募格收集忠勇其有直言極諫之士敢決狥義之夫陳國家利害之謀赴君親臨難之節者集華林園面論事西魏文帝大綂五年十月於陽武門外置懸皷紙筆以求得失十年正月詔公卿已下每月上封事三條極言得失刺史二千石銅墨以上有讜言嘉謀勿有所諱後周明帝武成元年六月戊子大霖雨詔曰昔唐咨四嶽殷告六眚覩災興懼咸致時雍朕撫運膺圗作民父母弗敢怠荒以求民瘼而霖雨作沴害麥傷苗隤屋漂垣洎於昏墊諒朕不徳蒼生何咎刑政所失罔識厥由公卿大夫士爰及牧守黎庶等宜各上封事讜言極諫罔有所諱朕將覽察以答天譴武帝保定三年四月詔百官及民上封事極言得失建徳元年四月詔百官軍民上封事極言得失隋文帝開皇九年詔曰朕君臨區宇於斯九載開直言之路披不諱之心形於顔色勞於興寢自頃逞藝論功昌言乃衆推誠切諫其事甚疎公卿士庶非所望也各啓至誠補兹不逮見善必進有才必舉無或噤嘿退有後言布告天下咸悉此意十一年五月癸卯詔百官悉詣朝堂上封事唐髙祖武徳二年閏二月甲辰考羣臣以李綱孫伏伽為上第帝置酒髙㑹奏九部樂於庭高祖謂裴寂曰隋末無道上下相蒙主則驕矜臣唯謟佞上不聞過下不盡忠至使社稷傾危死於匹夫之手朕撥亂反正念在安民平亂任武臣官方委文吏庶得各展噐能以輔不逮比每虛心接待兾聞讜言然唯李綱苦盡忠欵孫伏伽可謂誠直餘人猶踵敝風俛首而已豈朕所望哉當以身為嬰兒方朕於慈父有懐必盡有意必申也太宗貞觀元年正月謂侍臣曰正主任邪臣不能致治正臣事邪主不能致治唯君臣相遇有同魚水則可得安天下也昔漢髙祖田舎翁耳提三尺劍而定天下既而規模𢎞逺流慶子孫此蓋任賢得人之所致也後世稱美不容於口朕雖不明闕於學問至夫大好大惡容或知之幸諸公數相諫正諫議大夫王珪對曰臣聞木從繩則正后從諫則聖古者天子必有諫臣七人言不用則相繼以死陛下開聖慮納芻蕘愚臣處不諱之朝實願罄其狂瞽太宗稱善自是中書門下及三品以上入内平章軍國必使諫官随之欲其預聞政事有所開說太宗虗己以納之十一月壬戌太宗謂侍臣曰隋帝性多猜忌上下情不相逹斯豈致治之理乎朕今推赤心以相付亦望公軰以直心相向縱有指斥深切無憂逆忤三年五月徐州蝗且旱六月詔曰豈賞罰不中任用失所將奢侈未革苞苴尚行者乎文武百辟宜各上封事極言朕過勿有所隠四年二月以嵗旱詔公卿極言得失勿有所隠十一年七月以水灾詔文武百寮各上封事極言朕過勿有所隠諸州官民有能明識治道方正直諫者並宜薦逹朕將親見其人問以得失九月帝謂侍臣曰朕居九重之内藉左右為耳目但舉事出入虧政害人必須矯正朕將思改之十七年正月帝謂侍臣曰朕觀古先帝王何嘗不受正諫以興化拒忠言而亡滅有諫朕安國者授以髙官矯朕為非者加以顯戮虛心佇待終無所應然喜得三事思有終始一則克平禍亂四夷順軌二則灾異不生百姓殷實三則年在盛壯君臨天下既喜所得當懼所失三思而動庶無愆尤必不渭橋乗船覇陵縱轡慎夫人同坐夏太康乆獵如此等事當不煩諫諍耳倘嗜慾遷性喜怒變情但聞一言而正豈候三諫之勞朕於公等乞言幸無所隠四月帝謂侍臣曰前王之取天下必藉衆力英才輔􅂇仰成師主朕昔仗義而起䇿發諸心寇平於手即位以後誠念蒼生有人上封事獻直言能益於時以裨政要者朕傾耳而聽拭目而覽合於務者不以輿皂而廢其言也二十年十二月帝手詔曰朕聞堯舜之君自愚而益智桀紂之主由智以添愚故異順逆於忠言則殊榮辱於帝道朕登躡宇宙字育黔黎恐大徳之或虧懼小瑕之有累候忠良之獻替想英傑之謀猷而諫皷空懸逆耳之言罕進謗木徒設悔心之論全無唯昔魏徴每顯余過自其逝也雖有莫彰豈可獨有非於往時而皆是於兹日故亦庶僚苟順不觸龍鱗所以虛己外求披衷内省言而不用朕所甘心用而不言誰之責也自斯已後各悉乃誠若有是非直言無隠髙宗永徽五年正月以時旱手詔京文武九品以上及朝集使各進封事極言厥咎九月帝謂五品已上曰往日不離膝下旦夕侍奉當時見五品已上論事或有仗下而奏或有進狀而論者終日不絶豈今時無事公等何不言也自今已後宜數論事若不能面奏任各進狀龍朔三年八月戊申詔凢百在位宜極言得失悉心無隠以救不逮咸亨元年十月命文武五品已上上封事中宗神龍元年二月詔京官職事九品已上及朝集使極言朝政得失五月又制京官九品已上極言時政得失睿宗景雲元年十一月詔曰朕聞彰善癉惡有國之常典糾寛濟猛為政之通規朕以薄徳濫膺明命瞻言賞罰未適時宜至使忠良未進小人未退貪吏未懲流亡未安賢良者未歸懐寃者未理在予之責有愧良深不能致君於堯舜者亦羣公羣士之所耻也卿等將何規補使致咸亨各以狀聞朕當親覽其才望兼優公清特著可以宣風道俗者具以名聞但百司承寛共為苟且事多愆咎無復紀綱令各本司長官審善惡才識限十日進狀𤣥宗開元三年五月以旱故下詔令諸司長官各言時政得失以輔朕之不逮十月詔曰朕以薄徳祗膺睿圗曾不能虗己淳源勵精至道將致俗於仁夀思納人於軌訓幸乾坤交泰風雨咸若中外百僚盡知戒懼華夏萬姓頗亦歡康猶恐人或未安政有不愜令外司置匭側門進狀封章論事靡所不逹軒階進規于何不盡曾無忤㫖之罰實有推心之期豈朕之不誠何人則未諭如聞朝廷之内噂􅊱紛然進不昌言退不訕議懸書以謗國僑之患鄧析偽言而辨孔子之誅少正自昔為蠧罔不在兹求於治政固宜懲絶自今已後制勑有不便於時及除授有不稱於職或内懐奸忒外損公私並聽進狀具陳得失五品已上官乃許其廷爭若輕肆口語潛行誹讟委御史大夫已下嚴加察訪狀渉疑似推勘奏聞十四年六月以旱及風灾命百官及州縣長官上封事極言時政得失無有所隠肅宗乾元元年四月詔京官九品以上許上封事極言時政得失朕將親覽用佇嘉謀才有可觀别當甄録二年三月詔昔公卿面諫載在簡册令僕陛奏亦惟舊章所以下竭其忠上聞其過君臣同徳豈不盛歟公卿已下有能論時政之非箴朕躬之闕有益於國有利於人宜盡昌言以救時敝朕必當行終無諱者朝廷用一人擢一職或有不當亦任奏論京文武五品已上正員清資官各舉賢良方正直言極諫一人任自封進兩省官十日一上封事直論得失無假文言冀成殿最用存沮勸上元二年九月制曰所設諫曹欲聞諷議允副從繩之望須成削藁之書其諫官令每月一上封事指陳時政得失若不舉職事當别有處分代宗廣徳元年七月制諫官每月一上封事無所迴避二年二月制百官有論時政得失並任指陳事實具狀進封必宜切直無諱有司白身人亦宜准此任詣匭使進表朕將親覽必加擇用三月詔曰為政者宣之使言作事者稽之於衆切於求道務以從人將明目而逹聰亦理煩而去惑經國之體庶無闕言文武百官及諸色人等有論時政得失上封事者狀出後宜令左右僕射尚書及左右丞諸司侍郎御史大夫中丞等於尚書省詳議可否具狀聞奏其所上封事除常􅄁官外有時辭理可觀或幹能堪用者亦宜具言詳議官中或見不同者即任别狀奏聞十二月乙酉令諫官每日奏事大歴七年十一月制曰淮南數州夏秋無雨朕精誠奉天誡懼臨下唯恐明有所不炤聽有所不逹百辟卿士咸弼予違宣示百姓令知朕意八年八月詔京五品已上及兩省供奉官郎官御史各上封事論國之利害時大有年帝慮税重害農弊延百姓乃下是詔旬日内抗䟽者百餘人損益各異悉親覽留中不出十二年四月詔曰昔予太祖太宗之御天下也功格二儀不私於已化覃萬宇猶問於人外與公卿大夫討論政典内與鴻生碩老演暢儒風日旰忘勞特稱至理猶復旁求諫諍俯察謳謡廣延不諱之書載建登聞之皷于時中朝無闕政四海無疲人歴代是遵列聖相軌朕承天序祗奉睿圗戰戰兢兢日甚一日于兹十六年矣何嘗不勵精理道欲得忠賢虛己清心日有所待直詞讜議或時空聞五諫七臣人其安在眷懐於此耿歎良深頃以任非其人凢事壅蔽今則已懲厥罪正乃惟心式佇嘉猷庶裨不徳自今已後諫官所獻封事不限早晚任進狀來所由門司不得輙有停滯如須側門論事亦任随狀面奏即便令引對如有除拜不稱於職詔令不便於時法禁乖宜刑賞未當征求無節寃濫在人並宜極論得失無所迴避以稱朕意其常朝官六品已上亦宜准此其擊登聞皷者金吾將軍收狀為進不得輙有損傷亦不須令人遮擁禁止其理匭使但任投匭人投表狀於匭中依常進不須勒留副本并接時妄有盤問方便止遏欲使萬邦之事無隔於九重獻替之謨不遺於聽覽册府元龜卷一百二
