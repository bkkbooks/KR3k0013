body:
  text: 册府元龜卷一百七十二宋王欽若等撰帝王部求舊第二唐髙祖初為唐公尅京師隋左親衛竇靖徳以親故之恩見之甚恱歴拜周大總管司馬遷長史武徳元年五月即位凡有賓客故吏咸加升擢率意進用不限階資二年閏二月甲寅帝引見并州元從將校以下謂之曰朕起義并州以救元元之命實諸君之力也卿軰執覊靮從我已三歲矣朕毎念之無忘寢食待東都平定當放卿還故鄉衆皆曰幸遇龍興獲展微効俱沾不次之賞今天下未定豈敢辭勞但陛下初發太原許定天下之後與臣軰同幸并州今鑾輿未動臣下何能獨去帝曰昔有此言朕所以不忘於是廩食其妻子是月己巳隋吏部侍郎楊恭仁進見帝為之興引與同坐言疇昔為歡者久之三年二月辛丑隋殿内少監豆盧逹自東都來奔與帝有舊引入卧内讌賜甚厚三月戊辰隋尚食奉御郭𢎞道自東都來歸𢎞道字太寳帝初為殿中少監深喜之及踐阼𢎞道在東京帝每遣門人訪其在没聞其來也遂遣使迎勞於道及此引見涕泣曰臣識龍顏在天下之先今拜闕庭在衆人之後臣之罪也於是引入卧内言及疇昔夜久乃罷賞賜萬計拜同州刺史在州思慕不肯理事徵拜衛尉卿尤䝉翫狎仍下優詔毎參見奏事特令昇殿孔紹安隋末為監察御史監帝軍深見接遇帝受禪紹安自雒陽間行來奔帝見之甚恱拜内史舍人陳政初仕隋為謁者兵曹宇文化及之逆以為太常卿委之禦侮政數勸化及歸國化及不能乃亡歸長安化及失政之後三軍奪氣兵勢益弱帝與之有舊聞其來也大恱遣使迎勞及至賜宴極歡尋授内史舍人許紹初仕隋為夷陵郡通守後遣使歸國拜陜州刺史封安陸郡公帝與紹有舊因下詔曰昔在青衿同遊庠序博士吴琰其妻姓仇追想此時宛然在目荏苒歲月遂成累紀且在安州之日公家乃莅岳州渡遼之時伯裔又同戎旅安危契濶累葉同之其間遊處觸事可想公追硯席之舊歡同通家之曩好爰自荆門馳心絳闕覽此忠至彌以慰懐張瑾隋末陷王世充及雒陽平詔徵瑾入朝以舊恩歴右衛大將軍軍噐太監帝哀其年老從容謂之曰公筋力漸衰過爾勞曵無乃辛苦耶朕不惜官但恐相損瑾固請曰幸遇明時願得陪奉帝頷之及為羽林將軍遇突厥來寇瑾不戰保于幽州帝以其年老拜冠軍將軍優以散秩太宗以武徳九年八月即位九月戊戌賜舊邸僚舊下逮胥吏帛各有差又宴舊府佐及學士於𢎞教殿賜物各有差貞觀十五年五月壬申并州道士及僧父老等二百人詣闕上表稱太原王業龍興之地明年登封已後願時臨幸臣欽若等曰是年四月有詔封泰山故父老等有禮畢臨幸之謂帝賜宴于武成殿顧謂侍臣曰朕少在太原喜羣聚博戲暑往寒逝將三十年矣因與舊識者陳說往事以為笑樂因謂之曰他人之言或有面䛕公等朕之故人實以告朕即日政教於百姓何如人間得無疾苦耶故老咸稽首言四海太平百姓歡樂陛下之力也臣等餘年日惜一日但眷戀聖化不知疾苦因固請幸并州帝曰飛鳥過故林尚徘徊躑躅况朕於太原起義遂定天下永言懐舊誠所不忘俟東封還或與公相見耳各賜物而遣之其不來者仍降璽書存問之曰昔隋末喪亂百姓凋殘酷法淫刑役煩賦重農夫釋耒工女下機徵召百端㓂盗蜂起人懐怨憤各不聊生水火之切未足為喻先朝不忍塗炭思濟黎元朕禀承神筭奮劒南起與彼境英雄同心協力不顧軀命以救蒼生爰自晉陽興兵立義雄鋒接刃櫛風沐雨除凶去暴布徳行仁天下乂安戎車止息九夷八狄莫不來庭以至于今二十餘載豈子一人所能致此實頼天地之靈宗社之福賢人君子為朕股肱文士盡其才智武夫宣其武力朕端拱無為庶幾王道然漢祖悲歌嘗思豐沛晉皇吟咏唯在温原此人情也況并部之地創業之基與諸父老首立大事引領北望感慕兼深思與父老一日敘舊懐之在心所不忘也但海内殷曠萬機事多廵省四方未獲周悉父老宜約勒鄉黨教導後生親踈子弟務在忠孝必使風俗敦厚異於他方副朕此懐光示逺邇使旌表門閭榮寵家國書名竹帛豈不美乎夏序甚熱想各平安善自怡養動靜聞奏故有此勑想見朕心十六年十一月甲子帝幸慶善宫召武功之邰城立節三時豐義四鄉士女七十已上及居宫側數百人賜宴焉帝謂之曰朕㓜遭隋亂櫛風沐雨饑不遑食以救蒼生百姓得無死亡二十餘年矣今重還舊鄉與父老相見此宫先皇所居朕之生處至此傷心觸物增感因泣下霑襟羣臣莫不􅒣欷又曰今召父老言宴少自寛割耳又謂羣臣曰人或時覽物不能自知朕昔在隋朝五品初不可望公等其時多有未仕朕今君臨四海公等並居髙列君臣相遇千載一時朕與諸公豈各自知也遂縱酒盡歡其父老中或宿經役事或舊媼倉頭皆蹈舞勸醉爭前上壽或因言屈滯者帝咸理之宴畢賜帛各有差其無官者並加泛級二十年帝征遼還幸并州引從官及太原父老宴賜物有差因下詔曰太原之地興運所階全晉之人義深惟舊自朕恭膺寳歴二紀于兹何嘗不御扆長懐想崤陵之風雨臨軒逺感念大􅅢之雲雷當於此時乃忘身而拯溺實頼同徳並羸糧而樂推役不踰年遂清區域諒繇成都之衆謳訟闡虞帝之功戰牧之徒歌舞興周王之業仗兹恊力竟至昇平懐彼勤勞何忘晷刻既因垂拱之暇再省創業之方周歴郊原宛如疇昔訪其父老已多長謝不見所識魏后遂以興嗟䘏彼故人漢髙因而式宴前王是日哀樂交懐在朕深𠂻義符于此是用具陳廣樂共申髙宴取譬還譙之賞同彼幸代之情仍曲赦并州管内大辟罪已下繋囚見徒皆赦除之常赦所不免者不在赦例又以前銀青光禄大夫遼山縣伯温昻為金紫光禄大夫保晉陽之舊也二十一年開府儀同三司髙士亷薨帝聞之流慟將往哭之房𤣥齡頓首諫曰陛下久御藥石不可臨䘮去歲聖躬不安康復甫爾臣等敢以死請帝曰朕此行也豈獨君臣之禮歟兼以故舊情深恩戚義重一朝長逝忍而不哭之乎卿等勿復言也乃從數百騎出興安門司徒長孫無忌哭於喪側聞駕來馳往奉見涕泣馬前諫曰餌石臨喪經方明忌臣之目見誠有所徴陛下含育黎元須為宗社珍愛臣亡舅士亷知將不救嘗謂臣曰至尊覆載恩隆不遺簮履亡沒之後或致親臨生存虚荷榮班無酬聖徳安可以北首夷衾輙囘鑾駕魂而有靈負譴斯及不願親臨期於必遂其言甚切帝終不聼無忌中道伏卧涕泣交流帝感之還入宫苑南望而哭雨泗沾衣從官無不屑涕載胄初仕齊為鄭州長史帝尅武牢而得之引為士曹參軍武徳末以藩邸之舊除兵部郎中薛萬淑以屢有戰功拜上柱國封武城郡公帝與之有舊引為䕶軍及嗣位拜右領軍尋鎮黄龍檢校東校尉崔善為尚書左丞後歴大府大理司農陜秦二州所在之職皆名幹理雖頻以罪失官然以相府僚舊旋被升用蕭璟隋煬帝蕭后之弟義寧中陷王世充為工部尚書帝之平東都也引為諮議貞觀中以藩邸僚宷歴黄門侍郎太子右庶子褚亮為通直散騎常侍致仕歸于家帝行幸雒陽及成翠微宫賜亮詩每有隔濶想思之句及駕幸遼東亮子遂良為黄門侍郎詔遂良謂亮曰昔興師旅卿嘗入幕今兹遐代君已懸車倐忽之間移三十載眷言疇昔我勞何如今將遂良東行想公於朕不惜一兒於膝下耳故遣陳離意善居加食亮奉表陳謝其為欵舊如此及至􅃦疾詔令髙手醫將藥救療中使候問不絶卒時年八十八帝甚哀惜之再三言及流涕張後𦙍初在太原侍帝講經史貞觀初為燕王諮議從王入朝特被召見屢蒙顧問後𦙍因奏言陛下龍濳之日常問臣隋氏運終何族當得天下臣對曰李姓必得拯厥横流實資仁聖公家徳業天下係心若於此首謀順天而動黄河以北指撝可定然後長驅關右以圗帝業萬姓喁喁孰不幸頼帝曰此事並記之耳因賜讌於月池言及平昔乃從容謂後𦙍曰今日弟子何如後𦙍奏曰昔孔子領徒三千逹者無子男之位臣翼贊一人即為萬乗之主計臣此功逾於先聖帝以為笑樂乃令羣臣難問後𦙍左傳謂之曰朕昔就卿受春秋今猶不忘後𦙍謝曰陛下天縱聖徳禀自生知臣不敢貪天之功以為己力帝大恱賜以御馬及諸物遷燕王府司馬後為睦州刺史因入朝乞骸骨帝召問曰朕與卿刺史資以自飬何謂即求致仕後𦙍對曰年老筋力不健望得還私第時見厥庭帝曰卿力猶强欲何官也後𦙍陳謝不敢帝曰朕昔從卿讀書卿今日從朕求官但言所欲不相違也時國子祭酒缺後𦙍奏言之因授國子祭酒俄遷散騎常侍又請致仕許之加金紫光禄大夫聽朝朔望裴寂既流靜州㑹山羌為亂寂率家僮破之帝思其佐命之舊徵入朝㑹卒帝聞而傷之贈相州刺史工部尚書河東郡公髙宗在春宫時蕭徳言為侍讀及嗣位以師傅恩加銀青光禄大夫特令全給禄俸遣通事舍人就家致問仍令乗輿至肅章門引見優禮甚厚賜帛百疋因是晉府及東宫舊侍讀許叔牙等身沒者子孫並增秩賜物焉永徽二年十二月贈故中書令馬周為尚書右僕射以東宫舊僚故也顯慶二年十月幸鄭州以髙祖在隋嘗牧榮陽有經事髙祖任郡佐史布衣以上身見在即以名聞五年正月幸并州至澤州之長平頓帝以歴試此境賜父老等布帛有差龍朔元年九月幸天宫寺以是髙祖龍濳舊第賜絹五百疋度僧二十七人麟徳元年九月丙子至自萬年宫便幸舊宅停七日丁丑宴羣臣賜物有差總章二年九月幸岐州以髙祖仕隋為扶風太守故曲赦岐州仍賜髙年衣物粟帛各有差中宗神龍元年四月宴房州父老於雒城南門各賜勲一級帛十五叚又以衛尉卿同平章事魏元忠為兵部尚書韋安石為吏部尚書太子賓客平鄉縣公李懐逺為右散騎常侍兵部尚書同中書門下三品酒泉縣公唐休璟為輔國大將軍中書令博陵郡公崔𤣥暐為特進檢校益州都督府長史判都督事京師畱守户部尚書同中書門下三品兼檢校雍州長史𢎞農郡公楊再思兼檢校揚州大都督府長史判都督事國子祭酒同中書門下三品祝欽眀為刑部尚書仍並同中書門下三品帝在春宫元忠等繼為左右庶子等官至是故有斯授又追贈故文昌左相劉仁軌為太尉故太子詹事蔣儼為禮部尚書皆以春宫舊僚故也三年四月庚寅幸薦福寺其故吏用府官從至寺者各賜勲一轉崔敬嗣則天初為房州刺史帝為廬陵王安置在州官吏多無禮惟敬嗣獨申禮致敬又供給豐贍帝常徳之及登位有益州長史崔敬嗣既同姓名每進擬官皆御筆超拜之者數四後引與語乃知誤訪敬嗣已卒乃遣中書令韋安石授其子官睿宗景雲二年三月故吏部尚書張嘉福追復官爵嘉福神龍初為吏部尚書兼相府長史唐隆元年同中書門下三品河北道宣勞使嘉福昵宗楚客附悖逆庶人及楚客誅有制斬之使未至嘉福次懐州牒令禁錮司法遽殺之尋後勅放于嶺表而嘉福已死帝即位以藩邸舊臣復官焉𤣥宗初在春宫褚無量為國子司業兼太子侍讀及即位遷郯王傅兼國子祭酒尋以師傅恩遷左散騎常侍仍兼國子祭酒封國公賜實封三百户開元二年八月詔曰朕聞士之生代始於事親中於事君終於立身此其本也若乃移孝成忠策名委質命有太山之重義狥則為輕事有疾風之力節全則為勁況君臣之相遇而故舊之不遺乎銀青光禄大夫殿中監楚國公姜皎簮􅌧聨華珪璋特秀寛厚為量深沉合謀靜而安仁動能體國往居藩邸濳欵風雲亦猶彭祖之同書子陵之共學朕嘗逰幸于外至長楊墟社之間皎於此時與之累宿私謂朕曰太上皇即當九五王必為儲副凡如此者數四朕叱而後止寜知非僕雖玩於鄧晨可收䕶軍遂訶於朱祐皎復言於朕兄弟及諸駙馬等因聞徹太上皇太上皇遂奏於中宗孝和皇帝皇帝尋遣嗣虢王邕等鞫問皎保䕶無怠詞意轉堅李通之䜟記不言田叔之髠鉗罔憚乃為宗楚客紀處訥等密奏謫皎炎荒中宗特降恩私遷潤州長史讒邪每搆忠懇逾深戴於朕躬憂存王室以為天且有命預覩成龍之徴人而無禮嘗懐逐鳥之志㳺辭枉䧟旋罹貶斥嚴憲將及殆見誅夷履危本於初心遭險期於不貳雖禍福之際昭然可圗而艱難之中是所繄頼洎朕祗膺寳位又共翦奸臣拜以寵光不忘撝挹敬愛之極神明所知造膝則曾莫詭隨匪躬則動多規諌補朕之闕斯人孔臧而悠悠之談嗷嗷妄作醜正惡直竊生於謗考言詢事益亮其誠昔漢昭帝之保霍光魏太祖之明程昱朕之不徳庶幾於此矧夫否當其悔則滅宗毁族朕負之必深㤗至其亨則如山如河朕酬之未補豈流言之足聽而厚徳之遂忘謀始有之圗終可也宣告中外咸令悉知九月詔曰明王垂訓則罪不相及善人懼罰則刑不可濫繇是母嘗直言豈坐趙括魚既從戮寜遺叔向古之道也朕所務焉衛尉少卿崔滌竭誠奉國忘體事君曾同下杜之逰頗若中陽之舊誠表於先覺節全於後凋其兄湜素蓄異圗交結兇黨滌雖懐在原之急深憂闔室之刑動靜則聞始終必盡為臣不隠唯滌有之言念厥功曷云從坐況老父就殞諸兄繼殁揺落變衰有足矜憫賞罰勸沮宜判忠邪滌家除兄湜一房外餘並不須為累滌今名澄𤣥宗在藩邸與之同里而居繇是有舊景龍中𤣥宗之潞州賓友餞别者自國門而旋滌獨從至于革及登極恩眷甚厚賞賜相繼思渥之盛當時無比帝以其朝夕宫掖出入無間慮有所漏洩乃于滌笏上親札慎密二字以誡之五年七月制曰西漢諸將多以權貴不全南陽故人宜以優閒自保觀夫先後吉凶之數較然可知良有以也太常卿上柱國楚國公監脩國史姜皎衣纓奕代忠讜立誠明識比於橋𤣥密私方於朱祐朕昔在藩邸早申欵洽嘗博我以不遺亦起予以自愛及膺大位屢賜崇班茅土列爵河山傳誓備蒙光寵特冠等夷朕每欲其戒盈用克終言未若避榮公府守靖私第自𢎞髙尚之風不渉囂塵之境沐我恩貸庇爾子孫宜歸田園以恣娱樂散官勲封並如故時皎弟晦為吏部侍郎兄弟當朝用事侍中宋璟以其權寵太盛恐非久安之道屢奏請消損之故有是命後坐漏洩禁中語配流於雷州死于中路帝思皎舊勲令逓其柩還制曰念舊飾終仰惟令典故袐書監姜皎頃在屯難頗申誠績運屬光華遂延恩澤而過繇驕怠遽隔幽明言念往初有深矜悼宜寵泉穸以示不忘可贈澤州刺史六年二月以少府監齊景胄為益州大都督府長史充劒南道度支防禦兼松常姚巂等州處置兵馬使以隰州刺史兖國公陸象先為潤州刺史岳州刺史燕國公張說為荆州大都督府長史海州别駕員外置同正員韋嗣立為陳州刺史沔州刺史張廷珪為蘇州刺史洋州刺史賈曾為慶州刺史皆坐貶久之特恩甄敘為其舊也十一年正月幸潞州以歴試舊宅為飛龍宫詔曰朕廵狩晉陽觀風問俗肆覲羣后存問百年候於境者仰為故事今停蹕潞州勞以牛酒其外州刺史及迎駕父老道士女道士僧尼等逺來至此頗以艱辛宜並令預㑹刺史賜物四十疋父老以下各賜物三疋又勑太原府境内其有沈淪草澤抱徳栖遲及武徳功臣子孫并元從子孫才堪文武所屬官者並委府縣搜揚具以名薦辛卯詔并州置北都改州為太原府癸巳親製起義堂頌刻石紀功于太原府之南街二十年十月北狩至潞州勑曰朕往在藩邸逰歴潞城歲月頗多人情亦厚今因廵省再過此邦初至歡呼皆有繇𠂻之感將去停立益知戀主之誠言念此心孰不能辨雖天下為一政有何殊而王者無私議不謂此特宜優異以納羣心其潞府百姓丁壯等免征行令其分畨宿衛定名長從仍委長史韋虚心審問父老百姓等如此處置可否奏聞天寳七載正月制曰哲王垂範既有寵於勲庸先聖立謀諒不遺於故舊贈澤州刺史姜皎身心敏識雅量通才夙懐經濟之能且著文辭之美往居藩邸早奉欵誠及登寳位嘗進忠讜漢高之念盧綰魏祖之重橋𤣥彼此一時我亦無愧永言徽烈豈忘褒崇宜加贈於八座更開封於百室可贈吏部尚書仍賜實封三百户與子孫永克享祀肅宗以至徳元年七月即位於靈武詔東宫官屬既㑹昌期合承寵命量加改轉李泌自天寳末待詔翰林仍東宫供奉帝甚禮之泌為楊國忠所忌出蘄春郡及帝即位遣使訪召㑹泌自嵩頴間行至彭原郡謁見陳今古成敗安危之機契於宸𠂻延至卧内動皆顧問泌稱山人故辭禄秩以散官寵之特拜銀青光禄大夫仍知元帥廣平王行軍司馬事杜鴻漸為朔方節度判官㑹帝承命北廵徴兵討逆屯于靈武鴻漸得謁見及即位之際鴻漸以定策功遷中書舍人兼判兵部侍郎代宗寳應元年七月即位優詔東宫官僚並與改轉願守本官者亦聽李進初為帝東征從事又為皇太子元帥參佐後至兵部侍郎卒帝甚悼之制曰朕在藩邸理兵西夏建于元子受律東郊時更否㤗再同休戚其恩遇如此贈禮部尚書徳宗即位初以國子博士翰林學士張渉為左散騎常侍仍為學士帝自居春宫渉嘗為侍讀及嗣位後庶政小大皆咨之恩禮甚崇多所𢎞益俄受前湖南觀察使辛杲金事覺以恩舊不之罪廢于家建中初帝以駙馬都尉柳譚子成嘗有硯席之舊日加渥澤興元初贈尚書左丞趙涓禮部尚書㳙永㤗初為御史禁中失火焚屋室數十間與東宫稍逼近代宗深驚疑之㳙時為廵使俾令即訊㳙周歴壖囿按驗證㨿乃上直官遺火所致也推鞠明審頗盡事情既奏聞代宗甚嘉賞焉帝時在東宫嘗感㳙之䆒理詳細及為衢州刺史年老既深又與觀察使韓滉不相得滉奏請免其官帝見其名謂宰相曰豈非永㤗初御史趙㳙乎對曰然即日拜尚書左丞俄知吏部選事扈從梁州而卒順帝以貞元二十一年正月即位制以給事中馮伉為兵部侍郎以兵部員外郎史館修撰歸登為給事中修撰如故伉及登皆帝在東宫時侍讀以師傅恩拜憲宗在藩邸張宿因軍使張茂宗得出入東宫辯譎敢言洎監撫登位之際驟承顧幸擢居諌列以舊恩數召入禁中終諌議大夫武元衡仕徳宗為御史中丞順宗即位王叔文等不恱之罷為右庶子帝始册為皇太子元衡贊引因識之及登極復拜御史中丞穆宗以元和十五年正月即位閏月以駕部員外郎丁公著為給事中兵部郎中薛放為工部侍郎咸以東宫舊恩起奬初放為皇太子侍讀及嗣位未聽政間放多在左右密參機務帝嘗謂放曰小子初承大寳懼不克負荷先生宜為相以匡不逮放叩頭曰臣實庸淺不足當重任乞陛下授以能者帝尤用嘉歎賜以金紫加集賢殿學士雖事任非切而恩顧轉隆乂轉刑部侍郎禮部尚書兼學士如故二月御丹鳳樓大赦詔東宫官及侍讀普恩之外賜爵加階仍並與進改三月以檢校司空兼太子少師判國子祭酒事鄭餘慶為檢校司徒餘如故加太子少傅兼判太常卿事韓臯檢校太僕射並以東宫師保之舊進秩也以太子賓客李益為右散騎常侍太子詹事分司東都韋貫之為河南尹太子賓客田融為太子少保兼太子詹事依前留司益等亦以春宫舊僚進秩四月以前䖍州刺史韋綬為尚書左丞綬前為諫議大夫侍讀東宫帝深禮敬至是以舊恩超擢未幾復加集賢學士敬宗長慶四年正月即位三月以太子少保張𢎞靖為太子少師分司東都太子賓客令狐楚為河南尹兼御史大夫太子賓客李益為左散騎常侍太子賓客張賈為右散騎常侍並以宫僚加恩也文帝初封江王寳厯二年十二月即位太和元年正月敇江王府官去年十二月已前在任者並與進改後唐莊宗同光元年十二月車駕在洛京丁丑太原耆老薛漢等八十人詣闕稱慶見於嘉慶殿帝以豐沛之民親自慰諭給賜有差二年六月贈故河東節度副使右諫議大夫李襲吉禮部尚書故河東節度副使禮部尚書蘇循為尚書左僕射故河東節度副使户部侍郎盧汝弼為兵部尚書故河東管内觀察判官檢校尚書左僕射司馬揆為司空故河東留守判官工部尚書李敬義為尚書左僕射皆河東舊僚也十一月贈故天雄軍節度副使王緘為司徒緘燕人初為劉仁恭幕吏天祐四年仁恭遣緘使鳳翔路繇太原及復命燕晉不通帝留之言不遜命繫于獄尋脫之署廵官帝待之甚厚時有馬郁者亦仁恭之幕賓也三年冬仁恭令郁將兵三萬㑹於晉陽攻潞州因兹亦畱於晉帝以郁為畱守判官郁緘俱有文才然郁博通多識才性朗俊下筆成章郁死軍書墨制多出於緘初從定魏州為節度判官朞年為副使帝寵顧甚隆及胡柳之役緘於輜重間為亂兵所殺帝聞之欷然曰副使應至不測翊月得其喪以歸至是追贈明宗在濳時同光中賜得梁租庸使趙巖雒中宅宅雖華以趨内逺乃與羅周敬易其第諾之其第即周敬父紹威前唐時所建在福善里後帝即位一日夢中見一人儀形瓌秀若素識者帝夢中曰此得非前宅主羅氏乎及寤訪其子孫左右對曰周敬見列明廷召至果符夢中所見帝謂侍臣曰朕不欲使大勲之後久無土地因授左馮非承家為善何以致此天成元年七月中書門下奏太原濳龍宅請以積慶宫為名從之是月勅漢朝昇沛魏祖封譙當化家為國之時行奉先思孝之道睠惟應郡跡乃帝鄉宜師古而建邦亦推恩而及物俾崇國本以洽人情其應州宜置彰國軍節度仍以興唐軍為寰州𨽻彰國軍九月己未幸前隰州刺史袁建豐之第帝在藩邸嘗為副相得甚歡至是建豐風病沈廢於私第以舊愛親幸撫慰之二年四月贈故振武軍節度使李嗣昭為太尉嗣昭天祐十五年卒於太原帝舊敦分義臨御之後念深故人故有是詔十一月乙卯平盧軍節度霍彥威天平軍節度符習入覲召昇殿命樂舉酒語及佐命決策之事歡話移時長慶元年三月以吐谷渾薛萬通為嵐州刺史與帝有舊故也十月北京留守馮贇謝恩賜母衣服銀器初贇父在太原濳龍第為家老母出入第中恩意頗厚贇自宣徽使居守晉陽將之任贇母辭於宫中帝謂贇母曰吾軰老矣贇昨來緫角兒走吾前今日便得氣力吾頃在太原為偏將視節度使富貴極矣彼時吾不敢懐望將帥今贇為留守節度使耳姥更宜内訓撫我鄉里生民是日錫以金繒及至任每因中使往即慰問之三年二月以李從臻檢校尚書右僕射右衛將軍劉遂凝檢校户部尚書右監門衛將軍韓昭裔檢校户部員外郎守太子左贊善大夫仍賜紫金魚袋趙筠檢校兵部尚書王再友檢校刑部尚書胡漳檢校國子祭酒史延韜檢校右散騎常侍皆帝在藩舊參佐也四年八月乙丑帝顧謂侍臣曰前洋帥陳臯稱病甚乞致仕信乎對曰實然帝因愴然改容良乆曰陳臯昔為健兒從吾征伐操戈擐甲氣吞豺虎今衰落如此浮生壯健都幾何時哉咄嗟乆之因令孟漢瓊往勞問安金全初仕莊宗為騎將與帝尤相善天成初召金全歸朝授振武節鉞同平章事何瓚初仕莊宗判留守於北京及帝纘嗣日召還見於秘殿帝念及故舊勞問乆之厚加賜賚李建崇初仕莊宗以不能巧官乆滯偏禆帝嘗掌牙兵與建崇共事甚愍之連授磁沁二州刺史曹英本常山真定人父全武事趙王鎔為列校英因得𨽻鎔帳下及莊宗奄有其地録其左右收為散指揮使帝即位英侍於伎下問其祖考英以實對帝曰乃朕之舊也擢本班行首毎加顧遇藥縱之初依帝攝代州衙推及鎮邢洺為書記自是移鎮常山被天平宣武兩鎮節度副使帝鎮常山被病不隨及踐阼縱之請見于雒邑安重誨怒其觀望半歲餘無所授言事者聞於帝帝曰徳勝用兵時縱之饑寒相半不離我左右今有天下何人不富貴獨委縱之何以勸勞且遽召見之浹旬除磁州刺史愍帝長興四年十一月即位丙辰以天雄軍節度判官唐汭為左諌議大夫掌書記趙彖為起居郎攝觀察推官吴承範為左拾遺左都押衙宋令詢為磁州刺史皆帝帥鄴時文武參佐也唐汭舉進士自帝帥宣武時從事歴太原真定三府帝喜儒學汭之所啓也故有此授又以天雄軍廵官殷鵬為右拾遺鵬與吴承範俱魏州人舉進士㑹帝為帥歸鄉里依之故有是超授焉應順元年正月以前洺州團練使皇甫立為保大軍節度立明宗微時舊人也性不趨競同時數軰皆秉節鉞唯立纔及二千石朱馮舉勞其舊故有是命臣欽若等曰朱𢎞昭馮贇皆當時宰相末帝初天成中出鎮河中府房嵩者京兆長安人也少為唐宰相崔魏公家臣後因亂客於蒲州於路左迎謁帝求事軍門帝受之使治賓客及登極歴南北院宣徽使清泰元年以左諌議大夫盧損為右散騎常侍損嘗奉使河中與帝欵接故也五月以右千牛衛上將符彦饒充左右翊衛都指揮使彦饒舊典禁軍明宗朝立定亂之功今春以伯氏安州不治而入宿衛帝㳺舊也故復委任之六月以前均州刺史韓逺為羽林將軍前申州刺史李干為右驍衛將軍前河東行軍司馬李繼忠為左驍衛將軍前鄜州行軍司馬韓昭為左武衛將軍前彰義行軍司馬喬神劍為右武衛將軍前青州行軍郭師肇為右武衛將軍前安州行軍司馬石延贇為右監門衛將軍前同州行軍司馬趙彦鐸為左監門衛將軍帝乆親戎事皆舊部校也故有是奬録焉辛巳以太子太傅致仕王建立兼侍中充天平軍節度鄆齊棣等州觀察處置等使建立以微賤事明宗與帝少而周旋備嘗艱苦明宗鎮真定詔入朝以建立廵檢知畱守事及即位遂用為節度使後歴數鎮長興中致仕帝與之親舊乃有是拜七月詔禮部郎中知制誥吕琦賜紫金魚袋初帝河中失守歸清化里第罕得出入琦寓止在帝左右凡有奏請謀度之事遣韓昭諮於琦而後行既君天下深念疇昔故前命知制誥至是有金章之錫庚申贈前京兆府髙陵令郝翊為兵部郎中故鳳翔節度押衙朱廷乂為尚書右僕射初帝在岐陽將起兵召謀畧之士翊自言有鬼谷捭闔之術廷乂自許氣俠令二人相繼往長安說王思同二人未還㑹藥彦稠至知是岐下來思同不獲已拘翊送京師廷乂初謂帝曰必令思同効用事或踟蹰勞一匕首耳從者以此語告思同乃殺之故有是贈二年九月詔以量移同州長流人放歸鄉里司徒翊為相州司馬翊與帝有賓筵之舊初流寜州移同州又放歸本貫路繇都下遣人慰勞便欲畱之韓昭曰同列八人翊獨異之非典也用之非晩至是欲召還昭又曰八人類例止可復資無宜異等故有此授初帝在河中翊為判官明宗時諸子中秦王為河南尹判六軍王府最盛翊因入貢祈安重誨願不歸蒲中乃授右補闕史舘修撰無幾為户部員外郎充河南府判官明宗􅃦疾秦王搆逆翊與諸從至天津秦王兵敗各贖為庶民洎帝御極翊益懐憂悸帝念舊至是先復資旋用為兵部員外郎晉髙祖天福元年以王岯為將作監岯河内人厯河陽度支使鄴都河東少尹與帝濳龍時有舊也四年二月中書門下上言陛下應天順人握圗御宇電遶虹流之地既煥禎符出潛離隠之鄉宜光稱謂其太原濳龍莊望建為慶昌宫使相鄉望改為龍飛鄉都尉里望改為神光里從之李瓊初仕後唐𨽻明宗麾下為小校同光二年明宗受詔以本道兵送糧入薊門時帝從行至涿州與虜相遇帝䧟于圍中瓊顧諸軍已退密牽帝之衣指東而遁至劉李河為虜所襲瓊浮水先至南岸帝至河中馬倒順流而下瓊以所執長矛援帝出之又以所跨馬奉帝瓊徒歩從之奔十里餘乃入涿州帝薦於明宗明宗賞之尋超授軍職帝即位補䕶聖都虞候又念疇昔輟馬導䕶之力前後所賜金帛甚厚乆之領横州刺史遷申州刺史安審暉為河東行軍司馬帝龍飛以覇府上僚授振武兵馬留後遷河陽節度使不踰月移鎮鄜州李崧後唐長興中為樞宻直學士時契丹宼雲中明宗欲命重將鎮太原時帝為六軍副使以秦王從榮不軌懇求外任深有北門之望而大臣以帝方權兵柄難以議之翌日明宗怒其未奏范延光趙延壽等無對退歸本院共議其事方欲以康義誠為之時崧最在下位聳立請曰朝廷重兵多在北邉須以重臣為帥以某所見非石太尉不可也㑹明宗令中使促之衆乃從其議翌日帝既受太原之命使心腹逹意於崧云壘浮圖須與合却尖欲使崧終始成已事也及清泰末帝入雒崧與吕琦俱竄匿於伊闕民家旬曰帝召為户部侍郎判户部踰月拜中書侍郎平章事與桑維翰並兼樞密使王繼𢎞初為後唐明宗𤓰牙時帝為偏將與梁人戰於河壖短兵相接帝為梁人所襲而馬甲連革斷㑹漢髙祖以馬授之獲濟繼𢎞適在其部有後助之力帝即位擢為六宅副使漢髙祖踐阼以郭謹鄉國舊臣加檢校太尉移鎮滑臺乾祐初復授彰徳軍節度使二年就加檢校太師三年春入朝加食邑是歲冬十月卒於位年六十輟視朝兩日贈侍中周太祖廣順元年三月幸城西城南御園及史𢎞肇園帝嘗與𢎞肇遊宴其間臨觴嗟嘆乆之七月昭義節度使常思上言曰臣妻王氏入貢蒙陛下致敬臣惶恐無容自處詔曰朕以君臣之道則外有朝廷之儀骨肉之親則内有少長之敬且朕與卿當夙昔之共事實敦叙于周親安可此時使渝曩分卿執恭為行瀝懇上章雖謙謙之道可嘉而親親之義難替家人之禮朕當必行帝微時常思在上黨思夫婦奉帝甚謹帝徳之及貴遇恩益厚雖居至尊之位猶行家人之禮三年三月賜刑部郎中景範金紫服覇府舊僚也二年八月以安國軍節度使劉詞為河陽三城節度使詞性忠實帝龍濳時累同征伐頗深委信永壽節來朝帝内殿與詞從容話舊曰吾軰老矣自覺心力減耗於前幸兒軰幹於庶事移公近鎮兾易相面王俊為樞密使性輕躁率易帝以故舊諳其為人且以佐命之故每優容之俊年長於帝二歲帝雖登大位時以兄呼之有時呼字不忘布衣之契俊以此益自負焉世宗即位初以給事中張可復有澶淵幕府之舊拜為右散騎常侍周彥頵與帝有舊及即位超授内客省使未幾知相州軍府事尋改延州兵馬留後到鎮頗以貨殖為意窺圖䞉利浸漁蕃漢部人羣情大擾㑹帝南征蕃部結聚圍廹州城彦頵閉壁自守求援於鄰道頼救兵至乃觧帝不悦徴赴京師然猶委曲庇䕶竟不之責王朴自帝鎮澶淵朝廷以朴為記室及帝為開府尹拜右拾遺充開封府推官帝嗣位改比部郎中賜紫册府元龜卷一百七十二
