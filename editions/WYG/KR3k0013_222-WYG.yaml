body:
  text: 冊府元龜卷二百二十二宋王欽若等撰僣偽部勲伐第二前燕慕容廆晉武帝時為鮮卑都督太康十年遷于徒河之青山廆以大棘城即帝顓頊之􅇕也恵帝元康四年乃移居之太安初宇文莫圭遣弟屈雲冦邊城雲别帥大素延攻掠諸部廆親擊敗之素延怒率衆圍棘城廆乃躬貫甲胄馳出擊之素延大敗追奔百里俘斬萬餘人懷帝永嘉初廆自稱鮮卑大單于時遼東太守龎本以私憾殺東夷校尉李臻附塞鮮卑素連木津等託為臻報讐實欲因而為亂遂攻陷諸縣殺掠士庶太守袁謙頻戰失利校尉封釋懼而請和連歳冦掠百姓失業流亡争歸附者日月相繼廆子翰言曰求諸侯莫如勤王自古有為之君靡不仗此以成事業者也今連津䟦扈王師覆敗蒼生屠膾豈甚此乎豎子外以龎本為繇内實幸而為冦封使君以誅本請和而毒害滋甚遼東傾没已二周中原兵亂州師屢敗勤王仗義今其時也單于宜明九伐之威救倒懸之命數連津之罪合義兵以誅之上則興復遼邦下則并吞二部忠義彰於本朝私利歸於我國此則吾鴻漸之始也終可以得志于諸侯廆從之是日率騎討連津大敗斬之二部悉降徙之棘城立遼東郡而歸其後平州刺史東夷校尉崔毖陰結髙句麗及宇文段國等謀滅廆以分其地元帝大興初三國伐廆廆以計間之二國引兵而歸唯宇文悉獨官攻之盡衆逼城連營三十里廆簡鋭士配世子皝推鋒於前庶長子翰領精騎為奇兵從旁出直衝其營廆方陣而進悉獨官乃自恃其衆不設備見廆軍之至方率兵拒之前鋒始交翰已入其營縱火焚之其衆皆震擾不知所為遂大敗悉獨官僅以身免盡俘其衆元帝遣使者拜廆平州牧遼東郡公段末波初統其國而不修備廆遣皝襲之入令支收其名馬寳物而還石勒遣使通和廆拒之送其使於建業勒怒遣宇文乞得龜擊廆廆遣皝拒之以裴嶷為右部都率索頭為右翼命其少子仁自平郭趣伯林為左翼攻乞得龜尅之悉虜其衆乗勝㧞其國城收其資用億計徙其人數萬户以歸慕容皝初為平北將軍封朝鮮公嗣父廆行平州刺史督攝部内尋而宇文乞得龜為别部逸豆歸所逐奔死於外皝率騎討之逸豆歸懼而請和遂築榆陰安晉二城而還其後皝又自征遼東尅襄平徙遼東大姓於棘城置和陽武次西樂三縣而歸段遼弟蘭擁衆數萬屯于曲水亭將攻栁城宇文歸冦安晉為蘭聲援皝以歩騎五萬擊之師次栁城蘭歸皆遯遣封奕率輕騎追擊敗之收其軍實舘糓二旬而還謂諸將曰二虜恥無功而歸必復重至宜於栁城左右設伏以待之遣封奕率騎潜于馬兠山諸道俄而遼騎果至奕夾擊大敗之斬其將榮保遣兼長史劉斌郎中令陽景送徐孟歸于京師皝以段遼屢為邊患遣將軍宋回稱藩于石季龍請師討遼季龍於是揔衆而至皝率諸軍攻遼令支以北諸城遼遣其將段蘭來拒大戰敗之斬級數千掠五千餘户而歸季龍至徐無遼奔宻雲山季龍進入令支怒皝之不㑹師也進軍擊之至于棘城戎卒數十萬四面進攻郡縣諸部叛應季龍者二十六城相持旬餘左右勸皝降龍皝曰孤方取天下何乃降人乎遣其子恪等率騎三千晨出擊之季龍諸軍驚擾棄甲而遁恪乘勝追之斬獲二萬餘級築戍凡城而還成帝拜皝大將軍封燕王成帝咸康七年遷都龍城率勁卒四萬入自南陜以伐宇文髙句麗又使庶兄翰及子垂為前鋒遣長史王㝢勒衆萬五千從北置而進髙句麗王釗謂皝軍之從北路也乃遣其弟武統精鋭五萬拒北置躬率弱卒以防南陜翰與釗戰于木底大敗之乘勝遂入丸都釗單馬而遁皝掘釗父利墓載其尸并其母妻珍寳掠男女五萬餘口焚其宫室毁丸都而歸明年釗遣使臣稱於皝貢其方物乃歸其父尸宇文歸遣其國相莫淺渾伐皝皝遣翰擊之渾大敗僅以身免盡俘其衆尋乂率騎一萬親伐宇文歸以翰及子垂為前鋒歸使其驍將渉奕于盡衆拒翰翰斬奕于盡俘其衆歸逺遁漠北皝又遣慕容恪攻髙句麗南蘇尅之置戍而還三年遣其世子儁與恪率騎萬七千東襲夫餘尅之虜其王及部衆五萬餘口以還慕容儁嗣其父皝為大將軍大單于燕王明年儁率三軍南伐出自盧龍次于無終石季龍幽州刺史王午棄城走留其將王他守薊儁攻陷其城斬他因而都之徙廣寧上谷人于徐無代郡人于丸城而還及冉閔殺石袛僣稱大號儁遣慕容恪畧地中山慕容評攻王午于魯口降之遂進攻鄴尅其城送冉閔妻子僚屬及其文物于中山晉穆帝永和八年遂僣即帝位前秦苻洪本姓蒲父懷歸為部落小帥永嘉之亂洪乃散千金召英傑之士訪安危變通之術宗人蒲光蒲突遂推洪為盟主劉曜僣號長安光等逼洪歸曜拜率義侯曜敗洪西保隴山石季龍將攻上邽洪又請降季龍大悦拜冠軍將軍委以西方之事季龍滅石生洪説季龍宜徙闗中豪傑及羗戎内實京師季龍從之以洪為龍驤將軍流人都督處于枋頭累有戰功封西平郡公其部下賜爵闗内侯者二千餘人以洪為闗内領侯季龍死石遵即位洪遣使降晉後石鑒殺遵所在兵起洪有衆十萬餘永和六年穆帝以洪為征北大將軍都督河北諸軍事冀州刺史封廣川郡公時有説洪稱尊號者洪亦以䜟文有草付應王又其孫堅背有草付字遂改姓苻氏自稱大將軍大單于三秦王苻徤嗣父洪位去秦王稱晉爵時京兆杜洪竊據長安自稱晉征北將軍雍州刺史戎夏多歸之徤宻圖闗中懼洪知之乃偽受石祗官繕宫室於枋頭課所部種麥示無西意有知而不種者徤殺之以徇既而自稱晉征西大將軍都督闗中諸軍事雍州刺史盡衆西行起浮橋于盟津以濟遣其弟雄率歩騎五千入潼闗兄子菁自䡎闗入河東徤執菁手曰事若不捷汝死河北我死河南不及黄泉無相見也既濟焚橋自統大衆繼雄而進杜洪遣其將張先要徤於潼闗徤逆擊破之徤雖戰勝猶修牋於洪并送名馬珍寳請至長安上尊號洪曰幣重言甘誘我也乃盡召闗中之衆來拒徤筮之遇泰之臨徤曰小往大來吉亨昔往東而小今還西而大吉孰大焉是時衆星夾河西流占者以為百姓還西之象徤遂進軍次赤水遣雄畧地渭北又敗張先於陰槃擒之諸城盡陷菁所至無不降者三輔畧定徤引兵至長安洪奔司竹徤入而都之遣使獻捷京師并修好於桓温穆帝永和七年僣稱天王大單于八年僣即帝位後秦姚弋仲父廻為魏鎮西將軍綏戎校尉西羗都督永嘉之亂弋仲東徙榆眉戎夏襁負隨之者數萬自稱䕶西羗校尉雍州刺史扶風公劉曜之平陳安也以弋仲為平西將軍封平襄公邑之於隴上及石季龍尅上邽啟石勒以弋仲行安西將軍六夷左都督季龍執權弋仲率部衆數萬遷于清河拜奮武將軍西羗大都督封襄平縣公遷持節十郡六夷大都督冠軍大將軍季龍末梁犢敗李農於滎陽季龍大懼馳召弋仲弋仲率其部衆八千餘人屯于南郊輕騎至鄴謂季龍曰犢等因思歸之心共為姦盗所行殘賊此成擒耳老羗請効死前鋒使一舉而了乃授使持節侍中征西大將軍賜以鎧馬弋仲曰汝㸔老羗堪破賊不弋仲性狷直俗無尊卑皆汝之季龍恕而不責於是貫甲跨馬于庭中䇿馬南馳不辭而出遂滅梁犢以功加劒履上殿入朝不趨進封西平郡公姚萇初為苻堅揚武將軍累遷歩兵校尉封益都侯為堅將累有大功及堅冦晉以萇為龍驤將軍督益梁州諸軍事堅既敗于淮南歸長安慕容泓起兵叛堅堅遣子叡討之以萇為司馬為泓所敗叡死之萇遣龍驤長史趙郡詣堅謝罪堅殺之萇懼奔于渭北遂如馬牧西州豪族尹詳趙曜王欽盧牛雙狄廣張乾等率五萬餘家咸推萇為盟主晉孝武太元九年自稱大將軍大單于萬年秦王堅寧朔將軍宋方率騎三千從雲中將赴長安萇自貳縣要敗之方單馬奔免其司馬田晃率衆降萇萇遣諸將攻新平尅之因畧地至安定鎮北諸城盡降之時苻堅為慕容冲所逼走入五將山冲入長安堅司𨽻校尉權翼等文武數百人奔于萇萇遣驍騎將軍吳忠率騎圍堅萇如新平俄而忠執堅送之慕容冲遣其車騎大將軍髙盖率衆五萬來伐戰于新平南大破之盖率麾下數千人來降遂僣即帝位姚興嗣父萇偽位使征西姚碩徳率隴右諸軍伐乞伏乾歸興潜軍赴之乾歸敗走降其部衆三萬六千收鎧馬六萬匹軍無私掠百姓懷之興進如枹罕乾歸以窮蹙來降拜鎮遠將軍河州刺史歸義侯復以其部衆配之興如貳城將討赫連勃勃遣姚詳等分督租運諸軍事未集而勃勃騎大至興乃遣左將軍姚文宗率禁兵拒戰中壘齊莫統氐兵以繼之文宗與莫皆果敢兼人以死力戰勃勃乃退留禁兵五千配姚詳守貳城興還長安後蜀李特初居畧陽晉恵帝元康中隨流人入蜀永康元年詔徵益州刺史趙廞為大長秋以成都内史耿滕代廞廞遂謀叛自稱大都督大將軍益州牧特弟庠與兄弟及妹夫李含任回上官惇扶風李攀始平費它氐符成隗伯等以四千騎降廞廞以庠為威冦將軍使斷北道其後廞惡庠齊整以事誅之并殺子姪宗族三十餘人廞慮特等為難遣人喻之曰庠非所宜言罪應至死不及兄弟以庠尸還特復以特兄弟為督將以安其衆牙門將許弇求為巴東監軍杜淑張粲固執不許弇怒于廞閤下手殺淑粲淑粲左右又殺弇皆廞心腹也特兄弟既以怨廞引兵歸緜竹廞恐朝廷討已遣長史費遠犍為太守李苾督䕶常俊督萬餘人斷北道次緜竹之石亭特宻收合得七千餘人夜襲逺軍逺大潰因放火燒之死者十八九進攻成都廞聞兵至驚恐不知所為李苾張徵等夜斬闗走出文武盡散廞獨與妻子乘船走至慶都為下人朱竺所殺特至成都縱兵大掠害西夷䕶軍姜發殺廞長史袁合及廞所置守長遣其牙門王角李基詣雒陽陳廞之罪狀先是恵帝以凉州刺史羅尚為平西將軍領䕶西夷校尉益州刺史督牙門將王敦上庸都尉義歆蜀郡太守徐儉廣漢太守辛冉等凡七十餘人入蜀特等聞尚來甚懼使其弟驤於道奉迎并貢寳物尚甚悦以驤為騎督特及弟流復以牛酒勞尚於緜竹王敦辛冉並説尚曰特等流人專為盗賊急宜梟除可因㑹斬之尚不納冉先與特有舊因謂特曰故人相逢不吉當凶矣特深自猜懼尋有符下秦雍州凡流人入漢川者皆下所在召還特兄輔素留鄉里託言迎家既至蜀謂特曰中國方亂不足復還特以為然乃有雄據巴蜀之意朝廷以討趙廞功拜特宣威將軍封長樂鄉侯流為宣威將軍武陽侯璽書下益州條例六郡流人與特協同討廞者將加封賞㑹辛冉以非次見徵不願應召又欲以滅廞為己功乃寢朝命不以實上衆咸怨之羅尚遣從事催遣流人限七月上道辛冉性貪暴欲殺流人首領取其資貨乃移檄發遣又令梓潼太守張演于諸要施闗捜索寳貨特等固請求至秋收流人布在梁益為人傭力及聞郡逼遣人人愁怨不知所為又知特兄弟頻請求停皆感而恃之且水雨將降年榖未登流人無以為行資遂相與詣特特乃結大營於緜竹以處流人移冉求自寛冉大怒遣人分牓通逵購募特兄弟許以重賞特見大懼悉取以歸與驤改其購云能送六部之豪李任閻趙楊上官及氐叟侯王一首賞百匹流人既不樂移咸往歸特騁馬屬鞭同聲雲集旬月間衆過二萬流亦聚衆數千特乃分為二營特居北營流居東營特遣閻式詣羅尚求申期式既至見冉營栅衝要謀揜流人嘆曰無冦而城讐必保焉今而速之亂將作矣又知冉及李苾意不可廻乃辭尚還緜竹尚謂式曰子且以吾意告諸流人今聼寛矣式曰明公惑於奸説恐無寛理弱而不可輕者百姓也今促之不以理衆怒難犯恐為禍不淺尚曰然吾不欺子子其行矣式至緜竹言於特曰尚雖云爾然未必可信也何者尚威刑不立冉等各擁彊兵一旦為變亦非尚所能制深宜為備特納之冉苾相與謀曰羅侯貪而無斷日復一日流人得展姦計李特兄弟並有雄才吾屬將為豎子虜矣宜為决計不應復縱之乃遣廣漢都尉曽元牙門張顯劉並等潜率歩騎三萬襲特營羅尚聞之亦遣都䕶田佐助元特素知之乃繕甲厲兵戒嚴以待之元等至特安卧不動待其衆半入發兵擊之殺傷者甚衆害田佐曽元張顯傳首以示尚冉尚謂將佐曰此虜誠去矣昔廣漢不用吾言以張賊勢今將若之何於是六郡流人推特為主特命六郡大部曲督李含上邽令任臧始昌令閻式諌議大夫李攀陳倉令李武陰平令李逺將兵都尉楊褒等上書請依梁統奉竇融故事推特行鎮東將軍以相鎮統於是進兵攻冉於廣漢冉衆出戰特毎破之尚遣李苾及費逺率衆救冉憚特不敢進冉智力既窮出奔江陽特入據廣漢以李超為太守進兵攻尚于成都閻式遺書與尚責其信用䜛搆欲討流人又陳特兄弟立功王室以寧益土尚覽書知特等將有大志嬰城固守求救于梁寧二州於是特自稱使持節大都督鎮北大將軍承制封拜一依竇融在河西故事兄輔為驃騎將軍弟驤為驍騎將軍長子始為威武將軍次子蕩為鎮軍將軍少子雄為前將軍李含為西夷校尉含子國離任回李恭上官晶李攀費佗等為將帥任臧上官惇楊褒楊珪王達麴歆等為爪牙李逺李博夕斌嚴􅀈上官琦李濤王懐等為僚屬閻式為謀主何巨趙肅為腹心時羅尚貪殘為百姓患而特與蜀人約法三章施捨賑貸禮賢㧞滯軍政肅然百姓為之謡曰李特尚可羅尚殺我尚頻為特所敗乃阻長圍緣水作營自都安至犍為七百里與特相拒河間王顒遣都䕶衙博廣漢大守張徵討特南夷校尉李毅又遣兵五千助尚尚遣都䕶張龜軍繁城三道攻特特命蕩雄襲博特射擊張龜龜敗績死者大半蕩又與博接戰連日博亦敗績死者大半蕩追博至漢徳博走葭萌進冦巴西巴西郡丞毛植五官襄珍以郡降蕩撫恤初附百姓安之蕩進攻葭萌博又逺遁其衆盡降于蕩晉孝武大安元年特自稱益州牧都督梁益二州諸軍事大將軍大都督改年建初大赦其境内李流兄特承制以流為鎮東將軍特既死蜀人多叛流人大懼流與兄子蕩雄收遺衆還赤祖流保東營蕩雄保北營流自稱大將軍大都督益州牧時宋岱水軍三萬次於墊江前鋒孫阜破徳陽獲特所置守將蹇碩太守任臧等退屯涪陵縣羅尚遣督䕶常深軍毗橋牙門左汜黄訇何冲二道攻北營流身率蕩雄攻深柵尅之深士衆星散追至成郡尚閉門自守蕩馳馬追擊觸倚矛被傷死流以特蕩並死而岱阜又至甚懼太守李含又勸流降流將從之雄與李驤迭諌不納流遣子世及含子胡質於阜軍胡兄含子離聞父欲降自梓潼馳還欲諌不及退與雄謀襲阜軍曰若功成事濟約與君三年迭為主雄曰今計可定二翁不從將若之何離曰今當制之若不可制便行大事翁雖是君叔勢不得已老父在君夫復何言雄大喜乃攻尚軍尚保大城雄渡江害汶山太守陳圖遂入郫城流移營據之三蜀百姓並保險結塢城邑皆空流野無所畧士衆饑困涪陵人范長生率衆千餘家依青城山尚參軍涪陵徐轝求為汶山欲要結長生等與尚犄角討流尚不許轝怨之求使江西遂降于流説長生等使資給流軍糧長生從之故流軍復振流素重雄有長者之徳每云興吾家者必此人也勑諸子尊奉之流疾篤謂諸將曰驍騎髙明仁愛識斷多竒固足以濟大事然前軍英武殆天所相可共受事於前軍以為成都王李雄父特承制以雄為前將軍特弟流死雄自稱大都督大將軍益州牧都於郫城羅尚遣將攻雄雄擊走之李驤攻犍為斷尚運道尚軍大餒攻之又急遂留牙門羅特固守尚委城夜遁特開門内雄遂尅成都于時雄軍饑甚乃率衆就糓於郪掘野芋而食之蜀人流散東下江陽南入七郡僣稱成都王又僣即帝位遣李國李雲等率衆二萬冦漢中梁州刺史張殷奔于長安國等陷南鄭盡徙漢中人於蜀先是南土頻歳饑疫死者十萬討南夷校尉李毅等固守不降雄誘建寧夷使討之毅病卒城陷殺壯士三千餘人送婦女千口於成都時李離據梓潼其部將羅義張金茍等殺離及閻式以梓潼歸于尚尚遣其將向奮屯安漢之宜福以逼雄雄率衆攻奮不尅時李國鎮巴西其帳下文碩又殺國以巴西降尚雄乃引歸遣其將張寳襲梓潼陷之㑹羅尚卒巴郡亂李驤攻涪又陷之執梓潼太守譙登遂乘勝進軍討文碩害之大赦改元後凉吕光畧陽氐人初仕苻堅舉賢良除美陽令夷夏愛服遷鷹揚將軍從堅征張平戰于銅壁刺平飬子蚝中之自是威名大著又從王猛滅慕容暐封都亭侯苻重之鎮雒陽以光為長入為太子右率蜀人李焉聚衆二萬攻逼益州堅乃以光為破虜將軍率兵討滅之遷歩兵校尉符洛反光又擊平之拜驍騎將軍堅既平山東士馬彊盛遂有圖西域之志乃授光使持節都督西討諸軍事率將軍姜飛彭晃杜進康盛等揔兵七萬鐵騎五千以討西域以隴西董方馮翊郭抱武威賈䖍𢎞農楊頴為西府佐將行堅太子宏執光手曰君噐相非常必有大福宜深保愛光行至髙昌聞堅冦晉光欲更須後命部將杜進曰節下受任金方赴機宜速有何不了而更留乎光乃進及流沙三百餘里無水將士失色光曰吾聞李廣利精誠𤣥感飛泉湧出吾等豈獨無感致乎皇天必將有濟諸軍不足憂也俄而大雨平地三尺進兵至焉耆其王泥流率其旁國請降龜茲王帛純拒光光軍其城南五里為一營深溝髙壘廣設疑兵以木為人被之以甲羅之壘上帛純馳徙城外人入于城中附庸侯王各嬰城自守光攻城既急帛純乃傾國財寳請救獪胡獪胡弟呐龍侯將馗率騎二十萬并引温宿尉須等國王合七十餘萬以救之胡便弓馬善矛矟鎧如連鏁射不可入以革索為羂策馬擲人多有中者衆甚憚之諸將咸欲每營結陣案兵以拒之光曰彼衆我寡營又相逺勢分力散非良䇿也於是遷營相接陣為勾鏁之法精騎為遊軍彌縫其闕戰于城西大敗之斬萬餘級帛純收其珍寳而走王侯降者三十餘國光入其城諸國憚光威名貢欵屬路乃立帛純弟震為王以安之光撫寧西域威恩甚著傑黠胡王昔所未賔者不逺萬里皆來歸附上漢所賜節傳光皆表而易之堅聞光平西域以為使持節散騎常侍都督玉門已西諸軍事安西將軍西域校尉道絶不通光既平龜茲有駝二萬餘頭致外國珍寳及竒伎異􅃧殊禽怪獸千餘品駿馬萬餘匹而苻堅髙昌太守楊翰説其凉州刺史梁熈拒守髙桐伊吾二闗熈不從光至髙昌翰以郡迎降及玉門梁熈傳檄責光擅命還使遣子裔與振威姚皓别駕衞翰率衆五萬拒光于酒泉光報檄凉州責熈無赴難之誠數其遏歸師之罪遣彭晃杜進姜飛等為前鋒擊裔大敗裔輕將麾下數百騎東奔杜進追擒之於是四山胡夷皆來欵附武威太守彭濟執熈請降光入姑臧自領凉州刺史䕶羗校尉表杜進為輔國將軍武威太守封武始侯其餘封拜各有差以主簿尉祐為寧遠將軍金城太守祐自允吾襲據外城以叛祐從弟隨據鸇隂以應之光遣其將魏真討之隨敗奔祐光將姜飛又擊敗祐衆祐奔據興城扇動百姓夷夏多從之飛司馬張象參軍郭雅謀殺飛應祐發覺逃奔初苻堅之敗張天錫南奔其世子大豫為長水校尉王穆所匿及堅還長安穆將大豫奔秃髪思復鞬思復鞬送之魏安是月魏安人焦松齊肅張濟等起兵數千迎大豫於揖次陷昌松郡光遣其將杜進討之為大豫所敗大豫遂進逼姑臧求决勝負王穆諌曰吕光糧豐城固甲兵精鋭逼之非利不如席卷嶺西厲兵積粟東向而争不及朞年可以平也大豫不從乃遣穆求救於嶺西諸郡建康太守李隰祁連都尉嚴純及閻襲起兵應之大豫進屯城西王穆率衆三萬及思復鞬子奚于等陣于城南光出擊破之斬奚于等二萬餘級光謂諸將曰大豫若用王穆之言恐未可平也諸將曰大豫豈不及此耶皇天欲賛成明公八百之業故令大豫迷于良􅄸爾光大悦賜金帛有差大豫自西郡詣臨洮驅畧百姓五千餘户保據俱城光將彭晃徐裔攻破之大豫奔廣武穆奔建康廣武人執大豫送之斬于姑臧市光至是始聞苻堅為姚萇所害乃建元曰太安自稱使持節侍中中外大都督督隴右河西諸軍事大將軍領䕶匈奴中郎將凉州牧酒泉公冊府元龜卷二百二十二
