body:
  text: 册府元龜卷二百五十六宋王欽若等撰儲宫部總序昔三王家天下以傳於子司馬遷作本紀載夏商之世系詳矣而姒氏多父子繼立商人率兄弟相及儲嫡之制無聞焉禮有文王世子之篇春秋傳載王世子㑹于首止而諸侯之嫡子亦稱世子蓋成周之制天王之子稱王世子諸侯之子稱世子又皆有太子之稱秦併六國兼皇帝而建號漢承秦法崇建儲貳以嫡嗣為皇太子諸侯王之嫡子稱世子焉歴世以還遵其位號蓋大易述主器之義實長於震宫書紀元良之重以正于萬國前星少海之象著乎穹厚撫軍監國之任備乎出處繼明承序于以顯守祧之貴廟趨郊見于以彰率禮之教授經齒學所以敦道義之則安車金璽所以異車服之等至於宫朝之設則承華􅀶望越藩邸之範官屬之次則保傅三少峻天秩之品其後加四率之衛益坊寺之職命爵之叙侔於上臺奉養之給亞於尊極良以其承萬代之業居羣后之上帝宸之貳體率土之繫心當副君之任為天下之本故其禮秩之尤重而安危之斯屬焉今之所紀者自文武而降包舉鼎國并叙南北以迄于前唐凡膺明兩之重司匕鬯之祀類其行事辨其淑慝若夫少陽毓德終正南面而有發誕彌之祥慶挺淵穆之儀表因心形于孝友作事彰乎令德智量越于羣品辭學昭乎世譽係乎一人之善者比不復徵其於建樹明嫡之始尊異師傅之禮出統兵旅居掌國政賔待賢雋諷諫違失及夫胄延之尚齒宫臣之講學公朝之崇奬優制之旌飾咸用論次以著于編凡儲宫部一十七門建立王者建立儲貳所以重宗廟社稷而安天下也自内禪已還或弟或子尊尊親親各以其道故周文三朝之事著于禮經漢明四重之德形于詩什書曰一人元良萬邦以貞易曰明兩作離大人以繼明照于四方此之謂也若乃東海辭讓劉氏隆於永平晉王矯飾楊宗覆于大業以愛則臨淄京兆幾遺魏嗣之賢以功則貞觀開元卒致唐祚之盛繇斯而言主匕鬯承大統者非徒人事盖亦有天意焉然自周以前不載建儲之事故以漢氏為首漢高祖初為漢王二年六月壬午立子盈為太子即惠帝也文帝元年正月有司請蚤建太子所以尊宗廟也詔曰朕既不德上帝神明未歆饗也天下人民未有㥦志㥦快也今縱不能博求天下賢聖有德之人而嬗天下焉而曰豫建太子是重吾不德也重謂増益也謂天下何猶言何以稱天下之望其安之安猶徐也言不宜汲汲耳有司曰豫建太子所以重宗廟社稷不忘天下也帝曰楚王季父也春秋高閲天下之義理多矣閲猶更歴也明於國家之體呉王於朕兄也淮南王弟也皆秉德以陪朕陪輔也豈為不豫哉諸侯王宗室昆弟有功臣多賢及有德義者若舉有德以陪朕之不能終是社稷之靈天下之福也今不選舉焉而曰必子必將傳位於子人其以朕為忘賢有德者而專於子非所以憂天下也朕甚不取有司固請曰古者殷周有國治安皆且千嵗治安言治理而且安寧也有天下者莫長焉言上古以來國祚長乆無及殷周者也用此道也所以能爾者以承嗣相傳故也立嗣必子所從來逺矣高帝始平天下建諸侯為帝者太祖諸侯王列侯始受國者亦皆為其國祖子孫繼嗣世世不絶天下之大義也故高帝設之以撫四海設置立也今釋宜建釋捨也宜建謂適嗣而更選於諸侯宗室非高帝之志也更議不宜不當更議子啓最長敦厚慈仁請建以為太子帝乃許之因賜天下民當為父後者爵一級景帝四年四月己巳立皇子榮為皇太子七年正月廢太子榮為臨江王二月丁丑立膠東王徹為皇太子即武帝也武帝元狩元年四月丁卯立皇子據為太子即戾太子也後元二年二月乙丑立皇子弗陵為皇太子昭帝也後單名弗太子年八嵗以侍中奉車都尉霍光為大司馬大將軍受遺詔輔少主初衛太子即太子據也其母衛氏為江充所敗而燕王旦廣陵王胥皆多過失是時帝年老寵姬鈎弋趙倢仔有男倢伃居鈎弋宫故稱之帝心欲以為嗣命大臣輔之察羣臣唯光任大重可屬社稷任堪也屬委也帝乃使黄門畫周公輔成王朝諸侯以賜光黄門之署職任親近以供天子百物在焉故亦有畫工及帝病篤光涕泣問曰如有不諱誰當嗣者帝曰君未諭前畫意邪立少子君行周公之事宣帝地節三年四月戊申立皇太子驁即成帝也成帝綏和元年二月癸丑詔曰朕承太祖鴻業奉宗廟二十五年德不能綏理宇内百姓怨望者衆不蒙天祐至今未有繼嗣天下無所係心觀于徃古近事之戒禍亂之萌皆繇斯焉始生曰萌定陶王欣於朕為子慈仁孝順可以承天序繼祭祀其立欣為皇太子即哀帝也初王祖母傅太后隨王來朝私賂遺帝所幸趙昭儀及帝舅驃騎將軍曲陽侯王根昭儀及根見帝亡子亦欲豫自結為長乆計皆更稱定陶王勸帝以為嗣帝於是召丞相翟方進御史大夫孔光右將軍廉褒後將軍朱博皆引入禁中議中山定陶王誰宜為嗣者方進根以為定陶王帝弟之子禮曰弟之子猶子也為其後者為之子也定陶王宜為嗣褒博皆如方進根議光獨以為禮立嗣以親中山王先帝之子帝親弟也以尚書盤庚殷之及王為比師古曰兄終弟及也比必寐反中山王宜為嗣帝以禮兄弟不相入廟又皇后昭儀欲立定陶王故遂立為太子為加元服而遣之時年十七矣明年使執金吾任宏守大鴻臚持節徵定陶王立為皇太子王謝曰臣幸得繼父守藩為諸侯王材質不足以假充太子之宫謙不敢言為太子故云假充若言非正陛下聖德寛仁敬承祖宗奉順神祗宜蒙福祐子孫千億之報詩曰干禄百福子孫千億言成王宜民宜人天之所保佑永得福祿故子孫衆多也臣願且得留國邸旦夕奉問起居俟有聖嗣歸國守藩書奏天子報聞後月餘立楚孝王孫景為定陶王奉恭王祀所以奬厲太子專為後之誼後漢光武建武二年六月戊戌立子疆為皇太子十九年六月戊申詔曰春秋之義立子以貴東海王陽皇后之子宜承大統皇太子疆崇執謙退願備藩國父子之情重乆違之其以疆為東海王立陽為皇太子改名莊即明帝也時樂人作歌詩四章日重光月重輪星重暉海重潤以贊太子之德明帝永平三年二月甲子立皇子炟為皇太子即章帝也章帝建初四年四月戊子立皇子慶為皇太子七年六月甲寅廢皇太子慶為清河王立皇子肇為皇太子即和帝也詔曰皇子肇保育皇后承順懷任𨗳達善性將成其器盖庶子慈母尚有終身之恩豈若嫡后事正義明哉今以肇為皇太子和帝元興元年十二月辛未立皇子隆為皇太子是夜即皇帝位時誕育百餘日即殤帝也安帝永寧元年四月丙寅立皇子保為皇太子即順帝也順帝建康元年四月辛巳立皇子炳為皇太子魏武帝既受漢封為魏王建安二十二年十月漢獻帝以五官中郎將曹丕為魏太子即文帝也初臨淄侯植既以才見異而丁議丁廙楊修等為之羽翼帝狐疑㡬為太子者數矣而植任性而徃不自彫勵飲食不節文帝御之以術宫人左右並為之説故定為嗣文帝黄初七年五月丙辰立平原王叡為皇太子即明帝也丁巳即皇帝位初太子為平原王時文帝以郭后無子詔使子養帝平原以母不道終意甚不平後不獲已乃敬事郭后旦夕因長遇問起居郭后亦自以無子遂加慈愛文帝始以平原不悦有意欲以他姬子京兆王禮為嗣故乆不拜太子平原常從文帝射殺鹿母使平原射鹿子平原不從曰陛下已射其母臣不忍復射其子因涕泣文帝即放弓箭以此深竒之而樹立之意定至是文帝病篤乃立為皇太子明帝景初三年正月丁亥立齊王芳為皇太子即廢帝也是日即皇帝位蜀先主初為漢中王立子禪為王太子及即尊號册為皇太子後主延熈元年正月以子璿為皇太子呉太帝初受魏封為呉王立子登為王太子黄龍元年帝即皇帝位以呉王太子登為皇太子赤烏四年五月太子登卒五年正月立子和為太子十三年八月廢太子和處故鄣十一月立子亮為太子亮字子明大帝少子也帝春秋高而亮最少故尤留意姊全公主嘗譛太子和子母心不自安因倚帝意欲豫自結數稱述全尚女勸為亮納妃和廢帝遂立亮為太子景帝休永安五年八月戊子立子􅓣為太子後主皓建衡元年正月立子瑾為太子晉文帝既受魏封為晉王咸熈元年十月魏陳留王以中撫軍新昌鄉侯司馬炎為晉世子二年五月命世子為太子即武帝也初文帝以景帝既宣帝之嫡早世無後以次子攸為嗣特加愛異自謂攝居相位百年之後大業宜歸攸每曰此景王之天下也吾何與焉將議立世子屬意於攸問孫秀曰大將軍開建未遂吾但承奉後事耳故立攸將功歸於兄何如秀以為不可又以問山濤濤對曰廢長立少為禮不祥國之安危當必繇之何曽固爭曰中撫軍聰明神武有超世之材髪委地手過膝此非人臣之相也太子位于是乃定羊琇涉學有智少與武帝同學甚相親狎每接延同席帝未立為太子而聲譽不及弟攸文帝素意重攸常有代宗之議琇密為武帝書策甚有條理又密觀文帝為政損益揆度應所顧問之事皆令武帝黙而識之其後文帝與武帝論當世之務及人間可否武帝答無不允繇是儲位遂定武帝泰始三年立皇子衷為皇太子即惠帝也詔曰朕以不德托于四海之上兢兢祇畏懼無以康濟㝢内思與天下式明王度正本清源於置嗣樹嫡非所先務又近世每建太子寛宥施惠之事間不獲已順從王公卿士之議耳方今世運􅂷平將陳之以德義示之以好惡使百姓蠲多幸之慮篤始終之行曲惠小仁故無取焉咸使知聞七年正月丙午皇太子冠惠帝永熈元年八月壬午立廣陵王遹為皇太子即愍懐太子也永平元年正月丙午皇太子冠遹字熈祖惠帝長子母曰謝才人幼而聰慧武帝愛之常在左右嘗與諸皇子戲於殿上惠帝來朝執諸皇子手次至太子帝曰是汝兒也惠帝乃止元康九年十二月廢為庶人永康元年四月立皇孫臨淮王臧為太孫詔曰咎徵數發奸囘作變遹既逼廢非命而殁今立臧為皇太孫還妃王氏以母之稱太孫太妃永寧元年正月趙王倫簒帝位廢太孫臧為濮陽王五月立襄陽王尚為皇太孫太安元年正月皇太子尚薨六月以清河王遐子覃為皇太子持齊王冏表曰東宫曠然冢嗣莫繼天下大業帝王神器必建儲副以固洪基今者後宫未有孕育不可庶幸將來而虚天緒非祖宗之遺志社稷之長計也禮兄弟之子為猶子故漢成無嗣繼繇定陶孝和之絶安以紹興此先王之令典徃代之成式也清河王覃神姿岐嶷慧智早成康王正妃周氏所生先帝衆孫之中於今為嫡昔薄姬賢明文則承位覃外祖恢世載明德覃宜奉宗廟之重統無窮之祚以寧四海顒顒之望覃兄弟雖並出紹可簡令淑還為國裔不替其嗣輒諮大將軍成都王頴及羣公卿士咸同大願請具禮儀擇日迎拜遂立覃為皇太子永興元年九月黜太子覃復為清河王三月河間王顒表請立成都王穎為太弟詔曰朕以涼德纂承洪緒于兹十有五年禍亂滔天姦逆仍起至乃幽廢重宫宗廟圯絶成都王穎温仁惠和尅平暴亂其以穎為皇太弟都督外中諸軍事丞相如故時穎既入京師復旋鎮于鄴封二十郡拜丞相河間王顒表穎宜儲副遂廢太子覃立穎為皇太弟丞相如故十二月詔曰天禍晉邦冡嗣莫繼成都王穎自在儲貳政績虧損四海失望不可承重其以王還第豫章王熾先帝愛子令聞日新四海注意今以為皇太弟即懐帝也以隆我晉邦時熾以清河王覃本太子也懼不敢當典書令盧陵修肅曰二相經營王室志寧社稷儲貳之重宜歸時望親賢之舉非大王而誰清河幼弱未允衆心是以既升東宫復贊藩國今乘輿播越二宫乆曠常恐氐羗飲馬於涇川螘衆控弦於霸水宜及吉辰時登儲副上翼大駕早寧東京下允黔首喁喁之望熾曰卿吾之宋昌也乃從之懷帝永嘉元年三月庚午立豫章王詮為皇太子六年帝蒙塵于平陽前雍州刺史賈疋與京兆太守梁綜共奉秦王鄴為皇太子於長安即愍帝也元帝建武元年三月辛卯即王位于建康丙辰立世子紹為晉王太子太興元年三月丙辰即皇帝位庚午立王太子紹為皇太子即明帝也初帝為晉王有司奏立太子帝以瑯琊王褒有成人之量過於紹從容謂司空王導曰立子以德不以年導曰世子宣城俱有昭儁之目固當以年於是太子位遂定明帝大寧三年三月戊辰立皇子衍為皇太子即成帝也康帝建元二年九月丙申立皇子聃為皇太子即穆帝也戊戌太子即皇帝位簡文帝咸安二年七月乙未立㑹稽王昌明為皇太子即孝武帝也諱曜字昌明孝武帝太原十二年八月立皇子德宗為太子即安帝也宋髙祖初封宋王以子義符為王太子永初元年六月即皇帝位為皇太子即文帝也文帝元嘉六年三月丁巳立皇子劭為皇太子臣欽若等曰即元凶也孝武帝孝建元年正月丙寅立皇子業為皇太子即前廢帝也未之東宫中庶子二率並入直永福省大明二年出居東宫七年加元服明帝泰始二年立皇子昱為皇太子即後廢帝也南齊太祖初封齊公時以子賾為齊國世子建元元年四月太祖即位六月立賾為皇太子即武帝也武帝以建元四年三月即位六月甲申立皇子長懋為皇太子即文惠太子也永明十二年正月皇太子長懋薨四月以長懋長子昭業為皇太孫即欝林王也詔東宫文武臣僚可悉改為皇太孫官屬東昏侯永元元年四月己巳立子誦為皇太子梁高祖天監元年既受齊禪有司奏立儲副帝以天下始定百度多闕未之許也羣臣固請十一月甲子立長子統為皇太子即昭明太子也時太子年幼依舊於内拜東宫官屬文武皆入直永福省五年五月皇太子始出居東宫十四年正月乙巳朔皇太子冠中大通三年四月乙巳昭明太子薨五月丙申以晉安王綱為皇太子即簡文帝也七月乙亥臨軒策拜以修繕東宫權居東府四年九月皇太子移還東宫簡文帝太清三年五月辛巳即皇帝位立太子器為皇太子即哀太子也元帝初封湘東王承聖元年十一月即位立王太子方矩為皇太子改名元良即愍懷太子也後梁宣帝登立子巋為皇太子即明帝也明帝即位立子琮為皇太子臣欽若等曰案後周蕭登傳無年月陳文帝永定三年六月即位九月立皇子伯宗為皇太子即廢帝也自梁室亂離東宫焚燼太子居于永福省天嘉六年正月甲午皇太子加元服廢帝光大元年七月戊申立皇子至澤為皇太子宣帝太建元年正月即位立皇子叔寳為皇太子即後主也二月辛未太子謁太廟後主太建十四年正月即位四月立皇子永康公裔為皇太子至德二年七月甲午太子加元服禎明二年六月皇太子廢為呉興王立始安王深為皇太子魏太武延和元年正月丙午立皇子晃為皇太子即景穆太子也文成太安二年二月丁巳立皇子𢎞為皇太子即獻帝也獻文皇興三年六月辛未立皇子宏為皇太子孝文帝也文帝太和十七年六月立皇子恂為皇太子及冠恂於廟帝臨光極東堂引恂入見誡以冠義曰夫冠禮表之百代所以正容體齊顔色順辭令容體正顔色齊辭令順故能正君臣親父子和長幼然母見必拜兄弟必敬責以成人之禮字汝元道所寄不輕汝當尋名求義以順吾㫖二十年十二月丙寅廢皇太子恂為庶人二十一年正月丙申立皇太子恪為皇太子即宣武帝也西魏文帝立子欽為皇太子即廢帝也東魏孝靜帝武定七年八月立皇子長仁為皇太子北齊文宣帝天保元年六月丁亥立子殷為皇太子即廢帝也孝昭帝初封常山王以子百年為世子皇建元年八月即帝位十二月辛亥立為皇太子即後主也武成帝河清元年正月丙戌以皇子緯為皇太子即後主也後主武平元年六月皇子常生九月立為皇太子後周太祖既受魏封為安定公恭帝三年以畧陽公覺為安定公世子即孝昭也初太祖嫡嗣未建明帝居長已而有成德孝閔處嫡年尚幼沖乃召羣公謂之曰孤欲立子以嫡恐大司馬有疑大司馬即獨孤信明帝敬后父也衆皆黙然未有言者左僕射李逺曰夫立子以嫡不以長禮經明義畧陽公為世子公何所疑若以信為嫌請即斬信便拔刀而起太祖亦起曰何事至此信又自陳説逺乃止於是羣公並從逺議出外拜謝信曰臨大事不得不爾信亦謝逺曰今日賴公決此大議高祖武帝建德元年四月魯國公立贇為皇太子即宣帝也帝親告廟冠於阼階宣帝大象元年正月戊午行幸洛陽立魯王衍為皇太子即静帝也隋髙祖初封隋王以子勇為王太子開皇元年即位立為皇太子二十年十月乙丑太子勇廢為庶人十一月戊子以晉王廣為太子即煬帝也是月當受册高祖曰吾以大興功成帝業令太子出舎大興縣煬帝大業元年正月丙申立晉王昭為皇太子即元德太子也昭煬帝長子也仁壽三年以晉王領雍州牧煬帝即位便幸洛陽宫昭留守京師遣使者立為皇太子册府元龜卷二百五十六
