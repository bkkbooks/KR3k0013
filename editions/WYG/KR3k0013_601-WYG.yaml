body:
  text: 册府元龜卷六百一宋王欽若等撰學校部辯博恩奬辯博易曰學以聚之問以辯之傳曰強學以待問盖夫六藝之富九流之廣有先聖之㣲㫖有羣儒之精義非窮理盡性覃思研幾不能臻其閾非原始要終聞一知十不能闡其流故有攝􅒥以升抵掌而論俾夫前訓洞開諸生景附誠儒門之標表士林之規矩也然則詞有枝葉垂誡禮經學無師法見􅅓先哲茍辯而不違於道博而無䧟於野則可以傳道駕説爲縫掖之所宗矣漢朱雲字游魯人也年四十從博士白子友受易又事將軍蕭望之受論語皆能傳其業是時少府五鹿充宗貴幸爲梁丘易自宣帝時善梁丘氏說元帝好之欲考其異同令充宗與易家論充宗乗貴辯口乗因也言因藉貴尊之權也諸儒莫能與抗皆稱疾不敢㑹有薦雲者召入攝齊登堂齊衣之下裳抗首而請音動左右抗舉也既論難連柱五鹿君柱刺也距也故諸儒為之語曰五鹿岳岳朱雲折其角岳岳長角之貌繇是爲博士後漢戴慿汝南平輿人光武時郡舉明經徴試博士徵拜郎中公卿大㑹羣臣就席慿獨立世祖問之對曰博士説經皆不如臣坐居臣上是以不得就席帝即召上殿令與諸儒難說慿多所觧釋帝善之遷侍中後正旦朝賀百寮畢㑹帝令羣臣能説經者更相難詰義有不通輙奪其席以益通者慿遂重坐五十餘席故經師爲之語曰觧經不窮戴侍中賈逵字伯通能誦左傳及五經本文以大小夏侯尚書教授自爲兒童常在太學不通人事諸儒爲之語曰問事不休賈長頭明帝時爲郎與班固並校秘書李育為博士章帝詔與諸儒論五經於虎觀育以公羊義難賈逵往返皆有理證最為通儒鄭𤣥字康成受業於馬融獻帝時大將軍袁紹摠兵冀州遣使要𤣥大㑹賓客𤣥最後至乃延升上坐𤣥身長八尺飲酒一斛秀睂明目容儀温偉紹客多豪俊見𤣥儒者未以通人許之競設異端百家互起𤣥依方辯對咸出問表皆得所未聞莫不嗟服紹舉𤣥茂才表爲左中郎將魏樂詳髙祖黄初徵拜博士十餘人學多褊又不熟悉惟詳五業並受其或難質不觧詳無慍色以杖畫地牽譬引類至忘寢食嚴幹特善春秋公羊司𨽻鍾繇不好公羊而好左氏謂左氏爲大官而謂公羊爲賣餅家故數與幹共辯長短繇爲人機㨗善持論而幹呐口臨時屈無以應繇謂幹曰公羊高竟爲左丘明服矣幹曰直故吏爲明使君服耳公羊未肯也晉賀循爲太常朝廷疑滯皆諮之於循循輙依經禮而對爲當世儒宗宋周續之字道祖高祖召之爲開舘東郭外招集生徒乘輿降幸并見諸生問續之禮記傲不可長與我九齡射於矍相圃三義辯析精奥稱爲該通顔延之爲太子舍人鴈門人周續之隠居廬山儒學著稱永初中徵詣京師開舘以居之高祖親幸朝彦畢至延之舘列猶卑引升上席帝使問續之三義續之雅仗辭辯延之每折以簡要既連挫續之帝又使還自敷釋言約理暢莫不稱善南齊陸澄爲度支尚書令國子博士尚書令王儉自以博聞多識讀書過澄澄曰僕年少來無事惟以讀書爲業且年以倍今君少便鞅掌王務雖復一覧便諳然見卷軸未必多僕儉集學士何憲等盛自商畧澄待儉語畢然後談所遺數百千條皆儉所未覩儉乃歎服儉在尚書省出巾箱几案雜服令學士𨽻事事多者與之人人各得一兩物澄後來更出諸人所不知事復各數件并奪物將去尋領國子祭酒竟陵王子良得器小口方腹而底平可容七八升以問澄澄曰此名服匿單于以與蘇武子良後詳視器底有字髣髴可識如澄所言梁周捨初仕齊爲太學博士遷後軍行參軍明帝建武中魏人呉包南歸有儒學尚書僕射江祐招包講捨造坐累折辭理遒逸由是爲口辯謝舉爲吏部尚書初北渡人盧廣有儒術爲國子博士於學發講僕射徐勉以下畢至坐舉造坐屢折廣辭理通邁廣深服仍以所執麈尾薦之以况重席焉劉杳為太學博士宣惠豫章王行參軍杳少好學博綜羣書沈約任昉以下每有遺忘皆訪問焉常於約坐語及宗廟犧樽約云鄭𤣥答張謂為畫鳳凰尾娑婆焉今無復此器則不依古杳曰此言未可必安古者樽彛皆刻木爲鳥獸鑿頂及背以出内頂魏世魯郡地中得齊大夫子尾送女器有犧樽作犧牛形皆永嘉賊曹嶷於青州發齊景公冡又得此二樽形亦爲牛象二處皆古之遺器知非虗也約大以爲然約又云何承天纂文竒博其書載張仲師及長頸王事此何出杳曰仲師長尺二寸惟出論衡長頸是毗騫王宋建安以南扶南記曰古來至今不死約即取二書尋簡一如杳言紀少瑜年十九歳逰太學備探六經博士東海鮑皦雅相欽悦時皦有疾請少瑜代講少瑜既妙𤣥言善談吐辯㨗如流陳戚衮爲太學博士梁簡文在東宫召衮講論又常置宴集𤣥儒之士先命道學互相質難次令中庶子徐摛馳騁大義閒以劇論摛辭縱横難以答抗諸人懾氣皆失次序衮時騁義摛與往復衮精采自若對答如流簡文深加歎賀蕭濟字孝康東海蘭陵人少好學博通經史論武帝左氏疑義三十餘條尚書僕射范陽張纉太常卿南陽劉之遴竝與濟討論纉等莫能抗對後魏封偉伯爲太學博士孝明時將脩明堂廣集學士議其制度九五之論乆而不定偉伯乃披簡經緯上明堂圗説六卷北齊邢邵字子才爲中書監國子祭酒博覧墳籍無不通曉晩年尤以五經章句爲意窮其指要吉凶儀禮公私諮禀質去疑惑爲世指南後周呂思禮性溫潤不雜交逰年十四受學於徐遵明長於論難諸生為之語曰講書論易其鋒難敵十九舉秀才對䇿髙第除相州功曹參軍樊深行下邽縣事太祖置學東舘教諸將子弟以深爲博士深經學通贍每觧書常多引漢魏以來諸家義而說之故後生聽其言者不能曉悟皆背而譏之曰樊生講書多門户不可解然儒者推其博物隋何妥初仕周爲太學博士周武帝初欲立五后以問儒者辛彦之對曰后與天子匹體齊尊不宜有五妥駁曰帝嚳四妃舜又二妃亦何常數楊汪爲國子祭酒帝令百僚就學與汪講論天下通儒碩學多萃焉論難鋒起皆不能屈馬光爲大學博士常因釋奠高祖親幸國子學王公以下畢集光升坐講禮啓發章問已而諸儒生以次論難者十餘人皆當時碩學光剖析疑滯雖辭非俊辯而理義𢎞贍論者莫測其淺深咸共推服帝嘉而勞焉房暉逺國子博士開皇中帝令國子生通一經者並悉薦舉將擢用之既䇿問訖博士不能時定臧否祭酒元善怪問之暉逺曰江南河北義利不同博士不能遍渉學生皆持其所短稱已所長博士各各自疑所以乆而不决也祭酒因令暉逺考定之暉逺覧筆便下初無疑滯或有不服者暉逺問其所傳義疏輙爲始末誦之然後出其所短自是無敢飾非者所試四五百人數日便决諸儒莫不推其通博皆自以爲不能測也髙祖常謂羣臣曰自古天子有女樂乎楊素以下莫知所出遂言無女樂暉逺進曰臣聞窈窕淑女鐘鼓樂之此即王者房中之樂著於雅頌不得言無髙祖大悦劉焯以儒學知名爲員外將軍與左僕射楊素吏部尚書牛𢎞國子祭酒蘇威國子祭酒元善博士蕭該何妥大學博士房暉逺崔崇徳晉王文學崔牘等於國子共論古今滯義前賢所不通者每昇座論難鋒起皆不能屈楊素等莫不服其精博王頗字景文爲著作佐郎尋令於國子講授㑹髙祖親臨釋奠國子祭酒元善講孝經頗與相論難詞義鋒起善往往見屈高祖大竒之超授國子博士禇輝字高明呉郡人煬帝徴天下儒術之士悉集内史省相次講論無能屈暉者唐陸徳明受學於周𢎞正梁國子祭酒徐孝克開講恃貴縱辯衆莫敢當徳明便與之抗對合朝賞歎隋煬帝嗣位以爲秘書學士大業中廣招明經之士四方至者甚衆遣徳明與魯逹孔褒俱㑹門下省共相駁難無出其右後爲太學博士髙祖親臨釋奠徐文逺講孝經沙門惠乗講般若經道士劉喜講老子徳明難此三人各因其宗指隨端立義衆皆爲之屈徐文逺博覧五經尤精春秋左氏傳後周時有大儒沈重講于太學文逺就質問數日便去人或問之答曰觀其所説悉是紙上語耳僕先已誦之至於奥賾之境此君翻似未見有以其言告重者重與論議十餘反甚歎服之隋開皇中累遷太學博士至唐爲國子博士高祖常幸國子學遣文逺講孝經諸儒論難鋒起文逺隨方辯折言如湧泉聽者忘倦焉孔頴逹初仕齊爲河内郡博士時煬帝徴天下儒生集於東都論講令禮部尚書楊𤣥感主其事頴逹與諸儒論難鋒起咸爲之屈後爲國子司業與諸儒議厯及明堂皆頴逹之説顔師古爲中書侍郎太宗以經籍去聖乆逺文字訛踳詔師古開正之及成又詔尚書左僕射房𤣥齡集諸儒討論得失諸儒傳習師説舛謬已乆皆竊議非之於是異端鋒起師古一一辯答取晉宋古本以相發明所立援據咸出其意表諸儒皆驚所未聞歎服而去也虞世南爲秘書監貞觀八年七月隴右山摧大蛇屢見山東河南淮海之地多大水太宗以問世南曰是何祥也修何術可以禳之對曰春秋時梁山摧晉侯召宗伯而問焉宗伯曰國主山川故山摧川竭君爲之不舉樂降服乗縵祝幣以禮焉梁晉所主也晉侯從之故得無害漢文帝元年四月齊楚地二十九山同日摧水大出令郡國無來獻施惠於天下逺近歡洽亦不爲災也漢靈帝時青蛇見御座晉惠帝時大蛇長三百歩見齊地經市入廟中按蛇宜在草莽而入市朝所以可爲怪今蛇見山澤盖深山大澤必有龍蛇亦不足怪也又山東足雨雖則其常然隂慘過乆恐有寃獄伏願科省係囚庶㡬或當天意且妖不勝徳惟修徳可以消變太宗然之遣使者分道賑恤餓人申理獄訟多所原免王元感爲四門博士表上所撰尚書糾謬十卷春秋振滯二十卷禮記繩愆三十卷并所注孝經史記藁草詔令𢎞文崇賢兩舘學士及成均博士詳其可否學士祝欽明郭山惲李憲等皆專守先儒章句深譏元感掎摭舊義元感隨方應荅竟不肯屈鳳閣舍人魏知古司封郎中徐堅左史劉知㡬右史張思敬雅好異聞每爲元感申理其義陳少逰幼聰辯初習莊列等道經崇𤣥舘學生衆推引講經時同列有私習經義者期昇坐日相問答及公㑹少逰攝齊登堂音韻清辨觀者属目所引文句悉問他義諸生不能對甚爲大學士陳希列所歎賞王起為翰林侍講學士文宗尢好儒術每御長生殿對起訪以疑事至於郊祀刑法之間起盡能質之以開悟焉鄭澣爲翰林侍講學士文宗以十九書語類親自發問澣應對無滯恩奬王者修國經立民紀將使風化歸厚徳禮惇洽未有不本於墳籍始於學校者焉良以開物成務垂教作程爲先哲之極軌致治之要道也乃有被儒服究聖言或研㡬一經或該通羣典逹前人之閫奥爲諸生之師法剖析疑論導宣奥㫖啓發後生成就學者以致膺問難於帝右參講授於儲邸入傅嚴掖專誨宗室謹官常以宿業形譔次而垂訓道義兼精望實増茂故當世之君隆其體貌異其名數或親臨於庠序或召見於清聞或旌以章綬或厚於賜予待遇殊特褒揚備至雖復淪逝益加追奬誠以化民成俗實本於儒術厲世摩鈍無越於常典豈獨寵異乎老成固將敦勸乎禮俗者矣漢梁丘賀受京房易宣帝時待詔黄門數入説教侍中爲諸侍中説經爲教授以召賀賀入説帝善之以賀爲郎後漢桓榮爲博士建武中光武幸太學㑹諸博士論難於前桓榮被服儒衣温恭有藴藉藴藉猶言寛博有餘也辯明經義每以禮讓相厭不以辭長勝人儒者莫之及厭服也特加賞賜又詔諸生雅吹擊磬盡日乃罷戴慿爲侍中正旦朝賀百寮畢㑹光武令羣臣能説經者更相難詰義有不通輙奪其席以益通者慿遂重坐五十餘席故京師為之語曰觧經不窮戴侍中在職十八年卒於官詔賜東園梓器錢二十萬髙詡世傳魯詩徴爲博士建武十一年拜大司農在朝以方正稱十三年卒官賜錢及冢田劉昆受施氏易於沛人戴賓建武二十二年入授皇太子及諸王小侯五十餘人二十七年拜騎都尉三十年以老乞骸骨詔賜雒陽第舍以千石祿終其身鍾興字次文汝南汝陽人也少從少府丁恭受嚴氏春秋恭薦興學行髙明光武召見問以經義對甚明帝善之拜郎中張酺字孟侯少從祖父充受尚書又事太常桓榮聚徒以百數明帝爲四姓小侯置五經師酺以尚書教授數講於御前以論難當意除爲郎賜車馬衣裳遂令入授皇太子魏應以建初四年拜五官中郎將經明行脩弟子自逺方至著錄數千人章帝甚重之數進見論難於前特受賞賜召馴習韓詩博通書傳爲左中郎將入授諸王章帝嘉其義學恩寵甚崇出拜陳留太守賜刀劒錢物賈逵爲郎章帝好古文尚書左氏傳詔逵入講北宫白虎觀南宮雲臺帝善逵説使逵㑹出左氏傳大義長於二傳者於是具條奏之帝嘉之賜布五百疋衣一襲逵母常有疾帝欲加賜以校書例多特以錢二十萬使頴陽侯馬房與之謂房曰賈逵母病此子無人事於外屢空則從孤竹之子於首陽山矣魯丕爲中散大夫和帝因朝㑹召見諸儒時與侍中賈逵尚書令黄香等相難數事帝善丕説罷朝特賜冠幘履襪衣一襲宋登少傳歐陽尚書順帝時爲尚書僕射帝以登明識禮樂使持節臨太學奏定典律拜侍中晉陳夀以儒學徵爲陳留内史累遷燕王師傅撰周禮評甚有條貫行於世武帝㤗始中詔曰燕王師陳夀清貞潔静行著邦族篤志好古博通六籍耽悦典誥老而不倦宜在左右以篤儒教可爲給事中杜夷爲國子祭酒辭疾未嘗朝謁元帝建武中令曰國子祭酒杜夷安貧樂道静志衡門日不暇給雖原憲無以加也其賜榖二百斛皇太子三至夷第執經問義夷雖逼時命亦未嘗朝謁國有大政常就夷諮訪焉明帝即位夷自表請退詔曰先王之道將墜於地君下帷研思今之劉楊縉紳之徒景仰軌訓豈得髙退而朕靡所取則大寜元年卒年六十六贈大鴻臚諡曰貞梁伏曼容字公儀初仕宋爲驃騎行叅軍明帝好周易集朝臣於清暑殿講詔曼容執經曼容素美風采帝以方嵇叔夜使呉人陸探微畫叔夜像以賜之朱异年二十一爲揚州議曹從事史五經博士明山賓表薦之武帝召見使說孝經周易義甚悦之謂左右曰朱异實異後見明山賓謂曰卿所舉殊得其人仍召异直西省顧越爲安西湘東王府參軍越徧該經藝深明毛詩旁通異義特善莊老武帝常於重雲殿自講老子僕射徐勉舉越論義越抗首而請音響若鐘容止可觀帝深贊美之由是擢爲中軍宣成王記室叅軍陳張譏梁大同中召補國子正言生梁武帝常於文徳殿釋乾坤文言譏與陳郡袁憲等預焉勑令論議諸儒莫敢先出譏乃整容而進諮審循環辭令溫雅梁武帝甚異之賜裙襦絹等仍云表卿稽古之力譏累遷士林館學士簡文在東宮出士林館發孝經題經譏論義往復甚見嗟賞自是每有講集必遣使召譏後魏李先明元帝即位為博士召先讀韓子連珠論二十二篇太公兵法十一事詔有司曰先所知者皆軍國大事自今常宿於内賜先絹五十疋緜五十斤雜綵五十疋御馬一疋拜安東將軍夀春侯賜𨽻戸二十二孫惠蔚爲皇宗博士侍講東宮遷國子祭酒秘書監仍知史事宣武延昌二年追賞侍講之勞封棗強縣開國男食邑二百户崔逸孝文時爲國子博士每有公事逸常被詔獨進博士特命自逸始王神貴爲符璽郎時太學博士房景光作五經疑問百餘篇神貴答之名辨疑前廢帝時奏上之帝親自執卷與神貴往復嘉其用心特除神貴子鴻彦爲奉朝請北齊張雕遍通五經尤明三傳髙祖召入覇府令與諸子講後爲瑯琊王博士未幾拜散騎常侍値武成侍講馬敬徳卒乃入授經書帝甚重之以爲侍讀與張景仁並被尊禮同入華光殿共讀春秋加國子祭酒假儀同三司待詔文林舘尋除侍中開府奏度支事大被委任言多見從特勑奏事不趨呼爲博士李鉉爲國子博士廢帝之在東宮文帝詔鉉以經入授甚見優禮數年病卒特賜廷尉少卿及還𦵏故郡太子致祭奠之禮并使王人將送儒者榮之張景仁以學書爲業工草𨽻後主在東宮時令侍書歴太子門大夫員外散騎常侍諫議大夫後主登祚除通直散騎常侍及奏御筆㸃出通字遂正常侍在左右與語猶稱博士後周熊安生爲國子博士時髙祖入鄴安生遽令掃門家人怪而問之安生曰周帝重道尊儒必將見我矣俄而高祖幸其第詔不聽拜親執其手引與同坐謂之曰朕未能去兵以此爲愧安生曰黄帝尚阪泉之戰况陛下恭行天討乎髙祖又曰齊民賦役繁興竭民財力朕救焚拯溺思革其弊欲以府庫及三臺雜物散之百姓公以爲何如安生曰昔武王克商散鹿臺之財發鉅橋之粟陛下此詔異代同美高祖又曰朕何如武王安生曰武王伐紂懸首白旗陛下平齊兵不血刃愚謂聖畧爲優髙祖大悦賜帛三百疋米三百石宅一區并賜象笏及九鐶金帶自餘什物稱是隋楊尚希年十一入太學專精不倦周太祖常親臨釋奠尚希時年十八令講孝經詞㫖可觀太祖竒之賜姓普六茹氏擢爲國子博士房暉世傳儒學爲國子博士仁壽中卒官時年七十二朝廷嗟惜焉賻賜甚厚贈散騎常侍楊汪爲國子祭酒煬帝令百寮就學與汪講論皆不能屈帝令御史書其問答奏之省而大悦賜良馬一匹元善爲國子祭酒高祖常親臨釋奠命講孝經於是敷陳義理兼之以諷諫帝大悦曰聞江陽之説元善爵爲江陽縣公更起朕心賚絹百疋衣一襲唐魏徴爲秘書監撰羣書政要貞觀五年奏上太宗覧之稱善勑皇子諸王各𫝊一本賜徵帛二百疋孔頴逹爲國子祭酒太宗幸國學親釋奠命頴逹講孝經既畢頴逹上釋奠頌手詔答曰省所上頌殊爲佳作循題發函情辭爛其盈目啓封申紙逸氣飄以凌雲驪龍九重不足方斯綺麗威鳳五彩無以比其鮮華揚雄掞天髙蹤何逺黄香日下茂軌猶存尋讀周環彌覺欣翫卿夙挺珪璋早標令譽網羅百氏包括六經思涌珠泉情抽蕙圃關西孔子更起乎方今濟南伏生重興乎兹日庶令引四科於縑帙闡百遍於青襟翰苑詞林卿其首之也貞觀十五年十月左僕射申國公高士亷等撰文思博要一千二百卷上之太宗有詔藏之秘府士亷以下加級頒賜各有差陸徳明爲國子博士撰經典釋文太宗悦而甚重之時徳明已卒賜其家布帛二百叚顔師古爲中書侍郎受詔刋正經籍太宗善之賜帛五十疋顔揚庭爲符璽郎永徽三年上其父故秘書監師古所撰匡謬正俗八卷髙宗令付秘閣仍賜帛五十疋長孫無忌為太尉顯慶三年脩新禮成詔中外頒行焉無忌等加爵賜帛等各有差張大安爲太子左庶子初皇太子賢招集當時學者大安及洗馬劉訥言雒州司戸參軍格希𤣥等注范曄後漢書表上之賜物三萬段仍以其書付秘閣王元感濮州鄄城人則天長安三年上表進其所撰尚書糾謬十卷春秋振滯二十卷禮記繩愆三十卷并所注孝經史記藁草請官給紙筆冩上秘閣詔曰王元感質性溫敏博聞強記手不釋卷老而彌篤掎前逹之失究先聖之㫖是謂儒宗不可多得可授太子司議郎褚無量爲國子員外司業兼修文館學士𤣥宗在春宮授國子司業兼皇太子侍讀睿宗太極元年皇太子幸國學觀釋奠令無量講孝經禮記各隨端立禮博而且辨觀者歎服焉既畢進授銀青光祿大夫兼賜以章服并綵絹百段至𤣥宗開元三年遷右散騎常侍兼國子祭酒無量之母死贈物一百段以無量文儒之宗寵之也申命杭州刺史薛瑩就其家弔焉服闋召拜左散騎常侍復爲侍讀以其年老每隨使出入特許緩歩又爲造腰輦令内給事舁於内殿無量頻上書陳時政得失多見納用又甞手勑褒美賜物二百叚七年詔太子就國子監行齒胄之禮無量登座説經百寮並集行禮訖賞賜甚厚及卒贈禮部尚書賜物四百段米粟四百石徐堅爲集賢院學士開元中勑堅等纂經史要事及歴代文章以類相從欲令皇子簡事綴文𤣥宗自定名爲初學記撰成以獻帝稱善賜堅等絹百疋穆元休以文學著稱常撰洪範外傳十篇開元中獻之𤣥宗賜帛授偃師丞沈浩隠居四明山肅宗乾元二年進廣孝經十卷授秘書郎集賢殿待詔仍賜綠袍牙笏袁頥爲國子博士貞元十二年卒徳宗謂宰臣曰袁頥深於六經今之碩儒良可惜也特贈國子司業令中使賫告身及絹五十疋就宅宣賜并給傳令逹故里韋公肅爲秘書著作郎注太宗帝範一十二篇上獻徳宗有詔付集賢仍令别冩一本進内賜公肅錦綵一百疋李渤為左拾遺罷官閑居東雒撰禦戎新錄二十卷以獻憲宗元和九年四月壬午詔曰前左拾遺内供奉李渤隠居求志殫見洽聞常致弓旌之招尚懐林壑之戀而聞肄其素業成此新書詞章典雅謀議深逺獻于闕下良所嘉焉故洽今恩用清舊議可授秘書省著作郎韋處厚路隨並為翰林侍講學士穆宗長慶三年撰六經法言二十卷表獻之帝覧其書稱善者久之賜處厚隨錦綵二百疋銀器二事隨自司勲郎中為諫議大夫依前充侍講學士處厚賜紫金魚袋錫服遷官皆以撰六經法言奬之鄭澣為翰林侍講學士文宗命撰經史要錄十二卷書成帝嘉其精博因以十九書語類帝親自發問澣應對無滯賜以金紫嚴厚本為國子監周易博士太和八年七月召本對於浴堂門賜其錦器李宗閔為集賢大學太和九年五月進五常傳賜宗閔等九人錦綵銀器有差周田敏為國子祭酒廣順三年獻印版九經書五經文字太祖優詔嘉之賜襲衣繒綵銀器又賜司業趙銖襲衣繒綵册府元龜卷六百一
