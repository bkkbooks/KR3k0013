body:
  text: 册府元龜卷四百四十六宋王欽若等撰將帥部觀望生事觀望夫臣之事上貳乃有辟矧乎冠萬夫而為長屬四郊之多壘不念同體之義罔思利國之訓乃或自蓄疑貳窺伺間隙沉機不斷逆節是萌天非可欺罪將焉徃此蓋自王道弗競霸圖是興其有奮自匹夫遽操兵柄昧靈命之攸屬懐野心而弗靖失其去就之分處於疑豫之際亦有時鍾内難事起蕭墻力遏外虞兵宿原野或坐觀於成敗或詭取於進退至若始存忠順爰兹委用終以嫌間飜然失圗遽招叛盜之名宜乎春秋所貶者已漢英布初與項籍入咸陽為前鋒項籍封諸將立布為九江王都六齊王田榮叛楚項王徃撃齊徴兵九江布稱病不徃遣將數千人行漢之敗楚彭城布又稱病不佐楚項王由此怨布數使人譙譲召布譙讓責之也音在笑切布愈恐不敢徃項王方北憂齊趙西患漢所與者獨布又多其材欲親用之以故未撃任安為監北軍使者戾太子反召安發北軍兵安受節已閉軍門不肯應太子太子敗安坐受太子節懐二心腰斬後漢隗囂為西州大將軍初囂與來歙馬援相善建武初光武數使歙援奉使徃來勸令入朝許以重爵囂不欲東連遣使深持謙辭言無功徳須四方平定退伏閭里劉表為荆州刺史時江南宗賊大盛表使南郡人蒯越誘賊帥皆斬之而襲取其衆諸守令聞表威名多解印綬去表遂理兵㐮陽以觀時變及李傕郭汜入長安欲連表為援乃以表為鎮南將軍荆州牧封成武侯假節時天子都許表雖遣使貢獻然北與袁紹相結治中鄧義諫表表不聽晉劉𢎞永嘉末為荆州刺史時天下雖亂荆州安全𢎞與劉景升保有江漢之志不傅司馬越越甚衘之㑹𢎞病卒郄隆為東郡太守隆少為趙王倫所善及倫專權召為散騎常侍倫之簒也以為揚州刺史尋加寧東將軍未拜而齊王冏檄至中州人在軍者皆欲赴義隆以兄子鍳為趙王掾諸子悉在京洛故猶豫未決主簿趙誘前秀才虞潭白隆曰當今上計明使君自将精兵徑赴齊王中計明使君可留督攝速遣猛將率精兵疾赴下計示遣兵將助而稱背倫隆素敬别駕顧彦宻與謀之彦曰趙誘下計乃上策也西曹留承聞彦言請見曰不審明使君當今何施隆曰我俱受二帝恩無所偏助惟欲守州而已承曰天下者世祖皇帝之天下也太上承代已積十年今上取四海不平齊王應天順時成敗之事可見使君若顧二帝自可不行宜急下檄文速遣精兵猛將若其疑惑此州豈可得保也隆無所言而停檄六日時寧逺將軍陳留王䆳領東海都尉鎮石頭隆軍人西赴䆳甚衆隆遣從事於牛渚禁之不得止將士憤怒因夜扶䆳為主而攻之隆父子皆死顧彦亦被害甘卓為安南將軍鎮襄陽王敦稱兵遣使告卓卓乃偽許而心不同之及敦攻譙王承於湘州卓勸承固守當出兵沔口御敦歸路遂乞師於卓卓軍次豬口聞王師敗績停師不進麴允為雍州刺史安定太守焦嵩率衆據雍州劉曜之逼京都允吿難於嵩嵩素侮允曰須允困當救之及京都敗嵩亦尋為冦所滅蘇峻元帝時為鷹揚將軍㑹周堅反於彭城峻助討之有功除淮陵内史遷蘭陵相王敦作逆詔峻討敦卜之不吉遲廻不進及王師敗績峻退保盱胎淮陵故吏徐深艾毅重請峻為内史詔聽之加奮威將軍宋吳喜為假冠軍將軍督豫州諸軍事太宗即位四方叛亂喜東征白太宗得尋陽王子房及諸賊帥即於東梟斬東土既平喜見南賊方熾慮後翻覆受禍乃生送子房還都凡諸大主帥顧琛王曇生之徒皆被全活帝以喜新立大功不問也而内宻衘之陳侯瑱為侍中江州刺史鎮豫章瑱據中流兵甲强盛又以本事王僧辯雖外示臣節未有入朝意周廸為臨川内史時周文育之討蕭勃也廸按甲保境以觀成敗文育使長史陸遷才説廸廸乃大出糧餉以資文育勃平以功加振逺將軍遷江州刺史熊曇朗之反也廸與周敦黄法􅉤等率兵攻圍曇朗屠之盡有其衆王琳敗後世祖徴廸出鎮湓城又徵其子入朝廸趦趄顧望並不至魯悉達梁末以侯景之亂糾率鄉人保新蔡及晉熈等五郡及王琳據上流琳授悉達鎮北將軍髙祖亦遣趙知禮授征西將軍江州刺史各送皷吹女樂悉逹兩受之遷延顧望皆不就髙祖遣安西將軍沈泰潛師襲之不能克齊遣行臺慕容紹宗以衆三萬來攻鬱口諸鎮兵甲甚盛悉達與戰敗齊軍紹宗僅以身免王琳欲圖東下以悉達制其中流恐為己患頻使招誘悉達終不從琳不得下乃連結于齊共為表裏齊遣清河王髙岳出助之相持歲餘㑹裨將梅天養等懼罪乃引齊軍入城悉達勒麾下數千人濟江而歸髙祖髙祖見之甚喜曰來何遲也悉逹對曰臣鎮撫上流願為藩屏陛下授臣以官恩至厚矣沈泰襲臣威亦深矣然臣所以自歸於陛下者以陛下豁達大度同符漢祖故也髙祖歎曰卿言得之矣授平南將軍散騎常侍北江州刺史封彭澤縣侯後魏源子恭為平南將軍元顥之入雒也加子恭車騎將軍子恭不敢拒之而頻遣間使參莊帝動静未㡬顥敗車駕還雒進征南將軍兼右僕射假車騎將軍後周李遷哲初仕梁都督東梁洵興等七州諸軍事東梁州刺史及侯景簒逆諸王争帝遷哲外禦邉冦自守而已隋虞慶則開皇二年冬突厥入冦慶則為元帥討之部分失所士卒多寒凍墮指者千餘人偏將達奚長儒率騎兵二千人别道要賊為虜所圍甚急慶則按營不救由是長儒孤軍獨戰死者十八九帝不之責也唐李光弼為河南副元帥鎮臨淮吐蕃入冦京畿代宗詔徴天下兵光弼與中使程元振不叶遷延不至韓滉為鎮海軍節度自關中多難滉即懐窺望於所部閉闗梁築石頭五城自京口拒玉山禁馬牛出境造樓船戰艦三千餘艘以舟師五千人繇海門揚威武至申浦而還毁撤上元縣佛寺道觀四十餘所修塢壁起建業抵京峴樓雉相属以佛殿材於石頭城繕置舘第數十聲言將奉迎鑾駕實申儆自守也城中穿深井十丈近百所下與江平俾偏將丘涔董作涔酷虐士卒日役數千人朝令夕辦去城數十里内先賢丘墓多被侵毁又追李長榮等戍鄆還以其所親吏盧復為宣州刺史採石軍使増置營壘教習長兵以佛寺銅鐘鑄弩牙兵器陳少㳺時鎮揚州以兵甲三千人臨江大閲與滉境㑹滉亦以三千兵臨金山與少㳺相應樓船於江中以金銀繒綵手相聘賚韓𢎞為宣武軍節度使𢎞既久鎮大梁威讋封部謂朝廷畏已爵秩屢加凡更三朝未嘗意入覲徐泗齊蔡前後有阻兵者𢎞每資冦觀望屢貽國憂及聞憲宗英武神斷累殄劇賊𢎞意寖懼十三年詔誅李師道𢎞遂不敢翫冦以兵圍曹州來年春師道梟首七月𢎞朝京師又云𢎞貞元十五年繇汴州大將試大理評事為節度使至元和十四年凡二十一年久未聞有修覲之意及既戮元濟師道方懼而來烏重𦙍為横海軍節度使及屯軍深州以賊憑陵未可輕進觀望累月穆宗急於誅討遂以杜叔良代之以重𦙍檢校司徒兼興元尹充山南西道節度使梁朱友謙梁祖建號為河中節度檢校太尉累拜中書令封冀王及未友珪弑逆友謙意不懌雖勉奉偽命中懐怏怏友珪徵之友謙辭以北面侵軼謂賔友曰珪是先帝假子敢行大逆餘位列繼誠恩喻父子論功較徳何譲伊人詎以生平附託之恩屈身於逆豎之手遂不奉命其年八月友珪遣大將牛存節康懐英韓勍攻之友謙乞師於莊宗莊宗親總軍赴援與汴軍遇於平陽大破之因與友謙㑹於猗氏友謙盛陳感慨願敦盟約末帝嗣位以恩禮結其心友謙亦遜辭稱藩行其正朔天祐十七年友謙襲取同州以其子令徳為帥請節銊於梁不獲友謙即請之於莊宗莊宗令慕容王正言以節旄賜之後唐張萬進為滄州都督萬進殺留後留繼威自為滄州納欵於朱梁亦遣使乞降於莊宗莊宗馳書慰勞繼威守光之宗也或謂萬進曰河東已許守光自新萬進懼繇是堅附於朱梁康義誠為侍衛親軍都指揮使河陽節度使長興末加同平章事秦王為天下兵馬元帥氣焰薫灼大臣皆懼求為外任義誠以明宗委遇無以解退乃令其子以弓馬事秦王冀自保全明宗不豫秦王諷義誠為助義誠曲意承奉亦非其誠及朱𢎞昭馮贇等懼禍謀於義誠義誠但云僕為將校不敢預議但相公所使耳及秦王既誅閔帝即位加檢校太尉兼侍中判六軍諸衛事趙徳鈞為幽州節度清泰末太原兵亂乃以徳鈞為諸道行營都統其子延壽為河東道南面行營招討使以劉延朗副之又以范延光為河東道南面行營招討使以李周副之帝以吕琦嘗佐幽州幕乃命賫都統官誥以賜徳鈞兼犒軍士琦至從容宣帝委任之意徳鈞曰既以兵相委焉敢惜死徳鈞志在併范延光軍奏請與延光㑹合帝以詔諭延光不從大軍既至圍栢谷前鋒殺蕃軍五百騎范延光軍又至榆次蕃軍退入河東界時徳鈞累奏乞與延壽鎮州節度帝怒曰徳鈞父子堅要鎮州茍能逐退蕃戎要代子位亦甘心矣若翫冦要君但恐犬兎俱斃徳鈞聞之不恱李彜殷鎮夏州傲視中原凡賊臣不逞必隂相締結冀其輸貨應接李守貞出兵境上以酬其貺朝廷知其心羈維之漢田再榮仕晉為䕶聖左廂都指揮使開運末契丹犯闕明年契丹北去再榮從行帳至真定其年閏七月晦李筠何福進相率殺虜帥麻答據甲仗庫勢未退筠等使人召再榮再榮端坐本營遲疑久之為軍吏所迫乃行翊日逐出麻答諸軍以再榮名次在諸校之右乃請權知留後事生事甲胄興戎商書之為戒虎兕出柙孔聖之攸譏豈得兵火自焚鼷弩輕發是故狼貪著於軍令兒戲存乎帝語漢氏而下將非一途或任總邉寄身當臨敵或扞守與國討伐叛黨而有肆志以逞矢謀不臧茍貪天功罔恤時難繇是專任己力搆發釁端啟内侮之階棄在和之訓靡思康靖姑務煩尅失親善之為寳忘懐安之逺慮横法以䋲下苟求以致怨敗乃大事職此之由辱國受誅悔將奚及者矣漢王恢為大行隂使馬邑豪聶壹為間間音居莧切亡入匈奴謂單于曰吾能斬馬邑令丞以城降財物可盡得單于愛信之以為然可許之聶壹乃詐斬死罪囚縣其頭馬邑城下縣讀曰懸視單于使者為信視讀曰示曰馬邑長吏已死可急來於是單于穿塞將十萬騎入武州塞在應門當是時漢伏兵車騎材官三十餘萬匿馬邑旁谷中衛尉李廣為驍騎將軍太僕公孫賀為輕車將軍大行王恢為將屯將軍大中大夫李息為材官將軍御史大夫韓安國為䕶軍將軍諸將皆屬約單于入馬邑總兵王恢李息别從代主撃輜重輜衣車也重謂載重物車也故行者之資摠曰輜重音直用切於是單于入塞未至馬邑百餘里覺之還去恢等罷兵於是下恢廷尉廷尉論恢逗撓當斬恢行千金丞相蚡蚡不敢言上而言于太后曰王恢首為馬邑事今不成而誅恢是為匈奴報仇也武帝朝太后太后以蚡言告帝帝曰首馬邑事者恢故發天下兵數十萬從其言為此且縱單于不可得恢所部撃猶頗可得尉士大夫心或當得其輜重人衆也古慰字止如此今不誅恢無以謝天下於是恢聞乃自殺後漢朱徽行度遼將軍和帝永元中南單于與中郎將杜崇不相平廼上書告崇崇諷西河太守令斷單于章無繇自聞而崇因與徽上言南單于安國疎逺故胡親近新降欲殺左賢王師子及左臺且渠劉利等又右部降者謀共廹脅安國起兵背畔請西河上郡安定為之儆備帝下公卿議皆以為蠻夷反覆雖難測知然大兵聚㑹未必敢動揺今宜遣有方畧使者之單于庭與崇徽及西河太守併力觀其動静如無它變可令崇等就安國㑹其左右大臣責其部衆横暴為邉害者共平罪誅若不從命令為權時方畧事畢之後裁行客賜言以主客之禮裁量賜物不多與也亦足以威示百蠻帝從之於是徽崇遂發兵造其庭安國夜聞漢軍至大驚棄帳而去因舉兵及將新降者欲誅師子師子先知乃悉將廬落入曼栢城安國追到城下門閉不得入徽遣使曉譬和之安國不聽城既不下乃引兵屯五原崇徽因發諸郡騎追赴之急衆皆大恐安國舅骨都侯喜為等慮并被誅乃格殺安國安國立一年單于適之子師子立亭獨尸逐侯鞮單于師子永元六年立降胡五六百人夜襲師子安集掾王恬將衛䕶士與戰破之於是新降胡遂相驚動十五部二十餘萬人皆反畔脅立前單于屯屠何子薁鞮日逐王逄侯為單于遂殺畧吏人燔燒郵亭廬帳將車重向朔方欲渡漠北於是遣行車騎將軍鄧鴻越騎校尉馮柱與徽將左右羽林北軍五校士及郡國積射緣邉兵烏桓校尉任尚將烏桓鮮卑合四萬人討之時南單于及崇屯牧師城逢侯將萬餘騎攻圍之未下冬鄧鴻等至美稷逢侯乃乘氷度隘向滿夷谷南單于遣子將萬騎及崇所領四千騎與鄧鴻等追撃逢侯於大城塞斬首三千餘級得生口及降者萬餘人馮柱復分兵追擊其别部斬首四千餘級任尚率鮮卑大都䕶蘇㧞廆烏桓大人勿柯八千騎要擊逢侯於滿夷谷復大破之前後凡斬萬七千餘級逢侯遂率衆出塞漢兵不能追七年正月軍還馮柱將虎牙營留屯五原罷遣鮮卑烏桓諸羌胡兵而封蘇㧞廆為率衆王又賜金帛鄧鴻還京師坐逗遛失利下獄死後帝知徽崇失胡和又禁其上書以致反畔皆徴下獄死耿䕫代鄧遵為度遼將軍時鮮卑㓂邉䕫與温禺犢王呼尤徴將新降者連年出塞討擊鮮卑還復各令屯列衝要還使新降者屯列衝要而䕫徵發煩劇新降者皆恚恨謀畔王敬為燉煌長史桓帝時長史趙評在于寘病癰死評子迎䘮道經拘彌王成國與于寘王建素有隙乃語評子云于寘王令胡醫持毒藥著創中故致死耳評子信之還入塞以告燉煌太守馬達明年以敬代為長史達令敬隠覈其事敬先過拘彌成國復説云于寘國人欲以我為王今可因此罪誅建于寘必服矣敬貪立功名且受成國之説前到于寘設供具請建而隂圗之或以敬謀告建建不信曰我無罪王長史何為欲殺我旦日建從官屬數十人詣敬坐定建起行酒敬叱左右執之吏士並無殺建意官屬悉得突走時成國主簿秦牧隨敬在㑹持刀出曰大事已定何為復疑即前斬建于寘侯將輸􅈎等遂㑹兵攻敬敬持建頭上樓宣告曰天子使我誅建耳于寘侯將遂焚營舍燒殺吏士上樓斬敬懸首於市輸􅈎欲自立為王國人殺之而立建子安國焉馬逹聞之欲將諸郡兵出塞撃于寘桓帝不聽徴逹還而以宋亮代為燉煌太守亮到開募于寘令自斬輸􅈎時輸􅈎死已經月乃斷死人頭送燉煌而不言其狀亮後知其詐而竟不能出兵于寘恃此遂驕魏陳泰字𤣥伯為雍州刺史時司馬景王秉政泰求敇并州并力討胡景王從之未集而鴈門新興二郡以為將逺役遂驚反景王又謝朝士曰此我過也非𤣥伯之責宋張邵為征虜將軍領南蠻校尉都督南雍州刺史文帝元嘉中丹浙二州蠻屬為寇邵誘其帥因出大㑹誅之悉掩其徒黨既失信羣蠻所在並起水陸斷絶邵子敷至襄陽定省當還都羣蠻伺欲取之㑹蠕蠕國遣使朝貢賊以為敷遂執之邵坐降號揚烈將軍申坦為寧朔將軍徐州刺史孝武大明元年魏攻兖州帝遣太子左衛率薛安都新除東陽太守沈法系北捍至兖州魏軍已去坦建議云任臻亡命屢犯邉民軍出無功宜因此翦撲帝從之亡命先已聞知舉村迯走安都與法系坐白衣領職坦棄市羣臣為之請莫能得將行刑始興公沈慶之入市抱坦慟哭曰卿無罪為朝廷所枉誅我入市亦當不久市官以白帝乃原其命繋尚方尋被宥後為驍騎將軍後魏奚牧為并州刺史道武時并州與後秦姚興接界興頗㓂邉牧乃與興書稱頓首均禮抗之責興侵邉不直之意興與國和通恨之有言於道武道武戮之盧昶為鎮東徐州刺史宣武時梁瑯琊郡民王萬夀等殺朐山戍主劉術昶遣郯城戍副張天惠赴之即據其城既克梁朐山戍帝遣虎賁四千人赴之昶既儒生本少將畧又羊祉子爕為昶司馬專征戍事掩昶耳目將士怨之朐山戍主𫝊文驥糧樵俱罄以城降梁昶見城降於是先走退諸軍相尋奔遁遇大寒雪軍人凍死及落手足者三分而二自國家經畧江左惟有中山王英敗於鍾離昶於朐山失利最為甚焉唐孫佺為幽州都督睿宗延和元年將兵二萬八千以襲奚師至冷陘並沒焉佺為虜所擒送於黙啜副使將軍周以悌死之將軍李楷落烏可利張貞楷落挺身以出初佺之將行也烏可利諌曰暑熱道險懸師逺襲舉非其時徃而必敗佺曰薛訥言在邉積有年矣然竟不能復營州使東北無事今與公同心戮力掩其不備可以有功道險暑熱安能避乎於是遂行命李楷落將騎兵四千為前軍遇賊八千騎與戰楷落敗佺素怯懦見賊至驚懼率衆欲還又為虜所敗廼投惡山為營列方陣而待之虜謂佺曰既以和親何得輕來襲我佺曰吾來和親爾虜曰若和親國信物安在佺悉軍資以與之虜得而更戰軍遂大敗至夜衆餘七千佺謂衆曰帥兵南還於是兵皆散走佺為虜所得佺敗處去塞千餘里王君􅎢為右羽林軍大將軍判凉州都督𤣥宗開元十五年與回紇戰死初凉州界有回紇契苾思結渾四部落代為酋長君􅎢㣲時徃來凉府為回紇等所輕及君􅎢為河西節度使回紇等怏怏恥在其麾下君􅎢以法繩之回紇等積怨宻使人詣東都自陳枉狀君􅎢發驛奏回紇部落難制潛有叛謀帝使中使徃按問之回紇等竟不得理由是澣海大都督回紇承宗長流瀼州渾大得長流吉州賀蘭都督契苾承明長流藤州盧山都督思結歸國長流瓊州右散騎常侍李令問特進契苾嵩以與回紇等婚姻貶令問為撫州别駕嵩為連州别駕於是承宗之黨澣海州司馬䕶輸糾合黨與謀殺君􅎢以復其怨㑹吐蕃使間道徃突厥君􅎢率精騎徃肅州掩之還至甘州南鞏􅖧驛護輸伏兵突起奪君􅎢旌節先殺其左右宗貞剖其心云是其始謀也君􅎢從數十人與賊力戰自朝至晡左右盡死遂殺君􅎢䭾其屍以奔吐蕃追及之䕶輸遂棄君􅎢尸而走𤣥宗甚痛惜之鮮于仲通為劍南節度使𤣥宗天寳七載南詔閤羅鳳襲雲南仲通􅄶急寡謀及雲南太守張䖍陁矯詐遇之不以禮舊事南詔嘗與其妻女謁見都督䖍陁皆私之又有所徵求閤羅鳳皆不應䖍陁遣人罵辱之仍宻奏其罪惡閤羅鳳忿怨因發兵反攻圍䖍陁殺之時天寳九載也明年仲通率兵出戍嶲州閤羅鳳遣使謝罪仍與雲中録事參軍姜如芝俱來請還其所虜掠且言吐蕃大兵壓境若不許當歸命吐蕃雲南之地非唐有也仲通不許囚其使進軍逼大和城為南詔所敗天寳十三載閤羅鳳既臣吐蕃劍南節度使楊國忠執國政仍奏徴天下兵俾留後侍御史李宓將十餘萬軰餉者在外渉毒瘴死者相屬於路天下始騷然苦之宓復敗於大和城北死者十八九㑹安禄山反閤羅鳳乘釁攻陷嶲州韓滉為潤州節度貞元二年滉朝京師時兩河罷兵中土寧乂滉上言吐蕃盜有河湟為日已久大厯以前中國多難所以肆其侵軼臣聞其近歲以來兵衆寖弱西廹大食之强北病回紇之衆東有南詔之防計其分鎮之外戰兵在河隴者五六萬而已國家若令三數良將長驅十萬衆於凉鄯洮渭並修堅城各置三萬人足當守禦之要臣請以當道所貯蓄財賦為饋運之資以充三年之費然後營田積粟且耕且戰河隴二十餘州復之可翹足而待也徳宗甚納其言滉之來也至汴州厚結劉𤣥佐將薦其可任邉事𤣥佐納其賂因許之及其來覲帝訪問焉初頗領命及滉以病歸第𤣥佐意怠遂辭邉任盛陳犬戎未衰不可輕進未㡬滉薨竟寢其事人亦幸焉田縉為夏州節度使以貪猥侵擾党項苦之屢引西戎犯塞元和末大兵入寇邉將郝玭數襲撃蕃壘殺戮甚衆邠州李光顔復以全師至戎人懼而退蓋田縉始生國患而頼光顔郝玭之驅戮也後唐李仁矩為閬州節度使長興元年十月供奉官張仁暉自利州廻奏董璋自率兇黨攻陷閬州仁矩舉家擒戮仁矩始為客將預逄興運録趍走之勞擢居蕃任才踈謀淺卒以此敗初朝廷昇閬州為節度制以仁矩代孫岳物議不可及仁矩至鎮偵璋所為曲形奏報地里遐邇朝廷莫知事實激成璋反狀繇仁矩也晉安重榮為鎮州節度使天福六年五月執契丹使拽刺以輕騎掠幽州南境之民處於博野乃貢表及馳書天下述契丹受天子父事之禮貪傲無厭困中國之民供億不逮已繕治甲兵將與決戰髙祖發使諭而止之景延廣為侍衛親軍都指揮使少帝即位加平章事始朝廷遣使告哀契丹無表致書去臣稱孫契丹怒遣使來讓延廣乃奏令契丹廻國使喬榮告戎王曰先帝則北朝所立今上則中國自册為隣為孫則可無稱臣之禮且言晉朝有十萬口横磨劔翁若要戰則早來他日不禁孫子則取笑天下當成後悔矣繇是與彼力敵干戈日尋初髙祖在位時宣借楊光逺騎兵數百延廣請下詔追還光逺繇此忿延廣怨朝廷廣遣間使汎海搆虜周張建武為寳州刺史廣順三年十月責授左司禦率府副率制曰頃以野雞蕃族蟊賊邉陲俾爾率領兵師於彼進討殺牛族孰戸素不陸梁而無故侵搔致其鬭敵彼戎既然殺戮去者寧不夷傷俾將士罹殃職爾之罪授之散秩猶為寛恩爾當再三深自咎責可行左司禦率府副率册府元龜卷四百四十六
