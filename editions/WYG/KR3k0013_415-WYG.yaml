body:
  text: 册府元龜巻四百十五宋王欽若等撰將帥部𫝊檄三代而上重乎文告春秋之際尚乎辭令其後司戎旅而専討伐者乃有馳檄版飛羽書以暴揚其過惡張皇其威武使忠義奮發而邪謀沮壞亦乃諭以去就之理陳夫逆順之狀俾之改圖易轍轉禍為福開其自新之路成乎不戰之績盖以𫝊布遐邇誕告士民使知其不獲已而用兵非無名而黷武者矣魯仲連齊人也好竒偉俶儻之畫䇿燕將攻下聊城聊城人或讒之燕燕將懼誅因保守聊城不敢歸齊田單攻聊城田單攻聊城在長平後十餘年也嵗餘士卒多死而聊城不下魯連乃為書約之矢以射城中遺燕將書曰吾聞之智者不背時而棄利勇士不怯死而滅名忠臣不先身而後君今公行一朝之忿不顧燕王之無臣非忠也殺身亡聊城而威不信於齊非勇也功敗名滅後世無稱焉非智也三者世主不臣說士不載故智者不再計勇士不怯死今死生榮辱貴賤尊卑此時不再至願公詳計而無與俗同且楚攻齊之南陽魏攻平陸而齊無南面之心以為亡南陽之害小不如得濟北之利大故定計審處之今秦人下兵魏不敢東面衡秦之勢成楚國之形危齊棄南陽㫁右壤定濟北計猶且為之也且夫齊之必決於聊城公勿再計今楚魏交退於齊而燕救不至以全齊之兵無天下之規與聊城共據期年之敝則臣見公之不能得也且燕國大亂君臣失計上下迷惑栗腹以十萬之衆五折於外此事去長平十年以萬乘之國被圍於趙壤削主困為天下僇笑國敝而禍多民無所歸心今公又以敝聊之民距全齊之兵是墨翟之守也食人炊骨士無反外之心是孫臏之兵也能已見於天下矣雖然為公計者不如全車甲以報於燕車甲全而歸燕燕王必喜身全而歸於國士民如見父母交游攘臂而議於世功業可明上輔孤主以制羣臣下養百姓以資説士矯國更俗功名可立也亡意亦捐燕棄世東游於齊乎裂地定封富比乎陶衛世世稱孤與齊久存又一計也此兩計者顯名厚實也願公詳計而審處一焉且吾聞之規小節者不能成榮名惡小恥者不能立大功昔者管夷吾射桓公中其鉤簒也遺公子糾不能死怯也束縛桎梏辱也若此三行者世主不臣鄉里不道鄉使管子幽囚而不出身死而不反於齊則亦名不免為辱人賤行矣臧獲且羞與同名矣方言曰荆淮海岱燕齊間罵奴曰臧罵婢曰獲况世俗乎故管子不恥身在縲絏之中而恥天下之不治不恥不死公子糾而恥威之不信於諸侯故兼三行之過而為五霸首名髙天下而光燭鄰國曹子為魯將三戰三北而亡地五百里鄉使曹子計不反顧議不還踵刎頸而死則亦名不免為敗軍擒將矣曹子棄三北之恥而退與魯君計桓公朝天下㑹諸侯曹子以一劒之任劫桓公於壇坫之上顔色不變辭氣不悖三戰之所亡一朝而復之天下震動諸侯驚駭威加吳越若此二士者非不能成小亷而行小節也以為殺身亡軀絶世滅後功名不立非智也故去感忿之怨立終身之名棄忿悁之節定累世之功是以業與三王争流而名與天壤相敝也願公擇一而行之燕將見魯連書泣三日猶豫不能自決欲歸燕已有隙恐誅欲降齊所殺虜於齊甚衆恐已降而後見辱喟然嘆曰與人刃我寧自刃乃自殺聊城亂田單遂屠聊城漢翟義為東郡太守王莽居攝義心惡之乃立東平王子嚴鄉侯信為天子義自號大司馬柱天大將軍移檄郡國言莽鴆殺孝平皇帝矯攝尊號今天子已立共行天罰郡國皆震後漢隗囂字季孟王莽末季父崔聞更始立而莽兵連敗乃與兄義及上邽人楊廣冀人周宗謀起兵應漢推囂為上將軍立廟祀髙祖太宗世宗割牲而盟移檄告郡國曰漢復元年七月己酉朔己巳上將軍隗囂白虎將軍隗崔左將軍隗義右將軍楊廣明威將軍王遵雲旗將軍周宗等告州牧部監郡卒正連率大尹尹尉隊大夫屬正屬令莽以周官王制之文置卒正連率大尹大尹職如太守屬令屬長職如都尉置州牧部監二十五人見禮如三公監位上大夫各主五郡公氏作牧侯氏卒正伯氏連率子氏屬令男氏屬長皆代其官其無爵者為尹又置六隊部置大夫職如太守故新都侯王莽慢侮天地悖道逆理鴆殺孝平皇帝簒奪其位矯託天命偽作符書莽遣五威將軍王竒等班符命四十二篇於天下言當代漢之意欺惑衆庶震怒上帝反戾飾文以為祥瑞大風毁莽玉路堂又拔其昭寧堂池東榆樹大十圉王莽乃曰念紫閣仙圖天意立太子正其名乃立其子臨為太子以為祥應也戲弄神祗􅁔頌禍殃楚越之竹不足以書其惡前書朱安世曰南山之竹不足以盡伐隗囂以楚越多竹故引以為言也天下昭然所共聞見今畧舉大端以喻吏民盖天為父地為母尚書曰惟天地萬物父母禍福之應各以事降莽明知之而㝠昧觸冐不顧大忌詭亂天術援引史𫝊王莽每有災禍皆引史傳以文飾之前書説符侯崔發言於莽曰周禮及春秋左氏國有大災則哭以厭之故周易稱先號咷而後笑宜乎嗟告天以求救乃率羣臣至南郊陳其符命因摶心大哭昔秦始皇毁壞謚法以一二數欲至萬世秦始皇初并天下制曰太古有號無謚中古有號死而以行為謚如此則子議父臣議君自今以來除謚法朕為始皇帝後世以計數至於萬世傳之無窮而莽下三萬六千嵗之歴言身當盡此度莽令太史推三萬六千嵗歴紀六嵗一改元布告天下循亡秦之軌推無窮之數是其逆天之大罪也分裂郡國㫁截地絡絡猶經絡也謂莽分斥郡縣㫁割疆界也田為王田賣買不得莽更名天下田曰王田不得買賣規錮山澤奪民本業莽制名山大澤不得採取造起九廟窮極工作莽九廟一曰黄帝大初祖廟二曰虞帝始祖昭廟三曰陳胡王統祖穆廟四曰齊敬王代祖昭廟五曰濟北愍王王祖穆廟六曰濟南伯王尊禰昭廟七曰元城孺子王尊禰穆廟八曰陽平頃王昭廟九曰新都顯王穆廟殿皆重屋太祖廟東西南北各四十丈高十七丈飾以金銅琱文窮極百工之巧工費數百鉅萬卒徒死者萬數也發塜河東攻劫丘隴此其逆地之大罪也尊任殘賊信用姦佞誅戮忠正覆按口語赤車奔馳續漢志曰使車赤轂白蓋赤帷從騶騎四十人也法冠晨夜寃繋無辜續漢志曰法冠一曰柱後高五寸侍御史服之妄族衆庶行炮烙之刑除順時之法莽作焚如之刑燒殺陳良終帶等二十七人莽又作不順時之令春夏斬人此為不順時之法灌以醇醯列以五毒莽以董忠反收忠宗族以醇醯毒藥白刃叢棘并一坎而薶之政令日變官名月易莽州郡官名改無常制乃至嵗復變更一郡至五易名而還復其故吏人不能紀也貨幣嵗改時百姓便安漢五銖錢以莽錢大小兩行難知皆私以五銖錢市買莽患之下書請挾五銖錢者比非井田制投四裔吏臣昏亂不知所從商旅窮窘號泣市道設為六管管主也莽設六管之令謂酤酒賣鹽鐵器鑄錢名山大澤此謂六也皆令縣官主税收其利増重賦斂刻剥百姓厚自奉養苞苴流行財入公輔禮記曰苞苴簞笥問人者莽令七公六卿兼號將軍分鎮大郡皆使為姦於外貨賄為市浸漁百姓上下貪賄莫相檢考民坐挾銅炭沒入鍾官莽時闗東大饑蝗人犯鑄錢五人相坐沒入為官奴婢其男子檻車兒女子步以鐵鎖其頸𫝊詣鍾官八十萬數到者易其夫婦愁苦死者什六七鍾官主鑄錢之官也徒隸殷積數十萬人工匠饑死長安皆臭既亂諸夏狂心益悖北攻強胡南擾勁越莽令十二部將同時分道並出大擊匈奴莽改句町王為侯其王邯怨怒不附莽諷䍧牱大尹周歆詐殺邯邯弟承起兵攻殺歆西侵羌戎東摘濊貊摘擾也西羌龎恬傅幡等怨莽奪其地為西海郡遂反攻西海太守程永莽又發髙句麗兵伐胡不欲行郡彊迫之皆亡出塞為寇使四境之外並入為害縁邊之郡江海之瀕滌地無類瀕涯也滌蕩也蕩地無遺類也故攻戰之所敗苛法之所陷饑饉之所夭疾疫之所及以萬萬計其死者則露尸不掩生者則奔亡流散幼孤婦女流離繋虜此其逆人之大罪也是故上帝哀矜降罰于莽妻子顛殞還自誅刈顛踣也殞絶也莽殺其子宇臨等妻王氏以莽數殺其子涕泣失明病卒大臣反據亡形已成大司馬董忠國師劉歆衛將軍王涉涉曲陽侯根之子也皆結謀内潰司命孔仁納言嚴尤秩宗陳茂舉衆外降莽置五威司命孔仁敗降更始今山東之兵二百餘萬已平齊楚下蜀漢定宛雒據敖倉守函谷威命四布宣風中岳中岳嵩髙也謂更始至雒陽興滅繼絶封定萬國遵髙祖之舊制修孝文之遺德有不從命武軍平之馳使四夷復其爵號莽貶句町王為侯西域盡改其王為侯單于曰服于髙句麗曰下句麗今皆復其爵號然後還師振旅櫜弓臥鼓周禮曰出曰治兵入曰振旅詩周頌曰載戢干戈載櫜弓矢櫜韜也臥猶息也申命百姓各安其所庶無負子之責百姓襁負流亡責在君上既安其業則無責也囂乃勒兵十萬擊殺雍州牧陳慶將攻安定安定大尹王向莽從弟平阿侯譚之子也威風獨能行其邦内屬縣皆無叛者囂乃移書于向諭以天命反覆誨示終不從於是進兵虜之以徇百姓然後行戮安定悉降而長安中亦起兵誅王莽囂遂分遣諸將徇隴西武都金城武威張掖酒泉敦煌皆下之丁綝為偏將軍從光武征伐綝將兵先渡河移檄郡國攻營畧地下河南陳留潁川二十一縣岑彭為征南大將軍伐蜀漢而夾川穀少水險難漕運留威虜將軍馮駿軍江州江州縣名今渝州巴縣也長沙中尉馮駿將兵詣彭璽書拜駿為威虜將軍都尉田鴻軍夷陵領軍李元軍夷道自引兵還屯津鄉當荆州要㑹津鄉縣名所謂江津當荆揚之㗋舌喻告諸蠻夷降者奏封其君長初彭與交阯牧鄧譲厚善與譲書陳國家威德又遣偏將軍屈充移檄江南班行詔命於是譲與江夏太守侯登武陵太守王堂長沙相韓福桂陽太守張隆零陵太守田翕蒼梧太守杜穆交阯太守錫光等相率遣使貢獻悉封為列侯或遣子將兵助彭征伐張隆遣子曄將兵詣彭助征伐光武以曄為率義侯於是江南之珍始流通焉耿恭為戊己校尉屯車師後王城恭至部移檄烏孫示漢威德大昆彌已下皆歡喜遣使獻名馬及奉宣帝時所賜公主博具願遣子入侍恭乃發使齎金帛迎其侍子袁紹為冀州牧遣鞠義及劉虞子和與虞故從事鮮于輔等合兵擊公孫瓚瓚固守易京攻之連年不能拔紹乃與瓚書曰孤與足下既有前盟舊要申之以討亂之誓愛過夷叔分著丹青謂為旅力同仇足踵齊晉故解印釋紱以北帶南分割膏腴以奉執事此非孤赤情之明驗耶豈悟足下棄烈士之髙義尋禍亡之險蹤輒而改慮以好易怨盜遣士馬犯暴豫州始聞甲卒在南親臨戰陣懼於飛矢迸流狂刃横集以重足下之禍徒増孤子之咎釁也故為薦書懇惻冀可改悔而足下超然自逸矜其威詐謂天罔可吞雄豪可滅果令貴弟殞於鋒刃之端斯言猶在於耳而足下曽不尋討禍源克心罪已茍欲逞其無疆之怒不顧逆順之津匿怨害民逞於余躬遂躍馬控弦處我疆土毒徧生民辜延白骨孤辭不獲已以登界橋之役是時足下兵氣霆震駿馬電發僕師徒肇合機械不嚴强弱殊科衆寡異論假天之助小戰大克遂陵躡奔背因壘館穀此非天威棐諶福豐有禮之符表乎足下志猶未厭乃復糾合餘燼率我蟊賊以焚爇渤海孤又不獲寧用及龍河之師羸兵前誘大軍未濟而足下膽破衆散不鼓而敗兵衆擾亂君臣並奔此又足下之為非孤之咎也自此以後禍隙彌深孤之師旅不勝其忿遂至積尸為京頭顱滿野愍彼無辜未嘗不慨然失涕也後比得足下書辭意婉約有改往修來之言僕既欣于舊好克復且愍兆民之不寧每輒引師南駕以順簡書弗盈一時而北邊羽檄之文未嘗不至孤是用痛心疾首靡所錯情夫處三軍之帥當列將之任宜令怒如嚴霜喜如時雨臧否好惡坦然可觀而足下二三其德强弱易謀急則曲躬緩則放逸行無定端言無質要為壯士者固若此乎既乃殘殺老弱幽土憤怨衆叛親離孑然無黨又烏丸濊貊皆足下同州僕與之殊俗各奮迅激怒争為鋒鋭又東西鮮卑舉踵來附此非孤德所能招乃足下驅而致之也夫當荒危之世處干戈之險内違同盟之誓外失戎狄之心兵興州壤禍發蕭墻將以定霸不亦難乎前以西山陸梁出兵平討會麴義餘殘畏誅逃命故遂往大軍分兵撲蕩此孤兵之前行及界橋搴旗拔壘先登制敵者也始聞足下鐫金紆紫命以元帥謂當因兹奮發以報孟明之恥是故戰夫引領竦望旌斾怪遂含光匿影寂爾無聞卒臻屠滅相為惜之夫有平天下之志希長世之功權御師徒帶養戎馬叛者無討服者不收威德並喪何以立名今舊京克復天網云補罪人斯亡忠幹翼化華夏儼然望於穆之作將戢干戈放散牛馬足下獨何守區區之土保軍内之廣甘惡名以速朽亡令德之久長壯而籌之非良策也宜釋憾除嫌敦我舊好若斯言之玷皇天是聞瓚不答及紹擊破瓚定幽土每得詔患有不便於己乃欲移天子自近使說曹公徙都鄄城曹公拒之紹乃簡精兵十萬攻許宣檄州郡曰蓋聞明主圖危以制變忠臣慮難以立權曩者強秦弱主趙髙執柄専制朝命威福繇已終有望夷之禍汚辱至今及臻吕后禄産専政擅㫁萬機決事省禁下陵上替海内寒心於是絳侯朱虚興威奮怒誅夷逆亂尊立太宗故能道化興隆光明顯融此則大臣立權之明表也司空曹操祖父騰故中常侍與左悺徐璜并作妖孽饕餮放横傷化虐民父嵩乞丐攜養因贓假位輿金輦璧輸貨權門竊盜鼎司傾覆重器操贅閹遺醜本無令德􅘀狡鋒俠好亂樂禍幕府昔統鷹揚掃夷凶逆續遇董卓侵官暴國於是提劒揮鼓發命東夏方收羅英雄棄瑕録用故遂與操參咨策畧謂其鷹犬之才爪牙可任至乃愚佻短慮輕進易退傷夷折衂數喪師徒幕府輒復分兵命鋭修完補輯表行東郡太守兖州刺史被以虎文授以偏師奬䠞威柄冀獲秦師一克之報而操遂乘資跋扈肆行酷烈割剥元元殘賢害善故九江太守邊讓英才俊秀天下知名以直言正色論不阿諂身被梟縣之戮妻奴受灰滅之咎自是士林憤痛民怨彌重一夫奮臂舉州同聲故躬破於徐方地奪於吕布彷徨東裔蹈據無所幕府惟彊幹弱枝之義且不登叛人之黨故復援旌擐甲席卷赴征金鼓響震布衆破沮拯其死亡之患復其方伯之任是則幕府無德於兖土之民而有大造於操也後㑹鑾駕東反羣虜亂政時冀州方有北鄙之警匪遑離局故使從事中郎徐勛就發遣操使繕修郊廟翼衛幼主而便放志専行脅遷省禁卑侮王僚敗法亂紀坐召三臺専制朝政爵賞繇心刑戮在口所愛光五宗所惡滅三族羣談者被顯誅腹議者蒙隠戮道路以目百寮鉗口尚書記朝㑹公卿充員品而已故太尉楊彪歴典二司享國極位操因睚眦被以非罪榜楚并兼五毒俱至觸情放慝不顧憲章又議郎趙彦忠諫直言議有可納故聖朝含聴改容加錫操欲迷奪時權杜絶言路擅收立殺不候報聞又梁孝王先帝母弟墳陵尊顯松栢桑梓猶宜恭肅而操率將校吏士親臨發掘破棺裸尸掠取金寳至令聖朝流涕士民傷懷又署發丘中郎將模金校尉所過隳突無骸不露身處三公之官而行桀虜之態殄國虐民毒流人鬼加以細政苛慘科防互設繒繳充蹊坑穽塞路舉手挂網羅動足蹈機陷是以兖豫有無聊之民帝都有吁嗟之怨歴觀古今書籍所載貪殘虐烈無道之臣於操為甚幕府方詰外姦未及整訓加意含覆冀可彌縫而操豺狼野心潛包禍謀乃欲撓折棟梁孤弱漢室除滅中正専為梟雄往嵗伐鼓北征討公孫瓚强禦桀逆拒圍一年操因其未破隂交書命欲託助王師以相掩襲故引兵造河方舟北濟㑹其行人發露瓚亦梟夷故使鋒芒挫縮厥圖不果屯據敖倉阻河為固乃欲以螳螂之斧禦隆車之隧幕府奉漢威靈折衝宇宙長㦸百萬胡騎千羣奮中黄育獲之才騁良弓勁弩之勢并州越太行青州涉濟漯大軍汎黄河以角其前荆州下宛葉而掎其後雷震虎步並集虜庭若舉炎火以炳飛蓬覆滄海而沃熛炭有何不消滅者哉當今漢道陵遲綱弛紀絶操以精兵七百圍守宫闕外稱陪衛内實拘執懼其簒逆之禍因斯而作乃忠臣肝腦塗地之秋烈士立功之㑹也可不朂哉馮異為偏將軍從光武平河北更始遣舞陰王李軼廩丘王田立大司馬朱鮪白虎公陳僑東觀記僑字作矯將兵號三十萬與河南太守武勃共守雒陽光武將北徇燕趙以魏郡河内獨不逢兵而城邑完全倉廩實乃拜寇恂為河内太守異為孟津將軍孟地名古今以為津綂二郡軍河上與恂合勢以拒朱鮪等異乃遺李軼書曰愚聞明鏡所以炤形往事所以知今昔微子去殷而入周項伯畔楚而歸漢周勃迎代王而出少帝霍光尊孝宣而廢昌邑彼皆畏天知命覩存亡之符見廢興之事故能成功於一時垂業於萬世也茍令長安尚可扶助延期嵗月疏不間親逺不踰近季文能居一隅哉長安謂更始季文李軼字言軼與更始疏逺獨居一隅理難支久欲其早圖去就今長安壞亂赤眉臨郊王侯搆難大臣乖離綱紀已絶時更始大臣張卭申屠建隗囂等以赤眉入闗却更始歸南陽是大臣乖離故也四方分離異姓並起是故蕭王跋涉霜雪經營河北方今英俊雲集百姓風靡雖邠岐慕周不足以喻季文誠能覺悟成敗亟定大計論功古人轉禍為福在此時矣如猛將長驅嚴兵圍城雖有悔恨亦無及已初軼與光武首結謀約加相親愛及更始立反共陷伯升雖知長安已危欲降又不安乃報異書曰軼本與蕭王首謀造漢結死生之約同榮枯之計今軼守雒陽將軍鎮孟津俱據機軸機弩牙也軸車軸也皆在物之要故取喻焉千載一㑹思成斷金唯深達蕭王願進愚䇿以佐國安人軼自通書之後不復與異争鋒故異因此得北攻天井闗拔上黨兩城天井闗在太行山下又南下河南成臯已東十三縣及諸屯聚皆平之降者十餘萬武勃將萬餘人攻諸畔者異引軍渡河與勃戰於士鄉下續漢書曰士鄉亭名屬河郡大破斬勃獲首五千餘級軼又閉門不救異見其信效具以奏聞魏張既為凉州刺史西平麴光殺其郡守既乃檄告諭諸羌為光等所詿誤者原之能斬賊帥送首者當加封賞於是光部黨斬送光首其餘咸安堵如故鍾㑹為鎮西將軍討蜀再破蜀軍蜀將皆退守劒閣㑹乃移檄蜀將吏士民曰往者漢祚衰㣲率土分離生民之命㡬於冺滅太祖武皇帝神武聖哲撥亂反正拯其將墜造我區夏髙祖文皇帝應天順民受命踐阼烈祖明皇帝奕世重光恢拓洪業然江山之外異政殊俗率土齊民未蒙王化此三祖所以顧懷遺恨也今主上聖德欽明紹隆前緒宰輔忠肅明允劬勞王室布政垂惠而萬邦協和施德百蠻而肅慎致貢悼彼巴蜀獨為匪民愍此百姓勞役未已是以命授六師龔行天討征西雍州鎮西將軍五道並進古之行軍以仁為本以義治之王者之師有征無戰故虞舜舞干戚而服有苖周武有散財發廩表閭之義今鎮西奉辭銜命攝綂戎重庶𢎞文告之訓以濟元元之命非欲窮武極戰以快一朝之政故畧陳安危之要其敬聼話言益州先主以命世英才興兵朔野困躓冀徐之郊制命紹布之手太祖拯而濟之興隆大好中更背違棄同即異諸葛孔明仍規秦川姜伯約屢出隴右勞動我邊境侵擾我氏羌方國家多故未遑修九伐之征也今邊境乂清方内無事蓄力待時并兵一向而巴蜀一州之衆分張守備難以敵堂堂之陣比年以來曽無寧嵗征夫勤瘁難以當子來之民此諸賢所親見也蜀相牡見禽於秦公孫述授首於漢九州之險是非一姓此皆諸賢所備聞也明者見危於無形智者窺禍於未萌是以微子去商長為周賓陳平背項立功於漢豈宴安酖毒懷禄而不變哉今國朝隆天覆之恩宰輔𢎞寛恕之德先惠後誅好生惡死往者吳將孫壹舉衆内附位為上司寵秩殊異文欽唐咨為國大害叛主讎賊還為戎首咨困逼擒獲欽二子還降皆將軍封侯咨預聞國事壹等窮踧歸命猶加盛寵况巴蜀賢豪見幾而作者哉誠能深鍳成敗邈然高蹈投跡㣲子之蹤錯身陳平之軌則福同古人慶流來裔百姓士民安堵舊業農不易畆市不回肆去累卯之危就永安之福豈不美歟若偷安旦夕迷而不反大兵一發玉石皆碎雖欲悔之亦無及已其詳擇利害自求多福各具宣布咸使聞知孟達為蜀宜都太守與先主養子劉封忿争不和達懼罪忿怨率所領降魏文帝遣夏侯尚徐晃與達共襲封達與封書曰古人有言疎不間親新不加舊此謂上明下直讒慝不行也若乃權君譎主賢父慈親猶有忠臣蹈功以罹禍孝子抱仁以蹈難種商白起孝己伯竒皆其類也其所以然非骨肉好離親親樂患也或有恩移愛易亦有讒間其間雖忠臣不能移之於君孝子不能變之於父也勢利所知改親為讎况非親親乎故申生衛伋禦寇楚建稟受形之氣當嗣立之正而猶如此今足下與漢中王道路之人耳親非骨血而據勢權義非君臣而處上位征則有偏任之威居則有副車之號逺近所聞也自立阿斗為太子已來有識之人相為寒心如使申生從子輿之言必為太伯衛伋聴其弟之謀無彰父之譏也且小白出奔入而為伯重耳踰垣卒以克復自古有之非獨今也夫智貴免禍明尚夙達僕揆漢中王慮定於内疑生於外矣慮定則心懼亂禍之興作未曽不繇廢立之間也私怨人情不能不見恐左右必有以間於漢中王矣然則疑成怨間其發若踐機耳今足下在逺尚可假息一時若大軍遂進足下失據而還竊相為危之昔微子去殷智果别族違難背禍猶皆如斯今足下棄父母而為人後非禮也知禍將至而留之非智也見正不從而疑之非義也自號為丈夫為此三者何所貴乎以足下之才棄身來東繼嗣羅侯不為背親也北面事君以正綱紀不為棄舊也怒不致亂以免危亡不為徒行也加陛下新受禪命虚心側席以德懷逺若足下翻然内向非但與僕為倫受三百戸封繼綂羅國而已當更剖符大邦為始封之君陛下大軍金鼓以震當轉都宛鄧若二敵不平軍無還期足下宜因此時早定良計易有利見大人詩有自求多福行矣今足下勉之無使狐突閉門不出封不從達言晉石包都督揚州諸軍事司馬文王遣符邵孫郁使吳苞令參軍事孫楚作書遺孫皓曰蓋見幾而作周易所貴小不事大春秋所誅此乃吉凶之萌兆榮辱所繇生也是故許鄭以銜璧全國曹譚以無禮取滅載籍既記其成敗古今又著其愚智不復廣引譬類崇飾浮辭茍以夸大為名更喪忠告之實今粗論事要以相覺悟昔炎精幽昧厯數將終桓靈失德灾釁並興豺狼抗爪牙之毒生靈罹塗炭之難繇是九州絶貫王綱解紐四海蕭條非復漢有太祖承運神武應期征討暴亂尅寧區夏協建靈符大命既集遂廓洪基奄有魏域土則神州中岳器則九鼎猶存世載淑美重光相襲故知四隩之攸同帝者之壯觀也昔公孫氏承籍父兄世居東裔擁帶燕胡憑陵險逺講武游盤不供職貢内傲帝命外通南國乘桴滄海交酬貨賄葛越布於朔土貂馬延於吳會自以控弦十萬奔走之力信能右折燕齊左震扶桑輮轢沙漠南面稱王宣王薄伐猛鋭長驅師次遼陽而城池不守枹鼓蹔鳴而元凶折首於是逺近疆場列郡大荒收離聚散大安其居衆庶悦服殊俗欵附自此以降九野清泰東夷獻其樂器肅慎貢其楛矢曠世不羈應化而至巍巍蕩蕩想所具聞也吳之先祖起自荆楚遭時擾攘潛播江表蜀主震懼亦逃巴岷遂因山陵積石之固三江五湖浩汗無涯假氣遊魂迄兹四紀兩邦合從東西唱和互相扇動距捍中國自謂三分鼎足之勢可與泰山共相終始也相國晉王輔相帝室文武桓桓志勵秋霜廟勝之筭應變無窮獨見之鑒與衆絶慮主上欽明委以萬機長轡逺御妙畧神授偏師同心上下用力凌威奮伐罙入其阻并敵一向奪其膽氣小戰江由則成都自潰躍兵劒閣則姜維面縛開地六千領郡三十兵不踰時梁益肅清使竊號之雄稽顙絳闕球琳重錦充於府庫韓并魏徙虢滅虞亡此皆前鑒後事之表又南中吕興深覩天命蟬蛻内附願為臣妾外失輔車唇齒之援内有羽毛零落之漸而徘徊危國冀延日月此猶魏武侯却指山河自以為彊殊不知物有興亡則所美非其地也方今百僚濟濟雋乂盈朝武臣猛將折衝萬里國富兵強六軍精練思復翰飛飲馬南海自頃國家整修器械興造舟楫簡習水戰樓船萬艘千里相望刳木已來舟車之用未有如今之殷盛者也驍勇百萬畜力待時役不再舉今日之師也然主相眷眷未便電發者猶以為愛人治國道家所尚崇城遂卑文王退舎故先開大信喻以存亡殷勤之指往使所究也若審識安危自求多福蹶然改容祇承往錫追慕南越嬰齊入侍北面稱臣伏聴告䇿則世祚江表永為魏藩方功顯報隆於日矣若猶侮慢未順王命然後謀力雲㑹指麾從風雍梁二州順流而東青徐戰士列江而西荆揚兖豫争驅入衝征東甲卒武步秣陵爾乃王輿整駕六戎徐征羽校燭日旌旗流星龍斿曜路歌吹盈耳士卒奔邁其㑹如林煙塵俱起震天駭地渴賞之士鋒鏑争先忽然一旦身首横分宗嗣淪覆取戒萬世引領南望良助寒心夫療膏肓之疾者必進苦口之藥決狐疑之慮者亦告逆耳之言如其猶豫迷而不反恐俞跗見其已死扁鵲知其無功矣勉思良圖惟所去就劭等至吳不敢為通華譚為東海王軍諮祭酒會陳敏據江東命僚佐以已為大司馬楚公稱自江入河奉迎鑾駕華譚聞敏自相署置而顧榮等並江東首望悉受敏官爵乃遺榮等書曰石冰之亂朝廷録敏微功故加越次之禮授以上將之任庶有韓盧一噬之効而本性凶狡素有識達貪榮干運逆天而動阻兵作威盜據吳會内用凶弟外委軍吏上負朝廷寵授之榮下孤宰輔過禮之惠天道伐惡人神所不佑雖阻長江命危朝露忠節令圖君子髙行屈節附逆義士所恥王蠋匹夫志不可屈於期慕義隕首燕庭况吳㑹仁人並受國寵或剖符名郡或列為近臣而使辱身姦人之朝降節逆叛之黨稽顙屈膝不亦羞乎昔龔勝絶粒不食莽朝魯連赴海恥為秦臣君子義行同符千載遙度雅量豈獨是安昔吳之武烈稱美一代雖奮竒宛葉亦受折襄陽討逆氣雄志存中夏臨江發怒命訖丹徒賴先主承運雄謀天挺尚内倚慈母仁明之教外仗子布廷争之忠又有諸葛顧步張朱陸全之旅故能鞭笞百越稱制南山然兵家之興不出三世運未盈百歸命入臣今以陳敏倉部令史七弟頑冗六品下才欲躡桓王之髙蹤蹈大皇之絶軌逺度諸賢猶當未許也諸君垂頭不能建翟義之謀而顧坐俛首已受羈絆之辱皇輿東軒行即綰紫百寮垂纓雲翔鳯闕廟勝之謀潛運幃幄然後發荆州武旅順流東下徐州鋭鋒南據堂邑征東勁卒耀威歴陽飛橋越横江之津汎舟涉步𤓰之渚威震丹陽擒寇建業而諸賢何顔見中州之士耶小寇隔津音符道濶引領南望情存舊懷忠義之人何世蔑有夫危而不能存將何貴乎永長宿德情所素重彦先垂髪分著金石公胄早交恩紀特隆令伯義聲親友宻結上欲與諸賢效翼紫宸建功帝籍如其不爾亦可汎舟渭汭擊楫清歌何為辱身小寇之手以蹈逆亂之禍乎昔為同志今已殊域往為一體今成異身南瞻長江非子誰思願圖良䇿以存嘉謀也榮等得書宻報征東大將軍劉凖遣兵臨江竟破敏斬之茍晞為鎮東大將軍領青州時懷帝怒東海王越専權乃詔晞曰朕以不德戎車屢興上懼宗廟之累下愍兆庶之困當賴方嶽為國藩翰公威震赫然梟斬藩公師藩桑汲桑走降喬朗魏植之徒復以誅除豈非高識明㫁朕用委成加以王彌石勒為社稷之憂故有詔委綂六州而公謙介小節稽遲天命非所謂與國同憂也今復遣詔便施檄六州協同大舉剪除國難稱朕意焉晞復移諸征鎮州郡曰天步艱險禍難殷流劉元海造逆於汾陰石世龍階亂於三魏薦食畿甸覆喪鄴都結壘近郊仍震兖豫害三刺史殺二都督郡守官長湮沒數十百姓流離肝腦塗地晞以虚薄負荷國重是以弭節海隅援枹曹衛猥被中詔委以闗東督綂諸軍欽承詔命尅今月二日當西經濟黎陽即日得滎陽太守丁嶷白事李惲陳午等救䕶諸軍州與羯大戰皆見破散懐城已陷河内太守裴整為賊所執宿衛缺乏天子蒙難宗廟之危甚於累卵承問之日憂歎累息晞以為先王選建明德庸以服章所以藩固王室無俾城壞是以舟楫不固齊桓責楚襄王逼狄晉文致討夫翼奬皇家宣力本朝雖陷湯火大義所甘加諸方牧俱受榮寵義同畢力以報國恩晞雖不武首啓戎行秣馬裹糧以俟方鎮凡我同盟宜同赴救顯立名節在此行矣㑹王彌遣曹嶷破瑯琊北攻齊地茍純城守嶷衆轉盛連營數十里晞還登城望之有懼色與賊連戰輒破之後簡精鋭與賊大戰會大風揚塵晞遂敗績棄城夜走嶷追至東山部衆皆降嶷晞單騎奔髙平温嶠為平南將軍江州刺史鎮武昌祖約蘇峻反京師傾覆嶠自武昌推征西將軍陶侃為盟主赴難列上書陳約峻罪狀移檄四方征鎮曰賊臣祖約蘇峻同惡相濟用生邪心天奪其魄死期將至譴負天地自絶人倫寇不可縱宜増軍討撲輒屯次湓口即日䕶軍庾亮至宣太后詔寇逼宫城王旅撓敗出告藩臣謀寧社稷後將軍郭黙奮武將軍龔保與嶠督䕶王愆期西陽太守鄧嶽鄱陽内史紀瞻率其所領相尋而至逆賊肆凶陵蹈宗廟火延宫掖矢流太極二御幽逼宰相困迫殘虐朝士劫辱子女承問悲惶精魂飛散嶠闇弱不能殉難哀恨自咎五情摧隕慚負先帝託寄之重義在畢力死而後已今躬率所綂為士卒先催進諸軍一時電擊西陽太守鄧嶽尋陽太守褚誕等連旗相繼宣城内史桓彛已勒所屬屯濱江之要江夏相周撫乃心求征軍已向路昔包胥楚國之微臣重趼致誠義感諸侯藺相如趙邦之陪𨽻恥君之辱按劒秦廷皇漢之季董卓作亂劫遷獻帝虐害忠良闗東州郡相率同盟廣陵功曹臧洪郡之小吏耳登壇㰱血涕涙横流慷慨之節實厲羣后况今居台鼎據方州列名邦受國恩者哉不期而㑹不謀而同不亦宜乎二賊合衆不盈五千且外畏胡寇城内饑乏後將軍郭黙即於戰陣俘殺羣賊今雖殘破都邑有宿衛兵人即時出散不為賊用祖約情性偏阨忌尅不仁蘇峻小子惟利是親殘酷驕猜權相假合江表興義以抗其前彊胡外寇以躡其後運漕隔絶資食空懸内乏外孤勢何得久羣公征鎮職在禦侮征西陶公國之耆德忠肅義正勲庸𢎞著諸方鎮州郡咸齊㫁金同稟規畧以雪國恥茍利社稷死生以之嶠雖怯劣忝據一方賴忠賢之規文武之助君子竭誠小人盡力髙標之士被褐而從戎負薪之徒匍匐而赴命率其私僕致其私仗人士之誠竹帛不能載也豈無德而致之哉士稟義風人感皇澤且䕶軍庾公帝之元舅德望隆重率郭後軍趙龔三將與嶠戮力得有資憑且悲且慶若朝廷之不冺也其各明率所綂無後事機賞募之信明如日月有能斬約峻者封五等侯賞布萬疋忠為令德為仁繇已萬里一契義在不言也時陶侃雖許自下而未發復追其督䕶龔登嶠重與侃書曰僕謂軍有進而無退宜増而不可減近已移檄逺近言於盟府尅後月半大舉南康建安晉安三郡軍並在路次同赴此㑹惟須仁公所綂至使齊進耳仁公今召軍還疑惑逺近成敗之繇將在於此僕才輕任重實憑仁公篤愛逺稟成規至於首啓戎行不敢有辭僕於仁公當如常山之蛇首尾相衛又唇齒之喻也恐或者不達髙㫖將謂仁公緩於討賊此聲難追僕與仁公並受方嶽之任安危休戚理既同之且自頃之顧綢繆往來情深義重著於人士之口一旦有急亦望仁公悉衆見救况社稷之難惟僕偏當一州州之文武莫不翹企假令此州不守約峻樹置官長於此荆楚西逼彊胡東接逆賊因之以饑饉將來之危乃當甚於此州之今日也以大義言之則社稷顛覆主辱臣死公進當為大晉之忠臣參桓文之義開國承家銘之天府退當以慈父雪愛子之痛約峻凶逆無道囚制人士裸其五形近日來者不可忍見骨肉生離痛感天地人心齊一咸皆切齒今之進討若以石投卵耳今出軍既緩復召兵還人心乖離是為敗於幾成也願深察所陳以副三軍之望孔坦為侍中成帝咸康元年石聰寇厯陽王導為大司馬討之請坦為司馬㑹石勒新死季龍専恣石聰及譙郡太守彭彪等各遣使請降坦與聰書曰華戎道乖南北逈邈瞻河企宋每懷饑渴數㑹陽九天禍晉國姦凶猾夏乗釁肆虐我德雖衰天命未改乾符啓再集之慶中興應靈期之會百六之難既過惟新之美日隆而神州振蕩遺氓波散誓命戎狄之手跼蹐豺狼之穴朝廷每假寐永歎痛心疾首天罰既集罪人斯隕王旅未加自相魚肉豈非人怨神怒天降其灾蘭艾同焚賢愚所歎哀矜勿喜我后之仁大赦曠廓惟季龍是討彭譙使至粗具動静知將軍忿疾醜類翻然同舉承問欣豫慶若在已何知幾之先覺介石之易悟哉引領來儀怪無聲息將軍出自名族誕育洪胄遭世多故國傾家覆生離親屬假養異類雖逼偽寵將亦何賴聞之者猶或有悼况身嬰之人能不憤慨哉非我族類其心必異誠反族歸正之秋圖義建功之日也若將軍喻納往言宣之同盟率闗右之衆輔河内之卒申威趙魏為國前驅雖竇融之保河西黥布之去項羽比諸古今未足為喻聖上寛明宰輔𢎞納雖射鉤之隙賞之故行雍齒之恨侯之列國况二三子無曩人之嫌而遇天啟之㑹當如影響有何遲疑今六軍戒嚴水陸齊舉熊羆踊躍齕噬争先鋒鏑一交玉石同碎雖復後悔何嗟及矣僕以不才世荷國寵雖實不敏誠為行李之主區區之情還信所具夫機事不先鮮不後恨自求多福惟將軍圖之朝廷遂不果北伐人皆懷恨册府元龜卷四百十五
