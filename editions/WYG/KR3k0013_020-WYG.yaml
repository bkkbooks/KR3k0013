body:
  text: 册府元龜卷二十宋王欽若等撰帝王部功業唐𤣥宗初封臨淄王出為潞州别駕中宗景龍四年来朝六月温王即位改為唐隆元年韋后臨朝稱制韋温宗楚客武延秀紀處訥趙履温韋播髙嵩韋擢韋挺葉静能韋渉韋建楊均王哲等濳謀作亂将害相王及少帝持韋氏妖䜟以革命為意扇惑姦邪欲令勸進臺閣要司門闕中禁及左右屯兵皆布韋氏子弟帝謂所親曰諸吕之難復起今日宗社之危實若綴旒不早圗之必貽後悔因遇前同州朝邑縣尉劉幽求與語甚相得㑹兵部侍郎崔日用又寳昌寺僧普潤宻詣藩邸廣申籌略其意遂决時京師有王崇􅁮者為尚衣奉御倜儻任俠輕財縱酒長安少年皆從之㳺帝乃来求與相見遂遇利仁府折衝麻嗣宗押萬騎果毅葛福順總監鍾紹京言及家國深相欵結時帝侍相王在藩邸韋温宗楚客附㑹安樂公主將圗剪覆設兵濳備内外阻絶幽求與嗣宗崇􅁮廣布腹心畫䇿於外令東明觀道士馮處澄㣲服詣藩邸通意是月庚子帝遂因處澄㣲行以出與幽求等皆㑹於鍾紹京私第紹京臨事而變欲閉闗不出其妻許氏謂紹京曰事縁國家應有神理况同謀素定縱不行豈免禍乎宜備臣禮從王之命紹京乃出再拜趨謁帝執紹京手而坐遂與幽求紹京麻嗣宗太平公主第二子薛崇暕尚衣奉御王崇􅁮太平公主府典籖王師䖍押萬騎果毅葛福順李仙鳬道士馮處澄僧普潤前商州司馬崔諤之山人劉承祖等建䇿誅之或曰先啓相王帝曰拯社稷之危赴君父之急若事成福歸於宗社不成身死於忠孝安可先請憂怖大人乎遂以其日申時率幽求等先至苑中詣總監鍾紹京廨宇紹京率丁匠二百餘人以從候夜出􅁐南門時羽林将士等皆次於𤣥武門外乃遣葛福順李仙鳬領萬騎先攻𤣥武門福順㧞劍前驅直入羽林營内斬將軍韋濬韋播及髙嵩梟其首以狥羽林軍士相率来應無有拒者時軒轅星落於紫㣲中王師䖍及僧普潤皆素曉𤣥象遂啓帝曰大王今日應天順人誅鋤兇慝上象如此亦何憂也遂令福順領左萬騎攻𤣥徳門仙鳬領右萬騎攻白獸門皆殺其守将斬闗而入初帝號令諸将曰如斬闗得入並會於凌煙閣前即大喊寡人勒兵於𤣥武門候喊聲當入其夜三更福順仙鳬等俱會於凌煙閣前果大喊帝於是率總監兵及羽林兵等齊進於兩儀殿前時梓宫在太極殿殿前有諸衞飛騎萬騎宿衞聞喊聲皆被甲應之皇后􅅊氏惶惑走入飛騎營中有一飛騎知帝舉兵遂斬首以送時昭容上官氏聞帝至執蠟燭與宫人等来迎安樂公主時於宫中方照鏡畫眉為亂兵斬首以獻於是分兵討捕宫中素與􅅊氏連結及用事親信者并諸韋在宫中諸門守衛者悉斬之比曉内外皆定乃馳謁相王謝不先啓請罪相王撫帝泣曰宗社禍難繇汝安之汝不行吾必及禍大功既集深契吾心焉用謝也辛丑温王乃下制曰天未悔禍王室多難大行皇帝升遐之際事起倉卒朕以冲𦕈嗣守丕圖衘恤問故遂窮兇黨逆賊馬秦客等濳通宫禁敢行鴆毒而宗楚客紀處訥武延秀趙履温􅅊播髙嵩韋挺葉静能韋建楊均王哲等遂扇太后干朕家事凡有處分政繇韋氏楚客又妄説妖言務欲勸進連結中外将危宗社又頃者王慶之李􅞥張嘉福前麟逰縣令杜無二越州長史宋之問潛行表状請立武承嗣為皇太子則天皇后斬慶之一人之問以附託三思獲免今之問李􅞥又託楚客晉卿與將作少將李守質日夜潛圖令延秀起事朕之㣲眇危若綴旒安國相王鎮國太平公主朕之親叔親姑同憂共戚楚客􅅊温等又附㑹安樂公主妄欲剪除相王第三子臨淄郡王隆基家國情深君親義切乃與太平公主第二子薛崇暕及總監鍾紹京前同州朝邑縣尉劉幽求利仁府折衝麻嗣宗太平公主府典籖王師䖍尚衣奉御王崇􅁮東明觀道士馮處澄寳昌寺僧普潤前商州司馬崔諤之山人劉承祖等僉扶人望考以時宜叶契建謀重安李氏兵戈不動氛祲廓清瞬息之間還自屠滅朕以山陵未畢變故相仍情緒荒迷益深摧憤士庶等代承景化累荷國恩今得宗社乂安人祗交泰當同兹感悦各効忠貞如更朋黨比周輙生異議朕當加嚴憲必所不容即宜宣示令知朕意遂拜帝為殿中監進封平王兼知内外閑廏檢校隴右郡牧大使仍押左右廂萬騎賜物一千段是月温王遜位於叔父相王是為睿宗以帝為太子先天元年八月遂即位肅宗初為皇太子天寳十五載六月安禄山陥潼闗𤣥宗幸蜀發馬嵬於是百姓緇黄耆耉號泣於路奉御馬而言曰逆胡亂常凌逼城闕遂令鑾輿遷幸臣祖父生於中華請率子弟從皇太子為國討賊東收長安遂留帝在後撫慰百姓遣夀王瑁及髙力士送内人衣物等帝初不忍辭上皇涕泣不住帝第三子建寧王及飛龍騎李輔國攏帝馬請帝住乃勸帝曰逆寇入城天下潰亂若殿下從主上赴巴蜀而賊等追蹤燒絶棧路則二京宗廟拱手而付狂賊欲招天下義勇之士而收復長安豈可得乎不有居者誰守社稷望殿下絶兒女之愛成天下之大計帝遂留令廣平王馳以奏𤣥宗遂依衆請兼言傳位帝讓而不受賊帥追至渭便橋以斷渭水初漲又無舟楫帝於水濵號令百姓願從者三千餘人因而渉度南遇潼闗散卒誤以為賊與之戰士多傷敗乃收其餘復濟渭而北帝過渭之後左右唯廣平王及六軍將士二千人自奉天北上夕次永夀縣老㓜悲喜遮道獻牛酒至新平郡通夜奔馳三百餘里從者器械亡失過半所存之衆不過一旅遂止於郡是月帝至平凉郡遂大閲監牧得馬數千萬牛羊十萬餘頭又召募得五百餘人數日間未知所適朔方留後度支副使社鴻漸奉牒具陳兵馬招集之勢并録軍資器械倉儲庫物之數令判官李拯至平凉謁見帝帝大悦又㑹河西行軍司馬新授御史大夫裴冕詔赴朝廷自河西亦具陳事勢勸帝之朔方帝然之七月辛酉至靈武於是裴冕杜鴻漸等勸進者五甲子帝即皇帝位於靈州郡城南樓改元至徳元年以廣平王為天下兵馬元帥二年九月廣平王收西京十月帝遷長安代宗初封廣平王天寳末𤣥宗幸蜀帝侍肅宗北廵時賊陷京城所在多虞帝蒙犯荆榛晝夜不離肅宗左右及𤣥宗遜位稱太上皇肅宗即皇帝位遂以帝為天下兵馬元帥帝以國歩未康不敢更辭乃建幕府以吏部侍郎蘓震諌議大夫暢璀七罪反等為副使判官諸道莭度郭子儀李光弼王思禮等咸受節制時朝廷草創兵無一旅肅宗布恩信收集師徒自靈州建大號移幸涇寧及岐數月間兵號十萬至徳二年九月丁亥帝受命東討綂朔方安西廻紇南蠻大食之衆二十萬皷行而前将行百寮拜送於朝堂帝答拜既出當闕不乗馬歩出木馬門而後登車觀者美之帝既撫軍志清冦難見廻紇王子葉䕶約為兄弟遇之甚厚葉䕶大喜壬寅大會於京城之西南香積寺之北連亘三十里營伍嚴整啣枚無聲以安西北庭行營節度使李嗣業為前軍朔方河西隴右行營莭度使郭子儀為中軍闗内行營節度使王思禮為後軍戈鋋􅎏皷震山耀野賊將安守忠李歸仁悉以前軍来逼我師殆亂前軍節度使李嗣業謂子儀曰今日之事若不以身啖寇讎决戰取勝三軍之士無孑遺矣言訖乃仗長刀立陣前觧衣袒而大呼手殺數十人陣容方整繇是前軍之士皆執長刀如墻而進所向摧靡先是賊伏一軍於營東候動則發偵者知之以告帝親率廻紇鋭卒剪其伏軍遂躡大營背與嗣業合勢表裏夾攻自辰及酉斬首六萬餘級賊軍大潰填溝澗而死者十七八長安城中賊黨震慄喧囂之聲終夜不止賊黨張通儒為賊居守聞忠等大敗遂與麾下并賊偽官萬餘人宵遁西京平遲明帝乃整軍容入城城内百姓僧道老㓜遮道歡呼咸曰不圖今日復見國家舊儀帝所至宣恩慰撫城内纎毫無犯乃命後軍王思禮屯兵於􅁐以清宫禁親率大軍而東時逆賊安慶緒盡出精鋭十餘萬使其黨嚴荘張通儒合軍保陜州帝與副元帥郭子儀大將李嗣業王思禮等率廻紇南蠻大食等㑹戰於陜西賊軍大敗生擒斬馘十餘萬通儒等遁走慶緒聞之竊與其黨自􅁐北門夜遁奔於河朔東京平帝入東京陳兵於天津橋宣恩勞徕士庶歡躍聲震四逺河南河東諸州為賊所陷者皆歸順十月肅宗還京師發使奉迎𤣥宗至自蜀郡居興慶宫百司文物三宫容衞悉復舊儀皆帝之功也徳宗初封奉節郡王代宗寳應元年五月以胡寇史朝義尚據東都議出師東征帝為天下兵馬元帥十月領河南朔方諸節度廻紇兵馬赴陜僕固懐恩與廻紇左殺為先鋒魚朝恩郭英乂為後殿自澠池入李抱玉自河陽入副元帥李光弼自陳留入帝留陜州與朝義戰於邙山之下逆賊敗績走渡河斬首萬六千生擒四千六百降三萬二千人器械不可勝數朝義走投汴州偽將張獻誠拒之乃渡河北投幽州二年正月賊為范陽節度使李懐仙於莫州生擒之送欵来降梟首至闕下代宗以帝大勲特拜尚書令元帥如故郭子儀李光弼等二十四人並賜鐡券圖形凌煙閣憲宗元和中諸軍進討淄青李師道擒之斬其首送於魏博軍國家自天寳末安禄山首亂兩河至寳應元年王師平史朝義其將薛嵩李懐仙田承嗣李寳臣等先受偽命分領州郡凡數十時朝廷厭兵遂各因其舊任真授焉及侯希逸為軍人逐出正已又據有齊魯之地既而逓相膠固聮結姻好職貢不入法令不加率以為常仍皆置其子為副大使身死繼立則以三軍之請聞亦有為其大将所殺而自立者自艱難以後迄於貞元朝廷多務優容每聞其擅襲因即而授之以故六十餘年兩河號為反側之俗元和初始則誅楊惠琳劉闢李錡三年来于頔五年擒盧從史張茂昭獻所管易定二州舉族歸闕七年田𢎞正定魏博相衛澶貝六州十二年斬吳元濟平蔡申光三州是年斬李師道平鄆曹濮淄青齊登莱兖海沂宻凡十二州程權歸朝得滄景王承宗求削地納徳棣𢎞鎮汴宋亳潁四州二十餘縣是歳入朝乞留京師以贖前過於是河南河北合三十一州復為王土焉宣宗大中三年正月丙辰涇原節度使康季榮奏吐蕃宰相論恐熱以秦原安樂三州及石門等七闗之兵民歸國六月康季榮又奏收復原州城及石門驛藏木峽制勝六磐石峽等六闗邠寧張君緒奏今月十三日收復蕭闗敕於蕭闗置武州改安樂州為威州七月三州七闗軍人百姓皆河隴遺黎數千人見於闕下帝御延喜門撫慰令其觧辮賜之冠帶於時康衢觀者傾都咸稱萬歳共賜絹一十五萬疋八月鳯翔節度使李玭奏復秦州八月制曰昔皇王之有國也何嘗不文以守成武以集事叅諸二柄歸乎大寧朕猥荷丕圖思𢎞景業憂勤戒惕四載於茲每念河湟土疆綿亘遐濶天寳末犬戎乘我多難無力禦姦遂縱腥膻不逺京邑事更十葉時近百年進士試能每不竭其長䇿朝廷下議皆亦聴其署詞盡以不生邉事為永圗且守舊地為明理荏苒於是收復無繇今者天地儲祥祖宗垂佑左袵輸欵邉壘連降刷耻建功所謀必尅實賴樞衡妙筭将帥雄威副𤣥宗不争之文絶漢武逺征之悔甌脱頓空於内地斥堠全據於新封莫大之休指期而就嗚呼七闗要害三州膏腴候舘之殘址可尋唐人之遺風盡在追懐徃事良使興嗟夫取不在廣貴保其金湯得必有時詎計於遲速今則便務脩築不進干戈必使足食足兵有備無患載洽亭育之道永致生靈之安可改蕭闗為武州安樂州為威州仍令殖三州七闗之地以廣塩鹵之利贍濟邉人三鎮将士共賜帛一十五萬匹委度支别據等第指揮五年七月土蕃沙州刺史張義潮遣兄義潭以𤓰沙伊蕭等十一州戸口来獻自河隴陷蕃百餘年至是悉復隴右故地十二月沙州置歸義軍以張義潮為𤓰沙伊等州節度使後唐荘宗同光元年四月即位於魏州閏月平梁鄆州梁末帝聞鄆陷大恐七月丁未帝御軍㳂河而南戊午遣騎将李紹貽直抵梁壘梁軍益恐八月還鄴十月壬申帝御大軍自楊劉濟河甲戌攻中都擒梁将王彦章等将吏二百餘人斬馘二萬奪馬千匹丁丑次曹州郡将出降己夘遲明前軍至汴城明宗令左右捉生攻封丘門梁開封尹王瓉請以城降俄而帝與大将繼至瓉迎帝自梁門入梁末帝巳為其将皇甫鏻所弑函首以獻二年九月大舉伐蜀以衞王繼岌為西川四面行營都統以樞宻使郭崇韜為招討使十月丙辰蜀主王衍降自興師出洛至定蜀城計七十五日走丸之勢前代所無檢蜀之府藏得歩騎兵一十三萬兵仗七百萬糧二百五十三萬錢一百九十三萬貫金銀共二十二萬珠玉犀象二萬錦綾羅五十萬得節度軍額十州六十四縣二百四十九明宗初在太祖左右大順中吐渾黠戞斯侵代北䧟遮虜軍執我軍使劉胡子時遣大將李存信拒戰不利太祖讓存信曰非蕃部難敵乃公之巽懦也吾擇帳下豪俊副公戰必捷矣遂命帝副存信軍再戰果捷存信時為河東蕃漢歩騎大将四征討伐畧無虛歳嘗命帝左右其軍唐昭宗乾寧三年四月魏博節度使羅𢎞信背盟襲破李存信於華縣帝奮命殿戰信宿至洛州諸軍稍集太祖怒存信奪其兵符賞帝殿戰之功乃以帝所屬五百騎號曰横衝都侍於帳下天復中梁太祖遣氐叔琮將兵五萬營於同渦是時諸道之師畢萃於太原郡縣多䧟於梁晋陽城外營壘相望太祖命帝與李嗣昭分兵四出突入諸營梁軍繇是引退率偏師追襲復諸郡邑都府復完天佑五年五月荘宗将兵救潞州之圍帝入夾城大破梁軍即日觧圍其功居最七年十二月鎮冀節度使王鎔為梁軍所撃營於栢鄉遣使来求援帝時掌内衙親軍從荘宗赴援東出贊皇次於趙州命帝與史建瑭徑趨栢鄉嘗寇獲賊士詰兵數曰精兵七萬堅取鎮州周徳威以賊勢雄盛􅁨之與監軍使張承業謀退舎荘宗從其謀退保鄗邑八年正月二日命帝與周徳威将三千騎致師於栢鄉設伏於村塢間帝率百騎直壓賊營韓効怒悉其軍結陣而来帝與之轉戰所向靡不克捷以功授代州刺史十年荘宗遣周徳威伐幽州帝分兵略定山後八軍與劉守光愛将元行欽戰於廣邉軍凡八陣帝控弦發矢七中行欽遂降之十三年二月荘宗與梁将劉鄩大戰於故元城北帝以三千騎環之皷譟奮擊内外合勢鄩軍殆盡帝狥地磁洺四月梁相州守将張筠遁走乃以帝為相州刺史尋除邢州節度使十四年四月契丹阿保機率衆三十萬攻幽州周徳威間使告急荘宗命帝與李存審閻保率軍赴援帝為前鋒距幽州兩舍虜騎當谷口而陣帝與末帝舞撾奮擊萬衆披靡挟其酋帥而還虜衆大敗勢如席卷委棄鎧仗羊馬殆不勝紀是日觧圍十八年十月從荘宗大破梁将戴思逺於戚城斬首二萬級加同平章事充蕃漢馬歩副總管二十年代李存審為滄州節度使同光元年四月荘宗即位加侍中閏月命帝率歩騎五千人星馳襲梁鄆州下之授天平軍節度使九月梁将王彦章以歩騎萬人廹鄆州自中都進渡汶河帝出騎逆賊至遞坊鎮遇彦章都校任釗等數千騎因與之戰生獲任釗田章二百餘人十月癸酉荘宗親御六師至鄆州是夜命帝以騎軍為前鋒大将繼進詰朝遇賊軍一戰敗之追至中都俄而大圍合城無所備賊潰圍而出擊之大破生擒大将王彦章及監軍張漢傑趙廷隐等時梁將段凝率大軍屯於澶淵帝言於荘宗曰竒兵貴速今破是賊段凝輩必未傳聞縱走人告彼信否之間更須三日假使察吾所向便發救軍直路且阻决河須繇滑州濟渡數萬之衆舟檝亦難卒辦此去汴程途咫尺前無山險方陣横行晝夜兼程信宿即至段凝未起河壖友貞為吾俘矣徑取汴州上計也請陛下御軍徐進臣願以千騎前驅荘宗嘉之帝即時騎軍前進乙亥荘宗發中都己夘遲明帝先至汴州令左右捉生都攻封丘門城中震駭倒戈請罪開封尹王瓉開門迎䧏汴州平周世宗顯徳二年四月詔鳯翔節度使王景攻収秦鳯二州六月以曹州節度使韓通充西南面行營都虞候九月偽秦州觀察判官趙玭以城降十月成州歸順十一月收復鳯州初晉末契丹犯闗秦州節度使何建以秦城階三州入蜀蜀人又收鳯州至是秦鳯人戸怨蜀苛政相次詣闕乞舉兵收復舊地因而平之四年二月幸淮南督諸軍收夀州三月乙丑大陳師旅繇浮橋濟淮抵壽州之北庚寅帝躬擐甲胄擁兵攻破紫金山砦擒獲甚衆夀州劉仁瞻奉表請降夀州平四月還京十月復幸淮南十二月泗州濠州並以城歸順是月江南李景遣兵驅虜揚州士庶渡江焚其州郭而去五年正月命将攻海州楚州並㧞之天長軍使以城歸順三月丙申李景遣其臣偽兵部侍郎陳覺奉表来上且乞畫江為界江北平凡得州十四縣六十户二十二萬六千五百七十四以江南内附頒詔於天下六年三月帝幸乾寧軍大治舟師以備北伐四月丁酉帝御龍舟率内六軍鳴皷棹順流而北自闗之西河路漸溢水不能勝舟帝捨舟入於瓦橋闗偽莫州刺史劉信上表歸順五月乙巳朔侍衞軍使李重進已下諸将相帥師而至是日偽瀛州刺史髙彦輝上表歸順闗南平凡得州五縣十七戸一萬八千三百六十一是行也王師數萬不發一矢而虜界城邑皆迎刃而下册府元龜卷二十
