body:
  text: 册府元龜卷三百七十二宋王欽若等撰將帥部忠第三梁馬仙琕為齊寜朔將軍豫州刺史時義師起四方多響應高祖使其故人姚仲賓説仙琕仙琕於軍斬仲賓以殉義師至新林仙琕猶持兵於江西口抄運建康城陷仙琕號哭經宿乃解兵歸罪霍俊為軍主時侯景渡江俊與邵陵王綸同為賊所敗俊見獲賊送於城下逼云已擒邵陵偽許之乃曰軍小失利正為糧盡還京口王在俊為託邏所獲非軍敗也賊以刀背毆其髀俊色不變賊義而捨之楊公則領白馬戍主為氐賊李烏奴所攻陷公則抗聲罵賊烏奴壯之更厚待焉要與同事公則偽許而圖之謀洩單馬逃歸宋州刺史王𤣥邈以事表聞高帝下詔褒美後為中䕶軍散騎常侍時朝廷始議北伐以公則威名素著至京師詔假節先屯雒口公則受命遘疾謂親人曰昔廉頗馬援以年老見遺猶自力請用今國家不以吾朽懦任以前驅方以古人見知重矣雖臨途疾苦豈可僶俛辭事馬革還葬此吾志也遂彊起登舟至雒口夀春士女歸降者數千戸魏豫州刺史薛恭度遣長史石榮等前鋒接戰即斬石榮逐北至夀春去城數十里乃反疾卒於師蔡道恭為司州刺史平北將軍天監三年魏軍圍司州道恭拒守魏軍憚之將退㑹道恭疾篤乃呼兄子僧勰從弟靈恩及諸將帥謂曰吾受國厚恩不能破滅冦賊今所苦轉篤勢不支乆汝等當以死固節無令吾没有遺恨又令取所持節謂僧勰曰稟命出疆慿此而已既不得奉以還朝方欲攜之同逝可與棺柩相隨衆皆流涕其年五月卒魏知道恭死攻之轉急先是朝廷遣郢州刺史曹景宗率衆赴援景宗到鑿峴頓兵不前至八月城内糧盡乃陷裴之横為直閣將軍侯景亂出為貞威將軍𨽻鄱陽王範討景濟江仍與範長子嗣入援連營度淮據東城京都陷退還合肥與範泝流赴湓城景遣任約上逼晉熈範令之横下援未及至範薨之横乃還時尋陽王大心在江州範副梅思立宻要大心襲湓城之横斬思立而距大心大心以州降侯景之横率衆與兄之高同歸元帝承制除散騎常侍廷尉卿江子一為戎昭將軍時侯景反攻陷歴陽自横江將渡子一帥舟師千餘人於下流欲邀之其副董桃生家在江北因與其黨散走子一乃退還南州復收餘衆步赴京師賊亦尋至子一啓簡文云賊圍未合猶可出盪若營栅一固無所用武請與其弟子四子五帥所領百餘人開承明門挑賊許之子一乃身先士卒抽戈獨進羣賊夾攻之從者莫敢繼子四子五見事急相引赴賊並見害張嵊為呉興太守太清二年侯景圍京城嵊遣弟伊率郡兵數千人赴援三年京城陷御史中丞沈浚避難東歸嵊徃見而謂曰賊臣慿陵社稷危耻正是人臣效命之秋今欲收集兵力保據郡邑若天道無靈忠節不展雖復及死義亦無恨浚曰鄙郡雖仗義拒逆誰敢不從固勸嵊舉義於是收集士卒繕築城壘時邵陵王東奔至錢塘聞之遣板授嵊征東將軍加侍中二千石嵊曰朝廷危迫天子蒙塵今日何情復受榮號留板而已賊行臺劉神茂攻破義興遣使說嵊曰若蚤降附當還以郡相處復加爵賞嵊命斬其使仍遣軍主王雄等帥兵於鯉瀆逆擊之破神茂神茂退走侯景聞神茂敗乃遣其中軍侯子鑒帥精兵二萬人助神茂以擊嵊嵊遣軍主范智朗出郡西拒戰為茂所敗退歸賊騎乗勝焚栅栅内衆軍皆奔嵊乃釋戎服坐於㕔事賊臨之以刃終不為屈乃執嵊以送景景刑之於都市子弟同遇害者十餘人徐文盛為持節督寜州刺史太清中聞國難乃召募得數萬人來赴世祖嘉之以為持節散騎常侍左衞將軍督梁南秦沙東益巴北巴六州諸軍事仁威將軍秦州刺史柳仲禮為司州刺史太清二年侯景反仲禮率衡州刺史韋粲南陵太守陳文衡宣猛將軍李孝欽等皆來赴援羊鵶仁為北司州刺史太清二年侯景既背盟鵶仁乃與趙伯超及南康王㑹理共攻賊於東府城反為賊敗臺城陷景以為五兵尚書鵶仁常思奮發謂所親曰吾以凡流受寵朝廷竟無報効以答重恩今若以此終没有餘責因泣下見者傷焉三年出奔江西將赴江陵至東莞為故北徐州刺史荀伯道子晷所害臨死以報効不終因而泣下韋粲為安逺將軍衡州刺史太清元年粲至州無㡬便表解職二年徴為散騎常侍粲還至廬陵聞侯景作逆便簡閱部下得精卒五千馬百疋倍道赴援至豫章奉命報云賊已出横江粲即就内史劉孝儀共謀之孝儀曰必如此當有别勅豈可輕信單使妄相驚動或恐不然時孝儀置酒粲怒以杯抵地曰賊已渡江便逼宫闕水陸俱斷何暇有報假令無勅豈得自安韋粲今日何情飲酒即馳馬出部分將發㑹江州刺史當陽公大心遣使要粲粲乃馳徃見大心曰上㳺蕃鎮江州去京最近殿下情計實宜在前但中流任重當須應接不可闕鎮今宜且張聲勢移鎮湓城行遣偏將賜隨於事便足大心然之遣中兵柳昕帥兵二千隨粲粲悉畱家累於江州以輕舸就路至南州粲外弟司州刺史柳仲禮亦帥步騎萬餘人至横江粲即送糧仗贍給之并散私金帛以賞其戰士先是安北將軍鄱陽王範亦自合肥遣西豫州刺史裴之高與其長子嗣帥江西之衆赴京師屯於張公洲待上流諸軍至是時之高遣舩渡仲禮與粲合軍進屯王遊苑粲建議推仲禮為大都督報下流衆軍裴之高自以年位高耻居其下乃云柳節下是州將何須我復鞭板累日不決粲乃抗言於衆曰今者同赴國難義在除賊所以推柳司州者正以乆捍邉疆先為侯景所憚且士馬精銳無出其前若論位次柳在粲下語其年齒亦少於粲直以社稷之計不得復論今日貴在將和若人心不同大事去矣裴公朝之舊齒年徳已隆豈應復挾私情以阻大計粲請為諸君解釋之乃單舸至之高營切讓之曰前諸將之議豫州意所未同即二宫危逼猾宼滔天臣子當戮力同心豈可自相矛楯豫州必欲立異鋒鏑便有所歸之高垂泣曰吾荷國恩榮自應帥先士卒顧恨衰老不能效命企望柳使君共平㓙逆謂衆議已定無俟老夫耳若必有疑當剖心相示於是諸將定議仲禮方得進軍次新亭賊列陣於中興寺相持至晩各解歸是夜仲禮入粲營部分衆軍旦日將戰諸將各有據守令粲頓於青塘當石頭中路粲慮栅壘未立賊必爭之頗以為憚謂仲禮曰下官才非禦侮直欲以身徇國節下善量其冝不可致有虧喪仲禮曰青塘立營迫近淮渚欲以糧儲舩乘盡就泊之此是大事非兄不可若疑兵少當更差軍相助乃使直閣將軍劉叔𦙍帥兵助粲粲帥所部水陸俱進時值昏霧軍人迷失道比及青塘夜已過半壘栅至暁未合景登禪靈寺閣望粲營未立便率銳卒來攻軍副王長茂勸據栅待之粲不從令軍主鄭逸逆擊之命劉叔𦙍以水軍截其後𦙍畏懦不敢進逸遂敗賊乗勝入營左右牽粲避賊粲不動猶率子弟力戰兵死畧盡遂見害粲子尼及三弟助警構從弟昂皆戰死親戚死者數百人賊𫝊粲首闕下以示城内太宗聞之流涕曰社稷所寄維在韋公如何不幸先死行陣詔贈護軍將軍世祖平侯景追諡曰忠貞并追贈助警構及尼皆中書即昂員外散騎常侍羊侃為都官尚書侯景反逼城侃親拒之景遣儀同傅士哲呼侃與語曰侯王遠來問訊天子何為閉距不時進納尚書國家大臣宜啓朝廷侃曰侯將軍奔亡之後歸命國家重鎮方城懸相任寄何所患苦忽致稱兵今驅烏合之衆至王城之下虜馬飲淮矢集帝室豈有人臣而至於此吾荷國重恩當稟承廟筭以掃大逆耳不能妄受浮說開門揖盜幸謝侯王蚤自為所士哲又曰侯王事君盡節不為朝廷所知欲面啓至尊以除姦佞既居戎旅故帶甲來朝何謂作逆侃曰聖上聰明叡哲無幽不炤有何姦佞而得在朝欲飾其非寧無詭說且侯王親舉白刅以向城闕事君盡節正若是邪士哲無以應乃曰在北之日乆挹風猷願去戎服得一相見侃為免胄士哲瞻望乆之而去陳沈恪仕梁為宣猛將軍監呉興郡自呉興入朝高祖受禪使中書舍人劉師知引恪令勒兵入辭因徴衛梁敬帝如别宫恪乃排闥入見高祖曰恪身經事蕭家來今日不忍見此事分受死耳決不奉命高祖嘉其意乃不復逼章昭逹為鎮南將軍江州刺史廢帝即位遷侍中華皎之反也其移文檄並假以昭逹為辭又頻遣使招之昭達盡執其使送於京師皎平進號征南將軍増邑并前二千五百戸韓子高初文帝出守呉興子高事帝恭謹帝甚寵愛之帝之討張彪也沈泰等先降文帝據有州城周文育鎮北郭香巖寺張彪自郯縣夜還襲城文帝自北門出倉卒暗夕軍人擾亂文育亦未測文帝所在唯子高在側文帝乃遣子高自亂兵中徃見文育反命酬答於闇中又徃慰勞衆軍文帝散兵稍集子高引入文育營因共立栅明日與彪戰彪將申縉復降彪奔松山浙東平文帝乃分麾下多配子高子高亦輕財禮士歸之者甚衆文帝嗣位除右軍將軍侯安都為鎮西將軍討余孝勵還軍至南皖而高祖終安都隨文帝還朝仍與羣臣定議翼奉文帝時帝謙讓弗敢當太后又以衡陽王故未肯下令羣臣猶豫不能決安都曰今四方未定何暇及遠臨川王有功天下須共立之今日之事後應者斬便按劍上殿白太后出璽又手解文帝髮推就喪次文帝即位遷司空仍為都督南徐州諸軍事征北將軍南徐州刺史程靈洗為郢州刺史雲麾將軍華皎之叛也遣使招誘靈洗靈洗斬皎使以狀聞朝廷深嘉其忠増其守僃給鼓吹一部因推心待之魯廣逹為中領軍隋賀若弼進軍鍾山廣逹率衆於白􅁟崗置陣與弼旗鼓相對廣逹躬擐甲胄手執桴鼓率勵敢死冐刃而前隋軍退走廣逹逐北至營殺傷甚衆如是者數四焉及弼攻敗諸將乗勝至宫城燒北掖門廣逹猶督餘兵苦戰不息斬獲數十百人㑹日暮乃解甲面臺冄拜慟哭謂衆曰我身不能救國負罪深矣士卒皆涕泣歔欷於是乃就執禎明三年依例入隋廣逹愴本朝淪覆遘疾不治尋以憤慨卒尚書令江總撫柩慟哭乃命筆題棺頭為詩曰黄泉雖抱恨白日自流名悲君感義死不作負恩生總又製廣逹墓銘其畧曰災流淮海險失金湯時屯運極代革天亡爪牙背義甲冑無良獨標忠勇率禦有方誠貫皎日氣勵嚴霜懐恩感報撫事何忘王猛徙鎮廣州未之鎮而隋師濟江猛總督所部赴援時廣州刺史臨汝侯方慶西衡州刺史衡陽王伯言並𨽻猛督府各觀望不至猛使高州刺史戴知烈清逺太守曽孝逺各以輕兵就斬之而發其兵後魏劉潔道武時為㑹稽公與永安侯魏勤率衆三千人屯於西河以鎮撫之又與勤及功勞將軍元屈等擊吐京叛胡時離石胡出以眷引屈丐騎斷截山嶺邀潔潔失馬登山力戰矢刃俱盡為胡所執送詣屈丐潔聲氣不撓呼其字而與之言神色自若屈丐壯而釋之後得還國崔𤣥伯為周兵將軍時明元未立清河王紹聞人心不安大出財帛班賜朝士𤣥伯獨不受明元即位命𤣥伯居門下虚己訪問以不受紹賜財帛特賜帛二百匹叔孫俊年十五以便弓馬為獵即清河王紹閉宫門明元在外以俊為爪牙明元即位命俊與元磨渾等拾遺左右及朱提王恱將為大逆俊覺恱舉動有異便引手掣之乃於恱懐中得兩刃匕首遂殺之段進太武初為白道守將蠕蠕大檀入塞圍之力屈被執進抗聲大罵遂為賊所殺太武愍之追贈安北將軍賜爵顯美侯諡曰壯陳建以善騎射擢為三即稍遷下大夫内行長太武討山胡白龍輕之單將數十騎登山臨嶮每日如此白龍乃伏壯士十餘處出於不意太武墮馬㡬至不測建以身捍賊大呼奮擊殺賊數人身被十餘鎗太武壯之賜户二十盧魯元為散騎常侍右將軍從征赫連昌太武親追擊之入其城門魯元隨太武出入是日微魯元㡬至危殆劉尼為振威將軍宗愛既殺南安王余於東廟秘之唯尼知狀尼勸愛立文成愛自以負罪於景穆聞而驚曰君大癡人皇孫若立豈忘正平時事乎尼曰若爾今欲立誰愛曰待還宫擢諸王子賢者而立之尼懼其有變密以狀告殿中尚書源賀賀時與尼俱典兵宿衞仍共南部尚書陸麗謀曰宗愛既立南安還復殺之今不能奉戴皇孫以順民望社稷危矣將欲如何麗曰唯有密奉皇孫耳於是賀與尚書長孫渇侯嚴兵守衞尼與麗迎文成於苑中麗抱文成於馬上入於京城尼馳東廟大呼曰宗愛殺南安王大逆不道皇孫已登大位有詔宿衞之士皆可還宫衆咸唱萬歲賀及渇侯登執宗愛賈周等勒兵而入奉文成於宫門外入登永安殿以尼為内行長進爵建昌侯遷散騎常侍安南將軍源賀為征西將軍南安王余之為宗愛所殺也賀部勒禁兵靜遏内外與南部尚書陸麗決議定䇿翼戴文成令麗與劉尼馳詣苑中奉迎文成賀守禁中為之内應俄而麗抱文成單騎而至賀乃開門文成即位社稷大安賀有力焉後遷太尉獻文將𫝊位於京兆王子稚時賀都督諸軍屯漢南乃馳𫝊徴賀賀既至乃命公卿議之賀正色固執不可即詔賀持節奉皇帝璽以授孝文崔僧淵為顯武將軍討海賊於黄郭大破之齊明帝乃遣其族兄慧景遺僧淵書說以入國之屈規令改圖僧淵復書曰主上之為人也無幽不炤無細不存仁則無遠不及博則無典不究殫三墳之㣲盡九丘之極至於文章錯綜煥然蔚炳猶夫子之墻矣遂乃開獨悟之明尋先王之迹安遷靈荒兆變帝基惟新中壤宅臨伊域三光起重輝之照庶物蒙再化之始分氏定族列甲乙之科班官命爵清九流之貫禮俗之叙粲然復興河雒之間重隆周道巷歌邑頌朝熈門穆濟濟之盛非可備陳矣加以累葉重光地兼四岳士馬彊富人神欣仰道徳仁義民不能名且大人之出本無所在况從聖繼聖至夫子孫者乎聖上諸弟風度相類咸陽王已下莫不英越枝葉扶踈遍在天下所稱稍蝎殊為未然文士競謀於廟堂武夫効勇於疆埸若論事勢此為實矣計彼主簒殺之迹人鬼同知疑親猜貴蚤暴遐邇况投心逆節千載何名物患無施器非時用生不振世沒無令聲先師以為鄙君子以為愧此則事困伎殫自勉無益故其宜矣以兄之才夙超鄉土如弟之徒誰不瞻仰毎尋昔念未敢忘懐雖復途遥二千心想若對敬遵美範以資一生今名可揚矣而不能顯親事可變矣而不能離辱故世之所未解也且君子在家也不過孝於其親入朝也不過忠於其君主上之於兄恩則不可酬義則不可背身可殺也故非其酬功不逮也故非其報今可以效矣而又弗為非孝也即實而言兄之不變得為忠乎至於講武争彊不敵者乆矣論安與危不同者驗矣羣情皆去獨畱者謬矣願深察之王晏道絶外交器非雄朗専華保望便就屠割方之於兄其全百倍且淮蕃海捍本出北豪夀春之任兄何繇免以是而言猜嫌已決又宗門未㡬南北莫寄先搆之重非兄何託受社之榮鄙心之相望矣今執志不寤忠孝両忘王晏之辜安能自保見機而作其在兹乎國家西至長安東盡即墨營造器甲必盡堅精晝夜不息者於兹數載今秋仲月雲羅必舉賈不及時雖貴不用若不蚤圖沉枉連城矣枚乗有言欲出不出間不容髮精哉斯談弟中於北京身罹事譴大造之及有獲為幸比蒙清舉超進非一犬馬之心誠有在矣雖復彼此為異猶昔情不移也况於今日哉如兄之誨如弟之規改弦易調易於反掌萬一乖情此將運也劉渇侯太和中為徐州後軍以力死戰衆寡不敵遂被禽瞋目大罵終不降屈為賊所殺孝文贈立忠將軍平州刺史上庸侯賜絹千疋榖千斛嚴季為軍校尉與劉渇侯同殿勢窮被執終不降屈後得逃還除立節將軍賜爵五等男鄧翼為河間相父羌苻堅車騎將軍慕容垂之圍鄴以翼為後將軍冀州刺史真定侯翼泣對使者曰先君忠於秦室翼豈可先叛乎忠臣不事二主自古通義未敢聞命垂遣使喻之曰吾與車騎結異姓兄弟卿亦猶吾之子弟安得辭乎翼曰冀州宜任親賢翼請他役效命垂乃用為建武將軍河間太守長孫道生為司空侍中第宅卑陋出鎮後其子弟頗更修繕起堂廡道生還嘆曰昔霍去病以匃奴未㓕無用宅為今彊寇尚遊魂漢北吾豈可安坐華美也乃切責子弟令毁宅長孫稚為平東將軍尚書右僕射時雍州刺史蕭寳夤據州反以稚為行臺討之稚時背疽未愈靈太后勞之曰卿病患如此朕欲相停更無可寄如何稚答曰死而後已敢不自力其子彦亦患脚痺扶杖入辭尚書僕射元順顧相謂曰吾等僃為大臣各居寵位危難之日病者先行無乃不可乎莫有對者崔楷為後將軍殷州刺史時葛榮自破章武廣陽二王之後鋒不可當初楷將之州人咸勸畱家口單身述職楷曰食人之禄憂人之事如一身獨徃朝廷謂吾有進退之計將士又誰肯為人固志也遂合家赴州三年春賊勢已逼或勸减小弱以避之乃遣第四女第三兒夜出既而召寮屬共論之咸曰女即出嫁之女即君小未勝兵畱之無益去復何損且使君在城家口尚多足固將士之意竊不足為疑楷曰國家豈不知城小力弱也置吾死地令吾死耳一朝送免兒女將謂吾心不回虧忠全愛臧獲耻之况吾荷國重寄也遂命追還州既新立了無禦僃之具及賊來攻楷率力抗拒彊弱勢懸每勒兵士撫勵之莫不爭奮咸稱崔公尚不惜百口吾等何愛一身連戰半旬死者相枕力竭城陷楷執節不屈賊遂害之楷長子士元假征虜將軍防城都督隨楷之州州陷亦戰殁楷兄弟父子竝死王事朝野傷嘆焉贈使持節散騎常侍鎮軍將軍定州刺史杜顒孝明時為征西將軍行岐州事蕭寳夤起逆顒據州不從還除征虜將軍荆州刺史以守岐州勲封平陽縣開國伯邑五百戸晁清為梁城戍將梁武攻圍糧盡城陷清抗節不屈為敵所殺贈樂陵太守諡曰忠王榮世陽平館陶人為三城戍主梁武帝攻圍力窮知不可全乃先焚府庫後殺妻妾及賊陷城與戍副鄧元興等俱以不屈被害孝明下詔褒美忠節進榮世爵為伯贈齊州刺史元興開國子贈雒州刺史田益宗為安南將軍時白早生反於豫州自雒口已南郢豫二州諸城皆没於梁唯有義陽而已梁武帝招益宗以車騎大將軍開府儀同三司五千戸郡公當時安危在益宗去就而益宗守節不移郢豫尅平益宗之力也胡小虎少有武氣孝明時為綂軍於晉夀孝昌中梁將樊文熾等㓂邉益州刺史邴虬遣長史和安固守小劍文熾圍之虬命小虎與綂軍崔珍寳同徃防拒文熾掩襲小虎珎寳並禽之文熾攻小劍未陷乃將珎寳至城下使謂和安曰南軍彊盛北救不來豈若歸𨽻取其富貴和安命射之乃退復逼小虎與和安交言小虎乃慷慨謂安曰我栅不防為賊所虜觀其兵士勢不足言努力堅守魏行臺𫝊檄梁州遣將已至賊以刀歐擊言不得終遂害之三軍無不歎其壯節哀其死亡賊尋奔敗禽其次將蕭世澄陳文緒等一十一人行臺魏子建壯其氣槩啓以世澄購其屍柩乃獲骸骨歸𦵏之鄭先護為前將軍廣州刺史後元顥入雒莊帝北巡先護據州起義兵不受顥命顥遣尚書令臨淮王彧率衆討之先護出城拒戰莊帝還京嘉其誠節除使持節散騎常侍都督襄廣二州諸軍事鎮南將軍刺史如故高諒為驍騎將軍為徐州行臺至彭城屬元法僧反叛逼諒同之諒不許為法僧所害楊侃為右將軍岐州刺史屬元顥内逼以本官假撫軍將軍為都督率衆鎮大梁未發詔行北中郎將孝莊徙御河北執侃手曰朕停卿藩寄移任此者為今日但卿尊卑百口若随朕行所累處大卿可還雒寄之後圖侃曰此誠陛下曲恩寧可以臣微族頓廢君臣之義固求陪從至建州叙行從功臣自成陽王徽已下凡十人並增三階以侃河梁之誠特加四階侃固辭乞同諸人乆乃見許賈智為冗從僕射梁將夏侯䕫攻郢州以智為龍驤將軍别將討之至則䕫退智乃入城及刺史元顯逹以城降於梁智勒城人不欲叛者與顯逹交戰相率歸闕智為東中即將及爾朱仲遠為徐州刺史智𨽻爾朱仲逺赴彭城爾朱榮之死也仲遠舉兵向雒智不從遂擁兵出清水東招勒州民與相拒擊莊帝聞而善之因鎮徐州普泰初還雒仲遠忿其乖背議欲殺之智兄顯度先為爾朱世隆所厚世隆為解喻得全賈思同為平南將軍襄州刺史及元顥之亂也思同與廣州刺史鄭光護竝不降莊帝還宫封營陵縣開國男邑二百戸除撫軍將軍羊深為二兖行臺爾朱榮殺害朝士深第七弟侃為太山太守性麤武遂率鄉人外託於梁深在彭城忽得侃書招深同逆深慨然流涕斬侃使人并書表聞莊帝乃下詔曰羊侃作逆霧起瑕丘擁集不逞扇擾疆埸傾宗之禍侃乃自貽累世之節一朝毁汗羊深血誠奉國秉操罔二聞弟猖悖自劾請罪此之丹欵實戢于懐且叔向復位春秋稱美深之慷慨氣同古人忠烈遠彰赤心已著可令還朝面受委勅乃歸京師除名崔光韶河東武城人為司空從事中郎以母老解官歸養孝莊初河間邢杲率河北流民十餘萬衆攻逼州郡刺史元儁憂不自安州人乞光韶為長史以鎮之時陽平路囘寓居齊土與杲濳相影響引賊入郭光韶臨機處分在難確然賊退之後刺史表光韶忠毅朝廷嘉之發使慰勞焉尋為東道軍司及元顥入雒自河以南莫不風扉而刺史廣陵王欣集文武以議所從欣曰北海長樂俱是同堂兄弟今宗祏不移我欲受教諸君意各何如在堂之人莫不失色光韶獨抗言曰元顥受制梁國稱兵本朝㧞本塞源以資讎敵亂臣賊子曠代少儔何但大王家事所宜切齒臣等荷朝眷未敢仰從長史崔景茂前瀛州刺史張烈前郢州刺史房叔祖徴士張僧皓咸云軍司議是欣乃斬顥使賀拔勝初為廣陽王深帳内軍主歸爾朱榮為積射將軍累遷武衞將軍爾朱榮之死也勝與田怡等赴榮第於時宫殿之門未加嚴防時怡等議即攻門勝止之曰天子既行大事必當更有竒謀吾等衆旅不多何可輕爾但得出城更為他計怡乃止及世隆夜走勝遂不從莊帝嘉之宇文顯和孝武時為冠軍將軍關内都督及齊神武専政帝每不自安謂顯和曰天下洶洶將若之何對曰當今之計莫若擇善而從之因誦詩云彼美人兮西方之人兮帝曰是吾心也遂定入關之䇿帝以顯和母老家累又多令預為計對曰今日之事忠孝不可竝立然臣不宻則失身安敢預為私計帝愴然改容曰卿我之王陵遷顯和直閣閣内大都督楊昱為南道都督時元顥侵逼大梁除昱為鎮東將軍光禄大夫加散騎常侍使持節假車騎將軍為南道大都督鎮榮陽顥既擒濟隂王暉業乗虚徑進大兵集於城下遣其左衞劉業王道安等招昱令降昱不從顥遂攻之城陷昱與弟息五人在門樓上須􅁷顥至執昱下城面責昱曰楊昱卿今死甘心否卿自負我非我負卿也昱答曰分不望生向所以不下樓者正慮亂兵耳但恨八十老父無人供養負痛黄泉求乞小弟一命便死不朽也顥乃拘之明旦顥將陳慶之胡光等三百餘人伏顥帳前請曰陛下渡江三千里無遺鏃之費昨日一朝殺傷五百餘人求乞楊昱以快意顥曰我在江東嘗聞梁主言初下都日袁昂為呉郡不降稱其忠節奈何殺楊昱自此之外任卿等所請於是斬昱下統帥三十七人皆令蜀兵刳腹取心食之顥既入雒除昱名為民北齊高翼仕魏為東冀州刺史鎮東將軍時爾朱榮弑莊帝翼保境自守謂諸子曰主憂臣辱主辱臣死今社稷阽危人神憤怨破家報國在此也爾朱兄弟性甚猜忌忌則多害汝等宜早圖之先人有奪人之心時不可失也事未輯而卒平鑒仕魏孝昌末為爾朱榮撫軍神武謂鑒曰日者皇綱中弛公已早竭忠誠今爾朱披猖又能去逆從善揺落之時方識松筠即啓授征西懐州刺史高季式仕魏為衞將軍元象中西宼大至孝文親率三軍以禦之陣於北邙師徒大敗河中流尸相繼敗兵首尾不絶人情騷動謂世事難知所親部曲請季式曰今日形勢大事去矣可將腹心二百騎奔梁既得避禍不失富貴何為坐死也季式曰吾兄弟受國厚恩與高王共定天下一旦傾危亡去不義若社稷顛覆當背城死戰安能區區偷生苟活高寳寜後主武平末為營州刺史鎮黄龍夷夏重其威信周師將至鄴幽州行臺潘子晃徴黄龍兵寳寜率驍銳并契丹靺羯萬餘騎將赴救至北平知子晃已發薊又聞鄴都不守便歸營周帝遣使招慰不受勅書范陽王紹信在突厥中上表勸進范陽署寳寜為丞相史盧昌期據范陽城起兵寳寜引紹信集夷夏兵數萬騎來救之至潞河知周將宇文神舉已屠范陽還據黄龍竟不臣周王琳在梁為湘州刺史時陳武帝受禪於建鄴遣將侯安都周文育等討琳為琳所破琳乃移湘州軍府就郢城帶甲十萬練兵於白水浦琳巡軍而言曰可以為勤王之師矣温太真何人哉初魏尅江陵之時永嘉王莊年甫七歲逃匿人家後琳迎還湘中衞送東下及敬帝立出質于齊請納莊為梁主齊文宣遣兵援送仍遣兼中書令李騊駼册拜琳為梁丞相都督中外諸軍録尚書事又遣中書舍人辛慤游詮之等齎璽書江表宣勞自琳以下皆有頒賜琳乃遣兄子叔寳率所部十州刺史子弟赴鄴奉莊纂梁祚於郢州莊授琳侍中使持節大將軍中書監改封安城郡公其餘並依齊朝前命及為陳將所敗乃與莊同入齊齊孝昭帝遣琳出合肥鳩集義故更圖進取琳乃繕戰艦分遣招募淮南傖楚皆願戮力陳合州刺史裴景暉琳兄珉之壻也請以私屬導引齊師孝昭委琳與行臺左丞盧濳率兵應赴沉吟不決景暉懼事洩挺身歸齊孝昭賜琳璽書令鎮夀陽其部下將帥悉聴以行乃除琳驃騎大將軍開府儀同三司揚州刺史封㑹稽郡公又増兵秩兼給鼔吹琳水陸戒嚴將觀釁而動屬陳氏結好於齊使琳更聴後圖㑹陳將呉明徹來寇帝勅領軍將軍尉破胡等出援秦州令琳共為經畧琳謂所親曰今太歲在東南歲星居牛斗分太白已高皆利為客我將有喪又謂破胡曰呉兵甚銳宜長䇿制之慎勿輕鬭破胡不從遂戰軍大敗琳單馬突圍僅而獲免還至彭城帝令便赴夀陽并許召募又進封琳巴陵郡王陳將呉明徹進兵圍之堰淝水灌城而皮景和等屯於淮西竟不赴救明徹晝夜攻擊城内水氣轉侵人皆患腫死病相枕從七月至十月城陷被執百姓泣而從之呉明徹恐其為變殺之城東北二十里時年四十八哭者聲如雷有一叟以酒脯來至號酹盡哀收其血懐之而去𫝊首建康懸之于市鮮于世榮後主時累遷領軍大將軍周武來伐送瑪瑙酒鍾與之得便撞破及周兵入鄴諸將皆降世榮在三臺之前獨鳴皷不輟及被執不屈乃見殺世榮雖武人無文藝以朝危政亂每竊歎之見徴稅無厭賜與過度發言歎息焉慕容三藏紹宗之子也為右衞將軍周師入鄴後主東遁委三藏畱守鄴宫齊王公以下皆降三藏猶拒戰及齊平武帝引見恩禮甚厚詔曰三藏父子誠節乆聞加榮褒授開府儀同大將軍雷顯和為建州道行臺左僕射周武帝使其子招焉顯和禁其子而不受聞鄴城敗乃降叱干茍生為儀同鎮南兖州周武破鄴赦書至茍生自縊死庫狄士文為領軍將軍周武帝平齊山東衣冠多來迎惟士文閉門自守帝竒之授開府儀同三司莫多婁敬顯為領軍將軍從後主於平陽敗歸并州與唐邕等推立安徳王稱尊號安徳敗文武羣臣皆投周軍惟敬顯走還鄴授司徒周武帝平鄴城之明日執敬顯斬於閶闔門下責其不畱平陽也册府元龜巻三百七十二
