body:
  text: 册府元龜卷六百三十七宋王欽若等撰銓選部公望平直振舉公望銓衡劇地總覈九流所以辯進官材翊贊邦治降自漢人委授彌重莫不妙選明識登用能臣故有負髙亮之姿振清正之望鑒擇髦儁動叶於至公抑退浮華靡私於貴勢俾時材各適其用天下共稱其平詩云靖恭爾位好是正直其是之謂與魏賈詡為尚書典選舉多選舊名以為令僕論者以此多詡崔琰字季珪清忠髙亮雅識經逺端方直道正色於朝魏氏初載委授銓衡總齊清議十有餘年文武羣才多所明㧞朝廷歸髙天下稱平毛玠字孝先太祖為丞相玠為東曹掾與崔琰並典選舉用皆清正之士雖於時有盛名而行不繇本者終莫得進務以儉率人繇是天下之士莫不以廉節自勵雖貴寵之臣輿服不敢過度太祖歎曰用人如此使天下人自治吾復何為哉文帝為五官將親自詣玠属所親眷玠答曰老臣以能守職幸得免戾今所說人非遷次是以不敢奉命大軍還鄴議所并省玠請謁不行時人憚之咸欲省東曹乃共白曰舊西曹為上東曹為次宜省東曹太祖知其情令曰日出於東月盛於東凡人言方亦復先東何以省東曹玠遷右軍師魏國初建拜尚書僕射復典選舉先賢行狀曰玠雅亮公正在官清恪其典選舉㧞貞實斥華偽進遜行抑阿黨諸宰官治民功績不著而私財豐足者皆免黜停廢久不選用于時四海翕然莫不勵行至乃長吏還者垢面羸衣嘗乗柴車軍吏入府朝服徒行人擬壺飱之潔家象濯纓之操貴者無穢欲之累賤者絶姦貨之求吏潔於上俗移於下民到于今稱之袁侃歴選部郎中號為清平晉李重與李毅同為吏部郎時王戎為尚書重以清尚見稱毅淹通有智識雖二人操異然俱處要職戎以識會代之各得其所李裔為吏部清愼選舉號為廉平阮放字思度為黄門侍郎選吏部郎在銓管任甚有稱績盧欽為尚書僕射領吏部舉必以材稱為廉平周馥遷吏部郎選舉精密論望益美蔡克字子尼為東曹掾素有格量及居選官茍進之徒望風畏憚宋王惠為吳興太守少帝即位以蔡廓為吏部尚書不肯拜乃以惠代焉惠被召即拜未嘗接客人有與書求官者得轉聚置閣上及去職其封如初時談者以廓之不拜惠之即拜雖事異而意同也謝莊代顔竣為吏部尚書竣留心選舉自强不息任遇既隆奏無不可而容貌嚴毅莊風姿甚美賓客喧訴常懽笑答之竟多不行時人為之語曰顔竣嗔而與人官謝莊笑而不與人官梁徐勉為吏部尚書勉居選官彛倫有序常與門人夜集客有虞暠求詹事五官勉正色答云今夕止可談風月不宜及公事故時人常服其無私又云勉為尚書僕射爰自小選迄于此職常叅掌衡石甚得上心到溉掌吏部尚書時何敬容以吏叅選事有不允溉輙相執敬容謂人曰到溉尚有餘臭遂學作貴人敬容日方貴寵人皆下之溉訐之如初溉祖彦之初擔糞自給故世以為譏云王泰為都官尚書能接人士士多懐慕每願其居選官頃之為吏部尚書衣冠属望王亮為吏部郎銓序著稱後魏崔亮為給事黄門侍郎仍兼吏部郎領青州大中正亮自叅選事垂將十年廉愼明决為尚書郭祚所委每云非崔郎中選事不辦北齊楊愔為給事黄門侍郎兼吏部郎中武定末以望實之美起拜吏部尚書加侍中衞將軍侍學典選如故辛術為吏部尚書遷鄴以後大選之職知名者數四互有得失未能盡美文襄帝少年髙朗所弊也疎袁叔徳沉密謹厚所傷者細楊愔風流辯給取士失於浮華唯術性尚貞明取士以才器循名責實新舊叅舉管庫必擢門伐不遺考之前後銓衡在術最為折𠂻其為當時所稱舉如此後周鄭孝穆魏大統中為散騎常侍時文帝東討除大丞相府右長史封金鄉縣男軍次潼闗命孝穆與左長史孫儉司馬楊寛尚書蘇亮諮議劉孟良等分掌衆務仍令孝穆引接闗東歸附人士并品藻才行而任用之撫納銓叙咸得其宜薛端為吏部尚書端久處選曹雅有人倫之鑒其所擢用咸得其才隋髙構仁夀初為吏部侍郎以公事免煬帝立召令復位時為吏部者多以不稱去職唯搆最有能名前後典選之官皆出其下又云牛𢎞為吏部尚書髙搆為侍郎最為稱職陸彦師開皇初為吏部侍郎時承周制官無清濁彦師在職凡所任人頗甄别於士庻論者美之唐杜如晦為吏部尚書尋為右僕射仍掌選事引用賢良甚獲當時之譽劉林甫貞觀初為吏部侍郎初隋代赴選者以十一月為始至春即停選限所促選司多不究悉時選人漸衆林甫奏請四時聽選隨到注擬當時甚以為便時天下初定州府及詔使多有赤牒授官至是停省盡來赴集將萬餘人林甫隨才銓擢咸得其宜時人以林甫典選比隋之髙孝基李安期前後三典選部頗為當時所稱楊纂為吏部侍郎銓叙人倫稱為允當髙季輔為吏部侍郎凡所銓綜時稱允愜裴行儉髙宗朝為吏部侍郎與敬𤣥馬載同時典選十餘年甚有能名時人稱焉李敬𤣥為司列少常伯典選累年銓綜有序天下稱其能姚璹武后時為天官侍郎善選補于今稱之盧從愿睿宗初為吏部侍郎以中宗之後選司頗失綱紀從愿精心循理大稱平允其有冐名偽選及虚增功狀之類皆能擿發其事典選六年前後無及之者初髙宗時行儉馬載為吏部最為稱職及是從愿與李朝隠同時典選亦有美譽時人稱曰吏部前有裴馬後有盧李韋沆為刑部尚書頻年典校京外官考使前後咸稱允當宋璟為吏部侍郎同中書門下三品𤣥宗在春官又兼右庻子先是外戚及諸公主等干涉朝政請託滋甚崔湜鄭愔等相次典選皆為權門所制九流失叙迎用兩年員闕注擬不足更置比冬選人大為士庻所歎至是璟大革前弊取捨平允銓綜由是有叙李林甫為吏部侍郎天下昇平每歲選人塡委林甫修廢舉直甄别流品時議以為稱職改黄門侍郎徐浩為都官郎中掌選嶺南以廉平稱于部為北部郎中常署考第於吏部以公當稱劉滋為吏部侍郎有經學善持論性廉潔劾理嫉惡常掌選多所發擿更代詐偽者尤畏之韋𢎞景為吏部侍郎銓録平允權邪憚其嚴勁不敢干以非崔郾為吏部員外郎銓叙之美為時所稱後唐韋寂為水部員外郎判南曹移浚儀令累遷吏部郎中復判南曹吏畏其明平直夫政之敗繇官之邪前典之深戒也若夫式叙流品銓管人才漢魏以還實重其任乃有善於其職不懈其位為官擇人抑華崇本清濁有别名實以覈寒素無下品之歎浮薄杜私謁之徑不以親疎而易意不為勢力之所奪介然不撓處事惟允考言底績抱公滅私才能適用怨亦不作繇是當時號為得士天下無有滯才兹所謂邦之司直徳服衆望守公率職之善者歟後漢魯恭為光禄勲選舉清平京師貴戚莫能枉其正陳蕃為光禄勲與五官中郎將黄琬共典選舉不偏權富而為勢家郎所譛訴坐免歸趙戩為尚書典選董卓數欲有所私授戩輙堅拒不聽言色强厲卓怒召欲殺之衆人悚慄而戩辭貌自若卓悔謝釋之魏諸葛誕為吏部人有所屬託輙顯其言而承用之後有當否則公議其得失以為褒貶自是羣僚莫不愼其所舉晉荀顗為尚書時顗甥陳泰卒顗代泰為僕射領吏部顗承泰後加之淑愼綜核名實風俗澄正李密犍為人為州大中正性方直不曲意勢位後失荀朂張華指左遷漢中太守諸生多以為寃李重為吏部郎詢朝衆而斥華競存公平而塞私謁是以羣才罔不畢舉劉毅為青州大中正銓正人流清濁區别其所彈貶自親貴者始張輔為御史中丞梁州中正刺史楊欣有姊䘮未經旬車騎長史韓預强聘其女為妻輔貶預以清風俗論者稱之江灌為吏部郎時尚書謝奕銓叙不允灌每執正不從王彪之為吏部尚書時簡文以會稽王輔政有命用秣陵令典安逺補句容令殿中侍御史奚朗補湘東郡彪之執不從曰秣陵令三品縣耳殿下昔用安逺談者紛然句容近畿三品佳邑豈可處卜術之人無才用者邪湘東雖復逺小所用未有朗比談者謂頗兼卜術得進殿下若超用寒悴當令人才可㧞朗等凡器實未足充此選王藴為吏部郎性平和不抑寒素每一官缺求者十軰藴無所是非時會稽王輔政藴輙連狀白之曰某人有地某人有才務存進達各隨其方故不得者無怨焉宋王球為吏部尚書接客甚希不視求官書疏而銓衡有序朝野稱之庾炳之為吏部郎時王僧達舉兄錫不協訴家貧求郡太祖欲以為秦郡炳之曰王𢎞子既不宜作秦郡僧達亦不堪蒞民乃止王琨為吏部郎吏曹選局貴要多所属請琨自公卿下至士大夫例為用兩門生江夏王義恭常属琨用二人後復属遣琨答不許江湛為吏部尚書在選職頗有刻覈之譏而公平無私不受請謁論者以此稱焉王僧綽為吏部郎叅掌大選究識流品諳悉人物㧞才舉能咸得其分南齊陸慧曉為吏部郎曹中有都令史歴政以來諮執選事慧曉任巳獨行未嘗與語帝遣左右單景雋以事誚問慧曉謂景雋曰六十之年不復能諮都令史為吏部郎也帝若謂身不堪便當拂衣而退帝甚憚之梁張充為吏部尚書居選稱為平允王泰為中書侍郎歴給事黄門侍郎竝掌吏部郎事俄而即眞自過江吏部郎不復典大選令史以下小人求競者輻輳前後少能稱職泰為之通闗求吏先至者即補不為貴賤請属易意天下稱平王僧孺為尚書吏部郎叅大選請謁不行何敬容為吏部尚書銓序明審號為稱職褚翔居小選公清不為請属易意號為平允陳徐陵天康初為吏部尚書以梁末以來選授多失其所於是提舉綱維綜覈名實時有冐進求官諠競不已者陵乃為宣示之曰自古吏部尚書者品藻人倫簡其才能尋其門胄遂其大小量其官爵梁元帝承侯景之凶荒王太尉接荆州之禍敗爾時䘮亂無復典章故使官方窮此紛雜永定時聖朝草創干戈未息亦無條序府庫空虚賞賜懸乏白銀難得黄札易營權以官階代於錢絹義存撫接無計多少致令員外常侍路上比肩諮議叅軍市中無數豈是朝章應其如此今衣冠禮樂日富年華何可猶作舊意非所望也所見諸君多踰本分猶言大屈未喻髙懐若問梁朝朱領軍异亦為卿相此不踰其本分耶此是天子所㧞非闗選序梁武帝云世間人言有目色我特不目色范悌宋文帝亦云人世豈無運命每有好官缺輙憶羊元保此則清顯職不繇選也秦有車府令趙髙直至丞相漢有髙廟令田千秋亦為丞相此復可為例耶既忝衡流應須粉墨所望諸賢深明鄙意自是衆咸服焉時論比之毛玠後魏任城王澄為吏部尚書及車駕北巡留澄銓簡舊例自公侯以下訖以選臣動有萬數冗散無事澄品為三等量其優劣盡其能否之用咸無怨者元順為吏部尚書時三公曹令史朱暉素事録事尚書事髙陽王雍雍欲以為廷尉評頻煩託順順不為用雍遂下命用之順投於地雍聞之大怒昧爽坐都㕔召尚書及丞郎畢集欲待順至於衆挫之順日髙方至雍攘袂撫几而言曰身天子之子天子之弟天子之叔天子之相四海之内親尊無二元順何人以身成命㧞棄於地順鬚鬢俱張仰面看屋僨氣奔湧長歔而不言久之揺一白羽扇徐而謂雍曰髙祖遷宅中土剏定九流官方清濁軌儀萬古而朱暉小人身為省吏何令為廷尉清官殿下既先皇同氣且遵成㫖日有短垣而復踰之雍曰身為丞相録尚書如何不用一人為官順曰庖人雖不治庖尸祝不越樽爼而代之未聞有别㫖令殿下叅選事順又厲聲曰殿下必如是順當依事以聞雍遂笑而言曰豈可以朱暉小人便相忿恨遂起呼順入室與之極飲順之毅不撓皆此類也陸俟為給事中典選部蘭臺事當官而行無所屈撓封軌渤海人宣武帝時為考功郎中本郡中正渤海太守崔林入為吏部郎以凡考事于軌軌曰法者天下之平不可以舊君故虧之也休歎其守正韋崇為司州及河南邑中正崇頻尹衡品以平直見稱楊懿為選部給事中有公平之譽宋弁字義和廣平人為黄門侍郎兼司徒左長史為本州大中正弁先與度支尚書李彪州里迭相祇好結管鮑之交而以寒地處之殊不欲微相優假彪不以為恨及郭祚為吏部彪與子志求官祚仍以舊地處之彪以位經常伯又兼尚書謂祚應以貴遊㧞之深用忿怨形於言色時論以此譏祚祚每曰爾與義和至交豈能饒爾而怨我乎一云郭祚為吏部所用者皆量才稱職時人以此歸之李叔虎渤海人為國子博士本國中正攝樂陵中正性清直甚有公平之稱北齊趙彦深為尚書令凡諸選舉先令銓定提奬人物皆以行業為先輕薄之徒弗之齒也辛術為吏部尚書文宣常令術選百員官叅選者二三千人術題目士子人無謗讟其所旌擢後亦皆致通顯陽休之為吏部尚書多識故事諳悉氏族凡所選用莫不才地俱允後周薛端為吏部郎中自居選曹先盡賢能貴遊子弟才劣行薄者未嘗升擢之每啓文帝云設官分職本康時務茍非其人不如曠職帝深然之隋盧愷為周小吏部染工上士王神歡者常以賂自進冡宰宇文䕶擢為計部下大夫愷諫曰古者登髙能賦可為大夫求賢審官理須詳愼今神歡出自染工更無殊異徒以家富自通遂與縉紳竝列實恐維鵜之刺聞之外境䕶竟寢其事韋世康為吏部尚書選用平允請託不行出為襄州刺史歴安州信州總管入朝復拜吏部尚書前後十餘年間多所進㧞朝廷稱為廉平髙搆為吏部侍郎時人以搆好劇談頗謂輕薄然其内懐方雅特為吏部尚書牛𢎞所重後以老病解職時𢎞典選凡將有所擢用輙遣人就第問其可否牛𢎞為吏部尚書其選舉先徳行而後文才務在審愼所進用多稱職唐髙士廉貞觀年為吏部尚書奬鑒人倫雅諳姓氏凡所署用莫不人地俱允韋承慶自天授以來三掌天官選事銓授平允海内稱之髙季輔為吏部侍郎凡所銓叙時稱允當崔元暐為天官侍郎介然自守絶於請謁為執政者所忌轉文昌左丞選司令史乃設齋自慶武太后聞之復拜為天官侍郎劉竒為吏部侍郎注張文成司馬鍠為監察御史二人因申屠瑒以謝之竒正色曰舉賢本自無私二君何為見謝吉頊為吏部侍郎陸象先本名景初為揚州叅軍秩滿調選頊擢授雒陽尉時象先父元方亦為吏部固辭不敢當頊曰為官擇人至公之道陸景初才望髙雅非常流所及實不以吏部之子妄推薦也竟奏授之姜晦為吏部侍郎性聰悟識理體舊制吏曹舍宇悉布棘以防令史與選人交通及晦領選事盡除之大開銓門示無所禁私引致者晦輙知之召問莫不首伏初朝廷以晦改革前規咸以為不可竟銓綜得所賄賂不行舉朝歎伏席豫為吏部侍郎𤣥宗謂之曰以卿前為考功職事平允故有此授豫典選六年有令譽韋陟為吏部侍郎常病選人冐名接脚闕員既少取士良難正調者被擠偽集者冐進陟剛腸嫉惡風彩嚴正選人疑其有瑕者陟按聲盤詰無不首伏每歲皆賸得數百員闕以待淹滯常謂所親曰使陟知銓衡一二年則無人可選矣又有一致仕官叙五品陟判之曰青氊展慶竝不立班朱紱承榮無宜卧拜時人推其强直韋見素為吏部侍郎在職公平選士美之苖晉卿為吏部侍郎㧞異舉廢時稱平允楊綰為吏部侍郎歴典舉選精覈人物以公平稱奚陟為刑部侍郎知吏部選事銓綜平允有能名遷吏部侍郎所蒞之官時以為稱職裴垍為吏部考功二員外郎時吏部侍郎鄭珣瑜請垍考調判垍堅守不為時力所奪考覈皆務才實楊於陵為吏部員外郎判南曹時宰相有密親調習文書不如式於陵持而不與物論大歸之遷右司郎中後為吏部侍郎凡四周歲簡察奸吏調補平允至今人稱之崔郾為吏部員外奸吏不敢欺孤寒無援者未嘗留滯銓叙之美為時所稱孔緯昭宗時為吏部侍郎居選曹動循格令權要有所託私書盈几不之省執政怒之改太常卿晉史圭為吏部侍郎分知銓事而圭素廉守大著公平時有前欒城浩令者年踰七十不能拜起有重臣達意且令與官圭不允其請人甚嘉之振舉振廢滯㧞英雋有司之職也故刈其翹楚形之於風什揚彼側陋著之於典訓乃有雅望著於紳紱精識善其人倫處選士之曹當持衡之重唯善所在靡遺於葑菲類能而使必適於轅輪得其辨論之方盡諸藻鑒之美繇是棫樸之詩載作薖軸之歎不興者焉後漢許靖為尚書郎典選舉董卓秉政以漢陽周毖為吏部尚書與靖共謀議進退天下之士沙汰穢濁顯㧞幽滯進用潁川荀爽韓融陳紀等為公卿郡守拜尚書韓馥為冀州牧侍中劉岱為兖州刺史潁川張咨為南陽太守陳留孔伷為豫州刺史東郡張邈為陳留太守吳李肅字傳恭為選部尚書選舉號為得才晉山濤武帝時為吏部尚書前後選用周徧内外而竝得其才濤再居選職十有餘年每一官缺輙啓擬數人詔㫖有所向然後顯奏隨帝意所欲為先故帝之所用或非舉首衆情不察以濤輕重任意或譛之於帝故帝手詔戒濤曰夫用人惟才不遺疎逺單賤天下便化矣而濤行之自若一年之後衆情乃寢濤所奏甄㧞人物各為題目時稱山公啓事嵇紹以父得罪靖居私門濤啓武帝曰康誥有言父子罪不相及嵇紹賢侔卻缺宜加旌命請為祕書郎帝謂濤曰如卿所言乃堪為丞何但郎也乃發詔徴之起家為祕書丞又胡原練習兵馬濤稱其才堪邊任舉為太尉長史李重為吏部郎務抑華競不通私謁特留心隠逸繇是羣才畢舉㧞用北海西郭湯瑯邪劉珩燕國霍原馮翊吉謀等為祕書郎及諸王文學故海内莫不歸心時燕國中正劉沉舉霍原為寒素司徒府不從沉又抗詣中書奏原而中書復下司徒叅論左長史荀組以謂寒素者當謂門寒身素無世祚之資原為列侯顯佩金紫先為人間通流之士晩乃務學少長異業年踰始立草野之譽未洽徳禮無聞不應寒素之目重奏曰按如癸酉詔書廉讓宜崇浮競宜黜其有履謙寒素靖恭求己者應有以先之如詔書之㫖以二品繫資或失廉退之士故開寒素以明尚徳之舉司徒總御人倫實掌邦教當務峻凖評以一風流然古之厲行髙尚之士或栖身巖穴或隠迹丘園或克己復禮或耄期稱道出處黙語惟義所在未可以少長異操用疑其所守之美而逺同始終之責非所謂儗人必於其倫之義也誠當考之州黨之倫審之於任舉之主沉為中正親執銓衡陳原隠居求志篤學好古學不為利行不要名絶迹窮山韞韣道藝外無希世之容内全遯逸之節行成名立縉紳慕之委質受業者千里而應有孫孟之風嚴鄭之操始舉原先諮侍中領中書監華前州大中正後將軍嬰河南尹軼去三年諸州還朝幽州刺史許猛特以原名聞擬之西河求加徴聘如沉所列州黨之議既舉又刺史班詔表薦如此而猶謂草野之譽未洽徳禮無聞舍所徴簡之實而無明理正辭以奪沉所執且應二品非所求備但願定志窮山脩述儒道義在可嘉若遂抑替將負幽邦之望傷敦徳之教如詔書所求之㫖應為二品詔從之劉沉字道眞燕國薊人太保衞瓘辟為掾領本邑大中正敦儒道愛賢能進霍原為二品及申理張華皆辭㫖明峻為當時所稱王濟太原中都人與同郡張楚友善為本州大中正訪問邑人品狀至楚濟曰此人非卿所能目吾自為之乃狀楚曰天才英博亮㧞不羣何攀居心平允蒞官整肅愛樂人物敦儒貴才為梁益二州中正引致遺滯巴西陳夀閻乂犍為費立皆西州名士竝被鄉閭所謗清議十餘年攀申明曲直咸免寃濫韓康伯為吏部尚書初與吳隠之隣居隠之母死康伯母每聞隠之哭聲必輟飱投杼為之悲泣謂康伯曰若居銓衡當舉此軰人及康伯為吏部隠之遂階清級宋沈演之為吏部尚書性好舉才尤濟屈滯王僧綽為吏部郎叅掌大選究諸流品人物㧞舉賢能咸得其分南齊張岱為吏部尚書武帝為撫軍岱選東陽太守王績為長史呈選牒太祖笑謂岱曰此素望也梁張緒仕宋為吏部郎叅掌大選後廢帝元徽初東宫罷選曹擬舍人王儉格外記室緒以儉人地兼美宜轉祕書丞從之王瞻為吏部尚書瞻性率亮居選所舉其意多行劉之遴年十五舉茂才任昉見而異之瞻常候任昉值之遴在昉坐昉謂瞻曰此南陽劉之遴學優未仕水鏡所宜甄擢瞻即調為太學博士蕭子顯為吏部尚書謝蘭丁父憂毁瘠骨立服闋後子顯表其至行擢為王府法曹行叅張纘為吏部尚書初纘為吳興太守時陸雲公好學有才思先製太伯廟碑纘罷郡經途讀集文歎曰今之蔡伯喈也至都掌選言之於髙祖召兼尚書儀曹郎又王勵為河東王功曹史王出鎮京口勵將隨之藩纘時典選舉勵造纘言别纘嘉其風采乃曰王生才地豈可遊於外府乎奏為太子洗馬遷中書舍人纘居選其後門寒素有一介皆見引㧞不為貴要屈意人士翕然稱之後魏李冲為吏部尚書典選房景伯少䘮父以孝聞家貧傭書自給養母甚謹尚書盧淵稱之於冲冲㧞為奉朝請司空祭酒崔休為吏部郎中遷散騎常侍權兼選任休愛才好士多所㧞擢李韶為吏部尚書時張普惠為步兵校尉免官故事免官者三載之後降一階而叙若才優擢授不拘此限孝明熈平中韶奏普惠有文有學依才優之例宜特顯叙勑除寧逺將軍司空倉曹叅軍朝議以不降階為榮北齊楊遵彦為吏部尚書銓衡甚愼選舉秀才擢第罕有甲科任城王湝為定州刺史舉李徳林秀才徳林射策五條考皆為上授殿中將軍既是西省散員非其所好謝病還都廢帝乾明初遵彦奏追徳林入議曹唐張銳為吏部侍郎髙祖謂之曰今年選人之内豈無才用者卿可簡試將來欲縻之好爵於是銳以張行成張知運等數人應命時人以為知人髙季輔為吏部尚書韋思謙弱冠舉進士累補應城令及歲滿預選思謙在官頗有公事懲殿舊制多不進官季輔曰自居選部今始得此一人豈以小疵而棄大徳特超授監察御史繇是稍知名李敬𤣥為司列少常伯選人有杭州叅軍徐大𤣥者初在任時同僚有張惠犯􅂍至死太𤣥哀其母老乃詣獄自陳與吏同受􅂍惠數既少遂得減死太𤣥亦坐免官不調十餘年敬𤣥大嗟賞之擢授鄭州司功叅軍太𤣥繇是知名後官至祕書少監以徳行為時所重者以為敬𤣥能舉善也一云敬𤣥為吏部侍郎咸亨二年有楊炯王勃盧炤鄰駱賓王竝以文章見稱敬𤣥咸為延譽裴行儉咸亨初為吏部侍郎典選十餘年甚有能名自掌選及為大總管凡遇賢俊無不甄採鄭杲則天聖厯中為吏部郎注韓思復為太常博士元希聲為京兆士曹嘗謂人曰今年掌選得韓元二子則吏部不負朝廷矣王丘𤣥宗開元中為吏部侍郎㧞擢山陰尉孫逖桃林尉張鏡微湖城丞張晉明進士王冷然李昻等不數年登禮闈掌綸誥焉崔琳為吏部侍郎判銓日收選人盧怡裴敦復于孺卿等十數人無何皆入臺省衞次公為吏部侍郎選人有李績者徐有功之孫名在黜中次公召而問之曰子之祖先勲在王府豈限常格竝優秩而遣之册府元龜卷六百三十七
