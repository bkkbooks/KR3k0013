body:
  text: 册府元龜卷一百四十宋王欽若等撰帝王部旌表第四唐憲宗元和元年十二月贈故嘉州刺史崔佐時大理卿佐時為西川留後劉闢所殺故也二年七月詔曰王者旌表通乎異代况音徽未逺名迹可尋風流所傳弊俗興起舉其遺直足勸事君故朝議大夫守給事中襲南陽郡公袁髙茂功之後清徳冠時貞元初職在論駮嘗執讜議封還詔書居平蹈常則汎然而無忤㑹節有立皆卓爾而難踰故能望重朝端行滿天下未踰大任遽殁中身徳之不忘久而彌著朕方𢎞景化寤寐前良用旌尚徳之懐俾申加等之贈哀榮所被勸奨斯存可贈禮部尚書髙貞元初抗論盧杞中外相賀數正直者以髙為第一李吉甫為相備陳其事始下詔贈十月潤州李錡平制曰王澹趙琦等仗節死義殺身成仁無罪無辜受兹殘酷所宜褒表以勸忠貞即加追贈仍令州府致祭收葬其王澹如有子弟服滿日與一子八品正員官如更無辜受戮及脱身效順者亦委李元素具事跡聞奏當有褒贈及加甄録如受戮之中有長行官徤勿停糧賜優給其家初澹為錡判官及錡言歸闕署為留後錡既無行意尋托疾屢改發期澹與中使頻諭之錡不悦澹既總留務或有制置錡益不能平潜諷親兵令殺澹者數矣因散冬衣澹入謁錡兵士數百人持刅拽於階下臠食之監軍聞亂遣衙官趙琦慰諭又臠食之及錡敗故有詔贈三年二月贈故布衣崔善貞睦州司馬旌忠諌也初李錡鎮浙西恃恩驕恣善貞詣闕上封言錡罪狀徳宗械送錡錡坑殺之錡敗贈官五年正月贈故左神䇿軍大將軍陽山郡王酈定進兵部尚書賻布米粟有差定進時號勇將嘗征蜀有功及討王承宗力戰陣敗馳歸馬倒賊識曰酈王也遂為所害官軍為之䘮氣繇是褒贈四月睦州上言州人方良琨六代同居請表其門閭從之五月贈故昭義軍將曹公乂左金吾衛大將軍公乂母鄭氏封武威郡太夫人仍賜錢三十萬先是謀擒盧從史公乂參之倉卒為亂兵所害故加贈而又褒封其母焉六月丁亥贈故禮部尚書鄭叔矩太常卿贈故朔方河中副元帥判官檢校户部郎中兼侍御史路泌絳州刺史仍各賜其家絹二百疋至葬日委所在州府量給􅂇䘮事泌為渾瑊從事貞元三年隨瑊與吐蕃㑹盟而䧟既在絶域棲心於釋氏之教為贊普所重待以賔禮貞元十九年吐蕃遺邉將書求和少子隨哀泣䟽陳願允其請表三上徳宗命中使諭㫖以朝廷懲其宿詐使更要於後信迄數嵗不報及帝即位前年蕃使復欵塞隨五獻章上陳又投書哀訴於宰相裴垍李藩皆協力為奏言帝允之命徐復等報聘乃特於答詔䟽名氏令以歸中國吐蕃因復等還遣使來朝遂以泌及叔矩之䘮與銘及遺録至朝野傷歎帝憫之命贈賻焉六年二月浙江西道觀察使以前集賢殿校書郎丁公著孝行聞詔曰丁公著辭官侍親不顧榮利髙行至性人倫所稱今執䘮致毁又聞過禮其所請旌表門閭宜依仍委本州刺史親自慰問并量給粟帛三月甲子贈故金吾衛張克譲尚書右僕射克譲茂昭長男也前為易定將木力溝之㨗克譲有功焉十年十二月贈故巂州刺史陳孝陽洪州大都督旌善狀也八年四月贈故左神䇿軍兵馬使嚴奉刑部尚書追平蜀之功也七月以蜀將郝同美為黎州刺史褒其節也同美元和初以劉闢之衆歸而闢屠其家故旌寵之十二月勅張茂昭立功河朔舉族歸朝義烈之風史册攸載或聞身殁之後家無餘財追懐舊勲特越常典宜每年賜其家絹二千疋春秋二時給付元年閏八月詔曰存樹風節謂之立名殁加褒餙所以勸善故朝散大夫試秘書省著作郎兼侍御史甄濟昔以文雅見稱當時嘗因辟召亦佐戎府而能保堅貞之正性以履危機覩逆亂之潜萌不從脅汙義聲可傳於竹帛顯贈未賁於松楸藩方上陳允叶彞典追加命秩尚服殊榮可贈秘書少監濟初為安禄山范陽掌書記天寳十三年濟察禄山有異圖謀以智免以衛縣令齊玘誠信可托乃求使至衛縣具以誠告令弟澄宻求羊血以為備至夜偽嘔血疾不能支遂舁歸及禄山反使偽節度使蔡希徳令行戮者李掞等二人封刀來召察詐不起即就戮之濟以左手書云不得李掞持刀而前濟引首以待希徳欷歔嗟嘆李掞等退以實病報後慶緒繼逆又使郡縣强舁至東都安國觀經月餘代宗統師收東都濟起詣軍門表送上都肅宗館於三司使臣於賊者瞻望以愧其心尋授秘書郎轉太子舍人寳應初拜刑部員外郎因蕃冦逃難客於㐮州大歴中江西觀察使魏少遊奏授著作郎兼侍御史充莫傜副使終於㐮州至是山南東道節度使袁滋奏其節操與權臯同科合載國史勅甄濟頃逢屯難不受染汙風塵之内名迹獨全宜付史館旋又下制褒贈焉是月又詔曰孝子劉敦儒生於儒門禀此至性王祥篤行起孝敬而不移曾參飬志積嵗年而㒺怠用𢎞勸奨宜服官常分曹雒司俾遂私志可守右龍武軍兵曹參軍分司東都敦儒子𤣥之曾孫母終居䘮致毁雒中謂之劉孝子權徳輿留守東都表其志行故授以官十月虢州湖城縣百姓閻炤五代同居命旌表之十年四月贈工部尚書致仕髙彦昭陜府都督如有子孫委中書門下服闋後量材叙用彦昭不知何許人初事李正已及李納叛彦昭以濮州降於河南都統劉𤣥佐納怒殺其妻子有女九嵗初見其母㡬將就害拜天而祝女問其故答曰以天之神明將有祈也女曰天如神明豈使吾效順而族戮也如其無知即又何拜獨不拜而死帝聞詔下太常諡曰愍女當時文士屬詞以誄之十一月贈故夀州死難之將張抱劒劉榮周和等刺史仍以米粟給其家臣欽若等曰時討淮西呉元濟抱劒等死王事也十一年正月贈故成徳軍節度掌書記殿中侍御史李序工部郎中序安平人百藥五代孫舉進士嘗謁王士貞署為掌書記士貞死序後以他事忤承宗被殺故加贈四月山南東道故大將軍李仲謩吕中庸石鍠黄士榮等以死難皆贈刺史時諸道之師討鎮州王承宗故也五月山南東道故將南珍􅁮等十六人忠武軍故將喬錡等三人河東故將徐宙等二人並以死難贈刺史亦以鎮州用師故也十二年三月贈故冀州刺史王怡尚書左僕射仍令存訪親族授以封爵怡武俊從子以戰功歴深冀趙三州刺史承宗之叛怡守南宫縣以當王師及王士則為邢州刺史怡誠欵通之及士則去邢州怡情頗洩於賊遂遇害并屠其家怡男元伯先潛來京師過定州張茂昭知而留之於是授監察御史委茂昭軍中任使七月昭義故將衛重興等三十二人以死難並贈刺史鎮州用師也十一月以楊元卿為左金吾將軍元卿以淮西從事歸朝其妻及男五人皆為賊所害及賊平朝廷方驗其事命中使至宅為發哀故有此授十四年四月詔曰圖難忘死為臣之峻節顯忠旌善有國之令猷日者妖豎反覆侮我朝章而濮州刺史髙沐刼在兇威潛輸忠欵諷其不庭之咎將冀革心數其煑海之饒聿求利國伏奏必陳其逆節漏師嘗破其隂謀竟以盗憎遂死王事殁而不朽風聲凛然式表漏泉之澤且彰勁草之節可贈吏部尚書仍委馬揔訪其遺骸以禮收葬優恤其家如有子孫具名聞奏沐為李師古判官師道擅襲毎謀不順沐廣引古今成敗諭之前後說師道為善者數千言判官李文㑹等搆於師道沐遂遇害九月贈淄州刺史張頲左散騎常侍登州刺史髙曙右散騎常侍萊州刺史李廷逺洪州都督萊州長史蔡成鄲州左司馬尚振兖州長史沈皆並贈刺史皆以常謀殺李師道歸國為師道所害故也李湍妻湍呉元濟之軍人也元和中淮西未平湍心懐向順乃忽渡溵河來降烏重𦙍其妻遽為賊束縳在樹臠而食之至死呼其夫曰善事烏僕射觀者義之至是烏以其事請列於史䇿十三年憲宗下詔從之董昌齡母楊氏昌齡嘗為泗州長史世居於蔡少孤受訓於母累事呉少誠少陽至元濟時為呉房令楊氏潜誡曰逆順之禮成敗可知汝宜圖之昌齡志未果元濟又署為郾城令楊氏復誡曰逆黨欺天天所不福汝當速降無以前敗為慮無以老母為念汝為忠臣吾雖殁無恨矣及王師逼郾城昌齡乃以城降且説賊將鄧懐令歸欵於李光顔憲宗聞之喜急召昌齡至闕真授郾城令兼監察御史仍賜緋魚昌齡泣謝曰皆老母之訓憲宗嗟嘆良久元濟囚楊氏欲殺之而止者數矣蔡平楊氏幸無恙元和十五年陳許節度使李遜䟽楊氏之强明節義以聞乃封北平郡太君孝女王和子者徐州人其父及兄為防秋卒戍涇州元和中吐蕃冦邉父兄戰死無子母先亡和子時年方十七聞父兄殁於邉上被髮徒跣縗裳獨徃涇州乞取父兄之䘮歸徐營葬手植松栢剪髮壊形廬於墓所節度使王智興以狀聞詔旌表之穆宗長慶元年正月以前坊州刺史班肅為司封員外郎時宰臣上言曰將欲清風俗必在厚人倫竊見皇甫鏄權位盛時班行之中多所親附及得罪後議論立變憎嫉如讐俗之衰薄一至於此唯班肅以曽為郎官判度支案終始如一獨送出城周行之間多美其事今郎秩已罷望授一省官以表其行故有是拜是月河陽奏百姓劉士約母疾割股肉以奉母請表門閭從之議者以神農記辯藥物凡陸行泉游草伏木棲金石之夥荒裔之産可攻於疾者無不悉載未嘗言人之肌膚可以愈疾及開元末有明州域門山里人陳藏器著本草拾遺云人肌主羸疾自後閭閻相傚自殘徃徃而有二年正月詔曰故魏博等州節度觀察處置等使起復寧逺將軍檢校工部尚書兼魏州大都督府長史御史大夫賜紫金魚袋田布朕以寡昧臨御萬邦威刑不能弭干紀之變道化不能馴多僻之俗致使上公罹禍田氏積寃爰整旅以徂征毎終食而三歎自兹弔伐驟渉寒暄雖良將鋭師皆云協力而俟時觀釁未即齊驅嗟我誠臣結其哀憤引遷延之咎以自刻責奮决烈之志以謝君親白刅貫於肝心鴻毛喻其生死忠臣孝子一舉兩全晉稱卞氏之門漢表尸卿之節比方於布今古為隣况其臨命須臾處之不撓載形章表益見深𠂻間使發函悼心疾首從先臣於厚載爾則無愧覩遺像於麟閣予何可堪端揆崇名職䘮彛典匪以為報聊攄永懐可尚書右僕射賻布三百叚米粟二百石六月乙酉詔曰田布頃因戎旅發憤自裁言念忠誠豈忘贍䘏宜賜錢一千貫絹一千疋以充葬用九月贈汴州故將郭昌晏禮部尚書昌晏前欲宻謀誅留後李㝏以其謀通於韓充臣欽若等曰李㝏卞守將逐其帥李厚自為留後韓充𢎞之弟也事洩被害故加寵贈三年十月以潞州左司馬賈直言為諌議大夫直言以孝聞人稱其代父飲酖救得不死而手足枯䧟於鄆州累有忠言激李師道不聼亦不忍殺敬宗寳厯元年六月虢州刺史陸亘上言玉城縣百姓閻鄷五代同居請旌其門閭兼追贈鄷五代祖庭訓一官從之文宗以寳厯二年即位賜劉克明母錢一千貫絹五百疋婢二人以其不從克明為亂賞之也太和二年九月詔曰見危致命之死不頌處其義則白刅可蹈得其所則鴻毛猶輕此忠臣烈士所以垂名不朽者也故棣州刺史充本州鎮遏兵馬使欒濛禀受正氣發揮壯猷屬逆豎亂常反形潜具濛於此時宻獻成筭朕且欲諭以文告革其非心重難興師因寝其奏而沉謀中泄遘兹深寃眷言此心傷恨何已可贈工部尚書仍許歸葬上都令所在路次州縣供熟食兼逓夫等應縁葬事所須並令官給賊平之後仍訪其子孫親屬三年六月録諸道戰殁大將並贈以官四年正月故東州將李載等九人並加褒贈殁於蠻冦故也六年九月賜故幽州觀察判官攝監察御史韋雍妻蕭氏蘭陵縣君雍故太子賔客張𢎞靖在幽州日所署判官當是時屬朝廷制置未備幽州俗本兇悍尤不樂文儒為主帥賔佐習於常態忘其變通議論不宻卒然起亂雍時家亦從刼暴蕭氏聞難號呼専執夫袂左右格去以死不從及雍臨刅蕭氏涕而告曰妾不幸年少義不苟活今日之事願先就死執刅者斷其臂詞氣不撓雖兇悍圜視無不傷歎其夕蕭氏亦卒幽州節度使楊志誠表明其事故追封焉十月山南東道觀察使奏郢州長夀縣竟陵鄉村山孝子史博年齒尚㓜母亡廬墓被髮泣血誓志終身詔表其門閭十二月宣州觀察使沈傳師奏涇縣遊道鄉百姓萬晏自髙祖頵至仲芳五代同居詔表其門閭七年三月壬子浙江東道奏越州蕭山縣百姓李渭㓜失父母與兄二人同居兄病渭割股療之因差後兩兄俱死奉寡嫂孤姪二十餘年衣食無偏莊田租税渭自主辦資財筦鑰寡嫂掌之孤姪婦孫共三十三人其家生芝草請旌表從之開成元年贈太尉叚秀實子太僕卿伯倫卒宰臣李石奏曰伯倫秀實之子自古没身以利社稷者無如秀實之賢帝憫然曰伯倫宜加賻賜仍輟朝一日以禮忠臣之嗣二月丙戌詔曰故邕州都督府録事參軍衛方厚妻程氏乃者吏為不道虐殺爾夫詣闕申寃徒歩萬里﨑嶇偪畏濵於危亡血誠既昭幽憤果雪雖古之烈婦何以加焉如聞孤孀無依晝哭待盡俾榮禄飬仍錫䟽封可武昌縣君仍賜一子九品正員官方厚為董昌齡所殺程氏知其夫為昌齡所害力不能克遂抑其哀如非寃者昌齡雅不疑聼其歸䘮故得以徒行詣闕帝因諌官論昌齡不宜為郡再譴昌齡遂有此命是月以鹽鐡宣歙院官檢校膳部員外郎顔從覧為主客員外郎贈太師顔真卿曽孫𢎞式為同州參軍詔曰朕毎覧國史見忠烈之臣未嘗不嗟歎久之思有以報如聞從覧𢎞式實杲卿真卿之孫永惟九原既不可作旌其嗣續諒叶典彛考績已深於宦途者命列於中臺官次未齒於縉紳者俾佐於左輔庶使天下再新義風三年十一月甲戌户部侍郎李珏奏廬州舒城縣太平鄉百姓徐行周叔伯兄弟五代同居請免其同籍户税從之十二月宣歙觀察使崔鄲奏溧陽縣百姓陳珽五代同㸑請蠲除賦税旌表門閭從之四年十二月贈故易定觀察判官兼侍御史李士季給事中其家委韓威安存䘮事官給仍賜一子官待服闋日具名聞奏士季為易定節度張璠從事璠卒之初士季知留務三軍欲立璠之子元益士季不從遂為亂兵所害至是舉褒贈之典武宗㑹昌元年三月贈裴度太師制曰堯之舊臣伯益顯庸於舜禹周之元老召公流羙於成康永惟其人是屬良相裴度始以謀䇿除害佐烈祖之中興終以忠貞立朝毗累聖之鴻業經緯之志華皓不衰功勲爛然圖史輝煥姦邪所忌臲卼於時暨氛霧既開魚水將協條風孰見其喜愠零雨皆美其來歸未踐明庭遽嬰沉痼威鳯莫翔於舊沼虛舟長徃於夜川殂謝之初朋黨異議贈典不稱人情欝然屬告類上𤣥渙流大號載懐先正宜有褒稱寵既及於雒師恩有加於在昔豈必望鄼侯之壟方念茂功過馮道之祠乃思遺美以兹為勸可不務乎宣宗太中六年六月兖海節度使蕭俶奏臣當道先差赴慶州行營陣殁押官鄭神佐在室女年二十四先亡父未行營已前許嫁與右驍雄將官健李𤣥慶並未受財禮阿鄭知父神佐陣殁遂與李𤣥慶休親截髪壊形自徃慶州北淮安鎮收亡父遺骸到兖州瑕丘縣與亡母合葬訖便於塋内廬墓手植松栢誓不適人伏以閭里之中罕知禮教女子之性尤昧義方阿鄭痛結窮泉哀深陟岵投身砂磧收父遺骸逺自邉陲得還閭里感蓼莪以起恨侍丘墓以誓心此皆陛下孝理𢎞深徳風煦被遂變獷野之性潜知禮義之方求之古人斯為烈女臣俶忝亷察敢不上聞伏望天恩宣下有司特賜旌表仍放本户兩税以彰至行勅㫖宜依懿宗咸通三年正月夀州奏禆將何武討賊死於盛唐縣詔贈檢校左散騎常侍制曰地連山藪境有逋逃武能首率郡兵身殁王事既嘉忠藎宜示褒贈不惟慰彼漏泉將亦激其羣校鄭畋為鳯翔節度使檢校司空同中書門下平章事卒昭宗册贈司徒謚曰文昭初李茂貞表曰臣聞有勲不廢前代格言無美不稱先王令典是垂休於國牒將衍示於孫謀其有漢閣元勲岐山茂政霜露已彫於大樹蓬蒿將没於豐碑歎泉扄而縟禮未加顧藩翰而清風盡在是敢敷陳徃事啟廸前功庶雅頌而重興冀徽猷而復舉臣伏見故鳯翔尹同中書門下平章事鄭畋瑞應星精祥開日角建洪鑪於聖代成庶類於明時鳯毛方浴於春池龍節忽移於右輔旋於羣鴟聚噪方蝟攅鋒蒼黄而玉輦省方次第而金門撤鏁九州相望初猶豫以從風百辟無歸半狐疑而委質鄭畋峩冠豎髪褒䄂運籌羅將校於帳前列􅆛貅於麾下乃言曰封豕肆兇長鯨噴毒寘生靈於塗燼委神器於腥羶我國家時運雖艱天歴方逺豈可以大朝簮紱當屈節於豺狼近甸藩籬欲輸誠於虺蜥繇是埋牲誓衆釁皷出師飛羽檄於四方㑹諸侯於萬里擎廽地軸决驚波而盡入東溟抽轉天闗驅列宿而咸尊北帝雷喧鼙鼓山轟旌旗五兵纔入犬牙一陣盡塗龍尾值大憝建瓴之勢在元臣反掌之間不意天柱朝摧將星夜殞竹帛徒懸於皎日衣冠已隔於佳城始舉義師爰從指顧禀三令五申之訓職嚢沙减竈之謀今則謬以㣲功叨居重鎮仰髙蹤而如在念遺烈而未書伏乞皇帝陛下顯舉舊勲榮加盛禮俯盡褒酬之典遐追鎔範之功俾四海有聞致九泉無恨時朝廷覧表方有是贈哀帝天祐元年十月瑯州節度使雷彦恭奏楚大夫屈原廟在當道請賜封崇勅曰楚三閭大夫屈原正直事君文章餙已當椒蘭之是佞俾蕙茝之不香顯比干之赤心躡彭咸於緑水雖楚烟荆雨隨強魄於故鄉而福善禍滛播明靈於巨屏名早流於竹素功有益於州閭爰表厥封用旌良羙宜封為昭靈侯後唐莊宗同光二年四月即位於魏州下制曰應有奉使危邦罹殃殊域既遭䧟害深可憫傷如伊鐔蓋寓戴漢超李承勲之徒仰所司具名録奏朝廷必議褒贈十月平汴州詔有交鋒戰陣殁於王事未經追贈各與贈官二年三月安義李存覇奏屯留縣坊市百姓韓徳兄弟累世同居母死割乳以祭廬於墓側累年種𤓰合歡同蔕旌表之明宗天成二年十一月勅太宗朝僕射李靖贈太保鄭州僕射陂改為太保坡此坡蓋後魏時賜僕射李冲今云李靖非也三年九月宻州上言輔唐縣民華延福事父母有至孝之行旌表之十一月詔賜故䕫州節度使西方鄴男錢絹各五百貫疋布一百疋米麥共二百石以父没王事故也夏魯竒天成四年鎮遂州軍府將吏上言以節度使到任已來有善政七條以安百姓奏勅魯竒宣力兩朝統戎三鎮居富庶之地無奢侈之心上為國家下安生聚每行公道全塞倖門儻非大洽人情詎致逺聞余聼有兹為作宜示褒稱仍下諸州令各知悉時孟知祥董璋據有兩川魯竒僻居南鄙董璋之叛與知祥攻遂州旬月援路斷絶兵盡食窮勢知必屈乃自刎而卒上以其盡節王事聞其死也慟哭久之給其家錢百萬絹千疋粟麥等贈太師封齊國公長興元年正月賜故靈武行營馬軍指揮使邢彦洪男恩進錢絹米麥以其父殁王事故也十二月邢州奏光山彭爽四世義居乞改鄉里名號從之己未滄州乾符縣人張建立乾寧五年割股治母病母卒割心瀝血祭辮髪跣足廬於墓所三十年勅㫖以其鄉為孝友鄉和順里二年九月登州黄縣人苖珣四世義居宜改為和孝鄉邕順里十月棣州渤海縣人邢釗四世義居旌表門閭四年正月丙戌磁州武安縣崇禮鄉萬善里人馬肇三世義居旌表門閭仍改崇禮鄉為崇孝鄉萬善里為和慶里九月夀州奏登州黄縣累世義居人王義雲下所司旌表門閭所司初言自䘮亂已來亡失旌表式樣令式雖載條目别無制度時有明經生王守誠者即義雲之孫自言累代義居今鄉里尚有載初元年旌表門閭見在載初中奏臣逺祖六代同居有白雀嘉禾之瑞其旌表門閭様請下本州簡驗以聞即召房知温遣畫工至王義雲鄉里畫門閭以進所司方得安行末帝清泰二年七月鎮州元氏縣文成鄉七義里民曹重興七世義居孝義聞於鄉黨詔文成鄉改為仁孝鄉七義里改為旌義里仍委本道依令式旌表門閭其曹重興宜令授本府不赴任文參十月晉州臨汾縣平陽鄉聖泉里民宗連同縣原隰鄉百社里民劉環累世同居義聞州里詔改平陽鄉聖泉里為敦俗鄉崇仁里劉環改為廣孝鄉永和里仍委本道版署文參之名晉髙祖天福元年閏十一月壬午勅應自起義已來或盡節捐軀殁於王事宜加褒贈兼恤妻孥俾義激於忠貞庶恩霑於幽顯二年四月丁亥制曰遇滎陽而因思紀信届夷門而尚想侯嬴著髙義者猶足歎嘉蹈忠節者固宜旌賞事資激勸恩在褒揚梁故滑州節度使王彦章効命當時致身所事禀千年之正氣流百代之令名宜令超贈太師子孫量才叙録六月宗正卿石光贊奏昔周武王奄有天下過商容之閭必式見比干之墓即封蓋褒賞賢良尊崇忠義伏惟皇帝陛下顯膺天命開創鴻圖觧網行仁救時順動樂業不知於帝力悦隨但聼於山呼盛徳難名太平可待臣伏見滎陽道左有萬石君廟本前漢大中大夫石􅁬之廟􅁬有子四人各二千石禄景帝曰人臣尊寵畢集其門故號萬石君徳行懿績備列前書唐大中十三年鄭州司馬石貫稱裔孫刋石廟廷備紀其事伏遇皇帝行幸浚郊經過滎水展義已聞於岐路覃恩宜布於幽明其萬石君廟伏乞俯𢎞霈澤特降封崇俾光逺祖之徽猷益茂我朝之盛典勅漢大中大夫石􅁬徳盛軒裳道光簡素享萬石休明之禄成一門忠孝之名彰茂實於前脩契興隆於景運宗正卿石光贊特上章䟽欲示封崇冀表深原式昭豐祚宜贈太傅七月詔曰東都奏留守判官監左藏庫李遐當張從賔作亂之際遣李彦珣強取錢帛李遐稱不奉詔㫖安敢從命尋遇害朕以李遐讀古人書持君子行攻苦食淡承家不墜於素風激濁揚清歴宦咸推於貞操一昨叛臣猖獗兇黨憑陵而能守正不回臨難無懼忘身狥節雖死猶生若無優異渥恩何以光揚忠烈仍聞母老子㓜鄉逺家貧宜超贈於華資兼賞延於嫡嗣是覃漏澤慰彼沈寃可贈右諌議大夫其母田氏封京兆郡太君所有子孫候服闋日量才叙録朝廷雖已特支救接錢帛粟麥其本官賻贈物色宜依甞例指揮仍長給遐在生官俸禄終母一世噫朕以薄徳屬兹多難致害忠良實多軫惻以子之俸終母之年用表衋傷俾慰存殁布告中外當體朕懐是月又以東頭供奉官王思勲前齎詔撫諭河陽為張從賔所害制曰思勲早承家廕久列内廷奉王命而不辭顧賊衆而無懼宣揚朝㫖勸諭兵師遂被兇徒横加殺害而聞厥父抱疾其家甚貧不有旌酬何彰忠烈可贈左武衛大將軍仍以思勲舊請俸禄終王元正一世思勲男候有長成者量才叙録兼令所司厚給賻贈噫以子之俸終父之年足表渥恩以慰存殁布告中外咸使聞知四年正月尚書户部奏深州司功參軍李自倫六世義居奉勅准格處分按格勅節文孝義旌表苟存虛濫不可褒稱必在累世同居一門和睦尊卑有序財食無私遐邇欽承鄉閭推伏州縣親加按驗狀迹殊尤簡覆既同准令申舉方得旌表當司當本州審到鄉老呈言等自倫髙祖訓訓生燦燦生財財生忠忠生自倫自倫生光厚六從弟兄同居不妄勅以所居飛鳬鄉為孝義鄉孕聖里為仁和里仍准式旌表門閭自倫委吏部以本道一官注擬閏七月丙子尚書户部奏李自倫義居六世准勅旌表門閭先有登州義門王仲昭六代同居其旌表府㕔事歩欄前列屏樹烏頭正門閥閱一丈二尺二柱相去一丈柱端安瓦桷墨染號烏頭築䨇闕一丈在烏頭之南三丈七尺去街十有五歩槐桞成列今舉此為例則令式不該勅曰仲昭正㕔烏頭門等事不載令文又無勅命既非故事難凟大倫凢創業之朝求理是務静執守常之本動為經久之期志在普勵人情永孚王化據自倫之家所立實耀時風依仲昭之語便行何成世範至於問古官於剡子得墜典於伏生以昔方今彼與此異宜從令式只表門閭於李自倫所居之前量地之宜髙其外門人安集禊門外右左各建一臺髙一丈二尺廣狹方正稱臺之形圬以白泥四隅染赤其行列樹鎮隨其事力使不孝者見以悦心不義者聞而易行豈獨榮於趙國實亦光於晉朝廣訓黔黎永標青史其同籍課役一准今文十月故房州刺史李廷誥贈太保張從賔虎牢之亂殁於王事故也十二月丁未趙郡民曹典義居七世表其門閭五年七月己巳詔曰故銀青光禄大夫檢校左散騎常侍兼御史大夫賈仁詔頃自内廷出為外職李金全愚㝠而猜忌胡漢筠邪佞而貪殘竟罹塗地之殃誠堪歎息爰示漏泉之澤用表褒崇必有貞魂欽兹茂典可贈右衛將軍又曰故安州馬歩軍副都指揮使桑千威和指揮使王萬金成彦温等皆精武畧咸著軍功或列偏禆或嘗屯戍當姦臣之叛國或執節不從全烈士之狥名或銜寃而死實興永歎宜示追崇或列部符或升環衛賁諸幽壌彰彼明誠千可贈峽州刺史萬金可贈左監門衛將軍彦温可贈左千牛衛將軍八月辛亥磁州武安民郝平義居五世改所居武成鄉為興孝鄉崇福里為光和里仍旌表其門閭六年十月壬寅詔曰唐室中玘賢臣挺生凛然英風􅒯冠千古不有典册曷旌忠良唐梁國公狄仁傑禀五行正氣聳九諌直操鼎祚危而復安黔庶否而獲泰惠流河北名振寰中惟爾事君無愧臣節用光遺像式示明恩筠簡賽函著周官之貴位貞魂英爽煥魏土之靈祠韶是寵嘉永光緹素可追贈太師仍令所司擇日備禮册命七年閏三月辛丑旌表陳州西華縣人張厚門閭仍改禮教鄉為孝義鄉株林里為和順里厚家四十餘口五世聚居家門雍睦鄉黨稱之本州以聞故有是命六月戊午勅故㐮州元隨都押衙王令謙贈忠州刺史押衙潘知麟贈順州刺史令謙與知麟早事節度使安從進歴數鎮從進臨漢上所為多不法令謙知麟毎諌之及萌逆節數形讜言㑹從進子𢎞超自宫苑副使省父至郡郡有山寺𢎞超率令謙登賞酒酣臨峭壁使人推落誣云令謙因醉堕崖而死皆從進之意也知麟相次遇害朝廷聞其事故有贈典旌其忠也時詔㫖仍委髙行周候收復城池訪覔兩家骨肉切加安撫具以名聞當與叙録潘知麟本貫陜州兼下本處如有親的骨肉亦仰録奏少帝開運元年勅曰故淄州刺史翟進宗不榖不徳營兵叛予䧟爾厲階力屈遇害念兹忠瘁實用䀌傷蜀主恕其黄權魯繆誄其卜國皆非罪也吾將贈之用慰貞魂宜頒漏澤可贈左武衛上將軍曹敏蔡州汝陽縣荆河鄉蘇村人數世義居鄉人耿温等五十五人論奏請加旌表勅㫖荆河鄉宜改為孝義鄉費鄭里改為仁和里三年勅孟州奏河隂縣版籍鄉謝明里義居百姓王均宜改版籍鄉為孝悌鄉謝明里為積慶里餘准格文處分漢隠帝乾祐三年春汝州防禦使劉審交卒汝為近輔號為難治審交盡去煩弊無擾於民百姓歌之及卒郡人聚哭於柩所列狀乞留葬本州界立碑起祠以時致祭本州以聞詔曰朝廷之制皆有舊章牧守卒官比無贈典其或政能殊異惠及蒸黎生有令名殁留遺愛褒賢奨善豈限彛章可贈太尉吏部所請宜依周太祖廣順元年八月契丹遣幽州教練使曹繼筠䕶送趙瑩䘮柩至其家制曰禮云利禄先死者而後生者則民不悖先亡者後存者則民可以託聖人垂訓與我同心因嗟既殁之賢俾舉追崇之典晉故中書令趙瑩行髙言善性達心平鼎號函牛斯為重器劒稱斬馬可謂靈鋒遺清白於子孫行忠信於蠻貊斷魂外境歸骨中華於是䀌傷載深軫悼俾贈三師之秩以伸一去之悲可贈太傅二年三月乙丑故控鶴指揮使郭超贈鎮海軍節度使超從曹英攻兖州用命中流矢而卒四月乙未供奉官蓋繼明自樂夀來言齊州兵作亂之日只有鎮州雄勝都頭楊肇十將李鐸二人部署兵士登城守禦遂保安城池詔褒之五月太祖平兖州乃下勅曰閻𢎞魯崔周度死義之臣禮加二等所以滲漏澤而賁黄泉也爾等貞節昭彰正容肅厲以從順為己任以立義作身謀履此禍機併罹寃横宜伸贈典以慰貞魂𢎞魯贈驍衛大將軍周度贈秘書少監六月壬子以故虎㨗左第三都指揮使景進贈静江軍節度使故虎㨗第七都指揮使杜珣贈武清軍節度使皆軍興兖州時殁於王事也三年五月户部言濟州金鄉縣民索修已陳州項城縣民常真皆散髮跣足守墳本州以聞户部以赦書節文孝子義夫所宜旌表以厚時風勅宜依令文施行顯徳元年正月丙子朔赦文自開創已來諸軍將校死王事者軍使都頭已上並與追贈已追贈者更追贈有親嫡子孫量才録用世宗以顯徳元年正月丙申即位三月詔諸軍將校自開剏已來有殁於戰陣及身死疆塲者並與追贈如有親嫡子孫未曾録用者並與録用七月辛邜制曰故輸忠翊戴功臣鎮國軍節度華商等州觀察處置等使兼河東道行營先鋒都指揮使檢校太保史彦超嚴能齊衆武可推兇振鐸號軍伸其膽勇登鋒捍冦誓以身先一昨北戎阻兵同惡相濟爾乃力排羣醜體中重瘡雖敵騎已大奔而將軍之先殁衽金革而剛强已矣聼鼓鼙而傷歎如何言念純臣宜膺褒美俾追贈於崇秩用報慰於重泉可贈檢校太師三年二月庚辰贈故右金吾衛將軍蕭處仁漢州防禦使處仁晉漢之間繇通事舍人歴閣門客省之職而昇於環衛繼䕶兵於外頗有聲望帝率兵渡淮以為先鋒兵馬都監攻䧟滁州日為流矢所中而卒以其殁於王事故優其贈典九月庚寅朔辛邜贈故濟州刺史李實睦州防禦使贈故蘄州刺史觧行徳明州防禦使贈故引進使王演太府卿皆以淮甸之役殁於王事故也六年贈故華州節度使史彦超為太師先是大軍至河東城下契丹營於忻代之間遥應賊勢詔天雄軍節度使符彦卿率諸將屯忻州以拒之彦卿襲契丹於忻口彦超以先鋒軍追蕃冦離大軍稍逺賊兵伏發為賊所䧟世宗痛惜久之故有是命册府元龜卷一百四十
