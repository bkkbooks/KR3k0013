body:
  text: 册府元龜卷五百九十一宋王欽若等撰掌禮部奏議第十九唐韋彤為太常博士貞元十二年十月與博士裴堪上䟽議太廟朔望饗祭曰臣等謹按禮經前代故事在廟無朔望祭食之儀於陵寝有朔望上食之禮國家自貞觀至開元修定禮令皆遵舊典天寳十一年閏三月初别令上食朔望進食於太廟自太祖已下每室奠享其進奠之儀在臣禮司並無著令或當時禮官王璵不本禮意妄推縁生之義請用宴私之饌此則可薦於寝宫而不可黷於太廟一時之制久未變更至今論禮者貶王璵之議伏請今月八日進止令宗正與太常計㑹辦集者伏以陛下䖍奉宗廟齋心自中事歸有司各合盡敬然後詳議故實臣得竭誠謹按禮祭統云夫祭者非物自外至者也自中出生於心也心怵而奉之以禮由是牲牢有定制籩豆有常數罄天生地長之物極昆蟲草木之異茍可薦者莫不咸在先王以此饗宗廟交神明全孝敬也若王之食飲膳羞八珍百品可嗜之饌随好所遷美脆㫖甘皆為䙝味先王以此宴賔客接人情示慈恵也則知薦饗宴食於文已殊聖人别之以異為敬今若以熟食薦太廟恐違禮本又祭義曰祭不欲數數則煩煩則不敬祭不欲䟽䟽則怠怠則􅁯是故礿祠蒸嘗感時致饗此聖人俯就之中制也今陵寝每月二祭不為䟽也太廟每嵗五饗不為數也則人臣執事在數䟽之間得盡忠也若令牲牢爼豆之司更偹膳羞盤盂之饌月朔月半将以為常環四時之中雜五饗之禮為數既甚黷亦随之雖曰不然臣不信也夫聖主之制必師扵古訓不敢以孝思之極而過于禮不敢以肴膳之多而䙝於味伏願陛下遵開元萬代之則省天寳權宜之制陵寝之上得極珍羞宗廟之中請依正禮臣等忝司禮職敢罄愚衷帝令宣示宰臣曰此禮已經先帝所定朕未敢遽有改移待更商量期于允當十三年八月詔張茂宗起復左衛将軍駙馬都尉尚義章公主彤與堪上䟽言伏見駙馬都尉張茂宗猶在母䘮聖恩念其亡母遺表所請許公主出降仍令茂宗借吉就婚者伏以夫婦之義人倫大端所以闗雎冠詩之首者王化之先也天屬之親孝行為本所以齊斬居服之重者人道之厚也聖人以二端為訓人之本不可變也故制婚禮曰納采問名納吉納徴皆主人筵几聴命於廟稱事立禮謂之嘉所以上承宗廟下繼後嗣也又制䘮禮曰創巨者其日久痛甚者其愈遲三年之䘮二十五月而畢稱情立文通謂之凶所以送死有己復生有節也然後夫義婦順父慈子孝馴致不失臻於太和厯代寳之以為至敬昔者魯侯改服晋襄墨縗事至重於奪情義亦許其權變又兵法鑿門而出以凶禮處之以情相因體或為類若茂宗釋縗服而衣冕裳去堊室而行親迎雖云輟哀借吉是亦以凶凟嘉豈唯失先王之重典抑亦為國家之爽法儻茂宗留俟免䘮則日月非逺今公主指期下嫁又儀注有嫌固不可廢重而就輕捨大而取小伏惟皇帝陛下體天撫運統人立法何嘗不守先王之至徳聖哲之明謨下盡羣言上留𤣥鑒彛倫式敘懿範昭明所以八表肅清四夷歸化方宏禮義之日大敦名教之時扵無為之朝有異議之事衆情未達疑懼交深伏願抑茂宗亡母之誠顧典章不易之義待其終制然後賜婚收天情於至難察有司之懇守垂之史冊聖徳彌光則天下幸甚臣謬偹禮官懼于失職不勝致君愛禮之至䟽奏不納齊抗為太常卿貞元十四年十二月奏曰元日朝賀奏事官户部尚書司天監准開元禮兼合于横班同羣官拜訖然後依次奏事自頃因循並未拜已前先就于階立奏事畢随例便退臣與禮司商量請依開元禮户部尚書已下于南班再拜訖便随上公升于階就東向位立准儀注奏事庶禆闕典以補舊儀可陳京為給事中貞元十九年三月奏今年夏禘饗于太廟須定太祖景皇帝東向之位并遷廟之位伏以禘祫是審諦大合祖宗次序之祭必遵太祖之位以正昭穆今年遇禘大祭恐須定比来所議之禮饗日既近臣職忝刋緝經籍謹遂奏聞伏以建中二年及貞元七年十一年特令都省詳議者三竟未正太祖東向之位至十二年禘十七年祫猶未得中其于至正之饗不可重難依違又以過此也詔百官議定以聞鴻臚卿王權議曰案祭法曰周人祖文王而宗武王故毛詩清廟章云清廟祀文王也不言太王王季也又案雍禘章䟽云太王王季已上皆云祔於后稷之虛廟盖以太祖東向之位至尊也太王王季之尊私禮也后稷之廟天下為公不敢以私奪公也又案鄭𤣥注祭法曰古者先王遷廟之主以昭穆合蔵于始祖今獻祖懿祖之主愚臣竊以為宜祔于興聖廟不當祭于太廟也如此太宗東向之位得其尊獻祖懿祖之位得其所也時前後議者亦多言祔於興聖廟然無引據上意不决自寳應已前太祖尚在昭穆故虚東向以祔太祖及廣徳二年太廟室數己滿遷二祖于夹室方正太祖東向之位凡十九年至建中二年冬祫祭有司誤引東晋蔡謨議請虚東向當蔡謨議本請别築宫廟以居頴川京兆以上四府君其宫廟未成以前請權虚東向之位待制廟成遷四府君神主於别廟然後太祖正東向之位雖有此議屬晋室兵革議不暇行建中初有司雖引蔡謨虚東向之位禮終亦不行乃誤以宣皇帝居東向降太祖在昭穆之位及是覽羣臣之議以太祖居東向是百代不刋之典以二祖皆追崇非有土子民之尊禮當祔别廟及覽權議引據詩禮成文上意遂定遷二祖於徳明興聖廟每禘祫年一饗遂正太祖東向之位是時左僕射姚南仲等獻議狀五十七封詔付都省再集百寮議定聞奏户部尚書王紹等五十五人議請奉遷獻祖懿祖神主祔徳明興聖廟請别増兩室奉安神主縁二十四日禘祫祭修廟未成請於徳明興聖廟垣内權設幕屋為二室權安神主候増廟室成准禮遷祔神主于新廟每至禘祫年各于本室行饗禮從之是月十五日遷獻祖懿祖神主權祔徳明興聖廟之幕殿二十四日饗太廟自此景皇帝始居東向之尊元皇已下依左昭右穆之列矣二祖新廟成日奉遷獻祖懿祖神主正太祖至景皇帝之位䖍告之禮當在重臣宜令檢校司空平章事杜佑攝太尉告太清宫門下侍郎平章事崔損攝太尉告太廟又詔曰國之大事式在於明禋王者孝饗莫重於殷祭所以尊祖宗而正昭穆也朕承列聖之休徳荷上天之睠命䖍奉牲幣二十五年永惟宗廟之位禘嘗之序夙夜祇栗不敢自専是用延訪公卿稽參古禮博考羣議至於再三敬以令辰奉遷獻祖宣皇帝神主懿祖元皇帝神主祔于徳明興聖皇帝廟太祖景皇帝正東向之位冝令所司備禮務極精嚴祇肅祀典載深感惕咨爾中外宜悉朕懐杜黄裳為太常卿貞元二十一年正月順宗即位二月乙夘奏曰禮云䘮三年不祭唯祭天地社稷周禮黄鍾之均六變天神皆降林鍾之均八變地祇咸出不以樂則祭不成今遵遺詔行易月之制請制内遇祭輟樂制外用樂從之又奏禮三年不祭宗廟國家故事未𦵏不祭今請俟祔廟畢復常従之是年十一月徳宗神主将祔黄裳與禮官王涇等請遷髙宗神主于西夹室其議曰自漢魏已降沿革不同古者祖有功宗有徳皆不毁之名也自秦漢魏晋迄于陳隋漸違經意子孫以推美為先光武以下皆有祖宗之號故至於迭毁親盡禮亦迭遷國家九廟之尊皆法周制伏以太祖景皇帝受命于天始封元本徳同周之后稷也髙祖神堯皇帝國朝首祚萬葉所承徳同周之文王也太宗文皇帝應天靖亂垂統立極徳同周之武王也周人郊后稷而祖文王宗武王也聖唐郊景皇帝祖髙祖而宗太宗皆在不遷之典髙宗皇帝今在三昭三穆之外謂之親盡新主入廟禮合迭遷藏于從西第一夹室每至禘祫之月合食於嘗於是祧髙宗神主於西室祔徳宗神主焉王涇為太常博士憲宗元和元年七月順宗神主将祔有司疑於遷毁涇建議曰禮經祖有功宗有徳皆不毁之名也唯三代之闕漢魏以降雖曰祖宗親盡則遷無功亦毁不得行古之道也昔夏后氏十五代祖顓頊而宗禹殷人十七代祖契而宗湯周人三十六王以后稷為太祖祖文王而宗武王至唐徳厚流廣逺法殷周奉景皇帝為太祖祖髙祖而宗太宗皆在百代不遷之典故代宗升祔遷代祖也徳宗升祔遷髙宗也今順宗升祔中宗在三昭三穆之外謂之親盡遷于太廟夹室禮則然也或議者以則天太后革命中宗復而興之不冝在遷藏之例臣竊未喻也日者髙宗晏駕中宗奉遺詔曰自儲副而陟元后則天太后臨朝廢為廬陵王聖厯元年太后詔復立為皇太子屬太后聖夀延長御下日久姦臣擅命紊其紀度敬暉桓彦範等五臣巨唐舊臣佐輔王室翊中宗而承大統此乃子繼父業是中宗得之而且失之母授子位是中宗失之而復得之二十年間再為皇太子再踐皇位失之在己得之在己可謂革命中興之義殊也又以周漢之例推之幽王為犬戎所滅平王東遷周不以平王為中興不遷之廟其例一也漢吕后専權産禄秉政文帝自代邸而立之漢不以文帝為中興不遷之廟其例二也霍光輔宣帝再盛基業而不以宣帝為不遷之廟其例三也伏以中宗孝和皇帝於聖上為六代祖父尊非正統廟亦親盡爰及周漢故事是與中興功徳之主不同奉遷夹室固無疑也蔣武為司勲員外郎順宗山陵将畢議遷廟之禮有司以中宗為中興之君當百代不遷宰相召武問之武對曰中宗以宏道元年於髙宗柩前即位時春秋已壯矣及母后簒奪神器潛移其後賴張柬之等同謀國祚再復此盖同于反正恐不得號為中興之君凡非我失之自我復之謂之中興漢光武晋元帝是也自我失之因人復之晋孝恵孝安是也今中宗與恵安二帝事同即不可為不遷之主矣有司又云五王有再安社稷功今若遷中宗廟則五王永絶配享如之何武曰凡配饗功臣每至禘祫年方合食于廟居常即無饗禮今遷中宗神主而禘祫之年毁廟之主並陳于太廟此則五王配食與前時如一也有司不䏻答宰相奏下公卿重議翌日兵部侍郎李巽等集議並與武同由是竟遷中宗神主於是禮儀使奏髙宗皇帝十二月四日忌則天皇后十二月二十六日忌中宗皇帝六月二日忌和恵皇后四月七日忌謹按禮記云捨故而諱新此謂已遷之廟則不諱也今順宗神主升祔禮畢髙宗中宗神主上遷則忌日並不合行香仍依禮不諱制可武元衡為門下侍郎平章事元和二年九月與諸宰相上言伏以先王制禮皆有著定之文後聖沿情或狥一時之敬過猶不及遂至於煩詢于有司兼酌禮意若無釐改有黷舊章其太廟諸陵日遣使臣等商量每嵗除太廟時饗及太廟朔望上食諸陵朔望奠親陵朝晡奠外餘饗食及忌日告陵等並請停其果實甘橘蒲萄菱梨等皆逺方進奉陵邑所無並請遣使於諸陵薦獻果實之中甘𤓰特異亦謂至時上薦其餘𤓰果及四時雜物並望委陵令與奉陵縣計㑹及時供薦其専遣使亦請停庶宏聖敬之心不虧嚴潔之祀制可三年四月癸亥太常禮院上言太廟時饗及告廟朔望薦食同日謹按禮經祭不欲數伏以太廟禘祫祭禮重於時饗准禮時饗與禘祫同月即其月但行禘祫祭不行饗盖不欲煩是禮先重者今時饗重於朔月薦食稽求禮情叅酌輕重於時饗之月其月朔薦食亦合便停若兩禮兼行即祭恐煩黷伏請至時饗及臘饗其月朔望食請停餘月一准舊例如告廟日與朔望薦食月同伏請先行告禮然後薦食即兾踈數有節合於禮中従之鄭元為京兆尹元和三年五月條奏王公士庶䘮𦵏節制一品二品三品為一等四品五品為一等六品至九品為一等凡命婦各准本品如夫子官髙聴從夫子其葬器悉請以瓦木為之是時厚𦵏成俗久矣雖詔下事竟不行韋公肅為太常博士充禮院修撰官元和九年正月上䟽曰准禮無忌月禁樂今太常及教坊以正月是國家忌月停習郊廟饗宴之音中外士庶咸罷慶樂伏尋經典切恐乖宜臣謹按禮記有忌日不樂無忌月之文漢魏以降代襲斯㫖唯晋穆帝将納后以康帝忌月下議禮官荀訥王洽曹躭王彪之並當時知禮者皆稱禮有忌日無忌月若有忌月即一月忌時忌嵗盖無禮據時從其宜伏以承前所禁皆在二十五月之中今既踰逺禮須改革臣又聞統人立法必守先王之常經企及俯就不違聖哲之明訓下盡羣言上留元鑒不以私懐而踰於禮節又記曰是月禮徙月樂明王制樂漸去其懐不應以追逺而立禮反重也今太常停習郊廟之樂是反重而慢神有司禁中外之音是無故而去樂詳其前典情理不倫考其㳂襲又無所據儻陛下正因循之越度法經典之明文約禮之儀傳於史册天下幸甚詔付中書門下令召太常卿典禮官詳議可否中書門下奏曰忌日太常寺及教坊悉停習中外士庶亦皆禁㫁准禮文及厯代典故並無忌月禁樂請依常教習者勅㫖宜依其士庶之家亦准此武儒衡為中書舎人元和十四年二月太常丞王涇上䟽請去太廟朔望上食詔令百官議開元禮太廟每嵗禴祀嘗蒸臘凡五享天寳末𤣥宗以尚食每朔望具嘗饌令宫闈令上食於太廟後遂為常由是朔望不視朝此之大祠故也國子博士史館修撰李翺奏議曰國語曰王者日祭禮記曰王立七廟皆月祭之周禮不載日祭月祭惟四時之祭禴祀蒸嘗漢氏皆雜用之盖遭秦焚書禮經燼滅編殘簡缺漢以来之先儒穿鑿各申己見皆記古聖賢之名以信其語故其所記各不同也古者廟有寢而不墓祭秦漢始建寝廟於園陵而上食焉國家因之而不改貞觀開元禮並無宗廟日祭月祭之禮以日祭月祭既已行於陵寢矣故太廟之中每嵗五饗六告而已不然者房元齡魏徴之徒皆一代名臣博極經史豈不見國語禮記有日祭月祭之詞乎斯足以明矣伏以太廟之饗籩豆牲牢三代之通禮是貴誠之義也園寢之奠改用嘗饌秦漢之權制乃食味之道也今朔望上食於陵寢循秦漢故事斯為可矣若朔望上食於太廟豈非用䙝味而貴多品乎且非禮所謂至敬不饗味而貴氣臭之義也傳稱屈到嗜芰有疾召其家老而囑之曰祭我必以芰及祭薦芰其子屈建命去芰而用羊饋籩豆脯醢君子是之言事祖考之義當以禮為重不以其生存所嗜為之盖明非食味也然則薦嘗饌於太廟無乃與薦芰為比乎且非三代聖王之所行也况祭器不設爼豆祭官不命三公執事者唯宫闈令與宗正卿而已謂之上食可也安得以為祭乎且時享于太廟有司攝事祝文曰孝曽孫皇帝臣某謹遣太尉臣名敢昭告于髙祖神堯皇帝祖妣太穆皇后竇氏時惟孟春永懐罔極謹以一元大武柔毛剛鬛明粢薌合薌萁嘉蔬嘉薦醴齊敬脩時享以申追慕尚饗此祝詞也前辛七日質明太尉誓百官于尚書省曰某月某日時享于太廟各􅅥乃職不供其事國有常刑凡陪享之官散齋四日致齋三日然後乃可以為祭也宗廟之禮非敢擅議雖有知者其誰敢言故六十餘年行之不廢今聖廟以弓矢既櫜禮樂為大故下百寮使得詳議臣等以為貞觀開元禮並無太廟上食之文以禮㫁情罷之可也至若陵寢上食採國語禮記日祭月祭之詞因秦漢之制循而存之以廣孝道可也如此則經義可據故事不遺大禮既明永息異論可以繼二帝三王而為萬代法與其黷禮越古貴因循而憚改作猶天地之相逺也儒衡議曰臣謹案開元禮太廟九室每年惟五饗六告祭用牲牢爼豆而已劉歆祭議曰大禘則終王壇墠則嵗貢二祧則時享曽髙則月祀祖禰則日祭國語云王者日祭月饗時類嵗祀此則徃古之明徴國朝之顯據盖日祭者薦新也言物有可薦則薦之不必卜擇日時也故叔孫通云古有嘗果今櫻桃方熟可以為獻由是恵帝取以薦宗廟是不卜日矣當叔孫通之言且曰古有嘗果足明古禮非漢制也月饗者告朔也論語子貢欲去告朔之餼羊孔子以為不可則告朔必具牲牢明矣春秋又譏閏月不告朔猶朝于廟此則月祭殷周已降皆有之也薦園寝者始於秦之代漢氏因之而又改人君三年之制以日易月䘮紀既以二十七日而除則朔望奠酹不復親執故既葬之後移之園陵又諸陵祠殿月逰衣冠取象平生務從豐潔所以陵寝朔望上食與太廟日祭月饗本㫖不同今王涇所引太廟與陵寝同日時設祭以為越禮臣切謂王涇但宜論太廟陵寝朔望奠祭可行可廢之㫖不當以同日同時為議何者漢朝宗廟園陵一百六十七所郡國祠祀豈不與宗廟同時者乎在禮既祭於室又繹於祊盖廣乎求神者也宗廟陵寝嘗礿同時理固無害又韓臯引漢官儀古不墓祭臣據周禮􅊘人之職凡祭墓則為之尸則古亦墓祭但與漢家陵寝不同耳安得謂之無哉又王涇狀以太廟設祭别家嘗饌以為䙝味而韓臯則云法饌依經固非黷祭臣案春官大宗伯以肆獻祼饗先王者謂觧牲體薦血腥灌之以鬰鬯者也又祭義云祭之日君牽牲入廟門麗于碑卿大夫袒而毛牛尚耳取膟膋祭腥敬之至也夫豈謂嘗饌耳文王之祭思死者如不欲生夫豈知増嘗饌耶盖其慤焉盡其禮而不過失焉所以然也是以簠簋有數籩豆有殺雖多更聖賢不敢加也今夫嘗饌庖人羞之膳夫熟之糅以羶香雜以鹹辛具有司之烹炊漏神明于媟近意雖不䙝而事已䙝矣况古者天子立七廟又為壇墠以祭去祧之主近則起土逺則掃地盖彌逺而彌尊益敬而益簡臣以為陵廟近也親親也朔望奠獻尚潔務豐宜備嘗饌以廣孝也宗廟逺也尊尊也禘祫時享告朔薦新宜從古制以正禮也唯太廟望祭無所本據盖異時有司因其陵寝有朔祭望祭以為宗廟既有朔祭則望祭亦合行之殊不知宗廟朔祭乃告朔也臣以為宜罷此耳仲尼三年無改於父之道盖言理有改更則三年之外斯可矣况天寳之令行於一時者哉今陛下開十聖之景光廓八紘之氛祲風掃長彗神驅大妖刳金㦸以厚農直玉斗而序政博採羣議講求典經将欲成一王之教垂萬代之法安可因陵寝縁情取象之禮宗廟薦鬯㳙選之儀甚不然也事竟不行李建為禮部侍郎元和十五年正月穆宗即位四月禮部奏睿宗皇帝神主祧遷石室准貞觀故事遷廟之主藏于夹室西壁南北三間苐一間代祖室苐二間髙宗室苐三間中宗室伏以山陵日近睿宗皇帝祧遷有期夹室西壁三室外無置室處准江都集禮古者遷廟之主藏於太宗廟北壁之中今請於夹室北壁以西為上置睿宗皇帝神主石室制可王彦威為太常博士是時淮南節度使李夷簡上議曰王者祖有功宗有徳大行皇帝戡翦㓂逆累有武功廟號合稱祖陛下正當决在宸㫁無信齷齪書生也遂詔下公卿與禮官議其可否彦威奏議曰伏惟禮經及三代之制始封之君謂之太祖太祖之外又祖有功而宗有徳故夏后氏祖顓頊而宗禹殷人祖契而宗湯周人郊祀后稷祖文王而宗武王自東漢魏晋漸違經意沿革不一子孫推美於先故自始祖已下並有建祖之制盖非典訓不可法也國朝祖宗制度本於周禮以景皇帝為太祖又祖神堯而宗太宗至髙宗以後則但稱宗謂之尊名著為成法不然則何以太宗造有區夏致理升平𤣥宗掃清内難翼戴聖父肅宗龍飛靈武收復两京此皆應天順人撥亂反正至於廟號亦但稱宗謹案經義祖者始也宗者尊也故傳曰始封必為祖書曰徳髙可尊故號髙宗今宜本三代之定制去晋魏之亂法守貞觀開元之憲章而擬議大名垂以為訓大行皇帝廟號宜稱宗從之十二月太常禮院奏来年正月三日皇帝有事于南郊同日立春後丑祀風師案周禮大宗伯云以槱燎祀飌師鄭𤣥云風箕星也故今禮立春後丑于城東北就箕星之位為壇祭之開元禮祀昊天上帝于圓丘百神咸秩箕星從祀之位在壇之第三等伏以皇帝有事南郊徧祭之儀百神咸在其五方帝并日月神州以下縁對昊天上帝皇地祇尊不得申並為從祀悉無上公行事並御署祝板之儀風師既是星辰厭降之義便當陪祭如非遇郊祀其特祭如常儀又大禮月有司薦獻太清宫薦饗太廟准開元禮并六典時饗薦獻並在孟月其五日太廟有司行事合權停制可是年十二月穆宗問有司有事于南郊合卜日與否禮官奏曰伏惟禮令祠祭皆卜日然自天寳以後凡欲郊祀必先朝太清宫次日饗太廟又次日郊天相循至今並不卜日從之辛巳命中使問有司祀上帝於圓丘太一從祀有祝文與否禮官奏曰准開元禮皇帝有事於南郊百神咸秩五天帝神州并日月並在壇第一等雖天之貴神乃星中之尊耳位在壇第二等既為從祀不置祝文其春秋祭于九宫本壇則如常禮從之李渤為庫部員外郎分司東都長慶元年奏太㣲宫神主請歸祔太廟勅付東都留守鄭絪商量聞奏絪奏云臣謹案詳三代典禮上稽髙祖太宗之制度未嘗有並建兩廟并饗二主之禮天授之際祀典變革中宗初復舊物未暇詳考典章遂於雒陽創立宗廟是行遷都之制實非建國之儀及西歸上都因循未發徳宗嗣統墜典克修東都九廟不復告饗謹按禮記仲尼荅曽子問云天無二日土無二王嘗禘郊社尊無二上所以明二主之非禮也陛下接千載之大統揚累聖之耿光憲章先王垂法後嗣况宗廟之禮至尊至重違經黷祀時謂不欽特望擇三代令典守髙祖太宗之憲度鑒神龍權宜之制尊建中矯正之禮依經復古允属聖明伏以太㣲宫光皇帝三代睿宗聖文孝武皇帝神主參考經義不合祔饗至于遷置神主之禮三代以降禮無明文伏望委中書門下與公卿禮官質正詳定勅付有司太常博士王彦威等奏議曰謹案國初故事無兩都並建宗廟並行饗薦之禮伏尋周書召誥雒誥之説實有祭告豐廟雒廟之文是則周人兩都並建宗祧至則告饗然則兩都皆祭祖考禮必並興自神龍復辟中宗嗣位廟既皆作饗亦並行天寳末兩京傾䧟神主亡失肅宗既復舊物但建廟作主于上都其東都神主至大厯中始于人間得之遂寓于太㣲宫不復祔饗臣等謹案經傳王者之制凡建宫室宗廟為先廟必有主主必在廟是則兩都立廟盖行古之道主在廟實依禮之經今謹叅詳理合升祔謹案元皇帝髙宗中宗睿宗是追王及祧廟之祖其神主合藏于太廟從西第一夹室景皇帝是始封不遷之主其神主合藏于太廟從西第一室髙祖太宗元宗肅宗代宗是創業有功親廟之祖伏惟江都集議正廟之主藏于太室之中禮記羣廟之主有故則聚而藏諸祖廟伏以徳宗之下神主未作代宗之上后祖先亡若歸本室則有虚主事雖可據理或未安今髙祖以下神主並合藏于太祖廟依舊准故事不饗如陛下肆覲東后移都雒陽自非祧主合歸本室其餘閏主又當時而作祔饗時祭禘祫如儀臣又按國家追王故事太祖之上又有徳明興聖懿祖别廟今光皇帝神主即懿祖也伏縁東都先無前廟安光皇帝神主今請權祔于太廟夹室居元皇帝之上如駕在上都即准上都式營建别廟作徳明興聖獻祖神主備禮升祔又於太廟夹室奉迎光皇帝神主歸别廟第四室禘祫如儀或問曰禮作栗主瘞桑主漢議並有瘞主之議大厯中亦瘞孝敬皇帝神主今祔而不瘞如之何荅曰禮作練主瘞虞主其義以桑栗代謝捨故取新夫作主以依神無可埋之理是以禮説廟之主藏於西壁北壁之中故韋元成議瘞太上皇惠帝之主終見非于漢代秦靖請瘞處士君亦不行于魏朝貞觀中議遷廟主亦云萬國宗饗食所從来一旦瘞藏事非允惬孝敬尊非正統廟廢而主獨存從而瘞藏謂叶情理又問古者天子廵狩必載遷主如鸞駕東幸則准此文載主而前今東都神主又祔于廟便是廟有二主如之何荅者曰古者行以遷主無則主命自非遷廟之主則無出廟之文凡邑有宗廟先君之主曰都則兩都宗廟各宜有主又問曰古者作主必因虞練若主必歸祔則室不可虚則當補已亡之主創當祔之主禮無其説如之何荅曰虞練作主禮之正也非時作主事之權也王者遭時為法因事制宜茍無其文則思其變如車駕東幸廟仍虚主即准肅宗廣徳二年上都作主故事特作闕主向祔盖主不可闕故禮貴從宜春秋之義而變之正者也臣伏思祖宗之主神靈所憑寓于太㣲不入宗廟據經復本允屬聖明至是下尚書省集議而郎吏所議與彦威多同丞郎則各執所見或云神主合藏于太㣲宫或云並合埋瘞或云闕主當作或云乘輿東幸即載上都神主而東咸以意度不本經據竟以紛議不定遂不舉行牛僧孺為禮儀使長慶四年七月奏謹案周禮天子七廟三昭三穆與太祖之廟合而為七尚書咸有一徳篇亦曰七世之廟可以觀徳荀卿子曰有天下者祭七代有一國者祭五代則知天子上祭七代典籍通規祖宗功徳不在其數國朝九廟之制法昔周之文太祖皇帝始為唐肇基天命義同周之后稷也髙祖神堯皇帝創業經始化隋為唐義同周之文王也太宗皇帝神武應期造有區夏義同周之武王也其下三昭三穆謂之親廟四時嘗饗自如禮文今以新主立廟元宗明皇帝在三昭三穆之外是親盡之祖雖有功徳禮合祧遷祫禘之嵗則從合食詔從之劉寛夫為監察御史敬宗寳厯元年閏七月上言近日攝祭多差王府官僚位望既輕有乖嚴敬伏請已後攝太尉差尚書省三品已上及保傅賓詹等官如人少即請取丞郎通攝從之劉敦儒為起居郎寳厯二年二月太常奏追諡孝敬皇帝陵號恭陵追諡讓皇帝陵號恵陵追諡奉天皇帝陵號齊陵追諡承天皇帝陵號順陵並二時朝拜上擬祖宗情禮之差過猶不及其朝拜請停又追諡文敬太子廟在長安坊追諡恵昭太子廟在懐真坊悉置官吏四時置享禮經無文况九廟逓遷族属彌逺推恩降殺祼獻宜停又贈奉天皇帝廟贈承天皇帝廟贈貞順皇后廟及永崇坊隠太子已下七室下同為一廟並贈靖恭太子亦祔在此廟凡此制置皆是追崇或狥一時且非禮意日月既久祀享尋停其神主望准故事瘞于廟地庶情禮終始不失經訓勅㫖冝付所司集百寮叅議可否聞奏敦儒奏曰朝拜陵寝禮經無文列聖相沿久為故事就中四陵尤乖典禮請于太常所奏其二太子廟謹按禮記云殤與無後者從祖祔食又曰王下祭殤五又曰有隂厭有陽厭隂謂嫡殤也注云為宗子之殤祭扵奥爾雅云西南隅謂之奥此明幼殤而死故祭于祖廟隂闇之處也陽厭為祭庶殤也䟽云祭于宗子之家祖廟之内當室顯露之處故曰陽厭所以明嫡庶也過焉以徃則不祭也伏以惠昭太子位登儲闈業當主鬯親則髙祖神堯皇帝之宗子属則於皇帝為伯祖父雖禮文扵旁親無服而骨肉之恩不移于宗子若坎室扵徳宗皇帝廟内西南隅遷祔神主以特牲展祭不舉樂無肵爼去元酒不告利成庶合古禮若准魏晋故事即晋愍懐太子殤太子哀太孫冲太孫皆于祖廟北墉置隂室嵗時祔饗以至親盡今伏以國家變三代之典從東漢之制九廟既有周殿之隘一室難修䖏奥之儀况别廟隂室具為變禮依前享獻于事為宜其廟請不廢禮官或云恵昭太子棄東宫之日已過殤年若合祼享宜同祭臣以為古䖏扵奥今祀扵廟雖不以成人而别以合過殤之禮矣又或云若以成人合有主後臣以為恵昭太子裔嗣皆在宫中若未勝冠自宜抱奠文以同姓為尸者今但令宗正官屬主奠即雅符祀典矣其文敬太子生非繫本之重歿有追命之榮今扵皇帝為曽叔祖非大功之親禮經為庶而服屬已逺列于常祀實為非經請依太常所奏又隠太子以下神主或累朝嫡嗣或聖代名藩今其子孫皆居列土因縁食禄亦謂承家各令自列廟祧用申嚴配臣伏詳開元中勅諸贈太子有後者咸令自主其祭今請復行此制各使子孫奉迎神主歸祔私廟庶别子為祖符列國不祧之尊逺裔傳家聞聖王教孝之典其無後之廟及貞順皇后神主即請依太常所奏其贈奉天皇帝贈承天皇帝神主既有常號禮不可黷盖王者不享于下士諸侯不敢祖天子之義縱有主後法不當祭亦請依太常所奏制可崔龜從為太常博士文宗太和元年七月奏議曰伏以廢朝軫悼義重君臣所貴及哀尤宜示信自頃已来輟朝非奏報之時備禮于數日之外臣不敢逺徴古書請引近朝故事貞觀中任瓌卒有司對仗奏太宗責其乖禮岑文本既沒其夕為罷警嚴張公謹之亡哭之不避辰日是知憫悼之意不宜過時臣謂大臣薨禮合輟朝縱有機務急速便殿須召宰臣不臨正朝無爽于事詔下太常寺叅定太常上言曰伏以近日文武三品以上薨卒皆為輟朝其有未經親重之官今任是散列者為之變禮誠恐非宜自今已後文武三品以上非曽建功勲及曽任将相及曽在宻近宜加恩禮者餘請不在輟朝例其餘並請依元奏状及列上詔令中書門下詳定中書門下又上言曰古有當祭告䘮義在申情同體過時及哭扵理稍乖禮院所請合輟朝者若以聞䘮之来日請依餘約太常所奏别具品列輕重進定謹案儀制今百官正一品官䘮皇帝不視朝一日又准官品令自一品至三品已上薨歿通有輟朝之制伏以君臣之間情理所及事必繫扵委遇官則與時重輕一用舊儀或乖中道臣等叅酌其留守節察防禦經略等使及京輔刺史並請各據所兼憲官為例可之是月太常禮院上言敬宗廟祝文皇帝稱孝弟臣審詳孝字載考禮文義本主扵子孫理難施扵兄弟按禮記卜虞之文子孫曰哀兄弟曰某然則虞之稱哀與祭之稱孝其義一也扵祖禰則理宜稱孝扵伯仲則止于稱名又東晋温嶠議宗廟祝辭以為非子者則不稱旁親直言敢告當時朝議咸以為宜今臣上考禮經無兄弟稱孝之據下徴晋史有不稱旁親之文臣謂饗敬宗廟冝去孝弟兩字又上言九宫貴臣舊制是大祠伏以九宫貴神經典不載天寳中術士奏請遂立祠壇事出一時禮同郊祀臣詳其圗法皆主星名縱司水旱兵荒品秩不過列宿今者五星􅊖是従祀日月猶在中祠豈容九宫獨越常禮備列三事誓誡羣官尊卑乖儀莫甚于此若以嘗在祀典不可廢除臣請降為中祠並可之先是太傅崔龜従列上前朝祠祀之非是者凡數事上重慎其變更初令太常卿已下叅定又中書門下酌其可否悉以龜従奏為當然後下詔焉舒元輿為監察御史太和三年八月奏七月十八日祀九宫貴神臣次合監察職當檢察禮物伏見祝板九片臣伏讀既竟竊見陛下親署御名及稱臣于九宫之神臣伏以天子之尊除祭天地宗廟之外無稱臣者王者父天母地兄日姊月此以九宫為目是宜分方而守其位臣又觀其名號乃太一天一招揺軒轅咸池青龍太隂天符攝提也此九神于天地猶子男也于日月猶侯伯也陛下尊為天子豈可反臣于天地之子男耶臣竊以為過縱隂陽者流言其合祀則陛下當全稱皇帝遣某官致祭扵九宫之神不宜稱臣與名臣實愚聾不知其可伏縁行事在明日鷄初鳴時成命已行臣不敢滯伏乞聖慈異日降明詔命禮官詳議兾明萬乘之尊無所虧降悠久悞典因此可正詔都省議皆如元輿之議乃降為中祠祝板稱皇帝不署冊府元龜巻五百九十一
