body:
  text: 册府元龜巻三百七十三宋王欽若等撰將帥部忠第四後周楊􅎎仕魏孝荘時為伏波将軍給事中元顥入雒帝徃晉陽就爾朱榮詔􅎎率其宗人收船至馬渚􅎎未至帝已北度太行􅎎遂匿所收不以資敵及爾朱榮奉命南討至馬渚􅎎乃具船以濟王師楊寛仕魏為通直散騎常侍元顥自梁入雒孝荘出居河内寛與太宰元天穆俱謁孝荘於太行拜散騎常侍安東将軍仍為都督從平河内進圍北中時梁将陳慶之為顥兵守北門天穆駐馬圍外遣寛至城下說慶之寛先自稱姓名然後與語備陳利害勸令早降慶之不答久之乃曰賢兄撫軍在此頗欲相見否寛答曰僕兄既力屈凶威跡淪逆黨人臣之理何煩相見向所以先申姓名者豈不知兄在彼乎直以信不見疑忠為令徳耳僕之昆季幸不待言但當議良圖自求多福天穆聞之謂左右曰楊寛大異人何至不惜形便如此自是彌敬重之孝荘反正拜中軍将軍爾朱榮被誅其從弟世隆等擁部曲燒城門出據河橋還逼京師進寛鎮北将軍使持節大都督隨機扞禦世隆謂寛曰豈忘大宰相知之深也寛答曰大宰見愛以禮人臣之交耳今日之事事君常節世隆北走寛追至河内俄而爾朱兆陷雒陽囚執孝荘帝寛還雒不可遂自成臯奔梁至建業聞孝荘帝遇弑寛發哀盡誠梁武義之待之甚厚尋禮送還朝獨孤信仕後魏荆州刺史為東魏髙敖曹侯景所逼南奔於梁居三載梁武帝方許信還北信父母既在山東梁武帝問信所往答以事君無二梁武深義之還魏為武衞将軍孝武帝雅相委任及孝武西遷事起倉卒信單騎及之於瀍澗孝武歎曰武衛遂䏻辭父母捐妻子遠来從我世亂識忠良豈虚言哉即賜御馬一匹進爵浮陽公後為秦州刺史有自東魏来者告其父母㓙問乃發喪行服裴俠魏孝武時為右中郎将及帝西遷俠将行而妻子猶在東郡滎陽鄭偉謂侠曰天下方亂未知鳥之所集何如東就妻子徐擇木焉俠曰既食人禄寜以妻子易圖也遂從入關令狐整仕魏孝武時為𤓰州刺史東陽王元榮主簿盪㓂将軍及鄧彦竊據𤓰州拒不受代整與開府張穆等密應使者申徽執彦送京師周文帝嘉其忠節表為都督𤓰州城人張保殺刺史成慶與涼州刺史宇文仲和搆逆規據河西晉昌人吕興等復害郡守郭肆以郡應保整令所親說保令任整為将蔑不濟矣保納其計且以整父兄等並在城中弗之疑也遂令整行整至玉門郡召集豪傑說保罪逆馳還襲之先定晉昌斬吕興進軍擊保州人素服整威名並棄保来附保遂奔吐谷渾衆議推整為刺史整曰本以張保肆逆殺害無辜闔州之人俱陷不義今者同心務在除㐫若共相推薦復恐效尤致禍於是乃推波斯使主張道義行州事具以状聞詔以申徽為刺史徴整赴闕授夀昌郡守封襄武縣男文帝謂整曰卿早建殊勲今官位未足酬賞方當與卿共平天下同取富貴遂立為𤓰州義首整以國難未寜常願舉宗効力遂率鄉親二千餘人入朝随軍征討文帝嘗謂整曰卿逺祖立忠而去卿今立忠而來可謂積善餘慶世濟其美者也整逺祖漢建威將軍邁不為王莽所屈其子避地河右故帝稱之裴寛西魏大統中為征虜将軍與東魏将彭樂恂戰於新城因傷被擒至河隂見齊文襄寛舉止詳雅善於占對文襄甚賞異之謂寛曰卿三河冠葢材識如此必使卿富貴關中貧校何足可依勿懐異圖也因解鎖付館加厚禮遇寛乃裁所卧氊夜縋而出因得遁還見於太祖太祖顧謂諸公曰被堅執銳或有其人疾風勁草嵗寒方驗裴寛為髙澄如此厚遇乃䏻冐死歸我雖古之竹帛所載何以加之乃授帥都督李廣為大將軍沌口之役華皎軍敗為吳明徹所擒將降之廣辭色不屈遂被害髙琳為衛将軍除正平郡守加大都督時齊将東方老来冦琳擊之老中數鎗乃退謂其左右曰吾經陣多矣未見如此徤兒後乃宻使人勸琳東歸琳斬其使以聞進使持節車騎大将軍蔡祐字承先為平東将軍從太祖戰於河橋下馬歩鬬手殺數人左右勸乗馬以備急卒祐怒之曰丞相養我如子今日豈以性命為念遂率左右十餘人齊聲大呼殺傷甚衆敵以其無繼遂圍之十餘重謂祐曰觀君似是勇士但弛甲来降豈慮無富貴耶祐罵之曰死卒吾今日取汝頭自當封公豈假賊之官號也戰數合敵乃稍却祐徐引退李穆為并州總管以功授都督河橋之戰太祖所乗馬中流矢驚逸太祖墜於地軍中大擾敵人追及之左右皆奔散穆乃以䇿擊太祖因罵曰爾曹主何在爾獨住此敵人不疑是貴人遂捨之而過穆以馬授太祖遂得俱免是日㣲穆太祖已不濟矣自是㤙眄更隆太祖美其忠節乃歎曰人之所貴惟身命耳李穆遂䏻輕身命之重濟孤之難雖復加之以爵位賞之以玉帛未足為報也竇熾為柱國大将軍眀帝以熾前朝舊臣勲望兼重欲獨為造第熾辭以天下未平干戈未偃不宜輙發徒役眀帝不許後為雍州牧權行雒州鎮事後入朝屬隋文帝初為相國百官皆勸進熾自以累代受㤙遂不肯署牋時人髙其節柳檜為撫軍将軍魏興華陽二郡守安康人黄衆寳等圍檜郡力屈城陷為賊所獲衆寳等進圍東梁州乃縛檜置城下欲令誘說城中檜乃大呼曰羣賊烏合糧食已罄行即退散各宜勉之衆寳大怒乃臨檜以兵曰速更汝辭不爾便就戮矣檜守節不變遂害之棄屍河中人皆為之流涕衆寳解圍之後檜兄子止戈方收檜屍還長安贈東梁州刺史杜叔毗為車騎大将軍從衞國公直南討軍敗為陳人所擒陜人将降之叔毗辭色不撓遂被害王思政為驃騎将軍常以勤王為務不營資産嘗被賜園地思政出征後家人種桑果及還見而怒曰匈奴未㓕去病辭家况大賊未平何事産業命左右拔而棄之思政守潁川東魏太尉髙岳等率兵来攻齊文襄更益岳兵堰洧水以灌城城中水泉湧溢不可防止懸釡而炊糧力俱竭齊文襄聞之乃率步騎十一萬来攻自至堰下督勵士卒水壮城北面遂摧水便滿溢無措足之地思政知事不濟率左右據土山謂之曰吾受國重任本望平難立功精誠無感遂辱王命今力屈道窮計無所出當効死以謝朝恩因仰天大哭左右皆號慟思政西向再拜便欲自剄先是齊文襄告城中人曰有䏻生致王大将軍者封侯重賞若大将軍身有損傷親近左右皆從大戮都督駱訓謂思政曰公嘗語訓等但将我頭降非但得富貴亦是活一城人今髙相既有此言公豈不哀城中士卒也固止之不得引決齊文襄遣其常侍趙彦深就土山執手申意引見文襄辭氣慷慨無撓屈之容文襄以其忠於所事禮遇甚厚楊敷字文衍為驃騎大将軍汾州刺史戰敗為齊将段孝先所擒齊人方欲任用之敷不為之屈遂以憂憤卒於鄴尉遲綱為前将軍太祖與東魏戰於邙山大軍不利人心離散綱勵将士盡心翊衛王䡄為上開府儀同大将軍髙祖遣宣帝征吐谷渾䡄與宇文孝伯從時宫尹鄭譯王端等竝得幸於宣帝宣帝在軍中頗有失徳譯等皆預焉軍還䡄等言之於髙祖髙祖大怒乃撻帝除譯等名仍加捶楚宣帝因此大銜之䡄又嘗與小内史賀若弼言及此事且言皇太子必不克負荷弼深以為然勸䡄陳之䡄後因侍坐乃白髙祖曰皇太子仁孝無聞又多涼德恐不了陛下家事臣暗昧不足以論是非陛下恒以賀若弼有文武竒才識度宏逺弼比毎對臣深以此事為慮髙祖召弼問之弼乃跪對曰皇太子養徳春宫未聞有過未審陛下何從得聞此言既退䡄誚弼曰平生言論無所不道今者對揚何得乃爾翻覆弼曰此公之過也皇太子國之儲副豈易為言事有蹉跌便至滅門之禍本謂公密陳臧否何得遂至昌言䡄黙然久之乃曰吾盡心國家遂不存私計向者對衆良實非宜其後䡄内宴上夀又将髙祖鬚曰可愛好老公但恨後嗣弱耳髙祖深以為然但漢王次長又不才此外諸子並幼故不䏻用其説宣帝即位追鄭譯等復為近侍䡄自知及於禍謂所親曰吾昔在先朝實申社稷至計今日之事斷可知矣此州控帶淮南隣接彊㓂欲為身計易同反掌但忠義之節不可虧違况荷先帝厚㤙毎思以死自効豈以獲罪於嗣主便欲背德於先朝止可於此待死義不為佗計兾千載之後知吾此心大成元年帝令内史杜䖍信就徐州殺䡄尉遲迥為相州總管隋文帝輔政以迥位望宿重懼為異圖乃令迥子魏安郡公惇齎詔書以㑹葬徴迥尋以鄖國公韋孝寛代之為總管迥以隋文帝當權将圗簒奪遂謀舉兵留惇而不受代隋文帝又使侯正破六汗裒詣迥諭㫖密與總管府長史晉昶等書令為之僃迥聞之殺長史及裒乃集文武士庶登城北樓而令之曰楊堅以凢庸之才藉后父之勢挾幼主而令天下威福自已賞罰無章不臣之迹暴於行路吾居将相與國舅甥同休共戚義猶一體先帝處吾於此本欲寄以安危今欲與卿等糾合義勇安國庇人進可以享榮名退可以終臣節卿等以為何如於是衆咸從命莫不感激乃自稱大總管承制署置官司於時趙王昭已入朝留少子在國迥又奉以號令迥弟子勤時為青州總管亦從迥迥所管相衛黎毛洛具趙冀瀛滄勤所綂青膠光莒諸州皆從之衆數十萬榮州刺史邵國公宇文胄申州刺史李恵東楚州刺史費也利進東潼州刺史曹孝達各據州以應迥迥又北結髙寳寜以通突厥南連陳人許割江淮之地隋文帝於是徴兵討迥即以韋孝寛為元帥魏安郡公惇率衆十萬人入武徳軍於沁東孝寛等諸軍隔水相持不進隋文帝又遣髙熲馳驛督戰惇布兵二十餘里麾軍小却欲待孝寛軍半度擊之孝寛因其小却鳴皷齊進惇大敗孝寛乗勝進至鄴迥與子惇祐等又悉其卒十三萬陣於城南迥别統萬人皆綠巾錦襖號曰黄龍兵勤率衆五萬自青州赴迥以三千騎先到迥舊習軍旅雖老猶被甲臨陣其麾下千兵皆關中人為之力戰孝寛等軍失利而却鄴中士女觀者如堵髙熲與李詢乃整陣先犯觀者因其擾而乗之迥衆大敗遂入鄴迥走保北城孝寛縱兵圍之李詢賀樓子幹以其屬先登迥上樓射殺數人乃自殺子惇等東走并追獲之餘衆月餘皆斬之迥自起兵至敗凢六十八日唐武德中迥從孫庫部員外郎耆福上表請改塟朝廷以迥忠於周室有詔許之崔𢎞度為大将軍尉遲迥反𢎞度以行軍總管從韋孝寛討之所當無不披靡𢎞度妹先適尉遲迥子惇為妻及破鄴城迥窘迫登樓𢎞度直上龍尾追之迥将射𢎞度𢎞度乃謂迥曰今日各圖國事不暇得顧私事既如此早為身計何所待也迥置弓於地罵大丞相極口自殺𢎞度顧弟𢎞昇使取迥頭進位上柱國時行軍總管例封國公以𢎞度不即殺迥縱至惡言繇是降爵一等為武郷郡公司馬消難為交州總管隋文帝輔政消難既聞蜀公迥不受代遂欲與迥合勢亦舉兵應之以開府田廣等為心腹殺總管長史侯莫陳杲􅳡州刺史蔡澤等四十餘人所管䢵隋温應士順沔環岳九州魯山甑山沔陽應城平靖武陽上明湞水八鎮並從之使其子泳質於陳以求援隋文帝命襄州總管王誼為元帥發荆襄兵以討之八月消難聞誼軍将至夜率其麾下歸於陳王謙為益州總督時隋文帝秉政謙令司録賀若昻奉表詣闕昻還具陳京師事勢謙世受國恩将圗興復遂舉兵署置官司所管益潼新始龍邛青瀘戎寜汶陵遂合楚資眉普十八州及嘉渝臨渠蓬隆通興武庸十州之人多從之總管長史乙弗䖍益州刺史逹奚惎勸謙據險觀變隆州刺史阿史那瓌為謙畫三䇿曰公親率精鋭直至散關蜀人知有勤王之節必當各思効命此上䇿也出兵梁漢以顧天下此中䇿也坐守劍南發兵自衛此下䇿也謙叅用其中下之䇿謙遣兵鎮始州隋文即以梁睿為行軍元帥便發利鳯文秦成諸州兵討之達奚惎乙弗䖍等衆十萬攻利州聞睿至衆潰睿乗其弊縱兵深入惎䖍宻使詣睿請為内應以贖罪謙不知之並令守成都謙先無籌畧承藉父勲遂居重任初謀舉兵咸以地有江山之險進可以立功退可以自守且任用多非其才及聞睿兵奄至惶懼乃自率衆逆戰又以惎䖍之子為左右軍行數十里軍皆叛乃以二十騎奔新都縣令王寶斬之𫝊首京師惎䖍以成都降隋文以其首謀斬之阿史那瓌亦誅隋庫狄士文初仕齊為領軍将軍周武帝平齊山東衣冠多迎周師惟士文閉門自守帝竒之授開府儀同三司隋州刺史髙熲仕周為下大夫拜開府髙祖輔政為相府司録尉遲迥起兵髙祖命熲為監軍熲受命便發遣人辭母云忠孝不可兩兼歔欷就路周羅㬋初仕陳為使持節都督南川諸軍事至徳中江州司馬吳世興密奏羅㬋甚得人心擁衆領表意在難測陳主惑焉蕭摩訶魯廣達等保眀之外有知者或勸其反羅㬋拒絶之李崇為幽州總管開皇中突厥大為冦掠崇率步騎三千拒之轉戰十餘日師人多死遂保于砂城突厥圍之城本荒廢不可守禦曉夕力戰又無所食每夜出掠賊營復得六畜以繼軍糧突厥畏之厚為其僃夜中結陣以待之崇軍苦饑出輙遇敵死亡畧盡遲眀奔還者尚且百許人然多重傷不堪更戰突厥意降之遣謂崇曰若来降者封為特勒崇知必不免命其士卒白崇喪師徒罪當萬死今日効命以謝國家待看吾死且可降賊方便散走努力還鄉若見至尊道崇此意乃挺刄突賊復殺二人賊亂射之遂卒於陣堯君素大業末為鷹揚郎将從驍衛大将軍屈突通拒唐髙祖義兵於河東俄而通引兵南遁以君素有膽畧署領河東通守義師遣将吕紹宗韋義節攻之不尅及通軍敗至城下呼之君素見通歔欷流涕悲不自勝左右皆哽噎通亦泣下霑襟因謂君素曰吾軍已敗義旗所指莫不嚮應事勢如此卿當蚤降以取富貴君素答曰公當爪牙之寄為國大臣主上委公以關中代王付公以社稷國祚隆替懸之於公奈何不思報効以至於此更為人作說客邪且公所乗馬即代王所賜也公何面目乗之哉通曰吁君素我力屈而来君素曰我今力猶未屈何用多言通慙而退時圍甚急行李斷絶君素乃為木鵞置表於頸具論時勢浮之黄河㳂流而下河陽守者得之逹於東都越王侗見而歎息於是承制拜君素為金紫光禄大夫密遣行人勞苦之監門直閣龎王武衛将軍皇甫無逸前後自東都歸義俱造城下為陳利害唐髙祖乃賜金劵待以不死君素卒無降心其妻又至城下謂之曰隋之已亡天命有屬君何自苦身取禍敗君素曰天下事非婦人所知引弓射之應絃而倒君素亦知事必不濟然要在守死不易毎言及國家未嘗不歔欷嘗謂将士曰吾是籓邸舊臣累蒙奨擢至於大義不得不死今穀支數年食盡此穀足知天下之事必若隋室傾敗天命有歸吾當斷頭以付諸君也時百姓苦隋日久及逢義舉人有息肩之望然君素善於統領下不䏻叛嵗餘頗得外口城中㣲知江都傾覆又糧食乏絶人不聊生男女相食衆心離駭月餘君素為左右所害張季珣少慷慨有志大業末為鷹揚郎将其軍據箕山為固與雒口連接及李密翟讓攻陷倉城遣人呼之季珣罵宻極口宻怒遣兵攻之連年不䏻克時密衆數十萬在其城下季珣四面阻絶所領不過百人而執志彌固誓以必死經三年資用盡樵蘇無所得撤屋而㸑人皆穴處季珣撫之一無離叛糧盡士卒羸病不䏻拒戰遂為所陷季珣曰吾雖為敗軍之将猶是天子爪牙之臣何容拜賊也宻壮而釋之來護兒為右翊衞大將軍伐高麗出滄海道師次東萊㑹楊𤣥感反進攻雒陽䕶兒聞之召禆将周法尚等議旋軍討逆法尚等咸以無勅不宜擅還再三固執不從䕶兒厲聲曰雒陽被圍心腹之疾髙麗逆命猶疥癬耳公家之事知無不為專擅在吾當不關諸人也有沮議者軍法從事即日廻軍令子𢎞及整馳驛奏聞帝見𢎞等甚悦曰汝父擅赴國難乃誠臣也授𢎞通議大夫整公路府鷹揚郎将乃降璽書於䕶兒曰公旋師之時是朕勅公之日君臣意合遠同符契梟此元惡期在不遥勒名太常非公而誰也於是䕶兒與宇文述破𤣥感於閿鄉斬平之唐屈突通初仕隋大業中為左驍衛大将軍時秦隴盗賊蜂起以通為關内討捕大使及煬帝幸江都令通鎮長安義兵起代王遣通進屯河東既而義師至河東大破通将桑顯和於飲馬泉永豐倉又為義師所尅通大懼留鷹揚郎将堯君素守河東将自武關趨藍田以赴長安軍至潼關為劉文静所遏不得進相持月餘通又令顯和夜襲文静詰朝大戰義軍不利顯和縱兵破二柵唯文静一柵獨在顯和兵復入柵而戰者徃復數焉文静為流矢所中義軍氣奪垂至於敗顯和以兵疲𫝊飱而食文静因得分兵以實二柵又有逰軍數百騎自南山来擊其背三柵之兵復大呼而出表裏齊奮顯和軍潰僅以身免悉虜其衆通勢彌蹙或說通歸降通泣曰吾蒙國重㤙歴事兩主受人厚禄安可逃難有死而已毎自摩其頸曰要當為國家受人一刀耳勞勉将士未嘗不流涕人以此懐之髙祖遣其家僮召之通遂命斬之通聞京師平家屬盡沒乃留顯和鎮潼關率兵東下将如雒陽通進路而顯和降於劉文静遣副将竇琮段志𤣥等率精騎與顯和追之及於稠桑通結陣以自固竇琮得通子夀令徃諭之通大呼曰昔與汝為父子今與汝為仇讎命左右射之顯和呼其衆曰京師陷矣汝並關西人欲何所去衆皆釋伏通知不免乃下馬東南向再拜號哭曰臣力屈兵敗不負陛下天地神祗實所鑒察遂擒通送於長安髙祖謂曰何相見晚邪通泣對曰通不䏻盡人臣之節力屈而至為本朝之辱以愧相見髙祖曰隋室忠臣也命釋之李藝初仕隋為武賁郎将煬帝令督運於北平大業末自稱幽州總管宇文化及至山東遣使呼藝藝斬其使者而為煬帝發喪劉世讓為安定道行軍總管率兵拒薛舉戰敗世譲及弟寳俱為舉軍所獲舉将至城下令紿說城中曰大軍五道已趨長安宜開門蚤降世讓偽許之因告城中曰賊兵多少極於此矣宜善自固以圖安全舉重其執節竟不之害太宗屯髙墌世讓濳遣寳逃歸言賊中虚實髙祖嘉之賜其家帛千疋及賊平得歸授彭州刺史尋領陜東道行軍總管與永安王孝基擊吕崇茂於夏縣諸軍敗績世讓與唐儉俱為賊所獲獄中聞獨孤懐恩有逆謀逃還以告髙祖時髙祖方濟河将幸懐恩之營聞難驚曰劉世讓之至豈非天哉因勞之曰卿徃陷薛舉遣弟濳效欵誠今復冐危告難是皆愛國忘身也尋封𢎞農郡公賜荘一區錢百萬累轉并州總管統兵屯於鴈門突厥處羅可汗與髙開道范君嶂合衆攻之甚急鴻臚卿鄭元璹先使在蕃可汗令元璹来說之世讓厲聲曰大丈夫奈何為夷狄作說客邪經月餘虜乃退及元璹還述世讓忠勇髙祖下制褒美之賜以良馬劉感武德初以驃騎将軍鎮涇州薛仁杲率衆圍之感嬰城拒守埀陷者數矣長平王叔良援兵至仁杲解圍而去感與叔良出戰為賊所擒仁杲復圍涇州令感語城中云援軍已敗徒守孤城何益也宜蚤出降以全家室感許之及至城下大呼曰逆賊大饑亡在朝夕秦王率軍十萬衆四面俱集城中勿憂各宜自勉以全忠節仁杲大怒執感於城邉埋脚馳騎射殺之至死聲色愈厲賊平髙祖購得其尸祭以少牢贈瀛州刺史封平原郡公謚曰忠壮王行敏為屯衛将軍武徳三年為潞州刺史進攻竇建徳之師於武陟其後督兵狥燕趙㑹劉黒闥来攻行敏自歴亭出兵拒戰擊賊破之既而憩於野不設僃賊知而掩之左右皆遁因為闥所擒竟不拜闥斬之臨死西向言曰行敏大唐忠臣願陛下知之髙祖聞而痛惜焉左難當宣州人也武徳中為柱國獻池徽三州總管及輔公祏反遣使誘之難當斬其使者以聞仍率兵據赤石城公祏怒發衆數萬攻之不尅而還及公祏平髙祖嘉其忠效拜宣州都督進位上柱國封戴國公食邑三千戸盛彦師為宋州總管徐圓朗反彦師為安撫大使因戰沒於賊圓朗令彦師作書誘其弟令舉城降已彦師為書曰吾奉使無状被賊所擒為臣不忠誓之以死汝宜善侍老母勿以吾為念圓朗初色動而彦師自若圓朗乃笑曰盛将軍乃有壮節不可殺也待之如舊姜寳誼武徳二年為右武衛大将軍與尚書右僕射裴寂拒宋金剛于汾州戰始合寂棄軍而走兵遂大潰寳誼為賊所擒髙祖初聞其沒也泣曰寳誼烈士必不生降賜其家物千段米三百石寳誼後謀背賊事洩遇害臨死西向大言曰臣無状負陛下屠潰是所甘心但敗軍喪師九泉所恨及賊退髙祖遣使迎其柩謚曰剛張善相為伊州總管武徳二年王世充攻伊州善相被圍糧盡援兵不至城中餓死者日數百人善相自知必敗謂僚吏曰善相荷國厚㤙要當效命諸公無同為死當斬吾頭以歸世充衆皆泣曰寜與公同死終不獨生尋西城陷賊執善相送於世充善相辭色不撓世充怒令斬之善相罵世充極口而死髙祖聞而數曰吾負善相善相不負吾也封其子為襄城郡公羅士信武徳五年為新安道行軍總管守雒水城為劉黒闥所擒黒闥聞其勇意欲活之士信辭色不屈因斬之髙祖聞而傷惜購得其屍而塟之契苾何力鐵勒特勒子也特勤死貞觀初随其母率衆内附太宗置其部落於甘涼之境何力至京授左領軍将軍十四年為葱山道副大總管討平髙昌時何力母姑臧夫人及母弟賀蘭州都督沙門並在涼府何力歸省其母兼撫巡部落時薛延陁彊盛契苾部落皆願從之乃脅其母弟使從何力至聞而大驚曰主上於汝有厚㤙任我又重何忽而圖叛逆諸首領皆曰可敦及都督已去何故不行何力曰忠孝不並我弟沙門足得侍養我終不䏻去也於是衆共執何力至延陁致於可汗牙前何力箕踞而坐㧞佩刀東向大呼曰豈有大唐烈士受辱蕃庭天地日月願炤我心又割左耳以眀志不可奪也可汗怒欲殺之為其妻所扞而止㑹有使自延陁至具言其状太宗遽令兵部侍郎崔敦禮持節入延陁詐降公主以和何力繇是得還拜右驍衛大将軍龎孝泰為左驍衛将軍髙宗遣将征髙麗孝泰為沃沮道總管時孝泰率嶺南水戰之士軍於蛇水之上髙麗蓋蘇文益兵撃之孝泰大敗或勸突圍就劉伯英曹繼叔之營孝泰曰我伏事國家兩代過蒙㤙遇髙麗不滅吾必不還伯英等何必救我又我将鄉里子弟五千餘人今並死盡豈一身自求生邪賊内薄攻之死者累萬箭如蝟毛遂與其子一十三人皆死之杜孝昇為扶州臨河鎮将儀鳯二年吐蕃冦臨河孝昇登外城樓以拒賊力屈為賊所執令孝昇送書與松州都督武君寂以邀其降孝昇不從又虜其妻子為質孝昇身遭六創竟不從俄而賊衆捨孝昇而退孝昇又率萬衆拒守詔授孝昇游撃将軍以旌其忠烈仍賜物二百段孝昇俄以創甚去職詔令給祿終身成三郎為左豹韜衛長上果毅李孝逸之討徐敬業以為前鋒軍至髙郵為賊所陷擒送江都賊黨唐之竒詐告其徒曰此是賊帥李孝逸也将斬之三郎大呼曰我是果毅成三郎不是将軍李孝逸官軍已至四面合圍我死妻子受榮你死家口配没終不及我賊遂害之許欽眀萬嵗通天元年為䕫州都督府長史兼龍山軍討撃副使軍次崇州與契丹戰敗被擒賊将圍安東令欽眀邀屬城未下者安東都䕶裴𤣥理時在城中欽眀謂之曰狂賊天殃滅在朝夕公但謹守勵兵以全忠節賊大怒遂害之帝聞而下制褒美贈蘄州刺史又授其子輔乾左監門衛中候令迎其喪柩以還改葬薛訥大将軍仁貴子也則天時突厥入冦河北則天以訥将門子使攝左威衛将軍安東道經畧使臨行於同眀殿召見與語訥因奏曰醜虜憑陵以廬陵王為辭今雖有昇儲外議猶恐未定若此命不易則狂賊自然欵服則天深然其言程千里為右金吾衛大将軍安禄山反以千里宿将詔徃河東除上黨郡長史守上黨賊将蔡希徳數圍逼上黨希徳數以輕騎挑戰千里開城門獨将麾下百餘騎逐希徳欲生得之度横橋橋壊墜坑中為賊所執仰首告将士曰非戰之過天命不祐遂至於此公等為吾報城中将士善守之城不可下遂被執送東京見安慶緒慶緒捨之劉客奴幽州昌平人為平盧軍游奕使其性忠謹為軍人所信天寳末范陽平盧河東等三節度安禄山反詔以安西節度封常清為范陽節度以平盧節度副使吕知誨為平盧節度以太原尹王承業為河東節度安禄山既僭位於東都遣腹心韓朝陽等招誘知誨知誨遂受逆命誘殺安東副使䕶保定軍使馬靈登以自立功祿山遂偽署知誨為平盧節度使客奴與平盧諸将同謀襲殺知誨仍遣使與安東将軍王立志遥相應援馳以奏聞杜鴻漸為朔方留後節度副使天寳末肅宗北幸至平涼未知所適鴻漸與六城水運使魏少游節度判官崔漪度支判官盧簡關内鹽池判官李涵謀曰今祿山亂常二京陷沒主上南幸於巴蜀皇太子理兵於平涼然平涼散地非聚兵之處必欲制勝非􅃋方不可若奉迎殿下旬日之間西収河隴廻紇方彊與國通好北徴勁騎南集諸城大兵一舉可復二京雪社稷之恥上報明主下安蒼生亦臣子之用心國家之大計也鴻漸即日草箋具陳兵馬招集之勢錄軍資器械倉儲軍物之數令李涵齎赴平涼肅宗大悦鴻漸知肅宗發平涼於北界白草頓迎謁因勞諸使及兵士進言曰朔方天下勁兵靈州用武之處今廻紇請和吐蕃内附天下郡邑人皆堅守以待制命其中雖為賊所據亦望不日收復殿下整理軍戎長驅一舉則逆胡不足滅也肅宗然之李栖筠為封常清安西行軍司馬𤣥宗幸蜀肅宗興復於靈武徴兵於安西栖筠以精卒七千人赴行在所栖筠感以臣子大義士皆有忘家死難之志尅復兩京遷殿中侍御史李嗣業為安西髙仙芝将以功授驃騎左金吾大将軍及祿山反兩京陷肅宗在靈武詔追嗣業赴行在嗣業自安西統衆萬里至鳯翔謁見帝是時方欲大舉收復二京帝曰今日得卿勝數萬衆事之濟否實任卿也馬璘為左金吾衛将軍戍安西至徳初聞王室多難乃綂甲士三千自二庭赴於鳯翔肅宗竒之委以東討陣陜郊戰河陽皆有殊效張子卿為關中節度使王思禮将至徳二年與将士四千餘人割耳為盟請為父子軍為國討賊張元軌為特進至徳二年與将軍焦知㢘副将衛如璧及所領武士五百人相與盟咸截左耳誓雪國讎令狐彰初為安祿山将史思明偽署滑州刺史令綂兵戍滑臺彰感激忠義思立名節乃濳謀歸順㑹中官楊萬定監滑州軍彰遂募勇士善於水者乗夜涉河逹表萬定請以所管兵馬及州縣歸順因萬定以聞自祿山搆逆為賊首者未有舉州向化肅宗得彰表大恱賜書慰勞尋為思明将所攻兵敗潰圍而出随萬定入朝肅宗深奨之尋拜滑亳魏博六州節度使大厯中西戎犯邉徴兵防秋彰遣屬吏部統營伍自滑至京西向二千餘里甲士三千人率自齎糧所過州縣路次供擬皆讓而不受經閭里不犯秋毫年八十卒臨終手疏辭表誡子以忠孝守節表曰臣男建等性不為非行亦近道今勅賜東都私第使他年為臣報國下慰幽魂臨歿昏亂伏枕哀咽帝覽表嗟悼久之張孝忠肅宗上元中為李寳臣易州刺史及寳臣死其子惟岳阻兵不受徴朝詔幽州節度使朱滔討之滔以孝忠宿将慮軍興則撓其境乃使判官蔡雄說孝忠孝忠然之與滔合兵攻惟岳後王武俊斬惟岳首以獻定州刺史楊正義以州降遂有易定之地時既誅惟岳分四州各置觀察使武俊得鎮州康日知得深趙二州孝忠得易州以成徳軍額在鎮州孝忠既降正義朝廷乃於定州置義武軍以孝忠檢校工部尚書為義武軍節度易定滄等州觀察等使及朱滔田恱等相扇反逆競以利啗邀之為亂孝忠孤軍四面受敵修浚壕壘感勵士卒竟不為羣兇熒惑郭子儀為天下兵馬副元帥中官魚朝㤙害子儀之功因事媒孽之尋召還京師以李光弼代子儀之任子儀雖失兵柄乃心王室以禍難未平不遑寝息後復為副元帥出鎮絳州将行肅宗大漸羣臣莫有見者子儀請曰老臣受命将死於外不見陛下目不瞑乃引至卧内謂曰河東事一以委卿子儀嗚咽流涕而出子儀事上忠誠臨下寛厚毎䧏城下邑所至之處必能得士衆心前後遭罹倖臣程元振魚朝㤙等譛毁百端時方握彊兵或臨戎敵詔命徴之未嘗不即日而抵召故讒不䏻行代宗幸陜時令以數十騎覘賊及在涇陽又陷於胡騎重圍之中皆以身自許國未嘗以危亡廻顧亦遇天幸竟免患難劉昌初為宋州牙門将大厯中李靈曜據汴州反刺史李僧惠将受靈曜牽制昌宻遣僧神表潛説僧惠召昌問計昌泣陳其逆順僧惠感之仍使神表齎表詣闕請討靈曜遂剪靈曜左翼汴州遂平薛平父嵩大厯中為昭義節度平年十二為磁州刺史嵩率軍吏欲用河北故事脅平知留後而平偽許之讓於伯父㠋一夕以喪歸及免喪累授右衛将軍張伾建中初以澤潞将守洺州田恱攻之伾度兵不出戰賊不􅀎得累月攻益急士死傷多食且盡救兵未至伾知事不濟無以勸士乃悉召将卒命其女出拜之謂曰将士辛苦守戰伾之家無尺寸物與公等為賞獨有此女幸未嫁人情愿出賣之為将士一日之費衆皆大哭曰今日為将軍出死命戰且守日夜不解㑹馬燧以太原之師至與衆軍合擊恱於城下大敗之伾乗勢出戰士以一當百圍解以功累遷泗州刺史馬燧為河東節度魏博招討使討田恱建中三年前殿中丞李雲端與其黨袁封單超俊李誠信冀信等以京師苦旱乃又借商户錢人心大擾乃扇飛語云鳯翔留鎮幽州兵多逃南山為羣盗以揺人心将作亂雲端等與燧子暢善乃令其黨温靖齎暢書與燧陳利害令旋師燧執靖奏其状令兄炫引暢請罪帝以暢大臣子方委燧以靖難不竟其事敕炫就第杖三十遣捕雲端鞫於禁中十一人皆處死馮河清初𨽻涇原節度兵馬使建中四年節度使姚令言奉詔率兵赴關東以河清知兵馬留後判官殿中侍御史姚况知州事及令言至京師所綂兵叛帝幸奉天河清與况聞之乃集三軍大哭因以激勵将吏誓敦忠節衆頗義之即時發甲仗器械車百餘輛連夜送行在所時駕初遷幸六軍雖集倉皇之際都無戎器及涇州甲仗至軍士大振特詔褒其誠效拜四鎮北庭行軍涇原節度使兼御史大夫姚况兼御史中丞行軍司馬俄又加河清檢校工部尚書賊朱泚及姚令言累遣間諜招誘河清輙拘而戮焉及駕幸梁州其将田希鑒濳通泚使結兇黨害河清尋贈尚書右僕射葬事官給李澄建中初為永平軍節度李勉禆将移理汴州乃奏澄為滑州刺史四年冬李希烈陷汴州勉奔歸行在澄遂以城降希烈偽署尚書令兼滑州永平軍節度使興元元年春澄密令親信人盧融間道齎表逹於奉天帝嘉之乃以帛詔藏於蠟丸中加澄刑部尚書兼汴州刺史汴滑節度觀察使澄祕而未宣乃集州兵嚴加訓習希烈頗疑之乃令養子六百人戍之且虞其變也及希烈苦攻寜陵邀澄赴援澄率其衆至石柱潜令縱火焚營而偽遁誘六百人因驚行剽而加其罪果大俘掠悉令斬之以告希烈希烈不䏻詰焉無何希烈遣其将翟崇暉等冦陳州久之未復是嵗十月澄以汴州兵寡度希烈不䏻制已㑹中使薛盈􅈿持節且至加澄檢校兵部尚書封武威郡王澄乃乗勢力焚賊旌節誓衆歸國希烈既失澄又聞崇暉大敗繇是奔歸蔡州澄遂率衆将復汴州屯於城北門怯懼不敢進及宣武軍節度使劉洽師至城東門賊将田懐􅎇開關以納之翌日澄方自北門入洽已據子城澄乃舎於浚儀縣兩軍将士日有忿競澄不自安會鄭州賊将孫液送欵於澄澄遣其子清赴之先是河陽軍節度使李芄遣其将雍希顥攻鄭州顥所過縱掠液拒之尤固及清至遂納之顥急攻液清以衆助之殺登城者數十人顥方引退又焚陽武而歸澄乃出赴鄭州朝廷特授清檢校太子賓客兼御史中丞更名克寜貞元元年三月就加澄檢校右僕射義成軍鄭滑許等州節度使李承為山南東道節度使李希烈既破梁崇義擁兵襄州遂有其地朝廷慮不受命欲以禁兵送承承請單騎徑行至則希烈處承於外館迫脅萬態承恬然自安誓死王事希烈不䏻屈遂剽虜闔境所有而去嚴震為山南西道節度觀察等使及朱泚竊據京城李懷光頓軍咸陽又與之連結泚令腹心穆庭光宋瑗等齎帛書誘結震震集衆斬庭光等仍發兵出界至􅉦厔以東守禦賊竟不䏻為害車駕入駱谷且無驚擾楊惠元為神䇿京西兵馬使以兵屬李懐光建中四年冬自河朔同赴國難解奉天之圍明年二月懐光既圖叛逆惠元義不受汙脫身奔竄至奉天為懐光追騎所害朱忠亮初仕薛嵩為将鎮普閠縣掌屯田朱泚之亂以麾下四十騎奔赴奉天徳宗嘉之李觀為右龍武将軍建中末涇師叛觀適畨上即領兵千餘人扈從奉天詔都巡警訓練諸軍戍卒三數日間加召二千餘衆列之通衢整肅鼙鼔城内因之増氣徳宗倚賴之及李懐光叛駕出奉天幸山南觀與令狐建李昇韋清等咸執羇靮周旋艱險皆著功勞張韶為李懐光兵馬使建中末懐光為朔方節度使撃田恱於魏州聞徳宗行幸晝夜奔難先數日遣韶奉奏韶至城下遇朱泚驅百姓填塹韶在衆中伺羣盗稍怠乃呼曰我李懐光使也守陴者初未信詰曰懐光使何與賊戮力韶曰不如是何繇至此乃縱而上之得懐光表尅期至城下詔令舁韶徇四隅歡聲動地賊徒疑懼聞懐光軍至醴泉遂解圍走投京城薛伾為汾陽王郭子儀麾下諸将建中末從左僕射李揆使西畨朱泚之難昆夷赴義伾馳騎鄉導至於武功擢授左威衛将軍賈耽建中末為山南東道節度使時徳宗幸梁州耽使行軍司馬樊澤奉表陳事既復命方大宴會有急牒至言澤代耽為節度而召耽為工部尚書耽以状内懐中宴飲不改及罷乃告澤曰詔以行軍為節度使耽今即發因告将吏謁澤太府張獻甫白耽曰天子巡幸尚書使行軍奉表起居而行軍自謀節度僣奪尚書土地此可謂事人不忠矣軍中皆不服請殺之耽曰公是何言天子有命即為節度矣耽今赴行在便與公偕行即日上道以獻甫自随軍中乃安李抱真建中末為昭義軍節度使與李懐光等同討田恱時恱窘蹙朱滔王武俊皆反聨兵救恱抱真與馬燧等退次魏縣徳宗幸奉天中使告問至諸将皆仰天慟哭李懐光席巻奔命馬燧李芃各引兵歸鎮朱泚既汙宫闕李希烈陷大梁李納亦反鄆州無何帝行幸梁州李懐光又竊據河中抱真獨於擾攘傾潰之中以山東三州外抗羣賊内輯軍士羣賊深憚之册府元龜卷三百七十三
