body:
  text: 册府元龜卷四百七十二宋王欽若等撰臺省部奏議第三後魏崔𤣥伯為黄門侍郎與張衮對掌樞要草創制度有司愽議國號𤣥伯議曰三皇五帝之立號也或因所生之土或即封國之名故虞夏商周始皆諸侯及聖德旣隆萬國崇戴稱號隨本不復更立唯商人屢徙改號曰殷然猶兼行不廢始基之稱故詩云殷商之旅天命𤣥鳥降而生商宅殷土茫茫此其義也昔漢髙祖以漢王定三秦滅彊楚故遂以漢為號國家雖統北方廣漠之土逮於陛下應運龍飛雖號舊邦受命惟新以登國之初改代曰魏又慕容永亦奉進魏土夫魏者大明神州之上國斯乃革命之徵驗利見之元符也臣愚以為宜號為魏道武從之於是四方賔王之貢咸稱大魏矣劉潔太武時為尚書令時南州大水百姓阻饑潔奏曰臣聞天地至公故萬物咸育帝王無私而黎民戴賴伏惟陛下以神武之姿紹重光之緒恢隆大業育濟羣生威之所振無思不服澤之所洽無逺不懷太平之治於是而在自頃邊冦内侵戎車屢駕天贊神明所在尅殄方難旣平皆䝉酬錫勲髙者受爵功卑者獲賞寵賜優崇有過古義而郡國之民雖不征討服勤農桑以供軍國實經世之大本府庫之所資自山以東偏遇水害頻年不收就食他所臣聞率土之濵莫非王臣應加哀矜以鴻覆育今南摧强冦西敗醜虜四海晏如人神恊暢若與兆民同享其福則惠感和氣蒼生悦樂矣太武從之於是復天下二歲租賦源賀為給事中時斷獄多濫賀上書曰臣聞人所貴者莫貴於生全德之厚者莫厚於宥死然犯死之罪難以盡恕權其輕重有可矜恤今冦賊未殄疆場須防臣愚以為自非大逆赤手殺人之罪其坐贓及盗與過誤之愆應入死者皆可原命讁守邊境是則已斷之體更受再生之恩徭役之家漸䝉休息之惠刑措之化庶幾在兹虞書曰流宥五刑此其義也臣受恩深重思以仰答將違闕庭預增係戀敢上瞽言唯加裁察文成納之已後入死者皆恕死徙邊韓秀獻文踐阼為給事中叅征南慕容白曜軍事孝文延興中尚書奏以燉煌一鎭界逺西北冦賊路衝慮或不固欲移就凉州羣官㑹議僉以為然秀獨謂非便曰此蹙國之事非闢土之宜愚謂燉煌之立其來乆矣雖土鄰强冦而兵人素習縱有姦竊不能為害循常置戍足以自全退保一方之城聚進塞四夷之窺伺若徙就姑臧慮人懷異意或貪留重遷情不願徙脱引冦内侵深為國患且燉煌去凉州乃千餘里捨逺就近邊防有闕一旦廢罷是啟戎心則夷狄交搆互相來徃恐醜徒恊契侵竊凉土及近諸戍則關右荒擾烽警不息邊役煩興艱難方甚乃從秀議程駿為祕書令獻文神主遷於太廟有司奏舊事廟中執事之官例皆賜爵今宜依舊事駿獨以為不可表曰臣聞名器為帝王所貴山河為區夏之重是以漢祖有約非功不侯必當屬有命於大君之辰展心力於戰謀之日然後可以應茅土之錫未見預事於宗廟而獲賞於疆土徒見晉鄭之后以夾輔為至勲吳鄧之儔以征伐為重績周漢旣無文於逺代魏晉亦靡記於徃年自皇道開符乾業創統務髙三五之規思隆百王之軌罰頗減古賞實増昔時因神主改祔清廟致肅而授羣司以九品之命顯執事以五等之名雖復帝王制作弗相沿襲然當時恩澤豈足為長世之軌乎乖衆之愆伏待罪譴書奏從之文明太后謂羣臣曰言事固當正直而准古典安可依附暫時舊事乎賜駿衣一襲帛二百疋李沖為内秘書令南都給事中舊無二長唯立宗主督䕶所以民多隱冒五十家方為一戸沖以三正治民所繇來逺於是創三長之制而上之文明太后覽而稱善引見公卿議之中書令鄭羲秘書令髙祐等曰沖求立三長者乃欲混天下一法言似可用事實難行羲又曰不信臣言但試行之事敗之後當知愚言之不謬太尉元丕曰臣謂此法若行於公私有益咸稱方今有事之月校比民户親舊未分民心勞怨請過今秋至冬閒月徐乃遣使於事為宜沖曰民者㝠也可使繇之不可使知之若不因調時百姓徒知立長校戸之勤未見均徭省賦之益必心生怨宜及課調之月令知賦稅之均既識其事又得其利因民之欲為之易行著作郎傅思益進曰民俗既易險易不同九品差調為日已乆一旦改法恐成擾亂太后曰立三長則課有常准賦有恒分苞䕃之户可出僥倖之人可止何為而不可羣議雖有乖異然唯以變法為難更無異議立三長公私便之陳建孝文時為尚書右僕射加侍中與侍中尚書晉陽侯元仙德殿中尚書長樂王穆亮比部尚書平原王陸叡密表曰皇天輔徳命集大魏臣等祖父翼贊初興勤過蜀漢誓固山河享茲景福寵辱休戚與國均焉臣以凢近識無逺逹皆藉先寵遂荷今任彼已之譏播於羣口仰感生成俯自策勵顧省駑鈍終於無益然飲氷驚寐實懐慙負至於願天髙地厚何日忘之自永嘉之末封豕横噬馬叡南據奄有荆楚及桓劉䟦扈禍難相繼岱宗隔望秩之敬青徐限見德之風獻文皇帝髫齔龍飛道光率土干戚暫舞淮海偃風車書旣同華裔將一昊天不弔奄背萬邦竊聞劉昱天亡權臣殺害思正之民翹想罔極愚謂時不再來機宜易失毫分之差致悔千里天與不取反受其咎所謂見而不作過在介石者也宜簡雄將號令八方義陽王臣昶深悟存亡逺同孫氏茍歴運響從則吳㑹可定脫事有難成則振旅而返進可以揚義聲於四海退可以通德信於遐裔宜乗之㑹運鍾今日如合聖聽乞速施行脱忤天心願存臣表徐觀後驗賞罰隨焉帝嘉之韓顯宗太和初兼中書侍郎旣定遷都顯宗上書其一曰竊聞輿駕今夏若不廵三齊當幸中山竊以為非計也何者當今徭役宜早息雒京宜速成省費則徭役可簡并功則雒京易就徃冬輿駕停鄴是閒隙之時猶編戸供奉勞費為劇聖鑒矜愍優㫖慇懃爵浹髙年賚周鰥寡雖賑貸普霑今猶恐來夏菜色况三農要時六軍雲㑹其所損業實為不少雖調歛輕省未足稱勞然大駕親臨誰敢寧息徃來承奉紛紛道路田蠶蹔廢則將來無資此國之深憂也且向炎暑而六軍暴露恐生厲疾此可憂之次也臣願輿駕早還北京以省諸州供帳之費并功專力以營雒邑則南州免雜徭之煩北都息分析之歎雒京可以時就遷者僉爾如歸其二曰自古聖帝必以儉約為美亂王必以奢侈貽患仰惟先朝皆卑宫室而致力於經略故能基宇開廣業祚隆㤗今雒陽基趾魏明所營取譏前代伏願陛下損之又損頃來北都富室競以第宅相尚今因遷徙宜申禁約令貴賤有檢無得踰制端廣衢路通利溝渠使寺署有别四民異居永垂百世不刋之範則天下幸甚矣三曰竊聞輿駕還雒陽輕將數千騎臣甚為陛下不取也夫千金之子猶坐不垂堂况萬乗之尊富有四海乎警蹕於闈闥之内者豈以為儀容而已蓋以戒不虞也清道而後行尚恐銜橜之或失况履渉山河而不加三思哉此愚臣之所以悚息伏願省察其四曰伏惟陛下耳聽法音目玩墳典口對百辟心虞萬機晷昃而食夜分而寢加以孝思之至隨時而深文章之業日成篇卷雖獻明所用未足為煩然非所以嗇神養性頥無疆之祚莊周有言形有待而知無涯以有待之形役無涯之智殆矣此愚臣所不安伏願陛下垂拱司契委下責成惟冕旒垂纊而天下治矣高祖頗納之顯宗又上言曰進賢求才百王之所先也前代取士必先正名故有賢良方正之稱今州郡貢察徒有秀孝之名而無秀孝之實而朝廷但檢其門望不復彈坐如此則可令别貢門望以叙士人何假冐秀孝之名也夫門望者是其父祖之遺烈亦何所益於皇家益於時者賢才而已茍有才雖屠釣奴虜之賤聖皇不恥以為臣茍非其才雖三后之裔自墜於皁𨽻矣是大才受大官小才受小官各得其所以致雍熈議者或云今世等無竒才不若取士於門此亦失矣豈可以世無周召便廢宰相而不置哉但當校其寸長銖重者卽先叙之則賢才無遺矣又曰夫帝王所以居尊以御下者威也兆庶所以徙惡以從善者法也是以有國有家以刑法為治生民之命於是而在有罪必罰罰必當辜則雖箠撻之刑而人恥而莫敢犯也有制不行人得僥倖則雖參夷之誅不足以肅自太和以來多坐盜棄市而逺近肅清繇此言之止姦在於防檢不在嚴刑也今州郡牧守邀當時之名行一切之法臺閣百官亦咸以深酷為無私以仁恕為容盗迭相敦厲遂成風俗陛下居九重之内視人如赤子百司分萬務之要遇下如仇讐是則堯舜止一人而桀紂以千百和氣不至蓋繇於此書曰與其殺不辜寧失不經實宜勅示百僚以惠元元之命又曰昔周王為犬戎所逐東遷河雒鎬京猶稱宗周以存本也光武雖曰中興實自創業西京尚置京尹亦不廢舊今陛下光隆先業遷宅土中稽古復禮於斯為盛豈若周漢出於不得已哉按春秋之義有宗廟曰都無謂之邑此不刋之典也况北代宗廟在焉山陵託焉王業所基聖躬所載其為神鄉福地實亦逺矣今便同之郡國臣竊不安愚謂代京宜建畿置尹一如故事崇本重舊以光萬葉又曰伏見雒京之制居民以官位相從不依族類然官位非常有朝榮而夕辱則衣冠淪於厮豎之邑臧獲騰于膏腴之里物之顚倒或至於斯古之聖王必令四民異居者欲其志專而業定則不淫故耳目所習不督而就父兄之教不肅而成仰惟太祖道武皇帝剏基撥亂日不暇給然猶分别士庶不令雜居伎作屠沽各有攸處但不設科禁賣買任情販貴易賤錯居混雜假令一處彈筝吹笛緩舞長歌一處嚴師苦訓誦詩講禮宣令童齔任意所從其走赴舞堂者萬數徃就學館者無一此則伎作不可雜居士人不可異處之明騐也故孔父里仁之美孟母三徙之訓賢聖明誨若此之重今令仗作家習士人風禮則百年難成令士人兒童効伎作容態一朝可得是以士人同處則禮教易興伎作雜居則風俗難改朝廷每選舉人士則校其一婚一宦以為升降何其宻也至於别伎作宦途得與膏梁華望接閈連甍何其略也此愚臣之所惑今稽古建極光宅中區凢所從居皆是公地分别伎作在於一言有何為疑而闕盛美又曰自南偽相承竊有淮北欲擅中華之稱且以招誘邉民故僑置中州郡縣自皇風南被仍而不改凡有重名其數甚衆疑惑書記錯亂區宇非所以疆域物土必也正名之謂也愚以為可依地里舊名一皆釐革小者并合大者分署及中州郡縣昔以户少併省今人口旣多亦可復舊君人也者以天下為家不得有所私也故倉庫儲貯以候水旱之災供軍國之用至於有功徳者然後加賜爰及末代乃寵之所隆賜賚無限自此以來亦為大過在朝諸貴受禄不輕土木被錦綺僮妾厭梁肉而復厚賚屢加動以千計若分賜鰥寡贍濟實多如不悛革豈周急不繼富之謂也愚謂事可賞勸則明㫖褒揚稱事加賜以勸為善不可以親近之昵猥損天府之儲又曰宿衞内直者宜令武官習弓矢文官諷書傳而今給其蒲博之具以成䙝狎之容長矜争之心恣諠囂之慢徒損朝儀無益事實如此之類一宜禁止帝善之髙閭為尚書中書監太和十四年秋閭上表曰奉癸未詔書以春夏少雨憂饑饉之方臻愍黎元之傷瘁同禹湯罪已之誠齊堯舜引咎之德慮灾致懼詢及卿士令各上書極陳損益深恩被于蒼生厚惠流于后土伏惟陛下天啟聖哲利見纂極欽若吴天光格宇宙太皇太后以叡哲贊世稽合三才髙明柔克道被無外七政昭宣於上九功咸序於下君人之量逾髙謙光之㫖彌篤修復祭儀宗廟所以致敬飾正器服禮樂所以宣和增儒官以重文德簡勇士以昭武功慮獄訟之未息定刑書以理之懼蒸民之姦宄置隣黨以穆之究庶官之勤劇班俸祿以優之知勞逸之難均分民土以齊之甄忠明孝矜貧恤獨開納讜言抑絶讒佞明訓以體率土移風雖未勝殘去殺成無為之化足以仰答三靈者矣臣聞皇天無私降臨在下休咎之徴繇人召致帝道昌則九疇叙君德衰而倫彛斁休瑞竝應享以五福則康于其邦咎徴屢臻罰以六極則害于其國斯乃洪範之實徴神祗之明驗及其厄運所纒世鍾陽九數乖于天理事違於人謀時則有之矣故堯湯逢歴年之灾周漢遭水旱之患然立功修行終能弭息今考治則有如此之風計運未有如彼之害而陛下慇懃引過事邁前王從星澍雨之徵指辰可必消灾滅禍之符灼然自見雖王畿之内頗為少雨關外諸方禾稼仍茂茍動之以理綏之以和一歲不收未為大損但預備不虞古之善政安不忘危有國常典切以北鎭新徙家業未就思親戀本人有愁心一朝有事難以禦敵可寛其徃來頗使欣慰開雲中馬城之倉以賑恤之足以感德致力邊境矣明察畿甸之民饑甚者出靈丘下館之粟以救其乏可以安慰孤貧樂業保土使幽定安并四州之租隨運以益其處開關弛禁薄賦賤糶以消其費清其道路恣其東西隨豐逐食貧富相贍可以免度㓙年不為患苦又聞常士困則濫竊生匹婦餒則慈心薄㓙儉之年民輕違犯可緩其役使急其禁令宜於未然之前申勑外牧又一夫幽枉王道為虧京師之獄或恐未盡可集見囚於都曹使明折庶獄者重加究察輕者卽可决遣重者定狀以聞罷非急之作放無用之獸此乃救㓙之常法且以見憂於百姓論語曰不患貧而患不安茍安而樂生雖遭㓙年何傷於民庶也愚臣所見如此而已詔曰省表聞之當勅有司依此施行邢巒為散騎常侍兼尚書宣武初奏曰臣聞昔者明王之以德治天下莫不重粟帛輕金寶粟帛乃安國育民之方金玉是虛華損德之物故先皇深觀古今去諸奢侈服御尚質不貴雕鏤所珍在素不務綺綵至乃以紙絹為帳扆銅鐡為轡勒訓朝廷以節儉示百姓以憂矜日夜孜孜小大必愼輕賤珠璣示其無設府藏之金裁給而已更不買積以費國資逮景明之初承昇平之業四疆清晏逺邇來同於是番貢繼路商賈交入諸所獻貨倍多於常雖加以節約猶歲損萬計珍貨常有餘國用常不足若不裁其分限便恐無以支歲自非為要須者請皆不受從之源懷宣武景明中為尚書左僕射時有詔以姦吏犯罪每多逃遁因𤯝乃出竝皆釋然自今以後犯罪不問輕重而藏竄者逺流若永不出兄弟代徙懷乃奏曰謹按條制逃吏不在赦限竊惟聖朝之恩異於前宥諸流徙在路尚䝉旋反况有未發而仍遣邊戍按守宰犯罪逃走者衆祿潤旣優尚有兹失及蒙恩宥卒然得還今獨苦此等恐非均一之法如臣管識謂宜寛之書奏門下以成式旣班駁奏不許懷重奏曰臣以為法貴經通治尚簡要刑憲之設所以羅網罪人茍理之所備不在繁典行之可通豈容峻制此乃古今之逹政救世之常規伏尋條制勲品以下罪發逃亡遇恩不宥仍流妻子雖欲抑絶姦途匪為通式謹按事條侵官敗法專據流外豈九品以上人皆貞白也其諸州守宰職任清流至有貪濁事發逃竄遇恩免罪勲品以下獨乖斯例如此則寛從上流法切下吏育物有差惠罰不等又謀逆滔天經恩尚免吏犯微罪獨不䝉赦使大宥之經不通開坐之路致壅進違古典退乖今律輙率愚見以為宜停書奏帝納之盧昶為散騎常侍兼尚書時雒陽縣獲白鼠昶奏曰謹按瑞典外鎭刺史二千石長不祗上命刻暴百姓人民嗟怨則白鼠至臣聞禎不虛見德合乃降妖不妄出咎彰則至是以古之人君或怠瑞以失德或祗變而立功斯乃萬古之殷鑒千齡之炯戒比者災氣作沴恒晹虧度陛下流如傷之慈降納隍之㫖哀百姓之無辜引在予之深責舉賢黜佞之詔道映於堯先進忠納諫之言事光於舜右伏讀明㫖俯觀徵譴敢布庸瞽以陳萬一竊惟一夫之耕食裁充口一婦之織衣止蔽形年租歲調則惟常理此外徴求於何取足然自比年以來兵革屢動荆揚二州屯戍不息鍾離義陽師旅相繼兼荆蠻凶狡王師薄伐暴露原野經秋淹夏汝潁之地率戸從戎河冀之境連丁轉運又戰不必勝加之退負死喪離曠十室而九細役煩徭日月滋甚苛兵酷吏因逞威福至使通原遙畛田蕪罕耕連村接閈蠶飢莫食而監司因公以責求豪强恃私而逼掠遂令鬻裋褐以益千金之資制口腹而充一朝之急此繇牧守令長多失其人郡闕黄霸之君縣無魯恭之宰不思所以安民止思所以潤屋故士女呼嗟相望於道路守宰暴貪風聞於魏闕徃歲法官按驗多挂刑網謂必顯戮以明勸誡然後命使覆訐公違憲典或承風挾請輕樹私恩或容情受賂輙施己惠御史所劾皆言誣枉申雪罪人更云清白長侮上之源滋陵下之路忠清之人見之而自怠犯暴之夫聞之以益快白鼠之至信而有徵矣伏願陛下垂叡喆之鑒察妖災之起延對公卿廣宣庶政引見樞納愽求民隱存問孤寡去其苛碎輕徭省賦與之體息貞良忠謹置之於朝姦罔貪佞棄之於市則九官勿戒而常敬百縣不嚴而自肅士女欣欣人有望矣詔曰朕纂承鴻緒伏膺寶厯思靖八方惠康四海當必世之期麟鳯不降屬勝殘之㑹白鼠告咎萬邦有罪實唯朕躬尚書敷納獻替是寄讜言有聞朕實嘉美袁翻為尚書殿中郎正始中議選邊戍事翻建議曰臣聞兩漢警於西北魏晉備在東南是以鎭邊守塞必寄威重伐叛柔服實賴温良故田叔魏尚聲髙於沙漠當陽鉅平績流於江漢紀籍用為美談古今取為盛德自皇上以叡明纂御風凝化逺威厲秋霜惠霑春露能使淮海輸誠華陽卽序連城請面比屋歸仁懸車劍閣豈伊曩載鼔譟金陵復在今日然荆揚之收宜盡一時才望梁郢之君尤須當今秀異自比緣邊州郡官至便登疆場統戍階當卽用或植穢德凡人或遇貪家惡子不識字民温恤之方唯知重役殘忍之法廣開戍邏多置率領或用其左右婚親或受其貨財講囑皆無防㓂禦賊之心唯有通商聚歛之意其勇力之兵驅令抄掠若値疆敵卽為奴虜如有執獲奪為已富其羸弱老小軰㣲解金鐡之工少閑草木之作無不搜營窮壘苦役百端自餘或伐木高山芸草平陸販貿徃還相望道路此等祿旣不多資亦有限皆收其實絹給其虛粟窮其力薄其衣用其工節其食綿冬歴夏加之疾苦死於溝瀆者常十七八焉是以吳楚間伺審此虛實皆云糧匱兵疲易可乗擾故驅率犬羊屢犯疆場頻年已來甲胄生蟣十萬在郊千金日費為弊之深一至於此皆繇邊任不得其人故延若斯之患賈生所以痛哭良有以也夫潔其流者清其源理其末者正其本旣失之在始庸可已乎愚謂自今已後荆揚徐豫梁益諸蕃及所統郡縣府佐統軍至於戍主皆令朝臣王公以下各舉所知必選其才不拘階級若能統御有方清高獨著威足臨戎信能懐逺撫循將士得其歡心不營私潤專循公利者則就加爵賞使久於其任以時褒賚勵其忠欵所舉之人亦垂優異奬其得士嘉其誠節若不能一心奉公才非捍禦貪惏日富經畧無聞人不見徳兵厭其勞者即加顯戮用彰其罪所舉之人隨事免降責其謬薦罰其偽薄如此則舉人不得挾其私受任不得孤其舉善惡旣審沮勸亦明邊患永清譏議攸息矣游肇為侍中梁軍主徐元明斬其青冀二州刺史張稷首以郁洲内附朝議遣兵赴援肇表曰元明之欵雖奔救是當然事有損益或憚舉而功多或因小而生患不可必也今六里胊山地實接海陂湖下濕人不可居郁洲又在海中所謂雖獲石田終無所用若不待連兵六里雖尅尚不可守况方事連兵而爭非要也且六里於賊逾要去此閑逺若以閑逺之兵攻逼近之衆其勢既殊不可敵也災儉之年百姓饑弊死者亦復不少其何以居宜静之辰興干戈之役軍資糧運取濟無所唯見其損未覩其益且親附之民復化猶近特須安帖不宜勞之勞則怨生怨則思叛思叛則不自安不安則擾動脱爾則連兵難解事不可輕宜損兹小利不使大損宣武竝不納任城王澄為尚書令正始之末詔百司竝升一級而執事不逹㫖意刺史守令限而不及孝明初澄奏曰竊惟雲構欝起澤及百司企春望榮内外同慶至於賞陟不及守宰爾來十年寃訟不絶封回自鎭逺安州入為太尉長史元匡自征虜常州入為宗卿二人遷授竝在先詔應䝉之理備在於斯兼州佐停私之徒陪臣郡丞之例尚䝉天澤下降榮及當時然叅佐之來皆因府主今府主不霑佐官獨預棄本賞末愚謂未允今計刺史守宰之官請准回匡悉同汎限上允初㫖百司之章下覆訟者元元之心詔曰自今以後内外之事嘗經先朝者不得重聞澄奏曰臣聞堯懸諫諍之鼓舜置誹謗之木皆所以廣耳目於芻蕘逹四聰於天下伏惟太祖開基化隆自逺累聖相承於今九帝重光疊照汚隆必同與奪隨時道無常體思過如渇言重千金故稱無諱之朝邁蹤三五髙祖冲年纂歴文明恊統變官易律未為違典及慈聖臨朝母儀㝢縣爰發慈令垂心滯獄深枉者仰日月於九泉微屈者希曲炤於盆下乃格以先朝限以一例斯誠奉遵之本心實乖元元之至望在於謙挹有乖舊典謹尋抱枉求直或至累朝毫釐之差正之宜速謬若千里駟馬弗追故禮有損益事有可否父有諍子君有諫臣琴瑟不調理宜改作是以防川之論小決則通鄉校之言壅則敗國矧伊陳屈而可抑以先朝且先屈者非故屈之或有司愛憎或執事濁僻空文致法以誤視聽如此寃塞彌在可哀僣之與濫寧失不經乞收今㫖還依前詔詔曰省奏深體毗賛之情三皇異軌五代殊風一時之制何必詮改必謂虛文設㫖理存可申者何容不同來執可依徃制又前來尚書文簿諸曹須則出借時公車署以理寃事重奏請眞案澄執奏以尚書政本特宜逺愼故凡所奏閣道通之蓋以秘要之地防其宣露寧有古制所重今反輕之内猶設禁外更寛也宜繕冩事意以付公車詔從之又御史中尉東平王匡奏請取景明元年已來内外考簿吏部除書中兵勲案并諸殿最欲以案校竊階盗官之人靈太后許之澄表曰臣聞三季之弊繇於煩刑火德之興在於三約是以老􅆅云法令滋彰盗賊多有又曰其政察察其民缺缺又曰天網恢恢疎而不漏是故欲求治本莫若省事清心昔漢文斷獄四百幾致刑措省事所致也蕭曹為相載其清静畫一之歌清心之本也今欲求之於本宜以省事為先使在位羣官慕蕭曹之心以毗聖化如此則上下相安逺近相信百司不怠事無愆失豈宜擾世教以深文烹小鮮以煩手哉臣竊惟景明之初曁永平之末内外羣官三經考課逮延昌之始方加黜陟五品已上引之朝堂親决聖目六品已下例繇勅判自世宗晏駕大宥三行所以蕩除故意與物更始革世之事方相窮覈以臣愚見謂為不可又是尚書職分樞機出納昔魏明帝卒至尚書門陳矯抗辭帝慙而返夫以萬乗之重非所宜行猶屈一言慙而廻駕羣官百司而可相亂乎故陳平不知錢榖之數丙吉不問僵道之死當時以為逹治歴代用為美談但各宜守其職思不出位潔已以勵時靖恭以致節又尋御史之體風聞是司至於冐勲妄考皆有處分若一處有風謠卽應攝其一簿研檢虛實若差舛不同偽情自露然後繩以典刑人孰不伏豈有移一省之案取天下之簿尋兩紀之事窮革世之尤如此求過誰堪其罪斯實聖朝所宜重慎也靈太后納之乃止孫紹為門下錄事與常景等共修律令延昌中紹表曰臣聞建國有計雖危必安施化能和雖寡必盛治乖人理雖合必離作用失機雖成必敗此乃古今同然百王之定法也伏惟大魏應天明命肇啟無窮必世後仁祚隆七百今二虢京門了無嚴防南北二中復闕固守長安鄴城股肱之寄穰城上黨腹背所憑四軍五校之軌領䕶分事之職徵兵儲粟之要舟車水陸之資山河要害之權緩急去来之用持平赴救之方節用應時之法特宜修置以固堂堂之基持盈之體何得而忽居安之辰故應危懼矣且法開清濁而清濁不平申滯理寃而卑寒亦免士庶同悲兵徒懐怨中正賣望於下里主案舞筆於上臺眞偽混淆知而不糾得者不欣失者倍怨使門齊身等而涇渭奄殊類應同役而苦樂懸異士人居職不以為榮兵士役苦心不忘亂故有競棄本生飄藏他土或詭名托養散在人間或亾命山薮漁獵為命或投伏彊豪寄命衣食又應遷之戸逐樂諸州應留諸戸避寒歸暖兼職人子弟隨逐浮遊南北東西卜居莫定關禁不修任意取適如此之徒不可勝數爪牙不復為用百工争棄其業混一之計事實闕如考課之方責辦無日流浪之徒决須精校今强敵窺時邊黎伺隙内民不平久戍懷怨戰國之勢竊謂危矣必造禍源者北邊鎭戍之人也若夫一統之年持平用之者大道之計也亂離之期縱横作之者行權之勢也故道不可久須文質以換情權不可常隨汚隆以牧物文質應世道形自安汚隆獲衷權勢亦濟然則王者計法之趣化物之規圓方務得其境人物不失其地又先帝時律令竝議律尋施行令獨不出十餘年矣臣以令之為體卽帝王之身也分處百揆之儀安置九服之節經緯三才之倫包羅六卿之職措置風化之門作用賞罰之要則是有為之樞機世法之大本也然修令之人亦皆愽古依古撰置大體可觀比之前令精麤有在但主議之家太用古制若全依古髙祖之法復須昇降誰敢措意有是非哉以是争故久廢不理然律令相須不可偏用今律班令止於事甚滯若令不班是無典法臣下執事何依而行臣等修律非無勤止署下之日臣乃無名是謂農夫盡力他食其秋功名之所實懷於悒元暉孝明初徴拜尚書左僕射詔攝吏部選事上疏曰臣聞治人之本實委守牧之官得其人則政平物理失其人則訟興怨結自非察訪善惡明加貶賞將何以黜彼貪怠陟此清勤也竊以大使廵省必廣迎送之費御史馳糾頗興威濫之刑且蹔爾往還理不委悉縱有簡舉良未平當愚謂宜令三司八座侍中黄門各布耳目外訪州鎭牧將治人守令能否若德教有方清白獨著宜以名聞卽加褒陟若治績無効貪暴逺聞亦便示牒登加貶退如此則不出庭戸坐知四方端委垂拱明賞審罰矣又表以御史之職鷹鸇是任必逞爪牙有所噬搏若選後生年少血氣方剛者恐其輕肆勁直傷物處廣愚謂宜簡宿官經事忠良平愼者為之詔付外依此施行後詔暉與任城王澄京兆王愉東平王康共决門下大事暉又上書論政要其一曰御史之職務在得賢必得其人不拘階秩久於其事責其成功其二曰安人寧邊觀時而動頃來邊將亡逺大之畧貪萬一之功楚梁之好未聞而蠶婦之怨屢結斯乃庸人所為鋭於姦利之所致也平吳之計自有良圖不在於一城一戍也又河北數州實為國之基本饑荒多年户口流散方今境上兵復徵發卽如此日何易舉動愚謂數年以來唯宜静邊以息征役安人勸農惠此中夏請嚴勅邊將自今有賊戍求内附者不聴輙遣援接皆須表聞違者雖有功請以違詔書論三曰國之資儲唯藉河北饑饉積年戸口逃散生長姦詐因共隱藏出縮老小妄注死失收人租調割入於己人困於下官損於上自非更立權制善加檢括損耗之來方在未已請求其議明宣條格帝納之源子恭為尚書北主客郎中攝南主客事梁亡人許周自稱給事黄門侍郎朝士翕然咸共信待子恭奏曰徐州表投化人許團并其弟周等究其牒狀周列云已蕭衍黄門侍郎又稱心存山水不好榮宦屢曽辭讓貽彼赫怒遂被出為齊康郡因爾歸國願畢志嵩嶺比加採訪畧無證明尋其表狀又復莫落案牒推理實有所疑何者昔夷齊獨徃周王不屈其志伯况辭祿漢帝曲成其美斯實古先喆王必有不臣之人者也蕭衍雖復﨑嶇江右竊號一隅至於處物未甚悖禮豈有士辭榮祿而茍不聽之哉推察情理此則孟浪假蕭衍昏狂不存雅道逼士出郡未為死急何宜輕去生養之土長辭父母之邦乎言不好榮官志願嵩嶺者初留之日卽應杖策尋山負帙㳂水而乃廣尋知己遍造執事希榮之心已見逃宦之志安在昔梁鴻去鄉終傭吳㑹逢萌浮海逺客遼東竝全志養性逍遙而已考之事實何其懸哉又其履歴清華名位髙逹計其家累應在不輕今者歸化何其孤廻設使當時怱遽不得携將及其來後家貲産業應見簿歛尊畀口累亦當從法而周兄弟怡然常無憂戚若無種族理或可通如有不坐便應是衍故遣非同投化推究二三眞偽難辨請下徐揚二州宻訪必令獲實不盈數旬玉石可覩於是詔推訪周果以罪歸闕便假職位如子恭所疑蕭寶寅為尚書左僕射正光四年上表曰臣聞堯典有黜陟之文周書有考績之法雖其源難得而尋然條流抑亦可以知矣大較在於官人用才審於所蒞練迹校名驗於虛實豈有臧否得之餘論優劣著於歴試者乎旣聲窮於月旦品定於黄紙用效於名輩事彰於臺閣則實賞罰之途差有商准用舍之宜非無依據雖復勇進忘退之儔奔競於市里過分亡涯之請馳騖於多門猶且顧其聲第愼其與奪器分定於下爵位懸於上不可妄叨故也今竊見考功之典所懐未喻敢竭無隱試陳萬一何者竊惟文武之名在人之極地德行之稱為生之最首忠貞之美立朝之譽仁義之號出處之端自非職惟九官任當四嶽授曰爾諧譲稱俞徃將何以克厭大名允兹令問自比以來官罔髙卑人無貴賤皆餙辭假説用相褒舉涇渭同波薰蕕共器求者不能量其多少與者不復覈其是非遂使冠履相貿名與實爽謂之考功事同汎陟紛紛漫漫焉可勝言又在京之官積年一考其中或所事之主遷移數四或所奉之君身名廢絶或具僚離索或同事凋零雖當時文簿紀其殿最日乆月深散落都盡人有去留誰復掌其勤惰或停休積稔或分隔數干累年之後方思追訪聲迹立其考第無不茍相悦附共為唇齒飾垢掩疵妄加丹素趣令得階而已無所顧惜賢逹君子未免斯患中庸已下夫復何論官以求成身以請立上下相䝉莫斯為甚又勤恤人隱咸歸守令厥任非輕所責實重然及其考課悉以六載為程旣而限滿代還復經六年而叙是則歲周十二始得一階於東西兩省文武閒職公府散佐無事冗官或數旬方應一直或朔望止於蹔朝及其考日更得四年為限是一紀之中便登三級彼以實勞劇任而遷貴之路至難此以散位虚名而陞陟之方甚易何内外之相懸令厚薄之如是又聞之聖人大寳曰位何以守位曰仁孟子亦曰仁義忠信天爵也公卿大夫人爵也古之人修其天爵而人爵從之故雖文質異時汚隆殊世莫不寶兹名器不以假人是以賞罰之柄常自持也至乃周之藹藹五叔無官漢之察察舘陶徒請豈不重骨肉私親愛誠以賞罰一差則無以懲勸至公蹔替則覬覦相欺故至愼至惜慇懃若此况乎親非肺腑才乖秀逸或充單介之使始無汗馬之勞或説興利之規終懸十一之潤皆虚張無功妄指贏益坐獲數階之官藉成通顯之貴於是巧詐萌生偽辨鋒出役萬慮以求榮開百方而逐利握樞秉鈞者亦知其若斯但抑之則其流已注引之則有何紀極夫琴瑟在於必和更張求其適調去者旣不可追來者猶或宜改案周官太宰之職歳終則令官府各正所同受其㑹計聽其致事而詔於王三歳則大計羣吏之治而誅賞之愚謂今可粗依其准見居官者每歲終本曹皆明辨在官日月具覈才行能否審其實用而注其上下游辭宕説一無取焉列上尚書覆其合否如有紕繆卽正而罰之不得方復推詰委否容其進退旣定其優劣善惡交分庸短下第黜凡以明法幹務忠清甄能以記賞總而奏之經奏之後考功曹别書於黄紙油帛一通則本曹尚書與令僕印署留於門下一通則以侍中黄門印署掌在尚書嚴加緘宻不得開視考績之日然後對共裁量如此則少存實錄薄止姦回其内外考格裁非庸管乞求博議以為畫一若殊謀異策事關興廢遐邇所談物無異議者自可臨時斟酌匪拘恒例至如援流引比之訴冐榮求級之請如不限以關鍵肆其傍通則蔓草難除㳙流遂積穢我彛章撓兹大典謂宜明加禁斷以全至治開返本之路杜澆弊之門如斯則吉士盈朝薪槱載煥矣詔付外博議以為永式竟無所定時梁西豐侯正德來降寶寅表曰伏見揚州表蕭正德自云避禍逺投宸掖背父叛君駭議衆口深心指趣厥情難測臣聞立身行道始於事親終於事君故君親盡之以常敬嚴父兼之以博愛斯人倫之所先王教之盛典三千之罪莫大於不孝毁則藏姦常刑靡赦所以晉恭獲謗無所逃死衞伋受誣二子繼没親命匪棄國孰無父况今封豕尚存長蛇未滅偷生江表自安毒酖而正德居猶子之親竊通侯之貴父榮於國子爵於家履霜弗聞去就先結隔絶山淮温凊永盡定省長違報復何日以此為心心可知矣皇朝綿基累葉恩均四海自北徂南要荒仰澤能言革化無思不韙賁玉帛於丘園標忠孝以納賞列藁街于伊雒集華裔其如歸披髪鐻身之酋屈滕而請吏交趾文身之渠欵關而効質至如正德宜甄義以致貶昔越棲㑹稽頼宰嚭以獲立漢困彭城實丁公而獲免吳項已平二臣卽法豈不錄其情哉欲明責以示後况遺君忽父狼子野心旣不親親安能親人中間變詐或有萬等伏惟陛下聖鏡自天欽光纂厯昭德塞違以臨羣后脱包此凶醜寘之列位百官是象其何誅焉臣釁結禍深痛纒肝髓日暮途遙復報無日豈區區於一豎哉但才雖庸近職居獻替愚衷寸抱敢不申陳伏願聖慈少垂察覽訪議槐棘論其是非使秋霜春露施之有在相䑕攸刺遄死有歸無令申伋受笑於茍存曽閔淪名於盛世正德旣至京師朝臣待之尤薄歳餘還叛張普惠為尚書右丞詔訪寃屈普惠上疏曰詩稱文王孫子本枝百世易曰大君有命開國承家皆所以明德睦親維城作翰漢祖封爵之誓曰使黄河如帶泰山如礪國以永存爰及苗裔又申之以丹書之信重之以白馬之盟其以彊大分王罪犯蹙邑者蓋有之矣未聞父基子構世載忠賢一死一削用為恒典者也故尚書令臣肇未能逺稽古義近究成㫖以初封之詔有親王二千戸始蕃一千戸二蕃五百戸三蕃三百戸謂是親疎世減之法又以開國五等有所減之言以為世減之趣遂立格奏奪稱是髙祖本意仍被㫖可差謬之來亦已甚矣遂使勲親懷屈幽顯同寃紛訟彌年莫之能息臣輙逺研先㫖格窮其事世變減奪今古無據又尋詔書稱昔未可采今始列辭豈得混一罔分逺近也故樂良樂安同蕃異封廣陽安豐屬别戸等安定之嫡邑齊親王河間戚近更從蕃食是乃太和之恩㫖初封之倫級勲親兼樹非世減之大驗者也博陵襲爵亦在太和之年時不世減以父常全食足戸充本同之始封減從今式如此則減者減其所足之外足者足其所減之内減足之㫖乃為所貢所食爾欲使諸王開國弗專其民賦役之差貴賤有等蓋准擬周禮公侯伯子男貢税之法王食其半公食三分之一侯伯四分之一子男五分之一是以新興得足充本清淵吏多減戸故始封承襲俱稱所減謂減之以貢食謂食之於國斯實髙祖霈然之詔減實之理聖明自釋求之史帛猶有未盡時尚書臣琇疑減足之參差㫖又判之以開訓所減之㫖可以不疑於世減矣而臣肇弗稽徃事曰五等有所減之格用為世減之法以王封有親疎之等謂是代削之條妄解成㫖雷同世奪以此毒天下民其從乎故太傅任城文宣王臣澄樞弼累朝識洞今古為尚書之日殷勤執請孜孜於重議被㫖不許於此遂停又律罪例減及先帝之緦麻令給親恤止當世之有服律令相違威澤異品使七廟曽𤣥不治末恤嫡封則賦祿無窮枝庶則屬絶内貶儀刑作孚億兆何觀夫一人吁嗟尚曰虧治今諸王五等各稱其寃七廟之孫竝訟其初陳訴之案盈於省曹朝言巷議咸云其苦恐非先王所以建萬國親諸侯睦九族之義也臣猥忝今任於兹五年推尋㫖格謂無世減之理謂近遵髙祖減食之謀逺循百代象賢之誥退繇九伐進從九儀則刑罰有倫封不虚黜斯乃文王所以尅愼不敢侮於鰥寡而况於公侯伯子男乎今㫖訪寃滯愚以此為大者求尋光錫之詔并諸條所奪所請事事窮審諸王開國非犯罪削奪者竝求還復其昔常全食足戸充本減從今式者從前則力多於親懿全奪則減足之格不行愚謂祿力竝應依所闕之食而食之若是則力少蕃王粟帛仍本戸邑雖盈之減兩秦旣有全食足戸之異故不得同於新封之力爾親恤所裒請依律斷伏惟親親尊賢位必功立尊賢以司民其可不愼乎親親以睦族其可棄乎如脫䝉允求以㫖判為始其前來吏秩悉年久不追臣又聞明德愼罰文王所以造周咸有一德殷湯所以革夏故能上令下從風動斯偃畏之如雷電敬之如神明是以天子家天下綏萬國若天之無不覆地之無不載遷都之構庶方子来汎澤所沾降及陪皁寧有嶽牧二千石縣令丞尉治中别駕及諸軍幢受命於朝廷而可不豫乎此之班駮雲雨之不平謂是當時有司出納之未允何以明之仰尋世宗詔書百官普進一級中有朝臣刺史登時褒授内外貴賤莫不同澤又覆奏稱爰及陪皁明無不逮自後人率其心紛綸盈庭誤惑視聽限以汎前更為年斷六年三年之考以意折之汎前汎後之歲隔而絶之遂使如綸之㫖頓於一朝汎前六年上第者全不得汎三年上第者䝉半階而已汎前汎後合考者隔絶而不得無考者無折而全汎前汎後有考無考竝蒙全汎與否乖違勤舊彌屈差若毫釐謬以千里其此之謂乎易曰言行君子之所以動天地可不愼與言之不從無以抑之遂奏奪牧守外祿全不與汎散官改為四年之考汎前者八年一階政令不一寃訟惟甚與而復奪其本在兹致使邀駕擊皷者無理以加其罪誹謗公聴者無辭以抑其言噂􅊱所繇生悖慢所繇起夫琴瑟不調弛而更張善人國之本也其可棄乎詩云樂只君子邦家之基堯典曰克明俊德吕刑曰何擇非人周官曰官弗必備惟其人咎繇曰無曠庶官天工人其代之詩云人之云亡邦國殄悴又曰雨我公田遂及我私孔子曰不患寡而患不均如此則官必擇人汎則宜溥請逺遵正始元㫖近准聖明二汎内外百官悉同一階不以汎前折考不以散任增年則同雲共澍四海均洽如謂未可宜以權理折之易曰聖人之大寳曰位何以守位曰仁春秋傳曰一曰擇人如此則乃可無汎不可無考守宰之汎既以追奪則百官之汎不應獨霑溥澤既收復誰敢怨夫三載之考興於太和再周之陟通於景明閒劇祿力自有加減陪臣以事省降而考則三年朝官旣祿等平曹更四周乃陟考祿參差各稱其枉且一日于役征戍苦於煩任終年專使决斷重於陪臣恒上若通於三載之考無汎隔折則各盈其分亦足以近塞羣口逺綏四方日昳求賢猶有所失况不遵擇人之訓唯以停久而進乎自今已後考黜願以三宅革心選進願以三儁居德書曰舉能其官惟爾之能稱非其人惟爾弗任斯周道所以佑辟康民敢不敬守臣忝官樞副毗察寃訟寤寐惟省謂宜追正愚固所陳萬無可採辛雄孝昌末為尚書右丞上疏曰帝王之道莫尚於安民安民之本莫加於禮律禮律旣設擇賢而行之天下雍熈無非任賢之功也故虞舜之盛穆穆標美文王受命濟濟以康髙祖孝文皇帝天縱大聖開復典謨選三代之異禮採二漢之典法端拱而四方安刑措而兆民治世宗重光繼軌無念聿修官人有道萬里清謐陛下勤勞日昃躬親庶政求瘼恤民無時蹔憇而黔首紛然兵車不息以臣愚見可得而言自神龜末來專以停年為選士無善惡歲久先叙職無劇易名到授官執案之吏以差次日月為功能銓衡之人以簡用老舊為平直且庸劣之人莫不貪鄙委㪷筲以共治之重託碩鼠以百里之命皆貨賄是求肆心縱意禁制雖煩不勝其欲致令徭役不均發調違謬箕斂盈門囚執滿道二聖明詔寢而不遵畫一之法懸而不用自此夷夏之人相將為亂豈有餘恨哉蓋繇官授不得其人百姓不堪其命故也當今天下黔黎乆經寇賊父死兄亡子弟淪陷流離艱危十室而九白骨不收孤㷀靡恤財殫力盡無以卒歲宜及此時早加慰撫蓋助陛下治天下者唯在守令最須簡置以康治道但郡縣選舉繇来頗輕貴游雋才莫肯居此宜改其弊以定官方請上等郡縣為第一清中等為第二清下等為第三清選補之法妙盡才望如不可竝後地先才不得拘以停年竟無銓革三載黜陟有稱者補在京名官如前代故事不歴郡縣不得為内職則人思自勉上下同心枉屈可申强暴自息刑政日平民俗奉化矣復何憂於不治何恤於逆徒也竊見今之守令清愼奉治則政平訟理有非其才則綱維荒穢伏願陛下暫留天心較其利害則臣言可騐不待終朝昔杜畿寛惠河東無警蘇則分糧金城尅復畧觀古今風俗遷訛無不任賢以相化革朝任夕治功可立待若遵常習故不明選典欲以静民便恐無日書奏不行册府元龜卷四百七十二
