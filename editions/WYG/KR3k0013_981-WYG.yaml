body:
  text: 册府元龜巻九百八十一宋王欽若等撰外臣部盟誓周官司盟掌盟載之法盖邦國㑹同之制也其於四夷則胡人彈骨越人㓶臂與夫中國㰱血所繇各異示信一也若乃要荒之俗凶悍成性置之度外斯為匪人先王於是覊縻而不絶之也然而威力有所不及德義有所不懷姑務息民非可黷武繇是申以詛誓質於神明達之以誠心要之以禍福然後邊鄙不聳保障以寧倒載干戈而阜安生齒兹亦長轡逺御之一術也至或飭其詐諛臨事生變志圖剽劫以快匈奴此亦豺狼之常性豈謀之不臧者乎魯隱公二年春公㑹戎于潜修惠公之好也戎請盟公辭秋八月庚辰公及戎盟于唐復修戎好也唐魯地桓公二年七月公及戎盟于唐修舊好也僖公三十二年四月衞人侵狄秋衞人及狄盟文公八年十月公子遂㑹伊雒之戎盟于暴哀公十九年秋三夷男女及楚師盟于敖秦昭襄王時板楯蠻夷居巴郡閬中時有一白虎常從群虎數逰秦蜀巴漢之境傷害千餘人昭王乃重募國中有能殺虎者賞邑萬家金百鎰時有巴郡閬中夷人能作白竹之弩乃登樓射殺白虎昭王嘉之而以其夷人不欲加封乃刻石盟要復夷人頃田不租十妻不算傷人勿論殺人得以賧他濫切錢贖死盟曰秦犯夷輸黄龍一雙夷犯秦輸清酒一鍾夷人安之漢宣帝時與呼韓邪單于約束自長城以南天子有之長城以北單于有之有犯塞輒以狀聞有降者不得受元帝時遣車騎都尉韓昌光禄大夫張猛送呼韓單于侍子昌猛見單于民衆益盛塞下禽獸盡單于足以自衞不畏郅支聞其大臣多勸單于北歸者塞下無禽獸則射獵無所得又不畏郅支故欲北歸舊處恐北去後難約束不可更共昌為言要猛即與為盟約曰自今以來漢與匃奴合為一家世世毋得相詐相攻有竊盜者相報行其誅償其物漢人為盜于匃奴匈奴人為盜于漢皆相報告而誅償有寇發兵相助漢與匃奴敢先背約者受天不祥令其世世子孫盡如盟昌猛與單于及大臣俱豋匃奴諾水東山諾水即今突厥地諾眞水也刑白馬單于以徑路刀金留犁撓酒徑路匃奴寶刀也金契金也留犁飰七也撓呼高切和也攪也契金着酒中撓攪飲之以老上單于所破月氏王頭為飲器者共飲血盟昌猛還奏事公卿議者以為單于保塞為藩雖欲北去猶不能為危害昌猛擅以漢國世世子孫與夷狄詛盟令單于得以惡言上告于天羞國家傷威重不可行宜遣使往告祠天與解盟昌猛奉使無狀罪至不道帝薄其過有詔昌猛以贖論勿解盟平帝時西域車師後王句姑句音鈎去胡來王唐兠為其去胡而來降漢故以為王號降匃奴詔令單于執還使中郎將王萌待西域惡都奴界上逆受惡都奴西域之谷名也逆受逆而受之單于遣使送到國因請其罪使者以聞有詔不聽不免其罪㑹西域諸國王斬以示之乃造設四條更新為此制也中國人亡入匃奴者烏孫亡降匃奴者西域諸國佩中國印綬降匃奴者烏桓降匃奴者皆不得受遣中郎將王駿王昌副校尉甄阜王尋使匃奴班四條與單于雜凾封與璽書同凾而封之付單于令奉行因収故宣帝所為約束封凾還宋師子國王刹利摩訶南奉表遣一白衣送牙臺像以為信誓史缺年月唐高祖武德七年八月頡利突利二可汗舉國入寇道自原州連營南上太宗時為秦王受詔北討與虜遇於豳州醜徒震駭因而請和太宗許之結盟而去又云突利武德初深自結託太宗亦以恩撫之結為兄弟與盟而去太宗以武德九年八月即位是月辛巳突厥寇高陵癸未帝幸渭水之上與頡利隔津而語責其負約頡利請和詔許之乙酉幸城西刑白馬與頡利同盟于便橋之上突厥引兵而退高宗麟德二年八月開府儀同三司新羅王金法敏熊津都尉扶餘隆盟于百濟之熊津城初百濟自扶餘璋與高麗連和屢侵新羅之地新羅遣使入朝求救相望於路及蘇定方既平百濟軍回餘衆又叛鎮守使劉仁軌仁願等經畧數年漸平之詔扶餘隆歸撫餘衆及令與新羅和好至是刑白馬而盟先祀神祗及川谷之神而後㰱血其盟文曰往者百濟先王迷於順逆不敦隣好不睦親姻結託髙麗交通倭國共為殘暴侵削新羅剽邑屠城畧無寧歲天子憫一物之失所憐百姓之無辜頻命行人遣其和好負險恃遠侮慢天經皇赫斯怒恭行弔伐旌旗所指一戎大定固可瀦宮汚宅作誡來裔塞源㧞本垂訓後昆然懷柔伐叛前王之令典興亡繼絶往哲之通規事必師古傳諸曩册故立前百濟太子司稼正卿扶餘隆為熊津都督守其祭祀保其桑梓依倚新羅長為與國各除宿憾結好和親恭承詔命永為藩服仍遣使人右威衛將軍魯城縣公劉仁願親臨勸諭具宣成㫖約之以婚姻申之以盟誓刑牲㰱血共敦終始分災恤患恩若兄弟祗奉綸言不敢失墜既盟之後共保歲寒若有背盟二三其德興兵動衆侵犯邊陲明神監之百殃是降子孫不育社稷無守禋祀磨滅㒺有遺餘故作金書鐵劵藏之宗廟子孫萬代無敢違犯神之聽之是享是福劉仁軌之辭也歃訖埋書牲幣於壇之壬地藏其書於新羅之廟於是仁軌領新羅百濟眈羅倭人四國使浮海西還以赴太山之下𤣥宗開元二年五月吐蕃宰相坌逹延獻書于宰臣曰兩國地界事資蚤定界定之後然後立盟書大夫解琬昔在安西界望使㑹于河源相與展議蕃之願也帝聞之命左散騎常侍解琬使於河源宰臣魏知古姚崇盧懷慎等致書報逹延曰承屯聚兵馬初不知者頗亦為疑但以彼國君臣素敦信義况立盟誓又結婚姻悠悠之談復何足信若見利忘義破親負約神道不遠何以逃殃自見來書果符意揣兩國和好百姓安寧永絶邊患豈非好事所論分界先有盟書今奉勅令左散騎常侍解琬往河源與公平章解琬國之重臣素有德行言無二諾衆所共推昔嘗充使西安備諳彼之境土今遣將命實惟命焉琬既行勅琬賫神龍二年吐蕃誓文與達延定界臣欽若等曰神龍二年盟誓事史缺六月吐蕃使其宰相尚欽藏及御史名悉獵來獻盟書帝御承天門樓命有司引見置酒於内殿享之十一月己酉賜丹書鐵劵于奚都督烏褐頡利發契丹伊徤啜六年十一月吐蕃遣使奉表曰仲冬極寒伏惟皇帝舅萬福使典軍馬集併吐蕃使判悉獵等同至其書共傳語并悉具委所縁和事者孝和帝在日其國界並是逐便㫁當訖彼此亦已盟誓漢宰相等官入誓者僕射豆盧欽望魏元忠中書令李嶠侍中紀處訥蕭至忠侍郎李廻秀尚書宗楚客韋安石楊矩等一十人吐蕃宰相等亦同盟誓訖遂迎公主入蕃彼此安穩於後太上皇登極親好並相和同雖復如舊其漢宰相入誓者並已殁于後宰相不知已前要契當令望重立盟誓舅甥各親署盟書宰相依舊作誓彼此相信亦長安穩此處使人論乞力徐尚奔時宋俄等前後七廻入漢比論皇帝舅親署誓書事復遣宰相作誓外甥亦親署宰相亦作呪如此使七囘來去阿舅却報言舅甥親自手署誓書及彼此宰相作呪阿舅云大是好事及至今日阿舅手署不見宰相作呪亦無又西頭張𤣥表將兵打外甥百姓又李知古亦將兵打外甥百姓既縁如此違誓失信所以吐蕃遂發兵馬今奉阿舅書以前所有嫌惡並悉不論自今以後依前和睦大是好事在此外甥亦同阿舅來意阿舅必定和好所以遣使人往來亦得文不須重盟誓者縁孝和皇帝時舊漢宰相人盟誓者並無阿舅必以和好不重作盟誓彼此不相信要須新立盟誓即日未知國事亦不繇官寮並皆自决但是百姓擬遣安業久長快活阿舅書上雖道和好意中不專知有何益今日必定和好此處速却囘的實相報來書云乞力徐此集兵馬者准舊例兵馬新舊交替若道别集兵馬並是虚言又往者平論地界白水已來中間並合空閒昨秋間郭將軍率聚兵馬於白水築城既縁如此吐蕃遂於界内道亦築一城其兩國和同亦須迎送使命必若不和其城彼此守捉邊境又以北突厥骨吐禄共吐蕃交通者舊時使命實亦交通中間舅甥和睦已來准舊平章其骨吐禄阿舅亦莫與交通外甥亦不與交今聞阿舅使人頻與骨禄交通在此亦知為不和中間有突厥使到外甥處既為國王不可久留外國使人遂却送歸即日兩國和好依舊斷當吐蕃不共突厥交通如舅不和自外諸使命何入蕃任伊去來阿舅所附信物並悉領外甥今奉金胡瓶一瑪瑙盃一伏惟受納十八年十月吐蕃使名悉獵等至京詔御史大夫崔琳充使報聘仍於赤嶺各􅆆分界之碑約以更不相侵二十二年遣將軍李佺于赤嶺分界立碑二十四年吐蕃與漢樹栅為界置守捉使河西節度使散騎常侍崔希逸謂吐蕃將乞力徐曰兩國和好何須守捉妨人耕種請皆罷之以成一家豈不善也乞力徐報曰常侍忠厚必是誠言但恐朝廷未必皆相信任萬有一人交搆掩吾不備後悔無益也希逸固請之遂發使與乞力徐殺白狗為盟各去守備於是吐蕃畜牧被野天寶元年九月以䕶密國王子頡吉里匐遣使上表請北吐蕃來屬賜鐵劵曰咨爾䕶密王子頡里匐夫藩扞可寄惟信是從節義可積雖遠無隔卿之先代常附國朝通使有常書譯相次自卿父繼立近阻强隣被制凶威有乖夙志今遂能獻誠欵潜託歸懷自非心晤遠圖何以克存先意念此誠懇嘉尚尤深今賜卿丹書鐵劵以旌忠孝長表信義永傳子孫日月同明山河齊久可不羙歟可不慎歟肅宗元年建寅月吐蕃使來朝請和勅宰相於中書設宴將詣光宅寺為盟使者曰蕃法盟誓取三牲血歃之無向佛寺之事請明日復於鴻臚寺㰱血以申蕃戎之禮從之代宗廣德三年秋囘紇犯邊先以關内副元帥郭子儀屯涇陽十月回紇首領羅逹工等率其衆二千餘騎詣涇陽請降子儀許之合胡禄都督等與宰相磨咄莫賀逹于宰相噋莫賀逹于宰相䕶都毗伽將軍宰相揭拉裴羅逹于宰相梅録大將軍羅逹于平章事海寧􅂒逹于等子儀先執杯合胡禄都督請呪子儀呪曰大唐天子萬萬歲回紇可汗亦萬萬歲若起負心背盟約者身死陣前家口屠戮合胡禄都督等失色及杯至即譯曰如令公盟約皆喜永泰元年三月吐蕃遣使請和詔宰臣元載杜鴻漸與之盟于興唐寺大歴二年四月宰臣及内侍魚朝恩與吐蕃使同盟于興唐寺德宗建中二年十二月入蕃使判官監察御史常魯與吐蕃使論悉諾羅等至自蕃中初魯與其使崔漢衡至列館贊普令止之先命取國信勅書既而使謂漢衡曰來勅云所貢獻物並領訖今賜外甥少信物至宜領取我大蕃與唐舅甥國耳何得以臣禮見處又所欲定界雲州之西請以賀蘭山為界其盟約請依景龍二年勅書云唐使到彼外甥先與盟誓蕃使到此阿舅亦親與盟乃徼漢衡遣使奏定魯使還奏帝為改勅書以貢獻為進以賜為寄以領取為領之且謂曰前相楊炎不循故事致誤此耳其定界盟約並從之三年十月以都官員外郎樊澤兼御史中丞入吐蕃計㑹使初漢衡與吐蕃約以十月十五日定界盟誓漢衡到商度未决已過其期遂命澤詣結賛復定盟㑹期且告遣隴右節度使中書侍郎平章事張鎰與之同盟澤至故原州西與結賛相見約以來年正月十五日㑹盟於清水西四年正月詔隴右節度使張鎰與吐蕃相尚結賛等盟於清水將盟鎰與結賛約各以二千人赴壇所執兵者半之列於壇外二百歩散從者半之分立壇下鎰與賓佐齊抗及㑹盟官崔漢衡樊澤常魯于頔等十人皆朝服結賛與其本國將相論悉頰藏論藏熱乞利陁斯官者論乞力徐等七人俱升壇為盟初約漢以牛蕃以馬為牲鎰恥與之盟將殺其禮乃請結賛曰漢非牛不田蕃非馬不行今請以羊豕犬三物代之結賛許諾時塞外無豕結賛請出羝鎰出犬白羊乃於壇北刑之雜血二器而歃盟文曰唐有天下恢奄禹跡舟車所至莫不率俾以累聖重光卜年惟永彰王者之丕業被四海以聲教與吐蕃賛普代為婚姻固結隣好安危同體甥舅之國將二百年其間或因小忿棄惠為讎封疆騷然靡有寧歲皇帝踐祚愍兹黎元俾釋俘囚以歸蕃落蕃國展禮同兹叶和行人往復累布成命是必詐謀不起兵革不用矣彼猶以兩國之要求之永久古有結盟今請用之國家務息邊人外其故地棄利蹈義堅盟從約今國家所守界涇州西至彈箏峽西口隴州西至清水縣鳯州西至同谷縣暨劍南西川大渡水東為漢界蕃國守鎮在蘭渭原㑹西至臨洮又東至成州抵劍南西界磨些諸蠻大渡水西南為蕃界其兵馬鎮守之處州縣見有居人彼此兩邊見屬漢諸蠻以今所分見住處依前為定其黄河以北從故新泉軍直北至大磧直南至賀蘭山駱駝嶺為界中間悉為閒田盟文有所不載者蕃有兵馬處蕃守漢有兵馬處漢守並依見守不得侵越其先未有兵馬處不得新置并築城堡耕種今二國將相受辭而㑹齋戒將事告天地山川之神惟神炤臨無得愆墜其盟文藏于宗廟副在有司二國之成其永保之結賛亦出盟文不加于坎但埋牲而已盟畢結賛請鎰就壇之西南隅佛幄中焚香為誓誓畢復升壇飲酒獻酬之禮各用其物以將厚意而歸四月加荅蕃使崔漢衡檢校工部尚書帝初令宰相尚書與蕃相區頰贊盟于豐邑里壇所將盟以清水之約疆埸不定遂罷因留頰贊未遣復令漢衡决於贊普七月以國子祭酒李揆為禮部尚書御史大夫入蕃㑹盟使壬辰命宰相李忠臣盧杞關播右僕射崔寧工部尚書喬琳御史大夫于頎太府卿張憲恭司農卿叚秀實少府監李昌􅇪京兆尹王翃左金吾衛大將軍渾瑊等與吐蕃宰相區頰贊等㑹盟於壇所初于頔至自蕃中與尚結贊約疆埸既定請歸其使從之以豐邑坊盟壇在京城之内非便請卜壇於京城之西其禮如清水之儀先盟二日命有司告太廟盟官致齋三日朝服升壇宰相關播跪讀盟文盟畢宴賜而遣之甲午以李揆為右僕射兼官􅂶使如故貞元三年五月戊子以侍中渾瑊為吐蕃清水㑹盟使兵部尚書崔漢衡為㑹盟副使司勲員外郎鄭叔矩為判官己丑渾瑊赴㑹盟所帝令瑊綂衆二萬餘又遣華州潼關節度駱元光赴之乙巳帝令宰臣召吐蕃使諭結贊等於中書議㑹盟之所初崔澣與尚結贊約復㑹盟于清水且先歸我鹽夏二州結贊固云清水非吉地請盟于原州之土梨樹又請盟畢歸二州澣遣使與結贊同奏帝將懐柔故皆從之約以閠五月十五日盟于土梨樹丁未帝召宰相議與吐蕃㑹盟之所先是左神策將馬有麟奏土梨樹地多險隘恐戎軍隠伏不利於我平涼川四隅坦平且近涇州就之為便及是定盟所于平涼川從有麟之言也時蕃使論結贊已復命遽追告還而遣之閠五月辛未渾瑊與蕃相結贊㑹盟于平涼初瑊與結贊約以兵三千人列于壇之東西散手四百人至壇下及將盟又約各遣逰軍以相覘伺結贊擁精騎數萬於壇西蕃之逰軍貫穿我師瑊之將梁奉貞率六十騎為逰軍纔至蕃中皆被執留瑊不虞也結贊又遣謂瑊曰請侍中已下服衣冠劍佩以俟命盖誘其下馬將劫持之瑊與副使兵部尚書崔漢衡監軍特進宋奉朝等皆入幕次坦無他虞結贊命伐皷三聲其聲呼譟而至瑊遽出自幕後偶得他馬不加衘瑊伏於鬛而手加之凡馳十餘里衘方及口故追騎之矢過而不傷焉惟瑊之裨將辛榮招合數百人㨿北阜與賊接戰須臾賊衆四合榮力屈而降奉朝及瑊判官殿中侍御史韓弇並為亂兵所殺漢衡及中官劉延邕俱文珍李朝清漢衡判官司勲員外鄭叔矩瑊判官檢校户部郎中路泌掌書記袁同直大將扶餘準馬寧及神策鳯翔河東將孟日華李至言樂演明范澄馬弇等六十餘人皆䧟焉餘將士及夫役死者四五百人驅掠者千餘人咸被解奪其衣物漢衡為亂兵所擊其從吏呂温以身蔽之刃中温而漢衡獲免漢衡乃夷言謂執者曰我漢使崔尚書也結贊與我善汝欲殺我結贊亦殺汝乃捨之盡馳而西行既而面縛各以一木自領於身以毛繩三束之又以繩連其髮而牽之夜皆踣之於地以髪繩各繫於一橛又以毛罽都覆之守衛者卧其上以防其亡逸也以甲戍至故原州結贊坐於帳中召與相見數讓國家因怒渾瑊曰武功之力皆我之力許以涇州靈州相報竟食其言負我矣舉國所怨本劫是盟在擒瑊也吾遣以金銀飾桎梏待瑊將獻於贊普既已失之虚致君等耳當遣君軰一二人歸報家族也呂温帶瘡亦至結贊嘉其義厚給賚之結贊率其衆屯於石門遣中官俱文珍渾瑊之將馬寧馬燧之將馬弇歸於我遂送漢衡叔矩等囚於河州辛榮扶餘準等或囚於故郭州故鄯州分囚之結贊本請杜希全李觀同盟將劫執二節將乘其鋭來犯京師希全等既不行又欲劫執渾瑊長驅入寇其始謀狡蠧如此癸酉帝遣中官王子常賫詔書以遺結贊蕃界不納而還初瑊與駱元光將發涇州元光謂瑊曰本奉詔命令營於藩原堡以應援侍中竊以藩原堡去盟所六七十里蕃情多詐侍中倘有􅇥我何繇知之請次為營以虞其變瑊以非詔㫖固止之元光竟與同進瑊之營西去盟所二十餘里元光營次之其濠柵頗深固瑊之濠栅可踰焉及瑊單騎奔歸未及其營守將李朝彩不能整衆多已奔散瑊之至也空營而已器械資糧悉棄之頼元光之衆陣於營中瑊既入賊追騎方退元光乃先進輜重次與瑊俱申其號令嚴其部伍而還時以為有將帥之風焉帝特嘉之賜良馬十疋金銀器及錦綵甚厚瑊復鎮于奉天七月甲寅侍中渾瑊自㑹盟所來朝素服待罪有詔釋之而後謁見初宰相栁渾曰吐蕃叛服無常難以信結李晟曰今日之事誠如渾言事具宰相識量門穆宗長慶元年九月吐蕃請盟帝許之宰相欲重其事請告太廟太常禮院奏曰謹按肅宗代宗故事與吐蕃㑹盟并不告廟惟德宗建中末與吐蕃㑹盟於延平門欲重其誠信特令告廟至貞元三年㑹於平涼亦無告廟之文伏以事出一時又非經制求之典禮亦無其文今謹叅詳恐不合告從之乃命大理卿兼御史大夫劉元鼎􅂶西蕃㑹盟使以兵部郎中兼御史中丞劉師佐為副尚舍奉御兼監察御史李武京兆府奉先縣丞兼監察御史李公度為判官是年十月命宰臣崔植王播杜元頴並赴與吐蕃誓壇所太常禮院奏應赴㑹盟官尚書右僕射韓臯御史中丞牛僧孺吏部尚書李絳兵部尚書蕭俛户部尚書楊於陵禮部尚書韋綬太常卿趙宗儒司農卿裴武京兆尹柳公綽右金吾衛將軍郭鏦並令赴壇所其誓辭曰維唐承天撫有八紘聲教所臻靡不來廷兢業齋栗懼其隕顚纘武紹文疊慶重光克彰濬哲㒺忝洪緒十有二葉二百有四載則我太祖權明號而建不㧞鋪鴻名而垂永久類上帝以荅嘉應享皇靈以酬景福曷有怠已越歲在癸丑冬十月癸酉文武孝德皇帝詔丞相臣植臣播臣元頴等與大蕃和使禮部尚書論訥羅等㑹盟于京師壇于城之西郊坎于壇北凡讀誓刑牲加書復壤陟降周旋之禮動無違者盖所以偃兵息人崇姻繼好􅅷建遠畧規恢長利故也原夫昊穹上臨黄祗下載茫茫蠢蠢之類必資官司為厥宰臣茍無綂紀則相滅絶中夏見管維唐是君西裔一方大蕃為主自今而後屏去兵革宿忿舊惡廓然消除追崇舅甥曩昔擊援邊候撤警戍烽韜煙患難相䘏暴掠不作亭障甌脫絶其交侵襟帶要害謹守如故彼無此詐此無彼虞嗚呼愛人為仁保境為信畏天為智事神為禮有一不至遘災于躬塞山崇崇河水湯湯日吉辰良奠其兩疆西為大蕃東實巨唐文臣執簡播告狄方大蕃贊普及宰相鉢闡布尚綺心兒等先寄盟文要節云蕃漢二邦各守見管本界彼此不得征討不得相為寇讎不得侵謀境土若有所疑或要捉生問事優給衣糧放還今並依從更無添改預盟之官十七人皆列名焉是月劉元鼎等與論訥羅同赴吐蕃本國就盟仍勅元鼎到彼令宰相已下各于盟文後自書名元鼎至磨容館之間與蕃給事中論悉荅熱擁千餘騎議盟事於藏河北川中時贊普建衙帳于野以柵槍為壘每十歩攢長槊百枝而中建大斾次第有三門相去百歩門有甲士巫祝烏冠虎帶擊皷掙箭入者必捜索而進内起高臺環以寶楯帳曰金帳其中縁飾多以金為蛟螭虎豹之狀至甚精巧元鼎既見贊普年可十七八號可黎可足戔衣白褐以朝霞纒頭坐佩金劍國政蕃僧號鉢掣逋立於座右侍中宰相列於臺下翼日於衙帳西南具饌饌味酒器畧與漢同樂工奏秦王破陣樂涼州緣腰胡渭州百戲等皆中國人也所築盟臺濶十歩高二尺漢使與蕃相及高位者十餘人相向列位酋領百餘人坐于壇下壇上設一榻高五六尺使鉢掣逋讀誓文則蕃中文字使人譯之讀訖㰱血惟鉢掣逋不預以僧故也盟畢於佛像前作禮使僧諷文以為誓約欝金呪水飲訖引漢使焚香行道相賀而退及元鼎囘過河州元帥尚榻藏即蕃相尚綺心兒也館元鼎於大夏川中集東節度使將帥凡百餘人㸔本國所署盟文於臺上高聲曉讀讀訖因約束各守封界無相侵掠繇是太和已來隴外稍安册府元龜卷九百八十一
