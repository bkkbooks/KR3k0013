body:
  text: 册府元龜卷六百七十四宋王欽若等撰牧守部公正夫子曰茍正其身矣於從政乎何有又曰子帥以正孰敢不正晁錯有言曰方直之士奉法令不容私若夫執德不囘謹身率下無黨於物直道而行故政平而訟理令行而禁止也漢制郡守課最者或入為公卿宣帝曰使百姓無歎息愁恨之聲者其唯良二千石乎故有奉公不阿守法見憚抑强扶弱而志在無私以一警百而威克厥愛是以賞罰信而權寵莫能干政令行而豪右不能犯所以人從其化而吏不敢欺也詩曰剛亦不吐又曰好是正直其斯之謂歟漢董仲舒為江都相後為膠西王相凡相兩國輙事驕王正身以率下數上疏諫争教令國中所居而治尹翁歸拜東海太守過辭廷尉于定國定國家在東海欲屬託邑子兩人邑子同邑人之子也屬之欲㘦令坐後堂待見定國與翁歸語終日不敢見其邑子既去定國乃謂邑子曰此賢將汝不任事也又不可干以私張敞宣帝時為京兆尹朝廷每有大議引古今處便宜公卿皆服天子數從之何武為揚州刺史時九江太守戴聖禮經號小戴者也行治多不法前刺史以其大儒優容之及武為刺史行部錄囚徒有所舉以屬郡屬委也聖曰後進生何知乃欲亂人治言武仕學未久故謂之後進生也皆無所決武使從事廉得其罪廉案也聖懼自免後為博士毁武於朝廷武聞之終不揚其惡而聖子賔客為羣盗得聚為羣盗而吏為部得也繫廬江聖自以子必死武平心决之卒得不死自是後聖慙服武每奏事至京師刺史毎嵗盡則入奏事於京師也聖未嘗不造門謝初武為郡吏時事太守何夀夀厚之後夀為大司農其兄子為廬江長史時武奏事在邸夀兄子適在長安夀為具召武弟顯及故人楊覆衆等具謂酒食之具也酒酣見其兄子令出見顯等曰此子揚州長史言揚州部内長史也材能駑下未嘗省見省視也言不為武所識狀也顯等甚慙退以謂武武曰刺史古之方伯上所委任一州表率也職在進善退惡吏治行有茂異民有隐逸乃當召見不可有所私問顯覆衆强之不得已召見賜巵酒對賜一巵之酒也嵗中廬江太守舉之終得武之力助也其守法見憚如此後漢張酺為魏郡太守郡人鄭據時為司𨽻校尉奏免執金吾竇景景後復位遣掾夏猛私謝酺曰鄭據小人為所侵寃聞其兒為吏放縱狼藉取是曹子一人足以警百酺大怒即收猛繫獄檄言執金吾府疑猛與據子不平矯稱卿意以報私讐㑹有贖罪令猛乃得出據字平卿黎陽人也為侍御史轉司隸校尉韓演為河内太守志在無私舉吏當行一辭而已因亦不及其家曰我舉若可矣豈可令偏積一門應順遷冀州刺史廉直無私遷東平相賞罰必信吏不敢犯時竇憲出屯河西刺史二千石皆遣子弟奉賂遺憲敗後咸被繩黜順獨不在其中繇是顯名陳寵為廣漢太守時竇憲為大將軍征匈奴公卿以下及郡國無不遣吏子弟獻遺者而寵與中山相汝南張郴東平相應順守正不阿後和帝聞之擢寵為大司農郴太僕順左馮翊李恂為張掖太守有威重名時大將軍竇憲將兵屯武威天下州郡逺近莫不脩禮遺恂奉公不阿為憲所奏免王堂為右扶風安帝西廵阿母王聖中常侍江京等並請屬於堂堂不為用掾吏固諫之堂曰吾蒙國恩豈可為權寵阿意以死守之即日遣家屬歸閉閤上病果有誣奏堂者㑹京等誅堂以守正見稱左雄順帝時為冀州刺史部多豪族好請託雄嘗閉門不與交通奏案貪猾二千石無所囘忌延篤為京兆尹時皇太子有疾下郡縣出珍藥而大將軍梁冀遣客齎書詣京兆并貨牛黄篤發書收客曰大將軍椒房外家而皇子有疾必應陳進醫方豈當使客千里求利乎遂殺之冀慙而不得言有司承旨欲求其事篤以疾免歸教授家巷楊秉桓帝延熹中為河南尹先是中常侍單超弟匡為濟隂太守以贓罪為刺史第五種所劾窘急乃賂客任方刺兖州從事衛羽及捕得方囚繫雒陽匡慮秉當窮竟其事密令方等得突獄亡走尚書召秉詰責秉對曰春秋不誅黎比而魯多盗方等無狀釁繇單匡刺執法之吏害奉公之臣復令得逃竄寛縱罪身元惡大憝終為國害乞檻車徵匡考覈其事則姦慝蹤緒必可立得而秉竟坐輸作左校馮緄為河南尹上言舊典中官子弟不得為牧人職桓帝不納蓋􅈴為京兆尹時長安令楊黨父為中常侍恃勢貪放􅈴案得其贓千餘萬貴戚咸為之請􅈴不聽具以事聞并連黨父有詔窮案威震京師時小黄門京兆高望為尚藥監倖於皇太子太子因蹇碩屬望子進為孝廉􅈴不肯用或曰皇太子副主望其所愛碩帝之寵臣而子違之所謂三怨成府者也􅈴曰選賢所以報國也非賢不舉死亦何悔及董卓廢少帝殺何太后􅈴與書曰昔伊尹霍光權以立功猶可寒心足下小醜何以終此賀者在門弔者在廬可不慎哉卓得書意甚憚之史弼為河東太守被一切詔書當舉孝廉弼知多權貴請託乃豫勑斷絶書屬中常侍候覽果遣諸生齎書請之并求假鹽税積日不得通生乃説以它事謁弼而因達覽書弼大怒曰太守忝荷重任當選士報國爾何人而偽詐無狀命左右引出楚捶數百府丞掾吏千餘人皆諫於廷弼不對遂付安邑獄即日考殺楊彪為京兆尹時黄門令王甫使門生王翹於郡界辜㩁官財物七十餘萬彪發其姦言之司隸校尉陽球因此奏誅甫天下莫不愜心李爕為河南尹時既以貨賂為官詔書復横發錢三億以實西園爕上書陳諫辭義深切靈帝乃止劉陶為京兆尹到職當出修宫錢直千萬陶既清貧而恥以錢買職稱疾不聽政靈帝宿重陶才原其罪徵拜諫議大夫陳蕃為樂安太守大將軍梁冀威震天下時遣書詣蕃有所請託不得通使者詐求謁蕃怒笞殺之坐左轉脩武令趙謙為司隸校尉車師王侍子為董卓所愛數犯法謙收殺之卓大怒殺都官從事而素敬謙故不加罪魏楊阜為武都太守㑹劉備遣張飛馬超等從沮道趨下辯而氐雷定等七部萬餘落反應之太祖遣都䕶曹洪禦超等超等退還洪置酒大㑹令女倡著羅縠之衣蹋鼓一坐皆笑阜厲聲責洪曰男女之别國之大節何有於廣坐之中裸女人形體雖桀紂之亂不甚於此遂奮衣辭出洪立罷女樂請阜還坐肅然憚焉崔林為幽州刺史時北中郎將呉質統河北軍事涿郡太守王雄謂林别駕曰吳中郎將上所親重國之貴臣也杖節統事州郡莫不奉牋致敬而崔使君初不與相聞若以邊塞不脩斬卿使君寧能䕶卿邪别駕具以白林林曰刺史視去此州如脱屣寧當相累邪此州與胡虜接宜鎮之以静擾之則動其逆心特為國家生北顧憂以此為寄在官一期冦竊寢息猶以不事上司左遷河間太守清論多為林怨也鮑勛文帝為太子勛為中庻子徙黄門侍郎出為魏郡西部都尉太子郭夫人弟為曲周縣吏斷盗官布法應棄市太祖時在譙太子留鄴數手書為之請罪勛不敢擅縱具列上勛前任東宮守正不撓太子固不能悦及重此事恚望滋甚會郡界休兵有失期者密勑中尉奏免勛官司馬芝為河南尹抑强扶弱私請不行内官欲以事託芝不敢發言因芝妻伯父董昭昭猶憚芝不為通特進曹洪乳母當與臨汾公主侍者共事無澗神捕下獄卞太后遣黄門詣府傳令芝不通輙勑雒陽獄考竟而上疏曰諸應死罪者皆當先表須報前制書禁絶淫祀以正風俗今當等所犯奸刑辭語始定黄門吳達詣臣傳太皇太后令臣不敢通懼有救䕶速聞聖聽若不得已以垂宿留宿息救切留力救切繇事不早竟是臣之罪是以冒犯常科輙送縣考竟擅行刑戮伏須誅罰帝手報曰省表明卿至心欲奉詔書以權行事是也此乃卿奉詔之意何謝之有後黄門復往慎勿通也芝居官十一年數議科條所不便者其在公卿間直道而行孟康為𢎞農太守郡帶道路其諸過賔客自非公法無所出給若知舊造之自出於家顔斐為京兆尹守正清已仰奉而已明帝青龍中司馬宣王在長安立軍市而軍中吏士多侵侮縣民斐以白宣王宣王乃發怒召軍士候便於斐前杖一百時長安典農與斐共坐以為斐宜謝乃私推築斐不肯謝良久乃曰斐意觀明公受分陜之任乃欲一齊衆庻必非有所左右也而典農竊見推築欲令斐謝是使吏不得明公意也宣王遂嚴持吏士自是之後軍營郡縣各得其分陳泰為并州刺史京邑貴人多寄寶貨因泰市奴婢泰皆挂之於壁不發其封及徵為尚書悉以還之晉張斆字祖文𢎞毅有幹正武帝世為廣漢太守王濬在益州受中制募兵討吳無虎符斆收濬從事列上繇此召斆還帝責斆何不密啓而便收從事斆曰蜀漢絶逺劉備嘗用之輙收臣猶以為輕帝善之樂廣為河南尹愍懷太子之廢也詔故臣不得辭送衆官不勝憤歎皆冒禁拜辭司隸校尉滿奮勑河南中部收縛拜者送獄廣即使解遣衆人代廣危懼孫琰説賈謚曰前以太子罪惡有斯廢黜其臣不懼嚴詔冒罪而送今若繫之是彰太子之善不如釋去謚然其言廣故得不坐茍晞字道將為撫軍將軍兖州刺史有從母依之奉養甚厚從母子求為將晞拒之曰吾不以王官私人將無後悔邪固欲之晞乃以為督䕶後犯法晞杖節斬之從母叩頭請救不聽既而反服哭之流涕曰殺卿者兖州刺史哭弟者茍道將其仗法如此劉𢎞為荆州刺史都督荆交廣諸軍事命𢎞得選用宰守徵士武陵伍朝高尚其事衙門將皮初有勲江漢𢎞上朝為零陵太守初為襄陽太守詔書以襄陽顯郡初資名輕淺以𢎞壻夏侯陟為襄陽𢎞曰夫統天下者當與天下同心治一國者當與一國推實吾統荆州十郡安得十女壻然後為治哉乃表陟姻親舊制不得相監皮初之勲宜見酬報聽之衆益服其公當王彪之為會稽内史桓温下鎮姑熟威勢震主四方脩敬皆遣上佐綱紀彪之獨曰大司馬誠為富貴朝廷既有宰相動静之宜自當諮禀脩敬若遣綱紀致貢天子復何以過之竟不遣宋王韜之字長明為南兖州别駕刺史江夏王義恭送資費錢韜之曰此朝廷物執不與顧覬之吳郡人為本郡太守其子綽私財甚豐鄉里士庻多負其責覬之每禁之不能止及後為吳郡誘綽曰我嘗不許汝出責今思貧薄亦不可居民間與汝交關有㡬許不盡及我在郡為汝督之將來豈可得凡諸劵書皆何在綽大喜悉出諸文劵一大厨與覬之覬之悉焚燒宣語逺近負三郎責皆不須還凡劵書悉燒之矣綽懊歎彌日時幸臣戴法興權傾人主而覬之未嘗降意左光禄大夫蔡興宗與覬之善嫌其風節過峻覬之曰辛毗有云孫劉不過使吾不為三公耳劉秀之為梁州刺史遷梁益二州土境豐富前後刺史莫不經營聚蓄多者致萬金所攜賔僚並京邑貧士出為郡縣皆以茍賄自資秀之為治整肅以身律下逺近安悦焉後為丹陽尹時賖市百姓物不還錢市道嗟怨秀之以為非宜陳之甚切雖納其言竟不從用陸子貞為海陵太守時中書舎人狄當親幸家在海陵假還葬父子貞不與相聞當請發民治橋又以妨農不許彭城王義康聞而賞之又當死還葬橋路毁壞不通䘮車縣求發民脩治子貞不許義康聞而善之顧憲之為巴陵王長史行南豫南兖二州事典籖諮事未嘗接以顔色動遵法制為東中郎長史行㑹稽郡事山隂人呂文度有寵於齊武帝於餘姚立邸頗縱横憲之至郡即表除之文度後還葬母郡縣争赴弔憲之不與相聞文度深恨之卒不能傷也遷南中郎竟陵王長史行婺州事時司徒竟陵王於宣成臨成定陵三縣界立屯封山澤數百里禁民樵採憲之固陳不可言甚切直王答之曰非君無以聞此德音即命無禁南齊虞愿初仕宋為晉平太守在郡不治生産前政與民交關質錄其兒婦愿遣人於道奪取將還梁楊公則為湘州刺史湘俗單家以賂求州職公則至悉斷之所辟引皆州郡著姓高祖頒下諸州以為法呂僧珍南兖州人為本州刺史在任平心率下不私親戚從兄子先以販葱為業僧珍既至乃棄業欲求州官僧珍曰吾荷國重恩無以報効汝等自有常分豈可妄求叨越但當速反葱肆爾僧珍舊宅在市北前有督郵都廨鄉人或勸徙廨以益其私宅僧珍怒曰督郵官廨也置立以來便在此地豈可徙之益吾私宅蕭琛為吳興太守郡有項羽廟士民名為項王甚有靈驗遂於㕔事安施牀幕為神座公私請禱前後二千石皆於㕔拜祠而避居他室琛至移神還廟處之不疑後魏楊津為定州刺史初津兄椿得罪此州繇鉅鹿人趙畧投書所致及津之至畧舉家逃走津乃教慰喻令其還業於是一州愧服逺近稱之李憲為趙郡太守時趙脩與共州里脩歸葬父母凡牧守已下畏之累跡唯憲能不為之屈時人高之北齊彭城王浟為司州牧選從事皆取文才士明剖斷者當時稱為美選州舊案五百餘浟未朞悉斷盡别駕羊脩等恐犯權戚乃詣閤諮陳浟使告曰吾直道而行何憚權威卿等當成人之美反以權戚為言脩等慙悚而退李繪為高陽内史時河間守崔諶恃其弟暹勢從繪乞麋角鴿羽繪答書曰鴿有六翮飛則冲天麋有四足走便入海下官膚體疏懶手足遲鈍不能逐飛追走逺事佞人是時文襄使暹選司徒長史暹薦繪既不果咸謂繇此書獨孤永業為雒州刺史性鯁直不交權勢斛律光求二婢弗得毁之於朝廷蘇瓊為南清河太守瓊清慎不發私書道人道研為濟州沙門統資産巨富在郡多有出息嘗得郡縣為徵及欲求謁度知其意每見則談問𤣥理應對肅敬研雖為債數來無繇啓口其子弟問其故研曰每見府君徑將我入青雲間何繇得論地上事瓊初任清河太守裴獻伯為濟州刺史酷於用法瓊恩於養人房延祐為樂陵郡過州裴問其外聲祐云唯聞太守善刺史惡裴云安知得民譽者非至公答言若爾黄霸龔遂君之罪人也後有勑州各舉清能裴以前言恐為瓊䧟瓊申其枉滯議者尚其公平後周閻慶為寧州刺史時晉公䕶執政䕶母慶之姑也䕶雖擅朝而慶未嘗附及䕶誅高祖以此重之韋總為京兆尹武帝嘗戲總曰卿師尹帝鄉故當不以富貴威福鄉里耶總乃正色對曰陛下擢臣非分竊謂已鑒愚誠今奉嚴旨便見未照丹赤豈可久忝此職用疑聖慮請解印綬以避賢能帝大笑曰前言戲之耳隋田式馮翊人也初仕周為本郡太守親故屏跡請託不行武帝聞而善之周揺初仕周為晉州總管時高祖為定州總管文獻皇后自京師詣髙祖路經晉州揺主禮甚薄既而白后曰公廨甚富於財限法不敢輙費又王臣無得效私其質直如此高祖以其奉法每嘉之及為丞相徙封濟北郡公尋拜豫州總管梁毗為治書侍御史遷雍州贊治毗既出憲司復典京邑直道而行無所廻避頗失權貴心繇是出為西寧州刺史榮毗字子諶開皇中為殿中局監時以華隂多盗賊妙選良吏楊素薦毗為華州長史世號為能素之田宅俱在華隂左右放縱毗以法繩之無所寛貸毗因朝集素謂之曰素之舉卿適以自罰也毗答曰奉法一心者但恐累公所舉素笑曰所言戲耳卿之奉法素之望也毗在華州時晉王在揚州每令人密覘京師消息遣張衡於路次往往置馬坊以畜牧為辭實給私人也州縣莫敢違毗獨遏絶其事帝聞而嘉之賚絹百疋敬肅為潁川郡丞時右翊衛大將軍宇文述當途用事其邑在潁川每有書屬肅肅未嘗開封輙令使者持去述賔客有放縱者以法繩之無所寛貸唐張鎮州同安人也武德中為舒州都督舒州即其本邑也鎮州乃多市酒殽就望江舊宅盡召故人親戚與之酣宴散髮箕踞敦疇昔之歡十日贈以錢帛既而垂泣謂親賔曰比者張鎮州與故人為歡今日已後舒州都督治百姓爾居民禮隔不得交遊因與之訣自是親戚有犯法一無所縱州境因兹肅然蘇良嗣為京師留守司農寺將市賣菓菜以收其利良嗣駁之曰昔儀休相魯猶能㧞葵去織未聞萬乘之主與下人争利也遂止其事狄仁傑為豫州刺史初越王之亂宰相張光輔率師討平之將士恃功多所求取仁傑不之應光輔怒曰州將輕元帥耶仁傑曰亂河南者一越王貞爾今一貞死而萬貞生光輔質其詞仁傑曰明公董戎三十萬平一亂臣不戢兵鋒縱其暴横無罪之人肝腦塗地此非萬貞何邪且兇威脅從勢難自固及天兵暫臨乘城歸順者萬計繩墜四面成蹊公奈何縱邀功之人殺歸降之衆但恐寃聲騰沸上徹于天如得尚方斬馬劔加於君頸雖死如歸光輔不能詰心甚衘之還都奏仁傑不遜左授復州刺史魏元忠檢校雒陽長史號為清嚴時奉宸張易之威震海内縱其家婢多所請託元忠笞殺之蘇瓌則天時為歙州刺史來俊臣坐事貶州叅軍天下懼其殘酷朝中近臣不復入用或致書託瓌瓌叱責使者棄書不發謂曰吾為州牧高卑有禮安能虧法令以待小人乎俊臣未到追還意甚恨之累遷汴州刺史司倉叅軍韋温犯贓瓌繩而杖之及温外戚用事義其公直不敢中傷中宗神龍中瓌為京師留守鄭普思以術至祕書監妖言惑衆聚黨岐隴之間將為亂瓌收而按之其妻第五氏長於宮中昵附椒掖頻有制命特令放免瓌固執不奉制及駕還京中宗屢欲宥之瓌抗議不逥中宗以問中書令魏元忠對曰蘇瓌長者其忠懇如此願陛下察之帝遂流普思於嶺外張柬之為襄州刺史有鄉親舊交抵罪者必深文置法無所縱捨宋璟為黄門侍郎簡校貝州刺史時河北頻遭水潦百姓饑饉時梁王武三思恃寵執權有私封在貝州專使徵其賦璟拒而不與源乾曜𤣥宗時為京兆尹仍京師留守乾曜政存寛簡不嚴而理嘗有仗内白鷹因縱逸遂失所在帝令京兆切捕之俄於野外獲之其鷹挂於叢棘而死官吏懼得罪相顧失色乾曜徐曰事有邂逅死亦當理主上仁明當不以此寘罪必其獲戾吾自當之不須懼也遂入自請失旨之罪帝一切不問衆咸伏乾曜臨事不懾而能引過在已也尹京三年政令如一蘇頲開元中知益州長史事前司馬皇甫恂破庫物織新鮮様錦以進頲一切罷之或謂頲公今在逺豈得忤聖意頲曰明主不以私愛奪至公豈以逺近間易忠臣節也竟奏罷之韓休為虢州刺史時虢州以地在兩京之間駕在京及東都並為近州嘗被支税藳以納閑廐休奏請均配餘州中書令張説駁之曰若獨免虢州即當移向他郡是刺史欲為私惠耳乃下符不許休復將執奏僚吏曰更奏必忤執政之意休曰為刺史不能救百姓之弊何以為政必以忤上得罪所甘心也竟執奏獲免人于今稱之呂諲肅宗上元初為荆州節度使時申泰之為李輔國所親以左道熒惑擢為諫議大夫於郡道州界置軍誘引諸人納其金帛賞之以緋紫用囊中勑書賜衣以示之人用聽信軍人例衣朱紫剽掠村洞吏不敢制已積年矣潭州刺史龎承鼎忿之因泰之入奏至長沙縶之首贓鉅萬及左道文記一時搜獲遣使奏聞輔國黨之為之言於帝追泰之赴闕泰之見帝具言承鼎謀䧟有詔加承鼎誣罔之罪令荆南按之諲令判官監察御史嚴郢抗疏直其事上不納郢流建州論者重諲之公諲至江陵剛斷决事皆類此也士庻翕然重之承鼎竟雪泰之後流死於邊州李勉為梁州刺史都督山南西道觀察使勉以故吏前密縣尉王晬勤幹俾攝南鄭令俄有詔處死勉問故乃為權倖所誣勉詢將吏曰上方藉牧宰為人父母豈以譛言而殺不辜乎即停詔拘晬飛表上聞晬遂獲宥而竟為執政所非追入為大理少卿謁見面陳王晬無罪政事脩舉盡力吏也肅宗嘉其守正即日除太常少卿後為京兆尹先是宦官魚朝恩為觀軍容使仍知國子監事恃寵􅅤威天憲在舌前尹黎幹寫心佞事動必求媚每其將至監則盛具數百人之饍傾府吏以辦之及勉蒞職旬月朝恩入監府吏莫知先至者請於勉勉曰軍容使判國子監事勉候太學軍容宜厚具主禮勉官忝京尹軍容若至府庭豈敢不飾蔬饌朝恩竊聞而衘之因不復至太學勉亦受替呂希倩德宗初為夏州刺史時朔方節度使崔寧與宰相楊炎有隙炎令希倩伺寧過希倩與寧同力招撫黨項歸降者甚多炎惡之因奏希倩無綏邊材召歸朝以為神武將軍鄭珣瑜為河南尹珣瑜既入境官吏以逼德宗降誕日慮珣瑜到即後於事乃送所獻馬齎印於路以往例告珣瑜曰未上官不可遽有進獻及既上即失時矣遂不獻張萬福為泗州刺史時德宗幸奉天李希烈反陳少游悉令管内刺史送妻子揚州以為質萬福獨不肯送謂使者曰為某白相公萬福妻老且醜不足煩相公寄意李充為京兆尹德宗下制百司及府縣有於禁門内諸司追召人鞫聞者宜先奏聞於是充奏府縣庻務訊鞫繁細若悉以聞奏既黷天聽且失罪人其賊盗奸犯樗蒲鬬毆誘人妻妾債人財物及相言告者請仍舊追鞫從之吳凑德宗時為京兆尹于時宮中選内官買物於坊市倚勢強買謂之宮市人情無聊凑累上奏其弊又言故事宮市是府縣常務近年已來中官始自市買今請每有所要但勑下府縣令供送若亂入坊市取物恐小人因緣為奸真偽難辨不然特置宮市所令中官謹厚者主之中人不便其事帝亦不納又奏請減省掌閑彍騎及所供飛龍内園芙蓉園并禁軍諸司雜供事力資課繁冗等弊事帝多從之又文敬太子義章公主相次薨沒皆帝所深愛葬送之禮頗極奢侈徵召車牛載土築墳妨百姓農務凑累奏其弊所親信及屬吏勸諭以奏事頻煩干黷聖旨凑曰人主雖甚愛念太子公主然本意最欲憂恤百姓今諫奏雖頻庻㡬無過若因循不言上儻知侵擾百姓而長吏不訴必貽罪責凑前後諫奏雖不甚行然深蒙有識者稱美裴胄為江南西道觀察使前使李兼罷南昌軍千餘人收其資糧分為月進胄至奏其本末罷之張仲方為荆州刺史郡人有田産為中人所奪仲方三疏奏聞竟理其寃田庭玠為相州刺史屬薛蕚之亂田承嗣蠶食薛嵩所部庭玠守正字民不以宗門逥避而改節李遜為池濠二州刺史觀察使旨外徵役遜皆不從後為越州刺史遜為政以均一貧富扶弱抑强為己任故所至輙理韋貫之憲宗時為湖南觀察使時兩河留兵國用不足鹽鐵副使程异使諸道督課財賦异所至州郡皆諷令捃拾進獻貫之謂兩税外不忍横賦加人所獻未足异意遂率屬部内六州留錢以繼獻因是罷為太子􅉟事分司東都孔戣為廣州刺史先是帥南海者京師權要多託買南人為奴婢戣不受託至郡禁絶賣人口又准詔禱南海神舊多令從事代祠戣每受詔自犯風波而往韓愈在潮州作詩以美之柳公綽元和十四年為京兆尹時河朔復叛朝廷用兵補授行營諸將朝令夕改驛騎相望公綽奏曰幽鎮用兵使命繁併舘遞匱乏鞍馬多闕又勑使行李人數都無限約其衣緋紫乘馬者二三十匹衣黄衣者不下十四五匹驛吏不得視劵牒隨口即供驛馬既盡遂奪路人鞍乘衣冠士庻驚擾怨嗟逺近宣傳行李將絶伏望聖慈聊為定限乃下中書條䟽人數繇是不告勞以言直為北司所惡後為山南東道節度使公綽馬害圉人斬之賔客進言曰可惜良馬圉人自防不至公綽曰安有良馬害人乎亟命殺之王質文宗時為宣州刺史清㢘方雅為政有聲雖權臣待之厚而行已有素不渉朋比之譏崔從為淮南節度使權揚州舊有貨麴之利資産奴婢交易者皆有貫率羊有口算每歲收緡錢以益公用從至悉除之舊制官吏祿俸有布加估之給節度使獨不在此例從至一例以虛估請之韓佽為桂州觀察使桂管二十餘郡州掾而下至邑長簿尉三百員繇吏部而補者什一他皆㢘使量其才而補之佽既至桂州吏以嘗所為官者數百人引謁一吏執籍而前曰具員請補佽戒之曰在任有政者不奪所理有過者必繩以法缺者當候稽諸故籍取其可者然後補之㑹春衣使内官至求賄於郵吏而豪家因厚其貲以求邑宰佽悉諾之使去坐以撓法各笞其背自是豪猾斂跡皆得清廉吏人以蘇活後唐崔沂梁末為西京副留守時張全義為留守天下兵馬副元帥河南尹判六軍諸衛事守太尉中書令魏王名位之重冠絶中外沂至府客將目以副留守合有庭禮沂曰張公官位至重然尚帶府尹之名不知副留守見尹之儀何如全義知之遞見沂勞曰彼此有禮俱老矣勿相勞煩晉相里金後唐同光初自羽林都虞候為沂州刺史凡部曲私屬將吏不遣蒞州邑之職皆優其給贍使分掌家事而已其後累典大都督皆有聲績册府元龜卷六百七十四
