body:
  text: 册府元龜卷六百二宋王欽若等撰學校部奏議第一夫輔世明教實本於儒術化民成俗莫先於學校自漢氏之後經藝寖盛官守並建職業咸舉故方聞之士彬彬就列器識宏逺議論深厚而或慮教道之中廢形於歎憤援古議以為請臻夫體要咸能剖析前訓敷陳要道周旋感激曲暢元本誠以致治之成法稽古之大倫宜建首善尊立太學至於崇先聖之祀行齒冑之禮推擇師範廣樹徒衆申之課試大明黜陟考正疑志區别部類賛述章句購求遺逸斯皆敦益世教恢啓聖政豈徒專逹詞雅以矜乎多聞者哉漢公孫𢎞武帝時以治春秋為丞相以為學官悼道之鬱滯廼請白丞相御史言此以下皆𢎞奏請之辭制曰盖聞導民以禮風之以樂風化也婚姻者居室之大倫也倫理也今禮廢樂隳朕甚愍焉故詳延天下方聞之士咸登諸朝詳悉也方道也有道及博聞之士也共令禮官勸學講論洽聞舉遺興禮以為天下先太常議予博士弟子崇鄉里之化以厲賢材焉厲勸勉之也一曰砥厲勉也自此上𢎞所引詔文謹與太常臧博士平等議臧孔臧也平史闕其姓曰聞三代之道鄉里有教夏曰校殷曰序周曰庠校教也言可效道藝也其勸善也顯之朝廷其懲惡也加之刑法故教化之行也建首善自京師始繇内及外今陛下昭至徳開大明配天地本人倫勸學興禮崇化厲賢以風四方太平之原也風化也古者政教未洽不備其禮請因舊官而興焉為博士官置弟子五十人復其身太常擇民年十八以上儀狀端正者補博士弟子郡國縣官有好文學敬長上肅政教順鄉里出入不悖悖乖也所聞令相長丞上屬所二千石聞謂聞其部屬有此人也令縣令相侯相長縣長丞縣丞也二千石謂郡守及諸王相也二千石謹察可者常與計偕隨上計吏俱至京師詣太常得受業如弟子一歳皆課能通一藝以上補文學掌故缺其髙第可以為郎中太常籍奏為名籍而奏即有秀才異等輙以名聞其不事學若下材及不能通一藝罷之而請諸能稱者謂列其能通藝業而稱任者奏請補用之也臣謹按詔書律令下者下謂班行也明天人之際通古今之誼文章爾雅訓辭深厚爾雅近正也言詔辭雅正而深厚也恩施甚美小吏淺聞弗能究宣亡以明布諭下以治禮掌故以文學禮義為官遷留滯言治禮掌故之官本以有文學舉習禮義而為之又所以遷擢留滯之人請選擇其秩比二百石以上及吏百石通一藝以上補左右内史大行卒史左右内史後為左馮翊右扶風而大行後為大鴻臚也比百石以下補郡太守卒史皆各二人内地之郡郡各補太守卒史二人也邉郡一人先用誦多者不足擇掌故以補中二千石屬屬亦曹史今縣令文書觧言屬某甲也文學掌故補郡屬備員云備員者本以升擢之非藉其實用請著功令新立此條請以著於功令功令篇名若今選舉令也它如律令此外並如舊律令制曰可自此以來公卿大夫士吏彬彬多文學之士矣後漢陳元以父任為郎建武初元與桓譚杜林鄭興俱為學者所宗時議欲立左氏傳博士范升奏以為左氏淺末不宜立元聞之乃詣闕上疏曰陛下撥亂反正文武並用深愍經藝謬雜眞偽錯亂每臨朝日輙延羣臣講論聖道知丘明至賢親受孔子而公羊糓梁傳聞於後世故詔立左氏博訪可否示不專已盡之羣下也今論者沉溺所習翫守舊聞執虗言傳受之辭以非親見實事之道左氏孤學少與遂為異家之所覆冐夫至音不合衆聽故伯牙絶絃至寳不同衆好故卞和泣血仲尼聖徳而不容於世况於竹帛餘文其為雷同者所排固其宜也非陛下至明孰能察之臣元竊見博士范升等所議奏左氏春秋不可立及太史公違戾凡四十五事按升等所言前後相違皆斷截小文媟黷微辭以年數小差掇為巨謬遺脱纎㣲指為大尤搜瑕求釁掩其𢎞美所謂小辨破言小言破道者也升等又曰先帝不以左氏為經故不置博士後主所宜因襲臣愚以為若先帝所行而後主必行者則盤庚不當遷于殷周公不當營雒邑陛下不當都山東也往者孝武皇帝好公羊衛太子好糓梁冇詔太子受公羊不得受糓梁孝宣皇帝在人間時聞衛太子好糓梁於是獨學之及即位為石渠論而糓梁氏興至今與公羊並存此先帝後帝各有所立不必其相因也孔子曰純儉吾從衆至於拜下則違之夫明者獨見不惑於朱紫聽者獨聞不謬於清濁故離朱不為巧眩移目師曠不為新聲易耳方今干戈少弭戎事畧戢留意聖藝眷顧儒雅採孔子拜下之義萃淵聖獨見之㫖分明白黒建立左氏觧釋先聖之積結洮汰學者之累惑使基業垂於萬世後進無復狐疑則天下幸甚臣元愚鄙常傳師言如得以褐衣召見俯伏庭下誦孔氏之正道理丘明之宿寃若辭不合經事不稽古退就重誅雖死之日猶生之年也書下其議范升復與元相辨難凡十餘上帝卒立左氏學太常選博士四人元為第一帝以元新忿爭乃用其次司𨽻從事李封於是諸儒以左氏之立論議讙譁自公卿以下數庭争之㑹封病卒左氏復廢朱浮光武建武中為太僕以國學既興宜廣博士之選乃上書曰夫大學者禮義之官教化所繇興也陛下尊敬先聖垂意古典宫室未飭干戈未休而先建大學造立黌舍比日車駕親臨觀享將以𢎞時雍之化顯勉進之功也尋博士之官為天下宗師使孔聖之言傳而不絶舊事䇿試博士必廣求詳選爰自畿夏延及四方是以博學明經惟賢是登學者精勵逺近同慕伏聞詔書更試五人惟取見在雒陽城者臣恐自今以往將有所失求之宻邇容或未盡而四方之學無所勸樂凡䇿試之本貴得其眞非有期㑹不及逺方也又諸所徵試皆私自發遣非有傷費煩擾於事也語曰中國失禮求之於野臣浮幸得與講圗䜟故敢越職帝然之范升為博士時尚書令韓歆上疏欲為費氏易左氏春秋立博士費直字長翁善易長於卦筮詔下其議建武四年正月朝公卿大夫博士見於雲臺帝曰范博士可前平説升起對曰左氏不祖孔子而出於丘明師徒相傳又無其人且非先帝所存無因得立遂與韓歆及大中大夫許淑等互相辨難日中乃罷升退而奏曰臣聞主不稽古無以承天臣不述舊無以奉君陛下愍學微缺勞心經藝情好博聞故異端競進近有司請置京氏易博士羣下執事莫能據正京氏既立費氏怨望左氏春秋復以此類亦希置立京費已行次復髙氏春秋之家又有騶夾如令左氏費氏得置博士高氏騶夾五經竒異並復求立各有所執乖戾分争從之則失道不從則失人將恐陛下必有厭倦之聽孔子曰博學約之弗叛矣夫夫學而不約必叛道也顔淵曰博我以文約我以禮孔子可謂知教顔淵可謂善學矣老子曰學道日損損猶約也又曰絶學無憂絶末學也今費左二學無有本師而多反異先帝前世有疑於此故京氏雖立輙復見廢疑道不可由疑事不可行詩書之作其來已乆孔子尚周流遊觀至於知命自衛反魯乃正雅頌今陛下草創天下紀綱未定雖設學官無有子弟詩書不講禮樂不脩奏立左費非政急務孔子曰攻乎異端斯害也已傳曰聞疑傳疑聞信傳信而堯舜之道存願陛下疑前帝之所疑信先帝之所信以示反本明不專已天下之事所以異者以不一本也易曰天下之動貞夫一也又曰正其本萬事理五經之本自孔子始謹奏左氏之失凡四十事時難者以太史公多引左氏升又上太史公違戾五經謬孔子言及左氏春秋不可錄三十一事詔以下博士徐防明帝永平十四年拜司空防以五經乆逺聖意難明宜為章句以悟後學上疏曰臣聞詩書禮樂定自孔子發明章句始於子夏其後諸家分析各有異説仲尼沒而微言絶七十子喪而大義乖故春秋為五詩分為四易有數家之傳漢承亂秦經典廢絶本文畧存或無章句收拾缺遺建立明經博徵儒術開置太學武帝時開學官置博士弟子員也孔聖既逺微㫖將絶故立博士十有四家光武中興恢興稽古易有施孟梁丘賀京房書有歐陽和伯夏侯勝建詩有申公轅固韓嬰春秋有嚴彭祖顔安樂禮有戴徳戴聖凡十四博士太常差選有聰明威重一人為祭酒總領紀綱也設甲乙之科前書曰歳課甲科四十人為郎中乙科二十人為太子舍人丙科四十人為文學掌故以勉勸學者所以示人好惡改敝就善者也伏見太學試博士弟子皆以意説不脩家法諸經為業各有名家私相容隠開生姦路毎有䇿試輙與爭訟論議紛錯互相是非孔子稱述而不作但述先聖之言不自制作又曰吾猶及史之闕文古者史官于書事有不知則闕以待能者孔子言吾少時猶及見古史官之闕文今則無之疾時多穿鑿也疾史有所不知而不肯闕也今不依章句妄生穿鑿以遵師為非義意説為得理輕侮道術寖以成俗誠非詔書實選本意改薄從忠三世常道夏之政忠忠之敝小人以野故殷人承之以敬敬之敝小人以鬼故周人承之以文文之敝小人以僿故救僿以忠三王之道若循環周而復始史記僿或作薄專精務本儒學所先臣以為博士及甲乙䇿試宜從其家章句開五十難以試之觧釋多者為上第引文明者為高説若不依先師義有相伐伐謂自相攻伐也皆正以為非五經各取上第六人論語不宜射䇿雖所失或乆差可矯革東觀記防上疏曰試論語本文章句但通度勿以射䇿兾令學者務本有所一心專精師門思核經意事得其實道得其眞於此𢎞廣經術尊重聖業有益於化雖從來乆六經衰微學問䆮淺誠宜及時改矯其失詔書下公卿皆從防言賈逵章帝時為郎入講北宮白虎觀南宮雲臺帝善逵説使發出左氏傳大義長於二傳者逵於是具條奏之曰臣謹摘出左氏三十事尤著明者斯皆君臣之正義父子之紀綱其餘同公羊者十有七八或文簡小異無害大體至如祭仲紀季伍子胥叔術之属左氏義深於君父公羊多任於權變其相殊絶固以甚逺而寃抑積久莫肯分明臣以永平中上言左氏與圖䜟合者先帝不遺芻蕘省納臣言寫其傳詁藏之秘書建平中侍中劉歆欲立左氏不先暴論大義而輕移太常恃其義長詆挫諸儒諸儒不服相與排之孝哀皇帝重逆衆心故出歆為河内太守從是攻擊左氏遂為重讎至光武皇帝奮獨見之明興立左氏糓梁㑹二家先師不曉圗䜟故令中道而廢凡所以存先王之道者要在安上理民也今左氏崇君父卑臣子強榦弱枝觀善戒惡至明至切至貞至順且三代異物損益隨時故先帝博觀異家各有所採易有施孟復立梁丘尚書歐陽復有小大夏侯今三傳之異亦猶是也又五經家皆無以證圖䜟明劉氏以為堯後者而左氏獨有明文五經家皆言顓頊代黄帝而堯不得為火徳左氏以為少昊代黄帝即圗䜟所謂帝宣也如今堯不得為火則漢不得為赤其所發明補益實多陛下通天然之明見大聖之本改元正厯垂萬世則是以麟鳳百數嘉瑞雜遝猶朝夕恪勤逰情六藝研㡬綜微靡不審覈若復留意廢學以廣聖見庶㡬無所遺失矣書奏帝嘉之賜布五百疋衣一襲魯丕和帝時為中散大夫時侍中賈逵薦丕道藝深明宜見任用帝因朝㑹召見諸儒丕與逵及尚書令黄香等令相難數事帝善丕之説特賜冠幘履襪衣一襲丕因上疏曰臣以愚頑顯備大位犬馬氣衰猥得進見論難於前無所甄明衣服之賜誠為優遇臣聞説經者傳先師之言非從已出不得相讓相讓則道不明若規矩權衡之不可枉也難者必明其據説者務立其義浮華無用之言不陳於前故精思不勞而道術愈章法異者各令自説師法博觀其義覧詩人之㫖意察雅頌之終始明舜禹臯陶之相戒顯周公箕子之所陳觀乎人文化成天下陛下既廣納謇謇以開四聰寜令蒭蕘以言得罪既顯巖穴以求仁賢無使幽逺獨有遺失樊準安帝時補尚書郎鄧太后臨朝儒學陵替準乃上疏曰臣聞賈誼有言人君不可以不學故雖大舜聖徳孜孜為善成王賢主崇明師傅故光武皇帝受命中興羣雄分擾旌旗亂野東西誅戰不遑啓處然猶投戈講藝息馬論道至孝明皇帝兼天地之資用日月之明庶政萬㡬無不簡心而垂情古典游意經藝每饗射禮畢正坐自講諸儒並聽四方欣欣雖闕里之化矍相之事誠不足言又多徵名儒以充禮官如沛國趙孝瑯琊承宮等或安車結駟告歸鄉里或豐衣博帶從見宗廟其餘以經術見優者布見廊廟故朝多皤皤之良華首之老每宴㑹則論難衎衎共求政化詳覽羣言響如振玉朝者進而思政罷者退而備問小大隨化雍雍可嘉期門羽林介胄之士悉通孝經博士議郎一人開門徒衆百數化自聖躬流及蠻荒匈奴遣伊秩訾王大車且渠來入就學八方肅清上下無事是以議者每稱盛時咸言永平今學者盖少逺方尤甚博士倚席不講儒者競論浮麗忘謇謇之忠習諓諓之辭文吏則去法律而學詆欺鋭錐刀之鋒斷刑辟之重徳陋俗薄以致苛刻昔孝文竇后性好黄老而清淨之化流景武之間臣愚以為宜下明詔博求幽隠發揚巖穴寵進儒雅有如孝宫者徵詣公車以俟聖上講習之期公卿各舉明經及舊儒子孫進其爵位使纉其業復召郡國書佐使讀律令如此則延頸者日有所見傾耳者月有所聞伏願陛下推述先帝進業之道太后深納其言是後屢舉方正敦樸仁賢之士翟酺順帝時為將作大匠上言孝文皇帝始置一經博士武帝大合天下之書而孝宣論六經於石渠學者滋盛弟子萬數光武初興愍其荒廢起太學博士舍内外講堂諸生横卷為海内所集明帝時辟雍始成欲毁太學太尉趙熹以為大學辟雍皆宜兼存故並傳至今而頃者頽廢至為園採芻牧之處宜更修繕誘進後學帝從之遂起太學更開拓房室學者為酺立碑銘於學魏劉靖文帝時為大司農衛尉上疏陳儒訓之本曰夫學者治亂之軌儀聖人之大教也自黄初以來崇本太學二十餘年而成者盖寡繇博士選輕諸生避投髙門弟子恥非其倫故學者雖有其名而無其實雖設其教而無其功宜高選博士取行為人表經任人師者掌教國子依遵古法使二千石以上子孫年從十五皆入太學明制黜陟榮辱之路其經明修行者則進之以崇徳荒教廢業者則退之以懲惡舉善而教不能則勸浮華交游不禁自息矣闡𢎞大化以綏來賓六合承風逺人來格此聖人之教致治之本也髙柔明帝時為博士執經又上疏曰臣聞遵道重學聖人洪訓褒文崇儒帝者明經昔漢末陵遲禮樂隳壊雄戰虎爭以戰陣為務遂使儒林之羣幽隠而不顯太祖初興閔其如此在於撥亂之際並使郡縣立教學之官高祖即位遂闡其業興復辟雍州立課試於是天下之士復開庠序之教親俎豆之禮焉陛下臨政允廸叡哲敷𢎞大猷光濟先軌雖夏啓之承基周成之繼業誠無以加也然今博士皆經明行脩一國清選而使遷除限不過長懼非所以崇顯儒術帥勵怠惰也孔子稱舉善而教不能則勸故楚禮申公學士鋭精漢隆卓茂縉紳競慕臣以為博士者道之淵藪六藝所宗宜隨學行優劣待以不次之位敦崇道教以勸學者於化為𢎞帝納之晉載邈懐帝永嘉中為征南軍司于時凡百草創學校未立邈上疏曰臣聞天道之所大莫大於隂陽帝王之至務莫重於禮學是以古之建國有明堂辟雍之制鄉有庠序黌校之儀皆所以抽道幽滯啓廣才思盖以六四有困蒙之吝君子大養正之功也昔仲尼列國之大夫耳興禮脩學於洙泗之間四方髦俊斐然向風身通者七十餘人自兹以來千載絶塵豈天下小於魯衛賢者乏於曩時勵與不勵故也自頃國遭無妄之禍社稷有綴旒之危㓂羯飲馬於長江兇狡鴟張於萬里遂使神州蕭條鞠於茂草四海之内人迹不交覇主有旰食之憂黎元懐荼毒之苦戎馬交集於中原何遑籩豆之事哉然三年不為禮禮必壊三年不為樂樂必隳况曠載累紀如此之乆焉今末進後生目不覩揖讓升降之儀耳不聞鐘鼔管絃之音文章散滅圖䜟無遺此盖聖逹之所深悼有識之所嗟歎也夫治世尚文遭亂尚武文武逓用乆長之道譬之天地昏明交迭自古以來未有不由之者也今或以天下未一非興禮學之時此言似之而不期然夫儒道深奥不可倉卒而成古之俊乂必三年而通一經此天下泰平然後脩之則功成事定誰與制禮作樂者哉又貴逰之子未必有斬將搴旗之才亦未有從軍征戍之役不及盛年講肄道義使明珠加磨瑩之功荆璞發採琢之榮不亦良可惜乎臣愚以世䘮道乆人情玩於所習純風日去華競日彰猶火之消膏而莫之覺也今天下告始萬物權輿聖朝以神武之徳値革命之運蕩近世之流敝繼千載之絶軌篤道崇儒創立大業明主唱之於上宰輔督之於下夫上之所好下必有過之者焉是故雙劔之節崇而飛白之俗成挾琴之容飭而赴曲之和作君子之徳風小人之徳草實在感之而已臣以闇淺不能逺識格言奉誦明令慷慨下風謂以三時之隙漸就脩建疏奏納焉於是始脩禮學王導元帝初遷驃騎將軍領中書監于時軍旅不息學校未修導上書曰夫治化之本在於正人倫人倫之正存乎設庠序庠序設五教明徳禮洽通彛倫攸敘有恥且格也父子兄弟夫婦長㓜之序順而君臣之義固矣易所謂正家而天下定者也故聖王蒙以養正少而教之使化沾肌骨習以成性遷善逺罪而不自知行成德立而後裁之以位雖王之嫡子猶與國子齒使知道而後貴其取才用事咸先本之于學故周禮鄉大夫獻賢能之書于王王拜而受之所以尊道而貴士也人知士之所貴繇乎道存則退而脩其身脩其身以及其家正家以及於鄉學於鄉以登於朝反本復始各求諸已敦素之業著浮薄之道息教始然也故以之事君則忠用之蒞下則仁即孟軻所謂未有仁而遺其親義而後其君者也自頃皇綱失統禮教陵替頌聲不作于今二紀傳曰三年不為禮禮必壊三年不為樂樂必隳而况如此其乆者乎先進漸忘揖讓之容後生惟聞金革之響干戈日尋爼豆不設先王之道彌逺華偽之風遂滋非所以習民靖俗端本抑末之謂也殿下以命世之資屬傾危之運禮樂征伐翼成中興將滌穢蕩瑕撥亂反正誠宜經綸稽古建明學校闡揚六藝以訓後生使文武之道墜而復興方今小雅盡廢戎虜扇熾節義陵遲國恥未雪忠臣義士所以扼腕禮樂政刑當竝陳以俱濟者也茍禮義膠固純風載洽則化之所陶者廣而徳之所被者大義之所屬者深而威之所振者逺矣由斯而進則可朝服濟河使帝典闕而復補王綱弛而更張饕餮改情獸心革靣揖讓而蠻夷服緩帶而天下從得乎其道者豈難也哉故有虞舞干戚而三苖化魯僖作泮宫而淮夷服桓公之覇皆先教而後戰今若聿遵前典復道教使朝之子弟並入于學選明博修禮之士而為之師化成俗定莫尚於斯帝納之荀崧元帝時為太常時方修學校簡省博士置周易王氏尚書鄭氏古文尚書孔氏毛詩鄭氏周官禮記鄭氏春秋左傳杜氏服氏論語孝經鄭氏博士各一人凡有九人其儀禮公羊糓梁及鄭易皆省不置崧以為不可乃上疏曰自䘮亂以來儒學尤寡今處學則闕朝廷之秀士朝則廢儒學之俊昔咸寜太康元康永嘉之中侍中常侍黄門通洽古今行為世表者領國子博士一則應對殿堂奉酬顧問二則叅訓國子以𢎞儒訓三則祠儀二曹及太常之職以得質疑今皇朝中興美隆往初宜憲章令軌祖述前典世祖武皇帝應運登禪崇儒興學經始明堂營建辟雍告朔班政鄉飲大射西閣東序河圗秘書禁籍臺省有宗廟大府金庸故事太學有石經古文先儒典訓賈馬鄭杜服孔王何顔尹之徒章句傳注衆家之學置博士十九人九州之中師徒相傳學士如林猶選張華劉實居太常之官以重儒教傳稱孔子沒而微言絶七十二子䘮而大義乖自頃中夏殄瘁講誦遏密斯文之道將墜于地陛下聖哲龍飛恢崇道教樂正雅頌於是乎在江楊二州先漸聲教學士移文于今為盛然方疇昔猶遷之一臣學不章句才不𢎞通方之華實儒風殊邈思竭駑駘庶増萬分願斯道隆於百世之上縉紳永於千載之下伏聞節省之置皆三分置二博士舊置十九人今五經合九人准古計今猶未能半宜及省節之制以時施行今九人以外猶宜増四願陛下萬㡬餘暇時垂省覧宜為鄭易置博士一人鄭儀禮博士一人春秋公羊博士一人糓梁博士一人昔周之衰下陵上替上無天子下無方伯善者誰賞惡者誰罰孔子懼而作春秋諸侯忌妬懼犯時禁是以微辭妙㫖義不顯明故曰知我者其惟春秋罪我者其惟春秋時左丘明子夏造膝親受無不精究孔子既沒微言將絶於是丘明退撰所聞而為之傳其書善禮多膏腴美辭張本繼末以發明經義信多竒偉學者好稱之公羊高親受子夏立於漢朝辭義清俊斷决明審董仲舒之所善也糓梁赤師徒相傳暫立於漢世向歆漢之碩儒猶父子各執一家莫肯相從其書文清義約諸所發明或是左氏公羊所不載亦足有所取正是以三傳並行於先代通才未能孤廢今去聖乆逺其文將墮與其過廢寜與過立臣以為三傳雖同曰春秋而發端異趣按如三家異同之説此乃義則戰爭之塲辭以劔㦸之鋒於理不可得共博士宜各置一人以博其學詔曰崧表如此皆經國之務為政所由息馬投戈猶可講藝今雖日不暇給豈忘本而遺存邪可共博士議者詳之議者多請從崧所奏詔曰榖梁膚淺不足置博士餘如奏㑹王敦之難不行應詹元帝時為後軍將軍上疏曰性相近習相逺訓導之風宜慎所好魏正始之間蔚為文林元康以來賤經尚道以𤣥虚宏放為夷逹以儒術清儉為鄙俗永嘉之弊未必不由此也今雖有儒官教養未備非所以長育人材納之軌物也宜修辟雍崇明教義先令國子受訓然後皇儲親臨釋奠則普天尚徳率土知方矣帝雅重其才深納之袁環成帝時咸康中為國子祭酒于時䘮亂之後禮教陵遲環上疏曰臣聞先王之教也崇典訓以𢎞逺大明禮學以流後生所以道萬物之性暢為善之道也宗周既興文史載煥端委垂於南蠻頌聲溢於四海故延陵聘魯聞雅而嘆韓起過魯觀易而美何者立人之道於斯為首孔子恂恂以教洙泗孟軻係之誨誘無倦是以仁義之聲于今猶存禮讓之節時或有之疇昔皇運陵替䘮亂屢臻儒林之教漸頽庠序之禮有闕國學索然墳籍莫啓有心之徒抱志無由昔魏武帝身親介胄務在武功猶尚廢鞍覧卷投戈吟咏况今陛下以聖明臨朝百官以䖍恭蒞事朝野無虞江外謐靜如之何泱泱之風漠焉無聞洋洋之美墜於聖世乎古人有言詩書義之府禮樂徳之則實宜留心經籍闡明學義使諷誦之音盈於京室味道之賢是則是詠豈不盛哉若得給其宅第備其學徒博士僚屬粗有其官則臣之願也疏奏帝從之國學之興自環始也謝石孝武帝太元初為尚書上疏曰立人之道曰仁與義翼善輔性惟禮與學雖理出自然必須誘導故洙泗闡𢎞道之風詩書垂軌教之典敦詩悦禮王化以湏而隆甄陶九流羣生於是乎穆世不常治道亦時亡光武投戈而習誦魏武息馬以脩學懼墜斯文若此之至也大晉受命値世多阻雖聖化日融而王道未備庠序之業或廢或興遂令陶鑄闕日用之功民性靡素絲之益亹亹𤣥緒翳焉莫抽臣所以逺尋伏念寤寐永歎者也今皇威遐震戎車方靜將灑𤣥風於四區導斯民於至徳豈可不𢎞敷禮樂使煥乎可觀請興復國學以訓胄子班下州郡普脩鄉校雕琢琳瑯和寳必至大啓羣蒙茂兹成德匪懈于事必由之以道則人競其業道隆學備矣帝納其言殷茂為國子祭酒時選公卿二千石子弟為學生増造廟屋一百五十五間而品課無章士君子恥與其列茂言之曰臣聞𢎞化正俗存乎禮教輔性成徳必資於學先王所以陶鑄天下津梁萬物閑邪納善濳被於日用者也故能疏通𤣥理窮綜幽微一貫古今彌綸治化且夫子稱囘以好學為本七十希聖以善誘歸宗雅頌之音流詠千載聖賢之淵範哲王所同風自大晉中興肇基江左崇明學校脩建庠序公卿子弟竝入國學尋値多故訓業不終陛下以聖徳𤣥一思隆前美順通居方導逹物性興復儒肆筌與後生自學建彌年而功無可名憚業避就存者無幾或假託親疾眞偽難知聲實渾亂莫此之甚臣聞舊制國子生皆冠族華胄比列皇儲而中者混雜蘭艾遂令人情恥之子貢欲去告朔之餼羊仲尼猶愛其禮况名實兼䘮靣牆一世者乎若以當今急病未遑斯典權宜停廢者别一理也若其不然宜依舊准竊謂臣内外清官子侄普應入學制以程課今者見生或年在扞格方圓殊趣宜聽其去就各從所安所上謬合乞付外參議孝武下詔褒納又不施行李遼清河人孝武時上表曰臣聞教者治化之本人倫之始所以誘逹羣方進徳興仁譬諸土石因陶冶成器雖復百王殊禮質文參差至於斯道其用不爽自中華湮沒闕里荒毁先王之澤䆮聖賢之風絶自此迄今將及百年造化有零否終有泰河濟夷徙海岱清及徘徊天邑感戀罔極乞臣表付外參議又不見省册府元龜卷六百二
