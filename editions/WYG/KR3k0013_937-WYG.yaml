body:
  text: 册府元龜卷九百三十七宋王欽若等撰總録部姦佞夫性之至極者則趨尚難渝道之至昧者則性情易固所以脂韋以成其志便僻以用其心長惡不悛趨善彌逺肆情於傾巧盗言而孔甘亂于家邦壊于典法或兵謀而是沮或政治而不修希㫖茍容縱刑恣暴既枉道以事人亦色厲而内荏仲尼所謂穿窬之盗者不其然乎叔仲昭伯魯大夫哀公七年為隊正隊正主役徒昭伯叔仲惠伯之孫欲善季氏而求媚於南遺謂遺請城費使遺請城吾多與而役故季氏城費言禄去公室季氏所以強豎牛魯叔孫之家臣季孫謀去中軍豎牛曰夫子固欲去之誣叔孫以媚季孫漢王温舒武帝時為中尉温舒撃東越還議有不中意中竹仲切不當天子意也坐以法免是時帝方欲作通天臺而未有人温舒請復中尉脱卒得數萬人作覆校脱漏未為卒者也脱它活切帝拜為少府陳湯字子公成帝時為大將軍從事中郎與將作大匠解萬年相善自元帝時渭陵不復徙民起邑成帝起初陵數年後樂霸陵曲亭南更營之萬年與湯議以為武帝時工楊光以所作數可意可天子之意也自致將作大匠及大司農中丞耿壽昌造杜陵賜爵闗内侯將作大匠乗馬延年以勞苦秩中二千石姓乗馬名延年乗食孕切今作初陵而營起邑居成大功萬年亦當蒙重賞子公妻家在長安兒子生長長安不樂東方宜求徙可得賜田宅俱善湯心利之即上封事言初陵京師之地最為肥美可立一縣天下民不徙諸陵三十餘歲矣闗東富人益衆多規良田役使貧民䂓畫也自占為疆界可徙初陵以彊京師衰弱諸侯又使中家以下得均貧富湯願與妻子家属徙初陵為天下先於是天子從其請果起昌陵邑徙内郡國民萬年自詭三年可成詭責也自以為憂責也後卒不就卒終也就亦成也羣臣多言其不便者下有司議皆曰昌陵因卑為髙積土為山度便房猶在平地上度徒各切客土之中不保幽㝠之靈淺外不固卒徒工庸以鉅萬數至㸐古然字脂火夜作取土東山且與榖同賈作治數年天下偏被其勞國家罷罷讀曰疲敵府藏空虚下至衆庻熬熬熬熬衆愁聲苦之故陵因天性據真土處勢髙敞旁近祖考前又已有十年功緒緒謂端次也宜還復故陵勿徙民上乃下詔罷昌陵丞相御史請廢昌陵邑中室徙人新所起室奏未下人以問湯第宅不徹得毋復發徙問其不復發徹更移徙邪湯曰縣官且順聽羣臣言猶且復發徙之也時成都侯商新為大司馬衛將軍輔政素不善湯商聞此語白湯惑衆下獄治淳于長為衛尉九卿久之趙飛燕貴幸成帝欲立以為皇后太后以其所出微難之長主徃來通語東宫主猶𨗳歲餘趙皇后得立帝甚徳之廼追顯長前功下詔曰前將作大匠解萬年奏請營作昌陵罷弊海内罷讀曰疲侍中衛尉長數曰宜止徙家反故處陵置邑徙人以實之長奏令所徙之家各還本處朕以長言下公卿議者皆合長計首建至䇿民以康寧康安也其賜長爵闗内侯後遂封為定陵侯大見信用貴傾公卿外交諸侯牧守賂遺賞賜亦絫鉅萬絫古累字也谷永為太常丞成帝建始三年冬日蝕地震同日俱發詔徴賢良方正之士永對䇿是時帝初即位謙讓委政元舅大將軍王鳳議者多歸咎焉永知鳳方見柄用言任用之授以權也隂欲自託乃復曰方今四夷賓服皆為臣妾北無薫粥冐頓之患粥代六切南無趙佗吕嘉之難三垂晏然靡有兵革之警晏安也諸侯大者乃食數縣漢吏制其權柄不得有為亡呉楚燕梁之埶百官盤互親䟽相錯盤互盤結而交互也錯間雜也互字或作牙言如豕牙之盤犬牙之相交也骨肉大臣有申伯之忠申伯周申后之父洞洞屬屬小心畏忌洞洞驚肅也屬屬専謹也洞音動屬之欲切無重合安陽博陸之患重合莽通安陽上官桀博陸霍禹也三者無毛髪之辜不可歸咎諸舅此欲以政事過差丞相父子中尚書宦官檻塞大異皆瞽説欺天者也檻義取檻押之檻檻猶閉也其字從木瞽説言不中道若無目之人也竊恐陛下舍昭昭之白過忽天地之明戒聽晻昧之瞽説舍謂棄也晻字與暗同又音一敢切歸咎乎無辜倚異乎政事倚依也音於綺切次下亦同重失天心重直用切不可之大者也此則為大不可也陛下即位委任遵舊未有過政元年正月白氣較然起乎東方較明貌也至其四月黄濁四塞覆冒京師申以大水著以震蝕申重也著明也咎有占應相為表裏百官庻士無所歸倚陛下獨不恠興倚於己切興讀曰敬白氣起東方賤人將興之表也黄濁冒京師王道微絶之應也夫賤人當起而京師道微二者已醜已甚也陛下誠深察愚臣之言致懼天地之異長思宗廟之計改徃反過抗湛溺之意解偏駁之愛抗舉也湛讀曰沈駁不周普也奮乾綱之威平天覆之施使列妾得人人更進猶尚未足也更互也音公行切急復益納宜子婦人毋擇好醜母避嘗字王鳳上小妻弟以納后宫以嘗字乳王章言之坐死今永及此為鳳洗前過也母論年齒推法言之陛下得繼嗣於微賤之間乃反為福得繼嗣而已母非有賤也茍得子耳勿論其母之貴賤後宫女史使令有直意者廣求於微賤之間直當也令力成切以遇天所開右右讀曰佑右助也慰釋皇太后之憂愠釋散也解謝上帝之譴怒則繼嗣蕃滋災異訖息蕃多也訖止也蕃符元切陛下則不深察愚臣之言忽於天地之戒咎根不除雨水之災山石之異將發不久發則災異已極天變成形臣雖欲捐身開䇿不及事已言禍敗既成不可如何也已語終辭也疏賤之臣至敢直陳天意斥譏帷幄之私欲間離貴后盛妾間寛居切自知忤心逆耳必不免於湯鑊之誅此天保右漢家使臣敢直言也右讀曰佑三上封事然後得召待詔一旬然後得見夫由疏賤納至忠甚苦由從也苦勞苦也由至尊聞天意甚難語不可露願具書所言因侍中奏陛下以示腹心大臣永為鳳言而言示腹心大臣無不可矣腹心大臣以為非天意臣當伏妄言之誅即以為誠天意也奈何忘國家大本背天意而從欲從讀曰縱惟陛下省察熟念厚為宗廟計時對者數十人永與杜欽為上第焉帝皆以其書示後宫後帝嘗賜許皇后書采永言以責之陳崇孺子嬰時為大司徒司直王莽為太傅安漢公崇與張敞孫竦相善竦者博通士為崇草奏稱莽功徳崇奏之曰竊見安漢公自初束修束修謂初學官之時值世俗隆奢麗之時蒙兩宫厚骨肉之寵被諸父赫奕之光財饒勢足亡所牾意牾音五故切然而折節行仁克心履禮拂世矯俗確然特立拂違也矯正也拂音佛惡衣惡食陋車駑馬妃匹無二閨門之内孝友之徳衆莫不聞清浄樂道温良下士下音乎嫁切惠於故舊篤于師友孔子曰未若貧而樂富而好禮公之謂矣及為侍中故定陵侯淳于長有大逆罪公不敢私建白誅討周公誅管蔡季子鴆叔牙公之謂矣是以孝成皇帝命公大司馬委以國統孝哀即位髙昌侯董宏希指求美造作二綂欲令丁姬為帝太后公手劾之以定大綱建白定陶太后不宜在乗輿幄坐坐音才卧切以明國體詩曰柔亦不茹剛亦不吐不侮鰥寡不畏彊禦公之謂矣深執謙退推誠讓位定陶太后欲立僣號憚彼面刺幄坐之義佞惑之雄朱博之疇懲此長宏手劾之事上下一心䜛賊交亂詭僻制度遂成簒號詭違也斥逐仁賢誅殘戚属而公被胥原之訴逺去就國朝政隳壊綱紀廢弛危亡之禍不隧如髪隧直類切詩云人之云亡邦國殄瘁公之謂矣當此之時宫無儲主董賢據重加以傅氏有女之授謂哀帝傅皇后皆自知得罪天下結讐中山傅太后譛中山馮太后䧟以呪詛之罪則必同憂斷金相翼易繫辭二人同心其利斷金翼助也藉假遺詔頻用賞誅先除所憚急引所附遂誣徃寃更徴逺属事執張見其不難矣頼公立入即時退賢及其黨親當此之時公運獨見之明奮亡前之威盱衡厲色振揚武怒眉上曰衡盱衡舉眉揚目也乗其未堅厭其未發震起機動敵人摧折雖有賁育不及持刺雖有樗里不及回知雖有鬼谷不及造次是故董賢䘮其魂魄遂自絞殺人不還踵日不移晷霍然四除更為寧朝非陛下莫引立公非公莫尅此禍詩云惟師尚父時惟鷹揚亮彼武王孔子曰敏則有功公之謂矣於是公乃白内故泗水相豐漦令邯與大司徒光車騎將軍舜建定社稷奉節東迎皆以功徳受封益土為國名臣書曰知人則哲公之謂也公卿或歎公徳同盛公勲皆以周公為比宜賜號安漢公益封二縣皆不受傳曰申包胥不受存楚之報晏平仲不受輔齊之封孔子曰能以禮讓為國乎何有公之謂也將為皇帝定立妃后有司上名公女為首公深辭讓廹不得已然後受詔父子之親天性自然欲其榮貴甚於為身皇后之尊侔於天子當時之會千載希有然而公惟國家之統揖大福之恩揖謂讓而不當事事讓退動而固辭書曰舜讓於徳弗嗣公之謂矣自公受䇿以至于今亹亹翼翼日新其徳增修雅素以命下國俊儉隆約以矯世俗俊退也矯正也俊音千句切其字從千割財損家以師羣下彌躬執平以逮公卿彌讀與弭同教子尊學以隆國化僮奴衣布馬不秣榖食邑之用不過凡庻詩云温温恭人如集于木孔子曰食無求飽居無求安公之謂矣克身自約糴食逮給物物卬市日闋亡儲物物卬市言其衣食所須皆買之於市不自營作而不奪工商利也闋盡也日闋言當日即積不蓄積也卬音牛向切闋音亡穴切又上書歸孝哀皇帝所益封邑入金錢獻田殫盡舊業為衆倡始於是小大鄉和承風從化郷讀曰向外則王公列侯内則帷幄侍御翕然同時各竭所有或入金錢或獻田畆以賑貧窮牧贍不足者昔令尹子文朝不及夕魯公儀子不茹園葵令尹子文自毁其家以紓楚國之難仕而逃祿朝不及夕也公之謂矣開門延士下及白屋婁省朝政綜管衆治親見牧守以下考迹雅素審知白黒詩云夙夜匪懈以事一人易曰終日乾乾夕惕若厲乾乾九三爻辭也乾乾自強之意惕俱也厲貧也公之謂矣此三世為三公再奉送大行秉冡宰職填安國家填音竹刅切四海輻凑靡不得所書曰納于大麓烈風雷雨不迷公之謂矣此皆上世之所鮮禹稷之所難而公包其終始一以貫之可謂備矣是以三年之間化行如神嘉瑞疊累豈非陛下知人之效得賢之致哉故非獨君之授命也臣之生亦不虚矣是以伯禹賜𤣥圭周公受郊祀尚書禹貢云禹錫𤣥圭告厥成功言賞治水功成也禮記明堂位曰成王㓜弱周公踐天子之位以治天下七年乃致政於成王成王以周公為有勲勞於天下封周公於曲阜地方七百里革車千乗命魯公世世祀周公以天子禮樂是以魯君孟春乗大輅旂十有二旒日月之章祀帝于郊配以后稷天子之禮也盖以逹天之使不敢擅天之功也揆公徳行為天下紀紀理也觀公功勲為萬世基基成而賞不配紀立而褒不副誠非所以厚國家順天心也髙皇帝褒賞元功蕭何相國邑户既倍又蒙殊禮奏事不名入殿不趨封其親属十有餘人樂言無厭班賞亡遴遴與􅈔同茍有一䇿即必爵之是故公孫戎位在充郎選繇旄頭一明樊噲封二千户公孫戎奴也髙帝時為旄頭郎楚漢春秋上東圍項羽聞噲反旄頭公孫戎明之卒不反封戎二千户此公孫戎耳非戎奴也戎奴自武帝時人繇讀與由同孝文皇帝褒賞絳侯益封萬户賜黄金五十斤孝武皇帝卹録軍功裂三萬户以封衛青青子三人或在襁褓皆為通侯孝宣皇帝顯著霍光增户命疇封者三人延及兄孫夫絳侯即因漢藩之固仗朱虚之鯁依諸將之遰據相扶之埶其事雖醜要不能遂遰繞也謂相圜繞也言絳侯之時漢之強漢家外有藩屏磐石之固内有朱虚骨鯁之強諸將同心圍繞扶翼吕氏之黨雖欲作亂心懐醜惡事必不成言勃之功不足多也遰音滯霍光即席嘗任之重乗大勝之威未嘗遭時不行䧟假離朝言光未嘗䧟假不遇而離去朝也莽嘗退就國是䧟假也假陞也䧟假者被䧟害而退所升之器朝之執事亡非同類割斷歴久綂政曠世雖曰有功所因亦易然猶有計䇿不審過徴之累光誤徴昌邑王不得其人也音立端切及至青戎摽末之功一言之勞然猶皆蒙丘山之賞課功絳霍造之與因也比之青戎地之與天也而公又有宰治之效乃當上與伯禹周公等盛齊隆兼其褒賞特與若云者同日而論哉然曾不得蒙青等之厚臣誠惑之臣聞功亡原者賞不限徳亡首者褒不簡亡原謂不可測其本原也無首謂無出其上者也簡茍也是故成王之於周公也廣百里之限越九錫之簡開七百里之宇兼商奄之民商奄二國名賜以附庸殷民六族謂條氏徐氏蕭氏索氏長勺氏尾勺氏也大路大旂封父之繁弱夏后之璜封父古諸侯也繁弱大弓名半璧曰璜父讀曰甫祝宗卜史太祝太宗太卜太史凡四官備物典䇿既有備物而加之䇿書也一曰典䇿春秋之制也官司彞器官司百官也彞器常用之器也一曰彞祭宗廟酒器也周禮有六彞之法也言器有所法象之貌耳白牡之牲明堂位曰季夏六月以禘禮祀周公於太廟牲用白牡郊望之禮郊上祀帝于郊也望謂望山川而祭之也王曰叔父建爾元子魯頌閟宫之詩王曰叔父建爾元子俾侯于魯謂命周公封伯禽以為魯公也子父俱延拜而受之謂周公拜前魯公拜後可謂不簡亡原者矣非特止此六子皆封周公六子伯禽之弟也詩曰亡言不讐亡徳不報報當如之不如非報也近觀行事及髙祖之約非劉氏不王然而畨君得王長沙下詔稱忠定著於令明有大信不拘於制也春秋晉悼公用魏絳之䇿諸夏服從鄭伯獻樂悼公於是以半賜之絳深辭讓晉侯曰微子寡人不能濟河夫賞國之典不可廢也子其受之魏絳於是有金石之樂春秋善之取其臣竭忠以辭功君知臣以遂賞也今陛下既知公有周公之功徳不行成王之褒賞遂聽公之固辭不顧春秋之名義則民臣何稱萬世何述誠非所以為國也臣愚以為宜恢公國令如周公恢大也建立公子令如伯禽所賜之品亦皆如之諸子之封皆如六子即羣下較然輸忠黎庻昭然感徳臣誠輸忠民誠感徳則於王事何有惟陛下深惟祖宗之重敬畏上天之威儀刑虞周之盛勑盡伯禽之賜無遴周公之報勑備也遴與􅈔同令天法有設後世有祖祖始也以此為法之始天下幸甚崇又奏安漢公祠祖禰出城門城門校尉宜將騎士從入有門衛出而騎士所以重國也奏可鄧颺與何晏丁謐李勝畢軌咸有聲名及大將軍曹爽秉政叙任為腹心颺晏謐並為尚書勝為河南尹軌為司𨽻校尉颺等令爽立威名於天下勸使伐蜀爽從其言司馬宣王止之不能禁晉馮紞武帝時為左衛將軍得幸于武帝承顔悦色寵愛日隆賈充荀朂並與之親善充女之為皇太子妃也紞有力焉及妃之將廢紞朂乾没救請故得不廢宋王誕為瑯琊王文學安帝隆安四年㑹稽王世子元顯開後軍府又以誕補功曹累拜龍驤將軍瑯琊内史如故設給事元顯劉延年為趙太宰劉景為太傅㑹劉聰后呼延氏死將納其太保劉殷女其弟乂固諫聰更訪之於延年景等皆曰臣嘗聞太保自云周劉康公之後與聖氏本源既殊納之為允聰大悦使其兼大鴻臚李宏拜殷二女為左右貴嬪位在昭儀上又納殷女孫四人為貴人位次貴嬪謂宏曰此女軰皆姿色超世女徳冠時且太保於朕實自不同卿意安乎宏曰太保裔自有周與聖源實别陛下正以姓同為恨耳且魏司宣東萊王某當世大儒豈不逹禮乎為子納司空太原王沉女以其姓同而源異故也聰大悦賜宏黄金六十斤曰卿當以此意諭吾子弟軰於是六劉之寵傾於後宫張離為後趙右僕射領五兵尚書専總兵要而欲求媚于石宣因説之曰今諸公侯吏兵過限宜漸削弱以盛儲威宣素疾石韜之寵甚説其言乃使離奏奪諸公府吏秦燕義陽樂平四公聽置吏一百九十七人帳下兵二百人自此以下二分置一餘兵五萬悉配東宫於是諸公咸怨為大釁之漸矣後魏閔湛為著作内史時崔浩為司徒浩述成國記湛為浩信待見浩所注詩論尚書遂上疏言馬鄭王賈雖注述六經多疏謬不如浩之精儆乞收境内諸書藏之秘府班告所注命天下習業并求勑浩注禮傳令後生得觀正義浩亦表薦湛有著作之才既而觀浩刋所撰國史于石用垂不朽欲以彰浩直筆之迹遂營於天郊東三里方三百歩用功三百萬乃訖郭景尚累遷太尉從事中郎公強當世善事權寵世號之曰郭尖山偉為員外郎廷尉評時天下無事仕進路難代遷之人多不霑預及六鎮隴西二方逆起領軍元乂欲用代來寒人為傳詔以慰悦之而牧守子孫投狀求者百餘人又欲杜之因奏立勲附隊令各依資出身自是北人悉被收叙偉遂奏紀贊乂徳美乂素不識偉訪侍中安豐王延明黄門郎元順等因是稱薦之又令僕射元卿引偉兼尚書二千石郎後正名士郎修起居注徐紇為鴈門太守紇稱母老解郡還鄉至家未幾尋入洛飾貌事元乂大得乂意及乂父繼西鎮潼闗以紇為從事中郎北齊張纂為爾朱兆都督長史為兆使於神武遂被顧識神武舉義山東劉誕據相州拒守時纂亦在其中神武攻而㧞之引纂參丞相軍事纂性便僻左右出納稍見親待崔暹初為御史中尉時文襄寵瑯琊公主名玉儀魏髙陽王斌庻生妹也初不見齒為孫騰妓騰又棄之文襄遇諸途悦而納之遂被殊寵奏魏帝封焉文襄謂崔季舒曰爾由來為我求索不如我自得一絶異者崔暹必當造直諫我亦有以待之及暹咨事文襄不復假以顔色居三日暹懐刺墜之於前文襄問何用此為暹竦然曰未得通公主文襄大悦把暹臂入見焉崔季舒語人曰崔暹常忿吾佞在大將軍前每言叔父合殺及其自作體佞乃體過於吾陸仲讓趙郡人也崔暹子逹拏年十三暹命儒者歡㑹教其説周易兩字乃集朝貴名流命逹拏升髙座開講仲讓陽屈服之暹喜躍用為司徒中郎鄴下為之語曰講義兩行得中郎穆提婆入侍後主朝夕左右大被親狎無所不為遂至録尚書事封城陽郡王後周劉昉昉性輕狡有姦數武帝時以功臣子入侍皇太子及宣帝即位以技佞見狎出入宫掖寵冠一時授大都督遷小御正隋蕭吉為上儀同與楊素不叶繇是擯落於世欝欝不得志見髙祖好徴祥之說欲乾没自進遂矯其迹為悦媚焉開皇十四年上書曰今年歲在甲寅十一月朔旦以辛酉為冬至來年乙卯正月朔旦以庚申為元日冬至之日即在朔旦樂斗圖徴云天元十一月朔旦冬至聖主受享祚今聖主在位居天元之首而朔旦冬至此慶一也辛酉之日即是至尊本命辛徳在景此十一月建景子酉徳在寅正月建寅為本命命與月合徳而居元朔之首此慶二也庚申之日即是行年乙徳在庚卯徳在申來年乙卯是行與歲合徳而在元旦之朝此慶三也隂陽書云年命與歲月合徳者必有福慶洪範𫝊云歲之朝月之朝日之朝主王者經書並謂三長應之者延年福吉况乃甲寅蔀首十一月陽之始朔旦冬至是聖王上元正陽之月是之謂歲之首月之先朔旦是歲之元月之朝日之先嘉辰之㑹而本命為九元之先行年為三長之首並與歲月合徳所以靈寶經云角音龍精其祚日強來歲年月納音俱角歴之與經如合符契又甲寅乙卯天地合也甲寅之年以辛酉冬至來年乙卯以甲子夏至冬至陽始郊天之日即是至尊本命此慶四也夏至陽始祀地之辰即是皇后本命此慶五也帝覽之大悦賜物五百叚雲定興初授少府丞後為左尉衛大將軍開皇末附㑹于宇文述初定興女為皇太子勇昭訓及勇廢除名配少府定興先得昭訓明珠絡帳私賂於述自是數共交遊定興每時節必有賂遺并以音樂干述述素好着奇服炫燿時人定興為製馬韀於后角上缺方三寸以露白色世輕薄之人爭倣傚之謂之許公缺勢又遇天寒定興曰入内宿衛必當耳冷述曰然乃製裌頭巾令深袙耳音陌人又學之名曰許公袙勢述大恱曰雲兄所作必能變俗作事可法信不虚也司馬徳戡㓜孤以屠豕自給有桑門釋粲通徳戡母和氏遂撫教之因解書計開皇中為侍官漸遷至大都督從楊素出討漢王諒充内營左右進止便僻俊辨多姦計素大善之袁充性好道術頗解占候由是領太史令時上將廢皇太子正窮治東宫官屬充見上雅信符應因希㫖進曰比觀𤣥象皇太子當廢帝然之裴藴為太常少卿初髙祖不好聲妓遣牛宏定樂非正聲清商及九部四舞之色皆罷遣從民至是藴揣知帝意奏括天下周齊梁陳樂家子弟皆為樂户及倡優百戱者皆直太常是后異妓滛聲皆萃樂府皆置博士弟子遞相教𫝊增益樂人至三萬餘帝大悦之册府元龜卷九百三十七
