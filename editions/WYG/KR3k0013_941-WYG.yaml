body:
  text: 册府元龜卷九百四十一宋王欽若等撰總録部殘虐酷暴殃報殘虐夫敢行暴虐商書所誡虐用其民魯史為刺稽乎前志惡莫大焉若乃含殘忍之心懐虺蜴之性或内專柄用或外負威權恣睢自任賊殺無辜聚黨蓄兵横行天下乘亂以報私忿投隙以窺大器殺人而滅口誘致以求財毁發丘墳刳斷支體以至乎害其姬妾坐及隣伍懲音律之小誤責言辭之微失置之以死不其甚歟所以人心不附軍務是離自陷刑辟終貽傾覆者良有以也盜跖魯人日殺不辜肝人之肉暴戾恣雎聚黨數千人横行天下漢項羽自立為楚王封諸王皆就國韓王成以不從無功不遣之國更封為穰侯穰南陽縣也成令張良送漢王至褒中良歸至韓聞項羽以良從漢王故不遣韓王成之國與俱東至彭城羽殺成張不疑嗣封留侯孝文五年坐與門大夫殺故楚内史當死贖為城旦門大夫候之屬官也單德封昌武侯孝武元朔三年坐傷人二旬内死棄市削戸六百王莽封新都侯既就國杜門自守其中子獲殺奴獲者莽子之名也今書本有作護字者流俗所改爾莽切責獲令自殺莽居攝翟義起兵莽發義父方進及先祖塜燒其棺槨夷滅三族誅及種嗣至皆同坑以棘五毒并葬之司威陳崇奏衍功侯光私報執金吾竇况令殺人况為收繫致其法莽大怒切責光光母曰女自眂孰與長孫中孫長孫中孫莽子宇及獲也皆為莽所殺故云然中讀曰仲遂母子自殺及况皆死初莽以事母養嫂撫兄子為名及後悖虐復以示公義焉不舍光罪為公義赦天下書曰方出軍行師敢有趨讙犯法者輒論斬毋須時趨讙謂趨走而讙譁也須待也盡歲止至此歲盡而止於是春夏斬人都市百姓震懼道路反目又翟義黨王孫慶捕得莽使太醫尚方與巧屠共刳剥之刳剖也音枯量度五藏度音徒各反以竹筳導其脉知所終始筳竹搥也音庭云可以治病後漢董卓為相國虐刑濫罰睚眦必死群僚内外莫能自固卓嘗遣軍至陽城時人㑹於社下悉令斬之駕其車重載其婦女以頭撃車轅歌呼而還及逼天子都長安卓嘗至郿行塢公卿已下祖道於横門外卓施帳幔設飲誘降北地反者數百人於坐中殺之先斷其舌次斬手足次鑿其眼目以鑊煑之未及得死偃轉柸案間㑹者戰慄亡失七箸而卓飲食自若諸將有言語蹉跌便戮於前又稍誅闗中舊族陷以叛逆時太史望氣言當有大臣戮死者卓乃使人誣衞尉張温與袁術交通遂笞温於市殺之以塞天變又中郎將牛輔卓之子壻素所親信使以兵屯陜輔分遣其校尉李傕郭汜張濟將步騎數萬擊破河南尹朱雋於中牟因掠陳留潁川諸縣殺畧男女所過無復遺類又遣將徐榮李蒙四出虜畧所得義兵士卒皆以布纒裹倒立於地熱膏灌殺之卓聞袁紹起山東乃誅紹叔父隗及宗族在京師者盡滅之獻帝春秋載太傅袁隗太僕袁基術之母兄卓使司𨽻宣璠收之母及姊妹嬰孩以上五十餘人下獄死卓别傳曰悉埋青城門外東都門内而加書焉又恐有盜取者復以屍送郿藏之李傕郭汜董卓將也及卓之死傕汜等以王允吕布殺卓皆并州人故忿怒之并州人在軍者男女數百人皆誅殺之傕又因㑹刺殺樊稠於坐傕見稠果勇而得衆心疾害之醉酒潜使外甥騎都尉胡封於坐中拉殺稠繇是諸將各相疑異傕汜遂復理兵相攻袁術初僭號以吳俊為陳相術軍衆饑因就俊求糧俊疾惡術初不應答術怒密使人殺俊晉王愷為後將軍與石崇以豪侈相尚愷嘗置酒王敦與王導俱在坐有女妓吹􅅇小失聲韻愷使毆殺之一坐改容又使美人行酒客飲不盡輒殺之孫秀初為琅邪小吏累官於趙國以諂媚自達趙王倫既簒逆秀執機衡倫素庸下無智策復受制于秀秀之威權振於朝廷天下皆事秀而無求於倫秀遂恣其姦謀多殺忠良以逞私欲司𨽻從事游顥與殷渾有隙渾誘顥奴晉興偽告顥有異志秀不詳察即收顥及襄陽中正李邁殺之厚待晉興以為已部曲督前衞尉石崇黄門郎潘岳皆與秀有嫌竝見誅於是京邑君子不樂其生矣吳畿者平陽太守宋胄所親也李矩為本郡督護胄欲以畿代之矩謝病去畿恐矩復還陰使人刺矩㑹有人救之故得免宋劉彤穆之孫也嗣南康公孝武大明四年坐刀斫妻奪爵土梁侯景仕後魏為司徒南道行臺景性猜忍好殺戮刑人或先斬手足割舌劓鼻經日方死又曾於石頭立大舂碓有犯法者擣殺之陳留異梁代為蟹浦戍主厯晉安安固二縣令侯景之亂還鄉里召募士卒東陽郡丞與異有隙引兵誅之及其妻子後魏宋鴻貴為定州平北府參軍送兵於荆州坐取兵絹四百疋兵欲告之乃斬十人又生斷其兵手以水澆之然後斬決尋坐伏法時人哀兵之苦笑鴻貴之愚北齊盧宗道行南營州刺史性麤率任俠將赴職於督亢坡大集鄉人殺牛聚㑹有一舊門生酒醉言辭之間微有疎失宗道遂令沈之於水後坐酷濫除名魏收文宣時為太子詹事娶其舅女崔氏産一女無子及魏太常劉芳孫女與中書郎崔肇師女夫家坐事帝竝賜收為妻時人比之賈充置左右夫人然無子後病甚恐身後嫡媵不平乃殺二姬及疾瘳追憶作懐離賦以申意隋于顗初仕後周為東廣州刺史尉逈之反也時總管趙文表與顗素不恊將圖之因卧閣内詐得心疾謂左右曰我見兩三人至我前者輒大驚即欲斫之不能自制也其有賔客候問者皆令去左右顗漸稱危篤文表往候之令從者至大門而止文表獨至顗所顗歘然而起抽刀斫殺之因唱言曰文表與尉逈通謀所以斬之其麾下無敢動者時高祖以尉逈未平慮顗復生􅁁患因而勞勉之唐王世充初仕隋為江都通守既叛後據東都衆心日離乃嚴法峻制家一人逃者無少長坐為戮父子兄弟夫妻許其相告而免之又令五家相保有全家叛去而隣人不覺者誅及四隣殺人相繼其逃亡益甚至於樵採之人皆有限數公私窘急皆不聊生又以宫城為大獄意有所忌即收繫其人及家屬於宫中又毎使諸將出外亦收其親屬質於宫内囚者相次不減萬口朱粲隋末僭稱楚帝聚衆二十萬軍中無所虜掠乃取嬰兒蒸而噉之因令軍士曰食之美者寧過於人肉乎但令他國有人我何所慮即勒所部有畧得婦人小兒皆烹之又稅諸城堡取小弱男女以益兵糧隋著作佐郎陸從典通事舍人顔愍楚因譴左遷合家竝為所噉粲竟斬于洛水之上士庶嫉其殘忍競投瓦礫以擊其屍須臾封之若冡薛舉為賊帥性殘忍毎殺人多斷舌割鼻或碓擣之其妻麴氏性又酷暴好鞭撻其下見人不勝痛而宛轉於地者則埋其足纔露腹背而捶之繇是人心不附薛仁杲舉之長子也多力善騎射軍中號為萬人敵然殘忍貪冐財貨初㧞秦州召富人磔於油火之上或以醯灌鼻或杙其下竅以求金寳舉毎誡之曰汝之才力辦我家事然性多猜忌與物無恩終當滅吾宗社舉死嗣立諸將以其年少心多不伏兵勢漸離以至於敗斬於長安籍没其家自起迄敗父子相繼五年而㓕高眞行為左衛將軍子岐為太子典膳丞高宗以皇太子賢陰謀事洩廢為庶人岐事連於賢帝令付眞行自訓責之岐入門而眞行以佩刀刺其喉眞行兄戸部侍郎審行又刺其腹眞行兄子琁斷其首而棄之街中帝知不悅貶眞行為睦州刺史審行為渝州刺史于敏為太常丞司空平章事頔之子憲宗元和八年敏殺人王再榮告頔與梁正言錢以謀出鎭初梁正言貪詐自擅勇於射利梁守謙方知樞密正言毎詭謂人吾與樞密宗盟分至頗得闗說頔久失職惑其言厚致財賄以圖任用其後正言之詐漸露敏責其資於市邸誘致正言僮奴支解棄於溷中㑹再榮發其事故敗樂從訓魏博節度彦貞之子也天資悖逆王鐸自滑移滄過魏郊從訓見其女妓利之伏兵於漳南高雞泊伺鐸至圍而害之畧其所有時朝廷微弱不能詰梁成汭為荆南節度使汭長子嘗有微過汭手刃之竟絶嗣焉後唐陳延嗣魏人也末帝清泰二年知鄴都留守劉延晧言汴州部送殺人賊陳延嗣至推劾伏罪與妹夫李漢唐及妹妻竝棄市初延嗣自稱父任石州刺史偽稱長史司馬與漢唐俱鮮潔車服以飲博為務所至州府視有資裝可圖者與之交游漸誘至居第陰斃之去年冬僦居於魏州有月傭同其事偶一日繼殺二人不時而死延嗣狼狽懼聲聞于外使月傭往諸處延嗣乃移家于汴所使張進者使酒詬舍主遽言延嗣殺人無幾舍主懼白坊正執訊乃稱今年四月事陳延嗣同三人取其資財所司掘屍於其室獲屍數十往汴捕獲延嗣漢唐言自居魏州所殺四十餘人竝與妻妹漢唐同謀害之又於石州捕延嗣母母至叱延嗣曰爾父殺數百人死於牖下不肖子所殺纔過百人而累家唾靣詬之安重進者雲州節度重霸之弟也性尤凶惡事莊宗以試劎殺人奔淮南初重霸在蜀聞之蜀主取之於吳用為裨將隨重霸為龍武小將戍長道又以殺人奔歸雒陽漢蘇逢吉為司空平章事逢吉深文好殺初從高祖在太原時嘗因事高祖命逢吉静獄以祈福祐逢吉盡殺禁囚以報及執朝政尤愛刑戮朝廷患諸處賊盜遣使捕逐逢吉自草詔意云應有賊盜其本家及四隣同保人竝仰所在全族處斬或謂逢吉曰為盜者族誅猶非王法隣保同罪不亦甚乎逢吉堅以為是竟去全族二字時有鄆州捕賊使臣張令柔者殺平陰縣十七村民良繇此也周趙鳳冀州棗彊縣人幼讀書舉童子既長遇亂兇豪多力以殺人暴掠為事吏不能禁後為冀州刺史酷暴詩著北風之章刺衞國之竝為虐也禮有泰山之哭痛苛政之猛於虎也故刑政之失危亡攸繫而况樂於殺人以苛為察逞威則膏血横流視民曾土芥不若徒使側目而視重足而立且何補於風化哉及其凶慝貫盈自貽誅戮豈為不幸者耶漢寗成南陽穰人也以郎謁者事景帝好氣為小吏必陵其長吏為人上操下急如束溼操執持也束溼言其急之甚也溼物則易束操千高反猾賊任威後漢周䊸為人刻削少恩好韓非之術少為廷尉史魏常林文帝時為少府性既清白當官又嚴少府寺與鴻臚對門時崔林為鴻臚崔性闊達不與林同數數聞林撾吏聲不以為可林夜撾吏不勝痛呌呼嗸嗸徹曙明日崔出門與林車相遇乃啁林曰聞卿為廷尉爾耶林不覺答曰不也崔曰卿不為廷尉昨夜何故考囚乎林大慙然不能自止王思為大司農年老目瞑瞋怒無度下吏嗷然不知所據性少信時有吏父病篤近在外舍自白求假思疑其不實發怒曰世有思婦病母者豈此謂乎遂不與假吏父明日死無恨意其為刻薄類如此時苗鉅鹿人為大官令領郡中正定九品於叙人才不能寛然紀人之短雖在久逺銜之不置晉王宏為衞尉大司農更為苛碎坐桎梏罪人以泥墨塗靣置深坑中餓不與食又擅縱五歲刑以下二十一人為有司所劾帝以宏累有政績聽以贖論宋奚顯度東海剡人也官至員外散騎郎孝武嘗使主領人工而苛虐無道動加捶撲暑雨寒雪不聽蹔休人不堪命或有自經死者役人聞配顯度如就刑戮時建康縣考囚或用萬丈壓額及踝脛民間謡曰寧得建康壓額不能受奚度栢又相戲曰勿反顧付奚度其酷暴如此谷楷為奉車都尉眇一目而性甚嚴忍前後舉使皆以酷暴為名時人號曰瞎虎劉仁之為著作郎兼中書令出為西兖州刺史仁之性酷虐在晉陽曾營城雉仁之統監作役以小稽緩遂加責罰性好文字走書失體便加鞭撻音韻微訛亦見捶楚吏人苦之北齊畢義雲為兵部尚書義雲酷暴殘忍非人理所及為家尤甚妻子僕𨽻嘗瘡痍遍體隋崔宏度仁壽中檢校太府卿毎誡其察吏曰人當誠恕無得欺誑皆曰諾後嘗食鼈侍者八九人宏度一一問之曰鼈美乎人懼之皆云鼈美宏度於是大罵曰傭奴何敢誑我汝初未食鼈安知其美俱杖之八十官屬百工見之莫不流汗無敢欺隐時有屈突蓋為武候驃騎亦嚴刻長安為之語曰寧飲三斗醋不見崔宏度寧茹三斗艾不逢屈突蓋元宏嗣仁壽末授木工監修營東都大業初煬帝濳有取遼東之意遣宏嗣往東萊海口監造船諸州丁役苦其捶楚官人督役晝夜立於水中略不敢息自腰以下無不生蛆死者十三四唐宇文穎高祖武德中為司農卿政好嚴猛僚吏皆重足而立王遂高宗朝宰相王方慶之孫也以吏能聞於時銳於操下法頗嚴酷官終沂兖海等州觀察使漢劉銖陜州人也晉天福中高祖為侍衛親軍都指揮使與銖有舊表為内職高祖出鎮并門用為左都押衙銖性慘毒好殺高祖以為勇斷類已深委遇之周陶文舉為起居郎世宗顯德二年五月齊州臨邑縣民田失額命刑部員外郎陳渥按之尚有隐漏復命文舉撿之文舉酷吏也竭澤而取之是歲冬十月文舉復奉命徵殘租於宋州宋人被其刑者凡數千寃號之聲聞於道路有一媪所欠殘租十錢而已聞文舉法峻即日納之執其公文呈於文舉文舉怒曰爾何不早納之而勞我此來也亦撻之時有悼耄之軰不勝其刑而死者數人其後數月文舉因隨駕南征尋遇疾而卒時人以為陰責之事有徵矣殃報殃咎之積報應之來蓋物理之昭然亦神道之不爽若乃無辜被祻懐耻未雪蓄怨攸重居幽必報斯乃寃氣之所結營魂之不昧者矣若夫苛枉自恣誅殺以逞徒宴安而滿志亦凶釁之何逃漸若霜冰隨如影響乃有慿以他類見乎厥夢或恍惚而搆癘或因縁而為祟精爽攸寄變異非一繇是大者以至覆族小者不免滅身亦有假手於人自斃於法觸類而長不可徧舉斯蓋默定于上昭示于下以鑒戒於方來者焉書曰作不善降之百殃誠哉是言矣伯有為鄭大夫使公孫黑如楚黑子晳黑辭伯有將彊使之子晳怒以駟氏之甲伐之伯有奔許伯有自墓門之瀆入墓門鄭城門因馬師頡介于襄庫以伐舊北門駟帶率國人以伐之伯有死於羊肆羊肆市列後鄭人相驚以伯有曰伯有至矣則皆走不知所往襄三十年鄭人殺伯有言其鬼至鑄刑書之歲二月昭公六年或夢伯有介而行介甲也曰壬子余將殺帶也駟帶助子晳殺伯有壬子昭公六年二月三日也明年壬寅余又將殺叚也公孫叚豐氏黨壬寅昭公七年正月二十八日及壬子駟帶卒國人益懼壬寅公孫叚卒國人愈懼子産立良止以撫之乃止良止伯有子也立以為大夫使有宗廟漢田蚡為丞相既殺魏其侯竇嬰及灌夫明年春蚡疾一身盡痛若有擊者謼服謝罪服音瓝闗西俗謂得杖而呼為瓝謼火交反瓝平卓反武帝使視鬼者瞻之曰魏其侯與灌夫共守笞欲殺之竟死後漢蘇不韋金城太守謙之子謙為司𨽻校尉李暠掠死獄中不韋復讎於暠殺其兒妾發其父冢武威叚紀明與暠素善紀明既為司𨽻以禮辟不韋不韋懼之稱病不詣段追咎不韋前報暠事遣從事張賢就家殺之并其一門六十餘人盡誅滅之諸蘇以是衰破及紀明為楊球所誅天下以為蘇氏之報焉魏胡种為司𨽻校尉與王宏有隙宏下獄种遂迫促殺之宏臨命詬曰胡种樂人之祻祻將及之种後眠輒見宏以杖撃之因發病數日死胡軫為司𨽻校尉與功曹游殷有隙軫誣搆殺殷殷死月餘軫得疾患自說但言伏罪游功曹將鬼來於是遂死於時闗中稱曰生有知人之明死有貴神之靈吳于吉者道士也既為孫䇿所殺策毎獨坐彷彿見吉在左右意深惡之頗有失常後治創方差而引鏡自炤見吉在鏡中顧而弗見如是再三因撲鏡大呌創皆潰裂須臾而死孫峻為武衛將軍既誅諸葛恪遷丞相大將軍後夢為恪所擊恐懼發病死程普為盪寇將軍殺叛者數百人皆使投火普即時病癘百日而卒晉阮放字思度為交州刺史行達寧浦逢陶侃將高寶平梁碩自交州還放設饌請寶伏兵殺之寶衆擊放敗走保簡陽城得免放到州少時暴發渴見寶為祟遂卒羊􅆅為廬陵太守坐殺郡人簡良等二百餘人除名頃之遇疾嘗見簡良等為祟旬日而死桓温為大將軍拜高平陵左右覺其有異既登車謂從者曰先帝向遂靈見既不述帝所言故衆莫之知但見將拜時頻言臣不敢而已又問左右殷涓形狀答者言肥短温云向亦見在帝側初殷涓既為温所廢死涓頗有氣尚遂不詣温而與武陵王晞游故温疑而害之竟不識也及是亦見涓為祟因而遇疾凡停京師十有四日歸于姑孰遂寢疾不起趙染為前趙劉聰平西將軍次新豐㑹晉將索綝自長安討染染有輕綝之色長史魯徽諌不聽敗績而歸悔曰吾不用徽言何面見之於是斬徽徽臨刑謂染曰死者無知則已若其有知當訴將軍使不得服牀枕而死後染寇北地夢徽大怒引弓射之染驚悸而寤旦將攻城中弩而死尹興為後凉吕光丘池令時張掖督郵傅曜考覈屬縣而興殺之投諸空井曜見夢于呂光曰臣張掖郡小吏案核諸縣而丘池令尹興贓狀狼藉懼臣言之殺臣投于南亭空井中臣衣服形狀如是光寤而猶見久之乃滅遣使覆之如夢光怒殺興宋殷景仁為護軍太祖以景仁計誅劉湛拜景仁揚州刺史遣使者授印綬主簿代拜拜畢便覺其情理乖錯性本寛厚而忽更苛暴問左右曰今年男婚多女嫁多是冬大雪景仁乘輿出聽事觀望忽驚曰當閣何得有大樹既而曰我誤耶疾轉篤太祖謂不利在州司使還住僕射下省為州凡月餘卒或云見劉湛為祟劉季之為司州刺史在州貪殘司馬翟宏業諫争甚苦季之積忿置毒藥食中殺之季之少年時與宗慤蒱戲曾手侮加慤慤深銜恨至是慤為豫州刺史都督司州季之慮慤為祻乃委官間道欲歸朝廷㑹竟陵王誕反季之至旴􅇇太守鄭瑗以季之素為誕所遇疑其同逆因邀道殺之後瑗為山陽王休祜驃騎中兵參軍豫州刺史殷琰與晉安王子勛同逆休祜遣瑗及左右邢龍符說琰琰不受鄭氏壽陽强族琰即使瑗鎭軍子勛責琰舉兵遲晚琰欲自解釋乃殺龍符送首瑗固爭不能得及壽陽城降瑗隨輦同出龍符兄僧慜時在城外謂瑗構殺龍符輒殺之瑗即為劉勔所録後見原僧慜尋擊虜於淮西戰死此四人者竝繇横殺旋受身禍論者以為有天道焉檀和之為交州刺史伐林邑國破其北界犬戎區粟城獲金寶無筭毁其金人得黄金數十萬斤餘物稱是和之後病死見胡神為祟南齊豫章王嶷薨後忽見形於沈文季曰我未應便死皇太子加膏中十一種藥使我癰不差湯中復加藥一種使痢不斷吾已訴先帝帝許還東邸當判此事因胷中出青紙文書示文季曰與卿少舊因卿呈上俄失所在文季祕而不傳甚懼此事少時太子薨莫智明為明帝左右帝遣智明數蕭諶罪賜死諶謂智明曰天去人亦復不逺我為中領軍與至尊殺高武諸王是君傳語來去我今死還取卿於省殺之未幾智明死見諶為祟蕭季敞為輔國將軍時太子左率領軍蕭詠及兄左衞將軍諶同被誅季敞啓求收詠深加排苦乃至手相摧辱詠徐曰已死之人何足至此君不憶相提拔時耶幽冥有知終當相報季敞麤猛無行善於彌縫高帝時為詠諶所奬說故累為郡守在政貪穢諶輒掩之後為廣州刺史白日見詠將兵入城收之數日果為西江都護周世雄所襲軍敗奔山中為蛭所齧肉都盡而死慘楚備至後為村人所斬論者以為有天道焉梁沈約為尚書左僕射因病夢齊和帝劒斷其舌召巫視之巫言如夢乃呼道士奏赤章於天稱禪代之事不繇已出高祖聞之大怒遣使者譴責之約懼而卒後魏南安王楨孝文時為相州刺史以旱祈雨于群神鄴城有石虎廟人奉祀之楨告虎神像云三日不雨當加鞭罰請雨不驗遂鞭像一百是月疽發背薨元壽興襲常山王素之孫孝文時為中庶子時王顯在東宫賤壽興因公事杖之四十及顯有寵於宣武為御史中尉奏壽興誹謗顯因帝極飲無所覺悟遂奏其事命帝注可直付壽興賜死壽興臨刑顧謂其子曰我棺中可著百紙筆兩枝吾欲訟顯於地下若高祖之靈有知百日内必取顯如遂無知亦何足戀及孝明即位顯尋被殺壽興之死時論亦以為前任中尉彈高讒諷所致高肇宣武時為尚書令譖殺彭城王勰勰妃司空李冲之女號哭大言曰高肇枉理殺人天道有靈汝還當惡死及肇以罪見殺論者知有報應焉崔浩為司徒浩非毁佛法而妻郭氏敬好釋典時時讀誦浩怒取而焚之捐灰於厠中及浩幽執置之檻内送於城南使衛士數十人溲其上呼聲嗷嗷聞于行路自宰司之被戮辱未有如浩者世皆以為報應之驗初浩搆害李順基萌已成夜夢秉火爇順寢室火作而順死浩與室家羣立而觀之俄而順弟息號哭而出曰此軰吾賊也以戈擊之悉投于河寤而惡之以告館客馮景仁景仁曰此眞不善也非復虚事夫以火爇人暴之極也階亂兆禍復之招也商書曰惡之易也如火之燎於原不可向邇其猶可撲滅乎且兆始惡者有終殃積不善者無餘慶厲階成矣公其圖之浩曰吾方思之而不能悛以至於族李彪為御史中丞號為嚴酷以㚥疑難得乃為木手擊其脇腋氣絶而復屬者時時有焉又慰諭汾州叛胡得其土渠皆鞭而殺之及彪之病體上往往瘡潰痛毒備極張始均為行臺郎中從都督元遥討大乘賊於冀瀛之間多所殺戮積屍數萬始均忿軍士重以首級為功乃令撿集人首數千一時焚爇至於灰燼用息僥倖見者莫不傷心及始均之死始未在於煙炭之間有燋爛之痛論者或亦推咎焉韋伯昕為員外散騎常侍宣武延昌末告尚書裴植謀為廢黜植坐死後百餘日伯昕亦病卒臨亡見植為祟口云裴尚書死不獨見繇何以見怒也于忠為車騎大將軍時高陽王雍省決庶政僕射郭祚尚書裴植以忠權勢日盛勸雍出忠忠聞之逼有司誣奏其罪祚有師傅舊恩植擁地入國忠竝矯詔殺之忠疾病見裴郭為祟而卒侯莫陳悅為隴右都督時大都督拔嶽召悅共討靈州悅用其參軍豆盧光之謀誘嶽斬之悅自殺嶽後神情恍惚不復如常唯言我僅睡即夢見嶽語我兄欲何處去隨逐我不相置因此彌不安而致敗滅北齊高隆之為驃騎大將軍見信高祖性多陰毒睚眦之忿無不報焉儀同三司崔孝芬以結婚姻不果太府卿任集同加營搆頗相乖異瀛州刺史元晏請託不遂前後搆成其罪竝誅其後隆之被害家門殄滅論者謂有報應焉韓賢為雒州刺史初後漢明帝時西域以白馬負佛經送雒因立白馬寺其經函傳在此寺形制厚朴世以為古物厯代藏寶賢無故斫破之未幾州民韓木蘭等作逆有一賊斫賢折脛而卒論者或謂賢因此致禍隋梁敬眞大業中為大司理司直時煬帝欲成光禄大夫魚俱羅之罪令敬眞治其獄遂希旨陷之極刑未幾敬眞有疾見俱羅為之厲數日而死于時東都饑饉俱羅遣家僕般米至東都糶之益市財貨濳迎諸子朝廷微知之恐其有異志前後察問不得其罪帝復令敬眞就鎻將詣東都俱羅相表異人目有重瞳陰為帝之所忌敬眞希旨奏俱羅師徒敗衂于是斬東都市家口籍没劉蘭為國子助教嘗排毁公羊氏非董仲舒延昌中静坐讀書有人叩門門人通焉蘭命引入其人葛巾單衣入與蘭坐謂蘭曰君自是學士何為毎見毁辱理義長短竟知在誰而過無禮見陵也今欲相召當與君正之言終而出出後蘭告家人少時而患卒奚康生為相州刺史在州以天旱令人鞭石虎畵像復就西門豹祠祈雨不獲令吏取豹舌未幾二兒暴喪身亦遇疾巫以為虎豹之祟樊子鵠出帝時為御史中尉㑹宗室元樹奔梁梁武以為郢州刺史子鵠為行臺率徐州刺史杜德舍人李昭等討之樹城守不下子鵠使金紫光禄大夫張安期說之樹請棄城還南子鵠許之殺白馬為盟樹恃誓不為戰備與杜德别還南德不許送雒陽置在景明寺樹年十五奔南未及富貴毎見嵩山雲向南未嘗不引領􅒣欷初發梁都其愛妹玉兒以金指環與樹嘗著之寄以還梁表必還之意朝廷知之俄而賜死未幾杜德忽得狂病云元樹打我不已至死此驚不絶舍人李昭尋奉使向秦州至潼闗驛夜夢樹云我已訴天帝待卿至隴終不相放昭覺惡之及至隴口為賀拔嶽所殺子鵠尋為達野拔所殺樊子蓋為東都留守楊𤣥感之亂子蓋誅數萬人嚴酷少恩果於殺戮臨終之日見斷頭之鬼前後重沓為之厲唐郭霸則天天授二年自宋州寧陵丞應革命舉拜監察御史嘗推芳州刺史李思徵搒捶考禁不勝而卒聖厯中屢見思徵甚惡之嘗因退朝歸命家人曰速請僧傳經設齋須臾見思徵從數十騎止其庭曰汝枉陷我我今取汝霸周章惶怖援刀自刳其腹斯須蛆爛矣是日閭里竝見兵馬數十騎駐于門少頃不復見矣崔器以肅宗至德中為御史中丞性苛刻樂禍奏陷賊官據律合處死後器病脚腫月餘漸亟瞑目則見京兆尹達奚珣但口稱叩頭大尹不自繇左右問之良久答曰達奚大尹訴寃我求之如此經三日不止而死陳曇德宗貞元中為邕州經畧招討使怒判官劉湲杖二十五湲卒之日曇得疾見湲為祟而卒舒元輿為監察御史時毫州境嘗有羣賊剽人廬舍刼取貨財累致擒捕不獲刺史李繁濳設機謀悉知賊之巢穴出兵盡加誅斬議責繁以不先啓聞廉使涉於擅興之罪朝廷遣元輿覆理之元輿素與繁有隙復以初官銳於生事乃盡反其獄辭以為繁濫殺無辜狀奏勑於京兆府賜死時人寃之其後元輿被禍人以為有報應焉後唐西方鄴為寧江軍節度使為政貪虐判官譚善達毎箴其失鄴忿形於色令左右告善達受人金下獄拷掠善達亦剛詞多不遜遂殺於獄中無幾寢疾時見善達入其戸俄卒於治所晉馬全節為定州節度使自上黨攜歌妓一人之中山館於外有人以讒言中之全節加害及詔除鎮州遇病數見其妓厭之復來妓曰我已得訴要公俱行全節具告家人數日而卒漢蘇逢吉自高祖建號於太原以節度判官拜平章事時宰相李崧被誅人士寃之及逢吉受宣權知樞密院事數夕宿於金祥殿之東謂春官正王處訥曰夜來就枕未瞑已見李崧在傍生人與死人相接非吉事也及周太祖自鄴至汴官軍敗於劉子陂是夕逢吉宿於七里郊與同舍痛飲醉索刃將自剄左右止之至曙與隱帝同抵民舍遂自殺周太祖定京城與聶文進等同梟於北市釋其家族其梟首之所適當李崧寃死之地也周鄭仁誨為侍中初廣順末王殷受詔赴闕太祖遣仁誨赴鄴都廵撿及殷得罪仁誨不奉詔即殺其子蓋利其家財妓樂也及仁誨卒而無後人以為陰責焉册府元龜卷九百四十一
