body:
  text: 册府元龜卷四百七十五宋王欽若等撰臺省部奏議第六後唐盧文紀為吏部侍郎天成元年十月丙戌奏一人御宇百職交修則四時無水旱之災萬國有樂康之詠頃屬中原多事三紀不寧廉平因此而蔑聞賞罸繇兹而失序所以梟鸞並起駘驥難分有援助者至濫必容守孤貞者雖賢莫逹遂使居官僶俛奉職因循惟思避事以偷安罔效輔時而濟物伏惟皇帝陛下削平九有收復八紘承乾興萬代之基出震應千年之運櫛沐風雨手足胼胝勤勞大集於聖功華夏畢歸於睿略雖逺柔邇伏咸知臨照之鴻恩而旰食宵衣尚念生靈之久困累頒絲綍典訪芻蕘恐天災之流行因皇風之壅隔臣不揆庸短輒冐宸聰臣請告諭内外文武臣僚凡守一官責其舉職公清奉上勤恪為心每嵗秋冬明定考較將相則希回御筆班行則悉委司存外則州牧縣寮具以真虚比較儻聞共推異績便宜特示甄酬如其衆謂曠官固可明行黜責所冀免懐竊位俱効竭誠上則輔佐於大君下則專精於庶務髙卑不濫功過無私官旣清廉則民無愁嘆勸課之方得所則生靈之賦樂輸故可以進賢良退不肖安生聚寔倉箱使和氣逺孚徳澤廣被顧惟穹昊必降休祥永致太平竚期混一臣叨逢明聖謬列班行既奉徳音合申所見疏下中書宰臣奏曰盧文紀踐履清華昭彰聞望行已每聞於端慤操心動絶於阿私以為將聳効官莫先較考欲明書於殿最冀顯示於勸懲况將相兩途尤為重委慮無報國最要聞天欲迂宸毫親書常課誠有塵於聖徳亦是責以佐君直道不欺忠規可尚至於所陳黜陟並叶規繩以此責成庶求良吏事無疑礙理可施行從之李光憲為右散騎常侍天成元年十月乙巳明宗御中興殿光憲奏將垂帝範在守於舊章欲叙彛倫合循於故典實大朝之理本蓋有國之常規臣嘗覧列聖實録伏見建中元年正月五日勅㫖應内外常叅官上後三日舉一人自代者編諸簡册冀拔賢良是資教化之方以盛簮裾之列爰于近嵗稍易舊規臣請明下敕文許行建中故事所兾簮纓在位咸懐舉善之心棫樸興歌漸致得賢之美疏奏不報張鑄為起居舍人天成元年十月庚戌奏欽若天道聞諸堯舜之朝敬授人時乃自殷周之代能消災異而致福祥自兵興以來多失本朝故事不拘典法有誤修禳承前日月薄蝕百官皆合守司星象有差九重亦當避殿以明減損式示恭䖍信守國經何虧聖徳自此或乾象謫見凡闗災異請依故實令百官守司陛下御便殿常膳准令式遵行從之蕭希甫為佐諫議大夫知匭院天成元年十一月戊午奏臣切蒙擢任官忝諫司所職重難兼知匭院但有關於至理即欲合於無私兾竭丹誠仰禆元造臣伏見自同光元年十月九日先朝收下汴州後至今年四月一日已前兵革盛興亂離斯極典章㡬壊刑政莫施每於紛擾之間甚有殺傷之苦非惟州縣長吏或濫誅夷直至鄉里居民互為殘戮挾私怨公者公行白刃將快忿心怙强恃力者豈聞丹書惟欣得志掠妻女以轉賣刧財貨以平分如此之流應遍天下伏惟皇帝陛下薦恢帝載光啓鴻圖伏思自陞下臨御以來皇綱漸正有功者盡賞有罪者咸誅閫外將清朝中無事今則匭函已再修整欲具進呈必恐擡出外邊施行已後逺近披訴受状至多但慮京國諸司囚禁便憂填委則至上虧皇化有玷國風其次更慮勲貴親賢或闗對訟便煩讞議有礙刑書若今事有臧否即便政移曲直以臣愚見欲自元年四月二十八日昧爽以前罪無輕重應大辟以下請一切釋而不問庻得刑清俗泰國富民康咸欽不宰之功永奉維新之化勅㫖喪亂之際不可以法行致理之初漸宜於刑措蕭希甫官居諫省職本匭函慮黎民年有讐嫌致法寺愈煩讞議特塞紛争之路請申昧爽之朝言出忠誠事關理本載許論奏合議施行宜自天成元年四月二十八日已前罪無輕重一切不問其間已經勘窮推鞫者須見罪狀其餘即依所奏裴皥為禮部侍郎天成元年十一月戊辰奏方伯郡守之任與天朝分理疆土共養黎民委寄非輕古今所重親人之職莫過於斯伏請起今後諸州刺史經三考方可替移使能理者盡展所能弊政者自彰其濫優劣既判黜陟可行則州縣免迎新送故之勞朝廷得惠養除煩之理太平之道無易於斯勅㫖有政聲者就加恩澤弊政者不限考課替移劉岳為吏部侍郎天成元年十一月甲戌奏凡在立朝悉是為臣之貴每蒙進秩咸知報上之忠奉勅命以遷昇固當感忭降綸言而褒飾或未捧觀將使知寵陟之繇認訓誥之旨必在各頒官誥令覩制詞處列班以増光傳子孫而永耀伏請自此凡有除轉登朝官已上召至閣門宣賜在外則付本州使賜之勅旨朝官素有品秩不可一例頒宣文班三品已上丞郎給舍諫議武班大將軍已上宜賜官誥舊例吏部出告身納朱膠紙軸錢方給朝臣或親舊者隨即給付而官貧不辦者但領勑牒而已䘮亂之後因以為常朝臣多不出告身制下之後中書但收其制詞編為勅甲本官多不見奨飾之詞故岳有是奏勑㫖不編頒得事體也其後執政相與謀罷朱膠紙軸之例以為天下吏員無多除拜亦簡官給膠軸之費嵗不過數萬國既賜以爵位而邀其膠紙之直是巨細不相稱也因奏覆凡中外官除拜並宣賜官誥然執政之議雖善蓋令其始不科其終何者同光世至天成初官爵之命止于除授中外正員官其餘試陶貼號則寵激軍中將較而已自長興已來除授日多上至軍中卒伍下迨州使鎮戍疇昔書吏之流皆有銀青言憲之號每嵗給賜告身動盈數萬非獨尺紙之費虚銷財力而又常賜之道難以勸功以臣料終則知執政圖治之非善也作事謀始凡執政者慎圗之楊凝式為給事中天成元年十二月庚寅奏舊制臺省在西京東都置留臺留省及分司官屬請依舊制於西京置留臺省如本朝東都之制不報是月庚戌御史臺奏京城坊市士庻工商之家有婢僕自經投井非理物故者近年已來凡是死亡皆是臺司左右廵舉勘簡騐施行已久仍恐所差人吏及街市猾卒同於民家因事邀頡取索臣詢訪故事當司今有舊京徃例凡京城臣庻之家死䘮委府縣簡舉軍家委軍廵商旅委戸部然諸司簡舉後具事繇申臺其間或枉濫情故臺司訪聞即行舉勘如是文武兩班官吏之家即是臺司簡舉臣自今已後欲准故事以施行者兼左右廵使録到䘮𦵏車輿格例比縁官品等差無官秩之家過為僣侈供應者固當刑責今則凡是葬儀動逾勅格但官中祗行簡察在人情各盡孝思狥彼稱家之心許便送終之禮又難將孝子盡决嚴刑遂以供人例行書罸以助本司攴費兼緣設此防禁比為權豪違禮厚葬若貧民薄歛不充無憂替禮書罸兩京即是臺司州府元無條例者勅㫖今後兩班文武及諸司官吏諸道商旅凡有䘮亡即准臺司所奏施行其坊市民庶軍士之家凡有喪亡及婢僕非理物故依臺司奏委府縣軍廵同簡舉仍不得縱其吏卒於物故之家妄有邀頡或恐暑月死柩難停若待申聞簡舉縱無邀頡亦須經時日今後仰其家喚四隣簡察無他故遂使埋葬具結罪文狀報官或後别聞枉濫妄有保證官中訪知勘結不實本戸隣保量事科罪如聞諸道州府坊市死䘮取分廵院簡舉頗致淹停人多流怨亦仰約京城事例處分所奏䘮𦵏車輿格例今後據品秩之外如庶人䘮葬宜令御史臺差御史一員㸃簡其賃行人如有違越據所犯科罪臺司不得書罸徵擾行人交非憲綱事體曹琛天成中為右拾遺上疏請百寮朔望入閣及五日内殿起居請許三署寺監輪次轉對奏事從之李同為左拾遺天成二年正月奏三尺之法天下共之法一動揺民無所措是知愛育黎庻信及豚魚既禮樂之中興在刑罸之必中陛下初當治亂合肅化條請處分天下州使繫囚逐旬咨長史親自引慮使知罪真虛然後論之以法則獄無寃滯政治和平李光緯為右拾遺天成二年三月奏自本朝應運以來陛下登極之後有赤心事主勠力勤王或代著軍功身已淪沒者乞褒崇官爵延賞子孫庻張開國之榮永保承家之慶兼内外重臣以下班行請許追封以彰孝道雖九泉之幽暗亦荷明時庶百辟之忠良同扶聖代封翹為給事中天成二年四月戊子上言曰臣聞立愛惟親教民以睦實天朝之重事乃有國之通規是知維城為固本之資磐石作安宗之計所以興隆鴻業保定皇家伏惟陛下天祚丕基日新聖徳使九功之咸叙致百度以維貞墜典皆修遺文必舉獨於封建未覩宣行既尚抑於龍樓宜且遵於麟趾乞命親賢以資夾輔周知微為吏部員外郎天成二年四月戊子上言竊覩近勅慮有官吏割剝下人許百姓陳告民之愚下罔認宸𠂻或捃摭纎微或受人驅駕事多憑虚適足為亂有過者固合當辜誣罔者請議刑憲庶或知止免凟風化從之李鏻為戸部尚書天成二年六月乙未上言請朝班自四品以上官各許薦令録兩人五品六品官許薦簿尉兩人使廉慎能名者同受爵賞貪婪害物者並坐刑書各舉所知不蔽賢路奉勅興國之方養民為本衣不可一嵗不製食不可一日不充其或桑柘少而望衣充耒耜閒而求食足雖千堯萬舜聖知神功不能致也然則樹踈禽少山廣獸多百川淺則海不深萬姓貧而國不富富庶之要根源可知故王者深居九重奄有四海不可家至而日見只在徳盛而教尊千載一時古猶今也李鏻情專奉上務在任人藉官吏當才為國朝布化實以知人則哲惟帝其難肯舉者可嘉堪舉者可重必須愛而知其惡憎而知其善内舉不避親外舉不避讐凡事無私何憂不理李鏻所奏宜即施行其所舉人仍於官告内顯𨽻所舉姓名赴任之後臨事可觀或有不公當累舉主兼三品已上有舊諳行止堪充節度觀察兩使判官者亦各據才業上聞即當委任庶朝廷立制長施勸善之恩臣下推公永絶蔽賢之路符蒙為右拾遺天成二年六月辛丑奏以五日轉對無獻替之風虚瀆聖聰請罷之梁文矩為左諌議大夫天成二年七月上言以軍人百姓服装僣越為費耗之本請下令禁止鄭韜光為給事中天成二年八月庚辰上言以諸縣力役人户多為州使影占或臺省投名惟貧民客户在縣應役例有不均之歎且多僥倖之流請議禁止孔邈為吏部郎中天成二年八月庚辰上言曰臣聞賞延於世實皇王體國之規立身揚名為人子承家之道茍推誠於忠孝必懐慶於子孫存沒共瞻君親是望伏自陛下中興大業念舊録勲賞賜無時渥恩咸徧尚慮有奮身為國跡隕魂孤姓名不逹於乾坤骨肉飢寒於道路不因詔書博訪所在不與申聞伏乞特下外藩如有身殞王事忠節顯彰軍伍備聞恩澤未及者必令具録聞奏如有子孫便委所司齒録使父母有可依之地妻孥免無告之心如祗有孤遺亦便令救卹即已徃者知皇恩不棄將來者罄臣節何疑楚師忘寒空憑念問周文葬骨唯示深仁兾於有道之朝不漏無垠之澤上先是已行詔命及覽是奏促再行之姚顗為左散騎常侍天成二年九月上言伏以運當昭㤗時屬豐成金鸞已議於省方綵仗將離於上國沿路供億固有舊規况聞詔㫖丁寕不許分外科率所在藩侯郡守竭力推忠奉迎頒備於貢輸徵歛或及於黎庶伏望更加示諭免至煩勞使四海九州遐邇共聞於聖徳千乘萬騎經過不擾於疲民俾諧望幸之心以顯來蘇之義王騫為刑部郎中天成二年十月上言請准建中舊勅文武叅官及刺史上後三日舉人自代十一月吏部侍郎劉岳上言曰伏以有國命官立朝釐務必資詳諫以集事功竊見諸色詞科多昇通籍向者先為列藩從事叅佐可稱次經三舘職名編修是著方居華秩始在彤逵近或雖有兩任前銜未歴一司公事莫申勞績虚謂滯淹未若委以親人俾之及物粗聞善最然議陟遷免自難於漂流復有名於選仕伏乞特加捜採廣察單平白身者授以佐僚歴官者處之縣令嵗月俟當於制限班資擢在於朝行理契毓材事惟責實盧咸雍為起居郎天成二年十二月上言以賊㓂宵行逼脅村舍俾供食宿及當敗露指引行程追禁經時慮妨農作望頒明勅俾得踈治從之王為左拾遺天成三年二月上言曰伏覩州縣百姓早因危嵗小㓂連綿舊染成非習性難改逃刑網外作患民間起晝藏夜出之謀懐念惡堕農之志惟觀得失但聴災危不慮嚴章當孤美化法緩則濳蔵軍旅法急則流散藩方條令難加網羅莫及是非同等曲直相叅伏乞顯示軍門無招此輩永去未萌之咎當平不力之民從之三月己巳給事中封翹上言曰天地之經隂陽之數莫不上規帝道旁體物情儻國人偶有其咨嗟則時令必為之差忒如陛下英明御宇勤儉臨朝推泣辜罪已之心行解網納隍之道無偏無黨憲章不濫於雷霆克寛克仁霈澤常均於雨露致君已及於堯舜勃興尋並於禹湯則合災星退於三移瑞日呈於五色焉有自冬徹臘啟嵗經春隂雲多蔽於長空滯雨頻霑於連日豈是未臻聖政不降靈休既難喻於𤣥穹湏更増於隆徳伏乞稍留聖念明下所司俾郊壇祠祭之儀簠簋馨香之料尤加精潔倍致敬恭罪非刼殺旋令疎放亡殁卿士希加賻贈農桑藉力之時務蠲大役禽鳥營巢之際禁斷網羅恭祈十雨五風以卜千秋萬歲詔付所司詳酌施行崔居儉為尚書左丞天成三年五月請於西京置分司官六月戊子散騎常侍蕭希甫奏以府州官吏不務守官咸思避事毎覩微小刑獄皆以聞奏不惟有紊朝綱實恐淹延刑獄奉勅昔虞舜以恤刑安萬國賴十六相熈帝圖漢髙以約法定八方致四百年享天禄故法無常則官有倖刑不濫則民無寃千古同風百王齊致况今朝廷致理中外同心近者無偏逺者不間慮於聽訟或有惠姦其頻具奏聞所在不勤决斷則諸道侯伯未至盡心兩使賓僚亦非稱職蕭希甫位兼三事務賛萬㡬更激藩方共禆庶政自此凡有争訟委隨處官吏據罪詳㫁如事有不可裁斷者則結案聞奏吕夢舒為諌議大夫天成三年七月上言近制令州使判官逐司引問獄囚恐屢變其情狀請便案成慮之奉勅宜依趙熈為起居郎天成三年八月戊寅上言曰伏自陛下乘乾之後纉聖以來從諫如流求賢不倦遂令五日之内一度敷􅆒百辟之間咸陳管見伏覩武班朝士皆大國賢臣或繼委藩任或盡知民瘼或乆諳師旅深知兵機或將相子孫或􅆛貅列士或衘命每推於專對或臨戎嘗立於殊功藴器業而不敢自陳有籌畫而無繇上奏方今蒸黎尚困兵革未銷儻一言仰合於天心一事有資於軍志可禆睿算便致小康抱材能者無愧於朝廷懐義勇者何慙於休運伏望令兩班更互奏對崔税為右補闕天成三年八月己亥上言曰昔漢宣帝纉紹皇圖勤恤民隠慎擇循良之吏分居牧守之權其有政合廉平惠敷疲瘵小則降璽書而勞問大則錫侯爵以甄酬欲教化之久行故遷移之不遽伏惟陛下粃糠大漢回復皇唐整百王隳紊之綱削四紀傷夷之弊永言致治實在審官刺史縣令有能撫綏不必循拘考限明加奬激就進階資如有課最漸髙始終不易量其器業擢在朝廷自然有位之人咸思職分無為而治坐致時雍疏奏不報後為比部員外閏八月癸卯朔散騎常侍蕭希甫上言曰臣聞天地助順神理福謙既物性之得宜何靈心之致誤伏惟陛下自統臨四海勤恤萬方每崇恭儉之風常布仁慈之徳即合隂陽無爽災𤯝不生百榖豐盈五兵息偃今乃川瀆决溢水旱潛違必恐是調燮有乖祭祀未潔軫吾君宵旰之慮負陛下覆育之恩臣實痛心誰不抱愧伏乞特頒明詔下訪有司詢其銷遣之方採彼妖祥之本應是前皇古帝徃哲先賢或有違祠但存舊址在祀典者咸加嚴飾禀靈通者畧盡修崇悉遵䖍肅之誠無隳精祈之懇然後别宣長史側聽庶民稍關疾苦之繇須整撫循之策兾其昭感仰贊昇平鄭兟為膳部郎中天成三年九月乙亥奏諸司諸使職掌人吏乘暖坐帶銀魚席㡌輕衣肥馬參雜庭臣尊卑無别汚染時風請下禁止帝嘉其事促行之中書覆為不可趙鳳亟言於執政曰此禮誠大不可不切為權吏所庇竟寝其事是月丁酉吏部員外郎周知㣲上言曰竊以唐有天下垂三百年聖帝明君覽宏綱而御極忠臣賢佐法古道以賛時兩漢以還歴代罕比雖國有中否之數人無厭徳之言果致陛下紹開中興纉承大業將欲永光帝載而猶動守典刑伏見州縣官僚被人論訟始行追取未辨是非稱呼不去其官曹枷鎖已拘於道路所以上無恥格下絶恭敬有玷盛明實駭觀聽此後凡有官緒可稱所訟罪名未正伏請秪令監守皆在法司俟曲直銷分即荷校無憚所貴坐法者知國章有節司刑者表守律無踰孔昭序為給事中天成三年九月丁酉上言曰伏見本朝儀制北省官為近侍之班遂異常叅之禮所以百寮則曰拜蓋云謝食北省官不赴廊飡食於本署故常朝不拜况今耆舊皆目覩躬行伏望陛下順考古道率由舊章正立朝之常規遵先王之定制盧詹為中書舍人天成三年十月上言曰歌稱九徳彰聖哲於一人國啟四門睦臣賓於萬宇伏惟陛下登臨宸極統御寰區普天之來享來王率土之為臣為子所以西戎獻欵北國輸誠五谿之蠻獠皆臻百越之梯航畢至華夷率服聲教遐流竊見外國朝天諸藩到闕多於便殿引對中外不知既聞來自殊鄉宜使觀於盛事此後每有四夷入貢伏乞御於正殿列彼羣臣立天仗於廣廷臨宸軒而端拱庻使邉荒異俗向慕華風亦具禮樂威儀更顯聲明文物何澤為吏部郎中天成四年二月上言昨問罪中山近鎮有飛輓力役之勞乞議蠲減于嶠為比部郎中知制誥天成四年四月丙午上章以兩班有老病者咸絶其俸慮玷聖明請各授致仕官仍加錫賚以符尚齒之化程遜為主客郎中知制誥天成四年四月丙辰上言曰臣聞身體髪膚受之父母不敢毁傷所以樂正子春下堂傷足三月不出而有憂色民間多有割股上聞夭聽者伏以堯代則共推虞舜孔門則首舉曽參皆以至孝奉親不聞割股肉療疾或真有懐怙恃之感報劬勞之恩孝起因心痛忘遺體實行此事自是人子之常情不合鼔扇聲名希霑卹賚伏惟陛下道齊覆載孝治寰區漸致昇平全除矯妄乞願明勅徧下諸州更有此色之人不令舉奏所兾真誠者自彰孝感詐偽者免惑鄉閭咸歸樸素之風永布雍熈之化孔莊為司門郎中天成四年五月上言曰臣聞漢宣帝云與朕共治天下者其惟良二千石乎今國家每擇郡牧惟賞軍功慮於治民未盡其㫖為人求瘼責在叅佐則庻㡬近理願留天睠俾慎擇焉崔憓為左諌議大夫天成四年六月上言曰臣伏見雒都頃當制葺之初荒凉至甚纔通行逕徧是荆榛此際配人開耕便許為主或農或圃逾三十年近嵗居人漸多里巷頗隘須増屋室宜正街坊都邑之制度既成華夏之觀瞻益壯因循未改汚濁増深竊惟舊制宫苑之側不許停穢惡之物今以菜園相接宗廟祠宇公府民家穢氣薫蒸甚非蠲潔請議條制俾四方則之郭正封為考功員外郎天成四年八月癸卯奏中興平定之初自數十年雜亂編民或為兵士所掠没為奴婢者既無特勅釐革無復從良遂令骨肉流離有傷王化勑㫖曉喻天下諸軍所掠生口有主識認並勒放歸是月乙丑左補闕楊途奏明公舉事湏合前規竊見京城之内尚有南州北州縱市井不可改移城池即宜廢毁復見郡城舊墻多已摧塌不可使浩壌神京旁通緑野徘徊壁壘俯近皇居無復因循常宜修葺初光啟末張全義為河南尹為蔡賊所攻乃於南市一方之地築壘自固後延於市南又築嘉善坊為南城天復修都之際元未毁徹途之所奏頗適事宜後為金部員外郎任賛為左散騎常侍天成四年十月奏於郊天前有犯重罪合當極法者並令推鞫斷遣無容開啟倖門從之十一月辛未左諫議大夫崔憓奏請止絶諸道州府不得進金玉鞍轡龍鳳御衣其奏曰凡在御前皆為法物供奉所自出自内司豈假外臣而有營造若無禁止漸為通規一則乖國朝淳厚之風一則冒憲典防閑之制是月壬辰刑部郎中周知㣲奏請藩方州郡皆令抄冩法書每遇詳刑須憑條格既無失入自絶銜寃王鬰為右庻子天成四年十二月辛酉奏伏自廣明辛丑之後天祐甲子以來官壊政荒因循未補此蓋諸司滅喪人吏曹局亡失簿書至令官僚中有不知所掌之事者伏准文明元年四月十四日勑律令格式為政之本内外官員退食之暇各宜披覧仍以當司令式書於㕔事之壁俯仰觀瞻使免遺忘䖍尋兹制實繫化源請下内外文武百司如本司闕令式者許就三舘抄六典内本司所掌名目各粉壁書冩從之張延雍長興元年為諫議大夫七月奏請百官各遵前勅及舉行令式中事八月壬辰朔刑部郎中周知㣲奏近年關防商賈不憑司門公驗關禁之設國有舊章請諸司舉行之疏奏不報孔崇弼為庫部郎中長興元年九月奏天下州縣長吏每到任造得公廨什物罷任之時多事已有不係案牘此後請公廨什物明立文案不許乾沒免致擾人崔行為給事中長興元年十一月壬戌奏當省給納諸州銅魚勘問本行令史狀稱内庫每州有銅魚八隻一隻大七隻小兩隻右五隻左其右銅魚一隻長留在内留一隻在本州庫逐季中報平安左魚五隻皆鐫次第字號每新除刺史到任後即差人到當省請領左魚當司覆奏内庫次第出給左魚一隻當省責領分付到州集官吏取州庫右魚契合却差人送左魚納省如别除刺史州司又請次第左魚周而復始臣以州司差人請魚徃來須有煩費請此後新除刺史在京受命或經過都城者可令自牒當省請左魚齎歸本郡契合然後差人納省所兾稍免煩勞從之是月乙丑中書舍人封翹奏切見五日轉對於事太繁所見或有短長不當空煩聖覽請此後秪於入閣者依刑法待制官例次對同日比部員外郎知制誥崔稅奏臣歴觀徃代下及近朝旣立綱維必擇師友或取其徳行彰著或取其學術精通待以優崇俾之規益斯亦前王之急務也伏見陛下須宣典册封立親賢盛禮既陳普天咸慶諒鴻基之永固豈麟趾以能歌伏願陛下特詔有司遵行舊制慎求端士博訪碩儒命以王官使同猶豫雖聰明天縱固不俟於切磋而孝敬日躋亦良由於輔導臣謬塵近侍無補盛時輙以芻蕘上塵旒扆疏奏不納李崇遇為尚舍奉御長興元年十一月辛未奏竊見文武百官一品已上薨謝者皆有賻贈自四品以下無例施行請特定事例以表無偏王延為左補闕長興元年十二月奏一縣之内所管鄉村而有割屬鎮務者轉為煩擾益困生民請直屬縣司鎮惟司賊盗從之吕朋龜為度支員外郎長興二年二月庚戌奏以恩赦中許追贈追封已及周歳有未沾恩命者乞賜施行勅㫖宜令所司報在朝文武官員及諸道州府當制内有未霑恩命者令供申文狀到者旋即施行不得停滯楊途為金部員外郎長興元年三月辛亥奏但是古墓荒墳不計有主無主請下諸道州府嚴戒鄉閭不得開發從之正月甲寅尚書戸部奏當司所管天下合貢方物法長興元年三月定到七十餘州舊例冬至齊到正仗前㸃檢至元日於殿前排列當司引進昨㸃檢今年正仗前七十州所貢方物内五十七州正仗前至其餘二十州自正月至三月方到京師其江陵府所貢胎白魚臣勘本道進奏官狀稱每年臈月裹造至正仗未堪供進固難及限猶慮其餘州未曽嚴加告諭不可便議刑名請行勅命約束如來年正仗前貢物不齊其本州錄事叅軍及勾押官典量定殿罸又棣州合進蘿藦子本州稱無本色折進價錢絹一匹伏以任土作貢必須産在封疆本色不供價錢何取兼恐顧兹名目廣有科求其價絹請停勅㫖江陵府胎白魚許於限外供進餘依所奏閏五月起居郎曹琛奏兩班或請假歸寧或染疾未捐纔注班簿便住料錢勅㫖有禮於君克勤於國為臣所重自古皆然其或合朝不朝即虧匪懈無病稱病亦屬自欺儻異下氷須資勿藥臥疾非人情所欲歸寧光孝治之朝曹琛所奏文武官請歸寧准式假及實卧病者並許支給本官料錢宜依或有託病不赴朝叅故渉曠怠者慢於事君何以食禄如聞糾奏當責尤違康澄為大理少卿長興二年六月辛未奏曰陛下御極以來大稔于此時無水旱歳有豐登所以民去農桑士思逰惰或機巧以趨利或宴樂以棄時且一夫不耕或受其飢一婦不織或受其寒者而况鄉閭之内城郭之中競削錐刀罔知本末或鼓舞於村落或謳歌於市廛寔繁有徒觸類而長若非禁止漸恐滋彰勅㫖皇王之業寰海為家民不擾而自安事不紊而易治皆修逺大以固雍熈朕自纉丕圗每勤庶政民有耕耘之樂時無饑饉之災然猶菲食如初宵衣若舊内則仗前後左右外則委侯伯子男共削煩苛同除蠧弊康澄所奏機巧之事㳺惰之徒所在不無未能全斷令仰諸道長吏詳此曉示村廵㳺惰者勸以歸農機巧者戒其越様此外或更有不利於民事並可嚴行止絶将使俗無竒伎野絶閒㳺為下有勤力之資在上無蕩心之事􅆵肆人和之際何禁謳謡村閭農隙之時無妨歡樂即須辯認姦惡不得分外搔擾人戸所切者常輕徭薄賦不急歛暴徵民不勸而自勤財不營而自富况諸侯戮力列校盡忠皆是腹心總如魚水將期混一永致和平是月戊寅左散騎常侍鄭韜光奏臣聞春秋傳曰將賞為之加膳將刑為之撤樂此明君之愛人也伏乞下大理刑部兩司凡經定罪之時結正之際徧覧格律簡騐盡舉勑文討尋俾獲罪者甘心受罸者無怨人知法有畫一之義律無再易之文盧損為左諫議大夫長興二年十二月上封事三件先罪犯譴逐歿於遐方者請准南郊赦文竝許歸𦵏仍還舊秩處分鳳翔山南已來長吏有兩川界内人戸任還鄉里願住者即加安撫前任節度使刺史防禦等使請五日隨例起居並從之張昭逺為都官員外郎知制誥長興三年正月上疏曰臣聞諫官進言御史持法實人君之耳目正邦國之紀綱自本朝以來尤重其任今之選授莫非端良然則彈奏之間尚未申於才用使諫諍之道或未罄於箴規俾七人徒歴於清華三院但循於資級考其志業孰測短長臣請依本朝故實許御史以法冠彈事諌官逐月給諫紙政事有所不便並許陳聞所兾履班行者不負於君親有才業者自分於涇渭庶幾舉職免有曠官從之曹允昇為太常丞長興三年七月奏使府郡牧例以隨身僕使為中門代判通呈等名目極多皆恃勢誅求不勝其弊伏請特行止絶如藩侯郡守不解書札請委本判官代押其職務監臨請差本處衙院官吏庻得漸除踰濫兼使州奏薦判官多非才行或以賄賂求進今後奏薦請令本人隨表至京令所司批驗盧華為刑部員外郎長興四年奏臣竊以欽恤者聖人之大徳畏慎者臣下之小心倘不怠於交修庻自叶於理道伏遇陛下静符𤣥化動修至仁八紘無幽枉之人四海有昇平之望但以人非誘勸事罕專精將欲仰副憂勤實頼再明條制伏見本朝故事凡内外官司有能辨雪寃獄活得人命者特書殊考非時命官多難已來此道漸廢既隳賞典難得公心伏乞明降勑文顯示中外自此不繫正攝官吏能辨雪寃獄全活人命斷割纔訖旋具奏聞考較不虚時與超轉如或滯留不具申奏及虚妄兾希恩澤其所任司長本判官竝請重加殿罸册府元龜卷四百七十五
