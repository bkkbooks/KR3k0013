body:
  text: 册府元龜卷四百九十二宋王欽若等撰邦計部蠲復第四後唐眀宗天成元年四月即位下制曰昨自魏汴至京大軍所歴戎馬騰踐麥苖下本州使簡量據所傷踐與蠲地税諸色殘稅自今年四月一日已前並與放免如已徴入州縣者即據數納省若取官中廻圗錢立契取私債未曾納本利者不在此限其餘並不徴理十一月癸未鎮州并盧文進所率歸業戸口奉詔放租稅三年仍每口給糧五斗訖二年十月戊戌詔曰諸道州府自同光三年已前所欠災秋夏稅租并主持務局敗闕課利并㳂河舟舩折欠天成元年欠夏税租並特與除放時安重誨既構任圜之禍恐人非之思市恩於衆以掩己過辛丑詔曰朕聞后来其蘇動必從於人欲天監厥徳静且布於國恩近者言幸浚郊暫離雒邑盖逄嵗稔共樂時康不謂姦臣遽彰逆状為厲之階既甚覆宗之禍自貽俾我生靈遘兹紛擾永言軫惻無輟寐興宜覃雨露之恩式表雲雷之澤應汴州城内百姓既經驚刼須議優饒宜放二年屋税兼公私債負如是在城迴圗錢物及公私質庫除㸃簡見在外實經兵士散計者不計年月逺近並宜蠲放應有年八十已上及家長有廢疾者宜免一丁差役夫天災流行時雨􅄽亢既闕地分宜减國稅今嵗岐華登菜自夏稍旱須加軫念以示優恩四州所管百姓宜令長吏切加安䘏其所旱損田苖宜令簡行詣實申奏與蠲减稅租仍不得輒有差徭科配四年正月勅㑹計之司租賦為本州縣之職徵科是常儻不切整齊必漸滋僥倖今聆舉奏果有逋懸非朝廷之立法不嚴蓋官吏之慢公頗甚縁當獻嵗未欲加刑宜顯示於新條貴永除於積弊其天成元年應欠秋稅特與據數放免三月勅王都負國命將除兇攻伐之勞朕所嘗憫搬運之苦朕實備知近自收城方期罷役宜加矜䘏徧示優饒其鄴都幽鎮滄邢易定等州管内百姓除正稅外免諸色差配庶令生聚並獲舒蘇長興元年二月南郊畢詔天成四年十二月終已前諸道州府人户應有殘欠税物蠶鹽之乾𣙜濕𣙜既係積年之欠俄逄作觧之恩並與放免諸州府營田户部院應欠租課房店利潤逃移人户死損牛畜或先遭剽刼及水澇處欠負斛斗無可徵填已收納到家産財物其餘所欠並與蠲除所在倉塲積年損爛使臣盤覆欠折尤多其主持専知官等據通收到産業物色外亦與放免應諸道商稅課利撲斷錢額去處除納外年多蹙欠枷禁徵收既無抵當並可放免諸道採造材木欠數定州材木錢及閿鄉船務遭火所燒所司累行催促無可徵填亦與放免先南北靣軍前倉塲主持損爛欠折及江河轉運抛失舟船并斛斗茭稈錢諸鎮欠少過軍准備糧草等據主持人見在家業並勒收納外除放所欠天成元年二年諸州舡納上供到庫秤盤積欠物色并曾遭兵火燒刼及耀州前後身死刺史界分欠省庫錢物却勒州司官吏陪填者並特放免天成二年終諸色人於西川省庫内借過錢并省司先差人收買羊馬欠折死損無可填還及天成二年終已前諸道銀銅鐵冶鉛錫水銀坑窟應欠課利兼木炭農具等塲欠負亦與放免河陽管内人每畝上舊徴橋道錢五文今後並放不徵諸道州府人户每畝上元徵麴錢五文今特放二文袛徵三文三年五月㐮州奏水髙二丈壞城欲盡乞蠲人户麥稅從之十月庚戌襄州奏漢江暴溢廬舍田稼並盡無可徵稅請特免從之四年三月辛丑勅叛黨未平難輟轉輸之役流民既復必資安集之謀朕應天順人端居静治若渉大水如履薄氷翼翼乾乾懼不克荷所頼文武宣力天地降祥雨順風調政寛事簡雖四夷一主逺殊貞觀之朝而斗粟十錢近比開元之代無何董璋構亂蜀郡纏災萬方共樂於太平一境獨嗟於多事遂致數年動衆千里勞民奔馳秦鳳之郊委頓岷峨之路葢彼樂禍非我願為今則逆順分眀車書混一陸梁之黨已歸葅醢之刑渙汗之恩宜及瘡痍之俗示以歸還之路慰其懷戀之誠應奏岐延涇寜慶邠同興元京兆等州府所欠長興元年二年夏秋稅賦諸色錢物及營田戸部庄宅務課利等物並放如聞州使廉察自前每降勅書稍闗除放頗淹行遣轉急徵催物已輸官人方見牓厚利實歸於州縣鴻恩虚及於生靈而况一戸逃移一村搔擾殘欠之物蓋藏於形氣腹中披訴之詞指注於逃亡脚下朝廷比哀貧戸州縣轉啓倖門欲峻條流宜先曉諭今後勅到畫時曉諭所管仍勒要路粉壁曉示如勅未到時已徵到物色據數附帳不得隠落如有人陳告以枉法贓論勅到並須半月内施行除放訖奏聞八月戊申受尊號畢大赦制長興三年正月一日已前諸道兩稅殘欠物色並宜除放或有先曾經災沴處逃戸却歸業者除見徵正稅外不得諸雜科徭應係省司塲稅倉庫今日已前諸色敗闕人等據其所有錢物家業盡底收納已上所欠并敗闕人等並放九月勅曰朕自恭臨萬國恵撫兆民遵上古清浄之規削近代繁苛之政兩税之外别無徵歛之名八年之間繼有豐穰之瑞覩流亡之漸復謂富庶之可期爰自今秋偶􅄽時雨郡縣累陳於災沴闗梁亦奏於逃移良由朕刑政或差感通不至責躬罪已靡㤀於懷特議優矜庶令安集據河中同華耀陕青齊淄絳萊等州各申災旱損田處已令本道判官撿行不取額定頃畝如保内人戸逃移不得均攤抵納本戸租税其稅子如闕本色許納諸雜斛斗薥黍元每斗折粟八升今許納本色稗子特與免稅前件遭旱州府據撿到見苖仍恐輸官不迨今祗徴一半稅物仍許於便近州府送納其餘一半放至來年其逃移戸田産仰村鄰㸔守不得殘毁必在方岳羣后州縣庶官各體憂勤共相勉勵眀詳獄訟恭守詔條上荅天災必思於戒懼下除民瘼必務於撫綏當共䘏於疲羸勿自安於逸樂末帝清㤗元年四月詔蠲放長興四年十二月已前天下所欠殘稅七月庚午詔曰朕嘗領藩條屢親政事每於求理務在䘏民况今子育萬方君臨四海日慎一日思漸致於小康雖休勿休冀終成於大化得不察生靈之疾苦知稼穡之艱難俾蠲積弊之原庶廣惟新之澤省三司使奏自長興元年至四年十二月已前諸道及戸部營田逋租三十八萬八千六百七十二端匹束貫斤量或頻經水旱或併值轉輸悉至困窮蹙成逋欠加以連年災沴比戸流亡殘租空係於簿書計數莫資於經費蓋州縣不公之吏鄉閭無識之夫乗便欺官多端隠稅三司使患其僥倖便欲推尋朕憫彼蒸黎慮成淹滯示體物憂民之㫖徵滌瑕盪垢之文特議含容且期均濟應自長興四年已前三京諸道及營田委三司使各下諸州府縣除已納外並放應有逃户除曾經釐革外所有後来逃移者委所在觀察司使刺史速下本部徧令招撫歸業除放八月後至五年八月並得歸業所有房親鄰近佃射桑田不得輙有占據如自越國程故不收認其所徵租稅却從清㤗元年四月後委三司重行釐革别議施行舉賞罸之明條立徵催之年限不得更欠租稅致啓倖門勉懷成務之勤以副劇繁之選有要行事件三司畫一聞奏仍報中書門下不得漏落十月癸未詔河中居民屋稅蠲除其半丙午又詔振武新州河東西北邊經契丹蹂踐處放免三年兩税差配時契丹初退故也十一月乙未蔚州言州界經契丹蹂踐處乞蠲除差稅從之丁未又詔曰朕猥將寡昧䖍嗣宗祧草木虫魚思宏於覆育東西南朔同切於綏懷睠彼契丹孤我恩信忽驅族類擾亂邉陲殺害生靈窺窬保障唯貨財是視殘疾是行逞虐肆兇莫甚於此人神之所共怒天地之所不容今則上將臨邉衆軍大集克日必成於盪定望風已報於奔迯雖料彼戎兵他日終期於掃蕩而顧予生聚此時方抱於瘡痍或骨肉分離或邱園荒廢凝旒載想過在朕躬將却復於阜繁宜特行於䘏隠應振武新州河東西北邉經契丹蹂踐處百姓兩稅差配今日後並放三年宜令逐處長史分眀曉諭其人户陷蕃者宜令設法招尋各令歸復稱朕意焉二年七月滄州言續逃亡户八百五十九詔魏府於稅率内蠲减旱故也九月詔蠲除許州去年殘租十月詔河中居民屋租蠲除其半晉髙祖以後唐末帝清㤗三年十一月十二日即位制曰昨以冦戎久在郊境頗傷禾稼宜减賦租應近京畿五十里内委逐處令長撿覆當與免今秋稅租差科天福元年閏十一月壬午詔曰昨者舉義之地稱師之邦必蹂踐於川原要矜蠲於輿賦其河東管内諸縣稅租自今年秋及来年夏稅各與减放一半警蹕經過之地望幸雖榮蕃漢雜處之兵禁暴難備既頒渥澤須示優矜昨大軍兵士自河東以至京畿沿路蹂踐之處宜委逐處長吏公同撿覆據頃畝特與蠲放今年秋税一半二年四月丁亥詔曰凡闗布澤務在及民宜加軫憫之恩俾遂蘇舒之望天福元年以前諸道州府應係殘欠租税並特除放諸道係徵諸色人欠負省司錢物宜令自偽清㤗元年終已前所欠者據所通納到物業外並與除放或水旱為災蟲螟作沴儻無軫恤何致阜豐朕昨行至鄭州滎陽縣界路旁見有蟲食及旱損桑麥處委所司差人撿覆量與蠲免租稅河陽管内酒户百姓應欠天福元年閏十一月二十五日已前不敷年額麴錢並放其諸處應經兵火者並與指揮天下百姓有年八十已上者與免一子差徭甲午勅自偽清㤗元年終已前塲園官所欠係省錢物據盡底通納到物業外四月五日恩制並與除放其人任逐穏便不計省司及外藩府永不得録任五月勅應雒京及魏府管内所徵今年夏苖稅物等朕自臨御寰瀛躬親庶政静惟師古動欲便民雖物力方虚每牽經費而田疇微損亦欲矜蠲朕見雒京内麥苖今春稍似旱損尋覩魏府奏報境内亦有㣲傷湏聊示於優饒冀克諧於通濟比欲差官就撿又恐生事擾人其雒京魏府管内所有旱損夏苖縣分特於五分中减放一分苖子其餘四分仍許將諸色斛斗依倉式例與折納所期渥澤以及衆多報告人户各令悉知八月乙巳赦制魏府管界内今年夏稅近指揮祗徴五分今以放駐兵師不無勞役宜並蠲放三年八月癸未定州奏境内旱民多流散詔曰朕自臨寰宇每念生民務切撫綏期於富庶屬干戈之未戢慮徭役之或煩以彼中山偶經夏旱因兹疾苦遽至流移逹我聽聞深懐憫惻應定州所奏軍前夫役逃户夏税並放己丑户部奏河南同州絳州等處相次上訴為管界災旱逃却人户勅朕奄有四方尊為萬乗所務誕敷教化普濟黎元葢全師致討於妖狂而比户未臻於富庶仍聞關輔偏屬旱災致使鄉村多有逃竄逹我聞聽深用憫傷冝加矜䘏之恩俾遂歸還之計應三處逃移人户下所欠累年殘稅并今年夏稅差科及麥苖子㳂徵諸色錢物等並放其逃户下秋苖據見撿到數不計是元額及出剰頃畝並放一半仰觀察使散行曉諭專切招携應歸業户人仍指揮逐縣切加安撫免施恵養副我憂勤九月詔以魏府范延光出降其府城四面人户三十里内與放二年秋夏租税三十里外委逐縣令佐專切㸃撿如實曾經砍伐桑柘毁折屋宇者分析申奏盡與蠲放租稅十月戊戌赦勅侵官潤已爾其有誅督責暴徵我所不忍應係欠省司課利塲官院等宜依近行宣命期限磨勘徵督内有送納所欠錢物得足者其餘限􅄽罪特放如有沒納本人及本人家業盡抵外尚欠錢物更無抵當者其所欠並與蠲放其逐人罪犯特從减等其去年降宣命月日後來欠負者不在此限昨以水旱為沴什一未均冀便蒸黎因令檢覆未明公法或彰隠漏之􅄽爰念小民宜示矜寛之典近因檢田有隠漏合當罪犯者並放所有合罸令倍納租稅者特放並令却依實頃畝輸納貨泉所聚徵督必行况係省之逋懸宜應期之供辦但以兵戈之後帳籍空存已行蠲減之恩常憂未普再示優饒之命式表推恩天福元年應經灾處州府諸色塲院因兹失陷錢等先曾指揮蠲一半者今並全放未曾經減放者今與蠲放一半天災或降地分所招携老幼以流離棄田園而蕪没深懐惻憫宜示招安蒲同晉絳滑缺魏府鎮定州等人户或經亢旱或屬兵戈逃移人户等應逐户所欠今年已前諸雜税物並特除放宜令縣州曉示招携如有復業者仍放一年秋夏税二年諸雜差徭爰自攻圍每多徭役或因兵死尚有户存言念傷痍屢宜優䘏應差赴魏府城下人夫内有傷重身死者除已經支贈外特放户下三年諸雜差徭又頃因借率猶有逋懸方務優饒豈宜徴督先率借雒京舎錢其所欠並放又諸道州府營田户部院矜省莊等天福元年秋夏租課錢帛斛斗諸雜色物等除已納外應有逋懸欠並與蠲放五年正月丁卯朔帝受朝於崇元殿降制曰朕自勉副羣心恭臨大寳承歴代荒屯之後屬前朝䘮亂之餘每務綏和漸期富庶㝷以東遷梁苑北定鄴都國力既虗軍資甚廣所司以供億為念督責是専嘗思凋弊之民倍軫焦勞之意今我事漸簡農時欲興將導達於休和用頒宣於渥澤宜蠲宿負以惠黎元應天福元年終已前公私債欠一切除放七年二月癸酉詔曰朕自臨天下每念民間御一衣思蠶績之勞對一食想耕耘之苦而况職官俸禄師旅資糧凡所贍供悉因黔庶得不救其疾苦憫彼災傷徵宿乆慮流離者不歸均殘租恐貧饑者漸困今春膏雨繼降農作方興宜示渥恩俾蘇疲瘵天福二年至四年夏秋租税一切除放八月己亥車駕幸鄴壬寅制曰嵗因災沴民用艱辛久係逋懸宜示蠲免應欠天福五年終已前夏秋租税并法徴諸物及營田租課並與除放應沿路有傍道稍損却田苖處其合納苖子及沿徴錢物等據畝數並與除放主掌曠敗錢物逋懸宜示矜容聊加蠲免應天福三年終已前諸色塲院官欠負官中錢物人等累經徴理通勘實無錢物家業者並與除放其人免罪任從逐便不得再任使無黨無徧狗至公之道去㤗去甚誡求利之心私下債負徴利已及一陪者並與除放如是主持者不在此限邊陲管界蕃部經由言念疲羸良深軫䘏欣代蔚并鎮州管限内有經蕃部踐踏却苖稼者其合納苗子㳂徴錢物等據頃畝與除放其經燒爇屋舍殺傷人命者據户下合徴苖稅並與除放少帝以天福七年七月即位赦制蟲蝗作沴苗稼重傷特示矜蠲俾令蘇息應諸道州府經蝗蟲傷食苗稼者並據所損頃畝與蠲放賦稅八月詔曰叛逆之臣必行於討伐凋傷之俗宜示於撫綏一昨逆賊安從進不戒滿盈輙謀違背占據城壘虐害人民元兇已就於嚴誅比屋宜加於霈澤俾令蘇息用示軫傷應在城人户除已行賑貸外特放今年秋来年夏城内物業上租稅其城外下營寨處或有砍伐却桑柘及毁折却屋舍處特與除放今年来年二月合係租稅其管内諸縣人戸等被安從進數年誅剥多是貧寒應天福七年夏稅已前諸色殘欠及㳂徵錢物并公私債負等並與除放九月又詔襄州城内人戸今年秋来年夏屋稅其城外下營處與放二年租稅應被安從進脅從者一切不問十一月宣所司廣晉州至雒京㳂路應靈駕經過處州縣分蝗蟲食外秋稅已納外放一半八年二月河中府奏逃户七千七百五十九勅諸州應欠天福七年夏稅並與除放秋放一半其餘一半候到蠶麥納逃戸與放一半差徭却令歸業是嵗天下饑河南榖價暴加人多饑殍故有此除放十月遣殿直四人齎詔勅西道示諭除放是嵗殘欠稅物開運元年七月辛未詔魏􅀶貝兾滄景德等州經敵騎剽攘者放今年秋稅其餘經過之地亦量與矜蠲閏十二月詔以平青州楊光逺應王師攻討逆賊下寨之處所有田苗桑棗應遭蹂踐砍伐宜令官吏子細通檢除今年欠苗外来年夏稅並與權放一半其青州三十里内更免今年秋夏殘租應青州管内及郫齊棣兗沂宻等州諸道人戸自討伐以来科配頻併其今年夏麥殘欠并㳂徵錢物並與除放其城内屋稅特放一年應洞子頭及城下夫役有遭矢石致死者宜令逐處長吏子細勘㑹與放二年徭役二年五月丙申朔詔曰自今年契丹犯境以来有人户實經殘殺者其夏稅十分已令减放二分苖子并㳂徵錢物今更特减一分其正稅錢物亦與十分内减放二分場院積弊官吏承寛致課額之逋懸勞朝廷之徵督乆淹刑獄深軫予懷爰示優容俾令除放其安邑觧縣兩池前𣙜鹽使王居敏王景遇界分見禁般鹽欠折軍將兩界逋懸累年禁繫宜令三司各詳逐人所欠如有家業錢物填納者可與盡底據數納官餘欠並放如有欠負錢物内今無家業錢物填納者所欠特放河中府雍同華陜虢等州管界内人戸有欠王居敏王景遇般鹽脚價者並特放三年九月宣開封府霖雨不止宜令放京城内外人戸一月房錢漢髙祖以晉天福十二年五月自晉陽趨東京至趙城洪洞百姓以駱從朗不順皆藏匿山谷所在灰燼有遺堵焉及帝還京咸相絜来詣行輿呌萬嵗者響震川陸帝哀之咸與蠲其租調至開運四年二月即位於晉陽六月詔應天福十一年已前諸州府應係殘欠租稅並特除放又曰東西兩京一百里内今年夏稅及㳂徴諸色並與蠲放其一百里外曽有契丹蹂踐處其今年夏租大小麥苖子㳂徵諸色各放一半其京城内今年屋稅與减放一半乾祐元年正月乙邜詔鄴城四靣人戸三十里内所有天福十二年稅賦并㳂徵一物已上並可特放隠帝以其年二月辛巳即位己巳詔應天福十二年終已前殘欠糧夏稅賦及和糴㳂徵一物已上今並令特放所有開封府滑曹鄆宋亳鄲潁徐宿兖沂宻孟鄭懐衛復濮等州并鄴城四靣三十里内共二十處除已放去年殘稅外其今年麥苖子於舊額上特與放一半頃經戎虜所在經搔至於場院課城州府官係既有䧟失宜示矜蠲應州府縣鎮遭契丹草宼及軍都更變驚却兼有般送綱運已離本處㳂路遭刼奪諸色錦帛一物已上兼天福十二年六月終已前諸州府鹽麴商稅鐵冶不敷課利及主持錢物糧草柴蒿敗闕欠折等一切特與除放諸道州府有去年六月終已前全放支却將士春冬衣賜及諸色請受自来累行徵納者並與檢驗除放天福十二年六月終已前諸處收刈到茭草積年損壞及欠少處並令除放二年二月勅先以兵甲至多糧儲不給權放苖畝之上遂有紐配之煩雖年嵗之豐登諒黎民之艱窘固非獲已深用軫懷今則雨雪及時陽春布澤宜順發生之令特覃優䘏之恩兾閭里之安居俾農桑之樂業應三京鄴都諸道州府所徴乾祐元年夏秋苖稅及紐徵白米稈草據今年二月一日已前已納外見係欠數並宜特放布吿遐邇體朕意焉周太祖廣順元年正月即位制漢晉以來兵革屢動賦役煩併黎庶瘡痍鰥寡孤惸不能自濟為人父母曽不憫傷應天下州縣所欠乾祐元年二年已前夏秋殘稅及汾徴物色并三年夏稅諸色殘欠並與除放所有澶州以来大軍經過之時㳂路人戸恐有蹂踐其官路兩邊共二十里并乾祐三年殘欠秋稅並放應河北縁邊州縣自去年九月後来曽經契丹蹂踐處其人戸應欠乾祐三年終已前積年殘欠諸色稅物並與除放四月乙亥徐州言彭城縣訴收城時兵士踏踐麥苗乞聊减稅從之二年正月丙申晉州王彦超奏乞除放去年十一月十二月商稅鹽務課利從之乙巳陜府折從阮言奉勅除放賊軍蹂踐人戸賦租五月平兖州詔曰賊據一城民殘四境或徹毁其牆屋或蹂躪其田疇既於徵取供軍㸃集役應并宜矜䘏俾漸蘇舒應兖州城内所徵今年屋租及蠶食鹽錢諸色雜物稅並與除放城外官軍下寨處四靣去州城五里内所徴今年夏秋苖子蠶食鹽錢並諸雜㳂徴錢物並與除放五里外十里内除放今年夏苖子三分中减放一分諸州差到人夫内有遭矢石身死者宜令逐州縣分折姓名聞奏放戸下三年諸雜差遣三年正月乙亥勅放都下浮客食鹽錢戊戌詔諸道州府先納人戸軍器物並放五月滄州言營田務戸納去年空地苗稅不迨乞除放從之世宗顯德元年正月帝南郊禮畢詔曰諸州府廣順二年已前逋欠稅㳂徵錢並放其二年終已前主持省錢及主倉庫敗闕者據納家業外無抵當者並釋放三月詔曰兩京及諸道州府人戸所欠去年秋夏稅租其㳂徴物色並與除放四月世宗攻河東庚午於潞州詔曰當州諸縣及澤州數縣昨經賊軍傷踐處人户所徴今年夏稅斛斗錢帛三分與放一分内有村坊元不遭軍宼傷踐者不在蠲放之限十月癸亥帝謂侍臣曰昨諸道戸民有詣闕訴水災者因遣使按之令睹奏報有此舊額出剰者今嵗豐熟必可輸納或他時小有不稔便因編氓所撿出頃畝宜令三司補舊額外與减一半二年十一月秦鳳州平詔應秦鳳階成等州管内顯德二年十一月已前城下功役百姓為矢石所害者本戸除二稅外放免三年差役今後除秋夏兩稅徴科外應為屬所立諸般科率名目及非理徭役一切停罷三年六月詔曰應諸州夫役自來有没於矢石者其本戸並放免三年差徭四年正月詔曰諸道州府應欠顯德三年終已前秋夏稅物並與除放諸處敗闕塲院人員自来累行徵督尚有逋欠實無抵當者宜令三司具欠分析數目聞奏别候指揮三月夀州降庚戌詔夀州管内去城五十里内與放今年及明年秋夏稅租五年五月世宗以征淮廻降德音云用兵之際力役是供當矜貸之在辰諒優給之宜被自去年十月後來㳂淮人戸曽充夫役内有遭傷殺不廻者本家放免本戸下三年諸雜差徭江南疲俗克復方新特示蠲除俾令存濟楊秦通滁和濠泗楚光壽舒廬鄿黄等州漣水濮陽汶川等縣自去年終已前所欠秋夏殘稅及諸色徵科配歛􅀶徵物色等並與除放六年二月丁亥開封府上言舊額下稅苖一十萬二千餘頃今撿到羡苗四萬二千餘頃奉勅放三萬八千頃是時諸州撿苖使率以所撿到羡苖上奏帝皆命减放其分數大約如是册府元龜卷四百九十二
