body:
  text: 册府元龜卷八百五宋王欽若等撰總録部髙潔棄官髙潔夫脩身立操不以窮改節砥名厲號不以利傷行皭然髙舉毅然有守義不茍取志不易常葢夫潔㢘之士篤尚清白者嘗從事於斯矣故曰窮視其所不為貧視其所不取雖有饑寒之憂猶無滋垢之汚故志愈髙而行愈潔身益困而名益彰俾貪者勵其㢘隅懦夫有所立志斯誠至士守道者之所趨也若乃不受其問遺靡干于鄉邑非其粟而不饗非其衣而不服介然自脩終焉彌固克尚貞㓗匪為華行亦何代無其人哉伯夷叔齊處於孤竹孤竹國在遼西殷諸侯也伯夷叔齊其二子也周之將興也二人相謂曰吾聞西方有偏伯焉似將有道者也今吾奚為處乎此哉二子西行如周至於岐陽則文王没矣没終也武王即位觀周德則王使叔旦就膠鬲於四内四内地名而與之盟曰加富三等就官一列為三書同辭血之以牲埋一於四内皆以一歸又使保召公就㣲子開於共頭之下共頭山名也而與之盟曰世為長侯守殷常祀相奉桑林且私孟諸相猶使奉桑林之樂孟諸澤名以為私邑為三書同辭血之以牲埋一於共頭之下皆以一歸伯夷叔齊聞之相視而笑曰譆異乎哉此非吾所謂道也昔者神農氏之有天下也時祀盡敬而不祈福焉時四時也祈求也其於人也忠信盡治而無求焉無所求於民也樂正與為正樂治與為治不以人之壊自成也不以人之卑自髙也今周見殷之僻也僻邪也而遽為之正與治遽疾也上謀而行貨阻兵而葆威也行貨謂與膠鬲盟加富三等也阻依也葆持也割牲而盟以為信因四内與共頭以明行揚夢以説衆揚武王滅殷之夢以喜衆民殺伐以要利以此紹殷是亂以易亂暴以易暴也紹續也吾聞古之士遭乎治世不避其任遭乎亂世不為茍存今天下闇周徳衰矣與其並乎周以漫吾身也漫汙也不若避之以潔吾行二子北行至首陽山而餓死袁旍旍一作族目東方之士也將有所適而饑於道狐父之盜丘見之下壺飱以與之袁旍目三餔而能視仰而問焉子誰也曰我狐父之盜邱也袁旍目曰嘻汝乃盜也何為而食我以吾不食也兩手據地而嘔之不出喀喀然遂伏地而死子列子窮容貌有饑色客有言之於鄭子陽者子列子禦冦葢有道之士也居君之國而窮君無乃為不好士乎子陽令官遺之粟數十乗子列子出見使者再拜而辭使者去子列子入其妻望而拊心曰聞為有道者妻子皆得佚樂今妻子皆有饑色矣君過而遺先生又辭豈非命也哉子列子笑而謂之曰君非自知我也以人之言知我以人之言而遺我粟也至其罪我也又且以人之言此吾所以不受也且受人之養不死其難不義也死其難是死無道之人豈義也哉其後民果作難殺子陽漢田仁魯相田叔之少子叔卒魯以百金祠之仁不受曰義不傷先人名原渉字巨先渉父哀帝時為南陽太守天下殷富大郡二千石死官賦歛送葬皆千萬以上妻子通共受之以定産業渉父死讓還南陽賻送行喪冡廬三年禮畢扶風謁請為議曹禮畢行喪終服也衣冠慕之後漢魯恭為司徒初恭父為武陵太守卒時恭年十二郡中賻贈一無所受年十五與母及弟丕俱居大學習魯詩閉户講誦絶人間事兄弟俱為諸儒所稱學士争歸之太尉趙熹慕其志每嵗時遣子問以酒糧皆辭不受問遺也姜詩事毋孝赤眉經詩里弛兵而過曰驚大孝必觸鬼神時嵗荒賊乃遺詩米肉受而埋之後為江陽令卒桓典字公雅大尉焉之孫少立㢘操不取於人門生故吏問遺一無所受仕至光祿勲卒李恂罷武威太守時嵗荒司空張敏司徒魯恭等各遣子饋糧悉無所受徙居新安關下拾橡實以自資吉茂脩行室如懸磬其或饋遺一不肯受雖不以此髙人亦心疾不義而貴且富者公沙穆隱居東萊山學者自逺而至有富人王仲致産千金謂穆曰方今之世以貨自通吾奉百萬與子為資何如對曰來意厚矣夫富貴在天得之有命以貨求位吾不忍也後舉孝㢘以髙第為主事檀敷字文有山陽瑕丘人也少為諸生家貧而志清不受鄉里施惠後補䝉令棄官去卒閔仲叔世稱節士雖周黨之潔清自以弗及也黨見其含菽飲水遺以生蒜受而不食一云仲叔曰我省煩耳今更作煩邪受而不食客居安邑老病家貧不能得肉日買猪肝一片屠者或不肯與安邑令聞勅吏常給焉仲叔怪而問之知乃歎曰閔仲叔豈以口腹累安邑邪遂去客沛以夀終袁閎字夏甫父賀為彭城相卒郡閎兄弟迎喪不受賻贈累徴聘舉召皆不應居處側陋以耕學為業從父逄隗並貴盛數饋之無所受吳祐字季英陳留長垣人也䘮父居無儋石而不受贈遺後終河間相孫𦙍隱居林藪躬耕稼穡倦則誦經貧窶困乏執志彌固不受惠於人也孫堪明經學有志操清白貞正愛士大夫然一毫未嘗取於人以節介氣勇自行後仕至侍中桓礪避地到吴郡揚州刺史劉繇賑給榖食衣服所乏者悉不受後東適㑹稽住止山隂縣故魯相鍾離意舍太守王朗餉給糧食布帛牛羊一無所受當臨去之際屋中尺寸之物悉䟽付主人纎微不漏移居揚州從事屈豫室中中庭橘樹一株遇實熟乃以竹藩樹四靣吹風落兩實以繩繋着樹枝毎危亡之急其志彌固賔客從者皆肅其行魏管寧年十六喪父中表愍其孤貧咸共賻贈悉辭不受漢末避地遼東中國少安客人皆還惟寧晏然若將終焉黄初四年詔公卿舉獨行君子司徒華歆薦寧文帝徴寧遂將家屬浮海還郡公孫恭送之南郊加贈服物自寧之東也公孫度康恭前後所資皆受而藏諸既已西渡盡封還之初太尉華歆遜位讓寧不􅁸後即拜大中大夫卒焦先河東人嘗結草為廬於河之􅎠獨止其中雖有𦂳急不與人語遺以食物皆不受河東太守杜恕嘗以衣服迎見而不與語汜騰字無忌燉煌人舉孝亷除郎中屬天下兵亂去官還家太守張閔造之閉門不見禮遺一無所受歎曰生於亂世貴而能貧乃可以免吴劉基字敬輿年十四居父繇喪盡禮故吏饋餉皆無所受晉王戎父渾為凉州刺史渾卒凉州故吏贈賻數百萬戎辭而不受由是顯名後終於司徒劉寔為大司農以子夏罪免毎還州里鄉人載酒肉以候之寔難逆其意輙共啖而反其餘韋忠字子節平陽人少慷慨有不可奪之志好學通博性不虚諾閉門脩已不交當世毎至吉凶親表贈遺一無所受後太守陳楚迫爲郡功曹吴隱之弱冠而介立有清操雖日晏歠菽不饗非其粟儋石無儲不取非其道終光祿大夫王裒字偉元城陽營陵人少立操尚隱居教授家貧躬耕計口而田度身而蠶或有助之者不聽諸生密為刈麥裒遂棄之故舊有致遺者皆不受王舒字處明少為從兄敦所知及敦為青州舒往依焉時敦被徴為秘書監以寇難路險輕騎歸雒陽委棄公主時輜重金寳甚多親賔無不競取惟舒一無所盻益為敦所賞位至安南將軍監浙東五郡軍事南齊庾易志性恬隱不交外物建元元年刺史豫章王辟為驃騎叅軍不就臨川王映臨州獨重易上表薦之餉麥百斛易謂使人曰民樵採麋鹿之伍終嵗鮮毛之衣馳騁日月之車得保自耕之祿於大王之恩亦已深矣辭不受梁阮孝緒陳留尉氏人義師圍京城家貧無所㸑僮妾竊鄰人樵以繼之孝緒知之乃不食更令撤屋而炊又鄱陽忠烈王妃孝緒之姊也諸甥歳時饋遺一無所納人或怪之答云非我始願故不受也陳馬樞隱於茅山後鄱陽王卑辭厚意數邀之待以師友門人勸之出仍居竹林中毎王公饋餉辭不獲已者率十分受一後魏胡叟不治産業乗一㹀牛敝韋袴褶而已尚書李敷嘗遺之以財都無所取北齊馮偉節聰敏無所不通趙郡王出鎮定州時舉秀才固辭不就歳餘請還王知其不願拘束以禮發遣贈遺甚厚一無所納惟受時服而已及還終不交人事郡守縣令毎至其門歳時或置羊酒亦辭不納門徒束脩一毫不受耕而飯􅅙而衣簞食瓢飲不改其樂竟以壽終宋遊道父季預為渤海太守弱冠隨父在郡父亡吏人贈遺一無所受後周韋􅗥髙尚不仕武帝嘗與􅗥夜晏大賜之縑帛令侍臣數人負以送出􅗥惟取一疋示承恩㫖而已帝以此益重之隋張文詡河東人博覽文籍以灌園為業州郡頻舉皆不應州縣以其貧素將加賑䘏輙辭不受毎閑居從容長歎曰老冉冉而將至恐脩名之不立以如意撃几皆有處所時人方之閔子騫原憲唐郝處俊父為滁州刺史處俊年十餘歳其父卒於滁州父之故吏賻送甚厚滿千餘疋悉辭不受盧伯瑗一名浩然善書畫屬文不婚娶寡慾隱於嵩髙有終焉之志𤣥宗使通事舍人禮徴稱疾不就所賜束帛亦辭不受梁鄭雲叟隱居於華山與梁朝近臣李振善振欲祿之拒而不諾及振南遷千里省之識者髙焉華州連帥劉遂凝嘗以貨貝遺之一無留者棄官孟子曰有官守者不得其職則去葢士君子進退之宜也若夫器用宏博志操貞峻言不茍合動惟秉義居然公輔之量宜為王者之師而屈膝下僚折腰吏職適遭權勢之所迫不為公府之見禮旁聣同列殊非我類可利於國莫能自専由是欝抑不伸慨然興歎或以罪自劾或稱疾而往投板懸綬比諸浮雲者何可勝道哉其或亂離斯瘼玉石將焚履不測之危避無妄之禍掛冠季世免陷匪人明哲保身於是乎在至有天資孝謹篤於養親脱略公卿不交士類遺榮避世髙蹈長騖斯亦各行其志也已然而泰寧之世貧賤為耻其或獨善其身守一介之分索居偏志違通人之㫖斯亦有識之致譏也漢陸賈惠帝時為大中大夫吕太后用事欲王諸吕賈自度不能争之乃病免以好畤田地善往家焉好畤即今雍州好畤縣枚乘字叔淮隂人景帝時召為𢎞農都尉乘久為大國上賔與英俊並遊得其所好不樂郡吏以病去官汲黯為滎陽令恥之稱病歸田里貢禹舉賢良為河南令歳餘以職事為府官所責太守之府免冠謝禹曰冠一免安可復冠也遂去官梅福九江壽春人也少學長安明尚書榖梁春秋為郡文學補南昌尉豫章之縣後去官歸壽春龔勝為郡吏三舉孝㢘以王國人不得宿衛補吏再為尉一為丞勝輙至官乃去州舉茂材為重泉令重泉左馮翊縣也病去官後漢劉茂為沮陽令㑹王莽簒位茂棄官避世𢎞農山中教授譙𤣥巴郡閬中人也平帝時為中散大夫與太僕任惲等分行天下觀覽風俗未及終而王莽居攝𤣥於是縱使者車變易姓名間竄歸家因以隱遁李業廣漢梓潼人也平帝元始中舉明經為郎㑹王莽居攝業以病去官載遵汝南慎陽人也平帝時為御史王莽簒位稱病歸鄉里江革明帝永平初補楚太僕月餘自劾去楚王英馳遣官屬追之遂不肯還王充上虞人明帝時仕郡為功曹以數諌諍不合去刺史董勤辟為從事轉治中自免還家樂恢辟司空牟融府㑹第五倫代融為司空恢以與倫同郡不肯留薦頴川杜安而退王良為沛郡太守至蘄縣稱病不之府官屬皆隨就之良遂上病篤乞骸骨徴拜大中大夫後為大司徒司直以病歸崔篆為建新大尹行縣治獄平理所出二千餘人掾史叩頭諫曰朝廷初政州牧峻刻宥過申枉誠仁者之心然獨為君子將有悔乎篆曰邾文公不以一人易其身君子謂之知命如殺一大尹贖二千人葢所願也遂稱病去張霸為㑹稽太守視事三年謂掾史曰太守起自孤生致位郡守葢日中則移月滿則􅃜老氏有言知足不辱遂上病後徵四遷為侍中郎宗善風角為吳令占知京師當有大火果如其言諸公聞而表上以博士徵之宗耻以占驗見知聞徴書到縣夜置印綬於縣庭而遁去遂終身不仕宗慈為脩武令時太守出自權豪多取貨賂慈遂棄官去孔昱為雒陽令以師喪棄官卒於家檀敷為䝉令以郡守非其人棄官去家無産業子孫同衣而出年八十卒於家一云敷子孫同衣而行并日而食崔駰辟大將軍竇憲掾憲擅權驕恣駰數諫之憲不能容稍疎之因察駰髙第出為長岑長駰自以逺去不得意遂不之官而歸周磐和帝初拜謁者除任城長遷陽夏重合令頻歴三城皆有惠政後思母棄官還鄉里橋𤣥補雒陽左尉時梁不疑為河南尹𤣥以公事當詣府受對耻為所辱棄官還鄉里唐羌為臨武長諌南海獻龍眼荔支和帝從之章報羌即棄官還家不應徴召著唐子三十餘篇李固自議郎出為廣漢雒令至白水關解印綬還漢中白水關今在梁州金牛縣西杜門不交人事楊章為平原令時國相徐曾中常侍璜之兄也章耻與接事託疾牧豕童翊為須昌長聞將舉兄喪棄官孫堪嘗為縣令臣欽若等曰史失縣名謁府趨歩遲緩門亭長譴堪堪便解印綬去不之官巴肅察孝㢘歴慎令貝邱長皆以郡守非其人辭病去楊仁為什邡令行兄喪去官延篤為平陽侯相以師喪棄官奔赴五府並辟不就趙歧為皮氏長會河東太守劉祐去郡而中常侍左悺兄勝代之歧耻疾宦官即日西歸馬融字季長桓帝時為南郡太守忤大將軍梁冀免官後復拜議郎重在東觀著述以病去官吴祐為大將軍梁冀長史冀誣奏太尉李固祐争之不聽遂出為河間相因自免歸家不復仕躬灌園蔬以經書教授荀爽字慈明好學年十二能通春秋論語太尉杜喬見而稱之曰可為人師桓帝延熹九年太常趙典舉爽至孝拜郎中對策陳便宜奏聞即棄官去何休少府豹之子也雅有心思研精六經以列卿子詔拜郎中非其好也辭疾而去陳蕃字仲舉汝南平輿人也刺史周景辟别駕從事以諌争不合投𫝊而去投棄也𫝊謂符也樂已字伯文恢之子為郎中非其好也去官范滂為光祿勲主事時陳蕃為光祿勲滂執公儀詣蕃蕃不止之滂懐恨投板棄官而去後復為太尉黄瓊所辟滂覩時方艱知意不行因投劾去楊倫陳留人為郡文學掾更歴數將志乖於時以不能人間事遂去職皇甫規對策梁冀忿其刺已以為下第拜郎中託疾免歸范冉冉或作丹桓帝時辟太尉府議者欲以為侍御史因遁身逃命於梁沛之間應奉為司頴校尉及黨事起乃慨然以疾自退趙咨靈帝初為博士㑹陳蕃竇武為宦者所誅咨乃謝疾去陳實為太邱長太邱縣屬沛國沛相賦歛違法乃解印綬去吏人追思之孔融辟司徒楊賜府時河南尹何進當遷為大將軍楊賜遣融奉謁賀進不時通融即奪謁還府投劾而去後為侍御史與中丞趙舍不同託疾歸家荀淑為朗陵侯相頃之棄官歸閑居養志劉焉魯恭王後也少任州郡以宗室拜郎中去官居陽城山精學教授田豐辟大尉府舉茂才遷侍御史時閹宦擅朝英賢被害豐乃棄官歸臧洪舉孝㢘為郎選為即丘長靈帝末棄官還家陳重豫章人少與同郡雷義為友俱拜尚書郎義代同時人受罪以此黜退重見義去亦以病免後為細陽令政有異化舉尤異當遷為㑹稽太守遭姊憂去官杜安為宛令先是宛有報讐者其令不忍致理將與俱亡縣中豪強有告其處者致捕得安深疾惡之到官治戮肆之於市懼有司繩彈遂自免鄭泰字公業靈帝末大將軍何進以泰為尚書侍郎遷侍御史為進陳時務之所急數事進不能用乃棄官去荀彧舉孝㢘再遷亢父令董卓之亂棄官歸鄉里邉讓署大將軍何進府令史後以髙才擢進屢遷出為九江太守不以為能也獻帝初平中王室大亂讓去官還家袁忠為沛相天下大亂忠棄官客㑹稽上虞金柔舉孝㢘補尚書右丞董卓之亂棄官而歸魏陶謙漢末為舒令與郡守張磐有隙磐毎欲搆之而謙在官清白無以糾舉祠靈星有贏錢五百欲以贓之謙委官而去杜畿漢末舉孝㢘除漢中府丞㑹天下亂棄官客荆州建安中乃還鍾繇漢末舉孝㢘除尚書郎陽陵令以疾去趙昱漢末舉孝㢘除莒長宣揚五教政為國表㑹黄巾作亂陸梁五郡郡縣發兵以為先辨徐州刺史巴祗表功第一當受遷賞昱深以為耻委官還家杜恕為趙相以疾去官一云恕去京師營宜陽一泉塢因其疊塹之固小大家焉明帝晏駕時人多為恕言者趙儼領章陵太守歳餘遷河北都督䕶軍復以疾去吴劉繇舉孝㢘為郎中除下邑長時郡守以貴戚託之遂棄官去甘寧本南陽人其先客於巴郡寧為吏舉計掾補蜀郡丞頃之棄官歸家范平為臨海太守政有異能孫皓初謝病還家晉易雄舉孝㢘為州主簿别駕自以門寒不宜久處上綱遂謝職還家阮嗣宗辟大尉蔣濟府謝病歸褚翜為冠軍叅軍于時長沙王冏擅權成都河間阻兵于外翜知内難方作乃棄官避地幽州范粲為武威太守以母老罷官郡既接近冦戎粲以重鎮輙去職朝廷尤之左遷樂涫令頃之轉太宰從事中郎後遭母憂以至孝稱孔坦為尚書郎時典客令萬黙領諸胡胡人相誣朝廷疑黙有所偏助將加大辟坦獨不署由是被譴遂棄官歸㑹稽王羲之少與王述相輕及述顯逹羲之為會稽内史述後簡察㑹稽郡辨其刑政主者疲於簡對羲之深耻之遂稱病去郡李豐字宣國舉孝㢘拜蒲坂令以病去官汜騰燉煌人也舉孝㢘除郎中屬天下兵亂去官還家陶侃為武岡令與太守吕岳有嫌棄官歸楊方為司徒王導叅軍自以地寒不願久留京華求補逺郡欲閑居著述導從之上補髙梁太守在郡積年以年老棄郡歸導將進之臺閣固辭還鄉里終於家阮裕成帝咸和初為尚書郎時事故之後公私弛廢裕遂去官還家後即家拜臨海太守少時去職桓𤣥大司馬温之子孝武太元末出補義興太守欝欝不得志嘗登髙望震澤歎曰父為九州伯兒為五湖長棄官歸國沈警字世明謝安命為叅軍警内足於財無進仕意謝病歸安固留不止謝沖晉末為中書侍郎家在㑹稽謝病歸宋謝靈運為永嘉太守既不得志遂肆意遨遊在郡未周稱疾去職從弟晦曜𢎞㣲等並與書止之不從陶潛字淵明潯陽柴桑人有髙節為時所重以親老家貧起為州祭酒不堪吏職少日自解歸州召主簿不就躬耕自資遂抱羸疾謂親朋曰􅂓欲絃歌以為三徑之資可乎執事者聞之以為彭澤令公田悉令吏種秫稻妻子更請種粳乃使一頃五十畆種秫五十畆種粳郡遣督郵至縣吏曰應束帶見之潜歎曰我不能為五斗米折腰向鄉里小人即日解印綬去賦歸去來張茂度為義興太守解職還家阮長之為襄垣令督郵無禮鞭之去職南齊到撝為奉車都尉試守延陵令非所樂去官樂頥有孝行湘州刺史王僧䖍引為主簿以同僚非人棄官去卞彬為上虞令有剛氣㑹稽太守孟顗以令長裁之憤不能容脱幘投地曰我所以屈卿者正謂此幘耳今已投之卿以一世勲門而傲天下國士拂衣而去梁劉縚字言明好學通三禮武帝大同中為尚書祠部郎尋去職不復仕蕭眎素自中書侍郎求為諸暨令到縣十餘日掛衣冠而去陳韋載為輕車將軍太子右衛率文帝天嘉元年以疾去官載有田十餘頃在江乗縣之白山至是遂築室而居屏絶人事吉凶慶弔無所往來不入里門者幾十載大建中卒于家徐孝克天嘉中除郯令非其好也尋復去職章華字仲宗家世業農華獨好學善屬文宣帝大建中髙宗使吏部侍郎蕭引喻廣州刺史馬靖令入子為質引奏華與俱行使還而帝晏駕後主即位朝臣以華素非閥閲競排詆之乃除大市令既雅非所好乃辭以疾而去欝欝不得志後魏李曾趙郡人也辟主簿到官月餘乃歎曰梁叔敬有云州郡之職徒勞人耳道之不行身之憂也遂還家講授北齊李公緒性聰敏博通經傳魏末為冀州司馬以疾去官後以侍御史徴不至後周薛端年十七司空髙乾邕辟為叅軍賜爵平隂男端以天下擾亂遂棄官歸里隋劉炫河間人納言楊逹舉博學有文章射策髙第除太學博士嵗餘以品卑去任唐竇軌隋末為資陽郡東曹掾以亷謹聞後去官歸于家竇威沈深有器局博覽羣言隋煬帝時以其皇后姊壻徴為考功郎數侍宴遊非其所好又見隋政日亂稱病去官杜如晦隋末為滏陽縣尉非其好也後乃棄官歸于鄉里于志寧隋末為冠氏縣長時山東羣盜起棄官歸于鄉里王績絳州龍門人隋大業中應孝悌㢘潔舉授揚州六合縣丞非其所好棄官歸鄉里李淳風父播為髙唐尉秩卑不得志棄官而為道士頗有文學自號黄冠子郝處俊為著作佐郎再轉滕王友耻為王官遂棄官歸耕髙智周為蘭䑓大夫髙宗總章中請假歸葬其父母因謂曰知進而不知退患之道也迺稱疾去職武攸緒為右千牛衛將軍登封年扈從封岳便棄位隱居于嵩山陽劉幽求則天聖厯中應制舉拜閬中尉刺史不禮乃棄官而歸髙子貢和州歴陽人學通五經及史記漢書以明經擢第歴祕書省正字𢎞文館直學士欝欝不得志棄官而歸孫處𤣥為左拾遺中宗神龍初功臣桓彦範等用事處𤣥遺彦範書論時事得失彦範終不用其言乃去官白履中陳留浚儀人也睿宗景雲中為校書郎尋棄官而歸韋況代宗大厯中隱居于嵩山守志樂道不屑于榮利孔述睿深器之及述睿徴拜諫議大夫薦況為右拾遺不起未幾又以起居郎追赴闕廷半嵗棄官東歸徙家于龍門别墅楊憑徳宗貞元中累佐使府徴為監察御史不樂簡束遂求免官李鄘為馬燧河東從事尋以言不行歸養雒中武元衡為華原令時畿輔有鎮軍督將恃恩伐功者多撓吏理元衡苦之乃移病去為沈浮讌詠之遊王正雅為汝州刺史充本州防禦使有監軍中人怙權正雅不能堪遂謝病免李渤為庫部員外郎以章疏切直大忤於時謝病東歸後唐嚴譯為亳州譙縣令母病篤陳假告即時去之歸徳軍節度使奏擅去任大理言嚴譯母疾篤有虧奏辭所屬律文不載詔律既無條釋放李保殷為大理卿未滿秩屢為人所制保殷曰人之多辟無自立辟乃謝病以歸卒于雒陽册府元龜卷八百五
