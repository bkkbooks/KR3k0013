body:
  text: 册府元龜卷六百九十二宋王欽若等撰牧守部招輯小雅鴻雁之作美其能勞來安集使離散者寧其居鰥寡者得其所也若乃總列城之任膺民社之寄或仍嵗凶荒民居流徙或師旅之後瘡痍未復或寇盗羣萃侵擾封部或夷狄狙獷密邇亭障乃能懷輯化誘循撫愛養俾襁負者相屬而至安堵者無改其舊推以恩信兇戾為之革音敦以仁惠殊俗因而欵附下興樂國之詠上有長城之賴斯固道徳齊禮之餘風招擕懐逺之美政也漢王成宣帝時為膠東相流民自占八萬餘占謂隱度名數而來附業也帝下詔褒之爵關内侯事具牧守褒寵門龔遂為渤海太守時渤海左右郡嵗饑盗賊並起遂乘傳至渤海界郡聞新太守至發兵以迎遂皆遣還移書勅屬縣悉罷逐捕盗賊吏諸持鈎鉏田器者皆為良民吏無得問持兵者乃為賊遂單車獨行至府郡中翕然盗賊亦皆罷渤海又多劫畧相随及聞遂教令皆即時解散棄其兵弩而持鈎鉏盗賊於是悉平王尊為益州刺史居部二嵗懐来徼外蠻夷歸附服其威信後漢郭伋光武時為漁陽太守在職五嵗户口增倍後潁川盗賊羣起徵拜潁川太守召見辭謁帝勞之曰賢能太守去帝城不逺河潤九里兾京師幷蒙福也君雖精於追捕而山道險阨自鬬當一士耳深宜慎之伋到郡招懐山賊陽夏趙宏襄城召吳等數百人皆束手詣伋降悉遣歸附農因自劾專命帝美其䇿不以咎之後宏吳等黨與聞伋威信逺自江南或從幽冀不期俱降絡繹不絶夏恭為太山都尉和集百姓甚得其歡心應奉汝南人為郡决曹吏和帝時大將軍梁冀舉奉茂才先是武陵蠻詹山等四千餘人反叛執縣令屯結連年詔下公卿議四府舉奉才堪將帥永興元年拜武陵太守到官慰納山等皆悉降散虞詡安帝時為武都太守先是羌寇武都詡掩擊破之乃占相地勢築營壁二百八十所招還流亡假賑貧人郡遂以安詡始到都户裁盈萬及綏聚荒餘招還流散二三年間遂增至四萬餘户鹽米豐賤十倍于前一云詡始到榖石千鹽石八千見户萬三千視事三嵗米八十塩四百流人還歸郡户數萬人足家給一郡無事汝郁為魯相以徳教化百姓稱之流人歸者八九千户霍諝為金城太守性眀達篤厚能以恩信化誘殊俗甚為羌胡所敬服張喬順帝時為交阯太守先是日南象林徼外蠻夷攻燒城寺殺長吏喬至開示慰誘並皆降散祝良為九真太守單車入賊中設方畧招以威信降者數萬人皆為良築起府寺繇是嶺外復平李固為梁商從事中郎永和中荆州盗賊起彌年不定乃以固為荆州刺史固到遣吏勞問境内赦盗寇前釁與之更始於是賊帥夏密等歛其魁黨六百餘人自縳歸首固皆原之遣還使自相招集開示信法半嵗間餘類悉降州内清平种暠為益州刺史暠素慷慨好立事在職三年宣恩逺夷開曉殊俗岷山雜落皆懐服漢徳其白狼槃木唐菆卭􅈎諸國自前刺史朱輔卒後遂絶暠至乃復舉種向化傅燮為漢陽太守善䘏人叛羌懐其恩化並来降附趙溫為蜀郡太守桓帝之世板楯數反溫以恩信降服之劉虞為幽州刺史轉甘陵相甚得東土戎狄之心又青徐士庶被黄巾之難歸虞者百餘萬口皆収視溫恤為安立生業流民皆忘其遷徙魏何䕫仕漢為長廣太守郡濵山海黄巾未平豪傑多背叛袁譚就加以官位長廣縣人管承徒衆三千餘家為寇害議者欲舉兵攻之䕫曰承等非生而樂亂也習於亂不能自還未被徳教故不知反善若兵迫之急彼恐夷滅必幷力戰攻之既未易拔雖勝必傷吏民不如徐喻以恩徳使各自悔可不煩兵而定乃遣郡丞黄珍往為陳成敗承等皆請服䕫遣使成𢎞領校尉長廣縣丞等郊迎奉牛酒詣郡劉繇仕漢興平中為揚州牧時袁術據淮南繇乃移居曲阿值中國䘮亂士民多南奔繇擕接収養與同憂劇甚得名稱劉表漢末為荆州牧荆州人情好擾加以四方駭震寇賊相扇處處糜沸表招誘有方威懐兼治其姦猾宿賊更為效用萬里肅清大小咸悦而服之關西兖豫學士歸者盖有千數表安慰賑饑皆得資全張既漢末為京兆尹招懐流民興復縣邑百姓懐之鍾繇漢末督關中百事自天子西遷洛陽人民單盡繇徙關中民又招納亡叛以充之數年間民户稍實太祖征關中得以為資表繇為前軍師蘇則漢末為武都太守太祖征張魯過其郡見則悦之使為軍導魯破則綏安下辨諸氐通河西道徙為金城太守是時喪亂之後吏民流散饑窮户口損耗則撫循之甚謹外招懐羌胡得其牛羊以養貧老與民分糧而食旬月之間流民皆歸得數千家乃眀為禁令有干犯者輙戮其從教者必賞親自教民耕種其嵗大豐収繇是歸附者日多杜襲為太祖丞相長史随到漢中討張魯太祖還留督漢中軍事綏懐開導百姓自樂出徙洛鄴者八萬餘口夏侯尚為荆州牧時荆州荒殘外接蠻夷而與吳阻漢水為境舊民多居江南尚自上庸通道西行七百餘里山民蠻夷多服從者五六年間降附數千家劉馥為太祖司徒掾㑹孫䇿所置廬江太守李述攻殺揚州刺史嚴象廬江梅乾雷緒陳蘭等聚衆數萬在江淮間郡縣殘破太祖表馥為揚州刺史馥既受命單車造合肥空城建立州治南懐緒等皆安集之貢獻相繼數年中恩化大行百姓樂其政流民越江南而歸者以萬數梁茂為御史時泰山多盗賊以茂為泰山太守旬月之間襁負而至者千餘家郭淮為雍州刺史安定羌大帥辟蹏反討破降之每羌胡来降淮輙先使人推問其親理男女多少年嵗長㓜及見一二知其欵曲訊問周至咸稱神明正始元年蜀將姜維出隴西淮遂進軍追至彊中維退遂討羌迷當等案撫柔氐三千餘落㧞徙以實關中遷左將軍吕䖍為泰山太守郡接山海世亂聞民人多藏竄袁紹所置中郎將郭祖公孫犢等數十輩保山為寇百姓苦之䖍將家兵到郡開示恩信祖等黨屬皆降服諸山中亡匿者盡出安土業簡其强者補戰士泰山由是遂有精兵冠各州郡蜀王嗣為西安圍督汶山太守綏集羌胡咸悉歸服諸種素桀惡者皆来首降待以恩信時北境得以安静張嶷為越雋太守漢嘉郡界旄牛夷種類四千餘户其率狼路欲為姑壻冬逢報怨遣叔父離將逢衆相度形勢嶷逆遣親近齎牛酒勞賜又令離姊逆逢妻宣暢意㫖離既受賜并見其姊姊弟歡悦悉率所領將詣嶷嶷厚加賞待遣還旄牛繇是輙不為患吳歩隲為交州刺史時益州大姓雍闓等殺蜀所署太守正昻與士燮相聞求欲内附隲因承制遣使宣恩撫納繇是加拜平戎將軍封廣信侯虞潭領廬陵太守綏撫荒餘咸得其所鍾離牧為海南太守揭陽縣賊率曾夏等衆數千人歴十餘年以侯爵雜繒千匹下書購募絶不可得牧遣使慰譬登時首服自改為良民晉魯芝宣帝初為天水太守郡隣於蜀數被侵掠户口減削寇盗充斥芝傾心鎮衞更造城市舊境悉復又為幷州刺史以綏輯有方遷大鴻臚華軼為江州刺史甚有威惠州之豪士接以有道得江表之歡心流亡之士赴之如歸劉𢎞為荆州刺史于時流人在荆州十餘萬尸覉旅貧乏多為盗賊𢎞乃給其田種粮食擢其賢才随資叙用禇翜為丹陽尹時京邑焚蕩人物凋殘翜収集散亡甚有惠政曹攄為襄城太守時襄城屢經寇難攄綏懐振理旬月克服王彪之為㑹稽内史居郡八年豪右歛跡亡民歸者三萬餘口桓宣鎮襄陽宣遣歩騎収南陽諸郡百姓沒賊者八千餘人以歸周處為新平太守撫和戎狄叛羌歸附雍土美之宋張茂度為始興相郡經賊寇廨宇焚燒民物凋散百不存一茂度創立城寺弔死撫傷収集離散民户漸復在郡一周徵為太尉叅軍劉道産為西戎校尉梁南秦二州刺史在州有惠化關中流民前後出漢川歸之者甚多元嘉六年道産表置隴西宋康二郡以領之又為襄陽太守善於臨民在雍部政績尤著蠻夷前後叛戾不受化者並皆順服悉出縁沔為居百姓樂業民户豐贍縣此有襄陽樂歌自道産始也臧熹為臨海太守郡經兵寇百不存一熹綏輯綱紀招聚流散歸之者千餘家陸徽文帝時為長沙内史母憂去職時張尋趙廣為亂于益州兵寇之餘政荒民擾元嘉二十三年乃遣徽為持節益寧二州諸軍事益州刺史隱䘏有方威惠兼著寇盗静息民物殷阜蜀土安悦至今稱之王僧䖍為湘州刺史巴峽流民多在湘土僧䖍表割益陽羅湘西三縣縁江分立湘隂縣從之王景文為江州刺史晉安王子勛起兵以焦度為先鋒及事敗迯宫亭湖中為寇賊朝廷聞其勇甚憂患之使景文誘降度等度將部曲出首景文以為巳鎮南叅軍尋領中直兵厚待之張穆為交阯太守治有異績㑹刺史死交土大亂穆以威懐循拊境内以寧文帝嘉之范述曾為永嘉太守所部横陽縣山谷險峻為逋迯所聚前後二千石討捕莫能息述曾下車開示恩信凡諸凶黨襁負而出編户屬籍者二百餘家自是商賈流通居民安業梁蕭敷初仕齊為随郡内史招懐逺近黎庶安之以為前後之政莫之及也楊公則初自高祖舉義師於雍州以公則為湘州刺史初公則東下湘部諸郡多未賔從及公則還州然後諸屯聚並散湘州寇亂累年民多流散公則輕刑薄歛頃之户口克復為政雖無威嚴然保己廉慎為吏民所悦安成康王秀為郢州刺史時司州叛蠻田魯生弟魯賢超秀據􅀢籠来降髙祖以魯生為北司州刺史魯賢北豫州刺史超秀定州刺史為北境捍蔽而魯生超秀互相讒有去就意秀撫喻懐納各得其用當時賴之王茂為江州刺史時九江新罹軍寇民思反業茂務農省役百姓安之夏侯亶為豫州南豫二州刺史夀春久罹兵荒百姓多流散亶輕刑薄賦務農省役頃之民户充復張纉為湘州刺史州界零陵衡陽等郡有莫傜蠻者依山險為居歴政不賔服至是向化在政四年流人自歸户口增益十萬餘州境大安江革為都官尚書出監吳郡于時境内荒儉劫盜公行革至郡惟有公給仗身二十人百姓皆懼不能静寇及省遊軍尉民下愈恐革乃廣施恩撫明行制令盜賊静息民吏安之臧嚴歴監義陽武寧郡郡界皆蠻夷前郡守常選武人以兵鎮之嚴獨以數門生單車入境羣蠻悦服遂絶寇盗王褒為安城郡守及侯景渡江建業擾亂褒輯寜所部見稱陳沈君理為吳郡守是時兵革未寜百姓荒弊軍國足用咸資東境君理招集士卒修理器械民下悦附深以幹理見稱後魏于栗磾明元帝時為豫州刺史洛陽雖歴代所都久為邊裔城闕蕭條野無煙火栗磾刋闢榛荒勞来安集徳刑既設甚得百姓之心韋閬太武時為武都太守屬告城鎮將郝温及蓋吳反關中擾亂閬盡心撫納所部李祥大武時因南土未賔遣尚書韓元興率衆出青州以祥為軍司畧地至於陳汝淮北之民詣軍降者七千餘户遷之於兖豫之南置淮陽郡以撫之拜祥為太守加綏逺將軍流民歸之萬餘家司馬淮字臣之晉汝南王亮之後為廣甯太守悦近来逺清儉有稱大武嘉之賜布六百疋李佐為輔國將軍行荆州事在州威信大行邊民悦附前後歸之者二萬許家尋為正刺史秦明王翰曾孫禎孝文初為南豫州刺史淮南人相率投附者三千餘家置之城東汝水之側名曰歸義坊韋欣為彭城内史廣陵侯元衍為徐州刺史又請為長史帶彭城内史撫綏内外甚得民和裴宣為益州刺史善於撫綏甚得羌戎之心後晉夀更置益州改宣所莅為南秦州先是有餘平曷酋揚孟孫擁户數萬自立為王通引梁寇數為邊患宣乃遣使招喻曉以逆順孟孫感恩即遣子詣闕武興曷姜謨等千餘人上書乞延更限宣武嘉焉髙綽為豫州刺史為政清平抑强扶弱百姓愛之流民歸附者三千餘户崔鑒為奮武將軍徐州刺史鑒欲安悦新附民有年老者表假以守令詔從之吕羅漢為秦益二州刺史秦益嶮逺南連仇池西接赤水諸羌恃嶮數為叛逆自羅漢莅州撫以威惠西戎懐徳士庶帖然伊利為兖州刺史善撫導在州數年邊民歸之五千餘户武昌簡王平原為齊州刺史善于懐撫邊民歸附者千有餘家臨淮王昌弟孚為冀州刺史先是州人張孟都張洪建馬潘崔獨憐張叔緒崔醜張天宜崔思哲等八家皆屯保林野不臣王命州郡號曰八王孚至皆請入城願致死效力京兆王子推為征南大將軍長安鎮大將性沉雅善于綏接秦雍之人皆服安豐王猛子延明為都督徐州刺史頻經師旅人物彫殘延明招擕新故人悉安業百姓咸附尉諾為幽州刺史時改邑遼西燕土亂久民户彫散諾在州前後數十年還業者萬餘家裴慶孫為邰郡太守當郡都督民經賊亂之後率多逃竄慶孫務安集之咸來歸附李仲璇為𢎞農太守先是宫牛二姓阻險為害仲璇示以威惠並即歸伏房景伯為清河太守郡民劉簡武曾失禮於景伯聞其臨郡闔家逃亡景伯督切屬縣追捕擒之即署其子為西曹掾命喻山賊賊以景伯不念舊惡一時俱下論者稱之劉藻莊帝永安中為南郡主書號為稱職時北地諸羌數萬家恃嶮作亂前後牧守不能制姦異之徒並相依附朝廷患之以藻為北地太守藻推誠布信諸羌咸来歸附藻稽其名籍収其賦税朝廷嘉之劉桃符為豫州刺史善撫蠻夷為吏民所懐裴他為荆州刺史蠻酋田盤石田敬宗等部落萬餘家恃衆阻險不賔王命前後牧守雖屢征討未能降欵他至州單使宣慰示以禍福敬宗等聞他夙徳相率歸附於是合境清晏寇賊寢息邊民懐之襁負而至者千餘家李洪之為秦益二州刺史赤葩渴郎羌深居山谷雖相覊縻王人罕到洪之芟山為道廣十餘歩示以軍行之勢乃興軍臨其境山人驚駭洪之將數十騎至其里閭撫其妻子問所疾苦因資遺之衆羌喜悦求編課調所入十倍于常史寧為東義州刺史州既隣接疆塲百姓流移寧留心撫慰咸来復業崔孝暐為趙郡太守郡經葛榮離亂之後民户喪亡六畜無遺斗粟乃至數縑民皆賣鬻兒女夏椹大熟孝暐教民多収之郡内無牛教其人種招撫遺散先恩後威一周之後民大至司馬􅒨字遵府西魏大統六年為北徐州刺史八年入朝文帝嘉之特蒙賞勞頃之河内有四千餘家歸附並􅒨之鄉舊乃命領河内郡守令安集流人北齊尉長命為幽州刺史居北陲土荒民散長命雖多聚歛然以恩撫民多得安集堯雄為瀛州刺史時禁網踈濶官司相與聚歛惟雄義然後取復能接下以恩甚為吏民所懐附盧潜文帝天保中為揚州道行臺左丞先是梁將王琳為陳兵所敗擁其主蕭莊歸夀陽朝廷以琳為揚州刺史勅潜與琳為南討經畧琳部曲義故多在揚州與陳寇鄰接潜輯諧内外甚得邊俗之和源文宗孝昭皇建中為涇州刺史以恩信待物甚得邊境之和為鄰人所欽服前攻破鈔掠多被放還獨孤永業為洺州在河南善于招撫歸降者萬計選其魁為爪牙元景安後主天統中為豫州刺史景安之在邊州鄰他境綏和邊鄙不相侵暴人物安之又管内蠻多華少景安被以恩威咸得寧輯比至武平末招慰生蠻輸租賦者數萬户後周長孫儉從太祖平侯莫陳悦為秦州長史時西夏州仍未内屬而東魏遣許和為刺史儉以信義招之和乃舉州歸附即以儉為西夏州刺史總統三夏州王雅為汾州刺史勵精為治人庶悦而附之自逺至者七百餘家元偉為成州刺史政尚清静百姓悦附流民復業者三千餘家楊雄為平州刺史時寇亂之後户多逃散雄在所慰撫民並安輯元定為政州刺史威信兼濟甚得豪羌之情生羌據險不賔者至是並出山谷從征賦焉及代還羌豪等咸戀慕之劉璠為同和郡守璠善於撫慰莅職未期生羌降附者五百餘家辛昻為渠州通州刺史昻推誠布信甚得夷獠歡心秩滿還京首領皆随昻詣闕朝覲以昻化洽夷落進位驃騎大將軍開府儀同三司梁昕為東荆州刺史昕撫以仁惠蠻夷悦之流民歸者相繼而至賀蘭祥為荆州刺史先是祥嘗行荆州事雖未期月頗有政惠至是重往百姓安之由是漢南流民襁負而至者日有十數逺近蠻夷莫不欵附祥随機撫納咸得歡心閻慶為河州刺史州居河外地接戎夷慶留心撫納頗稱簡惠尉遲運為隴州刺史地帶汧渭民俗難治運垂情撫納甚得時譽泉仲遵為南洛州刺史留情撫接百姓安之流民歸附者相繼而至初蠻帥杜青和自稱巴州刺史以州入附朝廷因其所據而授之仍𨽻東都青和以仲遵善於撫御請𨽻仲遵朝議以山川非便弗之許也青和遂結安康酋帥黄仲寳等舉兵圍東梁州復遣王雄討平之改巴州為洵州隸于仲遵先是東梁州刺史劉孟良在職貪婪民多背叛仲遵以廉簡處之羣蠻率服韋世康為司州總管長史于時東夏初定百姓未安世康綏撫之士民胥悦趙芬為能州刺史撫納降附得二千户加開府儀同三司隋王長述初仕後周為廣州刺史甚有威惠吏人懐之在任數年蠻夷歸之者三萬餘户朝議嘉之就拜大將軍令狐熙開皇初為滄州刺史時山東承齊之弊户口簿籍類不以實熙曉喻之令自歸首至者一萬户在職數年風化大洽稱為良二千石髙祖以嶺南夷越數為反亂徵拜桂州總管十七州諸軍事許以便宜從事熙至部大𢎞恩信其溪洞渠帥更相謂曰前時總管皆以兵威相脅今者乃以手教相諭我輩其可違乎於是相率歸附衞𤣥仁夀初為衞尉少卿㑹山獠作亂出為資州刺史以鎮撫之𤣥既到官時獠攻圍太牢鎮𤣥單騎造其營謂羣獠曰我是刺史銜天子詔安養汝等勿驚懼也諸賊莫敢動於是説以利害渠帥感悦解兵而去前後歸附者十餘萬口高祖大悦賜縑二千疋除遂州總管仍令劍南安撫劉權大業中為南海太守行至鄱陽㑹羣盗起不得進詔令權召募討之權率兵與賊相逢不與戰先乘單舸詣賊營説以利害而羣賊感悦一時降附煬帝聞而嘉之慕容三藏大業末為廓州刺史州極西界與吐谷渾鄰接姦宄犯法者皆遷配彼州流人多有逃逸及三藏至招納綏撫百姓愛悦襁負而至吏民謌頌之丘和為交阯太守撫諸豪傑甚得蠻夷之心唐韋仁夀隋大業末為蜀郡司法書佐高祖入關遣使定巴蜀使者承制拜仁夀嶲州都督府長史時南寧州内附朝廷每遣使安撫類皆受賄邉人患之或有叛者髙祖以仁夀素有能名令檢校南寧州都督寄聽政於越嶲使每嵗一至其地以撫慰之仁夀將兵五百人至西洱河承制置八州十七縣授其豪帥為牧宰法令肅清人懐歡心劉政㑹武徳初以衞尉少卿留守太原内輯軍士外和戎狄逺近莫不悦服趙王元景武徳中為安州大都督其舊安陸都民隋末流宕他所者皆歸之陳君賔貞觀元年累轉鄧州刺史郡邑喪亂以後百姓流離君賔至纔期月皆来復業二年天下諸州並遭霜澇君賔一境獨免當年多有儲積蒲虞等州户口盡入其境逐食太宗下詔勞之党仁𢎞貞觀初授南寧州都督夜郎之表聲教乆絶仁𢎞下車招撫逺近安輯李素立貞觀中累轉揚州大都督府司馬時突厥鐵勒部相率内附太宗於其地置瀚海都䕶府以統之以素立為瀚海都䕶又有闕泥孰别部猶為邊患素立遣使招諭降之夷人感其惠牽牛以饋素立素立惟受其酒一盃餘悉還之為建立廨舎開置屯田崔知溫髙宗時為蘭州刺史㑹有黨項三萬餘衆来寇州城城内勝兵既少衆大懼不知所為知溫使開城門延賊賊恐有伏不敢進俄㑹將軍權善才率兵来救大破黨項之衆餘首領乞降欲盡坑之以絶後患知溫力語其下曰弗逆克奔古之善戰誅無噍類禍及後世且山谷峥嶸草木幽蔚萬一變生悔之何及善才然其計又欲分降者五百人以與知溫知溫曰向論安危之䇿乃公事也豈圖私利哉固辭不受黨項餘衆繇是悉皆降附馮元常則天時授眉州刺史劍南先時火光賊夜掠居人晝潜山谷元常至喻以恩信許其首露仍切加捕逐賊徒捨器仗靣縛自陳者相繼又轉廣州都督便道之任不許詣都尋屬安南首領李嗣仙殺都䕶劉延祐剽陷州縣勅元常討之率士卒濟南海先馳檄示以威恩喻以禍福嗣仙徒黨多相率歸降因縱兵誅其魁首安慰居人而還裴懐古則天時始安賊歐陽倩擁徒數萬剽陷州縣授懐古桂州都督仍充招慰討擊使纔及嶺飛書招誘示以禍福賊徒迎降自陳為吏人侵逼乃舉兵爾懐古知其誠懇乃輕騎以赴之左右曰夷獠難親未可信也懐古曰吾仗忠信可通于神明况于人乎因造其營以慰喻之羣賊喜悦歸其所掠財貨納于公府諸洞酋長素持兩端者盡皆欵附嶺外悉定薛登本名謙光中宗時檢校常州刺史屬宣州狂寇鍾大臣作亂百姓奔走謙光嚴備安輯合境肅然在官未期流人稍復雞犬之音復相接矣宋慶禮開元中累遷貝州刺史仍為河北支度營田使初營州都督府置在栁城控帶奚契丹則天時都督趙文翽政理乖方兩蕃反叛攻陷州城其後移于幽州東二百里漁陽城安置開元五年奚契丹各欵塞歸附𤣥宗欲復營州于舊城侍中宋璟固争以為不可獨慶禮盛陳其利乃詔慶禮及太子詹事姜師度左驍衞將軍邵宏等充使更于栁城築營州城興役三旬而畢俄拜慶禮御史中丞兼檢校營州都督開屯田八十餘所追㧞幽州及漁陽淄靑等户并招輯商胡為立店肆數年間營州倉廩頗實居人漸殷鮮于叔明代宗永泰大厯間為東州節度使兵荒之後彫殘頗甚叔明理之近二十年招撫其甿庶夷落皆獲安集張延賔大厯二年拜河南尹充諸路營田副使河雒久當兵衝閭井邱墟延賔勤身率下政尚簡約疏導河渠修築宫廟數年間流庸歸附邦畿復完詔書褒美之崔灌大歴中為澧州刺史下車削去煩苛以安人為務居二年風化大行流亡襁負而至增户數萬韓滉徳宗建中初繼為蘇州潤州刺史安輯百姓均其租税未及踰年境内稱理張建封興元初為亳夀廬等三州觀察使大修葺城池悉心綏撫逺近悦附袁滋貞元中出為華州刺史中丞潼關防禦鎮國軍使以寛易清簡為政百姓有至自他境者皆給地以居曰義合里専以慈惠為本人甚愛之曲環貞元中為陳許觀察使時陳許州以李希烈擾亂遭剽頗甚人多逃竄他邑以避禍環勤身恭儉賦役均平政令寛簡不三二嵗襁負而歸者相屬訓農理戎兵食皆豐羡殷侑為滄景節度觀察等使時滄州百戰之餘野無人煙侑至之日以仁惠為理襁負而歸者衆焉姜謩為秦州刺史至州撫以恩信盗賊悉来歸首士庶安之馬植文宗開成中為安南都護上言當管覊縻州首領或處巢穴自固為南蠻所誘久不招喻事有可虞臣自到鎮約以信誠曉之逆順今諸首領懇發忠言願納賦税其武陸管伏請改為武陸州從之梁韓建初仕唐為華州刺史河潼經大寇之後户口流散建披荆棘闢汙莱勸課農事樹植蔬果出入閭里親問疾苦不數年流亡畢集軍民充實趙充裕唐末領亳鄭二州刺史時關東藩鎮方為蔡寇所毒黎元流散不能相保充裕妙有農戰之備復善于綏懐民賴而獲安者衆太祖表為河南節度使成汭為荆州節度使是時荆州經巨盗之後居民纔一十七家汭撫輯凋殘勵精為理通商務農勤於惠養比及末年僅及萬户時韓建披荆棘以輯華州亦善於綏撫故其時號北韓南郭郭即汭舊冒之姓也張歸厚權知洺州是郡嘗兩為晉人所陷井邑蕭條歸厚撫之數月之内民庶翕然太祖自鎮定還覩其輯理之政大嘉賞之高季興為荆南兵馬留後荆州自唐乾符之後兵火互集井邑不完季興招輯離散流民歸復太祖嘉之乃授節鉞謝瞳為宣義軍留後在滑州十三年部内增户約五萬益兵數千人後唐李嗣昭為潞州節度使被圍歴年城中士民饑死大半廛里蕭條嗣昭緩法寛租勸農務穡一二年間軍城完集三面隣於敵境寇鈔縦横設法枝梧邊鄙不聳李存賢為磁州刺史磁與晉絳接境存賢招懐控撫頗得鄰和漢王周初仕晉為涇州節度使先是前帥張彦澤在任苛虐部民逃者五千餘户及下車革前弊二十餘事逃民歸復賜詔褒美周劉禧廣順初為單州刺史自之任招復逃户二千四百六十七翟光鄴廣順中為青州防禦使時郡民䘮亡十之六七而招懐撫喻視之如傷故期月之間流亡再集册府元龜卷六百九十二
