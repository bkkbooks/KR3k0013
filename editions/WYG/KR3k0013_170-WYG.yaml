body:
  text: 册府元龜卷一百七十宋王欽若等撰帝王部來逺古者天子守在四夷修其教不易其俗故曰率土之濵莫非王臣要在其勞來安輯示以洪覆日月攸燭咸俾遂性者粤自舜敷文德聿來不庭柔服之道於兹著矣三代而下威惠竝舉用捨有術然綏懐撫接務廣仁恕其揆一也故有漸諸聲教列於侯服恱以玩好用示覊縻或因其欵塞處之善地或恤其懐土俾還所屬始乃敦諭犒勞接以賓儀終乃優秩厚幣申之恩紀至于拯濟災暴救育艱辛振厥匱乏通其貿易惠周於存沒德柔於荒絶是故重譯而至咸即其序實聖人之鴻化也舜命禹征有苗三旬苖民逆命旬十日也以師臨之一月不服責舜不先有文誥之命威讓之辭而使憚之以威脅之以兵所以生辭益贊于禹曰惟德動天無逺弗届贊佐届至也益以此義佐禹欲其修德致逺滿招損謙受益時乃天道自滿者人損之自謙者人益之是天之常道帝初于歴山往于田日號泣于旻天于父母仁覆憫下謂之旻天言舜初耕于歴山之時為父母所疾日號泣于旻天及父母克己自責不責于人負罪引慝祇載見瞽瞍䕫䕫齊慄瞽瞍亦允若慝惡載事也䕫䕫悚懼之貌言舜負罪引惡以事見于父悚懼齊莊父亦信順之言能以至誠感頑父至諴感神矧兹有苖諴和矧况也至和感神况有苖乎言易感禹拜昌言曰俞班師振旅昌當也以益言為當故拜受而然之遂還師兵入曰振旅言整衆帝乃誕敷文徳逺人不服大布文徳以來之舞干羽于兩階干楯羽翳也皆舞者所執修闡文教舞文舞于賔主階間抑武事也七旬有苖格討而不服不討自來明御之者必有道三苖之國左洞庭右彭蠡在荒服之列去京師二千五百里漢髙祖初封須無為陸量侯詔以為列諸侯自置吏令長受命長沙王秦始皇本紀所謂陸量地取為桂林郡者也武帝元狩二年秋匈奴渾邪王盡將其衆渡河降者數萬人號稱十萬既至長安天子所賞賜數十鉅萬封渾邪王萬户為漯隂侯漯隂平原縣漯隂封其禆王呼毒尼為下麾侯呼毒尼胡王名㢈疪音膺仳禽黎為河綦侯一作烏黎大當户調雖為常樂侯一作稠睢四年夏大將軍衛青將四將軍擊走單于於幕北先是衛尉張騫坐後期贖為庶人帝數問騫大夏之屬騫既失侯因曰臣居匈奴中聞馬孫王號昆莫昆莫父難兜靡本與大月氏俱在祁連燉煌間小國也大月氏攻殺之昆莫後攻破大月氏大月氏西走昆莫因留居今單于新困於漢而昆莫地空蠻夷戀故地又貪漢物誠以此時厚賂烏孫招以東居故地漢遣公主為夫人結昆弟其勢宜聽言事事聽從於漢則是斷匈奴右臂也既連烏孫自其西大夏之屬皆可招來而為外臣天子以為然拜騫為中郎將將三百人馬各二匹牛羊以萬數齎金幣帛直千鉅萬多持節副使為騫副而各令持節道可便遣之旁國騫既至烏孫致賜諭指以天子意指曉告之未能得其决騫即分遣副使使大宛康居月氏大夏烏孫發譯道送騫道讀曰導與烏孫使數十人馬數十匹報謝與騫相隨而來報謝天子因令窺漢知其廣大騫還拜為大行歲餘騫卒後歲餘其所遣副使通大夏之屬者皆頗與其人俱來於是西北國始通於漢矣又帝遣從票侯乃趙破奴也擊破姑師虜樓蘭王而大宛諸國發使隨漢使來是時帝方數廵狩海上廼悉從外國客大都多人過之則散財帛賞賜厚具饒給之以覽視漢富厚焉視讀曰示言示之令其觀覽大角氐氐丁禮切解在武紀出竒戲諸怪物多聚觀者聚都邑人令觀㸔以誇示之觀音工喚切行賞賜酒池肉林令外國客徧觀各倉庫府藏之積欲以見漢廣大傾駭之見顯示及加其眩者之工而角氏奇戲歳增變其益興自此始而外國使更來更去遞互來去前後不絶更工衡切大宛以西皆自恃逺尚驕恣未可詘以禮覊縻而使也宣帝神爵二年五月置金城屬國以處降羌三年匈奴日逐王畔單于將衆來降䕶鄯善以西使者鄭吉迎之既至漢封日逐王為歸徳侯吉為安逺侯乃因使吉并䕶北道號曰都䕶甘露二年十二月呼韓邪單于欵五原塞欵叩也願朝三年正月㑹正旦之朝賀也帝遣車騎都尉韓昌迎發過所七郡郡二千騎為陳道上所過之郡每為發兵陳列於道以為寵衛也單于正月朝天子于甘泉宫留月餘遣歸國遣長樂衛尉髙昌侯董忠車騎都尉韓昌將騎一萬六千又發邊郡士馬以數千送單于出朔方鷄鹿塞在朔方潭縣北哀帝建平四年匈奴烏珠留單于願朝五年時帝被疾或言從上游來厭人自黄龍竟寜時單于朝中國輙有大故帝繇是難之以問公卿亦以為虚費府帑可且勿許單于使辭去未發黄門郎揚雄上書諫之書奏帝寤焉召還匈奴使者更報單于書而許之單于未發㑹疾復使使願朝明年故事單于朝從名王以下及從者二百餘人單于又上書言蒙天子神靈人民盛壯願從五百人入朝以明天子盛徳皆許之後漢光武建武六年令歸徳侯劉䬃使南匈奴匈奴亦遣使來獻帝復令中郎將韓統報命賂遺金幣以通舊好而單于驕踞自此冐頓對使者辭語悖慢帝待之如初二十五年十月夫餘王遣使奉貢帝厚答報之於是使命遂通明帝即位西羌燒何豪有婦人比銅鉗者年百餘歲多智筭為種人所信皆從取計策時為盧水胡所撃比銅鉗乃將其衆來依郡縣種人頗有犯法者臨羌長收繫比銅鉗而誅殺其種六七百人帝憐之乃下詔曰昔桓公伐戎而無仁惠故春秋貶曰齊人今國家無徳恩不及逺羸弱何辜而當并命夫長平之暴非帝者之功咎繇太守長吏妄加殘戮比銅鉗尚生者所在致醫藥養視今招其種人若欲歸故地者厚遣送之其小種若束手自詣欲効功者皆除其罪若有逆謀為吏所捕而獄狀未斷悉以賜有功者和帝永元三年北單于弟左鹿蠡王於除鞬自立為單于衆八部二萬餘人來歸蒲類海上遣使欵塞以耿䕫為中郎將持節衛䕶之桓帝延熹元年十二月南單于諸部竝畔遂與烏桓鮮卑冦緣邊九郡以張奐為北中郎將討之單于諸部悉降奐以單于不能統理國事乃拘之止立左谷蠡王帝詔曰春秋大居正車兒一心向化何罪而黜其遣還庭臣欽若等曰車兒單于名也魏文帝黄初三年三月鄯善龜兹于闐遣使奉獻詔曰西戎即叙氐羌來王詩書美之頃者西域外夷竝欵塞内附塞關東欵叩也從服其遣使者撫勞之是後西域遂通置戊巳校尉明帝景初二年六月倭女王遣大夫難升米等詣帶方郡求見天子朝獻太守劉夏遣吏將送詣京都其年十二月詔書報倭女王曰詔制親魏倭王卑彌呼帶方太守劉夏遣使送汝大夫難升米次使都市牛利奉汝所獻男生口四人女生口六人斑布二丈二尺以到汝所在踰逺乃遣使貢獻是汝之忠孝我甚哀汝今以汝為親魏倭王假金印紫綬裝封付帶方太守假授汝其綏撫種人勉為孝順汝來使難升米牛利涉逺道路勤勞今以難升米為率善中郎將牛利為率善校尉假銀印青綬引見勞賜遣還今以絳地交龍錦五疋絳地縐粟􅄢十張蒨絳五十疋紺青五十疋答汝所獻貢直又特賜汝紺地勾文錦三疋細斑華􅄢五張白絹五十疋金八兩五尺刀二口銅鏡百枚真珠鉛丹各五十斤皆裝封付難升米牛利還到録受悉可以示汝國中人使知國家哀汝故鄭重賜汝好物也至齊王正始元年太守弓遵遣建中校尉梯雋等奉詔書印綬詣倭國拜假倭王并齎詔賜金帛錦􅄢刀鏡綵物倭王因使上表答謝詔恩後魏太武太延二年二月遣使者十餘軰詣高麗東夷諸國詔諭之文成和平元年六月河西叛胡詣長安首罪遣使者安慰之獻文時伊吾王唐契子𤣥逵性果毅有父風與叔父和歸闕俱為上客拜安西將軍晉昌公孝文時爾朱新興居於爾朱川世為酋長帝以為右將軍及遷雒後特聽冬朝京師夏歸部落延興五年蠕蠕求通婚聘有司以其數犯邉請絶其使發兵討之帝曰蠕蠕譬若禽獸貪而無義朕要以誠信待物不可抑絶也太和元年蠕蠕遣使來獻良馬貂裘其使稱伏承天朝珍寳華麗甚積求一觀之乃勑有司出御府珍玩金玉文綵噐物御廐文馬奇異禽獸及人間所宜用者列之市肆令其歴觀其使曰大國富麗一生所未見也宣武延昌三年十月詔驍騎將軍馬義舒喻蠕蠕孝明神龜元年三月秦州氐反遣龍驤將軍崔襲持節喻之正光元年十二月壬子詔曰蠕蠕王阿那瓌遭罹冦禍逺來投庇邦分衆析猶無定主而永懐北風思還綏集啟訴情切良用愍然夫存亡恤敗自古通典可差國使及彼前後三介與阿那瓌相随并勑懐朔都督簡驍騎二千躬自率䕶送逹境首令觀機招納若彼候迎宜錫筐篚車馬之屬務使優隆禮餞而返如不容受任聽還闕其行裝資遣付尚書量給隋髙祖時突厥雍虞閭為玷厥舉兵攻染干盡殺其兄弟子姪遂渡河入蔚州染干夜以五騎與隋使長孫晟歸朝上令染干與雍虞閭使者因頭特勒相辯詰染干辭直上乃厚待之又雍虞閭弟都速六棄其妻子與突利歸朝帝嘉之勅染干與都速六樗蒲稍輸以寳物用慰其心開皇末契丹别部四千餘家背突厥來降帝方與突厥和好重失逺人之心悉令給糧還本蕃勑突厥撫納之固辭不去煬帝大業三年親廵雲中八月幸啟民可汗所居先是髙麗私通使啟民所啟民推誠奉國不敢隠境外之交是日將髙麗使人見勑令牛𢎞宣㫖諭之曰朕以啟民誠心奉國故親至其所明年當往涿郡爾還口語髙麗王知宜早來朝勿自疑懼存育之禮當同於啟民如或不朝必將啟民廵行彼土使人甚懼九月至東都黄門侍郎裴矩以蠻夷朝貢者多諷帝令都下大戲徵四方奇技異藝陳於端門街衣綿綺珥金翠者數萬人勒百官及居民士女列坐棚閣而縱覽焉皆被服鮮麗終月乃罷又令三市店肆皆設幃帳盛酒食遣掌藩率蠻夷與民貨易所至之處悉令邀延就坐醉飽而散蠻夷嗟嘆謂中國為神仙也十一年春正月乙卯大㑹蠻夷設魚龍曼延之樂頒賜各有差唐髙祖武徳二年閏二月詔曰畫野分疆山川限其内外遐荒絶域刑政殊於函夏是以昔王御世懐柔逺人義在覊縻無取臣屬渠捜即叙表夏后之成功越裳重譯美周邦之長筭有隋季世黷武耀兵萬乗疲於河源三年伐於遼外構怨連禍力屈貨殫朕祗膺寳圖撫臨四極悅近來逺追革前弊要荒藩服宜與和親其吐谷渾已修職貢髙句麗逺送誠欵契丹靺鞨咸求内附因而鎮撫允合機宜分命行人就申好睦靜亂息民於是乎在布告天下明知朕意五年賜髙麗王建武書曰朕恭膺寳命君臨率土祗順三靈柔懐萬國普天之下情均撫字日月所炤咸使人安王既統攝遼左世居藩服思禀正朔逺修職貢故遣使者䟦渉山川申布懇誠朕甚嘉輯方今六合寜宴四海清平玉帛既通道路無壅方申輯睦永敦聘好各保疆埸豈非盛美但隋氏季年連兵構難攻戰之所各失其萌遂使骨肉乖離室家分析多歴年歲怨曠不申今二國通和義無阻絶在此所有髙麗人等已令追括隨即遣送彼處有此國人者王可放還務盡綏育之方共𢎞仁恕之道於是建武悉捜括華人以賓禮相送前後至者萬數帝大喜七年七月康國曹國竝遣使來朝髙祖以二國逺至勞之甚厚康國使者羅什支頓首曰陛下聖徳逺被臣故不逺萬里曹國使者曰臣本國以臣為徤兒聞秦王神武願在麾下髙祖大悅因厚遇之太宗貞觀元年以百濟為髙麗閉其道路又與新羅世為讐敵數相侵伐賜其玉璽書曰王世為君長撫有東蕃海隅遐曠風濤難阻忠欵之至職貢相尋尚想徽猷甚以嘉慰朕自祗承寵命君臨區宇思𢎞正道愛育黎元舟車所通風雨所及期之遂性咸使人安新羅王金真平朕之蕃臣王之隣國每聞遣師征討不息阻兵安忍殊乖所望朕已對王姪信福及髙麗新羅使令具勅通和咸許輯睦王必須忘彼前怨識朕本懐共篤隣情即停兵革因遣使奉表陳謝十月阿史那社爾朱欵塞歸附爾朱突厥處羅可汗第二子也其叔故吉利黷於用兵頡利既敗其部下立社爾為都布可汗以逼延陁太宗嘉其忠節授左驍衛大將軍妻以南陽長公主拜駙馬都尉十四年三月流鬼國遣使朝貢其國去京師萬五千里南與莫曳靺鞨隣接未嘗通聘中國至是三重譯而來帝嘉其逺慕朝化以其使餘志為騎尉十九年七月詔曰西戎賢相寵光秦册北夷嗣子榮珥漢貂覊以長纓用表𤣥功之大掩兹宏網式昭天覆之寛髙麗位頭大兄理大夫後部軍主髙延壽大兄前部軍主髙惠真等并馬韓酋長鯷海英髦分羲景於扶桑數鍾天厭竊封疆於孤竹自貽神怒臨危轉禍率衆來降申其膝行之敬成其面縳之禮向風舉踵良足可嘉咸宜收其俊才嗣鳥官於郯子錄其成效映龜組於梅鋗延壽可鴻臚卿惠真可司農卿二十年十二月戊寅鐡勒回紇俟利發等諸姓竝詣闕朝見帝謂之曰汝來歸我領得安存猶如䑕之得窟魚之得水不知夫我窟及水能容汝否縱令不能容受我必為汝大作窟深作水以容受汝等又云蒼蠅之飛不過一二尺及附驥尾日行千里何以致然為所托處逺我今為天下主無問中國及四夷皆養活之不安者我必令安不樂者我必令樂還如驥之受蠅隨其逺近不勞蠅身自然逺去是月庚辰宴回紇等于芳蘭殿恩賜甚渥仍勑所司加禮供給每五日一㑹二十一年正月以鐡勒回紇部置澣海都督置金微都督府㧞野右部置幽陵都督府同羅部置龜林都督府思結部置盧山都督府吐渾部置臯蘭州斛薩部置髙闕州奚結部置鷄鹿山阿鐵部置鷄鹿州契苾羽部置榆溪州思結部置蹛林州白霫部置寘顔州鐡勒等諸部其渠帥各率所部歸附竝列地為州即其酋長為刺史其都督竝給𤣥金魚符金字先是帝擊破突厥其蕃望子弟多授以侍衛之官沙漠之人素愛錦􅄢帝既招來遐域將賜其所好者因錦文所用舊縷而錯綜其色花葉翔走事各殊形或將班賜近蕃酋首大為榮寵鐡勒等之來也帝賜其金銀噐物及綾錦各有數帝又親賫其緋黄地瑞錦褾領袍鐡勒等覩而驚駭以為未嘗聞見捧戴拜謝盤呌於塵埃中及還帝御天成殿陳十部樂宴而遣之設髙坫於殿前置銀缾於坫上自左内閣濳流酒泉通坫脚而涌入殿前缾中又置大銀盆其實百斛傾缾注於盆中鐡勒數千人不飲其半雜類驚駭私相謂曰天子賜我曹此缾還部落中傾之豈不常足酒也又詔文武五品已上令外厨給酒胾於尚書都堂以餞之回紇等奏奴身僻在逺野無人之地歸身聖化天至尊賜與奴等官職雜物殺身不能以報奴等既為百姓於天至尊處徃來向父母邉一種總請於回紇以南突厥以北開一道呼為參天至尊道乃詔司徒長孫無忌司空房𤣥齡等與共籌之宜逐水草量置郵驛總六十八所各有羣馬酒肉以供過使并請解作文奏人擬為表疏每歲貢貂皮以充賦是月西趙首領趙磨率所部萬餘户内附以其地為明州二十二年西蕃沙鉢羅葉䕶率衆歸附以其俟斤屈裴禄為忠武將軍四月西寳厥泥伏沙鉢羅葉䕶阿史那賀魯率衆内屬於庭州拜為左驍衛大將軍賜其所部繪帛有差髙宗龍朔三年六月戊申遣左武衛大將軍蘇定方率兵往凉州以安集吐谷渾咸亨三年二月吐谷渾慕容諾曷鉢部落自涼州徒於鄯州浩舋浩音誾舋音門河之南發兵以送之既屬吐蕃熾盛諾曷鉢不安其居又鄯州地窄尋徙於靈州之境置安樂州以諾曷鉢為刺史其吐谷渾故地竝沒于吐蕃九月置靜州以處内附黨項部落儀鳳二年二月丁巳工部尚書髙臧加授遼東都督封朝鮮郡王遣歸安東府安輯髙麗餘衆先有編附諸州髙麗悉放還本蕃司農卿扶餘隆為光禄大夫太常員外卿加授熊津州都督帶方郡王亦令安輯百濟餘衆仍移安東都䕶府于新城以統之時百濟本地荒毁特令寄於髙麗之境中宗即位遣侍御史張行岌往招慰靺鞨渤海郡王大祚榮𤣥宗先天二年遣郎將崔訢往册拜渤海大祚榮左驍衛員外大將軍渤海郡王仍以其所統為忽汗州都督自是每歲遣使朝賀開元二年正月癸巳奚饒樂郡王李大酺等來朝帝謂之曰卿等為朕外蕃欵誠夙著爰初内屬職貢相仍往縁任寄非才拙于綏撫因使卿等猜貳頗成阻絶而能不忘本翻然改圖所覽獻書具知至懇大酺將尚縣主失和又遣近親竝自邊隅同臻雒邑朕今與卿等相見喜慰良深閏二月突厥黙啜之壻大拔頡利發名阿異失與其妻來奔封燕山郡授左衛員外大將軍許于澤潞州編附六月丁卯北庭大都䕶澣海軍使那獻梟都擔首獻於闕下并擒其孥及胡禄等部落五萬餘帳内屬帝降書謂獻曰十姓部落比多欵附蕞爾都擔獨為背誕卿以忠果令其討伐遂斬首喪元并兒及婦兼復胡禄屋闕啜等五百餘帳壺漿塞陌襁負而來自非信著逺蕃何以翕然至此邊陲寜謐繄卿是頼雖鄭吉之䕶南道班超之臨西域無以過焉十一月丙申詔曰北戎為患南牧是膺叛而伐之服而捨之春秋格言是謂通典葛邏禄隂山都督部落驕天縱毒候月為妖桀驁之心久矣脅從之禍深矣而冐其㩦阻思我恩化來七旬而就格逾萬里而歸誠啔顙邊陲披肝塞下宜令左散騎常侍觧琬攝御史大夫持節往北庭宣慰突厥部落縁邊降户要在便宜處分三年四月乙卯三姓葛邏禄率衆歸國璽書慰之曰三姓葛邏禄首領散爛俟斤等冐渉逺來竝平安好卿等一被驅率多歴歲年遂背逆輸忠間行歸國言念誠節嘉賞良深緣彼部落初來已令逐便安置卿等來目大首領及將士已下竝得安穩與否所有事意具狀奏來十月授北蕃投降九姓思結都督磨散為左威衛將軍大首領觧薛移利殊功為右領軍衛將軍及都督邪没施為右威衛將軍匐利羽都督莫賀突黙為右驍衛將軍首領延陁薛渾逵都督為右威衛將軍奴賴大首領前白登州刺史奴賴孝為左領軍將軍􅎤趺首領刺史裴羅艾為右領軍將軍竝員外置依舊兼刺史賜紫袍金帶魚袋七事綵帛各三百叚放還五年十月乙酉鴻臚寺奏曰本國使請謁孔子廟堂禮拜寺觀從之仍令州縣金吾相知撿挍捉搦示之以整應須作市買非違禁入蕃亦容之八年二月勑關内河東河西入朝新蕃酋等曰嘉爾蕃酋慕我朝化相率歸附載變炎凉而忠懇不渝明誠勤勵深宜輯乃戎落捍彼方隅使烽火無驚障塞咸謐必厚賞崇班當取冨貴朕比加恩貸爾實安堵恐衣服未盡充災患且未恤永言于此良用憮然其今春不入朝都督衙官并箭頭將軍在蕃者已令王畯張恱楊敬述等取軍中庫物各賜爾等衣一副部落有疾苦量給藥物無令田隴廢業含養失所逓相勉諭以悉朕懐十年閏五月戊寅勑曰我國家寰宇歴年滋多九夷同文四隩來暨夫其襲冠帶奉正朔顒顒然向風而慕化列于天朝編於屬國者盖亦衆矣我則潤之以時雨煦之以春陽淳徳以柔之中孚以信之元風既同羣物滋遂莫不自天壤窮海域厥角以請吏執贄而來庭皇唐之徳於此為盛今外蕃侍子久在京國雖威惠之及自逺畢歸而覊旅之志重遷斯在宜命所司勘㑹諸蕃充職宿衛子弟等放還歸國契丹及奚斤通質子竝即停追前令還蕃首領等至幽州且住交替者即旋去朕欲以禽獸咸若華夷俱泰來則納其朝謁之禮去則隨其生育之恩推我至誠崇彼大順含𢎞之施徳莫厚焉十二年十二月新羅王金興光遣使獻女二帝以逺離所親特加封賞悉放還國降書謂曰卿所進女皆卿之姑姊妹容儀淑麗徳行柔婉自非盡節向風何能割恩忍愛然以辭違本俗離别所親念彼逺貢之勞矜其懐戀之思雖阻來意竝不忍留今各加其邑號賜之衣服以逹朝恩宜知朕意是年安東都䕶薛泰請於黑水靺鞨内置黑水軍更以最大部落為黑水府仍以其首領為都督諸部刺史𨽻屬焉中國置長史就其部落監領之二十一年八月日本國朝賀使真人廣成與傔從五百九十人舟行遇風飄至蘇州刺史錢惟正以聞詔通事舍人韋景先往蘇州宣慰勞焉二十九年七月命左羽林將軍孫老奴與中官使于葛羅禄部宣慰降詔書謂曰三姓葛邏禄及拔悉密首領部落等卿等上祖已來忠赤於國往緣斬啜背叛遂被脅從非是本心朕深知悉聞卿等首領皆是忠良雖在逺方嘗願歸化具知此意深用嘉之况今突厥天亡事勢如此在于豪傑多被誅夷所有諸蕃各自奔散智者料事不可失時儻或沉吟必招禍患宜即逓相曉諭勸率早來且金山故地水草豐美安置部落還於此處庶事之間倍令優恤務取安泰勝於往時兼有重賞髙官以待卿等今故遣使宣慰宜悉朕心天寳元年益州長史章仇兼瓊奏吐蕃白狗國及索磨等諸州籠官三百餘人出奉州望准女國等例簡擇許令入奏餘竝就奉州宴賞放還從之八載九月隴右節度使破吐蕃獲其平章事元論捸郭獻之詔曰吐蕃平章事元論捸郭戎帳酋渠蕃庭要重計窮力屈既入為俘捨罪申恩特授官秩可授左威衛翊府中郎將貟外置同正貟留宿衛仍賜宅以安置十三載女國南國狗國竝率部落内屬其大首領皆授貟外中郎將以安慰閏十一月壬申東曹國王設阿及安國副王野解及諸胡九國王竝遣上表請同心擊黒水辭甚切至帝方務以懐柔皆勞賜慰諭遣之以安西域乙亥吐蕃白蘭二品官籠董占庭等二十人來竝授左武衛員外大將軍肅宗至徳二年正月回紇大首領葛邏支將軍等來朝恥班在武臣之下他日帝親引上殿賜食幷錫賚慰其意以遣之代宗寳應元年十一月丁亥回紇遣使拔賀那上表賀收東京幷獻逆賊史朝義旌旗等物引見于内殿賜綵物二百疋初回紇至東京以賊界肆行殘忍士女懼之皆登善聖寺及白馬寺二閣以避之回紇縱火二閣傷死者計萬累旬火不滅及是朝賀又縱横辱官吏帝以外蕃功髙特容之永㤗二年五月安南生蠻大首領林覩符部落新置徳化州管户一萬六百潘歸國部落新置龍武州管户一千五百詔安南節度使左散騎常侍韓衡宣恩勞來之大歴八年秋七月辛丑詔以回紇使一百四十人還蕃以國信物一千餘乘遣之回紇恃功自乾元後屢遣使以馬和市束帛仍歲市以馬一匹易帛四十疋動至數萬馬其使俟遣其繼留於鴻臚寺者非一蕃人欲帛無厭我得馬無用朝廷甚苦之是時詔盈數遣之以示廣恩八月壬申回紇遣使赤心領馬一萬匹來求市帝以馬價出於租賦不欲重困於人有司量出入之計市六千匹徳宗以大厯十四年五月即位七月庚辰令回紇諸蕃在京師各服其國之服貞元十年五月乙酉以劒南西州歸化蠻悉差為左驍衛將軍同正十一年正月以降吐蕃論乞髯湯沒藏悉諾硉為歸徳將軍又於麟徳殿召對論乞髯等憲宗元和三年六月西原蠻首黄少卿歸欵少卿為歸順州刺史弟少髙少温竝授官是日突厥沙陁七百人攜其親屬歸於振武節度使范希朝尋授其大首領曷勒阿波左武衛大將軍同正員兼隂山府都督十四年正月庚寅制曰朕臨御萬邦推布誠信西戎納欵積有歲時中或虧違亦嘗包貸我有殊徳寜不是思重譯貢珍道途相繼申恩示禮曽無闕焉昨蕃使奏章又至京輦將君長之金陳和好之誠臨軒召見館餼加厚復以信幣諭之簡書亦既言旋纔及郊甸遽聞蟻聚來犯封陲河曲之間頗為暴擾背惠棄約斯謂無誠公議物情咸請誅絶朕深惟徳化之未被豈慮夷谷之不賓其國失信其使何罪釋其維縶以遂性示之𢎞覆以忘懐于衷茍孚庶使知感其蕃使諭短立藏等并後般來使竝宜放歸本國仍委鳯翔節度使以此意示諭穆宗長慶元年三月平盧軍節度薛平奏新羅雖是外夷朝貢不絶其百姓多被海賊掠賣令請緣海州郡一切禁斷冀賊徒永息異俗懐恩從之文宗太和八年二月庚寅詔南海蕃舶本以慕化而來固在接以恩仁使其感悅如聞比年長吏多務徵求嗟怨之聲逹於殊俗况朕方寳勤儉豈愛遐琛深慮逺人未安率稅尤重思有矜恤以示綏懐其嶺南福建及揚州蕃客宜委節度觀察使除舶脚收市進奉外任其來往自為交易不得重加率稅武宗㑹昌元年五月天徳軍奏回鶻嗢没斯與歴支王子多賢將軍等七人與部下將三千一百六十八人來降中書奏曰回鶻在邉人情疑恐聖化所感威徳克宣果得嗢沒斯望闕歸心率徒効命必在優賞昭示四方使戎狄逺聞皆感恩信望速降中使宣慰其王子將軍賜以錦綵銀噐將士等各賜綵帛從之十月遣王㑹安撫回鶻勑曰自古哲王撫寜荒服忠于國者則有繼絶之恩順于道者則有固存之義所以厚其向化優以報功回鶻累代姻親久修臣禮服我聲教保兹信誠嘗以國難識其忠良疾風知其勁草永言勲力豈忘予懐如聞統吃斯所攻兵析衆叛産畜大耗國人薦饑流離轉徙逺逾沙漠近因太和公主遣使入貢已知新立可汗寓居塞北告窮請命未有所歸每念艱危載深憫惻今欲救恤窮困撫慰傷痍俾四方知朕不忘勲舊報其大順昔匈奴乖離呼韓立塞漢宣帝轉粟賑救權時施宜故得三代稱蕃北邊罷警前王令典可不務乎宜令左金吾衛大將軍兼御史大夫王㑹持節充安撫大使兼御史中丞李師偃充副使專往慰問仍賑米二萬石俾其安輯離散漸就漠南再復舊疆永保恩好宣示中外宜體朕懐宣宗大中二年正月涇原節度康季榮奏吐蕃論恐熱以安樂三州及石行七關等歸國詔遣太僕卿陸躭馳往勞焉仍令靈武節度使朱叔明邠州寜州節度使張君緒與涇原康季榮各總所部兵鎮之五年八月沙州張義潮遣兄義潭將𤓰沙伊肅等十一州圗經户籍來獻自河隴陷蕃百餘年至是悉復隴右故地制改沙州為歸義軍以義潮充歸義節度𤓰沙等州觀察使後唐莊宗同光二年五月以權知歸義軍節度兵馬留後金紫光禄大夫檢校尚書左僕射守沙州長史兼御史大夫上柱國曹義金為檢校司空守沙州刺史充歸義軍節度𤓰沙等觀察處置管内營田押蕃落等使𤓰沙與吐蕃雜居自帝行郊禮義金間道貢方物乞受西邊都䕶故有是命明宗天成三年十一月以契丹偽署平州刺史光禄大夫檢校太保張希崇為汝州刺史加檢校太傅随行官員二十四人各依資授諸道官四年正月賜龜兹國𨽻臺寺僧波羅密紫衣九月丙戌帝御中興殿蕃部進馬安重誨奏曰吐渾黨項近日相次進馬皆給還馬直對見之時别賜錦綵計其所費不啻倍價漸成損耗不如止絶帝曰嘗苦馬不足差綱逺市今蕃官自來何費之有外蕃錫賜中國常道誠知損費理不可止自是蕃部羊馬不絶於路長興二年正月東丹王突欲率衆自渤海國内附上御文明殿對突欲及其部曲慰勞久之賜鞍馬衣服金玉帶錦綵噐物又大將軍副將軍已下分物有差宰臣率百寮稱賀二月幸東丹王突欲之第賜突欲絹三百疋至晩還宫三月辛酉中書門下奏東丹王突欲逺泛滄波來歸皇化既服冠帶難無姓名兼惕隠等頃以力助王都罪同秃餒爰從必死竝獲再生毎預入朝各宜授氏庶使族編姓譜世荷聖恩况符前代之規永慰逺人之欵自突欲已下請别賜姓名仍准本朝蕃官入朝例安排勑㫖付中書門下商量聞奏宰臣按四夷入朝蕃官例有懐徳懐化歸徳歸化等將軍中郎將名號又本朝賜新羅渤海兩蕃國王官初自檢校司空至太保今突欲是阿保機之子且類渤海國之王念自逺夷宜加異渥冀顯賓王之道以旌航海之思其惕隠赫邀已下始自朋兇不可同等古者保姓授氏有以因官有以所居所掌有因歸化特賜姓名勑㫖突欲宜賜姓東丹名慕華乃授光禄大夫檢校太保安東都䕶兼御史大夫上柱國渤海郡開國公食邑一千五百户充懐化軍節度瑞慎等州觀察處置押蕃落等使其從慕華歸國部曲罕只宜賜姓罕名支通穆葛宜賜姓穆名順義撒羅宜賜姓羅名實徳易宻宜賜姓易名師徳盖禮宜賜姓盖名來賓仍授罕只等五人歸化歸徳小將軍中郎將先助禿餒擒獲蕃官惕隠官蕃名赫邈宜賜姓狄名懐惠相公官蕃名担列宜賜姓列名知恩仍竝授銀青階檢校散騎常侍舍利官蕃名前刺宜賜姓原名知感福郎宜賜姓服名懐造奚三副使竭失訖宜賜姓乞名懐有三人竝授銀青階檢校太子賓客九月刺懐化軍節度使丹慕華宜賜姓李名贊華仍改封隴西郡開國公兼應有先配在諸軍契丹直等竝宜賜姓名三年四月癸亥以懐化軍節度使李贊華為滑州節度使初帝欲以贊華為藩鎮范延光奏以為不可帝曰吾與其先人約為兄弟故贊華來附吾老矣儻後世有守文之主則此軰招之亦不來矣繇是近臣不能抗議末帝清㤗元年正月回紇李突安而下十人先在京放還本部二年六月詔北面總管沿邊馬軍㑹于代州指揮逹靼於雲州界安置仍少月糧七月詔邠涇鄜耀四州出州兵應接回鶻時回鶻朝貢多為河西雜虜剽掠故有是命及回又詔邠州節度使康福遣將軍牛知柔率禁兵援送至靈武虜之為患者隨便討之三年西域南印土師子國婆羅門摩訶定利宻多羅甘州大雲寺僧那迦悉地并賜紫袈裟百濟僧智周言先朝賜紫辭歸國賜號曰法深大師晉髙祖天福元年十二月詔封故東丹王李贊華為燕王令前單州刺史李肅部歸葬本國二年正月詔西天中印土摩竭陁舍衛大菩提寺三藏阿闍黎沙門室利縳囉上靺下刺宜賜號𢎞梵大師周大祖廣順二年七月戊寅以契丹長慶宫提轄使户部郎中韓僚為鄜州延慶縣令契丹虞部員外郎胡嶠為汝州魯山縣令竝以其歸化故也九月丁丑河西節度使申師厚奏薦蕃州將吏請加恩命從之左廂押蕃副使折逋支右廂崔亮心竝授銀青光禄大夫檢校工部禮部尚書楊妃谷大首領沈念般授懐化大將軍左廂大首領籛于必篤為歸徳大將軍没林葛于凝盧伴氊折逋窮羅竝為懐化大將軍右廂大首領鹿悉迦阿羅岳騷奴竝為歸徳大將軍劉念般粃與龍温光積竝為懐化大將軍攝節度掌書記守凉州姑臧令王庭澣授監察御史裏行充河西軍節度掌書記攝節度推官温崇業試祕書省校書郎充河西節度推官攝錄事叅軍劉少英為凉州錄事叅軍師厚又言自安國鎮至西凉州㳂路三處扼控各立州名欲補大首領為刺史又官界部落大首領三十餘人各望賜空名告身竝從之十一月環州黨項臯家族首領越厮七移竝授懐化將軍十二月補契丹武州刺史石越為南府知兵馬使張延煦為許州都知兵馬使是月契丹部建州掌書記馬震興州錄事叅軍李超普州主簿李署可汗州懐來主簿王自真等宣中書各授州縣叅贊之官三年十一月延州党項首領吴帖磨五十三人竝授懐化郎將世宗顯徳二年正月沙州留後曹元忠知𤓰州軍州事曹元恭各遣使進方物以元忠為歸義軍節度使檢校太保同平章以元恭為𤓰州團練使仍各鑄印以賜之皆旌其來王之意也册府元龜卷一百七十
