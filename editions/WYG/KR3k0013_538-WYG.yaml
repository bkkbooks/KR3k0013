body:
  text: 冊府元龜卷五百三十八宋王欽若等撰諫諍部直諌第五後漢爰延桓帝時為大鴻臚太史上言客星經帝座宻以問延延因上封事曰臣聞天子尊為無上故天以為子位臨臣庶威重四海動静以禮則星辰順序意有邪僻則晷度錯違陛下以河南尹鄧萬有龍潛之舊封為通侯恩重公卿惠豐宗室加傾引見與之對博上下媟黷有虧尊嚴臣聞之帝左右者所以咨徳政也故周公戒成王曰其朋其朋言慎所與也昔宋閔公與强臣共博列婦人於側積此無禮以致大葘武帝與倖臣李延年韓嫣同卧起尊爵重賜情欲無厭遂生驕􅁋之心行不義之事卒使延年被戮嫣伏其辜夫愛之則不覺其過惡之則不知其善所以事多放濫物情生怨故王者賞人必酬其功爵人以甄其徳善人同處則日聞嘉訓惡人從㳺則日生邪情孔子曰益者三友損者三友邪臣惑君亂妾危主以非所言則恱於耳以非所行則翫於目故令人君不能逺之仲尼曰唯女子與小人為難養近之則不遜逺之則怨盖聖人眀戒也昔漢光武皇帝與嚴光俱寢上天之異其夕即見夫以光武之聖徳嚴光之髙賢君臣合道尚降此變豈况陛下今所親倖以賤為貴以卑為尊哉惟陛下逺讒䛕之人納謇謇之士除左右之權寤宦官之敝使積善日熙佞惡消殄則乾葘可除帝省其奏因以病自上乞骸骨還家趙典桓帝時為大鴻臚典以恩澤諸侯無勞受封羣臣不恱而莫敢諫獨奏曰夫無功而賞勞者不勸上忝下辱亂象干度且髙祖之誓非功臣不封宜一切削免爵土以存舊典帝不從劉瑜桓帝時舉賢良方正到京師上書曰臣瑜自念東國鄙陋得以豐沛枝裔被蒙復除不給卒伍故太尉楊秉知臣竊闚典籍猥見顯舉誠兾臣愚直有補萬一而秉忠謨不遂命先朝露臣在下土聴聞歌謡驕臣虐政之事逺近呼嗟之音竊為辛楚泣血漣知幸得引録備答聖問泄寫至情不敢庸回誠願陛下且以須臾之慮覽今往之事人何為咨嗟天曷為動變盖諸侯之位上法四七垂文炳燿闗之盛衰者也今中官邪孽比肩裂土皆競立裔嗣繼體傳爵或乞子踈屬或買児市道殆乖開國承家之義古者天子一娶九女娣姪有序河圗受嗣正在九房今女嬖令色充積閨幃皆當盛其玩飾冗食空宮勞散精神生長六疾此國之費也生之傷也且天地之性隂陽正紀隔絶其道則水旱為并詩云五日爲期六日不詹怨曠作歌仲尼所録况從㓜至長幽藏歿身又常侍黄門亦廣娶妻妾怨毒之氣結成妖眚行路之言官發略人女取而復置轉相驚懼孰不悉然無緣空生此謗鄒衍匹夫杞氏匹婦尚有城摧霜隕之異况乃羣軰咨怨能無感乎秦作阿房國多刑人今第舎增多窮極奇巧掘木攻石不避時令促以嚴刑威以法政民無罪而復入之民有田而復奪之州郡官府各自考事姦情賕賂皆為吏餌民愁鬱結起入賊黨官趣興兵誅討其罪貧困之民或有賣其首級以要酬賞父兄相代殘身妻奴相視分裂窮之如彼代之如此豈不痛哉又陛下以北辰之尊神噐之寳而微行近習之家私幸宦者之舎賔客市買燻灼道路因此暴縱無所不容今三公在位皆博逹道藝而各正諸已莫或裨益者非不智也畏死罰也惟陛下設置七臣以廣諫道及開東序金縢史官之書從堯舜禹湯文武致興之道遠佞邪之人放鄭衞之聲則致和平徳感祥風矣臣悾悾推情言不足採懼以觸忤怔營慴悸於是特詔召瑜問葘咎之徵指事按經䜟以對執政者欲令瑜依違其辭而更策以他事瑜復悉心以對八千餘言有加於前帝竟不能用拜為議郎瑜與竇武同誅其後宦者悉焚其上書以為訛言審忠梁人為郎中靈帝初中常侍曹節與長樂五官史朱瑀等矯詔誅大将軍竇武太傅陳蕃遷竇太后於南宮連有葘異忠以爲朱瑀等罪惡所感乃上書曰臣聞理國得賢則安失賢則危故舜有臣五人而天下治湯舉伊尹不仁者遠陛下即位之初未能萬幾皇太后念在撫育權時攝政故中常侍蘇康管覇應時誅殄太傅陳蕃大将軍竇武考其黨與志清朝政華容侯朱瑀知事覺露禍及其身遂興造逆謀作亂王室撞蹋省闥執奪璽綬迫脇陛下聚㑹羣臣離間骨肉母子之恩遂誅蕃武及尹勲等因共割裂城社自相封賞父子兄弟被蒙尊榮素所親厚布在州郡或登九列或據三司不惟祿重位尊之責而茍營私門多蓄財貨繕修第舎連里竟巷盜取御水以作魚釣車馬服玩擬於天家羣公卿士杜口吞聲莫敢有言州牧郡守承順風旨辟召選舉釋賢取愚故蟲蝗為之生夷寇為之起天意憤盈積十餘年故頻歳日食於上地震於下所以譴戒人主欲令覺悟誅鉏無狀昔髙宗以雉雊之變故獲中興之功近者神祗啓悟陛下發赫斯之怒故王甫父子應時馘截行路人士莫不稱善若除父母之讐誠怪陛下復忍孽臣之類不悉殄滅昔秦信趙髙以危其國吳使刑人身遘其禍虞公抱寶牽馬魯昭見逐乾侯以不用宮之奇子家駒以至滅辱今以不忍之恩赦夷族之罪姦謀一成悔亦何及臣為郎十五年皆耳目聞見瑀之所為誠皇天所不復赦願陛下留漏刻之聽裁省臣表掃滅醜類以答天怒與瑀考驗有不如言願受湯鑊之誅妻子并徙以絶妄言之路章寝不報宦官誅後辟公府張奐靈帝時為大司農熹平元年青蛇見於御座軒前又大風雨雹霹靂拔樹詔使百僚各言葘應奐上疏曰臣聞風為號令動物通氣木生於火相須乃眀蛇能屈伸配龍騰蟄順至爲休徴逆來爲殃咎陰氣專用則凝積為雹故大将軍竇武太傅陳蕃或志寜社稷或方正不回前以讒勝並伏誅戮海内黙黙人懷震憤昔周公葬不如禮天乃動威今武蕃忠貞未被眀宥妖𤯝之來皆為此也宜急爲改葬徙還家屬其從坐禁錮一切蠲除又皇太后雖居南宫而恩禮不接朝臣莫言逺近失望宜思大義顧復之報天子深納奐言以問諸黄門常侍左右皆惡之帝不得自從謝弼爲郎中熹平初青蛇之異弼上封事曰臣聞和氣應於有徳妖異生於失政上天告譴則王者思其愆政道或虧則姦臣當其罰夫蛇者隂氣所生鱗者甲兵之符也洪範傳曰厥極弱時則有蛇龍之孽又熒惑守亢徘徊不去有近臣謀亂發於左右不知陛下所與從容帷幄之内親信者為誰宜急斥黜以消天戒臣又聞惟虺惟蛇女子之祥伏惟皇太后定策宫闥援立聖眀書云父子兄弟罪不相及竇氏之誅豈宜咎延太后幽隔空宮愁感天心如有霧露之疾陛下當何面目以見天下昔周襄王不能敬事其母戎狄遂至交侵孝和皇帝不絶竇后之恩前世以為羙談禮為人後者為之子今以桓帝為父豈得不以太后為母哉援神契曰天子行孝四夷和平方今邊境日蹙兵革蜂起自非孝道何以濟之願陛下仰慕有虞蒸蒸之化俯思凱風慰母之念臣又聞爵賞之設必酬庸勲開國承家小人勿用今功臣久外未蒙爵秩阿母寵私乃享大封大風雨雹亦繇於兹又故太傅陳蕃輔相陛下勤身王室夙夜匪懈而見䧟羣邪一旦誅滅甚為酷濫駭動天下而門生故吏竝罹徙錮蕃身已徃人百何贖宜還其家屬觧除禁錮夫台宰重噐國命所係今之四公唯司空劉寵斷斷守善餘皆素餐致冦之人必有折足覆餗之凶可因葘異竝加罷黜徴故司空王暢長樂少府李膺竝居政事庶葘變可消國祚惟永臣山藪頑闇未逹國典策曰無有所隱敢不盡愚用忘諱忌伏惟陛下裁其誅罰左右惡其言出為廣陵府丞楊賜爲光祿勲熹平初青蛇之異靈帝以問楊賜上封事曰臣聞和氣致祥乖氣致異休徵則五福應咎徴則六極至夫善不空來葘不空發王者心有所維意有所想雖未形顔色而五星以之推移陰陽為其變度以此而觀天之與人豈不符哉尚書曰天齊乎人假我一日是其眀徵也夫皇極不建則有蛇龍之孽詩云維虺維蛇女子之祥故春秋兩蛇鬭於鄭門昭公殆以女敗康王一朝晏起闗雎見譏而作夫女謁行則讒夫昌讒夫昌則苞苴通故殷湯以之自戒終濟亢旱之葘惟陛下思乾剛之道别内外之宜崇帝乙之制受元吉之祉抑皇甫之權割豔妻之愛則蛇變可消禎祥立應殷武宋景其事甚眀後為光祿大夫光和元年有虹蜺晝降於嘉徳殿前靈帝惡之引賜及議郎蔡邕等入金商門崇徳署使中常侍曹節王甫問以祥異禍福所在賜仰天而嘆謂節等曰吾每讀張禹傳未嘗不憤恚嘆息既不能竭忠盡情極言其要而反留意少子乞還女壻朱雲欲得上方斬馬劒以理之固其宜也吾以㣲薄之學充先師之末累世見寵無以報國猥當大問死而後已乃書對曰臣聞之經傳或得神以昌或得神以亡國家休眀則鑒其徳邪僻昏亂則視其禍今殿前之氣應為虹蜺皆妖邪所生不正之象詩人所謂螮蝀者也於中孚傳曰蜺之比無徳以色親方今内多嬖倖外任小人上下竝怨諠譁盈路是以葘異屢見前後丁寜今復投蜺可謂熟矣案春秋䜟曰天投蜺天下怨海内亂加四百之期亦復垂及昔虹貫牛山管仲諫桓公無近妃宫易曰天垂象見吉凶聖人則之今妾媵嬖人閹尹之徒共專國政欺罔日月又鴻都門下招㑹羣小造作賦説以蟲篆小技見寵於時如驩兜共工更相薦説旬月之間竝各拔擢樂松處常伯任芝居納言郤儉梁鵠俱以便辟之性佞䛕之心各受豐爵不次之寵而令縉紳之徒委伏畎畝口誦堯舜之言身蹈絶俗之行棄捐溝壑不見逮及冠履倒易陵谷代處從小人之邪意順無知之私欲不念板蕩之作虺蜴之戒殆哉之危莫過於今幸賴皇天垂象譴告周書曰天子見怪則脩徳諸侯見怪則脩政卿大夫見怪則修職士庶人見怪則脩身惟陛下慎經典之誡圗變復之道斥逺佞巧之臣速徴鶴鳴之士内親張仲外任山甫斷絶尺一抑止盤㳺留思庶政無敢怠遑兾上天還威衆變可弭老臣過受師傅之任數蒙寵異之恩豈敢愛惜垂沒之年而不盡其慺慺之心哉書奏甚忤曹節等以師傅之恩故得免咎蔡邕為議郎光和初妖異數見人相驚擾靈帝詔問邕曰此葘變立生未知厥咎朝廷焦心載懷恐懼每訪羣公卿士庶聞忠言而各存括嚢莫肯盡心以邕經學深奥故密特稽問宜披露失得指陳政要勿有依違自生疑諱且對經術以皂囊封上邕對曰臣伏惟陛下聖徳允眀深悼葘咎褒臣末學特垂訪及非臣螻蟻所能堪副斯誠輸寫肝膽出命之秋豈可以顧患避害使陛下不聞至戒哉臣伏思諸異皆亡國之怪也天於大漢殷勤不已故屢出妖變以當譴責欲令人君感悟改危即安今葘𤯝之發不於他所逺則門垣近則寺署其為監戒可謂至切蜺墮鷄化皆婦人干政之所致也前者乳母趙嬈貴重天下生則貲藏侔於天府死則丘墓踰於陵園兩子受封兄弟典郡續以永樂門史霍玉依阻城社又為姦邪今者道路紛紛復云有程夫人者察其風聲将為國患宜髙為隄防眀設禁令深推趙霍以為至戒今聖意勤勤思眀雅正而聞太尉張顥為玉所進光祿勲偉章有名貪濁又長水校尉趙玹屯騎校尉盖升竝叨時幸榮富優足宜念小人在位之咎退思引身避賢之福伏見廷尉郭禧純厚老成光祿大夫橋𤣥聰逹方直故太尉劉寵忠實守正竝宜為謀主數見訪問夫宰相大臣君之四體委任責成優劣已分不宜聴納小人雕琢大臣也又尚方工技之作鴻都篇賦之文可且消息以示惟憂詩云畏天之怒不敢戲豫天戒誠不可戲也宰府孝亷士之髙選近者以辟召不慎切責三公而今竝以小文超取選舉開請託之門違眀王之典衆之不厭莫之敢言臣願陛下忍而絶之思惟萬幾以答天望聖朝既自約厲左右近臣亦宜從化人自抑損以塞咎戒則天道虧滿鬼神福謙矣臣以愚戅感激忘身敢觸忌諱手書具對夫君臣不宻上有漏言之戒下有失身之禍願寝臣表無使盡忠之吏受怨姦仇章奏帝覽而嘆息竟為中官所搆坐徙朔方和海為上祿長靈帝時詔州郡考黨人門生故吏父子兄弟其在位者免官禁錮爰及五屬謂五服也海上言禮從祖兄弟别居異財恩義已輕服屬踈末而今黨人錮及五族既乖典訓之文有謬經常之法左傳曰父子兄弟罪不相及也帝覽而悟之黨錮自祖以下皆得觧釋陸康為樂安太守時靈帝欲鑄銅人而國用不足乃詔調民田畞斂十錢而比水旱傷稼百姓貧苦康上䟽諌曰臣聞先王治世貴在愛民省徭輕賦以寜天下除煩就約以崇簡易故萬姓從化靈物應徳末世衰主窮奢極侈造作無端典制非一勞割自下以從茍欲故黎民吁嗟陰陽感動陛下聖徳承天當隆盛化而卒被詔書畝斂田錢鑄作銅人伏讀惆悵悼心失圗夫十一而税周謂之徹徹者通也言其法度可通萬世而行也故魯宣税畝而蝝葘自生襄公增賦而孔子非之豈有聚奪民物以營無用之銅人捐舎聖戒自蹈亡王之法哉傳曰君舉必書書而不法後世何述焉陛下宜留神省察改敝從善以塞兆民怨恨之望書奏内倖因此譛康援引亡國以譬聖眀大不敬檻車徵詣廷尉侍御史劉岱典考其事岱為表陳觧釋免歸田里復徵拜議郎劉陶為侍御史靈帝時鉅鹿張角偽託大道妖惑小民陶與奉車都尉樂松議郎袁貢連名上䟽言之曰聖王以天下耳目為視聽故能無不聞見今張角友黨不可勝計前司徒楊賜奏下詔書切勅州郡護送流民㑹賜去位不復捕録雖㑹赦令而謀不觧散四方私言云角等竊入京師覘視朝政鳥聲獸心私共鳴呼州郡忌諱不欲聞之但更相告語莫肯公文宜下眀詔重募角等賞以國土有敢回避與之同罪帝殊不悟徙京兆尹稱疾徵諫議大夫是時天下日危寇賊方熾陶憂致亂復上䟽曰臣聞事之急者不能安言心之痛者不能緩聲竊見天下前遇張角之亂後遭邊境之寇每聞羽書告急之聲心灼内熱四體驚悚今西羌逆類私署将帥皆多叚熲時吏曉習戰陳識知山川變詐萬端臣嘗懼其輕出河東馮翊鈔西軍之後東之函谷據阸髙望今果已攻河東遂更豕突上京如是則南道斷絶車騎之軍孤立闗東破膽四方揺動威之不来叫之不應雖有田單陳平之策計無所用臣前驛馬上便宜急絶諸郡賦調兾尚可安事付主者留連至今莫肯求問今三郡之民皆以奔亡南出武闗北徙壺谷水駭風散唯恐在後今其存者尚十三四軍吏士民悲愁相守民有百走退死之心而無一前鬭生之計西寇侵前去營咫尺北騎分布已至諸陵将軍張温天性精勇而主者旦夕迫促軍無後殿假令失利其敗不救臣自知言數見厭而意不自裁者以為國安則臣蒙其慶國危則臣亦先亡也謹復陳當今惡急八事乞須􅁷之間深垂納省其八事大較言天下大亂皆繇宦官宦官事急共讒陶下獄死張鈞中山人為郎中靈帝時内官張讓趙忠及夏惲郭勝孫璋畢風栗嵩叚珪髙望張恭韓悝宋典十二人皆為中常侍封侯貴寵父子兄弟布列州郡所在貪殘為人蠧害黄巾既作盜賊麋沸鈞上書曰竊惟張角所以能興兵作亂萬人所以樂附之者其源皆繇十常侍多放父兄子弟婚親賓客典據州郡掌搉財利侵掠百姓百姓之寃無所告訴故謀議不軌聚為盜賊宜斬十常侍懸頭南郊以謝百姓又遣使者布告天下可不須師旅而大寇自消天子以鈞章示讓等皆免冠徒跣頓首乞自致雒陽詔獄竝出家財以助軍費有詔皆冠履視事如故帝怒鈞曰此眞任子也十常侍固當有一人善者不鈞復重上猶如前章輙􅆍不報詔使廷尉侍御史考為張角道者御史承讓等旨遂誣奏鈞學黄巾道収掠死獄中而讓等實多與張角交通魏霍性為度支中郎将延康元年六月文帝為魏王将出南征性上疏諫曰臣聞文王與紂之事是時天下括囊無咎凡百君子莫肯用訊今大王體則乾坤廣開四聰使賢愚各建所規伏惟先王功無與比而今能言之類不稱為得故聖人曰得百姓之歡心兵書曰戰危事也是以六國力戰強秦承弊豳土不争周道用興愚謂大王且當委重本朝而守其雌抗威虎臥功業可成而今剏基便復起兵兵凶器必有凶擾擾則思亂亂出不意臣謂此危危於累卵昔夏啓隱神三年易有不遠而復論有不憚改誠願大王揆古察今深謀逺慮與士大夫算其長短臣沐浴先王之遇又初改政復受重任雖知言觸龍鱗阿䛕近福竊感所謂危而不持奏通帝怒刺姦就考竟殺之既而悔之追原不及毛玠為尚書僕射時太子未定立臨淄王植有寵玠諫曰近袁紹以嫡庶不分覆宗滅國廢立大事非所宜聞㑹玠起更衣太祖謂左右曰國之司直我之周昌鮑勛為侍中文帝受禪勛每陳今之所急唯在軍農寛惠百姓臺榭苑囿宜以為後文帝将出㳺獵勛停車上疏曰臣聞五帝三王靡不眀本立教以孝治天下陛下仁聖惻隱有同古烈臣兾當繼蹤前代令萬世可則也如何在諒陰之中脩馳驅之事乎臣冒死以聞唯陛下察焉帝手毁其表而競行獵中道頓息問侍臣曰獵之為樂何如八音也侍中劉曄對曰獵勝於樂勛抗辭曰夫樂上通神眀下和人理隆治教化萬邦咸乂故移風易俗莫善於樂况獵暴華蓋於原野傷生育之至理櫛風沐雨不以時隙哉昔魯隱觀魚于棠春秋譏之雖陛下以為務愚臣所不願也因奏劉曄佞䛕不忠阿順陛下過戲之言昔梁丘據取媚於遄臺曄之謂也請有司議罪以清皇朝帝怒作色罷還出勛為右中郎将黄初六年秋帝欲征吳羣臣大議勛為宫正面諫曰王師屢征而未有所克者盖以吳蜀脣齒相依憑阻山水有難拔之勢故也往年龍舟飄蕩隔在南岸聖躬蹈危臣下破膽此時宗廟幾至傾覆為百世之戒今又勞兵襲逺日費千金中國虚耗令黠虜玩威臣竊以為不可帝益忿之左遷勛為治書執法棧濳為侍中黄初三年文帝欲立郭后濳上疏曰在昔帝王之治天下不惟外輔亦有内助治亂所繇盛衰從之故西陵配黄英娥降媯竝以賢良流芳上世桀奔南巢禍階妹喜紂以炮烙怡恱妲己是以聖哲愼立元妃必取先代世族之家擇其令淑以統六宫䖍奉宗廟陰教聿脩易曰家道正而天下定繇内及外先王之令典也春秋書宗人釁夏云無以妾為夫人之禮齊桓誓命於葵丘亦曰無以妾為妻令後宫嬖寵常亞乗輿若因愛登后使賤人暴貴臣恐後世下陵上替開張非度亂自上起也文帝不從遂立為皇后眀帝時衆役竝興戚屬疏斥濳諫曰天生蒸民而樹之君長所以覆燾羣生熙育兆庶故方制四海匪為天子裂土分疆匪為諸侯也始自三皇爰暨唐虞咸以博濟加于天下醇徳以洽黎元頼之三王既㣲降逮于漢理日益少䘮亂𢎞多自時厥後亦罔克乂太祖濬哲神武芟除暴亂克復王綱以開帝業文帝受天眀命廓恢皇基踐阼七載每事未遑陛下聖徳纂承洪緒宜崇晏晏與民休息而方隅匪寜征夫逺戍有事海外縣旌萬里六軍騷動水陸轉運百姓舎業日費千金大興殿舎功作萬計徂徕之松刋山窮谷怪石珷玞浮於河淮都圻之内盡為甸服當供稾秸銍粟之調而為苑囿擇禽之府盛林莽之穢豐鹿兔之藪傷害農功地繁茨棘葘疫流行民物大潰上減和氣嘉禾不植臣聞文王作臺經始勿亟百姓子來不日而成靈沼靈囿與民共之今宫觀崇侈雕鏤極妙忘有虞之摠期思殷辛之瓊室禁地千里舉足投網麗阿房役百乾谿臣恐民力雕盡下不堪命也昔秦據殽函以制六合自以為徳髙三皇功兼五帝欲號謚至萬葉而二世顚覆願為黔首繇枝幹既杌本實先㧞也盖聖王之御世也克眀峻徳庸勲親親俊乂在官則功業可隆親親顯用則安危同憂深根固本竝為幹翼雖厯盛衰内外有輔昔成王㓜冲未能蒞政周吕召畢竝在左右今既無衛侯康叔之監分陜所任又非旦奭東宫未建天下無副願陛下留心闗塞永保無極則海内幸甚董昭為侍中文帝幸苑征南大将軍夏侯尚等攻江陵未㧞時江水淺狹尚欲乘船将歩騎入渚中安屯作浮橋南北往来議者多以為城必可㧞昭上疏曰武皇帝智勇過人而用兵畏敵不敢輕之若此也夫兵好進惡退常然之數平地無險猶尚艱難就當深入還道宜利兵有進退不可如意今屯渚中至深也浮橋而濟至危也一道而行至狭也三者兵家所忌而今行之賊頻攻橋設有漏失渚中精鋭非魏之有将轉化為吳矣臣私慼之忘􅆍與食而議者怡然不以為憂豈不惑哉加江水尚長一旦暴增何以防禦就不破賊尚當自全奈何乗危不以為懼事将危矣惟陛下察之帝悟昭言即召尚等促出賊兩頭竝前官兵一道引去不時得泄将軍石建髙遷僅得自免軍出旬日江水暴長帝曰論此事何其審也正使張陳當之何以復加􅃽濟為䕶軍将軍太和中明帝遣平州刺史田豫乗海渡幽州刺史王雄陸道共攻遼東濟諌曰凡非相吞之國不侵叛之臣不宜輕伐伐之而不制是驅使為賊故曰虎狼當路不治狐狸先除大害小害自已今海表之地累世委質歳選計者不乏職貢議者先之正使一舉便克得其財不足為富倘不如意是為結怨失信也帝不聽豫行竟無成而還景初中外勤征役内務宫室怨曠者多而年榖饑饉濟上䟽曰陛下方當恢崇前緒光濟遺業誠未得髙枕而治也今雖有十二州至於民數不過漢時一大郡二賊未誅宿兵邊陲且耕且戰怨曠積年宗廟宫室百事草創農桑者少衣食者多今其所急唯當息耗百姓不至甚弊弊㩻之民倘有水旱百萬之衆不為國用凡使民必須農隙不奪其時夫欲大興功之君先料其民力而燠休之句踐養胎以待用昭王恤病以雪仇故能以弱燕服彊齊羸越滅勁吳今二敵不攻不滅不事即侵當身不除百世之責也以陛下聖明神武之略舍其緩者専心討賊臣以為無難矣又歡娯之躭害扵精爽神太用則竭形太勞則弊願大簡賢妙足以充百斯男者其冗散未齒且悉分出務在清净詔曰㣲䕶軍吾弗聞斯言也楊偉為侍中明帝治宫室偉諫曰今作宫室斬伐生民墓上松柏毁壊碑獸石柱辜及亾人傷孝子心不可以為後世之法則辛毗為衛尉明帝方脩殿舍百姓勞役毗上疏曰竊聞諸葛亮講武理兵而孫權市馬遼東量其意指似欲相左右備豫不虞古之善政而今者宫室大興加連年榖麥不収詩云民亦勞止汔可小康恵此中國以綏四方唯陛下為社稷計帝報曰二虜未滅而理宫室直諌者立名之時也夫王者之都當及民勞兼辦使後世無所復増是蕭何為漢規模之略也今卿為魏重臣亦冝解其大歸帝又欲平北芒令其扵上作臺觀則見孟津毗諫曰天地之性高髙下下今而反之既非其理加以損費人功民不堪役且若九河盈溢洪水為害而邱陵皆夷將何以禦之帝乃止髙柔為廷尉眀帝世大興殿舍百姓勞役廣采衆女充盈後宫後宫皇子連夭繼嗣未育柔又上疏曰二虜狡猾潜自搆肆謀動干戈未圖束手宜畜養将士繕治甲兵以逸待之而頃興造殿舎上下勞擾若使吳蜀知人虚實通謀并勢復歸送死甚不易也昔漢文惜十家之資不營小臺之娛去病慮匈奴之害不遑治第之事况今所損者不惟百金之費所憂者非徒北狄之患乎可粗成見所營立以充朝宴之儀訖罷作者使得就農二方平定復可徐興昔軒轅以二十五子傳祚彌逺周室以姬國四十歴年滋多陛下聰逹窮理盡性而頃皇子連多夭逝熊羆之祥又未感應羣下之心莫不悒戚周禮天子后妃以下百二十人嬪嬙之儀既已盛矣竊聞後庭之數或復過之聖嗣不昌殆亦繇此臣愚以為可妙簡淑媛以僃内官之數其餘盡遣還家且以育精養神專静為寳如此則螽斯之徵可庶而致矣帝報曰知卿忠允乃心王室輙克昌言他復以聞楊阜為将作大匠眀帝時帝理宫室發羙女以充後庭數出入弋獵秋大雨震電多殺鳥雀阜上疏曰臣聞眀主在上羣下盡辭堯舜聖徳求非索諫大禹勤功務卑宫室成湯遭旱歸咎責己周文刑於寡妻以御家邦漢文躬行節儉身衣弋綈此皆能昭令聞貽厥孫謀者也伏惟陛下奉武皇帝開拓之大業守文皇帝克終之元緒誠宜思齊往古聖賢之善理摠觀季世放蕩之惡政所謂善政者務儉約重民力也所謂惡政者從心恣欲觸情而發也惟陛下稽古世代之初所以眀赫及季世所以衰弱至於泯滅近覽漢末之變足以動心誡懼矣曩使桓靈不廢髙祖之法法文景之恭儉太祖雖有神武於何施其能邪而陛下何繇䖏斯尊哉今吳蜀未定軍旅在外願陛下動則三思慮而後行重慎出入以往鑒来言之若輕成敗甚重頃者天雨又多卒暴雷電非常至殺鳥雀天地神明以王者為子也政有不當則見葘譴克己内訟聖人所記惟陛下慮患無形之外慎萌纎微之初法漢孝文出惠帝羙人令得自嫁頃所調送小女逺聞不令宜為後圖諸所繕理務從約節書曰九族既睦恊和萬邦事思厥宜以從中道精心計謀省息費用吳蜀以定爾乃上安下樂九親熈熈如此以往祖考心歡堯舜其猶病諸今宜開大信於天下以安衆庶以示逺人時雍丘王植怨於不齒藩國至親法禁峻宻故阜又陳九族之義焉詔報曰間得宻表先陳往古眀王聖主以諷闇政切至之辭欵誠篤實退思補過将順匡救僃至矣覽思若言吾甚嘉之後遷少府時大司馬曹眞伐蜀遇雨不進阜上䟽曰昔文王有赤烏之符而猶日昃不暇食武王白魚入舟君臣變色而動得吉瑞猶尚憂懼况有葘異而不戰竦者今吳蜀未平而天屢降變陛下宜深有以專精應答仄席而坐思示逺以徳綏邇以儉間者諸軍始進便有天雨之患稽闗山險已積日矣轉運之勞擔負之苦所費已多若有不繼必違本圗傳曰見可而進知難而退軍之善政也徒使六軍困於山谷之間進無所畧退又不得非主兵之道也武王還師殷卒以亡知天期也今年凶民饑宜發眀詔損膳減服技巧珍玩之物皆可罷之昔邵信臣為少府於無事之世而奏罷浮食今者軍用不足益宜節度帝即召諸軍還帝愛女淑未期而夭帝痛之甚追封平原公主立廟雒陽葬於南陵将自臨送阜上疏曰文皇帝武宣皇后山陵陛下皆不送葬所以重社稷僃不虞也何至孩抱之赤子而可送葬也哉帝不從帝既新作許宫又營雒陽宫殿觀閣阜又上疏曰堯尚茅茨而萬國安其居禹卑宫室而天下樂其業及至殷周或堂崇三尺度以九筵耳古之聖帝眀王未有極宫室之髙麗以彫弊百姓之財力者也桀作璇臺象廊紂為傾宫鹿臺以喪其社稷楚靈以築章華而身受其禍秦始皇作阿房而殃及其子天下叛之二世而滅夫不度萬民之力以從耳目之欲未有不亡者也陛下當以堯舜禹湯文武為法則夏桀殷紂楚靈秦皇為深戒髙髙在上實監后徳慎守天位以奉祖考巍巍大業猶恐失之不夙夜敬止克恭䘏民而乃自暇自逸惟宫臺是侈是飾必有顚覆危亡之禍易曰豐其屋蔀其家闚其戸閴其無人王者以天下為家言豐屋之禍至於家無人也方今二虜合從謀危宗廟十萬之軍東西奔走邊境無一日之娱農夫廢業民有饑色陛下不以是為憂而營作宫室無有巳時使國亡而臣可以獨存臣又不言也君作元首臣為股肱存亡一體得失同之孝經曰天子有諍臣七人雖無道不失其天下臣雖駑怯敢忘諍臣之義言不切至不足以感悟陛下陛下不察臣言恐皇祖烈考之祚将墜於地使臣身死有補萬一則死之日猶生之年也謹叩棺沐浴伏俟重誅奏御天子感其言忠手筆詔答眀帝著繡㡌被縹紈半䄂嘗以見直臣阜諌曰此於禮何法服邪帝黙然杜恕為黄門侍郎明帝時樂安廉昭以才能㧞擢頗好言事恕上疏極諫曰伏見尚書郎廉昭奏左丞曹璠以罰當闗不依詔坐判問又云諸當坐者别奏尚書令陳矯自奏不敢辭罰亦不敢以處重為恭意至懇惻臣竊愍然為朝廷惜之夫聖不擇世而興不易民而治然而生必有賢智之佐者盖進之以道帥之以禮故也古之帝王所以能輔世長民者莫不逺得百姓之懽心近盡羣臣之智力誠使今朝任職之臣皆天下之選而不能盡其力不可謂能使人若非天下之選亦不可謂能官人陛下憂勞萬幾或親燈火而庶事不康刑禁日弛豈非股肱不稱之眀效歟原其所繇非獨臣有不盡忠亦主有不能使百里奚愚於虞而智於秦豫讓茍容中行而著節智伯斯則古人之眀驗矣今臣言一朝皆不忠是誣一朝也然其事類皆可推而得陛下感帑藏之不充實而軍事未息至乃斷四時之賦衣薄御府之私榖帥繇聖意舉朝稱眀與聞政事宻勿大臣寜有懇懇憂此者乎騎都尉王才幸樂人孟思所為不法振動京都而其罪状發於小吏公卿大臣初無一言自陛下踐阼以來司𨽻校尉御史中丞寜有舉綱維以督姦宄使朝廷肅然者邪若陛下以為今世無良才朝廷乏賢佐豈可追望稷契之遐蹤坐待来世之俊乂乎今之所謂賢者儘有大官而享厚祿矣然而舉上之節未立向公之心不一者委任之責不專而俗多忌諱故也臣以為忠臣不必親親臣不必忠何者以其居無嫌之地而事得自盡也今有䟽者毁人不實其所毁而必曰私報所憎譽而必曰私愛所親左右或因之以進憎愛之説非獨毁譽有之政事損益亦皆有嫌陛下當思所以闡廣朝臣之心篤厲有道之節使之自同古人望與竹帛耳反使如㢘昭者擾亂其間臣懼大臣遂将容身保位坐視得失為来世戒也昔周公戒魯侯曰無使大臣怨乎不以不言賢愚明皆當世用也堯數舜之功稱去四凶不言大小有罪則去也今者朝臣不自以為不能以陛下為不任也不自以為不知以陛下爲不問也陛下何不遵周公之所以用大舜之所以去使侍中尚書坐則侍帷幄行則從車輦親對詔問所陳必逹則羣臣之行能否皆可得而知忠能者進闇劣者退誰敢依違而不自盡以陛下之聖眀親與羣臣論議政事使羣臣人得自盡人自為親人思所以報賢愚能否在陛下之所用以此理事何事不辦以此建功何功不成每有軍事詔書嘗曰誰當此憂者邪吾當自憂耳近詔又曰憂公忘私者必不然但先公後私即自辯也伏讀眀詔乃知聖思究盡下情然亦怪陛下不理其本而憂其末也人之能否實有本性雖臣亦以為朝臣不盡稱職也明主之用人也使能者不敢遺其力而不能者不得處非其任選舉非其人未必為有罪也舉朝共容非其人乃為怪耳陛下知其不盡力也而代之憂其職知其不能也而教之理其事豈徒主勞而臣逸哉雖聖賢竝世終不能以此為理也陛下又患臺閣禁令之不宻人事請屬之不絶聽伊尹作迎客出入之制選司徒更惡吏以守寺門威禁繇之實未得為禁之本也昔漢安帝時少府竇嘉辟廷尉郭躬無罪之兄子猶見舉奏章劾紛紛近司𨽻校尉孔羨辟大将軍狂悖之弟而有司嘿爾望風希指甚於受屬選舉不以實人事之大者也嘉有親戚之寵躬非社稷重臣猶尚如此以今况古陛下自不督必行之罰以絶阿黨之源耳伊尹之制與惡吏守門非理世之具也使臣之言少蒙察納何患於姦不消滅而養若昭等乎夫糾擿姦宄忠事也然而世憎小人行之者以其不顧道理而茍求容進也若陛下不復考其終始必以違衆迕世為奉公宻行白人爲盡節焉有通人大才而更不能為此邪誠顧道理而弗為耳使天下皆背道而趨利則人主之所最病者陛下将何樂焉胡不絶其萌乎先意承旨以求容美率皆天下淺薄無行義者其意務在於適人主之心而已非欲理天下安百姓也陛下何不試變業而示之彼豈執其所守以違聖意哉夫人臣得人主之心安業也處尊顯之官榮事也食千鍾之祿厚實也人臣雖愚未有不樂此而喜干迕者也迫於道自彊耳誠以為陛下當憐而祐之少委任焉如何反録昭等傾側之意而忽若人者乎今者外有伺隙之冦内有貧曠之民陛下當大計天下之損益政事之得失誠不可以怠也恕在朝八年其論議亢直皆此類也冊府元龜卷五百三十八
