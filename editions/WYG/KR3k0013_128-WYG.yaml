月以靈州懐逺將士所破吐蕃収獲羊馬衣物宜分賞有功將士自今已後並宜從此十二年宣武軍節度李萬榮疾病置其子迺為兵馬使迺殺大將為亂都虞候鄧惟恭等執送京師帝以東都留守董晉為節度詔汴州將士等志堅金石節勵氷霜叶奉邦家咸懐憤激不受熒惑同疾姦兇就縳軍中傳獻闕下􅈴庸特茂遐邇所知宜奬忠勞各加優賞並與進改仍委董晉一月内具名聞奏仍共賜錢三十萬貫委董晉逐便即取鹽鐵轉運使錢物各給宣武軍節度都虞候兼御史大夫鄧惟恭都押衙兼御史大夫杜皓大將王應鳳曹元偘楊燕竒劉惟清成文朝陳沛張庭芬薛文翰趙藏用李庭光宇文澹李國信等並竭忠効誠績用昭著惟恭可檢校左散騎常侍依前兼御史大夫賜實封一百二十戸子一七品正員官并賜物四百疋杜皓英幹並可右散騎常侍依前兼御史大夫應鳳已下各加官賜物押衙賈庭芬及同節度副使十將等二百六十三人並優與改官憲宗元和二年十月潤州將張子良李奉先田少卿裴行立等生擒逆賊李錡制曰天地之徳佐助者忠良鬼神之靈斃踣者盈貫故有無狀之釁顛越以敗常則有不奪之誠感慨以明節易所謂功業見乎變書所謂不善降百殃積惡必至於滅身見機寧俟於終日應若影響昭然著明李錡受恩三朝受任千里勺水拳石以至髙深潤草塗原豈酬亭毒而棄我厚徳稔其姦心滔天以肆其逆謀擢髪未窮其醜行乃者式舉戎斾申嚴國刑將鼓雷霆之威以誅梟獍之罪鎮海軍左廂兵馬使兼御史中丞張子良等外𢎞治慮内激精忠擐甲執兵取㓙人之柄瀝肝嘗膽懐勁草之風迴戈以掩其羽毛竟夕遂擒其魁首天府無一金之費已靜江流王師無一戰之勞己除人害莫大之節卓然無倫非常之功斯謂不朽髙位重賞予何愛焉殊加寵榮顯示旌勸其張子良等超異酬賞並從别勅處分其立功將士等并淮平西川節度例優賞甄叙其左廂官徤等素聞效順亦宜霑賞亦並從别敕處分十一月丁亥以子良為特進檢校兵部尚書兼左金吾衛將軍御史大夫賜上柱國進封南陽郡王食實封一百五十戸改名奉國兵馬使兼御史中丞田少卿為特進檢校右散騎常侍左羽林軍御史大夫仍封代國公食實封一百五十戸兵馬使兼侍御史李奉先為特進檢校右散騎常侍又羽林將軍御史中丞仍封邠國公食實封一百五十戸四年以左羽林將軍田少卿為左金吾衛將軍右羽林將軍李奉先為右金吾衛將軍稱賞擒李錡之功也又以左羽林將軍張承金為右神武大將軍知軍事稱賞擒楊惠琳之功也五年四月以昭義軍都知兵馬使潞州左司馬兼御史中丞烏重𦙍為懐州刺史兼御史大夫充河陽三城懐州節度等使以節度使盧從史濳通鎮州王承宗重𦙍鎮撫軍情無變行賞典也以前昭義將王翊元起復左龍武軍將軍知軍事王獻為右神武軍將軍知軍事以功次重𦙍也烏重𦙍故為潞州諸將會盧從史奉詔討賊常懐異志濳與王承宗通連吐突承璀以神䇿軍行營與從史對壘將圗之重𦙍通其謀竟縛從史扵帳下於時重𦙍職總牙門是日戒嚴其軍莫敢動者事聞朝廷推重𦙍自都將兼潞州左司馬拜懐州刺史兼御史大夫河陽三城節度十八年八月東都防禦使吕元膺奏淄青節度使留邸伏甲作亂初李師道置邸於河南府兵諜雜以往來更不敢辨因吳元濟北犯郊畿多警防禦兵盡戍伊闗師道濳以數千百人兵内邸謀焚宫闕而肆殺掠既烹牛饗衆矣明日將出會有卒楊進李再興者謁元膺告急數日盡獲之賜楊進李再興各錦綵三百匹宅一區授以郎將及典軍仍送西川收管十一年正月詔討鎮州王承宗乙亥幽州奏破下武强縣庚寅授幽州將朱泗等五人刺史敘武强功也二月以内庫繒絹四萬匹賞幽魏戰士十二年十月乙卯淮西平甲申制收蔡州擒吳元濟節度使及諸大將並從别敕處分諸立功將士委韓𢎞裴度與行軍節度使及諸節度使計會速條疏等第聞奏即有甄昇其賞物已令節級優厚支遣十二月丙辰朔壬戌制加彰義軍節度申光蔡激觀察使充淮西宣慰處置等使朝議大夫門下侍郎平章事兼蔡州刺史飛騎尉裴度金紫光禄大夫依前門下侍郎平章事𢎞文館大學士仍賜上柱國封晉國公食邑三千户以馬總為檢校工部尚書蔡州刺史蔡申光節度等使又制加以唐鄧隨等州觀察使通議大夫檢校左散騎常侍鄧州刺史李愬可銀青光祿大夫檢校尚書左僕射襄州刺史充山南東道節度襄鄧八州觀察等使賜上柱國封涼國公食邑二千戸并賜實封五百戸與一子正員五品官韓𢎞加兼侍中李光顔烏重𦙍并檢校司空光顔封武威郡公重𦙍邠國公以亘武軍都虞候韓公武檢校左常侍充鄜坊丹延節度等使魏博行營兵馬使田布為右金吾將軍並叙平寇之功也十一月甲午以随唐兵馬使李祐為神武將軍知軍事仍賜莊宅各一所米粟二百石録平蔡功也十五年邠寧節度使李光顔来朝制曰寰㝢以清而兵不可失干戈再戢而功不可忘爰升經武之材用輔同文之理具瞻此允注意尤深蓋以奬舊勞而申賞典也李光顔禀忠厚仁信之資服禮樂詩書之訓沉勇有決剛嚴不殘挺長劍之鋒稜蓄殷雷之氣象以忘身殉節為任以約已率衆為心屬先帝撫運勤人墾菑除害能展七擒之畧以成四克之功方夏甫寧凱還未幾驅仍嵗陷堅之士為盛秋乗障之師果逐奔戎載完危壁西絶夷落威名赫然念兹􅈴庸當極寄任是以徴自保塞接于明庭亟聞𢎞逺之規復挹冲深之度固可以内參鈞軸外惣麾旗憲被萬邦叶予一徳可不勉歟可檢校司空同中書門下平章事依前邠寧節度等使帝以光顔功冠諸將及徐泗李愬尅平淮夷故皆召赴闕宴賜優洽已而皆帶宰相出鎮所以報􅈴臣也帝又御麟徳殿宴光顔及愬各賜錦綵五百匹銀瓶盤等五事衣一襲馬一疋賔佐將校頒賜有差穆宗以元和十五年即位二月御丹鳳樓大赦詔興元奉天功臣及蔡鄆立功將士普恩之外更賜􅈴爵亡殁者與追贈長慶二年二月詔雪鎮州王承宗以左神策行營樂夀鎮兵馬使傅良弼為沂州刺史以瀛州博野鎮遏使李寰為沂州刺史皆酬勞也良弼寰所鎮介居燕趙而二叛㗖之以利脅之以威屢趣其降各以一旅之衆堅壁不戰賊竟不能取故賞之也八月誅李㝏汴州平於是以義成宣武兩軍節度檢校右僕射韓充為檢校司空兼汴州刺史充宣武軍節度汴宋亳等州觀察處置等使忠武軍節度檢校司空平章事李光顔進位檢校司空兼侍中武寧軍節度使檢校工部尚書王智興進位檢校左僕射以兖海沂宻節度使檢校工部尚書曹華為檢校右僕射兼滑州刺史充義成軍節度鄭滑潁等州觀察處置等使以宋州刺史髙承簡為檢校左常侍兼兖州刺史充兖海沂宻等州節度觀察處置等使以汴州防城兵馬使李質為右金吾衛將軍以亳州刺史田頴為宋州刺史並策勲也又内出綾絹三十萬疋付度支充諸軍賞物敬宗長慶四年即位四月丙申有染坊供人張韶結染工無頼之徒百餘輩犯右銀臺門入宫帝在清思殿擊毬聞警將出幸右神策軍左右皆曰盜入宫未知衆寡右軍遥逺道路可虞不如幸左軍之速至也遂幸左神策軍初帝嘗寵右軍中尉梁守謙每逰幸宴樂兩軍或相誇耀多加守謙之勝而左軍軍士時以為言京師頗傳其事及帝違難至左軍中尉馬存亮匍匐出迎捧帝足嗚咽涕泣自負帝入軍中帝極慰悦既安堵存亮又令大將軍康藝全率騎卒入宫討賊與右軍兵馬使尚國忠引兵合擊賊衆殱焉賜康藝全尚國忠等錦綵銀器有差并共賜左右殿前軍官徤錢一千貫文五月己未以藝全加檢校工部尚書兼御史大夫旌討賊之功也庚申賜存亮實封二百戸文宗太和二年十一月壬辰詔曰王者誅暴亂賞勲勞既正紀綱式頒爵位朕以菲徳理乖勝殘使釁生海盜刑用戎鉞屬者庭凑用滄州為輔軍以謀專土同㨗持棣州為屏扞遂成阻命實頼英帥共恢壯圗爰議疇庸式奬宣力武寧軍節度使徐泗豪等州觀察處置等使充滄州行營招撫使光禄大夫守司徒中書門下平章事上柱國太原郡開國公食邑二百戸王智興可特進封代國公食邑三千户餘如故平盧軍節度使淄青登萊棣等州觀察處置等使兼押新羅渤海兩畨等使銀青光禄大夫檢校尚書僕射御史大夫上柱國會稽縣開國公食邑一千戸康志睦可檢校尚書左僕射餘如故正議大夫檢校工部尚書使持節鄆州諸軍事兼鄆州刺史御史大夫賜紫金魚袋崔𢎞禮可檢校尚書右僕射餘如故其棣州城下武寧軍節度使諸道立功將士已甄錄外委智興條疏聞奏棣州應見在百姓宜復一年其將士有決戰攻壘奮不顧身中刄被瘡遂成廢疾者並賜衣糧終身勿絶其武寧軍及平盧軍浙西宣歙天平等五處兵馬在棣州城下者並宜放歸本道於戯並命申威分彊剪寇界天河之南北委藩守以廓清立績者既以勞施圗功者方期盡敵勉𢎞勝策無至老師共臻輯寧副我勤屬是年討滄州叛將李同㨗十月勑魏博新平原將士須有賞給宜賜綾絹五萬匹綿二萬三年四月滄州李同㨗平詔齊徳將張慶旻等十三人鄭滑將李著等五人並進官級賜幽州綾絹共二十萬疋徳州十五萬疋充賞軍士九年十一月丙子賜鳳翔軍將李叔和莊宅各一區銀三千兩綾絹七十疋以斬鄭注功也懿宗咸通十一年二月勑征討徐州將士等委吏部度支頒奬有差昭宗文徳元年即位秦宗權被執蔡申光等州平詔賜蔡州行營兵士錢三十五萬貫令度支逐近支給後唐莊宗初為晉王天祐十四年二月契丹攻幽州命諸將進討八月辛丑獻㨗于鄴九月班師帝以横海軍節度使李存審檢校太傅邢洺節度使閻寶檢校太尉並平章事方鎮如故將士賞給有差同光元年四月即位制曰應六軍及行營馬部蕃漢諸道將校兵士等皆以身先冐刅志切勤王或竭節於忠勞或連年而征戍須加恩奬倍撫苦辛其將校並賜功臣名仍未有官者即超一資與檢校官已有官者亦超資加官己官者與加爵邑如曾封爵者即給一子六品正員官其長行兵士并賜功臣名應將士等並勒逐處各定等第優賞十月制曰懋徳賞功百王明訓疏封列爵有國通規應扈從征討將校及諸官員職掌軍將節級馬步兵士及河北諸處屯駐守戍兵士等皆情堅破敵業茂平讐副予勘定之謀顯爾忠勤之節並據等第續議奬酬二年二月南郊禮畢制曰賞不失勞百王令典人惟求舊有國通規當宜廣示優恩務酬嘉績應自來立功將校兵士等皆久經戎陣備覩辛勤並宜各轉官資仍加賞給三月詔隨駕収復汴州并扈從到洛及南郊立仗都將已下至節級長行軍將等朕自削平諸夏掃蕩羣兇被介胄以征行歴星霜而扈從凡經百戰盡立殊功永念丹心真同赤子若無旌賞豈表恩榮其都將官員司空已下者宜並賜協謀定亂輔國功臣自僕射尚書常侍至大夫中丞宜並賜忠勇拱衛功臣其初帶憲銜宜並賜忠烈功臣已有功臣名者不在此限其節級長行軍將宜賜扈蹕功臣明宗以同光四年四月即位改元天成制曰鄴都赴難之際定䇿功臣宜特加恩以彰豐報其扈從將士及六軍諸衛諸道行營將校等委中書門下次第甄奬是月齊州防禦使安審通加檢校太傅食邑四百戸鄴都馬步軍都指揮使李正綱加檢校司空湖州刺史賜竭忠建䇿興復功臣賞盧臺之功也時盧臺戍軍亂害副招討寧國軍節度使烏震正綱尋與審通斬殺亂兵七月宋州節度使王晏球與䕶駕親軍都指揮使張䖍釗攻定州帝令中使押御馬二匹賜晏球䖍釗三年六月招討王晏球獻曲陽之㨗令殿直陳知隐押銀腰帶鞍轡賜北面立功將校時帝在汴王晏球討定州王都故也十月甲子安州上言屯駐左神㨗右懐順兵士作叛主帥髙行珪襲殺出城命使賜行珪鞍馬御衣寶帶及賜都將已下有差時行珪預覺其事遂潛移鎧甲於别室叛卒果先奔其庫行珪有備乃能禦之是月代州刺史檢校司空張朗超授檢校太保初契丹主赴援太原代州張朗忻州丁審琪守城蕃軍由城下過都不誘迫時端明殿學士吕琦在忻州及供奉殿直四五人州兵僅千人琦謁審琪曰敵勢經城不問可見其心迴日必無全理與使君率在城軍民入五臺避敵於鎮州界䇿之上也審琪從之翌日詰旦琦等遣人會審琪拒闗不納軍士欲攻牙城琦曰家國如斯自相屠害非人情遂率州兵趨真定審琪即日降契丹唯朗屢煞敵族帳故超授奬之四年二月辛亥下制曰朕嘗披國史備閲軍功裴度之破淮西無遺廟筭石雄之攻山北益展皇威莫不仰遺烈於祖宗委全才於將相而自中山逆命外域朋姦奪戎旅以鷹揚屠賊城而魚爛夕聞告㨗明賞殊勲竭忠建策興復功臣北面行營招討歸徳軍節度宋亳單潁等州觀察處置亳州太清宫等使權知定州軍州事特進檢校太傅同中書門下平章事使持節宋州諸軍事宋州刺史上柱國琅琊郡開國侯食邑一千户王晏球長劍倚天洪河帶地居萬夫之長擅三傑之名黄石兵書運子房之籌略清淮公族興仲爽之源流自統雄師往收逆壘摧曲陽之堅陣厭􅀈水以驚波爰築室以反耕攻圍雉堞果析骸而易子傾覆鳥巢招降之士庶數千撲滅之兇狂非一王都授首秃餧生擒火焚而惡蔓皆除雷掃而妖氛併息諒兹丕績宜降優恩迺眷汶陽實惟巨鎮據犬牙之内地當馬頰之要津是命疇以勲庸福其黎庶進公國之品秩崇藩后之等威俾濬鳳池仍加蟬冕帷幄共推於重席井田兼别扵真封於戲解甲休兵實歸於上將安民和衆議伏於賢臣永保令猷無替朕命可依前檢校太傅兼侍中使持節鄆州諸軍事守鄆州刺史充天平軍節度齊棣等州觀察處置使仍進封開國公加食邑一千五百戸食實封一百戸行營副招討横海軍節度觀察等使守滄州刺史李從敏可光禄大夫檢校太保使持節定州諸軍事守定州刺史充義武軍節度觀察北平軍等使進封開國伯加食邑一千二百戸北面行營兵馬都監鄭州防禦使張䖍釗可光禄大夫檢校司徒使持節滄州諸軍事守滄州刺史充横海軍節度觀察等使仍封清河縣開國子食邑五百戸又制朕聞魏絳和戎始克諧於金石祭遵征虜終併息於烟塵此乃先務懐柔後申禁暴明國家之耀徳表藩翰之圗功既立丕勲宜加懋賞興邦守正翊贊功臣盧龍軍節度管内觀察處置押奚契丹兩藩經略盧龍軍等大使特進檢校太尉同中書門下平章事幽州大都督府長史上柱國天水縣開國侯食邑一千戸趙徳鈞崆峒禀氣渤澥融精傳相略於黄公受兵符於𤣥女而自羈縻戎馬控制盧龍洞曉蕃情飽諳邊事獲其五利嘗姑息於鮮卑運以六韜果生擒於惕隐可謂坐籌帷幄能執干戈終殄寇於中山永摧兇於外域烽烟南望頼掃蕩於尋時貔虎北征遂凱旋於此日加以民軍胥悦畏愛並行薊門之人物如初燕谷之粢盛畢備得不籌其庶績褒以徽章就加進律之文式叶陟明之典是命寵頒鳳綍榮列貂冠正爵位於三公加井田於千戸貴申殊渥仍賜真封於戲事君之節已彰燕山紀頌教子之方大著踐土臨戎有國有家惟忠惟孝享兹具羙永保令猷可依前撿校太尉兼侍中幽州大都督府長史充盧龍軍節度觀察等使進封開國公加食邑五百戸食實封一百戸乙卯以前洺州團練使張進為鄭州防禦使泰州刺史安叔千為涿州刺史前棣州刺史潘環為易州刺史淄州刺史張從本為隰州刺史簡州刺史李思讓為磁州刺史賞中山之功也時定州帥王處直養子王都刼殺處直嬰城以叛四月以龍武都虞候北面行營諸道左廂馬軍都指揮使符彦卿為耀州團練使神武都虞候北面行營右廂馬軍都指揮使守端州刺史髙行周為潁川團練使賞中山之功也長興三年七月丁酉雲州節度使沙彦珣奏桑遷謀應太原遷報應州尹暉謀逐殺沙彦珣暉復部送遷至伏罪遣太子賔客聶延祚宣賜彦珣尹暉戎服金帶錢幣及犒賞在城軍士末帝清泰元年五月辛亥以隨駕嚴衛指揮使領費州刺史尹暉為齊州防禦使捧聖都指揮使繡州刺史康進海為曹州刺史先是尹暉進海與楊權始搆軍入城奉帝故也晉髙祖天福三年九月己巳復魏府節度使范延光官爵庚午遣客省使李守貞押器幣賜魏府立功將校六年八月壬寅制朕頃當開創爰在并汾或傾歸順之心首謀推戴或擁驍雄之旅力效扶持洎汜水興妖鄴城伐罪每令致討皆立竒功漸臻開泰之期愈念艱危之節宜頒殊渥允答茂􅈴應河東起義之初佐命効順及收復鄴都汜水立功臣僚將校等並與加恩少帝開運二年正月甲辰以青州平詔行營將校自副兵馬使已上各賜功臣名號是月宴青州立功將校於永福殿賜李守貞符彦卿玉帶衣一襲衣著銀器鞍轡馬散馬都監王景崇䕶聖廂主王裔楊實都指揮使靳霸等各等第賜金銀帶衣服段疋銀器等周太祖以漢乾祐二年自河中征趙綰至華州趙暉報蜀軍盡退郭從義進攻有日即統衆言旋正月五日夜賊水砦内勁將王三鐵者領千人突出河西攻白文珂砦時文珂出迎帝唯劉詞葉仁魯等在砦賊三道齊入殺聲動地會賊發大洞炤内外力戰敗之死者僅七百人翊日帝至劉詞馬前請罪帝曰吾嘗懸料正疑此事彼技殫矣頼兄果敢不為虜嗤以鞍馬衣服幣帛勞之八日帝至西砦犒設以縑帛銀器分遺戰傷將士廣順元年正月即位制曰馬步諸軍將士等戮力推誠輸忠效義先則平持内難後乃推戴朕躬言念􅈴勞所宜旌賞其員僚將士等各與等第超加恩命仍賜功臣名號己有功臣名號者别與改賜四月乙未以前景州刺史姚武為申州刺史前乾州刺史張昭瑀為愽州刺史前遼州刺史劉洪為衛州刺史前萊州刺史符彦熊為耀州團練使前淄州刺史藥元福為陳州刺史皆以平徐方預軍功也二年二月丁亥朔以晉州巡檢使前宻州防禦使王萬敢為復州防禦使晉州節度副使領忠州刺史馬延翰自檢校刑部尚書加檢校右僕射餘如故皆奬拒并寇城守之功也戊子龍㨗右第五軍都指揮使檢校司徒領連州刺史史彦超加太保進爵伯加食邑三百戸虎㨗第五軍指揮使檢校司空領秀州刺史何徽加司徒封太原縣男食邑三百戸亦以固守晉州之功也世宗顯徳元年三月親征河東庚子制以侍衛馬步都虞候李重進兼忠武軍節度使宣徽南院使向訓兼義成軍節度使殿前都指揮使張永徳兼武信軍節度使以義成軍節度使白重贊為保大軍節度使以鄭州防禦使史彦超為鎮國軍節度使賞髙平之功也又以建雄軍節度使藥元福為同州節度使以宣徽北院使楊廷璋為建雄軍節度使以同州節度使張鐸為彰義軍節度使以内客省使吳延祚為宣徽北院使以龍㨗左廂都指揮使李干為遼州防禦使以龍㨗右廂都指揮使康延治為萊州防禦使以虎㨗左廂都指揮使田瓊為宻州防禦使以虎㨗右廂都指揮使張順為登州防禦使以龍㨗第三都指揮使孫延進為鄭州防禦使以前耀州團練使符彦能為澤州防禦使又以散員都指揮使李繼􅈴為殿前都虞候以殿前都虞候韓令坤為龍㨗右廂都指揮使以鐵騎第一軍都指揮使趙宣祖廟諱為龍㨗右廂都指揮使以散員都指揮使慕容延釗為虎㨗左廂都指揮使以控鶴第一軍都指揮使趙􅄯為虎㨗右廂都指揮使五人并遥授團練使其餘轉改有差四月討太原回詔潞州昨經圍閉將校官吏職貟同力守禦兼以大駕駐蹕迎奉無闕應在城將校官吏職員宜令本州具名衘以聞各加恩澤五月乙酉以忻代招收指揮使秦珣為歸州刺史初符彦卿之入賊境也孟縣偽監押楊貴殺巡檢使趙筠以戍兵數百來降彦卿因請建孟縣為州上可之遂以歸州為名命楊貴為刺史至是以秦珣代之珣本太原東山之賊帥也廣順初與其黨趙行能等内附朝廷置忻代一路招收都指揮使遥授忻州刺史趙行能副之自是賊之東境常為珣等所苦劉崇患之竟不能制代州鄭處謙之歸命也蕃寇在郊我軍未至珣遣弟州帥兵三百以戍之帝嘉其誠節故有郡印之授六月車駕征河東回乙亥制以天雄軍節度使檢校太師守太保兼中書令大名尹衛王符彦卿為守太傅仍封魏王以天平軍節度使檢校太師兼侍中郭從義為中書令以河陽三城節度使檢校太尉同中書門下平章事劉珣為兼侍中行京兆尹充永興軍節度管内觀察處置等使以昭義軍節度使檢校太尉同中書門下平章事李筠為兼侍中以河中䕶國軍節度使檢校太尉同中書門下平章事行河中尹王彦超為兼侍中充忠武軍節度使許蔡等州觀察處置等使以忠武軍節度使兼侍衛馬步軍都虞候檢校太保李重進為同中書門下平章事充歸徳軍節度宋亳等州觀察處置等使兼侍衛親軍馬步軍都指揮使以武信軍節度使兼殿前都指揮使檢校太保駙馬都尉張永徳為檢校太傅充義成軍節度使滑衛等州觀察處置等使兼殿前都指揮使以定國節度使檢校太傅藥元福為檢校太尉充保義軍節度陜虢等州觀察處置等使以保大軍節度使檢校太傅白重贊為檢校太尉充河陽三城節度孟懐等州觀察處置等使以保義軍節度使檢校太保韓通為檢校太傅充彰信軍節度曹單等州觀察處置等使時帝以即位之初覃慶於諸侯亦賞從征河東之勞也二年十一月秦鳳等州詔應馬步軍營將士等各與恩澤其有殁於王事者自副兵馬使以上並與贈官仍賜賻贈物三年正月己亥上於金祥殿賜陳州節度使向訓襲衣金帶銀器繒帛鞍馬餘各有差賞西征之功也六月甲子以鳳翔節度使王景為雄武軍節度使兼西面緣邊都部署以宣徽南院使鎮安軍節度使向訓為檢校太尉依前宣徽南院使充淮南節度使以彰信軍節度使韓通為檢校太尉忠武軍節度使以賞秦鳳之功也四年五月辛亥賜應淮南征行軍士金銀錢帛有差賞其勞也五年五月辛亥以征淮南迴降徳音云睠彼戎士咸遵武經或從我征行久服勤於甲胄或守兹城邑能安定於封圻宜舉彛章首膺懋賞應侍衛殿前及諸道馬歩軍將士等各賜等第優給餘從宣命處分是月帝以征淮南迴賜宰臣樞宻侍衛宣徽使及翰林學士中書舍人内諸司使已下器幣鞍馬各有差賞扈從之勞也冊府元龜卷一百二十八
