body:
  text: 冊府元龜巻一百二十八宋王欽若等撰帝王部明賞第二唐髙祖義師平京師義寧二年正月論功行賞其登京城第一勲授光禄大夫開國郡公物一千段雖第一􅈴而身死者亦准此其官􅂞授子弟宅奴婢仍並量給第二􅈴人各授三轉物二百段第三􅈴人從朝散加武徳二年四月甲寅出庫物一百五十萬段以分賜太原元從人太宗武徳九年八月甲子即位九月己酉詔曰褒賢昭徳昔王令典旌善念功有國彛訓吏部尚書上黨縣公長孫無忌中書令臨淄侯房𤣥齡右武侯大將軍尉遲敬徳兵部尚書建平男杜如晦左衛大將軍椒子侯君集等或夙預謨謀綢繆帷幄竭心懇到備申忠益或早從任使契闊戎麾誠著艱難績宣内外義貫終始志貞金石誓以河山實允朝議無忌可齊國公君集可潞國公食邑各三千户又真食邑各有差遣侍中陳叔達於殿下唱名示之謂朕叙公等􅈴量定封邑不能盡當宜各自言帝從父淮安王神通進曰義旗初起臣率兵先至今房𤣥齡杜如晦等刀筆之人功名第一臣竊不伏帝曰義旗初起人皆有心叔父雖得率兵未嘗身履行陣山東未定受委專征建徳南侵合軍咸没於後劉黑闥翻動叔父望風而敗今計􅈴行賞𤣥齡等有籌謀帷幄畫定社稷之功所以漢之蕭何雖無汗馬指縱推轂故得功居第一也叔父於國至親誠無所愛但以不可緣私濫與􅈴臣同賞耳初丘師利等訴者極多或懐袂指天以手畫地見淮安不得理由是皆息自相謂曰陛下以至公行賞不私其親吾屬何妄訴又云秦府副䕶軍尉遲敬徳從平隐太子巢刺王論功行賞敬徳及長孫無忌為第一各賜絹一萬匹齊府國司州幣器物封其全邸物與敬徳賜吳國公真實封一千二百户馬三寶為太子監門率領平道軍將帝嗣位有沙門法雅謀為妖逆三寶知而奏之法雅竟坐誅於是拜大將軍賜帛五百匹進爵為公竇靖為夏州都督屬突厥攜貳諸將出征多詣其所靖素知虜中虛實具言方畧諸將因之毎致尅㨗帝稱善賜物五百段髙宗總章元年十二月破髙麗以僧信誠為銀青光祿大夫賞先降也特進東代都督𤣥莵郡公泉南生為右衛大將軍進卞國公賞其鄉導有功也左驍衛大將軍檢校右羽林軍兼檢校司文正卿郕國公契苾何力為鎮軍行左衛大將軍徙封涼國公司空英國公勣加授兼太子太師仍加實封通舊一千一百户其嫡孫敬業授朝散大夫右武衛將軍薛仁貴為威衛大將軍封平陽郡公右監門將軍五原郡公李謹行為右武衛大將軍賞平髙麗之功也睿宗景龍四年即位六月辛丑以平韋氏功論所賞封薛宗暕為立節郡王鍾紹京銀青光祿大夫行中書侍郎賜爵潁川郡公劉幽求為中書舍人仍參知機務賜爵中山縣男自餘封各有差𤣥宗開元元年七月誅竇懐貞等賞定䇿功臣下制曰大臣立事夷險不易良相升朝安危所繫兵部尚書同中書門下三品郭元振偉材生代宏量鎮時經綸文章今之王佐出入將相古之人傑夙侍帷扆疇咨廟堂思志堯舜以期管樂朕往在儲闈洎登寶位毎觀其人聞義感激願判忠邪立誠慷慨宻陳𢎞益爾其至矣朕實嘉之頃者梟獍興謀干戈作釁太上皇命朕除討元振又馳奉宸極始則賚予為弼終則寧朕問安可謂格于皇天貫于白日元惡既翦物共為新昌言是圗朕豈􅁯舊宜開井邑永誓河山元振可封為代國公食實封四百户賜物一千段以前中書侍郎王琚為户部尚書封趙國公食實封三百户殿中監張皎為工部尚書封楚國公食實封五百户太僕少卿王守一為太常卿封晉國公食實封五百户殿中少監李令問為殿中監封宋國公食實封五百户庚午琚皎令問皆以崇寵固辭乃以琚復為中書侍郎加實封二百户通舊五百户皎為殿中監充内外閑廐使加實封二百户通舊七百户令問復為殿中少監兼知尚書加實封二百戸通舊五百户進將軍王毛仲為霍國公賜實封一百户通舊三百户賜吏部侍郎兼雍州長史齊國公崔日用實封二百户通舊四百户又制曰侍中兼太子左庶子梁國公魏知古中書侍郎同中書門下三品陸象先頃屬艱虞殱殄凶醜咸能倉卒之際志不顧身訏謨之初邪莫干正有罪斯服抑惟王典無言不酬以勸臣節俾加茅土式寵鹽梅知古賜食實封二百戸物二百段象先封兖國公食實封二百戸賜物五百段又賜姜皎王守一王琚李令問王毛仲甲第各一區並加上柱國八月己亥以中書令張説郯王傅兼國子祭酒褚無量輔導有功制曰無量執經傳禮敷暢微言俾予逰夫子之門知先王之道者侍講之功也説又定䇿監撫謀始危言防萌屯難慮終竭節以身許國其誠動天夫爵有徳封有功春彼茂勤宜𢎞賞典以桓榮之稽古况蕭何之指縱是用欽若朝經差其井賦説可封燕國公食實封三百戸無量可右散騎常侍兼國子祭酒封舒國公食實封三百户開元二年四月戊午進封郭䖍瓘為太原郡開國公食邑二千户封郭知運為介休縣開國公食邑一千户以賞功也制曰賞有功報有徳者政之㥯也若功不賞徳不報則何謂哉右驍衛將軍兼北庭都䕶澣海軍經略使金山道副大總管招慰營田等使太原縣開國子郭䖍瓘右驍衛中郎將檢校伊州刺史兼伊吾軍使郭知運等早負名節見稱義勇頃者抑中金滿偏師禦敵蕭條窮漠之外奔迫孤城之下彊寇益侵援兵不至既守而戰背秋涉冬櫪馬長嘶戍人逺望謀以十勝成其九拒遂能摧日逐之遺種斬天驕之愛息豈耿恭班超獨髙前史將亷頗李牧與朕同時眷言茂􅈴是所嘉歎信可疇其井邑昭示遐邇俾勞臣勸而懦夫立焉庚申又以䖍瓘為左驍衛大將軍知運為右驍衛將軍仍賜衣一襲以崇其寵九年夏四月庚寅胡賊康待賓據長泉縣作逆秋七月己酉擒待賔至京師腰斬之己丑朔方道行軍大總管兵部尚書清涼縣開國男王㻐進封清源縣開國公食邑一千戸兼與一子官賜物五百匹天興軍節度大使右羽林軍將軍檢校并州長史攝御史大夫燕國公張説與一子官賜物一百匹天興軍蕃漢討擊使特進史獻與一子官賜物二百五十匹賞平胡之􅈴也十月癸未以攝左羽林軍隴右防禦使薛訥為右羽林軍大將軍上柱國封河東郡開國公賜物三百段銀五百兩錢三萬貫賞功也以隴右防禦副使雲麾將軍左羽林軍將軍介休縣公郭知運進階冠軍進封太原郡公仍兼臨洮軍使賜物三百匹錢三十萬銀四百兩左武衛將軍清涼縣侯白道恭進封清涼縣公賜物二百匹錢二十萬銀二百兩以右威衛將軍杜賔客為靈州刺史充豐安軍使封建平縣開國男賜物二百段銀二百兩錢二十萬右監門衛將軍臨洮軍使安思順為洮州刺史充莫門使賜物二百段銀三百兩錢五十萬右威衛郎將楊楚客為右領軍衛中郎賜物二百段錢十萬銀二百兩並賞破吐蕃之功也十七年三月𤓰州刺史墨離軍使張守珪沙州刺史賈思順領伊沙等州兵入吐蕃大同軍大破吐蕃驅剪不可勝紀帝降書謂守珪曰吐蕃小寇干我邊鄙頻經䘮衂竟不悛懲卿等早懐勇烈久司戎旅各効忠誠暗申計略逺聞決勝嘉慰良深守珪及思順並宜賜紫其立功人叙錄具狀奏聞必須據實勿使踰濫今内出緋紫袍卿等領取量功分賞其被傷人仍給醫藥使得安全陣亡人具名錄奏當加優贈二十三年十二月命十道採訪使舉良刺史縣令以陜州刺史崔希逸潞州刺史宋鼎濮州刺史趙冬曦越州刺史元彦冲澤州刺史李植洛州刺史徐嶠之易州刺史盧暉莫州刺史鄭倩之隴州刺史武崇節廬州刺史竺承構嶲州刺史許齊物江州刺史李尚辭河南府陸渾縣令李常河南府長水縣令乙速孤令從陕州河北縣令李抗懐州修武縣令唐昭明京兆府髙陵縣令裴迴京兆府􅉦厔縣令戴休琔京兆府奉先縣令李知止京兆府涇陽縣令韋伯祥太原府祁縣令李志逺太原府清源縣令髙播蒲州永雒縣令裴胐解縣令李戒之齊州臨邑縣令上官貢涇州定安縣令王履璡洺州邯鄲縣令畢彦孫趙州平棘縣令霍栖梧梓州射洪縣令王休言蘇州崑山縣令李叔括州括蒼縣令祝紹荆州當陽縣令趙廣微荆州松滋縣令李修荆州枝江縣令董琅襄州安養縣令李泳等聞上降書宣慰刺史各賜帛八十匹縣令五十匹勑之曰卿等各能用心副朕所委今兹嵗㑹風政有歸是用激揚以勵清操天寶三年制唐元功臣締搆之初竭其忠欵錄功念舊情所不忘普恩之外更加一階其身没者各贈一官十三年三月隴右節度使哥舒翰破吐蕃洪濟大莫門等城井牧九曲其將咸來策􅈴翰採摭具奏乃以隴右十將特進兼右金吾衛員外大將軍兼大拔州都督燕王郡王大拔歸仁加驃騎大將軍餘如故河源軍使左武衛員外大將軍王思禮隴右兵馬使右武衛員外大將軍彭元曜並如故加特進隴右同節度副使右羽林軍員外大將軍張擢隴右都虞侯左武衛員外大將軍兼安鄉郡太守管崇嗣隴右同節度副使右武衛員外大將軍兼漢門軍使臨洮郡太守成如璆隴右同經略副使右金吾衛員外大將軍兼寧塞郡太守康承獻隴右討擊副使右領軍衛員外大將軍魯炤右領軍衛員外大將軍兼髙蘭府都督渾惟明並加雲麾軍將軍如故積石軍使臧奉忠為左金吾衛員外大將軍鎮西軍使郭光朝為右金吾衛員外大將軍河西經略副使蘇法鼎為威衛員外大將軍隴右討擊副使郭英乂彭體盈並為左羽林軍員外將軍並充本道驅使以安西節度使衛尉少卿員外置同正員兼安西副大都䕶攝御史中丞封清有功進加六階自朝議大夫授銀青光禄大夫仍遷鴻臚卿員外置同正員攝御史大夫餘如故並與一子五品更與一子官亡父亡母妻並加追贈及賜莊宅各一所肅宗至徳二年十二月大赦天下詔乗輿幸蜀天步多艱人心且揺臣節斯見太子太師幽國公韋見素開府儀同三司内侍監齊國公髙力士開府儀同三司右龍武大將軍潁川郡公陳𤣥禮開府儀同三司左龍武大將軍田長文開府儀同三司右龍武大將軍張崇俊右龍武大將軍杜休詳等勇不顧死危能致命或竭誠羽翼仰北辰而環拱或叶契心膂聚東井以全歸酬其錫社之封永以誓河之義見素加開府儀同三司實封三百户力士加實封三百户𤣥禮進封蔡國公實封三百户長文進封鴈門郡公崇俊進封南陽郡公休詳進封馮翊郡公各實封二百戸朕恭承天罰誓兵朔野幸興一旅之衆遂成九有之師言念經綸豈忘締搆銀青光禄大夫尚書右僕射裴冕識宇冲深體局貞固輸忠佐命肇啟興王加開府儀同三司封冀國公食實封三百户光禄大夫殿中監同正員判行軍李輔國志除君惡忠誠濟危加開府儀同三司殿中監依前判行軍事封成國公實封五百户銀青光祿大夫宗正卿兼工部侍郎李遵義切維城􅈴參定國加特進封鄭國公實封二百户開府儀同三司兼鴻臚卿同正員中軍都知兵馬副大使管崇嗣能訓戎律以佐兵權進封鉅鹿郡公實封二百户中軍都虞侯特進鴻臚卿同正員李鼎加開府儀同三司進封保定公加雲麾將軍右武衛大將軍右羽林軍宿衛内供奉王兢加特進太原縣侯仍各封實封一百户自寇戎姦宄王師未振瞻言京國尚聚犬羊廣平王俶脩學好古令徳孝恭志存邦家誓雪讐恥爰鞫其旅元戎啟行可封為楚王食實封二千户銀青光禄大夫尚書左僕射兼武部尚書同中書門下平章事兼靈武大都督府長史單于安北副都䕶持節充朔方節度使六城水運朔方管内採訪處置使郭子儀才光三傑功格十臣克焯皇威載昌大業加司徒兼尚書左僕射進封代國公食實封二千户平章事已後並如故開府儀同三司兼鴻臚卿同正朔方左廂兵馬使同節度副使姑臧縣伯僕固懐恩進封豐國公食實封二