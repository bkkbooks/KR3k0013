body:
  text: 册府元龜卷五百二十四宋王欽若等撰諌諍部規諌古者史為書瞽為詩工誦箴諌大夫規誨士傳信庻人謗商旅于市以至在御有旅賁之規位宁有官師之典居寝有贄御之箴皆所以救過而懲慾弼違而縫闕周旋顧省夙夜祗慄然後安處民上而臻乎叡聖者也然臣之事君守死無貳進有盡忠之訓退有後言之戒至於獻可替否有犯無隠批逆鱗而靡憚納苦言而罔懈勤勤懇懇以規其失者蓋其分焉三代而下方牘所記忠賢餘烈可得而徵也乃有揚㩁治道敷引徃昔形於論述言之有味以至切問近對援理以悟上心因類取譬指事以箴時病内發於悃幅外著於話言純誠篤至嘉猷灼叙其或有所感動申其規益濟世成務納君於善傳曰仁人之言其利􅄎哉斯之謂矣殷祖已髙宗祭成湯有飛雉升鼎耳而雊耳不聰之謂雊鳴祖已訓諸王賢臣也以訓道諌王作髙宗肜日祭之明日又祭殷曰肜周曰繹曰髙宗肜日越有雊雉於肜日有異雉祖已曰惟先格王正厥事言至道之王遭變異正其事而異自消乃訓於王曰惟天監下民典厥義祖已既言遂以道訓諌王言天視下民以義為常降年有永有不永非天夭民民中絶命言天之下年與民有義者長無義者不長非天欲夭民民自不修義以致絶命民有不若徳不聽罪天既孚命正厥德不順德言無義不服罪言不改脩天已信命正其徳謂有永有不永乃曰其如台祖已恐王未受其言故乃復曰天道其如我所言嗚呼王司敬民罔非天𦙍典祀無豊于昵周家父為大夫誦節南山之詩以諌幽王富辰為大夫襄王使伯服㳺孫伯如鄭請滑鄭伯不聽王命而執二子王怒将以狄伐鄭富辰諌曰不可臣聞之大上以德撫民無親疎也其次親親以相及也先親以及疎推㤙以行義昔周公弔二叔之不咸故封建親戚以蕃屏周弔傷也咸同也周公傷夏殷之叔世疏其親戚以至㓕亡故廣封其兄弟也管蔡郕霍魯衞毛􅅨郜雍曹滕畢原鄷郇文之昭也十六國皆文王子也管國在榮陽京縣東北雍國在河内山陽縣西畢國在長安縣西北鄷國在始平鄠縣東邘晉應韓武之穆也四國皆武王子應國在襄陽城父縣西韓國在河東郡界河内野王縣西北有邘城凡蔣邢茅胙祭周公之𦙍也𦙍嗣也蔣在弋陽縣期思縣西南平昌縣西有茅鄉東郡燕縣西南有胙亭召穆公思德之不類故糾合宗族于成周而作詩類善也糾收也召穆公周卿士名虎召采地扶風雍縣東南有召亭周厲王之時周徳衰㣲兄弟道缺召穆公于東都收㑹宗族特作此周公之樂歌常棣詩屬小雅曰常棣之華鄂不韡韡常棣棣也鄂鄂然華外發貌韡韡光明貌以喻兄弟和睦則強盛而有光輝韡韡然凡今之人莫如兄弟言致韡韡之盛莫如親兄弟其四章曰兄弟䦧于墻外禦其侮閲訟爭貌言内雖不和猶宜外捍異族之侵侮如是則兄弟雖有小忿不廢懿親懿美也今天子不忍小忿以棄鄭親其如之何庸勲親親暱近尊賢徳之大者也庸用也暱親也即聾從昧與頑用嚚姦之大者也棄德崇姦禍之大者也崇聚也鄭有平惠之勲平王東遷晋鄭是依惠王出奔虢鄭納之是其勲也又有厲宣之親鄭始封之祖桓公友周厲王子宣王之母弟棄嬖寵而用三良七年殺嬖臣申侯十六年殺師寵子子華也三良叔詹堵叔叔所謂尊賢於諸姬為近道近當暱之四德具矣耳不聼五聲之和為聾目不别五色之章為昧心不則德義之經為頑口不道忠信之言為嚚狄皆則之四姦具矣周之有懿德也猶曰莫如兄弟故封建之當周公時故言周之有懿德其懷柔天下也猶懼有外侮捍禦侮者莫如親親故以親屏周召穆公亦云周公作詩召公歌之故言亦云今周德既衰於是乎又渝周召以從諸姦無乃不可乎變周召親兄弟之道民未忘禍王又興之前有子頽之亂中有叔帶召狄故曰民未忘禍其若文武何言将廢文武之功業王弗聽又王子帶奔齊富辰言於王曰請召大叔富辰周大夫叔王子帶詩曰協比其鄰昏姻孔云王者為政先和協近親則昏姻甚相歸附也鄰猶近也孔甚也云旋也吾兄弟之不協焉能怨諸侯之不睦王悦王子帶自齊復歸於京師王召之也漢張釋之為謁者僕射從登虎圏文帝問上林尉禽獸簿十餘問尉左右視盡不能對虎圏嗇夫從旁代尉對帝所問禽獸簿甚悉欲以觀其能口對嚮應無窮者帝曰吏不當如此耶尉亡頼詔釋之拜嗇夫為上林令釋之前曰陛下以綘侯周勃何如人也帝曰長者又復問東陽侯張相如何如人也帝曰長者釋之曰夫綘侯東陽侯稱為長者此兩人言事嘗不出口豈效此嗇夫喋喋利口捷給哉且秦以任刀筆之吏爭以亟疾苛察相髙其敝徒文具亡惻隐之實以故不聞其過陵夷至於二世天下土崩今陛下以嗇夫口辯而超遷之臣恐天下隨風靡爭口辯亡其實且下之化上疾於影響舉錯不可不察也帝曰善乃止不拜嗇夫又為中郎将從行至霸陵上居外臨厠厠岸之邊側也時愼夫人從帝指愼夫人新豐道曰此北走邯鄲道也使愼夫人鼓瑟帝自倚瑟而歌倚瑟即今之以歌曲合也意悽愴悲懷謂羣臣曰嗟乎以北山石為椁用紵絮斮陳漆其間豈可動哉左右皆曰善釋之前曰使其中有可欲雖錮南山猶有隙使其中無可欲雖亡石椁又何戚焉文帝稱善賈誼文帝時為梁王太傅數年梁王勝死亡子誼上疏曰陛下即不定制如今之勢不過一傳再傳二傳世也諸侯猶且人恣而不制豪植立也而大強漢法不得行矣陛下所以為蕃扞及皇太子之所恃者唯淮陽代二國耳蕃翰得宜則嗣王安固故云皇太子之所恃也代北邊匈奴與強敵為鄰能自完則足矣而淮陽之北大諸侯僅如黑子之著靣適足以餌大國耳餌謂為其所吞食不足以有所禁禦方今制在陛下制國而令子適足以為餌豈可謂工哉人主之行異布衣布衣者飾小行競小亷以自託於鄉黨人主唯天下安社稷固不耳高皇帝𤓰分天下以王功臣反者如蝟毛而起蝟蟲名也其毛為刺以為不可故蔪去不義諸侯而虛其國不義諸侯彭越黥布等蔪謂芟刈也擇良日立諸子雒陽上東門之外諸侯國皆在闗東故於東門外立之也東靣最北出門日上東門畢以為王畢猶盡也而天下安故大人者不牽小行以成大功今淮南地逺者或數千里越兩諸侯越過也兩諸侯梁及淮陽而縣属於漢為縣而属於漢其吏民繇役徃來長安者自悉而補中道衣敝自悉其家資財補縫作衣悉盡也錢用諸費稱此其苦屬漢而欲得王至甚逋逃而歸諸侯者已不少矣其勢不可乆臣之愚計願舉淮南地以益淮陽而為梁王立後割淮陽北邊二三列城列城縣與東郡以益梁不可者可徙代王而都睢陽梁起於新郪以北著之河新郪潁川縣也淮陽包陳以南揵之江包取也揵謂立封界也或曰捷接也則大諸侯之有異心者破膽而不敢謀梁足以扞齊趙淮陽足以禁吳楚陛下髙枕終亡山東之憂矣此二世之利也從誼言可二世安耳言帝身及太子嗣位之時也當今恬然適遇諸侯之皆少恬安也少謂少年數嵗之後陛下且見之矣夫秦日夜苦心勞力以除六國之禍今陛下力制天下頥指如意但動頥指麾則所欲皆如意高拱以成六國之禍難以言智茍身亡事畜亂宿禍孰視而不定萬年之後傳之老母弱子將使不寜不可謂仁臣聞聖主言問其臣而不自造事欲發言則問其臣故使人臣得畢其愚忠唯陛下財幸財與裁同裁擇而幸從其言文帝於是從誼計乃徙淮陽王武為梁王北界泰山西至高陽得大縣四十餘城徙城陽王喜為淮南王撫其民時又封淮南厲王四子皆為列侯誼知帝必将復王之也上疏諌曰竊恐陛下接王淮南諸子謂接今時當即王之言不乆也接猶續也猶今人言續後爾曽不與如臣者熟計之也淮南王之悖逆亡道天下孰不知其辠悖惑也陛下幸而赦遷之自疾而死天下孰以王死之不當今奉尊罪人之子適足以負謗於天下耳言若尊王其子則是厲王無罪漢枉殺之此人少壯豈能忘其父哉少壮猶言稍長大白公勝所為父報仇者大父與伯父叔父也白公楚平王之孫太子建之子也大父即祖謂平王也伯父叔父平王諸子也事見春秋傳白公為亂非欲取國代主發忿快志剡利也手以衝仇人之匈固為俱靡而已言與仇人俱㓕斃也靡碎也淮南雖小黥布嘗用之矣漢存特幸耳言漢之勝黥布得存此直天幸耳夫擅仇人足以危漢之資於䇿不便言假四子以資權則當危漢雖割而為四四子一心也予之衆積之財此非有子胥白公報於廣都之中即疑有剸諸荆軻起於兩柱之間剸諸刺吳王荆軻刺秦皇事見春秋傳燕丹子也所謂假賊兵為虎翼者也周書云無為虎傅翼将飛入邑擇人而食願陛下少留計賈山為潁陰侯騎謂騎馬而從也孝文時言治亂之道借秦為諭名曰至言曰臣聞為人臣者盡忠竭愚以直諌主不避死亡之誅者臣山是也臣不敢以乆逺諭願借秦以為諭唯陛下少加意焉夫布衣韋帶之士修身於内成名於外而使後世不絶息至秦則不然貴為天子富有天下賦斂重數百姓任罷赭衣半道羣盗滿山使天下之人戴目而視傾耳而聽戴目者言常逺視有異志也傾耳而聽言樂禍亂也一夫大謼天下嚮應者陳勝是也秦非徒如此也起咸陽而西至雍離宮三百離宮非常所居也鐘鼓帷帳不移而具又為阿房之殿高數十仞阿房者言殿之四阿皆為房也東西五里南北千歩從車羅騎四馬騖馳旌旗不橈為宮室之麗至於此使其後世曽不得聚廬而託處焉為馳道於天下東窮燕齊南極吳楚江湖之上瀕海之觀畢至道廣五十歩三丈而樹厚築其外隠以金椎樹以青松為馳道之麗至於此使其後世曽不得邪徑而託足焉死葬乎驪山吏徒數十萬人曠日十年下徹三泉合采金石冶銅錮其内漆塗其外被以珠玉飾以翡翠中成觀㳺上成山林為塟薶之侈至於此使其後世曽不得蓬顆蔽冢而託塟焉顆謂土塊蓬顆言塊上生蓬者耳秦以熊羆之力虎狼之心蠶食諸侯并吞海内而不篤禮義故天殃已加矣臣昧死以聞願陛下少畱意而詳擇其中臣聞忠臣之事君也言切直則不用而身危不切直則不可以明道故切直之言明主所欲急聞忠臣之所以蒙死以竭知也地之磽者雖有善種不能生焉江臯河瀕雖有惡種無不猥大昔者夏商之季世雖闗龍逢箕子比干之賢身死亡而道不用文王之時豪俊之士皆得竭其知芻蕘採薪之人皆得盡其力此周之所以興也故地之美者善養禾君之仁者善養士雷霆之所擊無不摧折者萬鈞之所壓無不糜㓕者今人主之威非特雷霆也勢重非特萬鈞也開道而求諌和顏色而受之用其言而顯其身士猶恐懼而不敢自盡又迺况於縱欲恣行暴虐惡聞其過乎震之以威壓之以重則雖有堯舜之智孟賁之勇豈有不摧折者哉如此則人主不能聞其過失矣弗聞則社稷危矣古者聖王之制史在前書過失工誦箴諌瞽誦詩諌公卿比諌比方事類以諌也士傳言諌過庻人謗於道商旅議於市然後君得聞其過失也聞其過失而改之見義而從之所以永有天下也天子之尊四海之内其義莫不為臣然而養三老於大學親執醤而餽執爵而酳進食曰餽酳者少少飲酒謂食已而蕩口也祝䭇在前祝鯁在後䭇謂食不下也以老人好饐鯁故為備祝以視之公卿奉杖大夫進履舉賢以自輔弼求修正之士使直諌故以天子之尊尊養三老視孝也立輔弼之臣者恐驕也置直諌之士者恐不得聞其過也學問至於芻蕘者求善無饜也商人庻人誹謗已而改之從善無不聽也昔者秦政力并萬國富有天下破六國以為郡縣築長城以為關塞秦地之固大小之勢輕重之權其與一家之富一夫之彊胡可勝計也然而兵破於陳渉地奪於劉氏者何也秦王貪狠暴虐殘賊天下窮困萬民以適其欲也昔者周蓋千八百國以九州之民養千八百國之君用民之力不過嵗三日什一而籍什一謂十分之中公取一也籍借也謂借人力一日為簿籍而税之君有餘財民有餘力而頌聲作秦皇帝以千八百國之民自養力罷不能勝其役財盡不能勝其求一君之身耳所以自養者馳騁弋獵之娛天下無能供也勞罷者不得休息饑寒者不得衣食亡罪而死刑者無所告訴人與之為怨家與之為讐故天下壊也秦皇帝身在之時天下已壊矣而弗自知也秦皇帝東廵狩至㑹稽琅琊刻石著其功自以為過堯舜統縣石鑄鍾虡篩土築阿房之宫自以為萬世有天下也古者聖王作謚三四十世耳雖堯舜禹湯文武累世廣德以為子孫基業無過三二十世者也秦皇帝曰死而以謚法是父子名號有時相襲也以一至萬則世世不相復也故死而號曰始皇帝其次曰二世皇帝者欲以一至萬也秦皇帝計其功德度其後嗣世世無窮然身死纔數月天下四面而攻之宗廟㓕絶矣秦皇帝居㓕絶之中而不自知者何也天下莫敢告也其所以莫敢告者何也亡養老之義亡輔弼之臣亡進諌之士縱恣行誅退誹謗之人殺直諌之士是以道諛媮合苟容比其德則賢於堯舜課其功則賢於湯武天下已潰而莫之告也詩曰匪言不能胡斯畏忌聽言則對誦言如醉此之謂也又曰濟濟多士文王以寜天下未嘗亡士也然而文王獨言以寜者何也文王好仁則仁興得士而敬之則士用用之有禮義故不致其愛敬則不能盡其心不能盡其心則不能盡其力不能盡其力則不能成其功故古之賢君於其臣也尊其爵禄而親之疾則臨視之亡數死則徃弔哭之臨其小斂大斂已棺塗而後為之服錫衰麻絰而三臨其喪未斂不飲酒食肉未塟不舉樂當宗廟之祭而死為之廢樂故古之君人者於其臣也可謂盡禮矣服法服端容貌正顔色然後見之故臣下莫敢不竭力盡死以報其上功德立於後世而令聞不亡也今陛下念思祖考術追厥功圖所以昭光洪業休德使天下舉賢良方正之士天下皆訢訢焉曰將興堯舜之道三王之功矣天下之士莫不精白以承休德今方正之士皆在朝廷矣又選其賢者使為常侍諸吏與之馳敺射獵一日再三出臣恐朝廷之解弛百官之墮於事也諸侯聞之又必怠於政矣陛下即位親自勉以厚天下損食膳不聽樂减外徭衛卒止嵗貢省廏馬以賦縣傳去諸苑以賦農夫出帛十萬餘疋以賑貧民禮髙年九十者一子不事八十者二算不事一子不事蠲其賦役二算不事免二口之算賦也賜天下男子爵大臣皆至公卿發御府金賜大臣宗族亡不被澤者赦罪人憐其亡髪賜之巾憐其衣赭書其背父子兄弟相見而賜之衣平獄緩刑天下莫不悦喜是以元年膏雨降五糓登此天下之所以相陛下也刑輕於它時而犯法者寡衣食多於前年而盜賊少此天下之所以順陛下也臣聞山東吏布詔令民雖老羸癃疾扶杖而徃聽之願少須臾母死思見德化之成也今功業方就名聞方昭四方鄉風今從豪俊之臣方正之士直與之日日獵射擊伐狐以傷大業絶天下之望臣竊悼之詩曰靡不有初鮮克有終臣不勝大願願少衰射獵以夏嵗二月時以十月為嵗首則為夏正之二日為五日今欲定制度循其古法特云用夏歲二月也定明堂造大學修先王之道風行俗成萬世之基定然後唯陛下所幸耳古者大臣不媟故君子不常見有齊嚴之色肅敬之容大臣不得與宴㳺方正修㓗之士不得從射獵使皆務其方以髙其節則羣臣莫敢不正身修行盡心以稱大禮如此則陛下之道尊敬功業施於四海垂於萬世子孫矣誠不如此則行日壞而榮日㓕矣夫士修之於家而壞之於天子之廷臣竊愍之陛下與衆臣宴㳺與大臣方正朝廷論議夫㳺不失樂朝不失禮議不失計軌事之大者也主父偃齊人上書闕下諌伐匈奴曰臣聞明主不惡切諌以博觀忠臣不避重誅以直諌是故事無遺䇿而功流萬世今臣不敢隠忠避死以效愚計願陛下幸赦而少察之司馬法曰國雖大好戰必亡天下雖平忘戰必危司馬穰苴善用兵著書言兵法謂之司馬法一説司馬古主兵之官有軍陳用兵之法天下既平天子大愷大愷周禮還師振旅之樂也春蒐秋獮諸侯春振旅秋治兵所以不忘戰也春為陽中其行木也秋為陰中其行金也金木兵噐所資故於此時蒐獮治兵也蒐蒐索也取不孕者獮應殺氣也振整旅衆也且怒者逆德也兵者凶噐也爭者末節也古之人君一怒必伏尸流血故聖王重貴也行之夫務戰勝窮武事未有不悔者也昔秦皇帝任戰勝之威蠶食天下并吞戰國海内為一功齊三代務勝不休欲攻匈奴李斯諌曰不可夫匈奴無城郭之居委積之守遷徙鳥舉難得而制輕兵深入糧食必絶運糧以行重不及事得其地不足以為利得其民不可調而守之不可和調也勝必棄之非民父母靡敝中國甘心匈奴非完計也秦皇帝不聽遂使蒙恬将兵而攻胡郤地千里以河為境地固澤鹵不生五糓地多沮澤而鹹鹵然後發天下丁男以守北河暴兵露師十有餘年死者不可勝數終不能踰河而北是豈人衆之不足兵革之不備哉其勢不可也又使天下飛芻輓粟運載芻藁令其疾至故曰飛芻也輓謂引車船也起於黄腄琅邪負海之郡轉輸河北黄腄二縣名也竝在東萊言自東萊及琅邪緣海諸郡皆令轉輸至河北也率三十鍾而致一石六斛四斗為鍾計其道路所費凡用百九十二斛乃得一石至男子疾耕不足於糧餉女子紡績不足於帷幕百姓靡敝孤寡老弱不能相養道死者相望道死謂死於路也蓋天下始叛也及至髙皇帝定天下畧地於邊聞匈奴聚代谷之外而欲擊之御史成諌曰不可夫匈奴獸聚而鳥散從之如搏景搏擊也摶人之隂景言不可得也今以陛下盛徳攻匈奴臣竊危之髙帝不聽遂至代谷果有平城之圍髙帝悔之廼使劉敬往結和親然後天下亡干戈之事故兵法曰興師十萬日費千金秦帝積衆數十萬人雖有覆軍殺將係虜單于適足以繼怨深讐不足以償天下之費夫匈奴行盜侵敺所以為業天性固然來侵邊境而毆掠人畜也上自虞夏殷周固不程督程課也督視責也覊縻待之不比為人夫不上觀虞夏殷周之統而下循近世之失此臣之所以大恐百姓所以疾苦也且夫兵乆則變生事苦則慮易言思慮變易失其常也使邊境之民靡敝愁苦將吏相疑而外市與外國交市己利若章邯之比也故尉佗章邯得成其私而秦政不行權分二子此得失之效也故周書曰安危在出令存亡在所用此周書者本尚書之餘願陛下熟計之而加察焉徐樂燕郡無終人也上書曰臣聞天下之患在於土分不在瓦解古今一也何謂土分秦之末世然也陳渉無千乘之尊疆土之地身非王公大人名族之後鄉曲之譽非有孔曽墨子之賢陶朱猗頓之富也然起窮巷奮棘矜矜者㦸之把也時秦銷兵器故但有㦸之把也偏袒大呼天下從風此其故何也繇民困而主不恤下怨而上不知俗已亂而政不修此三者陳渉之所以為資也此之謂土分故曰天下之患在乎土分何謂瓦解吳楚齊趙之兵是也七國謀為大逆號皆稱萬乘之君帶甲數十萬威足以嚴其境内財足以勸其士民然不能西攘尺寸之地攘謂侵取漢地而身為禽於中原者此其故何也非權輕於匹夫而兵弱於陳渉也當是之時先帝之徳未衰而安土樂俗之民衆故諸侯無境外之助此之謂瓦解故曰天下之患不在瓦解繇此觀之天下誠有土分之勢雖布衣窮處之士或首難而危海内首難謂首唱而作難也陳渉是也况三晉之君或存乎韓魏趙三國本共分晉故稱三晉天下雖未治也誠能無土分之勢雖有彊國勁兵不得還踵而身為禽吳楚是也况羣臣百姓能為亂乎此二體者安危之明要賢主之所留意而深察也間者關東五糓數不登年嵗未復民多窮困重之以邊境之事推數循理而觀之民宜有不安其處者矣不安故易動易動者土分之勢也故賢主獨觀萬化之原明於安危之機修之廟堂之上而銷未形之患也其要期使天下無土分之勢而已矣故雖有彊國勁兵陛下逐走獸射飛鳥引逰燕之囿淫縱恣之觀極馳騁之樂自若自若者言如其常無所廢損也金石絲竹之聲不絶於耳帷幄之私俳優朱儒之笑不乏於前而天下無宿乆也憂名何必夏子俗何必成康夏禹也子湯也湯子姓雖然臣竊以陛下天然之質寛仁之資而誠以天下為務則湯文不難侔而成康之俗未必不復興也侔等也此二體者立然後處尊安之實揚廣譽於當世親天下而服四夷餘恩遺德為數世隆南靣背依攝袂而揖王公此陛下之所服事也也臣聞圖王不成其敝足以安言其敝未之法猶足自安也安則陛下何求而不得何威而不成奚何也征而不服哉嚴安者臨淄人也以故丞相史上書曰臣聞鄒子曰鄒衍之書也政教文質者所以云救也以救敝當時則用過則舍之非其時則廢置也可易則易之可變易者則易也故守一而不變者未睹治之至也今天下人民用財侈靡車馬衣裘宮室皆競修飾調五聲使有節奏節飾也奏進也雜五色使有文章重五味方丈於前以觀欲天下觀猶顯也顯示之使其慕欲也彼民之情見美則願之是教民以侈也侈而無節則不可贍贍足也民離本而徼末矣徼要求也末不可徒得徒空也故搢紳者不憚為詐帶劍者夸殺人以矯奪夸大也競也矯偽也而世不知媿故姦軌浸長浸漸也夫佳麗珍怪固順於耳目故養失而泰樂失而淫禮失而采采者文過其實也教失而偽偽采淫泰非所以範民之道也範謂為之立法也是以天下人民逐利無已犯法者衆臣願為民制度以防其淫使貧富不相懼以和其心心既和平其性恬安恬安不營則盜賊銷盜賊銷則刑罰少刑罰少則陰陽和四時正風雨順草木暢茂五穀蕃熟六畜遂字蕃多也遂成也字生也民不夭厲和之至也厲病也臣聞周有天下其治三百餘嵗成康其隆也刑錯四十餘年而不用及其衰亦三百餘年故五伯更起伯者常佐天子興利除害誅暴禁邪輔正海内以尊天子五伯既沒賢聖莫續天子孤弱號令不行諸侯恣行強陵弱衆暴寡田常簒齊六卿分晉竝為戰國此民之始苦也於是強國務政弱國修守合從連衡馳車轂擊車轂相擊言其衆多也介胄生蟣虱民無所告愬及至秦王蠶食天下并吞戰國稱號皇帝一海内之政壊諸侯之城銷其兵鑄以為鐘虡虡懸鐘者也示不復用元元黎民得免於戰國逢明天子人人自以為更生言天下以戰國之苦逢聖明之主則可以更生而秦皇反為虐政以殘害也鄉使秦緩刑罰薄賦斂省徭役貴仁義賤權利上篤厚下佞巧變風易俗化於海内則世世必安矣秦不行是風循其故俗為知巧權利者進篤厚忠正者退法嚴令苛讇諛者衆日聞其美意廣心逸欲威海外使蒙恬將兵以北攻強胡辟地進境戍於河北飛芻輓粟以隨其後又使尉屠雎將樓船之士攻越使監禄鑿渠運糧深入越地越人遁逃曠日持乆糧食乏絶越人擊之秦兵大敗秦乃使尉佗將卒以戍越當是時秦禍北搆於胡南挂於越挂縣也宿留也兵於無用之地進而不能退行十餘年丁男被甲丁女轉輸苦不聊生自經於道路死者相望及秦皇帝沒天下大畔陳勝吳廣蜂舉舉謂起兵也武臣張耳舉趙項梁舉吳田儋舉齊景駒舉郢周市舉魏韓廣舉燕窮山通谷豪士竝起不可勝載也然本皆非公侯之後非長官之吏長官謂官之長也無尺寸之勢起閭巷杖棘矜應時而動不謀而俱起不約而同㑹壌長地進至乎伯王長進益也言其稍稍攻伐進益土境以至彊大也時教使然也秦貴為天子富有天下㓕世絶祀窮兵之禍也故周失之弱秦失之強不變之患也今徇南夷朝夜郎降羌僰畧薉州建城邑深入匈奴燔其龍城燔燒也龍城匈奴祭天處議者美之此人臣之利非天下之長䇿也今中國無狗吠之警而外累於逺方之備靡敝國家非所以子民也子謂養之如子行無窮之欲甘心快意結怨於匈奴非所以安邊境也禍拏而不解兵休而復起拏相連引也近者愁苦逺者驚駭非所以持乆也今天下鍜甲摩劔矯箭控弦矯正曲使直也控引也轉輸軍糧未見休時此天下所共憂也夫兵乆而變起事煩而慮生今外郡之地或幾千里列城數十形束壤制言其土地形勢足以束制其民帶脇諸侯帶者言諸侯之郡守譬若佩帶謂輕小也脇者謂其力足以脇人也一曰帶在脇房附著之義非宗室之利也上觀齊晉所以亡公室卑削六卿太盛也下覽秦之所以㓕刑嚴文刻欲大無窮也今郡守之權非特六卿之重也地畿千里非特閭巷之資也甲兵噐械非特棘矜之用也以逢萬世之變則不可勝諱也言不可盡諱者言必㓕亡也後以安為騎馬令主天子之騎馬也賈捐之字君房賈誼之曽孫也元帝初即位上疏言得失召待詔金馬門初武帝征南越元封元年立儋耳珠厓郡皆在南方海中洲居居海中之洲也水中可居者曰洲廣袤可千里袤長也合十六縣户二萬三千餘其民暴惡自以阻絶數犯吏禁吏亦酷之率數年一反殺吏漢輙發兵擊定之自初為郡至昭帝始元元年二十餘年間凡六叛至其五年罷儋耳郡并屬珠厓至宣帝神爵二年珠厓三縣復反後七年甘露九年九縣反輙發兵擊定之元帝初元元年珠崖又反發兵擊之諸縣更叛連年不定帝與有司議大發軍捐之建議以為不當擊上使王商詰之曰珠厓内屬為郡久矣今皆叛而云不當擊長蠻夷之亂虧先帝功徳經義何以處之於六經之内當何者之科條也捐之對曰臣得遭明盛之朝蒙危言之䇿無忌諱之患危言直言也言出而身危故云危言論語稱孔子曰邦有道危言危行敢昧死竭卷卷臣聞堯舜聖之盛也禹入聖域而不優禹之功德裁入聖人區域但不能優㤗耳故孔子稱堯曰大哉韶曰盡善禹曰無間以三聖之德地方不過數千里西被流沙東漸于海朔南暨聲教迄于四海欲與聲教則治之不欲與者不強治也故君臣歌德言皆有德可歌頌含氣之物各得其宜武丁成王殷周之大仁也武丁殷之高宗然地東不過江黄西不過氐羌南不過蠻荆北不過朔方是以頌聲竝作視聽之類咸樂其生越裳氏重九譯而獻逺國使來因九譯言乃通也越裳國名王充論衡作越甞此非兵革之所能致及其衰也南征不還謂昭王也為楚所溺也齊桓捄其難謂襄王也初為太子而惠王欲立王子帶齊桓公為首止之盟以定太子之位事在左傳僖公五年孔子定其文孔子作春秋夷狄之國雖大自稱王者皆貶為子以至乎秦興兵逺攻貪外虛内務欲廣地不慮其害然地南不過閩越北不過太原而天下潰畔禍卒在於二世之末也卒終也長城之歌至今未絶頼聖漢初興為百姓請命平定天下至孝文皇帝閔中國未安偃武行文則㫁獄數百民賦四十丁男三年而一事常賦嵗百二十嵗一事時天下民多故出賦四十三嵗而一事時有獻千里馬者詔曰鸞旗在前屬車在後鸞旗編以羽毛列繫橦旁載於車上大駕出則陳於道而先行屬車相連屬而陳於後也吉行日五十里師行日三十里朕乗千里之馬獨先安之安之言何所徃適於是還馬與道里費而下詔曰朕不受獻也其令四方母求來獻當此之時逸㳺之樂絶竒麗之賂塞鄭衛之倡微矣夫後宮盛色則賢者隠處佞人用事則諍臣杜口而文帝不行故謚為孝文廟稱太宗至孝武皇帝元狩六年太倉之粟紅腐而不可食粟乆腐壞則色紅赤也都内之錢貫朽而不可校校謂數計也迺探平城之事追計其事故言探録冐頓以來數為邊害厲兵馬因富民以攘服之攘却也西連諸國至于安息東過碣石以𤣥莬樂浪為郡詔曰辱哉今關東大困倉庫空虚無以相贍又以動兵非特勞民凶年隨之其罷珠厓郡民有慕義欲内屬便處之欲有來入内郡者所至之處即安置也不欲勿強珠厓繇是罷東方朔為郎中武帝時天下侈靡趨末末謂工商之業百姓多離農畝帝從容問朔吾欲化民豈有道乎朔對曰堯舜禹湯文武成康上古之事經歴數千載尚難言也臣不敢陳願近述孝文皇帝之時當世耆老皆聞見之貴為天子富有四海之内身衣弋綈弋黒色也綈厚繒足履革舄革生皮也不用柔韋言儉率也以韋帶劔但空用韋不加飾莞蒲為席莞夫離也今謂之蔥蒲以莞及蒲為席亦尚質也兵木無刃兵器如木而無刃言不大治兵噐也衣緼無文緼亂絮也言内有亂絮上無文綵也集上書囊以為殿帷集謂合聚也以道德為麗以仁義為凖麗美也凖平法也於是天下望風成俗昭然化之今陛下以城中為小圖起建章左鳳闕右神明鳳闕闕名神明臺名也號稱千門萬户木土衣綺繡狗馬被繢􅄢繢五綵也􅄢織也即繢之屬宮人簪瑇瑁垂珠璣設戲車教馳逐飾文采叢珍怪撞萬石之鐘擊雷霆之皷作俳優舞鄭女上為淫侈如此而欲使民獨不奢侈失農事之難者也陛下誠能用臣朔之計推甲乙之帳燔之於四通之衢却走馬示不復用則堯舜之隆宜可與比治矣易曰正其本萬事理失之毫釐差以千里願陛下留意察之路温舒守廷尉史宣帝即位上書言宜尚德緩刑其辭曰臣聞齊有無知之禍而桓公以興晉有驪姬之難而文公用伯近世趙王不終諸呂作亂而孝文為太宗繇是觀之禍亂之作将以開聖人也故桓文扶微興壞尊文武之業澤加百姓功潤諸侯雖不及三王天下歸仁焉文帝永思至德以承天心崇仁義省刑罰通闗梁一逺近敬賢如大賓愛民如赤子内恕情之所安而施之於海内是以囹圄空虛天下太平夫繼變化之後必有異舊之恩此聖賢所以昭天命也徃者昭帝即世而無嗣大臣憂戚焦心合謀皆以昌邑尊親援而立之援引也然天不授命淫亂其心遂以自亡深察禍變之故乃皇天之所以開至聖也故大將軍受命武帝肱股漢國謂霍光披肝膽决大計黜亡義立有德輔天而行然後宗廟以安天下咸寧臣聞春秋正即位大一統而愼始也陛下初登至尊與天合符宜改前世之失正始受命之統滌煩文除民疾存亡繼絶以應天意臣聞秦有十失其一尚存治獄之吏是也秦之時羞文學好武勇賤仁義之士貴治獄之吏正言者謂之誹謗遏過者謂之妖言遏止也故盛服先生不用於世忠良切言皆欝於胸欝積也譽諛之聲日滿於耳虛美熏心實禍蔽塞熏氣烝也此乃秦之所以亡天下也方今天下頼陛下恩厚亡金革之危饑寒之患父子夫妻戮力安家然太平未洽者獄亂之也夫獄者天下之大命也死者不可復生斷者不可復屬書曰與其殺不辜寕失不經虞書大禹謨載咎繇之言辜罪也經常也言人命至重治獄宜愼寕失不常之過不濫無罪之人所以崇寛恕也今治獄吏則不然上下相敺以刻為明深者獲公名平者多後患故治獄之吏皆欲人死非憎人也自安之道在人之死是以死人之血流離於市被刑之徒比肩而立大辟之計嵗以萬數此聖人之所以傷也太平之未洽凡以此也夫人情安則樂生痛則思死捶楚之下何求而不得故囚人不勝痛則飾辭以視之吏治者利其然則指導以明之上奏畏郤則鍛練而周内之精熟周悉致之法中也郤退也畏為上所郤退盖奏當之成當謂處其罪也雖咎繇聼之猶以為死有餘辜咎繇作士善聽獄訟故以為喻也何則成練者衆文致之罪明也是以獄吏專為深刻殘賊而亡極媮為一切媮茍且一切權時也不顧國患此世之大賊也故俗語曰畫地為獄議不入刻木為吏期不對畫獄木吏尚不入對况眞實乎期猶必也議必不入對此皆疾吏之風悲痛之辭也故天下之患莫深於獄敗法亂正離親塞道莫甚乎治獄之吏此所謂一尚存者也臣聞烏鳶之卵不毁而後鳳凰集烏鴟也誹謗之罪不誅而後良言進故古人有言山藪藏疾川澤納汙瑾瑜匿惡國君含詬詬耻也言山藪之有草木則毒害者居之川澤之形廣大則能受於汙濁人君之善御下亦當忍耻病也唯陛下除誹謗以招切言開天下之口廣箴諌之路掃亡秦之失尊文武之德省法制寛刑罰以廢治獄則太平之風可興於世永履和樂與天亡極天下幸甚與天長乆無窮極也帝善其言遷廣陽私府長册府元龜卷五百二十四
