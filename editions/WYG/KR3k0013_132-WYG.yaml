body:
  text: 册府元龜卷一百三十二宋王欽若等撰帝王部褒功周官司勳掌六功之名數而制其褒賞之典繇三代而下乃有參豫締搆輔成大業扶奬王室佐佑生民處帷幄而運籌内申於毗賛執干戈而戡難外震於威靈至或矢謀盡規經物成務定策佐命而安宗社奉辭出塞而清戎羯勳烈並建威聲載路於是有金石之賜車服之錫加以殊禮形於善頌乃至増其爵秩賞及胄裔推詔奨以温密著圖繢之炳煥示慈於燕喜宥死於甲令陪𦵏於園寝配饗於大烝稱伐於銘篆飾終於贈諡皆所以顯楊其丕績懋觀於來者使知夫為善之益而慕報徳之盛焉周武王伐紂時封諸臣有功者於廟作賚之詩賚予也言所以賜予善人也成王㓜弱周公踐天子之位以治天下六年朝諸侯於明堂制禮作樂頒度量而天下大服踐猶履也頒讀為班度謂丈尺髙卑廣狹也量為豆區斗斛箱莒所容受七年致政於成王以周公為有勳勞於天下致政以王事歸授之王功曰勳事功曰勞是日封周公於曲阜地方七百里革車千乗曲阜魯地上公之封地方五百里加魯以四等之附庸方百里者二十四並五五二十五積四十九開方之得七百里革車兵車也兵車千乘戎國之賦也詩魯頌曰王謂叔父建爾元子俾侯於魯大啟爾宇為同室輔乃命魯公俾侯于東錫之山川土田附庸又曰公車千乗朱英緑縢也命魯世世祀周公以天子之禮樂同之於周尊之也魯公謂伯禽是以魯君孟春乘大路載弧韣旂十有二旒日月之章祀帝於郊配以后稷天子之禮也孟春建子之月魯之始郊月以至大路殷之祭天車也弧旌旂所以張幅也其衣曰韣天子之旌旂畫日月帝謂蒼帝靈威曜也吴天上帝魯不祭季夏六月以禘禮祀周公於太廟牲用白牡尊用犠象山罍鬱尊用黄目灌用玉瓉大圭薦用玉豆雕篹爵用玉琖仍雕加以璧散璧角爼用梡嶡升歌清廟下管象朱干玊戚冕而舞大武皮弁素積裼而舞大夏昧東夷之樂也任南蠻之樂也納夷蠻之樂於太廟言廣魯於天下也季夏建巳之月也禘大祭周公曰太廟魯公曰世室羣公稱宫白牡殷牲也尊酒器也犧尊以沙羽為盡飾象骨飾之鬱鬯之器也黄彛也灌酌鬱鬯以獻也瓚形如槃容五升以大圭為柄是謂圭瓚篹籩屬也以竹為之雕刻飾其直者也爵君所進于尸也仍因也因爵之形為之飾也加加爵也散角皆以璧飾其口也梡始有四足也嶡為之距清廟同頒也象謂周頒武也以管播之朱干赤大盾也戚斧也冕冠名也諸侯之服自衮冕而下如王之服也大武周舞也大夏夏舞也周禮昧師掌教昧樂詩曰以雅以南以籥不僣廣大也周公在豐致政老歸將没欲葬成周已所營作示終始念之公薨成王葬于畢不敢臣周公故使近文武之墓告周公作亳姑周公徙奄君子亳姑因告作以葬畢之義并及奄已定亳姑言所遷之功成云康王追念周公之所以勲勞者而欲尊魯故賜之以重祭外祭則郊社是也内祭則大嘗禘是也言此者王室所欲右周公之功夫大嘗禘外歌清廟下而管象朱干玉戚以舞大武八佾以舞大夏此天子之樂也康周公故以賜魯也清廟頌文王之詩也管象吹管而舞武象之樂也朱干赤盾戚斧也此武象之舞所執也佾猶列也大夏禹樂文舞也執羽籥文武之舞皆八列互言之耳康猶褒大也易晉卦曰康侯用錫馬子孫纂之至於今不廢所以明周公之德而又以重其國也不廢不廢其此禮樂也重猶尊也平王元年命衛侯和為公和武公也初犬戎殺幽王武公将兵往佐周平戎甚有功王命為公定王十三年晉士㑹帥師滅赤狄晉侯請于王戊申以黻冕命士㑹将中軍且為太傅代荀林父将中軍且加以太傅之官黻冕命卿之服太傅孤卿靈王十八年魯襄公之十九年也鄭公孫蠆卒赴於晉大夫范宣子言於晉侯以其善於伐秦也襄十四年晉伐秦子蟜見諸侯師而勸之濟涇也六月晉侯請於王王追賜之大路使以行禮大路天子所賜車服摠名以行𦵏禮傳言大夫有功則賜服路漢髙祖五年項籍死帝置酒對衆折隨何曰腐儒腐儒爛敗言無所堪任為天下安用腐儒哉髙祖意欲㐮賞隨何恐羣臣不服故對衆折辱令其自數功勞也隨何跪進曰夫陛下引兵攻彭城楚王未去齊也陛下發歩卒五萬人騎五千能以取淮南乎曰不能隨何曰陛下使何與二十人使淮南如陛下之意是何之功賢於歩卒數萬騎五千也然陛下謂何腐儒為天下安用腐儒何也帝曰吾方圖子之功圖謀也乃以隨何為䕶軍中尉是年髙祖置酒雒陽南宫帝曰通侯諸將舊曰徹侯避武帝諱曰通侯通亦徹也通言其功徳通於王室也又其後改為列侯列者見序列也毋敢隠朕朕曰我古者上下共文咎繇與帝舜言稱朕屈原曰朕皇考至秦獨以為尊稱漢遂因之而不改也皆言其情吾所以有天下者何項氏之所以失天下者何髙起王陵對曰姓髙名起漢帝年紀髙帝時有信平侯臣陵都武侯臣起魏相邴吉奏髙帝事有臣陵臣起陛下嫚而侮人嫚易也讀與慢同項羽仁而敬人然陛下使人攻城畧地所降下者因以與之與天下同利也項羽妬賢疾能有功者害之賢者疑之戰勝而不與人功得地而不與人利此其所以失天下也帝曰公知其一未知其二夫運籌帷幄之中决勝千里之外吾不如子房填國家撫百姓給餽餉不絶糧道吾不如蕭何填與鎮同鎮安也餽亦饋字連百萬之衆戰必勝攻必取吾不如韓信三者皆人傑吾能用之傑言傑然獨出也此吾所以取天下者也項羽有一范增而不能用此所以為我擒也羣臣恱服宣帝本始元年詔曰夫褒有徳賞有功古今之通義也車騎將軍光禄勳富平侯安世宿衛忠正宣徳眀恩勤勞國家守職秉義以安宗廟其益封萬六百户次大將軍光甘露二年單于始入朝帝思股肱之羙迺圖畫其人於麒麟閣武帝獲麒麟時作此閣圖畫其象於閣遂以為名又曰漢宫閣疏云蕭何造法其形貎署其官爵姓名惟霍光不名曰大司馬大將軍博陸侯姓霍氏次曰衛將軍富平侯張安世次曰車騎將軍龍頟侯韓增次曰後將軍營平侯趙充國次曰丞相髙平侯魏相次曰丞相博陵侯丙吉次曰御史大夫建平侯杜延年次曰宗正陽城侯劉徳次曰少府梁丘賀次曰太子太傅蕭望之次曰典屬國蘇武皆有功徳知名當世是以表而揚之眀著中興輔佐列於方叔召虎仲山甫焉三人皆周宣王之臣有文武之功佐宣王中興者言宣帝亦重興漢室而霍光等並為名臣皆比於方叔之屬凡十一人成帝建始四年河决於館陶河隄使者王延世使塞命其為使而塞河也華陽國志云延世字長叔犍為資中人也以竹落長四丈大九圍盛以小石兩舩夾載而下之三十六日河隄成帝曰東郡河決流漂二州校尉延世隄防三旬立塞其以五年為河平元年卒治河者為著外繇六月以卒治河有勞雖執役日近皆得比繇戌六月也著謂著於簿籍也惟延世長於計策功費約省用力日寡朕甚嘉之其以延世為光禄大夫秩中二千石賜爵闗内侯黄金百斤後漢光武初景丹為偏將軍號奉義侯從撃王郎將兒宏等於南燕郎兵迎戰漢軍退郤續漢書曰南燕賊足里上營得上彭車輊重數重也丹等縱突騎擊大破之追奔十餘里死傷者縱横丹還光武謂曰吾聞突騎天下精兵今乃見其戰樂可言邪建武四年漁陽太守彭寵反上谷太守耿况屢攻破之五年寵死天子嘉况功使光禄大夫樊宏詔况曰惟况功大不宜監察從事邉郡塞苦不足久居其詣行在所賜甲第奉朝請封陽平侯五年建威大將軍耿弇攻張歩於臨淄張歩復来攻弇弇擊破之後數日車駕至淄自勞軍羣臣大㑹帝謂弇曰昔韓信破歴下以開基今將軍攻祝阿以發跡此皆齊之西界功足相方而韓信襲擊已降將軍獨㧞勍敵其功乃難於信也六年征西大將軍馮異朝京師引見光武謂公卿曰是我起兵時主簿也為吾披荆棘定闗中既罷使中黄門賜以珍寳衣服錢帛詔曰倉卒蕪蔞亭豆粥滹沱河麥飯厚意久不報異稽首謝曰臣聞管仲謂桓公曰願君無忘射鈎臣無忘檻車齊國頼之臣今亦願國家無忘河北之難小臣不敢忘巾車之恩後數引燕見定議圖蜀留十餘日令異妻子隨還西上八年征隗囂征虜將軍祭遵屯汧公孫述遣兵救囂諸將奔還遵獨留不却詔曰將軍連年距難衆兵即却復獨案部功勞爛然兵退無宿戒糧食不豫具今乃調度恐力不堪國家知將軍不易亦不遺力送縑千匹以賜吏士陳俊初為安集掾擊銅馬拜彊弩將軍與五校戰手接短兵追奔二十餘里斬將光武望而嘆曰戰將盡如是豈有憂哉以俊為琅琊太守行大将軍事俊將兵擊董憲於贛榆贛榆縣名屬東海郡進破朐賊孫陽平之是年張歩畔還琅琊俊追討斬之帝羙其功詔俊得専征青徐華嶠書曰賜俊壐書曰将軍元勳大著威震青徐兩州有警得專征之也俊得撫貧弱表有義簡制軍吏不得與郡縣相干百姓歌之數上書自請願奮擊隴蜀詔報曰東州新平大將軍之力也負海猾夏盜賊之處國家以為重憂且勉鎮撫之眀帝時竇憲既破北單于勒銘燕山乃班師詔使中郎將持節即五原拜憲大將軍封武陽侯食邑二萬户憲固辭封賜策許焉永平二年詔曰大將軍憲前嵗出征克滅北狄朝加封賞固讓不受舅氏舊典並蒙爵土西漢故事帝舅皆封其封憲冠軍侯邑二萬户篤郾侯景汝陽侯瓌夏陽侯各六千户憲獨不受封永平中帝追感前世功臣乃圖畫二十八將於南官雲䑓其外又有王嘗李通竇融卓茂合三十二人其二十八將者太傅髙宻侯鄧禹中山太守全椒侯馬成大司馬廣平侯吳漢河南尹阜成侯王良左將軍膠東侯賈復琅琊太守祝阿侯陳俊建威大將軍好畤侯耿弇驃騎大將軍參􅑈侯杜茂執金吾雍奴侯㓂恂積弩將軍昆陽侯傅俊征南大將軍舞陽侯岑彭左曹合肥侯堅鐔征西大將軍夏陽侯馮異上谷太守淮陽侯王覇建義大將軍潁陽侯祭遵豫章太守中水侯李忠驃騎大將軍櫟陽侯景丹右將軍槐里侯萬修虎牙大將軍安平侯蓋延太常靈夀侯邳彤衛尉安成侯銚期驍騎將軍昌成侯劉植東郡太守東光侯耿純横野大將軍山桑侯王嘗城門校尉節陵侯臧宫大司空固始侯李通捕虜將軍楊虛侯馬武大司空安豐侯竇融驃騎將軍慎侯劉隆太傅宣徳侯卓茂傅育為武威將軍䕶𦍑校尉戰死育初為臨𦍑長與捕虜將軍馬武等撃𦍑滇浯功冠諸軍及在武威聲聞於匈奴食禄數十年秩奉盡贍給知友妻不免操井臼帝下詔追褒羙之封其子毅為眀進七百户魏太祖令曰故陳留太守棗祗天性忠能始共舉義兵周旋征討後袁紹在冀州亦貪祗欲得之祗深附託於孤使領東阿令吕布之亂兖州皆叛惟范東河完在繇祗以兵據城之力也後大軍糧乏得東河以繼祗之功也及破黄巾定許得賊資業當興立屯田時議者皆言當計牛輸榖佃科以定施行後祗白以為僦牛輸糓大收不增糓有水旱灾除大不便反覆来説孤猶以為當如故大收不可復改易祗猶執之孤不知所從使與荀令君譏議之時故軍祭酒侯聲云科取官牛為官田計如祗議於官便於客不便聲懐此云云以疑令君祗猶自信據計畫還白執分田之術孤乃然之使為屯田都尉施設田業其時嵗則大收後遂因此大田豐足軍用摧滅羣逆克定天下以隆王室祗興其功不幸早歿追贈以郡猶未副之今重思之祗宜受封稽留至今孤之過矣祗子處中宜加封爵以祗為不朽之事婁圭字子伯從太祖破馬超等子伯功為多太祖嘗嘆曰子伯之計孤不及也程昱嘗從太祖征討屢有功及中夏漸平太祖拊昱背曰兖州不用君言吾何以至此徐晃為平冦將軍太祖還鄴留晃與夏侯淵拒劉備於陽平備遣陳式等十餘營絶馬鳴閣道晃别征破之賊自投山谷多死者太祖聞甚喜假晃節令曰此閣道漢中之險要咽喉也劉備欲斷絶外内以取漢中將軍一舉克奪計之善者也夏侯淵為行䕶軍將軍督朱靈等屯長安建安中抱罕宋建因凉州亂自號河西平漢王太祖使淵帥諸將討建淵至圍抱罕月餘㧞之斬建及所置丞相已下淵别遣張郃等平河闗渡河入小湟中河西諸𦍑盡降隴右平太祖下令曰宋建造為亂逆三十餘年淵舉滅之虎歩闗右所向無前仲尼有言吾與爾不如也文帝初凉州盧水胡反西河大擾詔以張既為凉州刺史既追擊大破之斬首獲生以萬數帝甚悦詔曰卿踰河歴險以勞擊逸以寡勝衆功過南仲勤踰吉甫此勳非但破胡乃永寕河右使吾長無西顧之念矣徙封西鄉侯增邑三百并前四百户又詔朱靈曰將軍佐命先帝典兵歴年威過方召功踰絳灌圖籍所羙何以加焉朕受天命帝有海内元功之將社稷之臣皆朕所以同福共慶傳之無窮者也今封鄃侯富貴不歸故鄉如夜行衣繡若平常所志願勿難言靈謝曰髙唐宿所願於是更封髙唐眀帝青龍元年五月壬申詔祀故大將軍夏侯惇太司馬曹仁車騎將軍程昱於太祖廟庭魏書載詔曰昔先王之禮於功臣存則顯其爵位没則祭於大烝故漢氏功臣祠於廟庭大魏元功之臣動爵優著終始休眀者其皆依禮祀之於是以惇等配饗齊王正始四年七月詔祀故大司馬曹真征南大將軍夏侯尚太常桓階司空陳羣太傅鍾繇車騎將軍張郃左將軍徐晃前將軍張遼右將軍樂進太尉華歆司徒王朗驃騎將軍曹洪征西將軍夏侯淵後將軍朱靈文聘執金吾臧覇破虜將軍李典立義將軍龎徳武猛校尉韋典於太祖廟庭五年十一月癸夘詔祀故尚書令荀攸於太祖廟庭六年十一月祫祭太祖廟始祀佐命臣二十一人嘉平二年諸葛誕反驃騎將軍王昶據夾石以逼江陵持施績全熈使不得東諸葛誕既誅詔曰昔孫臏救趙直走大梁西兵驟進亦所以成東征之勢也增邑千户并前四千七百户遷司空持節都督如故郭淮為雍州刺史嘉平元年遷征西將軍都督雍凉諸軍事三年詔曰昔漢川之役幾至傾覆淮臨危濟難功書玉册在闗右三十餘年外征㓂虜内綏民夷比嵗以來摧破闕廖化車騎將軍儀同三司持節都督如故進封陽曲侯邑凡二千七百八十户分三百户封一子亭侯髙貴鄉公時鄧艾為安西將軍大破姜維之衆甘露元年詔曰逆賊姜維連年狡黠民夷騷動西土不寕艾籌畫有方忠勇奮發斬將十數馘首千計國威震於巴蜀武聲揚於江岷今以艾為鎮西將軍都督隴右諸軍事進封鄧侯分百户封子忠為亭侯陳留王景元三年詔祀故軍祭酒郭嘉於太祖廟庭四年鄧艾平蜀下詔曰艾曜威奮武深入虜庭斬將搴旗梟其鯨鯢使僣號之主稽首係頸歴世逋誅一朝而平兵不踰時戰不終日雲徹席卷蕩定巴蜀雖白起破强楚韓信克勁趙吳漢禽子陽亞夫滅七國計功論羙不足比勳也其以艾為太尉增邑二萬户封二子亭侯各食邑千户又詔鍾㑹曰㑹所向摧弊前無强敵緘制衆城網羅迸逸蜀之豪帥面縳歸命謀無遺策舉無廢功凡所降誅動以萬計全勝獨克有征無戰拓平西夏方隅清晏其以㑹為司徒進封縣侯増益萬户封二子亭侯邑各千户晉武帝泰始二年王沉薨以佐命功武帝方欲委以萬機既薨帝素服舉哀賜宻噐朝服一具衣一襲錢三十萬布百疋𦵏田一頃諡曰元眀年帝追思沉勳詔曰夫表揚往行所以崇賢垂訓慎終紀逺厚徳興教也故散騎常侍驃騎將軍博陵元公沉蹈禮居正直心清粹經綸墳典才識通治入歴常伯納言之位出幹監收方嶽之任内著謀猷外宣威畧建國設官首登公輔兼統中朝出納大命實有翼亮佐世之勳其贈沉司空公以寵靈既往使沒而不朽又前以翼賛之勳當受羣臣之封而固辭懇至嘉其讓徳不奪其志可以郡公官屬送𦵏咸寕元年詔論次功臣將配饗宗廟所司奏故太傅鄭冲太尉荀顗司徒石苞司空裴秀驃騎將軍王沉安平獻王孚等及太保何曽司空賈充太尉陳騫中書監荀朂平南將軍羊祜齊王攸等十二人皆銘功太常配饗清廟恵帝太安初議郎周玘起義兵破妖賊張昌石氷等徐揚並平又陳敏反於揚州以玘為安豐太守四品將軍玘稱疾不行宻遣使告鎮東將軍劉凖令發兵臨江已為内應與顧榮甘草等以兵攻敏敏衆奔潰追獲斬之又吳興錢璯反玘復率合鄉里義衆討璯斬之傳首建康玘三定江南開復王畧帝嘉其勳以行建威將軍吳興太守烏城縣侯帝以玘頻興義兵勳誠並茂乃以陽羡及長城之西鄉丹陽之永世别為義興郡以彰其功焉懐帝末顧榮卒帝臨䘮盡哀欲贈榮依齊王功臣格吴郡内使殷佑上箋論榮之功曰昔賊臣陳敏憑寵籍權㴞天作亂兄弟姻婭盤固州郡威逼士庻以為臣僕于時賢愚計無所出故散騎常侍安東軍司嘉興伯顧榮經徳體道謀猷宏逺忠貞之節在困彌厲﨑嶇艱難之中逼迫姦逆之下每惟社稷發憤忼愾宻結腹心同謀致討信著羣士名冠東夏徳聲所振莫不響應荷戈駿奔其㑹如林榮乃躬當矢石為衆率先忠義奮發忘家為國歴年逋㓂一朝土分兵不血刃蕩平六州勳茂上代義彰天下伏聞論功依故大司馬齊王格不在帷幕宻謀參議之例下附州征野戰之比不得進爵拓土賜拜子弟遐邇同嘆江表失望齊王親則近屬為方嶽仗節握兵都督近畿外有五國之援内有宗室之助稱兵彌時役連天下元功雖建所䘮亦多榮衆無一旅任非藩翰孤絶江外王命不通臨危獨斷以身殉國官無一金之費人無終朝之勞元惡既殄髙尚成功封閉倉廪以俟大軍故國安物阜以義成俗今日覇圖事舉未必不繇此而隆也方之於齊强弱不同優劣亦異至於齊府參佐扶義助强非創謀之主皆賜班受瑞或公或侯榮首建宻謀為方面盟主功髙元帥賞卑下佐上􅃜經國紀功之班下孤忠義授命之士夫孝積幽眀王教所崇况若榮者濟難寕國應天先事歴觀古今未有立功若彼酬報如此者也繇是贈榮侍中驃騎將軍開府儀同三司諡曰元愍帝初為秦王索綝立王為皇太子及即尊位綝遷侍中大僕以首迎大駕昇壇受璽之功封弋居伯尋詔曰朕昔遇厄運遭家不造播越宛楚爰失舊京幸宗廟寵靈百辟宣力得從藩衛託乎羣公之上社稷之不隕實公是頼宜賛百揆傅弼朕躬其授衛將軍領太尉位特進軍國之事悉以聞之眀帝時紀瞻為領軍將軍王敦之亂帝使謂曕曰卿雖病但為朕卧䕶六軍賊平復自表還家帝不許固辭不起詔瞻忠亮雅正識局經濟屢以年耆病久逡巡告誠朕深眀此屯操重髙其志今聴所執其以為驃騎將軍常侍如故服物制度一案舊典遣使就拜止家屬為府瞻既卒後朝廷論討王含功追封華榮子降先爵二等封次子一人亭侯成帝時温嶠薨帝下册書曰朕以眇身纂承洪緒光闡大道化洽時雍至乃狂狡㴞天社稷危逼惟公眀鑒特逹識心經逺懼皇綱之不維忿凶宼之縱暴唱率羣后五州響應首啟戎行元惡受馘王室危而復安三光幽而復眀功格宇宙勳著八表方頼大猷以拯區夏天不憗遺早世薨殂朕用痛悼於厥心夫褒徳銘勳先王之眀典今追贈公侍中大將軍持節都督刺史餘如故賜錢百萬布千疋諡曰忠武祠以太牢初𦵏於豫章後朝廷追嶠勳徳特為造大墓於元眀二帝陵之北陶侃上表曰故大將軍嶠忠誠著於聖世勳義感於人神非臣筆墨所能稱陳臨卒之際與臣書别臣藏之篋笥時時省視每一思述未嘗不中夜撫膺臨飯酸噎人之云亡嶠實當之謹寫嶠書上呈伏惟陛下既垂御省傷其情㫖死不忘忠身沒黄泉追恨國恥奨臣戮力救濟艱難使亡而有知抱恨結草豈樂今日勞費之事願陛下慈恩停其移𦵏使嶠棺柩無風波之危魂靈安於后土詔從之後嶠後妻何氏卒子放之便載䘮還都詔𦵏建平陵北并贈嶠前妻王氏及何氏始安夫人印綬郄鑒為太尉薨帝朝晡哭于朝堂遣御史持節䕶䘮事贈賻一依温嶠故事册曰惟公道徳冲邃體識𢎞逺忠亮雅正行為世表歴位内外勳庸彌著乃者約峻狂狡毒流朝廷社稷之危頼公以寕功侔古烈勳邁桓文方倚大猷藩翼時艱昊天不吊奄忽薨殂朕用悼于厥心夫爵以顯徳諡以表行所以崇眀軌跡丕揚徽邵今贈太宰諡曰文成祀以太牢魂而有知嘉茲榮寵魏詠之字長道早與劉裕逰欵及桓𤣥篡位恊賛義謀𤣥敗授建威將軍豫州刺史桓歆冦歴陽詠之率衆擊走之義熈初進吳國内史卒于官詔曰詠之噐宇𢎞劭識局貞隠同奨之誠實銘王府敷績之効垂恵在人奄致隕䘮惻愴于心可贈太常加散騎常侍其後録其賛義之功追封江陵縣公食邑二千五百户後魏道武初尉古真從帝在賀蘭部為賀染于所執傷一目古真弟諾少侍帝以忠謹著稱從圍守山諾先登傷一目帝嘆曰諾兄弟並毁其目以建功効誠可嘉也寵待遂隆除平東將軍賜爵安樂子于栗磾為冠軍將軍從帝伐中山及趙魏平定帝置酒髙㑹謂栗磾曰卿即吾之黥彭大賜金帛眀元在東宫王雒児給事帳下元紹之逆帝還宫社稷獲乂雒児有功焉即位拜散騎常侍詔曰士處家必以孝敬為夲在朝則以忠節為先不然何以立身於當世揚名於後代也散騎常侍王雒児車路頭等服勤左右十有餘年忠謹恭肅久而彌至未嘗須臾之頃有廢替之心及至艱難人皆易志而雒児等授命不移貞操踰懇雖漢之樊灌魏之許典無以加焉勤而不賞何以奨勸將来為臣之節其賜雒児爵新息公加直意將軍永興五年卒贈太尉建平王賜温眀秘噐載以輼輬車使殿中衛士為之導從帝親臨哀慟者四焉叔孫俊道武時為獵郎帝即位與元磨渾等拾遺左右及朱挺王悦將為大逆俊覺悦遂殺之帝以俊前後功重軍國大計一以委之泰常元年卒帝甚痛悼之親臨哀慟朝野無不追惜贈侍中司空安城王賜温眀秘噐載以輼輬車衛士導從陪𦵏金陵于後有大功及寵幸貴臣薨贈賻送終禮皆依俊故事無得踰之者太武時伊馛為振威將軍帝之將討凉州也議者咸諫唯司徒崔浩勸帝决行羣臣出後馛言於帝曰若凉州無水草何得為國議者不可用也宜從浩言帝善之既尅凉州帝大㑹於姑臧謂羣臣曰崔公智計有餘吾亦不復竒之馛弓馬之士而所見能與崔同此深可竒顧謂浩曰馛智力如此終至公相浩曰何必讀書然後為學衛青霍去病亦不讀書而能大建勳名致位公輔帝曰誠如公言又浩為太常卿時議擊蠕蠕浩賛成策畧太武幸其第加侍中特進撫軍大将軍賞謀謨之功也帝詔新降髙車渠帥數百人賜食酒於前帝指浩浩以示之曰汝曾視此人尫纎懦弱手不能彎弓持矛其胸中所懷乃踰于兵甲朕始時雖存征討之意而志慮不自决前後克㨗皆此人導吾令至此耳豆代田為勇武將軍從帝討平凉擊破赫連定得奚斤等帝以定妻賜之詔斤膝行受酒於代田勑斤曰全爾身命者代田功也来大千為征北大將軍時吐京胡反以大千為都將討平之大千在吐京卒䘮還停於平城南帝出還見而問之左右以對帝悼嘆者良久詔曰大千忠勇盡節功在可嘉今聴其䘮入殯城内贈司空諡曰莊公子兵頽襲爵奚烏侯以功進爵夷餘公出為虎牢鎮將興光中卒詔䘮禮依其伯父嘗農王斤故事陪𦵏金陵獻文時慕容白曜為征南大將軍攻宋無鹽等戍一旬之内頻㧞四城威震齊主帝嘉焉詔曰卿搃率戎旅討除不賓霜戈所向無不摧靡旬日之内尅㧞四城韓白之功何以加此雖斗城戍將房崇吉守迷不順危亡已形潰在旦夕宜勉崇威略務存長轡不必窮兵極武以為勞頓尉元為鎮南大將軍宋沈攸之吳憘公領卒數萬從沂清而進元遣孔伯恭大破賊軍拜元都督徐南北兖州諸軍事鎮東大將軍開府徐州刺史帝詔元曰賊將沈攸之吳憘公驅率蟻衆進宼下邳卿戎昭果毅智勇奮發水陸邀絶應時摧殄自淮以北廓然清定皆是元帥經畧將士効力之所致也朕用嘉之今方欲清蕩吳㑹懸旌秣陵至於用兵所宜形勢進止善加量度動静以聞孝文以長孫嵩在太武時為太尉北平王薨帝追録先朝功臣以嵩配饗廟庭又以穆崇自太祖為魏王拜崇征虜將軍從平中原及薨命崇立祀子孫世奉焉太和中追録功臣以崇配饗崇之孫真尚長城公主卒諡曰宣帝追思崇勳令著作郎韓顯宗與真撰定碑文建於白登山崔𤣥伯為周兵將軍疾卒後帝追録先朝功臣以𤣥伯配饗廟庭陸麗在文成時以輔立功遷司徒公為乙渾所害獻文甚惜之諡曰簡王陪𦵏金陵帝追録先朝功臣以麗配饗廟庭薛真度自帝遷雒每獻計於帝勸先取樊鄧後攻南陽故為帝所賞賜帛一百疋又加持節正號冠軍改封臨晉縣開國公食邑三百户詔曰獻忠盡心人臣令節標善之賞有國徽範故一言可以興邦片辭可以䘮國得無逺録前謀以褒厥善真度爰自遷京每在戎役沔北之計常所與聞知無不言頗見采納及六師南邁朕欲超㨿新野羣情皆異真度獨與朕同撫寕蠻夷實有勤績可増邑二百户轉征虜將軍豫州刺史李崇文成元皇后兄之子也帝南討昏揚靈珍遣弟婆羅與子雙領騎萬餘襲破武興詔崇都督隴右諸軍討之崇大破之斬婆羅靈珍走奔漢中帝在南陽覽表大悦曰使朕無西顧之憂者李崇之功也以崇為都督梁秦二州諸軍事本軍將軍梁州刺史帝手詔曰今洮隴克清鎮捍以徳爾之威恵既宣實為逺寄故勅授梁州用寕邊服便可善思經畧去其可除安其可育公私所患悉令芟夷任城康王雲孫嵩為武衛將軍從帝伐齊斬獲萬計勇冠三軍帝大悦而言曰任城康王有大福徳文武出其門以功賜爵髙平縣侯賚帛一千五百匹髙閭為鎮南將軍相州刺史及帝車駕至鄴帝頻幸其州館詔曰閭昔在中禁有定禮正樂之勳作藩於州有亷清公幹之羙自大軍停軫庻事咸豐可謂國之老成善始令終者也每惟厥徳朕甚嘉焉可賜帛五百疋粟一千斛馬一疋衣一襲以褒厥勤韓顯宗自帝南伐為右軍府長史征虜將軍統軍事次赭陽南齊成主成公期遣其軍主胡松髙法授等并引齊人来擊軍營顯宗親率拒戰遂斬法授首顯宗至新野帝詔曰卿破賊斬帥殊益軍勢朕方攻堅城何不作露布也顯宗曰臣頃聞鎮南將軍王肅獲賊二三驢馬數疋皆為露布臣在東觀私每哂之近雖仰憑威靈得摧醜虜兵寡力弱擒斬不多脱復髙曵長縑虛張公㨗尤而效之其罪彌甚臣所以歛毫卷帛解上而已帝笑曰如卿此勳誠合茅土須赭陽平定簡審相酬新野平以顯宗為鎮南廣陽王諮議參軍宣武以王肅自南齊来歸孝文時為將相有大功及薨於夀春帝為舉哀詔曰肅奄至不救痛惋兼懐可遣中書侍郎賈思伯兼通直散騎常侍撫慰厥孤給東園秘噐朝服一襲錢三十萬帛一千匹布五百匹蠟三百斤并問其卜遷逺近専遣侍御史一人監䕶䘮事務令優厚又詔曰死生動静卑髙有域勝逹所居存亡崇顯故杜預之歿窆於首陽司空李冲覆舟是託顧瞻斯所誠亦二代之九原也故楊州刺史肅誠義結於二世英㑹符於李杜平生本意願終京陵既有宿心宜遂先志其令𦵏於冲預兩墳之間使之神遊相得也贈侍中司空邢巒為安東將軍大破梁兵帝賜巒璽書曰知大戡醜虜威振賊庭淮外霧披徐方壒卷王畧逺恢混一維始公私慶泰何快如之賊衍此舉實為傾國比者宿豫陥歿淮陽嬰城凶狡侜張規抗王旅將軍忠規協著火烈霜摧雷動岱陽風掃沂嶧遂令逋誅之宼一朝殱夷元鯨大憝千里折首殊勳茂㨗自古莫二但揚區未安餘燼宜盪乗勝掎角勢不可遲便可率厲三軍因時經畧申威東南清彼江介忘此疲勞用圖永逸進退規度委之髙筭後周太祖河橋之戰馬中流矢墜地都督李穆以馬授帝遂得俱免擢授武衛將軍加大都督車騎大將軍儀同三司進爵安武郡公增邑一千七百户前後賞賜不可勝計久之帝羙其忠節乃嘆曰人之所貴唯身命耳李穆遂能輕身命之重濟孤於難雖復加之以爵位賞之玉帛未足為報也乃特賜鐵劵恕以十死進驃騎大將軍開府儀同三司侍中初穆授帝以驄馬其後中廐有此色馬者悉以賜之穆為并州搃管長子惇授車騎大將軍儀同三司大都督進爵為公帝令功忠世子並與畧陽公遊處惇於時軰之中特被引接每有遐方服玩異域珍竒無不班錫低授小武伯進爵安樂郡公髙琳為衛將軍從擒莫多婁貸文仍戰河橋琳先驅奮擊勇冠諸軍帝嘉之謂之曰公即我之韓白也赫連逹字朔周盛樂人勃勃之後曾祖庫多汗因避難改姓杜氏初從賀㧞岳西征及岳為侯莫陳悦所害逹馳請帝引軍平悦帝謂諸軍曰當清水公清水公即賀㧞岳也遇禍之時君等性命懸於賊手雖欲来告其路無從杜朔周冒萬死之難逺来見及遂得共盡忠節同雪讐恥雖藉衆人之力實頼杜子之功勞而不賞何以勸善乃賜馬二十匹宇文貴為大將軍破支𦍑於粟坂帝羙其功遂於粟坂立碑以紀其績趙昶自以被㧞擢居將帥之任傾心下士虜獲氐𦍑撫而使之皆為昶盡力帝曰不煩國家士馬而能威服氐𦍑者趙昶有之矣眀帝武成二年十二月辛巳以功臣琅琊貞獻公賀㧞勝等十三人配饗太祖廟庭武帝以韋孝寛立勳玉壁遂於玉壁置勳州刺史又以孝寛為驃騎大將軍鎮玉壁後帝東伐過幸玉壁觀禦敵之所深嘆羙之移時乃去宇文慶深沉有噐局屬文州民夷相聚為亂慶應募從征賊保㨿巖谷征路懸絶慶以馬而進襲破之以功授都督從帝㧞晉州及破髙緯㧞髙壁克并州下信都擒髙楷功並居最帝詔曰慶勳庸早著英望華逺出内之績簡在朕心戎車自西俱總行陣東夏蕩定實有茂功髙位縟禮宜崇榮册於是進位大將軍封汝南郡公邑千六百户册府元龜巻一百三十二
