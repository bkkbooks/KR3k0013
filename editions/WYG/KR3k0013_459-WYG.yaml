body:
  text: 册府元龜卷四百五十九宋王欽若等撰臺省部公正孔子曰茍正其身矣於從政乎何有不能正其身如正人何又曰其身正不令而行其身不正雖令不從此所謂言必忠信行必謹厚施於家邦無所不可茍異於是則人雖服從身亦弗理矧乎著位南宫比喉舌之象恪居中憲號耳目之官固當不侮鰥寡不畏强禦寅奉一人威肅百辟若衞之史魚漢之汲黯唐狄仁傑之儔皆可以同傳矣漢張敞以數上書有忠言宣帝徴敞為大中大夫與于定國並平尚書事以正違忤大將軍霍光守正不阿也孔光為光祿勲領尚書事光帝師傅子少以經行自著進官蚤成蚤古早字不結黨友養游說有求於人既性自守亦其勢然也後漢宋均明帝時為尚書令每有駁議多合上㫖均嘗刪翦疑事帝以為有姦大怒收郎縛格之諸尚書惶恐皆叩頭謝罪均顧厲色曰蓋忠臣執義無有二心若畏威失正均雖死不易志小黃門在傍入具以聞帝喜其不撓即令貰郎樂恢為尚書僕射是時河南尹王調雒陽令李阜與竇憲厚善縱舍自由恢劾奏調阜并及司𨽻校尉諸所刺舉無所回避貴戚惡之憲弟夏陽侯瓌欲往候恢恢謝不與通憲兄弟放縱而忿其不附已妻每諫恢曰昔人有容身避害何必以言取怨恢歎曰吾何忍素餐而立人之朝乎韓稜為尚書令和帝即位侍中竇憲使人刺殺齊殤王子都鄉侯暢於上東門有司畏憲咸委疑于暢兄弟詔遣侍御史之齊案其事稜上疏以為賊在京師不宜捨近問逺恐為奸臣所笑竇太后怒以切責稜稜固執其義及事發果如所言憲惶恐白太后求出擊北匈奴以贖罪稜復上疏諫太后不從及憲有功還為大將軍威振天下復出屯武威㑹帝西祠園陵詔憲與車駕㑹長安及憲至尚書以下議欲拜之伏稱萬歳稜正色曰夫上交不諂下交不瀆禮無人臣稱萬歳之制議者皆慙而止尚書左丞王龍私奏記上牛酒於憲稜舉奏龍論為城旦郅壽為僕射是時大將軍竇憲以外戚之寵威傾天下憲常使門生齎書詣壽有所請託壽即送詔獄前後上書陳憲驕恣引王莽以誡國家是時憲征匈奴海内供其役費而憲及其弟篤景並起第宅驕奢非法百姓苦之壽以府藏空虚軍旅未休遂因朝㑹譏刺憲等厲音正色辭㫖甚切張霸為侍中時皇后兄虎賁中郎將鄧隲當朝貴盛聞霸名行欲與為友霸逡廵不答衆人笑其不識時務李充為侍中大將軍鄧隲嘗置酒請充賔客滿堂酒酣隲詭曰幸託椒房位列上將幕府初開欲辟天下竒偉以輔不逮惟諸君博求其器充乃為陳海内隱居懷道之士頗有不合隲欲絶其說以肉啖之充抵肉於地曰說士猶甘於肉遂出徑去隲甚望之同坐汝南張孟舉往讓充曰一日聞足下與鄧將軍說士未究激刺面折不由中和出言之責非所以光祚子孫者也充曰大丈夫居世貴行其意何能逺為子孫之計由是見非於貴戚劉矩為尚書令矩性亮直不能諧附貴勢以是失大將軍梁冀意出為常山相楊厚為侍中順帝時大將軍梁冀威權傾朝遣弟侍中不疑以車馬珍玩致遺於厚欲與相見厚不答左雄為尚書令遷司𨽻校尉初雄薦周舉為尚書舉既稱職議者咸稱焉及在司𨽻又舉故冀州刺史馮直以為將帥而直嘗坐贜受罪舉以此劾奏雄雄恱曰吾嘗事馮直之父而又與直善今宣光以奏吾乃是韓厥之舉也由是天下服焉張陵為尚書桓帝元嘉中歳首朝賀大將軍梁冀帶劒入省陵呵叱令出勑羽林虎賁奪冀劍冀跪謝陵不應即劾奏冀請廷尉論罪有詔以一歳俸贖而百僚肅然初冀弟不疑為河南尹舉陵孝亷不疑疾陵之奏冀因謂曰昔舉君適所以自罰也陵對曰明府不以陵不肖誤見擢序今申公憲以報私恩不疑有愧色羊陟為尚書令時太尉張顥司徒樊陵大鴻臚郭防太僕曹陵大司農馮方並與宦䜿相姻私公行貨賂並奏罷黜之不納刁韙為尚書在朝有鯁直臣節向栩為侍中每朝廷大事侃然正色百官憚之橋𤣥靈帝時為尚書令時大中大夫葢升與帝有舊恩前為南陽太守臧數億以上𤣥奏免升禁錮没入財賄帝不從而遷升侍中𤣥託病免趙戬字叔茂為尚書選部郎董卓欲以所私並充臺閣戬拒不聽卓怒召戬欲殺之觀者皆為戬懼而戬自若及見卓引辭正色陳說是非卓雖㓙戻屈而謝之荀彧為尚書令折節下士坐不累席其在臺閣不以私欲撓意彧有羣從一人才行實薄或謂彧以君當事不可不以某為議郎彧笑曰官者所以表才也若如來言衆人其謂我何邪其持心平正皆類此魏陳羣轉侍中領丞相東西曹掾在朝無適無莫雅仗名義不以非道假人賈逵為諫議大夫時太祖終於雒陽逵典䘮事時鄢陵侯彰行越騎將軍從長安來赴問逵先王璽綬所在逵正色曰太子在鄴國有儲副先王璽綬非君侯所宜問也遂奉梓宫還鄴何䕫魏國初建拜尚書僕射時丁儀兄弟方進寵儀與䕫不合尚書傅選謂䕫曰儀不相好已甚子友毛玠等儀已害之矣子宜少下之䕫曰為不義適足害其身焉能害人且懷姦倖之心立於明朝其得久乎䕫終不屈志儀後果以㐫偽敗杜恕為散騎黄門侍郎恕推誠以質不治飾少無名譽及在朝不結交援專心向公每政有得失嘗引綱維以正言於是侍中辛毗等器重之蘇則為侍中與董昭同僚昭嘗枕則膝臥則推下之曰蘇則之膝非佞人之枕也辛毗為侍中時中書監劉放令孫資見信於主制斷時政大臣莫不交好而毗不與徃來毗子敞諫曰今劉孫用事衆皆影附大人宜少降意和光同塵不然必有謗言毗正色曰主上雖未稱聰明不為闇劣吾立身自有本末就與孫劉不平不過令吾不作三公而已何危害之有焉大丈夫欲為公而毁其髙節耶蜀羅憲字令則為尚書吏部郎時黄皓預政衆多附之憲獨不與同皓恚左遷巴東太守呉紀陟為中書郎孫峻使詰南陽王和令其引分陟宻使令正辭自理峻怒陟懼閉門不出晉辛表字偉容年二十餘為散騎侍郎時同僚諸郎共平尚書事年少並兼厲鋒氣要名譽尚書事至或有不便故遺漏不視及傳書者去即入深文論駁惟表不然事來有不便輙與尚書共論盡其意主者固執不得已然後共奏議司空陳泰等以此稱之崔洪自尚書左丞遷吏部尚書舉用甄明門無私謁薦雍州刺史郄詵代己為左丞詵後紏洪洪謂人曰我舉郄丞而還奏我是挽弩自射也詵聞曰昔趙宣子任韓厥為司馬以軍法戮宣子之僕宣子謂大夫曰可賀我矣吾選厥也任其事崔侯為國舉才我以才見舉惟官是視各明至公何故斯言乃至此洪聞其言而重之文立巴郡人為散騎常侍蜀故尚書犍為程瓊雅有德業與立深交武帝聞其名以問立對曰臣重其人但年垂八十禀性謙退無復當時之望故不以上聞耳瓊聞之曰廣休可謂不黨矣故吾善夫人也甄德為侍中時河南尹庾純先坐事免後復為散騎常侍後將軍荀汲於朝㑹中奏純以前坐不孝免黜不宜升進德進曰孝以顯親為大祿養為榮詔赦純前愆擢近侍兼掌教官此純召不俟駕之日而後將軍汲以私議貶奪公論抗言矯情誣罔朝廷宜加貶汲坐免官傅咸為左丞多與楊駿箋諷切之駿意不平駿弟濟素與咸善與咸書曰江海之流混混故能成其深廣也天下大器非可稍了而相觀每事欲了生子癡了官事官事未易了也了事正作癡復為快耳左丞總司天臺維正八坐此未易居以君盡性而處未易居之任益不易也想慮破頭故具有白咸答曰衞公云酒色之殺人此甚於作直坐酒色死人不為悔逆畏以直致禍此由心不直正欲以茍且為明哲耳自古以直致禍者當由矯枉過直或不忠允欲以亢厲為聲故致忿耳安可悾悾為忠益而當見疾乎卞粹惠帝初為尚書郎楊駿執政人多附㑹而粹正直不阿及駿誅超拜右丞封咸陽子稍遷至左軍將軍華廙為光祿大夫開府儀同三司時河南尹韓壽因託賈后求以女配廙孫陶廙距不許后深以為恨故遂不登台司王戎為司徒免官惠帝反宫以戎為尚書令既而河間王顒遣使說成都王穎將誅齊王冏檄書至冏謂戎曰孫秀作逆天子幽逼孤糾合義兵掃除元惡臣子之節信著神明二王聽讒造搆大難當頼忠謀以和不協卿其善為我籌之戎曰公首舉義衆兾定大業開闢已來未始有也然論功報賞不及有勞朝野失望人懷貳志今二王帶甲百萬其鋒不可當若以王就第不失故爵委權崇讓此求安之計也冏謀臣葛旟怒曰漢魏以來王公就第寧有得保妻子者乎議者可斬於是百官震悚戎偽藥發墮厠得不及禍王衍為中書令時齊王冏有興復之功而專權自恣公卿皆為之拜衍獨長揖焉裴楷為侍中石崇以功臣子冇才氣與楷志趣各異楷不與之交劉頌為吏部尚書及趙王倫之害張華也頌哭之甚慟聞華子得逃喜曰茂先卿尚有種倫黨張林聞之大怒憚頌持正而不能害也孫秀等推崇倫功宜加九錫百僚莫敢異議頌獨曰昔漢之錫魏魏之錫晉皆一時之用非可通行今宗廟乂安雖嬖后避退勢臣受誅周勃誅諸吕而尊孝文霍光廢昌邑而奉孝宣並無九錫之命違舊典而習權變非先王之制九錫之議請無所施張林積忿不已以頌為張華之黨將害之孫秀曰誅張裴巳傷時望不可復誅頌林乃止劉喬為散騎常侍時齊王冏為大司馬初􅄞紹為冏所重每下階迎之喬言於冏曰裴張之誅朝臣畏憚孫秀故不敢不受財物嵇紹今何所逼忌故畜裴家車牛張家奴婢邪樂彦輔來公未嘗下牀何獨加敬於紹冏乃止紹謂喬曰大司馬何故不復迎客喬曰似有正人言以卿不足迎者紹曰正人為誰喬曰其則不逺紹黙然嵇紹元康初為給事黄門侍郎時侍中賈謐以外戚之寵年少居位潘岳杜斌等皆附託焉謐求交於紹紹拒而不答及謐誅紹時在省以不阿比㓙族封弋陽子茍晞為尚書左丞亷察諸曹八坐以下皆側目憚之荀緄為尚書秉機平正直道而行是時内外公卿大夫莫不敬憚焉劉暾字長升為尚書左丞正色在朝三臺清肅郄鍳鎭合肥時王敦有逆謀甚忌之表為尚書令徵還道經姑孰與王敦相見謂曰樂彦輔短才耳後生流宕言違名檢考之以實豈勝滿武秋耶鍳曰擬人必於其倫彦輔道韻平淡體識冲粹處傾危之朝不可得而親䟽及愍懷太子之廢可謂柔而有正武秋失節之士何可同日而言敦曰愍懷廢徙之際交有危機之急何能以死守之乎以此相方其不減明矣鍳曰大丈夫既潔身北面義同在三豈可偷生屈節靦顔天壤耶茍道數終極固當存亡以之敦聞鍳言大忿之遂不復相見拘留不遣敦之黨與譛毁日至鍳舉止自若初無懼心敦謂錢鳳曰郄道徴儒雅之士名位既重何得害之乃放還臺卞壼為右將軍給事中尚書令成帝即位羣臣進璽司徒王導以疾不至壼正色於朝曰王公豈社稷之臣耶大行在殯嗣皇未立寧是人臣辭疾之時導聞之乃輿疾而至壼與庾亮共叅機要王導稱疾不朝而私送車騎將軍郄鍳壼奏以導虧法從私無大臣之節御史中丞鍾雅阿撓王典不加凖䋲並請免官雖事寢不行舉朝震肅壼斷裁切直不畏强禦皆此類也壼幹實當官以褒貶為己任勤於吏事欲軌正督世不肯苟同時好然性不𢎞裕才不副意故為諸名士所少而無卓爾優譽明帝深器之於諸大臣而最任職阮孚每謂之曰卿常無閒泰嘗如含瓦石不亦勞乎壼曰諸君以道德恢𢎞風流相尚執鄙吝者非壼而誰時貴游子弟多慕王澄謝鯤為達壺厲色於朝曰悖禮傷教罪莫斯為甚中朝傾覆實由於此欲奏推之王導庾亮不從乃止然而聞者莫不折節孔愉為尚書左僕射讓稟賜表指言姦暴威虐王導聞而非之於都坐謂愉曰君言姦吏擅威暴人肆虐為患是誰愉欲大論朝廷得失陸玩抑之乃止後導將以趙𦙍為護軍愉謂導曰中興已來處此官者周伯仁應思逺耳今誠乏才豈以趙𦙍居之邪導不從其守正如此由是為導所銜孔坦為尚書郎典客令萬黙領諸胡胡人相誣朝廷疑黙有所偏助將加大辟坦獨不署由是被譴棄官歸㑹稽王珣為僕射太子少傅王雅將拜遇雨請以繖入珣不許之因冒雨不拜韓伯為侍中陳郡周勰為謝安主簿居䘮廢禮崇尚老莊脫犯名教伯領中正不通勰議曰拜下之敬猶能違衆從禮情理之極不宜以多比為通時人憚焉識者謂伯可謂澄世所不能澄裁世所不能裁者矣與夫容已順衆者豈得同時而共稱哉范甯為中書侍郎指斥朝士直言無諱王國寶甯之甥也以諂媚事㑹稽王道子懼為甯所不容乃相驅扇因被疎隔求補豫章太守帝曰豫章不宜太守何急以身試死邪甯不信卜占固請行阮种為中書郎進止有方正已率下朝廷咸憚其威容每為駁議事皆施用遂為楷則郄隆字𢎞始謇亮有匪躬之節初為尚書郎轉左丞在朝為百僚所憚徐邈為散騎常侍謝安薨論者或有異同邈固勸中書令王獻之奏加殊禮仍崇進謝石為尚書令𤣥為徐州邈後為中書侍郎邈嘗詣東府遇衆賔沈湎引滿諠譁㑹稽王道子曰君時有暢不邈對曰邈陋巷書生惟以節儉清修為暢耳道子以邈業尚道素笑而不以為忤也范㤗為中書侍郎時㑹稽王世子元顯專權内外百官請假不復表聞惟箋元顯而已泰建言以為非宜元顯不納宋蔡廓為御史中丞時中書令傅亮寄任隆重學冠當時朝廷儀典皆取定於亮每諮廓然後施行亮意若有不同廓終不為屈王惠為呉興太守少帝即位以蔡廓為吏部尚書不肯拜乃以惠代焉惠被召即拜未嘗接客人有與書求官者得輙聚置閣上及去職其封如初時談者以廓之不拜惠之即拜雖事異而意同也何尚之為侍中領尚書令秉衡當朝畏逺權柄親戚故舊一無薦舉既以致怨亦以此見稱王球為吏部尚書球公子簡貴素不交游筵席稀進門無異客尚書僕射殷景仁領軍劉湛並執重權傾動内外球雖通家姻戚未嘗徃來南齊王琨在宋為散騎常侍廷尉虞龢議社稷合為一神琨案舊糾駁時龢深被親寵朝廷歎琨强正太祖即位加侍中時王儉為宰相屬琨用東海郡迎吏琨謂信人曰語郎三臺五省皆是郎用人外方小郡當乞寒賤省官何容復奪之遂不過其事蕭惠基為侍中領驍騎將軍尚書令王儉朝宗貴望惠基同在禮閣非公事不私覿焉張緒為散騎常侍領本州中正長沙王晃屬選用呉興聞人邕為州議曹緒以資藉不當執不許晃遣書佐固請之緒正色謂晃使曰此是身家州鄉殿下何得見逼謝􅊪為吏部尚書明帝廢欝林領兵入殿左右驚走報􅊪􅊪與客圍棊每下子輙云其當有意竟局乃還齋臥竟不問外事明帝即位􅊪又屬疾不知事蕭諶以兵臨起之􅊪曰天下事公卿處之足矣且死者命也何足以此懼人後宴會功臣上酒尚書令王晏等興席􅊪獨不起曰陛下受命應天晏以為已之力觴遂不見報上大笑解之座罷晏呼􅊪共載還令省欲相撫恱􅊪又正色曰君巢窟在何處晏初得班劔􅊪謂之曰身家太傅裁得六人若何事頓得二十晏甚憚之謂江祏曰彼上人者難為詶對加領右軍將軍梁江革為度支尚書時尚書令何敬容掌選序用多非其人革性強直每至朝宴常有褒貶以此為權勢所疾乃謝病還家到洽為尚書吏部郎請託一無所行為尚書左丞凖䋲不避貴戚尚書省賄賂莫敢通江蒨為吏部郎方雅有風格僕射徐勉權重自遇在位者並宿士敬之唯蒨及王規與抗禮不為之屈羊偘為都官尚書時尚書令何敬容用事與之並省未嘗遊造有宦者張僧𦙍候偘偘曰我牀非閹人所坐竟不前之時論美其貞正孔休源為尚書左丞彈肅禮闈雅允朝望謝舉為尚書令時邵陵王綸於婁湖立園廣讌酒後好聚衆賔冠手自裂破投之唾壺皆莫敢言舉嘗預宴王欲取舉幘舉正色曰裂冠毁冕下官弗敢聞命拂衣而退王屢召不反甚有慙色焉陳孔奐為尚書倉部郎遷儀曹侍郎時左民郎沈景為飛書所謗將陷重辟事連臺閣人懐憂懼奐廷議理之竟得明白蕭𢎞為始興王諮議叅軍兼金部侍郎性抗直不事權貴左右近臣無造請髙宗每欲遷用輙為用事者裁抑焉後魏東阿縣公元順為吏部尚書兼右僕射時三公曹令史朱暉案事錄尚書髙陽王雍雍欲以為廷尉評頻煩託順順不為用雍遂下命用之順投之於地雍聞大怒昧爽坐都㕔召尚書及丞郎畢集欲待順至於衆挫之順日髙方至雍攘袂撫几而言曰身天子之子天子之叔天子之相四海之内親尊莫二元順何人以身成命投棄於地順鬚髮俱張仰面看屋憤氣奔涌長欷而不言久之揺一白羽扇徐而謂雍曰髙祖遷宅中土剏定九流官方清濁軌儀萬古而朱暉小子身為省吏何合為廷尉清官殿下既先皇同氣宜遵成㫖自有短垣而復踰之也雍曰身為丞相錄尚書如何不得用一人為官順曰庖人雖不治庖尸祝不得越樽爼而代之未聞有别旨令殿下恭選事順又厲聲曰必如是順當依事奏聞雍遂笑而言曰豈可以朱暉小人便相忿恨遂起呼順入室與之極飲順亢執不撓皆此類也穆紹為侍中領本邑中正紹無他才能而資性方重罕接賔客希造人門領軍元乂當權熏灼曾徃候紹紹迎送下階而已時人歎尚之紹加儀同三司領左右侍中元順與紹同直順嘗因醉入其寢所紹擁被而起正色讓順曰身二十年侍中與卿先君亟連職事縱卿後進何宜相排突也遂謝事還家詔喻乃起髙允為中書侍郎閹官宗愛之任勢也威振四海嘗召百司於都堂王公已下望庭畢拜允至獨升階而揖羊祉為光祿大夫當官不憚強禦朝廷以為剛斷時有檢覆每令出使于忠為散騎常侍兼武衞將軍時北海王詳為太傅錄尚書事忠每以鯁氣正辭為詳所忿面責忠曰我憂在前見爾死不憂爾見我死時也忠曰人生于世自有定分若應死於王手避亦不免若其不爾王不能殺詳因忠表讓之際宻勸帝以忠為列卿令解左右聽其讓爵於是詔停其封優進太府卿封回為都官尚書時滎陽鄭雲諂事長秋卿劉騰貨騰紫纈四百匹得為安州刺史除書旦出暮往詣回坐未定謂回曰我為安州卿知之否彼土治生何事為便回答之曰卿荷國寵靈位至方伯雖不能㧞園葵去織婦宜思方畧以濟百姓如何見造而問治生乎封回不為商賈何以相示雲慙媿失色賈秀為中書侍郎加安逺將軍時丞相乙渾擅作威福多所殺害渾妻庶姓而求公主之號屢言於秀秀黙然渾曰公事無所不從我請公主不應何意秀慷慨大言對曰公主之稱王姬之號尊寵之極非庶族所宜若假竊此號當必自咎秀寧死於今朝不敢笑於後日渾左右莫不失色為之振懼而秀神色自若渾夫妻黙然含忿他日乃書太醫給事楊惠冨臂作老奴官慳字令以示秀渾每欲伺隙陷之㑹渾伏誅遂得免難秀正色守正皆此類也和其奴為尚書左僕射與河東王閻毗太宰常英等並平尚書事在官愼法不受私請慕容白曜為比部尚書在職執法無所阿縱李冲為南部尚書冲從甥隂始孫孤貧往家冲家至如子姪有人求官因其納馬於冲始孫輙受而不為言後假方便借冲此馬馬主見冲乘馬而不得官後乃自陳始末冲聞之大驚執始孫以狀欵奏始孫坐罪其處要自厲不念愛惡皆此類也累遷尚書僕射冲明白當官奉國為己任自始迄終無所避屈游肇為右僕射於吏事斷決不速主者諮呈反覆論叙有時不曉至於再三必窮其理然後下筆雖寵勢干請終無廻挽方正之操時人服之及領軍元乂之廢靈太后將害太傅清河王懌乃集公卿㑹議其事於時羣臣莫不失色順㫖肇獨抗言以為不可終不下署盧同為左丞時相州刺史奚康生徵民歳調皆七八十尺以邀奉公之譽部内患之同於歳祿官給長絹同乃舉案康生度外徵調書奏詔科康生之罪兼褒同在公之績甄深為黄門侍郎親識有求官者答云趙郡李謐躭學守道不悶予常欲致言但未有次耳諸君何為輕自媒衒髙道恱為諫議大夫正色當官不憚强禦楊機為度支尚書方直之心久而彌厲奉公正己為時所稱崔光為侍中延昌四年正月迎立孝明後二日廣平王懷扶疾入臨以母弟之親徑至太極西廡哀動禁内呼侍中黄門領軍三衞云身欲上殿哭大行又須入見主上諸人皆愕然相視無敢抗對者光獨攘袂振杖引漢太尉趙熹横劍當階推下親王故事辭色甚厲聞者莫不稱善懷壯光理義有據聲淚俱止云侍中以故事裁我我不敢不服於是遂還頻遣左右致謝北齊宋遊道初仕魏為左中兵郎中尚書令臨淮王彧譴責遊道游道乃執板長揖曰下官謝王瞋不謝王理即日詣闕上書曰徐州刺史元孚頻有表云偽梁廣發士卒來圍彭城乞增羽林二千以孚宗室重臣告請應實所以量奏給武官千人孚今代下以路阻自防遂納在防羽林八百人辭曰疆境無事乞將還家臣沗局司深知不可尚書令臨淮王彧即孚之兄子遣省事謝逺三日之中八度逼廹云冝依判許臣不敢附下罔上孤負聖明但孚身在任乞師相繼及其代下便請放還進退為身無憂國之意所請不合其罪不科彧乃召臣於尚書都堂云卿一小郎憂國之心豈厚於我醜罵溢口不顧朝章右僕射臣世隆吏部郎中臣薛琡已下百餘人並皆聞見臣實獻直言云忠臣奉國事在其心亦復何簡貴賤自北海入雒王不能致身死難方清宫以迎簒賊鄭先䕶立義廣州王復建旗往討趣惡如流伐善何速今得冠冕百僚乃欲為私害政為臣此言彧怒更甚臣既不佞干犯貴臣乞解郎中帝召見游道嘉勞之彧亦言臣沗冠百僚遂使一郎攘袂髙聲肆言頓挫乞解尚書令帝乃下敕聽解臺郎後除司州治中從事復為尚書左丞游道入省劾太師咸陽王坦太保孫騰司徒髙隆之司空侯景錄尚書元弼尚書令司馬子如官貸金銀催徵酬價雖非指事贓賄終是不避權豪又奏駮尚書違失數百條省中豪吏王儒之徒並鞭斥之始依故事於尚書省立門名以記出入早晩令僕已下皆側目髙愼為大行臺左丞轉尚書當官無所廻避時咸畏憚之髙隆之為尚書右僕射時初給民田貴勢皆占良美貧弱咸受瘠薄隆之啟髙祖悉更反易乃得均平張雕世祖時為假儀同三司雕自以出於微賤致位大臣勵精在公有匪躬之節欲立功効以報朝恩論議抑揚無所廻避宫掖不急之費大存減省左右縱恣之徒必加禁約數譏切寵要獻替帷扆帝亦深倚仗之崔劼累遷中書令初和士開擅朝曲求物譽諸公因此頗為子弟干䘵世門之胄多處京官劼二子拱撝並為外任弟廓之從容謂劼曰拱撝幸得不凡何為不在省府之中清華之所而並外藩有損家代劼曰立身以來恥以一言自達今若進兒與身何異卒無所求聞者莫不歎服後周栁慶為民部尚書威儀端肅樞機明辨太祖每發號令常使慶宣之慶天性抗直無所廻避太祖亦以此深委仗焉崔猷為司會中大夫明帝遺詔立武帝晉公護謂猷曰今奉遵遺㫖君以為何如對曰殷道尊周道親今朝廷既遵周禮無容輙違此義事雖不行時稱守正裴漢為司路下大夫天和中加車騎大將軍儀同三司時晉公護擅權縉紳等多諂附之以圖仕進惟漢直道自守故八年不徙職裴俠為工部中大夫有大司空掌典錢物李貴乃於府中悲泣或問其故對曰所掌官物多有費用裴公清嚴有名懼遭罪責所以泣耳俠聞之許其自首貴自言隠費錢五百萬薛端為吏部郎中性強直每有奏請不避權貴文帝嘉之故賜名端欲令名實相副顔之儀為御正大夫屬官宣帝嗣位政刑日亂開府于義上疏諫時鄭譯劉昉以恩幸當權謂義不利於已先惡之於帝帝覧表色動謂侍臣曰于義謗訕朝廷也之儀進曰古先哲王立誹謗之木置敢諫之皷猶懼不聞過于義之言不可罪也帝乃解隋趙賢通初仕後周武帝為御正上大夫與宗伯斛律徴素不協徵出為齊州刺史坐事下獄自知罪重遂踰獄而走帝大怒購之急賢通上宻奏曰徵自以負罪深重懼死遁逃若不北竄匈奴則南投呉越徵雖愚陋久歴清顯奔波敵國無益聖朝今者炎旱為災可因兹大赦帝從之徵頼而獲免賢通卒不言功陸彦師初仕北齊為中書黄門侍郎以不阿宦者讒出為中山太守栁雄亮高祖時為給事黃門侍郎尚書省凡有奏事雄亮多所駁正深為公卿所憚宇文弼為尚書左丞當官正色為百僚所憚梁毗為散騎常侍進位開府見楊素貴寵擅權百僚震慴因上封事極言之時素任寄隆重多所折挫當時朝士無不懼伏莫有敢與相是非辭氣不撓者獨毗與栁彧及尚書左丞李綱而已後髙祖不復專委於素蓋由察毗之言也郎茂為民部侍郎時尚書右僕射蘇威立條章每歳責民間五品不遜或答者乃云管内無五品之家不相應領類多如此又為餘糧簿擬有無相贍茂以為繁紆不急皆奏罷之栁彧為屯田侍郎時三品已上門皆列㦸左僕射髙熲子𢎞德封應國公申牒請㦸彧判曰僕射之子更不易居父之㦸槊已列門外尊有壓卑之義子有避父之禮豈容外門旣設内閤又施事竟不行熲聞而歎服盧楚為左司郎當朝正色甚為公卿所憚及煬帝幸江都東都官僚多不奉職楚每存糾舉無所廻避唐蘇珦則天朝為右司郎中時御史王𢎞義附託來俊臣搆陷無罪朝廷疾之嘗受詔於虢州採木役使不節丁夫多死珦按奏其事𢎞義竟以坐黜珦尋授給事中李至逺天后時李昭德薦為天官侍郎不詣昭德謝恩昭德怒奏黜為璧州刺史王求禮為左拾遺則天朝孫萬榮寇陷河北數州河内王懿宗擁兵不敢進比賊散懿宗奏請族誅滄瀛等州百姓為詿誤者求禮廷折之曰此百姓等素無良吏教習城池又不完固為賊驅逼茍徇圖全豈素有背叛之心哉而懿宗擁強兵十餘萬聞賊將至輙退走保城池罪當誅戮今乃移禍於草澤詿誤之人以求自免豈是為臣之道請先斬懿宗以謝河北百姓羣官咸諤然謂之切當遂令魏州刺史狄仁傑充使安撫宋璟為鳯閣舍人當官正色則天甚重之長安中張易之誣搆魏元忠有不順之言引鳯閣舍人張說令證之說將入於御前對覆惶惑廹懼璟謂曰名義至重神道難欺必不可黨邪醜正以求茍免若緣犯顔流貶芬芳多矣說感其言及入遂保明元忠竟得免死神龍元年遷吏部侍郎中宗嘉璟正直仍令諫議大夫内供奉仗下復言朝廷得失尋拜黄門侍郎時武三思恃寵執權嘗請託於璟璟正色謂之曰當今復子明辟王宜以侯就第何得尚干朝政獨不見産祿之事乎岑羲神龍元年為中書舍人時武三思用事侍中敬暉欲上表請削諸武之為王者募為疏者衆畏三思皆辭託不敢為之羲便操筆辭甚切直由是忤三思意轉秘書少監韓思復睿宗朝為給事中活嚴善思於雷霆之下拒武三思於諂附之中𤣥宗皇帝御筆題碑云有唐忠孝韓長公之墓楊瑒為户部侍郎時御史中丞宇文融請檢察天下逃户公卿不敢有異辭唯瑒獨建議以為括實不利居人徵籍外田稅使百姓困弊所得不補所失無幾瑒出外職相里造代宗朝為户部郎中永泰元年正月壬子章敬皇太后忌辰百僚於興唐寺行香内侍魚朝恩置齋饌於寺外之商販車坊延宰相及臺省官就食朝恩恣口談時政公卿惕息造與殿中侍御史李衎以正言折之衎辭直而強突頗忤朝恩遂罷會敬括為御史大夫持重推誠於下未嘗以私害公士頗稱焉班宏為刑部侍郎兼京官考使時右僕射崔寧書兵部侍郎劉廼上下考宏正議曰今夷荒靖難專在節制尺籍伍符不挾省司夫上多虚美之名下開趨競之路上行阿容下必朋黨因削去之廼知而謝之曰廼雖不敏敢掠一美以邀二罪乎郄高卿歴拾遺諫議大夫中書舍人處事不廻為宰相元載所忌魚朝恩署牙將李琮為兩街功德使琮暴横於銀臺門毁辱京兆尹崔昭髙卿立詣元載抗論以為國恥請速論奏載不從盧景亮德宗朝拜右拾遺補闕居諌列與補闕穆質皆以直稱韋貫之憲宗初為禮部員外郎新羅人全忠義以機巧進至少府監䕃其子為兩舘生貫之持其籍不與曰工商之子不當仕忠義以藝通權倖為請者非一人貫之持愈堅既而上疏陳忠義不宜汚朝籍辭理懇到竟罷去之改吏部員外郎奚陟為中書舍人中書省故事姑息胥徒以常在宰相左右也陟皆以公道遇之後為刑部侍郎時裴延齡惡京兆尹李充有能政專意陷害之誣奏充深結陸贄數厚賂遺金帛充既貶官又奏充比者妄破用京兆府錢穀至多請令比部勾覆以比部郎中崔元翰陷充怨惡贄也詔許之元翰曲附延齡刻治府史府史到者雖無過犯皆笞決以立威時論喧然陟廼躬自閱視府案具得其實奏言㨿度支奏京兆府貞元九年兩稅及已前諸色羨餘錢共六十八萬餘貫李充並妄破用今所勾勘一千二百貫已來是諸縣供館驛加破及在諸色人户腹内合收其斛㪷共三十二萬石惟三百餘石諸色輸納所由欠折其餘並是准敇及度支符牒應用已盡陟之寛平守法多如此類元翰既不遂其志因此憤恚而卒顔眞卿為尚書右丞代宗車駕自陜將還眞卿請皇帝先謁五陵九廟而後還宫宰相元載謂眞卿曰公所見雖羙其如不合事宜何眞卿怒而前曰用舍在相公耳言者何罪然朝廷事豈堪相公再破除耶載深銜之楊於陵為中書舍人時李實為京兆尹恃承恩寵於陵與給事中許孟容俱不附叶遂為實媒孽孟容改太常少卿於陵改秘書少監趙宗儒為司勲員外領考功事定内外百吏考績黜陟公當無所畏避遷考功郎中鄭澣為考功員外郎刺史有驅廹人吏上言政績請刋石紀事者澣採得其情條責亷使巧迹遂露人服其敏識裴佶為尚書左丞時兵部尚書李巽兼鹽鐵使將以使局置於本行經搆已半會佶拜命堅執以為不可遂令撤之巽恃恩而强時重佶之有守董晉為尚書左丞時右丞元琇為度支使韓滉所奏貶雷州司户其責既重舉朝以為非罪名有竊議者董晉謂宰臣劉滋齊映曰元右丞忽有貶責未知罪名用刑一濫誰不危懼假有權臣騁志相公何不奏請三司詳斷之去年闗輔用兵時方蝗旱琇總國計夙夜憂勤以贍給師旅不增一賦軍國皆濟斯可謂國之勞臣也今此播逐恐失人心人心一失則有聞鷄鳴起舞者矣竊為相公痛惜之滋映但引過而已給事中袁髙又抗疏申理之滉坐以朋黨寢而不報許孟容為禮部員外郎有公主之子請補𢎞文崇文舘諸生孟容舉令式不許主訴於德宗命中使問狀孟容執奏竟得請遷本曹郎中楊綰為吏部侍郎典選公平時元載秉政公卿多附託之綰孤立中道清貞自守未嘗私謁載以綰雅望素髙外示尊重心實疎之孟簡為倉部員外郎屬順宗登極王叔文竊政驟為户部侍郎簡為其屬中立正色挺然不附叔文心忌之而不敢退黜言於宰相韋執誼換刑部員外郎韓臯為尚書左丞時王叔文專政臯自以前軰舊人累更重任頗以簡倨自處嫉叔文之黨謂人曰吾不能事新貴人臯從弟畢幸於叔文以告之故出臯為鄂岳觀察使王源中為左補闕時典禁軍者不循法度至有臺府人吏皆為追擒源中上疏曰夫臺憲者紀綱之地府縣者責成之所設有罪犯宜歸司存安有北軍勢重於南衙輦下權傾於仗内乞還法司庶守職分憲宗可其請改侍御史韋處厚穆宗時為中書舍人時張平叔以便佞詼諧他門而進自京兆少尹不數月為户部侍郎判度支平叔欲以征利中帝意以希大任以𣙜鹽舊法為弊年深欲官自糴鹽可富國強兵疏利害十八條時宰不能奪因下其議處厚於是奏議發十難以詰之帝然後深知害人乃止平叔繇是始有疎斥之漸韋𢎞景為尚書左丞𢎞景素以鯁亮稱會吏部員外楊虞卿以公事為下吏所訕獄未能辨詔下𢎞景與憲司就尚書省詳讞虞卿多朋游時多嚮附者𢎞景素所不恱時已請告在第及准詔就召以公服來謁𢎞景謂之曰有勑推公虞卿失容自退崔咸為散騎常侍秘書監咸登朝歴臺閣獨行守正時望甚重敬宗幸東都人心不安裴度以勲舊自興元隨表入覲既至權臣不便度復居中書京兆尹劉栖楚軰十餘人駕肩拒之賔客持兩端者日擁其門一日度留客命酒栖楚求度之歡曲躬附耳而語咸舉爵罰度曰丞相不當許所屬官呫囁耳語度笑而飲之栖楚不自安趨出坐者壯之令狐楚為左僕射太和末李訓伏誅大臣從坐者八九人京師大擾文宗夜召楚及鄭覃入决事翌日以覃為宰相危疑之際楚多守正故為中尉仇士良所忌遂以本官充諸道鹽鐵轉運等使後唐蕭頃初在唐為吏部員外郎先是張濬由中書出為右僕射後為梁太祖判官髙邵使祖䕃求一子出身官省寺皆稱無例濬指揮甚急吏徒惶懼頃又判云僕射未集郎官未赴省上指揮使曹公事俱非南宫舊儀濬聞之慙悚致謝頃繇是名振梁祖亦加奨之韋寂仕梁為吏部郎中復判南曹吏畏其明人賞其正劉賛歴御史中丞刑部侍郎賛性雍和與物無忤居官畏慎人若以私干之雖權豪不能移其操崔嶤為尚書左丞素與崔彦融善彦融嘗為萬年令嶤謁於縣彦融未出見案上有書題皆賂遺中貴人嶤知其由徑始惡其為人及除司勲郎中嶤為左丞通刺不見嶤謂曰郎中行止鄙雜故未敢見宰相知之改楚州刺史卒於任趙鳳為員外郎充翰林學士會明宗置端明殿學士鳯與馮道俱任其職時任圜為宰相恃明宗舊恩行事無邊幅為巧宦者所傾以至罷相歸磁州朱守殷以汴州叛明宗親征未及鄭州巧宦者謂安重誨曰此失權者三四人在外地如朝夕未能破賊被此軰隂結狡徒為患非細乃指任圜在􅇭陽即日馳驛賜圜自盡既而鳳知之哭謂重誨曰任圜義士肯造逆謀以讐君父乎公如此濫刑何以安國重誨笑而不責晉裴皥為工部尚書舍相國寺宰臣桑維翰謁之不迎不送或問之答曰皥見維翰於中書則庶寮也維翰見皥於私館則門生也何送迎之有時人重其耿介盧詹歴兵部侍郎左丞工部尚書詹剛直議論不避權貴執政者常惡之册府元龜卷四百五十九
