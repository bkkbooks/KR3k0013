莫尚於孝報國莫大於忠忠孝兩全古今所重在朝文武臣寮并諸道節度刺史等有父母者宜徧加恩澤使天下為人父者知感為人子者知恩競楊家國之風顯著君臣之道三年正月己丑先准天成二年五月十二日勑中外臣寮及諸道節度使等有父母者並許加恩奉勑凡居臣下盡抱公忠共為朝廷各榮家族具慶者繼頒恩渥俾耀晨昏既亡者宜漏泉扄以光封樹應中外羣臣及諸道節度防禦團練刺史等父母亡殁者並與追贈加封四年二月北面馳報今月三日收復定州舉酒徧賜侍臣喜除腹心之疾賜教坊絹五百疋内臣進馬稱賀丙午百辟入賀馮道從容言曰元惡既除猶望陛下安不忘危即太平非逺戊申宴羣臣於玉華殿樂作王晏球馳報已獲王都首級生禽契丹秃餒等二千餘人百官就班稱賀崔協酒酣不能抃蹈踣於地命左右掖之方興不乆協卒宴罷賜物加等長興元年二月郊禋禮畢下制曰朕恭荷丕圖獲申大禮葢股肱之叶力環衞之輸忠將士等扈從乗輿警廵晝夜咸彰勞瘁深所嘉稱各示頒宣以明酬奨宜令三司依等第勘會指實人數指揮支給其諸道州府如本處有絹帛准價折支無見在錢物即就便支遣兼差使臣各往逐處宣賜仍下六軍諸衞准此吿諭是月宴羣臣於長春殿百寮各賜鞍馬銀器分物有差酬郊祀行事也五月丁丑詔賜皇后册禮使馮道副使兵部尚書盧質錢絹衣著銀器鞍馬有差三年正月白波新脩軍營帝駕幸觀之稱旨賜部署軍吏等物有差八月戊申受册尊號庚戌以馮道撰玉册文李愚書寳劉昫書册各賜絹二百疋銀器百兩秦王從榮延光延夀各賜絹五百疋銀器百兩金帶一銀鞍馬一宣徽使馮贇孟漢瓊絹三百疋銀器百兩鞍轡馬一匹客省使宋敬塘樞宻直學士李崧絹百疋葢盌一侍衞指揮使康義誠已下三人六軍統軍李從昶已下六人各賜錢二十千諸軍都指揮使人各十五千諸軍指揮使人各十千副指揮使人各七千都頭人各五千副兵馬使人各四千親直捧聖等散指揮使嚴衞軍將等人各三千龍武神武羽林六軍馬步兵士人各二千雜作諸軍將士人各一千徽號赦後恩賞也又賜侍衞都將康義誠絹二百疋馬一匹馬步都將安彦威張從賔各絹百疋馬一匹捧聖嚴衞都將宋洪實皇甫遇絹各百疋十月丙寅勑曰朕聞君臣一也善否同之比之於人心安則體逸方之於木枝盛則葉繁朕自父天子民宗文祖武輔弼上憑於廊廟獻替次賴於縉紳四海無波敢自矜於清晏一人有慶思共樂於雍熈近又允副羣情增崇大號雖中外元輔已議序遷而文武庶寮未聞普及而况咸著恪居之績悉堅欣戴之誠將顯示於奨酬當廣頒於渥澤應在朝文武臣寮並宜加恩其有八月四日已後遷官者不在此限時帝欲徧與百寮轉官而馮道等以為轉官須論資考乃奏叙階勲而已愍帝以長興四年十一月癸卯即位己酉詔中外將士賜物有差應順元年正月改元諸藩鎮文武臣寮皆次序加恩帝嗣位覃慶澤也是月宴將相百寮於廣夀殿賜幣馬有差二月詔兩班常參官各加階進爵從改元赦書恩例也末帝清泰元年四月即位大赦應内外文武臣寮即鎮州府等使刺史文武職員將校並與加恩應自鳯翔扈駕員寮凡主兵主事者各賜功臣名見在京隨駕并諸道馬步將士并與等第優給并從别勑處分隨駕前資文武官寮并量材任使是月詔禁軍鳯翔城下歸明將校賞給龍武都指揮使安審琦羽林都指揮使馬萬楊思權嚴衞都指揮使尹暉各二馬一駝錢七十貫諸軍廂指揮使壕寨使各一馬一駝錢五十貫諸軍指揮副指揮使一馬一駝錢四十貫軍使都頭一馬錢三十貫諸軍軍使副兵馬使至長行契丹直錢三萬軍頭十將至軍人各十貫其元在京城守營及新招軍都人廂軍十將至官健各錢十貫又詔曰應勸進諸選人前京兆府武功令龎濤而下四百九十有四人方在京都遘茲際會既同勸進宜示奬酬其前資州縣官及黄衣進選人近日緣少闕員難於减選候合格日各超一資注擬行事官亦於注擬時優與處分長流人已歸本貫即以赦書節文處分攝試官推廵令録宜并許比三轉出身判司衙推主簿比明經出身各守選限自今年始合格日與初官宗子未有出身者與出身有出身者同選人例處分給與憑據七月詔鄭州防禦使宋敬塘宿州團練使潘環潁州團練使孫鐸亳州團練使康文審洺州團練使田武宻州刺史張籛郢州刺史武廷翰懐州刺史周光輔商州刺史侯益并叙進爵邑從恩例也文武兩班崔居儉而下一百七十有一人各轉階一級或賜勲一轉或進爵一等示新恩也晉高祖天福元年十一月己亥即位于北京大赦改元詔曰文武官寮等各輸推戴之誠宜示奨酬之道應在京文武官寮及軍府將校并勸進官等兼前資官内自五月後來未曽分掌職任并各與遷轉官資自五月後已來曽受官者不在此限其軍府諸色職掌將吏等已及押衙職者并與加官未及押衙職者各與遞遷職次應超魏府行營及係侍衞諸軍將校等并已加恩外所有六軍及諸道本城并替換在諸處將校未加恩者凡執干戈皆為社稷雖守役或分等次而傾心盡著勤勞且被渥恩各升官秩用奬輸忠之効俾堅禦侮之誠其六軍及諸道州府本城并替換在諸處將校未加恩者宜令并與依資轉官仍令六統軍及諸道州府據前項軍都自副將已上分析名衘申奏是月甲申至雒都壬午詔曰賞罰二柄激勸萬方儻稽甄奬之恩何荅勤劬之効應扈駕及相州歸順軍都並與重加優賞但緣宫内燒􅋹庫藏虛乏宜令三司疾速抽徴諸道税物以充賞給其指揮使節級等并與超轉官資五月後來已曽授恩命者亦與依資轉官高懸朗日臨照必被於遐陬大扇仁風亭育罔遺於纎芥應天下歸順節度使刺史下賔席郡職及將校等委中書門下各與改轉官資二年正月庚申詔曰有晉開國新命臨人宜𢎞不二之規以廣無私之化應在朝中外臣寮及節度團練防禦使刺史留守司及州府縣官等宜并與加恩擢材委任不問常例十月勑應追尊四廟行事官等追尊四廟式展盛儀行事庶官合頒溥澤貴承光寵共贊孝思宜令銓司准元勑磨勘如守選年深過格及㔾合格指受赴任不得并次一選兩選者先與注官加欠三選四選月限不滿衝替下許非時注擬者即相次注官仍頒各依資序如不依元勑指揮欠選數多者即仰都具奏聞三年四月諸道藩侯郡守皆等第加恩六年八月己亥帝至鄴都壬寅制經過郡縣迎奉乗輿既供億以為勞宜旌酬而示寵應自東京至鄴㳂路供頓官員職掌等並與加恩載念雀臺昔居侯服撫綏六郡臨蒞四年睠彼職員依然父老無恡推恩之典仍敦尚齒之風鄴都並相澶貝愽衞等州官員職掌内有頃歲濳龍時在職者并與加恩管内耆老八十已上者並與版授上佐少帝以天福七年六月乙丑即位丁卯賜侍衞諸軍將校錢一百貫至五十貫以初即位示大賚也七月庚子御正殿大赦内外臣寮侍衞諸軍將校及諸道節度使防禦團練刺史及諸道賔幕將校職員見任京官六品㔾下州縣官三司場院監治帶使額者並與加恩其諸道職員押衙已下與轉官兵馬使㔾下與轉職致仕官前任文武朝臣内諸司使㔾下前任節度使防禦團練刺史行軍賔從少尹上佐官前諸道都指揮使已下前任京六品㔾下官及前資州縣官帶使額場院官等並與加恩應在京諸司職掌亦量與恩澤八年七月丁酉幸南莊宣隨駕臣寮射于後園賜酒食物帛有差㳂路農人各賜布衫袴并鞋貧子共賜錢一十貫文開運二年正月辛亥宴青州立功將校於永福殿賜李守貞符彦卿玉帶衣一襲衣著銀器鞍轡馬都監王景崇䕶聖廂主楊實都指揮使靳霸等各等第賜金銀帶衣服疋段銀器等漢高祖開運四年二月辛未即位於北京猶稱天福十二年是月戊寅以内外府庫賞犒諸軍將士有差甲午賜北京管内郡縣官員職掌各加階級乙酉北京管内及諸道相次有前資官六千七百人詣闕稱賀帝面加賚以遣之六月甲子至東京戊辰大赦内外臣寮及京百司并諸道官吏將校等各具名銜申奏當與加恩乾祐元年正月乙卯大赦改元應扈從鄴都文武臣寮及諸軍將校并在京都署廵檢官員職掌諸軍將校等除已行恩命外所有未曽加恩者宜令中書門下條舉聞奏兼鄴都已來緣路州縣迎奉大駕供饋宿頓粮草無遺闕處其職掌及州縣官吏並與等第甄錄隠帝以乾祐元年二月辛巳即位癸巳大赦應中外文武臣寮將吏各加恩寵其馬步諸軍兵士等各加賞給周太祖廣順元年正月丁卯即位改元詔馬步諸軍將士等各與等第超加恩命仍賜功臣名號已有功臣者别與改賜内外文武臣寮致仕官諸軍將校隨使職員及前任藩侯郡守文武朝列前内諸司使副使前禁軍指揮使前資行軍副使等各與等第加恩世宗以顯徳元年正月南郊大赦内外馬步諸軍將士各等第優賞應見任内外文武職員諸軍將校致仕官節度防禦團練刺史前任文武外朝官前内諸司使副使前諸州行軍副使前指揮使諸道進奉專人前資官赴郊廟陪位者并與加恩内外命婦并與追封因夫子叙封者不得過夫子本品其諸寺監攝官如滿七周年㔾上應奉公事無遺闕文書灼然者並與同明經出身應祗應郊廟職掌人員並與恩澤其行事官已勘無違碍者候銓司移省各與除官合來年集者候將來授任仍並加一階欠三選至五選者减一選欠六選已上减兩選幕職並與减一年如欠月限不及一年者便與除官仍轉官資其諸色選人駁放皆依格勑其間小小違碍可以情恕者并條奏以聞起今後升朝官兩任已上著綠十五周年者與賜緋著緋十五年者與賜紫凡州縣官厯任内曽經五度參選者雖未及十六考與授朝散大夫階年七十已上合授優散官者并賜緋其非時特恩不拘此例是月賜將相近臣主軍職員及郊禋册尊號行事官等第分物三月丁丑賜宰臣樞宻使及諸軍都校鞍馬金玉帶衣服各有差辛巳大赦内外見任文武職官致仕官及諸軍將校并與加恩其前任京官幕職州縣官至合授官日施行四年三月戊子朔帝在淮南宴文武從官於行宫賜招討使李重進都監向訓等窄衣玉帶金銀器繒綵鞍馬器甲等又賜諸將及行營軍士分物各有差册府元龜卷八十一
