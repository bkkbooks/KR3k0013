body:
  text: 册府元龜卷八十一宋王欽若等撰帝王部慶賜第三唐代宗以寳應元年四月即位五月丁酉大赦詔諸州刺史與一子官刺史縣令入五品减兩考内外文武官三品㔾上賜爵一級四品已下各加一階諸州刺史父母在無官者與致仕官及母邑號㔾亡殁者追贈天下子為父後者各賜勲一轉廣德元年七月壬子受册尊號大赦改元制内外文武三品㔾上賜爵一級四品已下加階仍各賜勲兩轉文武正員常參官并諸州刺史父母無官邑者宜與致仕及邑號賜者更與改贈二年二月乙亥親拜南郊戊子御明鳯門大赦内外文武三品㔾上賜爵一級四品㔾下各加一階仍並賜勲兩轉武德元從功臣勲業特崇子孫沈翳者委所司勘責各與一人官成都靈武元從普恩之外三品已上更賜一級四品已下更加一階寳應功臣普恩之外三品㔾上各與一子六品官賜爵一級四品已下各加兩階更賜勲兩轉五品㔾上官子為父後者賜勲兩轉副元帥光弼子儀各與一子三品官并階諸道節度使各與一子五品官并階都防禦使及經略等使各與一子六品官并階去歳行幸陜州六軍英武威逺威武寳應射生衙前射生左右步軍等并内外文武百官扈從到行在者三品㔾上與一子官四品已下各加兩階自陜州至上都已來置頓使及州府長官普恩外各與一子出身置頓使判官已下緣路縣令及專知頓使各加一階其六軍神策寳應射生衙前射生及左右步軍英武威逺威武等諸軍左右金吾將士緣大禮扈從及在城留後者共賜金錢五萬貫鴻臚蕃客共賜錢一千貫儀王及彭王㔾下諸王男未有官者並准舊例與官其已封為郡王國公者及永穆長樂㔾下長公主及諸郡縣主并嗣王郡王各與一子官皇親五等㔾上諸親三等已上各與一子出身二王之後各與一子官應緣大禮應升壇殿行事者普恩之外更與一子官應在太清宫郊廟諸色職掌者及册皇太子行事官撰册并書册文及檢校造册官普恩之外三品㔾上賜爵一級四品已上加一階仍賜勲一轉永泰元年正月癸巳朔御含元殿大赦改元應見立仗諸軍將士等宜共賜錢五萬貫大歴元年十一月甲子日長至御含元殿大赦改元其立仗將士等宜賜物五百疋德宗以大歴十四年五月即位六月己亥朔御丹鳯樓大赦天下内外文武官三品已上賜爵一級四品已下加一階致仕官同見任天下百姓為户者賜右爵一級内外將士及方面連帥並加官及勲封等在城諸將士各賜繒帛建中元年正月辛未拜郊廟禮畢御丹鳯樓大赦天下内外文武官賜爵及階勲天下子為父後者賜勲兩轉興元元年正月癸酉朔帝在奉天大赦改元詔應赴奉天并進牧京城將士并賜名奉天定難功臣身有過犯减罪三等子孫過犯减罪二等六月癸丑詔興元府見任官各加兩階耆老與版授本縣令仍賜緋興元鳯州界内知頓脩橋閣路官等委嚴震類例功效聞奏當與甄奨七月丙子次鳯翔詔鳯翔府耆夀侍老八十已上各與版授刺史仍賜紫餘並與版授上佐仍賜緋府縣知頓官考滿日放選是月辛卯御樓大赦内外文武及致仕官三品㔾上賜爵一級四品㔾下加一階仍并賜勲兩轉司徒兼中書令晟與一子五品正員京官侍中瑊與一子六品正員京官駱元光尚可孤韓遊環戴休顔各與一子七品正員官諸道節度使及行在都知兵馬使都虞候扈從左右金吾六軍大將軍各與一子八品正員官都團練使觀察使各與一子官收京城將士超八資改轉已甄叙者更與超三資扈從及收京城將士及常參官祖父母在先無官封量授致仕官及邑號㔾亡者與追贈扈從將士三品巳上賜爵兩級四品㔾下各加兩階賜勲三轉諸道刺史普加恩外賜爵一級諸道鎮軍及行營將士三品已上賜爵一級四品㔾下加一階宣示中外咸知朕意貞元元年正月丁酉朔御含元殿大赦改元扈從奉天及收城將士以府庫空竭减六宫百司經費據見漕運財賦隨到者賞賜之十一月癸卯日南至南郊禮畢詔内外文武見任及致仕官三品㔾上賜爵一級四品已下加一階天下諸使軍將士三品已上亦賜爵一級四品㔾下加一階白身人賜勲三轉應奉天興元元年扈從立功并收京城將士食封者各隨文武與一子官餘並加兩階仍賜勲三轉其文武百僚應從到興元府者五品㔾上賜勲三轉其五品已下賜爵一級六品㔾下加一階合入三品五品者不拘考限聽叙其中五品㔾上父母未經追贈者並與追贈大長公主各與一子七品官嗣王郡王縣主各與一子出身應陪位皇親三品已上賜爵一級四品五品加一階六品㔾下及甞選散官者簡選日優與處分應緣大禮職掌行事官及留守副留守内行事中官等三品㔾上各賜爵一級四品㔾下加一階仍並賜勲兩轉介公􅀈公各與一子官如無子孫賜物一百疋神策六軍殿前射生英武威武威逺皇城左右金吾衞使等諸軍諸使將士御樓立仗及守本仗者并諸道節度下隨使赴上都帖仗將士等宜共賜物十三萬段仍賜勲兩轉四年正月庚戌御殿大赦諸軍立仗将士共賜帛十萬疋陪位蕃客賜一千疋天下刺史與一子正員官户口增加田疇廣闢者長吏加一階縣令减選優與處分十一月庚午日南至南郊禮畢詔内外文武及致仕官并諸軍將士等三品已上賜爵一級四品已下加一階大禮行事官各加一階立仗將士及守本營者共賜帛十八萬端疋九年十一月乙酉日南至郊祀禮畢大赦天下内外文武見任及致仕并諸軍諸使將士等三品㔾上賜爵一級四品㔾下加一階將士白身者賜勲兩轉應緣大禮職掌行軍法駕南郊後留守副留守及太倉左藏庫及陪位官等三品已上更賜爵一級四品㔾下加一階其郊壇宫廟行事官各賜勲兩轉皇親應陪位者三品㔾上賜爵一級四品已下加一階及諸色應陪位官等各賜勲兩轉親王大長公主公主嗣主郡縣主􅀈公介公鴻臚蕃客神威六軍及諸使應緣大禮宿衞御樓立仗及守本軍本營者諸道節度在京帖仗將士賜物有差宰輔及在方鎮者祖父各與追贈東都留守諸軍節度觀察都防禦都團練經畧鹽鐵轉運使左右神策神威六軍等統軍大將軍英武威逺軍使户部侍郎判度支及京文武三品巳上正員官尚書省四品官中書門下省御史臺五品官父在未有官者量授檢校官有官者加一階母在未有邑號者授邑號巳有邑號者更進邑號父母亡殁者各與追贈應諸軍防秋兵馬使及别勑定名充邊地兵馬使等備禦勤勞所宜優異其父在未有官者各授檢校官母在未有邑號者各授邑號邊軍鎮守及諸道諸軍防秋將士經三周年未改轉者宜與甄叙順宗以貞元二十一年正月即位赦制内外文武見任及致仕官并諸道將士等賜爵加階賜勲有差二王三恪褒聖侯各與一子官大長公主嗣王等各與一子官及出身有差宗子中有才用者委宗正卿以名聞量才叙用皇王等已上親賜爵加階有差陪位者年十五㔾上并放出身諸州府長官及京長參官父見在未有官者並與五品致仕官及階父殁者母存者與邑號父母亡殁量與追贈陜州元從寳應功臣興元元從奉天定難功臣賜爵勲有差亡殁者與追贈中書門下節度使東都留守度支鹽鐵等使京兆尹觀察招討等使及神策神威金吾六軍將士大將軍英武威逺鎮國軍使隴右經畧軍使節度留後各與一子官有差其神策神威六軍將軍大將士英武軍等使并與加官神䇿神威六軍英武威逺營左右金吾及皇城將士及緣御樓立仗將士等賜物及爵階有差應東宫官及侍讀侍書授在正月二十六日巳前者國喪已來職掌行事及册命官受顧命撰制詔及脩册文并寫制詔官等賜爵加階勲進改有差蕃客等共賜物一千八百七十疋義武軍節度使下官健在城立仗共賜物三千八百四十五疋立仗將士等量加改轉内侍省及内坊官正諸道進奏院及奏事官賜爵階勲有差百姓九十㔾上版授及賜各有差又册皇太子詔文武官常參及諸州府長官子為父後者賜勲兩轉憲宗元和元年正月丁卯御丹鳯樓大赦内外文武見任及致仕官神策六軍諸道將士等各賜爵階勲有武德已來功臣子孫與官及出身文武常參官觀察節度團練經略使刺史六軍大將等父母亡殁與封贈至德巳來任宰輔與追贈及諡陜州奉天元從功臣恩外更賜勲爵二年正月辛卯有事於南郊還御丹鳯樓大赦天下制内外文武見任及致仕官諸軍將士等以品秩節級賜勲爵文宣公及二王三恪公主諸王與一子官及賜物有差諸軍立仗及在本營節級賜物應緣大禮職事官並賜階爵天下百姓高年者賜米麥羊酒及版授官四年十月册鄧王寧為皇太子大赦天下文武常參官及諸州府長官子為父後者賜勲兩轉應緣册禮行事官賜階及勲爵有差鄧王府官量與進改七年十月壬寅册遂王為皇太子庚戌制文武常參官及諸州府長官子為父後者賜勲兩轉應緣册皇太子行事官加階賜勲爵有差文武常參官及陪位官並宗子親賜勲一轉遂王府官量與進改十三年正月乙酉御含元殿受朝賀畢御丹鳯樓大赦詔二王三恪及文宣公各賜物五十疋神策六軍威逺金吾及皇城等緣御樓立仗將士等及在城内蕃客各賜布有差中書門下及文武常參官諸道節度觀察神策諸軍等使祖父母父母節級與贈官封存者量與致仕官及邑號天下百姓高年賜束帛羊酒有差十四年七月己丑御宣政殿受册尊號大赦天下内外文武見任及致仕官三品㔾上賜爵一級四品已下加一階仍賜勲兩轉神策六軍金吾皇城威逺等諸軍應在城内蕃客並節級賜物侍中韓𢎞讀册官崔羣讀寳官皇甫鏄並各加一階㔾至三品者賜爵二級撰册文官崔羣與一子正員官其餘應職掌行事官加階賜爵賜勲有差寳應興元功臣各賜勲爵天下百姓高年者頒賜有差穆宗以元和十五年正月即位二月丁丑御丹鳯樓大赦詔内外文武見任及致仕官三品㔾上賜爵一級四品已下各加一階諸道軍將士等普恩之外賜階爵有差二王三恪文宣公及公主縣主嗣王節級賜與一子官及出身宗子才行者委以名聞奏仍委中書門下量才叙用皇王等巳上親皇太后二等㔾上親並賜階爵中書門下諸道節度使諸州府長官東都留守及京常參官諸軍使等父母並節級與追贈父母存者與官封已經追贈者更與改贈在城諸軍將士節級賞賜仍加階爵京西京北及鎮武天德八道節級都防禦使下及神策一十二鎮將士等共一十八萬六千七百餘人都賜物一萬八千八百餘疋皇太后諸親委中書門下量等第節級優賞文武常參官及外官職事五品㔾上有母者並加邑號如㔾至郡太夫人者許迴授周親應緣皇太后册禮職事官並節級賜物天下百姓有祖父母父母高年者賜束帛城内蕃客等並節級賜物今年正月二十八日至閏正月三日宫苑諸門守捉西内立仗將士等量加改轉應内侍省及内坊官正等並賜勲爵九月辛丑幸魚藻宫大張樂觀競渡貴戚左右洎倡優角抵市肆百戲皆厚頒賜賚十一月制王承元願赴闕庭宜令諌議大夫鄭覃往鎮州宣慰其四州之内有高年孤獨或承平遺老夙覩皇風或孤獨廢疾不能自存者差官就問量給粟帛長慶元年正月辛丒郊禋禮畢大赦天下内外文武及致仕官三品已上賜爵一級四品㔾下各加一階陪位白身人賜勲兩轉陜州奉天興元功臣更賜爵有差身殁未經追贈應緣大祀移仗宿衞御樓立仗將士普恩之外賜爵勲有差仍准舊例賜錢物二十萬四千九百六十端疋貫大禮職掌行事官及留守等更賜勲爵及加階升壇殿行事官更特加一階應在城内蕃客等賜物有差天下百姓高年者賜米及綿絹有差三