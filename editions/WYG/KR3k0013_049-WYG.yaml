body:
  text: 册府元龜卷四十九宋王欽若等撰帝王部崇儒術周官太宰之職以九兩繫邦國之民其一曰儒盖六藝之謂也而太史公以為列君臣父子之禮序夫婦長幼之别雖百家不能易故歴代致治之後何莫繇斯道也已乃有朝舎干戈暮習爼豆誠知夫天下之重非可馬上而治文武之道布在方䇿有條不紊可舉而行至於變風易俗之端長世字甿之術荒懐來逺之畧邁徳興仁之㫖鮮不出於是矣繇是立庠塾設學校褒先儒以闡化尊經典以立訓咸用詮次存諸軌範漢高祖十二年十一月行自淮南還過魯以太牢祀孔子文帝時天下亡治書者獨聞齊有伏生臣欽若等曰伏生名勝故秦博士治尚書年九十餘老不可至廼詔太常使人受之太常遣鼂錯受尚書伏生所還因上書稱説稱書法而説其義詔以為太子舍人武帝元朔五年六月詔曰盖聞導民以禮風之以樂今禮壊樂隳朕甚閔焉故詳延天下方聞之士咸薦諸朝詳悉也方道也聞博聞也言悉引有道博聞之士而進於朝也其令禮官勸學講議洽聞舉遺興禮以為天下先太常議與博士弟子崇鄉黨之化以厲賢材焉時御史大夫倪寛有俊才初見帝語經學帝説之曰吾始以尚書為樸學弗好及聞寛説可觀乃從寛問一篇擢為中大夫其後詔求為韓詩者徴蔡義待詔久不進見義上疏曰臣山東草莽之人行能無所比容貌不及衆然而不棄人倫者竊以聞道於先師自託於經術也願賜清閒之燕燕安息也得盡精思於前帝召見義說詩甚說之擢為光禄大夫給事中宣帝即位聞衛太子好榖梁春秋以問丞相韋賢長信少府夏侯勝及侍中樂陵侯史高皆魯人也言榖梁子本魯學公羊氏迺齊學也宜興榖梁時蔡千秋為郎召見與公羊家竝說帝善榖梁說擢千秋為諫大夫給事中後有過左遷平陵令復求能為榖梁者莫及千秋帝愍其學且絕廼以千秋為郎中户将户将官名選郎十人從受又梁丘賀從京房受易帝聞京房為易名求其門人得賀賀時為都司空令坐事論免為庶人待詔黄門數入說教侍中為諸侍中說經為敎授以召賀賀入說帝善之說於天子之前以賀為郎中修武帝故事講六藝羣書博士盡竒異之甘露三年詔諸儒講五經同異太子太傅蕭望之等平奏其議帝親稱制臨决焉乃立梁丘易大小夏侯尚書榖梁春秋博士元帝即位徵髙宻相孔霸以師賜爵關内侯號褒成君霸上書求奉孔子祭禮帝下詔曰其令師褒成君關内侯霸以所食邑八百户祀孔子焉故霸還長安子福名數於魯奉孔子祀名數户籍也帝好儒術文辭頗改宣帝之政言事者多進見人人自以為得帝意初元五年詔博士弟子每置員以廣學者帝少而好儒及即位徴用儒生委之以政貢薛韋匡貢禹薛宣韋賢匡衡迭為宰相成帝河平三年八月光禄大夫劉向校中秘書謁者陳農使使求遺書於天下言令陳農為使而使之求遺書先是班伯少受詩於師丹大将軍王鳳薦伯宜勸學召見宴昵殿親戚宴飲㑹同之殿容貌甚麗誦説有法拜為中常侍帝方鄉學鄭寛中張禹朝夕入說尚書論語於金華殿金華殿在未央宫詔伯受焉既通大義又講異同於許商遷奉車都尉數年金華之業續出平帝元始元年封孔子後孔均為褒成侯奉其祀追諡孔子為褒成宣尼公後漢光武建武五年七月幸沛十月還幸魯使大司空祠孔子是月初起太學在洛陽城故開陽門外去宫八里講堂長十丈廣三丈帝幸太學賜博士弟子各有差十四年四月封孔子後志為褒成侯平帝封孔均為褒成侯志均子十九年立皇太子選求明經乃擢桓榮弟子豫章何湯為虎賁中郎将以尚書授太子帝從容問湯本師為誰湯對曰事沛國桓榮帝即召榮令說尚書甚善之拜為議郎賜錢十萬入使授太子每朝㑹輙令榮於公卿前敷奏經書帝稱善曰得生幾晚㑹歐陽博士缺因拜榮為博士車駕幸太學會諸博士論難於前桓榮被服儒衣温恭有藴藉藴藉由言寛博有餘也辨明經義每以禮讓相厭不以辭長勝人儒者莫之及厭服也特加賞賜又詔諸生雅吹擊磬盡日乃罷吹管奏雅頌也明帝永平二年三月詔郡國縣道行鄉飲酒于學校皆祠先聖先師周公孔子牲以太牢孟冬亦如之九年四月開立學校置五經師自皇太子諸王侯及功臣子弟莫不受經又為外戚樊氏郭氏隂氏馬氏諸子弟立學官號四姓小侯以非列侯故曰小侯十年九江人鮑駿上書言丁鴻經學至行帝甚賢之詔徴鴻至即召見說文侯之命篇賜御衣及授廩食公車與博士同禮十五年帝東廵過魯幸孔子宅祠仲尼及七十二弟子親御講堂命皇太子諸王說經帝自制五家要說章句令桓郁校定於宣明殿一云帝自制五行章句此言五家即謂五行之家也其冬帝親於辟雍自講所制五行章句已復令郁說一篇帝謂郁曰我為孔子即為子夏起予者商也又問郁曰子幾人能傳學郁曰臣子皆未能傳學孤兄子一人學方起帝曰努力教之有起者即白之章帝建初四年十一月詔曰盖三代導人教學為本漢承暴秦褒顯儒術建立五經為置博士其後學士精進雖曰承師亦别名家孝宣帝以為去聖久逺學不厭博故遂立大小夏侯尚書後又立京氏易至建武中復置顔氏嚴氏春秋大小戴禮博士此皆所以扶進微學尊廣道藝也中元元年詔書五經章句煩多議欲減省至永平元年長水校尉樊儵奏言先帝大業當以時施行欲使諸儒共正經義令學者得以自助孔子曰學之不講是吾憂也又曰博學而篤志切問而近思仁在其中矣於戯其勉之哉於是下太常將大夫博士議郎郎官及諸儒生㑹白虎觀講議五經同異使五官中郎將魏應承制問侍中淳于恭奏帝親稱制臨決如孝宣甘露石渠故事作白虎議奏先是建初元年校書郎楊終上言宣帝博徵羣儒論定五經於石渠閣方今天下少事學者得成其業而章句之徒破壞大體宜如石渠故事永為後世則於是詔諸儒於白虎觀論考同異同八年十二月詔曰五經剖判去聖彌逺章句遺辭乖疑難正恐先師㣲言将遂廢絶非所以重稽古求道真也其令羣儒選高才生受學左氏榖梁春秋古文尚書毛詩以扶㣲學廣異義焉元和元年帝廵狩之趙特引見趙相魯丕難問經傳厚加賞賜二年三月帝東廵狩還過魯幸闕里以太牢祀孔子及七十二弟子作六代之樂大㑹孔氏男子二十以上者六十三人命儒者講論蘭䑓令史孔僖因自陳謝帝曰今日之㑹寧於卿宗有光榮乎對曰臣聞明君聖主莫不尊師貴道今陛下親屈萬乗辱臨敝里此乃崇禮先師増輝聖徳至於光榮非所敢承帝大笑曰非聖者子孫焉有斯言乎遂拜僖郎中賜褒成侯損及孔氏男女錢帛詔僖從還京師使校書東觀和帝永元十三年正月丁丑帝幸東觀覧書林閲篇籍博選術藝之士以充其官安帝延光二年詔選三署郎及吏人能通古文尚書毛詩糓梁春秋一人三年三月幸泰山祀孔子及七十二弟子於闕里自魯相令丞尉及孔氏親屬婦女諸生悉㑹賜褒成侯以下帛各有差遂還京師幸太學順帝永建六年九月繕起太學靈帝熹平四年三月詔諸儒正五經文字刻石立於太學門外六年十月帝親臨辟雍光和元年二月始置鴻都門學生鴻都門名也於内置學詩辭賦及工書鳥篆者相課試至千人焉二年六月詔公卿舉能通尚書毛詩左氏糓梁春秋各一人悉除議郎魏太祖為漢丞相以建安八年秋七月令曰䘮亂以來十有五年後生者不見仁義禮讓之風吾甚傷之令郡國各脩文學縣滿五百户置校書選其鄉之俊造而教學之庶幾先王之道不廢而有以益於天下既為魏王以建安二十二年五月作泮宮文帝黄初二年正月詔曰昔仲尼資大聖之才懷帝王之器當衰周之末無受命之運在魯衞之朝教化乎洙泗之上棲棲焉遑遑焉欲屈己以存道貶身以救世於時王公終莫能用之乃退考五代之禮脩素王之事因魯史而制春秋就太師而正雅頌俾千載之後莫不宗其文以述作仰其聖以成謀兹可謂命世之大聖億載之師表者也遭天下大亂百祀墮壊舊居之廟毁而不脩褒成之後絶而莫繼闕里不聞講頌之聲四時不覩烝甞之位斯豈所謂崇禮報功盛徳百世必祀者哉其以議郎孔羡為宗聖侯邑百户奉孔子祀令魯郡脩起舊廟置百户吏卒以守衞之又於其外廣為室屋以居學者明帝大和二年六月詔曰尊儒貴學王教之本也自頃儒官或非其人将何以宣明聖道其高選慱士才任侍中常侍者申勅郡國貢士以經學為先景初中帝以高堂隆蘇林秦靜等老恐無能𫝊業者乃詔曰昔先聖既没而其遺言餘教著於六藝六藝之文禮又為急弗可斯須離者也末俗背本所繇來久故閔子譏原憲之不學荀卿醜秦世之坑儒儒學既廢則風化曷繇興哉方今宿生巨儒並各年高教訓之道孰為其繼昔伏生将老漢文帝嗣以鼂錯糓梁寡疇宣帝承以十郎臣欽若等曰選郎十人從受其科郎吏高才觧經義者三十人從光祿勲隆散騎常侍林博士靜分受四經三禮主者具為設課試之法夏侯勝昔有言士病經不明經術苟明其取青紫如俯拾地芥耳今學者有能究極經道則爵禄榮寵不期而至可不勉哉數年隆等皆卒學者遂廢齊王正始二年二月初通論語使太常以太牢祭孔子於辟雍以顔淵配五年五月講尚書經通使太常以太牢祠孔子於辟雍以顔淵配賜太傅大将軍及侍講者各有差六年詔故司空王朗所作易傳令學者得以課試七年十二月講禮記通使太常以太牢祀孔子於辟雍以顔淵配晉武帝泰始三年十一月改宗聖侯孔震為奉聖亭侯又詔太學及魯國四時備三牲以祀孔子咸寧二年五月立國子學元帝建武元年十一月立太學明帝太寧三年詔給奉聖亭侯孔震四時祀孔子祭宜如泰始故事成帝咸康元年二月講詩通釋奠如故事三年正月辛卯立太學穆帝升平元年三月帝講孝經通親釋奠于中堂孝武帝寧康三年七月帝講孝經通釋奠如故事時以學在水南懸逺有司定議依升平元年於中堂權立行太學于時無復國子生有司奏應須復二學生百二十人太學生取見人六十國子生權銓大臣子孫六十人事訖罷奏可釋奠禮畢㑹百官六品以上十二月帝釋奠于中堂祠孔子以顔囘配時學校陵遲謝石上䟽請興復國學以訓胄子班下州郡普脩鄉校䟽奏帝納焉大元十年二月立國學又増置太學生百人十一年八月封孔靖之為奉聖亭侯奉宣尼祀後魏道武天興四年二月丁亥命樂師入太學習舞釋菜于先聖先師太武始光三年二月起太學於城東祀孔子以顔淵配太平真君十一年南伐至鄒山使使者以太牢祀孔子獻文皇興二年以青徐平詔中書令高允兼太常至兖州以太牢祭孔子廟帝謂允曰此簡徳而行勿有辭也孝文延興二年二月詔曰尼父禀逹聖之姿體生知之量窮理盡性道光四海頃者淮徐未賓廟隔非所致令祠典寢頓禮章殄滅遂使女巫妖覡淫進非禮殺生鼔舞倡優媟狎豈所以尊神明敬聖道者也自今以後有祭孔子廟制用酒酺而已不聼婦女雜合以祈非望之福犯者以違制論其公家有事自如常禮犧牲粢盛務盡豐潔臨事致敬令肅如也司牧之官明糾不法使禁令必行三年四月詔以孔子二十八世孫魯郡孔乗為崇聖大夫給十户以供灑掃太和十三年七月立孔子廟於京師十六年二月丁未改諡宣尼曰文聖尼父告諡孔子廟一云二月癸丑帝臨宣文堂引儀尚書劉昶鴻臚卿游明根行儀曹事李韶授䇿孔子崇文王之諡於是昶等就廟行事既而帝親拜祭於廟四月甲寅幸皇宗學親問博士經義十七年九月壬申幸太學觀石經十九年四月幸魯城親祠孔子廟詔拜孔氏子二人為官又詔選諸孔宗子一人封崇聖侯邑一百户以奉孔子之祀又詔兖州為孔子起園寢修飭墳壠更建碑銘褒揚聖徳六月詔求天下遺書秘閤所無有禆益時用者加以優賞宣武正始元年十一月詔曰古之哲王剙業垂統安民立化莫不崇建膠序開訓國胄宣昭三禮崇明四術使道暢羣邦風流萬宇自皇基始搆光它中區軍國務殷未遑經建靖言思之有慙古烈可勅有司依漢魏舊章營繕國學四年四月詔曰高祖徳格兩儀明竝日月播文教以懷逺人調禮學以旌儁造徙縣中區光宅東邑總霜露之所均一姬卜於洛汭戎繕兼興未遑儒教朕纂承鴻緒君臨寳厯思模聖規述遵先志今天平地寧方隅無事可勅有司准倣前式置國子立大學樹小學於四門永平三年六月詔重求遺書於天下延昌元年四月詔曰遷京嵩縣年将二紀虎闈闕唱演之音四門絕講誦之業博士端然虛禄歳祀貴遊之胄歎同子衿靖言念之有兼愧慨可嚴勅有司國子學孟冬使成大學四門年暮容令成就孝明正光元年正月詔曰建國緯民立教為本尊師崇道兹典自昔來歳仲陽節和氣潤釋奠孔顔乃其時也有司可豫繕國學圗餙聖賢置官檢牲擇吉備禮二年二月癸亥幸國子學講孝經令車騎大将軍領國子祭酒崔光執經南面百僚陪列又云孝明行講學之禮于國子寺司徒崔光執經敕常景與董紹張澈馬元興王延業鄭伯猷等俱為録義三月庚午幸國子學祠孔子以顔淵配出帝永熈三年二月丙子親釋奠禮先師詔延公卿學官於顯陽殿敕祭酒劉廞講孝經黄門李郁講禮記中書舍人盧景宣解大戴禮夏小正篇時廣招儒學引令預聽國子博士李同軌經義素優辨析兼美而不得執經深為慨恨後周明帝雅愛文史立麟趾學在朝有藝業者不限貴賤皆預聽焉乃至蕭撝王褒等卑鄙之徒同為學士大宗伯于翼言於帝曰蕭撝梁之宗子王褒梁之公卿今與趨走同儕恐非尚賢貴爵之義帝然之詔翼定其班次於是有等差矣武帝天和元年七月詔諸胄子入學但束脩於師不勞釋奠釋奠者學成之祭自今即為常式二年七月立露門學置生七十二人時辛公義為太學生帝召入露門學令受道義毎月集御前令與大儒講論數被嗟異時軰慕之宣帝大象元年詔徙鄴城石經於雒陽二年二月丁巳幸露門學行釋奠之禮三月詔曰盛徳之後是稱不絕功施於民義昭祀典孔子徳惟藏往道實生知以大聖之才屬千古之運載引儒業式叙彞倫至如幽贊天人之理裁成禮樂之務故以作範百王垂風萬乗朕欽承寳厯服膺教義眷言洙泗懷道滋深而褒成啟號雖彰故實旌崇聖績猶有闕如可追封為鄒國公邑數准舊并立後承襲别於京師置廟時以祭享隋高祖開皇二年十一月賜國子生經明者束帛三年二月詔購求遺書於天下四月詔天下勸學行禮時潞州刺史柳昻見天下無事上表請勸學行禮帝覧而善之因下詔曰建國重道莫先於學尊主庇民莫善於禮自魏氏不競周齊抗衡分四海之民鬭二邦之力逓為強弱多歴年所務權詐而薄儒雅重干戈而輕爼豆民不見徳唯爭是聞朝野以機巧為師文吏用深刻為法風澆俗敝化之然也雖復建立庠序兼啟黌塾業非時貴道亦不行其間服膺儒術蓋有之焉彼衆我寡未能移俗然共維持名教奨飾彞倫㣲相𢎞益賴斯而已王者承天休咎隨化有禮則祥瑞必降無禮則妖孽興起人禀五常性靈不一有禮則隂陽合徳無禮則禽獸其心治國立身非禮不可朕受命於天裁成萬物去華夷之亂求風化之宜戒奢崇儉率先百辟輕徭薄賦冀以寛和而積習生常未能懲革閭閻士庶吉凶之禮動悉乖方不依制度執憲之職似塞耳而無聞蒞民之官猶蔽目而不察宣揚朝化其若是乎古人之學且耕且養今者民丁非役之日農畆時候之餘若敦以學業勸以經術自可家慕大道人希至徳豈止知禮節識廉恥父慈子孝兄恭弟順者乎始自京師爰及州郡宜祗朕意勸學行禮自是天下州縣皆置博士習禮焉仁夀元年六月詔曰儒學之道訓敎生人識父子君臣之義知尊卑長幼之序升之於朝任之以職故能贊理時務𢎞益風範朕撫臨天下思𢎞徳敎延集學徒崇建庠序開仕進之路佇賢雋之人而國學胄子垂将千數州縣諸生咸亦不少徒有名録空度嵗時未有徳為代範才任國用良由設學之理多而未精今宜簡省眀加奨勵於是國子學唯留學生七十人大學四門及州縣學竝廢煬帝大業元年閏七月詔曰君民建國教學為先移風易俗必自兹始而言絕義乖多歴年代進徳修業其道浸微漢採坑儒之餘不絶如線晉承板蕩之運掃地将盡自時厥後軍國多虞雖復黌宇時建示同愛禮函文或陳亦為虗器遂使紆青拖紫非以學優製錦操刀類多墻面上陵下替綱維靡立雅缺道消實繇於是朕纂承洪緒思𢎞大訓将欲尊師重道用闡厥繇講信修睦敦奨名教今宇宙平一文軌攸同十歩之内必有芳草四海之中豈無竒秀諸在家及見入學者若有篤志好古耽悦典墳學行優敏堪膺時務所在採訪具以名聞即當隨其噐能擢以不次若研精經術未願進仕者可依其藝業深淺門䕃高卑雖未升朝竝量准給禄庶夫恂恂善誘不日成器濟濟盈朝何逺之有其國子等學亦冝申明舊制教習生徒具為課試之法以盡砥礪之道四年十月詔曰先師尼父聖徳在躬誕發天縱之姿憲章文武之道命世應期藴兹素業而頺山之嘆忽踰於千祀盛徳之美不存於百代永惟懿範宜有優崇可立孔子後為紹聖侯有司求其苗裔録以申上册府元龜卷四十九
