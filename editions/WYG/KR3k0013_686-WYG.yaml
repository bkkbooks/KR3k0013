body:
  text: 册府元龜卷六百八十六宋王欽若等撰牧守部忠第二南齊謝元邈宋明帝時為青州刺史罷州還髙帝塗中要之元邈嚴軍直過還都啟宋明帝稱髙帝有異謀髙帝不恨也梁袁昻仕齊為吳興太守東昏侯永元末義師至京州牧郡守皆望風降欵昻獨拒竟不受命髙祖手書喻曰夫禍福無門興亡有數天之所棄人孰能扶機來不再圖之宜早頃聽道路承欲狼顧一隅既未測雅懷聊申往意獨夫狂悖振古未聞窮凶極虐歲月滋甚天未絶齊聖明啟運兆民有賴百姓來蘇吾荷任前驅掃除京邑方撥亂反正伐罪弔民至止以來前無横陣今皇威四臨長圍已合遐邇畢集人神同奮鋭卒萬計鐵馬千羣以此攻戰何往不克況建鄴孤城人懷離阻靣縳軍門日夕相繼屠潰之期勢不云逺兼熒惑出端門太白入氐室天文表於上人事符於下不謀同契實在茲辰且范岫甲胄久薦誠欵各率所繇仍為犄角沈法瑀孫肹朱端已肅清吳會而足下欲以區區之郡禦堂堂之師根本既傾枝葉安附童兒牧豎咸謂其非求之明鑒實所未達今竭力昏主未足為忠家門屠滅非足為孝忠孝俱盡將欲何依豈若翻然改圖自招多福進則逺害全身退則長守禄位去就之宜幸加詳擇若執迷遂往同惡弗悛大軍一臨誅及三族雖貽後悔寧復云補欲布所懷故致今日昻答曰都史至辱誨承藉以衆論謂僕有勤王之舉兼蒙誚責獨無送欵循復嚴㫖若臨萬仞三吳内地非用兵之所況以偏隅一郡何能為役近奉敇以此境多虞見使安慰自承麾斾届止莫不膝袒軍門唯僕一人敢後至者正以内揆庸素文武無施直是東國賤男子爾雖欲獻心莫增六師之勇置其愚黙寧沮衆軍之威幸藉將軍含宏之大可得從容以禮竊以一食微施尚復投殞況食人之禄而頓忘一旦非惟物議不可亦恐明公鄙之所以躊躇未遑薦璧遂以輕微爰降重命震灼於心忘其所厝誠惟理鑒猶懼威靈歐陽頠為臨賀内史髙祖大清中侯景搆逆衡州刺史韋粲自解還都征景以頠監衡州京城䧟後嶺南互相吞併蘭欽弟前髙州刺史裕攻始興内史蕭昭基奪其郡裕以欽與頠有舊遣招之頠不從乃謂使云髙州昆季隆顯莫非國恩今應赴難援都豈可自為䟦扈後為鎮南將軍廣州刺史王琳據有中流頠自海道及東嶺奉使不絶又多致銅鼓生口獻奉珍異前後委積頗有助於軍國焉陳昕為驃騎外兵臨川太守侯景圍歴陽敇召昕還昕啟云采石急須重鎮王質水軍輕弱恐慮必濟乃板昕為雲旗將軍代質未及下渚景已渡江仍遣率所領遊防城外不得入守欲奔京口乃為景所擒景見昕殷勤固留極飲曰我至此得卿餘人無能為也令昕收集部曲將用之昕誓而弗許景使其儀同范桃棒嚴禁之昕因説桃棒令率所領歸降襲殺王偉宋子仙為信桃棒許之遂盟約射啟城中遣昕夜縋而入髙祖大喜敇即受降太宗遲疑累日不決外事發洩昕弗知猶依期而下景邀得之乃逼昕令更射書城中云桃棒且輕將數十人先入景欲裹甲隨之昕既不肯為書期以必死遂為景所害王褒為安城内史侯景䧟京城江州刺史當陽公大心舉州附賊賊轉寇南中褒猶據郡拒守大寶三年元帝徵褒赴江陵以為忠武將軍南平内史袁君正為吳興太守侯景亂率數萬人隨邵陵王赴援及京城䧟還郡王沖為南郡太守元帝鎮荆州為鎮西長史侯景之亂帝於荆州承制沖求解南郡以讓王僧辯并獻女妓十人以助軍賞帝授持節督衡桂成合四州諸軍事雲麾將軍陳周敷梁末為豫章太守是時江南酋帥並戀巢窟私署令長不受召朝廷未遑致討但羇縻之唯敷獨先入朝蕭乾為建安太守文帝天嘉二年留異反陳寶應將兵助之乾棄郡以避時閩中守宰並為寶應迫脅受其署至乾獨不從徙居郊野屏絶人事及寶應平乃出詣都督章昭達以狀表聞帝甚嘉之起授五兵尚書程靈洗為郢州刺史雲麾將軍華皎之叛也遣使招誘靈洗靈洗斬皎使以狀聞朝廷深嘉其忠增其守備給鼓吹一部因推心待之後魏崔元珍孝莊永安中為唐州刺史爾朱榮之趣雒陽也遣其都督樊子鵠取唐州元珍與行臺酈惲拒守不從為子鵠所䧟裴俠為義陽郡守元顥入雒王欽若等曰北海王顥時奔于梁梁髙祖為魏主送至雒陽俠執其使人焚其赦書孝莊嘉之授東郡太守帶防城别將辛子馥為平原相時元顥入雒子馥不受其赦刺史元仲景附顥拘子馥并禁家口孝莊反正詔封三門縣男崔庠為東郡太守元顥寇逼郡界庠拒不從命棄郡走還鄉里孝莊還宫賜爵平原伯崔巨倫為東濮陽太守元顥入雒據郡不從莊帝還宫行西兖州事封漁陽縣男楊津為定州刺史時賊帥雒周圍州城津盡力捍守及葛榮專制以司徒說津津大怒斬其使以絶之北齊髙季式為濟州刺史濮陽民杜靈椿等攻城剽野聚衆將萬人季式遣騎三百一戰擒之又陽平路文徒黨緒顯等立營栅為亂季式討平之季式兄弟貴盛並有勲於時自領部曲千餘人馬八百匹戈甲器仗皆備故能追督盜賊多致尅㨗有客嘗謂季式曰濮陽陽平乃是畿内既不奉命又不侵境有何急急遣私軍逺戰萬一失脫豈不招罪季式曰君言何不忠之甚也我與國家同安危豈有見賊不討之理且賊知臺軍卒不能來又不疑外州有救來備破之必矣兵貴神速何得後機若以獲罪吾亦無恨傅伏為東雍州刺史會周兵來逼伏出戰却之周克晉州執獲行臺尉相貴以之招伏伏不從後周張嵊初仕梁為吳興郡守時侯景䧟京城百官逃散湘東王記室叅軍姚僧坦假道歸至吳興謁嵊嵊見僧坦流涕曰吾過荷朝恩今報之以死君是此邦大族又朝廷舊臣今日得君吾事辦矣俄而景兵大至攻戰累日郡城遂䧟泉企為雒州都督為東魏將髙敖曹所攻䧟執企而東企臨發宻誡其子元禮仲遵曰吾平生志願不過令長爾幸逢遭會位亞台司今爵禄既隆年齒又衰前途夷險抑亦可知汝等志業方宏堪立功效且忠孝之道不可兩全宜各為身計勿相隨寇手但得汝等致力本朝吾無餘恨不得以我在東遂虧臣節也爾其勉之乃揮涕而訣餘無所云聞者莫不憤歎尋卒於鄴竇熾為雍州牧隋文初為相國百官皆勸進熾自以累代受恩遂不肯署牋時人髙其節隋王長述為信州總管時王謙作亂益州遣使致書於長述因執其使上其書又陳取謙之䇿帝大悦陳孝意大業末為鴈門郡丞煬帝幸江都馬邑劉武周舉兵來攻孝意拒之每致克㨗但孤城獨守外無聲援孝意執志誓以必死每遣使江都道路隔絶竟無報命孝意執志亦知帝必不反每旦暮向詔敇庫俯伏流涕悲慟左右圍城百餘日糧盡為校尉張倫所殺以城歸武周劉權大業末為南海太守甚有異政數歲遇盜賊群起數來攻郡豪帥多願推權為首權竟盡力固守以拒之子世徹又宻遣人賫書詣權稱四方擾亂英雄並起時不可失諷令舉兵權召集佐寮對斬其使竟無異圖守之以死劉子翊大業末為丹陽留守於上江督運為賊吳基子所虜子翊説之因以衆首復遣領首賊還清江遇江都之變賊知而告之子翊弗信斬所言者賊又欲請以為主子翊不從羣賊執子翊至臨川城下使告城中云江都之變子翊反其言於是見害堯君素大業末為河東通守唐髙祖義師攻之君素守不易每言及國家未嘗不歔欷嘗謂將士曰吾是藩邸舊臣累蒙奬擢至于大義不得不死今穀支數年食盡此穀足知天下之事必若隋室傾敗天命有歸吾當斷頭以付諸君也時百姓苦隋日久及逢義舉人有息肩之望然君素善為統領下不能叛歲餘頗得外口城中徵知江都傾覆又糧食乏絶人不聊生男女相食衆心離駭白虹降于府門兵器之端夜皆光見月餘君素為左右所害唐李襲志初仕隋歴始安郡丞大業末江外盜賊尤甚襲志散家産召募得三千人以守郡城後聞江都之變人勸襲志曰公累葉冠族久臨鄙郡蠻夷畏威士民悅服雖曰隋臣實我之君長今江都簒逆四海鼎沸主號者非止一人公宜因此時據有嶺表則百越之人皆拱手向化追蹤尉佗亦千載一遇也襲志厲聲曰吾世樹忠貞見危授命今雖江都䧟没而宗社猶存當與諸君戮力中原共雪讐恥豈可怙亂稱兵以圖不義吾寧蹈忠而死不為逆節而求生尉佗愚鄙無識何足景慕於是欲斬勸者從衆議而止皇甫無逸隋末留守雒陽及江都之變與叚達元文都尊立越王侗為帝及王世充作難無逸棄老母妻子斬關而走追騎且至無逸謂之曰當與汝死戰吾頭何可得也鄭元璹隋末為文城郡守髙祖起義太原遣將張綸西略地至文城元璹堅守不下攻㧞其城擒致軍門及平京城拜太常卿授上柱國常達武德初為隴州刺史為薛舉所擒達辭色抗厲不為之屈舉指其妻謂達曰識皇后不達曰止是癭老嫗何足識竟釋之李元通武德初為定州總管為劉黑闥所擒黑闥重其才欲以為大將元通歎息曰吾荷朝恩作藩東夏孤城無援遂䧟虜庭當守臣節以忠報國豈能降志輙受賊官拒而不受故吏有以酒食餽之者元通曰諸君哀吾困辱故以酒食來相寛慰吾當為諸軍一醉遂與樂飲謂守者吾能劒舞可借吾刀守者與之及曲終大息而言大丈夫受國恩鎮撫方面不能保全所守何面目視息世間哉因潰腹而死髙祖聞之為之流涕拜子伏護為大將軍吕子臧武德初為鄧州刺史賊朱粲圍城遇霖雨城壁皆壞所親者知城必䧟固勸其降子臧曰安有天子方伯降賊者乎於是率其麾下赴敵而死俄而城䧟劉政會武德初為太原留守劉武周進逼并州晉陽豪右薛深等以城應賊政會為賊所擒于賊中宻表論武周形勢事平復其官爵髙叡聖歴中為趙州刺史時突厥黙啜寇州長史唐波若將以城降賊叡不能禁止乃於㕔事自縊不死黙啜逼令誘説趙州属縣叡抗節不顧遂為賊所害則天聞而嘉之贈冬官尚書諡曰節楊元琰長安中為荆州長史與張柬之交代泛舟江中流言及則天革命諸武擅權之狀發言慷慨有恢復之意後入為右羽林將軍與柬之誅二張立中宗李京𤣥宗天寶末為饒州太守時禄山反攻饒陽京憂迫無計遂投火而死顔杲卿天寶末為常山太守時安禄山反賊將蔡希德攻䧟常山杲卿及長史袁履謙並為賊所害杲卿晉陵人也少以吏幹稱禄山奏為常山太守及禄山反杲卿與長史袁履謙前真定令賈深内邱丞張通幽宻謀開土門以背之時賊將李歸仁令弟欽湊領步騎五千鎮土門而隸於常山杲卿遂謀誅欽湊乃召欽湊赴郡會議因殺之以并其兵會賊將髙邈何千年俱自東京至杲卿設䇿遣藁城尉崔安石與縣吏翟萬德潛縳之安石遂與萬德伏兵於驛生擒千年及邈致于杲卿杲卿使其男泉明與賈深張通幽執邈千年及欽湊之首獻於京師帝大喜以杲卿為衛尉卿兼御史中丞袁履謙為常山太守賈深為司馬是時河北十五郡皆殺賊官吏以歸國禄山聞有變乃遣其黨史思明蔡希德以平盧步騎五千攻常山杲卿力屈城䧟思明執杲卿送于禄山祿山怒縛於雒水橋柱支解之杲卿詬詈之聲至死不屈履謙亦同時遇害履謙性剛狷詬賊尤甚賊忿之先截其舌履謙以口血噴其賊面賊臠割之路人皆不忍視李遵天寶末為彭原太守時肅宗幸靈武至烏氏頓遵至謁見進奉衣服器械􅓵糧以助軍顔真卿天寶末為平原太守安祿山乘虛遣史思明尹子奇急攻河北諸郡饒陽河間景城樂安相次䧟沒獨平原清河博平三郡城守然人心危盪不可復振真卿乃歴江淮荆㐮朝於鳳翔授憲部尚書崔光遠天寶末為京兆尹時肅宗在靈武光遠領長安縣令蘇震并府縣官属十餘人於京西市號令百姓召能從靈武郡者百餘人其日出城西門歸順袁光庭天寶末為伊州刺史禄山之亂西北邊戍兵人赴難河隴郡邑皆為吐蕃所㧞惟光庭守伊州累年外救不至虜百端誘説終不降屈部下如一矢石既盡糧儲將竭城將䧟沒光庭手殺其妻自焚而死薛雄代宗大歴中為衛州刺史魏博節度田承嗣誘為亂雄不從承嗣遣刺客盜殺之康日知德宗建中中為趙州刺史會成德軍節度李寶臣卒其子惟岳謀有父位詔幽州節度朱滔討之日知遂以州順命姚況建中末為涇原節度判官時節度使姚令言奉詔率兵赴關東以況知州事以兵馬使馮河清知兵馬留後及令言至京師所統兵叛徳宗幸奉天况與河清聞之乃集三軍大哭因共激勵將吏誓敦忠節衆頗義之即時發甲仗器械車百餘兩連夜送行在所時駕初遷幸六軍雖集蒼黄之際都無戎器及涇州甲仗至軍士大振特詔褒其誠効拜況兼御史中丞行軍司馬河清四鎮北庭行軍涇原節度使兼御史大夫韋臯建中末為鳳翔判官權知隴州留後事時涇師犯闕德宗幸奉天鳳翔兵馬使李楚琳殺節度使張鎰以府叛歸於朱泚先是泚留范陽戍卒五百人於隴州舊將牛雲光將之是時雲光將欲謀亂擒臯以應泚臯將翟曄同知之白臯為備雲光知事泄遂率其兵以奔行及汧陽遇泚家童蘇玉將使于臯以臯為御史中丞乃相率却過隴州乃云臯恭承命即吾人也如不受命彼書生可以圖子事無不濟矣及反斾疾趨隴州臯迎勞之先納蘇玉受其偽命乃問雲光曰始不告而去今又來何也雲光曰前未知公心故潛去知公有新命今乃復還願與戮力定功同其生死臯曰善又謂雲光曰大使茍不懷詐請納器甲使城中無所危疑衆乃可入雲光以書生待臯且以為信然乃盡付弓矢戈甲臯既受之乃内其兵明日臯犒宴蘇玉雲光之卒於郡舍伏甲於兩廊酒既行伏發盡誅之斬雲光蘇玉首以狥泚又使家僮劉海廣以臯為鳳翔節度使臯斬海廣及從者三人生一人使報泚乃遣從父兄平翕繼入奉天城中聞臯有備士氣增倍臯乃築壇于庭血牲與將士盟曰上天不弔國家多難逆臣乘間盜據皇宫而李楚琳亦扇兇徒傾䧟城邑酷虐所加爰及本使既不事上安能恤下臯是用激心憤氣不遑底寧誓與群公竭誠王室凡我同盟一心竭力仗順除兇祖先之靈必當幽贊言誠則志合義感則心齊粉骨塵軀決無所顧有渝此志明神殛之迨於子孫亦罔遺育皇天后土當鑒斯言又使人通于吐蕃以求助朱泚既滅授左金吾將軍兼禮部尚書尋遷大將軍張建封建中末為夀州刺史時淮西節度李希烈稱兵擒李元平擊走劉德信唐漢臣等又摧破哥舒曜於㐮城連䧟鄭汴等州李勉棄城而遁鑾駕又幸奉天賊兇威益盛淮南陳少遊且使使交通希烈希烈僭稱偽號改元遣將楊豐賫偽赦書二道送少遊及建封豐至夀州建封乃令擒縳豐號令軍州適會中使自行在及使江南廻者同至建封乃令引楊豐對中使斬之于通衢封偽赦書送行在逺近震駭陳少遊聞之既怒且懼建封遂奏少遊與希烈往來事狀希烈偽署其黨杜少成為節度令先平夀州然後赴江都建封遣將賀蘭元均邵怡等守霍丘栅少成竟不能侵軼乃南掠蘄黄等州崔造建中末為建州刺史涇原叛造聞難作檄馳隣州請齊舉兵遂調發所部得二千人抗表上聞朝廷嘉之及京師收復詔徵造至藍田自以源休之甥上疏請罪不敢即赴闕德宗以為有禮優詔慰勉作吏部侍郎李紓建中末為同州刺史德宗幸梁州紓亦棄州詣行在拜兵部侍郎髙承簡貞元中為宋州刺史時汴州反逐其帥因以部將李㝏行帥事㝏遣其將持記責宋州官私財物承簡執而囚之自是汴使來輙繫之一日并出斬于衙門之外威震郡中及㝏兵大至宋州凡三城賊已䧟南一城承簡保北兩城以拒屯十餘戰會徐州救兵出㝏為汴將李質執之傳送京師兵圍㝏即遁去承簡拜簡校左散騎常侍兖海沂宻等州節度觀察處置等使崔從憲宗元和初為興元推官知邛州事劉闢竊據西川以兵逼從歸附從訓卒設備以一邛抗禦之杜慆懿宗咸通末為泗州刺史時桂林戍卒龎勲等為亂擁衆還徐至泗州令悉攻之遣牙將李員入城見慆曰留後知中丞名族不敢令軍士失禮但開城門令百姓存活無相疑也慆執而殺之後唐張憲莊宗同光末為太原尹時趙在禮入魏州憲家屬在魏關東俶擾在禮善待其家遣人賫書至太原誘憲憲斬其使書不發函而奏王思同明宗長興末為京兆尹兼西京留守潞王鎮鳳翔與之隣境及潞王稟朝㫖致書于秦涇雍梁邠諸帥言賊臣亂政属先帝疾篤謀害秦王迎立嗣君自擅權柄以至殘害骨肉揺動藩垣懼先人基業忽焉墜地故誓心入朝以除君側事濟之後謝病歸藩邸素貧兵力俱困欲希國士共濟艱難乃令小伶安十十以五絃伎見思同因勸諷動又軍校宋審温者請使於雍若不從命即獨圖之又令推官郝昭府吏朱延乂以書檄起兵會赴部署樂彦稠至方宴而妓使適至乃繫之獄彦稠請誅審温拘送昭赴闕思同已遣其子入朝言事朝廷嘉之乃以思同為鳳翔中行營都部署晉李瓊髙祖天福中為潁州刺史遇楊光逺以青州叛綂本部兵攻其郡城且以書誘瓊瓊固拒之以書上進朝廷嘉之冊府元龜卷六百八十六
