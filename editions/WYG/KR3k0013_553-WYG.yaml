body:
  text: 册府元龜卷五百五十三宋王欽若等撰詞臣部獻替謬誤稽緩獻替第二唐韋處厚穆宗時為翰林學士中書舍人時張平叔以便佞詼諧他門㨗進自京兆尹為鴻臚卿判度支不數月宣授户部侍郎平叔以征利中穆宗意欲希大任以㩁鹽舊法為弊年深欲官自糶鹽可富國彊兵勸農積貨疏利害十八條詔下其奏令公卿議處厚抗論不可以平叔條奏不周經慮未盡以為利者反害以為簡者至煩乃取其條目尤不可者發十難以詰之時平叔傾巧有恩自謂言無不允及處厚條件駁奏穆宗稱善令示平叔平叔詞屈無以答其事遂寢處厚以㓜主荒怠不親政務既居納誨之地宜有以啟道性靈乃銓擇經義雅言以類相從為二十卷謂之六經法言獻之錫以繒帛銀器仍賜金紫以憲宗實錄未成詔處厚與路随兼充史館脩撰實録未成許二人分日入内仍放常參處厚俄又權兵部尚書敬宗即位李逢吉用事素惡李紳乃搆成其罪禍將不測處厚與紳皆以孤進同年進士心頗傷之乃上疏曰臣竊聞朋黨議論以李紳貶黜尚輕臣受恩至深職備顧問事闗聖徳不合不言紳先朝奬用擢在翰林無過可書無罪可戮今羣黨得志䜛嫉大興詢扵人情皆甚歎駭詩云萋兮菲兮成是貝錦彼譖人者亦已太甚又曰䜛言罔極交亂四國自古帝王未有逺君子近小人而致太平者又古人云三年無改扵父之道可謂孝矣李紳是前朝任吏縦有罪愆陛下尤宜洗釁滌瑕念舊忘過以成無改之美今逢吉門下故吏遍滿朝行侵毁加誣何詞不有所貶如此猶謂太輕盖曾參有投杼之疑先師有拾塵之戒伏望陛下斷自聖慮不惑姦邪則天下幸甚建中之初山東向化只縁宰相朋黨上負朝廷楊炎為元載復讐盧杞為劉晏報怨兵連禍結天下不平伏乞聖眀察臣愚懇帝悟其事紳得減死貶端州司馬處厚正拜兵部侍郎謝恩扵思政殿時昭愍狂恣屢出畋逰每月坐朝不三四日處厚因謝恩従容奏曰臣有大罪伏乞面首帝曰何也處厚對曰臣前為諫官不能先朝死諫縦先聖好畋及色以至不夀臣合當誅然所以不死諫者亦為陛下此時在春宫年已十五今則陛下皇太子始一嵗矣臣安得更避死亡之誅帝深感悟其意又山南東道節度牛元翼家悉為鎮州節度王庭凑所害敬宗既聞元翼一家無辜併命深歎宰輔之無才致使姦兇久未率化處厚因上疏曰臣聞汲黯在相淮南不敢謀反干木在魏諸侯不敢加兵王霸之理皆以一士而止百億之師以一賢而制千里之難伏以裴度勲髙中夏聲播外夷庭湊克融皆憚其用吐蕃回鶻悉服其名今若置之巖廊委其叅決西夷北虜未測中華河北山東必稟廟筭况幽鎮未静尤資重臣管仲曰人離而聽之則愚合而聽之則聖理亂之本非有他術順人則理違人則亂伏承陛下當食歎息恨無蕭曹今有一裴度尚不留驅策此所以馮唐感悟漢文雖有廉頗李牧不能用也夫御宰相當委之信之親之禮之扵事不効扵國無勞則置之㪚寮黜之逺郡如此則在位者不敢不勵將進者不敢茍求陛下存終始之分但不永棄則君臣之厚也今進皆負四海責望退亦不失六曹尚書不肖者無因而勸臣與逢吉素無私嫌臣被裴度無辜貶官今之所陳上答聖眀下答羣議披肝感激伏地涕流伏乞鑒臣愛君矜臣體國則天下幸甚初度為逢吉所排至是復兼相任皆處厚與李程内以公議贊成寳厯元年四月冊尊號禮畢大赦天下是時幸臣李逢吉與端州司馬李紳不叶所撰赦文但云左降官已經量移者宜與量移不言未量移者盖欲使紳不霑恩例也處厚上疏曰伏見赦文節目中新左降官不該恩澤大宥之體有所不𢎞臣竊聞物議皆言逢吉恐李紳量移故有此處置若如此則應是近來流貶官因李紳一人皆不得量移事體至大豈敢不言李紳先朝奬任曾在内庭自經貶官未蒙恩宥古人云人君當記人之功忘人之過管仲拘囚齊桓舉為國相冶長縲絏仲尼選為宻親有罪宜猶蕩滌無辜豈可終累况鴻名大號册禮盛儀天地百靈之所鑒臨億兆八紘之所瞻戴恩澤不廣實非所宜臣與逢吉素無讎嫌與李紳且非親黨所論者全大體所陳者存至公伏乞聖恩察臣肝膈儻蒙允許仍望宣付宰臣應近年左降官並編入赦條令准舊例得量移近處帝覽奏深悟其事乃追赦文令添改繇是紳得移為江州長史髙鉞為翰林學士敬宗初遷中書舍人學士如故謝恩扵思政殿因諫帝以求治莫若躬親用示憂勤之旨也帝嘉深納其言栁公權文宗太和中為中書舍人翰林書詔學士文宗因便殿對六學士語及漢文恭儉帝舉袂曰此澣濯者三矣學士皆贊詠儉徳唯公權無言帝留而問之對曰人主當進賢良退不肖納諫諍眀賞罰服澣濯之衣乃小節耳時周墀同對為之股慄公權詞氣不可奪累遷諫議大夫工部侍郎學士如故開成中嘗入對帝謂之曰近日外議如何公權對曰自郭旼除授邠寧物議頗有臧否帝曰旼是尚父之従子太皇太后之季父在官無過自金吾大将軍授邠寧小鎮何事議論耶公權曰以收勲徳除鎮攸宜人情議論者言旼進二女入宫致此除拜此事信乎帝曰二女入宫參太后非獻也公權曰瓜李之嫌何以户曉因引王珪諫太宗出廬江王妃故事即令南内使張日華送二女還旼公權忠言裨益皆此類也韋澳大中中為翰林學士承旨與同僚蕭寘深為宣宗所遇二人同直無不召見詢訪時事每有邦國刑政大事中使傳宣草詞澳心欲論諫即曰此一事須降御札方敢施行遲留至旦必論其可否帝多従之李蔚為翰林學士承旨禮部侍郎懿宗咸通十二年賜安國寺講唱僧重謙僧承澈沉檀木講經唱經座各一仍設萬人齋蔚以帝造寺捨施不已上疏曰臣聞孔丘聖者歟言則引周任之言符融賢者也諫必憑王猛之諫事求師古詞貴達情臣伏覩陛下自纂帝圖克崇佛事止當脩外未堪得中今歴採本朝名臣有忠直裨扵上者輙思陳叙以補聖眀臣聞天后時曾營大像功踰百萬狄仁傑上疏云夫寳鉸殫于綴飾環材竭于輪奐功不使鬼必在役人物不天來皆従地出非損百姓將何以求生之則有時用之則無度臣每思維實所悲痛其如徃在江表像法盛興梁武簡文捨施無限及至二淮沸浪五嶺騰烟列刹盈衢無救危亡之禍緇衣蔽路豈有勤王之師况近年以來風塵屢擾水旱不節征役稍繁必若多費官錢又苦人力一隅有難將何救之此切當之言一也中宗時公主外戚皆奏度僧姚崇奏曰佛不在外求之扵心佛圖澄最賢無益扵趙羅什多藝不救扵秦何充符融皆遭敗滅齊襄梁武未免災殃但發慈悲行利益事使蒼生安樂即是佛身此切當之言二也睿宗為金仙玉真公主造大觀辛替否諫曰自夏已來淫雨不解穀荒不壟麥爛于場入秋已來亢旱成災苗而不實霜損蟲暴草萊枯黄下人咨嗟未知賙賑今陛下愛兩女為造兩觀燒磚運木載土填沙道路流言皆云計用錢百萬餘貫伏惟陛下聖人也逺無所不知陛下眀君也細無所不見既知且見知倉有幾年之儲庫有幾年之帛知百姓之間可存活乎三邊之士可轉輸乎當今發一卒以禦邉陲遣一兵以衛社稷多無衣食皆帶飢寒賞賜之間逈無所出軍旅驟敗莫不繇斯而乃以百萬貫錢造無用之觀以賈六合之怨以違萬人之心乎此切當之言三也又諫造寺曰夫釋教以清净為基以慈悲為主故嘗體道以濟物不利欲以損人每去已以全眞不營身以害教今三時之月築山穿池損命也殫府虚帑損人也廣殿長廊營身也損命則不慈悲損人則不濟物營身則不清净豈大聖至仁之心乎經曰一切有為法如夢幻泡影如露亦如電臣以為減琱琢之費以賑貧人是有如來之徳息穿掘之苦以全昆蟲是有如來之仁罷營葺之直以給邊陲是有湯武之功廻不急之禄以購清廉是有唐虞之理陛下緩其所急急其所緩親未來而疎見在失眞實而冀虚無重俗人之所爲而輕天子之功業臣實痛之此切當之言四也臣觀仁傑天后髙宗朝上公也元崇先天開元中賢哲也替否中宗睿宗時直臣也每覽斯文則未嘗不廢卷長歎而感慕之臣幸居近侍叨職貳卿胷臆之間雖寡秋毫之智肺腸之内厚㴠春露之濡既自昧讜言又不稽故事靦顔順旨其何以安願廻日月之眀少鑒芻蕘之欵帝循省加歎竟未能罷其事後唐趙鳳同光中為翰林學士莊宗命劉皇后拜張全義為養父后傳教令草謝全義書鳳以國后無拜人臣為父之禮乃宻上疏陳其失曰臣叨被睿慈獲親宻勿在可言之地居掌誥之司其或事異常規禮關草創程式先謀扵國輔封章然貢扵天聰庶顯公忠免貽錯失今月九日中宫傳命令修張全義書題將行父事之儀有玷君臨之道既行文翰難决否臧奉行則罔叶國經違命則恐虧臣節遂修記事取則宰臣貴動合扵楷模期永垂為規範以兹奉職庶顯致君臣聞覆萬物者天載萬物者地非聖主無以體乾道非賢后無以法坤儀百代攸同二儀無改伏惟陛下恢張九五統馭𤣥黄外設明廷内崇陰教言動而華夷知仰弛張而幽顯欽承張全義雖位極扵王公而名不離扵臣校承陛下曲旨受皇后重儀致紊􅂜章不防輿議臣又聞纂洪基者真主行直道者忠臣不可務一時之緘蔵失久長之體制得不恭陳手疏罄露血誠庶裨益扵神聰免隳弛扵王度伏乞皇帝陛下俯容狂瞽動畏簡書時開睿敏之懐永守文眀之訓使聖后式全其内則元臣可保扵令圖永揚日月之光載理乾坤之體臣職叨侍従名忝論司儻避事以不言是偷安而冒寵疏奏帝雖嘉其直誠而劉后己拜全義追改無及劉贊為比部郎中知制誥眀宗天成二年八月贊上言曰臣聞信者使民不惑義者使民知禁非信無以彰眀徳非義無以顯聖猷此乃三代英風百王令則伏惟陛下恭臨寳位䖍紹鴻圖握金鏡而炤萬方運璇璣而調四序遐敷至徳廣納忠言凡列周行許陳封事雖皆聽覽而尚寡依行縱所依行亦未遵守自此或有益國利人之術除姦去弊之謀可以擇其所長便為永制仍乞特頒詔令峻立條章豈唯示信義扵域中抑亦振威風扵海内既遵法度必致治平張文寳為中書舍人天成二年十一月文寳上言曰廵狩省方唐虞之舊典弔民伐罪湯武之前功陛下親統􅆛貅盡除梟獍刷盪瑕穢殄息氛埃天威已震扵華夷濡澤又沾扵幽顯動植蘓泰遐邇歡康所宜旋軫神都凝旒紫禁居中土而表正來萬國以均輸允叶億兆之心共樂雍熙之化于嶠為户部員外郎知制誥天成二年嶠上言請邉上兵士起置營田斆趙充國諸葛亮之術庶令且戰且耕望致輕徭三年嶠又上言曰有國有家既定君臨之位無偏無黨方眀王者之心茍少虧扵同軌同文則㣲損扵盡美盡善竊知河朔令録須俟本道薦揚朝廷就加其命况今萬國諸侯猶請行而貢職豈使一方令長獨端坐以邀官未敦革故之風深缺維新之化覩兹闕政敢貢直言乞宣付中書委扵銓管此後並従常調七月嶠上言曰協和萬邦眀主所以安社稷平章百姓哲后所以懐黎民将延七百載之洪基須安億兆衆之黔首臣幸遇聖眀之代敢傾愚直之誠伏以朝廷先有指揮今年不更通括苗畝宣従特旨頒作􅄎恩且屬夏秋已來霜雨頻降在山川髙土則必有豐年想藪澤下田非無水沴脱或已作潢汙行潦猶徴青苗地頭不唯損邦國風化兼恐傷天地和氣儻或皇帝陛下念兹狂直哀彼災祥特扵淹浸之田别示優隆之澤重委鄉村父老通括不令州縣節級下鄉如或檢騐不虛即日蠲減租稅或有司以軍糧未濟兵食是虞即請却扵山川之田豐熟之地或扵麻畦稈草蠶鹽地頭據其本分價錢折納諸色斛㪷所謂公私俱濟苦樂皆均捨其短以従其長將有餘而補不足臣毎因急務方敢上言前後所奏十件有司未行一件伏乞陛下念臣苦思察臣盡心或可施行不令停滯晋程遜初仕後唐為中書舍人上言以民間機織多有假偽虚費絲縷不堪為衣請下禁止庶歸朴素後為翰林學士與學士和凝張厲等上十三事其一前代帝王親觀風俗訊民利病其後不暇親行亦遣使廵行風俗唐朝扵十道置採訪使一員請如舊制亦冀民病蘓舒其二天成已來久不括田自水旱累年民户疾苦不均今嵗夏秋或稔扵常嵗請行檢括庶獲均輸其三中原邊土率多閒田可令近下軍都興起屯田舊時銅冶鐵冶亦令軍人興置不費扵民其四人君求理欲廣視聽須羣臣上言然則人才有短長智畧有能否其扵聽用之間乞留睿鑒伏恐失人其五朝野官吏人數衆多若不行黜陟之科何以察其能否望准考課令凡中外官嵗終校考以行進退其六古人得位相讓所冀不掩賢能得其髦俊請依建中故事羣官受命後舉人自代其七治道既知損益務實去華伏見自中興以來或扵邉境權立州縣名目戶口不多虚張吏員枉費禄食其權置名目望一切停省以賑邊軍臣伏見徐宿州管内有泗濱院徐山院市丘院白土務所管人户共數千家請罷廢名額其户稅請還州縣其八請止㳺惰勸農桑減冗食之員停不急之務其九君上置諫諍之官此期聞過况聞官給諫紙虚佇讜言時政有所不便請諫官陳論詔書有所依違請給事中封駁其十國朝承平時諸監鑄錢不輟尚不能給今國家所鑄絶少而市人銷錢貴賣銅器累行止絶尚未知禁伏乞嚴下條法其銅除鏡鞍轡􅆎帶外不許市賣銅器犯者以贓論其十一沿邊鎮戍請眀斥堠習戰陣謹烽候令夷狄知懼戰必有功其十二每年給㪚蠶鹽不敷斤兩雜之以硝土請給散之時命清强官止絶其十三伏聞闗西河東人民飢饉殍殕者多其城市鄉村積粟之家望令官司通指姓名俾令出糶以濟饑民中書門下覆奏程遜等十三事其置採訪使難擇公清之吏却生僥倖之門問疾苦則未能勞供須則轉費况刺史廉使自合訪求不勞别置其累年水旱欲與檢田以均勞逸今年夏苖已多災旱秋稼今未及時請下三司可否聞奏其屯田治務興造之初所費不少今國力未辦可俟他時其受官舉代劉鼎近已上聞其餘九件並可施行擇良善為心腹羣官書考併省州縣止㳺惰勸耕桑諫官論事給事封奏斷用銅器邊城習武備差官㪚蠶鹽均糶以濟饑民等事詔曰程遜等所陳時務並闗王道兼雜霸圖益國利民無所不至成仁去害悉在其間救時病以良多比忠言之更切封駁詔勑尤可施行餘據事條下所司周張昭逺初仕後唐為都官員外郎知制誥眀宗長興元年昭逺奏古者聖帝眀王愛民恤物先要察其利病愍其凶災既黈纊以垂旒難家至而户曉其間疾苦安測細㣲臣每見諸處奏報今春已來穀價絶賤如聞梁益抱聊生之歎登萊有餓殍之人方當盛眀深不宜稱臣必恐下民疾苦理道未周長吏既不上聞百姓無繇自訴蔵姦積弊威福臨人僻郡逺藩慘舒自我茍無廉問何表雍熙竊觀本朝二十聖之規模三百年之基構事皆師古政在安民一嵗不登則命輶軒之使三農或匿則覃蠲賑之恩所以國祚延長生靈推戴上布穆清之化下無愁歎之聲詢扵舊章其道猶在唯聖主行之臣請依本朝舊事選擇郎官御史清强幹事者每嵗分行天下宣問風俗求瘼懲違凡人間疾苦巨細盡許上聞朝廷詳其利害則皇風逺洽貪吏革心庶㡬眀時盡除弊政疏奏不報和凝初仕後唐末帝清泰二年為翰林學士上言當貞觀之朝則廣開醫學及開元之代則親制方書爰在眀朝宜遵故事方今暄熇在近疫癘是虞言念軍民宜加軫閔其邉逺戍卒及貧下農人既難息扵苦辛或偶縈扵疾疹地僻既無藥物家貧難召醫師遂致疾深多罹物故荷戈執耒皆展力扵當年問疾賜醫宜覃恩扵此日其諸處屯戍兵士令太醫署修合傷寒時氣瘧痢等藥量事給付大軍主掌以給有病士卒之家百姓亦准醫疾令合和藥物救其貧户兼請依本朝州置醫博士令考尋醫方合和藥物以濟部人其御制廣濟廣利等方書亦請翰林醫官重校定頒行天下王易簡仕晋為中書舍人天福三年易簡進漸治論曰臣聞天地之道起扵漸夫天之髙畜雷霆之威雨露之恵覆扵萬物必従漸而生以地之厚負江海之滋淮濟之潤載扵萬物亦従漸而長况人者無天之功乏地之力勞方寸之心豈可急速而治天下也惟我后膺圖履運握鏡臨人藴勤儉之風秉𢎞厚之徳内無躭翫外絶奢華信任股肱委仗將帥自有仰成之化固多定亂之功今者所以尚撓聖懐親勞御札者何直以庫蔵稍虚士卒微惰使天威之莫震令王化之未敷此則非臣下之無謀豈君上之有過盖承偽廷之困弊遇數嵗之亂離今國家宜静以圖功不可躁而取失或欲急徵暴歛則百姓愈逃或以峻法嚴刑則三軍益叛莫若制治扵未亂求安扵未危者也凡止亂危者應上𤣥則以好生惡殺為心接諸侯則以含垢匿瑕為念夫如是即水旱無繇而興干戈何門而動也考諸政教則禮樂咸在刑賞具存任四輔提其綱遣百司舉其目必見梯航常貢士馬日精所謂强其榦而弱其枝深其根而固其蔕扵是天地有清和之氣星辰無謫見之災可以薄賦恤萬民足以虚懐馭羣后或思正名于中夏問罪扵殊方人皆同心兵必戮力寰區既定帝道自隆躋元首為睿聖之君列四輔作賢眀之相主則社稷無患臣則子孫永安此則顯漸之功見治之驗矣勑王易簡手演王言心資帝業當開創之運以逺大而論天不能蹙變四時地不能躁成萬物况當革夏盡已従周化未可以驟行事只宜扵漸治不疾而速其在兹乎所貢論宜付史館竇貞固仕晋為翰林學士中書舍人天福三年貞固奏曰臣伏覩先降御札令文武百僚各進封事臣聞舉善為眀知人則哲聖君在位藪澤莫有扵隱淪昭代用才政理自無扵紊亂求賢若渴従諫如流鄭所以譽子皮魯所以譏文仲為國之要進賢是先庶遵理治之風宜舉仁人之器臣今欲請降勑命指揮文武百寮每一司之内共集議商㩁一士奏薦述其人有某能某解堪為某官某職便請朝廷據奏薦任用若能符薦果為當才即請量加奨賞或有乖共舉兼渉狥私亦請量加殿罰所貴官繇徳序位以才昇三人同行尚聞擇善十目所視必不濫知臣職在論思位叅近侍每謝匪躬之節常慙濡翼之譏將贖貪功聊陳狂狷勑曰進賢受賞備有前文得士則昌斯為急務竇貞固名㕘閨籍職在禁庭貢章疏以傾心請班行而薦士扵可否之際分賞罰之科所貴當人無或曠職今後宜許文武百寮扵縉紳之内草澤之中知灼然有才器者列名以奏納其章疏記彼姓名否臧盡達扵予懐用捨免私扵公議仍付所司李詳為中書舍人上疏曰臣聞除舊布新故順天而設教惟名與器不假人以樹恩所以示㝢縣之至公所以仰朝廷之大柄今則既逢英主未革前蹤是敢聊舉一端輕塵四逺酌其損益幸補涓埃伏覩南衙兩班内庭諸局或有不文不武非舊非勲論伎術則罔有所長語才行則罕聞其異但思月限以冒官常俾五細以在庭使四方而何則有虚華級仍蔭私門忝營更及扵子孫禄利徒銷于府庫况今方興戎事久困生民顧無用之官寮具員無闕計有限之財力帑蔵正虚若不去留定成耗蠧伏望畧加澄汰稍辨幽眀則支分或減扵殷憂内外庶成扵通濟又覩十年已來肆赦頻降諸道職掌一例奬酬藩方不守扵規程奏薦罔論其髙下僕𨽻則動逾數百絲綸則皆示特恩所以倉塲管鑰之㣲人曹局簡札之小吏至扵伶倫賤類洒掃庸奴初命便假扵貴階銀章青綬拜賜遽披扵法服牙笏紫袍乃致貴賤不分寵榮濫被雖雷雨作解渥澤恐遺扵萬物而衣裳在笥貞規何法扵百王此後或有􅄎恩應諸道職員主兵將校外其衙前職列伏乞眀示條章俾循事體節度州只許奏都押衙都虞侯教練使客將孔目官及有朱記大將十人仍取上名友郡則只許薦都押衙都虞侯孔目官其諸色人並委本道量轉職次則得之者感恩有異受之者與衆稍殊寰區仰天子之尊藩后知王澤之貴名器之重治亂是資伏惟陛下俯廻宸覽畧炤愚衷勿為小善不行勿謂舊弊難改失之在漸謀之在初倘或因此留神自可觸類而長宰臣奏李詳才光鳳閣志奉能圖聰眀有作誥之方名器無假人之理以兹留意爰具上章乃是大綱且非小善既叶聖人之教可嘉君子之言所奏節度刺史州衙前職員等事望賜施行従之竇儼世宗顯徳末為翰林學士上疏曰臣伏覩御札應内外臣寮有所見所聞並許上章議論者臣菲才寡識備位曠官仰承綸綍之言聊貢芻蕘之說其一曰伏以設官分職授政任功欲為政之有倫在命官之無曠今朝廷多士省寺華資無事有員十乃六七止扵計月待奉計年待遷其中廉幹之人不無愧恥之意如非厯試何展公才伏請改兩畿諸縣令及外州府五千户上至縣令為縣大夫昇為從五品下畿大夫見府尹亦如令之儀其諸州府縣大夫見本部長官如賓従之禮郎中員外郎起居補闕拾遺侍御史殿中侍御史監察御史光禄少卿以下四品太常丞以下五品等並得衣朱紫為之滿日當在朝一任約舊官遷二等自拾遺監察除授廻日即為起居侍御史中行員外郎若前官不是三署即罷後一年方得求事如此則士大夫足以陳力賢不肖無以駕肩各繋否臧眀行黜陟利民益國斯實良規其二曰為國為家之方守穀守帛而已二者不出扵國而出扵民其道在天其利在地得其理者蕃阜增積失其理者耗嗇燋勞民之顓蒙宜有勸教伏請扵齊民要術及四時纂要韋氏月録之中采其闗扵田蠶園圃之事集為一卷下三司彫木版廣印頒下諸州流布民間疏奏雖不即行物議韙之謬誤夫履赤墀之塗居青𤨏之署掌惟行之令代如絲之言必須兼資才識精練典故極其思慮以奉攸司乃有失稽古之意違詳審之理或叙述漏略或髙下非宜既不切扵事機且有辱扵綸命四禁之制斯為重焉至扵黜免亦自述爾後魏道武天興初姚興侵晋襄陽戍戍將郗恢馳使乞師扵常山王遵遵以聞帝詔御史中丞崔逞與裴衮為遵書以答初恢與遵書云賢兄虎歩中原帝以言悖君臣之體勑逞衮亦貶其主號以報之逞衮乃云貴主帝怒曰汝貶其主答乃稱貴何若賢兄也遂賜死孝文時蠕蠕國有䘮帝遣中書監髙閭為書與之不叙凶事帝謂曰卿為中書監職典文詞所造音書不論彼之凶事若知而不作罪在灼然若情思不至應謝所任閭遂引愆免冠謝罪唐徳宗興元元年杜佑自饒州刺史除嶺南節度使時帝在山南朝廷故事報政徃往遺脫舊嶺南節度常兼五管經略使佑獨不兼故五管不屬嶺南自佑始也貞元三年二月謚大行皇后王后為昭徳皇后詔兵部侍郎李紓為謚册文既進帝以紓之文謂皇后為大行皇后非也留中不出復詔翰林學士吳通𤣥為之通𤣥文云咨后王氏議者亦以為非案貞觀中岑文本撰文徳皇后謚册曰皇后長孫氏斯得之矣十一年五月以宣武軍節度支度營田汴宋亳頴觀察留後汴州刺史兼御史大夫李萬榮為宣武軍節度副大使知節度事兼管内支度營田汴宋亳頴觀察使依前兼御史大夫又以招義軍節度支度營田澤潞州大都督府左司馬知府事兼御史大夫王䖍休為潞州大都督府長史昭義軍節度副大使知節度事管内支度營田澤潞磁邢洺觀察使依前兼御史大夫以朔方留後李欒為靈州大都督府長史朔方靈鹽豐受降城定逺城天徳軍節度支度營田觀察押蕃落使依前兼御史中丞初詔下萬榮䖍休欒等各除本府司馬及内出告身始為長史然後追制改焉十五年八月贈故四鎮北庭涇原節度使田希鑒陜州大都督希鑒自涇原已改尚書衛尉此贈誤官銜也十六年九月贈左㪚騎常侍駙馬都尉郭曖工部尚書曖大厯十四年授左常侍建中二年以憂罷興元元年二月授太常卿同正以至于終今詔書言常侍誤也憲宗元和八年十月戊戌以左神策軍普潤鎮使蘓光榮為涇州刺史兼御史大夫充四鎮北庭行軍兼涇原等州觀察使翰林學士司門員外郎韋𢎞景草制漏叙勲勞是月辛丑詔𢎞景守本官落職十二年七月丙辰以中書侍郎平章事裴度為門下侍郎平章事充彰義軍節度由光蔡等州觀察淮西宣慰處置等使其制翰林學士中書舍人令狐楚所草也度以是行兼招撫請改其辭中未翦其類為未革其志又以韓𢎞為都統請改更張琴瑟為近輟樞軸又改煩我台席為授以成筭憲宗皆從之乃罷楚學士十二月詔刑部侍郎韓愈撰平淮西碑文既成而淮西節度使李愬姻聫戚里其妻上言愈叙愬之功不平後有詔刋磨愈文别命叚文昌撰述梁太祖開平三年四月翰林學士鄭珏盧文度以書詔漏略王言罰兩月俸後唐眀宗天成二年十一月壬申詔太宗朝左僕射李靖可册贈太保鄭州僕射陂可改為太保陂時議者以僕射陂者後魏孝文帝賜僕射李冲故因以為名及是命之降以為李靖盖誤也四年八月太子太傅李琪奉命撰故青州節度使霍彦威神道碑初琪仕梁至平章事而私懐感遇之意舊之工碑版者奉勑撰碑皆始叙君上奬功之道承詔撰述之旨每扵立意皆稱臣彦威仕梁位至方面及兹叙其揚歴必須指名幾任是偽幾任是朝命琪不欲指斥偽梁所撰碑文自初不稱臣中書覆奏云李琪所撰霍彦威神道碑文既不分真偽是混功名望令改撰從之稽緩夫居代言之職處備問之地文有工拙性分利鈍或持槖而従逰或簪筆而赴召乃有思靡流通情惟底滯含毫而若失授簡而後成不能厝詞或罹奏免布之朝聼徒負靦顔如其吐詞雖妍移晷乃就是謂晚成可以塞責斯則庶幾矣漢司馬相如武帝時與枚臯俱為郎従行至甘泉行音下孟反雍河東東廵狩封泰山塞決河宣房㳺觀三輔離宫館臨山澤弋獵射馭狗馬蹵鞠刻鏤蹵千六切足蹵之也鞠巨六切以韋為之中實以物蹵蹋為戲樂帝有所感輒使賦之臯為文疾受詔輒成故所賦者多相如善為文而遲故所作者少而善扵臯魏和逌髙貴鄉公時為侍中甘露二年幸辟雍㑹命羣臣賦詩逌與尚書陳騫等作稽留有司奏免官詔曰吾以闇昧愛好文雅廣延文賦以知得失乃爾紛紜良用惻然其原逌等宋謝靈運文帝時為侍中與顔延之俱以詞彩齊名而遲速懸絶帝嘗勑各擬樂府比上篇延之受詔輒成靈運久之乃就梁張率髙祖時爲司徒掾直文徳待詔省侍宴夀光殿帝詔羣臣賦詩率與太子中舍人劉孺並醉未及成帝取孺手板戲題之曰張率東南美劉孺雒陽才攬筆便應就何事久遲廻北齊李愔為中書郎文宣在宴席口勑以魏收為中書監命愔扵樹下造詔愔以收一代盛才難扵率爾久而未訖比成帝已醉醒遂不重言愔仍不奏事竟寝隋薛道衡為内史侍郎每至搆文必隱空齋蹋壁而卧聞户外有人便怒其沉思如此唐陸餘慶則天時為中書舍人常引入草詔餘慶惶感至晚竟不能厝一詞責授左司郎中李建穆宗長慶元年除兵部郎中知制誥自以草詔思遲不願當其任旋改京兆少尹後唐崔沂初仕唐昭宗時累遷員外郎知制誥性抗厲守道而文藻非優嘗與同舍顔蕘錢珝俱秉筆見蕘珝贍速草制數十無妨談笑而沂自媿翌日謁國相訴曰沂疎淺不足以供詞翰之職相輔然之移為諫議大夫封舜卿唐末為禮部侍郎知貢舉梁開平中與門生鄭致雍同受命入翰林為學士致雍有俊才舜卿雖有文辭才思拙澁及試五題不勝困弊因託致雍秉筆當時譏者以為座主辱門生周劉温叟初仕晋為翰林學士知制誥北虜犯闕温叟恐備其行與承旨張允上章求免所職及漢祖至汴宫久而來見執政援引欲置扵兩制温叟堅求散秩言稍詆訐盖温叟在翰苑日遇詞目繁委常難其才之不迨有退倦之志遂除駕部郎中册府元龜卷五百五十三
