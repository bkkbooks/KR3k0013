body:
  text: 册府元龜卷九百八十五宋王欽若等撰外臣部征討第四唐髙祖武徳三年九月遣長平王叔良討叛胡平之四年九月突厥寇并州遣左屯衛大将軍竇琮左武侯大将軍桑顯和率師以禦之是月又寇梁州遣行軍總管尉遲敬徳太子内率上官懐仁撃之是月靈州總管楊師道撃突厥大破之斬首三百餘級獲馬一千餘匹十一月靈州總管劉旻撃叛胡劉企成大破之斬首二百級企成僅以身免其部落皆降五年八月突厥寇邊九月交州刺史權中通𢎞州總管宇文歆靈州總管楊師道撃突厥於三觀山破之獲駝馬數千匹是月宇文歆復撃突厥於崇崗鎮大破之斬首千餘級定州司馬温彦博驃騎魏道仁撃突厥於恒山之陽斬首數百級領軍将軍安興貴撃突厥於甘州大破之是年并州大總管襄邑王神符撃突厥於汾東斬首五百級虜其馬二千匹汾州刺史蕭顗斬突厥五千餘級七年正月始州反獠舉兵遣行臺僕射竇軌討之四月通事舎人李鳳起撃萬州反獠並平之五月吐谷渾寇松州遣益州行臺左僕射竇軌自翼州道扶州刺史􅃽善合自芳州道撃之是月竇軌撃反獠于方山俘二萬餘口六月隴州扶州獠作亂遣南尹州都督李光度撃平之七月突厥寇原州遣寜州刺史鹿大師援之又遣靈州都督楊師道趨大木根山邀其歸路是月又寇隴州遣䕶軍尉遲敬徳撃之八年七月叛胡睦伽陁攻武興八月左武侯将軍安修仁撃於且渠川破之九年二月突厥寇原州遣折威将軍楊毛撃之三月益州行䑓尚書郭行方撃眉州叛獠之衆大破之進撃於洪雅二州俘男女五千口太宗以武徳九年八月即位是月突厥頡利寇髙陵行軍總管尉遲敬徳與戰于涇陽大破之獲其俟斤阿史徳烏沒毁斬首千餘級是月請和許之貞觀二年正月吐谷渾寇岷州都督李道彦撃走之執其名王二人俘斬七百餘級三年十一月以行并州都督李勣為通漢道行軍總管兵部尚書李靖為定襄道行軍總管華州刺史柴紹為金河道行軍總管靈州大都督任城王道宗為大同道行軍總管檢校幽州都督衛孝節為恒安道行軍總管兼管州都督薛萬徹為暢武道行軍總管分道出師以撃突厥是月任城王道宗撃突厥于靈州破之俘男女數百口雜畜萬餘計十二月突利可汗及郁射設䕃奈特勤等並帥所部来奔四年正月李靖屯惡陽嶺夜襲定襄頡利驚擾因徙牙於磧口胡酋康蘇密等遂以隋蕭后及楊正道來降二月李靖次陰山撃頡利大破之滅其國復定襄恒安之地斥土界於大漠頡利計窘竄于鐵山兵尚數萬使執失思力入朝謝罪請舉國内附帝遣鴻臚卿唐儉将軍安修仁持節安撫之頡利稍自安靖乗間襲撃大破之遂滅其國頡利乗千里馬獨騎奔於從姪沙鉢羅部落三月大同道行軍副總管張寳相率衆奄至沙鉢羅營生擒頡利送於京師是月突厥思結部俟斤率衆四萬来降四月李靖獻頡利可汗帝御順天樓盛陳文物士庻縱觀歸之有司帝數之曰汝父啓民之破也匹馬歸隋竟不能効一鏃之力汝次兄坐享富貴恣情暴虐酒色是耽至令父祖不獲血食爾罪一也與我隣國侵我邊疆失信忘義惟利是親爾罪二也恃兵馬之盛數興戎旅部落怨嗟僵尸徧路爾罪三也侵掠我子女殘暴我禾稼焚燒我村塢賊亂我華民爾罪四也我忘爾宿惡憫爾同盟許爾和親復爾宗國遷延不来至于逃罪爾罪五也爾有死罪五焉今不殺爾者徒以清水結盟以来更不南寇爾頡利歡呼而退七年八月以右屯衛大将軍張士貴為龔州道行軍總管以撃獠八年正月張士貴討東西王洞反獠平之十月左驍衛大将軍段志𤣥撃吐谷渾破之追奔八百餘里十一月吐谷渾拘行人趙徳楷詔曰朕嗣纂洪業思恢至道端拱垂衣於兹九載式修文徳寜謐區宇徼外君長海表酋渠無遠不庭無思不服而吐谷渾蕞爾小蕃負固河右地不遠千里衆不盈一萬不量其力不恤其人肆情拒命抗衡上國朕每遣行人入蕃曉諭并引其使者臨軒戒朂示以善道勸以和親欲使境上無虞各安其業訓𨗳積年凶頑未改剽掠邊鄙畧無寜息今上書傲狠拘我使人内外百僚華夷兆庻同心憤怨咸願誅討宜乗弔伐之機以展鷹鸇之志長驅尅期窮其巢穴罪止吐谷渾可汗昬耄之主及天柱王一二邪臣自餘部落皆無所問夷凶息暴稱朕意焉十一月以特進李靖為西海道行軍大總管節度諸軍兵部尚書侯君集為積石道行軍總管刑部尚書任城王道宗為鄯善道行軍總管仍並為靖副涼州都督李大亮為且沬道行軍總管岷州都督膠東郡公李道彦為赤水道行軍總管利州刺史髙甑生為鹽澤道行軍總管九年正月黨項羌先内屬者皆叛歸吐谷渾三月髙甑生撃破之閏四月任城王道宗撃吐谷渾於庫山破之俘四百餘人李靖部将薛孤吳兒以輕鋭破之于曼頭山斬其名王俘五百餘人大獲六畜以充軍糧李靖侯君集任城王道宗等又破於牛心堆又破於赤水源獲雜畜數萬計五月乙未侯君集任城王道宗追吐谷渾主及於烏海撃大破之薛萬均又破天柱王於赤海獲其雜畜三十萬計追至河源李大亮俘其名王二十人雜畜五萬計是月李靖平吐谷渾國于西海之上初王師以三月次于鄯州靖與諸将會議侯君集曰大軍已至賊徒尚未走險宜簡精鋭長駈疾進掩其不虞可有大利此破竹之勢也若此策不行潜遁必遠山障為阻窮討則難靖從之乃簡縳士馬輕賫深入及庫山之㨗可汗謀将入磧以避官軍道宗復曰柏海近河源古来罕有至者賊既西走未知的處今叚之行實資馬力今馬疲糧少遠入為難未若且向鄯州待馬肥之後更圗進趣君集曰不然叚志𤣥曩者纔至鄯州賊衆便到城下良由彼國尚完兇徒用命今者一敗以後斥候亦絶君臣相失父子擕離乗其迫懼取同俯拾柏海雖遥便可皷行而至也靖又然之於是衆分士馬以為兩道靖與薛萬均李大亮等趣北路出曼頭山逾赤水渉青海歴河源且未窮其西境君集與道宗趣南路經途二千餘里行空虚之地盛夏降霜多積雪山中有瘴氣厯破邏真谷其地無水将士食冰馬皆飲雪又行月餘日至星宿川達于柏海兩軍所至皆大尅将軍執失思力又馳數百里别破虜于車茹川旋與靖會于大非川可汗長子大寜王順窮蹙計無所出乃斬其國相天柱王舉國来降可汗大懼與千餘騎遁于磧中衆消亡散能屬之者纔百騎十餘日竟為其左右所殺七月鹽澤道行軍副總管劉徳敏撃叛羌破之十二年八月吐蕃寇松州都督韓威戰敗閻州刺史别叢卧施諾州刺史杞利歩利皆羌首也並以州叛附于吐蕃以吏部尚書侯君集為當彌道行軍大總管右領軍大将軍執失思力為白蘭道行軍總管左武衛将軍牛進達為活水道行軍總管右領軍将軍劉簡為桃源道行軍總管督歩騎五萬以撃之九月行軍總管牛進達及吐蕃戰于松州前後斬首千餘級十月均州山獠舉兵反遣桂州都督張寳徳討平之十一月明州山獠舉兵反遣交州都督李道彦討平之十二月右武侯将軍上官懐仁撃山獠于壁州大破之虜男女萬餘口十三年四月上官懐仁撃巴壁洋集四州反獠平之虜男女六千餘口十二月詔曰明罰勅法聖人垂懲惡之道命将出軍王者成定亂之徳故三苖負固虞帝所以興師鬼方不㳟殷宗所以薄伐朕嗣膺景命君臨區夏𢎞大道於四海推至誠於萬類憑宗社之靈藉股肱之力億兆獲乂尉候無虞建木棘林山經靡紀之域幽都大夏王會不書之君莫不革面内欵屈膝請吏襲冠𢃄於魏闕均征賦於華壤而髙昌麴文泰猶為不軌敢興異圗事上無忠欵之節禦下逞殘忍之志往經朝謁備加恩禮溪􅊤難滿曾無報效禽獸為心遽懐凶狡詔命之嚴禀承之誠既闕王人之重祇敬之禮亦虧自隋季道消天下淪喪衣冠之族疆場之人或寄命諸戎或見拘寇手及中州既定皇風遠肅人懐首丘途經彼境皆被囚繋加之重役忍苦遐外控告無所又伊吾之右波斯以東職貢不絶商旅相繼琛賮遭其寇攘道路由其壅塞又西蕃突厥戰争已久朕愍其亂離志務安輯乃立咥利始可汗兄弟庻令克復舊土文泰反道敗徳幸災好禍間諜酋豪交亂種落遂使氊裘之長亟動干戈引弓之人重罹塗炭又焉耆之地與之臨接文泰疾其盡節輕肆凶威城池有危亡之憂士女嬰劫掠之酷加以虐用其衆毒被所部賞罰無章内外嗟怨繕造宫室勞役日興修營輿輦僣侈無度法令深刻賦歛煩重舉手動足咸罹網羅畜牧園菓悉有征税衆力既盡人財已竭饑寒總至憤歎盈途比屋連甍不勝苛政故老兒童思霑王澤朕命上𤣥為人父母禁暴之道無隔内外納隍之慮切於興寢錄其舊欵仍懷愍念所以頻遣使人具申朝㫖朂以為善之規示以自新之路庻知感悟無煩師旅而昬迷遂性荒怠不悛貫盈之釁既稔天亡之期已及况復文武具僚戎狄君長諸倳刃者相屬懐逐雀者比肩宜順夷夏之心以申弔伐之典罰凶渠之多罪拯無辜之倒懸今遣交河行軍大總管吏部尚書侯君集副總管兼左屯衛大将軍薛萬均副總管左屯衛将軍薛孤吳兒行軍總管武衛将軍牛進達等董率衆軍𢎞宣廟畧乗驛進路同會虜庭莫不氣奪風雲精貫日月援枹懐憤㧞距争先良将奮建瓴之威鋭卒効貔貅之勇冀馬燕犀猶迅雷之震撃雲梯地道若至神之變化以此制敵事等摧枯以此屠城易於反掌然朕矜哀之心有懐去殺勝殘之道無忘好生若文泰面縳軍門泥首請罪特𢎞焚櫬之澤全其将盡之命自餘臣庻棄惡歸誠並加撫慰令各安堵示以順逆之理布兹寛大之徳如其同惡相濟敢拒王師便盡大兵之勢以致上天之罰明加曉諭稱朕意焉十四年三月竇州道行軍總管黨仁𢎞撃羅竇反獠破之俘七千餘口八月交河道行軍大總管侯君集撃髙昌破之初其王文泰時遏絶西域商賈太宗徵文泰入朝而稱疾不至乃詔侯君集討之文泰聞王師将起謂其國人曰唐國去此七千里沙磧濶二千里地無水草冬風凍寒夏秋如焚風之所吹行人多死嘗行百人不能得至安能致大軍乎若頓兵于吾城下二十日食必盡自然魚潰乃接而虜之何足憂也及軍至磧口而文泰卒其子智盛襲位君集率兵至柳谷候騎言文泰尅日将𦵏國人咸集諸将請襲之君集曰不可天子以髙昌驕慢無禮使吾恭行天罰今襲人於墟墓之間非問罪之師也於是鼓行而前攻其地城賊嬰城自守君集諭之不行先是大軍之發也帝召山東善為攻城器械者悉遣從軍君集遂刋木填隍擁撞車撞其埤堄數丈湏穴抛車石撃其城中其所當者無不糜碎或張氊被用障抛石城上守陴者不復得立遂㧞之虜其男女七千餘口仍進兵圍其都城智盛窮蹙致書於君集曰有罪于天子者先王也天罰所加身已喪背智盛襲位未㡬不知所以僣闕兾尚書哀憐君集報曰若能悔禍宜束手軍門智盛猶不出因命士卒填其隍塹發抛車以攻之又為十丈髙樓俯視城内有行人及飛石所中處皆唱言之人多入室避石初文泰與西突厥欲谷設約有兵至共為表裏及聞君集至欲谷設懼而西走千餘里智盛失援計無所出遂開門出降君集分兵畧地遂平其國俘智盛及其将吏刻石紀功而還十五年十一月薛延陀盡其甲騎并發同羅僕骨廻紇靺鞨霫等衆合二十萬卒一人馬四匹度漠屯白道川據善陽嶺以撃思摩之部思摩引其種落走朔州留精騎以戰延陀乗之及塞詔營州都督張儉統所部騎兵及奚霫契丹等壓其東境兵部尚書李勣為朔州道行軍總管率兵六萬騎千二百屯朔方右衛大将軍李大亮為雲州道行軍總管率兵四萬騎五千屯靈武右屯衛大将軍張士貴率兵一萬騎七千為慶州道行軍總管出雲中凉州都督李襲譽為凉州道行軍總管以經畧之又遣右屯衛将軍姜行本率左右飛騎及左右衛引强者千人受李勣節度是月李勣撃延陀之衆破之初延陀次通漢川李勣領朔州延陀子大度設領三萬兵臨長城欲入撃突厥而思摩已南走知不可得乃遣人登長城而罵之因見大軍塵埃連天遽退告延陀先還而自将其衆走赤柯濼度青山道頗迂遠李勣選麾下騎突百六十皆驍悍敢死弱弓長矟自直道度設知不脱乃亘十里而陳兵先是延陀撃沙鉢羅及阿史那社爾皆以歩戰而勝及其将来寇也先講武于國中教習歩戰每五人以一人經習戰陣者使執馬而四人前戰克勝即授馬以追奔失于應接罪至於死沒其家口以賞戰人至是遂行其法突厥兵先合輒退延陀乗勝而逐之勣兵拒撃而延陀萬矢俱發傷其戰馬李勣乃令去馬歩陣率長矟數百為隊齊奮以衝之其衆潰敗副總管薛萬徹率數千騎收其執馬者其衆失馬莫知所從因大縱撃斬首三千餘級獲馬萬五千匹甲仗輜重不可勝計會暮殺之不能盡大度設跳身而遁萬徹将數百騎追之不及其餘衆又奔走相騰踐至漠北大雪馬疲不前人凍死者十八九先是延陀祭天祈雪我師不能逐及此自斃焉李勣旋軍定襄太宗遣使賫璽書以勞将士突厥諸部有思結者先處代州五臺縣其意嘗欲歸延陁因是而叛代州追兵適及會李勣旋軍至首尾圍撃思結計無所出走入峨谷中自度必死前殺其妻子然後力戰勣又敗之斬首五百級生擒一千五百人虜其男女三千餘口獲牛馬稱是十八年七月太宗以髙麗莫離支自殺其主發兵撃新羅新羅盡禮以事國家數遣使稽顙請援乃遣髙麗解兵不從欲撃之於是勅将作大匠閻立徳括州刺史趙元楷宋州刺史王波利往洪饒江等州造船艦四百艘可以載軍糧泛海攻戰者且遣輕騎數千至遼東城以觀其勢甲午遂下詔曰百濟髙麗恃其僻遠每動甲兵侵逼新羅日蹙百姓塗炭遣使請援道路相望朕情深愍念爰命使者詔彼兩蕃戢兵敦好而髙麗姦武攻撃未已若不拯救豈濟倒懸宜令營州都督張儉守左宗衛率髙履行等率幽營二都督府兵馬及契丹奚靺鞨往遼東問罪屬遼東水泛溢儉等兵不能濟十月安西都督郭孝恪帥師滅焉耆孝恪執其王龍突騎支送行在所時帝幸九成宫故曰行在所初王師之滅髙昌也制以髙昌所虜焉耆生口七百盡還之焉耆王尋叛歸於欲可汗朝貢稀至令孝恪伺其機便孝恪因表請撃之以孝恪為安西道行軍總管率歩騎三千出銀山道以伐焉耆孝恪夜襲其城破之十一月命太子詹事英國公李勣為遼東道行軍總管出柳城禮部尚書江夏郡王道宗副之刑部尚書鄖國公張亮為平壤道行軍總管以舟師出莱州左領軍常何瀘州都督左難當副之發天下甲士召募十萬並趣平壤以伐髙麗十九年四月英國公李勣攻盖牟城破之時帝親征此已後至班師事具帝王親征門二十年六月遣兵部尚書固安公崔敦禮特進英國公李勣撃破薛延陁於鬱督軍山北前後斬首五千餘級虜男女三十萬人時鐵勒僕骨同羅共撃延陁多彌可汗大敗之帝以延陁破亡遣江夏王道宗左衛大将軍阿史那社􅈛為潮海安撫大使又使右領軍衛大将軍執失思力領突厥兵代州都督薛萬徹營州都督張儉各統所部兵分道並進又令右驍衛大将軍契苾何力領凉州及胡兵同入以為聲援江夏王道宗等兵既渡磧遇阿波達官控弦數萬直前拒戰道宗進撃破之斬首千餘級追奔二百里薛萬徹别軍北道與廻紇相遇二将各遣使諭以綏懐之㫖其酋帥見使者皆頓顙歡呌曰不意大國遠見存撫俱請入朝既而諸部降書皆至百僚畢賀二十一年三月伐髙麗以左武衛大将軍牛進達為青丘道行軍大總管右武衛大将軍李海崖為副發兵一萬餘人並樓船戰舸自莱州泛海而入又以特進太子詹事英國公李勣為遼東道行軍大總管右武衛將軍孫貳郎左屯衛大将軍鄭仁泰為副将配兵三千人其營州都督府所管兵馬盡皆隸勣于是厲渉遼東自新城道入兩軍之發也並遣慣習滄波能以少撃衆者而配𨽻焉先是十九年帝之伐髙麗也以討逆為名及破駐蹕陳帝以御副弓箙賜莫離支雖服拜銜恩而不遣親近来謝天子以暮秋邊外詔六軍班師莫離支以王城獲全庻㡬可以自免滋虐其主又令伺我邊隙厥貢踈薄失藩人臣大國之禮天子扼腕含怒終欲取之中議以為髙麗城雉依山攻之不可卒下往前鑾駕親伐廢其耕稼所䧟之城並收其穀韓師旅炎旱相繼夷人以猥衆大半斷粒若得少兵畨次蹂其邊塲彼瘡痍之殘疲於奔命耕夫釋耒並皆入堡島夷之邑千里荒蕪古人云金城湯池非粟不固若再三如此髙麗必大窘迫自然逃散誰肯為莫離支嬰城鴨渌水以北可不戰而取天子以為然故有是命七月牛進達李海崖攻髙麗石城䧟之虜男女數百人師次積利城下髙麗出軍萬餘人拒戰海崖等撃破之斬首二千級九月遣宋州刺史王波利中郎将丘孝忠發江南十二州造入海大船及艓船三百五十艘将征髙麗十二月詔曰皇天理物蓄嚴厲於積隂大塊厚生騰殺氣於秋序故霆霓震曜聲懾八紘繁霜凝肅威加萬類朕既承兹介福超上皇王憂責在躬情兼列代昆蟲不理尤且納隍戎羯未寜豈宜安席逷矣西土自古遊魂昔與北塲本同根蔕乗戎致䦧遂爾擕離雞田戴斗是其祭天之地雁塞干雲上應分術之野疆踰瀚海局拒塞垣總其衘燭之鄉並為征賦之俗惟有烏孫舊境置罘所漏本既先㧞末豈能全皮尚不存毛将安附侵軼旅獒之壤剽掠巨雀之藩播此凶荒歴年兹乆積其愆禍崇凶貫盈凡厥氊裘不勝焦爛蠢兹板屋盡苦侵漁膜拜錦車思拯溺以延首重譯蠻邸呌嚴閽而委命裂裳褁足驟請天誅朕乃睠西顧深悼于懐搶此弗圖孰祗靈命是以求衣待旦對懸亡食哀彼綴旒義增投袂雖臨軒而獨對慮疑謀之罔從乃命鼎司陰籌遠畧言纔出于唇吻應已昭于上𤣥昧旦臨朝太史奏曰昨宵甲夜纎阿蝕昴考靈臺之秘簡徵渾象之舊文月者隂精用刑之兆也星纒胡分數終之效焉是知天道雖髙去人非遠至誠仰達應不踰時奉以恭行理當無惑今便躬秘推轂制詔夏官禡社出車發明秋令殱斯巨猾救彼蒼黎可遣使持節崑丘道行軍大總管左驍衛大将軍阿史那社爾副大總管左驍衛大将軍契苾何力金紫光禄大夫行安西都䕶郭孝恪司農卿清河郡公楊𢎞禮行軍總管左武衛将軍李海崖等總挈黿斬蛟之士帥曳牛佩豕之曹莫不感義長駈誓探巢穴之志循躬距躍将謝肉骨之恩又發鐵勒兵牧十有三部突厥侯王十餘萬騎沸湧動沙塲之地呼吸振廣漠之風道自金微會于䓗嶺又遣吐蕃君長踰𤣥莵而北臨歩揺酋渠絶昌海而西騖齊飛白羽周設天羅摐金懸米之源掩河津而雷撃沬赭崦山之嶠轎日域以雷奔取彼渠魁委于司寇拯其萌隸賜以營魂俾夫六驘泛駕免覆車而伏皁十角摧鋒與共觝而俱獻豈非有名動衆本為除殘以義出師貴能徵惡是以倒戈必宥事表於前經輿櫬不誅理昭於往誥其有去危投欵悔禍求哀毳幙酋豪宜錫長纓之寵韋韝種落恵以飲喙之娛且夫察微興事者機也勞已安人者義也天與則取可謂乗機衆欲斯從是名敦義踐機而必作戴義以行之今此一勞永康四表折兵難再或失時宜以朕之懷速頒天下初龜茲國既臣於西突厥安西都䕶郭孝恪之伐焉耆也龜茲遣軍援助自是藩禮漸缺帝大怒故有是詔閏十二月阿史那社爾與郭孝恪楊𢎞禮率五将軍又發鉄勒十二部兵十餘萬騎以伐龜茲社爾既破西蕃處月處宻乃進師趣其北境出其不意西突厥所署焉耆王棄城而遁社爾遣輕騎追擒之龜兹大震守将多棄城而走社爾進屯磧石去其都城三百里遣伊州刺史韓威率千餘騎為前鋒右驍衛将軍曹繼叔次之至多褐城與龜茲王相遇及其相那利羯獵等有衆五萬逆拒王師威乃偽遁而引之其王俟利發見威兵少悉衆而至威退行三十里與繼叔軍會合撃大破之其王退保都城社爾進軍逼之王乃輕騎而走遂下其城令孝恪守之遣沙州刺史蘇海政尚輦奉御薛萬備以精騎逼之行六百里其王窘急退保于撥換城社爾等進軍圍之擒其王及大将羯獵顛等其相郍利僅以身免潜引西突厥之衆并其國兵萬餘人来襲孝恪與子待詔同死于陣官軍大擾倉部郎中崔義起與曹繼叔韓威等撃之郍利匹馬而遁尋為龜茲人所執以詣軍前後破其大城五所虜男女數萬口社爾因立其王之弟葉䕶為王勒石紀功而旋俘其王阿黎布失畢及郍利羯獵顛等獻於廟是月以崑丘道行軍總管左武衛将軍阿史那賀魯為泥伏沙鉢羅葉䕶并給皷纛遣招討巴西突厥二十二年正月詔授右武衛大将軍薛萬徹為青丘道行軍大總管右衛将軍裴行大為副率兵三萬餘人并樓船戰艦自莱州泛海以撃髙麗萬徹入鴨緑水俘獲甚衆四月烏胡鎮将石神感率兵浮海直指髙麗領歩騎五千拒戰於易山短兵纔接其衆大潰斬首虜八百餘人其夜賊兵萬餘襲神感之船神感設伏以待之賊不覺奮撃大破之而還是月右武侯将軍梁建方撃松外蠻破之初嶲州都督劉伯英上言松外諸蠻雖暫降欵旋即背叛請出師討之西濟河天竺道可通也由是發蜀中十二州兵討之蠻帥雙舎率衆拒戰建方撃敗之殺獲千餘人羣蠻震擾投竄山谷建方分遣使者説以利害爭来欵附前後至者七千餘部户十萬九千三百建方署其首領䝉和為縣令各統所部莫不感悦建方乗勝遣使往西洱河其帥楊盛見使至大駭具船将遁使者曉諭禍福示以威信咸遂稽顙請降遣守領十人来謁軍門建方振旅而退六月薛延陁餘衆二萬人渡鮮崿河侵瀚海金微幽陵三郡都督各發兵逆撃大破之斬獲八千級於是發燕副都䕶元臣率九姓鐵勒捕是月青丘道軍師薛萬徹渡海入鴨渌水百餘里至泊灼城南四十里止營髙麗讋懼並棄邑居而遁泊灼城主所失孫率歩騎萬餘人来拒官軍萬徹遣右衛将軍裴行方領歩卒折衝尉羅文合為援軍繼進萬徹及諸軍乗之賊大潰追奔百餘里及於陣所失孫進兵圍之泊灼城因山設險阻鴨淥水以為固攻之未㧞髙麗遣将髙文率馬骨安地諸城兵三萬餘人来援分置兩陣萬徹分軍以當之鋒刃纔接而賊潰俘獲且盡而還八月辛丑遣左領軍大将軍執失思力往金山道討薛延陁餘部落是月崑丘道将軍阿史那社爾撃處羅破之餘衆悉降九月遣茂州都督張士貴右衛将軍梁建方發隴右及峡中兵馬二萬餘人撃編獠初帝遣劍南造船㺐獠之人咸令減役雅卭眉三州編獠或不祗承呼召相率而反乃遣建方等討之册府元龜卷九百八十五
