body:
  text: 冊府元龜卷六百八十八宋王欽若等撰牧守部薦賢愛民薦賢國有進賢之令易稱彚征之吉盖淑人君子志不掩善義從公共冀得英哲以奉其上者也夫十室之邑必有忠信三人同行必有我師况乎百城共治萬夫觀政按察封部親撫氓俗者哉至乃節行純正才譽彰著名迹韜暎鄉里推服或屬吏之善治或令族之久廢咸能特達慰薦周旋稱述揚於王庭舉不失徳傳曰惟善人能舉其類豈虚語也哉漢吳公史失其名為河南守雒陽人賈誼年十八以能誦詩書屬文稱吳公召置門下文帝初立徵吳公以為廷尉廼言誼年少頗通諸家之書帝召以為博士王襄宣帝時為益州刺史時蜀人王褒既為刺史作頌即中和樂職宣布詩也以美盛徳故謂之頌也又作其傳解釋頌歌之義及作者之意襄因奏褒有軼才帝乃徵褒既至詔褒為聖主得賢臣頌徐眀元帝時為涿郡守郡人王尊為䕶羌將軍坐擅離部㑹赦免歸家眀薦尊不宜久在閭巷帝以尊為郿令蕭育成帝時為朔方刺史時馮野王以中山孝王舅出為上郡太守育奏封事薦言野王行能髙妙内足以圖身外足以慮化圖謀也慮思也竊惜野王懐國之寶而不趨陪朝廷與朝者並野王前以王舅出以賢復入眀國家樂進賢也帝自為太子時聞知野王㑹其病免復以故二千石使行河隄因拜為琅邪太守後漢銚期建武初為魏郡太守時功曹馮勤有能稱期常從光武征伐政事一以委勤勤同縣馮廵等舉兵應光武謀未成而為豪右焦亷等所殺勤乃率將老母兄弟及宗親歸期期悉以為腹心薦於光武初未被用後乃除為郎中給事尚書劉育建武初為濟陰太守郡丞劉平有孝行育甚重之任以郡職上書薦平㑹平遭父䘮去官服闋拜全椒長杜詩建武初為南陽太守雅好推賢數進知名士清河劉統及魯陽董崇等張輔章帝建中初為東郡太守郡吏王清者祖父翁與前太守翟義起兵攻王莽及義敗餘衆悉降翁獨守節力戰莽遂燔燒之父隆建武初為都尉功曹清為小吏與父俱從都尉行縣道遇賊隆以身衞全都尉遂死於難清亦被矢貫咽音聲流遏前太守以清身有金痍竟不能舉輔見之歎息曰豈有一門忠義而爵賞不及乎遂擢用郡右曹乃上疏薦清三世死節宜蒙顯異奏下三公繇此為司空所辟除歩兵司馬輔傷清不遂復舉其子孝亷也魯丕和帝永元初為東郡太守數薦達幽隱名士王龔等皆備帷幄近侍張霸永元中為㑹稽太守表用郡人處士顧奉公孫松等奉後為潁川太守松為司𨽻校尉並有名稱其餘有業行者皆見擢用郡中争厲志節習經者以千數道路但聞誦聲龎奮和帝時為河南尹緱氏人龎叅初仕郡未知名奮見而竒之舉為孝亷拜左校令向苖為沛郡守有名迹舉桓鸞孝亷為膠東令法雄安帝時為交阯太守先是交阯都尉胡貢一作龎子廣為郡散吏雄舉廣孝亷既到京師試以章奏帝以廣為天下第一故事孝亷髙第三公尚書輒優文詩勞來其舉將於是公府下詔書勞來雄焉旬月拜尚書郎李固順帝時為荆州刺史薦桂楊太守欒巴治迹徵拜議郎守光祿大夫范津為北地太守眀知人舉傅燮孝亷及津為漢陽與爕交代合符而去鄉邦榮之盖勲靈帝中平初為京兆尹是時漢陽叛人臣國衆十餘萬攻陳倉三輔震動勲領郡兵五千人自請滿萬人因版用處士扶風孫瑞為鷹鷂都尉桂陽魏傑為破敵都尉京兆杜楷為威虜都尉𢎞農楊儒為烏擊都尉長陵第五雋為靖寇都尉凡五部都尉皆素有名悉領屬􅈴張浩為彭城相薦𨼆士閭丘邈等劉翊為汝南太守舉郡人許靖計吏察孝亷除尚書郎典選舉陰修為潁川太守以旌賢擢俊為務舉五官擢張中方正察功曹鍾繇主簿荀彧主記掾張禮賊曹掾杜祐孝亷荀攸計吏部圖為吏以光國朝孔融為北海相薦舉賢良鄭𤣥彭璆邴原等髙幹為并州刺史時常林有髙行幹表為騎都尉林辭不受魏梁習漢末為并州刺史薦州界名士常林陽俊王陵王象荀緯太祖皆以為縣長孟達為安定太守嘗薦涿郡太守王雄曰臣聞眀君以求賢為業忠臣以進善為效故易稱㧞茅連茹傳曰舉爾所知臣不自量竊慕其義日以人乏謬備部職時涿郡太守雄為西部從事與臣同僚雄天性良固果而有謀歴試三縣政成民和頃任近職奉宣威徳懐柔有術清慎持法臣往年出使經過雄郡自說特受陛下㧞擢之恩嘗厲節精心思投命為效言辭激揚情趣欵惻臣雖愚暗不識真偽以為雄才兼資文武忠烈之性踰越倫輩今涿郡領戸三千孤寡之家㕘居其半比有守兵藩衞之固誠不足舒雄智力展其勤幹而已也臣受恩深厚無以報國不勝慺慺淺見之情謹冐陳聞詔曰昔蕭何薦韓信鄧禹進吳漢惟賢知賢也雄有膽智技能文武之姿吾宿知之今使以參散騎之選方使少在吾閒下知指歸便大用之矣天下之士欲使皆先歴散騎然後出據州郡是吾本意髙堂隆為陳留太守犢民酉牧年七十餘有至行舉為計曹掾眀帝嘉之特除郎中以顯焉張既為雍州刺史時武威太守毌丘興甚有恵政既上表曰河右遐逺䘮亂彌久武威當諸郡路道喉轄之要加民夷雜處數有兵難領太守毌丘興到官内撫吏民外懐羌胡士卒柔附為官效用黄懐張進初圖逆亂扇動左右興志氣忠烈臨難不顧為將挍民夷陳禍福言則涕泣於時男女萬口咸懐感激形毁髮亂誓心致命尋率精兵踧脅張掖濟拔領太守杜通西海太守張睦張掖番和驪靬二縣吏民及郡雜胡並惡詣興興皆安䘏使盡力田興每所歴盡竭心力誠國之良吏殿下即位留心萬幾茍有毫毛之善必有賞錄臣伏緣聖㫖指陳其事蜀劉焉漢末為益州牧廣漢郡人任安兼通數經究極圖䜟不就徵辟焉表薦安味精道度厲節髙邈揆其器量國之元寶宜處弼凝之輔以消非常之咎𤣥纁之禮所宜招命時王塗隔塞遂無聘命晉王戎為荆州刺史時樂廣有名戎聞廣為夏侯𤣥所賞乃舉為秀才後廣為右僕射領吏部代戎為尚書令始戎薦廣而終踐其位時人美之裴楷為河内郡太守范晷為丞楷雅知之薦為侍御史山濤為冀州刺史冀州俗薄無相推轂濤甄拔隱居捜訪賢才旌命三十餘人皆顯名當時人懐慕向風俗頗革華譚為廬江内史舉寒族周訪為孝亷訪果立功名時以譚為知人王敦為廬江刺史時懐帝詔王公舉賢良方正敦以賀循為賢良杜夷為方正乃上疏曰臣聞有唐疇咨元凱登用漢武欽賢俊彦嚮應故能允協時雍敷崇盛化伏見於孫舍人㑹稽賀循處士廬江杜夷履道彌髙清操絶俗思學融通才經王務循宰二縣皆有名實備僚東宫忠恪允著清虛冲淡上俗異軌考槃空谷肥遁匿迹盖經國之良寶聘命之所急若得待詔公車承對冊問必有忠讜良謨𢎞益政道矣敦於是逼夷赴雒夷適於夀陽孔廞為吳興太守先是郡人王談父為鄰人竇度所殺後以錚斬度太守孔嚴宥之及廞為太守究其義行舉為孝亷時稱得人何充為東陽太守薦徵士虞喜孔愉為㑹稽内史韓續好文學以潛退髙操愉上疏薦之召拜博士續稱老病不起後秦郭播為隴東太守時赫連勃勃乞伏乾歸作亂西北秃髮傉檀沮渠蒙遜擅兵河右疇咨將帥之臣欲鎮撫二方播言於姚興曰嶺北二州鎮戸皆數萬若得文武之才以綏撫之足靖塞姦路興曰吾每思得亷頗李牧鎮撫四方使便宜行事然任非其人嘗致負敗卿試舉之播曰清潔善撫邊則平陸子王元始雄武多竒畧則建威王煥賞罰必行臨敵不顧則奮武彭蚝興曰蚝令行禁止則有之非綏邊之才也始煥年少吾未知其為人播曰廣平公弼才兼文武宜鎮督一方願陛下逺鑒髙車近悟後轍興不從宋王韶之為吳興太守郡人潘綜少有孝行綜鄉人祕書鑒丘繼祖廷尉沈赤黙以綜異行亷補左右令史除遂昌長歳滿還家韶之臨郡發曰前被符孝亷之選必審其人雖四科難該文質寡備必能孝義邁俗拔萃著聞者便足以顯應眀揚允稱符㫖烏程潘綜守死孝道全親濟難烏程吳達義行純至列墳成行咸積誠内淳休聲外著可並察孝亷并列上州臺陳其行跡陸徽為益州刺史先是龔頴為前刺史毛璩從事璩為譙縱所殺頴獨不屈節及縱僣號徵之又不起逼以兵刄執志益堅縱平後元嘉二十四年徽上表曰臣聞運纒眀夷則艱貞之節顯時屬棟撓則獨立之操彰昔者皇綱㢮紊譙縱乘釁肆虐巴庸害殺前益州刺史毛璩竊據蜀土涪岷士庶怵廹受職璩故吏龔頴秉心貞白抗志不撓殯送舊君哀敬盡禮全操九載不染偽朝縱雖殘凶尤重義槩遂延以旌命刼以兵威頴忠誠奮發辭色方壯雖桎梏在身踐危愈信其節白刃臨頸見死不更其守若王蠋之抗辭燕軍同周苛之肆詈楚主方之於頴蔑以加焉誠當今之忠壯振古之遺烈而名未登於王府爵猶齒於鄉曹斯實邊氓逺土所為於邑臣過叨恩私宣風萬里志存砥礪有懐必聞故率愚慤舉其所知過懼紕妄伏增悚慄頴遂不被朝命終於家陸徽為廣州刺史上表薦士曰伏見廣州别駕從事史朱萬嗣年五十三字少豫理業冲夷秉操純白行稱私庭能著官政雖氏非世祿職無通資而隨牒南服位極僚首九綜州綱三端府職頻掌藩機屢顯符守年暨知命亷尚愈髙氷心與貪流争激霜情與脆節彌茂歴宰金山家無寶鏤之􅎖連組珠海室靡璫珥之珍確然守志不求聞達是以澄革汙吏洗鏡貪氓臣謬忝司牧任専萬里雖情祗慎擢才闕毫露敢罄愚陋舉其所知如得提名禮闈抗節朝省摶嶺表之清風負氷壺之潔望則恩融一臣而施光萬物敢緣天澤雲布時徳雨施每甄外州榮加逺國是以獻其瞽言希垂聽覽蔡興宗為㑹稽太守時㑹稽貴重望計及望孝盛族出身不減秘署泰始七年興宗欲舉山陰孔仲智長子為望計郭原平次息為望孝仲智㑹土髙門原平一邦至行欲以相敵㑹太宗别勑用人故二選並寢泰豫元年興宗徵還京師表其殊行宜舉拔顯以勸風俗南齊褚淵為吳興太守郡人丘靈鞠為烏程令不得志泰始初坐事黨錮數年及淵至謂人曰此郡才士唯有丘靈鞠及沈勃耳乃啟申之王奐為吳興太守武康之沈鱗士隱居教授學者數十百人奐上表薦之詔徵為奉朝請不就梁謝朏為吳興太守唯與姑熟周興嗣談文史而已及罷郡還因大相稱薦本州舉秀才除桂陽郡丞鄭紹叔為司州刺史能傾心接物多所薦舉士類以此歸之後魏穆羆為汾州刺史前吐京太守劉升在郡甚有威恵限滿還都胡民八百餘人詣羆請之前定陽令吳平人亦有恩信戸增數倍羆以吏民懐之並為表請孝文皆從焉胡泥為幽州刺史有陽尼少好學博通羣籍泥以其學藝文雅乃表薦之徵拜秘書著作郎李安世為相州刺史時路恃慶有幹用與廣平宋飜俱知名為鄉閭所稱安世並表薦之太和中除奉朝請恃慶以從兄文居有才望因推言之孝文遂并拜焉鄭羲為兖州刺史酸棗令鄭伯孫甄城令董騰别駕賈徳治中申靈度並在任亷貞勤恤百姓羲皆申表稱薦時論多之北齊王昕為東萊太守時杜弼為光州曲城令為政清浄務在仁恕普泰中吏曹下訪守令尤異弼已代還昕以弼應詔後周陳公純為岐州刺史舉遂伯中大夫樂遜為賢良唐陳少遊為揚州刺史吳郡陸贄有經學少遊愛其才辟為從事後薦於朝拜左拾遺張九臯為宋州刺史時髙適好學以詩知名佳句朝出夕遍人口九臯表薦之韓滉為浙西觀察使時萬年人韋渠年少警悟涉覽經史滉奏授試秘書省校書郎韋夏卿為蘇州刺史扶風竇羣以處士𨼆毗陵嘗著書號古今名臣畧三十卷夏卿以丘園茂異薦部兼獻其書不報及夏卿為京兆尹又薦之徵拜左拾遺韋臯為西川節度使西河人段文昌家于荆州倜儻有氣義節度使裴胄知之而不能用臯在蜀表授校書郎楊汝士為同州刺史入朝薦防禦判官魏謩為右拾遺文宗以謩魏徵之後頗竒待之後唐張全義初仕梁為河南尹以李専羙名族之後奏為陸渾尉晉趙在禮天福中為宋州節度使奏薦前節州節度使官李糓乞除一官尋授監察御史愛民夫牧守吏民之本可以感物而行化者也居其任者茍能宣恩澤之詔布忠厚之教廣求民瘼洞達治體知所疾苦去其繁密俾夫百姓寛息一境休和兹所謂良二千石矣漢氏而下循吏間作至有專行仁恵務於安輯振恤周困拯濟孤弱或條上其損益或蠲省其賦調至於推恕心以惜民力違科禁以順物情茍利於人靡顧於己或出私積以代民租故能上下忻頼所在化行為吏人所稱績用可紀非夫忠信之長慈恵之師庶幾乎徳讓之風者亦胡以臻此漢黄霸為潁川太守力行教化而後誅罰力猶勤也先以徳教化於下若有不從然後用刑罰薛宣為陳留太守入守左馮翊所居皆有條教可紀多仁恕愛利愛而安利也後漢鍾離意為魯相視事五年以愛利為化人多殷富季善為日南太守以愛恵為政劉岱為兖州刺史虚己愛物魏何䕫為長廣太守是時太祖始制新科下州郡又收租税絲絹􅇪以郡初立近以師旅之後不可卒䋲以法乃言曰自䘮亂以來民人失所今雖小安然服教日淺所下新科皆以眀罰勅法齊一大化也所領六縣疆域初定加以饑饉若一切齊以科禁恐或有不從教者不從者不得不誅則非官民設教隨時之意也先王辯九服之則以殊逺近制三典之刑以平治亂愚以為此郡宜依逺域新邦之典其民間小事使長吏臨時隨宜上不背正法下以順百姓之心比及三年民安其業然後齊之以法則無不治矣太祖從其言袁渙為沛南部都尉是時新募民開信田民不樂多逃亡渙白太祖曰夫民安土重遷不可卒變易以順行難以逆動宜順其意樂之者乃取不欲者勿彊太祖從之百姓大恱盧毓為梁譙二郡太守帝以譙舊鄉故大徙民充之以為屯田而譙土地墝百姓窮困毓愍之上表徙民於梁國就沃衍失帝意帝雖聽毓所表心猶恨之遂左遷毓使將徙民為睢陽典農校尉毓心在利民躬自臨視擇居美田百姓頼之遷安平廣平太守所在有恵化王觀為涿郡太守眀帝即位下詔書使郡縣條為劇中平者主者欲言郡為中平觀教曰此郡濵近外虜數有寇害云何不為劇邪主者曰若郡為外劇恐於眀府有任子觀曰夫君子所以為民也今郡在外劇則於役條當有降差豈可為太守之私而負一郡之民乎遂言為外劇郡後送任子詣鄴時觀但有一子而又幼弱其公心如此觀治身清潔帥下以儉僚屬承風莫不自勵晉王羲之為㑹稽内史時東土饑荒賦役繁重吳㑹尤甚羲之每上疏争事多見從又遺尚書僕射謝安書曰頃所陳論每蒙允納所以令下小得蘇息各安其業若不爾此一郡久已蹈東海矣今事之大者未布運漕是也吾意望朝廷可申下定期委之所司勿復事下但當歳終考其殿最長吏尤殿命檻車送詣天臺三縣不舉二千石必免或可左降令在疆寒極難之地又自吾到此從事嘗有四五兼以臺司及都水御史行臺文符如雨倒錯違背不復可知吾又瞑目循常推前取重者及綱紀輕者在五曹主者􅊩事未嘗得十日吏民趨走功費萬計卿方任其重可徐尋所言江左平日楊州一良刺史便足統之況以羣才而更不理正繇為法不一牽制者衆思簡而易從便足以説斷而時意不同近檢校諸縣無不皆爾餘尤千萬解重斂以資姦吏令國用空乏良可歎也自軍興以來征役及充運死亡叛散不反者衆虗耗至此而捕代修嘗所在凋困莫知所出上命所差上道多叛則吏及叛者席卷同去又有常制輒令其家及同伍課捕捕不擒家及同伍尋復亡叛百姓流亡户口日減其源在此又有百工醫寺死亡絶殁家户空盡差代無所上命不絶事起或十年十五年彈舉獲罪無懈息而無益實事何以堪之請自今諸死罪原輕者及五歳刑可以充此其減死者可長充兵役五歳者可充雜工醫寺皆令移其家以實都邑都邑既實是政之本又何絶其叛亡不移其家逃亡之患復如初耳令除罪而充雜役盡移其家小人愚迷或以為重於殺戮可以絶姦刑名雖輕懲肅實重豈非適時之宜邪宋徐豁為始興太守朝廷遣大使廵行四方并使郡縣各言損益豁因此表陳三事其一曰郡大田武吏年或十六便課米六十斛十五以下至十三便課米三十斛一户隨丁多少悉皆輸米但十三嵗兒未堪力田或是憚向無相兼通年及應輸便自逃免且邊接蠻俚去就益易或乃斷截支體産子不養户口歳減實此之繇謂宜更量課限使得存立今若減其米課雖有交損考之將來理有深益其二曰郡領銀民三百餘户鑿坑探砂皆二三丈功役既苦不顧摧壓一歳之中每有死者官司檢切猶致逋違老少相隨永絶農業千有餘口皆資他食豈惟一夫不耕或受其饑而已所以歳有不稔便致甚困尋臺邸用米不異於銀謂宜准銀課米即事為便其三曰中宿縣俚民課銀一丁輸南稱半兩尋此縣自不出銀又俚民皆巢居鳥語不閑貨易之宜每至買銀為損已甚又稱兩受入易生姦巧山俚愚佚不辯自中官所課甚輕民以所輸為劇今若聽計丁課米公私兼利太祖嘉之梁顧憲之仕齊永眀中為隋王東中郎長行㑹稽郡事時西陵戍主杜元懿啟吳興無秋㑹稽豐登商旅往來倍多常歳西陵牛埭音大税課格日三千五百元懿即如所見日可一倍盈縮相兼畧計年長百萬浦陽南北津及栁浦四埭乞為官領攝一年外長四百許萬西陵戍前簡税無妨戍事餘三埭自舉腹心世祖勅示㑹稽郡此詎是事宜可訪察憲之議曰尋始立一牛埭之意非茍逼僦以納税也當以風濤迅險人力不揵屢致膠弱濟急利物耳既公私是樂所以輸直無怨京師航渡即其例也而後之監領者不達其本各務己功生於理外或禁遏别道或空税江河或撲航倍價或力周猶責凡如此類不經牛埭煩告者上詳被報格外十條並蒙停寢從來諠訴始得蹔弭案吳興頻歳失稔今兹尤饉去之從豐良繇饑棘或徵貨貿粒還拯親累或携老扶弱陳力餬口埭司責税依格弗降舊格新減尚未議登格本加倍將何以濟皇兹䘏隱振廪蠲調而元懿幸災擢利重增困瘼人而不仁古今共疾且比見加格置市者前後相屬非惟新加無贏並皆舊格猶闕愚恐元懿今啟亦當不殊若事不嗣言懼加譴詰使百姓侵苦為公賈怨元懿禀性苛刻已彰往效任以物土譬以狼將羊其所欲舉腹心亦當虎而冠耳書云與其有聚斂之臣寧有盜臣此言盜公為損益徵斂民所害乃大也今雍熙在運草木含澤其非事宜仰如聖㫖然掌斯任者應簡亷平亷則不竊於公平則無害於民矣愚又以便宜者盖謂便於公宜於民也竊見頃之言便宜者非能於民力之外用天分地者也率皆即日不宜於民方來不便於公名與實反有乖政體凡如此等誠宜深察山陰一縣課戸二萬其民貲不滿三千者殆將居半刻又刻之猶且三分餘一凡有貲者多是士人復除其貧極者悉皆露戸役三五屬官盖惟分端輸調又則嘗然比衆局檢校首尾尋續横相質累者亦復不少一人被攝十人相追一緒裁萌千孽年起蠶事弛而農業廢賤取庸而貴取積應公贍私日不暇給欲無為非其可得乎死且不憚矧伊刑罰身且不愛何況妻子是以前簡未窮後巧復滋網辟從峻猶不能悛竊尋名之多偽寔繇宋季軍旅繁興役賦殷重不堪勤劇倚巧祈優積習生常迷途忘反四海之大黎庶之衆用心參差難卒澄一化宜以漸不可疾責誠存不擾蔵疾納汚實増崇曠務詳覽簡則稍自歸淳又被簡病前後年月久被其事不存符㫖歸嚴不敢暗信縣簡送郡郡簡呈使殊形詭狀千變萬源聞者莫不驚懐見者實足傷駭兼親屬里伍流離道路時轉寒涸事方未巳其士人婦女彌難厝𠂻不簡則疑其有巧欲簡復未知所安愚謂此條宜縣簡保舉其綱領畧其毛目乃當有漏不出貯中庶嬰疾沉痼者重荷生還之恩也又永興與諸暨罹唐㝢寇擾公私殘燼彌復特甚儻值水旱實不易思俗諺云㑹稽打皷送䘏吳興歩擔令史㑹稽舊稱沃壤今猶若此吳興本是塉土事在可知用循餘弊誠宜改張置法臣縁元懿令啟敢陳管見世祖並從之繇是以方直見委蕭景為雍州刺史初到州省除三迎羽儀器服不得煩擾吏人陸果為義興太守在郡寛恵為民下所稱後魏任城王澄為定州刺史初入中每横調百姓煩苦前後牧守未能蠲除澄多所省減民以忻頼裴良為汾州刺史先是官粟貸民未及收聚仍值寇亂民大饑人相食賊知倉庫空虛攻圍日甚死者十三四良以饑窘因與人民奔赴西河汾州之治西河自良始也張昭為幽州刺史年谷不登州廪虛罄民多菜色昭謂民吏曰何我之不徳而遇斯時乎乃使富人通濟貧乏車馬之家糴運外境貧弱者勸以農桑歳乃大熟士女稱頌之辛彦為汝陽太守值水澇民饑上表請輕税賦從之遂勑汝陽一郡聽以小絹為調張煜為岐州刺史矜恤貧弱為民所愛代還值元顯入雒仍令復州劉道試為武邑太守時冀州新益元愉逆亂之後加以連年災險道試頻為表請蠲其税賦百姓頼之崔遊為河東太守郡有盜戸常供州郡兵子孫見丁從役遊矜其勞苦乃表聞請聽更代郡内感之杜纂為清河内史尤愛貧老所至問民疾苦對之流涕北齊裴讞之為永昌太守客旅過郡皆出私財供給人間所無預代下民所出為吏人所懐赫連悦為林慮太守文襄往晉陽路繇郡因問所不便悦答云臨水武安二縣去郡遥逺山嶺重疊車歩艱難若東屬魏郡則地平路近文襄笑曰卿徒知便民不覺損幹悦答云所言者民所疾苦不敢以私潤負心文襄云卿能如此甚善甚善乃勅依事施行房謨嘗為徐兖二州刺史魏朝以河南數州鄉俗絹濫退絹一疋徵錢三百民庶苦之謨乃表請錢絹兩受任人所樂朝廷從之徵拜侍中後周韋孝寛為雍州刺史先是路側一里置一土堠經雨頺毁每須脩之孝寛臨州乃勒部内當堠處植槐樹代之既免脩復行旅又得庇廕太祖後見怪問知之曰豈得一州獨爾當令天下同之於是令諸州吏道一里種一樹十里種三樹百里種五樹焉唐崔善太宗貞觀初拜陜州刺史時朝廷立議户殷之處聽徙寛鄉善為上表稱畿内之地是謂户殷下壯之人悉入軍府若聽移轉便出闗外此則歴近實逺非經通之議其事乃止賈敦實髙宗咸亨初為洛陽長史洛陽令楊徳幹尤稱殘猛敦實謂人曰政在養人義須存育傷生過多雖能亦不足貴也嘗抑止徳幹徳幹亦為之稍減敬暉則天聖歴初為魏州刺史時河北新有突厥之寇方秋而脩城不輟暉下車謂曰金湯非粟而不守豈有棄收穫而繕城郭哉悉令罷散繇是人吏咸歌詠之狄仁傑中宗通天元年契丹攻瀛州河北震動太后制起仁傑為魏州刺史前刺史畏契丹猝至悉驅百姓入城繕修守具仁傑既至悉放歸農謂曰賊猶在逺何必如是萬一賊來吾自當之必不闗百姓也賊聞之自退百姓咸歌誦之韓休𤣥宗開元中為虢州刺史以地在兩京之間車駕在京及東都並為近州常被支税藁以納閑廐休奏請均配餘州中書令張悦駁之曰若獨免虢州即當移向他郡是刺史欲為私恵耳乃下符不許休復將執奏寮吏曰更奏必忤執政之意休曰為刺史不能救百姓之弊何以為政必以忤上得罪所甘心也竟執奏獲免州人于今稱之崔縱為河南尹時兵革甫定人戸什耗六七縱悉心為理恵愛簡易蠲苛去煩先是戍邊之師歳繇雒陽者儲器取辦於編戸縱始官備不徵於人令五家相保俾自占告發斂以䋲胥吏之私又益導伊雒以通里閈溉灌通貨皆不擾人嗣曹王臯累為譚洪荆襄觀察使至常平物價布帛貴則官出賣之或給將吏廪俸故豪家不得擅其利人不大困崔衍為虢州刺史居華陜之間而税重數倍其苖錢華陜之郊􅅵出十有八而虢之人􅅵徵七十衍乃上其事時裴延齡領度支方務聚斂乃詰衍以前後刺史無言者衍又上陳人困日久有司不宜以進言為譴其畧曰伏見比來諸州應縁百姓間事患在長吏因循不為申請不患陛下不憂恤患在申請不詣實不患朝廷不矜放有以不言受譴者未有以言得罪者是用不敢囬顧茍求自安上奏切直為時所稱後為宣歙池觀察使時天下好進奉以結主恩徵求聚斂州郡頗耗竭韋臯劉贊裴肅為之首贊死而衍代其位衍雖不能盡革其弊而衍居州十年頗以勤儉府庫盈溢穆贊代崔衍為宣歙池觀察使宣州歳饉贊遂以錢四十二萬貫代百姓之税故宣州人不流散鄭珣瑜貞元中為河南尹清浄恵下賤斂貴發以便百姓時吳少誠寇許州韓全義為招討使全義與監軍使發牒催督或非條珣瑜得牒輒挂壁不以付吏及軍罷盡數百封其所供市草粟珣瑜素以儲積於陽翟密縣與官軍相近故河南百姓不知僦運之勞而事集矣房式憲宗元和中為河南尹時討王承宗於鎮州配河南府餽餫車四千輛式表以㓙旱人貧力微難以徵發帝可其奏既免役人懐而安之李渤為江州刺史張平叔判度支奏徵久逺逋懸渤在州上疏曰伏奉詔勑云度支決奏令臣設計徵填當州貞元二年逃戸所欠錢四千四百四十貫臣當州管田二千九百一十七頃今巳旱死一千九百頃有餘若更勒狥度支使所為必懼史官書陛下於大旱中徵三十六年前逋懸臣任刺史罪無所迯臣既上副聖情下不忍鞭笞黎庶不敢輕離符印特乞放臣歸田穆宗下詔云江州所奏實為懇誠若更抑為必難勝濟所訴逋欠宜令時放衞次公為陜虢觀察使請蠲租錢三百萬人得蘇息後唐安彦威為河中節度上言被省符課丁夫運石脩河隄農事方急請以牢城軍千人代役從之晉東郡留守石重人奏皇后一行發往汴州所有汾路支贍諸雜物色等並合雇脚乘搬䭾不擾百姓盧質知汴州軍府事時孔謙握利權志在聚歛累移文於汴配民放絲質堅論之事雖不行時論賞之漢趙徳鈞為薊門守以北虜孔熾雖軍威不振郡任甚理兵糧皆給於朝廷而百姓數年不藉租調増峻城洫惟以軍士役作境内歌頌冊府元龜卷六百八十八
