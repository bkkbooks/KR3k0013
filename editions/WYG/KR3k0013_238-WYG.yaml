body:
  text: 册府元龜卷二百三十八宋王欽若等撰列國君部智識謀畧任謀智識夫智周物表識洞機先持世保民前訓謂之明哲安時利物君子用為謀猷則列土之君享國之主任用靡失法令罔愆勵勤王之誠廣先世之業封疆不擾兵賦自彊則智識之有餘而思慮之無忽者也鄭莊公以魯隱公十一年七月㑹齊侯隱公伐許庚辰傅於許傅于許城下壬午遂入許許莊公奔衛齊侯以許讓公公曰君謂許不共故從君討之許既伏其罪矣雖君有令寡人弗敢與聞乃與鄭伯鄭伯使許大夫百里奉許叔以居許東偏曰天禍許國鬼神實不逞於許君而假手於我寡人寡人惟是一二父兄不能共億其敢以許自為功乎寡人有弟不能和協而使餬口於四方其况能久有許乎吾子其奉許叔以撫柔此民也吾將使獲也佐吾子獲鄭大夫公孫獲若寡人得殁乎地天其以禮悔禍於許無寧兹許公復奉其社稷唯我鄭國之有請謁焉如舊婚媾其能降以相從也降心以相從無滋他族實逼處此以與我鄭國爭此土也吾之子孫其覆亡之不暇而况能禋祀許乎寡人之使吾子處此不唯許國之為亦聊以固吾圉也圉邊􅂷乃使公孫獲處許西偏曰凡而器用財賄無寘於許我死乃亟去之吾先君新邑於此此今河南新鄭舊鄭在京兆王室而既卑矣周之子孫日失其序夫許大嶽之𦙍也天而既厭周德矣吾其能與許爭乎君子謂鄭莊公於是乎有禮楚文王以魯莊公十七年卒初申侯申出也姊妹之子為出有寵於楚文王文王將死與之璧使行曰唯我知女女專利而不厭予取予求不女疵瑕也從我取從我求我不以女為罪釁後之人將求多於女後人謂嗣君也求多於女謂以禮義大望責之女必不免我死女必速行無適小國將不女容焉政狹法峻既塟出奔鄭又有寵於厲公魯僖公七年鄭殺申侯子文聞其死也曰古人有言曰知臣莫若君弗可改也已秦穆公時晉殺㔻鄭㔻豹奔秦㔻豹㔻鄭之子言於秦伯曰晉侯背大主而忌小怨民弗與也伐之必出大主秦也小怨里㔻公曰失衆焉能殺謂殺里㔻之黨違禍誰能出君謂豹辟禍也楚成王時晉公子重耳之楚楚成王以適諸侯禮待之重耳謝不敢當趙衰曰子亡在外十餘年小國輕子况大國乎今楚大國而固遇子子其毋讓此天開子也遂以客禮見之成王厚遇重耳重耳甚卑成王曰子即反國何以報寡人重耳曰羽毛齒角玉帛君王所餘未知所以報王曰雖然何以報不穀重耳曰即不得已與君王以兵車㑹平原廣澤請辟王三舍司馬法曰從遯不過三舍九十里也楚將子玉怒曰王遇晉公子至厚今重耳言不孫請殺之成王曰晉公子賢而困於外久從者皆國器此天所置庸可殺乎且言何以易之莊王伐宋晉文公救宋楚子入居於申申在方城故曰入使申叔去穀僖公二十六年申叔戍穀使子玉去宋曰無從晉師晉侯在外十九年矣而果得晉國晉侯生十七年而亡十九年而反凡三十六年至此四十矣險阻艱難備嘗之矣民之情偽盡知之矣天假之年獻公之子九人唯文公在故曰天假之年而除其害除惠懐呂郤天之所置其可廢乎軍志曰允當則歸無求過分軍志兵書又曰知難而退又曰有德不可敵此三志者晉之謂矣子玉使請戰王怒少與之師楚師敗績魯宣公十三年及晉師戰於邲晉師敗績楚子次于衡雍潘黨曰君盍築武軍築軍營以彰武功而收晉尸以為京觀積尸封土其上謂之京觀臣聞克敵必示子孫以無忘武功楚子曰非爾所知也夫文止戈為武文字武王克商作頌曰載戢干戈載櫜弓矢戢藏也櫜韜也詩美武王能誅滅暴亂也我求懿德肆于時夏允王保之肆遂也夏大也言武王既息兵又能求美德故遂大而信王保天下又作武其卒章曰耆定爾功武頌篇名耆致也言武王誅紂致定其功其三曰鋪時繹思我徂惟求定其三三篇鋪布也繹陳也時是也思辭也頌美武王能布政陳教使天下歸往求安定其六曰綏萬邦屢豐年其六六篇綏安也屢數也言武王既安天下數致豐年此三六之數與今詩頌篇次不同葢楚樂歌之篇夫武禁暴戢兵保大定功安民和衆豐財者也此武七德故使子孫無忘其章若之篇章使子孫不忘今我使二國暴骨暴矣觀兵以威諸侯兵不戢矣暴而不戢安能保大猶有晉存焉得定功所違民欲猶多民何安焉無德而彊爭諸侯何以和衆利人之幾幾危也而安人之亂以為己榮何以豐財兵動則年荒武有七德我無一焉何以示子孫其為先君宮告成事而已祀先君告戰勝武非吾功也古者明王伐不敬取其鯨鯢而封之以為大戮於是乎有京觀以懲淫慝鯨鯢大魚以喻不義之人吞食小國今罪無所晉罪無所犯也而民皆盡忠以死君命又何以為京觀乎祀於河作先君宮告成事而還晉文公敗楚於城濮子玉及連穀而死晉侯聞之而後喜可知也喜見顔色曰莫余毒也已蒍莒臣實為令尹奉己而已不在民矣楚共王時申公巫臣奔晉而因郤至郤至克族子以臣於晉晉人使為邢大夫邢晉邑楚子反請以重幣錮之禁錮勿令仕王曰止其自為謀也則過矣其為吾先君謀也則忠忠社稷之固也所盖多矣盖覆也且彼若能利國家雖重幣晉將可乎言不許若無益於晉晉將棄之何勞錮焉為七年楚滅巫臣族晉南通吳張本齊湣王欲為從長惡楚之與秦合乃使使遺楚王書曰寡人患楚之不察於尊名也今秦惠王死武王立張儀走魏樗里疾公孫衍用而楚事秦夫樗里疾善乎韓而公孫衍善乎魏楚必事秦韓魏恐必因二人求合於秦則燕趙亦宐事秦四國爭事秦則楚為郡縣矣王何不與寡人并力收韓魏燕趙與為從而尊周室以安兵息民令於天下天下莫敢不樂聽則王名成矣王率諸侯竝伐破秦必矣王取武關蜀漢之地私吳越之富而擅江海之利韓魏割上黨西薄函谷則楚之彊百萬也且王欺於張儀亡地漢中兵挫藍田天下莫不代王懐怒今乃欲先事秦願大王熟計之楚王業已欲和於秦見齊王書猶豫不决下其議羣臣羣臣或言和秦或言聽齊昭雎曰王雖東取地於越不足以雪恥必且取地於秦而後足以雪恥於諸侯王不如深善齊韓以重樗里疾如是則王得齊韓之重以求地矣秦破韓宐陽而韓猶復事秦者以先王墓在平陽而秦之武遂去之七十里以故尤畏秦不然秦攻三川趙攻上黨楚攻河外韓必亡楚之救韓不能使韓不亡然存韓者楚也韓已得武遂於秦以河山為塞所報德莫如楚厚臣以為其事王必疾齊之所信於韓者以韓公子昧為齊相也韓已得武遂於秦王甚善之使之以齊韓重樗里疾疾得齊韓之重其主弗敢棄疾也今又益之以楚之重樗里子必言秦復與楚侵地矣於是懐王許之竟不合秦而合齊以善韓謀畧班固有言權謀者以正守國以竒用兵先計而後戰故春秋之世彊覇之君兼弱攻昧行是道也乃有割天性之親以結其私愛乘事機之變以致其震恐或陽善而弛其備或求成而紓其難片言激怒三軍為之鼔行單介致命千乘為之罷舉故能敵大以小圖安於危是皆變詐出乎其心幾㣲究乎其表乃至自為之使以入彊國親改其服以從異俗孟子所謂五霸之罪人也其信然乎鄭武公欲伐胡廼以其子妻之因問羣臣曰吾欲用兵誰可伐者關其思曰胡可伐廼戮關其思曰胡兄弟之國也子言伐之何也胡君聞之以鄭為親已而不備鄭鄭人襲胡取之晉文公初奔狄惠公畏文公乃使宦者履鞮與壯士欲殺重耳文公名重耳聞之乃謀趙衰等曰始吾奔狄非以為可用欲以近易通故且休足久矣故願徙之大國夫齊桓公好善志在霸王収恤諸侯今聞管仲隰朋死此亦欲得賢佐盍往乎於是遂行後反國伐曹門焉多死攻曹城門曹人尸諸城上磔晉死人於城上晉侯患之聽輿人之謀曰稱舍於墓輿衆也舍墓為將發冡師遷焉曹人兇懼遷至曹人墓兇兇恐懼聲為其所得者棺而出之因其兇也而攻之遂入曹楚文王欲取息與蔡息蔡二國名乃先詐善蔡侯而與之謀曰吾欲得息奈何蔡侯曰息夫人吾妻之姨蔡侯哀侯也妻之娣為姨吾請為饗俱入息因以甲徂遂取息旋㑹于蔡又取蔡不勞師徒得之曰取言易也莊王九年令尹子越椒以若敖氏處烝野將攻王王與若敖氏戰于臯滸楚地名伯棼射王汰輈及鼓跗著於丁寧伯棼越椒也輈車轅汰過也箭過車轅上丁寧鉦也又射汰輈以貫笠轂兵車無蓋尊者則邊人執笠依轂而立以禦寒暑名曰笠轂言箭及王之蓋師懼退王使巡師曰吾先君文王克息獲三矢焉伯棼竊其二盡於是矣鼓而進之遂滅若敖氏吳闔閭六年桐叛楚桐小國瀘江舒縣西南有桐鄉吳子使舒鳩氏誘楚人舒鳩楚屬國曰以師臨我教舒鳩誘楚使以師臨吳我伐桐為我使之無忌吳伐桐也偽若畏楚師之臨已而為伐其叛國以取媚者也欲使楚不忌吳所謂多方以誤之秋楚嚢瓦伐吳師於豫章從舒鳩言吳人見舟於豫章偽將為楚伐桐而潛師于巢實欲以擊楚冬十月吳軍楚師戰于豫章敗之楚不忌故遂圍巢克之獲公子繁繁守巣大夫越王句踐元年吳伐越楚五年越入吳越子句踐禦之陳于檇李句踐患吳之整也使死士再禽焉不動使敢死之士往輙為吳所禽欲使吳師亂取之而吳不動使罪人三行屬劍於頸以劍注頸而辭曰二君有治治軍旅臣奸旗鼓犯軍令不敏於君之行前不敢逃刑敢歸死遂自刎也師屬之目越子因而伐之大敗之射傷吳王闔閭闔閭且死告其子夫差曰必毋忘越三年句踐興師伐吳吳王聞之悉發精兵擊越敗之夫椒越王以餘兵五千棲於㑹稽之上使大夫種行成於吳曰寡君句踐乏無所使使下臣種不敢徹聲聞於天王私於下執事曰寡君之師徒不足以辱君矣願以金玉子女賂君之辱請句踐女女於王大夫女女於大夫士女女於士越國之寶器畢從寡君帥越國之衆以從君之師徒唯君左右之若以越國之罪為不可赦也將焚宗廟係妻孥沉金玉於江有帶甲五千人將以致死乃必有偶是以帶甲萬人事君也無乃即傷君王之所愛乎與其殺是人也寧其得此國也其孰利乎夫差將欲聽與之行成子胥諫不聽遂許之後越伐吳吳子禦於笠澤夾水而陣越為左右句卒句卒鉤伍相著别為左右屯也使夜或左或右鼓譟而進吳師分以禦之越以三軍潛渉當吳中軍而鼓之吳師大亂遂敗之左右勾卒為聲勢以分吳軍而三軍精兵并力擊其中軍故得勝趙武靈王十九年正月大朝信宫召肥義與議天下五日而畢王北畧中山之地至於房子遂之代北至無窮西至河登黄華之上召樓緩謀曰我先王因世之變以長南藩之地屬阻漳滏之險立長城又取藺郭狼敗林人於荏而功未遂今中山在我腹心北有燕東有胡西有林胡樓煩秦韓之邊而無彊兵之救是亡社稷奈何夫有髙世之名必有遺俗之累吾欲胡服樓緩曰善羣臣皆不欲於是肥義侍王曰簡襄主之烈計胡翟之利為人臣者寵有孝弟長幼順明之節通有補民益主之業此兩者臣之分也今吾欲繼襄王之跡開於胡翟之鄉而卒世不見也為敵弱用力少而功多可以毋盡百姓之勞而序往古之勲夫有高世之功者負遺俗之累有獨智之慮者任驁民之怨今吾將胡服騎射以教百姓而世必議寡人奈何肥義曰臣聞疑事無功疑行無名王既定負遺俗之慮殆無顧天下之議矣夫論至德者不和於俗成大功者不謀於衆昔者舜舞有苗禹袒裸國非以養欲而樂志也務以論德而約功也愚者闇成事智者覩未形則王何疑焉王曰吾不疑胡服也吾恐天下笑我也狂夫之樂智者哀焉愚者所笑賢者察焉世有順我者胡服之功未可知也雖驅世以笑我胡地中山吾必有之於是遂胡服矣使王緤告公子成曰寡人胡服將以朝也亦欲叔服之家聽於親而國聽於君古今之公行也子不反親臣不逆君兄弟之通義也兄弟一作元夷元始也夷平也今寡人作教易服而叔不服吾恐天下議之也制國有常利民為本從政有經令行為上明德先論於賤而行政先信於貴今胡服之意非以養欲而樂志也事有所止而功有所出事成功立然後善也今寡人恐叔之逆從政之經以輔叔之議且寡人聞之事利國者行無邪因貴戚者名不累故願慕公叔之義以成胡服之功使緤謁之叔請服焉公子成再拜稽首曰臣固聞王之胡服也臣不佞寢疾未能趨走以滋進也王命之臣敢對因竭其愚忠曰臣聞中國者蓋聰明狥智之所居也五帝本紀云幼而狥齊萬物財用之所聚也賢聖之所教也仁義之所施也詩書禮樂之所用也異敏技能之所試也逺方之所觀赴也蠻夷之所義行也今王舍此而襲逺方之服變古之教易古之道逆人之心而怫學者離中國故臣願王圖之也使者以報王曰臣固聞叔之疾也我將自往請之王遂往之公子成家因自謂之曰夫服者所以便用也禮者所以便事也聖人觀鄉而順宐因事而制禮所以利其民而厚其國也夫剪髪文身錯臂左袵甌越之民也黑齒雕題以草染齒用白作黒雕文謂刻其肌以丹青湼之却冠秫絀戰國策作秫縫絀亦縫之别名也鉥者綦鍼也古字假借故作秫絀耳此蓋言其女功緘縷之麄拙也又一本作鮭冠黎緤也大吳之國也故禮服莫同其便一也鄉異而用變事異而禮易是以聖人果可以利其國不一其用果可以便其事不同其禮儒者一師而俗異中國同禮而教離况於山谷之便乎故去就之變智者不能一逺近之服賢聖不能同窮鄉多異曲學多辨不知而不疑異於己而不非者公焉而衆求盡善也今叔之所言者俗也吾所言者所以制俗也吾國東有河薄洛之水安平經縣西有漳水津名薄洛津與齊中山同之無舟楫之用自常山以至代上黨一云自常山以下代上黨以東東有燕東胡之境而西有樓煩秦韓之邊今無騎射之備故寡人無舟楫之用夾水居之民將何以守河薄洛之水變服騎射以備燕三胡秦韓之邊且昔者簡主不塞晉陽以及上黨而襄主并戎取代以攘諸胡此愚智所明也先時中山負齊之彊兵侵暴吾地係累吾民引水圍鄗㣲社稷之神靈則鄗幾於不守也先王醜之而怨未能報也今騎射之備近可以便上黨之形而逺可以報中山之怨而叔順中國之俗以逆簡襄之意惡變服之名以忘鄗事之醜非寡人之所望也公子成再拜稽首曰臣愚不逹於王之義敢道世俗之聞臣之罪也今王將繼簡襄之意以順先王之志臣敢不聽命乎再拜稽首乃賜胡服明日服而朝於是始出胡服令也趙文趙造周袑戰國䇿作紹袑音紹趙俊皆諫止王毋胡服如故法便王曰先王不同俗何古之法帝王不相襲何禮之循虙戲神農教而不誅黄帝堯舜誅而不怒及至三王隨時制法因事制禮法度制令各順其宐衣服器械各便其用故禮也不必一道而便國不必古聖人之興也不相襲而王夏殷之衰也不易禮而滅然則反古未可非而循禮未足多也且服竒者志淫則是鄒魯無竒行也俗辟者民易則是吳越無秀士也且聖人利身謂之服便事謂之禮夫進退之節衣服之制者所以齊常民也非所以論賢者也故齊民與俗流賢者與變俱故諺曰以書御馬者不盡馬之情以古制今者不逹事之變循法之功不足以高世法古之學不足以制今子不及也遂胡服招騎射其後武靈王傳國於子惠文王乃自號主父主父欲令子主治國而身胡服將士大夫西北略胡地而欲從雲中九原直南襲秦於是詐自為使者入秦秦昭王不知已而恠其狀甚偉非人臣之度使人逐之而主父馳已脱闗矣審問之乃主父也秦人大驚主父所以入秦者欲自畧地形因觀秦王之為人也惠文王二年主父行新地遂出代西遇樓煩王於西河而致其兵三年滅中山遷其王於膚施在上郡起靈壽在常山北地方從代道大通還歸行賞大赦任謀詩曰周爰咨謀書曰謀及卿士自周之東遷諸侯力攻征伐自出權譎相傾彊凌弱大侵小以至於戰國謀臣辨士比比而有乃能詢求聽納用其所長規轉川流風行霆斷繇是克敵而益壤和戎以靖國持危以紓難治煩而解紛至於反間變詐隂詭竒巧以濟一時之務者有之矣蓋利之所在見幾而作夫豈暇顧道家之所忌哉晉獻公朝諸大夫而問焉曰寡人夜者寢而不寐其意何也諸大夫有進對者曰寢不安與其諸侍御有不在側者與獻公不應荀息進曰虞郭見與猶曰虞郭豈見於君之心乎荀息素知獻公欲伐此國故云耳獻公揖而進之以手通指曰揖遂與之入而謀曰吾欲攻虢則虞救之攻虞則虢救之如之何願與子慮之荀息對曰君若用臣之謀則今日取虢而明日取虞爾君何憂焉獻公曰然則奈何荀息曰請以屈産之乘屈産出名馬之地乘備駟也與􅂷棘之白璧􅂷棘出美玉之地玉以尚白為美往必可得也則寶出之内府藏之外府如虞可得猶外府藏也馬出之内廐繫之外廐爾君何喪焉獻公曰諾雖然宫之竒存焉如之何荀息曰宫之竒知則知矣君欲言其知實知也雖然虞公貪而好寶必不從其言請終以往於是終以往虞公見寶許諾宫之竒果諫云記曰唇亡則齒寒記史記也虞虢之相救非相為賜賜猶惠也則晉今日取虢而明日虞從而亡耳君請勿許也虞公不從其言終假之道以取虢明虢非虞不滅虞當坐滅人還四年反取虞還復往故云反虞公抱寶牽馬而至荀息見曰臣之謀何如獻公曰子之謀則已行矣寶則吾寶也然馬之齒亦已長矣蓋􅃧之也以馬齒長戲之喻荀息之年老道此者以終荀息宫之竒言且以為戒悼公五年無終子嘉父使孟樂如晉無終山戎國名孟樂其使臣因魏莊子納虎豹之皮以請和諸戎欲戎與晉和莊子魏絳晉侯曰戎狄無親而貪不如伐之魏絳曰諸侯新服陳新來和將觀於我我德則睦否則擕貳勞師於戎而楚伐陳必弗能救是棄陳也諸華必叛諸華中國戎禽獸也獲戎失華無乃不可乎公曰然則莫如和戎乎對曰和戎有五利焉戎狄薦居貴貨易土薦聚也易猶輕也土可賈焉一也邊鄙不聳民狎其野穡人成功二也聳懼狎習也戎狄事晉四鄰振動諸侯威懐三也以德綏戎師徒不勤甲兵不頓四也頓壊也鑒於后羿而用德度以后羿為鑒戒逺至邇安五也君其圖之公説使魏絳盟諸戎脩民事田以時傳言晉侯能用善謀楚襄王為太子之時質於齊懐王薨太子辭於齊王而歸齊王隘之曰予我東地五百里乃歸子子不與我不得歸太子曰臣有傅請退而問𫝊慎子曰獻之地所以為身也愛地不送死父不義臣故曰獻之使太子入致命齊王曰敬獻地五百里齊王歸楚太子太子歸即位為王齊使車五十乘來取東地於楚楚王告慎子曰齊使求地為之奈何慎子曰王明日朝羣臣皆令獻其計上柱國子良入見王曰寡人之得求反主墳墓復羣臣歸社稷也以東地五百里許齊齊令使來求地為之奈何子良曰王不可不與也王身出玉聲許彊萬乘之齊而不與則不信後不可以約結諸侯請與而復攻之與之信攻之武臣故曰與之子良出昭常入見王曰齊使來求東地五百里為之奈何昭常曰不可與也萬乘者以地大為萬乘今去東地五百里是去戰國之半也有萬乘之號而無千乘之用也不可臣故曰勿與常請守之昭常出景鯉入見王曰齊使來求東地五百里為之奈何景鯉曰不可與也雖然楚不能獨守王身出玉聲許萬乘之齊也而不與負不義於天下楚亦不能獨守臣請西索救於秦景鯉出王入以三大夫計告慎子曰子良見寡人曰不可不與也與而復攻之常見寡人曰不可與也常請守之鯉見寡人曰不可與也雖然楚不能獨守也臣請索救於秦寡人誰用於三子之計慎子對曰王皆用之王怫然作色曰何謂也慎子曰臣請效其説而王且見其誠然也王發上柱國子良車五十乘而北獻地五百里於齊發子良之明日遣昭常為大司馬命往守東地遣昭常之明日遣景鯉車五十乘西索救於秦王曰善乃遣子良北獻地於齊遣子良之明日立昭常為大司馬使守東地又遣景鯉西索救於秦子良至齊齊使人以甲受東地昭常應齊使曰我典主東地且與死生悉五尺至六十三十餘萬敝甲鈍兵願承下塵齊王謂子良曰大夫來獻地今常守之何如子良曰臣身受命敝邑之王是常矯也王攻之齊王大興兵攻東地伐昭常未渉境彊秦以五十萬臨齊右壤曰夫隘楚太子弗出不仁又欲奪之東地五百里不義其縮甲則可不然則願待戰王恐焉乃請子良南道楚西使秦解齊患士卒不用東地復全秦繆公時戎王使繇余於秦繇余其先晉人也亡入戎能晉言聞繆公賢故使繇余觀秦繆公示以宫室積聚繇余曰使鬼為之則勞神矣使人為之亦苦民矣繆公怪之問曰中國以詩書禮樂法度為政然尚時亂今戎夷無此何以為治不亦難乎繇余曰此乃中國所以亂也夫自上聖黄帝作為禮樂法度身以先之僅以小治及其後世日以驕淫阻法度之威以責督於下下罷極則以仁義怨望於上上下交爭怨而相簒弑至於滅宗皆以此類也夫戎夷不然上含淳德以遇其下下懐忠信以事其上一國之政猶一身之治不知所以治此真聖人之治也於是繆公退而問内史廖曰内史周官也孤聞鄰國有聖人敵國之憂也今繇余賢寡人之害將奈之何内史廖曰戎王處辟匿未聞中國之聲君試遺其女樂以奪其志奪一作狥為繇余請以疏其間留而莫遣以失其期戎王怪之必疑繇余君臣有間乃可虜也且戎王好樂必怠於政繆公曰善因與繇余曲席而坐傳器而食問其地形與其兵勢盡詧而後令内史廖以女樂二人遺戎王戎王受而説之終年不還於是秦乃歸繇余繇余數諫不聽繆公又數使人間要繇余繇余遂去降秦繆公以客禮禮之問伐戎之形於是益國十二開地千里遂霸西戎張儀既相秦苴蜀相攻擊苴讀為苞黎之苞音與巴相近以為今之巴郡各來告急於秦秦惠王欲發兵以伐蜀以為道險狹難至而韓又來侵秦秦惠王欲先伐韓後伐蜀恐不利欲先伐蜀恐韓襲秦之敝猶豫未决司馬錯與張儀爭論於惠王之前司馬錯欲伐蜀張儀曰不如伐韓王曰請聞其説儀曰親魏善楚下兵三川塞斜谷之口一作尋成臯鞏縣有尋口當屯留之道魏絶南陽楚臨南鄭秦伐新城宐陽以臨二周之郊誅周王之罪侵楚魏之地周自知不能救九鼎寶器必出據九鼎案圖籍挾天子以令於天下天下莫敢不聽此王業也今夫蜀西僻之國而戎狄之倫也弊兵勞衆不足以成名得其地不足以為利臣聞爭名者於朝爭利者於市今三川周室天下之朝市也而王不爭焉顧爭於戎狄去王業逺矣司馬錯曰不然臣聞之欲富國者務廣其地欲彊兵者務富其民欲王者務博其德三資者備而王隨之矣今王地小民貧故臣願先從事於易夫蜀西僻之國也而戎狄之長也有桀紂之亂以秦攻之譬如使豺狼逐羣羊得其地足以廣國取其財足以富民繕兵不傷衆而彼已服焉抜一國而天下不以為暴利盡西海而天下不以為貪是我一舉而名實附也而又有禁暴止亂之名今攻韓刼天子惡名也而未必利也又有不義之名而攻天下所不欲危矣臣請論其故周天下之宗室也齊韓之與國也周自知失九鼎韓自知亡三川將二國并力合謀以因乎齊趙而求解乎楚魏以鼎與楚以地與魏王弗能止也此臣之所謂危也不如伐蜀完惠王曰善寡人請聽子卒起兵伐蜀十月取之遂定蜀貶蜀王更號為侯而使陳莊相蜀蜀既屬秦秦以益彊富厚輕諸侯齊桓公十五年秦魏攻韓韓求救於齊桓公召大臣而謀曰蚤救之孰與晩救之騶忌子曰不若勿救段干朋曰不救則韓且折而入於魏不若救之田臣思曰過矣君之謀也秦魏攻韓楚趙必救之是天以燕予齊也桓公曰善乃隂告韓使者而遣之韓自以為得齊之救因與秦魏戰楚趙聞之果起兵而救之齊因起兵襲燕國取桑丘威王二十六年魏惠王圍邯鄲趙求救於齊齊威王召大臣而謀曰救趙孰與勿救騶忌子曰不如勿救段干朋曰不救則不義且不利威王曰何也對曰夫魏氏并邯鄲其於齊何利哉且夫救趙而軍其郊是趙不伐而魏全也故不如南攻襄陵以弊魏邯鄲拔而乘魏之弊威王從其計宣王二年魏伐趙趙與韓親共擊魏趙不利戰於南梁宣王召田忌復故位韓氏請救於齊宣王召大臣而謀曰蚤救孰與晩救騶忌子曰不如勿救田忌曰弗救則韓且折而入於魏不如早救之孫子曰夫韓魏之兵未弊而救之是吾代韓受魏之兵顧反聽命於韓也且魏有破國之志韓見亡必東面而愬於齊矣吾因深結韓之親而晩承魏之弊則可必重利而得尊名也宣王曰善乃隂告韓之使者而遣之韓因恃齊五戰不勝而東委國於齊因起兵使田忌田嬰將嬰一作朌孫子為帥救韓趙以擊魏大敗之馬陵殺其將龎㳙虜魏太子申襄王立田單相之過菑水有老人渉菑而寒出不能行坐沙中田單見其寒欲使後軍分之衣無可以分者單解裘而衣之襄王惡之曰田單之施將欲以取我國乎不早圖恐後之左右顧無人巖下有貫珠者襄王呼而問之曰女聞言乎對曰聞之王曰女以為何若對曰王不如因以為己善王嘉單之善下令曰寡人憂民之饑也單収而食之寡人憂民之寒也單解裘而衣之寡人憂勞百姓而單亦憂之稱寡人之意單有是善而王嘉之善單之善亦王之善已王曰善乃賜單牛酒嘉其行後數日貫珠者復見王曰王至朝日宐召田單而揖之於庭口勞之乃布令求百姓之饑寒者收穀之乃使人聽於閭里聞丈夫之相與語曰田單之愛人嗟乃王之教也册府元龜卷二百三十八
