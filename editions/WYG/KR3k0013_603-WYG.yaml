body:
  text: 册府元龜卷六百三宋王欽若等撰學校部奏議第二宋范泰為國子祭酒時高祖初受命議建國學泰上表曰臣聞風化興於哲王敦倫表於盛世至悦莫先講習甚樂必寄朋來古人成童入學易子而教尋師無逺負糧忘艱安親光國莫不由禮此若能出不由戸則斯道莫從是以明詔爰發已成渙汗學制既下逺近遵承臣之愚懐少有未逹今惟新告始盛業初基天下改觀有志景慕而置生之制取少停多開不來之端非一途而已臣以家推國則知所聚不多恐不足以宣大宋之風引濟濟之美臣謂合選之家雖制所未逹父兄欲其入學理合開通雖小為晨昏所以大引孝道不修春秋則所陷或大故趙盾忠而書弑許止孝而得罪於斯為戒可不懼哉十五志學誠有其文若年降無幾而深有志向者何必限以一格而不許其進邪楊􅀈豫𤣥實在弱齒五十學易乃無大過昔中朝助教亦用二品潁川陳載以辟大保掾而國子取為助教即大尉淮之弟所貴在於得才無繫於定品教學不篤奬勵不著今有職閑而學優者可以本官領之門地堪二品宜以朝請領助教既可以甄其名品斯以敦學之一隅其二品才堪自依舊從事㑹今生徒有期而學校未立覆簣實望其速向轍已淹其遲事有以賖而宜急者殆此之謂古人重寸隂而賤尺璧其道然也時學竟不立梁周𢎞正累遷國子博士啓武帝周易疑義凡五十條又請釋乾坤二繫曰臣聞易稱立象以盡意繫辭以盡言然後知聖人之情幾乎不可見矣自非含微體極盡化窮神豈能通志成務探賾致逺而宣尼之比桎梏絶韋編於漆字軒轅之所聽瑩遷𤣥珠於赤水伏惟陛下一日萬㡬匪勞神於瞬息凝心妙本常自得於天眞聖智無以隠其㡬深明神無以輸其不測至若爻畫之苞於六經文辭之窮其兩繫名儒劇談以歴載鴻生扺掌以經年莫有試逰其藩未嘗一見其族自制㫖降談裁成易道析至理於秋毫渙層氷於幽谷臣親承音㫖職司宣授後進詵詵不無傳業但乾坤之蘊未剖繫表之妙莫銓使一經深致尚多所惑臣不揣庸淺輕率短陋謹與受業諸生清河張譏等三百一十二人於乾坤二繫象爻未啓伏願聽覧之閑曲垂提訓得使微臣鑚仰成其篤習後昆好事專門有奉自惟多幸俱沐道於堯年肄業終身不知老之將至詔答曰設卦觀象事逺文高作繫表言辭深理奥東魯絶編之思西伯幽憂之作事逾三古人更七聖自商瞿禀承子庸傳受篇簡湮沒歳月遼逺田生表淄川之譽梁丘擅瑯琊之學代郡范生山陽王氏人藏荆山之寳各盡𤣥言之趣説或去取意有詳畧近縉紳之學咸有稽疑隨答所問已具别觧知與張譏等三百一十二人湏釋乾坤文言及二繫萬㡬小暇試當討論陳沈不害文帝天嘉初為衡陽王府中記室叅軍兼嘉徳殿學士自梁季䘮亂至是國學未立不害上書曰臣聞立人建國莫尚於尊儒成俗化民必崇於教學故東膠西序事隆乎三代環林璧水業盛於兩京自淳源既逺澆波已扇物之感人無窮人之遂欲無節是以設訓垂範啓導心靈譬彼染藍類諸琢玉然後人倫以睦卑高有序忠孝之理既明君臣之道攸固執禮自基魯公所以難侮歌樂已細鄭伯於是前亡干戚舞而有苖至泮宫成而淮夷服長想洙泗之風載懐淹稷之盛有國有家莫不尚矣梁太清季年數鍾否剝夷狄外侵姦回内奰朝聞鼔􅎏夕炤􅇏火洪儒碩學觧散甚於坑夷五典九丘湮滅逾乎帷盖成均自斯墜業瞽宗於是不修褒成之祠弗陳祼享釋菜之禮無稱俎豆頌聲寂寞遂踰一紀後生敦悦不見函丈之禮晩學鑚仰徒深避席之歎陛下繼厯升統握鏡臨㝢道洽寰中威加無外濁流已清重氛載廓含生熈阜品庶咸亨宜其𢎞振禮樂建立庠序式稽古典愼簡儒官選公卿國子皆入於學助教博士朝夕講肄使擔簦負笈鏘鏘接袵方領矩歩濟濟成林如切如磋聞詩聞禮一年可以功倍三冬於是足用故能擢秀雄州揚庭觀國入仕登朝資優學以自輔蒞官從政有經業以治身轓駕列庭青紫拾地古者王世子之貴猶與國子齒降及漢儲兹禮不墜暨兩晉斯事彌隆所以見師嚴而道尊者也皇太子天縱生知無待審喻猶宜晦迹俯同專經請業奠爵前師肅若舊典昔闕里之堂草萊自闢舊宅之内絲竹流音前聖遺烈深垂警戒况復江表無虞海外有截豈得不開闡大猷恢𢎞至道寜可使𤣥教儒風弗興聖世盛德大業遂蘊堯年臣末學小生詞無足算輕獻瞽言伏増悚惕詔答曰省表聞之自舊章弛廢微言將絶朕嗣膺寳業念在緝熈而兵革未息軍國草創常恐前世令典一朝泯滅卿才思優洽文理可求𢎞惜大體殷勤名教付外詳議依事施行後魏高允為中書令獻文初詔允曰自頃以來庠序不見為日乆矣道肆陵遲學業遂廢子衿之嘆復見於今朕既纂統大業中外咸安稽之舊典欲置學宫於郡國使進修之業有所津竒卿儒宗元老朝望舊徳宜與中秘二省參議以聞允表曰臣聞經綸大業必以教飬為先咸秩九疇亦由文徳成務故辟雍光於周詩泮宮顯於魯頌自永嘉以來舊章殄滅鄉閭無雅誦之聲京邑絶釋奠之禮道業陵夷百五十載仰惟先朝每欲憲章昔典經闡儒風方事尚殷弗遑克服陛下欽明文思纂成洪業萬國咸寜百揆時序申祖宗之遺志興禮樂之絶業爰發徳音惟新文教縉紳黎獻莫不幸甚臣承㫖勑竝集二省披覧使籍備究典紀靡不敦儒以觀其業貴學以篤其道伏思明詔𤣥同古義宜如聖㫖營建學校以勵風俗使先王之道光演於明時郁郁之音流聞於四海請制大郡立博士二人助教四人學生一百人次郡博士一人助教二人學生八十人中郡博士一人助教二人學生六十人下郡立博士一人學生四十人其博士取博閲經典世履忠清堪為人師者年限四十以上助教亦與博士同年限三十以上通業夙成才任教授不拘年齒學生取郡中清望人行脩謹堪循名教者先進高門次及中第獻文從之郡國立學自此始也鄭道昭孝文時為國子祭酒上表曰臣竊以為崇治之道必也須才養才之要莫先於學今國子學堂房粗置生誦闕爾城南太學漢魏石經丘墟殘毁黎藿榛蕪逰兒牧竪為之歎息有情之軰實亦悼心况臣親司而不言露伏願天慈廻神紆盻賜垂覽察若臣微意萬一合允重勑尚書門下考論營制之模則三雍可翹立而興毁銘可不日而就樹舊經於帝京播茂範於不朽斯有天下者之美業也不從道昭又表曰臣聞唐虞啓運以文徳為本殷周刑治以道藝為先然則禮樂者為國之基不可斯湏廢也是故周敷文教四海宅心魯秉周禮強齊歸義及至戰國紛紜干戈逓用五籍灰焚羣儒坑殄賊仁義之經貴戰争之術遂使天下分離黔黎塗炭數十年間民無聊生者斯之由矣爰暨漢祖於行陣之中尚優引叔孫通等光武中興於撥亂之際乃使鄭衆范昇校書東觀降逮魏晉何常不殷勤於篇籍篤學於戎伍伏惟大魏之興也雖羣凶未殄戎馬在郊然猶招集英儒廣開學校用能闡道義於八荒布盛徳於萬國教靡不懐風無不􅅯今者乗休平之基開無疆之祚定鼎伊瀍惟新寳厯九服感至徳之和四垠懐擊壤之慶而蠢爾閩呉阻化江湫先帝爰震武怒戎車不息而停鑾佇蹕留心典墳命故御史中尉臣李彪與吏部尚書任城王澄等妙選英儒以崇文教澄等依㫖置四門博士四十人其國子博士太學愽士及國子助教宿已簡置伏尋先時意存速就但軍國多事未遑營立自邇迄今垂將一紀學宮凋落四術寖廢遂使碩儒耆徳卷經而不談俗學後生遺本而逐末進競之風實由於此矣伏惟陛下欽明文思𤣥鍳洞逹越㑹未欵務脩道以來之遐方後服敷文教而懐之垂心經素優悠墳籍將使化越軒唐徳隆虞夏是故屢發中㫖敦營學舘房宇既脩生徒未立臣學陋全經識蔽篆素然往年刪定律令謬預議筵謹依准前修尋訪舊事參定學令事訖封呈自邇迄今未蒙報判但廢學歴年經術淹滯請學令并制早勑施行使選授有依生徒可准詔曰具卿崇儒敦學之意良不可言新令尋班施行無逺可謂職思其憂無曠官矣道昭又表曰竊惟鼎遷中縣年將一紀縉紳褫業爼豆闕聞遂使濟濟明朝無觀風之美非所以光國宣風納民軌物臣自往年以來頻請學令竝置生員前後累上未蒙一報故當以臣職淺濫官無能有所感悟者也舘學既修生房粗構博士見員足可講習雖新令未頒請依舊權置國子學生漸開訓業使播教有章儒風不墜後生覩徙義之機學徒崇知新之益至若孔廟既成釋奠告始揖讓之容請俟令出不報孫惠蔚宣武初為秘書丞既入東觀見典籍未周乃上疏曰臣聞聖皇之御世也必幽贊人經叅天貳地憲章典故述導鴻猷故易曰觀乎天文以察時變觀乎人文以化成天下然則六經百氏圗書秘籍乃承天之正術治人之眞範是以溫柔疏逹詩書之教恭儉易良禮樂之道爻彖以精㣲為神春秋以屬辭為化故大訓炳於東序藝文光於麟閣斯實太平之樞宗勝殘之要道有國之靈基帝王之盛業安上靖民敦風美俗其在兹乎及秦棄學術禮經泯絶漢興求訪典文載舉先王遺典燦然復存暨光武撥亂日不暇給而入雒之書二千餘兩魏晉之世尤重典墳收亡集逸九流咸備觀其鳩閲史篇訪購經論紙竹所載畧盡無遺臣學闕通儒思不及逺徒循章句片義無立而慈造曲覃厠班秘省忝官承乏惟書是司而觀閣舊典先無定目新故雜糅首尾不全有者累帙數十無者曠年不冩或篇第褫落始末淪殘或文壊字誤謬爛相屬篇目雖多全定者少臣今依前丞臣盧昶所撰甲乙新錄欲禆殘補缺損併有無較練句讀以為定本次第均冩永為常式其秘省先無本者廣加推尋搜求令足然經記浩博諸子紛綸部帙既多章篇紕繆當非一二校書歳月可了今求令四門博士及在京儒生四十人在秘書省專精校考叅定字義如蒙聽許則典文允正羣書大集詔許之南安王禎之子英宣武時為吏部尚書奏謹按學令許州郡學生三年一較所通經數因正使列之然後遣使就郡練考臣伏惟聖明崇道顯成均之風蘊義光膠序之美是以大學之舘乆置於下國四門之教方稱於京里許習訓淹年聽授累紀然雋造之流應升於魏闕不革之軰宜返於齊民頃以皇都遷搆江陽未一故鄉校之訓弗遑上請致薫蕕之質均誨學庭蘭蕭之體等教文肆今外宰京官銓考向訖求遣四門博士明通五經者道别較練依令黜陟詔曰學業墮廢為日已乆非一朝能勸此當别勑劉芳為侍中領國子祭酒宣武時芳上表曰夫為國家者罔不崇儒尊道學校為先成復政有質文茲範不易諒由萬端兹始衆務所禀故也唐虞已往典籍無據隆周已降任居虎門周禮大司徒云師氏掌以媺詔王居虎門之左司王朝虎門路寢之門王視朝於門外畫虎為司王朝言察王之視朝也掌國中失之事以教國子弟中失謂中禮及失禮者蔡氏勸學篇云周之師氏居虎門左敷陳六藝以教國子今之祭酒即周師氏雒陽記國子學官與天子對太學在開陽門外按學記云古之王者建國君民教學為先鄭氏注云内則設師保以教使國子學焉外則有太學庠序之官由斯而言國學在内太學在外明矣按如雒陽記猶有仿像臣愚謂今既徙縣崧瀍皇居伊雒宫闕府寺僉復故址至於國學豈可外替挍量舊事應在宮門之左右至如太學基所炳在仍舊營搆又去太和二十年發勑立四門博士於四門置學臣按自周以來學惟有二或尚西或尚東或貴在國或貴在郊爰暨周室學盖有六師氏居内太學在國四小在鄉郊禮記云周人養庶老於虞庠虞庠在國之西郊禮又云天子設四學當入學而太子齒注云四學周四郊之虞庠也按大戴保傅篇云帝入東學尚親而貴仁帝入南學尚齒而貴信帝入西學尚賢而貴徳帝入北學尚貴而尊爵帝入太學承師而問道周之五學於此彌彰按鄭注學記周則六學所以然者法云内則設師保以教使國子學焉外則有太學庠序之官此其正也漢魏已降無復四郊謹尋先時宜在四門按王肅注云天子四郊有學去王都五十里考之鄭氏不云逺近今太學故坊基址寛曠四郊别置相去遼濶簡督難周計太學坊并作四門猶為太廣以臣愚量同處無嫌且今時置制多循中代未審四學應從古否求集儒禮官議定其所從之遷中書令祭酒如故崔光孝明時為車騎大將軍領國子祭酒上表曰詩稱蔽芾丼棠勿翦勿伐召伯所茇又云雖無老成人尚有典刑傳曰思其人猶愛其樹况用其道而不䘏其人是以書始稽古易本山泉觀於天文以察時變觀於人文以化天下孟子覈實衡向計説安世記箧於汾南伯山抱卷於河右元始孤論充漢帝之坐孟皇片字懸魏王之帳前哲之寳重墳典珍愛分篆猶若此之至也矧廼聖典鴻經炳勒金石理為國楷義成家範迹實世模事則人軌千載之格言百王之盛烈而令焚荒汙毁積榛棘而弗掃鼯鼬之所栖宿童竪之所登踞者哉誠可為痛心疾首拊膺扼腕伏惟皇帝陛下孝敬日休自天縱睿垂心初學儒業方熙皇太后欽明慈淑臨制統化崇道重教留神翰林將披雲臺而問禮拂麟閣以招賢誠宜將開闕里清彼孔堂而使近在城闉面接宫廟舊校為墟子衿永替豈所謂建國君民教學為先京邑翼翼四方是則也尋石經之所起自炎劉繼以曹氏論初乃三百餘載計未向二十紀矣昔來雖屢經戎亂猶未大相傾如聞往者刺史臨州多搆圗寺道俗諸用稍有發掘基蹠泥灰或出於此皇都始遷尚可補復軍國務殷遂不存簡官私顯隠漸加剝撤播麥納菽秋春相因閉生蒿杞時致火燎由是經石彌滅文字增缺職忝胄教參掌經訓不能繕修頽墜興復生業倍深慚恥今來遣國子博士一人堪任幹事者主周視驅禁田收制其踐穢科閲碑牒所失次第量厥補綴詔曰此乃學者之根原不朽之永格垂範將來憲章之本便可一依公表光乃令國子博士李郁與助教韓神固劉爕等勘校石經其殘缺者石功并字多少欲補治之於後靈太后廢遂寢羊深前廢帝時為散騎常侍兼侍中是時膠序廢替名教陵遲深乃上疏曰臣聞崇禮建學列代之所循尊經重道百王所不易是以均塾洞啓昭明之頌載揚膠序大闕郁穆之詠斯顯伏惟大魏乗乾統物欽若奉時模唐軌虞率由前訓重以高祖累聖垂衣儒風載蔚得才之盛如彼薪􅀢固以追隆周而竝驅駕炎漢而獨邁宣皇下武式遵舊章用能揄揚盛烈聿修厥美自兹已降世極道消風猷稍逺澆薄方競退讓寂寥地競靡節進必吏能外非學藝是使刀筆小用計日而期榮專經大才甘心於陋巷然治之為本斯貴得賢茍値其人豈拘常檢三代兩漢異世間出或釋褐中林鬱登卿尹或投竿釣渚徑升公相事炳丹青義在往䇿悠哉邈乎不可勝紀竊以今之所用弗修前矩至如當世通儒冠之盛徳見徵不過四門登庸不越九品以此取士求之濟治譬猶却行以及前之燕而向楚積習之不可者其所由來漸矣昔魯興泮宮頌聲爰發鄭廢學校國風已譏將以納民軌物莫始於經禮菁莪育才義光於篇什自兵亂以來垂將十載干戈日陳爼豆斯闕四海荒涼民物凋弊名教頓虧風流殆盡世之陵夷可為歎息陛下中興纂厯理運惟新方隅稍厚實惟文徳但禮賢崇讓之科治世未備還淳反朴之化起言斯穆夫先黄老而退六經史遷終其成蠧貴𤣥虗而賤儒術應氏所以亢言臣雖不敏敢忘前載且魏武在戎尚修學校宣尼㩁論造次必儒臣愚以為宜重修國學廣延胄子使函丈之教日聞釋奠之禮不闕并詔天下郡國興立儒教考課之程咸依舊典茍經明行脩宜擢以不次抑斗筲喋喋之才進大雅汪汪之徳博收鴻生以光顧問縶維竒異共精得失使寰區之内競務仁義之風荒散之餘漸知禮樂之用豈不美哉臣誠闇短敢慕前訓用稽古義上塵聽覽伏望陛下垂就日之監齊非煙之化儻以臣言可採乞特施行廢帝善之北齊邢邵西魏出帝時為國子祭酒與楊愔魏文請置學奏曰二黌兩學盛自虞殷所以宗配上帝以著莫大之嚴宣布下土以彰則天之軌養黄髪以詢哲言育青衿而敷典教用能享國長久風徽萬祀者也爰暨亡秦改革其道坑儒滅學以蔽黔黎故九服分離祚終二代炎漢勃興更脩儒術故西京有六學之義東京有三雍之盛逮自魏晉撥亂相因兵革之中學校不絶仰惟髙祖孝文皇帝禀聖自天道鏡今古列教序於鄉黨廓詩書於郡國但經始事殷戎軒屢駕未遑多就弓劔弗追世宗統厯聿遵先緒永平之中大興板築續以戎馬生郊雖逮為山還停一簣而明堂禮樂之本乃鬱荆棘之林膠序徳義之基空盈牧竪之迹城隍嚴固之重闕磚石之工墉堞顯望之要少樓櫓之飾加以風雨稍侵漸致虧墜非所謂追隆堂搆儀刑萬國者也伏聞朝議以高祖大造區夏道侔姬文擬祀明堂式配上帝今若基地不修仍同畎澮即使高皇神享闕於國陽崇事之典有聲無實此臣子所以匪寜億兆無所停望也臣又聞官方受能所以任事既任事矣酬之以祿如此則上無曠官之譏下絶尸素之謗今國子雖有學官之名無教授之實何異兎絲燕麥南箕北斗哉昔劉向有言王者宜興辟雍禮樂以風天下夫禮樂所以養人刑法所以殺人而有司勸勤請定刑法至於禮樂則曰未敢敢於殺人不敢於養人也臣以為當今四海清平九服寜晏經國要重理應先營脱復稽延則劉向之言徴矣但事不兩興湏有進退以愚量之宜罷上方彫美之作頗省永寜土木之工并减瑶光材瓦之力兼分石窟鐫琢之勞停諸事役非世急者三時農隙修此數條使辟雍之禮蔚爾而復興誦諷之音煥然而更美崇榭高墉嚴壯於外槐宫棘寺顯麗於中更明古今重遵鄉飲敦進郡學精課經業如此則元凱可得之於上序㳺夏可致之於下國豈不休歟靈太后令曰配饗大禮為國之本比以戎馬在郊未遑脩繕今四海晏寜當勑有司别議經始隋牛𢎞高祖開皇初為秘書監以典籍未備上表請開獻書之路曰經籍所興由來尚矣爻畫肇於庖羲文字生於蒼頡聖人所以𢎞宣道教博通古今揚於王庭肆於時夏故堯稱至聖猶考古道而言舜其大智尚觀古人之象周官外史掌三皇五帝之志武王問黄帝顓頊之道太公曰在丹書是知握符御厯有國家者曷常不以詩書而為教因禮樂而成功也昔周徳既衰舊經紊棄孔子以大聖之才開素王之業憲章祖述制禮删詩正五始而修春秋闡十翼而𢎞易道治國立身作範垂法及秦皇馭㝢吞滅諸侯任用威力事不師古始下焚書之令行偶語之刑先王墳籍盡皆掃地本既先亡從而顚覆臣以圗䜟言之經典盛衰信有徴數此則書之一厄也漢興改秦之弊敦尚儒術建藏書之䇿置校書之官屋壁山巖往往間出外有太常太史之藏内有延閣秘書之府至孝成之世亡逸尚多遣謁者陳農求遺書於天下詔劉向父子讎校篇籍漢之典文於斯為盛及王莽之末長安兵起宫室圖書竝從焚燼此則書之二厄也光武嗣興尤重經誥未及下車先求文雅於是鴻生鉅儒繼踵而集懐經負帙不逺斯至肅宗親臨講肄和帝數幸書林其蘭臺石室鴻都東觀秘牒塡委更倍於前及孝獻移都吏民擾亂圗書縑帛皆取為帷囊所收而西裁七十餘乗屬西京大亂一時播蕩此則書之三厄也魏武代漢更集經典皆藏在秘書内外三閣遣秘書郎鄭黙删定舊文時之論者美其朱紫有别晉氏承之文籍尤廣晉秘書監荀朂定魏内經更著新簿雖古人舊簡猶云有缺新章後錄鳩集已多足得恢𢎞正道訓範當世屬劉氏慿陵京華覆滅朝章國典從而失墜此則書之四厄也永嘉之後㓂竊競興因河據雒跨秦𢃄趙論其建國立家雖傳名號憲章禮樂寂滅無聞劉裕平姚泓收其圗籍五經子史纔四千卷皆赤軸青紙文字古拙僣偽之盛莫過二秦以此而論足可明矣故知衣冠軌物圗畫記注播遷之餘皆歸江左晉宋之際學藝為多齊梁之間經史彌盛宋秘書丞王儉依劉氏七畧撰為七志梁人阮孝緒亦為七錄總其書數三萬餘卷及侯景渡江破滅梁室秘省經籍雖從兵火其文徳殿内書史宛然猶存蕭繹據有江陵遣將破平侯景收王儉之書及公私典籍重本七萬餘卷悉送荆州故江表圗書因斯盡萃於繹矣及周師入郢繹悉焚之於外城所收十纔一二此則書之五厄也後魏爰自幽方遷宅伊雒日不暇給經籍闕如周氏創基關右戎車未息保定之始書止八千後加收集方盈萬卷高氏據有山東初亦採訪驗其本目殘缺猶多及東夏初平獲其經史四部重雜三萬餘卷所益舊書五千而已今御書單本合一萬五千餘卷部帙之間仍有殘缺比梁之舊目止有其半至於隂陽河雒之篇醫方圗譜之説彌復為少臣以經書自仲尼已後迄於當今年逾千載數遭五厄興集之期屬膺聖世伏惟陛下受天明命君臨區宇功無與二徳冠往初自華夏分離彛倫攸斁其間雖覇王逓起而世難未夷欲崇儒業時或未可今土宇邁於三王民黎盛於兩漢有人有時正在今日方當大𢎞文教納俗昇平而天下圗書尚有遺逸非所以仰恊聖情流訓無窮者也臣史籍是司寢興懐懼昔陸賈奏漢祖云天下不可馬上治之故知經邦立政在於典謨矣為國之本莫此攸先今秘藏見書亦足披覽但一時載集湏令大備不可王府所無私家乃有然士民殷雜采訪難知縱有知者多懐恡惜必湏勒之以天威引之以㣲利若猥發明詔兼開購賞則異典必臻觀閣斯積重道之風超於前世不亦善乎伏願天鑒少垂炤察帝納之於是下詔獻書一卷賚縑一疋一二年間篇籍稍備柳昻為上開府時高祖受禪昻見天下無事可以勸學行禮因上表曰臣聞帝王受命建學制禮故能移既往之風成惟新之俗自魏道將謝分割九區關右山東乆為戰國各逞權詐俱殉干戈賦役繁重刑政嚴急盖救焚拯溺無暇從容非朝野之願以至於此晩世因循遂成希慕俗化澆弊流宕忘反自非天然上哲挺生於時則儒雅之道綱禮之制衣冠民庶莫肯用心世事所以未清軌物由兹而壊伏惟陛下禀靈上帝受命昊天合三陽之期應千祀之運往者周室傾毁區宇沸騰聖册風行神謨電發端座廊廟蕩滌萬方俯順幽明君臨四海擇萬古之典無善不為改百王之弊無惡不盡至若因循緣義為其節文故以三百三千事高前代然下土黎獻尚未盡行臣謬蒙奬䇿從政藩部人庶軌儀實見多闕儒風以墜禮教猶㣲是知百姓之心未能頓變仰惟深思逺慮清念下民漸被以儉使至於道臣恐業淹事緩動延年世若行禮勸學道教相催必當靡然向風不逺而就家知禮節人識義方比屋可封輙謂匪逺帝覽而善之劉炫開皇中與諸儒脩定五禮授旅騎尉開皇二十年廢國子四門及州縣學惟置太學博士二人學生七十二人炫上表言學校不宜廢情理甚切高祖不納册府元龜卷六百三
