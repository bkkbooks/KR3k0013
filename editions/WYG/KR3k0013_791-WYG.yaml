body:
  text: 册府元龜卷七百九十一宋王欽若等撰總録部知賢傳曰觀其所由察其所安人焉廋哉若夫禀融朗之識洞幾神之表懐擬倫之鑒逹語黙之要固亦言必有中而物無遁形惟夫賢人之為徳也居正而處厚安仁而守約直而不激和而不流進退之得宜言色之無失純粹中積而誠以待人洵美外彰而謙以行已秉彛而居簡敦信而繇禮固其舉錯之際淺深可覿品藻所及淑慝以分至或識其名才知未逺至終有所立見稱於時傳諸美談皆可以徴也已臧孫紇魯大夫也襄公二十三年秋八月孟孫卒初孟孫惡臧孫不相善季孫愛之及孟孫卒臧孫入哭甚哀多涕出其御曰孟孫之惡子也而哀如是季孫若死其若之何臧孫曰季孫之愛我疾疢也甞志相順從身之害孟孫之惡我藥石也嘗志相違戻猶藥石之療疾美疢不如惡石夫石猶生我愈已疾也疢之美其毒滋多孟孫死吾亡無日矣趙孟晉大夫也魯襄公二十七年宋向戍請弭諸侯之兵為㑹於宋楚子木問於趙孟曰范武子之德何如士㑹賢聞於諸侯故問之對曰夫子之家事治言於晉國無隠情祝史陳信於鬼神無愧辭祝陳馨香徳足副之故不愧子木歸以語王王曰尚矣上也上能歆神人歆享也使神享其祭人享其徳宜其光輔五君以為盟主也五君謂文㐮靈成景也子木楚令尹魯襄公二十七年宋公享晉楚之大夫子木歸語王曰宜晉之伯也有叔向以佐其卿楚無以當之不可與爭鄭罕虎字子皮魯襄公三十年十月授子産政伯有死子皮知政以子産賢故譲之辭曰國小而偪族大寵多不可為也為猶治也子皮曰虎帥以聽誰敢犯子子善相之國無小言在治政小能事大國乃寛為大所恤故也子産為政及魯昭公十三年晉㑹諸侯於平丘子産子太叔相鄭伯以㑹子産歸未至聞子皮卒哭且曰吾已已猶竟也無為為善矣惟夫子知我晏嬰字平仲齊大夫也魯昭公五年鄭罕虎如齊娶於子尾氏自為逆也晏子驟見之陳桓子問其故對曰能用善人民之主也謂授子産政又越石父賢在縲絏之中晏子出遭之塗解左􅆖贖之載歸弗謝入閨久之越石父請絶晏子瞿然攝衣冠謝曰嬰雖不仁免子於厄何子求絶之速也石父曰不然吾聞君子詘於不知己而信於知己者方吾在縲絏中彼不知我也夫子既以感悟而贖我是知己知己而無禮固不如在縲絏之中晏子於是延入為上客孔子遭齊程木子於郯之間傾葢而語終日有間顧子路曰束帛十疋以贈先生子路不對間又顧曰由束帛十疋以贈先生子路率爾而對曰昔者由也聞之於夫子士不中道相見女無媒而嫁者君子不行也孔子曰夫詩不云乎野有蔓草零露溥兮有美一人清揚婉兮邂逅相遇適我願兮且夫齊程木子天下之賢士也吾於是而不贈終身不之見也大徳不踰閑小徳出入可也又曰吾與回言終日不違如愚退而省其私亦足以發回也不愚又曰語之而不惰者其回也與子謂顔淵曰惜乎吾見其進也未見其止也又子游為武城宰子曰女得人焉爾乎曰有澹臺滅明者行不由徑非公事未嘗至於偃之室也儀封人請見曰君子之至於斯也吾未嘗不得見也從者見之出曰二三子何患於喪乎天下之無道也久矣天將以夫子為木鐸南宫适問於孔子曰羿善射奡盪舟俱不得其死然禹稷躬稼而有天下夫子不答南宫适出子曰君子哉若人尚徳哉若人孟軻字子輿鄒人也魯欲使樂正子為政孟子曰吾聞之喜而不寐公孫丑曰樂正子彊乎曰否有知慮乎曰否多聞識乎曰否然則奚為喜而不寐曰其為人也好善又浩生不害問曰樂正子何人也孟子曰善人也信人也何謂善何謂信曰可欲之謂善有諸己之謂信充實之謂美充實而有光輝之謂大大而化之之謂聖聖而不可知之之謂神樂正子二之中四之下也侯嬴魏隠士也年七十家貧為大梁夷門監者公子聞之徃請欲厚遺之不肯受曰臣修身潔行數十年終不以監門困故而受公子財公子於是乃置酒大㑹賔客坐定公子從車騎虛左自迎夷門侯生侯生攝敝衣冠直上載公子上坐不譲欲以觀公子公子執轡愈恭侯生又謂公子曰臣有客在市屠中願枉車騎過之公子引車入市侯生下見其客朱亥睥睨故久立與其客談微察公子公子顔色愈和當是時魏將相宗室賔客滿堂待公子舉酒市人皆觀公子執轡從騎皆竊罵侯生侯生視公子色終不變乃謝客就車至家公子引侯生坐上坐徧贊賓客皆驚酒酣公子起為夀侯生前侯生因謂公子曰今日嬴之為公子亦足矣為一作羞嬴乃夷門抱闗者也而公子親枉車騎自迎嬴於衆人廣坐之中不宜有所過令公子故過之然嬴欲就公子之名故久立公子車騎市中過客以觀公子公子愈恭市人皆以嬴為小人而以公子為長者能下士也於是罷酒遂以侯生為上客魏齊亡間行念諸侯莫可以急抵者乃復之梁欲因信陵君以走楚信陵君聞之畏齊猶豫未肯見曰虞卿何如人也時嬴在旁曰人固未易知知人亦未易也夫虞卿躡屩擔簦一見趙王賜白璧一雙黄金百鎰再見拜為上卿三見卒受相印封萬户侯當此之時天下爭知之夫魏齊窮困過虞卿虞卿不敢重爵禄之尊解相印捐萬户侯而間行急士之窮而歸公子公子曰何如人人固不易知知人亦未易也信陵君大慙命駕迎之魏公子無忌留趙公子聞趙有處士毛公藏於博徒薛公藏於賣漿家漿或作醪公子欲見兩人兩人自匿不肯見公子公子聞所在乃間歩徃從此兩人游甚歡平原君聞之謂其夫人曰始吾聞夫人弟公子天下無雙今吾聞之乃妄從博徒賣漿者游公子妄人耳夫人以告公子公子乃謝夫人去曰始吾聞平原君賢故負魏王而救趙以稱平原君平原君之游徒豪舉耳不求士也無忌自在大梁時嘗聞此兩人賢至趙恐不得見以無忌從之游尚恐其不我欲也今平原君乃以為羞其不足從游矣乃裝為去夫人具以語平原君乃免冠謝固留公子平原君門下聞之去半平原君歸公子天下士復徃歸公子公子傾平原君客公子留趙十年不歸後漢馬援扶風人為伏波將軍初劉龔字孟公長安人善論議援與班彪並器重之彪與京師丞郭季通書曰劉孟公藏器於身用心篤實瑚璉之器宗廟之噐也陳蕃汝南人位至三公時有黄憲字叔度同郡人也蕃臨朝歎曰叔度若在吾不敢先佩印綬矣皇甫規為度遼將軍解官歸安定鄉人有以貨得雁門太守者亦去職還家書刺谒規規卧不迎既入而問卿前在郡食雁美乎有頃又白王符在門規素聞符名乃驚遽而起衣不及帶屣履出迎援符手而還與坐極歡時人為之語曰徒見二千石不如一縫掖言書生道義之為貴也蔡邕字伯喈為中郎將桓彬卒邕等共論序其志僉以為彬有過人者四夙智早成岐嶷也學優文麗至通也仕不茍禄絶髙也辭隆從窊潔操也乃共樹碑而頌焉又郭林宗卒四方之士千餘人皆來㑹葬同志者乃共刻石碑邕為其文既而謂涿郡盧植曰吾為碑銘多矣皆有慙徳惟郭有道無愧色耳林宗舉有道不應喈又見王粲竒之曰吾家書籍文章盡當與之博物志曰蔡邕有書萬卷末年載數車與王粲亡後所與粲書悉入粲族子業郭泰字林宗太原人舉有道不應行見茅容耕於野時與等輩避雨樹下衆皆夷踞相對容獨危坐愈恭林宗竒其異遂與共語因請寓宿旦容殺雞為饌林宗謂為已設既而以供其母自己草蔬與客同飯林宗起拜之曰卿賢乎哉因勸令學卒以成徳楊賜為太尉大將軍竇武辟陳實為掾屬賜及司徒陳耽每拜公卿羣僚畢賀賜等歎實大位未登愧於先之魏杜恕位至建威將軍張閣字子臺官至永寜太僕以簡質聞恕著家戒稱閣曰張子臺視之似鄙樸人然其心中不知天地間何者為美何者為好敦然似與隂陽合徳者作人如此自可不富貴然而禍患當何從來世有髙亮如子臺者皆當力慕體之不如也陳羣為尚書僕射劉巴入蜀為尚書令卒羣與丞相諸葛亮書問巴消息稱曰劉君子初甚敬重焉管輅字公明平原人官至少府丞劉智為潁川太守輅嘗謂人曰吾與劉潁川兄弟語使人神思清發昏不假寐自此之外殆白日欲寢矣王粲字仲宣山陽人為侍中潘濬為人聽察對問有機理粲見而貴異之由是知名蜀秦宓字子勅官至大司農時任安與董扶俱以學行齊名後丞相諸葛亮問宓以安所長宓曰記人之善㤀人之過袁徽陳國人寄寓交州時許靖避難至交州太守士燮厚加敬待徽與尚書令荀彧書曰許文林靖字英才偉士智畧足以計事自流宕以來與羣士相隨每有援急嘗先人後已與九族中外同其饑寒其紀綱同類仁恕惻隐皆有效事不能復三陳之耳諸葛亮為丞相初先主領荆州牧辟武陵人廖立為從事年未三十擢為長沙太守先主入蜀亮鎮荆州孫權遣使通好於亮因問士人皆誰相經緯者亮答曰龎統廖立楚之良材當贊興世業者也呉羊衜為始興太守鍾離牧字子幹為南海太守有異政衜與太常滕裔書曰鍾離子幹吾昔知之不熟定見其在南海感恩部伍智勇分明加操行清純有古人之風其見貴如此張紘為㑹稽東部都尉與孔融書曰虞仲翔虞翻字也前頗為論者所稱美寳為質雕摩益光不足以損虞翻字仲翔為騎都尉初山隂丁覽太守徐陵翻一見之便與友善終成顯名覽子固字子賤翻與同僚書曰丁子賤塞淵好徳堂構克舉野無遺薪斯之為懿其美優矣令徳之後惟此君嘉耳晉呉奮為河内太守郡人孫鑠少樂為縣吏奮以為主簿鑠自微賤登綱紀時僚大姓猶不與鑠同坐奮大怒遂薦鑠於司𨽻校尉劉訥甚知賞之時奮又薦鑠於大司馬石苞苞辟為掾鑠將應命行達許昌㑹臺已宻遣輕軍襲苞於時汝隂王鎮許鑠過謁之王先識鑠以鄉里之情私告鑠曰無與禍鑠既出即馳詣夀春為苞畫計苞頼而獲免遷尚書郎在職駁議十有餘事為當時所稱張華為太常時陸機與弟雲俱入雒造華華重其名如舊相識曰伐呉之役利獲二俊周浚為揚州刺史時陸雲初入雒浚召為從事謂人曰陸士龍當今之顔子也周弼為御史中丞時裴頠宏雅有逺識博學稽古自少知名弼見而歎曰頠若武庫五兵縱横一時之傑也嵇康為中㪚大夫時阮种弱冠有殊操為康所重康著飬生論所稱阮生即种也山濤河内人官至僕射郭奕少有重名濤稱其髙簡有雅量王綏司徒戎之子也裴瓚字國寳楷子也特為綏所重每從其游戎謂綏曰國寳初不來汝數徃何也對曰國寳雖不知綏綏自知國寳綏官至荆州刺史衛瓘為尚書令見樂廣而竒之曰自昔諸賢既殁嘗恐微言將絶而今乃復聞斯言於君矣命諸子造焉曰此人之冰鏡見之瑩然若披雲霧而覩青天也傅𤣥位至侍中初燉煌人索靖該博經史兼通内緯州辟别駕郡舉賢良方正對策髙第𤣥及張華與靖一靣皆厚與之相結郭奕太原人官至尚書阮咸與叔父籍為竹林之游奕髙爽有識量知名於時少所推先見咸心醉不覺歎焉奕初為野王令羊祜嘗過之奕歎曰羊叔子何必減郭大業少選復徃又歎曰羊叔子去人逺矣遂送祜出界數百里坐此免官王述太原人官至尚書令陸訥字祖言少有清操貞厲絶俗述雅敬重之庾敳為東海王軍諮祭酒有重名為縉紳所推而聚歛積實談者譏之都官從事温嶠奏之敳更器嶠目嶠森森如千丈松雖礧砢多節目施之大厦有棟梁之用劉頌廣陵人為廷尉同郡華譚素以才學為東土所推頌見之歎息曰不悟鄉里乃有如此才也張宣子新興人逹識之士也同郡劉殷郡命主簿州辟從事皆以供飬無主辭不赴命司空齊王攸辟為掾征南將軍羊祜召叅軍事皆以疾辭宣子勸殷就徴殷曰當今二公有晉之棟楹也吾方希達如榱椽耳不慿之豈能立乎吾今王母在堂既應他命無容不竭盡臣禮便不得養子輿所以辭齊大夫良以色養無主故耳宣子曰如子所言豈庸人所識哉而今而後吾子當為吾師矣遂以女妻之宣子者并州豪族也家富於財其妻怒曰我女年始十四姿識如此何慮不得為公侯妃而遽以妻劉殷乎宣子曰非爾所及也誡其女曰劉殷至孝㝠感兼才識超世此人終當表表為世名公汝其謹事之張氏性亦惋順事王母以孝聞奉殷如君父焉劉岱廣陽人也同郡霍原年十八觀太學行禮因留習之貴游子弟聞而重之欲與相見以其名微不欲晝徃乃夜共造焉岱原之父友也將舉之未果而病篤臨終勅其子沈曰霍原慕道清虚方成竒器汝後必薦之及沈為國大中正惠帝元康中進原為二品司徒不過沈乃上表理之詔下司徒叅論中書監張華令陳準奏為上品詔可元康末原與王褒等俱以賢良徵累下州郡以禮發遣皆不到李裔為司徒華表以苦節垂名李及司𨽻王宏等並歎美表清澹退静以為不可得貴賤而親疎也王曠為侍中裴郃有器望元帝為安東將軍郃為長史曠與司馬越書曰裴郃在此雖不治事然識量宏逺此下人士大敬附之賁嵩為司徒掾時同郡周顗少有重名嵩見顗歎曰汝潁固多竒士自頃雅道陵遲今復見周伯仁將振起舊風清我邦族矣伯仁顗字也桓彛為㪚騎常侍初過江時晉國初建以王導為丞相軍諮祭酒彛見朝廷微弱謂周顗曰我以中州多故來此欲求全活而寡弱如此將何以濟憂懼不樂徃見導極談世事還謂顗曰向見管夷吾無復憂矣又禇裒字季野名冠中興彛見而目之曰季野有皮裏陽秋言其外無臧否而内有所褒貶也謝安為太保雅重禇裒嘗云裒雖不言而四時之氣亦備矣温嶠為驃騎將軍嶠初至江左王𨗳周顗謝琨庾亮桓彛等並與親善於時江左草創綱紀未舉嶠殊以為憂及見王𨗳共談歡然曰江左自有管夷吾吾復何慮嶠嘗謂謝琨子尚曰尊大君豈惟識量宏逺至於神鑒沈深雖諸葛瑾之喻孫權不是過也王敦為荆州牧庾亮為㪚騎常侍時敦在蕪湖元帝使亮詣敦籌事敦與亮談論不覺改席而前退而歎曰庾元規賢於裴頠逺矣元規亮字也諸葛恢為内史時楊方好學有異才為郡鈴威儀公事之暇輒讀五經鄉邑未之知恢見而竒之待以門人之禮由是始得周旋貴人間時虞喜兄弟以儒學立名雅愛方為之延譽恢嘗遣方為文薦郡功曹主簿虞預稱美之以示賀循循報書曰此子開㧞有志意只言異於凡猥耳不圖偉才如此其文甚有竒分若出其胸臆乃是一國所推豈但牧竪中逸羣耶聞處舊黨之中好有謙沖之行此亦立身之一隅然世衰道喪人物凋弊每聞一介之徒有向道之志冀之願之如方者乃荒菜之將苗鹵田之善秀姿質已良但沾染未足耳移植豐壤必成嘉穀足下才為世英位為朝右道隆化立然後為貴昔許子將㧞樊仲昭於賈竪郭林宗成魏徳公於畎畆足下志隆此業二賢之功不為難及也循遂稱方於京師司徒王導辟為掾轉東安太守遷司徒參軍事方任都邑縉紳之士咸厚遇之周顗字伯仁安東將軍浚之子也王羲之㓜訥於言人未之竒年十三嘗謁顗顗察而異之時重牛心炙坐客未噉顗先割啗之羲之於是始知名及長辯贍以骨鯁稱又桓彛與茂倫為顗所重顗嘗歎曰茂倫嶔嵜厯落可笑人也顗官至䕶軍將軍禇裒為征北將軍以義興太守荀羡為長史既到裒謂佐吏曰荀生負逸羣之氣將軍有冲天之舉諸君宜善事之盧諶為司空劉琨從事中郎楊裕字士倫為慕容皝大將軍左司馬諶每稱之曰吾及晉之清平厯觀朝士多矣忠清簡毅篤信義烈如楊士倫者實亦未幾及死皝甚悼之萬寵為臨安令郭文曠達不仕既病甚寵迎置縣中及其卒寵葬之於所居之處而祭哭之葛洪庾闡並為作傳贊頌其羙云王澄字平子為軍諮祭酒謝鯤為王敦大將軍長史澄在敦坐見鯤談話無倦惟歎謝長史可與言都不眄敦其為人所慕如此桓温為大司馬録尚書事王猛字景畧隱於華隂懐佐時之志温入闗猛披褐而詣之一靣談當時之事捫虱而言旁若無人温察而異之宋沈懐文為隋王誕府主簿謝莊為諮議參軍時江智淵為佐在襄陽誕待之甚厚懐文及莊並與智淵友善懐文每稱之曰人所應有盡有人所應無盡無者其江智淵乎南齊殷沖初仕宋為呉興令時張岱為水部郎出補東遷令冲謂人曰張東遷親貧須飬所以栖遲下邑然名器方顯終當大至周顒為中書郎呉郡錢塘杜栖少為同郡張融所知栖出京師從儒士劉瓛受學善清言能弹琴飲酒名儒貴游多敬待之顒與栖父京産書曰賢子學業清標後來之秀嗟愛之懐豈知云已所謂人之英彦若已有之也梁范述曽仕齊為永嘉太守時蕭景為永寜令述曽居郡號稱廉平雅服景為政乃牓郡門曰諸縣有疑滯者可就永寜令决任昉字彦昇位至新安太守劉孝綽為著作佐郎歸沐以詩贈昉昉報章曰彼美咨陽子投我懐秋作詎慰耋嗟人徒深老夫託其為名流所重如此謝舉傳云此詩昉贈舉劉瓛為㑹稽府丞賀瑒祖道力善三禮瑒少𫝊家學瓛見㻛深器異之嘗與瓛造呉郡張融指㻛謂融曰此生神明聰敏將來當為儒者宗范雲為侍中時孔休源初到京寓於宗人少府卿孔登以祠事入廟雲一與相遇深加褒賞曰不期忽覯清顔頓祛鄙恡觀天披霧騐之今日後雲命駕到少府門豋便拂筵整𢃄謂當詣已既而獨造休源髙談盡日同載還家沈約為尚書令當朝貴顯軒蓋盈門時孔休源初到京或時後來必虛襟引接處之坐右商畧文義其為達人所推如此又王筠自元禮為殿中郎約每見筠文咨嗟吟咏以為不逮也嘗謂筠曰昔蔡伯喈見王仲宣稱曰王公之孫也吾家書籍悉當相與僕雖不敏請附斯言自謝眺諸賢零落已後平生意好殆將都絶不謂疲暮復逢於君後魏郭祚字季祐官至雍州刺史嘗謂子景尚曰封軌髙綽二人並幹國之才必應逺至吾平生不妄進舉而每薦此二公非直為國進賢亦為汝等將來之津梁也賈禎為雒陽令陸暐字道暉與弟恭之並有時譽禎見其兄弟歎曰僕以年老更覩雙璧孫蕙蔚為黄門郎陸暐與弟恭之共候蕙蔚蕙蔚謂諸賓曰不意二陸復在坐隅吾得謝張公無以延譽汜潛燉煌人胡叟少孤言及父母則涙下春秋當祭之前先求㫖酒美饍盡孝思之敬潛家善醸酒每節送一壺與叟河東裴定等謂潛曰再三之恵以為過厚矣子恵於叟何其常也潛曰我常給祭者以其常於孝思論者以潛為君子隋祖孝徴為侍中初李徳林器量深沉時人未能測惟任城王楷趙彦深魏収陸印大相欽重延譽之言無所不及北齊武王初為中書舍人加通直㪚騎侍郎三年孝徴入為侍中尚書左僕射趙彦深出為兖州刺史朝士有先為孝徴所待遇者問徳林云是彦深黨不可仍掌機宻孝徴曰徳林久滯縫衣我嘗憾彦深待賢未足内省文翰方以委之尋當有佳處不宜妄説楊素字處道位至太子太師楊達為上開府達為人宏厚有局度楊素每言曰有君子之貌兼君子之心者惟楊達耳薛道衡為吏部侍郎時李文博為羽騎尉特為道衡所知嘗令在㕔事帷中披簡書史并察已行事若遇治政善事即抄撰記録如選用疎謬即委之臧否道衡每得其語莫不欣然從之册府元龜卷七百九十一
