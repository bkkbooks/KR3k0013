body:
  text: 册府元龜卷三百三十五宋王欽若等撰宰輔部竊位自全不稱竊位書云股肱惰哉萬事隳哉語曰危而不扶顛而不持則将焉用彼相故商命傳説喻之為舟楫為霖雨為鹽梅為麴蘖蜀任諸葛孔眀稱之曰如魚之有水朝廷之治亂政教之盛衰忠佞之進退百姓之安危莫不繫之天下重任君臣大義無踰於宰輔昔臧文仲不能薦栁下恵孔子謂之竊位則尸禄冐寵阿䛕苟容善不能稱惡不能救進無所益退無所損非竊位而何漢韓増宣帝時為大司馬増世貴㓜為忠臣事三主重於朝廷為人寛和自守以温顔遜辭承上接下無所失意保身固寵不能有所建眀後漢曹嵩靈帝時貨賂中官及輸西園錢一億萬故位至太尉崔烈自九卿入錢五百萬得為司徒久之不自安從容問其子鈞曰吾居三公於議者何如鈞曰大人少有英稱歴位卿守論者不謂當為三公而今登其位天下失望烈曰何謂然也鈞曰論者嫌其銅臭烈怒舉杖擊之鈞時為虎賁中郎将服武弁戴鶡尾狼狽而走烈罵曰死卒父撾而走孝乎以其武官故罵為卒鈞曰舜之事父小杖則受大杖則走非不孝也烈慙而止晋何充為侍中録尚書事所昵庸雜信任不得其人北齊髙阿那肱後主時録尚書事尚書郎中源師甞諮肱云龍見當雩問師云何處龍見作何物顔色師云是龍星見湏雩祭非是真龍見肱云漢兒多事强知星宿其墻面如此隋裴矩為右光禄大夫以煬帝即位昏侈逾甚無所諌諍但悦媚取容而已唐姜恪髙宗時以左相出為凉州道行軍大總管時右相閻立本以善畫見稱與恪皆無輔弼之譽時人為之語曰左相則宣威沙漠右相則馳譽丹青三舘學士放散五臺令史眀經至今相傳以為口實蘇味道則天時為鳳閣侍郎同鳳閣鸞臺三品前後居相位數載竟不能有所發眀但脂韋其間苟度取容而已甞謂人曰處事不欲决斷眀白若有錯誤必貽咎譴但模稜以持兩端可矣時人繇是號為蘇模稜于時以為口實傅㳺藝為左補闕上書稱武氏符瑞合革姓受命果擢為鳳閣侍郎平章事時人號為四時仕宦言一年自青而緑及朱紫也豆盧欽望則天中宗時作相兩朝前後十餘年時張易之兄弟及武三思父子専權驕縱圖為逆亂朝廷多有諌諍者而欽望在位獨謹身不能有所輔政源乾曜元宗時為尚書左丞相兼侍中在政事十年時張嘉貞張説相次為中書令乾曜不敢與之爭權每事推讓之及李元紘杜暹知政事遂無所參議唯喏署名而已牛仙客開元中為工部尚書同中書門下三品仙客既居相位獨潔其身唯喏而已所有錫賚皆緘封而不啟百司或有諮决輙對曰但依令式即可若不依文非所知也楊國忠天寳中為司空右相時天下殷盛𤣥宗注意邊事賦税之入兵食之調國忠揀老習計簿吏軍國大務皆出其手國忠但署名而已不復省覧韋見素天寳十二載拜門下侍郎平章事遷左相時右相楊國忠以外戚擅任見素不敢議政惟取容而已王璵肅宗時為中書侍郎平章事人物時望素不為衆所稱及當樞務聲聞頓减劉從一徳宗建中末為刑部侍郎平章事從幸梁州眀年六月改中書侍郎仍平章事嵗中加集賢殿大學士脩國史帝遇之甚厚從一容身逺罪而已不能有所佐輔關播建中末為中書侍郎平章事時政事决在盧杞播但歛衽取容而已李勉貞元初為司徒平章事引過備位而已齊映貞元初為中書平章事性謙和羙言悦下無所是非政事多决崔造盧翰為平章事貞元二年二月授五品官前鄭州别駕李撫等八十一人皆云自去年春送名中書門下宰臣盧翰不為之條奏凍餒喧呼於道路授官之日已死者二十八人崔損貞元中為門下侍郎平章事過為恭遜接見便僻不止於容身而已自建中後宰相罕有久在位者數嵗罷黜損用此中上意竊大任者八年帝亦知物議鄙其持禄取容然憐而厚之董晋貞元中為門下侍郎平章事時政事决於竇參晋但奉詔唯諾而已李泌貞元中為中書侍郎平章事在相位隨時俯仰無足可稱復引顧况軰輕薄之流動為朝士之戯侮頗貽譏誚權徳輿憲宗元和中為禮部尚書平章事時李吉甫李絳同在相位帝求治方切軍國大小一付中書吉甫絳議政頗有異同或於上前論事形於顔色其有詣於理者徳輿亦不能為發眀時人以此譏之竟以循黙而罷杜悰宣宗時為門下侍郎平章事悰無他才未甞延接寒素甘食竊位而已朱朴昭宗時為諌議大夫平章事朴腐儒木强無他才術道士許巖士出入禁中甞依朴為姦利從容帝前薦朴有經濟才以國子博士召見即日命朴在中書與名公齒筆札議論動為笑端數月巖士敗朴見殺時議以昭宗命台臣張濬鄭綮及朴三人尤謬季末之妖也後唐盧程荘宗同光初自太原觀察判官與定州判官豆盧革並命為平章事程本非重器驟塵顯位舉止不常時朝廷草創庶物未備班列蕭然寺署多闕程當革命之日即乗肩輿騶導喧沸帝聞訶導之聲詢於左右曰宰相擔子入門帝駭登樓視之笑曰所謂似是而非者也趙鳳眀宗天成中為中書侍郎平章事時膳部郎中鄭兟先奏諸司使職掌人吏乗暖坐𢃄銀魚席㡌輕衣肥馬參雜廷臣尊卑無别汚染時風請下禁止帝嘉其事促行之中書覆為不可鳳亟言於執政曰此失誠大不可不禁為權吏所庇竟寝其事晋馮玉為右僕射平章事軍國大政一以委之時少帝方務奢逸後宫大恣華侈玉希旨取容未甞諌止故少帝愈寵焉自全詩曰秉國之鈞傳曰實相以濟必将道佐人主民具爾瞻者矣若乃務在宴安取其充位弼諧無状依違自守視政之得失靡所規正觀人之枉直隨其俛仰或屑屑於修已或黙黙以避事或以狥意任職或以苟媚取容歴代巨賢時有斯累是以見輕於官属貽譏於識者盖從容中道齪齪亷謹者之所為亦過猶不及之咎也是故風人有彼己之刺夫子有安用之説良為是夫漢蕭何髙帝時為相國黥布反帝自将軍擊之數使使問相國何為問其居守何所營為曰為帝在軍拊循勉百姓悉所有佐軍如陳豨時悉盡也盡所有糧食資用出以佐軍客説何曰君滅族不久矣夫君位為相國功第一不可復加然君初入關本得百姓心千餘年矣皆附君尚復孳孳得民和孳與孜同言不怠也帝所謂數問君畏君傾動關中今君何不多買田地賤貫貸以自汚上心必安貫賖也貸音土得反於是何從其計帝乃大説説讀曰悦帝罷布軍歸民道遮行在道上遮天子行上書言相國彊賤買民田宅數千人帝至何謁帝笑曰今相國廼利民民所上書皆以與何曰君自謝民陳平恵帝時為右丞相髙后姊曰嬃甞以平前為帝謀執其夫樊噲數䜛平曰爲丞相不治事日飲醇酒戯婦人平聞日益甚吕太后聞之私喜面質吕嬃於平前質封也鄙語曰兒婦人口不可用顧君與我如何耳無畏吕嬃之譛倪寛武帝時為御史大夫以稱意任職故久無有所規諌於帝官屬易之易輕也音弋皷切居位九嵗以官卒孔光平帝時為大司徒帝年㓜太后稱制委政於大司馬王莽初哀帝罷黜王氏故太后與莽怨丁𫝊董賢之黨莽以光為舊相名儒天下所信太后敬之備禮事光所欲摶擊輙為草以太后指風光令上之謂文書之棄草也風讀曰諷睚眥莫不誅傷睚音崖􅗃音漬莽權日盛光憂懼不知所出上書乞骸骨莽白太后帝㓜少宜置師傅徙光為帝太傅位四輔給事中領宿衛供養行内行内行在所之内中猶言禁中也署門戸省服御食物省視也眀年徙為太師而莽為太𫝊光甞稱疾不敢與莽並有詔朝朔望領城門兵莽又諷羣臣奏莽功徳稱宰衡位在諸侯王上百官統焉光愈恐固稱疾辭位後漢鄧彪和帝時為太傅録尚書事永元初竇氏専權驕縱朝廷多有諌諍而彪在位修身而已不能有所規正晉王戎為司徒以王政将圮苟媚取容屬愍懐太子之廢竟無一言諫諍何邵為司徒趙王倫簒位以邵為太宰及三王交爭邵以軒冕而逰其間無怨之者王衍為司徒雖居宰輔之重不以經國為念而思自全之計説東海王越曰中國已亂當頼方伯宜得文武兼資以任之乃以弟澄為荆州族弟敦為青州因謂澄敦曰荆州有江漢之固青州有負海之險卿二人在外而吾留此足以為三窟矣識者鄙之後魏崔光為車騎大将軍儀同三司光寛和慈善不逆於物進退浮沉自得而已甞慕胡廣黄瓊之為人故為氣槩者所不重始領軍于忠以光舊徳甚信重焉每事籌决光亦傾身事之元乂於光亦深崇敬及郭祚裴植見殺清河王懌遇禍光隨時俛仰竟不規救於是天下譏之隋裴矩煬帝時為右光禄大夫見天下将亂恐為身禍每遇人盡禮雖至胥吏皆得其歡心蕭琮為内史令性澹雅不以職務自嬰退朝縱酒而已内史令楊約與琮同列帝令約宣旨誡勵復以私情論之琮答曰琮若復事事則何異於公哉約笑而退唐姜恪髙宗時為侍中恪以軍功歴職既居相位謹身自守而已于志寜為侍中永徽中累加左僕射同中書門下三品志寜雅愛賓客接引忘倦後進文筆之士無不影附然亦不能有所薦達議者以此少之楊再思為鸞臺侍郎同鳳閣鸞臺平章事再思自歴事三主知政十餘年未甞有所薦達然恭慎畏忌未甞忤物或謂再思曰公名髙位重何為屈折如此再思曰世路艱難直者受禍苟不如此何以全其身哉豆盧欽望中宗即位為尚書左僕射知軍國重事欽望作相兩朝前後十餘年時張易之兄弟及武三思父子専權驕縱圖為逆亂欽望獨謹其身不能有所規正以此獲譏于世蘇味道為鳳閣侍郎同鳳閣鸞臺三品味道前後居相位數載竟不能有所發眀但脂韋其間苟度取容而已故時人號為模稜于今以為口實苖晋卿肅宗時為侍中小心畏慎未甞忤人意性聰敏達練事體百司文簿經目必曉而修身守位以智自全議者比漢胡廣劉從一徳宗興元初為中書侍郎平章事肅宗遇之甚重以容身逺罪而已不能有所輔佐崔損貞元中為諌議大夫平章事性最謹慎每奏對不敢有所發揚盧邁貞元中為中書侍郎平章事時大政事决在於陸贄趙退翁邁獨謹身守文奉法而已髙郢貞元末為中書侍郎平章事順宗初杜佑以宿舊居上而韋執誼繇新恩専柄順宗風恙方甚樞機不親王叔文以翰林學士兼戸部侍郎充度支副使時政事自叔文叔文繇待詔王伾通於内官李忠言宣㫖執誼奉而行之鄭珣瑜自受命憂形顔色見勢不可奪因稱疾不起郢則因循竟無所正以至於罷物論定此為優劣焉路隨自敬宗寳歴初為承㫖學士即已叅預大政矣後十年在相位李宗憫李徳裕朋黨互興攘臂於其間李訓鄭注始終姦詐接武於其後而隨藏器韜光隆汚一致可謂得君子中庸而常居之也後唐鄭珏初仕梁末帝時為禮部侍郎平章事荘宗入汴貶莱州司戸入為太子賓客眀宗平定京師任圜自蜀至樞宻使安重誨不欲圜獨拜宰輔議朝望一人共之樞宻使孔循言珏當貞眀時久在中書性畏慎而長者兼羙詞翰好人物重誨即奏與任圜並命眀年循罷樞宻使珏懼辭以老病耳疾不任中書事四上章請老眀宗惜之久而方允乃授開府儀同三司行尚書左僕射致仕退居鄭州韋説荘宗時為禮部侍郎同平章事與郭崇韜秉政説承順而已政事得失無所指言初或有言於崇韜銓選人或取他人出身名銜或取父兄資緒與令史囊槖罔冒崇韜條奏其事其後郊天行事官數千人多有告勑偽濫因定去留塗毁告身者甚衆選人號哭都門之外議者以為積弊累年一旦澄汰太甚懼失惟新含垢之意説與崇韜同列不能執而止之頗遭物議説之親黨告之説曰此郭漢子之意也及崇韜得罪説懼流言鍾已乃令門人左拾遺王松吏部貟外郎李慎等上疏云崇韜往日専權不閑故實塞仕進之門非奨善之道疏下中書説等覆奏深詆崇韜識者非之李愚明宗時為中書侍郎同平章事長興季年王政多僻權要之臣避禍不暇邦之存亡無敢言之愚性剛介往往形言然人無唱和者但舉六典之舊事書之粉墻補六經之闕文刻其印板其經緯大畧曽無所施房暠末帝清泰中與趙延夀同為樞宻使是時薛文遇劉延朗之徒居中用事暠雖處宻勿其聴用之言十不得三四俱隨勢可否不為事先每朝廷有大事暠與端眀學士等環坐㑹議多於衆中俛首而睡其避事也如此不稱夫徳薄位尊大易之攸戒名浮於行君子之是恥豈有斗筲微器濫鼎鼐之用樸􅈪庸才荷梁棟之任繇是彼己興刺代斵致誚小則衮職而罔頼大則彛倫而是斁歴選往古稽諸行事若乃智識淺狭儀鍳孱瑣經術不足以輔世才用不足以經逺或驟獲登進罔恊時望或久於待遇無所禆賛碌碌備位汲汲自營務在煩苛靡循大體褊躁以自恣簡傲而無威愛憎在心凝滯於物不知其量弗畏人言績用蔑聞聲猷日損乃至喧於庶議形彼嘲辭盖冗吏之所為在具瞻而奚稱者也漢衛綰代桃侯舍為丞相劉舍朝奏事如職事奏言守職分而已然自初官以至相終無可言不能有所興建及廢罷趙周武帝元鼎二年代荘青翟為丞相自文帝時丞相申屠嘉死後開封侯陶青桃侯劉舍及武帝時栢至侯許昌平棘侯薛澤武彊侯荘青翟暨周皆以列侯繼踵齪齪亷謹齪齪持整之貌也齪音初角反為丞相備員而已無所能發功名著於世者石慶元鼎五年自御史大夫為丞相封牧丘侯是時漢方南誅兩越東撃朝鮮北逐匈奴西伐大宛中國多事天子廵狩海内修古神祠封禪興禮樂公家用少桑𢎞羊等致利王温舒之属峻法兒寛等推文學九卿更進用事更互也音工衡切事不關决於慶慶醇謹而已醇専厚也在位九嵗無能有所正言甞欲請治上近臣所忠九卿咸宣咸音减損之减治所忠及咸宣二人不能服反受其過贖罪卜式為御史大夫眀年當封禪式又不習文貶秩為太子太傅以兒寛代之兒寛兒音奚為御史大夫至三公在位以稱意任職故久無有所正諌於上官屬易之不為盡力一説以和良承㫖從容得久車千秋為丞相封富民侯無他材能學術又無伐閲功勞伐積功也閲經歴也特以一言寤意旬月取宰相封侯世未甞有也後漢使者至匈奴單于問曰聞漢新拜丞相何用得之言此人何得為丞相也使者曰以上書言事故單于曰如是漢置丞相非用賢也妄一男子上書即得之矣蔡義昭帝時為丞相是時大将軍霍光秉政議者或言光置宰相不選賢苟用可顓制者顓與専同其後類此光聞之謂侍中左右及官屬曰以為人主師當為宰相何謂云云云云衆謂有不選賢之説也此語不可使天下聞也黄霸宣帝五鳳三年為丞相霸材長於治民及為丞相總綱紀號令風采不及丙魏于定國功名損於治郡時薛宣成帝鴻嘉中為丞相府辭訟例不滿萬錢不為移書後皆遵用薛侯故事然官屬譏其煩碎無大體不稱賢也時天子好儒雅宣經術又淺上亦輕焉何武為大司空多所舉奏號為煩碎不稱賢公功名略比薛宣其材不及也而經術正直過之後漢虞延明帝永平三年代趙熹為太尉八年代范遷為司徒歴位二府十餘年無異政績周澤永平十二年以太常行司徒事惟簡忽威儀頗失宰相之望數月復為太常晋王渾恵帝時為司徒録尚書事渾所歴之職前後著稱及居台輔聲望日减王戎為司徒雖位總鼎司而委事僚采間乗小馬從便門而出㳺見者不知其三公也故吏多至大官道路相遇輙避之後魏髙陽王雍孝眀時為侍中太師録尚書雍識懐短淺又無學業雖位居朝首不為時情所推既以尊親地當宰輔自熈平以後朝政禠落不能守正輔弼唯唯而已東魏趙郡王諶孝靜時為太師録尚書事諶無他才識歴位雖重時人忽之于忠為侍中尚書令旬餘靈太后引門下侍官於崇訓宫問曰忠在端右聲聴何如咸曰不稱厥任乃出忠使持節都督冀定瀛三州諸軍事征北大将軍冀州刺史唐蕭瑀太宗貞觀中為尚書右僕射是時内外考績皆委之司㑹為羣僚指南庶務繁總瑀見事有時偏駁而用法稍深頗為時議所少唐休璟中宗神龍中為太子少保同中書門下三品在任無所𢎞益以老病罷歸私第蘇瓌景龍中為尚書右僕射同中書門下三品在中書寛恕朝綱不舉瓌之牧人時稱良吏及居相位聲名稍减時議以此少之盧懐慎元宗開元初為黄門監與紫微令姚崇對掌樞宻懐慎自以為吏道不及崇每事皆推讓之時人謂之伴食宰相宇文融開元中為黄門侍郎平章事牲褊躁多言又引賓客故人晨夕戯謔為時論所譏在宰相位凡百餘日出為汝州刺史牛仙客開元中為工部尚書同中書門下三品知門下事仙客既居相位獨善其身唯諾而已所有錫賚皆緘封而不啟百司有所諮决仙客曰但依今式可也不敢措手裁决裴冕肅宗至徳初為門下侍郎平章事性忠勤悉心奉公稍得人心然不識大體以聚人曰財乃下令賣官鬻爵度僧尼道士以儲積為務人不願者科令就之其價益賤事轉為弊帝移幸鳳翔罷執政常衮代宗大歴中與楊綰同掌樞務帝尤信重綰宏通多可衮頗務苛細求清儉之稱與綰道不同時故事每日出内厨食以賜宰相饌其食可食十數人衮特請罷之爾後便為故事又将故讓堂封同列以為不可而止議者以為厚禄重賜所以優賢崇國政也不能當辭位不冝辭禄食喬琳徳宗建中初為御史大夫平章事初琳為懐州刺史素與張渉友善帝在春宫渉甞為侍讀及嗣位多以政事詢訪於渉盛稱琳識度材畧堪備大用琳本麄材年髙有耳疾帝每顧問對答失次論奏不合時已居相位凡八十餘日除工部尚書罷政事崔造貞元初為平章事疾錢殳諸使罔上奏改其弊而物議皆以造所條奏難為集事數月罷相事並不行崔損貞元中為右諫議大夫㑹門下侍郎平章事趙憬薨中書侍郎盧邁風疾戸部尚書裴延齡素善損乃薦之乃以本官平章事初二相有故旬日闕相中外顒望損素無聲實及拜命逺近失望齊抗為中書侍郎平章事雖讀書無逺致大畧凡為官必求至精末乃滋彰物論薄其隘刻劉滋為散騎常侍平章事在相位無所啟奏但多謙退亷謹畏慎而已程异憲宗元和十三年為工部侍郎平章事與皇甫鎛同入相二人俱以俗吏進异自知叨據羣情不惬頗謙遜自牧月餘日不敢知印秉筆鎛則傲然自得故物論多异賈躭居相位凡十三年不能以安危大計啟沃於人主但檢身勵行以律人崔楨為中書侍郎平章事在相位端慎信厚有餘而無開物成務之用属穆宗初幽鎮阻兵方隅多事機務壅滯繇楨而失者居多後因堅卧拜章請免遂以工部尚書罷相鄭綮昭宗時為右散騎常侍性滑稽為詩多侮刺故時號鄭五歇後體中人或誦其語於帝前帝見其語激訐謂有藴蓄就常奏班簿側注云可禮部侍郎平章事中書胥吏詣其家叅謁綮笑曰諸君大誤俾天下人並不識字宰相不及鄭五也胥吏曰出自聖㫖特恩来日制下綮抗手曰萬一如此笑殺他人眀日果制下親賓来賀搔首言曰歇後鄭五作宰相時事可知也累表遜讓不獲既入視事偘然守道無復詼諧終以物望非冝自求引退三月餘移疾乞骸以太子少保致仕後唐盧程荘宗同光初為河東觀察判官帝即位拜中書侍郎平章事程本非重器驟登顯貴舉止不常時朝廷草創庶物未備班列蕭然寺署多闕豆盧革同光初自定州判官徴拜門下侍郎平章事及登廊廟初無才業事多錯亂平梁之後引薦韋説兾諳事體與已同功説復事流品舉止輕脱怨歸於革崔恊眀宗天成初為平章事初孔循任事恊因其門人求為輔相成命将出宰相任圜言於執政曰圜比無學術謬叅文吏聖上以遭逢運㑹俾待罪廊廟四輔之重已虚一位今聞崔恊雖為名族本不讀書較其識見恐不及圜孔循忿其言拂衣而出稱疾不朝者數日帝俾安重誨諭之方入翼日降制拜平章事恊登庸之後廟堂制勅率假手於人前不同於己者思騁其欲鋒鋩露見多為近侍所阻馬𦙍孫末帝清泰初為中書侍郎平章事𦙍孫純儒事多凝滯遽被疇庸未悉朝廷舊事初馮道罷匡國軍節度使拜司空唐朝故事三公為加官無單拜者是時朝議率爾命道制出或曰三公正宰相便合叅大政又云合受册衆言籍籍盧文紀又欲祭祀時便令掃除馮道聞之曰司空掃除吾職也吾無所憚既而知非乃止劉昫為僕射性剛群情嫉之乃共嗾右常侍孔昭序論行香次第言常侍從之臣行立合在僕射前疏奏下御史臺定例同光已來李琪盧質繼爲僕射識性輕脱不能守師長體故昭序輕言𦙍孫以羣情不悦劉昫馮道欲微抑之乃責臺司須檢則例而臺吏言舊不見例據南北班位常侍在前属國忌將就列未定𦙍孫即判臺状曰既有援據足可遵行各示本官劉昫怒揮袂而退自後日責臺司定例崔居儉謂南宫同列曰孔十二言語是朝廷人總不解語也僕射師長中丞大夫就班備敬常侍班南宫六卿之下况僕射乎已前騎省年深望髙南宫工部侍郎如仰霄漢癡人舉止何取笑之深耶旬日聞居儉言紛議稍息文士哂𦙍孫堂判有援據二字其中書百職𦙍孫素未詳悉無能専决署名而已其故人干進者不如意共調之曰馮公為輔三不開為門口印也盧文紀清泰初為中書侍郎平章事時朝廷兵革之後宗社甫寜虜冦内侵强臣在境文紀處經綸之地無輔弼之謀所論者愛憎朋黨之小瑕所紏者銓選擬論之微纇時有太常丞史在徳論文武兩班冝選能進用文紀以為非已怒甚召諫議大夫盧損為覆状辭㫖蕪漫為衆所嗤漢楊邠與蘇逢吉蘇禹珪同在相位邠稍奪二蘇之權自是中書歛手而已邠每懲二蘇之失艱於除拜至於諸司補吏與門胄出身一切停罷時論以邠之蔽錮亦繇逢吉禹珪本不能至公於物之所致也周景範世宗顯徳中為中書侍郎平章事判三司為人厚重剛正無所屈撓然剸繁理劇非其所長雖悉心盡瘁終無稱職之譽帝知之因其所疾乃罷司邦計册府元龜卷三百三十五
