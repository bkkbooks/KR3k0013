body:
  text: 册府元龜卷八百三十四宋王欽若等撰總録部詞辯第二晉陳頵陳國苦人也辟豫州部從事刺史解結問僚佐曰河北白壤膏梁何故少人士每以三品為中正頵答曰詩稱維嶽降神生甫及申夫英偉大賢多出於山澤河北土平氣均蓬蒿裁髙三尺不足成材故也結曰張彦真以為汝潁巧辯恐不及青徐儒雅也頵曰彦真與元禮不協故設過言老子莊周生陳梁伏羲傅說師曠大項出陽夏漢魏二祖起於沛譙凖之衆州莫之與比結甚異之曰豫州人士嘗半天下此言非虛李仁初仕吳為侍中吳平侍中庾峻問仁曰聞吳主披人面刖人足有諸乎仁曰以告者過也君子惡居下流天下之惡皆歸焉蓋此事也若信有之亦不足怪昔唐虞五刑三代七辟肉刑之制未為酷虐皓為一國之主秉生殺之柄罪人陷法加之以懲何足多罪夫受堯誅者不能無怨受桀賞者不能無慕此人情也又問曰云歸命侯乃惡人横睛逆視皆鑿其眼有諸乎仁曰亦無此事傳之者謬耳曲禮曰視天子繇袷以下視諸侯繇頥以下視大夫繇衡視士則平面得游目五歩之内視上於衡則傲下於帶則憂旁則邪以禮視瞻髙下不可不慎况人君乎哉視人君相迕是乃禮所謂傲慢傲慢則無禮無禮則不臣不臣則犯法犯法則䧟不測矣正使有之將有何失裴楷為中書郎武帝初登祚探䇿以卜世數多少既而得一帝不恱羣臣失色莫有言者楷正容儀和其聲氣從容而進曰臣聞天得一以清地得一以寧王侯得一以為天下貞武帝大恱羣臣皆稱萬嵗胡母輔之字彦國王澄嘗與人書曰彦國吐佳言如鋸木屑霏霏不絶誠為後進領袖也後為揚武將軍湘州刺史華譚廣陵人爽慧有口辯為隣里所重舉秀才博士王濟於衆中嘲之曰五府初開羣公辟命采英竒於仄陋㧞賢雋於巖穴君呉楚之人亡國之餘有何秀異而應斯舉譚答曰秀異固産於外方不出於中國也是以明珠文貝生於江鬰之濵夜光之璞出乎荆藍之下故以人求之文王生於東夷大禹生於西𦍑子弗聞乎昔武王尅商遷殷頑民於雒邑諸君得非其苗裔乎濟又曰夫危而不持顛而不扶至於君臣失位國亡無主凡在冠帶將何所取哉答曰吁存亡有運興衰有期天之所廢人不能支徐偃修仁義而失國仲尼逐魯而適齊段干偃息而成名諒否泰有時曷人力之所能哉濟甚禮之又或問曰諺言人之相去如九牛毛寧有此理乎譚對曰昔許由讓天子之貴市道小人争半錢之利此之相去何啻九牛毛也聞者稱善後為散騎常侍袁甫字公胄淮南人好學與華譚齊名以辭辯稱嘗詣中領軍何朂自言能為劇縣朂曰惟欲宰縣不為臺閣職何也甫曰人各有能有不能譬繒中之好莫過錦錦不可以為幍穀中之美莫過稻稻不可以為虀是以聖人使人必先以器茍非周材何能悉長黄覇馳名於州郡而息譽京邑廷尉之才不為三公自昔然也朂善之又吕珩問曰卿名能辯豈知壽陽已東何以常水甫曰壽陽已東皆是呉人夫亡國之音哀以思鼎足強邦一朝失職憤積成憂憂積成隂隂積成雨雨久成水故其域常澇也後為淮南國大農郎中令卒於家李密犍為人也以洗馬徴至雒司空張華問之曰安樂公何如密曰可次齊桓華問其故對曰齊桓得管仲而霸用䜿刁而蟲流安樂公得諸葛亮而抗魏任黄皓而䘮國是知成敗一也次問孔明言教何碎密曰昔舜禹臯陶相與語故得簡大與凡人言宜碎孔明與言者無已敵言教是以碎耳華善之王澄衍弟也衍為司徒惠帝末衍白東海王越以澄為荆州刺史持節都督領南蠻校尉王敦為青州衍因問以方略敦曰當臨事制變不可豫論澄辭義鋒出筭略無方一坐嗟服祖納為光禄大夫嘗問梅陶君鄉里立月旦評何如陶曰善褒惡貶則佳法也納曰未益時王隱在坐因曰尚書稱三載考績三考黜陟幽明何得一月便行褒貶陶曰此官法也月旦私法也隱曰易稱積善之家必有餘慶積不善之家必有餘殃稱家者豈必是官必湏積大善惡乃著公私何異古人有言貞良而亡先人之殃酷烈而存先人之勲累世乃著豈但一月若必月旦則顔回食埃不免貪汙盗蹠引步則為清廉朝種暮穫善惡未定矣時陶及鍾雅數說餘事納輙困之因曰君汝潁之士利如錐我幽冀之士鈍如槌持我鈍槌捶君利錐皆當摧矣陶雅並稱有神錐不可得槌納曰假有神錐必有神槌雅無以對劉惔字真長尚明帝女廬陵公主以惔雅善言理簡文帝初作相與王濛並為惔客俱蒙上賔禮時孫盛作易象妙於見形論帝使殷浩難之不能屈帝曰使真長來故應有以制之乃命迎惔盛素敬服惔及至便與抗答辭甚簡至盛理遂屈一坐撫掌大笑咸稱美之後為丹陽尹劉劭為侍中時庾懌以白羽扇獻成帝帝嫌其非新反之劭曰柏梁雲搆大匠先居其下管弦繁奏䕫牙先聆其音懌之上扇以好不以新後懌聞之曰此人宜在帝之左右范宣詔徴太學博士散騎郎並不就家於豫章庾爰之問宣曰君博學通綜何以大儒宣曰漢興貴經術至於石渠之論實以儒為弊正始以來世尚老莊建晉之初競以裸裎為髙僕誠大儒然邱不與易顧愷之為荆州刺史殷仲堪參軍荆州人問以㑹稽山川之狀愷之云千巖競秀萬壑争流草木蒙籠若雲興霞蔚桓𤣥時與愷之同在仲堪坐共作了語愷之先曰火燒平原無遺燎𤣥曰白布纒根樹旒旐仲堪曰投魚入泉放飛鳥復作危語𤣥曰矛頭淅米劍頭炊仲堪曰百嵗老翁攀枯枝有一參軍云盲兒騎瞎馬夜半臨深池仲堪𦕈目驚曰咄咄逼人孫盛博學善言名理于時殷浩擅名一時與抗論者惟盛而已盛嘗詣浩談論對食奮擲塵尾毛悉落飯中食冷而復暖者數四至暮忘飡理竟不定盛又著醫卜及易象妙於見形論浩等竟無以難之繇是遂知名後至祕書省加給事中髙崧為侍中謝萬為豫州都督疲於親賔相送方卧在室崧徑造之謂曰卿今疆理西藩何以為政萬粗陳其意崧便為叙刑政之要數百言萬遂起坐呼崧小字曰阿酃故有才具邪後秦尹緯為姚興尚書左僕射緯友人隴西牛壽率漢中流人歸興謂緯曰足下平生自謂時明也才足以立功立事道消也則追二疏朱雲發其狂直不能如胡廣之徒洿隆隨俗今遇其時矣正是垂名竹素之日可不勉歟緯曰吾之所庶幾如是但未能委宰衡於夷吾識韓信於羈旅以斯為愧耳立功立事竊謂未負昔言興聞而謂緯曰君之與壽言也何其誕哉立功立事自謂何如古人緯曰臣實未愧古人何則遇時來之運則輔翼太祖建八百之基及陛下飛龍之始剪滅苻登盪清秦雍生極端右死饗廟庭古之君子正當爾耳興大恱宋王鎮惡為振武將軍時討司馬休之鎮惡既斬休之將朱襄因停軍抄掠諸蠻不時反及至江陵休之已平髙祖怒不時見之鎮惡笑曰但令我一見公無憂矣髙祖尋登城喚鎮惡鎮惡為人強辯有口機隨宜酧應髙祖乃釋臧凝之年少時與北地傅僧祐俱以通家子始為太祖所引見時帝與何尚之論鑄錢事凝之便干其語帝因廻與論之僧祐引凝之凝之大言謂僧祐曰明主難再遇便應正盡所懐帝與徃復十餘反凝之辭韻銓序兼有理證帝甚賞焉後為尚書左丞卒王惠字令明恬静不交游陳頵謝瞻才辯有風氣嘗與兄弟羣從造惠談論鋒起文史間發惠時相酧應言清理逺瞻等慙而退後為吏部尚書王僧達太保𢎞少子太祖聞僧達早慧妻以臨川王義慶女僧達性好鷹犬與閭里少年相馳逐又躬自屠牛義慶聞如此令周旋沙門惠觀造而觀之僧達陳書滿席與論文義惠觀酧答不暇深相稱美後為中書令坐誅張暢字少㣲吳郡人世祖鎮彭城以暢為安北長史魏太武南侵太尉江夏王義恭統諸軍出鎮彭泗太武親率大衆至彭城始至仍登城南亞父冡於戲馬臺立氊屋遣使送駞馬貂裘雜飲既至南門門先閉請鑰未出暢於城上視之魏使問是張長史耶暢曰君何得見識魏使答曰君聲名逺聞足使我知暢因問魏使姓答曰我是鮮卑無姓且道亦不可暢又問君居何位答曰鮮卑官位不同不可輙道然亦足與君相敵耳魏使復問何為忿忿杜門絶橋暢答曰二王以魏主營壘未立將士疲勞此精甲十萬人思致命恐輕相陵踐故且閉城待休息士馬然後共治戰塲克日交戰魏使曰君當以法令裁初何用廢橋復何足以十萬誇人我亦有良馬逸足若雲騎四集亦可以相拒暢曰王侯設險何但法令而己耶我若誇君當言百萬所以言十萬者正二王左右素所畜飬者耳此城内有數州士庶工徒猶所未論我本闘智不闘馬匹且冀之北土馬之所生君復何以逸足見誇邪魏使曰不爾城守君之所長野戰我之所長我之恃馬猶如君之恃城耳城内有且思者且音睢嘗在此國義恭遣視之思識是魏尚書李孝伯思因問李尚書若行塗有勞孝伯曰此事應相與共知思答縁共知所以有勞孝伯曰感君至意既開門暢屏却人仗出對孝伯并進餉物魏使云貂裘與太尉駱駞騾與安北蒲萄酒雜飲叔姪共賞魏主又乞酒并甘橘暢白於世祖而致意於魏云受命本朝過蒙藩任人臣無境外之交恨不暫息且城守備防邊鎮之常但恱以使之故勞而無怨耳太尉鎮軍得所送物魏主意知復湏甘橘今並付如别太尉以北土寒鄉皮毛袴褶脫是所湏今致魏主螺杯雜粽南土所􅈿鎮軍今以相致此信未去魏主復遣使令孝伯傳語曰魏主有詔語太尉安北近以騎至車兩在後今端坐無為有博具可見借暢曰博具當為申啟但向詔二王已非遜辭且有詔之言正可施於彼國何得稱之於此孝伯曰詔之與語朕之與我並有何異暢曰若辭以通可如來說既言有所施則貴賤有等向所稱詔非所敢聞孝伯又曰太尉安北是人臣與非暢曰是也孝伯曰隣國之君何為不稱詔於隣國之臣暢曰君之此稱尚不可聞於中華况在諸王之貴而猶曰隣國之君耶孝伯曰魏主言太尉鎮君並皆年少分濶南信殊當憂邑若欲遣信者當為䕶送脫湏騎者亦當以馬送之暢曰此方間路甚多使命日夕往來不復以此勞魏主孝伯曰亦知有水路似為白賊所斷暢曰君著白衣故稱白賊耶孝伯大笑曰今之白賊亦不異黄巾赤眉暢曰黄巾赤眉似不在江南孝伯曰雖不在江南亦不在青徐也暢曰今者青徐實為有賊但非白賊耳魏使云向借博具何故不出暢曰二王貴逺啓聞難徹孝伯曰周公握髪吐哺二王何貴逺暢曰握髮吐飱本施中國耳孝伯曰賔有禮主則擇之暢曰昨見衆賔至門未為有禮俄頃送博具出因以與之魏主又遣人云魏主致意太尉安北何不遣人來至我聞彼此之情雖不可盡要湏見我小大知我老少觀我為人若諸佐不可遣亦可使僮幹來暢入宣㫖答曰魏主形狀才力久為來徃所具李尚書親自御命不患彼此不盡故不復遣使孝伯又曰君南土膏粱何為著屩君而著此使將士云何暢曰膏粱之言誠為多愧但以不武受命綂軍戎陣之間不容緩服孝伯又曰長史我是中州人久處北國自隔華風相去歩武不得致盡邊皆是北人聽我語者長史當深得我孝伯又曰永昌王魏主從弟鎮長安今領精騎八萬直造淮南壽春久閉門自固不敢相禦向送劉康祖頭彼之人所見王𤣥謨甚見所悉亦是常才耳南國何意作如此任使以致奔敗自入此境七百餘里主人竟不能一相拒逆鄒山之險君家所憑前鋒始得接手崔耶利便藏入穴俄間諸將倒曵脚而出之魏主賜其生命今從在此復何以輕脫遣馬文恭至蕭縣使望風退撓耶君家民人甚相忿怨云清平之時賦我租帛至有急難不能相拯救暢曰知永昌已過淮南康祖為所破比有信使無此消息王𤣥謨南土偏將不謂為才但以人為前驅引導耳大軍未至而氷河向合𤣥謨量宜反斾未為失機但因夜迴師致戎馬小亂耳我家𤣥謨斗城陳憲小將魏主傾國累旬不克胡盛之偏裨小帥衆無一旅始濟融水魏國君臣奔迸僅得免脫滑臺之師無所多愧鄒山小戎雖有微險河畔之民多是新附始慕聖化奸盗未息是使崔耶利撫之而已今没虜手何損於國魏主自以十萬師而制一崔耶利方復足言耶聞蕭縣百姓並依山險聊遣馬文恭以十隊示之耳文恭謂前以三隊出還走後大營嵇𤣥敬以百騎至留城魏軍奔敗輕敵至此亦非所衂王境人民列居河畔二國交兵當互加撫養而魏師入境肆行殘虐事生意外因彼無道官不負民民何怨人知入境七百無復相拒此自上繇太尉神筭次在鎮軍勝略經國之要雖不預聞然用兵有機聞亦不容相語孝伯曰魏主當不圍此城自率衆軍直造𤓰歩南事若辦彭城不待圍若不㨗彭城亦非所湏也我今當南飲江湖以療渴耳暢曰去留之事自適彼懐若虜馬遂得飲江便為無復天道各應返命遲復更悉暢便廻還孝伯追曰長史深自愛敬相去歩武恨不執手暢因復謂曰將冀蕩定有期相見無逺君若得還宋朝今為相識之始孝伯曰待此未期孝伯言辭辯贍亦北土之美也暢隨宜應答吐屬如流音韻詳雅風儀華潤孝伯及左右人並相視歎息蕭惠開為輔國將軍督益寜二州惠開素有大志至蜀欲廣樹經略善於述事對賔僚及士人說收䍧牱越嶲以為内地綏討蠻濮闢地徴租聞其言者以為大功可立南齊周顒字彦倫音辭辯麗出言不窮宫商朱紫發口成句後為中書郎兼著作郎張融字思光為中書郎嘗侍髙帝出太極殿西室融入問訊彌時方登階及就席帝曰何乃遲為對曰自地昇天理不得速時魏主至淮而退帝問何意忽來忽去未有答者融下坐抗聲曰以無道而來見有道而去公卿咸以為㨗後至司徒左長史殷叡南康相元素之孫有口辯司徒褚彦回甚重之謂曰諸殷自荆州以來無出卿右叡斂容答曰殷族衰悴誠不如昔若此㫖為虗故不足降此㫖為實彌不可聞王融為中書郎武帝以其才辯使兼主客接魏使房景髙宋弁弁見融年少問主客年幾融曰五十之年久踰其半因問在本朝聞主客作曲水詩序景髙又云在北聞主客此製勝於顔延年實願一見融乃示之後日宋弁於瑶池堂謂融曰昔觀相如封禪之辭知漢武之徳今覽王生詩序用見齊主之盛融曰皇家盛明豈直比蹤漢武更慙鄙製無以逺匹相如武帝以魏所送馬不稱使融問之融曰秦西冀北實多駿驥而魏主所獻良馬反駑駘之不若求名撿事殊為未孚將旦旦信誓有時而爽駉駉之牧不能復嗣宋弁曰不答虗偽之名當是不習土地融曰周穆馬跡遍於天下若騏驥之性因地而遷則造父之䇿有時而躓弁曰王主客何為懃懃於千里融曰鄉國既異其優劣聊復相訪若千里日至聖上常駕皷車弁曰向意既湏必不能駕皷車也融曰買死馬之骨亦以郭隗之故弁不能答梁謝幾卿超宗之子補國子生齊文惠太子自臨䇿試謂祭酒王儉曰幾卿本長𤣥理今可以經義訪之儉承㫖發問幾卿隨事辯對辭無滯者文惠大稱賞焉儉謂人曰謝超宗為不死矣羅研字深議少有才辯鄧元超平蜀辟研為主簿後為信安令齊茍兒之役臨汝侯蕭獻嘲之曰卿蜀人樂禍貪亂一至於此對曰蜀中積弊實非一朝百家為村不過數家不食窮廹之人十有八九束縛之役旬有二三貪亂樂禍無足多怪若今家畜五母之鷄一母之豕牀上有百錢布被甑中有數斗麥飯雖蘇張巧說於前韓白按劒於後不能使一夫為盗况貪亂乎朱异少有詞辯普通初魏始連和使劉善明來聘异為中書舎人勑使接之預讌者皆歸化北人善明負其才氣酒酣謂异曰南國辯學如中書者幾人异對曰异所以得接賔客者乃分職是司二國通和所敦親好若以才辯相尚則不容使見善明乃曰王錫張纘此間所聞云何不見异具啓勑即使於南苑設宴錫與張纘朱异四人而已善明造席遍論經史兼以嘲謔纘隨方酧對無所稽疑不常談彼一事善明甚相欵揖他日謂异曰一日見二賢實副所期不有君子安能為國庚承先字子通潁川人喜愠不形於色人莫能窺鄱陽忠烈王在州欽其風味要與遊處又令講老子逺近名僧咸來赴集論難鋒起易端競至承先徐相酧答皆得所未聞忠烈王尤加欽重徴州主簿湘東王聞之亦拔為法曹參軍並不赴陳戚衮初仕梁為太學博士時簡文在東宫召衮講論又嘗置宴集𤣥儒之士先命道學首相質難次令中庻子徐摛馳騁大義間以劇談摛辭辯縱横難以答抗諸人氣懾皆失次序衮時騁義摛與徃復衮精采自若對答如流簡文深加歎賞後魏李先初為慕容永祕書監皇始初先於井陘歸順道武問先曰卿何國人先曰臣本趙郡平棘人帝曰朕聞中山土廣民殷信爾矣不先曰臣少官長安仍事長子後乃還鄉觀望民土實自殷廣又問先曰朕聞長子中有李先者卿其是乎先曰小臣是也帝曰卿識朕不先曰陛下聖徳膺符澤被八表龍顔挺特臣安敢不識帝又問曰卿祖父及身官悉歴何官先對曰臣大父重晉平陽太守大將軍右司馬父樊石虎樂安太守左中郎將臣苻丕尚書右主客郎慕容永祕書監髙密侯帝曰卿既宿士屢歴名官經學所通何典為長先對曰臣才識愚闇少習經史年荒廢忘十猶通六又問兵法風角卿悉通不先曰亦曽習讀不能明解帝曰慕容永時卿用兵不先曰臣時蒙顯任實叅兵事帝後以先為丞相衛王府左長史奚斤為萬騎大將太武以斤元老諮訪朝政斤聰辯強識善於談論逺說先朝故事雖未皆是時有所得聽者歎美之劉文曄本平原人父休賔初為宋明帝兖州刺史鎮梁鄒以城降獻文遷之於代邸文曄有志尚孝文幸方山文曄大言於路側曰求見聖明申宣久屈帝遣尚書李冲宣詔問曰卿欲何言聽卿面自申盡於是引見文曄對曰臣之陋族出自平原徃因燕亂流離河表居齊已來八十九載真君十一年世祖太武皇帝廵江之日時年二嵗隨外祖魯郡太守崔耶利於鄒山歸國耶利蒙賜四品除廣寗太守以臣年小不及齒録至天安之初皇威逺被臣亡父休賔劉氏持節兖州刺史戍梁鄒時慕容白曜以臣父居全齊之要水陸道衝青冀二城往來要路三城岳峙並拒王師白曜知臣母子先在代京表請臣母子慰勞臣即被先帝詔遣乘傳諸軍又賜亡父官爵白曜遣右司馬盧河内等送臣母子至鄒臣既見亡父備申皇澤云吾蒙本朝寵遇捍禦藩屏尊卑百口並在二城吾若先降百口必被誅滅既不固城於本朝又令尊卑塗炭豈堪為人臣以奉大魏乎汝且申吾意白僕射降意己判俟平歴城即率士衆送欵軍前既尅歴城白曜遣赤虎送臣并崔道固子景業等向梁鄒亡父既見赤虎之信仰感聖朝逺遣妻子又知天命有歸擁衆一萬以城降欵乘驛赴臺蒙為客列臣私釁深重亡父以延興二年孤背明世血誠微心未獲申展如臣等比並蒙榮爵為在事孤抑以人廢勲帝曰卿訴父賞而卿父無勲厯城齊之西闗歸命請順梁鄒小戍豈能獨全何足為功也文曄對曰誠如聖㫖愚臣所見獨有未盡何者昔樂毅破齊七十餘城唯有即墨獨在此豈非根亡而條立且夫降順之人驗之古今未有不繇危逼者故黄權無路歸欵列地封侯伯薛安都畢衆危急投命並受茅土之爵論古則如彼語今則如此明明之世不及此流竊惟梁鄒巖固地據中齊粟支十載控弦數千比之斗城不可同日而語斗城猶能抗兵累旬傷殺其衆若臣亡父固守孤城則非一朝可尅帝曰厯城既䧟梁鄒便是掌中何煩兵力對曰若如聖㫖白曜便應窮兵極意取勝俯仰何為上假赤虎之信下衒知變之民帝曰卿父此勲本自至少以卿才地豈假豐殷對曰臣尫愚六蔽文武無施響絶九臯聞天無日遭逢聖運萬死猶生但臣竊見徐兖是賊籓要徐兖既降諸戍皆應國有而東徐州刺史張讜所戍團城領二郡而已徐兖降後猶閉門拒命授以方岳始乃歸降父子二人並蒙侯爵論功比勤不先臣父帝曰卿引張讜讜事小異對曰臣未識異狀帝曰張讜始來送欵終不差信卿父進非先覺退又拒守何得不異對曰張讜父子始有歸順之名後有閉門之罪以功補過免罪為幸臣又見崔僧祐母弟隨其叔父道固在歴城僧祐遥聞王威逺及恐母弟淪亡督率鄉閭來欲救援既至郁州厯城已没束手歸誠救母弟之命聖朝嘉其附化賞以三品亡父之誠豈後僧祐帝曰僧祐身居東海去留任意來則國有去則他人是故賞之鄉父被圍孤城已是我物所以不賞對曰亡父據城歸國至公也僧祐意計而來為私也為私蒙賞至公不酬臣未見其可帝笑而不言比部尚書陸叡叱文曄曰假令先朝謬賞僧祐豈可謬相賞也文曄曰先帝中代聖主與日月等曜比於堯舜時宰則十亂五臣今言謬賞豈不仰誣先朝乎尚書髙閭曰卿謂母弟與妻子何者為重文曄曰母弟為重閭曰卿知母弟重朝廷賞僧祐是也卿父為妻子而來事何相反對曰僧祐若無母弟來歸不閭曰不來文曄曰若僧祐赴母弟之難此是私而亡父本為大丈夫立身處世豈可顧妻子而曰髙節也昔樂羊食子有顧以歸亡父本心實不垂顧所以歸化者自知商周不敵天命有所帝謂文曄曰卿之所訴頗亦有途賞從重罪從輕尋勑酧叙文曄泣曰臣愚頓已極再見無期陛下既垂慈澤願勑有司特賜矜禮帝曰王者無戲何待懃懃既而賜文曄爵都昌子深見待遇髙閭為太常卿卒官閭強果敢直諌其在私室言裁聞耳及於朝廷廣衆之中則談論鋒起人莫能敵孝文以其文雅之美每優禮之李冏為度支尚書髙祖幸長安冏以咸陽山河嶮固秦漢舊都古稱陸海勸髙祖去雒陽而都之後髙祖引見冏笑而謂之曰卿昨有啓欲朕都此昔婁敬一說漢祖即日西駕尚書今以西京說朕理殊所以今古相反耳冏對曰昔漢祖起於布衣欲藉嶮以自固婁敬之言合於本㫖今陛下百世重光徳合四海事同隆周均其職貢是以愚臣獻說不能上動髙祖大恱北齊陸法和平常言若不出口時有所論則雄辯無敵猶然帶蠻音文宣以為太尉兼西南大都督裴讓之弟諏之奔闗右兄五人皆拘繫神武問云諏之何在答曰昔吳蜀二國諸葛兄弟各得盡心况讓之老母在君臣分定失忠與孝愚夫不為伏願明公以誠信待物若以不信處物物亦安能自信以此定霸猶却行而求道耳神武善其言兄弟俱釋後為清河太守被誅唐薛收為秦府計室房𤣥齡薦之於太宗即日召見問以經略收辯對縱横皆合㫖要鄭惟忠天授中應舉召見則天臨軒問諸舉人何者為忠諸人對不稱㫖惟忠對曰忠者外揚君之美内隱君之惡則天曰善及為水部員外郎則天幸長安惟忠待制來見則天謂曰朕識卿乆矣前於東部言忠臣外揚君之美内隱君之惡至今不忘册府元龜卷八百三十四
