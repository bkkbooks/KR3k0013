body:
  text: 册府元龜卷三百三十宋王欽若等撰宰輔部退讓劉向有言曰舜命九官濟濟相讓和之至也傳曰羣后徳讓是知讓之為徳也至矣矧廊廟之上輔弼之職佐佑天子燮理隂陽外撫四夷内安百姓其為任也重矣而有副兹具瞻允膺登用乃能勵貞退之節崇謙挹之風或推功以相先或舉徳以自代發於誠慤葢非矯飾固足以激奔競之風懲貪冐之黨與夫鵜在梁而濡翼負且乗而致冦興積薪之歎思五鼎之食者不可同年而語也舜既即帝位曰咨四岳有能奮庸熈帝之載奮起庸功載事也訪羣臣有能起發其功廣堯之事者言舜曰以别堯使宅百揆亮采惠疇亮信惠順也求其人使居百揆之官信立其功順其事者誰乎僉曰伯禹作司空四岳同辭而對禹代鯀為崇伯入為天子司空治洪水有成功言可用之帝曰俞咨禹汝平水土惟時懋哉然其所舉稱禹前功以命之懋勉也惟居是百揆勉行之禹拜稽首譲於稷契暨臯陶居稷官者棄也契臯陶二臣名稽首首至地也帝曰俞汝徃哉然其所推之賢不許其讓勑使徃宅百揆帝曰疇若予工僉曰垂哉問誰能順我百工事者朝臣舉垂垂臣名帝曰俞咨垂汝共工共謂供其職事垂拜稽首讓于殳斨暨伯與殳斨伯與三臣名帝曰俞徃哉汝諧汝能諧和此官帝曰疇若予上下草木鳥獸僉曰益哉上謂山下謂澤若順謂施其政教取之有時用之有節言伯益能之帝曰俞咨益汝作朕虞虞掌山澤之官益拜稽首讓于朱虎熊羆帝曰俞徃哉汝諧朱虎熊羆四臣名垂益所讓四人皆在元愷之中帝曰咨四岳有能典朕三禮僉曰伯夷三禮天地人之禮伯夷臣名姜姓帝曰俞咨伯汝作秩宗秩序宗尊也主郊廟之官夙夜惟寅直哉惟清夙早也言早夜敬思其義興禮施政教使正直而清明伯拜稽首讓于䕫龍䕫龍二臣名帝曰俞徃欽哉然其賢不許譲漢陳平為右丞相事恵帝及吕太后終平與太尉周勃合謀誅諸吕立文帝文帝立舉以為相舉猶皆也文帝以平勃俱舊臣有功皆欲以為相太尉勃親以兵誅吕氏功多平欲讓勃位乃謝病文帝初立怪平病問之平曰髙帝時勃功不如臣及誅諸呂臣功亦不如勃願以相譲勃於是乃以太尉勃為右丞相位第一臣欽若等曰秦漢以前尚右平徙為左丞相位第二周勃為右丞相居十餘月人或説勃曰君誅諸吕立代王威震天下而君受厚賞處尊位以厭之則禍及身矣􅌅謂當之也言既有大功又受厚賞而居尊位以乆當之不去則禍及矣勃懼亦自危乃謝請歸相印帝許之公孫𢎞武帝時為丞相後淮南衡山王謀反治黨與方急𢎞病甚自以為無功而封侯居宰相位宜佐眀主填撫國家使人繇臣子之道繇從也今諸侯有叛逆之計此大臣奉職不稱也稱副也恐病死無以塞責乃上書曰臣聞天下達道五所以行之者三君臣父子夫婦長㓜朋友之交五者天下之達道也知仁勇三者所以行之也故曰好學近乎知力行近乎仁知耻近乎勇知此三者知所以自治然後知所以治人未有不能自治而能治人者也陛下躬孝悌監三王建周道兼文武招徠四方之士任賢序位量能授官將以勵百姓勸賢才也今臣愚駑無汗馬之勞言未嘗從軍旅陛下過意擢臣𢎞卒伍之中過猶誤也封為列侯致位三公臣𢎞行能不足以稱不副其任也加有負薪之疾恐先狗馬填溝壑終無以報徳塞責願歸侯乞骸骨避賢者路帝報曰君不幸罹霜露之疾何恙不已罹遭也恙憂也已止也言何憂於疾不止也乃上書歸侯乞骸骨是彰朕之不徳也今事少間言行空隙也君其存精神止念慮輔助醫藥以自持因賜告牛酒雜帛居數月有瘳視事石慶為丞相元封四年闗東流民二百萬口無名數者四十萬名數若今户籍公卿議欲請徙流民於邉以適之適讀曰謫慶慙不任職上書曰臣幸得待罪丞相疲駑無以輔治城郭倉廪空虚民多流亡罪當伏斧鑕上不忍致法願歸丞相侯印乞骸骨歸避賢者路公孫賀武帝時代石慶為丞相初引拜不受印綬頓首涕泣曰臣本邉鄙以鞍馬騎射為材官誠不任宰相帝與左右見賀悲哀感動下泣曰扶起丞相賀不肯起帝乃起去賀不得已拜出左右問其故賀曰主上賢明臣不足以稱恐負重責從是殆矣張安世為車騎將軍霍光薨後御史大夫魏相上封事言宜尊其位以為大將軍宣帝亦欲用之安世聞㫖懼不敢當請間求見免冠頓首曰老臣耳妄聞言之為先事不言情不達事未施行而遽言之故曰先事也誠自量不足以居大位繼大將軍後唯天子財哀以全老臣之命財與裁同帝笑曰君言大謙君而不可尚誰可者言君尚不可誰更可也安世深辭弗能得後數日竟拜為大司馬領尚書事其子延夀為光祿勲領宿衛安世自見父子尊顯懷不自安為子延夀求出補吏宣帝以為北地太守嵗餘帝閔安世年老復徵延夀為左曹太僕元康四年春安世病上䟽歸侯乞骸骨天子報曰將軍年老被病朕甚憫之雖不能視事折衝萬里君先帝大臣明於治亂朕所不及得數問焉言意所不及者即以問君也何感而上䟽歸衛將軍富平侯印感恨也薄朕忘故薄猶嫌也君意嫌朕遺忘故舊而求去也非所望也願將軍强餐食近醫藥専精神以輔天年安世復强起視事匡衡元帝時為丞相中書令石顯用事自前相韋𤣥成及衡皆畏顯不敢失其意成帝初即位衡乃與御史大夫甄譚共奏顯追條其舊惡並其黨與於是司𨽻校尉王尊劾奏衡譚居大臣位知顯等専權勢作威福為海内患害不以時白奏行罰而阿諛曲從附下㒺上無大臣輔政之義既奏顯等不自陳不忠之罪而反揚著先帝任用傾覆之徒罪至不道有詔無劾衡慙懼上䟽謝罪因稱病乞骸骨上丞相安樂侯印綬帝報書不許因賜上尊酒養牛衡起視事黙黙不自安每有水旱風雨不時連乞骸骨讓位帝輙以詔書慰撫不許張禹為給事中領尚書事時成帝舅平陽侯王鳯為大將軍輔政専權禹與鳯並領尚書内不自安上書乞骸骨欲避鳯帝報曰朕以㓜年執政萬幾懼失其中君以道徳為師故委國政君何疑而數乞骸骨忽忘雅素欲避流言雅素故也謂師𫝊故舊之恩朕無聞焉不聞有毁短之言君其固心致思總秉諸事推以孳孳無違朕意加賜黃金百斤養牛上尊酒大官致饗侍醫視疾使者臨問侍醫侍太子之醫禹惶恐復起視事河平四年為丞相封安昌侯為相六年鴻嘉元年以老病乞骸骨帝加優再三乃聽許賜安車駟馬黃金百斤罷就第以列候朝朔望位特進見禮如丞相置從事史五人益封四百戸朱博哀帝時為丞相封陽鄉侯食邑二千戸博上書讓曰故事封丞相不滿千戸而臣獨過制誠慙懼願還千户許焉孔光哀帝時以丞相封博山侯後益封凡食邑萬一千户病甚上書讓還七千户及還所賜第一平當哀帝時為御史大夫至丞相以冬月賜爵闗内侯明年春帝使使者召欲封當冬月非封侯時故且先賜爵闗内侯當病篤不應召室家或謂當不可强起受侯印為子孫耶當曰吾居大位已負素餐責矣起受侯印還卧家死有餘罪今不起者所以為子孫也遂上書乞骸骨帝報曰朕選於衆以君為相視事日寡輔政未乆隂陽不調冬無大雪旱氣為灾朕之不徳何必君罪君何疑而上書乞骸骨歸闗内侯爵邑使尚書令譚賜君養牛一上尊酒十石君其勉致醫藥以自持後月餘卒後漢李通光武時為大司空性謙恭嘗欲避權勢素有消疾自為宰相謝病不視事連年乞骸骨帝每優寵之令以公位歸第養病通復固辭積二嵗乃聽上大司空印綬以特進奉朝請竇融光武建武中遷大司空融自以非舊臣一旦入朝在功臣之右每召㑹進見體貌辭氣卑恭己甚帝以此愈親厚之融小心乆不自安數辭讓爵位因侍中金遷口逹至誠又上䟽曰臣融年五十三有子年十五質性頑鈍臣融朝夕教導以經藝不得令觀天文見䜟記誠欲令恭肅畏事恂恂循道不願其有才能何况乃當𫝊以連城廣土享諸侯王國哉因復請間求見帝不許後朝罷逡巡席後帝知欲有讓遂使左右𫝊出它日朝見迎詔融曰日者知公欲讓職還土故命公暑熱且自便今相見宜論他事勿得復言融不敢重陳請伏恭明帝時為司空在位九年以病乞骸骨罷詔賜千户奉以終身鄧彪章帝元和初為太傅錄尚書事及竇氏誅以老病上還樞機要職詔賜養牛酒而許焉第五倫章帝時為司空連以老病上䟽乞身賜䇿罷以二千石奉終其身加賜錢五十萬宅一區後數年卒張酺和帝永元中為太尉數上䟽以疾乞身薦魏郡太守徐防自代帝不許使中黄門問病加以珍羞賜錢三十萬酺遂稱篤時子蕃以郎侍講帝因令小黄門勑蕃曰隂陽不和萬人失所朝廷望公思惟得失與國同心而託病自潔求去重任誰當與吾同憂責者非有望於斷金也司徒固疾司空年老公其傴僂勿露所勑酺惶恐詣闕謝還復視事司徒劉方司空張奮也張禹殤帝時為太傅錄尚書事及安帝即位數上疾乞身詔遣小黄門問疾賜牛一頭酒十斛勸令就第明年與太尉徐防司空尹勤同日封侯禹封安郷侯食千二百户其秋以寇賊水雨䇿免防勤而禹不自安上書乞骸骨更拜太尉劉愷安帝時為司徒視事五嵗稱病上書致仕有詔優許焉安帝始親政事朝廷多稱愷之德復拜太尉視事三年以疾乞骸骨乆乃許之黄瓊桓帝延熹元年為太尉以日食免明年梁冀誅瓊復拜為太尉以師傅之恩而不阿梁氏乃封為邟郷侯邑千户瓊辭疾讓封六七上言㫖懇惻乃許之陳蕃延熹八年為太尉蕃讓曰不愆不忘率由舊章臣不如太常胡廣齊七政訓五典臣不如議郎王暢聰明亮達文武兼資臣不如弛刑徒李膺帝不許竇后臨朝以蕃為太傅錄尚書事靈帝即位竇太后復優詔蕃曰葢褒功以勸善表義以厲俗無徳不報大雅所歎太傅陳蕃輔弼先帝出内累年忠孝之美徳冠本朝謇諤之操華首稱固今封蕃髙陽鄉侯食邑三百户蕃䟽讓曰使者即臣盧授髙陽鄉侯印綬臣誠悼心不知所裁臣聞讓身之文德之昭也然不敢盗以為名竊惟割地之封功徳是為臣熟自思省前後歴職無它異能合亦食禄不合亦食祿臣雖無素潔之行竊慕君子不以其道得之不居也若受爵不讓掩面就之使皇天震怒灾流下民於臣之身亦何所寄顧惟陛下哀臣朽老戒之在得竇太后不許蕃復固讓章前後十上竟不受封魏王朗文帝黄初中為司空時鵜鶘集靈芝池詔公卿舉獨行君子朗薦光祿大夫楊彪且稱疾讓位於彪帝乃為彪置吏卒位次三公詔曰朕求賢於君而未得君乃翻然稱疾非徒不得賢更開失賢之路増玉鉉之傾無乃居其室出其言不善見違於君子乎君其勿有後辭朗乃起華歆黄初中為太尉病乞退讓位於管寜帝不許臨當大㑹乃遣散騎常侍繆襲奉詔喻㫖曰朕新蒞庻事一日萬幾懼聽斷之不明賴有徳之臣左右朕躬而君屢以疾辭位夫量主擇君不居其朝委榮棄祿不究其位古人固有之矣顧以周公伊尹則不然潔身狥節常人為之不望之於君君其力疾就㑹以恵予一人將立席几筵命百官総己以須君到朕然後御座又詔襲須歆必起乃還歆不得已乃起衛臻明帝時為司徒齊王即位後固乞遜位詔曰昔干木偃息義壓强秦留侯頥神不忘楚事讜言嘉謀望不吝焉賜宅一區位特進秩如三司徐邈以光祿大夫拜司空邈嘆曰三公論道之官無其人則缺豈可以老病忝之哉遂固辭不受蔣濟齊王時為太尉以随太傅司馬宣王屯雒水浮橋誅曹爽等進封都鄉侯邑七百户濟上䟽曰臣忝寵上司而爽敢包蔵禍心此臣之無任也太傅奮獨斷之䇿陛下明其忠節罪人伏誅社稷之福也夫封寵慶賞必加有功今論謀則臣不先知語戰則非臣所率而上失其制下受其弊臣備宰司民所具瞻誠恐冐賞之漸自此而興推讓之風由此而廢固辭不許盧毓髙貴鄉公時為司空毓固推驃騎將軍王昶光祿大夫王觀司𨽻校尉王祥詔使使者即授印綬進爵封容城侯邑二千三百户王觀為僕射常道鄉公即位遷司空固辭不許遣使即第拜授就官數日上送印綬輙自輿歸里舍晋王祥泰始初為太保以年老疲耄累乞遜位帝不許祥固乞骸骨詔聽以睢陵公就第鄭袤初仕魏為光祿大夫景元初因病疾失明雖寝疾十餘年而時賢並相推薦武帝泰始中詔曰光祿大夫宻陵侯袤履行純正守道冲粹退有清和之風進有素絲之節宜登三階之曜補衮職之闕今以袤為司空天子臨軒遣五官中郎將國坦就第拜授袤前後辭讓遣息稱上送印綬至於十數袤謂坦曰魏以徐景山為司空吾時為侍中受詔譬㫖徐公語吾曰三公當上應天心茍非其人實傷和氣不敢以垂死之年累辱朝廷也終於不就遵大雅君子之迹可不務乎固辭乆之見許鄭冲武帝泰始初為太傅冲表乞骸骨優詔不許九年冲又抗表致仕詔曰太傅韞徳深粹履行髙潔恬逺清虚確然絶世艾服王事六十餘載忠肅在公慮不及私遂應衆舉歴登三事仍荷保𫝊之重綢繆論道之任光輔奕世亮兹天工廸宣謀猷𢎞濟大烈可謂朝之雋老衆所具瞻者也朕昧於政道庻事未康挹仰耆訓導揚厥䝉庶賴顯徳緝熈有成而公屢以年髙疾篤致仕告退惟從公志則朕孰與咨謀譬彼渉川罔知攸濟是用未許迄於累載而髙譲彌篤至意難違覽其盛指俾朕憮然夫功成弗有上徳所隆成人之美君子與焉豈必遂朕憑賴之心以枉大雅進止之度哉今聽其所執以夀光公就第位同保傅在三司之右山濤武帝太康初自尚書僕射拜司徒濤固譲詔曰君年耆德茂國之碩老是以授君台輔之位而逺崇克讓至於反覆良用於邑君當終始朝政翼輔朕躬濤又表曰臣事天朝三十餘年卒無毫釐以崇大化陛下私臣無已猥授三司臣聞徳薄位髙力少任重上有折足之凶下有㓕門之咎願陛下垂累世之恩乞臣骸骨詔曰君翼賛朝政保乂皇家匡佐之勲朕所依賴司徒之職實掌邦教故用敬授以荅羣望豈宜冲讓以自抑損耶已勑斷章表使者乃卧加章綬濤曰垂沒之人豈可汚官府乎輿疾歸家衛瓘太康初為司空以日蝕瓘與太尉汝南王亮司徒魏舒俱遜位帝不聽魏舒太康中為司徒以年老每稱疾遜位中復暫起署兖州中正尋又稱疾尚書左丞郄詵與舒書曰公乆疾小差視事是也唯上所念何意起訖還卧曲身迴法甚失具瞻之望公少立巍巍一旦棄之可不惜哉舒稱疾如初後以災異遜位武帝不聽後因正旦朝罷還第表送章綬帝手詔敦勉而舒執意彌固乃下詔曰司徒劇陽子舒體道𢎞粹思量經逺忠肅居正在公盡規入管詮衡官人允敘出贊衮職敷𢎞五教恵訓播流徳音茂著可謂朝之俊乂者也而屢執沖譲辭㫖懇誠申覧反覆省用憮然葢成人之美先典所與難違至情今聽其所執以劇陽子就第李𦙍太康中為司徒以吳㑹初平大臣多有勲勞宜有登進乃上䟽遜位帝不聽遣侍中宣旨優詔敦諭絶其章表李不得已起視事劉寔恵帝元康中為司空遷太保轉太傅以老病遜位賜安車駟馬錢百萬以侯就第懐帝即位復授太尉寔自陳年老固辭不許左丞相劉坦上言曰夫堂髙級逺主尊相貴是以古之哲王莫不師其元臣崇養老之教訓示四海使長少有禮七十致仕亦所以優異舊徳厲廉髙之風太尉寔體清素之操執不渝之潔懸車告老二十餘年浩然之志老而彌篤可謂國之碩老邦之宗模臣聞老者不以筋力為禮寔年踰九十命在日制遂自扶輿冐險而至展哀山陵致敬闕庭大臣之節偹矣聖詔殷勤必使寔正位上台光飪鼎實斷章敦喻經涉二年而寔頻上露板辭㫖懇誠臣以為古之養老以不事為優不以吏之為重謂宜聽寔所守三年詔曰昔虞任五臣致垂拱之化漢相蕭何興寧一之譽故能光隆於當時垂裕於百代朕紹天明命臨御萬邦所以崇顯政道者亦賴之於元臣庶尹畢力股肱以副至望而君年耆告老確然難違今聽君以侯就第位居三司之上秩祿凖舊賜几杖不朝及宅一區國之大政將咨於君副朕意焉王衍懐帝時為太尉尚書令封武陵侯衍辭封不受王導成帝時為太保嵗大旱導上䟽遜位詔曰夫聖王御世動合至道運無不周故能人倫攸敘萬物獲宜朕荷祖宗之重託於王公之上不能仰陶𤣥風俯治宇宙亢陽踰時兆庻胥怨邦之不臧惟予一人公體道明哲𢎞猷深逺勲格四海翼亮三世國典之不墜寔仲山甫補之而猥崇謙光引咎克譲元首之愆寄責宰輔祗增其闕博綜萬幾不可一日有曠公宜遺履謙之近節遵經國之逺畧門下速遣侍中以下敦喻導固譲詔累逼之然後視事庾亮成帝時遷司空固讓不拜㑹王導薨徴亮為司徒揚州刺史錄尚書事亮乂固辭成帝許之咸康六年薨追贈太尉及葬又贈永昌公印綬弟氷上䟽曰臣謹詳前事亦曾聞臣亮對臣等之言懇懇於斯事是以屢自陳請将迄十年豈恃好讓而不肅恭顧曩時之釁近出宇下加先帝神武筭畧兼該是以役不踰時而兇彊馘滅計之以事則功歸聖主推之於運則勝非人力至如亮等因聖畧之𢎞得效所職事将何論功将何賞及後傷蹶責踰先功是以陛下優詔聽許亮實思自効以報天徳何悟身潜聖世㣲志長絶存亡哀恨痛貫心膂願陛下發明詔遂先恩則臣亮死且不朽庾氷成帝時為中書監輔政初氷為吳國内史㑹蘇峻作逆氷行奮武将軍拒峻别率張徤走之乘勝赴京師又遣将攻賊石頭城㧞之氷勲為多封新呉縣侯固辭不受及氷輔政詔復論前功氷上䟽曰臣門户不幸以短才贊務釁及天庭殃流邦族若晋典休明夷戮乆矣而於時顛沛刑憲暫墜遂令臣等復得為時陳力狥國之臣因之而奮立功於大罪之後建義於顛覆之餘此是臣等所以復得視息於天壤王憲不復必明於徃諐也此之厚幸可謂𢎞矣豈復得計勞納封受賞司勲哉願陛下曲降靈澤哀恕繇中申命有司恵臣所乞則愚臣之願於此畢矣許之陸玩為尚書令左光祿大夫開府儀同三司玩頻自表優詔褒揚重復自陳曰臣實凡短風操不立階緣嘉㑹便蕃榮顯遂捴括憲臺預聞政道竟不能敷融𤣥風清一朝序咎責之來於臣已重誠以身許國義忘曲讓而慺慺所守終於陳訴者特以端右機要事務殷多但臣已盈六十之年智力有限疾患深重體氣日弊朝夕自勵非復所堪若偃息茍免職事並廢則莫大之悔天下將謂臣何乞陛下披豁聖懐霈然垂允詔不許玩重表曰臣比陳誠欵不足上暢天聰聖㤙徘徊勵以體國臣聞至公之道上下𤣥同用才不負其長量力不受其短雖加官重祿無世不有皆勲庸親賢惟時所須賴兼統以濟世務非優崇以榮一人臣受遇三世恩隆寵厚豈敢辭執事之勞求冲讓之譽徒以端右要重興替所存乆以無任妨賢曠職臣猶自知不可况天下之人乎今復外參論道内統百揆不堪之名有如皎日願陛下少垂哀矜使四海知官不可以私於人人不可以私取官則天工宏坦誰不謂允猶不許蔡謨康帝時為揚州刺史錄尚書事領司徒謨冲讓不辟僚佐詔屢敦逼之始取掾屬及遷侍中司徒上䟽讓曰伏自惟省昔階謬䝉恩忝非據尸素累積而光寵更崇謗讟彌興而榮進復加上虧聖朝棟隆之舉下増㣲臣覆餗之釁惶悚戰灼寄顔無所乞垂天鍳迴恩改謬以允羣望皇太后詔報不許謨猶固讓謂所親曰我若為司徒將為後代所哂義不敢拜也皇太后遣使喻意自四年冬至五年末詔書屢下謨固守所執册府元龜卷三百三十
