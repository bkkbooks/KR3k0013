body:
  text: 册府元龜卷六百二十八宋王欽若等撰環衞部姦佞遷黜虐害姦佞夫以法勾陳之象統禁衛之兵王之爪牙國之禦侮雖曰親宻之地亦容姦佞之流毁嫉忠賢善事權勢巧言令色阿䛕取容故足以惑於聰明傷乎徳政也孔子云放鄭聲逺佞人鄭聲淫佞人殆冨哉言乎漢王温舒為中尉多謟善事有埶音世者即無埶視之如奴有埶家雖有姦淫如山弗犯無埶雖貴戚必侵辱謂不居權要之職者舞文巧請下户之猾以動大豪弄法而巧為猾下户之狡猾者用詆動大豪之家所以然者為大豪中有權要不可治故也晉羊琇為中䕶軍在職十三年典禁兵然常慕勝已其所推奉便盡心無二窮窘之徒時能賑恤選用多以得意者居先不盡銓次之理將士有冒官位者為其致節不惜軀命髙韜為右衛將軍放佚無檢與殿省小人交通及父光卒仍於䘮中徃來不絶隋元胄髙祖時為右衛大將軍房陵王之廢也胄預其謀帝正窮治東宫事左衛大將軍元旻苦諫楊素乃譛之帝大怒執旻於仗胄時當下直不去因奏曰臣不下直者為防元旻耳復以言激怒帝帝遂誅旻賜胄帛一千疋郭衍焬帝大業初為左武衛大將軍能揣上意阿䛕順㫖帝毎謂人曰惟有郭衍心與朕同又嘗勸帝取樂五日一視事無得效髙祖空自劬勞帝從之益稱其孝順宇文述煬帝大業中為左衛大將軍善於供奉俯仰折旋容止便僻宿衛者咸取則焉又有巧思凡有所裝飾皆出人意表數以竒服異物進獻宫掖繇是帝彌悦焉唐劉希暹出自戎伍有膂力形貌充偉以騎射聞得入神䇿軍典領禁兵時魚朝恩專掌神策兵希暹屢陳武略又善候朝恩意甚為朝恩親信累遷太僕卿充神䇿軍都虞候與神策兵馬使王駕鶴同掌軍務白志貞徳宗建中年為神䇿軍使善候伺上意言必聴從嗣虢王則之貞元中為左金吾大將軍性貪恡希㫖伺察苛細以聞人皆畏之李道古憲宗元和末為金吾將軍邪險百端以求寵進日持朝臣隂事搆於皇甫鏄信而狎之士君子頗憂其得志穆宗初與鏄俱敗遷黜先王設環列之職以法守勾陳制刑罰之威以象乎震曜况夫官備宿衛晝夜是司親近宫闈秉執棨㦸固宜警戒所關淑慎爾身豈有不思其憂遐棄厥職廣納賕賂恣為奢豪吏議有歸咎將誰執自貽憲法良可悼哉漢王嘉為郎坐户殿門失闌免户止也嘉掌守殿門止不當入者而失闌之故坐免也春秋左氏傳曰屈蕩户之魏楊俊為中尉太祖征漢中魏颯反於鄴俊自劾詣行在所俊以身方罪免牋辭太子太子不悦曰楊中尉便去何太祖逺耶遂被書左遷平原太守宋劉懐慎義熙十三年髙祖北伐以為中領軍征虜將軍衛輦轂坐府内相殺免官王景文為右衛將軍坐與奉朝請毛法因蒲戲得錢一百二十萬白衣領職南齊到撝為左衛將軍随王子隆帶彭城郡撝問訊不修民敬為有司所舉免官久之白衣兼御史中丞蔡約領驍騎將軍太子中庻子領屯騎校尉永明八年八月合朔約脱武冠解劍於省眠至下鼓不起為有司所奏贖論張欣泰為直閣步兵校尉領羽林監後從車駕出新林勑欣泰甲仗亷察欣泰停仗於松樹下飲酒賦詩制局監吕文度過見啓世祖世祖大怒遣出外數日意稍釋召還謂之曰卿不樂為武職驅使當處卿以清貫遂除正員郎唐李邈為右金吾衛將軍先天二年十月𤣥宗講武於驪山給事中唐紹以失軍容將斬之上既怒唐紹左右猶望寛之會邈遽請宣勑遂斬之時人皆痛惜紹而深咎於邈等尋有制罷邈官邈以是遂擯廢終身白志貞為神策軍使建中四年頻發兵東討戰卒城役殆盡都不奏聞所存者沽販之徒又皆在沛里涇師之叛兇徒犯闕禁中無以禦宼鑾輿遷幸賊黨得以陸梁職志貞之繇也及扈蹕奉天猶加禮部尚書無幾朝臣頻有論其敗謀者物議紛然繇是貶開州别駕李建徽為左神武大將軍貞元三年以其妻柳氏與部國公主交徃也改作驍衛大將軍張或為左金吾大將軍元和二年坐補吏受賕改太子詹事致仕尹慎為右金吾大將軍元和五年以錢三千萬賂右神䇿軍䕶軍中尉第五從直求為河中節度從直恐事泄奏之上怒入其贓一千五百萬仍黜為右衛將軍通宻近坐死者三人孫璹為右羽林軍大將軍元和六年坐與弓箭庫劉希先交通賂希先錢二十萬以求方鎮改右衛將軍張志和為左神䇿軍擊毬將寳厯元年因侍宴被酒乖禮杖八十流豐州家屬配掖庭李惎為右龍武大將軍惎西平王晟之子無他材能以功勲家累官至庫使沉湎於聲色恣為奢侈積至累千萬至是以子貸回鶻錢一萬一千四百貫不償為回鶻所訴貶宣州别駕梁冦彦卿為左金吾衛大將軍充街使一日過天津橋有老人悞衝其前駈導者排之落橋而斃為御史府所彈太祖不得已責授左衛中郎將虐害西漢已降環列之職重矣專總衛兵叅决庻獄乃有殘忍之類恣其㐫蠧之性以暴殄為稱職以苛刻為無私毒痡平民甚於猛虎威虐庻僕酷如秋荼和氣用傷仁政斯缺王者所以屏四惡者其以是夫漢郅都為中尉是時民樸畏罪自重而都獨先嚴酷致行法不避貴戚列侯宗室見都側目而視號曰蒼鷹臨江王徵詣中尉府對簿簿者獄辭之文書也音步户切臨江王欲得刀筆為書謝上刀斫削治書也古者書於簡版故必用刀焉而都禁吏弗與魏其侯使人間予臨江王伺間隙而私與也臨江王既得為書謝上因自殺竇太后聞之怒以危法中都仲搆成其罪也都免歸家寗成以謁者事景帝為郎猾賊任威為中尉其治效郅都其廉弗如然宗室豪傑人皆惴恐杜周為執金吾逐捕桑𢎞羊衛皇后曰此弟子深刻武帝以為盡力無私遷御史大夫尹齊為中尉齊初以刀筆吏事張湯湯數稱以為亷武帝使督盗賊斬伐不避貴埶遷闗都尉聲甚於寗成帝以為能故拜中尉王温舒為中尉姦猾窮治大氐盡靡爛獄中大氐大歸也靡碎也氐丁禮反靡武皮反行論無出者其爪牙吏虎而冠言其殘暴之甚也非有人情者於是中尉部中中猾以下皆㐲有埶者為遊聲譽稱治數歳其吏多以權貴富隋叚文操大業中為虎賁郎將性甚剛嚴帝令督祕書省學士時學士頗存儒雅文操輙鞭撻之前後或至千數時有識者鄙之唐劉希暹初以騎射得入神䇿軍典領禁兵時魚朝恩專掌神策兵希暹屢陳武略又善候朝恩意甚為朝恩親信累遷太僕卿充神䇿軍都虞候與神䇿兵馬使王駕鶴同掌軍務累封希暹為徐國公又進封為交河郡王希暹以為虞候之任合主不法遂諷朝恩於北軍置獄召坊市㐫惡不逞之徒役使之捕坊城内富人誣以違法掩置獄中忍害拷訊録其家産盡没之仍分賞捕者或有選舉士財貨稍殷客於店肆遇横死者非一坊市人苦之謂為入地牢捕者之帥有賈明觀尤兇蠧以屢擒得人財産大獲希暹掌兵地在禁宻人無所訴魚朝恩縱之繇也及朝恩誅上以希暹掌重戎旅一切寛宥加希暹兼御史中丞依前都虞候希暹以素志非順慮不見容常自疑懼與王駕鶴聯職希暹詞多不遜駕鶴淳謹上嘗信任之至是以希暹語上聞乃寘于法賈明觀本萬年捕城之小猾也事劉希暹恣行兇忍毒甚􅉘虺朝恩希暹既誅宰臣元載受明觀姦謀濳容之特奏令江西効力明觀將出城内百姓萬餘人聚於城門懐磚石候之期投擊以快志載聞之特遣所繇吏擁百姓入城繇是獲免册府元龜卷六百二十八
