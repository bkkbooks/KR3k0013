body:
  text: 冊府元龜卷三十二上宋王欽若等撰帝王部崇祭祀書曰先王顧諟天之明命以承上下神祗洪範八政三曰祀禮大宗伯之職曰以吉禮事邦國之鬼神祗故祭天曰燔柴祭地曰瘞埋祭山曰􅔑縣祭川曰浮沉祭星曰布祭風曰磔是類是禡師祭也既伯既禱馬祭也除惡之祭為祓㑹福之祭曰禬告事求福曰禱道上之祭為祖潔意以享為禋以類祭神為禷祭司命為䃾祭豕先為䄚月祭為祽禱雨為雩禱明為禜是以聖王為之典禮民之精爽不貳齊肅聰明者神或降之乃有神明之官各司其序不相亂也民神異業恭而不黷所以神降之嘉生民以物序災禍不至所求不匱歴代人君罔不徧走羣望咸秩無文故神農播種始諸飲食致恭鬼神顓頊亦潔誠以祭祀其後成湯至于帝乙罔不明徳恤祀所以隂陽和而萬物遂也詩云以享以祀以介景福又云俾爾彌爾性百神爾主矣故祭之言察也察者至也言人事至于鬼神也是知神不可慢祭不可黷盖享於至誠者耳豈犧牲玊帛云乎哉共工氏霸九州其子曰句龍能平水土死為社祠烈山氏王天下其子曰柱能殖百糓死為稷祠伊耆氏始為蜡伊耆氏古天子號舜在璿璣玊衡以齊七政肆類于上帝禋于六宗望于山川徧于羣神史記徧作辨湯伐桀欲遷夏社不可作夏社應劭曰遭天旱七年明徳以薦而旱不止故遷社以棄代為稷欲遷句龍徳莫能繼故作夏社説不可遷之義䙴古遷字廼遷烈山子柱而以周棄代為稷祠周文王廵守而祀四嶽河海作般之詩成王立周公相王道大洽制禮作樂天子曰明堂辟雍諸侯曰泮宫郊祀后稷以配天宗祀文王於明堂以配上帝四海之内各以其職來助祭天下名山大川懐柔百神咸秩無文五嶽視三公四瀆視諸侯而諸侯祭其疆内名山大川大夫祭門户井竈中霤五祀士庶人祖考而已各有典禮而淫祭有禁是時廵守告祭柴望作時邁之詩春夏祈糓于上帝作噫嘻之詩郊祭祀天地作昊天有成命之詩漢髙祖初起禱豐枌榆社狥沛為沛公則祀蚩尤釁鼔旗漢書夲紀載髙祖立為沛公祠黄帝祭蚩尤于沛庭而釁鼓遂以十月至霸上立為漢王二年東撃項籍而還入闗問故秦時上帝祀何帝也對曰四帝有白青黄赤帝之祠髙祖曰吾聞天有五帝而四何也莫知其説於是髙祖曰吾知之矣廼待我而具五也廼立黒帝祠名曰北畤有司進祠上不親徃悉召故秦祀官復置太祝太宰如其故儀禮因令縣為公社公社官社下詔曰吾甚重祀而敬祭今上帝之祭及山川諸神當祠者各以其禮時祠如故後四嵗天下已定詔御史令豐治枌榆社嘗以春時以羊彘祀之時令祝立蚩尤之祠於長安置祠祀官女巫其梁巫祠天地天社天水房中堂上之屬晋巫祠五帝東君雲中君巫社巫祠族人炊之屬秦巫祠社主巫保族纍之屬荆巫祠堂下巫先司命施糜之屬九天巫祠九天皆以歲時祠宫中其河巫祠河于臨晉而南山巫祠南山秦中秦中者二世皇帝也各有時日其後二嵗或言曰周興而邑立后稷之祠至今血食天下又制詔御史其天下立靈星祠嘗以嵗時祠以牛十年春有司請令縣嘗以春二月及臘祠稷以羊彘民里社各自裁以祠制曰可髙帝以來名山大川在諸侯諸侯祝各自奉祠天子官不領及文帝時齊淮南國廢令太祀盡以嵗時致禮如故文帝十三年以嵗比登詔有司増雍五畤路車各一乘駕被具駕車被馬之文節皆具也西畤畦畤寓車各一乘寓馬四匹駕被具河湫漢水玉加二及諸祀皆廣壇場珪幣俎豆以差加之十四年詔曰朕獲執犧牲珪幣以事上帝宗廟十四年于今歴日彌長以不敏不明而乆撫臨天下朕甚自媿其廣増諸祀壇場珪幣昔先王逺施不求其報望祀不祈其福右賢左戚先民後已至明之極也今吾聞祀官祝釐音僖福也皆歸福于朕躬不為百姓朕甚媿之夫以朕之不徳而專鄕獨羙其福百姓不與音預焉是重直用切吾不徳也其令祠官致敬無有所祈十五年黄龍見成紀詔曰有異物之神見于成紀毋害于民嵗以有年朕㡬㡬讀曰冀郊祀上帝諸神禮官議毋諱以朕勞無諱以成其勞自言不以為勞也有司皆曰古者天子夏親郊祀上帝於郊故曰郊於是夏四月文帝始幸雍郊見五畤祠衣皆尚赤赦天下修名山大川常祀而絶者有司以嵗時置禮先是趙人新垣平以望氣見上言長安東北有神氣成五采若人冠冕焉或曰東北神明之舍西方神明之墓也天瑞下宜立祠上帝以合符應於是作渭陽五帝廟同宇帝一殿面五門各如其帝色祠所用及儀亦如雍五畤明年夏四月文帝親拜霸渭之㑹以郊見渭陽五帝廟臨渭其北穿蒲池溝水爟火舉祠若光輝然屬天焉於是貴平至上大夫賜累千金而使博士諸生刺六經中作王制謀議廵狩封禪事文帝出長門若見五人道北遂因其直立五帝壇祠以五牢孝景帝即位十六年祠官各以嵗時祠如故武帝建元元年五月詔曰河海潤千里其令祠官修山川之祠為嵗事曲加禮元光二年十月行幸雍祠五畤郊祀志云後嘗三嵗一郊見元狩元年十月行幸雍祠五畤獲白麟二年十月行幸雍祠五畤元鼎四年十月行幸雍祠五畤十一月甲子立后土祠于汾隂脽上五年十月行幸雍祠五畤十一月辛巳朔旦冬至立泰畤于甘泉天子親郊見朝日夕月詔曰朕以眇身託于王侯之上徳未能綏民民或饑寒故廵祭后土以祈豐年冀州脽壌廼顯文鼎獲薦於廟渥洼水出馬朕其御焉戰戰兢兢懼不克任思昭天地内惟自新詩云四牡翼翼㠯征不服親省邉陲用事所極望見泰一修天文䄠䄠古禪字辛夘夜若景光十有二明易曰先甲三日後甲三日朕甚念年嵗未咸登飭躬齊戒丁酉拜況于郊貺賜也元封元年正月詔曰朕用事華山至于中嶽獲駮麃見夏后啟母石啟生而母化為石在嵩髙山下翼日親登嵩髙御史乘屬在廟天子出御史除二人為乘曹䕶車駕吏卒咸聞呼萬嵗者三祭禮罔不答其令祠官加増太室祠禁無伐其草木㠯山下户三百為之奉邑名曰崇高獨給祠復亡所與二年十月行幸雍祠五畤春幸緱氏遂至東萊夏四月還祠泰山四年祠后土詔曰朕躬祭后土地祗見光集于靈壇一夜三燭幸中都宫殿上見光其赦汾隂夏陽中都死罪㠯下賜三縣及楊氏皆無出今年租賦五年冬南廵狩至于盛唐遂北至琅邪竝海所過禮祠其名山大川増封太山還幸甘泉郊泰畤六年三月行幸河東祠后土天漢元年正月行幸甘泉郊泰畤三月行幸河東祠后土太始三年三月幸琅邪禮日成山登之罘浮大海山呼萬嵗四年三月行幸太山祠明堂四月幸不其不其山名祠神人於交門宫若有鄉坐拜者漢注云神竝見且白且黒且大且小鄕坐三拜鄕讀曰嚮坐音才卧反作交門之歌後元元年正月幸甘泉郊泰畤帝即位尤敬鬼神之祠漢興已六十餘嵗矣天下乂安縉紳之屬皆望天子封禪改正度也而上鄕儒術招賢良趙綰王臧等以文學為公卿欲議古立明堂城南以朝諸侯草廵狩封禪改歴服色事未就竇太后不好儒術使人㣲伺趙綰等姦利事案綰臧自殺諸所興為皆廢六年竇太后終其明年徵文學之士明年上初至雍郊見五畤後嘗三嵗一郊見亳人謬忌奏祠泰一方曰天神貴者泰一泰一佐曰五帝古者天子以春秋祭泰一東南郊日一太牢七日為壇開八通之鬼道於是天子令大祝立其祠長安城東南郊嘗奉祀如忌方其後人上書言古者天子三年一用太牢祠三一天一地一泰一天子許之令太祝領祠之於忌泰一壇上如其方後人復有言古天子嘗以春觧祠祠黄帝用一梟破鏡冥羊用羊祠馬行用一青牡馬泰一臯山山君用牛武夷君用乾魚隂陽使者以一牛令祠官領之如其方而祠泰一於忌泰一壇旁元狩二年天子郊雍詔曰今上帝朕親郊而后土無祀則禮不答也有司與太史令談祠官寛舒議天地牛角繭栗今陛下親祠后土后土宜於澤中圜丘為五壇壇一黄犢牢具已祠盡瘞而從祠衣上黄於是天子東幸汾隂汾隂男子公孫滂洋等見汾旁有光如綘上遂立后土祠於汾隂脽上如寛舒等議上親望拜如上帝禮後郊雍至隴西登崆峒幸甘泉令祠官寛舒等具泰一祠壇放亳忌泰一壇三陔五帝壇環居其下各如其方黄帝西南除八通鬼道泰一所用如雍一畤物而加醴棗脯之屬殺一犛牛以為俎豆牢具而五帝獨有俎豆醴進其下四方地為腏食羣神從者及北斗云已祠胙餘皆燎之其牛色白白鹿居其中彘在鹿中水而酒之祭日以牛祭月以羊彘特泰一祝宰則衣紫及繡五帝各如其色日赤月白十一月辛巳朔旦冬至昒爽天子始郊郊泰一朝朝日夕月則揖而見泰一如雍郊禮其贊饗曰天始以寳鼎神策授皇帝朔而又朔終而復始皇帝敬拜見焉而衣上黄其祠列火滿壇壇旁享炊具有司云祠上有光公卿言皇帝始郊見泰一雲陽有司奉瑄玉加牲薦饗是夜有羙光及晝黄氣上屬天太史令談祠官寛舒等曰神靈之休祐福兆祥宜因此地光域立泰畤壇以明應令太祝領秋及臘間祠三嵗天子一郊見太初二年有司言雍五畤無牢熟具芬芳不備乃令祠官進畤犢牢具已食所勝而以木寓馬代駒云及諸名山川用駒者悉以木寓馬代獨行過親祠廼用駒它禮如故武帝諸所興如亳忌泰一及㝠羊馬行赤星五牀寛舒之祠官以嵗時致禮凡六祠皆太祝領之至如八神人謬忌凡它山名祠行過則祠去則犛牛土所興祠各自主其人終終則已祠官不主它祠皆如故甘泉泰一汾隂后土三年親郊祠而泰山五年一修封武帝凡五修封宣帝神爵元年正月行幸甘泉郊泰畤三月行幸河東祠后土帝即位霍光輔政上共已正南面非宗廟之祀不出至十二年乃下詔曰盖聞天子尊事天地修祀山川古今通禮也間者上帝之祠闕而不親十有餘年朕甚懼焉然朕親飭躬齊戒親奉祀為百姓蒙嘉氣獲豐年焉明年正月上始幸甘泉郊見泰畤数有靈祥修武帝故事盛車服敬齊祀之禮頗作詩歌後制詔太常夫江海百川之六者也今闕焉無祀其令祠官以禮為嵗事以四時祠江海雒水祈為天下豐年焉自是五嶽四瀆皆有常禮祀東嶽泰山於博中嶽泰室于嵩髙南嶽􅈞山於􅈞西嶽華山於華隂北嶽恒山於上曲陽河於臨晋江於江都淮於平氏濟於臨邑界中皆使者持節侍祠唯泰山與河嵗五祠江水四餘皆一禱而三祠云時南郡獲白鹿璧獻其皮牙爪上為立祠又以方士言為隨侯劒寳玉寳周康寳鼎立四祠於未央宫中又祠太室山於即墨三户山於下宻祠天封􅁐火井於鴻門又立嵗星辰星太白熒惑南斗祠於長安旁又祠三山八神於曲城蓬萊山石社鼓於臨朐之罘山於腄成山於不夜萊山於黄成山祠日萊山祠月又祠四時於琅邪蚩尤於壽良京師近縣鄠則旁谷五牀山月日五帝仙人玉女祠雲陽有徑路神祠祭休屠王也又立五龍山仙人祠黄帝天神帝原水凡四祠於膚施五鳳元年正月行幸甘泉郊泰畤昭帝即位富於春秋未嘗廵祭至此始復行二年三月行幸雍祠五畤三年三月行幸河東祠后土甘露元年正月行幸甘泉郊泰畤三年正月行幸甘泉郊泰畤黄龍元年正月行幸甘泉郊泰畤孝元初元二年正月行幸甘泉郊泰畤四年正月行幸甘泉郊泰畤三月行幸河東祠后土永光元年正月行幸甘泉郊泰畤帝即位遵舊儀間嵗正月一幸甘泉郊泰畤又東至河南祠后土西至雍祠五畤凡五奉泰畤后土之祠亦施恩澤時所過毋出田租賜百户牛酒或賜爵赦罪人成帝建始元年十二月作長安南北郊罷甘泉汾隂二年正月罷雍五畤辛巳上始郊祀長安南郊詔曰廼者徙泰畤后土于南郊北郊朕親飭躬郊祀上帝皇天報應神光竝見三輔長無共張繇役之勞共音居庸切張音竹亮切赦奉郊縣長安長陵天郊在長安南地郊在長安城北長陵界中二縣有奉郊之勤故一切竝赦之及中都官耐罪徒中都官京師諸官府滅天下賦錢筭四十三月辛丑始祀后土於北郊永始二年十一月行幸雍祠五畤三年三月行幸雍祠五畤十一月皇太后詔有司復甘泉泰畤汾隂后土雍五畤陳倉陳寳祠四年正月行幸甘泉祠泰畤三月幸河東祠后土元延二年正月行幸甘泉郊泰畤四年正月行幸甘泉郊泰畤三月行幸河東祠后土綏和元年三月行幸雍祠五畤二年三月行幸河東祠后土帝即位丞相衡御史大夫譚等奏甘泉泰畤河東后土祠可徙置長安及議罷不應禮神祠事具掌禮部奏議門明年衡譚坐事免官爵衆庶多言不當變動祭祀者又初罷甘泉泰畤作南郊日大風壊甘泉竹宫折㧞畤中樹木十圍以上百餘天子異之以問劉向對曰家人尚不欲絶種祠况於國之神寳舊畤且甘泉汾隂及雍五畤始立皆有神祗感應然後營之非苟而已也武宣之世奉此三神禮敬敇備神光尤著祖宗神祗舊位誠未易動及陳寳祠自秦文公至今七百餘嵗矣漢興世世嘗來光色赤黄長四五丈直祠而息音聲碎隐野雞皆雊毎見雍太祝寺以太牢遣侯者乘傳馳詣行在所以為福祥髙祖時五來文帝二十六來武帝七十五來宣帝二十五來初元元年以來亦二十來此陽氣舊祠也及漢宗廟之禮不得擅議皆祖宗之君與賢臣所共定古今異制經無明文至尊至重難以疑説正也前始納貢禹之議後人相因多所動揺易大傳曰誣神者殃及三世恐其咎不獨止禹等上意恨之後上以無繼嗣故令皇太后詔有司曰盖聞王者承事天地交接泰一尊莫著於祭祀孝武皇帝大聖通明始建上下之祀營泰畤於甘泉定后土於汾隂而神祗安之饗國長乆子孫蕃滋累世遵業福流於今今皇帝寛仁順孝奉循聖緒靡有大愆而乆無繼嗣思其舊職殆在徙南北郊違先祖之制改神祗舊位失天地之心以防繼嗣之福春秋六十未見皇孫食不甘味寝不安席朕甚悼焉春秋大復古善順祀其復甘泉泰畤汾隂后土如故及雍五畤陳寳祠在陳倉者天子復親郊祀如前又復長安雍及郡國祠著明者且半後成都侯王商為大司馬衛将軍輔政杜鄴説商曰東隣殺牛不如西隣之禴祭言祭天之道貴以誠質大得民心也行穢祀豐猶不䝉祐徳修薦薄吉必大來古者壇場有常處燎禋有常用贊見有常禮犧牲玉帛雖備而財不匱車與匠役雖動而用不勞是故毎舉其禮助者歡説大路所歴黎元不知今甘泉河東天地郊祀咸失方位違隂陽之宜及雍五畤皆曠逺奉遵之役休而復起繕治供張無觧已時皇天著像殆可畧知前上甘泉先驅失道禮月之夕奉引復迷祠后土還臨河當渡疾風起波船不可御又雍大雨壊平陽宫垣廼三月甲子雷電災林光宫門祥瑞未著咎徵仍臻近三郡所奏皆有變故不答不饗何以堪此詩曰率繇舊章先王法度文王以之交神于祀子孫千億宜如異時公卿之議復遷長安南北郊後皇太后詔復之哀帝即位寝疾盡復前世所嘗興諸神祠官凡七百餘所一嵗三萬七千祠平帝元始四年正月郊祀髙祖以配天宗祀孝文以配上帝時王莾奏請議正五帝兆并立官稷事具帝王禮部奏議門後漢光武建武元年六月己未即位于鄗為壇營於鄗之陽祭告天地采用元始中郊祭故事八月壬子祭社稷二年正月壬子立大社大稷于雒陽在宗廟之右方壇無屋有墻門而已二月八日及臘一嵗三祠皆太牢具使有司祠又立郊兆于城南七里中元二年正月辛未初立北郊祠后土明帝永平二年正月辛未初祀五帝於明堂光武帝配冊府元龜卷三十二上欽定四庫全書冊府元龜卷三十二下宋王欽若等撰帝王部三十二崇祭祀章帝元和二年二月甲寅詔曰今山川百神應典禮者尚未咸秩其議増修羣祀以祈豐年是月東廵狩辛未柴祭天地羣神如故事壬申宗祀五帝於孝武所作汶上明堂以光武帝配如雒陽明堂祀四月還京都為靈䑓十二門作詩各以其月祀而祭之三年二月戊辰幸中山遣使者祀北嶽出長城史記蒙恬為秦築長城西自臨洮東至海三月乙夘進幸趙庚辰祠房山於靈夀靈夀縣名屬常山郡房山今在鎮州房山縣西北俗名王母山上有王母祠安帝元初六年三月庚辰始立六宗祀於雒城時尚書歐陽説謂六宗者在天地四方之中為上下四方之宗禮比太社也延光三年二月辛夘幸太山柴告岱宗太山王者告代之處為五嶽之宗故曰岱宗燔柴以告天壬辰宗祀五帝于汶上明堂靈帝熹平五年四月復崇髙名為嵩髙前書武帝祠中嶽改嵩髙為崇髙東觀漢紀曰使中郎将堂谿典請雨因上言改之名為嵩髙山獻帝建安元年七月甲子至雒陽丁丑郊祀上帝八年十月己巳公卿初迎冬於北郊斯禮乆廢故曰初縂章始復備八佾袁宏記云迎氣北郊始用八佾舞列也舞者之行列往因亂廢今始備之縂章樂官名古之安代樂魏文帝黄初元年十一月庚午即阼於繁陽燎祭天地五嶽四瀆二年正月郊祭天地明堂甲戌校獵至原陵乙亥朝日于東郊是年六月庚子初祀五嶽四瀆咸秩羣祀瘞沉珪璧四年七月乙未大軍當出使太常以特牛一告祠于郊六年八月帝以舟師入淮九月遣使者沉璧于淮明帝太和元年正月郊祀武帝以配天宗祀文皇於明堂以配上帝二月丁亥朝日于東郊八月己丑夕月于西郊四年八月辛巳行東廵遣使者以特牛祠中嶽魏書曰行過繁昌使執金吾臧覇行太尉事以特牛祀受禪壇景初元年十月乙夘始營雒陽南委粟山為圜丘詔曰昔漢氏之初承秦滅學之後採摭殘缺以備郊祀自甘泉后土雍宫五畤神祗兆位多不經見是以興廢無常一彼一此四百餘年廢無禘禮古代之所更立者遂有闕焉曹氏世系出自有虞氏今祀圜丘以始祖帝舜配號圜丘曰皇皇帝天方丘所祭曰皇皇后地以舜妃伊氏配天郊所祭曰皇天之神以太祖武皇帝配地郊所祭曰皇地之祗以武宣皇后配宗祀皇考髙祖文皇帝於明堂以配上帝十二月壬子冬至始祀皇皇帝天于圜丘以始祖有虞帝舜配自正始以後終魏世不復郊祀陳留王咸熈元年正月幸長安使者以璧幣祀華山晋武帝泰始二年正月詔曰有司前奏郊祀權用魏禮朕不慮改作之難令便為永制衆議紛紜遂不時定不得以時供饗神祗配以祖考日夕難企貶食忘安其便郊祀時羣臣又議五帝即天地王氣時異故殊其號雖名有五其實一神明堂南郊當除五帝之坐五郊改五精之號皆同稱昊天上帝各設一座而已地郊又除先後配祀帝悉從之二月丁丑郊祀宣皇帝以配天宗祀文皇帝於明堂以配上帝十一月有司議奏古者丘郊不異宜并圜丘方丘於南北郊更修立壇兆其二至之祀合於二郊帝又從之一如宣帝所用王肅議也是月庚寅冬至帝親祀圜丘於南郊自是後圜丘方澤不别立太康二年正月有司奏春分依舊請車駕祀朝日寒溫未適可不親出詔曰禮儀宜有常若如所奏與故太尉所撰不同復為無定制也間者難未平故每從所奏今戎事弭息惟此為大按詔帝復為親祀也三年正月帝親郊祀皇太子悉侍祠九年三月壬辰初并二社為一前漢但置官社而無官稷莽置官稷後復故漢至魏但太社有稷而官社無稷故嘗二社一稷也晋初仍魏無所増損至太康九年建宗廟而社祀壇與廟俱徙乃詔曰社實一神其無二社之祀十年六月庚子復置二社十月詔曰孝經郊祀后稷以配天宗祀文王於明堂以配上帝而周官云祀天旅上帝又曰祀地旅四望望非地則明上帝不得為天也往者衆議除明堂五帝位考之禮文不正且詩序曰文武之功起于后稷故推以配天焉宣帝以神武創業既已配天復以先帝配天於義亦所不安其復明堂及南郊五帝位惠帝元康六年禖壇石中破為二詔更鎸石令如舊置髙禖壇上埋破石入地一丈元帝大興二年春始議立郊祀儀尚書令刁恊國子祭酒杜夷議宜湏旋都雒邑乃脩之司徒荀組據漢獻帝都許郡便立郊自宜於此脩奉驃騎王導僕射荀崧太常華恒中書侍郎庾亮皆同組議事遂施行立南郊於巳地其制度皆太常賀循所定多依漢及晋初之儀三月辛卯帝親郊饗配之禮一依武帝始郊故事是時尚未立北壇地祗衆神共在天郊明帝大寕三年七月詔曰郊祀天地帝王之重事自中興以來惟南郊未曽北郊四時五郊之禮都不復設五嶽四瀆名山大川載在祀典應望秩者悉廢而未舉主者其依舊詳處成帝咸和八年正月追述明帝前㫖於覆州山南立北郊天郊則五帝之佐日月五星二十八宿文昌北斗三台司命軒轅后土天一太一太㣲鈎陳北極雨師雷電司風伯老人凡六十二神也地郊則五嶽四望四海四瀆五湖五帝之佐沂山嶽山白山霍山醫無閭山蔣山松江㑹稽山錢塘江先農凡四十四神也江南諸小山盖江左所立猶如漢西京闗中小水皆有祭秩也是月辛未祀北郊始以宣穆張皇后配地魏氏配地事皆非晋舊也康帝建元元年正月辛未南郊辛巳北郊帝皆親奉後魏道武登國元年即代王位于牛川西向設祭告天禮成天興元年七月遷都平城始立社稷并立壇兆告祭天地二年正月甲子初祠上帝於南郊以始祖神元皇帝配為壇通四陛為壝埒三重天位在其上南面神元西面五精帝在壇内壇壝内四帝各於其方一帝在末日月五星二十八宿天一太一北極司中司命司祿司民在中壝内各因其方其餘從食者各一千餘神餟在外壝内藉用藁秸玉用四珪幣用束帛牲用黝犢噐用陶匏上帝神元用犢各一五方帝共用犢一日月等共用牛一祭畢燎牲體在于壇南巳地從陽之義其瘞地壇兆制同南郊明年正月辛酉郊天癸亥瘞地於北郊以神元竇皇后配五嶽名山在中壝内四瀆大川於外壝内后用土神元后牲共用𤣥牡一玉用兩珪幣用束帛五嶽等牛一祭畢瘞牲體在于壇之北亥地從隂也其後冬至祭上帝于圜丘夏至祭地于方澤用牲幣之屬與二郊同冬十月置大社大稷帝社于宗廟之右為方壇四陛祀以二月八月用戊皆太牢句龍配社周棄配稷皆有司侍祀立祖神嘗以正月上未設藉于端門内祭牲用羊豕犬各一宫中立星神一歲一祭嘗以十二月用馬薦各一牛豕各二雞一太祖初有兩彗星見劉后使占者占之曰祈之則當掃定天下后從之故立其祀又立神位十二歲一祭嘗以十一月各用牛一雞三又立王神四歳二祭嘗以八月十月各用羊一又置獻明以上所立天神四十所嵗二祭亦以八月十月神尊者以馬次以牛小以羊皆女巫行事三年正月癸亥有事於北郊二月丁亥詔有司祀日於東郊用騂牛秋分祭月于西郊用白羊一天賜二年四月復祀天于西郊為方壇一置木主七于上東為二陛無等周垣四門門各依其方色為名牲白犢黄駒白羊各一祭之日帝御大駕百官及賔國諸部大人畢從至郊所帝立青門内近南壇西内朝臣皆位于帝壇北外朝臣及大人咸位于青門之外后率六宫從黒門入列于青門内近北西面廪犧令掌牲陳于壇前女巫執鼓立于陛之東西面選帝之十族子弟七人執酒在巫南西面北上女巫升壇揺鼓帝拜后肅拜百官内外盡拜祀訖復拜拜訖乃殺牲執酒七人西向以酒灑天神主復拜如此者七禮畢而返自是之後歲一祭明元永興三年三月帝禱于武周車輪二山初清河王紹有寵于道武性凶悍帝每以義責之弗從帝懼其變乃於山上祈福於天地神祗及即位壇兆後因以為常祀嵗一祭牲用牛皆帝親祀之無常月明年立道武廟于白登山嵗一祭其牲太牢帝親祀之亦無常月兼祀皇天上帝以山神配旱則禱之多有效是嵗又加置天地日月之神及諸小神二十八所於宫内嵗二祭各用羊一又别置天神等二十三於道武廟左右其神大者以馬小者以羊泰常三年為五精帝兆於四郊逺近依行数各為方壝四陛埒壇三重通四門以太皥等及諸佐隨配侑祭黄帝常以立秋前十八日餘四帝各以四立之日牲各用牛一有司主之又六宗靈星風伯雨師司民司祿先農之壇皆有别兆祭有常日牲用少牢立春之日遣有司迎春于東郊祭用酒脯棗栗無牲幣又立五嶽四瀆廟于桑乾水隂春秋遣有司祭有特牲及幣四瀆唯以牲牢准古望秩云其餘山川及海若諸神在州郡者合三百二十四所每嵗十月遣祀官詣州鎮遍祀有水旱災厲則牧守各隨其界内而祈謁其祭皆用牲王畿内諸山川皆列祀次祭若有水旱則禱之四年八月辛未幸代至鴈門闗望祀恒嶽八年正月北廵恒嶽祀以太牢四月幸雒陽遣使以太牢祀嵩髙華嶽還登太行五月至自雒陽諸所過山川羣神祀之太武神䴥二年四月以小駕祭天神禮畢帝遂親戎大㨗而還歸格於祖禰遍告羣神太延元年立廟于恒嶽華嶽嵩嶽上各置侍祀九十人嵗時祈禱其水旱春秋泮涸遣官率刺史祭以牲牢有玉幣魏之先居幽都也鑿石為祖宗之廟於烏雒侯國西北自後南遷其地隔逺真君中烏雒侯國遣使朝獻云石廟如故民嘗祈請有神驗焉其嵗遣中書侍郎李厰詣石堂告祭天地以皇祖先妣配祝曰天子諱謹遣厰等用駿足一元大武敢昭告于皇天之靈自啟闢之初祐我皇祖于彼土田歴載億年聿來南遷惟祖惟父光宅中原克剪凶醜拓定四邉冲人慕業徳聲弗彰豈謂幽遐稽首來王具知舊廟弗毁弗亡攸攸之懷希仰餘光王業之興起自皇祖緜緜瓜瓞時惟多祜敢以丕功配享於天子子孫孫福禄永延厰等既祭斬樺木立之以置牲醴而還後所立樺木長成林其民益神奉之咸謂魏國感靈祗之應也石室南距代京可四千餘里明年六月司徒崔浩奏議神祀多不經案祀典所宜祀凡五十七所餘復重及小神請皆罷之奏可十二月遣使者以太牢祀北嶽太平真君十二年十一月帝南征過常山祀以太牢浮河濟祀以少牢過岱宗祀以太牢遂臨登瓜歩而還文成興光元年正月遣有司詣華嶽修廟立碑数十人在山上聞虛中若音聲聲中稱萬嵗云和平元年正月帝東廵幸遼西望祀醫無閭山遂縁西南幸冀州北至中山過恒嶽禮其神而返二年二月帝南廵過石門遣使者用玉璧牲牢禮恒嶽四月旱下詔郡州於其界内神無大小悉灑掃薦以酒脯年登之後各隨本秩祭以牲牢至是羣祀先廢者皆復之獻文皇興二年二月以青徐既平遣中書令兼太常髙允奉玊幣祀於東嶽孝文太和十年四月甲子帝初以法服御輦祀於西郊十二年閏九月甲子帝觀築圜丘於南郊十三年正月辛亥有事於圜丘於是初備大駕五月庚戌有事於方澤十五年八月議肆類上帝禋於六宗之禮帝親臨决十二月壬辰遷社於内城之西己酉帝迎春于東郊十六年二月甲午初朝日于東郊遂為常三月乙亥帝初迎氣南郊自此為常八月庚寅帝初夕月於西郊遂以為常十八年二月乙丑行幸河隂規建方澤之所十九年正月己亥南征濟淮命太常致祭己未行幸遐丘遣使以太牢祀岱嶽十一月行幸委粟山議定圜丘甲申有事于圜丘二十年五月丙戌立方澤於河隂丁亥有事于方澤宣武景明二年十一月壬寅改築圜丘於伊水之陽乙卯仍有事焉孝明正光三年十一月乙巳有事於圜丘五年正月辛丑有事於南郊出帝太昌元年十一月丁酉日南至有事於圜丘西魏文帝大統二年正月辛亥祀南郊改以神元皇帝配四年正月辛酉拜天於清暉室終帝世遂為常冊府元龜卷三十二下
