body:
  text: 册府元龜卷一百二十四宋王欽若等撰帝王部講武修武備講武夫武者所以威四夷而遏亂略者也古者戎馬車徒素具因蒐狩以習之皆於農隙以講武焉故周禮有振旅茇舍治兵大閱之制教坐作進退疾徐䟽數之節是知雖有文德必有武備傳曰三時務農一時講武故征則有威守則有財夫子曰教民七年可以即戎矣又曰以不教民戰是謂棄之蓋慮墮軍實而輕人命也乃知士不素習以其將與敵非虛語也漢儀立秋之日始揚威武魏晉而下厯代因之司馬法曰國雖大好戰必亡天下雖平忘戰必危斯國之大事其可忽諸周武王講武類禡作桓之詩桓志武也宣王時能内修政事外攘夷狄復文武之境土修車馬備器械復㑹諸侯於東都因田獵而選車徒焉東都王城也詩人賦車攻以美之後漢靈帝中平五年十月甲子帝自稱無上將軍耀兵於平樂平樂觀在雒陽城西是時天下滋亂望氣者以為京師當有大兵兩宫流血大將軍司馬許凉假司馬伍巖説何進曰太公六韜有天子將兵士可以威厭四方進以為然入言之於帝於是乃詔進大發四方兵講武於平樂觀下起大壇上建十二重五采華蓋髙十丈壇東北為小壇復建九重華蓋髙九丈列歩兵騎士數萬人結營為陳天子親出臨軍駐大華蓋下進駐小華蓋下禮畢帝躬擐甲介焉稱無上將軍行陣三匝而還魏太祖建安二十一年既為魏王有司奏古四時講武皆於農隙漢承秦制三時不講唯十月都試車馬幸長安水南門㑹五營士為八陳進退名曰乘之今兵戈未偃士民素習自今以後無四時講武但以立秋擇吉日大朝車騎號曰治兵上合禮名下承漢制奏可是冬治兵魏王親執金鼔以令進退文帝初嗣魏王延康元年六月辛亥立秋閲兵於東郊公卿相儀王御華蓋親令金鼔之節明帝太和元年三月丙寅治兵於東郊晉武帝泰始元年十一月丁酉臨宣武觀大閲諸軍甲辰乃罷十年十一月庚午臨宣武觀大閱諸軍咸寧元年十一月癸亥大閱於宣武觀至於己巳三年十一月丙戌臨宣武觀大閱至於壬辰太康四年十二月庚午大閱於宣武觀六年十二月甲午大閲於宣武觀旬日而罷自泰始以來帝皆自臨宣武觀大閱衆軍然不自令進退也自惠帝以後禮遂廢元帝太興四年詔左右衛及諸營教習依大習例作鴈羽仗成帝咸和元年十一月壬子大閱於南郊詔内外諸軍戲兵於南郊之塲故其地因名鬬塲自後藩鎮相庾諸方伯徃徃閲習然朝廷無事焉後魏道武登國六年七月壬午講武於牛川八年七月庚寅臨幸新壇講武天興二年七月辛酉大閲於鹿苑饗賜各有差五年六月治兵於東郊將西討姚興六年五月大簡輿徒將畧江淮平荆揚之亂天賜三年四月庚申幸豺山宫占授著作郎王宜弟造兵法孤虛立成圖三百六十明元永興二年五月北伐蠕蠕還幸參合陂七月丁巳立馬射臺於陂西仍講武教戰三年十一月丁未大閲於東郊四年閏六月丙辰大閲於東郊五年正月己巳大閲畿内男子十二以上悉集庚寅大閲於東郊部署將帥以山陽侯奚斤為前軍衆三萬陽平王熈等十二將各一萬騎帝臨白登躬自較覽焉太武始光元年九月大簡輿徒治兵於東郊分諸軍五萬騎將北討蠕蠕二年十月治兵於西郊三年七月幸雲中舊宫至和兠山七月築馬射臺於長川帝親登臺觀走馬王公諸國君長馳射中者賜金帛繒絮各有差四年四月治兵講武將西討赫連昌七月伐赫連昌築壇於柞嶺戯馬射賜射中者金繒帛絮有差神䴥二年四月治兵於南郊延和元年五月大簡輿徒於南郊將討馮文通大延元年五月丁丑治兵於西郊太平真君四年六月癸巳大閲於西郊九年九月乙酉練兵於西郊將討蠕蠕十一年八月癸未練兵於西郊文成興安二年七月築馬射臺於南郊九月壬子閲武於南郊大安四年七月壬子詔曰朕毎歲以秋月閒日命羣官講武平壤所幸之處必立宫壇糜費之功勞損非一宜仍舊貫何必改作也和平三年十二月乙夘制戰陣之法十有餘條因大儺耀兵以示威武更為制令歩兵陣於南騎士陣於北各擊鐘鼔以為節度其歩兵所衣青赤黄黒别為部隊楯矟矛㦸相次周廻轉易以相赴就有飛龍騰蛇之變為函箱魚鱗四門之陳凡十餘法跽起前却莫不應節陣畢南北二軍皆鳴鼔角衆盡大譟各令騎將六千人去來挑戰歩兵更進退以相拒撃南敗北㨗以為盛觀自後踵以為常孝文延興四年八月戊申大閲於南郊五年十月太上皇帝大閲於北郊太和五年二月幸中山己酉講武於唐水之陽三月幸肆州癸亥講武於雲水之陽所經考察守宰加以黜陟九月庚午閲武於南郊十六年八月癸酉詔曰夫文武之道自古並行威福之施必出相藉故三五至仁尚有征伐之事夏殷明叡未捨兵甲之行然則天下雖平忘戰者殆不教民戰是謂棄之是以周立司馬之官漢署將軍之職皆所以輔文强武威肅四方者矣國家雖崇文以懷九服修武以寧八荒然於習武之方猶為未盡今則訓文有典教武闕然將於馬射之前先行講武之式可勅有司豫修場壇其列陣之儀五戎之數别俟後勅十七年六月丁巳講武十八年八月幸隂山閲武臺臨觀講武十九年正月南伐壬午講武於汝水之西大賚六軍二十年九月戊辰閲武於小平津二十二年八月講武於華林園宣武景明三年九月幸鄴戊寅閲武於鄴南後周太祖為西魏柱國大將軍以大統九年十月大閲於櫟陽十年冬十月大閲於白水十一年十月大閲於白水遂西狩岐陽明帝武成元年三月癸未陳六軍帝親擐甲胄迎太白於東方武帝保定二年十月壬戌講武於少陵原天和二年十月丁亥親率六軍講武於城南京邑觀者輿馬彌漫數十里諸藩使咸在焉六年十月壬寅親率六軍講武於城南建德元年十一月丙午親率六軍講武於城南二年十一月辛巳親率六軍講武城東集諸軍都督以上五十人於道㑹苑大射帝親臨射宫大備軍容三年六月丁未集諸軍將教以戰陣之法十一月行幸同州己巳大閲於城東十二月癸夘集諸軍講武於臨臯澤宣帝以宣政元年六月即位十一月己亥講武於道㑹苑帝親擐甲冑隋文帝開皇二年十二月辛未講武於後園煬帝大業五年四月癸亥出臨津闗渡黄河至西平陳兵講武唐髙祖武德元年十月詔曰安人静俗文教為先禁暴懲㓙武畧斯重比以䘮亂日久黎庶凋殘是用務本勸農冀在豐贍而人蠧未盡冦盗尚繁欲暢兵威須加練習今農收已畢殺氣方嚴宜順天時申曜威武可依别勑大集諸軍朕將躬自循撫親臨較閲五年十一月丙申幸宜州簡閲將士八年十一月幸宜州庚子講武於同官縣九年三月幸昆明池辛夘觀習水戰太宗以武德九年八月即位九月丁未引諸衛驍兵統將等習射於顯德殿庭謂將軍已下曰自古突厥與中國更有盛衰若軒轅善用兵即能北逐獯鬻周宣驅駕方召亦能制勝太原下至漢晉之君洎於隋代不使兵士素習干戈突厥來侵莫能抗禦致遣中國生民塗炭於冦手我今不使汝等穿池築苑造諸經費農民恣令逸樂兵士唯習弓馬若無賊來我則為汝博士教汝弓射庶使汝等武藝優長若有賊來我即為汝將帥領汝鬬戰亦望使汝前無横敵於是毎日引數百人於殿前教射帝親自臨試毎坐或至午時射中者隨賞弓刀布帛絲綿特加其上考貞觀八年十二月乙夘太宗從髙祖閲武於城北髙宗顯慶五年三月己酉講武於并州城西帝御龍飛閣引羣臣臨觀之左衛大將軍張延師為左軍左右及驍武六衛左羽林騎士屬焉左武侯大將軍梁建方為右軍領武侯六衞右羽林騎士屬焉一鼔而誓衆再鼔而整列三鼓而交前左為曲直圓鋭之陣右為方鋭直圓之陣三挑而五變歩退而騎進五合而各復其位許敬宗奏曰延師整而堅建方敢而鋭皆良將也李勣曰甲胄精新將士齊力觀之者猶震恐况當其事乎帝曰講閲者安不忘危之道也梁朝衣冠甚盛人物亦多侯景以數千渡江一朝瓦解武不可黷兵不可棄此之謂也麟德二年四月丙寅講武於邙山之陽帝御城北門樓以觀之𤣥宗先天二年十月癸亥親講武於驪山之下徵兵二十萬旌旗連亘五十餘里戈鋋金甲照曜天地列大陣於長川坐作進退以金鼓之聲節之三軍出入號令如一帝親擐戎服持沉香大鎗立於陣前威振宇宙長安士庶奔走縱觀填塞道路兵部尚書郭元振以虧失軍容坐於纛下將斬之宰相劉幽求張説跪於馬前諫曰元振翊戴上皇有大功於國雖犯軍令不可加刑伏願寛宥以從人望帝乃捨之配流新州給事中知禮儀事唐紹以草軍儀有失坐於纛下斬之禮畢乃下制曰傳不云乎兵之設久矣所以威不軌而昭文德聖人以興亂人以廢皆兵之繇也故文事必有武備曜德在於觀兵所以外清蠻貊内輯華夏其經濟之致歟自有隋失道三靈改卜我唐受命百姓與能四罪而天下服一戎而天下定航海梯山罔不率俾休牛歸馬永不復用德貸羣物刑清百年然而制軍為旅先王分職在祀與戎前史垂訓則未學也孰可棄之徃以韋氏搆逆兇魁作禍則我之宗祀危如綴旒故斬長蛇截封豨戮梟獍掃欃槍使武之不修則兆人何乂朕以薄德皆奉聖謨濟邦家之多難畏君父之嚴㫖自撫兹億兆若臨淵谷雖重譯雲歸和親日至遂五兵之不教慮七德之未康今蓋𤣥冬戒時農事爰隙驪山之下鴻門在望横層阜以南屬耿長川而北流嚴霜初隕疾風始至以時而命羣師得地以講武功料其勝負詳其進退以振國威用蒐軍實故披堅執鋭干戈有容練卒陳師金鼔有節上應於天也下順於人也三光之靈可接五行之德斯用將孫呉不遠頗牧同時非熊所期怒蛙知勸布三令調九章且閲宣場之儀若觀莘墟之禮情兼慰賞義𢎞寵錫惟此畿甸比經水旱總集士馬頗有煩勞中念元元更資勤恤其講武使各賜物一百段將軍各八十段中郎將各六十段郎將及左右軍長史各四十段折衝果毅各三十段押官六品以下各二十段新豐百姓宜免來年地税置頓使賜物一百段縁頓踏踐麥苗給米酬直時帝既怒唐紹左右猶望寛之㑹有金吾衞將軍李邈遽詣宣勅遂命斬之時人皆痛惜紹而深咎於邈等尋有制罷邈官以是遂廢終身肅宗至德二年八月帝在鳳翔癸巳六軍大閲帝御府城樓觀軍陣之容三年正月庚寅於㑹元殿陳兵大閲帝御棲鸞閣觀之代宗寶應元年九月壬寅大閲兵馬於鳴鳳門街後唐明宗天成二年十月癸未御興教門觀兵自卯至午隊伍方絶晉髙祖天福二年十月勅習戰講武歴代通規選士練兵由來舊制宜以每年農隙時講武仍准令式處分六年十二月帝習射於後苑諸軍都督指揮使已上悉預焉少帝開運二年二月帝次滑州丙子大閲諸軍於戚城帝親臨之修武備周官大司馬之職制軍詰禁以紏邦國仲尼曰有文事者必有武備蓋五材並用孰能去兵天下雖寧不可忘戰自大道之隠爭心孔熾必頼兵力以寧禍亂期以庇民而靖國保世而永命者也漢氏而下莫不内嚴師兵之營衞外固溝池之垣翰簡閲以供時使屯戍以防外虞益繕戎器增治戰具申之命令優其募格誕揚武烈以貞師律稽古前訓以成善志固足以壯中權而威不軌震天聲而讋殊俗者矣傳所謂備豫不虞古之善教者也其可忽諸漢髙祖二年令諸侯子在闗中者皆集櫟陽為衞天下既定又踵秦置材官於郡國京師有南北軍之屯六年十月令天下縣邑城縣之與邑皆令築城武帝建元三年初置期門羽林平帝元始中更名虎賁郎太初元年初置建章營騎後更名羽林騎以天有羽林之星故取名焉又取從軍死事之子孫養羽林官教以五兵號曰羽林孤兒二年五月藉吏民馬補車騎馬平百粤内増七校中壘屯騎歩兵越騎長水胡騎射聲虎賁凡八校尉胡騎不嘗置故此言七也外有樓舩歲時講肄修武備云後漢光武中興海内人民可得而數裁十二三蕭條靡有孑遺鄣塞破壞亭燧絶滅建武二十一年始遣中郎將馬援謁者分築􅇏候保壁稍興立郡縣十餘萬户或空置太守令長招還流民帝笑曰今邊無人而設長吏治之難如春秋素王矣乃建立三營屯田殖穀弛刑讁徒以充實之也安帝建光元年初置漁陽營兵伏侯古今注曰置營兵千人也靈帝中平元年張角反詔公卿出馬弩五年初置西園八校尉小黄門蹇碩為上軍校尉虎賁中郎將袁紹為中軍校尉屯騎校尉鮑鴻為下軍校尉議郎曹操為典軍校尉趙融為助軍左校尉馬芳為助軍右校尉諌議大夫夏牟為左校尉淳于瓊為右校尉凡八人謂之西園軍皆統於碩魏太祖初為曹公以漢建安十三年正月還鄴作𤣥武池以肄舟師十四年曹公至譙作舟治水軍文帝黄初中詔曰昔軒轅建四面之號周武稱予有亂臣十人斯蓋先聖所以體國君民亮成天工多賢為貴也今内有公卿以鎮京師外設牧伯以監四方至於元戎出征則軍中宜有柱石之賢帥輜重所在又宜有鎮守之重臣然後車駕可以周行天下無内外之慮吾今當征賊欲守之積年其以尚書令潁郷侯陳羣為鎮軍大將軍尚書僕射西鄉侯司馬懿為撫軍大將軍若吾臨江授諸將方略則撫軍當留許昌督後諸軍録後臺文書事鎮軍隨車駕當董督衆軍錄行尚書事皆假節鼔吹給中軍兵騎六百人吾欲去江數里築宫室往來其中見賊可擊之形便出竒兵擊之若或未可則當舒六軍以遊獵饗賜軍士明帝景初元年詔青兖幽冀四州大作海船晉惠帝元康五年十二月丙戌新作武庫大調兵器後魏道武天興元年二月更選屯衞五年正月帝聞姚興冦邉庚寅大簡輿徒詔并州諸軍積穀於平陽之乾壁天賜元年五月置山東諸治發州郡徒謫造兵甲明元永興五年春正月己巳大閲畿内男子十二以上悉集大武神䴥三年帝聞宋將冦邉乃詔冀定相三州造三千艘簡幽州已南戍兵集於河以備之延和元年五月車駕將討馮文通七月庚申遣安東將軍奚斤發幽州民及密雲丁零萬餘人運攻具出南道太平真君六年八月詔發天下兵三取一各當戒嚴以須後命九年九月乙酉練兵於郊孝文承明元年六月甲子詔中外戒嚴分京師見兵為三等第一軍出遣第二兵二等兵亦如之太和元年十月宋葭蘆戍主楊文度遣弟鼠據仇池詔皮喜討平之又詔喜等曰卿受命專征命薄伐邉冦軍威所及即皆平蕩仇池國之要蕃防守尤須完實從前以來駱谷置鎮是以奸賊息闚􅎿之心邉城無危敗之禍近繇徙就建安致有徃年之役卿等表求築城豈不更勞兵將孰若因今兵勢即令就之一勞永逸事不再舉也今更給軍糧一月速於駱谷築城使四月盡必成就訖若不時營築及築之不成成而不固以軍法從事十九年八月乙巳詔選天下武勇之士五萬人為羽林虎賁以充宿衞十月詔徐兖光南青荆雒六州嚴纂戍備應須赴集二十年十月戊戌以代遷之士皆為羽林虎賁宣武景明元年十月詔壽春置兵四萬人四年六月發冀定瀛湘并濟六州二萬人馬千匹增配壽春永平二年二月詔曰比軍役頻興仗多毀敗在庫戎器見有無㡬安不忘危古人所戒五兵之器事須充積經造既殷非衆莫舉今可量造四萬人雜仗延昌二年五月壽春大水遣平東將軍奚康生等歩騎數千赴之三年十二月出師伐蜀詔中䕶軍元遥為征南將軍東道都督鎮遏梁楚孝莊建義元年六月詔直寢紀業持節募新免收戸有投名効力者授九品官永安三年爾朱世隆等攻京邑詔諸舊代人赴華林園帝將親簡敘以撫軍金紫光禄大夫髙乾邕侍中為河北大使招集驍勇是年五月詔募士征葛榮前廢帝普㤗元年三月己卯詔右衞將軍賀拔勝并尚書一人募伎作及雜户從征者正入出身皆授實官有私馬者優一大階後周武帝天和元年七月築武功郿斜谷武都留谷津坑諸城以置軍人建德三年十二月詔荆襄安延夏五州總管内有能率募衆軍者授官各有差四年初置營軍器監隋文帝濳有吞陳之志轉朔州總管吐萬緖為徐州總管令修戰具唐髙祖武德二年七月壬申詔曰天生五材司牧資其器用武有七德撥亂所以定功故黄帝垂衣尚有阪泉之戰放勲光宅猶稱丹浦之師禁暴安人率繇兹道創業垂統莫此為先是以周置六軍毎習蒐狩漢增八校畢選驍雄故能化行九有威震百蠻姦宄不萌䖍劉息志自季葉凌替軍政湮亡卒列不修旌旗雜伍符籍之内空有調發之名逗撓之間竟無討襲之用遂使戎狄放命盗賊交侵戰爭多虞黔黎殄䘮朕受天明命撫育萬方爰自義師克成帝業至如超乘之士莫匪百金彀騎之才豈唯七萃今雖關塞寧謐荒裔肅清伊雒猶蕪江湖尚梗役車未息戎馬載馳武備之方尤宜精練所以各因部校序其統屬改授鉦鼓創造徽章取象天官定其名號庶使前茅後勁類别區分玊帳絳宫刑德允備蹈兹湯火譬彼椒蘭大定戎衣止戈斯在於是置十二軍分關内諸府以𨽻焉萬年道為叅旗軍長安道為鼓旗軍富平道為𤣥戈軍醴泉道為井鉞軍同州道為羽林軍華州道為騎官軍寧州道為折威軍岐州道為平道軍幽州道為招搖軍麟州道為苑㳺軍涇州道為天紀軍宜州道為天節軍時帝以天下未定實資武力將舉關中之衆以臨四方故興此制也毎軍一人副一人取威名素重者為之督以耕戰之務自是士馬精强無敵於天下矣髙宗儀鳳三年正月遣左金吾衞將軍曹懷舜金吾將軍李知十分徃河南北道以募猛士𤣥宗先天元年正月睿宗詔曰徃者皇運伊始戎政肇修兩置軍旅初分府衞計户充兵纔足用事遂使二十一入募六十一出軍既憚劬勞咸規避匿不有整革將何置理其天下衞士取年二十五以上者充十五年即放出頻經征鎮者十年放出自今已後羽林飛騎並於衛中簡補又勅河北諸州加團練兵令州刺史押當開元二年八月辛巳上以河隴之故命有司大募壯勇士從軍既募引見置酒於朝堂享之詔曰朕光宅四海撫御百蠻屬疆埸未寧軍國多費毎欲指揮方略親率軍師故召募爾等擬從朕行知爾等材力冠羣藝能㧞萃但以不教人戰豈知金鼔之聲授以兵律方辯干戈之勢所以且遣薛訥等於隴右防禦使令教習爾等既練韜鈐須明隊伍使投石拔劍以勵威鋒裹糧坐甲待清逋冦若能因機立效遇敵邀勲酧以官榮必超格例然後陪朕輿駕從戎塞垣俾爾先驅敬聽後命今宴勞爾等并賜錢三千貫可節級領取即宜好去十月薛訥克吐蕃帝遂停親征詔曰比來縁邉鎮軍毎年更代兵不識將將不識兵豈有縁路疲人蓋是以卒與敵其以西北軍鎮宜加兵數先以側近兵人充並精加簡擇其有勞考等色所司具以條例奏聞戰兵别簡為隊伍專令教練不得輙有使役仍令兵部侍郎裴璀太常少卿姜晦徃軍州計㑹便簡支配有見集後軍兵宜令兵部侍即韋抗紫㣲舍人主珽即簡擇以聞八年八月詔曰國家偃武教修文德百年於兹矣自運屬清平人忘爭戰爼豆之事嘗聞之矣軍戎之禮我所未暇且五材並用誰能去兵四方雖安不可忘戰故周禮以軍禁紏邦國以蒐狩習戎旅不教人戰是謂棄之宜差使於兩京及諸州且揀取十萬人務求灼然驍勇不須限以蕃漢皆放蕃役差科唯令圍伍教練辨其旗物簡其車徒習攻取進退之方陳威儀貴賤之等俾夫少長有禮疾徐有節將以伐叛懷服將以保大定功叶於師貞以𢎞武備應須集期及有蠲免所司明為條制别作優異法奏聞仍勑幽州刺史邵寵於幽易兩州選二萬灼然驍勇者充幽州經略軍健兒不得雜使租庸資課並放免十一年四月勑曰王者之師有征無戰將以懷柔服叛非欲黷武窮兵犯令凌政則杜之賊賢害人則伐之維其封疆辨其旗物此皆夏官之政也咨爾兵部尚書同中書門下三品朔方軍節度大使上柱國中山郡開國公王晙寅亮天地弼予一人頻總元戎克清河朔師徒効力武威遠振遺甿懷仁以思順殊類望聲而欵服勲載王室朕甚嘉焉蓋六月出車周美仲甫古訓是式俾修我戎宜以來月廵朔方兼徃河西隴右河東河北等諸軍檢校兵馬㸃閲器械各與所管節度處置務令得所備預之道其在兹乎十一月詔曰同華兩州精兵所出地資輦轂不合外支自今已後更不得取同華人充兵防又勑宜於京兆蒲同岐華等州府兵内及白丁中簡一十二萬人名為長從宿衞准五尺八例一年兩蕃州縣不得更議雜驅使仍令尚書左丞蕭嵩與本州官長同揀擇以聞二十五年五月癸未詔曰自天下一統方隅底平交趾西界於庸岷流沙東洎於遼碣􅇏亭既廣徭戍轉增朕永念征夫無忘旰食是用懷柔憬俗賔禮戎臣降子女以適其氈裘捐繒玊以申其惠好二十五年於兹矣而情周萬㝢信結羣蠻羗狄為父子之邦甌貊成冠𢃄之國海内無事邉方底寧加以志道而一理得清心而庶務簡和氣來應穰歲以臻羣生樂業而自怡有司措刑而不用今欲小康戎旅大致昇平減停征徭與人休息諸方將相三事公卿宜協朕心勉成良筭宜令中書門下與諸道節度使各量軍鎮閒劇審利害計兵防徤兒等作定額委節度使放諸色征行人内及客户中召募取丁壯情願充徤兒長任邉軍者毎歲加於常例給田地屋宅務加優恤使得存濟毎年逐季本使具數報中書門下至年終一時録奏長駕逺馭事藉經久無害始慮之謀以規苟且之利天寶十四年正月詔河南置白亭管軍武士健兒五千人馬一千匹代宗大厯二年正月詔潼闗置鎮兵三千人四年正月遣内侍魚朝恩使於鳳翔之麟遊縣置七年正月丙辰詔諸道軍數毎年秋末冬首一申春夏不須申其官健逃亡非承正制勑不得輙召募德宗貞元三年七月庚辰遣決勝軍使唐良臣以其衆六百人自咸陽戍潘原堡神䇿副將蘇太平率其衆五百人戌隴州八月以宣武行營兵馬使檢校禮部尚書劉昌為本軍京西行營節度使初昌衆憚戍靈臺剽三原後各欲散歸昌招撫之乃定因加昌以董之改戍麟遊憲宗元和四年四月中書敘録諸道將士總八十八萬五千人舉大數其邉逺未至者亦有焉八年十月普潤鎮兵四千人割屬涇原節度使九年三月乙亥賜振武軍弓甲三百䭾七月甲戌命淮南浙西浙東江西荆南造甲以進仍付之様八月乙亥朔丙子以戎械賜宥州十年五月詔修宥州城十二月以馬三百匹及軍器給徐州軍又以馬三百匹給汝州行營十一年九月丁卯桂州防禦使奏准詔以兵五百戍邕州丙戌以樓煩監馬一百五十匹給昭義軍十二月癸卯以振武征馬二百匹給義武軍是月方討吳元濟丙辰以襄州兵三千㑹於唐州十二年正月辛酉河東節度使張𢎞靖奏准詔置子弟兵三千三月義武軍節度使陳楚新置子弟義軍一萬請衣及賜可之敬宗寶厯二年九月出内庫錢一萬貫令内園召募力士文宗太和二年七月内出弓箭及刀三千四百隻口令度支差人送銀州防禦營田五年五月内出陌刀一百五十口馬甲一百領器械一百萬斫刺刀一百口賜鹽州九年十一月汝州奏頃年河北用兵東都慮有冦盗以當州将士二百人權𨽻東都留守府今請却屬本州可之宣宗大中五年五月勑如聞諸道軍將及官健等近日所在將帥多務因循當召募之時已不選擇及收補之後曾莫教招遂使名在戎行少能知其弓矢職居列校罕見識於韜鈐緩急忽有徵差便取見在應數惟憂就役豈暇圗功虛費資糧莫尅讐敵為弊頗久須有舉明自今已後委諸道觀察節度都防禦團練經略等使毎道慎擇㑹兵法及能弓馬解槍弩及筒射等軍將兩人充教練使毎年至合教習時分畨各以本藝閲試其間或有伎藝超異者量加優賞仍作等第節級與進改職名毎至年終都具所教習馬歩及各執所藝人數申兵部及中書門下仍委兵部檢勘都開件聞奏所冀各盡伎能自成勁鋭其支郡有兵處亦委本道㸃檢訓練准詔處分僖宗光啟元年三月詔曰政在有經動惟可久事能師古安則易持今者初復舊京須申定制大漢之術兼王霸先儒之權有弛張重舉綱條且務輯睦未遑改作尤貴適時夫萬乘抗威四方從令雖資强幹是切安人迎駕諸軍都士等扈從經年郷闗積念永言忠力合假恩優節級議功爵秩無恡其情願住京邑者便充填兩軍欲歸本道者即仰所司各與公牒到本道後逓加糧賜别立名額給復終身如諸都中人數稍多優賞未徧即令所司計其積欠指揮某郡某縣或各逐將校任去處上供財賦令自差人請領神䇿軍自經亂離久未訓整孤兒漸散壯騎多亡羽林之垂象空存天陣而疾雷不震雖言無戰豈忘有虞宜委中書門下與本軍商量案舊籍裁減元數惟務摭實仍令三司資助各修營壘貴使繕完又金吾諸衛等城禁日嚴檄廵務切須令集事不可闕人亦宜條録修補四月以從駕五十四都分為十軍昭宗天復三年五月宰臣崔裔奏募置左右軍士共六千六百人從之後唐末帝清㤗二年正月詔諸州府本處牢城防禦兵士都將内人數不足團併或闕稍多量許招添其就糧禁軍内本指揮將校選偉壯長於武藝者據人數差節級部送京師三年七月置水軍五都以董思鐸馬暉何温安韜史希儼為指揮使尹居璠為都指揮起鄴城先是范延光進軍攻城以濠水濶溺兵士故立此軍八月詔應州起兵戍茹越口詔欣州堙石嶺闗左右道路晉髙祖天福三年五月昭義奏舊有銅鞮等五縣收拾到甲仗兵共六千七十副已勒作院添修旋送軍前次始帝建義自晉入雒趙德鈞兵敗奔至上黨故有此遺棄戈甲至是再令繕補齎徃鄴下少帝以天福七年即位九年勑天下鳩集鄉兵徧民七戸共資一卒兵仗器具均以出之開運元年八月將作使周仁美獻三接雲梯懸空橋梁髙三百餘尺遣使送青州行府周太祖廣順元年四月河中言送器械至隰州付汾州刺史王繼勲太祖收河中得繼勲聶遇皆西北山賊之魁時劉崇侵撓乃用聶遇為石州刺史繼勲為汾州刺史各就險阻設虎落為行州招收賊冦禦邉患焉五月戊子河陽李暉言奉詔置水軍五百詔諸州於州兵内選勇壯并家屬赴京師十月以冦侵軼平陽遣中使分押虎㨗兵士赴河陽陕州守禦三年六月遣中使修懷州城池世宗顯德元年十月謂侍臣曰侍衞兵士累朝已來老少相半强懦不分蓋徇人情不能選練今春於髙平與劉崇及蕃軍相遇臨敵有指揮不前者苟非朕親當堅陳㡬至喪敗况百户農夫未能贍得一甲士且兵在精不在衆今已令一一㸃選精鋭者昇在上軍怯弱者任從安便庶期可用又不虛費也侍臣咸曰若非陛下天縱睿謀無以有此英斷先是自用兵已來勲武得志至於偏禆之間鮮舉雄勇率以親舊互用而有懦怯不能自奮者其行伍可知矣上案兵於髙平覩其退縮慨然有懲革之意四年二月帝再征淮南令右驍衞大將軍王環率舟師數千以從焉先是帝用師於壽春城下覩吳人鋭於水戰時我舟師未備無以制之帝憤激及還京遂於京城西汴河之涘造戰船數百艘及成又命於降卒中選水工數百與我師同習水戰數月之後縱横出没殆勝於吳師矣至是命環董之俾自蔡河南入於潁以泝淮上焉三月甲午詔發近縣丁夫數千人鎮淮軍有三城夾淮相對仍令徙下蔡浮橋維於其間五年三月己酉命右神武統軍宋延渥帥舟師三千泝江而上以江北初定廵警故也五月壬午賜淮南行營招收馬歩軍軍號馬軍曰雄健歩軍曰武健册府元龜卷一百二十四
