body:
  text: 册府元龜巻三百八十一宋王欽若等撰將帥部褒異第七後魏長孫嵩道武時為南部大人累著軍功征中山除冀州刺史賜爵鉅鹿公長孫肥為中領軍將軍從道武征中山平之以功賜爵琅邪公遷衛尉卿改爵盧鄉討破妖賊趙凖於九門除肥鎭逺將軍兖州刺史給步騎一萬南循許昌畧地至彭城還鎭兖州肥善䇿謀勇冠諸將前後征討未嘗失敗南平中原西摧羗冦肥功居多賞賜奴婢數百口畜物以千計天賜五年卒陪塟金陵王建為左大夫從道武征伐諸國破二十餘部以功賜奴婢數十口雜畜數千從征衛辰破之賜僮五十戸為中部大人又從征慕容寶拜冠軍將軍烏丸庫侲宫鳴聚黨為冦詔建討平之遷太僕徙為真定公加散騎常侍冀青二州刺史卒陪塟金陵奚牧為輔國將軍畧地晉川獲慕容寶丹陽王買得及離石䕶軍高秀和於平陶以軍功拜并州刺史賜爵任城公張濟為勝兵將軍頻從車駕北伐濟功居多賞賜奴婢百口馬牛數百羊二千餘口庾岳為外朝大人討擒離石胡帥呼延鐵西河胡帥張崇等以功賜爵西昌公進號征虜將軍又討反人張超清河太守傅世竝破平以岳為鄴行臺及罷以所統六郡置相州即拜岳為刺史天賜四年詔賜岳舎地於南宫和跋時為龍驤將軍賜爵日南公從平中原以功進為尚書鎮鄴又逆擊慕容德大破之擒其將士千餘人改封定陵公又與常山王遵討破賀蘭部别帥木易干出為平原太守道武寵遇跋冠諸將長孫道生明元初為南統將軍世祖初進爵汝隂公遷廷尉卿後征蠕蠕大捷而還太武征赫連昌為前驅遂平其國昌弟定走保平凉宋文帝遣將到彦之王仲徳冦河南以救定詔道生與丹陽王太之屯河上以禦之遂誘宋將檀道濟邀其前後追至歴城而還除司空加侍中進封上黨王薨贈太尉丘堆為散騎常侍鎭并州赫連屈孑遣三千騎冦河西堆自并州與㳺擊將軍王雒生擊走之以功賜爵為侯屈恒歴官公正為鎭東大將軍與襄城公盧魯元俱賜甲第明元數臨幸賞賜隆厚娥清為中領軍時明元南廵幸鄴清與宋兵將軍周㡬等渡河畧地至湖陸高平民屯聚林藪拒射官軍清等因誅數千家虜獲萬餘口賜爵須昌侯太武初清自枋頭還京師假征南將軍進為東平公又討蠕蠕大獲而還轉宗正卿後詔清鎭并州討山胡白龍於西河斬白龍父及其將帥遂屠其城遷平東將軍周㡬為寧朔將軍破毛德祖於土樓以功賜爵交阯侯進號宋兵將軍率雒州刺史于栗磾以萬人襲陜城卒于軍軍人無不嘆惜之歸塟京師追贈交阯公奚斤初從道武征中原以斤為征東長史拜越騎校尉典宿衛禁旅從征高車諸部大破之又破庫狄宥連部又進擊侯莫陳部俘虜十餘萬至大峨谷置戍而還遷都水使者明元即位為鄭兵將軍蠕蠕犯塞令斤等追之拜天部大人進爵為公命斤出入乗軺軒備威儀導從太武之為皇太子臨朝以斤為左輔時宋少帝立其大臣不附乃収宋武帝前侵河南地假斤節都督前鋒諸軍事司空公晉兵大將軍南征自魏國初大將行師唯長孫嵩拒宋武斤征河南獨給漏刻及十二牙旗後為萬騎大將軍征平凉州戰功賜僮𨽻七十户太武以斤元老賜安車平决刑獄諮訪朝政豆代田初為明元内細射與奚斤前鋒先入擒宋將毛德祖并長史司馬二人以功遷内三郎又從討赫連昌乗勝追賊入其宫太武壯之拜勇武將軍後從駕平昌以戰功賜奴婢五十口黄金百斤銀百斤神䴥中討蠕蠕賜爵闗中侯從討平凉擊破赫連定得奚斤等太武以定妻賜之詔斤膝行授酒於代田勅斤曰全爾身命者代田功也改爵井陘侯加散騎常侍右衛將軍領内都幢將從討和龍戰功居多遷殿中尚書賜奴婢六十口以前後軍功進爵長廣公加平東將軍後為統萬鎭大將軍奚烏侯為建義將軍賜爵夷餘侯從征蠕蠕及赫連昌以功進爵城陽公加員外散騎常侍出為虎牢鎭將文成興光中卒陪塟金陵叔孫建為征南大將軍都督冀青徐濟四州諸軍事南方憚其威畧大延三年薨太武悼惜之賜塟金陵長孫翰初明元時為平南將軍率衆鎭北境威名甚著後為都督北部諸軍事平北將軍真定侯給殿中十隊加旌旗皷吹蠕蠕每犯塞翰拒擊有功進爵為公太武即位徵還京師進封平陽王加安集將軍蠕蠕大檀入冦雲中太武遣翰襲戰大檀奔走神䴥三年薨帝深見悼惜為之流涕親臨其䘮禮賵賻賜有加陪塟金陵長孫陳為羽林郎征和龍賊自西門出將犯外圍陳擊退之追斬至其城下以功賜爵五等男又從征凉州為都督將領大官遷殿中給事中進號為子長孫蘭為中散常從征伐以破平凉功賜爵雎陽子加奮威將軍長孫石雒為都將從征赫連昌以功拜樂部尚書賜爵臨淮公加寧西將軍長孫真為中散從征平凉以功賜爵臨城子拜員外散騎常侍廣武將軍穆崇為龍驤將軍進爵長樂侯從駕西征白龍北討蠕蠕以功加散騎常侍鎭北將軍進爵建安公文成時為征西大將軍獻文天安元年崇卒贈征西大將軍和歸為統萬將軍賜爵成臯男與西平公安頡攻虎牢抜之進爵高陽侯王度為殿中給事遷尚書從征赫連昌討蠕蠕有功賜爵濟陽公加散騎常侍平南將軍宿沓干為虎賁幢將從征平凉有功拜虎威將軍侍御郎賜爵漢安男轉中散遷給事兼領二曹從駕討和龍以功賜奴婢七十户來大千為常侍從討蠕蠕戰功居多遷征北大將軍賜爵盧陵公延和初車駕北伐大千為前鋒大破虜軍後吐京胡反以大千為都將討平之在吐京卒䘮還停於平城南太武出還見而問之左右以對太武悼嘆者良乆詔曰大千忠勇盡節功在可嘉今聽其䘮入殯城内贈司空周觀為北鎭軍將太武初從討蠕蠕以軍功進為都副將鎭雲中神䴥中又討蠕蠕大獲増爵為侯從征平凉進爵金城公遷為都將從破離石胡加散騎常侍閭大肥為都將擊大檀大破之還至渴侯山遂討東部高車於已尼陂又征平凉有功大武將拜大肥為王遇疾而卒追贈中山王于栗磾自道武登國初為冠軍將軍與寧朔將軍公孫蘭領步騎二萬潛自太原從韓信故道開井陘闗路襲慕容寶於中山既而車駕後至見道路修理大悦即賜其名馬趙魏平定道武置酒高㑹謂栗磾曰卿即吾之黥彭也大賜金帛明元永興中闗東羣盜大起西河反叛栗磾受命征伐所向皆平即以本號留鎭平陽尋轉鎭逺將軍河内鎭將賜爵新城男奚斤之征虎牢别率所部攻王涓之於金墉涓之棄城遁走遷豫州刺史進爵新安侯太武之征赫連昌栗磾與宋兵將軍周㡬襲陜城乗勝長驅仍至三輔進爵為公加安南將軍平統萬遷蒲坂鎭將後遷鎭南將軍卒賜東園秘器朝服一具衣一襲贈太尉陸真為内三郎數從征伐所在摧鋒䧟陣前後以功屢受賞賜太武太平眞君中從討蠕蠕以功賜爵闗内侯宋將王𤣥謨冦滑臺眞從太武討之至江眞再破其軍拜建武將軍石城子還攻盱􅇇眞功居多遷給事中陳建為下大夫内行長太武討山胡白龍建以身捍賊殺賊數人太武壯之賜户二千司馬悦為鎭逺將軍豫州刺史恱與鎭南將軍元英攻義陽克之以悦為征虜將軍郢州刺史時梁武帝遣其豫州刺史馬仙琕等率衆一萬於三闗起城及其輔國將軍濟隂太守薊沛精卒二千戍之恱令西闗統軍諸靈鳳掩擊敗之詔曰司馬恱首謀義陽征畧有捷且違京既乆屢請入朝可遂此志聽其赴闕尋詔以本將軍為豫州刺史論義陽之勲封漁陽縣開國子食邑三百户司馬天助為平東將軍破宋將閭萬齡軍前後多所虜獲拜侍中都督青徐兖三州諸軍事李韶字元伯吕荀兒反於秦州除撫軍將軍西道都督行秦州事與右衛將軍元麗率衆討平之尋即眞璽書勞勉陸俟為龍驤將軍與西平公安頡督諸軍攻虎牢克之賜爵建鄴公拜冀州刺史又為安定鎭大將追討叛羌金崖等皆獲之拜散騎常侍後安定盧永劉超等叛詔加都督秦雍諸軍事遂平永超等太武大悦徵還京師轉外都大官文成踐祚拜征西大將軍進爵東平王毛脩之為吴兵將軍領步兵校尉從太武征平凉有功遷散騎常侍前將軍又加冠軍將軍從討和龍别破三堡賜奴婢牛羊羅斤為平西將軍平凉州攻城野戰多有克捷以功賜爵帶方公伊馥為殿中尚書常典宿衛從太祖幸𤓰步頻有戰功進爵鎭軍將軍茍頽為中散從太武南征為前鋒都將毎臨敵對戰常先登䧟陣帝至江賜爵建德男加寧逺將軍韓茂為虎賁中郎將從太武征赫連昌以功賜茂爵蒲隂子加强弩將軍遷侍輦郎又從征統萬大破之及從平平凉茂所衝莫不應弦而殪繇是太武壯之拜内侍長進爵九門侯從征蠕蠕頻戰大捷戰功居多遷司衛監録前後功拜散騎常侍殿中尚書進爵安定公吕温為幢將從太武征赫連昌先登䧟陣毎戰必捷以功拜宣威將軍奉車都尉尉眷為安北將軍出鎭北境與平陽長孫翰擊蠕蠕别帥大獲而還又擒赫連昌以功拜寧北將軍加散騎常侍進爵源陽公又從征和龍督萬騎前驅慰喻降二千餘户尋為假節加侍中都督豫雒二州及河内諸軍事安南將軍開府鎭虎牢又張掖王秃髮保周之反也率師討殺之詔眷留鎭凉州加都督凉沙河三州諸軍事安西將軍領䕶羌校尉轉敦煌將文成時率師北擊伊吾克其城大獲而還尋拜侍中太尉進爵為王文成以眷元老賜杖履上殿和平四年薨文成悼惜之贈大將軍司馬楚之為征南將軍徵入朝㑹南藩諸將表宋文帝欲來侵以楚之為使持節安南大將軍封琅琊王屯潁川以拒之其長史臨邑子步還表曰楚之渡河百姓思舊義衆雲集汝潁以南望風翕然迴首革面斯誠陛下應天順民聖德廣被之所至也道武大恱璽書勞勉賜前後部鼓吹後為鎭西將軍雲中鎭大將在邉二十餘年以清儉著聞文成和平五年卒帝悼惜之贈都督梁益秦寧四州諸軍事征南大將軍領䕶西戎校尉揚州刺史陪𦵏金陵李寶文成初代司馬文思鎭懐荒授鎭北將軍大安五年薨年五十三詔賜命服一襲贈以本官于雒抜為外都大官文成詔與南陽王惠夀督四州之衆討平隴西屠各王景文等拜侍中殿中尚書吕雒抜文成末為平原鎭都將隨尉元攻宋將張永于五原大敗之賜爵成武侯加建義將軍慕容白曜獻文時為征南大將軍擊降宋將崔道固等以功拜青州刺史沈文秀以功拜都督青齊東徐州諸軍事開府青州刺史尉撥為凉州軍將介休縣男擊吐谷渾以功進爵為子遷杏城鎭將大收民和文成以撥清平有惠績賜以衣服獻文即位為北征都將南攻懸瓠破宋將朱湛之水軍三千人拜懸瓠鎭將加員外散騎常侍進爵安城侯獻文嘉其聲効復賜衣服源賀自太武時為龍驤將軍從擊叛胡白龍又討吐京胡皆先登䧟陣進號平西將軍太武征凉州以賀為鄉導陳攻戰之計賀率精騎歴諸部招慰下三萬餘落凉州平遷征西將軍進號西平公又從征蠕蠕討蓋吴諸賊皆有功拜散騎常侍文成時出為征南將軍冀州刺史封隴西王孝文時上書以年老稱病乞骸骨許之又給衣藥珍羞太和元年二月療疾於温湯孝文遣使者屢問消息太醫視病三年秋卒贈侍中太尉隴西王印綬贈雜帛五百疋賜輼輬車及命服温明秘器陪塟于金陵于烈為領軍孝文詔以本官從征荆沔加皷吹一部宛鄧既平車駕還雒論功加散騎常侍金紫光禄太夫畢衆敬為寧南將軍兖州刺史獻文皇興二年朝京師因留之賜甲第一區後孝文太和中以篤老乞還桑梓引見於皇信堂賜以酒饌車一乗馬三匹絹二百疋勞遣之及卒詔于兖州賜絹一千疋以供塟事奚康生以中堅將軍時吐京胡反康生拒戰破之遷為統軍又擊殺齊將張伏䕶賞帛一千疋頻戰再退其軍賞三階帛五百疋又齊將裴叔業圍渦陽勅康生馳徃赴援一戰破之賞二階帛一千疋又抜梁城合肥雒口三戍以功遷征虜將軍封安武縣開國男食邑一百户出為南青州刺史梁遣軍主徐濟冦邉康生率將出討破之生擒濟賞帛千疋又以梁副將張惠紹冦徐州詔康生為武衛將軍一戰敗之還京召見宴㑹賞帛千疋賜驊騮御胡馬一匹出為平西將軍轉涇州刺史時梁直閣將軍徐𤣥明戍於郁州殺其刺史張稷以城内附孝文詔遣康生迎接賜細御銀纒槊一張并棗柰果面勅曰果者果如朕心棗者早遂朕意劉昶為使持節都督吴越楚彭城諸軍事大將軍固辭詔不許又賜布千疋及發孝文親餞之命百僚賦詩贈昶又以其文集一部賜昶孝文因以所製文筆示之謂昶曰時契勝殘事鍾文業雖則不學欲罷不能晚思一見故以相示雖無足味聊復為笑耳其重昶如是又為都督大將軍特給班劒二十人太和二十一年四月卒於彭城孝文為之舉哀給温明秘器錢百萬布五百疋蠟三百斤朝服一具衣一襲贈假黄鉞太傅領揚州刺史加以殊禮九錫給前後部羽葆鼓吹依晉琅邪武王伷故事楊播為龍驤將軍與陽平王頥等出漠北擊蠕蠕大獲而還孝文嘉其勲賜奴婢十口遷武衛將軍復擊蠕蠕至居然山而還除左將軍尋假前將軍隨車駕南討擁衆濟淮孝文甚壯之賜爵華隂子尋除右衛將軍後隨駕討崔惠景於鄧城破之進號平東將軍吕羅漢為羽林郎初太武時上邽休官吕豐屠各王飛亷等為逆羅漢頻破賊軍以功遷羽林中郎幢將加建威將軍後為秦益二州刺史大破仇池氐羌孝文詔曰其所得口馬便勅領納其馬付都牧口以賜卿陸叡為北部長孝文太和八年正月叡與隴西公元琛竝持節為東西二道大使褒善罰惡聲聞京師五月詔賜叡夏服一具後以叡為北征都督擊蠕蠕大破之遷侍中都曹尚書時蠕蠕又犯塞詔率騎五千以討之蠕蠕遁走擒其帥赤河突加散騎常侍又為使持節鎭北大將軍與陽平王頥竝為都督領軍將軍斛律桓等北征三道諸軍事步騎十萬以討蠕蠕叡以下各賜衣物布帛孝文親幸城北訓誓羣帥除尚書令衛將軍大破蠕蠕而還薛𦙍為都將討秦州反賊支酋生擒斬之除立忠將軍王仲興為折衝將軍屯騎校尉又命率千餘騎破賊於鄧城除振威將軍越騎校尉賜帛千疋李佐假平逺將軍統軍時梁新野太守劉忌憑城固守佐率所領攻抜之以功封涇陽縣開國子邑三百户宇文福為南征都將孝文時擊齊有功授顯武將軍尋除恢武將軍北征都將特賜戎服破蠕蠕别部斬獲萬餘還除都牧給事及孝文南征詔福與右衛將軍楊播為前軍擊齊軍大奔賜爵昌黎伯宣武景明初為平逺將軍進計於都督彭城王勰遂令福攻建安建安降以勲封襄樂縣開國男食邑三百户源懐宣武時為車騎大將軍正始元年蠕蠕南冦常代詔懐以本官加使持節前出據北蕃賜馬一匹細鎧一具御矟一枚懐至雲中蠕蠕亡遁又武興氐王楊紹先叔集起反叛詔懐使持節侍中都督平氐諸軍事以討之三年六月卒詔給東園秘器一具衣一襲錢二十萬布七百疋蠟三百斤贈司徒長孫稚為鎭西將軍討蜀都督頻戰有功除平東將軍蕭寶夤除使持節督東揚南徐兖三州諸軍事鎭東將軍揚州刺史丹陽郡開國公齊王配兵一萬令且據東城乃備禮䇿授賜車馬什物給虎賁五百人事從豐厚及壽春之戰勇冠諸軍既還京師改封梁郡開國公食邑八百户薛眞度自孝文時為假節冠軍將軍眞度毎獻計於孝文勸先取樊鄧後攻南陽故為孝文所賞賜帛一百疋又加持節正號冠軍改封臨晉縣開國公食邑三百户至宣武時除平南將軍揚州刺史又以年老聽子懐吉以本官隨行梁豫州刺史王超宗率衆圍逼小峴眞度遣兼統軍李叔仁等率步騎擊破之還朝除金紫光禄大夫加散騎常侍又改封敷西縣永平中卒賻帛四百疋朝服一襲贈左光禄大夫畢祖朽為寧朔將軍時梁將蕭及等冦兖州祖朽擊討之以功封南城縣開國男食邑二百戸畢祖暉為平西將軍豳州刺史孝明正光五年州民反招引隴賊攻逼祖暉以全城之勲封新昌縣開國子食邑四百戸楊大眼為統軍從孝文征宛葉穰鄧九江鍾離之間勇冠六軍宣武初裴叔業以壽春内附大眼率衆先入以功封安成縣開國子食邑三百户除直閣將軍尋加輔國將軍㳺擊將軍出為征虜將軍荆州刺史崔延伯為鎭南將軍行岐州刺史假征西將軍賜驊騮一匹孝明正光五年秋以往在揚州建淮橋之勲封當利縣開國男食邑二百户尋増邑一百户改封新豐進爵為子田益宗為征虜將軍遣戍主奇道顯擊楊僧逺軍破之進號平南將軍宣武又詔益宗綏防蠻楚加安南將軍増封一百户賜帛二千疋王肅為平南將軍肅至義陽頻破齊軍降者萬餘孝文遣散騎侍郎勞之以功進號平南將軍賜駿馬一匹除持節都督豫東豫郢三州諸軍事又以破齊將裴叔業功進號鎭南將軍加都督豫南兖東荆東豫四州諸軍事封汝南縣開國子食邑三百户加鼓吹一部宣武時拜使持節都督江東諸軍事車騎將軍肅進師討擊齊軍於死虎大破之肅還京師宣武臨東堂引見勞之以肅淮南累捷賞帛四千七百五十疋進位開府儀同三司封昌國縣開國侯食邑八百户尋以肅為散騎常侍都督淮南諸軍事揚州刺史景明二年薨於夀春宣武為舉哀詔曰肅奄至不救痛惋兼懐可遣中書侍郎賈思伯兼通直散騎常侍撫慰厥孤給東園秘器朝服一襲錢三十萬帛一千疋布五百疋蠟三百斤竝問其卜遷逺近尋遣侍御史一人監䕶䘮事務令優厚又詔曰死生動靜卑高有域勝達所居存亡崇顯故杜預之殁窆於首陽司空李冲覆舟是託顧瞻斯所誠亦二代之九原也肅誠義結於二世英惠符於李杜平生本意願終京陵既有宿心宜遂先志其令塟于冲預兩墳之間使之神㳺相得也贈侍中司空本官如故孝明初詔為肅建碑銘邢巒為安東將軍豫州城民白早生殺刺史司馬恱以城南入梁詔巒持節率羽林精騎以討之封平舒縣開國伯食邑五百户賞宿豫之功也又詔加巒使持節假鎭南將軍都督南討諸軍事征南將軍既平豫州振旅還京師宣武臨東堂勞之遷殿中尚書加撫軍將軍延昌三年暴卒詔賻帛四百疋朝服一襲贈車騎大將軍瀛州刺史李平為使持節都督北討諸軍事鎭北將軍行冀州事時京兆王愉反于信都故宣武詔平討之臨式乾殿勞遣平既擒愉冀州平宣式遣兼給事黄門侍郎祕書丞元梵宣㫖慰勞又梁遣其左㳺擊將軍趙祖悦偷據西硤石衆至數萬以逼壽春宣武詔平為鎭東大將軍討之又詔平長子奬以通直郎從賜平縑錦百段紫納金裝衫甲一領賜奬縑布六十段絳衲襖一領父子重列拜受家庭觀者榮之及平破梁軍斬祖悦送首于雒以功遷尚書右僕射加散騎常侍將軍如故李䖍為長樂太守延昌初冀州大乗賊起令䖍以本官為别將與都督元遥討平之遷後將軍後又追論平冀州之功賜爵高平男崔敬邕為左中郎將隨中山王英南討以功賜爵臨淄男李順為前將軍從太武攻統萬赫連昌昌出逆戰順督勒士衆破其左軍及克統萬至京論功以順為給事黄門侍郎賜奴婢十五户帛千疋李憲為七兵尚書撫軍將軍孝昌初元法僧據徐州反叛詔憲為使持節假鎭東將軍徐州都督與安豐王延明臨淮王彧等討之㑹梁武遣其豫章王綜據彭城俄而綜降徐州既平詔遣兼黄門侍郎常景詣軍慰勞賜憲驊騮馬一匹仍除征東將軍揚州刺史淮南大都督董紹為平西將軍孝明以紹拒蕭寶夤之功賞新蔡縣開國男食邑二百户崔孝芬孝明時為龍驤將軍時荆州刺史李神儁為梁遣將軍攻圍詔孝芬為刺史以代神儁乃遣弟孝直輕兵在前出賊不意賊便奔散人還安堵孝明嘉勞之并賚馬及棉絹等物伊盆生為統軍累有戰功為名將以勲賜爵平城子孝明神龜中為右將軍後除安西將軍毎戰克捷進號征西將軍崔模為别將及蕭寶夤討闗隴引模為征西别將屢有戰功詔除持節光禄大夫都督别道諸軍事加安東將軍万俟醜奴遣將郝虎南侵模攻破其營擒虎以功封槐里縣開國伯食邑五百户楊津為撫軍將軍出據靈􅏀而賊帥鮮于修禮起於博陵定州危急遂迴師南赴至城下營壘未立而州軍新敗津以士衆勞疲移軍入城其後賊攻州城津出戰斬賊帥詔除衛尉卿既而杜雒周圍州城津盡力捍守詔加衛將軍封開國縣侯食邑一千户崔元珍為平陽太守以頻破胡賊郡内以安孝明武泰初改郡為唐州仍除元珍為刺史加右將軍以破胡勲賜爵凉城侯宇文延以孝明孝昌中授假節建咸將軍西道别將赴援闗隴有戰功除員外散騎常侍李崇自孝文時為都督隴右諸軍事擊氐楊靈珍從弟建軍於龍門破之靈珍走奔漢中孝文在南陽覽表大悦曰使朕無西顧之憂者李崇之功也以崇為都督梁秦二州諸軍事孝明時累遷左衛將軍追賞平氐之功封魏昌縣開國伯食邑五百户李神為衛將軍行相州刺史時葛榮兵充斥民多逃散神撫勞兵民小大用命㑹爾朱榮擒葛榮於鄴西事平除車騎將軍以功進爵為公増邑八百户通前一千户裴衍為征虜將軍梁遣將曹敬宗冦荆州詔衍為别將假前將軍解荆州圍除使持節散騎常侍平東將軍假安東將軍北道都督鎭鄴西之武城封安陽縣開國子邑三百户時相州刺史安樂王鑒叛逆詔衍討平之除撫軍將軍相州刺史假鎭北將軍北道大都督進封臨汝縣開國公増邑千二百户爾朱天光為鎭東將軍時元顥入雒并肆不安天光至并州部分約勒所在寧輯顥破尋還京師遷驃騎將軍加散騎常侍改封廣宗郡公增邑一千户陸希質為龍驤將軍膠州刺史時梁將侵州界希質討破之轉建州刺史李神雋自宣武時為前將軍荆州刺史時梁將曹景宗來冦攻圍積時神雋戮力固守至莊帝時追論固守荆州之功封千乘縣開國侯食邑一千户楊侃為右將軍岐州刺史時元顥内逼莊帝詔以本官假撫軍將軍為都督率衆鎭大梁未發詔行北中郎將帝至建州叙行從功臣自陽城王徽以下凡十人竝増三階以侃河梁之誠特加四階侃固辭祈同諸人乆乃見許於是除鎭軍將軍度支尚書兼給事黄門侍郎敷西縣開國公食邑一千户又南渡破元顥子領軍將軍冠受擒之顥便南走車駕入都侃解尚書正黄門加征東將軍金紫光禄大夫以濟河之功進爵濟北郡開國公増邑五百户辛纂為征虜將軍兼尚書仍行臺後大都督費穆擊梁將曹義宗擒之入朝言於莊帝稱纂固節危城宜䝉爵賞以勸將來帝乃下詔慰勉之尋除持節平東將軍中郎將賜絹五十疋金裝刀一口張熠為冠軍將軍中散大夫後為别將隨長孫雉西征轉平西將軍大中大夫為闗西都督以功封長平縣開國男食邑二百户斛斯椿為平北將軍從大將軍爾朱榮平葛榮以功除上黨太守賀抜勝宣武時為驃騎大將軍攻抜梁下羌戍使人誘勸諸蠻皆率其種落歸欵漢南大駭馮翊安定沔陽竝平之進位尚書令進爵琅琊公又為撫軍將軍大都督出井陘鎭中山元顥入雒勝與爾朱兆破擒顥息冠受及其都督陳思保莊帝還宫以功増邑六百户賀抜岳為車騎將軍𨽻爾朱天光為左廂大都督討万俟醜奴擒蕭寶夤王慶雲天光雖為元帥而岳効居多加車騎將軍増邑二千户進封樊城縣開國伯又孝莊時為衞將軍左都督大破赤水蜀賊軍威大振時万俟醜奴自率大衆圍岐州岳擊退之遂擒醜奴三秦河渭𤓰凉鄯州咸來歸欵岳功多進封清水郡公尋加侍中給後部鼓吹進位開府雍州刺史侯莫陳悦為征西將軍爾朱天光之討闗西以悦為右廂大都督西伐克獲皆與天光賀抜岳畧同勞効除鄯州刺史侯淵為中軍副都督常從征伐屢有戰功孝莊即位領左右封厭㳄縣開國子食邑四百户後從爾朱榮討葛榮於滏口戰功尤多榮啟淵為驃騎將軍燕州刺史淵又進討韓樓追擒之以勲進爵為侯増邑八百户樊子鵠為平北將軍莊帝永安中以招納叛蜀數萬口進封中都縣開國公通前邑千户元顥入雒薛修義及䧏蜀陳雙熾等受顥處分率衆攻州城子鵠出與戰大破之以功拜撫軍將軍尋徵授西荆州大中正後兼右僕射為行臺督賈智等討吕文欣於東徐州平之還除車騎將軍左光禄大夫進封南陽郡開國公増邑六百户又假驃騎大將軍都督二豫州郢三州諸軍事兼尚書右僕射子鵠到相州又勑賚絹五百疋及趙脩延叛為荆州詔子鵠通三鵶道而還遭母憂去職前廢帝聞其在雒無宅凶費不周賚絹四百疋粟五百石源子恭初自孝明正光中為冠軍將軍時秦益氐反詔子恭持節為都督河間王琛軍司馬討之事平仍行南秦州事及六鎭反以子恭兼給事黄門郎持節慰勞還拜河内太守加後將軍平絳蜀反丹谷清亷二路險澁不通以子恭為當郡别將俄而建興蜀復反相與連勢進子恭為持節散騎常侍假平北將軍加建興都督仍兼尚書行臺與正平都督長孫稚合勢進討大破之事平除平南將軍豫州刺史尋加散騎常侍撫軍太武初郢州刺史元顯達以城降梁詔子恭擊退梁將夏侯䕫及夏侯亶等衆加鎭南將軍又兼尚書行臺擊斬梁軍主胡智達等及元顥入雒也加子恭車騎將軍未㡬顥敗莊帝還進征南將軍兼右僕射假車騎將軍後加散騎常侍右光禄大夫給事黄門侍郎仍本將軍録其前後征討功封臨潁縣開國侯食邑六百户出帝永熈中入為吏部尚書加驃騎大將軍以子恭在前豫州戰功追賞襄城縣開國男食邑二百户源子雍為散騎常侍使持節假撫軍將軍都督兼行臺尚書破賊帥紇單步胡提於曲沃堡孝明璽書勞勉之子雍在白水郡復破阿非軍於白水郡多所斬獲詔遣使勞勉除中軍將軍金紫光禄大夫給事中黄門郎封樂平縣開國公食邑一千户還雒以葛榮乆逼信都詔假子雍征北將軍為北討都督時相州刺史安樂王鑒據鄴反勅子雍與都督李神軌討平之改封陽平縣開國公増邑千五百户進號鎭東將軍甄宻孝明末為冠軍將軍時賊帥葛榮侵擾河北裴衍源子雍敗没人情不安詔宻為相州行臺援守鄴城莊帝以宻全鄴之勲賞安市縣開國子食邑三百户鄭先䕶孝莊時為前將軍廣州刺史後元顥入雒先䕶據州起義不受顥命出城拒戰莊帝還京嘉其誠節除使持節散騎常侍都督襄廣二州諸軍事鎭南將軍刺史如故進爵郡公費穆為輔國將軍孝明孝昌中二絳蜀叛以穆為都督討平之拜前將軍散騎常侍遷平南將軍光禄大夫又兼武衛將軍討破妖賊李洪於闗口之南遷金紫光禄大夫正武衛將軍爾朱榮入雒莊帝詔穆為使持節征南將軍都督南征諸軍事生擒梁將曹義宗以功遷衛將軍進封趙平郡開國公増邑一千户爾朱榮為冠軍將軍時乞步落堅胡劉阿如等作亂𤓰肆勅勒北列步若反于沃陽榮竝滅之以功封安樂縣開國侯食邑一千户爾朱兆為車騎將軍元顥之屯於河橋兆進破安豐王延明顥於是退走莊帝還宫論功除散騎常侍車騎大將軍儀同三司増邑八百户為汾州刺史復増邑千户尋加侍中驃騎大將軍又増邑五百户册府元龜巻三百八十二
