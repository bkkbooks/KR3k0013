body:
  text: 册府元龜卷四百二十八宋王欽若等撰將帥部料敵夫用兵之道先勝而後戰此料敵之情也自戰國之後金革日試至於正合竒勝伐謀伐交以詭譎相高以方畧自許者亦曷嘗無人哉漢氏之後司戎政者或善揣强弱先為備豫逹外夷之情狀審敵人之形勢沈謀獨斷見之於未萌深識逺慮表之於無象用能取威而制勝攘寇而保民挫逆徒之鋭氣遏戎酋之内侮克清多壘以集洪勲自非練經武之善志得御兵之要道洞見至順舉無不臧者亦安能及是乎孫臏為齊將田忌師魏與趙攻韓韓告㥯於齊齊使田忌將而往直走大梁魏將龎涓聞之去韓而歸臏量其行暮當至馬陵馬陵道狹而傍多阻險可伏兵乃斫大樹白而書之曰龎㳙死於此下於是令齊軍善射者萬弩夾道而伏期曰見火舉而俱發龎涓夜至斫樹下見白書乃鑽火燭之讀書未畢齊軍萬弩俱發魏軍大亂龎涓自知智窮兵敗乃自刎曰遂成豎子之名漢韓信為左丞相擊魏信問酈生魏得毋用周叔為大將軍乎曰栢直也信曰豎子耳遂進兵克之周亞夫為太尉擊吳楚七國亞夫走昌邑深壁而守吳奔壁東南陬亞夫使備西北已而精兵果奔西北不得入趙充國為後將軍元康三年先零遂與諸羌種豪二百餘人解仇交質盟詛羌人無大君長而諸種豪逓相殺伐故每有仇讐往來相報今解仇交質者自相親結欲入漢為寇也帝聞之以問充國對曰羌人所以易制者以其種自有豪數相攻擊勢不一也往三十餘嵗西羌反時亦先解仇合約攻令居合約共為要契也與漢相距五六年乃定至征和五年先零豪封煎等通使匈奴煎讀曰翦匈奴使人至小月氏氏音支傳告諸羌曰漢貳師將軍衆十餘萬人降匈奴羌人為漢事苦事使役張掖酒泉本我地地肥羙可共擊居之以此觀匈奴欲與羌合非一世也間者匈奴困於西方聞烏桓來保塞恐兵復從東方起使使尉黎危須諸國設以子女貂裘欲沮解之設謂開設之也沮壊也欲壊其計令散之沮音才汝切其計不合疑匈奴更遣使至羌中道從沙隂地出鹽澤過長坑入窮水塞南抵屬國與先零相直直當也臣恐羌變未止此且復結聨他種宜及未然為之備未然者其計未成後月餘羌侯狼何果遣使至匈奴藉兵借兵也欲擊鄯善焞煌以絶漢道鄯音善充國以為狼何小月氏種在陽闗西南勢不能獨造此計疑匈奴使已至羌中先零䍐开乃解仇作約䍐开在金城南羌之别種也开音口堅切到秋馬肥變必起矣宜遣使者行邊兵豫為備敇視諸羌毋令解仇行下更切視讀曰示語之也以發覺其謀陳湯為闗内侯坐言事非是奪爵為士伍後數嵗西域都護段㑹宗為烏孫所圍驃騎上書願發城郭燉煌兵以自救丞相王商大將軍王鳳及百僚議數日不决鳳言湯多籌䇿習外國事可問帝召湯見宣室湯擊邳支時中寒病兩臂不詘音屈下同申湯入見有詔毋拜示以㑹宗奏湯辭謝曰將相九卿皆賢材通明小臣罷癃不足以策大事帝曰國家有急君其毋讓對曰臣以為此必無可憂也帝曰何以言之湯曰夫胡兵五而漢兵一何者兵刄朴鈍弓弩不利今聞頗得漢法猶三而當一又兵法曰客倍而主人半然後敵今圍㑹宗者人衆不足以勝㑹宗唯陛下勿憂且兵輕行五十里重行三十里今㑹宗欲發城郭燉煌歴時乃至所謂報讎之兵非救急之用也帝曰柰何其解可必乎度何時解湯知烏孫瓦合不能久攻故事不過數日因對曰已解矣詘指計其日曰不出五日當有吉語聞居四日軍書到言已解後漢馬援為待詔光武自征隗囂至漆漆縣屬右扶風諸將多以王師之重不宜遠入險阻計冘豫未决冘行貌也義見説文豫亦未定也冘音以林切㑹召援夜至帝大喜引入具以羣議質之援因説隗囂將帥有土崩之勢兵進有必破之狀又於帝前聚米為山谷指畫形勢開示衆軍所從道徑往來分析曲折昭然可曉帝曰虜在吾目中矣明旦遂進軍至第一高平有第一城高平今原州縣囂衆大潰班超使西域降莎車威振西域先是月氏嘗助漢擊車師有功遂貢奉珍寶符㧞師子符㧞形似麟而無角因求漢公主超拒還其使繇是怨恨永元二年月氏遣其副王謝將兵七萬攻超超衆少皆大恐超譬軍士曰月氏兵雖多然數千里踰葱嶺來非有運輸何足憂邪但當收糓堅守彼饑窮自降不過數十日决矣謝遂前攻超不下又抄掠無所得超度其糧將盡必從龜兹求救乃遣兵數百於東界要之謝果遣騎齎金銀珠玉以賂龜兹超伏兵遮擊盡殺之持其使首以示謝謝大驚即遣使請罪願得生歸超縱遣之月氏繇是大震嵗奉貢獻明年龜兹姑墨温宿皆降魏郭淮為雍州刺史青龍二年諸葛亮出斜谷並由於蘭坑是時司馬宣王屯渭南淮策亮必爭北原宜先據之議者多謂不然淮曰若亮跨渭登原連兵北山隔絶隴道揺盪民夷此非國之利也宣王善之淮遂屯北原塹壘未成蜀兵大至淮逆擊之後數日亮盛兵西行諸將皆謂欲攻西圍淮獨以為此見形於西欲使官兵重應之必攻陽遂耳其夜果攻陽遂有備不得上田豫為汝南太守殄夷將軍討公孫淵㑹吳賊遣使與淵相結帝以賊衆多又以渡海詔豫使罷軍豫度賊舩垂還嵗晚風急必畏漂浪東隨無岸當赴成山成山無藏舩之處輙便循海案行地形及諸山島徼截險要列兵屯守自入成山登漢武之觀賊還果遇惡風船皆觸山沈没波蕩著岸無所逃􅇡盡虜其衆後孫權號十萬衆攻新城征東將軍滿寵欲率諸軍救之豫曰賊悉衆大舉非徒投射小利欲質新城以致大軍耳宜聽使攻城挫其鋭氣不當與爭鋒也城不可㧞衆必罷怠然後擊之可大克也若賊見計必不攻城勢將自走若便進兵適入其計又大軍相向當使難知不當使自畫豫輙上狀天子從之㑹賊遁走曹仁為廣陽太守以議郎督騎時太祖與袁紹乆相持於官渡紹遣劉備狥㶏强諸縣多舉衆應之自許以南吏民不安太祖以為憂仁曰南方以大軍方有目前急其勢不能相救劉備以强兵臨之其背叛故宜也備新將紹兵未能得其用擊之可破太祖善其言遂使將騎擊備破走之仁盡復收諸叛縣而還曹休領虎豹騎宿衞劉備遣將吳蘭屯下辦太祖遣曹洪征之以休為騎都尉参洪軍事太祖謂休曰汝雖参軍其實帥也洪聞此令亦委事於休備遣張飛屯固山欲斷軍後衆議狐疑休曰賊寔斷道者當伏兵濳行今乃先張聲勢此其不能也宜及其未集促擊蘭蘭破則飛自走矣洪從之進兵擊蘭大破之飛果走程昱為振威將軍袁紹在黎陽將南渡時昱有七百兵守鄄城太祖聞之使人告昱欲益二千兵昱不肯曰袁紹擁十萬衆自以所向無前今見昱兵少必輕易不來攻若益昱兵過則不可不攻攻之必克徒兩損其勢願公無疑太祖從之紹聞昱兵少果不徃太祖謂賈詡曰程昱之膽過於賁育遷奮武將軍太祖征荆州劉備奔吳論者以為孫權必殺備昱料之曰孫權新在位未為海内所憚曹公無敵於天下初舉荆州威震江表權雖有謀不能獨當也劉備有英名關張皆萬人之敵也權必資之以禦我難解勢分備資以成又不可得而殺也權果多與備兵以禦太祖李典為裨將軍劉備北侵至業太祖遣典從夏侯惇拒之備一旦燒屯去惇率諸軍追擊之典曰賊無故退疑必有伏南道窄狹草木深不可追也惇不聽與于禁追之典留守惇等果入賊伏裏戰不利典往救備望見救至乃散退鍾繇為侍中守司𨽻校尉持節都督闗中諸軍事其後匈奴單于作亂平陽繇帥諸軍圍之未㧞而袁尚所置河東太守郭援到河東衆甚盛諸將議欲釋之去繇曰袁氏方彊援之來闗中隂與之通所以未悉叛者顧吾威名故耳若棄而去示之以弱所在之民誰非寇讎縱吾欲歸其得至乎此謂未戰先自敗也且援剛愎好勝必易吾軍若渡汾為營及其未濟擊之可大克也張既説馬騰㑹擊援騰遣子超將精兵逆之援至果輕渡汾衆止之不從濟水未半擊大破之張郃初為袁紹寧國中郎將太祖與紹相拒於官渡紹遣將淳于瓊等督運屯烏巢太祖自將擊之郃説紹曰曹公兵精往必破瓊等破則將軍事去矣宜急引兵救之郭圖曰郃計非也不如攻其本營勢必還此謂不救而自解也郃曰曹公營固攻之必不㧞若瓊見擒吾屬盡為虜矣紹但遣輕騎救瓊而以重兵攻太祖營不能下太祖果破瓊等紹軍潰圖慙又更譛郃曰郃快軍敗出言不遜郃懼乃歸太祖文帝時為左將軍屯方城㑹諸葛亮復出急攻陳倉帝驅馬召郃到京都帝自幸河南城置酒送郃遣南北軍士三萬及分遣武衛虎賁使衛郃因問郃曰遲將軍到亮得無已得陳倉乎郃知亮縣軍無穀不能乆攻對曰比臣未到亮已走矣屈指計亮糧不至十日郃晨夜進至南鄭亮退詔郃還京都古弼為安西將軍與永昌王徤等討馮文通文通嬰城固守弼芟其禾而還羅伊利孝文時為安東將軍蠕蠕來寇詔伊利追擊之不及而反劉㫤孝文時南齊雍州刺史曹虎之詐降也詔㫤以兵出義陽無功而還張浦為南中郎將南蠻校尉𨽻平南大將軍長孫嵩從長孫嵩往禦晉師及宋武帝入長安乃還後從安平公叔孫建攻青州不克而還皮豹子為内都大官先是河西諸胡亡匿避命豹子及前涇州刺史阿君督河西諸軍南趣石樓與衛大將軍樂安王良以討羣胡豹子等與賊相對不覺胡走無捷而還坐免官楊椿為安東將軍宣武永平初徐州彭城人成景擕以宿豫叛詔椿率衆四萬討之不尅而返淳于誕為伐蜀别駕司馬領鄉導統軍次晉夀蜀人大震屬宣武晏駕不果而還伊盆子孝明時為持節右將軍雒州刺史欲耀兵以示有餘乃濳遣步騎六千伏肥池隱處以待之權果上岸耀兵寵伏軍卒起擊之斬首數百或有赴水死者王基為安豐太守吳嘗大發衆集建業揚聲欲入攻揚州刺史諸葛誕使基䇿之基曰昔孫權再至合肥一至江夏其後全琮出盧江朱然寇襄陽皆無功而還今陸遜等已死而權年老内無賢嗣中無謀主自出則懼内釁卒起癕疽發潰遣將則舊將已盡新將未信此不過欲補定支黨還自保護耳後權竟不出蔣濟為護軍將軍明年遣平州刺史田豫幽州刺史王雄共攻遼東公孫淵聞魏將來討復稱臣於孫權乞兵自救帝問濟孫權其救遼東乎濟曰彼知官備已固利不可得深入則非力所能淺入則勞而無獲雖子弟在危猶將不動况異域之人兼以往者之辱乎今所以外揚此聲者譎其行人疑於我我之不克冀折後事已耳然沓渚之間去淵尚逺若大軍相持事不速决則權之淺規或能輕兵掩襲未可測也鄧艾為南陽太守與征西將軍郭淮拒蜀偏將軍姜維維退淮因西擊羌艾曰賊去未逺或能復還宜分諸軍以備不虞於是留艾屯白水北三日維遣廖化自白水南向艾結營艾謂諸將曰維今卒還吾軍人少法當來渡水而不作橋此維使化持吾令不得還維必自來襲取洮城洮城在水北去艾屯六十里艾即夜濳軍徑到維果來渡而艾先至據城得以不敗其後姜維駐鍾提乃以艾為安西將軍假節領護東羌校尉議者多以為維力已竭未能更出艾曰洮西之敗非小失也破軍殺將倉廪空虗百姓流離幾於危亡今以䇿言之彼有乗勝之勢我有虗弱之寔一也彼上下相習五兵犀利我將易兵新器仗未復二也彼以舩行吾以陸軍勞逸不同三也狄道隴西南安祁山各當有守彼專為一我分為四四也從南安隴西因食羌穀若趣祁山熟麥千頃為之縣餌五也賊有黠數其來必矣頃之維果向祁山聞艾有備乃回從董亭趣南安艾據武城山以相持維與艾爭險不克其夜渡渭東行縁山趣上邽艾與戰於叚谷大破之蜀諸葛亮為丞相率師與司馬宣王對於渭南亮自至數挑戰宣王亦表固請戰魏明帝使衛尉辛毗持節以制之姜維謂亮曰辛佐治仗節而到賊不復出矣亮曰彼本無戰情所以固請戰者以示武於其衆耳將在軍君命有所不受茍能制吾豈千里而請戰耶宣王使二千餘人就軍營東南角大聲稱萬嵗亮使問之答曰吳朝有使至請降亮謂曰計吳朝必無降法卿是六十老翁何煩詭誑如此㑹亮卒軍退張嶷為牙門將武都氐主苻徤請降遣將軍張尉往迎過期不到大將軍蔣琬深以為念嶷平之曰苻徤求附欵至必無他變素聞徤弟狡黠又夷狄不能同功將有乖離是以稽留耳數日間至徤弟果將四百户就魏獨徤來從吳陸遜為右護軍鎭西將軍黄武元年劉備率大衆來向西界權命遜為大都督督諸將拒之備從巫峽建平連圍至夷陵界立數十屯先遣吳班將數千人於平地立營欲以挑戰諸將皆欲擊之遜曰此必有譎且觀之諸將並欲迎擊備遜以為不可曰備舉軍東下鋭氣始盛且乗高守險難可卒攻攻之縱下猶難盡克若有不利損我大勢非小故也今但且奬厲將士廣施方畧以觀其變若此間是平原曠野當恐有顛沛交馳之憂今縁山行軍勢不能展當自罷于木石之間徐制其弊耳諸將不解以為遜畏之各懐憤恨備知其計不可乃引伏兵八千從谷中出遜曰所以不聽諸軍擊班者揣之必有巧故也後為輔國將軍領荆州牧備既入住白帝徐盛潘璋宋謙等各競表言備必可擒乞復攻之權以問遜遜與朱然駱統以為曹丕大合士衆外託助國以討備内寔有姦心謹决計趣還無幾魏軍果出三方受敵也晉周訪元帝時為振武將軍與諸軍共征杜弢訪與賊隔水賊衆數倍自知力不能敵乃密遣人如樵採者而出於是結陣鳴皷而來大呼曰左軍至士卒皆稱萬嵗至夜令軍中多布火而食賊謂官軍益至未曉而退訪謂諸將曰賊必引退然終知我無救軍當還掩人宜促渡水北既斷橋訖而賊果至隔水不得進陶侃為龍驤將軍武昌太守元帝令擊社弢時周顗為荆州刺史先鎭潯水城賊掠其良口侃使部將朱伺救之賊退保泠口侃謂諸將曰此賊必更步向武昌吾宜還城晝夜三日行可至卿等誰能忍饑闘邪部將吳寄曰要欲十日忍饑晝當擊賊夜分捕魚足以相濟侃曰卿徤將也賊果増兵來攻侃使朱伺等逆擊大破之朱伺為廣威將軍時王敦欲用從弟廙代陶侃為荆州侃故將鄭攀馬雋等乞侃於敦敦不許攀等以侃始㓕大賊人皆樂附又以廙忌戾難事謀共距之遂屯結溳口遣使告伺伺外許之而稱疾不起攀等遂進距廙既而士衆疑阻復散還横桑口欲入杜曾時朱軌趙誘李桓率衆將擊之攀等懼誅以司馬孫景造謀距廙因斬之降軌等廙將西出遣長史劉浚留鎭楊口壘時杜曽請討第五猗於襄陽伺謂廙曰曾是猾賊外示西還以疑衆心欲誘引官軍使西然後兼道襲楊口耳宜大部分未可便西廙性矜厲自用兼以伺老怯難信遂西行曾等果馳還廙乃遣伺歸裁至壘即為曾等所圍北燕張興為馮䟦將䟦從兄萬泥從兄子乳陳叛䟦遣興與馮𢎞討之尅期出戰興謂𢎞曰賊明日出戰今夜必來驚我營宜命三軍以備不虞𢎞乃宻嚴人課草十束畜火伏兵以待之是夜乳陳果遣壯士千餘人來砍營衆火俱起伏兵邀擊俘斬無遺乳陳等懼而出降𢎞皆斬之宋劉鍾為寧朔將軍領石頭戍事高祖遣朱齡石伐蜀以鍾為前鋒繇外水至於彭模去成都二百里偽冠軍征討督護譙亢等兩岸連營層樓重柵衆號三萬鍾于時脚疾不能行齡石乃詣鍾謀曰今天時盛熱而賊嚴兵固險攻之未必可㧞祇增疫困計其人情恇撓必不久安且欲養鋭息兵以伺其間隙而乗之乃可捷事然决機两陳公本有所委卿意謂何鍾曰不然前揚聲言大衆向内水譙道福不敢捨涪城今重軍卒至出其不意蜀人已破膽矣賊今阻兵守險是其懼不敢戰非能持久堅守也因其内懼盡鋭攻之其勢必克皷行而進成都必不能守矣今若緩兵相守彼將知人虗實涪軍忽來并力距我人情既安良將又集比求戰不獲軍食無資當為蜀子虜耳齡石從之明日進攻䧟其二城斬其大將侯輝譙沈林子封資中侯高祖伐羌復參西軍事與冠軍檀道濟同攻潼闗林子啓高祖曰姚紹氣葢闗右而力以勢屈外兵屢敗衰亡内兆但恐㓙命先盡不得以釁斤斧耳紹尋疽發背死高祖以林子言驗乃賜書曰姚紹忽死可謂天誅沈攸之為中領軍鎭淮隂薛安都據彭城引魏為援魏遣清泗間人詐告攸之云安都欲降求軍迎接攸之副吳為納其説咸謂宜遣千人參之既而來者轉多喜所執彌固攸之乃集來者告之語曰薛徐州早宜還朝今能爾深副本望但遣子弟一人來便遣大軍相援君諸人既有忠心若能與薛子弟俱來者皆即假君以本鄉縣唯意所欲如其不爾無為空勞往還自此一去不反南齊劉善明在宋為冠軍將軍行南徐州事時沈攸之反太祖深以為憂善明獻計曰沈攸之控引八州縱情畜歛收衆聚騎營造舟仗苞藏賊志於焉十年性既險躁才非持重而起逆累旬遲囘不進豈應有所待也一則闇於兵機二則人情離怨三則有掣肘之患四則天奪其魄本慮其剽勇長於一戰疑其輕速掩襲未備今六軍齊奮諸侯同舉昔謝晦失理不鬬自潰盧龍乖道雖衆何施且袁粲劉秉賊之根本根本既㓕枝業豈乆此是籠之鳥耳事平太祖召善明還都謂之曰卿䇿沈攸之雖復張良陳平適如此耳周山圖在宋為輔國將軍時沈攸之攻郢城世祖令山圖量其勢山圖曰攸之見與隣鄉亟同征伐悉其為人性度險刻無以結固士心始頓兵堅城之下適所以為離散之漸耳攸之既敗平西將軍黄回乗輕舸從白服百餘人在軍前下縁流呌盆城中恐須臾知是回凱歸乃安世祖謂山圖曰周公前言可謂明于見事者矣劉懐珍在宋為征虜將軍宋沈攸之起兵衆謂當㳂流直下懐珍謂僚佐曰攸之矜躁夙著虐加楚服必當阻兵中流聲刼㓜主不敢長驅决勝明矣遣子靈哲領馬步數千人衞京師桓崇祖為平西將軍崇祖慮魏復冦淮北啓徙下蔡戍於淮東既而魏果欲攻下蔡既聞内徙乃揚聲戍平隂故城衆疑魏當於故城立戍崇祖曰下蔡去鎭咫尺魏豈敢置戍實欲除此故城恐奔走之不盡耳魏軍果夷掘下蔡城崇祖自率衆渡淮與戰大敗之追奔數十里殺獲千計豫章王嶷為驃騎大將軍都督荆襄等八州諸軍事魏軍冦司豫二州嶷遣南蠻司馬崔惠景北討又分遣中兵叅軍蕭惠助援司州屯西闗魏軍濟淮攻夀春分騎當出樊鄧衆以為憂嶷曰虜入春夏非動衆時令豫司彊守遏其津要彼見堅嚴自當潰散必不敢越二鎮既而虜竟不出樊鄧於夀春敗奔而南也梁韋叡為輔國將軍時王師北伐詔叡督衆軍叡遣長史王超宗梁郡太守馮道根攻魏小峴城未能㧞叡廵行圍柵魏城中忽出數百人陳於門外叡欲擊之諸將皆曰向本輕來未有戰備徐還授甲乃可進耳叡曰不然魏城中三千餘人閉門堅守足以自保無故出人於外必其驍勇者也若能挫之其城自㧞衆猶遲疑叡指其節曰朝廷授此非以為飾韋叡之法不可犯也乃進兵士皆殊死戰魏軍果敗走因急攻之中宿而城㧞陳吳明徹為征北大將軍進逼夀陽北齊王琳拒守又遣大將軍皮景和率軍數十萬來援去夀春三十里頓軍不進諸將咸曰堅城未㧞大援在近不審公計將安出明徹曰兵貴在速而彼結營不進自挫其鋒吾知其不敢戰明矣於是躬擐甲胄疾攻一鼓而尅夀陽生擒王琳後魏古弼為安西將軍時宋遣將裴方明擊楊難當尅仇池立楊𤣥庻子保熾於是假弼節督隴右將軍事既平仇池未幾諸氐復推楊文徳為主圍仇池弼發上封高平岍城諸軍討之仇池圍解文徳走漢川時皮豹子督闗中諸軍次於下辨聞仇池圍解議欲還軍弼使謂豹子曰此連破賊軍恐彼君臣未體大分耻其負敗或求報復若其班師冦衆復至後舉為難不如繕兵練甲蓄力待之不出秋冬南冦必來以逸待勞百勝之䇿豹子乃止太武聞之曰弼之言長䇿也制南秦弼謀多矣任城王澄為撫軍大將軍時恒州刺史穆㤗在州謀反推朔州刺史平陽王頥為主詔澄行恒州事討之澄至鴈門太守夜告㤗已握衆西就陽平城下聚結惟見弓仗澄聞便速進時右丞孟斌曰事不可量須依勅召并肆兵然後徐動澄曰㤗既搆逆應堅城而逆陽平度其所為似當勢弱㤗既不相距無故發兵非宜也但速徃鎭之民心自定遂倍道兼行出其不意又遣治書李焕先赴至即擒㤗民情怡然范紹為寧逺將軍孝文嘗詔紹詣鍾離與都督中山王英論攻鍾離形勢英固言必尅紹觀其城隍防守恐不可䧟勸令班師英不從紹還具以狀聞俄而英敗邢巒為度支尚書宣武時豫州城民白早生殺刺史司馬悦以城南入梁梁遣冠軍將軍齊荀仁率衆入據懸瓠詔巒持節討之宣武臨東堂勞遣巒曰司馬悦不愼重門之戒智不足以謀身匪直䘮元𨽻豎乃大虧王畧懸瓠密邇近畿東南藩捍度公之在彼憂慮尤深早生理不獨立必逺引吳楚士民同惡勢或交兵卿文昭武烈朝之南仲故令卿星言電邁出其不意卿言早生走也守也何時可以平之巒對曰早生非有深謀大智能搆成此也但因司馬恱虐於百姓乗衆怒而為之民為㓙威所懾不得已而茍附假梁入應水路不通糧運不繼亦成擒耳不能為害也早生得梁軍之接溺於利欲之情必守而不走今者王師若臨士民必翻然歸順圍之窮城奔走路絶不度此年必𫝊首京師願陛下不足垂慮宣武大笑曰卿言何其壯哉深㑹朕遣卿之意源子雍孝明時為鎭東將軍與裴衍發鄴以討葛榮而信都城䧟除子雍冀州刺史餘官如故子雍以冀州不守上書曰賊衆甚饑專仰野掠今朝廷足食兵卒飽煖高壁深壘勿與爭鋒彼來求戰則不得野掠無所獲不盈數旬可坐制㓙醜時裴衍復表求行詔子雍與衍速進子雍重表固請詔如謂不可乞令裴衍獨行若不賜解求停裴衍茍逼同行取敗旦夕詔不聽遂與衍俱進至陽平郡東北漳曲榮率賊十萬逼官軍子雍戰敗被害楊津為撫軍將軍北道大都督始津受命出據靈丘而賊帥鮮于修理起於博陵定州危急廻師南赴始至城下營壘未立而州軍新敗津以賊既乗勝士衆勞疲栅壘未成不可擬敵賊必夜至則無一全欲移軍入城更圖後舉刺史元固稱賊既逼城不可示弱乃閉門不内津揮刀欲斬門者軍乃得入城賊果夜至見栅空而去董紹為右將軍雒州刺史時梁將軍曹義宗王𤣥眞等寇荆州據順陽馬圏裴衍王羆討之既復進圍馬圏城堅裴王糧少紹上書言其必敗未幾裴衍等果失利順陽復為義宗所據北齊陳元康為中將軍時王思政入潁城諸將攻之不能㧞元康進計於文襄曰公入輔朝政未有殊功雖敗侯景本非外賊今潁城將䧟願公乘而取之足以成大業文襄令元康馳驛觀之復命曰必可㧞文襄於是親征既至而尅賞元康金百鋌後周于謹為柱國大將軍南討於梁長孫儉問曰為蕭繹之計當何如謹曰耀兵漢沔席卷度江南據丹陽是其上䇿移郭内居人退保子城峻其陴堞以待援至是其中䇿若難於移動據守羅郭是其下䇿儉曰揣繹定出何䇿謹曰必用其下䇿儉曰彼棄上而用下何也對曰蕭氏保據江南綿歴數紀屬中原多故未遑外畧又以我有齊民之患必謂力不能分且繹懦而無謀多疑少斷愚民難與慮始皆戀邑居既惡移動當保羅郭所以用其下策及至梁果如所料郭賢為都督時齊神武襲䧟夏州太祖慮其南下與朝臣議之賢進曰高歡士雖衆智勇已竭䇿其舉措必不敢逺來昔賀㧞公初薨闗中震駭而歡不能因利乗便進取雍州是其無智及鑾駕西還六軍寡弱毛鴻賓䘮敗闗門不守又不能乗此危機以要一戰是其無勇今上下同心士民戮力歡志沮䘮寧敢送死且􅃎夏荒阻千里無煙縱令南侵資糧莫繼以此而言不來必矣齊神武後果退如賢所䇿于翼為渭州刺史時吐谷渾入寇河右涼鄯河三州咸被攻圍使人告急都督遣翼赴援不從寮屬咸以為言翼曰攻取之術非夷俗所長此寇之來不過抄掠邉牧耳安能頓兵城下乆事攻圍掠而無獲勢將自走勞師以徃亦無所及翼揣之已了幸勿復言居數日果去如翼所䇿韋孝寛為驃騎大將軍鎭玉壁時晉公護將東討孝寛遣長史辛道憲啓陳不可護不納既而大軍果不利後孔城遂䧟宜陽被圍孝寛乃謂其將帥曰宜城之地未能損益然兩國爭之勞師數載彼多君子寧乏謀猷若棄崤東來圍汾北我之疆界必見侵擾今宜於華谷及長秋速築城以杜賊志脱其先我圖之實難於是畫地形具陳其狀晉公䕶令長史叱羅恊謂使人曰韋公子孫雖多數不滿百汾北築城遣誰固守事遂不行齊人果解宜陽之圍經畧汾北遂築城守之又為行軍元帥狥地淮南孝寛所在皆密送誠欵然彼五門尤為險要陳人若開塘放水即津濟路絶孝寛遽令分兵據守之陳刺史吳文育果遣决堰已無所及於是陳人退走江北悉平陸通為文帝帳内督從解雒陽圍軍還屬趙青雀反於長安文帝將討之以人馬疲敝不可速行又謂青雀等一時陸梁不足為慮乃云我到長安但輕騎臨之必當靣縛通進曰青雀等既以大軍不捷謂朝廷傾危同惡相求遂成反亂然其逆謀乆定必無遷善之心且詐言大軍敗績東寇將至若以輕騎往百姓謂為信然更沮兆庶之望大兵雖疲敝精銳猶多以明公之威率思歸之衆以順討逆何慮不平文帝深納之因從平青雀隋楊素為左僕射漢王諒反遣茹天保來據蒲州燒斷河橋又遣王聃子率數萬人并力拒守素將輕騎五千襲之濳於渭口宵濟遲明擊之天保敗走聃子懼而以城降有詔徴還初素將行也計日破賊皆如所量李徹為左武衞將軍縂晉王軍事時突厥沙鉢畧可汗犯塞文帝令衞王爽為元帥率軍擊之以徹為長史行軍總管李充言於爽曰周齊之世有同戰國中夏力分其來乆矣突厥每侵邉諸將輙以全軍為計莫能死戰繇是突厥勝多敗少所以每輕中國之師今者沙鉢畧悉國内之衆屯據要險必輕我而無備精兵襲之可破也爽從之諸將多以為疑惟徹奬成其計請同行遂與充率精騎五千出其不意掩擊大破之沙鉢畧棄所服金甲濳草中而遁衞𤣥為檢校右禦衞大將軍時煬帝征遼東使𤣥與代王侑留守京師㑹楊𤣥感圍逼東都𤣥率歩騎七萬援之至華隂掘楊素冡焚其骸骨夷其塋域示士卒以必死既出潼闗議者恐崤函有伏兵請於陜縣汾流東下直趨河陽以攻其背𤣥曰以吾度之此計非豎子所及於是皷行而進既度函谷卒如所量唐柴紹義師初起授右領軍大都督府長史大軍發晉陽兼領馬軍總管將至霍邑紹先至城下察宋老生形勢白曰老生有匹夫之勇我師若到必來出戰戰則成擒矣及義師至老生果出紹力戰有功江夏王道宗武徳初起家左千牛裴寂討劉武周戰於度索原賊軍進逼河東道宗年十七從太宗出玉壺城望賊太宗顧謂道宗曰賊恃其衆來邀我戰汝謂如何對曰羣賊乗勝其鋒不可當易以計屈難與力競今深壁高壘以挫其鋒烏合之徒莫能持乆糧運致竭自當離散可不戰而擒也太宗曰汝意暗與我合後賊果食盡夜遁追及介州一戰㓕之王長諧為西河太守從太宗下長春宫與劉文靜先據永豐倉時隋將劉綱戍潼闗屈突通欲依綱以守險長諧揣知其計率衆先襲都尉南城㧞之斬劉綱以兵據守及通軍至不得入退保北城長諧與通頻戰皆尅及通之遁也與諸將追至稠桑而虜之因進下陜城取太原倉薛萬均為殿中少監貞觀初柴紹擊梁師都於朔方以萬均為副諸將見城險固皆有憚色萬均謂之曰城中無氣鼔聲不徹此是破亡之候平在旦夕諸軍勿以為憂俄而師都見殺城降李靖為行軍總管兼攝河間王孝恭行軍長史隨孝恭討蕭銑師至於清江尅銑荆門銑悉兵以拒之孝恭將戰靖止之曰楚人輕鋭難與爭鋒今新失荆門盡兵出戰此救敗之師也非其本圖勢不能乆一旦不戰勢必兩分留輕兵以抗我退嬴師以自守此即勢擕力弱擊之必捷孝恭不從遣靖按營自以鋭師水戰果敗於南岸張公謹為代州都督李靖經畧突厥以公謹為副公謹因言突厥可取之狀曰頡利縱慾肆情窮兇極暴誅害良善昵近小人此即主昏於上其可取一也又其别部同羅僕骨回紇延陁之類並自立君長將圖反噬此則衆叛於下其可取二也突厥被疑輕騎自免拓設出討匹馬不歸欲谷䘮師立足無地則兵挫將敗其可取三也塞北霜早糇糧乏絶天降之災因以饑饉其可取四也頡利疎其突厥委諸胡人胡人翻覆是其常性大軍一臨内必先變其可取五也蕐人入北其人寔多比聞自相嘯聚保據山險師出塞垣自然有應其可取六也太宗深納之蘇定方為伊麗道行軍總管討阿史那賀魯於西域㑹大雪平地二尺軍中咸請停兵候晴定方曰虜恃雪深謂我不能前進必當憇息追之可及緩以縱之則漸遠難追省日兼功在此舉也於是勒兵涉雪晝夜兼進所經收其人衆遂至䨇河與彌射歩眞相㑹兩軍合勢去賀魯所安二百里布陣長驅徑至金牙山賀魯牙所時賀魯集諸衆欲獵定方與彌射縱兵擊之盡破其牙帳生擒數萬人并獲其鼔纛器械賀魯遂與咥運及其女夫閻啜等脱走投石國唐休璟聖厯中為司衛卿兼涼州都督右肅政御史大夫持節隴右諸軍大使乆視元年秋吐蕃大將麴莽布支率騎數萬冦凉州入自洪源谷將圍昌松縣休璟以數千人徃擊之臨陣登高望見賊衣甲鮮盛謂麾下曰自欽陵死賛婆降麴莽布支所知賊兵欲曜威武故其國中貴臣酋豪子弟皆從之人馬雖精不習軍事吾為諸君取之乃被甲先登與賊六戰六尅大破之斬其副將二人首二千五百級築京觀而還休璟尤諳練邉事自碣石西踰四鎭綿亘萬里山川要害皆能記之長安中西突厥烏質勒與諸蕃不和舉兵相持安西道絶表奏相繼則天令休璟與宰相商議事勢俄頃間草奏便遣施行後十餘日安西諸州表請兵馬應接程期一如休璟所畫張鎬為中書侍郎同中書門下平章事兼河南節度使都統淮南等道諸軍事及王師收兩京鎬進軍鎮汴州招討河北逆賊賊黨史思明守范陽表請歸順鎬揣知其意恐朝廷與之手札密表奏曰思明兇豎因逆竊位兵强則衆附勢奪則人離包藏不測禽獸無異可以計取難以義招伏望不以威權假之又奏滑州防禦使許叔冀性慧多謀臨難必變望追入宿衞時肅宗意已定表入俱不省鎬為人簡淡不事中要㑹有宦官自范陽及滑州使還者皆言思明叔冀之誠慤肅宗以鎬不切事機遂罷相授荆州大都督府長史後思明叔冀皆如其言張孝忠初事李寳臣為易州刺史後寳臣疑忌宿將乃舉易州歸順寳臣死其子惟岳叛孝忠乃與朱滔謀攻惟岳遂與滔合師大破惟岳於束鹿惟岳隨歸晉州滔謀乘勝襲之孝忠乃引軍西北還營義豐朱滔大駭孝忠將佐曰尚書布赤心於朱滔相信至矣今逆冦已潰不終其功竊所未悟曰本求破賊賊已破矣然成徳宿將尚多廹之則困獸猶闘緩之必翻然改圖又朱滔言大識淺可與慮始難與守成吾壁於義豐坐俟惟岳殄㓕耳既而滔屯束鹿不敢進月餘王武俊斬惟岳以獻皆如孝忠之言郭子儀為闗内副元帥廣徳二年冬僕固懐恩及吐蕃等自潰京師解嚴初懐恩將入冦蕃漢數萬軍聲頗盛京師大駭子儀奏曰以臣所見懐恩無能為也上問其故對曰僕固懐恩雖稱驍勇素不得衆心今所以能為亂者引思歸之人耳懐恩本臣偏將其下皆臣之部曲恩信嘗及之今臣為大將必不忍以鋒刄相向以此知其無能為也及懐恩挑戰諸將請出兵挫之子儀止之曰夫引兵深入利在速戰不可爭鋒彼皆吾之鄉曲緩之自當擕貳吾豈得廹速其戰敢言者斬遂堅壁以待之果不戰而退後唐周徳威為大將天祐七年十一月汴人據深兾汴將王景仁軍萬人次北鄉鎮州節度使王鎔來告難帝遣徳威率前軍出井陘屯於趙州十一月帝親征二十五日進薄汴營距北鄉五里營於野河上汴將韓勍率精兵三萬鎧甲皆被繒綺金銀炫曜望之森然我軍懼形於色徳威謂李存璋曰賊結陣而來觀其形勢志不在戰以兵甲耀威耳我軍人乍見其來謂其鋒不可當此時不挫其鋭吾軍不振矣乃遣存璋諭諸軍曰爾見此賊否是汴州天武徤兒皆屠沽傭販虛有其表徒被精甲十不當一禽獲足以爲貨徳威自率精騎攻其两偏左馳右突出没數里是日獲賊百餘人賊渡河而退徳威謂莊宗曰賊驕氣充盛宜按兵以待其衰莊宗曰我提孤軍救難解紛三鎮烏合之衆利在速戰卿持重吾懼其不可使也徳威曰鎮定之士長於守城列陣野戰素非便習我師破賊唯恃騎軍平田廣野易為施巧今壓賊營令彼見我虚實則勝負未可必也莊宗不悦退卧帳中徳威患之謂監軍張承業曰王欲速戰將烏合之徒欲當劇賊所謂不量力也去賊咫尺阻此二渠水彼早夜以畧彴渡之吾族其為俘矣若退軍鄗邑引賊離營彼出則歸彼歸則出復以輕騎掠其芻餉不踰月敗賊必矣承業入言莊宗亦釋然徳威得降人問之曰景仁下令造浮梁數百果如徳威所料二十七日乃退軍保鄗邑晉符彦倫知相州契丹入寇行營都監張從恩引軍退保黎陽唯留五百人守安陽河橋彦倫與軍校謀曰此夜紛紜人無固志五百疲兵安能守橋即抽入相州之城為備至曙賊軍萬餘騎已陣於安陽河北彦倫令城下揚旌鼔譟賊不能測至辰時渡河而南悉陳甲騎於城下如攻城之狀彦倫曰此虜將走矣乃出甲士五百於城北張弓弩以待之虜果引去册府元龜卷四百二十八
