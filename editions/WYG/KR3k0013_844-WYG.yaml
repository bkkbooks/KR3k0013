body:
  text: 冊府元龜卷八百四十四宋王欽若等撰總録部守官勤幹守官傳曰守道不如守官又曰見死不更其守盖夫委質公朝從政王室靖恭爾位職思其憂故有專秉彞章恪居官次弓招靡應李法是從聞變難而不移彊臣以之屈意奉憲令而無撓明主繇是改觀得守器之規絶代庖之咎宜乎寵以異數謂之能臣者哉欒鍼晉中軍帥欒書子也晉侯及楚子鄭伯戰于鄢陵有淖於前淖泥也乃皆左右相違於淖違辟也步毅御晉厲公欒鍼為右步毅即郤毅欒范以其族夾公行二族强故在公左右陷于淖欒書将載晉侯鍼曰書退國有大任焉得專之在君前故子名其父大任謂元帥之職且侵官冒也載公為侵官失官慢也去將而御失官也離局姦也逺其部曲為離局有三罪焉不可犯也乃扶公以出於淖謝息魯孟僖子家臣孟孫從昭公如楚晉人來治杞田季孫将以成與之成孟氏邑本杞田謝息為孟孫守不可曰人有言曰雖有挈瓶之智守不假器禮也挈瓶汲者喻一知為人守器猶知不以借人夫子從君而守臣喪邑夫子謂孟僖子也雖吾子亦有猜焉言季孫亦将疑我不忠齊虞人史失姓名景公田于沛沛澤名招虞人以弓不進公使執之辭曰昔我先君之田也旌以招大夫弓以招士皮冠以招虞人臣不見皮冠故不敢進乃舍之仲尼曰守道不如守官君招當往道之常也非物不進官之制也君子韙之韙是也孔子嘗為委吏矣㑹計當而已矣為乗田矣牛羊茁壯長而已矣孔子嘗為貧而禄仕委吏主委積庾倉之吏也不失㑹計直當其多少而已乗田苑囿之吏也主六畜之芻牧也牛羊茁壯肥好食令長大而已茁長貌也詩云彼茁者葭位卑不得髙言預朝事故但稱職而已漢胡建字子孟孝武天漢中守軍正丞南北軍各有正又置丞而建未得真官兼守之貧無車馬嘗步與走卒起居所以慰薦走卒甚得其心慰者自上安下者也薦者舉藉也時監軍御史為姦穿北軍壘垣以為賈區坐賣曰賈為賈物之區也區者小室之名若今小巷屋之類耳故行士之屋謂之區廬宿衛宫外士稱為區士也建欲誅之乃約其走卒約束也曰我欲與公有所誅吾言取之則取斬之則斬於是當選士馬日監軍御史與䕶軍諸校列坐堂皇上校者諸軍之部校也室無四壁曰皇建從走卒趨至堂皇下拜謁因上堂走卒皆上建指監軍御史曰取彼走卒前曳下堂皇建曰斬之遂斬御史䕶軍諸校皆愕警不知所以建亦已有成奏在其懷中遂上奏曰臣聞軍法立武以威衆誅惡以禁邪今監軍御史公穿軍垣以求賈利公謂顯然為之私買賣以與士市不立剛毅之心勇猛之節亡以帥先士大夫尤失理不公用文吏議不至重法黄帝李法曰獄官名也天文志左角李右角將兵書之法也李者法官之號也總主征伐刑戮之事也故稱其書曰李法壁壘已定穿窬不繇路是謂姦人姦人者殺窬小竇也臣謹案軍法曰正亡屬將軍將軍有罪已聞言軍正不屬將軍將軍有罪過得表奏之二千石以下行法焉二千石謂軍中校尉都尉之屬丞於用法疑丞屬軍正斬御史於法有疑執事不諉上諉累也言執事者當見法即行不可以事累於上也臣謹以斬昩死以聞制曰司馬法曰國容不入軍軍容不入國何文吏也司馬法亦兵書之名也解在主父偃傳詔言在令軍中何用文吏議也三王或誓於軍中欲民先成其慮也或誓於軍門之外欲民先意以待事也慮謂計念也先意謂先為之意也或將交刃而誓致民志也欲致民勇志使不奔北建又何疑焉建繇是顯名符璽郎史失姓名昭帝時殿中嘗有怪一夜羣臣相驚霍光召尚符璽郎恐有變難故欲收取璽郎不肯授光光欲奪之郎按劒曰臣頭可得璽不可得也光甚義之明日詔増此郎秩二等衆庶莫不多光後漢祭遵從光武征河北為軍市令舎中兒犯法遵格殺之光武怒命收遵時主簿陳副諫曰明公嘗欲衆軍整齊今遵奉法不避是敎令所行也光武乃貰之以為刺姦將軍謂諸将曰當避祭遵吾舎中兒犯法尚殺之必不私諸卿也侯覇為淮平大尹政理有能名及王莽之敗覇保固守卒全一部郅惲字君章為上東城門候光武嘗獵車駕夜還惲拒闗不開帝令從者見面於門間惲曰火明燎逺不受詔帝乃迴從東中門入東面中門也何湯為開陽門候建武十八年夏旱公卿皆暴露請雨雒陽令著車盖出門湯將衛士鉤令車收案有詔免令官拜湯虎賁中郎將光武嘗歎曰﨣﨣武夫公侯干城何湯之謂帝又㣲行夜還湯閉門不納更從中東門入明旦召詣大官賜食諸門候皆奪俸第五倫為京兆尹閻興主簿時長安鑄錢多姦巧乃署倫為督鑄錢掾領長安市倫平銓衡正斗斛市無阿枉百姓悦服晉徐𦙍為羊祜軍司馬祜在荆州頗以畋獵廢政嘗欲夜出𦙍執㦸當營門曰將軍都督萬里安可輕脱將軍安危亦國家之安危也𦙍今日若死此門乃開耳祜改容謝之此後稀出矣後趙王假為永昌門候石勒嘗夜㣲行簡察營衛齎繒帛金銀以貽門者求出永昌門假欲收捕之從者至乃止旦召假以為振忠都尉爵闗内侯後秦王滿聰為城門校尉姚興從朝門游於文武苑及昬而還將自平朔門入前驅既至滿聰被甲持杖閉門拒之曰今已昬闇奸良不辨有死而已門不可開興乃迴從朝門而入旦而召滿聰進位二等宋謝莊為侍中領前軍將軍武帝出行夜還勑開門莊居守以棨信或虛報不奉㫖須墨詔乃開上後因酒讌從容曰卿欲效郅君章耶對曰臣聞蒐巡有度郊祀有節盤於遊畋著之前誡陛下今蒙犯塵露晨往宵歸容有不逞之徒妄生矯詐臣是以伏須神筆乃敢開門耳南齊荀伯玉為太祖冠軍參軍隨太祖還都除奉朝請令伯玉看宅知家事孝武罷廣興還立别宅遣人於大宅掘樹數株伯玉不與馳以聞太祖曰卿執之是也傅寂之年十七為州西曹兼直主簿刺史王彧行夜還前驅已至寂之不肯開門曰不奉墨㫖彧乃於車中為敎然後開彧歎曰不意郅君章近在閭下即轉為主簿北齊張耀為尚書右丞文宣曽因近出令耀居守嘗夜還耀不時開門勒兵嚴備帝駐蹕門外久之催迫甚急耀以夜深真偽難辨須火至面識門乃可開於是獨出見帝笑曰卿欲學郅君章也乃使耀前開門然後入深嗟賞之賜與錦采唐褚遂良為諫議大夫兼知起居事太宗嘗問曰卿知起居記録何事大抵人君得觀之否遂良對曰今之起居即左右史古左右史書人君言事且記善惡以為鑒誡庶幾人主不為非法不聞帝王躬自觀史太宗曰朕有不善卿必記之邪遂良曰守道不如守官臣職當載筆君舉必記太宗以為然王播為侍御史徳宗貞元末李實為京兆尹恩寵莫二播嘗遇之通途故事臺府相臨實宜下道避至是實不肯避呵道如故播嘗自臺移牒實怒遂奏播為三原令勤幹傳曰能業其官詩云不懈於位盖夫明幹勵職受任居方有綂理之才資精練之用雖復繁於簿領靡厭於官曹政經是勤吏事攸攝幹蠱之謂兹以足稱在公之心於焉是取斯所謂思不出位職思其憂智效一官守不假器敏以為政行之惟艱者也故以明濟著聞僶勉從事或終日以斂膝或申旦而不寢衆務具舉彊力斯在兹故為吏者克勵其所守者矣若乃徼當官之譽取辨職之稱雖日無近名盖亦不信矣𡨕為夏司空勤其官事死於水中殷人郊之孔子為魯季氏史料糧平嘗為司職吏而畜蕃息趙奢者趙之田部吏也收租税而平原君家不肯出趙奢以法治之殺平原君用事者九人漢蕭何沛人也以文無害為沛主吏掾害傷也無能傷害之也秦御史監郡者與從事辨之何與共事備辨明何素有方略何乃給泗水卒吏事第一課最上秦御史欲入言徴何何固請得毋行尹翁歸為平陽市吏是時大將軍霍光秉政諸霍在平陽奴客持刀兵入市鬬變吏不能禁變亂也及翁歸為市吏莫敢犯者張安世字子孺少以父任為郎用善書給事尚書於尚書中給事中給供也精力於職休沐未嘗出後漢劉虞東海恭王之後也遭世衰亂又與時主疏逺仕縣為戸曹吏以能治身奉職召為郡吏虞延陳留東昬人也光武東之雒過小黄髙帝母昭靈后園陵在焉時延為部督郵詔呼引見問園陵之事延進止從容占拜可觀其陵樹株蘖皆諳其數爼豆犧牲頗曉其禮帝善之盖延初厯郡列椽州從事所在職辦陳寵辟司徒鮑昱府掾屬專尚交遊以不肯親事為髙寵嘗非之獨勤以物務魏薛悌字孝威太祖定冀州以悌及東平王國為左右長史後至中領軍並悉忠貞練事為世吏表髙柔為刺姦令史柔既處法平允又夙夜匪懈至擁膝抱文書而寢太祖嘗夜㣲出觀察諸吏見柔哀之徐解裘覆柔身而去自是辟焉李勝為滎陽太守河南尹勝前後所為宰守未嘗不稱職陳本厯位郡守九卿所在操綱領舉大體能使羣下自盡有綂御之才不親小事不讀法律而得廷尉之稱優於司馬岐等精練文理蜀李福為江州督揚威將軍入為尚書僕射福為人精識果鋭敏於從政王離字伯元以幹才顯為督軍從事推法平當代王祗為犍為太守李嚴字方正南陽人也少為郡職吏以才幹稱荆州牧劉表使厯諸郡縣吳吕岱守吳丞時大帝領㑹稽太守親斷諸縣倉庫及囚繫長丞皆見岱處法應問甚稱帝意召署録事滕𦙍當諸葛恪征淮南以𦙍為都督掌綂留事𦙍白日接賔客夜省文書或至曉不寐晉謝晦為豫州治中從事義熈八年土斷僑流郡縣使晦分判揚豫民户以平允見稱陶侃為荆州刺史侃性聰敏勤於吏職恭而進禮愛好人倫終日斂膝危坐閫外多事千緒萬端罔有遺漏陳頵字延思仕為郡督郵簡獲隠慝者三千人為一州尤最太守劉亨拔為主簿宋沈叔任少有幹質初為揚州主簿髙祖太尉參軍吳山隂令治皆有聲南齊吕安國廣陵人也宋大明末安國以將領見任隠重有幹局為劉勔所稱梁宋史仕宋為郢州治中有稱名職劉坦齊建元初為南郡王國常侍尋補孱陵令遷南中郎録事參軍所居以幹濟稱徐勉為侍中時王師北伐候驛填委勉參掌軍書劬勞夙夜動經數旬乃一還宅每還羣犬驚吠勉歎曰吾憂國忘家至於是若吾亡後亦是傳中一事後梁沈君公吳興人有幹局美風儀文章典正特為明帝所重厯中書黄門侍郎御史中丞傅俊少博學有才幹厯山隂吳建康令並有能名陳華皎為吳興都尉録軍府文帝為太守榖帛多以委之皎聰慧勤於簿領殷不佞少立名節好讀書尤長吏術仕梁起家為尚書兵郎甚有能幹後魏崔休為司徒右長史聰明强濟善斷决政府多事辭訟盈几剖判若流殊無凝滯加之公平清潔甚得時譽鄭懿渉厯經史善當世事閑雅有治才為孝文所器遇拜長史兼給事黄門侍郎司徒左長史曹世表字景昇京兆王征以為從事中郎攝中外兵事自當煩劇論者皆稱其能崔𤣥伯少有才雋號為冀州神童苻融牧冀州為冀州從事管征東記室出總庶事入為賔友衆務修理處斷無滯苻堅聞而竒之髙謐字安平有文武才度以功臣子召入禁中除中散專典祕閣肅勤不倦太武深重之李冲位至尚書僕射機敏有巧思北京明堂圜丘太廟及雒都初基安處郊祧新起園寢皆資於冲勤志彊力孜孜無怠且理文簿兼營匠制几案盈積剞劂在手初不勞厭也穆弼為中書舎人轉司州治中别駕厯任有稱又為北鎮都將軍徴拜殿中尚書出鎮涼州所在著稱封興之為瀛冀二州北平府長史所厯有當官之譽陸恭之字季順有操尚累遷鎮南將軍所厯並有聲績平嘗為著作郎遷祕書丞時髙允為監河間邢祐北平陽嘏河東裴宗廣平程駿金城趙元順等為著作佐郎雖才學互有短長然俱為稱職並號長者允每稱博通經籍無過嘗也李奨為散騎常侍鎮東將軍河南尹奨前後所厯皆以明濟著稱劉懌厯徐州别駕兖州左軍府長史司空諮議參軍屢為行臺出使所厯皆有當官之稱崔敬邕性長者有幹用自司徒主簿轉尚書都官郎中所在稱職房景為歩兵校尉領尚書郎齊州中正所厯皆有當官之稱叔孫隣少聰慧知名稍遷北部尚書有當官之稱郭祚轉中書侍郎遷尚書左丞長兼給事黄門侍郎清勤在公夙夜匪懈孝文甚知賞之穆觀為左衛將軍管門下中書出納詔命及訪舊事未嘗有所遺漏孝文竒之許惇字季良清識敏速達於從政位司徒主簿以明斷見知時人號為入鐵主簿北齊司馬子如為吏部郎中舉清勤平約遷司徒左長史兼廷尉卿以平直稱及領御史中丞正色舉察為朝廷所許李璵字道璠隴西成紀人涼武昭王暠之五世孫父韶並有重名於魏代璵有識量釋褐太尉行參軍累遷司徒右長史及遷都於鄴留璵於後監掌府藏及撤運宫廟材木以明幹見稱累遷驃騎大將軍東徐州刺史白建字彦舉太原陽邑人也初入為大丞相府騎兵曹典執文帳明解書計為同局所推封詢闚渉經史清素自持厯官皆有幹局才具治郡甚著聲績民吏敬而愛之叱列長文為涇州長史雖無他伎能在官以清幹著稱張耀累遷秘書監耀厯事累世奉職恪勤咸見親待未嘗有過後周冦雋仕後魏為司空府功曹參軍轉主簿時靈太后臨朝減食禄官十分之一造永寧佛寺令雋典之資費巨萬主吏不能欺隠寺成又極壯麗太后嘉之除左軍將軍裴俠為工部中大夫俠嘗遇疾沈頓士友憂之忽聞五鼓便即驚起顧左右可向府耶所苦因此而瘳晉公䕶聞之曰裴俠危篤若此而不廢憂公因聞鼓聲疾病遂愈此豈非天祐其勤恪者也裴祥俠之子也性忠謹有理劇才少為成都令清不及俠斷决過之薛善為汾隂令善幹用彊明一郡稱最太守王羆美之令善兼督六縣事尋為行臺郎中時欲廣置屯田以供軍費乃除司農少卿領同州夏陽縣二十屯監又於長陽諸屯置鐵冶復令善為監每月役八千人營造軍器善自督課兼加慰撫甲兵精利而皆忘其苦焉髙賔累遷計部中大夫賔敏於從政果敢能斷决案牘雖繁綽有餘裕李彦累遷開府儀同三司素多疾而勤於蒞職雖沈頓枕蓆猶理務不輟遂至於卒申徽初為西魏右僕射賜姓宇文氏徽性勤至凡所居官案牘無大小皆親自省覽以是事無稽滯吏不得為姦後雖厯公卿此志不懈楊敷為司本中大夫軍器副監敷明習吏事所在以勤察著名毎嵗奏課居最累獲優賞裴果魏孝閔時厯眉復二州刺史果性嚴猛能斷决抑挫豪右理屈滯牧數州號為稱職馮遷少修謹有幹能辟從事魏神龜中刺史楊均引為中兵參軍事轉定襄令尋為并州水曹參軍所厯之職咸以勤恪著稱柳帶韋為開府儀同三司凡居劇職十有餘年處斷無滯官曹清肅梁昕温裕有幹能厯官内外咸著聲稱隋杜臺卿兄㽔學業不如臺卿而幹局過之仕至開州刺史趙綽河東人也性質直剛毅在周為天官府史以恭謹恪勤擢授夏官府下士稍以明幹見知李圓通京兆涇陽人也髙祖為隋國公擢授參軍事髙祖初少時毎讌賔客嘗令圓通監厨性嚴整左右婢僕咸所敬憚惟世子乳母恃寵輕之賔客未供每有干請圓通不許或輒持去圓通大怒叱厨人撾之數十呌呼之聲徹於閣内僚吏左右相顧失色賔去之後髙祖具知之召圓通命坐賜食從此獨善之以為堪當大任髙祖作相賜封懐昌男張䖍雄少有才器秦孝王俊為秦州總管選為法曹參軍王嘗親按囚徒䖍雄不持狀口對百餘人皆盡事情同輩莫不歎服元文都性鯁直明辨有器幹仕周為右侍上士劉炫河間人也少以聰敏見稱刺史李繪署禮曹從事以吏幹知名賀婁子幹字萬壽少驍武知名釋褐司水上士稱為彊濟楊汪為尚書司勲兵部二曹侍郎秦州總管長史名為明幹周羅㬋為􅃎州刺史俄轉涇州刺史母憂去職未期復起授􅃎州刺史並有能名劉子翼為大理正甚有當時之譽薛孺為清陽令襄城掾所經並有惠政唐戴胄魏郡人也性正直有幹局明習律令尤曉文簿隋末為門下録事納言蘇威黄門侍郎裴矩甚禮之劉洎字思逺南郡江陵人也少好讀書性勁躁有幹略張光輔本燉煌人也少明辨有幹局厯遷司農少卿文昌右丞及為宰相皆有能名蕭至忠景雲中受晉州刺史明於吏道甚有能名崔日用初為芮城尉則天幸長安儲供繇陜州刺史宗楚客專以頓事委日用條白物役當煩而省楚客深加賞歎繇是擢用新豐尉遷監察御史顔杲卿以䕃授官性剛直有吏幹開元中為魏州録事參軍振舉綱目政稱第一李彭年有吏才工於剖析有當官之稱裴耀卿為濟州刺史𤣥宗車駕東廵州當大路道里綿逺而戸口寡弱耀卿躬自條理科配得所時大駕所厯凡十餘州耀卿稱為知頓之最􅃽沇為監察御史與兄演溶弟清俱以幹局吏事擅能名於時長史韓朝宗裴逈咸以推覆簡勾之任委之處事平允剖斷精當動為羣僚楷式吕謹為哥舒翰支度判官性謹宻勤於職務在使幕縱無事塊然獨坐不離案牘翰益親之李麟為河東太守本道採訪處置使及安禄山反以武臣吕崇貴代之麟還京所厯皆有美稱以謹靖雅正自處韋倫為内作使判官時宫内土木之功無虚日内作人吏因縁為姦倫又躬親閱視省費減倍改大理評事李若􅃎性剛正有吏才厯安定扶風録事參軍皆為稱職累遷長安令班宏為尚書侍郎性勤恪毎晨入官署至夕方歸下吏不堪其勞故莅職頗以清白勤幹稱韋元甫少修謹敏於學行初任滑州白馬尉以吏術知名本道採訪使韋陟深器之奏充支使與同幕判官員錫齊名元甫精於簡牘錫詳於訊覆陟推誠任之時人謡曰員推韋狀劉贊少以資䕃補吏累授鄠縣丞宰相杜鴻漸判官楊炎美之鄭𤣥累遷刑部尚書性嚴毅有威斷更踐劇任時稱其能盧士玫山東右族以文儒進性端厚與物無競雅有令聞始為吏部員外郎甚稱職轉郎中後唐張敬詢少事武皇性勤幹時太祖收市甲馬屢濟國難尤留意於兵仗敬詢自軍吏至牙校專掌甲坊十五年尤稱職孟鵠本魏州案吏也莊宗初定魏博選幹吏以計兵職鵠為度支孔目官掌邢洺錢榖司明宗時為邢洺節度使軍賦三分之一屬覇府鵠於調算之間不至苛急毎事曲意承迎帝心甚徳之而度支使孔謙專典軍賦其於藩鎮徴督苛急帝嘗切齒及帝即位鵠時為租庸院勾押擢為客省副使樞宻院承㫖當年為三司副使晉周瓌北京晉陽人也少端直善計書自髙祖厯數鎮用為腹心累職至牙門都校凡庸調出納咸以委瓌經十餘年未嘗以㣲累見忤帝甚重之周邊蔚初仕後唐為華州記室莊宗之伐蜀大軍出於華下時華方闕帥詔令蔚權領軍府事供億軍須甚有幹濟之稱冊府元龜卷八百四十四
