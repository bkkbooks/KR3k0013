body:
  text: 册府元龜卷六百二十二宋王欽若等撰卿監部徳望忠節清儉徳望傅曰君之卿佐是謂股肱九寺之列三監之屬素難其選實重乃僚處其位者乆而識之或洞知禮樂或富於文學或才智淵敏或徳行貞純故望著於當時名聞於後世求諸歴代各有其人者矣漢叔孫通為博士徵魯諸生三十人與其弟子百餘人為綿蕞野外共起朝儀髙帝拜通為奉常賜金五百斤通因進曰諸弟子儒生隨臣久矣與共為儀願陛下官之帝悉以為郎通出皆以五百金賜諸生諸生廼喜曰叔孫生聖人知當世務汲黯為主爵都尉列於九卿治務在無為而已引大體不拘文法後淮南王謀反憚黯曰黯好直諫守節死義至說公孫𢎞等如發蒙耳鄭當時字荘為大司農未嘗名吏與官屬言世恐傷之山東諸公以此翕然稱鄭荘蘇武為典屬國皇后父平恩侯帝舅平昌侯樂昌侯平恩侯許伯平昌侯王無故樂昌侯王武也車騎將軍韓增丞相魏相御史大夫丙吉皆敬重武後漢張湛為光祿勲光武臨朝或有惰容湛輒陳諫嘗乘白馬帝後見湛輒曰白馬生且復諫矣孫湛字子雅為光祿勲以清廉稱與周澤相類澤字雅都京師號之為二雅甄宇為博士每臘詔賜博士羊人一羊有大小肥瘦時議欲殺羊分肉又欲投鈎宇因取瘦者自是不復爭後召㑹詔問瘦羊博士所在京師因以為號来歴為將作大匠朝廷或稱社稷臣劉愷為太常論議嘗引正大義諸儒為之語曰難經伉劉太常竇固為大鴻臚又為衛尉乆歴大位甚見尊貴賞賜租祿資累五萬億而性謙儉愛人好施士以此稱之又云竇固為衛尉兩宫宿衛見重當時仁譲謙恭甚有名稱孫端字君榮世為學門端少傳家業博達無所不通仕至大司農為國三老每三公缺端嘗在選中太尉周忠皇甫嵩司徒淳于嘉趙溫司空楊彪張喜等為公皆辭拜讓端髙詡為大司農在朝以清白方正稱羊融為大司農性明達稱為名卿徐璆獻帝末為太常璆少履清髙立朝正色稱揚後進惟恐不及魏薛夏字宣聲天水人黄初中為秘書丞征東將軍曹休来朝文帝顧夏目之於休曰此君秘書丞天水薛宣聲也宜共談桓範為大司農以清省稱張泰鉅鹿人為大鴻臚以清賢稱張閣為永寧太僕以簡質稱王祥為太常時髙貴鄉公幸太學命祥為三老祥南面几杖以師道自居天子北面乞言祥陳明王聖帝君臣政化之要以訓之聞者莫不砥礪韓宣為大鴻臚始南陽韓曁以宿徳在宣前為鴻臚及宣繼之亦稱職故鴻臚中為之語曰大鴻臚小鴻臚前治行曷相如蜀杜瓊字伯瑜為太常為人静黙少言闔門自守不與世事蔣琬費褘等皆器重之文立為衛尉中朝服其賢雅為時名卿晉韋諛為朝尉識者擬之子張孫綽字興公預大著作于時才筆之士綽為其冠梁江蒨曾祖湛仕宋為光祿父斆仕宋為太常卿並有重名於前世何敬容祖修之仕齊為太常卿有名前代北齊宋世軌為廷尉少卿時大理正蘇珍之亦以平幹知名寺中為語曰決定嫌疑蘇珍之視表見裏宋世軌謂之寺中二絶隋牛𢎞為太常卿時議置明堂詔𢎞條上故事文帝甚敬重之時楊素恃才矜功輕侮朝臣惟見𢎞未嘗不改容自肅唐虞世南為秘書監太宗嘗稱世南有五絶一曰徳行二曰忠直三曰博學四曰文詞五曰書翰王紹宗為秘書少監仍時宣子于讀書紹宗性澹雅以儒素見稱當時朝廷之士咸敬慕之王正雅為太常卿宋申錫獄自内起宰相重臣無敢言者正雅與京兆尹崔琯上疏請付外考驗其事由是獄情稍緩申錫止於貶官内外翕然推重之晉李郁字文緯唐之宗屬也少歴宗寺官天成長興中累遷為宗正卿性平允所歴無愛憎毁譽忠節昔舜作九官周分六職樹棘為位列於明廷象河命秩尊於庶品葢卿監之重也所從来舊矣漢氏之後分局彌盛授方備業既謹於攸司選賢崇徳豈間其歴授乃有内資純亮動彰慷慨遇疾風明勁草之節當横流表介石之操悉心而匪懈竭力而盡瘁履危機而益勵臨大難而不奪惟公家之是利務罄乃誠惟王室之是圖罔私於己以至遷革之㑹去就之際而能精懇感發孤風横䳱紀之方策良足稱矣漢田延年為大司農㑹昌邑王嗣立滛亂大將軍霍光憂懼與公卿議廢之莫敢發言延年按劍廷叱羣臣止於朝廷之中而叱之也若言廷爭矣即日議決劉向初名更生前將軍蕭望之諸吏光祿大夫周湛以為更生宗室忠直擢為散騎宗正給事中與侍中金敞拾遺左右四人同心輔政後漢銚期光武建武五年為衛尉在朝廷憂國愛主其有不得於心必犯顔諫諍期疾病其母問期當封何子期言受國家恩深嘗慙負如死不知當何以報何宜封子也帝甚憐之趙喜為衛尉盡心事上夙夜匪懈劉般遷宗正在朝廷竭忠盡節勤勤憂國夙夜不忘来歴安帝延光二年為太僕時皇太子驚病不安避幸安帝乳母野王君王聖舍太子乳母王男厨監都吉等以聖舍為新繕條犯土禁不可乆御聖及其次女與大長秋江京及中常侍樊豐王男都吉等互相是非聖永逺誣譖男吉皆幽囚死家屬徙北景太子思男等數為歎息京屬懼有後害妄造虚無搆䜛太子及東宫官屬帝怒詔公卿以下㑹議廢立耿寳等承旨皆以為太子當廢厯與太常桓焉廷尉張皓等議曰經説年末滿十五過惡不在其身且男吉之謀皇太子容有不知宜選忠良保傳輔以禮義廢置事重此誠聖恩所宜宿留帝不從是日遂廢太子為濟隂王趙典桓帝時為太常以諫諍違㫖免官就國㑹帝喪時禁藩國諸侯不得奔弔典慨然曰身從衣褐之中致位上列且烏鳥反哺報徳況於上耶遂解印綬符策付縣而馳到京師州郡及大鴻臚并執處其罪而公卿百寮嘉典之義表請以租自贖詔書許之楊賜為光祿嘉徳殿前有青赤氣詔特進遣中使問賜祥異禍福吉凶在所賜書對曰案春秋䜟曰天投蜆海内亂今佞嬖閹尹共專國朝之所致也种拂為太常李傕郭汜之亂長安城潰百官多避兵去拂揮劍而出曰為國大臣不能止戈除暴致使凶賊兵刃向宫去欲何之遂戰而死耿紀秉曾孫也少有美名辟公府曹操甚敬異之稍遷少府紀以操将簒漢建安二十二年與太醫令吉丕丕或作平丞相司直韋況晃華謀起兵誅操不克夷三族于時衣冠盛門坐紀罹禍滅者衆矣魏辛毗為衛尉與胡質徐邈皆憂國忘私不營産業王修字叔治為奉常其後嚴才反與其徒屬數十人攻掖門脩聞變召事馬未至便將官屬歩至宫門太祖在銅爵臺望見之曰彼來者必王叔治也相國鍾繇謂脩舊京城有變九卿各居其府脩曰食其祿焉避其難居府雖舊非赴難之義楊阜為少府每朝廷㑹議阜嘗侃然以天下為己任人數諫争不聽乃屢乞遜位未許㑹卒晉王祥仕魏為太常朝臣為髙貴鄉公舉哀祥號哭曰老臣無状涕淚交流衆有愧色應詹遷光祿勲以王敦專制自樹故優游風詠無所摽明及敦作逆明帝問詹計將安出詹厲然慷慨曰陛下宜奮赫斯之威臣等當得負戈前驅庶憑宗廟之靈有征無戰如其不然王室必危帝以詹為都督前鋒軍事虞潭為宗正卿以疾告歸㑹王含沈充等攻逼京都潭遂於本縣招合宗人及郡中大姓共起義軍衆以萬數自假明威將軍乃進赴國難至上虞明帝手詔潭為冠軍將軍領㑹稽内史潭即受命義衆雲集時有野鷹飛集屋梁衆咸懼潭曰起仗義而剛鷙之鳥来集破賊必矣遣長史孔坦領前鋒過浙江追躡充潭次於西陵為坦後繼㑹充已擒罷兵徵拜尚書孔愉為太常時蘇峻反愉朝服守宗廟張禕吳郡人少有操行恭帝為瑯邪王以禕為郎中及帝踐祚劉裕以禕帝之故吏素所親信封藥酒一甖付禕宻令鴆帝禕旣受命而歎曰鴆君而求生何面目視息世間哉不如死也因自飲之而死徐廣為秘書監初桓𤣥之亂恭帝出宫廣陪列悲動左右及劉裕受禪帝遜位獨哀感涕泗交流謝晦見之謂曰徐公將無小過也廣收涙而言曰君為宋朝佐命吾乃晉室遺老憂喜之事固不同時乃更歔欷因辭衰耄乞歸桑梓南齊虞悰兼大匠卿坐事免官隆昌元年以白衣領職欝林廢悰竊歎曰王徐遂縛袴廢天子天下豈有此理耶延興元年復領右軍明帝立悰稱疾不陪帝使尚書令王晏賫廢立事示悰以悰舊人引叅佐命悰謂晏曰主上聖明公卿戮力寧假朽老以裨贊惟新乎不敢聞命朝議欲糾之僕射徐孝嗣曰此亦古之遺直衆議乃止悰稱疾篤還東上表曰臣旅陋海區身微稽嶺屬此興運荷竊稠私徒越涯紀終慙報荅衛養乖方抱疾嬰固寝瘵以来儵踰旬朔頻加醫治曾未瘳損惟此朽頓理難報復乞解所職盡療餘辰詔賜假百日轉給事中光祿大夫梁鄭紹叔為衛尉卿忠於事上外所聞知纎毫無隠毎為髙宗言事善則曰臣愚不及此皆聖主之策其不善則曰臣慮出淺短以為其事當如是殆以此誤朝廷臣之罪深矣髙祖甚親信之後魏崔浩為著作郎道武季年威嚴頗峻宫省左右多以微過得罪莫不逃隠避目下之變浩獨恭勤不怠或終日不歸道武知之輒命賜以御粥其砥直任時不為窮通改節皆此類也裴延雋拜太常卿時汾州山胡恃險㓂竊正平平陽二郡尤被其害以雋兼尚書為山西道行臺節度討胡將軍尋遇疾勅還三鵶羣蠻冦掠不巳車駕欲親征之延雋乃於病中上疏諫諍綦雋為太僕卿爾朱世隆等誅齊獻武王赴雒止於邙山谷上召文武百司下及庶士令之曰爾朱暴虐矯弄天常孤起義信都罪人斯翦今將翼戴親賢以昌魏歴誰主社稷允惬天人申令頻煩莫有應者雋乃避席曰人主之道必須度量深逺明喆仁恕廣陵王遇世艱難不言淹載以人謀察之雖為爾朱扶戴當今之聖主也獻武王忻然是之時黄門崔陵作色而前謂雋曰廣陵王為主不能昭宣魏綱布徳天下為君如此何聖之有若言其聖應待大王時髙乾邕魏蘭根等固執陵言及出帝失徳獻武王深思雋言嘗以為恨唐蘇世長初仕隋為都水少監使於上江都督運遇宇文化及之亂世長為煬帝發喪慟哭哀感路人姚元之為司僕卿則天傳位於中宗王公以下皆欣躍稱慶惟元之嗚咽流涕既而侍中桓彦範中書令張柬之謂曰今日豈是啼泣時恐公禍從此始元之曰事則天年乆乍此辭違情發於衷忍所不得昨公誅凶逆者是臣子之常道豈敢言功今辭違舊主悲泣者亦臣子之終節緣此獲罪實所甘心未幾出元之為亳州刺史王同皎為光祿卿時武三思專權任勢謀為逆亂同皎乃招集壮士謀以則天靈駕發引日誅之為冉祖雍所告遂遇害嚴郢為太常寺協律郎知東都太廟時安祿山陷東京郢潛奉九廟神主於私第肅宗至徳二年東都收復有司備法駕迎神主歸於太廟以功遷大理司直段秀實建中四年為司農卿時徳宗幸奉天朱泚盜據宫闕源休教泚偽迎鑾駕隂濟逆志泚乃遣其將韓旻領馬步三千人疾趨奉天時蒼黄之中未有武備泚以秀實嘗為涇原節度備得士心後罷兵權以為蓄憤且乆必肯同惡乃召與謀議秀實初詐從之隂說大將劉海濱何明禮姚令言判官岐靈岳同謀殺泚以兵迎乘輿三人者皆秀實夙所奨遇遂皆許諾及韓旻之徃秀實以為宗社之危期於頃刻乃使人走諭靈岳教其竊令言印不遂乃以司農印倒印符以遣兵還旻至絡驛得牒軍人亦莫辨其印惶遽而􅂞秀實海濱等曰旻之来吾黨無遺類矣我當直摶殺泚不得則死終不能向此賊稱臣乃與海濱約事急為斷而令明禮應於外明日泚召秀實議事源休姚令言李忠臣李子平皆在坐秀實戎服與休並膝語至僭位秀實勃然而起執休腕奪其象笏奮躍而前唾泚面大罵曰狂賊吾恨不斬汝萬段我豈逐汝反耶遂擊之泚舉臂自捍纔中其額流血匐匍而走兇徒愕然初不敢動而海濱等不至秀實乃曰我不同汝反何不殺我兇黨群至遂遇害焉海濱明禮靈岳相次被殺蔣沅建中初為大理卿時徳宗幸奉天沅奔赴行在為賊候騎所拘執欲以偽職誘之因絶食稱病潛竄閭里間京師平首蒙旌擢散騎常侍崔縱為大理少卿汴西水陸運使及徳宗蒙塵四方握兵未有至者縱先知之潛告李懐光說令奔命懐光從之縦乃悉斂軍財與懐光俱徃調給甚備懐光軍士乆戰河外及次河中庸遷延安之縦貨幣先渡河謂衆曰若濟悉以分賜衆利之乃西至奉天加右庶子充使清儉古者設九卿以參王公蓋選賢任能以章善明理者也乃有持堅白之操守儉約之徳志惟體國事罔私己祿賜咸散於戚屬饋遺靡通於中外産業不治車服靡易泊然自居華皓一致故得年祀寖逺猶錄其遺孤含贈已加更蒙於褒顯斯則惟月之任無所愧焉漢周仁為郎中令景帝所賜甚多然終嘗譲不敢受也諸侯羣臣賂遺終無所受鄭當時為大司農性亷又不治産仰奉賜給諸公然其餽遺人不過具器食朱邑自北海太守入為大司農身列卿位居處儉節祿賜以共九族鄉黨家亡餘財後漢趙典入為列卿寢惟布被食用瓦器周澤字雅都為光祿勲清廉果於從政為太常清潔脩行孫湛字子雅為光祿勲以清廉稱與周澤相類京師號為二雅袁彭為光祿勲行至清為吏麤袍糲食終於議郎尚書胡廣等追表其有清潔之美比前朝貢禹第五倫貢禹元帝御史大夫經明行脩清潔憂國也求蒙顯贈當時皆嗟歎之傅賢為廷尉素號廉正自掌法官公卿宴㑹要請不徃自謂貧無以報答其施魏鄭渾為將作大匠清素在公妻子不免飢寒及卒以子崇為郎中髙詡字季回以儒學徵拜大司農在朝以清白方正稱國淵為太僕居列卿位布衣疏食祿賜散之舊故宗族以恭儉自守司馬芝為大司農卒於官家無餘財辛毗為衛尉清平與徐邈胡質皆憂國忘私不營産業楊阜為少府卒家無餘財和洽為太常卿清貧守約至賣田宅以自給明帝聞之加賜穀帛晉鄭黙為廷尉時鬲令袁毅坐交通貨賂大興刑獄在朝多見引逮惟黙兄弟以潔愼不染其流吳隠之守廷尉秘書監遷右衛將軍雖居清顯祿賜皆班親族冬月無被嘗澣衣乃披絮勤苦同於貧庶王嶠為秘書監領本州大中正出為廬陵太守成帝以嶠家貧無以上道賜布百疋錢十萬宋甄裔位少府卿以清聞顔延之為光祿勲居身儉約不營財利布衣蔬食獨酌郊野當其為適傍若無人虞玩之為少府齊太祖鎮東府朝野致敬玩之獨躡履造席太祖取履視之曰卿此履已幾載玩之曰著此履已三十年貧士竟不辦易太祖善之南齊虞愿初在宋為北平太守以母老解職褚淵嘗詣愿不在見其眠床上積塵埃有書數卷耳淵歎曰虞君之清一至於此令人掃地拂牀而去梁裴子野為鴻臚卿尋領步兵校尉子野在禁省十餘年静黙自守未嘗有所請謁外家及中表貧乏所得俸悉分給之無宅借官地二畆起茅屋數間妻子常苦飢寒唯以教誨為本子姓衹畏若奉嚴君顧協少清介有志操初為廷尉正冬服單薄寺卿蔡發度謂人曰我願解身上襦與顧郎顧郎難衣食者竟不敢以遺之後魏竇瑗為大宗正卿官雖通顯貧窘如初清尚之操為時所重韓子熈為國子祭酒儉素安貧常好退静北齊張耀為秘書監每得祿賜散之宗族性節儉率素車服飲食取給而已袁聿脩為太常少卿巡省河南諸州兖州刺史邢劭與聿脩故舊嘗於省中呼聿脩為清郎至是遣送白紬為信聿脩不受劭亦忻然與書曰弟昔為清郎今至清卿矣後周栁虬為秘書監加車騎大將軍儀同三司虬脱略人間不拘小節敝衣蔬食未嘗改操人或譏之虬曰衣不過適體食不過充饑孜孜營求徒勞思慮耳唐李襲譽為大府卿居家以儉約自處凡獲祿俸必散之宗親其餘資但寫書而已冊府元龜卷六百二十二
