body:
  text: 册府元龜卷七百七十七宋王欽若等撰總録部名望第二南齊張率為太子舍人武帝請曰卿東南物望朕宿昔所聞祕書丞天下清官今以相處為卿定名譽尋以為祕書丞王繢字叔素侍武帝為撫軍吏部尚書張岱選繢為長史呈選牒帝笑曰此可謂素望何佟之廬江灊人明帝建武中為鎮北記室叅軍侍皇太子講時步兵校尉劉瓛徴士吴苞皆已卒京邑碩儒惟佟之而已何戢為吏部尚書美容儀動止與禇淵相慕時人呼為小禇公陸慧曉為司徒右長史時陳郡謝朏為左長史府公竟陵王子良謂王融曰我府二上佐求之前世誰可為比融曰兩賢同時便是未有前例陸子真吴郡人王僧達貴公子以才傲物為吴郡太守入閶門曰彼有人焉顧琛一公兩掾英英門戸陸子真五世内侍我之流亞張融父暢有名於世後融為南陽王友接對北使李道固就席道固顧而言曰張融是宋彭城長史張暢子不融頻蹙乆之曰先君不幸名達六夷張寶積融弟也建武中出為廬陵太守時名流謝㵸何㸃陸惠曉孔稚珪至融弟鐵之舍㸃造坐便曰今日可謂盛集二五我兄弟之流阿六張氏保家之子顧見王思逺曰卿詐作善非實得也五謂孔稚珪及融並第五朱巽以義烈知名官至江夏王叅軍吴平令孔廣字淹源㑹稽人同郡孔逭皆才學知名廣美容止善談吐主儉張緒咸美之儉嘗云廣來使人廢簿領逭不須來來則莫聽去緒數巾車詣之每歎云孔廣使吾成輕簿祭酒仕至揚州治中從事逭抗直有才藻製東都賦于時才士稱之陳郡謝􅊪年少時游㑹稽還父莊問入東何見見孔逭不其見重如此王筠字元禮又字徳柔琅邪臨沂人少擅才名與劉孝綽見重當世位至太子詹事傅昭字茂逺北城靈州人祖和之父淡知名宋世或有稱昭於廷尉虞愿乃遣車延昭時愿宗人通之在坐並當世名流官至散騎常侍張纉字伯緒為太子洗馬厯中舍並掌管記與琅邪王錫齊名普通初魏遣彭城人劉善明詣京師請和求識纉時年二十三善明見而嗟服後至平北將軍顔協為湘東王國常侍世祖出鎮荆州轉記室時吴郡顧協亦在藩邸與協同名才學相亞府中稱為二協何思澄與宗人遜子郎俱擅文名時人語曰東海三何子郎最多思澄聞之曰此言誤耳如其不然故當歸遜思澄意宜在已也位至宣惠武陵王中録事伏暅字𤣥耀曼容之子㓜傳父業能言𤣥理與樂安任昉彭城劉曼俱知名官至給事黄門侍郎桞裘字茂和義興太守明之子少聰慧弱冠有令名厯尚書郎駙馬都尉梁蔡大業為太常卿有五子允恭最知名起家著作佐郎桞憕為黄門侍郎與瑯邪王峻齊名俱為中庶子時人號為方正王操為尚書令有七子次子衡最知名有才學起家祕書郎陳沈照字孔明吴興武康人少有俊才為當時所重後至明威將軍宗元饒南郡人少好學以孝敬聞位至吏部尚書顧野王父烜為臨賀王記室以儒術知名野王少以篤學至性知名為太子率更令時官僚有濟陽江摠吴國陸瓊北地傅繹吴興姚察並以才學顯著論者推重焉周𢎞正字思行汝南人仕梁為左民尚書散騎常侍元帝著金樓子曰余以諸僧重招提琰法師隠士重華陽陶貞白士大夫重汝南周𢎞正其於義理清轉無窮亦一時之名士也位至尚書右僕射徐陵字孝穆名高一代位至尚書僕射王冲字長深善與人交貴游之中聲名藉甚位至左光禄大夫領丹陽尹王通瑯邪人父琳有子九人並知名通位至左光禄大夫加特進侍中張種吴郡人少悟静居處雅正不妄交游時人為之語曰宋稱敷演梁則卷充清處學尚種有其風敷演卷充四人皆張氏有名者也種至光禄大夫蕭引為吏部郎卒子徳言最知名引宗族子弟多以行知名陸繕㓜有志尚以雅正知名位至左僕射顔晃琅邪人家世單門傍無戚援而介然修立為當世所知官至散騎常侍兼中書舍人後魏崔𤣥伯清河東武城人與同郡董謐文京崔康時廣陽霍原等俱以碩學播名遼海位至天部大夫進禄為公高翻太尉謐之子以器度知名卒於侍御中散崔椲三齊人以才學知名舉冀州秀才公孫軌字元慶少以文學知名後為中書郎屈遵字子度昌黎徒河人博學多才藝名著當時位至侍中李順字徳正博渉經史有才䇿知名於世官至散騎常侍李騫字希義愽渉經史文藻富盛年十四為國子學生以聰達見知李惲字善祖小字藥嚢少有高名為中書侍郎李承燉煌公寶之子方裕有鑒裁為時所重薛聽字延智有世譽累遷治書侍御史直閣將軍房宣明靈建之子以文學著稱雅有父風為中書博士房堅字千秋少有才名為祕書郎房靈賓文藻不如兄靈建而辯悟過之靈建在南官至州治中渤海太守以才名見稱兄弟俱入國時三齊平隨例徙為平齊人高韜少以英朗知名同郡封懿雅相敬為慕容垂太尉從事中郎盧文甫字元祐少有器尚渉厯文史有譽於時崔綽博陵安平人少孤學行修謹有名於世呂羅漢仁篤慎容弱冠以武幹知名官至内都大官張蒲甚為明元所委在謀臣之列屢出為將朝廷清論嘗為稱首後為湘州刺史趙柔字元順金城人少以徳行才學知名河右官至河内太守張湛字子然一字仲𤣥燉煌人弱冠知名凉士好學能屬文冲素有大志為沮渠蒙遜黄門侍郎李孝伯美名聞於遐邇孝彪使於齊武帝謂之曰在北有李孝伯位至尚書游雅字伯度小名黄頭廣平任人少好學有高才太武時與渤海高允等俱知名徴拜中書博士東宮内侍長游明根孝文初與高閭以儒老學業特被禮遇公私出入每相追隨而閭以才華時侮明根世號高游焉明根位至大鴻臚卿閭後至中書監李神俊小名提少以才學知名為太常劉芳所賞位至侍中宋弁字義和廣平列人人也祖愔與從叔宣博陵崔建俱知名太武時厯位中書博士員外散騎常侍張烈字徽仙少孤貧渉獵經史有氣槩時青州有崔徽伯房徽叙與烈並有令譽時人號曰三徽後至瀛州刺史陽尼博通經籍與上谷侯天䕶頓邱李彪同志齊名官至幽州北平府長史祖瑩與陳郡袁翻齊名秀出時人為之語曰京師楚楚袁與祖雒中翩翩祖與袁􅉷位至車騎大將軍翻至撫軍將軍北齊邢邵字子才十嵗能屬文文章典麗既贍且速年未二十名動衣冠與濟隂温子昇為文士之冠世論謂之温邢鉅鹿魏收雖天才豔發而年事在二人後故子昇死後方稱邢魏焉邵位至中書監魏收字伯起小字佛助與河間邢子才及收叔季景並以文章顯世稱大邢小魏言尤俊也温子昇邢子才世號三才收少子才十嵗子才每曰佛助寮人之偉後收稍與子才争名文宣貶子才曰爾才不及魏收收益得色自序云先稱温邢後曰邢魏然收内陋邢心不許也位至尚書右僕射崔㥄狀貎偉麗善於容止少有名望為當世所知趙郡李渾嘗讌聚名輩詩酒正讙譁㥄後到一坐無復談話者鄭伯猷歎曰身長八尺面如刻畫謦欬為洪鍾響胷中貯千卷書使人那得不畏服位至東兖州刺史鄭述祖字恭文滎陽開封人少聰敏好屬文有風簡為先達所稱譽釋褐司空行參軍陸卬字雲駒少機悟美風神好學不倦博覽羣書五經多通大義善屬文甚為河間邢邵所賞邵又與卬父子彰交游嘗謂子彰曰吾以卿老蜯遂出明珠意欲為群拜紀可乎由是名譽日高儒雅縉紳尤所推許為吏部郎中李廣博渉群書有才思文義之美少與趙郡李謇齊名為邢魏之亞而訥於言敏於行官至侍御史皮子信大將軍景和之子機悟有風神微渉書傳後主時為衛將軍於勲貴子弟之中稱其鑒識盧公順早以文學見知為符璽郎待詔文林舘與博陵崔君洽隴西李師上同志友善從駕晉陽寓居僧寺朝士謂唐寺三少為物論推許陽林之俊爽有風槩少勤學愛文藻弱冠擅聲為後來之俊秀位至中書監祖珽字孝徴神情機警詞藻遒逸少馳令譽為世所推起家祕書郎後周席固襄陽人居家孝友為州里所重官至昌州刺史韋孝寛為浙陽郡守時獨孤信為新野郡守同𨽻荆州與孝寛情好款宻政術俱美荆部吏人號為連璧韋夀字世齡鄭國公孝寛之子以貴公子早有令譽為右侍上士桞莊字思敬少有器量博覽墳籍兼善辭令濟陽蔡大寳有重名於江右時為岳陽王蕭詧諮議見莊歎曰襄陽水鏡復在於兹大寶遂以其女妻之俄而詧辟為參軍蘇亮好屬文善章奏與弟湛等皆著名西土年二十餘舉秀才至雒陽過河内常景景深器之退而謂人曰秦中才學可以抗山東者將此人乎位至侍中宇文神舉偉風儀善辭令博渉經史性愛篇章尤工騎射臨戎對㓂勇而有謀莅職當官每著聲績兼好施愛士以雄豪自居故得任兼文武聲彰外内百僚無不仰其風采先輩舊齒于今稱之位至并州摠管隋李徳林字公輔初仕周為内史上士武帝嘗於雲陽宮作鮮卑語謂羣臣云我嘗日惟聞李徳林名及見其與齊朝作檄移我正謂其是天上人豈意今日得其驅使復為我作文書極為大異徳林既少有才名重以貴顯凡製文章動行於世或不知者謂為古人焉位至上儀同贈定州刺史桞裘字茂和少聰慧弱冠有令名官至曹州刺史何妥字棲鳳少聰警年十七以技巧仕梁湘東王後知其聰明召為誦書左右時蘭陵蕭眘亦有俊才住青楊巷妥住白楊巷時人為之語曰世有兩俊白楊何妥青楊蕭眘其見美如此官至國子祭酒劉焯以儒學知名劉炫聰明博學名亞於焯故時人稱為二劉焉焯官至太學博士炫至旅騎尉元暉尚書左僕射翌之子頗好渉獵書記少得美名於京下王眘字元恭琅邪臨泝人博學多通少有盛名於江左厯太子洗馬中舍人裴政字南金位膳部郎中學渉有文藻以輕財貴義稱陸彦師字雲房少有行檢為邦族所稱位至吏部侍郎宇文愷字安樂愷少有器局家世武將諸兄並以弓馬自達愷獨好學博覽書記解屬文多伎藝號為名公子位至金紫光禄大夫崔儦字岐叔北齊待詔文林舘厯殿中膳部員外三曹郎中儦與頓邱李若俱見稱重時人為之語曰京師灼灼崔儦李若王胄字承基為著作佐郎與虞綽齊名同志友善于時後進之士咸以二人為凖的胄官至朝散大夫綽至著作佐郎蘇䕫尚書右僕射威之子少有盛名於天下引致賓客四海士大夫多歸之官至通議大夫于仲文倜儻有大志氣調英拔當時號為名公子起家為趙王屬游元仕後周厯夀春令譙州司馬俱有能名敬肅字宏儉少以貞介知名仕至潁川郡丞陳孝意少有志尚弱冠以貞介知名仕至鴈門郡丞唐李百藥徳林子也以名臣之子才行相繼四海名流莫不宗仰位至宗正卿杜淹聰辯多才藝弱冠有美名於京邑位至御史大夫薛收與從子元敬及薛徳音俱有才名時人謂之河東三鳳呼収為長雛徳音為鸑鷟元敬最小謂鵷雛收仕至天䇿府記室元敬至天䇿府叅軍兼直記室郎余令少以博學知名為霍王元軌府叅軍元軌深禮之先是余令從父知年為霍王友元軌謂人曰郎氏兩賢人之望也王績字無功絳州人嘗躬耕於東臯故時人號東臯子白履忠陳留浚儀人博渉文史隠居于古大梁城時人號梁丘子孔紹安少與兄紹新俱以文詞知名外兄虞世南歎異之時有詞人孫萬夀與紹安篤忘年之好時人稱為孫孔紹安官至祕書監鄭世翼鄭州滎陽人弱冠有盛名後為揚州録事叅軍謝偃善為賦李百藥工為五言詩時人稱為李詩謝賦仕至魏王府功曹許叔牙為太子洗馬兼崇賢舘學士又有臨淮劉子翼彭城劉裔之與叔牙相次為學士並以文學知名楊炯華州華隂人少與絳州王勃范陽盧照隣東陽駱賓王皆以文詞知名海内稱為王楊盧駱亦號為四傑炯至盈川令勃至虢州叅軍照隣至新都尉賔王至臨海丞張昌齡冀州人弱冠以文詞知名仕至襄州司戸北門修撰趙元楷性機辯明於簿領隋末任上郡東曹掾以幹理見稱煬帝聞其名遥署厯陽郡丞孟利貞與董思恭元思敬同時並以文藻知名利貞仕至著作郎𢎞文舘學士思恭至太史思敬至協律郎劉禕之少與孟利貞高知周郭正一俱以文藻知名時人目為劉孟高郭禕之官至中書侍郎同中書門下三品知周至右散騎常侍正一至陕州刺史林輔元汴州浚儀人與伯父徳仁同郡剡縣丞繁師𤣥齊王文學王孝逸羅川戸曹靖君亮司𨽻從事鄭祖咸軍城縣長鄭師善王充中書舍人李行簡處士協咸見重於隋代號為陳留八俊邢文偉滁州人與和州高子貢俱以博學知名於江淮間仕至内侍史出為珍州刺史葢文達博渉經史其宗人文懿亦以儒業知名當時稱為二葢焉文達位至蜀王師文懿至國子博士杜易簡博學有高名姨兄岑文本甚推重之仕至開州司馬周思茂貝州漳南人少與弟思均俱早知名仕至麟臺少監文舘學士喬知之同州馮翊人少與弟侃備並以文詞知名知之尤稱俊才官至左司郎中侃至襄陽令冨嘉謨雍州武功人與新安吴少微屬文皆以經典為本時人欽慕之稱為吴冨體初嘉謨為晉陽尉與少微同官魏郡谷倚為太原主簿皆以文詞著名時人謂之北京三傑嘉謨少微並官至監察御史倚後流寓客死韓滉宰相休之子㓜有美名所與結交皆時之俊彦非公忠正直者不與之親密位至右僕射沈佺期善屬文尤長五言之作與宋之問齊名時人稱為沈宋佺期官至太子詹事宋之問父令文有勇力而工書善屬文世人以為三絶之問以文詞知名弟之悌有勇力之遜善書議者云各得父之一絶之問後至越州長史之遜至太原尹徐彦伯兖州瑕邱人少以文章擅名為蒲州司兵叅軍時司戸韋暠善判事司士李亘工於翰札而彦伯以文詞雅美時人謂之河中三絶陸象先初為雒陽尉以宰相子聞望甚高蘇晉與雒陽人張循之仲之兄弟為友並以學業著名劉允濟善屬文與絳州王勃早齊名特相友善官至鳯閣舍人左遷青州長史蘇味道少與李嶠俱以文學知名時人謂之蘇李味道位至鳳閣侍郎同鳳閣鸞臺三品嶠至中書令蘇瓌中宗朝厯左右僕射同中書門下三品子七人頲氷詵乂頴銳顔頲最知名官至中書侍郎平章事詵戸部員外瓌與李嶠同居相位嶠有才華其子不肖瓌以幹理而頴有文詞故代稱蘇瓌有子李嶠無兒薛登博渉文史少與徐堅劉子𤣥齊名友善登官至太子賓客堅至右散騎常侍子𤣥至左散騎常侍貶安州别駕趙驊與殷寅顔真卿桞芳陸據蕭頴士李華邵軫同志友善故天寶中語曰殷顔桞陸蕭李邵趙以其重行義敦交道也驊至祕書少監蔣沅性耿介獨好學早有名稱官至左散騎常侍蕭嵩長子華兵部侍郎少子衡尚新昌公主拜駙馬都尉並風流簡肅士族稱之韋陟中書令安石之子開元初丁父憂居喪過禮自此杜門不出八年于兹與弟斌相勸勵探討墳索不捨晝夜文華當代俱有盛名官至吏部尚書東都留守李邕為滑州刺史上計京師邕素負美名頻被貶斥皆以邕能文養士賈生信陵之流執事忌勝剥落在外人間素有聲稱後生不識京雒阡陌聚觀以為古人或將眉目有異衣冠望風尋訪閭巷又中使臨問索其新文復為人隂中竟不進賀知章㑹稽人少以文詞知名神龍中知章與越州賀朝萬齊融揚州張若虛邢巨湖州包融俱以吴越之士文詞俊秀揚名於上京位至銀青光禄大夫正授兼祕書監蕭頴士字茂挺與李華同年登進士第開元中天下承平人物駢集如賈曽席豫張垍韋述輩皆有盛名而頴士皆與之游繇是搢紳多譽之是時外夷亦知頴士之名新羅使入朝言國人願得蕭夫子為人師其名動華夷若此王維以詩名盛於開元天寶間凡諸王駙馬豪右貴勢之家無不拂席迎之代宗時弟縉為宰相嘗謂縉曰卿之伯氏天寶中詩名冠代位至尚書右丞李白少與魯中諸生孔巢父韓凖裴政張叔明陶沔等隠於徂徠山時號竹溪六逸白後待詔翰林辟永王璘從事杜甫字子美天寶末詩人甫與李白齊名後至檢校工部員外郎路羣志行貞潔不茹葷食肉養親以孝聞自長慶以來高名重價厯踐清華及卒時論嗟惜楊綰素以徳行著稱清識過人凡所知友皆一時名士位至中書侍郎平章事李栖筠字貞一趙郡賛皇人㓜孤貧而器度雄逺體貎瓌傑愽覽墳籍無所不通屬文勁迅然本於理道教化性嚴重寡言造次不妄交接故當時高名之士皆敬慕之為御史大夫以剛正為元載所惡天下之士重其高義雖三尺童子皆知敬慕稱為賛皇公而不名焉張渉以經學為儒官嘗舉日試萬言當時呼為張萬言官至散騎常侍李承少有雅望至其從官頗以貞亷才術見稱於時累官襄州潭州刺史崔造與韓㑹盧東美張正則為友皆僑居上元好談論經濟之略嘗以王佐自許時人號為四䕫造後至給事中平章事韋夏卿早有時稱其所與游皆一時名士位至東都留守選太子少保趙昌字洪祚祖不器父居貞皆有名於時昌官至太子少保郄士美善與人交然諾之際豁如也當時名稱甚茂位至忠武軍節度使呂元膺學識深逺處事得體正色立朝有台輔之望位至太子賓客薛戎為浙東觀察使兄弟五人季弟放最知名放至江西觀察使韓臯字仲文夙負令名而器質重厚有大臣之度後為杭州刺史再為尚書右丞遷武昌鎮海忠武三節度所至皆有聲績大率用簡儉為理及位高益為時人所重錢起與韓翃李端盧綸司空曙輩十人俱以能詩出入貴游之門時號十才子形於圖畫位終尚書郎錢徽起之子也以文學操行立名於時官至吏部尚書郎致仕孔敏行字至之文宣王四十代孫父述有高名於貞元間敏行名臣子少時修潔為人所稱慕及游宦與當時豪俊為友其名華為一時歸湊崔郾與兄邠等皆有令譽而郾疎財恢廓弟兄所不及郾位至浙西觀察使邠至太常卿元􅍬字徽之聰警絶人年少有才名與太原白居易友善工為詩善狀詠風態物色當時言詩者稱元白焉􅍬至工部侍郎平章事卒於武昌軍節度使居易至刑部尚書致仕李商隠字義山與太原温庭筠南郡段成式齊名時號三才子商隠後至東川節度判官檢校工部郎中庭筠至隋縣尉成式至江州刺史王凝咸通中知禮闈時凝擅價一時與路岳相齊語曰王凝路岳見便脫殻位至宣州觀察使後唐宰相趙光裔唐天祐中厯官省閣伯仲皆以亷潔方正流聞于時自梁孽未亡時趙氏伯仲之名北人皆所傾慕位至平章事賈馥性恬澹與物無競為鎮州士人之秀位至鴻臚卿致仕趙光逢㓜嗜墳典動守規檢議者目之為玉界尺昭宗朝登進士第踰月辟度支巡官臺省内外俱制俱有能名後為太保致仕晉鄭韜光唐宣宗之外孫萬夀公主之所出也生三日賜一子出身銀章朱綬及長美容止神爽氣徹不妄喜怒而秉執名節為甲族所稱後為戸部尚書致仕册府元龜卷七百七十七
