body:
  text: 崇祭祀三崇祭祀三唐肅宗至德二年二月帝在鳳翔改汧陽郡吳山為西嶽增秩以祈靈助乾元元年六月己酉初置太一神壇於南郊圓丘東命中書侍郎同中書門下平章事王璵攝祭二年正月丁丑親祀九宮貴神宿齊於壇所上元元年閏四月己卯御明鳳門大赦改元詔曰自古明王聖帝名山大川並委州縣長吏擇日致祭又詔曰定禍亂者必先於武德拯生靈者諒在於師貞周武創業克寧區夏惟師尚父實佐興王況德有可師義當禁暴稽諸古昔爰崇典禮其太公望可追封為武成王有司依文宣王置廟仍委中書門下擇古今名將如文宣置亞聖及十哲等享祭之典一同文宣元年建子月詔曰皇王符瑞應協於靈祗典禮廢興式存於禋告蓋重成命以崇祗肅朕獲嗣鴻猷敢忘虔敬頃以三代正朔所尚不同百王徽號無聞異稱顧茲薄德思創常規爰因行慶之日將務惟新之典而建元立制冊命曆符受於天地祖宗申於百辟卿士今既循諸古法讓彼虛名革故之宜已宣於臣下昭報之旨未展於郊廟因時備禮擇日陳誠克明恭己之心庶降庇人之福至誠斯感其在茲乎宜取今月二十八日朝獻太清宮二十九日享太廟元獻廟來月一日祭圓丘及太一壇是月己酉皇帝謁太清宮庚戌享太廟元獻廟建丑月辛亥朔拜南郊祭太一壇禮畢還宮代宗寶應二年五月丁卯改封北嶽為寧天王廣德二年二月乙亥親拜南郊祀昊天上帝於圓丘戊子詔五嶽四瀆名山大川宜令所管致祭三月丙午敕曰三代之初皆有神降監其德也天實啟之恭惟王業之初師及霍邑堅城未下大將阻兵連雨積旬糧儲不給有白衣老父忽詣軍門稱霍山之神謁大唐皇帝云東南取路八日雨止助帝破敵盡如其言巖巖霍山九州之鎮興雲致雨功已洽於生人親道輔德力更宣於王室朕纘承大寶膺受鴻休肸蠁之間誠明可接永言幽贊茲謂有孚惟天命神據我斯意宜令禮儀使判官司封員外郎薛頎即往霍山致祭正詞以薦稱朕意焉永泰元年正月癸巳改元制曰書稱咸秩詩美懷柔仰惟眾靈念茲多祐其五嶽四瀆名山大川宜令所管牧宰精神致祭大曆元年十一月甲子日長至御含元殿大赦改元制曰五嶽四瀆名山大川祀典攸存神理昭著宜以禮致祭五年四月丙午命太常寺復置先農馬祖壇依常式享祭六月詔曰五嶽四瀆名山大川神明所居風雨是主宜委中書門下分使致祭以達精誠十一月庚寅日長至命有司祀昊天上帝於南郊七年十一月辛卯日長至命有司祀昊天上帝於南郊不視朝八年十一月辛丑日長至不視朝命有司祀昊天上帝於南郊十一年十一月丙辰日長至命有司祀昊天上帝于南郊不受朝賀十二年八月增修北郊壇齊宮二十五間十三年十一月丁卯日長至命有司祀昊天上帝于南郊不視朝德宗建中二年五月有司奏定張良穰苴孫武吳起樂毅白起韓信諸葛亮李靖李勣配武成王廟先是開元十九年始於兩京置齊太公廟以張良配乾元中追封齊太公為武成王令選歷代名將從祀然未之行祠宇日荒至是宰相盧𣏌京兆尹盧諶以盧者齊之裔乃鳩其裔孫若盧崔丁呂之族合錢以崇飾之請擇自古名將如孔門十哲皆配享詔下史官乃定穰苴等至是始奏定焉三年閏正月甲戌令百寮謁武成王廟貞元元年正月丁酉改元制天下名山大川委長史致祭十一月癸卯日南至帝親祀昊天上帝於圓丘二年四月壬午太常寺奉祭風伯雨師祝版準開元禮凡有司攝事祝版應御署者進署訖皆北面再拜其風伯雨師本是小祀並有司行事天實三載始升諸星為中祀亦無皇帝親祀風伯雨師之命有司自是常典不同攝祭其祝版準中祠例合進署其再拜案禮無文詔曰風雨等師升為中祀有烈祖成命況在風雨事切蒼生今雖無文朕當屈己再拜以申子育萬姓之意是月詔太常少卿裴郁等十人各就方鎮祭嶽鎮海瀆等三年閏五月徙風師壇于滻水東四年五月初復御署祭嶽鎮海瀆祝版準開元禮每歲祭嶽瀆祝版咸御署而遣之自上元元年權亭中祀已下繇是因循不署及是太常卿董晉舉奏之帝方崇祀典乃復舊制六年二月甲申復祀元中司命司人司錄及靈星五月以風師武成王等樂章付所司施行之六月己酉復祭五龍壇初開元中每歲以二月祭之有司行事著於新禮自上元中罷中小祀其祭遂廢及是宰臣請復之帝始以是日親祭焉十一月庚午日南至帝親祀昊天上帝於南郊九年十一月癸未帝朝獻太清宮畢事宿齋於太廟行宮甲申朝于太廟畢事齋於南郊行宮己酉日南至帝郊祀初帝以是歲有年蠻夷朝貢思親告郊廟於祀事尤重慎及將散齋謂宰臣曰在祀散齋歸正寢攝心奉祀不可聞外事其常務勿奏乃齋於別殿及命皇太子諸王行祭者皆受誓一日命妃媵辭於別所故事祈壇宮廟內壇及殿庭帝步武所皆設黃道褥壇十一位又施赤黃褥將有事皆命徹之又故事設御史版立于郊廟咸藉以褥及是帝虔禋拜首於地有司奉祠者莫不惕厲順宗以貞元二十一年正月即位八月庚子傳位於皇太子大赦改元永貞盡其年憲宗元和二年正月辛卯有事於南郊詔天下名山大川及古聖帝明王忠臣烈士各令以禮致祭四年十月庚寅冊皇太子詔五嶽四瀆名山大川委所在長吏量加祭祀七年十月庚戌制冊皇太子五嶽四瀆名山大川委所在長吏量加祭祀穆宗長慶元年正月辛丑親祀昊天上帝於圓丘七月壬子受冊尊號禮畢詔五嶽四瀆名山大川竝自古忠臣烈士各令所在以禮致祭敬宗寶曆元年正月辛亥親祀昊天上帝於南郊文宗太和元年六月乙卯詔曰依令有司約禮禱祀宗廟遍祈山川務盡莊誠以副予志三年六月太常寺奏北郊祀皇地祇壇先闕齋宮請準祠例置一所可之十一月甲午親祀昊天上帝於南郊八年二月庚寅以疾瘳大赦詔曰百靈所佑獲遂痊和虔奉神休敢忘昭報其五嶽四瀆天下名山大川各委所在長吏致祭仍加豐潔以副精誠九年二月丁丑詔曰王者受天地之明命續祖宗之鴻業所以祗服大事致誠嚴禋盡其孝敬之心崇其郊祀之禮必在匪懈不忒粢盛豐潔古今丕訓無易於此朕嗣位十載恭臨萬邦務三時以厚生睦九族以脩教每厲薄德汔茲小康中宵內愧懼不克稱寔天地之睠佑祖宗之威靈思欲罄其精誠奉以昭報豈聿懷之敢望寔如在而齋心如聞近歲有司因循將事不恪牲牷無滌具之別籩豆乏靜嘉之容鼎俎難陳薦羞多闕祠官或怠於齊肅胥吏有至於喧呶虧禮瀆神莫斯為甚永言重事用懼深衷起今已後太廟郊社齋即先事前一日委監察御史子細點檢如有替代非正身者當時禁身推問聞奏當重科懲既責躬親須議優獎其齋郎委中書門下商量量與減選應緣祠祭官下至齋郎及太常樂人吏等致齋日有博奕飲酒喧呼爭競者亦委御史臺糾察聞奏其牲牢準禮循行之際合視肥瘠之宜近日相承臨時取辦既乖誠敬頗失舊章委太僕寺準禮令處分如無本色牛羊速具聞奏至於酒醴醯醢簠簋膳羞各委本司準禮令切加提舉凡在廟壖所宜肅敬縱云隙地豈廢脩崇如有耕墾藝植者亦委御史臺糾察聞奏攝事公卿雖約官品將朕誠敬必在得人委尚書省差定之時稍加慎選其祭器禮物中如有欠闕及濫惡須慎補改張者委太常宗正光祿太僕寺少府監諸司速具條疏聞奏仍委中書門下即與疏理處分於戲禮崇明祀神享至誠上下茍無其違心虔恭必冀於備物繇是怵惕興感齊莊致詞咨爾庶工各揚厥職式遵禮典稱朕意焉是年六月封雞翁山為侯先是翁造為興元節度使初往漢中遇大雨平地水尺餘若不可進禱雞翁山疾風驅雲即時清霽及是帝憶聞其事會造為御史大夫入見得詳言當時靈貺明日下詔封之開成二年四月辛酉詔曰每聞京師舊說以為終南山興雲即必有雨若當晴霽雖密雲他至競不霑霈況茲山北面闕庭日當恩顧修其望祀寵數宜及今聞都無祠宇巖谷湫卻在命祀終南山未備禮秩湫為山屬捨大崇細深所謂闕於興雲致雨之祀宜令中書門下且差官設奠宣告恩禮便令擇立廟處所回日以聞然命有司即時建立八月乙未長安縣令杜慥奏準詔置終南山祠宇畢己酉冊南山為廣惠公武宗會昌元年正月辛亥有事於南郊十二月敕取來年春依天寶三年祀九宮貴神五年正月辛亥有事于南郊宣宗大中七年正月有事于南郊懿宗咸通元年十一月丁未有事于南郊四年正月庚午有事于南郊僖宗乾符元年十一月庚寅有事于南郊昭宗龍紀元年十一月甲寅有事于南郊哀宗天祐二年六月湖南馬殷奏岳州洞庭青草二湖之側有古祠四所先以荒圮臣復修廟宇畢乞賜名額者敕旨黃陵二妃祠曰懿節洞庭君祠曰利涉侯青草祠曰安流侯三閭大夫祠先以澧朗觀察使雷滿奏已封昭靈侯宜依天祐元年九月二十九日敕處分九月中書門下奏伏自遷都已來武成王廟並未置立今請改為武明王避朱全忠父諱其廟請於街西選地建立其餘修置及配享十哲七十二弟子並請準故事者從之後唐莊宗初為晉王天祐十一年正月平幽薊還以劉守光告南宮七廟是日與其黨李小喜鄭藏斐皆伏法十月德音應有百神祠宇不得有虧時祭十一月辛丑敕天下州縣所有神祠本處差官告祭二年二月己巳朔有事于南郊七月己酉幸龍門下雷山賽二人神北俗禡牙宜社之禮也明宗天成元年八月司天奏前月二十八日夜四鼓西北雷雲暴作秋事方興宜分命祠禱從之二年十月甲申敕少府監聶廷祚等以大駕巡幸告祭神祠四年七月壬辰制朕自嗣守丕圖勤修庶政于茲四稔罔怠萬機上實賴於祖宗下必資於卿士卑躬克儉景行前王側席求賢追蹤往哲日懼一日雖休勿休幸致風雨不愆干戈載戢九穗之禾應瑞足表豐年雨階之舞咸賓無虧曠代敢萌矜伐漸喜隆平然而圓丘之禮末陳清廟之詩未著夙宵增懼寤寐興懷何以助天之高而報地之厚也且天覆予為子民戴予為君茍帝道未臻則人倫焉正必須燔柴瘞玉嚴六宗虞典之禋非敢刻石泥金竊萬歲嵩高之美凡在遐邇當體至懷朕取來年二月十一日有事于南郊八月丁酉大理正路毓奏竊見春秋釋奠于文宣王廟而武成廟久曠時祭國之二柄文武之宗請復常祀從之九月戊辰祠部員外郎呂朋龜奏五龍祠九宮壇天地三官置醮之禮久廢請依典故脩之十二月中書奏今後宰臣致齋內不押班不知印不赴內殿起居或遇國忌行事已受誓戒宜不赴行香竝不奏刑殺公事長興元年二月乙卯親祀昊天上帝於圓丘十二月己酉命有司祭司寒神於水井二年七月福建王延均上言當道神廟七所乞封王號敕無諸史傳有名宜封為閩越富義王其餘任自于境內祭享是月敕天下州府應有神祠破損者仰取公使錢添修三年十二月庚戌敕祠祀祭器牲帛務從精潔齋宮壇墠所司宜檢舉崇飾之愍帝應順元年閏正月甲寅集賢院上言以赦書修創凌煙閣詔問閣高下等級其凌煙閣都長安時在西內三清殿側畫像皆北向閣有中隔隔內北面寫功高宰輔南面寫功高諸侯王隔外面次第圖畫功臣題贊自西京版蕩四十餘年舊日主掌官吏及畫像工人淪喪集賢院所屬寫真官畫真官人數不少都雒後廢職今將特起閣請先定佐命功臣人數請下翰林院預令寫真本及下將作差人與畫工序閒架修建院內先有寫真官沈居隱畫真官王武瓊二人相次淪亡無人應用詔集賢御書院復置寫真官畫真官名一員餘依所奏末帝清泰元年五月壬申詔曰吳嶽成德公昨遇享期克申幽贊宜加王號以表神功可進封靈應王其祠享官屬仍舊同五嶽擇日冊命初帝在鳳翔將有沉閼之釁遣房暠祠之有應至是欲加封爵下有司檢討奏曰天寶十載正月封吳山為成德公與沂山會稽醫無閭同制封公至德二年十二月改吳山為嶽祠享官屬視五嶽今國家以靈應告祥宜示殊等故有是命至二年四月庚午授冊于少府監烏昭達往吳山祠封靈應王是月丙子詔諸州神祠有破壞者委所在給省錢補緝十一月詔杭州護國廟改封崇德王城隍神改封順義保寧王銅官廟改封福善通靈王湖州城隍神封阜俗安成王越州城隍神封興德保闉王從兩浙節度使錢元瓘奏也二年三月庚申詔曰祠祭國家重事功在精虔若不提撕漸成疏慢今後監祭使每祭親視酒饌幣玉不得令饌料失于蠲潔如有所聞罪在監祭使其壇廟牆屋勿令疏漏本司常檢舉修葺以聞四月戊辰考功員外郎李慎義上言今春以來稍愆雨澤陛下念稼穡之重深宵旰之憂倍軫聖心遍走群望盈尺則告瑞於元朔如膏則潤洽於暮春可卜豐穰動皆響應請天下凡祠宇有益于人者下本處常令修飾冀集洪休從之晉高祖天福二年三月詔巡幸汴州中書奏車駕經過河南府河陽鄭州汴州管界所有名山大川帝王陵廟名臣等去路十里內者伏請下本州府各排比祗候車駕過日以酒脯醢祭告從之五月湖南馬希範奏青草等四廟各乞進封敕青草廟安流侯宜進封廣利公洞庭廟利涉侯進封靈濟公磊石廟昭靈侯進封威顯公黃陵二妃廟舊封懿節廟改封昭烈廟八月詔曰負國者天地不容為逆者人神其怒永惟躬饗實有感通昨出師之時將帥虔禱頗聞陰祐成此戰功唐衛國公宜封靈顯王其餘鄭州竝汜水管內神祠宜令長吏差官點檢如有隳損處便委量事修葺貴申嚴飾以合陰功五嶽承天四瀆紀地自正當陽之位未伸望秩之儀宜令差官遍往告祭兼下逐州府量事修崇所有近廟山林仍宜禁斷樵牧十月丙戌命使祠五嶽四瀆六年正月戊寅詔曰全晉奧區興王重鎮唐叔之英靈未泯臺駘之古廟猶存朕頃在竝門長承陰助永言正直宜用封崇唐叔虞宜封興安王臺駘宜封昌寧公又詔曰嶽鎮司方海瀆紀地載諸祀典咸福蒸民將保豐穰宜申虔敬俾加崇飾以奉神明其嶽鎮海瀆廟宇等宜令各修葺仍禁樵蘇七年二月敕唐州湖陽縣蓼山神祠宜賜名為蓼山顯聖之神仍下本州修葺廟宇元襄州安從進作逆舉軍北來東京教坊使充南面先鋒都監陳思讓進軍南行與從進相遇接蓼山列障俗以蓼與了字同音遂傳為不祥遂祈戰勝奏立廟額從進既敗行營都部署高行周以狀奏聞因有是敕少帝以天福七年六月十三日即位九年七月辛未朔御崇元殿大赦改元開運盡三年是日宣赦未畢會大雨雪匆遽而罷都下震死者數百人明德門內震落石龍之首識者以為石乃國姓蓋不祥之甚十一月敕天地宗廟社稷及諸祠祭等訪聞自前所司承寬多不精瀠宜令三司豫支一年諸司合請祠祭禮料物色等於太廟置庫仍差宗正丞石載仁專主掌監察御史宋彥昇監庫兼差供奉官陳審璘往雒京於太廟內穩便處擘畫修庫屋五間候奉修畢催促所支禮料物色監送到庫交付宋彥昇石載仁竝同點檢入庫交付訖供奉官陳審璘齎交領文狀歸闕每有祠祭諸司各請禮料至時委監庫御史宋彥昇宗正丞石載仁旋給付逐司其太祠中祠兼令監察使點檢饌造一一須得精潔如或更致慢易本司當準格律科罪其祭服祭器未有者脩製已有者更仰雅飾漢隱帝乾祐三年八月以蒙州城隍神為靈感王從湖南請也時海賊攻州城州人禱于神城得不陷故有是請希廣又言永州有杏將軍祠郡人水旱祈禱有應乞賜封崇敕宜賜太保周太祖廣順元年正月即位制曰國之大事在祠為先茍不潔蠲深為瀆慢如聞自前祠祭牢饌頗虧肅敬今後委監察御史嚴加覺察必須豐潔庶達精諴稍或不恭國有常典二年五月親征兗州遣樞密院直學士陳觀祭堯廟翰林學士竇儀祭東嶽廟三年三月西京留司太子少師楊凝式言諸祠祀之所並無齋宮遣前染院使周重興監造與留司計會具料度事件以聞其太廟郊社要補葺處仍便檢計十月戊申內出御札曰王者應運開基子民育物罔不承天事地尊祖敬宗燔柴於泰壇用昭乾德瘞玉於方澤以答坤靈朕受命上玄宅心下上時已歷于三載漸至小康禮未展於二儀深虧大典夙宵愧畏不敢遑寧宜叶蓍龜式陳籩豆庶展吉蠲之禮用傾昭事之誠朕以來年正月一日于東京有事於南郊宜令所司各備儀注務從省約無致勞煩凡有供需竝用官物府縣不得因便差配諸道州府不得以進奉南郊為名輒有率斂庶俾嚴靜以奉郊禋中外臣僚當體予意顯德元年正月丙子朔太祖親祀圓丘世宗以顯德元年正月丙申即位不改元恭帝以顯德六年六月甲午即位不改元盡其年二年七月丙子帝謂侍臣曰朕聞國之大事在祀與戎近代以來急於戎事祭祀之禮幾如墜地且牲牢之具簠簋之數蓋主誠信誠信不至神何享焉今後宜令所司各舉其職務在豐潔八月乙丑詔曰今後諸處祠祭應有牲牢香幣饌料供具等仰委本司官吏躬親檢校務在精至行事儀式依禮經大祠祭合用樂者仍須祀前教習凡關祀事宜令太常博士及監察御史用心點檢稍或因循必行朝典先是以太常禮院上言郊壇宗廟禮物多闕故有是命四年二月庚午詔有司添修祭器法物等先是帝以郊廟祭器皆繇所司相承製造年代寖遠式樣訛舛乃令國子博士聶崇義檢閱禮書模盡其樣以聞至是故有是命
